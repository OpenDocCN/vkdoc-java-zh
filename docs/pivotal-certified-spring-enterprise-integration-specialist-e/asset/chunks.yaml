    @RestController Example


    Spring version 4.x introduced the new annotation `@RestController`. Use of this
    annotation is shown in [Listing 4-17](#9781484207949_Ch04.xhtml#FPar25).


    [***Listing 4-17***](#9781484207949_Ch04.xhtml#_FPar25). @RestController Example
    (0405-rest-restcontroller-server)


    ```

    package net.lkrnac.book.eiws.chapter04.restcontroller;


    import java.util.Collection;

    import net.lkrnac.book.eiws.chapter04.UrlConstants;

    import net.lkrnac.book.eiws.chapter04.model.User;

    import net.lkrnac.book.eiws.chapter04.service.UserService;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.http.HttpHeaders;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.ResponseEntity;

    import org.springframework.web.bind.annotation.ExceptionHandler;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.bind.annotation.RequestBody;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RequestMethod;

    import org.springframework.web.bind.annotation.ResponseStatus;

    import org.springframework.web.bind.annotation.RestController;

    import org.springframework.web.util.UriComponents;

    import org.springframework.web.util.UriComponentsBuilder;


    @RestController

    @RequestMapping(UrlConstants.USERS_URL)

    public class UserController {

      private final UserService userService;


    @Autowired

      public UserController(UserService userService) {

        super();

        this.userService = userService;

      }


    @RequestMapping(method = RequestMethod.GET)

      public Collection<User> getUsers() {

        return userService.getAllUsers();

      }


    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

      public User getUser(@PathVariable("id") int identifier) {

        return userService.getUser(identifier);

      }


    //remaining methods are the same as in Listing 4-16

      //...

    }

    ```


    If we compare this class to the controller in [Listing 4-16](#9781484207949_Ch04.xhtml#FPar24),
    we would notice slight differences. The class is using the `@RestController` annotation
    instead of the `@Controller` annotation. The second difference is that we don’t
    need to annotate return values from `getUsers` and `getUser` with the annotation
    `@ResponseBody`. By default, Spring MVC tries to find return values from the web
    methods view belonging to this controller. This is because Spring MVC was originally
    used for the Model-View-Controller style of web applications, where it also handles
    templating of views. As the functionality of the Spring MVC module was extended
    to handle REST concerns, we need to be able to specify that the return value should
    be converted into an HTTP payload.


    So the `@RestController` annotation is a slight convenience shortcut for combining
    the `@Controller` and `@ResponseBody` annotations. But it significantly enhances
    the semantic characteristics of the web layer, because is clearly differentiates
    REST endpoints from MVC endpoints.


    Spring MVC REST with Headers and Query Parameters


    Let’s shuffle our requirements a little bit and dive into Spring MVC mapping features:


    *   The first one was already mentioned in [Listing 4-4](#9781484207949_Ch04.xhtml#FPar11),
    where we created the option to read users based on the interval of user identifiers.

    *   We want to version our REST API to be prepared for eventual breaking changes
    in the future. This version of the API will be stored in the HTTP header.


    ![Image](images/sq.jpg) **Note**  Versioning the REST API is a big topic, because
    it affects the API contract with the consumer and therefore needs to be carefully
    designed. The client can use various approaches to indicate the API version within
    the REST request: store the version in the URI, in the custom HTTP header, or
    in the content type. There is no clear winning approach because each has its advantages
    and disadvantages. This broad topic is beyond the scope of this book. In our example
    we used a custom header, because it allows us to highlight the Spring MVC HTTP
    header parsing and mapping features.


    *   The example covering these requirements would be more readable if it were
    split into various listings. The first part of this example is shown in [Listing
    4-18](#9781484207949_Ch04.xhtml#FPar27).


    [***Listing 4-18***](#9781484207949_Ch04.xhtml#_FPar27). Initial Part of Spring
    MVC Example with Headers and Query Parameters (0406-rest-parameters-server)


