    有状态 Job 和 Step 执行


    通常需要在 `Job` 或 `Step` 之间传递状态，这些状态可以是任何 Java 对象。例如，一个 `Step` 或 `Job` 可能正在处理记录，而后续的
    `Job` 或 `Step` 需要发送已处理记录数量的通知。


    通常，Java 开发人员会创建某种需要线程安全的内存缓存。但幸运的是，SB 提供了多种机制来以干净且线程安全的方式传递状态。


    ExecutionContext


    状态转换的第一个选项可以通过 `ExecutionContext` 类实现。此类封装了一个类型为 `Map<String, Object>` 的映射。因此，我们能够存储需要在步骤或面向块的项目处理器之间传递的任何类型的状态。如果我们需要在批处理过程中存储部分结果，这会很方便。但当然，这个实例需要以某种方式注入到我们需要使用它的地方。幸运的是，SB
    提供了多种从 SB 应用程序的任何部分访问 `ExecutionContext` 的方法。


    正如我们提到的，当 `Step` 执行时，会创建一个 `StepExecution` 实例；当 `Job` 执行时，会创建一个 `JobExecution`
    实例。通过 `StepExecution.getJobExecution()`，我们可以访问 `JobExecution` 实例；通过 `JobExecution.getExecutionContext()`，我们可以访问
    `ExecutionContext` 实例。


    `StepExecution` 实例可以通过使用 `@BeforeStep` 注解的初始化方法注入到任何面向块的 `ItemProcessor`、`ItemWriter`
    和 `ItemReader` 中。对于 `Tasklet`，有一个更简单的机制，SB 将 `ChunkContext` 实例作为 `Tasklet.execute()`
    的第二个参数注入。然后可以访问 `StepExecution` 实例，即 `ChunkContext.getStepContext().getStepExecution()`。

