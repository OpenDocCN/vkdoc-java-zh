    路由器


    *路由器*是一个 SI 组件，它可以分流你的消息流。换句话说，它代表了 SI 中的一个决策组件。它应用路由逻辑，并决定消息应进一步传递到哪个通道或哪些通道。请注意，将同一消息实例传递到不同通道是可行的，因为消息是不可变的。路由逻辑可以通过多种方式定义，基于以下条件：

    '
- fmt: "- Generic routing\n    - *Custom Java logic*: A Spring bean is used to route\
    \ a message into a target channel or various channels. Can be configured via the\
    \ XML element `<int:router>` or via the SI annotation `@Router`. This Java logic\
    \ needs to return one of the types `MessageChannel`, `List<MessageChannel>`, `String`,\
    \ `Listing<String>`, which specifies the channel instance(s) or channel name(s)\
    \ to send messages to.\n    - *Payload type*: Can be configured via `<int:payload-type-router>`.\n\
    \    - *Header value*: Can be configured via `<int:header-value-router>`.\n  \
    \  - *Exception type*: Can handle routing of messages, which have `Throwable`\
    \ as a payload type. It is, in fact, a special type of payload type handler. Can\
    \ be configured via `<int:exception-type-router>`.\n    - *Recipient list router*:\
    \ Special type of router that sends messages to a static list of channels. It\
    \ can be configured via `<int:recipient-list-router>`.\n    - *SpEL expression*:\
    \ Inline SpEL expression can be configured via an expression attribute of the\
    \ `<int:router>` XML element.\n- Technology-specific routing\n    - *XPath expression*:\
    \ Can be configured via `<int-xml:xpath-router>`.\n\nA router is a passive middle\
    \ component and thus can participate in unidirectional or bidirectional flows.\n\
    \n## Generic Router Example Based on XML Configuration\n\n[Listing 8-67](#9781484207949_Ch08_1.xhtml#FPar70)\
    \ shows a `WriterService` implementation for the router example.\n\n[***Listing\
    \ 8-67***](#9781484207949_Ch08_1.xhtml#_FPar70). Output Service of Generic XML\
    \ Router Example (0818-router-xml-generic)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
    import lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.out.WriteRepository;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
