    Spring Batch


    到目前为止，我们的重点一直放在企业技术上，这些技术处理来自上游应用程序的请求或消息。这种抽象对于处理少量数据的实时处理至关重要，这些数据通常代表针对我们企业系统的一个操作。但现实世界中的企业还需要执行后台任务，在这些任务中，通常需要定期将大量数据从一个系统处理、迁移、复制或转换到另一个系统。


    这种处理通常被称为*批处理*，因为处理的数据量很大，通常无法放入内存或单个事务中。这些数据需要被分割成可管理的块进行处理。这种处理通常定期执行（例如，每天、每周或每月），并且可能运行时间较长。批处理通常不涉及用户交互。


    批处理的用例包括以下内容：


    *   发送订阅邮件

    *   发送月度发票

    *   同步数据仓库

    *   执行业务报告

    *   处理订单

    '
- fmt: "第一章介绍了可用于调度后台任务的调度支持。但在实际应用中，这并不方便，因为后台处理中可能出现许多问题。基于固定速率、固定延迟或CRON表达式的低级调度支持，不足以在没有大量自定义代码的情况下处理错误处理、重启、将工作分发给其他机器、数据分块处理或控制批处理流程。\n\
    \n幸运的是，Spring 组合中包含 *Spring Batch*（SB）项目，它填补了企业级批处理需求的高级抽象空白。在 Java 企业版 7（JEE\
    \ 7）引入之前，SB 是 Java 平台内一个独特的项目。这次 Java 企业标准的主要修订引入了批处理 API，这些 API 深受 Spring Batch\
    \ 结构的影响。Michael Minella（SB 项目负责人）深度参与了定义 JSR-352 的专家组，该规范涵盖了 Java 平台的批处理（`https://jcp.org/en/jsr/detail?id=352`）。SB\
    \ 也仍然是该 Java 标准的旗舰实现项目。\n\n## Spring Batch 领域\n\nSB 项目的理念力求实现 Spring 家族的总体目标，即最小化必要的样板代码，使开发者能够专注于业务逻辑。因此，它引入了批处理领域特有的各种抽象，如图\
    \ 9-1 所示。\n\n![9781484207949_Fig09-01.jpg](images/9781484207949_Fig09-01.jpg)\n\
    \n[图 9-1](#9781484207949_Ch09_1.xhtml#_Fig1). Spring Batch 领域\n\n第一个也是主要的抽象是`Job`。它代表一个需要处理的工作单元。`Job`由一个或多个步骤（`Step`）构成。`Step`代表由`Job`执行的这部分工作处理。每次执行`Job`时，SB\
    \ 框架都会创建一个新的`JobInstance`，因此一个`Job`可以有一个或多个`JobInstance`。\n\n一个作业实例可以执行多次（例如，当`JobInstance`需要重启时），因此它可以有多个`JobExecution`。由于每个`Job`至少需要一个`Step`，因此它也需要为每个`JobExecution`创建一个`StepExecution`。一个`StepExecution`可以在一个`JobExecution`内执行多次（例如，当我们想要重启或重试`Step`时），因此它们之间存在一对多的关系。\n\
    \n开发者需要为批处理定义`Job`和`Step`。所有其他对象都由 SB 框架创建。当`Job`被触发时，SB 负责执行，并根据`Job`和`Step`的定义处理执行过程中可能发生的错误。这样，开发者可以将工作细分为多个`Step`，在逻辑上将批处理拆分成更小的部分，并将协调执行的繁重工作留给\
    \ SB。我们将在本章后面深入探讨这些定义。\n\n## 面向块的处理\n\nSB 框架最常见的用例是分块处理大量数据。这被称为*面向块的处理*，它发生在一个`Step`中。`Step`由一个必需的`ItemReader<T>`、一个可选的`ItemProcessor<T,\
    \ S>`和一个必需的`ItemWriter<S>`组成。这些`Step`的组成部分是 Java 接口，可以通过我们的自定义逻辑来实现。请注意，在以下文本中，当讨论这些接口时，我们不使用泛型类型。\n\
    \nSB 还提供了一些开箱即用的常用实现，用于从/向以下数据源进行读取/写入：\n\n*   JDBC/Hibernate/存储过程\n    *   基于游标的`ItemReader`——游标是一种数据库结构，其中行从数据库流式传输\n\
    \    *   基于分页的`ItemReader`——为每个数据块（页）使用一个不同的`where`子句\n    *   `ItemWriter`\n\
    *   平面文件\n*   XML\n*   JMS\n\n[图 9-2](#9781484207949_Ch09_1.xhtml#Fig2) 展示了此机制的序列图。\n\
    \n![9781484207949_Fig09-02.jpg](images/9781484207949_Fig09-02.jpg)\n\n[图 9-2](#9781484207949_Ch09_1.xhtml#_Fig2).\
    \ 面向块的处理序列图\n\n当`Step`被执行时，SB 启动块处理的循环。`Step`定义必须定义一个块大小；一个块由多次`ItemReader`和`ItemProcessor`调用组成，以一次读取和处理一个项目，直到达到块大小。当块被读取和处理后，`Step`调用`ItemWriter`来写入整个块，然后继续处理下一个块。当`ItemReader`返回`null`时，循环结束，这意味着没有更多数据需要处理，并且这个部分块是当前`StepExecution`中的最后一个块。\n\
    \n## 面向块的处理示例的公共类\n\n在深入探讨面向块的示例之前，我们将介绍本章示例中共享的几个类。与上一章一样，我们不会在实际示例中突出 SB 的特性，因为\
    \ SB 也是一个高度可配置的框架。示例的简洁性将更好地说明 SB 的特性。[清单 9-1](#9781484207949_Ch09_1.xhtml#FPar1)\
    \ 展示了一个用于读取`String`类型记录的简单仓库。\n\n[***清单 9-1***](#9781484207949_Ch09_1.xhtml#_FPar1).\
    \ 用于面向块的处理示例的读取仓库（0900-batch-common）\n\n```\npackage net.lkrnac.book.eiws.chapter09.read;\n\
    import java.util.Iterator;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\
    import java.util.stream.IntStream;\nimport org.springframework.stereotype.Repository;\n\
    \n@Repository\npublic class ReadRepository {\n  private static final Iterator<String>\
    \ ITERATOR = generateRecords(15).iterator();\n\npublic synchronized String readNext()\
    \ {\n    return (ITERATOR.hasNext()) ? ITERATOR.next() : null;\n  }\n\nprivate\
    \ static List<String> generateRecords(int count) {\n    return IntStream.range(0,\
    \ count)\n        .mapToObj(idx -> \"simple record \" + idx)\n        .collect(Collectors.toList());\n\
    \  }\n}\n```\n\n这个 Spring Bean 使用了`@Repository`注解。当这个 Bean 被 Spring 初始化时，它使用 Java\
    \ 8 Stream API 生成简单的记录。`IntStream.range`方法生成一个包含 15 个整数的流，这些整数被转换为`String`记录并收集到`List`中。当生成这些记录集合后，我们将其迭代器存储到常量`ITERATOR`中，该常量用于通过`readNext`方法读取记录。此方法是同步的，因为读取可能发生在多个线程中。这在某些示例中很方便。[清单\
    \ 9-2](#9781484207949_Ch09_1.xhtml#FPar2) 展示了自定义的`ItemReader`。\n\n[***清单 9-2***](#9781484207949_Ch09_1.xhtml#_FPar2).\
    \ 用于面向块的处理示例的自定义 ItemReader（0900-batch-common）\n\n```\npackage net.lkrnac.book.eiws.chapter09.read;\n\
    import org.springframework.batch.item.ItemReader;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleRecordReader\
    \ implements ItemReader<String> {\n  private ReadRepository readRepository;\n\n\
    @Autowired\n  public SimpleRecordReader(ReadRepository readRepository) {\n   \
    \ super();\n    this.readRepository = readRepository;\n  }\n\n@Override\n  public\
    \ String read() {\n    return readRepository.readNext();\n  }\n}\n```\n\n这个`ItemReader`实现也是一个\
    \ Spring Bean，它注入了`ReadRepository` Bean 以从中读取数据。泛型`String`定义了我们正在读取的项的类型。需要实现`read`方法来读取一个待处理的项目。[清单\
    \ 9-3](#9781484207949_Ch09_1.xhtml#FPar3) 展示了面向块示例中使用的自定义`ItemProcessor`。\n\n\
    [***清单 9-3***](#9781484207949_Ch09_1.xhtml#_FPar3). 用于面向块的处理示例的自定义 ItemProcessor（0900-batch-common）\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09.process;\nimport org.springframework.batch.item.ItemProcessor;\n\
    import org.springframework.stereotype.Component;\n```"
  raw: "The first chapter covered scheduling support, which can be used for scheduling\
    \ background tasks. But it isn’t handy in real life, because a lot of problems\
    \ can occur in background processing. Low-level scheduling support based on a\
    \ fixed rate, fixed delay, or CRON expressions simply isn’t advanced enough to\
    \ cover handling errors, restarting, distributing work to other machines, chunking\
    \ of data processing, or controlling the flow of batch actions without a lot of\
    \ custom code.\n\nFortunately, the Spring portfolio contains the *Spring Batch*\
    \ (SB) project, which fills the gap of advanced abstractions for enterprise batch-processing\
    \ needs. SB was a unique project within the Java platform until Java Enterprise\
    \ Edition version 7 (JEE 7) was introduced. This major revision of Java Enterprise\
    \ standards introduced APIs for batch processing that were significantly influenced\
    \ by Spring Batch constructs. Michael Minella (SB project lead) was heavily involved\
    \ in the expert group defining JSR-352, which covers batch processing for the\
    \ Java platform (`https://jcp.org/en/jsr/detail?id=352`). SB also remains the\
    \ flagship implementation project of this Java standard.\n\nSpring Batch Domain\n\
    \nThe SB project philosophy tries to achieve the Spring family’s overall goal\
    \ of minimizing necessary boilerplate code, so that developers can concentrate\
    \ on business logic. Therefore, it introduces various abstractions that are unique\
    \ to the batch-processing domain, shown in [Figure 9-1](#9781484207949_Ch09_1.xhtml#Fig1).\n\
    \n![9781484207949_Fig09-01.jpg](images/9781484207949_Fig09-01.jpg)\n\n[Figure\
    \ 9-1](#9781484207949_Ch09_1.xhtml#_Fig1). Spring Batch domain\n\nThe first and\
    \ major abstraction is `Job`. It represents a unit of work that needs to be processed.\
    \ `Job` is constructed of one or more steps. `Step` represents this partial processing\
    \ of work performed by `Job`. Every time the `Job` is executed, the SB framework\
    \ creates a new `JobInstance`, so one `Job` can have one or more `JobInstance`s.\n\
    \nOne job instance can be executed various times (for example, when `JobInstance`\
    \ needs to be restarted), so it can have various `JobExecution`s. Because each\
    \ `Job` needs to have at least one `Step`, it also needs to create a `StepExecution`\
    \ for each `JobExecution`. One `StepExecution` can be executed various times within\
    \ one `JobExecution` (for example, when we want to restart or retry `Step`), so\
    \ there is a one-to-many relationship between them.\n\nDevelopers need to define\
    \ `Job` and `Step`s for batch processing. All the other objects are created by\
    \ the SB framework. SB takes care of execution when `Job` is triggered and handles\
    \ errors that can occur during execution according to the `Job` and `Step` definitions.\
    \ This way, the developer can granulate work into various `Step`s and logically\
    \ separate batch processing into smaller pieces and leave the hard work of coordinating\
    \ execution for SB. We will dive into these definitions later in this chapter.\n\
    \nChunk-Oriented Processing\n\nThe most common use case for the SB framework is\
    \ processing large amounts of data in chunks. This is called *chunk-oriented processing*,\
    \ and it happens in one `Step`. `Step` is composed of one mandatory `ItemReader<T>`,\
    \ one optional `ItemProcessor<T, S>`, and one mandatory `ItemWriter<S>`. These\
    \ `Step` parts are Java interfaces, which can be implemented by our custom logic.\
    \ Notice that in the following text, we don’t use generic types when these interfaces\
    \ are discussed.\n\nSB also provides some commonly used implementations out of\
    \ the box for reading/writing from/to the following:\n\n*   JDBC/Hibernate/stored\
    \ procedure\n    *   Cursor-based item readers—the cursor is a DB construct in\
    \ which rows are streamed from a database\n    *   Paging-based item readers—uses\
    \ a distinct `where` clause for each chunk of data (page)\n    *   Item writers\n\
    *   Flat files\n*   XML\n*   JMS\n\n[Figure 9-2](#9781484207949_Ch09_1.xhtml#Fig2)\
    \ shows a sequence diagram of this mechanism.\n\n![9781484207949_Fig09-02.jpg](images/9781484207949_Fig09-02.jpg)\n\
    \n[Figure 9-2](#9781484207949_Ch09_1.xhtml#_Fig2). Chunk-oriented processing sequence\
    \ diagram\n\nWhen `Step` is executed, SB starts the loop of chunk processing.\
    \ The `Step` definition has to have a chunk size defined; one chunk consists of\
    \ various `ItemReader` and `ItemProcessor` calls to read and process one item\
    \ at a time until the chunk size is reached. When the chunk is read and processed,\
    \ `Step` calls `ItemWriter` to write the whole chunk and then continues with the\
    \ next chunk. The looping ends when `ItemReader` returns `null`, which means that\
    \ there’s no more data to process and this partial chunk is the last one in the\
    \ current `StepExecution`.\n\nCommon Classes for Chunk-Oriented Processing Examples\n\
    \nBefore we dive into chunk-oriented examples, we’ll introduce a few classes that\
    \ are shared across those examples in this chapter. As in the previous chapter,\
    \ we won’t highlight SB features in real-life examples, because SB is also a highly\
    \ configurable framework. The simplicity of the examples will better illustrate\
    \ SB features. [Listing 9-1](#9781484207949_Ch09_1.xhtml#FPar1) shows a simple\
    \ repository for reading records of the `String` type.\n\n[***Listing 9-1***](#9781484207949_Ch09_1.xhtml#_FPar1).\
    \ Read Repository Used to Read Records for Chunk-Oriented Processing Examples\
    \ (0900-batch-common)\n\n```\npackage net.lkrnac.book.eiws.chapter09.read;\nimport\
    \ java.util.Iterator;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\
    import java.util.stream.IntStream;\nimport org.springframework.stereotype.Repository;\n\
    \n@Repository\npublic class ReadRepository {\n  private static final Iterator<String>\
    \ ITERATOR = generateRecords(15).iterator();\n\npublic synchronized String readNext()\
    \ {\n    return (ITERATOR.hasNext()) ? ITERATOR.next() : null;\n  }\n\nprivate\
    \ static List<String> generateRecords(int count) {\n    return IntStream.range(0,\
    \ count)\n        .mapToObj(idx -> \"simple record \" + idx)\n        .collect(Collectors.toList());\n\
      }\n}\n```\n\nThis Spring bean is annotated with `@Repository`. When this bean\
    \ is initiated by Spring, it generates simple records by using the Java 8 Stream\
    \ API. The `IntStream.range` method generates a stream of 15 integers, which are\
    \ converted into `String` records and collected into `List`. When this collection\
    \ of records is generated, we store its iterator into the constant `ITERATOR`,\
    \ which is used for reading records via the `readNext` method. This method is\
    \ synchronized, because reading can occur in various threads. This is handy in\
    \ some examples. [Listing 9-2](#9781484207949_Ch09_1.xhtml#FPar2) shows the custom\
    \ `ItemReader`.\n\n[***Listing 9-2***](#9781484207949_Ch09_1.xhtml#_FPar2). Custom\
    \ ItemReader for Chunk-Oriented Processing Examples (0900-batch-common)\n\n```\n\
    package net.lkrnac.book.eiws.chapter09.read;\nimport org.springframework.batch.item.ItemReader;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\npublic class SimpleRecordReader implements ItemReader<String> {\n\
      private ReadRepository readRepository;\n\n@Autowired\n  public SimpleRecordReader(ReadRepository\
    \ readRepository) {\n    super();\n    this.readRepository = readRepository;\n\
      }\n\n@Override\n  public String read() {\n    return readRepository.readNext();\n\
      }\n}\n```\n\nThis `ItemReader` implementation is also a Spring bean, which injects\
    \ the `ReadRepository` bean to read from. The generic `String` defines the type\
    \ of item we are reading. The `read` method needs to be implemented to read one\
    \ item for processing. [Listing 9-3](#9781484207949_Ch09_1.xhtml#FPar3) shows\
    \ the custom `ItemProcessor` used in chunk-oriented examples.\n\n[***Listing 9-3***](#9781484207949_Ch09_1.xhtml#_FPar3).\
    \ Custom ItemProcessor for Chunk-Oriented Processing Examples (0900-batch-common)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09.process;\nimport org.springframework.batch.item.ItemProcessor;\n\
    import org.springframework.stereotype.Component;"
  trans: "\n第一章介绍了调度支持，可用于调度后台任务。但在实际应用中它并不方便，因为后台处理过程中可能出现许多问题。基于固定速率、固定延迟或 CRON\
    \ 表达式的低级调度支持，其能力不足以涵盖错误处理、重启、将工作分发到其他机器、数据分块处理，或是在没有大量自定义代码的情况下控制批处理操作的流程。\n\n\
    幸运的是，Spring 系列包含 *Spring Batch* (SB) 项目，它填补了企业级批处理需求的高级抽象空白。在 Java 企业版 7 (JEE\
    \ 7) 引入之前，SB 一直是 Java 平台内一个独特的项目。这次 Java 企业标准的主要修订引入了用于批处理的 API，这些 API 深受 Spring\
    \ Batch 结构的影响。Michael Minella（SB 项目负责人）深度参与了定义 JSR-352 的专家组，该规范涵盖了 Java 平台的批处理（`https://jcp.org/en/jsr/detail?id=352`）。SB\
    \ 也仍然是该 Java 标准的旗舰实现项目。\n\nSpring Batch 领域\n\nSB 项目的理念力求实现 Spring 家族的总体目标，即最小化必要的样板代码，使开发者能够专注于业务逻辑。因此，它引入了批处理领域特有的各种抽象，如图\
    \ 9-1 所示。\n\n![9781484207949_Fig09-01.jpg](img/9781484207949_Fig09-01.jpg)\n\n\
    图 9-1. Spring Batch 领域\n\n第一个也是主要的抽象是 `Job`。它代表一个需要处理的工作单元。`Job` 由一个或多个步骤（`Step`）构成。`Step`\
    \ 代表由 `Job` 执行的这部分工作处理。每次执行 `Job` 时，SB 框架都会创建一个新的 `JobInstance`，因此一个 `Job` 可以有一个或多个\
    \ `JobInstance`。\n\n一个作业实例可以被执行多次（例如，当 `JobInstance` 需要重启时），因此它可以有多个 `JobExecution`。由于每个\
    \ `Job` 至少需要一个 `Step`，因此它也需要为每个 `JobExecution` 创建一个 `StepExecution`。一个 `StepExecution`\
    \ 可以在一个 `JobExecution` 内执行多次（例如，当我们想要重启或重试 `Step` 时），因此它们之间存在一对多的关系。\n\n开发者需要为批处理定义\
    \ `Job` 和 `Step`。所有其他对象都由 SB 框架创建。当 `Job` 被触发时，SB 负责执行，并根据 `Job` 和 `Step` 的定义处理执行过程中可能发生的错误。这样，开发者可以将工作细分为多个\
    \ `Step`，在逻辑上将批处理拆分成更小的部分，并将协调执行的繁重工作留给 SB。我们将在本章后面深入探讨这些定义。\n\n面向块的处理\n\nSB 框架最常见的用例是分块处理大量数据。这被称为*面向块的处理*，它发生在一个\
    \ `Step` 中。`Step` 由一个必需的 `ItemReader<T>`、一个可选的 `ItemProcessor<T, S>` 和一个必需的 `ItemWriter<S>`\
    \ 组成。这些 `Step` 的组成部分是 Java 接口，可以通过我们的自定义逻辑来实现。请注意，在接下来的文本中，当讨论这些接口时，我们不使用泛型类型。\n\
    \nSB 还提供了一些开箱即用的常用实现，用于从/向以下数据源进行读写：\n\n*   JDBC/Hibernate/存储过程\n    *   基于游标的\
    \ ItemReader——游标是一种数据库结构，用于从数据库流式传输行\n    *   基于分页的 ItemReader——为每个数据块（页）使用一个不同的\
    \ `where` 子句\n    *   ItemWriter\n*   平面文件\n*   XML\n*   JMS\n\n图 9-2 展示了此机制的序列图。\n\
    \n![9781484207949_Fig09-02.jpg](img/9781484207949_Fig09-02.jpg)\n\n图 9-2. 面向块的处理序列图\n\
    \n当 `Step` 执行时，SB 启动块处理的循环。`Step` 定义必须指定一个块大小；一个块包含多次 `ItemReader` 和 `ItemProcessor`\
    \ 调用，以一次读取和处理一个项目，直到达到块大小。当块被读取和处理完毕后，`Step` 调用 `ItemWriter` 写入整个块，然后继续处理下一个块。当\
    \ `ItemReader` 返回 `null` 时，循环结束，这意味着没有更多数据需要处理，并且这个不完整的块是当前 `StepExecution` 中的最后一个块。\n\
    \n面向块的处理示例的公共类\n\n在深入探讨面向块的示例之前，我们将介绍本章这些示例中共享的几个类。与上一章一样，我们不会在实际示例中突出 SB 的特性，因为\
    \ SB 也是一个高度可配置的框架。示例的简洁性将更好地说明 SB 的特性。代码清单 9-1 展示了一个用于读取 `String` 类型记录的简单仓库。\n\
    \n***代码清单 9-1***. 用于读取面向块的处理示例记录的仓库 (0900-batch-common)\n\n```\npackage net.lkrnac.book.eiws.chapter09.read;\n\
    import java.util.Iterator;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\
    import java.util.stream.IntStream;\nimport org.springframework.stereotype.Repository;\n\
    \n@Repository\npublic class ReadRepository {\n  private static final Iterator<String>\
    \ ITERATOR = generateRecords(15).iterator();\n\npublic synchronized String readNext()\
    \ {\n    return (ITERATOR.hasNext()) ? ITERATOR.next() : null;\n  }\n\nprivate\
    \ static List<String> generateRecords(int count) {\n    return IntStream.range(0,\
    \ count)\n        .mapToObj(idx -> \"simple record \" + idx)\n        .collect(Collectors.toList());\n\
      }\n}\n```\n\n这个 Spring Bean 使用了 `@Repository` 注解。当 Spring 初始化这个 Bean 时，它会使用\
    \ Java 8 Stream API 生成简单的记录。`IntStream.range` 方法生成一个包含 15 个整数的流，这些整数被转换为 `String`\
    \ 记录并收集到 `List` 中。当生成这组记录后，我们将其迭代器存储到常量 `ITERATOR` 中，用于通过 `readNext` 方法读取记录。此方法是同步的，因为读取可能发生在多个线程中。这在某些示例中很方便。代码清单\
    \ 9-2 展示了自定义的 `ItemReader`。\n\n***代码清单 9-2***. 用于面向块的处理示例的自定义 ItemReader (0900-batch-common)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09.read;\nimport org.springframework.batch.item.ItemReader;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\npublic class SimpleRecordReader implements ItemReader<String> {\n\
      private ReadRepository readRepository;\n\n@Autowired\n  public SimpleRecordReader(ReadRepository\
    \ readRepository) {\n    super();\n    this.readRepository = readRepository;\n\
      }\n\n@Override\n  public String read() {\n    return readRepository.readNext();\n\
      }\n}\n```\n\n这个 `ItemReader` 实现也是一个 Spring Bean，它注入了 `ReadRepository` Bean 以从中读取数据。泛型\
    \ `String` 定义了我们正在读取的项的类型。需要实现 `read` 方法来读取一个待处理的项目。代码清单 9-3 展示了面向块示例中使用的自定义 `ItemProcessor`。\n\
    \n***代码清单 9-3***. 用于面向块的处理示例的自定义 ItemProcessor (0900-batch-common)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter09.process;\nimport org.springframework.batch.item.ItemProcessor;\n\
    import org.springframework.stereotype.Component;\n```"
- fmt: "```java\n@Component\npublic class SimpleRecordProcessor implements ItemProcessor<String,\
    \ String> {\n  @Override\n  public String process(String item) throws Exception\
    \ {\n    return item + \" processed\";\n  }\n}\n```\n\nThis is also a Spring bean,\
    \ which appends the string `processed` to the processing record. In the real world,\
    \ this would be the place where we convert items from read format/POJO into write\
    \ format/POJO. Generic types of the `ItemProcessor` interface define the type\
    \ of item before and after processing. In this simplistic example, both are of\
    \ type `String`. [Listing 9-4](#9781484207949_Ch09_1.xhtml#FPar4) shows the simple\
    \ write repository.\n\n[**Listing 9-4**](#9781484207949_Ch09_1.xhtml#_FPar4).\
    \ Write Repository Used to Read Records for Chunk-Oriented Processing Examples\
    \ (0900-batch-common)\n\n```java\npackage net.lkrnac.book.eiws.chapter09.write;\n\
    import java.util.List;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Repository;\n\
    \n@Slf4j\n@Repository\npublic class WriteRepository {\n  public void writeRecords(List<?\
    \ extends String> records) {\n    records.stream()\n        .map(record -> \"\
    Writing record: \" + record)\n        .forEach(log::info);\n  }\n}\n```\n\nThis\
    \ Spring bean logs a given collection of records and pretends some type of processing.\
    \ For logging, we use the Lombok annotation `@Slf4j`. For looping through records,\
    \ we again use the Java 8 Stream API. [Listing 9-5](#9781484207949_Ch09_1.xhtml#FPar5)\
    \ shows the custom `ItemWriter`.\n\n[**Listing 9-5**](#9781484207949_Ch09_1.xhtml#_FPar5).\
    \ Custom ItemWriter for Chunk-Oriented Processing Examples (0900-batch-common)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter09.write;\nimport java.util.List;\n\
    import org.springframework.batch.item.ItemWriter;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleRecordWriter\
    \ implements ItemWriter<String> {\n  private WriteRepository writeRepository;\n\
    \n@Autowired\n  public SimpleRecordWriter(WriteRepository writeRepository) {\n\
    \    super();\n    this.writeRepository = writeRepository;\n  }\n\n@Override\n\
    \  public void write(List<? extends String> items) throws Exception {\n    writeRepository.writeRecords(items);\n\
    \  }\n}\n```\n\nThis Spring bean implements the `ItemWriter` interface; the item\
    \ type is `String`. `WriteRepository` is injected, so we can write records via\
    \ the `write()` method.\n\n![Image](images/sq.jpg) **Note** You might ask why\
    \ we have `ReadRepository` and `WriteRepository` in place at all when we want\
    \ to keep the example as simple as possible. The reason is testability. I want\
    \ to make sure that the examples are working as described, so the SB configuration\
    \ is covered by simple integrations tests. `ReadRepository` and `WriteRepository`\
    \ are often faked in these tests and used for verification. But this testing is\
    \ beyond the scope of this book. Tests alongside the book examples can be found\
    \ in the GitHub repository (`https://github.com/lkrnac/book-eiws-code-samples`).\n\
    \n## Chunk-Oriented Processing Example with XML Configuration\n\nThe chunk-oriented\
    \ processing examples use Spring Boot, but you’ll see that configuring SB applications\
    \ with the plain Spring Framework is similar. Our first SB example, shown in [Listing\
    \ 9-6](#9781484207949_Ch09_1.xhtml#FPar7), uses XML configuration.\n\n[**Listing\
    \ 9-6**](#9781484207949_Ch09_1.xhtml#_FPar7). XML Configuration of Chunk-Oriented\
    \ Processing Example (File batch-config.xml in Folder src/main/resources of Example\
    \ Project 0901-chunk-processing-generic-xml)\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
    \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
    \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n<job id=\"simpleRecordsJob\">\n    <step id=\"simpleRecordsStep\">\n    \
    \  <tasklet>\n        <chunk reader=\"simpleRecordReader\" writer=\"simpleRecordWriter\"\
    \n          processor=\"simpleRecordProcessor\" commit-interval=\"4\" />\n   \
    \   </tasklet>\n    </step>\n  </job>\n</beans:beans>\n```\n\nWe don’t use the\
    \ `beans` namespace by default, because using the `batch` namespace (we don’t\
    \ need to use the `<batch:` prefix for batch XML tags) makes the SB configurations\
    \ much more readable. We use this approach for SB configurations in this chapter.\n\
    \nThe configuration itself contains the definition of one `Job` with one `Step`,\
    \ which uses our common reader, processor, and writer. The `<job>` and `<step>`\
    \ XML tags create Spring beans with names defined by the `id` attribute. The last\
    \ attribute in the `Step` definition is `commit-interval`, which specifies the\
    \ chunk size for this step. [Listing 9-7](#9781484207949_Ch09_1.xhtml#FPar8) shows\
