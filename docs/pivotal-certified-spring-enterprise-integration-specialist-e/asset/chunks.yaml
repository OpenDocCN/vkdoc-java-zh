    ## 使用MessageCreator回调


    有时我们可能需要基于JMS `Session`对象构造消息。在这种情况下，我们需要将`JmsTemplate`与`MessageCreator`接口结合使用来发送消息。该接口的签名如[清单5-25](#9781484207949_Ch05.xhtml#FPar28)所示。


    [***清单5-25***](#9781484207949_Ch05.xhtml#_FPar28). MessageCreator接口的签名


    ```

    package org.springframework.jms.core;


    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Session;


    public interface MessageCreator {

      Message createMessage(Session session) throws JMSException;

    }

    ```


    这个回调接口要求我们实现`createMessage`方法，并提供基于`javax.jms.Session`对象创建`javax.jms.Message`的自定义逻辑。然后，在发送消息时，将这种自定义消息构造逻辑传递给`JmsTemplate.send`和`JmsTemplate.sendAndReceive`方法。


    这种机制允许Spring管理会话实例（例如，用于缓存），同时为应用程序开发人员提供底层JMS API的完全灵活性。此用法的示例见[清单5-26](#9781484207949_Ch05.xhtml#FPar29)。


    [***清单5-26***](#9781484207949_Ch05.xhtml#_FPar29). MessageCreator用法 (0512-jms-message-creator)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Session;


    import lombok.extern.slf4j.Slf4j;

    ```'
  raw: 'The `SimpleMessageSender` class is a Spring bean, which is defined by the
    `@Component` annotation. `@Slf4j` is Lombok’s convenient shortcut for creating
    the SLF4J logger constant. We inject in this Spring bean the `jmsTemplate` instance
    via constructor injection.


    With the `send` method, we will be sending a simple JMS message every second.
    Recurring execution of the `send` method is ensured by the `@Scheduled` annotation.
    In the method body, we first log the message and call the `jmsTemplate.convertAndSend`
    method. Conversion is needed from `Spring` into the `Message` instance, which
    is done by `SimpleMessageConverter`.


