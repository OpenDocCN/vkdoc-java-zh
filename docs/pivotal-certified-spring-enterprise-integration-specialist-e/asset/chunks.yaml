    \ into TEXT_TABLE values (?)\", text);\n  }\n}\n```\n\n该类与第 6 章中的 DAO 类似。唯一的区别是缺少查询已存储文本条目数量的功能。`@Repository`\
    \ 注解将该类标记为位于持久化层的 Spring Bean。为了执行 JDBC 查询，它通过构造函数注入了 `JdbcTemplate` 实例。\n\n`initDbTable()`\
    \ 方法在 Spring 上下文初始化后创建一个新表。`@PostConstruct` 注解确保该方法在此阶段执行。这种构造对于关系型数据库来说显然不典型，但在本例中，我们使用的是内存数据库，并且希望在每个应用程序运行时，该数据库对于示例来说是空的。\n\
    \n`persistText()` 方法用于将给定的文本插入到内存数据库中。清单 7-2 展示了用于处理文本消息的服务层类。\n\n***清单 7-2***.\
    \ 用于 JTA 示例的服务类 (0700-jta-common)\n\n```java\npackage net.lkrnac.book.eiws.chapter07;\n\
    \nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Service;\n\n@Slf4j\n@Service\npublic class\
    \ SimpleService {\n  private final SimpleRepository simpleRepository;\n\n  @Autowired\n\
    \  public SimpleService(SimpleRepository simpleRepository) {\n    super();\n \
    \   this.simpleRepository = simpleRepository;\n  }\n\n  public void processText(String\
    \ text) {\n    log.info(\"Process Message: {}\", text);\n    simpleRepository.persistText(text);\n\
    \  }\n}\n```\n\n同样，该服务与前一章中的服务类似。唯一的区别是缺少用于读取已存储文本记录数量的方法。`@Service` 注解将此 Spring\
    \ Bean 置于服务层。`@Slf4j` 注解是 Lombok 的一个特性，用于方便地访问 SLF4J 日志记录器。通过构造函数注入 `SimpleRepository`\
    \ 实例，可以启用 DAO Bean 实例的使用。\n\n请注意，我们没有为这些类中的任何一个使用 `@Transactional` 注解，因为我们计划将\
    \ JMS 数据源也包含在全局事务边界内。因此，JMS 数据源将在使用 `SimpleService` 的组件中使用。\n\n在示例中，`processText()`\
    \ 方法用于处理文本消息，通过记录给定的消息并使用 `simpleRepository` Bean 进行持久化。JTA 示例中共享的最后一个类如清单 7-3\
    \ 所示。\n\n***清单 7-3***. JTA 示例使用的 JMS 消息发送器 (0700-jta-common)\n\n```java\npackage\
    \ net.lkrnac.book.eiws.chapter07;\nimport javax.jms.ConnectionFactory;\nimport\
    \ lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.jms.core.JmsTemplate;\n\
    import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
    \n@Slf4j\n@Component\npublic class SimpleMessageSender {\n  private static final\
    \ String SIMPLE_MESSAGE = \"simple message\";\n  private final JmsTemplate jmsTemplate;\n\
    \n  @Autowired\n  public SimpleMessageSender(\n      @Qualifier(\"nonXaJmsConnectionFactory\"\
    ) ConnectionFactory nonXaConnectionFactory) {\n    super();\n    jmsTemplate =\
    \ new JmsTemplate(nonXaConnectionFactory);\n  }\n\n  @Scheduled(initialDelay =\
    \ 1000, fixedRate = Long.MAX_VALUE)\n  public void send() {\n    log.info(\"Sending\
    \ message: {}\", SIMPLE_MESSAGE);\n    jmsTemplate.convertAndSend(\"ExpiryQueue\"\
    , SIMPLE_MESSAGE);\n  }\n}\n```\n\n你可能注意到，这个发送器与前一章中的类似，但有一些不同之处。首先，我们没有使用 `@PostConstruct`\
    \ 注解来触发消息的发送。这是因为在创建这个 `SimpleMessageSender` Bean 之后，JTA 配置有时启动得不够快，因此在此示例中，发送消息必须等待配置完成。在实际应用中，这种发送将由使用我们应用程序的外部系统触发。因此，对于这个示例，我们可以依赖带有\
    \ `initialDelay` 的调度，它会在上下文创建后延迟发送示例消息。调度属性 `fixedRate` 被配置为 `Long.MAX_VALUE`，以确保在\
    \ JTA 示例执行期间不会发送第二条消息。\n\n与前一章示例的第二个区别是，注入了 `nonXaConnectionFactory` 而不是 `jmsTemplate`\
    \ Bean。这是因为我们希望消息发送器独立于 JTA 事务。因此，在接下来的示例中，我们将与符合 XA 标准的 JMS `connectionFactory`\
    \ 一起，创建一个 `nonXaConnectionFactory` Bean，它绕过了 JTA 的流程。请记住，在实际应用中，这个发送器不会放在我们的消息消费应用程序中。\n\
    \n其他构造应该很熟悉。通过构造函数注入 `JmsTemplate` 可以启用用于发送消息的 Spring Bean。`send()` 方法本身首先记录消息正在发送的事实，然后执行此操作。\n\
    \n### 使用 XML 配置的 Spring JTA 示例\n\n我们与 Spring 集成的第一个 JTA 示例主要基于 XML 配置。无需为其引入新的\
    \ XML 命名空间，因为我们在非 JEE 环境中操作。如果我们的应用程序部署到 JEE 容器中，我们会使用 `jee` 命名空间。首先，我们需要将 Atomikos\
    \ 配置为 Spring 应用程序的 JTA 事务管理器。清单 7-4 展示了此 XML 配置。\n\n***清单 7-4***. JTA 相关 Bean\
    \ 的 XML 配置（文件 spring-jta-config.xml 位于示例项目 0701-jta-xml-config 的 src/main/resources\
    \ 文件夹中）\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"\
    http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n  xmlns:tx=\"http://www.springframework.org/schema/tx\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/tx\n    http://www.springframework.org/schema/tx/spring-tx.xsd\"\
    >\n\n<tx:annotation-driven transaction-manager=\"transactionManager\"/>\n\n<bean\
    \ id=\"userTransactionManager\" class=\"com.atomikos.icatch.jta.UserTransactionManager\"\
    \n      init-method=\"init\" destroy-method=\"close\"/>\n\n<bean id=\"transactionManager\"\
    \n      class=\"org.springframework.transaction.jta.JtaTransactionManager\">\n\
    \    <property name=\"transactionManager\" ref=\"userTransactionManager\"/>\n\
    \    <property name=\"userTransaction\" ref=\"userTransactionManager\"/>\n  </bean>\n\
    </beans>\n```\n"
