    Generic Transformer Example with Java Configuration


    Let’s now dive into the same flow based on Java annotations. [Listing 8-39](#9781484207949_Ch08_1.xhtml#FPar42)
    shows the transformer configuration.


    [***Listing 8-39***](#9781484207949_Ch08_1.xhtml#_FPar42). Generic Transformer
    with Java Configuration (0812-transformer-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.integration.annotation.MessageEndpoint;

    import org.springframework.integration.annotation.Transformer;


    @MessageEndpoint

    public class SimpleMessageTransformer {

      @Transformer(inputChannel = "inChannel", outputChannel = "transformedChannel")

      public String transformMessage(String message) {

        return new String(message + " transformed");

      }

