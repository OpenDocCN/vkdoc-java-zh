    这个标准的 Spring Boot 模式运行一个自动配置的应用程序，该程序会扫描当前包及其子包中的 Bean。运行它将产生与`0803-channel-adapter-generic-xml`示例的清单
    8-14 类似的输出，因为映射到`ReadServiceAnnotated`的入站通道适配器每秒读取一条消息并将其发送给服务激活器。


    消息网关


    *消息网关*是一个被动组件，可以参与单向或双向消息流。因此，它天生就处理请求-响应问题。我们可以将网关分为两类：


    *   *通用消息网关*：将 SI 消息流封装到 Java 接口中，作为消息基础设施的输入。因此，封装该流程的方法必须有一个返回值。我们可以将其视为 Java
    和 SI 流之间的代理。它可以通过 XML 元素`<int:gateway>`进行配置。Java 配置使用两个注解：`@MessagingGateway`将接口标记为网关包装器，`@Gateway`将特定方法映射为
    SI 消息传递的入口。请注意，我们可以在同一个类中使用`@Gateway`注解来注解不同的方法，从而为我们的 SI 流提供不同的入口点。因此，我们需要使用`@IntegrationComponentScan`来扫描带注解的入站网关。

    *   *特定技术消息网关*：可以处理与外部技术或协议（例如，HTTP、JDBC、SOAP Web 服务）的通信。这种类型的网关相对于 SI 流可以是入站或出站的。要使用
    XML 配置特定技术网关，我们需要使用特殊的 XML 命名空间（例如，`<int-file:outbound-gateway>`、`<int-http:inbound-gateway>`、`<int-ws:outbound-gateway>`）。特定技术网关没有任何可用的
    SI 注解，因此只能使用 XML 配置。关于外部技术的消息网关实现的简明表格可在`http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`找到。


    如果我们希望有一个参与双向消息流的入站消息网关，则必须有一种机制可以将回复消息发送回网关。我们可以通过多种方式处理这个问题：


    *   *临时回复通道*：默认情况下，入站消息网关会创建一个临时通道，当下游输出端点回复消息时将使用该通道。此通道是为流经 SI 流的每条消息创建的。

    *   *消息上指定的回复通道*：消息可以定义特殊的`replyChannel`头，当下游输出端点回复消息时将使用该头。

    *   *入站网关上定义的默认回复通道*：如果网关指定了`default-reply-channel`属性（对于特定技术网关是`reply-channel`），则来自下游输出组件的回复消息将被传递到此通道。

    *   *下游输出端点上指定的输出通道*：如果 SI 流的输出端点指定了`output-channel`属性，则此通道将用于发送回复消息。


    基于 XML 配置的通用消息网关示例


    清单 8-27 展示了 SI 流的 XML 配置。


    ***清单 8-27***. 通用消息网关示例的 XML 配置（文件 si-config.xml 位于示例项目 0808-gateway-generic-xml
    的 src/main/resources 文件夹中）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperService" />


    <int:channel id="inChannel" />


    <int:service-activator input-channel="inChannel" ref="writeService"

        method="writeAndIndicateSuccess">

      </int:service-activator>

    </beans>

    ```

