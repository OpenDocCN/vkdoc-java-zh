- fmt: "With SB, we can also visualize batching flows in Spring Tools Suite (STS),\
    \ similarly to Spring Integration. We can also use the STS Batch Graph Editor\
    \ to create SB flows. [Figure 9-4](#9781484207949_Ch09_1.xhtml#Fig4) shows the\
    \ location of the editor in STS.\n\n![9781484207949_Fig09-04.jpg](images/9781484207949_Fig09-04.jpg)\n\
    \n[Figure 9-4](#9781484207949_Ch09_1.xhtml#_Fig4). Batch Graph Editor tab in STS\n\
    \nBy double-clicking SB components in the graph, we can change attributes of those\
    \ components via the Properties tab. This is shown in [Figure 9-5](#9781484207949_Ch09_1.xhtml#Fig5).\n\
    \n![9781484207949_Fig09-05.jpg](images/9781484207949_Fig09-05.jpg)\n\n[Figure\
    \ 9-5](#9781484207949_Ch09_1.xhtml#_Fig5). Editing SB component attributes\n\n\
    ## Tasklet Step Example with Java Configuration\n\nPreparing tea with a Java configuration\
    \ is shown in [Listing 9-21](#9781484207949_Ch09_1.xhtml#FPar24).\n\n[***Listing\
    \ 9-21***](#9781484207949_Ch09_1.xhtml#_FPar24). Batch Configuration of Tasklet\
    \ Step Example with Java Configuration ( 0905-tasklet-step-javaconfig)\n\n```\n\
    package net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddTea;\n\
    import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;\nimport net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;\n\
    import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
    import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
    @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
    \ boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater) {\n    return\
    \ stepFactory.get(\"boilWaterStep\").tasklet(boilWater).build();\n  }\n\n@Bean\n\
    \  public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {\n \
    \   return stepFactory.get(\"addTeaStep\").tasklet(addTea).build();\n  }\n\n@Bean\n\
    \  public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)\
    \ {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n\
    \  }\n\n@Bean\n  public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n\
    \      @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n      @Qualifier(\"\
    addTeaStep\") Step addTeaStep,\n      @Qualifier(\"addWaterStep\") Step addWaterStep)\
    \ {\n    return jobBuilderFactory.get(\"prepareTeaJob\")\n        .start(boilWaterStep)\n\
    \        .next(addTeaStep)\n        .next(addWaterStep)\n        .build();\n \
    \ }\n}\n```\n\nEach custom `Tasklet` (`BoilWater`, `AddTea`, `AddWater`) needs\
    \ to be wrapped into `TaskletStep` so that we can use it as part of the `Job`.\
    \ We create a `Step` instance for each `Tasklet` by using `StepBuilderFactory`.\
    \ The `get()` method creates an instance of `StepBuilder` based on the given name\
    \ of the `Step`, the `tasklet()` method creates a `TaskletStepBuilder` instance\
    \ based on the given `Tasklet`, and finally, the `build()` call creates the `Step`\
    \ instance. We register this instance as a Spring bean.\n\nWhen we create `Job`\
    \ in the `prepareTeaJob()` method, we need to autowire each `Step` via the bean\
    \ name instead of the type, because we have three beans of type `Step` in the\
    \ Spring context. This is a little bit of annoying boilerplate code when we define\
    \ an SB configuration with Java. After we inject all the steps and `JobBuilderFactory`,\
    \ we create the `Job` instance and also register it as a Spring bean.\n\nThe main\
    \ class for this example is the standard Spring Boot main class. When we run it,\
    \ we see output similar to that of the previous example ([Listing 9-20](#9781484207949_Ch09_1.xhtml#FPar23)).\n\
    \n## JobLauncher\n\n`JobLauncher` is the interface used to execute SB jobs registered\
    \ in the Spring context. Spring provides a `SimpleJobLauncher` implementation\
    \ of this interface out of the box.\n\nSo far, we haven’t needed to use it, because\
    \ every `Job` was executed immediately after the Spring context was initialized\
    \ by Spring Boot. We also didn’t need to create the `JobLauncher` instance, as\
    \ the `@EnableBatchProcessing` annotation created it for us. But automatic execution\
    \ at the application’s start is not always suitable, and we may need to explicitly\
    \ execute a particular job.\n\n[Listing 9-22](#9781484207949_Ch09_1.xhtml#FPar25)\
    \ shows the signature of the `JobLauncher` interface.\n\n[***Listing 9-22***](#9781484207949_Ch09_1.xhtml#_FPar25).\
    \ JobLauncher Interface\n\n```\npackage org.springframework.batch.core.launch;\n\
    import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobExecution;\n\
    import org.springframework.batch.core.JobParameters;\nimport org.springframework.batch.core.JobParametersInvalidException;\n\
    import org.springframework.batch.core.repository.JobExecutionAlreadyRunningException;\n\
    import org.springframework.batch.core.repository.JobInstanceAlreadyCompleteException;\n\
    import org.springframework.batch.core.repository.JobRestartException;\n\npublic\
    \ interface JobLauncher {\n  public JobExecution run(Job job, JobParameters jobParameters)\n\
    \     throws JobExecutionAlreadyRunningException, JobRestartException,\n     \
    \        JobInstanceAlreadyCompleteException, JobParametersInvalidException;\n\
    }\n```\n\n`JobLauncher` declares only one method, `run()`, which returns an instance\
    \ of `JobExecution`. When the client executes this method, the execution is by\
    \ default synchronous; the caller is blocked until the job finishes. In such a\
    \ case, the resulting status of the job is indicated by `JobExecution.getExitStatus()`.\
    \ When we use synchronous execution, the exit status is typically `ExitStatus.COMPLETED`\
    \ or `ExitStatus.FAILED`.\n\nBut in some cases, we don’t want to block the caller.\
    \ For these cases, implementation of `SimpleJobLauncher` can be configured with\
    \ `TaskExecutor`. With this configuration, the `SimpleJobLauncher.run()` call\
    \ doesn’t block, and the existing status may configured to `ExitStatus.UNKNOWN`,\
    \ `ExitStatus.STARTING`, or `ExitStatus.STARTED`, until the `Job` is finished.\n\
    \n## JobLauncher Example with XML Configuration\n\nIn this case, we don’t use\
    \ Spring Boot. [Listing 9-23](#9781484207949_Ch09_1.xhtml#FPar26) shows the XML\
    \ configuration.\n\n[***Listing 9-23***](#9781484207949_Ch09_1.xhtml#_FPar26).\
    \ XML Configuration of JobLauncher Example (File batch-beans-config.xml in Folder\
    \ src/main/resources of Example Project 0906-job-launcher-xml)\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
    http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
