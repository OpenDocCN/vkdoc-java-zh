    ItemStream


    面向块的处理通常需要获取、更新和释放资源。当然，Spring 会尝试为我们处理大部分此类操作。例如，打开和关闭 JMS 或数据库连接。


    但对于某些技术，Spring 并不会为我们处理资源的打开和关闭。这些资源通常以流的形式存在，因此 SB 提出了 `ItemStream` 这个名称。如果在面向块的处理中需要打开、更新或关闭此类资源，我们可以依赖
    SB 的这一特性。我们可以将其视为一个特殊的拦截器，在适当的时机执行以打开或关闭资源。


    这种支持有三种形式：


    *   `ItemStream`：独立接口，定义了 `open`、`update` 和 `close` 操作作为拦截点。其优点在于我们可以独立于 `ItemReader`
    和 `ItemWriter` 使用此实现。

    *   `ItemStreamReader<T>`：`ItemReader<T>` 和 `ItemStream` 的便捷子接口。其优点在于可以直接将 `ItemReader`
    定义为一个具有流感知能力的 SB 组件。

    *   `ItemStreamWriter<S>`：`ItemWriter<S>` 和 `ItemStream` 的便捷子接口。其优点在于可以直接将 `ItemWriter`
    定义为一个具有流感知能力的 SB 组件。


    请注意，`ItemStreamWriter<S>` 使用的泛型占位符 `S` 与 `ItemStreamReader<T>` 不同。这是因为我们遵循 `ItemProcessor<T,
    S>` 的概念，其中 `T` 是处理传入处理器之前的类型，`S` 是处理从处理器返回之后的类型。因此，本书中处理后的泛型类型使用占位符 `S` 标记。


