      public StreamRecordWriter(WriteRepository writeRepository,

          SimpleExecutablePoint executablePoint) {

        super();

        this.writeRepository = writeRepository;

        this.executablePoint = executablePoint;

      }


    @Override

      public void write(List<? extends String> items) throws Exception {

        writeRepository.writeRecords(items);

      }


    @Override

      public void open(ExecutionContext executionContext)

          throws ItemStreamException {

        executablePoint.execute("Opening records writer");

      }


    @Override

      public void update(ExecutionContext executionContext)

          throws ItemStreamException {

        executablePoint.execute("Updating records writer");

      }


    @Override

      public void close() throws ItemStreamException {

        executablePoint.execute("Closing records writer");

      }

    }

    ```


    As the `ItemStreamWriter<String>` implementation combines `ItemWriter<String>`
    with the `ItemStream` interface, we need to implement the `write()`, `open()`,
    `update()`, and `close()` methods. To simulate the `ItemStream` life-cycle actions,
    we need to inject the `SimpleExecutablePoint` instance. To write items in the
    `write()` method, we need the `WriteRepository` instance. [Listing 9-88](#9781484207949_Ch09_2_Ext.xhtml#FPar92)
    shows the XML configuration of these stream handlers.


    [***Listing 9-88***](#9781484207949_Ch09_2_Ext.xhtml#_FPar92). XML Configuration
    of ItemStream (File batch-config.xml in Folder src/main/resource of Example Project
    0923-item-stream-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

      http://www.springframework.org/schema/batch/spring-batch.xsd

      http://www.springframework.org/schema/beans

      http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="simpleRecordsJob">

        <step id="simpleRecordsStep">

          <tasklet>

            <chunk reader="simpleRecordReader" writer="streamRecordWriter"

              processor="simpleRecordProcessor" commit-interval="4" >

              <streams>

                <stream ref="recordsReaderItemStream"/>

              </streams>

            </chunk>

          </tasklet>

        </step>

      </job>

    </beans:beans>

    ```


    As a writer, we use the `streamRecordWriter` bean, which is aware of the resource
    and can handle its simulated life cycle. For other chunk handlers, we use the
    common `simpleRecordReader` and `simpleRecordProcessor` beans. The stand-alone
    `recordsReaderItemStream` needs to be registered via the `<streams>` XML tag.
    We again use the common `BatchConfiguration` class to import this XML configuration
    into the component scanning and `@EnableBatchProcessing`. When we run this example
    with the common Spring Boot main class, we get the output in [Listing 9-89](#9781484207949_Ch09_2_Ext.xhtml#FPar93).


