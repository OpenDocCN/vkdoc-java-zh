    we allow a retry for. The `<retry-listeners>` tag defines a list of retry listeners,
    which is in this case only our `simpleRetryListener`. Similar to the `Skip` feature,
    we can combine the `<include>` and `<exclude>` tags to fine-tune exceptions we
    are interested in. And as with the `Skip` example, we leave this feature for your
