- fmt: "`EndpointRegister`类使用了Spring的`@Component`注解进行标注，并继承了`org.glassfish.jersey.server.ResourceConfig`。这代表了Spring与Jersey的集成。端点Bean应在此类的构造函数中注册。在本例中，仅注册了`UserResource`这个Bean。\n\
    \n[清单4-9](#9781484207949_Ch04.xhtml#FPar16)是负责将此示例作为Java应用程序启动的主类。\n\n[***清单4-9***](#9781484207949_Ch04.xhtml#_FPar16).\
    \ JAX-RS应用程序的主类 (0401-rest-jax-rs-server)\n\n```java\npackage net.lkrnac.book.eiws.chapter04;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.boot.context.web.SpringBootServletInitializer;\n\n\
    @SpringBootApplication\npublic class RestJaxrsApplication extends SpringBootServletInitializer\
    \ {\n  public static void main(String... args) {\n    SpringApplication.run(RestJaxrsApplication.class,\
    \ args);\n  }\n}\n```\n\n我们使用Spring Boot项目来轻松地将应用程序托管在嵌入式Tomcat Servlet容器中。这是一种相对较新且便捷的运行Spring应用程序的方式。`@SpringBootApplication`注解将多种Spring注解整合在一起。它会触发对注解类所在包及其子包的组件扫描（等同于`@ComponentScan`）。它还包含了`@EnableAutoConfiguration`这个Spring\
    \ Boot注解，该注解会检查类路径中的JAR依赖并注册一些合理的默认Bean。在本例中，我们使用了JAX-RS的实现——Jersey。因此，它会启动嵌入式Tomcat容器。该类继承自`SpringBootServlerInitializer`，后者负责处理我们的Servlet配置。默认情况下，它会将所有端点映射到根URL`/`。在`main`方法中，我们调用了`SpringApplication.run`，并将Spring配置类作为参数传入。因此，`RestJaxrsApplication`类既被用作Spring配置，也是我们应用程序的主类。\n\
    \n[清单4-10](#9781484207949_Ch04.xhtml#FPar17)涵盖了Spring Boot的配置属性。这些属性帮助我们配置嵌入式Tomcat容器（端口为10401），并启动Spring的JAX-RS集成，同时配置Jersey以托管Servlet。\n\
    \n[***清单4-10***](#9781484207949_Ch04.xhtml#_FPar17). JAX-RS与Spring Boot示例属性 (文件`application.properties`位于示例项目`0401-rest-jax-rs-server`的`src/main/properties`文件夹中)\n\
    \n```properties\nserver.port=10401\nspring.jersey.type=servlet\n```\n\n以Java应用程序方式运行`RestJaxrsApplication`类后，我们可以向服务器执行HTTP\
    \ REST请求。为此，我们可以使用Chrome插件DHC - REST/HTTP API Client (`https://chrome.google.com/webstore/detail/dhc-resthttp-api-client/aejoelaoggembcahagimdiliamlcdmfm`)。[图4-2](#9781484207949_Ch04.xhtml#Fig2)展示了针对此运行中的应用程序执行的`POST`请求。\n\
    \n![9781484207949_Fig04-02.jpg](images/9781484207949_Fig04-02.jpg)\n\n[图4-2](#9781484207949_Ch04.xhtml#_Fig2).\
    \ 针对JAX-RS示例的HTTP POST请求\n\n在DHC - REST/HTTP API Client屏幕的上半部分，我们需要指定要发送的请求。在本例中，我们需要指定REST端点的URL，即`http://localhost:10401/users`。接下来，我们需要选择HTTP方法（此处为`POST`），最后，在请求体部分指定要发送给服务器的JSON负载。\n\
    \n点击“发送”按钮后，如果一切配置正确，响应将显示在下方。在本例中，服务器指示资源实例已创建，并向我们发送了`Location` HTTP头。这为我们提供了所创建资源实例的完整URL。它还显示了分配给该用户的ID。在本例中，ID为0。\n\
    \n[图4-3](#9781484207949_Ch04.xhtml#Fig3)、[4-4](#9781484207949_Ch04.xhtml#Fig4)和[4-5](#9781484207949_Ch04.xhtml#Fig5)展示了使用HTTP\
    \ `GET`、`PUT`和`DELETE`方法的类似操作。\n\n![9781484207949_Fig04-03.jpg](images/9781484207949_Fig04-03.jpg)\n\
    \n[图4-3](#9781484207949_Ch04.xhtml#_Fig3). 针对JAX-RS示例的HTTP GET请求\n\n![9781484207949_Fig04-04.jpg](images/9781484207949_Fig04-04.jpg)\n\
    \n[图4-4](#9781484207949_Ch04.xhtml#_Fig4). 针对JAX-RS示例的HTTP PUT请求\n\n![9781484207949_Fig04-05.jpg](images/9781484207949_Fig04-05.jpg)\n\
    \n[图4-5](#9781484207949_Ch04.xhtml#_Fig5). 针对JAX-RS示例的HTTP DELETE请求\n\n这种Spring与JAX-RS的集成为开发REST\
    \ Web服务提供了一种全面的方法。即使Spring提供了自己的替代API，它也受到Spring生态系统的支持。\n\n## Spring MVC\n\n\
    *Spring MVC*是Spring Web支持的核心模块。其契约是JAX-RS抽象的竞争对手。顾名思义，这个Spring模块最初并非为开发REST服务而设计。但自Spring\
    \ Framework 3.0版本以来，用于模型-视图-控制器（MVC）架构风格的API已经足够成熟，足以涵盖REST相关需求。这是一个双赢的局面，因为熟悉MVC\
    \ API的开发人员可以轻松切换到REST端点开发，反之亦然。\n\nJAX-RS面向应用程序到应用程序的通信。因此，我们可以使用任何主流编程平台（包括浏览器中的JavaScript）开发的客户端与REST服务器进行通信。但有时，我们可能需要使用纯HTML作为端点的消费者。关于HTML的一个重要事实是，它仅支持`GET`（例如，用户点击网页链接时）和`POST`（例如，用户提交HTML表单时）HTTP方法。问题在于，在纯HTML的情况下，缺少`DELETE`、`PUT`和`HEADER`\
    \ HTTP方法。这对于JAX-RS来说将是一个重大问题，因为它不期望如此受限的环境。\n\nSpring MVC通过一种称为*HTTP方法转换*的技术支持浏览器作为REST客户端。此概念的核心思想是使用HTML表单执行`POST`请求，并附带一个隐藏的表单参数。该参数应指定要执行的期望HTTP方法，可以是`DELETE`、`HEADER`或`PUT`，而非`POST`。在服务器端，我们可以注册一个Servlet过滤器，该过滤器会将HTML\
    \ `POST`请求转换为由隐藏表单输入参数定义的HTTP请求。但此功能超出了本书的范围。\n\nSpring MVC与JAX-RS之间的另一个区别在于客户端API支持。JAX-RS在2.0版本中引入了客户端API。此版本的JAX-RS是标准Java\
    \ EE 7的一部分。因此，如果我们运行的是较旧的Java EE版本，则没有原生的JAX-RS客户端API支持。而企业公司常常停留在Java EE 5或6上，这主要是因为昂贵的Java\
    \ EE应用服务器的许可成本，因为升级对公司来说可能是一项重大投资。使用Spring MVC，即使在较旧的Java EE应用服务器中，您也可以使用客户端API，因为Spring\
    \ Framework是轻量级的，并且可以轻松地插入任何Java EE平台。\n\nSpring MVC模块相对于JAX-RS的一个显著优势是对测试的支持。Spring\
    \ MVC测试模块提供了强大的模拟构造，允许对服务器端和客户端进行集成测试或单元测试。这些构造允许在Servlet容器之外测试映射。这在持续集成中是一个巨大的优势。\n\
    \n在考虑REST编程模型时，使Spring MVC API处于更有利位置的一个重要特性是内容协商。使用Spring MVC，此功能是框架内嵌的。但JAX-RS没有对内容协商的标准支持；因此，开发人员需要依赖他们正在使用的非标准JAX-RS实现，或者显式地实现它。"
  raw: 'The `EndpointRegister` class is annotated with Spring’s `@Component` annotation
    and extends `org.glassfish.jersey.server.ResourceConfig`. This represents the
    Spring and Jersey integration. The endpoint beans should be registered in the
    constructor of this class. In this case, it’s only the `UserResource` bean.


    [Listing 4-9](#9781484207949_Ch04.xhtml#FPar16) is the main class responsible
    for starting this example as a Java application.


    [***Listing 4-9***](#9781484207949_Ch04.xhtml#_FPar16). Main Class of JAX-RS Application
    (0401-rest-jax-rs-server)


    ```

