    ```

    package net.lkrnac.book.eiws.chapter09;

    import java.util.List;

    import org.springframework.batch.core.ItemWriteListener;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;


    @Component

    public class SimpleItemWriterListener implements ItemWriteListener<String> {

      private SimpleExecutablePoint executablePoint;


    @Autowired

      public SimpleItemWriterListener(SimpleExecutablePoint executablePoint) {

        super();

        this.executablePoint = executablePoint;

      }


    @Override

      public void beforeWrite(List<? extends String> items) {

        executablePoint.execute("Starting to write items...");

      }


    @Override

      public void afterWrite(List<? extends String> items) {

        executablePoint.execute("Items written successfully");

      }


    @Override

      public void onWriteError(Exception exception, List<? extends String> items)
    {

        executablePoint.execute("Error occurred while writing items");

      }

    }

    ```


    The injections in the item writer are slightly different, as the writer is handling
    a `List` of items instead of items one by one. Otherwise, the injected values
    and interception points are similar to the reader and processor. [Listing 9-83](#9781484207949_Ch09_2_Ext.xhtml#FPar87)
    shows the XML SB flow configuration.


    [***Listing 9-83***](#9781484207949_Ch09_2_Ext.xhtml#_FPar87). XML Batch Configuration
    with Chunk Listener (File batch-config.xml in Folder src/main/resource of Example
    Project 0921-chunk-listener-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

        http://www.springframework.org/schema/batch/spring-batch.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="simpleRecordsJob">

        <step id="simpleRecordsStep">

          <tasklet>

            <chunk reader="simpleRecordReader" writer="simpleRecordWriter"

              processor="simpleRecordProcessor" commit-interval="4">

              <listeners>

                <listener ref="simpleChunkListener"/>

                <listener ref="simpleItemReaderListener"/>

                <listener ref="simpleItemProcessListener"/>

                <listener ref="simpleItemWriterListener"/>

              </listeners>

            </chunk>

          </tasklet>

        </step>

      </job>

    </beans:beans>

    ```


    All the listeners are registered as a  subtag of `<chunk>`. The order of listeners
    is not relevant in this case, as they are used for different processing phases.
    If we registered various listeners for the same batch-processing phase, they would
    be executed in the order that they were registered.


