    ```\n\n使用 Java 配置的面向块处理示例\n\n现在，让我们使用 Java 配置来配置相同的行为。清单 9-10 展示了 Java 批处理配置。\n\
    \n***清单 9-10***. 面向块处理示例的 Java 配置 (0902-chunk-processing-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\n\
    import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\nimport net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;\n\
    import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n\
    \  @Bean\n  public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n\
    \      SimpleRecordReader simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n\
    \      SimpleRecordWriter simpleRecordWriter) {\n    return stepBuilderFactory.get(\"\
    simpleRecordsStep\")\n        .<String, String> chunk(4)\n        .reader(simpleRecordReader)\n\
    \        .processor(simpleRecordProcessor)\n        .writer(simpleRecordWriter)\n\
    \        .build();\n  }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory\
    \ jobBuilderFactory,\n      Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"\
    simpleRecordsJob\")\n        .start(simpleRecordsStep)\n        .build();\n  }\n\
    }\n```\n\n`@Configuration` 注解通常用于 Spring Java 配置，而 `@EnableBatchProcessing` 在前面的示例中已经讨论过。`Step`\
    \ bean 通过 `simpleRecordsStep()` 方法创建，该方法使用 `@Bean` 注解。Spring 会将读取器、写入器和处理器的实例与\
    \ `StepBuilderFactory` 的实例一起注入。顾名思义，它用于构建步骤。它的创建是由 `@EnableBatchProcessing` 注解发起的。\n\
    \n当我们注入了所有必要的 bean 后，就可以创建步骤了。SB 提供了流畅的 API 来定义批处理流程。`stepBuilderFactory.get()`\
    \ 方法将 `Step` 的名称作为参数，但请注意，Spring bean 的名称可以与 `Step` 的名称不同。因此，我们不应将 `Step` 名称与\
    \ `Step` 实例的 Spring bean 名称混淆。\n\n链中的下一个调用是通过 `chunk()` 方法指定块大小。在此调用中，我们需要定义由写入器、读取器和处理器处理的项目的泛型类型。然后，`Step`\
    \ 创建链继续——在此步骤中定义读取器、写入器和处理器——并通过 `build()` 调用完成，该调用应用记录的配置并创建 `Step` 实例。\n\n第二个\
    \ `@Bean` 定义创建了 `Job` 实例。我们需要一个 `Step` 和 `JobBuilderFactory` 的实例，后者用于创建 `Job`\
    \ 实例。与 `Step` 创建链类似，`Job` 创建链需要调用 `JobBuilderFactory.get()` 来命名 `Job`。再次注意，`Job`\
    \ 名称可以与由方法指定的 bean 名称不同。此 `Job` 将仅启动我们创建的 `Step`，因此我们需要调用 `start` 来定义 `Step` 方法并构建作业。在这种情况下，我们只使用一个步骤。包含多个步骤的作业将在本章后面展示。\n\
    \n此应用程序的主类是标准的 Spring Boot 主类（之前已在清单 9-8 中展示）。当我们运行它时，可以看到类似于清单 9-9 的输出。\n\n使用文件读取器和\
    \ JDBC 写入器的示例\n\n首先，我们在清单 9-11 中定义用于此示例的模型类。\n\n***清单 9-11***. 文件到数据库面向块示例的模型类\
    \ (0903-chunk-processing-non-generic)\n\n```\npackage net.lkrnac.book.eiws.chapter09.model;\n\
    import lombok.Data;\n\n@Data\npublic class User {\n  private String email;\n \
    \ private String name;\n}\n```\n\n我们在前面的章节中已经见过这个类。这个 POJO 有两个参数，`email` 和 `name`，并使用\
    \ Lombok 的注解 `@Data` 来生成 getter 和 setter。清单 9-12 展示了数据库初始化 bean。\n\n***清单 9-12***.\
    \ 在应用程序启动时填充内存数据库的 Bean (0903-chunk-processing-non-generic)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
    import javax.annotation.PostConstruct;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.stereotype.Component;\n\
    ```"
