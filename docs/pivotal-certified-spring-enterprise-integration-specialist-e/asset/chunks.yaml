    任务调度


    某些用例需要将任务调度到稍后执行。为此，Java 提供了 `java.util.concurrent.ScheduledExecutorService` 接口，如清单
    1-10 所示。


    ***清单 1-10***. ScheduledExecutorService 接口签名


    ```

    public interface ScheduledExecutorService extends ExecutorService {

        public ScheduledFuture<?> schedule(Runnable command,

                                           long delay, TimeUnit unit);


    public <V> ScheduledFuture<V> schedule(Callable<V> callable,

                                               long delay, TimeUnit unit);

        public ScheduledFuture<?> scheduleAtFixedRate(Runnable command,

                                                      long initialDelay,

                                                      long period,

                                                      TimeUnit unit);

        public ScheduledFuture<?> scheduleWithFixedDelay(Runnable command,

                                                         long initialDelay,

                                                         long delay,

                                                         TimeUnit unit);

    }

    ```


    其中重要的机制是最后两个方法。它们支持周期性调度，即任务按一定时间间隔触发。这最常用于处理不涉及用户交互的批量作业。有两种重要的调度配置可用：


    *   **固定延迟**：指定前一个线程结束时间与后续执行开始时间之间的间隔（可将其视为计划线程之间的恒定间隔）。下一个开始时间难以预测，因为它取决于前一次执行的结束时间。

    *   **固定速率**：指定每个计划线程的开始时间。因此线程之间的间隔会变化。如果线程执行时间长于计划速率，则下一个任务的开始时间会延迟，直到前一个任务完成。因此计划任务不会并发执行。


    有了这种支持，我们可以调度实现了 `java.lang.Runnable` 和 `java.util.concurrent.Callable<V>` 接口的任务。但请注意，我们无法将
    `java.util.concurrent.Callable<V>` 用于周期性调度。


    计划线程池的实现是 `java.util.concurrent.ScheduledThreadPoolExecutor`。它可以通过其构造函数或通过 `java.util.concurrent.Executors`
    类提供的工厂方法创建。该工厂方法的签名如清单 1-11 所示。


    ***清单 1-11***. Executors 类部分签名——调度工厂方法


    ```

    package java.util.concurrent;


    public class Executors {

        ...

        public static ScheduledExecutorService newScheduledThreadPool(int corePoolSize);

        ...

    }

    ```


    让我们探讨如何使用这种机制。清单 1-12 展示了一个作为 `java.lang.Runnable` 接口实现的简单任务。


    ***清单 1-12***. 简单任务 (0104-java-scheduling)


    ```

    package net.lkrnac.book.eiws.chapter01.javascheduling;


    import java.text.DateFormat;

    import java.text.SimpleDateFormat;

    import java.util.Date;

    import java.util.Locale;


    public class ScheduledTask implements Runnable {

      private final DateFormat dateFormat = new SimpleDateFormat("HH:mm:ss:SSS",

          Locale.getDefault());


    public void run() {

        System.out.println(dateFormat.format(new Date()) + " - job kicked off");

      }

    }

    ```


    该任务只是将启动时间输出到控制台。清单 1-13 展示了我们如何调度此任务。


    ***清单 1-13***. 简单任务调度 (0104-java-scheduling)


    ```

    package net.lkrnac.book.eiws.chapter01.javascheduling;


    import java.util.concurrent.Executors;

    import java.util.concurrent.ScheduledExecutorService;

    import java.util.concurrent.TimeUnit;


    public class SimpleScheduler {

      public void scheduleTask() {

        ScheduledExecutorService executor = Executors.newScheduledThreadPool(1);

        ScheduledTask task = new ScheduledTask();

        executor.scheduleAtFixedRate(task, 0L, 1, TimeUnit.SECONDS);

      }

    }

    ```


    通过调用 `Executors.newScheduledThreadPool(1)` 工厂方法创建了一个仅包含一个工作线程的 `ScheduledThreadPoolExecutor`。随后，一个
    `SimpleTask` 实例以 1 秒的固定速率进行调度，且无初始延迟。如果我们运行 `SimpleScheduler` 的 `schduleTask()`
    方法，控制台输出将如清单 1-14 所示。


    ***清单 1-14***. Java 调度示例的控制台输出


    ```

    10:20:25:469 - job kicked off

    10:20:26:469 - job kicked off

    10:20:27:468 - job kicked off

    10:20:28:468 - job kicked off

    10:20:29:468 - job kicked off

    ...

    ```


    `SimpleTask` 每秒将当前时间输出到控制台。由于在此示例中我们使用了周期性调度，此执行将持续进行——可能直到我们应用程序的 JVM 被强制停止。


    但这种有限的调度通常不适用于企业应用程序。幸运的是，一个名为 Quartz Scheduler 的流行库常用于复杂调度。它还提供企业级特性，如分布式事务传播、作业持久化和集群功能。但最值得注意的是以下调度特性：


    *   指定一天中的特定时间（精确到毫秒）

    *   指定一周/一月/一年中的特定日期

    *   排除指定日历中的日期（对于排除公共假日很有用）

    *   指定明确的执行次数

    *   重复执行直到某个日期/时间


    使用 Spring 进行多线程处理


    您可能想知道 Spring 在此扮演什么角色。Spring 是著名的在通用 Java 技术之上提供细粒度抽象层的框架。它通过提供三种用于执行和调度任务的主要抽象，消除了大量样板代码：


    *   `TaskExecutor`

    *   `Trigger`

    *   `TaskScheduler`


    org.springframework.core.task.TaskExecutor


    此接口的目的是为执行异步任务提供抽象。它扩展了 `java.util.concurrent.Executor` 接口，但与纯 Java SE 抽象相比，并未引入更改后的
    API 契约。请参见清单 1-15。


    ***清单 1-15***. TaskExecutor 接口签名


    ```

    public interface TaskExecutor extends Executor {

            @Override

            void execute(Runnable task);

    ```


    `}`


    `TaskExecutor` 抽象了 Java SE 5 的 `Executor` 接口，因此它可以用作非 Java SE 5 线程池的超级接口。`TaskExecutor`
    是以下这些线程执行器的统称：

    '
- fmt: "- `SimpleAsyncTaskExecutor`：为每个任务创建一个新线程。支持有限数量的线程（默认无限制）。达到此限制时，后续任务的执行将被阻塞，直到部分线程完成执行。\n\
    - `SyncTaskExecutor`：任务执行在调用线程中同步进行。主要用于测试目的。\n- `ConcurrentTaskExecutor`：包装提供的`java.util.concurrent.Executor`并将其公开为`TaskExecutor`。当开发者想要创建自定义的\
    \ Java SE 5 线程池并在 Spring 环境中使用时，它非常有用。不太常见。大多数情况下，你可能更希望使用`ThreadPoolTaskExecutor`。\n\
    - `SimpleThreadPoolTaskExecutor`：`org.quartz.simpl.SimpleThreadPool`（Quartz Scheduler\
    \ 的线程池实现）的子类。它很有用，因为它能理解 Spring 的生命周期回调。\n- `ThreadPoolTaskExecutor`：`java.util.concurrent.ThreadPoolExecutor`的包装器。允许你使用`corePoolSize`、`maxPoolSize`、`keepAliveSeconds`和`queueCapacity`等参数创建可配置的线程池。\n\
    \n还有一些 Java EE 实现的`TaskExecutor`。这些实现充当 Spring 环境与企业应用容器多线程支持之间的桥梁，线程池的配置位于该容器中：\n\
    \n- `org.springframework.jca.work.WorkManagerTaskExecutor`：JCA 1.5 `javax.resource.spi.work.WorkManager`接口的适配器。\n\
    - `org.springframework.scheduling.commonj.WorkManagerTaskExecutor`：CommonJ `commonj.work.WorkManager`接口的适配器。\n\
    - `org.springframework.jca.work.glassfish.GlassFishWorkManagerTaskExecutor`：GlassFish\
    \ JCA `WorkManager`的适配器。\n- `org.springframework.jca.work.jboss.JbossWorkManagerTaskExecutor`：JBoss\
    \ JCA WorkManager 的适配器。\n\n所有这些任务执行器都可以通过`@Bean`注解或`<bean/>`标签声明为标准 Spring Bean。本章后面的“配置异步任务”部分将给出一个示例。\n\
    \n## `org.springframework.scheduling.Trigger`\n\n`Trigger`接口（如[清单 1-16](#9781484207949_Ch01.xhtml#FPar19)\
    \ 所示）旨在基于先前的执行时间确定下一次执行时间。Spring 将其用于调度。\n\n***清单 1-16***. Trigger 接口\n\n```\n\
    public interface Trigger {\n        Date nextExecutionTime(TriggerContext triggerContext);\n\
    }\n```\n\n它有两个实现：\n\n- `CronTrigger`：允许基于 Cron 表达式触发。\n- `PeriodicTrigger`：允许指定固定速率或固定延迟触发器。为了在两者之间切换，它通过`PeriodicTrigger.setFixedRate(boolean\
    \ fixedRate)`公开一个标志。默认触发方式为固定延迟。\n\n![Image](images/sq.jpg) **注意** Cron 在 Unix\
    \ 系统中用于作业调度。Cron 表达式由空格分隔的六个部分组成。每个部分指定分钟、小时、日期、月份、星期几和年份。年份不是必需的，因此通常只使用五个部分。但原始的\
    \ Cron 表达式允许以最短 1 分钟的间隔触发。因此，Spring 使用 Quartz Scheduler 风格的 Cron 语法。它使用七个部分而不是六个，第一个部分是秒。与\
    \ Unix Cron 一样，年份不是必需的。借助每个部分强大的占位符，可以指定复杂的调度模式（例如，`* */10 9-17 * * MON-FRI` 表示在工作时间内每\
    \ 10 分钟触发一次）。理解 Cron 表达式不在本书的讨论范围内，但了解 Spring 集成了这种强大的触发机制很重要。有关 Quartz 风格 Cron\
    \ 表达式的更多信息，请访问`www.quartz-scheduler.org/documentation/quartz-2.1.x/tutorials/crontrigger`。\n\
    \n## Task Scheduler\n\n`org.springframework.scheduling.TaskScheduler`（如[清单 1-17](#9781484207949_Ch01.xhtml#FPar21)\
    \ 所示）是 Spring 用于调度任务的抽象。\n\n***清单 1-17***. TaskScheduler 接口签名\n\n```\npublic interface\
    \ TaskScheduler {\n        ScheduledFuture<?> schedule(Runnable task, Trigger\
    \ trigger);\n        ScheduledFuture<?> schedule(Runnable task, Date startTime);\n\
    \        ScheduledFuture<?> scheduleAtFixedRate(Runnable task, Date startTime,\
    \ long period);\n        ScheduledFuture<?> scheduleAtFixedRate(Runnable task,\
    \ long period);\n        ScheduledFuture<?> scheduleWithFixedDelay(Runnable task,\
    \ Date startTime, long delay);\n        ScheduledFuture<?> scheduleWithFixedDelay(Runnable\
    \ task, long delay);\n}\n```\n\n从接口声明可以看出，Spring 可以基于固定速率和固定延迟方法调度一次性或重复性作业。它还可以使用`Trigger`接口进行基于\
    \ Cron 的复杂调度。\n\n虽然记住`TaskExecutor`和`Trigger`接口的工作原理很重要，但我们不需要直接使用它们。Spring 提供了强大的注解和\
    \ XML 标签来配置多线程和调度行为。因此，`TaskExecutor`和`Trigger`在底层被使用。\n\n## 配置异步任务\n\n为了启用多线程支持，Spring\
    \ 提供了类级别注解`@EnableAsync`。带有`@EnableAsync`注解的类应与`@Configuration`注解一起使用。因此，`@EnableAsync`注解基本上开启了\
    \ Spring 的异步支持。\n\n`@Async`方法级别注解旨在定义异步逻辑。此类任务将在单独的线程中执行。当开发者设计异步 API 时，此注解提供了更广泛的可能性。前面关于`Callable<T>`接口的部分解释了\
    \ Java SE API 可以从异步代码返回值并抛出异常。将参数传递给异步逻辑是 Spring 提供的`@Async`注解的独特功能。但由`@Async`注解的方法有两个重要限制：\n\
    \n- 该方法必须返回`void`或`Future<T>`（类似于`Callable<T>`）。\n- 该方法不能与生命周期回调（例如`@PostConstruct`）一起使用。\n\
    \n`@Async`注解有一个可选参数，用于指定用于执行异步逻辑的任务执行器 Bean 的名称。让我们通过一个示例来探索这些注解的使用。[清单 1-18](#9781484207949_Ch01.xhtml#FPar22)\
    \ 显示了将在单独线程中执行的逻辑。\n\n***清单 1-18***. 异步任务（0102-async-job 示例项目）\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter01.async.task;\n\nimport java.util.concurrent.Future;\n\
    import org.springframework.scheduling.annotation.Async;\nimport org.springframework.scheduling.annotation.AsyncResult;\n\
    import org.springframework.stereotype.Component;\n\n@Component\nclass AsyncTask\
