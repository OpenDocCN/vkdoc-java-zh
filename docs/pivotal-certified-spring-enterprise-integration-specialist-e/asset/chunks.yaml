    作为 `JobExecutionDecider` 的组件必须实现 `decide()` 方法，该方法需要返回 `FlowExecutionStatus` 类型。我们可以使用标准的
    SB 常量——例如 `FlowExecutionStatus.COMPLETED` 或 `FlowExecutionStatus.FAILED`。请注意，`FlowExecutionStatus`
    中还有更多开箱即用的状态常量。


    我们也可以将任意字符串值包装成 `FlowExecutionStatus` 类型，这除了开箱即用的状态常量外，还为我们提供了无限数量的流程控制机会。在这种情况下，我们从注入的
    `jobExecution` 实例中检索 `teaIngredient` 作业参数，如果牛奶是所需的成分，我们就在返回值中指明；否则，返回状态将为 `COMPLETED`。


    对于此示例，我们还引入了一个名为 `AddMilk` 的新 tasklet 步骤。因为它与其他所有茶 tasklet 类似，我们省略了其代码清单。它模拟了“添加牛奶”操作。清单
    9-112 展示了 XML 配置。


