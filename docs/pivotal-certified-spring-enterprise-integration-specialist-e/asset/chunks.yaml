    属性。这使得监听器容器能够提供全局事务支持。另一个重要属性是在 `acknowledge` 属性中启用了事务性确认模式。如果没有此配置，监听器将不具备事务性，因此会忽略所有事务管理器。此配置也是我们无需启用
    `<tx:transaction-driven>` 来在 `SimpleMessageSender` 上启用 `@Transactional` 注解的原因。在本例中，我们并未使用此注解。


