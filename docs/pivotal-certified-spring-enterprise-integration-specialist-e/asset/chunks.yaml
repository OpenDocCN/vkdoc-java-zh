    Spring Batch


    So far our focus has been tailored toward enterprise technologies, which process
    requests or messages from upstream applications. Such abstractions are crucial
    for handling real-time processing of a small amount of data, mostly representing
    one action against our enterprise system. But real-world enterprises also need
    to perform background tasks, whereby an often large amount of data needs to be
    processed, migrated, copied, or converted from one system to another on a regular
    basis.


    Such processing is often referred to as *batch processing*, because data is processed
    in large amounts that usually can’t fit into memory or a single transaction. This
    amount of data needs to be divided and processed in manageable chunks. This processing
    is often executed on a regular basis (for example, daily, weekly, or monthly)
    and may be long running. Batch processing typically doesn’t involve user interaction.


    Use cases for batch processing include the following:


    *   Sending subscription e-mails

    *   Sending monthly invoices

    *   Synchronizing a data warehouse

    *   Performing business reporting

    *   Processing orders'
