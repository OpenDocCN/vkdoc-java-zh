    ## Spring Batch Admin


    Often we need to monitor and manually control batch processing. For example, we
    might need to restart a certain `JobExecution`, because previously corrupted data
    was manually fixed. SB provides for this purpose a project called Spring Batch
    Admin (`http://docs.spring.io/spring-batch-admin`).


    This is a web application that can be embedded into our batch processing application
    to control and monitor batch processing. Because it is a web component, it needs
    to be hosted in the servlets container. We can use `spring-batch-admin-manager`
    and `spring-batch-admin-resources` and place our `Job`s XML configuration into
    the directory `META-INF/spring/batch/jobs`.


    To cover the features of Spring Batch Admin, we will use an example application
    that can be downloaded from the Spring Batch Admin site (`http://docs.spring.io/downloads/nightly/release-download.php?project=BATCHADM`).
    We used version 1.3.1.RELEASE in this example. When we run this application on
    a local servlet container with port 8080 (for example, using the default Pivotal
    tc Server in STS), we can enter the `http://localhost:8080/spring-batch-admin-sample`
    address into the browser to control batch processing.


    ![Image](images/sq.jpg) **Note** All of the following figures were downloaded
    from the spring.io site at `http://docs.spring.io/spring-batch-admin/screenshots.html`.


    [Figure 9-11](#9781484207949_Ch09_3_Ext.xhtml#Fig11) shows how we can browse jobs
    that are available in the batch application, along with their main attributes
    and statistics. [Figure 9-12](#9781484207949_Ch09_3_Ext.xhtml#Fig12) shows a screen
    for a single job.


