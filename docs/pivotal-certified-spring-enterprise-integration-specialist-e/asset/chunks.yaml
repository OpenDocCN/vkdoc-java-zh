    图 9-5. 编辑 SB 组件属性


    使用 Java 配置的 Tasklet 步骤示例


    清单 9-21 展示了使用 Java 配置准备茶的过程。


    ***清单 9-21***. 使用 Java 配置的 Tasklet 步骤示例的批处理配置 ( 0905-tasklet-step-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;

    import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater)
    {

        return stepFactory.get("boilWaterStep").tasklet(boilWater).build();

      }


    @Bean

      public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {

        return stepFactory.get("addTeaStep").tasklet(addTea).build();

      }


    @Bean

      public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)
    {

        return stepFactory.get("addWaterStep").tasklet(addWater).build();

      }


    @Bean

      public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addWaterStep") Step addWaterStep) {

        return jobBuilderFactory.get("prepareTeaJob")

            .start(boilWaterStep)

            .next(addTeaStep)

            .next(addWaterStep)

            .build();

      }

    }

    ```


    每个自定义的 `Tasklet`（`BoilWater`、`AddTea`、`AddWater`）都需要被包装到 `TaskletStep` 中，以便我们将其用作
    `Job` 的一部分。我们通过使用 `StepBuilderFactory` 为每个 `Tasklet` 创建一个 `Step` 实例。`get()` 方法基于给定的
    `Step` 名称创建一个 `StepBuilder` 实例，`tasklet()` 方法基于给定的 `Tasklet` 创建一个 `TaskletStepBuilder`
    实例，最后，`build()` 调用创建 `Step` 实例。我们将此实例注册为一个 Spring Bean。


    当我们在 `prepareTeaJob()` 方法中创建 `Job` 时，我们需要通过 Bean 名称而非类型来自动装配每个 `Step`，因为在 Spring
    上下文中我们有三个类型为 `Step` 的 Bean。当我们使用 Java 定义 SB 配置时，这会产生一些令人烦恼的样板代码。在注入所有步骤和 `JobBuilderFactory`
    之后，我们创建 `Job` 实例，并将其也注册为一个 Spring Bean。


    此示例的主类是标准的 Spring Boot 主类。当我们运行它时，会看到与之前示例（清单 9-20）类似的输出。


    JobLauncher


    `JobLauncher` 是用于执行在 Spring 上下文中注册的 SB 作业的接口。Spring 开箱即用地提供了此接口的一个实现 `SimpleJobLauncher`。


    到目前为止，我们还没有需要使用它，因为每个 `Job` 在 Spring Boot 初始化 Spring 上下文后立即执行。我们也不需要创建 `JobLauncher`
    实例，因为 `@EnableBatchProcessing` 注解已经为我们创建了它。但是，在应用程序启动时自动执行并不总是合适的，我们可能需要显式地执行某个特定的作业。


    清单 9-22 展示了 `JobLauncher` 接口的签名。


    ***清单 9-22***. JobLauncher 接口


    ```

    package org.springframework.batch.core.launch;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.JobExecution;

    import org.springframework.batch.core.JobParameters;

    import org.springframework.batch.core.JobParametersInvalidException;

    import org.springframework.batch.core.repository.JobExecutionAlreadyRunningException;

    import org.springframework.batch.core.repository.JobInstanceAlreadyCompleteException;

    import org.springframework.batch.core.repository.JobRestartException;


    public interface JobLauncher {

      public JobExecution run(Job job, JobParameters jobParameters)

         throws JobExecutionAlreadyRunningException, JobRestartException,

                 JobInstanceAlreadyCompleteException, JobParametersInvalidException;

    }

    ```


    `JobLauncher` 只声明了一个方法 `run()`，它返回一个 `JobExecution` 实例。当客户端执行此方法时，默认情况下执行是同步的；调用者会被阻塞，直到作业完成。在这种情况下，作业的结果状态由
    `JobExecution.getExitStatus()` 指示。当我们使用同步执行时，退出状态通常是 `ExitStatus.COMPLETED` 或
    `ExitStatus.FAILED`。


    但在某些情况下，我们不想阻塞调用者。对于这些情况，`SimpleJobLauncher` 的实现可以使用 `TaskExecutor` 进行配置。通过这种配置，`SimpleJobLauncher.run()`
    调用不会阻塞，并且在 `Job` 完成之前，现有状态可以配置为 `ExitStatus.UNKNOWN`、`ExitStatus.STARTING` 或 `ExitStatus.STARTED`。


    使用 XML 配置的 JobLauncher 示例


    在这种情况下，我们不使用 Spring Boot。清单 9-23 展示了 XML 配置。


    ***清单 9-23***. JobLauncher 示例的 XML 配置（文件 batch-beans-config.xml 位于示例项目 0906-job-launcher-xml
    的文件夹 src/main/resources 中）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter09" />


    <bean id="transactionManager"

        class="org.springframework.batch.support.transaction.ResourcelessTransactionManager"
    />


    <bean id="jobRepository"

        class="org.springframework.batch.core.repository.support.MapJobRepositoryFactoryBean">

        <property name="transactionManager" ref="transactionManager" />

      </bean>


    <bean id="jobLauncher"

        class="org.springframework.batch.core.launch.support.SimpleJobLauncher">

        <property name="jobRepository" ref="jobRepository" />

      </bean>

    </beans>

    ```

