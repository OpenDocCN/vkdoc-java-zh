    Messaging Gateway


    The *messaging gateway* is a passive component that can participate in unidirectional
    or bidirectional message flows. So it inherently handles request-response concerns.
    We can divide gateways into two categories:


    *   *Generic messaging gateway*: Wraps SI message flow into the Java interface
    as input to the message infrastructure. Therefore, the method wrapping the flow
    must have a return value. We can think of it as a proxy between Java and the SI
    flow. It can be configured via the XML element `<int:gateway>`. The Java configuration
    uses two annotations: `@MessagingGateway` marks the interface as a gateway wrapper,
    and `@Gateway` maps a particular method as an entrance to SI messaging. Notice
    that we can annotate various methods in the same class with the `@Gateway` annotation
    and in this way have various entry points to our SI flow. Therefore, we need to
    scan the annotated inbound gateway with `@IntegrationComponentScan`.

    *   *Technology-specific messaging gateway*: Can handle communication with an
    external technology or protocol (for example, HTTP, JDBC, SOAP Web Services).
    This type of gateway can be inbound or outbound in relation to SI flow. To configure
    a technology-specific gateway with XML, we need to use special XML namespaces
    (for example, `<int-file:outbound-gateway>`, `<int-http:inbound-gateway>`, `<int-ws:outbound-gateway>`).
    A technology-specific gateway doesn’t have any SI annotations available, so only
    an XML configuration is possible. A concise table listing messaging gateway implementations
    for external technologies is available at `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`.


    If we want to have an inbound messaging gateway participating in bidirectional
    flow of messages, there has to be a mechanism for sending reply messages back
    to the gateway in place. We can handle this in various ways:


    *   *Temporary reply channel*: By default, the inbound messaging gateway creates
    a temporary channel, which will be used when the downstream output endpoint replies
    with a message. This channel is created for each message flowing through the SI
    flow.

    *   *Reply channel specified on the message*: The message can have the special
    header `replyChannel` defined, which will be used when the downstream output endpoint
    replies with a message

    *   *Default reply channel* *defined on the inbound gateway*: If the gateway has
    specified the attribute `default-reply-channel` (`reply-channel` with technology-specific
    gateways), the reply message from the downstream output component will be passed
    to this channel.

    *   *Output channel* *specified on downstream output endpoint*: If the output
    endpoint of the SI flow specifies the `output-channel` attribute, this channel
    will be used for sending a reply message.


