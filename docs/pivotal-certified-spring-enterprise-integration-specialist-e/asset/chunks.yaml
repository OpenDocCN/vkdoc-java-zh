    该流程始于映射到事务性服务接口 `SiWrapperServiceTransacted` 的入站网关，并通过 `inChannel` 连接到出站 JDBC
    网关。该网关使用 `dataSource` Bean 对内存数据库执行查询，在事务内将一条消息插入到 `TEXT_TABLE` 中。


    该组件的回复通道连接到服务激活器，后者调用 `ServiceWithError.handleJdbcResult()`。正如我们所看到的，此逻辑模拟了一个错误。**清单
    8-141** 展示了此示例的主类。


    ***清单 8-141***. 事务传播示例的主类 (0841-transaction-propagation)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceTransacted;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.ImportResource;

    import org.springframework.jdbc.core.JdbcTemplate;


    @Slf4j

    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      private static final String SELECT_COUNT = "select count(*) from TEXT_TABLE";


    public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    try {

          SiWrapperServiceTransacted wrapperService =

              ctx.getBean(SiWrapperServiceTransacted.class);

          wrapperService.processText("simple message");

        } catch (IllegalStateException ise) {

          JdbcTemplate jdbcTemplate = ctx.getBean(JdbcTemplate.class);

          int recordCount =

              jdbcTemplate.queryForObject(SELECT_COUNT, Integer.class);

          log.info("Record count: " + recordCount);

        }

      }

    }

    ```


    在 Spring Boot 应用程序使用我们定义的 XML 流程启动后，我们检索 `SiWrapperServiceTransacted` Bean。该 Bean
    用于将消息发送到 SI 流程。由于我们预期它会抛出错误，因此此调用位于 `try-catch` 块中。在 `catch` 块中，我们读取并记录数据库中持久化记录的数量。这将有助于突出显示事务传播特性。**清单
    8-142** 展示了运行此主类后可能的输出。


    ***清单 8-142***. 事务传播示例的输出


    ```

    2015-09-01 21:53:58.885  INFO 28736 --- [           main]

    n.l.book.eiws.chapter08.SiApplication    : Record count: 0

    ```


    数据库中没有持久化任何记录，因为在从 `SiWrapperServiceTransacted`（即我们的事务边界）抛出错误后，Spring 回滚了整个事务。如果我们从
    `SiWrapperServiceTransacted` 中移除 `@Transactional` 注解，我们会发现记录数等于 1，尽管之后发生了错误。这是因为没有事务，出站
    JDBC 网关的插入操作会立即提交。


    事务性轮询示例


    现在让我们探讨异步 SI 线程中的事务行为示例。正如我们提到的，事务不能跨越 SI 流程的异步边界，但我们可以在处理异步 SI 子流的线程中启动事务。**清单
    8-143** 展示了 SI 配置。


    ***清单 8-143***. 事务性轮询示例的 SI 配置（示例项目 0842-transacted-polling 的 src/main/resources
    文件夹中的文件 si-config.xml）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:int-http="http://www.springframework.org/schema/integration/http"

      xmlns:int-jdbc="http://www.springframework.org/schema/integration/jdbc"

      xsi:schemaLocation="http://www.springframework.org/schema/integration/jdbc

        http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />

      <int:channel id="inChannel">

        <int:queue capacity="10"/>

      </int:channel>


    <int-jdbc:outbound-gateway

        data-source="dataSource"

        update="insert into TEXT_TABLE values (:payload)"

        request-channel="inChannel"

        reply-channel="replyChannel" >

        <int:poller fixed-delay="100">

          <int:transactional/>

        </int:poller>

      </int-jdbc:outbound-gateway>

      <int:channel id="replyChannel" />


    <int:service-activator input-channel="replyChannel" ref="serviceWithError"

        method="handleJdbcResult">

      </int:service-activator>

    </beans>

    ```


    此 SI 配置使用了一个带有我们通用服务接口 `SiWrapperServiceVoid` 的入站网关，并通过 `inChannel` 连接到出站 JDBC
    网关。但 `inChannel` 是 `QueueChannel` 类型，这意味着它需要由一个活跃的 SI 端点来消费。因此，出站 JDBC 网关使用一个轮询器，每隔
    100 毫秒在单独的线程中从 `inChannel` 消费消息。更重要的是，这个轮询器组件使用 `<int:transactional>` XML 子元素定义，该子元素为每个轮询器线程定义了事务边界。


    出站 JDBC 网关的回复通道通过 `DirectChannel` 连接到服务激活器。该端点映射到 `ServiceWithError.handleJdbcResult()`，与清单
    8-137 中的示例项目 `0841-transaction-propagation` 相同。它通过抛出 `IllegalStateException` 来模拟错误。**清单
    8-144** 展示了此示例的主类。


