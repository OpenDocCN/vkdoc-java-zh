    The first execution prepares tea without any problems, as in the previous example.
    The second execution of `prepareTeaJob` finishes successfully, but the `addWaterStep`
    was already executed before, so SB doesn’t execute it again. This means that the
    second tea is without water. Notice that this is the default behavior for `Step`
    with the same parameters.


    The third execution of `prepareTeaJob` results in `FAILED JobExecution`, because
    we allow `addTeaStepParent` to run only twice. When we execute `prepareTeaJobNotRestartable`,
    it runs fine the first time, but the second time it throws an exception into the
    main thread, because we don’t allow this job to run twice.


