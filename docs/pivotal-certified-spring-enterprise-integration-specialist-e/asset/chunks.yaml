  raw: 'The most widely used marshaller is JAXB 2, which allows for generation of
    Java model classes from an XSD contract. Generated Java classes are annotated
    with special mapping annotations, which map XML elements onto POJO classes. This
    approach is called Object to XML Mapping (OXM) . It is similar to the famous object-relational
    mapping (ORM), which maps SQL DB tables onto POJOs.


    Examples in this book are based on the Maven 3 build system. So `jaxb2-maven-plugin`
    is used for Java model generation; the XJC binding compiler is used to generate
    Java classes from the XSD contract. More information about this plug-in can be
    found at `http://mojo.codehaus.org/jaxb2-maven-plugin/xjc-mojo.html`. The Maven
    plug-in configuration is shown in [Listing 3-7](#9781484207949_Ch03.xhtml#FPar11).


    [***Listing 3-7***](#9781484207949_Ch03.xhtml#_FPar11). Configurationof jsxb2-maven-plugin


    ```

    <plugin>

      <groupId>org.codehaus.mojo</groupId>

      <artifactId>jaxb2-maven-plugin</artifactId>

      <version>1.6</version>

      <executions>

        <execution>

          <id>xjc</id>

          <goals>

            <goal>xjc</goal>

          </goals>

        </execution>

      </executions>

      <configuration>

        <schemaDirectory>${project.basedir}/src/main/resources/</schemaDirectory>

        <outputDirectory>${project.basedir}/src/main/java</outputDirectory>

        <clearOutputDir>false</clearOutputDir>

      </configuration>

    </plugin>

    ```


    This configuration reads all XSD schema files from the `src/main/resources` directory
    and its subfolders. It is crucial to know that it would pick up all XSD files
    present in the specified directory structure and convert the XSD types/elements
    into Java POJOs. Therefore, the number of POJO classes depends on the number of
    XSD types/elements defined. If one file has five XSD types, five POJO classes
    will be generated for these types. The conversion will fail if any name clashes
    occur.


    When we run this configuration with Maven goals, JAXB POJOs will be generated
    based on the XSD schema into the `src/main/java` folder:


    ```

    > clean install

    ```


    The generated package structure follows the namespace of the XSD schema. In our
    case, it is `localhost._10301._0301_ws_xmlconfig_service`. These POJOs basically
    represent the domain model of the web service. For the XSD schema in [Listing
    3-5](#9781484207949_Ch03.xhtml#FPar9), three classes are created:


    *   `UserRequest`

    *   `UserDetailsReponse`

    *   `ObjectFactory`


    The first two classes obviously represent the XSD elements from the contract.
    They contain getters and setters for subelements. The last class is a factory
    for creating contract elements. It can be used to create instances of POJO classes
    derived from XSD elements or types. It may not be needed, depending on the XSD
    contract. [Listing 3-8](#9781484207949_Ch03.xhtml#FPar12) shows generated classes
    with their JAXB 2 annotations.


    [***Listing 3-8***](#9781484207949_Ch03.xhtml#_FPar12). Generated JAXB 2 Model


    ```

