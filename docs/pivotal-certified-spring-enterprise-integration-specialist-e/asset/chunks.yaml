    Client-Side Interception


    An interesting part of Spring Web Services interception support is on the client
    side. The main interface `ClientInterceptor` signature is similar to the server-side
    `EndpointInterceptor`. The only difference is the missing endpoint bean instance
    injection into the interception touchpoints, because there aren’t any endpoints
    on the client. There isn’t a convenient abstract implementation of this interface.
    So we need to implement all touchpoints in a custom client interceptor. The only
    out-of-the-box interceptor provided by Spring Web Services is `PayloadValidatingInterceptor`.
    Client interceptors are registered into the `WebServiceTemplate` bean.


    [Listing 3-29](#9781484207949_Ch03.xhtml#FPar34) shows an example of a custom
    client-side interceptor.


