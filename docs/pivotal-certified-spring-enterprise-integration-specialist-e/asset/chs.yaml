  \ 的调用就足够了。我们还需要验证没有与 `userService` 模拟对象发生任何意外的交互。\n\nMockMvc 负面测试示例\n\n代码清单 4-35\
  \ 展示了负面测试示例。\n\n***代码清单 4-35***. 负面单元测试 (0403-rest-java-config-server)\n\n```\n\
  @Test\n  public void testClientError() throws Exception {\n    // 给定\n    UserService\
  \ userService = Mockito.mock(UserService.class);\n    UserController userController\
  \ = new UserController(userService);\n    MockMvc mockMvc = MockMvcBuilders.standaloneSetup(userController).build();\n\
  \nwhen(userService.getUser(-1))\n      .thenThrow(new UnsupportedOperationException(DUMMY_ERROR_TEXT));\n\
  \n// 当\n    mockMvc.perform(get(FULL_USER_URL + \"/{id}\", -1)\n        .accept(MediaType.APPLICATION_JSON)\n\
        )\n\n// 然后\n      .andExpect(status().isBadRequest())\n      .andExpect(content().string(DUMMY_ERROR_TEXT));\n\
    }\n}\n```\n\n最后一个服务器端单元测试展示了一种测试服务器 REST 代码错误情况的可行方法。我们再次使用 `userService` 模拟对象作为参数创建\
  \ `userController`。然后，我们在 `userService` 模拟对象中记录：当消费者请求标识符 `-1` 时，抛出异常。\n\n在 URI\
  \ 中使用 `-1` 标识符执行预期请求后，我们期望响应状态为 400 Bad Request，并包含一条虚拟错误消息。\n\n消费 REST\n\n到目前为止，我们主要关注\
  \ REST 通信的服务器端。但 Spring 也支持来自 Java 客户端应用程序的客户端访问。用于客户端访问 REST 服务的主要类是 `org.springframework.web.client.RestTemplate`。您应该通过其构造函数创建其实例。它包含执行所有\
  \ REST 相关 HTTP 方法的方法，如表 4-1 所示。\n\n表 4-1. `RestTemplate` 方法\n\n| HTTP 方法 | RestTemplate\
  \ 方法 | 说明 |\n| --- | --- | --- |\n| `DELETE` | `delete` | 根据给定的 URI 删除对象。 |\n| `POST`\
  \ | `postForLocation` | 提交对象并读取其位置。 |\n| `postForObject` | 提交对象并期望返回其实例。 |\n| `postForEntity`\
  \ | 提交对象并期望返回 `ResponseEntity<T>` 类型的响应。泛型类型 `T` 是响应负载的类型。 |\n| `HEAD` | `headForHeaders`\
  \ | 根据给定的 URL 读取标头并返回 `HttpHeaders` 对象。 |\n| `GET` | `getForObject` | 根据给定的 URL\
  \ 读取对象。 |\n| `getForEntity` | 根据给定的 URI 读取 `ResponseEntity<T>` 实例。泛型类型 `T` 是响应负载的类型。\
  \ |\n| `OPTIONS` | `optionsForAllow` | 返回给定 URI 的 `Allow` 标头值。 |\n| `PUT` | `put`\
  \ | 对给定的 URI 执行给定对象的 `PUT` 操作。 |\n| 任何 HTTP 方法 | `exchange` | 对服务器执行任何 HTTP 方法，并交换\
  \ `HttpEntity<T>` 和 `ResponseEntity<T>` 实例。 |\n\n\n\n对于这些方法中的大多数，都需要进行序列化和反序列化。`RestTemplate`\
  \ 抽象了序列化库，并提供了直接与 Java 类型之间的转换。为此，它使用消息转换器来处理 JSON、XML、GSON 和 RSS 等主要格式。它还能检测类路径上的转换器库（如\
  \ Jackson、JAXB、GSON 和 Rome），并自动注册相应的转换器。\n\n如果内置转换器不够用，我们可以通过 `RestTemplate.setMessageConverters(List<HttpMessageConverter<?>>)`\
  \ 方法注册自定义转换器。当存在多种转换器时，`RestTemplate` 会针对给定的内容类型使用第一个合适的转换器。这种行为使得无需太多努力即可处理内容协商。\n\
  \n`RestTemplate` 类的最后一个显著特性是错误处理。默认情况下，该类会将服务器（HTTP 状态码 5*xx*）和客户端（HTTP 状态码 4*xx*）错误转换为客户端的受检异常。但如果我们不希望这样，可以通过使用\
  \ `RestTemplate.setErrorHandler(ResponseErrorHandler)` 用我们自己的实现覆盖错误处理器。\n\n我们将在示例中探讨此类的基本用法。但首先，我们需要在清单\
  \ 4-36 中展示客户端应用程序的配置。\n\n***清单 4-36***. 客户端应用程序的配置 (0404-rest-boot-client)\n\n```\n\
  package net.lkrnac.book.eiws.chapter04.client;\n\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.web.client.RestTemplate;\n\n@Configuration\n@ComponentScan\n\
  public class ClientConfiguration {\n  @Bean\n  public RestTemplate restTemplate()\
  \ {\n    return new RestTemplate();\n  }\n}\n```\n\n`@Configuration` 和 `@ComponentScan`\
  \ 注解是 Spring 的标准注解。它们声明了 Spring 配置类，该类应对当前包及其子包执行组件扫描。我们在这里只注册了一个 bean，即用于向服务器发送和接收\
  \ HTTP 消息的 `RestTemplate` 实例。我们将其作为单独的 bean 注册在配置类中，因为这将在后续示例中帮助我们进行测试。清单 4-37 展示了此\
  \ REST 客户端 bean 的使用。\n\n***清单 4-37***. RestTemplate (0404-rest-boot-client)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter04.client;\n\nimport java.net.URI;\nimport\
  \ java.net.URISyntaxException;\nimport java.util.Arrays;\nimport java.util.List;\n\
  import net.lkrnac.book.eiws.chapter04.model.User;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.http.HttpMethod;\nimport org.springframework.http.RequestEntity;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.stereotype.Component;\n\
  import org.springframework.web.client.RestTemplate;\n\n@Component\npublic class\
  \ UsersClient {\n  private static final String URL = \"http://localhost:10404/users\"\
  ;\n  private RestTemplate restTemplate;\n\n@Autowired\n  public UsersClient(RestTemplate\
  \ restTemplate) {\n    super();\n    this.restTemplate = restTemplate;\n  }\n\n\
  public URI createUser(User user) {\n    return restTemplate.postForLocation(URL,\
  \ user);\n  }\n\npublic User getUser(int identifier) {\n    return restTemplate.getForObject(URL\
  \ + \"/\" + identifier, User.class);\n  }\n\npublic List<User> getUsers() {\n    User[]\
  \ usersArray = restTemplate.getForObject(URL, User[].class);\n    return Arrays.asList(usersArray);\n\
    }\n\npublic void updateOrCreateUser(int identifier, User user) {\n    restTemplate.put(URL\
  \ + \"/\" + identifier, user);\n  }\n\npublic void deleteUser(int identifier) {\n\
      restTemplate.delete(URL + \"/\" + identifier);\n  }\n\npublic User getUserExchange(int\
  \ identifier) throws URISyntaxException {\n    RequestEntity<Void> request =\n        new\
  \ RequestEntity<Void>(HttpMethod.GET, new URI(URL + \"/\" + identifier));\n    ResponseEntity<User>\
  \ response = restTemplate.exchange(request, User.class);\n    return response.getBody();\n\
    }\n}\n```\n\n`@Component` 注解将此类标记为 Spring bean，以便可以进行组件扫描。`url` 常量定义了 REST 服务器的地址。然后我们定义了\
  \ `restTemplate` 属性，用于对清单 4-36 中注册的 bean 进行构造函数注入。\n\n`createUser` 方法使用 `restTemplate.postForLocation`\
  \ 调用对我们的 REST 服务器执行 `POST` 请求。在此调用中，我们传入 `User` 对象，该对象将被转换为消息的 JSON 负载。此调用的返回值是\
  \ URI 对象，该对象作为所创建资源实例的 `Location` 标头从服务器返回。\n\n`getUser` 方法对具体的资源实例执行 `GET` 请求。`restTemplate.getForObject`\
  \ 调用接受两个参数：要读取的资源的 URL，以及响应负载将被转换成的类型。创建的 POJO 作为返回值返回。\n\n`getUsers` 方法也执行 `GET`\
  \ 请求，但在此情况下，我们读取所有资源实例并将响应负载转换为 `User` 对象的集合。`restTemplate.getForObject` 调用只能处理数组，因为集合具有泛型类型，并且\
  \ Spring 框架无法确定此泛型类型，因为它在运行时会被擦除。因此，如果我们希望 Spring 将其转换为 `List.class` 类型，它无法将其转换为\
  \ `List<User>`。\n\n`updateOrCreateUser` 方法如其名所示，基于给定的 `identifier` 和 `User` 对象执行操作。`identifier`\
  \ 从 URI 中解析，`user` 从 HTTP 请求体中转换而来。\n\n`deleteUser` 方法触发对由给定 `identifier` 标识的资源的\
  \ `DELETE` 请求。\n\n最后，我们在 `getUserExchange` 方法中使用了 `RestTemplate.exchange` 调用。它实际上与\
  \ `getUser` 方法有相同的结果。但它突出了我们如何使用 `RestTemplate` 来覆盖更通用的 HTTP 通信，其中 HTTP 方法作为参数传递。我们还需要将类型为\
  \ `RequestEntity<Void>` 的 HTTP 请求表示作为参数传递。泛型类型 `Void` 表示请求体的类型。显然，这意味着 `GET` 请求没有请求体。作为返回值，我们从服务器接收到类型为\
  \ `ResponseEntity<User>` 的 Spring HTTP 响应表示。泛型类型 `User` 再次表示消息体将被转换成的类型。\n\n如果这些方法中的任何一个收到\
  \ HTTP 状态码 4*xx* 或 5*xx*，`RestTemplate` 将抛出一个非受检异常，该异常会渗透到使用此 `UserClient` bean\
  \ 的代码中。\n\n自定义错误处理器\n\n默认情况下，Spring 将 4*xx* HTTP 状态码转换为 `HttpClientErrorException`，将\
  \ 5*xx* 状态码转换为 `HttpServerErrorException`。两者都是非受检异常。我们不需要显式处理此类异常，因为它们是 `RuntimeException`\
  \ 的子类。\n\n但有时这种默认的 `RestTemplate` 错误处理行为可能不符合我们的要求。幸运的是，我们可以轻松更改默认的异常处理，并通过 `RestTemplate.setErrorHandler`\
  \ 调用注册自定义错误处理器。\n\n为了探索其用法，假设我们必须将所有服务器错误转换为我们的自定义异常。此示例在清单 4-38 中展示。\n\n***清单 4-38***.\
  \ 自定义异常 (0406-rest-errorhandler-client)\n\n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\
  \npublic class CustomException extends RuntimeException {\n  private static final\
  \ long serialVersionUID = 1L;\n\n\n\npublic CustomException(String message) {\n\
  \    super(message);\n  }\n}\n```\n\n我们将 `CustomException` 继承自 `RuntimeException`，使其成为非受检异常，这是良好的\
  \ Java 实践。构造函数接收错误消息，并将该消息参数传递给父类构造函数。这是一个最简单的自定义应用程序特定异常示例。`RestTemplate` Bean\
  \ 的配置如清单 4-39 所示。\n\n***清单 4-39***. RestTemplate 的自定义错误处理器 (0406-rest-errorhandler-client)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\nimport java.io.IOException;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.http.client.ClientHttpResponse;\nimport org.springframework.web.client.ResponseErrorHandler;\n\
  import org.springframework.web.client.RestTemplate;\n\n@Configuration\n@ComponentScan\n\
  public class ClientConfiguration {\n  @Bean\n  public RestTemplate restTemplate()\
  \ {\n    RestTemplate restTemplate = new RestTemplate();\n    restTemplate.setErrorHandler(new\
  \ ResponseErrorHandler() {\n\n@Override\n      public boolean hasError(ClientHttpResponse\
  \ response) throws IOException {\n        HttpStatus statusCode = response.getStatusCode();\n\
  \        return statusCode.is5xxServerError();\n      }\n\n@Override\n      public\
  \ void handleError(ClientHttpResponse response) throws IOException {\n        throw\
  \ new CustomException(response.getStatusText());\n      }\n    });\n    return restTemplate;\n\
  \  }\n}\n```\n\n这一次，我们不再仅仅使用所有默认依赖项创建 `RestTemplate` 实例。我们使用 `RestTemplate.setErrorHandler`\
  \ 方法来实现我们自己的自定义错误处理器。该实现被封装到一个类型为 `ResponseErrorHandler` 的匿名内部类中。\n\n由于匿名内部类的类型是\
  \ `ResponseErrorHandler`，它必须实现两个方法。`hasError` 方法应指示 `ClientHttpResponse` 实例是否存在错误。由于这是我们自定义的实现，我们应该决定何时响应应触发错误。在此例中，我们决定当\
  \ HTTP 响应指示服务器错误 5*xx* 时抛出异常。\n\n自定义错误处理器的第二个方法是 `handleError`。该方法旨在当发生错误时执行所需操作。在此例中，我们希望抛出我们的\
  \ `CustomException`，并携带从服务器接收到的错误消息。\n\n客户端测试\n\nSpring 框架出色的可测试性也适用于 REST 客户端代码。其概念是基于用于\
  \ REST 客户端代码的 `RestTemplate` 实例创建一个假服务器。这个模拟服务器记录预期的请求，并向被测试的客户端代码发送假响应。该假服务器由类\
  \ `org.springframework.test.web.client.MockRestServiceServer` 表示。\n\n模拟服务器的实例通过\
  \ `MockRestServiceServer.createServer` 工厂方法创建，该方法将 `RestTemplate` Bean 作为参数。它必须与在被测试代码中执行\
  \ REST 请求时使用的 `RestTemplate` 实例是同一个。\n\n`MockRestServiceServer` 有两个用于测试的方法：`expect`\
  \ 和 `verify`。`expect` 方法在假服务器中记录预期的行为。它用于链式调用请求期望并记录将返回给测试客户端逻辑的预期响应。`expect` 返回\
  \ `ResponseActions` 接口的实例，该接口提供两个方法：\n\n*   `andExpect`\n    *   接受 `org.springframework.test.web.client.RequestMatcher`\
  \ 作为参数，允许记录预期的内容、标头、HTTP 方法和 URI。\n    *   `org.springframework.test.web.client.match.MockRestRequestMatchers`\
  \ 是一个抽象类，包含工厂方法 `requestTo`、`header`、`content`、`jsonPath`、`xpath` 以及任何能生成 `RequestMatcher`\
  \ 实例的方法，可用于构建全面的请求期望。\n*   `andRespond`\n    *   接受 `org.springframework.test.web.client.ResponseActions`\
  \ 作为参数，允许定义响应的内容、HTTP 状态和标头。\n    *   `org.springframework.test.web.client.response.MockRestResponseCreators`\
  \ 是一个抽象类，包含工厂方法 `withSuccess`、`withCreatedEntity`、`withNoContent`、`withBadRequest`、`withUnauthorizedRequest`、`withServerError`\
  \ 和 `withStatus`，这些方法生成 `ResponseCreators` 实例，可用于在假服务器中记录全面的 HTTP 响应。\n\n`verify`\
  \ 方法用于验证由 `expect` 方法记录的行为。\n\n为了增强可读性，这个客户端测试概念的示例被拆分到多个清单中。首先，清单 4-40 展示了测试的导入、常量和属性。\n\
  \n***清单 4-40***. 客户端测试的第一部分 (0404-rest-boot-client)\n\n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\
  \nimport static org.hamcrest.Matchers.is;\nimport static org.springframework.test.web.client.match.MockRestRequestMatchers.jsonPath;\n\
  import static org.springframework.test.web.client.match.MockRestRequestMatchers.method;\n\
  import static org.springframework.test.web.client.match.MockRestRequestMatchers.requestTo;\n\
  import static org.springframework.\n         test.web.client.response.MockRestResponseCreators.withBadRequest;\n\
  import static org.springframework.\n         test.web.client.response.MockRestResponseCreators.withCreatedEntity;\n\
  import static org.springframework.\n         test.web.client.response.MockRestResponseCreators.withSuccess;\n\
  import static org.testng.Assert.assertEquals;\nimport java.net.URI;\nimport java.util.List;\n\
  import net.lkrnac.book.eiws.chapter04.model.User;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.http.HttpMethod;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.springframework.test.web.client.MockRestServiceServer;\nimport org.springframework.web.client.HttpClientErrorException;\n\
  import org.springframework.web.client.RestTemplate;\nimport org.testng.annotations.BeforeMethod;\n\
  import org.testng.annotations.Test;\n\n@ContextConfiguration(classes = ClientConfiguration.class)\n\
  public class RestClientBootApplicationTest extends\n    AbstractTestNGSpringContextTests\
  \ {\n  private static final String USER0_NAME = \"User0\";\n  private static final\
  \ String USER0_EMAIL = \"user0@gmail.com\";\n  private static final String TEST_RECORD0\
  \ = \"{\\\"email\\\": \\\"\" + USER0_EMAIL\n      + \"\\\", \\\"name\\\": \\\"\"\
  \ + USER0_NAME + \"\\\"}\";\n  private static final String TEST_RECORD1 = \"{\\\"\
  email\\\": \"\n      + \"\\\"user1@gmail.com\\\", \\\"name\\\": \\\"User1\\\"}\"\
  ;\n  private static final String USERS_URL = \"http://localhost:10404/users\";\n\
  \nprivate MockRestServiceServer mockServer;\n\n@Autowired\n  private RestTemplate\
  \ restTemplate;\n\n@Autowired\n  private UsersClient usersClient;\n\n@BeforeMethod\n\
  \  public void init() {\n    mockServer = MockRestServiceServer.createServer(restTemplate);\n\
  \  }\n```\n\n`ContextConfiguration` 注解指定了将使用哪个 Spring 配置进行测试。在此例中，我们测试来自清单 4-37\
  \ 的客户端。测试类继承自 `AbstractTestNGSpringContextTests`，后者是用于 TestNG 集成测试的 Spring 辅助类。\n\
  \n\n\n在测试类中，我们首先指定了几个测试过程中会用到的常量，包括两个用于表示资源 JSON 表示的字符串负载。接着是两个注入的属性：一个是 `restTemplate`，它在清单\
  \ 4-37 的配置类中创建；第二个注入的 Bean 是我们的测试客户端代码 `UsersClient`。\n\n模拟服务器实例在 `mockServer` 变量中声明，并通过\
  \ `init` 方法中的 `MockRestServiceServer.createServer(restTemplate)` 调用进行初始化。清单 4-41\
  \ 展示了 `POST` 请求的测试。\n\n***清单 4-41***. 客户端 POST 测试 (0404-rest-boot-client)\n\n```\n\
  @Test\npublic void testPost() throws Exception {\n  // GIVEN\n  URI expectedUri\
  \ = new URI(USERS_URL + \"/0\");\n  mockServer.expect(requestTo(USERS_URL))\n    .andExpect(method(HttpMethod.POST))\n\
      .andExpect(jsonPath(\"$.email\", is(USER0_EMAIL)))\n    .andExpect(jsonPath(\"\
  $.name\", is(USER0_NAME)))\n    .andRespond(withCreatedEntity(expectedUri));\n\n\
  User user = new User();\n  user.setName(USER0_NAME);\n  user.setEmail(USER0_EMAIL);\n\
  \n// WHEN\n  URI location = usersClient.createUser(user);\n\n// THEN\n  assertEquals(location,\
  \ expectedUri);\n  mockServer.verify();\n}\n```\n\n首先，我们创建测试 URI。然后使用 `mockServer`\
  \ 记录预期请求消息的 URI、负载和 HTTP 方法。我们还通过 location 头部和成功 HTTP 状态码记录了模拟服务器的响应。`MockRestResponseCreators.withCreatedEntity`\
  \ 旨在模拟 201 Created 响应并返回 `Location` 头部。这就是为什么你主要会在测试 `POST` 请求时看到这种结构。\n\n接着创建测试用的\
  \ `User` 对象。该对象通过测试逻辑 `usersClient.createUser` 发送到模拟服务器。完成测试设置后，我们可以执行这个测试逻辑。它应该返回所创建对象的\
  \ URI 位置。\n\n在测试的验证阶段，我们将返回的 location 与预期的 location 进行比较。我们还需要使用 `mockServer.verify()`\
  \ 来确保记录的请求按预期发生。清单 4-42 中的测试涵盖了单个 `GET` 请求。\n\n***清单 4-42***. 客户端单次 GET 测试 (0404-rest-boot-client)\n\
  \n```\n@Test\npublic void testSingleGet() throws Exception {\n  // GIVEN\n  int\
  \ testingIdentifier = 0;\n  mockServer.expect(requestTo(USERS_URL + \"/\" + testingIdentifier))\n\
      .andExpect(method(HttpMethod.GET))\n    .andRespond(withSuccess(TEST_RECORD0,\
  \ MediaType.APPLICATION_JSON));\n\n// WHEN\n  User user = usersClient.getUser(testingIdentifier);\n\
  \n// THEN\n  mockServer.verify();\n  assertEquals(user.getName(), USER0_NAME);\n\
    assertEquals(user.getEmail(), USER0_EMAIL);\n}\n```\n\n针对 URI `/users/0` 的预期 `GET`\
  \ 请求被记录到模拟服务器中。我们还返回了属于测试标识符 `0` 的对象的 JSON 表示。测试逻辑 `usersClient.getUser` 应返回给定测试标识符对应的\
  \ `User` 对象。\n\n在验证阶段，我们验证请求已从测试逻辑正确发送，并验证接收到的对象包含我们期望的字段。清单 4-43 测试了多条记录的 `GET`\
  \ 请求。\n\n***清单 4-43***. 客户端多次 GET 测试 (0404-rest-boot-client)\n\n```\n@Test\npublic\
  \ void testMultiGet() throws Exception {\n  // GIVEN\n  mockServer.expect(requestTo(USERS_URL))\n\
      .andExpect(method(HttpMethod.GET))\n    .andRespond(withSuccess(\"[ \" + TEST_RECORD0\
  \ + \", \" + TEST_RECORD1 + \"]\",\n        MediaType.APPLICATION_JSON));\n\n//\
  \ WHEN\n  List<User> users = usersClient.getUsers();\n\n// THEN\n  mockServer.verify();\n\
    assertEquals(users.get(0).getName(), USER0_NAME);\n  assertEquals(users.get(0).getEmail(),\
  \ USER0_EMAIL);\n  assertEquals(users.get(1).getName(), \"User1\");\n  assertEquals(users.get(1).getEmail(),\
  \ \"user1@gmail.com\");\n}\n```\n\n我们预期针对 `/users` URI 的 `GET` 请求。模拟响应是一个包含两条记录的\
  \ JSON 数组。在这种情况下，测试逻辑（`usersClient.getUsers`）不接收任何参数。但它应返回所有 `User` 对象的集合。*所有* 在这里指的是我们在模拟\
  \ JSON 响应中发送的两个对象。\n\n验证再次包括请求检查。最后，我们验证返回的集合包含预期的 `User` 对象。清单 4-44 测试了 `PUT` 方法。\n\
  \n***清单 4-44***. 客户端 PUT 测试 (0404-rest-boot-client)\n\n```\n@Test\npublic void testPut()\
  \ throws Exception {\n  // GIVEN\n  mockServer.expect(requestTo(USERS_URL + \"/0\"\
  ))\n    .andExpect(method(HttpMethod.PUT))\n    .andExpect(jsonPath(\"$.email\"\
  , is(USER0_EMAIL)))\n    .andExpect(jsonPath(\"$.name\", is(USER0_NAME)))\n    .andRespond(withSuccess());\n\
  \nUser user = new User();\n  user.setName(USER0_NAME);\n  user.setEmail(USER0_EMAIL);\n\
  \n// WHEN\n  usersClient.updateOrCreateUser(0, user);\n\n// THEN\n  mockServer.verify();\n\
  }\n```\n\n与之前的测试类似，我们预期一个针对 `/users/0` URI 且请求体中包含特定内容的 PUT 请求。模拟服务器的预期响应是 200 OK。\n\
  \n被测试的方法是 `UsersClient.updateOrCreateUser`。标识符和 `User` 对象作为参数传递给测试方法。\n\n在测试结束时，我们需要调用\
  \ `mockServer.verify`，以确保客户端逻辑按预期运行。接下来，清单 4-45 包含了 HTTP `DELETE` 客户端测试。\n\n***清单\
  \ 4-45***. 客户端 DELETE 测试 (0404-rest-boot-client)\n\n```\n@Test\npublic void testDeleteUser()\
  \ throws Exception {\n  // GIVEN\n  //@formatter:off\n  int testingIdentifier = 1;\n\
    mockServer.expect(requestTo(USERS_URL + \"/\" + testingIdentifier))\n    .andExpect(method(HttpMethod.DELETE))\n\
      .andRespond(withSuccess());\n  //@formatter:on\n\n// WHEN\n  usersClient.deleteUser(testingIdentifier);\n\
  \n// THEN\n  mockServer.verify();\n}\n```\n\n`mockServer` 中记录的请求现在是针对 URI `/users/0`\
  \ 的 `DELETE` 请求。模拟响应以 HTTP 状态 200 OK 返回。测试逻辑应删除 ID 为 `0` 的 `User` 对象。验证阶段检查请求是否按预期发送。\n\
  \n这个集成测试中的最后一个测试方法测试了错误处理，见清单 4-46。\n\n***清单 4-46***. 客户端错误处理测试 (0404-rest-boot-client)\n\
