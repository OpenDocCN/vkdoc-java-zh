  \n我们通常需要监控并手动控制批处理。例如，由于之前损坏的数据已手动修复，我们可能需要重启某个 `JobExecution`。为此，SB 提供了一个名为 Spring\
  \ Batch Admin 的项目（`http://docs.spring.io/spring-batch-admin`）。\n\n这是一个 Web 应用程序，可以嵌入到我们的批处理应用程序中，用于控制和监控批处理。由于它是一个\
  \ Web 组件，需要托管在 Servlet 容器中。我们可以使用 `spring-batch-admin-manager` 和 `spring-batch-admin-resources`，并将\
  \ `Job` 的 XML 配置放置在 `META-INF/spring/batch/jobs` 目录下。\n\n为了介绍 Spring Batch Admin\
  \ 的功能，我们将使用一个可从 Spring Batch Admin 网站（`http://docs.spring.io/downloads/nightly/release-download.php?project=BATCHADM`）下载的示例应用程序。本示例中我们使用的版本是\
  \ 1.3.1.RELEASE。当我们在本地端口为 8080 的 Servlet 容器中运行此应用程序时（例如，在 STS 中使用默认的 Pivotal tc\
  \ Server），我们可以在浏览器中输入 `http://localhost:8080/spring-batch-admin-sample` 地址来控制批处理。\n\
  \n![Image](img/sq.jpg) **注意**  以下所有图片均来自 spring.io 网站 `http://docs.spring.io/spring-batch-admin/screenshots.html`。\n\
  \n图 9-11 展示了如何浏览批处理应用程序中可用的作业，以及它们的主要属性和统计信息。图 9-12 展示了单个作业的界面。\n\n![9781484207949_Fig09-11.jpg](img/9781484207949_Fig09-11.jpg)\n\
  \n图 9-11. Spring Batch Admin 的作业视图\n\n![9781484207949_Fig09-12.jpg](img/9781484207949_Fig09-12.jpg)\n\
  \n图 9-12. Spring Batch Admin 的单个作业视图\n\n在此界面中，我们可以运行作业并为 `JobInstance` 指定参数。我们还可以查看过去或正在运行的作业实例，包括它们的状态和主要统计信息。\n\
  \n图 9-13 展示了作业执行界面。\n\n![9781484207949_Fig09-13.jpg](img/9781484207949_Fig09-13.jpg)\n\
  \n图 9-13. Spring Batch Admin 的作业执行界面\n\n在此界面中，我们可以观察过去和当前的 `JobExecution` 实例及其状态和统计信息。我们还可以通过点击“停止全部”按钮来终止所有执行。\n\
  \n图 9-14 展示了单个 `JobExecution` 的界面。\n\n![9781484207949_Fig09-14.jpg](img/9781484207949_Fig09-14.jpg)\n\
  \n\n\n图 9-14. Spring Batch Admin 中无错误的单个 JobExecution 界面\n\n在此界面上，我们可以看到具体 `JobExecution`\
  \ 实例的统计数据。我们还可以通过点击“停止”按钮来终止该实例。\n\n图 9-15 展示了包含错误的单个 `JobExecution` 界面。\n\n![9781484207949_Fig09-15.jpg](img/9781484207949_Fig09-15.jpg)\n\
  \n图 9-15. Spring Batch Admin 中包含错误的单个 `JobExecution` 界面\n\n在这里，Spring Batch Admin\
  \ 可以为我们提供 `JobExecution` 中发生错误的堆栈跟踪信息。\n\n图 9-16 展示了面向块的 `StepExecution` 界面。在这里，我们可以看到面向块处理的\
  \ `Step` 的 `StepExecution` 的所有统计数据。\n\n![9781484207949_Fig09-16.jpg](img/9781484207949_Fig09-16.jpg)\n\
  \n图 9-16. Spring Batch Admin 的面向块的 StepExecution 界面\n\n总结\n\n本章重点介绍了企业中的后台处理，Spring\
  \ Batch 框架在其中占据着独特地位，它是 Java 世界中首批抽象之一，也是 JEE 7 批处理标准的参考实现。\n\n我们介绍了 Spring Batch\
  \ 领域，其核心支柱是 `Job` 和 `Step`。面向块的处理是处理批处理需求最常用的机制，但我们也可以选择使用 `Tasklet`，这是一种执行批处理工作的单次任务。\n\
  \n我们展示了以编程方式和从命令行运行作业的各种选项，以及使用参数执行 `Job` 的可能性。为了实现状态共享，我们演示了如何在 Spring Batch 构造之间传递\
  \ `ExecutionContext`。我们还介绍了特殊的 Spring Batch 作用域，作为 `ExecutionContext` 方法的替代方案。\n\
  \n接下来，我们探讨了拦截 Spring Batch 框架处理的丰富可能性，以及如何打开/关闭/更新第三方资源。`Job` 和 `Step` 的继承允许我们整合\
  \ Spring Batch 的 XML 配置。后续章节深入探讨了控制 Spring Batch 流程的机制，以重复某些任务、执行条件 `Step` 以及对错误做出反应。\n\
