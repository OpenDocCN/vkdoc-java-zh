  如您所见，这个配置密集型的示例也体现在输出密集型的清单中。但如果您仔细逐步分析，就会发现拦截操作正如我们所预期的那样发生。\n\n面向块处理监听器的 Java\
  \ 配置\n\n在这个示例中，我们省略冗长的监听器实现。`Chunk`、`ItemReader`、`ItemProcessor` 和 `ItemWriter`\
  \ 的监听器并未实现接口，而是使用了注解。这种方法的不同之处在于，我们不必强制注入任何参数，并且可以自由地为拦截方法命名。如果您对这些监听器的定义方式感兴趣，可以查看\
  \ `0922-chunk-listener-javaconfig` 示例。清单 9-85 展示了 Java 配置。\n\n***清单 9-85***. 面向块处理监听器示例的\
  \ Java 配置 (0922-chunk-listener-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\nimport net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\n\
  import net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n\
    public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n      SimpleRecordReader\
  \ simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n      SimpleRecordWriter\
  \ simpleRecordWriter,\n      SimpleItemReaderListener simpleItemReaderListener,\n\
        SimpleItemProcessListener simpleItemProcessListener,\n      SimpleItemWriterListener\
  \ simpleItemWriterListener,\n      SimpleChunkListener simpleChunkListener) {\n\
      return stepBuilderFactory.get(\"simpleRecordsStep\")\n        .<String, String>\
  \ chunk(4)\n        .reader(simpleRecordReader)\n        .listener(simpleItemReaderListener)\n\
          .processor(simpleRecordProcessor)\n        .listener(simpleItemProcessListener)\n\
          .writer(simpleRecordWriter)\n        .listener(simpleItemWriterListener)\n\
          .listener(simpleChunkListener)\n        .build();\n  }\n\n@Bean\n  public\
  \ Job simpleRecordsJob(JobBuilderFactory jobBuilderFactory,\n      Step simpleRecordsStep)\
  \ {\n    return jobBuilderFactory.get(\"simpleRecordsJob\")\n        .start(simpleRecordsStep)\n\
          .build();\n  }\n}\n```\n\n`Step` 定义中注入的 bean 数量远远超出了合理的参数数量。但因为我们想重点展示如何配置所有监听器类型，所以请暂时忽略这一点。注册顺序无关紧要，因为监听器针对的是批处理的不同阶段。如果我们为同一个批处理阶段注册了多个监听器，它们将按照注册顺序执行。\n\
  \n主类再次复用了之前示例中的代码，当我们运行它时，会得到与之前示例（清单 9-84）相同的输出。\n\nItemStream\n\n面向块的处理通常需要获取、更新和释放资源。当然，Spring\
  \ 会尝试为我们处理大部分此类操作。例如，打开和关闭 JMS 或数据库连接。\n\n但对于某些技术，Spring 并不会为我们处理资源的打开和关闭。这些资源通常以流的形式存在，因此\
  \ SB 提出了 `ItemStream` 这个名称。如果在面向块的处理中需要打开、更新或关闭此类资源，我们可以依赖 SB 的这一特性。我们可以将其视为一个特殊的拦截器，在适当的时机执行以打开或关闭资源。\n\
  \n这种支持有三种形式：\n\n*   `ItemStream`：独立接口，定义了 `open`、`update` 和 `close` 操作作为拦截点。其优点在于我们可以独立于\
  \ `ItemReader` 和 `ItemWriter` 使用此实现。\n*   `ItemStreamReader<T>`：`ItemReader<T>`\
  \ 和 `ItemStream` 的便捷子接口。其优点在于可以直接将 `ItemReader` 定义为一个具有流感知能力的 SB 组件。\n*   `ItemStreamWriter<S>`：`ItemWriter<S>`\
  \ 和 `ItemStream` 的便捷子接口。其优点在于可以直接将 `ItemWriter` 定义为一个具有流感知能力的 SB 组件。\n\n请注意，`ItemStreamWriter<S>`\
  \ 使用的泛型占位符 `S` 与 `ItemStreamReader<T>` 不同。这是因为我们遵循 `ItemProcessor<T, S>` 的概念，其中\
  \ `T` 是处理传入处理器之前的类型，`S` 是处理从处理器返回之后的类型。因此，本书中处理后的泛型类型使用占位符 `S` 标记。\n\nItemStream\
  \ 使用的 XML 示例\n\n清单 9-86 展示了 `ItemStream` 接口的独立实现。\n\n***清单 9-86***. ItemStream 接口的独立实现\
  \ (0923-item-stream-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\nimport\
  \ net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.batch.item.ExecutionContext;\n\
  import org.springframework.batch.item.ItemStream;\nimport org.springframework.batch.item.ItemStreamException;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class RecordsReaderItemStream implements ItemStream {\n  private\
  \ SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public RecordsReaderItemStream(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public void open(ExecutionContext executionContext)\n      throws\
  \ ItemStreamException {\n    executablePoint.execute(\"Opening records reader\"\
  );\n  }\n\n@Override\n  public void update(ExecutionContext executionContext)\n\
        throws ItemStreamException {\n    executablePoint.execute(\"Updating records\
  \ reader\");\n  }\n\n@Override\n  public void close() throws ItemStreamException\
  \ {\n    executablePoint.execute(\"Closing records reader\");\n  }\n}\n```\n\n使用此接口，我们需要实现针对流所需的所有三种可能操作。为简单起见，我们没有使用真实的资源，而是模拟了针对公共执行点的操作。在实际应用中，我们会打开、更新或关闭真实资源。清单\
  \ 9-87 展示了 `ItemStreamWriter<T>` 的实现。\n\n***清单 9-87***. ItemStreamWriter<S> 实现 (0923-item-stream-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport java.util.List;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  import net.lkrnac.book.eiws.chapter09.write.WriteRepository;\nimport org.springframework.batch.item.ExecutionContext;\n\
  import org.springframework.batch.item.ItemStreamException;\nimport org.springframework.batch.item.ItemStreamWriter;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class StreamRecordWriter implements ItemStreamWriter<String>\
  \ {\n  private WriteRepository writeRepository;\n  private SimpleExecutablePoint\
  \ executablePoint;\n\n\n\n@Autowired\n  public StreamRecordWriter(WriteRepository\
  \ writeRepository,\n      SimpleExecutablePoint executablePoint) {\n    super();\n\
      this.writeRepository = writeRepository;\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public void write(List<? extends String> items) throws Exception\
  \ {\n    writeRepository.writeRecords(items);\n  }\n\n@Override\n  public void open(ExecutionContext\
  \ executionContext)\n      throws ItemStreamException {\n    executablePoint.execute(\"\
  Opening records writer\");\n  }\n\n@Override\n  public void update(ExecutionContext\
  \ executionContext)\n      throws ItemStreamException {\n    executablePoint.execute(\"\
  Updating records writer\");\n  }\n\n@Override\n  public void close() throws ItemStreamException\
  \ {\n    executablePoint.execute(\"Closing records writer\");\n  }\n}\n```\n\n由于\
  \ `ItemStreamWriter<String>` 的实现将 `ItemWriter<String>` 与 `ItemStream` 接口相结合，我们需要实现\
  \ `write()`、`open()`、`update()` 和 `close()` 方法。为了模拟 `ItemStream` 的生命周期操作，我们需要注入\
  \ `SimpleExecutablePoint` 实例。为了在 `write()` 方法中写入条目，我们需要 `WriteRepository` 实例。清单\
  \ 9-88 展示了这些流处理器的 XML 配置。\n\n***清单 9-88***. ItemStream 的 XML 配置（文件位于示例项目 0923-item-stream-xml\
  \ 的 src/main/resource 文件夹中的 batch-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n  http://www.springframework.org/schema/batch/spring-batch.xsd\n\
    http://www.springframework.org/schema/beans\n  http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"simpleRecordsJob\">\n    <step id=\"simpleRecordsStep\">\n      <tasklet>\n\
          <chunk reader=\"simpleRecordReader\" writer=\"streamRecordWriter\"\n          processor=\"\
  simpleRecordProcessor\" commit-interval=\"4\" >\n          <streams>\n            <stream\
  \ ref=\"recordsReaderItemStream\"/>\n          </streams>\n        </chunk>\n      </tasklet>\n\
      </step>\n  </job>\n</beans:beans>\n```\n\n作为写入器，我们使用 `streamRecordWriter` bean，它知道资源并能处理其模拟的生命周期。对于其他块处理器，我们使用通用的\
  \ `simpleRecordReader` 和 `simpleRecordProcessor` bean。独立的 `recordsReaderItemStream`\
  \ 需要通过 `<streams>` XML 标签进行注册。我们再次使用通用的 `BatchConfiguration` 类将此 XML 配置导入到组件扫描和\
  \ `@EnableBatchProcessing` 中。当我们使用通用的 Spring Boot 主类运行此示例时，会得到清单 9-89 中的输出。\n\n\
