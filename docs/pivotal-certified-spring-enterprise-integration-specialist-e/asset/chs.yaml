  \ `Step` 创建链中包含 `faultTolerant()` 调用，以便配置 `skipLimit()` 和要跳过的异常 `skip()`。*SkipListener*\
  \ 最后在 `faultTolerant()` 部分中进行配置。\n\n运行此示例时，其行为与清单 9-105 中的前一个示例完全相同。\n\n重试的 XML\
  \ 配置\n\n此示例使用通用的 tasklet 来读取和处理项目。写入器 tasklet 复用了前一个示例（清单 9-102），模拟了前两次写入尝试的错误。清单\
  \ 9-107 展示了重试监听器。\n\n***清单 9-107***. 重试监听器实现 (0931-retry-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.retry.RetryCallback;\nimport org.springframework.retry.RetryContext;\n\
  import org.springframework.retry.listener.RetryListenerSupport;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleRetryListener extends RetryListenerSupport {\n\
    private SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public SimpleRetryListener(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public <T, E extends Throwable> void onError(RetryContext context,\n\
        RetryCallback<T, E> callback, Throwable throwable) {\n    executablePoint.execute(\"\
  Error occurred, retrying write of items\");\n  }\n}\n```\n\n\n\n我们只对`onError`拦截感兴趣，因此我们扩展了`org.springframework.retry.RetryListenerSupport`，将其作为`org.springframework.retry.RetryListener`的一个便捷空实现。如果我们直接实现`org.springframework.retry.RetryListener`，还需要同时实现`close()`和`open()`拦截方法。清单\
  \ 9-108 展示了 XML 配置。\n\n***清单 9-108***. 重试的 XML 配置（文件位于示例项目 0931-retry-xml 的 src/main/resource\
  \ 文件夹中的 batch-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans:beans\
  \ xmlns:beans=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns=\"http://www.springframework.org/schema/batch\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"simpleRecordsJob\">\n    <step id=\"simpleRecordsStep\">\n      <tasklet>\n\
          <chunk reader=\"simpleRecordReader\" writer=\"simpleRecordWriter\"\n          processor=\"\
  simpleRecordProcessor\" commit-interval=\"4\" retry-limit=\"3\">\n          <retryable-exception-classes>\n\
              <include class=\"java.lang.IllegalStateException\"/>\n          </retryable-exception-classes>\n\
            <retry-listeners>\n            <listener ref=\"simpleRetryListener\"/>\n\
            </retry-listeners>\n        </chunk>\n      </tasklet>\n    </step>\n\
    </job>\n</beans:beans>\n```\n\n我们允许每个项目重试三次，这由`<chunk>`的`retry-limit`属性指定。如果超过此重试限制，则会抛出异常。在这种情况下，`StepExecution`和`JobExecution`将失败。\n\
  \n`<retryable-exception-classes>`子元素定义了我们允许重试的异常列表。`<retry-listeners>`标签定义了一个重试监听器列表，在本例中只有我们的`simpleRetryListener`。与`Skip`功能类似，我们可以结合使用`<include>`和`<exclude>`标签来微调我们感兴趣的异常。与`Skip`示例一样，我们将此功能留待您自行实验。\n\
