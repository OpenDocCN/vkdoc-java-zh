  \ Spring 注解。首先，我们为重复出现的字面量声明常量。`createTestUser` 方法创建用于测试的 `User` 对象实例，而 `createTestRecord`\
  \ 方法则以纯 JSON 格式创建类似的表示。\n\nPOST 的 MockMvc 示例\n\n清单 4-30 中的测试方法涵盖了 `POST` 请求的测试。\n\
  \n***清单 4-30***. HTTP POST 单元测试 (0403-rest-java-config-server)\n\n```\n@Test\npublic\
  \ void testPost() throws Exception {\n  // 前置条件\n  UserService userService = Mockito.mock(UserService.class);\n\
    UserController userController = new UserController(userService);\n  MockMvc mockMvc\
