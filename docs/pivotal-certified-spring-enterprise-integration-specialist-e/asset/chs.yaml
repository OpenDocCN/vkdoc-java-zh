  \ Java 配置。\n\n***清单 9-96***. 用于演示重试的 Java 配置\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddWater;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
  @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
  \ boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater) {\n    return\
  \ stepFactory.get(\"boilWaterStep\")\n        .tasklet(boilWater)\n        .allowStartIfComplete(true)\n\
  \        .build();\n  }\n\n@Bean\n  public Step addTeaStep(StepBuilderFactory stepFactory,\
  \ AddTea addTea) {\n    return stepFactory.get(\"addTeaStep\")\n        .tasklet(addTea)\n\
  \        .allowStartIfComplete(true)\n        .startLimit(2)\n        .build();\n\
  \  }\n\n\n\n@Bean\n  public Step addWaterStep(StepBuilderFactory stepFactory, AddWater\
  \ addWater) {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n\
    }\n\n@Bean\n  public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n\
        @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n      @Qualifier(\"addTeaStep\"\
  ) Step addTeaStep,\n      @Qualifier(\"addWaterStep\") Step addWaterStep) {\n    return\
  \ jobBuilderFactory.get(\"prepareTeaJob\")\n        .start(boilWaterStep)\n        .next(addTeaStep)\n\
          .next(addWaterStep)\n        .build();\n  }\n\n@Bean\n  public Job prepareTeaJobNotRestartable(JobBuilderFactory\
  \ jobBuilderFactory,\n      @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n\
        @Qualifier(\"addTeaStep\") Step addTeaStep,\n      @Qualifier(\"addWaterStep\"\
  ) Step addWaterStep) {\n    Job job = jobBuilderFactory.get(\"prepareTeaJobNotRestartable\"\
  )\n        .start(boilWaterStep)\n        .next(addTeaStep)\n        .next(addWaterStep)\n\
          .preventRestart()\n        .build();\n    return job;\n  }\n}\n```\n\n允许重启并定义重启限制是在构建`Step`时完成的。禁止`Job`重启则是通过调用`preventRestart()`实现的。此示例还使用了常见的\
  \ Spring Boot 主类，其输出与之前的示例（清单 9-95）相同。\n\n控制步骤执行的重复\n\n有时我们需要以编程方式决定`Step`是否需要重复执行。我们可以根据`Tasklet`返回的`RepeatStatus`来控制这一方面。清单\
  \ 9-97 展示了驱动`Step`重复逻辑的 Bean。\n\n***清单 9-97***. 决定步骤是否需要重复的作业作用域 Bean (0928-repeat)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.step.tea;\nimport org.springframework.batch.core.configuration.annotation.JobScope;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\n\
  import org.springframework.stereotype.Component;\n\n@JobScope\n@Component\npublic\
  \ class SugarCounter {\n  private int currentSugarCount;\n  private int desiredSugarAmount;\n\
  \n@Autowired\n  public SugarCounter(@Value(\"#{jobParameters[sugarAmount]}\") int\
  \ desiredSugarAmount) {\n    super();\n    this.desiredSugarAmount = desiredSugarAmount;\n\
      this.currentSugarCount = 0;\n  }\n\npublic boolean addSugar() {\n    boolean\
  \ result = currentSugarCount < desiredSugarAmount;\n    currentSugarCount++;\n    return\
  \ result;\n  }\n}\n```\n\n作为一个带有`@JobScope`注解的 Spring 组件，其实例仅在一次`JobExecution`中存活。*JobScope*还允许我们使用延迟绑定，并检索名为`sugarAmount`的作业参数。我们将其存储起来，并将`currentSugarCount`初始化为`0`。清单\
  \ 9-98 展示了`AddSugar`步骤的实现。\n\n***清单 9-98***. 可重复步骤的实现 (0928-repeat)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter09.step.tea;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  import org.springframework.batch.core.StepContribution;\nimport org.springframework.batch.core.scope.context.ChunkContext;\n\
  import org.springframework.batch.core.step.tasklet.Tasklet;\nimport org.springframework.batch.repeat.RepeatStatus;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class AddSugar implements Tasklet {\n  private SimpleExecutablePoint\
  \ simpleExecutableStep;\n  private SugarCounter sugarCounter;\n\n@Autowired\n  public\
  \ AddSugar(SimpleExecutablePoint simpleExecutableStep,\n      SugarCounter sugarCounter)\
  \ {\n    super();\n    this.simpleExecutableStep = simpleExecutableStep;\n    this.sugarCounter\
  \ = sugarCounter;\n  }\n\n@Override\n  public RepeatStatus execute(StepContribution\
  \ contribution,\n      ChunkContext chunkContext) throws Exception {\n    if (sugarCounter.addSugar())\
  \ {\n      simpleExecutableStep.execute(\"添加一勺糖\");\n      return RepeatStatus.CONTINUABLE;\n\
      } else {\n      return RepeatStatus.FINISHED;\n    }\n  }\n}\n```\n\n我们注入通用的`SimpleExecutionPoint`来模拟操作。第二个注入包含了我们在上一个清单中定义的`SugarCounter`。这个\
  \ Bean 用于决定我们是否向茶中添加一勺糖，以及是否应该重复执行作业。如果我们返回`ReturnStatus.CONTINUABLE`，此步骤将再次执行。当逻辑返回`RepeatStatus.FINISHED`时，此步骤将不再执行。\n\
  \n此示例中的`BatchConfiguration`是一个由`BoilWater`、`AddTea`、`AddWater`和`AddSugar`这些 tasklet\
  \ 组成的简单流程。由于此配置非常直接，并且我们在本章前面已经见过类似的配置，因此这里不再赘述。清单 9-99 展示了此示例的主类。\n\n***清单 9-99***.\
  \ 重复示例的主类 (0928-repeat)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\nimport\
