  \ [{}] and the following status: [COMPLETED]\n17:37:46.830 [main] INFO  n.l.b.e.chapter09.BatchApplication\
  \ - Exit Status: COMPLETED\n```\n\n在启动 `Job` 后立即记录的退出状态是 `STARTING`，10 毫秒后变为 `STARTED`。请注意，`Job`\
  \ 执行的日志条目来自 `customTaskExecutor` 线程池。500 毫秒后，在调用者线程中，作业状态也变为 `COMPLETED`。\n\nJobParameters\n\
  \n通常需要向批处理 `Job` 传递参数。假设我们需要处理带有属性“创建日期”的数据。我们可能希望为批处理指定一个日期参数，以便只处理在指定日期创建的数据。\n\
  \nSB 通过 `JobParameters` 类提供此支持，该类可以传递给 `JobLauncher.run()` 方法。此类将参数封装到 `Map<String,\
  \ JobParameter>` 中。因此，每个参数都有其名称（键），值可以是任何 Java 类型。请注意，映射中的值是 `JobParameter`（单数）类型，它代表单个批处理\
  \ `Job` 参数。`JobParameters`（复数）代表一个 `JobInstance` 的所有参数。\n\n\n\n在`JobParameters`示例中，我们稍微调整了泡茶流程。现在往茶杯里加些糖。清单\
  \ 9-31 展示了使用`JobParameter`的`Tasklet`。\n\n***清单 9-31***. JobParameter 检索 (0909-job-parameters)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.step.tea;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  import org.springframework.batch.core.StepContribution;\nimport org.springframework.batch.core.scope.context.ChunkContext;\n\
  import org.springframework.batch.core.step.tasklet.Tasklet;\nimport org.springframework.batch.repeat.RepeatStatus;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class AddTeaWithParameter implements Tasklet {\n  private SimpleExecutablePoint\
  \ simpleExecutableStep;\n\n@Autowired\n  public AddTeaWithParameter(SimpleExecutablePoint\
  \ simpleExecutableStep) {\n    super();\n    this.simpleExecutableStep = simpleExecutableStep;\n\
    }\n\n@Override\n  public RepeatStatus execute(StepContribution contribution,\n\
        ChunkContext chunkContext) throws Exception {\n    String sugarAmount = chunkContext.getStepContext().getStepExecution()\n\
          .getJobParameters().getString(\"sugarAmount\");\n    String stepSuffix = (sugarAmount\
  \ == null) ? \"\" : \" with \" + sugarAmount;\n    simpleExecutableStep.execute(\"\
  Add Tea\" + stepSuffix);\n    return RepeatStatus.FINISHED;\n  }\n}\n```\n\n在这个泡茶`Tasklet`中，我们使用`chunkContext`实例来访问`JobParameters`实例，并检索名为`sugarAmount`的参数。该参数指定了调用者想要往茶杯里加多少糖。同样，我们通过执行`simpleExecutableStep`实例来模拟该操作。完成后，我们将`Step`标记为`FINISHED`。清单\
  \ 9-32 展示了批处理配置。\n\n***清单 9-32***. JobParameters 示例的批处理配置 (0909-job-parameters)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddTeaWithParameter;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;\nimport net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
  @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
  \ boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater) {\n    return\
  \ stepFactory.get(\"boilWaterStep\").tasklet(boilWater).build();\n  }\n\n@Bean\n\
    public Step addTeaStep(StepBuilderFactory stepFactory, AddTeaWithParameter addTea)\
  \ {\n    return stepFactory.get(\"addTeaStep\").tasklet(addTea).build();\n  }\n\n\
  @Bean\n  public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)\
  \ {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n  }\n\
  \n@Bean\n  public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n      @Qualifier(\"\
  boilWaterStep\") Step boilWaterStep,\n      @Qualifier(\"addTeaStep\") Step addTeaStep,\n\
        @Qualifier(\"addWaterStep\") Step addWaterStep) {\n    return jobBuilderFactory.get(\"\
  prepareTeaJob\")\n        .start(boilWaterStep)\n        .next(addTeaStep)\n        .next(addWaterStep)\n\
          .build();\n  }\n}\n```\n\n在这个批处理流程中，我们使用`AddTeaWithParameter`代替了`AddTea`。除此之外，批处理流程与之前的示例完全相同。清单\
  \ 9-33 展示了此示例的主类。\n\n***清单 9-33***. JobParameters 示例的主类 (0909-job-parameters)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter09;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobExecution;\n\
  import org.springframework.batch.core.JobParameters;\nimport org.springframework.batch.core.JobParametersBuilder;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ConfigurableApplicationContext;\n\
  \n@Slf4j\n@SpringBootApplication\npublic class BatchApplication {\n  public static\
  \ void main(String[] args) throws Exception {\n    ConfigurableApplicationContext\
  \ context =\n        SpringApplication.run(BatchApplication.class, args);\n\nJobLauncher\
  \ jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n    Job job = (Job)\
  \ context.getBean(\"prepareTeaJob\");\n\nJobParameters jobParameters1 = createJobParameters(\"\
  no sugar\");\n    JobExecution execution1 = jobLauncher.run(job, jobParameters1);\n\
      log.info(\"Exit Status: {}\", execution1.getStatus());\n\nJobParameters jobParameters2\
  \ = createJobParameters(\"two spoons of sugar\");\n    JobExecution execution2 = jobLauncher.run(job,\
  \ jobParameters2);\n    log.info(\"Exit Status: {}\", execution2.getStatus());\n\
      context.close();\n  }\n\npublic static JobParameters createJobParameters(String\
  \ sugarAmountValue) {\n    return new JobParametersBuilder()\n        .addString(\"\
  sugarAmount\", sugarAmountValue)\n        .toJobParameters();\n  }\n}\n```\n\n当我们创建\
  \ Spring 上下文实例并检索`JobLauncher`和`Job`后，我们多次执行`prepareTeaJob`作业。`createJobParameters`方法帮助我们创建包含名为`sugarAmount`参数的`JobParameters`实例。第一次执行时不加糖，第二次泡茶时加两勺糖。每次执行的状态都会被打印出来，程序结束时关闭\
  \ Spring 上下文。清单 9-34 展示了 Spring Boot 配置文件。\n\n***清单 9-34***. 通过 Spring Boot 关闭 SB\
  \ 作业的默认执行 (文件 application.properties 位于示例项目 0909-job-parameters 的 src/main/properties\
  \ 文件夹)\n\n```\nspring.batch.job.enabled=false\n```\n\n默认情况下，启用自动配置的 Spring Boot\
  \ 会执行它找到的所有 SB `Job`。但在本例中，我们不想运行没有参数的默认作业，因为我们希望显式地使用参数来执行它们。因此，需要此配置来禁用 Spring\
  \ Boot 自动配置对 SB 作业的自动执行。清单 9-35 展示了运行此示例时的输出。\n\n***清单 9-35***. JobParameters 示例的输出\n\
