  \ {\n    executablePoint.execute(\"涉及热水操作的步骤已完成\");\n    return ExitStatus.COMPLETED;\n\
    }\n}\n```\n\n由于我们实现了 `StepExecutionListener`，因此无法更改拦截方法的名称，因为它们需要与此接口中的签名匹配。签名还包括\
  \ `StepExecution` 类型的参数。在我们的示例中未使用它，但它可用于在监听器中访问 SB 元数据。清单 9-75 展示了使用此监听器的 XML 配置。\n\
