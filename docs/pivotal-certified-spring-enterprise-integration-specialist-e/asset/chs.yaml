  该接口被标记为连接到 `inChannel` 的入站消息网关。它会返回一个值，因此我们再次面临流的请求-响应场景。清单 8-74 展示了路由逻辑。  \n\n\
  ***清单 8-74***. 使用 Java 配置的路由逻辑（0819-router-javaconfig）  \n\n```  \npackage net.lkrnac.book.eiws.chapter08;\
  \  \nimport org.springframework.beans.factory.annotation.Autowired;  \nimport org.springframework.integration.annotation.MessageEndpoint;\
  \  \nimport org.springframework.integration.annotation.Router;  \nimport org.springframework.messaging.MessageChannel;\
  \  \n\n@MessageEndpoint  \npublic class SimpleRouter {  \n  private MessageChannel\
  \ route1Channel;  \n  private MessageChannel route2Channel;  \n\n@Autowired  \n\
  \  public SimpleRouter(MessageChannel route1Channel,  \n      MessageChannel route2Channel)\
  \ {  \n    super();  \n    this.route1Channel = route1Channel;  \n    this.route2Channel\
  \ = route2Channel;  \n  }  \n\n@Router(inputChannel = \"inChannel\")  \n  public\
  \ MessageChannel route(String message) {  \n    return (message.contains(\"1\")\
  \ ? route1Channel : route2Channel);  \n  }  \n}  \n```  \n\n路由器类通过 SI 的 `@MessageEndpoint`\
  \ 注解进行标注，以便 SI 框架进行组件扫描。我们需要注入将要路由到的两个通道实例。路由方法需要使用 `@Router` 注解，并且必须指定 `inputChannel`\
  \ 属性，以便从中消费消息。路由逻辑本身基于消息中是否包含子字符串 `1`。返回的通道实例将用于在流中进一步传递消息。清单 8-75 展示了此示例的主类。  \n\
