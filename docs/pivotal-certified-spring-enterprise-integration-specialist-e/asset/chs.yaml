  \n图 8-12. 拆分器示例的 SI 图\n\n### 使用 Java 配置的拆分器示例\n\n此示例将使用与前一个示例 `0825-splitter-delimiters-xml`\
  \ 类似的结构。为避免重复展示冗长的代码清单，我们将列出相似的类：\n\n*   `WriteServiceAnnotated`：一个 Java 实现，类似于清单\
  \ 8-91 中的 `WriteService`，*仅有一处不同：* `WriteServiceAnnotated.writeAndIndicateSuccess()`\
  \ 方法使用了 `@ServiceActivator` 注解，并连接到 `splitChannel`。\n*   `SiWrapperServiceAnnoated`：与通用的\
  \ `SiWrapperService` 接口签名相同，但使用了 `@Gateway` 和 `@MessageEndpoint` 注解。\n*   `SiApplication`：与清单\
  \ 8-93 中的 `SiApplication` 类相同。唯一的区别是缺少对 `si-config.xml` 文件的导入，因为这是一个 Java 配置的示例。\n\
  \n清单 8-95 展示了 SI 配置。\n\n***清单 8-95***. 注解式拆分器示例的 SI 配置 (0826-splitter-javaconfig)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.annotation.IntegrationComponentScan;\n\
  import org.springframework.integration.channel.DirectChannel;\nimport org.springframework.messaging.MessageChannel;\n\
  \n@Configuration\n@IntegrationComponentScan\npublic class SiConfiguration {\n  @Bean\n\
    public MessageChannel inChannel() {\n    return new DirectChannel();\n  }\n\n\
  @Bean\n  public MessageChannel splitChannel() {\n    return new DirectChannel();\n\
    }\n}\n```\n\n这个带有 SI 组件扫描的配置类注册了两个通道：`inChannel` 和 `splitChannel`。清单 8-96 最终展示了一个注解式的拆分器示例。\n\
  \n***清单 8-96***. 注解式拆分器示例 (0826-splitter-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  \nimport java.util.Arrays;\nimport java.util.List;\n\nimport org.apache.commons.lang3.StringUtils;\n\
  import org.springframework.integration.annotation.MessageEndpoint;\nimport org.springframework.integration.annotation.Splitter;\n\
  \n@MessageEndpoint\npublic class SimpleSplitter {\n  @Splitter(inputChannel = \"\
  inChannel\", outputChannel = \"splitChannel\")\n  public List<String> splitMessage(String\
  \ message) {\n    return Arrays.asList(StringUtils.split(message, \";\"));\n  }\n\
  }\n```\n\n该类需要使用 `@MessageEndpoint` 注解，以将其标记为 SI 端点的 Bean。`@Splitter` 注解用于标记拆分方法，并带有两个必需参数：`inputChannel`\
  \ 和 `outputChannel`。拆分方法需要返回 `List<String>` 对象，该对象将作为拆分后消息的有效载荷。其输出也与清单 8-94 中 `0825-splitter-delimiters-xml`\
  \ 示例的输出相同。\n\n### 聚合器\n\n聚合器是一个被动的中间组件，因此它可以集成到双向和单向的 SI 流程中。正如我们之前提到的，聚合器的功能与拆分器相反。聚合器将多条消息聚合成一条消息，可以通过\
  \ XML 元素 `<int:aggregator>` 或 `@Aggregator` 注解进行配置。聚合基于以下两种机制执行：\n\n*   `CorrelationStrategy`：一种用于对传入消息进行分组的机制，以便将它们聚合在一起。可以通过\
  \ `correlation-strategy-method` 或 `correlation-strategy-expression` XML 属性，或者在 Java\
  \ 配置中使用 `@CorrelationStrategy` 注解来配置自定义的 `CorrelationStrategy`。\n*   `ReleaseStrategy`：一种用于决定输入消息组何时完成以便进行聚合的机制。可以通过\
  \ `release-strategy-method` 或 `release-strategy-expression` 属性，或者在 Java 配置中使用 `@ReleaseStrategy`\
  \ 注解来配置自定义的 `ReleaseStrategy`。\n\n默认情况下，聚合基于以下消息头执行：\n\n*   `correlationId`：告知聚合器具有相同\
  \ `correlationId` 的消息应被合并（基于 `correlationId` 的 `CorrelationStrategy`）。\n*   `sequenceSize`：告知聚合器要聚合的消息组的大小。\n\
  *   `sequenceNumber`：告知聚合器当前消息在待聚合组中的顺序。\n\n因此，默认情况下，聚合器的 `ReleaseStrategy` 基于收集消息，然后检查它们的\
  \ `sequenceSize`、`sequenceNumber` 和 `correlationId` 来工作。当我们拥有一个完整的关联消息组时，消息就会被释放。\n\
  \n我们还可以为聚合器组件配置超时，这样一组消息将在定义的时间后被释放/聚合。在这种情况下，我们必须指定是聚合部分消息还是丢弃部分消息组。\n\n\n\n聚合器显然必须先临时存储消息，然后才能对它们进行聚合。因此，它是一个比拆分器复杂得多的组件，因为它为部分消息组实现了内部存储。\n\
  \n使用 XML 配置的自定义聚合器示例\n\n清单 8-97 显示了 SI 流入口处入站网关使用的服务接口。\n\n***清单 8-97***. 自定义 XML\
  \ 聚合器示例的服务接口 (0827-aggregator-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
  import java.util.concurrent.Future;\n\npublic interface SiWrapperServiceFuture {\n\
    Future<Boolean> processText(String text);\n}\n```\n\n请注意，返回值被包装在 `Future<T>` 中。它表示异步操作的结果，该结果将在操作完成后的未来某个时刻填充。我们将用它来突出显示双向流中的聚合器如何最终阻塞调用方。清单\
  \ 8-98 显示了 SI 流的 XML 配置。\n\n***清单 8-98***. 自定义聚合器示例的 SI 配置 (文件 si-config.xml，位于示例项目\
  \ 0827-aggregator-xml 的 src/main/resources 文件夹中)\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceFuture\" />\n  <int:channel id=\"\
  inChannel\" />\n\n<int:aggregator input-channel=\"inChannel\" output-channel=\"\
  aggregatedChannel\"\n    correlation-strategy-expression=\"payload.substring(7)\"\
  \n    release-strategy-expression=\"size() > 1\"/>\n  <int:channel id=\"aggregatedChannel\"\
  \ />\n\n<int:service-activator input-channel=\"aggregatedChannel\" ref=\"writeService\"\
  \n    method=\"writeAndIndicateSuccess\" />\n</beans>\n```\n\n入站网关使用 `SiWrapperServiceFuture`\
  \ 服务接口，并通过 `inChannel` 连接到聚合器。聚合器需要指定 `input-channel` 和 `output-channel` 属性。在此例中，我们还通过内联\
  \ SpEL 表达式指定了自定义的相关策略和释放策略。消息的相关性基于消息中的第八个字符。因此，如果此字符匹配，则消息应聚合在一起。释放策略基于消息组的大小。一旦我们拥有两条相关的消息，就释放它们。默认情况下，字符串消息通过逗号连接进行聚合。\n\
  \n此聚合器连接到服务激活器，该激活器调用我们通用的 `WriteService.writeAndIndicateSuccess()` 方法。清单 8-99 显示了消息的异步发送器。\n\
  \n***清单 8-99***. XML 聚合器示例的消息异步发送器 (0827-aggregator-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
  import java.util.concurrent.Future;\nimport java.util.concurrent.TimeUnit;\nimport\
  \ lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.scheduling.annotation.Async;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class AsyncMessageSender {\n  private SiWrapperServiceFuture\
  \ wrapperService;\n\n@Autowired\n  public AsyncMessageSender(SiWrapperServiceFuture\
  \ wrapperService) {\n    super();\n    this.wrapperService = wrapperService;\n  }\n\
  \n@Async(\"customExecutor\")\n  public void sendMessage(String message) throws Exception\
  \ {\n    Future<Boolean> resultFuture = wrapperService.processText(message);\n    boolean\
  \ result = resultFuture.get(1, TimeUnit.SECONDS);\n    log.info(\"Result for \"\
   + message + \": \" + result);\n  }\n}\n```\n\n这个 Spring Bean 注入了 `SiWrapperServiceFuture`，它是网关中使用的服务接口，并封装了\
  \ SI 流。`sendMessage()` 方法使用 `@Async` 注解，因此当被调用时，它将在单独的线程中执行。请注意，我们使用 `customExecutor`\
  \ 作为注解属性，它指定了用于执行此异步逻辑的执行器 Bean 的名称。\n\n在此方法中，我们调用服务接口将消息传递给 SI 流。然后使用返回的 `resultFuture`\
  \ 来等待最终将返回的布尔值结果。为了确保它不会在 `resultFuture.get()` 调用中永远挂起，我们为此操作配置了 1 秒的超时。最后，我们记录返回的结果。清单\
  \ 8-100 显示了此示例的主类。\n\n***清单 8-100***. 自定义 XML 聚合器示例的主类 (0827-aggregator-xml)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter08;\nimport java.util.concurrent.Executor;\n\
  import net.lkrnac.book.eiws.chapter08.in.AsyncMessageSender;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ImportResource;\n\
  import org.springframework.scheduling.annotation.EnableAsync;\nimport org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;\n\
  \n@EnableAsync\n@SpringBootApplication\n@ImportResource(\"classpath:si-config.xml\"\
  )\npublic class SiApplication {\n  @Bean\n  public Executor customExecutor() {\n\
      ThreadPoolTaskExecutor threadPool = new ThreadPoolTaskExecutor();\n    threadPool.setCorePoolSize(10);\n\
      return threadPool;\n  }\n\npublic static void main(String[] args) throws Exception\
  \ {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);\n\
  \nAsyncMessageSender messageSender = ctx.getBean(AsyncMessageSender.class);\n    messageSender.sendMessage(\"\
  message1\");\n    messageSender.sendMessage(\"message2\");\n    messageSender.sendMessage(\"\
  message2\");\n    messageSender.sendMessage(\"message1\");\n  }\n}\n```\n\n这个 Spring\
  \ Boot 主类在 XML SI 流配置之外还启用了异步 Spring 特性。它也是一个 Spring 配置类，因此我们利用这一点注册了池大小为 10 的 `customExecutor`\
  \ 线程池，以便为我们的示例提供足够的线程。\n\n启动 Spring Boot 应用程序后，我们从 Spring 上下文中获取 `AsyncMessageSender`，并通过此异步发送器向\
  \ SI 流发送四条消息。请注意消息的顺序。请记住，我们的相关逻辑应将 `message1` 与 `message1` 关联，将 `message2` 与 `message2`\
  \ 关联。当我们运行此示例时，会得到清单 8-101 中的输出。\n\n***清单 8-101***. 自定义 XML 聚合器示例的输出\n\n\n\n```\n\
  2015-08-29 11:49:23.588  INFO 22149 --- [cTaskExecutor-4]\nn.l.b.e.chapter08.out.WriteRepository    :\
  \ Text persisted: message2,message2\n2015-08-29 11:49:23.589  INFO 22149 --- [ustomExecutor-2]\n\
  n.l.b.e.chapter08.in.AsyncMessageSender  : Result for message2: true\n2015-08-29\
  \ 11:49:23.590  INFO 22149 --- [cTaskExecutor-3]\nn.l.b.e.chapter08.out.WriteRepository    :\
  \ Text persisted: message1,message1\n2015-08-29 11:49:23.590  INFO 22149 --- [ustomExecutor-4]\n\
  n.l.b.e.chapter08.in.AsyncMessageSender  : Result for message1: true\n2015-08-29\
  \ 11:49:24.524 ERROR 22149 --- [ustomExecutor-3]\n.a.i.SimpleAsyncUncaughtExceptionHandler\
  \ : 调用异步方法时发生意外错误\n'public void net.lkrnac.book.eiws.chapter08.in.AsyncMessageSender.sendMessage(java.lang.String)\
  \ throws\njava.lang.Exception'.\n\njava.util.concurrent.TimeoutException: null\n\
          at java.util.concurrent.FutureTask.get(FutureTask.java:205)\n        ...\n\
  \n2015-08-29 11:49:24.526 ERROR 22149 --- [ustomExecutor-1]\n.a.i.SimpleAsyncUncaughtExceptionHandler\
  \ : 调用异步方法时发生意外错误\n'public void net.lkrnac.book.eiws.chapter08.in.AsyncMessageSender.sendMessage(java.lang.String)\
  \ throws\njava.lang.Exception'.\n\njava.util.concurrent.TimeoutException: null\n\
          at java.util.concurrent.FutureTask.get(FutureTask.java:205)\n        ...\n\
  ```\n\n出现了一些问题，下面我们来解释一下。当我们向异步发送器发送四条消息时，主线程不会被阻塞。四个新线程被启动（名称分别为 `customExecutor-1`\
  \ 到 `customExecutor-4`），异步执行 `AsyncMessageSender.sendMessage()` 中的逻辑。\n\n因此，我们在四个独立的并发线程中向聚合器组件发送了四条消息。这些消息应该被聚合成两条消息，正如第一条和第三条日志条目中所预期的那样。请注意这些日志条目的线程名称。日志条目\
  \ `Text persisted: message1,message1` 由 `AsyncTaskExecutor-3` 记录，而 `Text persisted:\
  \ message2,message2` 由 `AsyncTaskExecutor-4` 记录。所以，正如你所见，聚合器在内部使用了一个单独的线程池来聚合消息。\n\
  \n现在让我们关注来自聚合器的响应。网关组件创建了四个临时回复通道，并期望收到四个回复。其中两个临时回复通道（在线程 `customExecutor-2` 和\
  \ `customExecutor-4` 中）收到了成功响应——每个聚合后的消息对应一个。但剩下的两个临时回复通道（在线程 `customExecutor-1`\
  \ 和 `customExecutor-3` 中）在 `AsyncMessageSender.sendMessage()` 逻辑中发生了超时。因此，如果我们没有为\
  \ `resultFuture.get()` 设置超时，线程将会永远挂起，等待一个显然不会返回的聚合器响应。\n\n这突显了使用聚合器配置双向流程可能有多么棘手。因此，它更适合用于单向流程，或者与拆分器结合使用。\n\
  \n图 8-13 展示了此示例的 SI 图。\n\n![9781484207949_Fig08-13.jpg](img/9781484207949_Fig08-13.jpg)\n\
  \n图 8-13. XML 聚合器示例的 SI 配置可视化\n\n### 使用 Java 配置的自定义聚合器示例\n\n此示例借用了上一个示例 `0827-aggregator-xml`\
  \ 中的一些类**：**\n\n*   `SiWrapperServiceFuture` (清单 8-97)\n*   `AsyncMessageSender`\
  \ (清单 8-99)\n*   `SiApplication` (清单 8-100)\n\n清单 8-102 展示了聚合器组件的 Java 配置。\n\n***清单\
  \ 8-102***. 聚合器的 Java 配置 (0828-aggregator-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import java.util.List;\nimport org.springframework.integration.annotation.Aggregator;\n\
  import org.springframework.integration.annotation.CorrelationStrategy;\nimport org.springframework.integration.annotation.MessageEndpoint;\n\
  import org.springframework.integration.annotation.ReleaseStrategy;\n\n@MessageEndpoint\n\
  public class SimpleAggregator {\n  @Aggregator(inputChannel = \"inChannel\", outputChannel\
  \ = \"aggregatedChannel\")\n  public String aggregate(List<String> messages) {\n\
      return messages.stream().reduce((m1, m2) -> m1 + \",\" + m2).get();\n  }\n\n\
  @ReleaseStrategy\n  public boolean releaseChecker(List<String> messages) {\n    return\
  \ messages.size() == 2;\n  }\n\n@CorrelationStrategy\n  public String correlateBy(String\
  \ message) {\n    return message.substring(7);\n  }\n}\n```\n\n该类使用 `@MessageEndpoint`\
  \ 注解，以将其标记为用于集成组件扫描的 SI 组件。第一个方法 `aggregate()` 用于连接消息。我们为此使用了 Java 8 Stream API。它将消息集合转换为\
  \ Java 8 流，并使用 `reduce()` 功能将流中的两个元素连接成一个。最后，它通过 `get()` 方法再次将流转换为集合。`@Aggregator`\
  \ 注解要求定义 `inputChannel` 和 `outputChannel` 属性。\n\n第二个方法 `releaseChecker()` 为聚合器定义了一个自定义释放策略。当组内消息数达到两条时，我们返回\
  \ `true` 以通知 SI 释放条件已满足。最后一个方法 `correlateBy()` 为此聚合器定义了关联策略。如果返回值相同，则这些消息属于同一组，应聚合为一个组。\n\
  \nSI 流程的其余部分通过 清单 8-103 中的 XML 配置定义——部分是为了突出如何为 SI 应用程序组合 XML 和 Java 配置，部分是为了减少此示例所需的清单数量。\n\
  \n***清单 8-103***. Java 聚合器示例的 SI 配置 (文件 si-config.xml 位于示例项目 0828-aggregator-javaconfig\
  \ 的 src/main/resources 文件夹中)\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  <beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:task=\"\
  http://www.springframework.org/schema/task\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/integration\n\
      http://www.springframework.org/schema/integration/spring-integration.xsd\">\n\
  \n<int:annotation-config/>\n\n<int:gateway default-request-channel=\"inChannel\"\
  \n    service-interface=\"net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceFuture\"\
  \ />\n\n<int:channel id=\"inChannel\" />\n  <int:channel id=\"aggregatedChannel\"\
  \ />\n\n<int:service-activator input-channel=\"aggregatedChannel\" ref=\"writeService\"\
  \n    method=\"writeAndIndicateSuccess\" />\n</beans>\n```\n\n元素 `<int:annotation-config>`\
  \ 是 `@IntegrationComponentScan` 注解的 XML 等价物，因此它会扫描 `@MessageEndpoint` 组件。将此配置放在主\
  \ Spring 配置类上会更好，但我们想突出 SI 框架的这个 XML 配置特性。入站网关、服务激活器和两个通道都是我们在之前的示例中已经见过的结构。\n\n\
  当我们通过主类 `SiApplication` 运行此示例时，会得到与 清单 8-101 中 `0827-aggregator-xml` 示例类似的输出。\n\n\
  ### 使用默认头部的聚合器示例\n\n此示例完全使用 Java 进行配置。清单 8-104 展示了入站网关。\n\n\n\n***清单 8-104***. 默认标头聚合示例的入站网关（0829-aggregator-default-headers）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.in;\nimport java.util.concurrent.Future;\n\
  import org.springframework.integration.annotation.Gateway;\nimport org.springframework.integration.annotation.MessagingGateway;\n\
  import org.springframework.messaging.Message;\n\n@MessagingGateway\npublic interface\
  \ SiWrapperServiceFutureAnnotated {\n  @Gateway(requestChannel = \"inChannel\")\n\
    Future<Boolean> processText(Message<String> text);\n}\n```\n\n这个双向网关返回 `Future<Boolean>`，并接受连接到\
  \ `inChannel` 的 `Message<String>`。清单 8-105 展示了连接到另一侧 `inChannel` 的聚合器。\n\n***清单\
  \ 8-105***. 默认标头聚合器示例（0829-aggregator-default-headers）\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import java.util.List;\nimport org.springframework.integration.annotation.Aggregator;\n\
  import org.springframework.integration.annotation.MessageEndpoint;\n\n@MessageEndpoint\n\
  public class SimpleAggregator {\n  @Aggregator(inputChannel = \"inChannel\", outputChannel\
  \ = \"aggregatedChannel\")\n  public String aggregate(List<String> messages) {\n\
      return messages.stream().reduce((m1, m2) -> m1 + \",\" + m2).get();\n  }\n}\n\
  ```\n\n在此例中，我们没有指定自定义的相关性或释放策略。因此，会基于 `correlationId`、`sequenceSize` 和 `sequenceNumber`\
  \ 标头使用默认策略。清单 8-106 展示了服务激活器的配置。\n\n***清单 8-106***. 默认标头聚合示例的服务激活器（0829-aggregator-default-headers）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport net.lkrnac.book.eiws.chapter08.out.WriteRepository;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.stereotype.Service;\n\n@Service\npublic class WriteServiceAnnotated\
  \ {\n  private WriteRepository writeRepository;\n\n@Autowired\n  public WriteServiceAnnotated(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    }\n\n@ServiceActivator(inputChannel = \"aggregatedChannel\")\n  public boolean\
  \ writeAndIndicateSuccess(String message) {\n    return writeRepository.persist(message)\
  \ == 1;\n  }\n}\n```\n\n该类使用通用的 `WriteRepository` 来持久化接收到的消息。`@ServiceActivator`\
  \ 注解将此组件连接到聚合器的输出。清单 8-107 展示了用于发送消息的异步逻辑。\n\n***清单 8-107***. 默认标头聚合示例中使用的异步消息发送器（0829-aggregator-default-headers）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.in;\nimport java.util.concurrent.Future;\n\
  import java.util.concurrent.TimeUnit;\nimport lombok.extern.slf4j.Slf4j;\nimport\
  \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.integration.support.MessageBuilder;\n\
  import org.springframework.messaging.Message;\nimport org.springframework.scheduling.annotation.Async;\n\
  import org.springframework.stereotype.Component;\n\n@Slf4j\n@Component\npublic class\
  \ AsyncMessageSender {\n  private SiWrapperServiceFutureAnnotated wrapperService;\n\
  \n@Autowired\n  public AsyncMessageSender(SiWrapperServiceFutureAnnotated wrapperService)\
  \ {\n    super();\n    this.wrapperService = wrapperService;\n  }\n\n@Async(\"customExecutor\"\
  )\n  public void sendMessage(String stringMessage, int correlationId)\n      throws\
  \ Exception {\n    Message<String> message =\n        MessageBuilder.withPayload(stringMessage).setSequenceSize(2)\n\
              .setCorrelationId(correlationId).build();\n\nFuture<Boolean> resultFuture\
  \ = wrapperService.processText(message);\n    boolean result = resultFuture.get(1,\
  \ TimeUnit.SECONDS);\n    log.info(\"Result for \" + stringMessage + \": \" + result);\n\
    }\n}\n```\n\n我们注入了 `SiWrapperServiceFutureAnnotated`，它可以消费 `Message<String>` 类型的消息，并返回\
  \ `Future<Boolean>` 结果。异步方法 `sendMessage()` 使用 `MessageBuilder` 根据给定的 `stringMessage`\
  \ 负载和 `correlationId` 参数构建消息。`sequenceSize` 标头被硬编码为值 2，因此聚合器会将两条消息聚合成一条。聚合还需要另一个标头：`sequenceNumber`，它定义了序列中消息的顺序，以便聚合器在序列中所有消息到达时能够释放它们。此标头默认会被注入到消息中。\n\
  \n其余逻辑应该很熟悉。我们将消息发送到 SI 流，并读取 `Future<Boolean>` 结果。随后，我们等待 SI 流响应或超时。清单 8-108 展示了此示例的主类。\n\
  \n***清单 8-108***. 默认标头聚合示例的主类（0829-aggregator-default-headers）\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import java.util.concurrent.Executor;\nimport net.lkrnac.book.eiws.chapter08.in.AsyncMessageSender;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.integration.annotation.IntegrationComponentScan;\nimport\
  \ org.springframework.scheduling.annotation.EnableAsync;\nimport org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;\n\
  \n@EnableAsync\n@SpringBootApplication\n@IntegrationComponentScan\npublic class\
  \ SiApplication {\n  @Bean\n  public Executor customExecutor() {\n    ThreadPoolTaskExecutor\
  \ threadPool = new ThreadPoolTaskExecutor();\n    threadPool.setCorePoolSize(10);\n\
      return threadPool;\n  }\n\npublic static void main(String[] args) throws Exception\
  \ {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);\n\
  \nAsyncMessageSender messageSender = ctx.getBean(AsyncMessageSender.class);\n    messageSender.sendMessage(\"\
  message1\", 1);\n    messageSender.sendMessage(\"message2\", 2);\n    messageSender.sendMessage(\"\
  message2\", 2);\n    messageSender.sendMessage(\"message1\", 1);\n  }\n}\n```\n\n\
  这执行了 SI 扫描，启用了异步处理，配置了 `customExecutor`，并启动了 Spring Boot 应用程序。请注意，我们并没有在任何地方注册通道\
  \ `inChannel` 和 `aggregatedChannel`。SI 有时可以在没有显式定义通道的情况下推断出连接方式。在这种情况下，它会在底层创建 `DirectChannel`（如后续“消息通道”部分所述）。\n\
  \n一切配置完成后，我们获取 `AsyncMessageSender` Bean 并发送四条带有相关性 ID 的消息。运行此类后的输出与清单 8-101 中 `0827-aggregator-xml`\
  \ 示例的输出类似。\n\n消息通道\n\n*消息通道*是 SI 组件的最后一个类别（与消息和消息端点并列）。它用于连接消息端点。消息通道是一个简单的 Spring\
  \ Bean，因此不需要额外的基础设施来完成其任务。但如有需要，临时存储在通道中的消息可以通过 JMS 或 JDBC 进行持久化。\n\n为了理解各种通道类型及其特性，最好回顾一下它们的继承结构，如图\
  \ 8-14 所示。\n\n![9781484207949_Fig08-14.jpg](img/9781484207949_Fig08-14.jpg)\n\n\
  图 8-14. 消息通道继承结构\n\n\n\n请注意，这些接口（`MessageChannel`、`PollableChannel`、`SubscribableMessageChannel`）属于\
  \ `org.springframework.messaging` 包，该包位于 Spring Core 框架的 `spring-messaging` 模块中。所有实现都位于\
  \ SI 框架本身（`org.springframework.integration.channel` 包）中。\n\n根据消费者的数量，通道可分为两种类型：\n\
  \n*   *点对点通道*：每条消息仅由一个端点消费。可通过 XML 元素 `<int:channel>` 进行配置，或注册为 Java Bean。除 `PublishSubscribeChannel`\
  \ 之外的所有通道实现均属此类。\n*   *发布/订阅通道*：每条消息都会发送给所有已订阅的消费者。可通过 XML 元素 `<int:publish-subscribe-channel>`\
  \ 进行配置，或将 `PublishSubscribeChannel` 注册为 Spring Bean。\n\n从消息传递的角度来看，消息通道可以参与以下方式：\n\
  \n同步消息传递\n\n*   消费者通过调用者线程立即被触发。\n*   如果 SI 流程仅包含同步被动组件，则调用者将被阻塞，直到下游组件回复到回复通道。\n\
  *   通道可以在调用者和消费者之间传播事务或异常。\n*   消费者可以使用调用者的安全上下文。\n*   实现：`DirectChannel`、同步 `PublishSubscribeChannel`。\n\
  \n异步消息传递\n\n*   消费在与消息发送不同的线程中完成。\n*   消费者无法使用发送者的事务或安全上下文。\n*   消费者无法将异常传播给发送者。\n\
  *   实现：`QueueChannel`、`PriorityChannel`、`ExecutorChannel`、`RendezvousChannel`、异步\
  \ `PublishSubscribeChannel`。\n\nDirectChannel\n\n`DirectChannel` 是最简单的通道实现。它是一个同步的、点对点的通道。消费者需要订阅它，这样在发送者发送消息后，它会立即被触发。由于它是同步的，调用者和发送者共享同一个线程，就像它们通过简单的\
  \ Java 调用进行交互一样。\n\n该通道的展示将参考之前的示例，因为所有这些示例都使用了此通道实现。我们可以通过以下方式进行配置：\n\n*   XML\
  \ 元素 `<int:channel>`，它不使用 `<int:queue>`、`<int:priority-queue>` 或 `<int:dispatcher>`\
  \ 子元素。此配置的一个示例是 `0828-aggregator-javaconfig` 示例项目中的 `inChannel` 或 `aggregatedChannel`，如清单\
  \ 8-103 所示。\n*   使用其中一个构造函数创建 `DirectChannel` 实例，并通过 `@Bean` 注解将其注册为 Spring Bean。然后，该\
  \ Bean 的名称可用作消息端点配置中的通道名称。Java 配置示例可见于清单 8-95，在示例项目 `0826-splitter-javaconfig` 中作为\
  \ `inChannel` 或 `splitChannel`。\n\nQueueChannel\n\n`QueueChannel` 是第二常用的通道实现。它是一个异步的、点对点的通道，消费者需要主动轮询它以验证是否有新消息到达。这种消息传递在单独的线程中完成，可能会导致通信延迟。消费者组件需要是活动的（需要配置轮询器）。\n\
  \n由于它是异步的，事务和安全上下文不会从发送者传递给消费者。此外，消费者的异常也不会传播回发送者。\n\n由于消费者正在轮询消息，通道显然需要能够临时存储消息。在内部，它使用标准的\
  \ Java `BlockingQueue` 来存储消息。因此，它使用先进先出（FIFO）的顺序来排列消息。当我们配置 `QueueChannel` 时，可以选择配置队列容量。如果消息容量达到上限，发送者将被阻塞，直到有可用空间或达到超时时间。默认情况下，此队列的容量为\
  \ `Integer.MAX_VALUE`。\n\n要配置 `QueueChannel`，您可以执行以下操作：\n\n*   使用带有 `<int:queue>`\
  \ 子元素的 XML 元素 `<int:channel>`。容量可以通过 `<int:queue>` 的 `capacity` 属性来定义。此配置的一个示例是\
  \ `0821-bridge-xml` 示例项目中的 `inChannel`，如清单 8-81 所示。\n*   使用其中一个构造函数创建 `QueueChannel`\
  \ 实例，并通过 `@Bean` 注解将其注册为 Spring Bean。队列容量可以作为参数传递给构造函数。然后，该 Bean 的名称可用作消息端点配置中的通道名称。Java\
  \ 配置示例可见于清单 8-89，在示例项目 `0823-bridge-to-javaconfig` 中作为 `inChannel`。\n\nPriorityChannel\n\
  \n`PriorityChannel` 是 `QueueChannel` 的子类。因此，它们相似且共享大部分特性。唯一的区别是 `PriorityChannel`\
  \ 在底层队列存储中不使用 FIFO 来排列消息。使用 `PriorityChannel`，我们能够指定消息从通道中被消费的顺序。此顺序可以通过两种方式配置：\n\
  \n*   基于消息头 `priority`。优先级值更高的消息将首先被消费。当未为 `PriorityChannel` 配置 `comparator` 时，默认使用此机制。\n\
  *   基于 `Comparator<Message<T>>` 的实现，使用自定义逻辑进行消息比较。\n\n`PriorityChannel` 可以通过以下方式进行配置：\n\
  \n*   带有 `<int:priority-queue>` 子元素的 XML 元素 `<int:channel>`。\n*   使用其中一个构造函数创建 `PriorityChannel`\
  \ 实例，并通过 `@Bean` 注解将其注册为 Spring Bean。比较器或队列容量可以作为构造函数参数进行配置。然后，该 Bean 的名称可用作消息端点配置中的通道名称。\n\
  \nPriorityChannel 示例\n\n此示例实现了我们自己的比较器，用于在 `PriorityChannel` 中对消息进行排序。这是一个基于 XML\
  \ 的配置。清单 8-109 显示了比较器的实现。\n\n***清单 8-109***. PriorityChannel 示例的比较器 (0830-channel-priority-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport java.util.Comparator;\nimport\
  \ org.springframework.messaging.Message;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleMessageComparator implements Comparator<Message<String>>\
  \ {\n  @Override\n  public int compare(Message<String> o1, Message<String> o2) {\n\
      return -1 * o1.getPayload().compareTo(o2.getPayload());\n  }\n}\n```\n\n这里值得记住\
  \ `Comparator<T>.compare()` 的约定。比较器将根据返回的负整数/零/正整数来决定 `o1` 与 `o2` 相比是小于/等于/大于。较小的对象将首先从通道中被消费。\n\
  \n在这种情况下，我们对 `String` 消息负载使用反向自然排序。`String` 的自然排序是按字母顺序。因此，如果我们的消息应该按反向字母顺序从通道中被消费，我们就使用这个比较器。清单\
  \ 8-110 显示了 XML SI 配置。\n\n\n\n***清单 8-110***. PriorityChannel 示例的 XML SI 配置（位于示例项目\
  \ 0830-channel-priority-xml 的 src/main/resources 文件夹中的 si-config.xml 文件）\n\n```\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
  inChannel\">\n    <int:priority-queue capacity=\"10\" comparator=\"simpleMessageComparator\"\
  />\n  </int:channel>\n\n<int:outbound-channel-adapter channel=\"inChannel\" ref=\"\
  writeService\" method=\"write\">\n     <int:poller receive-timeout=\"1\" fixed-delay=\"\
  100\" max-messages-per-poll=\"1\"/>\n  </int:outbound-channel-adapter>\n</beans>\n\
  ```\n\n在 SI 流程的输入端，我们使用了入站网关，它映射到我们的通用服务接口 `SiWrapperServiceVoid`，并连接到 `inChannel`。此输入通道被配置为优先级通道，容量为\
  \ `10`，并将 `SimpleMessageComparator` bean 作为 `comparator`。\n\n出站通道适配器（连接到 `inChannel`）被配置为一个活动组件，轮询间隔为\
  \ 100 毫秒。它每个轮询周期也只读取一条消息（属性 `max-messages-per-poll`），并且在从 `inChannel` 读取时，如果超过 1\
  \ 毫秒未收到消息则会超时。后一项配置是为了突出显示优先级通道中排序顺序的变化。如果我们没有配置这么短的间隔，出站通道适配器会急切地等待消费出现在通道队列中的第一条消息，这样我们就无法收集到至少两条消息。\n\
  \n清单 8-111 展示了此示例的主类。\n\n***清单 8-111***. PriorityChannel 示例的主类（0830-channel-priority-xml）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@Slf4j\n@SpringBootApplication\n\
  @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n  private\
  \ static final String MESSAGE2 = \"message2\";\n  private static final String MESSAGE1\
  \ = \"message1\";\n\npublic static void main(String[] args) throws InterruptedException\
  \ {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);\n\
  \nSiWrapperServiceVoid wrapperService =\n        ctx.getBean(SiWrapperServiceVoid.class);\n\
      log.info(\"Starting to send messages...\");\n    wrapperService.processText(MESSAGE1);\n\
      log.info(MESSAGE1 + \" sent\");\n    wrapperService.processText(MESSAGE2);\n\
      log.info(MESSAGE2 + \" sent\");\n  }\n}\n```\n\n在使用我们描述的 XML SI 配置运行应用程序后，我们从\
  \ Spring 上下文中读取服务接口 bean `SiWrapperServiceVoid` 来发送消息。我们还记录了消息已发送到 SI 流程的信息。清单 8-112\
  \ 展示了运行此主类时的输出。\n\n***清单 8-112***. PriorityChannel 示例的输出（0830-channel-priority-xml）\n\
  \n```\n2015-08-30 14:36:35.149  INFO 16162 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
  \ Starting to send messages...\n2015-08-30 14:36:35.160  INFO 16162 --- [          \
  \ main]\nn.l.book.eiws.chapter08.SiApplication    : message1 sent\n2015-08-30 14:36:35.160  INFO\
  \ 16162 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : message2\
  \ sent\n2015-08-30 14:36:35.272  INFO 16162 --- [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository    :\
  \ Text persisted: message2\n2015-08-30 14:36:35.375  INFO 16162 --- [ask-scheduler-2]\n\
  n.l.b.e.chapter08.out.WriteRepository    : Text persisted: message1\n```\n\n首先打印的是两条消息都已发送的信息。这意味着调用方（主线程）不会被\
  \ `wrapperService.processText()` 调用阻塞。当两条消息都汇集到优先级通道后，输出通道适配器会按照我们配置的字母逆序读取它们。\n\
  \nRendezvousChannel\n\n`RendezvousChannel` 也是 `QueueChannel` 的子类，但它使用 `SynchronousQueue`\
  \ 作为队列实现（这是一个配置为零容量的 `BlockingQueue`）。因此，它能够同步执行（通过直接交接），但同时充当活动组件（消费者轮询消息）。消息的发送方会被阻塞，直到活动消费者从\
  \ `RendezvousChannel` 读取消息。\n\n`RendezvousChannel` 可以通过以下方式配置：\n\n*   使用 XML 元素\
  \ `<int:channel>` 及其子元素 `<int:rendezvous-queue/>`。\n*   使用其中一个构造函数创建 `RendezvousChannel`\
  \ 的实例，并通过 `@Bean` 注解将其注册为 Spring bean。然后，此 bean 的名称可以在消息端点配置中用作通道名称。\n\nRendezvousChannel\
  \ 示例\n\n清单 8-113 展示了 XML SI 配置。\n\n***清单 8-113***. `RendezvousChannel` 示例的 SI 配置（位于示例项目\
  \ 0831-channel-rendezvous-xml 的 src/main/resources 文件夹中的 si-config.xml 文件）\n\n```\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
  inChannel\">\n    <int:rendezvous-queue/>\n  </int:channel>\n\n<int:outbound-channel-adapter\
  \ channel=\"inChannel\" ref=\"writeService\" method=\"write\">\n     <int:poller\
  \ fixed-delay=\"1000\" max-messages-per-poll=\"1\"/>\n  </int:outbound-channel-adapter>\n\
  </beans>\n```\n\n`inChannel` 通道被配置为 `RendezvousChannel`，并连接到入站网关和出站通道适配器。在这种情况下，出站通道适配器以\
  \ 1 秒的间隔进行轮询，每个轮询周期读取一条消息。选择这种轮询方式是为了在清单 8-114 的输出中突出显示 `RendezvousChannel` 的特性。主类与清单\
  \ 8-111 中 `0830-channel-priority-xml` 示例的主类相同。\n\n***清单 8-114***. RendezvousChannel\
  \ 示例的输出（0831-channel-rendezvous-xml）\n\n\n\n```\n2015-08-30 14:38:55.215  INFO 16238\
  \ --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : 开始发送消息...\n\
  2015-08-30 14:38:55.224  INFO 16238 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
  \ message1 已发送\n2015-08-30 14:38:55.250  INFO 16238 --- [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository    :\
  \ 文本已持久化: message1\n2015-08-30 14:38:56.252  INFO 16238 --- [           main]\n\
  n.l.book.eiws.chapter08.SiApplication    : message2 已发送\n2015-08-30 14:38:56.254  INFO\
  \ 16238 --- [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository    : 文本已持久化:\
  \ message2\n```\n\n请注意这些日志条目的时间戳。`message1` 的交接几乎在它被发送到 SI 流程时立即发生。这是因为出站通道适配器已经在等待消息到达\
  \ `inChannel`。但 `message2` 的第二次交接大约在 `message1` 交接后 1 秒发生。这是因为主线程在 `wrapperService.processText(MESSAGE2)`\
  \ 调用中被阻塞，直到通道适配器轮询器触发读取 `message2`。\n\nExecutorChannel\n\n`ExecutorChannel` 是一个可订阅通道，因此消费者是一个被动组件，等待被接收到的消息触发。但与\
  \ `DirectChannel` 不同，消息在单独的线程中从发送者传递给消费者。消息的分发被委托给为 `ExecutorChannel` 配置的 `TaskExecutor`\
  \ 实例。\n\n可以通过以下方式进行配置：\n\n*   使用 XML 元素 `<int:channel>` 及其子元素 `<int:dispatcher task-executor=\"\
  ...\"/>`。\n*   使用其中一个构造函数创建 `ExecutorChannel` 实例，并通过 `@Bean` 注解将其注册为 Spring Bean。然后，该\
  \ Bean 的名称可以在消息端点配置中用作通道名称。\n\nExecutorChannel 示例\n\n清单 8-115 展示了 SI 配置。\n\n***清单\
  \ 8-115***. ExecutorChannel 示例的 SI 配置（示例项目 0832-channel-executor-xml 的 src/main/resources\
  \ 文件夹中的文件 si-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\
  \ xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xmlns:task=\"http://www.springframework.org/schema/task\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/task\n    http://www.springframework.org/schema/task/spring-task.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<task:executor id=\"\
  executor\" pool-size=\"10\"/>\n\n<int:channel id=\"inChannel\">\n    <int:dispatcher\
  \ task-executor=\"executor\"/>\n  </int:channel>\n\n<int:outbound-channel-adapter\
  \ channel=\"inChannel\" ref=\"writeService\" method=\"write\" />\n</beans>\n```\n\
  \n`inChannel` 通道被配置为 `ExecutorChannel`，使用了名为 `executor` 的 `TaskExecutor` Bean。这个\
  \ `TaskExecutor` Bean 也在该配置文件中通过 XML 元素 `<task:executor>` 创建。`inChannel` 连接到入站网关，该网关使用我们通用的服务接口\
  \ `SiWrapperServiceVoid`。在这种情况下，`inChannel` 的消费者是映射到通用 `WriteService.write()` 的被动出站通道适配器。\n\
  \n我们再次使用与清单 8-111 中 `0830-channel-priority-xml` 相同的主类。当我们运行这个主类时，可以观察到清单 8-116 中的输出。\n\
  \n***清单 8-116***. ExecutorChannel 示例的输出\n\n```\n2015-08-30 15:42:48.844  INFO 18377\
  \ --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : 开始发送消息...\n\
  2015-08-30 15:42:48.858  INFO 18377 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
  \ message1 已发送\n2015-08-30 15:42:48.859  INFO 18377 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
  \ message2 已发送\n2015-08-30 15:42:48.877  INFO 18377 --- [     executor-1]\nn.l.b.e.chapter08.out.WriteRepository    :\
  \ 文本已持久化: message1\n2015-08-30 15:42:48.877  INFO 18377 --- [     executor-2]\n\
  n.l.b.e.chapter08.out.WriteRepository    : 文本已持久化: message2\n```\n\n请注意，交接立即发生，并且在单独的线程中（使用\
  \ `executor` 线程池），不会阻塞调用者（`main`）线程。\n\nPublishSubscribeChannel\n\n`PublishSubscribeChannel`\
  \ 使用消息传递的发布/订阅模型，所有订阅者都会收到发送给它的消息。因此，我们的消息可以有多个消费者。\n\n`PublishSubscribeChannel`\
  \ 可以通过以下方式进行配置：\n\n*   使用 XML 元素 `<int:publish-subscribe-channel>`。\n*   使用其中一个构造函数创建\
  \ `PublishSubscribeChannel` 实例，并通过 `@Bean` 注解将其注册为 Spring Bean。然后，该 Bean 的名称可以在消息端点配置中用作通道名称。\n\
  \n我们可以按如下方式配置 `PublishSubscribeChannel` 来处理消息传递：\n\n*   同步方式\n    *   默认配置\n   \
  \ *   所有消费者的处理在发送者的线程中顺序执行，因此每个消费者需要等待其他消费者。\n    *   *可以*在消费者和发送者之间传播事务、安全上下文和异常。\n\
  *   异步方式\n    *   可以通过 `<int:publish-subscribe-channel>` 的 `task-executor` 属性进行配置，我们通过该属性指定对\
  \ `TaskExecutor` 实例的引用。\n    *   每个消费者的处理可以在单独的线程中完成，因此它们是并发发生的。\n    *   事务传播、安全上下文传递以及消费者和发送者之间的异常冒泡*在此模式下不起作用*。\n\
  \nPublishSubscribeChannel 示例\n\n清单 8-117 展示了 SI 配置。\n\n***清单 8-117***. PublishSubscribeChannel\
  \ 示例的 SI 配置（示例项目 0833-channel-pub-sub-xml 的 src/main/resources 文件夹中的文件 si-config.xml）\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:publish-subscribe-channel\
  \ id=\"inChannel\" />\n\n<int:outbound-channel-adapter channel=\"inChannel\" ref=\"\
  writeService\" method=\"write\"/>\n  <int:outbound-channel-adapter channel=\"inChannel\"\
  \ ref=\"writeService\" method=\"write\"/>\n</beans>\n```\n\n\n\n在此案例中，我们使用了名为 `inChannel`\
  \ 的同步 `PublishSubscribeChannel`，通过通用服务接口 `SiWrapperServiceVoid` 从入站网关消费消息。配置了两个出站通道适配器来监听\
  \ `inChannel`，将消息委托给我们的通用 `WriteService.write()` 方法。\n\n本示例复用了清单 8-111 中 `0830-channel-priority-xml`\
  \ 的同一个主类。运行后，我们得到清单 8-118 所示的输出。\n\n***清单 8-118***。PublishSubscribeChannel 示例的输出\n\
  \n```\n2015-08-30 18:20:05.017  INFO 21389 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
  \ Starting to send messages...\n2015-08-30 18:20:05.092  INFO 21389 --- [          \
  \ main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted: message1\n2015-08-30\
  \ 18:20:05.093  INFO 21389 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    :\
  \ Text persisted: message1\n2015-08-30 18:20:05.093  INFO 21389 --- [          \
  \ main]\nn.l.book.eiws.chapter08.SiApplication    : message1 sent\n2015-08-30 18:20:05.119  INFO\
  \ 21389 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ message2\n2015-08-30 18:20:05.120  INFO 21389 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    :\
