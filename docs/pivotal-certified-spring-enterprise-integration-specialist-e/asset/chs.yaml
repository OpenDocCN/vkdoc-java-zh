  \ 8-133 展示了我们的自定义全局错误处理器。\n\n***清单 8-133***. 自定义全局错误处理器示例（0839-error-channel-global）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.integration.annotation.ServiceActivator;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class ErrorHandler {\n  @ServiceActivator(inputChannel\
  \ = \"errorChannel\")\n  public void handleException(Throwable throwable) {\n    log.error(\"\
  Error occurred: \", throwable);\n  }\n}\n```\n\n这个普通的服务激活器通过 Java 注解配置为监听 `errorChannel`。为了示例的简洁性，它记录了错误，但我们可以在其中放置任何自定义逻辑。默认情况下，`errorChannel`\
  \ 会消费 SI 流中所有未被其他方式处理的错误消息。当我们运行此示例的主类时，会得到清单 8-134 中的输出。\n\n***清单 8-134***. 自定义全局错误处理器的输出\n\
  \n```\n2015-08-31 21:07:41.510 ERROR 14942 --- [ask-scheduler-1]\nn.l.b.eiws.chapter08.out.ErrorHandler    :\
  \ Error occurred:\n\norg.springframework.messaging.MessageHandlingException: ; nested\
  \ exception is\njava.lang.IllegalStateException: error occurred\n        at org.springframework.integration.handler.MethodInvokingMessageProcessor.processMessage(\n\
  MethodInvokingMessageProcessor.java:78)\n        ...\n```\n\n错误被 SI 捕获并发送到 `errorChannel`，我们的\
  \ `ErrorHandler` 正在监听该通道。因此，错误会从这个类中被记录下来。\n\n自定义错误通道示例\n\n最后一个错误处理示例演示了如何为特定的轮询器配置自定义错误通道。清单\
  \ 8-135 展示了我们的自定义处理器。\n\n***清单 8-135***. 自定义错误处理器示例（0840-error-channel-async）\n\n\
  \n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.integration.annotation.ServiceActivator;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class ErrorHandler {\n  @ServiceActivator(inputChannel\
  \ = \"customErrorChannel\")\n  public void handleException(Throwable throwable)\
  \ {\n    log.error(\"Error occurred: \", throwable);\n  }\n}\n```\n\n这个基于 Java 配置的服务激活器连接到\
  \ `customErrorChannel`，用于记录错误日志。清单 8-136 展示了此示例的 SI 配置。\n\n***清单 8-136***. 自定义错误处理器示例的\
  \ SI 配置（文件 si-config.xml，位于示例项目 0840-error-channel-async 的 src/main/resources 文件夹中）\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
  inChannel\">\n    <int:queue capacity=\"10\"/>\n  </int:channel>\n\n<int:service-activator\
  \ input-channel=\"inChannel\" ref=\"writeServiceWithError\"\n    method=\"write\"\
  >\n    <int:poller fixed-delay=\"100\" error-channel=\"customErrorChannel\"/>\n\
    </int:service-activator>\n  <int:channel id=\"customErrorChannel\"/>\n</beans>\n\
  ```\n\n服务激活器上的轮询器配置了 `error-channel` 属性，其值为 `customErrorChannel`，并且 `ErrorHandler`\
  \ 正在监听该通道。因此，在此场景下，该错误处理器专属于此轮询器，而全局的 `errorChannel` 则使用默认的 SI 错误处理器。此示例的主类与清单 8-126\
  \ 中 `0836-error-handling-sync` 示例的主类相同。其输出也与前一个示例 `0839-error-channel-global` 在清单\
  \ 8-134 中的输出相同。\n\n事务处理\n\n事务在 SI 流程中的传播边界与异常的传播边界略有不同。正如我们之前展示的，即使处理的是异步消息传递，异常有时也能传播回调用方。但对于事务传播而言，情况并非如此。*只有当整个流程是同步时，事务才能在\
  \ SI 流程中传播。* 要配置事务支持，我们可以使用标准的 Spring 机制（例如 `@Transactional` 注解）。\n\n但是，有一种选项可以让事务存在于异步消息子流程中，即事务边界从一个活跃组件开始。当我们为任何活跃组件指定\
  \ `<int:poller>` 时，可以定义 XML 轮询器子元素 `<int:transactional>`。该元素告诉 SI，我们希望为由轮询器触发启动的每个新线程开启一个事务。这种机制称为*事务性轮询*。\n\
  \n事务传播示例\n\n为了探究事务传播，我们将把消息持久化到内存数据库中，并模拟错误来回滚事务。清单 8-137 展示了模拟上述错误的服务。\n\n***清单\
  \ 8-137***. 事务传播示例中模拟错误的服务（0841-transaction-propagation）\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
  import java.util.Map;\nimport org.springframework.stereotype.Service;\n\n@Service\n\
  public class ServiceWithError {\n  public boolean handleJdbcResult(Map<String, Object>\
  \ jdbcResult) {\n    throw new IllegalStateException(\"error occurred\");\n  }\n\
  }\n```\n\n当调用此 Spring 服务 bean 时，它会抛出 `IllegalStateException` 来模拟错误。方法调用 `handleJdbcResult()`\
  \ 接受一个类型为 `Map<String, Object>` 的参数，因为它将由稍后在此示例中定义的 SI 组件传递。清单 8-138 展示了此示例中使用的服务接口。\n\
  \n***清单 8-138***. 事务传播示例的服务接口（0841-transaction-propagation）\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
  import org.springframework.transaction.annotation.Transactional;\n\n@Transactional\n\
  public interface SiWrapperServiceTransacted {\n  boolean processText(String text);\n\
  }\n```\n\n此服务接口使用了 `@Transactional` 注解，该注解将此调用及其后的所有处理包装到 Spring 事务中。清单 8-139 展示了初始化内存数据库表的配置类。\n\
  \n***清单 8-139***. 事务传播示例的数据库表初始化（0841-transaction-propagation）\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import javax.annotation.PostConstruct;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.stereotype.Repository;\n\
  \n@Repository\npublic class SimpleDatabasePopulator {\n  private JdbcTemplate jdbcTemplate;\n\
  \n@Autowired\n  public SimpleDatabasePopulator(JdbcTemplate jdbcTemplate) {\n    super();\n\
      this.jdbcTemplate = jdbcTemplate;\n  }\n\n@PostConstruct\n  public void initDbTable()\
  \ {\n    jdbcTemplate.execute(\"drop table TEXT_TABLE if exists\");\n    jdbcTemplate.execute(\"\
  create table TEXT_TABLE(TEXT varchar(30))\");\n  }\n}\n```\n\n此组件基于其自动注入的 `jdbcTemplate`\
  \ bean 来初始化一个内存数据库。`JdbcTemplate` 实例由 Spring Boot 自动创建。清单 8-140 展示了 SI XML 配置。\n\
  \n***清单 8-140***. 事务传播示例的 SI 配置（文件 si-config.xml，位于示例项目 0841-transaction-propagation\
  \ 的 src/main/resources 文件夹中）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  <beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:int-http=\"\
  http://www.springframework.org/schema/integration/http\"\n  xmlns:int-jdbc=\"http://www.springframework.org/schema/integration/jdbc\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/integration/jdbc\n\
      http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceTransacted\" />\n  <int:channel\
  \ id=\"inChannel\" />\n\n<int-jdbc:outbound-gateway\n    data-source=\"dataSource\"\
  \n    update=\"insert into TEXT_TABLE values (:payload)\"\n    request-channel=\"\
  inChannel\"\n    reply-channel=\"replyChannel\" >\n  </int-jdbc:outbound-gateway>\n\
    <int:channel id=\"replyChannel\" />\n\n<int:service-activator input-channel=\"\
  replyChannel\" ref=\"serviceWithError\"\n    method=\"handleJdbcResult\" />\n</beans>\n\
  ```\n\n\n\n该流程始于映射到事务性服务接口 `SiWrapperServiceTransacted` 的入站网关，并通过 `inChannel` 连接到出站\
  \ JDBC 网关。该网关使用 `dataSource` Bean 对内存数据库执行查询，在事务内将一条消息插入到 `TEXT_TABLE` 中。\n\n该组件的回复通道连接到服务激活器，后者调用\
  \ `ServiceWithError.handleJdbcResult()`。正如我们所看到的，此逻辑模拟了一个错误。**清单 8-141** 展示了此示例的主类。\n\
  \n***清单 8-141***. 事务传播示例的主类 (0841-transaction-propagation)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceTransacted;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.ImportResource;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\n\n@Slf4j\n@SpringBootApplication\n\
  @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n  private\
  \ static final String SELECT_COUNT = \"select count(*) from TEXT_TABLE\";\n\npublic\
  \ static void main(String[] args) throws InterruptedException {\n    ApplicationContext\
  \ ctx = SpringApplication.run(SiApplication.class, args);\n\ntry {\n      SiWrapperServiceTransacted\
  \ wrapperService =\n          ctx.getBean(SiWrapperServiceTransacted.class);\n      wrapperService.processText(\"\
  simple message\");\n    } catch (IllegalStateException ise) {\n      JdbcTemplate\
  \ jdbcTemplate = ctx.getBean(JdbcTemplate.class);\n      int recordCount =\n          jdbcTemplate.queryForObject(SELECT_COUNT,\
  \ Integer.class);\n      log.info(\"Record count: \" + recordCount);\n    }\n  }\n\
  }\n```\n\n在 Spring Boot 应用程序使用我们定义的 XML 流程启动后，我们检索 `SiWrapperServiceTransacted`\
  \ Bean。该 Bean 用于将消息发送到 SI 流程。由于我们预期它会抛出错误，因此此调用位于 `try-catch` 块中。在 `catch` 块中，我们读取并记录数据库中持久化记录的数量。这将有助于突出显示事务传播特性。**清单\
  \ 8-142** 展示了运行此主类后可能的输出。\n\n***清单 8-142***. 事务传播示例的输出\n\n```\n2015-09-01 21:53:58.885  INFO\
  \ 28736 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : Record\
  \ count: 0\n```\n\n数据库中没有持久化任何记录，因为在从 `SiWrapperServiceTransacted`（即我们的事务边界）抛出错误后，Spring\
  \ 回滚了整个事务。如果我们从 `SiWrapperServiceTransacted` 中移除 `@Transactional` 注解，我们会发现记录数等于\
  \ 1，尽管之后发生了错误。这是因为没有事务，出站 JDBC 网关的插入操作会立即提交。\n\n事务性轮询示例\n\n现在让我们探讨异步 SI 线程中的事务行为示例。正如我们提到的，事务不能跨越\
  \ SI 流程的异步边界，但我们可以在处理异步 SI 子流的线程中启动事务。**清单 8-143** 展示了 SI 配置。\n\n***清单 8-143***.\
  \ 事务性轮询示例的 SI 配置（示例项目 0842-transacted-polling 的 src/main/resources 文件夹中的文件 si-config.xml）\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:int-http=\"http://www.springframework.org/schema/integration/http\"\n\
    xmlns:int-jdbc=\"http://www.springframework.org/schema/integration/jdbc\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/integration/jdbc\n    http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n  <int:channel id=\"\
  inChannel\">\n    <int:queue capacity=\"10\"/>\n  </int:channel>\n\n<int-jdbc:outbound-gateway\n\
      data-source=\"dataSource\"\n    update=\"insert into TEXT_TABLE values (:payload)\"\
  \n    request-channel=\"inChannel\"\n    reply-channel=\"replyChannel\" >\n    <int:poller\
  \ fixed-delay=\"100\">\n      <int:transactional/>\n    </int:poller>\n  </int-jdbc:outbound-gateway>\n\
    <int:channel id=\"replyChannel\" />\n\n<int:service-activator input-channel=\"\
  replyChannel\" ref=\"serviceWithError\"\n    method=\"handleJdbcResult\">\n  </int:service-activator>\n\
  </beans>\n```\n\n此 SI 配置使用了一个带有我们通用服务接口 `SiWrapperServiceVoid` 的入站网关，并通过 `inChannel`\
  \ 连接到出站 JDBC 网关。但 `inChannel` 是 `QueueChannel` 类型，这意味着它需要由一个活跃的 SI 端点来消费。因此，出站 JDBC\
  \ 网关使用一个轮询器，每隔 100 毫秒在单独的线程中从 `inChannel` 消费消息。更重要的是，这个轮询器组件使用 `<int:transactional>`\
  \ XML 子元素定义，该子元素为每个轮询器线程定义了事务边界。\n\n出站 JDBC 网关的回复通道通过 `DirectChannel` 连接到服务激活器。该端点映射到\
  \ `ServiceWithError.handleJdbcResult()`，与清单 8-137 中的示例项目 `0841-transaction-propagation`\
  \ 相同。它通过抛出 `IllegalStateException` 来模拟错误。**清单 8-144** 展示了此示例的主类。\n\n***清单 8-144***.\
  \ 事务性轮询示例的主类 (0842-transacted-polling)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.ImportResource;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\n\n@Slf4j\n@SpringBootApplication\n\
  @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n  private\
  \ static final String SELECT_COUNT = \"select count(*) from TEXT_TABLE\";\n\npublic\
  \ static void main(String[] args) throws InterruptedException {\n    ApplicationContext\
  \ ctx = SpringApplication.run(SiApplication.class, args);\n\nSiWrapperServiceVoid\
  \ wrapperService =\n        ctx.getBean(SiWrapperServiceVoid.class);\n    wrapperService.processText(\"\
  simple message\");\n\nThread.sleep(500);\n    JdbcTemplate jdbcTemplate = ctx.getBean(JdbcTemplate.class);\n\
      int recordCount = jdbcTemplate.queryForObject(SELECT_COUNT, Integer.class);\n\
      log.info(\"Record count: \" + recordCount);\n  }\n}\n```\n\n\n\n当我们使用所描述的 SI\
  \ 配置启动 Spring Boot 应用程序后，通过 `SiWrapperServiceVoid` 将消息发送到 SI 流程。本例中它不在 `try-catch`\
  \ 块内，因为错误无论如何都不会传播到此代码中。我们使用一个 sleep 调用来等待足够的时间，以确保异步轮询器插入消息，并随后模拟错误。等待之后，我们查看数据库表以了解存储了多少条记录。清单\
  \ 8-145 展示了运行此主类时的输出。\n\n***清单 8-145***. 事务性轮询示例的输出\n\n```\n2015-09-01 22:22:33.252\
  \ ERROR 29589 --- [ask-scheduler-1]\no.s.integration.handler.LoggingHandler   :\n\
  org.springframework.messaging.MessageHandlingException: ; nested exception is\n\
  java.lang.IllegalStateException: error occurred\n        ...\n2015-09-01 22:22:33.724  INFO\
  \ 29589 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : Record\
  \ count: 0\n```\n\n错误是在一个单独的线程中模拟的，该线程正是事务边界所覆盖的线程。因此，我们在主线程中观察到记录数为零。如果我们从 SI 配置中移除\
  \ `<int:transactional>`，记录数将为 `1`，因为插入操作将不受事务保护，并且在错误模拟后不会被回滚。\n\nMessagingTemplate\n\
  \n使用消息网关或入站通道适配器并非向 SI 流程发送消息的必要条件。SI 提供了特殊的抽象 `org.springframework.integration.core.MessagingTemplate`，用于向\
  \ SI 流程中的任何通道发送消息以及从任何通道接收消息。这种机制可能更方便，例如在测试代码中，或者当我们想要向 SI 流程发送自定义消息时。\n\n我们可以将这个类视为\
  \ SI 中与 `JmsTemplate` 或 `RestTemplate` 等价的组件。\n\nMessagingTemplate 示例\n\n此示例使用了与清单\
  \ 8-27（示例 `0808-gateway-generic-xml`）完全相同的 SI 流程配置。提醒一下，消息网关用于通过 `inChannel` 将消息发送到映射到我们通用\
  \ bean `WriteService.writeAndIndicateSuccess()` 的出站通道适配器。清单 8-146 展示了 `MessagingTemplate`\
  \ 的配置。\n\n***清单 8-146***. MessagingTemplate 配置 (0843-messaging-template)\n\n```\n\
  package net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.core.MessagingTemplate;\n\
  \n@Configuration\npublic class SiConfiguration {\n  @Bean\n  public MessagingTemplate\
  \ messagingTemplate() {\n    MessagingTemplate messagingTemplate = new MessagingTemplate();\n\
      messagingTemplate.setReceiveTimeout(1000);\n    return messagingTemplate;\n\
    }\n}\n```\n\n在这个 Spring 配置类中，我们注册了 `messageTemplate` bean，其接收超时时间为 1 秒。清单 8-147\
  \ 展示了如何使用它。\n\n***清单 8-147***. MessagingTemplate 的使用 (0843-messaging-template)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ConfigurableApplicationContext;\n\
  import org.springframework.context.annotation.ImportResource;\nimport org.springframework.integration.core.MessagingTemplate;\n\
  import lombok.extern.slf4j.Slf4j;\n\n@Slf4j\n@SpringBootApplication\n@ImportResource(\"\
  classpath:si-config.xml\")\npublic class SiApplication {\n  public static void main(String[]\
  \ args) throws InterruptedException {\n    ConfigurableApplicationContext context\
  \ =\n        SpringApplication.run(SiApplication.class, args);\n\nMessagingTemplate\
  \ messagingTemplate = context.getBean(MessagingTemplate.class);\n    boolean result\
  \ = messagingTemplate.convertSendAndReceive(\n        \"inChannel\", \"simple message\"\
  , Boolean.class);\n    log.info(\"Result: \" + result);\n    context.close();\n\
    }\n}\n```\n\n通过 Spring Boot 构造创建并启动 Spring 上下文后，我们从上下文中获取 `messagingTemplate`\
  \ bean 并发送 `simple message`。接着，我们记录从 `inChannel` 接收到的结果，并关闭上下文实例。运行此主类后，我们可以在清单\
  \ 8-148 中观察到输出。\n\n***清单 8-148***. MessagingTemplate 示例的输出\n\n```\n2015-10-10 08:38:37.602  INFO\
  \ 26721 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ simple message\n2015-10-10 08:38:37.605  INFO 26721 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
  \ Result: true\n```\n\nSI 流程中定义的消息网关完全没有被使用，我们通过 `messagingTemplate` 直接将消息发送到 `inChannel`。消息被持久化，并且响应被发送回\
  \ `messagingTemplate`。\n\n总结\n\n本章介绍了更高级集成框架的优势，以及将更复杂的消息流抽象到诸如 Spring Integration\
  \ 这样简洁框架中的必要性。我们重点介绍了 SI 的主要概念和杀手级特性。SI 是轻量级的，因为它不需要任何特殊的运行时环境。\n\n我们涵盖了 SI 的三个主要构建块（消息、消息端点和消息通道），并介绍了每种组件的不同类型。我们展示了如何在需要时以编程方式创建消息组件，并强调了默认消息类型的不可变性。\n\
  \n最值得注意的是，我们涵盖了许多用于消息路由、转换以及将 SI 流程连接到第三方技术或 Java 类和接口的消息端点类型。这些组件以被动（同步）和主动（带轮询器的异步）模式进行了说明。我们还介绍了哪些组件可以参与单向（即发即忘场景）和双向（请求-响应场景）流程。\n\
  \n我们还研究了消息通道的类型和特性。我们介绍了它们的行为方式，以及为什么它们在主动与被动消息端点相关的不同场景中很有用。\n\n最后，我们涵盖了错误处理，以及与同步与异步消息流相关的错误和事务传播。\n\
  \n第 9 章\n\n![image](img/frontdot.jpg)\n\nSpring Batch\n\n到目前为止，我们的重点一直放在企业技术上，这些技术处理来自上游应用程序的请求或消息。这种抽象对于处理少量数据的实时处理至关重要，这些数据通常代表针对我们企业系统的一个操作。但现实世界中的企业还需要执行后台任务，在这些任务中，通常需要定期将大量数据从一个系统处理、迁移、复制或转换到另一个系统。\n\
  \n这种处理通常被称为*批处理*，因为处理的数据量很大，通常无法放入内存或单个事务中。这些数据需要被分割成可管理的块进行处理。这种处理通常定期执行（例如，每天、每周或每月），并且可能运行时间较长。批处理通常不涉及用户交互。\n\
  \n批处理的用例包括以下内容：\n\n*   发送订阅邮件\n*   发送月度发票\n*   同步数据仓库\n*   执行业务报告\n*   处理订单\n\n\n\
  \n第一章介绍了调度支持，可用于调度后台任务。但在实际应用中它并不方便，因为后台处理过程中可能出现许多问题。基于固定速率、固定延迟或 CRON 表达式的低级调度支持，其能力不足以涵盖错误处理、重启、将工作分发到其他机器、数据分块处理，或是在没有大量自定义代码的情况下控制批处理操作的流程。\n\
  \n幸运的是，Spring 系列包含 *Spring Batch* (SB) 项目，它填补了企业级批处理需求的高级抽象空白。在 Java 企业版 7 (JEE\
  \ 7) 引入之前，SB 一直是 Java 平台内一个独特的项目。这次 Java 企业标准的主要修订引入了用于批处理的 API，这些 API 深受 Spring\
  \ Batch 结构的影响。Michael Minella（SB 项目负责人）深度参与了定义 JSR-352 的专家组，该规范涵盖了 Java 平台的批处理（`https://jcp.org/en/jsr/detail?id=352`）。SB\
  \ 也仍然是该 Java 标准的旗舰实现项目。\n\nSpring Batch 领域\n\nSB 项目的理念力求实现 Spring 家族的总体目标，即最小化必要的样板代码，使开发者能够专注于业务逻辑。因此，它引入了批处理领域特有的各种抽象，如图\
  \ 9-1 所示。\n\n![9781484207949_Fig09-01.jpg](img/9781484207949_Fig09-01.jpg)\n\n图\
  \ 9-1. Spring Batch 领域\n\n第一个也是主要的抽象是 `Job`。它代表一个需要处理的工作单元。`Job` 由一个或多个步骤（`Step`）构成。`Step`\
  \ 代表由 `Job` 执行的这部分工作处理。每次执行 `Job` 时，SB 框架都会创建一个新的 `JobInstance`，因此一个 `Job` 可以有一个或多个\
  \ `JobInstance`。\n\n一个作业实例可以被执行多次（例如，当 `JobInstance` 需要重启时），因此它可以有多个 `JobExecution`。由于每个\
  \ `Job` 至少需要一个 `Step`，因此它也需要为每个 `JobExecution` 创建一个 `StepExecution`。一个 `StepExecution`\
  \ 可以在一个 `JobExecution` 内执行多次（例如，当我们想要重启或重试 `Step` 时），因此它们之间存在一对多的关系。\n\n开发者需要为批处理定义\
  \ `Job` 和 `Step`。所有其他对象都由 SB 框架创建。当 `Job` 被触发时，SB 负责执行，并根据 `Job` 和 `Step` 的定义处理执行过程中可能发生的错误。这样，开发者可以将工作细分为多个\
  \ `Step`，在逻辑上将批处理拆分成更小的部分，并将协调执行的繁重工作留给 SB。我们将在本章后面深入探讨这些定义。\n\n面向块的处理\n\nSB 框架最常见的用例是分块处理大量数据。这被称为*面向块的处理*，它发生在一个\
  \ `Step` 中。`Step` 由一个必需的 `ItemReader<T>`、一个可选的 `ItemProcessor<T, S>` 和一个必需的 `ItemWriter<S>`\
  \ 组成。这些 `Step` 的组成部分是 Java 接口，可以通过我们的自定义逻辑来实现。请注意，在接下来的文本中，当讨论这些接口时，我们不使用泛型类型。\n\
  \nSB 还提供了一些开箱即用的常用实现，用于从/向以下数据源进行读写：\n\n*   JDBC/Hibernate/存储过程\n    *   基于游标的 ItemReader——游标是一种数据库结构，用于从数据库流式传输行\n\
  \    *   基于分页的 ItemReader——为每个数据块（页）使用一个不同的 `where` 子句\n    *   ItemWriter\n*  \
  \ 平面文件\n*   XML\n*   JMS\n\n图 9-2 展示了此机制的序列图。\n\n![9781484207949_Fig09-02.jpg](img/9781484207949_Fig09-02.jpg)\n\
  \n图 9-2. 面向块的处理序列图\n\n当 `Step` 执行时，SB 启动块处理的循环。`Step` 定义必须指定一个块大小；一个块包含多次 `ItemReader`\
  \ 和 `ItemProcessor` 调用，以一次读取和处理一个项目，直到达到块大小。当块被读取和处理完毕后，`Step` 调用 `ItemWriter` 写入整个块，然后继续处理下一个块。当\
  \ `ItemReader` 返回 `null` 时，循环结束，这意味着没有更多数据需要处理，并且这个不完整的块是当前 `StepExecution` 中的最后一个块。\n\
  \n面向块的处理示例的公共类\n\n在深入探讨面向块的示例之前，我们将介绍本章这些示例中共享的几个类。与上一章一样，我们不会在实际示例中突出 SB 的特性，因为\
  \ SB 也是一个高度可配置的框架。示例的简洁性将更好地说明 SB 的特性。代码清单 9-1 展示了一个用于读取 `String` 类型记录的简单仓库。\n\n\
  ***代码清单 9-1***. 用于读取面向块的处理示例记录的仓库 (0900-batch-common)\n\n```\npackage net.lkrnac.book.eiws.chapter09.read;\n\
  import java.util.Iterator;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\
  import java.util.stream.IntStream;\nimport org.springframework.stereotype.Repository;\n\
  \n@Repository\npublic class ReadRepository {\n  private static final Iterator<String>\
  \ ITERATOR = generateRecords(15).iterator();\n\npublic synchronized String readNext()\
  \ {\n    return (ITERATOR.hasNext()) ? ITERATOR.next() : null;\n  }\n\nprivate static\
  \ List<String> generateRecords(int count) {\n    return IntStream.range(0, count)\n\
          .mapToObj(idx -> \"simple record \" + idx)\n        .collect(Collectors.toList());\n\
    }\n}\n```\n\n这个 Spring Bean 使用了 `@Repository` 注解。当 Spring 初始化这个 Bean 时，它会使用 Java\
  \ 8 Stream API 生成简单的记录。`IntStream.range` 方法生成一个包含 15 个整数的流，这些整数被转换为 `String` 记录并收集到\
  \ `List` 中。当生成这组记录后，我们将其迭代器存储到常量 `ITERATOR` 中，用于通过 `readNext` 方法读取记录。此方法是同步的，因为读取可能发生在多个线程中。这在某些示例中很方便。代码清单\
  \ 9-2 展示了自定义的 `ItemReader`。\n\n***代码清单 9-2***. 用于面向块的处理示例的自定义 ItemReader (0900-batch-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.read;\nimport org.springframework.batch.item.ItemReader;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleRecordReader implements ItemReader<String> {\n\
    private ReadRepository readRepository;\n\n@Autowired\n  public SimpleRecordReader(ReadRepository\
  \ readRepository) {\n    super();\n    this.readRepository = readRepository;\n  }\n\
  \n@Override\n  public String read() {\n    return readRepository.readNext();\n  }\n\
  }\n```\n\n这个 `ItemReader` 实现也是一个 Spring Bean，它注入了 `ReadRepository` Bean 以从中读取数据。泛型\
  \ `String` 定义了我们正在读取的项的类型。需要实现 `read` 方法来读取一个待处理的项目。代码清单 9-3 展示了面向块示例中使用的自定义 `ItemProcessor`。\n\
  \n***代码清单 9-3***. 用于面向块的处理示例的自定义 ItemProcessor (0900-batch-common)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter09.process;\nimport org.springframework.batch.item.ItemProcessor;\n\
  import org.springframework.stereotype.Component;\n```\n\n\n@Component\npublic class\
  \ SimpleRecordProcessor implements ItemProcessor<String, String> {\n  @Override\n\
    public String process(String item) throws Exception {\n    return item + \" processed\"\
  ;\n  }\n}\n```\n\n这也是一个 Spring Bean，它会在处理记录后追加字符串 `processed`。在实际应用中，这里是我们将项目从读取格式/POJO\
  \ 转换为写入格式/POJO 的地方。`ItemProcessor` 接口的泛型类型定义了处理前后项目的类型。在这个简单的示例中，两者都是 `String` 类型。清单\
  \ 9-4 展示了简单的写入仓库。\n\n***清单 9-4***. 用于分块处理示例中读取记录的写入仓库 (0900-batch-common)\n\n```\n\
  package net.lkrnac.book.eiws.chapter09.write;\nimport java.util.List;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.stereotype.Repository;\n\n@Slf4j\n@Repository\npublic\
  \ class WriteRepository {\n  public void writeRecords(List<? extends String> records)\
  \ {\n    records.stream()\n        .map(record -> \"Writing record: \" + record)\n\
          .forEach(log::info);\n  }\n}\n```\n\n这个 Spring Bean 会记录给定的记录集合，并模拟某种类型的处理。对于日志记录，我们使用了\
  \ Lombok 注解 `@Slf4j`。对于遍历记录，我们再次使用了 Java 8 Stream API。清单 9-5 展示了自定义的 `ItemWriter`。\n\
  \n***清单 9-5***. 用于分块处理示例的自定义 ItemWriter (0900-batch-common)\n\n```\npackage net.lkrnac.book.eiws.chapter09.write;\n\
  import java.util.List;\nimport org.springframework.batch.item.ItemWriter;\nimport\
  \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleRecordWriter implements ItemWriter<String> {\n\
    private WriteRepository writeRepository;\n\n@Autowired\n  public SimpleRecordWriter(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    }\n\n@Override\n  public void write(List<? extends String> items) throws Exception\
  \ {\n    writeRepository.writeRecords(items);\n  }\n}\n```\n\n这个 Spring Bean 实现了\
  \ `ItemWriter` 接口；项目类型是 `String`。*WriteRepository* 被注入，因此我们可以通过 `write()` 方法写入记录。\n\
  \n![Image](img/sq.jpg) **注意**  你可能会问，既然我们想尽可能保持示例简单，为什么还要引入 `ReadRepository` 和 `WriteRepository`？原因在于可测试性。我想确保示例按描述的方式工作，因此\
  \ SB 配置由简单的集成测试覆盖。在这些测试中，`ReadRepository` 和 `WriteRepository` 经常被模拟并用于验证。但这种测试超出了本书的范围。与本书示例配套的测试可以在\
  \ GitHub 仓库中找到 (`https://github.com/lkrnac/book-eiws-code-samples`)。\n\n使用 XML 配置的分块处理示例\n\
  \n分块处理示例使用了 Spring Boot，但你会看到使用纯 Spring 框架配置 SB 应用程序是类似的。我们的第一个 SB 示例，如清单 9-6 所示，使用了\
  \ XML 配置。\n\n***清单 9-6***. 分块处理示例的 XML 配置（示例项目 0901-chunk-processing-generic-xml\
  \ 的 src/main/resources 文件夹中的 batch-config.xml 文件）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"simpleRecordsJob\">\n    <step id=\"simpleRecordsStep\">\n      <tasklet>\n\
          <chunk reader=\"simpleRecordReader\" writer=\"simpleRecordWriter\"\n          processor=\"\
  simpleRecordProcessor\" commit-interval=\"4\" />\n      </tasklet>\n    </step>\n\
    </job>\n</beans:beans>\n```\n\n我们默认不使用 `beans` 命名空间，因为使用 `batch` 命名空间（我们不需要为批处理\
  \ XML 标签使用 `<batch:` 前缀）可以使 SB 配置更具可读性。在本章中，我们采用这种方法进行 SB 配置。\n\n配置本身包含一个 `Job`\
  \ 的定义，该 Job 包含一个 `Step`，它使用了我们通用的读取器、处理器和写入器。`<job>` 和 `<step>` XML 标签创建了名称由 `id`\
  \ 属性定义的 Spring Bean。`Step` 定义中的最后一个属性是 `commit-interval`，它指定了此步骤的块大小。清单 9-7 展示了如何将\
  \ XML 配置加载到 Spring 上下文中。\n\n***清单 9-7***. 使用 XML 配置的分块处理示例的 BatchConfiguration 类\
  \ (0901-chunk-processing-generic-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  \nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.ImportResource;\n\
  \n@Configuration\n@EnableBatchProcessing\n@ImportResource(\"classpath:batch-config.xml\"\
  )\npublic class BatchConfiguration {\n}\n```\n\n这是一个标准的 Spring 配置类，它导入了清单 9-6 中的\
  \ XML 配置。最后一个注解是 `@EnableBatchProcessing`，它启用了 SB 特性并创建了批处理所需的默认 Bean。我们将在本章后面深入探讨这些\
  \ Bean。目前，我们只需要知道它对 SB 配置是必需的。请注意，这个配置类经常用于涉及 SB XML 配置的示例中，因此我们会经常引用这个清单。\n\n清单\
  \ 9-8 展示了这个示例的最后一部分。\n\n***清单 9-8***. 使用 XML 配置的分块处理示例的主类 (0901-chunk-processing-generic-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@SpringBootApplication\n\
  public class BatchApplication {\n  public static void main(String[] args) throws\
  \ InterruptedException {\n    SpringApplication.run(BatchApplication.class);\n  }\n\
  }\n```\n\n这是标准的 Spring Boot 主应用程序类。`@SpringBootApplication` 注解会执行 Spring Boot 的自动配置，并在当前包及其子包中进行组件扫描。然后，通过调用\
  \ `SpringApplication.run()` 在主方法中执行此配置。\n\n这个 Spring Boot 主类经常用于基于 Spring Boot 的示例中，因此我们稍后会引用这个清单。重要的是要记住，如果\
  \ Spring Boot 应用程序使用了 `@EnableBatchProcessing`，那么所有作业默认会在应用程序启动时执行。\n\n运行这个主配置类将产生清单\
