  \n***清单 9-74***. 带注解的步骤监听器 (0919-step-listener-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.ExitStatus;\nimport org.springframework.batch.core.StepExecution;\n\
  import org.springframework.batch.core.StepExecutionListener;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  \n@Component\npublic class HotWaterStepListener implements StepExecutionListener\
  \ {\n  private SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public HotWaterStepListener(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public void beforeStep(StepExecution stepExecution) {\n    executablePoint.execute(\"\
