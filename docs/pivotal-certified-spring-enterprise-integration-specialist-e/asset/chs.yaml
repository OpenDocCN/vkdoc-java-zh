  \ Boot 主类相同。运行后，我们得到与清单 9-76 相同的输出。\n\n面向块的处理的监听器的 XML 配置\n\n准备好迎接一个监听器密集型的示例吧，因为面向块的处理可以被相当广泛地拦截。清单\
  \ 9-79 展示了块监听器。\n\n***清单 9-79***. 带注解的块监听器（0921-chunk-listener-xml）\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter09;\nimport org.springframework.batch.core.ChunkListener;\n\
  import org.springframework.batch.core.scope.context.ChunkContext;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  \n@Component\npublic class SimpleChunkListener implements ChunkListener {\n  private\
  \ SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public SimpleChunkListener(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public void beforeChunk(ChunkContext context) {\n    executablePoint.execute(\"\
  开始处理块: \" + context);\n  }\n\n@Override\n  public void afterChunk(ChunkContext context)\
  \ {\n    executablePoint.execute(\"块处理完成: \" + context);\n  }\n\n@Override\n  public\
  \ void afterChunkError(ChunkContext context) {\n    executablePoint.execute(\"块处理中发生错误:\
  \ \" + context);\n  }\n}\n```\n\n可以在块被读取之前或之后，或者在块错误发生后拦截块。每次 SB 都会向我们传递一个 `ChunkContext`\
  \ 实例。由于我们没有使用注解，我们需要根据接口 `ChunkListener` 来命名拦截方法。清单 9-80 展示了项目读取监听器。\n\n***清单 9-80***.\
  \ 带注解的项目读取监听器（0921-chunk-listener-xml）\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.ItemReadListener;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  \n@Component\npublic class SimpleItemReaderListener implements ItemReadListener<String>\
  \ {\n  private SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public SimpleItemReaderListener(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public void beforeRead() {\n    executablePoint.execute(\"开始读取...\"\
  );\n  }\n\n@Override\n  public void afterRead(String item) {\n    executablePoint.execute(\"\
  读取完成，项目: \" + item);\n  }\n\n@Override\n  public void onReadError(Exception ex)\
  \ {\n    executablePoint.execute(\"读取时发生错误\");\n  }\n}\n```\n\n我们实现了 `ItemReadListener<String>`\
  \ 接口，该接口包含三个拦截方法。显然，在读取之前我们不知道将要读取什么项目。因此，`beforeRead()` 方法没有任何参数。读取后，SB 会注入一个项目实例。如果发生错误，SB\
  \ 会注入发生的异常实例。清单 9-81 展示了项目处理监听器。\n\n***清单 9-81***. 带注解的项目处理监听器（0921-chunk-listener-xml）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport org.springframework.batch.core.ItemProcessListener;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\n@Component\n\
  public class SimpleItemProcessListener implements\n    ItemProcessListener<String,\
  \ String> {\n  private SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public\
  \ SimpleItemProcessListener(SimpleExecutablePoint executablePoint) {\n    super();\n\
      this.executablePoint = executablePoint;\n  }\n\n@Override\n  public void beforeProcess(String\
  \ item) {\n    executablePoint.execute(\"开始处理项目: \" + item);\n  }\n\n\n\n@Override\n\
    public void afterProcess(String item, String result) {\n    executablePoint.execute(\"\
  Processed item: \" + result);\n  }\n\n@Override\n  public void onProcessError(String\
  \ item, Exception e) {\n    executablePoint.execute(\"Error occurred while processing\
  \ item: \" + item);\n  }\n}\n```\n\n在前置拦截中，我们通过参数获取处理前的项目实例。在后置处理拦截中，SB 会注入已处理/转换后的项目实例以及处理操作的结果。在后置处理错误拦截方法中，我们获取项目及其处理过程中发生的异常。显然，我们无法自行选择方法名称，因为我们没有使用注解。清单\
  \ 9-82 展示了项目写入器的拦截器。\n\n***清单 9-82***. 带注解的项目写入监听器 (0921-chunk-listener-xml)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter09;\nimport java.util.List;\nimport org.springframework.batch.core.ItemWriteListener;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\n@Component\n\
  public class SimpleItemWriterListener implements ItemWriteListener<String> {\n  private\
  \ SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public SimpleItemWriterListener(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public void beforeWrite(List<? extends String> items) {\n    executablePoint.execute(\"\
  Starting to write items...\");\n  }\n\n@Override\n  public void afterWrite(List<?\
  \ extends String> items) {\n    executablePoint.execute(\"Items written successfully\"\
  );\n  }\n\n@Override\n  public void onWriteError(Exception exception, List<? extends\
  \ String> items) {\n    executablePoint.execute(\"Error occurred while writing items\"\
  );\n  }\n}\n```\n\n项目写入器中的注入略有不同，因为写入器处理的是项目的 `List`，而非逐个处理项目。除此之外，注入的值和拦截点与读取器和处理器类似。清单\
  \ 9-83 展示了 XML 格式的 SB 流程配置。\n\n***清单 9-83***. 带有块监听器的 XML 批处理配置 (文件位于示例项目 0921-chunk-listener-xml\
  \ 的 src/main/resource 文件夹中的 batch-config.xml)\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"simpleRecordsJob\">\n    <step id=\"simpleRecordsStep\">\n      <tasklet>\n\
          <chunk reader=\"simpleRecordReader\" writer=\"simpleRecordWriter\"\n          processor=\"\
  simpleRecordProcessor\" commit-interval=\"4\">\n          <listeners>\n            <listener\
  \ ref=\"simpleChunkListener\"/>\n            <listener ref=\"simpleItemReaderListener\"\
  />\n            <listener ref=\"simpleItemProcessListener\"/>\n            <listener\
  \ ref=\"simpleItemWriterListener\"/>\n          </listeners>\n        </chunk>\n\
        </tasklet>\n    </step>\n  </job>\n</beans:beans>\n```\n\n所有监听器都注册为 `<chunk>`\
  \ 的子标签。在这种情况下，监听器的顺序无关紧要，因为它们用于不同的处理阶段。如果我们为同一个批处理阶段注册了多个不同的监听器，它们将按照注册的顺序执行。\n\n\
