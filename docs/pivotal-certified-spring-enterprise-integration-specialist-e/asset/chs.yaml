  \ Message received: simple message\n```\n\n这种消息接收方式也称为*轮询*。从输出中可以看出，这种同步消息接收会引入延迟，在大多数情况下可能不满足我们的需求。因此，最常见的做法是通过注册\
  \ JMS 监听器来实现异步 JMS 接收。\n\n使用 MessageCreator 回调\n\n有时我们可能需要基于 JMS `Session` 对象构建消息。在这种情况下，我们需要将\
  \ `JmsTemplate` 与 `MessageCreator` 接口结合使用来发送消息。该接口的签名如清单 5-25 所示。\n\n***清单 5-25***.\
  \ MessageCreator 接口的签名\n\n```\npackage org.springframework.jms.core;\n\nimport javax.jms.JMSException;\n\
  import javax.jms.Message;\nimport javax.jms.Session;\n\npublic interface MessageCreator\
  \ {\n  Message createMessage(Session session) throws JMSException;\n}\n```\n\n此回调接口要求我们实现\
  \ `createMessage` 方法，并基于 `javax.jms.Session` 对象提供自定义的 `javax.jms.Message` 创建逻辑。然后，在发送消息时，将这种自定义的消息构建逻辑传递给\
  \ `JmsTemplate.send` 和 `JmsTemplate.sendAndReceive` 方法。\n\n这种机制允许 Spring 管理会话实例（例如，用于缓存），同时为应用程序开发人员提供底层\
  \ JMS API 的完全灵活性。此用法的示例如清单 5-26 所示。\n\n***清单 5-26***. MessageCreator 用法 (0512-jms-message-creator)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport javax.jms.JMSException;\n\
  import javax.jms.Message;\nimport javax.jms.Session;\n\nimport lombok.extern.slf4j.Slf4j;\n\
  \n\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import org.springframework.jms.core.MessageCreator;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
  import org.springframework.stereotype.Component;\n\n@Slf4j\n@Component\npublic class\
  \ SimpleMessageSender {\n  private static final String SIMPLE_MESSAGE = \"simple\
  \ message\";\n  private JmsTemplate jmsTemplate;\n\n@Autowired\n  public SimpleMessageSender(JmsTemplate\
  \ jmsTemplate) {\n    super();\n    this.jmsTemplate = jmsTemplate;\n  }\n\n@Scheduled(fixedRate\
  \ = 1000)\n  public void send() {\n    log.info(\"Sending message: {}\", SIMPLE_MESSAGE);\n\
      jmsTemplate.send(\"queue/ExpiryQueue\", new MessageCreator() {\n      @Override\n\
        public Message createMessage(Session session) throws JMSException {\n        return\
  \ session.createTextMessage(SIMPLE_MESSAGE);\n      }\n    });\n  }\n}\n```\n\n\
  此 `SimpleMessageSender` 变体与清单 5-20 类似，区别在于 `send` 方法的实现。这里我们使用 `jmsTemplate.send`\
  \ 调用，并将目标名称作为其第一个参数。第二个参数类型为 `MessageCreator`，通过匿名内部类创建。\n\n为了在 `MessageCreator`\
  \ 回调中创建消息，我们使用 JMS API 调用 `session.createTextMessage`，该方法返回一个 `TextMessage` 实例。然后将其传递给\
  \ Spring，以便 Spring 可以将该实例发送到队列。\n\n**监听 JMS 消息**\n\nJMS 消息的同步接收可能会产生延迟，并不真正适合企业系统当前的实时需求。因此，监听\
  \ JMS 消息是更常见的 JMS 消息消费方式。Spring 使用 `MessageListenerContainer` 接口来监听出现在 JMS 目标上的新消息。\n\
  \n有两种开箱即用的实现，它们采用相反的方法进行消息接收：\n\n*   `SimpleMessageListenerContainer`：此实现在底层使用标准的\
  \ JMS 监听器注册 `MessageConsumer.setMessageListener()`，正如我们在清单 5-11 和 5-12 的异步 JMS 示例中所示。它无法参与任何分布式事务。此外，它使用固定数量的\
  \ JMS `Session` 对象，因此无法动态适应消息负载的运行时峰值。\n*   `DefaultMessageListenerContainer`：这是一个默认实现，使用一种称为*长轮询*的机制。这意味着\
  \ Spring 在独立线程中使用 `MessageConsumer.receive()` 调用来等待消息。该线程被阻塞，当消息出现在目标上时，它会立即被接收，并在单独的线程中传递给已注册的监听器。我们可以通过\
  \ `concurrentConsumers` 属性配置监听器线程的数量。为了避免无限等待，`receive` 调用结合使用超时参数和无限循环，确保此监听器容器几乎始终处于监听状态。这种方法有多种优点：\n\
  \    *   消费者可以使用 JMS 接收的事务特性并参与分布式事务。\n    *   它可以轻松地从 JMS 目标的临时中断中恢复。\n    *  \
  \ 我们可以通过指定与 `concurrentConsumers` 不同的 `maxConcurrentConsumers` 属性，选择性地允许动态适应运行时需求。\n\
  \n有多种创建 `MessageListenerContainer` 的选项：\n\n*   使用 `<jms:listener-container>` XML\
  \ 元素\n*   通过 `@Bean` 注解或 `<bean>` XML 元素直接注册 `MessageListenerContainer` Bean\n\n\
  `MessageListenerContainer` 管理消息的接收，但我们还需要将监听器注册到其中。同样，有多种选项可用于注册将处理接收消息的应用程序逻辑：\n\
  \n*   使用 `<jms:listener>` XML 元素\n*   使用监听器实现列表注册 `MessageListenerContainer` Bean\n\
  *   使用 `@JmsListener` 注解\n\n`@JmsListener` 注解是在 Spring 4.1 版本中引入的。使用 `@JmsListener`\
  \ 注解的方法可用于灵活注入 JMS 消息实例或其部分内容。Spring 支持注入以下内容：\n\n*   `javax.jms.Message` 或其任何子类\n\
  *   `javax.jms.Session`\n*   `org.springframework.messaging.Message<T>` 作为 Spring\
  \ 消息传递的通用抽象。此抽象也可用于 Spring 支持的其他消息传递类型（例如，通过 Spring Integration、WebSockets、AMQP）\n\
  *   带有 `@Header` 注解的 JMS 消息头\n*   带有 `@Headers` 注解的所有 JMS 消息头\n*   带有 `@Payload`\
  \ 注解的 JMS 消息负载\n*   让我们通过简单的示例来演示其中一些结构。\n\n**使用 XML 配置注册监听器的示例**\n\n我们的第一个 Spring\
  \ JMS 监听器实现示例显示在清单 5-27 中。\n\n***清单 5-27***. 作为 javax.jms.MessageListener 子类的消息监听器\
  \ (0505-async-jms-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\n\
  import javax.jms.JMSException;\nimport javax.jms.Message;\nimport javax.jms.MessageListener;\n\
  import javax.jms.TextMessage;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleMessageListener implements MessageListener {\n\
    private SimpleService simpleService;\n\n@Autowired\n  public SimpleMessageListener(SimpleService\
  \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
  \n@Override\n  public void onMessage(Message message) {\n    try {\n      TextMessage\
  \ textMessage = (TextMessage) message;\n      simpleService.processText(textMessage.getText());\n\
      } catch (JMSException ex) {\n      ex.printStackTrace();\n    }\n  }\n}\n```\n\
  \n此监听器实现了 `javax.jms.MessageListener` 接口。同时，它也是一个 Spring Bean，通过构造函数注入注入了 `simpleService`\
  \ 实例。此服务实例与清单 5-10 中的相同。\n\n`SimpleMessageListener` 必须根据由 `javax.jms.MessageListener`\
  \ 接口驱动的 JMS 监听器契约实现 `onMessage` 方法。当消息通过其 JMS 目标被接收时，`javax.jms.Message` 的实例被传递到此方法中。为了在我们的应用程序中消费此消息，我们需要将其转换为\
  \ `TextMessage` 并传递给我们的 `simpleService` 实例。调用 `textMessage.getTest()` 迫使我们处理 `JMSException`，因为它是一个受检异常。\n\
  \n清单 5-28 展示了如何在 Spring 中注册此监听器。\n\n***清单 5-28***. 未使用 JMS 命名空间配置的监听器 (文件 spring-jms-listener.xml\
  \ 位于示例项目 0505-async-jms-xml 的 src/main/resources 文件夹中)\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<bean\n    class=\"org.springframework.jms.listener.DefaultMessageListenerContainer\"\
  >\n    <property name=\"connectionFactory\" ref=\"connectionFactory\" />\n    <property\
  \ name=\"destinationName\" value=\"queue/ExpiryQueue\" />\n    <property name=\"\
  messageListener\" ref=\"simpleMessageListener\" />\n  </bean>\n</beans>\n```\n\n\
  \n\n此 Spring XML 配置仅使用 `bean` 命名空间来注册 Spring Bean。这里只注册了一个类型为 `DefaultMessageListenerContainer`\
  \ 的 Bean。我们需要配置强制参数 `connectionFactory`，其创建方式与我们本章前面所述类似。\n\n第二个强制参数是 `destinationName`。由于此示例使用\
  \ Spring Boot 作为便利层来配置一些样板 Bean，因此我们使用了与其他示例相同的队列名称。\n\n最后，我们注册了 `simpleMessageListener`\
  \ 实例，并完成了监听器的配置。\n\n如您所见，这种方法有一个缺点，因为侵入式的 JMS API 迫使我们处理受检异常 `JMSException`，并且需要实现\
  \ `javax.jms.MessageListener` 接口。但有一种更好的方法，可以帮助我们完全避免使用侵入式的 JMS API。\n\n一个可能的问题随之而来：“如果我们需要一个包含多个监听器的应用程序怎么办？”在这种情况下，最好使用\
  \ `<jms-listener>` 命名空间或 Spring 4.1 中引入的更现代的 `@JmsListener` 注解。这些将在后续示例中展示。\n\n\
  清单 5-29 展示了一个无需实现 `javax.jms.MessageListener` 的消息监听器的可能实现。\n\n***清单 5-29***. 与 JMS\
  \ API 无关的监听器实现 (0504-async-jms-namespace)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleMessageListener {\n  private SimpleService simpleService;\n\
  \n@Autowired\n  public SimpleMessageListener(SimpleService simpleService) {\n    super();\n\
      this.simpleService = simpleService;\n  }\n\npublic void handleMessage(String\
  \ message) {\n    simpleService.processText(message);\n  }\n}\n```\n\n这是一个 Spring\
  \ Bean，它通过构造函数注入获取 `simpleService` 实例。`SimpleService` 是来自清单 5-10 的 Bean。清单 5-30\
  \ 展示了如何使用 XML 配置来配置此监听器。\n\n***清单 5-30***. 使用 JMS 命名空间配置的监听器 (文件 spring-jms-listener.xml\
  \ 位于示例项目 0504-async-jms-namespace 的 src/main/resources 文件夹中)\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:jms=\"http://www.springframework.org/schema/jms\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/jms\n    http://www.springframework.org/schema/jms/spring-jms.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<jms:listener-container destination-resolver=\"destinationResolver\">\n    <jms:listener\
  \ destination=\"queue/ExpiryQueue\" ref=\"simpleMessageListener\"\n      method=\"\
  handleMessage\" />\n  </jms:listener-container>\n</beans>\n```\n\n此配置使用 `bean` 命名空间来支持\
  \ Spring Bean 的工作，并使用 `jms` 命名空间来支持 JMS 容器。根 XML 元素 `<jms:listener-container>` 默认使用\
  \ `DefaultMessageListenerContainer` 作为监听器容器的实现。属性 `destination-resolver` 使用了清单 5-16\
  \ 中已展示的 Bean。\n\nXML 子元素 `<jms:listener>` 注册了监听器实例 `simpleMessageListener`，用于通过其\
  \ `handleMessage` 方法接收消息。此方法接受 `String` 参数，因此 Spring 会自动将 JMS 消息负载转换为 `String` 类型并将其作为参数注入。\n\
  \n`<jms:listener-container>` 可以为不同的 JMS 目标注册多个 `<jms-listener>` 子元素。\n\n使用 Java\
  \ 配置注册监听器的示例\n\n使用 Java 配置注册监听器如清单 5-31 所示。\n\n***清单 5-31***. 使用 Java 配置的监听器 (0506-async-jms-java-config)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport javax.jms.ConnectionFactory;\n\
  import javax.jms.Queue;\nimport org.springframework.context.annotation.Bean;\nimport\
  \ org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.listener.DefaultMessageListenerContainer;\n\
  \n@Configuration\npublic class JmsListenerConfiguration {\n  @Bean\n  public DefaultMessageListenerContainer\
  \ defaultMessageListenerContainer(\n      ConnectionFactory connectionFactory,\n\
        SimpleMessageListener simpleMessageListener, Queue queue) {\n    DefaultMessageListenerContainer\
  \ listenerContainer =\n        new DefaultMessageListenerContainer();\n    listenerContainer.setConnectionFactory(connectionFactory);\n\
      listenerContainer.setDestination(queue);\n    listenerContainer.setMessageListener(simpleMessageListener);\n\
      return listenerContainer;\n  }\n}\n```\n\n此 Spring 配置类仅注册了 `DefaultMessageListenerContainer`\
  \ Bean。注册该 Bean 的方法注入了另外三个 Spring Bean：`containerFactory`、`queue` 和 `simpleMessageListener`。这些\
  \ Bean 用于在通过构造函数创建 `listenerContainer` 实例后对其进行配置。\n\nSpring 4.1 引入了一个新的 JMS 注解，如清单\
  \ 5-32 所示。\n\n***清单 5-32***. 使用 @JmsListener 注解配置的监听器 (0508-async-listener-annotation)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.annotation.JmsListener;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleMessageListener\
  \ {\n  private SimpleService simpleService;\n\n@Autowired\n  public SimpleMessageListener(SimpleService\
  \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
  \n@JmsListener(destination = \"queue/ExpiryQueue\")\n  public void readMessage(String\
  \ message) {\n    simpleService.processText(message);\n  }\n}\n```\n\n处理消息的方法使用了\
  \ `@JmsListener` 注解。Spring 将此方法暴露为一个监听 JMS 消息的 JMS 端点。此注解具有强制属性 `destination`，用于定义其监听的目标名称。这是目前接收消息的首选方式。\n\
  \n转换 JMS 消息\n\nSpring JMS 模块提供的一个有用功能是消息转换。尽管纯 JMS 提供了将 `Serializable` 对象作为负载发送的选项，但由于缺乏互操作性，这并不是一个流行的解决方案。因此，由于\
  \ JMS 主要使用文本格式，有时也使用二进制格式作为负载，因此与某些基于文本的格式进行转换是一个相当标准的需求。使用纯 Java JMS API 进行此操作可能既冗长又容易出错。\n\
  \n幸运的是，Spring JMS 提供了一个优雅的解决方案。我们可以在通信通道的两端转换消息，因为 `JmsTemplate`（负责发送和同步接收 JMS 消息）和\
  \ `AbstractJmsListenerContainerFactory`（负责监听 JMS 目标，是 `DefaultJmsListenerContainerFactory`\
  \ 和 `SimpleJmsListenerContainerFactory` 的抽象父类）都允许我们选择性地将 `MessageConverter` 接口注册为其属性。清单\
  \ 5-33 展示了此接口的签名。\n\n***清单 5-33***. org.springframework.jms.support.converter.MessageConverter\
  \ 的签名\n\n```\npackage org.springframework.jms.support.converter;\n\nimport javax.jms.JMSException;\n\
  import javax.jms.Message;\nimport javax.jms.Session;\n```\n\n\npublic interface\
  \ MessageConverter {\n  Message toMessage(Object object, Session session) throws\
  \ JMSException,\n     MessageConversionException;\n\nObject fromMessage(Message\
  \ message) throws JMSException,\n     MessageConversionException;\n}\n```\n\n显然，这里期望的是双向转换。此消息转换器实例用于转换所有流经注册了该转换器的\
  \ `JmsTemplate` 或 `AbstractJmsListenerContainerFactory` 的消息。因此，通过这种方式，我们可以轻松地将自定义消息转换插入到\
  \ JMS 通信中。\n\n此外，Spring 为最常见的传输格式提供了几个开箱即用的实现：\n\n*   `org.springframework.jms.support.converter.MappingJackson2MessageConverter`：作为\
  \ Jackson 库版本 2 的包装器，提供 JSON 到 Java POJO 的转换。\n*   `MarshallingMessageConverter`：用于使用\
  \ `org.springframework.oxm.Marshaller` 和 `org.springframework.oxm.Unmarshaller`\
  \ 进行 XML 编组/解组。\n*   `MessagingMessageConverter`：用于在发送需要转换的有效负载的同时，还发送自定义 JMS 标头的情况。该转换器在\
  \ Spring 4.1 中引入。\n\n为了演示此支持，我们将更改领域模型。领域模型将由清单 5-34 中所示的 POJO 表示。\n\n***清单 5-34***.\
  \ User POJO (0500-jms-common)\n\n```\npackage net.lkrnac.book.eiws.chapter05.user;\n\
  \nimport lombok.Data;\n\n@Data\npublic class User {\n  private String email;\n  private\
  \ String name;\n}\n```\n\n这是一个简单的 Java 类型，包含两个私有字段：`email` 和 `name`。Lombok 注解 `@Data`\
  \ 将生成一个包含这两个参数的构造函数，以及它们的 getter 和 setter 方法。\n\nJSON 转换示例\n\n为了演示 Spring JMS 提供的开箱即用的\
  \ JSON 转换，我们需要注册 `MessageConverter` bean，如清单 5-35 所示。\n\n***清单 5-35***. JSON JMS\
  \ 转换配置 (0509-jms-message-converter)\n\n```\npackage net.lkrnac.book.eiws.chapter05.user;\n\
  \nimport javax.jms.ConnectionFactory;\n\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.jms.config.DefaultJmsListenerContainerFactory;\nimport\
  \ org.springframework.jms.core.JmsTemplate;\nimport org.springframework.jms.support.converter.MappingJackson2MessageConverter;\n\
  import org.springframework.jms.support.converter.MessageConverter;\nimport org.springframework.jms.support.converter.MessageType;\n\
  \n@Configuration\n@EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public\
  \ MessageConverter messageConverter() {\n    MappingJackson2MessageConverter messageConverter\
  \ =\n        new MappingJackson2MessageConverter();\n    messageConverter.setTargetType(MessageType.TEXT);\n\
      messageConverter.setTypeIdPropertyName(\"__type\");\n    return messageConverter;\n\
    }\n\n@Bean\n  public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory,\n\
        MessageConverter messageConverter) {\n    JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);\n\
      jmsTemplate.setMessageConverter(messageConverter);\n    return jmsTemplate;\n\
    }\n\n@Bean\n  public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
        ConnectionFactory connectionFactory, MessageConverter messageConverter) {\n\
      DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
      factory.setConnectionFactory(connectionFactory);\n    factory.setMessageConverter(messageConverter);\n\
      return factory;\n  }\n}\n```\n\n在此配置类中注册的第一个 bean 是 `messageConverter`。我们使用涵盖\
  \ JSON 转换的 `MappingJackson2MessageConverter` 实现。为了告诉 Spring 我们的目标格式是纯文本，我们需要将 `targetType`\
  \ 属性配置为 `MessageType.TEXT`。需要值为 `__type` 的 `typeIdPropertyName` 属性，因为 Spring 需要知道我们正在将文本传输格式与\
  \ Java POJO 进行相互转换。`__type` 值用作一个特殊的 JMS 标头，该标头保存用于 JSON 转换的类型的完整 Java 名称。两个下划线应确保此标头不会与应用程序可能使用的自定义\
  \ JMS 标头冲突。\n\n接下来的两个 bean 我们已经很熟悉了。`JmsTemplate` 用于发送消息，`DefaultJmsListenerContainerFactory`\
  \ 用于接收消息。不同之处在于，我们为两者都注入并设置了 `messageConverter` 属性。\n\n清单 5-36 展示了如何将 `User` 对象发送到\
  \ JMS 目标。\n\n***清单 5-36***. 发送 JSON 格式的 JMS 消息 (0509-jms-message-converter)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter05.user;\n\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter05.user.User;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
  import org.springframework.stereotype.Component;\n\n@Slf4j\n@Component\npublic class\
  \ UserMessageSender {\n  private JmsTemplate jmsTemplate;\n\n@Autowired\n  public\
  \ UserMessageSender(JmsTemplate jmsTemplate) {\n    super();\n    this.jmsTemplate\
  \ = jmsTemplate;\n  }\n\n@Scheduled(fixedRate = 1000)\n  public void send() {\n\
      User user = new User();\n    user.setEmail(\"lubos.krnac@gmail.com\");\n    user.setName(\"\
  Lubos Krnac\");\n\nlog.info(\"Sending message: {}\", user);\n    jmsTemplate.convertAndSend(\"\
  queue/ExpiryQueue\", user);\n  }\n}\n```\n\n在此类中，JMS 消息每秒发送一次，由 `@Scheduled` 注解定义。首先，我们创建并初始化\
  \ `User` 对象，并记录发送消息的日志。接下来，我们调用 `jmsTemplate.convertAndSend()` 方法，并将消息队列名称和 `user`\
  \ 对象作为参数。Spring 将使用底层的 `MappingJackson2MessageConverter` 将我们的 POJO 转换为 JSON，并将其嵌入到\
  \ JMS 消息有效负载中。\n\n清单 5-37 展示了如何监听此类消息。\n\n***清单 5-37***. 监听 JSON 格式的 JMS 消息 (0509-jms-message-converter)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.user;\n\nimport net.lkrnac.book.eiws.chapter05.user.User;\n\
  import net.lkrnac.book.eiws.chapter05.user.UserService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class UserMessageListener {\n  private UserService userService;\n\
  \n@Autowired\n  public UserMessageListener(UserService userService) {\n    super();\n\
      this.userService = userService;\n  }\n\n@JmsListener(destination = \"queue/ExpiryQueue\"\
  )\n  public void readMessage(User user) {\n    userService.processUser(user);\n\
    }\n}\n```\n\n`readMessage` 方法使用 `@JmsListener` 注解，因此它监听名称为 `queue/ExpiryQueue`\
  \ 的 JMS 队列。此方法的参数类型为 `User`。Spring 知道使用哪个转换器将 JSON 消息转换为 `User` 对象。转换后，它被注入到我们的逻辑中。\n\
  \n`UserService` bean 的实现如清单 5-38 所示。\n\n***清单 5-38***. UserService Bean 配置 (0500-jms-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.user;\n\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.stereotype.Service;\n\n\n\n@Slf4j\n@Service\npublic class\
  \ UserService {\n  public void processUser(User user) {\n    log.info(\"User object\
  \ Received: {}\", user);\n  }\n}\n```\n\n消息的处理方式很简单：将输出打印到控制台。在 `0509-jms-message-converter`\
  \ 示例中，最后一个类是 清单 5-39 中的主类。\n\n***清单 5-39***. JSON 消息转换器示例的主类 (0509-jms-message-converter)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.user;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  \n@EnableScheduling\n@SpringBootApplication\npublic class JmsMessageConverterApplication\
  \ {\n  public static void main(String[] args) throws InterruptedException {\n    SpringApplication.run(JmsMessageConverterApplication.class,\
  \ args);\n  }\n}\n```\n\n这是一个标准的 Spring Boot 主类。当我们运行它时，输出结果如 清单 5-40 所示。\n\n***清单\
