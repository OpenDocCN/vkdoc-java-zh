  \n请注意，监听消息不会在我们的通信中引入任何人为延迟。\n\n自定义转换示例\n\n下一个示例重点介绍如何使用自定义转换格式传输和转换消息。清单 5-41 展示了与自定义负载格式之间的转换。\n\
  \n***清单 5-41***. 自定义消息转换器 (0510-jms-custom-converter)\n\n```\npackage net.lkrnac.book.eiws.chapter05.user;\n\
  \nimport javax.jms.JMSException;\nimport javax.jms.Message;\nimport javax.jms.Session;\n\
  import net.lkrnac.book.eiws.chapter05.user.User;\nimport org.springframework.jms.support.converter.MessageConversionException;\n\
  import org.springframework.jms.support.converter.MessageConverter;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class UserMessageConverter implements MessageConverter {\n\
    private static final String DELIMITER = \";\";\n\n@Override\n  public Message\
  \ toMessage(Object object, Session session) throws JMSException,\n      MessageConversionException\
  \ {\n    User user = (User) object;\n    String userString = user.getEmail() + DELIMITER\
  \ + user.getName();\n    return session.createTextMessage(userString);\n  }\n\n\
  @Override\n  public Object fromMessage(Message message) throws JMSException,\n      MessageConversionException\
  \ {\n    String userMessage = message.getBody(String.class);\n    String[] userStringChunks\
  \ = userMessage.split(DELIMITER);\n    User user = new User();\n    user.setEmail(userStringChunks[0]);\n\
      user.setName(userStringChunks[1]);\n    return user;\n  }\n}\n```\n\n该类实现了 `org.springframework.jms.support.converter.MessageConverter`\
  \ 接口。其契约由两个方法驱动：`toMessage` 和 `fromMessage`。在 `toMessage` 中，我们接收一个需要转换为 `javax.jms.Message`\
  \ 的 Java `object`。我们知道它将是 `User` 类型；因此，我们将其强制转换为此类型。我们的自定义格式是按 `email` 和 `name`\
  \ 的顺序简单列出 `User` 对象属性，并以 `;` 分隔。当我们构建好 `userString` 负载后，调用 `session.createTextMessage()`\
  \ 将 `String` 包装成 `javax.jms.Message`。`session` 实例通过 Spring 的参数注入到 `toMessage` 转换方法中。\n\
  \n第二个方法 `fromMessage` 执行完全相反的操作。它将注入的 `javax.jms.Message` 类型的 `message` 提取为 `String`\
  \ 表示形式 `userMessage`，并根据分隔符将其拆分为值数组。随后，基于这些值创建用户对象，并将其返回给 Spring 框架。\n\n此转换器组件通过\
  \ `@Component` 注解，因此 Spring 可以将其用于配置 `JmsTemplate` 和 `DefaultJmsListenerContainerFactory`。此配置如\
  \ 清单 5-42 所示。\n\n***清单 5-42***. 自定义 JMS 转换器示例配置 (0510-jms-custom-converter)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter05.user;\n\nimport javax.jms.ConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
  import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.jms.support.converter.MessageConverter;\n\
  \n@Configuration\n@EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public\
  \ JmsTemplate jmsTemplate(ConnectionFactory connectionFactory,\n      MessageConverter\
  \ messageConverter) {\n    JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);\n\
      jmsTemplate.setMessageConverter(messageConverter);\n    return jmsTemplate;\n\
    }\n\n@Bean\n  public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
        ConnectionFactory connectionFactory, MessageConverter messageConverter) {\n\
      DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
      factory.setConnectionFactory(connectionFactory);\n    factory.setMessageConverter(messageConverter);\n\
      return factory;\n  }\n}\n```\n\n此配置与 清单 5-35 类似。唯一的区别是消息转换器是我们的自定义转换器 `UserMessageConverter`\
  \ 实例。\n\n发送和监听消息与 JSON 转换示例中的 清单 5-36 和 5-37 完全相同。\n\nMessagingMessageConverter\
  \ 示例\n\n最后一个 JMS 消息转换示例涵盖了 `MessagingMessageConverter` 以及在使用 `@JmsListener` 注解时用于注入\
  \ JMS 消息部分的注解。当我们需要转换消息并在转换后的消息负载旁边发送自定义 JMS 标头时，这种消息转换非常方便。\n\n为了解释 Spring 4.1\
  \ 框架的这些功能，我们需要再次修改需求。我们保留将 `User` 对象作为负载发送的需求。新的需求是在 JMS 标头中以 `String` 值的形式发送用户角色。清单\
  \ 5-43 展示了满足此新需求的消息发送器实现。\n\n***清单 5-43***. 用于用户对象和角色的 JMS 消息发送器 (0514-jms-message-annotations)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.userwithrole;\n\n\n\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter05.user.User;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.messaging.Message;\n\
  import org.springframework.messaging.support.MessageBuilder;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
  import org.springframework.stereotype.Component;\n\n@Slf4j\n@Component\npublic class\
  \ UserMessageSender {\n  private static final String ADMIN = \"admin\";\n  private\
  \ JmsTemplate jmsTemplate;\n\n@Autowired\n  public UserMessageSender(JmsTemplate\
  \ jmsTemplate) {\n    super();\n    this.jmsTemplate = jmsTemplate;\n  }\n\n@Scheduled(fixedRate\
  \ = 1000)\n  public void send() {\n    User user = new User();\n    user.setEmail(\"\
  lubos.krnac@gmail.com\");\n    user.setName(\"Lubos Krnac\");\n\nlog.info(\"Sending\
  \ User: {} in role {}\", user, ADMIN);\n    Message<User> userMessage = MessageBuilder\n\
       .withPayload(user)\n     .setHeader(\"role\", ADMIN)\n     .build();\n\njmsTemplate.convertAndSend(\"\
  queue/ExpiryQueue\", userMessage);\n  }\n}\n```\n\n这个 `UserMessageSender` 类的开头部分应该与之前的示例类似。新增的内容是定义了用户角色的常量，我们打算将其作为\
  \ JMS 标头发送。`send` 方法同样被设置为每秒执行一次。\n\n在该方法的主体中，我们创建了将要发送到 JMS 目标地址的用户对象以及要发送的日志数据。接下来，我们使用\
  \ Spring 4.0 引入的 `MessageBuilder` 支持来构建 JMS 消息。有效载荷将是我们的 `user` 对象，而 `role` 标头的值为\
  \ `admin`。最后，我们调用 `jmsTemplate` 来发送构建好的消息。\n\n列表 5-44 涵盖了此示例的监听器部分。\n\n***列表 5-44***.\
  \ 注入 JMS 消息部分 (0514-jms-message-annotations)\n\n```\npackage net.lkrnac.book.eiws.chapter05.userwithrole;\n\
  \nimport java.util.Map;\nimport lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter05.user.User;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.annotation.JmsListener;\n\
  import org.springframework.messaging.handler.annotation.Header;\nimport org.springframework.messaging.handler.annotation.Headers;\n\
  import org.springframework.messaging.handler.annotation.Payload;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class UserMessageListener {\n  private UserWithRoleService\
  \ userWithRoleService;\n\n@Autowired\n  public UserMessageListener(UserWithRoleService\
  \ userWithRoleService) {\n    super();\n    this.userWithRoleService = userWithRoleService;\n\
    }\n\n@JmsListener(destination = \"queue/ExpiryQueue\")\n  public void readMessage(@Payload\
  \ User user, @Header String role,\n      @Headers Map<String, Object> headers) {\n\
      log.info(\"Message with ID \" + headers.get(\"id\") + \" received\");\n    userWithRoleService.processUser(user,\
  \ role);\n  }\n}\n```\n\n在这个例子中，`readMessage` 方法不再接收消息体的 `String` 参数。当我们用 `@Payload`\
  \ 注解用户参数时，我们向 Spring 指示应该执行将 JMS 消息转换为 `User` 类型的操作。我们在这里进行的第二个注入是注入名为 `role` 的自定义\
  \ JMS 标头。这种注入可以通过 `@Header` 注解实现。Spring 能够根据参数名称识别标头。这两个对象随后被传递给 `userWithRoleService.processUser()`\
  \ 调用。\n\n最后，我们将 JMS 消息的所有标头注入到 Map 中，并在日志条目中使用名为 `id` 的标头，以指示消息已被接收。`UserWithRoleService`\
  \ 在列表 5-45 中定义。\n\n***列表 5-45***. 处理带角色用户消息的服务 (0500-jms-common)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter05.userwithrole;\n\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter05.user.User;\nimport org.springframework.stereotype.Service;\n\
  \n@Slf4j\n@Service\npublic class UserWithRoleService {\n  public void processUser(User\
  \ user, String role) {\n    log.info(\"User object Received: {} with role {}\",\
  \ user, role);\n  }\n}\n```\n\n同样，为了简化示例，同时使我们的示例能够被集成测试套件支持（因为我们希望确保书中的代码片段能够正常工作），我们只是记录接收到的数据。Spring\
  \ JMS 资源 Bean 的有趣配置差异如列表 5-46 所示。\n\n***列表 5-46***. MessagingMessageConverter 示例的\
  \ JMS 配置 (0514-jms-message-annotations)\n\n```\npackage net.lkrnac.book.eiws.chapter05.userwithrole;\n\
  \nimport javax.jms.ConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.jms.config.DefaultJmsListenerContainerFactory;\nimport\
  \ org.springframework.jms.core.JmsTemplate;\nimport org.springframework.jms.support.converter.MappingJackson2MessageConverter;\n\
  import org.springframework.jms.support.converter.MessageConverter;\nimport org.springframework.jms.support.converter.MessageType;\n\
  import org.springframework.jms.support.converter.MessagingMessageConverter;\n\n\
  @Configuration\n@EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public JmsTemplate\
  \ jmsTemplate(ConnectionFactory connectionFactory,\n      MessageConverter messageConverter)\
  \ {\n    JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);\n    jmsTemplate.setMessageConverter(messageConverter);\n\
      return jmsTemplate;\n  }\n\n@Bean\n  public MessageConverter messageConverter()\
  \ {\n    MappingJackson2MessageConverter payloadConverter =\n        new MappingJackson2MessageConverter();\n\
      payloadConverter.setTargetType(MessageType.TEXT);\n    payloadConverter.setTypeIdPropertyName(\"\
  __type\");\n\nMessagingMessageConverter messageConverter =\n        new MessagingMessageConverter();\n\
      messageConverter.setPayloadConverter(payloadConverter);\n    return messageConverter;\n\
    }\n\n@Bean\n  public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
        ConnectionFactory connectionFactory, MessageConverter messageConverter) {\n\
      DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
      factory.setConnectionFactory(connectionFactory);\n    factory.setMessageConverter(messageConverter);\n\
      return factory;\n  }\n}\n```\n\n此代码片段中一个显著的区别在于 `messageConverter` Bean 的构建。我们没有直接返回\
  \ `MappingJackson2MessageConverter` 作为消息转换器，而是将其包装到 `MessagingMessageConverter`\
  \ 中作为有效载荷转换器，这允许我们将角色的 `String` 值附加到消息中。如果没有这种构造，`String` 也会尝试将我们的 `role` 从/向 `User`\
  \ 类型进行转换。如果我们不这样包装，转换显然会失败。因此，当我们想要注入 JMS 消息标头，同时又想对 JMS 消息有效载荷使用自定义转换时，就需要这种配置。\n\
  \n所有这些 Spring Bean 再次归属于同一个主 Spring Boot 类，如列表 5-47 所示。\n\n***列表 5-47***. 带角色用户示例的主类\
  \ (0514-jms-message-annotations)\n\n```\npackage net.lkrnac.book.eiws.chapter05.userwithrole;\n\
  \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.scheduling.annotation.EnableScheduling;\n\n\n\n@EnableScheduling\n\
  @SpringBootApplication\npublic class JmsMessageAnnotationsApplication {\n  public\
  \ static void main(String[] args) throws InterruptedException {\n    SpringApplication.run(JmsMessageAnnotationsApplication.class,\
  \ args);\n  }\n}\n```\n\n如果你留意了之前的示例，这里就不会感到意外。清单 5-48 展示了运行这个主类后的输出结果。\n\n***清单\
