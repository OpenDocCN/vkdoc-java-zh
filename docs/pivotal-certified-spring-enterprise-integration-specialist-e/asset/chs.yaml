  Result:\" + result1);  \n    boolean result2 = wrapperService.processText(\"message2\"\
  );  \n    log.info(\"Result:\" + result2);  \n  }  \n}  \n```  \n\n该逻辑与清单 8-69 中\
  \ `0818-router-xml-generic` 示例的逻辑类似，但在此例中我们没有包含 XML 配置，因为流完全通过 Java 进行配置。第二个区别在于我们用作\
  \ SI 网关服务接口的 bean 类型，因为这次使用的是带注解的版本。输出结果与清单 8-70 中 `0818-router-xml-generic` 示例的输出相同，并且由于我们没有使用\
  \ XML 配置，因此无法通过 STS 可视化集成图。  \n\n## 消息类型路由器示例  \n\n此示例基于负载类型进行路由。清单 8-76 展示了输出服务。\
  \  \n\n***清单 8-76***. 消息类型路由器示例的输出服务（0820-router-xml-message-type）  \n\n```  \n\
