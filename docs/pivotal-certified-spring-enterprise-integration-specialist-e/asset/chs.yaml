  \n***清单 4-53***. 异步 REST 消费示例控制台输出\n\n```\n20:38:11.101 [main] INFO  n.l.b.e.c.client.UserInfoService\
  \ - User Actions repository call took 4 ms.\n20:38:11.121 [main] INFO  n.l.b.e.c.client.UserInfoService\
