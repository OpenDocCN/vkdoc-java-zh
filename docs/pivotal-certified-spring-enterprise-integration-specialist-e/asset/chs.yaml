  清单 9-54 展示了有状态的 `ItemWriter`。\n\n***清单 9-54***. 有状态的 ItemWriter (0914-execution-context-chunk-processing)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.write;\nimport java.util.ArrayList;\n\
  import java.util.List;\nimport org.springframework.batch.core.StepExecution;\nimport\
  \ org.springframework.batch.core.annotation.BeforeStep;\nimport org.springframework.batch.item.ExecutionContext;\n\
  import org.springframework.batch.item.ItemWriter;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleRecordWriterDiscard\
  \ implements ItemWriter<String> {\n  private static final String CHUNK_COUNT = \"\
  chunkCount\";\n  private WriteRepository writeRepository;\n  private ExecutionContext\
  \ executionContext;\n\n@Autowired\n  public SimpleRecordWriterDiscard(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
  \  }\n\n@BeforeStep\n  public void storeExecutionContext(StepExecution stepExecution)\
  \ {\n    this.executionContext = stepExecution.getExecutionContext();\n    executionContext.put(CHUNK_COUNT,\
  \ 0);\n  }\n\n@Override\n  public void write(List<? extends String> items) throws\
  \ Exception {\n    int chunkCount = executionContext.getInt(CHUNK_COUNT);\n    List<String>\
  \ filteredItems = new ArrayList<>();\n    if (chunkCount % 2 == 0) {\n      filteredItems.add(items.get(0));\n\
  \    } else {\n      filteredItems.addAll(items);\n    }\n    executionContext.put(CHUNK_COUNT,\
  \ chunkCount + 1);\n\nwriteRepository.writeRecords(filteredItems);\n  }\n}\n```\n\
  \n这个 `ItemWriter` 使用 `@BeforeStep` 注解，通过 `StepExecution` 实例获取 `ExecutionContext`，并将映射条目\
  \ `chunkCount` 初始化为 `0`。在处理过程中，对于偶数块，它只写入该块的第一个记录，并递增 `chunkCount` 以在 `ExecutionContext`\
  \ 中维护状态。对于奇数块，它会写入所有条目。清单 9-55 展示了批处理配置。\n\n***清单 9-55***. 有状态面向块处理示例的批处理配置 (0914-execution-context-chunk-processing)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\n\
  import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\nimport net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriterDiscard;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n\
  \  public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n      SimpleRecordReader\
  \ simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n    \
  \  SimpleRecordWriterDiscard simpleRecordWriter) {\n    return stepBuilderFactory.get(\"\
  simpleRecordsStep\")\n        .<String, String> chunk(4)\n        .reader(simpleRecordReader)\n\
  \        .processor(simpleRecordProcessor)\n        .writer(simpleRecordWriter)\n\
  \        .build();\n  }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory\
  \ jobBuilderFactory,\n      Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"\
  simpleRecordsJob\")\n        .start(simpleRecordsStep)\n        .build();\n  }\n\
  }\n```\n\n这个配置在面向块的示例中已经展示过，但在这个案例中，我们使用了有状态的写入器 `SimpleRecordWriterDiscard`。此示例中的主类是我们跨示例复用的通用主批处理类。清单\
