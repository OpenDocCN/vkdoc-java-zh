  ```\n\n使用 Java 配置的面向块处理示例\n\n现在，让我们使用 Java 配置来配置相同的行为。清单 9-10 展示了 Java 批处理配置。\n\n\
  ***清单 9-10***. 面向块处理示例的 Java 配置 (0902-chunk-processing-generic-javaconfig)\n\n```\n\
  package net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\n\
  import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\nimport net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n\
  \  public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n      SimpleRecordReader\
  \ simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n    \
  \  SimpleRecordWriter simpleRecordWriter) {\n    return stepBuilderFactory.get(\"\
  simpleRecordsStep\")\n        .<String, String> chunk(4)\n        .reader(simpleRecordReader)\n\
  \        .processor(simpleRecordProcessor)\n        .writer(simpleRecordWriter)\n\
  \        .build();\n  }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory\
  \ jobBuilderFactory,\n      Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"\
  simpleRecordsJob\")\n        .start(simpleRecordsStep)\n        .build();\n  }\n\
  }\n```\n\n`@Configuration` 注解通常用于 Spring Java 配置，而 `@EnableBatchProcessing` 在前面的示例中已经讨论过。`Step`\
  \ bean 通过 `simpleRecordsStep()` 方法创建，该方法使用 `@Bean` 注解。Spring 会将读取器、写入器和处理器的实例与 `StepBuilderFactory`\
  \ 的实例一起注入。顾名思义，它用于构建步骤。它的创建是由 `@EnableBatchProcessing` 注解发起的。\n\n当我们注入了所有必要的 bean\
  \ 后，就可以创建步骤了。SB 提供了流畅的 API 来定义批处理流程。`stepBuilderFactory.get()` 方法将 `Step` 的名称作为参数，但请注意，Spring\
  \ bean 的名称可以与 `Step` 的名称不同。因此，我们不应将 `Step` 名称与 `Step` 实例的 Spring bean 名称混淆。\n\n\
  链中的下一个调用是通过 `chunk()` 方法指定块大小。在此调用中，我们需要定义由写入器、读取器和处理器处理的项目的泛型类型。然后，`Step` 创建链继续——在此步骤中定义读取器、写入器和处理器——并通过\
  \ `build()` 调用完成，该调用应用记录的配置并创建 `Step` 实例。\n\n第二个 `@Bean` 定义创建了 `Job` 实例。我们需要一个 `Step`\
  \ 和 `JobBuilderFactory` 的实例，后者用于创建 `Job` 实例。与 `Step` 创建链类似，`Job` 创建链需要调用 `JobBuilderFactory.get()`\
  \ 来命名 `Job`。再次注意，`Job` 名称可以与由方法指定的 bean 名称不同。此 `Job` 将仅启动我们创建的 `Step`，因此我们需要调用 `start`\
  \ 来定义 `Step` 方法并构建作业。在这种情况下，我们只使用一个步骤。包含多个步骤的作业将在本章后面展示。\n\n此应用程序的主类是标准的 Spring\
  \ Boot 主类（之前已在清单 9-8 中展示）。当我们运行它时，可以看到类似于清单 9-9 的输出。\n\n使用文件读取器和 JDBC 写入器的示例\n\n\
  首先，我们在清单 9-11 中定义用于此示例的模型类。\n\n***清单 9-11***. 文件到数据库面向块示例的模型类 (0903-chunk-processing-non-generic)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.model;\nimport lombok.Data;\n\n@Data\n\
  public class User {\n  private String email;\n  private String name;\n}\n```\n\n\
  我们在前面的章节中已经见过这个类。这个 POJO 有两个参数，`email` 和 `name`，并使用 Lombok 的注解 `@Data` 来生成 getter\
  \ 和 setter。清单 9-12 展示了数据库初始化 bean。\n\n***清单 9-12***. 在应用程序启动时填充内存数据库的 Bean (0903-chunk-processing-non-generic)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport javax.annotation.PostConstruct;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import org.springframework.stereotype.Component;\n```\n\n\n@Repository\npublic class\
  \ SimpleDatabasePopulator {\n  private JdbcTemplate jdbcTemplate;\n\n@Autowired\n\
    public SimpleDatabasePopulator(JdbcTemplate jdbcTemplate) {\n    super();\n    this.jdbcTemplate\
  \ = jdbcTemplate;\n  }\n\n@PostConstruct\n  public Integer initDbTable() {\n    jdbcTemplate.execute(\"\
  drop table USERS if exists\");\n    jdbcTemplate.execute(\"create table USERS(NAME\
  \ varchar(50), EMAIL varchar(50))\");\n    return null;\n  }\n}\n```\n\n如果开启了自动配置，并且相关数据库库位于类路径上，Spring\
  \ Boot 会默认初始化 `JdbcTemplate` 和 `DataSource`。在本例中，我们在类路径上配置了一个 H2 内存数据库。这个 Spring\
  \ Bean 注入了 `JdbcTemplate` 实例，用于初始化内存数据库的模式。`initDbTable()` 方法使用了 `@PostConstruct`\
  \ 注解，因此它会在 Spring 上下文初始化后立即执行。\n\n接下来，清单 9-13 展示了我们用作数据源进行读取的输入文件。\n\n***清单 9-13***.\
  \ 面向文件的数据库块处理示例的输入文件（示例项目 0903-chunk-processing-non-generic 中文件夹 src/main/resources\
  \ 下的文件 users.txt）\n\n```\nLubos Krnac,lubos.krnac@gmail.com\nCade Mckee,massa.rutrum@magnaNam.ca\n\
  Melvin Boone,enim.Nunc@Sedcongue.co.uk\nThane Flowers,vulputate.velit@dignissimlacus.org\n\
  Mohammad Salas,convallis@malesuada.ca\nUpton Ewing,tincidunt.nibh@natoque.org\n\
  ```\n\n该文件的分隔符是逗号。清单 9-14 展示了文件读取器和 JDBC 写入器的配置。\n\n***清单 9-14***. 面向文件的数据库块处理示例的读取器和写入器配置（0903-chunk-processing-non-generic）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport javax.sql.DataSource;\nimport\
  \ net.lkrnac.book.eiws.chapter09.model.User;\nimport org.springframework.batch.item.ItemReader;\n\
  import org.springframework.batch.item.ItemWriter;\nimport org.springframework.batch.item.database.BeanPropertyItemSqlParameterSourceProvider;\n\
  import org.springframework.batch.item.database.JdbcBatchItemWriter;\nimport org.springframework.batch.item.file.FlatFileItemReader;\n\
  import org.springframework.batch.item.file.mapping.BeanWrapperFieldSetMapper;\n\
  import org.springframework.batch.item.file.mapping.DefaultLineMapper;\nimport org.springframework.batch.item.file.transform.DelimitedLineTokenizer;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.core.io.ClassPathResource;\n\n@Configuration\npublic\
  \ class ChunkConfiguration {\n  @Bean\n  public ItemReader<User> fileItemReader()\
  \ {\n    FlatFileItemReader<User> flatFileItemReader = new FlatFileItemReader<>();\n\
      flatFileItemReader.setResource(new ClassPathResource(\"users.txt\"));\n\nBeanWrapperFieldSetMapper<User>\
  \ fieldSetMapper = new BeanWrapperFieldSetMapper<>();\n    fieldSetMapper.setTargetType(User.class);\n\
  \nDelimitedLineTokenizer lineTokenizer = new DelimitedLineTokenizer();\n    lineTokenizer.setDelimiter(\"\
  ,\");\n    lineTokenizer.setNames(new String[] { \"name\", \"email\" });\n\nDefaultLineMapper<User>\
  \ lineMapper = new DefaultLineMapper<>();\n    lineMapper.setFieldSetMapper(fieldSetMapper);\n\
      lineMapper.setLineTokenizer(lineTokenizer);\n\nflatFileItemReader.setLineMapper(lineMapper);\n\
      return flatFileItemReader;\n  }\n\n@Bean\n  public ItemWriter<User> jdbcItemWriter(DataSource\
  \ dataSource) {\n    JdbcBatchItemWriter<User> writer = new JdbcBatchItemWriter<>();\n\
      writer.setItemSqlParameterSourceProvider(\n        new BeanPropertyItemSqlParameterSourceProvider<>());\n\
      writer.setSql(\"insert into USERS (NAME, EMAIL) values (:name, :email)\");\n\
      writer.setDataSource(dataSource);\n    return writer;\n  }\n}\n```\n\n这个 Spring\
  \ 配置类定义了两个 Bean。第一个用作 Spring 的 `ItemReader` 实现，用于从平面文件读取：`FlatFileItemReader<User>`。首先，我们需要配置源文件位置。在本例中，我们期望它在类路径上，名称为\
  \ `users.txt`（即清单 9-13 中的文件）。接下来，我们需要配置从一行转换为 `BeanWrapperFieldSetMapper<User>`\
  \ 的目标类型。在我们的例子中，我们使用 `User` 类。`DelimitedLineTokenizer` 用于基于逗号分隔符解析文件，并将解析后的值映射到\
  \ `User` 对象的字段中。最后，我们将创建的行令牌化器和字段集映射器配置到 `flatFileItemReader` 对象中，这样项目读取器就配置完成了。\n\
  \n第二个 Bean 创建了 Spring 的项目写入器实现 `JdbcBatchItemWriter<User>`，用于写入数据库。泛型类型指定了要写入的项目的类型。为了在\
  \ JDBC 查询中使用 `User` 字段名称作为参数，我们需要将 `BeanPropertyItemSqlParameterSourceProvider<User>`\
  \ 实现配置为 SQL 参数提供器。除此之外，我们还需要配置 JDBC 数据源实例以及要执行到写入器中的 SQL 查询。\n\n![Image](img/sq.jpg) **注意**  SB\
  \ 框架为 `ItemReader` 和 `ItemWriter` 的开箱即用实现提供了大量可能性。对这些 API 和实现的全面介绍超出了本书的范围。有关更多详细信息，请参考\
  \ SB 参考文档。\n\n清单 9-15 展示了 `Step` 和 `Job` 的批处理配置。\n\n***清单 9-15***. 面向文件的数据库块处理示例的批处理配置（0903-chunk-processing-non-generic）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.model.User;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.batch.item.ItemReader;\nimport org.springframework.batch.item.ItemWriter;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n\
    public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n      ItemReader<User>\
  \ fileItemReader,\n      ItemWriter<User> simpleRecordWriter) {\n    return stepBuilderFactory.get(\"\
  simpleRecordsStep\")\n        .<User, User> chunk(4)\n        .reader(fileItemReader)\n\
          .writer(simpleRecordWriter)\n        .build();\n  }\n\n@Bean\n  public Job\
  \ simpleRecordsJob(JobBuilderFactory jobBuilderFactory,\n      Step simpleRecordsStep)\
  \ {\n    return jobBuilderFactory.get(\"simpleRecordsJob\")\n        .start(simpleRecordsStep)\n\
          .build();\n  }\n}\n```\n\n此配置与之前的示例类似。我们基于清单 9-14 中的文件项目读取器和 JDBC 项目写入器创建\
  \ `Step` 和 `Job` 实例。在本例中，我们没有使用处理器。它是面向块处理的一个可选组件。此示例的主类也是一个标准的 Spring Boot 主类。当我们将其作为\
  \ Java 应用程序执行时，会看到清单 9-16 中的输出。\n\n***清单 9-16***. 面向文件的数据库块处理示例的输出\n\n\n\n```\n\
