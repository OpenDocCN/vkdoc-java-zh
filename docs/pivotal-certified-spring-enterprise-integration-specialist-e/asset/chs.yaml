  \ Spring 上下文。运行此主类后的输出也与清单 9-25 中的前一个示例类似。\n\n异步 JobLauncher 示例\n\n让我们深入探讨一个场景，即\
  \ SB 作业的调用者不能被阻塞。清单 9-28 展示了配置为异步执行 `Job` 的 SB Bean。\n\n***清单 9-28***. JobLauncher\
  \ 的异步配置 (0908-job-launcher-async)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.batch.core.launch.support.SimpleJobLauncher;\n\
  import org.springframework.batch.core.repository.JobRepository;\nimport org.springframework.batch.core.repository.support.MapJobRepositoryFactoryBean;\n\
  import org.springframework.batch.support.transaction.ResourcelessTransactionManager;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.core.task.TaskExecutor;\nimport org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;\n\
  import org.springframework.transaction.PlatformTransactionManager;\n\n@Configuration\n\
  public class BatchBeansConfiguration {\n  @Bean\n  public PlatformTransactionManager\
  \ transactionManager() {\n    return new ResourcelessTransactionManager();\n  }\n\
  \n@Bean\n  public JobRepository jobRepository(PlatformTransactionManager transactionManager)\n\
        throws Exception {\n    return new MapJobRepositoryFactoryBean(transactionManager).getObject();\n\
    }\n\n@Bean\n  public TaskExecutor customTaskExecutor() {\n    ThreadPoolTaskExecutor\
  \ threadPool = new ThreadPoolTaskExecutor();\n    threadPool.setCorePoolSize(10);\n\
      return threadPool;\n  }\n\n@Bean\n  public JobLauncher jobLauncher(JobRepository\
  \ jobRepository, TaskExecutor taskExecutor) {\n    SimpleJobLauncher simpleJobLauncher\
  \ = new SimpleJobLauncher();\n    simpleJobLauncher.setJobRepository(jobRepository);\n\
      simpleJobLauncher.setTaskExecutor(taskExecutor);\n    return simpleJobLauncher;\n\
    }\n}\n```\n\n在此配置中，我们引入了新的 Spring Bean `TaskExecutor`，它用于创建 `JobLauncher` Bean。此设置确保\
  \ `Job` 由 `JobLauncher` 异步执行。此示例还使用了清单 9-19 中的泡茶 `Job` 配置。此示例的主类见清单 9-29。\n\n***清单\
  \ 9-29***. 异步 JobLauncher 示例的主类 (0908-job-launcher-async)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.JobExecution;\nimport org.springframework.batch.core.JobParameters;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.context.support.GenericApplicationContext;\n\n@Slf4j\n\
  @Configuration\n@ComponentScan\npublic class BatchApplication {\n  public static\
  \ void main(String[] args) throws Exception {\n    GenericApplicationContext context\
  \ =\n        new AnnotationConfigApplicationContext(BatchApplication.class);\n\n\
  JobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n    Job\
  \ job = (Job) context.getBean(\"prepareTeaJob\");\n    JobExecution execution = jobLauncher.run(job,\
  \ new JobParameters());\n    log.info(\"Exit Status: {}\", execution.getStatus());\n\
      Thread.sleep(10);\n    log.info(\"Exit Status: {}\", execution.getStatus());\n\
      Thread.sleep(500);\n    log.info(\"Exit Status: {}\", execution.getStatus());\n\
      context.close();\n  }\n}\n```\n\n执行 `prepareTeaJob` 后，我们立即记录退出状态，并在 10 毫秒后以及\
  \ 500 毫秒后再次记录。由于 `Job` 正在运行，我们应该能在这些日志条目中观察到退出状态的变化。清单 9-30 展示了运行此主类后的输出。\n\n***清单\
  \ 9-30***. 异步 JobLauncher 示例的输出\n\n```\n17:37:46.318 [customTaskExecutor-1] INFO  o.s.b.c.l.support.SimpleJobLauncher\
  \ - Job: [SimpleJob: [name=prepareTeaJob]] launched with the following parameters:\
  \ [{}]\n17:37:46.317 [main] INFO  n.l.b.e.chapter09.BatchApplication - Exit Status:\
  \ STARTING\n17:37:46.330 [main] INFO  n.l.b.e.chapter09.BatchApplication - Exit\
  \ Status: STARTED\n17:37:46.359 [customTaskExecutor-1] INFO  o.s.batch.core.job.SimpleStepHandler\
  \ - Executing step: [boilWaterStep]\n17:37:46.373 [customTaskExecutor-1] INFO  n.l.b.e.c.step.SimpleExecutablePoint\
  \ - Boil Water\n17:37:46.400 [customTaskExecutor-1] INFO  o.s.batch.core.job.SimpleStepHandler\
  \ - Executing step: [addTeaStep]\n17:37:46.404 [customTaskExecutor-1] INFO  n.l.b.e.c.step.SimpleExecutablePoint\
