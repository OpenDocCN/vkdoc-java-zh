  \ 配置。\n\n***清单 8-128***. 异步双向流错误传播示例的 SI 配置（文件 si-config.xml，位于示例项目 0837-error-propagated-async\
  \ 的 src/main/resources 文件夹中）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
