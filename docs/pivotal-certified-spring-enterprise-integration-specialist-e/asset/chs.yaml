  \ 调用耗时 4 毫秒。整体执行耗时 25 毫秒。因此，很明显这两个调用是并行执行的。\n\n总结\n\n本章解释了 REST 架构风格相较于远程调用或 SOAP\
  \ 的优势。您学习了 REST 的主要概念，例如其统一接口、无状态性、超媒体、资源表示和缓存。\n\n本章还快速概述了 HTTP。我们涵盖了其消息结构以及适用于\
  \ REST 通信的主要 HTTP 方法。接下来，您探索了使用 JAX-RS 开发 REST 服务的方法，并通过一个简短示例学习了如何将其与 Spring 集成。\n\
  \n\n\n随后，本章介绍了 Spring MVC 的特性。关于如何配置和路由消息的示例，应该能为使用 Spring MVC 进行 REST 开发提供良好的基础。我们还介绍了服务器端集成和单元测试支持及其示例。最后几节内容涉及客户端支持及其测试方法。\n\
  \n第五章\n\n![图片](img/frontdot.jpg)\n\nJava 消息服务\n\n本章介绍的企业集成技术是 Java 消息服务（JMS）。它与前几章讨论的技术不同，因为它本质上是一种用于交换消息的**异步**技术。\n\
  \n在远程调用、REST 和 SOAP Web 服务方法中，客户端发送请求并等待服务器响应。等待响应可以通过同步方式（客户端线程被阻塞，直到收到响应或超时）或异步方式（客户端注册回调逻辑，该逻辑在收到响应或通信超时时执行）来实现。但它们之间的\
  \ HTTP 通信始终保持连接，至少直到客户端收到响应为止。\n\nJMS 则不同，因为它不遵循这种请求-响应模式。深入来看，JMS 通信中的通信双方根本无法被描述为客户端/服务器关系。JMS\
  \ 是一种生产者向消费者发送消息的技术。但消息并非通过套接字连接直接发送给消费者。\n\nJMS 通信中使用了一个特殊的中间组件，称为*目的地*。我们可以将其视为消息的存储空间。生产者将消息发送到该目的地，之后便不再关心这条消息。消息存储在目的地中，直到被一个或多个消费者关注。当消费者准备好时，它便从目的地读取消息。因此，生产者和消费者之间是*高度解耦*的：它们无需了解通信另一方的任何信息。唯一重要的是知道如何向目的地发送消息以及如何从目的地接收消息。\n\
  \n这种通信是*异步*的，因为生产者不会等待消费者接收消息。甚至无法保证消息一定会被送达。如果没有应用程序从目的地消费消息，理论上消息可以永远停留在目的地中。\n\
  \n这种通信方式的另一个重要属性是*可靠性*。正如我们提到的，目的地会存储消息。显然，存储消息需要一个专门的服务器。这个服务器通常被称为*消息代理*。它是一种专门的中间件，可以提供各种目的地，并在需要时将消息存储在持久化存储中。\n\
  \nJava 消息服务是 Java 企业版标准的一部分，因此每个符合 JEE 标准的应用服务器也可以扮演消息代理的角色。但你现在可能会想，那轻量级的 Spring\
  \ 应用呢？这些应用通常只托管在 Servlet 容器中，不具备消息代理功能。在这些情况下，如果需要，可以将仅专注于独立 JMS 实现的项目嵌入到 Spring\
  \ 应用中。但对于大多数架构来说，将 JMS 部分作为企业系统的独立组件来托管是合理的。\n\n以下是主要的 JMS 提供者：\n\n*   Apache ActiveMQ\n\
  *   HornetQ (JBoss)\n*   JBoss Messaging (JBoss)\n*   WebSphere MQ (IBM)\n*   WebSphere\
  \ Application Server (IBM)\n*   SonicMQ (Progress Software)\n*   Oracle WebLogic\n\
  *   Oracle Advanced Queuing (AQ)\n*   Open Message Queue (Oracle)\n*   FFMQ\n* \
  \  TIBCO Enterprise Message Service\n*   OpenJMS\n\n所有这些 JMS 提供者通常被称为*面向消息的中间件*（*MOM*）。其中一些是完整的符合\
  \ JEE 标准的应用服务器，而另一些仅实现了 JEE 标准中的 JMS 部分。因此，与客户端/服务器通信相比，另一个显著区别在于管理通信中间的消息代理所带来的运维开销。如果我们使用完整的\
  \ JEE 应用服务器，这种运维开销并不大，因为消息代理与应用服务器托管在同一台服务器上。但如果我们使用轻量级解决方案（大多数 Spring 应用都是这种情况），我们可以将\
  \ JMS 消息代理作为独立的服务器实例托管，或将其嵌入到 Spring 应用中。\n\n当我们需要在生产者和消费者之间调节消息流量时，JMS 消息传递通常非常有用。它也常被用作流式数据的临时存储，因为如果需要，我们可以轻松地重放所有消息。它作为消息存储系统的可靠性使其成为缓存进入企业系统数据的流行选择。\n\
  \n当生产者和消费者通过 JMS 目的地解耦后，我们可以轻松更改它们之间的基础设施路由，而无需触发通信任何一方的更改。此外，当消费者和接收者互不知晓时，我们可以轻松地在它们的通信通道之间插入一些逻辑——例如，过滤或转换消息。所有这些方面使得\
  \ JMS 消息传递成为在企业系统中解耦组件的绝佳选择。\n\nJMS 标准概述\n\n作为 Java 企业版的一部分，Java 消息服务为消息交换提供了标准化的\
  \ API。这很方便，因为它消除了与特定消息中间件供应商绑定相关的问题，并显著降低了迁移到不同 JMS 提供者的成本。它还使得开发者的知识能够在各种 JMS 提供者之间复用。\n\
  \nJMS 支持以下两种消息传递范式：\n\n*   点对点\n    *   此情况下的目的地称为*消息队列*。\n    *   每条消息*只能有一个消费者*。\n\
  \    *   当消息成功从消息队列消费后，它将被丢弃。\n    *   点对点通信有两种类型：\n        *   *单向（仅发送）*——由于 JMS\
  \ 是高度解耦的，因此不需要特殊功能。\n        *   *双向（请求-回复）*——通过请求和响应消息中包含的关联 ID 来支持。\n\n*   发布/订阅\n\
  \    *   此情况下的目的地称为*消息主题*。\n    *   消息由*所有订阅者*（消费者）消费。\n    *   只有在所有订阅者都成功消费消息后，该消息才会从\
  \ JMS 服务器中丢弃。\n\n这些 JMS 消息传递范式与目的地的类型相关。但重要的是要记住，可以有多个生产者发送消息，也可以有多个消费者接收消息。因此，让多个生产者向一个点对点队列发送消息是一种有效的配置。让多个接收者从一个点对点队列消费消息也是有效的，但一条特定的消息通常只会被其中一个接收者随机消费。\n\
  \nJMS 消息可以通过两种方式消费：\n\n\n\n*   ***异步***：消费者向目的地注册一个称为监听器的特殊 JMS 组件，并能够在消息被目的地处理时进行消费。消息接收通常没有延迟。监听器接收消息是在一个单独的线程中完成的。\n\
  *   ***同步***：消费者负责发起从消息队列或主题的读取操作。当消费者轮询目的地以获取下一条 JMS 消息时，有两种可能的情况：\n    *   目的地中没有消息，消费者线程将被阻塞，直到新消息到达。这种等待可以通过可选的超时机制来终止。\n\
  \    *   如果消息在消费者从目的地读取之前到达，则会被立即读取。但这条消息必须在目的地等待一段时间才能被消费。\n\n在大多数情况下，注册监听器比显式的同步接收更有意义，因为它减少了企业系统中的延迟。\n\
  \nJava JMS API\n\nJMS 是一个 Java API；因此，JMS 标准包含了用于 JMS 通信的 Java 类型。这个 API 在很长一段时间内（自\
  \ 2003 年引入 Java 企业版 1.4 以来）保持不变，并停留在 JMS 1.1 版本。\n\n但最近版本的 Java 企业版 7 标准对 JMS API\
  \ 进行了重大修订，并引入了 JMS 2.0 版本。该版本简化了 JMS 1.1 API 中一些过于冗长的方面。但由于 JEE 7 是一个相对较新的标准，到目前为止，并非所有\
  \ JMS 提供者都实现了 JMS 2.0（例如，截至 2015 年 5 月，ActiveMQ 不支持 JMS 2.0）。JMS 1.1 的主要概念在 JMS\
  \ 2.0 中保持不变，因此将两个版本的组件一起解释是合理的。\n\nJMS 消息\n\nJMS 体系中最基本的组成部分当然是 JMS 消息的抽象。它由 `javax.jms.Message`\
  \ 接口表示，该接口由以下三个元素组成：\n\n*   ***消息头***：一组预定义的类型，用于消息的标识、路由、投递和回复策略。这些主要供 JMS 基础设施使用，但有时也用于应用程序代码。\n\
  *   ***消息属性***：存储在消息中的自定义值。它们通常用作不同消息系统之间的兼容层。其用途还包括通过消息选择器过滤消息。\n*   ***消息体***：包含实际的消息。\n\
  *   基于不同的消息体类型，JMS API 提供了各种 JMS 消息子接口。所有这些接口都位于 `javax.jms` 包中：\n*   `TextMessage`：`java.lang.String`\
  \ 的 JMS 包装器。\n*   `MapMessage`：名称/值对，其中名称是 `String` 对象，值是 Java 原始类型。名称的顺序未指定。\n\
  *   `BytesMessage`：字节流。\n*   `StreamMessage`：Java 原始类型的流，按顺序读取。\n*   `ObjectMessage`：`Serializable`\
  \ Java 对象。\n\n这些接口用于传输不同负载类型的消息。最佳互操作性通常通过发送文本消息来实现，尤其是在最常见的传输格式（如 JSON 和 XML）中。因此，`TextMessage`\
  \ 是最常用的。\n\nJMS 基础设施抽象\n\n我们已经提到了 JMS 通信的各种基本概念，包括 JMS 目的地、生产者和消费者。所有这些 JMS 通信方都需要具备一定的抽象，以便\
  \ JMS 客户端能够以纯 Java 方式与 JMS 服务器通信。\n\n由于消费者和生产者需要反复与 JMS 目的地通信，因此保持它们之间的连接处于打开状态是合理的。当连接打开时，消费者或生产者可以执行操作，这些操作作为一个工作单元，通常被称为*会话*。一个连接可以打开多个会话，这样我们就可以同时运行多个工作单元。\n\
  \n由于 JMS 代表 Java 消息服务，这些抽象具有以下 Java 表示形式：\n\n\n\n*   `javax.jms.Destination`：表示\
  \ JMS 队列或主题的对象。\n*   `javax.jms.MessageProducer`：表示负责发送 JMS 消息的对象的抽象。\n*   `javax.jms.MessageConsumer`：负责同步读取\
  \ JMS 消息的抽象。\n*   `javax.jms.JMSProducer`：JMS 2.0 中引入的 `MessageProducer` 增强版。\n\
  *   `javax.jms.JMSConsumer`：JMS 2.0 中引入的 `MessageConsumer` 增强版。\n*   `javax.jms.MessageListener`：负责异步接收\
  \ JMS 消息的抽象。\n*   `javax.jms.Session`：负责发送和接收消息的单线程上下文抽象。\n*   `javax.jms.Connection`：表示与\
  \ JMS 提供者的虚拟连接。\n*   `javax.jms.JMSContext`：JMS 2.0 的语法糖，用于减少 JMS 1.1 API 的冗长性。它将\
  \ `Connection` 和 `Session` 合并为一个对象。\n*   `javax.jms.ConnectionFactory`：JMS 的主要配置类，负责创建与\
  \ JMS 提供者的连接。通常在 JMS 应用程序启动时创建。\n*   因此，JMS 1.1 开发者的通常工作流程是按此顺序创建 JMS 对象：`ConnectionFactory`\
  \ ![image](img/arrow.jpg) `Connection` `Session` `MessageProducer/MessageConsumer/Message`。在\
  \ JMS 2.0 中，情况略有改进：`ConnectionFactory` `JMSContext` `JMSProducer/JMSConsumer/Message`。在完整的\
  \ JEE 容器中，`ConnectionFactory` 很可能是被注入的。\n*   你可能已经注意到，这个 JMS 对象的工作流程不包括 `Destination`。该对象是单独创建或注入的，用于创建\
  \ `Producer` 或 `Consumer`。`MessageListener` 被设计为注册到 `MessageConsumer` 对象中。\n\n![Image](img/sq.jpg) **注意**  本\
  \ JMS API 概述是有限的，因为本书侧重于构建在普通 JMS API 之上的 Spring 抽象。因此，更深层次的方面和附加功能超出了本书的范围。开始探索的最佳位置是\
  \ JEE 7 教程：`https://docs.oracle.com/javaee/7/tutorial/jms-concepts003.htm#BNCEH`。\n\
  \nJava JMS 示例\n\n最常见的开源 JMS 提供者是 ActiveMQ。但在撰写本文时，ActiveMQ 不支持 JMS 2.0。我们选择 HornetQ\
  \ 来展示我们的普通 Java JMS 示例，因为它已经支持新的 JMS 2.0 标准。\n\n如前所述，JMS 提供者通常作为单独的实例托管在我们的应用程序之外。我们的\
  \ Java JMS 示例就是这种情况。我们将在本地运行 HornetQ 实例服务器，并假设目标机器上安装了最新的 Java 版本。\n\n要下载 HornetQ\
  \ 服务器，你需要从 `http://hornetq.jboss.org/downloads.html` 下载 ZIP 或 TAR.GZ 包并解压。运行服务器很简单。只需从命令行运行\
  \ `bin/run.sh` 或 `bin/run.bat` 文件。如果安装了合适的 Java 版本，服务器应该可以毫无问题地启动。要停止服务器，我们需要执行\
  \ `bin/stop.sh` 或 `bin/stop.bat`——一个简单的过程。\n\n出于示例目的，我们不需要调整默认的 HornetQ 配置，因为示例项目使用的是\
  \ HornetQ 开箱即用的 JMS 资源。这些示例已针对 HornetQ 2.4.0.Final 版本进行了测试。\n\n同步 JMS 1.1 示例\n\n\
  *   我们的第一个 Java JMS 示例使用了 2003 年标准化的旧版 JMS 1.1 API。清单 5-1 展示了如何配置 JMS 1.1 访问。\n\n\
  ***清单 5-1***. JMS 1.1 HornetQ 配置 (0501-jms11-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.jms11jndi;\n\
  \nimport java.util.Hashtable;\nimport javax.jms.Connection;\nimport javax.jms.ConnectionFactory;\n\
  import javax.jms.JMSException;\nimport javax.jms.Queue;\nimport javax.naming.InitialContext;\n\
  import javax.naming.NamingException;\nimport lombok.Getter;\n\npublic class JmsConfiguration\
  \ implements AutoCloseable {\n  private InitialContext initialContext;\n\n@Getter\n\
    private Queue queue;\n  @Getter\n  private Connection connection;\n\npublic void\
  \ init() throws NamingException, JMSException {\n    Hashtable<Object, Object> env\
  \ = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
  ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
  ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
  , \"jnp://localhost:1099\");\n    initialContext = new InitialContext(env);\n\n\
  queue = (Queue) initialContext.lookup(\"queue/ExpiryQueue\");\n    ConnectionFactory\
  \ connectionFactory =\n        (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
  );\n    connection = connectionFactory.createConnection();\n  }\n\npublic void close()\
  \ throws NamingException, JMSException {\n    if (initialContext != null) {\n      initialContext.close();\n\
      }\n    if (connection != null) {\n      connection.close();\n    }\n  }\n}\n\
  ```\n\n`JmsConfiguration` 类封装了特定于 JMS 提供者的配置。它有三个字段。第一个是 `InitialContext` 类型，它是解析\
  \ JNDI 名称的起点。HornetQ 是一项 JBoss 技术，是更广泛的 JBoss 应用服务器产品组合的一部分。因此，初始化独立 HornetQ 访问的最简单方法是使用\
  \ JNDI 命名抽象。\n\n`JmsConfiguration` 类中定义的以下两个字段是 JMS 对象 `queue` 和 `connection`。它们由\
  \ Lombok 的 `@Getter` 注解标注，该注解为这两个变量生成 getter 方法。当我们希望避免 Java 反对者经常强调的 Java 冗长性时，Lombok\
  \ 非常方便。因此，它们通过 getter 方法暴露，其他类可以使用它们进行 JMS 消息传递。\n\n第一个方法叫做 `init`。顾名思义，它初始化 JMS\
  \ 配置。我们定义了用于存储 JNDI 命名值的映射。前两个 JNDI 命名值是根据 HornetQ 手册“JNDI 配置”部分的说明创建的：`http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`。第三个值，键为\
  \ `java.naming.provider.url`，指定了我们 HornetQ 服务器的地址。在这种情况下，服务器将位于 `localhost` 和端口\
  \ `1099`。\n\n当我们在映射中有了 JNDI 配置后，就可以创建一个 JNDI `InitialContext` 实例，并使用它来查找 JMS 资源。如前所述，我们的\
  \ Java JMS 示例中使用了默认的 HornetQ 配置，因此我们使用队列名称 `queue/ExpiryQueue` 和连接工厂名称 `/ConnectionFactory`\
  \ 来创建 `queue` 和 `connectionFactory` 对象。`connectionFactory` 用于创建 `connection` 实例。名为\
  \ `queue/ExpiryQueue` 的队列在 HornetQ 服务器中默认配置；为了简单起见，我们在这里使用它。\n\n这两个实例已经是 JMS 抽象，因此方法\
  \ `init` 是我们示例中唯一包含 HornetQ 特定配置的地方。\n\n下一个方法叫做 `close`。顾名思义，它用于关闭需要关闭的资源。在这种情况下，我们需要关闭\
  \ `connection` 和 `initialContext`。但这个 close 方法很特殊，因为它属于 `java.lang.AutoCloseable`\
  \ 接口。该接口是在 Java 7 中作为通常称为 *try-with-resources* 的特性的一部分引入的。它为在 try 块之后关闭资源添加了语法糖。我们将在本示例的后面展示它的使用。\n\
  \n清单 5-2 展示了如何使用 JMS 1.1 API 发送消息。\n\n***清单 5-2***. 使用 JMS 1.1 API 发送 JMS 消息 (0501-jms11-jndi)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.jms11jndi;\n\nimport javax.jms.Connection;\n\
  import javax.jms.JMSException;\nimport javax.jms.MessageProducer;\nimport javax.jms.Queue;\n\
  import javax.jms.Session;\nimport javax.jms.TextMessage;\n\n\n\n```java\npublic\
  \ class SimpleMessageSender {\n  private MessageProducer messageProducer;\n  private\
  \ Session session;\n\npublic void init(Connection connection, Queue queue) throws\
  \ JMSException {\n    session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \    messageProducer = session.createProducer(queue);\n  }\n\npublic void sendMessage(String\
  \ message) throws JMSException {\n    TextMessage textMessage = session.createTextMessage(message);\n\
  \    messageProducer.send(textMessage);\n  }\n}\n```\n\n这个类很直观。JMS 的 `Connection`\
  \ 和 `Queue` 实例被传入 `init` 方法，用于创建 `MessageProducer` 和 `Session` 实例。请注意，在创建会话时使用了\
  \ `AUTO_ACKNOWLEDGE` 模式。本章后面探讨 JMS 事务特性时，你将对此有更多了解。目前，你只需知道：当我们通过此会话从队列中读取消息时，该消息将从队列中丢弃。但在本例中，该会话用于发送消息，因此不受此设置影响。\n\
  \n第二个方法名为 `sendMessage`。显然，它用于发送作为参数传入的 `message`。在这个简单示例中，我们发送的是一个 `String` 消息，它被封装到\
  \ `textMessage` 对象中。请注意，我们需要 `session` 对象来创建此消息。最后，使用 `messageProducer` 对象执行发送操作。\n\
  \n请注意两个方法签名中受检的 `JMSException`。清单 5-3 展示了同步接收。\n\n***清单 5-3***. 使用 JMS 1.1 API 的同步消息接收\
  \ (0501-jms11-jndi)\n\n```java\npackage net.lkrnac.book.eiws.chapter05.jms11jndi;\n\
  \nimport javax.jms.Connection;\nimport javax.jms.JMSException;\nimport javax.jms.MessageConsumer;\n\
  import javax.jms.Queue;\nimport javax.jms.Session;\nimport javax.jms.TextMessage;\n\
  \npublic class SimpleMessageReader {\n  private MessageConsumer messageConsumer;\n\
  \npublic void init(Connection connection, Queue queue) throws JMSException {\n \
  \   Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \    messageConsumer = session.createConsumer(queue);\n  }\n\npublic String readMessage()\
  \ throws JMSException {\n    TextMessage messageReceived = (TextMessage) messageConsumer.receive(5000);\n\
  \    return messageReceived.getText();\n  }\n}\n```\n\n与 `SimpleMessageSender` 类似，`SimpleMessageReader`\
  \ 类也有一个 `init` 方法，该方法将 `connection` 和 `queue` 对象作为参数，并以 `AUTO_ACKNOWLEDGE` 模式创建会话。消息被读取后，会从\
  \ `queue` 中丢弃。在 `init` 方法中创建的第二个对象是 `messageConsumer`。\n\n`readMessage` 方法用于显式接收消息。这意味着我们主动询问队列中是否有消息。这是通过调用\
  \ `messageConsumer.receive` 实现的。如果队列中没有未读消息，此调用会等待消息到达 `queue`。参数 `5000` 指定了最大等待超时时间（毫秒）。如果不指定超时时间，调用线程可能会被无限期阻塞。调用\
  \ `messageConsumer.receive` 会返回一个 `Message` 类型的对象。要从中检索文本，我们需要将其强制转换为 `TextMessage`。这是\
  \ JMS 1.1 API 中备受批评的一个方面，因为显式强制转换被认为是不良实践。\n\nJMS API 另一个备受批评的方面是需要处理 `JMSExceptions`。清单\
  \ 5-4 中展示的最后一个类（属于同步 JMS 1.1 示例）是主类，它使用了清单 5-1 到清单 5-3 中的类。\n\n***清单 5-4***. 同步\
  \ JMS 1.1 示例的主类 (0501-jms11-jndi)\n\n```java\npackage net.lkrnac.book.eiws.chapter05.jms11jndi;\n\
  \nimport javax.jms.Connection;\nimport javax.jms.JMSException;\nimport javax.jms.Queue;\n\
  import javax.naming.NamingException;\nimport lombok.extern.slf4j.Slf4j;\n\n@Slf4j\n\
  public class Jms11JndiApplication {\n  public static void main(String[] args) throws\
  \ JMSException, NamingException {\n    try (JmsConfiguration jmsConfiguration =\
  \ new JmsConfiguration()) {\n      jmsConfiguration.init();\n      Queue queue =\
  \ jmsConfiguration.getQueue();\n      Connection connection = jmsConfiguration.getConnection();\n\
  \      connection.start();\n\nSimpleMessageSender messageSender = new SimpleMessageSender();\n\
  \      messageSender.init(connection, queue);\n      messageSender.sendMessage(\"\
  simple message\");\n\nSimpleMessageReader messageReader = new SimpleMessageReader();\n\
  \      messageReader.init(connection, queue);\n      String message = messageReader.readMessage();\n\
  \nlog.info(\"Message Received: {}\", message);\n    }\n  }\n}\n```\n\n`Jms11JndiApplication`\
  \ 是同步 JMS 1.1 示例的主类。它使用了 Lombok 的注解 `@Slf4j`，这为我们提供了一种便捷的方式来定义用于日志记录的 SLF4J 常量。它将用于输出接收到的消息。\n\
  \n`main` 方法使用了 Java 7 的 try-with-resources 特性。这意味着在 `try` 块后大括号内初始化的资源将在虚拟的 `finally`\
  \ 块中被关闭。这是一种很好的语法糖。此特性的唯一要求是资源需要实现 `AutoCloseable` 接口。本例中的资源是来自清单 5-1 中我们自定义类 `JmsConfiguration`\
  \ 的实例，并且该类实现了 `AutoCloseable` 以关闭 JMS 和 JNDI 资源。\n\n在 `try` 块中，我们首先初始化 `jmsConfiguration`\
  \ 对象，并从中获取 `connection` 和 `queue` 对象。接着，我们启动 JMS 连接。\n\n接下来的阶段是创建并初始化 `SimpleMessageSender`，然后发送一条简单的文本消息。之后，我们创建一个\
  \ `SimpleMessageReader` 实例，进行初始化，并读取消息。最后，将消息写入控制台。运行后的输出可能如清单 5-5 所示。\n\n***清单\
  \ 5-5***. 同步 JMS 1.1 示例的输出\n\n```\n21:50:37.038 [main] INFO  n.l.b.e.c.j.Jms11JndiApplication\
  \ - Message Received: simple message\n```\n\n同步 JMS 2.0 示例\n\n我们使用 JMS 2.0 API 的示例同样依赖于运行在\
  \ localhost 上的 HornetQ 服务器。清单 5-6 展示了 HornetQ JMS 配置。\n\n***清单 5-6***. JMS 2.0 HornetQ\
  \ 配置 (0502-jms2-jndi)\n\n```java\npackage net.lkrnac.book.eiws.chapter05.jms2jndi;\n\
  \nimport java.util.Hashtable;\nimport javax.jms.ConnectionFactory;\nimport javax.jms.JMSContext;\n\
  import javax.jms.Queue;\nimport javax.naming.InitialContext;\nimport javax.naming.NamingException;\n\
  import lombok.Getter;\n\npublic class JmsConfiguration implements AutoCloseable\
  \ {\n  private InitialContext initialContext;\n\n@Getter\n  private JMSContext jmsContext;\n\
  \  @Getter\n  private Queue queue;\n\npublic void init() throws NamingException\
  \ {\n    Hashtable<Object, Object> env = new Hashtable<Object, Object>();\n    env.put(\"\
  java.naming.factory.initial\",\n        \"org.jnp.interfaces.NamingContextFactory\"\
  );\n    env.put(\"java.naming.factory.url.pkgs\",\n        \"org.jboss.naming:org.jnp.interfaces\"\
  );\n    env.put(\"java.naming.provider.url\", \"jnp://localhost:1099\");\n    initialContext\
  \ = new InitialContext(env);\n\nqueue = (Queue) initialContext.lookup(\"queue/ExpiryQueue\"\
  );\n    ConnectionFactory cf =\n        (ConnectionFactory) initialContext.lookup(\"\
  /ConnectionFactory\");\n    jmsContext = cf.createContext();\n  }\n\n@Override\n\
  \  public void close() throws NamingException {\n    if (initialContext != null)\
  \ {\n      initialContext.close();\n    }\n    if (jmsContext != null) {\n     \
  \ jmsContext.close();\n    }\n  }\n}\n```\n\n\n\n此 JMS 2.0 配置与清单 5-1 中的 JMS 1.1\
  \ 配置类似。唯一的区别在于，我们创建的是 `JMSContext` 实例，而非 `Connection` 实例。`JMSContext` 是 JMS 2.0\
  \ 中引入的一种新的抽象。清单 5-7 展示了一个 JMS 2.0 发送方实现的示例。\n\n***清单 5-7***. 使用 JMS 2.0 API 发送 JMS\
  \ 消息 (0502-jms2-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.jms2jndi;\n\
  \nimport javax.jms.JMSContext;\nimport javax.jms.Queue;\n\npublic class SimpleMessageSender\
  \ {\n  private JMSContext jmsContext;\n  private Queue queue;\n\npublic SimpleMessageSender(JMSContext\
  \ jmsContext, Queue queue) {\n    this.jmsContext = jmsContext;\n    this.queue\
  \ = queue;\n  }\n\npublic void sendMessage(String message) {\n    jmsContext.createProducer().send(queue,\
  \ message);\n  }\n}\n```\n\n与清单 5-2 相比，我们无需初始化 `Session` 或 `MessageProducer` 实例。因此，通过构造函数接收\
  \ `jmsContext` 和 `queue` 并将其存储到类字段中更为合适。\n\n发送消息也更加简洁，因为我们通过 `jmsContext.createProducer`\
  \ 调用创建了 `JMSProducer`，并使用 `queue` 对象来链式调用 `send`。请注意，在 JMS 2.0 中发送消息时，不再需要处理受检异常\
  \ `JMSException`。清单 5-8 展示了消息读取器的实现。\n\n***清单 5-8***. 使用 JMS 2.0 API 同步接收消息 (0502-jms2-jndi)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.jms2jndi;\n\nimport javax.jms.JMSConsumer;\n\
  import javax.jms.JMSContext;\nimport javax.jms.JMSException;\nimport javax.jms.Message;\n\
  import javax.jms.Queue;\n\npublic class SimpleMessageReader {\n  private JMSContext\
  \ jmsContext;\n  private Queue queue;\n\npublic SimpleMessageReader(JMSContext jmsContext,\
  \ Queue queue) {\n    this.jmsContext = jmsContext;\n    this.queue = queue;\n  }\n\
  \npublic String readMessage() throws JMSException {\n    JMSConsumer jmsConsumer\
  \ = jmsContext.createConsumer(queue);\n    Message message = jmsConsumer.receive(5000);\n\
      return message.getBody(String.class);\n  }\n}\n```\n\n与使用 JMS 1.1 API 的清单 5-3\
  \ 相比，我们同样无需初始化。相反，我们通过构造函数接收 `jmsContext` 和 `queue` 对象。在读取消息时，我们首先基于 `queue` 对象从\
  \ `jmsContext` 创建一个 `JMSConsumer` 实例，然后执行一个可能阻塞的调用。之所以说“可能阻塞”，是因为如果消息已经在队列中，我们可能根本无需等待。超时时间\
  \ `5000` 同样是一个可选参数。如果不指定它，我们可能会无限期等待。\n\n与 JMS 1.1 API 不同，这里无需将消息强制转换为 `TextMessage`。但在底层，它会根据我们为\
  \ `message.getBody()` 调用指定的 `String.class` 参数自动完成转换。此调用可能抛出受检异常 `JMSException`，因此我们必须处理它或将其向上传递。在本例中，`readMessage()`\
  \ 方法采用了第二种选择，因此该方法的调用者也需处理该异常（参见清单 5-9）。\n\n***清单 5-9***. 同步 JMS 2.0 示例的主类 (0502-jms2-jndi)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.jms2jndi;\n\nimport javax.jms.JMSContext;\n\
  import javax.jms.JMSException;\nimport javax.jms.Queue;\nimport javax.naming.NamingException;\n\
  import lombok.extern.slf4j.Slf4j;\n\n@Slf4j\npublic class Jms2JndiApplication {\n\
    public static void main(String[] args) throws JMSException, NamingException {\n\
      try (JmsConfiguration jmsConfiguration = new JmsConfiguration()) {\n      jmsConfiguration.init();\n\
        JMSContext jmsContext = jmsConfiguration.getJmsContext();\n      Queue queue\
  \ = jmsConfiguration.getQueue();\n\nSimpleMessageSender messageSender =\n          new\
  \ SimpleMessageSender(jmsContext, queue);\n      messageSender.sendMessage(\"simple\
  \ message\");\n\nSimpleMessageReader messageConsumer =\n          new SimpleMessageReader(jmsContext,\
  \ queue);\n      String message = messageConsumer.readMessage();\n\nlog.info(\"\
  Message Received: {}\", message);\n    }\n  }\n}\n```\n\n`Jms2JndiApplication` 再次与\
  \ `Jms11JndiApplication` 类似，但 JMS 2.0 API 允许我们减少对 `messageSender` 和 `messageConsumer`\
  \ 的 `init` 调用。相反，我们将 `jmsContext` 和 `queue` 对象传递到它们的构造函数中——这是相对于 JMS 1.1 API 的显著改进。清单\
  \ 5-10 展示了运行此主类后该示例的输出。\n\n***清单 5-10***. 同步 JMS 2.0 示例的输出\n\n```\n23:27:41.859\
  \ [main] INFO  n.l.b.e.c.j.Jms2JndiApplication - Message Received: simple message\n\
  ```\n\n异步 JMS 示例\n\n我们最后一个纯 Java 示例重点介绍如何使用异步监听器接收 JMS 消息。但在深入探讨 JMS 结构之前，我们需要介绍一个将在本章大多数示例中使用的类。如清单\
  \ 5-11 所示。\n\n***清单 5-11***. 用于处理消息的通用服务 (0500-jms-common)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
  \nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Service;\n\
  \n@Slf4j\n@Service\npublic class SimpleService {\n  public void processText(String\
  \ message) {\n    log.info(\"Message received: {}\", message);\n  }\n}\n```\n\n\
  请注意，此示例位于公共项目 `0500-jms-common` 中。这是因为我们将在纯 Java 示例以及大多数 Spring JMS 示例中使用相同的类。其目的是作为异步接收后我们委托\
  \ JMS 消息的类。然后，它可用于集成测试套件验证，以确保 JMS 消息已被接收。作为一名负责任的程序员，我希望确保书中的代码片段能够正常工作。但深入探讨 JMS\
  \ 集成测试超出了本书的范围，因此由您自行探索用于确保 JMS 示例正常工作的测试策略。\n\n`SimpleService` 类使用了 Lombok 的 `@Slf4j`\
  \ 注解，当我们需要使用 SLF4J 日志门面时，这非常方便。对于纯 Java JMS 示例来说，`@Service` 可能会令人困惑，但在 Spring JMS\
  \ 异步示例中，它将被用作 Spring Bean 并被扫描。实现很简单——代码只是将接收到的消息记录到控制台。\n\n本示例中解释的下一个类是清单 5-12\
  \ 中的 JMS 监听器实现。\n\n***清单 5-12***. 使用 JMS 2.0 API 异步接收消息 (0503-async-jndi)\n\n```\n\
  package net.lkrnac.book.eiws.chapter05.asyncjndi;\n\nimport javax.jms.Message;\n\
  import javax.jms.MessageListener;\n\nimport lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
  \n@Slf4j\npublic class SimpleMessageListener implements MessageListener {\n  private\
  \ SimpleService simpleService;\n\npublic SimpleMessageListener(SimpleService simpleService)\
  \ {\n    super();\n    this.simpleService = simpleService;\n  }\n\n@Override\n  public\
  \ void onMessage(Message message) {\n    try {\n      simpleService.processText(message.getBody(String.class));\n\
      } catch (Throwable t) {\n      log.error(\"Error during message reception\"\
  , t);\n    }\n  }\n}\n```\n\n`SimpleMessageListener` 期望通过构造函数传入一个 `SimpleService`\
  \ 实例。\n\n\n\n由于实现了 JMS 接口，`MessageListener` 必须实现 `onMessage` 方法。该方法具有 JMS 契约定义的签名，必须接受一个\
  \ `Message` 参数。这是消息监听器的方法，当 JMS 队列需要发送新消息时，该方法将被异步执行。它实际上是观察者模式的一种实现。\n\n由于此方法将在由\
  \ HornetQ 客户端库创建的线程池管理的独立线程中被调用，因此最好处理所有异常。在本例中，我们记录了堆栈跟踪。消息本身在接收后被委托给 `simpleService.processText()`\
  \ 调用。\n\n列表 5-13 展示了 HornetQ JMS 配置。\n\n***列表 5-13***. 异步 JMS HornetQ 配置 (0503-async-jndi)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\nimport java.util.Hashtable;\n\
  import javax.jms.ConnectionFactory;\nimport javax.jms.JMSConsumer;\nimport javax.jms.JMSContext;\n\
  import javax.jms.MessageListener;\nimport javax.jms.Queue;\nimport javax.naming.InitialContext;\n\
  import javax.naming.NamingException;\nimport lombok.Getter;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
  \npublic class JmsConfiguration implements AutoCloseable {\n  private InitialContext\
  \ initialContext;\n  private SimpleService simpleService;\n\n@Getter\n  private\
  \ JMSContext jmsContext;\n  @Getter\n  private Queue queue;\n\npublic JmsConfiguration(SimpleService\
  \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
  \npublic void init() throws NamingException {\n    Hashtable<Object, Object> env\
  \ = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
  ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
  ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
  , \"jnp://localhost:1099\");\n    initialContext = new InitialContext(env);\n\n\
  queue = (Queue) initialContext.lookup(\"queue/ExpiryQueue\");\n    ConnectionFactory\
  \ cf =\n        (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
  );\n    jmsContext = cf.createContext();\n\nJMSConsumer jmsConsumer = jmsContext.createConsumer(queue);\n\
      MessageListener messageListener = new SimpleMessageListener(simpleService);\n\
      jmsConsumer.setMessageListener(messageListener);\n  }\n\n@Override\n  public\
  \ void close() throws NamingException {\n    if (initialContext != null) {\n      initialContext.close();\n\
      }\n    if (jmsContext != null) {\n      jmsContext.close();\n    }\n  }\n}\n\
  ```\n\n此 JMS 配置再次类似于列表 5-6 中纯 Java JMS 2.0 示例的配置。此 `JmsConfiguration` 在构造函数中期望一个\
  \ `SimpleService` 实例。额外的一部分是消息监听器的创建和注册。\n\n首先，我们需要基于 `queue` 从 `jmsContext` 对象创建\
  \ `JMSConsumer` 实例。要创建 `SimpleMessageListener` 实例，我们需要 `SimpleService` 实例，正如我们从列表\
  \ 5-12 中已经了解的那样。接下来，我们将监听器注册到 `jmsConsumer` 中，监听器即注册完成。列表 5-14 展示了此示例的主类。\n\n***列表\
  \ 5-14***. 异步 JMS 2.0 示例的主类 (0503-async-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\
  \nimport javax.jms.JMSContext;\nimport javax.jms.JMSException;\nimport javax.jms.Queue;\n\
  import javax.naming.NamingException;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
  \npublic class AsyncJndiApplication {\n  public static void main(String[] args)\
  \ throws JMSException, NamingException {\n    SimpleService simpleService = new\
  \ SimpleService();\n    try (JmsConfiguration jmsConfiguration =\n        new JmsConfiguration(simpleService))\
  \ {\n      jmsConfiguration.init();\n      JMSContext jmsContext = jmsConfiguration.getJmsContext();\n\
        Queue queue = jmsConfiguration.getQueue();\n\nSimpleMessageSender messageSender\
  \ =\n          new SimpleMessageSender(jmsContext, queue);\n      messageSender.sendMessage(\"\
  simple message\");\n    }\n  }\n}\n```\n\n`main` 方法创建一个 `SimpleService` 实例，并在 try-with-resources\
  \ 块内初始化 JMS 配置并发送消息。此 `main` 方法与同步 JMS 示例的区别在于缺少从 `queue` 显式读取。在本例中，不需要这样做，因为我们已经针对队列注册了\
  \ JMS 监听器。\n\n此示例中使用的最后一个部分是 `SimpleMessageSender`，但其实现与同步 JMS 示例完全相同。因此，我们跳过此列表。当我们针对正在运行的\
  \ HornetQ 服务器执行此主类时，消息被发送到 `queue`，由 `SimpleMessageListener` 接收，并由 `SimpleService`\
  \ 记录，输出类似于列表 5-15。\n\n***列表 5-15***. 异步 JMS 2.0 示例的输出\n\n```\n18:08:33.330 [Thread-0\
  \ (HornetQ-client-global-threads-114132791)] INFO n.l.b.e.chapter05.text.SimpleService\
  \ - Message received: simple message\n```\n\n请注意，记录的线程不是主线程，这与同步示例不同。此线程由 HornetQ\
  \ 客户端库线程池管理。\n\nSpring JMS\n\nSpring JMS 支持旨在简化 JMS 资源的使用、创建和释放。与其他 Spring 抽象类似，它将应用程序代码与底层\
  \ JMS 基础设施的细节以及侵入性的 JMS API 解耦。Spring JMS 特性可以分为以下几个主要领域：\n\n*   支持创建或获取 JMS 资源\n\
  \    *   通过 `<jee:jndi-lookup>` XML 元素对容器管理的 JMS 资源进行 JNDI 查找\n    *   直接创建 `javax.jms.ConnectionFactory`\
  \ 和 `javax.jms.Destination` 对象\n*   支持通过 `org.springframework.jms.core.JmsTemplate`\
  \ 类发送和同步接收 JMS 消息\n*   支持异步接收 JMS 消息\n    *   `@JmsListener` 注解\n    *   `<jms:listener-container>`\
  \ 和 `<jms:listener>` XML 元素\n    *   通过注解 `@Payload`、`@Header`、`@Headers` 提取 JMS\
  \ 消息元素\n    *   为了启用 Spring JMS 注解配置，Spring 4.1 引入了 `@EnableJms` 注解\n*   丰富的 JMS\
  \ 消息转换——允许轻松转换文本消息\n    *   从/到各种传输格式，如 JSON 或 XML\n    *   通过接口 `org.springframework.jms.support.converter.MessageConverter`\
  \ 进行自定义 JMS 消息转换\n\nSpring JMS 的一个重要特性对于上述大多数特性来说是通用的。它将受检异常 `javax.jms.JMSException`\
  \ 转换为非受检异常 `org.springframework.jms.JmsException`。这允许应用程序开发人员将应用程序代码与底层 JMS 通信结构完全解耦。\n\
  \n由于上述每个 Spring JMS 领域都是一个更广泛的主题，我们将通过不同的示例分别介绍它们。\n\n配置 Spring JMS\n\nSpring 为其支持的技术提供了多种配置方式。Spring\
  \ JMS 模块也不例外。\n\n\n\n当我们的应用程序托管在 Java 企业版容器上时，诸如 `ConnectionFactory` 或 `Destination`\
  \ 之类的 JMS 资源通常由应用服务器管理。在这种情况下，JEE 标准提供了一套标准 API，用于通过 JNDI 命名服务发现此类受管理的 JMS 资源。Spring\
  \ 通过使用属于命名空间 `www.springframework.org/schema/jee` 的 `<jee:jndi-lookup>` XML 元素，实现了与底层应用服务通过\
  \ JNDI 的集成。另一种选择是通过注册 `javax.naming.InitialContext` 实例来配置 JNDI 服务。\n\n如果我们的应用程序使用不提供\
  \ JMS 资源的轻量级容器，或者我们的应用程序作为独立的 Java 应用程序运行，我们可以使用标准的依赖注入结构将 JMS 资源注册到 Spring 容器中。\n\
  \n一个相对较新的创建 JMS 资源（如 `Destination` 和 `ConnectionFactory`）的选项是使用 Spring Boot 项目。它通过\
  \ `@EnableAutoConfiguration` 注解实现了 JMS 访问的自动配置。基于此注解，Spring 容器会检查类路径依赖项，如果存在 ActiveMQ\
  \ 或 HornetQ JMS 客户端的实现，则会使用默认配置创建 JMS 资源。\n\n当我们的类路径依赖项中包含 HornetQ 或 ActiveMQ 服务器的实现时，Spring\
  \ Boot 还会配置嵌入式 JMS 服务器，该服务器可以模拟类似于带有 JMS 代理的完整 JEE 应用服务器的配置。\n\nSpring Boot 1.2\
  \ 引入了 `@SpringBootApplication` 注解，它是 `@Configuration`、`@ComponentScan` 和 `@EnableAutoConfiguration`\
  \ 注解组合的便捷快捷方式。\n\nSpring 4.1 中引入的另一个新配置选项是 `@EnableJms` 注解。它启用了 `@JmsListener` 注解，并创建了一个负责管理异步\
  \ JMS 消息接收的监听器容器工厂。\n\nSpring JMS API 在发送或接收消息时，通常对 JMS 目标使用纯字符串名称。但这与 JMS API 不兼容，JMS\
  \ API 要求所有队列或主题都实现 `javax.jms.Destination` 接口。那么，基于名称的解析是如何工作的呢？对于 JMS 目标的名称解析，Spring\
  \ 使用了一个类型为 `org.springframework.jms.support.destination.DestinationResolver` 的特殊\
  \ bean。该接口的签名如清单 5-16 所示。\n\n***清单 5-16***. DestinationResolver 签名\n\n```\npackage\
  \ org.springframework.jms.support.destination;\n\nimport javax.jms.Destination;\n\
  import javax.jms.JMSException;\nimport javax.jms.Session;\n\npublic interface DestinationResolver\
  \ {\n  Destination resolveDestinationName(Session session, String destinationName,\n\
      boolean pubSubDomain) throws JMSException;\n}\n```\n\n该接口旨在根据 JMS 目标的字符串名称和运行时给定的\
  \ JMS 会话，解析查找 JMS `Destination` 实例。Spring 提供了多种开箱即用的实现：\n\n*   `BeanFactoryDestinationResolver`：基于\
  \ Spring 的 `BeanFactory` 的实现，根据名称解析类型为 `javax.jms.Destination` 的 Spring 管理 bean。\n\
  *   `DynamicDestinationResolver`：根据给定的名称动态创建 JMS 目标实例。如果未明确指定，则默认使用此实现。\n*   `JndiDestinationResolver`：根据给定的\
  \ JNDI 名称解析 JMS 目标。\n\n所有这些特性为使用 Spring 配置 JMS 提供了多种方法和组合。主要方法将在后续示例中介绍。\n\n![Image](img/sq.jpg) **注意**  本章前面部分的\
  \ Java 示例使用 HornetQ 作为 JMS 提供者，因为它还允许我们探索 JMS 2.0 API。为了保持 JMS 提供者的一致性，以下大多数示例中都使用\
  \ HornetQ。仅当 Spring Boot 支持不易提供某些特性时，我们才使用 ActiveMQ。\n\nSpring JMS XML 配置示例\n\n\
  第一个 Spring JMS 配置示例使用 XML 配置 JMS 资源，如清单 5-17 所示。\n\n***清单 5-17***. Spring JMS JNDI\
  \ 查找配置（文件 spring-jms-config.xml 位于示例项目 0504-async-jms-namespace 的 src/main/resources\
  \ 文件夹中）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:jee=\"http://www.springframework.org/schema/jee\"\
  \n  xmlns:util=\"http://www.springframework.org/schema/util\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/jee\n    http://www.springframework.org/schema/jee/spring-jee.xsd\n\
                  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
                  http://www.springframework.org/schema/util\n    http://www.springframework.org/schema/util/spring-util.xsd\"\
  >\n\n<util:map id=\"jndiProperties\" map-class=\"java.util.Properties\">\n    <entry\
  \ key=\"java.naming.factory.initial\"\n      value=\"org.jnp.interfaces.NamingContextFactory\"\
  \ />\n    <entry key=\"java.naming.factory.url.pkgs\"\n      value=\"org.jboss.naming:org.jnp.interfaces\"\
  \ />\n    <entry key=\"java.naming.provider.url\" value=\"jnp://localhost:1099\"\
  \ />\n  </util:map>\n\n<jee:jndi-lookup id=\"connectionFactory\" jndi-name=\"/ConnectionFactory\"\
  \n    environment-ref=\"jndiProperties\" />\n  <jee:jndi-lookup id=\"queue\" jndi-name=\"\
  queue/ExpiryQueue\"\n    environment-ref=\"jndiProperties\" />\n\n<bean id=\"jmsTemplate\"\
  \ class=\"org.springframework.jms.core.JmsTemplate\">\n    <constructor-arg ref=\"\
  connectionFactory\" />\n  </bean>\n\n<bean id=\"destinationResolver\"\n    class=\"\
  org.springframework.jms.support.destination.JndiDestinationResolver\">\n    <property\
  \ name=\"jndiEnvironment\" ref=\"jndiProperties\" />\n  </bean>\n</beans>\n```\n\
  \n这个 Spring XML 配置文件使用了三个命名空间。`bean` 是标准的依赖注入命名空间，是任何 Spring XML 配置文件的支柱。`jee` 命名空间用于与\
  \ Java 企业版应用容器集成。`util` 命名空间用于各种非标准的 XML 配置结构。\n\n在此例中，我们使用 `util` 命名空间为 HornetQ\
  \ 配置定义 JNDI 属性映射。我们使用了 HornetQ 文档 `http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`\
  \ 中建议的相同值。这些值与纯 Java JMS 示例中使用的值相同。此配置可以与在 `localhost` 上运行默认配置的 HornetQ 服务器通信。\n\
  \n这里需要这些属性，因为我们的示例不是在 JEE 应用服务器上运行的。如果是这种情况，我们将完全排除 `jndiProperties` 部分，因为 Spring\
  \ 会针对应用服务器命名服务执行 JNDI 查找。\n\n下一部分是 JNDI 查找本身。我们使用 `<jee:jndi-lookup>` 元素，根据其 JNDI\
  \ 名称和 `jndiProperties` 映射获取 JMS `ConnectionFactory` 和 `Queue` 的实例。同样，如果 JNDI 查找是针对\
  \ JEE 容器执行的，我们将能够排除 `environment-ref` 属性。这些操作的结果是在 Spring 上下文中注册了两个 bean，名称分别为 `connectionFactory`\
  \ 和 `queue`。这对于从 Spring 应用程序的角度抽象出 JNDI 资源非常方便。\n\n\n\n接下来，我们创建 `jmsTemplate` 实例，它将使用\
  \ `connectionFactory` bean 作为构造函数参数。这展示了我们如何使用通过 JNDI 查找创建的 bean。`JmsTemplate` 本身的使用和其背后的特性将在后文解释。\n\
  \n在此配置文件中注册的最后一个 bean 是 `destinationResolver`。由于我们正在对 JMS 资源进行 JNDI 查找，我们希望使用 `JndiDestinationResolver`\
  \ 而不是 `DynamicDestinationResolver`。这允许我们在发送或接收 JMS 消息时使用 JMS 目的地的字符串名称 `queue/ExpiryQueue`。\n\
  \nSpring JMS Java 配置示例\n\n清单 5-18 展示了一个 Spring JMS 应用程序的 Java 配置示例，其中 JMS 资源是显式创建的。\n\
  \n***清单 5-18***. 显式创建 JMS 资源的 Java 配置 (0506-async-jms-java-config)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter05.text;\n\nimport java.util.Hashtable;\nimport javax.jms.ConnectionFactory;\n\
  import javax.jms.Queue;\nimport javax.naming.InitialContext;\nimport javax.naming.NamingException;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.core.JmsTemplate;\n\
  \n@Configuration\n@EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public\
  \ InitialContext initialContext() throws NamingException {\n    Hashtable<Object,\
  \ Object> env = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
  ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
  ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
  , \"jnp://localhost:1099\");\n    return new InitialContext(env);\n  }\n\n@Bean\n\
    public ConnectionFactory connectionFactory(InitialContext initialContext)\n      throws\
  \ NamingException {\n    return (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
  );\n  }\n\n@Bean\n  public Queue queue(InitialContext initialContext) throws NamingException\
  \ {\n    return (Queue) initialContext.lookup(\"/queue/ExpiryQueue\");\n  }\n\n\
  @Bean\n  public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {\n\
      return new JmsTemplate(connectionFactory);\n  }\n}\n```\n\n`JmsConfiguration`\
  \ 类使用 `@Configuration` 注解，将其定义为 Spring 的配置类。`@EnableJms` 注解用于启用 JMS 注解和一些用于异步 JMS\
  \ 消息接收的支持性 bean。\n\n在此配置类中注册的第一个 bean 是带有 HornetQ 访问配置的 JNDI `InitialContext` 实例。它将在创建\
  \ JMS 资源 `ConnectionFactory` 和 `Queue` 时使用。这些资源也在使用 `@Bean` 注解的方法中创建，以便它们被注册到上下文中。我们通过对\
  \ `initialContext` 实例进行 JNDI 查找来创建它们，因此需要将它们显式转换为相关类型。这三个方法是 `0506-async-jms-java-config`\
  \ 示例项目中唯一使用 HornetQ 特定 API 的地方。\n\n最后，我们基于在此类中创建的注入的 `connectionFactory`，创建并注册一个\
  \ `JmsTemplate` 实例。`JmsTemplate` 可用于发送和同步接收 JMS 消息。\n\n清单 5-19 展示了一个 Spring Boot\
  \ 配置示例。\n\n***清单 5-19***. 使用 Spring Boot 配置 JMS 的示例 (0507-sync-jms-java-config)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  \n@EnableScheduling\n@SpringBootApplication\npublic class JavaConfigJmsSyncApplication\
  \ {\n  public static void main(String[] args) throws InterruptedException {\n    SpringApplication.run(JavaConfigJmsSyncApplication.class,\
  \ args);\n  }\n}\n```\n\n你可能注意到，这个示例中没有出现 `org.springframework.jms` 包。Spring Boot\
  \ 足够智能，能够识别到类路径上有 Spring JMS 依赖，因此会自动创建所有 JMS 资源。它使用固执己见的默认配置来进行创建。如果在类路径上找到 HornetQ\
  \ 客户端依赖，它会开箱即用地创建一个 `ConnectionFactory`。如果我们通过 `String` 名称而不是 `Destination` 接口的实例来使用目的地，`DynamicDestinationResolver`\
  \ 会为我们创建它们。这种 Spring Boot 方法显著减少了创建现代企业级服务所需的配置量。\n\n使用 `@EnableScheduling` 注解是因为该示例使用了\
  \ Spring 调度支持来发送消息。这将在后续示例中展示。\n\n缓存 JMS 资源\n\n正如我们提到的，正常的 JMS 流程是按以下顺序创建 JMS 资源：`ConnectionFactory\
  \ Connection Session MessageProducer/MessageConsumer/Message`。JMS 2.0 通过使用 `JMSContext`、`JMSConsumer`\
  \ 和 `JMSProducer` 提供了一些便利性。但在底层，它们仍然使用较旧的 JMS 1.1 抽象。此外，Spring 也有自己的 JMS API，因此在\
  \ Spring 代码中完全不使用这些 JMS 2.0 的便利性抽象。因此，当我们考虑缓存 JMS 资源时，这完全是关于 JMS 1.1 抽象的问题。\n\n\
  如果这个链中的实例在我们的应用程序中被重用，那么一切都会很好。但是，如果我们每次想要发送或接收消息时都创建所有这些对象，应用程序的性能将会受到影响。`Connection`\
  \ 和 `Session` 的创建尤其耗时。\n\n因此，Spring 提供了两种 `ConnectionFactory` 的实现，可以帮助缓存这些资源：\n\n\
  *   `SingleConnectionFactory`：对于每次调用，`ConnectionFactory.createConnection()` 返回相同的\
  \ `Connection` 实例，并忽略 `ConnectionFactory.close()` 调用。\n*   `CachingConnectionFactory`：在\
  \ `SingleConnectionFactory` 功能的基础上构建，并增加了对 `Session`、`MessageProducer` 和 `MessageConsumer`\
  \ 实例的缓存。`sessionCacheSize` 属性用于更改缓存大小，默认为 1。`MessageConsumer` 和 `MessageProducer`\
  \ 实例在 `Session` 实例内被缓存。\n\n这两种实现都用作 JMS 提供者特定连接工厂的包装器。此类配置的示例见清单 5-20。\n\n![Image](img/sq.jpg) **注意**  由于\
  \ Spring Boot 目前没有提供一种简单的方法将 `CachingConnectionFactory` 与 HornetQ 结合使用（参见 Spring\
  \ Boot 问题 `https://github.com/spring-projects/spring-boot/issues/2956`），此示例使用了 ActiveMQ\
  \ 嵌入式代理。\n\n***清单 5-20***. CachingConnectionFactory 的使用 (0511-jms-caching-connection-factory)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport javax.jms.ConnectionFactory;\n\
  import org.apache.activemq.ActiveMQConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.jms.connection.CachingConnectionFactory;\n\n@Configuration\n\
  @EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public ConnectionFactory\
  \ connectionFactory() {\n    ActiveMQConnectionFactory activeMqConnectionFactory\
  \ =\n        new ActiveMQConnectionFactory();\n    activeMqConnectionFactory.setBrokerURL(\"\
  vm://localhost\");\n\nCachingConnectionFactory connectionFactory =\n        new\
  \ CachingConnectionFactory(activeMqConnectionFactory);\n    connectionFactory.setSessionCacheSize(10);\n\
      return connectionFactory;\n  }\n}\n```\n\n\n\n`@Configuration` 注解使 `JmsConfiguration`\
  \ 成为一个 Spring 配置类。`@EnableJms` 注解用于启用 JMS 特定的 Spring 注解，并创建一些 JMS 支持 Bean。\n\n在此类中，我们注册了一个类型为\
  \ `ConnectionFactory` 的 Spring Bean。但我们不像通常那样直接暴露 ActiveMQ 实例。相反，我们将 `ActiveMQConnectionFactory`\
  \ 包装到 `CachingConnectionFactory` 中，并将其实例作为默认的 `connectionFactory` Bean 暴露。因此，在任何使用\
  \ JMS `connectionFactory` 的地方，JMS 资源都会被重用以提升性能。在此例中，缓存大小被配置为存储 10 个 `Session` 对象。\n\
  \n使用 JmsTemplate\n\n`JmsTemplate` 是 Spring JMS 模块中最重要的类。其主要关注点是同步接收和发送 JMS 消息。为了对这些任务进行细粒度控制，`JmsTemplate`\
  \ 实例存储了各种配置选项。以下是一些最重要的选项：\n\n*   `setSessionAcknowledgeMode` 或 `setSessionAcknowledgeModeName`：配置确认模式。可能的值如下：\n\
  \    *   `Session.AUTO_ACKNOWLEDGE` 或 \"`AUTO_ACKNOWLEDGE`\"\n    *   `Session.CLIENT_ACKNOWLEDGE`\
  \ 或 \"`CLIENT_ACKNOWLEDGE`\"\n    *   `Session.DUPS_OK_ACKNOWLEDGE` 或 `\"DUPS_OK_ACKNOWLEDGE\"\
  `\n*   `setSessionTransacted`：开启事务行为。开启后，会覆盖确认模式的配置。\n*   `setConnecionFactory`：作为\
  \ JMS 客户端访问主入口的强制连接工厂实例。\n*   将使用的默认 JMS `Destination`\n    *   `setDefaultDestination`：通过\
  \ `Destination`/`Queue`/`Topic` 实例设置目的地。\n    *   `setDefaultDestinationName`：通过名称设置目的地。\n\
  *   `setReceiveTimeout`：更改此 `JmsTemplate` 实例的接收超时时间。它适用于 JMS 消息的同步接收。该值以毫秒为单位，默认值为\
  \ 0，这意味着接收调用将永远等待。\n*   `setPubSubDomain`：在发布/订阅和点对点通信之间切换。默认值为 false，使用点对点模式。\n\
  *   `setDestinationDesolver`：指定负责将 JMS 目的地名称转换为 `javax.jms.Destination` 实例的类。默认情况下，它使用\
  \ `DynamicDestinationResolver`。Spring 也提供了 `JndiDestinationResolver`。\n*   `setMessageConverter`：将\
  \ JMS 消息的转换委托给一个单独的 Bean。默认情况下，它使用 `SimpleMessageConverter`。转换器将在本章后续部分进一步说明。\n\n\
  显然，所有这些存储在单个对象中的配置可能会引发疑问：这样一个对象/Bean 能否在多线程环境中使用？`JmsTemplate` 类的一个重要方面是它是线程安全的：我们可以在多个线程之间共享和使用\
  \ `JmsTemplate` 实例。\n\n当我们的实例配置完成后，我们可以使用它对 JMS 目的地或会话执行操作。它涵盖了 JMS 消息处理的多种功能：\n\
  \n*   *消息发送*方法：\n    *   `send`：将消息发送到默认或指定的目的地\n    *   `convertAndSend`：首先使用 `MessageConverter`\
  \ 转换消息，然后将其发送到默认或指定的目的地\n    *   `sendAndReceive`：将消息发送到默认或指定的目的地，并异步接收回复消息\n* \
  \  *同步消息接收*方法——默认情况下，这些操作会阻塞调用线程且无超时：\n    *   `receive`：同步接收消息。\n    *   `receiveSelected`：使用给定的消息选择器同步接收消息。消息选择器用于根据其过滤表达式过滤消息。\n\
  \    *   `receiveAndConvert`：同步接收消息并通过 `MessageConverter` 进行转换。\n    *   `receiveSelectedAndConvert`：结合了应用的消息选择器和消息转换器。\n\
  *   *浏览消息*的方法，即在不从 JMS 目的地删除消息的情况下读取消息：\n    *   `browse`：用于浏览所有消息。\n    *   `browseSelected`：用于浏览选定的消息；选定的消息通过\
  \ `BrowserCallback<T>` 进行缩小范围。\n*   针对 JMS 会话执行*自定义操作*的方法：\n    *   `execute`：注册操作回调，其中将传递\
  \ `Session` 对象。在此回调中，我们可以对 JMS `Session` 执行自定义操作。\n\n`JmsTemplate` 的另一个重要特性是它将受检异常\
  \ `javax.jms.JMSException` 转换为非受检异常 `org.springframework.jms.JmsException`。\n\n\
  释放 JMS 资源也很方便。当应用程序不再需要 `Connection` 和 `Session` 时，需要关闭它们。使用 JMS API 时，必须通过调用这两个\
  \ JMS 资源的 `close` 方法手动完成。但是，当我们使用 `JmsTemplate` 时，这种 JMS 资源的释放会在底层自动完成。\n\n清单 5-21\
  \ 展示了如何将 `JmsTemplate` 配置并注册为 Spring Bean。\n\n***清单 5-21***. 配置 JmsTemplate (0507-sync-jms-java-config)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport javax.jms.ConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.core.JmsTemplate;\n\n@Configuration\npublic class\
  \ JmsConfiguration {\n  @Bean\n  public JmsTemplate jmsTemplate(ConnectionFactory\
  \ connectionFactory) {\n    JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);\n\
      jmsTemplate.setReceiveTimeout(1000);\n    return jmsTemplate;\n  }\n}\n```\n\
  \n在此例中，我们将使用 `JmsTemplate` 发送消息和同步接收消息。因此，为了避免可能阻塞读取 JMS 消息的线程，通常最好配置 `receiveTimeout`\
  \ 属性。清单 5-22 展示了 JMS 消息发送实现可能的样子。\n\n***清单 5-22***. 发送 JMS 消息 (0507-sync-jms-java-config)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class SimpleMessageSender {\n  private static final\
  \ String SIMPLE_MESSAGE = \"simple message\";\n  private JmsTemplate jmsTemplate;\n\
  \n@Autowired\n  public SimpleMessageSender(JmsTemplate jmsTemplate) {\n    super();\n\
      this.jmsTemplate = jmsTemplate;\n  }\n\n@Scheduled(fixedRate = 1000)\n  public\
  \ void send() {\n    log.info(\"Sending message: {}\", SIMPLE_MESSAGE);\n    this.jmsTemplate.convertAndSend(\"\
  queue/ExpiryQueue\", SIMPLE_MESSAGE);\n  }\n}\n```\n\n\n\n`SimpleMessageSender`\
  \ 类是一个 Spring Bean，通过 `@Component` 注解定义。`@Slf4j` 是 Lombok 提供的便捷快捷方式，用于创建 SLF4J 日志记录器常量。我们通过构造函数注入将\
  \ `jmsTemplate` 实例注入到该 Spring Bean 中。\n\n通过 `send` 方法，我们将每秒发送一条简单的 JMS 消息。`@Scheduled`\
  \ 注解确保 `send` 方法能够定期执行。在方法体中，我们首先记录日志，然后调用 `jmsTemplate.convertAndSend` 方法。需要将 `Spring`\
  \ 对象转换为 `Message` 实例，这一转换由 `SimpleMessageConverter` 完成。\n\n清单 5-23 展示了同步消息接收的简单实现。\n\
  \n***清单 5-23***. 同步 JMS 消息接收 (0507-sync-jms-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleMessageReader {\n  private JmsTemplate jmsTemplate;\n\
    private SimpleService simpleService;\n\n@Autowired\n  public SimpleMessageReader(JmsTemplate\
  \ jmsTemplate,\n      SimpleService simpleService) {\n    super();\n    this.jmsTemplate\
  \ = jmsTemplate;\n    this.simpleService = simpleService;\n    jmsTemplate.setReceiveTimeout(1000);\n\
    }\n\n@Scheduled(fixedRate = 1200)\n  public void readMessage() {\n    String message\
  \ = (String) jmsTemplate.receiveAndConvert(\"queue/ExpiryQueue\");\n    simpleService.processText(message);\n\
    }\n}\n```\n\n`SimpleMessageReader` 类同样是一个 Spring 组件，并通过构造函数注入两个依赖项。第一个是著名的 `jmsTemplate`\
  \ 实例。我们通过为 `jmsTemplate` 配置 `receiveTimeout` 属性，确保同步接收不会永久阻塞。第二个依赖项是 `simpleService`，负责处理消息（记录日志）。\n\
  \n`readMessage` 方法每 1.2 秒调度一次，以突出使用同步接收时的延迟。`jmsTemplate.receiveAndConvert` 调用返回\
  \ `Object`，因此我们需要显式转换为 `String`。Spring 还会在底层转换 JMS `Message` 实例。最后，我们将文本形式的消息传递给\
  \ `simpleService`。\n\n本示例中的最后一个类是 `JavaConfigJmsSyncApplication`（如清单 5-19 所示）。当我们以\
  \ Java 应用程序运行此类时，会得到类似于清单 5-24 的输出。\n\n***清单 5-24***. 同步 JMS 接收示例的输出\n\n```\n2015-05-30\
  \ 20:44:47.417  INFO 23387 --- [pool-2-thread-1] n.l.b.e.c.text.SimpleMessageSender      \
  \ : Sending message: simple message\n2015-05-30 20:44:47.419  INFO 23387 --- [          \
