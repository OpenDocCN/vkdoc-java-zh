  \ 中 `0815-filter-xml-ref` 示例的输出类似。\n\n基于 SpEL 的过滤器示例（基于 XML 配置）\n\n现在来看一个过滤器示例，该示例将过滤逻辑内联到\
  \ SI 流中。这可以通过 SpEL 实现，SpEL 可以嵌入到包括过滤器在内的各种 SI 组件中。实际上，此示例使用了与 XML 过滤器示例 `0815-filter-xml-ref`\
  \ 完全相同的类，唯一的区别在于 SI 流配置，如清单 8-66 所示。\n\n***清单 8-66***. 使用 SpEL 的过滤器 SI 流配置（文件 si-config.xml，位于示例项目\
  \ 0817-filter-xml-spel 的 src/main/resources 文件夹中）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xmlns:int-http=\"\
  http://www.springframework.org/schema/integration/http\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n  <int:channel id=\"\
  inChannel\"/>\n\n<int:filter input-channel=\"inChannel\" output-channel=\"filteredChannel\"\
  \n    expression=\"!payload.contains('corrupt')\" />\n  <int:channel id=\"filteredChannel\"\
  />\n\n<int:service-activator input-channel=\"filteredChannel\" ref=\"writeService\"\
  \n    method=\"write\">\n  </int:service-activator>\n</beans>\n```\n\n唯一的区别在于 `<int:filter>`\
  \ XML 标签，它使用了 `expression` 属性而不是 `ref`。如您所见，我们可以定义一个类似 Java 的简单脚本条件，其功能与 `0815-filter-xml-ref`\
  \ 示例中的 `simpleFilter` bean 完全相同。甚至输出和 SI 图也与上一个示例类似。\n\n路由器\n\n*路由器*是一个 SI 组件，它可以分流你的消息流。换句话说，它代表了\
  \ SI 中的一个决策组件。它应用路由逻辑，并决定消息应进一步传递到哪个通道或哪些通道。请注意，将同一消息实例传递到不同通道是可行的，因为消息是不可变的。路由逻辑可以通过多种方式定义，基于以下条件：\n\
  \n\n\n*   通用路由\n    *   *自定义 Java 逻辑*：使用 Spring Bean 将消息路由到目标通道或多个通道。可通过 XML 元素\
  \ `<int:router>` 或 SI 注解 `@Router` 进行配置。此 Java 逻辑需要返回 `MessageChannel`、`List<MessageChannel>`、`String`、`Listing<String>`\
  \ 类型之一，用于指定要发送消息的通道实例或通道名称。\n    *   *负载类型*：可通过 `<int:payload-type-router>` 进行配置。\n\
  \    *   *标头值*：可通过 `<int:header-value-router>` 进行配置。\n    *   *异常类型*：可处理负载类型为 `Throwable`\
  \ 的消息的路由。实际上，它是一种特殊类型的负载类型处理器。可通过 `<int:exception-type-router>` 进行配置。\n    *   *收件人列表路由器*：一种特殊类型的路由器，用于将消息发送到静态通道列表。可通过\
  \ `<int:recipient-list-router>` 进行配置。\n    *   *SpEL 表达式*：可通过 `<int:router>` XML\
  \ 元素的表达式属性配置内联 SpEL 表达式。\n*   特定技术路由\n    *   *XPath 表达式*：可通过 `<int-xml:xpath-router>`\
  \ 进行配置。\n\n路由器是一个被动的中间组件，因此可以参与单向或双向流。\n\n基于 XML 配置的通用路由器示例\n\n清单 8-67 展示了路由器示例的\
  \ `WriterService` 实现。\n\n***清单 8-67***. 通用 XML 路由器示例的输出服务 (0818-router-xml-generic)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter08.out.WriteRepository;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\n\n@Slf4j\n@Service\npublic class\
  \ WriteService {\n  private WriteRepository writeRepository;\n\n@Autowired\n  public\
  \ WriteService(WriteRepository writeRepository) {\n    super();\n    this.writeRepository\
  \ = writeRepository;\n  }\n\npublic boolean writeRoute1(String message) {\n    log.info(\"\
  Route 1 hit with message: \" + message);\n    return writeRepository.persist(message)\
  \ == 1;\n  }\n\npublic boolean writeRoute2(String message) {\n    log.info(\"Route\
  \ 2 hit with message: \" + message);\n    return writeRepository.persist(message)\
  \ == 1;\n  }\n}\n```\n\n该服务被插入到 SI 流的输出端。它使用我们通用的 `WriteRepository` 来持久化消息。但与之前示例的不同之处在于，它使用了\
  \ `writeRoute1()` 和 `writeRoute2()` 两个方法来消费消息。它们用于将消息流拆分为两条路由。清单 8-68 展示了 SI 流配置。\n\
  \n***清单 8-68***. 通用 XML 路由器示例的 SI 流配置 (文件 si-config.xml，位于示例项目 0818-router-xml-generic\
  \ 的 src/main/resources 文件夹中)\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  <beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperService\" />\n  <int:channel id=\"inChannel\"\
  />\n\n<int:router input-channel=\"inChannel\" expression=\"payload\">\n    <int:mapping\
  \ channel=\"route1Channel\" value=\"message1\"/>\n    <int:mapping channel=\"route2Channel\"\
  \ value=\"message2\"/>\n  </int:router>\n  <int:channel id=\"route1Channel\"/>\n\
    <int:channel id=\"route2Channel\"/>\n\n<int:service-activator input-channel=\"\
  route1Channel\" ref=\"writeService\"\n    method=\"writeRoute1\"/>\n  <int:service-activator\
  \ input-channel=\"route2Channel\" ref=\"writeService\"\n    method=\"writeRoute2\"\
  />\n</beans>\n```\n\nSI 流通过入站网关消费消息后，通过 `inChannel` 将消息传递给路由器组件。路由器端点使用 `expression`\
  \ 来检查消息的负载。如果负载是 `message1`，则路由到 `route1Channel`；如果负载是 `message2`，则路由到 `route2Channel`。这两个通道连接到服务激活器，服务激活器将它们映射到\
  \ `WriteService.writeRoute1()` 和 `WriteService.writeRoute2()` Java 方法。这是一个基于负载值的简单\
  \ SI 流分支。清单 8-69 展示了此示例的主类。\n\n***清单 8-69***. 通用 XML 路由器示例的主类 (0818-router-xml-generic)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter08.in.SiWrapperService;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@Slf4j\n@SpringBootApplication\n\
  @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n  public\
  \ static void main(String[] args) throws InterruptedException {\n    ApplicationContext\
  \ ctx = SpringApplication.run(SiApplication.class, args);\n\nSiWrapperService wrapperService\
  \ = ctx.getBean(SiWrapperService.class);\n    boolean result1 = wrapperService.processText(\"\
  message1\");\n    log.info(\"Result:\" + result1);\n    boolean result2 = wrapperService.processText(\"\
  message2\");\n    log.info(\"Result:\" + result2);\n  }\n}\n```\n\n创建包含 SI 流的 Spring\
  \ 上下文后，我们读取 `SiWrapperService` bean。然后，我们向 SI 流发送两条负载分别为 `message1` 和 `message2`\
  \ 的消息，并记录返回值。因此，我们现在处理的是带有临时回复通道的双向消息流。清单 8-70 展示了运行此主类时的输出。\n\n***清单 8-70***. 通用\
