  \ XML 元素 `<int:bridge>` 或通过 `@BridgeFrom` 或 `@BridgeTo` 注解进行配置，这些注解用于标记通道 Bean。其使用包括被动模式和主动模式。在主动模式下，它需要使用\
  \ `<int:poller>` 或 `@Poller` 子元素。\n\n例如，当我们需要从一个为主动消费者设计的通道中，在被动组件内消费消息时，可能会用到它（`PollableChannel`\
  \ 将在本章后面描述）。在这种情况下，通道和组件是不兼容的，而主动桥接组件将帮助我们弥合这一差距。另一个用例是连接两个不需要数据转换的 SI 流或系统。\n\n\
  使用 XML 配置的桥接器示例\n\n清单 8-81 展示了 XML 桥接器示例的 SI 流。\n\n***清单 8-81***. XML 桥接器示例的 SI\
  \ 配置（位于示例项目 0821-bridge-xml 的 src/main/resources 文件夹中的文件 si-config.xml）\n\n```\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
  inChannel\" >\n    <int:queue capacity=\"10\" />\n  </int:channel>\n\n<int:bridge\
  \ input-channel=\"inChannel\" output-channel=\"outputChannelAdapter\" >\n    <int:poller\
  \ fixed-rate=\"100\" />\n  </int:bridge>\n\n<int:outbound-channel-adapter id=\"\
  outputChannelAdapter\"\n    ref=\"writeService\" method=\"write\">\n  </int:outbound-channel-adapter>\n\
  </beans>\n```\n\n消息将通过入站消息网关传递给 SI 基础设施，该网关使用我们通用的 `SiWrapperServiceVoid` 作为服务接口，并将消息发送到\
  \ `inChannel`。在此例中，`inChannel` 被配置为一个可临时存储 10 条消息的存储区。这种类型的通道将在后面的“QueueChannel”部分详细解释。\n\
  \n该通道连接到桥接器组件，此处的桥接器是主动的，每 100 毫秒轮询一次 `inChannel`。桥接器的输出侧直接连接到出站通道适配器。桥接器的 `output-channel`\
  \ 属性和通道适配器的 `id` 相匹配，这意味着这些组件是相互连接的。出站通道适配器映射到我们通用的方法 `WriteService.write()`。清单\
  \ 8-82 展示了此示例的主类。\n\n***清单 8-82***. XML 桥接器示例的主类 (0821-bridge-xml)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;\n\
