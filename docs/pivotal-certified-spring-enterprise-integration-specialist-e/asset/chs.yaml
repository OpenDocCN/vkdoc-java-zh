  \ COMPLETED\n```\n\nCommandLineJobRunner\n\n许多企业使用某种调度系统和监控系统进行批处理。这些系统通常需要通过命令行执行批处理逻辑。因此，SB\
  \ 提供了通过命令行界面（CLI）轻松执行批处理作业的支持。这一支持通过 `CommandLineJobRunner` 类实现，我们可以显式指定要执行哪个 `Job`，以及需要传入哪些参数。\n\
  \n当然，当从 CLI 运行时，SB 应用程序需要指示作业执行的退出状态。该支持使用操作系统进程的标准数字退出码机制。当操作系统进程返回 `0` 退出码时，表示成功。如果退出码非零，则表示发生了错误。因此，SB\
  \ 为每个 `ExitStatus` 分配一个数值，其中 `COMPLETED` 的值为 `0`。从操作系统的角度来看，其他所有 `ExitStatus` 均表示错误。例如，`FAILED`\
  \ 状态的值为 `5`。\n\n从命令行执行瘦 JAR\n\nJava 应用程序可以通过多种方式打包。例如，Maven 默认会构建一个瘦 JAR。这意味着我们的应用程序会被打包成一个单独的\
  \ JAR，而不包含该 JAR 使用的所有依赖项。这种 JAR 打包方式期望在 `CLASSPATH` 系统变量中提供所有依赖项的位置。\n\n我们之前解释过的\
  \ `0907-job-launcher-javaconfig` 示例涵盖了这种应用程序结构。该项目需要先用 Maven 构建。该项目的根目录下是 Maven\
  \ 配置文件 `pom.xml`。如果我们安装了 Maven，可以运行命令 `mvn clean install`，项目将被构建并打包为瘦 JAR。项目打包完成后，我们可以使用清单\
  \ 9-36 中的命令从命令行运行 SB `Job`。在此例中，该命令在 Linux 操作系统上执行，但在 Windows 或 Mac 命令行中看起来是一样的。\n\
  \n***清单 9-36***. 从命令行执行 SB 瘦 JAR（示例项目 0907-job-launcher-javaconfig 中的文件 runFromCli.sh）\n\
  \n```\njava -cp \"target/dependency-jars/*:target/0907-job-launcher-javaconfig-0.0.2-SNAPSHOT.jar\"\
  \ org.springframework.batch.core.launch.support.CommandLineJobRunner net.lkrnac.book.eiws.chapter09.BatchApplication\
  \ prepareTeaJob\n```\n\n该命令为单行命令。`java` 命令启动操作系统中的 JRE 安装。`–cp` 参数定义了 `CLASSPATH`\
  \ 依赖项的位置。接下来，我们需要指定要运行的 Java 类。当然，在此例中，我们要运行 `CommandLineJobRunner`。Java 期望该类中包含\
  \ main 方法，而该方法由 SB 提供。最后一个参数是我们打算运行的作业名称。运行此命令后，我们可以观察到与清单 9-30 相同的输出。\n\n从命令行执行胖\
  \ Spring Boot JAR\n\n另一种 Java 打包类型通常被称为*胖 JAR*：所有 JAR 依赖项都被打包到 JAR 文件本身中。使用 `spring-boot-maven-plugin`\
  \ 可以轻松通过 Maven 实现这种打包。`0902-chunk-processing-generic-javaconfig` 示例就是采用这种配置方式，因此当我们通过\
  \ Maven 命令 `mvn clean install` 构建该项目时，可以通过清单 9-37 中的命令执行批处理作业。\n\n***清单 9-37***.\
  \ 从命令行执行 SB 瘦 JAR（示例项目 0902-chunk-processing-generic-javaconfig 中的文件 runFromCli.sh）\n\
  \n```\njava -jar target/0902-chunk-processing-generic-javaconfig-0.0.2-SNAPSHOT.jar\n\
  ```\n\n同样，`java` 启动本地机器上的 JRE 安装。`–jar` 参数定义了要执行的 JAR——在此例中，是为该示例创建的 Maven 构件。Spring\
  \ Boot 会自动运行此 SB 应用程序涵盖的所有 `Job`，因为我们在此处使用了自动配置。运行此命令会产生与清单 9-9 相同的输出。\n\n从命令行执行\
  \ XML 作业\n\n当使用 XML 配置时，从命令行执行的方式如清单 9-38 所示。\n\n***清单 9-38***. 从命令行执行 XML 配置的作业（示例项目\
  \ 0901-chunk-processing-generic-xml 中的文件 runFromCli.sh）\n\n```\njava -Dloader.main=org.springframework.batch.core.launch.support.CommandLineJobRunner\
  \ -jar target/0901-chunk-processing-generic-xml-0.0.2-SNAPSHOT.jar batch-config.xml\
  \ simpleRecordsJob\n```\n\n我们使用 XML 配置文件作为 `CommandLineJobRunner` 的参数，而不是主配置类。运行此命令后的输出同样类似于清单\
  \ 9-9。\n\n从命令行执行带参数的作业\n\n当然，也可以将参数传递给从命令行执行的 `Job`。此示例基于 Spring Boot。我们使用之前清单 9-31\
  \ 示例中的通用茶 `Tasklet` 和 `AddTeaWithParameter`，以便应用 `JobParameters`。清单 9-39 显示了批处理配置。\n\
  \n\n\n***清单 9-39***. 从命令行接口运行带参数作业的示例的批处理配置（0910-job-parameters-cli）\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter09;\n\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddTeaWithParameter;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;\nimport net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;\n\
  \nimport org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
  @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
  \ boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater) {\n    return\
  \ stepFactory.get(\"boilWaterStep\").tasklet(boilWater).build();\n  }\n\n@Bean\n\
    public Step addTeaStep(StepBuilderFactory stepFactory, AddTeaWithParameter addTea)\
  \ {\n    return stepFactory.get(\"addTeaStep\").tasklet(addTea).build();\n  }\n\n\
  @Bean\n  public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)\
  \ {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n  }\n\
  \n@Bean\n  public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n      @Qualifier(\"\
  boilWaterStep\") Step boilWaterStep,\n      @Qualifier(\"addTeaStep\") Step addTeaStep,\n\
        @Qualifier(\"addWaterStep\") Step addWaterStep) {\n    return jobBuilderFactory.get(\"\
  prepareTeaJob\")\n        .start(boilWaterStep)\n        .next(addTeaStep)\n        .next(addWaterStep)\n\
          .build();\n  }\n\n@Bean\n  public Job prepareStrongTeaJob(JobBuilderFactory\
  \ jobBuilderFactory,\n      @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n\
        @Qualifier(\"addTeaStep\") Step addTeaStep,\n      @Qualifier(\"addWaterStep\"\
  ) Step addWaterStep) {\n    return jobBuilderFactory.get(\"prepareStrongTeaJob\"\
  )\n        .start(boilWaterStep)\n        .next(addTeaStep)\n        .next(addTeaStep)\n\
          .next(addWaterStep)\n        .build();\n  }\n}\n```\n\n我们创建了两个用于泡茶的`Job`。第一个`prepareTeaJob`只使用了一个`AddTeaWithParameter\
  \ Tasklet`。第二个则加了两次茶（包含两个使用`AddTeaWithParameter`的步骤），这样我们就能泡出更浓的茶。定义这两个作业是为了突出 Spring\
  \ Boot 的功能，即指定从命令行运行哪个`Job`。清单 9-40 展示了该应用程序的主类。\n\n***清单 9-40***. 从命令行接口运行带参数作业的示例的主类（0910-job-parameters-cli）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@SpringBootApplication\n\
  public class BatchApplication {\n  public static void main(String[] args) throws\
  \ Exception {\n    SpringApplication.run(BatchApplication.class, args);\n  }\n}\n\
  ```\n\n请注意，这个主类与清单 9-8 中的标准 Spring Boot 主类不同，因为它将 `main` 方法中的命令行参数作为第二个参数传递给了 `SpringApplication.run()`\
