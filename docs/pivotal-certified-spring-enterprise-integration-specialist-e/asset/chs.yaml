  \ `StepScope` 的 bean `ReadCountRestricter` 中。请注意，当第二次 `Job` 启动时，该 bean 中存储的计数器会被重置，并且会从\
  \ `JobParameter` 中获取一个新值，赋给该 bean 的一个新实例。\n\n\n\n一个 `JobScope` 特性的示例展示了 `simpleRecordsStep`\
  \ 和 `boilWaterStep` 之间的状态转换。你可以看到，当我们开始准备茶时，我们知道了上一步写入了多少条记录。同时，这个状态在两次 `Job` 运行之间被重置。\n\
  \n图 9-6 展示了 `combinedJob` 执行期间状态转换的时序图。\n\n![9781484207949_Fig09-06.jpg](img/9781484207949_Fig09-06.jpg)\n\
  \n图 9-6. XML 批处理作用域示例的时序图\n\n为了将此图适配到页面中，我们跳过了无状态步骤和 `SimpleRecordProcessor`，并在它们应该执行的位置添加了注释。\n\
  \n`ReadCountRestricter` 实例仅在 `simpleRecordsStep` 期间使用，用于存储我们已经读取的记录数，并决定是否需要读取另一条记录。因此，它用于在多次\
  \ `statefulRecordReader.read()` 执行之间转换状态。该实例也仅在此步骤执行期间处于活动状态。每次重新执行此步骤都会创建一个新实例。\n\
  \n`WrittenRecordsCounter` 实例用于 `simpleRecordsStep` 和 `boilWaterStep` 步骤之间的状态转换（即已写入的记录数）。该实例在\
  \ `prepareTeaJob` 执行结束后被丢弃。因此，此 `Job` 的新执行将从 Spring 上下文中获取一个新实例。\n\n批处理作用域 Java\
  \ 示例\n\n代码清单 9-66 展示了一个使用 `StepScope` 和 Java 注解配置的 Bean 示例。\n\n***代码清单 9-66***.\
  \ 使用 Java 注解配置的 StepScope Bean (0916-batch-scopes-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import lombok.Getter;\nimport lombok.Setter;\nimport org.springframework.batch.core.configuration.annotation.StepScope;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\n\
  import org.springframework.stereotype.Component;\n\n@Getter\n@StepScope\n@Component\n\
  public class ReadCountRestricter {\n  private long countToProcess;\n\n@Setter\n\
    private long readCount;\n\n@Autowired\n  public ReadCountRestricter(\n      @Value(\"\
  #{jobParameters[recordCountToProcess]}\") long countToProcess) {\n    super();\n\
      this.countToProcess = countToProcess;\n  }\n}\n```\n\n`@StepScope` 注解为此 Bean\
  \ 定义了正确的作用域。因此，我们可以在构造函数注入中对 `JobParameter recordCountToProcess` 进行延迟绑定。代码清单 9-67\
  \ 展示了使用 Java 注解定义的 `JobScope`。\n\n***代码清单 9-67***. 使用 Java 注解配置的 JobScope Bean (0916-batch-scopes-javaconfig)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport lombok.Data;\nimport org.springframework.batch.core.configuration.annotation.JobScope;\n\
  import org.springframework.stereotype.Component;\n\n@Data\n@JobScope\n@Component\n\
  public class ProcessedRecordsCounter {\n  private int processedCount;\n}\n```\n\n\
  在这种情况下，`@JobScope` 注解发挥了作用。代码清单 9-68 展示了 Java 批处理配置。\n\n***代码清单 9-68***. 使用 Java\
  \ 配置的批处理作用域示例的 SB 流程 (0916-batch-scopes-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\nimport net.lkrnac.book.eiws.chapter09.read.StatefulRecordReader;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddWater;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.BoilWaterStateful;\nimport net.lkrnac.book.eiws.chapter09.write.StatefulRecordWriter;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
  @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
  \ boilWaterStep(StepBuilderFactory stepFactory, BoilWaterStateful boilWater) {\n\
      return stepFactory.get(\"boilWaterStep\").tasklet(boilWater).build();\n  }\n\
  \n@Bean\n  public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea)\
  \ {\n    return stepFactory.get(\"addTeaStep\").tasklet(addTea).build();\n  }\n\n\
  @Bean\n  public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)\
  \ {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n  }\n\
  \n@Bean\n  public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n\
        StatefulRecordReader statefulRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n\
        StatefulRecordWriter statefulRecordWriter) {\n    return stepBuilderFactory.get(\"\
  simpleRecordsStep\")\n        .<String, String> chunk(4)\n        .reader(statefulRecordReader)\n\
          .processor(simpleRecordProcessor)\n        .writer(statefulRecordWriter)\n\
          .listener(statefulRecordWriter)\n        .build();\n  }\n\n@Bean\n  public\
  \ Job combinedJob(JobBuilderFactory jobBuilderFactory,\n      @Qualifier(\"simpleRecordsStep\"\
  ) Step simpleRecordsStep,\n      @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n\
        @Qualifier(\"addTeaStep\") Step addTeaStep,\n      @Qualifier(\"addWaterStep\"\
  ) Step addWaterStep) {\n    return jobBuilderFactory.get(\"combinedJob\")\n        .start(simpleRecordsStep)\n\
          .next(boilWaterStep)\n        .next(addTeaStep)\n        .next(addWaterStep)\n\
          .build();\n  }\n}\n```\n\n这是上一个示例（代码清单 9-63）中 SB 流程 XML 配置的精确 Java 配置镜像。此示例的主类也类似；我们排除了注解\
  \ `@EnableBatchProcessing`（因为此注解位于 `BatchConfiguration` 中）和 `@ImportResource`（因为在这种情况下我们没有\
  \ XML 配置文件）。此示例的输出也与上一个示例（代码清单 9-65）相同，并表明批处理作用域在状态转移时按预期工作。\n\n批处理监听器\n\n大多数 Spring\
  \ 抽象为其拦截提供了强大的机制。SB 也不例外，我们可以按如下方式进行拦截：\n\n\n\n*   通过 `JobExecutionListener` 接口或\
  \ `@BeforeJob` 和 `@AfterJob` 注解，在 `Job` 的*之前*和*之后*执行操作\n*   通过 `StepExecutionListener`\
  \ 接口或 `@BeforeStep` 和 `@AfterStep` 注解，在 `Step` 的*之前*和*之后*执行操作\n*   通过 `ChunkListener`\
  \ 接口或 `@BeforeChunk` 和 `@AfterChunk` 注解，在*块之前*、*块之后*以及*块出错后*执行操作\n*   通过 `ItemReadListener<T>`\
  \ 接口或 `@BeforeRead`、`@AfterRead` 和 `@OnReadError` 注解，在*读取前*、*读取后*以及*读取项目出错时*执行操作\n\
  *   通过 `ItemProcessListener<T, S>` 接口或 `@BeforeProcess`、`@AfterProcess` 和 `@OnProcessError`\
  \ 注解，在*处理前*、*处理后*以及*处理项目出错时*执行操作\n*   通过 `ItemWriteListener<S>` 接口或 `@BeforeWrite`、`@AfterWrite`\
  \ 和 `@OnWriteError` 注解，在*写入前*、*写入后*以及*写入项目出错时*执行操作\n*   通过 `SkipListener<T,S>` 或\
  \ `@OnSkipInRead`、`@OnSkipInProcess` 和 `@OnSkipInWrite` 注解，在*读取*、*处理*和*写入*过程中发生*跳过*时执行操作（使用监听器的跳过机制将在本章后面介绍）\n\
  *   通过 Spring 核心接口 `org.springframework.retry.RetryListener`，在*重试模式下出错、打开、关闭*时执行操作（使用监听器的重试机制将在本章后面介绍）\n\
  \n如果我们不需要使用某个特定监听器的所有拦截方法，SB 还提供了以 `Support` 为后缀的便捷空实现监听器。这样，我们只需实现自己感兴趣的拦截方法即可。例如，如果我们只想在块操作之后进行拦截，可以实现\
  \ `ChunkListenerSupport` 并仅重写 `afterChunk()` 方法。\n\n**作业拦截的 XML 配置示例**\n\n清单 9-69\
  \ 展示了作业监听器。\n\n***清单 9-69***. 注解式作业监听器 (0917-job-listener-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.annotation.AfterJob;\nimport org.springframework.batch.core.annotation.BeforeJob;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\n@Component\n\
  public class TeaJobListener {\n  private SimpleExecutablePoint executablePoint;\n\
  \n@Autowired\n  public TeaJobListener(SimpleExecutablePoint executablePoint) {\n\
      super();\n    this.executablePoint = executablePoint;\n  }\n\n@BeforeJob\n  public\
  \ void beforeTeaJob() {\n    executablePoint.execute(\"It’s tea time!\");\n  }\n\
  \n@AfterJob\n  public void afterTeaJob() {\n    executablePoint.execute(\"Enjoy\
  \ your tea!\");\n  }\n}\n```\n\n我们再次使用模拟 Bean `SimpleExecutablePoint` 在 `Job` 之前和之后执行操作。这里，我们使用\
  \ `@BeforeJob` 和 `@AfterJob` 注解来定义拦截方法。请注意，我们可以自由选择拦截方法的名称，因为注解对此没有限制。清单 9-70 展示了\
  \ XML 批处理配置。\n\n***清单 9-70***. 包含作业监听器的 XML 批处理配置（文件位于示例项目 0917-job-listener-xml\
  \ 的 src/main/resource 文件夹中的 batch-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"prepareTeaJob\">\n    <step id=\"boilWaterStep\" next=\"addTeaStep\"\
  >\n      <tasklet ref=\"boilWater\"/>\n    </step>\n    <step id=\"addTeaStep\"\
  \ next=\"addWaterStep\">\n      <tasklet ref=\"addTea\"/>\n    </step>\n    <step\
  \ id=\"addWaterStep\">\n      <tasklet ref=\"addWater\"/>\n    </step>\n    <listeners>\n\
        <listener ref=\"teaJobListener\"/>\n    </listeners>\n  </job>\n</beans:beans>\n\
  ```\n\n此 XML 配置与我们之前示例中看到的 `prepareTeaJob` 类似。这里，我们将 `teaJobListener` Bean 注册为作业的监听器。我们还复用了清单\
  \ 9-7 中的 `BatchConfiguration` 类，该类引入了 `batch-config.xml` 文件，并通过 `@EnableBatchProcessing`\
  \ 注解启用了批处理。此示例的主类与清单 9-8 中常见的 Spring Boot 主类相同。请注意，这些类在批处理监听器示例中经常使用。运行此主类后，我们可以在清单\
