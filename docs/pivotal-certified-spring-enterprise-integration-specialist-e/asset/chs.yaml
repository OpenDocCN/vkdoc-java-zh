  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
  @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
  \ boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater) {\n    return\
  \ stepFactory.get(\"boilWaterStep\").tasklet(boilWater).build();\n  }\n\n@Bean\n\
    public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {\n    return\
  \ stepFactory.get(\"addTeaStep\").tasklet(addTea).build();\n  }\n\n@Bean\n  public\
  \ Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater) {\n    return\
  \ stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n  }\n\n@Bean\n  public\
  \ Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n      @Qualifier(\"boilWaterStep\"\
  ) Step boilWaterStep,\n      @Qualifier(\"addTeaStep\") Step addTeaStep,\n      @Qualifier(\"\
  addWaterStep\") Step addWaterStep) {\n    return jobBuilderFactory.get(\"prepareTeaJob\"\
  )\n        .start(boilWaterStep)\n        .next(addTeaStep)\n        .next(addWaterStep)\n\
          .build();\n  }\n}\n```\n\n每个自定义的 `Tasklet`（`BoilWater`、`AddTea`、`AddWater`）都需要被包装到\
  \ `TaskletStep` 中，以便我们将其用作 `Job` 的一部分。我们通过使用 `StepBuilderFactory` 为每个 `Tasklet`\
  \ 创建一个 `Step` 实例。`get()` 方法基于给定的 `Step` 名称创建一个 `StepBuilder` 实例，`tasklet()` 方法基于给定的\
  \ `Tasklet` 创建一个 `TaskletStepBuilder` 实例，最后，`build()` 调用创建 `Step` 实例。我们将此实例注册为一个\
  \ Spring Bean。\n\n当我们在 `prepareTeaJob()` 方法中创建 `Job` 时，我们需要通过 Bean 名称而非类型来自动装配每个\
  \ `Step`，因为在 Spring 上下文中我们有三个类型为 `Step` 的 Bean。当我们使用 Java 定义 SB 配置时，这会产生一些令人烦恼的样板代码。在注入所有步骤和\
  \ `JobBuilderFactory` 之后，我们创建 `Job` 实例，并将其也注册为一个 Spring Bean。\n\n此示例的主类是标准的 Spring\
  \ Boot 主类。当我们运行它时，会看到与之前示例（清单 9-20）类似的输出。\n\nJobLauncher\n\n`JobLauncher` 是用于执行在\
  \ Spring 上下文中注册的 SB 作业的接口。Spring 开箱即用地提供了此接口的一个实现 `SimpleJobLauncher`。\n\n到目前为止，我们还没有需要使用它，因为每个\
  \ `Job` 在 Spring Boot 初始化 Spring 上下文后立即执行。我们也不需要创建 `JobLauncher` 实例，因为 `@EnableBatchProcessing`\
  \ 注解已经为我们创建了它。但是，在应用程序启动时自动执行并不总是合适的，我们可能需要显式地执行某个特定的作业。\n\n清单 9-22 展示了 `JobLauncher`\
  \ 接口的签名。\n\n***清单 9-22***. JobLauncher 接口\n\n```\npackage org.springframework.batch.core.launch;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobExecution;\n\
  import org.springframework.batch.core.JobParameters;\nimport org.springframework.batch.core.JobParametersInvalidException;\n\
  import org.springframework.batch.core.repository.JobExecutionAlreadyRunningException;\n\
  import org.springframework.batch.core.repository.JobInstanceAlreadyCompleteException;\n\
  import org.springframework.batch.core.repository.JobRestartException;\n\npublic\
  \ interface JobLauncher {\n  public JobExecution run(Job job, JobParameters jobParameters)\n\
       throws JobExecutionAlreadyRunningException, JobRestartException,\n            \
  \ JobInstanceAlreadyCompleteException, JobParametersInvalidException;\n}\n```\n\n\
  `JobLauncher` 只声明了一个方法 `run()`，它返回一个 `JobExecution` 实例。当客户端执行此方法时，默认情况下执行是同步的；调用者会被阻塞，直到作业完成。在这种情况下，作业的结果状态由\
  \ `JobExecution.getExitStatus()` 指示。当我们使用同步执行时，退出状态通常是 `ExitStatus.COMPLETED` 或\
  \ `ExitStatus.FAILED`。\n\n但在某些情况下，我们不想阻塞调用者。对于这些情况，`SimpleJobLauncher` 的实现可以使用 `TaskExecutor`\
  \ 进行配置。通过这种配置，`SimpleJobLauncher.run()` 调用不会阻塞，并且在 `Job` 完成之前，现有状态可以配置为 `ExitStatus.UNKNOWN`、`ExitStatus.STARTING`\
  \ 或 `ExitStatus.STARTED`。\n\n使用 XML 配置的 JobLauncher 示例\n\n在这种情况下，我们不使用 Spring Boot。清单\
  \ 9-23 展示了 XML 配置。\n\n***清单 9-23***. JobLauncher 示例的 XML 配置（文件 batch-beans-config.xml\
  \ 位于示例项目 0906-job-launcher-xml 的文件夹 src/main/resources 中）\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
      http://www.springframework.org/schema/context/spring-context.xsd\">\n\n<context:component-scan\
  \ base-package=\"net.lkrnac.book.eiws.chapter09\" />\n\n<bean id=\"transactionManager\"\
  \n    class=\"org.springframework.batch.support.transaction.ResourcelessTransactionManager\"\
  \ />\n\n<bean id=\"jobRepository\"\n    class=\"org.springframework.batch.core.repository.support.MapJobRepositoryFactoryBean\"\
  >\n    <property name=\"transactionManager\" ref=\"transactionManager\" />\n  </bean>\n\
  \n<bean id=\"jobLauncher\"\n    class=\"org.springframework.batch.core.launch.support.SimpleJobLauncher\"\
  >\n    <property name=\"jobRepository\" ref=\"jobRepository\" />\n  </bean>\n</beans>\n\
  ```\n\n\n\n我们在 `net.lkrnac.book.eiws.chapter09` 包中配置了 Spring 组件扫描，这将把通用的 `Tasklet`\
  \ “泡茶”步骤配置到我们的上下文中。接下来，我们需要配置两个必需的 Bean。对于 `transactionManager`，我们使用 `ResourcelessTransactionManager`。这个事务管理器实现不会启动事务；它仅用于测试目的。在我们的案例中，我们不使用任何事务，但需要为\
  \ `JobRepository` Bean 配置一个事务管理器。\n\n`JobRepository` 是 SB 配置中第二个必需的 Bean。我们将在本章后面深入探讨其功能。这里仅简要提及，它用于存储\
  \ SB 处理元数据。在此案例中，我们没有使用真实的数据存储，而是将元数据存储到内存映射中。`JobRepository` 的这个实现由 `MapJobRepositoryFactoryBean`\
  \ 提供。接下来，我们配置 `JobLauncher` Bean。`SimpleJobLauncher` 实现需要配置必需的参数 `jobRepository`。\n\
  \n此示例使用了与 代码清单 9-19 中 `TaskletStep` XML 示例相同的 SB 流程。此示例的主类如 代码清单 9-24 所示。\n\n***代码清单\
  \ 9-24***. JobLauncher XML 示例的主类 (0906-job-launcher-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.JobExecution;\nimport org.springframework.batch.core.JobParameters;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.context.support.GenericApplicationContext;\n\
  import org.springframework.context.support.GenericXmlApplicationContext;\nimport\
  \ org.springframework.core.io.ClassPathResource;\n\n@Slf4j\npublic class BatchApplication\
  \ {\n  public static void main(String[] args) throws Exception {\n    ClassPathResource\
  \ batchConfig = new ClassPathResource(\"batch-config.xml\");\n    ClassPathResource\
  \ batchBeansConfig = new ClassPathResource(\"batch-beans-config.xml\");\n    GenericApplicationContext\
  \ context = new GenericXmlApplicationContext(\n        batchConfig, batchBeansConfig);\n\
  \nJobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n\
      Job job = (Job) context.getBean(\"prepareTeaJob\");\n    JobExecution execution\
  \ = jobLauncher.run(job, new JobParameters());\n    log.info(\"Exit Status : {}\"\
  , execution.getStatus());\n    context.close();\n  }\n}\n```\n\n`@Slf4j` 是 Lombok\
  \ 提供的便捷注解，用于定义 Log4j 日志记录器实例。请注意，此主类在此案例中并非 Spring 配置。这是因为我们基于前面代码清单中已提及的两个 XML\
  \ 配置创建了 Spring 上下文。\n\n当 Spring 上下文实例创建后，可以通过 `getBean()` 方法获取 `JobLauncher` 和 `Job`\
  \ 实例。接下来的调用是执行 `Job` 本身。`JobLauncher.run()` 还需要一个 `JobParameters` 类型的参数。在此案例中，我们创建了一个空实例，这意味着我们的\
  \ `Job` 不接受任何参数。我们将在本章后面展示此特性的用法。\n\n主方法中的最后语句打印出退出状态并关闭 Spring 上下文。代码清单 9-25 显示了运行此主类时的输出。\n\
  \n***代码清单 9-25***. JobLauncher XML 示例的输出\n\n```\n16:15:58.829 [main] INFO  o.s.b.c.l.support.SimpleJobLauncher\
