  import org.springframework.test.web.servlet.MvcResult;\nimport org.springframework.test.web.servlet.setup.MockMvcBuilders;\n\
  import org.testng.annotations.Test;\n\npublic class UserControllerTest {\n  private\
  \ static final String DUMMY_ERROR_TEXT = \"dummyErrorText\";\n  private static final\
  \ int TESTING_ID = 0;\n  private static final String FULL_USER_URL = \"http://localhost:10403/users\"\
  ;\n\nprivate static User createTestUser(int identifier) {\n    User user = new User();\n\
      user.setEmail(\"user\" + identifier + \"@gmail.com\");\n    user.setName(\"\
  User\" + identifier);\n    return user;\n  }\n\nprivate static String createTestRecord(int\
