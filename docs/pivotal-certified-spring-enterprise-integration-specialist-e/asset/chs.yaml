  \ main]\nn.l.book.eiws.chapter08.SiApplication    : message2 sent\n```\n\n整个通信过程在单个\
  \ `main` 线程中顺序执行。每条消息被持久化了两次，因为每条消息配置了两个消费者（两个连接到 `inChannel` 的出站通道适配器）。\n\nNullChannel\n\
  \n`NullChannel` 是一种特殊类型的通道，用于丢弃消息。SI 默认创建此通道，因此我们可以通过指定 `nullChannel` 作为通道名称来使用它。\n\
  \n通道拦截器\n\n顾名思义，*通道拦截器*用于拦截通道。我们可以实现 `org.springframework.messaging.support.ChannelInterceptor`\
  \ 接口，将其注册为 Spring Bean，并在以下拦截点使用此自定义逻辑：`preSend`、`postSend`、`afterSendCompletion`、`preReceive`、`postReceive`、`afterReceiveCompletion`。\n\
  \n如果被拦截的通道是 `AbstractSubscribableChannel`，则只有 `preSend`、`postSend` 和 `afterSendCompletion`\
  \ 拦截点相关，因为消费者由通道触发，并不执行 `receive` 操作。如果被拦截的通道是 `AbstractPollableChannel`，则所有拦截点都相关，因为它同时具备\
  \ `send` 和 `receive` 操作。\n\n`afterSendCompletion` 和 `afterReceiveCompletion` 拦截点仅在相关操作（发送/接收）成功后执行。\n\
  \n通道拦截器可以按如下方式配置：\n\n*   *全局拦截器*：顶层 XML 元素 `<int:channel-interceptor>`，我们可以在其中为要拦截的通道名称指定\
  \ `pattern` 属性。实现 `org.springframework.messaging.support.ChannelInterceptor` 接口的\
  \ Bean 可以通过 `ref` 属性或 `<bean>` 子元素进行配置。\n*   *局部拦截器*：通道 XML 子元素 `<int:interceptors>`，我们可以在其中为特定通道指定拦截器列表。实现\
  \ `ChannelInterceptor` 接口的 Bean 可以通过 `<int:interceptors>` 标签的 `<ref>` 子元素进行配置。\n\
  \n通道拦截器示例\n\n清单 8-119 展示了 `ChannelInterceptor` 的一个简单实现。\n\n***清单 8-119***。拦截器实现示例（0834-channel-interceptor-xml）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.messaging.Message;\nimport org.springframework.messaging.MessageChannel;\n\
  import org.springframework.messaging.support.ChannelInterceptor;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class SimpleInterceptor implements ChannelInterceptor\
  \ {\n  @Override\n  public Message<?> preSend(Message<?> message, MessageChannel\
  \ channel) {\n    log.info(\"Going to send message {} to channel {}\", message.getPayload(),\n\
          channel);\n    return message;\n  }\n\n@Override\n  public void postSend(Message<?>\
  \ message, MessageChannel channel, boolean sent) {\n    log.info(\"Sending of message\
  \ {} to channel {} finished\",\n        message.getPayload(), channel);\n  }\n\n\
  @Override\n  public void afterSendCompletion(Message<?> message, MessageChannel\
  \ channel,\n      boolean sent, Exception ex) {\n    log.info(\"Message {} was successfully\
  \ send to channel {}\",\n        message.getPayload(), channel);\n  }\n\n@Override\n\
    public boolean preReceive(MessageChannel channel) {\n    log.info(\"Going to receive\
  \ message from channel {}\", channel);\n    return true;\n  }\n\n@Override\n  public\
  \ Message<?> postReceive(Message<?> message, MessageChannel channel) {\n    log.info(\"\
  Receiving of message {} from channel {} finished\",\n        message.getPayload(),\
  \ channel);\n    return message;\n  }\n\n@Override\n  public void afterReceiveCompletion(Message<?>\
  \ message,\n      MessageChannel channel, Exception ex) {\n    log.info(\"Message\
  \ {} was successfully received from channel {}\",\n        message.getPayload(),\
  \ channel);\n  }\n}\n```\n\n在每个需要作为 `ChannelInterceptor` 接口契约实现的拦截点上，我们记录命中该点的日志信息。请注意，`preSend`\
  \ 和 `postReceive` 拦截点可以选择将消息实例作为返回值返回，从而在需要时替换消息。此外，`preReceive` 方法返回一个布尔值，如果返回\
  \ `false`，则可以停止接收操作。清单 8-120 展示了 SI 配置。\n\n***清单 8-120***。通道拦截器示例的 SI 配置（示例项目 0834-channel-interceptor-xml\
  \ 的 src/main/resources 文件夹中的 si-config.xml 文件）\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance\n\
    xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/integration\n\
      http://www.springframework.org/schema/integration/spring-integration.xsd\">\n\
  \n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\"\
  \ />\n\n<int:channel-interceptor pattern=\"in*\" ref=\"simpleInterceptor\"/>\n\n\
  <int:channel id=\"inChannel\">\n    <int:queue capacity=\"10\"/>\n  </int:channel>\n\
  \n<int:outbound-channel-adapter channel=\"inChannel\" ref=\"writeService\" method=\"\
  write\">\n    <int:poller fixed-rate=\"100\" max-messages-per-poll=\"1\"/>\n  </int:outbound-channel-adapter>\n\
  </beans>\n```\n\n输入和输出组件的配置在我们的示例中很常见。我们使用 `QueueChannel` 实现，出站通道适配器轮询 `inChannel`。通道拦截器的配置很有趣；`SimpleInterceptor`\
  \ Bean 被配置为所有名称以 `in` 前缀开头的通道的拦截器。\n\n主类再次复用了 `0830-channel-priority-xml`（清单 8-111）中的主类。运行后，我们得到清单\
  \ 8-121 所示的输出。\n\n\n\n***清单 8-121***. 通道拦截器示例的输出\n\n```\n2015-08-30 20:05:00.379  INFO\
