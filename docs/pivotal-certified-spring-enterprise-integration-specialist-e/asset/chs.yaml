  \ `1`、`2`、`3`、`9`、`10` 和 `11`。\n\n批处理作用域\n\n每位 Spring 开发者都应熟悉 Bean 作用域的概念。每个 Spring\
  \ Bean 默认具有单例（singleton）作用域，这意味着在 Spring 上下文中该 Bean 只有一个实例。每当我们将此 Bean 注入代码时，Spring\
  \ 都会提供同一个对象。\n\n另一个有用的作用域是请求（request）作用域，该作用域下的 Bean 使用 `@Scope(WebApplicationContext.SCOPE_REQUEST)`\
  \ 注解。在这种情况下，当我们的应用程序处理 Web 请求时，会创建一个新的实例，并且 Spring 会为每个请求创建一个该 Bean 的新实例。因此，当我们注入该\
  \ Bean 时，每个请求都会获得不同的实例。这种机制有助于在请求线程的边界内共享代码中的状态。例如，我们可以在控制器中将某些信息存储到该 Bean 的局部变量中，然后在仓库中检索这些信息。\n\
  \nSB 为 `Job` 和 `Step` 提供了类似的机制。我们可以创建具有 `StepScope` 或 `JobScope` 的 Bean，SB 会确保每个新的\
  \ `StepExecution` 都会获得一个具有 `StepScope` 的 Bean 的新实例。类似地，对于不同的 `JobExecution`，SB 会注入具有\
  \ `JobScope` 的 Bean 的新实例。\n\n要定义 `StepScope`，我们可以使用 `@StepScope` 注解 Bean，或者通过标准的\
  \ Spring 注解 `@Scope(value = \"step\", proxyMode = ScopedProxyMode.TARGET_CLASS)`。`@JobScope`\
  \ 注解用于定义 `JobScope`。它也是 `@Scope(value = \"job\", proxyMode = ScopedProxyMode.TARGET_CLASS)`\
  \ 的便捷简写。使用 XML 配置时，我们可以通过 XML 标签 `<bean>` 的 `scope` 属性来定义 `job` 或 `scope` 值。\n\n\
  这些作用域对于从 SB 上下文中进行引用的后期绑定也很有用。这可以通过使用占位符 `#{...}` 来实现。\n\n批处理作用域 XML 示例\n\n在此示例中，我们准备茶并处理记录。清单\
  \ 9-57 展示了将与 `StepScope` 一起使用的类。\n\n***清单 9-57***. 用于 StepScope Bean 的类 (0915-batch-scopes-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport lombok.Getter;\nimport lombok.Setter;\n\
  \n@Getter\npublic class ReadCountRestricter {\n  private long countToProcess;\n\n\
  @Setter\n  private long readCount;\n\npublic ReadCountRestricter(long countToProcess)\
  \ {\n    super();\n    this.countToProcess = countToProcess;\n  }\n}\n```\n\n此类将作为具有\
  \ `StepScope` 的 Bean 使用。此配置将应用于我们稍后在本示例中展示的 XML 上下文中。Lombok 的注解 `@Getter` 指定该类的所有字段均可通过\
  \ getter 方法访问，而 `@Setter` 注解指定只有 `readCount` 字段会拥有 setter 方法。此类的目的是配置可以读取多少条记录，为此我们使用了\
  \ `countToProcess` 变量。第二个变量 `readCount` 用于跟踪实际读取了多少条记录。清单 9-58 展示了 `StatefulRecordReader`。\n\
  \n***清单 9-58***. 使用具有 StepScope 的 Bean 实现的 ItemReader (0915-batch-scopes-xml)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter09.read;\nimport net.lkrnac.book.eiws.chapter09.ReadCountRestricter;\n\
  import org.springframework.batch.item.ItemReader;\nimport org.springframework.batch.item.NonTransientResourceException;\n\
  import org.springframework.batch.item.ParseException;\nimport org.springframework.batch.item.UnexpectedInputException;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class StatefulRecordReader implements ItemReader<String> {\n\
    private ReadRepository readRepository;\n  private ReadCountRestricter readCountRestricter;\n\
  \n@Autowired\n  public StatefulRecordReader(ReadRepository readRepository,\n      ReadCountRestricter\
  \ readCountRestricter) {\n    super();\n    this.readRepository = readRepository;\n\
      this.readCountRestricter = readCountRestricter;\n  }\n\n@Override\n  public\
  \ String read() throws Exception, UnexpectedInputException,\n      ParseException,\
  \ NonTransientResourceException {\n    long previousReadCount = readCountRestricter.getReadCount();\n\
      if (readCountRestricter.getCountToProcess() <= previousReadCount) {\n      return\
  \ null;\n    }\n    String nextRecord = readRepository.readNext();\n    if (nextRecord\
  \ != null) {\n      readCountRestricter.setReadCount(previousReadCount + 1);\n    }\n\
      return nextRecord;\n  }\n}\n```\n\n这个 Spring 组件自动装配了通用 Bean `ReadRepository`，以及上一个清单中展示的步骤作用域\
  \ Bean `ReadCountRestricter`。在 `read()` 方法中，我们从 `ReadCountRestricter` Bean 中获取 `readCount`，如果达到所需的读取计数（`readCountRestricter.getCountToProcess()`），则停止进一步读取。当然，如果未达到此限制，我们会继续读取新记录并递增读取计数器。请注意，如果我们运行此步骤两次，并将此\
  \ Bean 配置为 `StepScope`，SB 将注入一个新的 `ReadCountRestricter` 实例。这样，每次作业都会有效地重置计数器。\n\n\
  接下来，我们还在本示例中包含了 `JobScope` Bean，它也将在 XML 中进行配置。但首先，清单 9-59 展示了我们将在处理记录时用于存储状态的类。\n\
  \n***清单 9-59***. 用于 JobScope Bean 的类 (0915-batch-scopes-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import lombok.Data;\n\n@Data\npublic class WrittenRecordsCounter {\n  private int\
  \ processedCount;\n}\n```\n\n\n\n该类用于存储已执行作业的计数。Lombok 的 `@Data` 注解会自动为我们生成 getter\
  \ 和 setter 方法。该类将用于具有 `JobScope` 的 Bean。清单 9-60 通过使用 `WrittenRecordsCounter` Bean\
  \ 介绍了 `ItemWriter`。\n\n***清单 9-60***. 使用具有 JobScope 的 Bean 实现 ItemWriter (0915-batch-scopes-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.write;\nimport java.util.List;\nimport\
  \ net.lkrnac.book.eiws.chapter09.WrittenRecordsCounter;\nimport org.springframework.batch.item.ItemWriter;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class StatefulRecordWriter implements ItemWriter<String> {\n\
    private WriteRepository writeRepository;\n  private WrittenRecordsCounter recordsCounter;\n\
  \n@Autowired\n  public StatefulRecordWriter(WriteRepository writeRepository,\n      WrittenRecordsCounter\
  \ recordsCounter) {\n    super();\n    this.writeRepository = writeRepository;\n\
      this.recordsCounter = recordsCounter;\n  }\n\n@Override\n  @SuppressWarnings(\"\
  unchecked\")\n  public void write(List<? extends String> items) throws Exception\
  \ {\n    writeRepository.writeRecords((List<String>) items);\n    int previousRecordsCount\
  \ = recordsCounter.getProcessedCount();\n    recordsCounter.setProcessedCount(previousRecordsCount\
  \ + items.size());\n  }\n}\n```\n\n这个 `ItemWriter` 与我们通用的 `WriteRepository` 和 `WrittenRecordsCounter`\
  \ 一起被自动注入。它用于跟踪已写入的记录数。如果我们在 XML 配置中将 `WrittenRecordsCounter` 设置为具有 `JobScope` 的\
  \ Bean，那么 SB 将为每个作业创建一个新实例，从而有效地重置计数器。清单 9-61 展示了使用 `WrittenRecordsCounter` Bean\
  \ 的 `Tasklet`。\n\n***清单 9-61***. 使用具有 JobScope 的 Bean 的 Tasklet (0915-batch-scopes-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.step.tea;\nimport net.lkrnac.book.eiws.chapter09.WrittenRecordsCounter;\n\
  import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.batch.core.StepContribution;\n\
  import org.springframework.batch.core.scope.context.ChunkContext;\nimport org.springframework.batch.core.step.tasklet.Tasklet;\n\
  import org.springframework.batch.repeat.RepeatStatus;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class BoilWaterStateful\
  \ implements Tasklet {\n  private SimpleExecutablePoint simpleExecutableStep;\n\
    private WrittenRecordsCounter recordsCounter;\n\n@Autowired\n  public BoilWaterStateful(SimpleExecutablePoint\
  \ simpleExecutableStep,\n      WrittenRecordsCounter recordsCounter) {\n    super();\n\
      this.simpleExecutableStep = simpleExecutableStep;\n    this.recordsCounter = recordsCounter;\n\
    }\n\n@Override\n  public RepeatStatus execute(StepContribution contribution,\n\
        ChunkContext chunkContext) throws Exception {\n    simpleExecutableStep.execute(\"\
  After we processed \"\n        + recordsCounter.getProcessedCount() + \" records,\
  \ let’s have a tea\");\n    simpleExecutableStep.execute(\"Boil Water\");\n    return\
  \ RepeatStatus.FINISHED;\n  }\n}\n```\n\n这个 `Tasklet` 与我们用于泡茶的通用 `BoilWater` 类似。在此例中，我们也注入了\
  \ `WrittenRecordsCounter` Bean，以便能够输出特定消息，并突出显示 `JobScope` Bean 如何在同一个 `Job` 的两个\
  \ `Step` 之间传递状态。清单 9-62 展示了 SB Bean 的 XML 配置。\n\n***清单 9-62***. 用于批处理作用域的 SB Bean\
  \ 的 XML 配置（文件 batch-beans-config.xml，位于示例项目 0915-batch-scopes-xml 的 src/main/resource\
  \ 文件夹中）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<bean id=\"readCountRestricter\" scope=\"step\"\n    class=\"net.lkrnac.book.eiws.chapter09.ReadCountRestricter\"\
  >\n    <constructor-arg name=\"countToProcess\" value=\"#{jobParameters[recordCountToProcess]}\"\
  />\n  </bean>\n\n<bean id=\"writtenRecordsCounter\" scope=\"job\"\n    class=\"\
  net.lkrnac.book.eiws.chapter09.WrittenRecordsCounter\"/>\n\n<bean class=\"org.springframework.batch.core.scope.StepScope\"\
  >\n    <property name=\"proxyTargetClass\" value=\"true\"/>\n  </bean>\n\n<bean\
  \ class=\"org.springframework.batch.core.scope.JobScope\">\n    <property name=\"\
  proxyTargetClass\" value=\"true\"/>\n  </bean>\n</beans>\n```\n\n`ReadCountRestricter`\
  \ Bean 配置了 `step` 作用域。其参数通过作业参数 `recordCountToProcess` 的后期绑定进行初始化。例如，这种后期绑定在单例作用域下是行不通的，因为在这种情况下，Spring\
  \ 很可能在 Spring 上下文初始化期间就创建了这个 Bean，而此时 `JobParameters` 尚未配置。\n\n`WrittenRecordsCounter`\
  \ 使用了 `job` 作用域。当我们使用 XML 配置时，需要通过将批处理作用域配置为启用了 `proxyTargetClass` 的 Bean 来启用它们。如果我们没有配置这些\
  \ Bean，Spring 将完全不知道 SB 作用域的存在。\n\n清单 9-63 展示了 SB 流程的 XML 配置。\n\n***清单 9-63***.\
  \ 批处理作用域示例的 XML 配置（文件 batch-beans-config.xml，位于示例项目 0915-batch-scopes-xml 的 src/main/resource\
  \ 文件夹中）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans:beans xmlns:beans=\"\
  http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns=\"http://www.springframework.org/schema/batch\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n  http://www.springframework.org/schema/batch/spring-batch.xsd\n\
    http://www.springframework.org/schema/beans\n  http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"combinedJob\">\n    <step id=\"simpleRecordsStep\" next=\"boilWaterStep\"\
  >\n      <tasklet>\n        <chunk reader=\"statefulRecordReader\" writer=\"statefulRecordWriter\"\
  \n          processor=\"simpleRecordProcessor\" commit-interval=\"4\" />\n      </tasklet>\n\
      </step>\n\n<step id=\"boilWaterStep\" next=\"addTeaStep\">\n      <tasklet ref=\"\
  boilWaterStateful\" />\n    </step>\n    <step id=\"addTeaStep\" next=\"addWaterStep\"\
  >\n      <tasklet ref=\"addTea\" />\n    </step>\n    <step id=\"addWaterStep\"\
  >\n      <tasklet ref=\"addWater\" />\n    </step>\n  </job>\n</beans:beans>\n```\n\
  \n这个作业将被命名为 `combinedJob`，因为我们把记录处理和泡茶步骤合并到了一个 `Job` 中。清单 9-64 介绍了此示例的主类。\n\n***清单\
  \ 9-64***. XML 批处理作用域示例的主类 (0915-batch-scopes-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobParameters;\n\
  import org.springframework.batch.core.JobParametersBuilder;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ConfigurableApplicationContext;\n\
  import org.springframework.context.annotation.ImportResource;\n\n\n\n@SpringBootApplication\n\
  @EnableBatchProcessing\n@ImportResource({ \"classpath:batch-config.xml\", \"classpath:batch-beans-config.xml\"\
  \ })\npublic class BatchApplication {\n  public static void main(String[] args)\
  \ throws Exception {\n    ConfigurableApplicationContext context =\n        SpringApplication.run(BatchApplication.class,\
  \ args);\n\nJobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n\
      Job job = (Job) context.getBean(\"combinedJob\");\n\njobLauncher.run(job, createJobParameters(3));\n\
      jobLauncher.run(job, createJobParameters(2));\n    context.close();\n  }\n\n\
  public static JobParameters createJobParameters(long recordCountToProcess) {\n    return\
  \ new JobParametersBuilder()\n        .addLong(\"recordCountToProcess\", recordCountToProcess)\n\
          .toJobParameters();\n  }\n}\n\n这个主类使用了我们列出的 XML 配置，并执行了两次 `combinedJob`，以突出计数器的重置以及\
