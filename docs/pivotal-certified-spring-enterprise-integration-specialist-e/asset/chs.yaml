  : Message with ID 39b06e8f-84f6-0f0b-71b9-d9a88867633e received\n2015-06-19 20:10:15.161  INFO\
  \ 10408 --- [enerContainer-1] n.l.b.e.c.u.UserWithRoleService          \n: User\
  \ object Received: User(email=lubos.krnac@gmail.com, name=Lubos Krnac) with role\
  \ admin\n```\n\n使用发布/订阅 JMS 模型\n\n在本章开头，我们提到了一种向多个订阅者发送消息的通信范式。到目前为止，示例中尚未涵盖这一重要的\
  \ JMS 抽象概念。接下来的示例将弥补这一点。\n\n首先介绍的是用于委托接收消息的服务类，如清单 5-49 所示。\n\n***清单 5-49***. PubSubService\
  \ (0515-publish-subscribe-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter05.pubsub;\n\
  \nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Service;\n\
  \n@Slf4j\n@Service\npublic class PubSubService {\n  public void handleMessage(int\
  \ listenerId, String message) {\n    log.info(\"Message Received: {} via listener\
  \ {}\", message, listenerId);\n  }\n}\n```\n\n该服务会记录接收到的消息以及接收该消息的监听器 ID。清单 5-50\
  \ 展示了本例中使用的监听器。\n\n***清单 5-50***. 发布/订阅的监听器 (0515-publish-subscribe-java-config)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.pubsub;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleMessageListener1 {\n  private PubSubService pubSubService;\n\
  \n@Autowired\n  public SimpleMessageListener1(PubSubService pubSubService) {\n    super();\n\
      this.pubSubService = pubSubService;\n  }\n\n@JmsListener(destination = \"simpleTopic\"\
  )\n  public void readMessage(String message) {\n    pubSubService.processText(1,\
  \ message);\n  }\n}\n```\n\n`SimpleMessageListener1` 看起来与我们之前见过的监听器类似。但请注意，这里使用的\
  \ JMS 目的地名称为 `simpleTopic`。在下一节中，你将看到如何配置这种类型为 `javax.jms.Topic` 的 JMS 目的地。\n\n\
  与本章其他监听器最明显的区别在于类名中的数字。这是有意为之的；为了演示两个监听器接收同一条消息，本例项目中包含了两个监听器。为保持示例简洁并缩短清单长度，第二个监听器命名为\
  \ `SimpleMessageListener2`，它是 `SimpleMessageListener1` 的精确副本，仅将 `1` 改为 `2`。\n\n\n\
  \n使用 Spring 配置 JMS 发布/订阅模式\n\n到目前为止，我们一直使用 JMS 目的地 `queue/ExpiryQueue`，因为该队列是 HornetQ\
  \ 服务器默认配置的。但对于发布/订阅的 JMS 通信模型，我们需要使用 JMS 主题（topic）而非队列。因此，我们需要修改 HornetQ 的默认配置以提供此功能。\n\
  \n在本章开头，我们解释了如何使用 `bin/run.sh` 或 `bin/run.bat` 命令运行 HornetQ 服务器。对于同一个 HornetQ 服务器，我们需要在配置文件\
  \ `config/stand-alone/non-clustered/hornet-jms.xml` 的末尾追加主题配置，如清单 5-51 所示。\n\n***清单\
  \ 5-51***. HornetQ 主题配置\n\n```\n   <!-- ... -->\n\n<queue name=\"ExpiryQueue\">\n\
        <entry name=\"/queue/ExpiryQueue\"/>\n   </queue>\n\n<topic name=\"simpleTopic\"\
  >\n      <entry name=\"/topic/simpleTopic\"/>\n   </topic>\n</configuration>\n```\n\
  \n如前所述，`ExpiryQueue` 是 HornetQ 安装时默认配置的。到目前为止，每个 JMS 示例都使用了这个队列。为了配置我们的 `simpleTopic`，我们在该配置文件的末尾追加了\
  \ `<topic>` XML 元素。\n\n主要的 Spring 类名为 `JmsApplication`。它使用了与之前示例中展示的主类相同的结构，因此我们不再列出。此外，消息发送者与本章节中的其他发送者类相似，只是将\
  \ `queue/ExpiryQueue` 替换为了 `simpleTopic`。\n\n清单 5-52 展示了发送者和监听器在发布/订阅模型下的 Java JMS\
  \ 配置。\n\n***清单 5-52***. 发布/订阅模型的 Java 配置 (0515-publish-subscribe-java-config)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter05.pubsub;\n\nimport java.util.Hashtable;\n\
  import javax.jms.ConnectionFactory;\nimport javax.naming.InitialContext;\nimport\
  \ javax.naming.NamingException;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.jms.config.DefaultJmsListenerContainerFactory;\nimport\
  \ org.springframework.jms.core.JmsTemplate;\n\n@Configuration\n@EnableJms\npublic\
  \ class JmsConfiguration {\n  @Bean\n  public InitialContext initialContext() throws\
  \ NamingException {\n    Hashtable<Object, Object> env = new Hashtable<Object, Object>();\n\
      env.put(\"java.naming.factory.initial\",\n        \"org.jnp.interfaces.NamingContextFactory\"\
  );\n    env.put(\"java.naming.factory.url.pkgs\",\n        \"org.jboss.naming:org.jnp.interfaces\"\
  );\n    env.put(\"java.naming.provider.url\", \"jnp://localhost:1099\");\n    return\
  \ new InitialContext(env);\n  }\n\n@Bean\n  public ConnectionFactory connectionFactory(InitialContext\
  \ initialContext)\n      throws NamingException {\n    return (ConnectionFactory)\
  \ initialContext.lookup(\"/ConnectionFactory\");\n  }\n\n@Bean\n  public JmsTemplate\
  \ jmsTemplate(ConnectionFactory connectionFactory) {\n    JmsTemplate jmsTemplate\
  \ = new JmsTemplate(connectionFactory);\n    jmsTemplate.setPubSubDomain(true);\n\
      return jmsTemplate;\n  }\n\n@Bean\n  public DefaultJmsListenerContainerFactory\
  \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n    DefaultJmsListenerContainerFactory\
  \ factory =\n        new DefaultJmsListenerContainerFactory();\n    factory.setConnectionFactory(connectionFactory);\n\
      factory.setPubSubDomain(true);\n    return factory;\n  }\n}\n```\n\n使用 `connectionFactory`\
  \ bean 的 HornetQ JNDI 配置与点对点示例相同。发布/订阅模型需要通过两个 bean 上的 `pubSubDomain` 标志为 `JmsTemplate`\
  \ 和 `DefaultJmsListenerContainerFactory` 开启。当我们运行 `JmsApplication` 类时，将看到类似于清单 5-53\
  \ 的输出。\n\n***清单 5-53***. 发布/订阅示例的输出\n\n```\n2015-05-30 20:52:19.860  INFO 23740\
  \ --- [pool-1-thread-1] n.l.b.e.c.pubsub.SimpleMessageSender     : Sending message:\
  \ simple message\n2015-05-30 20:52:19.869  INFO 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService  \
  \ : Message Received: simple message via listener 2\n2015-05-30 20:52:19.869  INFO\
  \ 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService   : Message\
  \ Received: simple message via listener 1\n2015-05-30 20:52:20.860  INFO 23740 ---\
  \ [pool-1-thread-1] n.l.b.e.c.pubsub.SimpleMessageSender     : Sending message:\
  \ simple message\n2015-05-30 20:52:20.871  INFO 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService  \
  \ : Message Received: simple message via listener 2\n2015-05-30 20:52:20.872  INFO\
  \ 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService   : Message\
  \ Received: simple message via listener 1\n```\n\nSpring Boot JMS 发布/订阅示例\n\n还有一种新方法可以配置与我们应用程序一起托管的嵌入式\
  \ HornetQ 或 ActiveMQ JMS 代理。这种配置可以帮助我们将 Spring 配置样板代码减少到最低限度，并专注于业务逻辑。\n\n到目前为止，我们一直使用\
  \ HornetQ 作为我们的 JMS 提供者。但最新稳定版的 Spring Boot 在发布/订阅模式下无法与嵌入式 HornetQ 配合使用。因此，在本示例中，我们切换到嵌入式\
  \ ActiveMQ JMS 代理。ActiveMQ 默认会在 JMS 目的地被配置之前创建它。因此，不需要针对 ActiveMQ 的特殊配置。\n\n唯一关键的配置在清单\
  \ 5-54 中。\n\n***清单 5-54***. Spring Boot 发布/订阅配置 (示例项目 0515-publish-subscribe-spring-boot\
  \ 中 src/main/resources 文件夹下的 application.properties 文件)\n\n```\nspring.jms.pub-sub-domain=true\n\
  ```\n\n此配置为本示例中使用的 JMS 提供者启用了发布/订阅模式。值得一提的是，Spring Boot 外部化了大量用于配置底层技术的属性。通过这种方式，我们可以修改\
  \ Spring Boot 的默认行为以适应我们的需求。在这个例子中，我们将 JMS 通信从点对点模式切换到了发布/订阅模式。\n\n所有其他类与之前的纯 Spring\
  \ Java 配置示例相同，但在本例中，我们不需要指定任何 JMS 配置 bean，因为 Spring 会自动为我们配置它们。\n\n将 JMS 与更高级的消息抽象集成\n\
  \nSpring 框架在 4.0 版本中引入了统一的消息抽象，可用于各种协议，如 STOMP、WebSockets、AMQP、JMS 或 SockJS。这些抽象位于一个名为\
  \ `spring-messaging` 的新 Spring 模块下。此支持的核心抽象是 `org.springframework.messaging.Message<T>`，旨在抽象上述协议的所有消息。\n\
  \nSpring 4.1 创建了一个新的 `JmsMessagingTemplate` 类，它构建在 `JmsTemplate` 之上，提供了与通用消息抽象的集成（参见清单\
  \ 5-55）。与 `JmsTemplate` 类似，`JmsMessagingTemplate` 也用于同步接收和发送消息。另一方面，监听通用消息也可以与 `@JmsListener`\
  \ 注解集成。\n\n***清单 5-55***. JmsMessagingTemplate 的配置 (0513-jms-messaging-template)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter05.userwithrole;\n\n\n\n```java\nimport\
  \ javax.jms.ConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.jms.config.DefaultJmsListenerContainerFactory;\nimport\
  \ org.springframework.jms.core.JmsMessagingTemplate;\nimport org.springframework.jms.support.converter.MappingJackson2MessageConverter;\n\
  import org.springframework.jms.support.converter.MessageConverter;\nimport org.springframework.jms.support.converter.MessageType;\n\
  import org.springframework.jms.support.converter.MessagingMessageConverter;\n\n\
  @Configuration\n@EnableJms\npublic class JmsConfiguration {\n    @Bean\n    public\
  \ JmsMessagingTemplate jmsMessagingTemplate(\n            ConnectionFactory connectionFactory,\
  \ MessageConverter messageConverter) {\n        JmsMessagingTemplate jmsMessagingTemplate\
  \ =\n                new JmsMessagingTemplate(connectionFactory);\n        jmsMessagingTemplate.setJmsMessageConverter(messageConverter);\n\
  \        return jmsMessagingTemplate;\n    }\n\n    @Bean\n    public MessageConverter\
  \ messageConverter() {\n        MappingJackson2MessageConverter payloadConverter\
  \ =\n                new MappingJackson2MessageConverter();\n        payloadConverter.setTargetType(MessageType.TEXT);\n\
  \        payloadConverter.setTypeIdPropertyName(\"__type\");\n\n        MessagingMessageConverter\
  \ messageConverter =\n                new MessagingMessageConverter();\n       \
  \ messageConverter.setPayloadConverter(payloadConverter);\n        return messageConverter;\n\
  \    }\n\n    @Bean\n    public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
  \            ConnectionFactory connectionFactory, MessageConverter messageConverter)\
  \ {\n        DefaultJmsListenerContainerFactory factory =\n                new DefaultJmsListenerContainerFactory();\n\
  \        factory.setConnectionFactory(connectionFactory);\n        factory.setMessageConverter(messageConverter);\n\
  \        return factory;\n    }\n}\n```\n\n这段代码创建了三个 Bean。`JmsMessagingTemplate`\
  \ 的构造方式与 `JmsTemplate` 类似，因为它使用了 `connectionFactory` 和 `messageConverter` 这两个 Bean。这两个\
  \ Bean 的创建方式与示例项目 `0514-jms-message-annotations` 中的清单 5-46 完全相同。其他所有 Bean 也与我们已经介绍过的示例类似。\n\
  \n可能会有人提出疑问：“既然 `JmsMessagingTemplate` 和 `JmsTemplate` 在使用和配置上没有太大区别，那么使用 `JmsMessagingTemplate`\
  \ 有什么好处呢？”诚然，使用 `JmsMessagingTemplate` 并没有太大不同，也没有为我们带来任何语法糖，但请记住，`JmsMessagingTemplate`\
  \ 代表了与 Spring 4.0 中用于消息传递的新泛型类型 `org.springframework.messaging.Message<T>` 的集成。因此，当我们需要将\
  \ JMS 与其他 Spring 支持的消息传递方式集成时，它可能至关重要。例如，设想一个需求：从 JMS 目的地同步接收消息，并通过 WebSocket 将其推送到浏览器。通过\
  \ `JmsMessagingTemplate` 从 JMS 目的地读取消息，我们可以将其读取为 `org.springframework.messaging.Message<T>`\
  \ 类型，并直接发送到 WebSocket，无需任何转换。\n\n此外，Spring Integration 模块高度依赖于使用 `org.springframework.messaging.Message<T>`\
  \ 通过其管道进行发送。因此，`JmsMessagingTemplate` 在涉及 Spring Integration 和 JMS 的某些用例中会非常有用。\n\
  \n总结\n\n本章解释了 JMS 消息传递通信与其他类型的通信协议和方法有何不同。在一个纯 Java 示例中，我们探讨了如何使用较旧的 JMS 1.1 和较新的\
  \ JMS 2.0 API，以及同步接收与异步接收。这些 Java 示例使我们能够比较 Spring 抽象的优势以及显著减少纯 JMS API 的冗长性。\n\n\
  基于纯 XML 或 `jms` 命名空间，我们解释了各种可能的 Spring JMS 配置。还介绍了 Java 配置和 Spring Boot。然后，我们介绍了\
  \ `JmsTemplate` 的特性，以及如何将其用于同步 JMS 消息接收和消息发送。\n\n为了立即从 JMS 目的地接收 JMS 消息，您学习了 Spring\
  \ 的 `MessageListener` 抽象，以及如何使用 XML 和 Java 配置它们。\n\n重要的 `MessageConverter` 抽象使我们能够使用各种标准和自定义传输格式。我们还深入探讨了\
  \ Spring 4.1 的各种新特性，例如 `@JmsListener`、`@Header`、`@Headers`、`@Payload` 和 `JmsMessagingTemplate`。\n\
  \n在本章末尾，我们还展示了如何使用发布/订阅 JMS 模型。\n\n第 6 章\n\n![image](img/frontdot.jpg)\n\nJMS 事务\n\
  \n本章介绍如何使用本地 JMS 事务以及显式或隐式确认模式来可靠地发送和接收 JMS 消息。在前一章解释主要消息传递概念时，我们跳过了消息传递通信最重要的方面之一：*可靠性*。Java\
  \ 消息服务在大多数情况下通过网络进行通信。而网络经常发生故障。因此，如果我们依赖消息传递通信，就需要确保这种通信是*容错*的。\n\n这个概念类似于数据持久化，因为持久化数据也需要可靠和容错。您可能熟悉数据持久化领域的\
  \ *ACID 原则*。这个缩写代表以下原则：\n\n*   *原子性*：整个事务要么提交，要么不执行任何更改。\n*   *一致性*：状态转换从一个有效状态变为另一个有效状态。\n\
  *   *隔离性*：事务的部分更改不会影响任何其他事务。\n*   *持久性*：事务的更改一旦完成，将保持持久化。\n\n所有这些原则之所以重要，是因为我们将状态存储到数据库中。但\
  \ Java 消息服务也会存储状态。事实上，JMS 提供者通常也会将消息持久化到硬盘上，并充当一种特殊的临时文档存储，从 JMS 目的地发送或移除消息。因此，ACID\
  \ 原则对于 JMS 通信完全适用。\n\nJMS 可靠性机制\n\n为了实现消息传递的 ACID 参数，Java 消息服务协议提供了多种机制。所有这些机制都围绕\
  \ `javax.jms.Session` 展开。在 JMS 2.0 中，这一职责转移到了 `javax.jms.JMSContext` 抽象上。我们可以将这两种抽象视为一个*工作单元*，它可以跟踪对其执行的所有操作。\n\
  \n为了可靠地向/从 JMS 服务器传递消息，JMS 标准提供了两个支持概念：消息确认和本地事务。以下是所有可能的 JMS 可靠性模式列表：\n\n*   *确认模式*：仅对消息接收有意义，不影响发送\n\
  \    *   `AUTO_ACKNOWLEDGE`：消息在发送或接收时自动确认。\n    *   `CLIENT_ACKNOWLEDGE`：客户端需要显式调用\
  \ `Message.acknowledge()` 来确认发送或接收。\n    *   `DUPS_OK_ACKNOWLEDGE`：消息以批量方式自动确认。可能出现重复消息，应用程序需要处理它们。\n\
  *   *事务支持*：应用程序需要为 `javax.jms.Session` 或 `javax.jms.JMSContext` 显式调用 `commit()`\
  \ 或 `rollback()`。事务行为适用于 JMS 消息接收和发送。\n\n当消息在 JMS 目的地被确认时，意味着客户端已完成其处理，并且该操作可以反映在\
  \ JMS 服务器上。*在读取期间确认消息*会将消息标记为已投递，并从队列中丢弃该消息。因此，消息接收按以下三个步骤执行：\n\n\n\n*   客户端接收消息\n\
  *   客户端处理消息\n*   客户端确认消息（可根据确认模式隐式或显式完成）\n\n请注意，消息的自动确认在不同消息之间并非原子操作。它仅适用于无法依赖一批消息的\
  \ ACID 特性的场景。\n\n在 `CLIENT_ACKNOWLEDGE` 模式下，JMS 客户端负责显式确认消息。这是通过调用 `Message.acknowledge()`\
  \ 来完成的。从这个 API 来看，似乎每条消息都需要单独确认，但在此模式下并非如此。确认操作是针对会话执行的；因此，`Message.acknowledge()`\
  \ 调用会确认当前会话中所有已消费但未确认的消息。例如，我们可以在同一个会话中读取 10 条消息，并通过一次 `Message.acknowledge()` 调用确认它们。\n\
  \n我们还可以考虑使用 JMS 本地事务，对 `javax.jms.Session` 或 `javax.jms.JMSContext` 执行各种操作，并在逻辑事务结束时显式提交或回滚所有针对它们完成的工作。这与关系型数据库的事务支持概念类似。两个\
  \ JMS 资源都为此提供了显式方法 `commit()` 和 `rollback()`。\n\nJMS 本地事务可以作为 JMS 消息接收和发送的保护伞，而消息的确认仅在消息接收期间处理。\n\
  \nJava JMS 事务示例\n\n![Image](img/sq.jpg) **注意** 确认 `javax.jms.Message` 对于 Spring\
  \ 和纯 Java JMS 是相同的。隐式确认模式（`AUTO_ACKNOWLEDGE` 和 `DUPS_OK_ACKNOWLEDGE`）是自动处理的，而显式的\
  \ `CLIENT_ACKNOWLEDGE` 模式通过调用 `javax.jms.Message.acknowledge()` 来处理。因此，我们将不关注纯 Java\
  \ JMS 确认示例。\n\n我们的第一个示例涵盖了 JMS 1.1 API，包括同步接收以及 JMS 消息的事务性写入和读取。它还涵盖了在一个事务下处理各种消息的情况。清单\
  \ 6-1 展示了我们如何配置与 JMS 提供者的连接。\n\n***清单 6-1***. JMS 1.1 配置类 (0601-java-jms11-sync-tx)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.javasynctx;\n\nimport java.util.Hashtable;\n\
  import javax.jms.Connection;\nimport javax.jms.ConnectionFactory;\nimport javax.jms.JMSException;\n\
  import javax.jms.Queue;\nimport javax.naming.InitialContext;\nimport javax.naming.NamingException;\n\
  import lombok.Getter;\n\npublic class JmsConfiguration implements AutoCloseable\
  \ {\n  private InitialContext initialContext;\n\n@Getter\n  private Queue queue;\n\
    @Getter\n  private Connection connection;\n\npublic void init() throws NamingException,\
  \ JMSException {\n    Hashtable<Object, Object> env = new Hashtable<>();\n    env.put(\"\
  java.naming.factory.initial\",\n        \"org.jnp.interfaces.NamingContextFactory\"\
  );\n    env.put(\"java.naming.factory.url.pkgs\",\n        \"org.jboss.naming:org.jnp.interfaces\"\
  );\n    env.put(\"java.naming.provider.url\", \"jnp://localhost:1099\");\n    initialContext\
  \ = new InitialContext(env);\n\nqueue = (Queue) initialContext.lookup(\"/queue/ExpiryQueue\"\
  );\n    ConnectionFactory connectionFactory =\n        (ConnectionFactory) initialContext.lookup(\"\
  /ConnectionFactory\");\n    connection = connectionFactory.createConnection();\n\
    }\n\npublic void close() throws NamingException, JMSException {\n    if (initialContext\
  \ != null) {\n      initialContext.close();\n    }\n    if (connection != null)\
  \ {\n      connection.close();\n    }\n  }\n}\n```\n\n此配置与我们上一章用于配置 JMS 1.1 示例的配置相同。它使用\
  \ JNDI `initialContext` 实例的 HornetQ 配置来查找 `queue` 和 `connection` 的实例。这两个是适用于连接到\
  \ JMS 提供者的 JMS 对象。`queue` 基于对 `/queue/ExpiryQueue` 的 JNDI 查找创建，`connectionFactory`\
  \ 实例基于 `/ConnectionFactory` 创建。这些是 HornetQ 服务器的默认配置。此配置位于文件 `config/stand-alone/non-clustered/hornetq-jms.xml`\
  \ 中。\n\n`queue` 和 `connection` 对象的私有实例通过 Lombok 生成的 getter 暴露给外部世界。`@Getter` 负责此操作。\n\
  \n`close` 方法将释放需要释放的资源——即 JNDI `initialContext` 和 JMS `connection`。`JmsConfigurable`\
  \ 类参与了 `AutoClosable` 契约，该契约代表了 Java 7 的 try-with-resources 特性。通过特殊的 `try` 块，Java\
  \ 会自动调用 `close()` 方法，就像它是 `finally` 块的一部分一样。\n\n清单 6-2 展示了发送者的配置。\n\n***清单 6-2***.\
  \ 带事务的 JMS 1.1 发送者示例 (0601-java-jms11-sync-tx)\n\n```\npackage net.lkrnac.book.eiws.chapter06.javasynctx;\n\
  \nimport javax.jms.Connection;\nimport javax.jms.JMSException;\nimport javax.jms.MessageProducer;\n\
  import javax.jms.Queue;\nimport javax.jms.Session;\nimport javax.jms.TextMessage;\n\
  \npublic class SimpleMessageSender {\n  private MessageProducer messageProducer;\n\
    private Session session;\n\npublic void init(Connection connection, Queue queue)\
  \ throws JMSException {\n    session = connection.createSession(true, Session.SESSION_TRANSACTED);\n\
      messageProducer = session.createProducer(queue);\n  }\n\npublic void sendMessages(String\
  \ message1, String message2)\n      throws JMSException {\n    try {\n      TextMessage\
  \ textMessage1 = session.createTextMessage(message1);\n      messageProducer.send(textMessage1);\n\
        TextMessage textMessage2 = session.createTextMessage(message2);\n      messageProducer.send(textMessage2);\n\
        session.commit();\n    } catch (Throwable throwable) {\n      session.rollback();\n\
      }\n  }\n}\n```\n\n此类有两个类型为 `javax.jmsSession` 和 `javax.jms.MessageProducer`\
  \ 的属性，它们在 `init()` 方法中根据给定的参数 `javax.jms.Connection` 和 `javax.jms.Queue` 进行初始化。请注意，`session`\
  \ 对象是通过调用 `connection.createSession()` 从 `connection` 实例创建的。此方法中的第一个参数表示我们正在开启事务支持，第二个参数表示我们将使用\
  \ `SESSION_TRANSACTED` 确认模式。\n\n此例中的 `sendMessage` 方法接收两个 `String` 参数，这些参数应发送到 JMS\
  \ 服务器。我们从 `session` 创建两个 `TextMessage` 类型，并通过 `messageProducer.send()` 调用发送它们。在我们提交之前，这两个消息对于针对\
  \ `queue` 打开的其他 JMS 会话是不可见的。只有调用 `session.commit()` 才会提交 JMS 事务，并使其可供针对 JMS 目标打开的其他会话处理。\n\
  \n发送消息和提交由 `try-catch` 块支持。如果在发送或提交阶段发生错误，则通过调用 `session.rollback()` 回滚事务。\n\n清单\
  \ 6-3 展示了读取器类的实现。\n\n***清单 6-3***. 带事务的 JMS 1.1 读取器 (0601-java-jms11-sync-tx)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter06.javasynctx;\n\nimport javax.jms.Connection;\n\
  import javax.jms.JMSException;\nimport javax.jms.MessageConsumer;\nimport javax.jms.Queue;\n\
  import javax.jms.Session;\nimport javax.jms.TextMessage;\n\npublic class SimpleMessageReader\
  \ {\n  private MessageConsumer messageConsumer;\n  private Session session;\n\n\n\
  \npublic void init(Connection connection, Queue queue) throws JMSException {\n    session\
  \ = connection.createSession(true, Session.SESSION_TRANSACTED);\n    messageConsumer\
  \ = session.createConsumer(queue);\n  }\n\npublic String readMessage() throws JMSException\
  \ {\n    TextMessage messageReceived = (TextMessage) messageConsumer.receive(5000);\n\
      return messageReceived.getText();\n  }\n\npublic void finishReading() throws\
  \ JMSException {\n    session.commit();\n  }\n\npublic void rollbackReading() throws\
  \ JMSException {\n    session.rollback();\n  }\n}\n```\n\n读取器类拥有两个类型为 `javax.jms.Session`\
  \ 和 `javax.jms.MessageConsumer` 的属性，它们通过 `init()` 调用进行初始化。该方法的参数是 JMS 对象 `connection`\
  \ 和 `queue`，与清单 6-2 中的读取器示例类似。这些参数用于创建 `messageConsumer` 和事务性 `session`。\n\n`readMessage()`\
  \ 方法从队列中读取带有超时设置的 `TextMessage`，并返回接收到的文本。同样，在此调用之后，消息可供 JMS 客户端逻辑使用，但在执行 `session.commit()`\
  \ 调用之前，消息不会从队列中丢弃。提交事务可以通过 `finishReading()` 方法完成。请记住，发送方和读取方针对我们的队列使用不同的会话。因此，只有在发送方为发送方会话提交消息后，读取方会话才能看到这些消息。\n\
  \n最后一个 `rollbackReading()` 调用对 `session` 对象执行回滚，以防我们希望撤销针对队列的所有读取操作。\n\n此实现显然期望事务将由使用此读取器类的逻辑来处理。清单\
  \ 6-4 探讨了此示例的主类。\n\n***清单 6-4***. JMS 1.1 事务示例的主类 (0601-java-jms11-sync-tx)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter06.javasynctx;\n\nimport javax.jms.Connection;\n\
  import javax.jms.JMSException;\nimport javax.jms.Queue;\nimport javax.naming.NamingException;\n\
  \nimport lombok.extern.slf4j.Slf4j;\n\n@Slf4j\npublic class JavaSyncTxApplication\
  \ {\n  public static void main(String[] args) throws JMSException, NamingException\
  \ {\n    try (JmsConfiguration jmsConfiguration = new JmsConfiguration()) {\n      jmsConfiguration.init();\n\
        Queue queue = jmsConfiguration.getQueue();\n      Connection connection = jmsConfiguration.getConnection();\n\
        connection.start();\n\nSimpleMessageSender messageSender = new SimpleMessageSender();\n\
        messageSender.init(connection, queue);\n      messageSender.sendMessages(\"\
  simple message1\", \"simple message2\");\n\nSimpleMessageReader messageReader =\
  \ new SimpleMessageReader();\n      messageReader.init(connection, queue);\n      String\
  \ message1 = messageReader.readMessage();\n      log.info(\"Message Received: {}\"\
  , message1);\n      String message2 = messageReader.readMessage();\n      log.info(\"\
  Message Received: {}\", message2);\n\nmessageReader.rollbackReading();\n\nString\
  \ message3 = messageReader.readMessage();\n      log.info(\"Message Received: {}\"\
  , message3);\n      String message4 = messageReader.readMessage();\n      log.info(\"\
  Message Received: {}\", message4);\n\nmessageReader.finishReading();\n    }\n  }\n\
  }\n```\n\n此类只有一个 main 方法，所有工作都在其中完成。它使用了 try-with-resources 特性，以确保在 JMS 执行后正确释放\
  \ JMS 连接。在方法体中，我们首先初始化 JMS 连接并启动它。接下来，我们创建并初始化一个 `messageSender` 实例（我们已在清单 6-2 中探讨过），并向\
  \ JMS 队列发送两条简单消息。请注意，提交是 `messageSender.sendMessages()` 调用的一部分；因此，在此调用之后，我们的事务会应用到队列，并且消息可被其他\
  \ JMS 会话读取。\n\n随后，我们创建一个 `messageReader` 实例并对其进行初始化。接下来对两条消息的读取会反映在此逻辑中，并记录到控制台，但当我们调用\
  \ `messageReader.rollbackReading()` 时，这两条消息会保留在队列中，并可被其他事务拾取。\n\n因此，接下来的两次 `messageReader.readMessage()`\
  \ 调用会读取相同的值，并再次将它们记录到控制台。在此逻辑之后，我们最终提交事务，消息将从 JMS 队列中丢弃。清单 6-5 显示了运行此示例时控制台的部分输出。\n\
  \n***清单 6-5***. 事务性 JMS 1.1 示例的输出\n\n```\n20:44:31.643 [main] INFO  n.l.b.e.c.j.JavaSyncTxApplication\
  \ - Message Received: simple message1\n20:44:31.644 [main] INFO  n.l.b.e.c.j.JavaSyncTxApplication\
  \ - Message Received: simple message2\n20:44:31.647 [main] DEBUG org.hornetq.core.client\
  \ - client ack messageID = 2147485517\n20:44:31.652 [main] INFO  n.l.b.e.c.j.JavaSyncTxApplication\
  \ - Message Received: simple message1\n20:44:31.652 [main] INFO  n.l.b.e.c.j.JavaSyncTxApplication\
  \ - Message Received: simple message2\n20:44:31.652 [main] DEBUG org.hornetq.core.client\
  \ - client ack messageID = 2147485517\n```\n\n我们可以看到，回滚后，消息保留在队列中，并可在 main 方法中用于下一次事务性读取。此行为类似于关系型数据库的事务行为。因此，我们可以轻松地将消息分组到一个工作单元中，该工作单元将具有\
  \ ACID 特性。\n\n我们的第二个纯 Java JMS 示例将 JMS 2.0 API 与消息监听器和本地 JMS 事务相结合。我们从此示例中探讨的第一个类是清单\
  \ 6-6 中的消息监听器。\n\n***清单 6-6***. 事务性监听器 (0602-java-jms20-async-tx)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter06.javaasynctx;\n\nimport javax.jms.JMSContext;\n\
  import javax.jms.Message;\nimport javax.jms.MessageListener;\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\n@Slf4j\npublic class\
  \ SimpleMessageListener implements MessageListener {\n  private SimpleService simpleService;\n\
    private JMSContext jmsContext;\n\npublic SimpleMessageListener(SimpleService simpleService,\n\
        JMSContext jmsContext) {\n    super();\n    this.simpleService = simpleService;\n\
      this.jmsContext = jmsContext;\n  }\n\n@Override\n  public void onMessage(Message\
  \ message) {\n    try {\n      String textMessage = message.getBody(String.class);\n\
        log.info(\"Message received: {}\", textMessage);\n      simpleService.processText(textMessage);\n\
        jmsContext.commit();\n    } catch (Throwable throwable) {\n      jmsContext.rollback();\n\
        log.error(\"Error during message reception\", throwable);\n    }\n  }\n}\n\
  ```\n\n此消息监听器再次使用 `SimpleService` 来委托消息处理。`SimpleService` 在上一章的清单 5-11 中的示例项目 `0500-jms-common`\
  \ 中定义。此类将给定的文本记录到控制台。\n\n一个有趣的事实是，`JMSContext` 的实例是通过构造函数传递的。这是因为我们期望此 `JMSContext`\
  \ 实例是事务性的，并且我们需要能够在读取后对其执行提交。这是在 `onMessage()` 方法中通过调用 `jmsContext.commit()` 完成的。\n\
  \n`onMessage()` 方法中的逻辑被包裹在一个 `try-catch` 块中，该块通过 `jmsContext.rollback()` 调用进行回滚，并在发生任何错误时记录错误消息。此示例中的下一个类涵盖了清单\
  \ 6-7 中的 JMS 配置。\n\n***清单 6-7***. 使用事务性 `JMSContext` 的 JMS 2.0 配置 (0602-java-jms20-async-tx)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.javaasynctx;\n\n\n\nimport java.util.Hashtable;\n\
  import javax.jms.ConnectionFactory;\nimport javax.jms.JMSConsumer;\nimport javax.jms.JMSContext;\n\
  import javax.jms.MessageListener;\nimport javax.jms.Queue;\nimport javax.naming.InitialContext;\n\
  import javax.naming.NamingException;\nimport lombok.Getter;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
  \npublic class JmsConfiguration implements AutoCloseable {\n  private InitialContext\
  \ initialContext;\n  private SimpleService simpleService;\n  private JMSContext\
  \ readContext;\n\n@Getter\n  private JMSContext writeContext;\n  @Getter\n  private\
  \ Queue queue;\n\npublic JmsConfiguration(SimpleService simpleService) {\n    super();\n\
      this.simpleService = simpleService;\n  }\n\npublic void init() throws NamingException\
  \ {\n    Hashtable<Object, Object> env = new Hashtable<>();\n    env.put(\"java.naming.factory.initial\"\
  ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
  ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
  , \"jnp://localhost:1099\");\n    initialContext = new InitialContext(env);\n\n\
  queue = (Queue) initialContext.lookup(\"/queue/ExpiryQueue\");\n    ConnectionFactory\
  \ cf =\n        (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
  );\n    readContext = cf.createContext(JMSContext.SESSION_TRANSACTED);\n    writeContext\
  \ = cf.createContext(JMSContext.SESSION_TRANSACTED);\n\nJMSConsumer jmsConsumer\
  \ = readContext.createConsumer(queue);\n    MessageListener messageListener =\n\
          new SimpleMessageListener(simpleService, readContext);\n    jmsConsumer.setMessageListener(messageListener);\n\
    }\n\n@Override\n  public void close() throws NamingException {\n    if (initialContext\
  \ != null) {\n      initialContext.close();\n    }\n    if (readContext != null)\
  \ {\n      readContext.close();\n    }\n    if (writeContext != null) {\n      writeContext.close();\n\
      }\n  }\n}\n```\n\n这个 JMS 配置类通过构造函数接收一个 `SimpleService` 实例，并将其存储在类级变量中。该实例将用于创建\
  \ `SimpleMessageListener`。\n\n`init()` 方法用于初始化 JMS 资源。首先，我们使用 HornetQ JNDI 属性创建一个\
  \ JNDI `initialContext` 实例。该实例用于查找 JMS 资源，即 `queue` 和 `ConnectionFactory`。同样，它们的值已默认配置为\
  \ HornetQ 服务器。\n\nJMS 2.0 允许从 `ConnectionFactory` 对象创建 `JMSContext`。为了分离发送方和监听器上下文，我们创建了两个事务性实例，分别命名为\
  \ `readContext` 和 `writeContext`。`readContext` 将用于从 JMS 目的地异步读取消息，而 `writeContext`\
  \ 将用于发送消息。两者都存储在类级变量中，因为稍后需要使用或关闭它们。在 `init()` 方法的末尾，我们创建了 `SimpleMessageListener`\
  \ 并将其注册为 `readContext` 的监听器。\n\n该类的最后一个方法是 `close()`。它是 `Autoclosable` 的 try-with-resources\
  \ 契约的一部分，用于释放 JNDI `initialContext` 和两个 JMS 上下文。本示例的发送方部分如清单 6-8 所示。\n\n***清单 6-8***.\
  \ 事务性 JMS 2.0 示例的发送方部分 (0602-java-jms20-async-tx)\n\n```\npackage net.lkrnac.book.eiws.chapter06.javaasynctx;\n\
  \nimport javax.jms.JMSContext;\nimport javax.jms.Queue;\nimport lombok.extern.slf4j.Slf4j;\n\
  \n@Slf4j\npublic class SimpleMessageSender {\n  private JMSContext jmsContext;\n\
    private Queue queue;\n\npublic SimpleMessageSender(JMSContext jmsContext, Queue\
  \ queue) {\n    super();\n    this.jmsContext = jmsContext;\n    this.queue = queue;\n\
    }\n\npublic void sendMessage(String message) {\n    log.info(\"Sending message:\
  \ {}\", message);\n    try {\n      jmsContext.createProducer().send(queue, message);\n\
        jmsContext.commit();\n    } catch (Throwable throwable) {\n      jmsContext.rollback();\n\
      }\n  }\n}\n```\n\n该类与上一章中纯 Java JMS 2.0 示例的类相似。不同之处在于 `sendMessage()` 方法，它使用\
  \ `jmsContext.commit()` 调用来确认事务性工作单元，在本例中即发送一条消息。发送和提交消息的操作被封装在 `try-catch` 块中，这确保了如果发生错误，事务会被回滚。本示例的最后一个类如清单\
  \ 6-9 所示。\n\n***清单 6-9***. 事务性 JMS 2.0 示例的主类 (0602-java-jms20-async-tx)\n\n```\n\
  package net.lkrnac.book.eiws.chapter06.javaasynctx;\n\nimport javax.jms.JMSContext;\n\
  import javax.jms.Queue;\nimport javax.naming.NamingException;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
  \npublic class JavaAsyncTxApplication {\n  public static void main(String[] args)\
  \ throws NamingException,\n      InterruptedException {\n    SimpleService simpleService\
  \ = new SimpleService();\n    try (JmsConfiguration jmsConfiguration =\n        new\
  \ JmsConfiguration(simpleService)) {\n      jmsConfiguration.init();\n      JMSContext\
  \ jmsContext = jmsConfiguration.getWriteContext();\n      Queue queue = jmsConfiguration.getQueue();\n\
  \nSimpleMessageSender messageSender =\n          new SimpleMessageSender(jmsContext,\
  \ queue);\n      messageSender.sendMessage(\"simple message\");\n    }\n  }\n}\n\
  ```\n\n该类在 try-with-resources 块中创建 `JmsConfiguration`，以确保 JNDI 和 JMS 资源被释放。它还用于初始化和获取\
  \ JMS 资源。最后，我们调用 `messageSender.sendMessage()` 向监听器发送一条简单消息。清单 6-10 显示了运行此应用程序时可以看到的输出。\n\
  \n***清单 6-10***. 纯 JMS 2.0 示例的输出\n\n```\n21:29:59.693 [main] INFO  n.l.b.e.c.j.SimpleMessageSender\
  \ - Sending message: simple message\n21:29:59.723 [Thread-0 (HornetQ-client-global-threads-114132791)]\
  \ INFO  n.l.b.e.c.j.SimpleMessageListener - Message received: simple message\n21:29:59.723\
  \ [Thread-0 (HornetQ-client-global-threads-114132791)] INFO  n.l.b.e.chapter05.text.SimpleService\
  \ - Message received: simple message\n21:29:59.723 [Thread-0 (HornetQ-client-global-threads-114132791)]\
  \ DEBUG org.hornetq.core.client - client ack messageID = 2147486104\n```\n\nSpring\
  \ JMS 示例的通用类\n\n以下各节展示了各种 JMS 配置的示例，并包含成功和失败场景，以突出我们如何容易在使用 JMS 时遇到问题。最后，我们提到了 Spring\
  \ JMS 可靠性机制的标准和推荐用法。因此，在未理解其后果的情况下，不应将以下示例用作模板。\n\n在深入探讨 JMS 事务支持之前，我们应该解释一下本章 Spring\
  \ JMS 示例中使用的类。为了突出 Spring JMS 如何与数据库访问协作，我们将使用一个关系型数据库。为了保持示例简单且重点突出，我们将使用 H2 数据库引擎。它常用于测试访问关系型存储的\
  \ Spring 应用程序。\n\n清单 6-11 展示了一个简单的仓库类。\n\n***清单 6-11***. Spring JMS 示例中使用的仓库类 (0600-jms-tx-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.annotation.PostConstruct;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import org.springframework.stereotype.Repository;\n\n@Repository\npublic class SimpleRepository\
  \ {\n  private final JdbcTemplate jdbcTemplate;\n  private static final String SELECT_COUNT\
  \ =\n      \"select count(*) from TEXT_TABLE where text = ?\";\n\n@Autowired\n  public\
  \ SimpleRepository(JdbcTemplate jdbcTemplate) {\n    super();\n    this.jdbcTemplate\
  \ = jdbcTemplate;\n  }\n\n\n\n@PostConstruct\n  public void initDbTable() {\n    jdbcTemplate.execute(\"\
  drop table TEXT_TABLE if exists\");\n    jdbcTemplate.execute(\"create table TEXT_TABLE(TEXT\
  \ varchar(30))\");\n  }\n\npublic void persistText(String text) {\n    jdbcTemplate.update(\"\
  insert into TEXT_TABLE values (?)\", text);\n  }\n\npublic boolean containsText(String\
  \ text) {\n    long count = jdbcTemplate.queryForObject(SELECT_COUNT, Long.class,\
  \ text);\n    return count != 0;\n  }\n}\n```\n\n我们使用 `@Repository` 注解标记这个 Spring\
  \ Bean，以强调它位于持久层并用作数据访问对象。该类依赖于标准的 Spring `JdbcTemplate` Bean。这是 Spring 用于 JDBC\
  \ 访问的标准机制。每个示例都会创建 `JdbcTemplate` Bean，并将其注入到这个公共 Bean 中。\n\n示例基于 Spring Boot。当我们使用\
  \ `@EnableAutoConfiguration` 或 `@SpringBootApplication` 注解时，Spring Boot 会自动尝试配置应用程序的默认值。这两个注解的区别在于，`@SpringBootApplication`\
  \ 是一个快捷注解，涵盖了 `@EnableAutoConfiguration`、`@Configuration` 和 `@ComponentScan`。\n\n\
  因此，无论使用哪一个，如果类路径上存在 H2 数据库引擎依赖，Spring Boot 会自动创建 `DataSource` 和 `JdbcTemplate` Bean，并将它们注册到其\
  \ IoC 容器中。所以，在本章的 Spring 示例中，我们不会看到任何其他与数据库相关的 Bean，因为 Spring Boot 已经为我们配置了 `JdbcTemplate`。这是一种相对较新且便捷的配置现代\
  \ Spring 应用程序的方式：只需使用 Spring Boot 的默认设置，仅在需求强制要求时才进行更改。\n\n当我们通过构造函数注入 `JdbcTemplate`\
  \ 时，需要初始化数据库表。`@PostConstruct` 注解确保 `initDbTable()` 方法会在应用程序初始化阶段结束时被调用，此时所有 Spring\
  \ Bean 都已创建并正确注入彼此。因此，这是初始化数据库表的便捷位置。在本例中，我们删除旧表并重新创建一个新表。\n\n显然，这不是我们在生产环境中会做的事情，但为\
  \ Spring 应用程序初始化数据库模式并不在本书的讨论范围内。因此，为了解释说明，我们暂且接受这种奇怪的初始化方式。\n\n用于存储数据的数据库表将命名为\
  \ `TEXT_TABLE`，并且只包含一个文本列 `TEXT`。同样，我们保持简单，因为我们关注的是数据库事务及其与 JMS 事务或确认模式的协作。\n\n\
  `persistText()` 方法将给定的文本存储到数据库中，而 `containsText()` 方法则检查给定文本是否存在于数据库中。清单 6-12 展示了属于\
  \ `SimpleRepository` 的服务层 Bean。\n\n***清单 6-12***. Spring JMS 示例中使用的服务类 (0600-jms-tx-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
  \n@Slf4j\n@Service\npublic class SimpleService {\n  private final SimpleRepository\
  \ simpleRepository;\n\n@Autowired\n  public SimpleService(SimpleRepository simpleRepository)\
  \ {\n    super();\n    this.simpleRepository = simpleRepository;\n  }\n\npublic\
  \ void processText(String text) {\n    log.info(\"Process Message: {}\", text);\n\
      simpleRepository.persistText(text);\n  }\n\npublic boolean isProcessed(String\
  \ text) {\n    return simpleRepository.containsText(text);\n  }\n}\n```\n\n`SimpleService`\
  \ 使用 Lombok 的 `@Slf4j` 注解进行日志记录。它会为我们生成日志常量 `log` 条目。`@Service` 注解使该类能够被组件扫描为 Spring\
  \ Bean，并强调其位于应用程序的服务层。该类通过构造函数注入了一个依赖项，即用于数据库访问的 `SimpleRepository`。\n\n这个服务 Bean\
  \ 只提供了两个方法：`processText()` 和 `isProcessed()`，它们分别由 `simpleRepository.persistText()`\
  \ 和 `simpleRepository.containsText()` 使用，因为在示例中，处理消息会将其持久化到我们的数据库存储中。\n\n本章所有 Spring\
  \ JMS 示例共用的最后一个类是 清单 6-13 中的 JMS 发送者。\n\n***清单 6-13***. JMS 发送者 (0600-jms-tx-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.annotation.PostConstruct;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class SimpleMessageSender {\n  private static final\
  \ String SIMPLE_MESSAGE = \"simple message\";\n  private JmsTemplate jmsTemplate;\n\
  \n@Autowired\n  public SimpleMessageSender(JmsTemplate jmsTemplate) {\n    super();\n\
      this.jmsTemplate = jmsTemplate;\n  }\n\n@PostConstruct\n  public void send()\
  \ {\n    log.info(\"Sending message: {}\", SIMPLE_MESSAGE);\n    jmsTemplate.convertAndSend(\"\
  ExpiryQueue\", SIMPLE_MESSAGE);\n  }\n}\n```\n\n这个 JMS 发送者类与我们在前一章中看到的类似。它只是通过构造函数注入了一个\
  \ `jmsTemplate` 实例。\n\n消息通过 `send()` 方法发送到 `messageQueue` 目的地。与第 5 章 Spring JMS\
  \ 示例的不同之处在于使用了 `@PostConstruct` 注解。之前，我们使用调度来发送消息，因为这在上一章中便于描述同步接收中的延迟。\n\n本章重点介绍\
  \ JMS 消息传递的可靠性。`@PostConstruct` 更适合在 Spring 上下文初始化后发送单条消息，这更有利于突出确认和事务特性。\n\nAUTO_ACKNOWLEDGE\
  \ 模式\n\n我们已经提到，确保 JMS 消息可靠传递的机制之一是 JMS 确认模式。第一种模式称为 `AUTO_ACKNOWLEDGE`，在这种模式下，JMS\
  \ 消息操作的接收会立即反映在 JMS 目的地中，并且更改会立即对针对相关 JMS 目的地打开的其他 JMS 会话可见。这是默认的 JMS 确认模式，因此如果我们没有另行配置\
  \ JMS 资源，就会使用它。\n\n因此，在成功接收后，消息会*立即被标记为已送达*，并从 JMS 目的地中丢弃。当 `MessageConsumer.receive()`\
  \ 调用返回后，或 `MessageListener.onMessage()` 调用成功完成后，接收即被视为成功。对于三阶段 JMS 消息接收（接收/处理/确认），唯一的例外是通过\
  \ JMS 2.0 `JMSContext` 在 `AUTO_ACKNOWLEDGE` 模式下进行的同步接收。这种接收将接收和确认合并为一个步骤，随后在客户端进行处理。\n\
  \n但是，在使用 Spring 时，当我们使用 JMS 监听器时，有一个重要的陷阱需要留意。为了回顾 Spring 中 JMS 消息监听的构造，有两种类型的监听器容器：`SimpleJmsListenerContainerFactory`\
  \ 和 `DefaultJmsListenerContainerFactory`。\n\n\n\n`SimpleJmsListenerContainerFactory`\
  \ 是在 Spring 4.1 中引入的，用于创建 `SimpleMessageListenerContainer` Bean。这种监听器容器类型在底层使用标准的\
  \ JMS 异步特性，并针对 JMS 目的地注册一个直接的 JMS 监听器。因此，`AUTO_ACKNOWLEDGE` 模式的行为符合 JMS 标准的定义：消息会在*成功调用监听器方法后*，从目的地被确认/丢弃。\n\
  \n另一方面，`DefaultJmsListenerContainerFactory` 是 `DefaultMessageListenerContainer`\
  \ 的工厂类。它也是在 Spring 4.1 中引入的。为了接收 JMS 消息，它使用了一种长轮询机制。在底层，Spring 在一个无限循环中使用带超时的同步接收。当超时发生时，Spring\
  \ 会立即执行另一个 `MessageConsumer.receive()` 调用。这模拟了异步的 JMS 消息处理。实际上，这种接收方式性能可能更好；因此，Spring\
  \ 和 Spring Boot 默认使用这种类型的监听器容器。但这种方法的缺点是*在执行进入监听器方法之前，JMS 消息会被立即确认*。因此，`DefaultJmsListenerContainerFactory`\
  \ 更适合与事务一起使用（这将在后面解释）。\n\n有趣的是，使用这两种监听器容器，我们在监听 JMS 消息时会得到完全相反的 `AUTO_ACKNOWLEDGE`\
  \ 行为。\n\n发送成功后，消息*立即可用于接收*。消息的发送在 `MessageProducer.send()` 调用完成后被视为成功。\n\nJMS 客户端实现在底层会逐一确认每条消息。因此，它会自动对\
  \ JMS 目的地执行额外的操作。所以，这种确认模式*可能比其他模式慢*，因为其他模式通常执行确认调用的频率较低。\n\n由于这是默认的确认模式，在前一章描述\
  \ Spring JMS 非事务特性的所有示例中都使用了它。下面的示例与第 5 章中的示例类似，但在本例中，我们还将把消息存储到 H2 数据库中。清单 6-14\
  \ 展示了本例的主类。\n\n***清单 6-14***. 主类 (0603-auto-acknowledge-listener-success)\n\n```\n\
  package net.lkrnac.book.eiws.chapter06.text;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\n\n@SpringBootApplication\n\
  public class JmsApplication {\n  public static void main(String[] args) throws Exception\
  \ {\n    SpringApplication.run(JmsApplication.class, args);\n  }\n}\n```\n\n`@SpringBootApplication`\
  \ 注解是 `@Configuration`、`@ComponentScan` 和 `@EnableAutoConfiguration` 这组注解的便捷快捷方式。`@Configuration`\
  \ 将此类标记为 Spring 配置类。\n\n`@ComponentScan` 对当前包及其子包执行 Spring Bean 的扫描。由于 `0600-jms-tx-common`\
  \ 项目是本示例项目（`0603-auto-acknowledge-listener-success`）的依赖项，此扫描还会将来自清单 6-12 和 6-13\
  \ 的 `SimpleRepository` 和 `SimpleService` Bean 加载并注册到我们的上下文中。\n\n`@EnableAutoConfiguration`\
  \ 将使 Spring Boot 扫描类路径以查找已知依赖项，并根据类路径上存在的库应用通用的默认配置。在本例中（示例项目 `0603-auto-acknowledge-listener-success`），我们的类路径上有\
  \ H2 数据库引擎，因此 Spring Boot 会自动将 `DataSource` Bean 配置为连接到 H2 数据库引擎的网关，并将 `JdbcTemplate`\
  \ Bean 配置为对其执行 JDBC 操作。然后，这个 `JdbcTemplate` Bean 会被注入到 `SimpleRepository` 中。\n\n\
  由 `@EnableAutoConfiguration` 初始化的第二个支持是 JMS。由于项目 `0603-auto-acknowledge-listener-success`\
  \ 的类路径上包含 HornetQ 代理依赖项，Spring Boot 会自动初始化此 JMS 提供者的嵌入式实例，并通过 `JmsTemplate` Bean\
  \ 配置对其的访问。我们只需要在我们的 Bean 中注入 `JmsTemplate` 并使用它即可。\n\n*本章中的所有 Spring 示例都将使用此配置方法*。在\
  \ main 方法中，我们只需调用 `SpringApplication.run()` 来将此 Spring Boot 配置作为 Java 应用程序执行。\n\n\
  成功场景\n\n清单 6-15 展示了本示例的 JMS 监听器。\n\n***清单 6-15***. AUTO_ACKNOWLEDGE 示例的 JMS 监听器\
  \ (0603-auto-acknowledge-listener-success)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.annotation.JmsListener;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleMessageListener\
  \ {\n  private SimpleService simpleService;\n\n@Autowired\n  public SimpleMessageListener(SimpleService\
  \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
  \n@JmsListener(destination = \"ExpiryQueue\")\n  public void readMessage(String\
  \ message) {\n    simpleService.processText(message);\n  }\n}\n```\n\n这个类应该很熟悉，因为所有结构都在前一章中描述过了。我们在这里介绍它是因为此实现确保了消息的正确接收。重要的是要记住，Spring\
  \ Boot 会自动为此监听器创建 `DefaultJmsListenerContainerFactory`；因此，当我们即将调用 `simpleService.processText()`\
  \ 时，JMS 消息已经被确认并从 JMS 目的地丢弃。\n\n为了探索这种 JMS 接收场景，我们使用图 6-1 中的时序图。\n\n![9781484207949_Fig06-01.jpg](img/9781484207949_Fig06-01.jpg)\n\
  \n图 6-1. 使用 DefaultJmsListenerContainerFactory 的 `AUTO_ACKNOWLEDGE` 场景时序图（文件 sequence.uml\
  \ 位于示例项目 0603-auto-acknowledge-listener-success 的 uml-Diagrams 文件夹中）\n\n此时序图显示，确认是在调用\
  \ `SimpleMessageListener.readMessage()` 方法之前完成的，因为 `DefaultJmsListenerContainerFactory`\
  \ 使用了长轮询。通过这种机制，消息在 Spring 调用监听器方法之前就被确认了。\n\n进入监听器方法代码后，成功场景的流程会经过 `SimpleService`、`SimpleRepository`，并将消息存储在我们的数据库表\
  \ `TEXT_TABLE` 中。\n\n![Image](img/sq.jpg) **注意**  本章中的所有时序图都是由一个名为 PlantUML (plantuml.com)\
  \ 的优秀开源项目创建的。它提供了一种易于掌握的领域特定语言 (DSL)，用于创建各种 UML 图。这是一种不同于经典 UML 编辑器（UMLet、Enterprise\
  \ Architect、Visio）的方法，能够提高生产力，因为我们开发人员编写代码比拖拽、调整大小和连接矩形与箭头更高效。它还与大多数 IDE 和编辑器以及不同的编程工具具有良好的集成性（更多信息请参见\
  \ `plantuml.com/running.html`）。\n\n监听器导致的消息丢失\n\n成功行为是每个开发人员在实现带有数据库支持的 JMS 时所追求的目标。但现实世界并不总是对我们良好的意图如此友好。在\
  \ `AUTO_ACKNOWLEDGE` 模式下，如果我们使用与成功场景中相同的主类和发送者类，并配合 `DefaultJmsListenerContainerFactory`，消息很容易丢失。此监听器容器工厂使用的长轮询机制强制它在接收后立即确认消息。\n\
  \n\n\n由于 Spring Boot 的监听器容器工厂默认实现是配置了 `AUTO_ACKNOWLEDGE` 模式的 `DefaultJmsListenerContainerFactory`，因此我们无需注册特殊的\
  \ Bean 作为 JMS 配置。该监听器如清单 6-16 所示。\n\n***清单 6-16***. 使用 `AUTO_ACKNOWLEDGE` 模式的消息丢失场景监听器\
  \ (0605-auto-acknowledge-listener-lost)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.Session;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleMessageListener {\n  private SimpleService simpleService;\n\
  \n@Autowired\n  public SimpleMessageListener(SimpleService simpleService) {\n    super();\n\
      this.simpleService = simpleService;\n  }\n\n@JmsListener(destination = \"ExpiryQueue\"\
  )\n  public void readMessage(String message, Session session) {\n    preprocess(message);\n\
      simpleService.processText(message);\n  }\n\nprivate void preprocess(String message)\
  \ {\n    // 模拟错误\n    throw new IllegalArgumentException(message);\n  }\n}\n```\n\
  \n在此例中，我们并未在持久化消息后模拟错误，而是在调用 `simpleService.processText()` 之前，于名为 `preprocess()`\
  \ 的方法中模拟错误。图 6-2 展示了运行此示例后的行为。\n\n![9781484207949_Fig06-02.jpg](img/9781484207949_Fig06-02.jpg)\n\
  \n图 6-2. 使用监听器和 `AUTO_ACKNOWLEDGE` 模式的消息丢失场景时序图（文件位于示例项目 0605-auto-acknowledge-listener-lost\
  \ 的 uml-diagrams 文件夹中的 sequence.uml）\n\n由于 Spring 使用长轮询，其在底层通过无限循环中带有超时的同步接收来模拟异步行为。根据\
  \ JMS 定义，同步接收在 `MessageConsumer.receive()` 调用返回后立即自动确认。这是因为我们为监听器容器使用了 `DefaultJmsListenerContainerFactory`\
  \ 实现。\n\n因此，当我们的监听器调用 `preprocess()` 方法时，消息已被确认。`preprocess()` 中的异常会在消息持久化之前停止监听器中的处理。但此时消息已从目标中丢弃，从而丢失。\n\
  \n### 同步接收导致的消息丢失\n\n示例 `0606-auto-acknowledge-sync-lost` 解释了 `AUTO_ACKNOWLEDGE`\
  \ 模式与同步接收结合如何同样导致消息丢失。同样，此示例的主类和发送者类与清单 6-13 和 6-14 完全相同。清单 6-17 展示了 JMS 配置。\n\n\
  ***清单 6-17***. 同步 `AUTO_ACKNOWLEDGE` 模式的 JMS 配置 (0606-auto-acknowledge-sync-lost)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.ConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  \n@Configuration\n@EnableScheduling\npublic class JmsConfiguration {\n  @Bean\n\
    public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {\n    JmsTemplate\
  \ jmsTemplate = new JmsTemplate(connectionFactory);\n    jmsTemplate.setReceiveTimeout(1000);\n\
      return jmsTemplate;\n  }\n}\n```\n\n此配置类注册了 `JmsTemplate` Bean，它有一个非默认属性 `receiveTimeout`。默认情况下，接收超时为\
  \ 0，这意味着如果没有可读取的消息，将无限期等待。如果我们希望确保读取线程不会因永远等待消息而卡住，则应指定接收超时。\n\n`JmsConfiguration`\
  \ 类还通过 `@EnableScheduling` 注解启用了调度功能，该功能将用于初始化 JMS 消息的同步读取，如清单 6-18 所示。\n\n***清单\
  \ 6-18***. 使用 `AUTO_ACKNOWLEDGE` 模式且消息丢失场景的同步读取器 (0604-auto-acknowledge-sync-lost)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class SimpleMessageReader {\n  private JmsTemplate\
  \ jmsTemplate;\n  private SimpleService simpleService;\n\n@Autowired\n  public SimpleMessageReader(JmsTemplate\
  \ jmsTemplate,\n      SimpleService simpleService) {\n    super();\n    this.jmsTemplate\
  \ = jmsTemplate;\n    this.simpleService = simpleService;\n  }\n\n@Scheduled(fixedRate\
  \ = Long.MAX_VALUE)\n  public void readMessage() {\n    String message = (String)\
  \ jmsTemplate.receiveAndConvert(\"messageQueue\");\n    log.info(\"读取的消息: {}\",\
  \ message);\n\npreprocess(message);\n    simpleService.processText(message);\n  }\n\
  \nprivate void preprocess(String message) {\n    // 模拟错误\n    throw new IllegalArgumentException(message);\n\
    }\n}\n```\n\n此读取器类与上一章中的同步示例类似。它定义了一个 Spring 组件，通过 `@Slf4j` 注解启用了 Lombok 日志记录功能。它通过构造函数注入两个依赖项。`JmsTemplate`\
  \ 用于接收消息，`SimpleService` 是用于处理和持久化消息的 Bean。\n\n消息接收由 `readMessage()` 方法完成，该方法由 Spring\
  \ 调度功能触发。我们选择了较长的固定调度速率，因为我们希望只读取一次。请注意，`preprocess()` 调用位于 `jmsTemplate.receiveAndConvert()`\
  \ 调用和 `simpleService.processText()` 之间，用于模拟同步接收与消息持久化之间可能发生的错误。图 6-3 用时序图展示了此行为。\n\
  \n![9781484207949_Fig06-03.jpg](img/9781484207949_Fig06-03.jpg)\n\n图 6-3. 使用同步接收和\
  \ `AUTO_ACKNOWLEDGE` 模式的消息丢失场景时序图（文件位于示例项目 0606-auto-acknowledge-sync-lost 的 uml-diagrams\
  \ 文件夹中的 sequence.uml）\n\n此行为与上一个示例类似。唯一的区别在于，我们显式请求接收，而在上一个示例中，Spring 在 `DefaultJmsListenerContainerFactory`\
  \ 内部为我们完成了此操作。实际上，从 JMS 提供者的角度来看，这两个示例都是同步的。\n\n### CLIENT_ACKNOWLEDGE 模式\n\n如前所述，使用\
  \ `CLIENT_ACKNOWLEDGE` 模式时，客户端负责显式确认一条或一批消息。如果我们批量使用客户端确认，则会减少对 JMS 提供者服务器的调用次数，从而节省一些带宽。\n\
  \n但是，Spring 的 `JmsTemplate` 设计会在消息返回给我们的逻辑之前对其进行确认。因此，`CLIENT_ACKNOWLEDGE` 模式在 Spring\
  \ 中用于同步消息接收时，其工作方式与使用 `AUTO_ACKNOWLEDGE` 完全相同。因此，使用此模式配置 `JmsTemplate` 没有实际意义。Spring\
  \ 文档并未明确说明为何存在这种行为，因此我们避免对此进行任何推测。\n\n### 成功场景\n\n第一个使用 `CLIENT_ACKNOWLEDGE` 模式的\
  \ Spring 示例展示了一个成功场景。我们再次使用了通用的主类和监听器类。清单 6-19 展示了 JMS 配置。\n\n***清单 6-19***. CLIENT_ACKNOWLEDGE\
  \ 成功场景的 JMS 配置 (0607-client-acknowledge-listener-success)\n\n\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.ConnectionFactory;\nimport javax.jms.Session;\n\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
  \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public DefaultJmsListenerContainerFactory\
  \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n    DefaultJmsListenerContainerFactory\
  \ factory =\n        new DefaultJmsListenerContainerFactory();\n    factory.setConnectionFactory(connectionFactory);\n\
      factory.setSessionAcknowledgeMode(Session.CLIENT_ACKNOWLEDGE);\n    return factory;\n\
    }\n}\n```\n\n在这个配置类中，我们注册了 `jmsListenerContainerFactory` bean 来定义监听器的行为。该 bean\
  \ 的实例需要基于注入的 `connectionFactory`（由 Spring Boot 特性自动创建），并配置为 `CLIENT_ACKNOWLEDGE`\
  \ 模式。清单 6-20 展示了监听器的实现。\n\n***清单 6-20***. 使用 `CLIENT_ACKNOWLEDGE` 模式的成功场景监听器类 (0607-client-acknowledge-listener-success)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.JMSException;\n\
  import javax.jms.Message;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class SimpleMessageListener {\n  private SimpleService\
  \ simpleService;\n\n@Autowired\n  public SimpleMessageListener(SimpleService simpleService)\
  \ {\n    super();\n    this.simpleService = simpleService;\n  }\n\n@JmsListener(destination\
  \ = \"ExpiryQueue\")\n  public void readMessage(String messageText, Message message)\n\
        throws JMSException {\n    simpleService.processText(messageText);\n    log.info(\"\
  Acknowledging reception: \" + messageText);\n    message.acknowledge();\n  }\n}\n\
  ```\n\n在监听器中，我们在处理/持久化之后确认消息，以表示成功。此成功行为在图 6-4 中进行了描述。该图展示了平滑且直接的调用流程，直至持久化层并成功确认。\n\
  \n![9781484207949_Fig06-04.jpg](img/9781484207949_Fig06-04.jpg)\n\n图 6-4. 使用 `CLIENT_ACKNOWLEDGE`\
  \ 模式的成功场景时序图（文件 sequence.uml 位于示例项目 0607-client-acknowledge-listener-success 的 uml-diagrams\
  \ 文件夹中）\n\n重复消息场景\n\n`CLIENT_ACKNOWLEDGE` 模式下的失败场景将展示如何处理同一条消息两次。除清单 6-21 所示的监听器类外，所有类的实现均与\
  \ `CLIENT_ACKNOWLEDGE` 成功场景相同。\n\n***清单 6-21***. `CLIENT_ACKNOWLEDGE` 模式下重复消息场景的监听器类\
  \ (0607-client-acknowledge-listener-success)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.JMSException;\nimport javax.jms.Message;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.annotation.JmsListener;\n\
  import org.springframework.stereotype.Component;\n\n@Slf4j\n@Component\npublic class\
  \ SimpleMessageListener {\n  private SimpleService simpleService;\n  private boolean\
  \ errorSimulated = false;\n\n@Autowired\n  public SimpleMessageListener(SimpleService\
  \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
  \n@JmsListener(destination = \"messageQueue\")\n  public void readMessage(String\
  \ messageText, Message message)\n      throws JMSException {\n    simpleService.processText(messageText);\n\
  \npostprocess(messageText);\n\nlog.info(\"Acknowledging reception: \" + messageText);\n\
      message.acknowledge();\n  }\n```\n\n\nprivate void postprocess(String message)\
  \ {\n    //模拟错误\n    if (!errorSimulated) {\n      errorSimulated = true;\n      throw\
  \ new IllegalArgumentException(message);\n    }\n  }\n}\n```\n\n这个监听器类看起来很眼熟，因为它与上一章中使用的监听器类似。\n\
  \n该类中一个不寻常的属性是 `errorSimulated`。这个变量用于突出显示错误行为，在现实世界中，这种错误可能由各种原因引起。在本例中，我们将其存储在这个单例\
  \ bean 中（这应该能让每个负责任的开发者警醒）。当然，在生产环境中不应将状态存储在单例 bean 中，因为它代表一种非线程安全的全局状态。\n\n但出于我们的目的，这是必要的，因为我们希望让消息接收失败，以突出显示\
  \ JMS 和数据库集成时会发生什么。`errorSimulated` 在私有方法 `postprocess()` 中被使用，用于模拟第一条接收消息的错误。该方法首次被调用时，还会进一步禁用错误模拟。这对于突出显示以下场景非常有用：处理第一条消息可能失败，而第二次尝试可能成功。\n\
  \n*本章将在各种失败示例中使用此模式进行错误模拟。*\n\n在此消息接收逻辑中，我们在私有方法 `postprocess()` 中模拟了一个错误，该方法在持久化消息之后、显式调用\
  \ `message.acknowledge()` 之前被调用。执行此示例后，将发生如图 6-5 所示的序列。\n\n![9781484207949_Fig06-05.jpg](img/9781484207949_Fig06-05.jpg)\n\
  \n图 6-5. CLIENT_ACKNOWLEDGE 模式下重复消息场景的序列图（文件位于示例项目 0608-client-acknowledge-listener-duplicate\
  \ 的 uml-diagrams 文件夹中的 sequence.uml）\n\n消息被接收并持久化，但未被确认，因为 `postprocess()` 方法抛出了错误。因此，JMS\
  \ 目的地确保根据 JMS 契约，此消息将被重新投递。在第二次持久化调用之后，根据我们的示例，`postprocess()` 不会再次抛出错误，并允许消息被显式确认。\n\
  \n显然，这是我们不希望应用程序中出现的行为，除非我们的持久化存储是幂等的。幂等性已在第 4 章中描述。在这种情况下，如果数据库在消息不存在时插入它，在消息已存在时更新它，那么我们可以执行任意多次\
  \ `simpleService.processText()` 调用，而不会影响数据库中状态的一致性。\n\n但我们的示例中的存储不是幂等的；因此，重复调用 `simpleService.processText()`\
  \ 会带来问题。\n\nDUPS_OK_ACKNOWLEDGE 模式\n\n此确认模式会惰性地自动确认消息。这意味着由 JMS 负责执行此操作。这种方法的缺点是，客户端在使用此模式时可能会收到重复消息，因为消息是由\
  \ JMS 服务器批量确认的。因此，当确认权不在客户端手中时，无法保证消息恰好被投递一次。因此，此模式最适合客户端是幂等（能够处理重复消息）的情况。\n\n如果消息被第二次重新投递，其\
  \ `JMSRedelivered` 消息头将被设置为 `true`。因此，我们可以通过调用 `Message.getJMSRedelivered()` 来询问消息是否被重新投递，并根据我们的需求采取行动。\n\
  \n由于使用 `DUPS_OK_ACKNOWLEDGE` 模式的确认方式特定于 JMS 提供者的实现，因此很难为我们的示例重现重复场景。因此，我们只介绍一个成功场景，其中我们仅在清单\
  \ 6-22 中展示 JMS 配置类。其他类与成功场景中的类完全相同，没有错误模拟。\n\n***清单 6-22***. `DUPS_OK_ACKNOWLEDGE`\
  \ 模式下成功场景的监听器类 (0609-dups-ok-acknowledge)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.ConnectionFactory;\nimport javax.jms.Session;\n\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
  \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public DefaultJmsListenerContainerFactory\
  \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n    DefaultJmsListenerContainerFactory\
  \ factory =\n        new DefaultJmsListenerContainerFactory();\n    factory.setConnectionFactory(connectionFactory);\n\
      factory.setSessionAcknowledgeMode(Session.DUPS_OK_ACKNOWLEDGE);\n    return\
  \ factory;\n  }\n}\n```\n\n在这种情况下，`jmsListenerContainerFactory` 使用了 `DUPS_OK_ACKNOWLEDGE`\
  \ 模式。此示例的序列图如图 6-6 所示。\n\n![9781484207949_Fig06-06.jpg](img/9781484207949_Fig06-06.jpg)\n\
  \n图 6-6. 使用 DULS_OK_ACKNOWLEDGE 模式的成功场景序列图（文件位于示例项目 0609-dups-ok-acknowledge 的 uml-diagrams\
  \ 文件夹中的 sequence.uml）\n\n在接收并持久化消息后，JMS 提供者会在其方便的时间点确认该消息。此选项有助于启用 JMS 提供者可能希望实施的各种\
  \ JMS 目的地处理优化，以使 JMS 通信更高效。\n\n使用 Spring 的本地 JMS 事务\n\n确认模式并非确保消息可靠投递的唯一方式。JMS 标准允许我们使用事务特性，类似于关系数据库中常见的\
  \ ACID 事务。\n\n我们已经介绍了如何使用纯 Java JMS API 进行本地 JMS 事务。现在我们将探讨如何将它们与 Spring 一起使用。可以通过将\
  \ `JmsTemplate` 的 `setSessionTransacted()` 设置为 `true`，并将 `setSessionAcknowledgeMode()`\
  \ 设置为 `Session.SESSION_TRANSACTED` 来启用此支持。\n\n对于此支持，Spring 期望存在一个事务管理器 bean。因此，在没有事务管理器的情况下，将\
  \ `JmsTemplate`（用于消息发送和同步消息接收）与事务行为一起使用是没有意义的。本书稍后将展示事务管理器的使用。\n\n但是，我们可以在监听消息时使用没有任何事务管理器的本地\
  \ JMS 事务。在这种情况下，我们可以为以下任何 JMS 监听器支持 bean 配置 `setSessionTransacted()` 为 `true` 和\
  \ `setSessionAcknowledgeMode()` 为 `Session.SESSION_TRANSACTED`：\n\n*   容器监听器实现\n\
  \    *   `SimpleMessageListenerContainer`——创建一个监听器容器，用于纯异步 JMS 接收，其中监听器注册到 JMS 目的地，JMS\
  \ 服务器启动消息接收。如果我们计划使用带有 CLIENT_ACKNOWLEDGE 或 AUTO_ACKNOWLEDGE 模式的监听器，这很方便。\n    *\
  \   `DefaultMessageListenerContainer`——创建一个监听器容器，其中 Spring 在底层循环中通过超时机制进行同步调用，以便消息一出现在\
  \ JMS 目的地就被读取。此机制在我们使用 JMS 事务支持时很方便，并且是唯一可以与分布式事务（将在下一章介绍）配合使用的支持。\n*   容器监听器工厂实现，在\
  \ Spring 4.1 中引入，允许使用 `@JmsListener` 注解 JMS 监听器方法\n    *   `SimpleJmsListenerContainerFactory`——`SimpleMessageListenerContainer`\
  \ 的工厂\n    *   `DefaultJmsListenerContainerFactory`——`DefaultMessageListenerContainer`\
  \ 的工厂\n\n成功场景\n\n\n\n为了演示如何在 Spring 中使用本地 JMS 事务，我们可以复用本章 Spring JMS 示例中通用的 main\
  \ 类和 sender 类。我们也可以使用与本章成功场景相同的监听器实现（例如，在清单 6-14 中）。唯一的区别在于 清单 6-23 中展示的 JMS 配置。\n\
  \n***清单 6-23***. 带本地事务的成功场景的 JMS 配置 (0610-transacted-listener-success)\n\n```\n\
  package net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.ConnectionFactory;\n\
  import javax.jms.Session;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
  \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public DefaultJmsListenerContainerFactory\
  \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n    DefaultJmsListenerContainerFactory\
  \ factory =\n        new DefaultJmsListenerContainerFactory();\n    factory.setConnectionFactory(connectionFactory);\n\
      factory.setSessionTransacted(true);\n    factory.setSessionAcknowledgeMode(Session.SESSION_TRANSACTED);\n\
      return factory;\n  }\n}\n```\n\n这将注册名为 `jmsListenerContainerFactory` 的 `DefaultJmsListenerContainerFactory`\
  \ bean，并将 `sessionTransacted` 属性设置为 `true`，`sessionAcknowledgeMode` 设置为 `Session.SESSION_TRANSACTED`，以启用本地\
  \ JMS 事务支持。类似的支持也可以通过 XML 配置实现，如 清单 6-24 所示。\n\n***清单 6-24***. 带本地事务的成功场景的 XML JMS\
  \ 配置 (示例项目 0612-transacted-xml 中 src/main/resources 文件夹下的文件 spring-jms-config.xml)\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:jms=\"http://www.springframework.org/schema/jms\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/jms\n    http://www.springframework.org/schema/jms/spring-jms.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<jms:listener-container acknowledge=\"transacted\"\n       connection-factory=\"\
  jmsConnectionFactory\">\n    <jms:listener destination=\"messageQueue\" ref=\"simpleMessageListener\"\
  \n      method=\"readMessage\" />\n  </jms:listener-container>\n</beans>\n```\n\n\
  在这种情况下，我们使用 Spring 的 XML 命名空间 `jms` 来指定监听器容器。通过将 `acknowledge` 属性设置为 `transacted`\
  \ 值来启用本地 JMS 事务。此配置的其余部分应该在前一章中已经熟悉。`connection-factory` 引用是必需的。监听器指向名为 `messageQueue`\
  \ 的 JMS 目的地，以及监听器方法 `simpleMessageListener.readMessage()`。此示例的行为如 图 6-7 所示。\n\n\
  ![9781484207949_Fig06-07.jpg](img/9781484207949_Fig06-07.jpg)\n\n图 6-7. 使用 SESSION_TRANSACTED\
  \ 模式的成功场景的时序图 (示例项目 0610-transacted-listener-success 中 uml-diagrams 文件夹下的文件 sequence.uml)\n\
  \n这很简单。在监听器执行完毕后，Spring 会自动为我们提交消息。因此，我们无法通过本地 JMS 事务 + Spring 的组合在单个事务中接收多条消息。\n\
  \n重复消息场景\n\n与确认模式一样，本地 JMS 事务的接收也可能出错。想象一下，将本章 Spring JMS 示例中的 main 类和 sender 类与上一个示例（清单\
  \ 6-24）中的 JMS 配置以及 清单 6-25 中的监听器结合起来。\n\n***清单 6-25***. 使用 `SESSION_TRANSACTED`\
  \ 模式的重复消息场景的监听器类 (0611-transacted-listener-duplicate)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.JMSException;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleMessageListener {\n  private SimpleService simpleService;\n\
    private boolean errorSimulated = false;\n\n@Autowired\n  public SimpleMessageListener(SimpleService\
  \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
  \n@JmsListener(destination = \"messageQueue\")\n  public void readMessage(String\
  \ message) throws JMSException {\n    simpleService.processText(message);\n    postprocess(message);\n\
    }\n\nprivate void postprocess(String message) {\n    // simulate error\n    if\
  \ (!errorSimulated) {\n      errorSimulated = true;\n      throw new IllegalArgumentException(message);\n\
      }\n  }\n}\n```\n\n实际上，我们在 清单 6-21 中已经见过这样的监听器，它位于 `AUTO_ACKNOWLEDGE` 模式的重复场景监听器中。其行为如\
  \ 图 6-8 所示。\n\n![9781484207949_Fig06-08.jpg](img/9781484207949_Fig06-08.jpg)\n\n\
  图 6-8. 使用 SESSION_TRANSACTED 模式的重复消息场景的时序图 (示例项目 0611-transacted-listener-duplicate\
  \ 中 uml-diagrams 文件夹下的文件 sequence.uml)\n\n问题在于，消息被存储到数据库中，之后，`postprocess` 在提交第一条消息之前抛出了异常。在重新投递时，同一条消息会第二次被存储到数据库中。\n\
  \nJmsTransactionManager\n\nSpring 还提供了通过其事务划分功能处理 JMS 事务的可能性，即使用 `@Transactional`\
  \ 注解。当我们注册 `JmsTransactionManager` bean 作为 Spring 事务的管理器时，这种支持是可能的。在这种情况下，Spring\
  \ 会忽略 JMS 原生的确认模式和事务配置。此支持适用于 JMS 1.1 和 JMS 2.0。\n\n`JmsTransactionManager` 可用于单个\
  \ `ConnectionFactory`，因为它将 JMS `Connection`/`Session`/`JMSContext` 绑定到线程。对于每个 `ConnectionFactory`\
  \ 的线程绑定 `Session`，此配置可能很方便。\n\n建议将此事务管理器与前一章中展示的 `CachingConnectionFactory` 结合使用。\n\
  \n一个从 JMS 配置开始的 `JmsTransactionManager` 示例如 清单 6-26 所示。\n\n***清单 6-26***. 使用 `JmsConfigurationManager`\
  \ 的 JMS 配置 (0613-jms-transaction-manager)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.ConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
  import org.springframework.jms.connection.JmsTransactionManager;\n\n@Configuration\n\
  public class JmsConfiguration {\n  @Bean\n  public JmsTransactionManager transactionManager(\n\
        ConnectionFactory connectionFactory) {\n    return new JmsTransactionManager(connectionFactory);\n\
    }\n\n\n\n@Bean\n  public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
        ConnectionFactory connectionFactory,\n      JmsTransactionManager transactionManager)\
  \ {\n    DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
      factory.setConnectionFactory(connectionFactory);\n    factory.setTransactionManager(transactionManager);\n\
      return factory;\n  }\n}\n```\n\n首先，我们基于 Spring 注入的 `connectionFactory` 实例创建并注册\
  \ `JmsTransactionManager` bean。第二个 bean 是 `DefaultJmsListenerContainerFactory`，同样基于与之前示例中相同的\
  \ `connectionFactory` 对象。但现在，我们还将 `transactionManager` 注入并配置到监听器容器工厂中，以在此监听器容器工厂之上启用\
  \ Spring 的事务特性。\n\n清单 6-27 展示了此示例的监听器实现。\n\n***清单 6-27***. `JmsConfigurationManager`\
  \ 示例的监听器类 (0613-jms-transaction-manager)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.JMSException;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  import org.springframework.transaction.annotation.Transactional;\n\n@Component\n\
  public class SimpleMessageListener {\n  private SimpleService simpleService;\n  private\
  \ boolean errorSimulated = false;\n\n@Autowired\n  public SimpleMessageListener(SimpleService\
  \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
  \n@Transactional\n  @JmsListener(destination = \"messageQueue\")\n  public void\
  \ readMessage(String messageText) throws JMSException {\n    preprocess(messageText);\n\
      simpleService.processText(messageText);\n  }\n\nprivate void preprocess(String\
  \ message) {\n    // 模拟错误\n    if (!errorSimulated) {\n      errorSimulated = true;\n\
        throw new IllegalArgumentException(message);\n    }\n  }\n}\n```\n\n我们对监听器方法\
  \ `readMessage()` 使用了事务划分功能。在 `simpleService.processText()` 之前调用的 `preprocess()`\
  \ 方法，对接收到的第一条消息模拟了一个错误。对于后续消息，则不会模拟错误。运行此示例后，该行为的时序图如图 6-9 所示。\n\n![9781484207949_Fig06-09.jpg](img/9781484207949_Fig06-09.jpg)\n\
  \n图 6-9. JmsTransactionManager 示例的时序图（位于示例项目 0613-jms-transaction-manager 的 uml-diagrams\
  \ 文件夹中的 sequence.uml 文件）\n\n当接收到第一条消息且 `preprocess()` 抛出异常时，`JmsTransactionManager`\
  \ 会回滚在消息接收时创建的事务。这会导致消息重新投递。第二次调用 `preprocess()` 时不会抛出异常，消息在第二次尝试时被持久化并随后提交。\n\n\
  *请注意，如果我们在消息持久化后的 postprocess() 中模拟错误，结果将再次导致数据库中出现重复消息。* 但我们将跳过此示例，因为我们已经用 JMS\
  \ 事务覆盖了重复场景。\n\n处理重复消息\n\n即使采用了我们提到的所有可靠性机制，某些场景仍然可能导致消息丢失或重复。Spring 无法抽象出 JMS 与其他事务性存储选项集成的所有问题，但会尽力降低失败的可能性。\n\
  \n因此，如果我们的 JMS 消息接收基于确认模式（尤其是 `AUTO_ACKNOWLEDGE`），建议使用 `SimpleMessageListenerContainer`\
  \ 或 `SimpleJmsListenerContainerFactory`。如果我们使用 JMS 事务进行消息接收，最合适的实现是 `DefaultMessageListenerContainer`\
  \ 或 `DefaultJmsListenerContainerFactory`。\n\n还有另一个我们尚未提及的选项，它能在各种事务性数据存储之间提供 ACID\
  \ 特性。该选项基于分布式 JTA 事务，将在下一章中描述。然而，它资源消耗大，且被广泛认为是显著的性能杀手。因此，每个程序员都应尽可能避免使用它。幸运的是，存在一些无需分布式事务即可确保不丢失消息或避免重复的选项。但首先，我们需要考虑各种因素。\n\
  \n首先，我们需要知道目标存储是否具有幂等性——即它能否处理重复消息而不产生不一致的状态。当存储具有幂等性时，我们可以使用本章中的任何重复场景示例，JMS 与数据库之间的集成将是安全的。\n\
  \n当我们没有这种能够检测重复的智能存储时，情况就会变得更加复杂。下一个示例将解释如何处理这种场景。我们复用了清单 6-27 中上一个示例的通用主程序、发送者实现以及基于\
  \ `JmsTransactionManager` 的 JMS 配置。此示例的监听器如清单 6-28 所示。\n\n***清单 6-28***. 处理消息持久化后出现错误的重复场景的监听器类\
  \ (0614-handle-duplicates-error-after)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
  \nimport javax.jms.JMSException;\nimport javax.jms.Message;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  import org.springframework.transaction.annotation.Transactional;\n\n@Component\n\
  public class SimpleMessageListener {\n  private SimpleService simpleService;\n\n\
  @Autowired\n  public SimpleMessageListener(SimpleService simpleService) {\n    super();\n\
      this.simpleService = simpleService;\n  }\n\n@Transactional\n  @JmsListener(destination\
  \ = \"messageQueue\")\n  public void readMessage(String messageText, Message message)\n\
        throws JMSException {\n    if (message.getJMSRedelivered()) {\n      processIfNeeded(messageText);\n\
      } else {\n      simpleService.processText(messageText);\n      postprocess(messageText);\n\
      }\n  }\n\nprivate void processIfNeeded(String messageText) {\n    if (!simpleService.isProcessed(messageText))\
  \ {\n      simpleService.processText(messageText);\n    }\n  }\n\nprivate void postprocess(String\
  \ messageText) {\n    // 模拟错误\n    throw new IllegalArgumentException(messageText);\n\
    }\n}\n```\n\n在事务性监听器方法 `readMessage` 中，我们注入了消息文本和 `javax.jms.Message` 实例。需要消息实例来调用\
  \ `message.getJMSRedelivered()`，该方法用于判断此消息是否为重新投递。此外，还有一个名为 `processIfNeeded()`\
  \ 的新私有方法。该方法首先验证消息是否已被处理；如果未处理，则调用 `simpleMessage.processText()` 进行持久化。\n\n因此，完整的逻辑如下：如果消息是重新投递的，则仅在需要时处理它；如果不是，则直接处理。你可能会问：“为什么我们不总是调用\
  \ `processIfNeeded()`，而无需关心 `message.getJMSRedelivered()` 检查呢？”原因很简单。检查消息是否已被处理是对外部系统的一次额外调用，通常*代价高昂*，而消息重新投递非常罕见，因此我们可以通过先检查消息是否被重新投递，再检查它是否已被处理/持久化，来消除大部分不必要的调用。\n\
  \n让我们通过图 6-10 中的时序图来探索其行为。\n\n![9781484207949_Fig06-10.jpg](img/9781484207949_Fig06-10.jpg)\n\
  \n\n\n图 6-10. 处理重复消息的第一个示例的时序图（位于示例项目 0614-handle-duplicates-error-after 的 uml-diagrams\
  \ 文件夹中的 sequence.uml 文件）\n\n如果消息是首次投递，`message.getJMSRedelivered()` 返回 `false`，并将执行流程发送到\
  \ `else` 部分，在该部分中消息被持久化。接着，调用 `postprocess()` 方法，该方法模拟一个错误。在此阶段，消息已被处理，但尚未提交到 JMS\
  \ 目标。\n\n因此，该消息会再次重新投递给我们的监听器。但此时，`message.getJMSRedelivered()` 返回 `true`，因此我们的逻辑会调用\
  \ `processIfNeeded()`。由于消息已被处理，持久化步骤被跳过，消息监听器调用结束，消息被提交。\n\n我们再来看看如果在消息持久化之前模拟错误会发生什么。请参考代码清单\
  \ 6-29。\n\n***代码清单 6-29***. 处理重复消息的监听器类，涵盖消息持久化前出现错误的场景（0615-handle-duplicates-error-before）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.JMSException;\n\
  import javax.jms.Message;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
  import org.springframework.transaction.annotation.Transactional;\n\n@Component\n\
  public class SimpleMessageListener {\n  private SimpleService simpleService;\n\n\
  @Autowired\n  public SimpleMessageListener(SimpleService simpleService) {\n    super();\n\
      this.simpleService = simpleService;\n  }\n\n@Transactional\n  @JmsListener(destination\
  \ = \"messageQueue\")\n  public void readMessage(String messageText, Message message)\n\
        throws JMSException {\n    if (message.getJMSRedelivered()) {\n      processIfNeeded(messageText);\n\
      } else {\n      preprocess(messageText);\n      simpleService.processText(messageText);\n\
      }\n  }\n\nprivate void processIfNeeded(String messageText) {\n    if (!simpleService.isProcessed(messageText))\
  \ {\n      simpleService.processText(messageText);\n    }\n  }\n\nprivate void preprocess(String\
  \ messageText) {\n    // simulate error\n    throw new IllegalArgumentException(messageText);\n\
    }\n}\n```\n\n请注意，在此场景中，错误是在监听器方法 `readMessage()` 中调用 `simpleService.processText()`\
  \ 之前模拟的。该场景的时序图如图 6-11 所示。\n\n![9781484207949_Fig06-11.jpg](img/9781484207949_Fig06-11.jpg)\n\
  \n图 6-11. 处理重复消息的第一个示例的时序图（位于示例项目 0615-handle-duplicates-error-before 的 uml-diagrams\
  \ 文件夹中的 sequence.uml 文件）\n\n首次接收到消息后，`message.getJMSRedelivered()` 返回 `false`；随后\
  \ `else` 部分中的 `preprocess()` 抛出了消息。`readMessage()` 方法的处理失败，消息在未持久化的情况下被回滚。\n\n消息重新投递后，`message.getJMSRedelivered()`\
  \ 返回 `true`，因此调用了 `processIfNeeded()` 方法。在此情况下，我们检查到 `simpleService.isProcessed()`\
  \ 为 false；于是我们调用 `simpleService.processText()`。最终，我们也恰好持久化了一条消息，符合预期。\n\n总结\n\n\
  本章解释了 JMS 消息传递具有多种机制来处理安全的消息投递。我们列出了 JMS API 提供的所有投递确认和事务模式，并强调了使用该 API 可能带来的繁琐性。\n\
  \n接着，我们探讨了如何将这些机制与 Spring 结合使用，并涵盖了各种成功和失败的场景，因为如果不小心，在我们集成 JMS 的系统中，消息很容易丢失或重复。\n\
  \n我们还强调，如果不使用分布式事务，就无法跨多个事务系统获得 ACID 特性。但我们也解释了如何在不使用分布式事务的情况下优雅地处理这个问题。因此，我们现在知道了如何处理\
  \ JMS 与其他事务性存储的集成，从而可靠地避免资源昂贵的分布式事务。\n\n第 7 章\n\n![image](img/frontdot.jpg)\n\n\
  分布式事务\n\n第 6 章涵盖了 Java 和 Spring 平台为事务性数据源（例如关系数据库）或 JMS 提供者提供的 ACID 特性（原子性、一致性、隔离性和持久性）。针对单一数据源的事务通常被称为*本地事务*。但单一数据源并非这种支持的终点。有时，我们可能需要确保跨多种类型存储的单一\
  \ ACID 事务。\n\nJava（以及 Spring 的抽象层）提供了对跨多个数据源的单一事务的支持。这被称为*分布式事务*，有时也称为*全局事务*。这种事务通常超越单个服务器或网络主机的边界，并且必须在这些数据存储或\
  \ JMS 服务器之间进行同步。\n\n理解分布式事务\n\n假设我们有一个 PostgreSQL 数据库和一个 HornetQ JMS 服务器。当我们在这些存储之上分布事务时，我们可以开始从\
  \ HornetQ JMS 目标读取消息，并通过 JDBC 将它们插入到 PostgreSQL 存储中。如果某个插入语句失败，我们可以确保消息不会丢失，因为事务管理器将确保在此全局事务中执行的\
  \ JMS 操作被回滚。\n\n可以想象，这种支持实现起来并不简单；需要具备多种机制才能使分布式事务成为可能。首先，需要一个特殊的*全局事务管理器*来协调跨多个事务性存储的分布式事务。该事务管理器需要符合\
  \ *Java 事务 API (JTA)*。该 API 定义了分布式事务划分的机制。\n\n我们还需要确保参与全局事务的每个存储都支持 *XA 标准*（扩展架构标准）。该标准由\
  \ The Open Group（前身为 X/Open）制定，这是一个由多个专注于开放 Unix 系统标准的成员组织组成的联盟（`www.opengroup.org`）。\n\
  \nXA 标准规定了*全局事务管理器与本地事务管理器之间的接口*，以便能够参与 ACID 全局事务。一个符合 XA 标准的本地事务管理器需要有一个符合 JTA\
  \ 标准的全局事务管理器与之协作。你可以将 XA 视为本地事务管理器（处理单一数据源事务的管理器）与 JTA 全局事务管理器（协调本地管理器以在全局事务中协作的管理器）之间的桥梁。所以，长话短说，*XA\
  \ 需要 JTA* 才能正常工作。这些标准之间的协作通过*两阶段提交算法/协议*来确保，该协议按以下阶段工作：\n\n\n\n1.  提交请求阶段（投票阶段）\n\
  \    1.  全局事务管理器（也称为*协调者*）向所有 XA 本地事务管理器（也称为*XA 存储*或*参与者*）询问是否需要执行提交或回滚。\n    2.\
  \  如果参与者决定提交事务，则参与者应等待全局事务管理器的指令，并且不对底层存储执行任何额外操作。\n    3.  参与者可以决定回滚事务，并将此意图告知全局事务管理器。\n\
  2.  提交阶段\n    *   d. 全局事务管理器根据所有响应，决定所有参与者（本地事务管理器）是否需要提交或回滚。\n    *   e. 本地事务管理器执行全局事务管理器指令的操作（提交或回滚）。\n\
  \n该算法涉及多个步骤，可能难以想象。图 7-1 和图 7-2 提供了该算法成功和失败场景的时序图。\n\n![9781484207949_Fig07-01.jpg](img/9781484207949_Fig07-01.jpg)\n\
  \n图 7-1. JTA 事务的成功场景\n\n![9781484207949_Fig07-02.jpg](img/9781484207949_Fig07-02.jpg)\n\
  \n图 7-2. JTA 事务的失败场景\n\n显然，该算法需要大量仪式性操作才能跨多个数据源实现 ACID 事务边界。我们必须强调，前面的图仅描绘了包含两个数据源的场景。如果添加更多数据源，仪式性操作的数量将成倍增加。\n\
  \n重要的是要记住，JTA 是 Java 企业版的一部分标准。因此，存在多种 JTA 和全局事务管理器的实现。这些实现可以是独立的，也可以是 Java EE 应用服务器的一部分。事实上，如果我们使用嵌入在应用服务器中的\
  \ Java EE 事务管理，我们可以直接获得这种支持。\n\n因此，JTA 提供商的列表将包括每个符合 Java EE 规范的应用服务器。此外，主要的独立提供商如下：\n\
  \n*   Atomikos (`www.atomikos.com`)\n*   Bitronix JTA (`https://github.com/bitronix/btm`)\n\
  \n分布式事务的缺点\n\n分布式事务功能强大。我们可以想象它能够神奇地解决前一章中描述的所有可能问题（包括重复数据和数据丢失）。但这种机制有显著的性能开销；如果我们将涵盖多个数据源（两个、三个甚至更多）及其所涉及多个阶段的两阶段提交纳入考量，这种分布式事务的性能可能会非常慢。\n\
  \n这对于分布式系统中要求的高性能来说，通常意味着一个巨大的问题。因此，这些系统的架构师常常试图避免使用两阶段提交。通常，更明智的做法是使用第 6 章末尾描述的方法来处理独立数据源的提交，即我们显式检查重复项。但有时需求迫使我们使用分布式事务。\n\
  \n性能降低是两阶段提交算法最大但并非唯一的问题。此类事务涉及太多部分，任何本地事务管理器或全局事务管理器的故障都可能破坏整个事务。此外，想象一下在提交请求阶段之后全局事务管理器发生故障的情况，此时所有本地事务管理器都无法执行任何操作，只能等待它。它们将一直等待，直到超时发生（如果有超时机制的话）。\n\
  \n另一个问题是监控全局事务。如果我们想进行故障排除，常见的方法是记录通信中涉及的各方日志。但分布式事务中至少涉及三方（一个全局事务管理器和两个本地事务管理器），并且每一方都会为每个阶段创建至少一条日志条目。如果为生产系统启用了日志记录，则会增加大量日志记录开销，处理速度会变得更慢。\n\
  \n因此，我们可以看到有很多理由应该尽量避免使用分布式事务。\n\n使用 Spring 的分布式事务\n\n配置和实现分布式事务并非易事。但我们可以通过使用 Spring\
  \ 的抽象来避免这种复杂性。这种方法高度依赖于对 Spring 事务支持的理解。\n\n这种支持由一个名为`spring-tx`的核心模块提供。它提供了通用接口`PlatformTransactionManager`，该接口支持基于`@Transactional`注解进行事务划分。`spring-tx`模块功能强大，是我们在处理事务性数据库或\
  \ JMS 提供者时 Spring 的主要旗舰特性之一。\n\n![Image](img/sq.jpg) **注意** Spring 事务支持不属于 Spring\
  \ 企业集成认证的一部分。因此，它超出了本书的范围。但此知识对于理解使用 Spring 的分布式事务至关重要，并且是 Spring 核心认证的一部分。我将在此提及一个简单的黄金法则：Spring\
  \ 管理的事务始于被`@Transactional`注解包裹的类或公共方法，并在代码离开此包裹逻辑时结束。但请记住，`@Transactional`注解具有多种属性，可以显著改变事务边界。\n\
  \n实际上，相同的 API 能够处理分布式事务。Spring 提供了`PlatformTransactionManager`接口的`JtaTransactionManager`实现，从而启用了这种支持。但请记住，`JtaTransactionManager`本身并没有为我们提供完全符合\
  \ JTA 规范的全局事务管理器实现。它只是一个运行在 Java EE 或独立 JTA 事务管理器实现（例如 Atomikos 或 Bitronix JTA）之上的包装器。因此，仅靠\
  \ Spring 本身并不能提供这种支持。这是明智的，因为既然没有必要，Spring 为什么要重新发明轮子呢？Spring 利用现有的实现，并将它们置于`JtaTransactionManager`包装器的保护伞下。\n\
  \n此接口的主要含义是，当我们的事务性业务代码被标记为`@Transactional`时，它不需要知道我们正在使用分布式事务。我们只需要配置由 JTA 实现支持的`JtaTransactionManager`，并使用各种\
  \ XA 数据源来跨它们获得 ACID 事务特性。\n\n当 Java EE 服务器强制平台上存在 JTA 事务管理器时，它们存在缺点。使用 Spring，我们可以简单地更改配置来打开或关闭此支持。`@Transactional`注解边界指定了事务的开始，无论是全局事务还是本地事务。这将在本章的示例中看到。\n\
  \nJTA 示例的通用类\n\n为了演示使用 Spring 跨多个数据源的分布式事务的 ACID 特性，我们将在与前一章存在消息重复或丢失问题的示例类似的示例上应用\
  \ JTA 事务管理器。我们将在本章的所有示例中使用几个通用类。第一个，在清单 7-1 中，是位于 DAO 层的仓库类。\n\n***清单 7-1***. 用于\
  \ JTA 示例的仓库类 (0700-jta-common)\n\n```\npackage net.lkrnac.book.eiws.chapter07;\n\
  ```\n\n\n```java\nimport javax.annotation.PostConstruct;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.stereotype.Repository;\n\
  \n@Repository\npublic class SimpleRepository {\n  private final JdbcTemplate jdbcTemplate;\n\
  \n  @Autowired\n  public SimpleRepository(JdbcTemplate jdbcTemplate) {\n    super();\n\
  \    this.jdbcTemplate = jdbcTemplate;\n  }\n\n  @PostConstruct\n  public void initDbTable()\
  \ {\n    jdbcTemplate.execute(\"drop table TEXT_TABLE if exists\");\n    jdbcTemplate.execute(\"\
  create table TEXT_TABLE(TEXT varchar(30))\");\n  }\n\n  public void persistText(String\
  \ text) {\n    jdbcTemplate.update(\"insert into TEXT_TABLE values (?)\", text);\n\
  \  }\n}\n```\n\n该类与第 6 章中的 DAO 类似。唯一的区别是缺少查询已存储文本条目数量的功能。`@Repository` 注解将该类标记为位于持久化层的\
  \ Spring Bean。为了执行 JDBC 查询，它通过构造函数注入了 `JdbcTemplate` 实例。\n\n`initDbTable()` 方法在\
  \ Spring 上下文初始化后创建一个新表。`@PostConstruct` 注解确保该方法在此阶段执行。这种构造对于关系型数据库来说显然不典型，但在本例中，我们使用的是内存数据库，并且希望在每个应用程序运行时，该数据库对于示例来说是空的。\n\
  \n`persistText()` 方法用于将给定的文本插入到内存数据库中。清单 7-2 展示了用于处理文本消息的服务层类。\n\n***清单 7-2***.\
  \ 用于 JTA 示例的服务类 (0700-jta-common)\n\n```java\npackage net.lkrnac.book.eiws.chapter07;\n\
  \nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\n\n@Slf4j\n@Service\npublic class\
  \ SimpleService {\n  private final SimpleRepository simpleRepository;\n\n  @Autowired\n\
  \  public SimpleService(SimpleRepository simpleRepository) {\n    super();\n   \
  \ this.simpleRepository = simpleRepository;\n  }\n\n  public void processText(String\
  \ text) {\n    log.info(\"Process Message: {}\", text);\n    simpleRepository.persistText(text);\n\
  \  }\n}\n```\n\n同样，该服务与前一章中的服务类似。唯一的区别是缺少用于读取已存储文本记录数量的方法。`@Service` 注解将此 Spring\
  \ Bean 置于服务层。`@Slf4j` 注解是 Lombok 的一个特性，用于方便地访问 SLF4J 日志记录器。通过构造函数注入 `SimpleRepository`\
  \ 实例，可以启用 DAO Bean 实例的使用。\n\n请注意，我们没有为这些类中的任何一个使用 `@Transactional` 注解，因为我们计划将 JMS\
  \ 数据源也包含在全局事务边界内。因此，JMS 数据源将在使用 `SimpleService` 的组件中使用。\n\n在示例中，`processText()`\
  \ 方法用于处理文本消息，通过记录给定的消息并使用 `simpleRepository` Bean 进行持久化。JTA 示例中共享的最后一个类如清单 7-3 所示。\n\
  \n***清单 7-3***. JTA 示例使用的 JMS 消息发送器 (0700-jta-common)\n\n```java\npackage net.lkrnac.book.eiws.chapter07;\n\
  import javax.jms.ConnectionFactory;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class SimpleMessageSender {\n  private static final\
  \ String SIMPLE_MESSAGE = \"simple message\";\n  private final JmsTemplate jmsTemplate;\n\
  \n  @Autowired\n  public SimpleMessageSender(\n      @Qualifier(\"nonXaJmsConnectionFactory\"\
  ) ConnectionFactory nonXaConnectionFactory) {\n    super();\n    jmsTemplate = new\
  \ JmsTemplate(nonXaConnectionFactory);\n  }\n\n  @Scheduled(initialDelay = 1000,\
  \ fixedRate = Long.MAX_VALUE)\n  public void send() {\n    log.info(\"Sending message:\
  \ {}\", SIMPLE_MESSAGE);\n    jmsTemplate.convertAndSend(\"ExpiryQueue\", SIMPLE_MESSAGE);\n\
  \  }\n}\n```\n\n你可能注意到，这个发送器与前一章中的类似，但有一些不同之处。首先，我们没有使用 `@PostConstruct` 注解来触发消息的发送。这是因为在创建这个\
  \ `SimpleMessageSender` Bean 之后，JTA 配置有时启动得不够快，因此在此示例中，发送消息必须等待配置完成。在实际应用中，这种发送将由使用我们应用程序的外部系统触发。因此，对于这个示例，我们可以依赖带有\
  \ `initialDelay` 的调度，它会在上下文创建后延迟发送示例消息。调度属性 `fixedRate` 被配置为 `Long.MAX_VALUE`，以确保在\
  \ JTA 示例执行期间不会发送第二条消息。\n\n与前一章示例的第二个区别是，注入了 `nonXaConnectionFactory` 而不是 `jmsTemplate`\
  \ Bean。这是因为我们希望消息发送器独立于 JTA 事务。因此，在接下来的示例中，我们将与符合 XA 标准的 JMS `connectionFactory`\
  \ 一起，创建一个 `nonXaConnectionFactory` Bean，它绕过了 JTA 的流程。请记住，在实际应用中，这个发送器不会放在我们的消息消费应用程序中。\n\
  \n其他构造应该很熟悉。通过构造函数注入 `JmsTemplate` 可以启用用于发送消息的 Spring Bean。`send()` 方法本身首先记录消息正在发送的事实，然后执行此操作。\n\
  \n### 使用 XML 配置的 Spring JTA 示例\n\n我们与 Spring 集成的第一个 JTA 示例主要基于 XML 配置。无需为其引入新的 XML\
  \ 命名空间，因为我们在非 JEE 环境中操作。如果我们的应用程序部署到 JEE 容器中，我们会使用 `jee` 命名空间。首先，我们需要将 Atomikos\
  \ 配置为 Spring 应用程序的 JTA 事务管理器。清单 7-4 展示了此 XML 配置。\n\n***清单 7-4***. JTA 相关 Bean 的\
  \ XML 配置（文件 spring-jta-config.xml 位于示例项目 0701-jta-xml-config 的 src/main/resources\
  \ 文件夹中）\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:tx=\"http://www.springframework.org/schema/tx\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
  \    http://www.springframework.org/schema/tx\n    http://www.springframework.org/schema/tx/spring-tx.xsd\"\
  >\n\n<tx:annotation-driven transaction-manager=\"transactionManager\"/>\n\n<bean\
  \ id=\"userTransactionManager\" class=\"com.atomikos.icatch.jta.UserTransactionManager\"\
  \n      init-method=\"init\" destroy-method=\"close\"/>\n\n<bean id=\"transactionManager\"\
  \n      class=\"org.springframework.transaction.jta.JtaTransactionManager\">\n \
  \   <property name=\"transactionManager\" ref=\"userTransactionManager\"/>\n   \
  \ <property name=\"userTransaction\" ref=\"userTransactionManager\"/>\n  </bean>\n\
  </beans>\n```\n\n\n\n在此配置中，我们使用 `tx` 命名空间在 JTA 事务管理器的框架下启用 `@Transactional` 注解。JTA\
  \ Bean 的定义随后使用 `bean` 命名空间。我们需要创建的第一个 Bean 是 `com.atomikos.icatch.jta.UserTransactionManager`，作为全局事务管理器。我们之前提到过，Spring\
  \ 本身不具备 JTA 能力，因此需要借助外部 JTA 框架。\n\n为了将 Atomikos 全局事务管理器作为 `PlatformTransactionManager`\
  \ 集成到 Spring 应用中，我们需要将其包装到 Spring 的 `JtaTransactionManager` 中。这使我们能够在 Atomikos 实现的基础上利用\
  \ Spring 的事务 JTA 支持。一个重要的配置步骤是创建 `com.atomikos.icatch.jta.UserTransactionImp`，它用于启动\
  \ Atomikos 事务服务。在 Java SE 环境中进行此配置非常重要。对于 Java EE 驱动的应用，我们会使用 `com.atomikos.icatch.jta.J2eeUserTransaction`。\n\
  \n清单 7-5 展示了 JDBC 数据源的配置。\n\n***清单 7-5***. JDBC XA 数据源的 XML 配置（文件位于示例项目 0701-jta-xml-config\
  \ 的 src/main/resources 文件夹中的 spring-jdbc-config.xml）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<bean id=\"dataSource\" class=\"com.atomikos.jdbc.AtomikosDataSourceBean\"\
  >\n    <property name=\"uniqueResourceName\" value=\"jdbcDataSource\" />\n    <property\
  \ name=\"xaDataSource\">\n      <bean class=\"org.h2.jdbcx.JdbcDataSource\">\n        <property\
  \ name=\"url\"\n          value=\"jdbc:h2:mem:testdb\"/>\n        <property name=\"\
  user\" value=\"sa\"/>\n      </bean>\n    </property>\n  </bean>\n\n<bean id=\"\
  jdbcTemplate\" class=\"org.springframework.jdbc.core.JdbcTemplate\">\n    <property\
  \ name=\"dataSource\" ref=\"dataSource\"/>\n  </bean>\n</beans>\n```\n\n这里我们仅使用\
  \ Spring XML 的 `bean` 命名空间来定义 Spring Bean。首先，我们基于 Atomikos 提供的 `com.atomikos.jdbc.AtomikosDataSourceBean`\
  \ 实现创建一个 XA 数据源 Bean。需要此实现才能与 JTA 全局事务管理器正常协作。`uniqueResourceName` 是一个必填参数，当应用中存在多个此类型的\
  \ XA 数据源时，该值必须唯一。因此，在我们的示例中，值 `jdbcDataSource` 完全合适。\n\n在 `xaDataSource` 属性中，我们包装了本地数据源实现。需要此包装器，以便经典的\
  \ JDBC 数据源能够参与全局事务。在此例中，我们使用了一个内存中的 H2 数据库引擎，正如经典 JDBC 数据源中所提到的。我们还需要将此 Bean 包装到\
  \ `JdbcTemplate` Bean 中，以便在此 XA 数据源之上启用 Spring JDBC 支持。因此，`JdbcTemplate` 并不知道它正在处理一个\
  \ XA 数据源。清单 7-6 展示了 JMS 配置。\n\n***清单 7-6***. JMS XA 数据源的 XML 配置（文件位于示例项目 0701-jta-xml-config\
  \ 的 src/main/resources 文件夹中的 spring-jms-config.xml）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:jee=\"http://www.springframework.org/schema/jee\"\
  \n  xmlns:util=\"http://www.springframework.org/schema/util\"\n  xmlns:jms=\"http://www.springframework.org/schema/jms\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/jms\n    http://www.springframework.org/schema/jms/spring-jms.xsd\n\
      http://www.springframework.org/schema/jee\n    http://www.springframework.org/schema/jee/spring-jee.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/util\n    http://www.springframework.org/schema/util/spring-util.xsd\"\
  >\n\n<util:map id=\"jndiProperties\" map-class=\"java.util.Properties\">\n    <entry\
  \ key=\"java.naming.factory.initial\"\n      value=\"org.jnp.interfaces.NamingContextFactory\"\
  \ />\n    <entry key=\"java.naming.factory.url.pkgs\"\n      value=\"org.jboss.naming:org.jnp.interfaces\"\
  \ />\n    <entry key=\"java.naming.provider.url\" value=\"jnp://localhost:1099\"\
  \ />\n  </util:map>\n\n<jee:jndi-lookup id=\" \" jndi-name=\"/ConnectionFactory\"\
  \n    environment-ref=\"jndiProperties\" />\n  <jee:jndi-lookup id=\"connectionFactory\"\
  \ jndi-name=\"/XAConnectionFactory\"\n    environment-ref=\"jndiProperties\" />\n\
    <jee:jndi-lookup id=\"queue\" jndi-name=\"/queue/ExpiryQueue\"\n    environment-ref=\"\
  jndiProperties\" />\n\n<bean id=\"jmsTemplate\" class=\"org.springframework.jms.core.JmsTemplate\"\
  >\n    <constructor-arg ref=\"connectionFactory\" />\n  </bean>\n\n<bean id=\"destinationResolver\"\
  \n    class=\"org.springframework.jms.support.destination.JndiDestinationResolver\"\
  >\n    <property name=\"jndiEnvironment\" ref=\"jndiProperties\" />\n  </bean>\n\
  \n<jms:listener-container transaction-manager=\"transactionManager\" acknowledge=\"\
  transacted\"\n      destination-resolver=\"destinationResolver\">\n    <jms:listener\
  \ destination=\"/queue/ExpiryQueue\" ref=\"simpleMessageListener\"\n      method=\"\
  readMessage\" />\n  </jms:listener-container>\n</beans>\n```\n\n在此例中，我们使用了多种 Spring\
  \ XML 命名空间。`util` 命名空间帮助我们为 HornetQ 连接定义必要的 JNDI 属性，而 `jee` 命名空间则用于对这些属性进行 JNDI\
  \ 查找。我们在前一章已经见过这种配置。但此示例使用了连接工厂 Bean；请注意，默认的 HornetQ 配置包含 `XAConfigurationFactory`\
  \ 以及普通的 `ConfigurationFactory`。使用 `XAConnectionFactory` 可确保 `connectionFactory`\
  \ JMS 数据源符合 XA 标准，从而能够参与全局事务。`nonXaJmsConnectionFactory` Bean 被 `SimpleMessageSender`\
  \ Bean 用于为 JTA 示例发送消息。此连接工厂不参与 JTA 事务，否则会混淆示例的行为。\n\nHornetQ JMS 服务器在其默认配置中同时指定了这两个连接工厂。第\
  \ 6 章 解释了下载并启动 HornetQ 服务器是多么简单。因此，如果你感兴趣，可以在配置文件 `<hornet>/config/stand-alone/non-clustered/hornetq-jms.xml`\
  \ 中找到 `XAConnectionFactory` 和 `ConnectionFactory` 的默认配置。\n\n下一步是将此连接工厂包装到 `JmsTemplate`\
  \ Bean 中。这使我们能够发送（或同步接收）JMS 消息。需要 `DestinationResolver` Bean 来配合 JNDI 查找属性，以找到我们计划发送和读取的\
  \ JMS 目标。\n\n\n\n最后，我们使用 `jms` Spring 命名空间来配置 JMS 监听器插件的 JMS 监听器 Bean。请注意，我们在此监听器容器上使用了\
  \ `transactionManager` 属性。这使得监听器容器能够提供全局事务支持。另一个重要属性是在 `acknowledge` 属性中启用了事务性确认模式。如果没有此配置，监听器将不具备事务性，因此会忽略所有事务管理器。此配置也是我们无需启用\
  \ `<tx:transaction-driven>` 来在 `SimpleMessageSender` 上启用 `@Transactional` 注解的原因。在本例中，我们并未使用此注解。\n\
  \n由于监听器方法已配置好，`readMessage()` 在清单 7-7 所示的 `simpleMessageListener` Bean 中实现。\n\n\
  ***清单 7-7***. 模拟处理错误以突出 JTA 支持的 JMS 监听器 (0701-jta-xml-config)\n\n```\npackage net.lkrnac.book.eiws.chapter07;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\n@Transactional\npublic class SimpleMessageListener {\n  private SimpleService\
  \ simpleService;\n  private boolean errorSimulated = false;\n\n@Autowired\n  public\
  \ SimpleMessageListener(SimpleService simpleService) {\n    super();\n    this.simpleService\
  \ = simpleService;\n  }\n\npublic void readMessage(String message) {\n    simpleService.processText(message);\n\
      postprocess(message);\n  }\n\nprivate void postprocess(String message) {\n    //\
  \ 模拟错误\n    if (!errorSimulated) {\n      errorSimulated = true;\n      throw new\
  \ IllegalArgumentException(message);\n    }\n  }\n}\n```\n\n`@Component` 注解将此类注册为\
  \ Spring Bean。它通过构造函数注入注入了 `SimpleService` Bean。`readMessage()` 方法用于监听清单 7-6 中 JMS\
  \ 配置的 JMS 消息。该清单中的 JMS 监听器容器被配置为参与全局事务，因此我们通过 `@Transactional` 注解覆盖了此 Bean，该注解参与了全局\
  \ JTA 事务（包括 JMS 和底层 JDBC 数据源）。\n\n此方法首先调用 `SimpleService` 来处理消息，这意味着将其持久化到 H2 内存数据库中。之后，我们模拟一个错误，但仅针对接收到的第一条消息。\n\
  \n请注意，类似的实现已在第 6 章的清单 6-28 中展示过，当时我们讨论了如果事务性 JMS 监听器发生错误，可能会出现重复消息。在那种情况下，其行为如图\
  \ 6-9 所示，最终导致数据库中持久化了重复的消息。\n\n清单 7-8 展示了此示例的主类。\n\n***清单 7-8***. XML 配置示例的主类 (0701-jta-xml-config)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter07;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.context.annotation.ImportResource;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.scheduling.annotation.EnableScheduling;\nimport org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  \n@Configuration\n@ComponentScan\n@EnableJms\n@EnableScheduling\n@ImportResource(value\
  \ = { \"classpath:spring-jdbc-config.xml\",\n    \"classpath:spring-jta-config.xml\"\
  , \"classpath:spring-jms-config.xml\" })\npublic class JtaApplication {\n  public\
  \ static void main(String[] args) throws Exception {\n    SpringApplication.run(JtaApplication.class,\
  \ args);\n  }\n}\n```\n\n此类利用 Spring Boot 的构造，基于 `main` 方法启动应用程序。它允许我们将此示例用作可执行\
  \ JAR，这是 Spring Boot 引入的特性。但在本例中，我们并未使用自动配置功能，因为我们希望突出展示使用 JTA 的纯 Spring 配置。\n\n\
  因此，我们必须分别启用每个 Spring 特性：\n\n*   通过 `@ComponentScan` 注解在当前包及其子包中进行组件扫描\n*   通过 `@EnableJms`\
  \ 注解启用 Spring JMS\n*   通过 `@EnableScheduling` 注解启用 Spring 调度支持，用于发送消息（参见清单 7-3）\n\
  *   导入此示例中解释的所有 XML 配置\n\n运行此示例后，我们可以在清单 7-9 中观察输出。\n\n***清单 7-9***. XML JTA 示例的输出\n\
