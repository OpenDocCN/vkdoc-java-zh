  \ 展示了 `Job` 实现的另一种风格。\n\n***清单 9-72***. JobListener 接口实现 (0918-job-listener-javaconfig)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  import org.springframework.batch.core.JobExecution;\nimport org.springframework.batch.core.JobExecutionListener;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class TeaJobListener implements JobExecutionListener {\n  private\
  \ SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public TeaJobListener(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    }\n\n@Override\n  public void beforeJob(JobExecution jobExecution) {\n    executablePoint.execute(\"\
  It’s tea time!\");\n  }\n\n@Override\n  public void afterJob(JobExecution jobExecution)\
  \ {\n    executablePoint.execute(\"Enjoy your tea!\");\n  }\n}\n```\n\n\n\n该监听器实现了\
  \ `JobExecutionListener` 接口，因此拦截方法必须遵循其契约。在这种情况下，我们无法更改方法名称。`jobExecution` 参数也由接口契约强制规定。该实例可用于方便地访问\
  \ SB 元数据。清单 9-73 展示了批处理流程的 Java 配置。\n\n***清单 9-73***. JobExecutionListener 的 Java\
  \ 配置 (0918-job-listener-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
