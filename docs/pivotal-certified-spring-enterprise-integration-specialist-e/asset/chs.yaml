  \n图 8-6。通用转换器流的可视化\n\n使用 Java 配置的通用转换器示例\n\n现在让我们深入了解基于 Java 注解的相同流程。清单 8-39 展示了转换器配置。\n\
  \n***清单 8-39***。使用 Java 配置的通用转换器 (0812-transformer-generic-javaconfig)\n\n```\n\
  package net.lkrnac.book.eiws.chapter08;\nimport org.springframework.integration.annotation.MessageEndpoint;\n\
  import org.springframework.integration.annotation.Transformer;\n\n@MessageEndpoint\n\
  public class SimpleMessageTransformer {\n  @Transformer(inputChannel = \"inChannel\"\
  , outputChannel = \"transformedChannel\")\n  public String transformMessage(String\
  \ message) {\n    return new String(message + \" transformed\");\n  }\n}\n```\n\n\
  \n\n转换器的逻辑与之前的示例 `0811-transformer-generic-xml`（见清单 8-35）相同，但在此例中，我们使用 `@MessagingEndpoint`\
  \ 注解标注了该类，使其符合集成组件扫描的条件。转换方法使用 `@Transformer` 注解标注，并且我们还需要指定必填属性 `inputChannel`\
  \ 和 `outputChannel`。清单 8-40 展示了 SI 配置类。\n\n***清单 8-40***. 通用转换器示例的 SI 配置类 (0812-transformer-generic-javaconfig)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.annotation.IntegrationComponentScan;\n\
  import org.springframework.integration.channel.DirectChannel;\nimport org.springframework.messaging.MessageChannel;\n\
  \n@Configuration\n@IntegrationComponentScan\npublic class SiConfiguration {\n  @Bean\n\
    public MessageChannel inChannel() {\n    return new DirectChannel();\n  }\n\n\
  @Bean\n  public MessageChannel transformedChannel() {\n    return new DirectChannel();\n\
    }\n}\n```\n\n该配置类基于 `@IntegrationComponentScan` 注解启用了 SI 组件扫描，这是扫描 `SimpleMessageTransformer`\
  \ 所必需的。它注册了 SI 流程中使用的两个通道：`inChannel` 和 `transformedChannel`。清单 8-41 展示了注解式服务激活器的配置。\n\
  \n***清单 8-41***. 通用转换器示例中使用的服务激活器 (0812-transformer-generic-javaconfig)\n\n```\n\
  package net.lkrnac.book.eiws.chapter08.out;\nimport net.lkrnac.book.eiws.chapter08.out.WriteRepository;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.stereotype.Service;\n\n@Service\npublic class WriteServiceAnnotated\
  \ {\n  private WriteRepository writeRepository;\n\n@Autowired\n  public WriteServiceAnnotated(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    }\n\n@ServiceActivator(inputChannel = \"transformedChannel\")\n  public boolean\
  \ writeAndIndicateSuccess(String message) {\n    return writeRepository.persist(message)\
  \ == 1;\n  }\n}\n```\n\n此服务激活器与示例 `0809-gateway-generic-javaconfig`（清单 8-31）中的服务激活器类似，但有一个区别。本例中服务激活器的输入通道是\
  \ `transformedChannel`。我们还借用了同一示例中 `SiWrapperServiceAnnotated` 类的代码，以及清单 8-32 中的内容。\n\
  \n因此，集成组件扫描的链路为 `SiWrapperServiceAnnotated` ![image](img/arrow.jpg) `SimpleMessageTransformer`\
  \ ![image](img/arrow.jpg) `WriteServiceAnnotated`。清单 8-42 涵盖了此示例的主类。\n\n***清单 8-42***.\
  \ 基于 Java 配置的通用转换器主类 (0812-transformer-generic-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceAnnotated;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.ApplicationContext;\n\n@Slf4j\n@SpringBootApplication\n\
  public class SiApplication {\n  public static void main(String[] args) throws InterruptedException\
  \ {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);\n\
  \nSiWrapperServiceAnnotated wrapperService =\n        ctx.getBean(SiWrapperServiceAnnotated.class);\n\
      String text = \"simple message\";\n    log.info(\"Sending message: \" + text);\n\
      boolean result = wrapperService.processText(text);\n    log.info(\"Result: \"\
   + result);\n  }\n}\n```\n\n从上下文中读取服务接口后，我们创建消息、记录日志，并将其发送到 SI 流程。最后，我们记录此操作的结果。由于它返回一个值，因此这是一个双向的请求-响应类型流程。输出结果与\
  \ `0809-gateway-generic-javaconfig`（清单 8-38）相同。由于目前 STS 不支持对注解式 SI 流程进行可视化，因此无法展示流程的可视化效果。\n\
  \nJSON 转换器示例\n\n我们还将展示一个特定于技术的转换器示例。由于当前最常见的需求之一是将 JSON 转换为 Java 对象，我们将对此进行介绍。显然，我们需要一个对象来接收\
  \ JSON 转换结果。因此，清单 8-43 展示了 `User` 类。\n\n***清单 8-43***. JSON 转换器示例中使用的 User 类 (0813-transformer-json)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.model;\nimport lombok.Data;\n\n@Data\n\
  public class User {\n  private String email;\n  private String name;\n}\n```\n\n\
  这是一个简单的 Java POJO，其 getter 和 setter 方法由 Lombok 注解 `@Data` 生成。清单 8-44 展示了 `User`\
  \ 对象的模拟仓库。\n\n***清单 8-44***. User 对象的模拟仓库 (0813-transformer-json)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08.out;\nimport lombok.extern.slf4j.Slf4j;\nimport\
  \ net.lkrnac.book.eiws.chapter08.model.User;\nimport org.springframework.stereotype.Repository;\n\
  \n@Slf4j\n@Repository\npublic class UserRepository {\n  public void persistUser(User\
  \ user) {\n    log.info(\"Object received: \" + user);\n  }\n}\n```\n\n与我们几乎在每个示例中使用的通用\
  \ `WriteRepository` 类类似，该仓库也模拟了对给定参数（本例中为 `User` 对象）的持久化操作。清单 8-45 展示了调用此模拟仓库的服务\
  \ Bean。\n\n***清单 8-45***. 用于处理 User 对象的服务 Bean (0813-transformer-json)\n\n```\n\
  package net.lkrnac.book.eiws.chapter08.out;\nimport net.lkrnac.book.eiws.chapter08.model.User;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
  \n@Service\npublic class UserService {\n  private UserRepository userRepository;\n\
  \n@Autowired\n  public UserService(UserRepository userRepository) {\n    super();\n\
      this.userRepository = userRepository;\n  }\n\npublic void processUser(User user)\
  \ {\n    userRepository.persistUser(user);\n  }\n}\n```\n\n此服务 Bean 自动注入了一个 `UserRepository`\
  \ 实例作为依赖项。`processUser` 方法将 `User` 对象作为参数，并将其传递给 `UserRepository` 进行持久化。这与 `WriteRepository.write()`\
  \ 的模式类似。清单 8-46 最终展示了此示例的 SI 流程。\n\n***清单 8-46***. JSON 转换器示例的 SI 流程（文件 si-config.xml，位于示例项目\
  \ 0813-transformer-json 的 src/main/resources 文件夹中）\n\n\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:int-http=\"http://www.springframework.org/schema/integration/http\"\n\
    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration/http\n    http://www.springframework.org/schema/integration/http/spring-integration-http.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int-http:inbound-gateway path=\"/\" request-channel=\"jsonChannel\"\n    supported-methods=\"\
  POST\"/>\n  <int:channel id=\"jsonChannel\" />\n\n<int:json-to-object-transformer\
  \ input-channel=\"jsonChannel\"\n    output-channel=\"objectChannel\" type=\"net.lkrnac.book.eiws.chapter08.model.User\"\
  />\n  <int:channel id=\"objectChannel\" />\n\n<int:service-activator input-channel=\"\
  objectChannel\" ref=\"userService\"\n    method=\"processUser\" />\n</beans>\n```\n\
  \n如果我们要将 JSON 转换为 Java 对象，一个很好的例子就是使用 HTTP 入站网关。因此，我们将 `int-http` 命名空间包含到 XML 配置中。该入站网关映射到根\
  \ URL 的 POST HTTP 方法，并将接收到的 JSON 负载作为文本消息发送到 `jsonChannel`。\n\n该通道连接到特定的转换器 `<int:json-to-object-transformer>`。我们需要指定\
  \ `type` 属性，带有 JSON 负载的文本消息应被转换为该属性指定的类型。在本例中，它是我们的 `User` 类。Spring Integration\
  \ 在底层使用标准的 Jackson 转换器，就像使用 Spring MVC 转换一样。`output-channel` 属性也是必需的。转换后带有 `User`\
  \ 负载的新消息将被发送到该通道。\n\n最后，我们将服务激活器映射到 `UserService.processUser()`。清单 8-47 展示了 Spring\
  \ Boot 配置文件。\n\n***清单 8-47***. JSON 转换器示例的 Spring Boot 配置文件（示例项目 0813-transformer-json\
  \ 中 src/main/resource 文件夹下的 application.properties 文件）\n\n```\nserver.port=18080\n\
  ```\n\n这指定了 HTTP 网关监听 POST 请求的端口。清单 8-48 展示了该示例的主类。\n\n***清单 8-48***. JSON 转换器示例的主类（0813-transformer-json）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.ImportResource;\n\
  \n@SpringBootApplication\n@ImportResource(\"classpath:si-config.xml\")\npublic class\
  \ SiApplication {\n  public static void main(String[] args) throws InterruptedException\
  \ {\n    SpringApplication.run(SiApplication.class, args);\n  }\n}\n```\n\n这是 Spring\
  \ Boot 配置和主类，用于执行我们的 SI 流程。当我们启动它时，应用程序保持打开状态，并等待对 URL `http://localhost:18080`\
  \ 的 POST 请求。因此，为了发起这个请求，我们使用简单的工具 `curl`。该命令如清单 8-49 所示。\n\n***清单 8-49***. JSON\
  \ 转换器示例的 curl 命令\n\n```\ncurl -i -X POST -H \"Content-Type: application/json\" -d\
  \ '{\"name\": \"Lubos Krnac\", \"email\":\n\"lubos.krnac@gmail.com\"}' http://localhost:18080\n\
  ```\n\n参数 `–i` 在消息中包含头部信息；`-X` 参数指定使用的 HTTP 方法；`-H` 定义要包含的 HTTP 头部；`–d` 参数指定负载。执行此命令后，我们得到如清单\
  \ 8-50 所示的响应。\n\n\n\n***清单 8-50***. JSON 转换器示例的 HTTP 响应\n\n```\nHTTP/1.1 200 OK\n\
  Server: Apache-Coyote/1.1\nContent-Length: 0\nDate: Mon, 24 Aug 2015 23:05:54 GMT\n\
  ```\n\n这表明我们发送的消息已成功处理。当然，我们的服务器并非完全符合 HTTP 规范，因为它本应回复所创建资源的 location URL，但为了不使此示例复杂化，我们暂且忽略这一点。清单\
  \ 8-51 显示了应用程序记录的输出。\n\n***清单 8-51***. JSON 转换器示例的输出\n\n```\n2015-08-25 00:05:53.791  INFO\
  \ 17254 --- [io-18080-exec-1]\nn.l.b.eiws.chapter08.out.UserRepository  : Object\
  \ received: User(email=lubos.krnac@gmail.com,\nname=Lubos Krnac)\n```\n\n`UserRepository`\
  \ Bean 已从 JSON 负载中接收到转换后的 `User` 对象。请注意，在此示例中，无法创建对应的 Java 配置，因为 `<int-http:inbound-gateway>`\
  \ SI 组件没有对应的 Java 注解。\n\n内容增强器\n\n*内容增强器*在消息端点特性上与转换器类似。它可以参与单向或双向通信，可以是被动或主动的，并且位于\
  \ SI 流程的中间位置。\n\n从功能角度来看，可能存在以下类型的内容增强器：\n\n*   *通用标头增强器*：此端点最常见的用途，用于向消息添加新标头。当然，消息默认是不可变的，因此通用上下文增强器会基于原始消息创建一个新的消息实例，并附带增强的标头。它没有任何可用的\
  \ SI 注解，因此只能通过 XML 元素 `<int:header-enricher>` 进行配置。\n*   *通用负载增强器*：这实际上是一种特殊类型的消息转换器，通过添加信息来增强接收消息的负载。此增强器只能通过\
  \ XML 元素 `<int:enricher>` 进行配置。\n*   *特定技术标头增强器*：为三种技术（Mail、XPath 和 XMPP（Jabber\
  \ 协议））增强标头。这些配置只能通过 XML 配置实现，并使用特定的技术专用 XML 命名空间：`<int-xml:xpath-header-enricher>`、`<int-xmpp:header-enricher>`\
  \ 和 `<int-mail:header-enricher>`。\n\n标头增强器示例\n\n清单 8-52 展示了标头增强器逻辑。\n\n***清单 8-52***.\
  \ 标头增强器逻辑（0814-header-enricher-xml）\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleHeaderEnricher\
  \ {\n  public String addHeader(String message) {\n    return message.contains(\"\
  1\") ? \"header1\" : \"header2\";\n  }\n}\n```\n\n这个 Spring Bean 检查接收到的消息是否包含 `1`，并根据结果返回一个标头值。该返回值将在\
  \ SI 流程中用于增强消息。清单 8-53 展示了 SI 流程配置。\n\n***清单 8-53***. 标头增强器示例的 SI 流程（文件 si-config.xml，位于示例项目\
  \ 0814-header-enricher-xml 的 src/main/resources 文件夹中）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n  <int:channel id=\"\
  inChannel\"/>\n\n<int:header-enricher input-channel=\"inChannel\" output-channel=\"\
  enrichedChannel\">\n    <int:header name=\"simpleHeader\" ref=\"simpleHeaderEnricher\"\
  \ method=\"addHeader\"/>\n  </int:header-enricher>\n  <int:channel id=\"enrichedChannel\"\
  />\n\n<int:outbound-channel-adapter channel=\"enrichedChannel\" ref=\"writeServiceWithHeaders\"\
  \n    method=\"write\"/>\n</beans>\n```\n\n入站网关配置为使用我们通用的服务接口 `SiWrapperServiceVoid`，将其参数转换为消息，并传递给\
  \ `inChannel`。\n\n消息从该通道被标头增强器拾取，该增强器在顶层 XML 元素 `<int:header-enricher>` 上定义了必需的\
  \ `input-channel` 和 `output-channel` 属性。现在我们可以定义一个或多个要增强的标头。这是通过 XML 子元素 `<int:header>`\
  \ 完成的。对于单个标头，我们需要指定 `name`（它将作为标头映射中的键），以及包含标头增强器逻辑的 Bean 的 `ref` 和 `method`。在本例中，它是\
  \ `SimpleHeaderEnricher.addHeader()`。在 `<int:header>` 标签中，我们还可以使用 Spring 表达式语言 (SpEL)\
  \ 来内联定义增强器逻辑。SpEL 的使用将在本章后面展示。\n\n我们流程中的最后一个元素是出站通道适配器，它封装了 清单 8-54 中所示的逻辑。\n\n\
  ***清单 8-54***. 标头增强器示例中使用的写入服务（0814-header-enricher-xml）\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.messaging.handler.annotation.Header;\nimport org.springframework.stereotype.Service;\n\
  \n@Slf4j\n@Service\npublic class WriteServiceWithHeaders {\n  private WriteRepository\
  \ writeRepository;\n\n@Autowired\n  public WriteServiceWithHeaders(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    }\n\npublic void write(String message, @Header String simpleHeader) {\n    log.info(\"\
  Writing message: {}; simpleHeader: {}\", message, simpleHeader);\n    writeRepository.persist(message);\n\
    }\n}\n```\n\n此服务注入我们通用的 `WriteRepository` 以持久化接收到的消息负载。它还会记录此负载以及之前在流程中增强的 `simpleHeader`。清单\
  \ 8-55 涵盖了此示例的主类。\n\n***清单 8-55***. 标头增强器示例的主类（0814-header-enricher-xml）\n\n```\n\
  package net.lkrnac.book.eiws.chapter08;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.ImportResource;\n\
  \n@SpringBootApplication\n@ImportResource(\"classpath:si-config.xml\")\npublic class\
  \ SiApplication {\n  public static void main(String[] args) throws InterruptedException\
  \ {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);\n\
  \nSiWrapperServiceVoid wrapperService =\n        ctx.getBean(SiWrapperServiceVoid.class);\n\
      wrapperService.processText(\"message1\");\n    wrapperService.processText(\"\
  message2\");\n  }\n}\n```\n\n运行 Spring Boot 应用程序后，我们从上下文中检索 `wrapperService` Bean，并将两个负载为\
  \ `message1` 和 `message2` 的消息发送到 SI 流程。同样，`SiWrapperServiceVoid` 是 SI 流程的入口点。运行后的输出类似于\
  \ 清单 8-56。\n\n***清单 8-56***. 标头增强器示例的输出\n\n\n\n```\n2015-08-25 20:23:03.934  INFO\
  \ 27342 --- [           main]\nn.l.b.e.c.out.WriteServiceWithHeaders    : Writing\
  \ message: message1; simpleHeader: header1\n2015-08-25 20:23:03.950  INFO 27342\
  \ --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ message1\n2015-08-25 20:23:03.952  INFO 27342 --- [           main]\nn.l.b.e.c.out.WriteServiceWithHeaders    :\
  \ Writing message: message2; simpleHeader: header2\n2015-08-25 20:23:03.953  INFO\
  \ 27342 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ message2\n```\n\n头部增强器逻辑已应用：`message1` 被添加了 `header1` 值，`message2` 被添加了 `header2`\
  \ 值。图 8-7 展示了这个头部增强器的 SI 流程。\n\n![9781484207949_Fig08-07.jpg](img/9781484207949_Fig08-07.jpg)\n\
  \n图 8-7. 头部增强器流程的可视化\n\n过滤器\n\n*过滤器*是另一种中间 SI 消息端点，可以参与双向和单向流程。它既可以作为被动组件，也可以作为主动组件。其目的是决定接收到的消息是否应该传递给下游流程。此决策可以基于通用逻辑，该逻辑可通过\
  \ `<int:filter>` XML 元素或 `@Filter` 注解进行配置。注解配置不具备 XML 的灵活性，XML 可以基于以下内容：\n\n*  \
  \ *自定义 Java 逻辑*：应实现 `MessageSelector` 接口，并可通过 `<int:filter>` 标签的 `<beans:bean>`\
  \ 子元素或其 `ref` 属性进行定义。\n*   *SpEL 表达式*：可通过 `<int:expression>` XML 子元素或 `<int:filter>`\
  \ XML 标签的 `expression` 属性进行配置。\n*   *自定义脚本*：通过 `<int:filter>` XML 标签的 `<int-script:script>`\
  \ 子元素支持 Ruby 和 Groovy。\n\n除了这些通用过滤器类型，我们还可以为以下技术配置特殊过滤器：\n\n*   *XPath 过滤器*：`<int-xml:xpath-filter>`\n\
  *   *XML 验证过滤器*：`<int-xml:validating-filter>`\n\n过滤器决定是否将消息传递给 SI 流程中的下一个组件，这由过滤器逻辑（无论是\
  \ Java 逻辑、SpEL 还是脚本）返回的布尔值表示。如果值为 `false`，过滤器允许我们丢弃消息或在 SI 流程中抛出异常。如果我们丢弃消息，可以指定\
  \ `discardChannel` 来路由该消息。\n\n一个重要的事实是，默认情况下过滤器会静默丢弃消息。\n\n过滤器也可以作为通道适配器的属性嵌入到单向流程中（例如，`<int-ftp:inbound-channel-adapter>`\
  \ 的 `local-filter` 或 `<int-mail:imap-idle-channel-adapter>` 的 `mail-filter-expression`）。\n\
  \n基于 XML 配置的过滤器示例\n\n代码清单 8-57 展示了自定义过滤器逻辑。\n\n***代码清单 8-57***. XML 配置示例的自定义过滤器逻辑\
  \ (0815-filter-xml-ref)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\nimport\
  \ org.springframework.integration.core.MessageSelector;\nimport org.springframework.messaging.Message;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleFilter\
  \ implements MessageSelector {\n  @Override\n  public boolean accept(Message<?>\
  \ message) {\n    String stringPayload = (String) message.getPayload();\n    return\
  \ !stringPayload.contains(\"corrupt\");\n  }\n}\n```\n\n这个实现了 `MessageSelector`\
  \ 接口的 Spring Bean 可以用作 SI 流程中的过滤器逻辑。它需要实现 `MessageSelector.accept()` 方法。在此例中，我们检查消息的\
  \ `String` 负载，如果包含 `corrupt` 子字符串则拒绝该消息。代码清单 8-58 深入介绍了此示例的 SI 流程配置。\n\n***代码清单\
  \ 8-58***. XML 过滤器示例的 SI 流程配置（文件位于示例项目 0815-filter-xml-ref 的 src/main/resources\
  \ 文件夹中的 si-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\
  \ xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xmlns:int-http=\"http://www.springframework.org/schema/integration/http\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n  <int:channel id=\"\
  inChannel\"/>\n\n<int:filter input-channel=\"inChannel\" output-channel=\"filteredChannel\"\
  \n    ref=\"simpleFilter\" />\n  <int:channel id=\"filteredChannel\"/>\n\n<int:service-activator\
  \ input-channel=\"filteredChannel\" ref=\"writeService\"\n    method=\"write\"/>\n\
  </beans>\n```\n\n入站网关使用我们通用的 `SiWrapperServiceVoid` Bean 来隐藏 SI 流程，这表示单向消息处理。消息在\
  \ `inChannel` 中处理，此时过滤器开始发挥作用。它必须定义必需的 `input-channel` 和 `output-channel` 属性，以及\
  \ `expression` 或 `ref` 属性之一。在此例中，它是对我们的过滤器 Bean `simpleFilter` 的引用。\n\n然后消息被发送到\
  \ `filteredChannel` 并传递给服务激活器，该激活器执行另一个通用 Bean `WriteService.write()`。为了突出过滤效果，请查看代码清单\
  \ 8-59。\n\n***代码清单 8-59***. XML 过滤器示例的主类 (0815-filter-xml-ref)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication\n\
  @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n  private\
  \ static final String SIMPLE_MESSAGE = \"simple message\";\n\npublic static void\
  \ main(String[] args) throws InterruptedException {\n    ApplicationContext ctx\
  \ = SpringApplication.run(SiApplication.class, args);\n\nSiWrapperServiceVoid wrapperService\
  \ =\n        ctx.getBean(SiWrapperServiceVoid.class);\n    wrapperService.processText(SIMPLE_MESSAGE);\n\
      wrapperService.processText(\"corrupted message\");\n    wrapperService.processText(SIMPLE_MESSAGE);\n\
    }\n}\n```\n\n我们向 SI 流程发送了三条消息，其中一条是损坏的。因此，在代码清单 8-60 中，我们期望只看到两条消息。\n\n***代码清单\
