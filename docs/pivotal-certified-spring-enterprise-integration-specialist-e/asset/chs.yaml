  \ stepFactory.get(\"boilWaterStep\").tasklet(boilWater).build();\n  }\n\n@Bean\n\
    public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {\n    return\
  \ stepFactory.get(\"addTeaStep\").tasklet(addTea).build();\n  }\n\n@Bean\n  public\
  \ Step addSugarStep(StepBuilderFactory stepFactory, AddSugar addSugar) {\n    return\
  \ stepFactory.get(\"addSugarStep\").tasklet(addSugar).build();\n  }\n\n@Bean\n  public\
  \ Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater) {\n    return\
  \ stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n  }\n\n@Bean\n  public\
  \ Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n      @Qualifier(\"boilWaterStep\"\
  ) Step boilWaterStep,\n      @Qualifier(\"addTeaStep\") Step addTeaStep,\n      @Qualifier(\"\
  addSugarStep\") Step addSugarStep,\n      @Qualifier(\"addWaterStep\") Step addWaterStep,\n\
        TaskExecutor customTaskExecutor) {\n    return jobBuilderFactory.get(\"prepareTeaJob\"\
  )\n        .start(boilWaterStep)\n        .split(customTaskExecutor)\n        .add(new\
  \ FlowBuilder<Flow>(\"addIngredientsSplit\")\n            .from(boilWaterStep).next(addTeaStep)\n\
              .from(boilWaterStep).next(addSugarStep)\n            .end())\n        .next(addWaterStep)\n\
          .end()\n        .build();\n  }\n}\n```\n\n线程池 Bean 的定义和 `Step` Bean 的创建对我们来说并不陌生。在创建\
  \ `Job` 定义时，`split()` 方法允许我们指定用于并行定义的线程池实例。在 `add()` 方法中，我们定义了并行的执行分支。由于使用 `split()`\
  \ 和 `add()` 会将 `SimpleJob` 转换为 `FlowJob`，我们需要使用 `end()` 方法来关闭并行子流程和主作业。此示例执行后的输出与之前展示的清单\
  \ 9-120 类似。\n\n步骤的远程分块\n\n远程分块是一种概念，当处理面向块的处理，且项目的处理或写入是资源密集型时，它能够提供帮助。其思想是将块的处理和写入部分委托给一个或多个远程\
  \ JVM 进程。当然，这些进程可以托管在远程机器上。\n\n块的读取在主进程中完成。主进程通过消息队列与远程从进程通信。因此，主进程和从进程之间的通信是异步的。SB\
  \ 框架利用 Spring Integration 框架来配置这种通信。需要两个独立的消息队列，用于以下目的：\n\n*   将命令从主进程发送到从进程\n*\
  \   将响应从从进程发送回主进程\n\n由于通信是通过消息传递接口完成的，工作会动态地分配给远程从进程，并且在有多个从进程的情况下，负载均衡是自动的。让我们解释一下这种自然的负载均衡。主进程向消息队列发送一个命令，多个从进程正在监听该队列。由于消息队列配置为点对点消息传递，只有一个从进程可以读取此命令。第一个拾取消息的从进程执行处理和写入。自然，最空闲的从进程将最先从主进程读取此命令消息。\n\
  \nSB 使用标准的 `ItemReader`、`ItemProcessor` 和 `ItemWriter` 接口来执行工作。`ChunkProcessor<I>`\
  \ 是帮助将工作委托给从进程的接口。`SimpleChunkProcessor` 是 SB 框架提供的开箱即用的实现。\n\n请注意，我们为此功能提供的示例仅包含\
  \ XML 配置。该示例将 Spring Integration 流程与 SB 流程相结合，在这种情况下，XML 配置似乎更简洁，因此跳过了 Java 配置。\n\
  \n用于主从通信的 JMS 配置\n\n\n\n我们将使用 HornetQ 服务器作为本次通信的消息中间件。第 5 章展示了如何下载并轻松启动一个 HornetQ\
  \ 服务器实例。现在，我们需要配置用于主从通信的消息队列。代码清单 9-122 展示了这些队列的 HornetQ 定义。\n\n***代码清单 9-122***.\
  \ 用于主从通信的 HornetQ 配置（HornetQ 安装目录下的文件 config/stand-alone/non-clustered/hornet-jms.xml）\n\
  \n```\n<queue name=\"MasterCommands\">\n   <entry name=\"/queue/MasterCommands\"\
  />\n</queue>\n<queue name=\"SlaveResponses\">\n   <entry name=\"/queue/SlaveResponses\"\
  />\n</queue>\n```\n\n我们需要将这两个顶层元素添加到 HornetQ 配置中。启动服务器后，这些队列即可使用。名为 `MasterCommands`\
  \ 的队列将用于从主节点向从节点发送消息。`SlaveResponses` 队列将用于接收来自从节点的回复。代码清单 9-123 展示了 JMS 通信配置，该配置将同时存在于主节点和从节点项目中。\n\
  \n***代码清单 9-123***. 用于 JMS 访问的 XML 配置（示例项目 0939-remote-chunking-slave 和 0939-remote-chunking-master\
  \ 中 src/main/resource 文件夹下的文件 jms-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:util=\"http://www.springframework.org/schema/util\"\
  \n  xmlns:jee=\"http://www.springframework.org/schema/jee\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/jee\n    http://www.springframework.org/schema/jee/spring-jee.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/util\n    http://www.springframework.org/schema/util/spring-util.xsd\"\
  >\n\n<util:map id=\"jndiProperties\" map-class=\"java.util.Properties\">\n    <entry\
  \ key=\"java.naming.factory.initial\"\n      value=\"org.jnp.interfaces.NamingContextFactory\"\
  \ />\n    <entry key=\"java.naming.factory.url.pkgs\"\n      value=\"org.jboss.naming:org.jnp.interfaces\"\
  \ />\n    <entry key=\"java.naming.provider.url\" value=\"jnp://localhost:1099\"\
  \ />\n  </util:map>\n\n<jee:jndi-lookup id=\"connectionFactory\" jndi-name=\"/ConnectionFactory\"\
  \n    environment-ref=\"jndiProperties\" />\n  <jee:jndi-lookup id=\"masterCommands\"\
  \ jndi-name=\"/queue/MasterCommands\"\n    environment-ref=\"jndiProperties\" />\n\
    <jee:jndi-lookup id=\"slaveResponses\" jndi-name=\"/queue/SlaveResponses\"\n    environment-ref=\"\
  jndiProperties\" />\n</beans>\n```\n\n通过 JNDI 进行的 JMS 连接与我们之前在 JMS 示例中使用的相同，`connectionFactory`\
  \ bean 的 JNDI 查找也是如此。随后是对主从通信队列的 JNDI 查找，这些查找将它们注册为 Spring 上下文中的 JMS 目的地。同样，主节点和从节点项目中的\
  \ JMS 访问使用了相同的配置。\n\n远程分块的从节点配置\n\n本示例复用了我们通用的写入器和处理器，用于在远程分块的从节点部分工作。代码清单 9-124\
  \ 展示了从节点的 XML 配置。\n\n***代码清单 9-124***. 远程分块从节点的 XML 配置（示例项目 0939-remote-chunking-slave\
  \ 中 src/main/resource 文件夹下的文件 batch-slave-config.xml）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:batch=\"http://www.springframework.org/schema/batch\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:int-jms=\"\
  http://www.springframework.org/schema/integration/jms\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration/jms\n    http://www.springframework.org/schema/integration/jms/spring-integration-jms.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<import resource=\"classpath:jms-config.xml\"/>\n\n<int-jms:message-driven-channel-adapter\
  \ id=\"inSlaveAdapter\"\n    destination=\"masterCommands\" channel=\"inSlaveChannel\"\
  \ />\n  <int:channel id=\"inSlaveChannel\" />\n\n<int:service-activator id=\"slaveServiceActivator\"\
  \ method=\"handleChunk\"\n    input-channel=\"inSlaveChannel\" output-channel=\"\
  outSlaveChannel\" ref=\"slaveChunkHandler\"/>\n\n<bean id=\"slaveChunkHandler\"\n\
      class=\"org.springframework.batch.integration.chunk.ChunkProcessorChunkHandler\"\
  >\n    <property name=\"chunkProcessor\" ref=\"slaveChunkProcessor\" />\n  </bean>\n\
  \n<bean id=\"slaveChunkProcessor\"\n    class=\"org.springframework.batch.core.step.item.SimpleChunkProcessor\"\
  >\n    <property name=\"itemProcessor\">\n      <bean\n        class=\"net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor\"\
  \ />\n    </property>\n    <property name=\"itemWriter\">\n      <bean class=\"\
  net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter\" />\n    </property>\n\
    </bean>\n\n<int:channel id=\"outSlaveChannel\" />\n  <int-jms:outbound-channel-adapter\
  \ id=\"outSlaveAdapter\"\n    destination=\"slaveResponses\" channel=\"outSlaveChannel\"\
  />\n</beans>\n```\n\n首先，我们导入 JMS 配置。接着，我们使用 Spring Integration 结构来定义入站通道适配器，它将负责接收来自主节点的消息。待处理的条目将通过\
  \ JMS 队列 `masterCommands` 到达，该入站通道适配器会将其放入本地的 Spring Integration 通道 `inSlaveChannel`\
  \ 中，然后由名为 `slaveServiceActivator` 的服务激活器拾取。\n\n该服务激活器将待处理的条目委托给 `ChunkProcessorChunkHandler`，后者是\
  \ `SimpleChunkProcessor` 的一个包装器。*SimpleChunkProcessor* 是我们定义 `ItemProcessor` 和 `ItemReader`\
  \ 的 bean——在本例中，即我们通用的 `SimpleRecordProcessor` 和 `SimpleRecordWriter`。\n\n来自 `simpleChunkHandler`\
  \ bean 的响应将作为 `slaveServiceActivator` 的回复消息发送到 Spring Integration 通道 `outSlaveChannel`。最后，`outSlaveChannel`\
  \ 连接到 `outSlaveAdapter`，后者会将响应发送到 JMS 队列 `slaveResponses`。\n\n图 9-9 展示了处理来自主节点消息的\
  \ Spring Integration 图。\n\n![9781484207949_Fig09-09.jpg](img/9781484207949_Fig09-09.jpg)\n\
  \n图 9-9. 从节点消息流的 Spring Integration 图\n\n远程分块的主节点配置\n\n代码清单 9-125 展示了主节点配置的远程分块部分。\n\
  \n***代码清单 9-125***. 远程分块主节点的 XML 配置（示例项目 0939-remote-chunking-master 中 src/main/resource\
  \ 文件夹下的文件 batch-config.xml）\n\n\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:batch=\"http://www.springframework.org/schema/batch\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:int-jms=\"\
  http://www.springframework.org/schema/integration/jms\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration/jms\n    http://www.springframework.org/schema/integration/jms/spring-integration-jms.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<import resource=\"classpath:jms-config.xml\"/>\n\n<bean class=\"org.springframework.batch.core.scope.StepScope\"\
  >\n    <property name=\"proxyTargetClass\" value=\"true\"/>\n  </bean>\n\n<bean\
  \ id=\"messagingTemplate\" class=\"org.springframework.integration.core.MessagingTemplate\"\
  >\n    <property name=\"defaultChannel\" ref=\"outMasterAdapter\" />\n    <property\
  \ name=\"receiveTimeout\" value=\"2000\" />\n  </bean>\n\n<int-jms:outbound-channel-adapter\
  \ id=\"outMasterAdapter\"  destination=\"masterCommands\"/>\n\n<int:channel id=\"\
  inMasterChannel\">\n    <int:queue />\n  </int:channel>\n\n<int-jms:message-driven-channel-adapter\n\
      id=\"inMasterAdapter\" destination=\"slaveResponses\" channel=\"inMasterChannel\"\
  \ />\n\n<batch:job id=\"simpleRecordsJob\">\n    <batch:step id=\"simpleRecordsStep\"\
  >\n      <batch:tasklet>\n        <batch:chunk reader=\"simpleRecordReader\" writer=\"\
  remoteRecordWriter\"\n          commit-interval=\"4\" />\n      </batch:tasklet>\n\
      </batch:step>\n  </batch:job>\n\n<bean id=\"remoteRecordWriter\" scope=\"step\"\
  \n    class=\"org.springframework.batch.integration.chunk.ChunkMessageChannelItemWriter\"\
  >\n    <property name=\"messagingOperations\" ref=\"messagingTemplate\" />\n    <property\
  \ name=\"replyChannel\" ref=\"inMasterChannel\" />\n  </bean>\n</beans>\n```\n\n\
  JMS 配置已导入。接下来我们定义 `StepScope` bean。当使用 XML 配置时，需要通过启用 `proxyTargetClass` 的方式将这些\
  \ bean 配置为作用域 bean，从而启用批处理作用域。如果我们没有配置这些 bean，Spring 将完全不知道 Spring Batch 作用域的存在。\n\
  \n`MessagingTemplate` bean 用于与从属应用进行通信。其 `defaultChannel` 连接到 `outMasterAdapter`，这是一个连接到\
  \ JMS 队列 `masterCommands` 的 JMS 出站通道适配器。此路由用于发送待远程处理和写入的数据项。\n\n来自从属应用的响应通过 JMS\
  \ 入站通道适配器 `inMasterAdapter` 接收，并汇集到 `inMasterChannel` 中，该通道的类型为 `QueueChannel`。因此，它会将响应存储在内存中，供主作业处理。\n\
  \n面向块的 `Job` 使用本地读取器 bean `simpleRecordWriter` 进行定义，但对于写入器，我们使用了名为 `remoteRecordWriter`\
  \ 的特殊 bean。\n\n该 bean 以步骤作用域定义，类型为 `ChunkMessageChannelItemWriter`，它将消息的写入委托给 `messagingTemplate`。`replyChannel`\
  \ 属性配置为 `inMasterChannel`。因此，这个 Spring Batch 组件会轮询 `inMasterChannel`，并等待来自从属应用的响应。\n\
  \n运行远程分块示例\n\n要执行此示例，我们需要启动三个进程。首先，HornetQ 服务器必须处于运行状态；否则主应用和从属应用将无法通信。我们可以通过命令\
  \ `bin/run.sh` 或 `bin/run.bat` 启动 HornetQ 服务器。\n\n第二个进程由清单 9-126 中展示的主类启动。\n\n***清单\
  \ 9-126***. 远程分块从属项目的主类 (0939-remote-chunking-slave)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication\n\
  @EnableBatchProcessing\n@ImportResource(\"classpath:batch-slave-config.xml\")\n\
  public class BatchSlaveApplication {\n  public static void main(String[] args) throws\
  \ InterruptedException {\n    SpringApplication.run(BatchSlaveApplication.class,\
  \ args);\n  }\n}\n```\n\n该代码导入了从属应用的 XML 配置，启用了批处理功能，并将其作为 Spring Boot 应用执行。我们需要先执行从属进程，因为它将监听来自主应用待处理的数据项。\n\
  \n最后，我们通过清单 9-127 中的主类执行主进程。\n\n***清单 9-127***. 远程分块主项目的主类 (0939-remote-chunking-master)\n\
