  \n对步骤进行分区\n\n\n\n步骤分区是 SB 的一项功能，它将批处理负载完全委托给远程进程。该功能仅适用于面向块的处理，其中处理完全在从属进程中完成。当我们处理\
  \ I/O 密集型需求时，这种机制非常方便。\n\n我们还需要强调，分区存在内部进程模式；工作被委托给本地线程而非远程进程。但这种执行是在单个进程中处理的，并且可以轻松被并行步骤功能覆盖。并行处理配置起来更简单。因此，我们将纯粹专注于远程进程的分区。\n\
  \n其思想是将读取的数据集划分为多个分区，以便每个分区可以在一个单独的远程进程中执行。我们再次拥有主进程和从属进程，由主进程定义分区。分区边界通常由数据集的一个维度定义。例如，如果我们有一个用户交互数据集，我们可以根据交互日期和时间将该数据集划分为不同的时间桶。属于每个桶的数据可以代表一个分区的数据集。\n\
  \n对于每个分区，主进程会创建一个单独的 `ExecutionContext` 实例，其中存储了该分区的边界信息。这是由 `Partitioner` 接口定义的组件完成的。大多数情况下，此组件由应用程序开发人员实现。\n\
  \n在分区被定义并封装到 `ExecutionContext` 之后，主进程通过消息传递接口向从属进程发送命令。从属进程将从其接收到的 `ExecutionContext`\
  \ 实例中检索分区边界信息。然后，从属进程对定义的分区数据集执行面向块的处理，并在工作完成后将结果发送回主进程。\n\n为了处理分区，SB 提供了三种 `PartitionHandler`\
  \ 的实现：\n\n*   `TaskExecutorPartitionHandler`：使用 `TaskExecutor` 将工作委托给从属进程的本地线程。\n\
  *   `JsrPartitionHandler`：使用 `ThreadPoolTaskExecutor` 将工作委托给从属进程的本地线程。符合 JSR-352\
  \ 分区标准。\n*   `MessageChannelPartitionHandler`：就真正的分布式扩展而言，这是最有趣的实现，它使用 `MessagingTemplate`\
  \ 将工作委托给从属进程的远程进程。这种扩展同样依赖于最先从主进程读取消息的最空闲的从属进程。\n\n如果我们使用 `MessageChannelPartitionHandler`\
  \ 进行远程分区，主进程和从属进程需要共享一个数据库来存储 SB 元数据。该数据库实例应由主进程和所有从属进程通过 JDBC 直接使用。\n\n步骤分区示例\n\
  \n本章的示例仅使用 XML 配置，原因与远程块处理示例相同。为了涵盖此功能，我们将使用三个项目并运行多个进程：\n\n*   用于处理主进程和从属进程之间消息传递的\
  \ HornetQ 服务器\n*   共享数据库服务器\n*   主项目\n*   从属项目，我们将在其中运行多个进程\n\n共享数据库项目\n\n对于共享数据库，我们将使用运行存储在文件中的\
  \ H2 数据库实例的 Spring Boot 应用程序。清单 9-130 显示了启动此项目时使用的脚本。\n\n***清单 9-130***. 分区示例的初始化\
  \ SQL 脚本（文件位于示例项目 0940-remote-partitioning-sql-server 的 src/main/resource 文件夹中的\
  \ h2-purge.sql）\n\n```\nDROP ALL OBJECTS\n```\n\n因为我们没有使用 H2 的持久化到文件的模式，此脚本会清除数据库中的所有对象，以便我们始终从一个干净的状态开始运行示例。在现实世界中，我们不会想这样做，但出于示例目的，从一个空数据库开始是好的。清单\
  \ 9-131 显示了此示例项目的 XML 配置。\n\n\n\n***清单 9-131***. 共享 SB 项目的 XML 配置（文件位于示例项目 0940-remote-partitioning-sql-server\
  \ 的 src/main/resource 文件夹中的 sql-server-config.xml）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:jdbc=\"http://www.springframework.org/schema/jdbc\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/jdbc\n    http://www.springframework.org/schema/jdbc/spring-jdbc.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<bean id=\"org.h2.tools.Server\" class=\"org.h2.tools.Server\" lazy-init=\"\
  false\"\n    factory-method=\"createTcpServer\" init-method=\"start\" destroy-method=\"\
  stop\">\n    <constructor-arg>\n      <array>\n        <value>-tcp</value>\n        <value>-tcpAllowOthers</value>\n\
          <value>-tcpPort</value>\n        <value>8043</value>\n        <value>-properties</value>\n\
          <value>\"~/partition-test\"</value>\n      </array>\n    </constructor-arg>\n\
    </bean>\n\n<jdbc:initialize-database data-source=\"dataSource\">\n    <jdbc:script\
  \ location=\"classpath:h2-purge.sql\"/>\n  </jdbc:initialize-database>\n\n<bean\
  \ id=\"dataSource\" class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\"\
  >\n      <property name=\"driverClassName\" value=\"org.h2.Driver\"/>\n      <property\
  \ name=\"url\" value=\"jdbc:h2:tcp://localhost:8043/~/partition-test\"/>\n      <property\
  \ name=\"username\" value=\"sa\"/>\n      <property name=\"password\" value=\"\"\
  />\n  </bean>\n</beans>\n```\n\n第一个 bean 创建了一个 H2 数据库实例，该实例通过 TCP 暴露，并允许其他进程连接。用于数据库连接的\
  \ TCP 端口配置为 8043。最后一个配置标志指定了 H2 数据库实例用于存储数据的文件位置。\n\nXML 标签 `<jdbc:initialize-database>`\
  \ 将运行清单 9-130 中的 `h2-purge.sql` 脚本，这确保了在启动此项目后数据库处于干净状态。`dataSource` bean 是执行此脚本所必需的。该\
  \ URL 使用 H2 约定来访问位于文件 `~/partition-test` 中的 TCP 托管数据库。波浪号字符（`~`）表示用户的主目录。\n\n清单\
  \ 9-132 展示了此项目的主类。\n\n***清单 9-132***. 用于远程分区示例的 SQL Server 主类（0940-remote-partitioning-sql-server）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication(exclude\
  \ = { DataSourceAutoConfiguration.class })\n@ImportResource(\"classpath:sql-server-config.xml\"\
  )\npublic class SqlServerApplication {\n  public static void main(String[] args)\
  \ throws InterruptedException {\n    SpringApplication.run(SqlServerApplication.class,\
  \ args);\n  }\n}\n```\n\n这导入了我们之前在清单 9-131 中描述的 XML 配置。当 Spring Boot 在自动配置下执行时，如果在类路径上发现\
  \ H2 数据库依赖，默认情况下它会配置一个内存数据库。但我们希望避免此特性，因为我们有特殊的 TCP 配置，希望将其暴露给其他进程。因此，我们从自动配置中排除了\
  \ Spring Boot 的 `DataSourceAutoConfiguration`，这样它就不会与我们的配置冲突。\n\n从属分区项目\n\n清单 9-133\
  \ 展示了我们将在示例中使用的仓库。\n\n***清单 9-133***. 用于分区示例的读取仓库（0940-remote-partitioning-slave）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.read;\nimport java.util.List;\nimport\
  \ java.util.stream.Collectors;\nimport java.util.stream.IntStream;\nimport org.springframework.stereotype.Repository;\n\
  \n@Repository\npublic class IndexedReadRepository {\n  private static final List<String>\
  \ RECORDS_LIST = generateRecords(16);\n\npublic synchronized String getRecord(int\
  \ index) {\n    return RECORDS_LIST.get(index);\n  }\n\nprivate static List<String>\
  \ generateRecords(int count) {\n    return IntStream.range(0, count)\n        .mapToObj(idx\
  \ -> \"simple record \" + idx)\n        .collect(Collectors.toList());\n  }\n}\n\
  ```\n\n此类代表要处理的数据集。由于我们需要将数据集划分为多个分区，因此我们允许通过索引读取示例记录，以便每个从属节点可以索引属于其应处理分区的记录。每条记录将通过\
  \ `getRecord()` 方法暴露。清单 9-134 展示了此从属项目的 `ItemReader`。\n\n***清单 9-134***. 用于分区示例的\
  \ ItemReader 实现（0940-remote-partitioning-slave）\n\n```\npackage net.lkrnac.book.eiws.chapter09.read;\n\
  import org.springframework.batch.core.StepExecution;\nimport org.springframework.batch.core.annotation.BeforeStep;\n\
  import org.springframework.batch.item.ExecutionContext;\nimport org.springframework.batch.item.ItemReader;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class PartitionedRecordReader implements ItemReader<String>\
  \ {\n  private IndexedReadRepository readRepository;\n  private ExecutionContext\
  \ executionContext;\n  private int partitionEnd;\n\n@Autowired\n  public PartitionedRecordReader(IndexedReadRepository\
  \ readRepository) {\n    super();\n    this.readRepository = readRepository;\n  }\n\
  \n@BeforeStep\n  public void storeExecutionContext(StepExecution stepExecution)\
  \ {\n    this.executionContext = stepExecution.getExecutionContext();\n    this.partitionEnd\
  \ = executionContext.getInt(\"partitionEnd\");\n  }\n\n@Override\n  public String\
  \ read() {\n    int currentIndex = executionContext.getInt(\"currentIndex\");\n\
      String item = (currentIndex <= partitionEnd)\n        ? readRepository.getRecord(currentIndex)\n\
          : null;\n    executionContext.putInt(\"currentIndex\", currentIndex + 1);\n\
      return item;\n  }\n}\n```\n\n此 item reader 注入了 `IndexedReadRepository` 以从中读取数据。它还通过\
  \ `@BeforeStep` 注解注入了 `ExecutionContext` 实例。请注意，此 `ExecutionContext` 实例将由主节点发送给此从属进程，并定义了此从属节点应处理的分区边界。\n\
  \n在此例中，分区边界存储在 `currentIndex` 中，而 `partitionEnd` 属性存储在 `ExecutionContext` 中。在每次执行\
  \ `read()` 时，此 reader 将检查是否到达了分区的末尾。如果未到达，它将读取记录并在执行上下文中增加 `currentIndex`。如果 reader\
  \ 返回 `null`，则表示此从属节点的工作结束。\n\n此示例使用了与上一个示例中清单 9-123 相同的 JMS 配置，其中我们定义了对 JMS 目的地\
  \ `MasterCommand` 和 `SlaveResponses` 的访问。这些将用于与主节点通信。从属节点的 Spring 配置如清单 9-135 所示。\n\
  \n***清单 9-135***. 用于远程分区示例的从属节点 XML 配置（文件位于示例项目 0940-remote-partitioning-slave 的\
  \ src/main/resource 文件夹中的 batch-slave-configuration.xml）\n\n\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:batch=\"http://www.springframework.org/schema/batch\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:int-jms=\"\
  http://www.springframework.org/schema/integration/jms\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration/jms\n    http://www.springframework.org/schema/integration/jms/spring-integration-jms.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<import resource=\"classpath:jms-config.xml\" />\n\n<bean id=\"dataSource\"\
  \ class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\">\n      <property\
  \ name=\"driverClassName\" value=\"org.h2.Driver\"/>\n      <property name=\"url\"\
  \ value=\"jdbc:h2:tcp://localhost:8043/~/partition-test\"/>\n      <property name=\"\
  username\" value=\"sa\"/>\n      <property name=\"password\" value=\"\"/>\n  </bean>\n\
  \n<bean id=\"stepExecutionRequestHandler\"\n    class=\"org.springframework.batch.integration.partition.StepExecutionRequestHandler\"\
  >\n    <property name=\"jobExplorer\" ref=\"jobExplorer\" />\n    <property name=\"\
  stepLocator\" ref=\"stepLocator\" />\n  </bean>\n\n<bean id=\"stepLocator\"\n    class=\"\
  org.springframework.batch.integration.partition.BeanFactoryStepLocator\" />\n\n\
  <batch:step id=\"simpleRecordsStep\">\n    <batch:tasklet allow-start-if-complete=\"\
  true\">\n      <batch:chunk reader=\"partitionedRecordReader\" writer=\"simpleRecordWriter\"\
  \n        processor=\"simpleRecordProcessor\" commit-interval=\"4\"/>\n    </batch:tasklet>\n\
    </batch:step>\n\n<int:channel id=\"inSlaveChannel\" />\n  <int-jms:message-driven-channel-adapter\n\
      id=\"inSlaveAdapter\" destination=\"masterCommands\" channel=\"inSlaveChannel\"\
  \ />\n\n<int:service-activator ref=\"stepExecutionRequestHandler\"\n    input-channel=\"\
  inSlaveChannel\" output-channel=\"outSlaveChannel\" />\n\n<int:channel id=\"outSlaveChannel\"\
  \ />\n  <int-jms:outbound-channel-adapter id=\"outSlaveAdapter\"\n    destination=\"\
  slaveResponses\" channel=\"outSlaveChannel\" />\n</beans>\n```\n\n首先，我们导入 JMS 配置，以便从属进程能够访问\
  \ JMS 消息服务器，从而接收来自主进程的命令。`dataSource` Bean 用于访问由示例项目 `0940-remote-partitioning-sql-server`\
  \ 托管的共享数据库。\n\n接下来，`StepExecutionRequestHandler` Bean 是用于处理来自主进程命令的 `MessagingEndpoint`。这些命令将以\
  \ `StepExecutionRequest` 实例的形式到达，该处理器应向主进程返回一个 `StepExecution` 实例作为响应。此 Bean 的 `jobExplorer`\
  \ 属性由 Spring Boot 自动配置创建，用于访问存储在共享数据库中的 SB 元数据。`stepLocator` 属性是由下一个 Bean 定义创建的\
  \ `BeanFactoryStepLocator` 类型的 Bean，用于扫描 Spring 上下文以查找 SB 的 `Step` 实例。在此 Spring\
  \ 上下文中找到的 `Step` 将用于执行 SB 工作。\n\n这个 `Step` 实例由 `<batch:step>` XML 标签定义，并配置为在此从属节点上使用面向块的（chunk-oriented）处理方式。对于\
  \ `ItemReader`，我们使用前面清单中展示的 `PartitionedRecordReader`。处理器和写入器实例则是本章通用的 Bean。\n\n\
  以下 Bean 定义了与主进程的 JMS 通信。命令从 JMS 队列 `masterCommands` 接收，并转发到本地 Spring Integration\
  \ 通道 `inSlaveChannel`。该通道连接到 `stepExecutionRequestHandler`，后者执行批处理。其回复被转发到 Spring\
  \ Integration 的 `outSlaveChannel`，并分别传递到 JMS 队列 `slaveResponses`。\n\n图 9-10 展示了此从属配置的\
  \ Spring Integration 图。\n\n![9781484207949_Fig09-10.jpg](img/9781484207949_Fig09-10.jpg)\n\
  \n图 9-10. 远程分区示例从属配置的 Spring Integration 图（文件位于示例项目 0940-remote-partitioning-slave\
  \ 的 src/main/resource 文件夹中的 batch-slave-configuration.xml）\n\n清单 9-136 展示了从属项目的主类。\n\
  \n***清单 9-136***. 远程分区从属节点的主类（0940-remote-partitioning-slave）\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication\n\
  @EnableBatchProcessing\n@ImportResource(\"classpath:batch-slave-config.xml\")\n\
  public class BatchSlaveApplication {\n  public static void main(String[] args) throws\
  \ InterruptedException {\n    SpringApplication.run(BatchSlaveApplication.class,\
  \ args);\n  }\n}\n```\n\n我们包含了从属节点的 XML 配置，并在启用批处理的情况下运行 Spring Boot 应用程序。\n\n主分区项目\n\
  \n清单 9-137 展示了 `Partitioner` 的实现。\n\n***清单 9-137***. Partitioner 实现（0940-remote-partitioning-master）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport java.util.HashMap;\nimport\
  \ java.util.Map;\nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.batch.core.partition.support.Partitioner;\n\
  import org.springframework.batch.item.ExecutionContext;\nimport org.springframework.stereotype.Component;\n\
  \n@Slf4j\n@Component\npublic class RecordsPartitioner implements Partitioner {\n\
    @Override\n  public Map<String, ExecutionContext> partition(int gridSize) {\n\
      int min = 0;\n    int max = 16;\n    int targetSize = (max - min) / gridSize;\n\
      log.info(\"***** 分区分布 *****\");\n    log.info(\"最小值 = \" + min + \" 最大值 = \"\
  \ + max + \" 目标大小 = \" + targetSize);\n\nMap<String, ExecutionContext> result =\
  \ new HashMap<String, ExecutionContext>();\n    int partitionIdx = 0;\n    int start\
  \ = min;\n    int end = start + targetSize - 1;\n\nwhile (start < max) {\n      ExecutionContext\
  \ value = new ExecutionContext();\n      result.put(\"partition\" + partitionIdx,\
  \ value);\n\nif (end > max) {\n        end = max - 1;\n      }\n      log.info(\"\
  分区起始\" + partitionIdx + \" = \" + start);\n      log.info(\"分区结束\" + partitionIdx\
  \ + \" = \" + end);\n\nvalue.putInt(\"currentIndex\", start);\n      value.putInt(\"\
  partitionEnd\", end);\n      start += targetSize;\n      end += targetSize;\n      partitionIdx++;\n\
      }\n\nlog.info(\"分区数 = \" + result.size());\n    log.info(\"*********************************\"\
  );\n    return result;\n  }\n}\n```\n\n这个 SB 组件根据给定的 `gridSize`（分区数）将分区划分到独立的 `ExecutionContext`\
  \ 实例中。每个 `ExecutionContext` 实例包含其所属分区的起始和结束索引。数据集的大小（要处理的记录数）被硬编码为 `16`，因为此示例的 `IndexedReadRepository`\
  \ 只有 `16` 条记录需要处理。希望您能谅解这一点，这是为了使示例更简单而设计的。因此，例如，当 `gridSize` 为 `2` 个分区时，我们将创建两个\
  \ `ExecutionContext`，其分区边界分别为 `0..7` 和 `8..15`。\n\n![Image](img/sq.jpg) **注意**  此算法以及此分区示例中的其他构造，深受\
  \ Michael Minella 在 `https://github.com/mminella/Spring-Batch-Talk-2.0` 上的远程分区示例的影响。\n\
  \n清单 9-138 展示了主节点的 XML 配置。\n\n\n***清单 9-138***. 远程分区示例的主配置（文件：示例项目 0940-remote-partitioning-master\
  \ 中 src/main/resource 文件夹下的 batch-configuration.xml）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:batch=\"http://www.springframework.org/schema/batch\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:int-jms=\"\
  http://www.springframework.org/schema/integration/jms\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration/jms\n    http://www.springframework.org/schema/integration/jms/spring-integration-jms.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<import resource=\"classpath:jms-config.xml\" />\n\n<bean id=\"dataSource\"\
  \ class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\">\n      <property\
  \ name=\"driverClassName\" value=\"org.h2.Driver\"/>\n      <property name=\"url\"\
  \ value=\"jdbc:h2:tcp://localhost:8043/~/partition-test\"/>\n      <property name=\"\
  username\" value=\"sa\"/>\n      <property name=\"password\" value=\"\"/>\n  </bean>\n\
  \n<batch:job id=\"masterJob\">\n    <batch:step id=\"masterStep\">\n        <batch:partition\
  \ partitioner=\"partitioner\" handler=\"partitionHandler\" />\n    </batch:step>\n\
    </batch:job>\n\n<bean id=\"partitioner\" class=\"net.lkrnac.book.eiws.chapter09.RecordsPartitioner\"\
  />\n\n<bean id=\"partitionHandler\"\n    class=\"org.springframework.batch.integration.partition.MessageChannelPartitionHandler\"\
  >\n    <property name=\"stepName\" value=\"simpleRecordsStep\" />\n    <property\
  \ name=\"replyChannel\" ref=\"inMasterAggregatedChannel\"/>\n    <property name=\"\
  gridSize\" value=\"2\" />\n    <property name=\"messagingOperations\" ref=\"messagingTemplate\"\
  >\n    </property>\n  </bean>\n\n<bean id=\"messagingTemplate\" class=\"org.springframework.integration.core.MessagingTemplate\"\
  >\n    <property name=\"defaultChannel\" ref=\"outMasterAdapter\" />\n    <property\
  \ name=\"receiveTimeout\" value=\"5000\" />\n  </bean>\n\n<int-jms:outbound-channel-adapter\
  \ id=\"outMasterAdapter\"\n    destination=\"masterCommands\" />\n\n<int:channel\
  \ id=\"inMasterChannel\" />\n  <int-jms:message-driven-channel-adapter\n    id=\"\
  inMasterAdapter\" destination=\"slaveResponses\" channel=\"inMasterChannel\" />\n\
  \n<int:channel id=\"inMasterAggregatedChannel\">\n    <int:queue />\n  </int:channel>\n\
    <int:aggregator ref=\"partitionHandler\" input-channel=\"inMasterChannel\"\n    output-channel=\"\
  inMasterAggregatedChannel\" />\n</beans>\n```\n\n主配置还导入了 JMS 配置，以便能够向从节点发送命令并接收其响应。`dataSource`\
  \ bean 访问一个共享数据库，该数据库托管在 `0940-remote-partitioning-sql-server` 示例项目中。\n\n接下来是 SB\
  \ 作业定义。对于 `Step`，我们使用 `<batch:partition>` 结构来定义此处理的远程执行。这里需要定义两个属性。对分区器的引用由我们在上一个清单的\
  \ `RecordsPartitioner` 中实现的工作分配算法提供。\n\n作业中使用的第二个 bean 是 `partitionHandler`。这是主处理的主要\
  \ bean，类型为 `MessageChannelPartitionHandler`，因为它通过消息中间件协调从节点的处理。我们定义了 `gridSize`（要处理的分区数量）、`stepName`（在从节点进程中执行的步骤名称）和\
  \ `replyChannel`（主节点期望从节点进程返回响应的 Spring Integration 通道）。`partitionHandler` 的最后一个参数指定了用于与从节点通信的\
  \ `MessagingTemplate` 实例。\n\n此通信使用连接到 JMS 队列 `masterCommands` 的 Spring Integration\
  \ JMS 出站通道适配器 `outMasterAdapter`。来自从节点的响应从 JMS 队列 `slaveResponses` 接收，并临时存储在名为 `inMasterAggregatedChannel`\
  \ 的 Spring Integration `QueueChannel` 中。因此，此通道是异步的。最后一个组件是一个 Spring Integration\
  \ 聚合器，它再次使用 `partitionHandler` 来聚合从节点的响应。\n\n清单 9-139 展示了主应用程序的主类。\n\n***清单 9-139***.\
  \ 远程分区示例主项目的主类（0940-remote-partitioning-master）\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.annotation.ImportResource;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  \n@SpringBootApplication\n@EnableBatchProcessing\n@EnableScheduling\n@ImportResource(\"\
  classpath:batch-config.xml\")\npublic class BatchApplication {\n  public static\
  \ void main(String[] args) throws InterruptedException {\n    SpringApplication.run(BatchApplication.class,\
  \ args);\n  }\n}\n```\n\n除了导入主 Spring 配置之外，这个 Spring Boot 主类还需要启用批处理，并启用调度，以便 `partitionHandler`\
  \ bean 能够异步轮询 `inMasterAggregatedChannel`。\n\n执行远程分区示例\n\n显然，这个最后的示例是全书中最复杂的。当我们执行它时，从节点之间的负载均衡是自然而然的；最空闲的从节点将首先从\
  \ `masterCommands` JMS 队列中读取消息。因此，这个最空闲的从节点将执行处理。在实际应用中，这种负载均衡效果良好。\n\n但是我的机器有四个核心，当我使用两个从节点进程和两个分区时，它们大多由同一个进程处理，而第二个从节点则闲置不用。因此，我们将运行三个从节点进程，以增加将负载分配到不同从节点进程的可能性。\n\
  \n要执行此示例，我们需要执行以下操作：\n\n*   使用与前一个示例相同的配置启动一个 HornetQ 服务器（清单 9-122）。\n*   通过示例项目\
  \ `0940-remote-partitioning-sql-server` 中的 `SqlServerApplication` 类启动一个 SQL 服务器。\n\
  *   通过示例项目 `0940-remote-partitioning-slave` 中的 `BatchSlaveApplication` 启动三个从节点进程。只需将同一个项目运行三次。\n\
  *   通过示例项目 `0940-remote-partitioning-master` 中的 `BatchConfiguration` 启动主节点进程。\n\n\
  按此顺序运行后，我们可以观察到主节点进程的输出，类似于清单 9-140。\n\n***清单 9-140***. 远程分区示例的主节点输出\n\n\n\n```\n\
