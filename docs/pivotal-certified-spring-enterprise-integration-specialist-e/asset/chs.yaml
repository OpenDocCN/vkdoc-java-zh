  \ 4-41 至 4-46 相同。\n\n异步消费 REST\n\n`RestTemplate` 对 REST 服务器的调用会在客户端阻塞调用线程。这有时可能并不合适。我们可能需要避免在客户端阻塞调用线程。这种需求通常被称为*即发即弃场景*。\n\
  \n在 Spring 4 之前的时代，Spring 开发者被迫为此类用例使用显式异步编程。Spring 的 `@Async` 注解很适合这种情况。Spring\
  \ 4 版本引入了一个新类 `AsyncRestTemplate`，它通过注册回调或使用 Java `Feature` 实现 `ListenableFuture`\
  \ 来处理这些异步场景。\n\n为了通过示例解释这种用法，我们需要扩展我们的领域。我们仍然需要像之前的示例那样消费一个提供用户信息的远程 REST API。但让我们增加一个额外需求：从单独的存储中读取用户操作，并将它们聚合到一个对象中。清单\
  \ 4-48 展示了这个聚合模型类。\n\n***清单 4-48***. 用于读取带用户操作的用户信息的扩展模型 (0405-rest-async-client)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.model;\n\nimport java.util.Collection;\n\
  import lombok.Value;\n\n@Value\npublic class UserInfo {\n  private User user;\n\
    private Collection<String> userActions;\n}\n```\n\n我们再次使用 Lombok 项目来生成样板 getter\
  \ 和带参数的构造函数。聚合模型类 `UserInfo` 包含一个 `User` 对象的实例和一个用户操作集合。为简单起见，用户操作由 `String` 类型表示。清单\
  \ 4-49 展示了用户操作仓库的实现。\n\n***清单 4-49***. 用户操作仓库 (0405-rest-async-client)\n\n```\n\
  package net.lkrnac.book.eiws.chapter04.client;\n\nimport java.util.Arrays;\nimport\
  \ java.util.Collection;\n\nimport org.springframework.stereotype.Repository;\n\n\
  @Repository\npublic class UserActionsRepository {\n  public Collection<String> getUserActions(int\
  \ identifier) {\n    return Arrays.asList(new String[] { \"dummy action 1\", \"\
  dummy action 2\", });\n  }\n}\n```\n\n为了保持示例简单，我们返回了虚拟值。这个类本身并不值得深入关注。我们想要探索的是异步\
  \ REST 调用。这一点很重要，因为我们需要在 REST API 调用异步执行的同时执行一个操作。清单 4-50 展示了这个异步示例的 Spring 配置。\n\
  \n***清单 4-50***. 异步消费 REST (0405-rest-async-client)\n\n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\
  \nimport java.util.concurrent.Executor;\nimport java.util.concurrent.Executors;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.concurrent.ConcurrentTaskExecutor;\n\
  import org.springframework.web.client.AsyncRestTemplate;\n\n@Configuration\n@ComponentScan\n\
  public class ClientConfiguration {\n  @Bean\n  public AsyncRestTemplate asyncRestTemplate()\
  \ {\n    Executor executor = Executors.newFixedThreadPool(10);\n    ConcurrentTaskExecutor\
  \ taskExecutor = new ConcurrentTaskExecutor(executor);\n    return new AsyncRestTemplate(taskExecutor);\n\
    }\n}\n```\n\n`ClientConfiguration` 被注解为一个标准的 Spring 配置。`@Configuration` 定义了 Spring\
  \ 的配置类，而 `@ComponentScan` 则在当前包及其子包中执行 Spring bean 的扫描。\n\n此配置仅注册了一个类型为 `AsyncRestTemplate`\
  \ 的 bean。默认情况下，Spring 对异步 bean 使用 `SimpleAsyncTaskExecutor` 线程池实现。但此实现不会重用线程池中的线程，因此不适合生产环境使用。\n\
  \n我们使用 Java 的 `Executors` 工厂来创建一个具有固定线程数的线程池。当我们将这个 `Executor` 实现包装到 `ConcurrentTaskExecutor`\
  \ 中时，就可以将其注册为 `AsyncRestTemplate` 实例所使用的线程池。`AsyncRestTemplate` 实例将重用此线程池中的线程实例来进行异步\
  \ REST 调用。清单 4-51 展示了 `AsyncRestTemplate` 的示例用法。\n\n***清单 4-51***. 异步消费 REST (0405-rest-async-client)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\nimport java.util.Collection;\n\
  \nimport net.lkrnac.book.eiws.chapter04.model.User;\nimport net.lkrnac.book.eiws.chapter04.model.UserInfo;\n\
  \nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.stereotype.Service;\n\
  import org.springframework.util.concurrent.ListenableFuture;\nimport org.springframework.util.concurrent.ListenableFutureCallback;\n\
  import org.springframework.web.client.AsyncRestTemplate;\n\n@Service\npublic class\
  \ UserInfoService {\n  private static final Logger LOGGER = LoggerFactory\n      .getLogger(UserInfoService.class);\n\
  \nprivate static final String URL = \"http://localhost:10405/users\";\n  private\
  \ AsyncRestTemplate asyncRestTemplate;\n  private UserActionsRepository userActionsRepository;\n\
  \n@Autowired\n  public UserInfoService(AsyncRestTemplate asyncRestTemplate,\n      UserActionsRepository\
  \ userActionsRepository) {\n    super();\n    this.asyncRestTemplate = asyncRestTemplate;\n\
      this.userActionsRepository = userActionsRepository;\n  }\n\nprivate void logElapsedTime(String\
  \ messagePrefix, long start) {\n    LOGGER.info(\"{} call took {} ms.\", messagePrefix,\n\
          System.currentTimeMillis() - start);\n  }\n\n\n\n```java\nprivate ListenableFuture<ResponseEntity<User>>\
  \ getUserAsync(int identifier,\n      final long start) {\n    ListenableFuture<ResponseEntity<User>>\
  \ futureResult =\n        asyncRestTemplate.getForEntity(URL + \"/\" + identifier,\
  \ User.class);\n\n    futureResult\n        .addCallback(new ListenableFutureCallback<ResponseEntity<User>>()\
  \ {\n          @Override\n          public void onSuccess(ResponseEntity<User> result)\
  \ {\n            logElapsedTime(\"User Service\", start);\n          }\n\n     \
  \     @Override\n          public void onFailure(Throwable ex) {\n            logElapsedTime(\"\
  User Service\", start);\n          }\n        });\n    return futureResult;\n}\n\
  \npublic UserInfo getUserInfo(int identifier) {\n    final long start = System.currentTimeMillis();\n\
  \n    ListenableFuture<ResponseEntity<User>> futureResult =\n        getUserAsync(identifier,\
  \ start);\n\n    Collection<String> userActions =\n        userActionsRepository.getUserActions(identifier);\n\
  \    logElapsedTime(\"User Actions repository\", start);\n\n    User user = null;\n\
  \    try {\n      user = futureResult.get().getBody();\n    } catch (Exception e)\
  \ {\n      throw new IllegalStateException(e);\n    }\n\n    logElapsedTime(\"Overall\"\
  , start);\n    return new UserInfo(user, userActions);\n}\n```\n\n这个 Spring Bean\
  \ 使用了 `@Service` 注解，表明它位于服务层。第一条语句定义了用于日志记录的 SLF4J 常量。这是 Java 应用程序的标准结构。\n\n然后，我们指定了将从该服务调用的\
  \ REST 服务 URL，并定义了依赖项。我们有两个依赖项：`UserActionsRepository` 和 `AsyncRestTemplate`。这两个\
  \ Bean 将用于将数据异步聚合到 `UserInfo` 对象中。它们通过构造函数注入。\n\n第一个方法是私有的 `logElapsedTime`，用于记录时间测量值。\n\
  \n第二个方法 `getUserAsync` 负责通过调用 `asyncRestTemplate.getForEntity` 来执行异步 REST 调用。此调用向\
  \ REST 服务器发起一个 `GET` 请求，并返回 `ListenableFuture<ResponseEntity<User>>` 类型。此调用在一个单独的线程中启动一个\
  \ REST 调用，我们可以通过包装在 `ListenableFuture` 抽象中的返回值来检索响应。\n\n由于我们关心此调用的时序，我们在 `futureResult`\
  \ 返回值上注册了一个回调，用于记录异步 REST 调用的耗时。此方法中的最后一条语句返回一个 `futureResult` 实例，以便用于检索 REST 服务器的响应。\n\
  \n最后一个方法 `getUserInfo` 是该服务的主要且唯一的公共方法，聚合在此发生。首先，我们存储用于时间测量的开始时间。然后，我们调用私有方法 `getUserAsync`，并传递参数\
  \ `identifier` 和 `start` 时间，以便它可以异步检索 `User` 对象并记录耗时。当我们获得 `futureResult` 实例时，REST\
  \ 调用正在后台执行。我们的线程可以专注于从 `userActionsRepository` 检索用户操作。\n\n当我们拥有 `userActions` 集合时，我们可以调用\
  \ `futureResult.get`。如果异步 REST 调用仍在进行中，此调用会阻塞当前线程直到其完成。如果异步 REST 调用已经完成，`futureResult.get`\
  \ 会立即返回响应。当我们拥有 `User` 对象和用户操作后，可以将它们聚合到 `UserInfo` 对象中。\n\n要测试此应用程序，我们需要运行清单 4-52\
  \ 中的代码。\n\n***清单 4-52***. 异步客户端的主类与测试代码 (0405-rest-async-client)\n\n```java\npackage\
