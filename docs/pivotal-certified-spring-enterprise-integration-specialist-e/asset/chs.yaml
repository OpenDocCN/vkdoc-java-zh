  \n图 9-7. 决策步骤的批处理图\n\n步骤决策的 Java 配置\n\n按照我们的惯例，此 Java 示例重用了之前基于 XML 的示例中的所有类，并替换了\
  \ XML 配置。清单 9-115 展示了基于 Java 的条件配置。\n\n***清单 9-115***. 决策步骤的 Java 配置\n\n\n\n```\n\
  package net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddMilk;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddWater;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.batch.core.job.flow.FlowExecutionStatus;\nimport org.springframework.beans.factory.annotation.Qualifier;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n\
    public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater)\
  \ {\n    return stepFactory.get(\"boilWaterStep\").tasklet(boilWater).build();\n\
    }\n\n@Bean\n  public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea)\
  \ {\n    return stepFactory.get(\"addTeaStep\").tasklet(addTea).build();\n  }\n\n\
  @Bean\n  public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)\
  \ {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n  }\n\
  \n@Bean\n  public Step addMilkStep(StepBuilderFactory stepFactory, AddMilk addMilk)\
  \ {\n    return stepFactory.get(\"addMilkStep\").tasklet(addMilk).build();\n  }\n\
  \n@Bean\n  public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n      @Qualifier(\"\
  boilWaterStep\") Step boilWaterStep,\n      @Qualifier(\"addTeaStep\") Step addTeaStep,\n\
        @Qualifier(\"addWaterStep\") Step addWaterStep,\n      @Qualifier(\"addMilkStep\"\
  ) Step addMilkStep,\n      TeaIngredientDecider teaIngredientDecider) {\n    return\
  \ jobBuilderFactory.get(\"prepareTeaJob\")\n        .start(boilWaterStep)\n        .next(addTeaStep)\n\
          .next(addWaterStep)\n        .next(teaIngredientDecider)\n          .on(\"\
  milk\")\n            .to(addMilkStep)\n            .from(teaIngredientDecider)\n\
            .on(FlowExecutionStatus.COMPLETED.getName())\n            .end()\n          .build()\n\
          .build();\n  }\n}\n```\n\n步骤的定义很直观；我们使用了常见的泡茶任务小步骤，其中包含`AddMilk`任务小步骤，并将其注入到`Job`\
  \ Bean 的构造方法中。有趣的结构从这里开始。`addWaterStep` 之后进入 `teaIngredientDecider`。\n\n接下来的执行路径取决于决策器的返回值。如果决策器返回\
  \ `milk` 值，则执行 `on(\"milk\")` 分支。该分支将 `addMilkStep` 定义为下一个要执行的步骤。我们还必须定义 `from()`\
  \ 步骤；否则 `Job` 会执行失败。如果决策器返回 `FlowExecutionStatus.COMPLETED`，则执行第二个分支。该值会终止批处理流程的执行。\n\
  \n`build()` 方法需要执行两次，因为第一次调用构建的是由决策器启动的 `Job` 子流程。第二次 `build()` 调用则构建主 `Job` 实例。运行此示例后，我们可以观察到与上一个示例（清单\
  \ 9-114）相同的输出。\n\n扩展与并行处理\n\n到目前为止，所有执行都是单线程的。顺序处理通常由所处理数据的性质决定，或者仅仅是因为其速度尚不足以成为企业系统中的瓶颈。\n\
  \n但很多时候，数据并不需要按顺序处理。在这些情况下，我们可以考虑将批处理分发到单独的线程或进程中，以提升整体性能。幸运的是，SB 的创建者考虑到了此类用例，并实现了对以下方式的支持：\n\
  \n*   多线程步骤（在单个进程中执行）\n*   并行步骤（在单个进程中执行）\n*   远程分块步骤（在不同进程中执行）\n*   步骤分区（在不同进程中执行）\n\
  \n多线程步骤\n\n为一个 `Step` 使用多个线程的想法仅适用于面向块的处理。每个块在单独的线程中处理。这些线程由为 `Step` 配置的线程池管理。\n\
  \n多线程步骤的 XML 配置\n\n此示例复用了常见的面向块的读取器、处理器和写入器，以及通用的 `BatchConfiguration` 和 Spring\
  \ Boot 主类。唯一新增的部分是 清单 9-116 中引入的 XML 配置。\n\n***清单 9-116***. 多线程步骤的 XML 配置（文件 batch-config.xml，位于示例项目\
  \ 0935-multi-threaded-step-xml 的 src/main/resource 文件夹中）\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xmlns:task=\"http://www.springframework.org/schema/task\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/task\n    http://www.springframework.org/schema/task/spring-task.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"simpleRecordsJob\">\n    <step id=\"simpleRecordsStep\">\n      <tasklet\
  \ task-executor=\"taskExecutor\">\n        <chunk reader=\"simpleRecordReader\"\
  \ writer=\"simpleRecordWriter\"\n          processor=\"simpleRecordProcessor\" commit-interval=\"\
  4\" />\n      </tasklet>\n    </step>\n  </job>\n\n<task:executor id=\"taskExecutor\"\
  \ pool-size=\"10\"/>\n</beans:beans>\n```\n\n多个线程由 `TaskExecutor` Bean 管理，其线程池大小为\
  \ `10`。当我们为面向块的步骤定义 `<tasklet>` 时，通过 `task-executor` 属性配置 `taskExecutor` Bean。清单\
