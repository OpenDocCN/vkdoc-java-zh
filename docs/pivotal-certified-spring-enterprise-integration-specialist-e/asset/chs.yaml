  \ Starting to send messages...\n2015-08-30 20:55:48.656  INFO 26516 --- [          \
  \ main]\no.s.integration.handler.LoggingHandler   : message1\n2015-08-30 20:55:48.673  INFO\
  \ 26516 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ message1\n2015-08-30 20:55:48.674  INFO 26516 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
  \ message1 sent\n2015-08-30 20:55:48.675  INFO 26516 --- [           main]\no.s.integration.handler.LoggingHandler  \
  \ : message2\n2015-08-30 20:55:48.676  INFO 26516 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    :\
  \ Text persisted: message2\n2015-08-30 20:55:48.677  INFO 26516 --- [          \
  \ main]\nn.l.book.eiws.chapter08.SiApplication    : message2 sent\n```\n\n正如我们所料，主流程正确执行。此外，SI\
  \ 内部的 `LoggingHandler` 还记录了消息负载。\n\n**错误处理**\n\n可靠的错误处理是每个生产就绪应用程序的重要组成部分。SI 应用程序也不例外。因此，SI\
  \ 提供了多种机制来简化错误处理的实现。我们可以将这些机制划分如下：\n\n*   *同步错误处理*：当同步消息传递过程中发生错误时，该错误会被包装成 `org.springframework.messaging.MessageHandlingException`\
  \ 并传播回消息的发送方。\n*   *异步错误处理*\n    *   *单向流*：在异步交接的情况下，异常无法传播给发送方。因此，在这种情况下，SI 会从异常创建\
  \ `org.springframework.messaging.support.ErrorMessage`，并将此消息发送到合适的 `errorChannel`。\n\
  \    *   *双向流*：即使我们处理的是异步消息交接，错误也会传播给消息的发送方。\n\n我们提到，在单向异步消息流中抛出异常时，会使用 `errorChanel`\
  \ 来发送 `ErrorMessage`。但 SI 使我们能够以多种方式配置 `errorChannel`：\n\n\n\n*   *消息特定错误通道*：如果某条消息具有名为\
  \ `errorChannel` 的指定标头，则由该消息引起的错误将被发送到此标头指定的通道。\n*   *组件特定错误通道*：如果发起异步消息分发的组件具有指定的\
  \ `error-channel`，则其线程中发生的错误消息将被发送到此属性指定的通道（请注意，这必须是异步分发，因为同步分发代表同步消息传递，错误会传播回发送方）。\n\
  *   *全局错误通道*：如果前面的机制都不匹配，则将使用全局错误通道来处理错误消息。SI 默认创建发布/订阅的 `errorChannel`，该通道将错误消息发送到日志记录组件。因此，默认情况下，所有错误消息至少会被项目中使用的日志记录库记录。如果需要，我们可以通过显式定义名为\
  \ `errorChannel` 的通道来覆盖这个默认的全局错误通道。\n\n另外值得一提的是，SI 提供了一种特殊类型的路由器，专门用于根据引发的 `Exception`\
  \ 类型来路由 `ErrorMessage` 消息。它可以通过 `<int:exception-type-router>` XML 元素进行配置。\n\n错误处理示例中的自定义类\n\
  \n在进入错误处理示例之前，我们先介绍一下清单 8-124 中的类，该类将用于错误模拟。\n\n***清单 8-124***. 错误处理示例的公共类\n\n```\n\
  package net.lkrnac.book.eiws.chapter08.out;\nimport org.springframework.stereotype.Service;\n\
  \n@Service\npublic class WriteServiceWithError {\n  public boolean writeAndIndicateSuccess(String\
  \ message) {\n    throw new IllegalStateException(\"error occurred\");\n  }\n\n\
  public void write(String message) {\n    throw new IllegalStateException(\"error\
  \ occurred\");\n  }\n}\n```\n\n当执行 `write()` 或 `writeAndIndicateSuccess()` 方法时，这个\
  \ Spring 服务 Bean 会抛出一个异常。\n\n同步错误传播示例\n\n清单 8-125 展示了此示例的 SI 配置。\n\n***清单 8-125***.\
  \ 同步错误传播示例的 SI 配置（文件 si-config.xml，位于示例项目 0836-error-handling-sync 的 src/main/resources\
