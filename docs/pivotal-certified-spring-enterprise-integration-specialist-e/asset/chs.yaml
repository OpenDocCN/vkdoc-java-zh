  \ n.l.b.eiws.chapter08.out.WriteService\n: Route 1 hit with message: message1\n\
  2015-08-26 21:41:20.516  INFO 8057 --- [           main] n.l.b.e.chapter08.out.WriteRepository\n\
  : Text persisted: message1\n2015-08-26 21:41:20.518  INFO 8057 --- [           main]\
  \ n.l.book.eiws.chapter08.SiApplication\n: Result:true\n2015-08-26 21:41:20.519  INFO\
  \ 8057 --- [           main] n.l.b.eiws.chapter08.out.WriteService\n: Route 2 hit\
