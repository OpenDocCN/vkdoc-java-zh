  \ JSON 负载包含预期的元素。负载验证使用了 JSONPath Spring 包装器。JSONPath 是一个用于解析 JSON 负载的库。因此，它必须位于类路径上。这是\
  \ Spring 如何有效利用第三方开源库来提供强大 API 的另一个例子。\n\n当我们执行此测试方法时，`andDo(print())` 会打印出如清单 4-24\
