  $.email\").value(\"user0@gmail.com\"))\n    .andExpect(jsonPath(\"$.name\").value(\"\
  User0\"));\n}\n```\n\n首先，我们使用 `mockMvc` 来 `POST` 测试记录。这是必需的，因为我们对每个测试方法都使用由 `@DirtiesContext`\
