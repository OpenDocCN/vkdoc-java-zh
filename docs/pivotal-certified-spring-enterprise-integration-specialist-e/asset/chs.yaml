  \n基于 Java 配置的过滤器示例\n\n现在让我们深入了解过滤器组件的 Java 配置。代码清单 8-61 展示了 Java 配置。\n\n***代码清单\
  \ 8-61***. 过滤器示例的 Java 配置 (0816-filter-javaconfig)\n\n\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.integration.annotation.IntegrationComponentScan;\nimport\
  \ org.springframework.integration.channel.DirectChannel;\nimport org.springframework.messaging.MessageChannel;\n\
  \n@Configuration\n@IntegrationComponentScan\npublic class SiConfiguration {\n  @Bean\n\
    public MessageChannel inChannel() {\n    return new DirectChannel();\n  }\n\n\
  @Bean\n  public MessageChannel filteredChannel() {\n    return new DirectChannel();\n\
    }\n}\n```\n\n这个 Spring 配置类使用 `@IntegrationComponentScan` 扫描带有 SI Java 注解的组件，并定义了两个\
  \ SI 通道：`inChannel` 和 `filteredChannel`。清单 8-62 展示了入站网关接口的 Java 配置。\n\n***清单 8-62***.\
  \ 过滤器示例的入站网关 Java 配置（0816-filter-javaconfig）\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
  import org.springframework.integration.annotation.Gateway;\nimport org.springframework.integration.annotation.MessagingGateway;\n\
  \n@MessagingGateway\npublic interface SiWrapperServiceVoidAnnotated {\n  @Gateway(requestChannel\
  \ = \"inChannel\")\n  public void processText(String text);\n}\n```\n\n在此例中，单向入站网关连接到\
  \ `inChannel`。为了将其扫描为 Spring Bean，我们使用了 `@IntegrationComponentScan`。清单 8-63 展示了\
  \ Java 过滤器配置。\n\n***清单 8-63***. Java 过滤器配置（0816-filter-javaconfig）\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08;\nimport org.springframework.integration.annotation.Filter;\n\
  import org.springframework.integration.annotation.MessageEndpoint;\n\n@MessageEndpoint\n\
  public class SimpleFilter {\n  @Filter(inputChannel = \"inChannel\", outputChannel\
  \ = \"filteredChannel\")\n  public boolean accept(String message) {\n    return\
  \ !message.contains(\"corrupt\");\n  }\n}\n```\n\n通过 `@MessageEndpoint`，我们可以将其注册为\
  \ Spring Bean。`@Filter` 注解将 `accept` 方法标记为过滤逻辑。请注意，我们不需要实现 `MessageSelector` 接口，但需要定义输入和输出通道。过滤逻辑再次拒绝包含“corrupt”字符串的有效负载消息。清单\
  \ 8-64 展示了位于 SI 流输出端的服务激活器配置。\n\n***清单 8-64***. 过滤器 Java 配置示例的服务激活器（0816-filter-javaconfig）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.integration.annotation.ServiceActivator;\nimport org.springframework.stereotype.Service;\n\
  \n@Service\npublic class WriteServiceAnnotated {\n  private WriteRepository writeRepository;\n\
  \n@Autowired\n  public WriteServiceAnnotated(WriteRepository writeRepository) {\n\
      super();\n    this.writeRepository = writeRepository;\n  }\n\n@ServiceActivator(inputChannel\
  \ = \"filteredChannel\")\n  public void write(String message) {\n    writeRepository.persist(message);\n\
    }\n}\n```\n\n我们之前见过类似的配置。清单 8-65 展示了此示例的主类。\n\n***清单 8-65***. Java 配置过滤器示例的主类（0816-filter-javaconfig）\n\
