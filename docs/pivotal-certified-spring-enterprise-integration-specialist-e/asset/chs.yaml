  import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
  @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
  \ boilWaterStep(StepBuilderFactory stepFactory,\n      BoilWater boilWater,\n      HotWaterStepListener\
  \ hotWaterStepListener) {\n    return stepFactory.get(\"boilWaterStep\")\n        .tasklet(boilWater)\n\
          .listener(hotWaterStepListener)\n        .build();\n  }\n\n@Bean\n  public\
  \ Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {\n    return stepFactory.get(\"\
  addTeaStep\").tasklet(addTea).build();\n  }\n\n@Bean\n  public Step addWaterStep(StepBuilderFactory\
  \ stepFactory, AddWater addWater,\n      HotWaterStepListener hotWaterStepListener)\
  \ {\n    return stepFactory.get(\"addWaterStep\")\n        .tasklet(addWater)\n\
          .listener(hotWaterStepListener)\n        .build();\n  }\n\n@Bean\n  public\
  \ Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n      @Qualifier(\"boilWaterStep\"\
  ) Step boilWaterStep,\n      @Qualifier(\"addTeaStep\") Step addTeaStep,\n      @Qualifier(\"\
  addWaterStep\") Step addWaterStep) {\n    return jobBuilderFactory.get(\"prepareTeaJob\"\
