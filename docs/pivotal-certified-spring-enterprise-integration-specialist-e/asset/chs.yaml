  \n多线程步骤的 Java 配置\n\nJava 配置如清单 9-118 所示。\n\n***清单 9-118***. 多线程步骤的 Java 配置 (0936-multi-threaded-step-javaconfig)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\n\
  import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\nimport net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.core.task.TaskExecutor;\nimport org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;\n\
  \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n\
    public TaskExecutor customTaskExecutor() {\n    ThreadPoolTaskExecutor threadPool\
  \ = new ThreadPoolTaskExecutor();\n    threadPool.setCorePoolSize(10);\n    return\
  \ threadPool;\n  }\n\n@Bean\n  public Step simpleRecordsStep(StepBuilderFactory\
  \ stepBuilderFactory,\n      SimpleRecordReader simpleRecordReader,\n      SimpleRecordProcessor\
  \ simpleRecordProcessor,\n      SimpleRecordWriter simpleRecordWriter,\n      TaskExecutor\
  \ customTaskExecutor) {\n    return stepBuilderFactory.get(\"simpleRecordsStep\"\
  )\n        .<String, String> chunk(4)\n        .reader(simpleRecordReader)\n        .processor(simpleRecordProcessor)\n\
          .writer(simpleRecordWriter)\n        .taskExecutor(customTaskExecutor)\n\
          .build();\n  }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory\
  \ jobBuilderFactory,\n      Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"\
  simpleRecordsJob\").start(simpleRecordsStep).build();\n  }\n}\n```\n\n为面向块的步骤配置\
  \ `TaskExecutor` 是通过在构建 `Step` 时调用 `taskExecutor()` 方法完成的。此示例的输出与上一个示例（清单 9-117）类似。\n\
  \n并行步骤\n\n不仅块可以并行执行。有时我们可能希望并行执行不同的步骤。\n\n并行步骤的 XML 配置\n\n此示例再次复用了通用的 `BatchConfiguration`，以及\
  \ Spring Boot 主类和所有通用的面向块的任务小工具（tasklet）。我们额外添加了一个名为 `AddSugar` 的任务小工具，它模拟了名为“添加糖”的操作，类似于我们的通用任务小工具。因此，我们仅在清单\
  \ 9-119 中展示 XML 配置。\n\n***清单 9-119***. 并行步骤的 XML 配置 (示例项目 0937-parallel-steps-xml\
  \ 的 src/main/resource 文件夹中的文件 batch-config.xml)\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xmlns:task=\"http://www.springframework.org/schema/task\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/task\n    http://www.springframework.org/schema/task/spring-task.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"prepareTeaJob\">\n    <step id=\"boilWaterStep\" next=\"addIngredientsSplit\"\
  >\n      <tasklet ref=\"boilWater\" />\n    </step>\n    <split id=\"addIngredientsSplit\"\
  \ next=\"addWaterStep\" task-executor=\"taskExecutor\">\n      <flow>\n        <step\
  \ id=\"addTeaStep\">\n          <tasklet ref=\"addTea\" />\n        </step>\n      </flow>\n\
        <flow>\n        <step id=\"addSugarStep\">\n          <tasklet ref=\"addSugar\"\
  \ />\n        </step>\n      </flow>\n    </split>\n    <step id=\"addWaterStep\"\
  >\n      <tasklet ref=\"addWater\" />\n    </step>\n  </job>\n\n<task:executor id=\"\
  taskExecutor\" pool-size=\"10\"/>\n</beans:beans>\n```\n\n\n\n并行 `Step` 的定义始于名为\
  \ `addIngredientsSplit` 的 `<split>` 元素。通过 `task-executor`，我们指定用于并行处理的线程池。`<split>`\
  \ 的每个 `<flow>` 子元素都在单个线程内创建一个执行边界。在此例中，每个流程只有一个步骤，因此这两个步骤将并行执行。清单 9-120 展示了此示例的输出。\n\
