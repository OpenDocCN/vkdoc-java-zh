  \n@BridgeTo 示例\n\n此示例与 `@BridgeFrom` 示例类似。这两个示例之间的唯一区别如清单 8-89 所示。\n\n***清单 8-89***。@BridgeTo\
  \ 示例的 SI 配置 (0823-bridge-to-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.integration.annotation.BridgeTo;\nimport org.springframework.integration.annotation.IntegrationComponentScan;\n\
  import org.springframework.integration.annotation.Poller;\nimport org.springframework.integration.channel.DirectChannel;\n\
  import org.springframework.integration.channel.QueueChannel;\nimport org.springframework.messaging.MessageChannel;\n\
  import org.springframework.messaging.PollableChannel;\n\n@Configuration\n@IntegrationComponentScan\n\
  public class SiConfiguration {\n  @Bean\n  @BridgeTo(value = \"bridgedChannel\"\
  , poller = @Poller(fixedDelay = \"100\"))\n  public PollableChannel inChannel()\
  \ {\n    return new QueueChannel();\n  }\n\n@Bean\n  public MessageChannel bridgedChannel()\
  \ {\n    return new DirectChannel();\n  }\n}\n```\n\n在这种情况下，`@BridgeTo` 注解位于 `inChannel`\
  \ 上。此示例的输出也与 `@BridgeFrom` 示例相同。正如我们所看到的，`@BridgeTo` 注解的是源通道或组件——这与 `@BridgeFrom`\
  \ 相反，后者注解的是目标通道或组件。\n\n链\n\n*链*是一个被动的中间组件，这也意味着它可以参与单向和双向消息流。顾名思义，它用于将消息端点链接在一起，而无需指定通道来连接它们。消息通常按顺序通过链的子元素传递。\n\
  \n该组件可以将一组消息端点包装成一个消息端点。实际上，我们可以将链用作更高级别链中的一个组件，从而创建由连接在不同链级别的 SI 流程块组成的复杂结构。这种嵌套链需要使用消息网关来定义。\n\
  \n链可以通过 XML 元素 `<int:chain>` 进行配置。请注意，没有与链定义等效的 Java 注解。它只需要一个必需属性：`input-channel`。与在链外使用相比，链中使用的组件有各种限制。例如，链中的组件不应指定\
  \ `input-channel`。此外，对于链中最后一个元素，关于输出通道有以下限制：\n\n*   如果链连接到一个下游消息端点，则链中的最后一个元素必须指定\
  \ `output-channel`，或者消息应定义 `replyChannel` 头。\n*   如果最后一个元素是通道适配器或服务激活器，则它不需要指定输出通道。\n\
  \n另一个限制是链中的每个端点都必须生成一条消息（不能返回 `null`），从而终止流程。只有最后一个元素可以丢弃消息。链中的元素不能是活动的（不能有 `poller`）。\n\
  \n链示例\n\n此示例借用了 `0814-header-enricher-xml` 示例中的所有类：\n\n*   `SimpleHeaderEnricher`\
  \ (清单 8-52)\n*   `WriteServiceWithHeaders` (清单 8-54)\n*   `SiApplication` (清单 8-55)\n\
  \n清单 8-90 展示了包含链的 SI 流程。\n\n***清单 8-90***。链示例的 SI 流程 (示例项目 0824-chain-xml 中 src/main/resources\
  \ 文件夹下的文件 si-config.xml)\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\
  \ xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/integration\n\
      http://www.springframework.org/schema/integration/spring-integration.xsd\">\n\
  \n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\"\
  \ />\n  <int:channel id=\"inChannel\"/>\n\n<int:chain input-channel=\"inChannel\"\
  >\n    <int:header-enricher>\n      <int:header name=\"simpleHeader\" ref=\"simpleHeaderEnricher\"\
  \ method=\"addHeader\"/>\n    </int:header-enricher>\n    <int:outbound-channel-adapter\
  \ ref=\"writeServiceWithHeaders\" method=\"write\"/>\n  </int:chain>\n</beans>\n\
  ```\n\n与 `0814-header-enricher-xml` 示例相比，我们不需要定义 `enrichedChannel`，因为头增强器和出站通道适配器被包装在一个链中。此示例的输出也与清单\
  \ 8-56 中头增强器示例的输出相同。此流程的 SI 图如图 8-11 所示。\n\n![9781484207949_Fig08-11.jpg](img/9781484207949_Fig08-11.jpg)\n\
  \n图 8-11。链示例的 SI 图\n\n分割器\n\n*分割器*是一个中间组件（可以参与单向或双向流程），可以在被动或主动模式下运行。它在 SI 框架中具有独特的功能，可以根据以下机制将接收到的消息分割成多条消息：\n\
  \n*   *自定义 Java 逻辑*：通用组件，可以通过 `<int:splitter>` XML 元素或 `@Splitter` 注解进行配置\n*   *XPath*：特定于\
  \ XML 负载，可以通过 `<int-xml:xpath-splitter>` 进行配置\n\n\n\n分割器生成的每条消息都将包含以下标头：\n\n*  \
  \ `correlationId`：默认情况下，从单条消息创建的消息将具有相同的 `correlationId`。\n*   `sequenceSize`：默认情况下，从原始消息创建的消息数量。\n\
  *   `sequenceNumber`：默认情况下，从原始消息创建的消息的顺序。\n\n这些标头将在接下来的“聚合器”部分中详细解释。在消息流中，聚合器通常与分割器一起使用。\n\
  \n分割器 XML 示例\n\n清单 8-91 展示了 SI 流程中的输出服务。\n\n***清单 8-91***. 消息流中的输出服务 (0825-splitter-delimiters-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport static org.springframework.integration.IntegrationMessageHeaderAccessor.CORRELATION_ID;\n\
  import static org.springframework.integration.IntegrationMessageHeaderAccessor.SEQUENCE_NUMBER;\n\
  import static org.springframework.integration.IntegrationMessageHeaderAccessor.SEQUENCE_SIZE;\n\
  import java.util.Map;\nimport java.util.UUID;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.messaging.handler.annotation.Headers;\n\
  import org.springframework.stereotype.Service;\n\n@Slf4j\n@Service\npublic class\
  \ WriteService {\n  private WriteRepository writeRepository;\n\n@Autowired\n  public\
  \ WriteService(WriteRepository writeRepository) {\n    super();\n    this.writeRepository\
  \ = writeRepository;\n  }\n\npublic boolean writeAndIndicateSuccess(String message,\n\
        @Headers Map<String, Object> headers) {\n    logHeaders(headers);\n\nboolean\
  \ result = writeRepository.persist(message) == 1;\n    if (\"messageFail\".equals(message))\
  \ {\n      return false;\n    }\n    return result;\n  }\n\npublic void logHeaders(Map<String,\
  \ Object> headers) {\n    UUID correlationId = (UUID) headers.get(CORRELATION_ID);\n\
      int sequenceSize = (int) headers.get(SEQUENCE_SIZE);\n    int sequenceNumber\
  \ = (int) headers.get(SEQUENCE_NUMBER);\n\nlog.info(\"Received message headers:\
  \ correlationId={}, \"\n        + \"sequenceSize={}, sequenceNumber={}\", correlationId,\
  \ sequenceSize,\n        sequenceNumber);\n  }\n}\n```\n\n`writeAndIndicateSuccess()`\
  \ 方法用于消费 SI 流程中的消息。第一个参数注入 `String` 类型的负载，第二个参数注入消息的 `Map` 类型标头。注入消息是为了记录由分割器创建的默认标头。负载被传递给\
  \ `WriteRepository` 进行持久化。在方法末尾，如果消息负载等于 `messageFail`，则返回 `false` 值。这对于展示哪些分叉消息将用于构建回复消息非常有用。清单\
  \ 8-92 展示了 SI 流程配置。\n\n***清单 8-92***. XML 分割器示例的 SI 配置 (示例项目 0825-splitter-delimiters-xml\
  \ 中 src/main/resources 文件夹下的文件 si-config.xml)\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperService\" />\n  <int:channel id=\"inChannel\"\
  \ />\n\n<int:splitter input-channel=\"inChannel\" output-channel=\"splitChannel\"\
  \ delimiters=\";\"/>\n  <int:channel id=\"splitChannel\" />\n\n<int:service-activator\
  \ input-channel=\"splitChannel\" ref=\"writeService\"\n    method=\"writeAndIndicateSuccess\"\
  >\n  </int:service-activator>\n</beans>\n```\n\n流程的输入部分由入站网关覆盖，该网关使用我们通用的 `SiWrapperService`\
  \ 接口，并通过 `inChannel` 将其连接到分割器。分割器使用 `delimiters` 属性作为分割逻辑，这意味着在本例中，消息将根据分号进行分割。分割器的\
  \ `output-channel` 继续连接到服务激活器，该激活器映射到清单 8-91 中的 `WriteService.writeAndIndicateSuccess()`。清单\
  \ 8-93 展示了此示例的主类。\n\n***清单 8-93***. XML 分割器示例的主类 (0825-splitter-delimiters-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\n\
  import net.lkrnac.book.eiws.chapter08.in.SiWrapperService;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@Slf4j\n@SpringBootApplication\n\
  @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n  public\
  \ static void main(String[] args) throws InterruptedException {\n    ApplicationContext\
  \ ctx = SpringApplication.run(SiApplication.class, args);\n\nSiWrapperService wrapperService\
  \ = ctx.getBean(SiWrapperService.class);\n    boolean resultSuccess =\n        wrapperService.processText(\"\
  messageSuccess;messageFail;messageSuccess\");\n    log.info(\"Result: \" + resultSuccess);\n\
  \nboolean resultFail =\n        wrapperService.processText(\"messageSuccess;messageFail;\"\
  );\n    log.info(\"Result: \" + resultFail);\n  }\n}\n```\n\n运行 Spring 上下文并从上下文中检索服务接口后，我们向\
  \ SI 基础设施发送两条消息。第一条消息有两个分号，`messageFail` 位于中间；第二条消息只有一个分号，`messageFail` 位于字符串消息的末尾。因此，在第一种情况下，我们期望消息被分割成三条消息，第二种情况则分割成两条。让我们在清单\
