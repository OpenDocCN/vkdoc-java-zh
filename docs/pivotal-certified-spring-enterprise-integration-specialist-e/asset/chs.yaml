  Tasklet 步骤\n\n面向块的批处理并非企业应用场景中唯一需要涵盖的步骤类型。有时我们需要在更大的流程中执行单个操作。例如，我们可能需要在作业结束时发送通知，或执行单个存储过程调用。SB\
  \ 提供了 `Tasklet` 接口。它只有一个方法 `execute`，我们可以在其中放置自定义逻辑。该实例随后可被封装到 `TaskletStep` 类中，并作为\
  \ SB 流程中的 `Step` 使用。\n\nTasklet 示例的通用类\n\n本章中的多个示例使用简单的 `Tasklet` 步骤来突出展示控制作业执行流程的\
  \ Spring Batch 特性。清单 9-17 展示了本章中经常使用的这个类。\n\n***清单 9-17***. 简单可执行点 (0900-batch-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.step;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.stereotype.Component;\n\n@Slf4j\n@Component\npublic class\
  \ SimpleExecutablePoint {\n  public void execute(String message) {\n    log.info(message);\n\
    }\n}\n```\n\n这个简单的 Spring Bean 使用 Lombok 将给定的消息记录到 `execute()` 方法中。\n\n![Image](img/sq.jpg) **注意**  `SimpleExecutablePoint`\
  \ 在实际应用中并无用处，但对于本章的示例来说非常方便，因为我们可以模拟这个 Bean 并验证 SB 配置是否按预期工作。本书示例附带的测试可以在 GitHub\
  \ 仓库中找到 (`https://github.com/lkrnac/book-eiws-code-samples`)。\n\n在我们的示例中，`Tasklet`\
  \ 类型批处理流程的领域是泡茶。当我们想要泡茶时，需要执行几个步骤才能得到美味的结果。例如，我们可能需要烧水、将茶叶加入茶杯、以及将水加入茶杯。清单 9-18\
  \ 展示了模拟烧水步骤的类。\n\n***清单 9-18***. 模拟烧水步骤的类 (0900-batch-common)\n\n```\npackage net.lkrnac.book.eiws.chapter09.step.tea;\n\
  import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.batch.core.StepContribution;\n\
  import org.springframework.batch.core.scope.context.ChunkContext;\nimport org.springframework.batch.core.step.tasklet.Tasklet;\n\
  import org.springframework.batch.repeat.RepeatStatus;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class BoilWater\
  \ implements Tasklet {\n  private SimpleExecutablePoint simpleExecutableStep;\n\n\
  @Autowired\n  public BoilWater(SimpleExecutablePoint simpleExecutableStep) {\n    super();\n\
      this.simpleExecutableStep = simpleExecutableStep;\n  }\n\n@Override\n  public\
  \ RepeatStatus execute(StepContribution contribution,\n      ChunkContext chunkContext)\
  \ throws Exception {\n    simpleExecutableStep.execute(\"Boil Water\");\n    return\
  \ RepeatStatus.FINISHED;\n  }\n}\n```\n\n这个简单的 Spring 组件自动装配了 `SimpleExecutablePoint`。在\
  \ execute 方法中，我们调用 `simpleExecutableStep.execute()` 来模拟烧水步骤。SB 将 `StepContribution`\
  \ 和 `ChunkContext` 实例注入此方法，并期望返回 `RepeatStatus` 类型的值。这些类型的使用将在后续章节中解释。对于本例，我们只需要知道\
  \ `RepeatStatus.FINISHED` 向数据库指示 `Step` 已成功完成。\n\n我们不会列出 `AddTea` 和 `AddWater` 类，因为它们与\
  \ `BoilWater` 类似；我们只是用不同的文本消息来模拟泡茶步骤。\n\n使用 XML 配置的 Tasklet 步骤示例\n\n现在我们已经勾勒出领域模型，可以查看清单\
  \ 9-19 中的 SB 配置了。\n\n***清单 9-19***. XML Tasklet 步骤示例的 XML 配置 (示例项目 0904-tasklet-step-xml\
  \ 的 src/main/resources 文件夹中的 batch-config.xml 文件)\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"prepareTeaJob\">\n    <step id=\"boilWaterStep\" next=\"addTeaStep\"\
  >\n      <tasklet ref=\"boilWater\"/>\n    </step>\n    <step id=\"addTeaStep\"\
  \ next=\"addWaterStep\">\n      <tasklet ref=\"addTea\"/>\n    </step>\n    <step\
  \ id=\"addWaterStep\">\n      <tasklet ref=\"addWater\"/>\n    </step>\n  </job>\n\
  </beans:beans>\n```\n\n此处的 `Job` 由三个步骤组成；每个步骤分别引用 `BoilWater`、`AddTea` 和 `AddWater`\
  \ 的 `Tasklet` 实例。每个步骤必须有唯一的名称，并且需要指定完成后应 `next` 执行哪个步骤。主类 `BatchApplication` 和 `BatchConfiguration`\
  \ 与清单 9-7 和 9-8 中面向 XML 块的示例完全相同。当我们作为 Java 应用程序运行 `BatchApplication` 时，会看到清单 9-20\
  \ 中的输出。\n\n***清单 9-20***. Tasklet 步骤示例的输出\n\n```\n2015-09-26 23:23:04.933  INFO\
