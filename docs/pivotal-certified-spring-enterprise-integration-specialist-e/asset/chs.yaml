  \ 测试模块针对整个应用执行集成测试的能力。\n\nMockMvc 单元测试示例\n\n单独测试 Spring 控制器也很有意义。Spring MVC 测试模块支持此类单元测试。单元测试示例分为多个清单。第一部分如清单\
  \ 4-29 所示。\n\n***清单 4-29***. REST 单元测试示例的导入和签名 (0403-rest-java-config-server)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter04;\n\nimport static org.mockito.Mockito.when;\n\
