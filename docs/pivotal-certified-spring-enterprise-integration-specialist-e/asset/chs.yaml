  \ Job: [SimpleJob: [name=prepareTeaJob]] completed with the following parameters:\
  \ [{sugarAmount=no sugar}] and the following status: [COMPLETED]\n```\n\nJobRepository\n\
  \n我们之前提到过，SB 需要配置 `JobRepository` bean。这个 bean 确保每个 `JobExecution` 和 `StepExecution`\
  \ 的状态（或 SB 使用的其他状态）都持久化到数据存储中。这个数据存储可以是 Spring 能够使用的任何类型的 SQL 数据库。这种访问基于 Spring\
  \ 上下文中定义的 `DataSource` bean。\n\nSB 使用定义的数据库模式来存储其元数据，并提供了 SQL 脚本来为最常用的关系数据库创建或删除模式。这些模式位于\
  \ `spring-batch-core` 库的 `org/springframework/batch/core` 文件夹中。例如，如果我们想为 PostgreSQL\
  \ 数据库创建模式，可以使用 SQL 脚本 `classpath:/org/springframework/batch/core/schema-postgresql.sql`\
  \ 来创建 SB 模式，并使用脚本 `classpath:/org/springframework/batch/core/schema-drop-postgresql.sql`\
  \ 来删除它。\n\n这种机制非常强大，因为开发者无需关心批处理执行状态的持久化。SB 会自动持久化执行状态，因此很容易处理诸如 `Job` 在执行过程中被终止，而我们希望从数据库执行中断点继续执行的情况。\n\
  \n使用 XML 配置配置 JobRepository\n\n此示例未使用 Spring Boot。清单 9-45 展示了此示例所需的 SB bean 配置。\n\
  \n***清单 9-45***. JobRepository 配置所需的 Bean（示例项目 0911-job-repository-xml 的 src/main/resources\
  \ 文件夹中的文件 batch-beans-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:batch=\"http://www.springframework.org/schema/batch\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xmlns:jdbc=\"\
  http://www.springframework.org/schema/jdbc\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n\
      http://www.springframework.org/schema/batch/spring-batch.xsd\n    http://www.springframework.org/schema/jdbc\n\
      http://www.springframework.org/schema/jdbc/spring-jdbc.xsd\n    http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
      http://www.springframework.org/schema/context/spring-context.xsd\">\n\n<context:component-scan\
  \ base-package=\"net.lkrnac.book.eiws.chapter09\" />\n\n<bean id=\"transactionManager\"\
  \n    class=\"org.springframework.batch.support.transaction.ResourcelessTransactionManager\"\
  \ />\n\n<bean id=\"jobLauncher\"\n    class=\"org.springframework.batch.core.launch.support.SimpleJobLauncher\"\
  >\n    <property name=\"jobRepository\" ref=\"jobRepository\" />\n  </bean>\n\n\
  <jdbc:embedded-database id=\"dataSource\" type=\"H2\">\n    <jdbc:script\n      location=\"\
  classpath:/org/springframework/batch/core/schema-h2.sql\" />\n  </jdbc:embedded-database>\n\
  \n<bean id=\"jdbcTemplate\" class=\"org.springframework.jdbc.core.JdbcTemplate\"\
  >\n    <property name=\"dataSource\" ref=\"dataSource\"/>\n  </bean>\n\n<batch:job-repository\
  \ id=\"jobRepository\" data-source=\"dataSource\"\n    transaction-manager=\"transactionManager\"\
  \ table-prefix=\"BATCH_\"\n    max-varchar-length=\"1000\" />\n</beans>\n```\n\n\
  我们使用了 Spring 和 SB 框架提供的四个命名空间：`beans`、`jdbc`、`context` 和 `batch`。这里的默认命名空间是 `beans`，因为我们没有使用很多\
  \ `batch` XML 标签。`<context:component-scan>`、`transactionManager` 和 `jobLauncher`\
  \ 在前面的示例中已经介绍过。组件扫描会将定义包中的所有 bean 注册到 Spring 上下文中。事务管理器用于处理事务，而 `JobLauncher` 用于执行批处理任务。\n\
  \n`<jdbc:embedded-database>` XML 标签配置了本示例中使用的内存数据库。此数据源将仅处理 SB 状态的存储，因此我们通过 SQL\
  \ 脚本 `classpath:/org/springframework/batch/core/schema-h2.sql` 为其创建模式。\n\n`JdbcTemplate`\
  \ 使我们能够轻松查询 SB `JobRepository` 数据存储。最后，我们通过 SB XML 标签 `<batch:job-repository>` 创建\
  \ `JobRepository` bean。我们需要指定必需的属性 `transaction-manager` 和 `data-source`，这里我们使用此\
  \ XML 配置中先前创建的 bean 实例。我们还可以为数据库中的所有 SB 表定义前缀，这有助于避免可能的数据库表名冲突。我们使用的最后一个属性是数据库中\
  \ `VARCHAR` 类型的长度。如果我们的 `Job` 或 `Step` 名称过长，这会很有用。\n\n对于 SB `Job` 配置，我们复用了清单 9-19\
  \ 中的同一个 `prepareTeaJob` 流程。清单 9-46 展示了此示例的主类。\n\n***清单 9-46***. JobRepository XML\
  \ 示例的主类（0911-job-repository-xml）\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import lombok.extern.slf4j.Slf4j;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.JobExecution;\nimport org.springframework.batch.core.JobParameters;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.ImportResource;\n\
  import org.springframework.context.support.GenericApplicationContext;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  \n\n\n@Slf4j\n@Configuration\n@ImportResource({ \"classpath:batch-config.xml\",\
  \ \"classpath:batch-beans-config.xml\" })\npublic class BatchApplication {\n  public\
  \ static void main(String[] args) throws Exception {\n    GenericApplicationContext\
  \ context =\n        new AnnotationConfigApplicationContext(BatchApplication.class);\n\
  \nJobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n\
      Job job = (Job) context.getBean(\"prepareTeaJob\");\n    JobExecution execution\
  \ = jobLauncher.run(job, new JobParameters());\n    log.info(\"退出状态: {}\", execution.getStatus());\n\
  \nJdbcTemplate jdbcTemplate = (JdbcTemplate) context.getBean(JdbcTemplate.class);\n\
      long stepExecutionCount =\n        jdbcTemplate.queryForObject(\"select count(*)\
  \ from BATCH_STEP_EXECUTION\",\n            Long.class);\n    log.info(\"已执行的步骤数:\
  \ {}\", stepExecutionCount);\n    context.close();\n  }\n}\n```\n\n这个主类包含了我们提到的两个\
  \ XML 配置。Spring 上下文的创建是通过普通的 Spring 构造方法完成的，在本例中即 `AnnotationConfigApplicationContext`\
  \ 构造方法，而上下文配置也由此类定义。创建上下文实例后，我们获取 `JobLauncher` 和 `Job` 实例来执行作业。\n\n当作业完成并记录退出状态后，我们从\
  \ Spring 上下文中获取 `JdbcTemplate` 实例，以便查询 H2 内存数据库。在此例中，我们读取了到目前为止针对此 `JobRepository`\
  \ 发生的作业执行次数。\n\n![Image](img/sq.jpg) **注意**  SB 元数据模式的结构超出了本书的讨论范围。好奇的读者可以在 SB 参考文档\
  \ `http://docs.spring.io/spring-batch/trunk/reference/htmlsingle/#metaDataSchema`\
  \ 中找到完整的模式元数据信息。\n\n运行此主类后，我们可以在清单 9-47 中观察输出。\n\n***清单 9-47***. XML JobRepository\
  \ 示例的输出\n\n```\n19:43:00.206 [main] INFO  o.s.b.c.l.support.SimpleJobLauncher - Job:\
  \ [FlowJob: [name=prepareTeaJob]] completed with the following parameters: [{}]\
  \ and the following status: [COMPLETED]\n19:43:00.206 [main] INFO  n.l.b.e.chapter09.BatchApplication\
  \ - Exit Status: COMPLETED\n19:43:00.209 [main] INFO  n.l.b.e.chapter09.BatchApplication\
  \ - Number of steps executed: 3\n```\n\n使用 Java 配置配置 JobRepository\n\n`JobRepository`\
  \ 的 Java 配置如清单 9-48 所示。\n\n***清单 9-48***. JobRepository 的 Java 配置 (0912-job-repository-javaconfig)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport javax.sql.DataSource;\nimport\
  \ org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.batch.core.launch.support.SimpleJobLauncher;\n\
  import org.springframework.batch.core.repository.JobRepository;\nimport org.springframework.batch.core.repository.support.JobRepositoryFactoryBean;\n\
  import org.springframework.batch.support.transaction.ResourcelessTransactionManager;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder;\n\
  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType;\nimport\
  \ org.springframework.transaction.support.AbstractPlatformTransactionManager;\n\n\
  @Configuration\npublic class BatchBeansConfiguration {\n  @Bean\n  public AbstractPlatformTransactionManager\
  \ transactionManager() {\n    return new ResourcelessTransactionManager();\n  }\n\
  \n@Bean\n  public DataSource dataSource() {\n    return new EmbeddedDatabaseBuilder()\n\
          .setType(EmbeddedDatabaseType.H2)\n        .addScript(\"classpath:/org/springframework/batch/core/schema-h2.sql\"\
  )\n        .build();\n  }\n\n@Bean\n  public JdbcTemplate jdbcTemplate(DataSource\
  \ dataSource) {\n    return new JdbcTemplate(dataSource);\n  }\n\n@Bean\n  public\
  \ JobRepository jobRepository(\n      AbstractPlatformTransactionManager transactionManager,\n\
        DataSource dataSource) throws Exception {\n    JobRepositoryFactoryBean jobRepositoryFactory\
  \ =\n        new JobRepositoryFactoryBean();\n    jobRepositoryFactory.setTransactionManager(transactionManager);\n\
      jobRepositoryFactory.setDataSource(dataSource);\n    jobRepositoryFactory.setDatabaseType(\"\
  h2\");\n    jobRepositoryFactory.setTablePrefix(\"BATCH_\");\n    jobRepositoryFactory.setMaxVarCharLength(10);\n\
      return jobRepositoryFactory.getObject();\n  }\n\n@Bean\n  public JobLauncher\
  \ jobLauncher(JobRepository jobRepository) {\n    SimpleJobLauncher simpleJobLauncher\
  \ = new SimpleJobLauncher();\n    simpleJobLauncher.setJobRepository(jobRepository);\n\
      return simpleJobLauncher;\n  }\n}\n```\n\n这个 Java 配置是前一个示例（清单 9-45）中 XML 配置的精确镜像。我们只需将\
  \ `<jdbc:embedded-database>` 和 `<batch:job-repository>` XML 标签替换为这些 Bean 的显式构造，并通过\
  \ `@Bean` 注解注册它们。为了创建 H2 内存数据库，我们使用 `EmbeddedDatabaseBuilder`。对于 `JobRepository`\
  \ 实例的创建，我们使用 `JobRepositoryFactoryBean.getObject()` 调用。其他 Bean 则是 `<bean>` XML 标签的精确\
  \ Java 对应物。\n\n对于此示例，我们还使用了清单 9-21 中的 `BatchConfiguration`，它创建了包含三个通用泡茶 `Step` 的\
  \ `prepareTeaJob`。对于主类，我们使用与清单 9-46 中前一个示例类似的类。唯一的区别是将 `@ImportResource` 注解替换为 `@ComponentScan`\
  \ 注解，因为类路径上没有 XML 配置文件。取而代之的是 Java 配置类 `BatchConfiguration` 和 `BatchBeansConfiguration`，它们会被此注解进行组件扫描。由于这是一个相当简单的主类，我们不再列出。运行后，我们可以看到与前一个示例（清单\
  \ 9-47）相同的输出。\n\n有状态 Job 和 Step 执行\n\n通常需要在 `Job` 或 `Step` 之间传递状态，这些状态可以是任何 Java\
  \ 对象。例如，一个 `Step` 或 `Job` 可能正在处理记录，而后续的 `Job` 或 `Step` 需要发送已处理记录数量的通知。\n\n通常，Java\
  \ 开发人员会创建某种需要线程安全的内存缓存。但幸运的是，SB 提供了多种机制来以干净且线程安全的方式传递状态。\n\nExecutionContext\n\n\
  状态转换的第一个选项可以通过 `ExecutionContext` 类实现。此类封装了一个类型为 `Map<String, Object>` 的映射。因此，我们能够存储需要在步骤或面向块的项目处理器之间传递的任何类型的状态。如果我们需要在批处理过程中存储部分结果，这会很方便。但当然，这个实例需要以某种方式注入到我们需要使用它的地方。幸运的是，SB\
  \ 提供了多种从 SB 应用程序的任何部分访问 `ExecutionContext` 的方法。\n\n正如我们提到的，当 `Step` 执行时，会创建一个 `StepExecution`\
  \ 实例；当 `Job` 执行时，会创建一个 `JobExecution` 实例。通过 `StepExecution.getJobExecution()`，我们可以访问\
  \ `JobExecution` 实例；通过 `JobExecution.getExecutionContext()`，我们可以访问 `ExecutionContext`\
  \ 实例。\n\n`StepExecution` 实例可以通过使用 `@BeforeStep` 注解的初始化方法注入到任何面向块的 `ItemProcessor`、`ItemWriter`\
  \ 和 `ItemReader` 中。对于 `Tasklet`，有一个更简单的机制，SB 将 `ChunkContext` 实例作为 `Tasklet.execute()`\
  \ 的第二个参数注入。然后可以访问 `StepExecution` 实例，即 `ChunkContext.getStepContext().getStepExecution()`。\n\
  \n\n\n因此，通过所有这些上下文实例，我们可以在 SB 流程的任何部分访问 `ExecutionContext` 实例。\n\n从 Tasklet 访问 ExecutionContext\
  \ 的示例\n\n清单 9-49 展示了将状态存储到 `ExecutionContext` 实例中的 `Tasklet`。在此示例中，我们统计了在之前的 `Job`\
  \ 运行中泡茶的次数。基于此信息，我们调整了一个 `Step` 的行为。因此，我们的泡茶 `Tasklet` 将带有 `WithCounter` 后缀。\n\n\
  ***清单 9-49***. 将状态存储到 ExecutionContext 中的 Tasklet (0913-execution-context-tasklet)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.step.tea;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  import org.springframework.batch.core.StepContribution;\nimport org.springframework.batch.core.scope.context.ChunkContext;\n\
  import org.springframework.batch.core.step.tasklet.Tasklet;\nimport org.springframework.batch.item.ExecutionContext;\n\
  import org.springframework.batch.repeat.RepeatStatus;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class BoilWaterWithCounter\
  \ implements Tasklet {\n  private SimpleExecutablePoint simpleExecutableStep;\n\n\
  @Autowired\n  public BoilWaterWithCounter(SimpleExecutablePoint simpleExecutableStep)\
  \ {\n    super();\n    this.simpleExecutableStep = simpleExecutableStep;\n  }\n\n\
  @Override\n  public RepeatStatus execute(StepContribution contribution,\n      ChunkContext\
  \ chunkContext) throws Exception {\n    simpleExecutableStep.execute(\"Boil Water\"\
  );\n    ExecutionContext jobExecutionContext =\n        chunkContext.getStepContext().getStepExecution().getJobExecution()\n\
              .getExecutionContext();\n    int teaCount = jobExecutionContext.getInt(\"\
  teaCount\", 0);\n    teaCount++;\n    jobExecutionContext.putInt(\"teaCount\", teaCount);\n\
      return RepeatStatus.FINISHED;\n  }\n}\n```\n\n每次执行此 `Tasklet` 时，它都会递增存储在 `ExecutionContext`\
  \ 实例中的 `teaCount` 值，该实例通过调用 `chunkContext.getStepContext().getStepExecution().getJobExecution().getExecutionContext()`\
  \ 获取。清单 9-50 展示了如何使用此状态。\n\n***清单 9-50***. 从 ExecutionContext 检索状态的 Tasklet (0913-execution-context-tasklet)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.step.tea;\nimport net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\
  import org.springframework.batch.core.StepContribution;\nimport org.springframework.batch.core.scope.context.ChunkContext;\n\
  import org.springframework.batch.core.step.tasklet.Tasklet;\nimport org.springframework.batch.item.ExecutionContext;\n\
  import org.springframework.batch.repeat.RepeatStatus;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class AddWaterWithCounter\
  \ implements Tasklet {\n  private SimpleExecutablePoint simpleExecutableStep;\n\n\
  @Autowired\n  public AddWaterWithCounter(SimpleExecutablePoint simpleExecutableStep)\
  \ {\n    super();\n    this.simpleExecutableStep = simpleExecutableStep;\n  }\n\n\
  @Override\n  public RepeatStatus execute(StepContribution contribution,\n      ChunkContext\
  \ chunkContext) throws Exception {\n    String message = \"Add Water\";\n    ExecutionContext\
  \ jobExecutionContext =\n        chunkContext.getStepContext().getStepExecution().getJobExecution()\n\
              .getExecutionContext();\n    int teaCount = jobExecutionContext.getInt(\"\
  teaCount\");\n    if (teaCount > 2) {\n      message = \"Add Dirty Water (you should\
  \ clean kettle with citric acid)\";\n    }\n    simpleExecutableStep.execute(message);\n\
      return RepeatStatus.FINISHED;\n  }\n}\n```\n\n这是一个 `Tasklet`，其中来自 `ExecutionContext`\
  \ 的状态将用于调整步骤的行为。每次 SB 执行此 `Tasklet` 时，它也会通过调用 `chunkContext.getStepContext().getStepExecution().getJobExecution().getExecutionContext()`\
  \ 来检索 `Job` 的 `ExecutionContext`，以查找其中存储的 `teaCount` 值。如果 `teaCount` 大于 2，它会模拟执行并附带不同的消息，以突出其对\
  \ `ExecutionContext` 中状态的响应。清单 9-51 展示了此示例的批处理配置。\n\n***清单 9-51***. 从 Tasklet 访问\
  \ ExecutionContext 的示例的批处理配置 (0913-execution-context-tasklet)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;\nimport net.lkrnac.book.eiws.chapter09.step.tea.AddWaterWithCounter;\n\
  import net.lkrnac.book.eiws.chapter09.step.tea.BoilWaterWithCounter;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.beans.factory.annotation.Qualifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n\n@Configuration\n\
  @EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n  public Step\
  \ boilWaterStep(StepBuilderFactory stepFactory, BoilWaterWithCounter boilWater)\
  \ {\n    return stepFactory.get(\"boilWaterStep\").tasklet(boilWater)\n        .allowStartIfComplete(true).build();\n\
    }\n\n@Bean\n  public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea)\
  \ {\n    return stepFactory.get(\"addTeaStep\").tasklet(addTea)\n        .allowStartIfComplete(true).build();\n\
    }\n\n@Bean\n  public Step addWaterStep(StepBuilderFactory stepFactory, AddWaterWithCounter\
  \ addWater) {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater)\n\
          .allowStartIfComplete(true).build();\n  }\n\n@Bean\n  public Job prepareTeaJob(JobBuilderFactory\
  \ jobBuilderFactory,\n      @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n\
        @Qualifier(\"addTeaStep\") Step addTeaStep,\n      @Qualifier(\"addWaterStep\"\
  ) Step addWaterStep) {\n    return jobBuilderFactory.get(\"prepareTeaJob\")\n        .start(boilWaterStep)\n\
          .next(addTeaStep)\n        .next(addWaterStep)\n        .build();\n  }\n\
  }\n```\n\n很明显，与上一个示例的一个区别是我们使用了有状态的 `Tasklet`。第二个区别是允许步骤使用相同的 `JobParameters` 多次执行。如果我们不允许\
  \ `Step` 多次启动，就无法突出显示我们如何在不同的 `Job` 运行之间传递状态。此功能将在本章后面讨论。清单 9-52 展示了此示例的主类。\n\n\
  ***清单 9-52***. 从 Tasklet 访问 ExecutionContext 的示例的主类 (0913-execution-context-tasklet)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.JobParameters;\nimport org.springframework.batch.core.launch.JobLauncher;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.context.support.GenericApplicationContext;\n\n@SpringBootApplication\n\
  public class BatchApplication {\n  public static void main(String[] args) throws\
  \ Exception {\n    GenericApplicationContext context =\n        new AnnotationConfigApplicationContext(BatchApplication.class);\n\
  \nJobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n\
      Job job = (Job) context.getBean(\"prepareTeaJob\");\n\n\n\njobLauncher.run(job,\
  \ new JobParameters());\n    jobLauncher.run(job, new JobParameters());\n    jobLauncher.run(job,\
  \ new JobParameters());\n    context.close();\n  }\n}\n```\n\n为了突出我们引入的有状态特性，我们执行了三次批处理作业。你可能还记得，每次作业都会递增\
