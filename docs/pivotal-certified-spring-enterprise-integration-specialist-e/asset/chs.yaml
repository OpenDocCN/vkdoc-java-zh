  \n\n\n我的职业生涯始于嵌入式软件开发，这些能力也是我当初学习的重点。但不久后，我转向了 Java 和 Spring 开发。我努力工作了近七年，参与了各种规模和领域的\
  \ Web 与企业级项目。2014 年，我获得了 Spring 企业集成专家认证。\n\n我天生对 Spring 生态系统感到惊叹；对我来说，重新发明轮子是不可取的。我的一大热情在于自动化和测试。我很懒，并且坚信开发者不应该做重复性的工作。这就是为什么本书的示例（`https://github.com/lkrnac/book-eiws-code-samples`）都包含了测试。Spring\
  \ 成为我首选框架的原因之一，就是它的可测试性。\n\n我在我的网站 `www.lkrnac.net` 上撰写博客文章，这些文章经常被 DZone、Java Code\
  \ Geeks 和 Web Code Geeks 转载。我对现代 JavaScript 开发也很感兴趣：ES6、Node.js、Grunt、Gulp、LoopBack\
  \ 和 AngularJS。我的 Twitter 账号是 @luboskrnac，我的电子邮件地址是 `lubos.krnac@gmail.com`。\n\n\
  关于技术审阅者\n\n![9781484207949_unFM-02.jpg](img/9781484207949_unFM-02.jpg)\n\n**曼努埃尔·乔丹·埃莱拉**\
  \ 是一位自学成才的开发者和研究员，他乐于学习新技术用于自己的实验，并创建新的集成方案。\n\n曼努埃尔曾获得 2010 年 Springy 奖——社区冠军和\
  \ 2013 年 Spring 冠军。在有限的空闲时间里，他阅读圣经并用吉他作曲。曼努埃尔以 dr_pompeii 的网名闻名。他为 Apress 出版社技术审阅了多本书籍，包括《Pro\
  \ Spring, 第四版》（2014）；《Practical Spring LDAP》（2013）；《Pro JPA 2, 第二版》（2013）；以及《Pro\
  \ Spring Security》（2013）。\n\n阅读他关于众多 Spring 技术的 13 篇详细教程，并通过他的博客 `www.manueljordanelera.blogspot.com`\
  \ 联系他。你也可以在他的 Twitter 账号 `@dr_pompeii` 上关注他。\n\n致谢\n\n我最深的感谢献给我的妻子伊娃和女儿米娅，感谢她们给予我无尽的支持、耐心和爱，不仅仅是在我撰写本书期间。非常感谢！\n\
  \n我的母亲、父亲和家人在我从小到大的成长过程中给予了巨大的支持，帮助我走到了今天。非常感谢！\n\n我非常感激所有在斯洛伐克和爱尔兰的职业生涯中，我有幸与之共事和生活的朋友和同事们。我从你们身上学到了很多，无论是你们指导我，还是我指导你们的时候。非常感谢！\n\
  \n我不能忘记我所有非技术领域的朋友们。你们可能永远不会读到这些，但你们在我生命中扮演了，并且希望将继续扮演重要的角色。非常感谢！\n\n本书致谢的另一大部分属于\
  \ Apress 团队。你们在引导我进入出版界方面提供了极大的帮助。Steve Anglin 促成了我撰写本书；Mark Powers 管理我的进度；Matthew\
  \ Moodie 提供了编辑和建议；Sharon Wilkey、Chris Nelson 和 Dhaneesh Kumar 提升了内容的最终形态。非常感谢！\n\
  \n特别感谢 Manuel Jordan 在创作本书内容时提供的宝贵指导、见解和技术专长。非常感谢！\n\n引言\n\nJava 凭借其坚如磐石的 JVM，在企业级世界中占据主导地位。Spring\
  \ 是分布式系统中使用的主要 Java 平台。理解 Spring 产品组合对于企业级 Java 开发者至关重要。市场对 Spring 技能的需求正在急剧增长。\n\
  \n本书涵盖了 Spring 产品组合为企业级开发提供的所有主要特性，并为你准备 Pivotal 认证的企业集成专家（Spring）考试。当你获得 Pivotal\
  \ 认证时，你将拥有 Java 领域最有价值的证书之一。\n\n涵盖的考试主题包括：任务与调度、远程调用、Spring Web Services 框架、基于 Spring\
  \ MVC 的 RESTful 服务、Spring JMS 模块、基于 Spring 的 JMS 和 JTA 事务，以及使用 Spring Batch 和 Spring\
  \ Integration 框架进行批处理。本书通过解释示例并聚焦于主要的架构考量和概念来涵盖这些内容。示例是本书篇幅的最大贡献者，并在 GitHub 上开源（`https://github.com/lkrnac/book-eiws-code-samples`）。\n\
  \n本书的一个重要方面是关注 Spring 框架提供的新颖和现代的抽象。因此，大多数特性都通过 Java 注解（如果存在）以及传统的 XML 配置来展示。大多数示例也基于\
  \ Spring Boot 框架。由于 Spring Boot 能够根据合理的默认配置显著简化 Spring 配置，其采用率呈指数级增长。但 Spring Boot\
  \ 并非考试目标，因此所有特性也通过纯 Spring 配置示例进行了介绍。\n\n你将学到什么\n\n本书涵盖以下主题：\n\n*   如何使用 Spring\
  \ 创建并发应用程序和调度任务\n*   如何进行远程调用以实现客户端/服务器应用程序\n*   如何使用 Spring Web Services 创建松耦合的\
  \ Web 服务和客户端\n*   如何使用 Spring MVC 创建 RESTful Web 服务和客户端\n*   如何集成 JMS 以实现基于异步消息传递的通信\n\
  *   如何在 Spring 中使用本地 JMS 事务\n*   如何在 Spring 中配置全局 JTA 事务\n*   如何使用 Spring Integration\
  \ 创建事件驱动的管道-过滤器架构并与外部应用程序集成\n*   如何使用 Spring Batch 进行基于自定义和内置处理组件的、可管理的、可扩展的批处理\n\
  \n本书读者对象\n\n本书面向具有 Spring 框架编程和开发经验的开发者和架构师。理解 Java 是阅读本书的必要条件，同时还需要了解依赖注入模式和 Spring\
  \ 的控制反转容器特性。考试所需的所有其他特性都将从零开始讲解，重点在于让初学者也能理解，同时为中级和专家级读者提供有价值的材料。\n\n本书结构\n\n\n\n\
  *   第 1 章探讨了 Spring 对异步处理的抽象，并将其与纯 Java 支持进行了比较。本章还涵盖了 Spring 的调度支持。\n*   第 2 章比较了\
  \ Spring RMI 支持与 Java RMI API，并解释了 Spring HttpInvoker 抽象，以及 Spring 提供的 Hessian 和\
  \ Burlap 协议支持。\n*   第 3 章深入介绍了 Spring Web Services 框架及其特性。它展示了 Spring 如何促进 SOAP\
  \ Web 服务开发的契约优先风格以及客户端支持。\n*   第 4 章介绍了 REST 原则和主要的 HTTP 特性。然后重点介绍了用于 REST 服务的 Spring\
  \ MVC 用法，并将其与 JAX-RS API 进行了比较。本章还涵盖了客户端支持和对 REST API 有用的 Spring 测试支持。\n*   第 5\
  \ 章展示了 Java 消息服务（JMS）的 Java 抽象，并将其与 Spring 抽象进行了比较。它涵盖了两种消息传递模式（点对点和发布/订阅），并解释了如何同步读取和发送消息，以及如何异步监听。\n\
  *   第 6 章涵盖了 JMS 确认模式和事务支持。随后深入探讨了如何将它们与 Spring JMS 模块一起使用。\n*   第 7 章介绍了 JTA 事务，并展示了如何将它们与\
  \ Spring 一起使用。\n*   第 8 章审视了 Spring Integration 框架及其消息、消息端点和消息通道类型。它还重点关注了诸如拦截、同步与异步消息传递以及错误处理等主题。\n\
  *   第 9 章讨论了 Spring Batch 框架的特性，包括其领域模型、执行批处理、向作业传递参数、状态转换、提供拦截以及控制批处理流程。它还深入探讨了提供扩展和并行处理的高级主题。\n\
  \n约定\n\n所有示例的编写方式都无需额外换行。*斜体*用于强调内容的特定方面。我相信项目符号能使内容中的选项更具可读性和易记性，因此它们常被用来列出所讨论的特性。\n\
  \n前提条件\n\n由于我们使用 Java，操作系统并不重要。本书中的示例有时会使用 Java 8 特性，因此你需要安装 Java 8。\n\n同样重要的是，需要准备好\
  \ Spring Tools Suite (STS) IDE（Spring 定制的 Eclipse 版本），因为 Spring Integration 和 Spring\
  \ Batch 会用到它的可视化功能。可以从 Spring 网站 `http://spring.io/tools/sts/all` 下载。在撰写本书时，最新版本是\
  \ 3.7.1.RELEASE。你也可以使用安装了 Spring Tools Suite 插件的普通 Eclipse，但建议使用 STS 产品。\n\n所有示例都使用最常见的\
  \ Java 构建工具 Maven，因此你需要互联网连接来构建示例。不需要单独安装 Maven，因为 STS 开箱即用地包含了嵌入式 Maven 安装。\n\n\
  你可以使用其他流行的 Java IDE，如 IntelliJ IDEA 或 NetBeans，但对于 Spring Integration 和 Spring Batch\
  \ 示例，你将失去 STS 的可视化功能。\n\n在整本书中，我们将介绍各种工具，如 Lombok、PlantUML、ObjectAid 和 Chrome 的\
  \ DHC REST/API 客户端插件。这些工具的使用和安装方法将在使用它们时进行说明。由于我们使用 Chrome 插件，你需要有一个 Chrome 浏览器。但你可以随意使用任何你喜欢的\
  \ HTTP 查询工具来代替 DHC REST/API 客户端插件；在这种情况下，完全不需要 Chrome。\n\n下载代码\n\n代码示例托管在 GitHub\
  \ 上：`https://github.com/lkrnac/book-eiws-code-samples`。在你的命令行中执行命令 `git clone https://github.com/lkrnac/book-eiws-code-samples`。\n\
  \n联系作者\n\n我热切期待您对本书的反馈。如果您在内容或示例中发现任何问题，请在本书示例的 GitHub 仓库中提交问题：`https://github.com/lkrnac/book-eiws-code-samples`。我的个人网站\
  \ `www.lkrnac.net/about` 包含所有可能联系到我的链接。联系我最有效的方式是发送电子邮件至 `lubos.krnac@gmail.com`\
  \ 或在推特上@luboskrnac。\n\n第 1 章\n\n![image](img/frontdot.jpg)\n\n任务与调度\n\n如今，随着计算机核心数量的增加和处理器速度的提升，应用程序能够利用这种计算能力变得至关重要。让我们将处理器比作工作中的你。想象一下，你被一个任务卡住了，只有你经验丰富的队友能帮你。但他去吃午饭了。你可以切换到另一个任务，或者等他。但当你决定等待队友的帮助并刷一会儿社交媒体时，你的工作进度就被阻塞了。在你的导师回来之前，你完全没有产出。如果他不回来了呢？你的雇主可不会高兴。\n\
  \n现在想象一个需要通过超文本传输协议（HTTP）访问文件系统、数据库或第三方系统的应用程序。该应用程序的操作是一个阻塞操作：CPU 在等待输入/输出（I/O）响应时什么也不做。同时，新的请求不断涌入并等待处理。这种场景是性能瓶颈的典型例子。\n\
  \n这种情况可以通过将 CPU 的注意力转移到单独的线程执行上来解决。当前线程的堆栈和上下文被挂起（这样处理器可以在之后继续计算，就好像线程从未被终止一样），然后\
  \ CPU 开始短时间地计算另一个线程。这种线程间的上下文切换允许 CPU 优先处理管道，专注于需要处理的任务，而不是那些等待 I/O 响应的任务。这个概念通常被称为*多任务处理*、*多线程*或*并发处理*。\n\
  \n线程对于以下类型的应用程序非常有价值：\n\n*   输入/输出密集型（例如，存储和从数据库读取数据的应用程序）\n*   为多个客户端提供请求服务的应用程序（例如，Web\
  \ 应用程序）\n*   希望充分利用所有 CPU 核心全部性能的应用程序\n\n多线程涵盖了即时的并行执行。它通常由用户操作触发——例如，从 Web 浏览器发送请求，或通过应用程序图形用户界面（GUI）中执行的操作触发。但某些处理不能依赖外部触发。这时，并发编程的另一个重要概念就发挥作用了：*任务调度*。执行可以被安排在特定时间启动一次，甚至重复执行。例如后台批处理和系统维护静默时段。\n\
  \n创建可维护的并发代码的能力已成为开发者知识库的重要组成部分。然而，这并不容易。语言的演进带来了各种有助于实现这一点的抽象。理解如何应用这些抽象以实现最佳性能至关重要。\n\
  \nSpring 企业组合中的所有项目都依赖于多线程。这就是为什么你需要理解 Spring 用于线程和调度的构造。本章还强调了它们相对于标准 Java API\
  \ 的优势。但它不涵盖诸如同步、锁定、死锁或资源共享等复杂部分。\n\nJava 中的多线程\n\n\n开发异步并发应用程序并非易事。早期的 Java 版本提供了难以维护的线程抽象。让我们快速了解基本概念，跳过不太重要的部分。\n\
  \nJava SE\n\n在 Java 世界中，多线程的主要元素是 `java.lang.Runnable` 接口（如清单 1-1 所示）。\n\n***清单\
  \ 1-1***. Runnable 接口\n\n```\npackage java.lang;\n\npublic interface Runnable {\n\
      public abstract void run();\n}\n```\n\nJava 开发者实现此接口，并将并发逻辑放入 `Runnable.run()`\
  \ 方法中。*它既不接收也不返回任何参数。*\n\n为了控制并发执行，可以使用 `java.lang.Thread` 类。当执行 `Thread.start()`\
  \ 方法时，Java 虚拟机 (JVM) 会启动一个新线程，同时当前线程也会继续处理——大致如此。CPU 在这两个任务之间切换其注意力，开发者无法预测处理器的注意力会在何时分配给某段特定代码。如果\
  \ CPU 有多个核心，两个线程可以同时运行，从而充分利用计算能力的最佳分配。\n\n创建线程是一项 CPU 和内存密集型操作。此外，直接使用 `java.lang.Thread`\
  \ 被证明过于底层，并且常常导致代码难以维护。因此，Java SE 5 引入了新的 `java.util.concurrent` 包，该包在所谓的*线程池*中实现了线程的复用。主要接口\
  \ `java.util.concurrent.Executor` 如清单 1-2 所示。\n\n***清单 1-2***. Executor 接口\n\n```\n\
  package java.util.concurrent;\n\npublic interface Executor {\n    void execute(Runnable\
  \ command);\n}\n```\n\n基本概念是将并发行为封装到实现 `java.lang.Runnable` 接口的类中，并将其传递给线程池执行。线程池（`java.util.concurrent.Executor`\
  \ 的一个实现）负责在并行的执行线程中执行并发代码。\n\nJava SE 5 并发工具引入的 `java.util.concurrent.Executor`\
  \ 的一个关键子接口是 `java.util.concurrent.ExecutorService`，如清单 1-3 所示。\n\n***清单 1-3***.\
  \ 部分 ExecutorService 接口签名\n\n```\npackage java.util.concurrent;\n\npublic interface\
  \ ExecutorService extends Executor {\n    void shutdown();\n    boolean isShutdown();\n\
      boolean isTerminated();\n    boolean awaitTermination(long timeout, TimeUnit\
  \ unit)\n        throws InterruptedException;\n    <T> Future<T> submit(Callable<T>\
  \ task);\n    <T> Future<T> submit(Runnable task, T result);\n    Future<?> submit(Runnable\
  \ task);\n    ...\n}\n```\n\n`ExecutorService` 在线程池之上提供了两组操作。一组用于终止线程执行。以下是此类别中的主要方法：\n\
  \n*   `shutdown`：线程池不再接受新任务执行。\n*   `isShutdown`：指示线程池是否已计划关闭（某些线程可能仍在运行）。\n*  \
  \ `isTerminated`：指示线程是否已终止（所有线程都已完成）。\n*   `awaitTermination`：阻塞当前线程，直到所有任务完成。\n\
  \n`ExecutorService` 的第二组方法用于提交任务执行。从声明中可以看出，它们的签名看起来很复杂。新引入的是 `java.util.concurrent.Future<V>`\
  \ 和 `java.util.concurrent.Callable<V>`。它们专为 `java.util.Runnable` 无法处理的用例而设计，例如从线程返回值以及将异常传播到调用者线程。\n\
  \n顾名思义，`Future` 包装了稍后由并发逻辑返回的值。值类型由泛型 `V` 指定。它将在未来由分叉线程填充。调用者线程可以通过调用 `Future.get()`\
  \ 来获取它。但调用者线程将被阻塞，直到该值被分叉线程填充。或者，当不适合长时间阻塞调用者时，我们可以将超时传递给 `Future.get(long timeout,\
  \ TimeUnit unit)`。\n\n`java.util.concurrent.Callable` 是为任务声明而设计的接口，类似于 `java.lang.Runnable`。但它提供了比\
  \ `java.lang.Run``nable` 更多的可能性，因为它的方法可以返回值并抛出异常。请参见清单 1-4。\n\n***清单 1-4***. Callable\
  \ 接口\n\n```\npackage java.util.concurrent;\n\npublic interface Callable<V> {\n    V\
  \ call() throws Exception;\n}\n```\n\n线程池抽象 `java.util.concurrent.ExecutorService`\
  \ 有多种实现。最值得注意的是 `java.util.concurrent.ThreadPoolExecutor` 类，它具有多种构造函数来配置其属性。线程池属性可用于对线程池进行细粒度调优。`java.util.concurrent.ThreadPoolExecutor`\
  \ 最重要的属性如下：\n\n*   `corePoolSize`：池中要保持的线程数\n*   `maximumPoolSize`：允许同时运行的最大线程数\n\
  *   `keepAliveTime` 与 `unit`：超过 `corePoolSize` 的线程的空闲超时时间\n*   `workQueue`：当池中没有足够的工作线程时，用于存放已提交等待执行的任务的队列\n\
  \n我们可以直接通过 `java.util.concurrent.ThreadPoolExecutor` 构造函数创建线程池，但更方便的方式是通过工厂类 `java.util.concurrent.Executors`\
  \ 创建，如清单 1-5 所示。\n\n***清单 1-5***. 部分 Executors 类签名——基本线程池的工厂方法\n\n```\npackage java.util.concurrent;\n\
  \npublic class Executors {\n    public static ExecutorService newFixedThreadPool(int\
  \ nThreads);\n    public static ExecutorService newSingleThreadExecutor();\n    public\
  \ static ExecutorService newCachedThreadPool();\n\n//在 Java SE 8 中引入：\n    public\
  \ static ExecutorService newWorkStealingPool();\n    public static ExecutorService\
  \ newWorkStealingPool(int parallelism)\n\n...\n}\n```\n\n`Executors` 包含更多工厂方法，可以对线程池进行强大的控制，但在大多数情况下，上述方法应该足够了。前三个工厂方法使用\
  \ `java.util.concurrent.ThreadPoolExecutor` 作为线程池实现。每个工厂都使用不同的构造函数参数创建它。\n\n`newFixedThreadPool(int\
  \ nThreads)` 创建一个固定大小的线程池。池的期望大小作为参数传递给此工厂方法。如果未达到 `nThreads` 限制，此池将立即开始执行新线程。当池中包含\
  \ `nThreads` 个正在运行的线程时，任何后续提交执行的任务都将在队列中等待，直到某个正在运行的线程完成其工作或被中断。因此，当发生意外的峰值事件时，线程会被阻塞，但这种情况不会使整个应用程序过载。\n\
  \n`newSingleThreadExecutor()` 创建一个只有一个线程的线程池。如果这个单个工作线程当前正在运行，后续提交的任务将被排队。\n\n`newCachedThreadPool()`\
  \ 创建一个重用已完成线程的线程池。它仅在池中没有空闲线程时才创建新线程。如果我们需要处理大量短任务，这个池会很方便。因为创建线程是一项 CPU 和内存密集型操作，我们可以从重用相同的线程实例中受益。\n\
  \n\n\n清单 1-3 中展示的最后两个工厂方法是在 Java SE 8 中引入的。它们使用 `java.util.concurrent.ForkJoinPool`\
  \ 作为底层线程池实现。该实现于 Java SE 7 中引入，采用了一种独特的线程间 CPU 负载分配算法，称为*工作窃取*。空闲线程可以从繁忙线程那里“窃取”工作，而不是静默等待。\n\
  \n`Executors.newWorkStealingPool()` 会创建一个线程池，其大小等于当前运行机器的核心数。因此，它试图最有效地利用 CPU 能力，因为运行中的线程数超过核心数会导致频繁的上下文切换，而上下文切换并非无资源消耗的操作。但这种线程池不适合\
  \ I/O 密集型处理。原因同样与线程数量有关。如果线程大部分时间都在等待 I/O 操作，并且池中没有其他线程能让 CPU 核心保持忙碌，那么大量的 CPU 周期就会浪费在等待上。对于此类\
  \ I/O 密集型操作，一个更好的选择是固定线程池，其线程数大于可用核心数。更优的选择是缓存线程池。\n\n`Executors.newWorkStealingPool(int\
  \ parallelism)` 创建的线程池不会考虑当前机器的核心数，而是根据给定的并行度级别来优化线程池。因此，池的大小会根据 `parallelism` 指定的线程数进行优化。除非你是\
  \ `ForkJoinPool` 的熟练用户，否则请使用默认并行度，即等于可用核心数（使用不带 `parallelism` 参数的 `Executors.newWorkStealingPool()`）。\n\
  \n![图片](img/sq.jpg) **注意**  fork/join 算法超出了本书的讨论范围。要熟悉该算法的特殊功能，Oracle 关于 fork/join\
  \ 池的教程提供了很好的解释：`http://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html`。`java.util.concurrent.ForkJoinPool`\
  \ 和 `java.util.concurrent.ForkJoinTask` 的 Javadoc 文档详细解释了为什么这种类型的池不适合 I/O 密集型操作。\n\
  \n线程池的参数（尤其是其大小）可以显著提升或降低并行处理的性能。理解线程池所处理的并发任务的性质至关重要。各种考量因素都会影响线程池的配置。例如，开发人员需要了解并行任务是\
  \ CPU 密集型、I/O 密集型还是混合型。\n\n如果处理的是 CPU 密集型操作，我们希望线程数尽可能接近机器的核心数。这可以避免在线程之间频繁切换，从而在\
  \ CPU 有足够处理任务保持忙碌时，减少不必要的开销。\n\n如果处理的是 I/O 密集型操作，我们通常希望有更多的可用线程，因为我们不希望 CPU 在阻塞的\
  \ I/O 操作上浪费周期。但线程数不能太多，因为线程切换的开销会降低性能。需要找到平衡点。\n\n对于混合类型的处理，同样需要找到平衡点。当 I/O 密集型和\
  \ CPU 密集型操作混合在同一个线程池中时，没有任何调整配置的指导原则。如果有助于解决问题，开发人员可以考虑将任务拆分到不同的线程中。但这种拆分对于 `ForkJoinPool`\
  \ 来说没有意义，因为它是针对当前机器的核心数进行优化的。因此，我们可能希望只保留一个实例用于处理 CPU 密集型操作。\n\n试图猜测线程池的配置是不可能的。它需要由性能测试来支撑，或者至少通过基准测试或对某些模块的微基准测试来验证。在尽可能接近生产环境且负载与预期生产负载相似的条件下进行性能测试，会比孤立地对模块进行基准测试得到更准确的结果。\n\
  \n![图片](img/sq.jpg) **注意**  如果你想更深入地了解线程池大小调整以及线程池的其他关键方面，Brian Goetz 的这篇文章对这个复杂主题提供了一个简短而恰当的介绍：`www.ibm.com/developerworks/library/j-jtp0730/index.html`。\n\
  \n`java.util.concurrent.Executor` 接口的实现有效地使 `java.lang.Threa``d` 类过时了，因为它们抽象出了对底层线程处理的需求，并提供了相同的灵活性。\n\
  \n在所有这些理论之后，是时候展示一个示例了。请参见清单 1-6。\n\n***清单 1-6***. 简单异步任务 (0101-java-concurrency)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter01.javaconcurrency;\nimport java.util.Random;\n\
  import java.util.concurrent.Callable;\npublic class SimpleTask implements Callable<String>\
  \ {\n  private static final int SIMULATE_IO = 1000;\n  private final Random random\
  \ = new Random();\n\n@Override\n  public String call() throws Exception {\n    Integer\
  \ value = random.nextInt();\n    String threadName = Thread.currentThread().getName();\n\
  \nThread.sleep(SIMULATE_IO);\n    if (value % 2 == 0) {\n      throw new UnsupportedOperationException(threadName\
  \ + \" threw exception\");\n    }\n    return threadName + \" generated number \"\
   + value;\n  }\n}\n```\n\n`SimpleTask` 类是我们的逻辑，它应该被并发执行。它实现了带有泛型类型 `String` 的 `java.util.concurrent.Callable`\
  \ 接口，以指定从并发逻辑传递到调用者线程的返回值类型。它还包含各种语句，以突出 `java.util.concurrent` 包的以下特性：\n\n*   生成一个随机的\
  \ `value`，以模拟从并发逻辑中抛出的 `UnsupportedOperationException` 形式的错误。\n*   通过调用 `Thread.sleep(SIMULATE_IO)`\
  \ 模拟阻塞的 I/O 操作。它会使并发逻辑阻塞 1 秒钟。\n*   在成功的情况下返回一个 `String` 值。\n\n*但请注意，这种机制不允许异步代码接受参数。*\
  \ `SimpleTask` 由清单 1-7 中所示的类调用。\n\n***清单 1-7***. 异步任务的调用者 (0101-java-concurrency)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter01.javaconcurrency;\n\nimport java.util.ArrayList;\n\
  import java.util.Collection;\nimport java.util.concurrent.ExecutionException;\n\
  import java.util.concurrent.ExecutorService;\nimport java.util.concurrent.Future;\n\
  import java.util.concurrent.TimeUnit;\n\npublic class SimpleTaskExecutor {\n  private\
  \ final ExecutorService executorService;\n  private final int execCount;\n\npublic\
  \ SimpleTaskExecutor(ExecutorService executorService, int execCount) {\n    super();\n\
      this.executorService = executorService;\n    this.execCount = execCount;\n  }\n\
  \npublic void executeTasks() throws InterruptedException {\n    Collection<Future<String>>\
  \ results = new ArrayList<>(execCount);\n    long start = System.currentTimeMillis();\n\
      SimpleTask task = new SimpleTask();\n    for (int idx = 0; idx < execCount;\
  \ idx++) {\n      results.add(executorService.submit(task));\n    }\n\nexecutorService.shutdown();\n\
      executorService.awaitTermination(Integer.MAX_VALUE, TimeUnit.DAYS);\n\nresults.forEach(result\
  \ -> {\n      try {\n         System.out.println(result.get());\n      } catch (InterruptedException\
  \ | ExecutionException exception) {\n         System.out.println(exception.getLocalizedMessage());\n\
        }\n    });\n    System.out.println(\"Elapsed time: \" + (System.currentTimeMillis()\
  \ - start));\n  }\n}\n```\n\n\n\n该类通过构造函数接收两个属性。首先，`executorService` 代表用于管理并发执行的线程池。我们使用\
  \ `java.util.concurrent.ExecutorService` 的实例，以便能够针对不同的线程池执行并发处理。第二个构造函数参数指定了要在该线程池上执行的任务数量。\n\
  \n并发执行本身发生在 `executeTasks()` 方法中。开始时，它创建了一个 `Future` 实例的集合，用于收集并发任务的结果。之后，它将执行开始时间保存到变量\
  \ `start` 中。随后，在 `for` 循环中，它逐个将 `SimpleTask` 提交到线程池执行。`Future` 结果被收集到 `results`\
  \ 集合中。在此阶段，线程池开始并行执行任务。\n\n当所有任务都已提交执行，并且我们的工作正在后台处理时，包含了两个可用于礼貌地关闭线程池（不中断所有当前正在运行的线程）的命令。调用\
  \ `executorService.shutdown()` 后，线程池将拒绝进一步的任务提交。调用 `awaitTermination` 后，当前线程将被阻塞，直到线程池中的最后一个线程完成其执行。\n\
  \n最后，我们遍历并发任务执行的结果，并将其记录到控制台。每个结果的类型都是 `java.util.concurrent.Future`；因此，调用 `result.get()`\
  \ 会等待线程完成（如果它仍在运行）。在我们的例子中并非如此，因为我们已经通过调用 `awaitTermination` 对所有线程执行了此操作。您可能会注意到，即使没有\
  \ `awaitTermination` 调用，行为实际上也是相同的，因为读取结果也会等待线程。\n\n调用 `result.get()` 可能会携带来自并行逻辑的异常；因此，我们捕获它们并将错误消息记录到控制台。从并发逻辑返回值并向上冒泡异常的能力是\
  \ Java SE 5 中通过 `java.util.concurrent` 包引入的一大优势。\n\n最后，我们将并行处理的耗时写入控制台。这使我们能够比较各种线程池的实现。剩余的类是主要的\
  \ Java 并发示例，如清单 1-8 所示。\n\n***清单 1-8***。并发示例的主类 (0101-java-concurrency)\n\n```\n\
  package net.lkrnac.book.eiws.chapter01.javaconcurrency;\n\nimport java.util.concurrent.ExecutorService;\n\
  import java.util.concurrent.Executors;\n\npublic final class Application {\n  private\
  \ static final int EXEC_COUNT = 10;\n\npublic static void main(String... args) throws\
  \ InterruptedException {\n    ExecutorService fixedThreadPool = Executors.newFixedThreadPool(EXEC_COUNT);\n\
      SimpleTaskExecutor executorFast = new SimpleTaskExecutor(fixedThreadPool, EXEC_COUNT);\n\
      executorFast.executeTasks();\n\nExecutorService workStealingPool = Executors.newWorkStealingPool();\n\
      SimpleTaskExecutor executorSlow = new SimpleTaskExecutor(workStealingPool, EXEC_COUNT);\n\
      executorSlow.executeTasks();\n  }\n}\n```\n\n主类指定要执行的任务数量为 10。`main` 方法首先创建一个包含\
  \ 10 个固定线程的固定线程池。然后我们创建 `SimpleTaskExecutor` 来在此线程池上执行 10 个任务。最后，我们再次执行 10 个任务，但这次是在\
  \ `ForkJoinPool` 上。当我们运行这个小应用程序时，控制台输出可能如清单 1-9 所示。\n\n***清单 1-9***。Java 并发示例的控制台输出\n\
  \n```\npool-1-thread-1 generated number -1212896919\njava.lang.UnsupportedOperationException:\
  \ pool-1-thread-2 threw exception\njava.lang.UnsupportedOperationException: pool-1-thread-3\
  \ threw exception\npool-1-thread-4 generated number -776274655\njava.lang.UnsupportedOperationException:\
  \ pool-1-thread-5 threw exception\npool-1-thread-6 generated number 233198511\n\
  pool-1-thread-7 generated number -1552830437\npool-1-thread-8 generated number -819640425\n\
  pool-1-thread-9 generated number -144950271\npool-1-thread-10 generated number 2002956537\n\
  Elapsed time: 1091\nForkJoinPool-1-worker-1 generated number 1209832625\njava.lang.UnsupportedOperationException:\
  \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-2 threw exception\n\
  ForkJoinPool-1-worker-3 generated number 2024148305\nForkJoinPool-1-worker-0 generated\
  \ number 39272021\njava.lang.UnsupportedOperationException: java.lang.UnsupportedOperationException:\
  \ ForkJoinPool-1-worker-1 threw exception\nForkJoinPool-1-worker-2 generated number\
  \ -281172827\njava.lang.UnsupportedOperationException: java.lang.UnsupportedOperationException:\
  \ ForkJoinPool-1-worker-3 threw exception\nForkJoinPool-1-worker-0 generated number\
  \ 36551191\njava.lang.UnsupportedOperationException: java.lang.UnsupportedOperationException:\
  \ ForkJoinPool-1-worker-1 threw exception\njava.lang.UnsupportedOperationException:\
  \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-2 threw exception\n\
  Elapsed time: 3005\n```\n\n请注意，在不同线程池上执行相同并发处理所花费的时间存在巨大差异。您可能还记得，我们的并发任务（清单 1-6）包含一个延迟，模拟了\
  \ 1000 毫秒的阻塞 I/O 操作。固定线程池（池大小为 10）能够在提交后立即并行执行 10 个给定的任务。因此，在 1 秒的阻塞 I/O 延迟之后，所有线程完成，整个并行执行仅花费略多于\
  \ 1 秒的时间。实际上，CPU 大部分时间都在等待阻塞 I/O 操作完成。\n\n第二个 `ForkJoinPool` 仅使用四个线程执行，因为运行它的机器有四个\
  \ CPU 核心。因此，在四个线程已经运行后，后续提交的任务将在队列中等待获取空闲的线程池工作线程。此时，只能处理四个任务。所以简单的数学计算解释了为什么在 `ForkJoinPool`\
  \ 上的第二次并行执行花费了 3 秒。\n\n这样的场景说明了理解线程池所执行任务性质的重要性。通常，如果正在处理 I/O 密集型操作，我们希望增加线程池大小（但不要过大）。或者，在\
  \ CPU 密集型操作的情况下，我们可以使线程池大小尽可能接近可用的核心数。但这并非适用于所有情况的通用规则。应进行性能测试或基准测试。请记住，您可以在应用程序中为不同目的使用不同的线程池，因此了解整个应用程序在负载下的行为至关重要。\n\
  \nJava EE\n\n在 Java 平台企业版（Java EE）中，使用 Java SE 并发 API 被认为是不良实践。直到 Java EE 7，企业开发人员都无法使用任何可由容器管理的特定并发\
  \ API（并发应完全由应用程序容器处理）。由于 Java EE 标准未提供任何并发支持，因此创建了特定于应用程序容器的各种机制：\n\n*   CommonJ\n\
  \    *   WebSphere\n    *   WebLogic\n*   Java EE 连接器架构（JCA）工作管理器\n    *   JBoss（现为\
  \ WildFly）\n    *   GlassFish\n\nJava EE 7 最终引入了并发工具，允许应用程序开发人员使用受管理的并发 API。\n\n\
  \n\n![Image](img/sq.jpg) **注意**   Java EE 7 并发工具（Concurrency Utilities）不在本书讨论范围内。更多信息请参考\
  \ Java EE 7 教程：`http://docs.oracle.com/javaee/7/tutorial/concurrency-utilities.htm#GKJIQ8`。\n\
  \n任务调度\n\n某些用例需要将任务调度到稍后执行。为此，Java 提供了 `java.util.concurrent.ScheduledExecutorService`\
  \ 接口，如清单 1-10 所示。\n\n***清单 1-10***. ScheduledExecutorService 接口签名\n\n```\npublic\
  \ interface ScheduledExecutorService extends ExecutorService {\n    public ScheduledFuture<?>\
  \ schedule(Runnable command,\n                                       long delay,\
  \ TimeUnit unit);\n\npublic <V> ScheduledFuture<V> schedule(Callable<V> callable,\n\
                                             long delay, TimeUnit unit);\n    public\
  \ ScheduledFuture<?> scheduleAtFixedRate(Runnable command,\n                                                  long\
  \ initialDelay,\n                                                  long period,\n\
                                                    TimeUnit unit);\n    public ScheduledFuture<?>\
  \ scheduleWithFixedDelay(Runnable command,\n                                                    \
  \ long initialDelay,\n                                                     long\
  \ delay,\n                                                     TimeUnit unit);\n\
  }\n```\n\n其中重要的机制是最后两个方法。它们支持周期性调度，即任务按一定时间间隔触发。这最常用于处理不涉及用户交互的批量作业。有两种重要的调度配置可用：\n\
  \n*   **固定延迟**：指定前一个线程结束时间与后续执行开始时间之间的间隔（可将其视为计划线程之间的恒定间隔）。下一个开始时间难以预测，因为它取决于前一次执行的结束时间。\n\
  *   **固定速率**：指定每个计划线程的开始时间。因此线程之间的间隔会变化。如果线程执行时间长于计划速率，则下一个任务的开始时间会延迟，直到前一个任务完成。因此计划任务不会并发执行。\n\
  \n有了这种支持，我们可以调度实现了 `java.lang.Runnable` 和 `java.util.concurrent.Callable<V>` 接口的任务。但请注意，我们无法将\
  \ `java.util.concurrent.Callable<V>` 用于周期性调度。\n\n计划线程池的实现是 `java.util.concurrent.ScheduledThreadPoolExecutor`。它可以通过其构造函数或通过\
  \ `java.util.concurrent.Executors` 类提供的工厂方法创建。该工厂方法的签名如清单 1-11 所示。\n\n***清单 1-11***.\
  \ Executors 类部分签名——调度工厂方法\n\n```\npackage java.util.concurrent;\n\npublic class\
  \ Executors {\n    ...\n    public static ScheduledExecutorService newScheduledThreadPool(int\
  \ corePoolSize);\n    ...\n}\n```\n\n让我们探讨如何使用这种机制。清单 1-12 展示了一个作为 `java.lang.Runnable`\
  \ 接口实现的简单任务。\n\n***清单 1-12***. 简单任务 (0104-java-scheduling)\n\n```\npackage net.lkrnac.book.eiws.chapter01.javascheduling;\n\
  \nimport java.text.DateFormat;\nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\
  import java.util.Locale;\n\npublic class ScheduledTask implements Runnable {\n  private\
  \ final DateFormat dateFormat = new SimpleDateFormat(\"HH:mm:ss:SSS\",\n      Locale.getDefault());\n\
  \npublic void run() {\n    System.out.println(dateFormat.format(new Date()) + \"\
  \ - job kicked off\");\n  }\n}\n```\n\n该任务只是将启动时间输出到控制台。清单 1-13 展示了我们如何调度此任务。\n\n\
  ***清单 1-13***. 简单任务调度 (0104-java-scheduling)\n\n```\npackage net.lkrnac.book.eiws.chapter01.javascheduling;\n\
  \nimport java.util.concurrent.Executors;\nimport java.util.concurrent.ScheduledExecutorService;\n\
  import java.util.concurrent.TimeUnit;\n\npublic class SimpleScheduler {\n  public\
  \ void scheduleTask() {\n    ScheduledExecutorService executor = Executors.newScheduledThreadPool(1);\n\
      ScheduledTask task = new ScheduledTask();\n    executor.scheduleAtFixedRate(task,\
  \ 0L, 1, TimeUnit.SECONDS);\n  }\n}\n```\n\n通过调用 `Executors.newScheduledThreadPool(1)`\
  \ 工厂方法创建了一个仅包含一个工作线程的 `ScheduledThreadPoolExecutor`。随后，一个 `SimpleTask` 实例以 1 秒的固定速率进行调度，且无初始延迟。如果我们运行\
  \ `SimpleScheduler` 的 `schduleTask()` 方法，控制台输出将如清单 1-14 所示。\n\n***清单 1-14***. Java\
  \ 调度示例的控制台输出\n\n```\n10:20:25:469 - job kicked off\n10:20:26:469 - job kicked off\n\
  10:20:27:468 - job kicked off\n10:20:28:468 - job kicked off\n10:20:29:468 - job\
  \ kicked off\n...\n```\n\n`SimpleTask` 每秒将当前时间输出到控制台。由于在此示例中我们使用了周期性调度，此执行将持续进行——可能直到我们应用程序的\
  \ JVM 被强制停止。\n\n但这种有限的调度通常不适用于企业应用程序。幸运的是，一个名为 Quartz Scheduler 的流行库常用于复杂调度。它还提供企业级特性，如分布式事务传播、作业持久化和集群功能。但最值得注意的是以下调度特性：\n\
  \n*   指定一天中的特定时间（精确到毫秒）\n*   指定一周/一月/一年中的特定日期\n*   排除指定日历中的日期（对于排除公共假日很有用）\n*  \
  \ 指定明确的执行次数\n*   重复执行直到某个日期/时间\n\n使用 Spring 进行多线程处理\n\n您可能想知道 Spring 在此扮演什么角色。Spring\
  \ 是著名的在通用 Java 技术之上提供细粒度抽象层的框架。它通过提供三种用于执行和调度任务的主要抽象，消除了大量样板代码：\n\n*   `TaskExecutor`\n\
  *   `Trigger`\n*   `TaskScheduler`\n\norg.springframework.core.task.TaskExecutor\n\
  \n此接口的目的是为执行异步任务提供抽象。它扩展了 `java.util.concurrent.Executor` 接口，但与纯 Java SE 抽象相比，并未引入更改后的\
  \ API 契约。请参见清单 1-15。\n\n***清单 1-15***. TaskExecutor 接口签名\n\n```\npublic interface\
  \ TaskExecutor extends Executor {\n        @Override\n        void execute(Runnable\
  \ task);\n```\n\n`}`\n\n`TaskExecutor` 抽象了 Java SE 5 的 `Executor` 接口，因此它可以用作非 Java\
  \ SE 5 线程池的超级接口。`TaskExecutor` 是以下这些线程执行器的统称：\n\n\n\n*   `SimpleAsyncTaskExecutor`：为每个任务创建一个新线程。支持有限数量的线程（默认无限制）。达到此限制时，后续任务的执行将被阻塞，直到部分线程完成执行。\n\
  *   `SyncTaskExecutor`：任务在调用线程中同步执行。主要用于测试目的。\n*   `ConcurrentTaskExecutor`：包装提供的\
  \ `java.util.concurrent.Executor`，并将其暴露为 `TaskExecutor`。当开发者想要创建自定义的 Java SE 5 线程池并在\
  \ Spring 环境中使用时，它非常有用。不常见。大多数情况下，你可能更希望使用 `ThreadPoolTaskExecutor`。\n*   `SimpleThreadPoolTaskExecutor`：`org.quartz.simpl.SimpleThreadPool`（Quartz\
  \ Scheduler 的线程池实现）的子类。它很有用，因为它能理解 Spring 的生命周期回调。\n*   `ThreadPoolTaskExecutor`：`java.util.concurrent.ThreadPoolExecutor`\
  \ 的包装器。允许你使用 `corePoolSize`、`maxPoolSize`、`keepAliveSeconds` 和 `queueCapacity` 等参数创建可配置的线程池。\n\
  \n还有一些 `TaskExecutor` 的 Java EE 实现。这些实现充当 Spring 环境与线程池配置所在的企业应用容器多线程支持之间的桥梁：\n\n\
  *   `org.springframework.jca.work.WorkManagerTaskExecutor`：JCA 1.5 `javax.resource.spi.work.WorkManager`\
  \ 接口的适配器。\n*   `org.springframework.scheduling.commonj.WorkManagerTaskExecutor`：CommonJ\
  \ `commonj.work.WorkManager` 接口的适配器。\n*   `org.springframework.jca.work.glassfish.GlassFishWorkManagerTaskExecutor`：GlassFish\
  \ JCA `WorkManager` 的适配器。\n*   `org.springframework.jca.work.jboss.JbossWorkManagerTaskExecutor`：JBoss\
  \ JCA WorkManager 的适配器。\n\n所有这些任务执行器都可以通过 `@Bean` 注解或 `<bean/>` 标签声明为标准 Spring Bean。本章稍后的“配置异步任务”部分将给出一个示例。\n\
  \norg.springframework.scheduling.Trigger\n\n`Trigger` 接口（如清单 1-16 所示）旨在根据上一次执行来确定下一次执行时间。Spring\
  \ 使用它进行调度。\n\n***清单 1-16***. Trigger 接口\n\n```\npublic interface Trigger {\n        Date\
  \ nextExecutionTime(TriggerContext triggerContext);\n}\n```\n\n它有两个实现：\n\n*   `CronTrigger`：允许基于\
  \ Cron 表达式触发。\n*   `PeriodicTrigger`：允许你指定固定速率或固定延迟触发器。为了在两者之间切换，它通过 `PeriodicTrigger.setFixedRate(boolean\
  \ fixedRate)` 暴露一个标志。默认触发方式为固定延迟。\n\n![Image](img/sq.jpg) **注意**  Cron 在 Unix 系统中用于作业调度。一个\
  \ Cron 表达式由六个部分组成，各部分之间用空格分隔。每个部分指定分钟、小时、月份中的日期、月份、星期几和年份。年份不是必需的，因此通常只使用五个部分。但原始的\
  \ Cron 表达式允许以最短 1 分钟的间隔触发。因此，Spring 使用 Quartz Scheduler 风格的 Cron 语法。它使用七个部分而不是六个，并且第一部分是秒。年份不是必需的，与\
  \ Unix Cron 一样。通过每个部分强大的占位符，可以指定复杂的调度模式（例如，`* */10 9-17 * * MON-FRI` 表示在工作时间内每 10\
  \ 分钟触发一次）。理解 Cron 表达式不在本书的讨论范围内，但了解 Spring 集成了这种强大的触发机制很重要。有关 Quartz 风格 Cron 表达式的更多信息，请访问\
  \ `www.quartz-scheduler.org/documentation/quartz-2.1.x/tutorials/crontrigger`。\n\
  \n任务调度器\n\n`org.springframework.scheduling.TaskScheduler`（如清单 1-17 所示）是 Spring 用于调度任务的抽象。\n\
  \n***清单 1-17***. TaskScheduler 接口签名\n\n```\npublic interface TaskScheduler {\n        ScheduledFuture<?>\
  \ schedule(Runnable task, Trigger trigger);\n        ScheduledFuture<?> schedule(Runnable\
  \ task, Date startTime);\n        ScheduledFuture<?> scheduleAtFixedRate(Runnable\
  \ task, Date startTime, long period);\n        ScheduledFuture<?> scheduleAtFixedRate(Runnable\
  \ task, long period);\n        ScheduledFuture<?> scheduleWithFixedDelay(Runnable\
  \ task, Date startTime, long delay);\n        ScheduledFuture<?> scheduleWithFixedDelay(Runnable\
  \ task, long delay);\n}\n```\n\n从接口声明可以看出，Spring 可以基于固定速率和固定延迟方式调度一次性或重复性作业。它还可以使用\
  \ `Trigger` 接口进行基于 Cron 的复杂调度。\n\n虽然记住 `TaskExecutor` 和 `Trigger` 接口的工作原理很重要，但我们不需要直接使用它们。Spring\
  \ 提供了强大的注解和 XML 标签来配置多线程和调度行为。因此，`TaskExecutor` 和 `Trigger` 是在底层使用的。\n\n配置异步任务\n\
  \n为了启用多线程支持，Spring 提供了类级别注解 `@EnableAsync`。带有 `@EnableAsync` 注解的类应与 `@Configuration`\
  \ 注解一起使用。因此，`@EnableAsync` 注解基本上开启了 Spring 的异步支持。\n\n`@Async` 方法级别注解旨在定义异步逻辑。此类任务将在单独的线程中执行。当开发者设计异步\
  \ API 时，此注解提供了更广泛的可能性。前面关于 `Callable<T>` 接口的部分解释了 Java SE API 可以从异步代码中返回值并抛出异常。将参数传递给异步逻辑是\
  \ Spring 提供的 `@Async` 注解的一个独特功能。但由 `@Async` 注解的方法有两个重要限制：\n\n*   该方法必须返回 `void`\
  \ 或 `Future<T>`（类似于 `Callable<T>`）。\n*   该方法不能与生命周期回调（例如 `@PostConstruct`）一起使用。\n\
  \n`@Async` 注解有一个可选参数，用于指定用于执行异步逻辑的任务执行器 Bean 的名称。让我们通过一个示例来探索这些注解的使用。清单 1-18 显示了将在单独线程中执行的逻辑。\n\
  \n***清单 1-18***. 异步任务（0102-async-job 示例项目）\n\n```\npackage net.lkrnac.book.eiws.chapter01.async.task;\n\
  \nimport java.util.concurrent.Future;\nimport org.springframework.scheduling.annotation.Async;\n\
  import org.springframework.scheduling.annotation.AsyncResult;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\nclass AsyncTask {\n  private static final int SIMULATE_IO = 1000;\n\
  \n@Async(\"customTaskExecutor\")\n  public Future<String> call(int parameter) throws\
  \ InterruptedException {\n    String threadName = Thread.currentThread().getName();\n\
  \nThread.sleep(SIMULATE_IO);\n    if (parameter % 2 == 0) {\n      throw new UnsupportedOperationException(threadName\
  \ + \" threw exception\");\n    }\n    return new AsyncResult<String>(threadName\
  \ + \" have parameter \" + parameter);\n  }\n}\n```\n\n类 `AsyncTask` 使用 `@Component`\
  \ 注解进行注解，这指定了 `AsyncTask` 类是 Spring 组件扫描的候选对象。此类只有一个方法 `call`。它首先读取当前线程的名称。然后模拟一个持续\
  \ 1 秒的阻塞 I/O 操作。最后，如果给定参数为奇数，则模拟一个错误；如果给定参数为偶数，则返回线程名称。此行为旨在突出此 API 的可能性。\n\n\n\n\
  但这个方法很特殊，它通过 `@Async` 注解声明。该方法将在单独的线程中执行。请注意，与 `Callable<T>` 接口不同，它可以接受任意数量的参数。为了能够将返回值传递回调用线程，它将结果包装到\
  \ `AsyncResult<String>` 中。`AsyncResult<T>` 是 Spring 对 `Future` 接口的实现。\n\n清单 1-19\
  \ 展示了如何调用异步逻辑。\n\n***清单 1-19***. 异步逻辑的调用者 (0102-async-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.async.task;\n\
  \nimport java.util.ArrayList;\nimport java.util.Collection;\nimport java.util.concurrent.ExecutionException;\n\
  import java.util.concurrent.Future;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class Caller\
  \ {\n  private final AsyncTask asyncTask;\n  @Autowired\n  public Caller(AsyncTask\
  \ asyncTask) {\n    this.asyncTask = asyncTask;\n  }\n\npublic void kickOffAsyncTasks(int\
  \ execCount) throws InterruptedException {\n    Collection<Future<String>> results\
  \ = new ArrayList<>(execCount);\n\nlong start = System.currentTimeMillis();\n  \
  \  for (int idx = 0; idx < execCount; idx++) {\n      results.add(asyncTask.call(idx));\n\
  \    }\n\nresults.forEach(result -> {\n      try {\n        System.out.println(result.get());\n\
  \      } catch (InterruptedException | ExecutionException e) {\n        System.out.println(e.getLocalizedMessage());\n\
  \      }\n    });\n    System.out.println(\"Elapsed time: \" + (System.currentTimeMillis()\
  \ - start) + \" ms\");\n  }\n}\n```\n\n`AsyncTask` bean 通过构造函数注入到 `Caller` 类中。方法\
  \ `kickOffAsyncTasks` 执行此异步逻辑。它首先将要执行的任务数量作为参数，并分配一个集合来收集 `Future<String>` 结果。我们跟踪执行的开始和结束时间，并将其输出到控制台。每个线程的执行通过调用\
  \ `results.add(asyncTask.call(idx))` 启动，该方法调用异步方法，向其传递参数，并存储 `Future<String>` 对象以便稍后检索返回值。一个有趣的方面是能够向异步逻辑传递参数。之所以可能，是因为\
  \ Spring 为 `AsyncTask` 提供的代理机制通过传播参数来处理多线程行为。请注意，清单 1-6 中的多线程示例基于 `java.util.concurrent.Callable<T>`，它无法直接将参数传递给线程。这是\
  \ Spring 多线程支持的一大优势。\n\n在第一个 `for` 循环之后，所有线程都被提交执行。最后，我们遍历结果集合并将返回值输出到控制台。调用 `result.get()`\
  \ 会等待线程完成其工作。此外，try-catch 块处理从异步逻辑渗透出来的错误。\n\n您可能会问，线程池在何处以及如何参与此设置。让我们在清单 1-20\
  \ 中探讨它。\n\n***清单 1-20***. 使用 Fork/Join 池的 Spring 异步示例的主配置 (0102-async-job)\n\n```\n\
  package net.lkrnac.book.eiws.chapter01.async;\n\nimport java.util.concurrent.Executor;\n\
  import java.util.concurrent.Executors;\nimport net.lkrnac.book.eiws.chapter01.async.task.Caller;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.annotation.EnableAsync;\n\
  \n@Configuration\n@ComponentScan(basePackageClasses = Caller.class)\n@EnableAsync\n\
  public class AsyncConfigurationSmallerPool {\n  @Bean\n  public Executor customTaskExecutor()\
  \ {\n    return Executors.newWorkStealingPool();\n  }\n\npublic static void main(String...\
  \ args) throws InterruptedException {\n    ApplicationContext context = SpringApplication.run(AsyncConfigurationSmallerPool.class,\
  \ args);\n    Caller caller = context.getBean(Caller.class);\n    caller.kickOffAsyncTasks(10);\n\
  \  }\n}\n```\n\n此 Spring 配置扫描 `Caller` 类所在的包以查找 Spring bean。因此，随着 `Caller` 的注册，`AsyncTask`\
  \ bean 也被注册到 Spring IoC 容器中。第一个方法 `customTaskExecutor` 将线程池 bean 注册到上下文中。`java.util.concurrent.Executor`\
  \ 被用作 bean 类型，以允许线程池实现的多样性。因此，很明显我们可以使用 Spring 提供的任何执行器，以及标准的 Java SE `java.util.concurrent`\
  \ 线程池实现。在这种情况下，借助 `java.util.concurrent.Executors` 工厂类创建了 `java.util.concurrent.ForkJoinPool`。此池创建的工作线程数等于其运行机器的核心数（在此示例中为四个）。\n\
  \n此 bean 以名称 `customTaskExecutor` 注册；当未显式配置时，Spring 使用 bean 注册方法的名称作为 bean 名称。请注意，此名称与清单\
  \ 1-18 中 `AsyncTask` 类的 `@Async` 注解的参数相同。因此，此 bean 将用于执行 `AsyncTask.call` 方法。\n\n\
  此类中的第二个方法是 `main`。每个 Java 开发人员都应该熟悉此方法的签名。是的，它就是著名的 `main` 方法，它将此类转变为命令行实用程序。数组\
  \ `args` 可以从命令行接收参数，但在此案例中我们不使用此功能。此方法体内部发生的事情很有趣。它使用了 Spring 产品组合中一个相对较新的项目 *Spring\
  \ Boot* 的功能。我们可以将 Spring Boot 项目视为 Spring 框架的配置包装器上的约定优于配置。它可以显著简化和减少构建现代 Java 应用程序所需的\
  \ Spring 配置，但同时它不会降低 Spring 配置功能的多样性。如今，不借助它来启动一个新的 Spring 项目是没有意义的。\n\n![Image](img/sq.jpg) **注意**  Spring\
  \ Boot 项目超出了本书的范围，因为它不是 Spring 企业集成认证的一部分。如果您想了解更多关于这个有用项目的信息，请查看 Spring Boot 参考文档的“入门”部分：`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started`。\n\
  \n`SpringApplication.run` 将使用给定的 Spring 配置和命令行参数启动应用程序。它用于简单地引导我们的异步应用程序。此方法返回创建的\
  \ Spring 上下文实例，该实例用于查找 `Caller` bean 并显式执行异步代码。运行此应用程序后可能的控制台输出如清单 1-21 所示。\n\n\
  ***清单 1-21***. Fork/Join 池可能的控制台输出\n\n\n\n```\njava.lang.UnsupportedOperationException:\
  \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-1 threw exception\n\
  ForkJoinPool-1-worker-2 have parameter 1\njava.lang.UnsupportedOperationException:\
  \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-3 threw exception\n\
  ForkJoinPool-1-worker-0 have parameter 3\njava.lang.UnsupportedOperationException:\
  \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-1 threw exception\n\
  ForkJoinPool-1-worker-3 have parameter 5\njava.lang.UnsupportedOperationException:\
  \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-0 threw exception\n\
  ForkJoinPool-1-worker-2 have parameter 7\njava.lang.UnsupportedOperationException:\
  \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-3 threw exception\n\
  ForkJoinPool-1-worker-1 have parameter 9\nElapsed time: 3039 ms\n```\n\n请注意，我们使用了\
  \ `java.util.concurrent.ForkJoinPool` 作为线程池实现。它使用的并行度等于可用的 CPU 核心数。我们可以将并行度视为线程池的核心大小。因此，这个线程池将有四个工作线程，因为机器上有四个核心可用。我们可以在清单\
  \ 1-21 中找到这一事实。Fork/join 池的工作线程名称以 `-worker-X` 为后缀，其中 X 指定线程的 ID。\n\n一个有趣的统计数据是整个执行的耗时。它花费了超过\
  \ 3 秒。请注意，在清单 1-18 的 `AsyncTask` 中模拟阻塞 I/O 操作只用了 1 秒。但为什么整体执行却需要 3 秒呢？原因再次在于用于处理此类异步逻辑的线程池类型不正确。当处理阻塞\
  \ I/O 操作时，确保线程池的大小大于 CPU 核心数是一个好主意，这样 CPU 就不必等待缓慢的阻塞 I/O 操作。让我们展示一下如果使用清单 1-22 中的线程池会发生什么。\n\
  \n***清单 1-22***. 使用 ThreadPoolExecutor 的 Spring Async 示例主配置 (0102-async-job)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter01.async;\n\nimport java.util.concurrent.Executor;\n\
  import net.lkrnac.book.eiws.chapter01.async.task.Caller;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.scheduling.annotation.EnableAsync;\nimport org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;\n\
  \n@Configuration\n@ComponentScan(basePackageClasses = Caller.class)\n@EnableAsync\n\
  public class AsyncConfigurationBiggerPool {\n  private static final int EXEC_COUNT\
  \ = 10;\n\n@Bean\n  public Executor customTaskExecutor() {\n    ThreadPoolTaskExecutor\
  \ threadPool = new ThreadPoolTaskExecutor();\n    threadPool.setCorePoolSize(EXEC_COUNT);\n\
  \    return threadPool;\n  }\n\npublic static void main(String... args) throws InterruptedException\
  \ {\n    ApplicationContext context = SpringApplication.run(AsyncConfigurationBiggerPool.class,\
  \ args);\n    Caller caller = context.getBean(Caller.class);\n    caller.kickOffAsyncTasks(EXEC_COUNT);\n\
  \  }\n}\n```\n\n这段代码使用了 Spring 的 `org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor`\
  \ 线程池实现。我们将核心池大小配置为 10，与异步执行的任务数量相同。清单 1-23 展示了此线程池配置的可能输出。\n\n***清单 1-23***. ThreadPoolExecutor\
  \ 的控制台输出\n\n```\njava.lang.UnsupportedOperationException: customTaskExecutor-1 threw\
  \ exception\ncustomTaskExecutor-2 have parameter 1\njava.lang.UnsupportedOperationException:\
  \ customTaskExecutor-3 threw exception\ncustomTaskExecutor-4 have parameter 3\n\
  java.lang.UnsupportedOperationException: customTaskExecutor-5 threw exception\n\
  customTaskExecutor-6 have parameter 5\njava.lang.UnsupportedOperationException:\
  \ customTaskExecutor-7 threw exception\ncustomTaskExecutor-8 have parameter 7\n\
  java.lang.UnsupportedOperationException: customTaskExecutor-9 threw exception\n\
  customTaskExecutor-10 have parameter 9\nElapsed time: 1024 ms\n```\n\n现在，整体执行时间比使用\
  \ fork/join 池时少得多。这清楚地表明了开发者理解异步行为并相应调整线程池参数是多么关键。\n\n任务执行的 XML 配置\n\nSpring 基于\
  \ Java 的配置是 XML 配置的现代“小兄弟”。如果出于遗留原因需要使用 XML 配置，Spring 允许您使用 `task` 命名空间定义异步行为。要使用\
  \ XML 配置复制清单 1-23，请使用清单 1-24 中的 XML。\n\n***清单 1-24***. 异步任务的 XML 配置 (0102-async-job)\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\" xmlns:task=\"http://www.springframework.org/schema/task\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/task http://www.springframework.org/schema/task/spring-task-4.0.xsd\n\
  \                http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans.xsd\n\
  \                http://www.springframework.org/schema/context http://www.springframework.org/schema/context/spring-context-4.0.xsd\"\
  >\n\n<context:component-scan base-package=\"net.lkrnac.book.eiws.chapter01.async.task\"\
  \ />\n  <task:executor id=\"customTaskExecutor\" pool-size=\"10\" queue-capacity=\"\
  20\" />\n  <task:annotation-driven executor=\"customTaskExecutor\" />\n</beans>\n\
  ```\n\n我们的 `AsyncTask` 和 `Caller` bean 位于包 `net.lkrnac.book.eiws.chapter``01``.async.task`\
  \ 中，它们在那里被组件扫描。因此，它们的 `@Component` 注解仍然是必需的，以便注册到 Spring IoC 容器中。`<task:executor/>`\
  \ 标签创建一个 `ThreadPoolTaskExecutor` 实例作为线程池实现。如果我们需要使用不同的实现，则需要使用标准的 bean 定义来指定。`AsyncTask`\
  \ 注解不再需要自定义任务执行器名称参数，因为线程池引用是由 `<task:annotation-driven/>` 标签中的 `executor` 参数配置的。我们使用由\
  \ `<task:executor/>` 标签定义的 `customTaskExecutor` 实例。\n\n`<task:executor/>` 标签具有多种参数：\n\
  \n\n\n*   `pool-size`：此可选参数有两种形式：\n    *   单个值指定池中保留的线程数，即使它们处于空闲状态（核心池大小）。\n  \
  \  *   一个由破折号分隔的值范围（例如，`5-25`）。第一个值指定核心池大小（默认值为 1）。第二个值指定最大池大小（默认值为 `Integer.MAX_INT`）。如果未指定范围，则默认核心大小为\
  \ 1，最大池大小为 `Integer.MAX_INT`。\n*   `queue-capacity`：指定 `ThreadPoolTaskExecutor`\
  \ 的 `BlockingQueue` 的容量。当池中没有空闲线程时，队列用于存储计划任务。当队列容量达到上限时，任务执行器会拒绝进一步的线程提交。默认队列容量为\
  \ `Integer.MAX_INT`。这个值通常不可取，因为如果大量线程排队，可能会发生 `OutOfMemory` 问题。因此，限制 `queue-capacity`\
  \ 始终是一个好主意*。*\n*   `rejection-policy`：指定当队列容量达到上限时的拒绝行为。选项如下。\n    *   `ABORT`：当提交额外任务时，线程池抛出\
  \ `TaskRejectedException`。这是默认行为。\n    *   `CALLER_RUNS`：逻辑在调用者线程中同步执行。它允许保持调用者线程忙碌，直到后续任务被提交执行。在此期间，线程池中的一些线程可能完成工作并释放一些容量。\n\
  \    *   `DISCARD`：提交的任务被静默丢弃。\n    *   `DISCARD_OLDEST`：丢弃队列头部的任务。\n\n配置计划任务\n\n\
  调度配置通过类级别的 `@EnableScheduling` 注解启用。它应与 `@Configuration` 注解一起使用。一个使用 `@EnableScheduling`\
  \ 和 `@Configuration` 注解的类可以通过 `@Import` 注解导入到另一个 Spring 配置类中。第二种选择是对此类进行组件扫描。\n\n\
  `@Scheduled` 方法级别的注解定义了应被调度以重复执行的逻辑。它不能接受任何参数，也不能返回任何值。该注解可以包含以下参数：\n\n*   `fixedDelay`：以毫秒为单位的数值\n\
  *   `fixedRate`：以毫秒为单位的数值\n*   `cron`：字符串类型的 Cron 表达式\n*   `initialDelay`：首次启动的延迟时间（毫秒）\n\
  \n必须指定 `fixedDelay`、`fixedRate` 或 `cron` 参数中的恰好一个。否则，将此 bean 注册到 Spring 上下文将会失败。最后一个参数\
  \ `initialDelay` 是可选的。当我们不想立即调度第一次迭代，而是希望将此执行推迟到稍后时间时，它会很有用。清单 1-25 展示了此注解的一个示例。\n\
  \n***清单 1-25***. 计划任务示例 (0103-scheduled-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.scheduling.task;\n\
  \nimport java.text.DateFormat;\nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\
  import java.util.Locale;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class ScheduledTask {\n  private static final int SCHEDULING_DELAY\
  \ = 1000;\n\nprivate final DateFormat dateFormat = new SimpleDateFormat(\"HH:mm:ss:SSS\"\
  ,\n      Locale.getDefault());\n\n@Scheduled(fixedRate = SCHEDULING_DELAY)\n  public\
  \ void call() {\n    System.out.println(dateFormat.format(new Date()) + \" - job\
  \ kicked off\");\n  }\n}\n```\n\n`ScheduledTask` 是一个 Spring bean，其一个方法使用了 `@Scheduled`\
  \ 注解。在此例中，我们使用了固定频率的调度方法，间隔为 1 秒。该方法简单地将当前时间打印到控制台。Spring 配置如清单 1-26 所示。\n\n***清单\
  \ 1-26***. 计划任务配置 (0103-scheduled-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.scheduling;\n\
  \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  \n@Configuration\n@ComponentScan\n@EnableScheduling\npublic class ScheduledConfiguration\
  \ {\n  public static void main(String... args) {\n    SpringApplication.run(ScheduledConfiguration.class,\
  \ args);\n  }\n}\n```\n\n此示例使用 `@EnableScheduling` 注解来启用调度功能。它还使用组件扫描来注册来自当前包及其子包的\
  \ Spring bean。该类最后一个值得注意的方面是使用 Spring Boot 将此配置作为可执行 JAR 应用程序简单运行。当我们运行此 Java 应用程序时，应该会看到类似于清单\
  \ 1-27 的输出。\n\n***清单 1-27***. 计划任务控制台输出\n\n```\n19:36:34:454 - job kicked off\n\
  19:36:35:454 - job kicked off\n19:36:36:454 - job kicked off\n19:36:37:454 - job\
  \ kicked off\n...\n```\n\n我们的任务被调度为每秒执行一次。此应用程序将保持此行为，直到我们强制终止它。\n\n调度的 XML 配置\n\
  \n也可以使用 `task` 命名空间通过 XML 配置调度，该命名空间包含各种用于调度支持的标签。第一个是 `<task:scheduler>`，用于配置将驱动调度的\
  \ `ThreadPoolTaskScheduler` 线程池。`<task:scheduler>` 有一个必需参数 `id`，用于指定调度器 bean 的名称和工作线程名称的前缀。第二个参数\
  \ `pool-size` 是可选的，用于指定用于调度的线程池实现的核心大小。当未明确指定时，默认值为 1，表示将使用单个线程来执行调度逻辑。\n\n用于调度支持的第二个顶级元素是\
  \ `<task:scheduled-tasks>`。它可以包含多个 `<task:scheduled>` 子元素，每个子元素指定一个计划任务。`<task:scheduled>`\
  \ 可以包含以下参数之一：\n\n*   `fixed-delay`：以毫秒为单位的数值\n*   `fixed-rate`：以毫秒为单位的数值\n*   `cron`：字符串类型的\
  \ Cron 表达式\n\n必须指定其中之一。下一个参数是可选的 `initial-delay`。它可用于将初始迭代延迟给定的毫秒数。最后两个参数 `ref`\
  \ 和 `method` 是必需的。它们指定了对 Spring bean 的引用以及将被调度的方法的名称。*此方法必须为 void 类型且不能接受参数。*\n\n\
  此外，顶级元素 `<task:scheduled-tasks>` 有一个可选参数 `scheduler`，用于定义调度器 bean 的引用。如果未指定，则使用单线程执行器来调度定义为子元素的任务。清单\
  \ 1-28 展示了该配置。\n\n***清单 1-28***. 调度 XML 配置支持示例\n\n```\n<task:scheduler id=\"customScheduler\"\
  \ pool-size=\"10\"/>\n<task:scheduled-tasks scheduler=\"customScheduler\">\n        <task:scheduled\
  \ ref=\"bean1\" method=\"method1\" cron=\"*/10 9-17 * * * MON-FRI\"/>\n        <task:scheduled\
  \ ref=\"bean2\" method=\"method2\" fixed-delay=\"1000\"/>\n        <task:scheduled\
  \ ref=\"bean3\" method=\"method3\" fixed-rate=\"1000\"/>\n</task:scheduled-tasks>\n\
  ```\n\n总结\n\n\n\n本章介绍了 Spring 的多线程和调度 API，并将其与纯 Java SE 的多线程支持进行了比较。需要牢记的是，多线程是一把双刃剑。向问题中投入一个线程池可能会拖慢计算速度，因为在线程之间切换上下文的开销可能比计算本身还要大。当系统中运行的线程数远多于\
  \ CPU 核心数时，这种情况尤其容易发生。此外，多线程逻辑可能过于简单，不值得付出上下文切换的代价。因此，确定正确的并行度并非易事，需要深入理解问题本身及其周围环境。当通过多线程解决问题时，进行基准测试和准确的性能测试总是一个好主意。\n\
  \n![Image](img/sq.jpg) **注意** 除了多线程，你还可以使用其他方法来解决阻塞 I/O 操作的问题。但这些超出了本书的范围。如需更多信息，你可以研究\
  \ Java Futures 和 Reactive Extensions（例如，参见 `https://github.com/ReactiveX/RxJava`\
  \ 上的 RxJava 库）以及 Actor 系统（例如，`https://github.com/reactor/reactor` 上的 Spring Reactor\
  \ 或 `http://akka.io/` 上的 Akka）。一个积极采用非阻塞 I/O 方法的好例子是 Node.js（`https://nodejs.org/`）中的事件循环，它自然是从\
  \ Web 浏览器的事件循环演变而来的。\n\n第 2 章\n\n![image](img/frontdot.jpg)\n\n远程调用\n\n让我们将 Ultrabook（戴尔超薄笔记本电脑）与台式\
  \ PC 进行比较。如今大多数人可能会选择 Ultrabook，因为它更轻、更安静，并且几乎可以随身携带。那么，除了价格更低之外，台式 PC 还有什么优势吗？是的——它是模块化的。如果\
  \ Ultrabook 的处理器坏了或者电源接口烧毁了，你会怎么做？这类问题很可能导致 Ultrabook 无法修复。但如果这种情况发生在台式 PC 的显示器或电源上，它们可以很容易地被更换。更换\
  \ PC 组件的能力得益于标准化的接口。它们允许我们使用来自不同供应商的组件来构建整台 PC。\n\n现在想象一个大型云服务提供商。就我们 PC 与 Ultrabook\
  \ 的比喻而言，该系统的基础设施更接近 PC 架构。企业系统由应用程序组成，这些应用程序通常用不同的编程语言实现，并运行在世界各地的机器上。显然，这些应用程序需要通过通用协议相互通信，以便一个损坏的应用程序最终可以被替换，而不会影响整个企业。\n\
  \nSpring 的远程调用支持是企业世界中应用程序间通信机制的抽象伞。这些技术可以根据其性质分为两个基本组：同步和异步。\n\n让我们从方法调用技术（同步通信）开始：\n\
  \n*   远程方法调用（RMI）\n*   HTTPInvoker：基于 HTTP 的 Java 序列化\n*   Hessian：由 Caucho Technology\
  \ 设计的轻量级二进制 HTTP 协议\n*   Burlap：基于 XML 的 Hessian 版本\n*   Java XML Web 服务 API（JAX-WS）：在\
  \ Java EE 5 引入时取代了 JAX-RPC，将在第 3 章中介绍\n\n现在考虑消息传递技术（异步通信）：\n\n*   Java 消息服务（JMS）：将在第\
  \ 5 章中介绍\n*   高级消息队列协议（AMQP）：由 Spring AMQP 项目涵盖，超出本书范围\n\n如你所见，Spring 的伞状结构非常丰富。但这些技术中的每一种也可以在没有\
  \ Spring 的情况下使用。那么问题来了，Spring 抽象提供了哪些好处？对于远程调用技术，好处如下：\n\n*   将远程调用逻辑与应用程序代码解耦\n\
  *   传播声明式范式以配置和暴露服务\n*   使用一致的 API 支持多种协议\n*   将受检异常转换为运行时异常\n\n让我们更详细地探讨这些技术中的每一种以及\
  \ Spring 的抽象。\n\n![Image](img/sq.jpg) **注意** Hessian 和 Burlap 包含在先前版本的“使用 Spring\
  \ 进行企业集成”认证中，但已从涵盖 Spring 4.0 特性的最新版本中移除。因此，它们超出了本书的范围。\n\n远程方法调用\n\n顾名思义，*远程方法调用*（RMI）用于执行位于远程\
  \ JVM 或系统上的方法。RMI 提供了一种集成分布式系统的便捷方式。开发人员无需将数据模型转换为其他格式即可与远程系统通信。为了在 JVM 之间传输数据，使用了序列化。序列化是一种标准的\
  \ Java 机制，用于将数据和代码转换为二进制形式，以便它们可以被存储或通过网络发送。\n\nRMI 的初始实现仅适用于 JVM 间的通信。它们基于 Java\
  \ 远程方法协议（JRMP）。为了使 RMI 更加灵活，开发了基于 Internet Inter-Orb 协议的 RMI（RMI-IIOP）。此版本基于公共对象请求代理体系结构（CORBA）标准，可用于不同系统之间的相互通信。其中重要的一点是，RMI-IIOP\
  \ 使得与非 JVM 运行时环境的方法调用成为可能。\n\n如前所述，RMI 用于可能位于不同主机上的远程环境之间的通信。因此涉及两方。一方暴露逻辑。第二方消费暴露的\
  \ RMI 方法。双方能够通过网络进行通信，因为 JRMP 提供了一个 RMI 注册表。通信的每一方都将一个代理对象注册到 RMI 注册表中，然后这些对象借助标准的\
  \ Java 序列化机制相互通信。\n\n为了相互理解，客户端和服务器需要在双方都有一个可用的通用契约。在 RMI 世界中，这个契约不过是一个标准的 Java\
  \ 接口。方法提供者需要实现这个接口，而 RMI 客户端在远程方法调用期间需要它。有两种方法可以确保此契约在双方都可用：\n\n*   该接口位于一个共享的 JAR\
  \ 库中，双方都将该库作为依赖项使用。\n*   该接口在双方使用相同的签名进行复制。\n\n每种方法都有其优缺点。提取到共享库中会增加处理和维护该共享库的复杂性。在双方复制接口显然会带来使接口在其中一方不兼容的风险。\n\
  \n看起来开发人员可以获取任何调用并通过 RMI 轻松地将其暴露出来，而无需任何更改。但事实并非如此。需要满足某些 RMI 契约的特定要求：\n\n*   契约接口需要扩展\
  \ `java.rmi.Remote` 接口。\n*   暴露的方法必须抛出 `java.rmi.RemoteException`。\n*   实现 RMI 方法（将被共享的逻辑）的类需要扩展\
  \ `java.rmi.server.UnicastRemoteObject`。\n*   实现 RMI 方法的类需要有一个显式构造函数，该构造函数必须抛出 `java.rmi.RemoteException`。\n\
  *   消费 RMI 方法的客户端需要处理受检异常 `java.rmi.RemoteException`。\n\n契约的另一个重要部分是序列化。每个参数、返回类型以及实现类本身都需要是可序列化的。对于服务实现类，这通过扩展\
  \ `java.rmi.server.UnicastRemoteObject` 来保证。\n\n让我们通过示例来探讨 RMI 契约的细节。我们的共享接口在清单\
  \ 2-1 中突出显示。\n\n\n\n***清单 2-1***. 客户端与服务器之间的共享接口\n\n```\npackage net.lkrnac.book.eiws.chapter02.rmi.java;\n\
  \nimport java.rmi.Remote;\nimport java.rmi.RemoteException;\n\npublic interface\
  \ BarService extends Remote {\n  String serveBar(String param) throws RemoteException;\n\
  }\n```\n\n这个签名完全相同的接口位于两个示例项目中，分别是 `0201-java-rmi-servic``e` 和 `0201-java-rmi-client`。当然，你可以使用任何类型作为参数，只要它在通信双方之间共享并满足序列化要求。清单\
  \ 2-2 展示了位于服务器端实现共享接口的类中的服务逻辑。\n\n***清单 2-2***. RMI 服务实现示例 (0201-java-rmi-service)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter02.rmi.java;\n\nimport java.rmi.RemoteException;\n\
  import java.rmi.server.UnicastRemoteObject;\n\npublic class BarServiceImpl extends\
  \ UnicastRemoteObject implements BarService {\n  private static final long serialVersionUID\
  \ = 1L;\n\nprotected BarServiceImpl() throws RemoteException {\n  }\n\n@Override\n\
    public String serveBar(String param) throws RemoteException {\n    return \"Bar\
  \ service response to parameter: \" + param;\n  }\n}\n```\n\n如你所见，所有这些 `java.rmi`\
  \ API 的细节都对应用程序代码具有侵入性。很明显，通过 RMI 暴露方法并不总是一个无需重构的操作。你可以看到，实现类本身需要是可序列化的（参数和返回值也是如此）。清单\
  \ 2-3 展示了创建 RMI 注册表并启动服务器的 RMI 代码。这是我们服务器示例的最后一部分。\n\n***清单 2-3***. 暴露 RMI 服务示例\
  \ (0201-java-rmi-service)\n\n```\npackage net.lkrnac.book.eiws.chapter02.rmi.java;\n\
  \nimport java.rmi.AlreadyBoundException;\nimport java.rmi.RemoteException;\nimport\
  \ java.rmi.registry.LocateRegistry;\nimport java.rmi.registry.Registry;\n\npublic\
  \ class RmiServer {\n  private static final int RMI_PORT = 10201;\n\npublic static\
  \ void main(String... args) throws RemoteException,\n      AlreadyBoundException\
  \ {\n    BarServiceImpl engine = new BarServiceImpl();\n    Registry registry = LocateRegistry.createRegistry(RMI_PORT);\n\
      registry.bind(\"BarService\", engine);\n  }\n}\n```\n\n在这个例子中，我们创建了一个 RMI 注册表，从而在端口\
  \ 10201 上暴露了 RMI 方法。`BarService` 是标识我们方法的 RMI 名称。因此，可以暴露多种方法，并将它们绑定到不同的 RMI 名称上。这个概念类似于\
  \ Spring MVC 的请求映射。\n\n我们 RMI 拼图的下一块是客户端。这个示例项目的名称是 `0201-java-rmi-client`。清单 2-4\
  \ 展示了主要的客户端类。\n\n***清单 2-4***. RMI 客户端示例 (0201-java-rmi-client)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter02.rmi.java;\n\nimport java.rmi.NotBoundException;\n\
  import java.rmi.RemoteException;\nimport java.rmi.registry.LocateRegistry;\nimport\
  \ java.rmi.registry.Registry;\n\npublic class FooClient {\n  private static final\
  \ int RMI_PORT = 10201;\n\npublic static void main(String... args) throws RemoteException,\n\
        NotBoundException {\n    System.out.println(new FooClient().callService(\"\
  Main method\"));\n  }\n\npublic String callService(String parameter) {\n    Registry\
  \ registry;\n    try {\n      registry = LocateRegistry.getRegistry(RMI_PORT);\n\
        BarService barService = (BarService) registry.lookup(\"BarService\");\n      return\
  \ barService.serveBar(parameter);\n    } catch (RemoteException | NotBoundException\
  \ e) {\n      throw new RuntimeException(e);\n    }\n  }\n}\n```\n\n`callService`\
  \ 方法尝试在端口 10201 上查找 RMI 注册表。如果 `callService` 找不到注册表，则会抛出 `NotBoundException`。这是纯\
  \ Java RMI API 的另一个侵入性方面。然后，根据名称在注册表中搜索 RMI 对象。最后，执行实际的 RMI 调用。\n\n当我们运行服务器示例 `0201-java-rmi-service`\
  \ 时，它会创建一个 RMI 注册表并保持运行，从而暴露服务。运行客户端示例 `0201-java-rmi-client` 后，它将尝试建立到远程 RMI 注册表的连接并调用远程方法。清单\
  \ 2-5 显示了运行客户端示例后的控制台输出。\n\n***清单 2-5***. RMI 示例的控制台输出\n\n```\nBar service (Java\
  \ RMI) response to parameter: Main method\n```\n\n你可能想知道 Spring 在何处介入，以及它如何帮助处理\
  \ RMI。现在让我们关注这一点。\n\nSpring RMI 支持\n\nSpring 总是试图弥补现有技术的 API 缺陷。Java RMI 也不例外。Spring\
  \ 允许非侵入式的 RMI 暴露。这意味着我们可以完全忘记 `RemoteException`、`UnicastRemoteObject` 和 `Remote`\
  \ 接口。我们可以在不修改代码的情况下暴露现有代码。使用 Spring 时，唯一的契约要求是序列化。但 Spring 无法避免这一点。序列化是这种分布式技术的本质。\n\
  \n使用 Spring 处理 RMI 注册表也容易得多。Spring 会尝试检查给定端口上是否存在 RMI 注册表。如果没有，则会按需创建一个 RMI 注册表。让我们通过一个示例来探索\
  \ Spring 的 RMI 构造。清单 2-6 展示了服务接口。\n\n***清单 2-6***. 共享接口 (0202-spring-rmi-java-config-service\
  \ 和 0202-spring-rmi-java-config-client)\n\n```\npackage net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig;\n\
  \npublic interface BarService {\n  public String serveBar(String param);\n}\n```\n\
  \n清单 2-7 展示了实现。\n\n***清单 2-7***. 共享接口与服务实现 (0202-spring-rmi-java-config-service)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.service;\n\n\
  import net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;\nimport\
  \ org.springframework.stereotype.Service;\n\n@Service\npublic class BarServiceImpl\
  \ implements BarService {\n  @Override\n  public String serveBar(String param) {\n\
      return \"Bar service 0202 response to parameter: \" + param;\n  }\n}\n```\n\n\
  如你所见，不需要任何 RMI 特定的代码。与纯 Java RMI API 相比，这是一个巨大的优势，因为我们可以通过 RMI 暴露任何方法而无需重构。唯一的限制是方法签名中所有类型的序列化。Spring\
  \ 上下文中需要 `RmiServiceExporter` bean 来进行 RMI 注册表绑定和注册，如清单 2-8 所示。\n\n***清单 2-8***.\
  \ Spring RMI 服务配置 (0202-spring-rmi-java-config-service)\n\n```\npackage net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.service;\n\
  \nimport net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.remoting.rmi.RmiServiceExporter;\n\
  \n@Configuration\n@ComponentScan\npublic class ServiceConfiguration {\n  private\
  \ static final int RMI_PORT = 10202;\n\n@Bean\n  public RmiServiceExporter registerService(BarService\
  \ barService) {\n    RmiServiceExporter rmiServiceExporter = new RmiServiceExporter();\n\
      rmiServiceExporter.setServiceName(\"BarService\");\n    rmiServiceExporter.setService(barService);\n\
      rmiServiceExporter.setServiceInterface(BarService.class);\n    rmiServiceExporter.setRegistryPort(RMI_PORT);\n\
  \nreturn rmiServiceExporter;\n  }\n}\n```\n\n\n\n`barService` Bean 由 Spring 注入，因此可用于向\
  \ RMI 注册表注册服务。除此之外，RMI 服务器代码相当简单直接。\n\n让我们看看清单 2-9 中的客户端部分。\n\n***清单 2-9***. Spring\
  \ RMI 客户端配置 (0202-spring-rmi-java-config-client)\n\n```\npackage net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.client;\n\
  \nimport net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.remoting.rmi.RmiProxyFactoryBean;\n\n@Configuration\n\
  public class ClientConfiguration {\n  @Bean\n  public BarService createBarServiceLink()\
  \ {\n    RmiProxyFactoryBean rmiProxyFactoryBean = new RmiProxyFactoryBean();\n\
      rmiProxyFactoryBean.setServiceUrl(\"rmi://localhost:10202/BarService\");\n    rmiProxyFactoryBean.setServiceInterface(BarService.class);\n\
      rmiProxyFactoryBean.afterPropertiesSet();\n    return (BarService) rmiProxyFactoryBean.getObject();\n\
    }\n}\n```\n\n首先，我们创建 `org.springframework.remoting.rmi.RmiProxyFactoryBean`。这个工厂类用于创建\
  \ RMI 代理对象。它有几个必需的属性：\n\n*   RMI 注册表的远程位置。Spring 使用 RMI 端点定义的 URL 表示法。\n*   服务接口类定义。\n\
  \n调用 `rmiProxyFactoryBean.afterPropertiesSet()` 会应用配置好的 RMI 设置，并将工厂绑定到远程 RMI 注册表。最后一步是调用\
  \ `rmiProxyFactoryBean.getObject()`，在这里我们创建一个将模拟服务 Bean 的代理对象。就这样，`BarService` 现在成为了我们客户端\
  \ Spring IoC 容器中的一个 Bean。清单 2-10 展示了如何在客户端业务逻辑中使用这个 Bean。\n\n***清单 2-10***. RMI\
  \ 客户端代理 Bean 的使用 (0202-spring-rmi-java-config-client)\n\n```\npackage net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.client;\n\
  \nimport javax.annotation.PostConstruct;\nimport net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class FooClient {\n  private final BarService barService;\n\
  \n@Autowired\n  public FooClient(BarService barService) {\n    this.barService = barService;\n\
    }\n\n@PostConstruct\n  public void callBarService() {\n    System.out.println(barService.serveBar(\"\
  FooClient\"));\n  }\n}\n```\n\n在任何 Spring Bean 中，我们都可以注入一个 RMI 代理 Bean，并使用与直接调用服务器实现完全相同的\
  \ API 来使用它。这是因为 Spring 将受检异常 `java.rmi.RemoteException` 转换为非受检异常 `org.springframework.remoting.RemoteAccessException`。因此，我们可以完全隐藏业务逻辑中正在调用远程方法的事实。\n\
  \n当我们运行服务器示例 `0202-spring-rmi-java-config-service`，然后运行客户端示例 `0202-spring-rmi-java-config-client`\
  \ 时，可以看到清单 2-11 中显示的控制台输出。\n\n***清单 2-11***. Spring RMI 示例的控制台输出\n\n```\nBar service\
  \ 0202 response to parameter: FooClient\n```\n\n如果你出于遗留原因使用 XML 上下文，Spring 也提供了支持。实际上，它与\
  \ Java 配置类似，没有任何特殊的 XML 命名空间。因此，对于 XML 示例，我们跳过了服务接口及其实现的定义。它们与清单 2-6 和清单 2-7 中的相同，只是包名略有不同。\n\
  \n服务器端的 XML RMI 配置如清单 2-12 所示。\n\n***清单 2-12***. Spring RMI XML 服务器配置 (示例项目 0203-spring-rmi-xml-config-service\
  \ 中的文件 bar-service-context.xml)\n\n```\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
      http://www.springframework.org/schema/context/spring-context-4.0.xsd\">\n\n\
  <context:component-scan base-package=\n     \"net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.service\"\
  \ />\n\n<bean class=\"org.springframework.remoting.rmi.RmiServiceExporter\">\n    <property\
  \ name=\"serviceName\" value=\"BarService\" />\n    <property name=\"service\" ref=\"\
  barServiceImpl\" />\n    <property name=\"serviceInterface\"\n      value=\"net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.BarService\"\
  \ />\n    <property name=\"registryPort\" value=\"10203\" />\n  </bean>\n</beans>\n\
  ```\n\n文件开头定义了标准的 Spring XML 命名空间上下文和 Bean。首先，我们对服务实现所在的包执行组件扫描。然后，我们注册 RMI 服务导出器\
  \ Bean。该 XML 配置使用了标准的 Spring Bean 注册语法。\n\n请注意，这里的端口号与清单 2-8 中的不同。这种差异表明此配置位于不同的项目中，但服务接口及其实现完全相同。当集成测试套件中的不同项目使用不同的端口时，处理集成测试会更容易。\n\
  \n如清单 2-13 所示，客户端的 XML 配置比 Java 配置简洁得多，这很有趣。\n\n***清单 2-13***. Spring RMI XML 客户端配置\
  \ (示例项目 0203-spring-rmi-xml-config-client 中的文件 foo-client-context.xml)\n\n```\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
      http://www.springframework.org/schema/context/spring-context-4.0.xsd\">\n\n\
  <bean id=\"barService\"\n    class=\"org.springframework.remoting.rmi.RmiProxyFactoryBean\"\
  >\n    <property name=\"serviceUrl\" value=\"rmi://localhost:10203/BarService\"\
  \ />\n    <property name=\"serviceInterface\"\n      value=\"net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.BarService\"\
  \ />\n  </bean>\n</beans>\n```\n\n此示例是清单 2-14 中 XML 服务器配置的客户端对应部分。因此，使用了端口 10203。您可能会注意到它与\
  \ Java 配置类似。请注意，在清单 2-9 的 Java 客户端配置示例中，我们必须显式创建代理 Bean。在这种情况下，Spring 会自动创建它，因此只需注册工厂\
  \ Bean 即可。\n\n如您所见，这些示例记录了 Spring 为 RMI 提供的 API 增强功能。虽然通过 RMI 暴露服务很容易，使用 Spring\
  \ 则更容易，但使用 RMI 时存在一些架构风险。首先，契约中包含的每个类型都必须是可序列化的。这具有限制性，因为双方都需要拥有每个返回类型或参数的相同版本。因此，对契约的更改需要在双方进行协调。这导致了\
  \ RMI 导出器和消费者之间的紧密耦合。\n\n\n\n另一个问题是无法使用同一 API 契约的不同版本。当然，契约应尽可能保持稳定，但有时仍需变更。其他方法（如\
  \ SOAP 或 REST）允许在不修改客户端的情况下扩展 API，而 RMI 序列化并不适合此类变更。RMI 方法签名中使用的任何类型变更都必须在客户端同步更新。\n\
  \nRMI 的另一个显著缺点是只能与 JVM 运行时通信。这一问题可通过基于 CORBA 的 RMI 实现（RMI-IIOP）解决。CORBA 是由对象管理组织（OMG）定义的标准，专为不同平台间的通信而设计。Spring\
  \ 中的 RMI-IIOP 与纯 RMI 类似，唯一区别在于需要为 Spring RMI 类添加 JNDI 前缀。例如，对于 RMI-IIOP，我们将使用`JndiRmiServiceExporter`替代`RmiServiceExporter`。但即便\
  \ CORBA 曾被视为实现分布式系统的有前景技术，由于协议及其实现存在的各种问题，它并未获得广泛采用。\n\n![Image](img/sq.jpg) **注意**\
  \ 深入探讨 CORBA 及其问题已超出本书范围。维基百科是很好的研究起点：`https://en.wikipedia.org/wiki/Common_Object_Request_Broker_Architecture#Problems_and_criticis`m\n\
  \nRMI 的这些弱点可能引发质疑，包括为何还要使用 RMI。但它确实还有一个优势（除了简单性和优于 SOAP/REST 的性能）：无需 Web 服务器即可通信。纯\
  \ RMI 可以在不借助额外抽象或库的情况下实现 JVM 间通信。这在需要远程通信的基于 Java 的嵌入式系统中非常实用。\n\nSpring RMI 总结\n\
  \n需要牢记的是，与纯 Java RMI API 相比，Spring 提供了诸多优势。首先，在服务端：\n\n*   将服务端业务逻辑与远程协议解耦，因为我们可以直接暴露业务服务而无需修改。\n\
  *   服务方法无需抛出`java.rmi.RemoteException`。\n*   服务接口无需继承`java.rmi.Remote`。\n*   服务实现无需继承`java.rmi.server.UnicastRemoteObject`。\n\
  *   服务构造函数无需抛出`java.rmi.RemoteException`。\n*   Spring 可自动完成 RMI 注册表的绑定。\n\n其次，在客户端：\n\
  \n*   调用远程方法时无需修改现有代码，因为使用服务方法时客户端无需处理受检异常`java.rmi.RemoteException`。Spring 会将其转换为非受检异常`RemoteAccessException`。\n\
  *   将客户端业务逻辑与远程机制解耦，因此可轻松替换远程协议。\n\nSpring HttpInvoker\n\nHttpInvoker 是一种与 RMI 类似的技术。它也使用标准\
  \ Java 序列化和反序列化，但采用不同的协议传输序列化数据。RMI 使用 JRMP，RMI-IIOP 使用 CORBA。而顾名思义，HttpInvoker\
  \ 使用 HTTP。这可能是当今使用最广泛的协议，因为它支撑着整个 Web。HTTP 相比其他协议具有显著优势，因为网络基础设施最有可能广泛支持它。例如，RMI\
  \ 或 CORBA 可能被防火墙规则阻止，但大多数防火墙都启用了 HTTP。\n\n执行远程调用时，它使用 HTTP POST 请求，并通过标准 Java 序列化对参数和响应值进行序列化。因此其性能与\
  \ RMI 相近。但 HttpInvoker 被 Spring 团队官方推荐为首选远程方法，因为它无需使用任何特殊的远程契约（远程接口、远程异常、代理），也不依赖\
  \ RMI 注册表机制。这就是为什么 Spring 文档认为 HttpInvoker 比其他远程机制更轻量级。\n\nHttpInvoker 可通过多种方式提供服务：\n\
  \n*   通过 Servlet 容器（Java EE）\n*   通过`HttpRequestHandlerServlet`（无 Spring MVC 支持）\n\
  *   通过`DispatcherServlet`（有 Spring MVC 支持）\n*   通过简单的 Java HTTP 服务器实现（Java SE）\n\
  \n最后一种实现无需特殊运行时，标准 Java 运行时即可。而前两种则需要 Java EE Servlet 容器。\n\n每种 HttpInvoker 解决方案都采用类似的方法暴露\
  \ Bean。它将目标服务 Bean 和服务接口封装到`HttpInvokerServiceExporter`/`SimpleHttpInvokerServiceExporter`中。该\
  \ Bean 在 Spring 容器中注册，并通过前述 HTTP 通信机制暴露。让我们通过示例探索每种方法。清单 2-14 包含一个将被暴露的服务接口和实现示例。\n\
  \n***清单 2-14***. 共享接口与服务实现\n\n```\npublic interface BarService {\n  String serveBar(String\
  \ param);\n}\n\nimport org.springframework.stereotype.Service;\n\n@Service\npublic\
  \ class BarServiceImpl implements BarService {\n  @Override\n  public String serveBar(String\
  \ param) {\n    return \"Bar service response to parameter: \" + param;\n  }\n}\n\
  ```\n\n该服务接口契约和服务实现将用于本章所有 HttpInvoker 示例。\n\n通过 HttpRequestHandlerServlet 提供 HttpInvoker\
  \ 服务\n\n通过`HttpRequestHandlerServlet`提供 HttpInvoker 服务的示例可在项目`0204-http-invoker-handler-servlet-java-config`和`0205-http-invoker-handler-servlet-xml-config`的代码示例中找到。首先，我们需要将服务接口封装到`HttpInvokerServiceExporter`中，并将其注册为\
  \ Spring Bean，如清单 2-15 所示。\n\n***清单 2-15***. HttpInvoker 服务端配置示例\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter02.httpinvoker.handlerservlet.javaconfig.server;\n\
  \nimport net.lkrnac.book.eiws.chapter02.httpinvoker.\n         handlerservlet.javaconfig.shared.BarService;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter;\n\
  \n@Configuration\n@ComponentScan\npublic class ServerConfiguration {\n  @Bean\n\
    public HttpInvokerServiceExporter barExporter(BarService barService) {\n    HttpInvokerServiceExporter\
  \ httpInvokerServiceExporter =\n        new HttpInvokerServiceExporter();\n    httpInvokerServiceExporter.setService(barService);\n\
      httpInvokerServiceExporter.setServiceInterface(BarService.class);\n    return\
  \ httpInvokerServiceExporter;\n  }\n}\n```\n\n这是一个非常直接的 Spring Java 配置，它扫描当前包（及子包）中的\
  \ Spring 组件，并注册一个服务导出器 Bean。请注意，该 Bean 的名称为`barExporter`（默认情况下与 Bean 方法名相同）。Bean\
  \ 名称很重要，因为它需要与 Servlet 描述符配置中配置的 Servlet 名称匹配。目标服务`barService`实例通过`HttpInvokerServiceExporter.setService`方法注入和配置。如您所见，我们还需要指定服务接口。相同\
  \ Bean 的 XML 配置如清单 2-16 所示。\n\n***清单 2-16***. HttpInvoker 服务端 XML 配置示例\n\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
  \    http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
  \    http://www.springframework.org/schema/context/spring-context.xsd\">\n\n<context:component-scan\
  \ base-package=\n     \"net.lkrnac.book.eiws.chapter02.httpinvoker.handlerservlet.xmlconfig\"\
  \ />\n\n<bean name=\"barExporter\" class=\n      \"org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter\"\
  >\n    <property name=\"service\" ref=\"barService\" />\n    <property name=\"serviceInterface\"\
  \ value=\n\"net.lkrnac.book.eiws.chapter02.httpinvoker.handlerservlet.xmlconfig.shared.BarService\"\
  \ />\n  </bean>\n</beans>\n```\n\n下一步是配置一个 `HttpRequestHandlerServlet`。Java Servlet\
  \ 配置如清单 2-17 所示。\n\n***清单 2-17***. HttpInvoker Servlet 描述符示例\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.\n\
  \          handlerservlet.javaconfig.server;\n\nimport javax.servlet.ServletContext;\n\
  import javax.servlet.ServletException;\nimport javax.servlet.ServletRegistration;\n\
  import org.springframework.web.WebApplicationInitializer;\nimport org.springframework.web.context.ContextLoaderListener;\n\
  import org.springframework.web.context.\n         support.AnnotationConfigWebApplicationContext;\n\
  import org.springframework.web.context.support.HttpRequestHandlerServlet;\n\npublic\
  \ class WebAppInitializer implements WebApplicationInitializer {\n  @Override\n\
  \  public void onStartup(ServletContext servletContext) throws ServletException\
  \ {\n    AnnotationConfigWebApplicationContext rootContext =\n        new AnnotationConfigWebApplicationContext();\n\
  \    rootContext.register(ServerConfiguration.class);\n    rootContext.refresh();\n\
  \nservletContext.addListener(new ContextLoaderListener(rootContext));\n    ServletRegistration.Dynamic\
  \ appServlet =\n        servletContext.addServlet(\"barExporter\",\n           \
  \ new HttpRequestHandlerServlet());\n    appServlet.addMapping(\"/\");\n  }\n}\n\
  ```\n\n`WebApplicationInitializer` 是 Spring 用于 Servlet 配置的接口。它作为 Servlet 3 Java\
  \ API (`javax.servlet.ServletContainerInitializer`) 之上的抽象层使用。Spring 会扫描 `WebApplicationInitializer`\
  \ 的实现，并在 `SpringServletContainerInitializer`（Spring 对 `javax.servlet.ServletContainerInitializer`\
  \ 的实现）中引导它。因此，`WebApplicationInitializer` 可以在 Spring 应用中替代 `web.xml` 配置，也可以与 `web.xml`\
  \ 配置一起使用。这种灵活性使得从遗留 XML 配置的迁移路径更加平滑。\n\n`WebApplicationInitializer.onStartup` 方法由\
  \ Spring 在 Servlet 容器初始化阶段调用。Spring 会注入 `javax.servlet.ServletContext` 实例，该实例用于与底层\
  \ Servlet 容器交互。因此，我们可以将 Servlet 注册到其中。首先，我们创建一个 Spring 根上下文并注册 `ServerConfiguration`。接下来是清单\
  \ 2-17 中的两行样板代码。注册配置后需要刷新上下文，并且还需要注册 `ContextLoaderListener`。\n\n最后，我们注册一个新的 `HttpRequestHandlerServlet`\
  \ 实例，其名称与服务导出器 bean 的名称（`barExporter`）匹配，并将该 Servlet 映射到一个 URL（本例中为 `/`）。你可能更熟悉\
  \ `web.xml` 风格的配置，如清单 2-18 所示。它看起来与清单 2-17 中的 `WebAppInitializer` 类似。\n\n***清单 2-18***.\
  \ HttpInvoker XML Servlet 描述示例\n\n```\n<web-app ...>\n  <display-name>0205-http-invoker-handler-servlet-xml-config</display-name>\n\
  \  <context-param>\n    <param-name>contextConfigLocation</param-name>\n    <param-value>classpath:server-config.xml</param-value>\n\
  \  </context-param>\n\n<listener>\n    <listener-class>\n      org.springframework.web.context.ContextLoaderListener\n\
  \    </listener-class>\n  </listener>\n\n<servlet>\n    <servlet-name>barExporter</servlet-name>\n\
  \    <servlet-class>\n      org.springframework.web.context.support.HttpRequestHandlerServlet\n\
  \    </servlet-class>\n  </servlet>\n\n<servlet-mapping>\n    <servlet-name>barExporter</servlet-name>\n\
  \    <url-pattern>/</url-pattern>\n  </servlet-mapping>\n</web-app>\n```\n\n在这个例子中，我们使用了示例项目\
  \ `0205-http-invoker-handler-servlet-xml-config` 中的 `spring-config.xml` 文件作为 Spring\
  \ 配置。但 XML 配置的所有其他方面都遵循与 `WebApplicationInitializer` 相同的概念。跨不同技术和配置类型的 API 一致性正是\
  \ Spring 的魅力所在。\n\n`HttpRequestHandlerServlet` 是 `DispatcherServlet`（Spring MVC\
  \ 框架的核心）的一个轻量级替代方案。因此，如果我们需要避免使用 Spring MVC 框架，它会非常方便。但如果你的应用已经使用了 `DispatcherServlet`，或者你想避免不必要的样板配置，那么下面的方法才是正确的选择。\n\
  \n通过 DispatcherServlet 提供 HttpInvoker 服务\n\n`DispatcherServlet` 是 Spring Web 支持的核心类。Spring\
  \ MVC 广泛使用它来构建 Web 应用和 REST API。它的工作是根据声明式 URL 映射将 HTTP 消息路由到控制器，并将响应映射到适当的视图。\n\
  \n使用 `DispatcherServlet`，你可以将 `HttpInvokerServiceExporter` bean 直接映射到一个 URL。这可以通过以斜杠字符开头\
  \ bean 名称来实现，如清单 2-19 所示。\n\n***清单 2-19***. 通过 DispatcherServlet 提供 HttpInvoker\
  \ 服务示例 (0206-http-invoker-bean)\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.dispatcherservlet.server;\n\
  \nimport net.lkrnac.book.eiws.chapter02.httpinvoker.\n         dispatcherservlet.shared.BarService;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.EnableAutoConfiguration;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter;\n\
  \n@Configuration\n@ComponentScan\n@EnableAutoConfiguration\npublic class ServerConfiguration\
  \ {\n  public static void main(String... args) {\n    SpringApplication.run(ServerConfiguration.class);\n\
  \  }\n\n@Bean(name = \"/BarService\")\n  public HttpInvokerServiceExporter exportBarService(BarService\
  \ barService) {\n    HttpInvokerServiceExporter httpInvokerServiceExporter =\n \
  \       new HttpInvokerServiceExporter();\n    httpInvokerServiceExporter.setService(barService);\n\
  \    httpInvokerServiceExporter.setServiceInterface(BarService.class);\n    return\
  \ httpInvokerServiceExporter;\n  }\n}\n```\n\n导出器 bean 的配置与“通过 HttpRequestHandlerServlet\
  \ 提供 HttpInvoker 服务”一节中的配置类似。唯一的区别是 bean 的名称 `/BarService`（注意开头的正斜杠字符）。带有斜杠字符的名称告诉\
  \ Spring，该 bean 应由 `DispatcherServlet` 从该名称定义的 URL 端点提供服务。如果 `DispatcherServlet`\
  \ 已经正确配置，则无需其他配置更改。\n\n\n配置`DispatcherServlet`是 Spring Web 认证考试中的内容，并在第 3 章和第 4\
  \ 章中重点介绍。因此，我抓住机会，采用了一种新方法通过`DispatcherServlet`来配置 HttpInvoker。经验丰富的 Spring 开发者会注意到，清单\
  \ 2-19 使用了不属于 Spring 核心框架的 API（`EnableAutoConfiguration`注解和`SpringApplication`类）。这些是新的\
  \ Spring Boot 框架的一部分。Spring Boot 推崇约定优于配置的原则，以构建高度可配置的 Spring 应用。这极大地有助于减少样板配置的数量。但同时，约定也可以被自定义的\
  \ Spring 配置所取代。这使得使用 Spring 家族框架进行快速且灵活的开发成为可能。\n\n`EnableAutoConfiguration`注解告诉\
  \ Spring Boot 检查类路径，并根据找到的依赖项应用最合适的 Spring 配置。清单 2-20 包含了此示例的 Maven 依赖项。\n\n***清单\
  \ 2-20***. Maven 依赖项 (0206-http-invoker-bean)\n\n```\n<dependencies>\n  <dependency>\n\
      <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-web</artifactId>\n\
    </dependency>\n  <dependency>\n      <groupId>org.springframework.boot</groupId>\n\
  \n<artifactId>spring-boot-starter-tomcat</artifactId>\n      <scope>provided</scope>\n\
    </dependency>\n</dependencies>\n```\n\n在这个例子中，我们的类路径上有 Tomcat。因此，由于我们有一个 Servlet\
  \ 容器作为依赖项，Spring Boot 会应用最常见的、带有`DispatcherServlet`的 Servlet 配置。这对我们的示例来说很方便，因为如果使用\
  \ Spring Boot JAR 打包，这实际上就是所需的所有配置。\n\n如果我们需要使用 Spring Boot WAR 打包，则需要再添加一个类来处理\
  \ Servlet 配置，如清单 2-21 所示。\n\n***清单 2-21***. 用于 WAR 打包的 Spring Boot Servlet 辅助类 (示例项目\
  \ 0206-http-invoker-bean)\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.dispatcherservlet.server;\n\
  \nimport org.springframework.boot.builder.SpringApplicationBuilder;\nimport org.springframework.boot.context.web.SpringBootServletInitializer;\n\
  \npublic class WebInitializer extends SpringBootServletInitializer {\n  @Override\n\
    protected SpringApplicationBuilder configure(\n      SpringApplicationBuilder\
  \ application) {\n    return application.sources(ServerConfiguration.class);\n  }\n\
  }\n```\n\n`SpringBootServletInitializer`将`DispatcherServlet`映射到“`/`”URL，并使用`ServerConfiguration`类作为主要的\
  \ Spring 上下文定义。\n\n通过简单的 Java HTTP 服务器提供 HttpInvoker 服务\n\n如果 Servlet 容器对我们的应用程序来说过于庞大，我们可以使用纯\
  \ Java SE 方法来通过 HttpInvoker 暴露服务。标准 Java 运行时包含一个简单的 HTTP 服务器实现，Spring 可以利用它通过 HttpInvoker\
  \ 暴露服务。这个简单 HTTP 服务器的 API 细节并不重要，因为我们希望使用 Spring 的抽象。让我们看看清单 2-22 中的 Spring 配置。\n\
  \n***清单 2-22***. 通过简单 Java 服务器配置 HttpInvoker 的示例 (0207-http-invoker-simple-service)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.simple.server;\n\nimport\
  \ java.util.HashMap;\nimport java.util.Map;\nimport net.lkrnac.book.eiws.chapter02.httpinvoker.simple.shared.BarService;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.remoting.\n         httpinvoker.SimpleHttpInvokerServiceExporter;\n\
  import org.springframework.remoting.support.SimpleHttpServerFactoryBean;\nimport\
  \ com.sun.net.httpserver.HttpHandler;\n\n@Configuration\n@ComponentScan\npublic\
  \ class ServerConfiguration {\n  @Bean\n  public SimpleHttpInvokerServiceExporter\
  \ barExporter(BarService barService) {\n    SimpleHttpInvokerServiceExporter barExporter\
  \ =\n        new SimpleHttpInvokerServiceExporter();\n    barExporter.setService(barService);\n\
      barExporter.setServiceInterface(BarService.class);\n    return barExporter;\n\
    }\n\n@Bean\n  public SimpleHttpServerFactoryBean httpServer(\n      SimpleHttpInvokerServiceExporter\
  \ barExporter) {\n    SimpleHttpServerFactoryBean httpServer = new SimpleHttpServerFactoryBean();\n\
      Map<String, HttpHandler> endpoints = new HashMap<>();\n    endpoints.put(\"\
  /BarService\", barExporter);\n    httpServer.setContexts(endpoints);\n    httpServer.setPort(10207);\n\
      return httpServer;\n  }\n}\n```\n\n`ServerConfiguration.barExporter` bean 与\
  \ Servlet HttpInvoker 示例类似。该方法创建了一个`SimpleHttpInvokerServiceExporter`实例。服务导出器具有必填字段：服务和服务接口。服务实现实例从\
  \ Spring 注入，代表暴露的逻辑。服务接口是暴露服务的签名。\n\n配置中的第二个 bean 配置了一个简单的 HTTP 服务。暴露的服务需要绑定到一个\
  \ URL 端点。我们需要提供的第二个必填设置是简单 HTTP 服务器将监听的端口号。\n\n从客户端访问 HttpInvoker 服务\n\n前面的示例表明，我们有多种通过\
  \ HttpInvoker 暴露服务的选项，这些选项的区别在于 Web 服务器/Servlet 的实现。在通信通道的另一端，我们有两种使用 HttpInvoker\
  \ 协议的选项：\n\n*   标准 Java 开发工具包（JDK）HTTP 客户端——默认使用\n*   Apache HttpComponents 作为客户端库\n\
  \nApache HttpComponents 提供了一些标准 Java SE HTTP 组件无法处理的功能：\n\n*   基本 HTTP 认证\n*   HTTP\
  \ 连接池\n*   HTTP 状态管理\n\n使用标准 Java HTTP 代理的 Java 配置示例如清单 2-23 所示。\n\n***清单 2-23***.\
  \ HttpInvoker 客户端配置示例 (0204-http-invoker-handler-servlet-java-config)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter02.httpinvoker.\n          handlerservlet.javaconfig.client;\n\
  \nimport net.lkrnac.book.eiws.chapter02.httpinvoker.\n         handlerservlet.javaconfig.shared.BarService;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.remoting.httpinvoker.HttpInvokerProxyFactoryBean;\n\n\
  @Configuration\npublic class ClientConfiguration {\n  @Bean\n  public HttpInvokerProxyFactoryBean\
  \ httpInvokerProxy() {\n    HttpInvokerProxyFactoryBean httpInvoker =\n        new\
  \ HttpInvokerProxyFactoryBean();\n    httpInvoker.setServiceUrl(\"http://localhost:10204/BarService\"\
  );\n    httpInvoker.setServiceInterface(BarService.class);\n    return httpInvoker;\n\
    }\n}\n```\n\n我们需要将一个`HttpInvokerProxyFactoryBean`类型的 bean 注册到 Spring 上下文中。它是一个工厂\
  \ bean，表明它将用于创建对象。在这种情况下，它将创建一个代理 bean，该 bean 将充当远程服务的本地实例。对此 bean 的所有请求都将被序列化并通过网络发送到服务器。\n\
  \n\n\n因此，远程服务对于业务逻辑而言，看起来就像一个本地 Bean。如示例所示，创建 HttpInvoker 隧道需要服务位置的 URL 和服务接口。本例中的服务器端部署在本地主机的\
  \ 10204 端口上。请注意，没有配置任何请求执行器实例，这意味着我们使用的是标准的 Java HTTP 客户端。最后，我们可以像清单 2-24 所示，通过标准的自动装配来使用\
  \ `BarService` Bean。\n\n***清单 2-24***. 在客户端调用 HttpInvoker (0204-http-invoker-handler-servlet-java-config)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.\n          handlerservlet.javaconfig.client;\n\
  \nimport static org.testng.Assert.assertEquals;\nimport net.lkrnac.book.eiws.chapter02.httpinvoker.\n\
           handlerservlet.javaconfig.shared.BarService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.\n\
           testng.AbstractTestNGSpringContextTests;\nimport org.testng.annotations.Test;\n\
  \n@ContextConfiguration(classes = { ClientConfiguration.class })\npublic class HttpInvokerServletJavaConfigITCase\
  \ extends\n    AbstractTestNGSpringContextTests {\n  @Autowired\n  private BarService\
  \ barService;\n\n@Test\n  public void testHttpInvoker() {\n    // GIVEN - 客户端上下文\n\
  \n// WHEN\n    String actualResult = barService.serveBar(\"0204 Integration test\"\
  );\n\n// THEN\n    assertEquals(actualResult,\n        \"Bar service 0204 response\
  \ to parameter: 0204 Integration test\");\n  }\n}\n```\n\n清单 2-24 是一个 TestNG 集成测试的形式，但很明显，同样的自动装配也可以应用于我们的业务逻辑\
  \ Bean。无论是测试还是潜在的业务 Bean，都不知道 `barService` 是一个通过 HttpInvoker 暴露的远程服务。这展示了通过 HttpInvoker\
  \ 暴露和消费服务是多么简单，而无需对现有的 Spring 应用进行任何更改。\n\n现在，让我们探讨使用 HttpComponents 库消费 HttpInvoker\
  \ 的第二种选择。如果标准 Java SE HTTP 客户端的功能不足以满足我们的用例，我们就会使用这个选项。出于安全或性能方面的考虑，基本的 HTTP 认证或\
  \ HTTP 连接池是常见需求。\n\n为了稍微转换一下思路，我们将把它与 XML Spring 配置结合使用，以展示如何通过 XML 配置来配置 HttpInvoker。请参见清单\
  \ 2-25。\n\n***清单 2-25***. HttpInvoker XML 配置示例 (0205-http-invoker-handler-servlet-xml-config)\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<bean id=\"httpInvokerProxy\"\n    class=\"org.springframework.remoting.httpinvoker.HttpInvokerProxyFactoryBean\"\
  >\n    <property name=\"serviceUrl\" value=\"http://localhost:10205/BarService\"\
  \ />\n    <property name=\"serviceInterface\" value=\n      \"net.lkrnac.book.eiws.chapter02.httpinvoker.handlerservlet.xmlconfig.shared.BarService\"\
  \ />\n    <property name=\"httpInvokerRequestExecutor\">\n      <bean class=\n        \"\
  org.springframework.remoting.httpinvoker.HttpComponentsHttpInvokerRequestExecutor\"\
  \ />\n    </property>\n  </bean>\n</beans>\n```\n\n此客户端配置为连接本地主机上端口为 10205 的服务器。它仅使用标准的\
  \ Bean 命名空间来构建代理工厂 Bean。与清单 2-24 中的 Java 配置相比，唯一的区别在于 `httpInvokerRequestExecutor`\
  \ 字段。我们显式地将其配置为使用 Apache HttpComponents 客户端库。\n\n总结\n\n本章讨论了 Spring 框架的远程调用支持。在这种同步通信中，客户端会被阻塞，直到远程服务完成其工作。\n\
  \n通信中涉及的所有类（服务方法参数和返回类型）都需要进行序列化。无论是标准的 Java 序列化、CORBA，还是 Caucho 的 XML 二进制序列化，这都造成了一个显著的约束：无法对服务器\
  \ API 进行版本管理。客户端/服务器契约的每一次变更都需要在双方进行对齐。因此，如果我们需要创建一个具有以下特征的服务器 API，则应避免使用这些技术：\n\
  \n*   面向公众。\n*   不受我们控制。\n*   被大量客户端消费。如果服务器契约发生更改，所有客户端也需要随之更改。\n\n每种 Spring 远程调用抽象都使用了不同的传输协议和序列化机制组合：\n\
  \n*   RMI 使用 Java 序列化和 Java 远程方法协议。\n*   RMI-IIOP 使用 Java 序列化和 Internet Inter-Orb\
  \ 协议，这使得通信与 CORBA 兼容。\n*   HttpInvoker 使用 Java 序列化和 HTTP。\n*   Hessian 使用 Caucho\
  \ 的二进制 XML 序列化和 HTTP。\n*   Burlap 使用 Caucho 的文本 XML 序列化和 HTTP。\n\n当需要选择远程调用方法时，传输协议和序列化机制可以缩小架构决策的范围。例如，如果需要与非\
  \ Java 应用程序通信，则只有 Hessian 或 RMI-IIOP 是合适的（应避免使用 Burlap，因为其 Spring 抽象自 Spring 4 起已被弃用）。当我们需要通过\
  \ HTTP 通信时，只有 HttpInvoker 和 Hessian 能够满足此要求。\n\nSpring 极大地简化了不同远程调用技术之间的转换，因为它使用相同的概念来暴露和消费服务。在暴露服务时，使用了导出服务的概念（`RmiServiceExporter`、`HttpInvokerServiceExporter`、`HessianServiceExporter`、`BurlapServiceExporter`）。在消费服务时，代理工厂\
  \ Bean 机制贯穿所有远程调用抽象（`RmiProxyFactoryBean`、`HttpInvokerProxyFactoryBean`、`HessianProxyFactoryBean`、`BurlapProxyFactoryBean`）。所有这些抽象在不同远程调用技术中都具有相似的属性。这种\
  \ API 的一致性降低了我们在需要切换远程调用技术时的学习曲线。\n\n当使用 RMI 时，使用 Spring 抽象而非标准 Java API 有许多好处。\n\
  \n服务器端的好处如下：\n\n*   无需抛出受检异常\n*   无需实现或扩展侵入性的 RMI 类型\n*   允许在无需修改的情况下暴露业务服务\n* \
  \  在需要时处理 RMI 注册表的创建\n\n客户端的好处如下：\n\n*   将受检异常转换为运行时异常\n*   允许在无需修改客户端代码的情况下消费远程服务\n\
  \n虽然每种远程调用方法都提供了一种实现分布式应用的简便方式，但如今在企业应用中已很少使用，因为它们会在应用之间造成紧密耦合。因此，如果不需要特定的远程调用技术，或者可以接受稍低的性能，那么在新项目中很可能会考虑使用\
  \ SOAP 或特别是 RESTful Web 服务。\n\n第 3 章\n\n![image](img/frontdot.jpg)\n\nWeb 服务\n\n\
  本章涵盖 Spring Web Services 项目。在解耦和性能方面，SOAP Web 服务可以被视为与远程过程调用（RPC）完全相反，因为 SOAP 提供了非常高程度的解耦，但这并非没有代价。这种可变性的代价是可能由于\
  \ SOAP 使用的臃肿 XML 协议而出现性能问题。SOAP 服务的实现也很复杂。我们将深入探讨 Spring 在该领域提供的支持，并展示 Spring 如何通过利用最佳实践和重用最现代的方法来帮助简化这一过程。\n\
  \nWeb 服务简介\n\n\n\n软件开发世界如同时尚行业：也有潮流。当人们意识到分布式系统将驱动现代网站，而远程过程调用的缺陷会将这些技术推向极限时，软件开发的焦点便转向了解耦。\n\
  \nWeb 服务通过面向服务的架构（SOA）高度互联，其中各种功能被拆分为独立的服务应用程序，彼此之间进行通信。这些服务由面向客户端的应用程序或其他服务消费。这种架构实现了关注点分离和低耦合。另一方面，它也带来了更高的复杂性，因为需要在\
  \ Web 服务的消费者和提供者之间定义一份明确的契约。当契约的所有方面都预先定义好后，服务和应用程序就可以独立地进行开发、测试和部署。\n\n也可以考虑 RPC\
  \ 方法，但远程技术的紧耦合对 SOA 来说是一个大问题，尤其是当 Web 服务的消费者由不同的团队、部门或公司开发时。因此，通信需要通过一种有助于将客户端与\
  \ Web 服务解耦的协议进行。\n\nWeb 服务的一个重要需求是能够处理同一服务 API 的不同版本。这对 RPC 技术来说是致命的。想象一个应用程序的公开\
  \ API 以及消费它的各种客户端。当 API 需要实现变更或新功能时，并非所有客户端都愿意更新——因为这会给它们带来额外成本。我们最终可能会得到两组使用不同契约的客户端。因此，需要一种协议来处理版本控制。\n\
  \n这种协议就是 SOAP（最初称为简单对象访问协议），它使用 XML 作为其交换格式。SOAP 与传输协议无关，因此我们可以使用 HTTP、简单邮件传输协议（SMTP）、传输控制协议（TCP）、用户数据报协议（UDP）、Java\
  \ 消息服务（JMS）或可扩展消息与存在协议（XMPP）作为传输协议。这种可变性不会束缚底层网络架构。XML 负载格式灵活、平台无关且被广泛采用。所有主流平台，如\
  \ Java、.NET、C++、Ruby、PHP、Python 和 Perl 都支持它。因此，它是满足 SOA 需求的交换格式的理想选择。\n\n当客户端在运行时发现\
  \ Web 服务的能力和负载结构时，就实现了客户端与 Web 服务的最高程度解耦。XML 模式定义（XSD）和 Web 服务描述语言（WSDL）可用于此目的。XSD\
  \ 定义了 Web 服务提供或消费的 XML 负载的结构、复杂类型以及某些数据元素的验证规则。因此，我们可以将其视为 Web 服务负载的元数据。Web 服务可以针对\
  \ XSD 验证接收到的负载。WSDL 是基于 XML 的对 Web 服务所提供功能的描述。它汇集了服务名称、提供的服务方法以及服务方法的签名（参数类型和返回值类型）。\n\
  \n有了这个概念，客户端无需预先了解 Web 服务的任何信息。XML 负载可以基于 XSD 和 WSDL 文件动态构建。但这种方法也有缺点。基于 XSD 和 WSDL\
  \ 文件构建 XML 请求并非易事。有了这样的元数据规则，Web 服务的实现也更加复杂。而且，当负载始终动态生成时，会带来性能损失。当然，我们可以省略 Web\
  \ 服务的元数据契约，将客户端绑定到静态的负载结构。但对于这种情况，存在更简洁的交换格式（例如，JavaScript 对象表示法，即 JSON）。XML 格式的冗长性是\
  \ SOAP 批评者指出的问题之一。\n\n那么，让我们总结一下 SOAP 与远程（RPC）技术相比最重要的优势：\n\n*   *解耦*：面向文档的通信支持版本控制和可发现性。\n\
  *   *互操作性*：可以轻松连接各种平台，并在多种传输协议之上运行。\n\n其缺点包括：\n\n*   *复杂性*：SOAP 实现起来要复杂得多，因为它需要了解\
  \ XSD、WSDL、XML 编组以及编组框架。\n*   *性能*：XML 的冗长性以及针对模式进行编组和验证的需求使其性能较差。\n\nJava Web 服务\n\
  \nJava 并非唯一在 SOAP 协议之上运行的平台。.NET 也是该领域的重要参与者。但 Java EE 无疑是 SOAP Web 服务概念的最大采用者。Java\
  \ 生态系统中已经发展出许多库来帮助进行 Web 服务开发。由于 SOAP 依赖于 XML，因此用于编组到 XML 和从 XML 解组的库对于 SOAP 通信至关重要。\n\
  \n让我们看看主要编程语言平台的 XML 库，从 Java 开始。这些库根据其处理 XML 的不同方法进行分类：\n\n*   *Java*\n    *  \
  \ 事件驱动方法——应用程序监听特定 XML 元素的事件：用于 XML 的简单 API（SAX）\n    *   基于 DOM 的方法——应用程序加载整个 XML\
  \ 并将其解析为树结构：JDOM、XOM、dom4j、TrAX\n    *   用于 XML 的流式 API（StAX）：引入了 XML 文档中游标的概念，用于向前和向后读取\n\
  \    *   XML 到 Java 对象的绑定：用于 XML 绑定的 Java 架构（JAXB）、Castor XML、XMLBeans、XStream、JiBX\n\
  \    *   *.NET*：XmlSerializer、System.Xml、.NET XML 解析器\n    *   *Python*：ElementTree、BeautifulSoup、MiniDom/PullDom\n\
  \    *   *Ruby*：Builder、Nokogiri、REXML、XmlSimple\n    *   *Perl*：Perl XML、XML::Simple\n\
  \    *   *JavaScript*：LibXmlJs\n\n从这个列表中可以看出，实现基于 XML 的 Web 服务存在许多可能性。现在让我们只关注 Java\
  \ Web 服务。我们一方面有 XML 消息，另一方面有 Java 对象。完成 XML 转换的最简单方法是直接绑定到 Java 对象。但这种方法并非在所有情况下都适用。例如，如果我们有一个非常大的\
  \ XML 消息，无法加载到内存中，我们需要使用更底层的 XML 处理库来处理它。\n\n但对于 SOAP 实现，绑定库是最合适的。SOAP 中的大消息可能表明通信设计存在问题。这就是为什么如今大多数\
  \ Java Web 服务都使用对象到 XML（OXM）绑定库来实现。JAXB 是主要的 Java OXM 参与者，因为它是 Java EE 标准的一部分。JAXB\
  \ 技术也适用于 SOAP 之外，因为它可以处理 JSON 格式。\n\n正如我们所描述的，XML 编组和解组发生在 SOAP 通信中。SOAP 消息具有指定的高级结构，并且需要符合正式的契约（XSD/WSDL）。\n\
  \n用于交换数据的 SOAP 消息的强制性高级结构如下：\n\n\n\n*   信封\n*   头部：可能包含元数据——例如，用于安全、路由或业务逻辑的元数据\n\
  *   正文：包含消息本身，并可能包含 Web 服务所在的目标域\n\n契约定义了交换的 XML 消息的确切格式。但我们如何开始开发这样一个 Web 服务呢？当一端是\
  \ Java 对象，另一端是 XML 消息时，一端需要通过转换来符合另一端。我们有两种开始开发 Web 服务的方式：\n\n*   **契约后置**：先指定 Java\
  \ 类，然后基于 Java 类的结构创建 WSDL 契约。\n*   **契约优先**：先创建 WSDL 契约，然后强制 Java 类符合该契约。\n\n您可能期望我们现在来强调每种方法的优缺点——尤其是当这两种方法如今都有自动转换库的情况下。但\
  \ SOA 经验表明，契约后置方法可能导致各种问题：\n\n*   **性能**：Java 对象图很容易变得非常庞大。使用通信协议发送由大型 Java 对象图生成的海量\
  \ XML 消息并不合适。\n*   **类型重复**：精心定义的 XSD 允许重用 XSD 类型。当契约从 Java 生成时，这是不可能的。\n*   **契约变更**：\n\
  \    *   解耦的基本思想基于保护客户端免受服务器变更的影响。如果 XSD 和 WSDL 是从 Java 接口自动生成的，那么 XML 契约可能会因 XSD/WSDL\
  \ 生成算法而频繁变更。\n    *   当使用契约后置方法变更契约时，我们无法支持两个版本的契约。如果我们使用契约优先方法，我们可以通过 XSLT 转换来处理契约版本间的变更。当消息通过\
  \ XSLT 转换时，可以使用相同的 Java 类表示。因此，使用契约优先方法，我们可以同时支持多个版本的契约。\n*   **Java 到 XML 类型转换问题**：\n\
  \    *   在 Java 中表示循环图很容易。但在 XML 中进行这样的表示并非易事。\n    *   XSD 约束是限制一组可能数据值（例如，字符串的正则表达式）的有用机制。但\
  \ Java 语言本身并不包含此类验证机制。\n    *   某些 Java 类型具有特殊的约束或语义。这些可以在 XML 中解释，但这种表示可能产生歧义。`ArrayList`\
  \ 在客户端可能被表示为 `LinkedList`。当两种编程语言之间进行通信时，情况可能会变得更加复杂。\n\n鉴于这些论点，契约优先被认为是最佳实践。契约后置开发风格被认为更简单，但\
  \ Spring 结合现有的 XML 库和工具，也使得契约优先方法变得容易。\n\nSpring Web 服务\n\nSpring 以两种方式支持 Web 服务开发：\n\
  \n*   **支持 JAX-WS（原 JAX-RPC）**：JAX-WS 是用于开发契约优先和契约后置 Web 服务的 Java EE 标准。它是 Core\
  \ Spring 框架的一部分。\n*   **Spring Web 服务项目**：支持契约优先的 Web 服务。\n\n![Image](img/sq.jpg)\
  \ **注意** JAX-WS 超出了 Spring 企业集成认证的范围，因此也超出了本书的范围。\n\nSpring Web 服务项目是目前实现 Web 服务的首选方式。它是\
  \ Spring 平台内的一个独立项目。一如既往，Spring Web 服务并非试图重新发明轮子，而是利用现有技术提供便捷的抽象和功能。让我们总结其中一些功能：\n\
  \n*   **强大的消息路由**：我们可以通过负载根 XML 元素、Web 服务寻址（WS-Addressing）或 `SOAPAction` 头部将 XML\
  \ 消息映射到端点。\n*   **广泛支持 XML 转换器**：支持 DOM、SAX、StAX、JDOM、dom4j、XOM 和 OXM 技术（例如，JAXB\
  \ 2、Castor XML、XMLBeans、XStream、JiBX）。\n*   **与 Spring 框架家族集成**：开发人员使用与所有其他 Spring\
  \ 模块相同的控制反转（IoC）概念。\n*   **支持 WS-Security**：SOAP 消息的加密、解密以及 Web 服务访问的身份验证是安全方面不可或缺的机制。\n\
  \n![Image](img/sq.jpg) **注意** 对 WS-Security 的支持已从 Spring 企业集成认证中移除，因此超出了本书的范围。\n\
  \n契约创建\n\nSpring Web 服务为创建 Web 服务提供了极好的基础，因为它仅促进契约优先方法。以下明确定义的步骤说明了如何定义 Spring Web\
  \ 服务契约：\n\n1.  创建一个示例消息负载。\n2.  基于示例消息生成 XSD 模式。\n3.  如果需要，增强生成的 XSD：\n    *   修改以符合所需的契约结构。\n\
  \    *   更改元素的 XSD 类型。\n    *   提取可重用的 XSD 类型。\n    *   为元素定义 XSD 约束。\n4.  Spring\
  \ 可以基于 XSD 动态生成 WSDL。\n\n前三个步骤是可选的。经验丰富的 XSD Web 服务开发者可能希望直接定义契约。但最简单的方法是从示例消息生成。业务专家也很有可能能够提供具有所需\
  \ XML 结构的示例消息。\n\n让我们用一个简单的例子来解释这些步骤。我们的示例服务将根据请求的电子邮件地址提供用户详细信息。这个简单的域将用于所有 Web\
  \ 服务示例。请求示例消息如 清单 3-1 所示。\n\n![Image](img/sq.jpg) **注意** 解释 XSD 契约创建的源代码文件存储在示例项目\
  \ `0301-ws-xmlconfig-service` 的 `src/main/resources` 目录中。\n\n***清单 3-1***. 示例请求\n\
  \n```\n<UserRequest>\n  <Email>lubos.krnac@gmail.com</Email>\n</UserRequest>\n```\n\
  \n基于此请求，服务应提供用户详细信息。用户详细信息响应的示例负载在 清单 3-2 中突出显示。\n\n***清单 3-2***. 示例响应\n\n```\n\
  <UserDetailsResponse>\n  <FirstName>Lubos</FirstName>\n  <LastName>Krnac</LastName>\n\
  </UserDetailsResponse>\n```\n\n当我们指定了请求和响应消息后，就可以生成 XSD 契约草案。我们有多种选择。由于此生成是一次性步骤，因此没有必要将其自动化到持续集成管道中。因此，您可以使用任何您选择的工具。有各种类型、不同复杂程度和用户交互方式的工具可用。一些示例如下：\n\
  \n*   **XMLSpy**：一个全面的商业 XML IDE，适用于复杂的 XML 建模\n*   **Trang**：一个简单的命令行 JAR 工具\n\
  *   **DevUtilsOnline 免费 XML 到 XSD 生成器**：一个免费的在线生成器（`http://devutilsonline.com/xsd-xml/generate-xsd-from-xml`）\n\
  \n让我们使用第三个选项，因为它不需要任何安装或下载。该工具为生成的 XSD 结构提供了多种设计风格。由于我们不需要可重用的类型，我们可以选择**俄罗斯套娃设计**。清单\
  \ 3-3 是为示例请求生成的，清单 3-4 是为示例响应生成的。\n\n\n\n![Image](img/sq.jpg) **注意**  XSD 和 WSDL\
  \ 语言在 Web 服务开发中被广泛使用，并且是其他书籍的主题。《Spring 认证的企业集成》专注于 Spring 相关的抽象和工作流。它不会深入探讨模式定义或\
  \ Web 服务描述。因此，详细的 XSD 和 WSDL 超出了本书的范围。\n\n***清单 3-3***。从示例请求生成的 XSD\n\n```\n<?xml\
  \ version=\"1.0\"?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\" attributeFormDefault=\"\
  unqualified\" elementFormDefault=\"qualified\">\n  <xs:element name=\"UserRequest\"\
  >\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element type=\"xs:string\"\
  \ name=\"Email\"/>\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
  </xs:schema>\n```\n\n***清单 3-4***。从示例响应生成的 XSD\n\n```\n<?xml version=\"1.0\"?>\n\
  <xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\" attributeFormDefault=\"\
  unqualified\" elementFormDefault=\"qualified\">\n  <xs:element name=\"UserDetailsResponse\"\
  >\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element type=\"xs:string\"\
  \ name=\"FirstName\"/>\n        <xs:element type=\"xs:string\" name=\"LastName\"\
  />\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n</xs:schema>\n\
  ```\n\n这些生成的结果为我们的 XSD 契约提供了基础。开发者可能需要调整此契约，以满足输入验证需求，并增强可读性和代码可重用性。此示例将这两个契约合并到一个文件中，因为我们的契约并不复杂，并且使用一个契约文件更易于操作。增强后的契约如清单\
  \ 3-5 所示。\n\n***清单 3-5***。手动修改的 XSD 契约\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\n  attributeFormDefault=\"\
  unqualified\" elementFormDefault=\"qualified\"\n  targetNamespace=\"http://localhost:10301/0301-ws-xmlconfig-service\"\
  >\n\n<xs:element name=\"UserDetailsResponse\">\n    <xs:complexType>\n      <xs:sequence>\n\
          <xs:element type=\"xs:NCName\" name=\"FirstName\" />\n        <xs:element\
  \ type=\"xs:NCName\" name=\"LastName\" />\n      </xs:sequence>\n    </xs:complexType>\n\
    </xs:element>\n\n<xs:element name=\"UserRequest\">\n    <xs:complexType>\n      <xs:attribute\
  \ name=\"Email\">\n        <xs:simpleType>\n          <xs:restriction base=\"xs:string\"\
  >\n            <xs:pattern value=\"[^@]+@[^\\.]+\\..+\" />\n          </xs:restriction>\n\
          </xs:simpleType>\n      </xs:attribute>\n    </xs:complexType>\n  </xs:element>\n\
  \n</xs:schema>\n```\n\n让我们总结一下清单 3-5 中引入的手动更改：\n\n*   对名字和姓氏使用 `xs:NCName` 类型而不是\
  \ `xs:string`。这很有用，因为它排除了大多数特殊字符（这些字符对人名来说没有意义）。\n*   通过使用正则表达式限制，在契约中缩小电子邮件值的范围。\n\
  *   指定服务将托管的目标命名空间 `targetNamespace`。\n*   为 XSD 文档指定 `UTF-8` 编码。\n\nXSD 契约是 Web\
  \ 服务接口规范的关键部分。它是 Web 服务的单一事实来源。正确设计 XSD 契约很重要，因为其结构变化可能会在后续触发 Java 代码库中的重构。因此，我们希望尽早让尽可能多的利益相关者审查该契约。\n\
  \n创建的 XSD 契约可用于进一步生成以下内容：\n\n*   Java 模型普通 Java 对象（POJO），以防我们使用 JAXB 2 XML 编组器\n\
  *   Web 服务的动态 WSDL 定义\n\n端点映射\n\n当请求到达我们的应用程序时，我们需要将其路由到特定的 Java 逻辑。这种绑定在 Spring\
  \ 世界中称为*端点映射*。*端点*指的是定义 Web 服务逻辑的类。该类使用 `@Endpoint` 注解进行标注。\n\n当类被声明为持有 Web 服务逻辑时，我们需要路由消息。Spring\
  \ 以以下方法级注解的形式提供了多种声明式端点映射机制：\n\n*   `@PayloadRoot`：将方法映射到请求负载的根元素\n*   `@Action`：将方法映射到\
  \ WS-Addressing `Action` 头\n*   `@SoapAction`：将方法映射到 `SOAPAction` 头\n\n使用这些注解，Web\
  \ 服务开发者可以基于各种消息属性，以声明方式有效地路由 SOAP 消息。\n\n`@PayloadRoot` 路由是最流行的方法映射机制。SOAP 消息的顶层（根）XML\
  \ 元素驱动路由。`@PayloadRoot` 注解有两个参数：\n\n*   `localPart`：指定要映射的根元素的名称。这是一个必需参数。\n*  \
  \ `namespace`：指定负载根元素的命名空间。这是一个可选参数。\n\n因此，要映射清单 3-6 中的示例消息，`localPart` 需要具有值 `UserRequest`，而\
  \ `namespace` 应具有值 `http://localhost:10301/0301-ws-xmlconfig-service`。\n\n***清单\
  \ 3-6***。示例 SOAP 消息\n\n```\n<SOAP-ENV:Envelope xmlns:SOAP-ENV=\"http://schemas.xmlsoap.org/soap/envelope/\"\
  >\n  <SOAP-ENV:Header />\n  <SOAP-ENV:Body>\n    <ns2:UserRequest xmlns:ns2=\"http://localhost:10301/0301-ws-xmlconfig-service\"\
  \n      Email=\"lubos.krnac@gmail.com\" />\n  </SOAP-ENV:Body>\n</SOAP-ENV:Envelope>\n\
  ```\n\n当映射了特定的 Java 方法时，我们需要映射参数并返回 Java 方法的值。Spring 提供了多种签名映射选项：\n\n*   映射 XML\
  \ 解析器类型\n    *   `@RequestPayload`：将请求消息映射到方法参数；参数类型源自底层 XML 编组器，用于 XML 到 Java 的转换。\n\
  \    *   `@ResponsePayload`：将响应消息映射到方法的返回值；返回值类型源自底层 XML 编组器，用于 XML 到 Java 的转换。\n\
  *   `@XPathParam`：用于基于 XPath 表达式绑定参数\n    *   `boolean` 或 `Boolean`\n    *   `double`\
  \ 或 `Double`\n    *   `String`\n    *   `org.w3c.dom.Node`\n    *   `org.w3c.dom.NodeList`\n\
  *   将消息元数据提取到方法参数中（无需使用注解）\n    *   `org.springframework.ws.context.MessageContext`\n\
  \    *   Soap 元数据（`SoapMessage`、`SoapBody`、`SoapEnvelope`、`SoapHeader`、`SoapHeaderElements`）\n\
  *   将参数映射到自定义解组器（此方法要求参数也使用 `@RequestPayload` 进行注解）\n\n开发者可以决定消息中的哪些信息与 Web 服务相关，并且需要注入到方法中。这个支持的签名映射列表提供了巨大的可变性。Spring\
  \ Web Services 的一个便捷功能是能够选择 XML 解析机制。表 3-1 展示了 Spring 可以在方法签名中自动映射的 XML 解析器类型。这些类型必须分别使用\
  \ `@RequestPayload` 或 `@ResponsePayload` 进行注解。\n\n表 3-1。方法签名映射中的 XML 解析器\n\n| XML\
  \ 解析器 | 方法签名类型 |\n| --- | --- |\n| TrAX | `javax.xml.transform.Source`、`DOMSource`、`SAXSource`、`StreamSource`\
  \ 和 `StAXSource` |\n| W3C DOM | `org.w3c.dom.Element` |\n| dom4j | `org.dom4j.Element`\
  \ |\n| JDOM | `org.jdom.Element` |\n| XOM | `nu.xom.Element` |\n| StAX | `javax.xml.stream.XMLStreamReader`\
  \ 和 `javax.xml.stream.XMLEventReader`（只能用于方法参数，不能用于返回值） |\n\nJAXB 2 端点映射示例\n\n\n\
  \n最广泛使用的编组器是 JAXB 2，它允许从 XSD 契约生成 Java 模型类。生成的 Java 类会使用特殊的映射注解进行标注，这些注解将 XML 元素映射到\
  \ POJO 类。这种方法称为对象到 XML 映射（OXM）。它与著名的对象关系映射（ORM）类似，后者将 SQL 数据库表映射到 POJO。\n\n本书中的示例基于\
  \ Maven 3 构建系统。因此，使用 `jaxb2-maven-plugin` 进行 Java 模型生成；XJC 绑定编译器用于从 XSD 契约生成 Java\
  \ 类。有关此插件的更多信息，请访问 `http://mojo.codehaus.org/jaxb2-maven-plugin/xjc-mojo.html`。Maven\
  \ 插件配置如清单 3-7 所示。\n\n***清单 3-7***. jsxb2-maven-plugin 的配置\n\n```\n<plugin>\n  <groupId>org.codehaus.mojo</groupId>\n\
    <artifactId>jaxb2-maven-plugin</artifactId>\n  <version>1.6</version>\n  <executions>\n\
      <execution>\n      <id>xjc</id>\n      <goals>\n        <goal>xjc</goal>\n      </goals>\n\
      </execution>\n  </executions>\n  <configuration>\n    <schemaDirectory>${project.basedir}/src/main/resources/</schemaDirectory>\n\
      <outputDirectory>${project.basedir}/src/main/java</outputDirectory>\n    <clearOutputDir>false</clearOutputDir>\n\
    </configuration>\n</plugin>\n```\n\n此配置会读取 `src/main/resources` 目录及其子文件夹中的所有 XSD\
  \ 模式文件。关键要知道，它会选取指定目录结构中存在的所有 XSD 文件，并将 XSD 类型/元素转换为 Java POJO。因此，POJO 类的数量取决于定义的\
  \ XSD 类型/元素数量。如果一个文件有五个 XSD 类型，则会为这些类型生成五个 POJO 类。如果发生任何名称冲突，转换将失败。\n\n当我们使用 Maven\
  \ 目标运行此配置时，JAXB POJO 将基于 XSD 模式生成到 `src/main/java` 文件夹中：\n\n```\n> clean install\n\
  ```\n\n生成的包结构遵循 XSD 模式的命名空间。在我们的例子中，它是 `localhost._10301._0301_ws_xmlconfig_service`。这些\
  \ POJO 基本上代表了 Web 服务的领域模型。对于清单 3-5 中的 XSD 模式，创建了三个类：\n\n*   `UserRequest`\n*   `UserDetailsReponse`\n\
  *   `ObjectFactory`\n\n前两个类显然代表了契约中的 XSD 元素。它们包含子元素的 getter 和 setter 方法。最后一个类是一个用于创建契约元素的工厂。它可以用于创建从\
  \ XSD 元素或类型派生的 POJO 类的实例。根据 XSD 契约的不同，可能不需要它。清单 3-8 展示了生成的类及其 JAXB 2 注解。\n\n***清单\
  \ 3-8***. 生成的 JAXB 2 模型\n\n```\npackage localhost._10301._0301_ws_xmlconfig_service;\n\
  \nimport javax.xml.bind.annotation.XmlAccessType;\nimport javax.xml.bind.annotation.XmlAccessorType;\n\
  import javax.xml.bind.annotation.XmlAttribute;\nimport javax.xml.bind.annotation.XmlRootElement;\n\
  import javax.xml.bind.annotation.XmlType;\n\n@XmlAccessorType(XmlAccessType.FIELD)\n\
  @XmlType(name = \"\")\n@XmlRootElement(name = \"UserRequest\")\npublic class UserRequest\
  \ {\n    @XmlAttribute(name = \"Email\")\n    protected String email;\n\n/**\n    \
  \ * 获取 email 属性的值。\n     *\n     * @return\n     *     可能的返回对象是\n     *     {@link\
  \ String }\n     *\n     */\n    public String getEmail() {\n        return email;\n\
      }\n\n/**\n     * 设置 email 属性的值。\n     *\n     * @param value\n     *     允许的对象是\n\
       *     {@link String }\n     *\n     */\n    public void setEmail(String value)\
  \ {\n        this.email = value;\n    }\n}\n\npackage localhost._10301._0301_ws_xmlconfig_service;\n\
  \nimport javax.xml.bind.annotation.XmlAccessType;\nimport javax.xml.bind.annotation.XmlAccessorType;\n\
  import javax.xml.bind.annotation.XmlElement;\nimport javax.xml.bind.annotation.XmlRootElement;\n\
  import javax.xml.bind.annotation.XmlSchemaType;\nimport javax.xml.bind.annotation.XmlType;\n\
  import javax.xml.bind.annotation.adapters.CollapsedStringAdapter;\nimport javax.xml.bind.annotation.adapters.XmlJavaTypeAdapter;\n\
  \n@XmlAccessorType(XmlAccessType.FIELD)\n@XmlType(name = \"\", propOrder = {\n    \"\
  firstName\",\n    \"lastName\"\n})\n@XmlRootElement(name = \"UserDetailsResponse\"\
  )\npublic class UserDetailsResponse {\n    @XmlElement(name = \"FirstName\", required\
  \ = true)\n    @XmlJavaTypeAdapter(CollapsedStringAdapter.class)\n    @XmlSchemaType(name\
  \ = \"NCName\")\n    protected String firstName;\n    @XmlElement(name = \"LastName\"\
  , required = true)\n    @XmlJavaTypeAdapter(CollapsedStringAdapter.class)\n    @XmlSchemaType(name\
  \ = \"NCName\")\n    protected String lastName;\n\n/**\n     * 获取 firstName 属性的值。\n\
       *\n     * @return\n     *     可能的返回对象是\n     *     {@link String }\n     *\n\
       */\n    public String getFirstName() {\n        return firstName;\n    }\n\n\
  /**\n     * 设置 firstName 属性的值。\n     *\n     * @param value\n     *     允许的对象是\n\
       *     {@link String }\n     *\n     */\n    public void setFirstName(String\
  \ value) {\n        this.firstName = value;\n    }\n\n/**\n     * 获取 lastName 属性的值。\n\
       *\n     * @return\n     *     可能的返回对象是\n     *     {@link String }\n     *\n\
       */\n    public String getLastName() {\n        return lastName;\n    }\n\n\
  /**\n     * 设置 lastName 属性的值。\n     *\n     * @param value\n     *     允许的对象是\n\
       *     {@link String }\n     *\n     */\n    public void setLastName(String\
  \ value) {\n        this.lastName = value;\n    }\n}\npackage localhost._10301._0301_ws_xmlconfig_service;\n\
  \nimport javax.xml.bind.annotation.XmlRegistry;\n\n@XmlRegistry\npublic class ObjectFactory\
  \ {\n\n/**\n     * 创建一个新的 ObjectFactory，可用于为包 localhost._10301._0301_ws_xmlconfig_service\
  \ 创建模式派生类的新实例。\n     *\n     */\n    public ObjectFactory() {\n    }\n\n/**\n    \
  \ * 创建 {@link UserDetailsResponse } 的实例。\n     *\n     */\n    public UserDetailsResponse\
  \ createUserDetailsResponse() {\n        return new UserDetailsResponse();\n    }\n\
       /**\n     * 创建 {@link UserRequest } 的实例。\n     *\n     */\n    public UserRequest\
  \ createUserRequest() {\n        return new UserRequest();\n    }\n}\n```\n\n请记住，此代码是从\
  \ XSD 契约生成的。因此，当契约发生更改时，JAXB 2 模型会重新生成。对 POJO 字段名称或类型的任何更改都可能在使用这些字段的代码中触发 Java\
  \ 编译器问题。这种用于创建 Web 服务的“契约优先”方法的有用行为利用了 Java 类型安全特性的优势。如果 XSD 契约是从 Java 模型生成的，那么在开发过程中可能会遗漏更改。而且众所周知，问题发现得越早，造成的损失就越小。\n\
  \n`ObjectFactory` 类是一个用于所有其他相关类型的工厂。在早期版本的 JAXB 中，它被广泛用于创建模型实例。但在 JAXB 2 的最新版本中，此类的作用有限，因为现在可以使用\
  \ POJO 构造函数来创建模型实例。根据 XSD 模式的复杂程度，可能仍需要 `ObjectFactory`。如果你注意到生成的 `ObjectFactory`\
  \ 包含返回 `JAXBElement<T>` 类型的工厂方法，那么你的模式可能无法直接映射到 Java 类层次结构。另一种可能性是你的 XSD 约束无法通过\
  \ Java 类型系统来表达。在这种情况下，你可能需要以 `JAXBElement<T>` 类型的形式创建一个元结构。但这种情况很少见。\n\n\n\n`UserRequest`\
  \ 和 `UserDetailResponse` 是将在 Web 服务逻辑中使用的领域模型类型。清单 3-9 展示了一个在方法签名中使用生成类型的端点映射示例。\n\
  \n***清单 3-9***. 端点根映射 (0301-ws-xmlconfig-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server;\n\
  \nimport localhost._10301._0301_ws_xmlconfig_service.UserDetailsResponse;\nimport\
  \ localhost._10301._0301_ws_xmlconfig_service.UserRequest;\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
  import org.springframework.ws.server.endpoint.annotation.PayloadRoot;\nimport org.springframework.ws.server.endpoint.annotation.RequestPayload;\n\
  import org.springframework.ws.server.endpoint.annotation.ResponsePayload;\n\n@Endpoint\n\
  public class UserEndpoint {\n  @PayloadRoot(namespace = \"http://localhost:10301/0301-ws-xmlconfig-service\"\
  ,\n        localPart = \"UserRequest\")\n  @ResponsePayload\n  public UserDetailsResponse\
  \ getUserDetails(\n      @RequestPayload UserRequest userRequest) {\n    UserDetailsResponse\
  \ userDetails = null;\n    if (\"lubos.krnac@gmail.com\".equals(userRequest.getEmail()))\
  \ {\n      userDetails = new UserDetailsResponse();\n      userDetails.setFirstName(\"\
  Lubos\");\n      userDetails.setLastName(\"Krnac\");\n    }\n    return userDetails;\n\
    }\n}\n```\n\n开发者可以利用 Spring Web Services 绑定机制的灵活性，并通过参数对其进行调整。\n\nSpring 还可以将消息的元数据注入到我们的\
  \ Web 服务方法中——例如，SOAP 头或消息上下文。消息上下文包含服务当前请求中涉及的所有数据：\n\n*   请求\n*   响应\n*   属性，可用于与拦截器和端点通信\n\
  \n假设我们现在想要读取 SOAP 头 `role`，并在 Web 服务逻辑中使用消息上下文。清单 3-10 反映了这一需求。\n\n***清单 3-10***.\
  \ 有效负载根端点映射变体示例\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server;\n\
  \nimport localhost._10301._0301_ws_xmlconfig_service.UserDetailsResponse;\nimport\
  \ localhost._10301._0301_ws_xmlconfig_service.UserRequest;\nimport org.springframework.ws.context.MessageContext;\n\
  import org.springframework.ws.server.endpoint.annotation.Endpoint;\nimport org.springframework.ws.server.endpoint.annotation.PayloadRoot;\n\
  import org.springframework.ws.server.endpoint.annotation.RequestPayload;\nimport\
  \ org.springframework.ws.server.endpoint.annotation.ResponsePayload;\nimport org.springframework.ws.soap.SoapHeaderElement;\n\
  import org.springframework.ws.soap.server.endpoint.annotation.SoapHeader;\n\n@Endpoint\n\
  public class UserEndpoint {\n  @PayloadRoot(namespace = \"http://localhost:10301/0301-ws-xmlconfig-service\"\
  , localPart = \"UserRequest\")\n  @ResponsePayload\n  public UserDetailsResponse\
  \ getUserDetails(\n      @RequestPayload UserRequest userRequest, @SoapHeader(\"\
  role\") SoapHeaderElement role, MessageContext messageContext) {\n          ...\n\
        }\n    return userDetails;\n  }\n}\n```\n\n基于根 XML 元素（`@PayloadRoot`）的路由 SOAP\
  \ 消息是最常见的。但路由也可以基于 WS-Addressing（`@Action`）或 `SOAPAction` 头（`@SoapAction`）。清单 3-11\
  \ 展示了一个 `SOAPAction` 路由示例。WS-Addressing 与之类似。\n\n***清单 3-11***. SOAPAction 端点映射\
  \ (0307-ws-soapaction-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.soapaction.server;\n\
  \nimport localhost._10307._0307_ws_soapaction_service.UserDetailsResponse;\nimport\
  \ localhost._10307._0307_ws_soapaction_service.UserRequest;\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
  import org.springframework.ws.server.endpoint.annotation.RequestPayload;\nimport\
  \ org.springframework.ws.server.endpoint.annotation.ResponsePayload;\nimport org.springframework.ws.soap.server.endpoint.annotation.SoapAction;\n\
  \n@Endpoint\npublic class UserEndpoint {\n  @SoapAction(\"getUserDetails\")\n  @ResponsePayload\n\
    public UserDetailsResponse getUserDetails(\n      @RequestPayload UserRequest\
  \ userRequest) {\n    UserDetailsResponse userDetails = null;\n    if (\"lubos.krnac@gmail.com\"\
  .equals(userRequest.getEmail())) {\n      userDetails = new UserDetailsResponse();\n\
        userDetails.setFirstName(\"Lubos\");\n      userDetails.setLastName(\"Krnac\"\
  );\n    }\n    return userDetails;\n  }\n}\n```\n\nSpring 上下文配置\n\n上一节重点介绍了如何通过\
  \ Spring Web Services 框架将 XSD 契约映射到 Java 逻辑。使用 `@Endpoint` 注解的类是 Spring 组件扫描的候选对象。因此，该类可以被视为一个\
  \ Spring 组件。有多种选项可将其集成到 Spring 的 IoC 容器中。\n\n第一种选择是使用 清单 3-12 中所示的 Spring XML 配置。\n\
  \n***清单 3-12***. Web 服务 XML 上下文配置（示例项目 0301-ws-xmlconfig-service 中的文件 web-service-config.xml）\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xmlns:ws=\"http://www.springframework.org/schema/web-services\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/web-services\n        http://www.springframework.org/schema/web-services/web-services.xsd\n\
          http://www.springframework.org/schema/beans\n        http://www.springframework.org/schema/beans/spring-beans.xsd\n\
          http://www.springframework.org/schema/context\n        http://www.springframework.org/schema/context/spring-context.xsd\"\
  >\n\n<context:component-scan\n        base-package=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server\"\
  \ />\n\n<ws:annotation-driven />\n\n<ws:dynamic-wsdl id=\"userDetails\" portTypeName=\"\
  UserDetailsPort\"\n    locationUri=\"/\"\n    targetNamespace=\"http://localhost:10301/0301-ws-xmlconfig-service\"\
  >\n    <ws:xsd location=\"classpath:userDetailsSchema.xsd\" />\n  </ws:dynamic-wsdl>\n\
  </beans>\n```\n\n此配置使用了 Spring XML 模式集中的三个命名空间：\n\n*   `web-services`：用于 Web 服务配置\n\
  *   `beans`：基本的 Spring IoC 命名空间\n*   `context`：用于组件扫描\n\nXML 元素 `<context:component-scan>`\
  \ 扫描在 清单 3-9 中定义的端点。`<ws:annotation-driven>` 配置告诉 Spring 我们想要使用 Web 服务注解。最后一个元素是最有趣的：`<ws:dynamic-wsdl>`\
  \ 用于基于类路径中的 XSD 契约文件动态生成 WSDL。Spring 会扫描类路径以查找指定的 XSD 模式文件。由于我们在这些示例中使用了 Maven，`userDetailsSchema.xsd`\
  \ 位于 `src/main/resources` 文件夹中。`locationUri` 指定了提供生成的 WSDL 的 URL 端点。我们使用了根级位置来暴露\
  \ WSDL。参数 `id` 指定了 WSDL 文件的暴露名称。因此，当我们在 `localhost` 和端口 10301 上运行服务器时，最终的 WSDL 位置将是\
  \ `http://localhost:10301/0301-ws-xmlconfig-service/userDetails.wsdl`。\n\n\n\n在\
  \ Web 服务的开发阶段，由于需求可能频繁变化，动态 WSDL 生成非常有用。但在生产环境中，我们需要确保与 Web 服务的交互是稳定的。由于生成算法有时会引入细微变化，因此在生产环境中使用静态\
  \ WSDL（而非动态生成）是一种良好的实践。此配置如清单 3-13 所示。\n\n***清单 3-13***. 使用静态 WSDL 暴露的 Web 服务 XML\
  \ 上下文配置（示例项目 0301-ws-xmlconfig-service 中的文件 web-service-config.xml）\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xmlns:ws=\"http://www.springframework.org/schema/web-services\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/web-services\n    http://www.springframework.org/schema/web-services/web-services.xsd\n\
                  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
                  http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\"\
  >\n\n<context:component-scan base-package=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server\"\
  \ />\n\n<ws:annotation-driven />\n\n<ws:static-wsdl id=\"userDetails\" location=\"\
  classpath:userDetailsSchema.wsdl\"/>\n</beans>\n```\n\nXML 元素 `<ws:static-wsdl>`\
  \ 用于静态 WSDL 暴露。其前提条件是项目中存在一个 WSDL 文件。在此例中，文件 `userDetailsSchema.wsdl` 应位于类路径下。由于我们使用的是\
  \ Maven 构建系统，该具体文件位于 `src/main/resources` 目录。参数 `id` 对于暴露的 WSDL 的最终名称至关重要。在此例中，其值为\
  \ `userDetails`。因此，如果我们在 `localhost` 的 10301 端口上运行服务器，最终的 WSDL 位置将再次是 `http://localhost:10301/0301-ws-xmlconfig-service/userDetails.wsdl`。\n\
  \n由于现在更倾向于使用可维护性更高的 Java Spring 配置，这种 XML 配置方式已逐渐不那么重要。相应的 Java 配置如清单 3-14 所示。\n\
  \n***清单 3-14***. Web 服务 Java 上下文配置（0302-ws-javaconfig-service）\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.javaconfig.server;\n\
  \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.ws.config.annotation.EnableWs;\nimport org.springframework.ws.wsdl.wsdl11.DefaultWsdl11Definition;\n\
  import org.springframework.xml.xsd.SimpleXsdSchema;\nimport org.springframework.xml.xsd.XsdSchema;\n\
  \n@EnableWs\n@ComponentScan\n@Configuration\npublic class ServerConfiguration {\n\
    public static final String NAMESPACE =\n      \"http://localhost:10302/0302-ws-javaconfig-service\"\
  ;\n\n@Bean\n  public DefaultWsdl11Definition userDetails(XsdSchema userDetailsSchema)\
  \ {\n    DefaultWsdl11Definition wsdlDefinition = new DefaultWsdl11Definition();\n\
      wsdlDefinition.setTargetNamespace(NAMESPACE);\n    wsdlDefinition.setSchema(userDetailsSchema);\n\
      wsdlDefinition.setPortTypeName(\"UserDetailsPort\");\n    wsdlDefinition.setLocationUri(\"\
  /\");\n    return wsdlDefinition;\n  }\n\n@Bean\n  public XsdSchema userDetailsSchema()\
  \ {\n    return new SimpleXsdSchema(new ClassPathResource(\"userDetailsSchema.xsd\"\
  ));\n  }\n}\n```\n\n该类使用了标准的 `@Configuration` 注解，该注解用于 Java Spring 配置，框架会扫描当前包及其子包以查找\
  \ Spring 组件。当通过 `@EnableWs` 启用 Web 服务时（`@EnableWs` 是 XML 元素 `<ws:annotation-driven>`\
  \ 的 Java 注解替代品），此扫描将拾取 `@Endpoint`。由 `userDetails` 方法注册的 Bean 促进了动态 WSDL 的创建。这里我们注入了由\
  \ `userDetailSchema` 方法注册的 XSD Bean。实际上，清单 3-14 是清单 3-12 中 XML 配置的精确镜像。唯一的区别是命名空间，因为它位于不同的示例项目中。\n\
  \n使用 Java 配置进行静态 WSDL 暴露的方法如清单 3-15 所示。\n\n***清单 3-15***. 使用静态 WSDL 暴露的 Web 服务 Java\
  \ 上下文配置（0302-ws-javaconfig-service）\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.javaconfig.server;\n\
  \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.ws.config.annotation.EnableWs;\nimport org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;\n\
  \n@EnableWs\n@ComponentScan\n@Configuration\npublic class ServerConfiguration {\n\
    public static final String NAMESPACE =\n      \"http://localhost:10302/0302-ws-javaconfig-service\"\
  ;\n\n@Bean\n  public SimpleWsdl11Definition userDetails() {\n    return new SimpleWsdl11Definition(new\
  \ ClassPathResource(\n        \"userDetailsSchema.wsdl\"));\n  }\n}\n```\n\n传输层\n\
  \n有多种方式可以为 Spring Web 服务配置传输层。每种传输协议都需要注册特定的 Spring 抽象。\n\nHTTP/HTTPS\n\n首先，是 Servlet\
  \ 容器：\n\n*   `MessageDispatcherServlet`：这是最简单且最常用的机制。\n*   `DispatcherServlet`：当我们需要在\
  \ REST 或 Spring MVC 端点之外同时提供 SOAP 端点时，此 Servlet 非常有用。`WebServiceMessageReceiverHandlerAdapter`\
  \ 和 `RequestMappingHandlerAdapter` 在 Web 服务端点和 `DispatcherServlet` 之间建立了一座桥梁。\n\n\
  另外，还有简单的 HTTP 服务器，其接收器如下：\n\n*   `SoapMessageDispatcher`\n*   `SimpleHttpServerFactoryBean`\n\
  *   `SoapMessageDispatcher`\n\nJMS\n\n使用 JMS 时，我们使用以下组件：\n\n*   `SoapMessageDispatcher`\n\
  *   `ActiveMQConnectionFactory`\n*   `DefaultMessageListenerContainer`\n\n电子邮件\n\
  \n使用电子邮件时，我们使用以下组件：\n\n*   `SoapMessageDispatcher`\n*   `MailMessageReceiver`\n\n\
  XMPP\n\n使用 XMPP 时，我们使用以下组件：\n\n*   `SoapMessageDispatcher`\n*   `XmppConnectionFactoryBean`\n\
  *   `XmppMessageReceiver`\n\n正如你可能注意到的，对于非 Servlet 传输，有一些常见的 Bean 类型：\n\n*   消息工厂\n\
  *   消息分发器\n*   消息接收器\n*   连接工厂（XMPP、JMS）\n\n![Image](img/sq.jpg) **注意**  非 Servlet\
  \ 传输配置的详细信息不在 Spring 企业集成认证的考察范围内。因此，我们只关注 `MessageDispatcherServlet`。关于非 Servlet\
  \ Web 服务传输的配置信息，可以在 Spring Web 服务参考文档中找到。\n\nServlet 传输\n\n请记住，`MessageDispatcherServlet`\
  \ 和 `DispatcherServlet` 是不同的 Servlet 实现。一个服务于 SOAP 端点，另一个服务于 MVC 或 REST 端点。在 Spring\
  \ 应用程序中配置 `MessageDispatcherServlet` 可以通过多种方式完成。如今的 Spring 框架和 Spring Boot 项目提供了各种\
  \ Servlet 描述符包装器，以简化 Web 容器配置。清单 3-16 展示了 `web.xml` 文件中经典的基于 XML 的 Servlet 描述符配置。\n\
  \n\n\n***清单 3-16***. 使用 MessageDispatcherServlet 的 XML Servlet 描述符配置 (0301-ws-xmlconfig-client)\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns=\"http://xmlns.jcp.org/xml/ns/javaee\"\n  xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n\
      http://java.sun.com/xml/ns/javaee/web-app.xsd\">\n  <display-name>0301-ws-xmlconfig-service</display-name>\n\
    <servlet>\n    <servlet-name>web-service</servlet-name>\n    <servlet-class>org.springframework.ws.transport.http.MessageDispatcherServlet\n\
      </servlet-class>\n    <init-param>\n      <param-name>contextConfigLocation</param-name>\n\
        <param-value>classpath:web-service-config.xml</param-value>\n    </init-param>\n\
      <init-param>\n      <param-name>transformWsdlLocations</param-name>\n      <param-value>true</param-value>\n\
      </init-param>\n    <load-on-startup>1</load-on-startup>\n  </servlet>\n  <servlet-mapping>\n\
      <servlet-name>web-service</servlet-name>\n    <url-pattern>/*</url-pattern>\n\
    </servlet-mapping>\n</web-app>\n```\n\n这个 Servlet 配置相当常见。`MessageDispatcherServlet`\
  \ 被用作 Servlet 类。如果我们没有指定 `contextConfigurationLocation` 参数，Spring 会尝试在文件 `{servlet-name}-servlet.xml`\
  \ 中查找 Spring 配置。但在这个例子中，我们使用了显式方法，从类路径（位于 `src/main/resources` 目录）加载 `web-service-config.xml`\
  \ 上下文配置。\n\n参数 `transformWsdlLocations` 默认值为 `false`。如果设为 `true`，Spring 会将 WSDL\
  \ 中的 `location` 元素视为相对地址，并根据从客户端接收到的 URL 来转换 WSDL 的 `location` 元素。因此，默认情况下 Spring\
  \ 不会进行此转换，WSDL 的 `location` 元素是硬编码的。但硬编码不适合专业的软件开发，因为同一个应用程序工件会被部署到不同的环境（例如开发、QA、性能和生产环境）。所以，我们几乎总是希望将\
  \ `transformWsdlLocations` 配置为 `true`。\n\n清单 3-16 包含了 Servlet 配置中剩余的两个元素。`load-on-startup`\
  \ 配置告诉 Servlet 容器，我们不希望使用延迟初始化特性。因此，我们的 Servlet 会在 Servlet 容器启动时被初始化。否则，Servlet\
  \ 会在第一个请求到达时才被初始化。最后，`servlet-mapping` 元素指定了 Servlet 的相对根 URL。\n\n在 Java 世界中，正发生着从\
  \ XML 配置向注解配置的重大转变。Spring Web Services 项目在这方面也不例外。对 Servlet 3.0 Java 配置的增强支持是在 2.2\
  \ 版本中引入的。\n\n清单 3-17 中的示例与清单 3-16 中的 `web.xml` 配置具有类似的效果。\n\n***清单 3-17***. 使用 MessageDispatcherServlet\
  \ 的 Java Servlet 描述符配置 (0302-ws-javaconfig-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.javaconfig.server;\n\
  \nimport org.springframework.ws.transport.http.support.\n         AbstractAnnotationConfigMessageDispatcherServletInitializer;\n\
  \npublic class WsServletinitializer extends\n  AbstractAnnotationConfigMessageDispatcherServletInitializer\
  \ {\n\n@Override\n  protected Class<?>[] getRootConfigClasses() {\n    return null;\n\
    }\n\n@Override\n  protected Class<?>[] getServletConfigClasses() {\n    return\
  \ new Class[] { ServerConfiguration.class };\n  }\n  @Override\n  protected String[]\
  \ getServletMappings() {\n    return new String[] { \"/*\" };\n  }\n}\n```\n\n`AbstractAnnotationConfigMessageDispatcherServletInitializer`\
  \ 类是 `WebApplicationInitializer` 的一个抽象实现，后者是在 Spring 世界中帮助进行程序化 Servlet 配置的接口。如果类路径中存在\
  \ Servlet 容器，Spring 会自动查找 `WebApplicationInitializer` 的实现。\n\n当在类路径中检测到 `AbstractAnnotationConfigMessageDispatcherServletInitializer`\
  \ 的实现时，Spring 会在底层配置 `MessageDispatcherServlet`。Spring Servlet 上下文配置在 `ServerConfiguration`\
  \ 类中定义，该类使用 `@Configuration` 注解来定义基于 Java 的 Spring 上下文。对于这个示例，我们不需要根 Spring 上下文，因此可以从\
  \ `getRootConfigClasses()` 返回 `null`。这个 Servlet 配置的最后一部分是 Servlet URL 映射，它定义了 Servlet\
  \ 所在的相对地址。但默认的 `AbstractAnnotationConfigMessageDispatcherServletInitializer` 使用在其某个\
  \ Servlet 初始化器父类中定义的 `/services` 值。我们的示例使用了 `/*`。\n\n清单 3-17 突出展示了 Spring Web Services\
  \ Servlet 配置的一种相对较新的方法。但由 Spring Boot 项目引入的一种更现代的方法如清单 3-18 所示。\n\n***清单 3-18***.\
  \ 使用 Spring Boot 进行 Servlet 注册 (0303-ws-boot-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.boot.server;\n\
  \nimport org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport\
  \ org.springframework.boot.context.embedded.ServletRegistrationBean;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.ws.config.annotation.EnableWs;\nimport org.springframework.ws.transport.http.MessageDispatcherServlet;\n\
  import org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;\n\n@EnableWs\n\
  @Configuration\n@ComponentScan\n@EnableAutoConfiguration\npublic class ServerConfiguration\
  \ {\n  public static final String NAMESPACE =\n      \"http://localhost:10303/0303-ws-boot-service\"\
  ;\n\n@Bean\n  public SimpleWsdl11Definition userDetails() {\n    return new SimpleWsdl11Definition(new\
  \ ClassPathResource(\"userDetails.wsdl\"));\n  }\n\n@Bean\n  public ServletRegistrationBean\
  \ dispatcherServlet(\n      ApplicationContext applicationContext) {\n    MessageDispatcherServlet\
  \ servlet = new MessageDispatcherServlet();\n    servlet.setApplicationContext(applicationContext);\n\
      servlet.setTransformWsdlLocations(true);\n    return new ServletRegistrationBean(servlet,\
  \ \"/*\");\n  }\n}\n```\n\n`@ComponentScan` 和 `@Configuration` 注解应该已经很熟悉了。这个 Spring\
  \ 配置类会扫描当前包及其子包以查找 Spring 组件。`@EnableWs` 用于启用 Spring Web Services 支持。\n\n另一个注解是\
  \ `@EnableAutoConfiguration`。它只有一行，但其影响非常大。Spring Boot 会查看应用程序使用的依赖项集合，并据此猜测所需的\
  \ Spring 配置。它会开箱即用地创建一些默认的 Bean。在这个例子中，我们需要它来自动配置嵌入式 Servlet 容器。\n\n\n\n这一新机制的关键类是\
  \ `ServletRegistrationBean`，它实际上是 Servlet 配置的包装器。因此，当它被注册到 Spring 容器中时，Spring 会将包装后的\
  \ Servlet 注册到 Servlet 容器中。该 API 的效果是，开发者感觉 Servlet 配置是被注册到 Spring 上下文中，而不是反过来。从\
  \ API 的角度来看，它颠覆了 Servlet 容器与 Spring 上下文之间的集成机制。在清单 3-18 中，`MessageDispatcherServlet`\
  \ 是我们期望的 Servlet 实现。这个概念的一个重要方面是，我们需要配置 `applicationContext` 属性。在这种情况下，我们使用由 Spring\
  \ 注入的应用程序上下文，这实际上就是注册该 Bean 的上下文。\n\n当我们颠覆了 Spring/Servlet 配置后，可以将此 Bean 与提供 Web\
  \ 服务所需的其他 Bean 一起注册。清单 3-18 展示了最简洁的 Spring Web Services 配置，该配置使用了静态 WSDL 暴露（如前所述）。\n\
  \n**Web 服务客户端**\n\n前面几节的重点是暴露 Spring Web Services。Spring 也支持消费 Web 服务。这种客户端开发方法同样侧重于契约优先。同样，无需手动创建客户端\
  \ Java 模型。\n\nSpring 在客户端首选的 XML 编组器是 JAXB 2，与服务器端相同。由于我们的示例基于 Maven 构建系统，清单 3-19\
  \ 展示了如何从位于远程服务器上的 WSDL 生成 JAXB 2 模型类。\n\n***清单 3-19***. 从远程 WSDL 生成客户端模型（示例项目 0301-ws-xmlconfig-client\
  \ 中的 pom.xml 文件）\n\n```\n<plugin>\n  <groupId>org.jvnet.jaxb2.maven2</groupId>\n\
    <artifactId>maven-jaxb2-plugin</artifactId>\n  <version>0.12.3</version>\n  <executions>\n\
      <execution>\n      <goals>\n        <goal>generate</goal>\n      </goals>\n\
      </execution>\n  </executions>\n  <configuration>\n    <generatePackage>net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model</generatePackage>\n\
      <schemas>\n      <schema>\n        <url>http://localhost:10301/0301-ws-xmlconfig-service/wsdl/userDetails.wsdl</url>\n\
        </schema>\n    </schemas>\n  </configuration>\n</plugin>\n```\n\n`maven-jax2b-plugin`\
  \ 被挂接到 Maven 的 `generate` 目标上，该目标是默认生命周期阶段的一部分。生成类的目标包由插件配置中的 `generatePackage`\
  \ 元素指定。此生成过程依赖于可在 `http://localhost:10301/0301-ws-xmlconfig-service/wsdl/userDetails.wsdl`\
  \ 访问的模式。因此，当目标 Web 服务已经上线时，这会非常方便。\n\n但是，当我们与客户端消费者同时开发 Web 服务时，WSDL 不一定在线。当我们希望将构建作为持续集成/交付/部署管道的一部分进行自动化时，不存在的远程模式会导致问题。因此，也可以选择使用本地\
  \ WSDL 文件，如清单 3-20 所示。\n\n***清单 3-20***. 从本地 WSDL 文件生成客户端模型\n\n```\n<plugin>\n  <groupId>org.jvnet.jaxb2.maven2</groupId>\n\
    <artifactId>maven-jaxb2-plugin</artifactId>\n  <version>0.12.3</version>\n  <executions>\n\
      <execution>\n      <goals>\n        <goal>generate</goal>\n      </goals>\n\
      </execution>\n  </executions>\n  <configuration>\n    <generatePackage>net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model</generatePackage>\n\
      <schemas>\n      <schema>\n        <fileset>\n          <directory>${basedir}/src/main/schemas</directory>\n\
            <includes>\n            <include>userDetails.wsdl</include>\n          </includes>\n\
          </fileset>\n      </schema>\n    </schemas>\n  </configuration>\n</plugin>\n\
  ```\n\n模型类被生成到包 `net.lkrnac.book.eiws.chapter``03``.ws.xmlconfig.model` 中。它们基于位于文件\
  \ `userDetails.wsdl` 和目录 `src/main/schemas` 中的 WSDL 模式生成。客户端模型看起来就像清单 3-8 中服务器端生成的类一样。与服务器端模型生成类似，我们在客户端也利用了类型安全的\
  \ Java 特性。很明显，客户端/服务器接口最重要的部分是一个 XSD/WSDL 契约，双方模型都基于此契约生成。\n\nSpring Web Services\
  \ 客户端支持的核心类是 `WebServiceTemplate`。它涵盖了许多职责：\n\n*   发送和接收消息\n*   调用编组器/解组器来转换消息\n\
  *   可配置为拦截消息\n*   可配置为将服务器端生成的错误转换为客户端运行时异常\n\n除了 SOAP，`WebServiceTemplate` 还可以处理纯旧\
  \ XML 负载，并且可以在与服务器相同的传输协议上运行：HTTP、电子邮件、JMS 和 XMPP。与服务器端传输 Spring Web Services 支持类似，客户端也为每种协议提供了一组\
  \ Bean 包装器。核心接口是 `WebServiceMessageSender`，它定义了每种协议的消息发送器实现：\n\n*   HTTP\n    *\
  \   HTTP 协议的默认配置——`HttpUrlConnectionMessageSender`\n    *   Apache HttpComponents——`HttpComponentsMessageSender`\n\
  *   JMS——`JmsMessage``Sender` 和 JMS 消息工厂（例如，`ActiveMQConnectionFactory`）\n*   电子邮件——`MailMessageSender`\n\
  *   XMPP——`XmppMessageSender` 和 `XmppConnectionFactoryBean`\n\n这些可以直接通过 Java 构造函数创建，并且有三个必填字段：`defaultUri`、`marshaller`\
  \ 和 `unmarshaller`。\n\n在我们的示例中，我们将重点放在 HTTP 上，这是 Web 服务最常用的协议。首先，清单 3-21 中的客户端 Spring\
  \ 上下文配置示例展示了 XML 配置。\n\n***清单 3-21***. Spring Web Services 客户端配置的 XML 配置（示例项目 0301-ws-xmlconfig-client\
  \ 中的 ws-client-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  <beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\"\
  >\n\n<context:component-scan\n    base-package=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.client\"\
  />\n\n<bean id=\"marshaller\" class=\"org.springframework.oxm.jaxb.Jaxb2Marshaller\"\
  >\n    <property name=\"contextPath\"\n      value=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model\"\
  />\n  </bean>\n\n<bean id=\"webServiceTemplate\"\n      class=\"org.springframework.ws.client.core.WebServiceTemplate\"\
  >\n    <property name=\"marshaller\" ref=\"marshaller\"/>\n    <property name=\"\
  unmarshaller\" ref=\"marshaller\"/>\n    <property name=\"defaultUri\"\n      value=\"\
  http://localhost:10301/0301-ws-xmlconfig-service\"/>\n  </bean>\n</beans>\n```\n\
  \n\n\n这里我们使用了两个 Spring XML 命名空间：`context` 和 `beans`。`Context` 用于对包 `net.lkrnac.book.eiws.chapter``03``.ws.xmlconfig.client`\
  \ 中的 bean 进行组件扫描，该 bean 使用了 `WebServiceTemplate`。Web 服务消费需要两个 bean。其中一个 bean 是我们熟悉的\
  \ `webServiceTemplate`。它需要指定 `defaultUri` 属性，该属性正是 Web 服务的主机地址。`WebServiceTemplate`\
  \ 的另外两个必需属性是 `marshaller` 和 `unmarshaller`。这两个属性都由 `marshaller` bean 提供。它被注册为一个独立的\
  \ bean，用于 XML 到 Java POJO 的转换。从之前的 POJO 生成中我们可以观察到，JAXB 2 是我们选择的编组器（实现类是 `Jaxb2Marshaller`）。\n\
  \n用 Java 编写的几乎相同的配置如清单 3-22 所示。唯一的区别是 Web 服务 URI 和编组器上下文路径。\n\n***清单 3-22***. Spring\
  \ Web 服务客户端的 Java 配置 (0302-ws-javaconfig-client)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.javaconfig.client;\n\
  \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.oxm.jaxb.Jaxb2Marshaller;\n\
  import org.springframework.ws.client.core.WebServiceTemplate;\n\n@Configuration\n\
  @ComponentScan\npublic class WsClientConfiguration {\n  @Bean\n  public Jaxb2Marshaller\
  \ marshaller() {\n    Jaxb2Marshaller marshaller = new Jaxb2Marshaller();\n    marshaller\n\
          .setContextPath(\"net.lkrnac.book.eiws.chapter03.ws.javaconfig.model\");\n\
      return marshaller;\n  }\n\n@Bean\n  public WebServiceTemplate webServiceTemplate(Jaxb2Marshaller\
  \ marshaller) {\n    WebServiceTemplate webServiceTemplate = new WebServiceTemplate();\n\
      webServiceTemplate.setMarshaller(marshaller);\n    webServiceTemplate.setUnmarshaller(marshaller);\n\
      webServiceTemplate\n        .setDefaultUri(\"http://localhost:10302/0302-ws-javaconfig-service\"\
  );\n    return webServiceTemplate;\n  }\n}\n```\n\n这个示例是 Spring 对 Web 服务的默认客户端支持。`WebServiceTemplate`\
  \ 在底层使用了 `HttpUrlConnectionMessageSender` bean。这个 bean 由 Spring 自动创建，并使用来自 `java.net`\
  \ 包的标准 Java SE HTTP 客户端实现。但某些高级用例可能会迫使你使用 Apache HttpComponents 项目进行客户端 HTTP 访问。Apache\
  \ HttpComponents 的附加功能如下：\n\n*   客户端身份验证\n*   HTTP 状态管理\n*   HTTP 连接池\n\n清单 3-23\
  \ 展示了一个 Apache HttpComponents 客户端的示例。\n\n***清单 3-23***. 使用 HttpComponents 的 Spring\
  \ Web 服务客户端配置 (0303-ws-boot-client)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.boot.client;\n\
  \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.oxm.jaxb.Jaxb2Marshaller;\n\
  import org.springframework.ws.client.core.WebServiceTemplate;\nimport org.springframework.ws.transport.http.HttpComponentsMessageSender;\n\
  \n@Configuration\n@ComponentScan\npublic class WsBootClientConfiguration {\n  @Bean\n\
    public Jaxb2Marshaller marshaller() {\n    Jaxb2Marshaller marshaller = new Jaxb2Marshaller();\n\
      marshaller.setContextPath(\"net.lkrnac.book.eiws.chapter03.ws.boot.model\");\n\
      return marshaller;\n```\n\n`}`\n\n```\n  @Bean\n  public WebServiceTemplate\
  \ webServiceTemplate(Jaxb2Marshaller marshaller) {\n    WebServiceTemplate webServiceTemplate\
  \ = new WebServiceTemplate();\n    webServiceTemplate.setMarshaller(marshaller);\n\
      webServiceTemplate.setUnmarshaller(marshaller);\n    webServiceTemplate\n        .setDefaultUri(\"\
  http://localhost:10303/0303-ws-boot-service\");\n\nHttpComponentsMessageSender messageSender\
  \ =\n        new HttpComponentsMessageSender();\n    messageSender.setConnectionTimeout(100);\n\
      messageSender.setMaxTotalConnections(10);\n    webServiceTemplate.setMessageSender(messageSender);\n\
      return webServiceTemplate;\n  }\n}\n```\n\nApache HttpComponents 的包装器（`HttpComponentsMessageSender`）需要作为\
  \ `messageSender` 属性配置到 `WebServiceTemplate` 中。对于非 HTTP 协议，注册特殊消息发送器的类似方法也同样适用。\n\
  \n现在你已经知道如何创建 `WebServiceTemplate`，让我们看看它在清单 3-24 中的使用。\n\n***清单 3-24***. 用于有效负载根路由的\
  \ WebServiceTemplate (0303-ws-boot-client)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.boot.client;\n\
  \nimport net.lkrnac.book.eiws.chapter03.ws.boot.model.UserDetailsResponse;\nimport\
  \ net.lkrnac.book.eiws.chapter03.ws.boot.model.UserRequest;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport org.springframework.ws.client.core.WebServiceTemplate;\n\
  \n@Component\npublic class WebServiceClient {\n  private WebServiceTemplate webServiceTemplate;\n\
  \n@Autowired\n  public WebServiceClient(WebServiceTemplate webServiceTemplate) {\n\
      this.webServiceTemplate = webServiceTemplate;\n  }\n\npublic UserDetailsResponse\
  \ getUserDetails(String email) {\n    UserRequest request = new UserRequest();\n\
      request.setEmail(email);\n\nUserDetailsResponse userDetails =\n        (UserDetailsResponse)\
  \ webServiceTemplate.marshalSendAndReceive(request);\n    return userDetails;\n\
    }\n}\n```\n\n方法 `getUserDetails` 使用注入的 `WebServiceTemplate`，通过 `marshalSendAndReceive`\
  \ 方法发送请求和接收响应 POJO。你可能会注意到，此方法有四个职责：编组消息、发送给客户端、等待响应以及解组消息。对于编组和解组，它使用我们在创建 `WebServiceTemplate`\
  \ 期间配置的编组器/解组器实例。请求和响应 POJO 是由清单 3-19 中的 `maven-jax2b-plugin` 生成的。\n\n如果我们需要使用自定义的编组算法，可以使用\
  \ `WebServiceTemplate` 的 `sendAndReceive` 方法。此方法发送消息并等待响应，将编组的职责留给调用方逻辑。\n\n清单 3-24\
  \ 涵盖了基于有效负载根 XML 元素的路由。如果是 `SOAPAction` 头部路由，我们需要指定目标 SOAP 动作。这在清单 3-25 中进行了强调。\n\
  \n***清单 3-25***. 用于 SOAP 动作路由的 WebServiceTemplate (0307-ws-soapaction-client)\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter03.ws.soapaction.client;\n\nimport net.lkrnac.book.eiws.chapter03.ws.soapaction.model.UserDetailsResponse;\n\
  import net.lkrnac.book.eiws.chapter03.ws.soapaction.model.UserRequest;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport org.springframework.ws.client.core.WebServiceTemplate;\n\
  import org.springframework.ws.soap.client.core.SoapActionCallback;\n\n@Component\n\
  public class WebServiceClient {\n  private WebServiceTemplate webServiceTemplate;\n\
  \nprivate static final SoapActionCallback messageCallback =\n      new SoapActionCallback(\"\
  getUserDetails\");\n\n@Autowired\n  public WebServiceClient(WebServiceTemplate webServiceTemplate)\
  \ {\n    this.webServiceTemplate = webServiceTemplate;\n  }\n\npublic UserDetailsResponse\
  \ getUserDetails(String email) {\n    UserRequest request = new UserRequest();\n\
      request.setEmail(email);\n\nUserDetailsResponse userDetails =\n        (UserDetailsResponse)\
  \ webServiceTemplate.marshalSendAndReceive(request,\n            messageCallback);\n\
      return userDetails;\n  }\n}\n```\n\n\n\n为了指定要在服务器上执行的 SOAP 操作，需要将带有操作名称的 `SoapActionCallback`\
  \ 传递给 `WebServiceTemplate`。如果使用 WS-Addressing，则应使用 `ActionCallback` 代替 `SoapActionCallback`。\n\
  \n拦截消息\n\n拦截消息是一种满足各种业务需求的强大机制。Spring 支持两种类型的拦截：\n\n*   服务器端拦截\n*   客户端拦截\n\n每种拦截都由不同的阶段组成。这些拦截接触点可以在客户端和服务器上进行配置（按以下顺序）：\n\
  \n1.  处理请求——发生在消息从客户端发送或服务器处理之前\n2.  处理响应——发生在服务器向客户端发送响应之前\n3.  处理故障——发生在服务器和客户端，但仅在\
  \ Web 服务逻辑出现错误时\n4.  完成后——通常用于释放资源，因为它会在所有情况下发生\n\n前三个拦截阶段可以通过返回 `false` 值来终止请求的进一步处理。`false`\
  \ 值表示处理链中出现问题，而 `true` 值表示拦截阶段成功。\n\n使用 Spring Web Services 项目的开发者可以利用现有的拦截器实现，或者创建自定义实现。\n\
  \n服务器端拦截\n\n服务器端拦截由接口 `org.springframework.ws.server.EndpointInterceptor` 涵盖。Spring\
  \ Web Services 提供了该接口的多种现成实现：\n\n*   日志记录拦截器——`PayloadLoggingInterceptor`、`SoapEnvelopeLoggingInterceptor`\n\
  *   负载处理拦截器——`PayloadValidatingInterceptor`、`PayloadTransformingInterceptor`\n*\
  \   安全拦截器——`XwsSecurityInterceptor`、`Wss4jSecurityInterceptor`\n\n除了内置拦截器之外，我们还可以创建\
  \ `EndpointInterceptor` 的自定义实现。清单 3-26 中显示了一个示例。\n\n***清单 3-26***. 自定义服务器拦截器 (0305-ws-interceptor-service)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter03.ws.interceptor.server;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport org.springframework.ws.context.MessageContext;\n\
  import org.springframework.ws.server.EndpointInterceptor;\n\n@Component\npublic\
  \ class UserInterceptor implements EndpointInterceptor {\n  @Override\n  public\
  \ boolean handleRequest(MessageContext messageContext, Object endpoint)\n      throws\
  \ Exception {\n    System.out.println(\"Endpoint handleRequest\");\n    return true;\n\
    }\n\n@Override\n  public boolean handleResponse(MessageContext messageContext,\
  \ Object endpoint)\n      throws Exception {\n    System.out.println(\"Endpoint\
  \ handleResponse\");\n    return true;\n  }\n\n@Override\n  public boolean handleFault(MessageContext\
  \ messageContext, Object endpoint)\n      throws Exception {\n    System.out.println(\"\
  Endpoint handleFault\");\n    return true;\n  }\n\n@Override\n  public void afterCompletion(MessageContext\
  \ messageContext, Object endpoint,\n      Exception ex) throws Exception {\n    System.out.println(\"\
  Endpoint afterCompletion\");\n  }\n}\n```\n\n该拦截器是一个实现了 `EndpointInterceptor` 的普通\
  \ Spring Bean。每个拦截方法将根据本节开头解释的拦截阶段生命周期被调用。为了方便起见，还提供了 `EndpointInterceptorAdapter`\
  \ 的抽象实现，适用于开发者不需要使用所有拦截接触点的情况。该抽象实现对于可以中断处理的接触点简单地返回 `true`。\n\n该机制的一个重要方面是注入的参数；通过\
  \ `messageContext` 参数，我们能够检查和操作消息。第二个参数的类型是 `Object`，因为它代表一个为消息提供服务的映射端点 Bean。\n\
  \n\n\n让我们探讨如何在清单 3-27 中配置拦截器。\n\n***清单 3-27***. 服务器拦截器的 XML 配置（示例项目 0301-ws-xmlconfig-service\
  \ 中的文件 web-service-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"http://www.springframework.org/schema/context\"\
  \n  xmlns:ws=\"http://www.springframework.org/schema/web-services\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/web-services\n    http://www.springframework.org/schema/web-services/web-services.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\"\
  >\n\n<context:component-scan base-package=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server\"\
  \ />\n  <ws:annotation-driven />\n  <ws:static-wsdl id=\"userDetails\" location=\"\
  classpath:userDetailsSchema.wsdl\"/>\n\n<ws:interceptors>\n    <ref bean=\"globalInterceptor\"\
  />\n    <ws:payloadRoot namespaceUri=\n        \"http://localhost:10301/0301-ws-xmlconfig-service\"\
  \ localPart=\"UserRequest\">\n      <bean class=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server.UserInterceptor\"\
  />\n      <ref bean=\"loggingInterceptor\"/>\n    </ws:payloadRoot>\n    <bean class=\n\
  \n\"org.springframework.ws.soap.server.endpoint.interceptor.SoapEnvelopeLoggingInterceptor\"\
  />\n    <bean class=\n\n\"org.springframework.ws.soap.server.endpoint.interceptor.PayloadValidatingInterceptor\"\
  >\n      <property name=\"schema\" value=\"classpath:userDetailsSchema.xsd\"/>\n\
        <property name=\"validateRequest\" value=\"true\"/>\n      <property name=\"\
  validateResponse\" value=\"true\"/>\n    </bean>\n  </ws:interceptors>\n\n<bean\
  \ id=\"loggingInterceptor\" class=\n             \"org.springframework.ws.server.endpoint.interceptor.PayloadLoggingInterceptor\"\
  />\n  <bean id=\"globalInterceptor\"  class=\n             \"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server.GlobalInterceptor\"\
  \ />\n</beans>\n```\n\n此示例展示了拦截器的 XML 配置。Spring 命名空间注册、组件扫描和注解声明应该已在本章前面的部分中熟悉。\n\
  \n此示例的新部分是 `web-services` 命名空间的一个元素：`<ws:interceptors>`。它为 Web 服务注册拦截器。在此 XML 元素下，我们可以注册一个全局拦截器的引用（使用\
  \ `ref` 元素）或声明一个新 bean（使用 `bean` 元素）。此类拦截器将应用于属于此 Spring 上下文的所有端点。在此例中，我们使用了 `GlobalInterceptor`，这是一个类似于清单\
  \ 3-27 中 `UserInterceptor` 的类。\n\n嵌套元素 `payloadRoot` 将拦截器绑定到由 `namespaceUri` 和 `localPart`\
  \ 参数指定的具体端点。当我们需要为不同端点设置不同的拦截逻辑时，这非常方便。如果我们使用 `SOAPAction` 路由，则会使用 `soapAction`\
  \ 元素而不是 `payloadRoot`。在此例中，我们为命名空间为 `http://localhost:10301/0301-ws-xmlconfig-service`\
  \ 且本地部分为 `UserRequest` 的端点注册了两个拦截器。第一个是我们自定义的 `UserInterceptor`，第二个是 `loggingInterceptor`，它是一个类型为\
  \ `PayloadLoggingInterceptor` 的 bean。当然，我们可以在 bean 声明中或作为 bean 引用使用自定义以及内置的拦截器实现。\n\
  \n最后，我们又注册了两个拦截器：一个用于记录 SOAP 信封，另一个用于根据 XSD 契约验证请求。最后三个拦截器是 Spring Web Services\
  \ 项目开箱即用的实现。我们只需相应地注册它们。对于验证模式拦截器，我们需要指定模式的位置。\n\nJava 配置如清单 3-28 所示。\n\n***清单 3-28***.\
  \ 服务器拦截器的 Java 配置（0305-ws-interceptor-service）\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.interceptor.server;\n\
  \nimport java.util.List;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport org.springframework.boot.context.embedded.ServletRegistrationBean;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.core.io.ClassPathResource;\nimport org.springframework.ws.config.annotation.EnableWs;\n\
  import org.springframework.ws.config.annotation.WsConfigurerAdapter;\nimport org.springframework.ws.server.EndpointInterceptor;\n\
  import org.springframework.ws.server.endpoint.interceptor.PayloadLoggingInterceptor;\n\
  import org.springframework.ws.soap.server.\nendpoint.interceptor.PayloadRootSmartSoapEndpointInterceptor;\n\
  import org.springframework.ws.soap.server.endpoint.interceptor.PayloadValidatingInterceptor;\n\
  import org.springframework.ws.soap.server.endpoint.interceptor.SoapEnvelopeLoggingInterceptor;\n\
  import org.springframework.ws.transport.http.MessageDispatcherServlet;\nimport org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;\n\
  import org.springframework.xml.xsd.SimpleXsdSchema;\n\n@EnableWs\n@Configuration\n\
  @ComponentScan\n@EnableAutoConfiguration\npublic class ServerConfiguration extends\
  \ WsConfigurerAdapter {\n  public static final String NAMESPACE =\n      \"http://localhost:10305/0305-ws-interceptor-service\"\
  ;\n\n@Autowired\n  private UserInterceptor userInterceptor;\n  @Autowired\n  private\
  \ GlobalIntercetor globalInterceptor;\n\n@Bean\n  public SimpleWsdl11Definition\
  \ userDetails() {\n    return new SimpleWsdl11Definition(new ClassPathResource(\n\
          \"userDetailsSchema.wsdl\"));\n  }\n\n@Bean\n  public ServletRegistrationBean\
  \ dispatcherServlet(\n      ApplicationContext applicationContext) {\n    MessageDispatcherServlet\
  \ servlet = new MessageDispatcherServlet();\n    servlet.setApplicationContext(applicationContext);\n\
      servlet.setTransformWsdlLocations(true);\n    return new ServletRegistrationBean(servlet,\
  \ \"/*\");\n  }\n\n@Override\n  public void addInterceptors(List<EndpointInterceptor>\
  \ interceptors) {\n    interceptors.add(new PayloadRootSmartSoapEndpointInterceptor(\n\
          userInterceptor, NAMESPACE, \"UserRequest\"));\n\nPayloadRootSmartSoapEndpointInterceptor\
  \ smartLoggingInterceptor =\n        new PayloadRootSmartSoapEndpointInterceptor(\n\
              new PayloadLoggingInterceptor(), NAMESPACE, \"UserRequest\");\n    interceptors.add(smartLoggingInterceptor);\n\
  \ninterceptors.add(globalInterceptor);\n    interceptors.add(new SoapEnvelopeLoggingInterceptor());\n\
  \nPayloadValidatingInterceptor validationInterceptor =\n        new PayloadValidatingInterceptor();\n\
      SimpleXsdSchema schema =\n        new SimpleXsdSchema(new ClassPathResource(\"\
  userDetailsSchema.xsd\"));\n    validationInterceptor.setXsdSchema(schema);\n    validationInterceptor.setValidateRequest(true);\n\
      validationInterceptor.setValidateResponse(true);\n    interceptors.add(validationInterceptor);\n\
    }\n}\n```\n\n`UserInterceptor` 和 `GlobalInterceptor` bean 通过组件扫描被检测到，并自动注入到此配置类中。在\
  \ `addInterceptors` 方法中，我们将拦截器注册到一个注入的列表中。前两个拦截器被包装在 `PayloadRootSmartSoapEndpointInterceptor`\
  \ 中。此包装器使得给定的拦截器仅对命名空间为 `http://localhost:10305/0305-ws-interceptor-service` 且本地部分为\
  \ `UserRequest` 的端点生效。我们以这种方式注册了自定义的 `UserInterceptor` 和 `PayloadLoggingInterceptor`。\n\
  \n\n\n其余拦截器均为全局拦截器，这意味着它们会应用于此服务中处理的所有端点。在此示例中，我们注册了两个自定义拦截器、两个日志拦截器和一个验证拦截器。内置拦截器有时需要强制参数。在此示例中，验证拦截器需要访问\
  \ XSD 模式。此配置实际上与清单 3-27 中的 XML 配置相同。\n\n客户端拦截\n\nSpring Web Services 拦截支持的一个有趣部分体现在客户端。主接口\
  \ `ClientInterceptor` 的签名与服务器端的 `EndpointInterceptor` 类似。唯一的区别在于，拦截接触点中缺少端点 bean\
  \ 实例的注入，因为客户端上没有任何端点。该接口没有现成的抽象实现。因此，我们需要在自定义客户端拦截器中实现所有接触点。Spring Web Services\
  \ 提供的唯一开箱即用的拦截器是 `PayloadValidatingInterceptor`。客户端拦截器会注册到 `WebServiceTemplate`\
  \ bean 中。\n\n清单 3-29 展示了一个自定义客户端拦截器的示例。\n\n***清单 3-29***. 自定义客户端拦截器 (0305-ws-interceptor-client)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter03.ws.interceptor.client;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport org.springframework.ws.client.WebServiceClientException;\n\
  import org.springframework.ws.client.support.interceptor.ClientInterceptor;\nimport\
  \ org.springframework.ws.context.MessageContext;\n\n@Component\npublic class UserInterceptor\
  \ implements ClientInterceptor {\n  @Override\n  public boolean handleRequest(MessageContext\
  \ messageContext)\n      throws WebServiceClientException {\n    System.out.println(\"\
  Client handleRequest\");\n    return true;\n  }\n\n@Override\n  public boolean handleResponse(MessageContext\
  \ messageContext)\n      throws WebServiceClientException {\n    System.out.println(\"\
  Client handleResponse\");\n    return true;\n  }\n\n@Override\n  public boolean\
  \ handleFault(MessageContext messageContext)\n      throws WebServiceClientException\
  \ {\n    System.out.println(\"Client handleFault\");\n    return true;\n  }\n\n\
  @Override\n  public void afterCompletion(MessageContext messageContext, Exception\
  \ ex)\n      throws WebServiceClientException {\n    System.out.println(\"Client\
  \ afterCompletion\");\n  }\n}\n```\n\n开发者无需使用简单的日志示例逻辑，而是可以在每个拦截接触点中放置符合其 Web 服务需求的自定义逻辑。清单\
  \ 3-30 展示了一个示例配置。\n\n***清单 3-30***. 客户端拦截器注册 (0305-ws-interceptor-client)\n\n```\n\
  package net.lkrnac.book.eiws.chapter03.ws.interceptor.client;\n\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.oxm.jaxb.Jaxb2Marshaller;\nimport org.springframework.ws.client.core.WebServiceTemplate;\n\
  import org.springframework.ws.client.support.interceptor.ClientInterceptor;\n\n\
  @Configuration\n@ComponentScan\npublic class WsInterceptorClientConfiguration {\n\
    @Bean\n  public Jaxb2Marshaller marshaller() {\n    Jaxb2Marshaller marshaller\
  \ = new Jaxb2Marshaller();\n    marshaller\n        .setContextPath(\"net.lkrnac.book.eiws.chapter03.ws.interceptor.model\"\
  );\n    return marshaller;\n  }\n\n@Bean\n  public WebServiceTemplate webServiceTemplate(Jaxb2Marshaller\
  \ marshaller,\n      UserInterceptor userInterceptor) {\n    WebServiceTemplate\
  \ webServiceTemplate = new WebServiceTemplate();\n    webServiceTemplate.setMarshaller(marshaller);\n\
      webServiceTemplate.setUnmarshaller(marshaller);\n    webServiceTemplate\n.setDefaultUri(\"\
  http://localhost:10305/0305-ws-interceptor-service\");\n\n\n```markdown\n\nClientInterceptor[]\
  \ interceptors =\n        new ClientInterceptor[] { userInterceptor };\n    webServiceTemplate.setInterceptors(interceptors);\n\
  \    return webServiceTemplate;\n  }\n}\n```\n\n我们将拦截器数组注册到名为 `interceptors` 的 `WebServiceTemplate`\
  \ 字段中。XML 配置与之类似，因为我们使用了标准的 Spring 依赖注入 XML 元素，例如 `bean`、`property` 和 `ref`。请参见清单\
  \ 3-31。\n\n***清单 3-31***. 客户端拦截器的 XML 配置（示例项目 0301-ws-xmlconfig-client 中的文件 ws-client-config.xml）\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
  \    http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
  \    http://www.springframework.org/schema/context/spring-context.xsd\">\n\n<context:component-scan\
  \ base-package=\n        \"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.client\"\
  \ />\n\n<bean id=\"marshaller\" class=\"org.springframework.oxm.jaxb.Jaxb2Marshaller\"\
  >\n        <property name=\"contextPath\"\n          value=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model\"\
  \ />\n    </bean>\n\n<bean id=\"webServiceTemplate\"\n            class=\"org.springframework.ws.client.core.WebServiceTemplate\"\
  >\n        <property name=\"marshaller\" ref=\"marshaller\" />\n        <property\
  \ name=\"unmarshaller\" ref=\"marshaller\" />\n        <property name=\"defaultUri\"\
  \n          value=\"http://localhost:10301/0301-ws-xmlconfig-service\" />\n    \
  \    <property name=\"interceptors\">\n          <array>\n            <bean class=\"\
  net.lkrnac.book.eiws.chapter03.ws.xmlconfig.config.UserInterceptor\"/>\n       \
  \   </array>\n        </property>\n    </bean>\n</beans>\n```\n\n错误处理\n\nSpring\
  \ Web Services 项目能够轻松转换从 Web 服务逻辑中渗透出来的错误。与拦截支持类似，错误处理也分为服务器端和客户端。\n\n服务器端错误处理\n\
  \n宽松的错误处理通常是严重安全漏洞的根源，这些漏洞会暴露 Web 服务的实现细节。当异常从 Web 服务逻辑冒泡到 Servlet 容器时，它通常会发送一条包含\
  \ Web 服务器信息和堆栈跟踪的失败消息作为响应消息。攻击者可以（基于此类消息）分析 Web 服务器的类型、版本、Web 服务运行的平台以及所使用的框架。这些数据可进一步用于创建更具针对性的攻击。此问题是开放\
  \ Web 应用程序安全项目（OWASP）十大安全风险列表中的第 6 个问题。\n\n服务器端的异常转换有助于隐藏这些实现细节。其思路是 Spring 将使用已注册的异常解析器来创建通用响应，而不是向客户端暴露敏感信息。`MessageDispatcher`\
  \ 会扫描类路径以查找 `EndpointExceptionResolver` 接口的实现。该接口只有一个名为 `resolveException` 的方法。此接口可以通过多种方式使用：\n\
  \n*   自定义实现可满足错误转换的特殊要求。\n*   `SoapFaultMappingExceptionResolver` 将每个异常映射到带有显式错误消息的特定\
  \ SOAP 错误。\n*   `SimpleSoapExceptionResolver` 将所有异常转换为 SOAP 客户端错误，并将异常消息作为响应负载。\n\
  \n最后但同样重要的是 `@SoapFault` 异常。它用于标记异常类型，以便将异常转换为消息。在这种情况下，SOAP 错误在注解参数中指定。所有这些机制都允许实现更高的安全标准，同时又能灵活地向客户端告知已知问题。\n\
  \n没有专门用于错误处理的 XML 元素。因此，我们将只关注 Java 示例。对于 XML，我们将使用标准的 DI 元素，例如 `bean`、`property`\
  \ 和 `ref`。清单 3-32 展示了如何注册 `SoapFaultMappingExceptionResolver`。\n\n***清单 3-32***.\
  \ SoapFaultMappingExceptionResolver 注册示例（0306-ws-error-service）\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter03.ws.error.server;\n\nimport java.util.Properties;\n\
  \nimport org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport\
  \ org.springframework.boot.context.embedded.ServletRegistrationBean;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.ws.config.annotation.EnableWs;\nimport org.springframework.ws.soap.server.endpoint.SoapFaultDefinition;\n\
  import org.springframework.ws.soap.server.endpoint.SoapFaultMappingExceptionResolver;\n\
  import org.springframework.ws.transport.http.MessageDispatcherServlet;\nimport org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;\n\
  \n@EnableWs\n@Configuration\n@ComponentScan\n@EnableAutoConfiguration\npublic class\
  \ ServerConfiguration {\n  public static final String NAMESPACE =\n      \"http://localhost:10306/0306-ws-error-service\"\
  ;\n\n@Bean\n  public SimpleWsdl11Definition userDetails() {\n    return new SimpleWsdl11Definition(new\
  \ ClassPathResource(\"userDetailsSchema.xsd\"));\n  }\n\n@Bean\n  public ServletRegistrationBean\
  \ dispatcherServlet(\n      ApplicationContext applicationContext) {\n    MessageDispatcherServlet\
  \ servlet = new MessageDispatcherServlet();\n    servlet.setApplicationContext(applicationContext);\n\
  \    servlet.setTransformWsdlLocations(true);\n    return new ServletRegistrationBean(servlet,\
  \ \"/*\");\n  }\n\n@Bean\n  public SoapFaultMappingExceptionResolver exceptionResolver()\
  \ {\n    SoapFaultMappingExceptionResolver exceptionResolver =\n        new SoapFaultMappingExceptionResolver();\n\
  \nSoapFaultDefinition defaultSoapFault = new SoapFaultDefinition();\n    defaultSoapFault.setFaultCode(SoapFaultDefinition.SERVER);\n\
  \    exceptionResolver.setDefaultFault(defaultSoapFault);\n\nProperties errorMappings\
  \ = new Properties();\n    errorMappings.put(IllegalStateException.class.getName(),\n\
  \        SoapFaultDefinition.CLIENT.toString());\n    exceptionResolver.setExceptionMappings(errorMappings);\n\
  \    exceptionResolver.setOrder(1);\n\nreturn exceptionResolver;\n  }\n}\n```\n\n\
  异常解析器在 `exceptionResolver` 方法中注册。我们首先创建一个 `SoapFaultMappingExceptionResolver` 类型的对象。然后注册默认的\
  \ SOAP 错误。除非存在更具体的映射，否则每个错误都会使用此默认错误。特定的映射作为 `Properties` 类型的数组注册到 `SoapFaultMappingExceptionResolver`\
  \ 的 `exceptionMappings` 字段中。在此例中，我们将 `IllegalStateException` 映射到客户端 SOAP 错误。方法 `setOrder`\
  \ 指定了发生异常时处理映射的顺序。\n\n如果我们更喜欢 `SimpleSoapExceptionResolver` 或自定义异常解析器实现，则可以通过构造函数创建它，并以类似的方式将其注册为\
  \ Spring Bean。\n\n清单 3-33 展示了如何使用 `@SoapFault` 注解。\n\n***清单 3-33***. @SoapFault\
  \ 注解（0306-ws-error-service）\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.error.server;\n\
  \nimport org.springframework.ws.soap.server.endpoint.annotation.FaultCode;\nimport\
  \ org.springframework.ws.soap.server.endpoint.annotation.SoapFault;\n\n@SoapFault(faultCode\
  \ = FaultCode.CLIENT)\npublic class CustomErrorException extends RuntimeException\
  \ {\n  private static final long serialVersionUID = 1L;\n\npublic CustomErrorException(String\
  \ message) {\n    super(message);\n  }\n}\n```\n\n```\n\n\n当此异常传播到 Spring Web Services\
  \ 容器时，它会被转换为客户端 SOAP 错误。这是由注解参数 `faultCode` 指定的。在此例中，我们将 `CustomErrorException`\
  \ 映射到了客户端 SOAP 错误。异常消息字段被用作响应负载。如果我们想为此类型的异常显式指定一个通用错误消息，则需要定义注解参数 `faultStringOrReason`。\n\
  \n客户端错误处理\n\n客户端错误转换用于将 SOAP 消息转换为客户端代码中的异常。其核心接口名为 `FaultMessageResolver`，需要注册为\
  \ `WebServiceTemplate` 的一个属性。有两个开箱即用的实现：\n\n*   `SoapFaultMessageResolver` 将错误转换为\
  \ `SoapFaultClientException`。\n*   `SimpleFaultMessageResolver` 将错误消息转换为 `WebServiceFaultException`。\n\
  \n我们也可以提供 `FaultMessageResolver` 的自定义实现，如清单 3-34 所示。\n\n***清单 3-34***. 客户端错误解析器注册\
  \ (0306-ws-error-client)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.error.client;\n\
  \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.oxm.jaxb.Jaxb2Marshaller;\n\
  import org.springframework.ws.client.core.WebServiceTemplate;\nimport org.springframework.ws.soap.client.core.SoapFaultMessageResolver;\n\
  \n@Configuration\n@ComponentScan\npublic class WsErrorClientConfiguration {\n  @Bean\n\
    public Jaxb2Marshaller marshaller() {\n    Jaxb2Marshaller marshaller = new Jaxb2Marshaller();\n\
      marshaller.setContextPath(\"net.lkrnac.book.eiws.chapter03.ws.error.model\"\
  );\n    return marshaller;\n  }\n\n@Bean\n  public WebServiceTemplate webServiceTemplate(Jaxb2Marshaller\
  \ marshaller) {\n    WebServiceTemplate webServiceTemplate = new WebServiceTemplate();\n\
      webServiceTemplate.setMarshaller(marshaller);\n    webServiceTemplate.setUnmarshaller(marshaller);\n\
      webServiceTemplate.setDefaultUri(\"http://localhost:10306/0306-ws-error-service\"\
  );\n\nwebServiceTemplate.setFaultMessageResolver(new SoapFaultMessageResolver());\n\
      return webServiceTemplate;\n  }\n}\n```\n\n容器外测试\n\n有多种方法可以自动测试 Web 服务。单元测试通常不会创建\
  \ Spring 的上下文实例。一个类或一组类被隔离测试，并且测试会模拟依赖项。这些测试有助于记录开发者对模块应如何工作的意图。此类测试对于清理 Web 服务或\
  \ Web 服务消费者的业务逻辑特别有用。\n\n在另一种测试类型中，我们自动将 Web 服务部署到目标环境并执行测试套件，该套件将执行或消费真实的请求。这正朝着端到端测试的方向发展。由于构建流程中需要部署步骤，这些测试可能需要一些时间。因此，这种类型的测试通常不像单元测试那样频繁触发。\n\
  \n稍微更合适的方法是在构建过程中模拟部署环境。例如 `tomcat7-maven-plugin` 或 `gradle-maven-plugin`，它们使我们能够构建应用程序的完整工件并将其部署到嵌入式\
  \ Servlet 容器中。\n\n此外，Spring Web Services 为完整或部分 Spring 配置的集成测试提供了支持。它可以与你选择的单元测试框架（最常见的是\
  \ JUnit 或 TestNG）集成。这种测试支持很方便，因为它涵盖了集成的 Spring 配置，并且同时不需要使用 Servlet 容器（或其他资源密集型环境）。\n\
  \n服务端测试支持\n\n当我们测试 Web 服务服务器时，我们需要向被测 Web 服务发送请求，接收请求，并验证响应。Spring Web Services\
  \ 项目提供了帮助程序来轻松完成这些任务：\n\n*   `MockWebServiceClient` 用于模拟客户端和发送请求。\n*   `org.springframework.ws.test.server.RequestCreator`/`org.springframework.ws.test.server.RequestCreators`\
  \ 帮助创建请求消息。\n*   `org.springframework.ws.test.server.ResponseActions`/`org.springframework.ws.test.server.ResponseMatchers`\
  \ 提供对响应验证的支持。\n\n在此示例中，我们将使用清单 3-35 中的测试请求和清单 3-36 中的响应。\n\n***清单 3-35***. 用于测试的请求（示例项目\
  \ 0303-ws-boot-service 中的文件 testRequest.xml）\n\n```\n<ns2:UserRequest xmlns:ns2=\"\
  http://localhost:10303/0303-ws-boot-service\"\n    Email=\"lubos.krnac@gmail.com\"\
  \ />\n```\n\n***清单 3-36***. 用于测试的响应（示例项目 0303-ws-boot-service 中的文件 testResponse.xml）\n\
  \n```\n<ns2:UserDetailsResponse\n  xmlns:ns2=\"http://localhost:10303/0303-ws-boot-service\"\
  >\n  <ns2:FirstName>Lubos</ns2:FirstName>\n  <ns2:LastName>Krnac</ns2:LastName>\n\
  </ns2:UserDetailsResponse>\n```\n\n让我们在清单 3-37 中探索服务端测试支持。\n\n***清单 3-37***. 服务端测试\
  \ (0303-ws-boot-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.boot.client;\n\
  \nimport java.io.IOException;\nimport net.lkrnac.book.eiws.chapter03.ws.boot.server.ServerConfiguration;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.core.io.ClassPathResource;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.springframework.ws.test.server.MockWebServiceClient;\nimport org.springframework.ws.test.server.RequestCreator;\n\
  import org.springframework.ws.test.server.RequestCreators;\nimport org.springframework.ws.test.server.ResponseActions;\n\
  import org.springframework.ws.test.server.ResponseMatchers;\nimport org.testng.annotations.Test;\n\
  \n@ContextConfiguration(classes = ServerConfiguration.class)\npublic class WsJavaConfigServerITest\
  \ extends AbstractTestNGSpringContextTests {\n  @Autowired\n  private ApplicationContext\
  \ applicationContext;\n\n@Test\n  public void testGetUserDetails() throws IOException\
  \ {\n    // GIVEN\n    MockWebServiceClient wsClient =\n        MockWebServiceClient.createClient(applicationContext);\n\
  \nRequestCreator requestCreator =\n        RequestCreators.withPayload(new ClassPathResource(\"\
  testRequest.xml\"));\n\n// WHEN\n    ResponseActions response = wsClient.sendRequest(requestCreator);\n\
  \n// THEN\n    response.andExpect(ResponseMatchers.noFault()).andExpect(\n        ResponseMatchers.payload(new\
  \ ClassPathResource(\"testResponse.xml\")));\n  }\n}\n```\n\nTestNG 是用于驱动测试的测试框架。为了将其与\
  \ Spring 上下文集成，我们需要让测试类继承自 `AbstractTestNGSpringContextTests`。此类是 Spring Core 测试模块的一部分。我们正在测试由示例项目\
  \ `0303-ws-boot-service` 中的类 `ServerConfiguration` 定义的 Spring 配置。该配置已在本章前面的部分中解释过。要创建模拟客户端，我们可以使用自动注入的应用程序上下文实例。\n\
  \n\n\n下一步是创建请求。我们借助 `RequestCreator` 和 `RequestCreators`，基于测试文件 `testRequest.xml`\
  \ 来创建它。现在，我们已经准备好执行虚拟请求。我们通过调用模拟客户端实例上的 `sendRequest` 方法来实现这一点。该方法会返回一个虚拟响应。最后，我们验证\
  \ Web 服务是否返回了预期的结果和消息负载。`ResponseMatchers` 类包含许多辅助验证方法，因此我们能够测试复杂的行为。\n\n客户端测试支持\n\
  \n当测试 Web 服务客户端时，我们首先需要使用测试客户端来执行请求。然后，我们从模拟服务器接收响应，并验证它们在客户端上的表示是否符合预期。帮助我们完成此操作的类如下：\n\
  \n*   `MockWebServiceServer` 用于模拟客户端并发送请求。\n*   `org.springframework.ws.test.client.ResponseCreator`/`org.springframework.ws.test.client.ResponseCreators`\
  \ 提供支持，用于将预期的响应记录到模拟服务器中。它将用于从模拟服务器发送响应。\n*   `org.springframework.ws.test.client.RequestMatchers`\
  \ 提供支持，用于将预期的请求记录到模拟服务器中。它将用于验证客户端是否在请求中发送了正确的负载。\n\n让我们探索清单 3-38 中的测试支持。\n\n***清单\
  \ 3-38***. 客户端测试 (0303-ws-boot-client)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.boot.client;\n\
  \nimport static org.testng.Assert.assertEquals;\nimport java.io.IOException;\nimport\
  \ net.lkrnac.book.eiws.chapter03.ws.boot.model.UserDetailsResponse;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.core.io.ClassPathResource;\nimport org.springframework.test.annotation.DirtiesContext;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.springframework.ws.client.core.WebServiceTemplate;\nimport org.springframework.ws.test.client.MockWebServiceServer;\n\
  import org.springframework.ws.test.client.RequestMatchers;\nimport org.springframework.ws.test.client.ResponseCreator;\n\
  import org.springframework.ws.test.client.ResponseCreators;\nimport org.testng.annotations.Test;\n\
  \n@ContextConfiguration(classes = WsBootClientConfiguration.class)\npublic class\
  \ WsBootClientITest extends AbstractTestNGSpringContextTests {\n  @Autowired\n \
  \ private WebServiceClient webServiceClient;\n\n@Autowired\n  private WebServiceTemplate\
  \ webServiceTemplate;\n\n@Test\n  public void testGetUserDetails() throws IOException\
  \ {\n    // GIVEN\n    MockWebServiceServer mockWsServer =\n        MockWebServiceServer.createServer(webServiceTemplate);\n\
  \nResponseCreator responseCreator =\n        ResponseCreators.withPayload(new ClassPathResource(\"\
  testResponse.xml\"));\n\nmockWsServer.expect(\n        RequestMatchers.payload(new\
  \ ClassPathResource(\"testRequest.xml\")))\n        .andRespond(responseCreator);\n\
  \n// WHEN\n    UserDetailsResponse userDetails =\n        webServiceClient.getUserDetails(\"\
  lubos.krnac@gmail.com\");\n\n// THEN\n    assertEquals(userDetails.getFirstName(),\
  \ \"Lubos\");\n    assertEquals(userDetails.getLastName(), \"Krnac\");\n    mockWsServer.verify();\n\
  \  }\n}\n```\n\n与清单 3-37 中的服务器端测试示例类似，这里使用 TestNG 作为测试框架。该测试使用 `WsBootClientConfiguration`\
  \ 作为被测配置。为了创建模拟服务器，我们需要自动注入一个 `WebServiceTemplate` 实例。然后，我们记录客户端预期的请求以及模拟服务器提供的响应。\n\
  \n测试客户端实例是从 Spring 测试配置中注入的。我们像从客户端应用程序中那样执行客户端调用。在验证阶段，我们需要验证客户端是否正确表示了来自模拟服务器的响应。最后但同样重要的是，我们需要验证从测试客户端发送到模拟服务器的请求是否正确。这是通过模拟服务器实例上一个名为\
  \ `verify` 的方法完成的。\n\n总结\n\n在本章中，我们简要比较了创建 Web 服务和分布式应用的概念，以及与服务解耦相比远程技术所带来的优势。然后，我们介绍了可以集成到\
  \ Spring 生态系统中的 XML 编组技术。\n\n我们还探讨了使用 Spring Web Services 项目构建 Web 服务时“契约优先”方法的好处。这种方法有助于抽象掉开发\
  \ Web 服务的复杂性，并通过提供 API 在现有库和协议之上遵循最佳实践，使其更易于上手。它使我们能够创建基于 SOAP 的 Web 服务，这些服务可以通过\
  \ HTTP、JMS、电子邮件和 XMPP 传输协议进行通信。\n\n我们展示了如何基于通信需求来最优地开始开发 Web 服务契约。消息负载是生成 XSD 契约草案的起点。随后，可以基于此契约生成\
  \ JAXB 2 Java 模型。我们还介绍了如何使用 XML 和 Java 上下文来配置容器环境和 Spring 配置。\n\n路由 Web 服务消息是使用\
  \ Spring 进行高效开发的支柱。我们可以受益于基于负载根元素、WS-Addressing 和 `SOAPAction` 头的路由。\n\n客户端支持是 Spring\
  \ 产品的重要组成部分，因为它允许我们从 XSD 契约生成 Java 模型。最后，本章解释了如何拦截和处理错误，以及如何更有效地隔离测试 Spring 配置。\n\
  \n第 4 章\n\n![image](img/frontdot.jpg)\n\nRESTful Web 服务\n\n本章将解释征服企业集成世界的原则。它关乎表述性状态转移，即\
  \ REST。\n\n分布式系统的演进并未止步于远程技术和 Web 服务。SOAP 实现了高度解耦，解决了远程技术的一个主要问题。作为远程技术的后继者，SOAP\
  \ Web 服务被大型企业公司所采用。由于 SOAP Web 服务依赖于契约，分布式开发团队之间的协作得到了加强。一个定义良好的 XSD/WSDL 契约有助于避免歧义，或改善客户端和服务器端开发者之间沟通不畅的问题。\n\
  \n但一段时间后，许多人开始遇到 SOAP Web 服务的问题。首先，开发 SOAP Web 服务并非易事。SOAP 的复杂性开始成为开发企业应用越来越大的瓶颈。即使\
  \ SOAP 为复杂需求提供了丰富的可能性，但在大多数情况下，它被证明是过度设计的。这拖慢了开发速度，并使维护成本更高。\n\n传统 Web 服务另一个备受批评的方面是其依赖的\
  \ XML 负载。即使计算能力每隔几年就成倍增长，用户也开始期望越来越低的延迟。但 XML 是冗长的，而 SOAP 完全依赖于 XML 交换格式。因此，当轻量级交换格式开始涌现（最著名的是\
  \ JSON）时，SOAP 无法利用它们。\n\n与 SOAP Web 服务路线并行，另一种不同的 Web 服务开发学派也在演进。这种方法就是 REST（它只比\
  \ SOAP 年轻两岁）。尽管 SOAP 在开始时获得了更广泛的采用，但人们开始意识到 REST 拥有更多优势。\n\n\n\nREST 诞生于 Roy Fielding\
  \ 的博士论文《架构风格与基于网络的软件架构设计》。他基于超文本传输协议，为分布式计算定义了几种架构概念，并为这些概念创造了一个新术语：表述性状态转移（REST）。\n\
  \n根据定义，REST 运行于 HTTP 之上。事实上，它将 HTTP 提升为一种应用协议——这与 SOAP 不同，SOAP 仅将 HTTP 用作传输协议。SOAP\
  \ 框架在底层使用 HTTP 来传输 SOAP 消息。SOAP 开发者无需了解 HTTP 的特性，因为他们使用的是更高级的 SOAP 抽象。而 REST 则使用\
  \ HTTP 编程模型；开发者需要实现 HTTP，因为它驱动着客户端与服务器之间的通信契约。\n\n但 *REST 并非一种协议*；它是一组架构概念。因此，这些概念也可以用于其他非\
  \ HTTP 协议。\n\nREST 之所以流行，是因为它比 SOAP 轻量得多。它不涉及严格的契约。没有严格的规则，开发者就有更多空间来满足业务需求。同时，他们面对的是更简单的编程模型，因为\
  \ REST 不依赖模式。\n\n第二个主要优势是能够基于多种交换格式运行。REST 可以利用一些轻量级的 XML 替代方案。如今极为流行的一种是 JavaScript\
  \ 对象表示法（JSON），由 Douglas Crockford 发明。顾名思义，它最初是为 JavaScript 语言创建的。但其简洁性和轻量特性迅速在所有主流编程平台上流行起来。\n\
  \n随着时间的推移，人们发现 REST 在大多数情况下是比 SOAP 更好的方法。如今，REST 显然是赢家。然而，在某些情况下，使用 SOAP 仍然完全合理。例如，当需要状态性或事务时，SOAP\
  \ 可能比 REST 更具优势。请记住，SOAP 和 REST 并非对立面。它们各自适用于不同的场景。\n\nREST 原则\n\n如前所述，Roy Fielding\
  \ 在其博士论文中定义了 REST。这种架构风格使用以下原则来简化分布式系统的开发和运维。\n\n客户端/服务器分离\n\nREST 的基本原则是解耦客户端/服务器通信，并将它们的关注点分离成可管理的一组需求。例如，客户端应专门负责表示层。服务器的关注点包括持久化数据，并向客户端隐藏持久化细节。当通过统一接口进行通信时，通信的任何一方都可以被替换。例如，你可以替换服务器上的持久化存储类型，而不影响客户端。或者，你可以替换客户端的渲染引擎，而不影响服务器。这显著增强了企业系统的模块化程度。\n\
  \nCRUD 操作\n\n大多数 SOAP 服务对资源执行操作（例如，预订航班）。因此，这些服务被设计为以动词为中心：资源类型（名词）和操作类型（动词）对于客户端和服务器之间的契约都很重要。\n\
  \nRoy Fielding 决定为 REST Web 服务简化这种以动词为中心的方法。他认识到我们主要想执行创建、读取、更新和删除（CRUD）操作。而所有这些操作都已包含在他参与创建的\
  \ HTTP 协议中：`GET`、`POST`、`PUT` 和 `DELETE`。因此，他极大地简化了 Web 服务的一个维度，因为不再需要设计动词。这使得设计\
  \ REST 服务更加容易，因为我们只需要识别系统中的资源（或名词）。操作已由 CRUD 操作定义。\n\n统一接口\n\n在应用程序中识别资源（或领域模型），并通过一组固定的操作将其暴露出来，就创建了一个*统一接口*。对资源（领域模型）的操作通过\
  \ HTTP 定义良好的操作来完成。为了能够操作资源，它必须有一个唯一标识符（例如，URI）。不仅资源本身需要可识别，特定资源的实例也需要可识别。Fielding\
  \ 还进一步规定，关于资源的消息必须包含操作该资源所需的所有信息，无论之前是否有关于该资源的任何消息。因此，消息应包含对资源实例执行任何 CRUD 操作所需的所有信息。\n\
  \n![Image](img/sq.jpg) **注意** 理解统一资源标识符（URI）和统一资源定位符（URL）之间的区别很重要。URI 是用于标识资源的文本表示（例如\
  \ `http://lkrnac.net/about`、`../../file.txt`、`file.txt` 和 `/users`）。URL 指定了资源在网络上的位置（例如\
  \ `http://lkrnac.net/about`）。因此，URL 也是一种 URI，但反之则不然。换句话说，URL 是一种特殊类型的 URI。\n\n无状态性\n\
  \n另一个关键的 REST 原则是严格的*无状态性*。服务器不会在会话中存储任何关于客户端的信息。我们通过在每次请求中包含所有需要的用户特定数据来弥补服务器上状态的缺失。这简化了服务器端的实现，因为服务器无需在内存中为所有连接的客户端保持状态。避免长时间存在的会话也节省了大量服务器资源，因为服务请求所需的所有对象都可以在响应发送回服务器后立即释放。这是\
  \ REST 通信的一个小缺点，因为将所有状态转换信息从客户端发送到服务器再返回，会增加网络带宽消耗。\n\n每个请求还必须包含执行身份验证或授权所需的数据。由于服务器对客户端及其状态一无所知，客户端必须在每个请求中满足授权或身份验证约束。另一方面，有状态通信通常通过在身份验证后生成会话令牌来实现。如果此令牌被攻击者窃取，则可以在有限的时间内（直到会话关闭或超时）被滥用。但对于无状态通信，身份验证凭据或授权令牌不会在短时间内过期。攻击者有更宽的时间窗口来实施严重攻击。这是\
  \ REST 通信的一个小安全缺陷，也表明了使用加密的 HTTPS 协议而非普通 HTTP 至关重要。\n\n状态不仅消耗服务器资源（正如 Roy Fielding\
  \ 在其博士论文中所述），还会使集群变得复杂。当用户会话不存储在任何服务器节点中时，用户请求被路由到哪个服务器节点就无关紧要了，因为任何节点都可以处理该请求。因此，Web\
  \ 服务的无状态特性如今已成为主要要求之一。\n\n为了了解应用程序中状态的存在如何使集群复杂化，让我们考虑 图 4-1 中的场景。\n\n![9781484207949_Fig04-01.jpg](img/9781484207949_Fig04-01.jpg)\n\
  \n图 4-1. 有状态应用程序的集群问题示例\n\n\n\n假设我们示例中的 Node1 有一个用于在内存中存储记录的高速缓存。它并非无状态，因为它存储了数据（即使只是短暂存储）。第一个请求通过\
  \ Node1 从数据库 Node1 读取记录，并将该记录存入缓存。下一个请求通过 Node2 更新数据库 Node2 中的同一条记录。同时，假设我们的数据库集群在所有数据库节点间进行了复制，因此该记录在数据库\
  \ Node1 中也会被更新。最后，第三个请求再次从 Node1 读取记录，但这次它并非从数据库 Node1 读取，而是从内部缓存中读取。在这种情况下，该记录并未反映第二个请求所做的更改。因此，第三个请求读取到了一条不一致的记录。\n\
  \n如果我们将状态存储在服务器上的会话中，或者在任意节点中使用 Hibernate 作为二级缓存，也会出现类似的问题。使用二级缓存的 Hibernate 期望只有我们的应用程序在访问数据库。因此，如果我们想对一个依赖\
  \ Hibernate 二级缓存的应用程序进行集群部署，就需要将其托管在独立的服务器上，并且我们应用程序的所有节点都需要配置为使用该服务器作为二级缓存。\n\n\
  这种状态存储问题在企业级应用中很常见。理想情况下，每个应用节点都应该是无状态的。但有时，当对数据一致性没有严格要求时，缓存数据也是有意义的。一个很好的例子是缓存\
  \ OAuth 认证令牌，以减少与 OAuth 服务器的往返通信。这些令牌通常不会改变。它们会在一定时间后过期，因此在过期前缓存它们是可行的。\n\n也有一些方法可以对在会话中持有状态的服务器节点进行集群。可以配置负载均衡器，将流量路由到存储会话的节点。这种机制被称为*粘性会话*。但这会使负载均衡器的配置复杂化，并降低根据实际负载有效路由流量的能力。粘性会话机制对于持久\
  \ HTTP 连接（keep-alive）可能很有用。持久连接用于提升 Web 服务的延迟表现，因为 HTTP 连接保持打开状态，无需为每个请求都进行初始握手，这在\
  \ HTTPS 通信的情况下开销会稍高一些。\n\n分层架构\n\n无状态性还使我们能够轻松地向客户端隐藏*分层架构*。客户端完全不知道它们是在与一台物理机器通信，还是与一个分布式集群通信。这对架构师来说是一个巨大的优势，因为它允许他们迭代式地扩展系统，使其更健壮、更安全，而无需将这些变化暴露给客户端。\n\
  \nHATEOAS\n\nFielding 关于处理应用状态的思考更进一步，提出了一个名为*超媒体作为应用状态引擎*（*HATEOAS*）的约束。对于状态转换，客户端仅使用服务器响应负载中包含的超媒体。客户端对服务基础设施和资源结构的了解应被最小化。因此，期望客户端能够从服务器的响应中发现大部分信息（例如，通过指向资源的\
  \ URI）。\n\n可缓存性\n\nFielding 指出的 REST 的另一个优势是*可缓存性*。由于无状态通信可以被缓存，我们可以提升 Web 应用的性能和可扩展性。当然，缓存资源并非总是有意义的，因为这样做会使状态转换变得不可能。因此，服务器能够显式或隐式地将响应标记为可缓存是至关重要的。\n\
  \n灵活性\n\n你可能会注意到，这些原则是通用且相当有限的。REST 被证明是一种简洁且可维护的 Web 服务开发方法，因为开发者无需像使用 SOAP 协议那样理解大量复杂的细节。但它允许类似的互操作性，因为\
  \ HTTP 和 JSON（作为主要的 REST 传输格式）在所有主流编程语言中都得到了良好的支持。有限数量的允许操作使得创建各种框架成为可能，这些框架可以基于领域模型生成\
  \ REST API。Spring 世界中的一个例子是 Spring Data REST，开发者只需指定 JPA 实体。应用程序的其余部分，包括 Web 层，将使用\
  \ REST 约定创建。\n\n当一个应用遵循所有 REST 原则时，通常被称为*RESTful*。但请记住，REST 不是一个协议、标准或框架。因此，当有充分理由时，没有什么能阻止我们放弃其任何原则。但在那种情况下，我们就不能再称我们的应用为\
  \ RESTful 了。\n\n尽管 REST 似乎几乎适用于所有场景，但事实并非如此。使用 HTTP 作为应用协议可以提升性能，因为我们在较低的层次上操作。但我们必须为每个资源实例的每个\
  \ CRUD 操作执行一次 HTTP 调用。有时，用例需要对多个资源实例执行各种 CRUD 操作。为此类用例执行大量 HTTP 调用可能会给应用带来性能问题。这种情况是放弃某些\
  \ REST 原则的合适时机。\n\n例如，假设客户端需要读取用户信息（如电子邮件地址和姓名）以及用户操作。遵循纯粹的 REST 原则，我们会设计两个资源：例如\
  \ `user` 和 `userAction`。但出于性能考虑，我们可能希望将这两个资源聚合到一个响应中，这样客户端只需执行一次 HTTP 调用，而不是两次。\n\
  \n另一个例子是需要在我们的 REST 应用中实现实时聊天功能。在这种情况下，我们可能会使用 WebSocket 来实现一个端点，以满足这种非 CRUD 的双向通信。但所有其他端点仍然可以遵循\
  \ REST 原则。\n\nHTTP 概述\n\n*超文本传输协议*（HTTP）是为分布式系统交换超文本数据而设计的。它位于开放系统互连（OSI）模型的应用层。\n\
  \n![图片](img/sq.jpg) **注意** OSI 模型是用于设计通信系统的标准化分层模型。它超出了本书的讨论范围。探索它的一个好起点是其维基百科页面：`http://en.wikipedia.org/wiki/OSI_model`。\n\
  \nHTTP 是驱动万维网（WWW）的主要协议，因此它可能是地球上使用最广泛的应用协议。顾名思义，它被设计用于交换*超链接*，即 Web 上文档之间的逻辑链接。客户端与服务器之间的通信由客户端向服务器发送\
  \ HTTP 请求消息发起。服务器处理该请求并发回 HTTP 响应。\n\n因此，HTTP 消息有两种类型：请求和响应。清单 4-1 和 清单 4-2 分别展示了每种类型的示例。\n\
  \n\n\n![Image](img/sq.jpg) **注意** 对于测试 HTTP 应用程序（包括 REST），我发现 Chrome 插件 DHC - REST/HTTP\
  \ API Client (`https://chrome.google.com/webstore/detail/dhc-resthttp-api-client/aejoelaoggembcahagimdiliamlcdmfm`)\
  \ 和 Advanced REST Client (`https://chrome.google.com/webstore/detail/advanced-rest-client/hgmloofddffdnphfgcellkdfbfbjeloo/`)\
  \ 非常方便。一个常用于测试的更复杂工具是 SoapUI (`www.soapui.org`)。其免费版本对于测试 REST 端点来说功能足够强大，但用户界面不够现代。一个类似的工具是\
  \ Apache JMeter ([`jmeter.apache.org/`](https://jmeter.apache.org/))，但它更侧重于性能测试。对于故障排除和嗅探\
  \ HTTP 通信（包括检查原始 HTTP 消息），我建议使用 Zed Attack Proxy（简称 ZAP）(`www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project`)。这是一个开放\
  \ Web 应用程序安全项目（OWASP）的子项目，用于渗透测试，但也对开发 REST API 很有用。\n\n***清单 4-1***。HTTP 请求消息\n\
  \n```\nGET http://localhost:10403/users/1 HTTP/1.1\nProxy-Connection: keep-alive\n\
  Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8\n\
  User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko)\
  \ Chrome/41.0.2272.101 Safari/537.36\nAccept-Encoding: sdch\nAccept-Language: en-US,en;q=0.8,sk;q=0.6\n\
  Host: localhost:10403\n```\n\n***清单 4-2***。HTTP 响应消息\n\n```\nHTTP/1.1 200 OK\nServer:\
  \ Apache-Coyote/1.1\nContent-Type: application/json;charset=UTF-8\nDate: Tue, 31\
  \ Mar 2015 21:06:27 GMT\n\n{\"email\": \"lubos.krnac@gmail.com\",\"name\": \"Lubos\
  \ Krnac\"}\n```\n\n请求和响应消息的结构相似，实际上仅在第一行有所不同。以下是超文本传输协议描述的 HTTP 消息的组成部分：\n\n*  \
  \ 初始行\n    *   在请求消息中，这是一个请求行，包含以下内容：\n        *   HTTP 方法\n        *   带有目标 URL\
  \ 的主机名\n        *   HTTP 版本\n    *   在响应消息中，这是一个状态行，包含以下内容：\n        *   HTTP 版本\n\
  \        *   状态码\n        *   状态消息\n*   头部\n*   空行\n*   可选的消息体\n\n嵌入在响应消息中的一个重要信息是\
  \ HTTP 状态码。它采用三位数字的形式，应告知客户端请求处理的结果。在某些情况下，状态码关乎服务器健康。为方便起见，状态码按百位分组：\n\n*   *100+\
  \ 信息性*：告知客户端服务尚未完成请求处理，完整的响应将在稍后发送。\n*   *200+ 成功*：告知客户端请求已被服务器接收、理解、接受并处理。\n* \
  \  *300+ 重定向*：告知客户端需要进一步操作才能处理请求。此类场景通常用于 URL 重定向。\n*   *400+ 客户端错误*：告知客户端发生了错误，且很可能是由客户端发送了不正确的请求导致的。此类错误通常可由客户端修复。服务器必须提供足够的错误信息，以便客户端能够找出问题所在。\n\
  *   *500+ 服务器错误*：告知客户端发生了服务器错误，该错误无法通过客户端干预来修复。此类错误通常表明服务器应用程序已宕机或无响应。\n\n并非这些区间内的所有错误码都被占用。HTTP\
  \ 的发明者具有前瞻性，在错误码中为协议的后续修订预留了足够的空间——包括未来可能引入的状态码，或使用 HTTP 的应用程序可能引入的自定义状态码。\n\n![Image](img/sq.jpg)\
  \ **注意** 列出 HTTP 状态码超出了本书的范围。一个用于检查这些状态码及其约定的有用资源位于 `www.restapitutorial.com/httpstatuscodes.html`。该资源包含了来自\
  \ HTTP 规范以及维基百科的引用。\n\n某些状态码组需要在响应中包含特定的头部。例如，当状态码为 201 Created（表示资源已通过请求成功创建）时，响应应包含\
  \ `Location` 头部，以便客户端知道在哪里找到已创建的资源。\n\nHTTP 消息的头部是可选的。存在多种类型的 HTTP 头部：\n\n*   请求头部（标准和非标准）\n\
  *   响应头部（标准和非标准）\n*   自定义头部\n\n前两类头部由服务器或客户端用于控制通信的各个方面。一些头部用于告知对方信息（例如，用户接受哪种内容类型，或正在使用哪种浏览器类型）。其他头部在通信中具有更深层的功能（例如，可以开启有效负载的压缩或控制缓存）。\n\
  \n![Image](img/sq.jpg) **注意** 默认 HTTP 头部的列表超出了本书的范围。维基百科提供了 HTTP 头部的良好概述：`http://en.wikipedia.org/wiki/List_of_HTTP_header_fields`。\n\
  \n自定义头部旨在供业务逻辑使用。\n\nREST 使用的 HTTP 方法\n\n我们提到过，REST 原则依赖于可对资源实例执行的有限数量的操作。如前所述，这些操作通常称为\
  \ CRUD。HTTP（在 REST 世界中用作应用协议）包含了执行这些操作的方法。\n\nHTTP 方法的一个重要参数是*幂等性*：如果多次发送相同的请求，HTTP\
  \ 调用将产生相同的效果。此原则并非 HTTP 特有，可应用于各种用例，包括数学领域。例如，任何数乘以 1 是一个幂等操作，因为任何数都可以多次乘以 1 而得到相同的结果。另一个数学示例是与\
  \ true 值进行逻辑或运算。来自计算机世界的示例包括从数据库读取记录或更新数据库中的记录。\n\n然而，并不能保证一系列不同的幂等操作会产生相同的结果。例如，如果我们在读取同一记录的同时还执行了更新操作，那么对同一记录的一系列数据库读取可能就不是幂等的。\n\
  \nHTTP 方法的下一个重要参数是*安全性*。安全方法没有副作用；执行操作时不会改变应用程序的状态。例如，从数据库读取记录没有任何副作用，因为数据库中持久化的状态保持不变。\n\
  \n以下是 REST 服务中用于执行 CRUD 操作的 HTTP 方法：\n\n`GET`：\n\n*   用于读取资源表示\n*   幂等操作，因为重复读取应返回相同结果\n\
  *   安全操作，因为读取资源不应改变应用程序的状态\n*   `GET` 的只读性质决定了它是可缓存的\n*   请求不应包含消息体\n*   响应应在消息体中包含资源的表示\n\
  *   常用的成功响应状态码：\n    *   200 OK——资源读取成功\n    *   204 No Content——资源不存在\n\n`POST`：\n\
  \n\n\n*   基于通用资源 URL 创建资源的新实例\n*   非幂等操作，因为重复请求应创建新资源\n*   应在响应中返回 `Location` 标头，以标识所创建的资源实例\n\
  *   不安全操作，因为重复创建会通过创建新资源实例来改变状态\n*   请求应在消息体中包含资源的表示形式\n*   响应通常不包含消息体\n*   常用的响应成功状态码：\n\
  \    *   201 Created（已创建）——资源创建成功\n\n`PUT`：\n\n*   用于更新或创建由具体 URI 指定的资源实例\n*   幂等操作，因为它不会每次都创建新的资源实例。第一次会创建新实例；后续则更新同一实例。因此每次请求的效果相同。\n\
  *   不安全操作，因为它会改变应用程序的状态\n*   请求应在消息体中包含资源的表示形式\n*   响应通常不包含消息体\n*   常用的响应成功状态码：\n\
  \    *   200 OK（成功）——资源已更新\n    *   201 Created（已创建）——资源已创建\n\n`DELETE`：\n\n*  \
  \ 释放基于给定 URI 的资源实例\n*   幂等操作，因为所有删除同一资源实例的请求结果相同——资源实例被释放。\n*   不安全操作，因为它会改变应用程序的状态\n\
  *   此类型的请求或响应不应包含消息体\n*   常用的响应成功状态码：\n    *   200 OK（成功）——资源已删除\n    *   204 No\
  \ Content（无内容）——资源不存在\n\n`HEAD`：\n\n*   类似于 `GET`，但仅读取标头而不读取消息体\n*   幂等且安全的操作\n\
  *   也可缓存\n*   此类型的请求或响应不应包含消息体\n*   常用的响应成功状态码：\n    *   200 OK（成功）——资源读取成功\n  \
  \  *   204 No Content（无内容）——资源不存在\n\n![Image](img/sq.jpg) **注意**  HTTP 方法类型的完整列表可在维基百科上找到：`en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods`。\n\
  \n开发人员必须牢记，只有在遵循 HTTP 标准时，这些 HTTP 方法的安全性和幂等性参数才能得到满足。不幸的是，许多应用程序在实现时并未考虑这些参数，甚至违反了\
  \ HTTP 契约规则。此类应用程序破坏了 HTTP 契约，因此不能被称为 RESTful。\n\n并非每个资源都需要实现所有方法。例如，根据应用程序需求，某些资源是只读的，因此服务器无需处理\
  \ `POST`/`PUT`/`DELETE`。因此，如果对只读资源执行此类请求，服务器应发送 HTTP 状态码 405 Method Not Allowed（方法不允许）。\n\
  \nJAX-RS\n\n在 Java 中，对开发 REST 应用程序的支持由标准 API 提供，该 API 是 Java 企业版（JEE）标准的一部分。其名称为\
  \ Java API for RESTful Web Services，简称 JAX-RS（`https://jax-rs-spec.java.net`）。与\
  \ JEE 的所有 API 一样，JAX-RS 并非 REST 支持的具体实现，而是一种标准抽象。要在生产环境中运行和使用此 API，需要符合 JEE 标准的应用服务器，或至少是符合\
  \ JAX-RS 标准的服务器。\n\nJEE 提供的所有 API 都采用类似的方法。每个 API 的抽象层可以有多种实现。JEE 标准的创建是为了统一不同供应商提供的\
  \ Java 应用服务器的表层。当大多数 API 相同时，从一个符合 JEE 标准的服务器迁移到另一个服务器会容易得多。此外，利用 JEE API 可以复用经验和\
  \ JEE API 知识，从而降低开发人员迁移到不同应用服务器的学习曲线。\n\nJAX-RS 实现\n\n因此，当我们想要使用 JAX-RS 时，还需要一个应用服务器或实现此\
  \ API 的轻量级运行时。由于 JAX-RS 是 Servlet 之上的抽象层，我们必须将其与 Servlet 容器一起使用。以下是实现 JAX-RS 的主要应用服务器或运行时：\n\
  \n*   *Jersey*：JAX-RS API 的参考实现。可单独使用，也可由 Oracle 作为 GlassFish JEE 应用服务器的一部分提供。\n\
  *   *Apache CXF*：支持 SOAP 和 REST Web 服务的框架，并支持 JMS、OSGi 和 CORBA。\n*   *RESTEasy*：JAX-RS\
  \ 的实现，可在任何 Servlet 容器上运行。可单独使用，也可与 JBoss 应用服务器一起使用。\n*   *Restlet*：开源 JAX-RS 实现，可与多种\
  \ Java 技术和框架集成。\n*   *WebSphere Application Server*：IBM 提供的完整符合 JEE 标准的商业解决方案。\n\
  *   *WebLogic Server*：Oracle 提供的完整符合 JEE 标准的商业解决方案。\n*   *Apache Tuscany*：在更广泛支持服务组件架构（SCA）规范的同时提供\
  \ REST 支持。\n\nJAX-RS API\n\nJAX-RS API 的主要表层由用于声明 Java REST 端点的各种注解组成。我们有以下用于声明的注解：\n\
  \n*   URL 映射——`@Path`\n*   HTTP 方法绑定——`@GET`、`@HEADER`、`@POST`、`@PUT`、`@DELETE`\n\
  *   内容类型处理\n    *   `@Produces`：端点生成的内容类型\n    *   `@Consumes`：端点可消费的内容类型\n*   从\
  \ HTTP 消息中提取数据\n    *   `@QueryParam`：从 URI 的查询部分解析参数值\n    *   `@PathParam`：从 URI\
  \ 解析参数值\n    *   `@HeaderParam`：解析 HTTP 标头\n    *   `@DefaultValue`：如果未找到参数绑定，则指定默认值\n\
  \    *   `@Context`：检索请求或响应的完整上下文（例如，`@Context HttpServletRequest httpRequest`）\n\
  \    *   `@CookieParam`：将 Cookie 值检索到方法参数中\n    *   `@FormParam`：将表单值检索到方法参数中\n\n\
  借助这些注解，我们可以对 HTTP 消息元数据的解析和处理进行强大控制。对于处理 HTTP 消息有效负载本身，JAX-RS 与各种有效负载序列化库集成。因此，为了将\
  \ Java 对象转换为 JSON、XML 及其他格式并转换回来，JAX-RS 可以与 Jackson（JSON 序列化库）或 JAXB 2（XML 序列化库）等主流库集成。在大多数情况下，我们无需直接调用这些库，因为\
  \ JAX-RS（更准确地说，是我们正在使用的 JAX-RS 实现）会在底层使用它们。\n\n示例中使用的公共类\n\n让我们深入一个简单的示例。由于本书是关于\
  \ Spring 的，我们将把 JAX-RS 与 Spring 集成。但首先，我们需要介绍本章所有示例的领域模型。一个简单的模型 POJO 如清单 4-3 所示。\n\
  \n***清单 4-3***. 所有 REST 示例中使用的模型 POJO（0400-rest-common）\n\n```\npackage net.lkrnac.book.eiws.chapter04.model;\n\
  \nimport lombok.Data;\nimport lombok.EqualsAndHashCode;\n\n@Data\n@EqualsAndHashCode(of\
  \ = { \"email\" })\npublic class User {\n  private String email;\n  private String\
  \ name;\n}\n```\n\n这是一个简单的类，对 `User` 对象进行了简化建模。这个简单 POJO 的属性应存储电子邮件地址和用户名。这样的简化模型足以演示\
  \ REST API 的开发。\n\n在某些示例中，我们需要比较 `User` 对象的相等性。传统上，我们会重写 `Object.hashCode` 和 `Object.equals`\
  \ 方法来满足 Java 哈希码和相等性契约。\n\n\n\n但我们的实现使用了第三方库 Lombok（`https://projectlombok.org`）。Lombok\
  \ 是一个便捷的生产力库，旨在消除 Java 语言中一些冗长的部分。`hashCode` 和 `equals` 方法由 `@EqualsAndHashCode`\
  \ 注解生成。由于我们只需要在相等性契约中使用 `email` 属性，因此在注解参数 `of` 中指定了它。如果我们没有显式指定，Lombok 将在哈希/相等性契约中使用\
  \ `User` POJO 的所有属性。\n\n此外，Lombok 通过 `@Data` 注解帮助我们为 `User` 类中的所有属性生成 getter 和 setter\
  \ 方法。\n\n![Image](img/sq.jpg) **注意**  `Object.equals` 和 `Object.hashCode` 是面向对象\
  \ Java 编程中需要理解的基本原则：相等的对象必须具有相等的哈希码。正确的实现可以确保对象在 Java 集合中被平等对待并正确处理。错误的实现可能导致令人困惑的\
  \ bug。`hashCode` 和 `equals` 的实现可能冗长且容易出错；开发者可能会引入许多问题。这些问题大多汇集在 Stack Overflow 的答案中：`http://stackoverflow.com/questions/27581/what-issues-should-be-considered-when-overriding-equals-and-hashcode-in-java`。因此，我*强烈建议*在重写\
  \ `Object.hashCode` 和 `Object.equals` 契约时，查看 Lombok 库（`http://projectlombok.org/features/EqualsAndHashCode.html`）。\n\
  \n清单 4-4 展示了将在大多数 REST 示例中使用的第二个类。\n\n***清单 4-4***. 所有 REST 示例中使用的用户仓库 (0400-rest-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.persistence;\n\nimport java.util.Collection;\n\
  import java.util.Collections;\nimport java.util.HashMap;\nimport java.util.Map;\n\
  import java.util.stream.Collectors;\nimport net.lkrnac.book.eiws.chapter04.model.User;\n\
  import org.springframework.stereotype.Repository;\n\n@Repository\npublic class UserRepository\
  \ {\n  private final Map<Integer, User> users = new HashMap<>();\n  private int\
  \ userSequence;\n\npublic synchronized Collection<User> getAllUsers() {\n    return\
  \ Collections.unmodifiableCollection(users.values());\n  }\n\npublic synchronized\
  \ User getUser(int identifier) {\n    if (identifier == -1) {\n      throw new UnsupportedOperationException(\"\
  Identifier -1 is not supported.\");\n    }\n    return users.get(identifier);\n\
    }\n\npublic synchronized int addUser(User user) {\n    users.put(userSequence,\
  \ user);\n    return userSequence++;\n  }\n\npublic synchronized void updateOrAddUser(int\
  \ identifier, User user) {\n    users.put(identifier, user);\n  }\n\npublic synchronized\
  \ User deleteUser(int identifier) {\n    return users.remove(identifier);\n  }\n\
  \npublic synchronized Collection<User> getUsersInterval(int lowerId, int upperId)\
  \ {\n    //@formatter:off\n    Collection<User> usersInIdInterval = users.entrySet().stream()\n\
          .filter(p -> p.getKey() >= lowerId && p.getKey() <= upperId)\n        .collect(Collectors.toMap(p\
  \ -> p.getKey(), p -> p.getValue()))\n        .values();\n    //@formatter:on\n\
      return Collections.unmodifiableCollection(usersInIdInterval);\n  }\n}\n```\n\
  \n`UserRepository` 类使用 `@Repository` 注解进行标注，以表明它是一个位于持久化层的 Spring Bean。为了简化示例，这里为\
  \ `User` 对象定义了一个简单的内存缓存，即 `Map<Integer, User>`。但这种缓存不适合生产环境使用。缓存和持久化应用状态应由专门的数据库或经过实战考验的内存网格来处理。此外，这种特定用法也违反了无状态\
  \ REST 原则。但为了简单起见，我们假设这个类正在调用一个持久化层来存储 `User` 对象。毕竟我们关注的是 Web 层。\n\n首先，`getAllUsers`\
  \ 方法返回此缓存中存储的所有用户的映射。返回的映射被封装在一个不可修改的包装器中，以确保其实例在应用程序运行期间不会被替换。`getUser` 方法根据给定的标识符返回单个\
  \ `User` 对象。为了突出错误处理特性，我们不支持 `-1` 作为用户标识符，并抛出 `UnsupportedOperationException`。\n\
  \n`addUser` 方法稍微复杂一些。它使用一个名为 `userSequence` 的标识符计数器，为新创建的 `User` 对象分配一个唯一标识符，然后递增其值。`updateOrAddUser`\
  \ 方法接受 `identifier` 和 `User` 参数，并将此实例替换或添加到由该标识符表示的映射槽中。`deleteUser` 方法简单地从映射中移除该对象。\n\
  \n该类中的最后一个方法是 `getUsersInterval`。它根据给定的标识符区间读取一组用户。这不是一个真实的用例，但它有助于演示 Spring MVC\
  \ 映射的一些特性。读取逻辑使用了 Java 8。首先，我们将映射转换为流并应用过滤。值的过滤基于标识符的下限和上限。过滤后，我们将结果收集到一个映射中，并将值包装到一个不可修改的映射中。这样我们就得到了一个经过过滤的用户集合。\n\
  \n此实现的另一个问题是 `UserService` 的单例 Bean 作用域。从多线程的角度来看，单例中的字段/缓存/状态总是危险的。我们的应用程序很容易同时处理各种请求。这些请求在不同的线程中处理。在这种情况下，不同的线程可能同时访问这个内存缓存。我们需要使这个类线程安全，因此我们使所有访问缓存的方法都同步。这不是一种有效的缓存方法，但正如我们提到的，这仅用于示例目的。\n\
  \n你可能会问，为什么不使用 `ConcurrentHashMap` 作为映射实现并排除同步呢？但请记住，`addUser` 方法包含两个应该是原子性的操作（添加到映射，以及读取并递增序列）。如果采用没有同步的\
  \ `ConcurrentHashMap` 方法，这将不是原子性的，并可能导致线程不安全的场景。例如，两个线程可能使用相同的序列号来存储不同的对象，从而导致其中一个对象丢失。\n\
  \n清单 4-5 展示了在示例中大量使用的下一个类。\n\n***清单 4-5***. 所有 REST 示例中使用的用户仓库 (0400-rest-common)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.service;\n\nimport java.util.Collection;\n\
  import net.lkrnac.book.eiws.chapter04.model.User;\nimport net.lkrnac.book.eiws.chapter04.persistence.UserRepository;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
  \n@Service\npublic class UserService {\n  private final UserRepository userRepository;\n\
  \n@Autowired\n  public UserService(UserRepository userRepository) {\n    super();\n\
      this.userRepository = userRepository;\n  }\n\npublic Collection<User> getAllUsers()\
  \ {\n    return userRepository.getAllUsers();\n  }\n\npublic User getUser(int identifier)\
  \ {\n    return userRepository.getUser(identifier);\n  }\n\npublic int addUser(User\
  \ user) {\n    return userRepository.addUser(user);\n  }\n\npublic void updateOrAddUser(int\
  \ identifier, User user) {\n    userRepository.updateOrAddUser(identifier, user);\n\
    }\n\npublic User deleteUser(int identifier) {\n    return userRepository.deleteUser(identifier);\n\
    }\n\npublic Collection<User> getUsersInterval(int lowerId, int upperId) {\n    return\
  \ userRepository.getUsersInterval(lowerId, upperId);\n  }\n\n}\n```\n\n这是 `UserRepository`\
  \ 的一个简单透传包装器。我们将其包含进来，是为了遵循最常见的三层应用模型（Web/服务/持久化层）。\n\n\n\n清单 4-6 展示了我们将在所有 REST\
  \ 示例中使用的最后一个类：一个保存 URL 常量的类。\n\n***清单 4-6***. 所有 REST 示例中使用的 URL 常量\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter04;\n\npublic final class UrlConstants {\n  private\
  \ UrlConstants() {\n  }\n\npublic static final String USERS_URL = \"/users\";\n\
  }\n```\n\n该类被定义为 final，并拥有一个私有构造函数，以禁止对该类进行实例化和继承。它包含一个常量，该常量代表示例中映射的根 REST 资源。该常量帮助我们多次重用同一个字符串字面量。\n\
  \nJAX-RS 端点\n\n在定义了服务层（假设它负责从经过实战检验且可靠的持久化存储中读取/写入我们的 `User` 对象）之后，我们可以进入 REST API\
  \ 示例。清单 4-7 展示了 JAX-RS 端点的实现。\n\n***清单 4-7***. JAX-RS 端点实现 (0401-rest-jax-rs-server)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.jaxrs;\n\nimport java.net.URI;\nimport\
  \ java.net.URISyntaxException;\nimport java.util.Collection;\nimport javax.ws.rs.Consumes;\n\
  import javax.ws.rs.DELETE;\nimport javax.ws.rs.GET;\nimport javax.ws.rs.POST;\n\
  import javax.ws.rs.PUT;\nimport javax.ws.rs.Path;\nimport javax.ws.rs.PathParam;\n\
  import javax.ws.rs.Produces;\nimport javax.ws.rs.WebApplicationException;\nimport\
  \ javax.ws.rs.core.MediaType;\nimport javax.ws.rs.core.Response;\nimport net.lkrnac.book.eiws.chapter04.UrlConstants;\n\
  import net.lkrnac.book.eiws.chapter04.model.User;\nimport net.lkrnac.book.eiws.chapter04.service.UserService;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Path(UrlConstants.USERS_URL)\n@Component\npublic class UserResource {\n  private\
  \ final UserService userService;\n\n@Autowired\n  public UserResource(UserService\
  \ userService) {\n    super();\n    this.userService = userService;\n  }\n\n@GET\n\
    @Produces(MediaType.APPLICATION_JSON)\n  public Collection<User> getUsers() {\n\
      return userService.getAllUsers();\n  }\n\n@GET\n  @Path(\"/{id}\")\n  @Produces(MediaType.APPLICATION_JSON)\n\
    public User getUser(@PathParam(\"id\") int identifier) {\n    try {\n      return\
  \ userService.getUser(identifier);\n    } catch (UnsupportedOperationException uoe)\
  \ {\n      throw new WebApplicationException(uoe, Response.Status.BAD_REQUEST);\n\
      }\n  }\n\n@POST\n  @Consumes(MediaType.APPLICATION_JSON)\n  public Response\
  \ postUser(User user) throws URISyntaxException {\n    int identifier = userService.addUser(user);\n\
      URI uri = new URI(UrlConstants.USERS_URL + \"/\" + identifier);\n    return\
  \ Response.created(uri).build();\n  }\n\n@PUT\n  @Path(\"/{id}\")\n  @Consumes(MediaType.APPLICATION_JSON)\n\
    public Response putUser(@PathParam(\"id\") int identifier, User user)\n      throws\
  \ URISyntaxException {\n    userService.updateOrAddUser(identifier, user);\n    return\
  \ Response.ok().build();\n  }\n\n@DELETE\n  @Path(\"/{id}\")\n  public Response\
  \ deleteUser(@PathParam(\"id\") int identifier) {\n    userService.deleteUser(identifier);\n\
      return Response.ok().build();\n  }\n}\n```\n\n`@Path` 注解将 `UserResource` 类绑定到\
  \ `/users` URI。当根 URI 为 `/users` 的请求到达我们的应用程序时，将由该类处理。`@Component` 注解将 `UserResource`\
  \ 类声明为一个 Spring 单例 bean。在构造函数中，我们注入了 `UserService`，它用于持久化 `User` 对象。\n\n接下来是处理 `GET`、`POST`\
  \ 和 `DELETE` HTTP 方法的四个方法。`getUsers()` 方法读取所有用户的集合并将其返回给消费者。它生成 JSON 内容类型，这意味着响应将包含值为\
  \ `application/json` 的 HTTP 头 `Content-Type`。此头信息应告知消费者负载的格式。`@Produces` 注解还指示底层的\
  \ JAX-RS 实现（此处为 Jersey）使用 Jackson JSON 序列化库。它将 `User` 对象的集合转换为 JSON 数组负载结构。\n\n\
  接下来，`getUser(int identifier)` 方法也使用 `@GET` 注解读取具体的 `User` 对象。这个具体对象由 URI 路径参数 `identifier`\
  \ 标识。因此，URI `/users/1` 应执行对标识符为 1 的用户实例的读取操作。为了从 URI 中解析出标识符，我们使用了 `@PathParam`\
  \ 注解。此解析的前提是在路径绑定中指定占位符，其中 `@Path` 注解声明了占位符 `/{id}`。`/users/` 之后的任何 URI 部分都将映射到由\
  \ `@PathParam(\"id\")` 注解的参数 `identifier` 上。注解参数 `id` 将 `identifier` 绑定到路径占位符 `/{id}`。返回值对象\
  \ `User` 由底层的 Jackson 库转换为 JSON 负载。\n\n`postUser` 方法绑定到 `POST` HTTP 方法。`@Consumes`\
  \ 注解表明此端点期望一个 JSON 负载。消息体由 Jackson JSON 序列化器库转换为 `User` 对象，并作为参数注入到方法中。在将此对象传递给下层进行存储后，我们需要向消费者发送一条消息，其中包含\
  \ HTTP 状态码 201 Created 以及新创建对象的 `Location` 头。为了创建这样的 HTTP 响应，使用了 `javax.ws.rs.core.Response`\
  \ 工厂。它可以覆盖大多数常见的 HTTP 响应以及自定义状态码。`Location` 头通过响应创建调用 `Response.created(uri).build()`\
  \ 的 `uri` 参数来定义。\n\n`putUser` 方法处理 `PUT` HTTP 方法。它负责创建或更新给定的 `User` 记录。此记录作为 JSON\
  \ 负载接收，并转换为方法参数 `User`。该方法的第二个参数是标识符，其提取方式与 `getUser` 方法类似，从 URL 中提取。为了执行上述操作，它通过调用\
  \ `userService.updateOrAddUser` 将请求委托给服务层。如果一切顺利，它会发回 HTTP 状态码 200 OK。\n\n`deleteUser`\
  \ 方法借助 `@DELETE` 注解映射到 `DELETE` HTTP 方法。它结合了前述方法来解析 URL 参数并构建包含 HTTP 状态码 200 OK\
  \ 的响应消息。它调用 `UserService.deleteUser` 方法来释放给定的用户实例。\n\n将 `UserResource` bean 注册到控制反转容器中，对于\
  \ Spring 和 JAX-RS 的集成来说是不够的。每个这样的 bean 都需要注册到 Jersey 资源配置中，如清单 4-8 所示。\n\n***清单\
  \ 4-8***. 将 JAX-RS/Spring Bean 注册到 Jersey 资源配置中 (0401-rest-jax-rs-server)\n\n```\n\
  package net.lkrnac.book.eiws.chapter04.jaxrs;\n\nimport org.glassfish.jersey.server.ResourceConfig;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class EndpointRegister\
  \ extends ResourceConfig {\n  public EndpointRegister() {\n    super();\n    register(UserResource.class);\n\
    }\n}\n```\n\n\n\n`EndpointRegister` 类使用了 Spring 的 `@Component` 注解进行标注，并继承了 `org.glassfish.jersey.server.ResourceConfig`。这体现了\
  \ Spring 与 Jersey 的集成。端点 Bean 应在此类的构造函数中注册。在本例中，仅注册了 `UserResource` Bean。\n\n清单\
  \ 4-9 是负责将此示例作为 Java 应用程序启动的主类。\n\n***清单 4-9***. JAX-RS 应用程序的主类 (0401-rest-jax-rs-server)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.boot.context.web.SpringBootServletInitializer;\n\
  \n@SpringBootApplication\npublic class RestJaxrsApplication extends SpringBootServletInitializer\
  \ {\n  public static void main(String... args) {\n    SpringApplication.run(RestJaxrsApplication.class,\
  \ args);\n  }\n}\n```\n\n我们使用 Spring Boot 项目来轻松地将应用程序托管在嵌入式 Tomcat Servlet 容器中。这是一种相对较新且便捷的运行\
  \ Spring 应用程序的方式。`@SpringBootApplication` 注解将多种 Spring 注解整合在一起。它会触发对声明了该注解的类所在包及其子包的组件扫描（等同于\
  \ `@ComponentScan`）。它还包含了 `@EnableAutoConfiguration` 这个 Spring Boot 注解，该注解会检查类路径中的\
  \ JAR 依赖项，并注册一些合理的默认 Bean。在本例中，我们使用的是 JAX-RS 的实现 Jersey。因此，它会启动嵌入式 Tomcat 容器。该类继承自\
  \ `SpringBootServlerInitializer`，后者负责处理我们的 Servlet 配置。默认情况下，它会将所有端点映射到根 URL `/`。在\
  \ main 方法中，我们调用了 `SpringApplication.run`，并将 Spring 配置类作为参数传入。因此，`RestJaxrsApplication`\
  \ 类既被用作 Spring 配置，也是我们应用程序的主类。\n\n清单 4-10 涵盖了 Spring Boot 属性。这些属性帮助我们配置端口为 10401\
  \ 的嵌入式 Tomcat 容器，启动 Spring 的 JAX-RS 集成，并配置 Jersey 以托管 Servlet。\n\n***清单 4-10***.\
  \ JAX-RS 和 Spring Boot 示例属性 (示例项目 0401-rest-jax-rs-server 中 src/main/properties\
  \ 文件夹下的 application.properties 文件)\n\n```\nserver.port=10401\nspring.jersey.type=servlet\n\
  ```\n\n从 Java 应用程序运行 `RestJaxrsApplication` 类后，我们可以向服务器执行 HTTP REST 请求。为此，我们可以使用\
  \ Chrome 插件 DHC - REST/HTTP API Client (`https://chrome.google.com/webstore/detail/dhc-resthttp-api-client/aejoelaoggembcahagimdiliamlcdmfm`)。图\
  \ 4-2 展示了针对此运行中的应用程序执行的 `POST` 请求。\n\n![9781484207949_Fig04-02.jpg](img/9781484207949_Fig04-02.jpg)\n\
  \n图 4-2. 针对 JAX-RS 示例的 HTTP POST 请求\n\n在 DHC - REST/HTTP API Client 屏幕的上半部分，我们需要指定要发送的请求。在本例中，我们需要指定\
  \ REST 端点的 URL，即 `http://localhost:10401/users`。接下来，我们需要选择 HTTP 方法（此处为 `POST`），最后，在请求体部分指定要发送给服务器的\
  \ JSON 负载。\n\n点击发送按钮后，如果一切配置正确，响应将显示在下方。在本例中，服务器指示资源实例已创建，并向我们发送了 `Location` HTTP\
  \ 头。这为我们提供了所创建资源实例的完整 URL。它还显示了分配给该用户的 ID。在本例中，ID 为 0。\n\n图 4-3、4-4 和 4-5 展示了使用\
  \ HTTP `GET`、`PUT` 和 `DELETE` 方法的类似操作。\n\n![9781484207949_Fig04-03.jpg](img/9781484207949_Fig04-03.jpg)\n\
  \n图 4-3. 针对 JAX-RS 示例的 HTTP GET 请求\n\n![9781484207949_Fig04-04.jpg](img/9781484207949_Fig04-04.jpg)\n\
  \n图 4-4. 针对 JAX-RS 示例的 HTTP PUT 请求\n\n![9781484207949_Fig04-05.jpg](img/9781484207949_Fig04-05.jpg)\n\
  \n图 4-5. 针对 JAX-RS 示例的 HTTP DELETE 请求\n\n这种 Spring 与 JAX-RS 的集成为开发 REST Web 服务提供了一种全面的方法。即使\
  \ Spring 提供了自己的替代 API，它也受到 Spring 生态系统的支持。\n\nSpring MVC\n\n*Spring MVC* 是 Spring\
  \ Web 支持的核心模块。其约定是 JAX-RS 抽象的竞争对手。顾名思义，这个 Spring 模块最初并非为开发 REST 服务而设计。但自 Spring\
  \ Framework 3.0 版本以来，用于模型-视图-控制器（MVC）架构风格的 API 已经足够成熟，足以涵盖 REST 的相关需求。这是一个双赢的局面，因为熟悉\
  \ MVC API 的开发人员可以轻松切换到 REST 端点开发，反之亦然。\n\nJAX-RS 面向应用程序到应用程序的通信。因此，我们可以使用任何主流编程平台（包括浏览器中的\
  \ JavaScript）开发的客户端与 REST 服务器进行通信。但有时，我们可能需要使用纯 HTML 作为端点的消费者。关于 HTML 的一个重要事实是，它仅支持\
  \ `GET`（例如，用户点击网页链接时）和 `POST`（例如，用户提交 HTML 表单时）HTTP 方法。问题在于，对于纯 HTML 来说，缺少 `DELETE`、`PUT`\
  \ 和 `HEADER` HTTP 方法。这对 JAX-RS 来说将是一个重大问题，因为它不期望如此受限的环境。\n\nSpring MVC 通过一种称为 *HTTP\
  \ 方法转换* 的技术支持浏览器作为 REST 客户端。此概念背后的主要思想是使用 HTML 表单执行带有隐藏表单参数的 `POST`。该参数应指定要执行的所需\
  \ HTTP 方法，可以是 `DELETE`、`HEADER` 或 `PUT`，而不是 `POST`。在服务器端，我们可以注册一个 Servlet 过滤器，该过滤器会将\
  \ HTML `POST` 请求转换为由隐藏表单输入参数定义的 HTTP 请求。但此功能超出了本书的范围。\n\nSpring MVC 和 JAX-RS 之间的另一个区别在于客户端\
  \ API 支持。JAX-RS 在 2.0 版本中引入了客户端 API。此版本的 JAX-RS 是标准 Java EE 7 的一部分。因此，如果我们运行的是较旧的\
  \ Java EE 版本，则没有原生的 JAX-RS 客户端 API 支持。而企业公司通常停留在 Java EE 5 或 6 上，这主要是因为昂贵的 Java\
  \ EE 应用服务器的许可成本，因为升级对公司来说可能是一笔重大投资。使用 Spring MVC，即使在较旧的 Java EE 应用服务器中，您也可以使用客户端\
  \ API，因为 Spring Framework 是轻量级的，并且可以轻松地插入任何 Java EE 平台。\n\nSpring MVC 模块相对于 JAX-RS\
  \ 的一个显著优势是对测试的支持。Spring MVC 测试模块提供了强大的模拟构造，允许对服务器端和客户端进行集成测试或单元测试。这些构造允许在 Servlet\
  \ 容器之外测试映射。这在持续集成中是一个巨大的优势。\n\n在考虑 REST 编程模型时，使 Spring MVC API 处于更有利位置的一个重要特性是内容协商。使用\
  \ Spring MVC，此功能是框架开箱即用的内置功能。但 JAX-RS 没有对内容协商的标准支持；因此，开发人员需要依赖他们正在使用的非标准 JAX-RS\
  \ 实现，或者显式地实现它。\n\n\n\n最后，JAX-RS 的一个劣势在于其作为标准，因为 Spring 能够更快地迭代并提供新功能。Spring 为 HTTP\
  \ 消息到 Java 控制器和模型的映射提供了更丰富的可能性。它还允许更广泛的定制配置（例如，消息转换器）。这些可能是 Spring MVC API 的采用率高于\
  \ JAX-RS 的原因。\n\n为 REST 配置 Spring MVC\n\nSpring MVC 是 Java Servlet 之上的一个抽象层。因此，我们需要一个\
  \ Servlet 容器来运行 Spring MVC 应用程序。集成 Java Servlet 技术最重要的类是 `org.springframework.web.servlet.DispatcherServlet`。该类负责根据声明式映射将\
  \ HTTP 消息路由到正确的 Java 逻辑。\n\nSpring MVC 高度依赖映射注解。要启用此编程模型，我们需要在 Spring 配置中声明我们正在使用\
  \ Spring MVC。这可以通过两种方式完成：\n\n*   Spring 命名空间（`www.springframework.org/schema/mvc`）的\
  \ `<mvc:annotation-driven>` XML 元素\n*   `@EnableWebMvc` 注解\n\n![Image](img/sq.jpg) **注意**  Spring\
  \ MVC 模块涵盖了广泛的功能，用于模板化视图、处理错误、使用区域设置和主题、与安全框架集成等。所有这些功能足以写成一本书（例如，Balaji Varanasi\
  \ 和 Sudha Belida 合著的 *Spring REST*，Apress，2015 年）。我们在本章中重点介绍对 REST 有用的主要功能。其他内容超出了本书的范围，可以在参考文档（`http://docs.spring.io/spring/docs/current/spring-framework-reference/htmlsingle/#mvc`）中找到。\n\
  \n用于启用 Spring MVC 支持的 XML 配置如清单 4-11 所示。\n\n***清单 4-11***. XML Spring MVC 配置（示例项目\
  \ 0402-rest-xml-config-server 中的文件 rest-service-config.xml）\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xmlns:mvc=\"http://www.springframework.org/schema/mvc\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/mvc\n    http://www.springframework.org/schema/mvc/spring-mvc.xsd\n\
                 http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
                 http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\"\
  >\n\n<context:component-scan base-package=\"net.lkrnac.book.eiws.chapter04\" />\n\
    <mvc:annotation-driven />\n</beans>\n```\n\n此配置使用了两个命名空间：`context` 和 `mvc`。第一个用于\
  \ Spring Bean 的组件扫描，包括将映射到 HTTP URL 的控制器。第二个命名空间用于启用 MVC 支持。等效的 Java 配置如清单 4-12\
  \ 所示。\n\n***清单 4-12***. Spring MVC Java 配置（0403-rest-java-config-server）\n\n```\n\
  package net.lkrnac.book.eiws.chapter04;\n\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
  \n@Configuration\n@ComponentScan\n@EnableWebMvc\npublic class RestJavaConfigConfiguration\
  \ {\n}\n```\n\nSpring 上下文通过三个注解进行配置。`@Configuration` 注解指定了配置 Bean。`@ComponentScan`\
  \ 注解命令 Spring 在当前包及其子包中执行组件扫描。使用此注解，我们无需指定执行组件扫描的基础包，因为它从当前包开始。这更具可维护性；如果包被重命名或移动，我们不会忘记更新组件扫描的基础包。最后，`@EnableWebMvc`\
  \ 启用 Spring MVC 注解，并为 Spring MVC 支持配置各种默认 Bean。\n\n当我们有了 Spring 配置后，需要将其接入 Servlet\
  \ 配置。清单 4-13 包含了一个 XML Servlet 描述符配置的示例。\n\n***清单 4-13***. Spring MVC 的 XML Servlet\
  \ 描述符（示例项目 0402-rest-xml-config-server 中的文件 web.xml）\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<web-app xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns=\"http://xmlns.jcp.org/xml/ns/javaee\"\n  xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n\
      http://java.sun.com/xml/ns/javaee/web-app_3_0.xsd\"\n  version=\"3.0\">\n  <display-name>0402-rest-xml-config-service</display-name>\n\
    <servlet>\n    <servlet-name>rest-service</servlet-name>\n    <servlet-class>org.springframework.web.servlet.DispatcherServlet\n\
      </servlet-class>\n    <init-param>\n      <param-name>contextConfigLocation</param-name>\n\
        <param-value>classpath:rest-service-config.xml</param-value>\n    </init-param>\n\
      <load-on-startup>1</load-on-startup>\n  </servlet>\n  <servlet-mapping>\n    <servlet-name>rest-service</servlet-name>\n\
      <url-pattern>/</url-pattern>\n  </servlet-mapping>\n</web-app>\n```\n\n这里我们指定了一个名为\
  \ `rest-service` 的 Servlet，其实现类为 `DispatcherServlet`。此 Servlet 实现由 Spring 提供，并处理所有路由支持（以及更多功能）。`DispatcherServlet`\
  \ 需要知道哪个 Spring 上下文应绑定到此 Servlet 对象。因此，我们指定了 Servlet 初始化参数 `contextConfigLocation`，并将其指向\
  \ Spring 配置文件 `rest-service-config.xml`。如果我们未指定此参数，Spring 将尝试在 `WEB-INF` 文件夹中查找\
  \ `[servlet-name]-servlet.xml`。\n\n接下来，`load-on-startup` 参数告诉 Servlet 容器在容器启动时加载此\
  \ Servlet 实例，而不是等待第一个请求。如果我们使用延迟初始化，初始化 Servlet 会延长第一个请求的响应时间。由于 Spring 的加载时间可能以秒计，这对于初始请求来说是一个显著的性能损失。\n\
  \n最后，我们将 Servlet 映射到 URL。在本例中，它是根级 URL `/`。类似的 Java 配置如清单 4-14 所示。\n\n***清单 4-14***.\
  \ Spring Java Servlet 配置（0403-rest-java-config-server）\n\n```\npackage net.lkrnac.book.eiws.chapter04;\n\
  \nimport org.springframework.web.servlet.support.\n          AbstractAnnotationConfigDispatcherServletInitializer;\n\
  \npublic class RestInitializer extends\n    AbstractAnnotationConfigDispatcherServletInitializer\
  \ {\n\n@Override\n  protected Class<?>[] getRootConfigClasses() {\n    return null;\n\
    }\n\n@Override\n  protected Class<?>[] getServletConfigClasses() {\n    return\
  \ new Class[] { RestJavaConfigConfiguration.class };\n  }\n\n@Override\n  protected\
  \ String[] getServletMappings() {\n    return new String[] { \"/\" };\n  }\n}\n\
  ```\n\n\n\nSpring 会尝试在类路径上查找 `AbstractAnnotationConfigDispatcherServletInitializer`\
  \ 类的实现，并将其注册到 Servlet 容器中。这个 Servlet 初始化辅助类使得 `DispatcherServlet` 能够开箱即用。因此，我们的任务是重写三个方法，以指定\
  \ Servlet 映射、根上下文和 Servlet 上下文。由于我们的应用程序中只有这一个 Servlet，并且没有在 Servlet 和上下文映射中进行分离，我们只需指定\
  \ Servlet 配置类，而将根配置类留空。\n\n在 Servlet 容器中运行 Spring 应用程序时，即使没有 `web.xml` 配置，也能正确初始化\
  \ Servlet，因为该机制底层使用的是 Servlet 3.0 的 Java 配置。\n\n***清单 4-15*** 中的最后一个配置示例是一种新颖且现代的方法。\n\
  \n***Listing 4-15***. Spring Boot 应用程序配置 (0404-rest-boot-server)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter04;\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.boot.context.web.SpringBootServletInitializer;\n\
  \n@SpringBootApplication\npublic class RestBootApplication extends SpringBootServletInitializer\
  \ {\n  public static void main(String... args) {\n    SpringApplication.run(RestBootApplication.class,\
  \ args);\n  }\n}\n```\n\n这个类使用 Spring Boot 的约定而非配置方法来将应用程序作为 JAR 启动。单一的 `SpringBootApplication`\
  \ 注解功能强大。它会检查类路径上的 JAR 依赖项，并根据这些 JAR 依赖项应用通用配置。因此，当我们有一个 `spring-boot-starter-web`\
  \ 库作为 JAR 依赖项时，Spring Boot 将执行以下操作：\n\n*   初始化内嵌的 Tomcat\n*   注册一个 Servlet，该 Servlet\
  \ 使用此 Spring 配置并映射到 `/` URL\n*   开启 MVC（底层使用 `@EnableWebMvc`）\n*   扫描包及其子包以查找 Spring\
  \ 组件，并将它们注册到控制反转容器中\n\n因此，使用这个配置类，我们可以替换 Servlet 和 Spring 配置。简化配置是 Spring Boot 项目的一个显著优势。这样的应用程序可以通过命令行使用标准的\
  \ Java 命令 `java –jar 0404-rest-boot-server.jar` 启动。\n\nSpring MVC 映射\n\nSpring MVC\
  \ 的主要概念与 JAX-RS 类似，但注解及其结构略有不同。Spring MVC 使用以下注解：\n\n```\n@Controller\n```\n\n*\
  \   是一个类级别的注解\n*   声明该类正在处理 HTTP 请求\n    *   创建一个 Spring Bean，该 Bean 是组件扫描的候选对象\n\
  \n```\n@RequestMapping\n```\n\n*   作为类级别的注解，为类中所有处理 HTTP 请求的方法指定基本的 HTTP 映射配置\n\
  *   作为方法级别的注解，指定方法级别的 HTTP 配置，以缩小基础/类级别 `@RequestMapping` 配置的范围\n*   通过使用参数，提供将\
  \ Spring Bean 及其方法灵活映射到 URL 的功能。以下每个属性都可以在方法级别和类级别使用：\n    *   `value`：将方法映射到 URI\
  \ 或 URL 模式。如果同时使用了类级别和方法级别的注解，最终的映射 URI 将被拼接起来。\n    *   `method`：指定正在处理的 HTTP 方法。\n\
  \    *   `consumes`：指定可以消费的内容类型。\n    *   `produces`：指定可以生成的内容类型。\n    *   `headers`：基于请求头指定映射。支持对\
  \ `Accept` 和 `Content-Type` 请求头使用通配符。\n    *   `params`：基于请求的查询参数指定映射。除了相等映射（`queryParam=value`），还可以使用不等映射（`queryParam!=value`），或者指定参数不应出现在请求中（`!queryParam`）。\n\
  *   Spring 提供了基于以下内容的强大映射：\n    *   URI 参数（例如，`/users/{id}`）\n    *   带有正则表达式的 URI\
  \ 模式（例如，`/users/{id:\\\\d*}`）\n    *   带有通配符的 URI 模式（例如，`/users/**`）\n\n@RequestBody\n\
  \n*   用于注解方法参数，以便访问 HTTP 请求的负载\n\n@PathVariable\n\n*   将 URI 模板变量映射到方法参数\n*   如果\
  \ URI 模式名称与注解参数名称相同，则注解属性不是必需的\n\n@RequestParam\n\n*   将查询参数映射到方法参数\n*   如果查询参数名称与注解参数名称相同，则注解属性不是必需的\n\
  \n@RequestHeader\n\n*   将 HTTP 请求头映射到方法参数\n\n@ResponseBody\n\n*   用于注解方法。指定方法的返回值将被转换为\
  \ HTTP 响应的主体。\n*   此注解区分了 REST 和 MVC 的用法。\n*   支持内容协商（基于 `Accept` 请求头）；客户端可以请求特定格式的负载（例如，XML、JSON），Spring\
  \ 将使用相应的编组库（例如，JAXB 2、Jackson）。\n\n@RestController\n\n*   一个便捷注解，结合了 `@Controller`\
  \ 和 `@RequestBody` 注解\n*   在 Spring 4.0 中引入\n\n@ResponseStatus\n\n*   将方法的响应硬编码为特定的\
  \ HTTP 响应状态码\n\n@ExceptionsHandler\n\n*   用于处理冒泡到指定 `@Controller` 的异常\n*   由异常处理器处理的异常类型被指定为注解属性\n\
  *   方便将异常转换为特定的 HTTP 状态码\n\n较低层级的抽象注入\n\n使用这些注解，我们可以将各种较低层级的 HTTP 消息抽象注入到控制器方法中。但\
  \ Spring 也提供了无需注解的注入。如果出于某种原因，我们需要访问 HTTP 消息的较低层级抽象，Spring 可以注入以下类型：\n\nServlet\
  \ 消息抽象\n\n*   Servlet 不一定需要使用 HTTP，因此这些抽象不包含特定于 HTTP 的数据。\n*   最通用的消息抽象符合 Java Servlets\
  \ API。\n*   `javax.servlet.ServletRequest` 是表示 Servlet 请求抽象的接口。\n*   `javax.servlet.ServletResponse`\
  \ 是表示 Servlet 请求抽象的接口。\n\nJava EE HTTP 消息抽象\n\n\n\n*   `javax.servlet.ServletRequest`\
  \ 和 `javax.servlet.ServletResponse` 的 HTTP 子接口。\n*   这些接口以 `InputStream` 的形式提供消息负载。\n\
  *   `javax.servlet.http.HttpServletRequest` 是表示 HTTP 请求抽象概念的接口。\n*   `javax.servlet.http.HttpServletResponse`\
  \ 是表示 HTTP 响应抽象概念的接口。\n\nSpring HTTP 消息抽象\n\n*   这些接口提供已转换为泛型类型 `T` 的消息负载。\n*  \
  \ 泛型类型 `T` 指定了负载的 Java 类型。\n*   `org.springframework.http.HttpEntity<T>` 是表示 Spring\
  \ 提供的 HTTP 请求抽象概念的接口。\n*   `org.springframework.http.ResponseEntity<T>` 是表示 Spring\
  \ 提供的 HTTP 响应抽象概念的接口。包含头部、正文和 HTTP 状态码字段。\n*   `org.springframework.http.RequestEntity<T>`\
  \ 是表示 Spring 提供的 HTTP 请求抽象概念的接口。包含 HTTP 头部、正文、URI 和 HTTP 方法字段。\n\n要注入这些 HTTP 消息抽象之一，我们无需使用任何注解。只需将它们用作处理\
  \ HTTP 请求的方法（由 `@RequestMapping` 注解）的参数即可。\n\nString MVC CRUD 示例\n\n清单 4-16 提供了一个使用\
  \ Spring MVC 注解的简单 HTTP 映射示例。此示例使用了来自清单 4-3 和 4-4 的服务和模型 POJO。\n\n***清单 4-16***.\
  \ Spring MVC 映射示例 (0404-rest-boot-server)\n\n```\npackage net.lkrnac.book.eiws.chapter04.javaconfig;\n\
  \nimport java.util.Collection;\nimport net.lkrnac.book.eiws.chapter04.UrlConstants;\n\
  import net.lkrnac.book.eiws.chapter04.model.User;\nimport net.lkrnac.book.eiws.chapter04.service.UserService;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.http.HttpHeaders;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.http.ResponseEntity;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.ExceptionHandler;\n\
  import org.springframework.web.bind.annotation.PathVariable;\nimport org.springframework.web.bind.annotation.RequestBody;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.ResponseBody;\nimport org.springframework.web.bind.annotation.ResponseStatus;\n\
  import org.springframework.web.util.UriComponents;\nimport org.springframework.web.util.UriComponentsBuilder;\n\
  \n@Controller\n@RequestMapping(UrlConstants.USERS_URL)\npublic class UserController\
  \ {\n  private final UserService userService;\n\n@Autowired\n  public UserController(UserService\
  \ userService) {\n    super();\n    this.userService = userService;\n  }\n\n@RequestMapping(method\
  \ = RequestMethod.GET)\n  @ResponseBody\n  public Collection<User> getUsers() {\n\
      return userService.getAllUsers();\n  }\n\n@RequestMapping(value = \"/{id}\"\
  , method = RequestMethod.GET)\n  @ResponseBody\n  public User getUser(@PathVariable(\"\
  id\") int identifier) {\n    return userService.getUser(identifier);\n  }\n\n@RequestMapping(method\
  \ = RequestMethod.POST)\n  @ResponseStatus(HttpStatus.CREATED)\n  public ResponseEntity<Void>\
  \ postUser(@RequestBody User user,\n      UriComponentsBuilder uriBuilder) {\n    int\
  \ identifier = userService.addUser(user);\n\nHttpHeaders httpHeaders = new HttpHeaders();\n\
      String uri = UrlConstants.USERS_URL + \"/{id}\";\n    UriComponents uriComponents\
  \ =\n        uriBuilder.path(uri).buildAndExpand(identifier);\n    httpHeaders.setLocation(uriComponents.toUri());\n\
      return new ResponseEntity<Void>(httpHeaders, HttpStatus.CREATED);\n  }\n\n@RequestMapping(value\
  \ = \"/{id}\", method = RequestMethod.PUT)\n  @ResponseStatus(HttpStatus.OK)\n  public\
  \ void putUser(@PathVariable(\"id\") int identifier, @RequestBody User user) {\n\
      userService.updateOrAddUser(identifier, user);\n  }\n\n@RequestMapping(value\
  \ = \"/{id}\", method = RequestMethod.DELETE)\n  public void deleteUser(@PathVariable(\"\
  id\") int identifier) {\n    userService.deleteUser(identifier);\n  }\n\n@ExceptionHandler(UnsupportedOperationException.class)\n\
    public ResponseEntity<String> handleUnsupportedOperation(\n      UnsupportedOperationException\
  \ uoe) {\n    return new ResponseEntity<String>(uoe.getMessage(), HttpStatus.BAD_REQUEST);\n\
    }\n}\n```\n\n`@Controller` 注解告诉 Spring 该类正在处理 HTTP 请求。`@RequestMapping` 注解将该类映射到基础\
  \ URI `/users`。在构造函数中，我们注入了 `UserService`，即来自清单 4-4 的类。\n\n`getUsers` 方法被映射到 HTTP\
  \ `GET` 方法，因为在其方法级别的 `@RequestMapping` 注解中指定了这一点。因此，`getUsers` 将处理所有对 URI `/users`\
  \ 的 `GET` 请求，因为方法级别的 `@RequestMapping` 中缺少 `value` 参数。因此，将使用类级别 `@RequestMapping`\
  \ 注解中指定的基础 URI。该方法本身读取存储在 `UserService` 中的所有 `User` 对象。`@ResponseBody` 注解指示返回值应序列化为\
  \ HTTP 传输格式，在本例中是从 `Collection<User>` 转换为 JSON 数组。默认使用 JSON，因为它是当今 HTTP 消息中最常用的传输格式。稍后我们将深入探讨一个可以缩小此配置范围的示例。\n\
  \n第二个 Web 方法是 `getUser`。顾名思义，它应该读取单个用户。因此，消费者需要指定他感兴趣的是哪个 `User` 对象。这是通过 `@RequestMapping`\
  \ 注解中指定为参数 `/{id}` 的 URI 参数 `id` 来完成的。该方法的最终 URI 映射将是 `/users/{id}`，因为方法级别的 `@RequestMapping`\
  \ 与类级别的相结合。借助 `@PathVariable` 注解，来自 URI 的占位符值 `{id}` 被注入到 `identifier` 参数中。该方法根据注入的标识符读取用户并返回\
  \ `User` 对象。借助 `@ResponseBody` 注解，此对象将默认转换为 JSON。\n\n处理 Web 请求的第三个方法是 `postUser`。与\
  \ `getUsers` 方法类似，`postUser` 被映射到 `/users` 端点并处理 `POST` HTTP 方法。HTTP 消息负载被转换为 `User`\
  \ 对象。这是由 `@RequestBody` 参数注解驱动的。该方法的第二个参数是 `UriComponentBuilder` 实例，它将帮助用户创建 `Location`\
  \ 头部以满足 HTTP 契约，该契约指示服务器应为 `POST` HTTP 消息响应所创建资源实例的位置。因此，该方法创建用户，读取创建的用户标识符，创建 HTTP\
  \ `Location` 头部，并构建响应。为了使用自定义头部和 201 Created HTTP 状态码构建 HTTP 响应，我们使用了 `ResponseEntity<Void>`\
  \ Spring 抽象。`@ResponseStatus` 注解也声明式地定义了响应的状态将始终为 201 Created。使用泛型类型 `Void` 来创建空的\
  \ HTTP 消息体。\n\n`putUser` 方法处理 `PUT` HTTP 方法。`@ResponseStatus` 注解确保它返回 HTTP 状态码 200\
  \ OK，但前提是底层逻辑未抛出任何异常。`putUser` 使用上述方法从传入请求中提取 `identifier` 和 `user` 对象。该实现调用了 `userService`\
  \ 的 `updateOrAddUser` 方法，该方法将在我们的仓库中创建或替换 `User` 对象。\n\n\n\n接下来，`UserController`\
  \ 方法用于删除用户。同样，我们需要指定要删除的用户实例的 ID。`@RequestMapping` 注解和占位符映射与 `getUser` 方法类似。但在本例中，我们无需指定\
  \ `@PathVariable` 的属性，因为属性名称与占位符相同。该方法不返回任何值，默认情况下会被转换为一个 HTTP 响应，其响应体为空，状态码为 200\
  \ OK。\n\n最后一个方法是针对所有 `UnsupportedOperationException` 错误的异常处理器。当此类错误发生并冒泡到 `UserController`\
  \ 中的任何 `@RequestMapping` 方法时，此方法将被调用。这种方法对于将应用程序异常转换为具有特定 HTTP 状态码的响应非常有用。在本例中，我们将\
  \ `UnsupportedOperationException` 转换为 400 Bad Request。\n\n此示例（`0404-rest-boot-server`）在\
  \ `src/main/resources` 文件夹中包含配置文件 `application.properties`。其中只有一个配置项 `server.port=10404`，它告诉\
  \ Spring 将内嵌的 Tomcat 容器绑定到端口 10404。图 4-6 展示了再次使用 DHC - REST/HTTP API Client 的 `POST`\
  \ 通信示例。\n\n![9781484207949_Fig04-06.jpg](img/9781484207949_Fig04-06.jpg)\n\n图 4-6.\
  \ Spring MVC POST 通信示例\n\n对于后续对资源 `/users/0` 的 `GET` 请求，我们得到的输出如图 4-7 所示。\n\n![9781484207949_Fig04-07.jpg](img/9781484207949_Fig04-07.jpg)\n\
  \n图 4-7. Spring MVC 有效的 GET 通信示例\n\n接下来我们探讨无效的 `GET` 请求。如果我们尝试读取资源 `/users/-1`，`UserRespository`（来自代码清单\
  \ 4-4）会抛出一个 `UnsupportedOperationException`。此异常在 `UserController.handleUnsupportedOperation`\
  \ 中被处理，因为它被配置为 `UnsupportedOperationException` 异常类型的 `@ExceptionHandler`。如图 4-8\
  \ 所示。\n\n![9781484207949_Fig04-08.jpg](img/9781484207949_Fig04-08.jpg)\n\n图 4-8.\
  \ Spring MVC 无效的 GET 通信示例\n\n图 4-9 和图 4-10 展示了我们 Spring MVC REST 示例的 `PUT` 和 `DELETE`\
  \ 请求与响应。\n\n![9781484207949_Fig04-09.jpg](img/9781484207949_Fig04-09.jpg)\n\n图 4-9.\
  \ Spring MVC PUT 通信示例\n\n![9781484207949_Fig04-10.jpg](img/9781484207949_Fig04-10.jpg)\n\
  \n图 4-10. Spring MVC DELETE 通信示例\n\n@RestController 示例\n\nSpring 4.x 版本引入了新的注解 `@RestController`。此注解的使用如代码清单\
  \ 4-17 所示。\n\n***代码清单 4-17***. @RestController 示例 (0405-rest-restcontroller-server)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.restcontroller;\n\nimport java.util.Collection;\n\
  import net.lkrnac.book.eiws.chapter04.UrlConstants;\nimport net.lkrnac.book.eiws.chapter04.model.User;\n\
  import net.lkrnac.book.eiws.chapter04.service.UserService;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.http.HttpHeaders;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.web.bind.annotation.ExceptionHandler;\n\
  import org.springframework.web.bind.annotation.PathVariable;\nimport org.springframework.web.bind.annotation.RequestBody;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.ResponseStatus;\nimport org.springframework.web.bind.annotation.RestController;\n\
  import org.springframework.web.util.UriComponents;\nimport org.springframework.web.util.UriComponentsBuilder;\n\
  \n@RestController\n@RequestMapping(UrlConstants.USERS_URL)\npublic class UserController\
  \ {\n  private final UserService userService;\n\n@Autowired\n  public UserController(UserService\
  \ userService) {\n    super();\n    this.userService = userService;\n  }\n\n@RequestMapping(method\
  \ = RequestMethod.GET)\n  public Collection<User> getUsers() {\n    return userService.getAllUsers();\n\
    }\n\n@RequestMapping(value = \"/{id}\", method = RequestMethod.GET)\n  public\
  \ User getUser(@PathVariable(\"id\") int identifier) {\n    return userService.getUser(identifier);\n\
    }\n\n//剩余方法与代码清单 4-16 相同\n  //...\n}\n```\n\n如果我们将此类与代码清单 4-16 中的控制器进行比较，会发现细微的差别。该类使用了\
  \ `@RestController` 注解而不是 `@Controller` 注解。第二个区别是我们不需要用 `@ResponseBody` 注解来标注 `getUsers`\
  \ 和 `getUser` 的返回值。默认情况下，Spring MVC 会尝试从属于此控制器的 Web 方法视图中查找返回值。这是因为 Spring MVC 最初用于模型-视图-控制器风格的\
  \ Web 应用程序，它还需要处理视图的模板化。随着 Spring MVC 模块的功能扩展到处理 REST 关注点，我们需要能够指定返回值应转换为 HTTP 负载。\n\
  \n因此，`@RestController` 注解是组合 `@Controller` 和 `@ResponseBody` 注解的一个便捷快捷方式。但它显著增强了\
  \ Web 层的语义特性，因为它清晰地区分了 REST 端点和 MVC 端点。\n\n带有标头和查询参数的 Spring MVC REST\n\n让我们稍微调整一下需求，深入探讨\
  \ Spring MVC 的映射特性：\n\n*   第一个特性已在代码清单 4-4 中提到，我们创建了基于用户标识符区间读取用户的选项。\n*   我们希望为\
  \ REST API 进行版本控制，以便为将来可能发生的破坏性变更做好准备。此 API 版本将存储在 HTTP 标头中。\n\n![Image](img/sq.jpg) **注意**  REST\
  \ API 的版本控制是一个大话题，因为它会影响与消费者的 API 契约，因此需要精心设计。客户端可以使用多种方法在 REST 请求中指示 API 版本：将版本存储在\
  \ URI 中、自定义 HTTP 标头中或内容类型中。没有明确的优胜方法，因为每种方法都有其优缺点。这个广泛的话题超出了本书的范围。在我们的示例中，我们使用了自定义标头，因为它允许我们突出显示\
  \ Spring MVC 的 HTTP 标头解析和映射特性。\n\n*   如果将这些需求拆分成不同的代码清单，涵盖这些需求的示例会更易读。此示例的第一部分如代码清单\
  \ 4-18 所示。\n\n***代码清单 4-18***. 带有标头和查询参数的 Spring MVC 示例的初始部分 (0406-rest-parameters-server)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04.parameters;\n\n\n\nimport java.util.Collection;\n\
  import java.util.List;\nimport net.lkrnac.book.eiws.chapter04.UrlConstants;\nimport\
  \ net.lkrnac.book.eiws.chapter04.model.User;\nimport net.lkrnac.book.eiws.chapter04.service.UserService;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.http.HttpHeaders;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.http.RequestEntity;\nimport org.springframework.http.ResponseEntity;\n\
  import org.springframework.web.bind.annotation.ExceptionHandler;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
  import org.springframework.web.bind.annotation.RequestBody;\nimport org.springframework.web.bind.annotation.RequestHeader;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.RequestParam;\nimport org.springframework.web.bind.annotation.RestController;\n\
  import org.springframework.web.util.UriComponents;\nimport org.springframework.web.util.UriComponentsBuilder;\n\
  \n@RestController\n@RequestMapping(UrlConstants.USERS_URL)\npublic class UserController\
  \ {\n  private final UserService userService;\n\n@Autowired\n  public UserController(UserService\
  \ userService) {\n    super();\n    this.userService = userService;\n  }\n\n@RequestMapping(value\
  \ = \"/{id}\", method = RequestMethod.GET,\n      produces = MediaType.APPLICATION_JSON_VALUE)\n\
    public User getUser(@PathVariable(\"id\") int identifier) {\n    return userService.getUser(identifier);\n\
    }\n```\n\n此清单展示了导入的类签名，以及构造函数和处理 `GET` 请求的方法。这些结构大多在之前的示例中已经熟悉。这里唯一的新元素是 `@RequestMapping`\
  \ 的新属性 `produces`。它定义了该方法仅映射到期望 JSON 响应体格式的请求。这种消费者的需求涉及 HTTP 内容协商，并由 HTTP 标头 `Accept`\
  \ 驱动。该示例的第二部分如清单 4-19 所示。\n\n![Image](img/sq.jpg) **注意**  内容协商超出了本书的范围。建议从以下维基页面开始研究：`https://en.wikipedia.org/wiki/Content_negotiation`。\n\
  \n***清单 4-19***. 带有标头和查询参数的 Spring MVC 示例的 POST 部分 (0406-rest-parameters-server)\n\
  \n```\n@RequestMapping(method = RequestMethod.POST, consumes = MediaType.APPLICATION_JSON_VALUE,\n\
       headers = \"version=1\")\npublic ResponseEntity<String> postUser(@RequestBody\
  \ User user,\n    UriComponentsBuilder uriBuilder,\n    @RequestHeader(required\
  \ = false) String version) {\n  if (\"1\".equals(version)) {\n    int identifier\
  \ = userService.addUser(user);\n\nHttpHeaders httpHeaders = new HttpHeaders();\n\
      String uri = UrlConstants.USERS_URL + \"/{id}\";\n    UriComponents uriComponents\
  \ =\n        uriBuilder.path(uri).buildAndExpand(identifier);\n    httpHeaders.setLocation(uriComponents.toUri());\n\
      return new ResponseEntity<String>(httpHeaders, HttpStatus.CREATED);\n  } else\
  \ {\n    return ResponseEntity.badRequest().body(\"Expected version is 1!\");\n\
    }\n}\n```\n\n`@RequestMapping` 注解具有多种属性。`method` 属性指定了被注解方法映射到的 HTTP 方法。`consumes`\
  \ 属性表明我们只处理 JSON 内容。因此，请求必须包含 `Content-Type: application/json` 才能被路由到此方法。注解属性 `headers`\
  \ 的值为 `version=1`，这表示只有 API 版本等于 1 的请求才会被路由到此逻辑。\n\n`postUser` 方法有三个参数。前两个参数 `user`\
  \ 和 `uriBuilder` 已在清单 4-16 中介绍过。最后一个参数 `version` 使用了 `@RequestHeader` 注解，该注解读取名为\
  \ `version` 的 HTTP 标头并将其注入到此参数中。\n\n该实现会验证 API 版本是否为 1，如果不是，则返回 HTTP 状态码 400 Bad\
  \ Request。如果版本是 1，则实现会存储 `User` 对象，并返回状态码 200 OK 以及 `Location` 标头的响应。在 `postUser`\
  \ 方法的实现中检查标头并非必要，因为映射注解属性 `headers` 已配置为仅处理版本为 1 的请求。但这段代码向我们展示了 `@RequestHeader`\
  \ 注解如何提取 HTTP 标头。\n\n清单 4-20 是 Spring MVC 服务端示例的最后一部分。\n\n***清单 4-20***. 带有标头和查询参数的\
  \ Spring MVC 示例的 PUT 和 GET 区间部分 (0406-rest-parameters-server)\n\n```\n@RequestMapping(value\
  \ = \"/{id}\", method = RequestMethod.PUT, headers = \"version=1\")\n  public ResponseEntity<String>\
  \ putUser(@PathVariable(\"id\") int identifier,\n      RequestEntity<User> request)\
  \ {\n    List<String> versions = request.getHeaders().get(\"version\");\n    boolean\
  \ versionIsCorrect = versions != null && \"1\".equals(versions.get(0));\n    if\
  \ (versionIsCorrect) {\n      userService.updateOrAddUser(identifier, request.getBody());\n\
        return ResponseEntity.ok(\"\");\n    } else {\n      return ResponseEntity.badRequest().body(\"\
  Expected version is 1!\");\n    }\n  }\n\n@RequestMapping(method = RequestMethod.GET,\
  \ params = \"lowerId\",\n      produces = MediaType.APPLICATION_JSON_VALUE)\n  public\
  \ Collection<User> getUsersInterval(@RequestParam int lowerId,\n      @RequestParam(\"\
  upperId\") int upId) {\n    return userService.getUsersInterval(lowerId, upId);\n\
    }\n}\n```\n\n`putUser` 方法的 `@RequestMapping` 注解方式与清单 4-16 中的 `putUser` 方法类似。不同之处在于\
  \ `headers` 属性，该属性同样将此方法绑定为仅处理带有 HTTP 标头 `version: 1` 的请求。\n\n`putUser` 方法的参数也与清单\
  \ 4-16 略有不同。除了路径变量提取之外，还有一个名为 `request` 的新参数，其类型为 `RequestEntity<User>`。这是 Spring\
  \ 对 HTTP 请求的表示，其中请求体会被编组为 `User` 类型。Spring 从请求体中转换 `User` 类型，并将此对象包装到 `RequestEntity<User>`\
  \ 中，然后注入到请求参数中。我们可以使用此对象来检查请求的各种属性，例如 HTTP 方法、标头和 URI。\n\n在本例中，我们提取了 `version` 标头，并用它来验证具有正确版本的\
  \ HTTP 请求是否被路由到此逻辑。同样，这种检查并非必要，因为基于 `headers=\"version-1\"` 的映射已经负责排除了其他版本。但它展示了提取\
  \ HTTP 请求元数据的另一种方法。\n\n测试 Spring MVC REST API\n\nSpring 非常注重可测试性。由于 Spring MVC 是最广泛使用的\
  \ Spring 抽象之一，它当然也不例外。测试 Spring MVC API 背后的理念是执行伪造的 HTTP 请求来测试控制器并验证响应。即使此测试代码未在\
  \ Servlet 容器中运行，控制器的行为方式也与注册到 `DispatcherServlet` 时相同。\n\n\n\nSpring MVC 测试支持的核心类是\
  \ `org.springframework.test.web.servlet.MockMvc`。它是用于发送模拟请求、记录并验证预期响应的最终类。借助 `MockMvc`，开发者无需创建大量对象来处理复杂的\
  \ HTTP 用例，而是可以实现更简洁的链式调用结构。\n\nperform\n\n*   定义在 `org.springframework.test.web.servlet.MockMvc`\
  \ 类中的方法\n*   用于发送请求\n*   使用 `MockMvcRequestBuilders` 参数作为辅助工具，发送诸如 `GET`、`PUT`、`POST`、`PUT`\
  \ 和 `DELETE` 等 HTTP 请求\n*   `MockMvcRequestBuilders` 方法返回辅助类 `MockHttpServletRequestBuilder`，用于处理广泛的\
  \ HTTP 通信\n    *   HTTP 标头\n    *   内容创建与协商\n    *   查询参数\n    *   编码与区域设置处理\n \
  \   *   会话管理（不针对无状态 REST）\n\nandExpect\n\n*   定义在接口 `org.springframework.test.web.servlet.ResultActions`\
  \ 中的方法\n*   在验证过程中支持链式调用，因为它同样返回 `ResultActions`\n*   因此，我们可以根据需要包含任意数量的期望，用于以下方面：\n\
  \    *   验证 HTTP 标头\n    *   基于内容解析（例如 XML/JSON 格式）验证消息体\n    *   验证 HTTP 状态码\n\n\
  andReturn\n\n*   定义在接口 `org.springframework.test.web.servlet.ResultActions` 中的方法\n\
  *   支持返回 `MvcResult` 对象，该对象可用于 `andExpect` 调用链之外的后续验证\n\nandDo\n\n*   接口 `org.springframework.test.web.servlet.ResultActions`\
  \ 中的方法\n*   使用 `MockMvcResultHandlers.print()` 打印响应\n\nMockMvc 实例创建\n\n`MockMvc`\
  \ 实例可以通过工厂类 `MockMvcBuilders` 以两种方式创建：\n\n*   基于 Spring 的上下文实例创建 `MockMvc` 实例：`MockMvcBuilders.webAppContextSetup(WebApplicationContext\
  \ context)`，这便于创建 Spring 集成测试。使用此方法时，我们通常希望将所有依赖项一起测试 Spring 的配置。\n*   基于一个或多个控制器类创建\
  \ `MockMvc` 实例：`MockMvcBuilders.standaloneSetup(Object... controllers)`，这便于创建控制器单元测试。此方法可以通过模拟其依赖项来隔离测试单个控制器或一组控制器。\n\
  \nSpring 测试支持允许我们在测试中实现极大的灵活性，同时也能创建有针对性的单元测试或集成测试。我们可以编写简短的测试，专注于 HTTP REST 通信的重要方面。JAX-RS\
  \ 抽象则缺少这种强大的支持。这一因素通常会在基于 REST 的项目中考虑使用 Spring MVC 还是 JAX-RS 抽象时，简化决策过程。\n\nMockMvc\
  \ 集成测试示例\n\n针对清单 4-16 中控制器的应用程序的 Spring MVC 集成测试示例规模较大，难以在一个清单中完整呈现。因此，我们将其拆分。清单\
  \ 4-21 展示了导入语句和测试类配置。\n\n***清单 4-21***. REST 集成测试示例的导入与签名 (0403-rest-java-config-server)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter04;\n\nimport static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.delete;\n\
  import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
  import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;\n\
  import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.put;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultHandlers.print;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
  import static org.testng.Assert.assertEquals;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.test.annotation.DirtiesContext;\nimport org.springframework.test.annotation.DirtiesContext.ClassMode;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.servlet.MockMvc;\n\
  import org.springframework.test.web.servlet.MvcResult;\nimport org.springframework.test.web.servlet.setup.MockMvcBuilders;\n\
  import org.springframework.web.context.WebApplicationContext;\nimport org.testng.annotations.BeforeMethod;\n\
  import org.testng.annotations.Test;\n\n@WebAppConfiguration\n@ContextConfiguration(classes\
  \ = RestJavaConfigConfiguration.class)\n@DirtiesContext(classMode = ClassMode.AFTER_EACH_TEST_METHOD)\n\
  public class RestApplicationContextTest extends\n    AbstractTestNGSpringContextTests\
  \ {\n\nprivate static final String FULL_USER_URL = \"http://localhost:10403/users\"\
  ;\n  private MockMvc mockMvc;\n\n@Autowired\n  private WebApplicationContext webApplicationContext;\n\
  \n@BeforeMethod\n  public void init() {\n    mockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext).build();\n\
    }\n\nprivate static String createTestRecord(int identifier) {\n    String testingRecordString\
  \ =\n        \"{\\\"email\\\": \\\"user%d@gmail.com\\\", \\\"name\\\": \\\"User%d\\\
  \"}\";\n    return String.format(testingRecordString, identifier, identifier,\n\
          identifier);\n  }\n```\n\n正如你在导入部分所见，此示例使用了大量类——这主要是因为 Spring MVC 测试模块提供了丰富的灵活性。该\
  \ Spring 模块的设计并不简单。但正如你将在后续示例中探索到的，它对开发者来说易于使用。这很好地体现了 Spring 团队成员的能力。测试 HTTP 的各种可能性是一个复杂的问题，但\
  \ Spring 优雅地解决了它。\n\n测试类使用了 `WebAppConfiguration` 注解，表明我们正在使用 Spring `ApplicationContext`\
  \ 抽象的 `WebApplicationContext` 实现进行测试。`ContextConfiguration` 注解指定了正在测试的 Spring 配置类。\n\
  \n默认情况下，Spring 会将测试上下文保留在内存中。这样，不同的测试可以复用同一个上下文，并通过避免在每个测试前初始化上下文来加速集成测试套件。但请记住，我们的\
  \ `UserService` 并非真正的无状态服务，我们不希望测试方法相互影响。因此，我们需要为每个方法初始化一个全新的上下文。这通过类级别的注解 `@DirtiesContext`\
  \ 来保证。默认情况下，此注解会为整个测试类从头创建一个 Spring 上下文。但通过设置 `ClassMode.AFTER_EACH_TEST_METHOD`\
  \ 属性，我们为每个测试方法都初始化一个新的上下文。\n\n\n\nTestNG 框架用于测试。因此，对于 Spring 集成测试，我们需要使用 Spring\
  \ 框架也提供的 `AbstractTestNGSpringContextTests` 父类。`FULL_USER_URL` 常量使测试方法无需重复相同的字符串字面量。`mockMvc`\
  \ 变量在每个测试方法中用于发送 HTTP 请求和进行验证。\n\n接下来，类级变量注入了为集成测试创建的 Spring 上下文实例。该实例是应用程序在 Servlet\
  \ 容器中运行时使用的实例。`init` 方法使用 `MockMvcBuilders` 辅助工具在每个测试方法之前初始化 `mockMvc` 对象，这是由 TestNG\
  \ 的 `BeforeMethod` 注解声明的。\n\n`createTestRecord` 方法帮助我们创建用于发送请求的用户模型的 JSON Spring\
  \ 表示形式。后续测试示例列表中的各种测试方法将使用它。\n\nMockMvc 示例：POST\n\n让我们从 `POST` 版本开始（参见清单 4-22）。\n\
  \n***清单 4-22***。集成测试 HTTP POST (0403-rest-java-config-server)\n\n```\n  @Test\n\
    public void testPost() throws Exception {\n    // GIVEN\n    String testingRecord\
  \ = createTestRecord(0);\n\n// WHEN\n    MvcResult mvcResult = mockMvc.perform(post(FULL_USER_URL)\n\
          .contentType(MediaType.APPLICATION_JSON)\n        .content(testingRecord))\n\
          .andReturn();\n\n// THEN\n    int httpStatus = mvcResult.getResponse().getStatus();\n\
      assertEquals(httpStatus, HttpStatus.CREATED.value());\n  }\n```\n\n所有测试方法都使用\
  \ `org.testng.annotations.Test` 注解，该注解将方法标记为测试，类似于 JUnit。在方法体中，我们创建测试记录。然后，我们使用\
  \ `mockMvc` 类级属性对我们的 URI 执行 `POST` 操作。这是在测试控制器的 URI 映射。我们还使用 `MockHttpServletRequestBuilder`\
  \ 链式调用来发送带有已创建 JSON 负载的 JSON 内容类型。此链式调用将模拟对清单 4-13 中控制器的 `POST` 请求。此操作的结果存储在一个名为\
  \ `mvcResult` 的局部变量中，用于检索和验证响应状态。\n\nMockMvc 示例：GET\n\n下一个测试方法涵盖了 `GET` 请求的测试（参见清单\
  \ 4-23）。\n\n***清单 4-23***。测试单个资源实例的 HTTP GET (0403-rest-java-config-server)\n\n\
  ```\n@Test\npublic void testSingleGet() throws Exception {\n  // GIVEN\n  mockMvc.perform(post(FULL_USER_URL)\n\
        .contentType(MediaType.APPLICATION_JSON)\n      .content(createTestRecord(0)));\n\
