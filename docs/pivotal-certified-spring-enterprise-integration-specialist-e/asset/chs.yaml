  \ 会尝试随后逐个处理每条记录。这是因为 SB 试图写入尽可能多的项目。这样，我们可以确保一条损坏的记录不会导致同一块中其他有效记录的写入失败。\n\n在这种情况下，写入器中的第一次失败导致整个块失败，因此\
  \ SB 随后尝试逐个写入每条记录。第二次错误模拟导致 `record 1 processed` 失败。该块中的其余记录以及所有其他块都正常处理。\n\nSkip\
