  \ 和 `Job` 失败。但某些错误可能只是暂时的，或者不够严重，不足以导致整个处理过程失败。因此，SB 提供了多种机制来进行配置：\n\n*   *跳过*该项，并配置\
  \ `org.springframework.batch.core.SkipListener<T,S>` 监听器。\n*   *重试*该项，并配置 `org.springframework.retry.RetryListener`\
  \ 监听器。请注意，`RetryListener` 是通用 Spring 模块 `spring-retry` 的一部分。\n\nSB 还为这些接口提供了带有 `Support`\
  \ 后缀的便捷抽象类（`org.springframework.batch.core.SkipListenerSupport<T,S>` 和 `org.springframework.retry.RetryListenerSupport`），其中所有方法都有空实现。如果我们使用抽象类而不是接口，则无需实现所有拦截方法。这些机制仅适用于面向块的处理。\n\
  \nSkip 和 SkipListener 的 XML 配置\n\n此示例在处理器和写入器中模拟了错误。读取器中的错误与处理器中的错误会产生类似的效果。对于读取器，我们复用通用的读取器。清单\
  \ 9-101 展示了模拟错误的处理器。\n\n***清单 9-101***. 模拟错误的处理器 (0929-skip-xml)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter09.process;\nimport org.springframework.batch.item.ItemProcessor;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleRecordProcessor\
  \ implements ItemProcessor<String, String> {\n  private boolean errorSimulated =\
  \ false;\n\n@Override\n  public String process(String item) throws Exception {\n\
  \    preProcessHook();\n    return item + \" processed\";\n  }\n\npublic void preProcessHook()\
  \ {\n    if (!errorSimulated) {\n      errorSimulated = true;\n      throw new IllegalStateException(\"\
  error occurred\");\n    }\n  }\n}\n```\n\n在处理第一条记录之前，我们通过抛出 `IllegalArgumentException`\
  \ 来模拟错误。后续的处理尝试将成功。清单 9-102 展示了模拟错误的写入器。\n\n***清单 9-102***. 模拟错误的写入器 (0929-skip-xml)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09.write;\nimport java.util.List;\nimport\
  \ org.springframework.batch.item.ItemWriter;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleRecordWriter\
  \ implements ItemWriter<String> {\n  private WriteRepository writeRepository;\n\
  \  private int errorSimulated = 0;\n\n@Autowired\n  public SimpleRecordWriter(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
  \  }\n\n@Override\n  @SuppressWarnings(\"unchecked\")\n  public void write(List<?\
  \ extends String> items) throws Exception {\n    preWriteHook();\n    writeRepository.writeRecords((List<String>)\
  \ items);\n  }\n\npublic void preWriteHook() {\n    if (errorSimulated < 2) {\n\
  \      errorSimulated++;\n      throw new IllegalStateException(\"error occurred\"\
  );\n    }\n  }\n}\n```\n\n此写入器模拟两次错误，然后成功。清单 9-103 展示了 `SkipListener` 的实现。\n\n***清单\
  \ 9-103***. SkipListener 实现 (0929-skip-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.batch.core.SkipListener;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  \n@Component\npublic class SimpleSkipListener implements SkipListener<String, String>\
  \ {\n  private SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public SimpleSkipListener(SimpleExecutablePoint\
  \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
  \  }\n\n@Override\n  public void onSkipInRead(Throwable t) {\n    executablePoint.execute(\"\
  由于错误，跳过读取\");\n  }\n\n@Override\n  public void onSkipInWrite(String item, Throwable\
  \ t) {\n    executablePoint\n        .execute(\"由于错误，跳过写入 '\" + item + \"'\");\n\
  \  }\n\n@Override\n  public void onSkipInProcess(String item, Throwable t) {\n \
  \   executablePoint\n        .execute(\"由于错误，跳过处理 '\" + item + \"'\");\n  }\n}\n\
  ```\n\n当读取项被跳过时，SB 可以将其实例注入到拦截方法中。因此，它只注入一个 `Throwable` 实例作为跳过的根本原因。但正如我们提到的，此示例的读取器中不会有错误模拟器。我们需要实现此方法是因为接口\
  \ `SkipListener<T, S>`。\n\n在处理器和写入器拦截期间，我们也可以使用被跳过项的实例。`SkipListener<T, S>` 使用两个泛型类型，其中\
  \ `T` 是处理前的类型，`S` 是处理后的类型。在这种情况下，这两个类型都是 `String`，因此接口用作 `SkipListener<String, String>`。清单\
  \ 9-104 展示了 XML 配置。\n\n***清单 9-104***. Skip 的 XML 配置（示例项目 0929-skip-xml 的 src/main/resource\
  \ 文件夹中的文件 batch-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  <beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
  \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n\n\n<job id=\"simpleRecordsJob\">\n    <step id=\"simpleRecordsStep\">\n      <tasklet>\n\
          <chunk reader=\"simpleRecordReader\" writer=\"simpleRecordWriter\"\n          processor=\"\
  simpleRecordProcessor\" commit-interval=\"4\" skip-limit=\"3\">\n          <skippable-exception-classes>\n\
              <include class=\"java.lang.IllegalStateException\"/>\n          </skippable-exception-classes>\n\
            <listeners>\n            <listener ref=\"simpleSkipListener\"/>\n          </listeners>\n\
          </chunk>\n      </tasklet>\n    </step>\n  </job>\n</beans:beans>\n```\n\
  \n对于读取器，我们使用通用的 `SimpleRecordReader`，不模拟错误。处理器和写入器则按照清单 9-101 和 9-102 中的定义模拟错误。`skip-limit`\
  \ 属性指定了在导致 `JobExecution` 失败之前，每个项目可以跳过的次数。通过 `<skippable-exception-classes>` 标签，我们定义了哪些异常被视为跳过的理由。`SkipListener`\
  \ 在标准的 `<listeners>` 块中注册，该块也用于所有其他监听器类型。\n\n要定义跳过的异常列表，我们可以结合使用 `<include>` 和 `<exclude>`\
  \ 来定义异常类型。此示例超出了本书的讨论范围，因此留给您自行实验。\n\n`BatchConfiguration` 和主类再次被复用。清单 9-105 展示了输出结果。\n\
