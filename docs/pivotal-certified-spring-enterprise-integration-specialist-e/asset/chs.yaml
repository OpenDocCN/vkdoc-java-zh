  >\n\n<job id=\"prepareTeaJob\">\n    <step id=\"boilWaterStep\" next=\"addTeaStep\"\
  >\n      <tasklet ref=\"boilWater\" />\n      <listeners>\n        <listener ref=\"\
  hotWaterStepListener\" />\n      </listeners>\n    </step>\n    <step id=\"addTeaStep\"\
  \ next=\"addWaterStep\">\n      <tasklet ref=\"addTea\" />\n    </step>\n    <step\
  \ id=\"addWaterStep\">\n      <tasklet ref=\"addWater\" />\n      <listeners>\n\
