  \n重试的 Java 配置\n\n对于`Retry`的 Java 配置示例，我们将使用相同的类，仅将 XML 配置替换为清单 9-110 中的`BatchConfiguration`。\n\
  \n***清单 9-110***. 重试的 Java 配置（0932-retry-javaconfig）\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\nimport net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\n\
  import net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n  @Bean\n\
    public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n      SimpleRecordReader\
  \ simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n      SimpleRecordWriter\
  \ simpleRecordWriter,\n      SimpleRetryListener simpleRetryListener) {\n    return\
  \ stepBuilderFactory.get(\"simpleRecordsStep\")\n        .<String, String> chunk(4)\n\
          .reader(simpleRecordReader)\n        .processor(simpleRecordProcessor)\n\
          .writer(simpleRecordWriter)\n        .faultTolerant()\n        .retry(IllegalStateException.class)\n\
          .retryLimit(3)\n        .listener(simpleRetryListener)\n        .build();\n\
    }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory jobBuilderFactory,\n\
        Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"simpleRecordsJob\"\
  ).start(simpleRecordsStep).build();\n  }\n}\n```\n\n与`Skip`类似，重试配置需要通过`faultTolerant()`方法启动。使用`retry()`，我们定义可以重试的异常，在本例中是`IllegalArgumentException`。重试限制配置为`3`，并且我们还配置了`simpleRetryListener`作为重试监听器。`Job`仅使用`simpleRecordsStep`。运行此示例时，我们会得到与前一个示例（清单\
  \ 9-109）相同的输出。\n\n步骤的条件执行\n\nSB 提供了以编程方式决定是否需要执行`Step`的功能。这种编程决策在实现`JobExecutionDecider`的\
  \ Bean 中完成，然后在构建`Job`时，通过 XML 的`<decision>`元素，或通过 Java 配置中`next()`、`on()`、`to()`和`from()`方法的组合来使用该\
  \ Bean。\n\n步骤决策的 XML 配置\n\n清单 9-111 展示了`JobExecutionDecider`的实现。\n\n***清单 9-111***.\
  \ JobExecutionDecider 实现（0933-decision-xml）\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
  import org.springframework.batch.core.JobExecution;\nimport org.springframework.batch.core.StepExecution;\n\
  import org.springframework.batch.core.job.flow.FlowExecutionStatus;\nimport org.springframework.batch.core.job.flow.JobExecutionDecider;\n\
  import org.springframework.stereotype.Component;\n\n@Component\npublic class TeaIngredientDecider\
  \ implements JobExecutionDecider {\n  @Override\n  public FlowExecutionStatus decide(JobExecution\
  \ jobExecution,\n      StepExecution stepExecution) {\n    String teaIngredient\
  \ = jobExecution.getJobParameters().getString(\"teaIngredient\");\n    return (\"\
  milk\".equals(teaIngredient))\n        ? new FlowExecutionStatus(teaIngredient)\n\
          : FlowExecutionStatus.COMPLETED;\n  }\n}\n```\n\n\n\n作为 `JobExecutionDecider`\
  \ 的组件必须实现 `decide()` 方法，该方法需要返回 `FlowExecutionStatus` 类型。我们可以使用标准的 SB 常量——例如 `FlowExecutionStatus.COMPLETED`\
  \ 或 `FlowExecutionStatus.FAILED`。请注意，`FlowExecutionStatus` 中还有更多开箱即用的状态常量。\n\n我们也可以将任意字符串值包装成\
  \ `FlowExecutionStatus` 类型，这除了开箱即用的状态常量外，还为我们提供了无限数量的流程控制机会。在这种情况下，我们从注入的 `jobExecution`\
  \ 实例中检索 `teaIngredient` 作业参数，如果牛奶是所需的成分，我们就在返回值中指明；否则，返回状态将为 `COMPLETED`。\n\n对于此示例，我们还引入了一个名为\
  \ `AddMilk` 的新 tasklet 步骤。因为它与其他所有茶 tasklet 类似，我们省略了其代码清单。它模拟了“添加牛奶”操作。清单 9-112\
  \ 展示了 XML 配置。\n\n***清单 9-112***. 条件步骤的 XML 配置（位于示例项目 0933-decision-xml 的 src/main/resource\
  \ 文件夹中的文件 batch-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  <beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
  http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<job id=\"prepareTeaJob\">\n    <step id=\"boilWaterStep\" next=\"addTeaStep\"\
  >\n      <tasklet ref=\"boilWater\"/>\n    </step>\n    <step id=\"addTeaStep\"\
  \ next=\"addWaterStep\">\n      <tasklet ref=\"addTea\"/>\n    </step>\n    <step\
  \ id=\"addWaterStep\" next=\"teaIngredientDecision\">\n      <tasklet ref=\"addWater\"\
  />\n    </step>\n    <decision decider=\"teaIngredientDecider\" id=\"teaIngredientDecision\"\
  >\n      <next on=\"milk\" to=\"addMilkStep\"/>\n      <end on=\"COMPLETED\"/>\n\
      </decision>\n    <step id=\"addMilkStep\">\n      <tasklet ref=\"addMilk\"/>\n\
      </step>\n  </job>\n</beans:beans>\n```\n\n`AddWater` 步骤将 `teaIngredientDecision`\
  \ 定义为下一个 `Step`。此决策块使用 `TeaIngredientDecider` bean 作为决策逻辑。如果决策器返回 `milk` 值，则执行 `addMilkStep`。如果返回任何其他值，则结束\
  \ `Job` 流程。清单 9-113 展示了此示例的主类。\n\n***清单 9-113***. 决策步骤示例的主类（0933-decision-xml）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.JobParameters;\nimport org.springframework.batch.core.JobParametersBuilder;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ConfigurableApplicationContext;\n\
  \n@SpringBootApplication\npublic class BatchApplication {\n  public static void\
  \ main(String[] args) throws Exception {\n    ConfigurableApplicationContext context\
  \ =\n        SpringApplication.run(BatchApplication.class, args);\n\nJobLauncher\
  \ jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n    Job job = (Job)\
  \ context.getBean(\"prepareTeaJob\");\n\njobLauncher.run(job, createJobParameters(\"\
  milk\"));\n    jobLauncher.run(job, createJobParameters(\"\"));\n    context.close();\n\
    }\n\npublic static JobParameters createJobParameters(String teaIngredient) {\n\
      return new JobParametersBuilder()\n        .addString(\"teaIngredient\", teaIngredient)\n\
          .toJobParameters();\n  }\n}\n```\n\n作业 `prepareTeaStep` 首先使用参数 `teaIngredient`\
  \ 为 `milk` 执行，第二次执行时不带任何茶叶成分。运行此示例后，我们可以在清单 9-114 中观察输出。\n\n***清单 9-114***. 决策步骤示例的输出\n\
