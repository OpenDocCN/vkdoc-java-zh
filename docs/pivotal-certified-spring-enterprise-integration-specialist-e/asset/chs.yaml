  \ 的实现。\n\n\n\n***清单 9-77***. StepListener 实现（0920-step-listener-javaconfig）\n\n\
  ```\npackage net.lkrnac.book.eiws.chapter09;\nimport org.springframework.batch.core.ExitStatus;\n\
  import org.springframework.batch.core.annotation.AfterStep;\nimport org.springframework.batch.core.annotation.BeforeStep;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
  import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\n\n@Component\n\
  public class HotWaterStepListener {\n  private SimpleExecutablePoint executablePoint;\n\
  \n@Autowired\n  public HotWaterStepListener(SimpleExecutablePoint executablePoint)\
  \ {\n    super();\n    this.executablePoint = executablePoint;\n  }\n\n@BeforeStep\n\
    public void beforeHotWaterStep() {\n    executablePoint.execute(\"小心热水！\");\n\
    }\n\n@AfterStep\n  public ExitStatus afterHotWaterStep() {\n    executablePoint.execute(\"\
  涉及热水操作的步骤已完成\");\n    return ExitStatus.COMPLETED;\n  }\n}\n```\n\n在本例中，我们使用注解来定义拦截点。请注意，我们无需使用\
  \ `StepExecution` 参数，并且可以自由选择拦截方法的名称。但如果需要，我们也可以将任何 SB 元数据实例作为参数注入到这些拦截方法中。\n\n\
  此外，在 `@AfterStep` 方法中根据需要更改 `Step ExitStatus` 的选项也很有用。如果我们想在监听器中更改 `StepExecution`\
  \ 的 `ExitStatus`，这种机制会非常方便。清单 9-78 展示了 Java 批处理配置。\n\n***清单 9-78***. StepExecutionListener\
  \ 的 Java 配置（0920-step-listener-javaconfig）\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
