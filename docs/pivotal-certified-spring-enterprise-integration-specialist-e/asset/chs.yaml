  \ 执行 `Step` 并以 `RepeatStatus.FINISHED` 状态完成时，SB 默认不允许其再次启动。这是因为该 `Step` 所代表的工作被视为已完成，默认情况下不应再次执行。当然，我们可以通过将\
  \ `<tasklet>` 的 XML 属性 `allow-start-if-complete` 设置为 `true`，或者在构建 `Step` 时调用 `allowStartIfComplete(true)`\
  \ 方法来改变这一行为。这些步骤在处理完成后，对于验证或释放资源可能很有用。\n\n我们还可以定义 `Step` 可执行的次数。这可以通过 `<tasklet>`\
  \ 的 `start-limit` XML 属性，或者在 Java 配置的 `Step` 构建过程中通过 `startLimit()` 方法进行配置。这在某些场景下非常方便——例如，当我们需要用初始元数据预填充数据库时，我们可能希望确保它只运行一次，并将启动限制配置为\
  \ `1`。\n\n我们还可以配置 `Job` 的重启行为。默认情况下，`Job` 是可重启的。如果我们想禁用作业的重启，需要将 XML 标签 `<job>`\
  \ 的 `restartable` 属性设置为 `false`，或者在构建 `Job` 时使用 `preventRestart()` 方法。\n\n步骤重启的\
  \ XML 配置示例\n\n清单 9-93 展示了 XML 配置。\n\n***清单 9-93***. 步骤与作业重启的 XML 配置（文件位于示例项目 0926-restart-xml\
  \ 的 src/main/resource 文件夹中的 batch-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n  http://www.springframework.org/schema/batch/spring-batch.xsd\n\
    http://www.springframework.org/schema/beans\n  http://www.springframework.org/schema/beans/spring-beans.xsd\"\
  >\n\n<step id=\"boilWaterStepParent\">\n    <tasklet ref=\"boilWater\" allow-start-if-complete=\"\
  true\"/>\n  </step>\n  <step id=\"addTeaStepParent\">\n    <tasklet ref=\"addTea\"\
  \ allow-start-if-complete=\"true\" start-limit=\"2\"/>\n  </step>\n  <step id=\"\
  addWaterStepParent\">\n    <tasklet ref=\"addWater\"/>\n  </step>\n\n<job id=\"\
  prepareTeaJob\">\n    <step id=\"boilWaterStep\" parent=\"boilWaterStepParent\"\
  \ next=\"addTeaStep\"/>\n    <step id=\"addTeaStep\" parent=\"addTeaStepParent\"\
  \ next=\"addWaterStep\"/>\n    <step id=\"addWaterStep\" parent=\"addWaterStepParent\"\
  />\n  </job>\n\n<job id=\"prepareTeaJobNotRestartable\" restartable=\"false\">\n\
      <step id=\"boilWaterStepNR\" parent=\"boilWaterStepParent\" next=\"addTeaStepNR\"\
  />\n    <step id=\"addTeaStepNR\" parent=\"addTeaStepParent\" next=\"addWaterStepNR\"\
  />\n    <step id=\"addWaterStepNR\" parent=\"addWaterStepParent\"/>\n  </job>\n\
  </beans:beans>\n```\n\n这里我们配置了两个 `Job`。第二个作业不可重启。如果我们尝试运行该作业两次，此尝试将抛出异常。\n\n两个 `Job`\
  \ 都使用了从父 `Step` 继承而来的步骤，而这些父 `Step` 又使用了我们通用的 `Tasklet`。第一个 `Step` 定义 `boilWaterStepParent`\
  \ 可以在我们需要的任何时候重启。第二个 `Step` 定义 `addTeaStepParent` 可以重启两次。如果我们尝试第三次运行它，它将抛出异常并导致\
  \ `JobExecution` 失败。\n\n最后一个 `Step` 定义 `addWaterStepParent` 使用默认的重启行为，即不执行 `Step`\
  \ 逻辑，但允许 `JobExecution` 成功完成。\n\n此示例再次使用了通用的 `BatchConfiguration`。主要的 Spring Boot\
