  \ conn0: url=jdbc:h2:mem:testdb user=SA\n\n我们可以看到来自 JTA 和 XA 事务管理器的各种日志条目，这展示了 JTA\
  \ 事务的资源密集程度。这种行为在图 7-3 中得到了最佳解释。\n\n![9781484207949_Fig07-03.jpg](img/9781484207949_Fig07-03.jpg)\n\
  \n\n\n图 7-3. JTA 事务示例的序列图（文件位于示例项目 0701-jta-xml-config 的 uml-diagrams 文件夹中的 sequence.uml）\n\
  \n*请注意，此序列图仅涵盖单个消息的处理过程。* 接收消息后，它会被插入到`TEXT_TABLE`中。但在第一个接收到的消息的 JMS 监听器的`postprocess()`方法中引发异常后，全局事务管理器将向\
  \ H2 数据库和 JMS 队列`ExpiryQueue`发送回滚指令。*这与监听器*6-28*中的相同实现不同，在后者中，H2 数据库提交了本地事务。*\n\n\
  在向 JMS 队列发送回滚后，该消息会进入第二轮处理。同样，全局事务启动，消息被插入到`TEXT_TABLE`中。但在第二次接收时，`postprocess()`不会抛出异常，我们的全局事务成功结束，并向两个数据源发送提交指令。全局\
  \ ACID 的美好时光。当我们的应用程序使用 JTA 的性能特征可接受时，我们就可以高枕无忧了。\n\n但请注意，我们在此处使用的是点对点消息传递模式。处理\
  \ JMS 主题（其中会有多个消费者）时，需要采用更加谨慎（且资源密集）的方法来处理跨每个消费者的 JTA 事务。\n\n使用 Java 配置的 Spring\
  \ JTA 示例\n\n每位负责任的 Spring 开发人员都注意到了从 XML 配置向 Java 配置的转变。因此，本节将介绍如何在没有 XML 的情况下配置\
  \ Spring JTA 支持。代码清单 7-10 展示了一个 JTA 配置。\n\n***代码清单 7-10***. Java JTA 配置（0702-jta-java-config）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter07;\n\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  import org.springframework.transaction.jta.JtaTransactionManager;\nimport com.atomikos.icatch.jta.UserTransactionImp;\n\
  import com.atomikos.icatch.jta.UserTransactionManager;\n\n@Configuration\n@EnableTransactionManagement\n\
  public class JtaConfiguration {\n  @Bean(initMethod = \"init\", destroyMethod = \"\
  close\")\n  public UserTransactionManager atomikosTransactionManager() {\n    return\
  \ new UserTransactionManager();\n  }\n\n@Bean\n  public JtaTransactionManager transactionManager(\n\
        UserTransactionManager atomikosTransactionManager) {\n    JtaTransactionManager\
  \ transactionManager = new JtaTransactionManager();\n    transactionManager.setTransactionManager(atomikosTransactionManager);\n\
      transactionManager.setUserTransaction(new UserTransactionImp());\n    return\
  \ transactionManager;\n  }\n}\n```\n\n此配置类通过`@EnableTransactionManagement`注解启用 Spring\
  \ 事务支持。与 XML 配置一样，我们需要将`com.atomikos.icatch.jta.UserTransactionManager` bean 注册为全局事务管理器的实现。我们使用此`@Bean`注解的`initMethod`和`destroyMethod`属性来告诉\
  \ Spring 如何实例化和销毁此 bean。\n\n第二个 bean 将 Atomikos 事务管理器包装到`JtaTransactionManager`中，后者是`PlatformTransactionManager`的一个实现，并为该应用程序启用\
  \ Spring 事务支持。同样，我们需要将`userTransaction`属性配置为`com.atomikos.icatch.jta.UserTransactionImp`的实例，以便\
  \ Atomikos 在此非 Java EE 应用程序中正常工作。代码清单 7-11 深入介绍了 XA 数据源的 JDBC 配置。\n\n***代码清单 7-11***.\
  \ JDBC XA 数据源的 Java 配置（0702-jta-java-config）\n\n```\npackage net.lkrnac.book.eiws.chapter07;\n\
  \nimport javax.sql.DataSource;\nimport org.h2.jdbcx.JdbcDataSource;\nimport org.springframework.boot.jta.atomikos.AtomikosXADataSourceWrapper;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\n\n@Configuration\npublic class\
  \ JdbcConfiguration {\n  @Bean\n  public DataSource dataSource() throws Exception\
  \ {\n    JdbcDataSource h2DataSource = new JdbcDataSource();\n    h2DataSource.setUrl(\"\
  jdbc:h2:mem:testdb\");\n    h2DataSource.setUser(\"sa\");\n    AtomikosXADataSourceWrapper\
  \ wrapper = new AtomikosXADataSourceWrapper();\n    return wrapper.wrapDataSource(h2DataSource);\n\
    }\n\n@Bean\n  public JdbcTemplate jdbcTemplate(DataSource dataSource) {\n    return\
  \ new JdbcTemplate(dataSource);\n  }\n}\n```\n\n与 JTA XML 配置类似，我们需要将 H2 数据源包装到`AtomikosXADataSourceWrapper`中。这允许\
  \ H2 数据库参与全局事务。为了使用方便的 Spring JDBC 抽象，我们基于此 XA 数据源定义了`JdbcTemplate`。代码清单 7-12 展示了\
  \ JMS 配置。\n\n***代码清单 7-12***. JMS XA 数据源的 Java 配置（0702-jta-java-config）\n\n```\n\
  package net.lkrnac.book.eiws.chapter07;\n\nimport java.util.Hashtable;\nimport javax.jms.ConnectionFactory;\n\
  import javax.jms.Session;\nimport javax.naming.InitialContext;\nimport javax.naming.NamingException;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
  import org.springframework.jms.core.JmsTemplate;\n\n@Configuration\n@EnableJms\n\
  public class JmsConfiguration {\n  @Bean\n  public InitialContext initialContext()\
  \ throws NamingException {\n    Hashtable<Object, Object> env = new Hashtable<Object,\
  \ Object>();\n    env.put(\"java.naming.factory.initial\",\n        \"org.jnp.interfaces.NamingContextFactory\"\
  );\n    env.put(\"java.naming.factory.url.pkgs\",\n        \"org.jboss.naming:org.jnp.interfaces\"\
  );\n    env.put(\"java.naming.provider.url\", \"jnp://localhost:1099\");\n    return\
  \ new InitialContext(env);\n  }\n\n@Bean\n  public ConnectionFactory connectionFactory(InitialContext\
  \ initialContext)\n      throws NamingException {\n    return (ConnectionFactory)\
  \ initialContext.lookup(\"/XAConnectionFactory\");\n  }\n\n@Bean\n  public JmsTemplate\
  \ jmsTemplate(ConnectionFactory connectionFactory) {\n    return new JmsTemplate(connectionFactory);\n\
    }\n\n@Bean\n  public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
        ConnectionFactory connectionFactory) {\n    DefaultJmsListenerContainerFactory\
  \ factory =\n        new DefaultJmsListenerContainerFactory();\n    factory.setConnectionFactory(connectionFactory);\n\
      factory.setSessionTransacted(true);\n    factory.setSessionAcknowledgeMode(Session.SESSION_TRANSACTED);\n\
      return factory;\n  }\n}\n```\n\n此配置类通过`@EnableJms`注解启用 JMS，并定义了访问 HornetQ 所需的`InitialContext`\
  \ bean。`ConnectionFactory` bean 从此 HornetQ 上下文中检索`XAConnectionFactory`实现。`JmsTemplate`和`DefaultJmsListenerContainerFactory`是上一章解释过的标准\
  \ Spring JMS bean。*重要的配置是启用监听器容器的事务模式；否则，此监听器容器将无法接入 JTA 基础设施。* 此示例的主类在代码清单 7-13\
  \ 中突出显示。\n\n***代码清单 7-13***. 主类 Java 配置 JTA 示例（0702-jta-java-config）\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter07;\n\n\n\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.scheduling.annotation.EnableScheduling;\n\n@Configuration\n\
  @ComponentScan\n@EnableScheduling\npublic class JtaApplication {\n  public static\
  \ void main(String[] args) throws Exception {\n    SpringApplication.run(JtaApplication.class,\
  \ args);\n  }\n}\n```\n\n主类利用 Spring Boot 的 `main` 方法机制，通过 `main` 方法启动应用程序。同样，我们避免使用自动配置，因为我们希望突出\
  \ JTA 的纯 Spring 配置。`@EnableScheduling` 开启了消息发送器所使用的调度功能，如**清单 7-13** 所示。`@ComponentScan`\
  \ 允许我们使用已描述的 Spring 配置和公共类，以及**清单 7-14** 中的监听器。\n\n***清单 7-14***. Java 配置 JTA 示例使用的\
  \ JMS 监听器 (0702-jta-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter07;\n\
  \nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.annotation.JmsListener;\n\
  import org.springframework.stereotype.Component;\nimport org.springframework.transaction.annotation.Transactional;\n\
  \n@Component\n@Transactional\npublic class SimpleMessageListener {\n  private SimpleService\
  \ simpleService;\n  private boolean errorSimulated = false;\n\n@Autowired\n  public\
  \ SimpleMessageListener(SimpleService simpleService) {\n    super();\n    this.simpleService\
  \ = simpleService;\n  }\n\n@JmsListener(destination = \"ExpiryQueue\")\n  public\
  \ void readMessage(String message) {\n    simpleService.processText(message);\n\
      postprocess(message);\n  }\n\nprivate void postprocess(String message) {\n    //\
  \ simulate error\n    if (!errorSimulated) {\n      errorSimulated = true;\n      throw\
  \ new IllegalArgumentException(message);\n    }\n  }\n}\n```\n\n这个监听器与 XML JTA 示例中的**清单\
  \ 7-7** 类似。不同之处在于，我们必须指定这个 Bean 将参与全局事务。这是通过 `@Transactional` 注解完成的。第二个区别是 `@JmsListener`\
  \ 注解，它标记了监听 JMS 消息的方法。之所以需要它，是因为没有单独的 XML 配置来为 Spring 配置它。\n\n当我们运行这个示例时，会得到与**图\
  \ 7-1** 完全相同的行为，以及类似于**清单 7-9** 中相同示例 `0701-jta-xml-config` 的输出。（我相信你不想再看到那个 Mordor\
  \ 了。）但在这个例子中，配置和代码比 XML 配置示例更具可读性和可维护性。\n\nSpring Boot JTA 示例\n\n一个更具可读性和可维护性的应用程序可以基于\
  \ Spring Boot 的自动配置支持，因为它为我们注册了所有必要的配置 Bean。我们在**清单 7-15** 中指定了 HornetQ 配置。\n\n\
  ***清单 7-15***. HornetQ Spring Boot 配置（示例项目 0703-jta-spring-boot 的 src/main/resources\
  \ 文件夹中的 application.properties 文件）\n\n```\nspring.hornetq.mode=embedded\nspring.hornetq.embedded.enabled=true\n\
  spring.hornetq.embedded.queues=ExpiryQueue\n```\n\n此配置文件启用了一个名为 `ExpiryQueue` 的\
  \ JMS 目标地址的 HornetQ JMS 服务器嵌入式实例。主类如**清单 7-16** 所示。\n\n***清单 7-16***. JTA 示例的 Spring\
  \ Boot 主类 (0703-jta-spring-boot)\n\n```\npackage net.lkrnac.book.eiws.chapter07;\n\
  \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.scheduling.annotation.EnableScheduling;\n\n@SpringBootApplication\n\
  @EnableScheduling\npublic class JtaApplication {\n  public static void main(String[]\
  \ args) throws Exception {\n    SpringApplication.run(JtaApplication.class, args);\n\
    }\n}\n```\n\n这个 Spring Boot 主类使用 `@SpringBootApplication` 注解来启用 Spring Boot 对\
  \ Spring 应用程序的固定配置扫描。它会对当前包及其子包进行组件扫描，并扫描类路径依赖项以启用这些库提供的功能。在这种情况下，它为以下内容创建了必要的 Spring\
  \ 基础设施：\n\n*   Atomikos JTA 事务管理器\n*   嵌入式 HornetQ JMS 服务器和具有 XA 支持的 `JmsTemplate`\n\
  *   H2 嵌入式数据库和具有 XA 支持的 `JdbcTemplate`\n\n这些都在此示例的 Maven 配置中定义，可在 GitHub 上找到。这就是所需的所有配置。它还使用了**清单\
  \ 7-1**、**7-2** 和**7-3** 中所示的公共类，以及**清单 7-14** 中监听器的完全相同的实现。这个示例很好地说明了为什么每个 Spring\
  \ 开发者都应该研究 Spring Boot，因为它显著减少了 JTA 支持的配置。\n\n同样，当我们运行这个示例时，行为与**图 7-1** 相同。输出也是如此，如**清单\
  \ 7-9**（示例 `0701-jta-xml-config`）所示。\n\n总结\n\n本章探讨了 JTA/XA 协议如何帮助我们通过全局分布式事务覆盖各种事务性数据源，并在其上实现\
  \ ACID 特性。即使这种支持在 Spring 中很有吸引力且易于使用，每个聪明的开发者都应该尽可能避免使用分布式事务。\n\n示例展示了使用 XML 和 Java\
  \ 配置全局事务管理器是多么容易，而使用 Spring Boot 的新机制则更加容易。我们还将这种支持与纯事务支持进行了比较，并探讨了它如何帮助我们解决在单个应用程序中使用多个独立数据源可能遇到的问题。\n\
  \n第 8 章\n\n![image](img/frontdot.jpg)\n\nSpring Integration\n\n本书涵盖了企业系统的两个最基本范式：请求-响应模型（例如\
  \ REST、SOAP）和消息传递（JMS）。第一个可以是同步的（服务调用者被阻塞，直到响应到达）或异步的（调用者注册一个回调来执行，或者注册一个 `Future`\
  \ 在响应到达时填充）。第二个，根据定义，是异步的；消息的发送者不会等待消费者处理完消息。\n\n这些机制对于提供分布式应用程序之间的通信至关重要：*将它们集成在一起*。但在现代企业中，需要集成成百上千个应用程序。当然，企业架构师需要尽可能保持它们的解耦，但为了向客户提供功能和价值，这样的企业系统将会有一定程度的耦合。不难想象，这样一个复杂分布式系统的流程图随着时间的推移会变得多么复杂。\n\
  \n对于这样的需求，请求-响应和消息传递集成作为构建块和抽象来说粒度太粗了。随着越来越大的企业系统的产生，各种架构模式开始涌现。Gregor Hohpe 和 Bobby\
  \ Woolf 将它们收集到他们著名的著作《企业集成模式》（Addison-Wesley Professional，2003）中。这些模式提供了比请求-响应或消息传递模型更高级别的抽象，但通常将它们用作部分构建块。\n\
  \n\n\n大约在同一时期，David Chappell 出版了《*企业服务总线*》（O’Reilly Media, 2004）。其目标是在面向服务的架构（SOA）中简化服务的集成与通信。核心概念是一条总线（类似于硬件总线），它应控制服务之间请求或消息交换的路由与流程。\n\
  \n在这些模式和原则被规范化之后，许多公司和开源开发者认识到，这些模式和原则可以实现在通用框架中，这些框架通常被称为企业服务总线（ESB）框架。如今，它们有时被分为轻量级集成框架、中型\
  \ ESB 框架和 ESB 分布式系统这几类。\n\nESB 软件产品领域的主要参与者如下：\n\n*   开源\n    *   Spring Integration\
  \ 框架\n    *   Apache Camel\n    *   Mule ESB（社区版）\n    *   Talend ESB\n    *   Petals\
  \ ESB\n    *   Apache ServiceMix\n    *   WSO2 ESB\n    *   JBoss ESB\n*   商业\n\
  \    *   WebSphere Message Broker（IBM）\n    *   WebSphere ESB（IBM）\n    *   Oracle\
  \ ESB\n    *   Mule ESB（企业版）\n\nSpring Integration 简介\n\n作为一本关于使用 Spring 进行企业集成的书，它显然会重点介绍\
  \ Spring Integration（SI）框架。这一切始于 Mark Fisher 阅读《*企业集成模式*》一书并开始实现这些模式。多年来，它发展成为一个项目，如今被认为是\
  \ ESB 框架市场的领导者（公平地说，与 Apache Camel 并列）。\n\nSI 是 Spring 产品组合中的一个独立项目，但它使用了 Spring\
  \ 框架的概念，例如依赖注入和控制反转。因此，它需要将 Spring 框架作为依赖项。\n\nSpring Integration 提供了两个杀手级特性：\n\n\
  *   以内存消息传递的形式实现企业集成模式\n*   以可插拔适配器的形式与各种技术和外部应用进行强大的集成\n\n来自同一项目组合的 API 通常不会相互竞争，但\
  \ SI 是个例外。其适配器为 Spring 模块（如 Spring JDBC、Spring MVC、Spring JMS、Spring ORM、Spring\
  \ WS）以及各种 Spring Data 和 Spring Social 项目提供了替代 API。这是因为 SI 旨在通过易于映射到这些外部 API 的方式，实现企业集成模式的可插拔实现。事实上，SI\
  \ 经常在底层使用这些模块和项目，以避免重复造轮子。\n\n来自外部系统的消息或请求，通过强大的 Spring 转换机制被转换为内存消息（Java POJO）。这确保了与几乎所有现代（例如\
  \ WebSockets）或传统（例如 FTP）协议，或流行的第三方服务（例如 Twitter）的极致互操作性。\n\n这种消息传递特性确保数据流被分离成小的、可组合的单元，这些单元之间同步或异步地交换消息。这种方法确保了高水平的解耦、模块化和可测试性。将业务逻辑与集成（通常称为*管道*）逻辑的关注点分离是\
  \ SI 的一个关键目标。\n\n另一个主要特性是在同步和异步处理之间轻松切换：SI 抽象允许将异步执行器、调度器和轮询器插入消息流中，而无需更改处理逻辑。当使用同步消息流时，我们可以轻松地在\
  \ SI 组件之间传播异常和事务。\n\n由于 Spring 框架的主要配置方法最初是针对 XML 配置的，SI 从一开始就沿用了这一习惯。与此同时，Spring\
  \ 框架已将其配置重点转向基于 Java 注解的方法。这一转变也影响了 SI 框架，现在大多数组件以及集成流都可以使用 Java 注解进行配置。但使用 XML\
  \ 建模集成流仍然是首选方法，原因如下：\n\n*   许多用于外部协议或技术的适配器可能只能通过 XML 提供。\n*   当 ESB 流分散到带有注解的各种\
  \ Java 类中时，往往难以跟踪。\n*   SI 流可以借助 Spring Tools Suite (STS) IDE 进行可视化。我们将在本章后面探讨这些图表。\n\
  \n![Image](img/sq.jpg) **注意**  如果你是一名 Spring 开发者或希望成为 Spring 开发者，并且不熟悉 STS，那么是时候从\
  \ `http://spring.io/tools/sts` 下载并尝试它了。它基于 Eclipse，因此这个流行 IDE 的所有功能都适用于 STS。除了 Eclipse\
  \ 提供的功能外，STS 还包含许多为 Spring 开发量身定制的功能。STS 的质量保证在于它由 Spring 团队维护。\n\nSpring Integration\
  \ 的主要概念\n\n编程模型的核心是在消息端点之间发送、路由和消费消息。Spring Integration 包含许多组件，其中大部分是可配置的。每个组件都属于以下三类之一：\n\
  \n*   消息\n*   消息通道\n*   消息端点\n\n*消息*通过*消息通道*在*消息端点*之间交换。单个消息通道连接两个消息端点。但一个消息端点可以有任意数量（甚至为零）的输入和输出消息通道。\n\
  \n当消息端点从消息通道消费消息时，它可以*被动接收它们*（监听）或*主动读取它们*（轮询）。消息通道可以*透传消息*（直接通道）或*临时将它们存储在内存中*（队列通道）。\n\
  \n当我们建模 SI 流时，理解该流是*双向的*（请求-响应性质）还是*单向的*（消息传递或即发即弃性质）非常重要。基于这些需求，我们可能希望使用专为我们的场景设计的专用\
  \ SI 组件，或使用专门的机制来回复消息的发起者。有时，这种流可以组合（例如，从数据库读取值，通过 REST API 暴露它，并将关于此交互的消息发送到跟踪子系统）。\n\
  \n![Image](img/sq.jpg) **注意**  Spring Integration 提供了许多基本的内存组件以及许多用于外部系统、协议或技术的适配器，以实现极致的可配置性和灵活性。无论是本书还是\
  \ Enterprise Integration with Spring 认证，都无法详细说明 SI 提供的每个适配器或 SI 组件提供的属性。如此深入的探讨需要一本专门的书籍。我们涵盖了主要的\
  \ SI 组件和特性，这些内容可以让您快速上手该框架，从而掌握编程模型的概念。然后，借助 SI 参考文档，这些原则和机制可以复用于其他组件。\n\nSI 示例中使用的通用类\n\
  \n在我们开始深入探讨具体的 SI 特性之前，先介绍一些在我们的许多示例中使用的简单类和接口。由于 SI 主题很广泛，我们将使用类似 Hello World 的示例。试图将这些示例映射到一个简单的用例会使示例变得臃肿。第一个通用接口如清单\
  \ 8-1 所示。\n\n***清单 8-1***. SI 流的双向包装器接口 (0800-integration-common)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08.in;\n\npublic interface SiWrapperService {\n  boolean\
  \ processText(String text);\n}\n```\n\n\n\n这个简单的接口用于处理给定的文本参数并返回操作结果。它将被用来封装 SI\
  \ 双向流。因此，我们不会实现这个接口，而是使用 SI 消息流作为该接口的实现。第二个接口如清单 8-2 所示。\n\n***清单 8-2***. SI 流的单向封装接口\
  \ (0800-integration-common)\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
  \npublic interface SiWrapperServiceVoid {\n  void processText(String text);\n}\n\
  ```\n\n这个接口与 `SiWrapperService` 类似，但在此情况下，不会向调用者返回任何结果。它也将用于封装 SI 流，此处为单向流。接下来，我们在清单\
  \ 8-3 中介绍仓库类。\n\n***清单 8-3***. 大多数示例中使用的仓库类 (0800-integration-common)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08.out;\nimport lombok.extern.slf4j.Slf4j;\nimport\
  \ org.springframework.stereotype.Repository;\n\n@Slf4j\n@Repository\npublic class\
  \ WriteRepository {\n  public int persist(String text) {\n    log.info(\"Text persisted:\
  \ \" + text);\n    return 1;\n  }\n}\n```\n\n为简化此示例，这个仓库类将是模拟的。它会记录给定的消息参数，并返回硬编码为\
  \ 1 的写入记录数。它使用了 `@Repository` 注解，以便我们可以通过组件扫描将其注入 Spring 容器。`@Slf4j` 注解之前已提及，用于简化日志记录器的配置。我们公共代码库中的最后一个类如清单\
  \ 8-4 所示。\n\n***清单 8-4***. 大多数示例中使用的服务类 (0800-integration-common)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08.out;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Service;\n\n@Service\npublic class WriteService\
  \ {\n  private WriteRepository writeRepository;\n\n@Autowired\n  public WriteService(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    }\n\npublic void write(String message) {\n    writeRepository.persist(message);\n\
    }\n\npublic boolean writeAndIndicateSuccess(String message) {\n    return writeRepository.persist(message)\
  \ == 1;\n  }\n}\n```\n\n该类名为 `WriteService`，因为它类似于 Hello World 的功能，即借助 `WriteRepository`\
  \ 来持久化消息。它使用了 `@Service` 注解，因此我们可以将其用作 Spring Bean。`WriteRepository` Bean 通过构造函数注入。\n\
  \n它提供了两个方法。`write()` 方法持久化消息，但不向调用者指示操作结果。此方法通常用作单向 SI 流的目标/输出逻辑。第二个方法 `writeAndIndicateSuccess()`\
  \ 同样持久化消息，并返回一个布尔值表示操作结果。您可能已经猜到，它将在示例中用作双向 SI 流的目标逻辑。\n\nSI 流通常从接收消息/请求的地方开始。将此端点视为\
  \ SI 流的输入。我们将属于 SI 流输入部分的 Spring Bean 或接口放入 `net.lkrnac.book.eiws.chapter``08``.in`\
  \ 包中。公共接口 `SiWrapperService` 和 `SiWrapperServiceVoid` 也属于此类。\n\n另一方面，SI 流也有输出部分。属于\
  \ SI 流输出部分的类或接口将放在 `net.lkrnac.book.eiws.chapter``08``.out` 包中。公共类 `WriteService`\
  \ 和 `WriteRepository` 属于此处。\n\n消息\n\nSI 框架使用的消息接口定义在 Spring Core 框架中。它由 Java 接口表示，其定义如清单\
  \ 8-5 所示。\n\n***清单 8-5***. 消息接口\n\n```\npackage org.springframework.messaging;\n\
  \npublic interface Message<T> {\n  T getPayload();\n  MessageHeaders getHeaders();\n\
  }\n```\n\n消息由消息头和消息载荷组成。该接口的签名使用了泛型，使用户能够将任何类型作为消息的载荷进行处理。`org.springframework.messaging.MessageHeaders`\
  \ 类型是 `Map<String, Object>` 的一种特殊实现。因此，我们可以根据消息头的名称将任何类型的消息头存储到消息中。\n\n默认情况下，当任何\
  \ SI 组件需要生成消息时，它会使用 `org.springframework.messaging.support.GenericMessage<T>` 实现。请注意，该接口和实现都不属于\
  \ SI 框架，而是属于 Spring 框架及其消息传递模块。自两个框架的 4.*x* 版本起，它们已从 SI 移入 Spring Core，因为 Spring\
  \ 团队正试图增强各种 Spring 消息传递抽象之间的互操作性。\n\n`GenericMessage<T>` 消息是*不可变的*。创建后，我们无法更改消息的载荷或消息头。因此，如果需要修改载荷或消息头，我们必须创建一个新消息，并发送这个新消息以替代原始消息。\n\
  \n这一点很重要，因为它确保了消息不会被我们逻辑后台运行的线程所操纵。当开发人员可以信赖消息不会在底层被随意更改时，他们就能专注于消息流的更高级抽象，并轻松地在同步（单线程）和异步（多线程）流之间切换。\n\
  \n但是，`GenericMessage<T>` 的不可变性是浅层的。即使我们无法更改消息载荷中存储的引用，也无法更改消息头值的引用，但如果载荷或消息头值所存储对象的类定义允许，我们仍然可以更改这些对象的字段。如果我们不注意，这一事实可能会引发问题，但\
  \ SI 对此无能为力，因为载荷和消息头值可以是任何类型。\n\n消息头用于存储消息的元数据。我们可以在消息中存储自定义的业务逻辑消息头，但也有一些消息头是 SI\
  \ 创建或理解的。默认情况下，所有消息都包含 `id` 或 `timestamp` 消息头。\n\n可以向消息添加消息头以修改 SI 行为或改变消息流。例如，我们可以使用\
  \ `priority` 消息头（以便优先级高的消息可以超越优先级低的消息）或 `replyChannel` 消息头（以便消息可以指定当回复发送给调用者组件时使用哪个通道）。我们将在后续示例中详细讨论这些消息头。\n\
  \nSI 消息可以通过两种主要方式创建：\n\n*   由 SI 框架自动创建\n    *   通过 SI 适配器从传输格式（例如 XML、JSON、文件）转换而来\n\
  \    *   当 SI 通用组件需要从旧消息创建新消息时（例如，丰富消息头、转换消息）\n*   通过编程方式创建\n\n编程方式创建消息\n\n熟悉 Java\
  \ 概念的读者知道，为了实现 `GenericMessage<T>` 的不可变性，其载荷和消息头字段必须标记为 `final`。因此，无法通过 setter 方法创建此类消息。我们可以使用\
  \ `GenericMessage<T>` 类提供的构造函数，但 SI 框架提供了一种更方便的方式，即借助 `org.springframework.integration.support.MessageBuilder<T>`。\n\
  \n使用此类，我们可以通过流式 API 执行以下操作：\n\n*   从头创建消息\n*   从现有消息创建消息\n*   通过专用方法设置默认消息头\n* \
  \  从其他消息复制消息头\n*   添加/删除自定义消息头\n\n\n\n如果你不熟悉*流畅 API* 这个术语，后续的示例会对其进行说明。请注意，Spring\
  \ Core 框架在 4.0 版本中引入了一个消息模块，其中包含 `org.springframework.messaging.support.MessageBuilder<T>`。它的实现与\
  \ `org.springframework.integration.support.MessageBuilder<T>` 略有不同，但生成的消息类型相同。使用\
  \ SI 时，我们应该使用 `org.springframework.integration.support.MessageBuilder<T>`，因为它可以创建专为\
  \ SI 通信定制的各种消息头。\n\n请记住，本示例的重点是消息的创建，而非消息的处理。本示例中的处理部分将被隐藏，并在本章后续部分进行解释。本示例将使用一个\
  \ SI 流程的包装器，如代码清单 8-6 所示。\n\n***代码清单 8-6***. 用于编程式消息创建示例的 SI 包装器接口 (0801-programmatic-message-creation)\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08.in;\nimport org.springframework.messaging.Message;\n\
  \npublic interface SiWrapperServiceMessage {\n  public void processMessage(Message<String>\
  \ message);\n}\n```\n\n这个 SI 流程包装器接口与代码清单 8-1 和 8-2 中的常见包装器接口略有不同，因为它接受的是完整的消息对象，而不仅仅是消息的有效负载。这是因为我们希望将带有消息头的消息传递给\
  \ SI 流程，以突出 `MessageBuilder<T>` 的特性。代码清单 8-7 展示了消息的创建过程。\n\n***代码清单 8-7***. 编程式消息创建示例\
  \ (0801-programmatic-message-creation)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceMessage;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.ImportResource;\nimport org.springframework.integration.support.MessageBuilder;\n\
  import org.springframework.messaging.Message;\n\n@SpringBootApplication\n@ImportResource(\"\
  classpath:si-config.xml\")\npublic class SiApplication {\n  public static void main(String[]\
  \ args) throws InterruptedException {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class,\
  \ args);\n\nSiWrapperServiceMessage wrapperService =\n        ctx.getBean(SiWrapperServiceMessage.class);\n\
  \nMessage<String> message1 = MessageBuilder.withPayload(\"message1\")\n            .setHeader(\"\
  simpleHeader\", \"simple header\")\n            .build();\n    wrapperService.processMessage(message1);\n\
  \nMessage<String> message2 = MessageBuilder.fromMessage(message1)\n        .setPriority(10)\n\
          .setCorrelationId(System.currentTimeMillis())\n        .build();\n    wrapperService.processMessage(message2);\n\
  \nMessage<String> message3 = MessageBuilder.withPayload(\"message3\")\n        .copyHeaders(message2.getHeaders())\n\
          .removeHeader(\"simpleHeader\")\n        .build();\n    wrapperService.processMessage(message3);\n\
  \nMessage<String> message4 = MessageBuilder.withPayload(\"message4\")\n        .setPriority(5)\n\
          .copyHeadersIfAbsent(message2.getHeaders())\n        .build();\n    wrapperService.processMessage(message4);\n\
    }\n}\n```\n\n这是一个包含 `main` 方法的 Java 类，它使用 Spring Boot 通过 `@SpringBootApplication`\
  \ 和 `SpringApplication.run()` 方法来启动应用程序。它导入了位于 `si-config.xml` 文件中的 XML SI 流程配置。隐藏在此\
  \ SI 配置背后的 SI 流程对于这个消息创建示例并不重要，因此我们暂时不关注它。位于 `si-config.xml` XML 配置中的 SI 构建块将在后续示例中解释。这里唯一重要的事实是，它配置了一个简单的\
  \ SI 流程，该流程仅在后台记录消息。\n\n在 `SpringApplication.run()` 之后，SI 应用程序被启动并配置好，我们就可以开始使用它了。首先，我们读取\
  \ `SiWrapperServiceMessage` bean，以便拥有发送消息的入口点。你可能会困惑，我们如何在不将其实现注册到 Spring 上下文的情况下注入这个\
  \ bean。我们在此仅提及，该接口的实现是在 `si-config.xml` 中配置的，并由 SI 组件组成。\n\n此调用之后的逻辑将在我们以 Java 应用程序方式执行此类后进行解释。我们可以观察到与代码清单\
  \ 8-8 类似的输出。\n\n***代码清单 8-8***. 编程式消息创建示例的输出\n\n```\n2015-08-21 21:39:12.353  INFO\
  \ 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage\n: Message: GenericMessage\
  \ [payload=message1, headers={simpleHeader=simple header,\nid=9779333f-b352-eb83-afdf-a52f7f4fed01,\
  \ timestamp=1440189552345}]\n2015-08-21 21:39:12.366  INFO 30700 --- [          \
  \ main] n.l.b.e.c.out.WriteServiceMessage\n: Message: GenericMessage [payload=message1,\
  \ headers={simpleHeader=simple header,\ncorrelationId=1440189552365, id=c46ff29f-c743-90dd-11b2-4c64e36a3d0b,\
  \ priority=10,\ntimestamp=1440189552365}]\n2015-08-21 21:39:12.367  INFO 30700 ---\
  \ [           main] n.l.b.e.c.out.WriteServiceMessage\n: Message: GenericMessage\
  \ [payload=message3, headers={correlationId=1440189552365,\nid=1fbbf243-0cc5-9d35-a8d1-f2d97a54d63d,\
  \ priority=10, timestamp=1440189552366}]\n2015-08-21 21:39:12.367  INFO 30700 ---\
  \ [           main] n.l.b.e.c.out.WriteServiceMessage\n: Message: GenericMessage\
  \ [payload=message4, headers={simpleHeader=simple header,\ncorrelationId=1440189552365,\
  \ id=b91e5386-9151-0c94-cc6f-361bb688f480, priority=5,\ntimestamp=1440189552367}]\n\
  ```\n\n借助 `MessageBuilder<T>` 的帮助，我们创建了一个消息，其有效负载为 `message1`，消息头为 `simpleHeader`，值为\
  \ `simple header`。对 `MessageBuilder<T>` 的调用，我们通过点号调用链式方法，这就是我们提到的*流畅 API*。这个链（流畅\
  \ API）可以一直持续到我们完成消息创建。创建过程通过调用 `MessageBuilder<T>.build()` 完成。最后需要这个调用，因为创建的消息是不可变的，`build()`\
  \ 方法会调用 `Message<T>` 和 `MessageHeaders` 的所有必要构造函数，根据记录的配置来创建我们的消息。\n\n创建消息后，我们调用\
  \ `wrapperService` bean 来启动 SI 流程，在这个简单案例中，该流程会记录消息。\n\n第二条消息是从 `message1` 创建的，并通过专门的方法添加了一些\
  \ SI 默认消息头。在这种情况下，我们配置了 `priority`，它可以用来修改 SI 流程中的消息消费顺序，以及 `correlationId`，它可以用来将多个消息聚合为一个消息。我们现在无需担心这些\
  \ SI 特性，因为它们将在本章后面解释。这里强调的特性是，我们可以使用专门的方法来创建 SI 能够理解的消息头，并利用它们来影响消息的流程。\n\n第三条消息复制了\
  \ `message2` 的所有消息头。当我们想要稍微修改 SI 消息时，这很方便。在这种情况下，提到的修改是移除 `simpleHeader` 消息头。\n\n\
  \n\n最后一条消息使用有效载荷 `message4` 创建，并配置了优先级值 `5`。接下来，我们从 `message2` 复制所有缺失的标头。我们特别关注\
  \ `simpleHeader` 标头，但由于 `message4` 应具有更高优先级，我们使用了 `copyHeadersIfAbsent()` 方法，因为\
  \ `message2` 的优先级值 `10` 较低，而我们希望其优先级值为 `5`。\n\n解析消息标头\n\n我们已经成功解释了在 SI 流程中通过编程方式创建带标头的消息。下一个特性是解析消息标头，它并非\
  \ SI 框架特有，但却是 SI 消息处理中一个有用的机制。值得强调的是，Spring 框架的这一特性已在第 5 章中展示过。\n\n闲话少叙，我们直接切入正题，在代码清单\
  \ 8-9 中展示一个解析消息标头的示例。我们将使用与前一个示例相同的结构，但暂时隐藏 SI 流程。别担心，我们很快就会讲到。\n\n***代码清单 8-9***.\
  \ 解析消息标头 (0802-parsing-headers)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
  import java.util.Date;\nimport java.util.Map;\nimport lombok.extern.slf4j.Slf4j;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.messaging.handler.annotation.Header;\n\
  import org.springframework.messaging.handler.annotation.Headers;\nimport org.springframework.stereotype.Service;\n\
  \n@Slf4j\n@Service\npublic class WriteServiceWithHeaders {\n  private WriteRepository\
  \ writeRepository;\n\n@Autowired\n  public WriteServiceWithHeaders(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    }\n\npublic void write(String message, @Header(\"timestamp\") long creationTime,\n\
        @Headers Map<String, Object> headers) {\n    log.info(\"Message received with\
  \ payload: {}; Created: {}; Headers: {}\",\n        message, new Date(creationTime),\
  \ headers);\n    writeRepository.persist(message);\n  }\n}\n```\n\n这里，`@Service`\
  \ 类通过构造函数注入了 `WriteRepository`，该类属于本章的公共类集合。我们关注的是 `write` 方法，该方法将消息有效载荷作为字符串参数\
  \ `message` 接收。第二个参数使用 `@Header` 注解，该注解定义了对消息中 `timestamp` 标头的关注（基于注解属性），并将其注入到\
  \ `creationTime` 变量中。如果参数名称与标头名称匹配，则注解属性不是必需的。最后一个参数通过 `@Headers` 注解将消息的所有 `headers`\
  \ 注入到一个映射中。这些注入的参数会被记录，随后调用 `writeRepository` 来持久化消息有效载荷。\n\n我们目前仍然隐藏了 SI 流程；后续示例将揭示\
  \ SI 的特性。本示例的主类与代码清单 8-7 中编程式消息创建示例的主类完全相同。`WriteServiceWithHeaders` 类通过 `si-config.xml`\
  \ 中定义的 SI 流程执行。当我们运行本示例的主类时，会得到类似于代码清单 8-10 的输出。\n\n***代码清单 8-10***. 消息解析示例的输出\n\
  \n```\n2015-08-22 12:57:38.045  INFO 12517 --- [           main] n.l.b.e.c.out.WriteServiceWithHeaders    :\
  \ Message received with payload: message1; Created:\nSat Aug 22 12:57:37 IST 2015;\
  \ Headers: {simpleHeader=simple header,\nid=a8e4193c-8b4a-def6-4c6f-16a5a04d368e,\
  \ timestamp=1440244657998}\n2015-08-22 12:57:38.059  INFO 12517 --- [          \
  \ main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted: message1\n2015-08-22\
  \ 12:57:38.065  INFO 12517 --- [           main]\nn.l.b.e.c.out.WriteServiceWithHeaders    :\
  \ Message received with payload: message1; Created:\nSat Aug 22 12:57:38 IST 2015;\
  \ Headers: {simpleHeader=simple header, correlationId=1440244658059, id=2a8bfcc8-c950-f5c9-c01a-cf3048f6eebd,\
  \ priority=10,\ntimestamp=1440244658059}\n2015-08-22 12:57:38.065  INFO 12517 ---\
  \ [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ message1\n2015-08-22 12:57:38.068  INFO 12517 --- [           main]\nn.l.b.e.c.out.WriteServiceWithHeaders    :\
  \ Message received with payload: message3; Created:\nSat Aug 22 12:57:38 IST 2015;\
  \ Headers: {correlationId=1440244658059,\nid=78d366ae-8aaa-dd7a-bcbf-ce9bacc1edfa,\
  \ priority=10, timestamp=1440244658066}\n2015-08-22 12:57:38.068  INFO 12517 ---\
  \ [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ message3\n2015-08-22 12:57:38.069  INFO 12517 --- [           main]\nn.l.b.e.c.out.WriteServiceWithHeaders    :\
  \ Message received with payload: message4; Created:\nSat Aug 22 12:57:38 IST 2015;\
  \ Headers: {simpleHeader=simple header,\ncorrelationId=1440244658059, id=c41ee6ce-a319-60e5-e595-7fb276efdff1,\
  \ priority=5,\ntimestamp=1440244658068}\n2015-08-22 12:57:38.070  INFO 12517 ---\
  \ [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
  \ message4\n```\n\n如我们所见，记录的消息与代码清单 8-8 中的消息结构相同，但记录格式不同，以突出标头解析特性。\n\n消息端点\n\n\
  消息端点可能是 SI 组件中最多样化的一个。SI 参考文档将其称为管道-过滤器架构中的*过滤器*。我们之前提到过，为了发送或接收消息，端点必须连接到一个或多个消息通道。其主要作用是封装应用程序逻辑，并将其与\
  \ SI 消息传递基础设施解耦。我们的应用程序代码通常甚至不知道它是 SI 流程的一部分。一个很好的例子是前面代码清单 8-4 中展示的 `WriteService`。乍一看这个类，我们无法判断它是标准的\
  \ Spring Bean 还是 SI 流程的一部分。\n\n正如我们提到的，在 XML 配置中建模 SI 流程是合理的。消息端点作为一个通用组件，没有对应的\
  \ XML 标签表示，因为每种特定类型的组件都有自己的 XML 标签。但 SI 流程的某些部分可以通过 Java 注解进行配置。在这种情况下，需要通用注解来进行消息端点配置。\n\
  \nSI 框架中第一个也是最重要的注解是 `@EnableIntegration`。当我们使用 Spring 的 `@Configuration` 注解时，它允许声明标准的\
  \ SI Bean。使用 Spring Boot 的 `@EnableAutoConfiguration` 注解或 `@SpringBootApplication`\
  \ 可以达到相同的效果。因此，当我们使用带有自动配置的 Spring Boot 时，可以省略 `@EnableIntegration`，因为它会自动为我们配置好。\n\
  \n\n\n另一个通用的 SI 注解是 `@IntegrationComponentScan`。顾名思义，它会扫描类路径以查找 SI 消息端点。其工作方式类似于我们在\
  \ Spring 框架中用于 SI 特定组件的 `@ComponentScan`。因此，它必须与 `@MessageEndpoint` 或 `@MessagingGateway`\
  \ 注解（我们将在本章后面解释这些注解）一起使用，这些注解会将 SI 特定的 Bean 注册到 Spring 上下文中。即使我们使用启用了自动配置的 Spring\
  \ Boot（`@EnableAutoConfiguration` 或 `@SpringBootApplication`），也需要此注解来注册 SI 特定的组件。\n\
  \n最后一个通用注解是 `@MessageEndpoint`，它标记了参与 SI 流程的类，该类中的某些方法将使用更具体的 SI 注解进行注解。当我们讨论具体类型的消息端点时，将在后面解释这些特定的注解。\n\
  \n这些注解的使用将作为特定 SI 组件示例的一部分进行展示。\n\n消息端点类型\n\n我们可以通过多种方式对消息端点进行分类，详情如下。\n\n消息流方向\n\
  \n*   *单向*：该组件可以参与即发即忘场景。\n*   *双向*：该组件可以参与请求-响应场景。此流程涉及通过 `replyChannel` 将响应发送回上游消费者。\n\
  \n在消息流中的位置\n\n*   *输入组件*：将 SI 流程连接到上游外部应用程序或内部 Java 逻辑。消息通过此组件进入 SI 流程。\n*   *输出组件*：将\
  \ SI 流程连接到下游外部应用程序或内部 Java 逻辑。消息通过此组件从 SI 流程发送出去。\n*   *中间组件*：能够在流程中间运行。此组件可以参与单向以及双向消息流。\n\
  \n组件的触发活动\n\n*   *被动*：该组件等待消息通过输入通道推送给它。此模式通常是同步执行的一部分，并且能够将事务传播到输出通道，或将异常冒泡到消息的发起者。\n\
  *   *主动*：该组件基于内部触发主动从输入通道读取消息。这种触发可以通过一个称为 *轮询器* 的特殊子组件（通过 `<poller>` XML 标签或 `@Poller`\
  \ 注解配置）来实现。此模式的一个重要要求是输入通道需要能够临时存储流入其中的消息。我们将在本章后面讨论这种通道类型。\n\n组件用途\n\n*通用组件*\n\n\
  *   将消息通道映射到 Java 接口或类。如果映射到 Java 接口，则实现由 SI 抽象层提供。\n*   在标准 Java 类或接口之上处理消息端点关注点（例如，路由、消息转换）。\n\
  \n*特定技术组件*\n\n*   将 SI 流程连接到外部系统或传输协议（例如，FTP、HTTP、JMS）。SI 提供了许多此类连接器组件，汇总在此表中：`http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`。\n\
  *   在特定技术之上处理消息端点关注点（例如，XML 消息转换、基于 XPath 表达式过滤 XML 消息）。\n\n消息端点列表\n\n理解每个特定的消息端点可以根据其配置以多种模式运行是很重要的。但是，一旦组件配置完成，我们就不能在运行时切换这些模式。\n\
  \n以下是 SI 提供的主要消息端点及其可以运行的模式列表。它们也被分为三个主要的功能类别。\n\n*   *消息传递组件*：用于将 SI 流程与外部技术或 Java\
  \ 逻辑连接起来\n    *   *通道适配器*：单向，输入/输出，被动/主动，通用/特定\n    *   *服务激活器*：单向/双向，输出/中间，被动/主动，通用\n\
  \    *   *消息网关*：单向/双向，输入/输出，被动，通用/特定\n*   *转换组件*：其功能是将消息负载或头部转换为不同的格式。它们是中间组件，可以参与单向以及双向消息流。\n\
  \    *   *转换器*：被动/主动，通用/特定\n    *   *内容增强器*：被动/主动，通用/特定\n*   *路由组件*：其功能是控制消息流。它们是中间组件，可以参与单向以及双向消息流。\n\
  \    *   *过滤器*：被动/过滤，通用/特定\n    *   *路由器*：被动，通用/特定\n    *   *桥接器*：被动/主动，通用\n   \
  \ *   *链*：被动，通用\n    *   *拆分器*：被动/主动，通用/特定\n    *   *聚合器*：被动，通用\n\n![Image](img/sq.jpg) **注意**  这不是\
  \ SI 消息端点的完整列表。此列表涵盖了你在实践中最可能用于标准集成用例的主要端点。针对各种边缘用例的特殊端点超出了 Spring 企业集成认证的范围，因此也超出了本书的范围。有关消息端点的完整列表，请参阅\
  \ `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/`\
  \ 上的 SI 参考文档。\n\n通道适配器\n\n通道适配器是用于单向消息流的 SI 端点组件。因此，它适用于即发即忘场景。从触发角度来看，它可以作为被动组件以及主动组件（如果配置了轮询器子组件）运行。由于每个单向消息流都需要有输入和输出，我们有两种类型的通道适配器：\n\
  \n*   *输入通道适配器*：位于 SI 流程的输入侧，被动监听或主动读取消息\n*   *输出通道适配器*：位于 SI 流程的输出侧，将消息发送到 Java\
  \ 类或外部系统或协议\n\n术语 *适配器* 表明它将消息通道映射到非 SI 系统或子系统。从这个角度来看，我们可以将通道适配器分为以下两类：\n\n*  \
  \ *通用 Java 适配器*：将消息通道映射到 Java 接口或类。如果适配器映射到 Java 接口，则实现由 SI 抽象层提供。可以通过 XML 标签 `<int:inbound-channel-adapter>`\
  \ 或 `<int:outbound-channel-adapter>` 进行配置，其中使用核心 SI XML 命名空间。入站通道适配器也可以通过 `@InboundChannelAdapter`\
  \ 进行配置。截至 SI 4.1.6.RELEASE 版本，此注解不适用于出站通道适配器。\n*   *特定技术适配器*：将消息通道连接到外部系统或传输协议（例如，FTP、HTTP、JMS）。SI\
  \ 为不同技术提供了这些适配器的众多实现，这些实现只能通过 XML 标签进行配置。对于每种技术，我们需要使用特定的 XML 命名空间（例如，`<int-http:inbound-channel-adapter>`、`<int-amqp:inbound-channel-adapter>`、`<int-mail:outbound-channel-adapter>`、`<int-jms:outbound-channel-adapter>`）。外部适配器没有任何可用的\
  \ SI 注解，因此我们必须为它们使用 XML 配置。一个简洁的表格，展示了外部技术的通道适配器实现，可以在 `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`\
  \ 找到。\n\n使用 XML 配置的通用入站和出站通道适配器示例\n\n\n\n以下通用通道适配器示例是本章中唯一未使用 Spring Boot 的示例，旨在突出展示如何通过纯\
  \ Spring 和 SI 框架配置 SI 应用。\n\n该示例展示了基于 XML 配置的通用入站和出站通道适配器。第一个类如**清单 8-11**所示，是一个我们将主动轮询的服务。\n\
  \n***清单 8-11***. 通过入站通道适配器读取消息的服务 (0803-channel-adapter-generic-xml)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08.in;\nimport org.springframework.stereotype.Service;\n\
  \n@Service\npublic class ReadService {\n  public String read() {\n    return \"\
  simple message\";\n  }\n}\n```\n\n这个 Spring 服务 Bean 只有一个简单方法，返回一个简单的字符串消息。清单 8-12\
  \ 展示了 SI 流程的 XML 配置。\n\n***Listing 8-12***. 通用通道适配器示例的 SI 流程 XML 配置 (文件 si-config.xml\
  \ 位于示例项目 0803-channel-adapter-generic-xml 的 src/main/resources 文件夹)\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
                  http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\n\
                  http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<context:component-scan base-package=\"net.lkrnac.book.eiws.chapter08\" />\n\
  \n<int:inbound-channel-adapter ref=\"readService\" method=\"read\" channel=\"inChannel\"\
  >\n    <int:poller fixed-rate=\"1000\" max-messages-per-poll=\"1\"/>\n  </int:inbound-channel-adapter>\n\
  \n<int:channel id=\"inChannel\" />\n\n<int:outbound-channel-adapter channel=\"inChannel\"\
  \ ref=\"writeService\" method=\"write\" />\n</beans>\n```\n\nSI 为通用 SI 组件提供了各种 XML\
  \ 命名空间，并为 SI 流程要接入的特定技术提供了独立的命名空间。在此例中，我们仅使用了别名为 `int` 的通用 SI 命名空间。除了这个 SI 命名空间，我们还使用了标准的\
  \ Spring 命名空间 `context` 以及一个用于处理 Spring Bean 的默认命名空间。\n\n第一个 XML 标签 `<context:component-scan>`\
  \ 对基础包 `net.lkrnac.book.eiws.chapter``08` 及其子包中的 Spring 组件执行类路径扫描。此扫描包括 `ReadService`\
  \ 以及我们的公共 Bean `WriteService` 和 `WriteRepository`。\n\n接下来，我们可以使用 SI 标签 `<int:inbound-channel-adapter>`，它将连接到\
  \ `readService` Bean。我们还需要指定 `method` 属性，该属性将此入站通道适配器映射到 `readService.read()`。由于\
  \ `ReadService` 是一个不发送任何消息的被动 Bean，我们需要为此适配器配置 `<int:poller>` 子元素。通过此轮询器的属性，我们定义了\
  \ 1 秒的固定速率轮询间隔，并且每次轮询只读取一条消息。在底层，SI 在此例中使用标准的 Spring 调度器，固定速率为 1 秒。因此，每秒此通道适配器都会调用\
  \ `readService.read()`，并根据其返回值创建一条 SI 消息。\n\n然后，此消息被传递给另一个 `inChannel`，该通道由必填属性\
  \ `channel` 定义。`inChannel` 也必须为 SI 流程进行配置，这是通过单独的 XML 元素 `<int:channel>` 完成的。在 `inChannel`\
  \ 的另一端，我们通过 XML 标签 `<int:outbound-channel-adapter>` 连接出站通道适配器。此适配器映射到我们的公共 Bean\
  \ `writeService` 及其 `write` 方法。\n\n此示例的主类如**清单 8-13**所示。\n\n***Listing 8-13***.\
  \ 基于 XML 配置的通用通道适配器示例的主类 (0803-channel-adapter-generic-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import org.springframework.context.support.GenericXmlApplicationContext;\nimport\
  \ org.springframework.core.io.ClassPathResource;\n\npublic class SiApplication {\n\
    public static void main(String[] args) throws InterruptedException {\n    new\
  \ GenericXmlApplicationContext(new ClassPathResource(\"si-config.xml\"));\n  }\n\
  }\n```\n\n此类启动在 `si-config.xml` 中定义的 Spring 上下文。当我们作为 Java 应用程序运行此主类时，会得到如**清单 8-14**所示的输出。\n\
  \n***Listing 8-14***. XML 通用通道适配器示例的输出\n\n```\n20:35:49.774 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository\
  \ - Text persisted: simple\nmessage\n20:35:50.760 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository\
  \ - Text persisted: simple\nmessage\n20:35:51.758 [task-scheduler-2] INFO  n.l.b.e.c.out.WriteRepository\
  \ - Text persisted: simple\nmessage\n20:35:52.758 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository\
  \ - Text persisted: simple\nmessage\n20:35:53.758 [task-scheduler-3] INFO  n.l.b.e.c.out.WriteRepository\
  \ - Text persisted: simple\nmessage\n```\n\n该流程在任务调度器线程中执行，而不是在主线程中。这是因为我们为入站通道适配器指定了一个轮询器，它每秒读取一条新消息并将其发送到\
  \ `writerService`。这也是为什么此 Spring 上下文保持打开状态，并且会无限期运行，直到我们强制停止应用程序。\n\n我们需要牢记，此流程输入和输出的\
  \ Java POJO 类型必须匹配。在此例中，类型为 `String`，它被用作流动的 `GenericMessage<String>` 的有效负载。同样重要的是要理解，SI\
  \ 组件会将 Spring Bean 注册到 Spring 上下文中。例如，`<int:channel>` 标签创建了一个名为 `inChannel`、类型为\
  \ `DirectChannel` 的 Spring Bean。此通道类型将在后面的“消息通道”部分进行解释。\n\n图 8-1 展示了此示例的另一个有趣之处。\n\
  \n![9781484207949_Fig08-01.jpg](img/9781484207949_Fig08-01.jpg)\n\n图 8-1. 通用通道适配器\
  \ SI 流程的可视化\n\n图 8-1 描绘了我们的 SI 流程。这很棒，因为它有效地展示了我们 SI 应用程序的实时图表——这是每个架构师都梦寐以求的。此可视化可以在\
  \ STS 编写器窗口的 `si-config.xml` 文件中找到，位于底部选项卡之间。根据我的经验，很多开发人员甚至不知道这些选项卡在 Eclipse/STS\
  \ 中的位置，所以让我们在图 8-2 中直观地展示它。\n\n![9781484207949_Fig08-02.jpg](img/9781484207949_Fig08-02.jpg)\n\
  \n图 8-2. 集成图选项卡的位置\n\n但这不仅仅是可视化。我们还可以基于此集成图选项卡创建 SI 流程。如您所见，在编写器窗口的左侧是可用的 SI 组件，我们可以将它们拖入我们的流程中。当组件位于我们的图表上时，我们可以双击它，STS\
  \ 将打开属性窗口，我们可以在其中编辑此组件的属性。如图 8-3 所示。\n\n![9781484207949_Fig08-03.jpg](img/9781484207949_Fig08-03.jpg)\n\
  \n图 8-3. 通过属性选项卡编辑 SI 组件属性\n\n如我们所见，列出了特定 SI 组件的所有可能属性。必填属性带有下划线。\n\n使用 Java 注解配置的通用入站通道适配器示例\n\
  \n\n\n接下来我们将展示如何使用 Java 配置来配置相同的流程。清单 8-15 展示了 SI 流程的部分 XML 配置，因为到目前为止还没有针对出站通道适配器的注解。\n\
  \n***清单 8-15***. 出站通道适配器的部分 XML 配置（文件 si-config.xml，位于示例项目 0804-channel-adapter-generic-javaconfig\
  \ 的 src/main/resources 文件夹中）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  <beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n                http://www.springframework.org/schema/integration\n\
      http://www.springframework.org/schema/integration/spring-integration.xsd\">\n\
  \n<int:channel id=\"inChannel\"/>\n\n<int:outbound-channel-adapter channel=\"inChannel\"\
  \ ref=\"writeService\" method=\"write\"/>\n</beans>\n```\n\n这个出站通道适配器的配置在前面的示例中已经展示过。通道可以通过\
  \ Java 配置来配置，但我们将在后面的示例中展示该配置。清单 8-16 展示了入站通道适配器的 Java 配置。\n\n***清单 8-16***. 入站通道适配器的\
  \ Java 配置（0804-channel-adapter-generic-javaconfig）\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
  import org.springframework.integration.annotation.InboundChannelAdapter;\nimport\
  \ org.springframework.integration.annotation.Poller;\nimport org.springframework.stereotype.Service;\n\
  \n@Service\npublic class ReadServiceAnnotated {\n  @InboundChannelAdapter(value\
  \ = \"inChannel\",\n      poller = @Poller(fixedRate = \"1000\", maxMessagesPerPoll\
  \ = \"1\"))\n  public String read() {\n    return \"simple message\";\n  }\n}\n\
  ```\n\n在这种情况下，读取服务方法 `read()` 使用了 `@InboundChannelAdapter` 注解，这使其成为一个 SI 消息端点。我们需要指定此注解的必填属性\
  \ `value`，以将其连接到消息通道 `inChannel`。\n\n因为我们还希望此组件处于活动状态（这意味着它将主动轮询带注解的方法），所以我们为此适配器配置了固定频率为\
  \ 1 秒的 `@Poller`。此注解将在底层创建一个 Spring 调度器来执行主动轮询。通过 `maxMessagesPerPoll` 属性，我们定义了每次轮询只应读取一条消息。\n\
  \n清单 8-17 展示了此示例的主类。\n\n***清单 8-17***. 使用 Java 配置的通道适配器示例的主应用程序（0804-channel-adapter-generic-javaconfig）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.context.annotation.ImportResource;\nimport org.springframework.integration.config.EnableIntegration;\n\
  \n@Configuration\n@ComponentScan\n@EnableIntegration\n@ImportResource(\"classpath:si-config.xml\"\
  )\npublic class SiApplication {\n  public static void main(String[] args) throws\
  \ InterruptedException {\n    new AnnotationConfigApplicationContext(SiApplication.class);\n\
    }\n}\n```\n\n这个主类也充当 Spring 配置类（`@Configuration` 注解），并扫描当前包及其子包以查找 Spring Bean。`@ImportResource`\
  \ 注解还将 SI 流程的 XML 部分注入到该 Spring 上下文中。最后一个注解 `@EnableIntegration` 用于启用 SI 功能。运行此类后，我们将看到与示例\
  \ `0803-channel-adapter-generic-xml` 的清单 8-14 类似的输出。\n\nJava 配置的缺点在于，无法通过 STS 的集成图编辑器来可视化或编辑\
  \ SI 流程。\n\n非通用通道适配器示例\n\n现在我们来探索用于外部技术的适配器。在这种情况下，我们将 SI 流程在输入端暴露为 REST 服务，并在输出端连接到\
  \ JDBC 数据源。我们使用 H2 数据库引擎作为数据库。当 Spring Boot 自动配置在类路径中检测到它时，会自动配置 `jdbcTeamplate`\
  \ Bean。清单 8-18 展示了 SI 配置。\n\n***清单 8-18***. 非通用通道适配器的 SI 配置（文件 si-config.xml，位于示例项目\
  \ 0805-channel-adapter-non-generic 的 src/main/resources 文件夹中）\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xmlns:int-http=\"http://www.springframework.org/schema/integration/http\"\n\
    xmlns:int-jdbc=\"http://www.springframework.org/schema/integration/jdbc\"\n  xsi:schemaLocation=\"\
  http://www.springframework.org/schema/integration/jdbc\n    http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd\n\
      http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration/http\n    http://www.springframework.org/schema/integration/http/spring-integration-http.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int-http:inbound-channel-adapter path=\"/\" channel=\"inChannel\" supported-methods=\"\
  POST\" />\n  <int:channel id=\"inChannel\" />\n\n<int-jdbc:outbound-channel-adapter\
  \ data-source=\"dataSource\" channel=\"inChannel\"\n    query=\"insert into TEXT_TABLE\
  \ values (:payload)\"/>\n</beans>\n```\n\n我们再次使用了 `beans` 和 `context` Spring 命名空间以及通用的\
  \ SI `int` 命名空间。新的命名空间是 `int-http` 和 `int-jdbc`，用于允许使用这些技术的适配器。第一个 XML 元素是 `<int-http:inbound-channel-adapter>`。它将\
  \ `inChannel` 暴露为一个 REST 端点，该端点监听根 URL 上的 POST 消息。有效负载将是一个简单的字符串。\n\n在 `inChannel`\
  \ 的另一端，我们通过 `<int-jdbc:outbound-channel-adapter>` 将连接的 SI 配置到 JDBC 数据源。此组件需要知道使用哪个\
  \ `data-source` Bean 进行 JDBC 访问。在这种情况下，我们将其引用到名为 `dataSource` 的 Bean，该 Bean 在 Spring\
  \ 上下文中创建（其创建过程将在本节后面讨论）。当然，当访问数据库时，我们需要有一个要执行的查询。在这种情况下，我们使用内联的 `query` 属性来定义它。这是一个简单的\
  \ `insert` 到 `TEXT_TABLE` 的语句，其中存储的值将来自 SI 消息的有效负载。此有效负载是从 REST 端点接收的。\n\n清单 8-19\
  \ 展示了 `TEXT_TABLE` 表的初始化。\n\n***清单 8-19***. 数据库表的初始化（0805-channel-adapter-non-generic）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport javax.annotation.PostConstruct;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import org.springframework.stereotype.Repository;\n\n\n\n@Repository\npublic class\
  \ SimpleDatabasePopulator {\n  private JdbcTemplate jdbcTemplate;\n\n@Autowired\n\
    public SimpleDatabasePopulator(JdbcTemplate jdbcTemplate) {\n    super();\n    this.jdbcTemplate\
  \ = jdbcTemplate;\n  }\n\n@PostConstruct\n  public void initDbTable() {\n    jdbcTemplate.execute(\"\
  drop table TEXT_TABLE if exists\");\n    jdbcTemplate.execute(\"create table TEXT_TABLE(TEXT\
  \ varchar(30))\");\n  }\n}\n```\n\n该组件将基于其自动装配的 `jdbcTemplate` bean 来初始化内存数据库。`JdbcTemplate`\
  \ 实例由 Spring Boot 自动创建。清单 8-20 展示了用于 HTTP 访问的服务器端口的 Spring Boot 配置。\n\n***清单 8-20***.\
  \ 服务器端口配置（示例项目 0805-channel-adapter-non-generic 中 src/main/resources 文件夹下的 application.properties\
  \ 文件）\n\n```\nserver.port=18080\n```\n\n最后，清单 8-21 展示了本例中应用程序的主类。\n\n***清单 8-21***.\
  \ 非泛型通道适配器示例的主类（0805-channel-adapter-non-generic）\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication\n\
  @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n  public\
  \ static void main(String[] args) throws InterruptedException {\n    SpringApplication.run(SiApplication.class,\
  \ args);\n  }\n}\n```\n\n我们在这里使用 Spring Boot，通过 `@SpringBootApplication` 注解利用自动配置来初始化所有内容。由于我们在类路径上拥有运行嵌入式\
  \ Servlet 容器以及支持内存数据库所需的 JAR 依赖，Spring 会自动为我们配置 Servlet 容器以及用于访问此内存数据库的 `jdbcTemplate`\
  \ 和 `dataSource` bean。此注解还会扫描当前包及其子包以查找 Spring bean，并且当然也会初始化 SI。你可以将其视为底层包含了 `@EnableIntegration`，因为\
  \ `@SpringBootApplication` 通过自动配置开启了此功能。\n\n下一个注解导入了我们的 XML SI 配置。在 main 方法中，我们通过调用\
  \ `SpringApplication.run()` 来运行 Spring Boot 应用程序。当我们运行它时，应用程序会在地址 `http://localhost:18080`\
  \ 上监听。任何 POST 到此地址的文本都将被持久化到 `TEXT_TABLE` 表中。第 4 章 已经介绍了 REST 以及如何通过 HTTP 发送有效负载。我们为此使用了\
  \ Advanced REST Client Chrome 插件，因此如果你不确定如何发送 HTTP 消息，请参考第 4 章。\n\nSI 流的可视化效果与图\
  \ 8-1 中的 XML 泛型通道适配器示例类似。\n\n服务激活器\n\n*服务激活器*是一个通用的 SI 消息端点，它将消息通道映射到一个 Spring bean\
  \ 并调用指定的方法。此端点接收到的消息将尝试（如果需要）转换为映射方法的一个或多个参数。类似地，方法最终的返回值将尝试（如果需要）转换为一条新消息。如果任何这些转换失败，将抛出异常。\n\
  \n服务激活器可以插入到 SI 流的中间或作为输出组件；因此，输入通道属性是必需的。这一事实也意味着映射到服务激活器的方法必须至少有一个参数，以便消息可以传递给服务。它可以参与单向以及双向消息流。这些流的区别取决于映射到服务激活器的方法的签名。\n\
  \n如果映射的方法是 void（不返回任何值），它可以充当单向输出消息端点。此模式与泛型出站通道适配器的模式几乎相同。\n\n如果映射的方法返回一个值，服务激活器可以按如下方式工作：\n\
  \n在双向 SI 流中作为输出组件。\n\n*   在双向或单向 SI 流中作为中间组件。在这种配置中，它类似于消息转换器端点（将有自己的章节），因为它接收一条消息并返回一条不同的消息。这里的基本区别在于，消息转换器旨在转换消息，而服务激活器旨在调用\
  \ Spring bean 上的方法，并可选地将返回值收集到消息中。\n\n如果映射的方法返回 null，并且上游 SI 组件需要响应（例如，上游消息网关将 `request-reply`\
  \ 配置为 `true`），则会在 SI 流中抛出异常。\n\n对于配置服务激活器，我们使用 `<int:service-activator>` XML 标签或\
  \ `@ServiceActivator` 注解。\n\n使用 XML 配置的服务激活器示例\n\n清单 8-22 展示了 XML SI 配置。\n\n***清单\
  \ 8-22***. 服务激活器示例的 XML 配置（示例项目 0806-service-activator-xml 中 src/main/resources\
  \ 文件夹下的 si-config.xml 文件）\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\
  \ xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n  xmlns:int=\"http://www.springframework.org/schema/integration\"\n  xmlns:context=\"\
  http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
      http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/integration\n\
      http://www.springframework.org/schema/integration/spring-integration.xsd\">\n\
  \n<int:inbound-channel-adapter ref=\"readService\" method=\"read\" channel=\"inChannel\"\
  >\n    <int:poller fixed-rate=\"1000\" />\n  </int:inbound-channel-adapter>\n\n\
  <int:channel id=\"inChannel\" />\n\n<int:service-activator input-channel=\"inChannel\"\
  \ ref=\"writeService\" method=\"write\" />\n</beans>\n```\n\nSI 消息流的输入部分与清单 8-12\
  \ 中的 `0803-channel-adapter-generic-xml` 相同。实际上，我们使用相同的 `readService` bean 来创建消息。不同之处在于\
  \ SI 流的输出部分，它使用 `<int:service-activator>` 将 `writeService.write()` 方法映射到我们的消息流。你可能还记得，此方法是\
  \ `void`，因此不会生成响应，并且它与输入通道适配器的单向特性兼容。此示例的主类如清单 8-23 所示。\n\n***清单 8-23***. XML 服务激活器示例的主类（0806-service-activator-xml）\n\
  \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.boot.SpringApplication;\n\
  import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.ImportResource;\n\
  \n@SpringBootApplication\n@ImportResource(\"classpath:si-config.xml\")\npublic class\
  \ SiApplication {\n  public static void main(String[] args) throws InterruptedException\
  \ {\n    SpringApplication.run(SiApplication.class, args);\n  }\n}\n```\n\n这是 Spring\
  \ Boot 配置类以及主类，它自身作为 Spring Boot 应用程序执行。这是 Spring Boot 的常见模式。`@ImportResource` 注解将\
  \ XML SI 流包含到此 Spring 上下文中。`@SpringBootApplication` 还涵盖了 Spring bean 的组件扫描。这就是为什么在\
  \ `si-config.xml` 文件中我们可以引用 `readService` 和 `writeService` 的原因。\n\n\n\n运行此示例将产生与`0803-channel-adapter-generic-xml`示例的清单\
  \ 8-14 类似的输出。此 SI 流的可视化效果如图 8-4 所示。\n\n![9781484207949_Fig08-04.jpg](img/9781484207949_Fig08-04.jpg)\n\
  \n图 8-4. XML 通道适配器示例的 SI 流可视化\n\n使用 Java 配置的服务激活器示例\n\n清单 8-24 展示了 Java SI 配置。\n\
  \n***清单 8-24***. 消息通道的 Java 配置 (0807-service-activator-javaconfig)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.channel.DirectChannel;\n\
  import org.springframework.messaging.MessageChannel;\n\n@Configuration\npublic class\
  \ SiConfiguration {\n  @Bean\n  public MessageChannel inChannel() {\n    return\
  \ new DirectChannel();\n  }\n}\n```\n\n这个标准的 Spring 配置类定义了一个类型为`MessageChannel`、名称为`inChannel`的\
  \ Bean。本例中使用了`DirectChannel`实现。此通道类型将在后面的“消息通道”一节中解释。清单 8-25 展示了服务激活器的 Java 配置。\n\
  \n***清单 8-25***. 服务激活器的 Java 配置 (0807-service-activator-javaconfig)\n\n```\npackage\
  \ net.lkrnac.book.eiws.chapter08.out;\nimport net.lkrnac.book.eiws.chapter08.out.WriteRepository;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.stereotype.Service;\n\n@Service\npublic class WriteServiceAnnotated\
  \ {\n  private WriteRepository writeRepository;\n\n@Autowired\n  public WriteServiceAnnotated(WriteRepository\
  \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    }\n\n@ServiceActivator(inputChannel = \"inChannel\")\n  public void write(String\
  \ message) {\n    writeRepository.persist(message);\n  }\n}\n```\n\n此服务类通过构造函数注入`WriteRepository`\
  \ Bean，以便我们可以调用它来处理接收到的消息。消息通过`WriteServiceAnnotated.write()`方法接收，该方法使用了`@ServiceActivator`注解，并参与单向\
  \ SI 流。`inputChannel`属性是必需的，它指向清单 8-24 中的`inChannel`。\n\n本例中包含的另一个 Bean 是清单 8-16\
  \ 中的`ReadServiceAnnotated`，它是入站通道适配器的注解版本。本例的主类如清单 8-26 所示。\n\n***清单 8-26***. 使用\
  \ Java 配置的服务激活器示例的主类 (0807-service-activator-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  \n@SpringBootApplication\npublic class SiApplication {\n  public static void main(String[]\
  \ args) throws InterruptedException {\n    SpringApplication.run(SiApplication.class,\
  \ args);\n  }\n}\n```\n\n这个标准的 Spring Boot 模式运行一个自动配置的应用程序，该程序会扫描当前包及其子包中的 Bean。运行它将产生与`0803-channel-adapter-generic-xml`示例的清单\
  \ 8-14 类似的输出，因为映射到`ReadServiceAnnotated`的入站通道适配器每秒读取一条消息并将其发送给服务激活器。\n\n消息网关\n\n\
  *消息网关*是一个被动组件，可以参与单向或双向消息流。因此，它天生就处理请求-响应问题。我们可以将网关分为两类：\n\n*   *通用消息网关*：将 SI 消息流封装到\
  \ Java 接口中，作为消息基础设施的输入。因此，封装该流程的方法必须有一个返回值。我们可以将其视为 Java 和 SI 流之间的代理。它可以通过 XML 元素`<int:gateway>`进行配置。Java\
  \ 配置使用两个注解：`@MessagingGateway`将接口标记为网关包装器，`@Gateway`将特定方法映射为 SI 消息传递的入口。请注意，我们可以在同一个类中使用`@Gateway`注解来注解不同的方法，从而为我们的\
  \ SI 流提供不同的入口点。因此，我们需要使用`@IntegrationComponentScan`来扫描带注解的入站网关。\n*   *特定技术消息网关*：可以处理与外部技术或协议（例如，HTTP、JDBC、SOAP\
  \ Web 服务）的通信。这种类型的网关相对于 SI 流可以是入站或出站的。要使用 XML 配置特定技术网关，我们需要使用特殊的 XML 命名空间（例如，`<int-file:outbound-gateway>`、`<int-http:inbound-gateway>`、`<int-ws:outbound-gateway>`）。特定技术网关没有任何可用的\
  \ SI 注解，因此只能使用 XML 配置。关于外部技术的消息网关实现的简明表格可在`http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`找到。\n\
  \n如果我们希望有一个参与双向消息流的入站消息网关，则必须有一种机制可以将回复消息发送回网关。我们可以通过多种方式处理这个问题：\n\n*   *临时回复通道*：默认情况下，入站消息网关会创建一个临时通道，当下游输出端点回复消息时将使用该通道。此通道是为流经\
  \ SI 流的每条消息创建的。\n*   *消息上指定的回复通道*：消息可以定义特殊的`replyChannel`头，当下游输出端点回复消息时将使用该头。\n\
  *   *入站网关上定义的默认回复通道*：如果网关指定了`default-reply-channel`属性（对于特定技术网关是`reply-channel`），则来自下游输出组件的回复消息将被传递到此通道。\n\
  *   *下游输出端点上指定的输出通道*：如果 SI 流的输出端点指定了`output-channel`属性，则此通道将用于发送回复消息。\n\n基于 XML\
  \ 配置的通用消息网关示例\n\n清单 8-27 展示了 SI 流的 XML 配置。\n\n***清单 8-27***. 通用消息网关示例的 XML 配置（文件\
  \ si-config.xml 位于示例项目 0808-gateway-generic-xml 的 src/main/resources 文件夹中）\n\n```\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
  \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
  \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
      http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperService\" />\n\n<int:channel id=\"inChannel\"\
  \ />\n\n<int:service-activator input-channel=\"inChannel\" ref=\"writeService\"\n\
      method=\"writeAndIndicateSuccess\">\n  </int:service-activator>\n</beans>\n\
  ```\n\n\n\n第一个 XML 元素指定了通用入站网关。我们需要定义必填的 `default-request-channel`，它指定了入站消息将被传递到的通道（本例中为\
  \ `inChannel`）。`service-interface` 属性也是必填的，它指定了 Java 接口，该接口将用于对调用方隐藏 SI 流程。在本例中，我们使用通用接口\
  \ `SiWrapperService`。请注意，当请求到达网关并被转换为消息时，会为此消息创建一个临时回复通道。网关将通过此临时回复通道等待响应消息。\n\n\
  此网关接收到的消息将被传递给服务激活器端点，该端点映射到 `writeService.writeAndIndicateSuccess()` 方法。此方法返回写入操作的结果；因此，我们处理的是双向消息流。要将回复消息发送回网关，将自动使用为请求创建的临时回复通道。当\
  \ `WriteService.writeAndIndicateSuccess()` 返回值时，服务激活器会将该值转换为回复消息，并将其发送到临时回复通道。网关通过临时回复通道接收此响应消息，并将其转换为服务接口\
  \ `SiWrapperService` 的返回值。\n\n清单 8-28 展示了此应用程序的主类。\n\n***清单 8-28***. 使用 XML 配置的通用消息传递网关示例的主类\
  \ (0808-gateway-generic-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\nimport\
  \ lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperService;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.ImportResource;\n\
  \n@Slf4j\n@SpringBootApplication\n@ImportResource(\"classpath:si-config.xml\")\n\
  public class SiApplication {\n  public static void main(String[] args) throws InterruptedException\
  \ {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);\n\
  \nSiWrapperService wrapperService = ctx.getBean(SiWrapperService.class);\n    boolean\
  \ result = wrapperService.processText(\"simple message\");\n    log.info(\"Result:\
  \ \" + result);\n  }\n}\n```\n\n我们处理的是一个扫描 Spring Bean 的 Spring Boot 应用程序。在本例中，我们需要扫描\
  \ `WriteService`。`@ImportResource` 将你的 XML SI 流程包含到此应用程序上下文中。`@Slf4j` 为此类启用日志记录。在\
  \ main 方法中，我们执行由此类定义的 Spring 配置。请记住此 Spring 配置，因为它将用于后续的大多数示例，因此我们无需反复解释。\n\n在包含\
  \ SI 流程的 Spring 上下文启动后，我们从 Spring 上下文中检索 `SiWrapperService` Bean。你可能会想这个接口的实现是在哪里定义的。请注意，XML\
  \ 配置中定义的网关代表了此接口的实现。因此，通过执行 `wrapperService.processText()`，我们向网关发送一条消息。收到响应后，我们将其记录下来。运行此示例将产生如清单\
  \ 8-29 所示的输出。\n\n***清单 8-29***. XML 通用网关示例的输出\n\n```\n2015-08-23 17:43:26.798  INFO\
