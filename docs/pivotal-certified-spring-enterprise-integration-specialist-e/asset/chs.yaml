  \ 模拟对象来验证控制器中的 `POST` 行为。由于 `UserController` 的依赖注入使用了构造器注入，我们只需通过其构造器创建测试对象，并将 `UserService`\
  \ 模拟对象作为构造器参数传入。配置好 `UserController` 的测试实例后，我们可以基于 `userController` 实例创建 `MockMvc`。这也有助于测试控制器的声明式注解映射。\n\
  \n在测试准备阶段后期，我们在 `userService` 模拟对象中记录所需行为。在此例中，我们创建一个测试 `User` 对象，并将其用作 `userService.addUser()`\
