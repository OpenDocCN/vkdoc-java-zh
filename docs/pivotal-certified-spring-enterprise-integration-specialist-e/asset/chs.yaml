      return simpleJobLauncher;\n  }\n}\n```\n\n熟悉 Spring Core 特性的读者应该不会感到惊讶。此 Java\
  \ 配置与上一个示例（代码清单 9-23）中的 XML 配置完全对应。在大多数 Spring 配置场景中，`@Bean` 注解和 `<bean>` XML 标签可以一一互换。唯一的区别在于使用\
  \ `FactoryBean` 时，因为 XML 配置会自动调用 `getObject()`，而 Java 配置需要显式调用此方法。在此案例中，我们需要通过工厂方法\
  \ `MapJobRepositoryFactoryBean.getObject()` 来创建 `JobRepository`。\n\n此示例的下一个类定义了包含\
  \ `Step` 的 SB `Job`。我们使用了与 `TaskletStep` 示例中 代码清单 9-21 相同的泡茶配置。此示例的主类如 代码清单 9-27\
  \ 所示。\n\n***代码清单 9-27***. 使用 Java 配置的 JobLauncher 示例的主类 (0907-job-launcher-javaconfig)\n\
  \n\n\n```\npackage net.lkrnac.book.eiws.chapter09;\nimport lombok.extern.slf4j.Slf4j;\n\
