  >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
  net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
  inChannel\" />\n\n<int:outbound-channel-adapter channel=\"inChannel\"  ref=\"writeServiceWithError\"\
  \n    method=\"write\" />\n</beans>\n```\n\n入站网关映射到我们的公共服务接口 `SiWrapperServiceVoid`，因此我们处理的是一个单向流。消息从入站网关发送到映射到\
  \ `WriteServiceWithError.write()` 方法的出站通道适配器。清单 8-126 展示了此示例的主类。\n\n***清单 8-126***.\
  \ 同步错误传播示例的主类（0836-error-handling-sync）\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
  import lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;\n\
