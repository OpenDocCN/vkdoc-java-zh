  \n**关于作者**\n\n**Josh Juneau** 自 Java EE 早期以来一直从事软件和企业应用程序的开发。自职业生涯开始以来，应用程序和数据库开发一直是他工作的重点。他成为了一名\
  \ Oracle 数据库管理员，并采用 PL/SQL 语言来执行管理任务和为 Oracle 数据库开发应用程序。为了构建更复杂的解决方案，他开始将 Java 集成到他的\
  \ PL/SQL 应用程序中，后来使用 Java 开发了独立和 Web 应用程序。Josh 早期使用 JDBC 和 Servlet 或 JSP 编写 Java\
  \ Web 应用程序，以与后端数据库交互。后来，他开始将框架（如 Java EE 和 JBoss Seam）集成到他的企业解决方案中。如今，他主要使用 Java\
  \ EE 和其他技术开发企业 Web 解决方案。他还在一些项目中使用了其他语言，例如 Jython 和 Groovy。\n\n多年来，Josh 涉猎了许多不同的编程语言，特别是\
  \ JVM 上的替代语言。2006 年，Josh 开始投入时间到 Jython 项目，担任 *Jython Monthly* 新闻通讯的编辑和出版人。2008\
  \ 年底，他开始制作一个专门介绍 Jython 编程语言的播客。\n\nJosh 是《The Definitive Guide to Jython》、《Oracle\
  \ PL/SQL Recipes》和《Java 7 Recipes》的主要作者，也是《Java EE 7 Recipes》和《Introducing Java\
  \ EE 7》的唯一作者，这些书均由 Apress 出版。他在费米国家加速器实验室担任应用程序开发人员和系统分析师，并为 Oracle 和 OTN 撰写技术文章。\n\
  \nJosh 喜欢与他的好妻子和五个孩子共度时光，尤其喜欢游泳、钓鱼、打球和看电影。要了解更多 Josh 的信息，请关注他的博客 http://jj-blogger.blogspot.com。您也可以在\
  \ Twitter 上关注他：@javajuneau。\n\nxli\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-626_1.jpg)\n\n![](img/index-626_2.jpg)\n\n**关于技术审阅者**\n\n**Rohan\
  \ Walia** 是一位高级软件顾问，在客户端-服务器、基于 Web 和企业应用程序开发方面拥有丰富的经验。他是 Oracle 认证的 ADF 实施专家和 Sun\
  \ 认证的 Java 程序员。Rohan 负责设计和开发由各种前沿框架和实用程序组成的端到端应用程序。他的专业领域是 Oracle ADF、Oracle WebCenter、Fusion、Spring、Hibernate\
  \ 和 Java/J2EE。不工作时，Rohan 喜欢打网球、远足和旅行。Rohan 要感谢他的妻子 Deepika Walia，感谢她运用自己的所有经验和专业知识审阅本书。\n\
  \n**James Weaver** 是一位专注于客户端 Java 和物联网的开发人员、作者、教师和国际演讲者。他的 Twitter 账号是 @JavaFXpert。\n\
  \nxliii\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**致谢**\n\n致我的妻子 Angela：时光流逝，我依然对你感到惊叹，并将永远如此。我想再次感谢你一直陪伴在我和孩子们身边。你帮助我完成了这本书，你的鼓励一直激励着我前进。感谢你一直支持我的工作。我非常爱你。\n\
  \n致我的孩子们，Kaitlyn、Jacob、Matthew、Zachary 和 Lucas：我非常爱你们，我珍惜我们在一起的每一刻。你们在学业、童子军活动、体育以及你们取得的无数其他成就中，一直让我感到无比自豪。我不愿看到你们成长得如此之快……有时我希望时间能够暂停。\n\
  \n我希望将来有一天，当你们读到这本书时，能够理解我为什么在周末如此努力地工作。\n\n我要感谢本书第一版的原始合著者：Carl Dea、Freddy Guime、John\
  \ O'Conner 和 Mark Beaty。你们精通自己的领域，你们的专业知识如同融入第一版一样，也深深融入了这第二版的字里行间。与你们合作完成第一版非常愉快，希望将来能再次合作。\n\
  \n致 Apress 的朋友们：感谢你们给我机会与他人分享我的知识。我特别感谢 Jonathan Gennick 对我工作的持续支持，并不断提供指导，以便为我们的读者创作有用的内容。我还要感谢\
  \ Jill Balzano 在协调这个项目方面所做的出色工作，以及 Kezia Endsley 的编辑工作。技术审阅者 Jim Weaver 和 Rohan\
  \ Walia 在巩固本书内容方面做得非常出色。我衷心感谢你们的辛勤工作和专业知识。最后，我要感谢 Apress 所有参与本书工作的其他人。\n\n致 Java\
  \ 社区：感谢你们帮助 Java 平台成为应用程序开发领域如此创新和高效的领域。我们都有幸使用一个成熟且稳健的平台，如果没有大家对该技术的持续贡献，它今天就不会如此成功。我还要感谢所有\
  \ Oracle Java 专家。再次强调，未来的路线图依然光明。我期待在未来许多年里继续使用 Java 技术。\n\nxlv\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
