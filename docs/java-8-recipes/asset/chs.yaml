  \ 字段的字符串。最后，由于 `List<Player>` 是可迭代的，它包含了 `forEach()` 方法。`forEach()` 方法允许将一个表达式或一组语句应用于列表中的每个元素。在此例中，列表中的每个元素都被打印到命令行。因此，由于\
  \ `map()` 函数被应用于流，列表中的每个元素随后都会根据 `map()` 中应用的算法被打印出来。最终结果是，球员的名字、姓氏以及每个球员的进球数都会被打印在命令行中。\n\
