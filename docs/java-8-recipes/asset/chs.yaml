  \ Value: \" + METHODA);\n\nSystem.out.println(passedIn);\n\n};\n\nl1.accept(CLASSA);\n\
  \nl1.accept(passedIn);\n\n}\n\n请注意，传递给 `lambdaInMethod()` 的字符串在 lambda 表达式被调用之前被赋予了一个新值。因此，`passedIn`\
  \ 变量不再是等效 `final` 的，并且 lambda 表达式不能引入新的作用域级别。因此，lambda 表达式无法从表达式上下文中访问 `passedIn`\
  \ 变量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 N Lambda 表达式\n\
  \n**6-8. 将 Lambda 表达式传递给方法**\n\n**问题**\n\n已经创建了一个 lambda 表达式来封装某些功能。你希望将该功能作为参数传递给一个方法，以便该方法实现可以利用该表达式。\n\
  \n**解决方案**\n\n通过实现一个函数式接口，然后将 lambda 表达式赋值给与该接口类型相同的变量，来创建可移植的函数。该变量可以作为参数传递给其他对象。\n\
  \n下面的类 `PassingLambdaFunctions` 包含一个 `calculate()` 方法，该方法将用于对给定的值数组执行任何类型的计算。请注意，`calculate()`\
  \ 方法接受一个 `Function<List<Double>,Double>` 和一个 `Double` 值数组作为参数。\n\npublic class PassingLambdaFunctions\
  \ {\n\n/**\n\n* 根据传入的计算函数计算一个值。\n\n*\n\n* @param f1\n\n* @param args\n\n* @param\
  \ x\n\n* @param y\n\n* @param z\n\n* @return\n\n*/\n\npublic Double calculate(Function<List<Double>,\
  \ Double> f1,\n\nDouble [] args){\n\nDouble returnVal;\n\nList<Double> varList =\
  \ new ArrayList();\n\nint idx = 0;\n\nwhile (idx < args.length){\n\nvarList.add(args[idx]);\n\
  \nidx++;\n\n}\n\nreturnVal=f1.apply(varList);\n\nreturn returnVal;\n\n}\n\n}\n\n\
  \n\n要使用 `calculate` 方法，必须将一个实现了 `Function<List<Double>,Double>` 接口的 lambda 表达式作为第一个参数传递给\
  \ `calculate()` 方法，同时还需要传递一个包含计算所需数值的 `Double` 类型参数数组。在下面的类中，使用 lambda 表达式生成了一个用于计算体积的函数，并将其赋值给一个类型为\
  \ `Function<List<Double>,Double>`、名为 `volumeCalc` 的变量。另一个 lambda 表达式用于创建计算面积的函数，并将其赋值给一个相同类型、名为\
  \ `areaCalc` 的变量。在独立的调用中，这些变量连同数值数组被传递给 `PassingLambdaFunctions.calculate()` 方法，从而得到计算结果。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 N LAMBDA 表达式\n\n```java\n\
  public class MainClass {\n\n    public static void main(String[] args){\n      \
  \  double x = 16.0;\n        double y = 30.0;\n        double z = 4.0;\n\n     \
