  \n第 14 章 N JAVAFX 基础\n\n在解决方案 1 中，投影是一个真实的效果（DropShadow）对象，并且实际上应用于单个 Text 节点实例。DropShadow\
  \ 对象被设置为基于相对于 Text 节点的 x 和 y 偏移量进行定位。\n\n您还可以设置阴影的颜色；这里我们将其设置为灰色，不透明度为 .588。以下是一个使用投影效果（DropShadow）设置\
  \ Text 节点 effect 属性的示例：\n\n```java\nDropShadow dropShadow = new DropShadow();\n\n\
  dropShadow.setOffsetX(2.0f);\n\ndropShadow.setOffsetY(2.0f);\n\ndropShadow.setColor(Color.rgb(50,\
  \ 50, 50, .588));\n\njava8Recipes2.setEffect(dropShadow);\n```\n\n尽管本技巧是关于设置文本字体的，但它也对\
  \ Text 节点应用了效果。还添加了另一个效果（只是为了更上一层楼）。在创建最后一个使用等宽字体的 Text 节点时，应用了流行的反射效果。设置以下代码，以便显示\
  \ .8 或 80% 的反射。反射值的范围从零（0%）到一（100%）。以下代码片段使用浮点值 0.8f 实现了 80% 的反射：\n\n```java\nReflection\
  \ refl = new Reflection();\n\nrefl.setFraction(0.8f);\n\njava8Recipes5.setEffect(refl);\n\
  ```\n\n解决方案 2 演示了如何使用 FXML、CSS 和 Java 构建用户界面。虽然本技巧侧重于文本和字体，但重要的是要注意，FXML 解决方案明确遵循模型-视图-控制器标准，将\
  \ UI 代码与业务逻辑分开。同样重要的是要注意，如果此示例中的 UI 包含按钮或其他包含操作的节点，则还需要创建一个控制器类来体现操作逻辑。\n\n在第二个示例中，FXML\
  \ 文件包含用户界面的结构化布局，该布局由一个 Scene、Pane、TextFlow 和一系列 Text 节点组成。场景包含一个 `<stylesheets>`\
  \ 元素，用于指定将哪些样式表应用于 XML 中的元素。Pane 节点用作布局的基础，它包含 UI 中的每个其他节点。TextFlow 节点是 JavaFX 8\
  \ 中的新特性，它是一种专门用于布局富文本的特殊布局。TextFlow 可以将许多不同的 Text 节点布局到一个单一的流中。\n\n从 FXML 中可以看出，TextFlow\
  \ 中的每个 Text 节点都关联了不同的样式，这些样式基于附加样式表中定义的样式。JavaFX 样式表中样式的属性以 `-fx-` 开头，属性名称和值由冒号分隔，并以分号（;）结束。在大多数情况下，JavaFX\
  \ 样式属性与标准 CSS 属性很好地对应。有关完整摘要，请参阅 [`docs.oracle.com/javafx/2/css_tutorial/jfxpub-css_tutorial.htm`](http://docs.oracle.com/javafx/2/css_tutorial/jfxpub-css_tutorial.htm)\
  \ 上的文档。\n\nTextFlow 使用嵌入其中的每个节点的文本和字体，以及其自身的宽度和文本对齐方式，来确定文本的位置。除 Text 之外的节点也可以嵌入到\
  \ TextFlow 中。\n\n将 Text 节点添加到 TextFlow 时，您可以通过 `setMaxWidth()` 方法指定 TextFlow 的最大宽度来设置自动换行。也可以在\
