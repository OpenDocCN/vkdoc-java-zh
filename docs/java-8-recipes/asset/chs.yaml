  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 21 章 网络编程\n\n工作原理\n\n多播是指通过单次传输向一组监听者广播消息的能力。广播的一个很好的类比是无线电广播。成千上万的人可以收听同一个广播事件，听到相同的消息。\n\
  \n计算机在向监听者发送消息时也可以做类似的事情。一组客户端机器可以监听相同的地址和端口号，以接收服务器向该地址和端口广播的消息。Java 语言通过数据报消息传递提供多播功能。数据报是独立的、不保证送达的消息，可以通过网络传递给客户端。（*不保证送达*意味着消息的到达、到达时间和内容都是不可预测的。）与通过\
  \ TCP 发送的消息不同，发送数据报是一个非阻塞事件，发送者不会收到消息已接收的通知。数据报使用用户数据报协议（UDP）而非 TCP 发送。只要消息的顺序、可靠性和数据完整性不是关键任务，通过\
  \ UDP 发送多播消息的能力是相对于 TCP 的一个优势。\n\nJava 通过`MulticastChannel`接口实现多播消息传递。实现`MulticastChannel`接口的类启用了多播功能，因此可以向组广播并接收组广播。其中一个类是`DatagramChannel`，它是一个面向数据报套接字的可选择通道。在本解决方案中，客户端和服务器程序都通过多播消息传递进行通信，并且通信双方都使用了`DatagramChannel`类。如果要将`DatagramChannel`用于接收多播消息，则必须以特定方式配置它。具体来说，需要在打开的`DatagramChannel`客户端上设置一些选项。我们稍后将讨论这些选项。创建接收多播消息的客户端需要以下步骤。\n\
  \n1. 打开一个`DatagramChannel`。\n2. 设置多播所需的`DatagramChannel`选项。\n3. 将客户端加入多播组并返回一个`MembershipKey`对象。\n\
  4. 打开客户端。\n\n在本解决方案中，客户端应用程序首先获取用于接收广播消息的网络接口的引用。多播需要设置`NetworkInterface`。\n\n接下来，选择一个端口号以及一个多播\
  \ IP 地址。组或已注册的监听者将使用该 IP 地址来监听广播。端口号必须未被占用，否则将抛出异常。\n\n对于 IPv4 多播，IP 地址范围必须从 224.0.0.0\
  \ 到 239.255.255.255（含）。此端口和 IP 地址与服务器广播消息时使用的相同。接下来，使用`StandardProtocolFamily.INET`打开一个新的`DatagramChannel`。打开`DatagramChannel`的选项有`StandardProtocolFamily.INET`或`StandardProtocolFamily.INET6`，分别对应\
  \ IPv4 和 IPv6。在`DatagramChannel`上设置的第一个选项是`StandardSocketOptions.SO_REUSEADDR`，并将其设置为`true`。这表明多个客户端将能够“重用”该地址或同时使用它。要实现多播，必须设置此选项。然后，使用一个新的`InetSocketAddress`实例将客户端绑定到该端口。最后，将`StandardSocketOptions.IP_MULTICAST_IF`选项设置为所使用的网络接口。此选项表示面向数据报的套接字发送的多播数据报的出站接口。\n\
  \nclient.setOption(StandardSocketOptions.SO_REUSEADDR, true);\n\nclient.bind(new\
  \ InetSocketAddress(port));\n\nclient.setOption(StandardSocketOptions.IP_MULTICAST_IF,\
  \ networkInterface);\n\n一旦设置了这些选项并将端口绑定到`DatagramChannel`，它就可以加入监听者组了。这可以通过调用`DatagramChannel.join(InetAddress,\
  \ NetworkInterface)`方法，并传入客户端将使用的组地址和网络接口来实现。结果会生成一个`java.nio.channels.MembershipKey`对象，该对象是\
  \ IP 多播组成员身份的令牌。最后，调用`DatagramChannel.open()`方法，打开通道以监听广播。此时，客户端已准备好接收多播消息，并等待接收消息。\n\
