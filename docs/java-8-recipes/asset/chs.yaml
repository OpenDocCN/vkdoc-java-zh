  \n工作原理\n\n\n\nJava 8 引入了一些新特性，极大地提升了开发者对集合进行排序的效率。本解决方案中演示了三个新特性：**Lambda 表达式**、**方法引用**和**流**。我们将在本书的其他章节中更详细地探讨流和方法引用，但此处也会进行简要描述，以便理解本方案。流可以应用于数据集合，并允许对集合中的元素执行增强的函数式风格操作。流本身不存储任何数据，而是为获取它的集合提供更多功能。\n\
  \n在解决方案 1 中，生成了一个 `Comparator`（比较器），用于根据进球数（`getGoals`）评估 `Player` 对象。然后，从一个被引用为\
  \ `team` 的 `List<Player>` 生成一个流。该流提供了 `sorted()` 函数，该函数接受一个 `Comparator`，用于对数据流进行排序。最初生成的\
  \ `Comparator` 被传递给 `sorted()` 函数，然后对结果调用 `map()` 函数。\n\n`map()` 函数提供了将表达式映射到流中每个元素的能力。因此，在\
