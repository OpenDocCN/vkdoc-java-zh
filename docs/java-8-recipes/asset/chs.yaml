  \n&& other.getPlayers().equals(this.getPlayers());\n\n} else {\n\nreturn false;\n\
  \n}\n\n}\n\n如你所见，重写的 equals() 方法首先检查作为参数传入的对象是否与当前比较的对象引用同一个对象。如果是，则返回 true。\n\n\
  如果两个对象在内存中引用的不是同一个对象，equals() 方法会检查字段是否相等。在这种情况下，任何两个在 name 和 city 字段中包含相同值的 Team\
  \ 对象都将被视为相等。一旦重写了 equals() 方法，就可以执行两个对象的比较，如本配方的解决方案 2 所示。\n\nhashCode() 方法返回一个\
  \ int 值，该值必须始终返回相同的整数。计算对象的 hashCode 有多种方法。在网上搜索该主题，你会找到各种技术。实现 hashCode() 方法最基本的方法之一是将对象的所有变量拼接成字符串格式，然后返回结果字符串的\
  \ hashCode()。缓存 hashCode 的值以备后用是个好主意，因为初始计算可能需要一些时间。解决方案 2 中的 hashCode() 方法演示了这种策略。\n\
