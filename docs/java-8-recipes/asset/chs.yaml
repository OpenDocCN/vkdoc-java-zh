  \ 中创建的变量，在 `main()` 方法中被创建后即在该方法内可见，并在 `main()` 方法结束时被释放。它们在 `main()` 方法之外没有“生命周期”，并且无法从\
  \ `main()` 方法外部访问。\n\n在类级别创建的变量则另当别论。此类变量可称为*字段*，即*类的字段*。字段的使用范围可以限制在其声明的类的对象中，或限制在其声明的包中，也可以从任何包中的任何类进行访问。清单\
