  \ 类可以在无参数的情况下实例化，以返回当前日期和时间。\n\n`Date` 类也可以通过 `getTime()` 方法返回当前时间。如解决方案中所述，`getTime()`\
  \ 方法返回自 1970 年 1 月 1 日 00:00:00 GMT 以来的毫秒数，由正在使用的 `Date` 对象表示。关于将当前日期和时间分解为更细粒度的时间间隔，还有几种其他方法可以针对\
