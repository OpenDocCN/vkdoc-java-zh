  \ java.lang.Runnables。\n\n你会很高兴地发现，你一直在使用事件属性和实现 Runnable，尽管通常是以 lambda 表达式的形式。希望你在本章的所有方案中都注意到了这一点。当媒体播放器处于就绪状态时，Runnable\
  \ 代码将被调用。为什么这样是正确的？因为当媒体播放器完成媒体加载后，onReady 属性会收到通知。这样你就可以确保能够调用 MediaPlayer 的 play()\
  \ 方法。我相信你会习惯事件风格的编程。以下代码片段演示了如何使用 lambda 表达式将 Runnable 实例设置到媒体播放器对象的 OnReady 属性中：mediaPlayer.setOnReady(()\
