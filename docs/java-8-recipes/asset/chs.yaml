  \ JavaScript 文件中执行 JavaScript。\n\n当内联使用该工具时，你可以交互式地执行 JavaScript 并立即获得反馈。该工具可以执行一个或多个带参数或不带参数的\
  \ `.js` 文件。\n\n要了解更多关于 `jjs` 工具的信息并查看更深入的示例，请参考配方 18-2。\n\n总结\n\n本章简要概述了 Java 8\
