  \ 5300\n```\n\n工作原理\n\n要从 JavaScript 内部扩展一个标准 Java 类，需要调用 `Java.extend()` 函数，传入你想要扩展的\
  \ Java 类，以及一个包含将在子类中修改的字段或函数的 JavaScript 对象。在本节的示例中，扩展了一个名为 `Employee` 的 Java 类。然而，同样的技术也可以用于扩展任何其他\
  \ Java 接口，例如 `Runnable`、`Iterator` 等。\n\n在此示例中，为了在 JavaScript 中获取 `Employee` 类，调用了\
  \ `Java.type()` 函数，并传入完全限定的类名。从调用中接收到的对象存储在一个名为 `Employee` 的 JavaScript 变量中。\n\n\
