  \n执行几乎所有数据库任务都使用相同的基本代码格式。格式如下：1. 获取数据库连接。\n\n2. 从连接创建语句。\n\n3. 使用语句执行数据库任务。\n\n\
  4. 对数据库任务的结果进行处理。\n\n5. 关闭语句（如果不再使用，则同时关闭数据库连接）。\n\n使用 JDBC 执行查询与使用数据操作语言（DML）的主要区别在于，根据要执行的操作，你需要在\
  \ Statement 对象上调用不同的方法。要执行查询，需要调用 Statement 的 executeQuery() 方法。为了执行插入、更新和删除等 DML\
  \ 任务，则需要调用 executeUpdate() 方法。\n\n本方案中的 performCreate() 方法演示了向数据库插入记录的操作。要向数据库插入记录，需要以字符串形式构建一条\
  \ SQL INSERT 语句。要执行插入操作，请将 SQL 字符串传递给 Statement 对象的 executeUpdate() 方法。如果 INSERT\
  \ 执行成功，将返回一个 int 值，指明已插入的行数。如果 INSERT 操作未成功执行，则可能返回零，或者抛出 SQLException，表明语句或数据库连接存在问题。\n\
  \n本方案中的 performRead() 方法演示了查询数据库的操作。\n\n要执行查询，请调用 Statement 对象的 executeQuery() 方法，并以字符串形式传递一条\
  \ SQL 语句。\n\n结果将是一个 ResultSet 对象，可用于处理返回的数据。有关执行查询的更多信息，请参见第 13-3 节。\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n本方案中的`performUpdate()`方法演示了更新数据库表中记录的操作。首先，以字符串格式构建一条 SQL UPDATE\
  \ 语句。接着，要执行更新操作，需将该 SQL 字符串传递给`Statement`对象的`executeUpdate()`方法。如果 UPDATE 成功执行，将返回一个`int`值，指明被更新的记录数。如果\
  \ UPDATE 操作未成功执行，则可能返回零，或抛出`SQLException`异常，指示语句或数据库连接存在问题。\n\n最后一个需要介绍的数据库操作是 DELETE\
  \ 操作。本方案中的`performDelete()`方法演示了从数据库中删除记录的操作。首先，以字符串格式构建一条 SQL DELETE 语句。接着，要执行删除操作，需将该\
  \ SQL 字符串传递给`Statement`对象的`executeUpdate()`方法。如果删除成功，将返回一个`int`值，指明被删除的行数。否则，如果删除失败，则可能返回零，或抛出`SQLException`异常，指示语句或数据库连接存在问题。\n\
  \n几乎每个数据库应用程序都会在某个时刻用到至少一种 CRUD 操作。这是在 Java 应用程序中处理数据库时需要掌握的基础 JDBC 知识。即使你不直接使用\
  \ JDBC API，了解这些基础内容也是有益的。\n\n13-5. 简化连接管理\n\n问题\n\n你的应用程序需要使用数据库，并且为了与数据库交互，每次都需要打开一个连接。你希望使用一个单独的类来执行此任务，而不是在每次需要访问数据库时都编写打开数据库连接的逻辑。\n\
  \n解决方案\n\n编写一个类来处理应用程序中的所有连接管理。这样做可以让你通过调用该类来获取连接，而不是每次需要访问数据库时都创建一个新的`Connection`对象。请执行以下步骤，为你的\
  \ JDBC 应用程序设置连接管理环境：1. 创建一个名为`CreateConnection.java`的类，该类将封装应用程序的所有连接逻辑。\n\n2. 创建一个\
  \ PROPERTIES 文件来存储你的连接信息。将该文件放在`CLASSPATH`中的某个位置，以便`CreateConnection`类可以加载它。\n\n\
  3. 使用`CreateConnection`类来获取你的数据库连接。\n\n以下代码是`CreateConnection`类的清单，可用于集中式连接管理：\n\
