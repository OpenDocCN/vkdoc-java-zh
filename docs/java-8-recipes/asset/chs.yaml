  \ equals() 方法。\n\n5-12. 扩展类的功能\n\n问题\n\n你的某个应用程序中包含一个类，你想将其用作另一个类的基类。你希望新类包含该基类的相同功能，同时还能包含额外的功能。\n\
  \n解决方案\n\n通过使用 extends 关键字，后跟要扩展的类的名称，来扩展基类的功能。以下示例展示了两个类。第一个类名为 HockeyStick，代表一个曲棍球杆对象。它将由第二个名为\
  \ WoodenStick 的类扩展。通过这样做，WoodenStick 类将继承 HockeyStick 中包含的所有属性和功能，但私有变量和具有默认访问级别的变量除外。WoodenStick\
  \ 类成为 HockeyStick 的子类。首先，让我们看一下 HockeyStick 类，它包含标准曲棍球杆的基本属性：\n\npublic class HockeyStick\
  \ {\n\npublic int length;\n\npublic boolean isCurved;\n\npublic String material;\n\
  \npublic HockeyStick(int length, boolean isCurved, String material){\n\nthis.length\
  \ = length;\n\nthis.isCurved = isCurved;\n\nthis.material = material;\n\n}\n\npublic\
  \ int getlength() {\n\nreturn length;\n\n}\n\npublic void setlength(int length)\
  \ {\n\nthis.length = length;\n\n}\n\npublic boolean isIsCurved() {\n\nreturn isCurved;\n\
  \n}\n\npublic void setIsCurved(boolean isCurved) {\n\nthis.isCurved = isCurved;\n\
  \n}\n\npublic String getmaterial() {\n\nreturn material;\n\n}\n\npublic void setmaterial(String\
  \ material) {\n\nthis.material = material;\n\n}\n\n}\n\n接下来，看看 HockeyStick 的子类：一个名为\
  \ WoodenStick 的类。\n\npublic class WoodenStick extends HockeyStick {\n\npublic static\
  \ final String material = \"WOOD\";\n\npublic int lie;\n\npublic int flex;\n\npublic\
  \ WoodenStick(int length, boolean isCurved){\n\nsuper(length, isCurved, material);\n\
  \n}\n\npublic WoodenStick(int length, boolean isCurved, int lie, int flex){\n\n\
  super(length, isCurved, material);\n\nthis.lie = lie;\n\nthis.flex = flex;\n\n}\n\
  \n}\n\n工作原理\n\n对象继承是任何面向对象语言中的基本技术。继承基类很有价值，因为它允许代码在多个地方重用。这有助于使代码管理更加容易。如果对基类进行了更改，它将自动被子类继承。另一方面，如果你的应用程序中散布着重复的功能，一个微小的更改可能意味着你必须在许多地方更改代码。对象继承还使得可以轻松地将一个基类指定给一个或多个子类，以便每个类可以包含相似的字段和功能。\n\
  \nJava 语言允许一个类仅扩展另一个类。这与 C++ 等其他语言的概念不同，后者支持多重继承。尽管有些人将单类继承视为对语言的限制，但这样设计是为了增加语言的安全性和易用性。当一个子类包含多个超类时，可能会产生混淆。\n\
  \n5-13. 为类定义模板以供扩展\n\n问题\n\n你想定义一个模板，该模板可用于生成包含相似功能的对象。\n\n解决方案\n\n定义一个抽象类，其中包含可在其他类中使用的字段和功能。抽象类还可以包含未实现的方法，称为*抽象方法*，这些方法需要由抽象类的子类来实现。以下示例演示了抽象类的概念。示例中的抽象类代表一个团队赛程，它包含每个团队赛程都需要使用的一些基本字段声明和功能。然后，TeamSchedule\
  \ 类扩展了 Schedule 类，该类将用于为每个团队实现特定的功能。首先，让我们看一下抽象的 Schedule 类：\n\npublic abstract\
  \ class Schedule {\n\npublic String scheduleYear;\n\npublic String teamName;\n\n\
  public List<Team> teams;\n\npublic List homeGames;\n\npublic List awayGames;\n\n\
