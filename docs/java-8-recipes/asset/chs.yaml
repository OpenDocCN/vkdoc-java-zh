  \ Java 的世界。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 3 章**\n\n\
  **字符串**\n\n字符串是任何编程语言中最常用的数据类型之一。它们可用于从键盘获取文本、向命令行打印消息等等。鉴于字符串的使用如此频繁，随着时间的推移，`String`\
  \ 对象中添加了许多特性，以便于使用。\n\n毕竟，字符串在 Java 中是一个对象，因此它包含可用于操作字符串内容的方法。\n\n字符串在 Java 中也是*不可变的*，这意味着它们的状态不能被更改或改变。这使得它们与一些可变的或可更改的数据类型相比，使用起来有些不同。理解如何正确使用不可变对象非常重要，尤其是在尝试更改或为其分配不同值时。\n\
  \n本章重点介绍一些最常用的 `String` 方法以及处理 `String` 对象的技术。我们还介绍了一些 `String` 对象本身不具备的有用技术。\n\n\
  3-1. 获取字符串的子部分\n\n问题\n\n你想获取字符串的一部分。\n\n解决方案\n\n使用 `substring()` 方法获取两个不同位置之间的字符串部分。在下面的解决方案中，创建了一个字符串，然后使用\
  \ `substring()` 方法打印出字符串的各个部分。\n\n`public static void substringExample(){`\n\n`String\
  \ originalString = \"This is the original String\";`\n\n`System.out.println(originalString.substring(0,\
  \ originalString.length()));`\n\n`System.out.println(originalString.substring(5,\
  \ 20));`\n\n`System.out.println(originalString.substring(12));`\n\n`}`\n\n运行此方法将产生以下结果：\n\
  \n`This is the original String`\n\n`is the original`\n\n`original String`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章  字符串\n\n工作原理\n\n`String` 对象包含许多辅助方法。其中一种方法是 `substring()`，可用于获取字符串的部分内容。`substring()`\
  \ 方法有两种变体。一种接受单个参数，即起始索引；另一种接受两个参数：起始索引和结束索引。`substring()` 方法有两种变体，使得第二个参数看起来是可选的；如果未指定，则使用调用字符串的长度代替。需要注意的是，索引从零开始，因此字符串中的第一个位置的索引为\
  \ 0，依此类推。\n\n\n\n从本方案的解决方案可以看出，`substring()` 的第一次使用打印出了字符串的全部内容。这是因为传递给 `substring()`\
  \ 方法的第一个参数是 0，第二个参数是原始字符串的长度。在 `substring()` 的第二个示例中，索引 5 被用作第一个参数，索引 20 被用作第二个参数。这实际上只打印了字符串的一部分，从字符串中位于第六个位置的字符（即索引\
  \ 5，因为第一个位置的索引为 0）开始，到字符串中位于第 20 个位置的字符（索引 19）结束。第三个示例只指定了一个参数；因此，结果将是从该参数指定的位置开始的原始字符串。\n\
  \nN **注意** `substring()` 方法只接受正整数。如果尝试传递负值，将会抛出异常。\n\n3-2. 比较字符串\n\n问题\n\n您正在编写的应用程序需要能够比较两个或多个字符串值。\n\
  \n解决方案\n\n使用内置的 `equals()`、`equalsIgnoreCase()`、`compareTo()` 和 `compareToIgnoreCase()`\
  \ 方法来比较字符串中包含的值。以下是使用不同字符串比较操作的一系列测试。\n\n如您所见，如果比较结果相等，则使用各种 `if` 语句来打印消息：\n```java\n\
  String one = \"one\";\nString two = \"two\";\nString var1 = \"one\";\nString var2\
  \ = \"Two\";\nString pieceone = \"o\";\nString piecetwo = \"ne\";\n\n// 比较相等\nif\
  \ (one.equals(var1)){\n    System.out.println (\"String one equals var1 using equals\"\
  );\n}\n```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 字符串\n\n```java\n\
  // 比较不相等\nif (one.equals(two)){\n    System.out.println (\"String one equals two\
  \ using equals\");\n}\n\n// 比较不相等\nif (two.equals(var2)){\n    System.out.println\
  \ (\"String two equals var2 using equals\");\n}\n\n// 比较相等，但并非直接使用 == 比较字符串值\nif\
  \ (one == var1){\n    System.out.println (\"String one equals var1 using ==\");\n\
  }\n\n// 比较相等\nif (two.equalsIgnoreCase(var2)){\n    System.out.println (\"String\
  \ two equals var2 using equalsIgnoreCase\");\n}\n\nSystem.out.println(\"尝试对拼接而成的字符串使用\
  \ ==\");\nString piecedTogether = pieceone + piecetwo;\n\n// 比较相等\nif (one.equals(piecedTogether)){\n\
  \    System.out.println(\"The strings contain the same value using equals\");\n\
  }\n\n// 使用 == 比较不相等\nif (one == piecedTogether) {\n    System.out.println(\"The\
  \ string contain the same value using == \");\n}\n\n// 比较相等\nif (one.compareTo(var1)\
  \ == 0){\n    System.out.println(\"One is equal to var1 using compareTo()\");\n\
  }\n```\n\n结果输出如下：\n```\nString one equals var1 using equals\nString one equals var1\
  \ using ==\nString two equals var2 using equalsIgnoreCase\n尝试对拼接而成的字符串使用 ==\nThe\
  \ strings contain the same value using equals\nOne is equal to var1 using compareTo()\n\
  ```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 字符串\n\n工作原理\n\n使用编程语言时，比较两个或多个值可能是比较棘手的部分之一。\n\
  \n在 Java 语言中，比较字符串可以相当直接，但要记住，*不应*使用 `==` 进行字符串比较。这是因为比较运算符（`==`）用于比较引用，而不是字符串的值。在\
  \ Java 中进行字符串编程时，最容易犯的错误之一就是使用比较运算符，但绝不能这样做，因为结果可能各不相同。\n\nN **注意** Java 使用字符串驻留（interning）来提升性能。这意味着\
  \ JVM 包含一个驻留字符串表，每次对字符串调用 `intern()` 方法时，都会在该表中执行查找以寻找匹配项。如果表中没有匹配的字符串，则将该字符串添加到表中并返回一个引用。如果字符串已存在于表中，则返回该引用。Java\
  \ 会自动驻留字符串字面量，这可能导致使用 `==` 比较运算符时出现差异。\n\n在本方案的解决方案中，您可以看到多种不同的字符串值比较技术。`equals()`\
  \ 方法是每个 Java 对象的一部分。Java 字符串的 `equals()` 方法已被重写，以便比较字符串中包含的值，而不是对象本身。从本方案解决方案中提取的以下示例可以看出，`equals()`\
  \ 方法是比较字符串的安全方式。\n\n```java\n// 比较相等\nif (one.equals(var1)){\n    System.out.println\
  \ (\"String one equals var1 using equals\");\n}\n\n// 比较不相等\nif (one.equals(two)){\n\
  \    System.out.println (\"String one equals two using equals\");\n}\n```\n\n`equals()`\
  \ 方法首先会使用 `==` 运算符检查字符串是否引用同一个对象；如果是，则返回 `true`。如果它们不引用同一个对象，`equals()` 将逐个字符地比较每个字符串，以确定被比较的字符串是否包含完全相同的值。\n\
  \n如果其中一个字符串的大小写与另一个不同怎么办？使用 `equals()` 比较时它们仍然相等吗？答案是否定的，这就是为什么创建了 `equalsIgnoreCase()`\
  \ 方法。使用 `equalsIgnoreCase()` 比较两个值时，会比较每个字符，而忽略大小写。\n\n以下示例摘自本方案的解决方案：\n\n```java\n\
  // 比较不相等\nif (two.equals(var2)){\n    System.out.println (\"String two equals var2\
  \ using equals\");\n}\n\n// 比较相等\nif (two.equalsIgnoreCase(var2)){\n    System.out.println\
  \ (\"String two equals var2 using equalsIgnoreCase\");\n}\n```\n\n`compareTo()`\
  \ 和 `compareToIgnoreCase()` 方法对字符串执行字典序比较。这种比较基于字符串中每个字符的 Unicode 值。如果该字符串在字典序上位于参数字符串之前，结果将为负整数。如果该字符串在字典序上位于参数字符串之后，结果将为正整数。如果两个字符串在字典序上相等，结果将为零。以下摘自本方案解决方案的代码演示了\
  \ `compareTo()` 方法：\n\n```java\n// 比较相等\nif (one.compareTo(var1) == 0){\n    System.out.println(\"\
  One is equal to var1 using compareTo()\");\n}\n```\n\n不可避免的是，许多应用程序都包含必须在某种程度上比较字符串的代码。下次您有一个需要字符串比较的应用程序时，在编写代码之前，请考虑本方案中讨论的信息。\n\
  \n3-3. 修剪空白\n\n问题\n\n您正在处理的某个字符串在两端包含一些空白字符。您希望去除这些空白。\n\n解决方案\n\n使用字符串的 `trim()`\
  \ 方法来消除空白。在以下示例中，打印了一个包含两端空白的句子。然后使用 `trim()` 方法再次打印同一个句子以去除空白，以便看到变化。\n\n```java\n\
  String myString = \"  This is a String that contains whitespace.  \";\nSystem.out.println(myString);\n\
  System.out.println(myString.trim());\n```\n\n输出将打印如下：\n```\n  This is a String that\
  \ contains whitespace.  \nThis is a String that contains whitespace.\n```\n\n工作原理\n\
  \n\n\n无论我们多么小心，在处理文本字符串时，空白字符始终是个问题。当将字符串与匹配值进行比较时，这种情况尤为突出。如果字符串包含意外的空白字符，那对于模式搜索程序来说可能是灾难性的。幸运的是，Java\
  \ String 对象提供了 `trim()` 方法，可用于自动移除任意给定字符串两端的空白字符。\n\n`trim()` 方法非常易于使用。事实上，从本方案的解决方案中可以看出，使用\
  \ `trim()` 方法只需对任意给定字符串进行一次调用即可。由于字符串是对象，它们包含许多辅助方法，这使得处理字符串变得非常容易。毕竟，字符串是任何编程语言中最常用的数据类型之一……所以它们最好易于使用！`trim()`\
  \ 方法会返回原始字符串的一个副本，其中所有前导和尾随空白字符都已被移除。但是，如果没有需要移除的空白字符，`trim()` 方法会返回原始字符串实例。没有比这更简单的了！\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 N 字符串\n\n3-4. 更改字符串的大小写\n\
  \n问题\n\n你的应用程序中有一部分包含区分大小写的字符串值。你希望在处理所有字符串之前将它们转换为大写，以避免后续出现任何大小写敏感性问题。\n\n解决方案\n\
  \n使用 `toUpperCase()` 和 `toLowerCase()` 方法。String 对象提供了这两个辅助方法，用于更改给定字符串中所有字符的大小写。\n\
  \n例如，给定以下代码中的字符串，将分别调用这两个方法：\n```java\nString str = \"This String will change case.\"\
  ;\n\nSystem.out.println(str.toUpperCase());\n\nSystem.out.println(str.toLowerCase());\n\
  ```\n将产生以下输出：\n```\nTHIS STRING WILL CHANGE CASE.\nthis string will change case.\n\
  ```\n\n工作原理\n\n为了确保给定字符串中每个字符的大小写统一为大写或小写，请分别使用 `toUpperCase()` 和 `toLowerCase()`\
  \ 方法。使用这些方法时需要注意几点。首先，如果给定字符串包含大写字母，并且对其调用了 `toUpperCase()` 方法，那么大写字母会被忽略。调用 `toLowerCase()`\
  \ 方法也是同样的道理。给定字符串中包含的任何标点符号或数字也会被忽略。\n\n这些方法各有两种变体。一种变体不接受任何参数，而另一种变体接受一个与你要使用的区域设置相关的参数。不带任何参数调用这些方法将使用默认区域设置进行大小写转换。如果你想使用不同的区域设置，可以将所需的区域设置作为参数传递给接受参数的方法变体。例如，如果你想使用意大利语或法语区域设置，可以使用以下代码：\n\
  ```java\nSystem.out.println(str.toUpperCase(Locale.ITALIAN));\n\nSystem.out.println(str.toUpperCase(new\
  \ Locale(\"it\",\"US\")));\n\nSystem.out.println(str.toLowerCase(new Locale(\"fr\"\
  , \"CA\")));\n```\n使用这些方法将字符串转换为大写或小写可以使生活变得轻松。它们对于比较从应用程序输入中获取的字符串也非常有用。考虑这样一种情况：提示用户输入用户名，并将结果保存到一个字符串中。再考虑一下，在程序稍后阶段，该字符串将与数据库中存储的所有用户名进行比较，以确保用户名有效。如果输入用户名的人将其首字符大写会怎样？如果用户名在数据库中以全大写形式存储会怎样？比较结果永远不会相等。在这种情况下，开发人员可以使用\
  \ `toUpperCase()` 方法来缓解问题。对正在比较的字符串调用此方法将得到一个大小写一致的比较结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 N 字符串\n\n3-5. 连接字符串\n\n问题\n\n有多个字符串想要合并成一个。\n\n解决方案 #1\n\n如果你想将字符串依次追加到彼此末尾，请使用\
  \ `concat()` 方法。以下示例演示了 `concat()` 方法的使用：\n```java\nString one = \"Hello\";\nString\
  \ two = \"Java8\";\nString result = one.concat(\" \".concat(two));\n```\n结果如下：\n\
  ```\nHello Java8\n```\n\n解决方案 #2\n\n使用连接运算符以简写方式组合字符串。在以下示例中，两个字符串之间放置了一个空格字符：\n\
  ```java\nString one = \"Hello\";\nString two = \"Java8\";\nString result = one +\
  \ \" \" + two;\n```\n结果如下：\n```\nHello Java8\n```\n\n解决方案 #3\n\n使用 `StringBuilder`\
  \ 或 `StringBuffer` 来组合字符串。以下示例演示了使用 `StringBuffer` 连接两个字符串：\n```java\nString one\
  \ = \"Hello\";\nString two = \"Java8\";\nStringBuffer buffer = new StringBuffer();\n\
  buffer.append(one).append(\" \").append(two);\nString result = buffer.toString();\n\
  System.out.println(result);\n```\n结果如下：\n```\nHello Java8\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 N 字符串\n\n工作原理\n\nJava 语言提供了几种不同的选项来连接文本字符串。虽然它们没有优劣之分，但你可能会发现在不同情况下，某一种方法效果更好。`concat()`\
  \ 方法是一个内置的字符串辅助方法。它能够将一个字符串追加到另一个字符串的末尾，如本方案的解决方案 #1 所示。`concat()` 方法接受任何字符串值；因此，如果需要，你可以显式键入一个字符串值作为参数传递。如解决方案\
  \ #1 所示，只需将一个字符串作为参数传递给此方法，它就会被追加到调用该方法的字符串末尾。但是，如果你想在两个字符串之间添加一个空格字符，可以通过传递一个空格字符以及要追加的字符串来实现，如下所示：\n\
  ```java\nString result = one.concat(\" \".concat(two));\n```\n如你所见，能够将任何字符串或字符串组合传递给\
  \ `concat()` 方法使其非常有用。由于所有字符串辅助方法实际上都返回应用了辅助方法功能的原始字符串副本，因此你也可以将调用其他辅助方法的字符串传递给\
  \ `concat()`（或任何其他字符串辅助方法）。考虑一下，你想要显示文本 \"Hello Java\" 而不是 \"Hello Java8\"。以下字符串辅助方法的组合可以让你做到这一点：\n\
  ```java\nString one = \"Hello\";\nString two = \"Java8\";\nString result = one.concat(\"\
  \ \".concat(two.substring(0, two.length()-1)));\n```\n\n\n\n连接运算符（+）可用于拼接任意两个字符串。它通常被视为\
  \ `concat()` 方法的简写形式。本示例的第三种解决方案演示了 `StringBuffer` 的使用，它是一个可变的字符序列，与字符串非常相似，区别在于它可以通过方法调用来修改。`StringBuffer`\
  \ 类包含许多用于构建和操作字符序列的辅助方法。在该解决方案中，`append()` 方法用于追加两个字符串值。`append()` 方法会将作为参数传入的字符串放置在\
  \ `StringBuffer` 的末尾。有关 `StringBuffer` 使用的更多信息，请参考在线文档 [`docs.oracle.com/javase/8/docs/api/java/lang/`](http://docs.oracle.com/javase/8/docs/api/java/lang/StringBuffer.html)\n\
  \n[StringBuffer.html。](http://docs.oracle.com/javase/8/docs/api/java/lang/StringBuffer.html)\n\
  \n3-6\\. 将字符串转换为数值\n\n问题\n\n你希望能够将以字符串形式存储的任何数值转换为整数。\n\n解决方案 #1\n\n使用 `Integer.valueOf()`\
  \ 辅助方法将字符串转换为 `int` 数据类型。例如：\n```java\nString one = \"1\";\nString two = \"2\";\n\
  int result = Integer.valueOf(one) + Integer.valueOf(two);\n```\n如你所见，两个字符串变量都被转换成了整数值。之后，它们被用于执行加法计算，然后存储到一个\
  \ `int` 变量中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 字符串\n\n\
  **注意** 本例中使用了一种称为自动装箱的技术。自动装箱是 Java 语言的一个特性，它自动将原始类型值转换为其对应的包装类。例如，当你将一个 `int` 值赋给一个\
  \ `Integer` 时就会发生这种情况。类似地，当你尝试反向转换（从包装类到原始类型）时，会自动发生拆箱。有关自动装箱的更多信息，请参考在线文档：\n\n\
  [`docs.oracle.com/javase/tutorial/java/data/autoboxing.html`](http://docs.oracle.com/javase/tutorial/java/data/autoboxing.html)。\n\
  \n解决方案 #2\n\n使用 `Integer.parseInt()` 辅助方法将字符串转换为 `int` 数据类型。例如：\n```java\nString\
  \ one = \"1\";\nString two = \"2\";\nint result = Integer.parseInt(one) + Integer.parseInt(two);\n\
  System.out.println(result);\n```\n\n工作原理\n\n`Integer` 类包含 `valueOf()` 和 `parseInt()`\
  \ 方法，用于将字符串或 `int` 类型转换为整数。`Integer` 类的 `valueOf()` 方法有两种不同的形式可用于将字符串转换为整数值。它们的区别在于接受的参数数量不同。第一种\
  \ `valueOf()` 方法只接受一个字符串参数。如果可能，该字符串会被解析为一个整数值，然后返回一个包含该字符串值的整数。如果字符串无法正确转换为整数，则该方法会抛出\
  \ `NumberFormatException`。\n\n`Integer` 的 `valueOf()` 方法的第二种形式接受两个参数：一个将被解析为整数的字符串参数，以及一个表示用于转换的基数的\
  \ `int` 值。\n\n**注意** 许多 Java 类型类都包含 `valueOf()` 方法，可用于将不同类型转换为该类的类型。`String` 类就是如此，因为它包含许多不同的\
  \ `valueOf()` 方法，可用于转换。有关 `String` 类或任何其他类型类包含的不同 `valueOf()` 方法的更多信息，请参阅在线 Java\
  \ 文档：[`docs.oracle.com/javase/8/docs`](http://docs.oracle.com/javase/8/docs)。\n\n\
  `Integer` 类的 `parseInt()` 方法也有两种不同的形式。一种接受一个参数：你想要转换为整数的字符串。另一种形式接受两个参数：你想要转换为整数的字符串和基数。第一种格式使用最广泛，它将字符串参数解析为一个有符号的十进制整数。如果字符串中不包含可解析的无符号整数，则会抛出\
  \ `NumberFormatException`。第二种格式使用较少，如果给定字符串中包含可解析的无符号整数，它会返回一个 `Integer` 对象，该对象保存由字符串参数在给定基数下表示的值。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 字符串\n\n3-7\\. 遍历字符串中的字符\n\
  \n问题\n\n你想要遍历文本字符串中的字符，以便在字符级别对它们进行操作。\n\n解决方案\n\n结合使用字符串辅助方法来在字符级别访问字符串。如果在循环的上下文中使用字符串辅助方法，你可以轻松地按字符遍历字符串。在以下示例中，名为\
  \ `str` 的字符串使用 `toCharArray()` 方法进行分解。\n```java\nString str = \"Break down into\
  \ chars\";\nSystem.out.println(str);\nfor (char chr:str.toCharArray()){\n    System.out.println(chr);\n\
  }\n```\n同样的策略也可以用于传统的 `for` 循环版本。可以创建一个索引，使用 `charAt()` 方法访问字符串中的每个字符。\n```java\n\
  for (int x = 0; x <= str.length()-1; x++){\n    System.out.println(str.charAt(x));\n\
  }\n```\n这两种解决方案都会产生以下结果：\n```\nB\nr\ne\na\nk\n\nd\no\nw\nn\n\ni\nn\nt\no\n\nc\n\
  h\na\nr\ns\n```\n**注意** 第一个使用 `toCharArray()` 的示例会生成一个新的字符数组。因此，第二个使用传统 `for` 循环的示例可能性能更快。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 字符串\n\n工作原理\n\n`String`\
  \ 对象包含可用于执行各种任务的方法。本解决方案演示了许多不同的 `String` 方法。可以对字符串调用 `toCharArray()` 方法，以便将字符串分解为字符，然后将这些字符存储在一个数组中。这个方法非常强大，在需要执行此任务时可以节省一些时间。调用\
  \ `toCharArray()` 方法的结果是一个 `char[]`，然后可以使用索引对其进行遍历。本解决方案中就是这种情况。使用增强型 `for` 循环来遍历\
  \ `char[]` 的内容并打印出每个元素。\n\n字符串的 `length()` 方法用于查找字符串中包含的字符数。结果是一个 `int` 值，在 `for`\
  \ 循环的上下文中非常有用，如本解决方案所示。在第二个示例中，`length()` 方法用于查找字符串中的字符数，以便可以使用 `charAt()` 方法遍历它们。`charAt()`\
  \ 方法接受一个 `int` 索引值作为参数，并返回字符串中位于给定索引处的字符。\n\n通常，组合使用两个或多个字符串方法可以获得各种结果。在这种情况下，在同一代码块中使用\
  \ `length()` 和 `charAt()` 方法提供了将字符串分解为字符的能力。\n\n3-8\\. 查找文本匹配\n\n问题\n\n你想要在文本正文中搜索特定的字符序列。\n\
  \n解决方案 #1\n\n\n\n利用正则表达式和字符串的 `matches()` 辅助方法来确定存在多少个匹配项。为此，只需将一个表示正则表达式的字符串传递给\
  \ `matches()` 方法，并针对你想要匹配的任意字符串调用该方法。这样，该字符串将与调用 `matches()` 方法的字符串进行比较。评估后，`matches()`\
  \ 将返回一个布尔结果，指示是否匹配。以下代码片段包含一系列使用此技术的示例。代码中的注释解释了每个匹配测试。\n\nString str = \"Here is\
  \ a long String...let's find a match!\";\n\n// 这将返回 \"true\"，因为它是精确匹配\n\nboolean\
  \ result = str.matches(\"Here is a long String...let's find a match!\"); System.out.println(result);\n\
  \n// 这将返回 \"false\"，因为整个字符串不匹配\n\nresult = str.matches(\"Here is a long String...\"\
  );\n\nSystem.out.println(result);\n\nstr = \"true\";\n\n// 这将测试大写和小写的 \"T\"...结果将为\
  \ TRUE\n\nresult = str.matches(\"[Tt]rue\");\n\nSystem.out.println(result);\n\n\
  // 这将测试两者之一\n\nresult = str.matches(\"[Tt]rue|[Ff]alse]\");\n\nSystem.out.println(result);\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 字符串\n\n// 这将测试是否存在任何数字，在这种情况下，编写此字符串的人可以喜欢任何\
  \ Java 版本！\n\nstr = \"I love Java 8!\";\n\nresult = str.matches(\"I love Java [0-9]!\"\
  );\n\nSystem.out.println(result);\n\n// 这也将测试为 TRUE...\n\nstr = \"I love Java 7!\"\
  ;\n\nresult = str.matches(\"I love Java [0-9]!\");\n\nSystem.out.println(result);\n\
  \n// 以下将测试任何名称仅包含一个单词的语言是否为 TRUE。这是因为测试了任何字母数字组合。注意数字序列之间的空格字符...\n\nresult = str.matches(\"\
  I love .*[ 0-9]!\");\n\nSystem.out.println(result);\n\n// 以下字符串也匹配。\n\nstr = \"\
  I love Jython 2.5.4!\";\n\nresult = str.matches(\"I love .*[ 0-9]!\");\n\nSystem.out.println(result);\n\
  \n示例中打印出的每个结果都将为 true，除了第二个示例，因为它不匹配。\n\n解决方案 #2\n\n使用正则表达式 `Pattern` 和 `Matcher`\
  \ 类，以获得比字符串 `matches()` 方法性能更好、更通用的匹配解决方案。虽然 `matches()` 方法在大多数情况下都能完成任务，但有时你需要更灵活的匹配方式。使用此解决方案分为三个步骤：1.\
  \ 将模式编译为 `Pattern` 对象。\n\n2. 使用 `Pattern` 上的 `matcher()` 方法构造一个 `Matcher` 对象。\n\n\
  3. 调用 `Matcher` 上的 `matches()` 方法。\n\n在以下示例代码中，演示了 `Pattern` 和 `Matcher` 技术：\n\n\
  String str = \"I love Java 8!\";\n\nboolean result = false;\n\nPattern pattern =\
  \ Pattern.compile(\"I love .*[ 0-9]!\");\n\nMatcher matcher = pattern.matcher(str);\n\
  \nresult = matcher.matches();\n\nSystem.out.println(result);\n\n前面的示例将返回 TRUE 值，就像解决方案\
  \ #1 中演示的变体一样。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 字符串\n\
  \n工作原理\n\n正则表达式是查找匹配项的好方法，因为它们允许定义模式，这样应用程序就不必显式地查找精确的字符串匹配。当你想要针对用户可能输入到程序中的某些文本查找匹配项时，它们非常有用。然而，如果你试图将字符串与程序中定义的字符串常量进行匹配，使用正则表达式可能有些大材小用，因为\
  \ `String` 类提供了许多可用于此类任务的方法。尽管如此，几乎每个开发者在职业生涯中都会遇到正则表达式派上用场的时刻。如今几乎每种编程语言中都能找到它们的身影。\n\
  \nJava 使它们易于使用和理解。\n\n\n\nN **注意** 尽管正则表达式如今被用于许多不同的语言，但每种语言的表达式语法各不相同。有关正则表达式语法的完整信息，请参阅以下在线文档：\n\
  \n[`docs.oracle.com/javase/8/docs/api/java/util/regex/Pattern.html`](http://docs.oracle.com/javase/8/docs/api/java/util/regex/Pattern.html)\n\
  \n使用正则表达式最简单的方法是调用 String 对象的 `matches()` 方法。向 `matches()` 方法传递一个正则表达式，将返回一个布尔值，指示该字符串是否与给定的正则表达式模式匹配。此时，了解什么是正则表达式以及它的工作原理会很有帮助。\n\
  \n*正则表达式*是一种字符串模式，用于与其他字符串进行匹配，以确定其内容。正则表达式可以包含多种不同的模式，使其具有动态性，能够匹配许多包含相同格式的不同字符串。例如，在本节方案的解决方案中，以下代码可以匹配多个不同的字符串：\n\
  \n`result = str.matches(\"I love Java [0-9]!\");`\n\n此示例中的正则表达式字符串是 `\"I love Java\
  \ [0-9]!\"`，它包含模式 `[0-9]`，该模式代表 0 到 9 之间的任意数字。因此，任何以 \"I love Java\" 开头，后跟数字 0 到\
  \ 9，再跟一个感叹号的字符串都将匹配该正则表达式字符串。要查看正则表达式中可使用的所有不同模式，请参阅前一条注释中 URL 提供的在线文档。\n\n也可以结合使用\
  \ Pattern 和 Matcher 对象来实现与字符串 `matches()` 方法类似的结果。Pattern 对象可用于将字符串编译成正则表达式模式。如果模式被多次使用，编译后的模式可以为应用程序带来性能提升。你可以将相同的基于字符串的正则表达式传递给\
  \ `Pattern.compile()` 方法，就像传递给字符串 `matches()` 方法一样。结果会得到一个编译后的 Pattern 对象，该对象可以与字符串进行匹配比较。可以通过对给定字符串调用\
  \ Pattern 对象的 `matcher()` 方法来获取 Matcher 对象。一旦获得 Matcher 对象，就可以使用以下三种方法中的任何一种，将给定字符串与\
  \ Pattern 进行匹配，每种方法都会返回一个指示匹配结果的布尔值。以下解决方案 #2 的三行代码可以作为使用 `Pattern.matches()` 方法的替代方案，但缺少了编译模式的可重用性：\n\
  \n`Pattern pattern = Pattern.compile(\"I love .*[ 0-9]!\");`\n\n`Matcher matcher\
  \ = pattern.matcher(str);`\n\n`result = matcher.matches();`\n\nu Matcher 的 `matches()`\
  \ 方法尝试将整个输入字符串与模式进行匹配。\n\nu Matcher 的 `lookingAt()` 方法尝试从开头开始将输入字符串与模式进行匹配。\n\n\
  u Matcher 的 `find()` 方法扫描输入序列，查找字符串中的下一个匹配序列。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 字符串\n\n在本节方案的解决方案中，调用了 Matcher 对象的 `matches()` 方法，以尝试匹配整个字符串。无论如何，正则表达式对于将字符串与模式进行匹配非常有用。\n\
  \n处理正则表达式的技术在不同情况下可能有所不同，可以使用最适合当前情况的任何方法。\n\n**3-9. 替换所有文本匹配项**\n\n**问题**\n\n你已在文本正文中搜索了特定的字符序列，并且希望将所有匹配项替换为另一个字符串值。\n\
  \n**解决方案**\n\n使用正则表达式模式获取 Matcher 对象；然后使用 Matcher 对象的 `replaceAll()` 方法将所有匹配项替换为另一个字符串值。以下示例演示了此技术：\n\
  `String str = \"I love Java 8! It is my favorite language. Java 8 is the \"`\n`+\
  \ \"8th version of this great programming language.\";`\n`Pattern pattern = Pattern.compile(\"\
  [0-9]\");`\n`Matcher matcher = pattern.matcher(str);`\n`System.out.println(\"Original:\
  \ \" + str);`\n`System.out.println(matcher.matches());`\n`System.out.println(\"\
  Replacement: \" + matcher.replaceAll(\"7\"));`\n\n此示例将产生以下结果：\n\n`Original: I love\
  \ Java 8! It is my favorite language. Java 8 is the 8th version of this great programming\
  \ language.`\n`Replacement: I love version of this great programming language.`\n\
  \n**工作原理**\n\nMatcher 对象的 `replaceAll()` 方法使得查找并替换文本正文中包含的字符串或字符串的一部分变得容易。要使用 Matcher\
  \ 对象的 `replaceAll()` 方法，必须首先通过向 `Pattern.compile()` 方法传递正则表达式字符串模式来编译 Pattern 对象。使用生成的\
  \ Pattern 对象，通过调用其 `matcher()` 方法来获取 Matcher 对象。以下代码行展示了如何完成此操作：\n\n`Pattern pattern\
  \ = Pattern.compile(\"[0-7]\");`\n`Matcher matcher = pattern.matcher(str);`\n\n\
  一旦获得 Matcher 对象，就调用其 `replaceAll()` 方法，并传递一个字符串，该字符串将用于替换所有与编译模式匹配的文本。在本节方案的解决方案中，字符串\
  \ `\"7\"` 被传递给 `replaceAll()` 方法，因此它将替换字符串中所有与 `\"[0-7]\"` 模式匹配的区域。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 字符串\n\n**3-10. 判断文件名是否以给定字符串结尾**\n\n**问题**\n\n你正在从服务器读取文件，并且需要确定文件的类型以便正确读取它。\n\
  \n**解决方案**\n\n通过使用给定文件名的 `endsWith()` 方法来确定文件的后缀。在以下示例中，假设变量 `filename` 包含给定文件的名称，代码使用\
  \ `endsWith()` 方法来判断 `filename` 是否以特定字符串结尾：\n\n`if(filename.endsWith(\".txt\")){`\n\
  `System.out.println(\"Text file\");`\n`} else if (filename.endsWith(\".doc\")){`\n\
  `System.out.println(\"Document file\");`\n`} else if (filename.endsWith(\".xls\"\
  )){`\n`System.out.println(\"Excel file\");`\n`} else if (filename.endsWith(\".java\"\
  )){`\n`System.out.println(\"Java source file\");`\n`} else {`\n`System.out.println(\"\
  Other type of file\");`\n`}`\n\n假设文件名及其后缀都包含在 `filename` 变量中，这段代码将读取其后缀并判断给定变量代表的文件类型。\n\
  \n**工作原理**\n\n如前所述，String 对象包含许多可用于执行任务的辅助方法。\n\nString 对象的 `endsWith()` 方法接受一个字符序列，然后返回一个布尔值，表示原始字符串是否以给定的序列结尾。在本节方案的解决方案中，`endsWith()`\
  \ 方法被用于一个 `if` 块中。一系列文件后缀被传递给 `endsWith()` 方法，以判断 `filename` 变量代表的文件类型。如果任何文件名后缀匹配，则会打印一行，说明文件类型。\n\
  \n**总结**\n\n本章介绍了处理字符串的基础知识。虽然字符串看起来可能只是一串简单的字符，但它是一个包含许多方法的对象，这些方法对于获得所需结果非常有用。尽管字符串是不可变对象，但\
  \ String 类中的许多方法都包含字符串的副本，并根据请求进行了修改。\n\n本章介绍了其中的一些方法，演示了诸如拼接、获取子字符串、去除空白以及替换字符串部分等功能。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 4 章**\n\n**数字与日期**\n\n\
  \n\n数字在许多应用中都扮演着重要角色。因此，了解如何在您尝试执行的工作上下文中正确使用它们会很有帮助。本章将帮助您理解如何对数字执行一些最基本的操作，并深入介绍如何执行诸如处理货币之类的高级任务。\n\
  \n日期同样重要，因为它们可以在应用程序中用于多种目的。在 Java 8 中，引入了名为 `java.time` 的新日期时间包。日期时间 API 默认使用 ISO-8601\
  \ 中定义的日历。因此，该日历基于公历系统，在本章中，您将学习如何处理日期、时间和时区数据。日期时间 API 遵循若干设计原则，即清晰、流畅、不可变且可扩展。该\
  \ API 使用简洁且定义明确的语言。它也非常流畅，因此处理日期时间数据的代码易于阅读和理解。日期时间 API 中的大多数类都是不可变的，因此要更改日期时间对象，您必须创建原始对象的修改副本。因此，日期时间类中的许多方法都相应地命名，例如\
  \ `of()` 和 `with()`，以便您知道您正在创建副本而不是修改原始对象。最后，新的日期时间 API 在许多情况下都可以扩展，使其在许多上下文中都很有用。\n\
  \n日期时间 API 由一组丰富的类组成，提供了在以前的 API 中很难实现的解决方案。尽管有许多不同的类，但它们中的大多数都包含一组相似的方法，因此相同的原则可以应用于所有日期和时间单位。表\
  \ 4-1 列出了您将在大多数日期时间类中找到的常用方法集。\n\n**表 4-1.** *日期时间 API 的常用方法*\n\n**方法**\n\n**描述**\n\
  \n`at`\n\n将一个对象与另一个对象组合。\n\n`format`\n\n将指定的格式应用于时间对象，生成一个字符串。\n\n`from`\n\n将输入参数转换为目标类的实例。\n\
  \n`get`\n\n返回目标对象状态的一部分。\n\n`is`\n\n查询目标对象。\n\n`minus`\n\n返回目标对象的修改副本，并减去指定的时间量。\n\
  \n`of`\n\n使用指定的输入参数进行验证，创建一个实例。\n\n`parse`\n\n解析输入字符串以生成目标类的实例。\n\n`plus`\n\n返回目标对象的修改副本，并加上指定的时间量。\n\
  \n`to`\n\n将对象转换为不同的类型。\n\n`with`\n\n返回目标对象的修改副本，并更改指定的元素（相当于 setter）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n如前所述，日期时间 API 是流畅的；因此，它的每个类都位于一个标记清晰的包中。表 4-2 列出了构成日期时间 API 的包，以及每个包中类的简要描述。\n\
  \n**表 4-2.** *日期时间 API 包*\n\n**包**\n\n**描述**\n\n`java.time`\n\nAPI 的核心类。这些类用于基于\
  \ ISO-8601 标准处理日期时间数据。这些类是不可变且线程安全的。\n\n`java.time.chrono`\n\n用于使用 ISO-8601 以外的日历系统的\
  \ API。\n\n`java.time.format`\n\n用于格式化日期时间数据的类。\n\n`java.time.temporal`\n\n允许在日期时间类之间进行插值的扩展\
  \ API。\n\n`java.time.zone`\n\n支持时区数据的类。\n\n本章简要概述了一些常用的日期时间特性。如果您将大量处理日期和时间，则应阅读在线提供的日期时间\
  \ API 文档。\n\n4-1\\. 将浮点数和双精度值四舍五入为整数\n\n问题\n\n您需要在应用程序中将浮点数或双精度数四舍五入为整数值。\n\n解决方案\n\
  \n\n\n使用 `java.lang.Math` 类中的 `round()` 方法之一，将数字四舍五入为你所需的格式。`Math` 类提供了两种可用于对浮点数或\
  \ `Double` 值进行四舍五入的方法。以下代码演示了如何使用这两种方法：\n\npublic static int roundFloatToInt(float\
  \ myFloat){\n\nreturn Math.round(myFloat);\n\n}\n\npublic static long roundDoubleToLong(double\
  \ myDouble){\n\nreturn Math.round(myDouble);\n\n}\n\n第一个方法 `roundFloatToInt()` 接收一个浮点数，并使用\
  \ `java.lang.Math` 类将其四舍五入为整数。第二个方法 `roundDoubleToLong()` 接收一个 `Double` 值，并使用 `java.lang.Math`\
  \ 类将该 `Double` 值四舍五入为 `Long` 类型。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n工作原理\n\n`java.lang.Math` 类包含大量辅助方法，让我们在处理数字时更加轻松。\n\n`round()`\
  \ 方法也不例外，它们可以轻松地对浮点数或双精度值进行四舍五入。`java.lang.Math` 的 `round()` 方法的一个版本接受一个 `float`\
  \ 参数。它会将浮点数四舍五入为最接近的 `int` 值，遇到平局时向上舍入。如果参数是 `NaN`，则返回零。当向 `round()` 传入正无穷或负无穷参数时，将分别返回等于\
  \ `Integer.MAX_VALUE` 或 `Integer.MIN_VALUE` 的结果。`java.lang.Math` 的 `round()` 方法的第二个版本接受一个\
  \ `double` 值。该双精度值会被四舍五入为最接近的 `long` 值，遇到平局时向上舍入。与另一个 `round()` 方法类似，如果参数是 `NaN`（非数字），则返回零。同样，当向\
  \ `round()` 传入正无穷或负无穷参数时，将分别返回等于 `Long.MAX_VALUE` 或 `Long.MIN_VALUE` 的结果。\n\nN **注意**\
  \ `NaN`、`POSITIVE_INFINITY` 和 `NEGATIVE_INFINITY` 是在 `Float` 和 `Double` 类中定义的常量值。`NaN`（非数字）是一个未定义或无法表示的值。例如，将\
  \ `0.0f` 除以 `0.0f` 会产生一个 `NaN` 值。`POSITIVE_INFINITY` 和 `NEGATIVE_INFINITY` 表示的值，是由那些产生特定类型（浮点型或双精度型）极大或极小值以至于无法正常表示的操作所生成的。例如，`1.0/0.0`\
  \ 或 `-1.0/0.0` 会产生此类值。\n\n4-2\\. 格式化双精度和长整型十进制数值\n\n问题\n\n你需要在应用程序中格式化双精度和长整型数字。\n\
  \n解决方案\n\n使用 `DecimalFormat` 类将数值格式化和四舍五入到应用程序所需的精度。在以下方法中，接收一个双精度值并打印格式化后的字符串值：\n\
  \npublic static void formatDouble(double myDouble){\n\nNumberFormat numberFormatter\
  \ = new DecimalFormat(\"##.000\");\n\nString result = numberFormatter.format(myDouble);\n\
  \nSystem.out.println(result);\n\n}\n\n例如，如果传入 `formatDouble()` 方法的双精度值是 `345.9372`，结果如下：345.937\n\
  \n同样，如果传入的值是 `.7697`，结果如下：\n\n.770\n\n每个结果都使用指定的模式进行格式化，然后进行相应的四舍五入。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n工作原理\n\n`DecimalFormat` 类可以与 `NumberFormat` 类一起使用，对双精度或长整型数值进行四舍五入和/或格式化。`NumberFormat`\
  \ 是一个抽象类，提供了格式化和解析数字的接口。该类能够针对每个区域设置格式化和解析数字，并获取货币、百分比、整数和数字的格式。`NumberFormat` 类本身非常有用，因为它包含可用于获取格式化数字的工厂方法。实际上，只需很少的工作就能获得格式化的字符串。例如，以下代码演示了在\
  \ `NumberFormat` 类上调用一些工厂方法：\n\n\n\n// 获取 NumberFormat 类的实例\n\nNumberFormat format\
  \ = NumberFormat.getInstance();\n\n// 为当前区域设置格式化一个 double 值\n\nString result = format.format(83.404);\n\
  \nSystem.out.println(result);\n\n// 为意大利区域设置格式化一个 double 值\n\nresult = format.getInstance(Locale.ITALIAN).format(83.404);\n\
  \nSystem.out.println(result);\n\n// 将字符串解析为数字\n\ntry {\n\nNumber num = format.parse(\"\
  75.736\");\n\nSystem.out.println(num);\n\n} catch (java.text.ParseException ex){\n\
  \nSystem.out.println(ex);\n\n}\n\n要使用模式进行格式化，可以将 `DecimalFormat` 类与 `NumberFormat`\
  \ 结合使用。在本节方案的解决方案中，您已经看到，通过向构造函数传递模式来创建新的 `DecimalFormat` 实例会返回一个 `NumberFormat`\
  \ 类型。这是因为 `DecimalFormat` 扩展了 `NumberFormat` 类。由于 `NumberFormat` 类是抽象的，`DecimalFormat`\
  \ 包含了 `NumberFormat` 的所有功能，以及用于处理模式的附加功能。因此，它可以像您在前面的演示中看到的那样，用于处理来自不同区域设置的不同格式。这在处理\
  \ `double` 或 `long` 类型的格式化时提供了极大的灵活性。\n\n如前所述，`DecimalFormat` 类可以在其构造函数中接受一个基于字符串的模式。您也可以使用\
  \ `applyPattern()` 方法在之后应用模式。每个模式都包含一个前缀、数字部分和后缀，允许您将特定的十进制值格式化为所需的精度，并根据需要包含前导数字和逗号。用于构建模式的符号显示在表\
  \ 4-3 中。每个模式还包含一个正子模式和一个负子模式。这两个子模式由分号 (;) 分隔，负子模式是可选的。如果没有负子模式，则使用本地化的负号。例如，一个完整的模式示例是\
  \ `###,##0.00;(###,##0.00)`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n**表 4-3.** *DecimalFormat 模式字符*\n\n**字符**\n\n**描述**\n\n#\n\n数字；如果没有数字则为空白\n\
  \n0\n\n数字；如果没有数字则为零\n\n.\n\n小数点\n\n-\n\n减号或负号\n\n,\n\n逗号或分组分隔符\n\nE\n\n科学记数法分隔符\n\
  \n;\n\n正子模式和负子模式分隔符\n\n`DecimalFormat` 类提供了足够的灵活性，可以针对几乎所有情况格式化 `double` 和 `long`\
  \ 值。\n\n4-3. 比较 int 值\n\n问题\n\n您需要比较两个或多个 `int` 值。\n\n解决方案 #1\n\n使用比较运算符来比较整数值。在以下示例中，三个\
  \ `int` 值相互比较，演示了各种比较运算符：\n\nint int1 = 1;\n\nint int2 = 10;\n\nint int3 = -5;\n\
  \nSystem.out.println(int1 == int2); // 结果: false\n\nSystem.out.println(int3 == int1);\
  \ // 结果: false\n\nSystem.out.println(int1 == int1); // 结果: true\n\nSystem.out.println(int1\
  \ > int3); // 结果: true\n\nSystem.out.println(int2 < int3); // 结果: false\n\n如您所见，比较运算符会生成一个布尔结果。\n\
  \n解决方案 #2\n\n使用 `Integer.compare(int,int)` 方法对两个 `int` 值进行数值比较。以下几行代码可以比较第一个解决方案中声明的相同\
  \ `int` 值：\n\nSystem.out.println(\"Compare method -> int3 and int1: \" + Integer.compare(int3,\
  \ int1));\n\n// 结果 -1\n\nSystem.out.println(\"Compare method -> int2 and int1: \"\
  \ + Integer.compare(int2, int1));\n\n// 结果 1\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n工作原理\n\n也许最常用的数值比较是针对两个或多个 `int` 值。Java 语言使得使用比较运算符比较 `int` 变得非常容易（参见表\
  \ 4-4）。\n\n**表 4-4.** *比较运算符*\n\n**运算符**\n\n**功能**\n\n==\n\n等于\n\n!=\n\n不等于\n\n\
  >\n\n大于\n\n<\n\n小于\n\n>=\n\n大于或等于\n\n<=\n\n小于或等于\n\n本节的第二个解决方案演示了 Java 7 中引入的整数\
  \ `compare()` 方法。这个静态方法接受两个 `int` 值并进行比较，如果第一个 `int` 大于第二个则返回 1，如果两个 `int` 值相等则返回\
  \ 0，如果第一个 `int` 值小于第二个则返回 -1。要使用 `Integer.compare()` 方法，请像以下代码所示传递两个 `int` 值：\n\n\
  Integer.compare(int3, int1));\n\nInteger.compare(int2, int1));\n\n就像在学校里的数学课一样，这些比较运算符将确定第一个整数是等于、大于还是小于第二个整数。这些比较运算符简单易用，最常见于\
  \ `if` 语句的上下文中。\n\n4-4. 比较浮点数\n\n问题\n\n您需要在应用程序中比较两个或多个浮点值。\n\n解决方案 #1\n\n使用 `Float`\
  \ 对象的 `compareTo()` 方法来执行一个浮点数与另一个浮点数的比较。以下示例展示了 `compareTo()` 方法的实际应用：\n\nFloat\
  \ float1 = new Float(\"9.675\");\n\nFloat float2 = new Float(\"7.3826\");\n\nFloat\
  \ float3 = new Float(\"23467.373\");\n\nSystem.out.println(float1.compareTo(float3));\
  \ // 结果: -1\n\nSystem.out.println(float2.compareTo(float3)); // 结果: -1\n\nSystem.out.println(float1.compareTo(float1));\
  \ // 结果: 0\n\nSystem.out.println(float3.compareTo(float2)); // 结果: 1\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n调用 `compareTo()` 方法的结果是一个整数值。负结果表示第一个浮点数小于与之比较的浮点数。零表示两个浮点数值相等。最后，正结果表示第一个浮点数大于与之比较的浮点数。\n\
  \n解决方案 #2\n\n使用 `Float` 类的 `compare()` 方法来执行比较。以下示例演示了 `Float.compare(float, float)`\
  \ 方法的使用。\n\nSystem.out.println(Float.compare(float1, float3)); // 结果: -1\n\nSystem.out.println(Float.compare(float2,\
  \ float3)); // 结果: -1\n\nSystem.out.println(Float.compare(float1, float1)); // 结果:\
  \ 0\n\nSystem.out.println(Float.compare(float3, float2)); // 结果: 1\n\n工作原理\n\n比较两个\
  \ `Float` 对象最实用的方法是使用 `compareTo()` 方法。该方法将对给定的 `Float` 对象执行数值比较。结果将是一个整数值，指示第一个浮点数在数值上是大于、等于还是小于与之比较的浮点数。如果浮点值是\
  \ `NaN`，则认为它等于其他 `NaN` 值，或大于所有其他浮点值。此外，浮点值 `0.0f` 大于浮点值 `-0.0f`。\n\n`compareTo()`\
  \ 的替代方法是 `compare()` 方法，它也是 `Float` 类的原生方法。`compare()` 方法是在 Java 1.4 中引入的，它是一个静态方法，以与\
  \ `compareTo()` 相同的方式比较两个浮点值。它只是让代码的阅读方式略有不同。`compare()` 方法的格式如下：\n\nFloat.compare(primitiveFloat1,\
  \ primitiveFloat2)\n\n上面显示的 `compare()` 方法实际上会使用 `compareTo()` 进行以下调用：\n\nnew Float(float1).compareTo(new\
  \ Float(float2))\n\n最终，使用 `compareTo()` 或 `compare()` 将返回相同的结果。\n\n4-5. 计算货币值\n\n\
  问题\n\n您正在开发一个需要使用货币值的应用程序，并且不确定使用哪种数据类型来存储和计算货币值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n解决方案\n\n\n\n使用 `BigDecimal` 数据类型对所有货币值进行计算。使用 `NumberFormat.getCurrencyInstance()`\
  \ 辅助方法格式化计算结果。在以下代码中，使用 `BigDecimal` 类中的几个方法对三个货币值进行计算。然后将计算结果转换为 `double` 值，并使用\
  \ `NumberFormat` 类进行格式化。首先，看看这些值是如何计算的：`BigDecimal currencyOne = new BigDecimal(\"\
  25.65\");`\n\n`BigDecimal currencyTwo = new BigDecimal(\"187.32\");`\n\n`BigDecimal\
  \ currencyThree = new BigDecimal(\"4.86\");`\n\n`BigDecimal result = null;`\n\n\
  `String printFormat = null;`\n\n`// 将三个值相加`\n\n`result = currencyOne.add(currencyTwo).add(currencyThree);`\n\
  \n`// 转换为 double 并发送到 formatDollars()，返回一个字符串`\n\n`printFormat = formatDollars(result.doubleValue());`\n\
  \n`System.out.println(printFormat);`\n\n`// 从第二个货币值中减去第一个`\n\n`result = currencyTwo.subtract(currencyOne);`\n\
  \n`printFormat = formatDollars(result.doubleValue());`\n\n`System.out.println(printFormat);`\n\
  \n接下来，我们看看代码中使用的 `formatDollars()` 方法。此方法接受一个 `double` 值，并使用 `NumberFormat` 类基于美国区域设置对其进行格式化。然后返回一个表示货币的字符串值：\n\
  \n`public static String formatDollars(double value){`\n\n`NumberFormat dollarFormat\
  \ = NumberFormat.getCurrencyInstance(Locale.US);`\n\n`return dollarFormat.format(value);`\n\
  \n`}`\n\n如您所见，`NumberFormat` 类允许根据指定的区域设置格式化货币。如果您正在处理一个涉及货币且具有国际范围的应用程序，这会非常方便。\n\
  \n`$217.83`\n\n`$161.67`\n\n**注意** 在撰写本文时，JSR 354（货币与金额 API）正在开发中，预计将成为 Java 9 的一部分。有关更多信息，请参阅\
  \ JSR，网址为 [`jcp.org/en/jsr/detail?id=354`](https://jcp.org/en/jsr/detail?id=354)。\n\
  \n**工作原理**\n\n许多人在处理货币时尝试使用不同的数字格式。虽然可以使用任何类型的数值对象来处理货币，但 `BigDecimal` 类被添加到语言中是为了帮助满足处理货币值等需求。`BigDecimal`\
  \ 最有用的特性之一可能是它提供了对舍入的控制。这基本上就是为什么这个类对于处理货币值如此有用的原因。`BigDecimal` 类提供了一个简单的 API 用于舍入值，并且也使得转换为\
  \ `double` 值变得容易，正如本解决方案所演示的那样。\n\n**注意** 使用 `BigDecimal` 处理货币值是一种良好的实践。然而，这可能会带来一些性能开销。根据应用程序和性能要求，如果性能成为问题，使用\
  \ `Math.round()` 进行基本舍入可能是值得的。\n\n要使用 `BigDecimal` 类提供特定的舍入，您应该使用 `MathContext`\
  \ 对象或 `RoundingMode` 枚举值。无论哪种情况，都可以通过使用货币格式化解决方案（如解决方案示例中演示的那样）来省略这种精度。`BigDecimal`\
  \ 对象内置了数学实现，因此执行此类操作是一项简单的任务。您可以使用的算术运算在表 4-5 中描述。\n\n**表 4-5.** *BigDecimal 算术方法*\n\
  \n**方法**\n\n**描述**\n\n`add()`\n\n将一个 `BigDecimal` 对象的值与另一个相加。\n\n`subtract()`\n\n\
  从一个 `BigDecimal` 对象的值中减去另一个。\n\n`multiply()`\n\n将一个 `BigDecimal` 对象的值与另一个相乘。\n\n\
  `abs()`\n\n返回给定 `BigDecimal` 对象值的绝对值。\n\n`pow(n)`\n\n返回 `BigDecimal` 的 n 次幂；该幂以无限精度计算。\n\
  \n执行所需的计算后，调用 `BigInteger` 对象上的 `doubleValue()` 方法进行转换并获得一个 `double` 值。然后，您可以使用\
  \ `NumberFormat` 类格式化该 `double` 值以获得货币结果。\n\n**4-6. 随机生成值**\n\n**问题**\n\n您正在开发的应用程序需要使用随机生成的数字。\n\
  \n**解决方案 #1**\n\n使用 `java.util.Random` 类来帮助生成随机数。`Random` 类是为生成多种 Java 数值数据类型的随机数而开发的。以下代码演示了如何使用\
  \ `Random` 生成此类数字：\n\n`// 创建一个新的 Random 类实例`\n\n`Random random = new Random();`\n\
  \n`// 生成一个随机整数`\n\n`int myInt = random.nextInt();`\n\n`// 生成一个随机双精度值`\n\n`double\
  \ myDouble = random.nextDouble();`\n\n`// 生成一个随机浮点数`\n\n`float myFloat = random.nextFloat();`\n\
  \n`// 生成一个随机高斯双精度值`\n\n`// 均值为 0.0，标准差为 1.0`\n\n`// 来自此随机数生成器的序列。`\n\n`double gausDouble\
  \ = random.nextGaussian();`\n\n`// 生成一个随机长整数`\n\n`long myLong = random.nextLong();`\n\
  \n`// 生成一个随机布尔值`\n\n`boolean myBoolean = random.nextBoolean();`\n\n**解决方案 #2**\n\
  \n使用 `Math.random()` 方法。这将生成一个大于 0.0 但小于 1.0 的 `double` 值。\n\n以下代码演示了此方法的使用：\n\n\
  `double rand = Math.random();`\n\n**工作原理**\n\n`java.util.Random` 类使用一个 48 位的种子来生成一系列伪随机值。从本解决方案的示例中可以看出，`Random`\
  \ 类可以根据给定的种子生成许多不同类型的随机数值。默认情况下，种子是根据机器已运行毫秒数的计算得出的。但是，可以使用 `Random` 的 `setSeed()`\
  \ 方法手动设置种子。如果两个 `Random` 对象具有相同的种子，它们将产生相同的结果。\n\n需要注意的是，在某些情况下，`Random` 类可能不是生成随机值的最佳选择。例如，如果您尝试使用\
  \ `java.util.Random` 的线程安全实例，并且处理多个线程，则可能会遇到性能问题。在这种情况下，您可以考虑改用 `ThreadLocalRandom`\
  \ 类。要查看有关 `ThreadLocalRandom` 的更多信息，请参阅以下文档：\n\n[`docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadLocalRandom.html`](http://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadLocalRandom.html)\n\
  \n类似地，如果您需要使用加密安全的 `Random` 对象，请考虑使用 `SecureRandom`。\n\n有关此类的文档，请访问 [`docs.oracle.com/javase/8/docs/api/java/security/SecureRandom.html`](http://docs.oracle.com/javase/8/docs/api/java/security/SecureRandom.html)。\n\
  \n当您需要生成指定类型的随机值时，`java.util.Random` 类非常方便。它不仅易于使用，而且还提供了广泛的返回类型选项。另一种简单的技术是使用 `Math.random()`\
  \ 方法，如解决方案 #2 所示，该方法生成一个在 0.0 到 1.0 范围内的 `double` 值。这两种技术都提供了生成随机值的良好方法。但是，如果您需要生成特定类型的随机数，`java.util.Random`\
  \ 是最佳选择。\n\n**4-7. 获取不含时间的当前日期**\n\n**问题**\n\n您正在开发一个应用程序，希望获取当前日期（不包括时间）以显示在表单上。\n\
  \n**解决方案**\n\n\n\n使用日期时间 API 获取当前日期。`LocalDate` 类表示 ISO 日历中的年-月-日格式。以下代码行捕获当前日期并显示它：`LocalDate\
  \ date = LocalDate.now();`\n\n`System.out.println(\"Current Date:\" + date);`\n\n\
  工作原理\n\n日期时间 API 可以轻松获取当前日期，而无需包含时间等其他信息。为此，请导入 `java.time.LocalTime` 类并调用其 `now()`\
  \ 方法。`LocalTime` 类无法实例化，因为它是不可变且线程安全的。调用 `now()` 方法会返回另一个 `LocalDate` 对象，其中包含年-月-日格式的当前日期。\n\
  \n`now()` 方法的另一个版本接受一个 `java.time.Clock` 对象作为参数，并基于该时钟返回日期。例如，以下代码行演示了如何获取表示系统时间的\
  \ `Clock`：\n\n`Clock clock = Clock.systemUTC();`\n\n`LocalDate date = LocalDate.now(clock);`\n\
  \n在之前的版本中，有其他获取当前日期的方法，但通常时间会与日期一起返回，然后必须进行格式化以移除不需要的时间数字。新的 `java.time.LocalDate`\
  \ 类使得可以独立于时间处理日期。\n\n4-8. 根据日期条件获取日期对象\n\n问题\n\n你想根据年-月-日规范获取一个日期对象。\n\n解决方案\n\n\
  调用 `LocalDate.of()` 方法，传入你想要获取对象的年、月、日。例如，假设你想获取 2000 年 11 月某个指定日期的日期对象。你可以将该日期条件传递给\
  \ `LocalDate.of()` 方法，如下列代码行所示：`LocalDate date = LocalDate.of(2000, Month.NOVEMBER,\
  \ 11);`\n\n`System.out.println(\"Date from specified date: \" + date);`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
