  \n第 6 章 N LAMBDA 表达式\n\n**工作原理**\n\nLambda 表达式可以赋值给与其所实现的函数式接口相同类型的变量。此类表达式可以包含单行表达式或多语句体。由于\
  \ lambda 表达式可以接受参数，因此存在将此类表达式赋值给变量，然后将这些变量传递给其他对象以修改功能的用例。这种模式对于创建可能包含多个实现的解决方案非常有用。本范例的解决方案演示了这一概念。\n\
  \n在解决方案中，一个名为 `PassingLambdaFunctions` 的类包含一个名为 `calculate()` 的单一方法。`calculate()`\
  \ 方法用于对作为参数传入的 `Double` 值执行计算。\n\n然而，`calculate()` 方法本身不包含任何计算功能。相反，计算功能是通过 lambda\
  \ 表达式以 `Function<List<Double>,Double>` 类型的参数形式传入的。此类型实际上是 `java.util.function` 包中包含的标准函数式接口之一（参见范例\
  \ 6-2），该接口可以由 lambda 表达式实现，然后通过调用其唯一的 `apply()` 方法在稍后执行。查看 `calculate()` 方法中的代码，首先将\
  \ `Double[]` 中包含的参数添加到一个列表中。接着，调用 lambda 表达式的 `apply()` 方法，传入新的值列表，并将结果返回到 `returnVal`\
  \ 中。最后，`returnVal` 被返回给方法的调用者。\n\n```java\nreturnVal = f1.apply(varList);\nreturn\
  \ returnVal;\n```\n\n为了在解决方案中实现计算功能，在另一个名为 `MainClass` 的类中创建了 lambda 表达式。每个表达式接受一个参数列表，然后对列表中的值执行计算，并返回结果。例如，在\
  \ `MainClass` 中生成的第一个 lambda 通过将参数列表中的所有值相乘来计算体积并返回结果。此功能随后被赋值给一个 `Function<List<Double>,Double>`\
  \ 类型的变量，然后被传入 `PassingLambdaFunctions.calculate()` 方法中。\n\n任何类型的功能都可以在 lambda 表达式内部实现，然后传递给不同的对象使用。这是促进代码复用和高可维护性的绝佳方式。\n\
  \n**6-9. 通过名称调用现有方法**\n\n**问题**\n\n你正在开发一个 lambda 表达式，该表达式仅调用传递给 lambda 的对象中已存在的方法。\n\
