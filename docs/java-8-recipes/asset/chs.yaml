  \ 函数返回的对象，并通过 JavaScript 进行访问。\n\n在使用 Nashorn 解决方案时，在 JavaScript 内部扩展 Java 类是一个非常实用的功能。能够共享\
  \ Java 对象使得访问现有的 Java 解决方案并在此基础上进行构建成为可能。\n\n18-10. 在 Unix 中创建可执行脚本\n\n问题\n\n你希望让你的\
