  \ URL 的 `alert()` 函数。以下代码是为包含“查看”按钮的新闻标题生成的 HTML 示例，该按钮可以通知 web 引擎的 `OnAlert` web\
  \ 事件（`WebEvent`）。\n\n```html\n<input type=\"button\" onclick=\"alert('http://carlfx.wordpress.com/2009/08/03/javafx-forms-framework-part-2/')\"\
  \ value=\"查看\" />\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第\
  \ 17 章 N JAVAFX 在 WEB 上\n\n最后要指出的一点是，RSS 应用程序缺少一些功能。想到的一个功能是能够从左侧列区域删除单个 RSS 超链接。一种变通方法是通过删除文件系统上的数据库来移除所有链接。由于\
  \ Derby 是一个嵌入式数据库，您可以删除包含该数据库的目录。如果数据库不存在，JavaFX RSS 应用程序将重新创建一个空数据库。希望您能添加新功能来增强这个有趣且实用的应用程序。\n\
  \n总结\n\nJavaFX 在 Web 应用程序的上下文中运行良好。在本章中，我们探讨了几种不同的方式，通过 HTML 和 JavaFX 的融合，将 Web\
  \ 应用程序和客户端应用程序的领域结合起来。JavaFX\n\n\n\n8 已针对与 HTML5 的轻松集成进行了定制，因此我们研究了如何从 JavaFX 与\
  \ HTML5 交互，反之亦然。我们还研究了在 JavaFX 应用程序中检索和显示数据库信息，以及嵌入其他富客户端内容，例如 SVG。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 18 章**\n\n**Nashorn 与脚本编程**\n\n在 Java 6 中，包含了 `javax.script` 包。它使开发者能够将用脚本语言编写的代码嵌入到\
  \ Java 应用程序中。这开启了一代新的应用程序，因为开发者能够构建包含用 JavaScript 和 Python 等语言编写的脚本的 Java 解决方案。Java\
  \ 6 中使用的 JavaScript 引擎称为 Rhino。它是 JavaScript 引擎的一个实现，完全用 Java 开发。虽然它包含完整的 JavaScript\
  \ 实现，但它是一个较旧的引擎，不再符合当前的 JavaScript 标准。\n\nJava 8 引入了一个名为 Nashorn 的新 JavaScript 引擎。它基于\
  \ ECMAScript-262 第 5.1 版语言规范，并支持 Java 6 中引入的 `javax.script` API。除了为 Java 平台带来一个现代的\
  \ JavaScript 引擎之外，Nashorn 还包含一些新特性，使得开发 JavaScript 和 Java 解决方案更加容易和健壮。名为 `jjs` 的新命令行工具提供了超越\
  \ `jrunscript` 的脚本编程能力。Nashorn 还可以完全访问 JavaFX 8 API，允许开发者完全用 JavaScript 构建 JavaFX\
  \ 应用程序。\n\n本章将介绍如何使用 Nashorn 引擎构建集成 Java 和 JavaScript 世界的解决方案。它并未涵盖 Nashorn 的所有可用特性，但提供了足够的信息，让您能够开始使用这个强大的\
  \ Java 8 新特性。\n\n18-1\\. 从 Java 加载和执行 JavaScript\n\n问题\n\n您希望从 Java 应用程序中加载和执行 JavaScript\
  \ 代码。\n\n解决方案\n\n使用 Nashorn 引擎执行 JavaScript，Nashorn 是 Java 8 的一部分，用于执行 JavaScript\
  \ 代码的下一代 JavaScript 引擎。可以调用 Nashorn 引擎来处理内联 JavaScript，或直接在 Java 代码中处理外部 JavaScript\
  \ 文件。使用 Java `ScriptEngineManager` 执行外部 JavaScript 文件或内联 JavaScript 代码。一旦获得了 `ScriptEngineManager()`，您就可以获取一个\
  \ Nashorn 引擎实例，用于执行 JavaScript 代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 18 章 N NASHORN 与脚本编程\n\n在以下示例中，使用 Nashorn `ScriptEngine` 来调用位于本地文件系统上的一个 JavaScript\
  \ 文件。\n\n```java\npublic static void loadExternalJs(){\n\n    ScriptEngineManager\
  \ sem = new ScriptEngineManager();\n\n    ScriptEngine nashorn = sem.getEngineByName(\"\
  nashorn\");\n\n    try {\n\n        nashorn.eval(\"load('src/org/java8recipes/chapter18/js/helloNashorn.js')\"\
