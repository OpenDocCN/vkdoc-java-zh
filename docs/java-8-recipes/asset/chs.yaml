  \ 579\n\nvi\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**引言**\n\nJava\
  \ 编程语言由 Sun Microsystems 于 1995 年推出。Java 源自 C 和 C++ 等语言，其设计目标比旧语言更直观、更易用，这尤其得益于其简化的对象模型和自动化的内存管理等设施。当时，Java\
  \ 因其面向对象、并发的架构、出色的安全性和可扩展性，以及用 Java 语言开发的应用程序能在任何包含 Java 虚拟机（JVM）的操作系统上运行，而吸引了开发者的兴趣。自诞生以来，Java\
  \ 一直被描述为一种允许开发者“一次编写，到处运行”的语言，因为代码被编译成包含字节码的类文件，生成的类文件可以在任何兼容的 JVM 上运行。这一概念使 Java\
  \ 在桌面开发领域迅速取得成功，随后在多年间衍生出不同的技术解决方案，包括基于 Web 的应用程序和富互联网应用程序（RIA）的开发。如今，Java 已部署在广泛的设备上，包括手机、打印机、医疗设备、蓝光播放器等。\n\
  \nJava 平台由一系列组件构成，从 Java 开发工具包（JDK）开始，JDK 包含 Java 运行时环境（JRE）、Java 编程语言以及开发和运行 Java\
  \ 应用程序所必需的平台工具。JRE 包含 Java 虚拟机（JVM），以及辅助 Java 应用程序开发的 Java 应用程序编程接口（API）和库。JVM 是编译后的\
  \ Java 类文件运行的基础，负责解释编译后的 Java 类并执行代码。每个能够运行 Java 代码的操作系统都有其自己的 JVM 版本。因此，任何运行本地\
  \ Java 桌面或独立 Java 应用程序的系统都必须安装 JRE。\n\nOracle 为大多数主流操作系统提供了 JRE 实现。每个操作系统都可以有其特定风格的\
  \ JRE。例如，移动设备可以运行完整 JRE 的精简版本，该版本针对运行 Java Mobile Edition（ME）和 Java SE 嵌入式应用进行了优化。Java\
  \ 平台 API 和库是所有 Java 应用程序都会使用的预定义类的集合。任何在 JVM 上运行的应用程序都会使用 Java 平台 API 和库。这使得应用程序能够使用已预定义并加载到\
  \ JVM 中的功能，从而让开发者有更多时间专注于其特定应用程序的细节。\n\n构成 Java 平台 API 和库的类允许 Java 应用程序使用一组统一的类来与底层操作系统通信。因此，Java\
  \ 平台负责将 Java 应用程序提供的一组指令解释为执行该应用程序的机器所需的操作系统命令。这为 Java 开发者创建了一个抽象层，使他们能够编写代码，从而开发出可以一次编写、在任何包含相关\
  \ JVM 的机器上运行的应用程序。\n\nJVM 以及 Java 平台 API 和库在每个 Java 应用程序的生命周期中都扮演着关键角色。已有整本书籍专门探讨该平台和\
  \ JVM。本书侧重于 Java 语言本身，即用于开发 Java 应用程序的语言，尽管在需要时也会引用 JVM 和 Java 平台 API 和库。\n\nJava\
  \ 语言是一种健壮、安全且现代的面向对象语言，可用于开发在 JVM 上运行的应用程序。Java 编程语言经过多次迭代的完善，每个新版本都使其更强大、更安全、更现代。本书涵盖了\
  \ Java 编程语言的众多特性，从 Java 1.0 引入的特性，一直到 Java 8 中新增的特性。\n\n2014 年，Oracle 公司发布了 Java\
  \ 8，这成为 Java 生态系统的又一个里程碑版本。Java 不仅已经是开发领域中最现代、静态类型、面向对象的语言，而且 Java 8 还为该语言增加了重要的新增强功能，例如\
  \ lambda 表达式、流处理和默认方法。\n\nJavaFX 8 也同时发布，将桌面 Java 应用推向了前所未有的高度。JavaFX 8 可用于使用 Java\
  \ 语言或任何其他在 JVM 上运行的语言开发丰富的桌面和互联网应用程序。它提供了丰富的图形和媒体用户界面，用于开发非凡的视觉应用程序。\n\n此版本是 JavaFX\
  \ 平台的又一次出色更新，增加了诸如 Swing 节点和打印 API 等功能。\n\n\n\n本书涵盖了 Java 开发的基础知识，例如安装 JDK、编写类和运行应用程序。它深入探讨了面向对象结构的开发、异常处理、单元测试和本地化等基本主题。本书还提供了使用\
  \ JavaFX 进行桌面应用程序开发的解决方案，以及一些基于 Web 和数据库的解决方案。它深入介绍了 JavaFX 8，是开始使用 JavaFX 8 的开发人员的必备指南。本书可作为解决普通\
  \ Java 开发人员可能遇到的问题的指南。书中讨论了广泛的主题，并且对所涵盖问题的解决方案简洁明了。如果您是 Java 新手开发者，我们希望本书能帮助您开启使用当今最先进、最广泛使用的编程语言之一的旅程。对于那些已经使用\
  \ Java 语言一段时间的人，我们希望本书能为您提供 Java 8 和 JavaFX 2.0 的新内容，以便您进一步提高 Java 开发技能。\n\n我们确保高级\
  \ Java 应用程序开发人员也能学到一些关于该语言新特性的知识，甚至可能偶然发现一些过去未曾使用过的技术。无论您的技能水平如何，本书都是一本随手可得的参考书，用于解决日常编程中遇到的问题。\n\
  \n本书读者对象\n\n本书面向所有对学习 Java 编程语言感兴趣的人，以及已经了解该语言但希望了解 Java SE 8 和 JavaFX 8 中包含的新特性的人。尚未使用\
  \ Java 语言编程的人可以阅读本书，它将帮助他们从零开始，快速上手并运行。正在寻求用 Java SE 8 和 JavaFX 8 提供的最新功能更新自己技能库的中级和高级\
  \ Java 开发人员也可以阅读本书，以快速更新和刷新他们的技能。Java 桌面程序员会发现本书中关于使用 JavaFX API 开发桌面应用程序的内容非常有用。当然，还有许多其他对任何类型的\
  \ Java 开发人员都有用的基本主题。\n\n本书结构\n\n本书的结构使得读者不必从头到尾阅读。事实上，它的结构允许开发人员选择他们想要阅读的主题并直接跳转到这些主题。每个技巧都包含一个要解决的问题、一个或多个解决该问题的方案，以及关于解决方案如何工作的详细说明。尽管某些技巧可能建立在其他技巧中讨论过的概念之上，但它们包含了适当的引用，以便开发人员可以找到其他对解决方案有益的相关技巧。本书旨在让开发人员能够快速上手并运行一个解决方案，以便他们能及时回家吃晚饭。\n\
