  \n`enableCss()` 的代码如下：\n\nprotected final EventHandler<ActionEvent> enableCss(String\
  \ style, final Scene scene){\n\nreturn (ActionEvent event) -> {\n\nscene.getStylesheets().clear();\n\
  \nsetUserAgentStylesheet(style);\n\n};\n\n}\n\n对于其他不属于默认 JavaFX 发行版的 CSS 样式，菜单项的创建略有不同。以下是使用前面讨论的便捷方法的代码示例。\n\
  \nmenu.getItems().add(createMenuItem(\"Control Style 1\", \"controlStyle1.css\"\
