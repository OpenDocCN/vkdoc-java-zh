  \n这个类很简单，能够保存一个名为 `greeting` 的字符串值。\n\n该类定义了三个方法：\n\n- **`HelloMessage()`**。这个方法也称为构造函数，其名称与类名相同。在本例中，它不接受任何参数。每当你创建该类的一个新对象时，它会被自动调用。请注意，这被称为“无参”构造函数，因为它是在类中显式编写的，并且不接受任何参数。如果你没有提供构造函数，JVM\
