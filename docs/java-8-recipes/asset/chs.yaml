  \n`Player.compareByGoal()` 方法可用于对 `Player` 对象数组进行排序。为此，将 `Player` 对象数组 (`Player[]`)\
  \ 作为第一个参数传递给 `Arrays.sort()` 方法，并将方法引用 `Player::compareByGoal` 作为第二个参数传递。结果将得到一个按进球数升序排列的\
  \ `Player` 对象列表。以下代码行展示了如何完成此任务。\n\n```java\nArrays.sort(teamArray, Player::compareByGoal);\n\
  ```\n\n**工作原理**\n\n考虑一下，你的 lambda 表达式将按名称调用单个方法，或许还会返回一个结果。如果 lambda 表达式符合此场景，那么它就是使用方法引用的绝佳候选。方法引用是\
  \ lambda 表达式的一种简化形式，它指定类名或实例名，后跟要调用的方法，格式如下：\n\n`<类名或实例名>::<方法名>`\n\n\n\n双冒号（`::`）运算符用于指定方法引用。由于方法引用是简化的\
  \ lambda 表达式，它必须实现一个函数式接口，并且该接口中的抽象方法必须与被引用的方法具有相同的参数列表和返回类型。任何参数都随后从方法引用的上下文中推导得出。例如，考虑与解决方案相同的场景：你想通过调用\
  \ `Player.compareByGoal()` 方法来比较进球数，从而对 `Player` 对象数组进行排序。\n\n可以编写以下代码，通过 lambda\
  \ 表达式实现此功能：`Arrays.sort(teamArray, (p1, p2) -> Player.compareByGoal(p1,p2));`\n\n\
  在这段代码中，数组作为第一个参数传递给 `Arrays.sort()`，第二个参数是一个 lambda 表达式，它将两个 `Player` 对象传递给 `Player.compareByGoal()`\
  \ 方法。该 lambda 表达式使用了函数式接口 `Comparator<Player>.compare`，该接口利用了 `(Player, Player)`\
  \ 参数列表。`compareByGoal()` 方法包含相同的参数列表。同样，`compareByGoal()` 的返回类型也与函数式接口中的返回类型匹配。因此，参数列表无需在代码中显式指定；它可以从方法引用\
  \ `Player::compareByGoal` 的上下文中推断出来。\n\n方法引用有四种不同的类型，表 6-2 列出了每一种。\n\n**表 6-2.**\
  \ *方法引用类型*\n\n**类型**\n\n**描述**\n\n静态引用\n\n使用对象的静态方法。\n\n实例引用\n\n使用对象的实例方法。\n\n任意对象方法\n\
  \n用于特定类型的任意对象，而非特定对象。\n\n构造器引用\n\n用于通过 `new` 关键字调用构造器来生成新对象。\n\n在解决方案中，演示了静态方法引用类型，因为\
  \ `compareByGoal()` 是静态类中的一个静态方法。也可以使用实例引用来调用对象实例的方法。考虑以下类，它包含一个用于比较 `Player` 对象中进球数的非静态方法。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 N LAMBDA 表达式\n\n```java\n\
  public class PlayerUtility {\n\n    public int compareByGoal(Player a, Player b){\n\
  \        int eval;\n        if(a.getGoals() > b.getGoals()){\n            eval =\
  \ 1;\n        } else if (a.getGoals() < b.getGoals()){\n            eval = -1;\n\
  \        } else {\n            eval = 0;\n        }\n        return eval;\n    }\n\
  }\n```\n\n可以实例化此类，并使用新实例来引用 `compareByGoals()` 方法，类似于本食谱解决方案中使用的技术。\n\n```java\n\
  Player[] teamArray2 = team.toArray(new Player[team.size()]);\nPlayerUtility utility\
  \ = new PlayerUtility();\nArrays.sort(teamArray2, utility::compareByGoal);\n```\n\
  \n假设你的应用程序包含一个任意类型的列表，并且你想对该列表中的每个对象应用一个方法。在这种情况下，如果对象包含可通过引用使用的方法，则可以使用方法引用。在以下示例中，`Arrays.sort()`\
  \ 方法应用于一个 `int` 值列表，并使用方法引用将 `Integer compare()` 方法应用于列表中的元素。因此，结果列表将被排序，并且方法引用会自动传递\
  \ `int` 参数并返回 `int` 比较结果。\n\n```java\nInteger[] ints = {3,5,7,8,51,33,1};\nArrays.sort(ints,\
  \ Integer::compare);\n```\n\n最后一种方法引用类型可用于引用对象的构造器。这种类型的方法引用在通过工厂创建新对象时特别有用。让我们看一个例子。假设\
  \ `Player` 对象包含以下构造器：\n\n```java\npublic Player(String position, int status, String\
  \ first, String last){\n    this.position = position;\n    this.status = status;\n\
  \    this.firstName = first;\n    this.lastName = last;\n}\n```\n\n你希望使用工厂模式动态生成\
  \ `Player` 对象。以下代码演示了一个函数式接口的示例，该接口包含一个名为 `createPlayer()` 的抽象方法，该方法接受与 `Player`\
  \ 对象构造器相同的参数列表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 N LAMBDA\
  \ 表达式\n\n```java\npublic interface PlayerFactory {\n    Player createPlayer(String\
  \ position,\n                        int status,\n                        String\
  \ firstName,\n                        String lastName);\n}\n```\n\n现在可以从 lambda\
  \ 表达式创建工厂，然后调用它来创建新对象。以下代码行演示了这一点：\n\n```java\nPlayerFactory player1 = Player::new;\n\
  Player newPlayer = player1.createPlayer(\"CENTER\", 0, \"Constructor\", \"Referenceson\"\
  );\n```\n\n方法引用可能是 Java 8 最重要的新特性之一，尽管 lambda 表达式有更多的用例。它们提供了一种易于阅读、简化的技术来生成 lambda\
  \ 表达式，并且在大多数情况下，当 lambda 仅仅是通过名称调用单个方法时，它们都能正常工作。\n\n**总结**\n\n在一种语言中添加一个新构造能像 lambda\
  \ 表达式对 Java 那样产生巨大影响的情况并不常见。多年来，开发人员一直使用匿名内部类等构造来为应用程序添加细微的功能。随着 lambda 表达式的加入，这些细微的功能可以用易于阅读的代码来开发，而不是冗余且难以阅读的样板代码。此外，当今许多语言都使得传递功能代码片段成为可能，从而动态地改变现有代码的功能。这样的解决方案现在在\
  \ Java 语言中也可用，允许开发人员利用更现代的编程技术。\n\nLambda 表达式为 Java 语言注入了新的活力，提供了 Java 开发人员过去所没有的能力。桌面、移动和企业应用程序的开发人员都将能够利用\
  \ lambda 表达式来创建更健壮、更复杂的解决方案。Lambda 表达式是对该语言的一次革命性变革，并对整个平台的开发产生了重大影响。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 7 章**\n\n**数据结构与集合**\n\n几乎所有应用程序都对用户数据执行任务。有时，数据从用户处获取，对数据执行任务，然后立即返回结果。更常见的情况是，获取数据后，将其存储在应用程序中供以后使用，并最终对其执行任务。应用程序利用数据结构来存储可在应用程序实例整个生命周期中使用的数据。Java\
  \ 语言包含许多称为集合类型的数据结构，可用于此目的。这些数据结构实现了 `java.util.Collection` 接口，该接口提供了多种方法，用于添加、删除数据以及对集合中使用的数据执行任务。\n\
  \nJava 8 在数据结构和集合类型方面改变了游戏规则。引入了管道和流的概念，使得对集合类型中包含的数据进行轻松迭代和操作成为可能。在 Java 的早期版本中，开发人员必须告诉编译器如何迭代集合中的数据。过去，开发人员经常使用循环来对数据结构执行迭代任务。Java\
  \ 8 使开发人员能够开始使用流对集合类型执行迭代任务。当在集合上使用流和操作管道时，开发人员指定要执行的操作类型，而 JDK 决定如何执行。这通过减少样板代码并提供易于使用的算法来处理集合，从而减轻了开发人员的负担。\n\
  \n\n\n本章介绍了一些可在 Java 应用程序中用于存储用户数据的数据结构。它详细讨论了部分数据结构，并介绍了可对这些数据执行的操作。本章引入了管道和流的概念，并提供了演示其用法的示例。Java\
  \ 8 迫使开发者以不同的方式思考集合代码的编写方式，从而实现更智能、更高效的解决方案。\n\n7-1\\. 定义一组固定的相关常量\n\n问题\n\n你需要一个能够表示一组固定相关常量的类型。\n\
