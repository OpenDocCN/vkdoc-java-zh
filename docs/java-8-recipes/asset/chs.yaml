  \n14-2\\. 绘制文本\n\n问题\n\n你希望在 JavaFX 应用程序中绘制自定义文本。\n\n解决方案\n\n通过使用 `javafx.scene.text.Text`\
  \ 类创建 `Text` 节点，并将其放置在 JavaFX 场景图上。由于 `Text` 节点要放置在场景图上，你决定创建随机定位的 `Text` 节点，这些节点围绕其\
  \ (x, y) 位置旋转，并散布在场景区域中。\n\n以下代码实现了一个 JavaFX 应用程序，该应用程序显示散布在场景图中的 `Text` 节点，并具有随机位置和颜色：\n\
  \n```java\nprimaryStage.setTitle(\"Chapter 14-2 Drawing Text\");\n\nGroup root =\
  \ new Group();\n\nScene scene = new Scene(root, 300, 250, Color.WHITE);\n\nRandom\
  \ rand = new Random(System.currentTimeMillis());\n\nfor (int i = 0; i < 100; i++)\
  \ {\n\nint x = rand.nextInt((int) scene.getWidth());\n\nint y = rand.nextInt((int)\
  \ scene.getHeight());\n\nint red = rand.nextInt(255);\n\nint green = rand.nextInt(255);\n\
  \nint blue = rand.nextInt(255);\n\nText text = new Text(x, y, \"Java 8 Recipes\"\
  );\n\nint rot = rand.nextInt(360);\n\ntext.setFill(Color.rgb(red, green, blue, .99));\n\
  \ntext.setRotate(rot);\n\nroot.getChildren().add(text);\n\n}\n\nprimaryStage.setScene(scene);\n\
  \nprimaryStage.show();\n```\n\n图 14-2 显示了散布在 JavaFX 场景图中的随机 `Text` 节点。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
