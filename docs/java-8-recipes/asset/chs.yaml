  \n第 14 章 N JAVAFX 基础\n\n工作原理\n\n有大量应用程序是使用 Java Swing 框架编写的。有时，在 JavaFX 应用程序中利用这些应用程序，或嵌入其中部分合理的\
  \ Swing 组件是很有意义的。`javafx.embed.swing.SwingNode` 类使得将 `JComponent` 实例嵌入到 JavaFX 应用程序中变得轻而易举，只需将\
  \ `JComponent` 传递给 `SwingNode` 的 `setContent()` 方法即可。内容会自动重绘，所有事件都会转发给 `JComponent`\
  \ 实例，无需用户干预。\n\n在本示例中，通过实例化一个新的 `SwingNode` 对象，并将 `SwingForm` 类的实例传递给它，嵌入了一个简单的\
  \ Java Swing 表单。Swing 内容应在事件调度线程（EDT）上运行，因此任何 Swing 访问都应在 EDT 上进行。也就是说，使用 `SwingUtilities.invokeLater`\
  \ 创建了一个新线程，并使用 lambda 表达式封装了用于设置 Swing 内容的 `Runnable`。\n\n也可以从 Swing 代码内部与 JavaFX\
  \ 内容进行交互。为此，您必须通过调用 `javafx.application.Platform` 类并调用其 `runLater()` 方法（传递一个 `Runnable`），在\
  \ JavaFX 应用程序线程中运行 JavaFX 代码。例如，在示例代码中，Swing 表单中的按钮可以使用以下代码回调 JavaFX 标签以更改文本。请注意，JavaFX\
  \ 标签是一个公共字段，因此可以直接从 Swing 类内部访问它。\n\n\n\nJButton button = new JButton(\"Submit\"\
  );\n\nbutton.addActionListener((event) -> {\n\nPlatform.runLater(()-> {\n\nUserEntryForm.fxLabel.setText(\"\
  Message from Swing form...\");\n\n});\n\n});\n\nN **注意** 默认情况下，JavaFX 应用程序线程和 Swing\
  \ 事件调度线程（EDT）是分离的。EDT 不运行 Swing 应用程序的 GUI 代码。然而，在 JavaFX 中，平台 GUI 线程会运行应用程序代码。有一个实验性设置可以启用单线程模式，该模式允许\
  \ JavaFX 平台 GUI 线程在同时使用 Swing 和 JavaFX 时成为 EDT。要启用此实验性设置，请使用以下选项执行代码：`Djavafx.embed.singleThread=true`\n\
  \n通过利用 JavaFX 8 的新特性，您可以生成一个包含嵌入式 Swing 代码的 JavaFX 应用程序，该代码可以直接与 JavaFX 代码通信。\n\n\
  总结\n\nJavaFX 是 Java Swing API 的继承者。它使开发人员能够为下一代应用程序生成复杂而强大的用户界面。本章为您提供了对 JavaFX\
  \ 的基本理解，以及一些最常用的 JavaFX API。在接下来的几章中，您将了解更多关于 JavaFX 的知识，例如如何构建 3D 对象和 WebView。\n\
