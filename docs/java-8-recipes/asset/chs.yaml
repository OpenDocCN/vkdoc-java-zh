  \n8-8\\. 创建目录\n\n问题\n\n你需要从 Java 应用程序中创建一个目录。\n\n解决方案 1\n\n通过使用默认的 `FileSystem`，实例化一个指向新目录的路径；然后调用\
  \ `Files.createDirectory()` 静态方法，该方法会创建路径中指定的目录。\n\n```java\nFileSystem fileSystem\
  \ = FileSystems.getDefault();\nPath directory = fileSystem.getPath(\"./newDirectory\"\
  );\ntry {\n    Files.createDirectory(directory);\n} catch (IOException e) {\n  \
  \  e.printStackTrace();\n}\n```\n\n解决方案 2\n\n如果使用 *nix 操作系统，你可以通过调用 `PosixFilePermission()`\
  \ 方法来指定文件夹属性，该方法允许你在所有者、组和其他用户级别设置访问权限。例如：\n\n```java\nFileSystem fileSystem = FileSystems.getDefault();\n\
  Path directory = fileSystem.getPath(\"./newDirectoryWPermissions\");\ntry {\n  \
  \  Set<PosixFilePermission> perms = PosixFilePermissions.fromString(\"rwxr-x---\"\
  );\n    FileAttribute<Set<PosixFilePermission>> attr =\n        PosixFilePermissions.asFileAttribute(perms);\n\
  \    Files.createDirectory(directory, attr);\n} catch (IOException e) {\n    e.printStackTrace();\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\n工作原理\n\
  \n`Files.createDirectory()` 方法接受一个路径作为参数，然后创建该目录。默认情况下，创建的目录会继承默认权限。如果你想在 Linux\
  \ 中指定特定权限，可以在 `createDirectory()` 方法中使用 `PosixAttributes` 作为额外参数。\n\n8-9\\. 遍历目录中的文件\n\
  \n问题\n\n你需要扫描一个目录中的文件。该目录下可能还有包含更多文件的子目录。你希望将这些子目录也纳入扫描范围。\n\n解决方案\n\n使用 NIO.2，创建一个\
  \ `FileVisitor` 对象，并在其 `visitFile` 方法中执行所需的操作。\n\n接下来，获取默认的 `FileSystem` 对象，并通过\
  \ `getPath()` 方法获取你想要扫描的路径引用。最后，调用 `Files.walkFileTree()` 方法，传入路径和你创建的 `FileVisitor`。\n\
  \n以下代码演示了如何执行这些任务。\n\n```java\nFileVisitor<Path> myFileVisitor = new SimpleFileVisitor<Path>()\
  \ {\n    @Override\n    public FileVisitResult visitFile(Path file, BasicFileAttributes\
  \ attrs)\n        throws IOException {\n        System.out.println(\"Visited File:\
  \ \" + file.toString());\n        return FileVisitResult.CONTINUE;\n    }\n};\n\n\
  FileSystem fileSystem = FileSystems.getDefault();\nPath directory = fileSystem.getPath(\"\
  .\");\ntry {\n    Files.walkFileTree(directory, myFileVisitor);\n} catch (IOException\
  \ e) {\n    e.printStackTrace();\n}\n```\n\n工作原理\n\n在 NIO.2 之前，尝试遍历目录树需要用到递归，并且根据实现方式的不同，可能非常脆弱。获取文件夹内文件的调用是同步的，需要扫描整个目录后才能返回；这会导致应用程序用户感觉方法调用无响应。借助新的\
  \ NIO.2，你可以指定从哪个文件夹开始遍历，NIO.2 调用会处理递归细节。你只需向 NIO.2 API 提供一个类，告诉它在找到文件/文件夹时该做什么（`SimpleFileVisitor`\
  \ 实现）。NIO.2 使用了访问者模式，因此无需预先扫描整个文件夹，而是在迭代过程中逐个处理文件。\n\n将 `SimpleFileVisitor` 类实现为匿名内部类时，需要重写\
  \ `visitFile(Path file, BasicFileAttributes attrs)` 方法。重写此方法后，你可以指定在遇到文件时要执行的任务。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\n`visitFile`\
  \ 方法返回一个 `FileVisitReturn` 枚举。该枚举告诉 `FileVisitor` 要执行哪个操作：\n\n- **CONTINUE**：继续遍历目录树。\n\
  - **TERMINATE**：停止遍历。\n- **SKIP_SUBTREE**：停止从当前树层级继续深入（仅当在 `preVisitDirectory()`\
  \ 方法中返回此枚举时有用）。\n- **SKIP_SIBLINGS**：跳过与当前目录同一树层级下的其他目录。\n\n除了 `visitFile()` 方法外，`SimpleFileVisitor`\
  \ 类还包含以下方法：\n- **preVisitDirectory**：在进入要遍历的目录之前调用。\n- **postVisitDirectory**：在完成遍历一个目录后调用。\n\
  - **visitFile**：在访问文件时调用，如示例代码所示。\n- **visitFileFailed**：在无法访问文件时调用（例如发生 I/O 错误）。\n\
  \n8-10\\. 查询（和设置）文件元数据\n\n问题\n\n你需要获取特定文件的信息，例如文件大小、是否为目录等。此外，你可能还想在 Windows 操作系统中将文件标记为*已存档*，或在\
  \ *nix 操作系统中授予特定的 POSIX 文件权限（参见配方 8-8）。\n\n解决方案\n\n使用 Java NIO.2，你可以通过简单调用 `java.nio.file.Files`\
  \ 工具类上的方法（传入你想要获取元数据的路径）来获取任何文件信息。你也可以通过调用 `Files.getFileAttributeView()` 方法（传入你想要使用的特定属性视图实现）来获取属性信息。以下代码演示了获取元数据的这些技术。\n\
  \n```java\nPath path = FileSystems.getDefault().getPath(\"./file2.log\");\ntry {\n\
  \    // 通用文件属性，所有 Java 系统都支持\n    System.out.println(\"File Size: \" + Files.size(path));\n\
  \    System.out.println(\"Is Directory: \" + Files.isDirectory(path));\n    System.out.println(\"\
  Is Regular File: \" + Files.isRegularFile(path));\n    System.out.println(\"Is Symbolic\
  \ Link: \" + Files.isSymbolicLink(path));\n    System.out.println(\"Is Hidden: \"\
  \ + Files.isHidden(path));\n    System.out.println(\"Last Modified Time: \" + Files.getLastModifiedTime(path));\n\
  \    System.out.println(\"Owner: \" + Files.getOwner(path));\n\n    // 特定属性视图\n\
  \    DosFileAttributeView view = Files.getFileAttributeView(path,\n        DosFileAttributeView.class);\n\
  \    System.out.println(\"DOS File Attributes\\n\");\n    System.out.println(\"\
  ------------------------------------\\n\");\n    System.out.println(\"Archive :\
  \ \" + view.readAttributes().isArchive());\n    System.out.println(\"Hidden : \"\
  \ + view.readAttributes().isHidden());\n    System.out.println(\"Read-only: \" +\
  \ view.readAttributes().isReadOnly());\n    System.out.println(\"System : \" + view.readAttributes().isSystem());\n\
  \    view.setArchive(false);\n} catch (IOException e) {\n    e.printStackTrace();\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\n工作原理\n\
  \n与旧的 I/O 技术相比，Java NIO.2 在获取和设置文件属性方面提供了更大的灵活性。NIO.2 将不同操作系统的属性抽象为“通用”属性集和“操作系统特定”属性集。\n\
  \n标准属性如下：\n\n- **isDirectory**：如果是目录，则返回 true。\n- **isRegularFile**：如果文件不被视为常规文件、文件不存在或无法确定是否为常规文件，则返回\
  \ false。\n- **isSymbolicLink**：如果是符号链接（在 Unix 系统中最为常见），则返回 true。\n- **isHidden**：如果文件在操作系统中被视为隐藏文件，则返回\
  \ true。\n- **LastModifiedTime**：文件最后更新的时间。\n- **Owner**：根据操作系统确定的文件所有者。\n\n\n\n\
  此外，NIO.2 允许访问底层操作系统的特定属性。为此，你首先需要获取一个代表操作系统文件属性的视图（在本例中，它是一个 `DosFileAttributeView`）。一旦获取了该视图，你就可以查询和修改操作系统特定的属性。\n\
  \n**N 注意** `AttributeView` 仅适用于其目标操作系统（你不能在 *nix 机器上使用 `DosFileAttributeView`）。\n\
  \n8-11. 监控目录变更\n\n问题\n\n你需要跟踪目录内容何时发生变化（例如，文件被添加、修改或删除），并对这些变化做出响应。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 8 章 N 输入与输出\n\n解决方案\n\n通过使用 `WatchService`，你可以订阅以接收文件夹内发生事件的通知。在以下示例中，我们订阅了\
  \ `ENTRY_CREATE`、`ENTRY_MODIFY` 和 `ENTRY_DELETE` 事件：\n\n```java\ntry {\n    System.out.println(\"\
  Watch Event, press q<Enter> to exit\");\n    FileSystem fileSystem = FileSystems.getDefault();\n\
  \    WatchService service = fileSystem.newWatchService();\n    Path path = fileSystem.getPath(\"\
  .\");\n    System.out.println(\"Watching :\"+path.toAbsolutePath());\n    path.register(service,\
  \ StandardWatchEventKinds.ENTRY_CREATE,\n        StandardWatchEventKinds.ENTRY_DELETE,\
  \ StandardWatchEventKinds.ENTRY_MODIFY);\n    boolean shouldContinue = true;\n \
  \   while(shouldContinue) {\n        WatchKey key = service.poll(250, TimeUnit.MILLISECONDS);\n\
  \        // Code to stop the program\n        while (System.in.available() > 0)\
  \ {\n            int readChar = System.in.read();\n            if ((readChar ==\
  \ 'q') || (readChar == 'Q')) {\n                shouldContinue = false;\n      \
  \          break;\n            }\n        }\n        if (key == null) continue;\n\
  \        key.pollEvents().stream()\n            .filter((event) -> !(event.kind()\
  \ == StandardWatchEventKinds.OVERFLOW))\n            .map((event) -> (WatchEvent<Path>)event).forEach((ev)\
  \ -> {\n                Path filename = ev.context();\n                System.out.println(\"\
  Event detected :\"+filename.toString()+\" \"+ev.kind());\n            });\n    \
  \    boolean valid = key.reset();\n        if (!valid) {\n            break;\n \
  \       }\n    }\n} catch (IOException | InterruptedException e) {\n    e.printStackTrace();\n\
  }\n```\n\n工作原理\n\nNIO.2 包含一个内置的轮询机制，用于监控文件系统中的变更。使用轮询机制，你可以等待事件发生，并在指定的时间间隔内轮询更新。一旦事件发生，你可以处理并消费它。一个被消费的事件会通知\
  \ NIO.2 框架，你已经准备好处理新的事件。\n\n要开始监控一个文件夹，首先创建一个 `WatchService`，用于轮询变更。创建 `WatchService`\
  \ 后，将其注册到一个路径上。路径代表文件系统中的一个文件夹。当 `WatchService` 注册到路径时，你需要定义要监控的事件类型（参见表 [8-2]）。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 N 输入与输出\n\n**表 8-2.**\
  \ *watchEvents 的类型*\n\n| **WatchEvent** | **描述** |\n|---|---|\n| OVERFLOW | 已溢出的事件（忽略）\
  \ |\n| ENTRY_CREATE | 目录或文件被创建 |\n| ENTRY_DELETE | 目录或文件被删除 |\n| ENTRY_MODIFY |\
  \ 目录或文件被修改 |\n\n将 `WatchService` 注册到路径后，你就可以“轮询”`WatchService` 以获取事件发生情况。\n\n通过调用\
  \ `watchService.poll()` 方法，你将等待该路径上发生文件/文件夹事件。使用 `watchService.poll(int timeout,\
  \ TimeUnit timeUnit)` 会等待直到指定的超时时间到达才继续执行。如果 `watchService` 接收到事件，或者允许的时间已过，那么它将继续执行。\n\
  \n如果没有事件发生且超时时间已到，`watchService.poll(int timeout)` 返回的 `WatchKey` 对象将为 `null`；否则，返回的\
  \ `WatchKey` 对象将包含已发生事件的相关信息。\n\n由于许多事件可能同时发生（例如，移动整个文件夹或将一堆文件粘贴到文件夹中），`WatchKey`\
  \ 可能包含多个事件。你可以通过调用 `watchKey.pollEvents()` 方法来获取与该键关联的所有事件。\n\n`watchKey.pollEvents()`\
  \ 调用将返回一个可迭代的 `watchEvent` 列表。每个 `watchEvent` 包含事件所引用的实际文件或文件夹的信息（例如，整个子文件夹可能已被移动或删除），以及事件类型（添加、编辑、删除）。只有那些在\
  \ `WatchService` 上注册的事件才会被处理。你可以注册的事件类型列在表 [8-2] 中。\n\n一旦事件被处理完毕，务必调用 `EventKey.reset()`。`reset()`\
  \ 将返回一个布尔值，用于确定 `WatchKey` 是否仍然有效。如果 `WatchKey` 被取消或其源 `WatchService` 被关闭，则该 `WatchKey`\
  \ 变为无效。如果 `eventKey` 返回 `false`，你应该跳出监控循环。\n\n8-12. 读取属性文件\n\n问题\n\n你想为应用程序建立一些配置设置，并且希望能够手动或通过编程方式修改这些设置。\n\
