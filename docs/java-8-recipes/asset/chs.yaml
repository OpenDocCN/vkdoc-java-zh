  \n第 4 章 数字与日期\n\n4-15. 查找日期和时间之间的间隔\n\n问题\n\n您需要确定两个日期或时间之间经过了多少小时、天、周、月或年。\n\n\
  解决方案 #1\n\n使用 Date-Time API 来确定两个日期之间的差异。具体来说，使用 Period 类来确定两个日期之间的时间段（以天为单位）。以下示例演示了如何获取两个日期之间的天数、月数和年数间隔。\n\
  \n**注意**\n\nN\n\n此示例显示的是天数、月数和年数的差异，而不是两个日期之间的累计天数或月数。要确定两个日期之间的总累计天数、月数和年数，请继续阅读解决方案\
  \ #2 和 #3。\n\nLocalDate anniversary = LocalDate.of(2000, Month.NOVEMBER, 11);\n\n\
  LocalDate today = LocalDate.now();\n\nPeriod period = Period.between(anniversary,\
  \ today);\n\nSystem.out.println(\"天数差异: \" + period.getDays());\n\nSystem.out.println(\"\
  月数差异: \" + period.getMonths());\n\nSystem.out.println(\"年数差异: \" + period.getYears());\n\
  \n结果如下：\n\n天数差异: 16\n\n月数差异: 1\n\n年数差异: 13\n\n解决方案 #2\n\n使用 java.util.concurrent.TimeUnit\
  \ 枚举在给定日期之间执行计算。使用此枚举，您可以获取天、小时、微秒、毫秒、分钟、纳秒和秒的整数值。这样您就可以执行必要的计算。\n\n// 获取 Calendar\
  \ 类的两个实例\n\nCalendar cal1 = Calendar.getInstance();\n\nCalendar cal2 = Calendar.getInstance();\n\
  \n// 将日期设置为 2010/01/01:12:00\n\ncal2.set(2010,0,1,12,0);\n\nDate date1 = cal2.getTime();\n\
  \nSystem.out.println(date1);\n\nlong mill = Math.abs(cal1.getTimeInMillis() - date1.getTime());\n\
  \n// 转换为小时\n\nlong hours = TimeUnit.MILLISECONDS.toHours(mill);\n\n// 转换为天\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\nLong days = TimeUnit.HOURS.toDays(hours);\n\nString diff = String.format(\"\
  %d 小时 %d 分钟\", hours,\n\nTimeUnit.MILLISECONDS.toMinutes(mill) - TimeUnit.HOURS.toMinutes(hours));\n\
  \nSystem.out.println(diff);\n\ndiff = String.format(\"%d 天\", days);\n\nSystem.out.println(diff);\n\
  \n// 将天数除以 7 得到周数\n\nint weeks = days.intValue()/7;\n\ndiff = String.format(\"%d\
  \ 周\", weeks);\n\nSystem.out.println(diff);\n\n此代码的输出将格式化为显示指示当前日期与所创建的 Date 对象之间差异的文本字符串。\n\
  \n解决方案 #3\n\n要确定天、月、年或其他时间单位的总累计差异，请使用 ChronoUnit 类。以下代码演示了如何使用 ChronoUnit 类来确定两个日期之间的天数和年数。\n\
  \nLocalDate anniversary = LocalDate.of(2000, Month.NOVEMBER, 11);\n\nLocalDate today\
  \ = LocalDate.now();\n\nlong yearsBetween = ChronoUnit.YEARS.between(anniversary,\
  \ today);\n\nSystem.out.println(\"日期之间的年数: \" + yearsBetween);\n\nlong daysBetween\
  \ = ChronoUnit.DAYS.between(anniversary, today);\n\nSystem.out.println(\"日期之间的天数:\"\
  \ + daysBetween);\n\n\n\n以下是结果：\n\n日期之间的年数：13\n\n日期之间的天数：4794\n\n工作原理\n\n与大多数编程技术一样，在\
  \ Java 中执行日期计算的方法不止一种。DateTime API 包含一些用于确定时间间隔的新技术。新的 `Period` 类用于确定两个指定对象之间时间单位的差值。要获取两个日期时间对象之间的\
  \ `Period`，请调用 `Period.between()` 方法，并传入你想要获取 `Period` 的两个日期时间对象。\n\n`Period` 有许多方法可用于将间隔分解为不同的单位。例如，可以使用\
  \ `getDays()` 方法获取两个日期时间对象周期内的天数。同样，可以调用 `getMonths()` 和 `getYears()` 方法来返回周期内的月数或年数。\n\
  \nDate-Time API 还包含一个 `ChronoUnit` 枚举，可用于处理 ISO 以外的日历系统，提供基于单位的访问来操作日期和时间。该枚举中的每个单位值都包含许多用于执行操作的方法。其中一种方法是\
  \ `between()`，它仅以指定的单位返回两个给定日期时间对象之间的时间单位。在解决方案中，它分别使用 `ChronoUnit.YEARS.between()`\
  \ 和 `ChronoUnit.DAYS.between()` 来返回年数和天数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n最有用的技术之一是基于给定日期时间的毫秒数进行计算。这提供了最精确的计算，因为它以非常小的间隔（毫秒）处理时间。可以通过调用\
  \ `Calendar` 对象的 `getTimeInMillis()` 方法来获取当前时间的毫秒数。\n\n同样，通过调用 `getTime()` 方法，`Date`\
  \ 对象会返回以毫秒表示的值。正如你从本技巧的解决方案中看到的，首先执行的计算是给定日期之间的毫秒差。获取该值，然后取其绝对值，将为执行日期计算提供所需的基础。要获取一个数的绝对值，请使用\
  \ `java.lang.Math` 类中包含的 `abs()` 方法，如下代码行所示：\n\n```java\nlong mill = Math.abs(cal1.getTimeInMillis()\
  \ - date1.getTime());\n```\n\n绝对值将以 `long` 格式返回。可以使用 `TimeUnit` 枚举来获取日期的不同转换。它包含许多表示不同时间间隔的静态枚举常量值，类似于\
  \ `Calendar` 对象。这些值如下所示。\n\nN **注意** 枚举类型是一种其字段由一组固定的常量值组成的类型。枚举类型是在 Java 1.5 版本中被引入的。\n\
  \n-   DAYS\n-   HOURS\n-   MICROSECONDS\n-   MILLISECONDS\n-   MINUTES\n-   NANOSECONDS\n\
  -   SECONDS\n\n这些值不言自明地代表了它们所表示的转换间隔。通过针对这些枚举调用转换方法，可以转换表示两个日期之间持续时间的 `long` 值。正如你在本技巧的解决方案中看到的，首先使用枚举建立时间单位，然后对该时间单位进行转换调用。例如，以下转换。首先，建立\
  \ `TimeUnit.MILLISECONDS` 时间单位。其次，调用其 `toHours()` 方法，并将由 `mill` 字段表示的 `long` 值作为参数传入：\n\
  \n```java\nTimeUnit.MILLISECONDS.toHours(mill)\n```\n\n这段代码可以翻译为：“`mill` 字段的内容以毫秒表示；将这些内容转换为小时。”此调用的结果是将\
  \ `mill` 字段中的值转换为小时。通过堆叠对 `TimeUnit` 的调用，可以进行更精确的转换。例如，以下代码将 `mill` 字段的内容转换为小时，然后再转换为天：\n\
  \n```java\nTimeUnit.HOURS.toDays(TimeUnit.MILLISECONDS.toHours(mill))\n```\n\n同样，可以理解为：“`mill`\
  \ 字段的内容以毫秒表示。将这些内容转换为小时。接下来，将这些小时转换为天。”\n\n`TimeUnit` 可以使时间间隔转换非常精确。将 `TimeUnit`\
  \ 转换的精度与数学运算相结合，你将能够将两个日期的差值转换为几乎任何时间间隔。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n4-16. 从指定字符串获取日期时间\n\n问题\n\n你想将一个字符串解析为日期时间对象。\n\n解决方案\n\n利用时间日期类的\
  \ `parse()` 方法，使用预定义或自定义格式解析字符串。\n\n以下代码行演示了如何使用 `parse()` 方法的变体将字符串解析为日期或日期时间对象。\n\
  \n```java\n// 将字符串解析为日期时间对象\nLocalDate ld = LocalDate.parse(\"2014-12-28\");\nLocalDateTime\
  \ ldt = LocalDateTime.parse(\"2014-12-28T08:44:00\");\nSystem.out.println(\"解析的日期:\
  \ \" + ld);\nSystem.out.println(\"解析的日期时间: \" + ldt);\n\n// 使用不同的解析器\nLocalDate\
  \ ld2 = LocalDate.parse(\"2014-12-28\", DateTimeFormatter.ISO_DATE);\nSystem.out.println(\"\
  不同的解析器: \" + ld2);\n\n// 自定义解析器\nString input = \"12/28/2013\";\ntry {\n    DateTimeFormatter\
  \ formatter = DateTimeFormatter.ofPattern(\"MM/dd/yyyy\");\n    LocalDate ld3 =\
  \ LocalDate.parse(input, formatter);\n    System.out.println(\"自定义解析的日期: \" + ld3);\n\
  } catch (DateTimeParseException ex){\n    System.out.println(\"无法解析: \" + ex);\n\
  }\n```\n\n以下是结果：\n\n```\n解析的日期: 2014-12-28\n解析的日期时间: 2014-12-28T08:44\n不同的解析器: 2014-12-28\n\
  自定义解析的日期: 2014-12-28\n```\n\n工作原理\n\nDate-Time API 的时间类包含一个 `parse()` 方法，可用于使用指定格式解析给定的输入字符串。默认情况下，`parse()`\
  \ 方法将基于目标对象的默认 `DateTimeFormatter` 进行格式化。例如，要解析字符串 `\"2014-01-01\"`，可以调用默认的 `LocalDate.parse()`\
  \ 方法。\n\n```java\nLocalDate date = LocalDate.parse(\"2014-01-01\");\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 4 章 数字与日期\n\n然而，可以将另一个 `DateTimeFormatter` 指定为 `parse()` 方法的第二个参数。`DateTimeFormatter`\
  \ 是一个用于格式化和打印日期和时间的最终类。它包含许多内置的格式化器，可以指定这些格式化器来将字符串强制转换为日期时间对象。例如，要基于标准 ISO_DATE\
  \ 格式（无偏移量）进行解析，请调用 `DateTimeFormatter.ISO_DATE`，如本技巧的解决方案所示。\n\n有关 `DateTimeFormatter`\
  \ 的更多信息，请参阅在线文档：[`docs.oracle.com/javase/8/docs/api/java/time/format/DateTimeFormatter.html`](http://docs.oracle.com/javase/8/docs/api/java/time/format/DateTimeFormatter.html)\n\
  \n通常，需要将文本字符串解析为日期时间对象。由于许多核心日期时间类都内置了 `parse()` 方法，此类任务变得非常简单。\n\n4-17. 格式化日期以进行显示\n\
  \n问题\n\n你的应用程序需要使用特定格式显示日期。你想定义该格式一次，并将其应用于所有需要显示的日期。\n\n解决方案 #1\n\n\n\n使用新的日期时间\
  \ API 中的 `DateTimeFormatter` 类，可以根据您想要的模式来格式化日期和时间。`DateTimeFormatter` 类包含一个 `ofPattern()`\
  \ 方法，该方法接受一个字符串模式参数来指定所需的格式。每个时间日期类都包含一个 `format()` 方法，该方法接受一个 `DateTimeFormatter`\
  \ 并返回目标日期时间对象的字符串格式。以下代码行演示了 `DateTimeFormatter` 的用法：\n\n```java\nDateTimeFormatter\
  \ dateFormatter = DateTimeFormatter.ofPattern(\"MMMM dd yyyy\");\nLocalDateTime\
  \ now = LocalDateTime.now();\n\nString output = now.format(dateFormatter);\n\nSystem.out.println(output);\n\
  \nDateTimeFormatter dateFormatter2 = DateTimeFormatter.ofPattern(\"MM/dd/YY HH:mm:ss\"\
  );\nString output2 = now.format(dateFormatter2);\n\nSystem.out.println(output2);\n\
  \nDateTimeFormatter dateFormatter3 = DateTimeFormatter.ofPattern(\"hh 'o''clock'\
  \ a, zzzz\");\nZonedDateTime zdt = ZonedDateTime.now();\n\nString output3 = zdt.format(dateFormatter3);\n\
  \nSystem.out.println(output3);\n```\n\n以下是输出结果：\n\n```\nDecember 28 2013\n12/28/13\
  \ 10:44:06\n10 o'clock AM, Central Standard Time\n```\n\n**解决方案 #2**\n\n使用 `java.util.Calendar`\
  \ 类获取所需的日期，然后使用 `java.text.SimpleDateFormat` 类格式化该日期。以下示例演示了 `SimpleDateFormat`\
  \ 类的用法：\n\n```java\n// 创建新的日历\nCalendar cal = Calendar.getInstance();\n\n// 使用模式创建\
  \ SimpleDateFormat 类的实例\nSimpleDateFormat dateFormatter1 = new SimpleDateFormat(\"\
  MMMMM dd yyyy\");\n\nString result = null;\nresult = dateFormatter1.format(cal.getTime());\n\
  System.out.println(result);\n\ndateFormatter1.applyPattern(\"MM/dd/YY hh:mm:ss\"\
  );\nresult = dateFormatter1.format(cal.getTime());\nSystem.out.println(result);\n\
  \ndateFormatter1.applyPattern(\"hh 'o''clock' a, zzzz\");\nresult = dateFormatter1.format(cal.getTime());\n\
  System.out.println(result);\n```\n\n运行此示例将产生以下结果：\n\n```\nJune 22 2011\n06/22/11\
  \ 06:24:41\n06 o'clock AM, Central Daylight Time\n```\n\n从结果可以看出，`DateTimeFormatter`\
  \ 和 `SimpleDateFormat` 类使得将日期转换为几乎任何格式变得容易。\n\n**工作原理**\n\n日期格式化是任何程序中的常见问题。人们希望在不同的情况下以特定的格式查看日期。Java\
  \ 语言包含几个方便的工具来正确格式化日期时间数据。具体来说，较新的 API 包含 `DateTimeFormatter` 类，而旧版本的 Java SE 包含\
  \ `SimpleDateFormat` 类，这两个类都可以在格式化过程中派上用场。\n\n`DateTimeFormatter` 类是一个 final 类，其主要目的是打印和格式化日期时间对象。要获得一个可以应用于对象的\
  \ `DateTimeFormatter`，请调用 `DateTimeFormatter.ofPattern()` 方法，并传入表示所需输出的字符串模式。表 4-8\
  \ 列出了可以在字符串模式中使用的不同模式字符。然后，可以通过调用对象的 `format()` 方法并将 `DateTimeFormatter` 作为参数传入，将生成的\
  \ `DateTimeFormatter` 应用于任何时间日期对象。结果将是根据指定模板模式格式化的日期时间对象。\n\n**表 4-8.** *模式字符*\n\
  \n**字符**\n\n**描述**\n\nG\n\n纪元\n\ny\n\n年份\n\nY\n\n周年份\n\nM\n\n年中的月份\n\n（*续*）\n\n\
  **表 4-8.** （*续*）\n\n**字符**\n\n**描述**\n\nw\n\n年中的周数\n\nW\n\n月中的周数\n\nD\n\n年中的天数\n\
  \nd\n\n月中的天数\n\nF\n\n月中的星期几\n\nE\n\n星期几的名称\n\nu\n\n星期几的数字表示\n\na\n\n上午/下午\n\nH\n\
  \n一天中的小时 (0–23)\n\nk\n\n一天中的小时 (1–24)\n\nK\n\n上午/下午的小时 (0–11)\n\nh\n\n上午/下午的小时 (1–12)\n\
  \nm\n\n小时中的分钟\n\ns\n\n分钟中的秒\n\nS\n\n毫秒\n\nz\n\n通用时区\n\nZ\n\nRFC 822 时区\n\nX\n\n\
  ISO 8601 时区\n\n`SimpleDateFormat` 类是在旧版 Java 中创建的，因此您无需对给定日期进行手动转换。\n\nN **注意**\
