  \n实现原理\n\n有时，将功能封装在单个类中非常重要。另一些时候，为仅在一个其他类中使用的功能单独创建一个类则没有意义。假设你正在开发一个图形用户界面，需要用一个类来支持某个按钮的功能。如果该按钮类中没有可复用的代码，那么创建一个单独的类并将该功能暴露给其他类使用就没有意义。相反，将该类封装在需要此功能的类内部才更合理。这种理念是内部类（也称为*嵌套类*）的一种用例。\n\
  \n内部类是指包含在另一个类内部的类。内部类可以像其他任何类一样被声明为 public、private 或 protected。它可以包含与普通类相同的功能；唯一的区别在于内部类包含在一个封闭类中，这个封闭类也被称为*外部类*。本范例的解决方案演示了这种技术。`TeamInner`\
  \ 类包含一个名为 `Player` 的内部类。`Player` 类是一个表示 Player 对象的 JavaBean 类。如你所见，Player 对象能够继承其包含类的功能，包括其私有字段。这是因为内部类包含对外部类的隐式引用。它也可以被包含它的\
  \ `TeamInner` 类访问，正如 `constructPlayer()` 方法中所演示的那样：\n\npublic Player constructPlayer(String\
  \ first, String last, String position, int status){\n\nPlayer player = new Player();\n\
  \nplayer.firstName = first;\n\nplayer.lastName = last;\n\nplayer.position = position;\n\
  \nplayer.status = status;\n\nreturn player;\n\n}\n\n外部类可以根据需要多次实例化内部类。在示例中，`constructPlayer()`\
  \ 方法可以被调用任意次数，每次都会实例化内部类的一个新实例。然而，当外部类被实例化时，并不会实例化内部类的任何实例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 5 章 面向对象的 Java**\n\n内部类可以通过引用外部类，然后引用它想要调用的方法来引用外部类的方法。以下代码行使用与本范例解决方案中相同的对象演示了这种引用。假设\
  \ `Player` 类需要从外部类获取球员列表，你可以编写类似如下的代码：\n\nTeamInner.this.getPlayerList();\n\n虽然不常用，但外部类以外的类可以通过以下语法访问公共内部类：\n\
  \nTeamInner outerClass = new TeamInner();\n\nouterClass.player = outerClass.new\
  \ Player();\n\n静态内部类则略有不同，因为它们不能直接引用其封闭类的任何实例变量或方法。以下是一个静态内部类的示例。\n\npublic class\
  \ StaticInnerExample {\n\nstatic String hello = \"Hello\";\n\npublic static void\
  \ sayHello(){\n\nSystem.out.println(hello);\n\n}\n\nstatic class InnerExample {\n\
  \nString goodBye = \"Good Bye\";\n\npublic void sayGoodBye(){\n\nSystem.out.println(this.goodBye);\n\
  \n}\n\n}\n\npublic static void main (String[] args){\n\nStaticInnerExample.sayHello();\n\
  \nStaticInnerExample.InnerExample inner =\n\nnew StaticInnerExample.InnerExample();\n\
  \ninner.sayGoodBye();\n\n}\n\n}\n\n内部类有助于提供逻辑封装。此外，它们允许继承私有字段，这是使用标准类无法实现的。\n\n\
  总结\n\nJava 是一种面向对象的语言。要充分利用该语言的能力，必须学会如何精通面向对象编程。本章涵盖了诸如类创建和访问修饰符等基础知识。还涵盖了封装、接口以及帮助开发者利用面向对象强大功能的范例。\n\
  \n最后，本章包含了关于 Java 8 新特性——默认方法的信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 6 章**\n\n**Lambda 表达式**\n\n在现有语言中，很少有新特性能够对生态系统产生重大影响。Java 语言的 Lambda 表达式就是这样一个重要的新特性，它将影响生态系统的许多方面。简单定义来说，*lambda\
  \ 表达式*是创建匿名函数的一种便捷方式。它们提供了一种使用表达式或语句序列创建单方法接口的简单方法。\n\nLambda 表达式建立在函数式接口之上，函数式接口是包含单个抽象方法的接口。\n\
  \n它们可以应用于许多不同的场景，从简单的匿名函数到集合的排序和过滤。此外，lambda 表达式可以赋值给变量，然后传递给其他对象。\n\n在本章中，你将学习如何创建\
  \ lambda 表达式，并会看到许多关于它们如何在常见场景中应用的示例。你还将学习如何生成 lambda 表达式的构建块，以便构建支持它们的应用程序。本章将深入探讨\
  \ `java.util.function` 包，该包包含大量 lambda 可以实现的实用函数式接口。最后，你将看到如何将某些类型的 lambda 表达式简化为方法引用，以获得更简洁的方式。\n\
  \n阅读本章后，你将能够看到 lambda 表达式对 Java 语言的影响。它们通过提高开发者的生产力并使语言现代化，并在许多领域开辟了新的可能性。Lambda\
  \ 表达式翻开了 Java 的新篇章，将这门语言带入了一个新的视角，与其他一些早已拥有类似结构的语言并驾齐驱。这些语言为 Java 语言中的 lambda 表达式铺平了道路，毫无疑问，lambda\
  \ 表达式也将为许多优雅的解决方案铺平道路。\n\n6-1\\. 编写一个简单的 Lambda 表达式\n\n问题\n\n你想要封装一段打印简单消息的功能。\n\
  \n解决方案\n\n编写一个 lambda 表达式，它接受一个包含你想要打印的消息的单一参数，并在 lambda 内部实现打印功能。在以下示例中，函数式接口 `HelloType`\
  \ 通过 lambda 表达式实现，并赋值给变量 `helloLambda`。最后，调用该 lambda，打印消息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 6 章 Lambda 表达式**\n\npublic class HelloLambda {\n\n/**\n\n* 函数式接口\n\n*/\n\n\
  public interface HelloType {\n\n/**\n\n* 将在 lambda 中实现的函数\n\n* @param text\n\n*/\n\
  \nvoid hello(String text);\n\n}\n\npublic static void main(String[] args){\n\n//\
  \ 创建 lambda，向 hello() 方法传递一个名为 \"text\" 的参数，返回字符串。该 lambda 被赋值给 helloLambda 变量。\n\
  \nHelloType helloLambda =\n\n(String text) -> {System.out.println(\"Hello \" + text);};\n\
  \n// 调用方法\n\nhelloLambda.hello(\"Lambda\");\n\n}\n\n}\n\n结果：\n\nHello Lambda\n\n\
  实现原理\n\n\n\nLambda 表达式是一种匿名代码块，用于封装一个表达式或一系列语句并返回结果。Lambda 表达式在其他一些语言中也称为*闭包*。它们可以接受零个或多个参数，其中任何参数都可以带或不带类型说明传递，因为类型可以从上下文中自动推导。虽然不使用\
  \ Lambda 表达式也能用 Java 语言编写代码，但它们是重要的补充，极大地提高了整体的可维护性、可读性和开发人员的工作效率。Lambda 表达式是 Java\
  \ 语言的一次演进式变革，是语言现代化进程中的又一步，有助于使其与其他语言保持同步。\n\nLambda 表达式的语法包括参数列表、一个称为“箭头标记”（->）的新语言字符以及一个主体。以下模型展示了\
  \ Lambda 表达式的结构：(参数列表) -> { 主体 }\n\nLambda 表达式的参数列表可以包含零个或多个参数。如果没有参数，则可以使用一对空括号。如果只有一个参数，则不需要括号。列表中的每个参数都可以包含可选的类型说明。如果省略了参数的类型，则类型将从当前上下文中推导得出。\n\
  \n在本方案的解决方案中，花括号包围了一个块的主体，该主体包含多个表达式。如果主体由单个表达式组成，则不需要花括号。解决方案中的花括号本可以省略，但为了便于阅读而保留。主体会被直接求值并返回。如果\
  \ Lambda 的主体是一个表达式而非语句，则隐式返回。相反，如果主体包含多个语句，则必须指定 return，它标志着将控制权返回给调用者。\n\n以下代码演示了一个不包含任何参数的\
  \ Lambda 表达式：\n`StringReturn msg = () -> \"This is a test\";`\n\n让我们看看这个 Lambda\
  \ 表达式是如何工作的。在上面的代码中，从 Lambda 表达式返回了一个 `StringReturn` 类型的对象。空括号表示没有参数传递给表达式。返回是隐式的，字符串\
  \ `\"This is a test\"` 从 Lambda 表达式返回给调用者。示例中的表达式被赋值给一个由 `msg` 标识的变量。假设函数式接口 `StringReturn`\
  \ 包含一个名为 `returnMessage()` 的抽象方法。在这种情况下，可以调用 `msg.returnMessage()` 方法来返回该字符串。\n\n\
  Lambda 表达式的主体可以包含普通方法可能包含的任何 Java 构造。例如，假设一个字符串作为参数传递给 Lambda 表达式，并且您希望根据该字符串参数返回某个值。以下\
  \ Lambda 表达式主体包含一个代码块，该代码块根据传递给表达式的参数的字符串值返回一个 `int`。\n\n```java\nActionCode code\
  \ = (codestr) -> {\n    switch(codestr){\n        case \"ACTIVE\": return 0;\n \
  \       case \"INACTIVE\": return 1;\n        default:\n            return -1;\n\
  \    }\n};\n```\n\n在这个例子中，`ActionCode` 函数式接口用于推断 Lambda 表达式的返回类型。为了澄清，让我们看看这个接口的样子。\n\
  \n```java\ninterface ActionCode{\n    int returnCode(String codestr);\n}\n```\n\n\
  这段代码表明 Lambda 表达式实现了在 `ActionCode` 接口中定义的 `returnCode` 方法。该方法接受一个字符串参数（`codestr`），该参数被传递给\
  \ Lambda 表达式，并返回一个 `int`。因此，从这个例子中可以看出，Lambda 可以封装一个方法体的功能。\n\n**注意** Lambda 表达式可以包含普通\
  \ Java 方法包含的任何语句。但是，`continue` 和 `break` 关键字在顶层是不允许的。\n\n### 6-2. 启用 Lambda 表达式的使用\n\
  \n#### 问题\n\n您有兴趣编写能够使用 Lambda 表达式的代码。\n\n#### 解决方案 1\n\n编写可以通过 Lambda 表达式实现的自定义函数式接口。所有\
  \ Lambda 表达式都实现一个函数式接口，即只有一个抽象方法定义的接口。以下代码行演示了一个包含一个方法定义的函数式接口。\n\n```java\ninterface\
  \ ReverseType {\n    String reverse(String text);\n}\n```\n\n该函数式接口包含一个单一的抽象方法定义，标识为\
  \ `String reverse(String text)`。\n\n以下包含 Lambda 表达式的代码演示了如何实现 `ReverseType`。\n\n\
  ```java\nReverseType newText = (testText) -> {\n    String tempStr = \"\";\n   \
  \ for (String part : testText.split(\" \")) {\n        tempStr = new StringBuilder(part).reverse().toString();\n\
  \    }\n    return tempStr;\n};\n```\n\n可以使用以下代码来调用该 Lambda 表达式：\n\n```java\nSystem.out.println(newText.reverse(\"\
  HELLO\"));\n```\n\n结果：\n```\nOLLEH\n```\n\n#### 解决方案 2\n\n使用 `java.util.function`\
  \ 包中包含的函数式接口来实现适合应用程序需求的 Lambda 表达式。以下示例使用 `Function<T,R>` 接口执行与解决方案 1 中相同的任务。此示例接受一个字符串参数并返回一个字符串结果。\n\
  \n```java\nFunction<String,String> newText2 = (testText) -> {\n    String tempStr\
  \ = \"\";\n    for (String part : testText.split(\" \")) {\n        tempStr = new\
  \ StringBuilder(part).reverse().toString();\n    }\n    return tempStr;\n};\n```\n\
  \n此 Lambda 表达式被赋值给变量 `newText2`，其类型为 `Function<String,String>`。因此，一个字符串作为参数传递，并且\
  \ Lambda 表达式将返回一个字符串。`Function<T,R>` 函数式接口包含一个名为 `apply()` 的抽象方法声明。要调用此 Lambda 表达式，请使用以下语法：\n\
  \n```java\nSystem.out.println(newText2.apply(\"WORLD\"));\n```\n\n结果：\n```\nDLROW\n\
  ```\n\n#### 工作原理\n\nLambda 表达式的一个基本构建块是函数式接口。*函数式接口*是一个标准的 Java 接口，它只包含一个抽象方法声明，并为\
  \ Lambda 表达式和方法引用提供目标类型。函数式接口也可以包含默认方法实现，但只能有一个抽象声明。然后，抽象方法由 Lambda 表达式隐式实现。因此，Lambda\
  \ 表达式可以赋值给与函数式接口相同类型的变量。稍后可以从该赋值变量调用该方法，从而调用 Lambda 表达式。遵循此模式，Lambda 表达式是可以按名称调用的方法实现。它们也可以作为参数传递给其他方法（参见配方\
  \ 6-8）。\n\n**注意** 解决方案 1 中的函数式接口包含 `@FunctionalInterface` 注解。这可以放在函数式接口上以捕获编译器级别的错误，但它对接口本身没有影响。\n\
  \n此时您可能想知道，是否需要对每个可能适合与 Lambda 表达式一起使用的情况都开发一个函数式接口。情况并非如此，因为已经存在许多函数式接口。一些示例包括\
  \ `java.lang.Runnable`、`javafx.event.EventHandler` 和 `java.util.`。\n\n\n\n比较器（Comparator）。本章中的其他一些示例使用了实现这些接口的\
  \ lambda 表达式。然而，还有许多更通用的函数式接口，可以根据特定需求进行定制。`java.util.function` 包中包含了许多在实现 lambda\
  \ 表达式时非常有用的函数式接口。该包中的函数式接口在 JDK 中被广泛使用，也可以在开发者应用程序中使用。表 6-1\n\n列出了 `java.util.function`\
  \ 包中包含的函数式接口及其描述。请注意，`Predicate` 测试会返回一个布尔值。\n\n**表 6-1.** *java.util.function 中包含的函数式接口*\n\
