  \ 函数。当 `alert()` 函数被调用时，网页的所属父级（即 `webView` 的 `WebEngine` 实例）会通过 `WebEngine` 的 `OnAlert`\
  \ 属性收到警报通知。为了响应 JavaScript 的警报，添加了一个事件处理器（lambda 表达式）。它负责响应 `WebEvent` 对象。`handle()`\
  \ 方法通过切换 `warningMessage` 节点（javafx.\n\n\n`scene.text.Text`。以下代码片段根据事件数据（`evt.getData()`）中是否包含从\
