  \ 和 FXML*\n\n工作原理\n\n解决方案 1 演示了如何使用标准 Java 代码将字体应用于文本。基于矢量的图形允许您缩放形状并应用效果，而不会出现像素化（锯齿）问题。JavaFX\
  \ 节点使用基于矢量的图形。在每个 Text 节点中，您可以创建并设置要渲染到场景图上的字体。以下是在 Text 节点上创建和设置字体的代码：\n\n```java\n\
  Text java8Recipes2 = new Text(50, 50, \"Java 8 Recipes\");\n\nFont serif = Font.font(\"\
