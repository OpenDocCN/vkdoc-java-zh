  \ 在本示例中，`j.u.c.l` 代表 `java.util.concurrent.locks`，`aqs` 代表 `AbstractQueuedSynchronizer`。\n\
  \n**工作原理**\n\nJStack 允许您查看当前正在运行的线程的所有堆栈跟踪。JStack 还会尝试查找可能导致系统停滞的*死锁*（锁的循环依赖）。JStack\
  \ 不会发现其他问题，例如*活锁*（线程始终在自旋，例如使用 `while(true)` 之类的情况）或*饥饿*（线程因优先级过低或竞争资源的线程过多而无法执行），但它将帮助您了解程序中每个线程正在执行的操作。\n\
  \n死锁的发生是因为一个线程正在等待另一个线程持有的资源，而第二个线程正在等待第一个线程持有的资源。在这种情况下，两个线程都无法继续，因为都在等待对方释放各自拥有的资源。死锁不仅可能发生在两个线程之间，还可能涉及一个线程“链”，例如线程\
  \ A 等待线程 B，线程 B 等待线程 C，线程 C 等待线程 D，而线程 D 又等待最初的线程 A。理解转储以找出罪魁祸首资源至关重要。\n\n\n\n在本示例中，Thread-0\
  \ 想要获取名为 `0x00000000eab716b8` 的锁；在线程转储中，它被描述为“等待可拥有的同步器”。Thread-0 无法获取该锁，因为它被主线程持有。另一方面，主线程想要获取锁\
  \ `0x00000000eab716e8`（注意这两个锁不同；第一个锁以 b8 结尾，而第二个以 e8 结尾），而该锁被 Thread-0 持有。这是教科书式的死锁定义，每个线程都在永远等待对方释放自己持有的锁。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 调试与单元测试\n\n除了死锁之外，查看线程转储还能让你了解程序在实时运行时的状态。\n\
  \n尤其是在多线程系统中，使用线程转储有助于明确线程在何处休眠，或者它在等待什么条件。\n\n**注意** JStack 通常足够轻量，可以在生产系统中运行，因此如果你需要排查线上问题，可以放心使用\
  \ JStack。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 12 章**\n\n\
  **Unicode、国际化**\n\n**与货币代码**\n\nJava 平台提供了丰富的国际化功能，帮助你创建可在全球范围内使用的应用程序。该平台提供了本地化应用、以多种符合文化习惯的格式格式化日期和数字，以及显示数十种书写系统中字符的方法。\n\
  \n本章仅描述开发人员在开发国际化应用程序时必须执行的一些最常见和常规的任务。由于 Java 语言在其对语言和区域的抽象方面增加了新特性，本章将介绍一些你可能使用\
  \ `Locale` 类的新方法。\n\n其他新特性对开发者来说是透明的，例如为遵循更新的 Unicode 标准而进行的更新，但这些更新提供了兼容性，使得 JDK\
  \ 8 在未来几年内仍能保持相关性。Java 8 包含对 Unicode 6.2.0 的支持，该版本新增了 733 个字符、7 种新文字和 11 个新区块。\n\
