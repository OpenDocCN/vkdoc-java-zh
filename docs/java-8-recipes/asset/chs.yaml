  \n工作原理\n\n要创建视频播放器，你需要参照配方 16-1 中的示例来构建应用程序，并复用相同的应用功能，例如拖放文件、媒体按钮控件等。为清晰起见，我对上一个配方进行了调整，将大部分\
  \ UI 代码移入便捷函数中，这样你就能专注于媒体 API 的学习，而不会在 UI 代码中迷失方向。本章后续的配方均基于此配方创建的 JavaFX 基础媒体播放器添加简单功能。因此，后续配方中的代码片段将较为简短，仅包含每个新功能所需的必要代码。\n\
  \n需要注意的是，JavaFX 媒体播放器支持多种媒体格式。支持的格式如下：\n\nu AIFF\n\nu FXM、FLV\n\nu HLS (*)\n\nu\
  \ MP3\n\nu MP4\n\nu WAV\n\n有关支持媒体类型的完整摘要，请参阅在线文档：\n\n[`docs.oracle.com/javase/8/javafx/api/javafx/scene/media/package-summary.html.`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/media/package-summary.html)\n\
  \n与上一个配方中创建的音频播放器一样，JavaFX 基础视频播放器也具备相同的基本媒体控件，包括停止、暂停和播放。除了这些基本控件外，你还添加了新的功能，例如进度跳转和全屏模式。\n\
  \n播放视频时，你需要一个视图区域（javafx.scene.media.MediaView）来显示视频。你还需要创建一个滑块控件来监控视频的播放进度，该控件位于图\
  \ 16-3 所示应用程序的左下角。滑块控件允许用户在视频中向前或向后跳转。最后一个额外功能是，通过双击应用程序窗口即可让视频进入全屏模式。要恢复窗口，用户可再次双击或按下\
  \ Escape 键。\n\n为了快速上手，我们直接进入代码部分。在 `start()` 方法中设置舞台后，通过调用 `createBackground()`\
  \ 方法（applicationArea）创建一个黑色半透明背景。接着，调用 `attachMouseEvents()` 方法来设置事件处理器，以便用户能够在桌面上拖动应用程序窗口。另一个要附加到场景的事件处理器将允许用户切换到全屏模式。使用条件判断来检测应用程序窗口中的双击操作，以调用全屏模式。一旦检测到双击，就会调用舞台的\
  \ `setFullScreen()` 方法，并传入与当前设置值相反的布尔值。以下是实现窗口全屏模式所需的代码：\n\n// 全屏切换\n\nscene.setOnMouseClicked((MouseEvent\
