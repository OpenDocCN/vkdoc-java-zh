  \ 4-8 显示了可以在模式中使用的不同字符。\n\n任何模式字符都可以放在一个字符串中，然后传递给 `SimpleDateFormat` 类。\n\n如果在实例化类时没有传递模式，则可以在以后使用类的\
  \ `applyPattern()` 方法应用该模式。当您想要更改已实例化的 `SimpleDateFormat` 对象的模式时，`applyPattern()`\
  \ 方法也很方便，如本配方的解决方案所示。以下代码片段演示了模式的应用：\n\n```java\nSimpleDateFormat dateFormatter1\
