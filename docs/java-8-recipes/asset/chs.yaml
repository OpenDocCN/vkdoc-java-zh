  \n第 15 章 使用 JavaFX 进行图形编程\n\n**图 15-6.** *路径过渡*\n\n工作原理\n\n在本配方中，您将创建一个简单的应用程序，使对象能够跟随场景图上绘制的路径运动。为简化操作，示例使用了一个形状（圆形）来执行路径过渡（javafx.animation.PathTransition）。\n\
  \n应用程序用户将像使用绘图程序一样，通过按下鼠标按钮在场景表面绘制路径。\n\n当用户对绘制的路径满意后，释放鼠标按键，这将触发红色球体沿路径运动，类似于建筑物内物体在管道中移动。\n\
  \n首先，您需要创建两个实例变量来维护构成路径的坐标。为了保存正在绘制的路径，创建一个 javafx.scene.shape.Path 对象的实例。该路径实例应在应用程序启动前添加到场景图中。以下是将实例变量\
  \ onePath 添加到场景图的过程：\n\n// 添加路径\n\nroot.getChildren().add(onePath);\n\n\n\n接下来，创建一个实例变量\
  \ `anchorPt`（`javafx.geometry.Point2D` 类型），用于保存路径的起始点。稍后你将看到这些变量如何根据鼠标事件进行更新。此处展示的是维护当前绘制路径的实例变量：\n\
  \n```java\nPath onePath = new Path();\nPoint2D anchorPt;\n```\n\n首先，创建一个将要被动画化的形状。在本场景中，你将创建一个炫酷的红色球体。为了创建具有球体外观的球，需要创建一个渐变颜色\
  \ `RadialGradient`，用于绘制或填充圆形形状。（关于如何使用渐变填充形状，请参考配方 15-6。）创建好红色球体后，你需要创建 `PathTransition`\
  \ 对象来执行沿路径运动的动画。实例化 `PathTransition()` 对象后，只需将持续时间设置为四秒，循环次数设置为一。循环次数是指动画循环发生的次数。接下来，将节点设置为引用红色球体（sphere）。然后，将\
  \ `path()` 方法设置为实例变量 `onePath`，该变量包含了构成绘制路径的所有坐标和线条。为球体设置好动画路径后，应指定形状如何沿路径运动，例如垂直于路径上的切点。以下代码创建了一个路径过渡的实例：\n\
  \n```java\n// 让球体沿路径运动\nfinal PathTransition pathTransition = new PathTransition();\n\
  pathTransition.setDuration(Duration.millis(4000));\npathTransition.setCycleCount(1);\n\
  pathTransition.setNode(sphere);\npathTransition.setPath(onePath);\npathTransition.setOrientation(PathTransition.OrientationType.ORTHOGONAL_TO_TANGENT);\n\
  ```\n\n创建路径过渡后，你希望在动画完成时进行清理。为了在动画结束时重置或清理路径变量，需要创建并添加一个事件处理器，用于监听路径过渡对象上的 `onFinished`\
  \ 属性事件。\n\n以下代码片段添加了一个事件处理器来清除当前路径信息：\n\n```java\n// 完成后清除路径\npathTransition.onFinishedProperty().set((EventHandler<ActionEvent>)\n\
  \    (ActionEvent event) -> {\n        onePath.getElements().clear();\n    });\n\
  ```\n\n形状和过渡设置完毕后，应用程序需要响应鼠标事件，这些事件将更新前面提到的实例变量。为此，需要监听 `Scene` 对象上发生的鼠标事件。这里，你将再次依赖创建事件处理器，并将其设置到场景的\
  \ `onMouseXXXProperty` 方法上，其中 `XXX` 表示实际的鼠标事件名称，例如 `pressed`、`dragged` 和 `released`。\n\
  \n当用户绘制路径时，他会执行鼠标按下事件来开始路径的绘制。要监听鼠标按下事件，需要创建一个形式类型参数为 `MouseEvent` 的事件处理器。在示例中，使用了\
  \ lambda 表达式。当鼠标按下事件发生时，清除实例变量 `onePath` 中任何先前绘制的路径信息。接着，只需设置路径的描边宽度和颜色，以便用户能看到正在绘制的路径。最后，使用\
  \ `MoveTo` 对象的实例将起始点添加到路径中。以下是用户执行鼠标按下时响应的处理器代码：\n\n```java\n// 开始初始路径\nscene.onMousePressedProperty().set((EventHandler<MouseEvent>)\n\
  \    (MouseEvent event) -> {\n        onePath.getElements().clear();\n        //\
  \ 路径中的起始点\n        anchorPt = new Point2D(event.getX(), event.getY());\n       \
  \ onePath.setStrokeWidth(3);\n        onePath.setStroke(Color.BLACK);\n        onePath.getElements().add(new\
  \ MoveTo(anchorPt.getX(), anchorPt.getY()));\n    });\n```\n\n鼠标按下事件处理器就位后，你需要为鼠标拖动事件创建另一个处理器。再次查找场景中与你关心的鼠标事件相对应的\
  \ `onMouseXXXProperty()` 方法。在本例中，将设置 `onMouseDraggedProperty()`。在 lambda 表达式内部，获取鼠标坐标，该坐标将用于更新路径。426\n\
  \n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 JavaFX 图形\n\n这些点将被转换为`LineTo`对象，并添加到路径（`Path`）中。这些`LineTo`对象是路径元素（`javafx.scene.shape.PathElement`）的实例，如配方\
  \ 15-5 所述。以下代码是负责鼠标拖拽事件的事件处理器：\n\n// 拖拽操作会创建 LineTo 对象并添加到路径中\n\nscene.onMouseDraggedProperty().set((EventHandler<MouseEvent>)\n\
  \n(MouseEvent event) -> {\n\nonePath.getElements().add(new LineTo(event.getX(),\
