  \n脚本\n\n自 Java 1.6 发布以来，Java 平台就支持嵌入和/或执行 JavaScript 文件，当时的 JavaScript 引擎是 Rhino。Rhino\
  \ 引擎多年来一直为我们提供良好的服务，但现在一个名为 *Nashorn* 的更新版 JavaScript 引擎已经登场。Nashorn 引擎带来了许多更新，包括支持\
  \ ECMAScript-262 第 5.1 版语言规范、一个用于交互式解释或执行 JavaScript 文件的新命令行工具，以及对 JavaFX 8 API\
  \ 的完全访问权限。\n\n本章提供了一些使用 Nashorn 入门的示例。更多信息请参见第 18 章，该章专门介绍这个新的 JavaScript 引擎。\n\n\
  2-12. 在 Java 应用程序中嵌入 JavaScript\n\n问题\n\n你想利用 JavaScript 来实现 Java 应用程序的一部分功能。\n\n\
  解决方案\n\n利用 Nashorn 引擎将 JavaScript 嵌入到 Java 应用程序中。以下示例通过执行一个 Nashorn `ScriptEngine`\
  \ 来执行内联 JavaScript。\n\n`public class Recipe02_12 {`\n\n`public static void loadInlineJs()\
  \ {`\n\n`ScriptEngineManager sem = new ScriptEngineManager();`\n\n`ScriptEngine\
  \ nashorn = sem.getEngineByName(\"nashorn\");`\n\n`try {`\n\n`nashorn.eval(\"print('This\
  \ is being printed with JavaScript');\");`\n\n`} catch (ScriptException ex) {`\n\
  \n`Logger.getLogger(Recipe02_12.class.getName()).log(Level.SEVERE, null, ex);`\n\
  \n`}`\n\n`}`\n\n`public static void main(String[] main) {`\n\n`loadInlineJs();`\n\
  \n`}`\n\n`}`\n\n工作原理\n\nNashorn 是 Java 8 中包含的一个新 JavaScript 引擎。要在 Java 应用程序中执行 JavaScript，需要调用\
  \ Nashorn 引擎的一个实例，并向其传递内联或外部的 JavaScript。在本配方中，通过调用 `ScriptEngineManager` 并传递 `\"\
  nashorn\"` 作为参数来获取 Nashorn 引擎。获取 Nashorn 引擎后，就可以通过调用引擎的 `eval()` 方法来调用 JavaScript\
  \ 文件或评估内联的 JavaScript 代码。在本示例中，向引擎传递了一个 JavaScript 的 `print()` 语句。\n\n有关使用新 Nashorn\
  \ 引擎的更多信息，请参考第 18 章。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 2\
  \ 章  Java 8 的新特性\n\n2-13. 从命令行执行 JavaScript\n\n问题\n\n你想通过命令行执行 JavaScript。\n\n解决方案\n\
  \n调用 `jjs` 工具，该工具是 Java 8 的一部分。要执行一个 JavaScript 文件，从命令行调用 `jjs` 工具，然后传递要执行的 JavaScript\
