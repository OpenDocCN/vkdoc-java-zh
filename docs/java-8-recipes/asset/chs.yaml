  \ hh:mm:ss\");\n```\n\n一旦将模式应用于 `SimpleDateFormat` 对象，就可以将表示时间的 long 值传递给 `SimpleDateFormat`\
  \ 对象的 `format()` 方法。`format()` 方法将返回使用所应用模式格式化的给定日期/时间。然后，可以根据应用程序的需要使用基于字符串的结果。\n\
  \n**4-18. 编写可读的数字字面量**\n\n**问题**\n\n应用程序中的某些数字字面量相当长，您希望更容易一眼看出数字有多大。\n\n**解决方案**\n\
  \n在较大的数字中使用下划线代替逗号或小数点，以使其更具可读性。以下代码展示了一些示例，通过使用下划线代替逗号来使数字字面量更具可读性：\n\n```java\n\
  int million = 1_000_000;\nint billion = 1_000_000_000;\nfloat ten_pct = 1_0f;\n\
  double exp = 1_234_56.78_9e2;\n```\n\n**工作原理**\n\n有时处理大数字会变得繁琐且难以阅读。由于 Java SE7\
  \ 的发布，现在可以在数字字面量中使用下划线，以使代码更易于阅读。下划线可以出现在数字字面量中数字之间的任何位置。这允许使用下划线代替逗号或空格来分隔数字，使其更易于阅读。\n\
  \nN **注意** 下划线不能放在数字的开头或结尾、小数点或浮点字面量旁边、F 或 L 后缀之前，或者期望数字字符串的位置。\n\n**4-19. 声明二进制字面量**\n\
  \n**问题**\n\n您正在开发一个需要声明二进制数的应用程序。\n\n**解决方案**\n\n使用二进制字面量使代码可读。以下代码段演示了二进制字面量的使用：\n\
  \n```java\nint bin1 = 0b1100;\nshort bin2 = 0B010101;\nshort bin3 = (short) 0b1001100110011001;\n\
  \nSystem.out.println(bin1);\nSystem.out.println(bin2);\nSystem.out.println(bin3);\n\
  ```\n\n这将产生以下输出：\n\n```\n12\n21\n-26215\n```\n\n**工作原理**\n\n二进制字面量从 JDK 7 开始成为 Java\
  \ 语言的一部分。`byte`、`short`、`int` 和 `long` 类型可以使用二进制数字系统表示。此功能有助于使二进制数在代码中更易于识别。\n\n\
  要使用二进制格式，只需在数字前加上 `0b` 或 `0B` 前缀。\n\n**总结**\n\n\n\n数字和日期在大多数应用程序中扮演着不可或缺的角色。Java\
  \ 语言提供了大量类，可用于处理不同类型的数字，并将其格式化为适合大多数场景的形式。本章回顾了一些可用于数字舍入、格式化以及生成随机值的技术。Java 8 版本引入了一个全新的日期和时间包，为获取和处理日期提供了一个清新且易于使用的\
  \ API。本章涵盖了新日期和时间包的基础知识，更多内容请[在线查阅：http://docs.oracle.com/javase/tutorial/datetime/](http://docs.oracle.com/javase/tutorial/datetime/)。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 5 章**\n\n**面向对象的 Java**\n\
  \n自应用程序开发初期以来，编程语言已经发生了巨大的变化。在过去，过程式语言是最先进的；事实上，至今仍有数千个 COBOL 应用程序在使用。随着时间的推移，编码变得更加高效，重用、封装、抽象以及其他面向对象的特性成为了应用程序开发的关键基础。随着语言的演进，它们开始融入在程序中使用对象的概念。Lisp\
  \ 语言早在 20 世纪 70 年代就引入了一些面向对象的技术，但真正的面向对象编程直到 20 世纪 90 年代才全面兴起。\n\n面向对象的程序由许多不同的代码片段组成，它们协同工作。面向对象的理念不是编写一个包含长串语句和命令的程序，而是将功能分解为独立的、有组织的对象。诸如使用方法封装功能以及重用另一个类的功能等编程技术开始流行起来，因为人们注意到面向对象等同于生产力。\n\
  \n在本章中，我们将探讨 Java 语言的一些关键面向对象特性。从涵盖访问修饰符的基础方案，到涉及内部类的高级方案，本章包含的方案将帮助你理解 Java 的面向对象方法论。\n\
  \n5-1. 控制对类成员的访问\n\n问题\n\n你想要创建一些无法从任何其他类访问的类成员。\n\n解决方案\n\n创建私有实例成员，而不是让它们对其他类可用（public\
  \ 或 protected）。例如，假设你正在创建一个用于管理运动队队员的应用程序。你创建了一个名为 Player 的类，用于表示队伍中的一名队员。你不希望该类的字段能被任何其他类访问。以下代码演示了如何声明一些实例成员，使其仅能在定义它们的类内部访问。\n\
  \nprivate String firstName = null;\n\nprivate String lastName = null;\n\nprivate\
  \ String position = null;\n\nprivate int status = -1;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章 面向对象的 Java\n\n工作原理\n\n要将类成员指定为 private，请在其声明或签名前加上 private 关键字。private 访问修饰符用于隐藏类的成员，使得外部类无法访问它们。任何标记为\
  \ private 的类成员仅对同一类的其他成员可用。任何外部类都无法访问被指定为 private 的字段或方法，使用代码补全功能的 IDE 也无法看到它们。\n\
  \n如本方案解决方案中所述，声明类成员时可以使用三种不同的访问修饰符。这些修饰符是 public、protected 和 private。声明为 public\
  \ 的成员对任何其他类都可用。声明为 protected 的成员对同一包内的任何其他类都可用。最好只将那些需要从其他类直接访问的类成员声明为 public 或\
  \ protected。使用 private 访问修饰符隐藏类成员有助于强化更好的面向对象设计。\n\n5-2. 使私有字段可被其他类访问\n\n问题\n\n\
  你希望创建私有实例成员，以便外部类无法直接访问它们。然而，你也希望这些私有成员能够通过受控的方法被访问。\n\n解决方案\n\n通过为私有字段创建 getter\
  \ 和 setter 方法来封装它们。以下代码演示了如何声明一个私有字段，然后提供访问器（getter）和修改器（setter）方法，外部类可以使用这些方法来获取或设置该字段的值：\n\
  \nprivate String firstName = null;\n\n/**\n\n* @return the firstName\n\n*/\n\npublic\
  \ String getFirstName() {\n\nreturn firstName;\n\n}\n\n/**\n\n* @param firstName\
  \ the firstName to set\n\n*/\n\npublic void setFirstName(String firstName) {\n\n\
  this.firstName = firstName;\n\n}\n\n外部类可以使用 getFirstName() 方法来获取 firstName 字段的值。同样，外部类可以使用\
  \ setFirstName(String firstName) 方法来设置 firstName 字段的值。\n\n工作原理\n\n通常，当类中的字段被标记为\
  \ private 时，为了设置或获取它们的值，仍然需要让外部类能够访问它们。那么为什么不直接使用这些字段并将它们设为 public 呢？直接使用其他类的字段并不是良好的编程实践，因为通过使用访问器（getter）和修改器（setter），可以以受控的方式授予访问权限。不直接针对另一个类的成员进行编码，也能解耦代码，这有助于确保如果一个对象发生变化，依赖它的其他对象不会受到不利影响。从本方案解决方案中的示例可以看出，隐藏字段并使用公共方法来访问这些字段相当简单。只需创建两个方法：一个用于获取私有字段的值，即“getter”或访问器方法；另一个用于设置私有字段的值，即“setter”或修改器方法。在本方案的解决方案中，getter\
  \ 用于返回私有字段中包含的未经修改的值。类似地，setter 通过接受一个与私有字段数据类型相同的参数，然后将私有字段的值设置为该参数的值，从而设置私有字段的值。\n\
  \n使用 getter 或 setter 来访问字段的类并不了解这些方法背后的任何细节。\n\n此外，这些方法的细节可以更改，而无需修改任何访问它们的代码。\n\
  \n**注意** 使用 getter 和 setter 并不能完全解耦代码。事实上，许多人认为使用 getter 和 setter 并非良好的编程实践，原因就在于此。使用访问器方法的对象仍然需要知道它们正在操作的实例字段的类型。尽管如此，getter\
  \ 和 setter 是向外部提供对对象私有实例字段访问的标准技术。为了以更面向对象的方式使用访问器方法，可以在接口中声明它们，并针对接口而非对象本身进行编码。\n\
  \n有关接口的更多信息，请参考方案 5-6。\n\n5-3. 创建只有一个实例的类\n\n问题\n\n\n\n你可能希望创建一个在整个应用中仅能存在一个实例的类，以便所有应用用户都能与该类的同一个实例进行交互。\n\
