  \n**第 8 章**\n\n**输入与输出**\n\n在应用程序中，经常需要获取并操作 I/O 终端。在当今的操作系统中，这通常意味着文件访问和网络连接。在之前的版本中，为了保持通用兼容性，Java\
  \ 在采用良好的文件和网络框架方面进展缓慢。秉承其“一次编写，随处读取”的核心理念，许多原始的文件 I/O 和网络连接功能必须保持简单和通用。自 Java 7\
  \ 发布以来，开发者们已经开始利用更优秀的 I/O API。\n\n多年来，文件和网络 I/O 已经发展成为一个更完善的框架，用于处理文件、网络可扩展性和易用性。自网络输入输出版本\
  \ 2 API（NIO.2）起，Java 具备了监控文件夹、访问操作系统相关方法以及创建可扩展的异步网络套接字的能力。这是对已经非常强大的用于处理输入输出流以及序列化（和反序列化）对象信息的库的补充。\n\
  \n在本章中，我们将介绍一些演示不同输入输出过程的方案。你将学习文件的序列化、通过网络发送文件、文件操作以及更多内容。阅读完本章的方案后，你将具备开发包含复杂输入输出任务的应用程序的能力。\n\
  \n**流与装饰器模式**\n\nI/O 流是大多数 Java I/O 的基础，包含了大量适用于各种场景的现成流，但如果不提供一些上下文，它们的使用会非常令人困惑。流（如同河流）代表了数据的流入/流出。可以这样理解：当你打字时，你创建了一个系统接收的字符流（输入流）。当系统产生声音时，它会将声音发送到扬声器（输出流）。\n\
  \n系统可能整天都在接收按键输入并发送声音，因此流要么在处理数据，要么在等待更多数据。\n\n当流没有接收到任何数据时，它会等待（没有其他事情可做，对吧？）。一旦数据进入，流就开始处理这些数据。然后流会停止并等待下一个数据项的到来。这个过程会一直持续，直到这条“河流”干涸（流被关闭）。\n\
  \n如同河流一样，流可以相互连接（这就是装饰器模式）。就本章内容而言，你主要关心两个输入流。一个是文件输入流，另一个是网络套接字输入流。这两个流是你 I/O 程序的数据源。同时也有它们对应的输出流：文件输出流和网络套接字输出流（这个名字是不是很有创意？）。\n\
  \n就像水管工一样，你可以将它们连接起来，创造出新的东西。例如，你可以将文件输入流连接到网络输出流，以便通过网络套接字发送文件内容。或者，你可以反过来，将网络输入流（传入的数据）连接到文件输出流（将数据写入磁盘）。在\
  \ I/O 术语中，输入流被称为源（source），而输出流被称为汇（sink）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 8 章 输入与输出\n\n还有其他可以拼接在一起的输入和输出流。例如，`BufferedInputStream` 允许你分块读取数据（这比逐字节读取更高效），而\
  \ `DataOutputStream` 允许你将 Java 基本类型写入输出流（而不仅仅是写入字节）。最有用的流之一是 `ObjectInputStream`\
  \ 和 `ObjectOutputStream` 这对组合，它们允许你序列化/反序列化对象（本章中有一个相关的方案）。\n\n装饰器模式允许你不断地将流拼接在一起，以获得多种不同的效果。这种设计的美妙之处在于，你实际上可以创建一个流，它能够接收任何输入并产生任何输出，然后可以与其他任何流组合在一起。\n\
  \n**8-1. 序列化 Java 对象**\n\n问题\n\n你需要序列化一个类（保存类的内容），以便以后能够恢复它。\n\n解决方案\n\nJava 实现了一个内置的序列化机制。你可以通过\
  \ `ObjectOutputStream` 类来访问该机制。\n\n在下面的示例中，`saveSettings()` 方法使用 `ObjectOutputStream`\
  \ 来序列化 settings 对象，为将对象写入磁盘做准备：\n\n```java\npublic class Ch_8_1_SerializeExample\
  \ {\n\n    public static void main(String[] args) {\n        Ch_8_1_SerializeExample\
  \ example = new Ch_8_1_SerializeExample();\n        example.start();\n    }\n\n\
  \    private void start() {\n        ProgramSettings settings = new ProgramSettings(\n\
  \            new Point(10,10),\n            new Dimension(300,200),\n          \
  \  Color.blue,\n            \"The title of the application\"\n        );\n     \
  \   saveSettings(settings,\"settings.bin\");\n        ProgramSettings loadedSettings\
  \ = loadSettings(\"settings.bin\");\n        System.out.println(\"Are settings are\
  \ equal? :\"+loadedSettings.equals(settings));\n    }\n\n    private void saveSettings(ProgramSettings\
  \ settings, String filename) {\n        try {\n            FileOutputStream fos\
  \ = new FileOutputStream(filename);\n            try (ObjectOutputStream oos = new\
  \ ObjectOutputStream(fos)) {\n                oos.writeObject(settings);\n     \
  \       }\n        } catch (IOException e) {\n            e.printStackTrace();\n\
  \        }\n    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第\
  \ 8 章 输入与输出\n\n```java\n    private ProgramSettings loadSettings(String filename)\
  \ {\n        try {\n            FileInputStream fis = new FileInputStream(filename);\n\
  \            ObjectInputStream ois = new ObjectInputStream(fis);\n            return\
  \ (ProgramSettings) ois.readObject();\n        } catch (IOException | ClassNotFoundException\
  \ e) {\n            e.printStackTrace();\n        }\n        return null;\n    }\n\
  }\n```\n\n**工作原理**\n\nJava 支持*序列化*，即获取一个对象并创建其字节表示形式的能力，该字节表示可用于以后恢复对象。通过使用内部序列化机制，序列化对象的大部分设置工作都已处理完毕。Java\
  \ 会将对象的属性转换为字节流，然后可以将其保存到文件或通过网络传输。\n\n\n\nN **注意** 原始的 Java 序列化框架使用反射来序列化对象，因此如果频繁进行序列化/反序列化操作，可能会成为问题。有许多开源框架提供了不同的权衡方案，具体取决于你的需求（速度与大小与易用性之间的权衡）。[参见\
  \ https://github.com/eishay/jvm-serializers/wiki/。](https://github.com/eishay/jvm-serializers/wiki/)\n\
  \n要使一个类可序列化，它需要实现 `Serializable` 接口，这是一个*标记接口*：它没有任何方法，而是告诉序列化机制，你已经允许该类具备被序列化的能力。虽然一开始并不明显，但序列化会暴露你类的所有内部工作细节（包括受保护和私有成员），因此，如果你想对核弹发射的授权代码保密，你可能希望任何包含此类信息的类都不可序列化。\n\
  \n同样必要的是，类的所有属性（也称为成员、变量或字段）都必须是可序列化的（和/或 `transient` 的，我们稍后会讲到）。所有基本类型——`int`、`long`、`double`\
  \ 和 `float`（以及它们的包装类）——以及 `String` 类，在设计上都是可序列化的。其他 Java 类则根据具体情况决定是否可序列化。\n\n例如，你不能序列化任何\
  \ Swing 组件（如 `JButton` 或 `JSpinner`），也不能序列化 `File` 对象，但你可以序列化 `Color` 类（更准确地说是 `awt.color`）。\n\
  \n作为设计原则，你不应该序列化你的主类，而应该创建只包含你想要序列化的属性的类。这将省去很多调试上的麻烦，因为序列化会变得非常具有渗透性。如果你将一个主类标记为可序列化（`implements\
  \ Serializable`），并且这个类包含许多其他属性，你需要将这些类也声明为可序列化。如果你的 Java 类继承自另一个类，父类也必须可序列化。这样一来，你会发现那些本不该被序列化的类也被标记为了可序列化。\n\
  \n如果你想将一个属性标记为不可序列化，可以将其标记为 *transient*。`transient` 属性告诉 Java 编译器，你对保存/加载该属性值不感兴趣，因此它会被忽略。某些属性是作为\
  \ `transient` 的合适候选，例如缓存的计算结果，或者你总是实例化为相同值的日期格式化器。\n\n根据序列化框架的特性，静态属性是不可序列化的；静态类也是如此。原因在于静态类无法被实例化。因此，如果你同时保存并加载一个静态类，你将加载该静态类的另一个副本，从而导致\
  \ JVM 陷入混乱。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\
  \nJava 序列化机制在后台工作，以转换和遍历类中标记为 `Serializable` 的每个对象。如果一个应用程序包含对象中的对象，甚至可能包含交叉引用的对象，序列化框架将解析这些对象，并且只存储每个对象的一个副本。然后每个属性都会被转换为一个\
  \ `byte[]` 表示形式。字节数组的格式包括实际的类名（例如：`com.somewhere.over.the.rainbow.preferences.UserPreferences`），后跟属性的编码（这些属性又可能编码另一个对象类及其属性，等等，*以此类推*）。\n\
  \n如果你好奇，可以查看生成的文件（即使在文本编辑器中），你会看到类名几乎是文件的第一部分。\n\n**注意** 序列化非常脆弱。默认情况下，序列化框架会生成一个流唯一标识符（SUID），该标识符捕获了类中呈现了哪些字段、它们的类型（public/protected）以及哪些是\
  \ `transient` 等信息。即使是对类进行看似微小的修改（例如，将 `int` 属性改为 `long` 属性），也会生成一个新的 SUID。使用先前 SUID\
  \ 保存的类无法在新的 SUID 上反序列化。这样做是为了保护序列化/反序列化机制，同时也保护了设计者。\n\n实际上，你可以告诉 Java 类使用特定的 SUID。这将允许你序列化类、修改它们，然后在实现一些向后兼容性的同时反序列化原始类。你面临的风险是反序列化必须保持向后兼容。重命名或删除字段会在反序列化类时生成异常。如果你在\
  \ `Serializable` 类上指定了自己的 `serialVersionUID`，请确保每次更改类时都进行一些向后兼容性的单元测试。通常，可以在以下位置找到对类进行修改以保持其向后兼容性的方法：[`docs.oracle.com/javase/7/docs/platform/serialization/`](http://docs.oracle.com/javase/7/docs/platform/serialization/spec/serial-arch.html)\n\
  \n[spec/serial-arch.html。](http://docs.oracle.com/javase/7/docs/platform/serialization/spec/serial-arch.html)\n\
  \n由于序列化的性质，不要期望在反序列化对象时会调用构造函数。如果你的构造函数中有对象正常运行所需的初始化代码，你可能需要将代码从构造函数中重构出来，以便在构造后能够正确执行。原因在于，在反序列化过程中，反序列化的对象是在内部“恢复”的（而不是创建的），并且不会调用构造函数。\n\
  \n8-2\\. 更高效地序列化 Java 对象\n\n问题\n\n你想要序列化一个类，但希望使输出比通过内置序列化方法生成的产物更高效，或者体积更小。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\n解决方案\n\n通过让对象实现\
  \ `Externalizable` 接口，你指示 Java 虚拟机使用自定义的序列化/反序列化机制，如下例中的 `readExternal`/`writeExternal`\
  \ 方法所示。\n\n```java\npublic class ExternalizableProgramSettings implements Externalizable\
  \ {\n\n    private Point locationOnScreen;\n\n    private Dimension frameSize;\n\
  \n    private Color defaultFontColor;\n\n    private String title;\n\n    // 空构造函数，Externalizable\
  \ 实现者必需\n    public ExternalizableProgramSettings() {\n    }\n\n    @Override\n\
  \    public void writeExternal(ObjectOutput out) throws IOException {\n        out.writeInt(locationOnScreen.x);\n\
  \        out.writeInt(locationOnScreen.y);\n        out.writeInt(frameSize.width);\n\
  \        out.writeInt(frameSize.height);\n        out.writeInt(defaultFontColor.getRGB());\n\
  \        out.writeUTF(title);\n    }\n\n    @Override\n    public void readExternal(ObjectInput\
  \ in) throws IOException, ClassNotFoundException {\n        locationOnScreen = new\
  \ Point(in.readInt(), in.readInt());\n        frameSize = new Dimension(in.readInt(),\
  \ in.readInt());\n        defaultFontColor = new Color(in.readInt());\n        title\
  \ = in.readUTF();\n    }\n\n    // 为简洁起见，省略了 getter 和 setter\n}\n```\n\n工作原理\n\n\
  Java 序列化框架提供了让你指定序列化对象实现方式的能力。因此，它要求实现 `Externalizable` 接口来代替 `Serializable` 接口。`Externalizable`\
  \ 接口包含两个方法：`writeExternal(ObjectOutput out)` 和 `readExternal(ObjectInput in)`。通过实现这些方法，你是在告诉框架如何编码/解码你的对象。\n\
  \n\n\n`writeExternal()` 方法会将一个 `ObjectOutput` 对象作为参数传入。随后，你可以利用该对象为序列化编写自己的编码方式。`ObjectOutput`\
  \ 包含表 8-1 中列出的方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\
  \n**表 8-1.** *ObjectOutput 方法*\n\n**ObjectOutput**\n\n**ObjectInput**\n\n**描述**\n\
  \n`writeBoolean (boolean v)`\n\n`boolean readBoolean ()`\n\n读取/写入布尔型原始数据。\n\n`writeByte(int\
  \ v)`\n\n`int readByte()`\n\n读取/写入一个字节。\n\n注意：Java 没有字节型原始数据，因此使用 int 作为参数，但只会写入最低有效字节。\n\
  \n`writeShort(int v)`\n\n`int readShort()`\n\n读取/写入两个字节。\n\n注意：只会写入两个最低有效字节。\n\n\
  `writeChar(int v)`\n\n`int readChar()`\n\n读取/写入两个字节作为字符（与 `writeShort` 的顺序相反）。\n\
  \n`writeInt (int v)`\n\n`int readInt()`\n\n读取/写入一个整数。\n\n`writeLong (long v)`\n\n\
  `int readLong()`\n\n读取/写入一个长整数。\n\n`writeDouble (double v)`\n\n`double readDouble`\n\
  \n读取/写入一个双精度浮点数。\n\n你选择实现 `Externalizable` 接口而非 `Serializable` 接口的一个原因，是 Java 的默认序列化效率非常低下。由于\
  \ Java 序列化框架需要确保每个对象（及其依赖对象）都被序列化，因此即使某些对象具有默认值，或者可能为空和/或为 null，它也会将其写入。实现 `Externalizable`\
  \ 接口还能让你对类的序列化方式进行更精细的控制。在我们的示例中，`Serializable` 版本创建了 439 字节的设置，而 `Externalizable`\
  \ 版本仅占 103 字节！\n\nN **注意** 实现 `Externalizable` 接口的类必须包含一个空的（无参）构造函数。\n\n8-3\\. 将\
  \ Java 对象序列化为 XML\n\n问题\n\n尽管你很喜欢序列化框架，但希望创建至少具有跨语言兼容性（或人类可读性）的内容。你希望使用 XML 来保存和加载对象。\n\
  \n解决方案\n\n在本示例中，`XMLEncoder` 对象用于对包含程序设置信息的 `Settings` 对象进行编码，并将其写入 `settings.xml`\
  \ 文件。`XMLDecoder` 获取 `settings.xml` 文件并将其作为流读取，解码 `Settings` 对象。使用 `FileSystem`\
  \ 来访问机器的文件系统；`FileOutputStream` 用于向系统写入文件；`FileInputStream` 用于从文件系统中的文件获取输入字节。在本示例中，这三个文件对象用于创建新的\
  \ XML 文件，以及读取它们进行处理。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8\
  \ 章 输入与输出\n\n```java\n// 编码\nFileSystem fileSystem = FileSystems.getDefault();\n\
  try (FileOutputStream fos = new FileOutputStream(\"settings.xml\"); XMLEncoder encoder\
  \ =\n        new XMLEncoder(fos)) {\n    encoder.setExceptionListener((Exception\
  \ e) -> {\n        System.out.println(\"Exception! :\"+e.toString());\n    });\n\
  \    encoder.writeObject(settings);\n}\n\n// 解码\ntry (FileInputStream fis = new\
  \ FileInputStream(\"settings.xml\"); XMLDecoder decoder =\n        new XMLDecoder(fis))\
  \ {\n    ProgramSettings decodedSettings = (ProgramSettings) decoder.readObject();\n\
  \    System.out.println(\"Is same? \"+settings.equals(decodedSettings));\n}\n\n\
  Path file= fileSystem.getPath(\"settings.xml\");\nList<String> xmlLines = Files.readAllLines(file,\
  \ Charset.defaultCharset());\nxmlLines.stream().forEach((line) -> {\n    System.out.println(line);\n\
  });\n```\n\n工作原理\n\n`XMLEncoder` 和 `XMLDecoder` 与序列化框架类似，使用反射来确定要写入哪些字段，但并非以二进制形式写入字段，而是将其写入为\
  \ XML。要编码的对象无需是可序列化的，但它们必须遵循 Java Beans 规范。\n\n*Java Bean* 是指符合以下约定的任何对象：\n\nu 该对象包含一个公共的空（无参）构造函数。\n\
  \nu 该对象为每个受保护/私有属性包含公共的 getter 和 setter 方法，其命名格式为 `get{Property}()` 和 `set{Property}()`。\n\
  \n\n\n`XMLEncoder`和`XMLDecoder`仅会编码/解码那些具有公共访问器（`get{property}`、`set{property}`）的\
  \ Bean 属性，因此任何私有且没有访问器的属性都不会被编码/解码。\n\nN **提示** 在编码/解码时注册一个异常监听器是一个好习惯。\n\n`XmlEncoder`会创建被序列化类的新实例（请记住，它们必须是\
  \ Java Bean，因此必须有一个空的无参构造函数），然后找出哪些属性是可访问的（通过 `get{property}`、`set{property}`）。如果新实例化类的某个属性与原始类的该属性包含相同的值（即具有相同的默认值），则\
  \ `XmlEncoder` 不会写入该属性。换句话说，如果属性的默认值没有改变，`XmlEncoder` 就不会将其写出。这提供了在不同版本间更改“默认”值的灵活性。例如，如果某个属性的默认值是\
  \ 2，当对象被编码后，默认属性从 2 更改为 4，那么解码后的对象将包含新的默认属性值 4（这可能不正确）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 8 章 输入与输出\n\n`XMLEncoder` 还会跟踪引用。如果一个对象在对象图中被持久化时出现多次（例如，一个对象位于主类的 `Map` 中，但同时又是\
  \ `DefaultValue` 属性），那么 `XMLEncoder` 只会对其编码一次，并通过在 xml 中放置一个链接来关联引用。`XMLEncoder`/`XMLDecoder`\
  \ 比序列化框架宽容得多。在解码时，如果属性类型发生更改，或者属性被删除/添加/移动/重命名，解码过程会“尽可能多地”解码，同时跳过无法解码的属性。\n\n建议不要持久化你的主类（即使\
  \ `XMLEncoder` 更加宽容），而是创建一些简单的、持有基本信息的、自身不执行太多任务的特殊对象。\n\n8-4\\. 创建 Socket 连接并跨网络发送可序列化对象\n\
  \n问题\n\n你需要打开一个网络连接，并从中发送/接收对象。\n\n解决方案\n\n使用 Java 的新输入输出 API 版本 2（NIO.2）来发送和接收对象。以下解决方案利用了\
  \ NIO.2 的非阻塞套接字特性（通过使用 `Future` 任务）：\n\n```java\n// 服务端\n\nhostAddress = new InetSocketAddress(InetAddress.getByName(\"\
  127.0.0.1\"), 2583); \nFuture<AsynchronousSocketChannel> serverFuture = null;\n\n\
  AsynchronousServerSocketChannel serverSocketChannel =\n    AsynchronousServerSocketChannel.open().bind(hostAddress);\n\
  \nserverFuture = serverSocketChannel.accept();\n\nfinal AsynchronousSocketChannel\
  \ clientSocket = serverFuture.get(2000, TimeUnit.MILLISECONDS); \nSystem.out.println(\"\
  Connected!\");\n\nif ((clientSocket != null) && (clientSocket.isOpen())) {\n   \
  \ InputStream connectionInputStream = Channels.newInputStream(clientSocket);\n \
  \   ObjectInputStream ois = null;\n    ois = new ObjectInputStream(connectionInputStream);\n\
  \n    while (true) {\n        Object object = ois.readObject();\n        if (object.equals(\"\
  EOF\")) {\n            connectionCount.decrementAndGet();\n            clientSocket.close();\n\
  \            break;\n        }\n        System.out.println(\"Received :\" + object);\n\
  \    }\n    ois.close();\n    connectionInputStream.close();\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 8 章 输入与输出\n\n```java\n// 客户端\n\ntry (AsynchronousSocketChannel clientSocketChannel\
  \ = AsynchronousSocketChannel.open()) {\n    Future<Void> connectFuture = clientSocketChannel.connect(hostAddress);\n\
  \    connectFuture.get(); // 等待连接完成。\n\n    OutputStream os = Channels.newOutputStream(clientSocketChannel);\n\
  \    try (ObjectOutputStream oos = new ObjectOutputStream(os)) {\n        for (int\
  \ i = 0; i < 5; i++) {\n            oos.writeObject(\"Look at me \" + i);\n    \
  \        Thread.sleep(1000);\n        }\n        oos.writeObject(\"EOF\");\n   \
  \ }\n}\n```\n\n工作原理\n\n在基本层面上，套接字需要类型、IP 地址和端口。虽然关于套接字的文献已经写满了整本书，但其核心思想相当直接。就像邮局一样，套接字通信依赖于地址。这些地址用于传递数据。在这个例子中，我们选择了回环地址（程序运行所在的同一台计算机）（127.0.0.1），并选择了一个随机端口号（2583）。\n\
  \n新 NIO.2 的优势在于其本质上是异步的。通过使用异步调用，你可以扩展应用程序，而无需为每个连接创建数千个线程。在我们的示例中，我们使用异步调用并等待连接，为了示例的目的，这实际上使其成为单线程的，但不要因此限制你使用更多异步调用来增强此示例。（请查看本书多线程部分的技巧。）\n\
  \n客户端要连接，需要一个套接字通道。NIO.2 API 允许创建异步套接字通道。一旦创建了套接字通道，它就需要一个要连接的地址。`socketChannel.connect()`\
  \ 操作不会阻塞；相反，它会返回一个 `Future` 对象（这与传统的 NIO 不同，在传统 NIO 中，调用 `socketChannel.connect()`\
  \ 会阻塞直到连接建立）。`Future` 对象允许 Java 程序继续执行其操作，并简单地查询提交任务的状态。进一步打个比方，这就像你不再在门口等待邮件到达，而是去做其他事情，并定期“检查”邮件是否已到达。`Future`\
  \ 对象有诸如 `isDone()` 和 `isCancelled()` 之类的方法，可以让你知道任务是否完成或取消。它还有 `get()` 方法，允许你实际等待任务完成。在我们的示例中，我们使用\
  \ `Future.get()` 来等待客户端连接建立。\n\n一旦连接建立，我们使用 `Channels.newOutputStream()` 创建一个输出流来发送信息。使用装饰器模式，我们用\
  \ `ObjectOutputStream` 装饰 `outputStream`，以便最终通过套接字发送对象。\n\n服务端代码稍微复杂一些。服务端套接字连接允许多个连接发生，因此它们用于监视或接收连接，而不是发起连接。出于这个原因，服务端通常异步等待连接。\n\
  \n服务端首先建立它监听的地址（127.0.0.1:2583）并接受连接。对 `serverSocketChannel.accept()` 的调用返回另一个 `Future`\
  \ 对象，该对象为你处理传入连接提供了灵活性。在我们的示例中，服务端连接简单地调用 `future.get()`，这将阻塞（停止程序执行）直到连接被接受。\n\n\
  服务端获取套接字通道后，通过调用 `Channels.newInputStream(socket)` 创建一个输入流，然后用 `ObjectInputStream`\
  \ 包装该输入流。然后服务端循环读取来自 `ObjectInputStream` 的每个对象。如果接收到的对象的 `toString()` 方法等于 `EOF`，服务端停止循环并关闭连接。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\nN **注意** 使用\
  \ `ObjectOutputStream` 和 `ObjectInputStream` 发送和接收大量对象可能会导致内存泄漏。`ObjectOutputStream`\
  \ 会保留已发送对象的副本以提高效率。如果你再次发送同一个对象，`ObjectOutputStream` 和 `ObjectInputStream` 不会再次发送该对象，而是发送一个先前发送过的对象\
  \ ID。这种仅发送对象 ID 而非整个对象的行为会引发两个问题。\n\n\n\n第一个问题是，通过线路发送时，就地修改（可变）的对象不会在接收客户端中反映更改。原因在于，由于对象已被发送过一次，**ObjectOutputStream**\
  \ 认为该对象已传输，因此只会发送其 ID，从而忽略自发送以来对该对象所做的任何更改。为避免此问题，请勿对已通过线路发送的对象进行修改。此规则也适用于对象图中的子对象。\n\
  \n第二个问题是，由于 ObjectOutputStream **维护了一个已发送对象及其对象 ID 的列表，如果发送大量对象，已发送对象到键的字典会无限增长，导致长时间运行的程序出现内存不足。**\n\
  \n**要缓解此问题，可以调用 ObjectOutputStream.reset()，该方法会清空已发送对象的字典。**\n\n或者，可以调用 ObjectOutputStream.writeUnshared()，以避免在\
  \ **ObjectOutputStream 字典中缓存该对象。**\n\n**8-5. 获取 Java 执行路径**\n\n**问题**\n\n你想要获取 Java\
  \ 程序正在运行的路径。\n\n**解决方案**\n\n调用 System 类的 getProperty 方法。例如：\n\nString path = System.getProperty(\"\
  user.dir\");\n\n**工作原理**\n\n当 Java 程序启动时，JRE 会更新 user.dir 系统属性，以记录 JRE 被调用的位置。解决方案示例将属性名\
  \ \"user.dir\" 传递给 getProperty 方法，该方法会返回对应的值。\n\n**8-6. 复制文件**\n\n**问题**\n\n你需要将一个文件从一个文件夹复制到另一个文件夹。\n\
