  \n第 14 章 N JAVAFX 基础\n\n**图 14-11.** *后台进程*\n\n工作原理\n\nGUI 开发的主要陷阱之一在于知道何时以及如何委派工作（线程）。你时常被提醒要注意线程安全，尤其是在阻塞\
  \ GUI 线程方面。使用 Java Swing API 时，必须实现 `SwingWorker` 对象，以便将非 GUI 工作从事件调度线程（EDT）中分离出来。类似的模式和原则在\
  \ JavaFX 世界中仍然适用。\n\n首先，你创建的不是一个，而是两个进度控件来向用户展示正在进行的工作。一个是进度条，另一个是进度指示器。进度指示器会在指示器图标下方显示一个百分比。以下代码片段展示了进度控件的初始创建：\n\
  \n```java\nfinal ProgressBar progressBar = new ProgressBar(0);\nfinal ProgressIndicator\
  \ progressIndicator = new ProgressIndicator(0);\n```\n\n接下来，你通过 `createWorker()`\
  \ 方法创建一个工作线程。`createWorker()` 便捷方法会实例化并返回一个 `javafx.concurrent.Task` 对象，该对象类似于 Java\
  \ Swing 的 `SwingWorker` 类。\n\n与 `SwingWorker` 类不同，`Task` 对象被极大地简化且更易于使用。如果你对比上一个示例，会发现没有任何\
  \ GUI 控件被传入 `Task` 中。聪明的 JavaFX 团队创建了可观察的属性，允许你进行绑定。这促成了一种更偏向事件驱动的方式来处理工作（任务）。在创建\
  \ `Task` 对象实例时，你实现 `call()` 方法来在后台执行工作。在工作进行期间，你可能希望将中间结果（如进度或文本信息）加入队列。为此，你可以调用\
  \ `updateProgress()` 和 `updateMessage()` 方法。这些方法会以线程安全的方式更新信息，使得进度属性的观察者能够安全地更新\
  \ GUI，而不会阻塞 GUI 线程。以下代码片段演示了将消息和进度加入队列的能力：\n\n```java\n// 将状态加入队列\nupdateMessage(status);\n\
  updateProgress(i + 1, numFiles);\n```\n\n创建一个工作 `Task` 后，你解除任何先前绑定到进度控件的旧任务。一旦进度控件解除绑定，你就将进度控件绑定到新创建的名为\
  \ `copyWorker` 的 `Task` 对象上。此处展示的是用于将新的 `Task` 对象重新绑定到进度 UI 控件的代码：\n\n```java\n\
  // 连接进度条\nprogressBar.progressProperty().unbind();\nprogressBar.progressProperty().bind(copyWorker.progressProperty());\n\
  progressIndicator.progressProperty().unbind();\nprogressIndicator.progressProperty().bind(copyWorker.progressProperty());\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 14 章 N JAVAFX 基础\n\n\
  接下来，你实现一个 `ChangeListener` 来将队列中的结果追加到 `TextArea` 控件中。JavaFX 属性的另一个显著特点是，你可以像 Java\
  \ Swing 组件一样附加多个监听器。\n\n最后，工作线程和控件全部连接起来，以生成一个在后台运行的线程。以下代码行展示了如何启动一个 `Task` 工作对象：\n\
