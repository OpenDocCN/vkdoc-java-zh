  \ = teamName;\n\n}\n\npublic Map obtainSchedule(){\n\nif (gameMap == null){\n\n\
  gameMap = new HashMap();\n\n}\n\nreturn gameMap;\n\n}\n\npublic void setGameDate(Team\
  \ team, Date date){\n\nobtainSchedule().put(team, date);\n\n}\n\nabstract void calculateDaysPlayed(int\
  \ month);\n\n}\n\n接下来，TeamSchedule 扩展了抽象类的功能。\n\npublic class TeamSchedule extends\
  \ Schedule {\n\npublic TeamSchedule(String teamName){\n\nsuper(teamName);\n\n}\n\
  \n@Override\n\nvoid calculateDaysPlayed(int month) {\n\n// 在此处执行实现\n\nthrow new\
  \ UnsupportedOperationException(\"Not supported yet.\");\n\n}\n\n}\n\n如你所见，TeamSchedule\
  \ 类可以使用抽象 Schedule 类中包含的所有字段和方法。它还实现了 Schedule 类中包含的抽象方法。\n\n工作原理\n\n抽象类被标记为抽象，它们包含可在子类中使用的字段声明和方法。它们与常规类有何不同？抽象类可以包含抽象方法，即没有实现的方法声明。本配方的解决方案包含一个名为\
  \ calculateDaysPlayed() 的抽象方法。抽象类可以包含也可以不包含抽象方法。它们也可以包含字段和完全实现的方法。抽象类不能被实例化；其他类只能扩展它们。\n\
  \n当一个类扩展一个抽象类时，它会获得抽象类的所有字段和功能。但是，在抽象类中声明的任何抽象方法都必须由子类实现。\n\n\n\n你可能会疑惑，为什么抽象类不直接包含方法的实现，以便其所有子类都能使用。如果你思考一下这个概念，就会发现这完全合理。一种类型的对象可能以不同于另一种对象的方式执行任务。使用抽象方法强制扩展抽象类的类实现该方法，但允许自定义其实现方式。\n\
