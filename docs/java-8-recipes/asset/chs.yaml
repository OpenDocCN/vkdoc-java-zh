  \ `zone` 包的类在表 4-7 中概述。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  CHAPTER 4 N NUMBERS AND DATES\n\n**表 4-7.** *时区类*\n\n| **类名** | **描述** |\n| :---\
  \ | :--- |\n| `ZoneId` | 指定时区标识符，用于转换。 |\n| `ZoneOffset` | 指定相对于格林威治/UTC 时间的时区偏移量。\
  \ |\n| `ZonedDateTime` | 一个日期-时间对象，同时处理时区数据和相对于格林威治/UTC 时间的时区偏移量。 |\n| `ZoneRules`\
  \ | 定义指定时区的偏移量如何变化的规则。 |\n| `ZoneRulesProvider` | 向特定系统提供时区规则的提供者。 |\n| `ZoneOffsetTransition`\
  \ | 本地时间线上的不连续性导致的两个偏移量之间的转换。 |\n| `ZoneOffsetTransitionRule` | 表达如何创建转换的规则。 |\n\
  \n从最基本的时区类 `ZoneId` 开始，每个时区都包含一个特定的时区标识符。这个标识符对于为日期-时间分配特定时区很有用。在解决方案中，`ZoneId`\
  \ 用于计算两个时区之间的任何差异。`ZoneId` 标识了应根据特定偏移量（固定偏移量或基于地理区域的偏移量）进行转换时应使用的规则。有关 `ZoneId`\
  \ 的更多详细信息，请参阅文档 [`docs.oracle.com/javase/8/docs/api/java/time/ZoneId.html`](http://docs.oracle.com/javase/8/docs/api/java/time/ZoneId.html)。\n\
  \n`ZonedDateTime` 是一个不可变类，用于同时处理日期-时间和时区数据。\n\n\n\n该类表示一个包含 ZoneId 的对象，与 LocalDateTime\
  \ 类似。它可用于表达日期的所有方面，包括年、月、日、时、分、秒、纳秒和时区。该类包含大量用于执行计算、转换等操作的方法。为简洁起见，此处未列出 ZonedDateTime\
  \ 中包含的所有方法，但您可以在以下文档中了解每个方法：\n\n[`docs.oracle.com/javase/8/docs/api/java/time/ZonedDateTime.html`](http://docs.oracle.com/javase/8/docs/api/java/time/ZonedDateTime.html)\n\
  \nZoneOffset 指定相对于格林威治/UTC 时间的时区偏移量。您可以通过调用 ZonedDateTime.getOffset() 方法来查找特定时区的偏移量。ZoneOffset\
  \ 类包含一些方法，可以轻松地将偏移量分解为不同的时间单位。例如，getTotalSeconds() 方法将小时、分钟和秒字段的总和作为一个单一的偏移量返回，该偏移量可以添加到某个时间上。更多信息请参考在线文档：[`docs.oracle.com/javase/8/docs/api/java/time/ZoneOffset.html`](http://docs.oracle.com/javase/8/docs/api/java/time/ZoneOffset.html)。\n\
  \n可以定义许多规则来确定单个时区的偏移量如何变化。ZoneRules 类用于为某个时区定义这些规则。例如，可以调用 ZoneRules 来指定或确定夏令时是否是一个影响因素。也可以将\
  \ Instant 或 LocalDateTime 传递给 ZoneRules 的方法（如 getOffset() 和 getTransition()），以返回\
  \ ZoneOffset 或 ZoneOffsetTransition。有关 ZoneRules 的更多信息，请参考在线文档：[`docs.oracle.com/javase/8/docs/api/java/time/zone/ZoneRules.html`](http://docs.oracle.com/javase/8/docs/api/java/time/zone/ZoneRules.html)。\n\
  \n另一个常用的时区类是 ZoneOffsetTransition。该类模拟了因夏令时变化而导致的春季和秋季偏移量之间的转换。它用于确定转换之间是否存在间隙、获取转换的持续时间等。有关\
  \ ZoneOffsetTransition 的更多信息，请参阅在线文档：[`docs.oracle.com/javase/8/docs/api/java/time/zone/ZoneOffsetTransition.html`](http://docs.oracle.com/javase/8/docs/api/java/time/zone/ZoneOffsetTransition.html)。\n\
  \nZoneRulesProvider、ZoneOffsetTransitionRule 和其他类在处理日期和时区时通常不如其他类常用。这些类对于管理时区规则和转换的配置非常有用。\n\
  \n**注意** `java.time.zone` 包中的类非常重要，因为每个类都可以调用大量方法。本方案仅提供入门基础，涵盖时区使用的基本知识。\n\n如需更详细信息，请参阅在线文档。\n\
