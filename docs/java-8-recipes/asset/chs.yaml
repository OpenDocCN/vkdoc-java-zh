  );\nshouldWakeUp = (shouldWakeUpProperty == null) ? false\n    : Boolean.parseBoolean(shouldWakeUpProperty.trim().toLowerCase());\n\
  String startCounterProperty = properties.getProperty(\"StartCounter\");\ntry {\n\
