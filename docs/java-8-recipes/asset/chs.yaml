  \ id=\"3\">\n\n<name>Jack Brown</name>\n\n<diagnosis>Food allergy</diagnosis>\n\n\
  </patient>\n\n</patients>\n\n工作原理\n\nJava 标准库提供了多种写入 XML 文档的方式。其中一种模型是用于 XML 的简单\
  \ API（SAX）。\n\n更新、更简单且更高效的模型是用于 XML 的流式 API（StAX）。本方案使用`javax.xml.stream`包中定义的 StAX。写入\
  \ XML 文档需要五个步骤：\n\n1.  创建文件输出流。\n2.  创建 XML 输出工厂和 XML 输出流写入器。\n3.  将文件流包装到 XML 流写入器中。\n\
  4.  使用 XML 流写入器的写入方法创建文档并写入 XML 元素。\n5.  关闭输出流。\n\n使用`java.io.FileOutputStream`类创建文件输出流。你可以使用`try`块来打开和关闭此流。更多关于新`try`块语法的内容，请参阅第\
  \ 9 章。\n\n`javax.xml.stream.XMLOutputFactory`提供了一个用于创建输出工厂的静态方法。使用该工厂创建一个`javax.xml.stream.XMLStreamWriter`。\n\
  \n获得写入器后，将文件流对象包装到 XML 写入器实例中。你将使用各种写入方法来创建 XML 文档元素和属性。最后，在完成文件写入后，只需关闭写入器即可。`XMLStreamWriter`实例的一些更有用的方法包括：\n\
  - `writeStartDocument()`\n- `writeStartElement()`\n- `writeEndElement()`\n- `writeEndDocument()`\n\
  - `writeAttribute()`\n\n创建文件和`XMLStreamWriter`后，你应始终通过调用`writeStartDocument()`方法来开始文档。接着，结合使用`writeStartElement()`和`writeEndElement()`方法来写入各个元素。当然，元素可以包含嵌套元素。你有责任按正确顺序调用这些方法，以创建格式良好的文档。使用`writeAttribute()`方法将属性名称和值放入当前元素。你应在调用`writeStartElement()`方法后立即调用`writeAttribute()`。最后，使用`writeEndDocument()`方法标记文档结束，并关闭写入器实例。\n\
  \n使用`XMLStreamWriter`的一个有趣之处在于它不会格式化文档输出。除非你特意使用`writeCharacters()`方法输出空格和换行符，否则输出将流式传输到单个未格式化的行中。当然，这不会使生成的\
  \ XML 文件无效，但确实会使人类阅读变得不便和困难。因此，你应考虑使用`writeCharacters()`方法根据需要输出间距和换行符，以创建人类可读的文档。如果你不需要文档供人类阅读，可以安全地忽略这种写入额外空白和换行符的方法。无论格式如何，只要\
  \ XML 文档遵循正确的 XML 语法，它就会是格式良好的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
