  \ 是两个或多个已填充的 `RowSet` 对象的组合。它可以基于键/值关系连接两个 `RowSet` 对象，就像 SQL 的 JOIN 查询一样。要创建 `JoinRowSet`，首先必须用相关数据填充两个或多个\
  \ `RowSet` 对象，然后将它们分别添加到 `JoinRowSet` 中以生成合并结果。\n\n在本节解决方案中，查询的表名为 `BOOK_AUTHOR`、`BOOK`\
  \ 和 `AUTHOR_WORK`。`BOOK_AUTHOR` 表包含作者姓名列表，而 `AUTHOR_WORK` 表包含书籍列表及对应的 `AUTHOR_ID`。`BOOK`\
  \ 表包含书籍的详细信息。按照 `main()` 方法，首先查询 `BOOK_AUTHOR` 表，并通过 `queryBookAuthor()` 方法将其结果提取到\
  \ `CachedRowSet` 中。有关 `CachedRowSet` 对象的更多详细信息，请参见第 13-10 节。\n\n接下来，调用 `queryAuthorBook()`\
  \ 方法，用查询 `AUTHOR_WORK` 和 `BOOK` 表的结果填充另一个 `CachedRowSet`。此时，有两个已填充的 `CachedRowSet`\
  \ 对象，现在可以使用 `JoinRowSet` 将它们合并。为此，每个查询必须包含一个或多个与另一表相关的列。在本例中，`BOOK_AUTHOR.ID` 列与\
  \ `AUTHOR_WORK.AUTHOR_ID` 列相关，因此 `RowSet` 对象必须基于这些列值进行连接。\n\n在 `main()` 中调用的最后一个方法是\
  \ `joinRowQuery()`。所有 `JoinRowSet` 的工作都在此方法中完成。首先，通过实例化 `JoinRowSetImpl()` 对象来创建一个新的\
  \ `JoinRowSet`：`jrs = new JoinRowSetImpl();`\n\n**注意**\n\n使用 `JoinRowSetImpl` 时，您会收到编译时警告，因为它是\
  \ SUN 内部的专有 API。不过，Oracle 版本是 `OracleJoinRowSet`，但其功能不那么全面。\n\n接下来，通过调用 `addRowSet()`\
  \ 方法，将两个 `CachedRowSet` 对象添加到新创建的 `JoinRowSet` 中。`addRowSet()` 方法接受两个参数。第一个参数是要添加到\
  \ `JoinRowSet` 的 `RowSet` 对象的名称，第二个参数是一个 int 值，表示 `CachedRowSet` 中用于实现连接的关键值所在的位置。在本节解决方案中，第一次调用\
  \ `addRowSet()` 时传入了 `bookAuthors` 的 `CachedRowSet` 和数字 1，因为 `bookAuthors` 的 `CachedRowSet`\
  \ 中第一个位置的元素对应 `BOOK_AUTHOR.ID` 列。第二次调用 `addRowSet()` 时传入了 `authorWork` 的 `CachedRowSet`\
  \ 和数字 2，因为 `authorWork` 的 `CachedRowSet` 中第二个位置的元素对应 `AUTHOR_WORK.AUTHOR_ID` 列。\n\
  \n// 添加 RowSet 及对应的键\n\njrs.addRowSet(bookAuthors, 1);\n\njrs.addRowSet(authorWork,\
  \ 2);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 使用数据库\n\n现在，可以像使用普通\
  \ `RowSet` 一样，使用 `JoinRowSet` 来获取连接结果。在调用 `JoinRowSet` 的相应方法 [`getString()`、`getInt()`\
  \ 等] 时，传入与要存储的数据对应的数据库列名：\n\nwhile(jrs.next()){\n\nSystem.out.println(jrs.getInt(\"\
  ID\") + \": \" +\n\njrs.getString(\"TITLE\") + \" - \" +\n\njrs.getString(\"FIRSTNAME\"\
  ) + \" \" +\n\njrs.getString(\"LASTNAME\"));\n\n}\n\n虽然并非每天都需要使用 `JoinRowSet`，但在处理两组相关数据时，它会非常方便。当应用程序并非始终连接到数据库，或者您希望尽可能少地使用\
  \ `Connection` 对象时，这一点尤其适用。\n\n13-12\\. 在 RowSet 中过滤数据\n\n问题\n\n\n\n您的应用程序查询数据库并返回大量行。缓存\
  \ ResultSet 中的行数过多，用户无法一次性处理。您希望限制可见的行数，以便能够对从表中查询到的不同数据集执行不同的操作。\n\n解决方案\n\n使用\
  \ FilteredRowSet 查询数据库并存储内容。可以配置 FilteredRowSet 来过滤查询返回的结果，以便仅显示您想要看到的行。在以下示例中，创建了一个过滤器类，稍后将用于过滤数据库查询返回的结果。该示例中的过滤器用于根据作者的姓氏限制可见的行数。\n\
  \n以下类包含过滤器的实现：\n\npackage org.java8recipes.chapter13.recipe13_12;\n\nimport java.sql.SQLException;\n\
  \nimport javax.sql.RowSet;\n\nimport javax.sql.rowset.Predicate;\n\npublic class\
  \ AuthorFilter implements Predicate {\n\nprivate String[] authors;\n\nprivate String\
  \ colName = null;\n\nprivate int colNumber = -1;\n\npublic AuthorFilter(String[]\
  \ authors, String colName) {\n\nthis.authors = authors;\n\nthis.colNumber = -1;\n\
  \nthis.colName = colName;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\npublic AuthorFilter(String[] authors, int colNumber) {\n\nthis.authors\
  \ = authors;\n\nthis.colNumber = colNumber;\n\nthis.colName = null;\n\n}\n\n@Override\n\
  \npublic boolean evaluate(Object value, String colName) {\n\nif (colName.equalsIgnoreCase(this.colName))\
  \ {\n\nfor (String author : this.authors) {\n\nif (author.equalsIgnoreCase((String)value))\
  \ {\n\nreturn true;\n\n}\n\n}\n\n}\n\nreturn false;\n\n}\n\n@Override\n\npublic\
  \ boolean evaluate(Object value, int colNumber) {\n\nif (colNumber == this.colNumber)\
  \ {\n\nfor (String author : this.authors) {\n\nif (author.equalsIgnoreCase((String)value))\
  \ {\n\nreturn true;\n\n}\n\n}\n\n}\n\nreturn false;\n\n}\n\n@Override\n\npublic\
  \ boolean evaluate(RowSet rs) {\n\nif (rs == null)\n\nreturn false;\n\ntry {\n\n\
  for (int i = 0; i < this.authors.length; i++) {\n\nString authorLast = null;\n\n\
  if (this.colNumber > 0) {\n\nauthorLast = (String)rs.getObject(this.colNumber);\n\
  \n} else if (this.colName != null) {\n\nauthorLast = (String)rs.getObject(this.colName);\n\
  \n} else {\n\nreturn false;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\nif (authorLast.equalsIgnoreCase(authors[i])) {\n\nreturn true;\n\
  \n}\n\n}\n\n} catch (SQLException e) {\n\nreturn false;\n\n}\n\nreturn false;\n\n\
  }\n\n}\n\n该过滤器由 FilteredRowSet 使用，以限制查询中的可见结果。如您所见，利用 FilteredRowSet 可以在应用程序层面以面向对象的方式过滤数据，而不是在\
  \ SQL 数据库层面进行过滤。其好处在于，您可以实现一系列过滤器并将其应用于同一结果集，从而返回所需的结果。使用此选项无需执行多次数据库查询来返回不同的数据集。\n\
  \n以下类演示了如何实现 FilteredRowSet。main() 方法调用了一个名为 implementFilteredRowSet() 的方法，该方法包含用于过滤\
  \ BOOK_AUTHOR 和 AUTHOR_WORK 表查询结果的代码，以便仅返回姓氏为 DEA 和 JUNEAU 的作者的结果：\n\npackage org.java8recipes.chapter13.recipe13_12;\n\
  \nimport com.sun.rowset.FilteredRowSetImpl;\n\nimport java.sql.Connection;\n\nimport\
  \ java.sql.SQLException;\n\nimport javax.sql.RowSet;\n\nimport javax.sql.rowset.FilteredRowSet;\n\
  \nimport org.java8recipes.chapter13.recipe13_01.CreateConnection;\n\npublic class\
  \ FilteredRowSetExample {\n\npublic static Connection conn = null;\n\npublic static\
  \ CreateConnection createConn;\n\npublic static FilteredRowSet frs = null;\n\npublic\
  \ static void main(String[] args) {\n\nboolean successFlag = false;\n\ntry {\n\n\
  createConn = new CreateConnection();\n\nconn = createConn.getConnection();\n\nimplementFilteredRowSet();\n\
  \n} catch (java.sql.SQLException ex) {\n\nSystem.out.println(ex);\n\n} finally {\n\
  \nif (conn != null) {\n\ntry {\n\n\n\nconn.close();\n\n} catch (SQLException ex)\
  \ {\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 数据库操作\n\nex.printStackTrace();\n\
  \n}\n\n}\n\nif (frs != null) {\n\ntry {\n\nfrs.close();\n\n} catch (SQLException\
  \ ex) {\n\nex.printStackTrace();\n\n}\n\n}\n\n}\n\n}\n\npublic static void implementFilteredRowSet()\
  \ {\n\nString[] authorArray = {\"DEA\", \"JUNEAU\"};\n\nAuthorFilter authorFilter\
  \ = new AuthorFilter(authorArray, 2);\n\ntry {\n\nfrs = new FilteredRowSetImpl();\n\
  \nfrs.setCommand(\"SELECT TITLE, LASTNAME \"\n\n+ \"FROM BOOK_AUTHOR BA, \"\n\n\
  + \"AUTHOR_WORK AW, \"\n\n+ \"BOOK B \"\n\n+ \"WHERE AW.AUTHOR_ID = BA.ID \"\n\n\
  + \"AND B.ID = AW.BOOK_ID\");\n\nfrs.execute(conn);\n\nSystem.out.println(\"添加过滤器前：\"\
  );\n\nviewRowSet(frs);\n\nSystem.out.println(\"添加作者过滤器：\");\n\nfrs.beforeFirst();\n\
  \nfrs.setFilter(authorFilter);\n\nviewRowSet(frs);\n\n} catch (SQLException e) {\n\
  \ne.printStackTrace();\n\n}\n\n}\n\npublic static void viewRowSet(RowSet rs) {\n\
  \ntry {\n\nwhile (rs.next()) {\n\nSystem.out.println(rs.getString(1) + \" - \"\n\
  \n+ rs.getString(2));\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 数据库操作\n\n} catch (SQLException ex) {\n\nex.printStackTrace();\n\n}\n\n\
  }\n\n}\n\n运行这段代码的结果将类似于以下行。请注意，只有与过滤器中列出的作者相对应的数据行会通过 `FilteredRowSet` 返回。\n\n成功连接\n\
  \n添加过滤器前：\n\nJava 7 Recipes - JUNEAU\n\nJava 7 Recipes - BEATY\n\nJava 7 Recipes\
  \ - DEA\n\nJava 7 Recipes - GUIME\n\nJava 7 Recipes - OCONNER\n\nJava EE 7 Recipes\
  \ - JUNEAU\n\nJava FX 2.0 - Introduction by Example - DEA\n\n添加作者过滤器：\n\nJava 7\
  \ Recipes - JUNEAU\n\nJava 7 Recipes - DEA\n\nJava EE 7 Recipes - JUNEAU\n\nJava\
  \ FX 2.0 - Introduction by Example – DEA\n\n工作原理\n\n通常，数据库查询返回的结果包含大量行。你可能知道，在可视化处理数据时，行数过多会引发问题。通常，通过在\
  \ SQL 语句中使用 `WHERE` 子句来限制查询返回的行数，以便只返回相关数据，这会有所帮助。\n\n然而，如果应用程序将数据检索到内存中的 `RowSet`\
  \ 中，然后需要在不额外请求数据库的情况下，根据各种条件过滤数据，就需要使用查询之外的方法。`FilteredRowSet` 可用于过滤已填充的 `RowSet`\
  \ 中显示的数据，使其更易于管理。\n\n使用 `FilteredRowSet` 包含两个部分。首先，需要创建一个过滤器，用于指定数据的过滤方式。过滤器类应实现\
  \ `Predicate` 接口。可以有多个构造函数，每个构造函数接受不同的参数集，并且过滤器可以包含多个 `evaluate()` 方法，每个方法接受不同的参数并包含不同的实现。构造函数应接受一个可用于过滤\
  \ `RowSet` 的内容数组。它们还应接受第二个参数，即过滤器应针对的列名或列位置。在本节方案的解决方案中，过滤器类名为 `AuthorFilter`，它用于根据作者名称数组过滤数据。其构造函数各自接受一个包含要过滤的作者名称的数组，以及列名或列位置。每个\
  \ `evaluate()` 方法的任务是判断给定的数据行是否与指定的过滤器匹配；在本例中，即通过数组传入的作者名称。如果向过滤器传递的是列名而非列位置，则调用第一个\
  \ `evaluate()` 方法；如果传递的是列位置，则调用第二个 `evaluate()` 方法。最后一个 `evaluate()` 方法接受 `RowSet`\
  \ 本身，负责遍历数据并返回一个布尔值，以指示相应的列名/列位置值是否与过滤器数据匹配。\n\n\n\nFilteredRowSet 实现的第二部分是 FilteredRowSet\
  \ 本身的工作。这可以在 FilteredRowSetExample 类的 implementFilteredRowSet() 方法中看到。FilteredRowSet\
  \ 实际上会使用你编写的过滤器类来决定显示哪些行。你可以看到，方法中的第一个声明是将要传递给过滤器类的值数组。第二个声明是过滤器类 AuthorFilter 的实例化。当然，过滤器值数组以及与过滤器值对应的列位置会被传递给过滤器构造函数。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 使用数据库\n\nString[] authorArray\
  \ = {\"DEA\", \"JUNEAU\"};\n\n// 使用作者数组创建一个过滤器\n\nAuthorFilter authorFilter = new\
  \ AuthorFilter(authorArray, 2);\n\n要实例化一个 FilteredRowSet，需要创建一个 FilteredRowSetImpl\
  \ 类的新实例。实例化之后，只需使用 setCommand() 方法设置用于获取结果的 SQL 查询，然后通过调用 executeQuery() 方法来执行它。\n\
  \n// 实例化一个新的 FilteredRowSet\n\nfrs = new FilteredRowSetImpl();\n\n// 设置查询\n\nfrs.setCommand(\"\
  SELECT TITLE, LASTNAME \"\n\n+ \"FROM BOOK_AUTHOR BA, \"\n\n+ \"AUTHOR_WORK AW,\
  \ \"\n\n+ \"BOOK B \"\n\n+ \"WHERE AW.AUTHOR_ID = BA.ID \"\n\n+ \"AND B.ID = AW.BOOK_ID\"\
  );\n\n// 执行查询\n\nfrs.execute(conn);\n\n**注意** 使用 FilteredRowSetImpl 时，你会收到一个编译时警告，因为它是\
  \ SUN 内部的专有 API。\n\n请注意，此时尚未应用过滤器。实际上，此时你拥有一个可滚动的 RowSet，其中填充了查询的所有结果。该示例在应用过滤器之前显示了这些结果。\n\
  \n要应用过滤器，请使用 setFilter() 方法，并将过滤器作为参数传递。完成此操作后，FilteredResultSet 将只显示那些符合过滤器指定条件的行。\n\
  \n再次强调，FilteredRowSet 技术有其适用场景，尤其是在处理可能不总是连接到数据库的应用程序时。它是一个强大的工具，可用于过滤数据、处理数据，然后应用不同的过滤器并处理新的结果。这类似于在不查询数据库的情况下对查询应用\
  \ WHERE 子句。\n\n13-13. 查询和存储大对象\n\n问题\n\n你正在开发的应用程序需要存储可以包含无限数量字符的文本字符串。\n\n解决方案\n\
  \n当需要存储的字符串大小非常大时，最好使用字符大对象（CLOB）数据类型来存储文本。以下示例中的代码演示了如何将 CLOB 加载到数据库中以及如何查询它：package\
  \ org.java8recipes.chapter13.recipe13_13;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\nimport java.sql.Clob;\n\nimport java.sql.Connection;\n\nimport\
  \ java.sql.PreparedStatement;\n\nimport java.sql.ResultSet;\n\nimport java.sql.SQLException;\n\
  \nimport org.java8recipes.chapter13.recipe13_01.CreateConnection;\n\npublic class\
  \ LobExamples {\n\npublic static Connection conn = null;\n\npublic static CreateConnection\
  \ createConn;\n\npublic static void main(String[] args) {\n\nboolean successFlag\
  \ = false;\n\ntry {\n\ncreateConn = new CreateConnection();\n\nconn = createConn.getConnection();\n\
  \nloadClob();\n\nreadClob();\n\n} catch (java.sql.SQLException ex) {\n\nSystem.out.println(ex);\n\
  \n} finally {\n\nif (conn != null) {\n\ntry {\n\nconn.close();\n\n} catch (SQLException\
  \ ex) {\n\nex.printStackTrace();\n\n}\n\n}\n\n}\n\n}\n\npublic static void loadClob()\
  \ {\n\nClob textClob = null;\n\nString sql = \"INSERT INTO RECIPE_TEXT VALUES(\"\
  \n\n+ \"next value for recipe_text_seq, \"\n\n+ \"(select id from recipes where\
  \ recipe_number = '13-1'), \"\n\n+ \"?)\";\n\ntry (PreparedStatement pstmt = conn.prepareStatement(sql);)\
  \ {\n\ntextClob = conn.createClob();\n\ntextClob.setString(1, \"This will be the\
  \ recipe text in clob format\");\n\n// 在实际应用中获取序列号\n\n// 设置 clob 值\n\npstmt.setClob(1,\
  \ textClob);\n\npstmt.executeUpdate();\n\n\n\n} catch (SQLException ex) {\n\nex.printStackTrace();\n\
  \n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 使用数据库\n\n\
  public static void readClob() {\n\nString qry = \"select text from recipe_text\"\
  ;\n\nClob theClob = null;\n\ntry(PreparedStatement pstmt = conn.prepareStatement(qry);\n\
  \nResultSet rs = pstmt.executeQuery();) {\n\nwhile (rs.next()) {\n\ntheClob = rs.getClob(1);\n\
  \nSystem.out.println(\"Clob length: \" + theClob.length());\n\nSystem.out.println(theClob.toString());\n\
  \n}\n\nSystem.out.println(theClob.toString());\n\n} catch (SQLException ex) {\n\n\
  ex.printStackTrace();\n\n}\n\n}\n\n}\n\n工作原理\n\n如果应用程序需要存储字符串值，你需要了解这些字符串可能达到的最大长度。大多数数据库对\
  \ VARCHAR 字段的存储大小都有上限。例如，Oracle 数据库的上限是 2000 个字符，超过该长度的内容将被截断。如果需要存储大量文本，请在数据库中使用\
  \ CLOB 字段。\n\nCLOB 在 Java 代码中的处理方式与字符串略有不同。事实上，初次使用时可能会觉得有些奇怪，因为你必须通过 Connection\
  \ 对象来创建 CLOB。\n\n**注意** 实际上，CLOB 和 BLOB（二进制大对象）并不存储在定义它们的 Oracle 表中。\n\n相反，表列中存储的是大对象（LOB）定位器。Oracle\
  \ 可能会将 CLOB 放在数据库服务器上的一个单独文件中。当 Java 创建 Clob 对象时，它可以用于保存数据以更新数据库中特定的 LOB 位置，或者从数据库中特定的\
  \ LOB 位置检索数据。\n\n让我们看看本方案中包含的`loadClob()`方法。如你所见，Clob 对象是使用`Connection`的`createClob()`方法创建的。创建\
  \ Clob 后，你可以使用`setString()`方法设置其内容，传入指示字符串放置位置的位置参数和文本字符串本身：`textClob = conn.createClob();\
  \ textClob.setString(1, \"This will be the recipe text in clob format\");`\n\n创建并填充\
  \ Clob 后，只需使用`PreparedStatement`的`setClob()`方法将其传递给数据库。在本例中，`PreparedStatement`通过照常调用`executeUpdate()`方法执行数据库插入操作到`RECIPE_TEXT`表。\n\
  \n查询 Clob 也同样简单。如本方案中包含的`readClob()`方法所示，设置一个`PreparedStatement`查询，并将结果检索到`ResultSet`中。\n\
  \n使用 Clob 和字符串的唯一区别在于，你必须将 Clob 加载到 Clob 类型中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n**注意** 调用 Clob 的`getString()`方法将返回一个看起来奇怪的文本字符串，它表示一个 Clob 对象。\n\
  \n因此，调用 Clob 对象的`getAsciiStream()`方法将返回存储在 Clob 中的实际数据。\n\n虽然 Clob 使用起来相当简单，但需要多几个准备步骤。最好相应地规划你的应用程序，并尝试估算你使用的数据库字段是否可能因大小限制而需要设置为\
  \ CLOB。合理的规划可以防止你日后回头将基于字符串的标准代码修改为使用 Clob。\n\n13-14. 调用存储过程\n\n问题\n\n应用程序所需的某些逻辑以数据库存储过程的形式编写。你需要能够从应用程序内部调用该存储过程。\n\
  \n解决方案\n\n以下代码块显示了创建将由 Java 调用的存储过程所需的 PL/SQL。该存储过程的功能非常简单；它仅接受一个值并将该值赋给一个 OUT 参数，以便程序可以显示它：\n\
  \ncreate or replace procedure dummy_proc (text IN VARCHAR2,\n\nmsg OUT VARCHAR2)\
  \ as\n\nbegin\n\n\n\n-- 执行某些操作，本例中将 IN 参数的值赋给 OUT 参数 msg :=text;\n\nend;\n\n以下代码中的\
  \ CallableStatement 执行了数据库中包含的该存储过程，并传递了必要的参数。然后，OUT 参数的结果会显示给用户。\n\ntry(CallableStatement\
  \ cs = conn.prepareCall(\"{call DUMMY_PROC(?,?)}\");) {\n\ncs.setString(1, \"This\
  \ is a test\");\n\ncs.registerOutParameter(2, Types.VARCHAR);\n\ncs.executeQuery();\n\
  \nSystem.out.println(cs.getString(2));\n\n} catch (SQLException ex){\n\nex.printStackTrace();\n\
  \n}\n\n运行本配方的示例类将显示以下输出，该输出与输入相同。这是因为 DUMMY_PROC 过程只是将 IN 参数的内容赋给了 OUT 参数。\n\nSuccessfully\
  \ connected\n\nThis is a test\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n工作原理\n\n应用程序使用数据库存储过程来执行可直接在数据库内运行的逻辑，这种情况并不少见。为了从 Java 调用数据库存储过程，必须创建一个\
  \ CallableStatement 对象，而不是使用 PreparedStatement。在本配方的解决方案中，一个 CallableStatement 调用了名为\
  \ DUMMY_PROC 的存储过程。实例化 CallableStatement 的语法与使用 PreparedStatement 类似。使用 Connection\
  \ 对象的 prepareCall() 方法，并将对存储过程的调用作为参数传递。\n\n存储过程调用必须用花括号 {} 括起来，否则应用程序将抛出异常。\n\n\
  cs = conn.prepareCall(\"{call DUMMY_PROC(?,?)}\");\n\n一旦 CallableStatement 被实例化，它就可以像\
  \ PreparedStatement 一样用于设置参数的值。但是，如果某个参数在数据库存储过程中被注册为 OUT 参数，则必须调用一个特殊方法 registerOutParameter()，并传入要注册的\
  \ OUT 参数的位置和数据库类型。在本配方的解决方案中，OUT 参数位于第二个位置，其类型为 VARCHAR。\n\ncs.registerOutParameter(2,\
  \ Types.VARCHAR);\n\n要执行存储过程，请调用 CallableStatement 上的 executeQuery() 方法。完成此操作后，可以通过调用与数据类型对应的\
  \ CallableStatement 的 getXXX() 方法来查看 OUT 参数的值：\n\nSystem.out.println(cs.getString(2));\n\
  \n**关于存储函数的说明**\n\n调用数据库存储函数与调用存储过程基本相同。但是，prepareCall() 的语法略有修改。要调用存储函数，请将花括号内的调用更改为使用\
  \ ? 字符来表示返回值。例如，假设一个名为 DUMMY_FUNC 的函数接受一个参数并返回一个值。以下代码将用于进行调用并返回值：cs = conn.prepareCall(\"\
  {? = call DUMMY_FUNC(?)}\");\n\ncs.registerOutParameter(1, Types.VARCHAR);\n\ncs.setString(2,\
  \ \"This is a test\");\n\ncs.execute();\n\n然后调用 cs.getString(1) 即可检索返回值。\n\n13-15.\
  \ 获取用于数据库的日期\n\n问题\n\n您希望正确转换一个 LocalDate，以便将其插入到数据库记录中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n解决方案\n\n利用静态方法 java.sql.Date.valueOf(LocalDate) 将 LocalDate 对象转换为\
  \ java.sql.Date 对象，JDBC 可以使用该对象进行数据库的插入或查询。在以下示例中，当前日期被插入到数据库的 Date 类型列中。\n\nprivate\
  \ static void insertRecord(\n\nString title,\n\nString publisher) {\n\nString sql\
  \ = \"INSERT INTO PUBLICATION VALUES(\"\n\n+ \"NEXT VALUE FOR PUBLICATION_SEQ, ?,?,?,?)\"\
  ;\n\nLocalDate pubDate = LocalDate.now();\n\ntry (Connection conn = createConn.getConnection();\n\
  \nPreparedStatement pstmt = conn.prepareStatement(sql);) {\n\npstmt.setInt(1, 100);\n\
  \npstmt.setString(2, title);\n\npstmt.setDate(3, java.sql.Date.valueOf(pubDate));\n\
  \npstmt.setString(4, publisher);\n\npstmt.executeUpdate();\n\nSystem.out.println(\"\
  Record successfully inserted.\");\n\n} catch (SQLException ex) {\n\nex.printStackTrace();\n\
  \n}\n\n}\n\n工作原理\n\n在 Java 8 中，新的日期时间 API（第 4 章）是处理日期和时间的首选 API。因此，在处理日期值和数据库时，JDBC\
  \ API 必须在 SQL 日期和新的日期时间 LocalDate 对象之间进行转换。本配方的解决方案演示了要从 LocalDate 对象获取 java.sql.Date\
  \ 的实例，只需调用静态方法 java.sql.Date.valueOf()，并传入相关的 LocalDate 对象即可。\n\n13-16. 自动管理资源\n\
  \n问题\n\n您希望应用程序为您处理样板代码，而不是在每次数据库调用时手动打开和关闭资源。\n\n解决方案\n\n使用 try-with-resources\
  \ 语法自动关闭您打开的资源。以下代码块使用此策略，在使用完 Connection、Statement 和 ResultSet 资源后自动关闭它们：String\
  \ qry = \"select recipe_number, recipename, description from recipes\";\n\ntry (Connection\
  \ conn = createConn.getConnection();\n\nStatement stmt = conn.createStatement();\n\
  \nResultSet rs = stmt.executeQuery(qry);) {\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\nwhile (rs.next()) {\n\nString recipe = rs.getString(\"RECIPE_NUMBER\"\
