  \    fadeButtons.play();\n});\n```\n\n最后但同样重要的是，淡出 `EventHandler` 与淡入基本相同，只是不透明度的起始值和结束值从\
  \ 1.0 变为 0.0，这使得当鼠标指针移出场景区域时，按钮会神秘地消失。\n\n15-3. 沿路径动画化形状\n\n问题\n\n你想要创建一种沿路径动画化形状的方法。\n\
