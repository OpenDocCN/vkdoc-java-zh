  \ int\n\nArrays.toString: [55, 70, 82, 89, 97, 98, 100]\n\n工作原理\n\nJava 数组类型常常因为不如\
  \ Java 更复杂的 `ArrayList`（Java 集合框架的一部分）而受到轻视。这种批评通常源于数组类型的灵活性不足。Java 数组保存固定数量的数据。也就是说，当创建一个数组时，你必须指定它能容纳多少数据。一旦数组被创建，你就不能插入或删除数组元素，也无法改变数组的大小。然而，如果你有固定数量（尤其是非常大数量）的数据，并且只需要在顺序迭代时对其进行处理，那么数组可能是一个不错的选择。\n\
  \n\n\n关于 Java 数组类型，你首先需要了解的是，它是一种对象类型。所有数组，无论其包含的数据类型是什么，都以 Object 作为其超类。数组的元素可以是任何类型，只要所有元素都是同一类型（基本类型或对象引用）。无论数组类型如何，数组的内存总是在应用程序的堆空间中分配的。堆是\
  \ JVM 用于动态内存分配的内存区域。\n\nN **注意** 可以创建一个对象数组（Object[]），它可以持有不同类型对象的引用；然而，不推荐这样做，因为这需要你检查元素类型，并在从数组中检索元素时执行显式类型转换。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 数据结构与集合\n\n在 Java 中完整定义一个数组对象需要两个步骤：数组变量声明（指定数组元素类型）和数组创建（为数组分配内存）。一旦声明了数组并分配了内存，就可以对其进行初始化。有多种初始化数组的方法，本方案中会展示这些方法。如果你预先知道需要在数组中存储哪些数据，可以使用一种快捷语法将数组声明、创建和初始化合并为一步，你将在本方案的解决方案中看到其演示。\n\
  \n让我们逐步分析 GradeAnalyzer 类，并研究声明、创建、初始化和访问数组的各种方式。首先，注意该类有一个实例变量用于保存待分析的成绩：`private\
  \ int[] _grades;`\n\n与所有其他未初始化的对象引用实例变量一样，`_grades` 数组实例变量会自动初始化为 `null`。在开始分析成绩之前，你必须设置\
  \ `_grades` 实例变量，使其引用你想要分析的成绩数据。这是通过 `setGrades(int[])` 方法完成的。一旦 GradeAnalyzer 有了要分析的成绩集合，就可以调用\
  \ `meanGrade()`、`minGrade()` 和 `maxGrade()` 方法来计算各自的统计值。这三个方法共同演示了如何遍历数组元素、如何访问数组元素以及如何确定数组可以容纳的元素数量。要确定数组可以容纳的元素数量，只需访问隐式定义的\
  \ final 实例变量 `length`，该变量为所有数组定义：\n\n`_grades.length`\n\n要遍历数组元素，只需使用一个 `for` 循环，其索引变量遍历数组的所有可能索引。数组索引从\
  \ 0 开始，因此最后一个数组索引始终是 `(_grades.length - 1)`。在遍历数组时，你可以通过使用数组变量名后跟方括号括起来的当前索引（通常称为数组下标）来访问当前索引处的数组元素：\n\
  \n```java\n// 来自 meanGrade() 方法：\nfor (int i = 0; i < _grades.length; i++) {\n \
  \   sum += _grades[i];\n}\n```\n\n或者，可以使用增强型 `for` 循环（也称为 `foreach` 循环）来遍历数组（有关\
  \ `foreach` 循环的更多讨论，请参见方案 7-7）：\n\n```java\nfor (int grade : _grades) {\n    sum\
  \ += grade;\n}\n```\n\n请注意，为了确定最小和最大成绩，首先使用 `java.util.Arrays` 类中的实用排序方法按自然（升序）顺序对成绩进行排序。排序后，最小成绩就是数组的第一个元素（索引\
  \ 0），最大成绩就是数组的最后一个元素（索引 `length - 1`）。\n\n解决方案中的三个静态类方法 `initGrades1()`、`initGrades2()`\
  \ 和 `initGrades3()` 演示了创建和初始化用于“填充”GradeAnalyzer 的数组数据的三种不同方式。`initGrades1()` 方法声明并创建一个可以容纳五个成绩的数组（使用\
  \ `new`），然后手动将每个元素索引处的值设置为一个整数成绩值。`initGrades2()` 方法使用特殊的数组初始化语法将数组创建和初始化合并为一行：\n\
  \n```java\nint[] grades = { 57, 88, 67, 95, 99, 74, 81 };\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 数据结构与集合\n\n此语法创建一个长度为 7 的数组，并将索引 0 到索引 6 的元素初始化为所示的整数值。请注意，此语法只能在数组声明中使用，因此以下写法是不允许的：\n\
  \n```java\nint[] grades;\ngrades = { 57, 88, 67, 95, 99, 74, 81 }; // 无法编译\n```\n\
  \n`initGrades3()` 方法看起来与 `initGrades2()` 非常相似，但略有不同。此代码创建并返回一个匿名（未命名）数组：\n\n```java\n\
  return new int[]{ 100, 70, 55, 89, 97, 98, 82 };\n```\n\n使用此语法，你使用 `new` 关键字和数组元素类型，但未显式指定数组的大小。与\
  \ `initGrades2()` 方法中显示的数组初始化语法类似，数组大小由初始化大括号中给出的元素数量隐含确定。因此，此代码再次创建并返回一个长度为 7 的数组。\n\
  \n在计算了三组成绩数据的成绩统计值之后，GradeAnalyzer 的 `main()` 方法的其余部分演示了可用于确定数组类型信息以及将数组转换为可打印字符串的各种方法。你会看到代码首先将从调用\
  \ `getGrades()` 实例方法返回的数组赋值给一个名为 `testArray` 的 Object 变量：\n\n```java\nObject testArray\
  \ = ga.getGrades();\n```\n\n你可以进行此赋值，因为如前所述，数组是一个 Object。你也可以通过调用 `testArray.getSuperclass()`\
  \ 的结果看到这一点。调用 `testArray.getClass().getName()` 也很有趣；它返回 `[I`。左括号表示“我是一个数组类型”，而“I”表示“组件类型为整数”。这也得到了调用\
  \ `testArray.getComponentType()` 结果的支持。最后，你调用 `Arrays.toString(int[])` 方法，该方法返回数组及其内容的格式良好的字符串表示形式。请注意，因为\
  \ `testArray` 是一个 Object 引用，所以必须将其强制转换为 int 数组才能用于 `Arrays.toString(int[])` 方法。（有关可与数组一起使用的其他实用方法，请参阅\
  \ `java.util.Arrays` 类的 Java 文档。）如你所见，数组简单且易于使用。有时这种简单性对你有利。方案 7-6 展示了数组类型的一种替代方案：ArrayList\
  \ 集合类，它提供了易于插入和删除元素的功能。\n\n7-5. 安全地使类型或方法能够操作各种类型的对象\n\n问题\n\n你的应用程序使用了许多不同的对象类型，并且你的类中有一些容器可用于容纳这些不同类型。你希望确保应用程序保持无错误，同时你又希望能够动态更改特定容器可能持有的对象类型。\n\
  \n解决方案\n\n使用泛型类型将类型与容器解耦。泛型是一种对对象类型进行抽象的方式，不显式声明对象或容器的类型应该是什么。你很可能在使用 Java 集合框架（[`download.oracle.com/javase/tutorial/collections/`](http://download.oracle.com/javase/tutorial/collections/)）的接口和类时首次遇到泛型类型。\n\
  \n\n\n[com/javase/tutorial/collections/](http://download.oracle.com/javase/tutorial/collections/))。集合框架大量使用了\
  \ Java 泛型。所有集合类型都经过参数化，允许你在实例化时指定集合可以容纳的元素类型。以下示例代码演示了如何在几种不同场景下使用泛型。代码中的注释标明了使用泛型的位置。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 数据结构与集合\n\npublic class\
