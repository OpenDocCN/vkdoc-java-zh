  \nStringBuilder template = new StringBuilder();\n\n...// HTML 网页的头部部分\n\ntemplate.append(\"\
  <form>\\n\");\n\ntemplate.append(\" <input type=\\\"button\\\" onclick=\\\"alert('warning')\\\
