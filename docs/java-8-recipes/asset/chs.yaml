  ResultSet rs = pstmt.executeQuery();\n\nwhile(rs.next()){\n\nSystem.out.println(rs.getString(2)\
  \ + \": \" + rs.getString(3) +\n\n\" - \" + rs.getString(4));\n\n}\n\n} catch (SQLException\
  \ ex) {\n\nex.printStackTrace();\n\n}\n\n}\n\nprivate static boolean insertRecord(String\
  \ recipeNumber,\n\nString title,\n\nString description,\n\nString text){\n\nString\
  \ sql = \"INSERT INTO RECIPES VALUES(\" +\n\n\"NEXT VALUE FOR RECIPES_SEQ, ?,?,?,?)\"\
  ;\n\nboolean success = false;\n\ntry(PreparedStatement pstmt = conn.prepareStatement(sql);)\
  \ {\n\npstmt.setString(1, recipeNumber);\n\npstmt.setString(2, title);\n\npstmt.setString(3,\
  \ description);\n\npstmt.setString(4, text);\n\npstmt.executeUpdate();\n\nSystem.out.println(\"\
  Record successfully inserted.\");\n\nsuccess = true;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n} catch (SQLException ex){\n\nsuccess = false;\n\nex.printStackTrace();\n\
  \n}\n\nreturn success;\n\n}\n\n}\n\n最终，如果任何一条语句失败，所有事务都将被回滚。但是，如果所有语句都正确执行，则所有内容都将被提交。\n\
  \n工作原理\n\n\n\n事务管理在应用程序中扮演着重要角色，尤其对于执行相互依赖的不同任务的应用程序而言更是如此。在许多情况下，如果事务中执行的任务之一失败，最好让整个事务失败，而不是只完成部分任务。例如，假设您正在向应用程序数据库添加数据库用户记录。现在，假设为应用程序添加用户需要修改几个不同的数据库表，可能还需要修改角色表等。\n\
  \n如果第一个表修改成功，而第二个表修改失败，会发生什么？您将得到一个部分完成的应用程序用户添加操作，并且您的用户很可能无法按预期访问应用程序。在这种情况下，如果某个更新失败，最好回滚所有已完成的数据库修改，以便数据库保持干净状态，并可以再次尝试该事务。\n\
  \n默认情况下，`Connection` 对象设置为启用自动提交。这意味着每个数据库的 `INSERT`、`UPDATE` 或 `DELETE` 语句都会立即提交。通常，这是您希望应用程序运行的方式。但是，在有许多相互依赖的数据库语句的情况下，关闭自动提交非常重要，以便所有语句可以一次性提交。为此，请调用\
  \ `Connection` 对象的 `setAutoCommit()` 方法并传入 `false` 值。如本方案解决方案所示，调用 `setAutoCommit()`\
  \ 方法并传入 `false` 值后，执行数据库语句。这样做会使所有数据库语句的更改保持临时状态，直到调用 `Connection` 对象的 `commit()`\
  \ 方法。\n\n这使您能够在调用 `commit()` 之前确保所有语句正确执行。请查看本方案解决方案中 `TransactionExample` 类的 `main()`\
  \ 方法中包含的以下事务管理代码：\n\n```java\nboolean successFlag = false;\n\n...\n\nCreateConnection\
  \ createConn = new CreateConnection();\n\nconn = createConn.getConnection();\n\n\
  conn.setAutoCommit(false);\n\nqueryDbRecipes();\n\nsuccessFlag = insertRecord(\n\
  \n\"13-6\",\n\n\"Simplifying and Adding Security with Prepared Statements\",\n\n\
  \"Working with Prepared Statements\",\n\n\"Recipe Text\");\n\nif (successFlag ==\
  \ true){\n\n    successFlag = insertRecord(\n\n        null,\n\n        \"Simplifying\
  \ and Adding Security with Prepared Statements\",\n\n        \"Working with Prepared\
  \ Statements\",\n\n        \"Recipe Text\");\n\n}\n\n// 提交事务\nif (successFlag ==\
  \ true)\n    conn.commit();\nelse\n    conn.rollback();\n\nconn.setAutoCommit(true);\n\
  ```\n\n请注意，仅当所有事务语句都成功处理时，才会调用 `commit()` 方法。如果其中任何一个失败，`successFlag` 将等于 `false`，这将导致调用\
  \ `rollback()` 方法。在本方案的解决方案中，第二次调用 `insertRecord()` 尝试将 `NULL` 值插入 `RECIPES.ID`\
  \ 列，这是不允许的。因此，该插入操作失败，所有操作（包括之前的插入）都会被回滚。\n\n### 13-8. 创建可滚动的 ResultSet\n\n####\
  \ 问题\n\n您已经查询了数据库并获得了一些结果。您希望将这些结果存储在一个对象中，该对象允许您在结果中向前和向后遍历，并根据需要更新值。\n\n#### 解决方案\n\
  \n创建一个可滚动的 `ResultSet` 对象，然后您将能够读取下一条、第一条、最后一条和前一条记录。使用可滚动的 `ResultSet` 允许以任何方向获取查询结果，以便根据需要检索数据。以下示例方法演示了如何创建可滚动的\
  \ `ResultSet` 对象：\n\n```java\nprivate static void queryDbRecipes(){\n    String\
  \ sql = \"SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION \" +\n            \
  \     \"FROM RECIPES\";\n    try(PreparedStatement pstmt = conn.prepareStatement(sql,\n\
  \            ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n \
  \       ResultSet rs = pstmt.executeQuery()) {\n        rs.first();\n        System.out.println(rs.getString(2)\
  \ + \": \" + rs.getString(3) +\n                           \" - \" + rs.getString(4));\n\
  \        rs.next();\n        System.out.println(rs.getString(2) + \": \" + rs.getString(3)\
  \ +\n                           \" - \" + rs.getString(4));\n        rs.previous();\n\
  \        System.out.println(rs.getString(2) + \": \" + rs.getString(3) +\n     \
  \                      \" - \" + rs.getString(4));\n        rs.last();\n       \
  \ System.out.println(rs.getString(2) + \": \" + rs.getString(3) +\n            \
  \               \" - \" + rs.getString(4));\n    } catch (SQLException ex) {\n \
  \       ex.printStackTrace();\n    }\n}\n```\n\n执行此方法将使用本章最初加载的数据产生以下输出：\n\n```\n\
  Successfully connected\n13-1: Connecting to a Database - DriverManager and DataSource\
  \ Implementations - More to Come\n13-2: Querying a Database and Retrieving Results\
  \ - Obtaining and Using Data from a DBMS\n13-1: Connecting to a Database - DriverManager\
  \ and DataSource Implementations - More to Come\n13-3: Handling SQL Exceptions -\
  \ Using SQLException\n```\n\n#### 工作原理\n\n普通的 `ResultSet` 对象允许以向前方向获取结果。也就是说，应用程序可以从检索到的第一条记录开始，向前处理到最后一条记录。有时，应用程序在遍历\
  \ `ResultSet` 时需要更多功能。例如，假设您想编写一个应用程序，允许某人显示检索到的第一条或最后一条记录，或者向前或向后翻页浏览结果。使用标准的 `ResultSet`\
  \ 很难做到这一点。但是，通过创建可滚动的 `ResultSet`，您可以轻松地在结果中向后和向前移动。\n\n要创建可滚动的 `ResultSet`，您必须首先创建一个能够生成可滚动\
  \ `ResultSet` 的 `Statement` 或 `PreparedStatement` 实例。也就是说，在创建 `Statement` 时，必须将\
  \ `ResultSet` 滚动类型常量值传递给 `Connection` 对象的 `createStatement()` 方法。同样，在使用 `PreparedStatement`\
  \ 时，必须将滚动类型常量值传递给 `Connection` 对象的 `prepareStatement()` 方法。有三种可用的滚动类型常量。表 13-1 展示了这三个常量。\n\
  \n**表 13-1.** *ResultSet 滚动类型常量*\n\n| **常量** | **描述** |\n| --- | --- |\n| `ResultSet.TYPE_FORWARD_ONLY`\
  \ | 默认类型，仅允许向前移动。 |\n| `ResultSet.TYPE_SCROLL_INSENSITIVE` | 允许向前和向后移动。对 `ResultSet`\
  \ 更新不敏感。 |\n| `ResultSet.TYPE_SCROLL_SENSITIVE` | 允许向前和向后移动。对 `ResultSet` 更新敏感。\
  \ |\n\n您还必须传递一个 `ResultSet` 并发常量，以指示 `ResultSet` 是否可更新。默认值为 `ResultSet.CONCUR_READ_ONLY`，表示\
  \ `ResultSet` 不可更新。另一种并发类型是 `ResultSet.CONCUR_UPDATABLE`，表示可更新的 `ResultSet` 对象。\n\
  \n在本方案的解决方案中，使用了 `PreparedStatement` 对象，创建能够生成可滚动 `ResultSet` 的 `PreparedStatement`\
  \ 对象的代码如下所示：\n\n```java\npstmt = conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_INSENSITIVE,\n\
  \                              ResultSet.CONCUR_READ_ONLY);\n```\n\n一旦这样创建了 `PreparedStatement`，就会返回一个可滚动的\
  \ `ResultSet`。您可以通过调用 `ResultSet` 的方法来指示要移动的方向或要定位的位置，从而使用可滚动的 `ResultSet` 在多个方向上遍历。以下代码行将检索\
  \ `ResultSet` 中的第一条记录：\n\n```java\nResultSet rs = pstmt.executeQuery();\nrs.first();\n\
  ```\n\n\n\n本方案演示了几种不同的滚动方向。具体来说，你可以看到按顺序调用了 ResultSet 的 `first()`、`next()`、`last()`\
  \ 和 `previous()` 方法，以移动到 ResultSet 中的不同位置。有关 ResultSet 对象的完整参考，请参阅位于 [`docs.oracle.com/javase/8/docs/api/java/sql/ResultSet.html`](http://download.java.net/jdk8/docs/api/java/sql/ResultSet.html)\
  \ 的在线文档。\n\n可滚动的 ResultSet 对象在应用程序开发中有着特定的用途。它们属于那种“需要时就在那里”的便利功能，但同时也是你可能并不经常需要的东西。\n\
  \n13-9. 创建可更新的 ResultSet\n\n问题\n\n一个应用程序任务已经查询了数据库并获得了结果。你将这些结果存储到了一个 ResultSet\
  \ 对象中，现在想要更新该 ResultSet 中的某些值，并将它们提交回数据库。\n\n解决方案\n\n使你的 ResultSet 对象可更新，然后在遍历结果时根据需要更新行。下面的示例方法演示了如何使\
  \ ResultSet 可更新，以及如何更新该 ResultSet 中的内容，并最终将其持久化到数据库中：\n\n```java\nprivate static\
  \ void queryAndUpdateDbRecipes(String recipeNumber){\n\n    String sql = \"SELECT\
  \ ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION \" +\n                 \"FROM RECIPES\
  \ \" +\n                 \"WHERE RECIPE_NUMBER = ?\";\n\n    ResultSet rs = null;\n\
  \n    try (PreparedStatement pstmt =\n             conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_SENSITIVE,\
  \ ResultSet.CONCUR_UPDATABLE);){\n\n        pstmt.setString(1, recipeNumber);\n\
  \        rs = pstmt.executeQuery();\n\n        while(rs.next()){\n            String\
  \ desc = rs.getString(4);\n            System.out.println(\"Updating row\" + desc);\n\
  \            rs.updateString(4, desc + \" -- More to come\");\n            rs.updateRow();\n\
  \        }\n\n    } catch (SQLException ex) {\n        ex.printStackTrace();\n \
  \   } finally {\n        [www.it-ebooks.info](http://www.it-ebooks.info/)\n    \
  \    // 第 13 章 使用数据库\n        if (rs != null){\n            try {\n            \
  \    rs.close();\n            } catch (SQLException ex) {\n                ex.printStackTrace();\n\
  \            }\n        }\n    }\n}\n```\n\n可以调用此方法，并传入一个包含配方编号的字符串值。假设将配方编号 \"\
  13-1\" 传递给此方法，将得到以下输出结果：\n\n```\nSuccessfully connected\n13-1: Connecting to a Database\
  \ - DriverManager and DataSource Implementations\n13-2: Querying a Database and\
  \ Retrieving Results - Obtaining and Using Data from a DBMS\n13-3: Handling SQL\
  \ Exceptions - Using SQLException\nUpdating rowDriverManager and DataSource Implementations\n\
  13-1: Connecting to a Database - DriverManager and DataSource Implementations -\
  \ More to come\n13-2: Querying a Database and Retrieving Results - Obtaining and\
  \ Using Data from a DBMS\n13-3: Handling SQL Exceptions - Using SQLException\n```\n\
  \n工作原理\n\n有时你需要在解析数据的同时更新数据。通常，这种技术涉及测试从数据库返回的值，并在与另一个值进行比较后更新它们。最简单的方法是通过将 `ResultSet.CONCUR_UPDATABLE`\
  \ 常量传递给 Connection 对象的 `createStatement()` 或 `prepareStatement()` 方法，使 ResultSet\
  \ 对象可更新。这样做会使 Statement 或 PreparedStatement 生成一个可更新的 ResultSet。\n\n**注意** 某些数据库的\
  \ JDBC 驱动程序不支持可更新的 ResultSet。有关更多信息，请参阅你的 JDBC 驱动程序文档。此代码是使用 Oracle 的 ojdbc6.jar\
  \ JDBC 驱动程序在 Oracle 数据库 11.2 版本上运行的。\n\n创建能够生成可更新 ResultSet 的 Statement 的格式是：将 ResultSet\
  \ 类型作为第一个参数，将 ResultSet 并发模式作为第二个参数。滚动类型必须为 `TYPE_SCROLL_SENSITIVE`，以确保 ResultSet\
  \ 对任何更新都敏感。以下代码通过创建一个将生成可滚动且可更新的 ResultSet 对象的 Statement 对象来演示此技术：\n\n```java\n\
  Statement stmt = conn.createStatement(ResultSet.TYPE_SCROLL_SENSITIVE,\n       \
  \                               ResultSet.CONCUR_UPDATABLE);\n```\n\n\n创建可生成可更新\
  \ ResultSet 的 PreparedStatement 的格式是：将 SQL 字符串作为第一个参数，ResultSet 类型作为第二个参数，ResultSet\
  \ 并发模式作为第三个参数。本方案通过以下代码行演示了此技术：`pstmt = conn.prepareStatement(sql, ResultSet.TYPE_SCROLL_SENSITIVE,\
  \ ResultSet.CONCUR_UPDATABLE);`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 数据库操作\n\n本节讨论的两行代码都将生成可滚动且可更新的 ResultSet 对象。获得可更新的 ResultSet 后，你可以像使用普通\
  \ ResultSet 一样，用它来获取从数据库中检索到的值。此外，你还可以调用 ResultSet 对象的某个 `updateXXX()` 方法来更新 ResultSet\
  \ 中的任何值。在本方案的解决方案中，调用了 `updateString()` 方法，将查询中值的位置作为第一个参数，将更新后的文本作为第二个参数。在此例中，SQL\
  \ 查询中列出的第四个元素列将被更新。\n\n`rs.updateString(4, desc + \" -- More to come\");`\n\n最后，要持久化你所更改的值，请调用\
  \ ResultSet 的 `updateRow()` 方法，如本方案的解决方案所示：\n\n`rs.updateRow();`\n\n创建可更新的 ResultSet\
  \ 并非每天都需要做的事情。事实上，你可能永远都不需要创建可更新的 ResultSet。然而，在需要这种策略的情况下，此技术会非常有用。\n\n13-10. 缓存数据以供离线使用\n\
  \n问题\n\n你希望在离线状态下处理来自数据库管理系统（DBMS）的数据。也就是说，你正在一台未连接到数据库的设备上工作，但仍希望像在线一样处理一组数据。例如，你正在便携式设备上处理数据，并且离开了办公室，没有网络连接。你希望能够查询、插入、更新和删除数据，即使没有连接。\n\
  \n一旦连接可用，你希望设备能够同步离线期间所做的任何数据库更改。\n\n解决方案\n\n使用 `CachedRowSet` 对象来存储你希望在离线时处理的数据。这将使你的应用程序能够像连接到数据库一样处理数据。一旦恢复连接或重新连接到数据库，将\
  \ `CachedRowSet` 中已更改的数据与数据库仓库同步。以下示例类演示了 `CachedRowSet` 的使用。在此场景中，`main()` 方法执行该示例。不过，假设没有\
  \ `main()` 方法，而是便携式设备上的另一个应用程序调用此类的各个方法。请跟随示例中的代码，并考虑在未连接数据库的情况下处理存储在 `CachedRowSet`\
  \ 中的结果的可能性。例如，假设你在办公室时已连接到网络并开始了一些工作，现在你离开了办公室，网络信号不稳定，无法保持与数据库的持续连接：\n\n```java\n\
