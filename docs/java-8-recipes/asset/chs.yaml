  使用此 XSL 文件将 XML 转换为 HTML 文件的过程很直接，但每一步都可以通过添加额外的错误检查和流程处理来增强。对于此示例，请参考解决方案部分之前的代码。\n\
  \n最基本的转换步骤如下：\n\n1.  将 XSL 文档作为 `Source` 对象读入 Java 应用程序。\n2.  创建一个 `Transformer`\
  \ 实例，并提供您的 XSL `Source` 实例供其在操作过程中使用。\n3.  创建一个代表源 XML 内容的 `SourceStream`。\n4. \
  \ 为输出文档（本例中为 HTML 文件）创建一个 `StreamResult` 实例。\n5.  使用 `Transformer` 对象的 `transform()`\
  \ 方法执行转换。\n6.  根据需要关闭所有相关的流和文件实例。\n\n如果您选择执行示例代码，应使用 `patients.xml`、`patients.xsl`\
  \ 和 `patients.html` 作为参数，按以下方式调用：\n\n```bash\njava org.java8recipes.chapter20.recipe20_3.TransformXml\
  \ <xmlFile><xslFile><outputFile>\n```\n\n20-4. 验证 XML\n\n问题\n\n您希望确认您的 XML 是有效的——即它符合已知的文档定义或模式。\n\
  \n解决方案\n\n使用 `javax.xml.validation` 包验证您的 XML 是否符合特定模式。以下来自 `org.java8recipes.chapter20.recipe20_4.ValidateXml`\
  \ 的代码片段演示了如何针对 XML 模式文件进行验证：\n\n```java\nimport java.io.File;\n\nimport java.io.IOException;\n\
  \nimport javax.xml.XMLConstants;\n\nimport javax.xml.transform.Source;\n\nimport\
  \ javax.xml.transform.stream.StreamSource;\n\nimport javax.xml.validation.Schema;\n\
  \nimport javax.xml.validation.SchemaFactory;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 20 章 XML 处理\n\n```java\nimport javax.xml.validation.Validator;\n\nimport org.xml.sax.SAXException;\n\
  \n...\n\npublic void run(String xmlFile, String validationFile) {\n\nboolean valid\
  \ = true;\n```\n\n\nSchemaFactory sFactory =\n\nSchemaFactory.newInstance(XMLConstants.W3C_XML_SCHEMA_NS_URI);\n\
  \ntry {\n\nSchema schema = sFactory.newSchema(new File(validationFile));\n\nValidator\
  \ validator = schema.newValidator();\n\nSource source = new StreamSource(new File(xmlFile));\n\
  \nvalidator.validate(source);\n\n} catch (SAXException | IOException | IllegalArgumentException\
  \ ex) {\n\nvalid = false;\n\n}\n\nSystem.out.printf(\"XML file is %s.\\n\", valid\
  \ ? \"valid\" : \"invalid\");\n\n}\n\n...\n\n工作原理\n\n在使用 XML 时，对其进行验证以确保语法正确，并确保\
  \ XML 文档是指定 XML 模式的实例，这一点非常重要。验证过程涉及比较模式和 XML 文档，以发现任何差异。`javax.xml.validation`\
  \ 包提供了可靠地针对各种模式验证 XML 文件所需的所有类。您将用于 XML 验证的最常见模式在 `XMLConstants` 类中定义为常量 URI：\n\n\
  u `XMLConstants.W3C_XML_SCHEMA_NS_URI`\n\nu `XMLConstants.RELAXNG_NS_URI`\n\n首先，为特定类型的模式定义创建一个\
  \ `SchemaFactory`。`SchemaFactory` 知道如何解析特定的模式类型，并为其验证做好准备。使用 `SchemaFactory` 实例创建一个\
  \ `Schema` 对象。\n\n`Schema` 对象是模式定义语法的内存表示。您可以使用 `Schema` 实例来获取一个理解此语法的 `Validator`\
  \ 实例。最后，使用 `validate()` 方法来检查您的 XML。如果在验证过程中出现任何问题，该方法调用将生成多个异常。\n\n否则，`validate()`\
  \ 方法会静默返回，您可以继续使用该 XML 文件。\n\nN **注意** XML Schema 于 2001 年首次获得万维网联盟（W3C）的“推荐”状态。此后，出现了竞争性的模式。一种竞争模式是用于\
  \ XML 下一代的正则语言（RELAX NG）模式。RELAX NG 可能是一种更简单的模式，其规范还定义了一种非 XML 的紧凑语法。本配方的示例使用了 XML\
  \ 模式。\n\n使用以下命令行语法运行示例代码，最好分别使用提供的示例 `.xml` 文件和验证文件 `resources/patients.xml` 和 `patients.xsl`：\n\
  \njava org.java8recipes.chapter20.recipe20_4.ValidateXml <xmlFile><validationFile>\
  \ 547\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 20 章 N XML 处理\n\n\
  20-5. 为 XML 模式创建 Java 绑定\n\n问题\n\n您想要生成一组代表 XML 模式中对象的 Java 类（Java 绑定）。\n\n解决方案\n\
  \nJDK 提供了一个工具，可以将模式文档转换为代表性的 Java 类文件。使用\n\n`<JDK_HOME>/bin/xjc` 命令行工具为您的 XML 模式生成\
  \ Java 绑定。要为配方 20-3 中的 `patients.xsd` 文件创建 Java 类，您可以在控制台中发出以下命令：`xjc –p org.java8recipes.chapter20.recipe20_5\
  \ patients.xsd`\n\n此命令将处理 `patients.xsd` 文件，并创建处理使用此模式验证的 XML 文件所需的所有类。对于此示例，`patients.xsd`\
  \ 文件如下所示：\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<xs:schema elementFormDefault=\"\
  qualified\">\n\n<xs:element name=\"patients\">\n\n<xs:complexType>\n\n<xs:sequence>\n\
