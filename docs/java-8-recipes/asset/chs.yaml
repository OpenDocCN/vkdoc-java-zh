  \n总结\n\nJavaFX 从一开始就是开发基于媒体的应用程序的平台。JavaFX Media API 使开发者能够轻松地将媒体和基于媒体的控件添加到任何应用程序中。在早期版本的\
  \ JavaFX 中，视频和音频类型更为有限。Java 8 使得支持不同的媒体类型以及通过 lambda 表达式实现媒体控件变得更加容易。\n\n本章简要概述了\
  \ JavaFX Media API 的一些功能。然而，我们甚至还没有触及可能性的皮毛。有关 JavaFX Media API 的更多信息，请参阅在线文档，网址为\
  \ [`docs.oracle.com/javase/8/javafx/api/javafx/scene/media/package-summary.html。`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/media/package-summary.html)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 17 章**\n\n**Web 上的 JavaFX**\n\
  \nJavaFX 提供了与 HTML5 互操作的新功能。JavaFX 中底层的网页渲染引擎是名为 Webkit 的流行开源 API。Webkit 也用于 Google\
  \ 的 Chrome 和 Apple 的 Safari 浏览器。\n\n\n\nHTML5 内容由 JavaScript、CSS、可缩放矢量图形（SVG）以及新的\
  \ HTML 元素标签组成。JavaFX 与 HTML5 之间的关系之所以重要，是因为它们能够取长补短，相互补充。例如，JavaFX 丰富的客户端 API 与\
  \ HTML5 丰富的 Web 内容相结合，能够创造出一种兼具桌面软件特性的 Web 应用般的用户体验。这类新型应用被称为富客户端应用。\n\n本章涵盖以下主题：\n\
  \nu 在 HTML 网页中嵌入 JavaFX 应用\n\nu 显示 HTML5 内容\n\nu 使用 Java 代码操控 HTML5 内容\n\nu 响应 HTML\
  \ 事件\n\nu 显示数据库中的内容\n\nJavaFX 并不会取代 HTML5，反之亦然。相反，它们相辅相成，本章将提供一些范例，展示如何利用这两种技术协同工作的优势。\n\
