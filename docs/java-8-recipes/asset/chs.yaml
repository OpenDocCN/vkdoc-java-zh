  \nJava 提供了多种读取 XML 文档的方式。其中一种是使用 StAX，这是一种流式模型。它优于较旧的 SAX API，因为它允许你同时读取和写入 XML\
  \ 文档。尽管 StAX 不如 DOM API 强大，但它是一个出色且高效的 API，对内存资源的消耗更小。\n\n\n\nStAX 提供了两种读取 XML 文档的方法：游标\
  \ API 和迭代器 API。面向游标的 API 使用一个游标，该游标可以从头到尾遍历 XML 文档，一次指向一个元素，并且始终向前移动。迭代器 API 将 XML\
  \ 文档流表示为一组离散的事件对象，这些对象按照它们在源 XML 中被读取的顺序提供。目前，面向事件的迭代器 API 比游标 API 更受青睐，因为它提供的 XMLEvent\
  \ 对象具有以下优点：\n\n-   XMLEvent 对象是不可变的，即使 StAX 解析器已移动到后续事件，它们也能持久存在。你可以将这些 XMLEvent\
  \ 对象传递给其他进程，或将其存储在列表、数组和映射中。\n\n-   你可以继承 XMLEvent，根据需要创建自己的专用事件。\n\n-   你可以通过添加或删除事件来修改传入的事件流，这比游标\
  \ API 更灵活。\n\n要使用 StAX 读取文档，请在文件输入流上创建一个 XML 事件读取器。使用 `hasNext()` 方法检查事件是否仍然可用，并使用\
  \ `nextEvent()` 方法读取每个事件。`nextEvent()` 方法将返回特定类型的 XMLEvent，该事件对应于 XML 文件中的开始和结束元素、属性和值数据。完成这些对象的操作后，请记得关闭读取器和文件流。\n\
  \n你可以像这样调用示例应用程序，使用 `patients.xml` 文件作为 `<xmlFile>` 参数：`java org.java8recipes.chapter20.recipe20_2.DocReader\
  \ <xmlFile>`\n\n20-3. 转换 XML\n\n问题\n\n你想将 XML 文档转换为另一种格式，例如 HTML。\n\n解决方案\n\n使用\
