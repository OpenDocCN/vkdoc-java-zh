  5-4. 生成类的实例\n\n问题\n\n在你的某个应用程序中，你希望提供动态生成对象实例的能力。对象的每个实例都应立即可用，并且对象创建者无需了解对象创建的细节。\n\
  \n解决方案\n\n使用工厂方法模式来实例化类的实例，同时将创建过程对对象创建者进行抽象。创建一个工厂，使得在调用时能够返回类的新实例。\n\n以下类代表一个简单工厂，每次调用其\
