  \n工作原理\n\n在开始之前，我先讨论一下如何操作这个 MP3 播放器。用户可以将音频文件拖放到应用程序区域中进行播放。应用程序右下角有用于停止、暂停和恢复音频媒体播放的按钮。（按钮控件如图\
  \ 16-2 所示。）在音乐播放过程中，用户还会注意到随机颜色的球体随着音乐跳动。当用户听完音乐后，可以点击右上角的白色圆角关闭按钮退出应用程序。\n\n这与配方\
  \ 15-1 类似，在配方 15-1 中，你学习了如何使用拖放桌面隐喻将文件加载到 JavaFX 应用程序中。不过，这里用户访问的是音频文件，而不是图像文件。JavaFX\
  \ 目前支持以下音频文件格式：.mp3、.wav 和 .aiff。\n\n为了保持相同的外观和感觉，你将使用与配方 15-1 相同的样式。在本配方中，你将修改按钮控件，使其看起来像按钮，类似于许多媒体播放器应用程序。当按下暂停按钮时，它将暂停音频媒体的播放，并切换到播放按钮控件，从而允许用户恢复播放。作为额外奖励，MP3\
