  \ `properties.conf` 的属性文件，加载值供应用程序使用，最后设置一个属性并将其写入文件。\n\n```java\nFile file = new\
  \ File(\"properties.conf\");\ntry {\n    if (!file.exists()) file.createNewFile();\n\
  } catch (IOException e) {\n    e.printStackTrace();\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 8 章 N 输入与输出\n\n```java\nProperties properties = new Properties();\ntry {\n \
