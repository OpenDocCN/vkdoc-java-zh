  \n第 12 章 N UNICODE、国际化与货币代码\n\n工作原理\n\n`java.io` 和 `java.nio.charset` 包包含几个类，可以帮助你对大型文本流或缓冲区执行编码转换。流是方便的抽象，可以帮助你使用各种源和目标来转换文本。流可以表示\
  \ HTTP 连接甚至文件中的传入或传出文本。\n\n\n\n如果使用 `InputStream` 表示底层源文本，则需要将该流包装在 `InputStreamReader`\
  \ 中，以执行从字节流到字符流的转换。读取器实例负责执行从字节到 Unicode 字符的转换。\n\n使用 `OutputStream` 实例表示目标文本时，请将该流包装在\
  \ `OutputStreamWriter` 中。写入器会将您的 Unicode 文本转换为目标流中面向字节的编码。\n\n要有效使用 `OutputStreamWriter`\
  \ 或 `InputStreamReader`，您必须了解目标或源文本的字符编码。使用 `OutputStreamWriter` 时，源文本始终是 Unicode，您必须提供一个字符集参数，告知写入器如何转换为目标面向字节的文本编码。使用\
  \ `InputStreamReader` 时，目标编码始终是 Unicode。您必须提供源文本编码作为参数，以便读取器理解如何转换文本。\n\nN **注意**\
  \ Java 平台的 `String` 以 Unicode 的 UTF-16 编码表示字符。Unicode 可以有多种编码，包括 UTF-16、UTF-8，甚至\
  \ UTF-32。在本讨论中，转换为 Unicode 始终意味着转换为 UTF-16。转换为面向字节的编码通常意味着转换为传统的非 Unicode 字符集编码。然而，一种常见的面向字节的编码是\
  \ UTF-8，使用 `InputStreamReader` 或 `OutputStreamWriter` 类将 Java 的“原生”UTF-16 Unicode\
  \ 字符与 UTF-8 相互转换是完全合理的。\n\n执行编码转换的另一种方法是使用 `CharsetEncoder` 和 `CharsetDecoder` 类。\n\
  \n`CharsetEncoder` 会将您的 Unicode `CharBuffer` 实例编码为 `ByteBuffer` 实例。`CharsetDecoder`\
  \ 会将 `ByteBuffer` 实例解码为 `CharBuffer` 实例。无论哪种情况，您都必须提供一个字符集参数。\n\n字符集表示在 IANA 字符集注册表中定义的字符集编码。创建字符集实例时，应使用注册表定义的字符集的规范名称或别名。您可以在\
  \ [`www.iana.org/assignments/character-sets`](http://www.iana.org/assignments/character-sets)\
  \ 找到该注册表。\n\n请记住，您的 Java 实现不一定支持所有 IANA 字符集名称。但是，所有实现都必须至少支持本章配方 12-7 中列出的那些字符集。\n\
  \n12-9. 设置区域敏感服务的搜索顺序\n\n问题\n\n您希望在 Java 运行时环境中为区域敏感服务指定特定的搜索顺序。\n\n解决方案\n\n使用 `java.locale.providers`\
  \ 属性指定区域敏感服务的所需顺序。在以下示例中，该属性中指定了 SPI 和 CLDR 提供者。\n\n`java.locale.providers=SPI,CLDR`\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 N UNICODE、国际化与货币代码\n\
  \n工作原理\n\n从 Java 8 版本开始，设置 `java.locale.providers` 属性可指定区域敏感服务的搜索顺序。该属性在 Java 运行时启动时被读取。要设置服务顺序，请指定用逗号分隔的缩写。以下服务可供使用：\n\
  \n-   SPI：由 SPI（服务提供者接口）提供者表示的区域敏感服务\n-   JRE：Java 运行时环境中的区域敏感服务\n-   CLDR：基于 Unicode\
  \ 联盟的 CLDR 项目的提供者\n-   HOST：反映底层操作系统中用户自定义设置的提供者\n\n总结\n\n国际化是开发具有文化适应性的应用程序的关键。它允许更改应用程序文本，以适应用户所在的文化和语言。本章提供了一些示例，说明如何利用国际化技术来克服跨文化开发的细微差别。本章还涵盖了有关\
  \ Unicode 转换的主题。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 13 章**\n\
  \n**使用数据库**\n\n几乎任何重要的应用程序都包含某种数据库。一些应用程序使用内存数据库，而另一些则使用传统的关系数据库管理系统（RDBMS）。无论哪种情况，每个\
  \ Java 开发人员都具备一些使用数据库的技能是至关重要的。多年来，Java 数据库连接（JDBC）API 已经发生了很大的变化，并且在过去的几个版本中有了一些重大的进步。\n\
  \n本章涵盖了使用 JDBC 处理数据库的基础知识。您将学习如何执行所有标准数据库操作，以及一些用于操作数据的高级技术。您还将学习如何创建安全的数据库应用程序，并利用\
  \ API 中的一些最新进展来节省开发时间。最后，您将能够开发与 Oracle 数据库、PostgreSQL 和 MySQL 等传统 RDBMS 协同工作的 Java\
  \ 应用程序。\n\nN **注意** 要跟随本章示例进行操作，请运行 `create_user.sql` 脚本来创建数据库用户模式。然后，在您刚刚创建的数据库模式中运行\
  \ `create_database.sql` 脚本。\n\n本书中的数据库示例是为与 Apache Derby 或 Oracle 数据库一起使用而量身定制的。\n\
  \n13-1. 连接到数据库\n\n问题\n\n您希望从桌面 Java 应用程序中创建到数据库的连接。\n\n解决方案 1\n\n使用 JDBC `Connection`\
  \ 对象来获取连接。通过创建一个新的连接对象，然后加载您需要用于特定数据库供应商的驱动程序来实现。一旦连接对象准备就绪，调用其 `getConnection()`\
  \ 方法。以下代码演示了如何根据指定的驱动程序获取到 Oracle 或 Apache Derby 数据库的连接。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 N 使用数据库\n\n```java\npublic Connection getConnection() throws SQLException\
  \ {\n\n    Connection conn = null;\n\n    String jdbcUrl;\n\n    if(driver.equals(\"\
  derby\")){\n\n        jdbcUrl = \"jdbc:derby://\" + this.hostname + \":\" +\n\n\
  \                this.port + \"/\" + this.database;\n\n    } else {\n\n        jdbcUrl\
  \ = \"jdbc:oracle:thin:@\" + this.hostname + \":\" +\n\n                this.port\
  \ + \":\" + this.database;\n\n    }\n\n    System.out.println(jdbcUrl);\n\n    conn\
  \ = DriverManager.getConnection(jdbcUrl, username, password);\n\n    System.out.println(\"\
  Successfully connected\");\n\n    return conn;\n\n}\n```\n\n此示例中展示的方法返回一个已准备好用于数据库访问的\
  \ `Connection` 对象。\n\n解决方案 2\n\n使用 `DataSource` 创建连接池。`DataSource` 对象必须已正确实现并部署到应用程序服务器环境中。在\
  \ `DataSource` 对象被实现和部署后，应用程序可以使用它来获取数据库连接。以下代码展示了您可以通过 `DataSource` 对象获取数据库连接的代码：\n\
  \n```java\npublic Connection getDSConnection() {\n\n    Connection conn = null;\n\
  \n    try {\n\n        Context ctx = new InitialContext();\n\n        DataSource\
  \ ds = (DataSource)ctx.lookup(\"jdbc/myOracleDS\");\n\n        conn = ds.getConnection();\n\
  \n    } catch (NamingException | SQLException ex) {\n\n        ex.printStackTrace();\n\
  \n    }\n\n    return conn;\n\n}\n```\n\n请注意，在 `DataSource` 实现中唯一需要的信息是一个有效的 `DataSource`\
  \ 对象的名称。\n\n获取数据库连接所需的所有信息都在应用程序服务器内部进行管理。\n\n工作原理\n\n在 Java 应用程序中创建数据库连接有几种不同的方式。具体方式取决于您正在编写的应用程序类型。如果应用程序是独立的或桌面应用程序，通常使用\
  \ `DriverManager`。基于 Web 的应用程序和内部网应用程序通常依赖应用程序服务器通过 `DataSource` 对象为应用程序提供连接。\n\n\
  \n\n创建 JDBC 连接涉及几个步骤。首先，你需要确定需要哪个数据库驱动程序。确定所需驱动程序后，下载包含该驱动程序的 JAR 文件，并将其放入你的 CLASSPATH\
  \ 中。在本方案中，将建立与 Oracle 数据库或 Apache Derby 的连接。每个\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n数据库供应商都会提供打包在 JAR 文件中的不同 JDBC 驱动程序，这些文件名称各异；请查阅特定数据库的文档以获取更多信息。一旦你为数据库获取了合适的\
  \ JAR 文件，就将其包含在你的应用程序 CLASSPATH 中。接下来，使用 JDBC DriverManager 获取与数据库的连接。从 JDBC 4.0\
  \ 版本开始，包含在 CLASSPATH 中的驱动程序会自动加载到 DriverManager 对象中。如果你使用的是 4.0 之前的 JDBC 版本，则需要手动加载驱动程序。\n\
  \n要使用 DriverManager 获取与数据库的连接，你需要向其传递一个包含 JDBC URL 的字符串。JDBC URL 由数据库供应商名称、托管数据库的服务器名称、数据库名称、数据库端口号，以及有权访问你要使用的模式的有效数据库用户名和密码组成。很多时候，用于创建\
  \ JDBC URL 的值是从 Properties 文件中获取的，这样在需要时可以轻松更改。要了解有关使用 Properties 文件存储连接值的更多信息，请参阅方案\
  \ 13-5。用于创建解决方案 1 的 Oracle 数据库 JDBC URL 的代码如下所示：\n\nString jdbcUrl = \"jdbc:oracle:thin:@\"\
  \ + this.hostname + \":\" +\n\nthis.port + \":\" + this.database;\n\n一旦所有变量都被替换到字符串中，它将类似于以下内容：jdbc:oracle:thin:@hostname:1521:database\n\
  \n类似地，Apache Derby URL 字符串将如下所示：\n\njdbc:derby://hostname:1521/database\n\n创建 JDBC\
  \ URL 后，可以将其传递给 DriverManager.getConnection() 方法以获取 java.sql.Connection 对象。如果传递给\
  \ getConnection() 方法的信息不正确，将抛出 java.sql.SQLException；否则，将返回一个有效的 Connection 对象。\n\
  \n获取数据库连接的首选方法是在应用服务器上运行时使用 DataSource，或者有权访问 Java 命名和目录接口（JNDI）服务。要使用 DataSource\
  \ 对象，你需要将其部署到应用服务器上。任何符合规范的 Java 应用服务器，如 Glassfish、Oracle Weblogic 或 WildFly 都可以使用。大多数应用服务器都包含一个可用于轻松部署\
  \ DataSource 对象的 Web 界面。但是，你也可以通过使用如下所示的代码手动部署 DataSource 对象：\n\norg.java8recipes.chapter13.recipe13_01.FakeDataSourceDriver\
  \ ds =\n\nnew org.java8recipes.chapter13.recipe13_1.FakeDataSourceDriver();\n\n\
  ds.setServerName(\"my-server\");\n\nds.setDatabaseName(\"JavaRecipes\");\n\nds.setDescription(\"\
  Database connection for Java 8 Recipes\");\n\n此代码实例化一个新的 DataSource 驱动程序类，然后根据你要注册的数据库设置属性。此处演示的\
  \ DataSource 代码通常用于在应用服务器中注册 DataSource 或访问 JNDI 服务器。如果你使用基于 Web 的管理工具部署 DataSource，应用服务器通常会在后台完成此工作。大多数数据库供应商会随其\
  \ JDBC 驱动程序一起提供 DataSource 驱动程序，因此，如果正确的 JAR 位于应用程序或服务器 CLASSPATH 中，它应该能被识别并可供使用。一旦\
  \ DataSource 被实例化和配置，下一步就是使用 JNDI 命名服务注册 DataSource。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n以下代码演示了如何使用 JNDI 注册 DataSource：\n\ntry {\n\nContext ctx = new\
  \ InitialContext();\n\nDataSource ds =\n\n(DataSource) ctx.bind(\"jdbc/java8recipesDB\"\
  );\n\n} catch (NamingException ex) {\n\nex.printStackTrace();\n\n}\n\n一旦 DataSource\
  \ 被部署，任何部署到同一应用服务器的应用程序都可以访问它。使用 DataSource 对象的美妙之处在于，你的应用程序代码不需要了解数据库的任何信息；它只需要知道\
  \ DataSource 的名称。通常，DataSource 的名称以 jdbc/ 前缀开头，后跟一个标识符。要查找 DataSource 对象，需要使用 InitialContext。InitialContext\
  \ 会查看应用服务器内所有可用的 DataSource，如果找到则返回一个有效的 DataSource；否则，它将抛出 java.naming.NamingException\
  \ 异常。在解决方案 2 中，你可以看到 InitialContext 返回一个必须强制转换为 DataSource 的对象。\n\nContext ctx =\
  \ new InitialContext();\n\nDataSource ds = (DataSource)ctx.lookup(\"jdbc/myOracleDS\"\
  );\n\n如果 DataSource 是一个连接池缓存，当应用程序请求连接时，它会发送池中一个可用的连接。以下代码行从 DataSource 返回一个 Connection\
  \ 对象：conn = ds.getConnection();\n\n当然，如果无法获得有效连接，则会抛出 java.sql.SQLException。DataSource\
  \ 技术优于 DriverManager，因为数据库连接信息只存储在一个地方：应用服务器。一旦部署了有效的 DataSource，它就可以被许多应用程序使用。\n\
  \n一旦你的应用程序获得了有效连接，就可以使用它与数据库进行交互。要了解有关使用 Connection 对象处理数据库的更多信息，请参阅方案 13-2 和 13-4。\n\
  \n13-2. 处理连接和 SQL 异常\n\n问题\n\n你应用程序中的数据库活动抛出了异常。你需要处理 SQL 异常，以便应用程序不会崩溃。\n\n解决方案\n\
  \n使用 try-catch 块来捕获并处理 JDBC 连接或 SQL 查询抛出的任何 SQL 异常。以下代码演示了如何实现 try-catch 块以捕获 SQL\
  \ 异常：\n\ntry {\n\n// 执行数据库任务\n\n} catch (java.sql.SQLException){\n\n// 执行异常处理\n\n\
  }\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 使用数据库\n\n工作原理\n\n\
  可以使用标准的 try-catch 块来捕获 java.sql.Connection 或 java.sql.SQLException 异常。如果不处理这些异常，你的代码将无法编译，并且妥善处理它们以防止应用程序在抛出这些异常时崩溃是一个好主意。几乎所有针对\
  \ java.sql.Connection 对象执行的工作都需要包含错误处理，以确保正确处理数据库异常。事实上，通常需要嵌套的 try-catch 块来处理所有可能的异常。你需要确保在完成工作且不再使用\
  \ Connection 对象后关闭连接。\n\n类似地，为了清理内存分配，关闭 java.sql.Statement 对象也是一个好主意。由于需要关闭 Statement\
  \ 和 Connection 对象，通常会看到使用 try-catch-finally 块来确保所有资源都按需得到处理。你很可能看到过类似以下风格的旧版 JDBC\
  \ 代码：\n\ntry {\n\n// 执行数据库任务\n\n} catch (java.sql.SQLException ex) {\n\n// 执行异常处理\n\
  \n} finally {\n\ntry {\n\n// 关闭 Connection 和 Statement 对象\n\n} catch (java.sql.SQLException\
  \ ex){\n\n// 执行异常处理\n\n}\n\n}\n\n\n\n新编写的代码应充分利用 try-with-resources 语句，该语句允许将资源管理委托给\
  \ Java，而非手动关闭。以下代码演示了如何使用 try-with-resources 打开连接、创建语句，并在完成后同时关闭连接和语句。\n\ntry (Connection\
  \ conn = createConn.getConnection();\n\nStatement stmt = conn.createStatement();)\
  \ {\n\nResultSet rs = stmt.executeQuery(qry);\n\nwhile (rs.next()) {\n\n// 执行某些操作\n\
  \n}\n\n} catch (SQLException e) {\n\ne.printStackTrace();\n\n}\n\n如上述伪代码所示，为了清理未使用的资源，通常需要嵌套的\
  \ try-catch 块。正确的异常处理有时会使 JDBC 代码编写起来相当繁琐，但它也能确保需要数据库访问的应用程序不会因故障而导致数据丢失。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n13-3\\. 查询数据库并检索结果\n\n问题\n\n应用程序中的某个进程需要查询数据库表中的数据。\n\n解决方案\n\n\
  使用配方 13-1 中描述的技术之一获取 JDBC 连接，然后使用 `java.sql.Connection` 对象创建 `Statement` 对象。`java.sql.Statement`\
  \ 对象包含 `executeQuery()` 方法，该方法解析文本字符串并用其查询数据库。执行查询后，可以将查询结果检索到 `ResultSet` 对象中。以下示例查询名为\
  \ RECIPES 的数据库表并打印结果：\n\nString qry = \"select recipe_num, name, description from\
  \ recipes\";\n\ntry (Connection conn = createConn.getConnection();\n\nStatement\
  \ stmt = conn.createStatement();) {\n\nResultSet rs = stmt.executeQuery(qry);\n\n\
  while (rs.next()) {\n\nString recipe = rs.getString(\"RECIPE_NUM\");\n\nString name\
  \ = rs.getString(\"NAME\");\n\nString desc = rs.getString(\"DESCRIPTION\");\n\n\
  System.out.println(recipe + \"\\t\" + name + \"\\t\" + desc);\n\n}\n\n} catch (SQLException\
  \ e) {\n\ne.printStackTrace();\n\n}\n\n如果使用第 13 章附带的数据库脚本执行此代码，将收到以下结果：\n\n13-1\
  \ 连接到数据库 DriverManager 和 DataSource 实现\n\n13-2 查询数据库并检索结果 从 DBMS 获取和使用数据\n\n13-3\
  \ 使用 SQLException 处理 SQL 异常\n\n工作原理\n\n对数据库执行的最常见操作之一是查询。使用 JDBC 执行数据库查询相当容易，尽管每次执行查询时都需要使用一些样板代码。\n\
  \n首先，需要获取要对其运行查询的数据库和模式的 `Connection` 对象。可以使用配方 13-1 中的解决方案之一来完成此操作。接下来，需要构建一个查询并将其存储为字符串格式。然后使用\
  \ `Connection` 对象创建 `Statement`。查询字符串将传递给 `Statement` 对象的 `executeQuery()` 方法，以便实际查询数据库。以下展示了在不使用\
  \ try-with-resources 进行资源管理时的代码样式。\n\nString qry = \"select recipe_num, name, description\
  \ from recipes\";\n\nConnection conn;\n\nStatement stmt = null;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\ntry {\n\nconn = createConn.getConnection()\n\nstmt = conn.createStatement();\n\
  \nResultSet rs = stmt.executeQuery(qry);\n\n...\n\n同样的代码可以更高效地编写如下：\n\ntry (Connection\
  \ conn = createConn.getConnection();\n\nStatement stmt = conn.createStatement();)\
  \ {\n\nResultSet rs = stmt.executeQuery(qry);\n\n...\n\n如您所见，`Statement` 对象的 `executeQuery()`\
  \ 方法接受一个字符串并返回一个 `ResultSet` 对象。\n\n`ResultSet` 对象使得处理查询结果变得容易，因此您可以按任意顺序获取所需的信息。如果查看示例中的下一行代码，会在\
  \ `ResultSet` 对象上创建一个 while 循环。\n\n\n\n此循环将持续调用 ResultSet 对象的 next() 方法，每次迭代获取查询返回的下一行。在此例中，ResultSet\
  \ 对象名为 rs，因此当 rs.next() 返回 true 时，循环将继续执行。一旦所有返回的行处理完毕，rs.next() 将返回 false，表示没有更多行需要处理。\n\
  \n在 while 循环内部，对每一返回行进行处理。每次遍历时，解析 ResultSet 对象以获取指定列名的值。请注意，如果某列预期返回字符串，则必须调用 ResultSet\
  \ 的 getString() 方法，并以字符串形式传入列名。类似地，如果某列预期返回 int，则应调用 ResultSet 的 getInt() 方法，同样以字符串形式传入列名。其他数据类型同理。这些方法将返回相应的列值。在本配方的解决方案示例中，这些值被存储到局部变量中。\n\
  \nString recipe = rs.getString(\"RECIPE_NUM\");\n\nString name = rs.getString(\"\
  NAME\");\n\nString desc = rs.getString(\"DESCRIPTION\");\n\n获取列值后，你可以对存储在局部变量中的值进行任意操作。在此例中，它们通过\
  \ System.out() 方法打印输出。\n\nSystem.out.println(recipe + \"\\t\" + name + \"\\t\" +\
  \ desc);\n\n尝试查询数据库时可能抛出 java.sql.SQLException（例如，如果 Connection 对象未正确获取，或尝试查询的数据库表不存在）。你必须提供异常处理来处理这些情况下的错误。因此，所有数据库处理代码应放在\
  \ try 块内。catch 块随后处理 SQLException，因此如果抛出异常，将使用 catch 块内的代码进行处理。听起来很简单，对吧？确实如此，但每次执行数据库查询时都必须这样做。这会产生大量样板代码。\n\
  \n如果语句和连接处于打开状态，关闭它们始终是个好习惯。使用 try-with-resources 构造是资源管理最高效的解决方案。完成后关闭资源有助于确保系统能够根据需要重新分配资源，并对数据库保持尊重。尽快关闭连接非常重要，以便其他进程可以使用它们。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 使用数据库\n\n13-4\\. 执行\
