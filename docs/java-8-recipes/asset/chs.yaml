  \n第 22 章 安全性\n\n\n\nu 在 OS X 上通过 JNI 桥接原生 JGSS\n\nu 支持更强的临时性 DH 密钥\n\nu 密码套件偏好定制\n\
  \n本章包含的食谱涵盖了上述部分安全特性。\n\n22-1\\. 断言权限子集\n\n问题\n\n你希望以常规权限集运行应用程序，但应用程序的某一部分需要权限子集，以防止潜在的安全风险。\n\
  \n解决方案\n\n编写一个特权块，并向需要额外安全的代码块断言一个权限子集。在以下代码块中，标准权限执行应用程序，但只有权限子集用于写入文件。\n\n这是通过将代码放入\
  \ `AccessController.doPrivileged` 块中实现的，该块指定了完成任务所需的最小权限。\n\n```java\npublic static\
  \ String writeFile(final String filename) {\n\n    return AccessController.doPrivileged(\n\
  \n        (PrivilegedAction<String>) () -> {\n\n            try (PrintWriter writer\
  \ = new PrintWriter(filename, \"UTF-8\")) {\n\n                writer.println(\"\
  The first line\");\n\n                writer.println(\"The second line\");\n\n \
  \           } catch (FileNotFoundException | UnsupportedEncodingException ex) {\n\
  \n                System.out.println(ex);\n\n            }\n\n            return\
  \ null;\n\n        },\n\n        null,\n\n        new java.io.FilePermission(filename,\
  \ \"write\"));\n\n}\n```\n\n工作原理\n\n在 Java 8 中，`AccessController.doPrivileged` 方法经过了改进，允许你指定一个可在块中使用的权限子集，而不是执行一个增强的权限集。可以在\
  \ Java 语言中使用特权块 API 来指定一组不同的权限，以执行部分代码。要指定权限，你必须使用 `AccessController.doPrivileged`\
  \ 块，并传入一个封装了需要修改权限集的操作的 `PrivilegedAction`。以下代码展示了典型用法：\n\n```java\nAccessController.doPrivileged(new\
  \ PrivilegedAction<void>(){\n\n    public void run(){\n\n        // 执行某些特权操作\n\n\
  \    }\n\n});\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 22 章\
  \ 安全\n\n这种技术的新变体允许你指定一个权限子集，而不是超集。在本食谱中，一个权限子集用于将文件写入磁盘。新的 `doPrivileged` 方法接受三个参数，如下面的伪代码所示：\n\
  \n```java\nAccessController.doPrivileged(\n\n    PrivilegedAction,\n\n    AccessControlContext,\n\
  \n    java.security.Permission varargs);\n```\n\n第一个参数与标准的 `AccessController.doPrivileged`\
  \ 相同，即一个 `PrivilegedAction`。\n\n`PrivilegedAction` 可以是类或 lambda 表达式的形式。在食谱示例中，第一个参数是一个\
  \ lambda 表达式。无论哪种情况，类或 lambda 都必须实现包含 `run()` 方法的 `PrivilegedAction` 函数式接口。`run()`\
  \ 方法返回一个值，本示例中由于没有相关值需要返回，因此直接返回 `null`。\n\n第二个参数是一个 `AccessControlContext` 对象，可用于执行额外的安全检查。可以通过从特定调用上下文调用\
  \ `AccessControlContext.getInstance()` 来获取 `AccessControlContext` 实例。在示例中，指定了 `null`，表示不需要额外的安全检查。\n\
  \n第三个参数是一个可变参数，用于指定要授予的权限类型。该参数接受一个或多个 `Permission` 对象，或一个 `Permission` 对象数组。\n\n\
  新的 `AccessController.doPrivileged` 方法可用于指示当前任务的最小权限或更多权限。该方法提供了一种安全的方式，允许以标准权限运行的应用程序使用更少或更多的权限集来执行任务。要了解更多关于此特性的信息，请查看在线文档：[`docs.oracle.com/javase/8/docs/technotes/guides/security/doprivileged.html#asserting_a_subset_of_privileges`](http://docs.oracle.com/javase/8/docs/technotes/guides/security/doprivileged.html#asserting_a_subset_of_privileges)\n\
  \n\n\n[html#断言权限子集](http://docs.oracle.com/javase/8/docs/technotes/guides/security/doprivileged.html#asserting_a_subset_of_privileges)\n\
  \n22-2\\. 为握手过程指定服务器名称\n\n问题\n\n你希望在发起与服务器的 SSL 连接之前，验证服务器名称以确保其有效。\n\n解决方案\n\n\
  利用服务器名称指示（SNI）扩展，在握手过程中确定客户端尝试连接的是哪个服务器名称。SNI 扩展在握手过程中用于指定客户端尝试连接的主机。在以下示例中，创建了一个客户端，该客户端在其\
  \ SSL 参数列表中指定了一个用于有效连接的服务器主机。\n\npublic class SocketClient {\n\npublic static Socket\
  \ socket = null;\n\npublic static PrintWriter out;\n\npublic static BufferedReader\
