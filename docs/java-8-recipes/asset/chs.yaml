  \ = city;\n    }\n\n    public String getFullName() {\n        return this.name\
  \ + \" - \" + this.city;\n    }\n}\n```\n\n接口可用于声明对象的类型。任何声明为具有接口类型的对象都必须遵守接口中声明的所有实现，除非存在默认实现。例如，以下变量声明定义了一个包含\
  \ `TeamType` 接口中声明的所有属性的对象：\n\n```java\nTeamType team;\n```\n\n接口也可以实现其他接口（因此提供了与多重继承相同的理论）。然而，由于接口中没有方法实现，在\
  \ Java 类中实现多个接口比在 C++ 中扩展多个类要安全得多。\n\n接口是 Java 语言中最重要的构造之一。它们提供了用户与类实现之间的接口。虽然可以在不使用接口的情况下创建完整的应用程序，但它们有助于促进面向对象，并隐藏其他类的方法实现。\n\
  \n**5-7. 在不破坏现有代码的情况下修改接口**\n\n**问题**\n\n你有一个实现接口的工具类，并且工具库中的许多不同类都实现了该接口。假设你想向工具类添加一个新方法，并使其通过其接口可供其他类使用。但是，如果你更改接口，它将破坏已经实现该接口的现有类。\n\
  \n**解决方案**\n\n将新方法及其实现作为默认方法添加到工具类接口中。通过这样做，每个实现该接口的类将自动获得使用新方法的能力，并且由于存在默认实现，它们不会被强制实现该方法。以下类接口包含一个默认方法，任何实现该接口的类都可以使用它。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 面向对象的 Java\n\n```java\n\
  public interface TeamType {\n    List<Player> getPlayers();\n    void setPlayers(List<Player>\
  \ players);\n    void setName(String name);\n    void setCity(String city);\n  \
  \  String getFullName();\n\n    default void listPlayers() {\n        getPlayers().stream().forEach((player)\
  \ -> {\n            System.out.println(player.getFirstName() + \" \" + player.getLastName());\n\
  \        });\n    }\n}\n```\n\n接口 `TeamType` 包含一个名为 `listPlayers()` 的默认方法。任何实现 `TeamType`\
  \ 的类都不需要实现此方法，因为接口中包含了一个默认实现。\n\n**工作原理**\n\n\n\n在 Java 的早期版本中，接口只能包含方法签名和常量变量。无法在接口内定义方法的实现。这在大多数情况下都运行良好，因为接口是一种旨在强制类型安全和抽象实现细节的构造。然而，在某些情况下，允许接口包含默认方法实现是有益的。例如，如果有许多类实现了某个现有接口，那么如果该接口发生更改，大量代码可能会被破坏。这将导致无法实现向后兼容的情况。在这种情况下，将默认方法实现放入接口中，而不是强制所有类都实现接口中新增的方法，是合理的。这就是默认方法成为必要，并被纳入\
  \ Java 8 版本的原因。\n\n要在接口内创建默认方法（也称为“守护方法”），请在方法签名中使用关键字 `default`，并包含方法实现。一个接口可以包含零个或多个默认方法。\n\
  \n在本节方案的解决方案中，`listPlayers()` 方法是 `TeamType` 接口中的一个默认方法，任何实现 `TeamType` 的类都将自动继承该默认实现。理论上，任何实现\
  \ `TeamType` 的类都不会受到添加 `listPlayers()` 默认方法的影响。这使得我们能够在不破坏向后兼容性的情况下修改接口，这具有很大的价值。\n\
  \n5-8. 使用不同值构造同一类的实例\n\n问题\n\n你的应用程序需要能够构造同一对象的实例，但每个对象实例需要包含不同的值，从而创建同一对象的不同类型。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 N 面向对象的 Java\n\n解决方案\n\
  \n利用构建器模式，通过逐步的过程来构建同一对象的不同类型。例如，假设你希望为一个体育联盟创建不同的球队。每支球队必须包含相同的属性，但这些属性的值因球队而异。因此，你创建了许多相同类型的对象，但每个对象都是独一无二的。以下代码演示了构建器模式，可用于创建所需的球队。\n\
  \n首先，你需要定义每支球队需要包含的一组属性。为此，应创建一个 Java 接口，其中包含需要应用于每个球队对象的不同属性。以下是此类接口的一个示例：\n\n\
  ```java\npublic interface TeamType {\n\n    public void setPlayers(List<Player>\
  \ players);\n\n    public void setName(String name);\n\n    public void setCity(String\
  \ city);\n\n    public String getFullName();\n\n}\n```\n\n接下来，定义一个类来表示一支球队。这个类需要实现刚刚创建的\
  \ `TeamType` 接口，以便它遵循构建球队所需的格式：\n\n```java\npublic class Team implements TeamType\
  \ {\n\n    private List<Player> players;\n\n    private String name = null;\n\n\
  \    private String city = null;\n\n    private int wins = 0;\n\n    private int\
  \ losses = 0;\n\n    private int ties = 0;\n\n    /**\n     * @return the players\n\
  \     */\n    public List<Player> getPlayers() {\n        return players;\n    }\n\
  \n    /**\n     * @param players the players to set\n     */\n    public void setPlayers(List<Player>\
  \ players) {\n        this.players = players;\n    }\n\n    /**\n     * @return\
  \ the name\n     */\n    public String getName() {\n        return name;\n    }\n\
  \n    /**\n     * @param name the name to set\n     */\n    public void setName(String\
  \ name) {\n        this.name = name;\n    }\n\n    /**\n     * @return the city\n\
  \     */\n    public String getCity() {\n        return city;\n    }\n\n    /**\n\
  \     * @param city the city to set\n     */\n    public void setCity(String city)\
  \ {\n        this.city = city;\n    }\n\n    public String getFullName(){\n    \
  \    return this.name + \" – \" + this.city;\n    }\n\n}\n```\n\n\n\n既然 Team 类已经定义完毕，接下来需要创建一个构建器。构建器对象的目的是允许逐步创建团队对象。为了抽象构建对象的细节，应创建一个构建器类接口。该接口应定义所有用于构建对象的方法，以及一个返回完整构建对象的方法。在本例中，该接口将定义构建新\
  \ Team 对象所需的每个方法，然后由构建器实现类来实现此接口。\n\npublic interface TeamBuilder {\n\npublic void\
  \ buildPlayerList();\n\npublic void buildNewTeam(String teamName);\n\npublic void\
  \ designateTeamCity(String city);\n\npublic Team getTeam();\n\n}\n\n以下代码演示了一个构建器类的实现。虽然以下代码不会创建自定义球员列表，但它包含了实现构建器模式所需的所有特性。创建更自定义化球员列表的细节可以稍后完善，或许可以通过允许用户通过键盘输入来创建球员。\n\
  \n此外，TeamBuilder 接口可用于为不同运动项目实现团队。以下类名为 HockeyTeamBuilder，但一个类似的实现 TeamBuilder 的类可以命名为\
  \ FootballTeamBuilder，以此类推。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章 面向对象的 Java\n\npublic class HockeyTeamBuilder implements TeamBuilder {\n\n\
  private Team team;\n\npublic TeamBuilder(){\n\nthis.team = new Team();\n\n}\n\n\
  @Override\n\npublic void buildPlayerList() {\n\nList players = new ArrayList();\n\
  \nfor(int x = 0; x <= 10; x++){\n\nplayers.add(PlayerFactory.getPlayer());\n\n}\n\
  \nteam.setPlayers(players);\n\n}\n\n@Override\n\npublic void buildNewTeam() {\n\n\
  team.setName(\"The Java 8 Team\");\n\n}\n\n@Override\n\npublic void designateTeamCity(){\n\
  \nteam.setCity(\"Somewhere in the world\");\n\n}\n\npublic Team getTeam(){\n\nreturn\
  \ this.team;\n\n}\n\n}\n\n最后，通过调用其接口中定义的方法来使用构建器创建团队。以下代码演示了如何使用此构建器创建一个团队。你可以使用本方案源码中的\
  \ Roster 类来测试此代码：\n\npublic Team createTeam(String teamName, String city){\n\nTeamBuilder\
  \ builder = new HockeyTeamBuilder();\n\nbuilder.buildNewTeam(teamName);\n\nbuilder.designateTeamCity(city);\n\
  \nbuilder.buildPlayerList();\n\nreturn builder.getTeam();\n\n}\n\n虽然这个构建器模式的演示相对简短，但它展示了如何隐藏对象的实现细节，从而使对象更易于构建。你不需要知道构建器内部的方法具体做了什么；你只需要调用它们即可。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 面向对象的 Java\n\n工作原理\n\
  \n构建器模式提供了一种以程序化方式生成对象新实例的方法。它抽象了对象创建的细节，因此创建者无需执行任何特定工作即可生成新实例。\n\n通过将工作分解为一系列步骤，构建器模式允许对象以不同的方式实现其构建器方法。由于对象创建者只能访问构建器方法，这使得创建不同类型的对象变得更加容易。\n\
  \n使用构建器模式需要几个类和接口。首先，你需要定义一个类及其不同的属性。正如本方案的解决方案所示，该类可以遵循 JavaBean 模式（有关更多详细信息，请参见方案\
  \ 5-5）。通过创建 JavaBean，你将能够使用其 setter 和 getter 方法来填充对象。接下来，你应该创建一个接口，用于访问你创建的对象的 setter\
  \ 方法。每个 setter 方法都应在接口中定义，然后对象本身应实现该接口。如解决方案所示，Team 对象包含以下 setter 方法，并且每个方法都在 TeamType\
  \ 接口中定义：\n\npublic void setPlayers(List<Player> players);\n\npublic void setName(String\
  \ name);\n\npublic void setCity(String city);\n\n在现实生活中，一个团队可能包含更多属性。例如，你可能希望设置一个吉祥物以及主场体育馆的名称和地址。此示例中的代码可以被认为是简化的，因为它演示了创建通用“团队对象”的过程，而不是向你展示创建真实团队的所有代码。由于\
  \ Team 类实现了 TeamType 接口中定义的这些 setter 方法，因此可以调用接口方法与 Team 类的实际方法进行交互。\n\n在对象及其接口编码完成后，需要创建实际的构建器。构建器由一个接口及其实现类组成。首先，你必须定义在构建对象时希望其他类调用的方法。例如，在本方案的解决方案中，方法\
  \ buildNewTeam()、designateTeamCity() 和 buildPlayerList() 在名为 TeamBuilder 的构建器接口中定义。当某个类稍后想要构建这些对象之一时，它只需要调用这些定义好的方法即可。\n\
  \n接下来，定义一个构建器类实现。实现类将实现构建器接口中定义的方法，向对象创建者隐藏所有这些实现的细节。在本方案的解决方案中，构建器类 HockeyTeamBuilder\
  \ 实现了 TeamBuilder 接口。当某个类想要创建一个新的 Team 对象时，它只需实例化一个新的构建器类。\n\nTeamBuilder builder\
  \ = new HockeyTeamBuilder();\n\n为了填充新创建的类对象，需要调用其构建器方法。\n\nbuilder.buildNewTeam(teamName);\n\
  \nbuilder.designateTeamCity(city);\n\nbuilder.buildPlayerList();\n\n使用这种技术可以逐步创建对象。构建该对象的实现细节对对象创建者是隐藏的。不同的构建器实现可以很容易地使用相同的\
  \ TeamBuilder 接口来为不同类型的运动构建团队对象。例如，可以编写一个构建器实现来生成足球团队对象，另一个可以定义为生成棒球团队对象。每个团队对象的实现都会不同。然而，它们都可以实现相同的接口——TeamBuilder——并且创建者可以简单地调用构建器方法，而无需关心具体细节。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 面向对象的 Java\n\n5-9. 通过接口与类交互\n\
  \n问题\n\n你已经创建了一个实现接口或类类型的类。你希望通过使用接口而不是直接使用该类来与该类的方法进行交互。\n\n解决方案\n\n声明一个与接口类型相同的变量。然后，你可以将实现该接口的类赋值给该变量，并调用接口中声明的方法来执行工作。在以下示例中，声明了一个类型为\
  \ TeamType 的变量。使用与方案 5-8 相同的类，你可以看到 Team 类实现了 TeamType 接口。以下示例中创建的变量持有一个对新 Team\
  \ 对象的引用。\n\n由于 Team 类实现了 TeamType 接口，因此可以使用接口中暴露的方法：TeamType team = new Team();\n\
  \nteam.setName(\"Juneau Royals\");\n\nteam.setCity(\"Chicago\");\n\nSystem.out.println(team.getFullName());\n\
  \n输出结果：\n\nJuneau Royals – Chicago\n\n工作原理\n\n接口因多种原因而非常有用。接口最重要的两个用例是一致性和抽象性。接口定义了一个模型，任何实现该接口的类都必须符合该模型。\n\
  \n\n\n因此，如果接口中定义了一个常量，该常量将自动可供类使用。如果接口中定义了一个方法，则类必须实现该方法，除非已定义了默认实现（参见技巧 5-7）。接口提供了一种优雅的方式，让类能够遵循统一标准。\n\
  \n接口会向不需要看到某些信息的类隐藏这些不必要的信息。接口中定义的任何方法都会被设为公开，并可供任何类访问。如本技巧的解决方案所示，创建了一个对象并将其声明为接口类型。示例中的接口`TeamType`仅包含`Team`对象中可用方法的一小部分。因此，任何针对声明为`TeamType`类型的对象进行操作的类，所能访问的方法仅限于接口中定义的那些。使用此接口类型的类无法看到其他任何方法或常量，也不需要看到它们。接口是隐藏其他类无需使用的逻辑的绝佳方式。另一个很好的附带效果是：实现接口的类可以更改并重新编译，而不会影响针对该接口编写的代码。然而，如果接口本身发生更改，则可能会影响实现它的所有类。因此，如果`getFullName()`方法的实现发生变化，任何针对`TeamType`接口编写的类都不会受到影响，因为接口本身未变。实现将在幕后更改，而任何针对该接口工作的类将直接开始使用新的实现，无需知晓变化。\n\
  \nN **注意** 在某些情况下，对现有类的修改可能导致代码出错。在使用库时这种情况更为常见。例如，假设一个类实现了一个接口，而该接口更新后添加了一个新的方法签名。\n\
  \n所有实现该接口的类现在都必须更新，以包含新方法的实现，这在库类中有时为了保持向后兼容性是不可能做到的。这就是 Java 8 引入默认方法的主要原因；更多详情请参见技巧\
  \ 5-7。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 面向对象的 Java\n\
  \n最后，接口有助于提升安全性。它们向任何可能通过接口调用方法的类隐藏了接口中声明的方法的实现细节。如前一段所述，如果一个类通过`TeamType`接口调用`getFullName()`方法，它无需知道该方法的实现细节，只要结果按预期返回即可。\n\
  \nEnterprise JavaBean (EJB) 3.0 模型使用接口来与执行数据库操作的方法进行交互。这种模型在向其他类隐藏非必要的细节和逻辑方面效果非常好。\n\
  \n其他框架也使用类似的模型，通过 Java 接口暴露功能。接口的使用已被证明是一种编写软件的明智方式，因为它促进了可重用性、灵活性和安全性。\n\n5-10.\
