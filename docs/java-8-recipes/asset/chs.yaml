  \ 循环）不再是遍历数据集合的必要条件。\n\n**工作原理**\n\n在 Java 8 之前，遍历一个`Collection`需要某种循环块。这被称为外部迭代，即按顺序进行程序化循环。在大多数情况下，使用\
  \ for 循环来逐个处理`Collection`中的每个元素，并根据应用程序的需求处理每个元素。虽然 for 循环是执行迭代的合理解决方案，但它既不够直观，又显得冗长。在\
  \ Java 8 中，遍历`Collection`的样板代码已被移除，同时也不再需要详细说明迭代的具体完成方式。编译器已经知道如何遍历`Collection`，那么为什么还要精确地告诉编译器如何去做呢？为什么不直接告诉编译器：“我想遍历这个`Collection`，并对每个元素执行这个任务”？流的概念实现了这种放手式的迭代方法。\n\
  \n让编译器来处理不直观的循环，只需将任务交给编译器，并告诉它对每个元素执行什么操作。这个概念被称为内部迭代。通过内部迭代，你的应用程序确定需要迭代什么，而 JDK\
  \ 决定如何执行迭代。内部迭代不仅减轻了编写循环逻辑的需求，还具有其他优势。其中一个优势是内部迭代不局限于对元素进行顺序迭代。因此，JDK 决定如何迭代，为当前任务选择最佳算法。内部迭代也更容易利用并行计算。这个概念涉及将任务细分为更小的问题，同时解决每个问题，然后合并结果。\n\
  \n流是一个对象引用序列，可以在所有`Collection`类型上生成。`Stream API`使得能够对这些对象引用执行一系列聚合操作，并返回结果或直接对对象应用更改。这也被称为*管道*。生成和使用流的伪代码如下：\n\
