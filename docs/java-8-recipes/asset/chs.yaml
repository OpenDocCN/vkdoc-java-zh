  \ 文件与此代码示例文件位于同一位置。在 NetBeans 中，你可以选择“清理并构建项目”，或者将文件复制到你的类构建区域。\n\n现在你已经知道如何加载 CSS\
  \ 样式，让我们来谈谈 JavaFX CSS 选择器和样式属性。与 CSS 样式表类似，场景图中的 Node 对象也有关联的选择器或样式类。所有场景图节点都有一个名为\
  \ `setStyle()` 的方法，该方法应用可能改变节点背景颜色、边框、描边等的样式属性。由于所有图形节点都继承自 `Node` 类，派生类将能够继承相同的样式属性。了解节点类型的继承层次结构非常重要，因为节点类型将决定你可以影响的样式属性类型。例如，`Rectangle`\
  \ 继承自 `Shape`，而 `Shape` 继承自 `Node`。该继承链不包括 `-fx-border-style`，它是继承自 `Region` 的节点的一部分。基于节点类型，你可以设置的样式存在限制。要查看所有样式选择器的完整列表，请参考\
  \ JavaFX CSS 参考指南：\n\n[`docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html`](http://docs.oracle.com/javase/8/javafx/api/javafx/scene/doc-files/cssref.html)\n\
  \n所有 JavaFX 样式属性都以 `-fx-` 为前缀。例如，所有 Node 都有影响不透明度的样式属性，该属性是 `-fx-opacity`。以下是用于样式化\
  \ JavaFX `javafx.scene.control.Label` 和 `javafx.scene.control.Button` 的选择器：\n\n\
  .label {\n\n-fx-text-fill: rgba(17, 145, 213);\n\n-fx-border-color: rgba(255, 255,\
  \ 255, .80);\n\n-fx-border-radius: 8;\n\n-fx-padding: 6 6 6 6;\n\n-fx-font: bold\
  \ italic 20pt \"LucidaBrightDemiBold\";\n\n}\n\n.button{\n\n-fx-text-fill: rgba(17,\
  \ 145, 213);\n\n-fx-border-color: rgba(255, 255, 255, .80);\n\n-fx-border-radius:\
  \ 8;\n\n-fx-padding: 6 6 6 6;\n\n-fx-font: bold italic 20pt \"LucidaBrightDemiBold\"\
  ;\n\n}\n\n总结\n\n在本章中，我们涵盖了与 JavaFX 图形相关的多个主题。我们学习了如何通过开发一个允许将图像拖放到舞台上的应用程序来创建图像，从而创建图像的副本。\n\
  \n然后，我们介绍了实现文本和形状动画的方案。最后，我们学习了如何利用网格和/或 CSS 来布局应用程序组件。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
