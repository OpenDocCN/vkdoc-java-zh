  \ textfonts.fxml 的源代码。\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n\
  <?import java.net.*?>\n\n<?import javafx.geometry.*?>\n\n<?import javafx.scene.*?>\n\
  \n<?import javafx.scene.control.*?>\n\n<?import javafx.scene.layout.*?>\n\n<?import\
  \ javafx.scene.text.*?>\n\n<Scene width=\"200\" height=\"75\" fill=\"white\" xmlns:fx=\"\
  \ [`javafx.com/fxml`](http://javafx.com/fxml)\">\n\n<stylesheets>\n\n<URL value=\"\
  @textfonts.css\"/>\n\n</stylesheets>\n\n<Pane fx:id=\"pane\">\n\n<TextFlow styleClass=\"\
  mainmessage\">\n\n<Text styleClass=\"span1\">Hello </Text>\n\n<Text text=\" \"/>\n\
  \n<Text styleClass=\"span2, large\">Java</Text>\n\n<Text styleClass=\"span3, slant\"\
  >FX</Text>\n\n<Text text=\" \"/>\n\n<Text styleClass=\"cool\">8</Text>\n\n</TextFlow>\n\
  \n</Pane>\n\n</Scene>\n```\n\n在 FXML 中，导入了一个名为 textfonts.css 的层叠样式表。以下列表包含了位于 textfonts.css\
  \ 中的样式。\n\n```css\n.mainmessage {\n\n-fx-font-family: \"Helvetica\";\n\n-fx-font-size:\
  \ 30px;\n\n}\n\n.span1 {\n\n-fx-color: \"red\";\n\n}\n\n.span2 {\n\n-fx-font-family:\
