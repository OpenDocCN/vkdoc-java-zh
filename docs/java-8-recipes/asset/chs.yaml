  \n第 7 章 数据结构与集合\n\n工作原理\n\n表示一组固定相关常量的常见模式是将每个常量定义为 `int`、`String` 或其他类型。通常，这些常量定义在专门用于封装常量的类或接口中。无论如何，常量有时会使用\
  \ `static` 和 `final` 修饰符定义，如下所示：\n\n// 输入字段常量\n\npublic static final int PASSWORD\
  \ = 0;\n\npublic static final int EMAIL_ADDRESS = 1;\n\npublic static final int\
  \ PHONE_NUMBER = 2;\n\npublic static final int SOCIAL_SECURITY_NUMBER = 3;\n\n这种模式存在多个问题，最主要的问题是缺乏类型安全性。通过将这些常量定义为\
  \ `int`，可能会将一个无效值赋给本应只允许保存其中一个常量值的变量：\n\nint inputField = PHONE_NUMBER; // 正确\n\n\
  inputField = 4; // 错误——没有值为 4 的输入字段常量；编译时无错误\n\n如你所见，编译器不会产生任何错误或警告来告知你这个无效的值赋值。很可能，你会在运行时，当应用程序尝试使用\
  \ `inputField` 并且为其分配了错误的值时才发现这个问题。相比之下，Java 枚举类型提供了编译时的类型安全性。也就是说，如果试图将错误类型的值赋给枚举变量，将导致编译错误。在本节方案的示例中，`FieldType.EMAIL_ADDRESS`\
  \ 枚举常量被赋给了 `field` 变量。尝试分配一个非 `FieldType` 类型的值自然会导致编译错误：\n\nFieldType field = FieldType.EMAIL_ADDRESS;\
  \ // 正确\n\nfield = \"EMAIL_ADDRESS\"; // 类型错误——编译错误\n\n枚举本质上是一种特殊的类。在底层，Java 将枚举类型实现为抽象且最终的\
  \ `java.lang.Enum` 类的子类。因此，枚举类型不能直接实例化（在枚举类型外部），也不能被继承。枚举类型定义的常量实际上是该枚举类型的实例。`java.lang.Enum`\
  \ 类定义了许多所有枚举类型都继承的 `final` 方法。此外，所有枚举类型都有两个隐式声明的静态方法：`values()` 和 `valueOf(String)`。解决方案中的代码演示了这些静态方法以及一些较常用的实例方法。\n\
  \n这些方法大多不言自明，但你应该记住以下细节：\n-   每个枚举常量都有一个序数值，表示其在枚举声明中的相对位置。声明中的第一个常量被分配序数值 0。可以使用\
  \ `ordinal()` 方法检索枚举常量的序数值；但出于可维护性原因，不建议应用程序依赖此值。\n-   `name()` 方法和 `toString()`\
  \ 方法的默认实现都返回枚举常量的字符串表示形式（`toString()` 实际上调用 `name()`）。通常会重写 `toString()` 方法，以提供更友好的枚举常量字符串表示形式。因此，出于可维护性原因，建议优先使用\
  \ `toString()` 而不是 `name()`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 数据结构与集合\n\n-   在测试相等性时，请注意 `equals()` 方法和 `==` 都执行引用比较。它们可以互换使用。但是，建议使用\
  \ `==` 以利用编译时的类型安全性。解决方案中的代码对此进行了说明。例如，使用 `equals()` 方法与 `String` 参数进行比较，可能会使错误被忽略；代码可以编译，但始终返回\
  \ `false`。相反，使用 `==` 比较枚举和 `String` 会在编译时导致错误。当你可以选择更早（编译时）而不是更晚（运行时）捕获错误时，请选择前者。\n\
  -   隐式声明的静态方法 `values()` 和 `valueOf(String)` 并未出现在 `java.lang.Enum` 类的 Java 文档或源代码中。但是，Java\
  \ 语言规范详细说明了它们所需的实现。总结这些方法：`values()` 返回一个数组，其中包含枚举的常量，顺序与声明顺序相同。`valueOf(String)`\
  \ 方法返回名称与 `String` 参数的值完全匹配（包括大小写）的枚举常量，如果没有具有指定名称的枚举常量，则抛出 `IllegalArgumentException`。\n\
  \n\n\n有关 `java.lang.Enum` 及其各方法的更多详细信息，请参阅在线 Java 文档（[`download.java.net/jdk8/docs/api/java/lang/Enum.html`](http://download.java.net/jdk8/docs/api/java/lang/Enum.html)）。正如下一个技巧所示，枚举类型作为功能完备的\
  \ Java 类，可用于构建更智能的常量。\n\n7-2\\. 设计智能常量\n\n问题\n\n你需要一个能够表示固定相关常量集的类型，并且希望以面向对象的方式围绕这些常量构建一些状态和行为（逻辑）。\n\
  \n解决方案\n\n使用枚举类型，并利用枚举类型是功能完备的 Java 类这一事实。枚举类型可以像任何其他类一样拥有状态和行为，而枚举常量本身作为枚举类型的实例，会继承这些状态和行为。通过一个示例可以最好地说明这一点。让我们扩展上一个技巧中的示例。假设你需要处理并验证已提交的\
