  \ ? \"On\" : \"Off\");\n    });\n```\n\n接下来，你向一个滑块控件应用变化监听器，该控件允许用户调整目标网格面板的上内边距。要为滑块创建变化监听器，你需要实例化一个\
  \ `ChangeListener<Number>`。同样，你将使用一个签名与其形式类型参数 `Number` 相同的 lambda 表达式。当变化发生时，滑块的值被用来创建一个\
  \ `Insets` 对象，该对象将成为目标网格面板的新内边距。以下是上内边距和滑块控件的变化监听器代码：\n\n```java\ngridPaddingSlider.valueProperty().addListener((\n\
