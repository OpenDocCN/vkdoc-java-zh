  \ JavaFX 应用程序类。在 `start()` 方法中，创建一个 Nashorn `ScriptEngine` 对象，并使用它来嵌入包含应用程序实现的 JavaScript\
  \ 文件。\n\n在调用引擎的 `eval()` 方法并传入 JavaScript 文件之前，先使用引擎的 `put()` 方法将 JavaFX 阶段（stage）传递给引擎。\n\
