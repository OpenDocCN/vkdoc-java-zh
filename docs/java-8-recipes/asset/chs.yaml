  \n您可以添加到属性的另一个特性是更改监听器。JavaFX 的 javafx.beans.value.ChangeListeners 类似于 Java Swing\
  \ 的属性更改支持（java.beans.PropertyChangeListener）。类似地，当 bean 的属性值发生变化时，您会希望收到通知。更改监听器旨在通过向开发者提供旧值和新值来拦截更改。该示例通过为切换按钮创建一个\
  \ JavaFX 更改监听器来开始此过程，该按钮用于打开或关闭网格线。当用户与切换按钮交互时，更改监听器将简单地更新目标网格面板的 gridlinesVisible\
  \ 属性。\n\n\n\n由于切换按钮（ToggleButton）的 `selected` 属性是一个布尔值，因此你需要实例化一个形式类型参数为 `Boolean`\
  \ 的 `ChangeListener` 类。你还会注意到 lambda 表达式形式的变化监听器实现，其入参参数将与实例化 `ChangeListener<Boolean>`\
  \ 时指定的泛型形式类型参数相匹配。当属性变化事件发生时，变化监听器将使用新值调用目标网格面板上的 `setGridLinesVisible()` 方法，并更新切换按钮的文本。以下代码片段展示了向\
  \ `ToggleButton` 添加的 `ChangeListener<Boolean>`：\n\n```java\ngridLinesToggle.selectedProperty().addListener(\n\
  \    (ObservableValue<? extends Boolean> ov,\n     Boolean oldValue, Boolean newVal)\
