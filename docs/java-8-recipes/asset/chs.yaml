  \ minus three days:2014-12-24T05:36:42.199Z\n2014-12-27T05:36:42.199Z[GMT]\nYesterday:\
  \ 2014-12-26T05:36:42.253Z\n```\n\n工作原理\n\n日期-时间 API 引入了一个名为 `Instant` 的新类，它代表基于机器时间的时间线上纳秒的起点。由于基于机器时间，`Instant`\
  \ 的值从纪元（EPOCH，即 1970 年 1 月 1 日 00:00:00Z）开始计数。纪元之前的值为负数，纪元之后的值为正数。`Instant` 类非常适合获取机器时间戳，因为它包含了精确到纳秒的所有相关日期和时间信息。\n\
  \n`Instant` 类是静态且不可变的，因此要获取当前时间戳，可以调用 `now()` 方法。这样做会返回当前 `Instant` 的一个副本。`Instant`\
  \ 还包含转换和计算方法，每个方法都返回 `Instant` 或其他类型的副本。在解决方案中，`now()` 方法返回当前时间戳，随后给出几个示例，展示如何执行计算以及获取\
  \ `Instant` 的信息。\n\n`Instant` 是 JDK 8 中一个重要的新特性，因为它使得处理当前时间和日期数据变得容易。其他日期和时间类，如\
  \ `LocalDateTime`，也很有用。然而，`Instant` 是最精确的时间戳，因为它基于纳秒精度。\n\n4-13\\. 基于时区转换日期和时间\n\
  \n问题\n\n你正在开发的应用有可能在全球范围内使用。在应用的某些区域，需要显示静态的日期和时间，而不是系统的日期和时间。在这种情况下，这些静态的日期和时间需要被转换，以适应用户当前所在的特定时区。\n\
  \n解决方案\n\n日期-时间 API 通过 `Time Zone` 和 `Offset` 类提供了处理时区数据的适当工具。\n\n在以下场景中，假设应用正在处理租车预订。你可以在一个时区租车，然后在另一个时区还车。以下代码行演示了如何在这种场景下打印个人的预订信息。下面的方法名为\
  \ `scheduleReport`，它接受代表取车和还车日期/时间的 `LocalDateTime` 对象，以及各自的 `ZoneId`。航空公司可以使用此方法来打印特定航班的时区信息。\n\
