  复制对象有两种不同的策略：浅拷贝和深拷贝。*浅拷贝*会复制对象，但不复制其任何内容或数据。相反，所有变量都通过引用传递给复制后的对象。创建对象的浅拷贝后，原始对象及其副本中的对象都指向相同的数据和内存。因此，修改原始对象的内容也会修改复制后的对象。默认情况下，对对象调用\
  \ super.clone() 方法执行的是浅拷贝。本方案中的 shallowCopyClone() 方法演示了这种技术。\n\n第二种复制类型称为*深拷贝*，它会复制对象及其所有内容。因此，每个对象指向内存中不同的空间，修改一个对象不会影响另一个对象。在本方案的解决方案中，演示了深拷贝和浅拷贝之间的区别。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 面向对象的 Java\n\n\n\n首先，创建了\
  \ team1 和 team2。接着，为它们填充了一些值。然后，将 team3 对象设置为等于 team1 对象，并将 team4 对象设为 team2 对象的克隆。当\
  \ team1 对象中的值发生更改时，team3 对象中的值也会随之更改，因为这两个对象的内容指向内存中的同一空间。这是对象的**浅拷贝**示例。当 team2\
  \ 对象中的值发生更改时，team4 对象中的值保持不变，因为每个对象都有自己的变量，指向内存中的不同空间。这是**深拷贝**的示例。\n\n为了制作对象的精确副本（深拷贝），必须对对象进行序列化。基类\
  \ `Object` 实现了 `clone()` 方法。默认情况下，`Object` 类的 `clone()` 方法是受保护的。为了使对象可克隆，它必须实现 `Cloneable`\
  \ 接口并重写默认的 `clone()` 方法。你可以通过一系列步骤对对象进行序列化来制作深拷贝，例如将对象写入输出流，然后通过输入流将其读回。本方案解决方案的\
  \ `clone()` 方法中显示的步骤正是如此。对象被写入 `ByteArrayOutputStream`，然后使用 `ByteArrayInputStream`\
  \ 读取。完成此操作后，对象已被序列化，从而创建了深拷贝。本方案解决方案中的 `clone()` 方法已被重写，以便创建深拷贝。\n\n一旦遵循了这些步骤，并且对象实现了\
  \ `Cloneable` 并重写了默认的 `clone()` 方法，就可以克隆该对象了。要制作对象的深拷贝，只需调用该对象重写后的 `clone()` 方法。\n\
  \n`Team team4 = (Team) team2.clone();`\n\n克隆对象并不十分困难，但充分理解对象副本可能存在的差异非常重要。\n\n**5-11.\
