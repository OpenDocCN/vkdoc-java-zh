  \n18-3\\. 在字符串中嵌入表达式\n\n问题\n\n你想在通过 `jjs` 工具调用 JavaScript 时，在字符串中引用表达式或值。\n\n解决方案\n\
  \n\n\n通过 jjs 工具将 Nashorn 用作 shell 脚本语言时，可以在双引号字符串中通过美元符号 $ 和花括号 {} 嵌入表达式或值。以下 JavaScript\
  \ 代码位于名为 recipe18_3.js 的文件中，可通过 jjs 工具作为 shell 脚本执行。此示例中的字符串插值之所以有效，是因为脚本通过添加 shebang\
  \ 作为第一行而变为可执行文件。有关 shebang 的更多信息，请参阅配方 18-10。\n\n#! /usr/bin/env\n\nfunction gallons(width,\
  \ length, avgDepth){var volume = avgDepth * width * length;\n\nreturn volume * 7.48;\
  \ }\n\nprint(\"Gallons of water in pool: ${gallons(16,32,5)}\");\n\n通过 jjs 执行 JavaScript\
  \ 文件，如下所示：\n\njjs src/org/java8recipes/chapter18/js/recipe18_3.js\n\nGallons of\
  \ water in pool: 19148.800000000003\n\nN **注意** 此示例 JavaScript 文件无法从 ScriptEngineManager\
  \ 运行，因为它包含 shebang（它是一个可执行脚本）。\n\n工作原理\n\n使用 Nashorn 的 shell 脚本功能时，可以通过在双引号字符串中使用美元符号和花括号\
  \ ${...} 来嵌入表达式或值。这一概念在 Unix 领域被称为字符串插值，Nashorn 借鉴了这一概念，以便轻松开发用于评估和显示信息的 shell 脚本。字符串插值使得修改字符串内容成为可能，将变量和表达式替换为实际值。利用此功能，可以轻松地将变量内容内联嵌入到字符串中，而无需手动拼接。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 18 章 N NASHORN 与脚本\n\n在本配方的示例中，存储在\
  \ .js 文件中的脚本包含一个嵌入表达式，并调用 JavaScript 函数返回计算出的液体加仑数。这可能是实际场景中最有用的技术，但在将 jjs 工具用作交互式解释器时，也可以使用嵌入表达式。\n\
  \njjs -scripting\n\njjs> \"The current date is ${Date()}\"\n\nThe current date is\
  \ Wed Apr 30 2014 23:44:41 GMT-0500 (CDT)\n\nN **注意** 如果未使用 jjs 的脚本功能，则字符串插值不可用。此外，必须将双引号放在文本字符串周围，因为单引号内的字符串不会进行插值。在示例中，使用\
  \ shebang (#! usr/bin/env) 使脚本可执行，从而调用 jjs 的脚本功能。\n\n18-4\\. 传递 Java 参数\n\n问题\n\n\
