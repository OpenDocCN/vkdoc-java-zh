  \ RSS 订阅源时，您需要找到那个橙色的小图标按钮，并将 URL 地址行拖拽到您的 JavaFX RSS 阅读器应用程序中。\n\n我发现拖拽功能在我的 Firefox\
  \ 浏览器上有效。但是，如果拖拽对您不起作用，我提供了一个文本字段，允许您剪切并粘贴 URL。输入 URL 后，按 Enter 键即可开始加载头条新闻。例如，您可以访问\
  \ Google 的技术新闻 RSS，地址为 [`news.google.com/news?pz=1&cf=all&ne`](http://news.google.com/news?pz=1&cf=all&ned=us&hl=en&topic=tc&output=rss)\n\
  \n[d=us&hl=en&topic=tc&output=rss.](http://news.google.com/news?pz=1&cf=all&ned=us&hl=en&topic=tc&output=rss)\n\
  \n图 17-11 描绘了左上角的橙色 RSS 图标。\n\n**图 17-11.** *RSS 图标*\n\n一旦通过拖放或文本字段接受了 URL，JavaFX\
  \ RSS 阅读器应用程序就会将 URL 位置保存到数据库。RSS 应用程序由三个框架区域组成：RSS 订阅源标题列（左侧）、头条新闻（右上）和网站视图（右下）。要显示新闻标题，请点击左侧的超链接。要在右下角框架中显示整篇文章，请点击右上角框架中标题下方的“查看”按钮。在运行代码之前，应用程序需要将\
  \ JAR 库 `derby.jar` 和 `derbytools.jar` 包含在您的项目类路径中。这些库允许您将 RSS URL 保存到嵌入式 JDBC 数据库中。\n\
  \n与您在配方 17-3 中所做的类似，您从互联网检索新闻信息。检索到的 RSS 将使用 2.0 版本。RSS 是一种 XML 标准，提供真正简单的聚合（Really\
  \ Simple Syndication），因此得名。现在，关于缩写词说得够多了；让我们直接进入代码，好吗？\n\n在 `start()` 方法中，您创建一个\
  \ 640x480 的白色场景显示区域。接下来，您创建一个映射（`TreeMap`），其中包含 `Hyperlink` 对象作为值，以及表示 RSS 订阅源 URL\
  \ 位置（`String`）的键。与之前显示 HTML 内容时一样，您需要创建 `WebView`。这里您创建了两个 `WebView` 和一个 `WebEngine`。\n\
  \n这两个 `WebView` 将分别渲染新闻标题框架区域和整篇文章的查看区域（右下角）。单个 `WebEngine` 负责在用户点击包含 RSS 超链接的左侧框架区域时检索\
  \ RSS 订阅源。\n\n为了支持允许用户输入 RSS 订阅源的功能，您需要创建一个可以保存并渲染头条新闻的文本字段。以下代码片段保存了一个 RSS URL，并将该地址作为新的超链接添加到订阅源列表中。\n\
