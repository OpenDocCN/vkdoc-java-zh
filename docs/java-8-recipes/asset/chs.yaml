  \n<xs:element name=\"name\" type=\"xs:string\"/>\n\n<xs:element name=\"diagnosis\"\
  \ type=\"xs:string\"/>\n\n</xs:sequence>\n\n<xs:attribute name=\"id\" type=\"xs:integer\"\
  \ use=\"required\"/>\n\n</xs:complexType>\n\n</xs:schema>\n\n在前面的 xsd 文件上执行时，`xjc`\
  \ 命令在 `org.java8recipes.chapter20.recipe20_5` 包中创建以下文件：\n\nu `ObjectFactory.java`\n\
  \nu `Patients.java`\n\nu `Patient.java`\n\n工作原理\n\nJDK 包含 `<JDK_HOME>/bin/xjc` 实用程序。`xjc`\
  \ 实用程序是一个命令行应用程序，它从模式文件创建 Java 绑定。源模式文件可以是多种类型，包括 XML Schema、RELAX NG 等。\n\n`xjc`\
  \ 命令有几个选项用于执行其工作。一些最常见的选项指定源模式文件、生成的 Java 绑定文件的包以及将接收 Java 绑定文件的输出目录。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 20 章 N XML 处理\n\n您可以通过使用工具的 `–help` 选项获得所有命令行选项的详细描述：`xjc –help`\n\nJava 绑定包含与\
  \ XML Schema 文件中定义的字段相对应的带注解的字段。这些注解标记了模式文件的根元素和所有其他子元素。这在 XML 处理的下一步中非常有用，该步骤涉及对这些绑定进行解组或编组。\n\
  \n20-6. 将 XML 解组为 Java 对象\n\n问题\n\n您想要解组一个 XML 文件并创建其对应的 Java 对象树。\n\n解决方案\n\n解组是将数据格式（此处为\
  \ XML）转换为对象的内存表示的过程，以便可以用来执行任务。JAXB 提供了一个解组服务，该服务解析 XML 文件并从您在配方 20-4 中创建的绑定生成 Java\
  \ 对象。以下代码可以读取 `org.java8recipes.chapter20.recipe20-6` 包中的文件 `patients.xml`，以创建一个\
  \ `Patients` 根对象及其 `Patient` 对象列表：\n\npublic void run(String xmlFile, String context)\n\
  \nthrows JAXBException, FileNotFoundException {\n\nJAXBContext jc = JAXBContext.newInstance(context);\n\
  \nUnmarshaller u = jc.createUnmarshaller();\n\nFileInputStream fis = new FileInputStream(xmlFile);\n\
  \nPatients patients = (Patients)u.unmarshal(fis);\n\nfor (Patient p: patients.getPatient())\
  \ {\n\nSystem.out.printf(\"ID: %s\\n\", p.getId());\n\nSystem.out.printf(\"NAME:\
  \ %s\\n\", p.getName());\n\nSystem.out.printf(\"DIAGNOSIS: %s\\n\\n\", p.getDiagnosis());\n\
  \n}\n\n}\n\n如果您在 `chapter20/recipe20_6/patients.xml` 文件上运行示例代码，并使用 `org.java8recipes.chapter20`\
  \ 上下文，应用程序将在迭代 `Patient` 对象列表时向控制台打印以下内容：\n\nID: 1\n\nNAME: John Smith\n\nDIAGNOSIS:\
  \ Common Cold\n\nID: 2\n\nNAME: Jane Doe\n\nDIAGNOSIS: Broken ankle\n\nID: 3\n\n\
  NAME: Jack Brown\n\nDIAGNOSIS: Food allergy\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 20 章 N XML 处理\n\nN **注意** 前面的输出直接来自从 XML 表示创建的 Java `Patient` 类的实例。代码不直接打印 XML\
  \ 文件的内容。相反，它在 XML 被编组到适当的 Java 绑定实例后打印 Java 绑定的内容。\n\n工作原理\n\n将 XML 文件解组为其 Java\
  \ 对象表示至少有两个条件：\n\nu 一个格式良好且有效的 XML 文件\n\nu 一组相应的 Java 绑定\n\nJava 绑定不必由 `xjc` 命令自动生成。一旦您对\
  \ Java 绑定和注解特性有了一些经验，您可能更愿意通过手工制作 Java 绑定来创建和控制 Java 绑定的所有方面。无论您的偏好如何，Java 的解组服务都利用绑定及其注解将\
  \ XML 对象映射到目标 Java 对象，并将 XML 元素映射到目标对象字段。\n\n使用以下语法执行此配方的示例应用程序，将 `patients.xml`\
  \ 和 `org.java8recipes.chapter20.recipe20_6` 替换为相应的参数：\n\njava org.java8recipes.chapter20.recipe20_6.UnmarshalPatients\
  \ <xmlfile><context>\n\n20-7. 使用 JAXB 构建 XML 文档\n\n问题\n\n您需要将对象的数据写入 XML 表示。\n\n\
