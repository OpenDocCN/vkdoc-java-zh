  \n</patient>\n\n</patients>\n\nN **注意** 上述代码中的`getPatient()`方法返回的是一个患者对象列表，而非单个患者。这是本例中从\
  \ XSD 模式生成 JAXB 代码时的一个命名特例。\n\n工作原理\n\n`Marshaller`对象能够理解 JAXB 注解。在处理类时，它会利用 JAXB\
  \ 注解提供必要的上下文，从而在 XML 中创建对象树。\n\n您可以通过以下命令行从`org.java8recipes.chapter20.recipe20_7.MarshalPatients`应用程序运行上述代码：\n\
