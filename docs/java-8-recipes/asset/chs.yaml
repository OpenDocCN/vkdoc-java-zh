  \ JVM。您可以通过打开“分析”菜单，然后选择“高级命令”来找到“管理校准数据”选项。\n\n11-6\\. 获取线程转储\n\n**问题**\n\n您的程序似乎“挂起”且无任何响应，您怀疑可能存在死锁。\n\
