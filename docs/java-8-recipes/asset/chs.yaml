  \ 方法可用于测试两个对象是否包含相同的值。为了使用 `equals()` 方法进行比较，被比较的对象应重写 `Object` 类的 `equals()` 和\
  \ `hashCode()` 方法。`equals()` 方法应实现对对象中包含的值的比较，从而得出真实的比较结果。以下代码是一个重写的 `equals()`\
