  \ 语言通过提供众多选项和功能来增强应用程序的安全性，从而使得开发安全应用程序变得容易。在 Java 8 中，安全选项的各个方面都进行了新增和增强，使 Java\
  \ 语言更加健壮和安全。\n\n以下是其中一些安全功能的列表：\n\nu  默认启用 TLS 1.1 和 TLS 1.2\n\nu  限制 doPrivileged()\
