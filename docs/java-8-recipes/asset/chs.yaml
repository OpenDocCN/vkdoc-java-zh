  \ http://www.unicode.org/charts/ 是一个](http://www.unicode.org/charts/) 查找与给定字符对应的码点的好起点。\n\
  \n1-5. 字符串与基本类型的相互转换\n\n问题\n\n你有一个基本数据类型的值，并希望将该值表示为人类可读的字符串。或者，你想反向操作，将人类可读的字符串转换为基本数据类型。\n\
  \n解决方案\n\n遵循清单 1-5 中的模式之一。该清单展示了从字符串到双精度浮点值的转换，并展示了两种将值转换回字符串的方法。\n\n**清单 1-5.**\
  \ 字符串转换的通用模式\n\npackage org.java8recipes.chapter01.recipe1_05;\n\npublic class StringConversion\
  \ {\n\npublic static void main (String[] args) {\n\ndouble pi;\n\nString strval;\n\
  \npi = Double.parseDouble(\"3.14\");\n\nSystem.out.println(strval = String.valueOf(pi));\n\
  \nSystem.out.println(Double.toString(pi));\n\n}\n\n}\n\n工作原理\n\n该解决方案说明了一些适用于所有基本类型的转换模式。首先，是将浮点数从其人类可读表示形式转换为\
  \ Java 语言用于浮点运算的 IEEE 754 格式：\n\npi = Double.parseDouble(\"3.14\");\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 开始使用 Java 8\n\n注意这个模式。你可以将 `Double` 替换为 `Float`、`Long` 或任何其他目标数据类型。每个基本类型都有一个对应的包装类，名称相同但首字母大写。\n\
  \n这里的基本类型是 `double`，对应的包装类是 `Double`。包装类实现了诸如 `Double.parseDouble()`、`Long.parseLong()`、`Boolean.parseBoolean()`\
  \ 等辅助方法。这些解析方法将人类可读的表示形式转换为相应类型的值。\n\n反过来，通常最简单的方法是调用 `String.valueOf()`。`String`\
  \ 类实现了此方法，并且针对每种基本数据类型都进行了重载。或者，包装类也实现了 `toString()` 方法，你可以调用这些方法将底层类型的值转换为其人类可读的形式。采用哪种方法取决于你的个人偏好。\n\
  \n\n\n针对数值类型的转换需要一些异常处理才能实用。通常，你需要优雅地处理这样一种情况：某个字符串值本应是有效的数值表示形式，但实际上并非如此。第 9 章将详细讨论异常处理，而接下来的技巧\
  \ 1-7 会提供一个简单示例，帮助你入门。\n\n**N 注意** 布尔类型的字面量是\"true\"和\"false\"。它们是区分大小写的。当使用`Boolean.parseBoolean()`转换方法从字符串进行转换时，任何非这两个值的其他值都会被静默地解释为\
  \ false。\n\n1-6\\. 通过命令行执行传递参数\n\n问题\n\n你想通过命令行向 Java 应用程序传递值。\n\n解决方案\n\n使用`java`命令运行应用程序，并在应用程序名称之后指定要传递的参数。如果要传递多个参数，每个参数之间应用空格分隔。例如，假设你想向清单\
  \ 1-6 中创建的类传递参数。\n\n**清单 1-6.** 访问命令行参数的示例\n\npackage org.java8recipes.chapter01.recipe1_06;\n\
  \npublic class PassingArguments {\n\npublic static void main(String[] args){\n\n\
  if(args.length > 0){\n\nSystem.out.println(\"传递给程序的参数：\");\n\nfor (String arg:args){\n\
  \nSystem.out.println(arg);\n\n}\n\n} else {\n\nSystem.out.println(\"没有参数传递给程序。\"\
  );\n\n}\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 开始使用\
  \ Java 8\n\n首先，确保编译程序，以便拥有一个可执行的.class 文件。你可以在 NetBeans 中通过右键单击文件并从上下文菜单中选择“编译文件”选项来完成此操作。\n\
  \n接下来，打开命令提示符或终端窗口，并导航到项目的`build\\classes`目录。\n\n（关于从命令行执行的详细讨论，请参见技巧 1-3）。例如：`cd\
  \ <项目路径>\\Java8Recipes\\build\\classes`\n\n现在，发出`java`命令来执行该类，并在命令行上类名之后输入一些参数。以下示例传递了两个参数：\n\
  \njava org.java8recipes.chapter01.recipe1_06.PassingArguments Upper Peninsula\n\n\
  你应该会看到以下输出：\n\n传递给程序的参数：\n\nUpper\n\nPenninsula\n\n空格用于分隔参数。当你想传递包含空格或其他特殊字符的参数时，请将字符串用双引号括起来。例如：\n\
  \njava org.java8recipes.chapter01.recipe1_06.PassingArguments \"Upper Peninsula\"\
  \n\n现在输出只显示一个参数：\n\n传递给程序的参数：\n\nUpper Penninsula\n\n双引号将字符串\"Upper Peninsula\"\
  转换为单个参数。\n\n工作原理\n\n所有可从命令行或终端执行的 Java 类都包含一个`main()`方法。如果你查看`main()`方法的签名，可以看到它接受一个`String[]`参数。换句话说，你可以将字符串对象数组传递给`main()`方法。命令解释器（如\
  \ Windows 命令提示符以及各种 Linux 和 Unix shell）会根据你的命令行参数构建一个字符串数组，并将该数组代表你传递给`main()`方法。\n\
  \n示例中的`main()`方法会显示传递的每个参数。首先，测试名为`args`的数组长度是否大于零。如果是，该方法将通过执行`for`循环遍历数组中的每个参数，并沿途显示每个参数。如果没有传递参数，`args`数组的长度将为零，并会打印一条指示此情况的消息。否则，你会看到一条不同的消息，后跟参数列表。\n\
  \n命令解释器将空格以及有时其他字符识别为分隔符。通常，传递由空格分隔的数值作为参数是安全的，无需费心将每个值用引号括起来。\n\n\n\n然而，你应该养成将字符串参数用双引号括起来的习惯，如最终解决方案示例所示。这样做可以消除每个参数起始和结束位置上的任何歧义。\n\
  \n**注意** Java 将所有参数视为字符串。如果你将数值作为参数传递，它们会以人类可读的字符串形式进入 Java。你可以使用配方 1-5 中所示的转换方法将它们转换为适当的数值类型。\n\
