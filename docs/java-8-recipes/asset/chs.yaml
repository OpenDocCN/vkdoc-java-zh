  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 使用数据库\n\n工作原理\n\n在数据库应用程序中获取连接可能涉及大量代码。此外，如果每次需要获取连接时都重新输入代码，这个过程很容易出错。通过将数据库连接逻辑封装在单个类中，你可以在每次需要数据库连接时重用相同的连接代码。\n\
  \n这提高了你的生产力，减少了输入错误的可能性，并且还增强了可管理性，因为如果需要做出更改，只需在一个地方进行，而不是在多个不同的位置。\n\n创建一种策略性的连接方法对你以及将来可能需要维护你代码的其他人都是有益的。尽管在使用应用服务器或\
  \ JNDI 时，数据源是管理数据库连接的首选技术，但本方案的解决方案演示了使用标准 JDBC `DriverManager`连接。使用`DriverManager`的一个安全隐患是，你需要将数据库凭据存储在某个地方以供应用程序使用。将这些凭据以明文形式存储在任何地方都是不安全的，将它们嵌入到应用程序代码中也是不安全的，因为代码将来可能会被反编译。如解决方案所示，使用一个磁盘上的属性文件来存储数据库凭据。假设此属性文件在部署到服务器之前的某个时间点会被加密，并且应用程序能够处理解密。\n\
  \n\n如解决方案所示，代码从属性文件中读取数据库凭据、主机名、数据库名称和端口号。然后将这些信息拼接起来，形成一个 JDBC URL，供 `DriverManager`\
  \ 用于获取数据库连接。一旦获得连接，便可在任何地方使用，然后关闭。类似地，如果使用已部署到应用服务器的 `DataSource`，则属性文件可用于存储 JNDI\
  \ 连接。这是使用 `DataSource` 获取数据库连接所需的唯一信息。对于使用连接类的开发者而言，这两种连接类型之间的唯一区别在于获取 `Connection`\
  \ 对象时所调用的方法名称。\n\n你可以开发一个 JDBC 应用程序，使得用于获取连接的代码需要在整个程序中硬编码。相反，此解决方案使获取连接的所有代码都能被封装在单个类中，这样开发者就无需为此操心。这种技术还使代码更易于维护。例如，如果应用程序最初是使用\
  \ `DriverManager` 部署的，但后来具备了使用 `DataSource` 的能力，那么只需更改极少的代码。\n\n13-6. 防范 SQL 注入\n\
  \n问题\n\n你的应用程序执行数据库任务。为了降低 SQL 注入攻击的风险，你需要确保没有未经过滤的文本字符串被附加到 SQL 语句中并针对数据库执行。\n\n\
  **提示** 尽管预处理语句是此方案的解决方案，但它们的作用不仅限于防范 SQL 注入。它们还提供了一种集中化并更好地控制应用程序中使用的 SQL 的方法。例如，与其创建同一查询的多个可能不同的版本，不如将查询创建为预处理语句一次，然后在代码中的许多不同位置调用它。对查询逻辑的任何更改只需在准备语句的地方进行。\n\
  \n解决方案\n\n使用 `PreparedStatement` 执行数据库任务。`PreparedStatement` 向 DBMS 发送的是预编译的 SQL\
  \ 语句，而不是字符串。以下代码演示了如何使用 `java.sql.PreparedStatement` 对象执行数据库查询和数据库更新。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n在以下代码示例中，使用 `PreparedStatement` 查询数据库中的给定记录。假设字符串 `recipeNumber`\
  \ 作为变量传递给此代码。\n\n```java\nString sql = \"SELECT ID, RECIPE_NUMBER, RECIPE_NAME,\
  \ DESCRIPTION \" +\n             \"FROM RECIPES \" +\n             \"WHERE RECIPE_NUMBER\
  \ = ?\";\ntry(PreparedStatement pstmt = conn.prepareStatement(sql);) {\n    pstmt.setString(1,\
  \ recipeNumber);\n    ResultSet rs = pstmt.executeQuery();\n    while(rs.next()){\n\
  \        System.out.println(rs.getString(2) + \": \" + rs.getString(3) +\n     \
  \                      \" - \" + rs.getString(4));\n    }\n} catch (SQLException\
  \ ex) {\n    ex.printStackTrace();\n}\n```\n\n下一个示例演示了使用 `PreparedStatement` 将记录插入数据库。假设字符串\
  \ `recipeNumber`、`title`、`description` 和 `text` 作为变量传递给此代码。\n\n```java\nString sql\
  \ = \"INSERT INTO RECIPES VALUES(\" +\n             \"NEXT VALUE FOR RECIPES_SEQ,\
  \ ?,?,?,?)\";\ntry(PreparedStatement pstmt = conn.prepareStatement(sql);) {\n  \
  \  pstmt.setString(1, recipeNumber);\n    pstmt.setString(2, title);\n    pstmt.setString(3,\
  \ description);\n    pstmt.setString(4, text);\n    pstmt.executeUpdate();\n   \
  \ System.out.println(\"Record successfully inserted.\");\n} catch (SQLException\
  \ ex){\n    ex.printStackTrace();\n}\n```\n\n在最后一个示例中，使用 `PreparedStatement` 从数据库中删除一条记录。同样，假设字符串\
  \ `recipeNumber` 作为变量传递给此代码。\n\n```java\nString sql = \"DELETE FROM RECIPES WHERE\
  \ \" +\n             \"RECIPE_NUMBER = ?\";\ntry(PreparedStatement pstmt = conn.prepareStatement(sql);)\
  \ {\n    pstmt.setString(1, recipeNumber);\n    pstmt.executeUpdate();\n    System.out.println(\"\
  Recipe \" + recipeNumber + \" successfully deleted.\");\n} catch (SQLException ex){\n\
  \    ex.printStackTrace();\n}\n```\n\n如你所见，`PreparedStatement` 与标准的 JDBC 语句对象非常相似，但它向\
  \ DBMS 发送的是预编译的 SQL，而不是文本字符串。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n工作原理\n\n虽然标准的 JDBC 语句也能完成任务，但严酷的现实是，它们有时可能不安全且使用起来很繁琐。例如，如果使用动态\
  \ SQL 语句查询数据库，并且将用户接受的字符串分配给一个变量并与预期的 SQL 字符串拼接，则可能会发生糟糕的情况。在大多数普通情况下，用户接受的字符串会被拼接，并且\
  \ SQL 字符串会按预期用于查询数据库。然而，攻击者可能决定在字符串中放置恶意代码（即 SQL 注入），然后使用标准的 `Statement` 对象无意中将其发送到数据库。使用\
  \ `PreparedStatement` 可以防止此类恶意字符串被拼接到 SQL 字符串中并传递给 DBMS，因为它们采用了不同的方法。`PreparedStatement`\
  \ 使用替换变量而不是拼接来使 SQL 字符串动态化。它们也是预编译的，这意味着在将 SQL 发送到 DBMS 之前，会形成一个有效的 SQL 字符串。此外，`PreparedStatement`\
  \ 可以帮助你的应用程序获得更好的性能，因为如果相同的 SQL 必须运行多次，它只需编译一次。之后，替换变量可以互换，但整个 SQL 可以由 `PreparedStatement`\
  \ 非常快速地执行。\n\n让我们看看 `PreparedStatement` 在实践中是如何工作的。如果你查看此方案解决方案中的第一个示例，可以看到正在查询数据库表\
  \ `RECIPES`，传递一个 `RECIPE_NUMBER` 并检索匹配记录的结果。SQL 字符串如下所示：\n\n```java\nString sql\
  \ = \"SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION \" +\n             \"FROM\
  \ RECIPES \" +\n             \"WHERE RECIPE_NUM = ?\";\n```\n\n除了字符串末尾的问号（`?`）之外，SQL\
  \ 文本看起来一切正常。在 SQL 字符串中放置问号表示在执行 SQL 时，将使用一个替换变量来代替该问号。使用 `PreparedStatement` 的下一步是声明一个类型为\
  \ `PreparedStatement` 的变量。\n\n这可以通过以下代码行看到：\n\n```java\nPreparedStatement pstmt\
  \ = null;\n```\n\n`PreparedStatement` 实现了 `AutoCloseable`，因此可以在 try-with-resources\
  \ 块的上下文中使用它。一旦声明了 `PreparedStatement`，就可以使用它了。然而，使用 `PreparedStatement` 可能不会引发异常。因此，在不使用\
  \ try-with-resources 的情况下，`PreparedStatement` 应该出现在 try-catch 块中，以便可以优雅地处理任何异常。例如，如果数据库连接由于某种原因不可用，或者\
  \ SQL 字符串无效，则可能发生异常。与其让应用程序因此类问题崩溃，不如在 catch 块中明智地处理异常。以下 try-catch 块包含了将 SQL 字符串发送到数据库并检索结果所需的代码：\n\
  \n```java\ntry(PreparedStatement pstmt = conn.prepareStatement(sql);) {\n    pstmt.setString(1,\
  \ recipeNumber);\n    ResultSet rs = pstmt.executeQuery();\n    while(rs.next()){\n\
  \        System.out.println(rs.getString(2) + \": \" + rs.getString(3) +\n     \
  \                      \" - \" + rs.getString(4));\n    }\n} catch (SQLException\
  \ ex) {\n    ex.printStackTrace();\n}\n```\n\n\n\n首先，可以看到使用 Connection 对象来实例化 PreparedStatement\
  \ 对象。SQL 字符串在创建时被传递给 PreparedStatement 对象的构造函数。由于 PreparedStatement 是在 try-with-resources\
  \ 结构中实例化的，因此当不再使用时，它将被自动关闭。接下来，PreparedStatement 对象用于为 SQL 字符串中的任何替换变量设置值。如您所见，示例中使用\
  \ PreparedStatement 的 setString() 方法将位置 1 的替换变量设置为与 recipeNumber 变量的内容相等。替换变量的定位与\
  \ SQL 字符串中问号 (?) 的位置相关联。字符串中的第一个问号被分配给第一个位置，第二个问号被分配给第二个位置，依此类推。\n\n如果有多个替换变量需要赋值，则会对\
  \ PreparedStatement 进行多次调用，依次为每个变量赋值，直到所有变量都被处理完毕。PreparedStatement 可以接受多种不同数据类型的替换变量。例如，如果要将一个\
  \ int 值赋给一个替换变量，则需要调用 setInt(position, variable) 方法。有关可用于使用 PreparedStatement 对象分配替换变量的完整方法集，请参阅在线文档或\
  \ IDE 的代码补全功能。\n\n一旦所有变量都被赋值，就可以执行 SQL 字符串了。PreparedStatement 对象包含一个 executeQuery()\
  \ 方法，用于执行表示查询的 SQL 字符串。executeQuery() 方法返回一个 ResultSet 对象，其中包含针对特定 SQL 查询从数据库获取的结果。接下来，可以遍历\
  \ ResultSet 以获取从数据库中检索到的值。同样，通过调用 ResultSet 对象的相应 getter 方法并传递要获取的列值的位置，使用位置分配来检索结果。位置由列名在\
  \ SQL 字符串中出现的顺序决定。在示例中，第一个位置对应 RECIPE_NUMBER 列，第二个位置对应 RECIPE_NAME 列，依此类推。如果 recipeNumber\
  \ 字符串变量等于 \"13-1\"，则执行示例中查询的结果将类似于以下内容：13-1: Connecting to a Database - DriverManager\
  \ and DataSource Implementations\n\n当然，如果替换变量设置不正确，或者 SQL 字符串有问题，则会抛出异常。这将导致 catch\
  \ 块中包含的代码被执行。在使用完 PreparedStatement 后，您还应该确保通过关闭语句来进行清理。如果您没有使用 try-with-resources\
  \ 结构，那么最好将所有清理代码放在 finally 块中，以确保即使抛出异常，PreparedStatement 也能被正确关闭。在示例中，finally 块如下所示：\n\
  \nfinally {\n\nif (pstmt != null){\n\ntry {\n\npstmt.close();\n\n} catch (SQLException\
  \ ex) {\n\nex.printStackTrace();\n\n}\n\n}\n\n}\n\n可以看到，检查了已实例化的 PreparedStatement\
  \ 对象 pstmt 是否为 NULL。如果不是，则通过调用 close() 方法将其关闭。\n\n通过处理本方案中的代码，您可以看到使用类似的代码来处理数据库的\
  \ INSERT、UPDATE 和 DELETE 语句。这些情况的唯一区别在于，调用的是 PreparedStatement 的 executeUpdate()\
  \ 方法，而不是 executeQuery() 方法。executeUpdate() 方法将返回一个 int 值，表示受 SQL 语句影响的行数。\n\nPreparedStatement\
  \ 对象的使用优于 JDBC Statement 对象。这是因为它们更安全且性能更好。它们还可以使您的代码更易于理解和维护。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\n13-7. 执行事务\n\n问题\n\n您的应用程序的结构要求按顺序处理任务。一个任务依赖于另一个任务，并且每个进程执行不同的数据库操作。如果途中的某个任务失败，则需要撤销已经发生的数据库处理。\n\
  \n解决方案\n\n将您的 Connection 对象的自动提交设置为 false，然后执行您想要完成的事务。一旦您成功执行了每个事务，手动提交 Connection\
  \ 对象；否则，回滚所有已发生的事务。以下代码示例演示了事务管理。如果您查看 TransactionExample 类的 main() 方法，您会看到 Connection\
  \ 对象的 autoCommit() 首选项已设置为 false，然后执行数据库事务。如果所有事务都成功，则通过调用 commit() 方法手动提交 Connection\
  \ 对象；否则，通过调用 rollback() 方法回滚所有事务。\n\nimport java.sql.Connection;\n\nimport java.sql.PreparedStatement;\n\
  \nimport java.sql.ResultSet;\n\nimport java.sql.SQLException;\n\nimport org.java8recipes.chapter13.recipe13_01.CreateConnection;\n\
  \npublic class TransactionExample {\n\npublic static Connection conn = null;\n\n\
  public static void main(String[] args) {\n\nboolean successFlag = false;\n\ntry\
  \ {\n\nCreateConnection createConn = new CreateConnection();\n\nconn = createConn.getConnection();\n\
  \nconn.setAutoCommit(false);\n\nqueryDbRecipes();\n\nsuccessFlag = insertRecord(\n\
  \n\"13-6\",\n\n\"Simplifying and Adding Security with Prepared Statements\",\n\n\
  \"Working with Prepared Statements\",\n\n\"Recipe Text\");\n\nif (successFlag ==\
  \ true){\n\nsuccessFlag = insertRecord(\n\n\"13-6B\",\n\n\"Simplifying and Adding\
  \ Security with Prepared Statements\",\n\n\"Working with Prepared Statements\",\n\
  \n\"Recipe Text\");\n\n}\n\n// 提交事务\n\nif (successFlag == true)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 使用数据库\n\nconn.commit();\n\nelse\n\nconn.rollback();\n\nconn.setAutoCommit(true);\n\
  \nqueryDbRecipes();\n\n} catch (java.sql.SQLException ex) {\n\nSystem.out.println(ex);\n\
  \n} finally {\n\nif (conn != null) {\n\ntry {\n\nconn.close();\n\n} catch (SQLException\
  \ ex) {\n\nex.printStackTrace();\n\n}\n\n}\n\n}\n\n}\n\nprivate static void queryDbRecipes(){\n\
  \nString sql = \"SELECT ID, RECIPE_NUMBER, RECIPE_NAME, DESCRIPTION \" +\n\n\"FROM\
