  \n在两种解决方案的源代码中，您都会注意到 JavaFX 应用程序继承了 `javafx.application.Application` 类。`Application`\
  \ 类提供了应用程序生命周期函数，例如在运行时启动和停止。这也为 Java 应用程序以线程安全的方式启动 JavaFX GUI 组件提供了一种机制。请记住，与\
  \ Java Swing 的事件调度线程类似，JavaFX 有自己的 JavaFX 应用程序线程。JavaFX 8 的新特性是，事件调度线程和 JavaFX 应用程序线程可以合并（参见配方\
  \ 14-18）。\n\n\n\n查看代码，在 `main()` 方法的入口点，你只需将命令行参数传递给 `Application.launch()` 方法即可启动\
  \ JavaFX 应用程序。一旦应用程序进入就绪状态，框架内部将调用 `start()` 方法来开始执行。当 `start()` 方法被调用时，一个 JavaFX\
  \ 的 `javafx.stage.Stage` 对象便可供开发者使用和操作。\n\n你会注意到一些对象的命名有些奇特，比如 `Stage` 和 `Scene`。API\
  \ 的设计者将事物类比为剧院或戏剧，演员在观众面前表演。按照同样的类比，要上演一出戏，基本上需要演员在一到多个场景（Scene）中表演。当然，所有场景都在一个舞台（Stage）上进行。在\
  \ JavaFX 中，`Stage` 相当于一个应用程序窗口，类似于 Java Swing API 中的 `JFrame` 或 `JDialog`。你可以将 `Scene`\
  \ 对象视为一个内容面板，能够容纳零到多个 `Node` 对象。`Node` 是所有要渲染的场景图节点的基本基类。场景图是一种树形数据结构，它维护着应用程序中所有节点或图形对象的内部模型。常用的节点是\
  \ UI 控件和 `Shape` 对象。与树形数据结构类似，场景图通过使用容器类 `Group` 来包含子节点。稍后在学习 `ObservableList` 时，你会了解更多关于\
  \ `Group` 类的知识，但现在你可以将它们视为能够容纳 `Node` 的 Java 列表或集合。\n\n添加子节点后，你需要设置 `primaryStage`（`Stage`）的场景，并在\
