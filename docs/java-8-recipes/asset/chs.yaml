  \ 和 Text 类。以下代码绘制了各种复杂形状。第一个复杂形状涉及一条以正弦波形状绘制的三次曲线。下一个形状称为冰淇淋蛋筒，使用了包含路径元素（`javafx.scene.shape.PathElement`）的\
