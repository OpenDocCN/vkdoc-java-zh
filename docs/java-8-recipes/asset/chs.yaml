  \n问题\n\n你的应用程序包含一个冰球队的 `Player` 对象列表。你想根据进球数最多的球员对该列表进行排序，并且希望使用简洁且易于理解的代码来实现。\n\
  \nN **注意** 本技巧中的解决方案使用了集合和排序。要了解更多关于集合的信息，请参考第 7 章。\n\n解决方案 1\n\n使用 `Player` 对象中包含的访问器方法为要排序的字段创建一个比较器。在本例中，你想按进球数排序，因此比较器应基于\
