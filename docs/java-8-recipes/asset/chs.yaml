  \ {\n\ncontinue; // 对“已读”消息不感兴趣\n\n}\n\nif (processMessage(message)) {\n\nSystem.out.println(\"\
  Processed :\"+message.getSubject());\n\nmessage.setFlag(Flags.Flag.DELETED, true);\n\
  \n} else {\n\nSystem.out.println(\"Couldn't Understand :\"+message.getSubject());\n\
  \n// 将其标记为已读，但保留它\n\nmessage.setFlag(Flags.Flag.SEEN, true);\n\n}\n\n}\n\ninbox.close(true);\n\
  \n} catch (MessagingException e) {\n\ne.printStackTrace();\n\n}\n\n}\n\nprivate\
  \ boolean processMessage(Message message) throws MessagingException {\n\nboolean\
  \ result = false;\n\nString subject = message.getSubject().toLowerCase();\n\nif\
  \ (subject.startsWith(\"subscribe\")) {\n\nString emailAddress = extractAddress\
  \ (message.getFrom());\n\nif (emailAddress != null) {\n\nsubscribeToList(emailAddress);\n\
  \nresult = true;\n\n}\n\n} else if (subject.startsWith(\"unsubscribe\")) {\n\nString\
  \ emailAddress = extractAddress (message.getFrom());\n\nif (emailAddress != null)\
  \ {\n\nunSubscribeToList(emailAddress);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 19 章 电子邮件\n\nresult = true;\n\n}\n\n}\n\nreturn result;\n\n}\n\nprivate String\
  \ extractAddress(Address[] addressArray) {\n\nif ((addressArray == null) || (addressArray.length\
  \ < 1)) return null;\n\nif (!(addressArray[0] instanceof InternetAddress)) return\
  \ null;\n\nInternetAddress internetAddress = (InternetAddress) addressArray[0];\n\
  \nreturn internetAddress.getAddress();\n\n}\n\n工作原理\n\n连接到 IMAP 服务器后，该示例请求所有已接收的消息。代码会跳过那些标记为\
  \ SEEN 的消息。为此，配方使用 `Arrays.AsList` 将系统消息标志数组转换为 `ArrayList`。一旦列表创建完成，只需查询该列表以查看它是否包含\
  \ `Flag.SEEN` 枚举值。如果存在该值，示例将跳到下一个项目。\n\n当找到未读消息时，消息由 `processMessage()` 方法处理。该方法根据主题行的开头来订阅或取消订阅消息的发送者。（这类似于邮件列表，发送主题为“subscribe”的消息会将发送者添加到邮件列表中。）在确定要执行的命令后，代码继续从消息中提取发送者的电子邮件。为此，`processMessage()`\
  \ 调用 `extractEmail()` 方法。每条消息都包含一个可能的“发件人”地址数组。这些 `Address` 对象是通用的，因为 `Address`\
  \ 对象可以表示互联网或新闻组地址。在检查 `Address` 对象确实是 `InternetAddress` 后，代码将 `Address` 对象转换为 `InternetAddress`\
  \ 并调用 `getAddress()` 方法，该方法包含实际的电子邮件地址。\n\n\n\n一旦提取出电子邮件地址，该方案会根据主题行调用订阅或取消订阅功能。\n\
  \n如果消息能够被理解（即消息已被处理），`processMessage()` 方法会返回 `true`（如果无法理解消息，则返回 `false`）。在 `checkForMail()`\
  \ 方法中，当 `processMessage()` 方法返回 `true` 时，该消息会被标记为删除（通过调用 `message.setFlag(Flags.Flag.DELETED,\
  \ true)`）；否则，消息仅被标记为已读。这样，如果消息未被理解，它仍会保留；如果已被处理，则会被删除。最后，要提交消息上的新标记（并清除已删除的消息），你需要调用\
  \ `inbox.close(true)` 方法。\n\n总结\n\n电子邮件在我们今天使用的许多系统中扮演着重要角色。Java 语言包含 JavaMail API，使开发者能够在\
  \ Java 应用程序中集成强大的电子邮件功能。本章的方案涵盖了从安装到高级用法的 JavaMail API。要了解更多关于 JavaMail 以及如何将邮件集成到部署在企业应用服务器上的\
  \ Java 应用程序中，请参考在线文档：[`www.oracle.com/technetwork/java/javamail/index-141777.html`](http://www.oracle.com/technetwork/java/javamail/index-141777.html)。\n\
