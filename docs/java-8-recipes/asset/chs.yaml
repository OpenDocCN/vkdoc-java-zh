  \ 从键盘接受输入\n\n问题\n\n你希望编写一个命令行或终端应用程序，用于接受来自键盘的用户输入。\n\n解决方案\n\n使用 `java.io.BufferedReader`\
  \ 和 `java.io.InputStreamReader` 类来读取键盘输入并将其存储到局部变量中。清单 1-7 展示了一个程序，它会持续提示输入，直到你输入一些代表有效\
  \ `long` 类型值的字符为止。\n\n**清单 1-7.** 键盘输入与异常处理\n\npackage org.java8recipes.chapter01.recipe1_07;\n\
  \nimport java.io.*;\n\npublic class AcceptingInput {\n\npublic static void main(String[]\
  \ args){\n\nBufferedReader readIn = new BufferedReader(\n\nnew InputStreamReader(System.in)\n\
  \n);\n\nString numberAsString = \"\";\n\nlong numberAsLong = 0;\n\nboolean numberIsValid\
  \ = false;\n\ndo {\n\n/* 向用户请求一个数字。 */\n\nSystem.out.println(\"请输入一个数字：\");\n\n\
  try {\n\nnumberAsString = readIn.readLine();\n\nSystem.out.println(\"你输入了 \" + numberAsString);\n\
  \n} catch (IOException ex){\n\nSystem.out.println(ex);\n\n}\n\n/* 将数字转换为二进制形式。 */\n\
  \ntry {\n\nnumberAsLong = Long.parseLong(numberAsString);\n\nnumberIsValid = true;\n\
  \n} catch (NumberFormatException nfe) {\n\nSystem.out.println (\"不是数字！\");\n\n}\n\
  \n} while (numberIsValid == false);\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 N Java 8 入门\n\n以下是该程序的一次运行示例：\n\n请输入一个数字：\n\nNo\n\n你输入了 No\n\n不是数字！\n\n\
  请输入一个数字：\n\nYes\n\n你输入了 Yes\n\n不是数字！\n\n请输入一个数字：\n\n42\n\n你输入了 42\n\n构建成功（总耗时：11\
  \ 秒）\n\n前两次输入的值在 `long` 数据类型中无效。第三个值是有效的，运行结束。\n\n工作原理\n\n通常，我们的应用程序需要接受某种形式的用户输入。诚然，如今大多数应用程序并非在命令行或终端中使用，但能够创建从命令行或终端读取输入的应用程序有助于打下良好的基础，并且在某些应用程序中可能很有用。终端输入在开发供你或系统管理员使用的管理应用程序时也很有用。\n\
  \n本配方的解决方案中使用了两个辅助类：`java.io.BufferedReader` 和 `java.io.InputStreamReader`。理解代码中使用这些类的早期部分尤为重要：\n\
  \nBufferedReader readIn = new BufferedReader(\n\nnew InputStreamReader(System.in)\n\
  \n);\n\n这条语句中最内层的对象是 `System.in`。它代表键盘。你无需声明 `System.in`。Java 的运行时环境会为你创建该对象。它只是“存在”在那里供你使用。\n\
  \n`System.in` 提供对来自输入设备（本例中为键盘）的原始字节数据的访问。`InputStreamReader` 类的工作是获取这些字节并将其转换为当前字符集中的字符。`System.in`\
  \ 被传递给 `InputStreamReader()` 构造函数以创建一个 `InputStreamReader` 对象。\n\n`InputStreamReader`\
  \ 了解字符，但不了解行。`BufferedReader` 类的工作是检测输入流中的换行符，并使你能够方便地一次读取一行。`BufferedReader` 还通过允许以与应用程序消耗数据不同的块大小从输入设备进行物理读取来提高效率。当输入流是大型文件而非键盘时，这一方面会有所不同。\n\
  \n以下是清单 1-7 中的程序如何使用 `BufferedReader` 类的实例（名为 `readIn`）从键盘读取一行输入：\n\nnumberAsString\
  \ = readIn.readLine();\n\n执行此语句会触发以下序列：\n\n1. `System.in` 返回一个字节序列。\n2. `InputStreamReader`\
  \ 将这些字节转换为字符。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 N Java\
  \ 8 入门\n\n3. `BufferedReader` 将字符流分解为输入行。\n4. `readLine()` 向应用程序返回一行输入。\n\nI/O 调用必须包装在\
  \ `try...catch` 块中。这些块会捕获可能发生的任何异常。示例中的 `try` 部分在转换不成功时会失败。失败会阻止 `numberIsValid`\
  \ 标志被设置为 `true`，从而导致 `do` 循环进行下一次迭代，以便用户可以再次尝试输入有效值。\n\n清单 1-7 顶部的以下语句值得一提：\n\n\
  import java.io.*;\n\n此语句使 `java.io` 包中定义的类和方法可用。其中包括 `InputStreamReader` 和 `BufferedReader`。还包括第一个\
  \ `try...catch` 块中使用的 `IOException` 类。\n\n1-8. 为代码编写文档\n\n问题\n\n你希望为一些 Java 类编写文档，以方便未来的维护工作。\n\
  \n解决方案\n\n使用 Javadoc 在你想要文档化的任何类、方法或字段之前放置注释。要开始这样的注释，请写入字符 `/**`。然后，后续每一行都以星号 (`*`)\
  \ 开头。最后，在末尾单独一行用字符 `*/` 结束注释。清单 1-8 展示了一个使用 Javadoc 注释的方法。\n\n**清单 1-8.** 以 Javadoc\
  \ 形式编写的注释\n\npackage org.java8recipes.chapter01.recipe1_08;\n\nimport java.math.BigInteger;\n\
  \npublic class JavadocExample {\n\n/**\n\n* 接受无限数量的值并返回总和。\n\n*\n\n* @param nums\
  \ 必须是 BigInteger 值的数组。\n\n* @return 数组中所有数字的总和。\n\n*/\n\npublic static BigInteger\
  \ addNumbers(BigInteger[] nums) {\n\nBigInteger result = new BigInteger(\"0\");\n\
  \nfor (BigInteger num:nums){\n\nresult = result.add(num);\n\n}\n\nreturn result;\n\
  \n}\n\n/**\n\n* 测试 addNumbers 方法。\n\n* @param args 未使用\n\n*/\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 N Java 8 入门\n\npublic static void main (String[] args) {\n\nBigInteger[]\
  \ someValues = {BigInteger.TEN, BigInteger.ONE};\n\nSystem.out.println(addNumbers(someValues));\n\
  \n}\n\n}\n\n注释可以以相同的方式添加到类和字段的开头。这些注释对你和其他维护代码的程序员很有帮助，其特定格式使得可以轻松生成代码的 HTML 参考文档。\n\
  \n通过调用名为 `Javadoc` 的工具来生成 HTML 参考文档。这是一个命令行工具，它解析指定的 Java 源文件，并根据定义的类元素和 Javadoc\
  \ 注释生成 HTML 文档。例如：\n\njavadoc JavadocExample.java\n\n此命令将生成多个 HTML 文件，其中包含类、方法和字段的文档。\n\
  \n如果源代码中不存在 Javadoc 注释，仍然会生成一些默认文档。要查看文档，请将以下文件加载到浏览器中：\n\nindex.html\n\n该文件将位于你正在文档化的类或包所在的同一目录中。还会有一个\
  \ `index-all.html` 文件，提供文档化实体的严格字母顺序列表。\n\n请记住，使用 `Javadoc` 工具时适用的规则与使用 `javac`\
  \ 时相同。你必须位于源文件所在的同一目录中，或者在文件名前加上文件所在路径。\n\n工作原理\n\n\n\n从头开始为应用程序生成文档可能相当繁琐。维护文档则更加麻烦。JDK\
  \ 自带了一个名为 Javadoc 的庞大文档系统。在代码源文件中放置一些特殊注释，然后运行一个简单的命令行工具，就能轻松生成有用的文档并使其保持最新。此外，即使应用程序中的某些类、方法或字段没有专门为\
  \ Javadoc 工具添加注释，这些元素仍然会生成默认文档。\n\n**格式化文档**\n\n要创建 Javadoc 注释，请以字符 `/**` 开头。虽然从\
  \ Java 1.4 开始这是可选的，但常见的做法是在注释内每一后续行的开头都包含一个星号。另一个好的做法是缩进注释，使其与正在被文档化的代码对齐。最后，使用字符\
  \ `*/` 结束注释。\n\nJavadoc 注释应以类或方法的简短描述开头。字段很少使用 Javadoc 进行注释，除非它们被声明为 `public static\
  \ final`（常量），在这种情况下，提供注释是一个好主意。注释可以有多行，甚至可以包含多个段落。如果要将注释分成段落，请使用 `<p>` 标签分隔这些段落。注释可以包含多个标签，用于指示被注释的方法或类的各种详细信息。Javadoc\
  \ 标签以 `@` 符号开头，一些常见的标签如下：\n\n-   `@param`：参数的名称和描述\n-   `@return`：方法的返回值\n-   `@see`：对另一段代码的引用\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 Java 8 入门\n\n你也可以在 Javadoc\
  \ 中包含内联链接来引用 URL。要包含内联链接，请使用标签 `{@link My Link}`，其中 `link` 是你实际要指向的 URL，`My Link`\
  \ 是你希望显示的文本。Javadoc 注释中还可以使用许多其他标签，包括 `{@literal}`、`{@code}`、`{@value org}` 等等。有关完整列表，请参阅\
  \ Oracle 技术网络网站上的 Javadoc 参考。\n\n**执行工具**\n\nJavadoc 工具也可以针对整个包或源代码运行。只需将包名传递给 Javadoc\
  \ 工具，而不是单个源文件名。例如，如果一个应用程序包含一个名为 `org.juneau.beans` 的包，可以通过如下运行工具来为该包中的所有源文件生成文档：`javadoc\
  \ org.juneau.beans`\n\n要一次为多个包生成 Javadoc，请用空格分隔包名，如下所示：`javadoc org.juneau.beans\
  \ org.juneau.entity`\n\n另一个选项是使用 `-sourcepath` 标志指定源文件的路径。例如：`javadoc -sourcepath\
  \ /java/src`\n\n默认情况下，Javadoc 工具会生成 HTML 并将其放置在与被文档化代码相同的包中。\n\n如果你希望将源文件与文档分开存放，那么这种结果可能会变得杂乱无章。你可以通过向\
  \ Javadoc 工具传递 `-d` 标志来为生成的文档设置目标位置。\n\n1-9. 使用包组织代码\n\n**问题**\n\n你的应用程序由一组 Java\
  \ 类、接口和其他类型组成。你希望组织这些源文件，使其更易于维护并避免潜在的类命名冲突。\n\n**解决方案**\n\n创建 Java 包，并将源文件放置其中，就像文件归档系统一样。Java\
  \ 包可用于组织应用程序中逻辑分组的源文件。包有助于组织代码、减少不同类和其他 Java 类型文件之间的命名冲突，并提供访问控制。要创建包，只需在应用程序源文件夹的根目录下创建一个目录并命名即可。包通常相互嵌套，并遵循标准的命名约定。出于本教程的目的，假设组织名称为\
  \ Juneau，并且该组织生产小部件。为了组织小部件应用程序的所有代码，创建一组嵌套包，遵循以下目录结构：\n\n`/org/juneau`\n\n放置在包中的任何源文件都必须包含\
  \ `package` 语句作为源文件的第一行。`package` 语句列出了包含该源文件的包的名称。例如，假设小部件应用程序的主类名为 `JuneauWidgets.java`。要将此类放入一个名为\
  \ `org.juneau` 的包中，请将源文件物理移动到名为 `juneau` 的目录中，该目录位于 `org` 目录内，而 `org` 目录又位于应用程序源文件夹的根目录内。目录结构应如下所示：\n\
  \n`/org/juneau/JuneauWidgets.java`\n\n`JuneauWidgets.java` 的源代码如下：\n\n```java\n\
  package org.juneau;\n\n/**\n * The main class for the Juneau Widgets application.\n\
  \ * @author juneau\n */\npublic class JuneauWidgets {\n\n    public static void\
  \ main(String[] args){\n        System.out println(\"Welcome to my app!\");\n  \
  \  }\n\n}\n```\n\n源文件的第一行包含 `package` 语句，该语句列出了源文件所在的包的名称。语句中列出了完整的包路径，路径中的名称用点分隔。\n\
  \n**注意** `package` 语句必须是 Java 源文件中列出的第一条语句。但是，在 `package` 语句之前可以写注释或 Javadoc 注释。\n\
  \n一个应用程序可以由任意数量的包组成。如果小部件应用程序包含几个表示小部件对象的类，它们可以放在 `org.juneau.widget` 包中。该应用程序可能具有可用于与小部件对象交互的接口。在这种情况下，也可能存在一个名为\
  \ `org.juneau.interfaces` 的包来包含任何此类接口。\n\n**工作原理**\n\nJava 包对于组织源文件、控制对不同类的访问以及确保没有命名冲突非常有用。包由文件系统上的一系列物理目录表示，并且可以包含任意数量的\
  \ Java 源文件。每个源文件必须在文件中的任何其他语句之前包含一个 `package` 语句。此 `package` 语句列出了源文件所在的包的名称。在本教程的解决方案中，源代码包含了以下\
  \ `package` 语句：\n\n`package org.juneau;`\n\n此 `package` 语句表明源文件位于名为 `juneau` 的目录中，而该目录又位于另一个名为\
  \ `org` 的目录中。包命名约定可能因公司或组织而异。但是，重要的是单词要小写，以免与任何 Java 类文件名冲突。许多公司或组织会使用其域名的反向形式来命名包。但是，如果域名包含连字符，则应改用下划线。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 Java 8 入门\n\n\n\nN **注意**\
  \ 当一个类位于 Java 包中时，它不再仅通过类名来引用，而是将包名添加到类名之前，这被称为完全限定名。例如，由于位于 `JuneauWidgets.java`\
  \ 文件中的类包含在 `org.juneau` 包中，因此该类使用 `org.juneau.JuneauWidgets` 来引用，而不仅仅是 `JuneauWidgets`。一个同名的类可以位于不同的包中（例如，`org.java8recipes.JuneauWidgets`）。\n\
  \n包对于建立安全级别和组织结构非常有用。默认情况下，位于同一包中的不同类可以相互访问。如果一个源文件位于与它需要使用的另一个文件不同的包中，则必须在源文件顶部（在包声明语句下方）声明一个\
  \ `import` 语句来导入该文件以供使用；否则，必须在代码中使用完全限定的 `包名.类名`。类可以单独导入，如下面的 `import` 语句所示：`import\
  \ org.juneau.JuneauWidgets;`\n\n然而，通常可能需要使用包中的所有类和类型文件。一个使用通配符（`*`）的 `import` 语句可以导入指定包中的所有文件，如下所示：`import\
  \ org.juneau.*;`\n\n虽然可以导入所有文件，但除非绝对必要，否则不推荐这样做。事实上，包含许多使用通配符的 `import` 语句被认为是一种不良的编程实践。相反，类和类型文件应该单独导入。\n\
  \n将类组织到包中被证明是非常有用的。假设本食谱解决方案中描述的小部件应用程序为每个不同的小部件对象包含了不同的 Java 类。每个小部件类都可以被分组到一个名为\
  \ `org.juneau.widgets` 的包中。类似地，每个小部件都可以扩展某个 Java 类型或接口。所有这些接口都可以被组织到一个名为 `org.juneau.interfaces`\
  \ 的包中。\n\n任何重要的 Java 应用程序都会包含包。你使用的任何 Java 库或应用程序编程接口（API）都包含包。当你从这些库和 API 中导入类或类型时，你实际上是在导入包。\n\
  \n1-10. 配置 CLASSPATH\n\n问题\n\n你想要执行一个 Java 程序，或者在你正在执行的应用程序中包含一个外部 Java 库。\n\n解决方案\n\
  \n将 `CLASSPATH` 变量设置为执行应用程序所需访问的用户自定义 Java 类或 Java 归档（JAR）文件所在的目录位置。假设你有一个名为 `JAVA_DEV`\
  \ 的目录，位于操作系统驱动器的根目录下，并且你的应用程序需要访问的所有文件都位于此目录中。\n\n如果是这种情况，那么你将执行如下命令：\n\n`set CLASSPATH=C:\\\
  JAVA_DEV\\some-jar.jar`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 1 章 N JAVA 8 入门\n\n或者在 Unix 和 Linux 系统上：\n\n`export CLASSPATH=/JAVA_DEV/some-jar.jar`\n\
  \n或者，`javac` 命令提供了一个选项，用于指定应用程序需要加载的资源的路径。在所有平台上，使用此技术设置 `CLASSPATH` 可以通过 `-classpath`\
  \ 选项完成，如下所示：\n\n`javac –classpath /JAVA_DEV/some-jar.jar`\n\n当然，在 Microsoft Windows\
  \ 机器上，文件路径将使用反斜杠（`\\`）代替。\n\n**注意**\n\nN\n\n可以使用 `javac –cp` 选项，而不是指定 `–classpath`\
  \ 选项。\n\n工作原理\n\nJava 实现了*类路径*的概念。这是一个目录搜索路径，你可以使用 `CLASSPATH` 环境变量在系统范围内指定它。你也可以通过\
  \ `java` 命令的 `-classpath` 选项为特定的 JVM 调用指定类路径。（参见食谱 1-3 中的示例。）\n\n在执行 Java 程序时，JVM\
  \ 按以下搜索顺序查找并加载所需的类：1. Java 平台基础且包含在 Java 安装目录中的类。\n\n2. 位于 JDK 扩展目录中的任何包或 JAR 文件。\n\
  \n3. 在指定类路径上的某个位置加载的包、类、JAR 文件和库。\n\n你可能需要为一个应用程序访问多个目录或 JAR 文件。如果你的依赖项位于多个位置，就会出现这种情况。为此，只需使用你操作系统的分隔符（`;`\
  \ 或 `:`）作为 `CLASSPATH` 变量指定位置之间的分隔符。以下是在 Unix 和 Linux 系统上的 `CLASSPATH` 环境变量中指定多个\
  \ JAR 文件的示例：`export CLASSPATH=/JAVA_DEV/some-jar.jar:/JAVA_LIB/myjar.jar`\n\n或者，你可以通过命令行选项指定类路径：\n\
  \n`javac –classpath /JAVA_DEV/some-jar.jar:/JAVA_LIB/myjar.jar`\n\n在为 Java 应用程序加载资源时，JVM\
  \ 会加载第一个位置中指定的所有类和包，然后是第二个位置，依此类推。这一点很重要，因为加载顺序在某些情况下可能会产生影响。\n\n**注意**\n\nN\n\n\
  JAR 文件用于将应用程序和 Java 库打包成可分发的格式。如果你没有以这种方式打包你的应用程序，你可以简单地指定你的 `.class` 文件所在的目录。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 N JAVA 8 入门\n\n有时你会想要包含指定目录中的所有\
  \ JAR 文件。可以通过在包含文件的目录后指定通配符（`*`）来实现。例如：\n\n`javac –classpath /JAVA_DEV/*:/JAVA_LIB/myjar.jar`\n\
  \n指定通配符将告诉 JVM 它应该只加载 JAR 文件。它不会加载位于使用通配符指定的目录中的类文件。如果你还需要类文件，则需要为同一目录指定一个单独的路径条目。例如：\n\
  \n`javac –classpath /JAVA_DEV/*:/JAVA_DEV`\n\n类路径中的子目录不会被搜索。为了加载包含在子目录中的文件，这些子目录和/或文件必须被显式地列在类路径中。但是，与子目录结构等效的\
  \ Java 包*将会*被加载。因此，任何位于与子目录结构等效的 Java 包中的 Java 类都将被加载。\n\nN **注意** 组织好你的代码是个好主意；同样，组织好你在计算机上放置代码的位置也是个好主意。\n\
  \n一个好的实践是将你所有的 Java 项目放在同一个目录中；它可以成为你的工作空间。将所有包含在 JAR 文件中的 Java 库放在同一个目录中，以便于管理。\n\
