  last\", \"Juneau\");\n\nSystem.out.println(strMap.values());\n\n}\n\n}\n\nN **注意**\
  \ 当我们一般性地讨论集合或集合类型时，你可以将其理解为构成 Java 集合框架的那些类型。这包括所有继承自 Collection 和 Map 接口的类和接口。集合类型通常指继承自\
  \ Collection 接口的类型。\n\n工作原理\n\n解决方案代码演示了泛型的一些基本用例。配方源码中 GenericsDemo.java 文件里的示例更详细地介绍了泛型在\
  \ Java 集合中的使用，而不是教你如何创建泛型类型。除非你在开发一个库 API，否则你可能不需要创建自己的泛型类型。然而，如果你理解了泛型如何与集合接口和类一起使用，你就具备了创建自己泛型类型所需的知识。\n\
  \n关于 Java 泛型，首先要理解并记住的是，它们严格来说是一个编译时特性，旨在帮助开发者编写类型更安全的代码。当你参数化一个泛型类型时指定的所有类型信息，在代码编译成字节码时都会被编译器“擦除”。你会看到这被称为*类型擦除*。让我们看一个泛型集合类型的例子：List。List\
  \ 是一个定义如下的接口：\n\npublic interface List<E> extends Collection<E> { ... };\n\n要指定\
  \ List（或任何集合类型）的元素类型，只需在声明和实例化对象时，将类型名称放在尖括号中即可。当你这样做时，你就是在指定一个“参数化类型”。以下代码声明了一个\
  \ Integer 类型的 List。声明了一个参数化类型 List<Integer> 的变量 aList，然后使用从参数化类型 LinkedList<Integer>（也称为“具体参数化类型”）实例化获得的引用进行初始化：\n\
  \nList<Integer> aList = new LinkedList<Integer>();\n\n现在你已经将这些类型参数化，将元素类型限制为 Integer，List\
  \ 的 add(E e) 方法就变成了：\n\nboolean add(Integer e);\n\n如果你尝试向 aList 添加除 Integer 之外的任何内容，编译器将生成一个错误：aList.add(new\
  \ Integer(121));\n\naList.add(42); // 由于自动装箱，42 等同于 new Integer(42)。\n\naList.add(\"\
  Java\"); // 无法编译，类型错误\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7\
  \ 章 数据结构与集合\n\n需要注意的是，编译时检查的是引用类型，因此以下代码也会导致编译器错误：\n\nNumber aNum = new Integer(\"\
  7\");\n\naList.add(aNum); // 无法编译，类型错误\n\n这是一个编译错误，因为 aNum 可以引用任何 Number 对象。如果编译器允许这样做，你最终可能会得到一个包含\
  \ Double、Float 等对象的集合，这将违反你在创建 aList 时指定的 Integer 参数约束。当然，简单的类型转换可以绕过编译器错误，但这在 Number\
  \ 对象之间进行转换时肯定会导致意想不到的后果。\n\n泛型旨在减少代码中必须进行的显式类型转换数量，因此如果你在使用参数化类型的方法时发现自己使用了显式类型转换，这暗示着可能存在危险的代码。\n\
  \naList.add((Integer)aNum); // 可以编译，但不要这样做。\n\n使用泛型类型时需要注意的另一件事是编译器警告。它们可能表明你正在做一些不推荐的事情，并且通常意味着你的代码存在潜在的运行时错误。一个例子可以帮助说明这一点。以下代码可以编译，但会产生两个编译器警告：List\
  \ rawList = new LinkedList();\n\naList = rawList;\n\n首先，你创建了 rawList，它是一个*原始类型*，即未参数化的泛型类型。当泛型被引入该语言时，语言设计者决定，为了保持与泛型之前代码的兼容性，他们需要允许使用原始类型。然而，强烈不鼓励在新代码（Java\
  \ 5 之后）中使用原始类型，因此如果你使用它们，编译器会生成原始类型警告。接下来，rawList 被赋值给 aList，而 aList 是使用参数化类型创建的。同样，编译器允许这样做（由于泛型类型擦除和向后兼容性），但会为这个赋值生成一个未经检查的转换警告，以标记潜在的运行时类型不兼容性。想象一下，如果\
  \ rawList 包含 String。之后，如果你尝试从 aList 中检索 Integer 元素，就会得到一个运行时错误。\n\n关于类型兼容性，它不适用于泛型类型参数。例如，以下不是有效的赋值：\n\
  \nList<Number> bList = new LinkedList<Integer>(); // 无法编译；类型不兼容 尽管 Integer 是 Number（Integer\
  \ 是 Number 的子类型），并且 LinkedList 是 List 的子类型，但 LinkedList<Integer> 不是 List<Number>\
  \ 的子类型。幸运的是，如果你不小心编写了这样的代码，这不会逃过你的注意；编译器会生成一个“类型不兼容”的警告。\n\n所以你可能会想，是否有办法实现类似于我们上一行代码中尝试的变体子类型关系。答案是肯定的，通过使用泛型的一个称为*通配符*的特性。通配符通过在类型参数尖括号中使用问号\
  \ (?) 来表示。通配符用于声明有界或无界的参数化类型。以下是一个有界参数化类型的声明示例：\n\nList<? extends Number> cList;\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 数据结构与集合\n\n\n\n当通配符与\
  \ `extends` 关键字一起使用时，会为类型参数建立一个上界。在此示例中，`? extends Number` 表示任何属于 `Number` 或其子类型的类型。因此，以下赋值是有效的，因为\
  \ `Integer` 和 `Double` 都是 `Number` 的子类型：\n\ncList = new LinkedList<Number>();\n\n\
  cList = new LinkedList<Integer>();\n\ncList = new LinkedList<Double>();\n\n因此，`cList`\
  \ 可以持有对任何元素类型与 `Number` 兼容的 `List` 实例的引用。实际上，`cList` 甚至可以引用一个原始类型。显然，如果允许向 `cList`\
  \ 添加元素，这会给编译器实施类型安全带来挑战。因此，编译器不允许向使用 `? extends` 参数化的集合类型添加元素（`null` 除外）。以下代码会导致编译错误：`cList.add(new\
  \ Integer(5)); // add() 不被允许；cList 可能是 LinkedList<Double>`。但是，你可以毫无问题地从列表中获取元素：\n\
  \nNumber cNum = cList.get(0);\n\n这里唯一的限制是，从列表中获取的引用必须被视为 `Number` 类型。请记住，`cList`\
  \ 可能指向一个 `Integer` 列表、`Double` 列表或任何其他 `Number` 子类型的列表。\n\n通配符也可以与 `super` 关键字一起使用。在这种情况下，会为类型参数建立一个下界：\n\
  \nList<? super Integer> dList;\n\n在此示例中，`? super Integer` 表示任何属于 `Integer` 或其超类型的类型。\n\
  \n因此，以下赋值是有效的，因为 `Number` 和 `Object` 是 `Integer` 仅有的两个超类型：`dList = new LinkedList<Integer>();\n\
  \ndList = new LinkedList<Number>();\n\ndList = new LinkedList<Object>();\n\n所以，你可以看到\
  \ `Integer` 是下界。这个下界现在对从列表中检索元素施加了限制。因为 `dList` 可以持有对上述任何一种参数化类型的引用，如果对正在检索的元素类型做出假设，编译器将无法保证类型安全。\n\
  \n因此，编译器不得允许对使用 `? super` 参数化的集合类型调用 `get()` 方法，以下代码会导致编译错误：\n\nInteger n = dList.get(0);\
  \ // get() 不被允许；dList.get(0) 可能是 Number 或 Object\n\n然而，现在你可以向列表中添加元素，但下界 `Integer`\
  \ 仍然适用。只能添加 `Integer` 类型，因为 `Integer` 与 `Number` 和 `Object` 兼容：\n\ndList.add(new\
  \ Integer(5)); // 可以\n\nNumber dNum = new Double(7);\n\ndList.add(dNum); // 无法编译；dList\
  \ 可能是 LinkedList<Integer>\n\n你会在整个集合类型中看到通配符与 `extends` 和 `super` 一起使用的情况。最常见的是，它们被用在方法参数类型中，例如为所有\
  \ `Collection` 定义的 `addAll()` 方法。有时你会看到集合类型单独使用通配符 (`?`) 作为类型参数，这被称为*无界通配符*。`Collection`\
  \ 的 `removeAll()` 方法就是这样一个例子。在大多数情况下，这种用法是不言自明的。你可能不会（也不应该）使用无界通配符来定义自己的参数化类型。如果你尝试这样做，很快就会意识到它能做的事情非常有限。如果你理解了本技巧中描述的具体参数化类型、通配符参数化类型以及有界和无界类型的概念，你就掌握了使用泛型集合类型所需的大部分知识，并且如果需要，也可以创建自己的泛型类型。\n\
  \n既然我们已经讨论了很多关于参数化类型的内容，现在我们想让你忘记其中的一部分。当 Java 7 发布时，引入了一个名为*菱形*（有时被称为*菱形运算符*，尽管它在\
  \ Java 中不被视为运算符）的新特性。菱形允许编译器从参数化类型使用的上下文中推断出类型参数。以下是一个使用菱形的简单示例：`List<Integer> eList\
  \ = new ArrayList<>();`\n\n请注意，在实例化 `ArrayList` 时，尖括号之间没有指定类型参数。编译器可以根据赋值或初始化器的上下文轻松推断出类型为\
  \ `Integer`。`Integer` 是此上下文中唯一可行的类型。实际上，如果你在可以使用菱形的地方没有使用它，Java 编译器（以及大多数符合规范的 IDE）会发出警告。另一个更复杂的示例更好地展示了其优势：\n\
  \nMap<Integer, List<String>> aMap = new HashMap<>(); // 太好了！\n\n菱形同样可以用于返回语句以及方法参数中：\n\
  \n// 方法返回中的菱形\n\npublic static List<String> getEmptyList() {\n\nreturn new ArrayList<>();\n\
  \n}\n\n// 方法参数中的菱形\n\nList<List<String>> gList = new ArrayList<>();\n\ngList.set(0,\
  \ new ArrayList<>(Arrays.asList(\"a\", \"b\")));\n\n请注意，此处使用菱形与使用原始类型不同。以下代码不等同于使用菱形声明\
  \ `aMap`；它会导致编译器发出“未检查的转换”警告，甚至可能是原始类型警告：\n\nMap<Integer, List<String>> bMap = new\
  \ HashMap(); // 编译器警告；避免原始类型\n\n关于为什么这与菱形示例不同的讨论超出了本技巧的范围。如果你记住要避免使用原始类型，就不必担心这个问题。尽可能使用菱形来节省一些输入，同时使你的代码更健壮、更易读、更简洁。\n\
  \n7-6\\. 使用动态数组\n\n问题\n\n你需要一个灵活的数据结构，能够存储可变数量的数据，并允许轻松插入和删除数据。\n\n解决方案\n\n考虑使用\
  \ `ArrayList`。以下示例代码是 `StockScreener` 类，它允许你根据特定的筛选参数（市盈率、收益率和贝塔系数）和筛选值来筛选股票列表或单只股票。该类使用一个\
  \ `ArrayList` 来存储股票字符串。一个示例筛选可能是“告诉我这个列表中哪些股票的市盈率（P/E）小于或等于 15。”如果你不熟悉这些股市术语，不必担心。无论如何，不要使用这个类来做出你的股票投资决策！\n\
  \n// 参见 StockScreener.java\n\npublic class StockScreener {\n\nenum Screen { PE,\
  \ YIELD, BETA };\n\npublic static boolean screen(String stock, Screen screen, double\
  \ threshold) {\n\ndouble screenVal = 0;\n\nboolean pass = false;\n\nswitch (screen)\
  \ {\n\ncase PE:\n\nscreenVal = Math.random() * 25;\n\npass = screenVal <= threshold;\n\
  \nbreak;\n\ncase YIELD:\n\nscreenVal = Math.random() * 10;\n\npass = screenVal >=\
  \ threshold;\n\nbreak;\n\ncase BETA:\n\nscreenVal = Math.random() * 2;\n\npass =\
  \ screenVal <= threshold;\n\nbreak;\n\n}\n\nSystem.out.println(stock + \": \" +\
  \ screen.toString() + \" = \" + screenVal); return pass;\n\n}\n\npublic static void\
  \ screen(List<String> stocks, Screen screen, double threshold) {\n\nIterator<String>\
  \ iter = stocks.iterator();\n\nwhile (iter.hasNext()) {\n\nString stock = iter.next();\n\
  \nif (!screen(stock, screen, threshold)) {\n\niter.remove();\n\n}\n\n}\n\n}\n\n\
  public static void main(String[] args) {\n\nList<String> stocks = new ArrayList<>();\n\
  \nstocks.add(\"ORCL\");\n\nstocks.add(\"AAPL\");\n\nstocks.add(\"GOOG\");\n\nstocks.add(\"\
  IBM\");\n\nstocks.add(\"MCD\");\n\nSystem.out.println(\"Screening stocks: \" + stocks);\n\
  \nif (stocks.contains(\"GOOG\") &&\n\n!screen(\"GOOG\", Screen.BETA, 1.1)) {\n\n\
  \n\nstocks.remove(\"GOOG\");\n\n}\n\nSystem.out.println(\"第一轮筛选: \" + stocks);\n\
  \nStockScreener.screen(stocks, Screen.YIELD, 3.5);\n\nSystem.out.println(\"第二轮筛选:\
  \ \" + stocks);\n\nStockScreener.screen(stocks, Screen.PE, 22);\n\nSystem.out.println(\"\
  第三轮筛选: \" + stocks);\n\nSystem.out.println(\"买入清单: \" + stocks);\n\n}\n\n}\n\n运行这段代码的输出会有所不同，因为它会随机分配股票的筛选结果值。以下是运行该类的一个输出示例：\n\
  \nScreening stocks: [ORCL, AAPL, GOOG, IBM, MCD]\n\nGOOG: BETA = 1.9545048754918146\n\
  \nFirst screen: [ORCL, AAPL, IBM, MCD]\n\nORCL: YIELD = 5.54002319921808\n\nAAPL:\
  \ YIELD = 5.282200818124754\n\nIBM: YIELD = 3.189521157557543\n\nMCD: YIELD = 3.978628208965815\n\
  \nSecond screen: [ORCL, AAPL, MCD]\n\nORCL: PE = 3.5561302619951993\n\nAAPL: PE\
  \ = 13.578302484429233\n\nMCD: PE = 23.504349376296886\n\nThird screen: [ORCL, AAPL]\n\
  \nBuy List: [ORCL, AAPL]\n\n工作原理\n\n`ArrayList` 是 Java 集合框架中最常用的类之一。`ArrayList`\
  \ 类实现了 `List` 接口，而 `List` 接口又实现了 `Collection` 接口。`Collection` 接口定义了所有集合类型的通用操作集，`List`\
  \ 接口则定义了面向列表的集合类型特有的操作集。集合框架大量使用了 Java 泛型。\n\n如果你不熟悉泛型，建议阅读技巧 7-5，其中简要总结了泛型及其在集合中的使用。\n\
  \n`StockScreener` 的 `main()` 方法首先声明了一个 `List` 类型的股票列表，并通过泛型类型参数指定该列表的元素类型为 `String`。请注意，实际的列表类型是使用菱形运算符创建的\
  \ `ArrayList`，这在技巧 7-5 中有讨论。`stocks` 列表将持有数量可变的股票，用它们的股票市场代码（一个 `String`）表示：\n\n\
  List<String> stocks = new ArrayList<>();\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 数据结构和集合\n\n既然你已经指定了 `stocks` 列表只能包含字符串，那么所有 `List` 方法也会相应地参数化，只允许字符串操作。因此，接下来代码多次调用\
  \ `ArrayList` 的 `add(String)` 方法将股票添加到列表中。之后，根据股票的 Beta 值（衡量股票风险的指标）对 GOOG（谷歌）进行筛选；如果未通过筛选，则调用\
  \ `List` 的 `remove(String)` 方法将该股票从列表中移除。接着，对整个股票列表再进行两次筛选，以获取市盈率（P/E）小于等于 22.0\
  \ 且收益率（Yield）大于等于 3.5% 的股票列表。用于这些筛选的 `screen()` 方法接受一个 `List<String>` 类型的参数。它必须遍历列表，对列表中的每只股票执行筛选，并移除那些未通过筛选的股票。请注意，为了在遍历集合时安全地移除元素，必须使用集合的\
  \ `Iterator` 进行迭代，该迭代器可以通过调用其 `iterator()` 方法获得。这里，我们展示了使用 `while` 循环遍历 `stocks`\
  \ 列表（也可以类似地使用 `for` 循环）。只要没有到达列表末尾（`iter.hasNext()`），就可以从列表中获取下一只股票（`iter.next()`），执行筛选，如果筛选未通过，则从列表中移除该元素（`iter.remove()`）。\n\
  \nN **注意** 你可能会发现，在遍历列表时调用列表的 `remove()` 方法似乎也能工作。问题在于这并不能保证一定有效，并且会产生意想不到的结果。在某些时候，代码还会抛出\
  \ `ConcurrentModificationException` 异常，无论是否有多个线程同时访问同一个列表。\n\n请记住，在遍历任何集合时，始终通过迭代器来移除元素。\n\
  \n`ArrayList` 是一个非常实用的数据结构，通常应替代数组类型使用。它比简单的数组提供了更大的灵活性，可以轻松地动态添加和移除元素。虽然 `ArrayList`\
  \ 内部确实使用了数组，但你可以受益于已经为你实现好的优化过的 `add()` 和 `remove()` 操作。此外，`ArrayList` 还实现了许多其他非常有用的方法。更多详细信息，请参考在线\
  \ Java 文档（[`download.java.net/jdk8/docs/api/java/util/ArrayList.html）。`](http://download.java.net/jdk8/docs/api/java/util/ArrayList.html)\n\
  \n7-7. 让你的对象可迭代\n\n问题\n\n你创建了一个自定义的基于集合的类，该类包装（而非继承）了底层的集合类型。\n\n在不暴露类的内部实现细节的情况下，你希望你的类的对象是可迭代的，特别是能够使用\
  \ `foreach` 语句。\n\n解决方案\n\n让你的类实现 `Iterable<T>` 接口，其中 `T` 是要迭代的集合的元素类型。\n\n实现 `iterator()`\
  \ 方法，以返回该集合的 `Iterator<T>` 对象。本技巧的示例是 `StockPortfolio` 类。在内部，`StockPortfolio` 管理一个\
  \ `Stock` 对象的集合。我们希望类的用户能够使用 `foreach` 语句将 `StockPortfolio` 对象视为可迭代对象。`StockPortfolio`\
  \ 类如下所示：\n\n// 参见 StockPortfolio.java 和 Stock.java\n\npublic class StockPortfolio\
  \ implements Iterable<Stock> {\n\nMap<String, Stock> portfolio = new HashMap<>();\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 数据结构和集合\n\npublic void\
  \ add(Stock stock) {\n\nportfolio.put(stock.getSymbol(), stock);\n\n}\n\npublic\
  \ void add(List<Stock> stocks) {\n\nfor (Stock s : stocks) {\n\nportfolio.put(s.getSymbol(),\
  \ s);\n\n}\n\n}\n\n@Override\n\npublic Iterator<Stock> iterator() {\n\nreturn portfolio.values().iterator();\n\
  \n}\n\npublic static void main(String[] args) {\n\nStockPortfolio myPortfolio =\
  \ new StockPortfolio();\n\nmyPortfolio.add(new Stock(\"ORCL\", \"Oracle\", 500.0));\n\
  \nmyPortfolio.add(new Stock(\"AAPL\", \"Apple\", 200.0));\n\nmyPortfolio.add(new\
  \ Stock(\"GOOG\", \"Google\", 100.0));\n\nmyPortfolio.add(new Stock(\"IBM\", \"\
  IBM\", 50.0));\n\nmyPortfolio.add(new Stock(\"MCD\", \"McDonalds\", 300.0));\n\n\
  // foreach 循环（使用从 iterator() 方法返回的 Iterator）\n\nSystem.out.println(\"====使用传统的 for-each\
  \ 循环打印====\");\n\nfor (Stock stock : myPortfolio) {\n\nSystem.out.println(stock);\n\
  \n}\n\nSystem.out.println(\"====使用 Java 8 的 foreach 实现打印====\");\n\nmyPortfolio.forEach(s->System.out.println(s));\n\
  \n}\n\n}\n\n以下是 `Stock` 类的代码：\n\npublic class Stock {\n\nprivate String symbol;\n\
  \nprivate String name;\n\nprivate double shares;\n\npublic Stock(String symbol,\
  \ String name, double shares) {\n\nthis.symbol = symbol;\n\nthis.name = name;\n\n\
  this.shares = shares;\n\n}\n\npublic String getSymbol() {\n\nreturn symbol;\n\n\
  }\n\npublic String getName() {\n\nreturn name;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 数据结构和集合\n\npublic double getShares() {\n\nreturn shares;\n\n}\n\npublic\
  \ String toString() {\n\nreturn shares + \" shares of \" + symbol + \" (\" + name\
  \ + \")\";\n\n}\n\n}\n\n`main()` 方法创建了一个 `StockPortfolio` 对象，然后调用 `add()` 方法向投资组合中添加了几只股票。接着，使用\
  \ `foreach` 循环的两种变体（传统的和新的 Java 8 `forEach` 实现）来遍历并打印投资组合中的所有股票。运行 `StockPortfolio`\
  \ 类将产生以下输出：\n\n50.0 shares of IBM (IBM)\n\n300.0 shares of MCD (McDonalds)\n\n100.0\
  \ shares of GOOG (Google)\n\n200.0 shares of AAPL (Apple)\n\n500.0 shares of ORCL\
  \ (Oracle)\n\n\n\nN **注意** 当你在自己的环境中运行 StockPortfolio 类时，输出的行顺序可能会有所不同，因为底层实现使用了\
  \ HashMap。HashMap 不保证其中存储元素的顺序，这同样适用于它的迭代器。如果你希望迭代器按股票代码返回排序后的元素，可以使用排序集合（如 TreeMap\
  \ 或 TreeSet）来代替 HashMap。另一种选择是利用集合上的流（stream），这是 Java 8 引入的特性。有关流的更多信息，请参阅配方 7-8。\n\
  \n工作原理\n\nIterable 接口是在 Java 5 中引入的，用于支持同时引入的增强型 for 循环（也称为 foreach 循环）。随着这些语言增强，所有\
  \ Collection 类都被改造以实现 Iterable 接口，从而允许使用 foreach 循环对 Collection 类进行迭代。Iterable 接口是一个泛型类型，定义如下：\n\
  \npublic interface Iterable<T> {\n\nIterator<T> iterator();\n\n}\n\n任何实现 Iterable<T>\
  \ 的类都必须实现 iterator() 方法以返回一个 Iterator<T> 对象。通常，返回的 Iterator 是底层集合的默认迭代器；然而，它也可以返回一个自定义\
  \ Iterator 的实例。在 StockPortfolio 类中，使用 Map 来表示股票投资组合。每个映射条目的键是股票代码，与每个键关联的值是一个 Stock\
  \ 对象。Java 中的 Map 是不可迭代的；也就是说，它们不是 Collection 类。因此，它们不实现 Iterable。然而，映射的键和值都是 Collection，因此是\
  \ Iterable 的。我们希望 Iterable 的 iterator() 方法实现返回一个遍历投资组合映射中值（Stock 引用）的 Iterator；因此，我们的\
  \ Iterable 实现以 Stock 类型参数化：\n\npublic class StockPortfolio implements Iterable<Stock>\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 N 数据结构与集合\n\nMap 的 values()\
  \ 方法返回映射值的 Collection；在本例中，是一个 Stock 的 Collection。然后，iterator() 方法的实现可以简单地返回此 Collection\
  \ 的 Iterator：\n\n@Override\n\npublic Iterator<Stock> iterator() {\n\nreturn portfolio.values().iterator();\n\
  \n}\n\n有了这个 Iterable<Stock> 的实现，既可以使用传统的 foreach 循环，也可以使用 Java 8 的 forEach 实现来迭代\
  \ StockPortfolio 实例并打印每个 Stock：myPortfolio.forEach(s->System.out.println(s));\n\n\
  forEach 方法是随着 Java 8 的发布而新增到 Iterable 接口中的。该方法对 Iterable 中的每个元素执行指定的操作，直到所有元素都被处理完毕，或者指定的操作抛出异常。在此解决方案中，指定的操作是一个\
  \ lambda 表达式（参见第 6 章），它打印 myPortfolio Iterable 中每个元素的值。\n\n你会注意到 StockPortfolio\
  \ 还包含 add(List<Stock>) 方法，该方法允许从 List 填充投资组合。此方法也使用 foreach 循环来遍历输入的 List。同样，这是可能的，因为\
  \ List 是 Iterable 的。（请注意，此方法在代码中从未被调用；它仅用于说明目的。）N **注意** 我们的 StockPortfolio 实现存在一个问题。我们费了很大力气不暴露类的内部实现细节（投资组合映射）。这允许我们更改实现而不影响\
  \ StockPortfolio 客户端代码。然而，当我们实现 Iterable 时，我们实际上通过 iterator() 方法导出了底层的投资组合映射。正如配方\
  \ 7-5 所示，Iterator 允许通过调用其 remove() 方法来修改底层集合。不幸的是，Java 没有提供 UnmodifiableIterator\
  \ 类来包装 Iterator 并防止修改底层 Collection。然而，实现这样一个类很简单，它将 hasNext() 和 next() 调用转发给被包装的\
  \ Iterator，但保留 remove() 方法未实现（根据 Iterator Java 文档，应抛出 UnsupportedOperationException）。或者，你的\
  \ iterator() 方法可以从通过调用 Collections.unmodifiableCollection() 类方法获得的不可修改 Collection\
  \ 中返回 Iterator。我们鼓励你探索这两种选择。为了给你一个起点，在源代码下载中提供了一个可能的 UnmodifiableIterator 实现（参见\
  \ UnmodifiableIterator.java）。\n\n正如你在本配方中所见，Iterable 接口允许你创建与 for-each 实现兼容的可迭代对象。当你想要设计一个封装实现细节的自定义基于集合的类时，这非常有用。请记住，为了强制封装并防止修改底层集合，你应该实现前面注意事项中提到的解决方案之一。\n\
  \n7-8. 迭代集合\n\n问题\n\n你的应用程序包含 Collection 类型，并且你想要迭代其中的元素。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 N 数据结构与集合\n\n解决方案\n\n在任何扩展或实现 java.util.Collection 的类型上生成一个流，然后对集合中的每个元素执行所需的任务。在以下代码中，一个加载了\
  \ Stock 对象的 ArrayList 用于演示流的概念。\n\npublic class StreamExample {\n\nstatic List<Stock>\
  \ myStocks = new ArrayList();\n\nprivate static void createStocks(){\n\nmyStocks.add(new\
  \ Stock(\"ORCL\", \"Oracle\", 500.0));\n\nmyStocks.add(new Stock(\"AAPL\", \"Apple\"\
  , 200.0));\n\nmyStocks.add(new Stock(\"GOOG\", \"Google\", 100.0));\n\nmyStocks.add(new\
  \ Stock(\"IBM\", \"IBM\", 50.0));\n\nmyStocks.add(new Stock(\"MCD\", \"McDonalds\"\
  , 300.0));\n\n}\n\npublic static void main(String[] args){\n\ncreateStocks();\n\n\
  // 迭代每个元素并打印股票名称\n\nmyStocks.stream()\n\n.forEach(s->System.out.println(s.getName()));\n\
  \nboolean allGt = myStocks.stream()\n\n.allMatch(s->s.getShares() > 100.0);\n\n\
  System.out.println(\"所有股票股数都大于 100.0 股？ \" + allGt);\n\n// 打印所有股数超过 100 股的股票\n\n\
  System.out.println(\"== 我们持有超过 100 股以下的股票：\");\n\nmyStocks.stream()\n\n.filter(s\
  \ -> s.getShares() > 100.0)\n\n.forEach(s->System.out.println(s.getName()));\n\n\
  System.out.println(\"== 以下股票按股数排序：\");\n\nComparator<Stock> byShares = Comparator.comparing(Stock::getShares);\n\
  \nStream<Stock> sortedByShares = myStocks.stream()\n\n.sorted(byShares);\n\nsortedByShares.forEach(s\
