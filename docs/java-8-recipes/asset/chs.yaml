  \ 将从 `main` 方法开始，解释并执行该类中的字节码。JVM 会沿着类路径搜索任何额外需要的类，例如 `HelloMessage`。\n\n编译器的默认行为是将每个生成的类文件放置在与对应源文件相同的目录中。你可以通过\
