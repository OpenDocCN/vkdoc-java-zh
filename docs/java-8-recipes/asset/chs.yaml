  \ 构造，它本质上是一个 `HashMap`，可用于绑定值并将其传递给 `ScriptEngineManager`。当以这种方式将值传递给 Nashorn 引擎时，它们可以在\
  \ JavaScript 引擎中作为全局变量访问。\n\n18-5. 从 JavaScript 向 Java 传递返回值\n\n问题\n\n您希望调用一个 JavaScript\
  \ 函数，并将结果返回给调用它的 Java 类。\n\n解决方案\n\n创建一个用于 Nashorn 的 `ScriptEngine`，然后将 JavaScript\
  \ 函数传递给它进行评估。接下来，从引擎创建一个 `Invocable`，然后调用其 `invokeFunction()` 方法，传入 JavaScript 函数的字符串名称以及要使用的参数数组。在以下示例中，一个名为\
  \ `gallons` 的 JavaScript 函数被传递给 `ScriptEngine` 进行评估，随后使用此技术调用它。然后它返回一个 `double`\
  \ 值。\n\n```java\nScriptEngineManager manager = new ScriptEngineManager();\nScriptEngine\
  \ engine = manager.getEngineByName(\"nashorn\");\n\n// JavaScript 代码字符串\nString\
  \ gallonsFunction = \"function gallons(width, length, avgDepth){var volume = avgDepth\
  \ * width * length; \"\n        + \" return volume * 7.48; } \";\n\ntry {\n    //\
  \ 评估脚本\n    engine.eval(gallonsFunction);\n    double width = 16.0;\n    double\
  \ length = 32.0;\n    double depth = 5.0;\n    Invocable inv = (Invocable) engine;\n\
  \    double returnValue = (double) inv.invokeFunction(\"gallons\",\n           \
  \ new Double[]{width, length, depth});\n    System.out.println(\"返回的值:\" + returnValue);\n\
  } catch (ScriptException | NoSuchMethodException ex) {\n    Logger.getLogger(Recipe18_5.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 18\
  \ 章 NASHORN 与脚本编程\n\n结果如下：\n\n```\nrun:\n返回的值:19148.800000000003\n```\n\n在以下示例中，调用了一个\
  \ JavaScript 文件并返回一个字符串值。JavaScript 文件名为 `recipe18_5.js`，其内容如下：\n\n```javascript\n\
  function returnName( name){\n    return \"Hello \" + name;\n}\n```\n\n接下来，使用 `ScriptEngine`\
  \ 创建一个 `Invocable`，并调用外部 JavaScript 文件中的 JavaScript 函数。\n\n```java\nengine.eval(\"\
  load('/path-to/src/org/java8recipes/chapter18/recipe18_05/js/recipe18_5.js')\");\n\
  Invocable inv2 = (Invocable) engine;\nString returnValue2 = (String) inv2.invokeFunction(\"\
  returnName\", new String[]{\"Nashorn\"});\nSystem.out.println(\"返回的值:\" + returnValue2);\n\
  ```\n\n工作原理\n\n嵌入式脚本最实用的功能之一，是能够将通过脚本引擎调用的代码与 Java 应用程序集成。为了有效集成脚本引擎代码和 Java 代码，两者必须能够相互传递值。本技巧涵盖了将值从\
  \ JavaScript 返回给 Java 的概念。为此，需要设置一个 `ScriptEngine`，然后将其强制转换为 `javax.script.Invocable`\
  \ 对象。然后可以使用 `Invocable` 对象执行脚本函数和方法，并从这些调用中返回值。\n\n`Invocable` 对象使您能够执行一个命名的 JavaScript\
  \ 函数或方法，并将值返回给调用者。`Invocable` 还可以返回一个接口，该接口将提供一种调用脚本对象成员函数的方法。为了提供此功能，`Invocable`\
  \ 对象包含几个方法（见表 18-1）。\n\n**表 18-1.** *Invocable 方法*\n\n**方法**\n\n**描述**\n\n`getInterface(Class<T>)`\n\
  \n使用解释器编译的函数返回接口的实现。\n\n`getInterface(Object, Class<T>)`\n\n使用解释器中已编译的脚本对象的成员函数返回接口的实现。\n\
  \n`invokeFunction(String, Object)`\n\n调用顶层过程和函数。返回一个对象。\n\n`invokeFunction(Object,\
  \ String, Object)`\n\n调用在脚本对象上编译的方法。\n\n\n\n上一次执行。\n\n在生成可调用对象之前，JavaScript 文件或函数必须由\
  \ ScriptEngine 进行求值。\n\n该示例演示了调用 `eval()` 方法来求值一个内联 JavaScript 函数（一个名为 `gallonsFunction`\
  \ 的字符串），并展示了如何求值一个外部 JavaScript 文件。一旦调用了 `eval()` 方法，ScriptEngine 就可以被强制转换为一个 Invocable\
  \ 对象，如下所示：\n\nInvocable inv = (Invocable) engine;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 18 章 N NASHORN 与脚本编程\n\n然后可以调用 Invocable 来执行已求值脚本代码中的函数或方法。表 18-1 列出了可用的 Invocable\
  \ 方法。\n\n在本配方的示例中，`invokeFunction` 方法用于调用脚本中包含的函数。\n\n`invokeFunction` 的第一个参数是被调用函数的字符串名称，第二个参数是作为参数传递的对象列表。Invocable\
  \ 从 JavaScript 函数调用返回一个对象，该对象可以被强制转换为适当的 Java 类型。\n\n在 Java 和 ScriptEngine 实例之间共享值非常有用。在实际场景中，调用外部\
  \ JavaScript 文件，并能够在 Java 代码和脚本之间来回传递值，可能非常有用。如果需要，可以修改底层的 JavaScript 文件，而无需重新编译应用程序。当你的应用程序包含一些需要不时更改的业务逻辑时，这种情况会非常有用。想象一下，你有一个可用于求值字符串的规则处理器，并且规则在不断演变。在这种情况下，规则引擎可以编写为一个外部\
  \ JavaScript 文件，从而能够对该文件进行动态更改。\n\n18-6\\. 使用 Java 类和库\n\n问题\n\n你希望在 Nashorn 解决方案中调用\
