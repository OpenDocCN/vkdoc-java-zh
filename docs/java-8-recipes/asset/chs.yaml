  实现原理\n\nUnicode 字符集非常庞大，包含超过一百万个唯一的码点，其整数值范围从 `0x0000` 到 `0x10FFFF`。每个字符值都有一组属性。其中一个属性是\
  \ `isDigit`。如果此属性为真，则该字符代表一个从 0 到 9 的数字。例如，码点值为 `0x30` 到 `0x39` 的字符，其字形分别为 0、1、2、3、4、5、6、7、8\
  \ 和 9。如果你简单地将这些码值转换为其对应的整数值，你会得到十六进制值 `0x30` 到 `0x39`。对应的十进制值是 48 到 57。然而，这些字符也代表数字。在计算中使用它们时，这些字符代表值\
  \ 0 到 9。\n\n当一个字符具有数字属性时，使用 `Character.digit()` 静态方法将其转换为对应的整数值。请注意，`digit()` 方法被重载，可以接受\
  \ `char` 或 `int` 参数。\n\n此外，该方法需要一个基数（radix）。常见的基数有 2、10 和 16。有趣的是，尽管字符 a-f 和 A-F\
  \ 不具有数字属性，但它们可以在基数为 16 时作为数字使用。对于这些字符，`digit()` 方法会返回预期的整数值 10 到 15。\n\n要完全理解 Unicode\
  \ 字符集和 Java 的实现，需要熟悉几个新术语：字符（character）、码点（code point）、char、编码（encoding）、序列化编码（serialization\
  \ encoding）、UTF-8 和 UTF-16。这些术语超出了本示例的范围，但你可以从 Unicode 网站 [`unicode.org`](http://unicode.org)\
  \ 或 `Character` 类的 Java API 文档中了解更多关于这些及其他 Unicode 概念的信息。\n\n12-2. 创建和使用 Locale\n\
  \n问题\n\n你想以符合客户语言和文化期望的用户友好方式显示数字、日期和时间。\n\n解决方案\n\n\n\n数字、日期和时间的显示格式因地区而异，并取决于用户的语言和文化区域。此外，文本排序规则也因语言而异。`java.util.Locale`\
  \ 类代表世界上的特定语言和区域。通过确定并使用用户的区域设置，你可以将该区域设置应用于各种格式类，这些类可用于以预期形式创建用户可见的数据。使用 `Locale`\
  \ 实例来修改其行为以适应特定语言或区域的类被称为*区域敏感*类。你可以在第 4 章“数字和日期”中了解更多关于区域敏感类的信息。该章向你展示了如何在 `NumberFormat`\
  \ 和 `DateFormat` 类中使用 `Locale` 实例。然而，在本节中，你将学习创建这些 `Locale` 实例的不同选项。\n\n你可以通过以下任意一种方式创建\
  \ `Locale` 实例：\n\nu 使用 `Locale.Builder` 类来配置和构建一个 `Locale` 对象。\n\nu 使用静态方法 `Locale.forLanguageTag()`。\n\
  \nu 使用 `Locale` 构造器来创建对象。\n\nu 使用预配置的静态 `Locale` 对象。\n\nJava 的 `Locale.Builder`\
  \ 类具有 setter 方法，允许你创建可以转换为格式良好的最佳公共实践（BCP）47 语言标签的区域设置。“工作原理”部分会更详细地描述 BCP 47 标准。目前，你只需理解\
  \ `Builder` 创建符合该标准的 `Locale` 实例即可。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 Unicode、国际化与货币代码\n\n以下来自 `org.java8recipes.chapter12.recipe12_2.Recipe12_2`\
  \ 类的代码片段演示了如何创建 `Builder` 和 `Locale` 实例。你在区域敏感类中使用创建的区域设置，以生成符合文化习惯的显示格式：\n\n```java\n\
  private static final long number = 123456789L;\nprivate static final Date now =\
  \ new Date();\n\nprivate void createFromBuilder() {\n    System.out.printf(\"Creating\
  \ from Builder...\\n\\n\");\n    String[][] langRegions = {{\"fr\", \"FR\"}, {\"\
  ja\", \"JP\"}, {\"en\", \"US\"}};\n    Builder builder = new Builder();\n    Locale\
  \ l = null;\n    NumberFormat nf = null;\n    DateFormat df = null;\n    for (String[]\
  \ lr: langRegions) {\n        builder.clear();\n        builder.setLanguage(lr[0]).setRegion(lr[1]);\n\
  \        l = builder.build();\n        nf = NumberFormat.getInstance(l);\n     \
  \   df = DateFormat.getDateTimeInstance(DateFormat.LONG, DateFormat.LONG, l);\n\
  \        System.out.printf(\"Locale: %s\\nNumber: %s\\nDate: %s\\n\\n\",\n     \
  \           l.getDisplayName(),\n                nf.format(number),\n          \
  \      df.format(now));\n    }\n}\n```\n\n上述代码在标准控制台输出以下内容：\n\n```\nCreating from\
  \ Builder...\n\nLocale: French (France)\nNumber: 123 456 789\nDate: 14 septembre\
  \ 2011 00:08:06 PDT\n\nLocale: Japanese (Japan)\nNumber: 123,456,789\nDate: 2011/09/14\
  \ 0:08:06 PDT\n\nLocale: English (United States)\nNumber: 123,456,789\nDate: September\
  \ 14, 2011 12:08:06 AM PDT\n```\n\n创建 `Locale` 实例的另一种方法是使用静态方法 `Locale.forLanguageTag()`。此方法允许你使用\
  \ BCP 47 语言标签参数。以下代码使用 `forLanguageTag()` 方法从其对应的语言标签创建三个区域设置：\n\n```java\n...\n\
  System.out.printf(\"Creating from BCP 47 language tags...\\n\\n\");\nString[] bcp47LangTags=\
  \ {\"fr-FR\", \"ja-JP\", \"en-US\"};\nLocale l = null;\nNumberFormat nf = null;\n\
  DateFormat df = null;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 Unicode、国际化与货币代码\n\n```java\nfor (String langTag: bcp47LangTags) {\n  \
  \  l = Locale.forLanguageTag(langTag);\n    nf = NumberFormat.getInstance(l);\n\
  \    df = DateFormat.getDateTimeInstance(DateFormat.LONG, DateFormat.LONG, l);\n\
  \    System.out.printf(\"Locale: %s\\nNumber: %s\\nDate: %s\\n\\n\",\n         \
  \   l.getDisplayName(),\n            nf.format(number),\n            df.format(now));\n\
  }\n...\n```\n\n输出结果与使用 `Builder` 生成的 `Locale` 实例的结果类似：\n\n```\nCreating from BCP\
  \ 47 language tags...\n\nLocale: French (France)\nNumber: 123 456 789\nDate: 14\
  \ septembre 2011 01:07:22 PDT\n...\n```\n\n你也可以使用构造器来创建实例。以下代码展示了如何操作：\n\n```java\n\
  Locale l = new Locale(\"fr\", \"FR\");\n```\n\n\n\n其他构造方法允许你传入更少或更多的参数。这些参数可以包括语言、地区以及可选的变体代码。\n\
  \n最后，`Locale` 类为一些常用场景预定义了许多静态实例。由于这些实例是预定义的，你的代码只需引用这些静态实例即可。例如，以下示例展示了如何引用代表 `fr-FR`、`ja-JP`\
  \ 和 `en-US` 区域设置的现有静态实例：`Locale frenchInFrance = Locale.FRANCE;`\n\n`Locale japaneseInJapan\
  \ = Locale.JAPAN;`\n\n`Locale englishInUS = Locale.US;`\n\n有关其他静态实例的示例，请参阅区域设置 Java\
  \ API 文档。\n\n工作原理\n\n`Locale` 类为区域设置敏感的类提供了执行符合文化习惯的数据格式化和解析所需的上下文。一些区域设置敏感的类包括：\n\
  \n- `java.text.NumberFormat`\n- `java.text.DateFormat`\n- `java.util.Calendar`\n\
  \n一个 `Locale` 实例标识一种特定的语言，并且可以精细调整以识别使用特定文字书写或在特定世界区域使用的语言。`Locale` 是创建任何依赖于语言或地区影响的内容时重要且必要的元素。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 Unicode、国际化与货币代码\n\n\
  Java 的 `Locale` 类一直在不断改进，以更好地支持现代 BCP 47 语言标签。\n\nBCP 47 定义了使用 ISO 标准进行语言、地区、文字和变体标识符的最佳通用实践。\n\
  \n尽管现有的 `Locale` 构造方法与 Java 平台的早期版本保持兼容，但这些构造方法不支持额外的文字标签。例如，只有较新的 `Locale.Builder`\
  \ 类和 `Locale.forLanguageTag()` 方法支持识别文字的新功能。这个较新的类和方法是在 Java 7 中引入的。由于 `Locale`\
  \ 构造方法并未强制要求严格遵循 BCP 47，因此你应避免在任何新代码中使用这些构造方法。相反，开发者应将其代码迁移为使用新的 `Builder` 类和 `forLanguageTag()`\
  \ 方法。\n\n`Locale.Builder` 实例具有多种 setter 方法，可帮助你配置它以创建有效且符合 BCP 47 标准的 `Locale` 实例：\n\
  \n- `public Locale.Builder setLanguage(String language)`\n- `public Locale.Builder\
  \ setRegion(String region)`\n- `public Locale.Builder setScript(String script)`\n\
  \n如果其参数不是 BCP 47 标准中格式良好的元素，这些方法中的每一个都会抛出 `java.util.IllFormedLocaleException`。`language`\
  \ 参数必须是有效的两位或三位字母的 ISO 639 语言标识符。`region` 参数必须是有效的两位字母的 ISO 3166 地区代码或三位数字的 M.49\
  \ 联合国“区域”代码。最后，`script` 参数必须是有效的四位字母的 ISO 15924 文字代码。\n\n`Builder` 允许你配置它以创建特定的符合\
  \ BCP 47 标准的区域设置。一旦你设置了所有配置，`build()` 方法会创建并返回一个 `Locale` 实例。请注意，所有 setter 方法可以链式调用，形成单个语句。Builder\
  \ 模式的工作原理是让每个配置方法返回对当前实例的引用，从而可以在此实例上调用进一步的配置方法。\n\n`Locale aLocale = new Builder().setLanguage(\"\
  fr\").setRegion(\"FR\").build();`\n\nBCP 47 文档及其包含的标准可以在以下位置找到：\n\n- BCP 47（语言标签）：[`www.rfc-editor.org/rfc/bcp/bcp47.txt`](http://www.rfc-editor.org/rfc/bcp/bcp47.txt)\n\
  - ISO 639（语言标识符）：[`www.loc.gov/standards/iso639-2/php/code_list.php`](http://www.loc.gov/standards/iso639-2/php/code_list.php)\n\
  - ISO 3166（地区标识符）：[`www.iso.org/iso/country_codes/iso_3166_code_lists/country_names_and_code_elements.htm`](http://www.iso.org/iso/country_codes/iso_3166_code_lists/country_names_and_code_elements.htm)\n\
  \n\n\n\nu ISO 15924（文字标识符）：[`unicode.org/iso15924/`](http://unicode.org/iso15924/)\n\
  \nu 联合国 M.49（区域标识符）：[`unstats.un.org/unsd/methods/m49/m49.htm`](http://unstats.un.org/unsd/methods/m49/m49.htm)\n\
  \n12-3\\. 设置默认区域设置\n\n问题\n\n你希望为所有区域设置敏感的类设置默认区域设置。\n\n解决方案\n\n使用 `Locale.setDefault()`\
  \ 方法设置一个 `Locale` 实例，所有区域设置敏感的类将默认使用该实例。\n\n该方法通过以下两种形式重载：\n\nu `Locale.setDefault(Locale\
  \ aLocale)`\n\nu `Locale.setDefault(Locale.Category c, Locale aLocale)`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 N Unicode、国际化与货币代码\n\n以下示例代码演示了如何为所有区域设置敏感的类设置默认区域设置：`Locale.setDefault(Locale.FRANCE);`\n\
  \n你还可以为另外两个区域设置类别（DISPLAY 和 FORMAT）设置默认值：`Locale.setDefault(Locale.Category.DISPLAY,\
  \ Locale.US);`\n\n`Locale.setDefault(Locale.Category.FORMAT, Locale.FR);`\n\n你可以在应用程序中创建使用这些特定区域设置类别的代码，以便为不同目的混合选择区域设置。例如，你可以选择将\
  \ DISPLAY 区域设置用于 `ResourceBundle` 文本，同时将 FORMAT 区域设置用于日期和时间格式。来自 `org.java8recipes.chapter12.recipe12_3.Recipe12_3`\
  \ 类的示例代码演示了这种更复杂的用法：\n\n```java\npublic class Recipe12_3 {\n\n    private static\
  \ final Date NOW = new Date();\n\n    public void run() {\n\n        // 将所有区域设置为\
  \ fr-FR\n        Locale.setDefault(Locale.FRANCE);\n        demoDefaultLocaleSettings();\n\
  \n        // 系统默认仍为 fr-FR\n        // DISPLAY 默认值为 es-MX\n        // FORMAT 默认值为\
  \ en-US\n        Locale.setDefault(Locale.Category.DISPLAY, Locale.forLanguageTag(\"\
  es-MX\"));\n        Locale.setDefault(Locale.Category.FORMAT, Locale.US);\n    \
  \    demoDefaultLocaleSettings();\n\n        // 系统默认仍为 fr-FR\n        // DISPLAY\
  \ 默认值为 en-US\n        // FORMAT 默认值为 es-MX\n        Locale.setDefault(Locale.Category.DISPLAY,\
  \ Locale.US);\n        Locale.setDefault(Locale.Category.FORMAT, Locale.forLanguageTag(\"\
  es-MX\"));\n        demoDefaultLocaleSettings();\n\n        // 系统默认值为 Locale.US\n\
  \        // 同时将 DISPLAY 和 FORMAT 区域设置重置为 en-US\n        Locale.setDefault(Locale.US);\n\
  \        demoDefaultLocaleSettings();\n\n    }\n\n    public void demoDefaultLocaleSettings()\
  \ {\n        DateFormat df =\n            DateFormat.getDateTimeInstance(DateFormat.SHORT,\
  \ DateFormat.SHORT);\n        ResourceBundle resource =\n            ResourceBundle.getBundle(\"\
  SimpleResources\",\n                Locale.getDefault(Locale.Category.DISPLAY));\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 N Unicode、国际化与货币代码\n\
  \n```java\n        String greeting = resource.getString(\"GOOD_MORNING\");\n   \
  \     String date = df.format(NOW);\n        System.out.printf(\"DEFAULT LOCALE:\
  \ %s\\n\", Locale.getDefault());\n        System.out.printf(\"DISPLAY LOCALE: %s\\\
  n\", Locale.getDefault(Locale.Category.DISPLAY));\n        System.out.printf(\"\
  FORMAT LOCALE: %s\\n\", Locale.getDefault(Locale.Category.FORMAT));\n        System.out.printf(\"\
  %s, %s\\n\\n\", greeting, date );\n    }\n\n    public static void main(String[]\
  \ args) {\n        Recipe12_3 app = new Recipe12_3();\n        app.run();\n    }\n\
  }\n```\n\n此代码产生以下输出：\n\n```\nDEFAULT LOCALE: fr_FR\nDISPLAY LOCALE: fr_FR\nFORMAT\
  \ LOCALE: fr_FR\nBonjour!, 19/09/11 20:31\n\nDEFAULT LOCALE: fr_FR\nDISPLAY LOCALE:\
  \ es_MX\nFORMAT LOCALE: en_US\n¡Buenos días!, 9/19/11 8:31 PM\n\nDEFAULT LOCALE:\
  \ fr_FR\nDISPLAY LOCALE: en_US\nFORMAT LOCALE: es_MX\nGood morning!, 19/09/11 08:31\
  \ PM\n\nDEFAULT LOCALE: en_US\nDISPLAY LOCALE: en_US\nFORMAT LOCALE: en_US\nGood\
  \ morning!, 9/19/11 8:31 PM\n```\n\n工作原理\n\n`Locale` 类允许你为两个不同的类别设置默认区域设置。这些类别由\
  \ `Locale.Category` 枚举表示：\n\nu `Locale.Category.DISPLAY`\n\nu `Locale.Category.FORMAT`\n\
  \n使用 DISPLAY 类别用于应用程序的用户界面。设置默认的 DISPLAY 区域设置意味着 `ResourceBundle` 类可以独立于 FORMAT\
  \ 区域设置为该特定区域设置加载用户界面资源。设置默认的 FORMAT 区域设置会影响各种 `Format` 子类的行为。例如，默认的 `DateFormat`\
  \ 实例将使用 FORMAT 默认区域设置来创建区域设置敏感的输出格式。同样，这两个类别是独立的，因此你可以为不同需求使用不同的 `Locale` 实例。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 N Unicode、国际化与货币代码\n\n\
  在本配方的示例代码中，`Locale.setDefault(Locale.FRANCE)` 方法调用将默认系统、DISPLAY 和 FORMAT 区域设置都设置为\
  \ fr-FR（法国法语）。此方法始终将 DISPLAY 和 FORMAT 区域设置重置为与系统区域设置匹配。创建新的资源包时，`ResourceBundle`\
  \ 类默认使用系统区域设置。但是，通过提供 `Locale` 实例参数，你可以告诉资源包为特定区域设置加载资源。例如，即使系统区域设置为 `Locale.FRANCE`，你也可以指定一个\
  \ DISPLAY 默认区域设置，并在 `ResourceBundle.getBundle()` 方法调用中使用该 DISPLAY 区域设置。例如，以下代码尝试加载\
  \ es-MX 的语言包，即使系统区域设置仍然是 `Locale.FRANCE`：\n\n```java\nLocale.setDefault(Locale.Category.DISPLAY,\
  \ Locale.forLanguageTag(\"es-MX\"));\nLocale.setDefault(Locale.Category.FORMAT,\
  \ Locale.US);\n\nDateFormat df = DateFormat.getDateTimeInstance(DateFormat.SHORT,\
  \ DateFormat.SHORT);\nResourceBundle resource =\n    ResourceBundle.getBundle(\"\
  org.java8recipes.chapter12.resource.SimpleResources\",\n        Locale.getDefault(Locale.Category.DISPLAY));\n\
  String greeting = resource.getString(\"GOOD_MORNING\");\n```\n\n在这种情况下，它会找到值为“¡Buenos\
  \ días!”的 GOOD_MORNING 资源，因为 DISPLAY 默认区域设置是一个参数。资源包是一个包含各种区域设置翻译属性字符串的文件。名为 `SimpleResources_en.properties`（英语）的文件有一个值为“Good\
  \ morning!”的 GOOD_MORNING 属性。请注意，资源包中每个属性的翻译必须存在于特定区域设置的资源文件中才能显示。Java 代码不会翻译这些字符串。相反，它只是根据所选区域设置选择所需属性的适当翻译。\n\
  \n**注意**\n\nN\n\n虽然 `DateFormat` 和 `NumberFormat` 类在创建方法中未提供区域设置参数时会自动使用默认的 FORMAT\
  \ 区域设置，但 `ResourceBundle.getBundle()` 方法默认始终使用系统区域设置。要在 `ResourceBundle()` 中使用 DISPLAY\
  \ 默认区域设置，你必须显式地将其作为参数提供。\n\n12-4\\. 匹配和过滤区域设置\n\n问题\n\n你希望匹配或过滤一个区域设置列表，并仅返回那些满足指定条件的区域设置。\n\
  \n解决方案\n\n使用 Java 8 中 `java.util.Locale` 类引入的新区域设置匹配和过滤方法。如果你有一个以逗号分隔的字符串格式区域设置列表，你可以对该字符串应用一个过滤器或“优先级列表”，以仅返回字符串中满足过滤条件的区域设置。在以下示例中，使用\
  \ `java.util.Locale` 的 `filterTags` 方法过滤语言标签列表，以字符串格式返回匹配的标签：\n\n```java\nList<Locale.LanguageRange>\
  \ list1 = Locale.LanguageRange.parse(\"ja-JP, en-US\");\nlist1.stream().forEach((range)\
  \ -> {\n    System.out.println(\"Range:\" + range.getRange());\n});\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 N Unicode、国际化与货币代码\n\n```java\nArrayList localeList = new ArrayList();\n\
  localeList.add(\"en-US\");\nlocaleList.add(\"en-JP\");\n\nList<String> tags1 = Locale.filterTags(list1,\
  \ localeList);\nSystem.out.println(\"The following is the filtered list of locales:\"\
  );\ntags1.stream().forEach((tag) -> {\n    System.out.println(tag);\n});\n```\n\n\
  结果：\n\n```\nRange:ja-jp\nRange:en-us\nThe following is the filtered list of Locales:\n\
  en-us\n```\n\n\n\nLocale 类的 filter() 方法允许你返回匹配的 Locale 实例列表。在以下示例中，使用一个语言标签列表来从一组\
  \ Locale 中筛选出匹配的 Locale 类。\n\nString localeTags = Locale.ENGLISH.toLanguageTag()\
  \ + \",\" +\n\nLocale.CANADA.toLanguageTag();\n\nList<Locale.LanguageRange> list1\
  \ = Locale.LanguageRange.parse(localeTags);\n\nlist1.stream().forEach((range) ->\
  \ {\n\nSystem.out.println(\"Range:\" + range.getRange());\n\n});\n\nArrayList<Locale>\
  \ localeList = new ArrayList();\n\nlocaleList.add(new Locale(\"en\"));\n\nlocaleList.add(new\
  \ Locale(\"en-JP\"));\n\nList<Locale> tags1 = Locale.filter(list1, localeList);\n\
  \nSystem.out.println(\"以下是匹配的 Locale 列表：\");\n\ntags1.stream().forEach((tag) ->\
  \ {\n\nSystem.out.println(tag);\n\n});\n\n以下是运行结果：\n\nRange:en\n\nRange:en-ca\n\n\
  以下是匹配的 locale 列表：\n\nen\n\n工作原理\n\nJava 8 在 `java.util.Locale` 类中新增了一些方法，允许你根据以\
  \ `List<Locale.LanguageRange>` 格式提供的优先级列表来筛选 Locale 实例或语言标签。该筛选机制基于 RFC 4647。以下列表简要总结了这些筛选方法：\n\
  \n-   `filter(List<Locale.LanguageRange>, Collection<Locale>)`\n-   `filter(List<Locale.LanguageRange>,\
  \ Collection<Locale>, Locale.FilteringMode)`（返回匹配的 Locale 实例列表）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 Unicode、国际化与货币代码\n\n-   `filterTags(List<Locale.LanguageRange>, Collection<String>)`\n\
  -   `filterTags(List<Locale.LanguageRange>, Collection<String>, Locale.FilteringMode)`（返回匹配的语言标签列表）\n\
  \n要使用这些方法，需要将排序后的优先级顺序作为第一个参数传入。这个优先级顺序是一个 `Locale.LanguageRange` 对象列表，并且应根据优先级或权重按降序排序。`filter()`\
  \ 方法的第二个参数是一个 locale 集合，该集合包含将被筛选的 locale。可选的第三个参数包含一个 `Locale.FilteringMode`。表\
