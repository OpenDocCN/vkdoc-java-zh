  \ `DoubleAccumulator` 和 `LongAccumulator` 类。这些类允许使用提供的函数更新跨线程维护的一个或多个变量。这两个类都接受一个累加器函数作为第一个参数，一个标识值作为第二个参数。当跨线程应用更新时，用于执行计算的一组变量可能会动态增长以减少竞争。有关这些\
  \ Java 8 新增类的更多信息，请参考在线文档：[`docs.oracle.com/javase/8/docs/api/java/util/concurrent/atomic/package-summary.html`](http://docs.oracle.com/javase/8/docs/api/java/util/concurrent/atomic/%0Apackage-summary.html)\n\
  \n总结\n\n在开发应用程序时，理解并发的基础知识非常重要。没有什么比成功测试应用程序，然后在发布到生产环境后因死锁而失败更糟糕的了。\n\n本章从基础知识开始，演示了如何生成后台任务。然后介绍了处理并发的各种技术，从创建线程到使用\
  \ Fork/Join 框架将工作划分为离散任务。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **第 11 章**\n\n**调试与单元测试**\n\n调试是软件开发的重要组成部分。为了有效调试，你必须能够像计算机一样“思考”，深入代码，解构导致你正在努力解决的逻辑错误的每一步。在计算机编程的早期，没有太多工具可以帮助调试。大多数情况下，调试涉及查看代码并发现不一致之处；然后重新提交代码进行编译。如今，每个\
  \ IDE 都提供了使用断点和检查内存变量的能力，使得调试变得更加容易。\n\n在 IDE 之外，还有其他工具可以帮助你进行日常的调试、构建和测试项目；这些工具确保你的代码在编程过程中不断被测试，以发现引入的错误。在本章中，你将探索有助于调试、分析和测试\
  \ Java 软件的不同工具。\n\n本章涵盖了一些调试和单元测试的基础知识。你将学习如何使用 Apache Ant 和 JUnit 从命令行或终端执行单元测试。你还将学习如何使用\
  \ NetBeans Profiler 以及其他工具来分析和监控你的应用程序。\n\n11-1. 理解异常\n\n问题\n\n你捕获并记录了一个异常，需要确定其原因。\n\
  \n解决方案\n\n分析异常 `printStackTrace()` 方法的输出：\n\n```java\ntry {\n    int a = 5/0;\n\
  } catch (Exception e) {\n    e.printStackTrace();\n}\n```\n\n结果：\n\n```\njava.lang.ArithmeticException:\
  \ / by zero\n    at org.java8recipes.chapter11.recipe11_01.Recipe11_1.start(Recipe11_1.java:18)\n\
  \    at org.java8recipes.chapter11.recipe11_01.Recipe11_1.main(Recipe11_1.java:13)\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 调试与单元测试\n\n工作原理\n\
  \n\n\n在编程术语中，*栈*指的是为到达程序中某个点而被调用的函数列表，通常从最具体的（System.out.println()）到最通用的（public\
  \ static void main）。每个程序都会追踪为了到达特定代码段而执行的代码顺序。栈跟踪输出指的是发生错误时内存中的栈。Java 中抛出的异常会记录其发生位置以及抛出异常时所执行的代码路径。栈跟踪显示从异常发生的最具体位置（异常发生的行）到违规代码的顶层调用者（以及两者之间的所有内容）。这些信息随后能让你精确定位执行了哪些方法调用，并可能有助于阐明异常被抛出的原因。\n\
  \n在此示例中，除零异常发生在 Recipe11_1.java 的第 18 行，由 main() 方法（在第 13 行）的调用引起。有时，查看栈跟踪输出时，你会看到不属于项目的方法。这很自然，因为有时方法调用是在工作系统的其他部分生成的。例如，在\
  \ Swing 应用程序中引发异常时，经常能看到 AWT 方法（由于 EventQueue 的特性）。如果你查看更具体的函数调用（最早的那些），最终会找到项目自身的代码，然后可以尝试确定异常被抛出的原因。\n\
  \nN **注意** 如果程序使用“调试”信息编译，栈跟踪输出将包含行号信息。默认情况下，大多数 IDE 在调试配置下运行时都会包含此信息。\n\n11-2：锁定类的行为\n\
  \n问题\n\n你需要锁定类的行为，并希望创建单元测试来验证应用程序中的特定行为。\n\n解决方案\n\n使用 JUnit 创建单元测试来验证类中的行为。要使用此解决方案，你需要在类路径中包含\
  \ JUnit 依赖项。JUnit 可以从 [`www.junit.org`](http://www.junit.org/) 下载。下载后，将 junit-xxx.jar\
  \ 和 junit-xxx-dep.jar 文件添加到你的项目或类路径中（其中 xxx 是下载的版本号）。当 JUnit 成为项目的一部分后，你将能够包含 org.junit\
  \ 和 junit.framework 命名空间。\n\n在此示例中，为 MathAdder 类创建了两个单元测试。MathAdder 类包含两个方法：addNumber(int,\
  \ int) 和 substractNumber(int, int)。这两个方法返回其传入参数的加法（或减法）结果（一个简单的类）。单元测试（由 @Test 注解标记）验证\
  \ MathAdder 类确实能对两个数字进行加法和/或减法运算。\n\npackage org.java8recipes.chapter11;\n\nimport\
  \ junit.framework.Assert;\n\nimport org.junit.Test;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 调试与单元测试\n\npublic class Recipe11_2_MathAdderTest {\n\n@Test\n\npublic void\
  \ testAddBehavior() {\n\nRecipe_11_2_MathAdder adder = new Recipe_11_2_MathAdder();\n\
  \nfor (int i =0;i < 100;i++) {\n\nfor (int j =0;j < 100;j++) {\n\nAssert.assertEquals(i+j,adder.addNumbers(i,j));\n\
  \n}\n\n}\n\n}\n\n@Test\n\npublic void testSubstractBehavior() {\n\nRecipe_11_2_MathAdder\
  \ adder = new Recipe_11_2_MathAdder();\n\nfor (int i =0;i < 100;i++) {\n\nfor (int\
  \ j =0;j < 100;j++) {\n\nAssert.assertEquals(i-j,adder.substractNumber(i,j));\n\n\
  }\n\n}\n\n}\n\n}\n\n要执行此测试，请使用你的 IDE 运行测试类。例如，在 NetBeans 中，你必须重构测试类，将其放入 NetBeans\
  \ 项目中的“测试包”模块。将测试类移动到“测试包”中的所需包后，运行该文件以执行测试。\n\n工作原理\n\n*单元测试*对于测试代码以确保类中发生预期行为非常有用。在项目中包含单元测试可以降低在添加或重构代码时破坏功能的可能性。创建单元测试时，你是在指定对象应如何行为（即所谓的*契约*）。单元测试确保预期行为发生（它们通过验证方法的结果并使用不同的\
  \ JUnit.Assert 方法来实现）。\n\n编写单元测试的第一步是创建一个新类来描述你想要验证的行为。一种常见的单元测试命名约定是创建一个与被测试类同名但带有\
  \ Test 后缀的类；在本示例中，主类名为 Recipe11_2_MathAdder，而测试类名为 Recipe11_2_MathAdderTest。\n\n\
  单元测试类（MathAdderTest）将包含检查和验证类行为的方法。为此，需要对方法名称进行注解。*注解*是元数据的一种形式，开发者可以对代码的指定部分进行“注解”，从而向被注解的代码添加信息。这些额外信息不被程序使用，而是由编译器/构建器（或外部工具）用来指导代码的编译、构建和/或测试。出于单元测试的目的，你通过在方法名称前指定\
  \ @Test 来注解属于单元测试的方法。\n\n在每个方法中，你使用 Assert.assertEquals（或任何其他 Assert 静态方法）来验证行为。\n\
  \nAssert.assertEquals 方法指示单元测试框架验证被测试类的方法调用的预期值与其方法调用返回的实际值是否相同。在本示例中，Assert.assertEquals\
  \ 验证 MathAdder 是否正确地将两个整数相加。虽然这个类的范围很简单，但它展示了拥有一个功能完整的单元测试所需的最低要求。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 调试与单元测试\n\n如果 Assert 调用成功，它将在单元测试框架中被报告为“通过”测试；如果 Assert 调用失败，则单元测试框架将停止并显示一条消息，指出单元测试失败的位置。大多数现代\
  \ IDE 都能够通过右键单击名称并选择运行/调试来运行单元测试类（这也是运行 Chapter_11_2_MathAdderTest 示例的预期方式）。\n\n\
  虽然 IDE 确实可以在开发时运行单元测试，但创建它们的目的是为了自动运行（通常由计划构建或版本控制系统的签入触发），这正是 11-3 节要讨论的内容。\n\n\
  11-3：脚本化你的单元测试\n\n问题\n\n你想要自动运行单元测试，而不是手动调用它们。\n\n解决方案\n\n使用并配置 JUnit 和 Ant。为此，请遵循以下步骤：\n\
  \n1. 下载 Apache Ant（位于 [`ant.apache.org/`](http://ant.apache.org/)）。\n2. 将 Apache\
  \ Ant 解压缩到一个文件夹中（例如，Windows 系统为 c:\\ant，OS X 系统为 /Development）。\n3. 确保可以从命令行或终端执行\
  \ Apache Ant。在 Windows 中，这意味着将 apache-ant/bin 文件夹添加到路径中，具体操作如下：\n   a. 转到控制面板 °\
  \ 系统。\n   b. 单击高级系统设置。\n   c. 单击环境变量。\n   d. 在系统变量列表中，双击变量名 PATH。\n   e. 在字符串末尾，添加\
  \ ;C:\\apache-ant-1.8.2\\bin（或你解压缩 Apache Ant 的文件夹）。\n   f. 单击确定（在每个之前打开的弹出框上）以接受更改。\n\
  \nN **注意** Apache Ant 在 OS X 上预装，因此你无需安装或配置它。要验证这一点，请打开终端窗口并输入 ant –version 以查看系统上安装的版本。\n\
  \n\n\n请确保已定义 `JAVA_HOME` 环境变量。在 Windows 系统中，这意味着需要添加一个名为 `JAVA_HOME` 的新环境变量。例如：\n\
  \n进入控制面板 ° 系统。\n\n4. 点击“高级系统设置”。\n\n5. 点击“环境变量”。在“系统变量”列表中，检查是否存在名为 `JAVA_HOME`\
  \ 的变量，并且其值指向您的 JDK 发行版。如果 `JAVA_HOME` 不存在，请点击“新建”。将变量名设置为 `JAVA_HOME`，并将变量值设置为 `C:\\\
  Program Files\\Java\\jdk1.7.0` 或您的 JDK 7 安装根目录。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 调试与单元测试\n\n在 OS X 系统中，环境变量在位于用户主目录下的 `.bash_profile` 文件中设置。要添加 `JAVA_HOME`，请在\
  \ `.bash_profile` 中添加如下一行：\n\nexport JAVA_HOME=/Library/Java/JavaVirtualMachines/jdk1.8.0.jdk/Contents/Home\n\
  \n测试您能否访问 Ant，以及 Ant 能否找到您的 JDK 安装。要测试更改是否生效，请执行以下操作：\n\n6. 打开命令窗口或终端。\n\n7. 输入\
  \ `ANT`。\n\n如果您收到消息“Ant is not recognized as an internal or external command”，请重新执行设置\
  \ `PATH` 变量的前几个步骤（第一组说明）。如果您收到消息“unable to locate tools.jar”，则需要为您的安装创建和/或更新 `JAVA_HOME`\
  \ 路径（第二组说明）。\n\n消息“Buildfile: build.xml does not exist!”意味着您的设置已准备好使用 Ant 进行构建。恭喜！\n\
  \n**注意**\n\n在 Microsoft Windows 中更改环境变量时，必须关闭之前的命令行窗口并重新打开，因为更改仅应用于新的命令窗口。要在 Microsoft\
  \ Windows 中打开命令窗口，请点击“开始”，输入 `CMD`，然后按 Enter 键。\n\n在项目的根目录下创建 `build.xml`，并将以下最基本的\
  \ Ant 脚本作为 `build.xml` 文件的内容。这个特定的 `build.xml` 文件包含 Ant 将用于编译和测试此示例的信息。\n\n<project\
  \ default=\"test\" name=\"Chapter11Project\" basedir=\".\">\n\n<property name=\"\
  src\" location=\"src\"/>\n\n<property name=\"build\" location=\"build/\"/>\n\n<property\
  \ name=\"src.tests\" location=\"src/\"/>\n\n<property name=\"reports.tests\" location=\"\
  report/\" />\n\n<path id=\"build.path\">\n\n<fileset dir=\"dep\">\n\n<include name=\"\
  **/*.jar\" />\n\n</fileset>\n\n<pathelement path=\"build\" />\n\n</path>\n\n<target\
  \ name=\"build\">\n\n<mkdir dir=\"${build}\" />\n\n<javac srcdir=\"${src}\" destdir=\"\
  ${build}\">\n\n<classpath refid=\"build.path\" />\n\n</javac>\n\n</target>\n\n<target\
  \ name=\"test\" depends=\"build\">\n\n<mkdir dir=\"${reports.tests}\" />\n\n<junit\
  \ fork=\"yes\" printsummary=\"yes\" haltonfailure=\"yes\">\n\n<classpath refid=\"\
  build.path\" />\n\n<formatter type=\"plain\"/>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 调试与单元测试\n\n<batchtest fork=\"yes\" todir=\"${reports.tests}\">\n\n<fileset\
  \ dir=\"${src.tests}\">\n\n<include name=\"**/*Test*.java\"/>\n\n</fileset>\n\n\
  </batchtest>\n\n</junit>\n\n</target>\n\n</project>\n\n**注意** 要执行此示例，请打开命令行窗口或终端，导航到第\
  \ 11 章文件夹，输入 `ant`，然后按 Enter 键。\n\n工作原理\n\nApache Ant（或简称 Ant）是一个允许您编写项目构建和单元测试脚本的程序。通过配置\
  \ Ant，您可以使用命令行构建、测试和部署应用程序。（反过来，它可以由操作系统自动调度运行。）Ant 可以自动运行单元测试并报告这些测试的结果。\n\n每次运行后都可以分析这些结果，以精确定位行为的变化。\n\
  \n由于 Ant 的复杂性，其学习曲线较陡，但它在编译、构建和编织代码方面提供了很大的灵活性。通过使用 Ant，可以在项目构建方式上实现最大程度的配置。\n\n\
  **注意** [如需更深入的教程，请访问 http://ant.apache.org/manual/index.html](http://ant.apache.org/manual/index.html)\
  \ 了解 Ant。\n\n\n\n`build.xml` 文件包含了如何编译项目、使用哪个类路径以及运行哪些单元测试的指令。每个 `build.xml` 文件都包含一个\
  \ `<project>` 标签，该标签封装了构建项目的步骤。在每个\n\n`<project>` 内部，有多个目标（targets），它们是构建过程中的“步骤”。一个\
  \ `<target>` 可以依赖于其他目标，从而允许你在项目中建立依赖关系（在本教程的示例中，目标“test”依赖于目标“build”，\n\n这意味着要运行测试目标，Ant\
  \ 会先运行构建目标）。\n\n每个目标都包含任务（tasks）。这些任务是可扩展的，并且有一组核心任务可以直接使用。`<javac>` 任务会编译 `src`\
  \ 属性中指定的一组 Java 文件，并将输出写入 `dest` 属性。作为 `<javac>` 任务的一部分，你可以指定要使用的类路径。在此示例中，类路径通过引用先前定义的路径（名为\
  \ `build.path`）来指定。Ant 为创建类路径提供了充分的支持。在本教程中，类路径被定义为 `dep` 文件夹中所有扩展名为 `.jar` 的文件。\n\
  \n构建目标中的另一个任务是 `<junit>`。该任务会找到其任务中指定的单元测试并运行它。单元测试在 `<batchtest>` 属性中定义。通过使用 `<fileset>`\
  \ 属性，可以告诉 JUnit 查找名称中包含单词 Test 且以 `.java` 扩展名结尾的任何文件。一旦 JUnit 运行完每个测试，它会在控制台输出摘要，并将单元测试结果报告写入\
  \ `reports.tests` 文件夹。\n\nN **注意** 你可以通过使用 `<property>` 标签在 `build.xml` 文件中定义变量。一旦定义了属性，就可以使用\
  \ `${propertyName}` 语法在其他任务中访问它。这使你能够快速更改构建脚本以应对结构变化（例如，切换目标/源文件夹）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 调试与单元测试\n\n11-4\\. 尽早发现错误\n\n问题\n\n你希望确保能够在设计时发现尽可能多的错误。\n\n解决方案\n\n使用\
  \ FindBugs 扫描软件中的问题。使用包含 FindBugs 的 Ant 构建文件进行报告。\n\n以下是添加了 FindBugs 报告功能的新 `build.xml`\
  \ 文件：\n\n<project default=\"test\" name=\"Chapter11Project\" basedir=\".\">\n\n\
  <property name=\"src\" location=\"src\"/>\n\n<property name=\"build\" location=\"\
  build/\"/>\n\n<property name=\"reports.tests\" location=\"report/\" />\n\n<property\
  \ name=\"classpath\" location=\"dep/\" />\n\n<!-- Findbugs 静态分析器信息 -->\n\n<property\
  \ name=\"findbugs.dir\" value=\"dep/findbugs\" />\n\n<property name=\"findbugs.report\"\
  \ value=\"findbugs\" />\n\n<path id=\"findbugs.lib\" >\n\n<fileset dir=\"${findbugs.dir}\"\
  \ includes=\"*.jar\"/>\n\n</path>\n\n<taskdef name=\"findbugs\" classpathref=\"\
  findbugs.lib\" classname=\"edu.umd.cs.findbugs.anttask.\n\nindBugsTask\"/>\n\n<path\
  \ id=\"build.path\">\n\n<fileset dir=\"dep\">\n\n<include name=\"**/*.jar\" />\n\
  \n</fileset>\n\n</path>\n\n<target name=\"clean\">\n\n<delete dir=\"${build}\" />\n\
  \n<delete dir=\"${reports.tests}\" />\n\n<delete dir=\"${coverage.dir}\" />\n\n\
  <delete dir=\"${instrumented}\" />\n\n<mkdir dir=\"${build}\" />\n\n<mkdir dir=\"\
  ${reports.tests}\" />\n\n<mkdir dir=\"${coverage.dir}\" />\n\n</target>\n\n<target\
  \ name=\"build\">\n\n<javac srcdir=\"${src}\" destdir=\"${build}\" debug=\"${debug}\"\
  >\n\n<classpath refid=\"build.path\" />\n\n</javac>\n\n</target>\n\n<target name=\"\
  test\" depends=\"clean,build\">\n\n<junit fork=\"yes\" printsummary=\"yes\" haltonfailure=\"\
  yes\">\n\n<classpath refid=\"build.path\" />\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 调试与单元测试\n\n<formatter type=\"plain\"/>\n\n<batchtest fork=\"yes\" todir=\"\
  ${reports.tests}\">\n\n<fileset dir=\"${build}\">\n\n<include name=\"**/*Test*.class\"\
  />\n\n</fileset>\n\n</batchtest>\n\n<jvmarg value=\"-XX:-UseSplitVerifier\" />\n\
  \n</junit>\n\n</target>\n\n<target name=\"findbugs\" depends=\"clean\">\n\n<antcall\
  \ target=\"build\">\n\n<param name=\"debug\" value=\"true\" />\n\n</antcall>\n\n\
  <mkdir dir=\"${findbugs.report}\" />\n\n<findbugs home=\"${findbugs.dir}\"\n\noutput=\"\
  html\"\n\n\n\noutputFile=\"${findbugs.report}/index.html\"\n\nreportLevel=\"low\"\
  \n\n>\n\n<class location=\"${build}/\" />\n\n<auxClasspath refid=\"build.path\"\
  \ />\n\n<sourcePath path=\"${src}\" />\n\n</findbugs>\n\n</target>\n\n</project>\n\
  \n要运行此方案，请下载 FindBugs（[`findbugs.sourceforge.net/downloads.html`](http://findbugs.sourceforge.net/downloads.html)）。将其解压到计算机中的某个文件夹，然后将\
  \ `./lib/` 文件夹的内容复制到项目的 `/dep/findbugs` 文件夹中（如有必要，请创建 `/dep/findbugs` 文件夹）。确保 `/dep/findbugs/findbugs.jar`\
  \ 和 `/dep/findbugs/findbugs-ant.jar` 都存在。\n\n工作原理\n\nFindBugs 是一个*静态代码分析器（SCA）*。它会解析程序的编译文件并发现编码中的错误（不是语法错误，而是某些类型的逻辑错误）。例如，FindBugs\
  \ 能发现的一个错误是使用 `==` 而不是 `String.equals()` 来比较两个字符串。分析结果会以 HTML（或文本）格式输出，可用浏览器查看。捕获\
  \ FindBugs 发现的错误很容易，将其作为持续集成流程的一部分也极为有益。\n\n在 `build.xml` 的开头，你需要定义 FindBugs 任务。此部分指定了定义新任务的\
  \ `.jar` 文件所在位置（`dep\\findbugs`），同时也确定了完成后报告的存放位置。\n\n`build.xml` 中还有一个名为“findbugs”的新目标项目。findbugs\
  \ 目标会编译带有调试信息的源文件（包含调试信息有助于生成更详细的 FindBugs 报告，因为报告错误时会包含行号），然后分析字节码中的错误。在 findbugs\
  \ 任务中，你需要指定编译后的 `.class` 文件的位置（即 `<class>` 属性）、项目依赖项的位置（`<auxClasspath>` 属性）以及源代码的位置（`<sourcePath>`\
  \ 属性）。\n\n在 findbugs 目标内部，有一个 `<antcall>` 任务。`<antcall>` 任务只是运行该任务内部指定的目标。就在 `<antcall>`\
  \ 任务之前，你将 `debug` `<property>` 设置为 `true`。这随后会被传递给 `<javac>` 任务，即 `debug=\"${debug}\"\
  `。当 `debug` `<property>` 设置为 `true` 时，`<javac>` 任务会在 Java 源文件编译时包含调试信息。编译后的文件中包含调试信息有助于生成更易读的\
  \ FindBugs 报告，因为报告会包含发现问题的行号。在 Ant 目标内部设置属性的技巧在整个 `build.xml` 文件中被广泛使用，以便在通过特定构建目标时选择性地启用某些行为。如果你构建常规的构建目标，构建结果将不包含调试信息。相反，如果你构建\
  \ findbugs 目标，由于 findbugs 目标将 `debug` `<property>` 替换为 `true`，构建结果将包含调试信息。\n\n**提示**\
  \ 要调用 Ant 运行默认的“目标”（如 `build.xml` 中指定），只需输入 `ant`。要指定另一个 `.xml` 文件（而不是 `build.xml`），请输入\
  \ `ant –f nameofotherfile.xml`。要更改要运行的默认目标，请在末尾输入目标名称（例如 `ant clean`）。要运行此示例，请输入\
  \ `ant –f findbugsbuild.xml findbugs`。这将要求 Ant 使用 `findbugsbuild.xml` 文件并运行 findbugs\
  \ 目标。\n\n11-5\\. 监控应用程序中的垃圾回收\n\n问题\n\n你注意到应用程序似乎变慢了，怀疑发生了垃圾回收。\n\n解决方案 1\n\n在启动\
  \ Java 程序时添加 `-Xloggc:gc.log -XX:+PrintGCDetails -XX:+PrintGCTimeStamps` 作为参数。\n\
  \n这些参数允许你将垃圾回收信息记录到 `gc.log` 文件中，包括垃圾回收发生的时间以及详细信息（是次要垃圾回收还是主要垃圾回收，以及耗时多久）。\n\n\
  执行配方 11_5 并启用垃圾回收日志记录的 Ant 目标。\n\n\n\n<target name=\"Recipe11_5\" depends=\"build\"\
  >\n\n<java classname=\"org.java8recipes.chapter11.Recipe11_5\" fork=\"true\">\n\n\
  <classpath refid=\"build.path\" />\n\n<jvmarg value=\"-Xloggc:gc.log\" />\n\n<jvmarg\
  \ value=\"-XX:+PrintGCDetails\" />\n\n<jvmarg value=\"-XX:+PrintGCTimeStamps\" />\n\
  \n</java>\n\n</target>\n\n在此 `build.xml` 文件中，在启动应用程序之前，使用 Java 任务向编译器添加垃圾回收日志记录参数。要通过\
  \ Ant 运行此示例，请键入 `ant Recipe11_5`。\n\n**方案 2**\n\n使用 NetBeans 的“分析器”工具分析程序的内存消耗等信息。要运行分析器，请选择要对其执行分析的文件或项目，然后从\
