  \n}\n\n}\n\n清单 1-4 产生以下输出：\n\nfalse\n\nfalse\n\ntrue\n\ntrue\n\n字段 `oneValueForAllObjects`\
  \ 仅对名为 `sd1` 的类实例设置为 `true`。然而，对于实例 `sd2` 它也是 `true`。这是因为在声明该字段时使用了关键字 `static`。静态字段对于其类的所有对象只出现一次。\n\
  \n工作原理\n\n清单 1-2 说明了变量声明的基本格式：\n\ntype variable;\n\n在声明变量时进行初始化是很常见的，因此你经常会看到：\n\
  \ntype variable = initialValue;\n\n字段声明前可以加上修饰符。例如：\n\npublic static variable =\
  \ initialValue;\n\nprivate variable;\n\n通常将可见性修饰符（`public` 或 `private`）放在首位，但你可以按任意顺序列出修饰符。请注意，随着你对语言的深入学习，你还会遇到并需要了解其他修饰符。\n\
  \n`String` 类型在 Java 中是特殊的。它实际上是一个类类型，但在语法上你可以将其视为基本类型。\n\n每当你将一串字符括在双引号（`\"...\"\
  `）中时，Java 会自动创建一个 `String` 对象。\n\n你不需要调用构造函数，也不需要指定 `new` 关键字。然而 `String` 是一个类，并且该类中有一些方法可供你使用。清单\
  \ 1-2 末尾展示的 `replace()` 方法就是其中之一。\n\n\n\n字符串由字符组成。Java 的 `char` 类型是一个双字节结构，用于以 Unicode\
  \ 的 UTF-16 编码存储单个字符。你可以通过两种方式生成 `char` 类型的字面量：\n\n- 如果某个字符易于输入，则将其括在单引号中（例如：`'G'`）。\n\
  - 否则，指定以 `\\u` 为前缀的四位 UTF-16 *码点*值（例如：`'\\u0490'`）。\n\n某些 Unicode 码点需要五位数字。这些无法在单个\
  \ `char` 值中表示。如果你需要更多关于 Unicode 和国际化的信息，请参阅第 10 章。\n\n避免使用任何基本类型来表示货币值。尤其要避免为此目的使用浮点类型。请参考第\
