  13-3: Handling SQL Exceptions - Using SQLException\n```\n\n工作原理\n\n如果你在移动设备上工作并经常旅行，不可能一直保持互联网连接。\n\
  \n如今，有些设备允许你在旅途中完成大量工作，即使没有直接连接到数据库。在这种情况下，像 `CachedRowSet` 对象这样的解决方案就可以发挥作用了。\n\
  \n\n\nCachedRowSet 与常规的 ResultSet 对象相同，区别在于它无需维持与数据库的连接即可保持可用状态。你可以查询数据库、获取结果并将其存入\
  \ CachedRowSet 对象，然后在未连接数据库的情况下处理这些数据。如果在任何时候对数据进行了修改，这些修改可以在之后与数据库同步。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 数据库操作\n\n创建 CachedRowSet 有几种方法。本攻略的解决方案使用 RowSetFactory（Java SE 7 新增）来实例化\
  \ CachedRowSet。不过，你也可以使用 CachedRowSet 的默认构造函数来创建新实例，代码如下所示：\n\nCachedRowSet crs\
  \ = new CachedRowSetImpl();\n\n实例化后，需要建立与数据库的连接。同样有几种方法可以实现。可以设置将要使用的连接属性，本攻略的解决方案在注释中演示了此技术。以下摘自解决方案的代码使用\
  \ CachedRowSet 对象的 setUsername()、setPassword() 和 setUrl() 方法设置连接属性。每个方法都接受一个字符串值，在示例中该字符串从\
  \ CreateConnection 类获取：\n\n// 或者填充 CachedRowSet 连接设置\n\n// crs.setUsername(createConn.getUsername());\n\
  \n// crs.setPassword(createConn.getPassword());\n\n// crs.setUrl(createConn.getJdbcUrl());\n\
  \n另一种设置连接的方法是等到执行查询时，将 Connection 对象传递给 executeQuery() 方法。这是本攻略解决方案中使用的技术。但在执行查询之前，必须使用\
  \ setCommand() 方法设置查询命令，该方法接受一个字符串值。在本例中，该字符串是需要执行的 SQL 查询：\n\ncrs.setCommand(\"\
  select id, recipe_number, recipe_name, description from recipes\");\n\n接下来，如果 CachedRowSet\
  \ 将用于更新，则应使用 setKeys() 方法记录主键值。该方法接受一个包含键列位置索引的 int 数组。这些键用于标识唯一列。在本例中，查询中列出的第一列\
  \ ID 是主键：\n\nint[] keys = {1};\n\ncrs.setKeyColumns(keys);\n\n最后，使用 execute() 方法执行查询并填充\
  \ CachedRowSet。如前所述，execute() 方法可选地接受一个 Connection 对象，使 CachedRowSet 能够获取数据库连接。\n\
  \ncrs.execute(conn);\n\n查询执行完毕且 CachedRowSet 填充完成后，它可以像任何其他 ResultSet 一样使用。你可以用它向前或向后获取记录，也可以通过指定要检索行的绝对位置来获取。本攻略的解决方案仅演示了其中几种获取方法，但最常用的方法列在表\
  \ 13-2 中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 数据库操作\n\n\
  **表 13-2.** *CachedRowSet 获取方法*\n\n**方法**\n\n**描述**\n\nfirst()\n\n移动到集合中的第一行。\n\n\
  beforeFirst()\n\n移动到集合中第一行之前的位置。\n\nafterLast()\n\n移动到集合中最后一行之后的位置。\n\nnext()\n\n\
  移动到集合中的下一个位置。\n\nlast()\n\n移动到集合中的最后一个位置。\n\n可以在 CachedRowSet 中插入和更新行。要插入行，请使用 moveToInsertRow()\
  \ 方法移动到新的行位置。然后使用与正在填充的列数据类型相对应的各种方法 [CachedRowSet、updateString()、updateInt() 等]\
  \ 填充行。填充完行中所有必需的列后，调用 insertRow() 方法，然后调用 moveToCurrentRow() 方法。以下代码演示了向 RECIPES\
  \ 表中插入记录：\n\ncrs.moveToInsertRow();\n\ncrs.updateInt(1, sequenceValue); // 通过先前的查询获取当前序列值\n\
  \ncrs.updateString(2, \"13-x\");\n\ncrs.updateString(3, \"这是一个新的食谱标题\");\n\ncrs.insertRow();\n\
  \ncrs.moveToCurrentRow();\n\n更新行类似于使用可更新的 ResultSet。只需使用与正在更新的列数据类型相对应的 CachedRowSet\
  \ 对象方法 [updateString()、updateInt() 等] 更新值。更新完行中的一列或多列后，调用 updateRow() 方法。本攻略的解决方案演示了此技术。\n\
  \ncrs.updateString(\"description\", \"可能会更改\");\n\ncrs.updateRow();\n\n要将任何更新或插入传播到数据库，必须调用\
  \ acceptChanges() 方法。此方法可以接受一个可选的 Connection 参数以连接到数据库。调用后，所有更改都会刷新到数据库。不幸的是，由于自上次为\
  \ CachedRowSet 检索数据以来可能已经过了一段时间，因此可能会发生冲突。如果发生此类冲突，将抛出 SyncProviderException。你可以捕获这些异常并使用\
  \ SyncResolver 对象手动处理冲突。但是，解决冲突超出了本攻略的范围，有关更多信息，请参阅以下网址的在线文档：\n\n[`download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html`](http://download.oracle.com/javase/tutorial/jdbc/basics/cachedrowset.html)。\n\
  \nCachedRowSet 对象为数据处理提供了极大的灵活性，尤其是在使用并非始终连接数据库的设备时。但是，在可以简单使用标准 ResultSet 甚至可滚动\
  \ ResultSet 的情况下，它们也可能显得大材小用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
