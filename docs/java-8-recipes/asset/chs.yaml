  \ 表达式替换匿名内部类有助于维护简洁且易于理解的代码。\n\n**6-7. 从 Lambda 表达式访问类变量**\n\n**问题**\n\n你正在编写的类包含实例变量，并且你希望让这些变量能够通过该类中的\
  \ lambda 表达式使用。\n\n**解决方案**\n\n根据需要，从 lambda 表达式内部使用包含在外部类中的实例变量。\n\n在下面的类中，`VariableAccessInner.InnerClass.lambdaInMethod()`\
  \ 方法中包含的 lambda 表达式可以访问所有外部类的实例变量。因此，如果需要，它可以打印出 `VariableAccessInner` 的 `CLASSA`\
  \ 变量。\n\npublic class VariableAccessInner {\n\npublic String CLASSA = \"Class-level\
  \ A\";\n\nclass InnerClass {\n\npublic String CLASSA = \"Class-level B\";\n\nvoid\
  \ lambdaInMethod(String passedIn) {\n\nString METHODA = \"Method-level A\";\n\n\
  Consumer<String> l1 = x -> {\n\nSystem.out.println(x);\n\nSystem.out.println(\"\
  CLASSA Value: \" + CLASSA);\n\nSystem.out.println(\"METHODA Value: \" + METHODA);\n\
  \n};\n\nl1.accept(CLASSA);\n\nl1.accept(passedIn);\n\n}\n\n}\n\n}\n\n现在，让我们使用以下代码执行\
  \ `lambdaInMethod`：\n\nVariableAccessInner vai = new VariableAccessInner();\n\n\
  VariableAccessInner.InnerClass inner = vai.new InnerClass();\n\ninner.lambdaInMethod(\"\
  Hello\");\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 N Lambda\
  \ 表达式\n\n结果：\n\nClass-level B\n\nCLASSA Value: Class-level B\n\nMETHODA Value: Method-level\
  \ A\n\nHello\n\nCLASSA Value: Class-level B\n\nMETHODA Value: Method-level A\n\n\
  **注意** `CLASSA` 变量被 `InnerClass` 类中使用相同标识符的变量覆盖了。\n\n因此，属于 `VariableAccessInner`\
  \ 的 `CLASSA` 实例变量不会从 lambda 表达式内部被打印出来。\n\n**工作原理**\n\nLambda 表达式可以访问位于外部类中的变量。因此，包含在类方法中的\
  \ lambda 表达式可以访问外部类的任何实例变量。Lambda 表达式没有添加额外的作用域，因此它可以访问外部作用域的字段、方法和局部变量。在解决方案中，`lambdaInMethod()`\
  \ 方法中包含的 lambda 表达式可以访问在任一类中声明的所有字段。这是因为内部类及其外部类都包围了该 lambda。需要注意的一点是，如果内部类包含一个与外部类中声明的变量同名的实例变量，那么\
  \ lambda 将使用其封闭类的变量。因此，在解决方案中，从 lambda 表达式内部访问的是 `InnerClass` 的 `CLASSA` 字段，而不是外部类的引用。\n\
  \n从 lambda 表达式内部引用的局部变量必须是 `final` 或等效 `final` 的。\n\n因此，如果 lambda 表达式试图访问一个在外部方法上下文中已被更改的变量，将会发生错误。例如，假设解决方案中的方法被更改为以下内容：\n\
  \nvoid lambdaInMethod(String passedIn) {\n\nString METHODA = \"Method-level A\"\
