  \n第 20 章 N XML 处理\n\n工作原理\n\n`javax.xml.transform` 包包含了将 XML 文档转换为任何其他文档类型所需的所有类。最常见的用例是将面向数据的\
  \ XML 文档转换为用户可读的 HTML 文档。\n\n将一种文档类型转换为另一种文档类型需要三个文件：\n\n-   一个 XML 源文档\n-   一个\
  \ XSL 转换文档，用于将 XML 元素映射到新文档元素\n-   一个目标输出文件\n\nXML 源文档当然是你的源数据文件。它通常包含易于以编程方式解析的面向数据的内容。然而，人们不容易阅读\
  \ XML 文件，尤其是复杂、数据丰富的文件。相反，人们更习惯于阅读正确渲染的 HTML 文档。\n\n\n\nXSL 转换文档规定了如何将 XML 文档转换为其他格式。XSL\
  \ 文件通常包含一个 HTML 模板，该模板指定了用于存放源 XML 文件提取内容的动态字段。\n\n在本示例的源代码中，您将找到两个源文档：\n\n-   `chapter20/recipe20_3/patients.xml`\n\
  -   `chapter20/recipe20_3/patients.xsl`\n\n`patients.xml` 文件内容简短，包含以下数据：\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<patients>\n\n<patient id=\"1\">\n\
  \n<name>John Smith</name>\n\n<diagnosis>Common Cold</diagnosis>\n\n</patient>\n\n\
  <patient id=\"2\">\n\n<name>Jane Doe</name>\n\n<diagnosis>Broken ankle</diagnosis>\n\
  \n</patient>\n\n<patient id=\"3\">\n\n<name>Jack Brown</name>\n\n<diagnosis>Food\
  \ allergy</diagnosis>\n\n</patient>\n\n</patients>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 20 章 XML 处理\n\n`patients.xml` 文件定义了一个名为 `patients` 的根元素。它包含三个嵌套的 `patient` 元素。每个\
  \ `patient` 元素包含三部分数据：\n\n-   患者标识符，作为 `patient` 元素的 `id` 属性提供\n-   患者姓名，作为 `name`\
  \ 子元素提供\n-   患者诊断结果，作为 `diagnosis` 子元素提供\n\n转换 XSL 文档（`patients.xsl`）同样非常简短，它使用\
  \ XSL 将患者数据映射为更易于用户阅读的 HTML 格式：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n\n<xsl:stylesheet version=\"1.0\">\n\n<xsl:output method=\"html\"/>\n\n<xsl:template\
  \ match=\"/\">\n\n<html>\n\n<head>\n\n<title>Patients</title>\n\n</head>\n\n<body>\n\
  \n<table border=\"1\">\n\n<tr>\n\n<th>Id</th>\n\n<th>Name</th>\n\n<th>Diagnosis</th>\n\
  \n</tr>\n\n<xsl:for-each select=\"patients/patient\">\n\n<tr>\n\n<td>\n\n<xsl:value-of\
  \ select=\"@id\"/>\n\n</td>\n\n<td>\n\n<xsl:value-of select=\"name\"/>\n\n</td>\n\
  \n<td>\n\n<xsl:value-of select=\"diagnosis\"/>\n\n</td>\n\n</tr>\n\n</xsl:for-each>\n\
  \n</table>\n\n</body>\n\n</html>\n\n</xsl:template>\n\n</xsl:stylesheet>\n```\n\n\
  使用此样式表，示例代码将 XML 转换为一个包含所有患者及其数据的 HTML 表格。在浏览器中渲染后，该 HTML 表格应如图 20-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
