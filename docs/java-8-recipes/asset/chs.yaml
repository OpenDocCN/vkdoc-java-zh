  \n21-3. 绕过 TCP 使用 InfiniBand 以提升性能\n\n问题\n\n您的应用程序部署在 Linux 或 Solaris 上，需要非常快速高效地移动数据，并且需要消除任何可能拖慢速度的瓶颈。\n\
  \n解决方案\n\n使用套接字直接协议（SDP）来绕过 TCP（这可能是过程中的一个瓶颈）。为此，创建一个 SDP 配置文件，并设置系统属性以指定配置文件的位置。\n\
  \n**注意** SDP 是在 Java SE 7 版本中为仅部署在 Solaris 或 Linux 操作系统上的应用程序添加的。SDP 旨在支持通过 InfiniBand\
  \ 结构进行流连接，Solaris 和 Linux 都支持该结构。Java SE 7 版本支持 OpenFabrics Enterprise Distribution\
  \ (OFED) 的 1.4.2 和 1.5 版本。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 21 章 网络编程\n\n以下是一个可用于启用 SDP 的配置文件示例：\n\n```ini\n# 绑定到 192.0.2.1 时使用 SDP\nbind\
  \ 192.0.2.1 *\n\n# 连接到 192.0.2.* 上的所有应用程序服务时使用 SDP\nconnect 192.0.2.0/24 1024-*\n\
  ```\n\n\n"
- "# 连接 myserver.org 上的 HTTP 服务器或数据库时使用 SDP\n\nconnect myserver.org 8080\n\nconnect\
  \ myserver.org 1521\n\n以下摘录自终端。它展示了一个名为 SDPExample 的 Java 应用程序的执行过程，其中指定了 SDP 系统属性：\n\
  \n% java -Dcom.sun.sdp.conf=sdp.conf -Djava.net.preferIPv4Stack=true SDPExample\n\
  \n工作原理\n\n有时，应用程序在执行网络通信时，速度越快越好，这一点至关重要。\n\n通过 TCP 进行传输有时会降低性能，因此绕过 TCP 可能是有益的。自\
  \ Java SE 7 发布以来，某些平台已包含对 SDP 的支持。SDP 支持通过 InfiniBand 架构进行流连接。Solaris 和 Linux 都包含对\
  \ InfiniBand 的支持，因此 SDP 在这些平台上可能很有用。\n\n你无需对应用程序进行任何程序上的更改即可支持 SDP。使用 SDP 的唯一区别在于，你必须创建一个\
  \ SDP 配置文件，并且在运行应用程序时，必须通过传递一个标志来告知 JVM 使用该协议。由于实现是透明的，因此应用程序可以为任何平台编写，而那些支持 SDP\
  \ 的平台只需包含配置文件即可绕过 TCP。\n\nSDP 配置文件是一个文本文件，由绑定规则和连接规则组成。绑定规则表示，当 TCP 套接字绑定到与给定规则匹配的地址和端口时，应使用\
  \ SDP 协议传输。\n\n连接规则表示，当未绑定的 TCP 套接字尝试连接到与给定规则匹配的地址和端口时，应使用 SDP 协议传输。规则以 `bind` 或\
  \ `connect` 关键字开头，指示规则类型，后跟主机名或 IP 地址，以及单个端口号或端口号范围。\n\n根据在线文档，规则具有以下形式：\n\n(\"\
  bind\"|\"connect\")1*LWSP-char(hostname|ipaddress)[\"/\"prefix])1*LWSP-char(\"*\"\
  |port)\n\n[\"-\"(\"*\"|port)]\n\n在此处显示的规则格式中，`1*LWSP-char` 表示任意数量的制表符或空格可以分隔这些标记。\n\
  \n方括号内的任何内容表示可选文本，引号表示字面文本。在配方的解决方案中，第一条规则表示 SDP 可用于 IP 地址 192.0.2.1（一个本地地址）上的任何端口（`*`\
  \ 表示通配符）。配置文件中应为分配给 InfiniBand 适配器的每个本地地址指定一条绑定规则。配置文件中的第一条连接规则指定，每当连接到 IP 地址 192.0.2.*\
  \ 且使用端口 1024 或更高时，应使用 SDP。\n\nconnect 192.0.2.0/24 1024-*\n\n此规则使用了一些需要注意的特殊语法。具体来说，IP\
  \ 地址的 `/24` 后缀表示 32 位 IP 地址的前 24 位应与指定地址匹配。由于 IP 地址的每个部分都是 8 位，这意味着 192.0.2 必须完全匹配，而最后一个字节可以是任何值。端口标识符中的\
  \ `-*` 指定了 1024 或更大的范围，因为使用了通配符。配置文件中的第三条和第四条连接规则指定，SDP 应与主机名 [myserver.org](http://myserver.org)\
  \ 以及端口 8080 或 1521 一起使用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
