  \n![](img/index-419_1.jpg)\n\n第 15 章 使用 JavaFX 进行图形处理\n\n**图 15-4.** *带有新闻滚动条的照片查看器*\n\
  \n工作原理\n\n本方案以方案 15-1 中的照片查看器应用程序为基础，添加了一个新闻滚动条和一些漂亮的照片切换动画。主要的动画效果集中在平移和淡入淡出上。首先，创建一个新闻滚动条控件，它通过使用平移过渡（javafx.animation.TranslateTransition）将文本节点向左滚动。接着，应用另一个淡入淡出效果，以便当用户点击“上一张”和“下一张”按钮切换到下一张图片时，能够产生缓慢的过渡效果。为了实现此效果，使用了由多个动画组成的复合过渡（javafx.animation.SequentialTransition）。最后，为了创建按钮控件根据鼠标位置淡入淡出的效果，使用了淡入淡出过渡（javafx.animation.FadeTransition）。\n\
  \n在开始讨论实现需求的步骤之前，我想先介绍一下 JavaFX 动画的基础知识。\n\nJavaFX 动画 API 允许您组合定时事件，这些事件可以在节点的属性值之间进行插值，从而产生动画效果。每个定时事件称为一个关键帧（KeyFrame），它负责在一段时间内（javafx.util.Duration）对节点的属性进行插值。了解关键帧的作用是对节点属性值进行操作后，您需要创建一个\
  \ KeyValue 类的实例，该实例将引用所需的节点属性。\n\n插值的概念简单来说就是在起始值和结束值之间分配数值。一个例子是在 1000 毫秒内，将一个矩形从其当前\
  \ x 位置（零）移动到 100 像素处；换句话说，就是在一秒钟内将矩形向右移动 100 像素。这里展示了一个关键帧和关键值，用于在 1000 毫秒内对矩形的\
  \ x 属性进行插值：\n\nfinal Rectangle rectangle = new Rectangle(0, 0, 50, 50);\n\nKeyValue\
  \ keyValue = new KeyValue(rectangle.xProperty(), 100);\n\nKeyFrame keyFrame = new\
  \ KeyFrame(Duration.millis(1000), keyValue);\n\n当创建许多连续组合的关键帧时，您需要创建一个时间线。由于时间线是\
  \ javafx.animation.Animation 的子类，因此您可以设置一些标准属性，例如其循环次数和自动反转。*循环次数*是您希望时间线播放动画的次数。\n\
  \n如果您希望循环次数无限期地播放动画，请使用值 Timeline.INDEFINITE。自动反转是指动画反向播放时间线的能力。默认情况下，循环次数设置为 1，并且自动反转设置为\
  \ false。添加关键帧时，只需使用 TimeLine 对象上的 getKeyFrames().add()方法即可。以下代码片段演示了一个无限期播放且自动反转设置为\
  \ true 的时间线：\n\nTimeline timeline = new Timeline();\n\ntimeline.setCycleCount(Timeline.INDEFINITE);\n\
  \ntimeline.setAutoReverse(true);\n\ntimeline.getKeyFrames().add(keyFrame);\n\ntimeline.play();\n\
  \n掌握了时间线的这些知识，您就可以在 JavaFX 中为任何图形节点制作动画。虽然您可以以低级方式创建时间线，但这可能会变得非常繁琐。您可能想知道是否有更简单的方法来表达常见的动画。好消息是！JavaFX\
  \ 提供了过渡（Transition），这些是执行常见动画效果的便捷类。您可以使用过渡创建的一些常见动画效果包括：u javafx.animation.FadeTransition\n\
  \nu javafx.animation.PathTransition\n\nu javafx.animation.ScaleTransition\n\nu javafx.animation.TranslateTransition\n\
  \n要查看更多过渡效果，请参阅 Javadoc 中的 javafx.animation。由于 Transition 对象也是 javafx.animation.Animation\
  \ 类的子类，因此您可以设置循环次数和自动反转属性。本方案重点介绍两种过渡效果：平移过渡（TranslateTransition）和淡入淡出过渡（FadeTransition）。\n\
  \n问题陈述中的第一个要求是创建一个新闻滚动条。在新闻滚动条控件中，文本节点在矩形区域内从右向左滚动。当文本滚动到矩形区域的左边缘时，您需要裁剪文本以创建一个视口，该视口仅显示矩形内部的像素。为此，您首先创建一个\
  \ Group 来容纳构成滚动条控件的所有组件。接下来，创建一个填充了 55%不透明度的白色圆角矩形。创建可视区域后，使用 Group 对象上的 setClip(someRectangle)方法创建一个表示裁剪区域的类似矩形。图\
  \ 15-5 显示了一个作为裁剪区域的圆角矩形区域。\n\n**图 15-5.** *在 Group 对象上设置裁剪区域*\n\n创建滚动条控件后，您将根据场景的高度属性减去滚动条控件的高度来绑定平移\
  \ Y。您还根据场景的宽度减去按钮控件的宽度来绑定滚动条控件的宽度属性。通过绑定这些属性，每当用户调整应用程序窗口大小时，滚动条控件都可以更改其大小和位置。这使得滚动条控件看起来像是浮动在窗口底部。以下代码绑定了滚动条控件的平移\
  \ Y、宽度和裁剪区域的宽度属性：\n\ntickerArea.translateYProperty().bind(scene.heightProperty().subtract(tickerRect.getHeight()\
  \ + 6)); tickerRect.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()\
  \ + 16)); clipRegion.widthProperty().bind(scene.widthProperty().subtract(buttonRect.getWidth()\
  \ + 16)); tickerArea.getChildren().add(tickerRect);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 15 章 使用 JavaFX 进行图形处理\n\n现在滚动条控件已经完成，您将创建一些新闻内容输入其中。在示例中，使用了一个包含新闻提要文本的 Text\
  \ 节点。要将新创建的 Text 节点添加到滚动条控件，请调用其 getChildren().add()方法。以下代码将一个 Text 节点添加到滚动条控件：final\
  \ Group tickerArea = new Group();\n\nfinal Rectangle tickerRect = //...\n\nText\
  \ news = new Text();\n\nnews.setText(\"JavaFX 8 新闻滚动条... | 新特性：Swing 节点、事件分发线程与\
  \ JavaFX 应用程序线程合并，\" +\n\n\"新外观 - Modena、富文本支持、打印、树表控件、更多内容！\"); news.setTranslateY(18);\n\
  \nnews.setFill(Color.WHITE);\n\ntickerArea.getChildren().add(news);\n\n\n\n接下来，你需要使用\
  \ JavaFX 的 `TranslateTransition` API 让文本节点从右向左滚动。第一步是设置执行 `TranslateTransition`\
  \ 的目标节点。然后设置持续时间，即 `TranslateTransition` 执行动画的总时长。`TranslateTransition` 通过提供操作节点\
  \ `translateX` 和 `translateY` 属性的便捷方法，简化了动画的创建过程。这些便捷方法以 `from` 和 `to` 作为前缀。例如，在对文本节点使用\
  \ `translateX` 的场景中，有 `fromX()` 和 `toX()` 方法。`fromX()` 是起始值，`toX()` 是最终插值。在示例中，这些计算基于文本节点中文本的长度。因此，如果你从远程源（如\
  \ RSS 源）读取数据，文本长度的差异不会破坏滚动条。接下来，将 `TranslateTransition` 设置为线性过渡（`Interpolator.LINEAR`），以便在起始值和结束值之间均匀插值。要查看更多插值器类型或了解如何创建自定义插值器，请参阅\
  \ `javafx.animation.Interpolators` 的 Javadoc。最后，在示例中，循环次数设置为 1，这将根据指定的持续时间让滚动条动画播放一次。以下代码片段详细说明了如何创建一个让文本节点从右向左动画的\
  \ `TranslateTransition`：\n\n```java\nfinal TranslateTransition ticker = new TranslateTransition();\n\
  \nticker.setNode(news);\n\nint newsLength = news.getText().length();\n\nticker.setDuration(Duration.millis((newsLength\
  \ * 4/300) * 15000));\n\nticker.setFromX(scene.widthProperty().doubleValue());\n\
  \nticker.setToX(-scene.widthProperty().doubleValue() - (newsLength * 5));\n\nticker.setFromY(19);\n\
  \nticker.setInterpolator(Interpolator.LINEAR);\n\nticker.setCycleCount(1);\n```\n\
  \n当滚动条的新闻完全滚出滚动条区域，到达场景最左侧时，你需要停止并从起始位置（最右侧）重新播放新闻源。为此，你需要通过 lambda 表达式创建一个 `EventHandler<ActionEvent>`\
  \ 对象的实例，并使用 `setOnFinished()` 方法将其设置在滚动条（`TranslateTransition`）对象上。以下是重新播放 `TranslateTransition`\
  \ 动画的方法：\n\n```java\n// 当窗口宽度调整时，滚动条会知道需要移动多远\n// 当滚动条完成时，重置并重新播放滚动条动画\nticker.setOnFinished((ActionEvent\
  \ ae) -> {\n    ticker.stop();\n    ticker.setFromX(scene.getWidth());\n    ticker.setDuration(new\
  \ Duration((newsLength * 4/300) * 15000));\n    ticker.playFromStart();\n});\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 使用 JavaFX 进行图形处理\n\n\
  一旦定义了动画，只需调用 `play()` 方法即可启动它。以下代码片段展示了如何播放 `TranslateTransition`：\n\n```java\n\
  ticker.play();\n```\n\n为了在鼠标悬停和离开文本时暂停和启动滚动条，你需要实现类似的事件处理器：\n\n```java\n// 鼠标悬停时停止滚动条\n\
  tickerArea.setOnMouseEntered((MouseEvent me) -> {\n    ticker.pause();\n});\n\n\
  // 鼠标离开滚动条时重新启动\ntickerArea.setOnMouseExited((MouseEvent me) -> {\n    ticker.play();\n\
  });\n```\n\n现在你已经对动画过渡有了更好的理解，那么能够触发任意数量过渡的过渡效果又如何呢？JavaFX 提供了两种实现此行为的过渡。这两种过渡可以顺序或并行地调用各个独立的过渡。在本节中，你将使用顺序过渡（`SequentialTransition`）来包含两个\
  \ `FadeTransition`，以便淡出当前显示的图像并淡入下一张图像。在创建“上一张”和“下一张”按钮的事件处理器时，首先通过调用 `gotoImageIndex()`\
  \ 方法确定要显示的下一个图像。一旦确定了要显示的下一个图像，就调用 `transitionByFading()` 方法，该方法会返回一个 `SequentialTransition`\
  \ 实例。调用 `transitionByFading()` 方法时，你会注意到创建了两个 `FadeTransition`。第一个过渡会将不透明度从 1.0\
  \ 变为 0.0，以淡出当前图像；第二个过渡会将不透明度从 0.0 插值到 1.0，淡入下一张图像，该图像随后成为当前图像。最后，将这两个 `FadeTransition`\
  \ 添加到 `SequentialTransition` 中并返回给调用者。以下代码创建了两个 `FadeTransition` 并将它们添加到一个 `SequentialTransition`\
  \ 中：\n\n```java\nFadeTransition fadeOut = new FadeTransition(Duration.millis(500),\
  \ imageView);\nfadeOut.setFromValue(1.0);\nfadeOut.setToValue(0.0);\nfadeOut.setOnFinished((ActionEvent\
  \ ae) -> {\n    imageView.setImage(nextImage);\n});\n\nFadeTransition fadeIn = new\
  \ FadeTransition(Duration.millis(500), imageView);\nfadeIn.setFromValue(0.0);\n\
  fadeIn.setToValue(1.0);\n\nSequentialTransition seqTransition = new SequentialTransition();\n\
  seqTransition.getChildren().addAll(fadeOut, fadeIn);\nreturn seqTransition;\n```\n\
  \n对于与淡入淡出相关的最后需求，使用按钮控件。使用 `FadeTransition` 创建一种幽灵般的动画效果。首先，创建一个 `EventHandler`（更具体地说，是通过\
  \ lambda 表达式创建的 `EventHandler<MouseEvent>`）。向场景添加鼠标事件很容易；你只需重写 `handle()` 方法，其中入参是\
  \ `MouseEvent` 类型（与其形式类型参数相同）。在 lambda 内部，通过使用接受持续时间和节点作为参数的构造函数，创建一个 `FadeTransition`\
  \ 对象的实例。接下来，你会注意到调用了 `setFromValue()` 和 `setToValue()` 方法，用于在不透明度级别 1.0 和 0.0 之间插值，从而产生淡入效果。以下代码添加了一个\
  \ `EventHandler`，用于在鼠标光标位于场景内时创建淡入效果：\n\n```java\n// 淡入按钮控件\nscene.setOnMouseEntered((MouseEvent\
