  }\n\n以下是执行 SwitchTypeChecker 的结果：\n\nPrimitive type char is a valid switch type.\n\
  \nPrimitive type int is a valid switch type.\n\ndouble is not a valid switch type.\n\
  \nPrimitive type short is a valid switch type.\n\nBoxed primitive type Integer is\
  \ a valid switch type.\n\nString is a valid switch type.\n\nLong is not a valid\
  \ switch type.\n\nboolean is not a valid switch type.\n\nEnum is a valid switch\
  \ type.\n\n工作原理\n\n`switch` 语句是一种控制流语句，允许你根据 `switch` 表达式的值执行不同的代码块。它类似于 `if-then-else`\
  \ 语句，区别在于 `switch` 语句只能有一个测试表达式，并且表达式类型被限制为几种不同类型之一。当 `switch` 语句执行时，它会将表达式与 `switch`\
  \ 语句的 `case` 标签中包含的常量进行比较。这些 `case` 标签是代码中的分支点。如果表达式的值等于某个 `case` 标签常量的值，控制权就会转移到与该匹配\
  \ `case` 标签对应的代码段。然后，从该点开始的所有代码语句都会被执行，直到遇到 `switch` 语句的结尾或 `break` 语句。`break` 语句会导致\
  \ `switch` 语句终止，控制权转移到 `switch` 语句之后的语句。可选地，`switch` 语句可以包含一个 `default` 标签，当没有 `case`\
  \ 标签常量与 `switch` 表达式的值相等时，它提供了一个分支点。\n\n`SwitchTypeChecker` 的 `isValidSwitchType()`\
  \ 方法演示了如何使用 `String` 作为 `switch` 测试表达式。如果你仔细研究 `isValidSwitchType()` 方法，你会发现它正在测试一个\
  \ `Class` 对象是否代表与有效 `switch` 表达式类型之一相对应的类型。该方法还演示了如何将 `case` 标签分组以实现逻辑或（OR）条件测试。如果一个\
  \ `case` 标签没有关联的代码要执行，并且没有 `break` 语句，执行流程会“穿透”到下一个包含可执行语句的 `case` 标签，从而允许在 `switch`\
  \ 表达式的结果匹配分组 `case` 常量中的任何一个时，执行公共代码。\n\n`RockPaperScissors` 类实现了一个命令行版的石头-剪刀-布游戏，你将在其中与计算机对战。该类中有两个方法演示了\
  \ `switch` 语句。`getHand()` 方法展示了在 `switch` 表达式中使用枚举变量。`playHands()` 方法旨在说明 `switch`\
  \ 表达式虽然通常只是一个变量，但也可以是任何结果属于允许的 `switch` 类型之一的表达式。在这个例子中，表达式使用了返回 `int` 值的三元运算符。\n\
