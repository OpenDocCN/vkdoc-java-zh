  \n}\n\n} catch (SQLException e) {\n\ne.printStackTrace();\n\n}\n\n运行此代码产生的输出应类似于以下内容：\n\
  \nSuccessfully connected\n\n13-1 连接数据库 DriverManager 和 DataSource 实现 - 更多内容即将推出\
  \ 13-2 查询数据库并检索结果 可能变更\n\n13-3 使用 SQLException 处理 SQL 异常\n\n工作原理\n\n处理 JDBC 资源一直是一件令人头疼的事情。当不再需要资源时，需要编写大量样板代码来关闭它们。自\
  \ Java SE 7 发布以来，情况已不再如此。\n\nJava 7 引入了使用 try-with-resources 的自动资源管理。通过使用此技术，开发人员不再需要手动关闭每个资源，这一变化可以减少许多行代码。\n\
  \n为了使用此技术，您必须在 try 子句后的一组括号内实例化所有希望启用自动处理的资源。在本配方的解决方案中，声明的资源是 Connection、Statement\
  \ 和 ResultSet。\n\ntry (Connection conn = createConn.getConnection();\n\nStatement\
  \ stmt = conn.createStatement();\n\nResultSet rs = stmt.executeQuery(qry);) {\n\n\
  一旦这些资源超出作用域，它们就会被自动关闭。这意味着不再需要编写 finally 块来确保资源被关闭。自动资源处理不仅适用于数据库操作，也适用于任何符合新的 java.lang.Autocloseable\
  \ API 的资源。其他操作，如文件 I/O，也遵循新的 API。java.lang.Autoclosable 中有一个单一的 close() 方法来管理资源的关闭。实现了\
  \ java.io.Closeable 接口的类可以遵循此 API。\n\n总结\n\n\n\n在许多应用中，数据库已成为存储重要信息的关键。因此，充分理解如何在应用程序中使用数据库至关重要。本章从基础开始，涵盖了数据库访问的入门指南，随后深入讲解了如何安全地访问和修改数据、事务管理以及离线状态下的数据访问等重要主题。现在，您应该已经掌握了在\
  \ Java 解决方案中处理数据的一些实用技巧。请务必记住，数据访问解决方案多种多样，本章中的方法只是应对信息管理这一庞大挑战的部分途径。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 14 章**\n\n**JavaFX 基础**\n\nJavaFX 8.0 API 是 Java 为开发者构建丰富跨平台应用程序而推出的下一代 GUI\
  \ 工具包。\n\nJavaFX 8.0 是基于 JavaFX 2.2 的更新版本，它采用场景图范式（保留模式），而非传统的即时模式渲染。JavaFX 的场景图是一种树状数据结构，用于维护基于矢量的图形节点。JavaFX\
  \ 的目标是适用于多种设备，如移动设备、智能手机、电视、平板电脑和台式机。\n\n在 JavaFX 诞生之前，开发富互联网应用需要整合多个独立的库和 API 才能实现功能强大的应用程序。这些独立的库包括媒体、UI\
  \ 控件、Web、3D 和 2D API。由于整合这些 API 相当困难，Sun Microsystems（现为 Oracle）的杰出工程师们创建了一套全新的\
  \ JavaFX 库，将所有相同功能整合于一体。JavaFX 堪称 GUI 领域的瑞士军刀。JavaFX 8 是一个纯 Java（语言）API，允许开发者充分利用现有的\
  \ Java 库和工具。\n\n根据您与不同人的交流，您可能会遇到对“用户体验”（或在 UI 领域称为 UX）的不同定义。但一个事实始终不变——用户总是期望 GUI\
  \ 应用提供更优质的内容和更高的易用性。基于这一事实，开发者和设计师常常携手打造应用以满足这一需求。JavaFX 提供了一套工具包，使开发者和设计师（在某些情况下，他们可能是同一个人）能够创建既实用又美观的应用。另外需要承认的是，无论您是在开发游戏、媒体播放器还是常规的企业应用，JavaFX\
  \ 不仅有助于开发更丰富的 UI，您还会发现其 API 设计极为精良，能大幅提升开发效率（我始终从 API 使用者的角度出发）。\n\n关于 JavaFX 的专著不胜枚举，要涵盖该工具包的所有功能几乎是不可能的。\n\
