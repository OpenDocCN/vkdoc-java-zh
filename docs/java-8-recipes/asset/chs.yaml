  \n// 鼠标释放时结束路径\n\nscene.onMouseReleasedProperty().set((EventHandler<MouseEvent>)\n\
  \n(MouseEvent event) -> {\n\nonePath.setStrokeWidth(0);\n\nif (onePath.getElements().size()\
  \ > 1) {\n\npathTransition.stop();\n\npathTransition.playFromStart();\n\n}\n\n});\n\
