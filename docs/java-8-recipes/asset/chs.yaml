  \ e) {\n    System.out.println(\"Couldn't read startCounter, defaulting to \"+startCounter);\n\
  }\nString dateFormatStringProperty = properties.getProperty(\"DateFormatString\"\
  ,\n    \"MMM dd yy\");\nSystem.out.println(\"Should Wake up? \"+shouldWakeUp);\n\
  System.out.println(\"Start Counter: \"+startCounter);\nSystem.out.println(\"Date\
  \ Format String:\"+dateFormatStringProperty);\n\n//setting property\nproperties.setProperty(\"\
  StartCounter\",\"250\");\ntry {\n    properties.store(new FileOutputStream(\"properties.conf\"\
  ),\"Properties Description\");\n} catch (IOException e) {\n    e.printStackTrace();\n\
  }\nproperties.list(System.out);\n```\n\n工作原理\n\nJava 的 `Properties` 类帮助你管理程序属性。它允许你通过外部修改（有人编辑属性文件）或内部使用\
  \ `Properties.store()` 方法来管理属性。\n\n`Properties` 对象可以在没有文件的情况下实例化，也可以预加载一个文件。`Properties`\
  \ 对象读取的文件格式为 `[name]=[value]`，并以文本形式表示。如果你需要以其他格式存储值，则需要写入和读取字符串。\n\n如果你预期文件会在程序外部被修改（用户直接打开文本编辑器更改值），请务必对输入进行清理；例如，去除值中的多余空格，并在需要时忽略大小写。\n\
  \n\n\n要以编程方式查询不同的属性，可以调用 `getProperty(String)` 方法，并传入你想要获取值的属性的字符串名称。如果未找到该属性，该方法将返回\
  \ `null`。或者，你可以调用 `getProperty(String, String)` 方法，如果 `Properties` 对象中未找到该属性，它将返回第二个参数作为其值。指定默认值是一种良好的实践，以防文件中没有特定键的条目。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 8 章 输入与输出\n\n查看生成的属性文件时，你会注意到前两行指示了文件的描述及其修改日期。这两行以\
  \ `#` 开头，在 Java 属性文件中，这相当于注释。`Properties` 对象在处理文件时会跳过任何以 `#` 开头的行。\n\n**注意** 如果你允许用户直接修改配置文件，那么在从\
  \ `Properties` 对象检索属性时，务必进行验证。属性值中最常见的问题之一是前导和/或尾随空格。如果指定的是布尔或整数属性，请确保它们能够从字符串解析出来。至少，在尝试解析时捕获异常，以应对非常规值（并记录违规值）。\n\
  \n8-13\\. 解压压缩文件\n\n问题\n\n你的应用程序需要从压缩的 `.zip` 文件中解压并提取文件。\n\n解决方案\n\n使用 `java.util.zip`\
  \ 包，你可以打开一个 `.zip` 文件并遍历其条目。在遍历条目时，可以为目录条目创建目录。类似地，当遇到文件条目时，将解压后的文件写入到 `.unzipped`\
  \ 文件中。以下代码演示了如何执行解压和文件遍历技术，如上所述。\n\n```java\nZipFile file = null;\n\ntry {\n\n \
  \   file = new ZipFile(\"file.zip\");\n\n    FileSystem fileSystem = FileSystems.getDefault();\n\
  \n    Enumeration<? extends ZipEntry> entries = file.entries();\n\n    String uncompressedDirectory\
  \ = \"uncompressed/\";\n\n    Files.createDirectory(fileSystem.getPath(uncompressedDirectory));\n\
  \n    while (entries.hasMoreElements()) {\n\n        ZipEntry entry = entries.nextElement();\n\
  \n        if (entry.isDirectory()) {\n\n            System.out.println(\"Creating\
  \ Directory:\" + uncompressedDirectory + entry.getName()); \n            Files.createDirectories(fileSystem.getPath(uncompressedDirectory\
  \ + entry.getName()));\n\n        } else {\n\n            InputStream is = file.getInputStream(entry);\n\
  \n            System.out.println(\"File :\" + entry.getName());\n\n            BufferedInputStream\
  \ bis = new BufferedInputStream(is);\n\n            String uncompressedFileName\
  \ = uncompressedDirectory + entry.getName();\n\n            Path uncompressedFilePath\
  \ = fileSystem.getPath(uncompressedFileName);\n\n            Files.createFile(uncompressedFilePath);\n\
  \n            try (FileOutputStream fileOutput = new FileOutputStream(uncompressedFileName))\
  \ {\n\n                while (bis.available() > 0) {\n\n                    fileOutput.write(bis.read());\n\
  \n                }\n\n            }\n\n            System.out.println(\"Written\
  \ :\" + entry.getName());\n\n        }\n\n    }\n\n} catch (IOException e) {\n\n\
  \    e.printStackTrace();\n\n}\n```\n\n工作原理\n\n要处理 `.zip` 归档文件的内容，需要创建一个 `ZipFile`\
  \ 对象。可以通过将 `.zip` 归档文件的名称传递给构造函数来实例化 `ZipFile` 对象。创建对象后，你就可以访问指定的 `.zip` 文件信息。每个\
  \ `ZipFile` 对象都包含一个条目集合，这些条目代表归档文件中的目录和文件。通过遍历这些条目，你可以获取每个压缩文件的信息。\n\n每个 `ZipEntry`\
  \ 实例都包含压缩和未压缩的大小、名称以及未压缩字节的输入流。\n\n通过生成一个 `InputStream`，可以将未压缩的字节读入字节缓冲区，然后（在我们的例子中）写入文件。使用\
  \ `FileStream`，可以确定在不阻塞进程的情况下可以读取多少字节。一旦读取了确定的字节数，这些字节就会被写入输出文件。此过程持续进行，直到读取完所有字节。\n\
  \n**注意** 如果文件非常大，将整个文件读入内存可能不是一个好主意。如果你需要处理大文件，最好先将其以未压缩格式写入磁盘（如示例所示），然后打开它并分块加载。如果你正在处理的文件不大（你可以通过检查\
  \ `getSize()` 方法来限制大小），则可能可以将其加载到内存中。\n\n总结\n\n本章演示了在 Java 8 中处理文件和网络 I/O 的几个示例。你学习了如何序列化文件以便存储到磁盘，以及如何使用\
  \ Java API 操作主机的文件系统。\n\n本章还涵盖了如何读写属性文件以及执行文件压缩。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 9 章**\n\n**异常与日志记录**\n\n异常是描述程序中异常情况的一种方式。它们表明发生了意外（异常）事件。因此，异常能有效地中断当前程序流程，并发出信号表明有需要关注的问题。正因如此，审慎使用异常的程序能获得更好的控制流，并变得更加健壮。即便如此，不加区分地使用异常可能会导致性能下降。\n\
  \n在 Java 中，异常可以被*抛出*或*捕获*。抛出异常涉及告诉代码你遇到了异常，使用 `throw` 关键字通知 JVM 在当前栈中查找能够处理此异常情况的代码。捕获异常涉及告诉编译器你可以处理哪些异常，以及你希望在代码的哪个部分监控这些异常的发生。这通过\
  \ `try/catch` Java 块（在技巧 9-1 中描述）来表示。\n\n所有异常都继承自 `Throwable`，如图 9-1 所示。继承自 `Throwable`\
  \ 的类可以在 `try/catch` 语句的 `catch` 子句中定义。`Error` 类主要由 JVM 用于表示严重和/或致命错误。根据 Java 文档，应用程序不应期望捕获\
  \ `Error` 异常，因为它们被认为是致命的（可以想象成计算机着火了）。Java 程序中的大部分异常将继承自 `Exception` 类。\n\n```\n\
  Throwable\n├── Error\n└── Exception\n    ├── RuntimeException\n    │   └── ArithmeticException\n\
  \    └── IOException\n        └── FileNotFoundException\n```\n\n**图 9-1.** *Java\
  \ 中部分异常类层次结构*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 异常与日志记录\n\
  \n在 JVM 中，有两种类型的异常：受检异常和非受检异常。受检异常由方法强制执行。在方法签名中，你可以指定方法可能抛出的异常类型。这要求该方法的任何调用者创建一个\
  \ `try/catch` 块，以处理方法签名中声明的异常。\n\n非受检异常不需要如此严格的约定，可以在任何地方自由抛出，而无需强制实现 `try/catch`\
  \ 块。即便如此，非受检异常（如技巧 9-6 所述）通常不被鼓励，因为它们可能导致线程崩溃（如果没有捕获异常）以及问题可见性差。继承自 `RuntimeException`\
  \ 的异常类被视为非受检异常，而直接继承自 `Exception` 的异常类被视为受检异常。\n\n\n\n请注意，抛出异常的操作（与其他语言结构替代方案相比）成本较高，因此用异常来替代控制流并非良策。例如，你不应通过抛出异常来表示某个方法调用的预期结果（比如像\
  \ `isUsernameValid(String username)` 这样的方法）。更好的做法是调用该方法并返回一个布尔值作为结果，而不是试图抛出一个 `InvalidUsernameException`\
  \ 来表示失败。\n\n虽然异常在稳健的软件开发中扮演着至关重要的角色，但异常的日志记录也同样重要。在应用程序中进行日志记录有助于开发者了解正在发生的事件，而无需对代码进行调试。这在无法进行实时调试的生产环境中尤其如此。从这个意义上说，日志记录收集了关于正在发生的事件（很可能是出了什么问题）的线索，并帮助你排查生产环境中的问题。许多开发者选择使用结构化的日志框架来为应用程序提供更强大的日志记录功能。一个拥有良好方法论的稳健日志框架，将为你省去许多深夜还在琢磨“到底发生了什么？”的加班时间。\n\
  \nJava 的日志记录功能已经非常成熟。有许多开源项目被广泛接受为日志记录的*事实上的*标准。在本章的技巧中，你将使用 Java 的日志框架和 Java 简单日志门面（SLF4J）。这两个项目结合在一起，为大多数日志记录需求提供了一个足够好的解决方案。对于涉及\
  \ SLF4J 和 Log4j 的技巧，请下载 SLF4J [（http://www.slf4j.org/）](http://www.slf4j.org/) 并将其放入项目的依赖路径中。\n\
  \n9-1. 捕获异常\n\n问题\n\n你想要优雅地处理代码中产生的任何异常。\n\n解决方案\n\n使用内置的 `try/catch` 语言结构来捕获异常。具体做法是将任何可能抛出异常的代码块包裹在\
  \ `try/catch` 块中。在下面的示例中，一个方法用于生成一个布尔值，以指示指定字符串的长度是否大于五个字符。如果作为参数传入的字符串为 `null`，`length()`\
  \ 方法会抛出一个 `NullPointerException`，并在 `catch` 块中被捕获。\n\n```java\nprivate void start()\
  \ {\n\n    System.out.println(\"字符串 1234 的长度是否超过 5 个字符？:\"+\n        isStringShorterThanFiveCharacters(\"\
  1234\"));\n\n    System.out.println(\"字符串 12345 的长度是否超过 5 个字符？:\"+\n        isStringShorterThanFiveCharacters(\"\
  12345\"));\n\n    System.out.println(\"字符串 123456 的长度是否超过 5 个字符？:\"+\n        isStringShorterThanFiveCharacters(\"\
  123456\"));\n\n    System.out.println(\"字符串 null 的长度是否超过 5 个字符？:\"+\n        isStringShorterThanFiveCharacters(null));\n\
  \n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 异常与日志记录\n\n\
  ```java\nprivate boolean isStringShorterThanFiveCharacters(String aString) {\n\n\
  \    try {\n\n        return aString.length() > 5;\n\n    } catch (NullPointerException\
  \ e) {\n\n        System.out.println(\"发生了一个异常！\");\n\n        return false;\n\n\
  \    }\n\n}\n```\n\n工作原理\n\n`try` 关键字指定了其所包含的代码段有可能引发异常。`catch` 子句位于 `try` 子句的末尾。每个\
  \ `catch` 子句指定了要捕获的异常类型。如果没有为受检异常提供 `catch` 子句，编译器将生成一个错误。两种可能的解决方案是：添加一个 `catch`\
  \ 子句，或者将异常包含在封闭方法的 `throws` 子句中。任何被抛出但未被捕获的受检异常都会沿着调用栈向上传播。如果此方法没有捕获该异常，执行该代码的线程将会终止。如果被终止的线程是程序中唯一的线程，那么程序的执行也将终止。\n\
  \n如果一个 `try` 子句需要捕获多个异常，可以指定多个 `catch` 子句。\n\n例如，以下 `try/catch` 块可用于同时捕获 `NumberFormatException`\
  \ 和 `NullPointerException`。\n\n```java\ntry {\n    // 此处代码\n} catch (NumberFormatException|NullPointerException\
  \ ex) {\n    // 日志记录\n}\n```\n\n有关捕获多个异常的更多信息，请参见技巧 9-4。\n\nN **注意** 抛出异常时要小心。如果抛出的异常未被捕获，它将沿着调用栈向上传播；如果没有能够处理该异常的\
  \ `catch` 子句，它将导致运行中的线程终止（也称为展开）。如果你的程序只有一个主线程，未捕获的异常将终止你的程序。\n\n9-2. 保证代码块被执行\n\
  \n问题\n\n你想要编写在控制权离开代码段时执行的代码，即使控制权是由于抛出错误或代码段异常终止而离开的。例如，你已经获取了一个锁，并希望确保正确地释放它。你希望在发生错误时以及没有错误时都能释放该锁。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 异常与日志记录\n\n解决方案\n\n\
  使用 `try/catch/finally` 块来正确地释放在代码段中获取的锁和其他资源。\n\n将无论是否发生异常都希望执行的代码放在 `finally` 子句中。在示例中，`finally`\
  \ 关键字指定了一个无论 `try` 块中是否抛出异常都将始终执行的代码块。在 `finally` 块中，通过调用 `lock.unlock()` 来释放锁：\n\
  \n```java\nprivate void callFunctionThatHoldsLock() {\n\n    myLock.lock();\n\n\
  \    try {\n\n        int number = random.nextInt(5);\n\n        int result = 100\
  \ / number;\n\n        System.out.println(\"结果是 \" + result);\n\n        FileOutputStream\
  \ file = new FileOutputStream(\"file.out\");\n\n        file.write(result);\n\n\
  \        file.close();\n\n    } catch (FileNotFoundException e) {\n\n        e.printStackTrace();\n\
  \n    } catch (IOException e) {\n\n        e.printStackTrace();\n\n    } catch (Exception\
  \ e) {\n\n        e.printStackTrace();\n\n    } finally {\n\n        myLock.unlock();\n\
  \n    }\n\n}\n```\n\n工作原理\n\n放置在 `try/catch/finally` 块的 `finally` 子句中的代码将始终被执行。在此示例中，通过在函数开头获取锁，然后在\
  \ `finally` 块中释放它，你保证了无论是否抛出异常（受检或非受检），锁都会在函数结束时被释放。总之，获取的锁应始终在 `finally` 块中释放。在示例中，假设\
  \ `mylock.unlock()` 函数调用不在 `finally` 块中（而是在 `try` 块的末尾）；如果发生异常，`mylock.unlock()`\
  \ 的调用将不会发生，因为代码执行会在异常发生的位置被中断。在这种情况下，锁将永远被持有而无法释放。\n\nN **警告** 如果你需要从方法中返回一个值，请非常小心地在\
  \ `finally` 块中返回值。\n\n`finally` 块中的 `return` 语句将始终执行，无论 `try` 块中可能已经执行了任何其他 `return`\
  \ 语句。\n\n9-3. 抛出异常\n\n问题\n\n当应用程序中出现特定情况时，你想要通过抛出异常来中止当前代码路径的执行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 异常与日志记录\n\n解决方案\n\n当特定情况发生时，使用 `throw` 关键字抛出指定的异常。使用 `throw` 关键字，你可以通知当前线程在当前层级及调用栈上层查找能够处理所抛出异常的\
  \ `try/catch` 块。在下面的示例中，如果传入的参数为 `null`，`callSomeMethodThatMightThrow` 会抛出一个 `NullPointerException`。\n\
  \n```java\nprivate void start() {\n\n    try {\n\n        callSomeMethodThatMightThrow(null);\n\
  \n    } catch (IllegalArgumentException e) {\n\n        System.out.println(\"发生了非法参数异常！\"\
  );\n\n    }\n\n}\n\nprivate void callSomeFunctionThatMightThrow(Object o) {\n\n\
  \    if (o == null) throw new NullPointerException(\"对象为空\");\n\n}\n```\n\n\n在此代码示例中，方法\
  \ `SomeMethodThatMightThrow` 会检查是否向其传递了有效参数。如果参数为 null，则会抛出 `NullPointerException`，表明该方法的调用者使用了错误的参数。\n\
  \n工作原理\n\n`throw` 关键字允许你显式生成异常条件。当当前线程抛出异常时，它不会执行 `throw` 语句之后的任何代码，而是将控制权转移到 `catch`\
  \ 子句（如果有的话），或者终止该线程。\n\n**注意** 抛出异常时，请确保你真的想要抛出它。如果异常在向上传播过程中未被捕获，它将终止正在执行的线程（也称为展开）。如果你的程序只有一个主线程，未捕获的异常将终止你的程序。\n\
  \n9-4\\. 捕获多个异常\n\n问题\n\n应用程序中的某个代码块倾向于抛出多个异常。你希望捕获 `try` 块中可能发生的每个异常。\n\n解决方案 1\n\
  \n在同一个块内发生多个异常的情况下，可以指定多个 `catch` 子句。\n\n每个 `catch` 子句可以指定要处理的不同异常，以便以不同的方式处理每个异常。在以下代码中，使用了两个\
  \ `catch` 子句来处理 `IOException` 和 `ClassNotFoundException`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 异常与日志记录\n\ntry {\n\nClass<?> stringClass = Class.forName(\"java.lang.String\"\
  );\n\nFileInputStream in = new FileInputStream(\"myFile.log\") ; // 可能抛出 IOException\
  \ in.read();\n\n} catch (IOException e) {\n\nSystem.out.println(\"发生了 IOException\
  \ \"+e);\n\n} catch (ClassNotFoundException e) {\n\nSystem.out.println(\"发生了 ClassCastException\
  \ \"+e);\n\n}\n\n解决方案 2\n\n如果你的应用程序在单个块内倾向于抛出多个异常，则可以使用竖线运算符（`|`）以相同的方式处理每个异常。在以下示例中，`catch`\
  \ 子句指定了多个用竖线（`|`）分隔的异常类型，以相同的方式处理每个异常。\n\ntry {\n\nClass<?> stringClass = Class.forName(\"\
  java.lang.String\");\n\nFileInputStream in = new FileInputStream(\"myFile.log\"\
  ) ; // 可能抛出 IOException in.read();\n\n} catch (IOException | ClassNotFoundException\
  \ e) {\n\nSystem.out.println(\"抛出了类型为 \"+e.getClass()+\" 的异常！ \"+e);\n\n}\n\n工作原理\n\
  \n有几种不同的方式可以处理可能抛出多个异常的情况。你可以指定单独的 `catch` 子句以不同的方式处理每个异常。要以相同的方式处理每个异常，你可以使用单个\
  \ `catch` 子句，并用竖线运算符分隔每个异常。\n\n**注意** 如果你在多个 `catch` 块中捕获异常（解决方案 1），请确保 `catch`\
  \ 块的定义顺序是从最具体到最通用。不遵循此约定将阻止异常被更具体的块处理。当存在 `catch (Exception e)` 块（它几乎捕获所有异常）时，这一点最为重要。\n\
  \n使用 `catch (Exception e)` 块——称为全捕获或 *Pokémon*® 异常处理器（必须全部捕获）——通常是不好的做法，因为这样的块会捕获所有异常类型并同等对待它们。这会成为一个问题，因为该块可能会捕获调用栈深处可能发生的、你本意并非要捕获的其他异常（例如\
  \ `OutOfMemoryException`）。最佳实践是指定每个可能的异常，而不是指定一个全捕获异常处理器来捕获所有异常。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 异常与日志记录\n\n9-5\\. 捕获未捕获的异常\n\n问题\n\n你想知道线程何时因未捕获的异常（例如 `NullPointerException`）而终止。\n\
  \n解决方案 1\n\n\n\n创建 Java 线程时，有时需要确保任何异常都能被捕获并妥善处理，以帮助确定线程终止的原因。为此，Java 允许你按线程或全局注册一个\
  \ `ExceptionHandler()`。以下代码演示了如何按线程注册异常处理器的示例。\n\nprivate void start() {\n\nThread.setDefaultUncaughtExceptionHandler((Thread\
  \ t, Throwable e) -> {\n\nSystem.out.println(\"哇！某处抛出了一个异常！\"+t.getName()+\": \"\
  +e);\n\n});\n\nfinal Random random = new Random();\n\nfor (int j = 0; j < 10; j++)\
  \ {\n\nint divisor = random.nextInt(4);\n\nSystem.out.println(\"200 / \" + divisor\
  \ + \" 等于 \" + (200 / divisor));\n\n}\n\n}\n\n该线程中的 for 循环会正常执行，直到遇到异常，此时将调用 `DefaultUncaughtExceptionHandler`。`UncaughtExceptionHandler`\
  \ 是一个函数式接口，因此可以使用 lambda 表达式来实现异常处理器。\n\n**解决方案 2**\n\n可以在特定线程上注册一个 `UncaughtExceptionHandler`。注册后，该线程内发生且未被捕获的任何异常都将由\
  \ `UncaughtExceptionHandler()` 的 `uncaughtException()` 方法处理。例如：\n\nprivate void\
  \ startForCurrentThread() {\n\nThread.currentThread().setUncaughtExceptionHandler((Thread\
  \ t, Throwable e) -> {\n\nSystem.out.println(\"在线程 \"+t.getName()+\" 中抛出了一个异常 \"\
  +e);\n\n});\n\nThread someThread = new Thread(() -> {\n\nSystem.out.println(200/0);\n\
  \n});\n\nsomeThread.setName(\"某个倒霉线程\");\n\nsomeThread.start();\n\nSystem.out.println(\"\
  在主线程中 \"+ (200/0));\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 9 章 异常与日志\n\n在上述代码中，为当前线程注册了一个 `UncaughtExceptionHandler`。与解决方案 1 类似，`UncaughtExceptionHandler`\
  \ 是一个函数式接口，因此可以使用 lambda 表达式来实现异常处理器。\n\n**工作原理**\n\n对于每个未被捕获的未检查异常，都会调用 `Thread.defaultUncaughtExceptionHandler()`。当\
  \ `UncaughtExceptionHandler()` 处理异常时，意味着没有 try/catch 块来捕获该异常。因此，异常会一直冒泡到线程栈的顶部。这是该线程终止前执行的最后一段代码。当异常在线程自身的或默认的\
  \ `UncaughtExceptionHandler()` 中被捕获时，线程将终止。`UncaughtExceptionHandler()` 可用于记录异常信息，以帮助定位异常原因。\n\
  \n在第二个解决方案中，`UncaughtExceptionHandler()` 专门为当前线程设置。当线程抛出未被捕获的异常时，它会冒泡到该线程的 `UncaughtExceptionHandler()`。\n\
  \n如果该处理器不存在，则会冒泡到 `defaultUncaughtExceptionHandler()`。同样，无论哪种情况，抛出异常的线程都将终止。\n\n\
  **提示** 处理多线程时，明确命名线程始终是一个好习惯。这能让你更轻松地确定是哪个线程导致了异常，而不是去追踪一个名为 Thread-##（未命名线程的默认命名模式）的未知线程。\n\
  \n9-6. 使用 try/catch 块管理资源\n\n**问题**\n\n在发生异常时，需要确保 try/catch 块中使用的所有资源都被释放。\n\n\
  **解决方案**\n\n利用自动资源管理（ARM）特性，该特性可通过 try-with-resources 语句指定。使用 try-with-resources\
  \ 语句时，try 子句中指定的任何资源都会在块终止时自动释放。在以下代码中，`FileOutputStream`、`BufferedOutputStream`\
  \ 和 `DataOutputStream` 资源由 try-with-resources 块自动管理。\n\ntry (\n\nFileOutputStream\
  \ fos = new FileOutputStream(\"out.log\");\n\n\n\nBufferedOutputStream bos = new\
  \ BufferedOutputStream(fos);\n\nDataOutputStream dos = new DataOutputStream(bos)\n\
  \n) {\n\ndos.writeUTF(\"This is being written\");\n\n} catch (Exception e) {\n\n\
  System.out.println(\"Some bad exception happened \");\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 异常与日志记录\n\n工作原理\n\n在大多数情况下，你希望在 try/catch 块执行完毕后，干净地关闭/释放该块内获取的资源。如果程序未能关闭/释放其资源，或操作不当，资源可能会被无限期占用，从而导致内存泄漏等问题。大多数资源都是有限的（如文件句柄或数据库连接），因此会造成性能下降（并引发更多异常）。\n\
  \n为避免这些情况，Java 提供了一种在 try/catch 块内发生异常时自动释放资源的方式。通过声明 try-with-resources 块，如果块内抛出异常，被检查的资源将被关闭。Java\
  \ 内置的大多数资源都能在 try-with-resources 语句中正常工作（完整列表请参见 `java.lang.AutoCloseable` 接口的实现者）。\n\
  \n此外，第三方实现者可以通过实现 `AutoCloseable` 接口来创建能与 try-with-resources 语句配合使用的资源。\n\ntry-with-resources\
  \ 语句的语法涉及 `try` 关键字，后跟左括号，再跟所有希望在发生异常或块执行完毕时释放的资源声明，最后以右括号结束。请注意，如果你尝试声明一个未实现 `AutoCloseable`\
  \ 接口的资源/变量，将会收到编译错误。右括号之后，try/catch 块的语法与普通块相同。\n\ntry-with-resources 特性的主要优势在于它允许更干净地释放资源。通常，在获取资源时，存在大量相互依赖关系（例如创建文件处理器，将其包装在输出流中，再包装在缓冲流中）。在异常情况下正确关闭和处置这些资源需要检查每个依赖资源的状态并小心处理，这需要编写大量代码。相比之下，try-with-resources\
  \ 结构允许 JVM 负责资源的正确处置，即使在异常情况下也是如此。\n\n**注意** try-with-resources 块将始终关闭已定义的资源，即使没有抛出异常。\n\
  \n9-7. 创建异常类\n\n问题\n\n你想要创建一种新的异常类型，用于指示特定事件。\n\n解决方案 1\n\n创建一个继承 `java.lang.RuntimeException`\
  \ 的类，以创建一个可在任何时候抛出的异常类。\n\n在以下代码中，一个名为 `IllegalChatServerException` 的类继承了 `RuntimeException`，并接受一个字符串作为构造函数的参数。当代码中指定事件发生时，将抛出该异常。\n\
  \nclass IllegalChatServerException extends RuntimeException {\n\nIllegalChatServerException(String\
  \ message) {\n\nsuper(message);\n\n}\n\n}\n\nprivate void disconnectChatServer(Object\
  \ chatServer) {\n\nif (chatServer == null) throw new IllegalChatServerException(\"\
  聊天服务器为空\");\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 异常与日志记录\n\
  \n解决方案 2\n\n创建一个继承 `java.lang.Exception` 的类，以生成一个受检异常类。受检异常必须被捕获或在调用栈中重新抛出。在以下示例中，一个名为\
  \ `ConnectionUnavailableException` 的类继承了 `java.lang.Exception`，并接受一个字符串作为构造函数的参数。该受检异常随后由代码中的方法抛出。\n\
  \nclass ConnectionUnavailableException extends Exception {\n\nConnectionUnavailableException(String\
  \ message) {\n\nsuper(message);\n\n}\n\n\n\n}\n\nprivate void sendChat(String chatMessage)\
  \ throws ConnectionUnavailableException {\n\nif (chatServer == null)\n\nthrow new\
  \ ConnectionUnavailableException(\"Can't find the chat server\");\n\n}\n\n工作原理\n\
  \n有时需要创建自定义异常，尤其是在开发 API 时。通常的建议是使用 JDK 提供的现有异常类。例如，使用 `IOException` 处理 IO 相关问题，或使用\
  \ `IllegalArgumentException` 处理非法参数。如果没有完全匹配的 JDK 异常，你可以随时继承 `java.lang.Exception`\
  \ 或 `java.lang.RuntimeException` 并实现自己的异常族。\n\n根据基类的不同，创建异常类相当直接。继承 `RuntimeException`\
  \ 允许你在任何时候抛出结果异常，而无需在调用栈中捕获它。这样做的好处是 `RuntimeException` 的契约更宽松，但如果异常未被捕获，抛出此类异常可能导致线程终止。而继承\
  \ `Exception` 则能强制任何抛出该异常的代码在 `catch` 子句中处理它。这种受检异常通过契约强制实现捕获处理器，从而可能避免线程终止。\n\n\
  在实践中，我们不鼓励继承 `RuntimeException`，因为这可能导致糟糕的异常处理。\n\n我们的经验法则是：如果异常有可能恢复，则应通过继承 `Exception`\
  \ 来创建相关的异常类。如果开发者无法合理地从异常中恢复（例如 `NullPointerException`），则继承 `RuntimeException`。\n\
  \n9-8\\. 重新抛出已捕获的异常\n\n问题\n\n你的应用程序包含一个多捕获异常，并且你想重新抛出一个之前捕获的异常。\n\n解决方案\n\n从 `catch`\
  \ 块中抛出异常，它将按捕获时的相同类型重新抛出。在以下示例中，异常在代码块中被捕获，并重新抛出给方法的调用者。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 异常与日志\n\nprivate void doSomeWork() throws IOException, InterruptedException\
  \ {\n\nLinkedBlockingQueue<String> queue = new LinkedBlockingQueue<>();\n\ntry {\n\
  \nFileOutputStream fos = new FileOutputStream(\"out.log\");\n\nDataOutputStream\
  \ dos = new DataOutputStream(fos);\n\nwhile (!queue.isEmpty()) {\n\ndos.writeUTF(queue.take());\n\
  \n}\n\n} catch (InterruptedException | IOException e ) {\n\ne.printStackTrace();\n\
  \nthrow e;\n\n}\n\n}\n\n工作原理\n\n可以简单地抛出之前捕获的异常，JVM 会将异常冒泡到适当的类型。请注意，如果抛出的是受检异常，它也必须在方法声明中定义。\n\
  \n9-9\\. 在应用程序中记录事件\n\n问题\n\n你想在应用程序中记录事件、调试消息、错误条件以及其他事件。\n\n解决方案\n\n在你的应用程序中使用\
  \ SLF4J 以及 Java 日志 API 来实现日志记录解决方案。以下示例首先创建一个名为 `recipeLogger` 的日志记录器对象。然后，该示例依次记录一条信息消息、一条警告消息和一条错误消息：\n\
  \nprivate void loadLoggingConfiguration() {\n\nFileInputStream ins = null;\n\ntry\
  \ {\n\nins = new FileInputStream(new File(\"logging.properties\"));\n\nLogManager.getLogManager().readConfiguration(ins);\n\
  \n} catch (IOException e) {\n\ne.printStackTrace();\n\n}\n\n}\n\nprivate void start()\
  \ {\n\nloadLoggingConfiguration();\n\nLogger logger = LoggerFactory.getLogger(\"\
  recipeLogger\");\n\nlogger.info(\"Logging for the first Time!\");\n\nlogger.warn(\"\
  A warning to be had\");\n\nlogger.error(\"This is an error!\");\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 异常与日志\n\n工作原理\n\n`loadLogConfiguration()` 函数打开一个指向 `logging.properties`\
  \ 文件的流，并将其传递给 `java.util.logging.LogManager()`。这样做会配置 `java.util.logging` 框架使用 `logging.properties`\
  \ 文件中指定的设置。然后，在配方的 `start` 方法中，代码获取一个名为 `recipeLogger` 的日志记录器对象。该示例随后通过 `recipeLogger`\
  \ 记录消息。有关实际日志参数的更多信息，请参见配方 9-10。\n\nSLF4J 使用简单的门面模式提供了一个通用 API，该模式抽象了底层的日志实现。SLF4J\
  \ 可以与大多数常见的日志框架一起使用，例如 Java 日志 API（`java.util.logging`）、Log4j、Jakarta Commons Logging\
  \ 等。在实践中，SLF4J 提供了选择（和切换）日志框架的灵活性，并允许使用 SLF4J 的项目快速集成到应用程序选定的日志框架中。\n\n要在应用程序中使用\
  \ SLF4J，请下载位于 [`www.slf4j.org/`](http://www.slf4j.org/) 的 SLF4J 二进制文件。下载后，解压内容并将\
  \ `slf4j-api-x.x.x.jar` 添加到项目中。这是包含 SLF4J API 的主要 `.jar` 文件（程序可以调用它来记录信息）。将 `slf4j-api-x.x.x.jar`\
  \ 文件添加到项目后，找到 `slf4j-jdk14-x.x.x.jar` 并将其添加到项目中。这第二个文件表明 SLF4J 将使用 `java.util.logging`\
  \ 类来记录信息。\n\nSLF4J 的工作方式是，在运行时 SLF4J 扫描类路径并选择第一个实现 SLF4J API 的 `.jar`。在示例中，找到了并加载了\
  \ `slf4j-jdk14-x.x.x.jar`。这个 `.jar` 代表原生的 Java 日志框架（称为 jdk.1.4 日志）。例如，如果你想使用另一个日志框架，请将\
  \ `slf4j-jdk14-x.x.x.jar` 替换为目标日志记录器对应的 SLF4J 实现。例如，要使用 Apache 的 Log4J 日志框架，请包含\
  \ `slf4j-log4j12-x.x.x.jar`。\n\nN **注意** `java.util.logging` 框架由属性日志文件配置。\n\n一旦配置好\
  \ SLF4J，你就可以通过调用 SLF4J 的日志记录方法在应用程序中记录信息。这些方法根据日志级别记录信息。然后可以使用日志级别来过滤实际记录的消息。按日志级别过滤消息的能力非常有用，因为可能会有大量信息或调试信息被记录。如果需要排查应用程序问题，可以更改日志级别，而无需更改任何代码，即可在日志中看到更多信息。通过级别过滤消息的能力被称为*设置日志级别*。每个日志框架引用都包含自己的配置文件，用于设置日志级别（以及其他内容，如日志文件名和日志文件配置）。在示例中，由于\
  \ SLF4J 使用 `java.util.logging` 框架进行日志记录，你需要配置 `java.util.logging` 属性以实现所需的日志记录。参见表\
  \ 9-1。\n\n**表 9-1.** *日志级别*\n\n**日志级别**\n\n**建议**\n\nTrace\n\n最不重要的日志事件\n\nDebug\n\
  \n用于有助于调试的额外信息\n\nInfo\n\n用于日常日志消息\n\nWarn\n\n用于可恢复的问题，或怀疑出现错误设置/非标准行为时\n\nError\n\
  \n用于异常、实际错误以及你真正需要了解的事情\n\nFatal\n\n最重要\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 异常与日志\n\nN **注意** 设置日志级别时，日志记录器将记录该级别及以下级别的消息。因此，如果日志配置将日志级别设置为 info，则会记录\
  \ Info、Warn、Error 和 Fatal 级别的消息。\n\n9-10\\. 日志轮转与清理\n\n问题\n\n你已经开始记录信息，但记录的信息持续增长，失去控制。你希望日志文件中只保留最近\
  \ 250KB 的日志条目。\n\n解决方案\n\n\n使用 SLF4J 与 java.util.logging 配置滚动日志。在此示例中，一个名为 recipeLogger\
  \ 的记录器用于记录多条消息。输出将生成滚动的日志文件，最新的日志信息保存在 important Log0.log 文件中。\n\nloadLoggingConfiguration();\n\
  \nLogger logger = LoggerFactory.getLogger(\"recipeLogger\");\n\nlogger.info(\"第一次记录日志！\"\
  );\n\nlogger.warn(\"一个需要发出的警告\");\n\nlogger.error(\"这是一个错误！\");\n\nLogger rollingLogger\
  \ = LoggerFactory.getLogger(\"rollingLogger\");\n\nfor (int i =0;i < 5000;i++) {\n\
  \nrollingLogger.info(\"记录事件日志，编号：\"+i);\n\n}\n\nlogging.properties 文件\n\nhandlers\
  \ = java.util.logging.FileHandler\n\nrecipeLogger.level=INFO\n\n.level=ALL\n\njava.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter\n\
  \njava.util.logging.FileHandler.pattern=importantLog%g.log\n\njava.util.logging.FileHandler.limit=50000\n\
  \njava.util.logging.FileHandler.count=4\n\n工作原理\n\n要控制日志文件的大小，请配置 java.util.logging\
  \ 框架并指定滚动日志文件。选择滚动日志文件选项后，最新信息将保存在 ImportantApplication0.log 中。较旧的信息将依次保存在 ImportantApplication1.log、ImportantApplication2.log\
  \ 等文件中。当 ImportantApplication0.log 填满您指定的限制（本例中为 50,000 字节）时，其文件名将轮转为 ImportantApplicationLog1.log，其他文件的名称也会相应向下轮转。要保留的日志文件数量由\
  \ java.util.logging.FileHandler.count 属性决定，在本示例中设置为 4。\n\nlogging.properties 文件首先定义了\
  \ java.util.logging 框架将使用的处理器。处理器是负责记录日志消息的对象。本示例中指定了 FileHandler，它将日志消息记录到文件中。其他可能的处理器包括\
  \ ConsoleHandler（记录到系统输出设备）、SocketHandler（记录到套接字）和 MemoryHandler（将日志保存在内存中的循环缓冲区中）。您还可以通过创建扩展\
  \ Handler 抽象类的类来指定自己的处理器实现。\n\n接下来，定义了日志级别。在日志框架中，存在独立记录器对象的概念。一个记录器可以携带不同的配置（例如，不同的日志级别），并且可以在日志文件中被识别。该示例将\
  \ recipeLogger 的级别配置为 INFO，而根记录器的级别为 ALL（在 java.util.logging 框架中，根记录器通过属性前没有任何前缀来表示）。\n\
  \nlogging.properties 文件的下一部分定义了 FileHandler 的配置。格式化器指示日志信息将如何写入磁盘。SimpleFormatter\
  \ 将信息以纯文本形式写入，包含一行日期和时间、一行日志级别以及要记录的消息。格式化器的另一个默认选项是 XMLFormatter，它将为每个日志事件创建包含日期、时间、记录器名称、级别、线程和消息信息的\
  \ XML 标记。您可以通过扩展 Formatter 抽象类来创建自定义格式化器。\n\n在格式化器之后，定义了 fileHandler 模式。这指定了日志文件的名称和位置（`%d`\
  \ 会被替换为滚动日志编号 [0 ~ 4]）。Limit 属性定义了日志在轮转前可以拥有的字节数（50,000 字节 ~ 50KB）。count 定义了要保留的日志文件的最大索引（在本示例中为\
  \ 4）。\n\n**注意** 日志记录可能开销很大；如果您记录大量信息，Java 程序将开始消耗内存（因为 java.util.logging 框架会尝试将所有需要写入磁盘的信息保留在内存中，直到可以刷新为止）。如果\
  \ java.util.logging 框架无法像创建日志条目那样快速地写入日志文件，您将遇到内存溢出错误。最佳方法是仅记录必要的信息，如果需要，在写出调试日志消息之前检查\
  \ Logger.isDebugEnabled()。日志级别可以从日志配置文件中更改。\n\n9-11. 记录异常\n\n从之前的示例中，您学习了如何捕获异常以及如何记录信息。本示例将把这两个示例结合起来。\n\
  \n问题\n\n您希望在日志文件中记录异常。\n\n解决方案\n\n配置您的应用程序以使用 SLF4J。利用 try/catch 块在错误日志中记录异常。在以下示例中，使用\
  \ SLF4J Logger 从异常处理程序中记录消息。\n\nstatic Logger rootLogger = LoggerFactory.getLogger(\"\
  \");\n\nprivate void start() {\n\nloadLoggingConfiguration();\n\nThread.setDefaultUncaughtExceptionHandler((Thread\
  \ t, Throwable e) -> {\n\nrootLogger.error(\"线程 \"+t+\" 中的错误由 \",e);\n\n});\n\n\
  int c = 20/0;\n\n}\n\nprivate void loadLoggingConfiguration() {\n\nFileInputStream\
  \ ins = null;\n\ntry {\n\nins = new FileInputStream(new File(\"logging.properties\"\
  ));\n\nLogManager.getLogManager().readConfiguration(ins);\n\n} catch (IOException\
  \ e) {\n\ne.printStackTrace();\n\n}\n\n}\n\n工作原理\n\n该示例演示了如何结合使用 UncaughtExceptionHandler\
  \ 和 SLF4J 将异常记录到日志文件中。记录异常时，最好包含显示异常抛出位置的堆栈跟踪。在示例中，一个线程包含一个 UncaughtExceptionHandler，它使用了一个包含记录器的\
  \ lambda 表达式。该记录器用于将任何捕获到的异常写入日志文件。\n\n**注意** 如果异常被重复抛出，JVM 往往会停止在 Exception 对象中填充堆栈跟踪。这是出于性能原因，因为检索相同的堆栈跟踪开销很大。如果发生这种情况，您将看到记录了一个没有堆栈跟踪的异常。此时，请检查日志的先前条目，看看是否抛出了相同的异常。如果之前抛出了相同的异常，完整的堆栈跟踪将出现在该异常的首次记录实例中。\n\
  \n**第 10 章**\n\n**并发**\n\n并发是现代计算机编程中最难处理的主题之一；理解并发需要抽象思考的能力，而调试并发问题就像试图通过航位推测法驾驶飞机。即便如此，随着\
  \ Java 的现代版本发布，编写无错误的并发代码已经变得更容易（也更易实现）。\n\n*并发*是程序同时执行不同（或相同）指令的能力。一个被称为并发的程序能够被拆分并在多个\
  \ CPU 上运行。通过编写并发程序，您可以充分利用当今的多核 CPU。即使在 I/O 密集型的单核 CPU 上，您也能看到好处。\n\n在本章中，我们将介绍并发任务最常见的需求——从运行后台任务到将计算拆分为工作单元。在本章中，您将找到在\
  \ Java 8 中实现并发的最新示例。\n\n10-1. 启动后台任务\n\n问题\n\n您有一个需要在主线程之外运行的任务。\n\n解决方案\n\n\n\n\
  创建一个类实现，其中包含需要在不同线程中运行的任务。在任务实现类中实现 `Runnable` 接口，并启动一个新的 `Thread`。在以下示例中，使用一个计数器来模拟活动，因为一个独立的任务在后台运行。\n\
  \n**注意** 本示例中的代码可以重构为使用方法引用（参见第 6 章），而不是为新的 `Thread` 实现创建内部类。但为了清晰起见，这里展示了匿名内部类。\n\
  \n```java\nprivate void someMethod() {\n\n    Thread backgroundThread = new Thread(new\
  \ Runnable() {\n\n        public void run() {\n\n            doSomethingInBackground();\n\
  \n        }\n\n    },\"Background Thread\");\n\n    System.out.println(\"Start\"\
  );\n\n    backgroundThread.start();\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n    // 第 10 章 并发\n\n    for (int i= 0;i < 10;i++) {\n\n        System.out.println(Thread.currentThread().getName()+\"\
  : is counting \"+i);\n\n    }\n\n    System.out.println(\"Done\");\n\n}\n\nprivate\
  \ void doSomethingInBackground() {\n\n    System.out.println(Thread.currentThread().getName()+\n\
  \n            \": is Running in the background\");\n\n}\n```\n\n如果代码被执行多次，每次的输出结果都会不同。后台线程会独立执行，因此其消息在每次运行时打印的时间点也不同。\n\
  \n如果你使用 lambda 表达式，创建后台线程的相同代码可以写成如下形式：`Thread backgroundThread = new Thread(this::doSomethingInBackground,\
  \ \"Background Thread\");`\n\n**工作原理**\n\n`Thread` 类允许在与当前线程不同的新线程（执行路径）中执行代码。`Thread`\
  \ 构造函数需要一个实现了 `Runnable` 接口的类作为参数。`Runnable` 接口只需要实现一个方法：`public void run()`。因此，它是一个函数式接口，这便于使用\
  \ lambda 表达式。当调用 `Thread.start()` 方法时，它会创建新线程并调用 `Runnable` 的 `run()` 方法。\n\n在 JVM\
  \ 中有两种类型的线程：用户线程和守护线程。用户线程会一直执行直到其 `run()` 方法完成，而守护线程在应用程序需要退出时可以被终止。如果 JVM 中只运行着守护线程，应用程序就会退出。当你开始创建多线程应用程序时，必须了解这些区别，并理解何时使用每种类型的线程。\n\
  \n通常，守护线程的 `Runnable` 接口不会完成；例如一个 `while (true)` 循环。这使得这些线程能够在程序运行期间定期检查或执行某个条件，并在程序执行完毕时被丢弃。相比之下，用户线程在存活时会执行并阻止程序终止。如果你碰巧有一个程序没有按预期关闭和/或退出，你可能需要检查正在活跃运行的线程。\n\
  \n要将线程设置为守护线程，请在调用 `thread.start()` 方法之前使用 `thread.setDaemon(true)`。\n\n默认情况下，`Thread`\
  \ 实例被创建为用户线程类型。\n\n**注意** 本技巧展示了创建和执行新线程的最简单方法。创建的新线程是一个用户线程，这意味着应用程序将不会退出，直到主线程和后台线程都执行完毕。\n\
  \n### 10-2. 更新（并迭代）Map\n\n**问题**\n\n你需要从多个线程更新一个 `Map` 对象，并且希望确保更新不会破坏 `Map` 对象的内容，且\
  \ `Map` 对象始终处于一致状态。你还希望在其它线程更新 `Map` 对象的同时遍历（查看）其内容。\n\n**解决方案**\n\n使用 `ConcurrentMap`\
  \ 来更新 `Map` 条目。以下示例创建了 1000 个线程。每个线程随后尝试同时修改 `Map`。主线程等待一秒钟，然后开始迭代 `Map`（即使其它线程仍在修改\
  \ `Map`）：\n\n```java\nSet<Thread> updateThreads = new HashSet<>();\n\nprivate void\
  \ start() {\n\n    ConcurrentMap<Integer,String> concurrentMap = new ConcurrentHashMap<>();\n\
  \n    for (int i =0;i < 1000;i++) {\n\n        startUpdateThread(i, concurrentMap);\n\
  \n    }\n\n    try {\n\n        Thread.sleep(1000);\n\n    } catch (InterruptedException\
  \ e) {\n\n        e.printStackTrace();\n\n    }\n\n    concurrentMap.entrySet().stream().forEach((entry)\
  \ -> {\n\n        System.out.println(\"Key :\"+entry.getKey()+\" Value:\"+entry.getValue());\n\
  \n    });\n\n    updateThreads.stream().forEach((thread) -> {\n\n        thread.interrupt();\n\
  \n    });\n\n}\n\nRandom random = new Random();\n\nprivate void startUpdateThread(int\
  \ i, final ConcurrentMap<Integer, String> concurrentMap) {\n\n    Thread thread\
  \ = new Thread(() -> {\n\n        while (!Thread.interrupted()) {\n\n          \
  \  int randomInt = random.nextInt(20);\n\n            concurrentMap.put(randomInt,\
  \ UUID.randomUUID().toString());\n\n        }\n\n    });\n\n    thread.setName(\"\
  Update Thread \"+i);\n\n    updateThreads.add(thread);\n\n    thread.start();\n\n\
  }\n```\n\n**工作原理**\n\n为了以并发方式对 `HashTable` 执行操作，`ConcurrentHashMap` 允许多个线程并发且安全地修改\
  \ `HashTable`。`ConcurrentHashMap` 是一个支持完全并发检索和高并发更新的 `HashTable`。在示例中，1000 个线程在短时间内对\
  \ `Map` 进行了修改。`ConcurrentHashMap` 的迭代器，以及基于 `ConcurrentHashMap` 生成的流，允许安全地迭代其内容。当使用\
  \ `ConcurrentMap` 的迭代器时，你无需担心在迭代过程中锁定 `ConcurrentMap` 的内容（并且它不会抛出 `ConcurrentModificationExceptions`）。\n\
  \n有关新增方法的完整列表，请参考在线文档：\n\n[`docs.oracle.com/javase/8/docs/api/java/util/concurrent/ConcurrentHashMap.html`](http://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ConcurrentHashMap.html)\n\
  \n**注意** `ConcurrentMap` 迭代器虽然是线程安全的，但并不保证你能看到迭代器创建之后添加/更新的条目。\n\n### 10-3. 仅当键不存在时才向\
  \ Map 中插入键\n\n**问题**\n\n你应用程序中的 `Map` 正在被持续更新，并且你需要在键不存在时向其中放入一个键/值对。因此，你需要检查键是否存在，并且需要确保在此期间没有其它线程插入相同的键。\n\
  \n**解决方案**\n\n使用 `ConcurrentMap.putIfAbsent()` 方法，你可以原子性地判断 `Map` 是否被修改。\n\n例如，以下代码使用该方法在单一步骤中完成检查和插入，从而避免了并发问题：\n\
  \n```java\nprivate void start() {\n\n    ConcurrentMap<Integer, String> concurrentMap\
  \ = new ConcurrentHashMap<>(); \n    for (int i = 0; i < 100; i++) {\n\n       \
  \ startUpdateThread(i, concurrentMap);\n\n    }\n\n    try {\n\n        Thread.sleep(1000);\n\
  \n    } catch (InterruptedException e) {\n\n        e.printStackTrace();\n\n   \
  \ }\n\n    concurrentMap.entrySet().stream().forEach((entry) -> {\n\n        System.out.println(\"\
  Key :\" + entry.getKey() + \" Value:\" + entry.getValue());\n\n    });\n\n}\n\n\
  Random random = new Random();\n\nprivate void startUpdateThread(final int i, final\
  \ ConcurrentMap<Integer, String> concurrentMap) {\n\n    Thread thread = new Thread(()\
  \ -> {\n\n        int randomInt = random.nextInt(20);\n\n        String previousEntry\
  \ = concurrentMap.putIfAbsent(randomInt, \"Thread # \" + i +\n\n               \
  \ \" has made it!\");\n\n        if (previousEntry != null) {\n\n            System.out.println(\"\
  Thread # \" + i + \" tried to update it but guess what, we're too late!\");\n\n\
  \        } else {\n\n            System.out.println(\"Thread # \" + i + \" has made\
  \ it!\");\n\n        }\n\n    });\n\n    thread.start();\n\n}\n```\n\n运行程序时，一些条目会被成功插入，而另一些则不会，因为该键已被其它线程插入。\n\
  \n**工作原理**\n\n\n\n并发更新 Map 是一项困难的任务，因为它涉及两种操作：一种*检查后执行*类型的操作。首先，必须检查 Map 中是否已存在某个条目。如果条目不存在，则可以将键和值放入\
  \ Map。另一方面，如果键已存在，则检索该键对应的值。为此，我们使用 ConcurrentMap 的 `putIfAbsent` 原子操作。这确保了要么键已存在因此值不会被覆盖，要么键不存在因此值被设置。对于\
  \ ConcurrentMap 的 JDK 实现，如果键没有值，`putIfAbsent()` 方法将返回 `null`；如果键有值，则返回当前值。通过断言 `putIfAbsent()`\
  \ 方法返回 `null`，你可以确信操作成功，并且已在 map 中创建了一个新条目。\n\n在某些情况下，执行 `putIfAbsent()` 可能效率不高。例如，如果结果是一个大型数据库查询，每次都执行数据库查询然后调用\
  \ `putIfAbsent()` 将不会高效。\n\n在这种情况下，你可以首先调用 map 的 `containsKey()` 方法来确保键不存在。\n\n\
  如果键不存在，则使用昂贵的数据库查询调用 `putIfAbsent()`。虽然存在 `putIfAbsent()` 可能没有放入条目的可能性，但这种检查减少了潜在昂贵值创建的次数。\n\
  \n请参阅以下代码片段：\n\n```java\nkeyPresent = concurrentMap.containsKey(randomInt);\n\n\
  if (!keyPresent) {\n\nconcurrentMap.putIfAbsent(randomInt, \"Thread # \" + i + \"\
  \ has made it!\");\n\n}\n```\n\n在这段代码中，第一个操作是检查键是否已存在于 map 中。如果存在，则不执行 `putIfAbsent()`\
  \ 操作。如果键不存在，我们可以继续执行 `putIfAbsent()` 操作。\n\n如果你从不同的线程访问 map 的值，应确保这些值是线程安全的。当使用集合作为值时，这一点最为明显，因为它们可能被不同的线程访问。确保主\
  \ map 是线程安全的将防止对 map 的并发修改。\n\n然而，一旦你获得了对 map 值的访问权限，就必须围绕 map 的值遵循良好的并发实践。\n\n\
  **注意**\n\nN\n\nConcurrentMap 不允许空键，这与其非线程安全的同类 HashMap（允许空键）不同。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 N 并发\n\n10-4. 遍历一个不断变化的集合\n\n问题\n\n你需要遍历集合中的每个元素。然而，其他线程在不断地更新该集合。\n\n\
  解决方案 1\n\n通过使用 `CopyOnWriteArrayList`，你可以安全地遍历集合，而无需担心并发问题。\n\n在以下解决方案中，`startUpdatingThread()`\
  \ 方法创建了一个新线程，该线程会主动更改传递给它的列表。当 `startUpdatingThread()` 修改列表时，同时使用流的 `forEach()`\
  \ 函数对其进行并发迭代。\n\n```java\nprivate void copyOnWriteSolution() {\n\nCopyOnWriteArrayList<String>\
  \ list = new CopyOnWriteArrayList<String>();\n\nstartUpdatingThread(list);\n\nlist.stream().forEach((element)\
  \ -> {\n\nSystem.out.println(\"Element :\" + element);\n\n});\n\nstopUpdatingThread();\n\
  \n}\n```\n\n解决方案 2\n\n使用 `synchronizedList()` 允许我们原子地更改集合。此外，`synchronizedList()`\
  \ 提供了一种在遍历集合（在流中完成）时安全地同步该列表的方法。例如：\n\n```java\nprivate void synchronizedListSolution()\
  \ {\n\nfinal List<String> list = Collections.synchronizedList(new ArrayList<String>());\
  \ startUpdatingThread(list);\n\nsynchronized (list) {\n\nlist.stream().forEach((element)\
  \ -> {\n\nSystem.out.println(\"Element :\" + element);\n\n});\n\n}\n\nstopUpdatingThread();\n\
  \n}\n```\n\n工作原理\n\nJava 提供了许多并发集合选项。选择哪个集合取决于在应用程序上下文中读取操作与写入操作的比较。如果写入操作相对于读取操作发生得很少且间隔很长，那么使用\
  \ `CopyOnWriteArrayList` 实例是最有效的，因为它不会*阻塞*（停止）其他线程读取列表，并且遍历它是线程安全的（遍历时不会抛出 `ConcurrentModificationException`）。如果写入和读取的次数相同，那么使用\
  \ `SynchronizedList` 是首选。\n\n在解决方案 1 中，`CopyOnWriteArrayList` 在你遍历列表时被更新。由于该方案使用了\
  \ `CopyOnWriteArrayList` 实例，因此在遍历集合时（如本方案中使用流所做的那样）无需担心线程安全问题。值得注意的是，`CopyOnWriteArrayList`\
  \ 在遍历时提供了一个时间点的快照。如果在遍历列表时另一个线程修改了列表，那么在遍历时可能看不到修改后的列表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 N 并发\n\nN **注意** 正确锁定取决于所使用的集合类型。任何通过使用 `Collections.synchronized` 返回的集合都可以通过集合本身进行锁定（`synchronized\
  \ (collectionInstance)`）。然而，一些更高效（较新）的并发集合，如 `ConcurrentMap`，不能以这种方式使用，因为它们的内部实现不会在对象本身上锁定。\n\
  \n解决方案 2 创建了一个同步列表，该列表是通过使用 `Collections` 辅助类创建的。`Collections.synchronizedList()`\
  \ 方法将一个 `List` 对象（可以是 `ArrayList`、`LinkedList` 或其他 `List` 实现者）包装成一个同步列表操作的列表。每次你需要遍历一个列表（无论是使用流、for\
  \ 循环还是迭代器）时，都必须注意该列表迭代器的并发影响。\n\n`CopyOnWriteArrayList` 可以安全地遍历（如 Javadoc 中所述），但\
  \ `synchronizedList` 的迭代器必须手动同步（也在 `Collections.synchronizedlist.list iterator`\
  \ 的 Javadoc 中指定）。在解决方案中，在 `synchronized(list)` 块内部可以安全地遍历列表。当在列表上同步时，在 `synchronized(list)`\
  \ 块完成之前，不能发生任何读取/更新/其他迭代操作。\n\n10-5. 协调不同的集合\n\n问题\n\n你需要同时修改不同但相关的集合，并且希望确保在其他线程看到这些修改之前，修改已经完成。\n\
  \n解决方案 1\n\n通过在主集合上进行同步，你可以保证该集合可以同时被更新。\n\n在以下示例中，`fulfillOrder` 方法需要检查要履行的订单的库存，如果有足够的库存来履行订单，则需要将订单添加到\
  \ `customerOrders` 列表中。`fulfillOrder()` 方法在 `inventoryMap` 上同步，并在完成同步块之前修改 `inventoryMap`\
  \ 和 `customerOrders` 列表。\n\n```java\nprivate boolean fulfillOrder(String itemOrdered,\
  \ int quantityOrdered, String customerName) {\n\nsynchronized (inventoryMap) {\n\
