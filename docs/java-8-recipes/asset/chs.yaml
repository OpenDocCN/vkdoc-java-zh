  \n第 14 章 N JAVAFX 基础\n\n工作原理\n\n在 JavaFX 8 之前的版本中，没有用于打印应用程序舞台部分内容的标准 API。在 JavaFX\
  \ 8 中，新增了一个打印 API，用于标准化打印功能的处理方式。该 API 还使得仅用少量代码即可为应用程序启用打印功能变得简单。该 API 相当庞大，包含多个类，但使用起来非常直观且易于上手。\n\
  \n要为指定节点启用打印功能，首先需要使用 `javafx.print.PrinterJob` 类，因为它包含了生成一个非常简单的打印任务所需的所有功能。要将节点发送到系统默认打印机，只需调用\
  \ `PrintJob.createPrinterJob()` 来返回一个 `PrinterJob` 对象。返回该对象后，检查其是否不为 null，然后调用其\
  \ `printPage()` 方法，并传入要打印的节点。包含此功能的解决方案代码片段如下所示：public void print(final Node node,\
  \ Printer printer) {\n\nPrinterJob job = PrinterJob.createPrinterJob()\n\njob.setPrinter(printer);\n\
  \nif (job != null) {\n\nboolean success = job.printPage(node);\n\nif (success) {\n\
  \njob.endJob();\n\n}\n\n}\n\n}\n\n虽然使用 `PrinterJob` 即可将节点发送到打印机，但该 API 还允许进行更多自定义设置。表\
  \ 14-3 列出了 API 中可用的不同类，并简要说明了它们的功能。\n\n**表 14-3.** *JavaFX 打印 API*\n\n**类名**\n\n\
  **描述**\n\nJobSettings\n\n封装打印作业的设置\n\nPageLayout\n\n封装布局设置\n\nPrintRange\n\n用于选择打印范围或约束打印页面\n\
  \nPaper\n\n封装打印机的纸张尺寸\n\nPaperSource\n\n用于纸张的进纸托盘\n\nPrinter\n\n表示打印作业的目标设备\n\n\
  PrinterAttributes\n\n封装打印机的属性\n\nPrinterJob\n\n用于调用 JavaFX 场景图打印\n\nPrintResolution\n\
  \n表示支持的设备分辨率\n\n\n\n在示例中，生成了一个打印对话框，允许用户选择将打印作业发送到何处。它还提供了用于选择所需打印布局（纵向或横向）的控件。可以调用\
  \ `Printer.getDefaultPrinter()` 方法返回主机的默认打印机。在示例中，通过调用 `Printer.getAllPrinters()`\
  \ 方法，使用 `ChoiceBox` 显示主机上所有可用的打印机。然后，在 `print` 方法中，将选定的打印机设置到 `PrinterJob` 上，该方法将所需的节点发送到该打印机。\n\
