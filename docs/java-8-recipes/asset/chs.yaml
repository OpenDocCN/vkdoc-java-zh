  \n**第 2 章**\n\n**Java 8 的新特性**\n\nJava 8 引入了大量新特性，使其成为多年来 Java 最重要的版本之一。本章涵盖了 Java\
  \ 8 的一些新特性，并提供了每个特性的简短示例。这些示例旨在简要概述 Java 8 中的一些新特性，并帮助你快速上手使用它们。这绝不是 Java 8 中引入的新特性的完整列表，而是对本书后续内容的一个预览。在每个示例的末尾，你会被引导至本书中的相应章节或其他资源，以获取更详细的信息。\n\
  \nJava 语言增强\n\nJava 8 的发布为语言引入了许多新特性，使其更高效、更易于管理、更有效率。本节通过一系列示例介绍了其中一些新特性。\n\n2-1.\
  \ 将功能作为方法参数传递\n\n问题\n\n你想为 JavaFX 按钮编写一个动作，而不生成匿名内部类。\n\n解决方案\n\n利用 lambda 表达式，使用紧凑的内联语法来整合动作功能。以下\
  \ JavaFX 应用程序包含一个按钮，该按钮使用 lambda 表达式来封装按钮的功能，而不是使用匿名内部类。\n\npublic class Recipe_02_01\
