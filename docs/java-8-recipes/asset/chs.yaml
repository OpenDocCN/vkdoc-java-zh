  \n3. 复制浏览器地址栏中 URL 末尾的数字。这就是该位置的 WOEID。\n\n4. 将 WOEID 插入到 [`weather.yahooapis.com/forecastrss?w=WOEID&u=f.`](http://weather.yahooapis.com/forecastrss?w=WOEID&u=f)\n\
