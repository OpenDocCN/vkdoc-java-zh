  \n总结\n\nXML 通常用于在不同应用程序之间传输数据，或将某种数据存储到文件中。因此，了解在应用程序开发平台中处理 XML 的基础知识至关重要。本章概述了如何使用\
  \ Java 执行一些关键的 XML 处理任务。\n\n本章从编写和读取 XML 的基础知识入手，随后演示了如何将 XML 转换为不同格式，以及如何根据 XML\
  \ 模式进行验证。最后，本章详细介绍了如何在应用程序中使用 XML 数据执行各种任务。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 21 章**\n\n**网络**\n\n如今，编写一个完全不通过互联网进行通信的应用程序已十分罕见。从向另一台机器发送数据，到从远程网页抓取信息，网络在现代计算世界中扮演着不可或缺的角色。Java\
  \ 利用新 I/O（NIO）和 Java 平台更多新 I/O 特性（NIO.2）API，使得网络通信变得轻而易举。Java SE 7 包含了一些新特性，使得多播等操作更加便捷。随着这些新特性的加入，Java\
  \ 平台提供了丰富的编程接口来帮助完成网络任务。\n\n本章不会试图涵盖 Java 语言中所有的网络特性，因为该主题相当庞大。但它确实提供了一些对广大开发者最为实用的技巧。您将了解一些标准的网络概念（如套接字），以及\
  \ Java 语言最新版本中引入的一些较新概念。如果您觉得本章内容有趣，并希望了解更多关于 Java 网络的知识，可以在网上找到大量资源。或许学习更多知识的最佳去处是\
  \ Oracle 文档，网址为[`download.oracle.com/javase/tutorial/networking/index.html`](http://download.oracle.com/javase/tutorial/networking/index.html)。\n\
  \n21-1\\. 在服务器端监听连接\n\n问题\n\n您希望创建一个服务器应用程序，用于监听来自远程客户端的连接。\n\n解决方案\n\n搭建一个服务器端应用程序，利用`java.net.ServerSocket`在指定端口上监听请求。以下\
  \ Java 类代表一个部署在服务器上的典型应用，它在端口 1234 上监听传入请求。当收到请求时，传入的消息会打印到命令行，并向客户端发送响应。\n\nimport\
  \ java.io.BufferedReader;\n\nimport java.io.IOException;\n\nimport java.io.InputStreamReader;\n\
  \nimport java.io.PrintWriter;\n\nimport java.net.ServerSocket;\n\nimport java.net.Socket;\n\
  \npublic class SocketServer {\n\npublic static void main(String a[]) {\n\nfinal\
  \ int httpd = 1234;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 21\
  \ 章 N 网络\n\nServerSocket ssock = null;\n\ntry {\n\nssock = new ServerSocket(httpd);\n\
  \nSystem.out.println(\"已在本地打开端口 1234\");\n\nSocket sock = ssock.accept();\n\nSystem.out.println(\"\
  客户端已建立套接字连接\");\n\ncommunicateWithClient(sock);\n\nSystem.out.println(\"正在关闭套接字\"\
  );\n\n} catch (Exception e) {\n\nSystem.out.println(e);\n\n} finally {\n\ntry{\n\
  \nssock.close();\n\n} catch (IOException ex) {\n\nSystem.out.println(ex);\n\n}\n\
  \n}\n\n}\n\npublic static void communicateWithClient(Socket socket) {\n\nBufferedReader\
  \ in = null;\n\nPrintWriter out = null;\n\ntry {\n\nin = new BufferedReader(\n\n\
  new InputStreamReader(socket.getInputStream()));\n\nout = new PrintWriter(\n\nsocket.getOutputStream(),\
  \ true);\n\nString s = null;\n\nout.println(\"服务器已收到通信！\");\n\nwhile ((s = in.readLine())\
  \ != null) {\n\nSystem.out.println(\"从客户端收到: \" + s);\n\nout.flush();\n\nbreak;\n\
  \n}\n\n} catch (Exception e) {\n\ne.printStackTrace();\n\n} finally {\n\ntry {\n\
  \nin.close();\n\nout.close();\n\n} catch (IOException ex) {\n\nex.printStackTrace();\n\
  \n}\n\n}\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 21 章\
  \ N 网络\n\n运行此程序以及食谱 21-2 中构建的客户端，将得到来自`SocketServer`的以下输出：\n\n已在本地打开端口 1234\n\n\
  客户端已建立套接字连接\n\n从客户端收到: Here is a test.\n\n正在关闭套接字\n\nN **注意** 要使这两个食谱协同工作，请先启动`SocketServer`程序，以便客户端能够使用服务器程序中打开的端口创建套接字。`SocketServer`启动后，再启动`SocketClient`程序，即可看到两者协同工作。\n\
  \nN **警告** 此`SocketServer`程序会在您的机器上打开一个端口（1234）。请确保您的机器上已运行防火墙；否则，您将向所有人开放端口 1234。这可能导致您的机器受到攻击。开放端口会为攻击者入侵机器创造漏洞，就像在房子里留了一扇门。请注意，本食谱中的示例攻击面很小，因为服务器只运行一次，并且在会话关闭前只会打印来自客户端的一条消息。\n\
  \n工作原理\n\n\n\n服务器应用程序可用于通过一个或多个客户端应用程序的直接通信，在服务器上执行工作。客户端应用程序通常与服务器应用程序通信，向服务器发送消息或数据以供处理，然后断开连接。服务器应用程序通常监听客户端应用程序，并在接收并接受连接后，针对客户端请求执行某些处理。为了使客户端应用程序能够连接到服务器应用程序，服务器应用程序必须监听连接并以某种方式处理它们。你不能简单地针对任意给定的主机和端口号组合运行客户端，因为这样做很可能会导致连接被拒绝。服务器端应用程序必须做三件事：打开一个端口，接受并建立客户端连接，然后以某种方式与客户端连接进行通信。在本方案的解决方案中，`SocketServer`\
  \ 类完成了这三件事。\n\n从 `main()` 方法开始，该类首先在端口 1234 上打开一个新的套接字。这是通过创建 `ServerSocket` 的新实例并向其传递一个端口号来完成的。该端口号不得与服务器上当前正在使用的任何其他端口冲突。需要注意的是，低于\
  \ 1024 的端口通常保留给操作系统使用，因此请选择高于该范围的端口号。如果你尝试打开一个已被占用的端口，`ServerSocket` 将无法成功创建，程序将失败。接下来，调用\
  \ `ServerSocket` 对象的 `accept()` 方法，该方法返回一个新的 `Socket` 对象。在客户端尝试连接到已设置端口上的服务器程序之前，调用\
  \ `accept()` 方法不会执行任何操作。`accept()` 方法将空闲等待，直到有连接请求，然后返回绑定到 `ServerSocket` 所设置端口的新\
  \ `Socket` 对象。此套接字还包含尝试连接的客户端的远程端口和主机名，因此它包含两个端点的信息，并唯一标识了 TCP 连接。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 21 章 网络编程\n\n此时，服务器程序可以与客户端程序通信，它使用 `PrintWriter` 和 `BufferedReader` 对象来实现。在本方案的解决方案中，`communicateWithClient()`\
  \ 方法包含了接受来自客户端程序的消息、向客户端发送消息以及将控制权返回给关闭 `ServerSocket` 的 `main()` 方法所需的所有代码。可以通过使用套接字的输入流生成一个新的\
  \ `InputStreamReader` 实例来创建新的 `BufferedReader` 对象。类似地，可以使用套接字的输出流创建新的 `PrintWriter`\
  \ 对象。请注意，此代码必须包装在 `try-catch` 块中，以防这些对象未能成功创建。\n\n```java\nin = new BufferedReader(new\
  \ InputStreamReader(socket.getInputStream()));\nout = new PrintWriter(socket.getOutputStream(),\
  \ true);\n```\n\n一旦这些对象成功创建，服务器就可以与客户端通信。它使用一个循环来实现，从 `BufferedReader` 对象（客户端输入流）读取数据，并使用\
  \ `PrintWriter` 对象向客户端发送消息。在本方案的解决方案中，服务器通过发出 `break` 来关闭连接，这会导致循环结束。然后控制权返回给 `main()`\
  \ 方法。\n\n```java\nout.println(\"Server received communication!\");\nwhile ((s =\
  \ in.readLine()) != null) {\n    System.out.println(\"received from client: \" +\
  \ s);\n    out.flush();\n    break;\n}\n```\n\n在真实的服务器程序中，服务器很可能会无限期地监听，而不会使用 `break`\
  \ 来结束通信。为了处理多个并发客户端，每个客户端连接都会产生一个单独的 `Thread` 来处理通信。服务器也会对客户端通信做一些有用的事情。对于 HTML\
  \ 服务器，它会向客户端发回一条 HTML 消息。在 SMTP 服务器上，客户端会向服务器发送一封电子邮件，然后服务器处理该电子邮件并将其发送出去。套接字通信几乎用于任何\
  \ TCP 传输，客户端和服务器都会创建新的套接字以成功进行通信。\n\n**21-2. 定义到服务器的网络连接**\n\n**问题**\n\n你需要建立到远程服务器的连接。\n\
