  \ Lambda 表达式的简化变体，称为方法引用。如果一个类包含一个派生自函数式接口实现的方法，那么该方法可以被获取或“捕获”，并赋值给一个变量以供后续使用。其概念在于，该方法包含的功能可以赋值给一个与函数式接口类型相同的变量。\n\
  \n在本示例中，一个标识为 `Volume` 的函数式接口包含一个名为 `calculateVolume()` 的抽象方法。`PoolCalculator` 类实现了\
  \ `Volume` 接口，因为它包含了 `calculateVolume()` 方法的实现。要通过方法引用来捕获此方法，你可以在 `PoolCalculator`\
  \ 类的实例上使用以下语法：\n\npoolCalculator::calculateVolume\n\n双冒号运算符用于表示方法引用。在此示例中，使用的是对特定对象的实例方法的引用。然而，方法引用有多种类型；要了解更多信息，请参阅第\
  \ 6 章。\n\n2-3. 在接口中提供默认方法实现\n\n问题\n\n你希望向现有接口添加一个新方法，同时不破坏与其他代码的向后兼容性。\n\n解决方案\n\
  \n在接口内部开发一个默认方法（也称为 *defender* 方法），这样任何实现该接口的类都无需提供新方法的实现。为此，请在接口声明中添加新的 `default`\
  \ 关键字，并提供方法实现。以下 `Volume` 接口包含 `calculateVolume` 方法的默认实现：\n\npublic interface Volume\
  \ {\n\n/**\n\n* 根据深度值和测量值计算游泳池体积。对于\n\n* 深度可变的游泳池，minDepth 应为 depthValues[0]，\n\n\
  * maxDepth 应作为 depthValues[1] 传入。\n\n*\n\n* 此接口可以接受多个测量值，但它期望\n\n* measurementValues[0]\
  \ == length，或 measurementValues[0] == radius\n\n\n\n* `measurementValues[1] == width`\n\
  \n* @param depthValues\n\n* @param measurementValues\n\n* @return\n\n*/\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 Java 8 的新特性\n\ndefault double calculateVolume(Double[] depthValues, Double[]\
  \ measurementValues) {\n\ndouble length, width, radius, minDepth, maxDepth, avgDepth\
  \ = 0;\n\nif(depthValues.length > 1){\n\nminDepth = depthValues[0];\n\nmaxDepth\
  \ = depthValues[1];\n\navgDepth = (minDepth + maxDepth)/2;\n\n} else if (depthValues.length\
  \ == 1){\n\navgDepth = depthValues[0];\n\n}\n\nif(measurementValues.length > 1){\n\
  \nlength = measurementValues[0];\n\nwidth = measurementValues[1];\n\nradius = 0;\n\
  \n} else {\n\nlength = 0;\n\nwidth = 0;\n\nradius = measurementValues[0];\n\n}\n\
  \nif (radius == 0){\n\nreturn length * width * avgDepth;\n\n} else {\n\nreturn (radius\
  \ * radius) * 3.14 * avgDepth;\n\n}\n\n};\n\n}\n\n任何实现此接口的类现在都可以使用这个默认方法实现，或者提供自己的实现，这与抽象类非常相似。\n\
  \n工作原理\n\n标准的 Java 接口由不包含方法体的方法声明组成。类实现 Java 接口，并在此过程中为接口的方法声明提供实现。Java 接口是面向对象的重要组成部分，因为它们抽象了实现细节，并提供了一个扩展功能的外观。在\
  \ Java 8 中，接口已被修改以允许默认方法实现。默认方法是一个包含声明和实现的方法，并通过在声明前添加 `default` 关键字来表示。\n\n任何扩展了包含默认方法的接口的类，都可以选择实现并覆盖默认实现，或者直接使用默认实现。\n\
  \n你可能会想，为什么 Java 8 要提供这个功能？为什么不直接使用抽象类，而是使用默认方法？添加默认方法是为了提供一种在不破坏向后兼容性的情况下修改接口的方式。许多接口需要修改以适应\
  \ Java 8 API 的更新，而这样做可能会破坏为早期 Java 版本编写的代码的功能。通过向接口添加默认方法，工程师们能够在现有接口中添加新功能，同时不破坏依赖这些接口的代码。要了解更多关于默认方法的信息，请参考配方\
  \ 5-7。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 2 章 Java 8 的新特性\n\
  \n2-4. 在声明或类型使用中多次应用同一注解\n\n问题\n\n你希望多次将同一注解应用于指定的声明或类型。\n\n解决方案\n\n只要每个注解都被标记为\
  \ `@Repeatable`，就可以多次将同一注解应用于声明或类型。在以下代码中，`@Repeatable` 注解被用于开发一个可重复的注解，而不是像 Java\
  \ 早期版本那样将它们组合在一起。在此场景中，创建了一个名为 `Role` 的注解，它将用于表示被注解的类或方法的角色。\n\n@Repeatable(value=Roles.class)\n\
  \npublic @interface Role {\n\nString name() default \"AUTHOR\";\n\n}\n\n当 `Role`\
  \ 注解在同一个声明上被多次使用时，它会使用 `Roles` 注解。`Roles` 注解简单地生成一个 `Role` 注解数组。`Roles` 的代码如下：public\
  \ @interface Roles {\n\nRole[] value();\n\n}\n\n现在，如果你想为某个特定方法分配两个不同的角色，可以使用以下语法：\n\
  \n@Role(name=\"AUTHOR\")\n\n@Role(name=\"REVIEWER\")\n\npublic void assignWork(){\n\
  \n...\n\n}\n\n工作原理\n\n重复注解是 Java 8 一个便捷的新特性，因为它允许你将一个注解的多个版本分配给单个字段、方法或类。要在早期版本中执行相同的赋值，你必须将两个\
  \ `@Role` 注解包含在一个 `@Roles` 组中，如下所示：\n\n@Roles({\n\n@Role(name=\"AUTHOR\"),\n\n@Role(name=\"\
  REVIEWER\")\n\n)}\n\n\n\n要创建可重复的注解，必须定义一个包含字段的容器注解，该字段用于保存注解的多个实例。在示例中，`Roles` 注解用于在可重复场景下保存多个\
  \ `Role` 注解。每个 `Role` 注解都会被添加到 `Roles` 注解中声明的 `Role[]` 数组中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 Java 8 的新特性\n\n日期时间 API\n\nJava 8 引入了一套新的日期时间 API，该 API 是根据 JSR 310 规范开发的。日期时间\
  \ API 默认使用 ISO-8601 中定义的日历。因此，该日历基于公历系统，在本章中，你将学习如何处理日期、时间和时区数据。日期时间 API 遵循多项设计原则，力求清晰、流畅、不可变且可扩展。该\
  \ API 使用简洁且定义明确的语言。同时，它也非常流畅，因此处理日期时间数据的代码易于阅读和理解。\n\n以下介绍提供了几个新 API 的简短示例，帮助你快速入门。要更详细地了解该\
  \ API，请参考第 4 章。\n\n2-5. 获取当前日期和时间\n\n问题\n\n你希望获取当前日期和时间，以便在应用程序中使用。\n\n解决方案\n\n\
  利用新的日期时间 API 来获取当前日期和时间。以下代码演示了如何实现。\n\nLocalDate localDate = LocalDate.now();\n\
  \nLocalTime localTime = LocalTime.now();\n\n工作原理\n\n日期时间 API 可以轻松地将当前日期和时间作为独立的实体获取。为此，你需要导入\
  \ `java.time.LocalDate` 和 `java.time.LocalTime` 类，并分别调用它们的静态 `now()` 方法来获取本地日期和时间的实例。`LocalDate`\
  \ 和 `LocalTime` 类都是不可变且线程安全的，因此无法实例化。要了解更多信息，请参考配方 4-7。\n\n2-6. 从指定字符串获取日期\n\n问题\n\
  \n给定一个包含日期的指定文本字符串，你希望获取一个 `LocalDate` 对象。\n\n解决方案\n\n使用 `DateTimeFormatter` 设置指定文本字符串的格式，然后调用\
  \ `LocalDate.parse()` 方法，将文本字符串作为第一个参数，格式化器作为第二个参数。以下代码行演示了这一过程。\n\nDateTimeFormatter\
  \ formatter = DateTimeFormatter.ofPattern(\"MM/dd/yyyy\");\n\nLocalDate yearStart\
  \ = LocalDate.parse(\"01/01/2014\", formatter);\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 Java 8 的新特性\n\n工作原理\n\n`LocalDate` 对象包含多个可用于操作日期的实用方法。其中一个方法是 `parse()`，它接受两个参数：一个基于字符串的日期和一个指定第一个参数格式的\
  \ `DateTimeFormatter` 对象。该方法从文本字符串中获取一个 `LocalDate` 实例，如果由于格式不正确而无法解析文本，则会返回一个 `DateTimeParseException`。\n\
  \n从指定字符串获取日期的能力只是新日期时间 API 的众多优秀特性之一。\n\n要了解更多新特性，请参考第 4 章。\n\n2-7. 执行日期时间计算\n\n\
  问题\n\n你希望从给定的日期或时间中增加若干天或减去若干周。\n\n解决方案\n\n利用 `LocalDate` 和 `LocalTime` 对象中的内置实用方法来执行所需的计算。\n\
  \n以下代码获取当前日期和时间，并对它们执行一些基本计算。\n\nLocalDate myDate = LocalDate.now();\n\nLocalTime\
  \ myTime = LocalTime.now();\n\nLocalDate datePlusDays = myDate.plusDays(15);\n\n\
  System.out.println(\"今天加 15 天: \" + datePlusDays);\n\nLocalDate datePlusWeeks =\
  \ myDate.plusWeeks(8);\n\nSystem.out.println(\"今天加 8 周: \" + datePlusWeeks);\n\n\
  LocalTime timePlusHours = myTime.plusHours(5);\n\nLocalTime timeMinusMin = myTime.minusMinutes(30);\n\
  \nSystem.out.println(\"时间加 5 小时: \" + timePlusHours);\n\n\n\nSystem.out.println(\"\
  时间减去 30 分钟: \" + timeMinusMin);\n\n工作原理\n\n日期时间 API 使得对日期和时间执行计算变得非常容易。`LocalDate`\
  \ 和 `LocalTime` 对象内置了计算方法，因此无需再担心为了执行计算而将对象转换为不同类型。日期时间 API 还允许通过调用这些对象的 `now()`\
  \ 方法轻松访问当前日期或时间。\n\nStreams API\n\n集合在许多 Java 应用程序中扮演着不可或缺的角色。Java 8 的发布引入了 Streams\
  \ API，它改变了数据集合的使用方式，使解决方案更具生产力和可维护性。Streams API 允许你遍历元素集合、执行聚合操作、将两个或多个操作进行流水线化、执行并行执行等。本节将简要介绍\
  \ Streams API。要了解更多信息，请参考配方 7-8。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 N JAVA 8 的新特性\n\n2-8\\. 遍历数据集合\n\n问题\n\n你的应用程序包含一个对象列表，你想要遍历该列表并打印出每个对象的某个字段。\n\
  \n解决方案\n\n利用新的 Java Streams API 遍历数据列表，并为每个元素执行一项任务。在以下代码行中，一个列表被填充了示例数据。然后通过生成一个流来遍历该列表，并使用\
  \ lambda 表达式将每个元素打印到命令行。\n\nList<String> myList = new ArrayList();\n\n// 填充列表\n\n\
  for(int x = 0; x <= 10; x++){\n\nmyList.add(\"Test \" + x);\n\n}\n\n// 打印列表中的每个元素\n\
  \nmyList.stream().forEach((value)->{\n\nSystem.out.println(value);\n\n});\n\n结果：\n\
  \nTest 0\n\nTest 1\n\nTest 2\n\nTest 3\n\nTest 4\n\nTest 5\n\nTest 6\n\nTest 7\n\
  \nTest 8\n\nTest 9\n\nTest 10\n\n工作原理\n\n新的 Streams API 增强了 Java 集合类型的可用性，使得遍历集合并对每个元素执行任务变得简单。在本配方的解决方案中，生成了一个字符串数组，然后从该数组创建了一个流。利用该流，通过\
  \ `forEach()` 终端操作将数组的每个元素打印到命令行。Streams API 允许编译器确定遍历集合的最佳方式（内部迭代）。*流*是一个对象引用序列，可以在所有集合类型上生成。\n\
  \nStreams API 使得对这些对象引用执行一系列聚合操作成为可能，并返回结果或将更改内联应用到对象上。这又被称为*流水线*。生成和使用流的伪代码如下：\n\
  \n集合 -> (流) -> (零个或多个中间操作) -> (终端操作) 有关 Java 8 这一出色新特性的更多信息，请参考配方 7-8。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 N JAVA 8 的新特性\n\nJavaFX\n\nJavaFX 在 Java 8 发布时经历了大规模改造。首先，它现在已包含在 Java 8\
  \ SE 中，因此不再需要单独下载。平台中添加了多个新组件，包括 DatePicker 和用于在 JavaFX 中嵌入 Swing 的新 SwingNode。此外，对\
  \ Raspberry Pi 等平台的嵌入式支持也得到了改进。其他新功能包括 WebView 增强、打印支持、富文本支持等等。\n\n本节仅涵盖 JavaFX\
  \ 8 的部分新特性。要了解更多信息，请参考专门介绍 JavaFX 的第 14–17 章。\n\n2-9\\. 在 JavaFX 中嵌入 Swing\n\n问题\n\
  \n你想要将一些标准的 Java Swing 代码嵌入到 JavaFX 应用程序中。\n\n解决方案\n\n使用 SwingNode 将 Swing 内容嵌入到应用程序中。在以下简单的\
  \ JavaFX 应用程序中，使用 JavaFX 创建了前端，并在其中嵌入了一个 Swing JLabel 组件。\n\npublic class Recipe02_09\
  \ extends Application {\n\n@Override\n\n\n\npublic void start(Stage primaryStage)\
  \ throws Exception {\n\n    final SwingNode swingNode = new SwingNode();\n\n   \
  \ createSwingContent(swingNode);\n\n    StackPane pane = new StackPane();\n\n  \
  \  pane.getChildren().add(swingNode);\n\n    primaryStage.setScene(new Scene(pane,\
  \ 100, 50));\n\n    primaryStage.show();\n\n}\n\nprivate void createSwingContent(final\
  \ SwingNode swingNode) {\n\n    SwingUtilities.invokeLater(() -> {\n\n        swingNode.setContent(new\
  \ JLabel(\"Hello Swing\"));\n\n    });\n\n}\n\n/**\n\n* @param args the command-line\
  \ arguments\n\n*/\n\npublic static void main(String[] args) {\n\n    launch(args);\n\
  \n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-47_1.jpg)\n\
  \n第 2 章 Java 8 的新特性\n\n生成的应用程序如图 2-2 所示。\n\n**图 2-2.** *使用 SwingNode 嵌入 JLabel*\n\
  \n工作原理\n\nSwing 曾是 Java 平台开发图形用户界面和桌面应用程序的首选工具。Swing 是 Java 基础类（JFC）的一部分，JFC 是一组用于开发图形用户界面的功能集合。Swing\
  \ API 包含大量组件（JComponent 类）、事件处理类、外观类等。该 API 功能强大，足以开发高度复杂的应用程序。然而，API 过于庞大，学习起来较为困难，并且随着技术发展，许多\
  \ Swing 类和功能已经过时。正因如此，JavaFX 已成为 Java 平台开发现代图形用户界面和桌面应用程序的首选 API。因此，许多开发者需要一种将两者融合的方法来实现过渡。即使是完全用\
  \ JavaFX 编写的应用程序，也能从使用某些 Swing 组件中受益。`javafx.embed.swing.SwingNode` 类使得将 `JComponent`\
  \ 实例嵌入 JavaFX 应用程序变得轻而易举，只需将 `JComponent` 传递给 `SwingNode` 的 `setContent()` 方法即可。内容会自动重绘，所有事件也会在无需用户干预的情况下转发给\
  \ `JComponent` 实例。\n\n在本示例中，通过将 Swing 组件传递给 `SwingNode` 的 `setContent()` 方法，将一个\
  \ Swing 的 `JLabel` 组件嵌入到了 JavaFX 应用程序中。Swing 内容应在事件分发线程（EDT）上运行，因此所有 Swing 访问都应在\
  \ EDT 上进行。也就是说，使用 `SwingUtilities.invokeLater` 创建了一个新线程，并用 lambda 表达式封装了用于设置 Swing\
  \ 内容的 `Runnable`。\n\n要了解更多关于在应用程序中使用 `SwingNode` 的信息，并查看更详细的示例，请参考配方 14-18。\n\n\
