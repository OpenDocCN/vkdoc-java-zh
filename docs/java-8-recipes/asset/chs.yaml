  \ : null;\n\n    }\n\n    public int meanGrade() {\n\n        int mean = 0;\n\n\
  \        if (_grades != null && _grades.length > 0) {\n\n            int sum = 0;\n\
  \n            for (int i = 0; i < _grades.length; i++) {\n\n                sum\
  \ += _grades[i];\n\n            }\n\n            mean = sum / _grades.length;\n\n\
