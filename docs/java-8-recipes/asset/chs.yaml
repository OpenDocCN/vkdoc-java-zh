  \ Java 8 之前的代码进行遍历，`Map`的`entrySet()`方法会返回一个`Map.Entry`对象的`Set`。在循环内部，你可以通过在该条目上分别调用`key()`和`value()`方法来访问当前`Map.Entry`的键和值。当你在遍历时需要同时访问`map`的键和值，并且不需要从`map`中移除元素时，请使用此遍历方法。看看新语法，你会发现同样的遍历可以用一行代码完成。新语法利用了`forEach()`方法，该方法是在\
  \ Java 8 中添加到`Map`接口的。它将一个 lambda 表达式应用于列表中的每个条目。该 lambda 表达式将键和值都作为参数，然后将它们打印出来。\n\
