  \ \"+order.getItemOrdered()+\" for\n\n\"+order.getCustomerName());\n\n});\n\n}\n\
  \n}\n\n解决方案 2\n\n使用可重入锁，可以防止多个线程同时访问同一段关键代码区域。在此解决方案中，通过调用 `inventoryLock.lock()`\
  \ 来获取 `inventoryLock`。任何其他试图获取 `inventoryLock` 锁的线程都必须等待，直到该锁被释放。在 `fulfillOrder()`\
  \ 方法的末尾（在 `finally` 块中），通过调用 `inventoryLock.unlock()` 方法来释放 `inventoryLock`：`Lock\
  \ inventoryLock = new ReentrantLock();`\n\nprivate boolean fulfillOrder(String itemOrdered,\
  \ int quantityOrdered, String customerName) {\n\ntry {\n\ninventoryLock.lock();\n\
  \nint currentInventory = inventoryMap.get(itemOrdered);\n\nif (currentInventory\
  \ < quantityOrdered) {\n\nSystem.out.println(\"Couldn't fulfill order for \" + customerName\
  \ +\n\n\" not enough \" + itemOrdered + \" (\" + quantityOrdered + \")\"); return\
  \ false; // 抱歉，我们卖完了\n\n}\n\ninventoryMap.put(itemOrdered, currentInventory - quantityOrdered);\n\
  \nCustomerOrder order = new CustomerOrder(itemOrdered, quantityOrdered, customerName);\n\
  \ncustomerOrders.add(order);\n\nSystem.out.println(\"Order fulfilled for \" + customerName\
  \ + \" of \" +\n\nitemOrdered + \" (\" + quantityOrdered + \")\");\n\nreturn true;\n\
  \n} finally {\n\ninventoryLock.unlock();\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\nprivate void checkInventoryLevels() {\n\ntry {\n\ninventoryLock.lock();\n\
  \nSystem.out.println(\"------------------------------------\");\n\ninventoryMap.entrySet().stream().forEach((inventoryEntry)\
  \ -> {\n\nSystem.out.println(\"Inventory Level :\" + inventoryEntry.getKey() + \"\
  \ \" +\n\ninventoryEntry.getValue());\n\n});\n\nSystem.out.println(\"------------------------------------\"\
  );\n\n} finally {\n\ninventoryLock.unlock();\n\n}\n\n}\n\nprivate void displayOrders()\
  \ {\n\ntry {\n\ninventoryLock.lock();\n\ncustomerOrders.stream().forEach((order)\
  \ -> {\n\nSystem.out.println(order.getQuantityOrdered() + \" \" +\n\norder.getItemOrdered()\
  \ + \" for \" + order.getCustomerName());\n\n});\n\n} finally {\n\ninventoryLock.unlock();\n\
  \n}\n\n}\n\n工作原理\n\n如果你有多个不同的结构需要同时修改，就必须确保这些结构是原子性更新的。*原子*操作指的是一组指令，它们要么作为一个整体全部执行，要么全部不执行。原子操作只有在完成时才对程序的其他部分可见。\n\
  \n在解决方案 1（原子性地同时修改 `inventoryMap` 映射和 `customerOrders` 列表）中，你选择一个“主”集合（即 `inventoryMap`）作为锁定对象。通过锁定主集合，你保证如果另一个线程试图锁定同一个主集合，它必须等待当前执行线程释放对该集合的锁。\n\
  \n**注意**\n\n请注意，即使 `displayOrders` 没有使用 `inventoryMap`，你仍然对其进行了同步（在解决方案 1 中）。因为\
  \ `inventoryMap` 是主集合，即使是对次要集合的操作，也仍然需要通过主集合的同步来保护。\n\n解决方案 2 更加明确，它提供了一个独立的锁来协调原子操作，而不是选择一个主集合。*锁定*指的是\
  \ JVM 限制某些代码路径只能由一个线程执行的能力。线程尝试获取锁（例如，如示例所示，锁由 `ReentrantLock` 实例提供），并且锁一次只能授予一个线程。如果其他线程试图获取同一个锁，它们将被挂起（WAIT），直到该锁可用。当当前持有锁的线程释放锁时，该锁变为可用。锁被释放后，可以被一个（且仅一个）正在等待该锁的线程获取。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 并发\n\n默认情况下，锁不是“公平”的。换句话说，请求锁的线程的顺序不会被保留；这使得\
  \ JVM 中的锁定/解锁实现非常快速，并且在大多数情况下，使用非公平锁通常是可以的。对于竞争非常激烈的锁，如果有均匀分配锁（使其公平）的需求，可以通过设置锁的\
  \ `setFair` 属性来实现。\n\n在解决方案 2 中，调用 `inventoryLock.lock()` 方法要么获取锁并继续执行，要么挂起执行（WAIT）直到可以获取锁。一旦获取了锁，其他线程将无法在锁定的代码块内执行。在代码块末尾，通过调用\
  \ `inventoryLock.unlock()` 释放锁。\n\n在使用 `Lock` 对象（`ReentrantLock`、`ReadLock` 和 `WriteLock`）时，常见的做法是使用\
  \ `try/finally` 子句来包围这些 `Lock` 对象的使用。在打开 `try` 块之后，第一条指令应该是调用 `lock.lock()` 方法。这保证了执行的第一条指令就是获取锁。释放锁（通过调用\
  \ `lock.unlock()`）在对应的 `finally` 块中完成。如果在获取锁后发生了 `RuntimeException`，在 `finally`\
  \ 子句中解锁可以确保不会“持有”锁并阻止其他线程获取它。\n\n使用 `ReentrantLock` 对象提供了 `synchronized` 语句所不具备的额外功能。例如，`ReentrantLock`\
  \ 具有 `tryLock()` 函数，该函数仅在没有任何其他线程持有锁时尝试获取锁（该方法不会使调用线程等待）。如果另一个线程持有锁，该方法返回 `false`\
  \ 但继续执行。最好使用 `synchronized` 关键字进行同步，并且仅在需要其功能时才使用 `ReentrantLock`。有关 `ReentrantLock`\
  \ 提供的其他方法的更多信息，请访问\n\n[`docs.oracle.com/javase/8/docs/api/java/util/concurrent/locks/ReentrantLock.html。`](http://docs.oracle.com/javase/8/docs/api/java/util/concurrent/locks/ReentrantLock.html)\n\
  \n**提示** 虽然这只是一本菜谱书，而正确的线程技术本身可以写成多卷著作，但提高对死锁的认识非常重要。当涉及两个锁（并且在另一个线程中以相反的顺序获取它们）时，就会发生死锁。避免死锁的最简单方法是避免让锁“逃逸”。这意味着，当获取锁时，不应执行调用可能获取另一个锁的其他方法的代码。如果无法做到这一点，请在调用此类方法之前释放锁。\n\
  \n需要注意的是，任何涉及一个或两个集合的操作都需要由同一个锁保护。依赖于一个集合的结果来查询第二个集合的操作需要原子性地执行；它们需要作为一个单元完成，在该单元完成之前，两个集合都不能改变。\n\
  \n10-6\\. 将工作拆分为多个线程\n\n问题\n\n你有可以拆分为多个线程的工作，并且希望最大化利用可用的 CPU 资源。\n\n解决方案\n\n\n\n\
  使用 `ThreadPoolExecutor` 实例，可以将任务分解为离散的单元。在以下示例中，创建了一个包含 `Runnable` 对象的 `BlockingQueue`，然后将其传递给\
  \ `ThreadPoolExecutor` 实例。\n\n接着，通过调用 `prestartAllCoreThreads()` 方法来初始化并启动 `ThreadPoolExecutor`，然后通过调用\
  \ `shutdown()` 方法，再调用 `awaitTermination()` 方法，等待所有 `Runnable` 对象执行完毕：\n\n```java\n\
  private void start() throws InterruptedException {\n\n    BlockingQueue<Runnable>\
  \ queue = new LinkedBlockingQueue<>();\n\n    for (int i = 0; i < 10; i++) {\n\n\
  \        final int localI = i;\n\n        [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n        CHAPTER 10 N CONCURRENCY\n\n        queue.add((Runnable) () -> {\n\n \
  \           doExpensiveOperation(localI);\n\n        });\n\n    }\n\n    ThreadPoolExecutor\
  \ executor = new ThreadPoolExecutor(10, 10, 1000,\n\n            TimeUnit.MILLISECONDS,\
  \ queue);\n\n    executor.prestartAllCoreThreads();\n\n    executor.shutdown();\n\
  \n    executor.awaitTermination(100000, TimeUnit.SECONDS);\n\n    System.out.println(\"\
  Look ma! all operations were completed\");\n\n}\n```\n\n**工作原理**\n\n`ThreadPoolExecutor`\
  \ 由两个组件构成：待执行任务的**队列**，以及指示如何执行任务的**执行器**。队列中填充了 `Runnable` 对象，其 `run()` 方法包含了要执行的代码。\n\
  \n`ThreadPoolExecutor` 使用的队列是 `BlockingQueue` 接口的实现。`BlockingQueue` 接口表示一种队列，当队列中没有元素时，队列的消费者会等待（被挂起）。这对于\
  \ `ThreadPoolExecutor` 高效工作来说是必要的。\n\n第一步是用需要并行执行的任务填充队列。这通过调用队列的 `add()` 方法，并向其传递一个实现了\
  \ `Runnable` 接口的类来完成。完成后，执行器即被初始化。\n\n`ThreadPoolExecutor` 的构造函数有许多参数选项；解决方案中使用的是最简单的那个。\n\
  \n表 10-1 描述了每个参数。\n\n**表 10-1.** *ThreadPoolExecutor 的参数*\n\n| **参数** | **描述** |\n\
  | :--- | :--- |\n| CorePoolSize | 提交任务时创建的最小线程数 |\n| MaximumPoolSize | 执行器将创建的最大线程数\
  \ |\n| KeepAliveTime | 等待线程在被销毁前等待工作的时间（只要活动线程数仍大于 CorePoolSize） |\n| TimeUnit |\
  \ KeepAliveTime 的时间单位（例如，`TimeUnit.SECONDS`、`TimeUnit.MILLISECONDS`） |\n| WorkQueue\
  \ | 包含待执行器处理的任务的阻塞队列 |\n\n初始化 `ThreadPoolExecutor` 后，调用 `prestartAllCoreThreads()`\
  \ 方法。此方法通过创建 `CorePoolSize` 中指定的线程数来“预热” `ThreadPoolExecutor`，如果队列不为空，则主动开始从队列中消费任务。\n\
  \n调用 `ThreadPoolExecutor` 的 `shutdown()` 方法来等待所有任务完成。通过调用此方法，指示 `ThreadPoolExecutor`\
  \ 不再接受队列中的新事件（之前提交的事件将完成处理）。这是有序终止 `ThreadPoolExecutor` 的第一步。调用 `awaitTermination()`\
  \ 方法等待 `ThreadPoolExecutor` 中的所有任务完成。此方法将强制主线程等待，直到 `ThreadPoolExecutor` 队列中的所有\
  \ `Runnable` 都执行完毕。所有 `Runnable` 执行完毕后，主线程将唤醒并继续执行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nCHAPTER 10 N CONCURRENCY\n\nN **注意** 需要正确配置 `ThreadPoolExecutor` 以最大化 CPU 利用率。执行器最有效的线程数取决于提交任务的类型。如果任务是\
  \ CPU 密集型的，那么执行器的线程数等于当前 CPU 核心数是最理想的。如果任务是 I/O 密集型的，那么执行器的线程数应多于当前 CPU 核心数。I/O\
  \ 绑定程度越高，线程数也应越多。\n\n**10-7. 协调线程**\n\n**问题**\n\n你的应用程序需要协调两个或多个线程以协同工作。\n\n**解决方案\
  \ 1**\n\n通过使用 `wait/notify` 进行线程同步，可以协调线程。在此解决方案中，主线程等待 `objectToSync` 对象，直到数据库加载线程执行完毕。数据库加载线程完成后，它会通知\
  \ `objectToSync`，任何正在等待它的线程可以继续执行。将订单加载到系统中的过程也是如此。主线程等待 `objectToSync`，直到订单加载线程通过调用\
  \ `objectToSync.notify()` 方法通知 `objectToSync` 继续执行。在确保库存和订单都已加载后，主线程执行 `processOrder()`\
  \ 方法来处理所有订单。\n\n```java\nprivate final Object objectToSync = new Object();\n\nprivate\
  \ void start() {\n\n    loadItems();\n\n    Thread inventoryThread = new Thread(()\
  \ -> {\n\n        System.out.println(\"Loading Inventory from Database...\");\n\n\
  \        loadInventory();\n\n        synchronized (objectToSync) {\n\n         \
  \   objectToSync.notify();\n\n        }\n\n    });\n\n    synchronized (objectToSync)\
  \ {\n\n        inventoryThread.start();\n\n        try {\n\n            objectToSync.wait();\n\
  \n        } catch (InterruptedException e) {\n\n            e.printStackTrace();\n\
  \n        }\n\n    }\n\n    Thread ordersThread = new Thread(() -> {\n\n       \
  \ System.out.println(\"Loading Orders from XML Web service...\");\n\n        loadOrders();\n\
  \n        synchronized (objectToSync) {\n\n            objectToSync.notify();\n\n\
  \        }\n\n    });\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  \    CHAPTER 10 N CONCURRENCY\n\n    synchronized (objectToSync) {\n\n        ordersThread.start();\n\
  \n        try {\n\n            objectToSync.wait();\n\n        } catch (InterruptedException\
  \ e) {\n\n            e.printStackTrace();\n\n        }\n\n    }\n\n    processOrders();\n\
  \n}\n```\n\n**解决方案 2**\n\n你可以使用 `CountDownLatch` 对象来控制主线程何时继续执行。在以下代码中，创建了一个初始值为\
  \ 2 的 `CountDownLatch`；然后创建并启动用于加载库存和加载订单信息的两个线程。当这两个线程中的每一个执行完毕时，它们会调用 `CountDownLatch`\
  \ 的 `countDown()` 方法，该方法将锁存器的值减一。主线程等待，直到 `CountDownLatch` 的值达到 0，此时它恢复执行。\n\n```java\n\
  CountDownLatch latch = new CountDownLatch(2);\n\nprivate void start() {\n\n    loadItems();\n\
  \n    Thread inventoryThread = new Thread(() -> {\n\n        System.out.println(\"\
  Loading Inventory from Database...\");\n\n        loadInventory();\n\n        latch.countDown();\n\
  \n    });\n\n    inventoryThread.start();\n\n    Thread ordersThread = new Thread(()\
  \ -> {\n\n        System.out.println(\"Loading Orders from XML Web service...\"\
  );\n\n        loadOrders();\n\n        latch.countDown();\n\n    });\n\n    ordersThread.start();\n\
  \n    try {\n\n        latch.await();\n\n    } catch (InterruptedException e) {\n\
  \n        e.printStackTrace();\n\n    }\n\n    processOrders();\n\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nCHAPTER 10 N CONCURRENCY\n\n**解决方案 3**\n\n通过使用 `Thread.join()`，你可以等待一个线程执行完毕。下面的示例有一个用于加载库存的线程和另一个用于加载订单的线程。每个线程启动后，调用\
  \ `inventoryThread.join()` 将使主线程等待 `inventoryThread` 执行完毕后再继续。\n\n```java\nprivate\
  \ void start() {\n\n    loadItems();\n\n    Thread inventoryThread = new Thread(()\
  \ -> {\n\n        System.out.println(\"Loading Inventory from Database...\");\n\n\
  \        loadInventory();\n\n    });\n\n    inventoryThread.start();\n\n    try\
  \ {\n\n        inventoryThread.join();\n\n    } catch (InterruptedException e) {\n\
  \n        e.printStackTrace();\n\n    }\n\n    Thread ordersThread = new Thread(()\
  \ -> {\n\n        System.out.println(\"Loading Orders from XML Web service...\"\
  );\n\n        loadOrders();\n\n    });\n\n    ordersThread.start();\n\n    try {\n\
  \n        ordersThread.join();\n\n    } catch (InterruptedException e) {\n\n   \
  \     e.printStackTrace();\n\n    }\n\n    processOrders();\n\n}\n```\n\n**工作原理**\n\
  \n\n\n在 Java 中，协调线程的方式有很多种，而这些协调工作都依赖于让线程等待这一概念。当线程等待时，它会暂停执行（不会继续执行下一条指令，并从 JVM\
  \ 的线程调度器中移除）。如果线程处于等待状态，则可以通过通知来唤醒它。在 Java 的并发术语中，*通知*一词意味着线程将恢复执行（JVM 会将线程重新加入线程调度器）。因此，在线程协调的自然流程中，最常见的事件序列是主线程等待，然后辅助线程通知主线程继续（或唤醒）。即便如此，等待中的线程仍有可能被其他事件中断。当线程被中断时，它不会继续执行下一条指令，而是抛出\
  \ `InterruptedException`，这是一种信号，表明\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\n尽管线程正在等待某事发生，但发生了其他需要线程关注的事件。以下示例能更好地说明这一点：\n\n```java\nBlockingQueue\
  \ queue = new LinkedBlockingQueue();\n\nwhile (true) {\n\n    synchronized (this)\
  \ {\n\n        Object itemToProcess = queue.take();\n\n        processItem (itemToProcess);\n\
  \n    }\n\n}\n```\n\n查看上述代码，执行这段代码的线程永远不会终止，因为它会无限循环并等待处理某个项目。如果队列中没有项目，主线程会一直等待，直到另一个线程向队列中添加内容。你无法优雅地关闭上述代码（尤其是当运行循环的线程不是守护线程时）。\n\
  \n```java\nBlockingQueue queue = new LinkedBlockingQueue();\n\nwhile (true) {\n\n\
  \    synchronized (this) {\n\n        Object itemToProcess = null;\n\n        try\
  \ {\n\n            itemToProcess = queue.take();\n\n        } catch (InterruptedException\
  \ e) {\n\n            return;\n\n        }\n\n        processItem (itemToProcess);\n\
  \n    }\n\n}\n```\n\n新代码现在具备了“跳出”无限循环的能力。从另一个线程中，你可以调用 `thread.interrupt()`，这会抛出\
  \ `InterruptedException`，然后被主线程的 `catch` 子句捕获。在该子句中，可以退出无限循环。\n\n`InterruptedException`\
  \ 是一种向等待（或睡眠）线程发送额外信息的方式，以便它们能够处理不同的场景（例如，有序的程序关闭）。因此，每个将线程状态更改为睡眠/等待的操作都必须被一个能够捕获\
  \ `InterruptedException` 的 `try/catch` 块包围。这是异常（`InterruptedException`）并非真正错误的情况之一，它更像是一种在线程之间传递信号的方式，表明发生了需要关注的事件。\n\
  \n解决方案 1 演示了最常见（最古老）的协调形式。该解决方案需要让一个线程等待并暂停执行，直到该线程被另一个线程通知（或唤醒）。\n\n要使解决方案 1 生效，发起线程需要获取一个锁。这个锁将作为“电话号码”，另一个线程可以通过它通知发起线程唤醒。发起线程获取锁（电话号码）后，进入等待状态。一旦调用\
  \ `wait()` 方法，锁就会被释放，允许其他线程获取同一个锁。然后，辅助线程获取该锁（电话号码），并通知（实际上，这就像拨打一个唤醒电话）发起线程。通知之后，发起线程恢复执行。\n\
  \n在解决方案 1 的代码中，锁是一个标识为 `objectToSync` 的虚拟对象。在实践中，用于等待和通知的锁对象可以是 Java 中的任何有效实例对象；例如，我们可以使用\
  \ `this` 引用来让主线程等待（并且在线程内部，我们可以使用 `Recipe 10_7_1.this` 变量引用来通知主线程继续执行）。\n\n\n\n\
  使用此技术的主要优势在于能够明确控制等待哪个线程以及何时进行通知（并且能够通知所有等待同一对象的线程；请参见下面的提示）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\n**提示** 多个线程可以等待同一个锁（相当于同一个被唤醒的电话号码）。当辅助线程调用 `notify` 时，它会唤醒其中一个“等待中”的线程（唤醒哪个线程没有公平性可言）。有时你需要通知所有线程；可以调用\
  \ `notifyAll()` 方法，而不是 `notify()` 方法。这通常用于准备让多个线程执行某项工作，但工作尚未设置完成的情况。\n\n解决方案 2\
  \ 采用了一种更现代的同步通知方法，因为它使用了 `CountDownLatch`。在设置时，指定该锁存器将有多少个“计数”。然后主线程通过调用 `CountDownLatch`\
  \ 的 `await()` 方法来等待（停止执行），直到锁存器计数递减到 0。当锁存器达到 0 时，主线程将唤醒并继续执行。当工作线程完成时，调用 `latch.countdown()`\
  \ 方法，该方法会将锁存器的当前计数值减 1。如果锁存器的当前值达到 0，则等待在 `CountDownLatch` 上的主线程将唤醒并继续执行。\n\n使用\
  \ `CountDownLatch` 的主要优势在于可以同时生成多个任务，并等待它们全部完成。（在解决方案示例中，我们不需要等待某个线程完成后再继续；它们全部启动，当锁存器为\
  \ 0 时，主线程继续执行。）而解决方案 3 则提供了一种方案，我们可以访问想要等待的线程。对于主线程来说，只需调用辅助线程的 `join()` 方法即可。然后主线程将等待（停止执行），直到辅助线程完成。\n\
  \n此方法的优点是不需要辅助线程了解任何同步机制。只要辅助线程终止执行，主线程就可以等待它们。\n\n10-8. 创建线程安全对象\n\n问题\n\n你需要创建一个线程安全的对象，因为它将被多个线程访问。\n\
  \n解决方案 1\n\n使用同步的 getter 和 setter，并保护改变状态的关键区域。在以下示例中，创建了一个对象，其每个内部变量都有同步的 getter\
  \ 和 setter。关键区域通过使用 `synchronized(this)` 锁来保护：\n\n```java\nclass CustomerOrder {\n\
  \n    private String itemOrdered;\n\n    private int quantityOrdered;\n\n    private\
  \ String customerName;\n\n    public CustomerOrder() {\n\n    }\n\n    public double\
  \ calculateOrderTotal (double price) {\n        synchronized (this) {\n        \
  \    return getQuantityOrdered()*price;\n        }\n    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\n```java\n    public synchronized String getItemOrdered() {\n    \
  \    return itemOrdered;\n    }\n\n    public synchronized int getQuantityOrdered()\
  \ {\n        return quantityOrdered;\n    }\n\n    public synchronized String getCustomerName()\
  \ {\n        return customerName;\n    }\n\n    public synchronized void setItemOrdered(String\
  \ itemOrdered) {\n        this.itemOrdered = itemOrdered;\n    }\n\n    public synchronized\
  \ void setQuantityOrdered(int quantityOrdered) {\n        this.quantityOrdered =\
  \ quantityOrdered;\n    }\n\n    public synchronized void setCustomerName(String\
  \ customerName) {\n        this.customerName = customerName;\n    }\n}\n```\n\n\
  解决方案 2\n\n创建一个不可变对象（一个一旦创建就不会改变其内部状态的对象）。在以下代码中，对象的内部变量被声明为 `final`，并在构造时赋值。通过这样做，可以保证该对象是不可变的：\n\
  \n```java\nclass ImmutableCustomerOrder {\n\n    final private String itemOrdered;\n\
  \    final private int quantityOrdered;\n    final private String customerName;\n\
  \n    ImmutableCustomerOrder(String itemOrdered, int quantityOrdered, String customerName)\
  \ {\n        this.itemOrdered = itemOrdered;\n        this.quantityOrdered = quantityOrdered;\n\
  \        this.customerName = customerName;\n    }\n\n    public String getItemOrdered()\
  \ {\n        return itemOrdered;\n    }\n\n    public int getQuantityOrdered() {\n\
  \        return quantityOrdered;\n    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\n```java\n    public String getCustomerName() {\n        return customerName;\n\
  \    }\n\n    public synchronized double calculateOrderTotal (double price) {\n\
  \        return getQuantityOrdered()*price;\n    }\n}\n```\n\n工作原理\n\n解决方案 1 依赖于锁保护对对象所做的任何更改这一原则。使用\
  \ `synchronized` 关键字是编写表达式 `synchronized (this)` 的快捷方式。通过同步你的 getter 和 setter（以及任何其他改变对象内部状态的操作），你可以保证对象的一致性。此外，重要的是，任何应作为一个单元执行的操作（例如，同时修改两个集合的操作，如配方\
  \ 10-5 中所述）都应在对象的方法内完成，并使用 `synchronized` 关键字进行保护。\n\n例如，如果一个对象提供了 `getSize()` 方法和\
  \ `getItemNumber(int index)` 方法，那么编写 `object.getItemNumber(object.getSize()-1)`\
  \ 是不安全的。尽管这条语句看起来简洁，但在获取大小和获取项目编号之间，另一个线程可能会改变对象的内容。相反，更安全的做法是创建一个 `object.getLastElement()`\
  \ 方法，该方法原子性地确定大小和最后一个元素。\n\n解决方案 2 依赖于不可变对象的特性。不可变对象不能改变其内部状态，而无法改变其内部状态的对象（即*不可变的*）根据定义是线程安全的。如果由于某个事件需要修改不可变对象，不要显式更改其属性，而是创建一个具有更改后属性的新对象。然后，这个新对象取代旧对象，在将来请求该对象时，返回这个新的不可变对象。这是迄今为止创建线程安全代码最简单（尽管冗长）的方法。\n\
  \n10-9. 实现线程安全计数器\n\n问题\n\n你需要一个线程安全的计数器，以便可以在不同的执行线程内递增它。\n\n解决方案\n\n通过使用本质上线程安全的\
  \ `Atomic` 对象，可以创建一个保证线程安全并具有优化同步策略的计数器。在以下代码中，创建了一个 `Order` 对象，它需要一个使用 `AtomicLong`\
  \ 的 `incrementAndGet()` 方法生成的唯一订单 ID：\n\n```java\nAtomicLong orderIdGenerator =\
  \ new AtomicLong(0);\n\nfor (int i = 0; i < 10; i++) {\n    Thread orderCreationThread\
  \ = new Thread(() -> {\n        for (int i1 = 0; i1 < 10; i1++) {\n            createOrder(Thread.currentThread().getName());\n\
  \        }\n    });\n    orderCreationThread.setName(\"Order Creation Thread \"\
  \ + i);\n    orderCreationThread.start();\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\n```java\n//////////////////////////////////////////////////////\n\
  private void createOrder(String name) {\n    long orderId = orderIdGenerator.incrementAndGet();\n\
  \    Order order = new Order(name, orderId);\n    orders.add(order);\n}\n```\n\n\
  工作原理\n\n`AtomicLong`（及其同类 `AtomicInteger`）被设计用于在并发环境中安全使用。它们提供了原子性地递增（并获取）更改后值的方法。即使数百个线程同时调用\
  \ `AtomicLong` 的 `increment()` 方法，返回的值也始终是唯一的。\n\n如果你需要做出决策并更新变量，请始终使用 `AtomicLong`\
  \ 提供的原子操作；例如，`compareAndSet`。否则，你的代码将不是线程安全的（因为任何“检查后行动”的操作都需要是原子性的），除非你使用自己的锁从外部保护该原子引用（参见配方\
  \ 10-7）。\n\n\n\n以下代码说明了需要注意的几个代码安全问题。首先，修改一个 long 类型值可能分两次内存写操作完成（Java 内存模型允许如此），因此两个线程可能会在表面上看似线程安全的代码中重叠执行这两次操作。结果将得到一个完全出乎意料（且很可能错误）的\
  \ long 值：\n\nlong counter = 0;\n\npublic long incrementCounter() {\n\nreturn counter++;\n\
  \n}\n\n这段代码还存在*不安全的发布*问题，指的是变量可能被本地缓存（在 CPU 内部缓存中）而不会提交到主内存。如果另一个线程（在另一个 CPU 上执行）恰好从主内存读取该变量，那么该线程可能会错过第一个线程所做的更改。更改后的值可能被第一个线程的\
  \ CPU 缓存，而尚未提交到第二个线程可见的主内存。为了实现安全发布，必须使用 Java 的 volatile 修饰符（参见 [`download.oracle.com/javase/tutorial/essential/concurrency/atomic.html`](http://download.oracle.com/javase/tutorial/essential/concurrency/atomic.html)）。\n\
  \n前面代码的最后一个问题是它不具备原子性。虽然看起来只有一个递增计数器的操作，但实际上在机器语言层面有两个操作（先读取变量，再递增）。可能有两个或更多线程在读取变量后、尚未递增之前获取了相同的值。然后所有线程都将计数器递增到同一个数值。\n\
  \n10-10\\. 将任务分解为离散的工作单元\n\n问题\n\n你有一个算法，它受益于使用*分治策略*，即能够将一个工作单元分解为两个独立的子单元，然后将这些子单元的结果拼合起来。这些子单元可以进一步分解为更多的工作子单元，直到工作小到可以直接执行。通过将工作单元分解为子单元，你可以以最小的代价充分利用当今处理器的多核特性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 并发\n\n解决方案\n\n新的 Fork/Join\
  \ 框架使得应用分治策略变得简单直接。以下示例创建了“生命游戏”的表示。代码使用 Fork/Join 框架来加速从一代演进到下一代时每次迭代的计算：\n\n////////////////////////////////////////////////////////////////\n\
  \nForkJoinPool pool = new ForkJoinPool();\n\nlong i = 0;\n\nwhile (shouldRun) {\n\
  \ni++;\n\nfinal boolean[][] newBoard = new boolean[lifeBoard.length][lifeBoard[0].length];\n\
  \nlong startTime = System.nanoTime();\n\nGameOfLifeAdvancer advancer = new GameOfLifeAdvancer(lifeBoard,\
  \ 0,0, lifeBoard.length-1, lifeBoard[0].length-1,newBoard);\n\npool.invoke(advancer);\n\
  \nlong endTime = System.nanoTime();\n\nif (i % 100 == 0 ) {\n\nSystem.out.println(\"\
  Taking \"+(endTime-startTime)/1000 + \"ms\");\n\n}\n\nSwingUtilities.invokeAndWait(()\
  \ -> {\n\nmodel.setBoard(newBoard);\n\nlifeTable.repaint();\n\n});\n\nlifeBoard\
  \ = newBoard;\n\n}\n\n////////////////////////////////////////////////////////////////\n\
  \nclass GameOfLifeAdvancer extends RecursiveAction{\n\nprivate boolean[][] originalBoard;\n\
  \nprivate boolean[][] destinationBoard;\n\nprivate int startRow;\n\nprivate int\
  \ endRow;\n\nprivate int endCol;\n\nprivate int startCol;\n\nGameOfLifeAdvancer(boolean[][]\
  \ originalBoard, int startRow, int startCol, int endRow, int endCol, boolean [][]\
  \ destinationBoard) {\n\nthis.originalBoard = originalBoard;\n\nthis.destinationBoard\
  \ = destinationBoard;\n\nthis.startRow = startRow;\n\nthis.endRow = endRow;\n\n\
  this.endCol = endCol;\n\nthis.startCol = startCol;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\nprivate void computeDirectly() {\n\nfor (int row = startRow; row\
  \ <= endRow;row++) {\n\nfor (int col = startCol; col <= endCol; col++) {\n\nint\
  \ numberOfNeighbors = getNumberOfNeighbors (row, col);\n\n\n\n```java\nif (originalBoard[row][col])\
  \ {\n\ndestinationBoard[row][col] = true;\n\nif (numberOfNeighbors < 2) destinationBoard[row][col]\
  \ = false;\n\nif (numberOfNeighbors > 3) destinationBoard[row][col] = false;\n\n\
  } else {\n\ndestinationBoard[row][col] = false;\n\nif (numberOfNeighbors == 3) destinationBoard[row][col]\
  \ = true;\n\n}\n\n}\n\n}\n\n}\n\nprivate int getNumberOfNeighbors(int row, int col)\
  \ {\n\nint neighborCount = 0;\n\nfor (int leftIndex = -1; leftIndex < 2; leftIndex++)\
  \ {\n\nfor (int topIndex = -1; topIndex < 2; topIndex++) {\n\nif ((leftIndex ==\
  \ 0) && (topIndex == 0)) continue; // 跳过自身\n\nint neighbourRowIndex = row + leftIndex;\n\
  \nint neighbourColIndex = col + topIndex;\n\nif (neighbourRowIndex<0) neighbourRowIndex\
  \ = originalBoard.length +\n\nneighbourRowIndex;\n\nif (neighbourColIndex<0) neighbourColIndex\
  \ = originalBoard[0].length +\n\nneighbourColIndex ;\n\nboolean neighbour = originalBoard[neighbourRowIndex\
  \ % originalBoard.length]\n\n[neighbourColIndex % originalBoard[0].length];\n\n\
  if (neighbour) neighborCount++;\n\n}\n\n}\n\nreturn neighborCount;\n\n}\n\n@Override\n\
  \nprotected void compute() {\n\nif (getArea() < 20) {\n\ncomputeDirectly();\n\n\
  return;\n\n}\n\nint halfRows = (endRow - startRow) / 2;\n\nint halfCols = (endCol\
  \ - startCol) / 2;\n\nif (halfRows > halfCols) {\n\n// 按行拆分\n\ninvokeAll(new GameOfLifeAdvancer(originalBoard,\
  \ startRow, startCol,\n\nstartRow+halfRows, endCol,destinationBoard),\n\nnew GameOfLifeAdvancer(originalBoard,\
  \ startRow+halfRows+1, startCol,\n\nendRow, endCol,destinationBoard));\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 并发\n\n} else {\n\ninvokeAll(new GameOfLifeAdvancer(originalBoard, startRow,\
  \ startCol, endRow,\n\nstartCol+ halfCols,destinationBoard),\n\nnew GameOfLifeAdvancer(originalBoard,\
  \ startRow, startCol+halfCols+1,\n\nendRow, endCol,destinationBoard));\n\n}\n\n\
  }\n\nprivate int getArea() { return (endRow - startRow) * (endCol - startCol); }\n\
  \n}\n```\n\n**工作原理**\n\nFork/Join 框架可用于将任务分解为离散的工作单元。解决方案的第一部分创建了一个 `ForkJoinPool`\
  \ 对象。默认构造函数提供了合理的默认值（例如，创建与 CPU 核心数相同的线程数），并设置了一个提交分治任务的入口点。虽然 `ForkJoinPool` 继承自\
  \ `ExecutorService`，但它最适合处理继承自 `RecursiveAction` 的任务。`ForkJoinPool` 对象具有 `invoke(RecursiveAction)`\
  \ 方法，该方法会接收一个 `RecursiveAction` 对象并应用分治策略。\n\n解决方案的第二部分创建了 `GameOfLifeAdvancer`\
  \ 类，该类继承自 `RecursiveAction` 类。\n\n通过继承 `RecursiveAction` 类，工作可以被拆分。`GameOfLifeAdvancer`\
  \ 类将“生命游戏”棋盘推进到下一代。构造函数接收一个二维布尔数组（代表“生命游戏”棋盘）、起始行/列、结束行/列，以及一个目标二维布尔数组，用于收集将“生命游戏”推进一代后的结果。\n\
  \n`GameOfLifeAdvancer` 需要实现 `compute()` 方法。在此方法中，需要确定有多少工作要完成。如果工作量足够小，则直接完成工作（通过调用\
  \ `computeDirectly()` 方法并返回实现）。如果工作量不够小，则该方法通过创建两个 `GameOfLifeAdvancer` 实例来拆分工作，这两个实例仅处理当前\
  \ `GameOfLifeAdvancer` 工作的一半。这可以通过将待处理的行数拆分为两个块，或将列数拆分为两个块来实现。\n\n然后，通过调用 `RecursiveAction`\
  \ 类的 `invokeAll()` 方法，将这两个 `GameOfLifeAdvancer` 实例传递给 ForkJoin 池。`invokeAll()` 方法接收这两个\
  \ `GameOfLifeAdvancer` 实例（可以根据需要接收任意多个），并等待它们都执行完毕（即 `invokeAll()` 方法名中 `-all` 后缀的含义；它在返回控制权之前等待所有提交的任务完成）。\n\
  \n\n\n通过这种方式，`GameOfLifeAdvancer` 实例被分解为多个新的 `GameOfLifeAdvancer` 实例，每个实例仅处理“生命游戏”棋盘的一部分。每个实例会等待所有子部分完成后，再将控制权返回给调用者。这种工作划分方式能够充分利用当今典型系统中可用的多核\
  \ CPU。\n\n**提示** `ForkJoinPool` 通常比 `ExecutorService` 更高效，因为它实现了工作窃取策略。每个线程都有一个待完成的工作队列；如果某个线程的队列为空，该线程会从其他线程的队列中“窃取”工作，从而更有效地利用\
  \ CPU 处理能力。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 并发\n\n\
  10-11. 跨多个线程更新公共值\n\n问题\n\n你的应用程序需要跨多个线程安全地维护一个单一的累加值。\n\n解决方案\n\n使用 `DoubleAdder`\
  \ 或 `LongAdder` 来容纳跨多个线程累加的值，以确保安全处理。在以下示例中，两个线程同时向一个 `DoubleAdder` 添加值，最后累加并显示该值。\n\
  \n```java\nDoubleAdder da = new DoubleAdder();\n\nprivate void start() {\n    Thread\
  \ thread1 = new Thread(() -> {\n        for (int i1 = 0; i1 < 10; i1++) {\n    \
  \        da.add(i1);\n            System.out.println(\"Adding \" + i1);\n      \
  \  }\n    });\n\n    Thread thread2 = new Thread(() -> {\n        for (int i1 =\
  \ 0; i1 < 10; i1++) {\n            da.add(i1);\n            System.out.println(\"\
  Adding \" + i1);\n        }\n    });\n\n    thread1.start();\n    thread2.start();\n\
  \n    try {\n        System.out.println(\"Sleep while summing....\");\n        Thread.sleep(10000);\n\
  \    } catch (InterruptedException e) {\n        e.printStackTrace();\n    }\n\n\
  \    System.out.println(\"The sum is: \" + da.doubleValue());\n}\n```\n\n结果：\n\n\
  ```\nAdding 0\nAdding 1\nAdding 2\nAdding 3\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  第 10 章 并发\nAdding 4\nAdding 5\nAdding 6\nAdding 7\nAdding 0\nAdding 8\nAdding 9\n\
  Adding 1\nAdding 2\nAdding 3\nAdding 4\nAdding 5\nAdding 6\nAdding 7\nAdding 8\n\
  Adding 9\nThe sum is: 90.0\n```\n\n工作原理\n\n在 Java 8 发布之前，跨多个线程处理值时，使用原子变量非常重要。原子变量能够防止线程干扰，而不会像同步访问在某些情况下那样造成阻塞。Java\
  \ 8 引入了一系列新的原子变量，它们比标准原子变量具有更高的吞吐量。在大多数情况下，当值可能跨多个线程被访问和更新时，`java.util.concurrent.atomic.DoubleAdder`\
  \ 和 `java.util.concurrent.atomic.LongAdder` 类比 `AtomicDouble` 和 `AtomicLong` 更优。`DoubleAdder`\
  \ 和 `LongAdder` 都继承自 `Number`，在跨线程累加值时非常有用，尤其是在高竞争情况下。\n\n在解决方案中，使用了一个 `DoubleAdder`\
  \ 来跨两个不同线程累加数字。通过 `add()` 方法，将各种数字“添加”到 `DoubleAdder` 的值中。在线程有足够时间完成工作后，调用 `doubleValue()`\
  \ 方法以 `double` 形式返回所有值的总和。\n\n`DoubleAdder` 和 `LongAdder` 类包含类似的方法，不过 `LongAdder`\
  \ 确实包含几个额外的辅助方法，用于递增和递减累加器的值。表 10-2 显示了每个类中包含的方法。\n\n**表 10-2.** *DoubleAdder 和\
