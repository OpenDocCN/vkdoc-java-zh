  SNIMatcher matcher = SNIHostName.createSNIMatcher(\"www\\\\.gmail\\\\.(com|org)\"\
  ); Collection<SNIMatcher> matchers = new ArrayList<>(1);\n\nmatchers.add(matcher);\n\
  \nSSLParameters params = sslServerSocket.getSSLParameters();\n\nparams.setSNIMatchers(matchers);\n\
  \nsslServerSocket.setSSLParameters(params);\n\nSSLSocket sslSocket = (SSLSocket)\
  \ sslServerSocket.accept();\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 22 章 安全性\n\nSystem.out.println(\"正在关闭套接字\");\n\nsslSocket.close();\n\nsslServerSocket.close();\n\
  \n} catch (IOException e) {\n\nSystem.out.println(e);\n\n} finally {\n\ntry {\n\n\
  sslServerSocket.close();\n\n} catch (IOException ex) {\n\nSystem.out.println(ex);\n\
  \n}\n\n}\n\n}\n\n工作原理\n\n服务器名称指示（SNI）扩展在尝试握手时，为服务器提供一份用于连接的有效服务器列表。SNI 扩展使用 SSL/TLS\
  \ 协议来提供此功能。给定一个指定的服务器名称，应用程序可以判断它是否为打开 SSLSocket 或 SSLEngine 连接的有效地址。\n\n要指定服务器名称，请使用\
  \ SSLParameters.setServerNames(List<SNIServerName> serverNames) 方法，并传入一个包含有效服务器名称的列表。在本示例中，使用以下代码行将服务器名称\
  \ gmail.com 设置为有效：\n\nSNIHostName serverName = new SNIHostName(host);\n\nList<SNIServerName>\
  \ serverNames = new ArrayList<>(1);\n\nserverNames.add(serverName);\n\nSSLParameters\
  \ params = sslSocket.getSSLParameters();\n\nparams.setServerNames(serverNames);\n\
  \nsslSocket.setSSLParameters(params);\n\n创建了一个 ArrayList，其中包含 SNIServerName 对象，每个对象都指定一个有效的服务器名称。\n\
  \n\n\n在示例中，一个 `SNIServerName` 对象被添加到列表中。然后，一个有效服务器列表被传递给 `SSLParameters.setServerNames()`\
  \ 方法。\n\n22-3\\. 指定密钥库密码\n\n问题\n\n你希望通过为 SSL 密钥库添加一个额外的密码来增强其安全性。\n\n解决方案\n\n在创建密钥库时指定新的\
  \ `importpassword` 命令选项。\n\nkeytool -genkey -alias java8recipes -keyalg RSA -keystore\
  \ keystore.jks -keysize 2048\n\n使用以下命令导入密码短语：\n\nkeytool –importpassword –alias\
  \ java8recipes\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 22 章 安全\n\
  \n工作原理\n\n`keytool` 工具的新命令 `–importpassword` 允许你将密码短语存储在新的 `KeyStore.SecretKeyEntry`\
  \ 中。\n\n该密码在标准密钥密码（`keypass`）之外提供了另一层安全保护，因为密钥密码用于保护它。当用户发出此命令时，他们必须提供 `–keypass`\
  \ 选项以及密钥库密码，否则系统会提示他们输入。\n\n22-4\\. 生成最强的随机数\n\n问题\n\n你正在为某些安全上下文（例如 RSA 密钥）生成随机数。\n\
  \n解决方案\n\n使用 `SecureRandom.getInstanceStrong()` 方法生成一个 `SecureRandom` 对象，该对象是通过使用\
  \ `SecureRandom.strongAlgorithmsSecurity` 属性中指定的算法或提供者来选择的。\n\n在以下示例中，使用 `getInstanceStrong()`\
  \ 方法生成了一个 `SecureRandom` 对象。然后从该 `SecureRandom` 实例生成一个种子，该种子稍后可用于某些安全目的。\n\nSecureRandom\
  \ strongSecure = SecureRandom.getInstanceStrong();\n\nbyte seed[] = strongSecure.generateSeed(20);\n\
  \n工作原理\n\n在某些情况下，需要安全的随机密钥。一种情况是生成 RSA 公钥和私钥。在这些情况下，`SecureRandom getInstanceStrong()`\
  \ 方法返回一个 `SecureRandom` 对象，该对象是通过使用 `secureRandom.strongAlgorithms` 安全策略中指定的算法和提供者来选择的。\n\
  \n你可以通过调用 `Security.getAlgorithms()` 方法并传入 Java 加密服务名称来获取这些算法。\n\n22-5\\. 为富互联网应用程序授予权限\n\
  \n问题\n\n你希望基于 HTTP（而非任何类型的 TCP 连接）来管理应用程序的权限。\n\n此外，你希望为 HTTP 权限指定主机名，而不是单个 IP 地址。\n\
  \n解决方案\n\n使用 Java 8 中引入的 `java.net.URLPermission` 类，以定义比标准 `java.net.SocketPermission`\
  \ 提供的更高级别的权限。这样做将允许你在 HTTP 请求方法和 URL 方案的上下文中表达权限。在以下示例中，`URLPermission` 类用于访问 [`www.apress.com`](http://www.apress.com/)\
  \ 网站上的作者 URL。`URLPermission` 类表示访问由给定 URL 定义的资源的权限，以及一组用户可设置的请求方法和请求标头。\n\n在这种情况下，`URLPermission`\
  \ 类表示在 apress.com 网站上作者 URL 处定义的资源。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 22 章 安全\n\npublic static void main(String[] a) {\n\nURLPermission urlPermission\
  \ = new URLPermission(\" [`www.apress.com/index.php/author/author/`](https://www.apress.com/index.php/author/author/view/id/1866)\n\
  \n[view/id/1866](https://www.apress.com/index.php/author/author/view/id/1866)\"\
  ); try {\n\nAccessController.checkPermission(urlPermission);\n\nSystem.out.println(\"\
  Ok to open socket\");\n\n} catch (AccessControlException ace) {\n\nSystem.out.println(ace);\n\
  \n}\n\n}\n\n在这种情况下，权限将被拒绝，因为此 URL 指向一个私有主机。但是，如果你构建了一个执行回调到远程应用程序服务器的应用程序，则该主机会执行有效性检查，然后为有效请求提供打开套接字的权限。\n\
  \n工作原理\n\n通常，沙盒应用程序需要使用权限来访问远程资源。在 Java 8 之前，`java.net.SocketPermission` 用于对此类资源执行访问控制。使用\
  \ `SocketPermission` 存在问题，因为此权限无法区分 HTTP 连接和可能不被允许的其他 TCP 连接。`SocketPermissions`\
  \ 也基于 IP 地址而非主机名进行操作。此限制阻止了根据指定主机名（而非单个 IP 地址）进行访问控制。在同一个 IP 地址托管多个虚拟服务器的情况下，使用\
  \ `SocketPermission` 只能访问其中一个，而如果能够解析主机名，则可以访问多个。\n\n`java.net.URLPermission` 随\
  \ Java 8 的发布而引入，解决了使用 `SocketPermission` 时出现的一些问题。`java.net.URLPermission` 类用于表示访问由指定\
  \ URL 定义的单个资源或一组资源的权限。除了指定 URL 之外，还可以通过用户可定义的设置器和请求标头来指定所需的 HTTP 访问。因此，`URLPermission`\
  \ 类包含两个构造函数，一个接受基于字符串的 URL，另一个接受基于字符串的 URL 和一个操作字符串。\n\n传递给 `URLPermission` 类的 URL\
  \ 可以有多种格式，因此字符串可能因访问的资源而异。在其最简单的格式中，URL 应使用以下格式：`scheme://authority/path`\n\n例如：(\"\
  \ [`www.apress.com/*`](http://www.apress.com/*)\")\n\nURL 的方案通常是 `http` 或 `https`，但也不限于此。`authority`\
  \ 可以包含许多详细信息。至少，`authority` 将是远程资源的主机名。但是，它也可以包含用户信息、主机范围和/或端口范围。如果指定，可选的用户信息将是一个特权用户名后跟\
  \ `@` 字符。\n\n主机范围通过完全限定的 DNS 名称以及 IPv4 地址或 IPv6 地址部分来指定，每个部分由 (.) 分隔。主机范围 DNS 名称可以包含通配符\
  \ (*) 来表示 DNS 名称的某些部分。例如，你可以使用以下内容来表示仅匹配最右侧域标签的主机名：\n\n[\"*.apress.com\"](http://apress.com)\
  \ 。\n\nURL 的端口范围部分用于指定单个端口号，或权限授予访问权限的端口的有界或无界范围。任何无效的端口号或范围都将导致使用 HTTP 的默认端口 80\
  \ 或 HTTPS 的默认端口 443。你也可以使用端口范围中的通配符 (*) 来表示所有端口。\n\nURL 的路径部分由主机服务器中的一系列路径组成，由 `/`\
  \ 字符分隔。该路径与 `FilePermission` 非常相似，但可以留空以表示对主机资源根的权限。该路径可用于通过在末尾列出单个资源来指定对其的访问。例如，577\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 22 章 安全\n\n要访问单个 HTML 文件，你可以指定\
  \ [www.mydns.com/mypage.html](http://www.mydns.com/mypage.html)。该路径还可以包含通配符 `*`\
  \ 和 `-`。`*` 指定同一目录中的所有资源，而 `-` 指定给定路径下递归的所有资源。\n\n`URLPermission` 的第二个参数是一个操作字符串。该字符串分别是操作列表和请求标头列表的串联。操作字符串分别包含权限允许的请求方法和允许的请求标头的列表。请求方法选项是\
  \ HTTP 请求方法 `PUT`、`GET` 和 `DELETE`。\n\n\n\n请求头是可选的，但如果存在，它们通过冒号（:）与请求方法分隔。操作字符串中不允许有空格，并且区分大小写。你也可以分别使用通配符（*）来表示所有请求方法或请求头。以下是一些示例：\n\
  \nu 无请求方法：\"PUT,GET,DELETE\"\n\nu 请求方法和请求头：\"PUT,GET:MyHeader1,MyHeader2\"\n\nu\
  \ 所有请求方法：\"*\"\n\n`URLPermission` 类提供了比 `SocketPermissions` 更严格的安全级别，因为它更侧重于 URL\
  \ 和主机访问。对于沙盒化的富互联网应用程序，Java 8 不再允许对源主机使用 `SocketPermissions`，这意味着从 Java 8 开始，来自\
  \ JavaScript 代码对应用程序的调用将不会被授予 `SocketPermissions`。现在，所有级别的富互联网应用程序的主 JAR 文件的清单中都需要\
  \ `Permissions` 属性。\n\n总结\n\nJava 8 中添加或增强了多项新的安全特性。本章仅涵盖了其中一部分新特性，包括为 `doPrivilege`\
  \ 块提供有限权限、用于安全握手的 SNI，以及对沙盒化富互联网应用程序权限的更多控制。有关这些新安全特性的更多信息，请参考在线文档，以便你的应用程序使用最强大的安全选项。\n\
