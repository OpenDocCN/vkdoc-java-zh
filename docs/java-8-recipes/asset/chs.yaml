  \n问题\n\n你需要一个简单的数据结构，能够存储固定（可能很大）数量的同类型数据，并提供快速的顺序访问。\n\n解决方案\n\n考虑使用数组。虽然 Java\
  \ 提供了更复杂和灵活的集合类型，但数组类型对于许多应用来说仍然是一种有用的数据结构。下面的例子演示了使用数组的简便性。`GradeAnalyzer` 类提供了一种计算各种与成绩相关的统计数据的方法，例如平均分、最低分和最高分。\n\
  \n// 参见 GradeAnalyzer.java\n\npublic class GradeAnalyzer {\n\n    // 内部成绩数组\n\n\
