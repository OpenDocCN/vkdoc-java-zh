  \n第 19 章 电子邮件\n\nprivate Address[] getRecipients(List<String> emails) throws AddressException\
  \ {\n\nAddress[] addresses = new Address[emails.size()];\n\nfor (int i =0;i < emails.size();i++)\
  \ {\n\naddresses[i] = new InternetAddress(emails.get(i));\n\n}\n\nreturn addresses;\n\
  \n}\n```\n\n**工作原理**\n\n通过使用 `Message` 对象的 `setRecipients()` 方法，您可以在同一消息上指定多个收件人。`setRecipients()`\
  \ 方法接受一个 `Address` 对象数组。在本配方中，由于您有一个字符串集合，因此您创建一个与集合大小相同的数组，并创建 `InternetAddress`\
  \ 对象来填充该数组。使用多个电子邮件地址发送电子邮件（相对于单独发送电子邮件）效率更高，因为从您的客户端到目标邮件服务器只发送一条消息。然后，每个目标邮件服务器将把邮件投递到其拥有邮箱的所有收件人。例如，如果您要发送到五个不同的\
  \ [yahoo.com](http://yahoo.com/) 账户，[yahoo.com](http://yahoo.com/) 邮件服务器只需接收一份消息副本，并将该消息投递给消息中指定的所有\
  \ [yahoo.com](http://yahoo.com/) 收件人。\n\n**提示** 如果您想发送批量消息，您可能希望将收件人类型指定为 `BCC`，这样收到的电子邮件就不会显示还有谁也在接收该邮件。为此，请在\
  \ `setRecipients()` 方法中指定 `Message.RecipientType.BCC`。\n\n**19-6. 检查电子邮件**\n\n**问题**\n\
