- "# 10. Groovy GPars\n\nGPars^(²¹) 是一个开源项目，旨在为 Java 和/或 Groovy 带来多种并发抽象。它曾短暂地捆绑在\
  \ Groovy 中，后来被分离出来。\n\n它包含了并行 map/reduce、Actor、Dataflow 以及许多其他并发模型。尽管任何为 Java 编写的并发库（如\
  \ RxJava、Project Reactor 或 Akka）都可以与 Groovy 一起使用，但 GPars 是专门为 Groovy 设计的。\n\n##\
  \ 入门指南\n\n首先，你需要在项目中引入 GPars。例如，在 Gradle 构建文件中，将以下内容添加到 `dependencies` 块中：\n\n```\n\
  compile \"org.codehaus.gpars:gpars:1.2.1\"\n```\n\n对于 Maven 构建，将以下内容添加到依赖项中：\n\n\
  ```\n<dependency>\n    <groupId>org.codehaus.gpars</groupId>\n    <artifactId>gpars</artifactId>\n\
  \    <version>1.2.1</version>\n</dependency>\n```\n\n## 并行 Map Reduce\n\n在本节中，我们将使用一个包含毕业年份和\
  \ GPA 的学生列表。\n\n```\nclass Student { int graduationYear; double gpa; }\n// 创建一个学生列表\n\
  Collection<Student> students = new ArrayList<>()\n```\n\n你可以通过以下方式使用 GPars 库执行并行\
  \ map/reduce：\n\n```\n1   GParsPool.withPool {\n2       // 一种 map-reduce 函数式风格\n\
  3       def bestGpa = students.parallel\n4           .filter{ s -> s.graduationYear==Student.THIS_YEAR\
  \ }\n5           .map{ s -> s.gpa }\n6           .max()\n7   }\n```\n\n静态方法 `GParsPool.withPool`\
  \ 接收一个闭包，并使用多种方法（通过 Groovy 的 Category 机制）增强任何集合。`parallel` 方法实际上从给定的集合创建了一个 `ParallelArray`（JSR-166^(²²)），并对其进行了轻量封装。^(²³)\n\
  \n## Actors\n\n*Actor 设计模式* 是开发并发软件的一种有用模式。在该模式中，每个 Actor 在自己的线程中执行并操作自己的数据。数据不能被任何其他线程操作。消息（由\
  \ GPars 内部）在 Actor 之间传递，以促使它们更改数据。你也可以创建无状态的 Actor。\n\n当数据一次只能被一个线程更改时，这被称为*线程安全*。\n\
  \n```\n0   @Grab(\"org.codehaus.gpars:gpars:1.2.1\")\n1   import groovyx.gpars.actor.Actor\n\
  2   import groovyx.gpars.actor.DefaultActor\n\n4   class Dragon extends DefaultActor\
  \ {\n5       int age\n\n7       void afterStart() {\n8           age = new Random().nextInt(1000)\
  \ + 1\n9       }\n11       void act() {\n12           loop {\n13               react\
  \ { int num ->\n14                 if (num > age)\n15                 reply 'too\
  \ old'\n16                 else if (num < age)\n17                 reply 'too young'\n\
  18                 else  {\n19                   reply 'you guessed right!'\n20\
  \                   terminate()\n21                 }\n22               }\n23  \
  \         }\n24       }\n25   }\n26   // 猜测龙的年龄\n27   class Guesser extends DefaultActor\
  \ {\n28       String name\n29       Actor server\n30       int myNum\n\n32     \
  \  void act() {\n33           loop {\n34             myNum = new Random().nextInt(1000)\
  \ + 1\n35             server.send myNum\n36             react {\n37            \
  \   switch (it) {\n38                 case 'too old': println \"$name: $myNum was\
  \ too old\"; break\n39                 case 'too young': println \"$name: $myNum\
  \ was too young\"; break\n40                 default: println \"$name: I won $myNum\"\
  ; terminate(); break\n41               }\n42             }\n43           }\n44 \
  \        }\n45   }\n\n47   def  master = new  Dragon().start()\n48   def player\
  \ = new Guesser(name: 'Guesser', server: master).start()\n\n50   // 这强制主线程保持活跃，直到两个\
  \ Actor 都停止\n51   [master, player]*.join()\n```\n\n这里，`Dragon` 类以一个介于 1 到 1000 之间的随机年龄开始。然后它对给定的数字做出响应，回复该数字是太大、太小还是与其年龄相同。`Guesser`\
  \ 类循环执行，每次循环生成一个随机猜测，并将其发送给 `Dragon`（称为 `server`）。然后 `Guesser` 对来自 `Dragon` 的消息做出响应，并在猜对年龄时终止。\n\
  \n输出将类似于以下内容：\n\n```\nGuesser: 236 was too young\n... 许多其他猜测\nGuesser: 819 was too\
  \ old\nGuesser: I won 527\n```\n\n## 更多 GPars 特性\n\n有关 GPars 其他部分的更多信息，例如 Agents（与\
  \ Actor 非常相似，但以函数作为消息）、Dataflow（一种具有确定性行为的替代并发模型）和 STM（软件事务内存，为开发者提供处理内存状态的事务语法），请参阅\
  \ GPars 优秀的在线指南。^(²⁴)\n\n脚注 1   2   3   4\n\n"
- '# 第三部分 Groovy 生态系统


  Groovy 生态系统


  Groovy 生态系统由许多基于 Groovy 构建（或将其作为可选支持）的不同框架和库组成。


  '
- '# 11. Groovy 的精彩之处


  本章简要介绍了 Groovy 生态系统中的各种实用框架。其中一些将在后续章节中更详细地描述。




  ## Web 与 UI 框架


  以下这些 Web 和用户界面框架要么构建于 Groovy 之上，要么支持 Groovy。


  ### Grails^(²⁵)


  一个受 Ruby on Rails 启发的 Web 框架。它拥有至少 800 个插件，并采用“约定优于配置”的方法。


  ### Micronaut^(²⁶)


  一个较新的框架，用于构建微服务、无服务器应用或命令行应用，具有内存占用小、启动速度快的特点，并采用编译时注解处理。由 Grails 背后的同一团队构建。


  ### Griffon^(²⁷)


  一个用于构建 Swing 用户界面的框架。它的命令行界面与 Grails 非常相似。例如，`create-app cool -archetype=jumpstart`。


  ### Vert.x^(²⁸)


  一个用于异步应用开发的框架。严格来说它不是一个 Groovy 项目，但你可以使用它。它目前是 Eclipse 基金会的一个项目。^(²⁹)


  ### Ratpack^(³⁰)


  一个用于 JVM 上异步 Web 应用和 Web 服务（微服务）的工具包。构建于 Netty 之上。


  ## 云计算框架


  在当今的编程世界中，云计算已成为主流需求。以下是针对两个流行云平台的两个有用的 Groovy 框架。


  ### Gaelyk^(³¹)


  对 GAE（Google App Engine）的一个抽象；它拥有一个新兴的插件系统。


  ### Caelyf^(³²)


  一个基于 Apache 2 许可的 CloudFoundry 框架。它与 gaelyk 类似。


  ## 构建框架


  没有构建框架，任何项目都是不完整的。Gradle 在过去几年中变得越来越流行，尤其是在构建 Java 项目方面。它也是 Android 和 Grails 项目的默认构建框架。


  ### Gradle^(³³)


  它使用基于 Groovy 的 DSL 来构建项目（也增加了基于 Kotlin 的 DSL），并使用 `build.gradle` 作为主要的构建文件。它拥有非常庞大的插件生态系统，可用于构建任何类型的应用。


  ### Gant^(³⁴)


  类似于 Groovy 中的 Ant。它目前处于维护模式。过去曾被 Grails 和 Griffon 使用。


  ## 测试框架/代码分析


  测试对于任何项目都极其重要，而代码分析有时对大型项目很有用。我们将在后面的章节中介绍其中一个名为 Spock 的框架。


  ### Spock^(³⁵)


  一个非常出色的、基于 Groovy 的 DSL 测试框架，已经存在多年。它能够使用数据表作为测试输入，内置模拟类和接口的能力，以及许多其他功能。


  ### Codenarc^(³⁶)


  Groovy 的静态代码分析工具，自 2009 年以来就已存在。它拥有 Grails 和 Griffon 的插件。


  ## 并发


  如前所述，并发对于高效应用充分利用硬件至关重要。


  ### GPars^(³⁷)


  一个用于 Groovy 的多线程框架。它提供了 fork/join 抽象、Actor、Dataflow、STM 等功能。


  ### RxGroovy^(³⁸)


  这是 RxJava 的一个 Groovy 适配器，RxJava 是一个使用 JVM 上的可观察序列来组合异步和基于事件的程序的库。不过，它已不再是必需的——你可以直接使用
  RxJava 库。


  ## 其他


  这些是社区创建的其他工具，用于管理已安装的编程框架和工具，以及创建新项目。


  ### SDKMAN^(³⁹)


  最初称为 Groovy enVironment Manager（GVM）。现在称为 SDKMAN（软件开发工具包管理器），非常酷。它允许你管理多个 Groovy
  和非 Groovy SDK 的多个版本，包括 Groovy 本身。


  ### Lazybones^(⁴⁰)


  一个简单的项目创建工具，使用打包的项目模板。可以通过 sdkman 安装。它创建启动各种类型项目所需的基本文件。例如，它有一个 Ratpack 模板。


  ### GrooCSS^(⁴¹)


  一个基于 Groovy 的 DSL，用于创建 CSS。它与 LESS 非常相似，但拥有 Groovy 所能提供的一切。


