- "# 13. Grails\n\nGrails 是一个面向 Groovy 的 Web 框架，它效仿 *Ruby on Rails*，成为一个带有命令行工具、能快速完成任务的固执己见的\
  \ Web 框架。Grails 采用约定优于配置的原则来减少配置开销。\n\nGrails 牢固地立足于 Java 生态系统，并构建在 Spring 和 Hibernate\
  \ 等技术之上。Grails 还（可选地）包含一个名为 *GORM* 的对象关系映射（ORM）框架，并拥有大量插件。\n\n不同版本的 Grails 可能差异很大，因此在升级\
  \ Grails 应用程序时需要格外小心，尤其是主版本升级（例如从 2.5 升级到 3.0）。\n\n本章将快速概述 Grails（3.3）的工作原理，然后简要介绍\
  \ Grails 的历史。\n\n## Grails 快速概览\n\n安装 Grails 后，^(⁴⁴) 你可以通过在命令行运行以下命令来创建一个应用（将 `TEST`\
  \ 替换为你想要使用的目录名称）：\n\n```\n1   $ grails create-app TEST\n```\n\n默认情况下，这将使用“web”配置文件创建一个应用（要获取可用配置文件列表，请运行\
  \ `grails list-profiles`）。\n\n然后，你可以运行 `create-domain-class` 和 `generate-all` 等命令来逐步创建你的应用。运行\
  \ `grails help` 可查看所有可用命令的完整列表。\n\nGrails 应用具有非常特定的项目结构。以下是该结构*大部分内容*的简单分解：\n\n\
  *   `grails-app` — Grails 专用文件夹。\n    *   `assets`\n        *   `images` — Web 应用使用的图片。\n\
  \        *   `javascripts` — 存放 JavaScript 文件。\n        *   `stylesheets` — CSS\
  \ 样式表。\n    *   `conf` — 配置，例如 `application.yml` 或 `application.properties` 文件。\n\
  \    *   `controllers` — 应用的控制器和 `UrlMappings` 类。提供用于 list、save、show 和 create 等操作的代码。\n\
  \    *   `domain` — 领域模型；如果你使用 GORM，这里存放表示持久化数据的类。\n    *   `i18n` — 消息资源包，使你能够提供多种不同语言的文本。\n\
  \    *   `init` — 包含 `Application.groovy` 和 `BootStrap.groovy`。\n    *   `services`\
  \ — 后端服务，存放后端或“业务”逻辑。\n    *   `taglib` — 你可以在此处非常轻松地定义自己的标签，以便在 GSP 文件中使用。\n  \
  \  *   `views` — MVC 的视图；通常是 GSP 文件（基于 HTML）。\n    *   `utils` — 可以包含工具类。\n*   `src`\
  \ — 任何不适合放在其他位置的通用代码。\n    *   `main/java` — Java 代码\n    *   `main/groovy` — Groovy\
  \ 代码\n    *   `main/resources` — 你想要放在主类路径中的任何非代码资源。\n    *   `test/groovy` — 基于\
  \ Groovy 的测试，可以使用 JUnit 或 Spock。\n    *   `integration-test/groovy` — 包含基于 Geb 的测试。\n\
  \    *   `integration-test/resources` — 包含用于配置 Geb 的 `GebConfig.groovy`。\n\n要创建一个新的领域（模型）类，请运行如下命令：\n\
  \n```\n1   $ grails create-domain-class example.Post\n```\n\n为你的领域类包含一个包是一个好习惯（这里包名是“`example`”，类名是\
  \ Post）。\n\nGrails 中的领域类还定义了其到数据库的映射。例如，下面是一个表示博客文章的领域类（假设 `User` 和 `Comment` 已经创建）：\n\
  \n```\n1   class  Post  {\n2       String text\n3       int rating\n4       Date\
  \ created = new  Date()\n5       User createdBy\n\n7       static hasMany = [comments:\
  \ Comment]\n\n9       static constraints = {\n10           text(size:10..5000)\n\
  11       }\n12   }\n```\n\n静态字段 `hasMany` 是一个映射，表示数据库中的一对多关系。GORM 在后台使用 Hibernate\
  \ 为所有领域类和关系创建表。默认情况下，每个表都会获得一个用于主键的 `id` 字段。\n\n要让 Grails 自动创建你的控制器和视图，请运行以下命令：\n\
  \n```\n1   $ grails generate-all example.Post\n```\n\n### ![../images/426440_2_En_13_Chapter/426440_2_En_13_Figa_HTML.gif](img/426440_2_En_13_Figa_HTML.gif)警告\n\
  \n如果文件已存在，Grails 会询问你是否要覆盖。使用此命令时请小心。\n\n当你想要直接运行应用程序进行测试时，只需运行以下命令：\n\n```\n1 \
  \  $ grails run-app\n```\n\n如果你想部署到应用容器（例如 Tomcat），可以通过运行以下命令创建一个 `war` 文件：\n\n\
  ```\n1   $ grails war\n```\n\n## 配置\n\n由于 Grails 3+ 构建在 Spring Boot 之上，因此配置的工作方式类似，默认使用\
  \ `grails-app/conf/application.yml` 文件。\n\n在此文件的底部附近，你会看到默认配置为开发环境和测试环境使用内存型 h2\
  \ 数据库，为生产环境使用基于文件的 h2 数据库。它们的配置如下（你可以在此处更改配置以切换数据库）：\n\n```\ndevelopment:\ndataSource:\n\
  dbCreate: create-drop\nurl: jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
  test:\ndataSource:\ndbCreate: update\nurl: jdbc:h2:mem:testDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
  production:\ndataSource:\ndbCreate: none\nurl: jdbc:h2:./prodDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
  properties:\njmxEnabled: true\ninitialSize: 5\n...(为简洁起见已截断)\n```\n\n## 插件\n\nGrails\
  \ 生态系统包含超过 100 个插件。要列出所有插件，只需执行以下命令：\n\n```\n1   $ grails list-plugins\n```\n\n\
  当你选定了要使用的插件后，执行以下命令可查看可用版本以及如何将其包含在构建依赖项中（使用插件名称）：\n\n```\n1   $ grails plugin-info\
  \ [NAME]\n```\n\n这将显示要添加到 `build.gradle` 文件中的适当代码，以便将插件添加到你的项目中。例如，让我们查看一下“geb”插件（Geb\
  \ 是一个 Web 测试框架）。以下是输出结果：\n\n```\n$ grails plugin-info geb\n| Plugin Info: geb\n\
  | Latest Version: 2.0.0\n| All Versions: 1.0.2,1.1.1,1.1.2,1.1.3,1.1.4,1.1.5,2.0.0.RC1,2.0.0\n\
  | Title: Geb Plugin\nPlugin that adds Geb functional testing code generation features.\n\
  * License: APACHE\n* Documentation: http://grails.org/plugin/geb\n* Issue Tracker:\
  \ http://github.com/grails3-plugins/geb/issues\n* Source: http://github.com/grails3-plugins/geb\n\
  * Definition:\ndependencies {\ncompile \"org.grails.plugins:geb:2.0.0\"\n}\n```\n\
  \n\n\n## GSP 与标签库\n\nGrails 默认使用 GSP 在 Web 应用程序中生成视图。请查看 `grails-app/views` 目录。你应该会看到一个\
  \ `index.gsp` 文件，它用于生成应用程序的登录页面。如果你按照之前的说明生成了 `example.Post` 视图，你还会在“post”目录下看到一些\
  \ GSP 文件。这些文件用于生成展示、列表、创建和编辑帖子的页面。\n\nGSP 基于 HTML，并添加了其内置的标签库（以 `g:` 前缀开头）。你可以通过向\
  \ `grails-app/taglib` 目录添加一个以 `TagLib` 结尾的类来添加自己的标签库。例如，在 `taglib` 目录中添加一个名为 `SimpleTagLib.groovy`\
  \ 的文件，并包含以下代码（该代码将使用指定格式格式化日期）：\n\n```\nclass SimpleTagLib {\nstatic namespace =\
  \ \"my\" // 从 g: 命名空间更改为 my:\ndef dateFormat = { attrs, body ->\nout << new\njava.text.SimpleDateFormat(attrs.format).format(attrs.date)\n\
  }\n}\n```\n\n现在，你就可以在你的 GSP 文件中使用以下标签了：\n\n```\n\n提供 JSON 或 XML\n\nGroovy 包含一些对\
  \ JSON（JavaScript 对象表示法）编码和解码的内置支持，包括 `JsonSlurper`。Grails 还包含转换器，可以轻松地将对象转换为 XML\
  \ 或 JSON，反之亦然。例如，请看下面的 `PostController`，它包含了将 `Post` 渲染为 JSON 和 XML 的方法：\n\n```\n\
  1   import grails.converters.JSON\n2   import grails.converters.XML\n\n4   class\
  \  PostController  {\n5               def getPosts() {\n6                      \
  \ render Post.list() as JSON\n7               }\n8               def getPostsXML()\
  \ {\n9                       render Post.list() as XML\n10               }\n11 \
  \  }\n```\n\n对于提供多种格式的 Web 服务，你可以使用 Grails 内置的 `withFormat`。因此，上述代码可以简化为以下形式：\n\n\
  ```\n1   def getPosts() {\n2           withFormat {\n3                   json {\
  \ render list as JSON }\n4                   xml { render list as XML }\n5     \
  \      }\n6   }\n```\n\n然后，Grails 会根据多种输入来决定使用哪种格式，最简单的方式是通过 URL 的扩展名（例如 `.json`）或请求的\
  \ `Accept` 头。要在 Grails 中*使用* Web 服务，你可以使用 http-builder-helper 插件^(⁴⁵)，或者使用 Micronaut（包含在\
  \ Grails 4 中）内置的 HTTP 客户端。\n\nUrlMappings\n\n默认情况下，Grails 会读取 `UrlMappings` 类来确定如何将传入的请求路由到你的\
  \ Web 应用程序。它包含一个名为“mappings”的静态值，该值使用 DSL 来描述应用程序的路由。新项目的默认 `UrlMappings` 如下所示：\n\
  \n```\nclass UrlMappings {\nstatic mappings = {\n\"/$controller/$action?/$id?(.$format)?\"\
  {\nconstraints {\n// 在此处应用约束\n}\n}\n\"/\"(view:\"/index\")\n\"500\"(view:'/error')\n\
  \"404\"(view:'/notFound')\n}\n}\n```\n\n第一个 GString 中的变量 `controller`、`action`、`id`\
  \ 和 `format` 在此上下文中具有特殊含义。以这种方式使用它们将匹配任何给定的值，并将相应的变量设置为该值。例如，路径 **/post/show/123**\
  \ 将使用参数 ID 123 在 `PostController` 上启动“show”操作。你可以修改映射以创建自定义路径。例如，你可以像这样创建一个自定义路由来创建新帖子：`\"\
  /new/post/\" (controller: \"post\", action: \"create\")`。第一个匹配的路径就是 Grails 将使用的路由。\n\
  \nGrails 简史\n\n以下是自 2.0 版本以来 Grails 新增功能的简要历史。\n\nGrails 2.0\n\nGrails 2.0 有以下改进：\n\
  \n*   更好的错误页面，显示导致问题的代码。\n*   开发模式下的 H2 数据库控制台（位于 URI `/dbconsole`）。\n*   Grails\
  \ 2.0 支持 Groovy 1.8。\n*   对类型化服务、领域类、`src/groovy` 和 `src/java` 的运行时重载。\n*   使用 `-reloading`\
  \ 运行任何命令以动态重载它。\n*   二进制插件（jars）。\n\n\n\n*   更好的脚手架，符合 HTML 5 规范（支持移动端/平板设备）。\n\n\
  *   面向服务的 PageRenderer 和 LinkGenerator API。\n\n*   支持 Servlet 3.0 异步 API；事件插件；平台核心。\n\
  \n*   资源插件已集成到核心中。\n\n*   用于 GZIP、缓存、打包的插件（`install-plugin cached-resources`、`zipped-resources`）。\n\
  \n*   新增标签：`img`、`external` 和 `javascript`。\n\n*   jQuery 插件现在是 Grails 应用程序中默认安装的\
  \ JavaScript 库。\n\n*   `params` 对象新增了一个 `date` 方法，用于轻松、空安全地解析日期：`def val = params.date('myDate',\
  \ 'dd-MM-yyyy')`。\n\n各种 GORM 改进包括：\n\n*   支持 `DetachedCriteria` 以及新的 `findOrCreate`\
  \ 和 `findOrSave` 方法。\n\n*   GORM 支持 MongoDB、^(⁴⁶) riak、^(⁴⁷) Cassandra、^(⁴⁸) neo4j、^(⁴⁹)\
  \ redis、^(⁵⁰) 和 Amazon SimpleDB。^(⁵¹)\n\n*   新的编译时检查查询 DSL（“where”方法，接受一个 Closure\
  \ 参数），包括：`avg`、`sum`、`subqueries`、`.size()` 等。\n\n*   多作用域数据源。\n\n*   添加了用于更新生产数据库的数据库迁移插件。\n\
  \nGrails 2.1\n\n*   Grails 的 Maven 支持在多个重要方面得到了改进。例如，现在可以在 `pom.xml` 文件中指定插件。\n\n\
  *   `grails` 命令现在支持 `-debug` 选项，该选项将启动远程调试代理。\n\n*   默认安装缓存插件。\n\n*   在 Grails 2.1.1\
  \ 中，领域类现在拥有名为 `first` 和 `last` 的静态方法，用于从数据存储中检索第一个和最后一个实例。\n\nGrails 2.2\n\n*  \
  \ Grails 2.2 支持 Groovy 2。\n\n*   为条件查询添加了新功能，以提供对 Hibernate 的 SQL 投影 API 的访问。\n\n\
  *   支持在开发模式下对 Tomcat 容器进行分叉 JVM 执行。\n\n*   改进了对管理应用程序及其插件提供的工件之间命名冲突的支持。\n\nGrails\
  \ 2.3\n\n*   默认使用与 Maven 相同的库（Aether）改进了依赖管理。\n\n*   包含一个新的数据绑定机制，比之前版本使用的数据绑定器更灵活、更易于维护。\n\
  \n*   所有主要命令现在都可以分叉到单独的 JVM 中执行，从而将构建路径与运行时和测试路径隔离开来。\n\n*   Grails 的 REST 支持得到了显著改进。\n\
  \n*   Grails 的脚手架功能已拆分为一个单独的插件（包括对生成 REST 控制器、异步控制器和 Spock 单元测试的支持）。\n\n*   包含新的异步编程\
  \ API，允许对请求进行异步处理，并与 GORM 无缝集成。\n\n*   控制器现在可以在命名空间中定义，允许在不同包中定义多个同名的控制器。\n\nGrails\
  \ 2.4\n\n*   Grails 2.4 附带 Groovy 2.3。\n\n*   默认使用 Hibernate 4.3.5。（Hibernate 3\
  \ 仍可作为可选安装使用。）\n\n*   Asset-Pipeline 取代了 Resources 来提供静态资源。\n\n*   现在对静态类型检查和静态编译提供了出色的支持。`GrailsCompileStatic`\
  \ 注解（来自 `grails.compiler` 包）的行为与 `groovy.transform.CompileStatic` 注解非常相似，并为 Grails\
  \ 提供了特殊处理。\n\nGrails 2.5\n\n*   升级到 Groovy 2.4\n\n*   Spring 升级到 4.1\n\n*   其他各种升级\n\
  \nGrails 3.1.x\nGrails 3 代表了 Grails 的一次重大重构。公共 API 现在位于 `grails` 包中，并且所有内容都已重写以使用\
  \ Traits。每个新项目还包含一个带有传统静态 void main 方法的 `Application` 类。\nGrails 3 附带 Groovy 2.4、Spring\
  \ 4.1 和 Spring Boot 1.2，并且构建系统使用 Gradle（取代了之前使用的 Gant 系统）。\n\n\n\n在其他变更中，过滤器（filters）的使用已被弃用，应替换为拦截器（interceptors）。要创建一个新的拦截器，请使用以下命令：\n\
  \n```\n1   grails create-interceptor MyInterceptor\n```\n\n一个拦截器包含以下方法：\n\n*   `before`\
  \ 方法在匹配的动作执行之前执行。其返回值决定该动作是否应执行，从而允许你取消该动作。\n\n*   `after` 方法在动作执行之后、视图渲染之前执行。其返回值决定视图渲染是否应执行。\n\
  \n*   `afterView` 方法在视图渲染完成之后执行。\n\n```\n1   boolean before() { true }\n2   boolean\
  \ after() { true }\n3   void afterView() {}\n```\n\nGrails 3 内置了对使用 `create-functional-test`\
  \ 命令进行 Spock/Geb 功能测试的支持。\n\nGrails 4\n\nGrails 4 更新了底层库（如 Spring Boot）的版本，并将 Micronaut\
  \ 集成到了核心中。以下是 Grails 4.0 支持的最低库版本：\n\n*   Spring 5.1\n\n*   Spring Boot 2.1\n\n\
  *   Java 8\n\n*   Hibernate 5.4\n\n*   Groovy 2.5\n\n测试\n\nGrails 通过混入（mixin）方式支持单元测试。它包含以下注解：\n\
  \n*   `@TestFor(X)`——指定被测类\n\n*   `@Mock(Y)`——为指定类创建模拟对象\n\n对于测试，GORM 提供了一个使用 `ConcurrentHashMap`\
  \ 的内存模拟数据库。你可以为标签库、命令对象、URL 映射、XML 和 JSON 等创建测试。\n\n缓存插件\n\n缓存插件可用于缓存内容，以提升 Web\
  \ 应用程序的性能。\n\n*   你可以在服务或控制器方法上添加 `@Cacheable` 注解。\n\n*   缓存标签包括 `cache:block` 和\
  \ `cache:render`。\n\n*   相关插件包括 `cache-ehcache`、`cache-guava` 和 `cache–headers`。\n\
  \n![../images/426440_2_En_13_Chapter/426440_2_En_13_Figb_HTML.gif](img/426440_2_En_13_Figb_HTML.gif)仅为概述\n\
  以上是对 Grails 的简要概述。关于 Grails 及其使用方法已有许多书籍。如需更多关于使用 Grails 的信息，请访问 [`https://grails.org`](https://grails.org)。^(⁵²)\n\
  \n![../images/426440_2_En_13_Chapter/426440_2_En_13_Figc_HTML.gif](img/426440_2_En_13_Figc_HTML.gif)练习\n\
  创建你自己的 Grails 应用。\n\n脚注\n\n14. Spock\n\nSpock^(⁵³) 是一个用于 Java 和 Groovy 应用程序的测试框架，它充分利用了\
  \ Groovy 的特性，并集成了对象模拟功能。Spock 网站^(⁵⁴) 对 Spock 的描述如下：\n\n*   Spock 是一个用于 Java 和 Groovy\
  \ 应用程序的测试和规范框架。其与众不同之处在于它优美且极具表现力的规范语言。得益于其 JUnit 运行器，Spock 与大多数 IDE、构建工具和持续集成服务器兼容。Spock\
  \ 的灵感来源于 JUnit、RSpec、jMock、Mockito、Groovy、Scala、瓦肯人以及其他迷人的生命形式。\n\nSpock 基础\nSpock\
  \ 中测试类的基本结构是一个继承自 `spock.lang.Specification` 的类，并包含多个测试方法（这些方法可以具有描述性的字符串名称）。\n\
  Spock 处理测试代码，并允许你使用简单的 Groovy 语法来指定测试。\n每个测试由带有 `when`、`then` 和 `where` 等标签的代码块组成。学习\
  \ Spock 的最佳方式是通过示例。\n\n首先，将 Spock 作为依赖项添加到你的项目中。例如，在 Gradle 构建文件中，添加以下内容：\n\n```\n\
  1   dependencies {\n2    testCompile \"org.spockframework:spock-core:1.3-groovy-2.5\"\
  \n3   }\n```\n\n一个简单的测试\n\n让我们从重写一个简单的测试开始：\n\n```\n1   def \"toString yields the\
  \ String representation\"() {\n2           def array = ['a', 'b', 'c'] as String[]\n\
  3           when:\n4           def arrayWrapper = new ArrayWrapper(array)\n5   \
  \        then:\n6           arrayWrapper.toString() == '[a, b, c]'\n7   }\n```\n\
  \n如上所示，断言仅仅是 Groovy 的条件表达式。如果 `==` 表达式返回 `false`，测试将失败，Spock 会提供详细的输出以解释失败原因。\n\n\
  在没有 `when` 子句的情况下，你可以使用 `expect` 子句代替 `then`；例如：\n\n```\n1   def \"empty list size\
  \ is zero\"() {\n2           expect: [].size() == 0\n3   }\n```\n\n模拟\n\n在 Spock\
  \ 中模拟接口非常容易。^(⁵⁵) 只需使用 `Mock` 方法，如下例所示（其中 `Subscriber` 是一个接口）：\n\n```\n1   class\
  \  APublisher  extends  Specification {\n2     def  publisher = new  Publisher()\n\
  3     def subscriber = Mock(Subscriber)\n```\n\n现在 `subscriber` 是一个模拟对象。你可以使用重载的\
  \ `>>` 运算符来实现方法，如下所示。下面的示例在每次调用 `receive` 时抛出一个 `Exception`：\n\n```\n1   def \"\
  can cope with misbehaving subscribers\"() {\n2       subscriber.receive(_) >> {\
  \ throw   new   Exception() }\n\n4       when:\n5       publisher.send(\"event\"\
  )\n6       publisher.send(\"event\")\n\n8       then:\n9       2 * subscriber.receive(\"\
  event\")\n10   }\n```\n\n可以通过使用一个数字或范围乘以 (`*`) 方法调用来描述预期行为，如此处所示。这意味着期望此方法被调用两次；否则测试将失败。\n\
  下划线 (`_`) 被视为通配符，与 Scala 中的用法类似（这里的 _ 只是一个字段，引用 Spock 定义的对象）。\n\n数据列表或表格\n就像 JUnit\
  \ 有 DataPoints 和 Theories 一样，Spock 允许你在测试中使用数据列表或表格。\n\n例如：\n\n```\n1   def \"subscribers\
  \ receive published events at least once\"(){\n2       when: publisher.send(event)\n\
  3       then: (1.._) * subscriber.receive(event)\n4       where: event << [\"started\"\
  , \"paused\", \"stopped\"]\n5   }\n```\n\n重载的 `<<` 运算符用于为 `event` 变量提供一个列表。虽然这里是一个列表，但任何\
  \ `Iterable` 对象都可以使用。这会导致对列表中的每个值运行一次测试。\n\n范围\n这里的范围 `1.._` 表示“一次或多次”。你也可以使用 `_..3`，例如，表示“三次或更少”。\n\
  \n也可以使用表格格式的数据。例如：\n\n```\n1   def \"length of NASA mission names\"() {\n2     \
  \    expect:\n3         name.size() == length\n\n5         where:\n6         name\
  \       | length\n7         \"Mercury\"  | 7\n8         \"Gemini\"   | 6\n9    \
  \     \"Apollo\"   | 6\n10   }\n```\n\n在这种情况下，两列（`name` 和 `length`）用于替换 `expect`\
  \ 块中相应的变量。可以使用任意数量的列。\n\n预期异常\n\n在 `then` 块中使用 `\"thrown\"` 方法来预期抛出一个 `Exception`。\n\
  \n```\n1   def \"peek on empty stack throws\"() {\n2       when: stack.peek()\n\
  3       then: thrown(EmptyStackException)\n4   }\n```\n\n你也可以通过将抛出的 `Exception`\
  \ 赋值给 `thrown()` 来捕获它。例如：\n\n```\n1   def \"peek on empty stack throws\"() {\n2\
  \       when: stack.peek()\n3       then:\n4       Exception e = thrown()\n5   \
  \    e.toString().contains(\"EmptyStackException\")\n6   }\n```\n\n总结\n如你所见，Spock\
  \ 使测试更简洁易读，内置了模拟功能，最重要的是，使测试的意图清晰明了。\n\n脚注\n\n15. Ratpack\n\nRatpack^(⁵⁶) 的核心是支持异步、无状态的\
  \ HTTP 应用程序。它构建于事件驱动的网络引擎 Netty 之上。与某些 Web 框架不同，它不要求一个线程处理一个请求。相反，它鼓励你以释放当前线程的方式处理阻塞操作，从而实现高性能。\n\
  Ratpack 可用于构建响应式、RESTful 的微服务，尽管这不是强制要求。\n\n\n\nREST\n代表表述性状态转移（REpresentational\
  \ State Transfer）。^(⁵⁷) 它最初诞生于一篇博士论文，如今已成为新的 Web 服务标准，广受欢迎。在 REST 的最基本层面，每个 CRUD\
  \ 操作都映射到一个 HTTP 方法（GET、POST、PUT 等）。\n\n与 Grails 和其他流行的 Web 框架不同，Ratpack 的目标不是成为一个框架，而是一组库。尽管它是一组精简的库，但\
  \ Ratpack 内置了对 JSON、WebSocket、SSE（服务器发送事件）、SSL、SQL、日志、Dropwizard Metrics、newrelic、健康检查、hystrix\
  \ 等的支持。\nRatpack 默认使用 Guice 进行 DI（依赖注入）。\n\n![../images/426440_2_En_15_Chapter/426440_2_En_15_Figa_HTML.gif](img/426440_2_En_15_Figa_HTML.gif)提示\n\
  Ratpack 是用 Java (8) 编写的，你可以用纯 Java 编写 Ratpack 应用程序，但我们这里重点介绍 Groovy 方面的内容。\n\n脚本\n\
  \n在最简单的形式下，你可以仅使用一个 Groovy 脚本创建 Ratpack 应用程序。例如，以下脚本将运行一个简单的 Ratpack 应用程序，它始终响应“Hello\
  \ World!”：\n\n```\n1   @Grab('io.ratpack:ratpack-groovy:1.6.1')\n\n3   import static\
  \ ratpack.groovy.Groovy.ratpack\n\n5   ratpack {\n6     handlers {\n7       handler\
  \ {\n8         response.send \"Hello World!\"\n9       }\n10     }\n11   }\n```\n\
  \nGradle\n\n对于生产系统，你应该使用 Gradle 构建。Ratpack 有自己的 Gradle 插件，你可以按如下方式使用（`jcenter` 指的是\
  \ Maven 中央仓库的替代品，Bintray 的 JCenter）：\n\n```\n1   buildscript {\n2     repositories\
  \ {\n3       jcenter()\n4     }\n5     dependencies {\n6       classpath 'io.ratpack:ratpack-gradle:1.6.1'\n\
  7     }\n8   }\n\n10   apply plugin: 'io.ratpack.ratpack-groovy'\n\n12   repositories\
  \ {\n13     jcenter()\n14   }\n```\n\n使用 `ratpack-gradle` 插件，你可以运行诸如 `distZip`、`distTar`、`installApp`\
  \ 和 `run` 等任务，这些任务分别用于创建 ZIP 分发文件、创建 TAR 分发文件、在本地安装 Ratpack 应用程序以及运行应用程序。\n\n`run`\
  \ 任务对于测试驱动你的应用程序非常有用。调用 `gradle run` 后，你应该会看到以下输出：\n\n```\n1   [main] INFO ratpack.server.RatpackServer\
  \ - Starting server...\n2   [main] INFO ratpack.server.RatpackServer - Building\
  \ registry...\n3   [main] INFO ratpack.server.RatpackServer - Ratpack started (development)\n\
  4   for http://localhost:5050\n```\n\nRatpack 布局\n\n与 Grails 不同，你需要自己创建这些文件和目录（或使用\
  \ Lazybones）。\n\n*   `build.gradle`（Gradle 构建文件）\n\n*   `src`\n\n*   `main/groovy`——放置通用\
  \ Groovy 类的位置\n\n*   `main/resources`——放置静态资源（如 Handlebars 模板）的位置\n\n*   `ratpack`——包含\
  \ `Ratpack.groovy`（定义你的 Ratpack 处理器和绑定）以及 `ratpack.properties`\n\n*   `ratpack/public`——任何公共文件，如\
  \ HTML、JavaScript、图片和 CSS\n\n*   `ratpack/templates`——存放你的 Groovy 标记模板（如果有的话）\n\n\
  处理器\n\n处理器是 Ratpack 的基本构建块。它们形成类似管道或“责任链”的结构。^(⁵⁸) 每个请求可以调用多个处理器，但必须有一个返回响应。如果没有匹配到任何处理器，默认处理器将返回\
  \ 404 状态码。\n\n```\n1   import static ratpack.groovy.Groovy.ratpack\n\n3   ratpack\
  \ {\n4     handlers {\n5       all() { response.headers.add('x-custom', 'x'); next()\
  \ }\n6       get(\"foo\") {\n7           render \"foo handler\"\n8       }\n9  \
  \     get(\":key\") {\n10           def  key = pathTokens.key\n11           render\
  \ \"{\\\"key\\\": \\\"$key\\\"}\"\n12       }\n13       files { dir \"public\" }\n\
  14     }\n15   }\n```\n\n第一个处理器 `all()` 用于每个 HTTP 请求，并添加一个自定义头部。然后它调用 `next()`，以便调用下一个匹配的处理器。下一个匹配给定\
  \ HTTP 请求的处理器将用于处理该请求并返回响应。\n`pathTokens` 映射包含 URL 中传递的所有参数，这些参数在匹配路径模式中指定，例如 `:key`，通过在变量名前加\
  \ `:` 来指定。例如，如果运行上述应用程序，请求 `/abc` 将得到响应 `{\"key\":\"abc\"}`。\n\n你可以使用与任何 HTTP 方法对应的方法来定义处理器：\n\
  \n*   `Get`\n\n*   `Post`\n\n*   `Put`\n\n*   `Delete`\n\n*   `Patch`\n\n*   `Options`\n\
  \n要在同一路径上接受多种方法，你应该使用 `path` 处理器，并在其中使用 `byMethod` 配合每种方法处理器。例如：\n\n```\n1   path(\"\
  foo\") {\n2       byMethod {\n3           post() { render 'post foo'}\n4       \
  \    put() { render 'put foo'}\n5           delete() { render 'delete foo'}\n6 \
  \      }\n7   }\n```\n\n渲染\n\n有多种方式可以渲染响应。最“Groovy”的方式是使用 `groovyMarkupTemplate`\
  \ 或 `groovyTemplate` 方法。\n\n例如，以下是使用 `groovyMarkupTemplate` 的方法：\n\n```\n1   import\
  \   ratpack.groovy.template.MarkupTemplateModule\n2   import   static   ratpack.groovy.Groovy.groovyMarkupTemplate\n\
  3   import static ratpack.groovy.Groovy.ratpack\n4   ratpack {\n5     bindings {\n\
  6       module MarkupTemplateModule\n7     }\n8     handlers {\n9       get(\":key\"\
  ) {\n10           def  key = pathTokens.key\n11           render groovyMarkupTemplate(\"\
  index.gtpl\", title: \"$key\")\n12       }\n13       files { dir \"public\" }\n\
  14     }\n15   }\n```\n\n这允许你使用 Groovy 标记语言，默认情况下，它会在 `ratpack/templates` 目录中查找标记文件。例如，你的\
  \ `index.gtpl` 可能如下所示：\n\n1.  `yieldUnescaped` 将给定的字符串直接输出到生成的 HTML 中。\n\n2.  Groovy\
  \ 标记语言是一种基于 Groovy 的 DSL，用于从 Groovy 代码创建 HTML。\n\n```\n1   yieldUnescaped ''\n2\
  \   html {\n3     head {\n4       meta(charset:'utf-8')\n5       title(\"Ratpack:\
  \ $title\")\n6       meta(name: 'apple-mobile-web-app-title', content: 'Ratpack')\n\
  7       meta(name: 'description', content: “)\n8       meta(name: 'viewport', content:\
  \ 'width=device-width, initial-scale=1')\n9       link(href: '/images/favicon.ico',\
  \ rel: 'shortcut icon')\n10     }\n11     body {\n12       header {\n13        \
  \ h1 'Ratpack'\n14         p 'Simple, lean & powerful HTTP apps'\n15       }\n16\
  \       section {\n17         h2 title\n18         p 'This is the main page for\
  \ your Ratpack app.'\n19       }\n20     }\n21   }\n```\n\nGroovy 文本\n\n如果你更喜欢使用嵌入\
  \ Groovy 的纯文本文档（很像 GString），你可以使用 `TextTemplateModule`：\n\n```\n1   import ratpack.groovy.template.TextTemplateModule\n\
  2   import static ratpack.groovy.Groovy.groovyTemplate\n3   import static ratpack.groovy.Groovy.ratpack\n\
  4   ratpack {\n5     bindings {\n6       module TextTemplateModule\n7     }\n8 \
  \    handlers {\n9       get(\":key\") {\n10           def  key = pathTokens.key\n\
  11           render groovyTemplate(\"index.html\", title: \"$key\")\n12       }\n\
  13     }\n14   }\n```\n\n然后在 `src/main/resources/templates` 目录中创建一个名为 `index.html`\
  \ 的文件，内容如下：\n\n```\n1   ${model.title}\n```\n\n它会向你的模板提供一个 `model` 映射，其中包含你提供的所有参数。\n\
  \nHandlebars 和 Thymeleaf\nRatpack 还支持 Handlebars 和 Thymeleaf 模板，这是生成动态网页的两种替代方法。由于这些是静态资源，你应该将这些模板放在\
  \ `src/main/resources` 目录中。\n\n你首先需要在 Gradle 构建文件中包含相应的 Ratpack 项目：\n\n```\n1  \
  \ runtime 'io.ratpack:ratpack-handlebars:1.6.1'\n2   runtime 'io.ratpack:ratpack-thymeleaf3:1.6.1'\n\
  ```\n\n要使用 Handlebars（一种替代模板格式），请包含 `HandlebarsModule` 并按如下方式渲染 Handlebars 模板：\n\
  \n\n\n```\n1   import ratpack.handlebars.HandlebarsModule\n2   import   static \
  \  ratpack.handlebars.Template.handlebarsTemplate\n3   import static ratpack.groovy.Groovy.ratpack\n\
  4   ratpack {\n5     bindings {\n6       module HandlebarsModule\n7     }\n8   \
  \  handlers {\n9       get(\"foo\") {\n10           render handlebarsTemplate('myTemplate.html',\
  \ title: 'Handlebars')\n11       }\n12     }\n13   }\n```\n\n在 `src/main/resources/handlebars`\
  \ 目录下创建一个名为 `myTemplate.html.hbs`（`.hbs` 是 Handlebars 的后缀）的文件，并包含 Handlebars 内容。例如：\n\
  \n```\n1   {{title}}\n```\n\nThymeleaf 的工作方式类似：\n\n```\n1   import ratpack.thymeleaf.ThymeleafModule\n\
  2   import   static   ratpack.thymeleaf.Template.thymeleafTemplate\n3   import static\
  \ ratpack.groovy.Groovy.ratpack\n4   ratpack {\n5     bindings {\n6       module\
  \ ThymeleafModule\n7     }\n8     handlers {\n9       get(\"foo\") {\n10       \
  \    render thymeleafTemplate('myTemplate', title: 'Thymeleaf')\n11       }\n12\
  \     }\n13   }\n```\n\n请求的文件应命名为 `myTemplate.html`，并位于项目的 `src/main/resources/thymeleaf`\
  \ 目录中。示例内容：\n\n```\n\n```\n\nJSON\n与 Jackson JSON 编组库的集成提供了处理 JSON 的能力。\n\n`ratpack.jackson.Jackson`\
  \ 类提供了大部分与 Jackson 相关的功能。例如，要渲染 JSON，可以使用 `Jackson.json`：\n\n```\n1   import  static\
  \  ratpack.jackson.Jackson.json\n2   ratpack {\n3     bindings {\n4     }\n5   \
  \  handlers {\n6       get(\"user\") {\n7         render json([user: 1])\n8    \
  \   }\n9     }\n10   }\n```\n\nJackson 集成还包含一个用于将 JSON 请求体转换为对象的解析器。`Jackson.jsonNode()`\
  \ 和 `Jackson.fromJson(Class)` 方法可用于创建可解析的对象，以便与 `parse()` 方法一起使用。\n\n例如，以下处理器会解析一个表示\
  \ `Person` 对象的 JSON 字符串，并渲染该 `Person` 的姓名：\n\n```\n1   post(\"personNames\") {\n\
  2     render( parse(fromJson(Person.class)).map {it.name} )\n3   }\n```\n\n![../images/426440_2_En_15_Chapter/426440_2_En_15_Figb_HTML.gif](img/426440_2_En_15_Figb_HTML.gif)提示\n\
  `Context.parse` 返回一个 `ratpack.exec.Promise<T>`。`Promise<T>` 是并发编程中常用的一种模式，它允许使用简化的语法。它实现了诸如\
  \ `map` 等方法，如上所示。\n\n绑定\nRatpack 中的绑定使处理器能够访问对象。如果你熟悉 Spring，Ratpack 使用一个*注册表*，它类似于\
  \ Spring 中的应用上下文。也可以将其视为从类类型到实例的简单映射。Ratpack-Groovy 默认使用 Guice，尽管也可以使用其他直接注入框架，例如\
  \ Spring（或者完全不使用）。\n可重用的功能可以打包成模块，而不是使用正式的插件系统。你可以创建自己的模块，以正确解耦并将应用程序组织成组件。例如，你可能想创建一个\
  \ `MongoModule` 或 `JdbcModule`。或者，你也可以将应用程序拆分为服务。无论哪种方式，注册表都是放置它们的地方。\n\n注册表中的任何内容都可以在处理器中自动使用，并通过类类型从注册表中进行注入。以下是绑定实际应用的示例：\n\
  \n```\n1   bindings {\n2     bindInstance(MongoModule, new MongoModule())\n3   \
  \  bind(DragonService, DefaultDragonService)\n4   }\n5   handlers {\n6     get('dragons')\
  \ { DragonService dService ->\n7       dService.list().then { dragons ->\n8    \
  \     render(toJson(dragons))\n9       }\n10     }\n11   }\n```\n\n当 `DragonService`\
  \ 作为闭包参数（如 `dService`）被引用时，系统会自动获取在绑定中定义的 `DragonService`。\n\n阻塞\n阻塞操作应使用 `blocking`\
  \ API 来处理。阻塞操作是指任何 IO 绑定的操作，例如查询数据库。\n\n`Blocking` 类位于 `ratpack.exec.Blocking`。例如，以下处理器调用了数据库上的一个方法（该方法在此示例范围之外定义）：\n\
  \n```\n1   get(\"deleteOlderThan/:days\") {\n2     int days = pathTokens.days as\
  \ int\n3     Blocking.get { database.deleteOlderThan(days) }\n4             .then\
  \ { int i -> render(\"$i records deleted\") }\n5   }\n```\n\n你可以使用 `then` 方法链式调用多个阻塞调用。前一个闭包的结果会作为参数传递给下一个闭包（在前面的处理器中是一个\
  \ `int`）。\n\n![../images/426440_2_En_15_Chapter/426440_2_En_15_Figc_HTML.gif](img/426440_2_En_15_Figc_HTML.gif)提示\n\
  `Blocking.get` 返回一个 `ratpack.exec.Promise<T>`。\n\nRatpack 会为你处理线程调度，然后与原始计算线程汇合。这样，你就可以重新加入原始\
  \ HTTP 请求线程并返回结果。\n\n```\n1   get(\"deleteOlderThan/:days\") {\n2     int days =\
  \ pathTokens.days as int\n3     int result\n4     Blocking.get { database.deleteOlderThan(days)\
  \ }\n5                  .then { int count -> result = count }\n6     render(\"$result\
  \ records deleted\")\n7   }\n```\n\n如果不需要返回值，请使用 `Blocking.exec` 方法。\n\n配置\n任何有自尊的\
  \ Web 应用程序都应允许配置来自多个位置：应用程序、文件系统、环境变量和系统属性。这通常是一种良好实践，尤其对于云原生应用而言。\nRatpack 包含一个内置的配置\
  \ API。`ratpack.config.ConfigData` 接口及其方法允许你分层配置多个来源。使用带有传递闭包的 `of` 方法，你可以为来自 JSON、YAML\
  \ 和其他来源的配置定义一种工厂。\n\n首先，定义你的配置类。这些类的属性将定义你的配置属性的名称。例如：\n\n```\n1   class Config\
  \ {\n2       DatabaseConfig database\n3   }\n4   class  DatabaseConfig  {\n5   \
  \    String username = \"root\"\n6       String password = \"\"\n7       String\
  \ hostname = \"localhost\"\n8       String database = \"myDb\"\n9   }\n```\n\n在这种情况下，你的\
  \ JSON 配置可能如下所示：\n\n```\n1   {\n2       \"database\": {\n3           \"username\"\
  :  \"user\",\n4           \"password\":  \"changeme\",\n5           \"hostname\"\
  :  \"myapp.dev.company.com\"\n6       }\n7   }\n```\n\n稍后，在 `binding` 声明中，添加以下内容以绑定由先前类定义的配置：\n\
  \n```\n1   def configData = ConfigData.of { d -> d.\n2       json(getResource(\"\
  /config.json\")).\n3       yaml(getResource(\"/config.yml\")).\n4       sysProps().\n\
  5       env().build()\n6   }\n7   bindInstance(configData.get(Config))\n```\n\n\
  每个声明都会覆盖之前的声明。因此，在这种情况下，顺序是类定义、`config.json`、`config.yml`、系统属性，然后是环境变量。这样你就可以在运行时覆盖属性。\n\
  系统属性和环境变量配置必须以 `ratpack.` 和 `RATPACK_` 前缀开头。例如，`hostname` 属性作为系统属性将是 `ratpack.database.hostname`，作为环境变量将是\
  \ `RATPACK_DATABASE_HOSTNAME`。\n\n测试\nRatpack 包含许多测试工具，用于辅助你的单元测试、功能测试和集成测试。它假设你将使用\
  \ Spock 来测试你的应用程序。\n\n首先，如果你使用 Ratpack-Gradle 插件，只需添加以下依赖项：\n\n```\n1   dependencies\
  \ {\n2       testCompile ratpack.dependency('test')\n3       testCompile \"org.spockframework:spock-core:1.3-groovy-2.5\"\
  \n4       testCompile 'cglib:cglib:3.2.12'\n5       testCompile 'org.objenesis:objenesis:3.0.1'\n\
  6   }\n```\n\n`cglib` 和 `objenesis` 依赖项是用于类和 final 类模拟的。\n\n其次，使用与主项目相同的包结构，在 `src/test/groovy`\
  \ 目录下添加你的 Spock 测试。一个简单的测试可能如下所示：\n\n\n\n```\n1   package myapp.services\n2   import\
  \ spock.lang.Specification\n\n4   class MyServiceSpec extends Specification {\n\
  5       void \"默认服务应返回 Hello World\"() {\n6           setup:\n7           \"设置测试服务\"\
  \n8           def service = new  MyService()\n9           when:\n10          \"\
  执行服务调用\"\n11          def result = service.doStuff()\n12          then:\n13    \
  \      \"确保服务调用返回了正确的结果\"\n14          result == \"Hello World\"\n15          \"\
  当此功能完成时关闭服务\"\n16          service.shutdown()\n17      }\n18  }\n```\n\nRatpack\
  \ 通过在测试环境中使用 `GroovyRatpackMainApplicationUnderTest` 运行您的完整应用程序来实现功能测试。\n例如，以下测试将测试默认处理器渲染的文本：\n\
  \n```\n1   package myapp\n2   import    ratpack.groovy.test.GroovyRatpackMainApplicationUnderTest\n\
  3   import spock.lang.Specification\n\n5   class FunctionalSpec extends Specification\
  \ {\n6       void \"默认处理器应渲染 Hello World\"() {\n7           setup:\n8          \
  \ def aut = new GroovyRatpackMainApplicationUnderTest()\n9           when:\n10 \
  \         def response = aut.httpClient.text\n11          then:\n12          response\
  \ == \"Hello World!\"\n13          cleanup:\n14          aut.close()\n15      }\n\
  16  }\n```\n\n仅仅在 `httpClient` 上调用 `text` 就会发起一个 `GET` 请求。\n然而，可以使用 `requestSpec`\
  \ 来调用更复杂的请求。例如，测试基于 `User-Agent` 头部返回特定响应：\n\n```\n1   void \"应为 v2.0 客户端正确渲染\"\
  () {\n2       when:\n3       def response = aut.httpClient.requestSpec { spec ->\n\
  4           spec.headers.'User-Agent' = [\"Client v2.0\"]\n5       }.get(\"api\"\
  ).body.text\n6       then:\n7       response == \"V2 Model\"\n8   }\n```\n\n总结\n\
  \n本章介绍了以下内容：\n\n*   如何开始使用 Ratpack\n\n*   使用处理器\n\n*   如何将绑定用作插件架构以及用于解耦模块\n\n*\
  \   如何使用 Groovy Markup、Groovy Text、Thymeleaf 和 Handlebars 模板进行渲染\n\n*   如何渲染和解析\
