- fmt: '# Where Are Generics?


    Groovy supports the syntax of generics but does not enforce them by default. For
    this reason, you might not see a lot of generics in Groovy code. For example,
    the following would work fine in Groovy:


    ```

    1   List nums = [1, 2, 3.1415, ''pie'']

    ```


    However, Groovy will enforce generics if you add the `@CompileStatic` or `@TypeChecked`
    annotation to your class or method. For example:


    ```

    1   import groovy.transform.*

    2   @CompileStatic

    3   class Foo {

    4       List nums = [1, 2, 3.1415] //error

    5   }

    ```


    This would cause the compilation error `"[Static type checking] - Incompatible
    generic argument types. Cannot assign java.util.List <java.lang.Number> to: java.util.List
    <Integer>"`. Since `3.1415` becomes a `java.math.BigDecimal` in Groovy, the generic
    type of the list is automatically determined to be `java.lang.Number`.


    ## Groovy Numbers


    This discussion leads us to decimal numbers, which use `BigDecimal` by default
    in Groovy. This allows you to do math without rounding errors.


    If you want to use `double` or `float`, simply follow your number with `d` or
    `f`, respectively (as you can also do in Java). For example:


    ```

    1   def  pie = 3.141592d

    ```


    ### Exercise


    Try multiplying different number types and determining the class of the result.


    ## Boolean-Resolution


    Since Groovy is very similar to Java, but not Java, it’s easy to get confused
    by the differences. A couple of the areas of confusion are *boolean-resolution*
    (also called “Groovy truth”) and the *Map syntax sugar*.


    Groovy is much more liberal in what it accepts in a Boolean expression. For example,
    `null`, an empty Collection, an empty String, and a zero are considered `false`.
    So, the following prints out `"true"` four times:


    ```

    1   if ("foo") println("true")

    2   if (!"") println("true")

    3   if (42) println("true")

    4   if (! 0) println("true")

    ```


    ### Tip


    This is sometimes referred to as “Groovy truth”.


    ## Map Syntax


    Groovy syntax sugar for maps allows you use string keys directly, which is often
    very helpful. However, this can cause confusion when attempting to get the class-type
    of a map using Groovy’s property-accessor syntax sugar (`.class` refers to the
    key-value, not `getClass()`). So you should use the `getClass()` method directly.


    This can also cause confusion when you’re trying to use variables as keys. In
    this case, you need to surround the variables with parentheses. For example:


    ```

    1   def  foo = "key"

    2   def  bar = 2

    3   def map = [(foo): bar]

    ```


    Without the parentheses, `foo` would resolve to the String `"foo"`. With the parentheses,
    the String `"key"` will be used as the key mapped to the value 2.


    ## Summary


    In this chapter, you learned about the following Groovy features:


    *   You can provide default method values.

    *   Various annotations that simplify life in the `groovy.transform` package.

    *   How regular expressions are built into Groovy.

    *   Different ways of defining arrays in Groovy.

    *   How to use unclosed operations when writing a multiline statement.

    *   Groovy uses `BigDecimal` by default for non-integer numbers.

    *   Groovy truth.

    *   You can use variable keys in the map syntax.


    # Part II Advanced Groovy


    Advanced Groovy


    Beyond the basics, Groovy is a rich tapestry of language features. It can be used
    either dynamically or statically typed; it’s your choice. It supports functional
    programming constructs, including first-class functions, method references, currying,
    and more. It has multiple inheritance, type inference, and meta-programming.


    # 6. Groovy Design Patterns


    Design patterns are a great way to make your code functional, readable, and extensible.
    There are some patterns that are easier and require less code in Groovy compared
    to Java.


    ## Strategy Pattern


    Imagine you have three different methods for finding totals as follows:


    ```

    1   def totalPricesLessThan10(prices) {

    2           int total = 0

    3           for (int price : prices)

    4                   if (price  10) total += price

    11               total

    12   }

    13   def  totalPrices(prices) {

    14           int total = 0

    15           for (int price : prices)

    16                   total += price

    17           total

    18   }

    ```


    A lot of code is duplicated in this case. There’s only one small thing that changes
    in each of these methods. In Groovy, you can use a closure parameter instead of
    three different methods so you can have the following:


    ```

    1   def totalPrices(prices, selector) {

    2           int total = 0

    3           for (int price : prices)

    4                   if (selector(price)) total += price

    5           total

    6   }

    ```


    Now you have a method, `totalPrices(prices, selector)`, where `selector` is a
    closure. Also, you can put the closure outside of the method parameters in a method
    call if it’s the last parameter. So you can call this method in the following
    ways to achieve the desired results:


    ```

    1   totalPrices(prices) { it  10 }

    3   totalPrices(prices) { true }

    ```


    This not only makes your code more concise, it’s also easier to read and extend.'
