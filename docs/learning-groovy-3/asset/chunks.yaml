    # GDK


    The GDK (Groovy Development Kit) provides a number of helper methods, operators,
    utilities, and additional classes.


    Some of these are methods added to every Java class, like `"each"`, and some are
    more obscure.


    ## Collections


    Groovy adds tons of helpful methods that allow easier manipulation of collections,
    arrays, or any `Iterable`:


    *   `sort` — Sorts the collection (if it is sortable).

    *   `findAll` — Finds all elements that match a closure.

    *   `collect` — An iterator that builds a new collection.

    *   `inject` — Loops through the values and returns a single value (similar to
    the concept of “reduce”).

    *   `each` — Iterates through the values using the given closure.

    *   `eachWithIndex` — Iterates through with two parameters: a value and an index.

    *   `find` — Finds the first element that returns true when passed to a given
    a closure.

    *   `findIndexOf` — Finds the first element that matches a closure and returns
    its index.

    *   `any` — True if any element returns true for the closure (like OR).

    *   `every` — True if all elements return true for the closure (like AND).

    *   `reverse` — Reverses the ordering of elements in a list.

    *   `first` — Gets the first element of a list.

    *   `last` — Returns the last element of a list.

    *   `tail` — Returns all elements except the first element of a list (useful for,
    e.g., recursive strategies).


    ### Java 8 Streams


    Groovy adds support to simplify dealing with Java 8+ Streams as well. For example,
    `toList()` and `toSet()` are added to the `java.util.stream.Stream<T>` interface
    allowing you to shortcut `collect(Collectors.toList())` and `collect(Collectors.toSet())`,
    respectively.


    ### Spread


    The `spread` operator can be used to access the property of every element in a
    collection. It can be used instead of `collect` in many cases. For example, let’s
    take a simple `Dragon` class defined as follows:


    ```

    class Dragon { String name }

    ```


    You could print the name of every Dragon in a list named `dragons`:


    ```

    dragons*.name.each { println it }

    ```


    This is a shorter form for the following:


    ```

    dragons.collect { dragon -> d.name }.each { println it }

    ```


    ### GPath


    GPath is something like XPath in Groovy. Thanks to the support of property notation
    for both lists and maps, Groovy provides syntactic sugar, making it really easy
    to deal with nested collections, as illustrated in the following examples:


    ```

    def  listOfMaps = [[''a'': 11, ''b'': 12], [''a'': 21, ''b'': 22]]

    assert listOfMaps.a == [11, 21] //GPath notation

    assert listOfMaps*.a == [11, 21] //spread dot notation


    listOfMaps = [[''a'': 11, ''b'': 12], [''a'': 21, ''b'': 22], null]

    assert  listOfMaps*.a == [11, 21, null] // caters  for  null  values

    assert listOfMaps*.a == listOfMaps.collect { it?.a } //equivalent  notation

    // But this will only collect non-null values

    assert listOfMaps.a == [11,21]

    ```


    As demonstrated in the preceding examples, `*.` provides null values, whereas
    using only “.” skips any null values.'
  raw: '## Console


    ```

    1   groovyConsole

    ```


    The Groovy Console is a quick and easy way to try things in Groovy visually without
    the overhead of a complete IDE.


    Whenever you have an idea you want to try out quickly, open the Groovy Console,
    type some code, and then press Ctrl+R to run it. After reading your output and
    changing the code, press Ctrl+W to clear the output and Ctrl+R again to run the
    code. Once you get used to those two shortcuts, the Groovy Console might become
    an indispensable development tool.


    It also has the ability (among other things) to inspect the AST (Abstract Syntax
    Tree) of your code, the internal representation of the code used by the compiler.
    Use `Script - Inspect Ast` or Ctrl+T to open the Groovy AST Browser.


    You can provide a classpath to be available at runtime to the Groovy Console using
    the `-cp` option. This is useful when you want to refer to other classes you have
    compiled. For example, in a Linux/OSX environment, you use the following (where
    “:” is used to separate paths):


    ```

    1   groovyConsole -cp src/main/groovy/:src/main/resources/ example.groovy

    ```


    ## Compilation


    ```

    1   groovyc

    ```


    Much like javac, groovyc compiles Groovy code to JVM byte-code (`*.class` files).
    It is not strictly necessary to compile before running. You can use the `groovy`
    command to run a groovy script file which typically end in `.groovy` but can have
    any extension.


    To take advantage of the JDK 7+ invoke-dynamic instruction, use the `--indy` flag.^([^(14)](#fn14))
    This also works with the `groovy` command.


    Invoke-dynamic helps the compiler improve the performance of things like duck-typing,
    meta-programming, and method-missing calls.


    ## Shell


    ```

    1   groovysh

    ```


    The Groovy shell can be used to execute Groovy code in an interactive command
    shell.


    ### ![../images/426440_2_En_3_Chapter/426440_2_En_3_Figa_HTML.gif](images/426440_2_En_3_Chapter/426440_2_En_3_Figa_HTML.gif)
    Exercise


    Try it out!


    ## Documentation


    ```

    1   groovydoc

    ```


    This tool generates documentation from your Groovy code.


    Groovy uses the same comment syntax as Java, including the conventions for documenting
    code.


    ```

    1   /** This is a documentation comment. */

    2   /* This is not */

    3   // This is a one-line comment.

    ```


    Groovy docs can even be accessed as metadata using the `groovy.attach.groovydoc`
    command line option.^([^(15)](#fn15)) For example, using the following at the
    command line:


    ```

    groovyc -Dgroovy.attach.groovydoc=true Test.groovy

    ```


    Given that you put the following code in Test.groovy:


    ```

    /** My class */ class Test { /** My method */ def method() {} }

    ```


    You could access those documents from the AST at compile time (this can be useful
    when writing AST transformations, for example).


    Also, Groovy docs can be accessed at runtime using the `groovy.attach.runtime.groovydoc`
    command line option. For example, using the following at the command line:


    ```

    groovyc -Dgroovy.attach.runtime.groovydoc=true Test.groovy

    Given the following code in “Test.groovy”:

    class Test { /**@ My metadata */ def method() {} }

    ```


    You can now access the preceding comment metadata using the following code (in
    Groovy 3):


    ```

    def data = Test.methods.find{ it.name==''method'' }.groovydoc.content

    assert data == ''My metadata''

    ```


