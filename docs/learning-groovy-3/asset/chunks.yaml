- fmt: "# Grails 与 Spock 测试框架\n\n## 过滤器与拦截器\n\n在其他变更中，`filter`的使用已被弃用，应替换为`interceptor`。要创建新的拦截器，请使用以下命令：\n\
    \n```\ngrails create-interceptor MyInterceptor\n```\n\n一个拦截器包含以下方法：\n\n- `before()`方法在匹配的动作执行前执行。返回值决定动作是否应执行，允许你取消该动作。\n\
    - `after()`方法在动作执行后、视图渲染前执行。其返回值决定视图渲染是否应执行。\n- `afterView()`方法在视图渲染完成后执行。\n\n\
    ```\nboolean before() { true }\nboolean after() { true }\nvoid afterView() {}\n\
    ```\n\n## Grails 3\n\nGrails 3 内置了对 Spock/Geb 功能测试的支持，使用`create-functional-test`命令。\n\
    \n## Grails 4\n\nGrails 4 更新了底层库的版本，如 Spring Boot，并将 Micronaut 集成到核心中。以下是 Grails\
    \ 4.0 支持的最低库版本：\n\n- Spring 5.1\n- Spring Boot 2.1\n- Java 8\n- Hibernate 5.4\n\
    - Groovy 2.5\n\n## 测试\n\nGrails 使用混入（mixin）方法支持单元测试。它包含以下注解：\n\n- `@TestFor(X)`——指定被测类\n\
    - `@Mock(Y)`——为给定类创建模拟对象\n\n对于测试，GORM 提供了一个使用`ConcurrentHashMap`的内存模拟数据库。你可以为标签库、命令对象、URL映射、XML\
    \ 和 JSON 等创建测试。\n\n## 缓存插件\n\n缓存插件可用于缓存内容，以提升 Web 应用程序的性能。\n\n- 你可以在服务或控制器方法上添加`@Cacheable`注解。\n\
    - 缓存标签包括`cache:block`和`cache:render`。\n- 相关插件包括`cache-ehcache`、`cache-guava`和`cache–headers`。\n\
    \n![../images/426440_2_En_13_Chapter/426440_2_En_13_Figb_HTML.gif](images/426440_2_En_13_Chapter/426440_2_En_13_Figb_HTML.gif)\n\
    \n## 仅概述\n\n这只是 Grails 的简要概述。关于 Grails 及其使用方法的书籍很多。有关使用 Grails 的更多信息，请访问[`https://grails.org`](https://grails.org)。^([^(52)](#fn52))\n\
    \n![../images/426440_2_En_13_Chapter/426440_2_En_13_Figc_HTML.gif](images/426440_2_En_13_Chapter/426440_2_En_13_Figc_HTML.gif)\n\
    \n## 练习\n\n创建你自己的 Grails 应用。\n\n## 脚注\n\n### 14. Spock\n\nSpock^([^(53)](#fn53))\
    \ 是一个用于 Java 和 Groovy 应用程序的测试框架，它充分利用了 Groovy 并集成了对象模拟。Spock 网站^([^(54)](#fn54))\
    \ 对 Spock 的描述如下：\n\n- Spock 是一个用于 Java 和 Groovy 应用程序的测试和规范框架。它之所以脱颖而出，是因为其优美且高度表达性的规范语言。得益于其\
    \ JUnit 运行器，Spock 与大多数 IDE、构建工具和持续集成服务器兼容。Spock 的灵感来源于 JUnit、RSpec、jMock、Mockito、Groovy、Scala、Vulcans\
    \ 以及其他迷人的生命形式。\n\n### Spock 基础\n\nSpock 中测试类的基本结构是一个继承自`spock.lang.Specification`的类，并包含多个测试方法（这些方法可以具有描述性的字符串名称）。Spock\
    \ 处理测试代码，并允许你使用简单的 Groovy 语法来指定测试。每个测试由带有标签（如`when`、`then`和`where`）的代码块组成。学习 Spock\
    \ 的最佳方式是通过示例。\n\n首先，将 Spock 作为依赖项添加到你的项目中。例如，在 Gradle 构建文件中，添加以下内容：\n\n```\ndependencies\
    \ {\n    testCompile \"org.spockframework:spock-core:1.3-groovy-2.5\"\n}\n```\n\
    \n### 一个简单的测试\n\n让我们从重新创建一个简单测试开始：\n\n```\ndef \"toString yields the String representation\"\
    () {\n        def array = ['a', 'b', 'c'] as String[]\n        when:\n       \
    \ def arrayWrapper = new ArrayWrapper(array)\n        then:\n        arrayWrapper.toString()\
    \ == '[a, b, c]'\n}\n```\n\n如上所示，断言只是 Groovy 的条件表达式。如果`==`表达式返回`false`，测试将失败，Spock\
    \ 会提供详细的输出以解释失败原因。\n\n在没有`when`子句的情况下，你可以使用`expect`子句代替`then`；例如：\n\n```\ndef\
    \ \"empty list size is zero\"() {\n        expect: [].size() == 0\n}\n```\n\n\
    ### 模拟\n\n在 Spock 中模拟接口非常容易。^([^(55)](#fn55)) 只需使用`Mock`方法，如下例所示（其中`Subscriber`是一个接口）：\n\
    \n```\nclass APublisher extends Specification {\n    def publisher = new Publisher()\n\
    \    def subscriber = Mock(Subscriber)\n```\n\n现在`subscriber`是一个模拟对象。你可以使用重载的`>>`运算符来实现方法，如下所示。以下示例在调用`receive`时抛出`Exception`：\n\
    \n```\ndef \"can cope with misbehaving subscribers\"() {\n    subscriber.receive(_)\
    \ >> { throw new Exception() }\n\n    when:\n    publisher.send(\"event\")\n \
    \   publisher.send(\"event\")\n\n    then:\n    2 * subscriber.receive(\"event\"\
    )\n}\n```\n\n可以通过使用数字或范围乘以（`*`）方法调用来描述预期行为，如此处所示。这意味着期望此方法被调用两次；否则测试将失败。下划线（`_`）被视为通配符，类似于\
    \ Scala 中的用法（这里的`_`只是一个字段，引用 Spock 定义的对象）。\n\n### 数据列表或表格\n\n类似于 JUnit 的 DataPoints\
    \ 和 Theories，Spock 允许你在测试中使用数据列表或表格。\n\n例如：\n\n```\ndef \"subscribers receive\
    \ published events at least once\"(){\n    when: publisher.send(event)\n    then:\
    \ (1.._) * subscriber.receive(event)\n    where: event << [\"started\", \"paused\"\
    , \"stopped\"]\n}\n```\n\n重载的`<<`运算符用于为`event`变量提供列表。虽然这里是一个列表，但任何`Iterable`类型都可以使用。这会导致测试对列表中的每个值运行一次。\n\
    \n### 范围\n\n这里的范围`1.._`表示“一次或多次”。你也可以使用`_..3`，例如，表示“三次或更少”。\n\n也可以使用表格格式的数据。例如：\n\
    \n```\ndef \"length of NASA mission names\"() {\n      expect:\n      name.size()\
    \ == length\n\n      where:\n      name       | length\n      \"Mercury\"  | 7\n\
    \      \"Gemini\"   | 6\n      \"Apollo\"   | 6\n}\n```\n\n在这种情况下，两列（`name`和`length`）用于替换`expect`块中的相应变量。可以使用任意数量的列。\n\
    \n### 预期异常\n\n在`then`块中使用`thrown()`方法来预期抛出`Exception`。\n\n```\ndef \"peek on empty\
    \ stack throws\"() {\n    when: stack.peek()\n    then: thrown(EmptyStackException)\n\
    }\n```\n\n你也可以通过将`thrown()`赋值给变量来捕获抛出的`Exception`。例如：\n\n```\ndef \"peek on empty\
    \ stack throws\"() {\n    when: stack.peek()\n    then:\n    Exception e = thrown()\n\
    \    e.toString().contains(\"EmptyStackException\")\n}\n```\n\n## 总结\n\n如你所见，Spock\
    \ 使测试更简洁、易读，内置了模拟功能，最重要的是，使测试的意图更加清晰。\n\n## 脚注\n\n### 15. Ratpack\n\nRatpack^([^(56)](#fn56))\
    \ 的核心是支持异步、无状态的 HTTP 应用程序。它构建于 Netty（事件驱动的网络引擎）之上。与某些 Web 框架不同，它不要求一个线程处理一个请求。相反，它鼓励你以释放当前线程的方式处理阻塞操作，从而实现高性能。Ratpack\
    \ 可用于构建响应式、RESTful 的微服务，尽管这不是强制要求。"
  raw: "Among other changes, the use of filters has been deprecated and should\nbe\
    \ replaced with interceptors. To create a new interceptor, use the\nfollowing\
    \ command:\n\n```\n1   grails create-interceptor MyInterceptor\n```\n\nAn interceptor\
    \ contains the following methods:\n\n*   The `before` method  is executed before\
    \ a\n    matched action. The return value determines whether the action should\n\
    \    execute, allowing you to cancel the action.\n\n*   The `after` method  is\
    \ executed after the\n    action executes but prior to view rendering. Its return\
    \ value determines\n    whether the view rendering should execute.\n\n*   The\
    \ `afterView` method  is executed after\n    view rendering completes.\n\n```\n\
    1   boolean before() { true }\n2   boolean after() { true }\n3   void afterView()\
    \ {}\n```\n\nGrails 3 supports built-in support for Spock/Geb\nfunctional tests\
    \ using the `create-functional-test`\ncommand.\n\nGrails 4\n\nGrails 4 included\n\
    updates to the versions of the underlying libraries like Spring Boot as\nwell\
    \ as integration of Micronaut into the core. The following are the\nminimum library\
    \ versions supported in Grails 4.0:\n\n*   Spring 5.1\n\n*   Spring Boot 2.1\n\
    \n*   Java 8\n\n*   Hibernate 5.4\n\n*   Groovy 2.5\n\nTesting\n\nGrails supports\
    \ unit testing with a mixin\napproach. It inludes the following annotations:\n\
    \n*   `@TestFor(X)`—Specifies\n    the class under test\n\n*   `@Mock(Y)`—Creates\
    \ a\n    mock for the given class\n\nFor tests, GORM provides an in-memory mock\
    \ database that uses `ConcurrentHashMap`.\nYou can create tests for tag libraries,\
    \ command objects, URL-Mappings,\nXML and JSON, and so on.\n\nCache Plugin\n\n\
    The cache plugin\ncan be used to cache content to enhance the performance of web\n\
    applications.\n\n*   You can add the `@Cacheable` annotation\n    on service or\
    \ controller methods.\n\n*   Cache tags include `cache:block` and `cache:render`.\n\
    \n*   Related plugins include `cache-ehcache`, `cache-guava`, and\n    `cache–headers`.\n\
    \n![../images/426440_2_En_13_Chapter/426440_2_En_13_Figb_HTML.gif](images/426440_2_En_13_Chapter/426440_2_En_13_Figb_HTML.gif)Only\n\
    an Overview\nThis has been a brief overview of Grails. Many books have been\n\
    written about Grails and how to use it. For more information on using\nGrails,\
    \ visit [`https://grails.org`](https://grails.org).^([^(52)](#fn52))\n\n![../images/426440_2_En_13_Chapter/426440_2_En_13_Figc_HTML.gif](images/426440_2_En_13_Chapter/426440_2_En_13_Figc_HTML.gif)Exercise\n\
    Create your own Grails app.\n\nFootnotes\n\n14. Spock\n\nSpock^([^(53)](#fn53))\
    \ is a testing framework for\nJava and Groovy applications that takes full advantage\
    \ of Groovy and has\nobject mocking integrated. The Spock web site^([^(54)](#fn54))\
    \ has this to say about Spock:\n\n*   Spock is a testing and specification framework\
    \ for Java and\n    Groovy applications. What makes it stand out from the crowd\
    \ is its\n    beautiful and highly expressive specification language. Thanks to\
    \ its\n    JUnit runner, Spock is compatible with most IDEs, build tools, and\n\
    \    continuous integration servers. Spock is inspired from JUnit, RSpec,\n  \
    \  jMock, Mockito, Groovy, Scala, Vulcans, and other fascinating life\n    forms.\n\
    \nSpock Basics\nThe basic structure of a test class in Spock is a class that extends\n\
    `spock.lang.Specification`\nand has multiple test methods (which may have descriptive\
    \ String\nnames).\nSpock processes the test code and allows you\nto use a simple\
    \ Groovy syntax to specify tests.\nEach test is composed of labeled blocks of\
    \ code with labels like\n`when`, `then`, and `where`. The best way\nto learn Spock\
    \ is with examples.\n\nTo get started, first add Spock as a dependency to your\
    \ project. For\nexample, within a Gradle build file, put the following:\n\n```\n\
    1   dependencies {\n2    testCompile \"org.spockframework:spock-core:1.3-groovy-2.5\"\
    \n3   }\n```\n\nA Simple Test\n\nLet’s start by recreating a simple test:\n\n\
    ```\n1   def \"toString yields the String representation\"() {\n2           def\
    \ array = ['a', 'b', 'c'] as String[]\n3           when:\n4           def arrayWrapper\
    \ = new ArrayWrapper(array)\n5           then:\n6           arrayWrapper.toString()\
    \ == '[a, b, c]'\n7   }\n```\n\nAs shown, assertions are simply groovy conditional\
    \ expressions. If\nthe `==`\nexpression returns `false`, the test will\nfail and\
    \ Spock will give a detailed printout to explain why it\nfailed.\n\nIn the absence\
    \ of any `when` clause , you can use the `expect` clause instead\nof `then`; for\n\
    example:\n\n```\n1   def \"empty list size is zero\"() {\n2           expect:\
    \ [].size() == 0\n3   }\n```\n\nMocking\n\nMocking interfaces\nis extremely easy\
    \ in Spock.^([^(55)](#fn55)) Simply use the\n`Mock` method, as\nshown in the following\
    \ example (where `Subscriber` is an\ninterface):\n\n```\n1   class  APublisher\
    \  extends  Specification {\n2     def  publisher = new  Publisher()\n3     def\
    \ subscriber = Mock(Subscriber)\n```\n\nNow `subscriber`\nis a mocked object.\
    \ You can implement methods simply using the\noverloaded `>>` operator as\nshown\
    \ next. The following example throws an `Exception` whenever\n`receive` is\ncalled:\n\
    \n```\n1   def \"can cope with misbehaving subscribers\"() {\n2       subscriber.receive(_)\
    \ >> { throw   new   Exception() }\n\n4       when:\n5       publisher.send(\"\
    event\")\n6       publisher.send(\"event\")\n\n8       then:\n9       2 * subscriber.receive(\"\
    event\")\n10   }\n```\n\nThe expected behavior can be described by using a number\
    \ or range\nmultiplied by (`*`) the method call,\nas shown here. This means to\
    \ expect this method is called two times;\notherwise the test will fail.\nThe\
    \ underscore (`_`)  is treated like a\nwildcard much like in Scala (here the _\
    \ is just a field that refers to\nan object defined by Spock).\n\nLists or Tables\
    \ of Data\nMuch like how JUnit has DataPoints and Theories,\nSpock allows you\
    \ to use lists or tables of data in tests.\n\nFor example:\n\n```\n1   def \"\
    subscribers receive published events at least once\"(){\n2       when: publisher.send(event)\n\
    3       then: (1.._) * subscriber.receive(event)\n4       where: event << [\"\
    started\", \"paused\", \"stopped\"]\n5   }\n```\n\nThe overloaded `<<`\noperator\
    \  is used\nto provide a list for the `event` variable.\nAlthough it is a list\
    \ here, anything that is `Iterable` could be\nused. This has the effect of running\
    \ the test for each value in the\nlist.\n\nRanges\nThe range `1.._` here means\
    \ “one\nor more” times. You can also use `_..3`, for example, to\nmean “three\
    \ or fewer” times.\n\nTabular formatted data can be used as well. For example:\n\
    \n```\n1   def \"length of NASA mission names\"() {\n2         expect:\n3    \
    \     name.size() == length\n\n5         where:\n6         name       | length\n\
    7         \"Mercury\"  | 7\n8         \"Gemini\"   | 6\n9         \"Apollo\" \
    \  | 6\n10   }\n```\n\nIn this case, the two columns (`name` and `length`) are\
    \ used to\nsubstitute the corresponding variables in the `expect` block. Any\n\
    number of columns can be used.\n\nExpecting Exceptions\n\nUse the `\"thrown\"\
    ` method  in the `then` block to expect\na thrown `Exception`.\n\n```\n1   def\
    \ \"peek on empty stack throws\"() {\n2       when: stack.peek()\n3       then:\
    \ thrown(EmptyStackException)\n4   }\n```\n\nYou can also capture the thrown `Exception`\
    \ by simply\nassigning it to `thrown()`. For\nexample:\n\n```\n1   def \"peek\
    \ on empty stack throws\"() {\n2       when: stack.peek()\n3       then:\n4  \
    \     Exception e = thrown()\n5       e.toString().contains(\"EmptyStackException\"\
    )\n6   }\n```\n\nSummary\nAs you can see, Spock makes tests more concise and easy\
    \ to read,\nincludes mocking built-in, and, most importantly, makes the intentions\n\
    of the test clear.\n\nFootnotes\n\n15. Ratpack\n\nAt its core, Ratpack^([^(56)](#fn56))\
    \ enables\nasynchronous, stateless HTTP applications. It is built on Netty, the\n\
    event-driven networking\nengine. Unlike some web frameworks, there is no expectation\
    \ that\none thread handles one request. Instead, you are encouraged to handle\n\
    blocking operations in a way that frees the current thread, thus\nallowing high\
    \ performance.\nRatpack can be used to make responsive, RESTful microservices,\n\
    although it’s not a requirement."
  trans: '

    在其他变更中，过滤器（filters）的使用已被弃用，应替换为拦截器（interceptors）。要创建一个新的拦截器，请使用以下命令：


    ```

    1   grails create-interceptor MyInterceptor

    ```


    一个拦截器包含以下方法：


    *   `before` 方法在匹配的动作执行之前执行。其返回值决定该动作是否应执行，从而允许你取消该动作。


    *   `after` 方法在动作执行之后、视图渲染之前执行。其返回值决定视图渲染是否应执行。


    *   `afterView` 方法在视图渲染完成之后执行。


    ```

    1   boolean before() { true }

    2   boolean after() { true }

    3   void afterView() {}

    ```


    Grails 3 内置了对使用 `create-functional-test` 命令进行 Spock/Geb 功能测试的支持。


    Grails 4


    Grails 4 更新了底层库（如 Spring Boot）的版本，并将 Micronaut 集成到了核心中。以下是 Grails 4.0 支持的最低库版本：


    *   Spring 5.1


    *   Spring Boot 2.1


    *   Java 8


    *   Hibernate 5.4


    *   Groovy 2.5


    测试


    Grails 通过混入（mixin）方式支持单元测试。它包含以下注解：


    *   `@TestFor(X)`——指定被测类


    *   `@Mock(Y)`——为指定类创建模拟对象


    对于测试，GORM 提供了一个使用 `ConcurrentHashMap` 的内存模拟数据库。你可以为标签库、命令对象、URL 映射、XML 和 JSON
    等创建测试。


    缓存插件


    缓存插件可用于缓存内容，以提升 Web 应用程序的性能。


    *   你可以在服务或控制器方法上添加 `@Cacheable` 注解。


    *   缓存标签包括 `cache:block` 和 `cache:render`。


    *   相关插件包括 `cache-ehcache`、`cache-guava` 和 `cache–headers`。


    ![../images/426440_2_En_13_Chapter/426440_2_En_13_Figb_HTML.gif](img/426440_2_En_13_Figb_HTML.gif)仅为概述

    以上是对 Grails 的简要概述。关于 Grails 及其使用方法已有许多书籍。如需更多关于使用 Grails 的信息，请访问 [`https://grails.org`](https://grails.org)。^(⁵²)


