    \ simply returns its last expression, as seen previously.\n\nYou can also assign\
    \ closures to variables and call them later:\n\n```\n1   def  closr = {x -> x\
    \ + 1}\n2   println( closr(2) ) // prints 3\n```\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figf_HTML.gif](images/426440_2_En_2_Chapter/426440_2_En_2_Figf_HTML.gif)\
    \ Exercise\n\nCreate a closure and print out the class of its delegate using `getClass()`.\n\
    \n## A Better Switch\n\nGroovy’s `switch` statement is much like Java’s, except\
    \ that it allows many more `case` expressions. For example, it allows strings,\
    \ lists, ranges, and classtypes:\n\n```\n1   def x = 42\n2   switch  ( x ) {\n\
    3   case \"foo\":\n4       result = \"found foo\"\n5           break\n6   case\
    \ [4, 5, 6]:\n7       result = \"4 5 or 6\"\n8       break\n9   case 12..30: //\
    \ Range\n10       result = \"12 to 30\"\n11       break\n12   case Integer:\n\
    13       result = \"was integer\"\n14       break\n15   case Number:\n16     \
    \  result = \"was number\"\n17       break\n18   default:\n19       result = \"\
    default\"\n20   }\n```\n\nIn this case the `result` from this code will be “was\
    \ integer”.\n\n## Meta-Programming\n\nIn Groovy, you can add methods to classes\
    \ at runtime, even to core Java libraries. For example, the following code adds\
    \ the `upper` method to the `String` class:\n\n```\n1   String.metaClass.upper\
    \ = { -> toUpperCase() }\n```\n\nor for a single instance (`str`)\n\n```\n1 def\
    \ str = \"test\"\n2 str.metaClass.upper = { -> toUpperCase() }\n```\n\nThe `upper`\
    \ method would convert the `String` to uppercase:\n\n```\n1   str.upper() == str.toUpperCase()\n\
    ```\n\n## Static Type Checking\n\nIf you add the `@TypeChecked` annotation to\
    \ your class, it causes the compiler to enforce compile time type-checking. It\
    \ will infer types for you, so your code can still be *Groovy*. It infers the\
    \ Lowest Upper Bound (LUB) type based on your code. For example:\n\n```\n1   import\
    \   groovy.transform.*\n2   @TypeChecked\n3   class Foo {\n4       int i = 42.0\
    \ // this does not compile\n5   }\n1   import   groovy.transform.*\n2   @TypeChecked\n\
    3   class Foo {\n4       int i = 42 // this works fine\n5   }\n6   new Foo()\n\
    ```\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figg_HTML.gif](images/426440_2_En_2_Chapter/426440_2_En_2_Figg_HTML.gif)\
    \ Gotcha’s\n\nRuntime meta-programming won’t always work! In other words, if you\
    \ add a method using the metaClass and call it, that won’t compile.\n\nExplicit\
    \ type is needed in a closure: `a.collect {`**String** `it -> it.toUpperCase()}`\n\
    \nIf you add the `@CompileStatic` annotation to your class or method, it causes\
    \ the compiler to compile your Groovy code to Java-style byte-code. This would\
    \ be useful when you have code that needs to be extremely performant (computation\
    \ involving large lists of Integers, for example) or you need Java byte-code for\
    \ some other reason. The generated byte-code is almost identical to compiled Java,\
    \ and therefore the performance is nearly identical to Java (unlike @TypeChecked\
    \ which still uses Groovy’s MOP—Meta Object Protocol). Both annotations are located\
    \ in the `groovy.transform` package.\n\nFor example, you could use @CompileStatic\
    \ on a class that calculates the Fibonacci sequence:^([^(11)](#fn11))\n\n```\n\
    1   import   groovy.transform.*\n2   @CompileStatic\n3   class Foo {\n4      void\
    \ getFibs(int count) {\n5         def list = [0, 1] // print first #count Fibonacci\
    \ numbers\n6         count.times {\n7            print \"${list.last()}\"\n8 \
    \           list << list.sum()\n9            list = list.tail()\n10         }\n\
    11      }\n12   }\n```\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figh_HTML.gif](images/426440_2_En_2_Chapter/426440_2_En_2_Figh_HTML.gif)\
    \ Exercise\n\nTry using `@TypeChecked` and the `def` keyword. It works surprisingly\
    \ well.\n\n## Elvis Operator\n\nThe elvis operator was born from a common idiom\
    \ in Java: using the ternary operation to provide a default value. For example:\n\
    \n```\n1   String name = person.getName() == null ? \"Bob\" :    person.getName();\n\
    ```\n\nInstead in Groovy you can just use the elvis operator:\n\n```\n1   String\
    \ name = person.getName() ?: \"Bob\"\n```\n\n## Safe Dereference Operator\n\n\
    Similar to the elvis operator, Groovy has the safe dereference operator that allows\
    \ you to easily avoid null-pointer exceptions. It involves simply adding a question\
    \ mark. For example:\n\n```\n1   String name = person?.getName()\n```\n\nThis\
    \ would simply set `name` to null if `person` is null. It also works for method\
    \ calls.\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figi_HTML.gif](images/426440_2_En_2_Chapter/426440_2_En_2_Figi_HTML.gif)\
    \ Tip\n\nWrite some Groovy code using the elvis operators and safe dereference\
    \ several times until you memorize the syntax.\n\n## A Brief History\n\nWhat follows\
    \ is a brief history of updates to the Groovy language starting with Groovy 1.8\\\
    . This will help you if you must use an older version of Groovy or if you haven’t\
    \ looked at Groovy in several years.\n\n### Groovy 1.8\n\n*   Command chains—The\
    \ code `\"pull request on github\" is executed as: pull(request).on(github)`\n\
    \n*   GPars^([^(12)](#fn12)) Bundled for parallel and concurrent paradigms (it\
    \ was later pulled out)\n\n*   Closure annotation parameters— `@Invariant({number\
    \ >= 0})`\n\n*   Closure memorization—`{...}.memoize()`\n\n*   Built-in JSON support—Consuming,\
    \ producing, and pretty-printing\n\n*   New AST transformations—`@Log, @Field,\
    \ @AutoClone, @AutoExternalizable, ...`\n\nGroovy 1.8 further improved the ability\
    \ to omit unnecessary punctuation by supporting *command chains,* which allow\
    \ you to omit parentheses and dots for a chain of method calls.\n\n### Groovy\
    \ 2.0\n\n*   Groovy became more modular, with many parts broken out into multiple\
    \ jars.\n\n*   It added the ability to create your own module which allows you\
    \ to add methods to existing classes (Extension modules^([^(13)](#fn13))).\n\n\
    *   `@CompileStatic`: Compiles your Groovy code to byte-code.\n\n*   `@TypeChecked`:\
    \ Enforces compile time type-checking (as seen in the previous section).\n\n*\
    \   Java 7 alignments: Try-with-resources, underscores in numeric literals, and\
    \ invoke dynamic (optionally using the –`indy command option`).\n\n*   Java 7\
    \ multi-catch: `catch (Exception1 | Exception2 e) {}`\n\nThe huge change in Groovy\
    \ 2 was the addition of the `@CompileStatic` and `@TypeChecked` annotations, which\
    \ were already covered."
  trans: "\n## 闭包\n\n*闭包*是 Groovy 中的一段代码块，它可以接受参数并返回值，也可以不接受参数且不返回值。它类似于 Java 8 中的\
    \ lambda 表达式或只有一个方法的内部类。闭包在许多方面都非常有用，后续章节将详细介绍。例如，正如你已经看到的，`findAll`、`each` 和\
    \ `times` 方法都使用了闭包。\n\nGroovy 闭包有几个隐式变量：\n\n*   `it`——如果闭包只有一个参数，可以隐式地使用 `it`\
    \ 来引用它。\n\n*   `this`——引用封闭类。\n\n*   `owner`——与 `this` 相同，除非它被嵌套在另一个闭包中。例如，运行以下代码来查看区别：\n\
    \n    ```\n    def print1 = {list ->\n    list.each{println owner}  //打印第一个闭包\n\
    \    println owner}       //打印封闭类\n    print1([1,2])\n    ```\n\n*   `delegate`——通常与\
    \ `owner` 相同，但你可以更改它（这允许 `delegate` 的方法在闭包的作用域内）。\n\n闭包可以作为方法参数传递。当这样做时（*并且它是最后一个参数*），闭包可以放在括号外面。例如，使用\
    \ `collect` 方法（该方法使用给定的闭包将列表元素转换为新列表）时，可以像下面这样调用它：\n\n```\n1   def  list = ['foo','bar']\n\
    2   def newList = []\n3   list.collect( newList ) {\n4     it.toUpperCase()\n\
    5   }\n6   println newList //   [\"FOO\",    \"BAR\"]\n```\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Fige_HTML.gif](img/426440_2_En_2_Fige_HTML.gif)\
    \ 提示\n\n在 Groovy 中，`return` 关键字完全是可选的。如前所述，方法或闭包只返回其最后一个表达式。\n\n你也可以将闭包赋值给变量，并在之后调用它们：\n\
    \n```\n1   def  closr = {x -> x + 1}\n2   println( closr(2) ) // 打印 3\n```\n\n\
    ### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figf_HTML.gif](img/426440_2_En_2_Figf_HTML.gif)\
    \ 练习\n\n创建一个闭包，并使用 `getClass()` 打印出其委托的类。\n\n## 更好的 Switch\n\nGroovy 的 `switch`\
    \ 语句与 Java 的非常相似，不同之处在于它允许更多类型的 `case` 表达式。例如，它允许字符串、列表、范围和类类型：\n\n```\n1   def\
    \ x = 42\n2   switch  ( x ) {\n3   case \"foo\":\n4       result = \"found foo\"\
    \n5           break\n6   case [4, 5, 6]:\n7       result = \"4 5 or 6\"\n8   \
    \    break\n9   case 12..30: // 范围\n10       result = \"12 to 30\"\n11       break\n\
    12   case Integer:\n13       result = \"was integer\"\n14       break\n15   case\
    \ Number:\n16       result = \"was number\"\n17       break\n18   default:\n19\
    \       result = \"default\"\n20   }\n```\n\n在这种情况下，此代码的 `result` 将是 \"was integer\"\
    。\n\n## 元编程\n\n在 Groovy 中，你可以在运行时向类添加方法，甚至可以向核心 Java 库添加方法。例如，以下代码向 `String` 类添加了\
    \ `upper` 方法：\n\n```\n1   String.metaClass.upper = { -> toUpperCase() }\n```\n\
    \n或者针对单个实例（`str`）：\n\n```\n1 def str = \"test\"\n2 str.metaClass.upper = { ->\
    \ toUpperCase() }\n```\n\n`upper` 方法会将 `String` 转换为大写：\n\n```\n1   str.upper()\
    \ == str.toUpperCase()\n```\n\n## 静态类型检查\n\n如果你向类添加 `@TypeChecked` 注解，它将强制编译器在编译时进行类型检查。它会为你推断类型，因此你的代码仍然可以是\
    \ *Groovy 风格*的。它会根据你的代码推断出最低上界（LUB）类型。例如：\n\n```\n1   import   groovy.transform.*\n\
    2   @TypeChecked\n3   class Foo {\n4       int i = 42.0 // 这无法编译\n5   }\n1   import\
    \   groovy.transform.*\n2   @TypeChecked\n3   class Foo {\n4       int i = 42\
    \ // 这可以正常工作\n5   }\n6   new Foo()\n```\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figg_HTML.gif](img/426440_2_En_2_Figg_HTML.gif)\
    \ 注意事项\n\n运行时元编程并不总是有效！换句话说，如果你使用 metaClass 添加一个方法并调用它，它将无法编译。\n\n闭包中需要显式类型：`a.collect\
    \ {`**String** `it -> it.toUpperCase()}`\n\n如果你向类或方法添加 `@CompileStatic` 注解，它将使编译器将你的\
    \ Groovy 代码编译成 Java 风格的字节码。当你需要代码具有极高性能（例如，涉及大量整数列表的计算）或出于其他原因需要 Java 字节码时，这将非常有用。生成的字节码几乎与编译后的\
    \ Java 代码相同，因此性能也几乎与 Java 相同（与 `@TypeChecked` 不同，后者仍然使用 Groovy 的 MOP——元对象协议）。这两个注解都位于\
    \ `groovy.transform` 包中。\n\n例如，你可以在计算斐波那契数列的类上使用 `@CompileStatic`：^(¹¹)\n\n```\n\
    1   import   groovy.transform.*\n2   @CompileStatic\n3   class Foo {\n4      void\
    \ getFibs(int count) {\n5         def list = [0, 1] // 打印前 #count 个斐波那契数\n6  \
    \       count.times {\n7            print \"${list.last()}\"\n8            list\
    \ << list.sum()\n9            list = list.tail()\n10         }\n11      }\n12\
    \   }\n```\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figh_HTML.gif](img/426440_2_En_2_Figh_HTML.gif)\
    \ 练习\n\n尝试使用 `@TypeChecked` 和 `def` 关键字。它的效果出奇地好。\n\n## Elvis 运算符\n\nElvis 运算符源于\
    \ Java 中的一个常见用法：使用三元运算符来提供默认值。例如：\n\n```\n1   String name = person.getName() ==\
    \ null ? \"Bob\" :    person.getName();\n```\n\n而在 Groovy 中，你可以直接使用 elvis 运算符：\n\
    \n```\n1   String name = person.getName() ?: \"Bob\"\n```\n\n## 安全解引用运算符\n\n与\
    \ elvis 运算符类似，Groovy 提供了安全解引用运算符，可以让你轻松避免空指针异常。它只需添加一个问号。例如：\n\n```\n1   String\
    \ name = person?.getName()\n```\n\n如果 `person` 为 null，这会将 `name` 简单地设置为 null。它也适用于方法调用。\n\
    \n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figi_HTML.gif](img/426440_2_En_2_Figi_HTML.gif)\
    \ 提示\n\n多次编写使用 elvis 运算符和安全解引用的 Groovy 代码，直到你记住其语法。\n\n## 简史\n\n以下是 Groovy 语言从\
    \ Groovy 1.8 开始的更新简史。如果你必须使用旧版本的 Groovy，或者你已经好几年没有接触过 Groovy，这将对你有所帮助。\n\n###\
    \ Groovy 1.8\n\n*   命令链——代码 `\"pull request on github\"` 的执行方式为：`pull(request).on(github)`\n\
    \n*   捆绑了 GPars^(¹²) 用于并行和并发范式（后来被移除）\n\n*   闭包注解参数——`@Invariant({number >= 0})`\n\
    \n*   闭包记忆化——`{...}.memoize()`\n\n*   内置 JSON 支持——消费、生成和美化打印\n\n*   新的 AST 转换——`@Log,\
    \ @Field, @AutoClone, @AutoExternalizable, ...`\n\nGroovy 1.8 通过支持*命令链*进一步改进了省略不必要标点符号的能力，这允许你在方法调用链中省略括号和点号。\n\
    \n### Groovy 2.0\n\n*   Groovy 变得更加模块化，许多部分被拆分成多个 jar 包。\n\n*   增加了创建自己模块的能力，允许你向现有类添加方法（扩展模块^(¹³)）。\n\
    \n*   `@CompileStatic`：将你的 Groovy 代码编译成字节码。\n\n*   `@TypeChecked`：强制在编译时进行类型检查（如上一节所述）。\n\
    \n*   Java 7 对齐：Try-with-resources、数字字面量中的下划线以及动态调用（可选使用 `–indy command option`）。\n\
    \n*   Java 7 多异常捕获：`catch (Exception1 | Exception2 e) {}`\n\nGroovy 2 的巨大变化是增加了\
    \ `@CompileStatic` 和 `@TypeChecked` 注解，这些已经介绍过了。\n"
- fmt: '### Groovy 2.1


    - Full support for the JDK 7 “invoke dynamic” instruction and API.

    - `@DelegatesTo`—A special annotation for closure delegate based DSLs and static
    type-checker extensions.

    - Compile-time meta-annotations—`@groovy.transform.AnnotationCollector` can be
    used to create a meta-annotation.

    - Many improvements to existing AST transformations.


    This release saw a huge improvement in performance by taking advantage of Java
    7’s invoke dynamic. However, it is not enabled by default (this will be covered
    in a later chapter; basically you just have to “turn it on”).


    ### Groovy 2.2


    - Implicit closure coercion.

    - `@Memoized` AST transformation for methods.

    - Bintray’s JCenter repository.

    - Define base script classes with an annotation.

    - New `DelegatingScript` base class for scripts.

    - `@DelegatesTo` with generic-type tokens.

    - Precompiled type-checking extensions.


    The main point to notice here is implicit closure coercion, which allows you to
    use closures anywhere a SAM (single abstract method) interface could be used.
    Before this release, you needed to cast the closure explicitly.


    ### Groovy 2.3


    - Official support for running Groovy on JDK 8

    - Traits

    - New and updated AST transformations


    This release added a brand new concept (*traits*) and the `trait` keyword. We
    will cover them in a later chapter.


    ### Groovy 2.4


    - Android support

    - Performance improvements and reduced byte-code

    - Traits `@Self` Type annotation

    - GDK improvements

    - More AST transformations


    Outdoing themselves yet again, the developers behind Groovy made tons of improvements
    and included Android support.


    ### Groovy 2.5


    Groovy 2.5 added support for JDK9+, added 11 new AST transformations, and added
    the macro feature which makes writing AST transformations much easier.


    The annotations added in Groovy 2.5 include `@AutoFinal`, `@AutoImplement`, `@ImmutableBase`,
    `@ImmutableOptions`, `@MapConstructor`, `@NamedDelegate`, `@NamedParam`, `@NamedParams`,
    `@NamedVariant`, `@PropertyOptions`, and `@VisibilityOptions`.


    Some of these annotations are described as follows:


    - `@AutoImplement`: Automatically implements missing abstract methods (such as
    those from an interface). You can specify an exception to throw from those methods,
    such as `UnsupportedOperationException`. It can be useful for generating test
    stubs or when you only need to implement a subset of inherited abstract methods.

    - `@AutoFinal`: Automatically adds final modifier to method parameters.

    - `@MapConstructor`: Adds a constructor to your class that has one map parameter,
    expects field names as keys, and sets the corresponding field values. For example:


    ```

    @groovy.transform.MapConstructor

    class Person { String firstName; String lastName }

    // later on...

    def p= new Person(firstName: ''Peter'', lastName: ''Quill'')

    assert p.firstName == ''Peter''

    ```


    Also many annotations were improved with additional attributes. For example, `@TupleConstructor`
    now includes seven more attributes. The `@Immutable` annotation was updated to
    recognize that the date/time classes added in Java 8 are immutable, and to handle
    `Optional`.


    ### Groovy 2.6


    The 2.6 version of Groovy was going to be much like Groovy 3 without the need
    for JDK 8, but it was retired to focus on faster delivery of Groovy 3.0.


    ### Groovy 3.0


    Groovy 3.0 sports a completely rewritten parser (nicknamed *Parrot*) that brings
    Groovy up to parity with the latest Java 11 syntax along with new Groovy-only
    features. It runs on JDK 8 minimum and has better support for JDK 9/10/11.


    The Java-like syntax now includes Java 8 style lambda expressions and method references
    and some tricky syntax which has eluded Groovy for many years: array initialization,
    do/while loops, commas in loop declarations, and some others.


    #### New Operators


    **Identity**


    The operator `===` can now be used to express identity-equal and `!==` to mean
    not identity-equal. Since Groovy interprets `==` as `.equals`, it used `.is` for
    identity-equals in the past. The support of `===` should avoid some confusion.
    This is similar to JavaScript’s `===` operator.


    **Negative variants of operators**


    The new operator `!instanceof` and `!in` are now supported. This will simplify
    the syntax in these situations. Before you would have to type `!(x instanceof
    Date)`, whereas now you can simply type `x !instanceof Date`. Likewise, for testing
    negative set inclusion, what used to be `!(x in [1,2,3])` can now be written as
    `x !in [1,2,3]`.


    **Elvis assignment**


    You may be familiar with the elvis operator (`?:`) in Groovy. In many cases you
    would use this operation to provide a default when assigning a value. For example,
    `name = name ?: ''None''`. Now you can shorten this expression to have the same
    meaning in Groovy 3 with the following: `name ?= ''None''`


    **Safe indexing**


    Much like the safe-reference operator, there is now a safe-indexing operator,
    `?.` This allows you to access an index of an array (or list), but if the array
    is null, it will return null instead of throwing an exception. For example, the
    following would set the value to the first value of the array, or null if the
    array is null: `value = array?[0]`


    **Java parity**


    Groovy 3 support new features added from Java 8 to 11, such as lambda expressions,
    method references, constructor references, try-with-resources, code blocks, non-static
    inner classes, and even local variables (`var`).


    All flavors of lambda expressions are supported (and compiled to closures unless
    you use `@CompileStatic`):


    - No parameters—`() -> expression`

    - Single parameter—`x -> expression`

    - Explicit return is optional—`(x, y) -> { x * y }`

    - Types are allowed—`(int x, int y) -> { return x + y }`

    - Default values are allowed—`(int x, int y = 10) -> x+y`


    Groovy has had method references for a long time, but Groovy 3 adds support for
    the Java 8+ syntax using the double colon. For example, the following is valid
    Groovy:


    ```

    def sq(x) { x*x }

    // var is similar to def

    var squares = (1..9).collect( this::sq ) //method ref

    //prints squares=[1, 4, 9, 16, 25, 36, 49, 64, 81]

    ```


    Groovy 3 also implements the try-with-resources:


    ```

    def f = new File(''temp'')

    try (PrintWriter pw = new PrintWriter(f)) {

    pw.println("TEST!")

    }

    ```


    This would result in the file name “temp” having the contents “TEST!” and would
    automatically close the `PrintWriter` whether or not there were errors.


    ## Summary


    In this chapter, you learned about the following:


    - How Groovy extends and simplifies programming on the JDK in a familiar syntax.

    - Groovy’s dynamic `def`, easy properties, closures, better “switch,” meta-programming,
    type-checking and static-compile annotations, the elvis operator, and safe dereference.

    - A brief overview of the features available to Groovy and in what versions they
    were introduced.

    - How Groovy 3.0 brings Groovy up to date with Java’s latest syntax as well as
    supporting some additional Java syntax that was not supported before.


    Footnotes [1](#426440_2_En_2_Chapter.xhtml#Fn1_source) [2](#426440_2_En_2_Chapter.xhtml#Fn2_source)
    [3](#426440_2_En_2_Chapter.xhtml#Fn3_source) [4](#426440_2_En_2_Chapter.xhtml#Fn4_source)
    [5](#426440_2_En_2_Chapter.xhtml#Fn5_source)


    # 3. Tools


    In addition to `groovy`, the Groovy installation comes with several helpful tools,
    covered in this chapter.'
