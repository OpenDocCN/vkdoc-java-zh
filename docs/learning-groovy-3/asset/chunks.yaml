    ## JSON


    Integration with the Jackson JSON marshaling library provides the ability to work
    with JSON.


    The `ratpack.jackson.Jackson` class provides most of the Jackson-related functionality.
    For example, to render JSON, you can use `Jackson.json`:


    ```groovy

    1   import  static  ratpack.jackson.Jackson.json

    2   ratpack {

    3     bindings {

    4     }

    5     handlers {

    6       get("user") {

    7         render json([user: 1])

    8       }

    9     }

    10   }

    ```


    The Jackson integration also includes a parser for converting JSON request bodies
    into objects. The `Jackson.jsonNode()` and `Jackson.fromJson(Class)` methods can
    be used to create parseable objects to be used with the `parse()` method.


    For example, the following handler would parse a JSON String representing a `Person`
    object and render the `Person`''s name:


    ```groovy

    1   post("personNames") {

    2     render( parse(fromJson(Person.class)).map {it.name} )

    3   }

    ```


    > **Tip:** `Context.parse` returns a `ratpack.exec.Promise<T>`. A `Promise<T>`
    is a commonly used pattern in concurrent programming that allows a simplified
    syntax. It implements methods such as `map` as shown previously.


    ## Bindings


    Bindings in Ratpack make objects available to the handlers. If you are familiar
    with Spring, Ratpack uses a *registry*, which is similar to the application context
    in Spring. It can also be thought of as a simple map from classtypes to instances.
    Ratpack-Groovy uses Guice by default, although other direct-injection frameworks,
    such as Spring, can be used (or none at all). Instead of a formal plugin system,
    reusable functionality can be packaged as modules. You can create your own modules
    to properly decouple and organize your application into components. For example,
    you might want to create a `MongoModule` or a `JdbcModule`. Alternatively, you
    could break your application into services. Either way, the registry is where
    you put them.


    Anything in the registry can be automatically used in a handler and gets wired
    in by classtype from the registry. Here''s an example of bindings in action:


    ```groovy

    1   bindings {

    2     bindInstance(MongoModule, new MongoModule())

    3     bind(DragonService, DefaultDragonService)

    4   }

    5   handlers {

    6     get(''dragons'') { DragonService dService ->

    7       dService.list().then { dragons ->

    8         render(toJson(dragons))

    9       }

    10     }

    11   }

    ```


    The system will automatically get the `DragonService` defined in the bindings
    when referenced as a parameter to a closure like `dService`.


    ## Blocking


    Blocking operations should be handled by using the `blocking` API. A blocking
    operation is anything that is IO-bound, such as querying the database.


    The `Blocking` class is located at `ratpack.exec.Blocking`. For example, the following
    handler calls a method on the database (which is defined outside of the scope
    of this example):


    ```groovy

    1   get("deleteOlderThan/:days") {

    2     int days = pathTokens.days as int

    3     Blocking.get { database.deleteOlderThan(days) }

    4             .then { int i -> render("$i records deleted") }

    5   }

    ```


    You can chain multiple blocking calls using the `then` method. The result of the
    previous closure is passed as the parameter to the next closure (an `int` in the
    preceding handler).


    > **Tip:** `Blocking.get` returns a `ratpack.exec.Promise<T>`.


    Ratpack handles the thread scheduling for you and then joins with the original
    computation thread. This way, you can rejoin with the original HTTP request thread
    and return a result.


    ```groovy

    1   get("deleteOlderThan/:days") {

    2     int days = pathTokens.days as int

    3     int result

    4     Blocking.get { database.deleteOlderThan(days) }

    5                  .then { int count -> result = count }

    6     render("$result records deleted")

    7   }

    ```


    If no return value is required, use the `Blocking.exec` method.


    ## Configuration


    Any self-respecting web application should allow configuration to come from multiple
    locations: the application, the filesystem, environment variables, and system
    properties. This is a good practice in general, but especially for cloud-native
    apps. Ratpack includes a built-in configuration API. The interface `ratpack.config.ConfigData`
    and its methods allow you to layer multiple sources of configuration. Using the
    `of` method with a passed closure allows you to define a factory of sorts for
    configuration from JSON, YAML, and other sources.


    First, you define your configuration classes. These classes'' properties will
    define the names of your configuration properties. For example:


    ```groovy

    1   class Config {

    2       DatabaseConfig database

    3   }

    4   class  DatabaseConfig  {

    5       String username = "root"

    6       String password = ""

    7       String hostname = "localhost"

    8       String database = "myDb"

    9   }

    ```


    In this case, your JSON configuration might look like the following:


    ```json

    1   {

    2       "database": {

    3           "username":  "user",

    4           "password":  "changeme",

    5           "hostname":  "myapp.dev.company.com"

    6       }

    7   }

    ```


    Later, in the `binding` declaration, add the following to bind the configuration
    defined by the previous classes:


    ```groovy

    1   def configData = ConfigData.of { d -> d.

    2       json(getResource("/config.json")).

    3       yaml(getResource("/config.yml")).

    4       sysProps().

    5       env().build()

    6   }

    7   bindInstance(configData.get(Config))

    ```


    Each declaration overrides the previous declarations. So in this case, the order
    would be class definition, `config.json`, `config.yml`, system properties, and
    then environment variables. This way you could override properties at runtime.
    System property and environment variable configuration must be prefixed with the
    `ratpack.` and `RATPACK_` prefixes. For example, the `hostname` property would
    be `ratpack.database.hostname` as a system property or `RATPACK_DATABASE_HOSTNAME`
    as environment variable.


    ## Testing


    Ratpack includes many test fixtures for aiding your unit, functional, and integration
    tests. It assumes you''ll be using Spock to test your application.


    First, if you''re using the Ratpack-Gradle plugin, simply add the following dependencies:


    ```groovy

    1   dependencies {

    2       testCompile ratpack.dependency(''test'')

    3       testCompile "org.spockframework:spock-core:1.3-groovy-2.5"

    4       testCompile ''cglib:cglib:3.2.12''

    5       testCompile ''org.objenesis:objenesis:3.0.1''

    6   }

