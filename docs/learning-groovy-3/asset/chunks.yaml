- fmt: '# Missing Methods and Properties


    As noted previously, Groovy provides a way to implement functionality at runtime
    via the `methodMissing` method:


    ```

    1   def methodMissing(String name, args)

    ```


    However, Groovy also provides a way to intercept missing properties that are accessed
    using Groovy’s property syntax. Property access is implemented using `propertyMissing(String
    name)` (which returns a value) and property modification via `propertyMissing(String
    name, Object value)` (which sets the value for a property).


    For example, here’s an excerpt from a DSL for chemical compounds:


    ```

    1   class  Chemistry  {

    2     public static void exec(Closure block) {

    3       block.delegate = new  Chemistry()

    4       block()

    5     }

    6     def propertyMissing(String name) {

    7       def  comp = new  Compound(name)

    8       (comp.elements.size() == 1 && comp.elements.values()[0]==1) ?

    9         comp.elements.keySet()[0] : comp

    10     }

    11   }

    ```


    Given the following code for `Compound` and `Element`:


    ```

    // Represents a chemical Element

    class Element  {

    String symbol

    Element(s) { symbol = s }

    double getWeight() {symbol==''H'' ? 1.00794 : 15.9994}

    String toString() { symbol }

    }

    // Represents a chemical Compound

    class Compound {

    final Map elements = [:]

    Compound(String str) {

    def matcher = str =~ /([A-Z][a-z]∗)([0-9]+)?/

    while (matcher.find()) add(

    new Element(matcher.group(1)),

    (matcher.group(2) ?: 1) as Integer)

    }

    void add(Element e, int num) {

    if (elements[e]) elements[e] += num

    else elements[e] = num

    }

    double getWeight() {

    elements.keySet().inject(0d) { sum, key ->

    sum + (key.weight * elements[key])

    }

    }

    String toString() { "$elements" }

    }

    ```


    In this example, `propertyMissing` (on lines 6-9) creates a new `Compound` object
    and returns either the `Compound` or an `Element` object if there is only one
    element in the `Compound`. This enables the creation of `Compound`s based on the
    name of a missing property. For example:


    ```

    1   def  c = new  Chemistry()

    2   def water = c.H2O

    3   println water // [H: 2, O: 1]

    4   println water.weight // 18.01528

    ```


    This is interpreted as trying to access a property named `H2O`, which triggers
    the `propertyMissing` method.


    ### Info


    `H2O` refers to the chemical composition of water, which is two hydrogen atoms
    and one oxygen atom.


    By using the static `exec` method, this DSL reaches its full potential by exposing
    an instance of `Chemistry` as a delegate to the closure, which allows for the
    following example:


    ```

    1   Chemistry.exec {

    2           def water = H2O

    3           println water

    4           println water.weight

    5   }

    ```


    This has the same effect of creating the `H2O` compound by calling the `propertyMissing`
    method of `Chemistry`.


    The full code for Groovy Chemistry is provided on GitHub. It provides the ability
    to compute the atomic weights of chemical compounds and percentages by atomic
    weight. It includes all known elements, their names, and atomic weights.


    This DSL would be very difficult to implement without the help of Groovy. In Java,
    for example, you would need to use strings to represent compounds, polluting the
    syntax with tons of quotes and parentheses.


    ## Extension Modules


    Extension modules in Groovy allow you to add functionality to existing classes
    to a project by including a library. It works much like Categories but works everywhere
    without requiring a `use` clause.


    To create an Extension module, create a file named `org.codehaus.groovy.runtime.ExtensionModule`
    under the `META-INF/services/` directory. Within that file, list all of your `extensionClasses`
    and `staticExtensionClasses`. For example, create such a file with the following
    contents:


    ```

    moduleName=adamldavis-groovy-dsl-example

    moduleVersion=0.1-beta1

    extensionClasses=com.adamldavis.gdsl.MyDSLExtension

    staticExtensionClasses=com.adamldavis.gdsl.MyStaticDSLExtension

    ```


    When included in a project, Groovy will look at all of the static methods of the
    `MyDSLExtension` class (in the `com.adamldavis.gdsl` package) and use them to
    add functionality to instances of the first parameter of each method’s class.
    The `moduleName` and `moduleVersion` properties are only there to make sure multiple
    conflicting versions of the library are not loaded.


    For example, given the following code, the `String` class would essentially have
    the `upper()` method added to it.


    ```

    class MyDSLExtension {

    static String upper(String it) { it.toUpperCase() }

    }

    ```


    Likewise, Groovy will look at all of the static methods of the `MyStaticDSLExtension`
    class and use them to add functionality to the class of the first parameter of
    each method. For example, the following code would add a method, `boom`, to the
    `String` class allowing `String.boom()` to return “!”:


    ```

    class MyStaticDSLExtension {

    static String boom(String it) { "!" }

    }

    ```


    Note that for `staticExtensionClasses`, the given parameter (`it` in the preceding
    code) cannot be used within the method; it is only used for the type.


    ### Exercise


    Create a DSL in Groovy for something that interests you, be it sports, math, movies,
    or astrophysics.


    # 8. Traits


    Traits are like interfaces with default implementations and state.


    Those familiar with Java 8 know that it added the default methods feature to interfaces.
    Traits are similar to Java 8 interfaces but with the added ability to have state
    (fields). This allows more flexibility but should be treated with caution.


    ## Defining Traits


    A Trait is defined using the `trait` keyword:


    ```

    1   trait Animal {

    2       int hunger = 100

    3       def  eat() { println "eating"; hunger -= 1 }

    4       abstract int getNumberOfLegs()

    5   }

    ```


    As this code demonstrates, Traits can have properties, methods, and abstract methods.
    If a class implements a Trait, it must implement its abstract methods.


    ## Using Traits


    To use a Trait, you use the `implements` keyword. For example:


    ```

    1   class Rocket  {

    2       String name

    3       def  launch() { println(name + "Take off!") }

    4   }

    5   trait MoonLander {

    6       def land() { println("${getName()} Landing!") }

    7       abstract String getName()

    8   }

    9   class  Apollo  extends  Rocket implements  MoonLander {

    10   }

    ```


    Note how the abstract `getName()` method is implemented automatically by Groovy
    since the `Rocket` class has the `name` property.


    So now you can do the following:


    ```

    1   def  apollo = new  Apollo(name: "Apollo 12")

    2   apollo.launch()

    3   apollo.land()

    ```


    This would generate the following output:


    ```

    1   Apollo 12 Take off!

    2   Apollo 12 Landing!

    ```


    Unlike super-classes, you can use multiple traits in one class. Here is such an
    example:


    ```

    1   trait Shuttle {

    2       boolean canFly() { true }

    3       abstract int getCargoBaySize()

    4   }

    5   class MoonShuttle  extends  Rocket

    6       implements  MoonLander, Shuttle {

    7       int getCargoBaySize() { 100 }

    8   }

    ```


    This would allow you to do the following:


    ```

    1   MoonShuttle m = new  MoonShuttle(name: ''Taxi'')

    2   println "${m.name} can fly? ${m.canFly()}"

    3   println "cargo bay: ${m.getCargoBaySize()}"

    4   m.launch()

    5   m.land()

    ```


    Given the preceding code, you would get the following output:


    ```

    1   Taxi can fly? true

    2   cargo bay: 100

    3   Taxi Take off!

    4   Taxi Landing!

    ```


    ### Exercise


    See what happens when you have the same fields or methods in two different traits
    and then try to mix them.'
  raw: '## Missing Methods and Properties


    As noted previously, Groovy provides a way to implement functionality at runtime
    via the `methodMissing` method :


    ```

    1   def methodMissing(String name, args)

    ```


    However, Groovy also provides a way to intercept missing properties that are accessed
    using Groovy’s property syntax. Property access is implemented using `propertyMissing(String
    name)` (which returns a value) and property modification via `propertyMissing(String
    name, Object value)` (which sets the value for a property).


    For example, here’s an excerpt from a DSL for chemical compounds:


    ```

    1   class  Chemistry  {

    2     public static void exec(Closure block) {

    3       block.delegate = new  Chemistry()

    4       block()

    5     }

    6     def propertyMissing(String name) {

    7       def  comp = new  Compound(name)

    8       (comp.elements.size() == 1 && comp.elements.values()[0]==1) ?

    9         comp.elements.keySet()[0] : comp

    10     }

    11   }

    ```


    Given the following code for Compound and Element:


    ```

    // Represents a chemical Element

    class Element  {

    String symbol

    Element(s) { symbol = s }

    double getWeight() {symbol==''H'' ? 1.00794 : 15.9994}

    String toString() { symbol }

    }

    // Represents a chemical Compound

    class Compound {

    final Map elements = [:]

    Compound(String str) {

    def matcher = str =~ /([A-Z][a-z]∗)([0-9]+)?/

    while (matcher.find()) add(

    new Element(matcher.group(1)),

    (matcher.group(2) ?: 1) as Integer)

    }

    void add(Element e, int num) {

    if (elements[e]) elements[e] += num

    else elements[e] = num

    }

    double getWeight() {

    elements.keySet().inject(0d) { sum, key ->

    sum + (key.weight * elements[key])

    }

    }

    String toString() { "$elements" }

    }

    ```


    In this example, `propertyMissing (on lines 6-9)` creates a new `Compound` object
    and returns either the `Compound` or an `Element` object if there is only one
    element in the `Compound`. This enables the creation of `Compound`s based on the
    name of a `missing` property . For example:


    ```

    1   def  c = new  Chemistry()

    2   def water = c.H2O

    3   println water // [H: 2, O: 1]

    4   println water.weight // 18.01528

    ```


    This is interpreted as trying to access a property named `H2O`, which triggers
    the `propertyMissing` method.


    ### ![../images/426440_2_En_7_Chapter/426440_2_En_7_Figb_HTML.gif](images/426440_2_En_7_Chapter/426440_2_En_7_Figb_HTML.gif)
    Info


    `H2O` refers to the chemical composition of water, which is two hydrogen atoms
    and one oxygen atom.


    By using the static `exec` method, this DSL reaches its full potential by exposing
    an instance of `Chemistry` as a delegate to the closure, which allows for the
    following example:


    ```

    1   Chemistry.exec {

    2           def water = H2O

    3           println water

    4           println water.weight

    5   }

    ```


    This has the same effect of creating the `H2O` compound by calling the `propertyMissing`
    method of `Chemistry`.


    The full code for Groovy Chemisty^([^(17)](#fn17)) is provided on GitHub. It provides
    the ability to compute the atomic weights of chemical compounds and percentages
    by atomic weight. It includes all known elements, their names, and atomic weights.


    This DSL would be very difficult to implement without the help of Groovy. In Java,
    for example, you would need to use strings to represent compounds, polluting the
    syntax with tons of quotes and parentheses.


    ## Extension Modules


    Extension modules in Groovy allow you to add functionality to existing classes
