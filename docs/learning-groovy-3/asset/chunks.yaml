- fmt: '# What Is Groovy?


    *Groovy* is a flexible open source language built for the JVM (Java Virtual Machine)
    with a Java-like syntax. It can be used dynamically (where any variable can hold
    any type of object) or statically typed (where the type of each variable is heavily
    restricted); it’s your choice. In most other languages, it is one or the other.
    It supports functional programming constructs, including first-class functions,
    currying, and more. It has multiple inheritance, type inference, and meta-programming.


    Groovy began in 2003 partly as a response to Ruby. Its main features were dynamic
    typing, meta-programming (the ability to change classes at runtime), and tight
    integration with Java. Although its original creator left it around 2005, many
    developers^([⁹](#fn9)) in the community have contributed to it over the years.
    Various organizations have supported the development of Groovy in the past, and
    like many open source projects, it cannot be attributed to one person or company.
    It has been an Apache Software Foundation^([^(10)](#fn10)) project since 2015.


    Groovy is very similar in syntax to Java, so it is generally easy for Java developers
    to learn (Java code is generally valid Groovy code, especially since Groovy 3.0,
    which added support for Java-like array declarations and many other Java syntax
    features). However, Groovy has many additional features and relaxed syntax rules:
    closures, dynamic typing, meta-programming (via `metaClass`), optional semicolons,
    regex support, operator overloading, GStrings, and more. Groovy is interpreted
    at runtime, but in Groovy 2.0, the ability to compile to byte-code and enforce
    type-checking were added to the language.


    ## Compact Syntax


    Groovy’s syntax can be made far more compact than Java. For example, the following
    code in Standard Java 5+ should print out `"Rod"`:


    ```

    1   for (String it : new  String[] {"Rod", "Carlos", "Chris"})

    2           if (it.length() < 4)

    3                   System.out.println(it);

    ```


    The same thing can be expressed in Groovy in one line as the following:


    ```

    1   ["Rod", "Carlos", "Chris"].findAll{it.size() < 4}.each{println it}

    ```


    It has tons of built-in features to make this possible (compact list definition,
    extensions to JDK objects, closures, optional semicolons, `println` method, and
    optional parentheses).


    The method `findAll` traverses the list and uses the given test to create a new
    collection with only the objects that pass the test.


    ## Dynamic def


    A key feature of Groovy is dynamic typing using the `def` keyword. This keyword
    replaces any type definition, thereby allowing variables to be of any type. This
    is somewhat like defining variables as `Object` but not exactly the same because
    the Groovy compiler treats `def` differently. For example, you can use `def` and
    still use the `@TypeChecked` annotation, which we will cover later.


    ## List and Map Definitions


    Groovy makes list and map definitions much more concise and simple. You simply
    use brackets (`[]`) and the mapping symbol (`:`) for mapping keys to values:


    ```

    1   def  list = [1, 2]

    2   def map = [cars: 2, boats: 3]

    3   println list.getClass() // java.util.ArrayList

    4   println map.getClass() // java.util.LinkedHashMap

    ```


    By default, Groovy interprets map key values as strings without requiring quotes.
    When working with maps with String keys, Groovy makes life much easier by allowing
    you to refer to keys using dot-notation (avoiding the `get` and `put` methods).
    For example:


    ```

    1   map.cars = 2

    2   map.boats = 3

    3   map.planes = 0

    4   println map.cars // 2

    ```


    This even makes it possible to Mock objects using a map when testing in some cases
    (which is covered in a later chapter).


    Groovy lists even override the left shift operator (`<<`), which allows the following
    syntax example:


    ```

    1   def list = []

    2   list.add(new  Vampire("Count Dracula", 1897))

    3   // or

    4   list << new  Vampire("Count Dracula", 1897)

    5   // or

    6   list += new  Vampire("Count Dracula", 1897)

    ```


    ### Tip


    Groovy allows overriding of common operators like plus and minus. We will cover
    this in a later chapter.


    ## Groovy GDK


    Built-in Groovy types (the GDK) are much the same as Java’s except that Groovy
    adds tons of methods to every class.


    For example, the `"each"` method allows you to iterate over a collection as follows:


    ```

    1   ["Java", "Groovy", "Scala"].each{ println it }

    ```


    The `println` and `print` methods are shorthand for calling those methods on `System.out`.
    We will cover the GDK more in depth later.


    ## Everything Is an Object


    Unlike in Java, primitives can be used like objects at any time, so there appears
    to be no distinction. For example, since the GDK adds the `times` method to `Number`,
    you can do the following:


    ```

    1   100.times { println "hi" }

    ```


    This would print `"hi"` 100 times.


    ## Easy Properties


    Groovy takes the idea of Java Beans to a whole new level. You can get and set
    Bean properties using dot-notation (and Groovy automatically adds getters and
    setters to your classes if you don’t).


    For example, instead of `person.getFirstName()`, you can use `person.firstName`.
    When setting properties, instead of `person.setFirstName("Bob")` you can just
    use `person.firstName = ''Bob''`.


    ### Tip


    Unlike Java, Groovy always defaults to public.


    You can also easily get a list of all properties of an object in Groovy using
    `.properties`. For example:


    ```

    1   println person.properties

    ```


    ### Tip


    Use `properties` to explore some class in Groovy that you want to know more about.


    ## GString


    Groovy adds its own class, called `GString`, which allows you to embed Groovy
    code within strings. This is another feature that makes Groovy very concise and
    easy to read. A GString is created every time you use double quotes (`""`) in
    Groovy.


    For example, it makes it easy to embed a bunch of variables into a string:


    ```

    1   def os = ''Linux''

    2   def cores = 2

    3   println("Cores: $cores, OS: $os, Time: ${new Date()}")

    ```


    The dollar sign `$` allows you to refer directly to variables, and `${code}` allows
    you to execute arbitrary Groovy code when included in a Gstring.


    Since String is a final class in the JDK, it cannot be extended, so GString is
    not a subclass of String. Although it can be used in place of String in most places
    within Groovy code, this can cause some issues when a `java.lang.String` is needed.


    ### Tip


    If you just want to use a `java.lang.String`, you should use single quotes (`''foo''`).'
