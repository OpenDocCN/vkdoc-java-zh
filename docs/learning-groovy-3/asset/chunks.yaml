- fmt: "# REST\n\n`REST` stands for REpresentational State Transfer. It was designed\
    \ in a PhD dissertation and has gained much popularity as the new web service\
    \ standard. At the most basic level in `REST`, each CRUD operation is mapped to\
    \ an HTTP method (`GET`, `POST`, `PUT`, and so on).\n\nUnlike Grails and other\
    \ popular web frameworks, Ratpack aims not to be a framework, but instead a set\
    \ of libraries. Although it's a lean set of libraries, Ratpack comes packed with\
    \ support for JSON, websockets, SSE (server sent events), SSL, SQL, logging, Dropwizard\
    \ Metrics, newrelic, health checks, hystrix, and more. Ratpack uses Guice by default\
    \ for DI (dependency injection).\n\n![../images/426440_2_En_15_Chapter/426440_2_En_15_Figa_HTML.gif](images/426440_2_En_15_Chapter/426440_2_En_15_Figa_HTML.gif)\n\
    \n> **Tip:** Ratpack is written in Java (8) and you can write Ratpack applications\
    \ in pure Java, but we are focusing on the Groovy side.\n\n## Script\n\nIn its\
    \ simplest form, you can create a Ratpack application using only a Groovy script.\
    \ For example, the following script would run a simple Ratpack application that\
    \ always responds \"Hello World!\":\n\n```\n1   @Grab('io.ratpack:ratpack-groovy:1.6.1')\n\
    \n3   import static ratpack.groovy.Groovy.ratpack\n\n5   ratpack {\n6     handlers\
    \ {\n7       handler {\n8         response.send \"Hello World!\"\n9       }\n\
    10     }\n11   }\n```\n\n## Gradle\n\nFor production systems you should use a\
    \ Gradle build. Ratpack has its own Gradle plugin that you can use, as follows\
    \ (`jcenter` refers to the Maven central alternative, Bintray's JCenter):\n\n\
    ```\n1   buildscript {\n2     repositories {\n3       jcenter()\n4     }\n5  \
    \   dependencies {\n6       classpath 'io.ratpack:ratpack-gradle:1.6.1'\n7   \
    \  }\n8   }\n\n10   apply plugin: 'io.ratpack.ratpack-groovy'\n\n12   repositories\
    \ {\n13     jcenter()\n14   }\n```\n\nUsing the `ratpack-gradle` plugin, you can\
    \ run tasks, such as `distZip`, `distTar`, `installApp`, and `run`, which creates\
    \ a ZIP distribution file, creates a TAR distribution file, installs the Ratpack\
    \ application locally, and runs the application, respectively.\n\nThe `run` task\
    \ is very useful for test driving your application. After invoking `gradle run`,\
    \ you should see the following output:\n\n```\n1   [main] INFO ratpack.server.RatpackServer\
    \ - Starting server...\n2   [main] INFO ratpack.server.RatpackServer - Building\
    \ registry...\n3   [main] INFO ratpack.server.RatpackServer - Ratpack started\
    \ (development)\n4   for http://localhost:5050\n```\n\n## Ratpack Layout\n\nUnlike\
    \ in Grails, you need to create these files and directories yourself (or use Lazybones).\n\
    \n- `build.gradle` (the Gradle build file)\n- `src`\n  - `main/groovy` — Where\
    \ you put general Groovy classes\n  - `main/resources` — Where you put static\
    \ resources, such as Handlebars templates\n  - `ratpack` — Contains `Ratpack.groovy`,\
    \ which defines your Ratpack handlers and bindings and `ratpack.properties`\n\
    \  - `ratpack/public` — Any public files like HTML, JavaScript, images, and CSS\n\
    \  - `ratpack/templates` — Holds your Groovy markup templates (if you have any)\n\
    \n## Handlers\n\nHandlers are the basic building blocks for Ratpack. They form\
    \ something like a pipeline or \"chain of responsibility.\" Multiple handlers\
    \ can be called per request, but one must return a response. If none of your handlers\
    \ is matched, a default handler returns a 404 status code.\n\n```\n1   import\
    \ static ratpack.groovy.Groovy.ratpack\n\n3   ratpack {\n4     handlers {\n5 \
    \      all() { response.headers.add('x-custom', 'x'); next() }\n6       get(\"\
    foo\") {\n7           render \"foo handler\"\n8       }\n9       get(\":key\"\
    ) {\n10           def  key = pathTokens.key\n11           render \"{\\\"key\\\"\
    : \\\"$key\\\"}\"\n12       }\n13       files { dir \"public\" }\n14     }\n15\
    \   }\n```\n\nThe first handler `all()` is used for every HTTP request and adds\
    \ a custom header. It then calls `next()` so the next matching handler gets called.\
    \ The next handler that matches a given HTTP request will be used to fulfill the\
    \ request with a response. The `pathTokens` map contains all parameters passed\
    \ in the URL as specified in the matching path pattern, as in `:key`, by prefixing\
    \ `:` to a variable name you specify. For example, if the preceding application\
    \ is run, requesting `/abc` will get you the response `{\"key\":\"abc\"}`.\n\n\
    You can define a handler using a method corresponding to any one of the HTTP methods:\n\
    \n- `Get`\n- `Post`\n- `Put`\n- `Delete`\n- `Patch`\n- `Options`\n\nTo accept\
    \ multiple methods on the same path, you should use the `path` handler and `byMethod`\
    \ with each method handler inside it. For example:\n\n```\n1   path(\"foo\") {\n\
    2       byMethod {\n3           post() { render 'post foo'}\n4           put()\
    \ { render 'put foo'}\n5           delete() { render 'delete foo'}\n6       }\n\
    7   }\n```\n\n## Rendering\n\nThere are many ways to render a response. The \"\
    grooviest\" ways are using the `groovyMarkupTemplate` or `groovyTemplate` methods.\n\
    \nFor example, here's how to use the `groovyMarkupTemplate`:\n\n```\n1   import\
    \   ratpack.groovy.template.MarkupTemplateModule\n2   import   static   ratpack.groovy.Groovy.groovyMarkupTemplate\n\
    3   import static ratpack.groovy.Groovy.ratpack\n4   ratpack {\n5     bindings\
    \ {\n6       module MarkupTemplateModule\n7     }\n8     handlers {\n9       get(\"\
    :key\") {\n10           def  key = pathTokens.key\n11           render groovyMarkupTemplate(\"\
    index.gtpl\", title: \"$key\")\n12       }\n13       files { dir \"public\" }\n\
    14     }\n15   }\n```\n\nThis allows you to use the Groovy markup language, and\
    \ by default it looks in the `ratpack/templates` directory for markup files. For\
    \ example, your `index.gtpl` might look like the following:\n\n1. `yieldUnescaped`\
    \ outputs the given String directly into the resulting HTML.\n2. The Groovy markup\
    \ language is a Groovy-based DSL to create HTML from Groovy code.\n\n```\n1  \
    \ yieldUnescaped ''\n2   html {\n3     head {\n4       meta(charset:'utf-8')\n\
    5       title(\"Ratpack: $title\")\n6       meta(name: 'apple-mobile-web-app-title',\
    \ content: 'Ratpack')\n7       meta(name: 'description', content: “)\n8      \
    \ meta(name: 'viewport', content: 'width=device-width, initial-scale=1')\n9  \
    \     link(href: '/images/favicon.ico', rel: 'shortcut icon')\n10     }\n11  \
    \   body {\n12       header {\n13         h1 'Ratpack'\n14         p 'Simple,\
    \ lean & powerful HTTP apps'\n15       }\n16       section {\n17         h2 title\n\
    18         p 'This is the main page for your Ratpack app.'\n19       }\n20   \
    \  }\n21   }\n```\n\n## Groovy Text\n\nIf you prefer to use a plain old text document\
    \ with embedded Groovy (much like a GString), you can use the `TextTemplateModule`:\n\
    \n```\n1   import ratpack.groovy.template.TextTemplateModule\n2   import static\
    \ ratpack.groovy.Groovy.groovyTemplate\n3   import static ratpack.groovy.Groovy.ratpack\n\
    4   ratpack {\n5     bindings {\n6       module TextTemplateModule\n7     }\n\
    8     handlers {\n9       get(\":key\") {\n10           def  key = pathTokens.key\n\
    11           render groovyTemplate(\"index.html\", title: \"$key\")\n12      \
    \ }\n13     }\n14   }\n```\n\nThen create a file named `index.html` in the `src/main/resources/templates`\
    \ directory with the following content:\n\n```\n1   ${model.title}\n```\n\nIt\
    \ supplies a `model` map to your template, which contains all of the parameters\
    \ you supply.\n\n## Handlebars and Thymeleaf\n\nRatpack also supports Handlebars\
    \ and Thymeleaf templates, two alternative methods of generating dynamic web pages.\
    \ Since these are static resources, you should put these templates in the `src/main/resources`\
    \ directory.\n\nYou will first need to include the appropriate Ratpack project\
    \ in your Gradle build file:\n\n```\n1   runtime 'io.ratpack:ratpack-handlebars:1.6.1'\n\
    2   runtime 'io.ratpack:ratpack-thymeleaf3:1.6.1'\n```\n\nTo use Handlebars (an\
    \ alternative template format), include the `HandlebarsModule` and render Handlebar\
    \ templates as follows:"
