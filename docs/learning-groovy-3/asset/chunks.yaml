- fmt: "# Tail Recursion\n\nIn Groovy 1.8, the `trampoline` method was introduced\
    \ for a closure to use the tail recursion optimization. This allows closure invocations\
    \ to be invoked sequentially instead of stacked to avoid a `StackOverFlowError`\
    \ and improve performance.\n\nStarting in Groovy 2.3, you can use `trampoline`\
    \ for recursive methods, but the `@TailRecursive` AST transformation is even simpler\
    \ to use. Simply annotate a tail-recursive method with `@TailRecursive` and Groovy\
    \ does the rest. For example:\n\n```\n1   import   groovy.transform.*\n2   @TailRecursive\n\
    3   long  totalPopulation(list, total = 0) {\n4     if (list.size() == 0)\n5 \
    \      total\n6     else\n7       totalPopulation(list.tail(), total + list.first().population)\n\
    8   }\n```\n\n### Info\n\nOn a Groovy list, the `tail` method returns the list\
    \ without the first element and `first` returns just the first element.\n\nThis\
    \ would take a list of objects with a `population` property and get the sum of\
    \ them. For example, let’s make a `City` class, use a range to create a bunch\
    \ of them, and then use our `totalPopulation` method:\n\n```\n1   @Canonical class\
    \ City {int population}\n2   def cities = (10..1000).collect{new City(it)}\n3\
    \   totalPopulation(cities)\n4   // 500455\n```\n\nThis demonstrates how tail\
    \ recursion can be used in a functional style as an alternative to iteration.\n\
    \n### Info\n\nTail recursion goes well with immutability because no direct modification\
    \ of variables is necessary in tail recursion.\n\n## Summary\n\nIn this chapter,\
    \ you learned about the following:\n\n*   Functions as a first-class feature as\
    \ closures\n*   Map/filter/reduce as `collect`/`findAll`/`inject`\n*   Immutability\
    \ and how it relates to FP\n*   Various features that support FP in Groovy\n*\
    \   Method handles in Groovy\n*   Tail recursion optimization\n\n# 10. Groovy\
    \ GPars\n\n`GPars` is an open source project to bring many concurrency abstractions\
    \ to Java and/or Groovy. It was bundled in Groovy for a short time and then later\
    \ pulled out.\n\nIt includes parallel map/reduce, Actors, Dataflow, and many other\
    \ concurrency models. Although any concurrency library made for Java, such as\
    \ `RxJava`, `Project Reactor`, or `Akka`, can be used with Groovy, `GPars` was\
    \ made with Groovy specifically in mind.\n\n## Getting Started\n\nTo get started\
    \ you first need to include `GPars` in your project. For example, in a Gradle\
    \ build file, add the following to your `dependencies` block:\n\n```\ncompile\
    \ \"org.codehaus.gpars:gpars:1.2.1\"\n```\n\nFor a Maven build, add the following\
    \ to your dependencies:\n\n```\n<dependency>\n    <groupId>org.codehaus.gpars</groupId>\n\
    \    <artifactId>gpars</artifactId>\n    <version>1.2.1</version>\n</dependency>\n\
    ```\n\n## Parallel Map Reduce\n\nIn this section we will use a list of students\
    \ with graduation years and GPAs.\n\n```\nclass Student { int graduationYear;\
    \ double gpa; }\n// create a list of students\nCollection students = new ArrayList()\n\
    ```\n\nYou perform parallel map/reduce with the `GPars` library in the following\
    \ way:\n\n```\n1   GParsPool.withPool {\n2       // a map-reduce functional style\n\
    3       def bestGpa = students.parallel\n4           .filter{ s -> s.graduationYear==Student.THIS_YEAR\
    \ }\n5           .map{ s -> s.gpa }\n6           .max()\n7   }\n```\n\nThe static\
    \ method `GParsPool.withPool` takes in a closure and augments any `Collection`\
    \ with several methods (using Groovy’s Category mechanism). The `parallel` method\
    \ actually creates a `ParallelArray` (JSR-166) from the given `Collection` and\
    \ uses it with a thin wrapper around it.\n\n## Actors\n\nThe *Actor design pattern*\
    \ is a useful pattern for developing concurrent software. In this pattern, each\
    \ Actor executes in its own thread and manipulates its own data. The data cannot\
    \ be manipulated by any other thread. Messages are passed (internally by `GPars`)\
    \ between the Actors to cause them to change the data. You can also make stateless\
    \ Actors.\n\nWhen data can be changed by only one thread at a time, it’s called\
    \ *thread-safe*.\n\n```\n0   @Grab(\"org.codehaus.gpars:gpars:1.2.1\")\n1   import\
    \ groovyx.gpars.actor.Actor\n2   import groovyx.gpars.actor.DefaultActor\n\n4\
    \   class Dragon extends DefaultActor {\n5       int age\n\n7       void afterStart()\
    \ {\n8           age = new Random().nextInt(1000) + 1\n9       }\n11       void\
    \ act() {\n12           loop {\n13               react { int num ->\n14      \
    \           if (num > age)\n15                 reply 'too old'\n16           \
    \      else if (num < age)\n17                 reply 'too young'\n18         \
    \        else  {\n19                   reply 'you guessed right!'\n20        \
    \           terminate()\n21                 }\n22               }\n23        \
    \   }\n24       }\n25   }\n26   // Guesses the age of the Dragon\n27   class Guesser\
    \ extends DefaultActor {\n28       String name\n29       Actor server\n30    \
    \   int myNum\n\n32       void act() {\n33           loop {\n34             myNum\
    \ = new Random().nextInt(1000) + 1\n35             server.send myNum\n36     \
    \        react {\n37               switch (it) {\n38                 case 'too\
    \ old': println \"$name: $myNum was too old\"; break\n39                 case\
    \ 'too young': println \"$name: $myNum was too young\"; break\n40            \
    \     default: println \"$name: I won $myNum\"; terminate(); break\n41       \
    \        }\n42             }\n43           }\n44         }\n45   }\n\n47   def\
    \  master = new  Dragon().start()\n48   def player = new Guesser(name: 'Guesser',\
    \ server: master).start()\n\n50   //this forces main thread to live until both\
    \ actors stop\n51   [master, player]*.join()\n```\n\nHere the `Dragon` class starts\
    \ with some random age between 1 and 1000. It then reacts to a given number, replying\
    \ if the number is too big, too small, or the same as its age. The `Guesser` class\
    \ loops, generating a random guess each time through the loop and sending it to\
    \ the `Dragon` (referred to as `server`). The `Guesser` then reacts to the message\
    \ from the `Dragon` and terminates when the correct age was guessed.\n\nThe output\
    \ will be something like the following:\n\n```\nGuesser: 236 was too young\n...\
    \ many other guesses\nGuesser: 819 was too old\nGuesser: I won 527\n```\n\n##\
    \ More GPars\n\nFor more information on other parts of `GPars`, such as Agents\
    \ (which are much like Actors with functions as messages), Dataflow (an alternative\
    \ concurrency model with deterministic behavior), and STM (Software Transactional\
    \ Memory, which gives developers transactional syntax for dealing with in-memory\
    \ state), please see `GPars`’ excellent guide online.\n\n# Part III: The Groovy\
    \ Ecosystem\n\nThe Groovy Ecosystem\n\nThere are many different frameworks and\
    \ libraries built on top of Groovy (or support it as an option) that make up the\
    \ Groovy ecosystem.\n\n# 11. Groovy Awesomeness\n\nThis short chapter introduces\
    \ various useful frameworks within the Groovy ecosystem. Some of these will be\
    \ described more fully in later chapters."
  raw: '## Tail Recursion


    In Groovy 1.8, the `trampoline` method was introduced for a closure to use the
    tail recursion optimization. This allows closure invocations to be invoked sequentially
    instead of stacked to avoid a `StackOverFlowError` and improve performance.


    Starting in Groovy 2.3, you can use `trampoline` for recursive methods, but the
    `@TailRecursive` AST transformation is even simpler to use. Simply annotate a
    tail-recursive method with `@TailRecursive` and Groovy does the rest. For example:


    ```

    1   import   groovy.transform.*

    2   @TailRecursive

    3   long  totalPopulation(list, total = 0) {

    4     if (list.size() == 0)

    5       total

    6     else

    7       totalPopulation(list.tail(), total + list.first().population)

    8   }

    ```


    ### ![../images/426440_2_En_9_Chapter/426440_2_En_9_Figf_HTML.gif](images/426440_2_En_9_Chapter/426440_2_En_9_Figf_HTML.gif)Info


    On a Groovy list, the `tail` method returns the list without the first element
    and `first` returns just the first element.


    This would take a list of objects with a `population` property and get the sum
    of them. For example, let’s make a `City` class, use a range to create a bunch
    of them, and then use our `totalPopulation` method :


    ```

    1   @Canonical class City {int population}

    2   def cities = (10..1000).collect{new City(it)}

    3   totalPopulation(cities)

    4   // 500455

    ```


    This demonstrates how tail recursion can be used in a functional style as an alternative
    to iteration.


    ### ![../images/426440_2_En_9_Chapter/426440_2_En_9_Figg_HTML.gif](images/426440_2_En_9_Chapter/426440_2_En_9_Figg_HTML.gif)Info


    Tail recursion goes well with immutability because no direct modification of variables
    is necessary in tail recursion.


    ## Summary


    In this chapter, you learned about the following:


    *   Functions as a first-class feature as closures


    *   Map/filter/reduce as `collect/findAll/inject`


    *   Immutability and how it relates to FP


    *   Various features that support FP in Groovy


    *   Method handles in Groovy


    *   Tail recursion optimization


