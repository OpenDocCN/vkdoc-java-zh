    5     bindings {

    6       module ThymeleafModule

    7     }

    8     handlers {

    9       get("foo") {

    10           render thymeleafTemplate(''myTemplate'', title: ''Thymeleaf'')

    11       }

    12     }

    13   }

    ```


    The requested file should be named `myTemplate.html` and

    be located in the `src/main/resources/thymeleaf`

    directory  of

