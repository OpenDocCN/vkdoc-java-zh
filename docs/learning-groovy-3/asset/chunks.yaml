    # 8. Traits


    Traits are like interfaces with default implementations and state.


    Those familiar with Java 8 know that it added the default methods feature to interfaces.
    Traits are similar to Java 8 interfaces but with the added ability to have state
    (fields). This allows more flexibility but should be treated with caution.


    ## Defining Traits


    A Trait is defined using the `trait` keyword:


    ```

    1   trait Animal {

