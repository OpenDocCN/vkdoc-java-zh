  trans: '

    ## 缺失的方法与属性


    如前所述，Groovy 提供了一种通过 `methodMissing` 方法在运行时实现功能的方式：


    ```

    1   def methodMissing(String name, args)

    ```


    然而，Groovy 还提供了一种拦截缺失属性的方式，这些属性通过 Groovy 的属性语法进行访问。属性访问通过 `propertyMissing(String
    name)`（返回一个值）实现，属性修改则通过 `propertyMissing(String name, Object value)`（设置属性的值）实现。


    例如，以下是一个用于化学化合物的 DSL 的摘录：


    ```

    1   class  Chemistry  {

    2     public static void exec(Closure block) {

    3       block.delegate = new  Chemistry()

    4       block()

    5     }

    6     def propertyMissing(String name) {

    7       def  comp = new  Compound(name)

    8       (comp.elements.size() == 1 && comp.elements.values()[0]==1) ?

    9         comp.elements.keySet()[0] : comp

    10     }

    11   }

    ```


    给定以下用于 `Compound` 和 `Element` 的代码：


    ```

    // 表示一种化学元素

    class Element  {

    String symbol

    Element(s) { symbol = s }

    double getWeight() {symbol==''H'' ? 1.00794 : 15.9994}

    String toString() { symbol }

    }

    // 表示一种化学化合物

    class Compound {

    final Map elements = [:]

    Compound(String str) {

    def matcher = str =~ /([A-Z][a-z]∗)([0-9]+)?/

    while (matcher.find()) add(

    new Element(matcher.group(1)),

    (matcher.group(2) ?: 1) as Integer)

    }

    void add(Element e, int num) {

    if (elements[e]) elements[e] += num

    else elements[e] = num

    }

    double getWeight() {

    elements.keySet().inject(0d) { sum, key ->

    sum + (key.weight * elements[key])

    }

    }

    String toString() { "$elements" }

    }

    ```


    在这个例子中，`propertyMissing`（第 6-9 行）创建了一个新的 `Compound` 对象，并返回该 `Compound` 对象，或者如果
    `Compound` 中只有一个元素，则返回一个 `Element` 对象。这使得可以根据一个`缺失`属性的名称来创建 `Compound` 对象。例如：


    ```

    1   def  c = new  Chemistry()

    2   def water = c.H2O

    3   println water // [H: 2, O: 1]

    4   println water.weight // 18.01528

    ```


    这被解释为尝试访问一个名为 `H2O` 的属性，从而触发了 `propertyMissing` 方法。


    ### ![../images/426440_2_En_7_Chapter/426440_2_En_7_Figb_HTML.gif](img/426440_2_En_7_Figb_HTML.gif)
    信息


    `H2O` 指的是水的化学成分，即两个氢原子和一个氧原子。


    通过使用静态的 `exec` 方法，这个 DSL 通过将 `Chemistry` 的一个实例暴露为闭包的委托，充分发挥了其潜力，从而允许以下示例：


    ```

    1   Chemistry.exec {

    2           def water = H2O

    3           println water

    4           println water.weight

    5   }

    ```


    这与通过调用 `Chemistry` 的 `propertyMissing` 方法来创建 `H2O` 化合物的效果相同。


    Groovy Chemistry^(¹⁷) 的完整代码已在 GitHub 上提供。它能够计算化学化合物的原子量以及按原子量计算的百分比。它包含了所有已知的元素、它们的名称和原子量。


    如果没有 Groovy 的帮助，这个 DSL 将很难实现。例如，在 Java 中，你需要使用字符串来表示化合物，这会使语法充斥着大量的引号和括号。


    ## 扩展模块


    Groovy 中的扩展模块允许你通过包含一个库来向项目中的现有类添加功能。它的工作方式很像类别（Categories），但可以在任何地方使用，无需 `use`
    子句。


    要创建一个扩展模块，请在 `META-INF/services/` 目录下创建一个名为 `org.codehaus.groovy.runtime.ExtensionModule`
    的文件。在该文件中，列出你所有的 `extensionClasses` 和 `staticExtensionClasses`。例如，创建一个包含以下内容的文件：


    ```

    moduleName=adamldavis-groovy-dsl-example

    moduleVersion=0.1-beta1

    extensionClasses=com.adamldavis.gdsl.MyDSLExtension

    staticExtensionClasses=com.adamldavis.gdsl.MyStaticDSLExtension

    ```


    当包含在一个项目中时，Groovy 会查看 `MyDSLExtension` 类（位于 `com.adamldavis.gdsl` 包中）的所有静态方法，并使用它们向每个方法的第一个参数所属类的实例添加功能。`moduleName`
    和 `moduleVersion` 属性仅用于确保不会加载多个冲突版本的库。


    例如，给定以下代码，`String` 类将实质上获得添加的 `upper()` 方法。


    ```

    class MyDSLExtension {

    static String upper(String it) { it.toUpperCase() }

    }

    ```


    同样，Groovy 会查看 `MyStaticDSLExtension` 类的所有静态方法，并使用它们向每个方法的第一个参数所属的类添加功能。例如，以下代码将为
    `String` 类添加一个 `boom` 方法，允许 `String.boom()` 返回 “!”：


    ```

    class MyStaticDSLExtension {

    static String boom(String it) { "!" }

    }

    ```


    请注意，对于 `staticExtensionClasses`，给定的参数（前面代码中的 `it`）不能在方法内部使用；它仅用于类型推断。


    ### ![../images/426440_2_En_7_Chapter/426440_2_En_7_Figc_HTML.gif](img/426440_2_En_7_Figc_HTML.gif)
    练习


    为你感兴趣的事物（无论是体育、数学、电影还是天体物理学）创建一个 Groovy DSL。


    脚注 1


    # 8. 特质（Traits）


    特质类似于带有默认实现和状态的接口。


    熟悉 Java 8 的人都知道，它为接口添加了默认方法特性。特质与 Java 8 的接口类似，但额外具备了拥有状态（字段）的能力。这提供了更大的灵活性，但应谨慎使用。


    ## 定义特质


    使用 `trait` 关键字定义特质：


    ```

    1   trait Animal {

    2       int hunger = 100

    3       def  eat() { println "eating"; hunger -= 1 }

    4       abstract int getNumberOfLegs()

    5   }

    ```


    正如这段代码所示，特质可以拥有属性、方法和抽象方法。如果一个类实现了某个特质，它必须实现该特质的抽象方法。


    ## 使用特质


    要使用特质，你需要使用 `implements` 关键字。例如：


    ```

    1   class Rocket  {

    2       String name

    3       def  launch() { println(name + "Take off!") }

    4   }

    5   trait MoonLander {

    6       def land() { println("${getName()} Landing!") }

    7       abstract String getName()

    8   }

    9   class  Apollo  extends  Rocket implements  MoonLander {

    10   }

    ```


    请注意，由于 `Rocket` 类拥有 `name` 属性，Groovy 自动实现了抽象的 `getName()` 方法。


    所以现在你可以执行以下操作：


    ```

    1   def  apollo = new  Apollo(name: "Apollo 12")

    2   apollo.launch()

    3   apollo.land()

    ```


    这将生成以下输出：


    ```

    1   Apollo 12 Take off!

    2   Apollo 12 Landing!

    ```


    与超类不同，你可以在一个类中使用多个特质。以下是一个示例：


    ```

    1   trait Shuttle {

    2       boolean canFly() { true }

    3       abstract int getCargoBaySize()

    4   }

    5   class MoonShuttle  extends  Rocket

    6       implements  MoonLander, Shuttle {

    7       int getCargoBaySize() { 100 }

    8   }

    ```


    这将允许你执行以下操作：


    ```

    1   MoonShuttle m = new  MoonShuttle(name: ''Taxi'')

    2   println "${m.name} can fly? ${m.canFly()}"

    3   println "cargo bay: ${m.getCargoBaySize()}"

    4   m.launch()

    5   m.land()

    ```


    给定上述代码，你将得到以下输出：


    ```

    1   Taxi can fly? true

    2   cargo bay: 100

    3   Taxi Take off!

    4   Taxi Landing!

    ```


    ### ![../images/426440_2_En_8_Chapter/426440_2_En_8_Figa_HTML.gif](img/426440_2_En_8_Figa_HTML.gif)
    练习


    看看当你在两个不同的特质中拥有相同的字段或方法，然后尝试将它们混合时会发生什么。

