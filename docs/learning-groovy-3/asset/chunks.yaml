- fmt: '# Closure with Delegate


    Within Groovy you can take a block of code (a closure) as a parameter and then
    call it using a local variable as a delegate. For example, imagine you have the
    following code for sending SMS texts:


    ```

    1   class SMS {

    2           String from, to, body;

    3           def  from(String fromNumber) {

    4                   from = fromNumber

    5           }

    6           def  to(String toNumber) {

    7                   to = toNumber

    8           }

    9           def  body(String body) {

    10                  this.body = body

    11           }

    12           def  send() {

    13                   // send the text.

    14           }

    15   }

    ```


    In Java, you’d need to use this the following way:


    ```

    1   SMS m = new  SMS();

    2   m.from("555-432-1234");

    3   m.to("555-678-4321");

    4   m.body("Hey there!");

    5   m.send();

    ```


    In Groovy you can add the following static method to the `SMS` class for DSL-like
    usage (`block` is expected to be a closure):


    ```

    1   def static send(@DelegatesTo(SMS) Closure block) {

    2           SMS m = new  SMS()

    3           block.delegate = m

    4           block()

    5           m.send()

    6   }

    ```


    This sets the `SMS` object as a delegate for the block so that methods are forwarded
    to it. The (optional) `@DelegatesTo(SMS)` annotation tells the compiler and IDE
    what class is used as delegate to the closure. Now you can do the following:


    ```

    1   SMS.send {

    2           from ''555-432-1234''

    3           to ''555-678-4321''

    4           body ''Hey there!''

    5   }

    ```


    This removes a lot of repetition from the code.


    ### Tip


    As demonstrated, you can omit the parentheses when making a simple method call.


    ## Command Chains


    As noted earlier, Groovy has support for *command chains* which allow you to completely
    omit parenthesis and dots when making method calls with one or more parameters.


    For example, let’s take the previous class for sending SMS messages but convert
    it to support the command chain syntax.


    ```

    1   class SMS {

    2           String from, to, body;

    3           SMS  from(String fromNumber) {

    4                   from = fromNumber; return this

    5           }

    6           SMS  to(String toNumber) {

    7                   to = toNumber; return this

    8           }

    9           SMS  body(String body) {

    10                   this.body = body; return this

    11           }

    12           def  send() { /* send the text */ }

    13           def static send(@DelegatesTo(SMS) Closure block) {

    14           /* same as before */ }

    15   }

    ```


    Now our DSL syntax can be used like the following:


    ```

    1   SMS.send {

    3           from ''555-432-1234'' to ''555-678-4321''

    4              body ''Hey there!''

    5   }

    ```


    ## Overriding Operators


    In Groovy you can override operators simply by naming your methods using the English
    word for the operator. For example, `plus` for `+` and `minus` for `-`. See the
    following table for more operators:


    | Operator | Method Name |

    | --- | --- |

    | `+` | plus |

    | `-` | minus |

    | `*` | multiply |

    | `/` | div |

    | `%` | mod |

    | `**` | power |

    | `&#124;` | or |

    | `&` | and |

    | `ˆ` | xor |

    | `<<` | leftShift |

    | `>>` | rightShift |

    | `++` | next |

    | `--` | previous |


    For more complex operators, the variables `a`, `b`, and `c` are used to demonstrate
    how they are used in the following table (where `a` is an instance of the class
    defining the method):


    | Example | Method Declaration |

    | --- | --- |

    | `a()` | call() |

    | `a as b` | asType(b) |

    | `a[b]` | getAt(b) |

    | `a[b] = c` | putAt(b,c) |

    | +a | positive() |

    | -a | negative() |

    | ~a | bitwiseNegate() |

    | b in a | isCase(b) |


    For example, let’s create a class called `Logic` with a Boolean value and define
    the `and` and `or` methods.


    ```

    1   class  Logic  {

    2       boolean value

    3       Logic(v) {this.value = v}

    4       def and(Logic other) {

    5           this.value && other.value

    6       }

    7       def or(Logic other) {

    8           this.value || other.value

    9       }

    10   }

    ```


    Then, let’s use these methods and see if they work like we would expect:


    ```

    1   def  pale = new  Logic(true)

    2   def old = new Logic(false)


    4   println "groovy truth: ${pale && old}" //true

    5   println "using and: ${pale & old}" // false

    6   println "using or: ${pale | old}" // true

    ```


    Notice that using the built-in `&&` operator uses “Groovy truth” and returns true
    because both variables are non-null.


    Next, let’s try defining the `leftShift` and `minus` operators on a class:


    ```

    1   class Wizards {

    2       def list = []

    3       def leftShift(person) { list.add person }

    4       def  minus(person) { list.remove person }

    5       String toString() { "Wizards: $list" }

    6   }

    7   def  wiz = new  Wizards()

    8   wiz << ''Gandolf''

    9   println wiz // Wizards: [Gandolf]

    10   wiz << ''Harry''

    11   println wiz // Wizards: [Gandolf, Harry]

    12   wiz - ''Harry''

    13   println wiz // Wizards: [Gandolf]

    ```


    You can also implement the `putAt` and `getAt` methods that allow you to use the
    bracket syntax. For example:


    ```

    1   def value = wiz[1] // uses getAt(1)

    2   wiz[1] = value // uses putAt(1, value)

    ```


    This can be useful when writing for a domain that uses the bracket notation.'
