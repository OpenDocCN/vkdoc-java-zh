    # Part IIIThe Groovy Ecosystem


    The Groovy Ecosystem


    There are many different frameworks and libraries built on top of Groovy (or support
    it as an option) that make up the Groovy ecosystem.


    # 11. Groovy Awesomeness


    This short chapter introduces various useful frameworks within the Groovy ecosystem.
    Some of these will be described more fully in later chapters.'
  trans: "\n## 尾递归\n\n在 Groovy 1.8 中，为闭包引入了 `trampoline` 方法以使用尾递归优化。这使得闭包调用可以顺序执行，而不是堆叠起来，从而避免\
    \ `StackOverFlowError` 并提升性能。\n\n从 Groovy 2.3 开始，你可以对递归方法使用 `trampoline`，但 `@TailRecursive`\
    \ AST 转换使用起来更简单。只需用 `@TailRecursive` 注解一个尾递归方法，剩下的工作交给 Groovy 即可。例如：\n\n```\n\
    1   import   groovy.transform.*\n2   @TailRecursive\n3   long  totalPopulation(list,\
    \ total = 0) {\n4     if (list.size() == 0)\n5       total\n6     else\n7    \
    \   totalPopulation(list.tail(), total + list.first().population)\n8   }\n```\n\
    \n### ![../images/426440_2_En_9_Chapter/426440_2_En_9_Figf_HTML.gif](img/426440_2_En_9_Figf_HTML.gif)信息\n\
    \n在 Groovy 列表中，`tail` 方法返回移除第一个元素后的列表，而 `first` 仅返回第一个元素。\n\n该方法会接收一个包含 `population`\
    \ 属性的对象列表，并计算这些属性的总和。例如，我们创建一个 `City` 类，使用一个范围生成多个实例，然后调用 `totalPopulation` 方法：\n\
    \n```\n1   @Canonical class City {int population}\n2   def cities = (10..1000).collect{new\
    \ City(it)}\n3   totalPopulation(cities)\n4   // 500455\n```\n\n这展示了如何以函数式风格使用尾递归作为迭代的替代方案。\n\
    \n### ![../images/426440_2_En_9_Chapter/426440_2_En_9_Figg_HTML.gif](img/426440_2_En_9_Figg_HTML.gif)信息\n\
    \n尾递归与不可变性配合良好，因为在尾递归中无需直接修改变量。\n\n## 总结\n\n在本章中，你学习了以下内容：\n\n*   函数作为一等公民，即闭包\n\
    \n*   映射/过滤/归约，即 `collect/findAll/inject`\n\n*   不可变性及其与函数式编程的关系\n\n*   Groovy\
    \ 中支持函数式编程的各种特性\n\n*   Groovy 中的方法句柄\n\n*   尾递归优化\n\n脚注 1   2   3\n\n# 10. Groovy\
    \ GPars\n\nGPars^(²¹) 是一个开源项目，旨在为 Java 和/或 Groovy 带来多种并发抽象。它曾短暂地捆绑在 Groovy 中，后来被分离出来。\n\
    \n它包含了并行 map/reduce、Actor、Dataflow 以及许多其他并发模型。尽管任何为 Java 编写的并发库（如 RxJava、Project\
    \ Reactor 或 Akka）都可以与 Groovy 一起使用，但 GPars 是专门为 Groovy 设计的。\n\n## 入门指南\n\n首先，你需要在项目中引入\
    \ GPars。例如，在 Gradle 构建文件中，将以下内容添加到 `dependencies` 块中：\n\n```\ncompile \"org.codehaus.gpars:gpars:1.2.1\"\
    \n```\n\n对于 Maven 构建，将以下内容添加到依赖项中：\n\n```\n<dependency>\n    <groupId>org.codehaus.gpars</groupId>\n\
    \    <artifactId>gpars</artifactId>\n    <version>1.2.1</version>\n</dependency>\n\
    ```\n\n## 并行 Map Reduce\n\n在本节中，我们将使用一个包含毕业年份和 GPA 的学生列表。\n\n```\nclass Student\
    \ { int graduationYear; double gpa; }\n// 创建一个学生列表\nCollection<Student> students\
    \ = new ArrayList<>()\n```\n\n你可以通过以下方式使用 GPars 库执行并行 map/reduce：\n\n```\n1  \
    \ GParsPool.withPool {\n2       // 一种 map-reduce 函数式风格\n3       def bestGpa =\
    \ students.parallel\n4           .filter{ s -> s.graduationYear==Student.THIS_YEAR\
    \ }\n5           .map{ s -> s.gpa }\n6           .max()\n7   }\n```\n\n静态方法 `GParsPool.withPool`\
    \ 接收一个闭包，并使用多种方法（通过 Groovy 的 Category 机制）增强任何集合。`parallel` 方法实际上从给定的集合创建了一个 `ParallelArray`（JSR-166^(²²)），并对其进行了轻量封装。^(²³)\n\
    \n## Actors\n\n*Actor 设计模式* 是开发并发软件的一种有用模式。在该模式中，每个 Actor 在自己的线程中执行并操作自己的数据。数据不能被任何其他线程操作。消息（由\
    \ GPars 内部）在 Actor 之间传递，以促使它们更改数据。你也可以创建无状态的 Actor。\n\n当数据一次只能被一个线程更改时，这被称为*线程安全*。\n\
    \n```\n0   @Grab(\"org.codehaus.gpars:gpars:1.2.1\")\n1   import groovyx.gpars.actor.Actor\n\
    2   import groovyx.gpars.actor.DefaultActor\n\n4   class Dragon extends DefaultActor\
    \ {\n5       int age\n\n7       void afterStart() {\n8           age = new Random().nextInt(1000)\
    \ + 1\n9       }\n11       void act() {\n12           loop {\n13             \
    \  react { int num ->\n14                 if (num > age)\n15                 reply\
    \ 'too old'\n16                 else if (num < age)\n17                 reply\
    \ 'too young'\n18                 else  {\n19                   reply 'you guessed\
    \ right!'\n20                   terminate()\n21                 }\n22        \
    \       }\n23           }\n24       }\n25   }\n26   // 猜测龙的年龄\n27   class Guesser\
    \ extends DefaultActor {\n28       String name\n29       Actor server\n30    \
    \   int myNum\n\n32       void act() {\n33           loop {\n34             myNum\
    \ = new Random().nextInt(1000) + 1\n35             server.send myNum\n36     \
    \        react {\n37               switch (it) {\n38                 case 'too\
    \ old': println \"$name: $myNum was too old\"; break\n39                 case\
    \ 'too young': println \"$name: $myNum was too young\"; break\n40            \
    \     default: println \"$name: I won $myNum\"; terminate(); break\n41       \
    \        }\n42             }\n43           }\n44         }\n45   }\n\n47   def\
    \  master = new  Dragon().start()\n48   def player = new Guesser(name: 'Guesser',\
    \ server: master).start()\n\n50   // 这强制主线程保持活跃，直到两个 Actor 都停止\n51   [master,\
    \ player]*.join()\n```\n\n这里，`Dragon` 类以一个介于 1 到 1000 之间的随机年龄开始。然后它对给定的数字做出响应，回复该数字是太大、太小还是与其年龄相同。`Guesser`\
    \ 类循环执行，每次循环生成一个随机猜测，并将其发送给 `Dragon`（称为 `server`）。然后 `Guesser` 对来自 `Dragon` 的消息做出响应，并在猜对年龄时终止。\n\
    \n输出将类似于以下内容：\n\n```\nGuesser: 236 was too young\n... 许多其他猜测\nGuesser: 819 was\
    \ too old\nGuesser: I won 527\n```\n\n## 更多 GPars 特性\n\n有关 GPars 其他部分的更多信息，例如\
    \ Agents（与 Actor 非常相似，但以函数作为消息）、Dataflow（一种具有确定性行为的替代并发模型）和 STM（软件事务内存，为开发者提供处理内存状态的事务语法），请参阅\
    \ GPars 优秀的在线指南。^(²⁴)\n\n脚注 1   2   3   4\n\n# 第三部分 Groovy 生态系统\n\nGroovy 生态系统\n\
    \nGroovy 生态系统由许多基于 Groovy 构建（或将其作为可选支持）的不同框架和库组成。\n\n# 11. Groovy 的精彩之处\n\n本章简要介绍了\
    \ Groovy 生态系统中的各种实用框架。其中一些将在后续章节中更详细地描述。\n"
- fmt: '# Web and UI Frameworks


    The following are web and user interface frameworks that are built on top of Groovy
    or where Groovy is supported.


    ## Grails^([^(25)](#fn25))


    A web framework inspired by Ruby on Rails. It has at least 800 plugins and uses
    convention over configuration approach.


    ## Micronaut^([^(26)](#fn26))


    A newer framework for building microservices, serverless applications, or command-line
    applications with a small memory footprint and fast start-up speed with compile-time
    annotation processing. Built by the same group behind Grails.


    ## Griffon^([^(27)](#fn27))


    A framework for building Swing UIs. It has a command-line interface very similar
    to Grails. For example, `create-app cool -archetype=jumpstart`.


    ## Vert.x^([^(28)](#fn28))


    A framework for asynchronous application development. Not strictly a Groovy project,
    but you can use it. It’s currently an Eclipse Foundation project.^([^(29)](#fn29))


    ## Ratpack^([^(30)](#fn30))


    A toolkit for asynchronous web applications on the JVM and web services (microservices).
    Built on top of Netty.


    # Cloud Computing Frameworks


    Cloud computing has become a mainstream necessity in today’s programming world.
    Here are two useful Groovy frameworks for two popular cloud platforms.


    ## Gaelyk^([^(31)](#fn31))


    An abstraction over GAE (Google App Engine); it has an emerging plugin system.


    ## Caelyf^([^(32)](#fn32))


    Apache 2-licensed framework for CloudFoundry. It’s similar to gaelyk.


    # Build Frameworks


    No project is complete without a build framework. Gradle has become more and more
    popular in the last few years especially for building Java projects. It’s also
    the default build framework for Android and Grails projects.


    ## Gradle^([^(33)](#fn33))


    It uses a Groovy-based DSL for building projects (it has added a Kotlin-based
    DSL as well) and uses `build.gradle` as the main build file. It has a very large
    plugin ecosystem and can be used to build any type of application.


    ## Gant^([^(34)](#fn34))


    Like Ant in Groovy. It’s now in maintenance mode. It was used by Grails and Griffon
    in the past.


    # Testing Frameworks/Code Analysis


    Testing is extremely important for any project, and code analysis is sometimes
    useful for large projects. We will cover one of these frameworks, called Spock,
    in a later chapter.


    ## Spock^([^(35)](#fn35))


    A very slick Groovy-based DSL testing framework that has been around for many
    years. It has the ability to use data tables for test input, built-in ability
    to mock classes and interfaces, and many other features.


    ## Codenarc^([^(36)](#fn36))


    Static code analysis for Groovy and has been around since 2009. It has plugins
    for Grails and Griffon.


    # Concurrency


    As described earlier, concurrency is extremely important for efficient applications
    to take complete advantage of the hardware.


    ## GPars^([^(37)](#fn37))


    A multi-threading framework for Groovy. It has a fork/join abstraction, Actors,
    Dataflow, STM, and more.


    ## RxGroovy^([^(38)](#fn38))


    This is a Groovy adapter to RxJava, a library for composing asynchronous and event-based
    programs using observable sequences for the JVM. However, it’s no longer necessary—you
    can just use the RxJava library directly.


    # Others


    These are other tools created by the community for managing your installed programming
    frameworks and tools and for creating new projects.


    ## SDKMAN^([^(39)](#fn39))


    Originally called Groovy enVironment Manager (GVM). It’s now called SDKMAN (Software
    Development Kit Manager) and is very cool. It allows you to manage multiple versions
    of several Groovy and non-Groovy SDKs, including Groovy itself.


    ## Lazybones^([^(40)](#fn40))


    A simple project creation tool that uses packaged project templates. This can
    be installed using sdkman. It creates the basic files necessary to start various
    types of projects. For example, it has a Ratpack template.


    ## GrooCSS^([^(41)](#fn41))


    A Groovy-based DSL for creating CSS. It’s much like LESS but with everything Groovy
    has to offer available.


