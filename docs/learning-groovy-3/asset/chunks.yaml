    # About This Book


    This book is organized into several chapters, starting from the most basic concepts.
    If you already understand a concept, you can safely move ahead to the next chapter.
    Although this book concentrates on Groovy, it also refers to other languages,
    such as Java, Scala, and JavaScript.


    As the title suggests, this book is about learning Groovy but will also cover
    related technology, such as build tools and web frameworks.


    ## Assumptions


    This book assumes the reader already is familiar with Java syntax and basic programming
    ideas.


