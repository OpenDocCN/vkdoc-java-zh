    ## Ranges


    The `Range` is a built-in type in Groovy. It can be used to perform loops, in
    switch cases, extracting substrings, and other places. Ranges are generally defined
    using the syntax `start..end`.


    Ranges come in handy for traversing using the `each` method and `for` loops:


    ```

    1   (1..4).each {print it} //1234

    2   for (i in 1..4) print i //1234

    ```


    A `case` statement was demonstrated in an earlier chapter, such as the following:


    ```

    switch (x) {

    case "foo": result = "foo"

    break

    case  12..30: result = "12 to 30"

    break

    ```


    ### ![../images/426440_2_En_4_Chapter/426440_2_En_4_Figc_HTML.gif](images/426440_2_En_4_Chapter/426440_2_En_4_Figc_HTML.gif)
    Warning


    This works only if the value given to the `switch` statement is the same type
    as the `Range` (an Integer in this case).


    You can use ranges to extract substrings from a string using the `getAt` syntax.
    For example:


    ```

    1   def  text = ''learning groovy'',

    2   println text[0..4] //learn

    3   println text[0..4, 8..-1] //learn groovy

    ```


    ### ![../images/426440_2_En_4_Chapter/426440_2_En_4_Figd_HTML.gif](images/426440_2_En_4_Chapter/426440_2_En_4_Figd_HTML.gif)
    Tip


    Negative numbers count down from the last element of a collection or string. So
    `-1` equates to the last element.


    You can also use ranges to access elements of a list:


    ```

    1   def list = [''hank'', ''john'', ''fred'']

    2   println list[0..1] //[hank, john]

    ```


    You can define a range to be exclusive of the last number by using the `..<` operator.
    For example, another way to print `1234` would be the following:


    ```

    1   (1..<5).each {print it} //1234

    ```


    ### ![../images/426440_2_En_4_Chapter/426440_2_En_4_Fige_HTML.gif](images/426440_2_En_4_Chapter/426440_2_En_4_Fige_HTML.gif)
