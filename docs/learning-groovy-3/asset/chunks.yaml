    # 5. Coming from Java


    Since most readers are already familiar with Java, it would be helpful to compare
    common Java idioms with the Groovy equivalent.


    ## Default Method Values


    One thing that might surprise you coming from Java is that in Groovy you can provide
    default values for method parameters. For example, let’s say you have a `fly`
    method with a parameter called `text`:


    ```

    1   def fly(String text = "flying") {println text}

    ```


    ### Note


    Using the `"def"` keyword in this way defines a method with return type of `java.lang.Object`.


    This would essentially create two methods behind the scenes (from a Java standpoint):


    ```

    1   def  fly() {println "flying"}

    2   def  fly(String text) {println text}

    ```


    This can work with any number of parameters as long as the resulting methods do
    not conflict with other existing methods. Given our preceding example, we can
    test it as follows:


    ```

    fly() // output: flying

    fly(''Groovy'') // output: Groovy

    ```


    ## Equals, HashCode, and More


    Groovy has many annotations in the `"groovy.transform"` package that implement
    **AST transformations** (Abstract Syntax Tree transformations). In other words,
    they simplify life by adding commonly written code (often called “boilerplate”)
    to the byte-code of your class for you at compilation time when you use them to
    annotate your class.


    One of the tedious tasks you must often do in Java is create an `equals` and a
    `hashCode` method for a class. For this purpose, Groovy added the `@EqualsAndHashCode`
    annotation. Simply add it to the top of your class (right before the word `class`)
    and you’re done.


    Likewise, you often want to create a constructor for all of the fields of a class.
    For this, Groovy has `@TupleConstructor` . It uses the order of the definitions
    of your fields to define a constructor with parameters for initializing those
    fields. Just add it right before your class definition.


    There’s also the `@ToString` annotation you can add before your class definition
    for automatically creating a `toString()` method for your class. You can also
    configure it to include or exclude certain fields.


    Finally, if you want to have all of these things on your class, just use the `@Canonical`
    annotation. You can use Ctrl+T in the `groovyConsole` to see how this affects
    the syntax tree.


    ```

    1   import groovy.transform.*

    2   @Canonical class Dragon {def name}

    3   println new Dragon("Smaug")

    4   // prints: Dragon(Smaug)

    5   assert new Dragon("").equals(new Dragon(""))

    ```


    ### ![../images/426440_2_En_5_Chapter/426440_2_En_5_Figa_HTML.gif](images/426440_2_En_5_Chapter/426440_2_En_5_Figa_HTML.gif)
    Exercise


    Create your own class with multiple properties using these annotations.


    ## Regex Pattern Matching


    Groovy greatly simplifies using a pattern to match text using regex (regular expressions).


    Where in Java you must use the `java.util.regex.Pattern` class, create an instance,
    and then create a Matcher; in Groovy this can all be simplified to one line.


    By convention you surround your regex with slashes. This allows you to use special
    regex syntax without using the tedious double backslash. For example, to determine
    if a String is an e-mail address (given a variable named `email`):


    ```

    1   def  isEmail = email ==~ /[\w.]+@[\w.]+/

    ```


    The equivalent code in Java would be


    ```

    1   Pattern patt = Pattern.compile("[\\w.]+@[\\w.]+");

    2  boolean  isEmail = patt.matches(email);

    ```


    There’s also an operator for creating a matcher in Groovy:


    ```

    1   def email = ''mailto:adam@email.com''

    2   def  mr = email =~ /[\w.]+@[\w.]+/

    3   if (mr.find()) println mr.group()

    ```


    This allows you to find regular expressions inside strings and to get sub-groups
    from a regex.


    ### ![../images/426440_2_En_5_Chapter/426440_2_En_5_Figb_HTML.gif](images/426440_2_En_5_Chapter/426440_2_En_5_Figb_HTML.gif)
    Exercise


    Create a better regex for validating e-mail in Groovy.


    ## Missing Java Syntax


    Due to the nature of Groovy’s syntax and some additions to Java’s syntax over
    the years, Groovy was “missing” a few things before version 3.0\. However, there
    are other ways to do the same things.


    Arrays can be somewhat difficult to work with in Groovy pre-3.0 because the Java
    syntax for creating an array of values does not compile. For example, the following
    would not compile in Groovy 2.5:


    ```

    1   String[] array = new  String[] {"foo", "bar"};

    ```


    You should instead use the following syntax (if you must use an array):


    ```

    1   String[] array = [''foo'', ''bar''].toArray()

    ```


    There are several options in Groovy for iterating through a list, array, or collection:
    using the `in` keyword, the Java style, or the `each` method with a closure. For
    example:


    ```

    1   for (String item : array) println(item)

    2   for (item in array) println(item)

    3   array.each { item -> println(item) }

    ```


    ## Optional Semicolon


    Since the semicolon is optional in Groovy, this can sometimes cause line-ending
    confusion when you’re used to Java. Usually this is not a problem, but when calling
    multiple methods in a row (using a fluent API, for example), this can cause problems.
    In this case, you need to end each line with a non-closed operator, such as a
    dot.


    For example, let’s take an arbitrary fluent API:


    ```

    1   class Pie  {

    2     def  bake() { this }

    3     def  make() { this }

    4     def  eat() { this }

    5   }

    6   def pie = new Pie().

    7           make().

    8           bake().

    9           eat()

    ```


    If you were to use the typical Java syntax, it might cause a compilation error
    in older versions Groovy (not true anymore):


    ```

    1   def pie = new Pie() //Groovy interprets end of line

    2           .make() // huh? what is this?

    ```


    ## Optional Parenthesis Sometimes


    Groovy allows parenthesis to be left out in some cases to simplify the syntax.
    The two main cases are as follows: when making a method call with one or more
    parameters and when a closure is the last (or only) parameter. For example, the
    following would work in Groovy:


    ```

    1   // call a method named "doStuff" with parameter 1

    2   doStuff 1

    3   // call "doStuff" with three parameters:

    4   doStuff 1, 2, 3

    5   // call "each" on "list" with one Closure:

    6   list.each { item -> doStuff(item) }

    ```'
