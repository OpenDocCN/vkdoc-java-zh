    \ geb\n| Plugin Info: geb\n| Latest Version: 2.0.0\n| All Versions: 1.0.2,1.1.1,1.1.2,1.1.3,1.1.4,1.1.5,2.0.0.RC1,2.0.0\n\
    | Title: Geb Plugin\nPlugin that adds Geb functional testing code generation features.\n\
    * License: APACHE\n* Documentation: http://grails.org/plugin/geb\n* Issue Tracker:\
    \ http://github.com/grails3-plugins/geb/issues\n* Source: http://github.com/grails3-plugins/geb\n\
    * Definition:\ndependencies {\ncompile \"org.grails.plugins:geb:2.0.0\"\n}\n```"
  trans: "\n# 13. Grails\n\nGrails 是一个面向 Groovy 的 Web 框架，它效仿 *Ruby on Rails*，成为一个带有命令行工具、能快速完成任务的固执己见的\
    \ Web 框架。Grails 采用约定优于配置的原则来减少配置开销。\n\nGrails 牢固地立足于 Java 生态系统，并构建在 Spring 和 Hibernate\
    \ 等技术之上。Grails 还（可选地）包含一个名为 *GORM* 的对象关系映射（ORM）框架，并拥有大量插件。\n\n不同版本的 Grails 可能差异很大，因此在升级\
    \ Grails 应用程序时需要格外小心，尤其是主版本升级（例如从 2.5 升级到 3.0）。\n\n本章将快速概述 Grails（3.3）的工作原理，然后简要介绍\
    \ Grails 的历史。\n\n## Grails 快速概览\n\n安装 Grails 后，^(⁴⁴) 你可以通过在命令行运行以下命令来创建一个应用（将\
    \ `TEST` 替换为你想要使用的目录名称）：\n\n```\n1   $ grails create-app TEST\n```\n\n默认情况下，这将使用“web”配置文件创建一个应用（要获取可用配置文件列表，请运行\
    \ `grails list-profiles`）。\n\n然后，你可以运行 `create-domain-class` 和 `generate-all`\
    \ 等命令来逐步创建你的应用。运行 `grails help` 可查看所有可用命令的完整列表。\n\nGrails 应用具有非常特定的项目结构。以下是该结构*大部分内容*的简单分解：\n\
    \n*   `grails-app` — Grails 专用文件夹。\n    *   `assets`\n        *   `images` — Web\
    \ 应用使用的图片。\n        *   `javascripts` — 存放 JavaScript 文件。\n        *   `stylesheets`\
    \ — CSS 样式表。\n    *   `conf` — 配置，例如 `application.yml` 或 `application.properties`\
    \ 文件。\n    *   `controllers` — 应用的控制器和 `UrlMappings` 类。提供用于 list、save、show 和 create\
    \ 等操作的代码。\n    *   `domain` — 领域模型；如果你使用 GORM，这里存放表示持久化数据的类。\n    *   `i18n` —\
    \ 消息资源包，使你能够提供多种不同语言的文本。\n    *   `init` — 包含 `Application.groovy` 和 `BootStrap.groovy`。\n\
    \    *   `services` — 后端服务，存放后端或“业务”逻辑。\n    *   `taglib` — 你可以在此处非常轻松地定义自己的标签，以便在\
    \ GSP 文件中使用。\n    *   `views` — MVC 的视图；通常是 GSP 文件（基于 HTML）。\n    *   `utils`\
    \ — 可以包含工具类。\n*   `src` — 任何不适合放在其他位置的通用代码。\n    *   `main/java` — Java 代码\n \
    \   *   `main/groovy` — Groovy 代码\n    *   `main/resources` — 你想要放在主类路径中的任何非代码资源。\n\
    \    *   `test/groovy` — 基于 Groovy 的测试，可以使用 JUnit 或 Spock。\n    *   `integration-test/groovy`\
    \ — 包含基于 Geb 的测试。\n    *   `integration-test/resources` — 包含用于配置 Geb 的 `GebConfig.groovy`。\n\
    \n要创建一个新的领域（模型）类，请运行如下命令：\n\n```\n1   $ grails create-domain-class example.Post\n\
    ```\n\n为你的领域类包含一个包是一个好习惯（这里包名是“`example`”，类名是 Post）。\n\nGrails 中的领域类还定义了其到数据库的映射。例如，下面是一个表示博客文章的领域类（假设\
    \ `User` 和 `Comment` 已经创建）：\n\n```\n1   class  Post  {\n2       String text\n\
    3       int rating\n4       Date created = new  Date()\n5       User createdBy\n\
    \n7       static hasMany = [comments: Comment]\n\n9       static constraints =\
    \ {\n10           text(size:10..5000)\n11       }\n12   }\n```\n\n静态字段 `hasMany`\
    \ 是一个映射，表示数据库中的一对多关系。GORM 在后台使用 Hibernate 为所有领域类和关系创建表。默认情况下，每个表都会获得一个用于主键的 `id`\
    \ 字段。\n\n要让 Grails 自动创建你的控制器和视图，请运行以下命令：\n\n```\n1   $ grails generate-all example.Post\n\
    ```\n\n### ![../images/426440_2_En_13_Chapter/426440_2_En_13_Figa_HTML.gif](img/426440_2_En_13_Figa_HTML.gif)警告\n\
    \n如果文件已存在，Grails 会询问你是否要覆盖。使用此命令时请小心。\n\n当你想要直接运行应用程序进行测试时，只需运行以下命令：\n\n```\n\
    1   $ grails run-app\n```\n\n如果你想部署到应用容器（例如 Tomcat），可以通过运行以下命令创建一个 `war` 文件：\n\
    \n```\n1   $ grails war\n```\n\n## 配置\n\n由于 Grails 3+ 构建在 Spring Boot 之上，因此配置的工作方式类似，默认使用\
    \ `grails-app/conf/application.yml` 文件。\n\n在此文件的底部附近，你会看到默认配置为开发环境和测试环境使用内存型 h2\
    \ 数据库，为生产环境使用基于文件的 h2 数据库。它们的配置如下（你可以在此处更改配置以切换数据库）：\n\n```\ndevelopment:\ndataSource:\n\
    dbCreate: create-drop\nurl: jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
    test:\ndataSource:\ndbCreate: update\nurl: jdbc:h2:mem:testDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
    production:\ndataSource:\ndbCreate: none\nurl: jdbc:h2:./prodDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
    properties:\njmxEnabled: true\ninitialSize: 5\n...(为简洁起见已截断)\n```\n\n## 插件\n\n\
    Grails 生态系统包含超过 100 个插件。要列出所有插件，只需执行以下命令：\n\n```\n1   $ grails list-plugins\n\
    ```\n\n当你选定了要使用的插件后，执行以下命令可查看可用版本以及如何将其包含在构建依赖项中（使用插件名称）：\n\n```\n1   $ grails\
    \ plugin-info [NAME]\n```\n\n这将显示要添加到 `build.gradle` 文件中的适当代码，以便将插件添加到你的项目中。例如，让我们查看一下“geb”插件（Geb\
    \ 是一个 Web 测试框架）。以下是输出结果：\n\n```\n$ grails plugin-info geb\n| Plugin Info: geb\n\
    | Latest Version: 2.0.0\n| All Versions: 1.0.2,1.1.1,1.1.2,1.1.3,1.1.4,1.1.5,2.0.0.RC1,2.0.0\n\
    | Title: Geb Plugin\nPlugin that adds Geb functional testing code generation features.\n\
    * License: APACHE\n* Documentation: http://grails.org/plugin/geb\n* Issue Tracker:\
    \ http://github.com/grails3-plugins/geb/issues\n* Source: http://github.com/grails3-plugins/geb\n\
    * Definition:\ndependencies {\ncompile \"org.grails.plugins:geb:2.0.0\"\n}\n```\n"
- fmt: "## GSP and Taglibs\n\nGrails uses GSP by default for generating views in a\
    \ web application. Take a look at the `grails-app/views` directory. You should\
    \ see an `index.gsp` file which generates the landing page for your application.\
    \ If you generated the `example.Post` views as described earlier you will also\
    \ see some GSP files under a \"post\" directory. These generate the pages for\
    \ showing, listing, creating, and editing Posts.\n\nGSP is based on HTML with\
    \ the addition of its own built-in tag libraries (starting with the `g:` prefix).\
    \ You can add your own tag library by adding a class ending with `TagLib` to the\
    \ `grails-app/taglib` directory. For example, add a file named `SimpleTagLib.groovy`\
    \ to the `taglib` directory with the following code (which would format dates\
    \ with a given format):\n\n```\nclass SimpleTagLib {\n    static namespace = \"\
    my\" // changes from g: namespace to my:\n    def dateFormat = { attrs, body ->\n\
    \        out << new java.text.SimpleDateFormat(attrs.format).format(attrs.date)\n\
    \    }\n}\n```\n\nThis would now allow you to use the following tag in your GSP\
    \ files:\n\n```\n<my:dateFormat format=\"yyyy-MM-dd\" date=\"${new Date()}\" />\n\
    ```\n\n## Serving JSON or XML\n\nGroovy includes some built-in support for JSON\
    \ (JavaScript Object Notation) encoding and decoding, including the `JsonSlurper`.\
    \ Grails also includes converters for easily converting objects to XML or JSON\
    \ or vice versa. For example, see the following `PostController` with methods\
    \ for rendering `Post`s as JSON and XML:\n\n```\n1   import grails.converters.JSON\n\
    2   import grails.converters.XML\n3\n4   class PostController {\n5       def getPosts()\
    \ {\n6           render Post.list() as JSON\n7       }\n8       def getPostsXML()\
    \ {\n9           render Post.list() as XML\n10      }\n11  }\n```\n\nFor web services\
    \ that service multiple formats, you can use the built-in `withFormat` in Grails.\
    \ So the above code could be reduced to the following:\n\n```\n1   def getPosts()\
    \ {\n2       withFormat {\n3           json { render list as JSON }\n4       \
    \    xml { render list as XML }\n5       }\n6   }\n```\n\nThen Grails would decide\
    \ which format to use based on numerous inputs, the simplest being the extension\
    \ of the URL, such as `.json`, or the request's `Accept` header. For *using* web\
    \ services in Grails, you could use the `http-builder-helper` plugin or you could\
    \ use the built-in HTTP client from Micronaut (included in Grails 4).\n\n## UrlMappings\n\
    \nBy default, Grails reads the `UrlMappings` class to determine how to route incoming\
    \ requests to your web application. It consists of a static value named \"mappings\"\
    \ that uses a DSL to describe the routing of the application. The default `UrlMappings`\
    \ for a new project looks like the following:\n\n```\nclass UrlMappings {\n  \
    \  static mappings = {\n        \"/$controller/$action?/$id?(.$format)?\" {\n\
    \            constraints {\n                // apply constraints here\n      \
    \      }\n        }\n        \"/\"(view:\"/index\")\n        \"500\"(view:'/error')\n\
    \        \"404\"(view:'/notFound')\n    }\n}\n```\n\nThe variables `controller`,\
    \ `action`, `id`, and `format` within the first GString take on a special meaning\
    \ in this context. Using them in this way will match any value given and set the\
    \ corresponding variable to it. For example, the path `/post/show/123` would initiate\
    \ the \"show\" action on the `PostController` with a parameter ID of 123. You\
    \ can modify the mappings to create custom paths. For example, you could create\
    \ a custom route to create a new post like this: `\"/new/post/\" (controller:\
    \ \"post\", action: \"create\")`. The first path matched is what route Grails\
    \ will use.\n\n## Short History of Grails\n\nWhat follows is a brief history of\
    \ the features added to Grails starting with version 2.0.\n\n### Grails 2.0\n\n\
    There were the following improvements in Grails 2.0:\n\n- Better error page that\
    \ shows code what caused the problem.\n- H2 database console in development mode\
    \ (at the URI `/dbconsole`).\n- Grails 2.0 supports Groovy 1.8.\n- Runtime reloading\
    \ for typed services, domain classes, `src/groovy`, and `src/java`.\n- Run any\
    \ command with `-reloading` to dynamically reload it.\n- Binary plugins (jars)."
