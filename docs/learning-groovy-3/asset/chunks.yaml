    \ also defines its mapping to the database. For example, here’s a domain class\
    \ representing a blog post (assuming `User` and `Comment` were already created):\n\
    \n```\n1   class  Post  {\n2       String text\n3       int rating\n4       Date\
    \ created = new  Date()\n5       User createdBy\n\n7       static hasMany = [comments:\
