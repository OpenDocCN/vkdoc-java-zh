  trans: '

    ## 什么是 Groovy？


    *Groovy* 是一种为 JVM（Java 虚拟机）构建的灵活开源语言，其语法与 Java 类似。它可以动态使用（任何变量都可以持有任何类型的对象），也可以静态类型化（每个变量的类型受到严格限制）；这由你决定。在大多数其他语言中，只能二选一。它支持函数式编程结构，包括头等函数、柯里化等。它还具备多重继承、类型推断和元编程能力。


    Groovy 始于 2003 年，部分是为了回应 Ruby。其主要特性是动态类型、元编程（在运行时更改类的能力）以及与 Java 的紧密集成。尽管其最初创建者大约在
    2005 年离开了该项目，但多年来社区中的许多开发者^(⁹)为其做出了贡献。过去，多个组织曾支持 Groovy 的开发，与许多开源项目一样，它不能归功于某个人或某家公司。自
    2015 年起，它已成为 Apache 软件基金会^(¹⁰)的一个项目。


    Groovy 在语法上与 Java 非常相似，因此 Java 开发者通常很容易学习（Java 代码通常也是有效的 Groovy 代码，尤其是在 Groovy
    3.0 之后，它增加了对类似 Java 的数组声明以及许多其他 Java 语法特性的支持）。然而，Groovy 拥有许多额外的特性和更宽松的语法规则：闭包、动态类型、元编程（通过
    `metaClass`）、可选分号、正则表达式支持、运算符重载、GString 等等。Groovy 在运行时被解释执行，但在 Groovy 2.0 中，增加了编译为字节码并强制执行类型检查的能力。


    ## 紧凑的语法


    Groovy 的语法可以比 Java 紧凑得多。例如，以下标准 Java 5+ 代码应打印出 `"Rod"`：


    ```

    1   for (String it : new  String[] {"Rod", "Carlos", "Chris"})

    2           if (it.length() < 4)

    3                   System.out.println(it);

    ```


    同样的功能可以用 Groovy 在一行中表达如下：


    ```

    1   ["Rod", "Carlos", "Chris"].findAll{it.size() < 4}.each{println it}

    ```


    它拥有大量内置特性来实现这一点（紧凑的列表定义、JDK 对象的扩展、闭包、可选分号、`println` 方法以及可选括号）。


    `findAll` 方法遍历列表，并使用给定的测试条件创建一个仅包含通过测试的对象的新集合。


    ## 动态 def


    Groovy 的一个关键特性是使用 `def` 关键字进行动态类型化。该关键字替代了任何类型定义，从而允许变量为任何类型。这有点像将变量定义为 `Object`，但并不完全相同，因为
    Groovy 编译器对 `def` 的处理方式不同。例如，你可以使用 `def`，同时仍然使用 `@TypeChecked` 注解，我们稍后会介绍这一点。


    ## 列表和映射定义


    Groovy 使列表和映射的定义更加简洁和简单。你只需使用方括号（`[]`）和映射符号（`:`）来将键映射到值：


    ```

    1   def  list = [1, 2]

    2   def map = [cars: 2, boats: 3]

    3   println list.getClass() // java.util.ArrayList

    4   println map.getClass() // java.util.LinkedHashMap

    ```


    默认情况下，Groovy 将映射键值解释为字符串，无需引号。当处理键为字符串的映射时，Groovy 允许你使用点符号来引用键（避免使用 `get` 和 `put`
    方法），从而使工作更加轻松。例如：


    ```

    1   map.cars = 2

    2   map.boats = 3

    3   map.planes = 0

    4   println map.cars // 2

    ```


    这甚至使得在某些情况下测试时可以使用映射来模拟对象（这将在后面的章节中介绍）。


    Groovy 列表甚至重写了左移运算符（`<<`），从而允许以下语法示例：


    ```

    1   def list = []

    2   list.add(new  Vampire("Count Dracula", 1897))

    3   // 或者

    4   list << new  Vampire("Count Dracula", 1897)

    5   // 或者

    6   list += new  Vampire("Count Dracula", 1897)

    ```


    ### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figa_HTML.gif](img/426440_2_En_2_Figa_HTML.gif)
    提示


    Groovy 允许重写常见的运算符，如加号和减号。我们将在后面的章节中介绍这一点。


    ## Groovy GDK


    内置的 Groovy 类型（GDK）与 Java 的类型基本相同，只是 Groovy 为每个类添加了大量方法。


    例如，`"each"` 方法允许你按如下方式遍历集合：


    ```

    1   ["Java", "Groovy", "Scala"].each{ println it }

    ```


    `println` 和 `print` 方法是在 `System.out` 上调用这些方法的简写形式。我们稍后将更深入地介绍 GDK。


    ## 一切都是对象


    与 Java 不同，原始类型可以随时像对象一样使用，因此看起来没有区别。例如，由于 GDK 为 `Number` 添加了 `times` 方法，你可以执行以下操作：


    ```

    1   100.times { println "hi" }

    ```


    这将打印 `"hi"` 100 次。


    ## 简便的属性


    Groovy 将 Java Bean 的概念提升到了一个全新的水平。你可以使用点符号获取和设置 Bean 属性（如果你不提供，Groovy 会自动为你的类添加
    getter 和 setter 方法）。


    例如，你可以使用 `person.firstName` 代替 `person.getFirstName()`。设置属性时，你可以直接使用 `person.firstName
    = ''Bob''` 代替 `person.setFirstName("Bob")`。


    ### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figb_HTML.gif](img/426440_2_En_2_Figb_HTML.gif)
    提示


    与 Java 不同，Groovy 默认总是 public。


    你还可以使用 `.properties` 轻松获取 Groovy 中对象的所有属性列表。例如：


    ```

    1   println person.properties

    ```


    ### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figc_HTML.gif](img/426440_2_En_2_Figc_HTML.gif)
    提示


    使用 `properties` 来探索 Groovy 中你想了解更多信息的某个类。


    ## GString


    Groovy 添加了自己的类，称为 `GString`，它允许你在字符串中嵌入 Groovy 代码。这是使 Groovy 非常简洁易读的另一个特性。每当你在
    Groovy 中使用双引号（`""`）时，就会创建一个 GString。


    例如，它可以轻松地将一堆变量嵌入到字符串中：


    ```

    1   def os = ''Linux''

    2   def cores = 2

    3   println("Cores: $cores, OS: $os, Time: ${new Date()}")

    ```


    美元符号 `$` 允许你直接引用变量，而 `${code}` 允许你在 GString 中包含时执行任意的 Groovy 代码。


    由于 `String` 在 JDK 中是一个 final 类，因此无法被扩展，所以 GString 不是 String 的子类。尽管在 Groovy 代码中的大多数地方它可以替代
    String 使用，但在需要 `java.lang.String` 时，这可能会导致一些问题。


    ### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Figd_HTML.gif](img/426440_2_En_2_Figd_HTML.gif)
    提示


    如果你只想使用 `java.lang.String`，你应该使用单引号（`''foo''`）。

