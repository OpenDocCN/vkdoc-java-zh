    \ create your controller and views, run the following:\n\n```\n1   $ grails generate-all\
    \ example.Post\n```\n\n### ![../images/426440_2_En_13_Chapter/426440_2_En_13_Figa_HTML.gif](images/426440_2_En_13_Chapter/426440_2_En_13_Figa_HTML.gif)Warning\n\
    \nGrails will ask if you want to overwrite existing files if they exist. Be careful\
