- fmt: "# Summary\n\nIn this chapter, you learned about the following Groovy features:\n\
    \n- What Traits are, which is similar to Java 8 interfaces.\n- How to define a\
    \ Trait with fields and methods.\n- How you can use multiple Traits in one class.\n\
    \n# 9. Functional Programming\n\n*Functional Programming* (FP) is a programming\
    \ style that focuses on functions and minimizes changes of state (using immutable\
    \ data structures). It is closer to expressing solutions mathematically rather\
    \ than step-by-step instructions.\n\nIn FP, functions should be “side-effect free”\
    \ (nothing outside the function is changed) and *referentially transparent* (a\
    \ function returns the same value every time when given the same arguments).\n\
    \nFP can be seen as an alternative to the more common *imperative programming,*\
    \ which is closer to telling the computer the steps to follow.\n\nAlthough functional-programming\
    \ can be achieved in pre-Java 8, Java 8 enabled language-level FP support with\
    \ lambda expressions and *functional interfaces*.\n\nJava 8, JavaScript, Groovy,\
    \ and Scala all support functional-style programming, although they are not strictly\
    \ FP languages.\n\n## Functions and Closures\n\nAs you might know, “functions\
    \ as a first-class feature” is the basis of functional programming. *First-class\
    \ feature* means that a function can be used anywhere a value could be used.\n\
    \nFor example, in JavaScript, you can assign a function to a variable and call\
    \ it:\n\n```\nvar func = function(x) { return x + 1; }\nvar three = func(2); //3\n\
    ```\n\nAlthough Groovy doesn’t have first-class functions, it has something very\
    \ similar: closures. As you have learned, a closure is simply a block of code\
    \ wrapped in curly brackets with parameters defined to the left of the `->` (arrow).\
    \ For example:\n\n```\ndef closr = {x -> x + 1}\nprintln(closr(2)); //3\n```\n\
    \nIf a closure has one argument, it can be referenced as `it` in Groovy. For example:\n\
    \n```\ndef closr = {it + 1}\n```\n\n### Tip\n\nIn Groovy, the `return` keyword\
    \ can be omitted if the returned value is the last expression.\n\n### Using Closures\n\
    \nAs discussed previously, when a closure is the last parameter to a method, it\
    \ can go outside of the parentheses, and if it is the only parameter, parentheses\
    \ can be omitted completely. For example, the following defines a method that\
    \ takes a list and a closure for filtering items:\n\n```\ndef find(list, tester)\
