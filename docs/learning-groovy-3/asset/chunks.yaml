    # 12. Gradle


    Gradle is a build tool for the JVM with a Groovy-based DSL for building projects.
    The Gradle web site describes it as follows:


    - Gradle combines the power and flexibility of Ant with the dependency management
    and conventions of Maven into a more effective way to build. Powered by a Groovy
    DSL and packed with innovation, Gradle provides a declarative way to describe
    all kinds of builds through sensible defaults.

    - —gradle.org (2015)^([^(42)](#fn42))


    ## Projects and Tasks


    Each Gradle build is composed of one or more projects and each project is composed
    of tasks. The core of the Gradle build is the `build.gradle` file (which is called
    the *build script*).


    To try it out, go to [`www.gradle.org`](http://www.gradle.org) and install Gradle.
    Then create your own `build.gradle` file.


    Tasks can be defined by writing `task` and then a task name followed by a closure.
    Use the `doLast` method with a closure to execute any arbitrary code. For example:


    ```

    1   task upper { doLast {

    2           String someString = ''test''

    3           println "Original: $someString"

    4           println "Uppercase: " + someString.toUpperCase()

    5   }}

    ```


    Tasks can contain any Groovy code.


    Much like in Ant, a task can depend on other tasks, which means they need to be
    run before the task. You simply call `dependsOn` with any number of task names
    as the arguments. For example:


    ```

    1   task buildApp {

    2           dependsOn clean, installApp, processAssets

    3   }

    ```


    You can also use the following alternative syntax:


    ```

    1   task buildApp(dependsOn: [clean, installApp, processAssets])

    ```


    ### Tip


    Use the `doLast` method if your task contains the actual code you want the task
    to run. You are adding a closure to the task, not configuring the task. Otherwise,
    Gradle always runs the code in the first pass, not just when you invoke the task.


    Once you’ve defined your tasks, you run them by invoking `gradle <task_name>`
    at the command line. There are some built-in tasks. For example, to list all available
    tasks, invoke the following:


    ```

    1   gradle tasks

    ```


    ## Plugins


    Gradle core has very little built-in, but it has powerful plugins to allow it
    to be very flexible. A plugin can do one or more of the following:


    - Add tasks to the project (e.g., compile and test).

    - Pre-configure added tasks with useful defaults.

    - Add dependency configurations to the project.

    - Add new properties and methods to existing type via extensions.


    We’re going to concentrate on building Groovy-based projects, so we’ll be using
    the Groovy plugin (however, Gradle is not limited to Groovy projects!):


    ```

    1   apply plugin: ''groovy''

    ```


    This plugin uses Maven’s conventions. For example, it expects to find your main
    source code under `src/main/groovy` and your test source code under `src/test/groovy`.'
