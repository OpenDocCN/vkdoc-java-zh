- fmt: '# Immutability


    Immutability and FP go together like peanut butter and jelly. Although it’s not
    necessary, they go together nicely.


    In purely functional languages, the idea is that each function has no effect outside
    itself—that is, no side effects. This means that every time you call a function,
    it returns the same value given the same inputs.


    To accommodate this behavior, there are *immutable* data structures. An immutable
    data structure cannot be directly changed but returns a new data structure with
    every operation.


    For example, Scala’s default `Map` is immutable:


    ```

    1   val map =  Map("Smaug" -> "deadly")

    2   val  map2 =  map + ("Norbert" -> "cute")

    3   println(map2) // Map(Smaug -> deadly, Norbert -> cute)

    ```


    So in this code, `map` would remain unchanged.


    Each language has a keyword for defining immutable variables (values). Java has
    the `final` keyword for declaring immutable variables, which Groovy also respects.


    ```

    1   public class Centaur {

    2       final String name

    3       public  Centaur(name) {this.name=name}

    4   }

    5   Centaur c = new  Centaur("Bane");

    6   println(c.name) // Bane

    7   c.name = "Firenze" //groovy.lang.ReadOnlyPropertyException...

    ```


    In addition to the `final` keyword, Groovy includes the `@Immutable annotation`^([^(19)](#fn19))
    for declaring a whole class immutable. It also adds a default constructor (same
    as `@TupleConstructor` which adds a parameter for initializing each field), `hashCode`,
    `equals`, and `toString` methods. For example (in Groovy):


    ```

    1   import groovy.transform.Immutable

    2   @Immutable

    3   public class Dragon  {

    4       String name

    5       int scales

    6   }

    7   Dragon smaug = new  Dragon(''Smaug'', 499)

    8   println smaug

    9   // Output: Dragon(Smaug, 499)

    ```


    This works for simple references and primitives, such as numbers and strings,
    but for things like lists and maps, it’s more complicated. For these cases, open
    source immutable libraries have been developed—for example, Guava^([^(20)](#fn20))
    for Java and Groovy. To use existing immutable classes, you can set them using
    the `knownImmutableClasses` attribute. For example (after adding Guava to your
    Gradle build dependencies using `compile "com.google.guava:guava:27.0-jre"` or
    similar), see the following:


    ```

    1  import com.google.common.collect.ImmutableList

    2  import groovy.transform.CompileStatic

    3  import groovy.transform.Immutable

    4  /** Groovy Guava List: has internal ImmutableList. */

    5  @Immutable(knownImmutableClasses = [ImmutableList])

    6  @CompileStatic

    7  class GroovyGuavaList {

    8      final ImmutableList list

    9  }

    ```


    ### Exercise


    Using the skills learned from previous chapters, create your own `GroovyGuavaList`
    class that overrides operators and is backed by an `ImmutableList` from Guava.
    Then use a Category or Extension module to add a method to `java.util.List` named
    `toGList()` that converts the list to a `GroovyGuavaList`.


    ## Groovy Fluent GDK


    In Groovy, `findAll` and other methods are available on every object, but they
    are especially useful for lists, sets, and ranges. In addition to `findAll`, `collect`,
    and `inject`, the following method names are used in Groovy:


    * `each`—Iterates through the values using the given closure

    * `eachWithIndex`—Iterates through with two parameters: a value and an index

    * `find`—Finds the first element that matches a closure

    * `findIndexOf`—Finds the first element that matches a closure and returns its
    index


    For example, `collect` makes it very simple to perform an operation on a list
    of values, collecting the results into a new list:


    ```

    1   def  list = [''foo'',''bar'']

    2   def newList = []

    3   list.collect( newList ) { it.substring(1) }

    4   println newList //  [oo, ar]

    ```


    For another example, assuming `dragons` is a list of dragon objects using the
    definition previously given:


    ```

    1   def dragons = [new Dragon(''Smaug'', 499), new Dragon(''Norbert'', 488)]

    2   String longestName = dragons.

    3       findAll { it.name != null }.

    4       collect { it.name }.

    5       inject("") { n1, n2 -> n1.length() > n2.length() ? n1 : n2 }

    ```


    The result should be `Norbert`. This code finds all non-null names, collects the
    names, and then reduces the list of names to the longest one.


    ### Tip


    Remember that `it` in Groovy can be used to reference a single argument of a closure.


    ### Exercise


    Using the previous code as a starting point, find the dragon with the most scales.


    ## Groovy Curry


    The `curry` method allows you to predefine values for parameters of a closure.
    It takes any number of arguments and replaces parameters from left to right as
    you might expect. For example, given a `concat` closure, you could create a `burn`
    closure and an `inate` closure easily as follows:


    ```

    1   def  concat = { x, y -> return  x + y }

    2   // closure

    3   def  burn = concat.curry("burn")

    4   def inate = concat.curry("inate")

    ```


    Since you’re only providing the first parameter, these closures are prepending
    their given text: `burn` prepends `"burn"` and `inate` prepends `"inate"`. For
    example:


    ```

    1   burn(" wood") // == burn wood

    ```


    You could then use another closure called `composition` to apply the two functions
    to one input.


    ```

    1   def composition = { f, g, x -> return f(g(x)) }

    2   def burninate = composition.curry(burn, inate)

    3   def  trogdor = burninate('' all the people'')

    4   println "Trogdor: ${trogdor}"

    5   // Trogdor: burninate all the people

    ```


    Functional composition is an important idea in functional programming. It allows
    you compose functions together to create complex algorithms out of simple building
    blocks.


    ## Method Handles


    Method handles allow you to refer to actual methods much like they are closures.
    They are similar to Java method references except they give you additional functionality
    inherent to closures, such as the `curry` method described previously. This is
    useful when you want to use existing methods instead of closures, or you just
    want an alternative syntax for closures. For example, given a method:


    ```

    1   def breathFire(name) { println "Burninating $name!" }

    ```


    You could later on do the following to use a method handle to the method (within
    the same class that defined `breathFire`):


    ```

    1   [''the country side'', ''all the people''].each(this.&breathFire)

    ```


    This would pass the `breathFire` method to the `each` method as a closure, causing
    the following to be printed:


    ```

    1   Burninating the country side!

    2   Burninating all the people!

    ```


    ### Exercise


    Create a method with multiple parameters and attempt to call it using a method
    handle. Does it work as expected?'
