  trans: '

    ## GSP 与标签库


    Grails 默认使用 GSP 在 Web 应用程序中生成视图。请查看 `grails-app/views` 目录。你应该会看到一个 `index.gsp`
    文件，它用于生成应用程序的登录页面。如果你按照之前的说明生成了 `example.Post` 视图，你还会在“post”目录下看到一些 GSP 文件。这些文件用于生成展示、列表、创建和编辑帖子的页面。


    GSP 基于 HTML，并添加了其内置的标签库（以 `g:` 前缀开头）。你可以通过向 `grails-app/taglib` 目录添加一个以 `TagLib`
    结尾的类来添加自己的标签库。例如，在 `taglib` 目录中添加一个名为 `SimpleTagLib.groovy` 的文件，并包含以下代码（该代码将使用指定格式格式化日期）：


    ```

    class SimpleTagLib {

    static namespace = "my" // 从 g: 命名空间更改为 my:

    def dateFormat = { attrs, body ->

    out << new

    java.text.SimpleDateFormat(attrs.format).format(attrs.date)

    }

    }

    ```


    现在，你就可以在你的 GSP 文件中使用以下标签了：


    ```


    提供 JSON 或 XML


    Groovy 包含一些对 JSON（JavaScript 对象表示法）编码和解码的内置支持，包括 `JsonSlurper`。Grails 还包含转换器，可以轻松地将对象转换为
    XML 或 JSON，反之亦然。例如，请看下面的 `PostController`，它包含了将 `Post` 渲染为 JSON 和 XML 的方法：


    ```

    1   import grails.converters.JSON

    2   import grails.converters.XML


    4   class  PostController  {

    5               def getPosts() {

    6                       render Post.list() as JSON

    7               }

    8               def getPostsXML() {

    9                       render Post.list() as XML

    10               }

    11   }

    ```


    对于提供多种格式的 Web 服务，你可以使用 Grails 内置的 `withFormat`。因此，上述代码可以简化为以下形式：


    ```

    1   def getPosts() {

    2           withFormat {

    3                   json { render list as JSON }

    4                   xml { render list as XML }

    5           }

    6   }

    ```


    然后，Grails 会根据多种输入来决定使用哪种格式，最简单的方式是通过 URL 的扩展名（例如 `.json`）或请求的 `Accept` 头。要在 Grails
    中*使用* Web 服务，你可以使用 http-builder-helper 插件^(⁴⁵)，或者使用 Micronaut（包含在 Grails 4 中）内置的
    HTTP 客户端。


    UrlMappings


    默认情况下，Grails 会读取 `UrlMappings` 类来确定如何将传入的请求路由到你的 Web 应用程序。它包含一个名为“mappings”的静态值，该值使用
    DSL 来描述应用程序的路由。新项目的默认 `UrlMappings` 如下所示：


    ```

    class UrlMappings {

    static mappings = {

    "/$controller/$action?/$id?(.$format)?"{

    constraints {

    // 在此处应用约束

    }

    }

    "/"(view:"/index")

    "500"(view:''/error'')

    "404"(view:''/notFound'')

    }

    }

    ```


    第一个 GString 中的变量 `controller`、`action`、`id` 和 `format` 在此上下文中具有特殊含义。以这种方式使用它们将匹配任何给定的值，并将相应的变量设置为该值。例如，路径
    **/post/show/123** 将使用参数 ID 123 在 `PostController` 上启动“show”操作。你可以修改映射以创建自定义路径。例如，你可以像这样创建一个自定义路由来创建新帖子：`"/new/post/"
    (controller: "post", action: "create")`。第一个匹配的路径就是 Grails 将使用的路由。


    Grails 简史


    以下是自 2.0 版本以来 Grails 新增功能的简要历史。


    Grails 2.0


    Grails 2.0 有以下改进：


    *   更好的错误页面，显示导致问题的代码。

    *   开发模式下的 H2 数据库控制台（位于 URI `/dbconsole`）。

    *   Grails 2.0 支持 Groovy 1.8。

    *   对类型化服务、领域类、`src/groovy` 和 `src/java` 的运行时重载。

    *   使用 `-reloading` 运行任何命令以动态重载它。

    *   二进制插件（jars）。

    '
- fmt: '# Grails 版本更新日志


    ## 通用改进


    - 更好的脚手架，符合 HTML 5 规范（支持移动/平板设备）。

    - 为服务提供 `PageRenderer` 和 `LinkGenerator` API。

    - 支持 Servlet 3.0 异步 API；事件插件；平台核心。

    - `Resources` 插件已集成到核心中。

    - 用于 GZIP、缓存、打包的插件（`install-plugin cached-resources`、`zipped-resources`）。

    - 新增标签：`img`、`external` 和 `javascript`。

    - `jQuery` 插件现在是 Grails 应用程序中默认安装的 JavaScript 库。

    - 在 `params` 对象中添加了新的 `date` 方法，用于轻松、空安全地解析日期：`def val = params.date(''myDate'',
    ''dd-MM-yyyy'')`。


    ## GORM 改进


    各种 GORM 改进包括：


    - 支持 `DetachedCriteria` 以及新的 `findOrCreate` 和 `findOrSave` 方法。

    - GORM 支持 MongoDB、riak、Cassandra、neo4j、redis 和 Amazon SimpleDB。

    - 新的编译时检查查询 DSL（`where` 方法，接受一个 `Closure` 参数），包括：`avg`、`sum`、`subqueries`、`.size()`
    等。

    - 多作用域数据源。

    - 添加了用于更新生产数据库的数据库迁移插件。


    ## Grails 2.1


    - Grails 的 Maven 支持在多个重要方面得到了改进。例如，现在可以在 `pom.xml` 文件中指定插件。

    - `grails` 命令现在支持 `-debug` 选项，该选项将启动远程调试代理。

    - 默认安装缓存插件。

    - 在 Grails 2.1.1 中，领域类现在拥有名为 `first` 和 `last` 的静态方法，用于从数据存储中检索第一个和最后一个实例。


    ## Grails 2.2


    - Grails 2.2 支持 Groovy 2。

    - 为条件查询添加了新功能，以提供对 Hibernate 的 SQL 投影 API 的访问。

    - 支持在开发模式下对 Tomcat 容器进行分叉 JVM 执行。

    - 改进了对管理应用程序及其插件提供的工件之间命名冲突的支持。


    ## Grails 2.3


    - 改进了依赖管理，默认使用 Maven 使用的相同库（Aether）。

    - 包含一个新的数据绑定机制，比之前版本使用的数据绑定器更灵活、更易于维护。

    - 所有主要命令现在都可以分叉到单独的 JVM 中，从而将构建路径与运行时和测试路径隔离开来。

    - Grails 的 REST 支持得到了显著改进。

    - Grails 的脚手架功能已拆分为一个单独的插件（包括对生成 REST 控制器、异步控制器和 Spock 单元测试的支持）。

    - 包含新的异步编程 API，允许异步处理请求，并与 GORM 无缝集成。

    - 控制器现在可以在命名空间中定义，允许在不同包中定义多个同名的控制器。


    ## Grails 2.4


    - Grails 2.4 附带 Groovy 2.3。

    - 默认使用 Hibernate 4.3.5。（Hibernate 3 仍可作为可选安装使用。）

    - `Asset-Pipeline` 取代 `Resources` 来提供静态资源。

    - 现在对静态类型检查和静态编译提供了很好的支持。`GrailsCompileStatic` 注解（来自 `grails.compiler` 包）的行为与
    `groovy.transform.CompileStatic` 注解非常相似，并为 Grails 提供特殊处理。


    ## Grails 2.5


    - 升级到 Groovy 2.4

    - Spring 升级到 4.1

    - 其他各种升级


    ## Grails 3.1.x


    Grails 3 代表了 Grails 的一次重大重构。公共 API 现在位于 `grails` 包中，并且所有内容都已重写以使用 Traits。每个新项目还包含一个带有传统
    `static void main` 方法的 `Application` 类。Grails 3 附带 Groovy 2.4、Spring 4.1 和 Spring
    Boot 1.2，并且构建系统使用 Gradle（取代了之前使用的 Gant 系统）。'
  raw: "*   Better scaffolding that’s HTML 5 compliant (mobile/tablet\n    ready).\n\
    \n*   PageRenderer and LinkGenerator API for services.\n\n*   Servlet 3.0 async\
    \ API supported; events plugin; platform\n    core.\n\n*   Resources plugin integrated\
    \ into core.\n\n*   Plugins for GZIP, cache, bundling (`install-plugin cached-resources`,\
    \ `zipped-resources`).\n\n*   New tags: `img`, `external`, and `javascript`.\n\
    \n*   The jQuery\n    plugin is now the default JavaScript library installed in\
    \ a\n    Grails application.\n\n*   A new `date` method  has been added to the\n\
    \    `params` object\n    to allow easy, null-safe parsing of dates: `def val\
    \ = params.date('myDate', 'dd-MM-yyyy')`.\n\nVarious GORM\nimprovements include:\n\
    \n*   Support for `DetachedCriteria` and\n    new `findOrCreate` and\n    `findOrSave`\n\
    \    methods\n    .\n\n*   GORM supports MongoDB,^([^(46)](#fn46)) riak,^([^(47)](#fn47))\
    \ Cassandra,^([^(48)](#fn48)) neo4j,^([^(49)](#fn49)) redis,^([^(50)](#fn50))\
    \ and Amazon SimpleDB.^([^(51)](#fn51))\n\n*   New compile-time checked query\
    \ DSL (“where” method which takes a\n    Closure parameter) which includes: `avg`,\
    \ `sum`, `subqueries`, `.size()`, and so\n    on.\n\n*   Multiple scoped data\
    \ sources.\n\n*   Added database migration plugin for updating\n    production\
    \ databases.\n\nGrails 2.1\n\n*   Grails’ Maven support has been improved in a\
    \ number of\n    significant ways.\n    For example, it is now possible to specify\
    \ plugins within your `pom.xml`\n    file.\n\n*   The `grails` command now\n \
    \   supports a `-debug` option which\n    will start the remote debug agent.\n\
    \n*   Installs the cache plugin by default.\n\n*   In Grails 2.1.1, domain classes\
    \ now have static methods named\n    `first` and `last` that retrieve\n    the\
    \ first and last instances from the datastore.\n\nGrails 2.2\n\n*   Grails 2.2\n\
    \    supports Groovy 2.\n\n*   Adds new functionality to criteria queries to provide\
    \ access to\n    Hibernate’s SQL projection API.\n\n*   Supports forked JVM execution\
    \ of the Tomcat container in\n    development mode.\n\n*   Includes improved support\
    \ for managing naming conflicts between\n    artifacts\n    provided by an application\
    \ and its plugins.\n\nGrails 2.3\n\n*   Improved dependency management using the\n\
    \    same library used by Maven (Aether) by default.\n\n*   Includes a new data\
    \ binding mechanism that’s more flexible and\n    easier to maintain than the\
    \ data binder used in previous\n    versions.\n\n*   All major commands can now\
    \ be forked into a separate JVM, thus\n    isolating the build path from the runtime\
    \ and test paths.\n\n*   Grails’ REST support has been significantly improved.\n\
    \n*   Grails’ scaffolding feature has been split into a separate plugin\n    (includes\
    \ support for generating REST controllers, async controllers,\n    and Spock unit\
    \ tests).\n\n*   Includes new asynchronous programming APIs that allow for\n \
    \   asynchronous processing of requests and integrates seamlessly with\n    GORM.\n\
    \n*   Controllers may now be defined in a namespace\n    that allows for multiple\
    \ controllers to be defined with the same name in\n    different packages.\n\n\
    Grails 2.4\n\n*   Grails 2.4\n    comes with Groovy 2.3.\n\n*   Uses Hibernate\
    \ 4.3.5 by default. (Hibernate 3 is still available\n    as an optional install.)\n\
    \n*   The Asset-Pipeline replaces Resources to serve static\n    assets.\n\n*\
    \   Now has great support for static type checking and static\n    compilation.\
    \ The `GrailsCompileStatic`\n    annotation (from the `grails.compiler`\n    package)\
    \ behaves much like the `groovy.transform.Compi`\n    annotation and provides\
    \ special handling for Grails.\n\nGrails 2.5\n\n*   Upgraded to Groovy 2.4\n\n\
    *   Spring upgrading to 4.1\n\n*   Other various upgrades\n\nGrails 3.1.x\nGrails\
    \ 3 represents a huge refactoring of Grails. The public API is\nnow located in\
    \ the `grails` package and\neverything has been redone to use Traits. Each new\
    \ project also features\nan `Application`\nclass  with a\ntraditional static void\
    \ main.\nGrails 3 comes with Groovy 2.4, Spring 4.1, and Spring Boot 1.2, and\n\
    the build system uses Gradle (instead of the previously used Gant\nsystem)."
  trans: '

    *   更好的脚手架，符合 HTML 5 规范（支持移动端/平板设备）。


    *   面向服务的 PageRenderer 和 LinkGenerator API。


    *   支持 Servlet 3.0 异步 API；事件插件；平台核心。


    *   资源插件已集成到核心中。


    *   用于 GZIP、缓存、打包的插件（`install-plugin cached-resources`、`zipped-resources`）。


    *   新增标签：`img`、`external` 和 `javascript`。


    *   jQuery 插件现在是 Grails 应用程序中默认安装的 JavaScript 库。


    *   `params` 对象新增了一个 `date` 方法，用于轻松、空安全地解析日期：`def val = params.date(''myDate'',
    ''dd-MM-yyyy'')`。


    各种 GORM 改进包括：


    *   支持 `DetachedCriteria` 以及新的 `findOrCreate` 和 `findOrSave` 方法。


    *   GORM 支持 MongoDB、^(⁴⁶) riak、^(⁴⁷) Cassandra、^(⁴⁸) neo4j、^(⁴⁹) redis、^(⁵⁰) 和
    Amazon SimpleDB。^(⁵¹)


    *   新的编译时检查查询 DSL（“where”方法，接受一个 Closure 参数），包括：`avg`、`sum`、`subqueries`、`.size()`
    等。


    *   多作用域数据源。


    *   添加了用于更新生产数据库的数据库迁移插件。


    Grails 2.1


    *   Grails 的 Maven 支持在多个重要方面得到了改进。例如，现在可以在 `pom.xml` 文件中指定插件。


    *   `grails` 命令现在支持 `-debug` 选项，该选项将启动远程调试代理。


    *   默认安装缓存插件。


    *   在 Grails 2.1.1 中，领域类现在拥有名为 `first` 和 `last` 的静态方法，用于从数据存储中检索第一个和最后一个实例。


    Grails 2.2


    *   Grails 2.2 支持 Groovy 2。


    *   为条件查询添加了新功能，以提供对 Hibernate 的 SQL 投影 API 的访问。


    *   支持在开发模式下对 Tomcat 容器进行分叉 JVM 执行。


    *   改进了对管理应用程序及其插件提供的工件之间命名冲突的支持。


    Grails 2.3


    *   默认使用与 Maven 相同的库（Aether）改进了依赖管理。


    *   包含一个新的数据绑定机制，比之前版本使用的数据绑定器更灵活、更易于维护。


    *   所有主要命令现在都可以分叉到单独的 JVM 中执行，从而将构建路径与运行时和测试路径隔离开来。


    *   Grails 的 REST 支持得到了显著改进。


    *   Grails 的脚手架功能已拆分为一个单独的插件（包括对生成 REST 控制器、异步控制器和 Spock 单元测试的支持）。


    *   包含新的异步编程 API，允许对请求进行异步处理，并与 GORM 无缝集成。


    *   控制器现在可以在命名空间中定义，允许在不同包中定义多个同名的控制器。


    Grails 2.4


    *   Grails 2.4 附带 Groovy 2.3。


    *   默认使用 Hibernate 4.3.5。（Hibernate 3 仍可作为可选安装使用。）


    *   Asset-Pipeline 取代了 Resources 来提供静态资源。


    *   现在对静态类型检查和静态编译提供了出色的支持。`GrailsCompileStatic` 注解（来自 `grails.compiler` 包）的行为与
    `groovy.transform.CompileStatic` 注解非常相似，并为 Grails 提供了特殊处理。


    Grails 2.5


    *   升级到 Groovy 2.4


    *   Spring 升级到 4.1


    *   其他各种升级


    Grails 3.1.x

    Grails 3 代表了 Grails 的一次重大重构。公共 API 现在位于 `grails` 包中，并且所有内容都已重写以使用 Traits。每个新项目还包含一个带有传统静态
    void main 方法的 `Application` 类。

    Grails 3 附带 Groovy 2.4、Spring 4.1 和 Spring Boot 1.2，并且构建系统使用 Gradle（取代了之前使用的 Gant
    系统）。

