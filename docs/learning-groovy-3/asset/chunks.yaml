  raw: '## Summary


    In this chapter, you learned about the following Groovy features:


    *   What Traits are, which is similar to Java 8 interfaces.


    *   How to define a Trait with fields and methods.


    *   How you can use multiple Traits in one class.


    # 9. Functional Programming


    *Functional Programming* (FP) is a programming style that focuses on functions
    and minimizes changes of state (using immutable data structures). It is closer
    to expressing solutions mathematically rather than step-by-step instructions.


    In FP, functions should be “side-effect free” (nothing outside the function is
    changed) and *referentially transparent* (a function returns the same value every
    time when given the same arguments).


    FP can be seen as an alternative to the more common *imperative programming,*
    which is closer to telling the computer the steps to follow.


    Although functional-programming can be achieved in pre-Java 8,^([^(18)](#fn18))
    Java 8 enabled language-level FP support with lambda expressions and *functional
    interfaces*.


    Java 8, JavaScript, Groovy, and Scala all support functional-style programming,
    although they are not strictly FP languages.


    ## Functions and Closures


    As you might know, “functions as a first-class feature” is the basis of functional
    programming. *First-class feature* means that a function can be used anywhere
    a value could be used.


    For example, in JavaScript, you can assign a function to a variable and call it:


    ```

    1   var func = function(x) { return x + 1; }

    2   var three = func(2); //3

    ```


    Although Groovy doesn’t have first-class functions, it has something very similar:
    closures. As you have learned, a closure is simply a block of code wrapped in
    curly brackets with parameters defined to the left of the `->` (arrow). For example:


    ```

    1   def  closr = {x -> x + 1}

    2   println( closr(2) ); //3

    ```


    If a closure has one argument, it can be referenced as `it` in Groovy. For example:


    ```

    1   def  closr = {it + 1}

    ```


    ### ![../images/426440_2_En_9_Chapter/426440_2_En_9_Figa_HTML.gif](images/426440_2_En_9_Chapter/426440_2_En_9_Figa_HTML.gif)Tip


    In Groovy, the `return` keyword can be omitted if the returned value is the last
    expression.


    ### Using Closures


    As discussed previously, when a closure is the last parameter to a method, it
    can go outside of the parentheses, and if it is the only parameter, parentheses
    can be omitted completely. For example, the following defines a method that takes
    a list and a closure for filtering items:


    ```

    1   def  find(list, tester) {

    2       for (item in list)

    3           if (tester(item)) return item

    4   }

    ```


    This method returns the first item in the list for which the closure returns true.
    Here’s an example of calling the method with a simple closure:


    ```

    1   find([1,2]) { it > 1 }

    ```


    ## Map/Filter/And So On


    Once you have mastered functions, you quickly realize you need a way to perform
    operations on collections (or sequences or streams) of data.


    Since these are common operations, people invented *sequence operations*, such
    as `map`, `filter`, `reduce`, etc.


    For this section, we will be using a list of `Person` objects for all the operations
    (see Figures [9-1](#426440_2_En_9_Chapter.xhtml#Fig1) through [9-5](#426440_2_En_9_Chapter.xhtml#Fig5))
    defined as follows:


    ![../images/426440_2_En_9_Chapter/426440_2_En_9_Fig1_HTML.jpg](images/426440_2_En_9_Chapter/426440_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Map (collect): Translates or changes input elements into something else


    ```

    class Person {

    String name

    int age

    String toString() { name }

    }

    def persons = [new Person(name:''Bob'',age:20),

    new Person(name:''Tom'',age:15)]

    ```


    ![../images/426440_2_En_9_Chapter/426440_2_En_9_Fig2_HTML.jpg](images/426440_2_En_9_Chapter/426440_2_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Filter (findAll): Gives you a sub-set of elements (what returns true from some
    predicate function)


    ```

    1   def names = persons.collect { person -> person.name }

    // Result: [''Bob'', ''Tom'']

    ```


    ![../images/426440_2_En_9_Chapter/426440_2_En_9_Fig3_HTML.jpg](images/426440_2_En_9_Chapter/426440_2_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Reduce (inject): Performs a reduction (returning one result, such as a sum) on
    the elements


    ```

    1   def adults = persons.findAll { person -> person.age >= 18 }

    // Result: [Bob]

    ```


    ```

    1   def totalAge = persons.inject(0) {total, p -> return total+p.age } //Result:
    35

    ```


    For this, we use the `inject` method, which loops through the values and returns
    a single value (equivalent of `foldRight` in Scala). The `startValue` (0 in this
    case) is the initial value given to `total`. For each element of the list, we
    add the person’s age.


    ![../images/426440_2_En_9_Chapter/426440_2_En_9_Fig4_HTML.jpg](images/426440_2_En_9_Chapter/426440_2_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Limit ([0..n-1]): Gives you only the first N elements


    ![../images/426440_2_En_9_Chapter/426440_2_En_9_Fig5_HTML.jpg](images/426440_2_En_9_Chapter/426440_2_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Concat (+): Combines two different collections of elements


    ```

    1   def a = [3,2,1]

    2   def  firstTwo = a[0..1] // Result: [3,2]

    ```


    ```

    1   def a = [1,2,3]

    2   def b = [4,5]

    3   a+b

    4   // Result: [1, 2, 3, 4, 5]

    ```'
