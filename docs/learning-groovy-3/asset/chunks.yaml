    under the `META-INF/services/` directory. Within that file, list all of your `extensionClasses`
    and `staticExtensionClasses`. For example, create such a file with the following
    contents:


    ```

    moduleName=adamldavis-groovy-dsl-example

    moduleVersion=0.1-beta1

    extensionClasses=com.adamldavis.gdsl.MyDSLExtension

    staticExtensionClasses=com.adamldavis.gdsl.MyStaticDSLExtension

    ```


    When included in a project, Groovy will look at all of the static methods of the
    `MyDSLExtension` class (in the `com.adamldavis.gdsl package)` and use them to
    add functionality to instances of the first parameter of each method’s class.
    The `moduleName` and `moduleVersion` properties are only there to make sure multiple
    conflicting versions of the library are not loaded.


    For example, given the following code, the String class would essentially have
    the `upper()` method added to it.


    ```

    class MyDSLExtension {

    static String upper(String it) { it.toUpperCase() }

    }

    ```


    Likewise, Groovy will look at all of the static methods of the `MyStaticDSLExtension`
    class and use them to add functionality to the class of the first parameter of
    each method. For example, the following code would add a method, `boom`, to the
    String class allowing `String.boom()` to return “!”:


    ```

    class MyStaticDSLExtension {

    static String boom(String it) { "!" }

    }

    ```


    Note that for `staticExtensionClasses`, the given parameter (`it` in the preceding
    code) cannot be used within the method; it is only used for the type.


    ### ![../images/426440_2_En_7_Chapter/426440_2_En_7_Figc_HTML.gif](images/426440_2_En_7_Chapter/426440_2_En_7_Figc_HTML.gif)
