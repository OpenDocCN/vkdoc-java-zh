    \    *   `test/groovy`—Groovy-based tests which can use JUnit or Spock.\n\n  \
    \  *   `integration-test/groovy`—Includes Geb-based tests.\n\n    *   `integration-test/resources`—Includes\
    \ `GebConfig.groovy` for configuring Geb.\n\nTo create a new domain (model) class,\
    \ run a command like the following:\n\n```\n1   $ grails create-domain-class example.Post\n\
    ```\n\nIt’s a good idea to include a package for your domain classes (here the\
