    # Part I: Getting Groovy


    Getting Groovy


    To get started you need to learn the basics of Groovy.


    # 1. Software to Install


    Before you begin programming, you need to install some basic tools.


    ## Java/Groovy


    For Java and Groovy, you will need to install the following:


    *   JDK (Java Development Kit), such as JDK 11

    *   IDE (Integrated Development Environment), such as IntelliJ IDEA or NetBeans

    *   Groovy


    ### Install Java and an IDE


    ![../images/426440_2_En_1_Chapter/426440_2_En_1_Figa_HTML.gif](images/426440_2_En_1_Chapter/426440_2_En_1_Figa_HTML.gif)
    Download and install the Java JDK 11^([¹](#fn1)) and IntelliJ IDEA.^([²](#fn2))


    ### Install Groovy


    ![../images/426440_2_En_1_Chapter/426440_2_En_1_Figb_HTML.gif](images/426440_2_En_1_Chapter/426440_2_En_1_Figb_HTML.gif)
    Go and install Groovy^([³](#fn3)) 3.


    You can download Groovy from [`https://groovy-lang.org`](https://groovy-lang.org)
    and install it. If you install it manually, you may need to set the `JAVA_HOME`
    environment variable to the location of your Java installation and `GROOVY_HOME`
    to the location of your groovy installation.


    For an easier experience, you may optionally use SDKMAN to install Java and Groovy
    using `sdk install java` and `sdk install groovy` on the command line. Go to sdkman.io
    to download it.


    ### Trying It Out


    After installing Groovy, you should use it to try coding. Open a command prompt
    and type `groovyConsole` and press enter to begin.


    ![../images/426440_2_En_1_Chapter/426440_2_En_1_Figc_HTML.gif](images/426440_2_En_1_Chapter/426440_2_En_1_Figc_HTML.gif)
    In the Groovy Console, type the following and then press Ctrl+R to run the code
    and Ctrl+W to clear the output:


    ```

    1   print "hello"

    ```


    You should keep the Groovy Console open and use it to try all of the examples
    in this book.


    ![../images/426440_2_En_1_Chapter/426440_2_En_1_Figd_HTML.jpg](images/426440_2_En_1_Chapter/426440_2_En_1_Figd_HTML.jpg)


    ## Others


    Once you have the preceding software installed, you should probably install the
    following:


    *   SDKMAN^([⁴](#fn4))—The Software Development Kit Manager

    *   Git^([⁵](#fn5))—A version control program

    *   Gradle^([⁶](#fn6))—The build tool

    *   Grails^([⁷](#fn7))—The monolithic web framework


    Go ahead and install these if you''re in the mood—I''ll wait.


    ## Code on GitHub


    A lot of the code from this book is available at [`https://github.com/adamldavis/learning-groovy`](https://github.com/adamldavis/learning-groovy).^([⁸](#fn8))
    You can go there at any time to follow along with the book.


