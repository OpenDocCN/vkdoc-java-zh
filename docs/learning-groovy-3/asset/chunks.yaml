- fmt: '# Closures


    A *closure* is a block of code in Groovy, which may or may not take parameters
    and return a value. It''s similar to lambda expressions in Java 8 or an inner
    class with one method. Closures can be extremely useful in many ways, which will
    be covered in subsequent chapters. For example, closures are used by the `findAll`,
    `each`, and `times` methods, as you have already seen.


    Groovy closures have several implicit variables:


    - `it`—If the closure has one argument, it can be referred to implicitly as `it`.

    - `this`—Refers to the enclosing class.

    - `owner`—The same as `this` unless it is enclosed in another closure. For example,
    run the following code to see the difference:


    ```

    def print1 = {list ->

    list.each{println owner}  //prints first Closure

    println owner}       //prints the enclosing class

    print1([1,2])

    ```


    - `delegate`—Usually the same as `owner` but you can change it (this allows the
    methods of `delegate` to be in the scope of the closure).


    Closures can be passed as method arguments. When this is done (*and it is the
    last argument*), the closure may go outside the parentheses. For example, when
    using the `collect` method (which uses the given closure to transform elements
    of list into a new list), you can call it as follows:


    ```

    1   def  list = [''foo'',''bar'']

    2   def newList = []

    3   list.collect( newList ) {

    4     it.toUpperCase()

    5   }

    6   println newList //   ["FOO",    "BAR"]

    ```


    ### Tip


    The `return` keyword is completely optional in Groovy. A method or closure simply
    returns its last expression, as seen previously.


    You can also assign closures to variables and call them later:


    ```

    1   def  closr = {x -> x + 1}

    2   println( closr(2) ) // prints 3

    ```


    ### Exercise


    Create a closure and print out the class of its delegate using `getClass()`.


    ## A Better Switch


    Groovy''s `switch` statement is much like Java''s, except that it allows many
    more `case` expressions. For example, it allows strings, lists, ranges, and classtypes:


    ```

    1   def x = 42

    2   switch  ( x ) {

    3   case "foo":

    4       result = "found foo"

    5           break

    6   case [4, 5, 6]:

    7       result = "4 5 or 6"

    8       break

    9   case 12..30: // Range

    10       result = "12 to 30"

    11       break

    12   case Integer:

    13       result = "was integer"

    14       break

    15   case Number:

    16       result = "was number"

    17       break

    18   default:

    19       result = "default"

    20   }

    ```


    In this case the `result` from this code will be "was integer".


    ## Meta-Programming


    In Groovy, you can add methods to classes at runtime, even to core Java libraries.
    For example, the following code adds the `upper` method to the `String` class:


    ```

    1   String.metaClass.upper = { -> toUpperCase() }

    ```


    or for a single instance (`str`)


    ```

    1 def str = "test"

    2 str.metaClass.upper = { -> toUpperCase() }

    ```


    The `upper` method would convert the `String` to uppercase:


    ```

    1   str.upper() == str.toUpperCase()

    ```


    ## Static Type Checking


    If you add the `@TypeChecked` annotation to your class, it causes the compiler
    to enforce compile time type-checking. It will infer types for you, so your code
    can still be *Groovy*. It infers the Lowest Upper Bound (LUB) type based on your
    code. For example:


    ```

    1   import   groovy.transform.*

    2   @TypeChecked

    3   class Foo {

    4       int i = 42.0 // this does not compile

    5   }

    1   import   groovy.transform.*

    2   @TypeChecked

    3   class Foo {

    4       int i = 42 // this works fine

    5   }

    6   new Foo()

    ```


    ### Gotcha''s


    Runtime meta-programming won''t always work! In other words, if you add a method
    using the `metaClass` and call it, that won''t compile.


    Explicit type is needed in a closure: `a.collect {`**String** `it -> it.toUpperCase()}`


    If you add the `@CompileStatic` annotation to your class or method, it causes
    the compiler to compile your Groovy code to Java-style byte-code. This would be
    useful when you have code that needs to be extremely performant (computation involving
    large lists of Integers, for example) or you need Java byte-code for some other
    reason. The generated byte-code is almost identical to compiled Java, and therefore
    the performance is nearly identical to Java (unlike `@TypeChecked` which still
    uses Groovy''s MOP—Meta Object Protocol). Both annotations are located in the
    `groovy.transform` package.


    For example, you could use `@CompileStatic` on a class that calculates the Fibonacci
    sequence:


    ```

    1   import   groovy.transform.*

    2   @CompileStatic

    3   class Foo {

    4      void getFibs(int count) {

    5         def list = [0, 1] // print first #count Fibonacci numbers

    6         count.times {

    7            print "${list.last()}"

    8            list << list.sum()

    9            list = list.tail()

    10         }

    11      }

    12   }

    ```


    ### Exercise


    Try using `@TypeChecked` and the `def` keyword. It works surprisingly well.


    ## Elvis Operator


    The elvis operator was born from a common idiom in Java: using the ternary operation
    to provide a default value. For example:


    ```

    1   String name = person.getName() == null ? "Bob" :    person.getName();

    ```


    Instead in Groovy you can just use the elvis operator:


    ```

    1   String name = person.getName() ?: "Bob"

    ```


    ## Safe Dereference Operator


    Similar to the elvis operator, Groovy has the safe dereference operator that allows
    you to easily avoid null-pointer exceptions. It involves simply adding a question
    mark. For example:


    ```

    1   String name = person?.getName()

    ```


    This would simply set `name` to null if `person` is null. It also works for method
    calls.


    ### Tip


    Write some Groovy code using the elvis operators and safe dereference several
    times until you memorize the syntax.


    ## A Brief History


    What follows is a brief history of updates to the Groovy language starting with
    Groovy 1.8. This will help you if you must use an older version of Groovy or if
    you haven''t looked at Groovy in several years.


    ### Groovy 1.8


    - Command chains—The code `"pull request on github" is executed as: pull(request).on(github)`

    - GPars Bundled for parallel and concurrent paradigms (it was later pulled out)

    - Closure annotation parameters— `@Invariant({number >= 0})`

    - Closure memorization—`{...}.memoize()`

    - Built-in JSON support—Consuming, producing, and pretty-printing

    - New AST transformations—`@Log, @Field, @AutoClone, @AutoExternalizable, ...`


    Groovy 1.8 further improved the ability to omit unnecessary punctuation by supporting
    *command chains,* which allow you to omit parentheses and dots for a chain of
    method calls.


    ### Groovy 2.0


    - Groovy became more modular, with many parts broken out into multiple jars.

    - It added the ability to create your own module which allows you to add methods
    to existing classes (Extension modules).

    - `@CompileStatic`: Compiles your Groovy code to byte-code.

    - `@TypeChecked`: Enforces compile time type-checking (as seen in the previous
    section).

    - Java 7 alignments: Try-with-resources, underscores in numeric literals, and
    invoke dynamic (optionally using the `–indy command option`).

    - Java 7 multi-catch: `catch (Exception1 | Exception2 e) {}`


    The huge change in Groovy 2 was the addition of the `@CompileStatic` and `@TypeChecked`
    annotations, which were already covered.'
  raw: "## Closures\n\nA *closure* is a block of code in Groovy, which may or may\
    \ not take parameters and return a value. It's similar to lambda expressions in\
    \ Java 8 or an inner class with one method. Closures can be extremely useful in\
    \ many ways, which will be covered in subsequent chapters. For example, closures\
    \ are used by the `findAll`, `each`, and `times` methods, as you have already\
    \ seen.\n\nGroovy closures have several implicit variables:\n\n*   `it`—If the\
    \ closure has one argument, it can be referred to implicitly as `it`.\n\n*   `this`—Refers\
    \ to the enclosing class.\n\n*   `owner`—The same as `this` unless it is enclosed\
    \ in another closure. For example, run the following code to see the difference:\n\
    \n    ```\n    def print1 = {list ->\n    list.each{println owner}  //prints first\
    \ Closure\n    println owner}       //prints the enclosing class\n    print1([1,2])\n\
    \    ```\n\n*   `delegate`—Usually the same as `owner` but you can change it (this\
    \ allows the methods of `delegate` to be in the scope of the closure).\n\nClosures\
    \ can be passed as method arguments. When this is done (*and it is the last argument*),\
    \ the closure may go outside the parentheses. For example, when using the `collect`\
    \ method (which uses the given closure to transform elements of list into a new\
    \ list), you can call it as follows:\n\n```\n1   def  list = ['foo','bar']\n2\
    \   def newList = []\n3   list.collect( newList ) {\n4     it.toUpperCase()\n\
    5   }\n6   println newList //   [\"FOO\",    \"BAR\"]\n```\n\n### ![../images/426440_2_En_2_Chapter/426440_2_En_2_Fige_HTML.gif](images/426440_2_En_2_Chapter/426440_2_En_2_Fige_HTML.gif)\
