- fmt: "# 13. Grails\n\nGrails is a web framework for Groovy that follows the example\
    \ of *Ruby on Rails* to be an opinionated web framework with a command-line tool\
    \ that gets things done really fast. Grails uses convention over configuration\
    \ to reduce configuration overhead.\n\nGrails lives firmly in the Java ecosystem\
    \ and is built on top of technologies like Spring and Hibernate. Grails also includes\
    \ (optionally) an object relational mapping (ORM) framework called *GORM* and\
    \ has a large collection of plugins.\n\nDifferent versions of Grails can be very\
    \ different, so you need to take care when upgrading your Grails application,\
    \ especially with major versions (2.5 to 3.0, for example).\n\nThis chapter contains\
    \ a quick overview of how Grails (3.3) works and then includes a short history\
    \ of Grails.\n\n## Quick Overview of Grails\n\nAfter installing Grails,^([^(44)](#fn44))\
    \ you can create an app by running the following on the command-line (replace\
    \ `TEST` with the name of the directory you want to use):\n\n```\n$ grails create-app\
    \ TEST\n```\n\nBy default this will create an application using the “web” profile\
    \ (to get a list of available profiles, run `grails list-profiles`).\n\nThen you\
    \ can run commands like `create-domain-class` and `generate-all` to create your\
    \ application as you go. Run `grails help` to see the full list of commands available.\n\
    \nGrails applications have a very specific project structure. The following is\
    \ a simple breakdown of *most of* that structure:\n\n* `grails-app`—The Grails-specific\
    \ folder.\n  * `assets`\n    * `images`—Images used by your web application.\n\
    \    * `javascripts`—Your JavaScript files go here.\n    * `stylesheets`—CSS stylesheets.\n\
    \  * `conf`—Configuration, such as an `application.yml` or `application.properties`\
    \ file.\n  * `controllers`—Controllers of the application and the `UrlMappings`\
    \ class. Provides code for actions like list, save, show, and create.\n  * `domain`—Domain\
    \ model; classes representing your persistent data if you use GORM.\n  * `i18n`—Message\
    \ bundles which enable you to provide text in multiple different languages.\n\
    \  * `init`—Includes `Application.groovy` and `BootStrap.groovy`.\n  * `services`—Backend\
    \ services where your backend or “business” logic goes.\n  * `taglib`—You can\
    \ very easily define your own tags for use in your GSP files here.\n  * `views`—Views\
    \ of MVC; typically these are GSP files (HTML based).\n  * `utils`—Can contain\
    \ utility classes.\n* `src`—Any common code that doesn’t fit anywhere else.\n\
    \  * `main/java`—Java code\n  * `main/groovy`—Groovy code\n  * `main/resources`—Any\
    \ non-code resources you want in the main classpath.\n  * `test/groovy`—Groovy-based\
    \ tests which can use JUnit or Spock.\n  * `integration-test/groovy`—Includes\
    \ Geb-based tests.\n  * `integration-test/resources`—Includes `GebConfig.groovy`\
    \ for configuring Geb.\n\nTo create a new domain (model) class, run a command\
    \ like the following:\n\n```\n$ grails create-domain-class example.Post\n```\n\
    \nIt’s a good idea to include a package for your domain classes (here the package\
    \ is “`example`” and the class is named `Post`).\n\nA domain class in Grails also\
    \ defines its mapping to the database. For example, here’s a domain class representing\
    \ a blog post (assuming `User` and `Comment` were already created):\n\n```\nclass\
    \ Post {\n    String text\n    int rating\n    Date created = new Date()\n   \
    \ User createdBy\n\n    static hasMany = [comments: Comment]\n\n    static constraints\
    \ = {\n        text(size:10..5000)\n    }\n}\n```\n\nThe static `hasMany` field\
    \ is a map that represents one-to-many relationships in your database. GORM uses\
    \ Hibernate in the background to create tables for all of your domain classes\
    \ and relationships. Every table gets an `id` field for the primary key by default.\n\
    \nTo have Grails automatically create your controller and views, run the following:\n\
    \n```\n$ grails generate-all example.Post\n```\n\n### Warning\n\nGrails will ask\
    \ if you want to overwrite existing files if they exist. Be careful when using\
    \ this command.\n\nWhen you want to run your application directly to try it out,\
    \ you can simply run the following:\n\n```\n$ grails run-app\n```\n\nIf you want\
    \ to deploy to an application container (e.g., Tomcat), you can create a `war`\
    \ file by running the following:\n\n```\n$ grails war\n```\n\n## Configuration\n\
    \nSince Grails 3+ is built on Spring Boot, configuration works in a similar way\
    \ using the `grails-app/conf/application.yml` file by default.\n\nToward the bottom\
    \ of this file, you’ll see the default configuration uses an in-memory h2 database\
    \ for development and test and a file-based h2 database for production. They are\
    \ configured as follows (this is where you would change the configuration to change\
    \ your database):\n\n```\ndevelopment:\ndataSource:\ndbCreate: create-drop\nurl:\
    \ jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\ntest:\n\
    dataSource:\ndbCreate: update\nurl: jdbc:h2:mem:testDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
    production:\ndataSource:\ndbCreate: none\nurl: jdbc:h2:./prodDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
    properties:\njmxEnabled: true\ninitialSize: 5\n...(cut for brevity)\n```\n\n##\
    \ Plugins\n\nThe Grails ecosystem includes over 100 plugins. To list all of the\
    \ plugins, simply execute this command:\n\n```\n$ grails list-plugins\n```\n\n\
    When you’ve picked a plugin you want to use, execute the following command to\
    \ see the available versions and how to include it in your build dependencies\
    \ (with the plugin name):\n\n```\n$ grails plugin-info [NAME]\n```\n\nThis will\
    \ show you the appropriate code to add to your `build.gradle` file for adding\
    \ the plugin to your project. For example, let’s look at the “geb” plugin (Geb\
    \ is a web testing framework). Here is the output:\n\n```\n$ grails plugin-info\
    \ geb\n| Plugin Info: geb\n| Latest Version: 2.0.0\n| All Versions: 1.0.2,1.1.1,1.1.2,1.1.3,1.1.4,1.1.5,2.0.0.RC1,2.0.0\n\
    | Title: Geb Plugin\nPlugin that adds Geb functional testing code generation features.\n\
    * License: APACHE\n* Documentation: http://grails.org/plugin/geb\n* Issue Tracker:\
    \ http://github.com/grails3-plugins/geb/issues\n* Source: http://github.com/grails3-plugins/geb\n\
    * Definition:\ndependencies {\ncompile \"org.grails.plugins:geb:2.0.0\"\n}\n```"
