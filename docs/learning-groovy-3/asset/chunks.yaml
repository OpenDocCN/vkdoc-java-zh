  trans: "\n### Groovy 2.1\n\n*   全面支持 JDK 7 的“invoke dynamic”指令和 API。\n\n*   `@DelegatesTo`——一种用于闭包委托的\
    \ DSL 和静态类型检查器扩展的特殊注解。\n\n*   编译时元注解——`@groovy.transform.AnnotationCollector`\
    \ 可用于创建元注解。\n\n*   对现有 AST 转换的许多改进。\n\n此版本通过利用 Java 7 的 invoke dynamic 在性能上取得了巨大提升。然而，该功能默认并未启用（这将在后续章节中介绍；基本上你只需“开启它”即可）。\n\
    \n### Groovy 2.2\n\n*   隐式闭包强制转换。\n\n*   方法的 `@Memoized` AST 转换。\n\n*   Bintray\
    \ 的 JCenter 仓库。\n\n*   使用注解定义基础脚本类。\n\n*   新的 `DelegatingScript` 基础脚本类。\n\n* \
    \  带有泛型类型标记的 `@DelegatesTo`。\n\n*   预编译的类型检查扩展。\n\n这里需要关注的主要是隐式闭包强制转换，它允许你在任何可以使用\
    \ SAM（单一抽象方法）接口的地方使用闭包。在此版本之前，你需要显式地强制转换闭包。\n\n### Groovy 2.3\n\n*   官方支持在 JDK\
    \ 8 上运行 Groovy\n\n*   特质（Traits）\n\n*   新增和更新的 AST 转换\n\n此版本引入了一个全新的概念（*特质*）和\
    \ `trait` 关键字。我们将在后续章节中介绍它们。\n\n### Groovy 2.4\n\n*   Android 支持\n\n*   性能改进和字节码缩减\n\
    \n*   特质 @Self 类型注解\n\n*   GDK 改进\n\n*   更多 AST 转换\n\nGroovy 的开发者们再次超越自我，进行了大量改进并加入了\
    \ Android 支持。\n\n### Groovy 2.5\n\nGroovy 2.5 增加了对 JDK9+ 的支持，新增了 11 个 AST 转换，并添加了宏功能，使得编写\
    \ AST 转换更加容易。\n\nGroovy 2.5 中新增的注解包括 @AutoFinal、@AutoImplement、@ImmutableBase、@ImmutableOptions、@MapConstructor、@NamedDelegate、@NamedParam、@NamedParams、@NamedVariant、@PropertyOptions\
    \ 和 @VisibilityOptions。\n\n其中一些注解描述如下：\n\n*   @*AutoImplement*：自动实现缺失的抽象方法（例如来自接口的方法）。你可以指定从这些方法中抛出的异常，例如\
    \ UnsupportedOperationException。这对于生成测试桩或当你只需要实现继承的抽象方法子集时非常有用。\n\n*   @*AutoFinal*：自动为方法参数添加\
    \ final 修饰符。\n\n*   @*MapConstructor*：为你的类添加一个构造函数，该构造函数接受一个 map 参数，期望字段名作为键，并设置相应的字段值。例如：\n\
    \n    ```\n    @groovy.transform.MapConstructor\n    class Person { String firstName;\
    \ String lastName }\n    // 稍后...\n    def p= new Person(firstName: 'Peter', lastName:\
    \ 'Quill')\n    assert p.firstName == 'Peter'\n    ```\n\n此外，许多注解通过新增属性得到了改进。例如，@TupleConstructor\
    \ 现在包含了另外七个属性。@Immutable 注解已更新，以识别 Java 8 中新增的日期/时间类是不可变的，并处理 Optional。\n\n###\
    \ Groovy 2.6\n\nGroovy 2.6 版本原本打算像 Groovy 3 那样，但无需 JDK 8，不过它被放弃了，以便专注于更快地交付 Groovy\
    \ 3.0。\n\n### Groovy 3.0\n\nGroovy 3.0 拥有一个完全重写的解析器（昵称 *Parrot*），使 Groovy 与最新的\
    \ Java 11 语法保持一致，并带来了 Groovy 独有的新特性。它至少需要 JDK 8 才能运行，并且对 JDK 9/10/11 有更好的支持。\n\
    \n类似 Java 的语法现在包括 Java 8 风格的 lambda 表达式和方法引用，以及一些多年来 Groovy 一直难以支持的棘手语法：数组初始化、do/while\
    \ 循环、循环声明中的逗号等。\n\n#### 新运算符\n\n**同一性**\n\n现在可以使用运算符“`===`”来表示同一性相等，使用“`!==`”来表示非同一性相等。由于\
    \ Groovy 将 `==` 解释为“`.equals`”，过去它使用“`.is`”来表示同一性相等。支持“`===`”应该可以避免一些混淆。这类似于 JavaScript\
    \ 的 `===` 运算符。\n\n**运算符的否定变体**\n\n现在支持新的运算符 `!instanceof` 和 `!in`。这将简化这些情况下的语法。以前你必须输入\
    \ `!(x instanceof Date)`，而现在你可以直接输入 `x !instanceof Date`。同样，对于测试否定集合包含，以前是 `!(x\
    \ in [1,2,3])`，现在可以写成 `x !in [1,2,3]`。\n\n**Elvis 赋值**\n\n你可能熟悉 Groovy 中的 elvis\
    \ 运算符（`?:`）。在许多情况下，你会使用此操作在赋值时提供默认值。例如，`name = name ?: 'None'`。现在你可以在 Groovy 3\
    \ 中使用以下方式缩短此表达式，使其具有相同含义：`name ?= 'None'`\n\n**安全索引**\n\n与安全引用运算符类似，现在有一个安全索引运算符\
    \ `?.`。这允许你访问数组（或列表）的索引，但如果数组为 null，它将返回 null 而不是抛出异常。例如，以下代码会将值设置为数组的第一个值，如果数组为\
    \ null 则设置为 null：`value = array?[0]`\n\n**Java 一致性**\n\nGroovy 3 支持从 Java 8 到\
    \ 11 新增的特性，例如 lambda 表达式、方法引用、构造函数引用、try-with-resources、代码块、非静态内部类，甚至局部变量（var）。\n\
    \n支持所有形式的 lambda 表达式（除非你使用 @CompileStatic，否则会编译为闭包）：\n\n*   无参数——`() -> expression`\n\
    \n*   单参数——`x -> expression`\n\n*   显式返回是可选的——`(x, y) -> { x * y }`\n\n*   允许类型——`(int\
    \ x, int y) -> { return x + y }`\n\n*   允许默认值——`(int x, int y = 10) -> x+y`\n\n\
    Groovy 长期以来一直支持方法引用，但 Groovy 3 增加了对使用双冒号的 Java 8+ 语法的支持。例如，以下是有效的 Groovy 代码：\n\
    \n```\ndef sq(x) { x*x }\n// var 类似于 def\nvar squares = (1..9).collect( this::sq\
    \ ) //方法引用\n//打印 squares=[1, 4, 9, 16, 25, 36, 49, 64, 81]\n```\n\nGroovy 3 也实现了\
    \ try-with-resources：\n\n```\ndef f = new File('temp')\ntry (PrintWriter pw =\
    \ new PrintWriter(f)) {\npw.println(\"TEST!\")\n}\n```\n\n这将导致名为“temp”的文件包含内容“TEST!”，并且无论是否发生错误，都会自动关闭\
    \ PrintWriter。\n\n## 总结\n\n在本章中，你了解了以下内容：\n\n*   Groovy 如何以熟悉的语法扩展和简化 JDK 上的编程。\n\
    \n*   Groovy 的动态 `def`、简易属性、闭包、更好的“switch”、元编程、类型检查和静态编译注解、elvis 运算符以及安全解引用。\n\
    \n*   简要概述了 Groovy 可用的特性以及它们是在哪些版本中引入的。\n\n*   Groovy 3.0 如何使 Groovy 与 Java 的最新语法保持同步，并支持一些以前不支持的额外\
    \ Java 语法。\n\n脚注 1   2   3   4   5\n\n# 3. 工具\n\n除了 `groovy` 之外，Groovy 安装包还附带了一些有用的工具，本章将介绍这些工具。\n"
- fmt: '# Console


    ```

    groovyConsole

    ```


    The Groovy Console is a quick and easy way to try things in Groovy visually without
    the overhead of a complete IDE.


    Whenever you have an idea you want to try out quickly, open the Groovy Console,
    type some code, and then press `Ctrl+R` to run it. After reading your output and
    changing the code, press `Ctrl+W` to clear the output and `Ctrl+R` again to run
    the code. Once you get used to those two shortcuts, the Groovy Console might become
    an indispensable development tool.


    It also has the ability (among other things) to inspect the AST (Abstract Syntax
    Tree) of your code, the internal representation of the code used by the compiler.
    Use `Script - Inspect Ast` or `Ctrl+T` to open the Groovy AST Browser.


    You can provide a classpath to be available at runtime to the Groovy Console using
    the `-cp` option. This is useful when you want to refer to other classes you have
    compiled. For example, in a Linux/OSX environment, you use the following (where
    “:” is used to separate paths):


    ```

    groovyConsole -cp src/main/groovy/:src/main/resources/ example.groovy

    ```


    ## Compilation


    ```

    groovyc

    ```


    Much like `javac`, `groovyc` compiles Groovy code to JVM byte-code (`*.class`
    files). It is not strictly necessary to compile before running. You can use the
    `groovy` command to run a groovy script file which typically end in `.groovy`
    but can have any extension.


    To take advantage of the JDK 7+ invoke-dynamic instruction, use the `--indy` flag.^([(14)](#fn14))
    This also works with the `groovy` command.


    Invoke-dynamic helps the compiler improve the performance of things like duck-typing,
    meta-programming, and method-missing calls.


    ## Shell


    ```

    groovysh

    ```


    The Groovy shell can be used to execute Groovy code in an interactive command
    shell.


    ### ![../images/426440_2_En_3_Chapter/426440_2_En_3_Figa_HTML.gif](images/426440_2_En_3_Chapter/426440_2_En_3_Figa_HTML.gif)
    Exercise


    Try it out!


    ## Documentation


    ```

    groovydoc

    ```


    This tool generates documentation from your Groovy code.


    Groovy uses the same comment syntax as Java, including the conventions for documenting
    code.


    ```

    /** This is a documentation comment. */

    /* This is not */

    // This is a one-line comment.

    ```


    Groovy docs can even be accessed as metadata using the `groovy.attach.groovydoc`
    command line option.^([(15)](#fn15)) For example, using the following at the command
    line:


    ```

    groovyc -Dgroovy.attach.groovydoc=true Test.groovy

    ```


    Given that you put the following code in `Test.groovy`:


    ```

    /** My class */ class Test { /** My method */ def method() {} }

    ```


    You could access those documents from the AST at compile time (this can be useful
    when writing AST transformations, for example).


    Also, Groovy docs can be accessed at runtime using the `groovy.attach.runtime.groovydoc`
    command line option. For example, using the following at the command line:


    ```

    groovyc -Dgroovy.attach.runtime.groovydoc=true Test.groovy

    ```


    Given the following code in `Test.groovy`:


    ```

    class Test { /**@ My metadata */ def method() {} }

    ```


    You can now access the preceding comment metadata using the following code (in
    Groovy 3):


    ```

