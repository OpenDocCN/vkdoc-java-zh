  请求/响应处理时间 注意


  Microsoft 浏览器（Internet Explorer 或 Edge）不支持服务器发送事件。要使其在 Microsoft 浏览器上正常工作，你需要使用
  polyfill 来添加支持。


  ## 5-4. 使用 WebSocket


  ### 问题


  你希望通过 Web 实现客户端到服务器的双向通信。


  ### 解决方案


  使用 WebSocket 实现客户端与服务器之间的双向通信。与 HTTP 不同，WebSocket 技术提供了全双工通信。


  ### 工作原理


  对 WebSocket 技术的完整解释超出了本配方的范围；不过有一点值得提及：HTTP 与 WebSocket 技术之间的关系实际上非常薄弱。WebSocket
  技术唯一用到 HTTP 的地方是初始握手阶段。这会将连接从普通的 HTTP 升级为 TCP 套接字连接。


  #### 配置 WebSocket 支持


  启用 WebSocket 技术只需在配置类上添加 `@EnableWebSocket` 即可。


  ```

  @Configuration

  @EnableWebSocket

  public class WebSocketConfiguration {}

  ```


  为了进一步配置 WebSocket 引擎，你可以添加一个 `ServletServerContainerFactoryBean` 对象来配置缓冲区大小、超时时间等。


  ```

  @Bean

  public ServletServerContainerFactoryBean configureWebSocketContainer() {

  ServletServerContainerFactoryBean factory = new ServletServerContainerFactoryBean();

  factory.setMaxBinaryMessageBufferSize(16384);

  factory.setMaxTextMessageBufferSize(16384);

  factory.setMaxSessionIdleTimeout(TimeUnit.MINUTES.convert(30, TimeUnit.MILLISECONDS));

  factory.setAsyncSendTimeout(TimeUnit.SECONDS.convert(5, TimeUnit.MILLISECONDS));

  return factory;

  }

  ```


  这将把文本和二进制缓冲区大小配置为 16KB，将 `asyncSendTimeout` 设置为 5 秒，并将会话超时时间设置为 30 分钟。




  #### 创建 WebSocketHandler


  要处理 WebSocket 消息和生命周期事件（握手、连接建立等），你需要创建一个 `WebSocketHandler` 并将其注册到一个端点 URL。


  `WebSocketHandler` 定义了五个你需要实现的方法（见表 5-3），如果你想直接实现该接口的话。不过，Spring 已经提供了一个很好的类层次结构供你利用。在编写自定义处理器时，通常只需继承
  `TextWebSocketHandler` 或 `BinaryWebSocketHandler` 即可，顾名思义，它们分别可以处理文本或二进制消息。


  表 5-3.


  WebSocketHandler 方法


  | 方法 | 描述 |

  | --- | --- |

  | `afterConnectionEstablished` | 当 WebSocket 连接打开并准备就绪时调用。 |

  | `handleMessage` | 当此处理器收到 WebSocket 消息时调用。 |

  | `handleTransportError` | 当发生错误时调用。 |

  | `afterConnectionClosed` | 在 WebSocket 连接关闭后调用。 |

  | `supportsPartialMessages` | 如果此处理器支持部分消息则调用。如果设置为 `true`，WebSocket 消息可能通过多次调用到达。
  |


  通过继承 `TextWebSocketHandler` 创建 `EchoHandler`，然后实现 `afterConnectionEstablished` 和
  `handleMessage` 方法。


  ```

  package com.apress.springrecipes.websocket;

  import org.springframework.web.socket.CloseStatus;

  import org.springframework.web.socket.TextMessage;

  import org.springframework.web.socket.WebSocketSession;

  import org.springframework.web.socket.handler.TextWebSocketHandler;

  public class EchoHandler extends TextWebSocketHandler {

  @Override

  public void afterConnectionEstablished(WebSocketSession session) throws Exception
  {

  session.sendMessage(new TextMessage("CONNECTION ESTABLISHED"));

  }

  @Override

  protected void handleTextMessage(WebSocketSession session, TextMessage message)

  throws Exception {

  String msg = message.getPayload();

  session.sendMessage(new TextMessage("RECEIVED: " + msg));

  }

  }

  ```


  当连接建立时，会向客户端发送一条 `TextMessage`，告知其连接已建立。当收到 `TextMessage` 时，会提取有效载荷（实际消息），并在其前面加上
  `RECEIVED:`，然后发送回客户端。


  接下来，你需要将此处理器注册到一个 URI。为此，你可以创建一个实现 `WebSocketConfigurer` 的 `@Configuration` 类，并在
  `registerWebSocketHandlers` 方法中注册它。让我们将此接口添加到 `WebSocketConfiguration` 类中，如下所示：


  ```

  package com.apress.springrecipes.websocket;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.socket.config.annotation.EnableWebSocket;

  import org.springframework.web.socket.config.annotation.WebSocketConfigurer;

  import org.springframework.web.socket.config.annotation.WebSocketHandlerRegistry;

  import java.util.concurrent.TimeUnit;

  @Configuration

  @EnableWebSocket

  public class WebSocketConfiguration implements WebSocketConfigurer {

  @Bean

  public EchoHandler echoHandler() {

  return new EchoHandler();

  }

  @Override

  public void registerWebSocketHandlers(WebSocketHandlerRegistry registry) {

  registry.addHandler(echoHandler(), "/echo");

  }

  }

  ```


  首先，你将 `EchoHandler` 注册为一个 bean，以便将其附加到 URI。在 `registerWebSocketHandlers` 中，你可以使用
  `WebSocketHandlerRegistry` 来注册处理器。使用 `addHandler` 方法，你可以将处理器注册到一个 URI，在本例中是 `/echo`。通过此配置，你可以使用
  `ws://localhost:8080/echo-ws/echo` URL 从客户端打开一个 WebSocket 连接。


  现在服务器已就绪，你需要一个客户端来连接你的 WebSocket 端点。为此，你需要一些 JavaScript 和 HTML。编写以下 `app.js`：


  ```

  var ws = null;

  var url = "ws://localhost:8080/echo-ws/echo";

  function setConnected(connected) {

  document.getElementById(''connect'').disabled = connected;

  document.getElementById(''disconnect'').disabled = !connected;

  document.getElementById(''echo'').disabled = !connected;

  }

  function connect() {

  ws = new WebSocket(url);

  ws.onopen = function () {

  setConnected(true);

  };

  ws.onmessage = function (event) {

  log(event.data);

  };

  ws.onclose = function (event) {

  setConnected(false);

  log(''Info: Closing Connection.'');

  };

  }

  function disconnect() {

  if (ws != null) {

  ws.close();

  ws = null;

  }

  setConnected(false);

  }

  function echo() {

  if (ws != null) {

  var message = document.getElementById(''message'').value;

  log(''Sent: '' + message);

  ws.send(message);

  } else {

  alert(''connection not established, please connect.'');

  }

  }

  function log(message) {

  var console = document.getElementById(''logging'');

  var p = document.createElement(''p'');

  p.appendChild(document.createTextNode(message));

  console.appendChild(p);

  while (console.childNodes.length > 12) {

  console.removeChild(console.firstChild);

  }

  console.scrollTop = console.scrollHeight;

  }

  ```


  这里有几个函数。第一个 `connect` 将在点击“连接”按钮时被调用。这将打开一个到 `ws://localhost:8080/echo-ws/echo`
  的 WebSocket 连接，该 URL 是之前创建并注册的处理器的地址。连接到服务器会创建一个 `WebSocket` JavaScript 对象，使你能够在客户端监听消息和事件。这里定义了
  `onopen`、`onmessage` 和 `onclose` 回调。最重要的是 `onmessage` 回调，因为每当服务器传来消息时它都会被调用；该方法只是调用
  `log` 函数，该函数会将接收到的消息添加到屏幕上的 `logging` 元素中。


  接下来是 `disconnect`，它将关闭 WebSocket 连接并清理 JavaScript 对象。最后是 `echo` 函数，它将在点击“回显消息”按钮时被调用。给定的消息将被发送到服务器（并最终被返回）。


  要使用 `app.js`，请添加如下所示的 `index.html` 文件：


  ```


  连接

  断开连接


  回显消息


  日志


  ```


  现在，在部署应用程序时，你可以连接到回显 WebSocket 服务，发送一些消息并让它们被返回（见图 5-5）。


