  ## 1-5\. 使用 Gradle 命令行界面构建 Spring 应用程序


  ### 问题


  你想从命令行使用 Gradle 构建一个 Spring 应用程序。


  ### 解决方案


  从 [`www.gradle.org/downloads`](http://www.gradle.org/downloads) 下载 Gradle。确保 `JAVA_HOME`
  环境变量设置为 Java SDK 的主目录。修改 `PATH` 环境变量，使其包含 Gradle 的 `bin` 目录。




  ### 工作原理


  Gradle 是一款独立的命令行工具，因此可以被广泛应用于各种开发环境。例如，如果你偏好使用 emacs 或 vi 等文本编辑器来编写应用程序代码，那么能够调用像
  Gradle 这样的构建工具来自动化处理那些与 Java 应用程序构建过程相关的繁琐工作（例如，复制文件、一键编译）就变得至关重要。


  你可以从 [`www.gradle.org/downloads`](http://www.gradle.org/downloads) 免费下载 Gradle。Gradle
  提供源代码和二进制两种版本。由于 Java 工具是跨平台的，我们建议你下载二进制版本，以避免额外的编译步骤。在撰写本文时，Gradle 最新的稳定版本是 3.5
  版本。


  下载 Gradle 后，请确保你的系统上已安装 Java SDK，因为 Gradle 在运行时需要它。接下来，通过解压并定义 `JAVA_HOME` 和 `PATH`
  环境变量来安装 Gradle。


  运行以下命令进行解压：


  `www@ubuntu:∼$ unzip gradle-3.5-bin.zip`


  使用以下命令添加 `JAVA_HOME` 变量：


  `www@ubuntu:∼$ export JAVA_HOME=/usr/lib/jvm/java-8-openjdk/`


  使用以下命令将 Gradle 可执行文件添加到 `PATH` 变量中：


  `www@ubuntu:∼$ export PATH=$PATH:/home/www/gradle-3.5/bin/`


  提示


  如果按照上述方式声明 `JAVA_HOME` 和 `PATH` 变量，那么每次打开新的 shell 会话以使用 Gradle 时，都需要重复此过程。在 Unix/Linux
  系统上，你可以打开用户主目录下的 `.bashrc` 文件，并添加相同的 export 行，以避免每次会话都需要声明环境变量。在 Windows 系统上，你可以通过选择“我的电脑”图标，右键单击，然后选择“属性”选项来永久设置环境变量。在弹出的窗口中，选择“高级”选项卡，并点击“环境变量”按钮。


  Gradle 可执行文件通过 `gradle` 命令调用。如果你按照上述说明正确设置了环境变量，那么在系统上的任何目录中键入 `gradle` 都会调用 Gradle。关于
  Gradle 执行的更多细节已超出本技巧的范围。然而，由于本书的源代码包含大量使用 Gradle 的 Spring 应用程序，我们将描述如何使用 Gradle
  来构建其中一个 Spring 应用程序。


