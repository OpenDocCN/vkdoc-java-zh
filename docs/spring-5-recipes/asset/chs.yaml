- '# 1. Spring 开发工具


  在本章中，你将学习如何设置并使用最流行的开发工具来创建 Spring 应用程序。与许多其他软件框架一样，Spring 拥有丰富的开发工具可供选择，从最基本的命令行工具到被称为集成开发环境（IDE）的复杂图形化工具，不一而足。


  无论你已经在使用某些 Java 开发工具，还是初次接触开发，以下指南都将引导你如何设置不同的工具箱，以完成后续章节的练习，并开发任何 Spring 应用程序。


  以下是设置并启动 Spring 应用程序所需的三个工具箱及对应的指南：


  *   Spring Tool Suite：指南 1-1

  *   IntelliJ IDE：指南 1-2（以及针对 Maven 命令行界面的指南 1-3 和 1-4；针对 Gradle 命令行界面的指南 1-5 和 1-6）

  *   文本编辑器：针对 Maven 命令行界面的指南 1-3 和 1-4；针对 Gradle 命令行界面的指南 1-5 和 1-6


  请记住，你无需安装全部三个工具箱即可使用 Spring。尝试所有工具可能会有所帮助，但你可以使用自己最顺手的工具箱。


  ## 1-1. 使用 Spring Tool Suite 构建 Spring 应用程序


  ### 问题


  你想使用 Spring Tool Suite (STS) 来构建一个 Spring 应用程序。


  ### 解决方案


  在你的工作站上安装 STS。打开 STS 并点击“打开仪表盘”链接。要创建一个新的 Spring 应用程序，请在仪表盘窗口的“创建”表格中点击“Spring 项目”链接。要打开一个使用
  Maven 的 Spring 应用程序，请从顶部的“文件”菜单中选择“导入”选项，点击 Maven 图标，然后选择“现有 Maven 项目”。接着，从你的工作站中选择基于
  Maven 的 Spring 应用程序。


  要在 STS 上安装 Gradle，请点击仪表盘窗口底部的“扩展”选项卡。勾选“Gradle 支持”复选框。继续进行 Gradle 扩展的安装，安装完成后重启
  STS。要打开一个使用 Gradle 的 Spring 应用程序，请从顶部的“文件”菜单中选择“导入”选项，点击 Gradle 图标，然后选择“Gradle 项目”。接着，从你的工作站中选择基于
  Gradle 的 Spring 应用程序。点击“构建模型”按钮，最后点击“完成”即可开始处理该项目。


  ### 工作原理


  STS 是由 SpringSource（Pivotal 的一个部门，也是 Spring 框架的创建者）开发的 IDE。STS 专为开发 Spring 应用程序而设计，使其成为实现此目的最完整的工具之一。STS
  是一个基于 Eclipse 的工具，因此它具有与开源 Eclipse IDE 相同的外观和感觉。


  STS 可从 [`http://spring.io/tools/sts`](http://spring.io/tools/sts) 免费下载。STS 适用于所有主流操作系统版本：Windows（32
  位或 64 位）、macOS（Cocoa，64 位）和 Linux（GTK，32 位和 64 位）。此外，STS 有版本之分，因此你可以选择下载最新的稳定版本或里程碑/开发版本。请下载适合你操作系统的版本。


  下载 STS 后，请确保你的系统上已安装 Java SDK，因为这是 STS 的安装要求。接着进行 STS 的安装。按照安装向导操作，你应该在五到十分钟内完成
  STS 的设置。安装完成后，会在进行安装的用户的主文件夹下（或用户选择的安装文件夹下）创建一个名为 `STS_<VERSION>` 的文件夹。如果你检查此文件夹，会看到用于启动
  STS 的可执行文件。


  启动 STS。启动时，STS 会要求你定义一个工作空间位置。工作空间是 STS 存放所有项目信息的地方。你可以保留主 STS 安装目录下的默认目录，也可以根据自己的喜好定义不同的目录。启动完成后，你将看到如图
  1-1 所示的界面。


  ![A314861_4_En_1_Fig1_HTML.jpg](img/A314861_4_En_1_Fig1_HTML.jpg)


  图 1-1.


  STS 启动界面


  在 STS 仪表盘中央的“开始使用！”框中，有一个名为“创建 Spring Starter 项目”的链接。你可以点击此链接来创建一个新的 Spring 应用程序。如果你愿意，可以继续创建一个空应用程序。系统会要求你输入名称并定义一系列参数，你可以保留默认值。


  比从头创建 Spring 应用程序更常见的情况是继续开发一个已有的 Spring 应用程序。在这种情况下，应用程序的所有者通常会随应用程序的源代码一起分发一个构建脚本，以方便其后续开发。


  大多数 Java 应用程序的首选构建脚本是围绕 Maven 构建工具设计的 `pom.xml` 文件，或者，在更近期的项目中，是围绕 Gradle 构建工具设计的
  `build.gradle` 文件。本书的源代码及其应用程序均提供了 Gradle 构建文件，此外还有一个使用 Maven 构建文件的应用程序。


  在 Java 应用程序中，可能有数十或数百个琐碎的任务需要完成才能将应用程序组合起来（例如，复制 JAR 包或配置文件、设置 Java 类路径以执行编译、下载
  JAR 依赖项等）。Java 构建工具可以在 Java 应用程序中执行此类任务。


  Java 构建工具仍然有其用武之地，因为随构建文件一起分发的应用程序可以确保应用程序创建者意图的所有琐碎任务都能被任何使用该应用程序的人精确地复制。如果应用程序随附了
  Ant 的 `build.xml` 文件、Maven 的 `pom.xml` 文件、Ivy 的 `ivy.xml` 文件或 Gradle 的 `build.gradle`
  文件，那么这些构建文件中的每一个都能保证跨用户和不同系统的构建一致性。


  一些较新的 Java 构建工具功能更强大，并改进了其早期版本的工作方式。每个构建文件都使用自己的语法来定义操作、依赖关系以及构建应用程序所需的几乎所有其他任务。但是，你永远不应忘记，Java
  构建工具只是达到目的的一种手段。这是应用程序创建者为简化构建过程而做出的选择。如果你看到一个应用程序随附了来自最古老的 Ant 版本或最新的 Gradle 版本的构建文件，请不要惊慌；从最终用户的角度来看，你只需要下载并安装该构建工具，就能按照创建者的意图创建应用程序。


  由于许多 Spring 应用程序继续使用 Maven，而一些较新的 Spring 应用程序则使用 Gradle，因此我们将描述如何将这两种类型的项目导入 STS。




  #### 导入并构建 Maven 项目


  下载本书的源代码并将其解压到本地目录后，点击 STS 顶部的 File 菜单，选择 Import 选项。此时会弹出一个窗口。在弹出的窗口中，点击 Maven 图标，然后选择
  Existing Maven Projects 选项，如图 1-2 所示。


  ![A314861_4_En_1_Fig2_HTML.jpg](img/A314861_4_En_1_Fig2_HTML.jpg)


  图 1-2.


  导入现有的 Maven 项目


  点击 Next 按钮。在接下来的界面中，点击 Browse 按钮，选择本书源代码中 `ch01` 目录下名为 `springintro_mvn` 的文件夹，如图
  1-3 所示。


  ![A314861_4_En_1_Fig3_HTML.jpg](img/A314861_4_En_1_Fig3_HTML.jpg)


  图 1-3.


  选择 Maven 项目


  请注意，在图 1-3 中，Import Maven Projects 窗口已更新，包含了 `pom.xml com.apress.springrecipes`…
  这一行，这反映了要导入的 Maven 项目。选中项目复选框，然后点击 Finish 按钮导入项目。STS 中的所有项目都可以在 Package Explorer
  窗口的左侧访问。在本例中，项目以名称 `springintro_mvn` 显示。


  如果你点击 Package Explorer 中的项目图标，就能看到项目结构（例如，Java 类、依赖项、配置文件等）。如果你双击 Package Explorer
  中的任意项目文件，该文件会在中央窗口的一个单独标签页中打开，与 Dashboard 并列。文件打开后，你可以检查、编辑或删除其内容。


  选择 Package Explorer 中的项目图标并右键单击。此时会出现一个包含各种项目命令的上下文菜单。选择“Run as”选项，然后选择“Maven build”选项。会弹出一个窗口，供你编辑和配置项目构建。只需点击右下角的
  Run 按钮。在 STS 的底部中央，你会看到 Console 窗口出现。在本例中，Console 窗口会显示 Maven 生成的一系列构建消息，以及构建过程失败时可能出现的任何错误。


  你已经成功构建了应用程序，恭喜！现在让我们运行它。再次从 Package Explorer 中选择项目图标，按 F5 键刷新项目目录。展开项目树。在底部附近，你会看到一个名为
  `target` 的新目录，其中包含构建好的应用程序。点击其图标展开 target 目录。接下来，选择文件 `springintro_mvn-4.0.0-SNAPSHOT.jar`，如图
  1-4 所示。


  ![A314861_4_En_1_Fig4_HTML.jpg](img/A314861_4_En_1_Fig4_HTML.jpg)


  图 1-4.


  在 STS 中选择可执行文件


  选中文件后，右键单击以打开包含各种项目命令的上下文菜单。选择“Run as”选项，然后选择“Run configurations”选项。会弹出一个窗口，供你编辑和配置运行。确保左侧选中了“Java
  application”选项。在“Main class”框中，输入 `com.apress.springrecipes.hello.Main`。这是该项目的主类，如图
  1-5 所示。


  ![A314861_4_En_1_Fig5_HTML.jpg](img/A314861_4_En_1_Fig5_HTML.jpg)


  图 1-5.


  在 STS 中定义主可执行类


  点击右下角的 Run 按钮。在 STS 的底部中央，你会看到 Console 窗口。在本例中，Console 窗口会显示应用程序的日志消息，以及应用程序定义的问候消息。


  尽管你已经使用 STS 构建并运行了一个 Spring 应用程序，但工作尚未完成。你刚刚在 STS 中完成的过程，大部分是由 Maven 构建工具在后台完成的。接下来，是时候导入一个使用较新构建工具（称为
  Gradle）的 Spring 应用程序了。


  #### 导入并构建 Gradle 项目


  虽然 Gradle 仍然是一个相对较新的工具，但有迹象表明 Gradle 未来将取代 Maven。例如，许多大型 Java 项目（如 Spring 框架本身）现在都使用
  Gradle 而不是 Maven，因为它更强大。鉴于这种趋势，有必要描述一下如何在 STS 中使用 Gradle。


  提示


  如果你有一个 Maven 项目（即 `pom.xml` 文件），你可以使用 bootstrap 插件或 maven2gradle 工具来创建一个 Gradle
  项目（即 `build.gradle` 文件）。bootstrap 插件包含在 Gradle 中（参见 [`http://gradle.org/docs/current/userguide/bootstrap_plugin.html`](http://gradle.org/docs/current/userguide/bootstrap_plugin.html)
