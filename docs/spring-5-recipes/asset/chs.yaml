- '# 6. Spring Social


  社交网络无处不在，大多数互联网用户都拥有一个或多个社交网络账号。人们通过推文分享自己正在做的事情或对某个话题的感受；在 Facebook 和 Instagram
  上分享照片；使用 Tumblr 撰写博客。每天都有越来越多的社交网络涌现。作为网站所有者，集成这些社交网络可以带来诸多好处，例如让用户轻松发布链接，或者筛选并展示人们的想法。


  Spring Social 试图提供一个统一的 API 来连接这些不同的网络，并提供一个扩展模型。Spring Social 本身提供了对 Facebook、Twitter
  和 LinkedIn 的集成；此外，还有许多社区项目为不同的社交网络提供支持（例如 Tumblr、微博和 Instagram 等）。Spring Social
  可以分为三个部分。首先是连接框架（Connect Framework），它负责处理与底层社交网络的身份验证和连接流程。其次是 `ConnectController`，它是一个控制器，负责在服务提供商、消费者（应用程序）和应用程序用户之间进行
  OAuth 交换。最后是 `SocialAuthenticationFilter`，它将 Spring Social 与 Spring Security 集成（参见第
  8 章），允许用户使用其社交网络账号登录。


  ## 6-1. 设置 Spring Social


  ### 问题


  你希望在应用程序中使用 Spring Social。


  ### 解决方案


  将 Spring Social 添加到依赖项中，并在配置中启用 Spring Social。


  ### 工作原理


  Spring Social 由几个核心模块和每个服务提供商（例如 Twitter、Facebook、GitHub 等）的扩展模块组成。要使用 Spring Social，你需要将它们添加到应用程序的依赖项中。表
  6-1 显示了可用的模块。


  表 6-1. Spring Social 模块概览


  | 模块 | 描述 |

  | --- | --- |

  | `spring-social-core` | Spring Social 的核心模块；包含主要的和共享的基础设施类 |

  | `spring-social-config` | Spring Social 配置模块；使配置 Spring Social（的各个部分）更加容易 |

  | `spring-social-web` | Spring Social 的 Web 集成，包含便于使用的过滤器和控制器 |

  | `spring-social-security` | 与 Spring Security 的集成（参见第 7 章） |


  这些依赖项位于 `org.springframework.social` 组中。本章将在不同的方案中涵盖每个模块（`core`、`config`、`web` 和
  `security`）。添加依赖项后，你就可以设置 Spring Social 了。


  ```

  package com.apress.springrecipes.social.config;

  import com.apress.springrecipes.social.StaticUserIdSource;

  import org.springframework.context.annotation.*;

  import org.springframework.core.env.Environment;

  import org.springframework.social.config.annotation.EnableSocial;

  import org.springframework.social.config.annotation.SocialConfigurerAdapter;

  @Configuration

  @EnableSocial

  @PropertySource("classpath:/application.properties")

  public class SocialConfig extends SocialConfigurerAdapter {

  @Override

  public StaticUserIdSource getUserIdSource() {

  return new StaticUserIdSource();

  }

  }

  ```


  要启用 Spring Social，只需在带有 `@Configuration` 注解的类上添加 `@EnableSocial` 注解。该注解将触发 Spring
  Social 配置的加载。它会检测任何 `SocialConfigurer` bean 的实例，这些实例用于进一步配置 Spring Social。具体来说，它们用于为一个或多个服务提供商添加配置。


  `SocialConfig` 扩展了 `SocialConfigurerAdapter`，后者是 `SocialConfigurer` 的一个实现。如你所见，有一个名为
  `getUserIdSource` 的重写方法，它返回一个 `StaticUserIdSource` 对象。Spring Social 需要一个 `UserIdSource`
  实例来确定当前用户。该用户用于查找与服务提供商的任何连接。这些连接存储在每个用户的 `ConnectionRepository` 中。使用哪个 `ConnectionRepository`
  由 `UsersConnectionRepository` 决定，后者会使用当前用户。默认配置的 `UsersConnectionRepository` 是 `InMemoryUsersConnectionRepository`。


  最后，你从类路径加载一个属性文件。该属性文件包含你的应用程序用于服务提供商的 API 密钥。你也可以将这些密钥硬编码到代码中，而不是放在属性文件中。


  目前，你将使用 `StaticUserIdSource` 来确定当前用户。


  ```

  package com.apress.springrecipes.social;

  import org.springframework.social.UserIdSource;

  public class StaticUserIdSource implements UserIdSource {

  private static final String DEFAULT_USERID = "anonymous";

  private String userId = DEFAULT_USERID;

  @Override

  public String getUserId() {

  return this.userId;

  }

  public void setUserId(String userId) {

  this.userId = userId;

  }

  }

  ```


  `StaticUserIdSource` 实现了 `UserIdSource` 并返回一个预设的 `userId`。虽然目前这可行，但在实际应用程序中，你希望能够按用户存储连接信息。


  ## 6-2. 连接到 Twitter


  ### 问题


  你希望你的应用程序能够访问 Twitter。


  ### 解决方案


  在 Twitter 上注册你的应用程序，并配置 Spring Social 以使用应用程序凭据来获取对 Twitter 的访问权限。


  ### 工作原理


  在让你的应用程序使用 Twitter 之前，你需要在 Twitter 上注册你的应用程序。注册后，你将获得用于标识应用程序的凭据（API 密钥和 API 密钥）。


  #### 在 Twitter 上注册应用程序


  要在 Twitter 上注册应用程序，请访问 [`https://dev.twitter.com`](https://dev.twitter.com)，在右上角找到你的头像；从下拉菜单中选择“我的应用”（参见图
  6-1）。


  ![A314861_4_En_6_Fig1_HTML.jpg](img/A314861_4_En_6_Fig1_HTML.jpg)


  图 6-1. 在 Twitter 上选择“我的应用”


  选择“我的应用”后，将出现应用程序管理页面。此页面上有一个按钮，允许你创建新应用（参见图 6-2）。


  ![A314861_4_En_6_Fig2_HTML.jpg](img/A314861_4_En_6_Fig2_HTML.jpg)


  图 6-2. 应用程序管理页面


  在此页面上，单击该按钮将打开一个屏幕（参见图 6-3）来注册你的应用程序。


  ![A314861_4_En_6_Fig3_HTML.jpg](img/A314861_4_En_6_Fig3_HTML.jpg)


  图 6-3. 注册新应用程序


  在此屏幕上，你必须输入应用程序的名称和描述，以及将使用该应用程序的网站的 URL。使用 Spring Social 时，填写回调 URL 字段也很重要，因为你需要回调；实际值并不重要（除非你使用非常旧版本的
  `OAuth`）。


  接受条款和条件并单击最后的创建按钮后，你将进入应用程序设置页面。这意味着你已成功创建了应用程序。


  为了能够将 Spring Social 连接到 Twitter，你需要知道你的 API 密钥和 API 密钥。你可以在应用程序设置的 API 密钥选项卡中找到它们（参见图
  6-4 和 6-5）。


  ![A314861_4_En_6_Fig5_HTML.jpg](img/A314861_4_En_6_Fig5_HTML.jpg)


  图 6-5. 连接 Spring Social 所需的 API 密钥和 API 密钥


  ![A314861_4_En_6_Fig4_HTML.jpg](img/A314861_4_En_6_Fig4_HTML.jpg)


  图 6-4. 应用程序设置页面




  #### 配置 Spring Social 连接 Twitter


  现在你已拥有 API 密钥和 API 秘钥，可以配置 Spring Social 来连接 Twitter。首先创建一个属性文件（例如 `application.properties`），用于存放你的
  API 密钥和 API 秘钥，以便在需要时轻松获取。


  ```

  twitter.appId=

  twitter.appSecret=

  ```


  要连接 Twitter，你需要添加一个 `TwitterConnectionFactory`，当请求连接 Twitter 时，它将使用应用程序 ID 和秘钥。


  ```

  package com.apress.springrecipes.social.config;

  import org.springframework.core.env.Environment;

  import org.springframework.social.config.annotation.ConnectionFactoryConfigurer;

  import org.springframework.social.connect.Connection;

  import org.springframework.social.connect.ConnectionRepository;

  import org.springframework.social.twitter.api.Twitter;

  import org.springframework.social.twitter.connect.TwitterConnectionFactory;

  @Configuration

  @EnableSocial

  @PropertySource("classpath:/application.properties")

  public class SocialConfig extends SocialConfigurerAdapter {

  ...

  @Configuration

  public static class TwitterConfigurer extends SocialConfigurerAdapter {

  @Override

  public void addConnectionFactories(

  ConnectionFactoryConfigurer connectionFactoryConfigurer,

  Environment env) {

  connectionFactoryConfigurer.addConnectionFactory(

  new TwitterConnectionFactory(

  env.getRequiredProperty("twitter.appId"),

  env.getRequiredProperty("twitter.appSecret")));

  }

  @Bean

  @Scope(value = "request", proxyMode = ScopedProxyMode.INTERFACES)

  public Twitter twitterTemplate(ConnectionRepository connectionRepository) {

  Connection connection = connectionRepository.findPrimaryConnection(Twitter.class);

  return connection != null ? connection.getApi() : null;

  }

  }

  }

  ```


  `SocialConfigurer` 接口包含回调方法 `addConnectionFactories`，允许你添加 `ConnectionFactory` 实例以使用
  Spring Social。对于 Twitter，有 `TwitterConnectionFactory`，它接受两个参数。第一个是 API 密钥，第二个是 API
  秘钥。这两个构造函数参数都来自读取的属性文件。当然，你也可以将值硬编码到配置中。至此，与 Twitter 的连接已建立。虽然你可以使用原始的底层连接，但实际并不推荐这样做。相反，应使用
  `TwitterTemplate`，它使得与 Twitter API 的交互更加便捷。上述配置将一个 `TwitterTemplate` 添加到了应用程序上下文中。请注意
  `@Scope` 注解。将此 Bean 设置为请求作用域非常重要。对于每个请求，实际的 Twitter 连接可能不同，因为每个请求可能对应不同的用户，这就是为什么需要使用请求作用域
  Bean 的原因。注入到该方法中的 `ConnectionRepository` 是根据当前用户的 ID 确定的，该 ID 通过你之前配置的 `UserIdSource`
  获取。


  注意


  虽然示例使用单独的配置类将 Twitter 配置为服务提供商，但你也可以将其添加到主 `SocialConfig` 类中。不过，将全局的 Spring Social
  配置与特定的服务提供商设置分开可能更为可取。


  ## 6-3\. 连接 Facebook


  ### 问题


  你希望应用程序能够访问 Facebook。


  ### 解决方案


  在 Facebook 上注册你的应用程序，并配置 Spring Social 以使用应用程序凭据来获取对 Facebook 的访问权限。


  ### 工作原理


  在让应用程序使用 Facebook 之前，你首先需要在 Facebook 上注册你的应用程序。注册完成后，你将获得用于标识应用程序的凭据（API 密钥和 API
  秘钥）。要在 Facebook 上注册应用程序，你需要拥有一个 Facebook 账户，并且已注册为开发者。（本示例假设你已在 Facebook 上注册为开发者。如果没有，请访问
  [`http://developers.facebook.com`](http://developers.facebook.com)，点击“立即注册”按钮，并按照向导完成注册。）


  #### 在 Facebook 上注册应用程序


  首先访问 [`http://developers.facebook.com`](http://developers.facebook.com)；点击页面顶部的“应用”菜单，然后选择“添加新应用”（见图
  6-6）。


  ![A314861_4_En_6_Fig6_HTML.jpg](img/A314861_4_En_6_Fig6_HTML.jpg)


  图 6-6.


  注册新应用的第一步


  这将打开一个屏幕（见图 6-7），允许你填写应用程序的一些详细信息。


  ![A314861_4_En_6_Fig7_HTML.jpg](img/A314861_4_En_6_Fig7_HTML.jpg)


  图 6-7.


  创建新应用 ID 窗口


  你的应用程序名称可以是任何内容，只要不包含“face”或“book”字样即可。同时还需要提供一个电子邮件地址，以便 Facebook 知道联系谁。填写完表单后，点击“创建应用
  ID”按钮，这将带你进入应用程序页面（见图 6-8）。在此页面上，导航到“设置”选项卡。


  ![A314861_4_En_6_Fig8_HTML.jpg](img/A314861_4_En_6_Fig8_HTML.jpg)


  图 6-8.


  Facebook 设置页面


  在“设置”页面上，点击“添加平台”按钮，然后选择“网站”。输入你的应用程序将要运行的网站 URL。在本练习中，该 URL 为 `http://localhost:8080/social`。如果未提供此
  URL，授权将不会通过，连接也将永远无法建立。




  #### 配置 Spring Social 以连接 Facebook


  Facebook 设置页面还包含应用程序连接 Facebook 所需的应用程序 ID 和密钥。将它们放入 `application.properties` 文件中。


  ```

  facebook.appId=

  facebook.appSecret=

  ```


  假设 Spring Social 已经设置好（参见配方 6-1），接下来只需添加一个 `FacebookConnectionFactory` 和 `FacebookTemplate`
  以便轻松访问。


  ```

  package com.apress.springrecipes.social.config;

  import org.springframework.social.facebook.api.Facebook;

  import org.springframework.social.facebook.connect.FacebookConnectionFactory;

  @Configuration

  @EnableSocial

  @PropertySource("classpath:/application.properties")

  public class SocialConfig extends SocialConfigurerAdapter {

  ...

  @Configuration

  public static class FacebookConfiguration extends SocialConfigurerAdapter {

  @Override

  public void addConnectionFactories(

  ConnectionFactoryConfigurer connectionFactoryConfigurer,

  Environment env) {

  connectionFactoryConfigurer.addConnectionFactory(

  new FacebookConnectionFactory(

  env.getRequiredProperty("facebook.appId"),

  env.getRequiredProperty("facebook.appSecret")));

  }

  @Bean

  @Scope(value = "request", proxyMode = ScopedProxyMode.INTERFACES)

  public Facebook facebookTemplate(ConnectionRepository connectionRepository) {

  Connection connection = connectionRepository.findPrimaryConnection(Facebook.class);

  return connection != null ? connection.getApi() : null;

  }

  }

  }

  ```


  `FacebookConnectionFactory` 需要应用程序 ID 和密钥。这两个属性都已添加到 `application.properties` 文件中，并可通过
  `Environment` 对象获取。


  上述 bean 配置向应用程序上下文中添加了一个名为 `facebookTemplate` 的 bean。请注意 `@Scope` 注解。此 bean 必须是请求作用域的，这一点很重要。对于每个请求，与
  Facebook 的实际连接可能不同，因为每个请求可能对应不同的用户，这就是使用请求作用域 bean 的原因。注入到方法中的 `ConnectionRepository`
  是根据当前用户的 ID 确定的，该 ID 是通过您之前配置的 `UserIdSource` 获取的（参见配方 6-1）。


  注意


  尽管示例使用单独的配置类将 Facebook 配置为服务提供者，但您也可以将其添加到主 `SocialConfig` 类中。不过，将全局的 Spring Social
  配置与特定的服务提供者设置分开可能是更可取的做法。


  ## 6-4. 显示服务提供者的连接状态


  ### 问题


  您希望显示所用服务提供者的连接状态。


  ### 解决方案


  配置 `ConnectController` 并使用它向用户显示状态。


  ### 工作原理


  Spring Social 提供了 `ConnectController`，它负责处理与服务提供者的连接和断开连接，但您也可以显示当前用户对于所用服务提供者的连接状态（已连接或未连接）。`ConnectController`
  使用多个 REST URL 来显示、添加或删除给定用户的连接（参见表 6-2）。


  表 6-2. ConnectController URL 映射


  | URL | 方法 | 描述 |

  | --- | --- | --- |

  | `/connect` | GET | 显示所有可用服务提供者的连接状态。将返回 `connect`/`status` 作为要渲染的视图名称。 |

  |   | POST | 启动与指定提供者的连接流程。 |

  |   | DELETE | 删除当前用户与指定提供者的所有连接。 |


  要使用该控制器，首先需要配置 Spring MVC（参见第 4 章）。为此，请添加以下配置：


  ```

  package com.apress.springrecipes.social.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.ViewResolver;

  import org.springframework.web.servlet.config.annotation.EnableWebMvc;

  import org.springframework.web.servlet.config.annotation.ViewControllerRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  import org.springframework.web.servlet.view.InternalResourceViewResolver;

  @Configuration

  @EnableWebMvc

  @ComponentScan({"com.apress.springrecipes.social.web"})

  public class WebConfig implements WebMvcConfigurer {

  @Bean

  public ViewResolver internalResourceViewResolver() {

  InternalResourceViewResolver viewResolver = new InternalResourceViewResolver();

  viewResolver.setPrefix("/WEB-INF/views/");

  viewResolver.setSuffix(".jsp");

  return viewResolver;

  }

  @Override

  public void addViewControllers(ViewControllerRegistry registry) {

  registry.addViewController("/").setViewName("index");

  registry.addViewController("/signin").setViewName("signin");

  }

  }

  ```


  您需要使用 `@EnableWebMvc` 启用 Spring MVC，并添加一个 `ViewResolver`，以便能够找到 JSP 页面。最后，您希望在应用程序启动时显示
  `index.jsp` 页面。接下来，将 `ConnectController` 添加到 `WebConfig` 类中。该控制器需要 `ConnectionFactoryLocator`
  和 `ConnectionRepository` 作为构造函数参数。要访问它们，只需将它们作为方法参数添加即可。


  ```

  @Bean

  public ConnectController connectController(

  ConnectionFactoryLocator connectionFactoryLocator,

  ConnectionRepository connectionRepository) {

  return new ConnectController(connectionFactoryLocator, connectionRepository);

  }

  ```


  `ConnectController` 将监听表 6-2 中列出的 URL。现在，在 `/WEB-INF/views` 目录中添加两个视图。第一个是主索引页面，第二个是状态概览页面。首先创建
  `index.jsp` 文件。


  ```


  Hello Spring Social


  Connections

  点击 ">此处查看您的社交网络连接。


  ```


  接下来，在 `/WEB-INF/views/connect` 目录中创建 `status.jsp` 文件。


  ```


  Spring Social - Connections


  Spring Social - Connections


  ${provider}


  您已以 ${connectionMap[provider][0].displayName} 的身份连接到 ${provider}


  您尚未连接到 ${provider}。点击 ">此处连接到 ${provider}。


  ```


  状态页面将遍历所有可用的提供者，并判断当前用户是否与该服务提供者（Twitter、Facebook 等）存在现有连接。`ConnectController` 会将提供者列表以
  `providerIds` 属性的形式提供，而 `connectionMap` 则保存当前用户的连接。现在，为了启动应用程序，您需要创建一个 `WebApplicationInitializer`，它将注册一个
  `ContextLoaderListener` 和 `DispatcherServlet` 来处理请求。


  ```

  package com.apress.springrecipes.social;

  import com.apress.springrecipes.social.config.SocialConfig;

  import com.apress.springrecipes.social.config.WebConfig;

  import org.springframework.web.filter.DelegatingFilterProxy;

  import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;

  import javax.servlet.Filter;

  public class SocialWebApplicationInitializer extends AbstractAnnotationConfigDispatcherServletInitializer
  {

  @Override

  protected Class[] getRootConfigClasses() {

  return new Class[]{SocialConfig.class};

  }

  @Override

  protected Class[] getServletConfigClasses() {

  return new Class[] {WebConfig.class, };

  }

  @Override

  protected String[] getServletMappings() {

  return new String[] {"/"};

  }

  }

  ```


  这将启动应用程序。`SocialConfig` 类将由 `ContextLoaderListener` 加载，而 `WebConfig` 类将由 `DispatcherServlet`
  加载。为了能够处理请求，需要有一个 Servlet 映射。这里，映射为 `/`。


  现在一切配置完毕，应用程序可以部署并通过 URL `http://localhost:8080/social` 访问。这将显示索引页面。点击链接将显示连接状态页面，该页面最初会显示当前用户尚未连接。




  #### 连接服务提供商


  当用户点击链接连接服务提供商时，将被导向 `/connect/{provider}` 网址。若尚未建立连接，将渲染 `connect/{provider}Connect`
  页面，否则显示 `connect/{provider}Connected` 页面。要使用 `ConnectController` 连接 Twitter，需添加
  `twitterConnect.jsp` 和 `twitterConnected.jsp` 页面。对于 Facebook，则需添加 `facebookConnect.jsp`
  和 `facebookConnected.jsp` 页面。此模式适用于 Spring Social 的所有其他服务提供商连接器（如 GitHub、FourSquare、LinkedIn
  等）。首先将 `twitterConnect.jsp` 添加到 `/WEB-INF/views/connect` 目录。


  ```


  Spring Social - 连接 Twitter


  连接 Twitter

  " method="POST">


  您尚未连接 Twitter。点击按钮将此应用与您的 Twitter 账户关联。


  连接 Twitter


  ```


  注意表单标签将表单 POST 回同一网址。点击提交按钮后，您将被重定向至 Twitter，系统将请求您授权此应用访问您的 Twitter 个人资料。（将此处替换为
  `facebook` 即可连接 Facebook。）


  接下来将 `twitterConnected.jsp` 添加到 `/WEB-INF/views/connect` 目录。此页面将在您已连接 Twitter 时显示，同时也在您授权应用后从
  Twitter 返回时显示。


  ```


  Spring Social - 已连接 Twitter


  已连接 Twitter


  您现在已连接至您的 Twitter 账户。

  点击"此处查看您的连接状态。


  ```


  添加这些页面后，重启应用并导航至状态页面。此时点击“连接 Twitter”链接，您将被导向 `twitterConnect.jsp` 页面。点击“连接 Twitter”按钮后，将显示
  Twitter 授权应用页面（见图 6-9）。


  ![A314861_4_En_6_Fig9_HTML.jpg](img/A314861_4_En_6_Fig9_HTML.jpg)


  图 6-9.


  Twitter 授权页面


  授权应用后，您将返回 `twitterConnect.jsp` 页面，告知您已成功连接 Twitter。返回状态页面时，您将看到已使用昵称连接至 Twitter。


  对于 Facebook 或任何其他服务提供商，遵循相同步骤添加 `{provider}Connect` 和 `{provider}Connected` 页面，只要您同时添加了正确的服务提供商连接器和配置，Spring
  Social 即可连接该提供商。


  ## 6-5. 使用 Twitter API


  ### 问题


  您希望使用 Twitter API。


  ### 解决方案


  使用 `Twitter` 对象访问 Twitter API。


  ### 工作原理


  每个服务提供商都有其基于 Twitter 的专属 API。有一个实现 Twitter 接口的对象，该接口在 Java 中代表 Twitter API；对于 Facebook，则有一个实现
  Facebook 接口的对象可用。在配方 6-2 中，您已设置好与 Twitter 的连接和 `TwitterTemplate`。`TwitterTemplate`
  暴露了 Twitter API 的各个部分（见表 6-3）。


  表 6-3.


  Twitter API 暴露的操作


  | 操作 | 描述 |

  | --- | --- |

  | `blockOperations()` | 屏蔽和解封用户 |

  | `directMessageOperations()` | 读取和发送私信 |

  | `friendOperations()` | 获取用户的好友和粉丝列表，以及关注/取消关注用户 |

  | `geoOperations()` | 处理位置信息 |

  | `listOperations()` | 维护、订阅和取消订阅用户列表 |

  | `searchOperations()` | 搜索推文并查看搜索趋势 |

  | `streamingOperations()` | 通过 Twitter 流式 API 实时接收推文 |

  | `timelineOperations()` | 读取时间线并发布推文 |

  | `userOperations()` | 获取用户个人资料数据 |

  | `restOperations()` | 底层 `RestTemplate`，用于其他 API 未暴露的部分 |


  对于某些操作，您的应用可能需要比只读更高的访问权限。如果您想发送推文或访问私信，则需要读写权限。


  要发布状态更新，您可以使用 `timelineOperations()` 方法，然后调用 `updateStatus()` 方法。根据需求，`updateStatus`
  方法可以接受一个简单的 `String`（即状态文本），或一个名为 `TweetData` 的值对象，其中包含状态及其他信息（如位置、是否回复其他推文，以及可选的图片等资源）。


  一个简单的控制器示例如下：


  ```

  package com.apress.springrecipes.social.web;

  import org.springframework.social.twitter.api.Twitter;

  import org.springframework.stereotype.Controller;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestMethod;

  import org.springframework.web.bind.annotation.RequestParam;

  @Controller

  @RequestMapping("/twitter")

  public class TwitterController {

  private final Twitter twitter;

  public TwitterController(Twitter twitter) {

  this.twitter = twitter;

  }

  @RequestMapping(method = RequestMethod.GET)

  public String index() {

  return "twitter";

  }

  @RequestMapping(method = RequestMethod.POST)

  public String tweet(@RequestParam("status") String status) {

  twitter.timelineOperations().updateStatus(status);

  return "redirect:/twitter";

  }

  }

  ```


  该控制器通过 `TwitterTemplate` 获取 Twitter API。`TwitterTemplate` 实现了 `Twitter` 接口。您可能还记得配方
  6-2 中提到，该 API 是请求作用域的。您获得的是一个作用域代理，这也是使用 `Twitter` 接口的原因。`tweet` 方法接收一个参数并将其传递给
  Twitter。


  ## 6-6. 使用持久化 UsersConnectionRepository


  ### 问题


  您希望持久化用户的连接数据，以便在服务器重启后数据不丢失。


  ### 解决方案


  使用 `JdbcUsersConnectionRepository` 替代默认的 `InMemoryUsersConnectionRepository`。




  ### 工作原理


  默认情况下，Spring Social 会自动配置一个 `InMemoryUsersConnectionRepository`，用于存储用户的连接信息。然而，这种方式在集群环境中无法正常工作，也无法在服务器重启后保留数据。为了解决这个问题，可以使用数据库来存储连接信息。通过
  `JdbcUsersConnectionRepository` 即可启用此功能。


  `JdbcUsersConnectionRepository` 需要一个包含名为 `UserConnection` 的表的数据库，该表需包含若干特定列。幸运的是，Spring
  Social 提供了一个 DDL 脚本 `JdbcUsersConnectionRepository.sql`，你可以使用它来创建该表。


  首先，添加一个数据源，指向你选择的数据库。本例中使用的是 PostgreSQL，但任何数据库都可以。


  提示


  在 `bin` 目录下有一个 `postgres.sh` 文件，它可以启动一个 Docker 化的 PostgreSQL 实例供你使用。


  ```

  @Bean

  public DataSource dataSource() {

  DriverManagerDataSource dataSource = new DriverManagerDataSource();

  dataSource.setUrl(env.getRequiredProperty("datasource.url"));

  dataSource.setUsername(env.getRequiredProperty("datasource.username"));

  dataSource.setPassword(env.getRequiredProperty("datasource.password"));

  dataSource.setDriverClassName(env.getProperty("datasource.driverClassName"));

  return dataSource;

  }

  ```


  请注意 `dataSource.*` 属性，它们用于配置 URL、JDBC 驱动以及用户名/密码。将这些属性添加到 `application.properties`
  文件中。


  ```

  dataSource.password=app

  dataSource.username=app

  dataSource.driverClassName=org.apache.derby.jdbc.ClientDriver

  dataSource.url=jdbc:derby://localhost:1527/social;create=true

  ```


  如果你希望自动创建所需的数据库表，则需要添加一个 `DataSourceInitializer`，并让它执行 `JdbcUsersConnectionRepository.sql`
  文件。


  ```

  @Bean

  public DataSourceInitializer databasePopulator() {

  ResourceDatabasePopulator populator = new ResourceDatabasePopulator();

  populator.addScript(

  new ClassPathResource(

  "org/springframework/social/connect/jdbc/JdbcUsersConnectionRepository.sql"));

  populator.setContinueOnError(true);

  DataSourceInitializer initializer = new DataSourceInitializer();

  initializer.setDatabasePopulator(populator);

  initializer.setDataSource(dataSource());

  return initializer;

  }

  ```


  这个 `DataSourceInitializer` 在应用程序启动时执行，并会运行所有传递给它的脚本。默认情况下，一旦遇到错误，它会立即停止应用程序启动。要阻止这种行为，请将
  `continueOnError` 属性设置为 `true`。现在数据源已经设置并配置完成，最后一步是将 `JdbcUsersConnectionRepository`
  添加到 `SocialConfig` 类中。


  ```

  package com.apress.springrecipes.social.config;

  import org.springframework.social.connect.jdbc.JdbcUsersConnectionRepository;

  ...

  @Configuration

  @EnableSocial

  @PropertySource("classpath:/application.properties")

  public class SocialConfig extends SocialConfigurerAdapter {

  @Override

  public UsersConnectionRepository getUsersConnectionRepository(ConnectionFactoryLocator
  connectionFactoryLocator) {

  return new JdbcUsersConnectionRepository(dataSource(), connectionFactoryLocator,
  Encryptors.noOpText());

  }

  ...

  }

  ```


  `JdbcUsersConnectionRepository` 接受三个构造函数参数。第一个是数据源，第二个是传入的 `ConnectionFactoryLocator`，最后一个参数是
  `TextEncryptor`。`TextEncryptor` 是 Spring Security 加密模块中的一个类，用于加密访问令牌、密钥以及（如果可用）刷新令牌。之所以需要加密，是因为如果数据以纯文本形式存储，可能会被泄露。这些令牌可用于获取你的个人资料信息。


  然而，在测试时，使用 `noOpText` 加密器会很方便，顾名思义，它不进行任何加密。在实际生产环境中，你应该使用 `TextEncryptor`，它会通过密码和盐值来加密数据。


  当 `JdbcUsersConnectionRepository` 配置完成且数据库已启动后，你可以重新启动应用程序。乍一看，似乎没有任何变化；但是，一旦你授权访问（例如
  Twitter），该授权将在应用程序重启后依然有效。你还可以查询数据库，看到信息存储在 `USERCONNECTION` 表中。


  ## 6-7. 集成 Spring Social 与 Spring Security


  ### 问题


  你希望允许网站用户关联他们的社交网络账户。


  ### 解决方案


  使用 `spring-social-security` 项目来集成这两个框架。




  ### 工作原理


  接下来配置 Spring Security。本教程不会深入讨论 Spring Security 的细节，相关内容请参阅第 7 章。本教程的配置如下：


  ```

  @Configuration

  @EnableWebMvcSecurity

  public class SecurityConfig extends WebSecurityConfigurerAdapter {

  @Override

  protected void configure(HttpSecurity http) throws Exception {

  http.authorizeRequests()

  .anyRequest().authenticated()

  .and()

  .formLogin()

  .loginPage("/signin")

  .failureUrl("/signin?param.error=bad_credentials")

  .loginProcessingUrl("/signin/authenticate").permitAll()

  .defaultSuccessUrl("/connect")

  .and()

  .logout().logoutUrl("/signout").permitAll();

  }

  @Bean

  public UserDetailsManager userDetailsManager(DataSource dataSource) {

  JdbcUserDetailsManager userDetailsManager = new JdbcUserDetailsManager();

  userDetailsManager.setDataSource(dataSource);

  userDetailsManager.setEnableAuthorities(true);

  return userDetailsManager;

  }

  @Override

  protected void configure(AuthenticationManagerBuilder auth) throws Exception {

  auth.userDetailsService(userDetailsManager(null));

  }

  }

  ```


  `@EnableWebMvcSecurity` 注解将为 Spring MVC 应用程序启用安全功能。它会注册 Spring Security 运行所需的 Bean。为了进行进一步配置（例如设置安全规则），可以添加一个或多个
  `WebSecurityConfigurer`。为了方便起见，这里提供了一个可扩展的 `WebSecurityConfigurerAdapter`。


  `configure(HttpSecurity http)` 方法负责设置安全规则。此特定配置要求每次调用都必须经过用户身份验证。如果用户尚未通过身份验证（即尚未登录应用程序），系统将提示用户输入登录表单。您还会注意到
  `loginPage`、`loginProcessingUrl` 和 `logoutUrl` 已被修改。这样做是为了使它们与 Spring Social 的默认
  URL 匹配。


  注意


  如果您想保留 Spring Security 的默认设置，请显式配置 `SocialAuthenticationFilter`，并设置 `signupUrl`
  和 `defaultFailureUrl` 属性。


  通过 `configure(AuthenticationManagerBuilder auth)`，您可以添加一个 `AuthenticationManager`，用于判断用户是否存在以及输入的凭据是否正确。所使用的
  `UserDetailsService` 是 `JdbcUserDetailsManager`，它除了作为 `UserDetailsService` 之外，还可以从存储库中添加和删除用户。当您为应用程序添加社交登录页面时，将需要此功能。


  `JdbcUserDetailsManager` 使用 `DataSource` 来读写数据，并且 `enableAuthorities` 属性设置为 `true`，以便用户从应用程序获得的任何角色也会被添加到数据库中。为了初始化数据库，请将
  `create_users.sql` 脚本添加到上一个教程中配置的数据库填充器中。


  ```

  @Bean

  public DataSourceInitializer databasePopulator() {

  ResourceDatabasePopulator populator = new ResourceDatabasePopulator();

  populator.addScript(

  new ClassPathResource("org/springframework/social/connect/jdbc/JdbcUsersConnectionRepository.sql"));

  populator.addScript(new ClassPathResource("sql/create_users.sql"));

  populator.setContinueOnError(true);

  DataSourceInitializer initializer = new DataSourceInitializer();

  initializer.setDatabasePopulator(populator);

  initializer.setDataSource(dataSource());

  return initializer;

  }

  ```


  接下来，为了能够渲染自定义的登录页面，需要将其作为视图控制器添加到 `WebConfig` 类中。这表示对 `/signin` 的请求应渲染 `signin.jsp`
  页面。


  ```

  package com.apress.springrecipes.social.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.config.annotation.ViewControllerRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  ...

  @Configuration

  @EnableWebMvc

  @ComponentScan({"com.apress.springrecipes.social.web"})

  public class WebConfig implements WebMvcConfigurer {

  @Override

  public void addViewControllers(ViewControllerRegistry registry) {

  registry.addViewController("/").setViewName("index");

  registry.addViewController("/signin").setViewName("signin");

  }

  ...

  }

  ```


  `signin.jsp` 页面是一个简单的 JSP 页面，用于渲染用户名和密码输入字段以及一个提交按钮。


  ```


  登录信息不正确，请重试。


  用户名


  密码


  登录


  ```


  请注意隐藏的输入字段，其中包含一个跨站请求伪造（CSRF）令牌。这是为了防止恶意网站或 JavaScript 代码向您的 URL 提交数据。使用 Spring
  Security 时，此功能默认启用。可以通过在 `SecurityConfig` 类中添加 `http.csfr().disable()` 来禁用它。


  还剩下两个最终的配置部分。首先，需要加载此配置；其次，需要注册一个过滤器以将安全功能应用于您的请求。为此，请修改 `SocialWebApplicationInitializer`
  类。


  ```

  package com.apress.springrecipes.social;

  import com.apress.springrecipes.social.config.SecurityConfig;

  import com.apress.springrecipes.social.config.SocialConfig;

  import com.apress.springrecipes.social.config.WebConfig;

  import org.springframework.web.filter.DelegatingFilterProxy;

  import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;

  import javax.servlet.Filter;

  public class SocialWebApplicationInitializer extends AbstractAnnotationConfigDispatcherServletInitializer
  {

  @Override

  protected Class[] getRootConfigClasses() {

  return new Class[]{SecurityConfig.class, SocialConfig.class};

  }

  @Override

  protected Filter[] getServletFilters() {

  DelegatingFilterProxy springSecurityFilterChain = new DelegatingFilterProxy();

  springSecurityFilterChain.setTargetBeanName("springSecurityFilterChain");

  return new Filter[]{springSecurityFilterChain};

  }

  ...

  }

  ```


  首先注意，`SecurityConfig` 类已被添加到 `getRootConfigClasses` 方法中。这将负责加载配置类。接下来，添加了 `getServletFilters`
  方法。此方法用于为将由 `DispatcherServlet` 处理的请求注册过滤器。默认情况下，Spring Security 会在应用程序上下文中注册一个名为
  `springSecurityFilterChain` 的 `Filter`。为了执行此过滤器，您需要添加一个 `DelegatingFilterProxy`。`DelegatingFilterProxy`
  会查找指定 `targetBeanName` 的 `Filter` 类型的 Bean。


  #### 使用 Spring Security 获取用户名


  在之前的教程中，您使用了一个返回静态用户名的 `UserIdSource` 实现。如果您有一个已经使用 Spring Security 的应用程序，则可以使用
  `AuthenticationNameUserIdSource`，它利用（Spring Security 的）`SecurityContext` 来获取当前已认证用户的用户名。该用户名随后用于存储和查找用户与不同服务提供商的连接。


  ```

  @Configuration

  @EnableSocial

  @PropertySource("classpath:/application.properties")

  public class SocialConfig extends SocialConfigurerAdapter {

  @Override

  public UserIdSource getUserIdSource() {

  return new AuthenticationNameUserIdSource();

  }

  ...

  }

  ```


  提示


  使用 `SpringsocialConfigurer` 时，您可以省略此步骤，因为默认情况下会创建并使用 `AuthenticationNameUserIdSource`。


  请注意 `AuthenticationNameUserIdSource` 的构造。这就是从 Spring Security 检索用户名所需的全部操作。它会从 `SecurityContext`
  中查找 `Authentication` 对象，并返回 `Authentication` 的 `name` 属性。重新启动应用程序后，系统将提示您输入登录表单。现在，使用用户名
  `user1` 和密码 `user1` 登录。




  #### 使用 Spring Social 实现登录


  允许当前用户连接社交网络固然不错。但若能使用户通过其社交网络账户登录应用程序，则更为理想。Spring Social 提供了与 Spring Security
  的紧密集成来实现这一功能。为此，还需要设置几个额外的部分。


  首先，需要将 Spring Social 与 Spring Security 集成。为此，可以使用 `SpringSocialConfigurer` 并将其应用于
  Spring Security 配置。


  ```

  @Configuration

  @EnableWebMvcSecurity

  public class SecurityConfig extends WebSecurityConfigurerAdapter {

  @Override

  protected void configure(HttpSecurity http) throws Exception {

  ...

  http.apply(new SpringSocialConfigurer());

  }

  ...

  }

  package com.apress.springrecipes.social.security;

  import org.springframework.dao.DataAccessException;

  import org.springframework.security.core.userdetails.UserDetails;

  import org.springframework.security.core.userdetails.UserDetailsService;

  import org.springframework.security.core.userdetails.UsernameNotFoundException;

  import org.springframework.social.security.SocialUser;

  import org.springframework.social.security.SocialUserDetails;

  import org.springframework.social.security.SocialUserDetailsService;

  import org.springframework.util.Assert;

  public class SimpleSocialUserDetailsService implements SocialUserDetailsService
  {

  private final UserDetailsService userDetailsService;

  public SimpleSocialUserDetailsService(UserDetailsService userDetailsService) {

  Assert.notNull(userDetailsService, "UserDetailsService cannot be null.");

  this.userDetailsService = userDetailsService;    }

  @Override

  public SocialUserDetails loadUserByUserId(String userId) throws UsernameNotFoundException,
  DataAccessException {

  UserDetails user = userDetailsService.loadUserByUsername(userId);

  return new SocialUser(user.getUsername(), user.getPassword(), user.getAuthorities());

  }

  }

  ```


  接下来，将已配置的服务提供商的链接添加到登录页面。


  ```


  ...


  Sign in with Twitter


  Sign in with Facebook


  ```


  `SimpleSocialUserDetailsService` 将实际的查找工作委托给通过构造函数传入的 `UserDetailsService`。当检索到用户时，它会使用检索到的信息来构造一个
  `SocialUser` 实例。最后，需要将此 bean 添加到配置中。


  ```

  @Configuration

  @EnableWebMvcSecurity

  public class SecurityConfig extends WebSecurityConfigurerAdapter {

  @Bean

  public SocialUserDetailsService socialUserDetailsService(UserDetailsService userDetailsService)
  {

  return new SimpleSocialUserDetailsService(userDetailsService);

  }

  ...

  }

  ```


  这将允许用户使用其社交网络账户登录；但是，应用程序需要知道该账户属于哪个用户。如果无法根据特定的社交网络找到用户，则需要创建一个用户。基本上，应用程序需要一种让用户注册的方式。默认情况下，`SocialAuthenticationFilter`
  会将用户重定向到 `/signup` URL。您可以创建一个绑定到此 URL 的控制器，并渲染一个表单，允许用户创建账户。


  ```

  package com.apress.springrecipes.social.web;

  import org.springframework.security.authentication.UsernamePasswordAuthenticationToken;

  import org.springframework.security.core.GrantedAuthority;

  import org.springframework.security.core.authority.SimpleGrantedAuthority;

  import org.springframework.security.core.context.SecurityContextHolder;

  import org.springframework.security.provisioning.UserDetailsManager;

  import org.springframework.social.connect.Connection;

  import org.springframework.social.connect.web.ProviderSignInUtils;

  import org.springframework.social.security.SocialUser;

  import org.springframework.stereotype.Controller;

  import org.springframework.validation.BindingResult;

  import org.springframework.validation.annotation.Validated;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.context.request.WebRequest;

  import java.util.Collections;

  import java.util.List;

  @Controller

  @RequestMapping("/signup")

  public class SignupController {

  private static final List DEFAULT_ROLES = Collections.singletonList(new SimpleGrantedAuthority("USER"));

  private final ProviderSignInUtils providerSignInUtils;

  private final UserDetailsManager userDetailsManager;

  public SignupController(ProviderSignInUtils providerSignInUtils, UserDetailsManager
  userDetailsManager) {

  this.providerSignInUtils = providerSignInUtils;

  this.userDetailsManager = userDetailsManager;

  }

  @GetMapping

  public SignupForm signupForm(WebRequest request) {

  Connection connection = providerSignInUtils.getConnectionFromSession(request);

  if (connection != null) {

  return SignupForm.fromProviderUser(connection.fetchUserProfile());

  } else {

  return new SignupForm();

  }

  }

  @PostMapping

  public String signup(@Validated SignupForm form, BindingResult formBinding, WebRequest
  request) {

  if (!formBinding.hasErrors()) {

  SocialUser user = createUser(form);

  SecurityContextHolder.getContext().setAuthentication(new UsernamePasswordAuthenticationToken(user.getUsername(),
  null, user.getAuthorities()));

  providerSignInUtils.doPostSignUp(user.getUsername(), request);

  return "redirect:/";

  }

  return null;

  }

  private SocialUser createUser(SignupForm form) {

  SocialUser user = new SocialUser(form.getUsername(), form.getPassword(), DEFAULT_ROLES);

  userDetailsManager.createUser(user);

  return user;

  }

  }

  ```


  首先，会调用 `signupForm` 方法，因为初始请求是对 `/signup` URL 的 GET 请求。`signupForm` 方法检查是否已尝试进行连接。这委托给了
  Spring Social 提供的 `ProviderSignInUtils`。如果是这种情况，则使用检索到的 `UserProfile` 来预填充 `SignupForm`。


  ```

  package com.apress.springrecipes.social.web;

  import org.springframework.social.connect.UserProfile;

  public class SignupForm {

  private String username;

  private String password;

  public String getUsername() {

  return username;

  }

  public void setUsername(String username) {

  this.username = username;

  }

  public String getPassword() {

  return password;

  }

  public void setPassword(String password) {

  this.password = password;

  }

  public static SignupForm fromProviderUser(UserProfile providerUser) {

  SignupForm form = new SignupForm();

  form.setUsername(providerUser.getUsername());

  return form;

  }

  }

  ```


  以下是用于填写这两个字段的 HTML 表单：


  ```


  Sign Up


  Sign Up


  Sign Up


  ```


  注意


  这里没有用于 CSRF 标签的隐藏输入。Spring Security 与 Spring MVC 紧密集成，当使用 Spring Framework 表单标签时，此字段会自动添加。


  用户填写表单后，将调用 signup 方法。这将使用给定的用户名和密码创建一个用户。创建用户后，会为输入的用户名添加一个 `Connection`。建立连接后，用户即可登录应用程序，并且在后续访问中可以使用社交网络连接来登录应用程序。


  该控制器使用 `ProviderSignInUtils` 来重用 Spring Social 的逻辑。您可以在 `SocialConfig` 类中创建一个实例。


  ```

  @Bean

  public ProviderSignInUtils providerSignInUtils(ConnectionFactoryLocator connectionFactoryLocator,
  UsersConnectionRepository usersConnectionRepository) {

  return new ProviderSignInUtils(connectionFactoryLocator, usersConnectionRepository);

  }

  ```


  配置的最后一部分是允许所有用户访问 `/signup` URL。将以下内容添加到 `SecurityConfig` 类中：


  ```

  @Override

  protected void configure(HttpSecurity http) throws Exception {

  http

  .authorizeRequests()

  .antMatchers("/signup").permitAll()

  .anyRequest().authenticated().and()

  ...

  }

  ```




  ## 摘要


  在本章中，你探索了 Spring Social。第一步是在服务提供商处注册一个应用程序，并使用生成的 API 密钥和密钥将该应用程序连接到该服务提供商。接着，你研究了如何将用户的账户连接到应用程序，以便用于访问用户信息；不过，这也将允许你使用服务提供商的
  API。对于 Twitter，你可以查询时间线或查看某人的好友。


  为了使与服务提供商的连接更有用，它们被存储在基于 JDBC 的存储中。


  最后，你了解了 Spring Social 如何与 Spring Security 集成，以及如何利用它让服务提供商登录你的应用程序。


  '
- "# 7. Spring Security\n\n在本章中，你将学习如何使用 Spring Security 框架（Spring 框架的一个子项目）来保护应用程序。Spring\
  \ Security 最初被称为 Acegi Security，但在加入 Spring 项目组合后更名。Spring Security 可用于保护任何 Java\
  \ 应用程序，但主要用于基于 Web 的应用程序。Web 应用程序，尤其是那些可以通过互联网访问的应用程序，如果保护不当，很容易受到黑客攻击。\n\n如果你从未在应用程序中处理过安全问题，那么首先必须理解几个术语和概念。**身份验证**是验证主体身份与其声称的身份是否一致的过程。主体可以是用户、设备或系统，但最常见的是用户。主体必须提供身份证据才能通过验证。这种证据称为**凭证**，当目标主体是用户时，凭证通常是一个密码。\n\
  \n**授权**是向经过身份验证的用户授予权限的过程，以便该用户可以访问目标应用程序的特定资源。授权过程必须在身份验证过程之后执行。通常，权限是以角色的形式授予的。\n\
  \n**访问控制**意味着控制对应用程序资源的访问。它需要决定是否允许用户访问某个资源。这个决定称为访问控制决策，通过将资源的访问属性与用户被授予的权限或其他特征进行比较来做出。\n\
  \n完成本章后，你将理解基本的安全概念，并知道如何在 URL 访问级别、方法调用级别、视图渲染级别和领域对象级别保护你的 Web 应用程序。\n\n注意\n\n\
  在开始本章之前，请先查看 `recipe_7_1_i` 的应用程序。这是你将在本章中使用的初始未受保护的应用程序。它是一个基本的待办事项应用，你可以在其中列出、创建和标记待办事项为已完成。部署应用程序后，你将看到如图\
  \ 7-1 所示的内容。\n\n![A314861_4_En_7_Fig1_HTML.jpg](img/A314861_4_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1.\n\n初始待办事项应用程序\n\n## 7-1. 保护 URL 访问\n\n### 问题\n\n许多 Web 应用程序都有一些至关重要且私密的特定\
  \ URL。你必须通过防止未经授权的访问来保护这些 URL。\n\n### 解决方案\n\nSpring Security 使你能够通过简单的配置以声明方式保护\
  \ Web 应用程序的 URL 访问。它通过将 Servlet 过滤器应用于 HTTP 请求来处理安全问题。为了注册过滤器并检测配置，Spring Security\
  \ 提供了一个方便的基类供你扩展：`AbstractSecurityWebApplicationInitializer`。\n\nSpring Security\
  \ 允许你通过 `WebSecurityConfigurerAdapter` 配置适配器上的各种 `configure` 方法来配置 Web 应用程序安全。如果你的\
  \ Web 应用程序的安全需求简单且典型，你可以保持配置不变，并使用默认启用的安全设置，包括以下内容：\n\n*   **基于表单的登录服务**：提供一个包含登录表单的默认页面，供用户登录此应用程序。\n\
  *   **HTTP 基本认证**：可以处理 HTTP 请求头中提供的 HTTP 基本认证凭据。它也可用于验证使用远程协议和 Web 服务发出的请求。\n* \
  \  **注销服务**：提供一个映射了 URL 的处理程序，供用户退出此应用程序。\n*   **匿名登录**：为匿名用户分配一个主体并授予权限，以便你可以像处理普通用户一样处理匿名用户。\n\
  *   **Servlet API 集成**：允许你通过标准 Servlet API（例如 `HttpServletRequest.isUserInRole()`\
  \ 和 `HttpServletRequest.getUserPrincipal()`）在 Web 应用程序中访问安全信息。\n*   **CSRF**：通过创建令牌并将其放入\
  \ `HttpSession` 来实现跨站请求伪造保护。\n*   **安全头**：例如为受保护的包禁用缓存，提供 XSS 保护、传输安全和 X-Frame 安全。\n\
  \n注册了这些安全服务后，你可以指定需要特定权限才能访问的 URL 模式。Spring Security 将根据你的配置执行安全检查。用户必须先登录应用程序才能访问安全\
  \ URL，除非这些 URL 对匿名访问开放。Spring Security 提供了一组身份验证提供程序供你选择。身份验证提供程序对用户进行身份验证，并返回授予该用户的权限。\n\
  \n### 工作原理\n\n首先，你需要注册 Spring Security 使用的过滤器。最简单的方法是扩展前面提到的 `AbstractSecurityWebApplicationInitializer`。\n\
  \n```\npackage com.apress.springrecipes.board.security;\nimport org.springframework.security.web.context.AbstractSecurityWebApplicationInitializer;\n\
  public class TodoSecurityInitializer extends AbstractSecurityWebApplicationInitializer\
  \ {\npublic TodoSecurityInitializer() {\nsuper(TodoSecurityConfig.class);\n}\n}\n\
  ```\n\n`AbstractSecurityWebApplicationInitializer` 类有一个构造函数，它接受一个或多个配置类。这些配置类用于引导安全配置。\n\
  \n注意\n\n如果你有一个扩展 `AbstractAnnotationConfigDispatcherServletInitializer` 的类，请将安全配置添加到该类中，否则在启动期间将出现异常。\n\
  \n虽然你可以在与 Web 层和服务层相同的配置类中配置 Spring Security，但最好将安全配置隔离在一个单独的类中（例如 `TodoSecurityConfig`）。在\
  \ `WebApplicationInitializer`（例如 `TodoWebInitializer`）内部，你需要将该配置类添加到配置类的列表中。\n\n\
  首先，你需要安全配置。为此，你将创建 `TodoSecurityConfig` 类，如下所示：\n\n```\npackage com.apress.springrecipes.board.security;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
  @Configuration\n@EnableWebSecurity\npublic class TodoSecurityConfig extends WebSecurityConfigurerAdapter\
  \ {}\n```\n\n构建并部署应用程序，并尝试访问 `http://localhost:8080/todos/todos` 时，你现在将看到默认的 Spring\
  \ Security 登录页面（见图 7-2）。\n\n![A314861_4_En_7_Fig2_HTML.jpg](img/A314861_4_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2.\n\n默认的 Spring Security 登录页面\n\n\n\n#### 安全 URL 访问\n\n如果你查看 `org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter`\
  \ 类的 `configure` 方法，你会发现它包含了 `anyRequest().authenticated()` 调用。这告诉 Spring Security，对于每一个传入的请求，你都必须通过系统进行身份验证。你还会看到，默认情况下启用了\
  \ HTTP 基本认证和基于表单的登录。基于表单的登录还包含一个默认的登录页面生成器，如果你没有显式指定登录页面，就会使用它。\n\n```\nprotected\
  \ void configure(HttpSecurity http) throws Exception {\nhttp\n.authorizeRequests()\n\
  .anyRequest().authenticated()\n.and()\n.formLogin().and()\n.httpBasic();\n}\n```\n\
  \n让我们编写一些安全规则。除了仅要求登录之外，你还可以为 URL 编写一些强大的访问规则。\n\n```\npackage com.apress.springrecipes.board.security;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.http.HttpMethod;\n\
  import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;\n\
  import org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
  @Configuration\n@EnableWebSecurity\npublic class TodoSecurityConfig extends WebSecurityConfigurerAdapter\
  \ {\n@Override\nprotected void configure(AuthenticationManagerBuilder auth) throws\
  \ Exception {\nauth.inMemoryAuthentication()\n.withUser(\"marten@ya2do.io\").password(\"\
  user\").authorities(\"USER\")\n.and()\n.withUser(\"admin@ya2do.io\").password(\"\
  admin\").authorities(\"USER\", \"ADMIN\");\n}\n@Override\nprotected void configure(HttpSecurity\
  \ http) throws Exception {\nhttp.authorizeRequests()\n.antMatchers(\"/todos*\").hasAuthority(\"\
  USER\")\n.antMatchers(HttpMethod.DELETE, \"/todos*\").hasAuthority(\"ADMIN\")\n\
  .and()\n.formLogin()\n.and()\n.csrf().disable();\n}\n}\n```\n\n你可以通过重写 `configure(HttpSecurity\
  \ http)` 方法（还有其他 `configure` 方法）来配置授权规则等。\n\n使用 `authorizeRequests()`，你开始保护你的 URL。然后你可以使用其中一个匹配器；在上面的代码中，你使用\
  \ `antMatchers` 来定义匹配规则以及用户需要拥有的权限。请记住，你必须在 URL 模式的末尾始终包含一个通配符。如果不这样做，URL 模式将无法匹配带有请求参数的\
  \ URL。结果，黑客可以通过附加任意请求参数轻松绕过安全检查。你已经将对 `/todos` 的所有访问权限授予了拥有 `USER` 权限的用户。要能够通过 `DELETE`\
  \ 请求调用 `/todos`，你需要是拥有 `ADMIN` 角色的用户。\n\n注意\n\n由于你现在正在覆盖默认的访问规则和登录配置，你需要再次启用 `formLogin`。还有一个调用暂时禁用了\
  \ CSRF 保护，因为 CSRF 保护会导致表单无法正常工作；本教程稍后将解释如何启用它。\n\n你可以在重写的 `configure(AuthenticationManagerBuilder\
  \ auth)` 方法中配置认证服务。Spring Security 支持多种用户认证方式，包括针对数据库或 LDAP 仓库进行认证。它还支持为简单的安全需求直接定义用户详细信息。你可以为每个用户指定用户名、密码和一组权限。\n\
  \n现在，你可以重新部署此应用程序来测试其安全配置。你必须使用正确的用户名和密码登录此应用程序才能查看待办事项。最后，要删除一个待办事项，你必须以管理员身份登录。\n\
  \n#### 使用 CSRF 保护\n\n通常建议保持 CSRF 默认启用，因为这样可以降低遭受 CSRF 攻击的风险。它在 Spring Security 中默认是启用的，并且可以从配置中移除\
  \ `csfr().disable()` 这一行。当启用 CSRF 保护时，Spring Security 会将 `CsfrFilter` 添加到其用于保护的安全过滤器列表中。此过滤器反过来使用\
  \ `CsrfTokenRepository` 的实现来生成和存储令牌；默认情况下是 `HttpSessionCsrfTokenRepository` 类，顾名思义，它将生成的令牌存储在\
  \ `HttpSession` 接口中。还有一个 `CookieCsrfTokenRepository` 类，它将令牌信息存储在 cookie 中。如果你想切换\
  \ `CsfrTokenRepository` 类，可以使用 `csrfTokenRepository()` 配置方法来更改它。你也可以使用它来配置一个显式配置的\
  \ `HttpSessionCsrfTokenRepository`。\n\n```\n@Override\nprotected void configure(HttpSecurity\
  \ http) throws Exception {\nHttpSessionCsrfTokenRepository repo = new HttpSessionCsrfTokenRepository();\n\
  repo.setSessionAttributeName(\"csfr_token\");\nrepo.setParameterName(\"csfr_token\"\
  )\nhttp.csrf().csrfTokenRepository(repo);\n}\n```\n\n当启用 CSRF 时，登录后尝试完成或删除待办事项将会失败，因为缺少\
  \ CSRF 令牌。要解决此问题，你需要在修改内容的请求中将 CSRF 令牌传回服务器。你可以通过表单中的 `hidden` 输入轻松实现这一点。`HttpSessionCsrfTokenRepository`\
  \ 在会话中以属性 `_csfr`（默认情况下，除非你显式配置）暴露令牌。对于表单，你可以使用 `parameterName` 和 `token` 属性来创建适当的输入标签。\n\
  \n将以下内容添加到完成和删除待办事项的两个表单中：\n\n```\n\n现在提交表单时，令牌将成为请求的一部分，你将能够再次完成或删除待办事项。\n\n在 `todo-create.jsp`\
  \ 页面中也有一个表单；但是，由于它使用的是 Spring MVC 表单标签，你无需修改它。当使用 Spring MVC 表单标签时，CSRF 令牌会自动添加到表单中。为了实现这一点，Spring\
  \ Security 注册了一个 `CsrfRequestDataValueProcessor` 类，它负责将令牌添加到表单中。\n\n7-2\\. 登录 Web\
  \ 应用程序\n\n问题\n\n一个安全的应用程序要求用户在访问某些安全功能之前先登录。这对于在开放互联网上运行的 Web 应用程序尤其重要，因为黑客很容易访问它们。大多数\
  \ Web 应用程序必须提供一种方式让用户输入其凭据来登录。\n\n解决方案\n\nSpring Security 支持多种方式让用户登录 Web 应用程序。它通过提供一个包含登录表单的默认网页来支持基于表单的登录。你也可以提供一个自定义网页作为登录页面。此外，Spring\
  \ Security 通过处理 HTTP 请求头中提供的 Basic 认证凭据来支持 HTTP 基本认证。HTTP 基本认证也可用于对远程协议和 Web 服务发出的请求进行认证。\n\
  \n你应用程序的某些部分可能允许匿名访问（例如，访问欢迎页面）。Spring Security 提供了一个匿名登录服务，它可以为匿名用户分配一个主体并授予权限，这样你在定义安全策略时就可以像处理普通用户一样处理匿名用户。\n\
  \nSpring Security 还支持“记住我”登录，它能够在多个浏览器会话之间记住用户的身份，这样用户在首次登录后就不需要再次登录。\n\n工作原理\n\n\
  为了帮助你更好地理解各种登录机制，让我们先禁用默认的安全配置。\n\n警告\n\n\n\n通常建议保留默认设置，仅禁用不需要的功能，例如 `httpBasic().disable()`，而不是禁用所有安全默认值！\n\
  \n```\n@Configuration\n@EnableWebSecurity\npublic class TodoSecurityConfig extends\
  \ WebSecurityConfigurerAdapter {\npublic TodoSecurityConfig() {\nsuper(true);\n\
  }\n}\n```\n\n请注意，如果启用了 HTTP 自动配置，接下来介绍的登录服务将自动注册。但是，如果禁用了默认配置或想要自定义这些服务，则必须显式配置相应的功能。\n\
  \n在启用身份验证功能之前，需要先启用基本的 Spring Security 要求，至少需要配置异常处理和安全上下文集成。\n\n```\nprotected\
  \ void configure(HttpSecurity http) {\nhttp.securityContext()\n.and()\n.exceptionHandling();\n\
  }\n```\n\n没有这些基础，Spring Security 将无法在登录后存储用户信息，也无法对安全相关的异常进行正确的异常转换（这些异常会直接向上冒泡，可能会将一些内部信息暴露给外部）。你可能还需要启用\
  \ Servlet API 集成，以便在视图中使用 `HttpServletRequest` 上的方法进行检查。\n\n```\nprotected void\
  \ configure(HttpSecurity http) {\nhttp.servletApi();\n}\n```\n\n使用 HTTP 基本认证\n\n\
  HTTP 基本认证支持可以通过 `httpBasic()` 方法进行配置。当需要 HTTP 基本认证时，浏览器通常会显示一个登录对话框或特定的登录页面供用户登录。\n\
  \n```\n@Configuration\n@EnableWebSecurity\npublic class TodoSecurityConfig extends\
  \ WebSecurityConfigurerAdapter {\n@Override\nprotected void configure(HttpSecurity\
  \ http) throws Exception {\nhttp\n...\n.httpBasic();\n}\n}\n```\n\n注意\n\n当同时启用 HTTP\
  \ 基本认证和基于表单的登录时，将使用后者。因此，如果你希望 Web 应用程序用户使用此认证类型登录，则不应启用基于表单的登录。\n\n使用基于表单的登录\n\n\
  基于表单的登录服务将呈现一个包含登录表单的网页，供用户输入登录信息并处理登录表单的提交。它通过 `formLogin` 方法进行配置。\n\n```\n@Configuration\n\
  @EnableWebSecurity\npublic class TodoSecurityConfig extends WebSecurityConfigurerAdapter\
  \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
  http\n...\n.formLogin();\n}\n}\n```\n\n默认情况下，Spring Security 会自动创建一个登录页面，并将其映射到\
  \ URL `/login`。因此，你可以在应用程序中添加一个指向此 URL 的链接（例如，在 `todos.jsp` 中）用于登录。\n\n```\n\">Login\n\
  ```\n\n如果你不喜欢默认的登录页面，可以提供自定义的登录页面。例如，你可以在 Web 应用程序的根目录下创建以下 `login.jsp` 文件。请注意，不应将此文件放在\
  \ `WEB-INF` 目录内，否则用户将无法直接访问它。\n\n```\n\nLogin\n\nbody {\nbackground-color: #DADADA;\n\
  }\nbody > .grid {\nheight: 100%;\n}\n.column {\nmax-width: 450px;\n}\n\nLog-in to\
  \ your account\n\" class=\"ui large form\">\n\nLogin\n\n```\n\n为了让 Spring Security\
  \ 在请求登录时显示自定义登录页面，你需要在 `loginPage` 配置方法中指定其 URL。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n...\n.formLogin().loginPage(\"\
  /login.jsp\");\n}\n}\n```\n\n如果用户请求安全 URL 时由 Spring Security 显示登录页面，则登录成功后用户将被重定向到目标\
  \ URL。但是，如果用户直接通过其 URL 请求登录页面，默认情况下，登录成功后用户将被重定向到上下文路径的根目录（即 `http://localhost:8080/todos/`）。如果你在\
  \ Web 部署描述符中没有定义欢迎页面，你可能希望在登录成功时将用户重定向到默认的目标 URL。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n...\n.formLogin().loginPage(\"\
  /login.jsp\").defaultSuccessUrl(\"/todos\");\n}\n}\n```\n\n如果你使用 Spring Security\
  \ 创建的默认登录页面，那么当登录失败时，Spring Security 将重新渲染登录页面并显示错误消息。但是，如果你指定了自定义登录页面，则必须配置 `authentication-failure-url`\
  \ 值，以指定登录错误时要重定向到的 URL。例如，你可以使用错误请求参数再次重定向到自定义登录页面，如下所示：\n\n```\n@Configuration\n\
  @EnableWebSecurity\npublic class TodoSecurityConfig extends WebSecurityConfigurerAdapter\
  \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
  http\n...\n.formLogin()\n.loginPage(\"/login.jsp\")\n.defaultSuccessUrl(\"/messageList\"\
  )\n.failureUrl(\"login.jsp?error=true\");\n}\n}\n```\n\n然后，你的登录页面应测试是否存在错误请求参数。如果发生错误，你需要通过访问会话范围属性\
  \ `SPRING_SECURITY_LAST_EXCEPTION` 来显示错误消息，该属性存储了当前用户的最后一个异常。\n\n```\n...\n\nAuthentication\
  \ Failed\nReason : ${sessionScope[\"SPRING_SECURITY_LAST_EXCEPTION\"].message}\n\
  \n```\n\n使用注销服务\n\n注销服务提供了一个处理注销请求的处理程序。它可以通过 `logout()` 配置方法进行配置。\n\n```\n@Configuration\n\
  @EnableWebSecurity\npublic class TodoSecurityConfig extends WebSecurityConfigurerAdapter\
  \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
  http\n...\n.and()\n.logout();\n}\n}\n```\n\n默认情况下，它映射到 URL `/logout`，并且仅响应 POST\
  \ 请求。你可以在页面中添加一个小的 HTML 表单来执行注销操作。\n\n```\n\" method=\"post\">Logout\n```\n\n注意\n\
  \n使用 CSRF 保护时，不要忘记将 CSRF 令牌添加到表单中（参见配方 7-1），否则注销将失败。\n\n默认情况下，注销成功后用户将被重定向到上下文路径的根目录，但有时你可能希望将用户引导到另一个\
  \ URL，这可以通过使用 `logoutSuccessUrl` 配置方法来实现。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n...\n.and()\n\
  .logout().logoutSuccessUrl(\"/logout-success.jsp\");\n}\n}\n```\n\n注销后，你可能会注意到，即使注销成功，使用浏览器的后退按钮仍然可以看到之前的页面。这是因为浏览器缓存了页面。通过使用\
  \ `headers()` 配置方法启用安全标头，可以指示浏览器不要缓存页面。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n...\n.and()\n\
  .headers();\n}\n}\n```\n\n除了无缓存标头之外，这还会禁用内容嗅探并启用 X-Frame 保护（更多信息请参见配方 7-1）。启用此功能后，使用浏览器的后退按钮时，你将被重定向到登录页面。\n\
  \n实现匿名登录\n\n\n\n匿名登录服务可通过 Java 配置中的 `anonymous()` 方法进行配置，你可以自定义匿名用户的用户名和权限，其默认值分别为\
  \ `anonymousUser` 和 `ROLE_ANONYMOUS`。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n...\n.and()\n\
  .anonymous().principal(\"guest\").authorities(\"ROLE_GUEST\");\n}\n}\n```\n\n实现“记住我”功能\n\
  \n“记住我”功能可通过 Java 配置中的 `rememberMe()` 方法进行配置。默认情况下，它会将用户名、密码、记住我过期时间以及一个私钥编码为令牌，并将该令牌作为\
  \ cookie 存储在用户的浏览器中。下次用户访问同一 Web 应用时，系统会检测到该令牌，从而实现自动登录。\n\n```\n@Configuration\n\
  @EnableWebSecurity\npublic class TodoSecurityConfig extends WebSecurityConfigurerAdapter\
  \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
  http\n...\n.and()\n.rememberMe();\n}\n}\n```\n\n然而，静态的“记住我”令牌可能会引发安全问题，因为它们可能被黑客截获。为了满足更高级的安全需求，Spring\
  \ Security 支持滚动令牌，但这需要数据库来持久化存储令牌。关于滚动“记住我”令牌部署的详细信息，请参考 Spring Security 参考文档。\n\
  \n7-3. 用户认证\n\n问题\n\n当用户尝试登录你的应用以访问其安全资源时，你必须对用户的主体进行认证，并向该用户授予权限。\n\n解决方案\n\n在\
  \ Spring Security 中，认证由一个或多个 `AuthenticationProvider` 以链式结构共同完成。如果其中任何一个提供者成功认证了用户，该用户就能登录应用。如果某个提供者报告用户被禁用、锁定、凭证错误，或者没有任何提供者能够认证该用户，那么该用户将无法登录此应用。\n\
  \nSpring Security 支持多种用户认证方式，并为这些方式提供了内置的提供者实现。你可以通过内置的 XML 元素轻松配置这些提供者。最常见的认证提供者会针对存储用户详细信息的用户仓库（例如，在应用内存、关系型数据库或\
  \ LDAP 仓库中）来认证用户。\n\n在仓库中存储用户详细信息时，应避免以明文形式存储用户密码，因为这会使密码易受黑客攻击。相反，应始终在仓库中存储加密后的密码。一种典型的密码加密方式是使用单向哈希函数对密码进行编码。当用户输入密码登录时，你对输入的密码应用相同的哈希函数，并将结果与仓库中存储的值进行比较。Spring\
  \ Security 支持多种密码编码算法（包括 MD5 和 SHA），并为这些算法提供了内置的密码编码器。\n\n如果每次用户尝试登录时都从用户仓库中检索用户详细信息，你的应用可能会面临性能影响。这是因为用户仓库通常存储在远程，并且需要执行某种查询来响应请求。因此，Spring\
  \ Security 支持在本地内存和存储中缓存用户详细信息，以节省执行远程查询的开销。\n\n工作原理\n\n在这里，你将探索不同的认证机制。首先，你将了解内存实现，接着是基于数据库的实现，最后你将了解\
  \ LDAP。最后一节将介绍如何为不同的认证机制启用缓存。\n\n使用内存定义进行用户认证\n\n如果你的应用中只有少量用户，并且很少修改他们的详细信息，你可以考虑在\
  \ Spring Security 的配置文件中定义用户详细信息，这样它们将被加载到应用的内存中。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n...\n@Override\n\
  protected void configure(AuthenticationManagerBuilder auth) throws Exception {\n\
  auth.inMemoryAuthentication()\n.withUser(\"admin@ya2do.io\").password(\"secret\"\
  ).authorities(\"ADMIN\",\"USER\").and()\n.withUser(\"marten@@ya2do.io\").password(\"\
  user\").authorities(\"USER\").and()\n.withUser(\"jdoe@does.net\").password(\"unknown\"\
  ).disabled(true).authorities(\"USER\");\n}\n}\n```\n\n你可以使用 `inMemoryAuthentication()`\
  \ 方法定义用户详细信息。通过 `withUser` 方法，你可以定义用户。对于每个用户，你可以指定用户名、密码、禁用状态以及一组已授予的权限。被禁用的用户无法登录应用。\n\
  \n针对数据库进行用户认证\n\n更常见的情况是，用户详细信息应存储在数据库中以便于维护。Spring Security 内置了从数据库查询用户详细信息的支持。默认情况下，它使用以下\
  \ SQL 语句查询用户详细信息（包括权限）：\n\n```\nSELECT username, password, enabled\nFROM   users\n\
  WHERE  username = ?\nSELECT username, authority\nFROM   authorities\nWHERE  username\
  \ = ?\n```\n\n为了让 Spring Security 使用这些 SQL 语句查询用户详细信息，你必须在数据库中创建相应的表。例如，你可以使用以下\
  \ SQL 语句在 `todo` 模式中创建它们：\n\n```\nCREATE TABLE USERS (\nUSERNAME    VARCHAR(50)\
  \    NOT NULL,\nPASSWORD    VARCHAR(50)    NOT NULL,\nENABLED     SMALLINT     \
  \  NOT NULL,\nPRIMARY KEY (USERNAME)\n);\nCREATE TABLE AUTHORITIES (\nUSERNAME \
  \   VARCHAR(50)    NOT NULL,\nAUTHORITY   VARCHAR(50)    NOT NULL,\nFOREIGN KEY\
  \ (USERNAME) REFERENCES USERS\n);\n```\n\n接下来，你可以向这些表中输入一些用户详细信息用于测试。表 7-1 和 7-2\
  \ 展示了这两个表的数据。\n\n表 7-2.\n\nAUTHORITIES 表的测试用户数据\n\n| USERNAME | AUTHORITY |\n| ---\
  \ | --- |\n| `admin@ya2do.io` | `ADMIN` |\n| `admin@ya2do.io` | `USER` |\n| `marten@ya2do.io`\
  \ | `USER` |\n| `jdoe@does.net` | `USER` |\n\n表 7-1.\n\nUSERS 表的测试用户数据\n\n| USERNAME\
  \ | PASSWORD | ENABLED |\n| --- | --- | --- |\n| `admin@ya2do.io` | `secret` | `1`\
  \ |\n| `marten@ya2do.io` | `user` | `1` |\n| `jdoe@does.net` | `unknown` | `0` |\n\
  \n为了让 Spring Security 访问这些表，你必须声明一个数据源，以便能够创建到该数据库的连接。\n\n对于 Java 配置，请使用 `jdbcAuthentication()`\
  \ 配置方法，并向其传递一个 `DataSource`。\n\n```\n@Configuration\n@EnableWebSecurity\npublic\
  \ class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Bean\npublic\
  \ DataSource dataSource() {\nreturn new EmbeddedDatabaseBuilder()\n.setType(EmbeddedDatabaseType.H2)\n\
  .setName(\"board\")\n.addScript(\"classpath:/schema.sql\")\n.addScript(\"classpath:/data.sql\"\
  )\n.build();\n}\n@Override\nprotected void configure(AuthenticationManagerBuilder\
  \ auth) throws Exception {\nauth.jdbcAuthentication().dataSource(dataSource());\n\
  }\n}\n```\n\n注意\n\n用于 `DataSource` 的 `@Bean` 方法已从 `TodoWebConfig` 移至 `TodoSecurityConfig`。\n\
  \n然而，在某些情况下，你可能已经在遗留数据库中定义了自己的用户仓库。例如，假设表是通过以下 SQL 语句创建的，并且 `MEMBER` 表中的所有用户都处于启用状态：\n\
  \n\n\n```\nCREATE TABLE MEMBER (\nID          BIGINT         NOT NULL,\nUSERNAME\
  \    VARCHAR(50)    NOT NULL,\nPASSWORD    VARCHAR(32)    NOT NULL,\nPRIMARY KEY\
  \ (ID)\n);\nCREATE TABLE MEMBER_ROLE (\nMEMBER_ID    BIGINT         NOT NULL,\n\
  ROLE         VARCHAR(10)    NOT NULL,\nFOREIGN KEY  (MEMBER_ID)    REFERENCES MEMBER\n\
  );\n```\n\n假设你的遗留用户数据存储在这些表中，如表 7-3 和 7-4 所示。\n\n表 7-4.\n\nMEMBER_ROLE 表中的遗留用户数据\n\
  \nMEMBER_ID\n |\n  ROLE\n |\n\n| --- | --- | --- | --- | --- |\n\n`1`\n |\n  `ROLE_ADMIN`\n\
  \ |\n\n`1`\n |\n  `ROLE_USER`\n |\n\n`2`\n |\n  `ROLE_USER`\n |\n\n表 7-3.\n\nMEMBER\
  \ 表中的遗留用户数据\n\nID\n |\n  USERNAME\n |\n  PASSWORD\n |\n\n| --- | --- | --- | ---\
  \ | --- | --- | --- |\n\n`1`\n |\n  `admin@ya2do.io`\n |\n  `secret`\n |\n\n`2`\n\
  \ |\n  `marten@ya2do.io`\n |\n  `user`\n |\n\n幸运的是，Spring Security 支持使用自定义 SQL 语句来查询遗留数据库中的用户详细信息。你可以使用\
  \ `usersByUsernameQuery()` 和 `authoritiesByUsernameQuery()` 配置方法来指定查询用户信息和权限的语句。\n\
  \n```\n@Configuration\n@EnableWebSecurity\npublic class TodoSecurityConfig extends\
  \ WebSecurityConfigurerAdapter {\n...\n@Override\nprotected void configure(AuthenticationManagerBuilder\
  \ auth) throws Exception {\nauth.jdbcAuthentication()\n.dataSource(dataSource)\n\
  .usersByUsernameQuery(\n\"SELECT username, password, 'true' as enabled FROM member\
  \ WHERE username = ?\")\n.authoritiesByUsernameQuery(\n\"SELECT member.username,\
  \ member_role.role as authorities \" +\n\"FROM member, member_role \" +\n\"WHERE\
  \  member.username = ? AND member.id = member_role.member_id\");\n}\n}\n```\n\n\
  加密密码\n\n到目前为止，你一直以明文密码的形式存储用户详细信息。但这种方法容易受到黑客攻击，因此你应该在存储密码之前对其进行加密。Spring Security\
  \ 支持多种加密密码的算法。例如，你可以选择 BCrypt（一种单向哈希算法）来加密你的密码。\n\n注意\n\n你可能需要一个辅助工具来计算密码的 BCrypt\
  \ 哈希值。你可以通过在线方式完成，例如 [`https://www.dailycred.com/article/bcrypt-calculator`](https://www.dailycred.com/article/bcrypt-calculator)\
  \ ，或者你可以简单地创建一个包含 `main` 方法的类，并使用 Spring Security 的 `BCryptPasswordEncoder`。\n\n\
  现在，你可以将加密后的密码存储在你的用户存储库中。例如，如果你使用内存中的用户定义，你可以在密码属性中指定加密后的密码。然后，你可以使用 `AuthenticationManagerBuilder`\
  \ 上的 `passwordEncoder()` 方法来指定密码编码器。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n...\n@Bean\n\
  public BCryptPasswordEncoder passwordEncoder() {\nreturn new BCryptPasswordEncoder();\n\
  }\n@Override\nprotected void configure(AuthenticationManagerBuilder auth) throws\
  \ Exception {\nauth\n.jdbcAuthentication()\n.passwordEncoder(passwordEncoder())\n\
  .dataSource(dataSource());\n}\n}\n```\n\n当然，你必须将加密后的密码存储在数据库表中，而不是明文密码，如表 7-5 所示。为了在密码字段中存储\
  \ BCrypt 哈希值，该字段的长度必须至少为 60 个字符（这是 BCrypt 哈希值的长度）。\n\n表 7-5.\n\nUSERS 表使用加密密码的测试用户数据\n\
  \nUSERNAME\n |\n  PASSWORD\n |\n  ENABLED\n |\n\n| --- | --- | --- | --- | --- |\
  \ --- | --- |\n\n`admin@ya2do.io`\n |\n  `$2a$10$E3mPTZb50e7sSW15fDx8Ne7hDZpfDjrmMPTTUp8wVjLTu.G5oPYCO`\n\
  \ |\n  `1`\n |\n\n`marten@ya2do.`\n `io`     \n |\n  `$2a$10$5VWqjwoMYnFRTTmbWCRZT.iY3WW8ny27kQuUL9yPK1/WJcPcBLFWO`\n\
  \ |\n  `1`\n |\n\n`jdoe@does.net`\n |\n  `$2a$10$cFKh0.XCUOA9L.in5smIiO2QIOT8.6ufQSwIIC.AVz26WctxhSWC6`\n\
  \ |\n  `0`\n |\n\n针对 LDAP 存储库进行用户身份验证\n\nSpring Security 也支持访问 LDAP 存储库来进行用户身份验证。首先，你需要准备一些用户数据来填充\
  \ LDAP 存储库。让我们以 LDAP 数据交换格式（LDIF）准备用户数据，这是一种用于导入和导出 LDAP 目录数据的标准纯文本数据格式。例如，创建包含以下内容的\
  \ `users.ldif` 文件：\n\n```\ndn: dc=springrecipes,dc=com\nobjectClass: top\nobjectClass:\
  \ domain\ndc: springrecipes\ndn: ou=groups,dc=springrecipes,dc=com\nobjectclass:\
  \ top\nobjectclass: organizationalUnit\nou: groups\ndn: ou=people,dc=springrecipes,dc=com\n\
  objectclass: top\nobjectclass: organizationalUnit\nou: people\ndn: uid=admin,ou=people,dc=springrecipes,dc=com\n\
  objectclass: top\nobjectclass: uidObject\nobjectclass: person\nuid: admin\ncn: admin\n\
  sn: admin\nuserPassword: secret\ndn: uid=user1,ou=people,dc=springrecipes,dc=com\n\
  objectclass: top\nobjectclass: uidObject\nobjectclass: person\nuid: user1\ncn: user1\n\
  sn: user1\nuserPassword: 1111\ndn: cn=admin,ou=groups,dc=springrecipes,dc=com\n\
  objectclass: top\nobjectclass: groupOfNames\ncn: admin\nmember: uid=admin,ou=people,dc=springrecipes,dc=com\n\
  dn: cn=user,ou=groups,dc=springrecipes,dc=com\nobjectclass: top\nobjectclass: groupOfNames\n\
  cn: user\nmember: uid=admin,ou=people,dc=springrecipes,dc=com\nmember: uid=user1,ou=people,dc=springrecipes,dc=com\n\
  ```\n\n如果你不太理解这个 LDIF 文件，请不要担心。你可能不需要经常使用这种文件格式来定义 LDAP 数据，因为大多数 LDAP 服务器都支持基于 GUI\
  \ 的配置。这个 `users.ldif` 文件包含以下内容：\n\n*   默认的 LDAP 域：`dc=springrecipes,dc=com`\n* \
  \  用于存储组和用户的 `groups` 和 `people` 组织单元\n*   密码分别为 `secret` 和 `1111` 的 `admin` 和 `user1`\
  \ 用户\n*   `admin` 组（包含 `admin` 用户）和 `user` 组（包含 `admin` 和 `user1` 用户）\n\n出于测试目的，你可以在本地机器上安装一个\
  \ LDAP 服务器来托管这个用户存储库。为了便于安装和配置，我们建议安装 OpenDS（ [`www.opends.org/`](http://www.opends.org/)\
  \ ），这是一个基于 Java 的开源目录服务引擎，支持 LDAP。\n\n提示\n\n在 `bin` 目录中，有一个 `ldap.sh` 脚本，它将启动一个\
  \ Docker 化的 OpenDS 版本，并导入前面提到的 `users.ldif` 文件。请注意，此 LDAP 服务器的根用户和密码分别是 `cn=Directory\
  \ Manager` 和 `ldap`。稍后，你将需要使用此用户来连接到此服务器。\n\nLDAP 服务器启动后，你可以配置 Spring Security 来针对其存储库进行用户身份验证。\n\
  \n你必须使用 `ldapAuthentication()` 配置方法来配置 LDAP 存储库。你可以通过多个回调方法指定用于搜索用户和组的搜索过滤器和搜索基，这些回调方法的值必须与存储库的目录结构一致。使用上述属性值，Spring\
  \ Security 将从 `people` 组织单元中搜索具有特定用户 ID 的用户，并从 `groups` 组织单元中搜索用户的组。Spring Security\
  \ 会自动为每个组插入 `ROLE_` 前缀作为权限。\n\n```\n@Configuration\n@EnableWebSecurity\npublic class\
  \ TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n...\n@Override\nprotected\
  \ void configure(AuthenticationManagerBuilder auth) throws Exception {\nauth\n.ldapAuthentication()\n\
  .contextSource()\n.url(\"ldap://localhost:1389/dc=springrecipes,dc=com\")\n.managerDn(\"\
  cn=Directory Manager\").managerPassword(\"ldap\")\n.and()\n.userSearchFilter(\"\
  uid={0}\").userSearchBase(\"ou=people\")\n.groupSearchFilter(\"member={0}\").groupSearchBase(\"\
  ou=groups\")\n.passwordEncoder(new LdapShaPasswordEncoder())\n.passwordCompare().passwordAttribute(\"\
  userPassword\");\n}\n}\n```\n\n\n\n由于 OpenDS 默认使用加盐安全哈希算法（SSHA）对用户密码进行编码，因此你必须将\
  \ `LdapShaPasswordEncoder` 指定为密码编码器。请注意，该值与 `sha` 不同，因为它专用于 LDAP 密码编码。你还需要指定 `passwordAttribute`\
  \ 值，因为密码编码器需要知道 LDAP 中哪个字段是密码。\n\n最后，你必须引用一个 LDAP 服务器定义，该定义描述了如何创建与 LDAP 服务器的连接。你可以通过使用\
  \ `contextSource` 方法配置服务器，来指定用于连接到运行在 `localhost` 上的 LDAP 服务器的根用户用户名和密码。\n\n缓存用户详情\n\
  \n`<jdbc-user-service>` 和 `<ldap-user-service>` 都支持缓存用户详情，但首先你必须选择一个提供缓存服务的缓存实现。由于\
  \ Spring 和 Spring Security 内置了对 Ehcache（[`http://ehcache.sourceforge.net/`](http://ehcache.sourceforge.net/)）的支持，你可以选择它作为你的缓存实现，并为其创建一个配置文件（例如，类路径根目录下的\
  \ `ehcache.xml`），内容如下：\n\n此 Ehcache 配置文件定义了两种类型的缓存配置。一种用于默认配置，另一种用于缓存用户详情。如果使用了用户缓存配置，一个缓存实例将在内存中缓存最多\
  \ 100 个用户的详细信息。当超过此限制时，缓存的用户将被溢出到磁盘。如果缓存的用户空闲时间达到 10 分钟，或者创建后存活了 1 小时，该用户将过期。\n\n\
  Spring Security 提供了两种 `UserCache` 实现：`EhCacheBasedUserCache`（必须引用一个 Ehcache 实例）和\
  \ `SpringCacheBasedUserCache`（使用 Spring 的缓存抽象）。\n\n在基于 Java 的配置中，截至撰写本文时，只有 `jdbcAuthentication()`\
  \ 方法允许轻松配置用户缓存。对于基于 Spring 缓存的缓存解决方案（它仍然委托给 Ehcache），你需要配置一个 `CacheManager` 实例，并使其感知到\
  \ Ehcache。\n\n```\n@Configuration\npublic class MessageBoardConfiguration {\n...\n\
  @Bean\npublic EhCacheCacheManager cacheManager() {\nEhCacheCacheManager cacheManager\
  \ = new EhCacheCacheManager();\ncacheManager.setCacheManager(ehCacheManager().getObject());\n\
  return cacheManager;\n}\n@Bean\npublic EhCacheManagerFactoryBean ehCacheManager()\
  \ {\nreturn new EhCacheManagerFactoryBean();\n}\n}\n```\n\n最好将此配置添加到服务的配置中，因为缓存也可以用于其他目的（请参阅有关\
  \ Spring 缓存的配方）。现在你已经设置了 `CacheManager` 实例，你需要配置一个 `SpringCacheBasedUserCache` 类。\n\
  \n```\n@Configuration\n@EnableWebMvcSecurity\npublic class TodoSecurityConfig extends\
  \ WebSecurityConfigurerAdapter {\n@Autowired\nprivate CacheManager cacheManager;\n\
  @Bean\npublic SpringCacheBasedUserCache userCache() throws Exception {\nCache cache\
  \ = cacheManager.getCache(\"userCache\");\nreturn new SpringCacheBasedUserCache(cache);\n\
  }\n@Override\nprotected void configure(AuthenticationManagerBuilder auth) throws\
  \ Exception {\nauth.jdbcAuthentication()\n.userCache(userCache())\n...\n}\n}\n```\n\
  \n请注意将 `CacheManager` 自动装配到配置类中。你需要访问它，因为你需要检索一个 `Cache` 实例，并将其传递给 `SpringCacheBasedUseCache`\
  \ 的构造函数。你将使用名为 `userCache` 的缓存（你在 `ehcache.xml` 文件中配置的）。最后，将配置好的 `UserCache` 传递给\
  \ `jdbcAuthentications.userCache()` 方法。\n\n7-4. 做出访问控制决策\n\n问题\n\n在认证过程中，应用程序会授予成功认证的用户一组权限。当该用户尝试访问应用程序中的资源时，应用程序必须决定该资源是否可以通过授予的权限或其他特征进行访问。\n\
  \n解决方案\n\n决定是否允许用户访问应用程序中的资源被称为访问控制决策。它基于用户的认证状态以及资源的性质和访问属性做出。在 Spring Security\
  \ 中，访问控制决策由访问决策管理器做出，这些管理器必须实现 `AccessDecisionManager` 接口。你可以通过实现此接口自由创建自己的访问决策管理器，但\
  \ Spring Security 提供了三个基于投票方法的便捷访问决策管理器。它们如表 7-6 所示。\n\n表 7-6.\n\nSpring Security\
  \ 自带的访问决策管理器\n\n`访问决策管理器`\n |\n 指定何时授予访问权限。\n |\n\n`AffirmativeBased`\n |\n 至少一个投票者投票授予访问权限。\n\
  \ |\n\n`ConsensusBased`\n |\n 投票者达成共识授予访问权限。\n |\n\n`UnanimousBased`\n |\n 所有投票者投弃权票或授予访问权限（没有投票者投拒绝访问票）。\n\
  \ |\n\n所有这些访问决策管理器都需要配置一组投票者来对访问控制决策进行投票。每个投票者必须实现 `AccessDecisionVoter` 接口。投票者可以投票授予、弃权或拒绝访问资源。投票结果由\
  \ `AccessDecisionVoter` 接口中定义的 `ACCESS_GRANTED`、`ACCESS_DENIED` 和 `ACCESS_ABSTAIN`\
  \ 常量字段表示。\n\n默认情况下，如果没有显式指定访问决策管理器，Spring Security 将自动配置一个 `AffirmativeBased` 访问决策管理器，并配置以下两个投票者：\n\
  \n*   `RoleVoter` 根据用户的角色对访问控制决策进行投票。它只处理以 `ROLE_` 前缀开头的访问属性，但此前缀可以自定义。如果用户拥有访问资源所需的相同角色，则投票授予访问权限；如果用户缺少访问资源所需的任何角色，则投票拒绝访问。如果资源没有以\
  \ `ROLE_` 开头的访问属性，它将投弃权票。\n\n*   `AuthenticatedVoter` 根据用户的认证级别对访问控制决策进行投票。它只处理访问属性\
  \ `IS_AUTHENTICATED_FULLY`、`IS_AUTHENTICATED_REMEMBERED` 和 `IS_AUTHENTICATED_ANONYMOUSLY`。如果用户的认证级别高于所需的属性，则投票授予访问权限。从高到低，认证级别依次为完全认证、记住我认证和匿名认证。\n\
  \n工作原理\n\n默认情况下，如果未指定访问决策管理器，Spring Security 将自动配置一个。此默认访问决策管理器等同于使用以下配置定义的管理器：\n\
  \n```\n@Bean\npublic AffirmativeBased accessDecisionManager() {\nList decisionVoters\
  \ = Arrays.asList(new RoleVoter(), new AuthenticatedVoter());\nreturn new AffirmativeBased(decisionVoters);\n\
  }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\nhttp.authorizeRequests()\n\
  .accessDecisionManager(accessDecisionManager())\n...\n}\n```\n\n这个默认的访问决策管理器及其决策投票者应该能够满足大多数典型的授权需求。但是，如果它们不能满足你的需求，你可以创建自己的。在大多数情况下，你只需要创建一个自定义投票者。例如，你可以创建一个投票者，根据用户的\
  \ IP 地址对决策进行投票。\n\n\n\n```\npackage com.apress.springrecipes.board.security;\nimport\
  \ org.springframework.security.access.AccessDecisionVoter;\nimport org.springframework.security.access.ConfigAttribute;\n\
  import org.springframework.security.core.Authentication;\nimport org.springframework.security.web.authentication.WebAuthenticationDetails;\n\
  import java.util.Collection;\nimport java.util.Objects;\npublic class IpAddressVoter\
  \ implements AccessDecisionVoter {\nprivate static final String IP_PREFIX = \"IP_\"\
  ;\nprivate static final String IP_LOCAL_HOST = \"IP_LOCAL_HOST\";\npublic boolean\
  \ supports(ConfigAttribute attribute) {\nreturn (attribute.getAttribute() != null)\
  \ && attribute.getAttribute().startsWith(IP_PREFIX);\n}\n@Override\npublic boolean\
  \ supports(Class clazz) {\nreturn true;\n}\npublic int vote(Authentication authentication,\
  \ Object object, Collection configList) {\nif (!(authentication.getDetails() instanceof\
  \ WebAuthenticationDetails)) {\nreturn ACCESS_DENIED;\n}\nWebAuthenticationDetails\
  \ details = (WebAuthenticationDetails) authentication.getDetails();\nString address\
  \ = details.getRemoteAddress();\nint result = ACCESS_ABSTAIN;\nfor (ConfigAttribute\
  \ config : configList) {\nresult = ACCESS_DENIED;\nif (Objects.equals(IP_LOCAL_HOST,\
  \ config.getAttribute())) {\nif (address.equals(\"127.0.0.1\") || address.equals(\"\
  0:0:0:0:0:0:0:1\")) {\nreturn ACCESS_GRANTED;\n}\n}\n}\nreturn result;\n}\n}\n```\n\
  \n请注意，该投票器\n仅处理以 `IP_` 前缀开头的访问属性。目前，它只支持 `IP_LOCAL_HOST` 访问属性。如果用户是 Web 客户端，其 IP\
  \ 地址等于 `127.0.0.1` 或 `0:0:0:0:0:0:0:1`（后者是无网络 Linux 工作站返回的值），则该投票器将投票授予访问权限。否则，它将投票拒绝访问。如果资源没有以\
  \ `IP_` 开头的访问属性，它将弃权。\n\n接下来，您需要定义一个包含此投票器的自定义访问决策管理器。\n\n```\n@Bean\npublic AffirmativeBased\
  \ accessDecisionManager() {\nList decisionVoters = Arrays.asList(new RoleVoter(),\
  \ new AuthenticatedVoter(), new IpAddressVoter());\nreturn new AffirmativeBased(decisionVoters);\n\
  }\n```\n\n现在，假设您希望允许运行 Web 容器的机器用户（即服务器管理员）无需登录即可删除待办事项。您需要在配置中引用此访问决策管理器，并将访问属性\
  \ `IP_LOCAL_HOST` 添加到删除 URL 映射中。\n\n```\nhttp.authorizeRequests()\n.accessDecisionManager()\n\
  .antMatchers(HttpMethod.DELETE, \"/todos*\").access(\"ADMIN,IP_LOCAL_HOST\");\n\
  ```\n\n直接调用 URL 时，待办事项将被删除。要通过 Web 界面访问，您仍然需要登录。\n\n使用表达式进行访问控制决策\n\n尽管 `AccessDecisionVoters`\
  \ 提供了一定程度的灵活性，但有时您希望更复杂的访问控制规则能更加灵活。借助 Spring Security，可以使用 Spring 表达式语言 (SpEL)\
  \ 来创建强大的访问控制规则。Spring Security 开箱即用地支持多个表达式（列表参见表 7-7）。通过使用 `and`、`or` 和 `not` 等结构，您可以创建非常强大且灵活的表达式。Spring\
  \ Security 将自动配置一个包含 `WebExpressionVoter` 的访问决策管理器。该访问决策管理器等同于使用以下 Bean 配置定义的管理器：\n\
  \n表 7-7.\n\nSpring Security 内置表达式\n\n表达式\n |\n  描述\n |\n\n| --- | --- | --- | ---\
  \ | --- |\n\n`hasRole(role)`\n或 `hasAuthority(authority)`\n |\n  如果当前用户拥有给定角色，则返回\
  \ `true`\n |\n\n`hasAnyRole(role1,role2)`\n/ `hasAnyAuthority(auth1,auth2)`\n |\n\
  \  如果当前用户至少拥有一个给定角色，则返回 `true`\n |\n\n`hasIpAddress(ip-address)`\n |\n  如果当前用户拥有给定\
  \ IP 地址，则返回 `true`\n |\n\n`principal`\n |\n  当前用户\n |\n\n`Authentication`\n |\n\
  \  访问 Spring Security 认证对象\n |\n\n`permitAll`\n |\n  始终评估为 `true`\n |\n\n`denyAll`\n\
  \ |\n  始终评估为 `false`\n |\n\n`isAnonymous()`\n |\n  如果当前用户是匿名用户，则返回 `true`\n |\n\n\
  `isRememberMe()`\n |\n  如果当前用户通过“记住我”功能登录，则返回 `true`\n |\n\n`isAuthenticated()`\n\
  \ |\n  如果当前用户不是匿名用户，则返回 `true`\n |\n\n`isFullyAuthenticated()`\n |\n  如果当前用户不是匿名用户或“记住我”用户，则返回\
  \ `true`\n |\n\n```\n@Bean\npublic AffirmativeBased accessDecisionManager() {\n\
  List decisionVoters = Arrays.asList(new WebExpressionVoter());\nreturn new AffirmativeBased(decisionVoters);\n\
  }\n```\n\n警告\n\n尽管角色和权限几乎相同，但它们在处理方式上存在细微但重要的差异。使用 `hasRole` 时，会检查传入的角色值是否以 `ROLE_`（默认角色前缀）开头。如果不是，则在检查权限之前会添加此前缀。因此，`hasRole('ADMIN')`\
  \ 实际上会检查当前用户是否拥有 `ROLE_ADMIN` 权限。使用 `hasAuthority` 时，则会按原样检查该值。\n\n之前的表达式允许拥有 `ADMIN`\
  \ 角色或在本地机器上登录的用户删除帖子。在上一节中，您需要创建自己的自定义 `AccessDecisionVoter`。现在，您只需编写一个表达式即可。在定义匹配器时，可以通过\
  \ `access` 方法（而非某个 `has*` 方法）来编写表达式。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n.authorizeRequests()\n\
  .antMatchers(\"/messageList*\").hasAnyRole(\"USER\", \"GUEST\")\n.antMatchers(\"\
  /messagePost*\").hasRole(\"USER\")\n.antMatchers(\"/messageDelete*\")\n.access(\"\
  hasRole('ROLE_ADMIN') or hasIpAddress('127.0.0.1') or hasIpAddress('0:0:0:0:0:0:0:1')\"\
  )\n...\n}\n...\n}\n```\n\n尽管 Spring Security 已有多个可用于创建表达式的内置函数，但您也可以用自己的函数来扩展这些功能。为此，您需要创建一个实现\
  \ `SecurityExpressionOperations` 接口的类，并将其注册到 Spring Security 中。虽然可以创建一个实现该接口所有方法的类，但通常更简单的方法是，在您想要添加表达式时扩展默认实现。\n\
  \n```\npackage com.apress.springrecipes.board.security;\nimport org.springframework.security.core.Authentication;\n\
  import org.springframework.security.web.FilterInvocation;\nimport org.springframework.security.web.access.expression.WebSecurityExpressionRoot;\n\
  public class ExtendedWebSecurityExpressionRoot extends WebSecurityExpressionRoot\
  \ {\npublic ExtendedWebSecurityExpressionRoot(Authentication a, FilterInvocation\
  \ fi) {\nsuper(a, fi);\n}\npublic boolean localAccess() {\nreturn hasIpAddress(\"\
  127.0.0.1\") || hasIpAddress(\"0:0:0:0:0:0:0:1\");\n}\n}\n```\n\n这里您扩展了提供默认实现的 `WebSecurityExpressionRoot`，并添加了\
  \ `localAccess()` 方法。该方法检查您是否从本地机器登录。要使此类对 Spring Security 可用，您需要创建 `SecurityExpressionHandler`\
  \ 接口。\n\n\n\n```\npackage com.apress.springrecipes.board.security;\nimport org.springframework.security.access.expression.SecurityExpressionOperations;\n\
  import org.springframework.security.authentication.AuthenticationTrustResolver;\n\
  import org.springframework.security.authentication.AuthenticationTrustResolverImpl;\n\
  import org.springframework.security.core.Authentication;\nimport org.springframework.security.web.FilterInvocation;\n\
  import org.springframework.security.web.access.expression.DefaultWebSecurityExpressionHandler;\n\
  import org.springframework.security.web.access.expression.WebSecurityExpressionRoot;\n\
  public class ExtendedWebSecurityExpressionHandler extends DefaultWebSecurityExpressionHandler\
  \ {\nprivate AuthenticationTrustResolver trustResolver = new AuthenticationTrustResolverImpl();\n\
  @Override\nprotected SecurityExpressionOperations\ncreateSecurityExpressionRoot(Authentication\
  \ authentication, FilterInvocation fi) {\nExtendedWebSecurityExpressionRoot root\
  \ =\nnew ExtendedWebSecurityExpressionRoot(authentication, fi);\nroot.setPermissionEvaluator(getPermissionEvaluator());\n\
  root.setTrustResolver(trustResolver);\nroot.setRoleHierarchy(getRoleHierarchy());\n\
  return root;\n}\n@Override\npublic void setTrustResolver(AuthenticationTrustResolver\
  \ trustResolver) {\nthis.trustResolver=trustResolver;\nsuper.setTrustResolver(trustResolver);\n\
  }\n}\n```\n\n你正在扩展 `DefaultWebSecurityExpressionHandler`，该类提供了默认实现。你重写了 `createSecurityExpressionRoot`\
  \ 方法，并让它创建 `ExtendedWebSecurityExpressionRoot` 类的实例。由于需要添加几个协作者，你调用了父类的 get 方法。由于没有\
  \ `getTrustResolver` 方法，你需要自己创建一个新实例，并实现 setter 方法。\n\n```\n@Configuration\n@EnableWebSecurity\n\
  public class TodoSecurityConfig extends WebSecurityConfigurerAdapter {\n@Override\n\
  protected void configure(HttpSecurity http) throws Exception {\nhttp\n.authorizeRequests()\n\
  .expressionHandler(new ExtendedWebSecurityExpressionHandler())\n.antMatchers(\"\
  /todos*\").hasAuthority(\"USER\")\n.antMatchers(DELETE, \"/todos*\").access(\"hasRole('ROLE_ADMIN)\
  \ or localAccess()\")\n}\n}\n```\n\n你通过 `expressionHandler` 方法设置了自定义表达式处理器。现在，你可以使用\
  \ `localAccess()` 表达式重写你的表达式。\n\n使用表达式进行访问控制决策\n使用 Spring Bean\n\n虽然你可以通过这些方法扩展\
  \ Spring Security，但这并非推荐做法。相反，建议你编写一个自定义类，并在表达式中使用它。通过在表达式中使用 `@` 语法，你可以调用应用程序上下文中的任何\
  \ bean。因此，你可以编写像 `@accessChecker.hasLocalAccess(authentication)` 这样的表达式，并提供一个名为\
  \ `accessChecker` 的 bean，该 bean 有一个接受 `Authentication` 对象的 `hasLocalAccess` 方法。\n\
  \n```\npackage com.apress.springrecipes.board.security;\nimport org.springframework.security.core.Authentication;\n\
  import org.springframework.security.web.authentication.WebAuthenticationDetails;\n\
  public class AccessChecker {\npublic boolean hasLocalAccess(Authentication authentication)\
  \ {\nboolean access = false;\nif (authentication.getDetails() instanceof WebAuthenticationDetails)\
  \ {\nWebAuthenticationDetails details = (WebAuthenticationDetails) authentication.getDetails();\n\
  String address = details.getRemoteAddress();\naccess = address.equals(\"127.0.0.1\"\
  ) || address.equals(\"0:0:0:0:0:0:0:1\");\n}\nreturn access;\n}\n}\n```\n\n`AccessChecker`\
  \ 仍然执行与之前的 `IpAddressVoter` 或自定义表达式处理器相同的检查，但它没有扩展 Spring Security 的类。\n\n```\n\
  @Bean\npublic AccessChecker accessChecker() {\nreturn new AccessChecker();\n}\n\
  @Override\nprotected void configure(HttpSecurity http) throws Exception {\nhttp.authorizeRequests()\n\
  .antMatchers(\"/todos*\").hasAuthority(\"USER\")\n.antMatchers(HttpMethod.DELETE,\
  \ \"/todos*\").access(\"hasAuthority('ADMIN') or @accessChecker.hasLocalAccess(authentication)\"\
  )\n...\n}\n```\n\n7-5. 保护方法调用\n\n问题\n\n作为保护 Web 层 URL 访问的替代或补充方案，有时你可能需要在服务层保护方法调用。例如，当单个控制器需要调用服务层的多个方法时，你可能希望对这些方法实施细粒度的安全控制。\n\
  \n解决方案\n\nSpring Security 使你能够以声明式方式保护方法调用。你可以在 bean 接口或实现类中声明的方法上使用 `@Secured`、`@PreAuthorize`/`@PostAuthorize`\
  \ 或 `@PreFilter`/`@PostFilter` 注解，然后使用 `@EnableGlobalMethodSecurity` 注解为它们启用安全功能。\n\
  \n工作原理\n\n首先，你将探索如何使用注解保护方法调用以及如何编写安全表达式。最后，你还会看到如何使用注解和表达式来过滤方法的输入参数和输出。\n\n使用注解保护方法\n\
  \n保护方法的方式是使用 `@Secured` 注解对它们进行标注。例如，你可以在 `MessageBoardServiceImpl` 中的方法上使用 `@Secured`\
  \ 注解，并指定访问属性作为其值，该值的类型是 `String[]`，可以包含一个或多个有权访问该方法的权限。\n\n```\npackage com.apress.springrecipes.board.service;\n\
  ...\nimport org.springframework.security.access.annotation.Secured;\npublic class\
  \ MessageBoardServiceImpl implements MessageBoardService {\n...\n@Secured({\"ROLE_USER\"\
  , \"ROLE_GUEST\"})\npublic List listMessages() {\n...\n}\n@Secured(\"ROLE_USER\"\
  )\npublic synchronized void postMessage(Message message) {\n...\n}\n@Secured({\"\
  ROLE_ADMIN\", \"IP_LOCAL_HOST\"})\npublic synchronized void deleteMessage(Message\
  \ message) {\n...\n}\n@Secured({\"ROLE_USER\", \"ROLE_GUEST\"})\npublic Message\
  \ findMessageById(Long messageId) {\nreturn messages.get(messageId);\n}\n}\n```\n\
  \n最后，你需要启用方法安全。为此，你必须在配置类中添加 `@EnableGlobalMethodSecurity` 注解。由于你想使用 `@Secured`，你需要将\
  \ `securedEnabled` 属性设置为 `true`。\n\n```\n@Configuration\n@EnableGlobalMethodSecurity(securedEnabled\
  \ = true)\npublic class TodoWebConfiguration { ... }\n```\n\n注意\n\n务必将 `@EnableGlobalMethodSecurity`\
  \ 注解添加到包含你想要保护的 bean 的应用程序上下文配置中！\n\n使用注解和表达式保护方法\n\n如果你需要更复杂的安全规则，可以像 URL 保护一样，使用基于\
  \ SpEL 的安全表达式来保护你的应用程序。为此，你可以使用 `@PreAuthorize` 和 `@PostAuthorize` 注解。使用它们，你可以像编写基于\
  \ URL 的安全表达式一样编写基于安全性的表达式。要启用对这些注解的处理，你需要在 `@EnableGlobalMethodSecurity` 注解上将 `prePostEnabled`\
  \ 属性设置为 `true`。\n\n```\n@Configuration\n@EnableGlobalMethodSecurity(prePostEnabled\
  \ = true)\npublic class TodoWebConfiguration { ... }\n```\n\n现在，你可以使用 `@PreAuthorize`\
  \ 和 `@PostAuthorize` 注解来保护你的应用程序。\n\n\n\n```\npackage com.apress.springrecipes.board;\n\
  import org.springframework.security.access.prepost.PreAuthorize;\nimport org.springframework.stereotype.Service;\n\
  import javax.transaction.Transactional;\nimport java.util.List;\n@Service\n@Transactional\n\
  class TodoServiceImpl implements TodoService {\nprivate final TodoRepository todoRepository;\n\
  TodoServiceImpl(TodoRepository todoRepository) {\nthis.todoRepository = todoRepository;\n\
  }\n@Override\n@PreAuthorize(\"hasAuthority('USER')\")\npublic List listTodos() {\n\
  return todoRepository.findAll();\n}\n@Override\n@PreAuthorize(\"hasAuthority('USER')\"\
  )\npublic void save(Todo todo) {\nthis.todoRepository.save(todo);\n}\n@Override\n\
  @PreAuthorize(\"hasAuthority('USER')\")\npublic void complete(long id) {\nTodo todo\
  \ = findById(id);\ntodo.setCompleted(true);\ntodoRepository.save(todo);\n}\n@Override\n\
  @PreAuthorize(\"hasAnyAuthority('USER', 'ADMIN')\")\npublic void remove(long id)\
  \ {\ntodoRepository.remove(id);\n}\n@Override\n@PreAuthorize(\"hasAuthority('USER')\"\
  )\n@PostAuthorize(\"returnObject.owner == authentication.name\")\npublic Todo findById(long\
  \ id) {\nreturn todoRepository.findOne(id);\n}\n}\n```\n\n`@PreAuthorize` 注解会在实际方法调用之前触发，而\
  \ `@PostAuthorize` 注解会在方法调用之后触发。你还可以编写安全表达式，并使用 `returnObject` 表达式来获取方法调用的结果。请查看\
  \ `findById` 方法上的表达式；现在，如果其他用户（非所有者）试图访问该 `Todo` 对象，将会抛出安全异常。\n\n使用注解和表达式进行过滤\n\n\
  除了 `@PreAuthorize` 和 `@PostAuthorize` 注解之外，还有 `@PreFilter` 和 `@PostFilter` 注解。这两组注解的主要区别在于，如果安全规则不适用，`@*Authorize`\
  \ 注解会抛出异常。而 `@*Filter` 注解则只是过滤掉你无权访问的元素的输入和输出变量。\n\n目前，调用 `listTodos` 时，会从数据库中返回所有内容。你希望将检索所有元素的操作限制为仅具有\
  \ `ADMIN` 权限的用户，而其他用户只能看到自己的待办事项列表。这可以通过 `@PostFilter` 注解简单实现。添加 `@PostFilter(\"\
  hasAuthority('ADMIN') or filterObject.owner == authentication.name\")` 即可实现此规则。\n\
  \n```\n@PreAuthorize(\"hasAuthority('USER')\")\n@PostFilter(\"hasAnyAuthority('ADMIN')\
  \ or filterObject.owner == authentication.name\")\npublic List listTodos() {\nreturn\
  \ todoRepository.findAll();\n}\n```\n\n当你重新部署应用程序并以普通用户身份登录时，你将只能看到自己的待办事项；而使用具有\
  \ `ADMIN` 权限的用户登录时，你仍然可以看到所有可用的待办事项。关于 `@*Filter` 注解的更详细用法，请参见配方 7-7。\n\n注意\n\n\
  尽管 `@PostFilter` 和 `@PreFilter` 是过滤方法输入/输出的简单方法，但请谨慎使用。当它们用于处理大量结果时，可能会严重影响应用程序的性能。\n\
  \n7-6. 在视图中处理安全性\n\n问题\n\n有时你可能希望在 Web 应用程序的视图中显示用户的认证信息，例如主体名称和已授予的权限。此外，你还希望根据用户的权限有条件地渲染视图内容。\n\
  \n解决方案\n\n虽然你可以在 JSP 文件中编写 JSP 脚本片段，通过 Spring Security API 检索认证和授权信息，但这并非高效的解决方案。Spring\
  \ Security 提供了一个 JSP 标签库，用于在 JSP 视图中处理安全性。它包含可以显示用户认证信息的标签，以及根据用户权限有条件地渲染视图内容的标签。\n\
  \n工作原理\n\n你将首先学习如何使用 Spring Security 标签来显示当前已认证用户的信息。接下来，你将学习如何根据当前已认证用户的权限有条件地隐藏页面的部分内容。\n\
  \n显示认证信息\n\n假设你希望在待办事项列表页面（即 `todos.jsp`）的页眉中显示用户的主体名称和已授予的权限。首先，你需要导入 Spring Security\
  \ 的标签库定义。\n\n`<sec:authentication>` 标签会暴露当前用户的 `Authentication` 对象，以便你渲染其属性。你可以在其\
  \ `property` 属性中指定属性名称 `name` 或属性路径 `path`。例如，你可以通过 `name` 属性渲染用户的主体名称。\n\n```\n\
  Todos for \n```\n\n除了直接渲染认证属性外，此标签还支持将属性存储在一个 JSP 变量中，该变量的名称由 `var` 属性指定。例如，你可以将包含授予用户权限的\
  \ `authorities` 属性存储在 JSP 变量 `authorities` 中，并使用 `<c:forEach>` 标签逐一渲染它们。你还可以使用 `scope`\
  \ 属性进一步指定变量的作用域。\n\n```\n\n${authority.authority}\n\n```\n\n有条件地渲染视图内容\n\n如果你想根据用户的权限有条件地渲染视图内容，可以使用\
  \ `<sec:authorize>` 标签。例如，你可以根据用户的权限决定是否渲染消息的作者。\n\n```\n${todo.owner}\n\n```\n\n\
  如果你希望仅当用户同时被授予了某些特定权限时才渲染包含的内容，则需要在 `ifAllGranted` 属性中指定这些权限。否则，如果只要拥有其中任何一个权限就可以渲染包含的内容，则需要在\
  \ `ifAnyGranted` 属性中指定它们。\n\n```\n${todo.owner}\n\n```\n\n当用户未被授予 `ifNotGranted`\
  \ 属性中指定的任何权限时，你也可以渲染包含的内容。\n\n```\n${todo.owner}\n\n```\n\n7-7. 处理领域对象安全性\n\n问题\n\
  \n有时你可能拥有复杂的安全需求，需要在领域对象级别处理安全性。这意味着你必须允许每个领域对象针对不同的主体拥有不同的访问属性。\n\n解决方案\n\nSpring\
  \ Security 提供了一个名为 ACL 的模块，允许每个领域对象拥有自己的访问控制列表（ACL）。一个 ACL 包含一个领域对象的对象标识符以关联该对象，并且还持有多个访问控制条目（ACE），每个\
  \ ACE 包含以下两个核心部分：\n\n*   **权限**：一个 ACE 的权限由特定的位掩码表示，每个位对应一种特定的权限类型。`BasePermission`\
  \ 类预定义了五种基本权限作为常量供你使用：`READ`（位 0 或整数 1）、`WRITE`（位 1 或整数 2）、`CREATE`（位 2 或整数 4）、`DELETE`（位\
  \ 3 或整数 8）和 `ADMINISTRATION`（位 4 或整数 16）。你也可以使用其他未使用的位来定义自己的权限。\n\n*   **安全标识（SID）**：每个\
  \ ACE 包含针对特定 SID 的权限。SID 可以是主体（`PrincipalSid`）或权限（`GrantedAuthoritySid`），用于与权限关联。除了定义\
  \ ACL 对象模型外，Spring Security 还定义了用于读取和维护该模型的 API，并为这些 API 提供了高性能的 JDBC 实现。为了简化 ACL\
  \ 的使用，Spring Security 还提供了诸如访问决策投票器和 JSP 标签等工具，使你能够在应用程序中一致地使用 ACL 和其他安全设施。\n\n\
  工作原理\n\n首先，你将了解如何设置 ACL 服务以及如何为你的实体维护 ACL 权限。最后，你将学习如何使用安全表达式，通过存储的 ACL 权限来保护对实体的访问。\n\
  \n设置 ACL 服务\n\n\n\nSpring Security 提供了内置支持，用于将 ACL 数据存储在关系型数据库中，并通过 JDBC 进行访问。首先，你需要在数据库中创建以下表来存储\
  \ ACL 数据：\n\n```\nCREATE TABLE ACL_SID(\nID         BIGINT        NOT NULL GENERATED\
  \ BY DEFAULT AS IDENTITY,\nSID        VARCHAR(100)  NOT NULL,\nPRINCIPAL  SMALLINT\
  \      NOT NULL,\nPRIMARY KEY (ID),\nUNIQUE (SID, PRINCIPAL)\n);\nCREATE TABLE ACL_CLASS(\n\
  ID     BIGINT        NOT NULL GENERATED BY DEFAULT AS IDENTITY,\nCLASS  VARCHAR(100)\
  \  NOT NULL,\nPRIMARY KEY (ID),\nUNIQUE (CLASS)\n);\nCREATE TABLE ACL_OBJECT_IDENTITY(\n\
  ID                  BIGINT    NOT NULL GENERATED BY DEFAULT AS IDENTITY,\nOBJECT_ID_CLASS\
  \     BIGINT    NOT NULL,\nOBJECT_ID_IDENTITY  BIGINT    NOT NULL,\nPARENT_OBJECT\
  \       BIGINT,\nOWNER_SID           BIGINT,\nENTRIES_INHERITING  SMALLINT  NOT\
  \ NULL,\nPRIMARY KEY (ID),\nUNIQUE (OBJECT_ID_CLASS, OBJECT_ID_IDENTITY),\nFOREIGN\
  \ KEY (PARENT_OBJECT)   REFERENCES ACL_OBJECT_IDENTITY,\nFOREIGN KEY (OBJECT_ID_CLASS)\
  \ REFERENCES ACL_CLASS,\nFOREIGN KEY (OWNER_SID)       REFERENCES ACL_SID\n);\n\
  CREATE TABLE ACL_ENTRY(\nID                  BIGINT    NOT NULL GENERATED BY DEFAULT\
  \ AS IDENTITY,\nACL_OBJECT_IDENTITY BIGINT    NOT NULL,\nACE_ORDER           INT\
  \       NOT NULL,\nSID                 BIGINT    NOT NULL,\nMASK               \
  \ INTEGER   NOT NULL,\nGRANTING            SMALLINT  NOT NULL,\nAUDIT_SUCCESS  \
  \     SMALLINT  NOT NULL,\nAUDIT_FAILURE       SMALLINT  NOT NULL,\nPRIMARY KEY\
  \ (ID),\nUNIQUE (ACL_OBJECT_IDENTITY, ACE_ORDER),\nFOREIGN KEY (ACL_OBJECT_IDENTITY)\
  \ REFERENCES ACL_OBJECT_IDENTITY,\nFOREIGN KEY (SID)                 REFERENCES\
  \ ACL_SID\n);\n```\n\nSpring Security 定义了 API，并提供了高性能的 JDBC 实现，供你访问存储在这些表中的 ACL\
  \ 数据，因此你很少需要直接从数据库中访问 ACL 数据。由于每个领域对象都可以拥有自己的 ACL，你的应用中可能存在大量 ACL。幸运的是，Spring Security\
  \ 支持缓存 ACL 对象。你可以继续使用 Ehcache 作为缓存实现，并在 `ehcache.xml`（位于类路径根目录）中为 ACL 缓存创建新的配置。\n\
  \n```\n...\n\n```\n\n接下来，你需要为你的应用设置一个 ACL 服务。然而，由于 Spring Security 尚不支持通过基于 Java\
  \ 的配置来配置 ACL 模块，你必须使用一组普通的 Spring Bean 来配置此模块。因此，让我们创建一个名为 `TodoAclConfig` 的独立 Bean\
  \ 配置类，它将存储 ACL 特定的配置，并在部署描述符中添加其位置。\n\n```\npackage com.apress.springrecipes.board.security;\n\
  import org.springframework.security.web.context.AbstractSecurityWebApplicationInitializer;\n\
  public class TodoSecurityInitializer extends AbstractSecurityWebApplicationInitializer\
  \ {\npublic TodoSecurityInitializer() {\nsuper(TodoSecurityConfig.class, TodoAclConfig.class);\n\
  }\n}\n```\n\n在 ACL 配置文件中，核心 Bean 是一个 ACL 服务。在 Spring Security 中，有两个接口定义了 ACL 服务的操作：`AclService`\
  \ 和 `MutableAclService`。`AclService` 定义了供你读取 ACL 的操作。`MutableAclService` 是 `AclService`\
  \ 的子接口，定义了供你创建、更新和删除 ACL 的操作。如果你的应用只需要读取 ACL，你可以直接选择 `AclService` 的实现，例如 `JdbcAclService`。否则，你应该选择\
  \ `MutableAclService` 的实现，例如 `JdbcMutableAclService`。\n\n```\npackage com.apress.springrecipes.board.security;\n\
  import org.springframework.cache.CacheManager;\nimport org.springframework.cache.ehcache.EhCacheManagerFactoryBean;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.security.acls.AclEntryVoter;\nimport org.springframework.security.acls.domain.*;\n\
  import org.springframework.security.acls.jdbc.BasicLookupStrategy;\nimport org.springframework.security.acls.jdbc.JdbcMutableAclService;\n\
  import org.springframework.security.acls.jdbc.LookupStrategy;\nimport org.springframework.security.acls.model.AclCache;\n\
  import org.springframework.security.acls.model.AclService;\nimport org.springframework.security.acls.model.Permission;\n\
  import org.springframework.security.acls.model.PermissionGrantingStrategy;\nimport\
  \ org.springframework.security.core.authority.SimpleGrantedAuthority;\nimport javax.sql.DataSource;\n\
  @Configuration\npublic class TodoAclConfig {\nprivate final DataSource dataSource;\n\
  public TodoAclConfig(DataSource dataSource) {\nthis.dataSource = dataSource;\n}\n\
  @Bean\npublic AclEntryVoter aclEntryVoter(AclService aclService) {\nreturn new AclEntryVoter(aclService,\
  \ \"ACL_MESSAGE_DELETE\", new Permission[] {BasePermission.ADMINISTRATION, BasePermission.DELETE});\n\
  }\n@Bean\npublic EhCacheManagerFactoryBean ehCacheManagerFactoryBean() {\nreturn\
  \ new EhCacheManagerFactoryBean();\n}\n@Bean\npublic AuditLogger auditLogger() {\n\
  return new ConsoleAuditLogger();\n}\n@Bean\npublic PermissionGrantingStrategy permissionGrantingStrategy()\
  \ {\nreturn new DefaultPermissionGrantingStrategy(auditLogger());\n}\n@Bean\npublic\
  \ AclAuthorizationStrategy aclAuthorizationStrategy() {\nreturn new AclAuthorizationStrategyImpl(new\
  \ SimpleGrantedAuthority(\"ADMIN\"));\n}\n@Bean\npublic AclCache aclCache(CacheManager\
  \ cacheManager) {\nreturn new SpringCacheBasedAclCache(cacheManager.getCache(\"\
  aclCache\"), permissionGrantingStrategy(), aclAuthorizationStrategy());\n}\n@Bean\n\
  public LookupStrategy lookupStrategy(AclCache aclCache) {\nreturn new BasicLookupStrategy(this.dataSource,\
  \ aclCache, aclAuthorizationStrategy(), permissionGrantingStrategy());\n}\n@Bean\n\
  public AclService aclService(LookupStrategy lookupStrategy, AclCache aclCache) {\n\
  return new JdbcMutableAclService(this.dataSource, lookupStrategy, aclCache);\n}\n\
  }\n```\n\n此 ACL 配置文件中的核心 Bean 定义是 ACL 服务，它是 `JdbcMutableAclService` 的一个实例，允许你维护\
  \ ACL。该类需要三个构造函数参数。第一个参数是用于创建连接到存储 ACL 数据的数据库的数据源。你应该事先定义一个数据源，以便在此处直接引用它（假设你已在同一数据库中创建了\
  \ ACL 表）。第三个构造函数参数是与 ACL 一起使用的缓存实例，你可以使用 Ehcache 作为后端缓存实现来配置它。\n\nSpring Security\
  \ 自带的唯一实现是 `BasicLookupStrategy`，它使用标准且兼容的 SQL 语句执行基本查找。如果你想利用高级数据库功能来提高查找性能，可以通过实现\
  \ `LookupStrategy` 接口来创建自己的查找策略。`BasicLookupStrategy` 实例也需要一个数据源和一个缓存实例。此外，它还需要一个类型为\
  \ `AclAuthorizationStrategy` 的构造函数参数。该对象决定一个主体是否有权更改 ACL 的某些属性，通常通过为每类属性指定一个必需的权限来实现。对于上述配置，只有拥有\
  \ `ADMIN` 权限的用户才能分别更改 ACL 的所有权、ACE 的审计细节或其他 ACL 和 ACE 细节。最后，它需要一个类型为 `PermissionGrantingStrategy`\
  \ 的构造函数参数。该对象的职责是检查 ACL 是否授予给定的 `Sid` 访问权限，并附带其拥有的 `Permissions` 值。\n\n\n\n最后，`JdbcMutableAclService`\
  \ 嵌入了用于在关系数据库中维护 ACL 数据的标准 SQL 语句。然而，这些 SQL 语句可能并非与所有数据库产品兼容。例如，你需要为 Apache Derby\
  \ 定制身份查询语句。\n\n为领域对象维护 ACL\n\n在你的后端服务和 DAO 中，你可以通过依赖注入，使用先前定义的 ACL 服务来为领域对象维护 ACL。对于你的留言板，你需要在待办事项发布时为其创建\
  \ ACL，并在该待办事项被删除时删除对应的 ACL。\n\n```\npackage com.apress.springrecipes.board;\nimport\
  \ org.springframework.security.access.prepost.PostFilter;\nimport org.springframework.security.access.prepost.PreAuthorize;\n\
  import org.springframework.security.acls.domain.*;\nimport org.springframework.security.acls.model.MutableAcl;\n\
  import org.springframework.security.acls.model.MutableAclService;\nimport org.springframework.security.acls.model.ObjectIdentity;\n\
  import org.springframework.stereotype.Service;\nimport javax.transaction.Transactional;\n\
  import java.util.List;\nimport static org.springframework.security.acls.domain.BasePermission.DELETE;\n\
  import static org.springframework.security.acls.domain.BasePermission.READ;\nimport\
  \ static org.springframework.security.acls.domain.BasePermission.WRITE;\n@Service\n\
  @Transactional\nclass TodoServiceImpl implements TodoService {\nprivate final TodoRepository\
  \ todoRepository;\nprivate final MutableAclService mutableAclService;\nTodoServiceImpl(TodoRepository\
  \ todoRepository, MutableAclService mutableAclService) {\nthis.todoRepository =\
  \ todoRepository;\nthis.mutableAclService = mutableAclService;\n}\n@Override\n@PreAuthorize(\"\
  hasAuthority('USER')\")\npublic void save(Todo todo) {\nthis.todoRepository.save(todo);\n\
  ObjectIdentity oid = new ObjectIdentityImpl(Todo.class, todo.getId());\nMutableAcl\
  \ acl = mutableAclService.createAcl(oid);\nacl.insertAce(0, READ, new PrincipalSid(todo.getOwner()),\
  \ true);\nacl.insertAce(1, WRITE, new PrincipalSid(todo.getOwner()), true);\nacl.insertAce(2,\
  \ DELETE, new PrincipalSid(todo.getOwner()), true);\nacl.insertAce(3, READ, new\
  \ GrantedAuthoritySid(\"ADMIN\"), true);\nacl.insertAce(4, WRITE, new GrantedAuthoritySid(\"\
  ADMIN\"), true);\nacl.insertAce(5, DELETE, new GrantedAuthoritySid(\"ADMIN\"), true);\n\
  }\n@Override\n@PreAuthorize(\"hasAnyAuthority('USER', 'ADMIN')\")\npublic void remove(long\
  \ id) {\ntodoRepository.remove(id);\nObjectIdentity oid = new ObjectIdentityImpl(Todo.class,\
  \ id);\nmutableAclService.deleteAcl(oid, false);\n}\n...\n}\n```\n\n当用户创建一个待办事项时，你同时为该消息创建一个新的\
  \ ACL，并使用该 ID 作为 ACL 的对象标识。当用户删除一个待办事项时，你也删除相应的 ACL。对于一个新待办事项，你向其 ACL 中插入以下 ACE：\n\
  \n*   待办事项的所有者可以 `READ`（读取）、`WRITE`（写入）和 `DELETE`（删除）该待办事项。\n*   拥有 `ADMIN` 权限的用户也可以\
  \ `READ`（读取）、`WRITE`（写入）和 `DELETE`（删除）这些待办事项。\n\n`JdbcMutableAclService` 要求调用方法启用事务，以便其\
  \ SQL 语句能在事务内运行。因此，你需要在涉及 ACL 维护的两个方法上添加 `@Transactional` 注解，然后在 `TodoWebConfig`\
  \ 中定义一个事务管理器并启用 `@EnableTransactionManagement`。同时，别忘了将 ACL 服务注入到 `TodoService` 中，以便其维护\
  \ ACL。\n\n```\npackage com.apress.springrecipes.board.web;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jdbc.datasource.DataSourceTransactionManager;\nimport\
  \ org.springframework.transaction.annotation.EnableTransactionManagement;\n...\n\
  import javax.sql.DataSource;\n@Configuration\n@EnableTransactionManagement\n...\n\
  public class TodoWebConfig implements WebMvcConfigurer {\n...\n@Bean\npublic DataSourceTransactionManager\
  \ transactionManager(DataSource dataSource) {\nreturn new DataSourceTransactionManager(dataSource);\n\
  }\n}\n```\n\n使用表达式做出访问控制决策\n\n有了每个领域对象的 ACL，你就可以使用对象的 ACL 对涉及该对象的方法做出访问控制决策。例如，当用户尝试删除一个待办事项时，你可以查询该消息的\
  \ ACL，以确定该用户是否有权删除此待办事项。\n\n配置 ACL 可能是一项艰巨的任务。幸运的是，你可以使用注解和表达式来简化工作。你可以使用 `@PreAuthorize`\
  \ 和 `@PreFilter` 注解来检查某人是否被允许执行该方法或使用某些方法参数。`@PostAuthorize` 和 `@PostFilter` 注解可用于检查用户是否有权访问结果，或根据\
  \ ACL 过滤结果。要启用这些注解的处理，你需要将 `@EnableGlobalMethodSecurity` 注解的 `prePostEnabled` 属性设置为\
  \ `true`。\n\n```\n@EnableGlobalMethodSecurity(prePostEnabled=true)\n```\n\n此外，你需要配置基础设施组件以便能够做出决策。你需要设置一个\
  \ `AclPermissionEvaluator`，它用于评估对象的权限。这一步在 `TodoWebConfig` 中完成，并且在此处是必需的，因为它是启用全局方法安全的配置类，并且由于你想使用表达式通过\
  \ ACL 来保护方法，因此需要自定义的权限评估器。\n\n```\npackage com.apress.springrecipes.board.web.config;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.cache.Cache;\n\
  import org.springframework.cache.CacheManager;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.security.acls.AclPermissionEvaluator;\n\
  import org.springframework.security.acls.domain.AclAuthorizationStrategyImpl;\n\
  import org.springframework.security.acls.domain.ConsoleAuditLogger;\nimport org.springframework.security.acls.domain.DefaultPermissionGrantingStrategy;\n\
  import org.springframework.security.acls.domain.SpringCacheBasedAclCache;\nimport\
  \ org.springframework.security.acls.jdbc.BasicLookupStrategy;\nimport org.springframework.security.acls.jdbc.JdbcMutableAclService;\n\
  import org.springframework.security.core.GrantedAuthority;\nimport org.springframework.security.core.authority.SimpleGrantedAuthority;\n\
  import javax.sql.DataSource;\n@Configuration\npublic class TodoWebConfig {\n...\n\
  @Bean\npublic AclPermissionEvaluator permissionEvaluator() {\nreturn new AclPermissionEvaluator(jdbcMutableAclService());\n\
  }\n}\n```\n\n`AclPermissionEvaluator` 需要一个 `AclService` 来获取它需要检查的对象的 ACL。在进行基于 Java\
  \ 的配置时，这已经足够了，因为 `PermissionEvaluator` 会被自动检测并注入到 `DefaultMethodSecurityExpressionHandler`\
  \ 中。现在，一切就绪，可以结合注解和表达式来控制访问了。\n\n```\npackage com.apress.springrecipes.board;\n\
  ...\n@Service\n@Transactional\nclass TodoServiceImpl implements TodoService {\n\
  @Override\n@PreAuthorize(\"hasAuthority('USER')\")\n@PostFilter(\"hasAnyAuthority('ADMIN')\
  \ or hasPermission(filterObject, 'read')\")\npublic List listTodos() { ... }\n@Override\n\
  @PreAuthorize(\"hasAuthority('USER')\")\npublic void save(Todo todo) { ... }\n@Override\n\
  @PreAuthorize(\"hasPermission(#id, 'com.apress.springrecipes.board.Todo', 'write')\"\
  )\npublic void complete(long id) { ... }\n@Override\n@PreAuthorize(\"hasPermission(#id,\
  \ 'com.apress.springrecipes.board.Todo', 'delete')\")\npublic void remove(long id)\
  \ { ... }\n@Override\n@PostFilter(\"hasPermission(filterObject, 'read')\")\npublic\
  \ Todo findById(long id) { ... }\n}\n```\n\n\n\n你可能已经注意到了不同的注解以及这些注解中的表达式。`@PreAuthorize`\
  \ 注解可用于检查某人是否拥有执行该方法的正确权限。该表达式使用了 `#message`，它指向名为 message 的方法参数。`hasPermission`\
  \ 表达式是 Spring Security 的内置表达式（参见表 7-7）。\n\n`@PostFilter` 注解允许你过滤集合，并移除某人无权读取的元素。在表达式中，关键字\
  \ `filterObject` 指向集合中的一个元素。要保留在集合中，登录用户需要拥有读取权限。\n\n`@PostAuthorize` 可用于检查单个返回值是否可以使用（即，用户是否拥有正确的权限）。要在表达式中使用返回值，请使用关键字\
  \ `returnObject`。\n\n7-8. 为 WebFlux 应用添加安全性\n\n问题\n\n你有一个使用 Spring WebFlux 构建的应用（参见第\
  \ 5 章），并且你想为其添加安全性。\n\n解决方案\n\n通过在配置中添加 `@EnableWebFluxSecurity` 来启用安全性，并创建一个包含安全配置的\
  \ `SecurityWebFilterChain`。\n\n工作原理\n\nSpring WebFlux 应用在本质上与常规的 Spring MVC 应用有很大不同。尽管如此，Spring\
  \ Security 仍力求使配置尽可能简单，并尽可能与常规的 Web 配置相似。\n\n保护 URL 访问\n\n首先，创建一个 `SecurityConfiguration`\
  \ 类，并在该类上添加 `@EnableWebFluxSecurity`。\n\n```\n@Configuration\n@EnableWebFluxSecurity\n\
  public class SecurityConfiguration { ... }\n```\n\n`@EnableWebFluxSecurity` 注解会注册一个\
  \ `WebFluxConfigurer`（参见配方 5-5），以添加 `AuthenticationPrincipalArgumentResolver`，它允许你将\
  \ `Authentication` 对象注入到 Spring WebFlux 处理器方法中。它还会注册 Spring Security 中的 `WebFluxSecurityConfiguration`\
  \ 类，该类会检测 `SecurityWebFilterChain` 的实例（包含安全配置），并将其包装为一个 `WebFilter`（类似于常规的 Servlet\
  \ 过滤器），WebFlux 使用该过滤器为传入请求添加行为（就像普通的 Servlet 过滤器一样）。\n\n你的配置现在仅启用了安全性；让我们添加一些安全规则。\n\
  \n```\n@Bean\nSecurityWebFilterChain springWebFilterChain(HttpSecurity http) throws\
  \ Exception {\nreturn http\n.authorizeExchange()\n.pathMatchers(\"/welcome\", \"\
  /welcome/**\").permitAll()\n.pathMatchers(\"/reservation*\").hasRole(\"USER\")\n\
  .anyExchange().authenticated()\n.and()\n.build();\n}\n```\n\n`org.springframework.security.config.annotation.web.reactive.HttpSecurity`\
  \ 应该看起来很熟悉（参见配方 7-1），它用于添加安全规则并进行进一步配置（例如添加/删除标头和配置登录方法）。通过 `authorizeExchange`，可以编写规则。这里你保护了\
  \ URL；`/welcome` URL 允许所有人访问，而 `/reservation` URL 仅对角色 `USER` 可用。对于其他请求，你必须进行身份验证。最后，你需要调用\
  \ `build()` 来实际构建 `SecurityWebFilterChain`。\n\n除了 `authorizeExchange`，还可以使用 `headers()`\
  \ 配置方法为请求添加安全标头（另请参见配方 7-2），例如跨站脚本保护、缓存标头等。\n\n登录 WebFlux 应用\n\n目前，Spring Security\
  \ WebFlux 仅支持 `httpBasic()` 身份验证机制，并且默认启用。你可以通过显式配置来覆盖默认配置的某些部分，并且可以覆盖所使用的身份验证管理器以及用于存储安全上下文的存储库。身份验证管理器是自动检测的；你只需要注册一个类型为\
  \ `ReactiveAuthenticationManager` 或 `UserDetailsRepository` 的 Bean。\n\n你还可以通过配置\
  \ `SecurityContextRepository` 来配置 `SecurityContext` 值的存储位置。默认使用的实现是 `WebSessionSecurityContextRepository`，它将上下文存储在\
  \ `WebSession` 中。另一个默认实现 `ServerWebExchangeAttributeSecurityContextRepository` 将\
  \ SecurityContext 存储为当前交换（即请求）的一个属性。\n\n```\n@Bean\nSecurityWebFilterChain springWebFilterChain(HttpSecurity\
  \ http) throws Exception {\nreturn http.httpBasic().\n.authenticationManager(new\
  \ CustomReactiveAuthenticationManager())\n.securityContextRepository(new ServerWebExchangeAttributeSecurityContextRepository()).and().build();\n\
  }\n```\n\n这将使用 `CustomReactiveAuthenticationManager` 和无状态的 `ServerWebExchangeAttributeSecurityContextRepository`\
  \ 覆盖默认值。但是，对于此应用，我们将坚持使用默认值。\n\n对用户进行身份验证\n\n在基于 Spring WebFlux 的应用中对用户进行身份验证是通过\
  \ `ReactiveAuthenticationManager` 完成的。这是一个包含单个 `authenticate` 方法的接口。你可以提供自己的实现，也可以使用两个提供的实现之一。第一个是\
  \ `UserDetailsRepositoryAuthenticationManager`，它包装了一个 `UserDetailsRepository` 实例。\n\
  \n注意\n\n`UserDetailsRepository` 只有一个实现，即 `MapUserDetailsRepository`，它是一个内存实现。当然，你可以基于响应式数据存储（如\
  \ MongoDB 或 Couchbase）提供自己的实现。\n\n另一个实现 `ReactiveAuthenticationManagerAdapter` 实际上是常规\
  \ `AuthenticationManager`（参见配方 7-3）的包装器。它将包装一个常规实例，因此，你可以以响应式方式使用阻塞式实现。这并不会使它们变成响应式；它们仍然会阻塞，但可以以这种方式重用。通过这种方式，你可以为你的响应式应用使用\
  \ JDBC、LDAP 等。\n\n在 Spring WebFlux 应用中配置 Spring Security 时，你可以将 `ReactiveAuthenticationManager`\
  \ 或 `UserDetailsRepository` 的实例添加到你的 Java 配置类中。当检测到后者时，它将自动被包装在 `UserDetailsRepositoryAuthenticationManager`\
  \ 中。\n\n```\n@Bean\npublic MapUserDetailsRepository userDetailsRepository() {\n\
  UserDetails marten = User.withUsername(\"marten\").password(\"secret\").roles(\"\
  USER\").build();\nUserDetails admin = User.withUsername(\"admin\").password(\"admin\"\
  ).roles(\"USER\",\"ADMIN\").build();\nreturn new MapUserDetailsRepository(marten,\
  \ admin);\n}\n```\n\n现在，当你部署应用（或运行 `ReactorNettyBootstrap` 类）时，你可以自由访问 `/welcome`\
  \ 页面，但当访问以 `/reservation` 开头的 URL 时，浏览器会弹出一个基本身份验证提示（图 7-3）。\n\n![A314861_4_En_7_Fig3_HTML.jpg](img/A314861_4_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 基本身份验证登录界面\n\n做出访问控制决策\n\n表 7-8 显示了 Spring Security WebFlux 内置表达式。\n\n\
  表 7-8. Spring Security WebFlux 内置表达式\n\n| 表达式 | 描述 |\n| --- | --- |\n| `hasRole(role)`\
  \ 或 `hasAuthority(authority)` | 如果当前用户拥有给定角色，则返回 `true` |\n| `permitAll()` | 始终评估为\
  \ `true` |\n| `denyAll()` | 始终评估为 `false` |\n| `authenticated()` | 如果用户已通过身份验证，则返回\
  \ `true` |\n| `access()` | 使用函数来确定是否授予访问权限 |\n\n注意\n\n\n\n尽管角色和权限几乎相同，但在处理方式上存在一个微小但重要的区别。使用\
  \ `hasRole` 时，会检查传入的角色值是否以 `ROLE_`（默认角色前缀）开头。如果不是，则在检查权限之前会添加此前缀。因此，`hasRole('ADMIN')`\
  \ 实际上会检查当前用户是否拥有 `ROLE_ADMIN` 权限。而使用 `hasAuthority` 时，则会按原样检查该值。\n\n```\n@Bean\n\
  SecurityWebFilterChain springWebFilterChain(HttpSecurity http) throws Exception\
  \ {\nreturn http\n.authorizeExchange()\n.pathMatchers(\"/users/{user}/**\").access(this::userEditAllowed)\n\
  .anyExchange().authenticated()\n.and()\n.build();\n}\nprivate Mono userEditAllowed(Mono\
  \ authentication, AuthorizationContext context) {\nreturn authentication\n.map(\
  \ a -> context.getVariables().get(\"user\").equals(a.getName()) || a.getAuthorities().contains(new\
  \ SimpleGrantedAuthority(\"ROLE_ADMIN\")))\n.map( granted -> new AuthorizationDecision(granted));\n\
  }\n```\n\n`access()` 表达式可用于编写强大的表达式。前面的代码片段使用了 URL `{user}` 中的路径参数，如果当前用户是实际用户或拥有\
  \ `ROLE_ADMIN` 权限，则允许访问。`AuthorizationContext` 包含已解析的变量，可用于比较 URI 中的名称。`Authentication`\
  \ 包含 `GrantedAuthorities` 的集合，可以检查其中是否包含 `ROLE_ADMIN` 权限。当然，你可以根据需要编写任意复杂的表达式；例如，可以检查\
  \ IP 地址、请求头等。\n\n总结\n\n在本章中，你学习了如何使用 Spring Security 保护应用程序安全。它可以用于保护任何 Java 应用程序，但主要用于\
  \ Web 应用程序。身份验证、授权和访问控制的概念在安全领域至关重要，因此你应该对它们有清晰的理解。\n\n你通常需要通过防止未经授权的访问来保护关键 URL。Spring\
  \ Security 可以帮助你以声明式方式实现这一点。它通过应用 Servlet 过滤器来处理安全性，这些过滤器可以通过简单的基于 Java 的配置进行配置。Spring\
  \ Security 会自动为你配置基本的安全服务，并默认尽可能确保安全。\n\nSpring Security 支持用户登录 Web 应用程序的多种方式，例如基于表单的登录和\
  \ HTTP Basic 身份验证。它还提供匿名登录服务，允许你将匿名用户视为普通用户。Remember-me 支持允许应用程序在多个浏览器会话中记住用户的身份。\n\
  \nSpring Security 支持多种用户身份验证方式，并内置了相应的提供程序实现。例如，它支持针对内存定义、关系数据库和 LDAP 仓库进行用户身份验证。你应该始终在用户仓库中存储加密的密码，因为明文密码容易受到黑客攻击。Spring\
  \ Security 还支持在本地缓存用户详细信息，以节省执行远程查询的开销。\n\n关于是否允许用户访问给定资源的决策由访问决策管理器做出。Spring Security\
  \ 提供了三个基于投票方法的访问决策管理器。它们都需要配置一组投票者来对访问控制决策进行投票。\n\nSpring Security 使你能够以声明式方式保护方法调用，可以通过在\
  \ Bean 定义中嵌入安全拦截器，或者使用 AspectJ 切入点表达式或注解匹配多个方法。Spring Security 还允许你在 JSP 视图中显示用户的身份验证信息，并根据用户的权限有条件地渲染视图内容。\n\
  \nSpring Security 提供了一个 ACL 模块，允许每个领域对象拥有一个用于控制访问的 ACL。你可以使用 Spring Security 的高性能\
  \ API（通过 JDBC 实现）来读取和维护每个领域对象的 ACL。Spring Security 还提供了诸如访问决策投票者和 JSP 标签之类的工具，使你能够将\
  \ ACL 与其他安全设施一致地使用。\n\nSpring Security 还支持保护基于 Spring WebFlux 的应用程序。在前面的方法中，你探索了如何为此类应用程序添加安全性。\n\
  \n8. Spring Mobile\n\n如今，移动设备比以往任何时候都多。这些移动设备中的大多数都可以访问互联网和网站。然而，某些移动设备的浏览器可能缺少你在网站上使用的某些\
  \ HTML 或 JavaScript 功能；你可能还想向移动用户显示不同的网站，或者让他们选择查看移动版本。在这些情况下，你可以自己编写所有设备检测例程，但\
  \ Spring Mobile 提供了检测正在使用的设备的方法。\n\n8-1. 不使用 Spring Mobile 检测设备\n\n问题\n\n你想检测连接到你的网站的设备类型。\n\
  \n解决方案\n\n创建一个 `Filter`，用于检测传入请求的 `User-Agent` 值，并设置一个请求属性，以便可以在控制器中检索它。\n\n工作原理\n\
  \n以下是基于 `User-Agent` 进行设备检测所需的 `Filter` 实现：\n\n```\npackage com.apress.springrecipes.mobile.web.filter;\n\
  import org.springframework.util.StringUtils;\nimport org.springframework.web.filter.OncePerRequestFilter;\n\
  import javax.servlet.FilterChain;\nimport javax.servlet.ServletException;\nimport\
  \ javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import java.io.IOException;\npublic class DeviceResolverRequestFilter extends OncePerRequestFilter\
  \ {\npublic static final String CURRENT_DEVICE_ATTRIBUTE = \"currentDevice\";\n\
  public static final String DEVICE_MOBILE = \"MOBILE\";\npublic static final String\
  \ DEVICE_TABLET = \"TABLET\";\npublic static final String DEVICE_NORMAL = \"NORMAL\"\
  ;\n@Override\nprotected void doFilterInternal(HttpServletRequest request, HttpServletResponse\
  \ response,\nFilterChain filterChain) throws ServletException, IOException {\nString\
  \ userAgent = request.getHeader(\"User-Agent\");\nString device = DEVICE_NORMAL;\n\
  if (StringUtils.hasText(userAgent)) {\nuserAgent = userAgent.toLowerCase();\nif\
  \ (userAgent.contains(\"android\")) {\ndevice = userAgent.contains(\"mobile\") ?\
  \ DEVICE_NORMAL : DEVICE_TABLET;\n} else if (userAgent.contains(\"ipad\") || userAgent.contains(\"\
  playbook\") || userAgent.contains(\"kindle\")) {\ndevice = DEVICE_TABLET;\n} else\
  \ if (userAgent.contains(\"mobil\") || userAgent.contains(\"ipod\") || userAgent.contains(\"\
  nintendo DS\")) {\ndevice = DEVICE_MOBILE;\n}\n}\nrequest.setAttribute(CURRENT_DEVICE_ATTRIBUTE,\
  \ device);\nfilterChain.doFilter(request, response);\n}\n}\n```\n\n此实现首先从传入请求中检索\
  \ `User-Agent` 头。当其中存在值时，过滤器需要检查头中的内容。头中有一些 `if`/`else` 结构用于对设备类型进行基本检测。Android\
  \ 有一个特殊情况，因为它可能是平板电脑或移动设备。当过滤器确定设备类型后，该类型将作为请求属性存储，以便其他组件可以使用。接下来，有一个控制器和 JSP 页面来显示一些关于当前状态的信息。该控制器只是定向到位于\
  \ `WEB-INF/views` 目录中的 `home.jsp` 页面。配置好的 `InternalResourceViewResolver` 负责将名称解析为实际的\
  \ JSP 页面（更多信息，请参考第 4 章中的方法）。\n\n\n\n```\npackage com.apress.springrecipes.mobile.web;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import javax.servlet.http.HttpServletRequest;\n@Controller\npublic class HomeController\
  \ {\n@RequestMapping(\"/home\")\npublic String index(HttpServletRequest request)\
  \ {\nreturn \"home\";\n}\n}\n```\n\n以下是 `home.jsp` 页面：\n\n```\n\n欢迎\n\n您的 User-Agent\
  \ 标头：\n\n您的设备类型：\n\n```\n\nJSP 页面显示了 `User-Agent` 标头（如果有）以及设备类型，该类型由您自己的 `DeviceResolverRequestFilter`\
  \ 确定。\n\n最后，这是配置和引导逻辑：\n\n```\npackage com.apress.springrecipes.mobile.web.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.ViewResolver;\n\
  import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport org.springframework.web.servlet.view.InternalResourceView;\n\
  import org.springframework.web.servlet.view.InternalResourceViewResolver;\n@Configuration\n\
  @ComponentScan(\"com.apress.springrecipes.mobile.web\")\npublic class MobileConfiguration\
  \ {\n@Bean\npublic ViewResolver viewResolver() {\nInternalResourceViewResolver viewResolver\
  \ = new InternalResourceViewResolver();\nviewResolver.setPrefix(\"/WEB-INF/views/\"\
  );\nviewResolver.setSuffix(\".jsp\");\nreturn viewResolver;\n}\n}\n```\n\n控制器由 `@ComponentScan`\
  \ 注解自动扫描。为了引导应用程序，存在 `MobileApplicationInitializer`，它负责引导 `DispatcherServlet` 和可选的\
  \ `ContextLoaderListener`。\n\n```\npackage com.apress.springrecipes.mobile.web;\n\
  import com.apress.springrecipes.mobile.web.config.MobileConfiguration;\nimport com.apress.springrecipes.mobile.web.filter.DeviceResolverRequestFilter;\n\
  import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;\n\
  import javax.servlet.Filter;\npublic class MobileApplicationInitializer extends\
  \ AbstractAnnotationConfigDispatcherServletInitializer {\n@Override\nprotected Class[]\
  \ getRootConfigClasses() {\nreturn null;\n}\n@Override\nprotected Class[] getServletConfigClasses()\
  \ {\nreturn new Class[] { MobileConfiguration.class };\n}\n@Override\nprotected\
  \ Filter[] getServletFilters() {\nreturn new Filter[] {new DeviceResolverRequestFilter()};\n\
  }\n@Override\nprotected String[] getServletMappings() {\nreturn new String[] {\"\
  /\"};\n}\n}\n```\n\n这里需要注意两点。首先，前面提到的配置类通过实现 `getServletConfigClasses` 方法传递给 `DispatcherServlet`。其次，`getServletFilters`\
  \ 方法的实现负责注册过滤器并将其映射到 `DispatcherServlet`。部署应用程序后，使用 `http://localhost:8080/mobile/home`\
  \ 将显示 `User-Agent` 值以及过滤器认为的设备类型（参见图 8-1）。\n\n![A314861_4_En_8_Fig1_HTML.jpg](img/A314861_4_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 在 Chrome 中查看应用程序\n\n在 iMac 上使用 Chrome 会产生如图 8-1 所示的结果。当使用 iPhone 时，看起来像图\
  \ 8-2。\n\n![A314861_4_En_8_Fig2_HTML.jpg](img/A314861_4_En_8_Fig2_HTML.jpg)\n\n\
  图 8-2. 使用 iPhone 4 查看应用程序\n\n注意\n\n要测试不同的浏览器，您可以使用内部网络上的平板电脑或移动设备，或者使用浏览器插件，例如 Chrome\
  \ 或 Firefox 的 User-Agent Switcher。\n\n尽管过滤器完成了它的工作，但它远非完美。例如，某些移动设备不匹配规则（Kindle\
  \ Fire 的标头与普通 Kindle 设备不同）。维护规则和设备列表，或者用许多设备进行测试也相当困难。使用像 Spring Mobile 这样的库比自己动手做要容易得多。\n\
  \n8-2. 使用 Spring Mobile 检测设备\n\n问题\n\n您想要检测连接到您网站的设备的类型，并希望使用 Spring Mobile 来帮助您实现这一点。\n\
  \n解决方案\n\n使用 Spring Mobile 的 `DeviceResolver` 和辅助类，通过配置 `DeviceResolverRequestFilter`\
  \ 或 `DeviceResolverHandlerInterceptor` 来确定设备类型。\n\n工作原理\n\n`DeviceResolverRequestFilter`\
  \ 和 `DeviceResolverHandlerInterceptor` 都将设备类型的检测委托给 `DeviceResolver` 类。Spring Mobile\
  \ 提供了该接口的一个实现，名为 `LiteDeviceResolver`。`DeviceResolver` 类返回一个 `Device` 对象，该对象指示设备类型。此\
  \ `Device` 对象作为请求属性存储，以便在后续链中使用。Spring Mobile 附带了一个 `Device` 接口的默认实现 `LiteDevice`。\n\
  \n使用 DeviceResolverRequestFilter\n\n使用 `DeviceResolverRequestFilter` 只需将其添加到 Web\
  \ 应用程序，并将其映射到您希望它处理的 Servlet 或请求即可。对于您的应用程序，这意味着将其添加到 `getServletFilters` 方法中。使用此过滤器的优点是，即使在基于\
  \ Spring 的应用程序之外也可以使用它。例如，它可以在基于 JSF 的应用程序中使用。\n\n```\npackage com.apress.springrecipes.mobile.web;\n\
  ...\nimport org.springframework.mobile.device.DeviceResolverRequestFilter;\npublic\
  \ class MobileApplicationInitializer extends AbstractAnnotationConfigDispatcherServletInitializer\
  \ {\n...\n@Override\nprotected Filter[] getServletFilters() {\nreturn new Filter[]\
  \ {new DeviceResolverRequestFilter()};\n}\n}\n```\n\n此配置注册了 `DeviceResolverRequestFilter`，并将自动将其附加到由\
  \ `DispatcherServlet` 处理的请求。要测试这一点，请向 `http://localhost:8080/mobile/home` 发出请求，它应该显示如下内容：\n\
  \n![A314861_4_En_8_Fig3_HTML.jpg](img/A314861_4_En_8_Fig3_HTML.jpg)\n\n设备的输出是 Spring\
  \ Mobile 提供的 `LiteDevice` 类上 `toString` 方法创建的文本。\n\n使用 DeviceResolverHandlerInterceptor\n\
  \n在基于 Spring MVC 的应用程序中使用 Spring Mobile 时，使用 `DeviceResolverHandlerInterceptor`\
  \ 更容易。这需要在您的配置类中进行配置，并使用 `addInterceptors` 辅助方法进行注册。\n\n```\npackage com.apress.springrecipes.mobile.web.config;\n\
  import org.springframework.mobile.device.DeviceResolverHandlerInterceptor;\nimport\
  \ org.springframework.web.servlet.config.annotation.InterceptorRegistry;\nimport\
  \ org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(\"com.apress.springrecipes.mobile.web\")\npublic class\
  \ MobileConfiguration extends WebMvcConfigurerAdapter {\n...\n@Override\npublic\
  \ void addInterceptors(InterceptorRegistry registry) {\nregistry.addInterceptor(new\
  \ DeviceResolverHandlerInterceptor());\n}\n}\n```\n\n`MobileConfiguration` 类继承自\
  \ `WebMvcConfigurerAdapter`，您可以重写 `addInterceptors` 方法。所有添加到注册表中的拦截器都将被添加到应用程序上下文中的\
  \ `HandlerMapping` Bean 中。当应用程序部署并向 `http://localhost:8080/mobile/home` 发出请求时，结果应与使用过滤器时相同。\n\
  \n8-3. 使用站点偏好设置\n\n问题\n\n您希望允许用户选择他们使用设备访问的站点类型，并存储此信息以供将来参考。\n\n解决方案\n\n使用 Spring\
  \ Mobile 提供的 `SitePreference` 支持。\n\n工作原理\n\n`SitePreferenceRequestFilter` 和 `SitePreferenceHandlerInterceptor`\
  \ 都将当前 `SitePreference` 的检索委托给 `SitePreferenceHandler` 对象。默认实现使用 `SitePreferenceRepository`\
  \ 类来存储偏好设置；默认情况下，这存储在 Cookie 中。\n\n使用 SitePreferenceRequestFilter\n\n\n\n使用 `SitePreferenceRequestFilter`\n\
  只需将其添加到 Web 应用程序中，并映射到您希望它处理的 Servlet 或请求即可。对于您的应用程序而言，这意味着将其添加到 `getServletFilters`\n\
  方法中。使用过滤器的一个优势是，即使在非基于 Spring 的应用程序中也可以使用它。它同样可以用于基于 JSF 的应用程序。\n\n```\npackage\
  \ com.apress.springrecipes.mobile.web;\nimport org.springframework.mobile.device.site.SitePreferenceRequestFilter;\n\
  ...\npublic class MobileApplicationInitializer extends AbstractAnnotationConfigDispatcherServletInitializer\
  \ {\n@Override\nprotected Filter[] getServletFilters() {\nreturn new Filter[] {\n\
  new DeviceResolverRequestFilter(),\nnew SitePreferenceRequestFilter()};\n}\n...\n\
  }\n```\n\n现在，`SitePreferenceRequestFilter`\n已注册，它将检查传入的请求。如果请求包含名为 `site_preference`\
  \ 的参数，它将使用传入的值（`NORMAL`、`MOBILE` 或 `TABLET`）来设置\n`SitePreference`\n值。确定的值会存储在 Cookie\
  \ 中，并供后续参考使用；如果检测到新值，Cookie 值将被重置。\n修改 `home.jsp` 页面，使其包含以下内容，以便显示当前的 `SitePreference`\
  \ 值：\n\n```\n您的站点偏好设置\n\n```\n\n现在，使用 URL `http://localhost:8080/mobile/home?site_preference=TABLET`\n\
  打开页面，会将 `SitePreference` 值\n设置为 `TABLET`。\n\n使用 SitePreferenceHandlerInterceptor\n\
  \n在基于 Spring MVC 的应用程序中使用 Spring Mobile 时，使用 `SitePreferenceHandlerInterceptor`\n\
  会更加方便。这需要在您的配置类中进行配置，并通过\n`addInterceptors`\n辅助方法进行注册。\n\n```\npackage com.apress.springrecipes.mobile.web.config;\n\
  import org.springframework.mobile.device.DeviceResolverHandlerInterceptor;\nimport\
  \ org.springframework.mobile.device.site. SitePreferenceHandlerInterceptor;\nimport\
  \ org.springframework.web.servlet.config.annotation.InterceptorRegistry;\nimport\
  \ org.springframework.web.servlet.config.annotation.WebMvcConfigurerAdapter;\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(\"com.apress.springrecipes.mobile.web\")\npublic class\
  \ MobileConfiguration extends WebMvcConfigurerAdapter {\n...\n@Override\npublic\
  \ void addInterceptors(InterceptorRegistry registry) {\nregistry.addInterceptor(new\
  \ DeviceResolverHandlerInterceptor());\nregistry.addInterceptor(new SitePreferenceHandlerInterceptor());\n\
  }\n}\n```\n\n`MobileConfiguration`\n类继承了 `WebMvcConfigurerAdapter`\n，您可以重写 `addInterceptors`\n\
  方法。所有添加到注册表中的拦截器都会被添加到应用程序上下文中的\n`HandlerMapping`\nBean 中。当应用程序部署后，向 `http://localhost:8080/mobile/home?site_preference=TABLET`\
  \ 发起请求时，其结果应与上一节中过滤器的结果相同。\n\n8-4. 使用设备信息渲染视图\n\n问题\n\n您希望根据设备或站点偏好设置来渲染不同的视图。\n\
  \n解决方案\n\n使用当前的 `Device` 和 `SitePreferences`\n对象来决定渲染哪个视图。这可以手动完成，也可以通过使用 `LiteDeviceDelegatingViewResolver`\n\
  来实现。\n\n工作原理\n\n现在，已知设备类型，就可以利用它来为您服务。首先，为每种支持的设备类型创建一些额外的视图，并将它们分别放置在\n`WEB-INF/views`\
  \ 下的 `mobile` 或 `tablet` 目录中。以下是 `mobile/home.jsp` 的源代码：\n\n```\n\n欢迎移动设备用户\n\n\
  您的 User-Agent 标头：\n\n您的设备类型：\n\n您的站点偏好设置\n\n```\n\n以下是 `tablet/home.jsp` 的源代码：\n\
  \n```\n\n欢迎平板设备用户\n\n您的 User-Agent 标头：\n\n您的设备类型：\n\n您的站点偏好设置\n\n```\n\n现在，不同的视图已经就位，您需要找到一种方法来根据检测到的设备值渲染它们。一种方法是手动从请求中获取当前设备，并使用它来决定渲染哪个视图。\n\
  \n```\npackage com.apress.springrecipes.mobile.web;\nimport org.springframework.mobile.device.Device;\n\
  import org.springframework.mobile.device.DeviceUtils;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport javax.servlet.http.HttpServletRequest;\n\
  @Controller\npublic class HomeController {\n@RequestMapping(\"/home\")\npublic String\
  \ index(HttpServletRequest request) {\nDevice device = DeviceUtils.getCurrentDevice(request);\n\
  if (device.isMobile()) {\nreturn \"mobile/home\";\n} else if (device.isTablet())\
  \ {\nreturn \"tablet/home\";\n} else {\nreturn \"home\";\n}\n}\n}\n```\n\nSpring\
  \ Mobile 提供了一个 `DeviceUtils` 类，可用于检索当前设备。当前设备是从一个请求属性（`currentDevice`）中检索的，该属性由过滤器或拦截器设置。设备值可用于决定渲染哪个视图。\n\
  \n在每个需要设备的方法中获取设备并不十分方便。如果能将其作为方法参数传递给控制器方法，则会简单得多。为此，您可以使用 `DeviceHandlerMethodArgumentResolver`，注册后，它会将方法参数解析为当前设备。要检索当前的\
  \ `SitePreference` 值，您可以添加一个 `SitePreferenceHandlerMethodArgumentResolver` 类。\n\n\
  ```\npackage com.apress.springrecipes.mobile.web.config;\nimport org.springframework.mobile.device.DeviceHandlerMethodArgumentResolver;\n\
  ...\nimport java.util.List;\n@Configuration\n@EnableWebMvc\n@ComponentScan(\"com.apress.springrecipes.mobile.web\"\
  )\npublic class MobileConfiguration extends WebMvcConfigurerAdapter {\n...\n@Override\n\
  public void addArgumentResolvers(List argumentResolvers) {\nargumentResolvers.add(new\
  \ DeviceHandlerMethodArgumentResolver());\nargumentResolvers.add(new SitePreferenceHandlerMethodArgumentResolver());\n\
  }\n}\n```\n\n现在，这些解析器已注册，控制器方法可以简化，并且 `Device` 值可以作为方法参数传入。\n\n```\npackage com.apress.springrecipes.mobile.web;\n\
  import org.springframework.mobile.device.Device;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport javax.servlet.http.HttpServletRequest;\n\
  @Controller\npublic class HomeController {\n@RequestMapping(\"/home\")\npublic String\
  \ index(Device device) {\nif (device.isMobile()) {\nreturn \"mobile/home\";\n} else\
  \ if (device.isTablet()) {\nreturn \"tablet/home\";\n} else {\nreturn \"home\";\n\
  }\n}\n}\n```\n\n方法签名从接收 `HttpServletRequest` 值变为了接收 `Device` 值。这处理了查找逻辑，并将传入当前设备。然而，虽然这比手动检索更方便，但这仍然是一种相当过时的决定渲染哪个视图的方式。目前，偏好设置并未被考虑在内，但可以将其添加到方法签名中，并用于确定偏好。然而，这会使检测算法变得复杂。想象一下，在多个控制器方法中重复这样的代码，很快就会变成维护噩梦。\n\
  \nSpring Mobile 提供了一个 `LiteDeviceDelegatingViewResolver` 类，在视图名称传递给实际的视图解析器之前，可以使用它来为视图名称添加额外的前缀和/或后缀。它还会考虑用户的可选站点偏好设置。\n\
  \n\n\n```\npackage com.apress.springrecipes.mobile.web.config;\nimport org.springframework.mobile.device.view.LiteDeviceDelegatingViewResolver;\n\
  ...\n@Configuration\n@EnableWebMvc\n@ComponentScan(\"com.apress.springrecipes.mobile.web\"\
  )\npublic class MobileConfiguration extends WebMvcConfigurerAdapter {\n...\n@Bean\n\
  public ViewResolver viewResolver() {\nInternalResourceViewResolver viewResolver\
  \ = new InternalResourceViewResolver();\nviewResolver.setPrefix(\"/WEB-INF/views/\"\
  );\nviewResolver.setSuffix(\".jsp\");\nviewResolver.setOrder(2);\nreturn viewResolver;\n\
  }\n@Bean\npublic ViewResolver mobileViewResolver() {\nLiteDeviceDelegatingViewResolver\
  \ delegatingViewResolver =\nnew LiteDeviceDelegatingViewResolver(viewResolver());\n\
  delegatingViewResolver.setOrder(1);\ndelegatingViewResolver.setMobilePrefix(\"mobile/\"\
  );\ndelegatingViewResolver.setTabletPrefix(\"tablet/\");\nreturn delegatingViewResolver;\n\
  }\n}\n```\n\n`LiteDeviceDelegatingViewResolver`\n     接受一个委托视图解析器作为构造函数参数；之前配置的\
  \ `InternalResourceViewResolver`\n被作为委托传入。另外，请注意视图解析器的顺序；你必须确保 `LiteDeviceDelegatingViewResolver`\n\
  在任何其他视图解析器之前执行。这样，它才有机会判断特定设备是否存在自定义视图。接下来，注意配置中移动设备的视图位于 `mobile` 目录下，而平板设备的视图位于\
  \ `tablet` 目录下。为了将这些目录添加到视图名称中，这些设备类型的前缀被设置为各自的目录。现在，当控制器返回 `home` 作为移动设备要选择的视图名称时，它将被转换为\
  \ `mobile/home`。这个修改后的名称被传递给 `InternalResourceViewResolver`，后者将其转换为 `/WEB-INF/views/mobile/home.jsp`，即你实际想要渲染的页面。\n\
  \n```\npackage com.apress.springrecipes.mobile.web;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\n@Controller\npublic\
  \ class HomeController {\n@RequestMapping(\"/home\")\npublic String index() {\n\
  return \"home\";\n}\n}\n```\n\n控制器现在非常简洁。它只关心返回视图的名称。渲染哪个视图的决定权留给了配置好的视图解析器。`LiteDeviceDelegatingViewResolver`\n\
  在找到 `SitePreferences` 值时，会将其纳入考虑。\n\n8-5\\. 实现站点切换\n\n问题\n\n你的移动站点托管在与普通网站不同的 URL\
  \ 上。\n\n解决方案\n\n使用 Spring Mobile 的站点切换\n支持，重定向到网站中适当的部分。\n\n工作原理\n\nSpring Mobile\
  \ 提供了一个 `SiteSwitcherHandlerInterceptor`\n类，你可以使用它根据检测到的 `Device` 值切换到网站的移动版本。要配置\
  \ `SiteSwitcherHandlerInterceptor`，有几个工厂方法提供了即用型设置（参见表 8-1）。\n\n表 8-1.\n\n`SiteSwitcherHandlerInterceptor`\
  \ 上的工厂方法概览\n\n| 工厂方法 | 描述 |\n| --- | --- |\n| `mDot` | 重定向到以 `m.` 开头的域名；例如，[`http://www.yourdomain.com`](http://www.yourdomain.com)\
  \ 将重定向到 [`http://m.yourdomain.com`](http://m.yourdomain.com)。 |\n| `dotMobi` | 重定向到以\
  \ `.mobi` 结尾的域名。对 [`http://www.yourdomain.com`](http://www.yourdomain.com) 的请求将重定向到\
  \ [`http://www.yourdomain.mobi`](http://www.yourdomain.mobi)。 |\n| `urlPath` | 为不同设备设置不同的上下文根。这将重定向到该设备配置的\
  \ URL 路径。例如，[`http://www.yourdomain.com`](http://www.yourdomain.com) 可以重定向到 [`http://www.yourdomain.com/mobile`](http://www.yourdomain.com/mobile)。\
  \ |\n| `standard` | 这是最灵活的可配置工厂方法，允许你为网站的移动版、平板版和普通版指定要重定向到的域名。 |\n\n`SiteSwitcherHandlerInterceptor`\n\
  还提供了使用站点首选项的能力。使用 `SiteSwitcherHandlerInterceptor` 时，你不再需要注册 `SitePreferencesHandlerInterceptor`，因为这已经处理好了。配置就像将其添加到要应用的拦截器列表中一样简单；唯一要记住的是，你需要将其放在\
  \ `DeviceResolverHandlerInterceptor` 之后，因为需要设备信息来计算重定向 URL。\n\n```\npackage com.apress.springrecipes.mobile.web.config;\n\
  ...\nimport org.springframework.mobile.device.switcher.SiteSwitcherHandlerInterceptor;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(\"com.apress.springrecipes.mobile.web\"\
  )\npublic class MobileConfiguration extends WebMvcConfigurerAdapter {\n@Override\n\
  public void addInterceptors(InterceptorRegistry registry) {\nregistry.addInterceptor(new\
  \ DeviceResolverHandlerInterceptor());\nregistry.addInterceptor(siteSwitcherHandlerInterceptor());\n\
  }\n@Bean\npublic SiteSwitcherHandlerInterceptor siteSwitcherHandlerInterceptor()\
  \ {\nreturn SiteSwitcherHandlerInterceptor.mDot(\"yourdomain.com\", true);\n}\n\
  ...\n}\n```\n\n注意在 `SiteSwitcherHandlerInterceptor` 的 bean 声明中，使用了工厂方法 `mDot` 来创建实例。该方法接受两个参数。第一个是要使用的基础域名，第二个是一个布尔值，指示是否应将平板设备视为移动设备。默认值为\
  \ `false`。此配置将导致来自移动设备的请求从普通网站重定向到 `m.yourdomain.com`。\n\n```\n@Bean\npublic SiteSwitcherHandlerInterceptor\
  \ siteSwitcherHandlerInterceptor() {\nreturn SiteSwitcherHandlerInterceptor.dotMobi(\"\
  yourdomain.com\", true);\n}\n```\n\n上述配置使用了 `dotMobi` 工厂方法，它接受两个参数。第一个是要使用的基础域名，第二个是一个布尔值，指示是否将平板设备视为移动设备；默认值为\
  \ `false`。这将导致来自移动设备的请求从你的普通网站重定向到 `yourdomain.mobi`。\n\n```\n@Bean\npublic SiteSwitcherHandlerInterceptor\
  \ siteSwitcherHandlerInterceptor() {\nreturn SiteSwitcherHandlerInterceptor.urlPath(\"\
  /mobile\", \"/tablet\", \"/home\");\n}\n```\n\n上述配置使用了带有三个参数的 `urlPath` 工厂方法。第一个参数是移动设备的上下文根，第二个是平板设备的上下文根。最后一个参数是你的应用程序的根路径。`urlPath`\
  \ 工厂方法还有另外两种变体：一种只接受移动设备的路径，另一种接受移动设备的路径和根路径。上述配置将导致来自移动设备的请求被重定向到 `yourdomain.com/home/mobile`，来自平板设备的请求被重定向到\
  \ `yourdomain.com/home/tablet`。\n\n最后，还有标准工厂方法，它是最灵活且配置最详尽的。\n\n```\n@Bean\npublic\
  \ SiteSwitcherHandlerInterceptor siteSwitcherHandlerInterceptor() {\nreturn SiteSwitcherHandlerInterceptor\n\
  .standard(\"yourdomain.com\", \"mobile.yourdomain.com\",\n\"tablet.yourdomain.com\"\
  , \"*.yourdomain.com\");\n}\n```\n\n上述配置使用了 `standard` 工厂方法。它为网站的普通版、移动版和平板版指定了不同的域名。最后，它指定了用于存储站点首选项的\
  \ cookie 的域名。由于指定了不同的子域名，因此需要这样做。\n\n`standard` 工厂方法还有其他几种变体，允许对前面展示的配置进行子集配置。\n\
  \n总结\n\n\n\n在本章中，您学习了如何使用 Spring Mobile，它可以检测请求页面的设备，并允许用户根据偏好选择特定页面。您学习了如何通过 `DeviceResolverRequestFilter`\
  \ 或 `DeviceResolverHandlerInterceptor` 检测用户设备。还学习了如何使用 `SitePreferences` 允许用户覆盖检测到的设备。接着，您了解了如何利用设备信息和偏好为该设备渲染视图。最后，您学习了如何根据用户设备或站点偏好将用户重定向到网站的不同部分。\n\
  \n## 9. 数据访问\n\n在本章中，您将学习 Spring 如何简化数据库访问任务（Spring 还能简化 NoSQL 和大数据任务，这些内容将在第 12\
  \ 章中介绍）。数据访问是大多数企业应用程序的常见需求，通常需要访问存储在关系数据库中的数据。作为 Java SE 的重要组成部分，Java 数据库连接（JDBC）定义了一套标准\
  \ API，使您能够以与供应商无关的方式访问关系数据库。\n\nJDBC 的目的是提供 API，通过这些 API 您可以对数据库执行 SQL 语句。然而，使用\
  \ JDBC 时，您必须自行管理数据库相关资源并显式处理数据库异常。为了使 JDBC 更易于使用，Spring 提供了一个用于与 JDBC 交互的抽象框架。作为\
  \ Spring JDBC 框架的核心，JDBC 模板旨在为不同类型的 JDBC 操作提供模板方法。每个模板方法负责控制整体流程，并允许您覆盖流程中的特定任务。\n\
  \n如果原始 JDBC 无法满足您的需求，或者您认为应用程序可以从更高级别的抽象中受益，那么 Spring 对对象关系映射（ORM）解决方案的支持将引起您的兴趣。在本章中，您还将学习如何将\
  \ ORM 框架集成到 Spring 应用程序中。Spring 支持大多数流行的 ORM（或数据映射器）框架，包括 Hibernate、JDO、iBATIS 和\
  \ Java 持久化 API（JPA）。从 Spring 3.0 开始不再支持经典的 TopLink（当然，JPA 实现仍然受支持）。然而，JPA 支持因多种\
  \ JPA 实现而异，包括基于 Hibernate 和 TopLink 的版本。本章将重点介绍 Hibernate 和 JPA。不过，Spring 对 ORM\
  \ 框架的支持是一致的，因此您可以轻松地将本章中的技术应用于其他 ORM 框架。\n\nORM 是一种将对象持久化到关系数据库中的现代技术。ORM 框架根据您提供的映射元数据（基于\
  \ XML 或注解），例如类与表、属性与列之间的映射等，来持久化您的对象。它在运行时生成用于对象持久化的 SQL 语句，因此除非您想利用数据库特定功能或提供自己优化的\
  \ SQL 语句，否则无需编写特定于数据库的 SQL 语句。因此，您的应用程序将独立于数据库，并且将来可以轻松迁移到其他数据库。与直接使用 JDBC 相比，ORM\
  \ 框架可以显著减少应用程序的数据访问工作量。\n\nHibernate 是 Java 社区中流行的开源高性能 ORM 框架。Hibernate 支持大多数符合\
  \ JDBC 规范的数据库，并可以使用特定方言访问特定数据库。除了基本的 ORM 功能外，Hibernate 还支持更高级的功能，如缓存、级联和延迟加载。它还定义了一种称为\
  \ Hibernate 查询语言（HQL）的查询语言，供您编写简单而强大的对象查询。\n\nJPA 定义了一套标准的注解和 API，用于在 Java SE 和\
  \ Java EE 平台上进行对象持久化。JPA 被定义为 JSR-220 中 EJB 规范的一部分。JPA 只是一套标准 API，需要符合 JPA 规范的引擎来提供持久化服务。您可以将\
  \ JPA 与 JDBC API 进行比较，将 JPA 引擎与 JDBC 驱动程序进行比较。Hibernate 可以通过一个名为 Hibernate EntityManager\
  \ 的扩展模块配置为符合 JPA 规范的引擎。本章将主要演示以 Hibernate 作为底层引擎的 JPA。\n\n## 直接使用 JDBC 的问题\n\n假设您要开发一个车辆注册应用程序，其主要功能是对车辆记录进行基本的创建、读取、更新和删除（CRUD）操作。这些记录将存储在关系数据库中，并通过\
  \ JDBC 访问。首先，您设计以下 `Vehicle` 类，它在 Java 中表示一辆车：\n\n```\npackage com.apress.springrecipes.vehicle;\n\
  public class Vehicle {\nprivate String vehicleNo;\nprivate String color;\nprivate\
  \ int wheel;\nprivate int seat;\n// 构造方法、Getter 和 Setter\n...\n}\n```\n\n## 设置应用程序数据库\n\
  \n在开发车辆注册应用程序之前，您必须为其设置数据库。我们选择了 PostgreSQL 作为数据库引擎。PostgreSQL 是一个开源的关系数据库引擎（连接属性见表\
  \ 9-1）。\n\n**表 9-1.** 连接应用程序数据库的 JDBC 属性\n\n| 属性 | 值 |\n| --- | --- |\n| 驱动类 | `org.postgresql.Driver`\
  \ |\n| URL | `jdbc:postgresql://localhost:5432/vehicle` |\n| 用户名 | `postgres` |\n\
  | 密码 | `password` |\n\n**注意**\n\n本章的示例代码在 `bin` 目录中提供了用于启动和连接到基于 Docker 的 PostgreSQL\
  \ 实例的脚本。要启动实例并创建数据库，请按照以下步骤操作：\n\n1.  执行 `bin\\postgres.sh`；这将下载并启动 Postgres Docker\
  \ 容器。\n2.  执行 `bin\\psql.sh`；这将连接到正在运行的 Postgres 容器。\n3.  执行 `CREATE DATABASE vehicle`\
  \ 以创建用于示例的数据库。\n4.  接下来，您必须使用以下 SQL 语句创建用于存储车辆记录的 `VEHICLE` 表。\n\n```\n    CREATE\
  \ TABLE VEHICLE (\n    VEHICLE_NO    VARCHAR(10)    NOT NULL,\n    COLOR       \
  \  VARCHAR(10),\n    WHEEL         INT,\n    SEAT          INT,\n    PRIMARY KEY\
  \ (VEHICLE_NO)\n    );\n```\n\n## 理解数据访问对象设计模式\n\n一个典型的设计错误是将不同类型的逻辑（例如，表示逻辑、业务逻辑和数据访问逻辑）混合在单个大型模块中。这由于引入了紧密耦合而降低了模块的可重用性和可维护性。数据访问对象（DAO）模式的通用目的是通过将数据访问逻辑与业务逻辑和表示逻辑分离来避免这些问题。该模式建议将数据访问逻辑封装在称为数据访问对象的独立模块中。\n\
  \n对于您的车辆注册应用程序，您可以抽象出插入、更新、删除和查询车辆的数据访问操作。这些操作应在 DAO 接口中声明，以允许使用不同的 DAO 实现技术。\n\n\
  ```\npackage com.apress.springrecipes.vehicle;\nimport java.util.List;\npublic interface\
  \ VehicleDao {\nvoid insert(Vehicle vehicle);\nvoid insert(Iterable vehicles);\n\
  void update(Vehicle vehicle);\nvoid delete(Vehicle vehicle);\nVehicle findByVehicleNo(String\
  \ vehicleNo);\nList findAll();\n}\n```\n\n\n\nJDBC API 的大部分方法都声明抛出 `java.sql.SQLException`。\n\
  但由于该接口旨在抽象数据访问操作，\n它不应依赖于具体实现技术。因此，这个通用接口声明抛出 JDBC 特有的\n`SQLException` 是不明智的。实现\
  \ DAO 接口时的常见做法是将此类异常包装为运行时异常（可以是自定义的业务 `Exception` 子类，也可以是通用异常）。\n\n使用 JDBC 实现 DAO\n\
  \n要使用 JDBC 访问数据库，你需要为该 DAO 接口创建一个实现类（例如 `JdbcVehicleDao`）。\n由于 DAO 实现需要连接数据库以执行\
  \ SQL 语句，你可以通过指定驱动类名、数据库 URL、用户名和密码来建立数据库连接。\n不过，你也可以从预配置的 `javax.sql.DataSource`\
  \ 对象中获取数据库连接，而无需了解连接细节。\n\n```\npackage com.apress.springrecipes.vehicle;\nimport\
  \ javax.sql.DataSource;\nimport java.sql.Connection;\nimport java.sql.PreparedStatement;\n\
  import java.sql.ResultSet;\nimport java.sql.SQLException;\nimport java.util.ArrayList;\n\
  import java.util.Collection;\nimport java.util.List;\npublic class PlainJdbcVehicleDao\
  \ implements VehicleDao {\nprivate static final String INSERT_SQL     = \"INSERT\
  \ INTO VEHICLE (COLOR, WHEEL, SEAT, VEHICLE_NO) VALUES (?, ?, ?, ?)\";\nprivate\
  \ static final String UPDATE_SQL     = \"UPDATE VEHICLE SET COLOR=?,WHEEL=?,SEAT=?\
  \ WHERE VEHICLE_NO=?\";\nprivate static final String SELECT_ALL_SQL = \"SELECT *\
  \ FROM VEHICLE\";\nprivate static final String SELECT_ONE_SQL  = \"SELECT * FROM\
  \ VEHICLE WHERE VEHICLE_NO = ?\";\nprivate static final String DELETE_SQL     =\
  \ \"DELETE FROM VEHICLE WHERE VEHICLE_NO=?\";\nprivate final DataSource dataSource;\n\
  public PlainJdbcVehicleDao(DataSource dataSource) {\nthis.dataSource = dataSource;\n\
  }\n@Override\npublic void insert(Vehicle vehicle) {\ntry (Connection conn = dataSource.getConnection();\n\
  PreparedStatement ps = conn.prepareStatement(INSERT_SQL)) {\nprepareStatement(ps,\
  \ vehicle);\nps.executeUpdate();\n} catch (SQLException e) {\nthrow new RuntimeException(e);\n\
  }\n}\n@Override\npublic void insert(Collection vehicles) {\nvehicles.forEach(this::insert);\n\
  }\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\ntry (Connection\
  \ conn = dataSource.getConnection();\nPreparedStatement ps = conn.prepareStatement(SELECT_ONE_SQL))\
  \ {\nps.setString(1, vehicleNo);\nVehicle vehicle = null;\ntry (ResultSet rs = ps.executeQuery())\
  \ {\nif (rs.next()) {\nvehicle = toVehicle(rs);\n}\n}\nreturn vehicle;\n} catch\
  \ (SQLException e) {\nthrow new RuntimeException(e);\n}\n}\n@Override\npublic List\
  \ findAll() {\ntry (Connection conn = dataSource.getConnection();\nPreparedStatement\
  \ ps = conn.prepareStatement(SELECT_ALL_SQL);\nResultSet rs = ps.executeQuery())\
  \ {\nList vehicles = new ArrayList();\nwhile (rs.next()) {\nvehicles.add(toVehicle(rs));\n\
  }\nreturn vehicles;\n} catch (SQLException e) {\nthrow new RuntimeException(e);\n\
  }\n}\nprivate Vehicle toVehicle(ResultSet rs) throws SQLException {\nreturn new\
  \ Vehicle(rs.getString(\"VEHICLE_NO\"),\nrs.getString(\"COLOR\"), rs.getInt(\"WHEEL\"\
  ),\nrs.getInt(\"SEAT\"));\n}\nprivate void prepareStatement(PreparedStatement ps,\
  \ Vehicle vehicle) throws SQLException {\nps.setString(1, vehicle.getColor());\n\
  ps.setInt(2, vehicle.getWheel());\nps.setInt(3, vehicle.getSeat());\nps.setString(4,\
  \ vehicle.getVehicleNo());\n}\n@Override\npublic void update(Vehicle vehicle) {\
  \ ... }\n@Override\npublic void delete(Vehicle vehicle) { ... }\n}\n```\n\n车辆插入操作是一个典型的\
  \ JDBC 更新场景。每次调用此方法时，你都会从数据源获取一个连接，并在此连接上执行 SQL 语句。你的 DAO 接口没有声明抛出任何受检异常，因此如果发生\
  \ `SQLException`，你必须将其包装为非受检的 `RuntimeException`。（本章稍后会详细讨论 DAO 中的异常处理。）此处展示的代码使用了所谓的\
  \ try-with-resources 机制，该机制会自动关闭已使用的资源（即 `Connection`、`PreparedStatement` 和 `ResultSet`）。如果你不使用\
  \ try-with-resources 块，则必须记住正确关闭已使用的资源；否则会导致连接泄漏。\n\n此处将跳过更新和删除操作，因为从技术角度来看，它们与插入操作非常相似。对于查询操作，除了执行\
  \ SQL 语句外，你还需要从返回的结果集中提取数据以构建车辆对象。`toVehicle` 方法是一个简单的辅助方法，用于复用映射逻辑，而 `prepareStatement`\
  \ 方法则用于帮助设置插入和更新方法的参数。\n\n在 Spring 中配置数据源\n\n`javax.sql.DataSource` 接口是 JDBC 规范定义的一个标准接口，用于工厂化生产\
  \ `Connection` 实例。不同供应商和项目提供了多种数据源实现；HikariCP 和 Apache Commons DBCP 是流行的开源选择，大多数应用服务器也会提供自己的实现。由于它们都实现了通用的\
  \ `DataSource` 接口，因此在不同数据源实现之间切换非常容易。作为 Java 应用框架，Spring 也提供了几个便捷但功能较弱的数据源实现。最简单的是\
  \ `DriverManagerDataSource`，它会在每次请求时打开一个新连接。\n\n```\npackage com.apress.springrecipes.vehicle.config;\n\
  import com.apress.springrecipes.vehicle.PlainJdbcVehicleDao;\nimport com.apress.springrecipes.vehicle.VehicleDao;\n\
  import org.apache.derby.jdbc.ClientDriver;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jdbc.datasource.DriverManagerDataSource;\n\
  import javax.sql.DataSource;\n@Configuration\npublic class VehicleConfiguration\
  \ {\n@Bean\npublic VehicleDao vehicleDao() {\nreturn new PlainJdbcVehicleDao(dataSource());\n\
  }\n@Bean\npublic DataSource dataSource() {\nDriverManagerDataSource dataSource =\
  \ new DriverManagerDataSource();\ndataSource.setDriverClassName(ClientDriver.class.getName());\n\
  dataSource.setUrl(\"jdbc:derby://localhost:1527/vehicle;create=true\");\ndataSource.setUsername(\"\
  app\");\ndataSource.setPassword(\"app\");\nreturn dataSource;\n}\n}\n```\n\n`DriverManagerDataSource`\
  \ 不是一个高效的数据源实现，因为它每次被请求时都会为客户端打开一个新连接。Spring 提供的另一个数据源实现是 `SingleConnectionDataSource`（`DriverManagerDataSource`\
  \ 的子类）。顾名思义，它只维护一个连接，该连接一直被重用且从不关闭。显然，它不适用于多线程环境。\n\nSpring 自身的数据源实现主要用于测试目的。然而，许多生产环境的数据源实现都支持连接池。例如，HikariCP\
  \ 提供了 `HikariDataSource`，它接受与 `DriverManagerDataSource` 相同的连接属性，并允许你指定连接池的最小池大小和最大活动连接数等信息。\n\
  \n\n\n```\n@Bean\npublic DataSource dataSource() {\nHikariDataSource dataSource\
  \ = new HikariDataSource();\ndataSource.setUsername(\"postgres\");\ndataSource.setPassword(\"\
  password\");\ndataSource.setJdbcUrl(\"jdbc:postgresql://localhost:5432/vehicle\"\
  );\ndataSource.setMinimumIdle(2);\ndataSource.setMaximumPoolSize(5);\nreturn dataSource;\n\
  }\n```\n\n注意\n\n要使用 HikariCP 提供的数据源实现，您需要将其添加到您的 `CLASSPATH` 中。如果您使用 Maven，请将以下依赖项添加到您的项目中：\n\
  \n```\ncom.zaxxer\nHikariCP\n2.6.1\n\n```\n\n如果您使用 Gradle，请使用以下配置：\n\n```\ncompile\
  \ 'com.zaxxer:HikariCP:2.6.1'\n```\n\n许多 Java EE 应用服务器内置了数据源实现，您可以通过服务器控制台或配置文件进行配置。如果您在应用服务器中配置了数据源并暴露给\
  \ JNDI 查找，则可以使用 `JndiDataSourceLookup` 来查找它。\n\n```\n@Bean\npublic DataSource dataSource()\
  \ {\nreturn new JndiDataSourceLookup().getDataSource(\"jdbc/VehicleDS\");\n}\n```\n\
  \n运行 DAO\n\n以下 `Main` 类通过向数据库插入一辆新车来测试您的 DAO。如果插入成功，您可以立即从数据库中查询该车辆。\n\n```\npackage\
  \ com.apress.springrecipes.vehicle;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.support.ClassPathXmlApplicationContext;\npublic\
  \ class Main {\npublic static void main(String[] args) {\nApplicationContext context\
  \ =\nnew AnnotationConfigApplicationContext(VehicleConfiguration.class);\nVehicleDao\
  \ vehicleDao = context.getBean(VehicleDao.class);\nVehicle vehicle = new Vehicle(\"\
  TEM0001\", \"Red\", 4, 4);\nvehicleDao.insert(vehicle);\nvehicle = vehicleDao.findByVehicleNo(\"\
  TEM0001\");\nSystem.out.println(vehicle);\n}\n}\n```\n\n现在您可以直接使用 JDBC 实现 DAO。然而，从上述\
  \ DAO 实现中可以看出，大多数 JDBC 代码都是相似的，并且每次数据库操作都需要重复编写。这种冗余代码会使您的 DAO 方法变得冗长且可读性降低。\n\n\
  更进一步\n\n另一种方法是使用对象关系映射（ORM）工具，它允许您编写专门用于将领域模型中的实体映射到数据库表的逻辑。ORM 会反过来计算出如何编写逻辑，以有效地将类的数据持久化到数据库中。这可以极大地解放您：您突然只需关注业务和领域模型，而无需受数据库\
  \ SQL 解析器的反复无常所困扰。当然，另一面是，您也放弃了完全控制客户端与数据库之间通信的能力——您必须信任 ORM 层会做出正确的处理。\n\n9-1\\\
  . 使用 JDBC 模板更新数据库\n\n问题\n\n使用 JDBC 既繁琐又充满了冗余的 API 调用，其中许多调用本可以由框架为您管理。要实现 JDBC 更新操作，您需要执行以下任务，其中大部分是冗余的：\n\
  \n1.  从数据源获取数据库连接。\n2.  从连接创建 `PreparedStatement` 对象。\n3.  将参数绑定到 `PreparedStatement`\
  \ 对象。\n4.  执行 `PreparedStatement` 对象。\n5.  处理 `SQLException`。\n6.  清理语句对象和连接。\n\n\
  JDBC 是一个非常底层的 API，但使用 JDBC 模板后，您需要处理的 API 表面区域会变得更具表现力（您花在细节上的时间更少，而更多时间用于处理应用程序逻辑），并且更易于安全地使用。\n\
  \n解决方案\n\n`org.springframework.jdbc.core.JdbcTemplate` 类声明了许多重载的 `update()` 模板方法，用于控制整个更新过程。不同版本的\
  \ `update()` 方法允许您覆盖默认流程中的不同任务子集。Spring JDBC 框架预定义了多个回调接口来封装不同的任务子集。您可以实现其中一个回调接口，并将其实例传递给相应的\
  \ `update()` 方法以完成该过程。\n\n工作原理\n\n您将探索使用 `JdbcTemplate` 的各种选项来更新数据库的不同方式。您将了解 `PreparedStatementCreators`、`PreparedStatementSetters`，最后是\
  \ `JdbcTemplate` 本身的更新方法。\n\n使用语句创建器更新数据库\n\n第一个要介绍的回调接口是 `PreparedStatementCreator`。您实现此接口以覆盖整个更新过程中的语句创建任务（任务\
  \ 2）和参数绑定任务（任务 3）。要将车辆插入数据库，您可以按如下方式实现 `PreparedStatementCreator` 接口：\n\n```\npackage\
  \ com.apress.springrecipes.vehicle;\nimport java.sql.Connection;\nimport java.sql.PreparedStatement;\n\
  import java.sql.SQLException;\nimport org.springframework.jdbc.core.PreparedStatementCreator;\n\
  public class JdbcVehicleDao implements VehicleDao {\nprivate class InsertVehicleStatementCreator\
  \ implements PreparedStatementCreator {\nprivate final Vehicle vehicle;\nInsertVehicleStatementCreator(Vehicle\
  \ vehicle) {\nthis.vehicle = vehicle;\n}\npublic PreparedStatement createPreparedStatement(Connection\
  \ con) throws SQLException {\nPreparedStatement ps = con.prepareStatement(INSERT_SQL);\n\
  prepareStatement(ps, this.vehicle);\nreturn ps;\n}\n}\n}\n```\n\n在实现 `PreparedStatementCreator`\
  \ 接口时，您将获得数据库连接作为 `createPreparedStatement()` 方法的参数。您在此方法中需要做的就是在该连接上创建一个 `PreparedStatement`\
  \ 对象，并将参数绑定到该对象。最后，您必须将 `PreparedStatement` 对象作为方法的返回值返回。请注意，方法签名声明抛出 `SQLException`，这意味着您无需自己处理此类异常。由于您将此类创建为\
  \ DAO 的内部类，因此您可以从实现中调用 `prepareStatement` 辅助方法。\n\n现在，您可以使用此语句创建器来简化车辆插入操作。首先，您需要创建一个\
  \ `JdbcTemplate` 类的实例，并为此模板传入数据源以从中获取连接。然后，您只需调用 `update()` 方法，并传入您的语句创建器，模板即可完成更新过程。\n\
  \n```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  public class JdbcVehicleDao implements VehicleDao {\n...\npublic void insert(Vehicle\
  \ vehicle) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(new\
  \ InsertVehicleStatementCreator(vehicle));\n}\n}\n```\n\n通常，如果 `PreparedStatementCreator`\
  \ 接口和其他回调接口仅在一个方法中使用，最好将它们实现为内部类。这是因为您可以直接从内部类访问局部变量和方法参数，而无需将它们作为构造函数参数传递。使用局部变量时，它们必须被标记为\
  \ `final`。\n\n\n\n```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import org.springframework.jdbc.core.PreparedStatementCreator;\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n...\npublic void insert(Vehicle vehicle) {\nJdbcTemplate\
  \ jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(new PreparedStatementCreator()\
  \ {\npublic PreparedStatement createPreparedStatement(Connection conn)\nthrows SQLException\
  \ {\nPreparedStatement ps = conn.prepareStatement(INSERT_SQL);\nprepareStatement(ps,\
  \ vehicle);\nreturn ps;\n}\n});\n}\n}\n```\n\n在 Java 8 中，这也可以实现为 lambda 表达式。\n\n\
  ```\n@Override\npublic void insert(final Vehicle vehicle) {\nJdbcTemplate jdbcTemplate\
  \ = new JdbcTemplate(this.dataSource);\njdbcTemplate.update(con -> {\nPreparedStatement\
  \ ps = con.prepareStatement(INSERT_SQL);\nprepareStatement(ps, vehicle);\nreturn\
  \ ps;\n});\n}\n```\n\n现在你可以删除前面的 `InsertVehicleStatementCreator` 内部类，因为它将不再被使用。\n\
  \n**使用语句设置器更新数据库**\n\n第二个回调接口 `PreparedStatementSetter`，顾名思义，仅执行整个更新过程中的参数绑定任务（任务\
  \ 3）。\n\n`update()` 模板方法的另一个版本接受一个 SQL 语句和一个 `PreparedStatementSetter` 对象作为参数。此方法会根据你的\
  \ SQL 语句为你创建一个 `PreparedStatement` 对象。你使用此接口需要做的就是将参数绑定到 `PreparedStatement` 对象（为此，你可以再次委托给\
  \ `prepareStatement` 方法）。\n\n```\npackage com.apress.springrecipes.vehicle;\n...\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.jdbc.core.PreparedStatementSetter;\n\
  public class JdbcVehicleDao implements VehicleDao {\n...\npublic void insert(final\
  \ Vehicle vehicle) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  jdbcTemplate.update(INSERT_SQL, new PreparedStatementSetter() {\npublic void setValues(PreparedStatement\
  \ ps)\nthrows SQLException {\nprepareStatement(ps, vehicle);\n}\n});\n}\n}\n```\n\
  \n作为 Java 8 lambda 表达式，它甚至更简洁，如下所示：\n\n```\n@Override\npublic void insert(Vehicle\
  \ vehicle) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(this.dataSource);\njdbcTemplate.update(INSERT_SQL,\
  \ ps -> prepareStatement(ps, vehicle));\n}\n```\n\n**使用 SQL 语句和参数值更新数据库**\n\n最后，`update()`\
  \ 方法最简单的版本接受一个 SQL 语句和一个对象数组作为语句参数。它会根据你的 SQL 语句创建一个 `PreparedStatement` 对象并为你绑定参数。因此，你无需重写更新过程中的任何任务。\n\
  \n```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  public class JdbcVehicleDao implements VehicleDao {\n...\npublic void insert(final\
  \ Vehicle vehicle) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  jdbcTemplate.update(INSERT_SQL, vehicle.getColor(),vehicle.getWheel(), vehicle.getSeat(),vehicle.getVehicleNo()\
  \ );\n}\n}\n```\n\n在介绍的 `update()` 方法的三种不同版本中，最后一种是最简单的，因为你无需实现任何回调接口。此外，我们成功移除了所有用于参数化查询的\
  \ `setX`（如 `setInt`、`setString` 等）风格的方法。相比之下，第一种方法最灵活，因为你可以在 `PreparedStatement`\
  \ 对象执行之前对其进行任何预处理。在实践中，你应该始终选择能满足你所有需求的最简单版本。\n\n`JdbcTemplate` 类还提供了其他重载的 `update()`\
  \ 方法。详情请参考 Javadoc。\n\n**批量更新数据库**\n\n假设你想向数据库中批量插入车辆。如果你多次调用 `update()` 方法，由于 SQL\
  \ 语句会被重复编译，更新速度会非常慢。因此，最好使用批量更新来实现批量插入车辆。\n\n`JdbcTemplate` 类也提供了一些用于批量更新操作的 `batchUpdate()`\
  \ 模板方法。你将使用的方法接受一个 SQL 语句、一个项目集合、一个批量大小以及一个 `ParameterizedPreparedStatementSetter`。\n\
  \n```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.BatchPreparedStatementSetter;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n...\n@Override\npublic void insert(Collection vehicles)\
  \ {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(this.dataSource);\njdbcTemplate.batchUpdate(INSERT_SQL,\
  \ vehicles, vehicles.size(), new ParameterizedPreparedStatementSetter() {\n@Override\n\
  public void setValues(PreparedStatement ps, Vehicle argument) throws SQLException\
  \ {\nprepareStatement(ps, argument);\n}\n});\n}\n}\n```\n\n以下是 Java 8 lambda 表达式版本：\n\
  \n```\n@Override\npublic void insert(Collection vehicles) {\nJdbcTemplate jdbcTemplate\
  \ = new JdbcTemplate(this.dataSource);\njdbcTemplate.batchUpdate(INSERT_SQL, vehicles,\
  \ vehicles.size(), this::prepareStatement);\n}\n```\n\n你可以使用 `Main` 类中的以下代码片段测试你的批量插入操作：\n\
  \n```\npackage com.apress.springrecipes.vehicle;\n...\npublic class Main {\npublic\
  \ static void main(String[] args) {\n...\nVehicleDao vehicleDao = (VehicleDao) context.getBean(\"\
  vehicleDao\");\nVehicle vehicle1 = new Vehicle(\"TEM0022\", \"Blue\", 4, 4);\nVehicle\
  \ vehicle2 = new Vehicle(\"TEM0023\", \"Black\", 4, 6);\nVehicle vehicle3 = new\
  \ Vehicle(\"TEM0024\", \"Green\", 4, 5);\nvehicleDao.insertBatch(Arrays.asList(vehicle1,\
  \ vehicle2, vehicle3));\n}\n}\n```\n\n9-2\\. 使用 JDBC 模板查询数据库\n\n**问题**\n\n要实现 JDBC\
  \ 查询操作，你必须执行以下任务，其中两项（任务 5 和 6）是相对于更新操作额外增加的：\n\n1.  从数据源获取数据库连接。\n2.  从连接创建 `PreparedStatement`\
  \ 对象。\n3.  将参数绑定到 `PreparedStatement` 对象。\n4.  执行 `PreparedStatement` 对象。\n5.  遍历返回的结果集。\n\
  6.  从结果集中提取数据。\n7.  处理 `SQLException`。\n8.  清理语句对象和连接。\n\n然而，与你的业务逻辑唯一相关的步骤是查询的定义和从结果集中提取结果！其余部分最好由\
  \ JDBC 模板处理。\n\n**解决方案**\n\n`JdbcTemplate` 类声明了许多重载的 `query()` 模板方法来控制整个查询过程。你可以通过实现\
  \ `PreparedStatementCreator` 和 `PreparedStatementSetter` 接口来重写语句创建（任务 2）和参数绑定（任务\
  \ 3），就像你在更新操作中所做的那样。此外，Spring JDBC 框架支持多种方式来重写数据提取（任务 6）。\n\n**工作原理**\n\nSpring\
  \ 提供了 `RowCallbackHandler` 和 `RowMapper` 接口来处理查询方法中的结果。你将首先探索这两个接口，并发现它们各自的不同用例。接下来，你将探索如何使用不同的查询方法来检索多个结果以及单个结果。\n\
  \n**使用行回调处理程序提取数据**\n\n`RowCallbackHandler` 是允许你处理结果集当前行的主要接口。其中一个 `query()` 方法会为你遍历结果集，并为每一行调用你的\
  \ `RowCallbackHandler`。因此，对于返回结果集中的每一行，`processRow()` 方法都会被调用一次。\n\n\n\n```\npackage\
  \ com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import org.springframework.jdbc.core.RowCallbackHandler;\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n...\n@Override\npublic Vehicle findByVehicleNo(String\
  \ vehicleNo) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\nfinal\
  \ Vehicle vehicle = new Vehicle();\njdbcTemplate.query(SELECT_ONE_SQL,\nnew RowCallbackHandler()\
  \ {\npublic void processRow(ResultSet rs) throws SQLException {\nvehicle.setVehicleNo(rs.getString(\"\
  VEHICLE_NO\"));\nvehicle.setColor(rs.getString(\"COLOR\"));\nvehicle.setWheel(rs.getInt(\"\
  WHEEL\"));\nvehicle.setSeat(rs.getInt(\"SEAT\"));\n}\n}, vehicleNo);\nreturn vehicle;\n\
  }\n}\n```\n\n使用 Java 8 lambda 表达式时，代码会更紧凑一些。\n\n```\n@Override\npublic Vehicle findByVehicleNo(String\
  \ vehicleNo) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\nfinal\
  \ Vehicle vehicle = new Vehicle();\njdbcTemplate.query(SELECT_ONE_SQL,\nrs -> {\n\
  vehicle.setVehicleNo(rs.getString(\"VEHICLE_NO\"));\nvehicle.setColor(rs.getString(\"\
  COLOR\"));\nvehicle.setWheel(rs.getInt(\"WHEEL\"));\nvehicle.setSeat(rs.getInt(\"\
  SEAT\"));\n}, vehicleNo);\nreturn vehicle;\n}\n```\n\n由于 SQL 查询最多返回一行，你可以创建一个车辆对象作为局部变量，并通过从结果集中提取数据来设置其属性。对于包含多行的结果集，你应该将对象收集到一个列表中。\n\
  \n使用行映射器提取数据\n\n`RowMapper<T>` 接口比 `RowCallbackHandler` 更通用。其目的是将结果集中的单行映射到一个自定义对象，因此它既可以应用于单行结果集，也可以应用于多行结果集。\n\
  \n从复用的角度来看，将 `RowMapper<T>` 接口实现为一个普通类，而不是内部类，是更好的做法。在该接口的 `mapRow()` 方法中，你必须构造代表一行的对象，并将其作为方法的返回值返回。\n\
  \n```\npackage com.apress.springrecipes.vehicle;\nimport java.sql.ResultSet;\nimport\
  \ java.sql.SQLException;\nimport org.springframework.jdbc.core.RowMapper;\npublic\
  \ class JdbcVehicleDao implements VehicleDao {\nprivate class VehicleRowMapper implements\
  \ RowMapper {\n@Override\npublic Vehicle mapRow(ResultSet rs, int rowNum) throws\
  \ SQLException {\nreturn toVehicle(rs);\n}\n}\n}\n```\n\n如前所述，`RowMapper<T>` 既可以用于单行结果集，也可以用于多行结果集。当查询一个唯一对象时（例如在\
  \ `findByVehicleNo()` 中），你必须调用 `JdbcTemplate` 的 `queryForObject()` 方法。\n\n```\n\
  package com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  public class JdbcVehicleDao implements VehicleDao {\n...\npublic Vehicle findByVehicleNo(String\
  \ vehicleNo) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\nreturn\
  \ jdbcTemplate.queryForObject(SELECT_ONE_SQL, new VehicleRowMapper(), vehicleNo);\n\
  }\n}\n```\n\nSpring 提供了一个便捷的 `RowMapper<T>` 实现，即 `BeanPropertyRowMapper<T>`，它可以自动将一行映射到指定类的新实例。请注意，指定的类必须是顶层类，并且必须有一个默认构造函数或无参构造函数。它首先实例化该类，然后通过名称匹配将每个列值映射到一个属性。它支持将属性名称（例如\
  \ `vehicleNo`）与相同的列名或带下划线的列名（例如 `VEHICLE_NO`）进行匹配。\n\n```\npackage com.apress.springrecipes.vehicle;\n\
  ...\nimport org.springframework.jdbc.core.BeanPropertyRowMapper;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  public class JdbcVehicleDao implements VehicleDao {\n...\npublic Vehicle findByVehicleNo(String\
  \ vehicleNo) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\nreturn\
  \ jdbcTemplate.queryForObject(SELECT_ONE_SQL, BeanPropertyRowMapper.newInstance(Vehicle.class),\
  \ vehicleNo);\n}\n}\n```\n\n查询多行\n\n现在，让我们看看如何查询包含多行的结果集。例如，假设你需要在 DAO 接口中有一个 `findAll()`\
  \ 方法来获取所有车辆。\n\n```\npackage com.apress.springrecipes.vehicle;\n...\npublic interface\
  \ VehicleDao {\n...\npublic List findAll();\n}\n```\n\n即使没有 `RowMapper<T>` 的帮助，你仍然可以调用\
  \ `queryForList()` 方法并传入一条 SQL 语句。返回的结果将是一个映射列表。每个映射存储结果集中的一行，并以列名作为键。\n\n```\n\
  package com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  public class JdbcVehicleDao implements VehicleDao {\n...\n@Override\npublic List\
  \ findAll() {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\nList>\
  \ rows = jdbcTemplate.queryForList(SELECT_ALL_SQL);\nreturn rows.stream().map(row\
  \ -> {\nVehicle vehicle = new Vehicle();\nvehicle.setVehicleNo((String) row.get(\"\
  VEHICLE_NO\"));\nvehicle.setColor((String) row.get(\"COLOR\"));\nvehicle.setWheel((Integer)\
  \ row.get(\"WHEEL\"));\nvehicle.setSeat((Integer) row.get(\"SEAT\"));\nreturn vehicle;\n\
  }).collect(Collectors.toList());\n}\n}\n```\n\n你可以使用 `Main` 类中的以下代码片段来测试你的 `findAll()`\
  \ 方法：\n\n```\npackage com.apress.springrecipes.vehicle;\n...\npublic class Main\
  \ {\npublic static void main(String[] args) {\n...\nVehicleDao vehicleDao = (VehicleDao)\
  \ context.getBean(\"vehicleDao\");\nList vehicles = vehicleDao.findAll();\nvehicles.forEach(System.out::println);\n\
  }\n}\n```\n\n如果你使用 `RowMapper<T>` 对象来映射结果集中的行，你将通过 `query()` 方法获得一个映射对象的列表。\n\n\
  ```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.BeanPropertyRowMapper;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\n...\npublic List findAll() {\nJdbcTemplate jdbcTemplate\
  \ = new JdbcTemplate(dataSource);\nreturn jdbcTemplate.query (SELECT_ALL_SQL, BeanPropertyRowMapper.newInstance(Vehicle.class));\n\
  }\n}\n```\n\n查询单个值\n\n最后，让我们考虑一个针对单行单列结果集的查询。作为示例，将以下操作添加到 DAO 接口中：\n\n```\npackage\
  \ com.apress.springrecipes.vehicle;\n...\npublic interface VehicleDao {\n...\npublic\
  \ String getColor(String vehicleNo);\npublic int countAll();\n}\n```\n\n要查询单个字符串值，你可以调用重载的\
  \ `queryForObject()` 方法，该方法需要一个 `java.lang.Class` 类型的参数。此方法将帮助你把结果值映射到你指定的类型。\n\n\
  ```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  public class JdbcVehicleDao implements VehicleDao {\nprivate static final String\
  \ COUNT_ALL_SQL = \"SELECT COUNT(*) FROM VEHICLE\";\nprivate static final String\
  \ SELECT_COLOR_SQL = \"SELECT COLOR FROM VEHICLE WHERE VEHICLE_NO=?\";\n...\npublic\
  \ String getColor(String vehicleNo) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  return jdbcTemplate.queryForObject(SELECT_COLOR_SQL, String.class, vehicleNo);\n\
  }\npublic int countAll() {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\n\
  return jdbcTemplate.queryForObject(COUNT_ALL_SQL, Integer.class);\n}\n}\n```\n\n\
  你可以使用 `Main` 类中的以下代码片段来测试这两个方法：\n\n```\npackage com.apress.springrecipes.vehicle;\n\
  ...\npublic class Main {\npublic static void main(String[] args) {\n...\nVehicleDao\
  \ vehicleDao = context.getBean(VehicleDao.class);\nint count = vehicleDao.countAll();\n\
  System.out.println(\"Vehicle Count: \" + count);\nString color = vehicleDao.getColor(\"\
  TEM0001\");\nSystem.out.println(\"Color for [TEM0001]: \" + color);\n}\n}\n```\n\
  \n9-3\\. 简化 JDBC 模板创建\n\n问题\n\n每次需要 `JdbcTemplate` 时都创建一个新实例效率不高，因为你必须重复创建语句，并且会产生创建新对象的开销。\n\
  \n解决方案\n\n\n\n`JdbcTemplate` 类被设计为**线程安全**的，因此你可以在 IoC 容器中声明它的单个实例，并将此实例注入到所有 DAO\
  \ 实例中。此外，Spring JDBC 框架提供了一个便捷的类 `org.springframework.jdbc.core.support.JdbcDaoSupport`\
  \ 来简化你的 DAO 实现。该类声明了一个 `jdbcTemplate` 属性，该属性可以从 IoC 容器注入，或从数据源自动创建，例如 `JdbcTemplate\
  \ jdbcTemplate = new JdbcTemplate(dataSource)`。你的 DAO 可以通过继承此类来继承该属性。\n\n工作原理\n\n\
  与其在需要时创建新的 `JdbcTemplate`，不如创建一个单一的 bean 实例，并通过将其注入到需要它的 DAO 中来重用该实例。另一种选择是扩展 Spring\
  \ 的 `JdbcDaoSupport` 类，该类为 `JdbcTemplate` 提供了访问器方法。\n\n注入 JDBC 模板\n\n到目前为止，你在每个\
  \ DAO 方法中都创建了一个新的 `JdbcTemplate` 实例。实际上，你可以在类级别注入它，并在所有 DAO 方法中使用这个注入的实例。为简单起见，以下代码仅显示对\
  \ `insert()` 方法的更改：\n\n```\npackage com.apress.springrecipes.vehicle;\n...\nimport\
  \ org.springframework.jdbc.core.JdbcTemplate;\npublic class JdbcVehicleDao implements\
  \ VehicleDao {\nprivate final JdbcTemplate jdbcTemplate;\npublic JdbcVehicleDao\
  \ (JdbcTemplate jdbcTemplate) {\nthis.jdbcTemplate = jdbcTemplate;\n}\npublic void\
  \ insert(final Vehicle vehicle) {\njdbcTemplate.update(INSERT_SQL, vehicle.getVehicleNo(),\
  \ vehicle.getColor(), vehicle.getWheel(), vehicle.getSeat());\n}\n...\n}\n```\n\n\
  JDBC 模板需要设置一个数据源。你可以使用 setter 方法或构造函数参数来注入此属性。然后，你可以将此 JDBC 模板注入到你的 DAO 中。\n\n```\n\
  @Configuration\npublic class VehicleConfiguration {\n@Bean\npublic VehicleDao vehicleDao(JdbcTemplate\
  \ jdbcTemplate) {\nreturn new JdbcVehicleDao(jdbcTemplate);\n}\n@Bean\npublic JdbcTemplate\
  \ jdbcTemplate(DataSource dataSource) {\nreturn new JdbcTemplate(dataSource);\n\
  }\n}\n```\n\n扩展 JdbcDaoSupport 类\n\n`org.springframework.jdbc.core.support.JdbcDaoSupport`\
  \ 类有一个 `setDataSource()` 方法和一个 `setJdbcTemplate()` 方法。你的 DAO 类可以通过继承此类来继承这些方法。然后，你可以直接注入一个\
  \ JDBC 模板，或者注入一个数据源以便为其创建一个 JDBC 模板。以下代码片段取自 Spring 的 `JdbcDaoSupport` 类：\n\n```\n\
  package org.springframework.jdbc.core.support;\n...\npublic abstract class JdbcDaoSupport\
  \ extends DaoSupport {\nprivate JdbcTemplate jdbcTemplate;\npublic final void setDataSource(DataSource\
  \ dataSource) {\nif( this.jdbcTemplate == null || dataSource != this.jdbcTemplate.getDataSource()\
  \ ){\nthis.jdbcTemplate = createJdbcTemplate(dataSource);\ninitTemplateConfig();\n\
  }\n}\n...\npublic final void setJdbcTemplate(JdbcTemplate jdbcTemplate) {\nthis.jdbcTemplate\
  \ = jdbcTemplate;\ninitTemplateConfig();\n}\npublic final JdbcTemplate getJdbcTemplate()\
  \ {\nreturn this.jdbcTemplate;\n}\n...\n}\n```\n\n在你的 DAO 方法中，你可以简单地调用 `getJdbcTemplate()`\
  \ 方法来获取 JDBC 模板。你还必须从 DAO 类中删除 `dataSource` 和 `jdbcTemplate` 属性及其 setter 方法，因为它们已经被继承了。同样，为简单起见，这里只显示对\
  \ `insert()` 方法的更改：\n\n```\npackage com.apress.springrecipes.vehicle;\n...\nimport\
  \ org.springframework.jdbc.core.support.JdbcDaoSupport;\npublic class JdbcVehicleDao\
  \ extends JdbcDaoSupport implements VehicleDao {\npublic void insert(final Vehicle\
  \ vehicle) {\ngetJdbcTemplate().update(INSERT_SQL, vehicle.getVehicleNo(),\nvehicle.getColor(),\
  \ vehicle.getWheel(), vehicle.getSeat());\n}\n...\n}\n```\n\n通过扩展 `JdbcDaoSupport`，你的\
  \ DAO 类继承了 `setDataSource()` 方法。你可以将数据源注入到你的 DAO 实例中，以便为其创建一个 JDBC 模板。\n\n```\n\
  @Configuration\npublic class VehicleConfiguration {\n...\n@Bean\npublic VehicleDao\
  \ vehicleDao(DataSource dataSource) {\nJdbcVehicleDao vehicleDao = new JdbcVehicleDao();\n\
  vehicleDao.setDataSource(dataSource);\nreturn vehicleDao;\n}\n}\n```\n\n9-4. 在 JDBC\
  \ 模板中使用命名参数\n\n问题\n\n在经典的 JDBC 用法中，SQL 参数由占位符 `?` 表示，并按位置绑定。位置参数的问题在于，只要参数顺序发生变化，你也必须更改参数绑定。对于包含许多参数的\
  \ SQL 语句，按位置匹配参数非常繁琐。\n\n解决方案\n\n在 Spring JDBC 框架中绑定 SQL 参数的另一种选择是使用**命名参数**。顾名思义，命名\
  \ SQL 参数通过名称（以冒号开头）而不是位置来指定。命名参数更易于维护，并且还能提高可读性。在运行时，框架类会用占位符替换命名参数。`NamedParameterJdbcTemplate`\
  \ 支持命名参数。\n\n工作原理\n\n在 SQL 语句中使用命名参数时，你可以将参数值放在一个以参数名作为键的映射中。\n\n```\npackage com.apress.springrecipes.vehicle;\n\
  ...\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport implements\nVehicleDao\
  \ {\nprivate static final String INSERT_SQL = \"INSERT INTO VEHICLE (COLOR, WHEEL,\
  \ SEAT, VEHICLE_NO) VALUES (:color, :wheel, :seat, :vehicleNo)\";\npublic void insert(Vehicle\
  \ vehicle) {\ngetNamedParameterJdbcTemplate().update(INSERT_SQL, toParameterMap(vehicle));\n\
  }\nprivate Map toParameterMap(Vehicle vehicle) {\nMap parameters = new HashMap();\n\
  parameters.put(\"vehicleNo\", vehicle.getVehicleNo());\nparameters.put(\"color\"\
  , vehicle.getColor());\nparameters.put(\"wheel\", vehicle.getWheel());\nparameters.put(\"\
  seat\", vehicle.getSeat());\nreturn parameters;\n}\n...\n}\n```\n\n你还可以提供一个 SQL\
  \ 参数源，其职责是为命名 SQL 参数提供 SQL 参数值。`SqlParameterSource` 接口有三种实现。最基本的是 `MapSqlParameterSource`，它将一个映射包装为其参数源。在这个例子中，与之前的例子相比，这实际上是一种净损失，因为你引入了一个额外的对象——`SqlParameterSource`。\n\
  \n```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.namedparam.MapSqlParameterSource;\n\
  import org.springframework.jdbc.core.namedparam.SqlParameterSource;\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport implements\nVehicleDao\
  \ {\npublic void insert(Vehicle vehicle) {\nSqlParameterSource parameterSource =\n\
  new MapSqlParameterSource(toParameterMap(vehicle));\ngetNamedParameterJdbcTemplate().update(INSERT_SQL,\
  \ parameterSource);\n}\n...\n}\n```\n\n当你需要在传递给 update 方法的参数与其值的来源之间增加一层间接性时，它的强大之处就体现出来了。例如，如果你想从\
  \ JavaBean 中获取属性怎么办？这就是 `SqlParameterSource` 中介开始让你受益的地方！`SqlParameterSource` 是一个\
  \ `BeanPropertySqlParameterSource`，它将一个普通的 Java 对象包装为 SQL 参数源。对于每个命名参数，将使用同名的属性作为参数值。\n\
  \n\n\n```\npackage com.apress.springrecipes.vehicle;\nimport org.springframework.jdbc.core.namedparam.BeanPropertySqlParameterSource;\n\
  import org.springframework.jdbc.core.namedparam.SqlParameterSource;\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport implements\nVehicleDao\
  \ {\npublic void insert(Vehicle vehicle) {\nSqlParameterSource parameterSource =\n\
  new BeanPropertySqlParameterSource(vehicle);\ngetNamedParameterJdbcTemplate ().update(INSERT_SQL,\
  \ parameterSource);\n}\n}\n```\n\n命名参数也可用于批量更新。你可以为参数值提供一个 `Map`、一个数组，或一个 `SqlParameterSource`\
  \ 数组。\n\n```\npackage com.apress.springrecipes.vehicle;\n...\nimport org.springframework.jdbc.core.namedparam.BeanPropertySqlParameterSource;\n\
  import org.springframework.jdbc.core.namedparam.SqlParameterSource;\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport implements VehicleDao\
  \ {\n...\n@Override\npublic void insert(Collection vehicles) {\nSqlParameterSource[]\
  \ sources = vehicles.stream()\n.map(v -> new BeanPropertySqlParameterSource(v))\n\
  .toArray(size -> new SqlParameterSource[size]);\ngetNamedParameterJdbcTemplate().batchUpdate(INSERT_SQL,\
  \ sources);\n}\n}\n```\n\n9-5\\. 在 Spring JDBC 框架中处理异常\n\n问题\n\n许多 JDBC API 声明会抛出\
  \ `java.sql.SQLException`，这是一种必须被捕获的受检异常。每次执行数据库操作时都要处理这类异常非常麻烦。你通常需要定义自己的策略来处理这类异常。如果处理不当，可能会导致异常处理不一致。\n\
  \n解决方案\n\nSpring 框架为其数据访问模块（包括 JDBC 框架）提供了一致的数据访问异常处理机制。通常，Spring JDBC 框架抛出的所有异常都是\
  \ `org.springframework.dao.DataAccessException` 的子类，这是一种你无需强制捕获的 `RuntimeException`。它是\
  \ Spring 数据访问模块中所有异常的根异常类。\n\n图 9-1 仅展示了 Spring 数据访问模块中 `DataAccessException` 层次结构的一部分。总共定义了\
  \ 30 多个异常类，用于不同类别的数据访问异常。\n\n![A314861_4_En_9_Fig1_HTML.jpg](img/A314861_4_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1.\n\nDataAccessException 层次结构中的常见异常类\n\n工作原理\n\n首先，你将了解 Spring JDBC 中异常处理的工作原理，然后学习如何通过创建自定义异常和映射来利用它为你带来好处。\n\
  \n理解 Spring JDBC 框架中的异常处理\n\n到目前为止，在使用 JDBC 模板或 JDBC 操作对象时，你还没有显式地处理过 JDBC 异常。为了帮助你理解\
  \ Spring JDBC 框架的异常处理机制，让我们考虑 `Main` 类中插入一个车辆的以下代码片段。如果你插入一个具有重复车辆编号的车辆会发生什么？\n\n\
  ```\npackage com.apress.springrecipes.vehicle;\n...\npublic class Main {\npublic\
  \ static void main(String[] args) {\n...\nVehicleDao vehicleDao = context.getBean(VehicleDao.class);\n\
  Vehicle vehicle = new Vehicle(\"EX0001\", \"Green\", 4, 4);\nvehicleDao.insert(vehicle);\n\
  }\n}\n```\n\n如果你运行该方法两次，或者该车辆已经插入到数据库中，它将抛出一个 `DuplicateKeyException`，这是 `DataAccessException`\
  \ 的一个间接子类。在你的 DAO 方法中，你既不需要用 `try/catch` 块包围代码，也不需要在该方法签名中声明抛出异常。这是因为 `DataAccessException`（以及它的子类，包括\
  \ `DuplicateKeyException`）是一个你无需强制捕获的非受检异常。`DataAccessException` 的直接父类是 `NestedRuntimeException`，这是一个核心的\
  \ Spring 异常类，它将另一个异常包装在 `RuntimeException` 中。\n\n当你使用 Spring JDBC 框架的类时，它们会为你捕获\
  \ `SQLException`，并将其包装为 `DataAccessException` 的子类之一。由于此异常是 `RuntimeException`，你不需要捕获它。\n\
  \n但是 Spring JDBC 框架如何知道应该抛出 `DataAccessException` 层次结构中的哪个具体异常呢？它是通过查看捕获到的 `SQLException`\
  \ 的 `errorCode` 和 `SQLState` 属性来实现的。由于 `DataAccessException` 将底层的 `SQLException`\
  \ 包装为根本原因，你可以使用以下 `catch` 块检查 `errorCode` 和 `SQLState` 属性：\n\n```\npackage com.apress.springrecipes.vehicle;\n\
  ...\nimport java.sql.SQLException;\nimport org.springframework.dao.DataAccessException;\n\
  public class Main {\npublic static void main(String[] args) {\n...\nVehicleDao vehicleDao\
  \ = context.getBean(VehicleDao.class);\nVehicle vehicle = new Vehicle(\"EX0001\"\
  , \"Green\", 4, 4);\ntry {\nvehicleDao.insert(vehicle);\n} catch (DataAccessException\
  \ e) {\nSQLException sqle = (SQLException) e.getCause();\nSystem.out.println(\"\
  Error code: \" + sqle.getErrorCode());\nSystem.out.println(\"SQL state: \" + sqle.getSQLState());\n\
  }\n}\n}\n```\n\n当你再次插入重复车辆时，请注意 PostgreSQL 返回了以下错误代码和 SQL 状态：\n\n```\nError code\
  \ : 0\nSQL state : 23505\n```\n\n如果你查阅 PostgreSQL 参考手册，你会发现表 9-2 中显示的错误代码描述。\n\n\
  表 9-2.\n\nPostgreSQL 错误代码描述\n\nSQL 状态\n |  消息文本\n |\n\n| --- | --- | --- | --- |\
  \ --- |\n\n|\n  `unique_violation`\n |\n\nSpring JDBC 框架如何知道状态 23505 应映射到 `DuplicateKeyException`？错误代码和\
  \ SQL 状态是数据库特定的，这意味着不同的数据库产品可能为同一类错误返回不同的代码。此外，一些数据库产品会在 `errorCode` 属性中指定错误，而其他数据库产品（如\
  \ PostgreSQL）则会在 `SQLState` 属性中指定。\n\n作为一个开放的 Java 应用程序框架，Spring 理解大多数流行数据库产品的错误代码。然而，由于错误代码数量庞大，它只能维护最常见错误的映射。该映射定义在位于\
  \ `org.springframework.jdbc.support` 包中的 `sql-error-codes.xml` 文件中。以下是该文件中针对 PostgreSQL\
  \ 的片段：\n\n```\n\n...\n\ntrue\n\n03000,42000,42601,42602,42622,42804,42P01\n\n23000,23502,23503,23514\n\
  \n53000,53100,53200,53300\n\n55P03\n\n40P01\n\n...\n\n```\n\n`useSqlStateForTranslation`\
  \ 属性意味着应使用 `SQLState` 属性（而非 `errorCode` 属性）来匹配错误代码。最后，`SQLErrorCodes` 类为你定义了多个类别来映射数据库错误代码。代码\
  \ 23505 位于 `dataIntegrityViolationCodes` 类别中。\n\n自定义数据访问异常处理\n\nSpring JDBC 框架仅映射众所周知的错误代码。有时你可能希望自己自定义映射。例如，你可能决定向现有类别添加更多代码，或为特定错误代码定义自定义异常。\n\
  \n\n\n在表 9-2 中，错误代码`23505`表示 PostgreSQL 中的**重复键**错误。默认情况下，它被映射为`DataIntegrityViolationException`。假设你想为此类错误创建自定义异常类型`MyDuplicateKeyException`。它应继承`DataIntegrityViolationException`，因为这也是一种数据完整性违反错误。请记住，要让\
  \ Spring JDBC 框架抛出异常，该异常必须与根异常类`DataAccessException`兼容。\n\n```\npackage com.apress.springrecipes.vehicle;\n\
  import org.springframework.dao.DataIntegrityViolationException;\npublic class MyDuplicateKeyException\
  \ extends DataIntegrityViolationException {\npublic MyDuplicateKeyException(String\
  \ msg) {\nsuper(msg);\n}\npublic MyDuplicateKeyException(String msg, Throwable cause)\
  \ {\nsuper(msg, cause);\n}\n}\n```\n\n默认情况下，Spring 会从位于`org.springframework.jdbc.support`包中的`sql-error-codes.xml`文件中查找异常。但是，你可以通过在类路径根目录下提供同名文件来覆盖某些映射。如果\
  \ Spring 能找到你的自定义文件，它会先从你的映射中查找异常。然而，如果在其中找不到合适的异常，Spring 会继续查找默认映射。\n\n例如，假设你想将自定义的`DuplicateKeyException`类型映射到错误代码`23505`。你需要通过`CustomSQLErrorCodesTranslation`\
  \ bean 添加绑定，然后将此 bean 添加到`customTranslations`类别中。\n\n```\n\ntrue\n\ncom.apress.springrecipes.vehicle.MyDuplicateKeyException\n\
  \n```\n\n现在，如果你移除围绕车辆插入操作的`try`/`catch`代码块并插入重复车辆，Spring JDBC 框架将抛出`MyDuplicateKeyException`。\n\
  \n然而，如果你对`SQLErrorCodes`类使用的基本代码到异常映射策略不满意，你可以进一步实现`SQLExceptionTranslator`接口，并通过`setExceptionTranslator()`方法将其实例注入到\
  \ JDBC 模板中。\n\n**9-6. 直接使用 ORM 框架避免问题**\n\n**问题**\n\n你决定进入下一阶段——你的领域模型已经足够复杂，手动为每个实体编写所有代码变得繁琐，因此你开始研究一些替代方案，例如\
  \ Hibernate。你惊讶地发现，虽然它们功能强大，但绝不简单！\n\n**解决方案**\n\n让 Spring 来帮忙；它提供了处理 ORM 层的工具，其能力可与纯\
  \ JDBC 访问相媲美。\n\n**工作原理**\n\n假设你正在为培训中心开发一个课程管理系统。你为此系统创建的第一个类是`Course`。这个类被称为实体类或持久化类，因为它代表一个现实世界中的实体，其实例将被持久化到数据库中。请记住，对于每个要由\
  \ ORM 框架持久化的实体类，都需要一个无参的默认构造函数。\n\n```\npackage com.apress.springrecipes.course;\n\
  ...\npublic class Course {\nprivate Long id;\nprivate String title;\nprivate Date\
  \ beginDate;\nprivate Date endDate;\nprivate int fee;\n// 构造函数、Getter 和 Setter 方法\n\
  ...\n}\n```\n\n对于每个实体类，你必须定义一个标识符属性来唯一标识一个实体。最佳实践是定义一个自动生成的标识符，因为它没有业务含义，因此在任何情况下都不会被更改。此外，ORM\
  \ 框架将使用此标识符来确定实体的状态。如果标识符值为`null`，该实体将被视为新的未保存实体。当此实体被持久化时，将执行 INSERT SQL 语句；否则，将执行\
  \ UPDATE 语句。为了允许标识符为`null`，你应该为标识符选择原始包装类型，例如`java.lang.Integer`和`java.lang.Long`。\n\
  \n在你的课程管理系统中，你需要一个 DAO 接口来封装数据访问逻辑。让我们在`CourseDao`接口中定义以下操作：\n\n```\npackage com.apress.springrecipes.course;\n\
  ...\npublic interface CourseDao {\nCourse store(Course course);\nvoid delete(Long\
  \ courseId);\nCourse findById(Long courseId);\nList findAll();\n}\n```\n\n通常，当使用\
  \ ORM 持久化对象时，插入和更新操作会合并为单个操作（例如，store）。这是为了让 ORM 框架（而不是你）决定对象应该被插入还是更新。为了让 ORM 框架将你的对象持久化到数据库，它必须知道实体类的映射元数据。你必须以其支持的格式向其提供映射元数据。历史上，Hibernate\
  \ 使用 XML 来提供映射元数据。然而，由于每个 ORM 框架可能有自己定义映射元数据的格式，JPA 定义了一组持久化注解，让你以标准格式定义映射元数据，这种格式更有可能在其他\
  \ ORM 框架中重用。\n\nHibernate 也支持使用 JPA 注解来定义映射元数据，因此，使用 Hibernate 和 JPA 映射和持久化对象基本上有三种不同的策略。\n\
  \n*   使用 Hibernate API 通过 Hibernate XML 映射持久化对象\n*   使用 Hibernate API 通过 JPA 注解持久化对象\n\
  *   使用 JPA 通过 JPA 注解持久化对象\n\nHibernate、JPA 和其他 ORM 框架的核心编程元素与 JDBC 类似。它们总结在表 9-3\
  \ 中。\n\n**表 9-3. 不同数据访问策略的核心编程元素**\n\n| 概念 | JDBC | Hibernate | JPA |\n| :--- |\
  \ :--- | :--- | :--- |\n| `资源` | `Connection` | `Session` | `EntityManager` |\n\
  | `资源工厂` | `DataSource` | `SessionFactory` | `EntityManagerFactory` |\n| `异常` |\
  \ `SQLException` | `HibernateException` | `PersistenceException` |\n\n在 Hibernate\
  \ 中，对象持久化的核心接口是`Session`，其实例可以从`SessionFactory`实例获取。在 JPA 中，对应的接口是`EntityManager`，其实例可以从`EntityManagerFactory`实例获取。Hibernate\
  \ 抛出的异常类型为`HibernateException`，而 JPA 抛出的异常类型可能是`PersistenceException`或其他 Java SE\
  \ 异常，如`IllegalArgumentException`和`IllegalStateException`。请注意，所有这些异常都是`RuntimeException`的子类，你不必强制捕获和处理它们。\n\
  \n**使用 Hibernate API 通过 Hibernate XML 映射持久化对象**\n\n要使用 Hibernate XML 映射来映射实体类，你可以为每个类提供一个单独的映射文件，或者为多个类提供一个大的文件。实际上，为了便于维护，你应该为每个类定义一个文件，将类名与`.hbm.xml`连接起来作为文件扩展名。中间扩展名`hbm`代表“Hibernate\
  \ 元数据”。\n\n`Course`类的映射文件应命名为`Course.hbm.xml`，并放在与实体类相同的包中。\n\n在映射文件中，你可以为此实体类指定一个表名，并为每个简单属性指定一个表列。你还可以指定列的详细信息，例如列长度、`not-null`约束和唯一约束。此外，每个实体必须定义一个标识符，该标识符可以自动生成或手动分配。在此示例中，标识符将使用表标识列生成。\n\
  \n现在，让我们使用纯 Hibernate API 在`hibernate`子包中实现 DAO 接口。在调用 Hibernate API 进行对象持久化之前，你必须初始化一个\
  \ Hibernate 会话工厂（例如，在构造函数中）。\n\n\n```java\npackage com.apress.springrecipes.course.hibernate;\n\
  import com.apress.springrecipes.course.Course;\nimport com.apress.springrecipes.course.CourseDao;\n\
  import org.hibernate.Session;\nimport org.hibernate.SessionFactory;\nimport org.hibernate.Transaction;\n\
  import org.hibernate.cfg.AvailableSettings;\nimport org.hibernate.cfg.Configuration;\n\
  import org.hibernate.dialect.PostgreSQL95Dialect;\nimport java.util.List;\npublic\
  \ class HibernateCourseDao implements CourseDao {\nprivate final SessionFactory\
  \ sessionFactory;\npublic HibernateCourseDao() {\nConfiguration configuration =\
  \ new Configuration()\n.setProperty(AvailableSettings.URL, \"jdbc:postgresql://localhost:5432/course\"\
  )\n.setProperty(AvailableSettings.USER, \"postgres\")\n.setProperty(AvailableSettings.PASS,\
  \ \"password\")\n.setProperty(AvailableSettings.DIALECT, PostgreSQL95Dialect.class.getName())\n\
  .setProperty(AvailableSettings.SHOW_SQL, String.valueOf(true))\n.setProperty(AvailableSettings.HBM2DDL_AUTO,\
  \ \"update\")\n.addClass(Course.class);\nsessionFactory = configuration.buildSessionFactory();\n\
  }\n@Override\npublic Course store(Course course) {\nSession session = sessionFactory.openSession();\n\
  Transaction tx = session.getTransaction();\ntry {\ntx.begin();\nsession.saveOrUpdate(course);\n\
  tx.commit();\nreturn course;\n} catch (RuntimeException e) {\ntx.rollback();\nthrow\
  \ e;\n} finally {\nsession.close();\n}\n}\n@Override\npublic void delete(Long courseId)\
  \ {\nSession session = sessionFactory.openSession();\nTransaction tx = session.getTransaction();\n\
  try {\ntx.begin();\nCourse course = session.get(Course.class, courseId);\nsession.delete(course);\n\
  tx.commit();\n} catch (RuntimeException e) {\ntx.rollback();\nthrow e;\n} finally\
  \ {\nsession.close();\n}\n}\n@Override\npublic Course findById(Long courseId) {\n\
  Session session = sessionFactory.openSession();\ntry {\nreturn session.get(Course.class,\
  \ courseId);\n} finally {\nsession.close();\n}\n}\n@Override\npublic List findAll()\
  \ {\nSession session = sessionFactory.openSession();\ntry {\nreturn session.createQuery(\"\
  SELECT c FROM Course c\", Course.class).list();\n} finally {\nsession.close();\n\
  }\n}\n}\n```\n\n使用 Hibernate 的第一步是创建一个 `Configuration` 对象，并配置数据库设置（JDBC 连接属性或数据源的\
  \ JNDI 名称）、数据库方言、映射元数据位置等属性。当使用 XML 映射文件定义映射元数据时，可以使用 `addClass` 方法告知 Hibernate\
  \ 需要管理哪些类；Hibernate 将按约定加载 `Course.hbm.xml` 文件。然后，通过这个 `Configuration` 对象构建一个 Hibernate\
  \ 会话工厂。会话工厂的作用是生成会话，供你持久化对象。\n\n在持久化对象之前，你需要在数据库模式中创建表来存储对象数据。使用像 Hibernate 这样的\
  \ ORM 框架时，通常无需自行设计表。如果将 `hibernate.hbm2ddl.auto` 属性设置为 `update`，Hibernate 可以在必要时帮助你更新数据库模式并创建表。\n\
  \n提示\n\n当然，不应在生产环境中启用此功能，但它可以极大提升开发速度。\n\n在上述 DAO 方法中，首先从会话工厂打开一个会话。对于涉及数据库更新的操作（如\
  \ `saveOrUpdate()` 和 `delete()`），必须在该会话上启动一个 Hibernate 事务。如果操作成功完成，则提交事务；否则，如果发生任何\
  \ `RuntimeException`，则回滚事务。对于只读操作（如 `get()` 和 HQL 查询），则无需启动事务。最后，务必记得关闭会话以释放其持有的资源。\n\
  \n你可以创建以下 `Main` 类来测试运行所有 DAO 方法。它还演示了实体的典型生命周期。\n\n```java\npackage com.apress.springrecipes.course;\n\
  import com.apress.springrecipes.course.hibernate.HibernateCourseDao;\nimport java.util.GregorianCalendar;\n\
  public class Main {\npublic static void main(String[] args) {\nCourseDao courseDao\
  \ = new HibernateCourseDao();\nCourse course = new Course();\ncourse.setTitle(\"\
  Core Spring\");\ncourse.setBeginDate(new GregorianCalendar(2007, 8, 1).getTime());\n\
  course.setEndDate(new GregorianCalendar(2007, 9, 1).getTime());\ncourse.setFee(1000);\n\
  System.out.println(\"\\nCourse before persisting\");\nSystem.out.println(course);\n\
  courseDao.store(course);\nSystem.out.println(\"\\nCourse after persisting\");\n\
  System.out.println(course);\nLong courseId = course.getId();\nCourse courseFromDb\
  \ = courseDao.findById(courseId);\nSystem.out.println(\"\\nCourse fresh from database\"\
  );\nSystem.out.println(courseFromDb);\ncourseDao.delete(courseId);\nSystem.exit(0);\n\
  }\n}\n```\n\n使用 JPA 注解通过 Hibernate API 持久化对象\n\nJPA 注解在 JSR-220 规范中已标准化，因此所有符合 JPA\
  \ 规范的 ORM 框架（包括 Hibernate）都支持它们。此外，使用注解可以更方便地在同一源文件中编辑映射元数据。\n\n以下 `Course` 类演示了如何使用\
  \ JPA 注解定义映射元数据：\n\n```java\npackage com.apress.springrecipes.course;\n...\nimport\
  \ javax.persistence.Column;\nimport javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\n\
  import javax.persistence.GenerationType;\nimport javax.persistence.Id;\nimport javax.persistence.Table;\n\
  @Entity\n@Table(name = \"COURSE\")\npublic class Course {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\n@Column(name = \"ID\")\nprivate Long id;\n@Column(name\
  \ = \"TITLE\", length = 100, nullable = false)\nprivate String title;\n@Column(name\
  \ = \"BEGIN_DATE\")\nprivate Date beginDate;\n@Column(name = \"END_DATE\")\nprivate\
  \ Date endDate;\n@Column(name = \"FEE\")\nprivate int fee;\n// 构造方法、Getter 和 Setter\n\
  ...\n}\n```\n\n每个实体类都必须使用 `@Entity` 注解进行标注。你可以在此注解中为实体类指定表名。对于每个属性，可以使用 `@Column`\
  \ 注解指定列名和列详细信息。\n\n每个实体类都必须有一个由 `@Id` 注解定义的标识符。你可以使用 `@GeneratedValue` 注解选择标识符生成策略。此处，标识符将由表的自增列生成。\n\
  \nDAO 与之前代码示例中的几乎相同，仅在配置上有一处微小改动。\n\n```java\npublic HibernateCourseDao() {\nConfiguration\
  \ configuration = new Configuration()\n.setProperty(AvailableSettings.URL, \"jdbc:postgresql://localhost:5432/course\"\
  )\n.setProperty(AvailableSettings.USER, \"postgres\")\n.setProperty(AvailableSettings.PASS,\
  \ \"password\")\n.setProperty(AvailableSettings.DIALECT, PostgreSQL95Dialect.class.getName())\n\
  .setProperty(AvailableSettings.SHOW_SQL, String.valueOf(true))\n.setProperty(AvailableSettings.HBM2DDL_AUTO,\
  \ \"update\")\n.addAnnotatedClass(Course.class);\nsessionFactory = configuration.buildSessionFactory();\n\
  }\n```\n\n由于现在使用注解指定元数据，你需要使用 `addAnnotatedClass` 方法代替 `addClass`。这会指示 Hibernate\
  \ 从类本身读取映射元数据，而不是尝试定位 `hbm.xml` 文件。你可以再次使用相同的 `Main` 类来运行此示例。\n\n使用 JPA 并以 Hibernate\
  \ 作为引擎持久化对象\n\n\n除了持久化注解之外，JPA 还定义了一套用于对象持久化的编程接口。然而，JPA 本身并非持久化实现；你需要选择一个符合 JPA\
  \ 规范的引擎来提供持久化服务。Hibernate 可以通过 Hibernate EntityManager 模块来符合 JPA 规范。这样一来，Hibernate\
  \ 可以作为底层的 JPA 引擎来持久化对象。这让你既能保留在 Hibernate 上的宝贵投资（也许它速度更快，或者处理某些操作更令你满意），又能编写符合 JPA\
  \ 规范、可在其他 JPA 引擎间移植的代码。这也是一种将代码库过渡到 JPA 的有用方式。新代码严格遵循 JPA API 编写，旧代码则逐步迁移到 JPA 接口。\n\
  \n在 Java EE 环境中，你可以在 Java EE 容器中配置 JPA 引擎。但在 Java SE 应用程序中，你必须在本地设置引擎。JPA 的配置通过核心\
  \ XML 文件 `persistence.xml` 完成，该文件位于类路径根目录的 `META-INF` 目录下。在此文件中，你可以为底层引擎配置设置任何供应商特定的属性。当使用\
  \ Spring 配置 `EntityManagerFactory` 时，则无需此文件，配置可通过 Spring 完成。\n\n现在，让我们在类路径根目录的 `META-INF`\
  \ 目录下创建 JPA 配置文件 `persistence.xml`。每个 JPA 配置文件包含一个或多个 `<persistence-unit>` 元素。持久化单元定义了一组持久化类及其持久化方式。每个持久化单元需要一个名称用于标识。这里，我们为该持久化单元指定名称为\
  \ `course`。\n\n```\n\ncom.apress.springrecipes.course.Course\n\n```\n\n在这个 JPA 配置文件中，你将\
  \ Hibernate 配置为底层的 JPA 引擎。请注意，这里有一些通用的 `javax.persistence` 属性用于配置数据库位置以及要使用的用户名/密码组合。接下来是一些\
  \ Hibernate 特定的属性，用于配置方言以及 `hibernate.hbm2ddl.auto` 属性。最后，有一个 `<class>` 元素用于指定要映射的类。\n\
  \n在 Java EE 环境中，Java EE 容器能够为你管理实体管理器，并将其直接注入到你的 EJB 组件中。但是，当你在 Java EE 容器之外（例如，在\
  \ Java SE 应用程序中）使用 JPA 时，你必须自己创建和维护实体管理器。\n\n现在，让我们在 Java SE 应用程序中使用 JPA 实现 `CourseDao`\
  \ 接口。在调用 JPA 进行对象持久化之前，你必须初始化一个实体管理器工厂。实体管理器工厂的目的是为你生成实体管理器，以便持久化你的对象。\n\n```\n\
  package com.apress.springrecipes.course.jpa;\n...\nimport javax.persistence.EntityManager;\n\
  import javax.persistence.EntityManagerFactory;\nimport javax.persistence.EntityTransaction;\n\
  import javax.persistence.Persistence;\nimport javax.persistence.Query;\npublic class\
  \ JpaCourseDao implements CourseDao {\nprivate EntityManagerFactory entityManagerFactory;\n\
  public JpaCourseDao() {\nentityManagerFactory = Persistence.createEntityManagerFactory(\"\
  course\");\n}\npublic void store(Course course) {\nEntityManager manager = entityManagerFactory.createEntityManager();\n\
  EntityTransaction tx = manager.getTransaction();\ntry {\ntx.begin();\nmanager.merge(course);\n\
  tx.commit();\n} catch (RuntimeException e) {\ntx.rollback();\nthrow e;\n} finally\
  \ {\nmanager.close();\n}\n}\npublic void delete(Long courseId) {\nEntityManager\
  \ manager = entityManagerFactory.createEntityManager();\nEntityTransaction tx =\
  \ manager.getTransaction();\ntry {\ntx.begin();\nCourse course = manager.find(Course.class,\
  \ courseId);\nmanager.remove(course);\ntx.commit();\n} catch (RuntimeException e)\
  \ {\ntx.rollback();\nthrow e;\n} finally {\nmanager.close();\n}\n}\npublic Course\
  \ findById(Long courseId) {\nEntityManager manager = entityManagerFactory.createEntityManager();\n\
  try {\nreturn manager.find(Course.class, courseId);\n} finally {\nmanager.close();\n\
  }\n}\npublic List findAll() {\nEntityManager manager = entityManagerFactory.createEntityManager();\n\
  try {\nQuery query = manager.createQuery(\"select course from Course course\");\n\
  return query.getResultList();\n} finally {\nmanager.close();\n}\n}\n}\n```\n\n实体管理器工厂是通过\
  \ `javax.persistence.Persistence` 类的静态方法 `createEntityManagerFactory()` 构建的。你必须传入在\
  \ `persistence.xml` 中定义的持久化单元名称来创建实体管理器工厂。\n\n在前面的 DAO 方法中，你首先从实体管理器工厂创建一个实体管理器。对于任何涉及数据库更新的操作，例如\
  \ `merge()` 和 `remove()`，你必须在实体管理器上启动一个 JPA 事务。对于只读操作，例如 `find()` 和 JPA 查询，则无需启动事务。最后，你必须关闭实体管理器以释放资源。\n\
  \n你可以使用类似的 `Main` 类来测试这个 DAO，但这次你需要实例化 JPA DAO 实现。\n\n```\npackage com.apress.springrecipes.course;\n\
  ...\npublic class Main {\npublic static void main(String[] args) {\nCourseDao courseDao\
  \ = new JpaCourseDao();\n...\n}\n}\n```\n\n在前面针对 Hibernate 和 JPA 的 DAO 实现中，每个 DAO\
  \ 方法只有一两行代码不同。其余行都是你必须重复的样板式常规任务。此外，每个 ORM 框架都有自己用于本地事务管理的 API。\n\n9-7. 在 Spring\
  \ 中配置 ORM 资源工厂\n\n问题\n\n当单独使用 ORM 框架时，你必须使用其 API 配置其资源工厂。对于 Hibernate 和 JPA，你必须通过原生\
  \ Hibernate API 和 JPA 构建会话工厂和实体管理器工厂。你只能手动管理这些对象，而无法获得 Spring 的支持。\n\n解决方案\n\nSpring\
  \ 提供了几个工厂 bean，用于在 IoC 容器中创建 Hibernate 会话工厂或 JPA 实体管理器工厂作为单例 bean。这些工厂可以通过依赖注入在多个\
  \ bean 之间共享。此外，这允许会话工厂和实体管理器工厂与 Spring 的其他数据访问设施（如数据源和事务管理器）集成。\n\n工作原理\n\n对于 Hibernate，Spring\
  \ 提供了 `LocalSessionFactoryBean` 来创建普通的 Hibernate `SessionFactory`；对于 JPA，Spring\
  \ 有多个选项用于构建 `EntityManagerFactory`。你将探索如何从 JNDI 检索 `EntityManagerFactory`，以及如何使用\
  \ `LocalEntityManagerFactoryBean` 和 `LocalContainerEntityManagerFactoryBean`，以及每个选项之间的区别。\n\
  \n在 Spring 中配置 Hibernate 会话工厂\n\n\n\n首先，让我们修改 `HibernateCourseDao`，使其通过依赖注入接受一个会话工厂，而不是在构造函数中直接使用原生\
  \ Hibernate API 创建它。\n\n```\npackage com.apress.springrecipes.course.hibernate;\n\
  ...\nimport org.hibernate.SessionFactory;\npublic class HibernateCourseDao implements\
  \ CourseDao {\nprivate final SessionFactory sessionFactory;\npublic HibernateCourseDao(SessionFactory\
  \ sessionFactory) {\nthis.sessionFactory = sessionFactory;\n}\n...\n}\n```\n\n然后，创建一个配置类，用于将\
  \ Hibernate 作为 ORM 框架使用。你还可以在 Spring 的管理下声明一个 `HibernateCourseDao` 实例。\n\n```\n\
  package com.apress.springrecipes.course.config;\nimport com.apress.springrecipes.course.Course;\n\
  import com.apress.springrecipes.course.CourseDao;\nimport com.apress.springrecipes.course.hibernate.HibernateCourseDao;\n\
  import org.hibernate.SessionFactory;\nimport org.hibernate.cfg.AvailableSettings;\n\
  import org.hibernate.dialect.PostgreSQL95Dialect;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.orm.hibernate5.LocalSessionFactoryBean;\n\
  import java.util.Properties;\n@Configuration\npublic class CourseConfiguration {\n\
  @Bean\npublic CourseDao courseDao(SessionFactory sessionFactory) {\nreturn new HibernateCourseDao(sessionFactory);\n\
  }\n@Bean\npublic LocalSessionFactoryBean sessionFactory() {\nLocalSessionFactoryBean\
  \ sessionFactoryBean = new LocalSessionFactoryBean();\nsessionFactoryBean.setHibernateProperties(hibernateProperties());\n\
  sessionFactoryBean.setAnnotatedClasses(Course.class);\nreturn sessionFactoryBean;\n\
  }\nprivate Properties hibernateProperties() {\nProperties properties = new Properties();\n\
  properties.setProperty(AvailableSettings.URL, \"jdbc:postgresql://localhost:5432/course\"\
  );\nproperties.setProperty(AvailableSettings.USER, \"postgres\");\nproperties.setProperty(AvailableSettings.PASS,\
  \ \"password\");\nproperties.setProperty(AvailableSettings.DIALECT, PostgreSQL95Dialect.class.getName());\n\
  properties.setProperty(AvailableSettings.SHOW_SQL, String.valueOf(true));\nproperties.setProperty(AvailableSettings.HBM2DDL_AUTO,\
  \ \"update\");\nreturn properties;\n}\n}\n```\n\n之前设置在 `Configuration` 对象上的所有属性，现在都被转换为一个\
  \ `Properties` 对象，并添加到 `LocalSessionFactoryBean` 中。带注解的类通过 `setAnnotatedClasses`\
  \ 方法传入，以便 Hibernate 最终能识别这个带注解的类。构造好的 `SessionFactory` 通过其构造函数传递给 `HibernateCourseDao`。\n\
  \n如果你在一个仍使用 Hibernate 映射文件的项目中，可以使用 `mappingLocations` 属性来指定映射文件。`LocalSessionFactoryBean`\
  \ 还允许你利用 Spring 的资源加载支持，从各种类型的位置加载映射文件。你可以在 `mappingLocations` 属性中指定映射文件的资源路径，该属性的类型是\
  \ `Resource[]`。\n\n```\n@Bean\npublic LocalSessionFactoryBean sessionfactory() {\n\
  LocalSessionFactoryBean sessionFactoryBean = new LocalSessionFactoryBean();\nsessionFactoryBean.setDataSource(dataSource());\n\
  sessionFactoryBean.setMappingLocations(\nnew ClassPathResource(\"com/apress/springrecipes/course/Course.hbm.xml\"\
  ));\nsessionFactoryBean.setHibernateProperties(hibernateProperties());\nreturn sessionFactoryBean;\n\
  }\n```\n\n借助 Spring 的资源加载支持，你还可以在资源路径中使用通配符来匹配多个映射文件，这样在每次添加新的实体类时，就无需配置它们的位置。为此，你需要在配置类中有一个\
  \ `ResourcePatternResolver`。你可以通过使用 `ResourcePatternUtils` 和 `ResourceLoaderAware`\
  \ 接口来获取它。你实现后者，并使用 `getResourcePatternResolver` 方法基于 `ResourceLoader` 获取一个 `ResourcePatternResolver`。\n\
  \n```\n@Configuration\npublic class CourseConfiguration implements ResourceLoaderAware\
  \ {\nprivate ResourcePatternResolver resourcePatternResolver;\n...\n@Override\n\
  public void setResourceLoader(ResourceLoader resourceLoader) {\nthis.resourcePatternResolver\
  \ =\nResourcePatternUtils.getResourcePatternResolver(resourceLoader);\n}\n}\n```\n\
  \n现在，你可以使用 `ResourcePatternResolver` 将资源模式解析为资源。\n\n```\n@Bean\npublic LocalSessionFactoryBean\
  \ sessionfactory() throws IOException {\nLocalSessionFactoryBean sessionFactoryBean\
  \ = new LocalSessionFactoryBean();\nResource[] mappingResources =\nresourcePatternResolver.getResources(\"\
  classpath:com/apress/springrecipes/course/*.hbm.xml\");\nsessionFactoryBean.setMappingLocations(mappingResources);\n\
  ...\nreturn sessionFactoryBean;\n}\n```\n\n现在，你可以修改 `Main` 类，从 Spring IoC 容器中检索\
  \ `HibernateCourseDao` 实例。\n\n```\npackage com.apress.springrecipes.course;\n...\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\nApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(CourseConfiguration.class);\n\
  CourseDao courseDao = context.getBean(CourseDao.class);\n...\n}\n}\n```\n\n上述工厂\
  \ bean 通过加载 Hibernate 配置文件来创建会话工厂，该配置文件包含数据库设置（JDBC 连接属性或数据源的 JNDI 名称）。现在，假设你在 Spring\
  \ IoC 容器中定义了一个数据源。如果你想为你的会话工厂使用这个数据源，可以将其注入到 `LocalSessionFactoryBean` 的 `dataSource`\
  \ 属性中。在此属性中指定的数据源将覆盖 Hibernate 配置中的数据库设置。如果设置了此项，Hibernate 设置不应再定义连接提供者，以避免无意义的双重配置。\n\
  \n```\n@Configuration\npublic class CourseConfiguration {\n...\n@Bean\npublic DataSource\
  \ dataSource() {\nHikariDataSource dataSource = new HikariDataSource();\ndataSource.setUsername(\"\
  postgres\");\ndataSource.setPassword(\"password\");\ndataSource.setJdbcUrl(\"jdbc:postgresql://localhost:5432/course\"\
  );\ndataSource.setMinimumIdle(2);\ndataSource.setMaximumPoolSize(5);\nreturn dataSource;\n\
  }\n@Bean\npublic LocalSessionFactoryBean sessionFactory(DataSource dataSource) {\n\
  LocalSessionFactoryBean sessionFactoryBean = new LocalSessionFactoryBean();\nsessionFactoryBean.setDataSource(dataSource);\n\
  sessionFactoryBean.setHibernateProperties(hibernateProperties());\nsessionFactoryBean.setAnnotatedClasses(Course.class);\n\
  return sessionFactoryBean;\n}\nprivate Properties hibernateProperties() {\nProperties\
  \ properties = new Properties();\nproperties.setProperty(AvailableSettings.DIALECT,\
  \ PostgreSQL95Dialect.class.getName());\nproperties.setProperty(AvailableSettings.SHOW_SQL,\
  \ String.valueOf(true));\nproperties.setProperty(AvailableSettings.HBM2DDL_AUTO,\
  \ \"update\");\nreturn properties;\n}}\n```\n\n或者，你甚至可以通过将所有配置合并到 `LocalSessionFactoryBean`\
  \ 中来忽略 Hibernate 配置文件。例如，你可以在 `packagesToScan` 属性中指定包含 JPA 注解类的包，并在 `hibernateProperties`\
  \ 属性中指定其他 Hibernate 属性，例如数据库方言。\n\n\n\n```\n@Configuration\npublic class CourseConfiguration\
  \ {\n...\n@Bean\npublic LocalSessionFactoryBean sessionfactory() {\nLocalSessionFactoryBean\
  \ sessionFactoryBean = new LocalSessionFactoryBean();\nsessionFactoryBean.setDataSource(dataSource());\n\
  sessionFactoryBean.setPackagesToScan(\"com.apress.springrecipes.course\");\nsessionFactoryBean.setHibernateProperties(hibernateProperties());\n\
  return sessionFactoryBean;\n}\nprivate Properties hibernateProperties() {\nProperties\
  \ properties = new Properties();\nproperties.put(\"hibernate.dialect\", org.hibernate.dialect.DerbyTenSevenDialect.class.getName());\n\
  properties.put(\"hibernate.show_sql\", true);\nproperties.put(\"hibernate.hbm2dll.auto\"\
  , \"update\");\nreturn properties;\n}\n}\n```\n\n现在可以删除 Hibernate 配置文件（即 `hibernate.cfg.xml`），因为其配置已迁移至\
  \ Spring。\n\n在 Spring 中配置 JPA 实体管理器工厂\n\n首先，让我们修改 `JpaCourseDao`，使其通过依赖注入接受实体管理器工厂，而不是在构造函数中直接创建。\n\
  \n```\npackage com.apress.springrecipes.course;\n...\nimport javax.persistence.EntityManagerFactory;\n\
  import javax.persistence.Persistence;\npublic class JpaCourseDao implements CourseDao\
  \ {\nprivate final EntityManagerFactory entityManagerFactory;\npublic JpaCourseDao\
  \ (EntityManagerFactory entityManagerFactory) {\nthis.entityManagerFactory = entityManagerFactory;\n\
  }\n...\n}\n```\n\nJPA 规范定义了在 Java SE 和 Java EE 环境中获取实体管理器工厂的方式。在 Java SE 环境中，通过调用\
  \ `Persistence` 类的 `createEntityManagerFactory()` 静态方法手动创建实体管理器工厂。\n\n让我们创建一个用于\
  \ JPA 的 Bean 配置文件。Spring 提供了一个工厂 Bean `LocalEntityManagerFactoryBean`，用于在 IoC 容器中创建实体管理器工厂。你必须指定\
  \ JPA 配置文件中定义的持久化单元名称。你也可以在 Spring 管理下声明一个 `JpaCourseDao` 实例。\n\n```\npackage com.apress.springrecipes.course.config;\n\
  import com.apress.springrecipes.course.CourseDao;\nimport com.apress.springrecipes.course.jpa.JpaCourseDao;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.orm.jpa.LocalEntityManagerFactoryBean;\nimport javax.persistence.EntityManagerFactory;\n\
  @Configuration\npublic class CourseConfiguration {\n@Bean\npublic CourseDao courseDao(EntityManagerFactory\
  \ entityManagerFactory) {\nreturn new JpaCourseDao(entityManagerFactory);\n}\n@Bean\n\
  public LocalEntityManagerFactoryBean entityManagerFactory() {\nLocalEntityManagerFactoryBean\
  \ emf = new LocalEntityManagerFactoryBean();\nemf.setPersistenceUnitName(\"course\"\
  );\nreturn emf;\n}\n}\n```\n\n现在，你可以通过从 Spring IoC 容器中检索 `JpaCourseDao` 实例，使用 `Main`\
  \ 类对其进行测试。\n\n```\npackage com.apress.springrecipes.course;\n...\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.support.ClassPathXmlApplicationContext;\npublic\
  \ class Main {\npublic static void main(String[] args) {\nApplicationContext context\
  \ =     new AnnotationConfigApplicationContext(CourseConfiguration.class);\nCourseDao\
  \ courseDao = context.getBean(CourseDao.class);\n...\n}\n}\n```\n\n在 Java EE 环境中，你可以通过\
  \ JNDI 从 Java EE 容器中查找实体管理器工厂。在 Spring 中，你可以使用 `JndiLocatorDelegate` 对象执行 JNDI 查找（这比构造\
  \ `JndiObjectFactoryBean` 更简单，后者同样可行）。\n\n```\n@Bean\npublic EntityManagerFactory\
  \ entityManagerFactory() throws NamingException {\nreturn JndiLocatorDelegate.createDefaultResourceRefLocator()\n\
  .lookup(\"jpa/coursePU\", EntityManagerFactory.class);\n}\n```\n\n`LocalEntityManagerFactoryBean`\
  \ 通过加载 JPA 配置文件（即 `persistence.xml`）来创建实体管理器工厂。Spring 支持通过另一个工厂 Bean `LocalContainerEntityManagerFactoryBean`\
  \ 以更灵活的方式创建实体管理器工厂。它允许你覆盖 JPA 配置文件中的某些配置，例如数据源和数据库方言。因此，你可以利用 Spring 的数据访问设施来配置实体管理器工厂。\n\
  \n```\n@Configuration\npublic class CourseConfiguration {\n...\n@Bean\npublic LocalContainerEntityManagerFactoryBean\
  \ entityManagerFactory(DataSource dataSource) {\nLocalContainerEntityManagerFactoryBean\
  \ emf = new LocalContainerEntityManagerFactoryBean();\nemf.setPersistenceUnitName(\"\
  course\");\nemf.setDataSource(dataSource);\nemf.setJpaVendorAdapter(jpaVendorAdapter());\n\
  return emf;\n}\nprivate JpaVendorAdapter jpaVendorAdapter() {\nHibernateJpaVendorAdapter\
  \ jpaVendorAdapter = new HibernateJpaVendorAdapter();\njpaVendorAdapter.setShowSql(true);\n\
  jpaVendorAdapter.setGenerateDdl(true);\njpaVendorAdapter.setDatabasePlatform(PostgreSQL95Dialect.class.getName());\n\
  return jpaVendorAdapter;\n}\n@Bean\npublic DataSource dataSource() {\nHikariDataSource\
  \ dataSource = new HikariDataSource();\ndataSource.setUsername(\"postgres\");\n\
  dataSource.setPassword(\"password\");\ndataSource.setJdbcUrl(\"jdbc:postgresql://localhost:5432/course\"\
  );\ndataSource.setMinimumIdle(2);\ndataSource.setMaximumPoolSize(5);\nreturn dataSource;\n\
  }\n}\n```\n\n在上述 Bean 配置中，你将一个数据源注入到该实体管理器工厂。它将覆盖 JPA 配置文件中的数据库设置。你可以为 `LocalContainerEntityManagerFactoryBean`\
  \ 设置一个 JPA 供应商适配器，以指定 JPA 引擎特定的属性。当使用 Hibernate 作为底层 JPA 引擎时，应选择 `HibernateJpaVendorAdapter`。该适配器不支持的其他属性可以在\
  \ `jpaProperties` 属性中指定。\n\n现在，你的 JPA 配置文件（即 `persistence.xml`）可以简化为如下形式，因为其配置已迁移至\
  \ Spring：\n\n```\n\ncom.apress.springrecipes.course.Course\n\n```\n\nSpring 还使得无需\
  \ `persistence.xml` 文件即可配置 JPA `EntityManagerFactory` 成为可能。如果需要，你可以在 Spring 配置文件中完全配置它。你需要指定\
  \ `packagesToScan` 属性，而不是 `persistenceUnitName`。之后，你可以完全删除 `persistence.xml` 文件。\n\
  \n```\n@Bean\npublic LocalContainerEntityManagerFactoryBean entityManagerFactory()\
  \ {\nLocalContainerEntityManagerFactoryBean emf = new LocalContainerEntityManagerFactoryBean();\n\
  emf.setDataSource(dataSource());\nemf.setPackagesToScan(\"com.apress.springrecipes.course\"\
  );\nemf.setJpaVendorAdapter(jpaVendorAdapter());\nreturn emf;\n}\n```\n\n9-8\\.\
  \ 使用 Hibernate 的上下文会话持久化对象\n\n问题\n\n你想编写一个基于纯 Hibernate API 的 DAO，但仍依赖 Spring 管理的事务。\n\
  \n解决方案\n\n从 Hibernate 3 开始，会话工厂可以为你管理上下文会话，并允许你通过 `org.hibernate.SessionFactory`\
  \ 上的 `getCurrentSession()` 方法检索它们。在单个事务内，每次调用 `getCurrentSession()` 方法都会获得相同的会话。这确保了每个事务只有一个\
  \ Hibernate 会话，因此它能很好地与 Spring 的事务管理支持配合使用。\n\n实现原理\n\n要使用上下文会话方法，你的 DAO 方法需要访问会话工厂，可以通过\
  \ setter 方法或构造函数参数注入。然后，在每个 DAO 方法中，你从会话工厂获取上下文会话，并使用它进行对象持久化。\n\n\n```\n```\npackage\
  \ com.apress.springrecipes.course.hibernate;\nimport com.apress.springrecipes.course.Course;\n\
  import com.apress.springrecipes.course.CourseDao;\nimport org.hibernate.Query;\n\
  import org.hibernate.Session;\nimport org.hibernate.SessionFactory;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import java.util.List;\npublic class HibernateCourseDao implements CourseDao {\n\
  private final SessionFactory sessionFactory;\npublic HibernateCourseDao(SessionFactory\
  \ sessionFactory) {\nthis.sessionFactory=sessionFactory;\n}\n@Transactional\npublic\
  \ Course store(Course course) {\nSession session = sessionFactory.getCurrentSession();\n\
  session.saveOrUpdate(course);\nreturn course;\n}\n@Transactional\npublic void delete(Long\
  \ courseId) {\nSession session = sessionFactory.getCurrentSession();\nCourse course\
  \ = session.get(Course.class, courseId);\nsession.delete(course);\n}\n@Transactional(readOnly=true)\n\
  public Course findById(Long courseId) {\nSession session = sessionFactory.getCurrentSession();\n\
  return session.get(Course.class, courseId);\n}\n@Transactional(readOnly=true)\n\
  public List findAll() {\nSession session = sessionFactory.getCurrentSession();\n\
  return session.createQuery(\"from Course\", Course.class).list();\n}\n}\n```\n\n\
  请注意，你的所有 DAO 方法都必须设置为事务性的。这是必需的，因为 Spring 通过 Hibernate 的上下文会话支持与 Hibernate 集成。Spring\
  \ 拥有自己的 Hibernate `CurrentSessionContext` 接口实现。它会尝试查找一个事务，如果找不到，就会失败并报错，提示没有 Hibernate\
  \ 会话绑定到当前线程。你可以通过在每个方法或整个类上添加 `@Transactional` 注解来实现这一点。\n这确保了 DAO 方法内的持久化操作将在同一个事务中执行，因此也将在同一个会话中执行。此外，如果服务层组件的一个方法调用了多个\
  \ DAO 方法，并且它将自己的事务传播给这些方法，那么所有这些 DAO 方法也将在同一个会话中运行。\n\n警告\n\n当使用 Spring 配置 Hibernate\
  \ 时，确保不要设置 `hibernate.current_session_context_class` 属性，因为这会干扰 Spring 正确管理事务的能力。仅当你需要\
  \ JTA 事务时，才应设置此属性。\n\n在 bean 配置文件中，你需要为此应用声明一个 `HibernateTransactionManager` 实例，并通过\
  \ `@EnableTransactionManagement` 启用声明式事务管理。\n\n```\n@Configuration\n@EnableTransactionManagement\n\
  public class CourseConfiguration {\n@Bean\npublic CourseDao courseDao(SessionFactory\
  \ sessionFactory) {\nreturn new HibernateCourseDao(sessionFactory);\n}\n@Bean\n\
  public HibernateTransactionManager transactionManager(SessionFactory sessionFactory)\
  \ {\nreturn new HibernateTransactionManager(sessionFactory);\n}\n}\n```\n\n然而，当调用\
  \ Hibernate 会话的原生方法时，抛出的异常将是原生类型的 `HibernateException`。如果你希望将 Hibernate 异常转换为 Spring\
  \ 的 `DataAccessException` 以实现一致的异常处理，则需要在需要异常转换的 DAO 类上应用 `@Repository` 注解。\n\n\
  ```\npackage com.apress.springrecipes.course.hibernate;\n...\nimport org.springframework.stereotype.Repository;\n\
  @Repository\npublic class HibernateCourseDao implements CourseDao {\n...\n}\n```\n\
  \n`PersistenceExceptionTranslationPostProcessor` 负责将原生的 Hibernate 异常转换为 Spring `DataAccessException`\
  \ 层次结构中的数据访问异常。这个 bean 后处理器只会转换那些标注了 `@Repository` 的 bean 所抛出的异常。当使用基于 Java 的配置时，这个\
  \ bean 会在 `AnnotationConfigApplicationContext` 中自动注册；因此，无需显式声明它的 bean。\n\n在 Spring\
  \ 中，`@Repository` 是一个构造型注解。通过标注它，组件类可以通过组件扫描被自动检测到。你可以在此注解中指定一个组件名称，并由 Spring IoC\
  \ 容器自动注入会话工厂。\n\n```\npackage com.apress.springrecipes.course.hibernate;\n...\n\
  import org.hibernate.SessionFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Repository;\n@Repository(\"courseDao\")\n\
  public class HibernateCourseDao implements CourseDao {\nprivate final SessionFactory\
  \ sessionFactory;\npublic HibernateCourseDao (SessionFactory sessionFactory) {\n\
  this.sessionFactory = sessionFactory;\n}\n...\n}\n```\n\n然后，你可以简单地添加 `@ComponentScan`\
  \ 注解，并删除原始的 `HibernateCourseDao` bean 声明。\n\n```\n@Configuration\n@EnableTransactionManagement\n\
  @ComponentScan(\"com.apress.springrecipes.course\")\npublic class CourseConfiguration\
  \ { ... }\n```\n\n9-9\\. 使用 JPA 的上下文注入持久化对象\n\n问题\n\n在 Java EE 环境中，Java EE 容器可以为你管理实体管理器，并将它们直接注入到你的\
  \ EJB 组件中。EJB 组件可以简单地对注入的实体管理器执行持久化操作，而无需过多关心实体管理器的创建和事务管理。\n\n解决方案\n\n最初，`@PersistenceContext`\
  \ 注解用于在 EJB 组件中注入实体管理器。Spring 也可以通过一个 bean 后处理器来解释这个注解。它会将一个实体管理器注入到带有此注解的属性中。Spring\
  \ 确保你在单个事务内的所有持久化操作都由同一个实体管理器处理。\n\n工作原理\n\n要使用上下文注入方法，你可以在 DAO 中声明一个实体管理器字段，并用\
  \ `@PersistenceContext` 注解标注它。Spring 会向此字段注入一个实体管理器，供你持久化对象。\n\n```\npackage com.apress.springrecipes.course.jpa;\n\
  import com.apress.springrecipes.course.Course;\nimport com.apress.springrecipes.course.CourseDao;\n\
  import org.springframework.transaction.annotation.Transactional;\nimport javax.persistence.EntityManager;\n\
  import javax.persistence.PersistenceContext;\nimport javax.persistence.TypedQuery;\n\
  import java.util.List;\npublic class JpaCourseDao implements CourseDao {\n@PersistenceContext\n\
  private EntityManager entityManager;\n@Transactional\npublic Course store(Course\
  \ course) {\nreturn entityManager.merge(course);\n}\n@Transactional\npublic void\
  \ delete(Long courseId) {\nCourse course = entityManager.find(Course.class, courseId);\n\
  entityManager.remove(course);\n}\n@Transactional(readOnly = true)\npublic Course\
  \ findById(Long courseId) {\nreturn entityManager.find(Course.class, courseId);\n\
  }\n@Transactional(readOnly = true)\npublic List findAll() {\nTypedQuery query =\n\
  entityManager.createQuery(\"select c from Course c\", Course.class);\nreturn query.getResultList();\n\
  }\n}\n```\n\n你可以为每个 DAO 方法或整个 DAO 类标注 `@Transactional`，以使所有这些方法具有事务性。这确保了单个方法内的持久化操作将在同一个事务中执行，因此也由同一个实体管理器处理。\n\
  \n在 bean 配置文件中，你需要声明一个 `JpaTransactionManager` 实例，并通过 `@EnableTransactionManagement`\
  \ 启用声明式事务管理。当使用基于 Java 的配置时，`PersistenceAnnotationBeanPostProcessor` 实例会自动注册，用于将实体管理器注入到标注了\
  \ `@PersistenceContext` 的属性中。\n\n\n\n```\npackage com.apress.springrecipes.course.config;\n\
  import com.apress.springrecipes.course.CourseDao;\nimport com.apress.springrecipes.course.JpaCourseDao;\n\
  import org.apache.derby.jdbc.ClientDriver;\nimport org.hibernate.dialect.DerbyTenSevenDialect;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jdbc.datasource.SimpleDriverDataSource;\nimport org.springframework.orm.jpa.JpaTransactionManager;\n\
  import org.springframework.orm.jpa.JpaVendorAdapter;\nimport org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean;\n\
  import org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter;\nimport org.springframework.transaction.PlatformTransactionManager;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  import javax.sql.DataSource;\n@Configuration\n@EnableTransactionManagement\npublic\
  \ class CourseConfiguration {\n@Bean\npublic CourseDao courseDao() {\nreturn new\
  \ JpaCourseDao();\n}\n@Bean\npublic LocalContainerEntityManagerFactoryBean entityManagerFactory()\
  \ {\nLocalContainerEntityManagerFactoryBean emf =\nnew LocalContainerEntityManagerFactoryBean();\n\
  emf.setDataSource(dataSource());\nemf.setJpaVendorAdapter(jpaVendorAdapter());\n\
  return emf;\n}\nprivate JpaVendorAdapter jpaVendorAdapter() {\nHibernateJpaVendorAdapter\
  \ jpaVendorAdapter = new HibernateJpaVendorAdapter();\njpaVendorAdapter.setShowSql(true);\n\
  jpaVendorAdapter.setGenerateDdl(true);\njpaVendorAdapter.setDatabasePlatform(DerbyTenSevenDialect.class.getName());\n\
  return jpaVendorAdapter;\n}\n@Bean\npublic JpaTransactionManager transactionManager(EntityManagerFactory\
  \ entityManagerFactory) {\nreturn new JpaTransactionManager(entityManagerFactory);\n\
  }\n@Bean\npublic DataSource dataSource() { ... }\n}\n```\n\n`PersistenceAnnotationBeanPostProcessor`\n\
  也可以使用 `@PersistenceUnit` 注解将实体管理器工厂注入到属性中。这允许你自行创建实体管理器并管理事务。这与通过 setter 方法注入实体管理器工厂并无区别。\n\
  \n```\npackage com.apress.springrecipes.course;\n...\nimport javax.persistence.EntityManagerFactory;\n\
  import javax.persistence.PersistenceUnit;\npublic class JpaCourseDao implements\
  \ CourseDao {\n@PersistenceContext\nprivate EntityManager entityManager;\n@PersistenceUnit\n\
  private EntityManagerFactory entityManagerFactory;\n...\n}\n```\n\n当在 JPA 实体管理器上调用原生方法时，抛出的异常将是原生类型的\
  \ `PersistenceException` 或其他 Java SE 异常，例如 `IllegalArgumentException` 和 `IllegalStateException`。如果你希望将\
  \ JPA 异常转换为 Spring 的 `DataAccessException`，则必须在你的 DAO 类上应用 `@Repository` 注解。\n\n\
  ```\npackage com.apress.springrecipes.course;\n...\nimport org.springframework.stereotype.Repository;\n\
  @Repository(\"courseDao\")\npublic class JpaCourseDao implements CourseDao {\n...\n\
  }\n```\n\n`PersistenceExceptionTranslationPostProcessor` 实例会将原生 JPA 异常转换为 Spring\
  \ 的 `DataAccessException` 层次结构中的异常。使用基于 Java 的配置时，此 bean 会自动注册到 `AnnotationConfigApplicationContext`\
  \ 中；因此，无需显式声明该 bean。\n\n9-10. 使用 Spring Data JPA 简化 JPA\n\n问题\n\n即使使用 JPA，编写数据访问代码也可能是一项繁琐且重复的任务。你通常需要访问\
  \ `EntityManager` 或 `EntityManagerFactory`，并且必须创建查询——更不用说当你拥有大量 DAO 时，需要为所有不同的实体重复声明\
  \ `findById` 和 `findAll` 方法。\n\n解决方案\n\nSpring Data JPA 允许你（就像 Spring 本身一样）专注于重要的部分，而不是完成此任务所需的样板代码。它还提供了最常用的数据访问方法（例如\
  \ `findAll`、`delete`、`save` 等）的默认实现。\n\n工作原理\n\n要使用 Spring Data JPA，你必须扩展其接口之一。这些接口会被检测到，并在运行时生成该仓库的默认实现。在大多数情况下，扩展\
  \ `CrudRepository<T, ID>` 接口就足够了。\n\n```\npackage com.apress.springrecipes.course;\n\
  import com.apress.springrecipes.course.Course;\nimport org.springframework.data.repository.CrudRepository;\n\
  public interface CourseRepository extends CrudRepository{}\n```\n\n这足以对 `Course`\
  \ 实体执行所有必要的 CRUD 操作。扩展 Spring Data 接口时，你必须指定类型 `Course` 和主键类型 `Long`。运行时生成仓库需要这些信息。\n\
  \n注意\n\n你也可以扩展 `JpaRepository`，它添加了一些 JPA 特定的方法（`flush`、`saveAndFlush`），并提供了带有分页/排序功能的查询方法。\n\
  \n接下来，你需要启用对 Spring Data 仓库的检测。为此，你可以使用 Spring Data JPA 提供的 `@EnableJpaRepositories`\
  \ 注解。\n\n```\n@Configuration\n@EnableTransactionManagement\n@EnableJpaRepositories(\"\
  com.apress.springrecipes.course\")\npublic class CourseConfiguration { ... }\n```\n\
  \n这将引导 Spring Data JPA 并构建一个可用的仓库。默认情况下，所有仓库方法都标记有 `@Transactional`，因此不需要额外的注解。\n\
  \n现在，你可以通过从 Spring IoC 容器中检索 `CourseRepository` 实例，使用 `Main` 类对其进行测试。\n\n```\npackage\
  \ com.apress.springrecipes.course.datajpa;\n...\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.support.ClassPathXmlApplicationContext;\npublic\
  \ class Main {\npublic static void main(String[] args) {\nApplicationContext context\
  \ =\nnew AnnotationConfigApplicationContext(CourseConfiguration.class);\nCourseRepository\
  \ repository = context.getBean(CourseRepository.class);\n...\n}\n}\n```\n\n所有其他方面，例如异常转换、事务管理以及\
  \ `EntityManagerFactory` 的简便配置，仍然适用于基于 Spring Data JPA 的仓库。它只是让你的工作变得更加轻松，并让你专注于重要的事情。\n\
  \n总结\n\n本章讨论了如何使用 Spring 对 JDBC、Hibernate 和 JPA 的支持。你学习了如何配置 `DataSource` 对象以连接到数据库，以及如何使用\
  \ Spring 的 `JdbcTemplate` 和 `NamedParameterJdbcTemplate` 对象来摆脱代码中繁琐的样板处理。你了解了如何使用实用基类通过\
  \ JDBC 和 Hibernate 构建 DAO 类，以及如何使用 Spring 对构造型注解和组件扫描的支持来轻松构建新的 DAO 和服务。最后的配方向你展示了如何通过使用\
  \ Spring Data JPA 的强大功能来进一步简化数据访问代码。在下一章中，你将学习如何将事务（例如，用于 JMS 或数据库）与 Spring 结合使用，以帮助确保服务中的一致状态。\n\
  \n10. Spring 事务管理\n\n在本章中，你将学习事务的基本概念以及 Spring 在事务管理领域的能力。事务管理是企业应用程序中确保数据完整性和一致性的基本技术。Spring\
  \ 作为一个企业应用程序框架，在不同的事务管理 API 之上提供了一个抽象层。作为应用程序开发人员，你可以使用 Spring 的事务管理设施，而无需过多了解底层的事务管理\
  \ API。\n\n与 EJB 中的 Bean 管理事务（BMT）和容器管理事务（CMT）方法类似，Spring 支持编程式和声明式事务管理。Spring 事务支持的目标是通过向\
  \ POJO 添加事务功能来提供 EJB 事务的替代方案。\n\n\n\n**编程式事务管理** 是通过在业务方法中嵌入事务管理代码来实现的，用于控制事务的提交和回滚。通常，如果方法正常完成，则提交事务；如果方法抛出特定类型的异常，则回滚事务。通过编程式事务管理，你可以定义自己的规则来提交和回滚事务。\n\
  \n然而，当以编程方式管理事务时，你必须在每个事务性操作中包含事务管理代码。因此，样板式的事务代码会在每个操作中重复出现。此外，你很难为不同的应用程序启用和禁用事务管理。如果你对\
  \ AOP 有扎实的理解，你可能已经注意到事务管理是一种横切关注点。\n\n**声明式事务管理** 在大多数情况下比编程式事务管理更可取。它通过声明的方式将事务管理代码与业务方法分离。事务管理作为一种横切关注点，可以通过\
  \ AOP 方法进行模块化。Spring 通过 Spring AOP 框架支持声明式事务管理。这可以帮助你更轻松地为应用程序启用事务，并定义一致的事务策略。声明式事务管理不如编程式事务管理灵活。\n\
  \n编程式事务管理允许你通过代码控制事务——根据你的判断显式地启动、提交和加入事务。你可以指定一组事务属性，以细粒度级别定义事务。Spring 支持的事务属性包括传播行为、隔离级别、回滚规则、事务超时以及事务是否为只读。这些属性允许你进一步自定义事务的行为。\n\
  \n完成本章后，你将能够在应用程序中应用不同的事务管理策略。此外，你将熟悉不同的事务属性，以便精细地定义事务。\n\n在某些情况下，当你认为添加 Spring\
  \ 代理不值得麻烦或可以忽略其性能损失时，编程式事务管理是一个好主意。此时，你可以自行访问原生事务并手动控制事务。一个更便捷的选择是使用 `TransactionTemplate`\
  \ 类，它可以避免 Spring 代理的开销，该类提供了一个模板方法，围绕该方法启动事务边界，然后提交事务。\n\n10-1\\. 避免事务管理中的问题\n\n\
  事务管理是企业应用开发中确保数据完整性和一致性的关键技术。没有事务管理，你的数据和资源可能会被破坏，并处于不一致的状态。事务管理对于在并发和分布式环境中从意外错误中恢复尤为重要。\n\
  \n简单来说，事务是被视为单个工作单元的一系列操作。这些操作要么全部完成，要么完全不产生任何影响。如果所有操作都顺利执行，事务应被永久提交。相反，如果其中任何一个操作出错，事务应回滚到初始状态，就像什么都没发生过一样。\n\
  \n事务的概念可以用四个关键属性来描述：原子性（Atomicity）、一致性（Consistency）、隔离性（Isolation）和持久性（Durability），即\
  \ ACID。\n\n*   **原子性**：事务是一个由一系列操作组成的原子操作。事务的原子性确保这些操作要么全部完成，要么完全不产生任何影响。\n*   **一致性**：一旦事务的所有操作完成，事务即被提交。此时，你的数据和资源将处于符合业务规则的一致状态。\n\
  *   **隔离性**：由于可能同时有许多事务处理同一数据集，每个事务应与其他事务隔离，以防止数据损坏。\n*   **持久性**：一旦事务完成，其结果应是持久的，能够承受任何系统故障（想象一下，如果在事务提交过程中机器断电）。通常，事务的结果会被写入持久化存储。\n\
  \n为了理解事务管理的重要性，让我们从一个在线书店购买书籍的例子开始。首先，你需要在数据库中为这个应用程序创建一个新的模式。我们选择使用 PostgreSQL\
  \ 作为这些示例的数据库。本章的源代码包含一个 `bin` 目录，其中有两个脚本：一个（`postgres.sh`）用于下载 Docker 容器并启动一个默认的\
  \ Postgres 实例，另一个（`psql.sh`）用于连接到正在运行的 Postgres 实例。请参见表 10-1 以获取在你的 Java 应用程序中使用的连接属性。\n\
  \n表 10-1.\n\n连接到应用程序数据库的 JDBC 属性\n\n| 属性 | 值 |\n| --- | --- |\n| 驱动类 | `org.postgresql.Driver`\
  \ |\n| URL | `jdbc:postgresql://localhost:5432/bookstore` |\n| 用户名 | `postgres`\
  \ |\n| 密码 | `password` |\n\n注意\n\n本章的示例代码在 `bin` 目录中提供了用于启动和连接到基于 Docker 的 PostgreSQL\
  \ 实例的脚本。要启动实例并创建数据库，请遵循以下步骤：\n\n1.  执行 `bin\\postgres.sh`，它将下载并启动 Postgres Docker\
  \ 容器。\n2.  执行 `bin\\psql.sh`，它将连接到正在运行的 Postgres 容器。\n3.  执行 `CREATE DATABASE bookstore`\
  \ 来创建用于示例的数据库。\n\n对于你的书店应用程序，你需要一个存储数据的地方。你将创建一个简单的数据库来管理书籍和账户。\n\n表的实体关系（ER）图如图\
  \ 10-1 所示。\n\n![A314861_4_En_10_Fig1_HTML.jpg](img/A314861_4_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1.\n\nBOOK_STOCK 描述了给定 BOOK 的库存数量。\n\n现在，让我们为上述模型创建 SQL。执行 `bin\\psql.sh`\
  \ 命令连接到正在运行的容器并打开 `psql` 工具。\n\n将以下 SQL 粘贴到 shell 中并验证其成功执行：\n\n```\nCREATE TABLE\
  \ BOOK (\nISBN         VARCHAR(50)    NOT NULL,\nBOOK_NAME    VARCHAR(100)   NOT\
  \ NULL,\nPRICE        INT,\nPRIMARY KEY (ISBN)\n);\nCREATE TABLE BOOK_STOCK (\n\
  ISBN     VARCHAR(50)    NOT NULL,\nSTOCK    INT            NOT NULL,\nPRIMARY KEY\
  \ (ISBN),\nCONSTRAINT positive_stock CHECK (STOCK >= 0)\n);\nCREATE TABLE ACCOUNT\
  \ (\nUSERNAME    VARCHAR(50)    NOT NULL,\nBALANCE     INT            NOT NULL,\n\
  PRIMARY KEY (USERNAME),\nCONSTRAINT positive_balance CHECK (BALANCE >= 0)\n);\n\
  ```\n\n这种类型的实际应用程序可能会使用十进制类型的价格字段，但使用 `int` 可以使编程更易于理解，因此我们将其保留为 `int`。\n\n\n\n\
  `BOOK` 表存储图书的基本信息，如书名和价格，以图书 ISBN 作为主键。`BOOK_STOCK` 表记录每本书的库存。库存值通过 `CHECK` 约束限制为正数。尽管\
  \ `CHECK` 约束类型在 SQL-99 中已定义，但并非所有数据库引擎都支持。在撰写本文时，此限制主要适用于 MySQL，因为 Sybase、Derby、HSQL、Oracle、DB2、SQL\
  \ Server、Access、PostgreSQL 和 FireBird 均支持该约束。如果你的数据库引擎不支持 `CHECK` 约束，请查阅其文档以了解类似的约束支持。最后，`ACCOUNT`\
  \ 表存储客户账户及其余额。同样，余额也被限制为正数。\n\n你的书店操作在以下 `BookShop` 接口中定义。目前，只有一个操作：`purchase()`。\n\
  \n```\npackage com.apress.springrecipes.bookshop;\npublic interface BookShop {\n\
  void purchase(String isbn, String username);\n}\n```\n\n由于你将使用 JDBC 实现此接口，因此需要创建以下\
  \ `JdbcBookShop` 类。为了更好地理解事务的本质，让我们在不借助 Spring JDBC 支持的情况下实现此类。\n\n```\npackage\
  \ com.apress.springrecipes.bookshop;\nimport java.sql.Connection;\nimport java.sql.PreparedStatement;\n\
  import java.sql.ResultSet;\nimport java.sql.SQLException;\nimport javax.sql.DataSource;\n\
  public class JdbcBookShop implements BookShop {\nprivate DataSource dataSource;\n\
  public void setDataSource(DataSource dataSource) {\nthis.dataSource = dataSource;\n\
  }\npublic void purchase(String isbn, String username) {\nConnection conn = null;\n\
  try {\nconn = dataSource.getConnection();\nPreparedStatement stmt1 = conn.prepareStatement(\n\
  \"SELECT PRICE FROM BOOK WHERE ISBN = ?\");\nstmt1.setString(1, isbn);\nResultSet\
  \ rs = stmt1.executeQuery();\nrs.next();\nint price = rs.getInt(\"PRICE\");\nstmt1.close();\n\
  PreparedStatement stmt2 = conn.prepareStatement(\n\"UPDATE BOOK_STOCK SET STOCK\
  \ = STOCK - 1 \"+\n\"WHERE ISBN = ?\");\nstmt2.setString(1, isbn);\nstmt2.executeUpdate();\n\
  stmt2.close();\nPreparedStatement stmt3 = conn.prepareStatement(\n\"UPDATE ACCOUNT\
  \ SET BALANCE = BALANCE - ? \"+\n\"WHERE USERNAME = ?\");\nstmt3.setInt(1, price);\n\
  stmt3.setString(2, username);\nstmt3.executeUpdate();\nstmt3.close();\n} catch (SQLException\
  \ e) {\nthrow new RuntimeException(e);\n} finally {\nif (conn != null) {\ntry {\n\
  conn.close();\n} catch (SQLException e) {}\n}\n}\n}\n}\n```\n\n对于 `purchase()` 操作，你总共需要执行三条\
  \ SQL 语句。第一条是查询图书价格。第二条和第三条分别更新图书库存和账户余额。然后，你可以在 Spring IoC 容器中声明一个书店实例来提供购买服务。为简单起见，你可以使用\
  \ `DriverManagerDataSource`，它为每个请求打开一个新的数据库连接。\n\n注意\n\n要访问 PostgreSQL 数据库，你必须将\
  \ Postgres 客户端库添加到你的 `CLASSPATH` 中。\n\n```\npackage com.apress.springrecipes.bookshop.config;\n\
  import com.apress.springrecipes.bookshop.BookShop;\nimport com.apress.springrecipes.bookshop.JdbcBookShop;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jdbc.datasource.DriverManagerDataSource;\nimport javax.sql.DataSource;\n\
  @Configuration\npublic class BookstoreConfiguration {\n@Bean\npublic DataSource\
  \ dataSource() {\nDriverManagerDataSource dataSource = new DriverManagerDataSource();\n\
  dataSource.setDriverClassName(org.postgresql.Driver.class.getName());\ndataSource.setUrl(\"\
  jdbc:postgresql://localhost:5432/bookstore\");\ndataSource.setUsername(\"postgres\"\
  );\ndataSource.setPassword(\"password\");\nreturn dataSource;\n}\n@Bean\npublic\
  \ BookShop bookShop() {\nJdbcBookShop bookShop = new JdbcBookShop();\nbookShop.setDataSource(dataSource());\n\
  return bookShop;\n}\n}\n```\n\n为了演示没有事务管理可能引发的问题，假设你的书店数据库中已输入了表 10-2、10-3 和 10-4\
  \ 中所示的数据。\n\n表 10-4.\n\n用于测试事务的 ACCOUNT 表中的示例数据\n\nUSERNAME\n |\n  BALANCE\n |\n\
  \n| --- | --- | --- | --- | --- |\n\n`user1`\n |\n  `20`\n |\n\n表 10-3.\n\n用于测试事务的\
  \ BOOK_STOCK 表中的示例数据\n\nISBN\n |\n  STOCK\n |\n\n| --- | --- | --- | --- | --- |\n\
  \n`0001`\n |\n  `10`\n |\n\n表 10-2.\n\n用于测试事务的 BOOK 表中的示例数据\n\nISBN\n |\n  BOOK_NAME\n\
  \ |\n  PRICE\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n`0001`\n |\n\
  \  `The First Book`\n |\n  `30`\n |\n\n然后，编写以下 `Main` 类，用于让用户 `user1` 购买 ISBN 为\
  \ 0001 的图书。由于该用户的账户只有 20 美元，资金不足以购买这本书。\n\n```\npackage com.apress.springrecipes.bookshop;\n\
  import com.apress.springrecipes.bookshop.config.BookstoreConfiguration;\nimport\
  \ org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) throws Throwable {\n\
  ApplicationContext context =\nnew AnnotationConfigApplicationContext(BookstoreConfiguration.class);\n\
  BookShop bookShop = context.getBean(BookShop.class);\nbookShop.purchase(\"0001\"\
  , \"user1\");\n}\n}\n```\n\n当你运行此应用程序时，会遇到一个 `SQLException`，因为违反了 `ACCOUNT` 表的 `CHECK`\
  \ 约束。这是预期结果，因为你试图扣除的金额超过了账户余额。\n\n然而，如果你检查 `BOOK_STOCK` 表中该书的库存，你会发现它被这次失败的操作意外扣减了！原因是在第三条语句抛出异常之前，你已经执行了第二条\
  \ SQL 语句来扣减库存。\n\n如你所见，缺乏事务管理会导致数据处于不一致状态。为避免这种不一致，`purchase()` 操作的三条 SQL 语句应在单个事务内执行。一旦事务中的任何操作失败，整个事务应回滚，以撤销已执行操作所做的所有更改。\n\
  \n使用 JDBC 提交和回滚管理事务\n\n使用 JDBC 更新数据库时，默认情况下每条 SQL 语句在执行后会立即提交。这种行为称为自动提交。然而，它不允许你为操作管理事务。JDBC\
  \ 支持通过显式调用连接上的 `commit()` 和 `rollback()` 方法来实现基本的事务管理策略。但在执行此操作之前，你必须关闭默认开启的自动提交。\n\
  \n```\npackage com.apress.springrecipes.bookshop;\n...\npublic class JdbcBookShop\
  \ implements BookShop {\n...\npublic void purchase(String isbn, String username)\
  \ {\nConnection conn = null;\ntry {\nconn = dataSource.getConnection();\nconn.setAutoCommit(false);\n\
  ...\nconn.commit();\n} catch (SQLException e) {\nif (conn != null) {\ntry {\nconn.rollback();\n\
  } catch (SQLException e1) {}\n}\nthrow new RuntimeException(e);\n} finally {\nif\
  \ (conn != null) {\ntry {\nconn.close();\n} catch (SQLException e) {}\n}\n}\n}\n\
  }\n```\n\n数据库连接的自动提交行为可以通过调用 `setAutoCommit()` 方法来改变。默认情况下，自动提交处于开启状态，每条 SQL 语句执行后会立即提交。要启用事务管理，你必须关闭此默认行为，并且仅当所有\
  \ SQL 语句都成功执行后才提交连接。如果任何语句出错，你必须回滚此连接所做的所有更改。\n\n现在，如果你再次运行应用程序，当用户余额不足以购买图书时，图书库存将不会被扣减。\n\
  \n\n\n虽然你可以通过显式提交和回滚 JDBC 连接来管理事务，但为此编写的代码属于样板代码，你必须在不同方法中重复编写。此外，这些代码是 JDBC 特有的，因此一旦你选择了其他数据访问技术，它也需要随之更改。Spring\
  \ 的事务支持提供了一套与技术无关的工具，包括事务管理器（例如 `org.springframework.transaction.PlatformTransactionManager`）、事务模板（例如\
  \ `org.springframework.transaction.support.TransactionTemplate`）以及事务声明支持，以简化你的事务管理任务。\n\
  \n10-2\\. 选择事务管理器实现\n\n问题\n\n通常，如果你的应用程序只涉及单一数据源，你可以简单地通过调用数据库连接的 `commit()` 和 `rollback()`\
  \ 方法来管理事务。但是，如果你的事务跨越多个数据源，或者你更倾向于使用 Java EE 应用服务器提供的事务管理功能，你可以选择 Java 事务 API（JTA）。此外，对于不同的对象关系映射框架（如\
  \ Hibernate 和 JPA），你可能需要调用不同的专有事务 API。\n\n因此，你需要为不同的技术处理不同的事务 API。这会使你很难从一套 API\
  \ 切换到另一套。\n\n解决方案\n\nSpring 从不同的事务管理 API 中抽象出了一套通用的事务工具。作为应用程序开发者，你可以直接使用 Spring\
  \ 的事务工具，而无需深入了解底层的事务 API。借助这些工具，你的事务管理代码将与任何特定的事务技术无关。\n\nSpring 核心的事务管理抽象基于 `PlatformTransactionManager`\
  \ 接口。它封装了一套与技术无关的事务管理方法。请记住，无论你在 Spring 中选择哪种事务管理策略（编程式或声明式），都需要一个事务管理器。`PlatformTransactionManager`\
  \ 接口提供了三个用于处理事务的方法：\n\n*   `TransactionStatus getTransaction(TransactionDefinition\
  \ definition) throws TransactionException`\n\n*   `void commit(TransactionStatus\
  \ status) throws TransactionException;`\n\n*   `void rollback(TransactionStatus\
  \ status) throws TransactionException;`\n\n工作原理\n\n`PlatformTransactionManager`\
  \ 是所有 Spring 事务管理器的通用接口。Spring 内置了该接口的多个实现，用于与不同的事务管理 API 配合使用。\n\n*   如果你的应用程序只需要处理单一数据源，并通过\
  \ JDBC 访问它，那么 `DataSourceTransactionManager` 应该能够满足你的需求。\n\n*   如果你在 Java EE 应用服务器上使用\
  \ JTA 进行事务管理，则应使用 `JtaTransactionManager` 从应用服务器查找事务。此外，`JtaTransactionManager`\
  \ 也适用于分布式事务（跨多个资源的事务）。请注意，虽然通常使用 JTA 事务管理器来集成应用服务器的事务管理器，但你也可以使用独立的 JTA 事务管理器，例如\
  \ Atomikos。\n\n*   如果你使用对象关系映射框架来访问数据库，则应为此框架选择相应的事务管理器，例如 `HibernateTransactionManager`\
  \ 或 `JpaTransactionManager`。\n\n图 10-2 展示了 Spring 中 `PlatformTransactionManager`\
  \ 接口的常见实现。\n\n![A314861_4_En_10_Fig2_HTML.gif](img/A314861_4_En_10_Fig2_HTML.gif)\n\
  \n图 10-2.\n\nPlatformTransactionManager 接口的常见实现\n\n事务管理器在 Spring IoC 容器中作为一个普通 Bean\
  \ 进行声明。例如，以下 Bean 配置声明了一个 `DataSourceTransactionManager` 实例。它需要设置 `dataSource` 属性，以便能够管理由此数据源创建的连接的事务。\n\
  \n```\n@Bean\npublic DataSourceTransactionManager transactionManager() {\nDataSourceTransactionManager\
  \ transactionManager = new DataSourceTransactionManager()\ntransactionManager.setDataSource(dataSource());\n\
  return transactionManager;\n}\n```\n\n10-3\\. 使用事务管理器 API 以编程方式管理事务\n\n问题\n\n你需要在业务方法中精确控制何时提交和回滚事务，但又不想直接处理底层的事务\
  \ API。\n\n解决方案\n\nSpring 的事务管理器提供了一个与技术无关的 API，允许你通过调用 `getTransaction()` 方法启动一个新事务（或获取当前活动的事务），并通过调用\
  \ `commit()` 和 `rollback()` 方法来管理它。由于 `PlatformTransactionManager` 是事务管理的抽象单元，你调用的事务管理方法保证是与技术无关的。\n\
  \n工作原理\n\n为了演示如何使用事务管理器 API，让我们创建一个新类 `TransactionalJdbcBookShop`，它将使用 Spring JDBC\
  \ 模板。由于它需要处理事务管理器，我们添加一个 `PlatformTransactionManager` 类型的属性，并允许通过 setter 方法注入它。\n\
  \n```\npackage com.apress.springrecipes.bookshop;\nimport org.springframework.dao.DataAccessException;\n\
  import org.springframework.jdbc.core.support.JdbcDaoSupport;\nimport org.springframework.transaction.PlatformTransactionManager;\n\
  import org.springframework.transaction.TransactionDefinition;\nimport org.springframework.transaction.TransactionStatus;\n\
  import org.springframework.transaction.support.DefaultTransactionDefinition;\npublic\
  \ class TransactionalJdbcBookShop extends JdbcDaoSupport implements BookShop {\n\
  private PlatformTransactionManager transactionManager;\npublic void setTransactionManager(PlatformTransactionManager\
  \ transactionManager) {\nthis.transactionManager = transactionManager;\n}\npublic\
  \ void purchase(String isbn, String username) {\nTransactionDefinition def = new\
  \ DefaultTransactionDefinition();\nTransactionStatus status = transactionManager.getTransaction(def);\n\
  try {\nint price = getJdbcTemplate().queryForObject(\n\"SELECT PRICE FROM BOOK WHERE\
  \ ISBN = ?\", Integer.class, isbn);\ngetJdbcTemplate().update(\n\"UPDATE BOOK_STOCK\
  \ SET STOCK = STOCK - 1 WHERE ISBN = ?\", isbn);\ngetJdbcTemplate().update(\n\"\
  UPDATE ACCOUNT SET BALANCE = BALANCE - ? WHERE USERNAME = ?\", price, username);\n\
  transactionManager.commit(status);\n} catch (DataAccessException e) {\ntransactionManager.rollback(status);\n\
  throw e;\n}\n}\n}\n```\n\n在启动新事务之前，你必须在类型为 `TransactionDefinition` 的事务定义对象中指定事务属性。对于此示例，你可以简单地创建一个\
  \ `DefaultTransactionDefinition` 实例来使用默认的事务属性。\n\n一旦有了事务定义，你就可以通过调用 `getTransaction()`\
  \ 方法，请求事务管理器使用该定义启动一个新事务。然后，它将返回一个 `TransactionStatus` 对象来跟踪事务状态。如果所有语句都成功执行，你可以通过传入事务状态来请求事务管理器提交此事务。由于\
  \ Spring JDBC 模板抛出的所有异常都是 `DataAccessException` 的子类，因此当捕获到此类异常时，你可以请求事务管理器回滚事务。\n\
  \n\n\n在本课程中，您已声明了通用类型 `PlatformTransactionManager` 的事务管理器属性。现在，您需要注入一个合适的事务管理器实现。由于您仅处理单个数据源并通过\
  \ JDBC 访问它，因此应选择 `DataSourceTransactionManager`。此处，您还需要注入一个 `dataSource` 对象，因为该类是\
  \ Spring 的 `JdbcDaoSupport` 的子类，而后者需要该对象。\n\n```\n@Configuration\npublic class BookstoreConfiguration\
  \ {\n...\n@Bean\npublic DataSourceTransactionManager transactionManager() {\nDataSourceTransactionManager\
  \ transactionManager = new DataSourceTransactionManager();\ntransactionManager.setDataSource(dataSource());\n\
  return transactionManager;\n}\n@Bean\npublic BookShop bookShop() {\nTransactionalJdbcBookShop\
  \ bookShop = new TransactionalJdbcBookShop();\nbookShop.setDataSource(dataSource());\n\
  bookShop.setTransactionManager(transactionManager());\nreturn bookShop;\n}\n}\n\
  ```\n\n10-4. 使用事务模板以编程方式管理事务\n\n问题\n\n假设您有一个代码块（并非整个方法体），该业务方法具有以下事务需求：\n\n*   在代码块开始时启动一个新事务。\n\
  *   在代码块成功完成后提交事务。\n*   如果在代码块中抛出异常，则回滚事务。\n\n如果您直接调用 Spring 的事务管理器 API，则事务管理代码可以以与技术无关的方式进行通用化。然而，您可能不希望为每个类似的代码块重复编写样板代码。\n\
  \n解决方案\n\n与 JDBC 模板类似，Spring 也提供了 `TransactionTemplate` 来帮助您控制整个事务管理流程和事务异常处理。您只需将代码块封装在实现\
  \ `TransactionCallback<T>` 接口的回调类中，并将其传递给 `TransactionTemplate` 的 `execute` 方法执行即可。这样，您就无需为此代码块重复编写样板事务管理代码。Spring\
  \ 提供的模板对象是轻量级的，通常可以丢弃或重新创建而不会影响性能。例如，JDBC 模板可以通过 `DataSource` 引用即时重新创建，同样，`TransactionTemplate`\
  \ 也可以通过提供事务管理器引用来重新创建。当然，您也可以在 Spring 应用上下文中简单地创建一个。\n\n工作原理\n\n`TransactionTemplate`\
  \ 是基于事务管理器创建的，就像 JDBC 模板是基于数据源创建的一样。事务模板执行一个封装了事务性代码块的事务回调对象。您可以将回调接口实现为单独的类或内部类。如果实现为内部类，则必须将方法参数声明为\
  \ `final` 才能访问。\n\n```\npackage com.apress.springrecipes.bookshop;\nimport org.springframework.jdbc.core.support.JdbcDaoSupport;\n\
  import org.springframework.transaction.PlatformTransactionManager;\nimport org.springframework.transaction.TransactionStatus;\n\
  import org.springframework.transaction.support.TransactionCallbackWithoutResult;\n\
  import org.springframework.transaction.support.TransactionTemplate;\npublic class\
  \ TransactionalJdbcBookShop extends JdbcDaoSupport implements BookShop {\nprivate\
  \ PlatformTransactionManager transactionManager;\npublic void setTransactionManager(PlatformTransactionManager\
  \ transactionManager) {\nthis.transactionManager = transactionManager;\n}\npublic\
  \ void purchase(final String isbn, final String username) {\nTransactionTemplate\
  \ transactionTemplate =\nnew TransactionTemplate(transactionManager);\ntransactionTemplate.execute(new\
  \ TransactionCallbackWithoutResult() {\nprotected void doInTransactionWithoutResult(\n\
  TransactionStatus status) {\nint price = getJdbcTemplate().queryForObject(\n\"SELECT\
  \ PRICE FROM BOOK WHERE ISBN = ?\", Integer.class, isbn);\ngetJdbcTemplate().update(\n\
  \"UPDATE BOOK_STOCK SET STOCK = STOCK - 1 WHERE ISBN = ?\", isbn );\ngetJdbcTemplate().update(\n\
  \"UPDATE ACCOUNT SET BALANCE = BALANCE - ? WHERE USERNAME = ?\", price, username);\n\
  }\n});\n}\n}\n```\n\n`TransactionTemplate` 可以接受一个事务回调对象，该对象实现了 `TransactionCallback<T>`\
  \ 接口，或者是框架提供的该接口的一个实现类 `TransactionCallbackWithoutResult` 的实例。对于 `purchase()` 方法中用于扣减图书库存和账户余额的代码块，没有返回值，因此使用\
  \ `TransactionCallbackWithoutResult` 即可。对于任何有返回值的代码块，您应该实现 `TransactionCallback<T>`\
  \ 接口。回调对象的返回值最终会由模板的 `T execute()` 方法返回。其主要好处是，启动、回滚或提交事务的责任已被移除。\n\n在执行回调对象期间，如果它抛出了非受检异常（例如，`RuntimeException`\
  \ 和 `DataAccessException` 属于此类），或者您在 `doInTransactionWithoutResult` 方法中显式调用了 `TransactionStatus`\
  \ 参数的 `setRollbackOnly()` 方法，则事务将被回滚。否则，事务将在回调对象完成后提交。\n\n在 Bean 配置文件中，bookshop\
  \ Bean 仍然需要一个事务管理器来创建 `TransactionTemplate`。\n\n```\n@Configuration\npublic class\
  \ BookstoreConfiguration {\n...\n@Bean\npublic DataSourceTransactionManager transactionManager()\
  \ {\nDataSourceTransactionManager transactionManager = new DataSourceTransactionManager();\n\
  transactionManager.setDataSource(dataSource());\nreturn transactionManager;\n}\n\
  @Bean\npublic BookShop bookShop() {\nTransactionalJdbcBookShop bookShop = new TransactionalJdbcBookShop();\n\
  bookShop.setDataSource(dataSource());\nbookShop.setTransactionManager(transactionManager());\n\
  return bookShop;\n}\n}\n```\n\n您也可以让 IoC 容器注入一个事务模板，而不是直接创建它。由于事务模板处理所有事务，您的类不再需要引用事务管理器。\n\
  \n```\npackage com.apress.springrecipes.bookshop;\n...\nimport org.springframework.transaction.support.TransactionTemplate;\n\
  public class TransactionalJdbcBookShop extends JdbcDaoSupport implements\nBookShop\
  \ {\nprivate TransactionTemplate transactionTemplate;\npublic void setTransactionTemplate(\n\
  TransactionTemplate transactionTemplate) {\nthis.transactionTemplate = transactionTemplate;\n\
  }\npublic void purchase(final String isbn, final String username) {\ntransactionTemplate.execute(new\
  \ TransactionCallbackWithoutResult() {\nprotected void doInTransactionWithoutResult(TransactionStatus\
  \ status) {\n...\n}\n});\n}\n}\n```\n\n\n\n随后，在 Bean 配置文件中定义一个事务模板，并将其（而非事务管理器）注入到你的\
  \ bookshop Bean 中。请注意，事务模板实例可用于多个事务性 Bean，因为它是一个线程安全对象。最后，不要忘记为你的事务模板设置事务管理器属性。\n\
  \n```\npackage com.apress.springrecipes.bookshop.config;\n...\nimport org.springframework.transaction.support.TransactionTemplate;\n\
  @Configuration\npublic class BookstoreConfiguration {\n...\n@Bean\npublic DataSourceTransactionManager\
  \ transactionManager() { ... }\n@Bean\npublic TransactionTemplate transactionTemplate()\
  \ {\nTransactionTemplate transactionTemplate = new TransactionTemplate();\ntransactionTemplate.setTransactionManager(transactionManager());\n\
  return transactionTemplate;\n}\n@Bean\npublic BookShop bookShop() {\nTransactionalJdbcBookShop\
  \ bookShop = new TransactionalJdbcBookShop();\nbookShop.setDataSource(dataSource());\n\
  bookShop.setTransactionTemplate(transactionTemplate());\nreturn bookShop;\n}\n}\n\
  ```\n\n10-5. 使用 `@Transactional` 注解声明式管理事务\n\n问题\n\n在 Bean 配置文件中声明事务需要了解 AOP 概念，例如切入点、通知和顾问。缺乏这方面知识的开发者可能会觉得启用声明式事务管理比较困难。\n\
  \n解决方案\n\nSpring 允许你通过简单地在事务性方法上添加 `@Transactional` 注解，并在配置类上添加 `@EnableTransactionManagement`\
  \ 注解来声明事务。\n\n工作原理\n\n要将一个方法定义为事务性的，你只需用 `@Transactional` 注解它。请注意，由于 Spring AOP\
  \ 基于代理的限制，你只应对 `public` 方法进行注解。\n\n```\npackage com.apress.springrecipes.bookshop;\n\
  import org.springframework.jdbc.core.support.JdbcDaoSupport;\nimport org.springframework.transaction.annotation.Transactional;\n\
  public class JdbcBookShop extends JdbcDaoSupport implements BookShop {\n@Transactional\n\
  public void purchase(final String isbn, final String username) {\nint price = getJdbcTemplate().queryForObject(\n\
  \"SELECT PRICE FROM BOOK WHERE ISBN = ?\", Integer.class, isbn);\ngetJdbcTemplate().update(\n\
  \"UPDATE BOOK_STOCK SET STOCK = STOCK - 1 WHERE ISBN = ?\", isbn);\ngetJdbcTemplate().update(\n\
  \"UPDATE ACCOUNT SET BALANCE = BALANCE - ? WHERE USERNAME = ?\", price, username);\n\
  }\n}\n```\n\n请注意，因为你继承了 `JdbcDaoSupport`，所以不再需要 `DataSource` 的 setter 方法；请将其从你的\
  \ DAO 类中移除。\n\n你可以在方法级别或类级别应用 `@Transactional` 注解。当将此注解应用于类时，该类中的所有 `public` 方法都将被定义为事务性的。虽然你可以将\
  \ `@Transactional` 应用于接口或接口中的方法声明，但不建议这样做，因为它可能无法与基于类的代理（即 CGLIB 代理）正常工作。\n\n在 Java\
  \ 配置类中，你只需添加 `@EnableTransactionManagement` 注解。这就是使其工作所需的全部操作。Spring 将会为 IoC 容器中声明的、带有\
  \ `@Transactional` 注解的方法，或带有 `@Transactional` 注解的类中的方法，提供通知。因此，Spring 可以为这些方法管理事务。\n\
  \n```\n@Configuration\n@EnableTransactionManagement\npublic class BookstoreConfiguration\
  \ {  ... }\n```\n\n10-6. 设置事务传播属性\n\n问题\n\n当一个事务性方法被另一个方法调用时，有必要指定事务应如何传播。例如，该方法可以在现有事务内继续运行，或者它可以启动一个新事务并在其自身的事务内运行。\n\
  \n解决方案\n\n事务的传播行为可以通过传播事务属性来指定。Spring 定义了七种传播行为，如表 10-5 所示。这些行为定义在 `org.springframework.transaction.TransactionDefinition`\
  \ 接口中。请注意，并非所有类型的事务管理器都支持所有这些传播行为。它们的行为取决于底层资源。例如，数据库可能支持不同的隔离级别，这限制了事务管理器可以支持的传播行为。\n\
  \n表 10-5. Spring 支持的传播行为\n\n| 传播行为 | 描述 |\n| :--- | :--- |\n| `REQUIRED` | 如果当前存在一个正在进行的事务，则当前方法应在此事务内运行。否则，它应启动一个新事务并在其自身的事务内运行。\
  \ |\n| `REQUIRES_NEW` | 当前方法必须启动一个新事务并在其自身的事务内运行。如果当前存在一个正在进行的事务，则应将其挂起。 |\n| `SUPPORTS`\
  \ | 如果当前存在一个正在进行的事务，则当前方法可以在此事务内运行。否则，不必在事务内运行。 |\n| `NOT_SUPPORTED` | 当前方法不应在事务内运行。如果当前存在一个正在进行的事务，则应将其挂起。\
  \ |\n| `MANDATORY` | 当前方法必须在事务内运行。如果当前没有正在进行的事务，则会抛出异常。 |\n| `NEVER` | 当前方法不应在事务内运行。如果当前存在一个正在进行的事务，则会抛出异常。\
  \ |\n| `NESTED` | 如果当前存在一个正在进行的事务，则当前方法应在此事务的嵌套事务（由 JDBC 3.0 保存点特性支持）内运行。否则，它应启动一个新事务并在其自身的事务内运行。此特性是\
  \ Spring 独有的（而之前的传播行为在 Java EE 事务传播中有对应项）。此行为对于批处理等情况非常有用，例如，你有一个长时间运行的过程（想象处理 100\
  \ 万条记录），并且你希望分批提交。因此，你每处理 10,000 条记录提交一次。如果出现问题，你回滚嵌套事务，只会丢失 10,000 条记录的工作量（而不是全部\
  \ 100 万条）。 |\n\n工作原理\n\n当一个事务性方法被另一个方法调用时，就会发生事务传播。例如，假设一位顾客希望在书店收银台结账购买所有书籍。为了支持此操作，你定义如下\
  \ `Cashier` 接口：\n\n```\npackage com.apress.springrecipes.bookshop;\n...\npublic\
  \ interface Cashier {\npublic void checkout(List isbns, String username);\n}\n```\n\
  \n你可以通过多次调用 bookshop Bean 的 `purchase()` 方法，将购买操作委托给它来实现此接口。请注意，`checkout()` 方法通过应用\
  \ `@Transactional` 注解被设置为事务性的。\n\n```\npackage com.apress.springrecipes.bookshop;\n\
  ...\nimport org.springframework.transaction.annotation.Transactional;\npublic class\
  \ BookShopCashier implements Cashier {\nprivate BookShop bookShop;\npublic void\
  \ setBookShop(BookShop bookShop) {\nthis.bookShop = bookShop;\n}\n@Transactional\n\
  public void checkout(List isbns, String username) {\nfor (String isbn : isbns) {\n\
  bookShop.purchase(isbn, username);\n}\n}\n}\n```\n\n然后在你的 Bean 配置文件中定义一个 cashier\
  \ Bean，并引用 bookshop Bean 来购买书籍。\n\n```\n@Configuration\n@EnableTransactionManagement()\n\
  public class BookstoreConfiguration {\n...\n@Bean\npublic Cashier cashier() {\n\
  BookShopCashier cashier = new BookShopCashier();\ncashier.setBookShop(bookShop());\n\
  return cashier;\n}\n}\n```\n\n\n\n为了演示事务的传播行为，请在您的书店数据库中录入表 10-6、10-7 和 10-8 所示的数据。\n\
  \n表 10-8. 用于测试传播行为的 ACCOUNT 表示例数据\n\nUSERNAME | BALANCE\n| --- | --- |\nuser1 |\
  \ |\n\n表 10-7. 用于测试传播行为的 BOOK_STOCK 表示例数据\n\nISBN | STOCK\n| --- | --- |\n| |\n\n\
  表 10-6. 用于测试传播行为的 BOOK 表示例数据\n\nISBN | BOOK_NAME | PRICE\n| --- | --- | --- |\n\
  | The First Book | |\n| The Second Book | |\n\n使用 REQUIRED 传播行为\n\n当用户 `user1` 在收银台结账两本书时，其余额足够购买第一本书，但不足以购买第二本。\n\
  \n```\npackage com.apress.springrecipes.bookshop.spring;\n...\npublic class Main\
  \ {\npublic static void main(String[] args) {\n...\nCashier cashier = context.getBean(Cashier.class);\n\
  List isbnList = Arrays.asList(new String[] { \"0001\", \"0002\"});\ncashier.checkout(isbnList,\
  \ \"user1\");\n}\n}\n```\n\n当书店的 `purchase()` 方法被另一个事务性方法（例如 `checkout()`）调用时，默认情况下它将在现有事务内运行。这种默认的传播行为被称为\
  \ `REQUIRED`。这意味着只会存在一个事务，其边界即为 `checkout()` 方法的开始和结束。该事务仅在 `checkout()` 方法结束时提交。因此，用户将无法购买任何一本书。\n\
  \n图 10-3 展示了 `REQUIRED` 传播行为。\n\n![A314861_4_En_10_Fig3_HTML.gif](img/A314861_4_En_10_Fig3_HTML.gif)\n\
  \n图 10-3. REQUIRED 事务传播行为\n\n然而，如果 `purchase()` 方法被一个非事务性方法调用，并且当前没有正在进行的事务，那么它将启动一个新事务并在其自身的事务内运行。传播事务属性可以在\
  \ `@Transactional` 注解中定义。例如，您可以为此属性设置 `REQUIRED` 行为，如下所示。实际上，这并非必要，因为它是默认行为。\n\n\
  ```\npackage com.apress.springrecipes.bookshop.spring;\n...\nimport org.springframework.transaction.annotation.Propagation;\n\
  import org.springframework.transaction.annotation.Transactional;\npublic class JdbcBookShop\
  \ extends JdbcDaoSupport implements BookShop {\n@Transactional(propagation = Propagation.REQUIRED)\n\
  public void purchase(String isbn, String username) {\n...\n}\n}\npackage com.apress.springrecipes.bookshop.spring;\n\
  ...\nimport org.springframework.transaction.annotation.Propagation;\nimport org.springframework.transaction.annotation.Transactional;\n\
  public class BookShopCashier implements Cashier {\n...\n@Transactional(propagation\
  \ = Propagation.REQUIRED)\npublic void checkout(List isbns, String username) {\n\
  ...\n}\n}\n```\n\n使用 REQUIRES_NEW 传播行为\n\n另一种常见的传播行为是 `REQUIRES_NEW`。这表示该方法必须启动一个新事务并在其新事务内运行。如果当前有一个正在进行的事务，则应首先将其挂起（例如，在\
  \ `BookShopCashier` 的 `checkout` 方法中，其传播属性为 `REQUIRED`）。\n\n```\npackage com.apress.springrecipes.bookshop.spring;\n\
  ...\nimport org.springframework.transaction.annotation.Propagation;\nimport org.springframework.transaction.annotation.Transactional;\n\
  public class JdbcBookShop extends JdbcDaoSupport implements BookShop {\n@Transactional(propagation\
  \ = Propagation.REQUIRES_NEW)\npublic void purchase(String isbn, String username)\
  \ {\n...\n}\n}\n```\n\n在这种情况下，总共会启动三个事务。第一个事务由 `checkout()` 方法启动，但当第一个 `purchase()`\
  \ 方法被调用时，第一个事务将被挂起，并启动一个新事务。在第一个 `purchase()` 方法结束时，新事务完成并提交。当第二个 `purchase()` 方法被调用时，将启动另一个新事务。然而，这个事务将失败并回滚。因此，第一本书将被成功购买，而第二本则不会。图\
  \ 10-4 展示了 `REQUIRES_NEW` 传播行为。\n\n![A314861_4_En_10_Fig4_HTML.gif](img/A314861_4_En_10_Fig4_HTML.gif)\n\
  \n图 10-4. REQUIRES_NEW 事务传播行为\n\n10-7. 设置隔离事务属性\n\n问题\n\n当同一应用程序或不同应用程序的多个事务并发操作同一数据集时，可能会引发许多意外问题。您必须指定您期望事务之间如何相互隔离。\n\
  \n解决方案\n\n并发事务引起的问题可分为四种类型。\n\n*   **脏读**：对于两个事务 T1 和 T2，T1 读取了一个已被 T2 更新但尚未提交的字段。之后，如果\
  \ T2 回滚，T1 读取的该字段将是临时的且无效的。\n\n*   **不可重复读**：对于两个事务 T1 和 T2，T1 读取了一个字段，然后 T2 更新了该字段。之后，如果\
  \ T1 再次读取同一个字段，其值将会不同。\n\n*   **幻读**：对于两个事务 T1 和 T2，T1 从表中读取了一些行，然后 T2 向表中插入了新行。之后，如果\
  \ T1 再次读取同一张表，将会出现额外的行。\n\n*   **丢失更新**：对于两个事务 T1 和 T2，它们都选择了一行进行更新，并基于该行的状态对其进行了更新。因此，当第二个提交的事务本应等待第一个事务提交后再执行其选择操作时，其中一个覆盖了另一个。\n\
  \n理论上，事务之间应该完全隔离（即可序列化），以避免所有上述问题。然而，这种隔离级别会对性能产生很大影响，因为事务必须按串行顺序运行。在实践中，为了提高性能，事务可以在较低的隔离级别下运行。\n\
  \n事务的隔离级别可以通过隔离事务属性来指定。Spring 支持五种隔离级别，如表 10-9 所示。这些级别定义在 `org.springframework.transaction.TransactionDefinition`\
  \ 接口中。\n\n表 10-9. Spring 支持的隔离级别\n\n隔离级别 | 描述\n| --- | --- |\n`DEFAULT` | 使用底层数据库的默认隔离级别。对于大多数数据库，默认隔离级别是\
  \ `READ_COMMITTED`。\n`READ_UNCOMMITTED` | 允许一个事务读取其他事务未提交的更改。可能会发生脏读、不可重复读和幻读问题。\n\
  `READ_COMMITTED` | 允许一个事务仅读取已被其他事务提交的更改。可以避免脏读问题，但不可重复读和幻读问题仍可能发生。\n`REPEATABLE_READ`\
  \ | 确保一个事务可以多次从某个字段读取相同的值。在此事务持续期间，禁止其他事务对该字段进行更新。可以避免脏读和不可重复读问题，但幻读问题仍可能发生。\n\n\
  \n\n`SERIALIZABLE`\n |\n  确保一个事务能够多次从表中读取相同的行。在该事务持续期间，禁止其他事务对该表进行插入、更新和删除操作。所有并发问题均可避免，但性能会较低。\n\
  \ |\n\n注意\n\n事务隔离由底层数据库引擎支持，而非应用程序或框架。然而，并非所有数据库引擎都支持所有这些隔离级别。你可以通过调用 `java.sql.Connection`\
  \ 接口上的 `setTransactionIsolation()` 方法来更改 JDBC 连接的隔离级别。\n\n工作原理\n\n为了说明并发事务所导致的问题，让我们为你的书店新增两个操作，用于增加和检查图书库存。\n\
  \n```\npackage com.apress.springrecipes.bookshop;\npublic interface BookShop {\n\
  ...\npublic void increaseStock(String isbn, int stock);\npublic int checkStock(String\
  \ isbn);\n}\n```\n\n然后，你按如下方式实现这些操作。请注意，这两个操作也应声明为事务性操作。\n\n```\npackage com.apress.springrecipes.bookshop;\n\
  import org.springframework.jdbc.core.support.JdbcDaoSupport;\nimport org.springframework.transaction.annotation.Isolation;\n\
  import org.springframework.transaction.annotation.Transactional;\npublic class JdbcBookShop\
  \ extends JdbcDaoSupport implements BookShop {\n@Transactional\npublic void purchase(String\
  \ isbn, String username) {\nint price = getJdbcTemplate().queryForObject(\n\"SELECT\
  \ PRICE FROM BOOK WHERE ISBN = ?\", Integer.class, isbn);\ngetJdbcTemplate().update(\n\
  \"UPDATE BOOK_STOCK SET STOCK = STOCK - 1 WHERE ISBN = ?\", isbn );\ngetJdbcTemplate().update(\n\
  \"UPDATE ACCOUNT SET BALANCE = BALANCE - ? WHERE USERNAME = ?\", price, username);\n\
  }\n@Transactional\npublic void increaseStock(String isbn, int stock) {\nString threadName\
  \ = Thread.currentThread().getName();\nSystem.out.println(threadName + \" - 准备增加图书库存\"\
  );\ngetJdbcTemplate().update(\"UPDATE BOOK_STOCK SET STOCK = STOCK + ? WHERE ISBN\
  \ = ?\", stock, isbn);\nSystem.out.println(threadName + \" - 图书库存已增加 \" + stock);\n\
  sleep(threadName);\nSystem.out.println(threadName + \" - 图书库存已回滚\");\nthrow new\
  \ RuntimeException(\"误操作增加\");\n}\n@Transactional(isolation = Isolation.READ_UNCOMMITTED)\n\
  public int checkStock(String isbn) {\nString threadName = Thread.currentThread().getName();\n\
  System.out.println(threadName + \" - 准备检查图书库存\");\nint stock = getJdbcTemplate().queryForObject(\"\
  SELECT STOCK FROM BOOK_STOCK WHERE ISBN = ?\", Integer.class, isbn);\nSystem.out.println(threadName\
  \ + \" - 图书库存为 \" + stock);\nsleep(threadName);\nreturn stock;\n}\nprivate void\
  \ sleep(String threadName) {\nSystem.out.println(threadName + \" - 休眠中\");\ntry\
  \ {\nThread.sleep(10000);\n} catch (InterruptedException e) {\n}\nSystem.out.println(threadName\
  \ + \" - 唤醒\");\n}\n}\n```\n\n为了模拟并发，你的操作需要由多个线程执行。你可以通过 `println` 语句跟踪操作的当前状态。对于每个操作，你会在\
  \ SQL 语句执行前后向控制台打印若干消息。这些消息应包含线程名称，以便你知道当前正在执行操作的是哪个线程。\n\n每个操作执行完 SQL 语句后，你让线程休眠十秒。如你所知，操作一旦完成，事务将立即提交或回滚。插入休眠语句有助于延迟提交或回滚。对于\
  \ `increase()` 操作，你最终会抛出一个 `RuntimeException` 来导致事务回滚。让我们来看一个运行这些示例的简单客户端。\n\n在开始隔离级别示例之前，请将表\
  \ 10-10 和 10-11 中的数据输入到你的书店数据库中。（请注意，此示例中不需要 `ACCOUNT` 表。）\n\n表 10-11.\n\n\n\n用于测试隔离级别的\
  \ BOOK_STOCK 表中的示例数据\n\nISBN\n |\n  库存\n |\n\n| --- | --- | --- | --- | --- |\n\n\
  |\n\n|\n\n表 10-10.\n\n用于测试隔离级别的 BOOK 表中的示例数据\n\nISBN\n |\n  书名\n |\n  价格\n |\n\n\
  | --- | --- | --- | --- | --- | --- | --- |\n\n|\n  第一本书\n |\n\n|\n\n使用 READ_UNCOMMITTED\
  \ 和\nREAD_COMMITTED 隔离级别\n\n`READ_UNCOMMITTED` 是\n最低的隔离级别，它允许一个事务读取其他事务所做的未提交更改。你可以在\n\
  `checkStock()` 方法的 `@Transaction`\n注解中设置此隔离级别。\n\n```\npackage com.apress.springrecipes.bookshop.spring;\n\
  ...\nimport org.springframework.transaction.annotation.Isolation;\nimport org.springframework.transaction.annotation.Transactional;\n\
  public class JdbcBookShop extends JdbcDaoSupport implements BookShop {\n...\n@Transactional(isolation\
  \ = Isolation.READ_UNCOMMITTED)\npublic int checkStock(String isbn) {\n...\n}\n\
  }\n```\n\n你可以创建一些线程来试验此事务隔离级别。在下面的 `Main` 类中，你将创建两个线程。线程 1 增加图书库存，而线程 2 检查图书库存。线程\
  \ 1 比线程 2 早启动 5 秒。\n\n```\npackage com.apress.springrecipes.bookshop.spring;\n...\n\
  public class Main {\npublic static void main(String[] args) {\n...\nfinal BookShop\
  \ bookShop = context.getBean(BookShop.class);\nThread thread1 = new Thread(() ->\
  \ {\ntry {\nbookShop.increaseStock(\"0001\", 5);\n} catch (RuntimeException e) {}\n\
  }, \"Thread 1\");\nThread thread2 = new Thread(() -> {\nbookShop.checkStock(\"0001\"\
  );\n}, \"Thread 2\");\nthread1.start();\ntry {\nThread.sleep(5000);\n} catch (InterruptedException\
  \ e) {}\nthread2.start();\n}\n}\n```\n\n如果你运行该应用程序，你将得到以下结果：\n\n```\nThread 1―准备增加图书库存\n\
  Thread 1―图书库存增加了 5\nThread 1―正在休眠\nThread 2―准备检查图书库存\nThread 2―图书库存为 15\nThread\
  \ 2―正在休眠\nThread 1―唤醒\nThread 1―图书库存已回滚\nThread 2―唤醒\n```\n\n首先，线程 1 增加了图书库存，然后进入休眠。此时，线程\
  \ 1 的事务尚未回滚。在线程 1 休眠期间，线程 2 启动并尝试读取图书库存。使用 `READ_UNCOMMITTED`\n隔离级别，线程 2 将能够读取已被未提交事务更新的库存值。\n\
  \n然而，当线程 1 唤醒时，其事务将因 `RuntimeException` 而回滚，因此线程 2 读取的值是临时的且无效的。此问题被称为脏读，因为一个事务可能读取到“脏”数据。\n\
  \n为了避免脏读问题，你应该将 `checkStock()` 的隔离级别提升为 `READ_COMMITTED`。\n\n```\npackage com.apress.springrecipes.bookshop.spring;\n\
  ...\nimport org.springframework.transaction.annotation.Isolation;\nimport org.springframework.transaction.annotation.Transactional;\n\
  public class JdbcBookShop extends JdbcDaoSupport implements BookShop {\n...\n@Transactional(isolation\
  \ = Isolation.READ_COMMITTED)\npublic int checkStock(String isbn) {\n...\n}\n}\n\
  ```\n\n如果你再次运行该应用程序，线程 2 将无法读取图书库存，直到线程 1 回滚了事务。通过这种方式，可以防止一个事务读取另一个未提交事务已更新的字段，从而避免脏读问题。\n\
  \n```\nThread 1―准备增加图书库存\nThread 1―图书库存增加了 5\nThread 1―正在休眠\nThread 2―准备检查图书库存\n\
  Thread 1―唤醒\nThread 1―图书库存已回滚\nThread 2―图书库存为 10\nThread 2―正在休眠\nThread 2―唤醒\n```\n\
  \n为了让底层数据库支持 `READ_COMMITTED` 隔离级别，它可能会在已更新但尚未提交的行上获取一个更新锁。然后，其他事务必须等待，直到该更新锁被释放（当持有锁的事务提交或回滚时发生），才能读取该行。\n\
  \n使用 REPEATABLE_READ \n隔离级别\n\n现在，让我们重构线程以演示另一个并发问题。交换两个线程的任务，使得线程 1 在线程 2 增加图书库存之前检查图书库存。\n\
  \n```\npackage com.apress.springrecipes.bookshop.spring;\n...\npublic class Main\
  \ {\npublic static void main(String[] args) {\n...\nfinal BookShop bookShop = (BookShop)\
  \ context.getBean(\"bookShop\");\nThread thread1 = new Thread(() -> {\npublic void\
  \ run() {\nbookShop.checkStock(\"0001\");\n}\n}, \"Thread 1\");\nThread thread2\
  \ = new Thread(() -> {\ntry {\nbookShop.increaseStock(\"0001\", 5);\n} catch (RuntimeException\
  \ e) {}\n}, \"Thread 2\");\nthread1.start();\ntry {\nThread.sleep(5000);\n} catch\
  \ (InterruptedException e) {}\nthread2.start();\n}\n}\n```\n\n如果你运行该应用程序，你将得到以下结果：\n\
  \n```\nThread 1―准备检查图书库存\nThread 1―图书库存为 10\nThread 1―正在休眠\nThread 2―准备增加图书库存\n\
  Thread 2―图书库存增加了 5\nThread 2―正在休眠\nThread 1―唤醒\nThread 2―唤醒\nThread 2―图书库存已回滚\n\
  ```\n\n首先，线程 1 读取了图书库存，然后进入休眠。此时，线程 1 的事务尚未提交。在线程 1 休眠期间，线程 2 启动并尝试增加图书库存。使用 `READ_COMMITTED`\
  \ 隔离级别，线程 2 将能够更新已被未提交事务读取的库存值。\n\n然而，如果线程 1 再次读取图书库存，该值将与其第一次读取的值不同。此问题被称为不可重复读，因为一个事务可能对同一字段读取到不同的值。\n\
  \n为了避免不可重复读问题，你应该将 `checkStock()` 的隔离级别提升为 `REPEATABLE_READ`。\n\n```\npackage com.apress.springrecipes.bookshop.spring;\n\
  ...\nimport org.springframework.transaction.annotation.Isolation;\nimport org.springframework.transaction.annotation.Transactional;\n\
  public class JdbcBookShop extends JdbcDaoSupport implements BookShop {\n...\n@Transactional(isolation\
  \ = Isolation.REPEATABLE_READ)\npublic int checkStock(String isbn) {\n...\n}\n}\n\
  ```\n\n如果你再次运行该应用程序，线程 2 将无法更新图书库存，直到线程 1 提交了事务。通过这种方式，可以防止一个事务更新另一个未提交事务已读取的值，从而避免不可重复读问题。\n\
  \n```\nThread 1―准备检查图书库存\nThread 1―图书库存为 10\nThread 1―正在休眠\nThread 2―准备增加图书库存\n\
  Thread 1―唤醒\nThread 2―图书库存增加了 5\nThread 2―正在休眠\nThread 2―唤醒\nThread 2―图书库存已回滚\n\
  ```\n\n为了让底层数据库支持 `REPEATABLE_READ` 隔离级别，它可能会在已读取但尚未提交的行上获取一个读锁。然后，其他事务必须等待，直到该读锁被释放（当持有锁的事务提交或回滚时发生），才能更新该行。\n\
  \n使用 SERIALIZABLE 隔离级别\n\n在一个事务从表中读取了几行之后，另一个事务向同一表中插入了新行。如果第一个事务再次读取同一张表，它将发现额外的行，这与第一次读取的结果不同。此问题被称为幻读。实际上，幻读与不可重复读非常相似，但涉及多行数据。\n\
  \n为了避免幻读问题，你应该将隔离级别提升到最高：`SERIALIZABLE`。请注意，此隔离级别是最慢的，因为它可能会在整个表上获取读锁。在实践中，你应该始终选择能够满足你需求的最低隔离级别。\n\
  \n10-8\\. 设置回滚事务属性\n\n问题\n\n默认情况下，只有非受检异常（即 `RuntimeException` 和 `Error` 类型）会导致事务回滚，而受检异常则不会。有时，你可能希望打破此规则，并设置自己的异常来回滚事务。\n\
  \n解决方案\n\n\n\n导致事务回滚或不回滚的异常可以通过`rollback`事务属性来指定。任何未在此属性中明确指定的异常都将按照默认回滚规则处理（即，对未检查异常进行回滚，对已检查异常不进行回滚）。\n\
  \n工作原理\n\n事务的回滚规则可以在`@Transactional`注解中通过`rollbackFor`和`noRollbackFor`属性来定义。这两个属性被声明为`Class[]`类型，因此你可以为每个属性指定多个异常。\n\
  \n```\npackage com.apress.springrecipes.bookshop.spring;\n...\nimport org.springframework.transaction.annotation.Propagation;\n\
  import org.springframework.transaction.annotation.Transactional;\nimport java.io.IOException;\n\
  public class JdbcBookShop extends JdbcDaoSupport implements BookShop {\n...\n@Transactional(\n\
  propagation = Propagation.REQUIRES_NEW,\nrollbackFor = IOException.class,\nnoRollbackFor\
  \ = ArithmeticException.class)\npublic void purchase(String isbn, String username)\
  \ throws Exception {\nthrow new ArithmeticException();\n}\n}\n```\n\n10-9. 设置超时和只读事务属性\n\
  \n问题\n\n由于事务可能会获取行和表上的锁，长时间运行的事务会占用资源并影响整体性能。此外，如果事务只读取数据而不更新数据，数据库引擎可以对此事务进行优化。你可以指定这些属性来提高应用程序的性能。\n\
  \n解决方案\n\n`timeout`事务属性（一个以秒为单位的整数）指示事务在被强制回滚之前可以存活多长时间。这可以防止长时间运行的事务占用资源。`read-only`属性指示此事务将只读取数据而不更新数据。`read-only`标志只是一个提示，用于启用资源以优化事务，如果尝试写入，资源不一定会导致失败。\n\
  \n工作原理\n\n`timeout`和`read-only`事务属性可以在`@Transactional`注解中定义。请注意，超时时间以秒为单位。\n\n```\n\
  package com.apress.springrecipes.bookshop.spring;\n...\nimport org.springframework.transaction.annotation.Isolation;\n\
  import org.springframework.transaction.annotation.Transactional;\npublic class JdbcBookShop\
  \ extends JdbcDaoSupport implements BookShop {\n...\n@Transactional(\nisolation\
  \ = Isolation.REPEATABLE_READ,\ntimeout = 30,\nreadOnly = true)\npublic int checkStock(String\
  \ isbn) {\n...\n}\n}\n```\n\n10-10. 使用加载时织入管理事务\n\n问题\n\n默认情况下，Spring 的声明式事务管理是通过其\
  \ AOP 框架启用的。然而，由于 Spring AOP 只能通知在 IoC 容器中声明的 bean 的公共方法，因此你使用 Spring AOP 管理事务的范围受到限制。有时你可能希望管理非公共方法的事务，或者管理在\
  \ Spring IoC 容器外部创建的对象（例如，领域对象）的方法。\n\n解决方案\n\nSpring 提供了一个名为`AnnotationTransactionAspect`的\
  \ AspectJ 切面，它可以管理任何对象的任何方法的事务，即使这些方法是非公共的，或者对象是在 Spring IoC 容器外部创建的。此切面将管理所有带有`@Transactional`注解的方法的事务。你可以选择\
  \ AspectJ 的编译时织入或加载时织入来启用此切面。\n\n工作原理\n\n要在加载时将此类切面织入到你的领域类中，你必须在配置类上放置`@EnableLoadTimeWeaving`注解。要启用\
  \ Spring 的`AnnotationTransactionAspect`进行事务管理，你只需定义`@EnableTransactionManagement`注解并将其`mode`属性设置为`ASPECTJ`。`@EnableTransactionManagement`注解的`mode`属性接受两个值：`ASPECTJ`和`PROXY`。`ASPECTJ`规定容器应使用加载时或编译时织入来启用事务通知。这需要`spring-instrument`\
  \ JAR 包位于类路径上，并且在加载时或编译时进行相应的配置。\n\n或者，`PROXY`规定容器应使用 Spring AOP 机制。需要注意的是，`ASPECTJ`模式不支持在接口上配置`@Transactional`注解。然后事务切面将自动启用。你还必须为此切面提供一个事务管理器。默认情况下，它将查找一个名为`transactionManager`的事务管理器。\n\
  \n```\npackage com.apress.springrecipes.bookshop;\nConfiguration\n@EnableTransactionManagement(mode\
  \ = AdviceMode.ASPECTJ)\n@EnableLoadTimeWeaving\npublic class BookstoreConfiguration\
  \ { ... }\n```\n\n注意\n\n要使用 AspectJ 的 Spring 切面库，你必须在你的`CLASSPATH`中包含`spring-aspects`模块。要启用加载时织入，你还必须包含一个\
  \ Java 代理，该代理可在`spring-instrument`模块中找到。\n\n对于一个简单的 Java 应用程序，你可以通过将 Spring 代理指定为\
  \ VM 参数，在加载时将此类切面织入到你的类中。\n\n```\njava -javaagent:lib/spring-instrument-5.0.0.RELEASE.jar\
  \ -jar recipe_10_10_i.jar\n```\n\n总结\n\n本章讨论了事务以及为什么应该使用它们。你探讨了 Java EE 历史上进行事务管理所采用的方法，然后了解了\
  \ Spring 框架提供的方法有何不同。你探讨了在代码中显式使用事务以及通过注解驱动的切面隐式使用事务。你设置了一个数据库，并使用事务来强制数据库中的有效状态。\n\
  \n在下一章中，你将探索 Spring Batch。Spring Batch 提供了可用作批处理作业基础的基础设施和组件。\n\n11. Spring Batch\n\
  \n批处理已经存在了几十年。最早广泛用于信息管理（信息技术）的技术应用就是批处理应用。这些环境没有交互式会话，并且通常不具备在内存中加载多个应用程序的能力。计算机价格昂贵，与今天的服务器毫无相似之处。通常，机器是多用户共享的，并且在白天使用（分时）。然而，到了晚上，机器会闲置，这造成了巨大的浪费。企业投资于利用非工作时间来处理白天累积的工作的方法。这种做法催生了批处理。\n\
  \n\n\n批处理解决方案通常离线运行，对系统中的事件无感知。过去，批处理流程因技术限制而不得不离线运行。然而如今，大多数批处理流程之所以离线运行，是因为在可预测的时间完成工作以及分块处理工作，已成为众多架构的硬性需求。批处理解决方案通常不响应请求，尽管没有理由不能通过消息或请求来触发它。批处理解决方案往往用于处理大型数据集，此时处理时长是其架构和实现中的关键因素。一个流程可能运行数分钟、数小时甚至数天！作业可能没有时间限制（即持续运行直至所有工作完成，即便这意味着要运行数天），也可能有严格的时间限制（作业必须在恒定时间内推进，每行数据耗时相同，不受数据量限制，这样你就可以预测某个作业将在特定时间窗口内完成）。\n\
  \n批处理有着悠久的历史，其经验甚至影响着现代批处理解决方案。\n\n大型机应用程序曾使用批处理，而当今最大的批处理环境之一——z/OS 上的 CICS，从根本上说仍是一个大型机操作系统。客户信息控制系统（CICS）非常适合特定类型的任务：接收输入、处理输入、写入输出。CICS\
  \ 是一个事务服务器，主要用于金融机构和政府机构，可运行多种语言（COBOL、C、PLI 等）编写的程序。它能轻松支持每秒数千笔事务。CICS 是最早的容器之一，这个概念对\
  \ Spring 和 Java EE 用户来说并不陌生，尽管 CICS 本身早在 1969 年就已问世！CICS 的安装成本非常高昂，尽管 IBM 仍在销售和安装\
  \ CICS，但自那以后，许多其他解决方案也相继出现。这些解决方案通常针对特定环境：大型机上的 COBOL/CICS、Unix 上的 C，以及如今各种环境下的\
  \ Java。问题在于，处理这类批处理解决方案的标准化基础设施非常匮乏。很少有人意识到自己缺失了什么，因为 Java 平台对批处理的原生支持非常少。需要此类解决方案的企业通常只能自行开发，结果导致代码脆弱且局限于特定领域。\n\
  \n然而，所需的组件其实已经存在：事务支持、快速 I/O、像 Quartz 这样的调度器、强大的线程支持，以及 Java EE 和 Spring 中非常强大的应用容器概念。因此，Dave\
  \ Syer 和他的团队自然而然地构建了 Spring Batch，一个面向 Spring 平台的批处理解决方案。\n\n在深入细节之前，思考这个框架解决的是哪类问题非常重要。一项技术由其解决方案空间所定义。一个典型的\
  \ Spring Batch 应用程序通常会读取大量数据，然后以修改后的形式将其写回。关于事务边界、输入规模、并发性以及处理步骤顺序的决策，都是典型集成过程中的考量维度。\n\
  \n一个常见需求是从逗号分隔值（CSV）文件加载数据，这可能是作为企业对企业（B2B）事务，也可能是作为与旧版遗留应用程序的集成技术。另一个常见应用是对数据库中的记录进行非平凡处理。输出结果可能是对数据库记录本身的更新。例如，调整文件系统上图像的尺寸（其元数据存储在数据库中），或者需要根据某些条件触发另一个进程。\n\
  \n注意\n\n定宽数据是一种行和单元格的格式，与 CSV 文件非常相似。不过，CSV 文件的单元格由逗号或制表符分隔，而定宽数据则假定每个值具有固定的长度。第一个值可能是前九个字符，第二个值是其后的四个字符，依此类推。\n\
  \n定宽数据常用于旧版或嵌入式系统，是批处理的绝佳候选对象。处理本质上非事务性资源（例如 Web 服务或文件）的流程，非常适合采用批处理，因为批处理提供了大多数\
  \ Web 服务所不具备的重试/跳过/失败功能。\n\n理解 Spring Batch 不做什么也同样重要。Spring Batch 是一个灵活但并非包罗万象的解决方案。正如\
  \ Spring 在可以避免的情况下不会重新发明轮子一样，Spring Batch 将一些重要部分留给实现者自行决定。例如：Spring Batch 提供了一种通用机制来启动作业，无论是通过命令行、Unix\
  \ cron、操作系统服务、Quartz（在第 13 章讨论），还是响应企业服务总线上的事件（例如 Mule ESB 或 Spring 自己的类 ESB 解决方案\
  \ Spring Integration，后者在第 15 章讨论）。另一个例子是 Spring Batch 管理批处理流程状态的方式。Spring Batch\
  \ 需要一个持久化存储。`JobRepository`（Spring Batch 提供的用于存储批处理元数据实体的接口）唯一有用的实现需要数据库，因为数据库是事务性的，无需重新发明。然而，应该部署到哪个数据库在很大程度上未作规定，尽管当然为你提供了一些有用的默认值。\n\
  \n注意\n\nJEE7 规范包含 JSR-352（Java 平台批处理应用程序）。Spring Batch 是该规范的参考实现。\n\n运行时元数据模型\n\n\
  Spring Batch 与 `JobRepository` 协同工作，后者是所有作业知识及元数据（包括组件部分，如 `JobInstance`、`JobExecution`\
  \ 和 `StepExecution`）的保管者。每个作业由一个或多个步骤按顺序组成。使用 Spring Batch，一个步骤可以有条件地跟随另一个步骤，从而支持原始的工作流。\n\
  \n这些步骤也可以是并发的；两个步骤可以同时运行。\n\n当运行一个作业时，它通常与 `JobParameter` 结合使用，以参数化 `Job` 本身的运行时行为。例如，一个作业可能接受一个\
  \ `date` 参数来决定处理哪些记录。为了标识一次作业运行，会创建一个 `JobInstance`。`JobInstance` 因其关联的 `JobParameters`\
  \ 而唯一。每次运行同一个 `JobInstance`（即相同的 `Job` 和 `JobParameters`）时，都称为一次 `JobExecution`。这是作业某个版本的运行时上下文。理想情况下，每个\
  \ `JobInstance` 应该只有一个 `JobExecution`：即 `JobInstance` 首次运行时创建的 `JobExecution`。但是，如果出现任何错误，应该重启\
  \ `JobInstance`；随后的运行将创建另一个 `JobExecution`。对于原始作业中的每个步骤，在 `JobExecution` 中都有一个对应的\
  \ `StepExecution`。\n\n因此，你可以看到 Spring Batch 拥有一个镜像对象图——一个反映作业的设计/构建时视图，另一个反映作业的运行时视图。这种原型与实例之间的分离，与包括\
  \ jBPM 在内的许多工作流引擎的工作方式类似。\n\n例如，假设每天凌晨 2 点生成一份日报。作业的参数将是日期（很可能是前一天的日期）。在这种情况下，作业将建模一个加载步骤、一个汇总步骤和一个输出步骤。每天运行作业时，都会创建一个新的\
  \ `JobInstance` 和 `JobExecution`。如果同一个 `JobInstance` 有任何重试，理论上可能会创建多个 `JobExecution`。\n\
  \n\n\n11-1\\. 搭建 Spring Batch 的基础设施\n\n问题\n\nSpring Batch 为你的应用程序提供了极大的灵活性和保障，但它无法在真空中运行。为了完成其工作，`JobRepository`\
  \ 需要数据存储（可以是 SQL 数据库或其他数据存储方式）。此外，Spring Batch 还需要多个协作者才能正常工作。这些配置大多是样板代码。\n\n解决方案\n\
  \n在本方案中，你将搭建 Spring Batch 数据库，并创建一个可供后续解决方案导入的 Spring 应用配置。这个配置是重复性的，并且基本上没什么意思。它还将告诉\
  \ Spring Batch 使用哪个数据库来存储其元数据。\n\n工作原理\n\n`JobRepository` 接口是你在搭建 Spring Batch 流程时首先要处理的东西。你通常不会在代码中直接处理它，但在\
  \ Spring 配置中，它是让其他一切正常工作的关键。`JobRepository` 接口只有一个真正有用的实现，叫做 `SimpleJobRepository`，它将批处理流程的状态信息存储在一个数据存储中。其创建是通过\
  \ `JobRepositoryFactoryBean` 完成的。另一个标准工厂 `MapJobRepositoryFactoryBean` 主要用于测试，因为它的状态不是持久的——它是一个内存实现。这两个工厂都会创建\
  \ `SimpleJobRepository` 的实例。\n\n由于这个 `JobRepository` 实例在你的数据库上工作，你需要为 Spring Batch\
  \ 设置好模式。不同数据库的模式文件位于 Spring Batch 发行版中。初始化数据库最简单的方法是在 Java 配置中使用 `DataSourceInitializer`。这些文件可以在\
  \ `org/springframework/batch/core` 目录下找到；其中有几个 `.sql` 文件，每个文件都包含所选数据库所需模式的数据定义语言（DDL，用于定义和检查数据库结构的\
  \ SQL 子集）。这些示例将使用 H2（一个内存数据库），因此你将使用 H2 的 DDL：`schema-h2.sql`。请确保你配置了它，并告知 Spring\
  \ Batch，如下面的配置所示：\n\n```\n@Configuration\n@ComponentScan(\"com.apress.springrecipes.springbatch\"\
  )\n@PropertySource(\"classpath:batch.properties\")\npublic class BatchConfiguration\
  \ {\n@Autowired\nprivate Environment env;\n@Bean\npublic DataSource dataSource()\
  \ {\nDriverManagerDataSource dataSource = new DriverManagerDataSource();\ndataSource.setUrl(env.getRequiredProperty(\"\
  dataSource.url\"));\ndataSource.setUsername(env.getRequiredProperty(\"dataSource.username\"\
  ));\ndataSource.setPassword(env.getRequiredProperty(\"dataSource.password\"));\n\
  return dataSource;\n}\n@Bean\npublic DataSourceInitializer dataSourceInitializer()\
  \ {\nDataSourceInitializer initializer = new DataSourceInitializer();\ninitializer.setDataSource(dataSource());\n\
  initializer.setDatabasePopulator(databasePopulator());\nreturn initializer;\n}\n\
  private DatabasePopulator databasePopulator() {\nResourceDatabasePopulator databasePopulator\
  \ = new ResourceDatabasePopulator();\ndatabasePopulator.setContinueOnError(true);\n\
  databasePopulator.addScript(\nnew ClassPathResource(\"org/springframework/batch/core/schema-h2.sql\"\
  ));\ndatabasePopulator.addScript(\nnew ClassPathResource(\"sql/reset_user_registration.sql\"\
  ));\nreturn databasePopulator;\n}\n@Bean\npublic DataSourceTransactionManager transactionManager()\
  \ {\nreturn new DataSourceTransactionManager(dataSource());\n}\n@Bean\npublic JobRepositoryFactoryBean\
  \ jobRepository() {\nJobRepositoryFactoryBean jobRepositoryFactoryBean = new JobRepositoryFactoryBean();\n\
  jobRepositoryFactoryBean.setDataSource(dataSource());\njobRepositoryFactoryBean.setTransactionManager(transactionManager());\n\
  return jobRepositoryFactoryBean;\n}\n@Bean\npublic JobLauncher jobLauncher() throws\
  \ Exception {\nSimpleJobLauncher jobLauncher = new SimpleJobLauncher();\njobLauncher.setJobRepository(jobRepository().getObject());\n\
  return jobLauncher;\n}\n@Bean\npublic JobRegistryBeanPostProcessor jobRegistryBeanPostProcessor()\
  \ {\nJobRegistryBeanPostProcessor jobRegistryBeanPostProcessor = new JobRegistryBeanPostProcessor();\n\
  jobRegistryBeanPostProcessor.setJobRegistry(jobRegistry());\nreturn jobRegistryBeanPostProcessor;\n\
  }\n@Bean\npublic JobRegistry jobRegistry() {\nreturn new MapJobRegistry();\n}\n\
  }\n```\n\n前几个 Bean 严格与配置相关。对于 Spring Batch 来说，没有什么特别新奇或独特的地方：一个数据源、一个事务管理器和一个数据源初始化器。\n\
  \n最终，你会声明一个 `MapJobRegistry` 实例。这很关键——它是存储特定作业信息的中央仓库，并控制系统中所有作业的“全局视图”。其他所有东西都与此实例协同工作。\n\
  \n接下来，你有一个 `SimpleJobLauncher`，其唯一目的是为你提供一种启动批处理作业的机制，这里的“作业”就是你的批处理解决方案。`jobLauncher`\
  \ 用于指定要运行的批处理解决方案的名称以及任何所需的参数。我将在下一个方案中进一步说明。\n\n接着，你定义了一个 `JobRegistryBeanPostProcessor`。这个\
  \ Bean 会扫描你的 Spring 上下文文件，并将所有已配置的作业与 `MapJobRegistry` 关联起来。\n\n最后，你得到了 `SimpleJobRepository`（它又由\
  \ `JobRepositoryFactoryBean` 工厂创建）。`JobRepository` 是“仓库”的一个实现（从《企业应用架构模式》一书的意义上讲）：它处理与步骤和作业相关的领域模型的持久化和检索。\n\
  \n`@PropertySource` 注解将指示 Spring 加载你的 `batch.properties` 文件（位于 `src/main/resource`）。你将使用\
  \ `Environment` 类来检索所需的属性。\n\n提示\n\n你也可以使用 `@Value` 注解来注入所有单独的属性，但当在配置类中需要多个属性时，使用\
  \ `Environment` 对象会更方便。\n\n`batch.properties` 文件包含以下内容：\n\n```\ndataSource.password=sa\n\
  dataSource.username=\ndataSource.url= jdbc:h2:∼/batch\n```\n\n\n\n虽然这种方法可行，但 Spring\
  \ Batch 也支持通过 `@EnableBatchProcessing` 注解直接配置这些默认值。这让事情变得简单了一些。\n\n```\npackage\
  \ com.apress.springrecipes.springbatch.config;\nimport org.apache.commons.dbcp2.BasicDataSource;\n\
  import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.context.annotation.PropertySource;\nimport org.springframework.core.env.Environment;\n\
  import org.springframework.core.io.ClassPathResource;\nimport org.springframework.jdbc.datasource.init.DataSourceInitializer;\n\
  import org.springframework.jdbc.datasource.init.ResourceDatabasePopulator;\nimport\
  \ javax.sql.DataSource;\n@Configuration\n@EnableBatchProcessing\n@ComponentScan(\"\
  com.apress.springrecipes.springbatch\")\n@PropertySource(\"classpath:/batch.properties\"\
  )\npublic class BatchConfiguration {\n@Autowired\nprivate Environment env;\n@Bean\n\
  public DataSource dataSource() {\nBasicDataSource dataSource = new BasicDataSource();\n\
  dataSource.setUrl(env.getRequiredProperty(\"dataSource.url\"));\ndataSource.setDriverClassName(\n\
  env.getRequiredProperty(\"dataSource.driverClassName\"));\ndataSource.setUsername(env.getProperty(\"\
  dataSource.username\"));\ndataSource.setPassword(env.getProperty(\"dataSource.password\"\
  ));\nreturn dataSource;\n}\n@Bean\npublic DataSourceInitializer databasePopulator()\
  \ {\nResourceDatabasePopulator populator = new ResourceDatabasePopulator();\npopulator.addScript(new\
  \ ClassPathResource(\"org/springframework/batch/core/schema-derby.sql\"));\npopulator.addScript(new\
  \ ClassPathResource(\"sql/reset_user_registration.sql\"));\npopulator.setContinueOnError(true);\n\
  populator.setIgnoreFailedDrops(true);\nDataSourceInitializer initializer = new DataSourceInitializer();\n\
  initializer.setDatabasePopulator(populator);\ninitializer.setDataSource(dataSource());\n\
  return initializer;\n}\n}\n```\n\n这个类只包含两个 Bean 定义：一个用于数据源，另一个用于初始化数据库；其他所有内容都由\
  \ `@EnableBatchProcessing` 注解自动处理。之前的配置类将使用一些合理的默认值来启动 Spring Batch。\n\n默认配置会配置一个\
  \ `JobRepository`、`JobRegistry` 和 `JobLauncher`。\n\n如果你的应用程序中有多个数据源，则需要添加一个显式的 `BatchConfigurer`\
  \ 来选择用于批处理部分的数据源。\n\n下面的 `Main` 类将使用基于 Java 的配置来运行批处理应用程序：\n\n```\npackage com.apress.springrecipes.springbatch;\n\
  import com.apress.springrecipes.springbatch.config.BatchConfiguration;\nimport org.springframework.batch.core.configuration.JobRegistry;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.batch.core.repository.JobRepository;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) throws Throwable {\n\
  ApplicationContext context = new AnnotationConfigApplicationContext(BatchConfiguration.class);\n\
  JobRegistry jobRegistry = context.getBean(\"jobRegistry\", JobRegistry.class);\n\
  JobLauncher jobLauncher = context.getBean(\"jobLauncher\", JobLauncher.class);\n\
  JobRepository jobRepository = context.getBean(\"jobRepository\", JobRepository.class);\n\
  System.out.println(\"JobRegistry: \" + jobRegistry);\nSystem.out.println(\"JobLauncher:\
  \ \" + jobLauncher);\nSystem.out.println(\"JobRepository: \" + jobRepository);\n\
  }\n}\n```\n\n11-2. 读取和写入数据\n\n问题\n\n你想将 CSV 文件中的数据插入到数据库中。这个解决方案将是最简单的方案之一，并让你有机会探索典型解决方案中的各个组成部分。\n\
  \n解决方案\n\n你将构建一个工作量最小的解决方案，同时它也是该技术的一个可行应用。该解决方案将读取任意长度的文件，并将数据写入数据库。最终结果几乎不需要编写任何代码。你将依赖一个现有的模型类，并编写一个类（包含\
  \ `public static void main(String [] args)` 方法的类）来完成这个示例。模型类完全可以是 Hibernate 类或来自\
  \ DAO 层的某个类；不过，在本例中，它是一个简单的 POJO。此解决方案将使用你在配方 11-1 中配置的组件。\n\n工作原理\n\n这个示例演示了 Spring\
  \ Batch 最简单的用法：提供可扩展性。该程序仅从 CSV 文件中读取数据，字段以逗号分隔，行以换行符分隔。然后，它将记录插入到表中。你正在利用 Spring\
  \ Batch 提供的智能基础设施，从而无需担心扩展问题。这个应用程序手动实现也很容易。你不会用到任何可用的智能事务功能，暂时也不会考虑重试机制。\n\n这个解决方案是\
  \ Spring Batch 解决方案中最简单的一种。Spring Batch 使用 XML 模式对解决方案进行建模。其抽象概念和术语遵循经典批处理解决方案的精神，因此可以从前面的技术移植过来，也可能移植到后续的技术中。Spring\
  \ Batch 提供了有用的默认类，你可以覆盖或有选择地调整它们。在下面的示例中，你将使用 Spring Batch 提供的许多实用工具实现。从根本上说，大多数解决方案看起来都差不多，并且都包含一组相同的接口组合。通常只需要挑选合适的接口即可。\n\
  \n当我运行这个程序时，它既能处理包含 20,000 行的文件，也能处理包含 100 万行的文件。我没有发现内存增加，这表明没有内存泄漏。当然，处理时间要长得多！（插入\
  \ 100 万行时，应用程序运行了几个小时。）\n\n提示\n\n当然，如果你处理 100 万行数据，却在倒数第二条记录上失败，那将是灾难性的。当事务回滚时，你所有的工作都将丢失！请继续阅读关于分块的示例。此外，你可能还想阅读第\
  \ 10 章来复习事务知识。\n\n```\ncreate table USER_REGISTRATION (\nID BIGINT NOT NULL PRIMARY\
  \ KEY GENERATED ALWAYS AS IDENTITY (START WITH 1, INCREMENT BY 1),\nFIRST_NAME VARCHAR(255)\
  \ not null,\nLAST_NAME VARCHAR(255) not null,\nCOMPANY VARCHAR(255) not null,\n\
  ADDRESS VARCHAR(255) not null,\nCITY VARCHAR(255) not null,\nSTATE VARCHAR(255)\
  \ not null,\nZIP VARCHAR(255) not null,\nCOUNTY VARCHAR(255) not null,\nURL VARCHAR(255)\
  \ not null,\nPHONE_NUMBER VARCHAR(255) not null,\nFAX VARCHAR(255) not null\n) ;\n\
  ```\n\n我没有对表进行任何调优。例如，除了主键之外，没有任何列上建有索引。这是为了避免使示例复杂化。在非平凡的生产级应用程序中，处理这样的表时需要格外小心。\n\
  \n\n\nSpring Batch 应用是高性能的后台应用，它们有可能暴露出你未曾意识到的应用瓶颈。想象一下，突然之间每 10 分钟就能完成 100 万次新的数据库插入。你的数据库会因此陷入停滞吗？插入速度可能是影响应用速度的关键因素。软件开发人员（理想情况下）会从数据库模式对业务逻辑约束的强化程度以及它对整体业务模型的支撑程度来思考其设计。然而，在编写此类应用时，戴上另一顶帽子——即数据库管理员（DBA）的帽子——同样重要。一个常见的解决方案是创建一个反规范化的表，其内容在进入数据库后可以被强制转换为有效数据，例如通过插入触发器。这在数据仓库中很典型。稍后，你将探索如何使用\
  \ Spring Batch 在插入前对记录进行处理。这允许开发者验证或覆盖输入到数据库中的数据。这种处理，结合在数据库层面最适宜表达的约束的保守应用，可以打造出非常健壮且快速的应用。\n\
  \n作业配置\n\n该作业的配置如下：\n\n```\npackage com.apress.springrecipes.springbatch.config;\n\
  import com.apress.springrecipes.springbatch.UserRegistration;\nimport org.springframework.batch.core.Job;\n\
  import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
  import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
  import org.springframework.batch.item.ItemReader;\nimport org.springframework.batch.item.ItemWriter;\n\
  import org.springframework.batch.item.database.BeanPropertyItemSqlParameterSourceProvider;\n\
  import org.springframework.batch.item.database.JdbcBatchItemWriter;\nimport org.springframework.batch.item.file.FlatFileItemReader;\n\
  import org.springframework.batch.item.file.LineMapper;\nimport org.springframework.batch.item.file.mapping.BeanWrapperFieldSetMapper;\n\
  import org.springframework.batch.item.file.mapping.DefaultLineMapper;\nimport org.springframework.batch.item.file.transform.DelimitedLineTokenizer;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.core.io.Resource;\nimport javax.sql.DataSource;\n@Configuration\n\
  public class UserJob {\nprivate static final String INSERT_REGISTRATION_QUERY =\n\
  \"insert into USER_REGISTRATION (FIRST_NAME, LAST_NAME, COMPANY, ADDRESS,CITY,STATE,ZIP,COUNTY,URL,PHONE_NUMBER,FAX)\"\
  \ +\n\" values \" +\n\"(:firstName,:lastName,:company,:address,:city,:state,:zip,:county,:url,:phoneNumber,:fax)\"\
  ;\n@Autowired\nprivate JobBuilderFactory jobs;\n@Autowired\nprivate StepBuilderFactory\
  \ steps;\n@Autowired\nprivate DataSource dataSource;\n@Value(\"file:${user.home}/batches/registrations.csv\"\
  )\nprivate Resource input;\n@Bean\npublic Job insertIntoDbFromCsvJob() {\nreturn\
  \ jobs.get(\"User Registration Import Job\")\n.start(step1())\n.build();\n}\n@Bean\n\
  public Step step1() {\nreturn steps.get(\"User Registration CSV To DB Step\")\n\
  .chunk(5)\n.reader(csvFileReader())\n.writer(jdbcItemWriter())\n.build();\n}\n@Bean\n\
  public FlatFileItemReader csvFileReader() {\nFlatFileItemReader itemReader = new\
  \ FlatFileItemReader();\nitemReader.setLineMapper(lineMapper());\nitemReader.setResource(input);\n\
  return itemReader;\n}\n@Bean\npublic JdbcBatchItemWriter jdbcItemWriter() {\nJdbcBatchItemWriter\
  \ itemWriter = new JdbcBatchItemWriter();\nitemWriter.setDataSource(dataSource);\n\
  itemWriter.setSql(INSERT_REGISTRATION_QUERY);\nitemWriter.setItemSqlParameterSourceProvider(new\
  \ BeanPropertyItemSqlParameterSourceProvider());\nreturn itemWriter;\n}\n@Bean\n\
  public DefaultLineMapper lineMapper() {\nDefaultLineMapper lineMapper = new DefaultLineMapper();\n\
  lineMapper.setLineTokenizer(tokenizer());\nlineMapper.setFieldSetMapper(fieldSetMapper());\n\
  return lineMapper;\n}\n@Bean\npublic BeanWrapperFieldSetMapper fieldSetMapper()\
  \ {\nBeanWrapperFieldSetMapper fieldSetMapper = new BeanWrapperFieldSetMapper();\n\
  fieldSetMapper.setTargetType(UserRegistration.class);\nreturn fieldSetMapper;\n\
  }\n@Bean\npublic DelimitedLineTokenizer tokenizer() {\nDelimitedLineTokenizer tokenizer\
  \ = new DelimitedLineTokenizer();\ntokenizer.setDelimiter(\",\");\ntokenizer.setNames(new\
  \ String[]{\"firstName\",\"lastName\",\"company\",\"address\",\"city\",\"state\"\
  ,\"zip\",\"county\",\"url\",\"phoneNumber\",\"fax\"});\nreturn tokenizer;\n}\n}\n\
  ```\n\n如前所述，一个作业由多个步骤组成，这些步骤是给定作业的真正执行者。步骤可以像你希望的那样复杂或简单。实际上，步骤可以被视为作业的最小工作单元。输入（读取的内容）被传递给步骤并可能进行处理；然后从步骤中产生输出（写入的内容）。这种处理是通过使用\
  \ `Tasklet`（Spring Batch 提供的另一个接口）来明确的。你可以提供自己的 `Tasklet` 实现，或者简单地使用一些为不同处理场景预配置的配置。这些实现通过配置方法的形式提供。批处理最重要的方面之一是面向块的处理，这里就是使用\
  \ `chunk()` 配置方法来实现的。\n\n在面向块的处理中，输入从读取器读取，可选地进行处理，然后聚合。最后，在一个可配置的间隔——由提交间隔属性指定，用于配置在事务提交之前处理多少个项目——所有输入都被发送到写入器。如果存在事务管理器，事务也会被提交。在提交之前，数据库中的元数据会被更新以标记作业的进度。\n\
  \n当事务感知的写入器（或处理器）回滚时，关于输入（读取）值的聚合存在一些细微差别。Spring Batch 会缓存它读取的值，并将它们写入写入器。如果写入器组件是事务性的（例如数据库），而读取器不是，那么缓存读取的值并可能重试或采取一些替代方法本身并没有什么问题。如果读取器本身也是事务性的，那么从资源中读取的值将会被回滚，并且可能会发生变化，从而导致内存中缓存的值变得过时。如果发生这种情况，你可以在块元素上使用\
  \ `reader-transactional-queue=\"true\"` 来配置块不缓存这些值。\n\n输入\n\n首要责任是从文件系统读取文件。在示例中，你使用了一个提供的实现。读取\
  \ CSV 文件是一个常见场景，Spring Batch 的支持没有让人失望。`org.springframework.batch.item.file.FlatFileItemReader<T>`\
  \ 类将文件中分隔字段和记录的任务委托给 `LineMapper<T>`，而 `LineMapper<T>` 又将识别该记录中字段的任务委托给 `LineTokenizer`。你使用了一个\
  \ `org.springframework.batch.item.file.transform.DelimitedLineTokenizer`，它被配置为分隔由逗号（`,`）字符分隔的字段。\n\
  \n`DefaultLineMapper` 还声明了一个 `fieldSetMapper` 属性，该属性需要一个 `FieldSetMapper` 的实现。这个\
  \ bean 负责获取输入的键值对，并生成一个将传递给写入器组件的类型。\n\n在这种情况下，你使用了一个 `BeanWrapperFieldSetMapper`，它将创建一个类型为\
  \ `UserRegistration` 的 JavaBean POJO。你为这些字段命名，以便稍后在配置中引用它们。这些名称不必是输入文件中某个标题行的值；它们只需要与输入文件中字段出现的顺序相对应即可。这些名称也被\
  \ `FieldSetMapper` 用于匹配 POJO 上的属性。当每条记录被读取时，这些值会被应用到一个 POJO 实例上，并且该 POJO 被返回。\n\n\
  \n\n```\n@Bean\npublic FlatFileItemReader csvFileReader() {\nFlatFileItemReader\
  \ itemReader = new FlatFileItemReader();\nitemReader.setLineMapper(lineMapper());\n\
  itemReader.setResource(input);\nreturn itemReader;\n}\n@Bean\npublic DefaultLineMapper\
  \ lineMapper() {\nDefaultLineMapper lineMapper = new DefaultLineMapper();\nlineMapper.setLineTokenizer(tokenizer());\n\
  lineMapper.setFieldSetMapper(fieldSetMapper());\nreturn lineMapper;\n}\n@Bean\n\
  public BeanWrapperFieldSetMapper fieldSetMapper() {\nBeanWrapperFieldSetMapper fieldSetMapper\
  \ = new BeanWrapperFieldSetMapper();\nfieldSetMapper.setTargetType(UserRegistration.class);\n\
  return fieldSetMapper;\n}\n@Bean\npublic DelimitedLineTokenizer tokenizer() {\n\
  DelimitedLineTokenizer tokenizer = new DelimitedLineTokenizer();\ntokenizer.setDelimiter(\"\
  ,\");\ntokenizer.setNames(new String[]{\"firstName\",\"lastName\",\"company\",\"\
  address\",\"city\",\"state\",\"zip\",\"county\",\"url\",\"phoneNumber\",\"fax\"\
  });\nreturn tokenizer;\n}\n```\n\n读取器返回的类 `UserRegistration` 是一个相当普通的 JavaBean。\n\
  \n```\npackage com.apress.springrecipes.springbatch;\npublic class UserRegistration\
  \ implements Serializable {\nprivate String firstName;\nprivate String lastName;\n\
  private String company;\nprivate String address;\nprivate String city;\nprivate\
  \ String state;\nprivate String zip;\nprivate String county;\nprivate String url;\n\
  private String phoneNumber;\nprivate String fax;\n//... 为简洁起见，省略了访问器/修改器 ...\n}\n\
  ```\n\n输出\n\n接下来要执行工作的组件是写入器，它负责接收从读取器读取的聚合项目集合。在这种情况下，你可以想象会创建一个新的集合（`java.util.List<UserRegistration>`），然后写入该集合，并在每次集合大小超过块元素上的提交间隔属性时重置集合。由于你要写入数据库，因此使用\
  \ Spring Batch 的 `org.springframework.batch.item.database.JdbcBatchItemWriter`。该类支持接收输入并将其写入数据库。由开发者提供输入并指定应对输入执行哪些\
  \ SQL。它将运行由 `sql` 属性指定的 SQL，本质上是从数据库读取，执行次数由块元素的提交间隔指定，然后提交整个事务。这里，你执行的是一个简单的插入操作。命名参数的名称和值由为\
  \ `itemSqlParameterSourceProvider` 属性配置的 bean 创建，该 bean 是 `BeanPropertyItemSqlParameterSourceProvider`\
  \ 的一个实例，其唯一职责是获取 JavaBean 属性，并使它们作为与 JavaBean 上属性名称对应的命名参数可用。\n\n```\n@Bean\npublic\
  \ JdbcBatchItemWriter jdbcItemWriter() {\nJdbcBatchItemWriter itemWriter = new JdbcBatchItemWriter();\n\
  itemWriter.setDataSource(dataSource);\nitemWriter.setSql(INSERT_REGISTRATION_QUERY);\n\
  itemWriter.setItemSqlParameterSourceProvider(new BeanPropertyItemSqlParameterSourceProvider());\n\
  return itemWriter;\n}\n```\n\n就是这样！一个可行的解决方案。只需少量配置且无需自定义代码，你就构建了一个用于读取大型 CSV 文件并将其导入数据库的解决方案。这个解决方案是基础性的，留下了许多未处理的边缘情况。例如，你可能希望在读取项目时（在插入之前）对其进行处理。\n\
  \n这展示了一个简单的任务。重要的是要记住，存在用于执行完全相反转换的类似类：从数据库读取并写入 CSV 文件。\n\n```\n@Bean\npublic Job\
  \ insertIntoDbFromCsvJob() {\nreturn jobs.get(\"User Registration Import Job\")\n\
  .start(step1())\n.build();\n}\n@Bean\npublic Step step1() {\nreturn steps.get(\"\
  User Registration CSV To DB Step\")\n.chunk(5)\n.reader(csvFileReader())\n.writer(jdbcItemWriter())\n\
  .build();\n}\n```\n\n要配置步骤，你为其指定名称 `User Registration CSV To DB Step`。你正在使用基于块的处理，并且需要告诉它你希望块大小为\
  \ 5。接下来，你为其提供一个读取器和一个写入器，最后你告诉工厂构建该步骤。配置好的步骤最终作为你任务的起点被连接起来，该任务名为 `User Registration\
  \ Import Job`，仅包含这一个步骤。\n\n简化 ItemReader 和 ItemWriter 的配置\n\n配置 `ItemReader` 和 `ItemWriter`\
  \ 可能是一项艰巨的任务。你需要了解 Spring Batch 的很多内部知识（使用哪些类等）。从 Spring Batch 4 开始，配置读取器和写入器变得更加容易，因为现在针对不同的读取器和写入器有了特定的构建器。\n\
  \n要配置 `FlatFileItemReader`，你可以使用 `FlatFileItemReaderBuilder`，并且不再需要配置四个独立的 bean，现在只需六行代码（主要是因为示例中的格式）。\n\
  \n```\n@Bean\npublic FlatFileItemReader csvFileReader() throws Exception {\nreturn\
  \ new FlatFileItemReaderBuilder()\n.name(ClassUtils.getShortName(FlatFileItemReader.class))\n\
  .resource(input)\n.targetType(UserRegistration.class)\n.delimited()\n.names(new\
  \ String[]{\"firstName\",\"lastName\",\"company\",\"address\",\"city\",\"state\"\
  ,\"zip\",\"county\",\"url\",\"phoneNumber\",\"fax\"})\n.build();\n}\n```\n\n这个构建器会自动创建\
  \ `DefaultLineMapper`、`BeanWrapperFieldSetMapper` 和 `DelimitedLineTokenizer`，你无需知道它们在内部被使用。你现在基本上可以描述你的配置，而不是显式地配置所有不同的项。\n\
  \n同样的方法也可以应用于使用 `JdbcBatchItemWriterBuilder` 的 `JdbcBatchItemWriter`。\n\n```\n@Bean\n\
  public JdbcBatchItemWriter jdbcItemWriter() {\nreturn new JdbcBatchItemWriterBuilder()\n\
  .dataSource(dataSource)\n.sql(INSERT_REGISTRATION_QUERY)\n.beanMapped()\n.build();\n\
  }\n```\n\n11-3. 编写自定义的 ItemWriter 和 ItemReader\n\n问题\n\n你想要与 Spring Batch 不知道如何连接的资源（你可以想象一个\
  \ RSS 源或任何其他自定义数据格式）进行通信。\n\n解决方案\n\n你可以轻松编写自己的 `ItemWriter` 或 `ItemReader`。这些接口非常简单，并且对实现的要求不多。\n\
  \n工作原理\n\n尽管这个过程做起来简单且微不足道，但它仍然不如直接重用众多提供的选项之一好。如果你找一找，很可能会找到一些东西。支持写入 JMS（`JmsItemWriter<T>`）、JPA（`JpaItemWriter<T>`）、JDBC（`JdbcBatchItemWriter<T>`）、文件（`FlatFileItemWriter<T>`）、Hibernate（`HibernateItemWriter<T>`）等等。甚至支持通过调用\
  \ bean 上的方法（`PropertyExtractingDelegatingItemWriter<T>`）并将要写入的 `Item` 上的属性作为参数传递给它来写入！其中一个更有用的写入器允许你写入一组带编号的文件。这个实现——`MultiResourceItemWriter<T>`——将工作委托给另一个合适的\
  \ `ItemWriter<T>` 实现，但允许你写入多个文件，而不仅仅是一个非常大的文件。`ItemReader` 的实现集稍微小一些，但同样令人印象深刻。如果不存在，请再找找。如果仍然找不到，请考虑编写你自己的。在本节中，你将正是这样做。\n\
  \n编写自定义的 ItemReader\n\n`ItemReader` 示例很简单。这里创建了一个 `ItemReader`，它知道如何从远程过程调用（RPC）端点检索\
  \ `UserRegistration` 对象：\n\n\n\n```\npackage com.apress.springrecipes.springbatch;\n\
  import org.springframework.batch.item.ItemReader;\nimport java.util.Collection;\n\
  import java.util.Date;\npublic class UserRegistrationItemReader implements ItemReader\
  \ {\nprivate final UserRegistrationService userRegistrationService;\npublic UserRegistrationItemReader(UserRegistrationService\
  \ userRegistrationService) {\nthis.userRegistrationService = userRegistrationService;\n\
  }\npublic UserRegistration read() throws Exception {\nfinal Date today = new Date();\n\
  Collection registrations = userRegistrationService.getOutstandingUserRegistrationBatchForDate(1,\
  \ today);\nreturn registrations.stream().findFirst().orElse(null);\n}\n}\n```\n\n\
  如你所见，这个接口很简单。在本例中，你将大部分工作委托给一个远程服务来为你提供输入。该接口要求你返回一条记录。接口被参数化为要返回的对象类型（即“条目”）。所有读取的条目将被聚合，然后传递给`ItemWriter`。\n\
  \n编写自定义 ItemWriter\n\n`ItemWriter`的例子同样简单。想象一下，你想通过使用 Spring 提供的众多远程调用选项之一来调用远程服务进行写入。`ItemWriter<T>`接口根据你期望写入的条目类型进行参数化。在这里，你期望从`ItemReader<T>`中获取一个`UserRegistration`对象。该接口包含一个方法，该方法期望接收一个该类的参数化类型的`List`。这些是从`ItemReader<T>`中读取并聚合的对象。如果你的提交间隔（commit-interval）是十，那么你可能期望`List`中有十个或更少的条目。\n\
  \n```\npackage com.apress.springrecipes.springbatch;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.batch.item.ItemWriter;\n\
  import java.util.List;\npublic class UserRegistrationServiceItemWriter implements\
  \ ItemWriter {\nprivate static final Logger logger = LoggerFactory.getLogger(UserRegistrationServiceItemWriter.class);\n\
  private final UserRegistrationService userRegistrationService;\npublic UserRegistrationServiceItemWriter(UserRegistrationService\
  \ userRegistrationService) {\nthis.userRegistrationService = userRegistrationService;\n\
  }\npublic void write(List items) throws Exception {\nitems.forEach(this::write);\n\
  }\nprivate void write(UserRegistration userRegistration) {\nUserRegistration registeredUserRegistration\
  \ = userRegistrationService.registerUser(userRegistration);\nlogger.debug(\"Registered:\
  \ {}\", registeredUserRegistration);\n}\n}\n```\n\n在这里，你注入了服务的客户端接口。你只需遍历`UserRegistration`对象并调用服务，该服务会返回一个相同的`UserRegistration`实例。如果去掉多余的间距、花括号和日志输出，满足需求只需要两行代码。\n\
  \n`UserRegistrationService`的接口如下：\n\n```\npackage com.apress.springrecipes.springbatch;\n\
  import java.util.Collection;\nimport java.util.Date;\npublic interface UserRegistrationService\
  \ {\nCollection getOutstandingUserRegistrationBatchForDate(\nint quantity, Date\
  \ date);\nUserRegistration registerUser(UserRegistration userRegistrationRegistration);\n\
  }\n```\n\n在这个例子中，你没有为该接口提供特定的实现，因为这不重要：它可以是任何 Spring Batch 尚未知晓的接口。\n\n11-4. 在写入前处理输入\n\
  \n问题\n\n虽然直接从电子表格或 CSV 转储传输数据可能很有用，但你可以想象在写入数据之前需要对其进行某种处理。CSV 文件中的数据，更广泛地说，来自任何源的数据，通常并不完全符合你的预期，或者不适合立即写入。仅仅因为\
  \ Spring Batch 可以为你将其强制转换为 POJO，并不意味着数据的状态是正确的。在数据适合写入之前，可能还需要从其他服务推断或填充额外的数据。\n\
  \n解决方案\n\nSpring Batch 允许你对读取器的输出进行处理。在处理结果传递给写入器之前，这种处理几乎可以对输出做任何事情，包括更改数据的类型。\n\
  \n工作原理\n\nSpring Batch 为实现者提供了一个机会，可以对从读取器读取的数据执行任何自定义逻辑。块配置上的`processor`属性期望引用一个`org.springframework.batch.item.ItemProcessor<I,O>`接口的\
  \ bean。因此，上一个配方中的作业的修订定义如下所示：\n\n```\n@Bean\npublic Step step1() {\nreturn steps.get(\"\
  User Registration CSV To DB Step\")\n.chunk(5)\n.reader(csvFileReader())\n.processor(userRegistrationValidationItemProcessor())\n\
  .writer(jdbcItemWriter())\n.build();\n}\n```\n\n目标是在授权将数据写入数据库之前，对数据执行某些验证。如果你确定记录无效，可以通过从`ItemProcessor<I,O>`返回`null`来停止进一步处理。这一点至关重要，并提供了一种必要的安全措施。你想要做的一件事是确保数据格式正确（例如，模式可能要求有效的两个字母的州名，而不是更长的完整州名）。电话号码需要遵循特定格式，你可以使用此处理器去除电话号码中任何无关的字符，只留下一个有效的（在美国）十位电话号码。这同样适用于美国邮政编码，它由五个字符组成，可选地后跟一个连字符和四位代码。最后，虽然防止重复的最佳约束是在数据库中实现，但很可能还存在一些其他记录资格标准，只能在插入前通过查询系统来满足。\n\
  \n以下是`ItemProcessor`的配置：\n\n```\n@Bean\npublic ItemProcessor userRegistrationValidationItemProcessor()\
  \ {\nreturn new UserRegistrationValidationItemProcessor();\n}\n```\n\n为了保持此类简短，我不会完整地重新打印它，但关键部分应该很明显。\n\
  \n```\npackage com.apress.springrecipes.springbatch;\nimport java.util.Arrays;\n\
  import java.util.Collection;\nimport org.apache.commons.lang3.StringUtils;\nimport\
  \ org.springframework.batch.core.StepExecution;\nimport org.springframework.batch.item.ItemProcessor;\n\
  import com.apress.springrecipes.springbatch.UserRegistration;\npublic class UserRegistrationValidationItemProcessor\n\
  implements ItemProcessor {\nprivate String stripNonNumbers(String input) { /* ...\
  \ */ }\nprivate boolean isTelephoneValid(String telephone) { /* ... */ }\nprivate\
  \ boolean isZipCodeValid(String zip) { /* ... */ }\nprivate boolean isValidState(String\
  \ state) { /* ... */ }\npublic UserRegistration process(UserRegistration input)\
  \ throws Exception {\nString zipCode = stripNonNumbers(input.getZip());\nString\
  \ telephone = stripNonNumbers(input.getPhoneNumber());\nString state = StringUtils.defaultString(input.getState());\n\
  if (isTelephoneValid(telephone) && isZipCodeValid(zipCode) && isValidState(state))\
  \ {\ninput.setZip(zipCode);\ninput.setPhoneNumber(telephone);\nreturn input;\n}\n\
  return null;\n}\n}\n```\n\n该类是一个参数化类型。类型信息包括输入的类型以及输出的类型。输入是提供给该方法进行处理的内容，输出是从该方法返回的数据。因为在此示例中你没有进行任何转换，所以两个参数化类型是相同的。一旦此过程完成，Spring\
  \ Batch 元数据表中将包含大量有用的信息。在你的数据库上执行以下查询：\n\n```\nselect * from BATCH_STEP_EXECUTION;\n\
  ```\n\n\n\n除此之外，你还会获得任务的退出状态、发生了多少次提交、读取了多少个项目以及过滤了多少个项目。因此，如果前面的任务在一个包含 100 行的批次上运行，每个项目都被读取并通过处理器处理，并且它发现了\
  \ 10 个无效项目（它返回了 `null` 10 次），那么 `filter_count` 列的值将是 10。你可以从 `read_count` 看到读取了\
  \ 100 个项目。`write_count` 列将反映有 10 个项目未通过，并显示为 90。\n\n**链接处理器**\n\n有时你可能想要添加额外的处理，但这与你已设置的处理器目标不一致。Spring\
  \ Batch 提供了一个便捷类 `CompositeItemProcessor<I,O>`，它将前一个过滤器的输出转发到后一个过滤器的输入。通过这种方式，你可以编写许多单一职责的\
  \ `ItemProcessor<I,O>`，然后根据需要重用它们并将它们链接起来。\n\n```\n@Bean\npublic CompositeItemProcessor\
  \ compositeBankCustomerProcessor() {\n    List> delegates = Arrays.asList(creditScoreValidationProcessor(),\
  \ salaryValidationProcessor(), customerEligibilityProcessor());\n    CompositeItemProcessor\
  \ processor = new CompositeItemProcessor();\n    processor.setDelegates(delegates);\n\
  \    return processor;\n}\n```\n\n该示例创建了一个简单的工作流。第一个 `ItemProcessor<T>` 将接收来自为此任务配置的\
  \ `ItemReader<T>` 的任何输入，通常是一个 `Customer` 对象。它将检查 `Customer` 的信用评分，如果通过，则将 `Customer`\
  \ 转发给薪资和收入验证处理器。如果一切检查通过，`Customer` 将被转发给资格处理器，系统会在其中检查重复项或任何其他无效数据。最后，它将被转发给写入器以添加到输出中。如果在三个处理器中的任何一个环节，`Customer`\
  \ 未通过检查，正在执行的 `ItemProcessor` 可以简单地返回 `null` 并终止处理。\n\n**11-5. 通过事务实现更好的运行**\n\n\
  **问题**\n\n你希望你的读取和写入操作是健壮的。理想情况下，它们会在适当的地方使用事务，并正确地对异常做出反应。\n\n**解决方案**\n\n事务能力建立在核心\
  \ Spring 框架已经提供的一流支持之上。在相关的地方，Spring Batch 会暴露配置，以便你可以控制它。在面向块处理的上下文中，它还提供了对提交频率、回滚语义等方面的许多控制。\n\
  \n**工作原理**\n\n首先，你将探索如何使一个步骤（或块）具有事务性，然后配置步骤上的重试逻辑。\n\n**事务**\n\nSpring 核心框架为事务提供了一流支持。你只需连接一个\
  \ `PlatformTransactionManager` 并给 Spring Batch 一个引用，就像在任何常规的 `JdbcTemplate` 或 `HibernateTemplate`\
  \ 解决方案中一样。在构建 Spring Batch 解决方案时，你将有机会控制步骤在事务中的行为。你已经看到了一些内建的事务支持。\n\n所有这些示例中使用的配置都建立了一个\
  \ `DriverManagerDataSource` 和一个 `DataSourceTransactionManager` bean。然后，`PlatformTransactionManager`\
  \ 和 `DataSource` 被连接到 `JobRepository`，而 `JobRepository` 又被连接到 `JobLauncher`，你使用它来启动到目前为止的所有任务。这使得你的任务创建的所有元数据都能以事务方式写入数据库。\n\
  \n你可能想知道，当你使用对 `dataSource` 的引用来配置 `JdbcItemWriter` 时，为什么没有明确提及事务管理器。可以指定事务管理器引用，但在你的解决方案中，这不是必需的，因为\
  \ Spring Batch 默认会尝试从上下文中获取名为 `transactionManager` 的 `PlatformTransactionManager`\
  \ 并使用它。如果你想显式配置它，可以在 `tasklet` 配置方法上指定 `transactionManager` 属性。一个用于 JDBC 工作的简单事务管理器可能如下所示：\n\
  \n```\n@Bean\nprotected Step step1() {\n    return steps.get(\"step1\")\n      \
  \  .chunk(5)\n        .reader(csvFileReader())\n        .processor(userRegistrationValidationItemProcessor())\n\
  \        .writer(jdbcItemWriter())\n        .transactionManager(new DataSourceTransactionManager(dataSource))\n\
  \        .build();\n}\n```\n\n从 `ItemReader<T>` 读取的项目通常会被聚合。如果对 `ItemWriter<T>`\
  \ 的提交失败，聚合的项目会被保留并重新提交。这个过程是高效的，并且在大多数情况下都有效。一个破坏语义的地方是从事务性资源（如 JMS 队列或数据库）读取时。如果它们参与的事务（在这种情况下，是写入器的事务）失败，从消息队列的读取可以并且应该被回滚。\n\
  \n```\n@Bean\nprotected Step step1() {\n    return steps.get(\"step1\")\n      \
  \  .chunk(5)\n        .reader(csvFileReader()).readerIsTransactionalQueue()\n  \
  \      .processor(userRegistrationValidationItemProcessor())\n        .writer(jdbcItemWriter())\n\
  \        .transactionManager(new DataSourceTransactionManager(dataSource))\n   \
  \     .build();\n}\n```\n\n**回滚**\n\n处理简单情况（“读取 X 个项目，每 Y 个项目提交一次数据库事务”）很容易。Spring\
  \ Batch 擅长于其健壮性，它为边缘情况和失败情况提供了简单的配置选项。\n\n如果对 `ItemWriter` 的写入失败，或者在处理过程中发生其他异常，Spring\
  \ Batch 将回滚事务。这对于大多数情况来说是有效的处理方式。在某些场景下，你可能希望控制哪些异常情况会导致事务回滚。\n\n当使用基于 Java 的配置来启用回滚时，第一步需要是一个容错步骤，然后可以用它来指定不回滚的异常。首先使用\
  \ `faultTolerant()` 来获取一个容错步骤，接着可以使用 `skipLimit()` 方法来指定在实际停止任务执行之前忽略的回滚次数，最后可以使用\
  \ `noRollback()` 方法来指定不会触发回滚的异常。要指定多个异常，你可以简单地链式调用 `noRollback()` 方法。\n\n```\n@Bean\n\
  protected Step step1() {\n    return steps.get(\"step1\")\n        .chunk(10)\n\
  \        .faultTolerant()\n        .noRollback(com.yourdomain.exceptions.YourBusinessException.class)\n\
  \        .reader(csvFileReader())\n        .processor(userRegistrationValidationItemProcessor())\n\
  \        .writer(jdbcItemWriter())\n        .build();\n}\n```\n\n**11-6. 重试**\n\n\
  **问题**\n\n你正在处理一个功能需求，该功能可能会失败，但并非事务性的。或者它可能是事务性的但不可靠。你想要处理一个在尝试读取或写入时可能失败的资源。它可能因为网络连接问题、端点宕机或任何其他原因而失败。不过，你知道它很可能很快就会恢复，并且应该重试。\n\
  \n**解决方案**\n\n使用 Spring Batch 的重试能力来系统地重试读取或写入操作。\n\n**工作原理**\n\n\n\n正如你在上一个配方中所见，使用\
  \ Spring Batch 处理事务性资源非常容易。但对于临时性或不可靠的资源，则需要采取不同的策略。这类资源往往是分布式的，或者会表现出最终能自行解决的问题。有些资源（例如\
  \ Web 服务）由于其分布式特性，天生无法参与事务。虽然有产品可以在一个服务器上启动事务，并将事务上下文传播到分布式服务器并在那里完成，但这通常非常罕见且效率低下。另外，如果你能使用分布式（“全局”或\
  \ XA）事务，也有很好的支持。然而，有时你可能正在处理一种不属于上述任何一类的资源。一个常见的例子可能是对远程服务的调用，例如 RMI 服务或 REST 端点。某些调用会失败，但在事务场景中，重试后有可能成功。例如，对数据库的更新导致\
  \ `org.springframework.dao.DeadlockLoserDataAccessException` 异常，重试可能会很有用。\n\n配置一个步骤\n\
  \n当使用基于 Java 的配置来启用重试时，第一步需要是一个容错步骤，然后可以用它来指定重试限制和可重试的异常。首先使用 `faultTolerant()`\
  \ 来获取一个容错步骤，接着可以使用 `retryLimit()` 方法来指定重试尝试次数，最后使用 `retry()` 方法来指定触发重试的异常。要指定多个异常，你可以简单地链式调用\
  \ `retry()` 方法。\n\n```\n@Bean\npublic Step step1() {\nreturn steps.get(\"用户注册 CSV\
  \ 到数据库步骤\")\n.chunk(10)\n.faultTolerant()\n.retryLimit(3).retry(DeadlockLoserDataAccessException.class)\n\
  .reader(csvFileReader())\n.writer(jdbcItemWriter())\n.transactionManager(transactionManager)\n\
  .build();\n}\n```\n\n重试模板\n\n或者，你也可以在自己的代码中利用 Spring Retry 对重试和恢复的支持。例如，你可以有一个自定义的\
  \ `ItemWriter<T>`，在其中需要重试功能，甚至是一个需要重试支持的完整服务接口。\n\nSpring Batch 通过 `RetryTemplate`\
  \ 支持这些场景，它（很像它的其他各种 `Template` 表亲）将你的逻辑与重试的细节隔离开来，反而让你能够像只打算尝试一次那样编写代码。让 Spring\
  \ Batch 通过声明式配置来处理其他一切。\n\n`RetryTemplate` 支持许多用例，它提供了便捷的 API，可以将原本繁琐的重试/失败/恢复循环封装在简洁的单方法调用中。\n\
  \n让我们看看来自配方 11-4（关于如何编写自定义 `ItemWriter<T>`）的一个简单 `ItemWriter<T>` 的修改版本。原来的解决方案足够简单，理想情况下应该一直有效。然而，它未能处理服务的错误情况。当处理\
  \ RPC 时，始终要假设事情几乎不可能顺利进行；服务本身可能会暴露语义或系统违规。例如，重复的数据库键、无效的信用卡号等。当然，无论服务是分布式的还是在虚拟机内，情况都是如此。\n\
  \n接下来，系统底层的 RPC 层也可能出错。以下是重写的代码，这次允许重试：\n\n```\npackage com.apress.springrecipes.springbatch;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.batch.item.ItemWriter;\n\
  import org.springframework.retry.RetryCallback;\nimport org.springframework.retry.support.RetryTemplate;\n\
  import java.util.List;\npublic class RetryableUserRegistrationServiceItemWriter\
  \ implements ItemWriter {\nprivate static final Logger logger = LoggerFactory.getLogger(RetryableUserRegistrationServiceItemWriter.class);\n\
  private final UserRegistrationService userRegistrationService;\nprivate final RetryTemplate\
  \ retryTemplate;\npublic RetryableUserRegistrationServiceItemWriter(UserRegistrationService\
  \ userRegistrationService, RetryTemplate retryTemplate) {\nthis.userRegistrationService\
  \ = userRegistrationService;\nthis.retryTemplate = retryTemplate;\n}\npublic void\
  \ write(List items)\nthrows Exception {\nfor (final UserRegistration userRegistration\
  \ : items) {\nUserRegistration registeredUserRegistration = retryTemplate.execute(\n\
  (RetryCallback) context -> userRegistrationService.registerUser(userRegistration));\n\
  logger.debug(\"已注册: {}\", registeredUserRegistration);\n}\n}\n}\n```\n\n如你所见，代码改动不大，但结果健壮得多。`RetryTemplate`\
  \ 本身是在 Spring 上下文中配置的，尽管在代码中创建它也很简单。我之所以在 Spring 上下文中声明它，只是因为创建对象时有一些配置空间，并且我尽量让\
  \ Spring 来处理配置。\n\n`RetryTemplate` 最有用的设置之一是所使用的 `BackOffPolicy`。`BackOffPolicy`\
  \ 规定了 `RetryTemplate` 在重试之间应该等待多长时间。实际上，它还支持在每次失败尝试后增加重试间隔，以避免与其他尝试相同调用的客户端发生锁步。这对于可能存在大量并发尝试访问同一资源并可能引发竞态条件的情况非常有用。还有其他\
  \ `BackOffPolicy` 设置，包括一种称为 `FixedBackOffPolicy` 的固定延迟重试策略。\n\n```\n@Bean\npublic\
  \ RetryTemplate retryTemplate() {\nRetryTemplate retryTemplate = new RetryTemplate();\n\
  retryTemplate.setBackOffPolicy(backOffPolicy());\nreturn retryTemplate;\n}\n@Bean\n\
  public ExponentialBackOffPolicy backOffPolicy() {\nExponentialBackOffPolicy backOffPolicy\
  \ = new ExponentialBackOffPolicy();\nbackOffPolicy.setInitialInterval(1000);\nbackOffPolicy.setMaxInterval(10000);\n\
  backOffPolicy.setMultiplier(2);\nreturn backOffPolicy;\n}\n```\n\n你已经配置了 `RetryTemplate`\
  \ 的 `backOffPolicy`，使得 `backOffPolicy` 在首次重试前等待 1 秒（1000 毫秒）。后续尝试将加倍该值（增长受乘数影响）。它会一直持续到达到\
  \ `maxInterval`，此时所有后续重试间隔将趋于平稳，以一致的间隔进行重试。\n\n基于 AOP 的重试\n\n另一种方法是使用 Spring Batch\
  \ 提供的 AOP 通知器，它会包装那些成功无法保证的方法调用，就像你使用 `RetryTemplate` 所做的那样。在前面的例子中，你重写了一个 `ItemWriter<T>`\
  \ 来使用该模板。另一种方法可能只是用这个重试逻辑来通知整个 `userRegistrationService` 代理。在这种情况下，代码可以恢复到原始示例中的样子，无需\
  \ `RetryTemplate`！\n\n为此，你需要使用 `@Retryable` 注解来标记要重试的方法（或多个方法）。要实现与使用显式 `RetryTemplate`\
  \ 的代码相同的效果，你需要添加以下内容。\n\n```\n@Retryable(backoff = @Backoff(delay = 1000, maxDelay\
  \ = 10000, multiplier = 2))\npublic UserRegistration registerUser(UserRegistration\
  \ userRegistrationRegistration) { ... }\n```\n\n仅仅添加这个注解是不够的；你还需要在你的配置上使用 `@EnableRetry`\
  \ 注解来启用对此的注解处理。\n\n\n\n```\n@Configuration\n@EnableBatchProcessing\n@EnableRetry\n\
  @ComponentScan(\"com.apress.springrecipes.springbatch\")\n@PropertySource(\"classpath:/batch.properties\"\
  )\npublic class BatchConfiguration { ... }\n```\n\n11-7\\. 控制步骤执行\n\n问题\n\n您希望控制步骤的执行方式，例如通过引入并发来消除不必要的时间浪费，或仅在条件为真时执行步骤。\n\
  \n解决方案\n\n有多种方法可以改变作业的运行时配置，主要通过控制步骤的执行方式来实现：并发步骤、条件步骤和顺序步骤。\n\n工作原理\n\n到目前为止，您已经了解了在作业中运行单个步骤。然而，几乎任何复杂程度的典型作业都会包含多个步骤。步骤为其所包含的\
  \ Bean 和逻辑提供了边界（事务性或非事务性）。一个步骤可以拥有自己的读取器、写入器和处理器。每个步骤都有助于决定下一步骤是什么。步骤是隔离的，并提供专注的功能，可以利用\
  \ Spring Batch 中更新的模式和配置选项，在复杂的工作流中进行组装。事实上，如果您对业务流程管理（BPM）系统和工作流感兴趣，您即将看到的一些概念和模式将会似曾相识。BPM\
  \ 提供了许多用于流程或作业控制的构造，与您在这里看到的类似。当您在纸上勾勒作业定义时，步骤通常对应于一个要点。例如，一个用于加载每日销售数据并生成报告的批处理作业可能按如下方式提出：\n\
  \n1.  将客户数据从 CSV 文件加载到数据库中。\n2.  计算每日统计数据并写入报告文件。\n3.  向消息队列发送消息，通知外部系统每个新加载的客户已成功注册。\n\
  \n顺序步骤\n\n在前面的示例中，前两个步骤之间存在隐含的顺序关系；只有在所有注册都完成后，才能写入审计文件。这种关系是两个步骤之间的默认关系。一个步骤在另一个步骤之后发生。每个步骤都使用自己的执行上下文执行，并且仅共享一个父作业执行上下文和一个顺序。\n\
  \n```\n@Bean\npublic Job nightlyRegistrationsJob () {\nreturn jobs.get(\"nightlyRegistrationsJob\
  \ \")\n.start(loadRegistrations())\n.next(reportStatistics())\n.next(...)\n.build();\n\
  }\n}\n```\n\n并发\n\nSpring Batch 的第一个版本主要面向同一线程内的批处理，经过一些修改后，也可能在虚拟机内部进行。当然，存在一些变通方法，但情况并不理想。\n\
  \n在此示例作业的概要中，第一步必须在第二和第三步之前执行，因为后两步依赖于第一步。然而，后两步之间没有任何此类依赖关系。没有理由不能在发送 JMS 消息的同时写入审计日志。Spring\
  \ Batch 提供了分支处理的能力，以实现这种安排。\n\n```\n@Bean\npublic Job insertIntoDbFromCsvJob() {\n\
  JobBuilder builder = jobs.get(\"insertIntoDbFromCsvJob\");\nreturn builder\n.start(loadRegistrations())\n\
  .split(taskExecutor())\n.add(\nbuilder.flow(reportStatistics()),\nbuilder.flow(sendJmsNotifications()))\n\
  .build();\n}\n```\n\n您可以在作业构建器上使用 `split()` 方法。要将步骤转换为流程，可以使用作业构建器的 `flow()` 方法；然后，要向流程中添加更多步骤，可以使用\
  \ `next()` 方法添加它们。`split()` 方法需要设置一个 `TaskExecutor`；有关调度和并发的更多信息，请参见配方 2-23。\n\n\
  在此示例中，没有什么可以阻止您在流程元素中包含多个步骤，也没有什么可以阻止您在 split 元素之后添加更多步骤。split 元素与 step 元素一样，也接受一个\
  \ next 属性。\n\nSpring Batch 提供了一种将处理卸载到另一个进程的机制。这种分布需要某种持久、可靠的连接。这是 JMS 的完美应用，因为它坚如磐石、支持事务、快速且可靠。Spring\
  \ Batch 的支持是在稍高的层次上建模的，基于 Spring Integration 对 Spring Integration 通道的抽象。此支持不在主要的\
  \ Spring Batch 代码中；它可以在 `spring-batch-integration` 项目中找到。远程分块允许单个步骤像往常一样在主线程中读取和聚合项目。此步骤称为主节点。读取的项目被发送到在另一个进程中运行的\
  \ `ItemProcessor<I,O>`/`ItemWriter<T>`（这称为从节点）。如果从节点是一个积极消费者，您就拥有一个简单、通用的扩展机制：工作会立即分发给尽可能多的\
  \ JMS 客户端。积极消费者模式指的是多个 JMS 客户端都消费同一队列消息的配置。如果一个客户端消费了一条消息并正在忙于处理，其他空闲的队列将转而获取该消息。只要有一个空闲的客户端，消息就会被立即处理。\n\
  \n此外，Spring Batch 支持使用一种称为分区 的特性进行隐式扩展。这个特性很有趣，因为它是内置的，并且通常非常灵活。您可以将步骤实例替换为子类 `PartitionStep`，它知道如何协调分布式执行器，并维护步骤执行的元数据，从而消除了像“远程分块”技术那样需要持久通信媒介的需求。\n\
  \n这里的功能也非常通用。可以想象，它可以与任何类型的网格结构技术（如 GridGain 或 Hadoop）一起使用。Spring Batch 仅附带一个 `TaskExecutorPartitionHandler`，它使用\
  \ `TaskExecutor` 策略在多个线程中执行步骤。这个简单的改进可能就足以证明此特性的价值！但是，如果您确实需要，您可以扩展它。\n\n基于状态的条件步骤\n\
  \n使用给定作业或步骤的 `ExitStatus` 来确定下一步骤是条件流的最简单示例。Spring Batch 通过使用 stop、next、fail 和 end\
  \ 元素来促进这一点。默认情况下，假设没有干预，步骤的 `ExitStatus` 将与其 `BatchStatus` 匹配，`BatchStatus` 是一个属性，其值在枚举中定义，可以是以下任意一种：`COMPLETED`、`STARTING`、`STARTED`、`STOPPING`、`STOPPED`、`FAILED`、`ABANDONED`\
  \ 或 `UNKNOWN`。\n\n让我们看一个示例，该示例根据前一步骤的成功与否来执行两个步骤之一：\n\n```\n@Bean\npublic Job insertIntoDbFromCsvJob()\
  \ {\nreturn jobs.get(\"User Registration Import Job\")\n.start(step1())\n.on(\"\
  COMPLETED\").to(step2())\n.on(\"FAILED\").to(failureStep())\n.build();\n}\n```\n\
  \n也可以提供通配符。如果您想确保对任意数量的 `BatchStatus` 值都有某种特定行为，这很有用，也许可以与仅匹配一个 `BatchStatus` 的更具体的\
  \ next 元素结合使用。\n\n```\n@Bean\npublic Job insertIntoDbFromCsvJob() {\nreturn jobs.get(\"\
  User Registration Import Job\")\n.start(step1())\n.on(\"COMPLETED\").to(step2())\n\
  .on(\"*\").to(failureStep())\n.build();\n}\n```\n\n在此示例中，您指示 Spring Batch 根据任何未处理的\
  \ `ExitStatus` 执行某个步骤。另一种选择是直接停止处理，并将 `BatchStatus` 设置为 `FAILED`。您可以使用 fail 元素来实现这一点。对前面示例的一个不那么激进的改写可能是：\n\
  \n```\n@Bean\npublic Job insertIntoDbFromCsvJob() {\nreturn jobs.get(\"User Registration\
  \ Import Job\")\n.start(step1())\n.on(\"COMPLETED\").to(step2())\n.on(\"FAILED\"\
  ).fail()\n.build();\n}\n```\n\n\n\n在上述所有示例中，你都在响应 Spring Batch 框架提供的标准 `BatchStatus`\
  \ 值。但你也可以自行定义 `ExitStatus`。\n\n例如，如果你希望整个任务因自定义的 `ExitStatus`（值为 `MAN DOWN`）而失败，可以这样做：\n\
  \n```\n@Bean\npublic Job insertIntoDbFromCsvJob() {\nreturn jobs.get(\"User Registration\
  \ Import Job\")\n.start(step1())\n.on(\"COMPLETED\").to(step2())\n.on(\"FAILED\"\
  ).end(\"MAN DOWN\")\n.build();\n}\n```\n\n最后，如果你只想以 `COMPLETED` 的 `BatchStatus`\
  \ 结束处理，可以使用 `end()` 方法。这是一种显式结束流程的方式，效果等同于流程已执行完所有步骤且未发生错误。\n\n```\n@Bean\npublic\
  \ Job insertIntoDbFromCsvJob() {\nreturn jobs.get(\"User Registration Import Job\"\
  )\n.start(step1())\n.on(\"COMPLETED\").end()\n.on(\"FAILED\").to(errorStep())\n\
  .build();\n}\n```\n\n### 带决策的条件步骤\n\n如果你希望基于比任务 `ExitStatus` 值更复杂的逻辑来改变执行流程，可以通过使用决策元素并为其提供\
  \ `JobExecutionDecider` 的实现来帮助 Spring Batch。\n\n```\npackage com.apress.springrecipes.springbatch;\n\
  import org.springframework.batch.core.JobExecution;\nimport org.springframework.batch.core.StepExecution;\n\
  import org.springframework.batch.core.job.flow.FlowExecutionStatus;\nimport org.springframework.batch.core.job.flow.JobExecutionDecider;\n\
  public class HoroscopeDecider implements JobExecutionDecider {\nprivate boolean\
  \ isMercuryIsInRetrograde () { return Math.random() > .9 ; }\npublic FlowExecutionStatus\
  \ decide(JobExecution jobExecution,\nStepExecution stepExecution) {\nif (isMercuryIsInRetrograde())\
  \ {\nreturn new FlowExecutionStatus(\"MERCURY_IN_RETROGRADE\");\n}\nreturn FlowExecutionStatus.COMPLETED;\n\
  }\n}\n```\n\n剩下的就是配置，如下所示：\n\n```\n@Bean\npublic Job insertIntoDbFromCsvJob() {\n\
  JobBuilder builder = jobs.get(\"insertIntoDbFromCsvJob\");\nreturn builder\n.start(step1())\n\
  .next((horoscopeDecider())\n.on(\"MERCURY_IN_RETROGRADE\").to(step2())\n.on((\"\
  COMPLETED \").to(step3())\n.build();\n}\n```\n\n### 11-8. 启动任务\n\n#### 问题\n\nSpring\
  \ Batch 支持哪些部署场景？Spring Batch 如何启动？Spring Batch 如何与系统调度器（如 cron 或 autosys）配合使用，或者如何在\
  \ Web 应用中使用？你想了解所有这些内容。\n\n#### 解决方案\n\nSpring Batch 在 Spring 运行的所有环境中都能良好运行：你的\
  \ `public static void main` 方法、OSGi、Web 应用——任何地方！不过，某些用例具有独特的挑战性：例如，很少会在与 HTTP 响应相同的线程中运行\
  \ Spring Batch，因为这可能会导致执行停滞。Spring Batch 正是针对这种情况支持异步执行。Spring Batch 还提供了一个便捷类，可以方便地与\
  \ cron 或 autosys 配合使用，以支持启动任务。此外，Spring 优秀的调度器命名空间提供了一种出色的机制来调度任务。\n\n#### 工作原理\n\
  \n在开始创建解决方案之前，了解有哪些可用于部署和运行这些解决方案的选项非常重要。所有解决方案至少需要一个任务和一个 `JobLauncher`。你已经在之前的配方中配置了这些组件。任务将在你的\
  \ Spring 应用上下文中进行配置，稍后你会看到。从 Java 代码启动 Spring Batch 解决方案的最简单示例大约只需要五行 Java 代码（如果你已经获取了\
  \ `ApplicationContext` 的句柄，则只需三行）！\n\n```\npackage com.apress.springrecipes.springbatch;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobParameters;\n\
  import org.springframework.batch.core.JobParametersBuilder;\nimport org.springframework.batch.core.launch.JobLauncher;\n\
  import org.springframework.context.support.ClassPathXmlApplicationContext;\nimport\
  \ java.util.Date;\npublic class Main {\npublic static void main(String[] args) throws\
  \ Throwable {\nClassPathXmlApplicationContext ctx = new ClassPathXmlApplicationContext(\"\
  solution2.xml\");\nJobLauncher jobLauncher = ctx.getBean(\"jobLauncher\", JobLauncher.class);\n\
  Job job = ctx.getBean(\"myJobName\", Job.class);\nJobExecution jobExecution = jobLauncher.run(job,\
  \ new JobParameters());\n}\n}\n```\n\n如你所见，获取之前配置的 `JobLauncher` 引用，然后用它来启动一个 Job\
  \ 实例。结果会返回一个 `JobExecution`。你可以查询 `JobExecution` 以获取 Job 状态的信息，包括其退出状态和运行时状态。\n\n\
  ```\nJobExecution jobExecution = jobLauncher.run(job, jobParameters);\nBatchStatus\
  \ batchStatus = jobExecution.getStatus();\nwhile(batchStatus.isRunning()) {\nSystem.out.println(\
  \ \"Still running...\");\nThread.sleep( 10 * 1000 ); // 10 seconds\n}\n```\n\n你也可以获取\
  \ `ExitStatus`。\n\n```\nSystem.out.println( \"Exit code: \"+ jobExecution.getExitStatus().getExitCode());\n\
  ```\n\n`JobExecution` 还提供了许多其他有用的信息，例如 Job 的创建时间、开始时间、最后更新日期和结束时间——所有这些都以 `java.util.Date`\
  \ 实例的形式提供。如果你希望将 Job 与数据库关联起来，则需要 Job 实例及其 ID。\n\n```\nJobInstance jobInstance =\
  \ jobExecution.getJobInstance();\nSystem.out.println( \"job instance Id: \"+ jobInstance.getId());\n\
  ```\n\n在这个简单示例中，你使用了一个空的 `JobParameters` 实例。实际上，这只会生效一次。Spring Batch 会根据参数构建一个唯一键，并用它来唯一标识给定\
  \ Job 的不同运行实例。你将在下一个配方中详细了解如何为 Job 设置参数。\n\n#### 从 Web 应用启动\n\n从 Web 应用启动任务需要稍微不同的方法，因为客户端线程（通常是一个\
  \ HTTP 请求）通常无法等待批处理任务完成。理想的解决方案是，当从 Web 层的控制器或操作中启动任务时，任务能够异步执行，而不受客户端线程的干扰。Spring\
  \ Batch 通过使用 Spring 的 `TaskExecutor` 来支持这种场景。这需要对 `JobLauncher` 的配置进行简单更改，但 Java\
  \ 代码可以保持不变。这里，你将使用一个 `SimpleAsyncTaskExecutor`，它会生成一个执行线程并管理该线程，而不会阻塞：\n\n```\n\
  package com.apress.springrecipes.springbatch.config;\n@Configuration\n@EnableBatchProcessing\n\
  @ComponentScan(\"com.apress.springrecipes.springbatch\")\n@PropertySource(\"classpath:/batch.properties\"\
  )\npublic class BatchConfiguration {\n@Bean\npublic SimpleAsyncTaskExecutor taskExecutor()\
  \ {\nreturn new SimpleAsyncTaskExecutor();\n}\n}\n```\n\n由于你不能再使用默认设置，因此需要添加自己的\
  \ `BatchConfigurer` 实现来配置 `TaskExecutor`，并将其添加到 `SimpleJobLauncher` 中。对于此实现，你以 `DefaultBatchConfigurer`\
  \ 为参考；仅覆盖 `createJobLauncher` 方法来添加 `TaskExecutor`。\n\n\n\n```\npackage com.apress.springrecipes.springbatch.config;\n\
  import org.springframework.batch.core.configuration.annotation.DefaultBatchConfigurer;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.batch.core.launch.support.SimpleJobLauncher;\n\
  import org.springframework.core.task.TaskExecutor;\nimport org.springframework.stereotype.Component;\n\
  @Component\npublic class CustomBatchConfigurer extends DefaultBatchConfigurer {\n\
  private final TaskExecutor taskExecutor;\npublic CustomBatchConfigurer(TaskExecutor\
  \ taskExecutor) {\nthis.taskExecutor = taskExecutor;\n}\n@Override\nprotected JobLauncher\
  \ createJobLauncher() throws Exception {\nSimpleJobLauncher jobLauncher = new SimpleJobLauncher();\n\
  jobLauncher.setJobRepository(getJobRepository());\njobLauncher.setTaskExecutor(this.taskExecutor);\n\
  jobLauncher.afterPropertiesSet();\nreturn jobLauncher;\n}\n}\n```\n\n**从命令行运行**\n\
  \n另一种常见用例是从系统调度器（如 cron 或 autosys，甚至 Windows 的事件调度器）部署批处理进程。Spring Batch 提供了一个便捷类，其参数包括\
  \ XML 应用程序上下文（包含运行作业所需的一切）的名称以及作业 bean 本身的名称。还可以提供其他参数来对作业进行参数化。这些参数必须采用 `name=value`\
  \ 的形式。假设您已设置好类路径，在命令行（在 Linux/Unix 系统上）调用此类的示例如下：\n\n```\njava CommandLineJobRunner\
  \ jobs.xml hourlyReport date=`date +%m/%d/%Y time=date +%H`\n```\n\n`CommandLineJobRunner`\
  \ 甚至会返回系统错误代码（0 表示成功，1 表示失败，2 表示加载批处理作业时出现问题），以便 shell（如大多数系统调度器所使用的）能够对失败做出反应或采取相应措施。通过创建并声明一个实现\
  \ `ExitCodeMapper` 接口的顶级 bean，可以返回更复杂的返回代码，在该 bean 中，您可以指定将退出状态消息转换为基于整数的错误代码（shell\
  \ 在进程退出时会看到这些代码）的更实用的映射。\n\n**按计划运行**\n\nSpring 支持调度框架（另请参阅配方 3-22）。该框架非常适合运行 Spring\
  \ Batch。首先，让我们修改现有的应用程序上下文配置，通过使用 `@EnableScheduling` 注解并添加 `ThreadPoolTaskScheduler`\
  \ 来启用调度。\n\n```\npackage com.apress.springrecipes.springbatch.config;\n@Configuration\n\
  @EnableBatchProcessing\n@ComponentScan(\"com.apress.springrecipes.springbatch\"\
  )\n@PropertySource(\"classpath:/batch.properties\")\n@EnableScheduling\n@EnableAsync\n\
  public class BatchConfiguration {\n@Bean\npublic ThreadPoolTaskScheduler taskScheduler()\
  \ {\nThreadPoolTaskScheduler taskScheduler = new ThreadPoolTaskScheduler();\ntaskScheduler.setThreadGroupName(\"\
  batch-scheduler\");\ntaskScheduler.setPoolSize(10);\nreturn taskScheduler;\n}\n\
  }\n```\n\n这些导入启用了最简单的调度支持。前面的注解确保 `com.apress.springrecipes.springbatch` 包下的任何 bean\
  \ 都将按需进行配置和调度。调度器 bean 如下所示：\n\n```\npackage com.apress.springrecipes.springbatch.scheduler;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobExecution;\n\
  import org.springframework.batch.core.JobParameters;\nimport org.springframework.batch.core.JobParametersBuilder;\n\
  import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
  import org.springframework.stereotype.Component;\nimport java.util.Date;\n@Component\n\
  public class JobScheduler {\nprivate final JobLauncher jobLauncher;\nprivate final\
  \ Job job;\npublic JobScheduler(JobLauncher jobLauncher, Job job) {\nthis.jobLauncher\
  \ = jobLauncher;\nthis.job = job;\n}\npublic void runRegistrationsJob(Date date)\
  \ throws Throwable {\nSystem.out.println(\"Starting job at \" + date.toString());\n\
  JobParametersBuilder jobParametersBuilder = new JobParametersBuilder();\njobParametersBuilder.addDate(\"\
  date\", date);\njobParametersBuilder.addString(\"input.file\", \"registrations\"\
  );\nJobParameters jobParameters = jobParametersBuilder.toJobParameters();\nJobExecution\
  \ jobExecution = jobLauncher.run(job, jobParameters);\nSystem.out.println(\"jobExecution\
  \ finished, exit code: \" + jobExecution.getExitStatus().getExitCode());\n}\n@Scheduled(fixedDelay\
  \ = 1000 * 10)\npublic void runRegistrationsJobOnASchedule() throws Throwable {\n\
  runRegistrationsJob(new Date());\n}\n}\n```\n\n这里并没有什么特别新颖之处；这是一个很好的研究案例，展示了 Spring\
  \ 框架的不同组件如何协同工作。由于在配置类中使用了 `@ComponentScan` 注解启用了 `@Component` 注解，因此该 bean 被识别并成为应用程序上下文的一部分。`UserJob`\
  \ 类中只有一个 `Job`，也只有一个 `JobLauncher`，因此只需将它们自动装配到 bean 中即可。最后，启动批处理运行的逻辑位于 `runRegistrationsJob(java.util.Date\
  \ date)` 方法中。可以从任何地方调用此方法。此功能的唯一客户端是计划方法 `runRegistrationsJobOnASchedule`。框架将根据\
  \ `@Scheduled` 注解指定的时间线为您调用此方法。\n\n对于此类事情还有其他选择；传统上，在 Java 和 Spring 世界中，这类问题非常适合使用\
  \ Quartz。现在可能仍然如此，因为 Spring 的调度支持在设计上不如 Quartz 那样可扩展。如果您处于需要更传统、对运维友好的调度工具的环境中，当然还有像\
  \ cron、autosys 和 BMC 这样的老牌工具。\n\n**11-9. 参数化作业**\n\n**问题**\n\n前面的示例运行得足够好，但在灵活性方面还有待改进。要将批处理代码应用于其他文件，您必须编辑配置并将名称硬编码在其中。能够对批处理解决方案进行参数化将非常有帮助。\n\
  \n**解决方案**\n\n使用 `JobParameters` 对作业进行参数化，然后通过 Spring Batch 的表达式语言或 API 调用，您的步骤即可使用这些参数。\n\
  \n**工作原理**\n\n首先，您将看到如何使用 `JobParameters` 启动作业，然后您将学习如何在作业和配置中使用和访问 `JobParameters`。\n\
  \n**使用参数启动作业**\n\n作业是 `JobInstance` 的原型。`JobParameters` 用于提供一种标识作业唯一运行（即 `JobInstance`）的方式。这些\
  \ `JobParameters` 允许您向批处理过程提供输入，就像在 Java 中使用方法定义一样。您在前面的示例中已经见过 `JobParameters`，但未深入了解。`JobParameters`\
  \ 对象是在使用 `JobLauncher` 启动作业时创建的。要启动一个名为 `dailySalesFigures` 的作业，并指定作业要处理的日期，您可以编写如下代码：\n\
  \n\n\n```\npackage com.apress.springrecipes.springbatch;\nimport com.apress.springrecipes.springbatch.config.BatchConfiguration;\n\
  import org.springframework.batch.core.*;\nimport org.springframework.batch.core.launch.JobLauncher;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import java.util.Date;\npublic class Main {\npublic static void main(String[] args)\
  \ throws Throwable {\nApplicationContext context =\nnew AnnotationConfigApplicationContext(BatchConfiguration.class);\n\
  JobLauncher jobLauncher = context.getBean(JobLauncher.class);\nJob job = context.getBean(\"\
  dailySalesFigures\", Job.class);\njobLauncher.run(job, new JobParametersBuilder()\n\
  .addDate( \"date\", new Date() ).toJobParameters());\n}\n}\n```\n\n访问 JobParameters\n\
  \n从技术上讲，你可以通过任意一个 `ExecutionContext`（步骤或作业）来获取 `JobParameters`。一旦获取到，就可以通过调用 `getLong()`、`getString()`\
  \ 等方法，以类型安全的方式访问参数。一种简单的方法是绑定到 `@BeforeStep` 事件，保存 `StepExecution`，然后以这种方式遍历参数。从这里开始，你可以检查参数并对它们进行任何操作。让我们结合之前编写的\
  \ `ItemProcessor<I,O>` 来看一下。\n\n```\n// ...\nprivate StepExecution stepExecution;\n\
  @BeforeStep\npublic void saveStepExecution(StepExecution stepExecution) {\nthis.stepExecution\
  \ = stepExecution;\n}\npublic UserRegistration process(UserRegistration input) throws\
  \ Exception {\nMap params =  stepExecution.getJobParameters().getParameters();\n\
  for (String jobParameterKey : params.keySet()) {\nSystem.out.println(String.format(\"\
  %s=%s\", jobParameterKey,\nparams.get(jobParameterKey).getValue().toString()));\n\
  }\nDate date = stepExecution.getJobParameters().getDate(\"date\");\n// 等等……\n}\n\
  ```\n\n事实证明，这种方法的价值有限。在 80% 的情况下，你需要将作业启动时的参数绑定到应用程序上下文中的 Spring Bean。这些参数仅在运行时可用，而\
  \ XML 应用程序上下文中的步骤是在设计时配置的。这种情况在很多地方都会出现。之前的示例演示了带有硬编码路径的 `ItemWriters<T>` 和 `ItemReaders<T>`。除非你打算只使用一次作业，否则这种做法很难令人接受。\n\
  \nSpring 核心框架提供了一个增强的表达式语言，Spring Batch 利用它来将参数的绑定推迟到正确的时间（或者，在这种情况下，直到 Bean 处于正确的作用域）。Spring\
  \ Batch 为此目的提供了“步骤”作用域。让我们看看如何重新设计之前的示例，为 `ItemReader` 的资源使用参数化的文件名：\n\n```\n@Bean\n\
  @StepScope\npublic ItemReader csvFileReader(@Value(\"file:${user.home}/batches/#{jobParameters['input.fileName']}.csv\"\
  ) Resource input) { ... }\n```\n\n你所做的只是将 Bean（`FlatFileItemReader<T>`）的作用域限定为步骤的生命周期（此时那些\
  \ `JobParameters` 将正确解析），然后使用 EL 语法来参数化路径。\n\n总结\n\n本章向你介绍了批处理的概念、它的一些历史，以及它为何适用于现代架构。你学习了\
  \ Spring Batch（来自 SpringSource 的批处理框架），以及如何在批处理作业中使用 `ItemReader<T>` 和 `ItemWriter<T>`\
  \ 实现进行读写操作。你根据需要编写了自己的 `ItemReader<T>` 和 `ItemWriter<T>` 实现，并了解了如何控制作业中步骤的执行。\n\n\
  12. Spring 与 NoSQL\n\n大多数应用程序使用关系型数据库，如 Oracle、MySQL 或 PostgreSQL；然而，数据存储不仅仅局限于\
  \ SQL 数据库。还有：\n\n*   关系型数据库（Oracle、MySQL、PostgreSQL 等）\n*   文档存储（MongoDB、Couchbase）\n\
  *   键值存储（Redis、Volgemort）\n*   列存储（Cassandra）\n*   图存储（Neo4j、Giraph）\n\n这些技术（以及所有实现）都以不同的方式工作，因此你需要花时间学习每一种你想使用的技术。此外，你可能会觉得需要编写大量重复的样板代码来处理事务和错误转换。\n\
  \nSpring Data 项目可以帮助简化工作；它可以帮助配置不同技术的样板代码。每个集成模块都支持将异常转换为 Spring 一致的 `DataAccessException`\
  \ 层次结构，并使用 Spring 的模板方法。Spring Data 还为某些技术提供了跨存储解决方案，这意味着你的模型的一部分可以通过 JPA 存储在关系型数据库中，而另一部分可以存储在图或文档存储中。\n\
  \n提示\n\n本章的每一节都描述了如何下载和安装所需的持久化存储。然而，`bin` 目录包含了为每个持久化存储设置 Docker 容器的脚本。\n\n12-1.\
  \ 使用 MongoDB\n\n问题\n\n你想使用 MongoDB 来存储和检索文档。\n\n解决方案\n\n下载并配置 MongoDB。\n\n工作原理\n\
  \n在开始使用 MongoDB 之前，你需要安装并运行一个实例。当它运行起来后，你需要连接到它，以便能够使用数据存储进行实际存储。你将先从纯 MongoDB 如何存储和检索文档开始，然后逐步过渡到\
  \ Spring Data MongoDB，最后以响应式版本的仓库结束。\n\n下载并启动 MongoDB\n\n从 [`www.mongodb.org`](http://www.mongodb.org)\
  \ 下载 MongoDB。选择适用于当前系统的版本，并按照手册（[`http://docs.mongodb.org/manual/installation/`](http://docs.mongodb.org/manual/installation/)）中的安装说明进行操作。安装完成后，即可启动\
  \ MongoDB。要启动 MongoDB，请在命令行中执行 `mongodb` 命令（见图 12-1）。这将在 27017 端口上启动一个 MongoDB 服务器。如果需要不同的端口，可以在启动服务器时在命令行中指定\
  \ `--port` 选项。\n\n![A314861_4_En_12_Fig1_HTML.jpg](img/A314861_4_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1.\n\nMongoDB 初始启动后的输出\n\n存储数据的默认位置是 `\\data\\db`（对于 Windows 用户，这是从安装 MongoDB\
  \ 的磁盘根目录开始！）。要更改路径，请在命令行中使用 `--dbpath` 选项。确保该目录存在并且对 MongoDB 可写。\n\n连接到 MongoDB\n\
  \n要连接到 MongoDB，你需要一个 Mongo 实例。你可以使用此实例来获取要使用的数据库以及实际的底层集合（或多个集合）。让我们创建一个使用 MongoDB\
  \ 创建存储对象的小型系统。\n\n```\npackage com.apress.springrecipes.nosql;\npublic class Vehicle\
  \ {\nprivate String vehicleNo;\nprivate String color;\nprivate int wheel;\nprivate\
  \ int seat;\npublic Vehicle() {\n}\npublic Vehicle(String vehicleNo, String color,\
  \ int wheel, int seat) {\nthis.vehicleNo = vehicleNo;\nthis.color = color;\nthis.wheel\
  \ = wheel;\nthis.seat = seat;\n}\n/// 为简洁起见，省略了 Getter 和 Setter 方法。\n}\n```\n\n\
  为了处理这个对象，创建一个仓库接口。\n\n```\npackage com.apress.springrecipes.nosql;\npublic interface\
  \ VehicleRepository {\nlong count();\nvoid save(Vehicle vehicle);\nvoid delete(Vehicle\
  \ vehicle);\nList findAll()\nVehicle findByVehicleNo(String vehicleNo);\n}\n```\n\
  \n对于 MongoDB，创建 `VehicleRepository` 的 `MongoDBVehicleRepository` 实现。\n\n\n\n```\n\
  package com.apress.springrecipes.nosql;\nimport com.mongodb.*;\nimport java.util.ArrayList;\n\
  import java.util.List;\npublic class MongoDBVehicleRepository implements VehicleRepository\
  \ {\nprivate final Mongo mongo;\nprivate final String collectionName;\nprivate final\
  \ String databaseName;\npublic MongoDBVehicleRepository(Mongo mongo, String databaseName,\
  \ String collectionName) {\nthis.mongo = mongo;\nthis.databaseName=databaseName;\n\
  this.collectionName = collectionName;\n}\n@Override\npublic long count() {\nreturn\
  \ getCollection().count();\n}\n@Override\npublic void save(Vehicle vehicle) {\n\
  BasicDBObject query = new BasicDBObject(\"vehicleNo\", vehicle.getVehicleNo());\n\
  DBObject dbVehicle = transform(vehicle);\nDBObject fromDB = getCollection().findAndModify(query,\
  \ dbVehicle);\nif (fromDB == null) {\ngetCollection().insert(dbVehicle);\n}\n}\n\
  @Override\npublic void delete(Vehicle vehicle) {\nBasicDBObject query = new BasicDBObject(\"\
  vehicleNo\", vehicle.getVehicleNo());\ngetCollection().remove(query);\n}\n@Override\n\
  public List findAll() {\nDBCursor cursor = getCollection().find(null);\nList vehicles\
  \ = new ArrayList(cursor.size());\nfor (DBObject dbObject : cursor) {\nvehicles.add(transform(dbObject));\n\
  }\nreturn vehicles;\n}\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo)\
  \ {\nBasicDBObject query = new BasicDBObject(\"vehicleNo\", vehicleNo);\nDBObject\
  \ dbVehicle = getCollection().findOne(query);\nreturn transform(dbVehicle);\n}\n\
  private DBCollection getCollection() {\nreturn mongo.getDB(databaseName).getCollection(collectionName);\n\
  }\nprivate Vehicle transform(DBObject dbVehicle) {\nreturn new Vehicle(\n(String)\
  \ dbVehicle.get(\"vehicleNo\"),\n(String) dbVehicle.get(\"color\"),\n(int) dbVehicle.get(\"\
  wheel\"),\n(int) dbVehicle.get(\"seat\"));\n}\nprivate DBObject transform(Vehicle\
  \ vehicle) {\nBasicDBObject dbVehicle = new BasicDBObject(\"vehicleNo\", vehicle.getVehicleNo())\n\
  .append(\"color\", vehicle.getColor())\n.append(\"wheel\", vehicle.getWheel())\n\
  .append(\"seat\", vehicle.getSeat());\nreturn dbVehicle;\n}\n}\n```\n\n首先请注意，构造函数接受三个参数。第一个是实际的\
  \ MongoDB 客户端，第二个是要使用的数据库名称，最后一个是存储对象的集合名称。MongoDB 中的文档存储在集合中，而集合属于某个数据库。\n\n为了方便访问所使用的\
  \ `DBCollection`，提供了 `getCollection` 方法，该方法获取与数据库的连接并返回配置好的 `DBCollection`。然后可以使用这个\
  \ `DBCollection` 来执行诸如存储、删除或更新文档等操作。\n\n`save` 方法会首先尝试更新现有文档。如果更新失败，则会为给定的 `Vehicle`\
  \ 创建一个新文档。为了存储对象，首先将领域对象 `Vehicle` 转换为 `DBObject`，在本例中是一个 `BasicDBObject`。`BasicDBObject`\
  \ 接收 `Vehicle` 对象不同属性的键值对。当查询文档时，会使用相同的 `DBObject`，并且使用该对象中存在的键值对来查找文档；你可以在仓库的 `findByVehicleNo`\
  \ 方法中找到一个示例。与 `Vehicle` 对象之间的转换通过两个 `transform` 方法完成。\n\n要使用这个类，请创建以下 `Main` 类：\n\
  \n```\npackage com.apress.springrecipes.nosql;\nimport com.mongodb.MongoClient;\n\
  import java.util.List;\npublic class Main {\npublic static final String DB_NAME\
  \ = \"vehicledb\";\npublic static void main(String[] args) throws Exception {\n\
  // 默认的本地主机和端口 27017 的 MongoDB 客户端\nMongoClient mongo = new MongoClient();\nVehicleRepository\
  \ repository = new MongoDBVehicleRepository(mongo, DB_NAME, \"vehicles\");\nSystem.out.println(\"\
  车辆数量: \" + repository.count());\nrepository.save(new Vehicle(\"TEM0001\", \"RED\"\
  , 4, 4));\nrepository.save(new Vehicle(\"TEM0002\", \"RED\", 4, 4));\nSystem.out.println(\"\
  车辆数量: \" + repository.count());\nVehicle v = repository.findByVehicleNo(\"TEM0001\"\
  );\nSystem.out.println(v);\nList vehicleList = repository.findAll();\nSystem.out.println(\"\
  车辆数量: \" + vehicleList.size());\nvehicleList.forEach(System.out::println);\nSystem.out.println(\"\
  车辆数量: \" + repository.count());\n// 清理并关闭\nmongo.dropDatabase(DB_NAME);\nmongo.close();\n\
  }\n}\n```\n\n主类构造了一个 `MongoClient` 实例，该实例将尝试连接到本地主机上 MongoDB 实例的 27017 端口。如果需要其他端口或主机，还有一个接受主机和端口作为参数的构造函数：`new\
  \ MongoClient(\"mongodb-server.local\", 28018)`。接下来，构造一个 `MongoDBVehicleRepository`\
  \ 类的实例；传入之前构造的 `MongoClient`、数据库名称（即 `vehicledb`）以及集合名称（即 `vehicles`）。\n\n接下来的几行代码将向数据库中插入两辆车，尝试查找它们，最后删除它们。`Main`\
  \ 类中的最后几行将关闭 `MongoClient`，并在关闭之前删除数据库。在使用生产数据库时，后者是你不想做的事情。\n\n使用 Spring 进行配置\n\
  \n`MongoClient` 和 `MongoDBVehicleRepository` 的设置与配置可以轻松地迁移到 Spring 配置中。\n\n```\n\
  package com.apress.springrecipes.nosql.config;\nimport com.apress.springrecipes.nosql.MongoDBVehicleRepository;\n\
  import com.apress.springrecipes.nosql.VehicleRepository;\nimport com.mongodb.Mongo;\n\
  import com.mongodb.MongoClient;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport java.net.UnknownHostException;\n\
  @Configuration\npublic class MongoConfiguration {\npublic static final String DB_NAME\
  \ = \"vehicledb\";\n@Bean\npublic Mongo mongo() throws UnknownHostException {\n\
  return new MongoClient();\n}\n@Bean\npublic VehicleRepository vehicleRepository(Mongo\
  \ mongo) {\nreturn new MongoDBVehicleRepository(mongo, DB_NAME, \" vehicles\");\n\
  }\n}\n```\n\n以下带有 `@PreDestroy` 注解的方法已添加到 `MongoDBVehicleRepository` 中，用于处理数据库的清理工作。\n\
  \n```\n@PreDestroy\npublic void cleanUp() {\nmongo.dropDatabase(databaseName);\n\
  }\n```\n\n最后，需要更新 `Main` 程序以反映这些更改。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  ...\nimport org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.context.support.AbstractApplicationContext;\nimport java.util.List;\n\
  public class Main {\npublic static final String DB_NAME = \"vehicledb\";\npublic\
  \ static void main(String[] args) throws Exception {\nApplicationContext ctx =\n\
  new AnnotationConfigApplicationContext(MongoConfiguration.class);\nVehicleRepository\
  \ repository = ctx.getBean(VehicleRepository.class);\n...\n((AbstractApplicationContext)\
  \ ctx).close();\n}\n}\n```\n\n配置由 `AnnotationConfigApplicationContext` 加载。从这个上下文中，获取\
  \ `VehicleRepository` bean 并用于执行操作。当运行上下文的代码关闭时，会触发 `MongoDBVehicleRepository` 中的\
  \ `cleanUp` 方法。\n\n使用 MongoTemplate 简化 MongoDB 代码\n\n\n\n目前，`MongoDBVehicleRepository`\
  \ 类使用的是普通的 MongoDB API。虽然它并不复杂，但仍需要了解该 API。此外，还存在一些重复性任务，例如与 `Vehicle` 对象之间的映射转换。使用\
  \ `MongoTemplate` 可以大大简化该仓库。\n\n注意\n\n在使用 Spring Data Mongo 之前，需要将相关的 JAR 包添加到类路径中。如果使用\
  \ Maven，请添加以下依赖：\n\n```\norg.springframework.data\nspring-data-mongodb\n1.10.1.RELEASE\n\
  \n```\n\n如果使用 Gradle，请使用以下配置：\n\n```\ncompile 'org.springframework.data:spring-data-mongodb:1.10.1.RELEASE'\n\
  ```\n\n```\npackage com.apress.springrecipes.nosql;\nimport org.springframework.data.mongodb.core.MongoTemplate;\n\
  import org.springframework.data.mongodb.core.query.Query;\nimport javax.annotation.PreDestroy;\n\
  import java.util.List;\nimport static org.springframework.data.mongodb.core.query.Criteria.where;\n\
  public class MongoDBVehicleRepository implements VehicleRepository {\nprivate final\
  \ MongoTemplate mongo;\nprivate final String collectionName;\npublic MongoDBVehicleRepository(MongoTemplate\
  \ mongo, String collectionName) {\nthis.mongo = mongo;\nthis.collectionName = collectionName;\n\
  }\n@Override\npublic long count() {\nreturn mongo.count(null, collectionName);\n\
  }\n@Override\npublic void save(Vehicle vehicle) {\nmongo.save(vehicle, collectionName);\n\
  }\n@Override\npublic void delete(Vehicle vehicle) {\nmongo.remove(vehicle, collectionName);\n\
  }\n@Override\npublic List findAll() {\nreturn mongo.findAll(Vehicle.class, collectionName);\n\
  }\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\nreturn mongo.findOne(new\
  \ Query(where(\"vehicleNo\").is(vehicleNo)), Vehicle.class, collectionName);\n}\n\
  @PreDestroy\npublic void cleanUp() {\nmongo.execute(db -> {\ndb.drop();\nreturn\
  \ null;\n});\n}\n}\n```\n\n使用 `MongoTemplate` 后，代码看起来简洁得多。它几乎为所有操作都提供了便捷方法：`save`、`update`\
  \ 和 `delete`。此外，它还提供了一种优雅的查询构建器方式（参见 `findByVehicleNo` 方法）。不再需要与 MongoDB 类进行映射转换，因此也无需再创建\
  \ `DBObject`。这个负担现在由 `MongoTemplate` 处理。为了将 `Vehicle` 对象转换为 MongoDB 类，会使用 `MongoConverter`。默认情况下，使用的是\
  \ `MappingMongoConverter`。这个映射器会将属性映射到属性名称，反之亦然，同时还会尝试进行正确的数据类型转换。如果需要特定的映射，可以编写自己的\
  \ `MongoConverter` 实现，并将其注册到 `MongoTemplate` 中。\n\n由于使用了 `MongoTemplate`，配置也需要进行修改。\n\
  \n```\npackage com.apress.springrecipes.nosql.config;\nimport com.apress.springrecipes.nosql.MongoDBVehicleRepository;\n\
  import com.apress.springrecipes.nosql.VehicleRepository;\nimport com.mongodb.Mongo;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.mongodb.core.MongoClientFactoryBean;\nimport org.springframework.data.mongodb.core.MongoTemplate;\n\
  @Configuration\npublic class MongoConfiguration {\npublic static final String DB_NAME\
  \ = \"vehicledb\";\n@Bean\npublic MongoTemplate mongo(Mongo mongo) throws Exception\
  \ {\nreturn new MongoTemplate(mongo, DB_NAME);\n}\n@Bean\npublic MongoClientFactoryBean\
  \ mongoFactoryBean() {\nreturn new MongoClientFactoryBean();\n}\n@Bean\npublic VehicleRepository\
  \ vehicleRepository(MongoTemplate mongo) {\nreturn new MongoDBVehicleRepository(mongo,\
  \ \"vehicles\");\n}\n}\n```\n\n注意 `MongoClientFactoryBean` 的使用。它使得 `MongoClient`\
  \ 的配置变得简单。虽然使用 `MongoTemplate` 并非必须使用它，但它确实让客户端配置更加容易。另一个好处是，不再会抛出 `java.net.UnknownHostException`，该异常已由\
  \ `MongoClientFactoryBean` 内部处理。\n\n`MongoTemplate` 有多种构造函数。这里使用的构造函数接受一个 `Mongo`\
  \ 实例和要使用的数据库名称。为了解析数据库，会使用 `MongoDbFactory` 的实例；默认情况下，使用的是 `SimpleMongoDbFactory`。在大多数情况下，这已经足够了，但如果出现特殊情况，例如加密连接，扩展默认实现也非常容易。最后，`MongoTemplate`\
  \ 与集合名称一起被注入到 `MongoDBVehicleRepository` 中。\n\n还需要对 `Vehicle` 对象进行最后的补充。需要有一个字段来存储生成的\
  \ ID。这个字段可以是名为 `id` 的字段，也可以是带有 `@Id` 注解的字段。\n\n```\npublic class Vehicle {\nprivate\
  \ String id;\n...\n}\n```\n\n使用注解指定映射信息\n\n目前，`MongoDBVehicleRepository` 需要知道要访问的集合名称。如果能在\
  \ `Vehicle` 对象上指定这个信息，就像 JPA 的 `@Table` 注解那样，会更简单、更灵活。使用 Spring Data Mongo，可以通过\
  \ `@Document` 注解实现这一点。\n\n```\npackage com.apress.springrecipes.nosql;\nimport org.springframework.data.mongodb.core.mapping.Document;\n\
  @Document(collection = \"vehicles\")\npublic class Vehicle { ... }\n```\n\n`@Document`\
  \ 注解可以接受两个属性：`collection` 和 `language`。`collection` 属性用于指定要使用的集合名称，`language` 属性用于指定此对象的语言。现在，映射信息已经放在\
  \ `Vehicle` 类上，因此可以从 `MongoDBVehicleRepository` 中移除集合名称。\n\n```\npublic class MongoDBVehicleRepository\
  \ implements VehicleRepository {\nprivate final MongoTemplate mongo;\npublic MongoDBVehicleRepository(MongoTemplate\
  \ mongo) {\nthis.mongo = mongo;\n}\n@Override\npublic long count() {\nreturn mongo.count(null,\
  \ Vehicle.class);\n}\n@Override\npublic void save(Vehicle vehicle) {\nmongo.save(vehicle);\n\
  }\n@Override\npublic void delete(Vehicle vehicle) {\nmongo.remove(vehicle);\n}\n\
  @Override\npublic List findAll() {\nreturn mongo.findAll(Vehicle.class);\n}\n@Override\n\
  public Vehicle findByVehicleNo(String vehicleNo) {\nreturn mongo.findOne(new Query(where(\"\
  vehicleNo\").is(vehicleNo)), Vehicle.class);\n}\n}\n```\n\n当然，也可以从 `MongoDBVehicleRepository`\
  \ 的配置中移除集合名称。\n\n```\n@Configuration\npublic class MongoConfiguration {\n...\n@Bean\n\
  public VehicleRepository vehicleRepository(MongoTemplate mongo) {\nreturn new MongoDBVehicleRepository(mongo);\n\
  }\n}\n```\n\n运行 `Main` 类时，结果应该与之前相同。\n\n创建 Spring Data MongoDB 仓库\n\n尽管代码已经大大减少，不再需要与\
  \ MongoDB 类进行映射转换，也不再需要传递集合名称，但它还可以进一步精简。利用 Spring Data Mongo 的另一个特性，可以完全移除 `MongoDBVehicleRepository`\
  \ 的完整实现。\n\n首先需要修改配置。\n\n```\npackage com.apress.springrecipes.nosql.config;\nimport\
  \ com.mongodb.Mongo;\nimport org.springframework.context.annotation.Bean;\nimport\
  \ org.springframework.context.annotation.Configuration;\nimport org.springframework.data.mongodb.core.MongoClientFactoryBean;\n\
  import org.springframework.data.mongodb.core.MongoTemplate;\nimport org.springframework.data.mongodb.repository.config.EnableMongoRepositories;\n\
  @Configuration\n@EnableMongoRepositories(basePackages = \"com.apress.springrecipes.nosql\"\
  )\npublic class MongoConfiguration {\npublic static final String DB_NAME = \"vehicledb\"\
  ;\n@Bean\npublic MongoTemplate mongoTemplate(Mongo mongo) throws Exception {\nreturn\
  \ new MongoTemplate(mongo, DB_NAME);\n}\n@Bean\npublic MongoClientFactoryBean mongoFactoryBean()\
  \ {\nreturn new MongoClientFactoryBean();\n}\n}\n```\n\n\n\n首先，请注意移除了构建 `MongoDBVehicleRepository`\
  \ 的 `@Bean` 方法。\n其次，请注意新增了 `@EnableMongoRepositories` 注解。该注解用于启用对扩展了 Spring Data\
  \ `CrudRepository` 且用于标注了 `@Document` 的领域对象的接口的检测。\n\n为了让 Spring Data 检测到你的 `VehicleRepository`，你需要让它扩展\
  \ `CrudRepository` 或其子接口之一，例如 `MongoRepository`。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.springframework.data.mongodb.repository.MongoRepository;\npublic interface\
  \ VehicleRepository extends MongoRepository {\npublic Vehicle findByVehicleNo(String\
  \ vehicleNo);\n}\n```\n\n你可能会疑惑所有的方法都去哪了。它们已经在父接口中定义好了，因此可以从这个接口中移除。`findByVehicleNo`\
  \ 方法仍然保留。该方法仍将用于通过 `vehicleNo` 属性查找 `Vehicle` 对象。所有 `findBy` 方法都会被转换为 MongoDB 查询。`findBy`\
  \ 之后的部分被解释为属性名称。还可以使用不同的操作符（例如 `and`、`or` 和 `between`）编写更复杂的查询。\n\n现在再次运行 `Main`\
  \ 类，应该仍然会得到相同的输出；然而，实际编写的用于操作 MongoDB 的代码已经最小化了。\n\n创建响应式 Spring Data MongoDB 仓库\n\
  \n除了创建传统的 MongoDB 仓库，还可以创建一个响应式仓库，这通过扩展 `ReactiveMongoRepository` 类（或其他响应式仓库接口之一）来实现。这将把返回单个值的方法的返回类型改为\
  \ `Mono<T>`（对于无返回值的方法则为 `Mono<Void>`），并将返回零个或多个元素的方法的返回类型改为 `Flux<T>`。\n\n注意\n\n\
  如果你想使用 RxJava 而不是 Project Reactor，请扩展 `RxJava2*Repository` 接口之一，并使用 `Single` 或 `Observable`\
  \ 代替 `Mono` 和 `Flux`。\n\n为了能够使用响应式仓库实现，你首先必须使用 MongoDB 驱动程序的响应式实现，并配置 Spring Data\
  \ 使用该驱动程序。为了简化操作，你可以扩展 `AbstractReactiveMongoConfiguration` 并实现两个必需的方法：`getDatabaseName`\
  \ 和 `mongoClient`。\n\n```\n@Configuration\n@EnableReactiveMongoRepositories(basePackages\
  \ = \"com.apress.springrecipes.nosql\")\npublic class MongoConfiguration extends\
  \ AbstractReactiveMongoConfiguration {\npublic static final String DB_NAME = \"\
  vehicledb\";\n@Bean\n@Override\npublic MongoClient reactiveMongoClient() {\nreturn\
  \ MongoClients.create();\n}\n@Override\nprotected String getDatabaseName() {\nreturn\
  \ DB_NAME;\n}\n}\n```\n\n另一个变化是使用了 `@EnableReactiveMongoRepositories` 而不是 `@EnableMongoRepositories`。数据库名称仍然是必需的，并且你需要使用响应式驱动程序连接到\
  \ MongoDB 实例。为此，你可以使用 `MongoClients.create` 方法之一；这里你可以简单地使用默认方法。\n\n接下来，将 `VehicleRepository`\
  \ 改为扩展 `ReactiveMongoRepository`，使其成为响应式仓库；你还需要将 `findByVehicleNo` 方法的返回类型改为 `Mono<Vehicle>`\
  \ 而不是普通的 `Vehicle`。\n\n```\npackage com.apress.springrecipes.nosql;\nimport org.springframework.data.mongodb.repository.ReactiveMongoRepository;\n\
  import reactor.core.publisher.Mono;\npublic interface VehicleRepository extends\
  \ ReactiveMongoRepository {\nMono findByVehicleNo(String vehicleNo);\n}\n```\n\n\
  最后需要修改的部分是用于测试这一切的 `Main` 类。你希望使用一系列被调用的方法，而不是阻塞调用。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import com.apress.springrecipes.nosql.config.MongoConfiguration;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.context.support.AbstractApplicationContext;\nimport reactor.core.publisher.Flux;\n\
  import java.util.concurrent.CountDownLatch;\npublic class Main {\npublic static\
  \ void main(String[] args) throws Exception {\nApplicationContext ctx =\nnew AnnotationConfigApplicationContext(MongoConfiguration.class);\n\
  VehicleRepository repository = ctx.getBean(VehicleRepository.class);\nCountDownLatch\
  \ countDownLatch = new CountDownLatch(1);\nrepository.count().doOnSuccess(cnt ->\
  \ System.out.println(\"Number of Vehicles: \" + cnt))\n.thenMany(repository.saveAll(\n\
  Flux.just(\nnew Vehicle(\"TEM0001\", \"RED\", 4, 4),\nnew Vehicle(\"TEM0002\", \"\
  RED\", 4, 4)))).last()\n.then(repository.count()).doOnSuccess(cnt -> System.out.println(\"\
  Number of Vehicles: \" + cnt))\n.then(repository.findByVehicleNo(\"TEM0001\")).doOnSuccess(System.out::println)\n\
  .then(repository.deleteAll())\n.doOnSuccess(x -> countDownLatch.countDown())\n.doOnError(t\
  \ -> countDownLatch.countDown())\n.then(repository.count()).subscribe(cnt -> System.out.println(\"\
  Number of Vehicles: \" + cnt.longValue()));\ncountDownLatch.await();\n((AbstractApplicationContext)\
  \ ctx).close();\n}\n}\n```\n\n流程从计数开始，当计数成功时，`Vehicle` 实例被放入 MongoDB。当 `last()`\
  \ 车辆被添加后，再次进行计数，接着是一个查询，随后是 `deleteAll`。所有这些方法都以响应式的方式一个接一个地被调用，由事件触发。因为你不想使用 `block()`\
  \ 方法进行阻塞，所以使用 `CountDownLatch` 等待代码执行，计数器在删除所有记录后递减，之后程序将继续执行。诚然，这仍然是阻塞的。当在完整的响应式栈中使用时，你可能会从最后一个\
  \ `then` 返回 `Mono` 并进行进一步组合，或者将输出交给 Spring WebFlux 控制器（参见第 5 章）。\n\n12-2. 使用 Redis\n\
  \n问题\n\n你想利用 Redis 存储数据。\n\n解决方案\n\n下载并安装 Redis，然后使用 Spring 和 Spring Data 访问 Redis\
  \ 实例。\n\n工作原理\n\nRedis 是一个键值缓存或存储，它只保存简单的数据类型，例如字符串和哈希。当存储更复杂的数据结构时，需要与该数据结构进行相互转换。\n\
  \n下载并启动 Redis\n\n你可以从 [`http://redis.io/download`](http://redis.io/download) 下载\
  \ Redis 源码。在撰写本文时，版本 3.2.8 是最新发布的稳定版本。你可以在 [`https://github.com/MSOpenTech/redis/releases`](https://github.com/MSOpenTech/redis/releases)\
  \ 找到适用于 Windows 的编译版本。官方下载站点只提供 Unix 二进制文件。Mac 用户可以使用 Homebrew（ [`http://brew.sh`](http://brew.sh)\
  \ ）安装 Redis。\n\n下载并安装 Redis 后，使用命令行中的 `redis-server` 命令启动它。启动后，输出应类似于图 12-2 所示。它将输出进程\
  \ ID（PID）和它监听的端口号（默认为 6379）。\n\n![A314861_4_En_12_Fig2_HTML.jpg](img/A314861_4_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2.\n\n启动 Redis 后的输出\n\n连接到 Redis\n\n为了能够连接到 Redis，需要一个客户端，就像需要 JDBC 驱动程序来连接数据库一样。有多个客户端可用。你可以在\
  \ Redis 网站（ [`http://redis.io/clients`](http://redis.io/clients) ）上找到完整列表。在本示例中，将使用\
  \ Jedis 客户端，因为它非常活跃并且被 Redis 团队推荐。\n\n让我们从一个简单的 Hello World 示例开始，看看是否能够建立与 Redis\
  \ 的连接。\n\n\n```content\n```\npackage com.apress.springrecipes.nosql;\nimport redis.clients.jedis.Jedis;\n\
  public class Main {\npublic static void main(String[] args) {\nJedis jedis = new\
  \ Jedis(\"localhost\");\njedis.set(\"msg\", \"Hello World, from Redis!\");\nSystem.out.println(jedis.get(\"\
  msg\"));\n}\n}\n```\n\n创建一个 Jedis 客户端，并传入要连接的主机名，此处为 `localhost`。Jedis 客户端的 `set`\
  \ 方法会将一条消息存入存储中，而 `get` 方法则可再次检索该消息。除了简单对象，你还可以让 Redis 模拟 `List` 或 `Map`。\n\n```\n\
  package com.apress.springrecipes.nosql;\nimport redis.clients.jedis.Jedis;\npublic\
  \ class Main {\npublic static void main(String[] args) {\nJedis jedis = new Jedis(\"\
  localhost\");\njedis.rpush(\"authors\", \"Marten Deinum\", \"Josh Long\", \"Daniel\
  \ Rubio\", \"Gary Mak\");\nSystem.out.println(\"Authors: \" + jedis.lrange(\"authors\"\
  ,0,-1));\njedis.hset(\"sr_3\", \"authors\", \"Gary Mak, Danial Rubio, Josh Long,\
  \ Marten Deinum\");\njedis.hset(\"sr_3\", \"published\", \"2014\");\njedis.hset(\"\
  sr_4\", \"authors\", \"Josh Long, Marten Deinum\");\njedis.hset(\"sr_4\", \"published\"\
  , \"2017\");\nSystem.out.println(\"Spring Recipes 3rd: \" + jedis.hgetAll(\"sr_3\"\
  ));\nSystem.out.println(\"Spring Recipes 4th: \" + jedis.hgetAll(\"sr_4\"));\n}\n\
  }\n```\n\n通过 `rpush` 和 `lpush`，你可以向 `List` 中添加元素。`rpush` 将元素添加到列表末尾，而 `lpush` 则添加到列表开头。要检索这些元素，可以使用\
  \ `lrange` 或 `rrange` 方法。`lrange` 从左侧开始，接受起始索引和结束索引。示例中使用了 `-1`，表示所有元素。\n\n要向 `Map`\
  \ 中添加元素，请使用 `hset`。该方法接受一个 `key`、一个 `field` 和一个 `value`。另一种选择是使用 `hmset`（多重集合），它接受一个\
  \ `Map<String, String>` 或 `Map<byte[], byte[]>` 作为参数。\n\n使用 Redis 存储对象\n\nRedis\
  \ 是一个键值存储系统，只能处理 `String` 或 `byte[]` 类型，键也是如此。因此，在 Redis 中存储对象并不像其他技术那样直接。对象在存储前需要序列化为\
  \ `String` 或 `byte[]`。\n\n让我们复用配方 12-1 中的 `Vehicle` 类，并使用 Jedis 客户端进行存储和检索。\n\n\
  ```\npackage com.apress.springrecipes.nosql;\nimport java.io.Serializable;\npublic\
  \ class Vehicle implements Serializable{\nprivate String vehicleNo;\nprivate String\
  \ color;\nprivate int wheel;\nprivate int seat;\npublic Vehicle() {\n}\npublic Vehicle(String\
  \ vehicleNo, String color, int wheel, int seat) {\nthis.vehicleNo = vehicleNo;\n\
  this.color = color;\nthis.wheel = wheel;\nthis.seat = seat;\n}\n// getters/setters\
  \ omitted\n}\n```\n\n注意 `Vehicle` 类实现了 `Serializable` 接口。这是为了使对象在 Java 中可序列化。在存储对象之前，需要将其转换为\
  \ Java 中的 `byte[]`。`ObjectOutputStream` 可以写入对象，而 `ByteArrayOutputStream` 可以写入 `byte[]`。要将\
  \ `byte[]` 再次转换为对象，`ObjectInputStream` 和 `ByteArrayInputStream` 会有所帮助。Spring 为此提供了一个辅助类\
  \ `org.springframework.util.SerializationUtils`，它提供了 `serialize` 和 `deserialize`\
  \ 方法。\n\n现在，在 `Main` 类中，让我们创建一个 `Vehicle` 并使用 Jedis 存储它。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.springframework.util.SerializationUtils;\nimport redis.clients.jedis.Jedis;\n\
  public class Main {\npublic static void main(String[] args) throws Exception {\n\
  Jedis jedis = new Jedis(\"localhost\");\nfinal String vehicleNo = \"TEM0001\";\n\
  Vehicle vehicle = new Vehicle(vehicleNo, \"RED\", 4,4);\njedis.set(vehicleNo.getBytes(),\
  \ SerializationUtils.serialize(vehicle));\nbyte[] vehicleArray = jedis.get(vehicleNo.getBytes());\n\
  System.out.println(\"Vehicle: \" + SerializationUtils.deserialize(vehicleArray));\n\
  }\n}\n```\n\n首先，创建一个 `Vehicle` 实例。接着，使用前面提到的 `SerializationUtils` 将对象转换为 `byte[]`。当存储\
  \ `byte[]` 时，键也必须是 `byte[]`；因此，这里的键 `vehicleNo` 也需要转换。最后，使用相同的键从存储中读取序列化对象，并将其再次转换回对象。这种方法的缺点是，每个存储的对象都需要实现\
  \ `Serializable` 接口。如果未实现，对象可能会丢失，或者在序列化过程中发生错误。此外，`byte[]` 是类的表示形式。如果此类发生更改，将其转换回对象很可能会失败。\n\
  \n另一种选择是使用对象的 `String` 表示形式。将 `Vehicle` 对象转换为 XML 或 JSON，这比 `byte[]` 更灵活。让我们看看如何使用优秀的\
  \ Jackson JSON 库将对象转换为 JSON：\n\n```\npackage com.apress.springrecipes.nosql;\nimport\
  \ com.fasterxml.jackson.databind.ObjectMapper;\nimport redis.clients.jedis.Jedis;\n\
  public class Main {\npublic static void main(String[] args) throws Exception {\n\
  Jedis jedis = new Jedis(\"localhost\");\nObjectMapper mapper = new ObjectMapper();\n\
  final String vehicleNo = \"TEM0001\";\nVehicle vehicle = new Vehicle(vehicleNo,\
  \ \"RED\", 4,4);\njedis.set(vehicleNo, mapper.writeValueAsString(vehicle));\nString\
  \ vehicleString = jedis.get(vehicleNo);\nSystem.out.println(\"Vehicle: \" + mapper.readValue(vehicleString,\
  \ Vehicle.class));\n}\n}\n```\n\n首先，需要一个 `ObjectMapper` 实例。该对象用于与 JSON 之间的相互转换。写入时，使用\
  \ `writeValueAsString` 方法，它会将对象转换为 JSON `String`。然后将此 `String` 存储在 Redis 中。接着，再次读取该\
  \ `String` 并将其传递给 `ObjectMapper` 的 `readValue` 方法。根据类型参数（此处为 `Vehicle.class`），构造一个对象，并将\
  \ JSON 映射到给定类的实例。\n\n使用 Redis 存储对象并不直接，有些人认为这不是 Redis 的预期用途（存储复杂的对象结构）。\n\n配置并使用\
  \ RedisTemplate\n\n根据用于连接 Redis 的客户端库，使用 Redis API 的难度可能有所不同。为了统一这一点，引入了 `RedisTemplate`。它可以与大多数现有的\
  \ Redis Java 客户端配合使用。除了提供统一的方法外，它还负责将任何异常转换为 Spring 的 `DataAccessException` 层次结构。这使其能够与任何现有的数据访问方式良好集成，并允许使用\
  \ Spring 的事务支持。\n\n`RedisTemplate` 需要一个 `RedisConnectionFactory` 来获取连接。`RedisConnectionFactory`\
  \ 是一个接口，有多个实现可用。在这种情况下，需要 `JedisConnectionFactory`。\n\n```\npackage com.apress.springrecipes.nosql.config;\n\
  import com.apress.springrecipes.nosql.Vehicle;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.redis.connection.RedisConnectionFactory;\n\
  import org.springframework.data.redis.connection.jedis.JedisConnectionFactory;\n\
  import org.springframework.data.redis.core.RedisTemplate;\n@Configuration\npublic\
  \ class RedisConfig {\n@Bean\npublic RedisTemplate redisTemplate(RedisConnectionFactory\
  \ connectionFactory) {\nRedisTemplate template = new RedisTemplate();\ntemplate.setConnectionFactory(connectionFactory);\n\
  return template;\n}\n@Bean\npublic RedisConnectionFactory redisConnectionFactory()\
  \ {\nreturn new JedisConnectionFactory();\n}\n}\n```\n```\n\n\n请注意 `redisTemplate`\
  \ Bean 方法的返回类型。`RedisTemplate` 是一个泛型类，需要指定键和值的类型。在此例中，`String` 是键的类型，`Vehicle` 是值的类型。在存储和检索对象时，`RedisTemplate`\
  \ 会负责转换工作。转换通过 `RedisSerializer` 接口完成，该接口有多种实现（见表 12-1）。默认的 `RedisSerializer` 是\
  \ `JdkSerializationRedisSerializer`，它使用标准 Java 序列化将对象转换为 `byte[]` 并还原。\n\n表 12-1.\n\
  \n默认的 RedisSerializer\n实现\n\n名称\n |\n  描述\n |\n\n| --- | --- | --- | --- | --- |\n\
  \n`GenericToStringSerializer`\n |\n  `String` 到 `byte[]` 的序列化器；\n在转换为 `byte[]` 之前，使用\
  \ Spring 的 `ConversionService` 将对象转换为 `String`\n |\n\n`Jackson2JsonRedisRedisSerializer`\n\
  \ |\n  使用 Jackson 2 的 `ObjectMapper` 读写 JSON\n |\n\n`JacksonJsonRedisRedisSerializer`\n\
  \ |\n  使用 Jackson 的 `ObjectMapper` 读写 JSON\n |\n\n`JdkSerializationRedisSerializer`\n\
  \ |\n  使用默认的 Java 序列化和反序列化，是默认使用的实现\n |\n\n`OxmSerializer` \n |\n  使用 Spring 的 `Marshaller`\
  \ 和 `Unmarshaller` 读写 XML\n |\n\n`StringRedisSerializer`\n |\n  简单的 `String` 到 `byte[]`\
  \ 转换器\n |\n\n为了能够使用 `RedisTemplate`，需要修改 `Main` 类。需要加载配置，并从中获取 `RedisTemplate`。\n\
  \n```\npackage com.apress.springrecipes.nosql;\nimport com.apress.springrecipes.nosql.config.RedisConfig;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.data.redis.core.RedisTemplate;\npublic class Main {\n\
  public static void main(String[] args) throws Exception {\nApplicationContext context\
  \ = new AnnotationConfigApplicationContext(RedisConfig.class);\nRedisTemplate template\
  \ = context.getBean(RedisTemplate.class);\nfinal String vehicleNo = \"TEM0001\"\
  ;\nVehicle vehicle = new Vehicle(vehicleNo, \"RED\", 4,4);\ntemplate.opsForValue().set(vehicleNo,\
  \ vehicle);\nSystem.out.println(\"Vehicle: \" + template.opsForValue().get(vehicleNo));\n\
  }\n}\n```\n\n当从 `ApplicationContext` 获取到 `RedisTemplate` 模板后，就可以使用它了。这里最大的优势是你可以直接使用对象，而模板会处理对象转换的复杂工作。请注意，`set`\
  \ 方法接受 `String` 和 `Vehicle` 作为参数，而不仅仅是 `String` 或 `byte[]`。这使得代码更易读且更易于维护。默认情况下使用\
  \ JDK 序列化。要使用 Jackson，需要配置不同的 `RedisSerializer`。\n\n```\npackage com.apress.springrecipes.nosql.config;\n\
  ...\nimport org.springframework.data.redis.serializer.Jackson2JsonRedisSerializer;\n\
  @Configuration\npublic class RedisConfig {\n@Bean\npublic RedisTemplate redisTemplate()\
  \ {\nRedisTemplate template = new RedisTemplate();\ntemplate.setConnectionFactory(redisConnectionFactory());\n\
  template.setDefaultSerializer(new Jackson2JsonRedisSerializer(Vehicle.class));\n\
  return template;\n}\n...\n}\n```\n\n现在，`RedisTemplate` 模板将使用 Jackson 的 `ObjectMapper`\
  \ 对象来执行序列化和反序列化。代码的其余部分可以保持不变。再次运行主程序时，它仍然可以工作，并且对象将以 JSON 格式存储。当 Redis 在事务中使用时，它也可以参与同一事务。为此，需要将\
  \ `RedisTemplate` 模板上的 `enableTransactionSupport` 属性设置为 `true`。这将在事务提交时，负责在事务内部执行\
  \ Redis 操作。\n\n12-3. 使用 Neo4j\n\n问题\n\n你想在应用程序中使用 Neo4j。\n\n解决方案\n\n使用 Spring Data\
  \ Neo4j 库来访问 Neo4j。\n\n工作原理\n\n在开始使用 Neo4J 之前，你需要安装一个实例并使其运行。当它运行起来后，你需要连接到它，才能使用数据存储进行实际存储。你将从一个基于纯\
  \ Neo4J 的仓库开始，演示如何存储和检索对象，然后逐步过渡到基于 Spring Data Neo4J 的仓库。\n\n下载并运行 Neo4J\n\n你可以从\
  \ Neo4j 网站（[`http://neo4j.com/download/`](http://neo4j.com/download/)）下载 Neo4J。对于本教程，下载社区版就足够了；不过，它也应该适用于\
  \ Neo4j 的商业版本。Windows 用户可以运行安装程序来安装 Neo4j。Mac 和 Linux 用户可以解压归档文件，然后在创建的目录内，使用 `bin/neo4j`\
  \ 启动。Mac 用户也可以使用 Homebrew（[`http://brew.sh`](http://brew.sh)）通过 `brew install neo4j`\
  \ 安装 Neo4j。然后可以通过命令行执行 `neo4j start` 来启动。\n\n在命令行启动后，输出应该类似于图 12-3 所示。\n\n![A314861_4_En_12_Fig3_HTML.jpg](img/A314861_4_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3.\n\nNeo4j 初始启动后的输出\n\n启动 Neo4j\n\n让我们先创建一个简单的 Hello World 程序，其中包含一个嵌入式\
  \ Neo4j 服务器。创建一个 `Main` 类，该类启动一个嵌入式服务器，向 Neo4j 添加一些数据，然后再次检索这些数据。\n\n```\npackage\
  \ com.apress.springrecipes.nosql;\nimport org.neo4j.graphdb.GraphDatabaseService;\n\
  import org.neo4j.graphdb.Node;\nimport org.neo4j.graphdb.Transaction;\nimport org.neo4j.graphdb.factory.GraphDatabaseFactory;\n\
  import java.nio.file.Paths;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nfinal String DB_PATH = System.getProperty(\"user.home\") + \"/friends\"\
  ;\nGraphDatabaseService db = new GraphDatabaseFactory()\n.newEmbeddedDatabase(Paths.get(DB_PATH).toFile());\n\
  Transaction tx1 = db.beginTx();\nNode hello = db.createNode();\nhello.setProperty(\"\
  msg\", \"Hello\");\nNode world = db.createNode();\nworld.setProperty(\"msg\", \"\
  World\");\ntx1.success();\ndb.getAllNodes().stream()\n.map(n -> n.getProperty(\"\
  msg\"))\n.forEach(m -> System.out.println(\"Msg: \" + m));\ndb.shutdown();\n}\n\
  }\n```\n\n这个 `Main` 类将启动一个嵌入式 Neo4j 服务器。接着，它会启动一个事务并创建两个节点。然后检索所有节点，并将 `msg` 属性的值打印到控制台。Neo4j\
  \ 擅长遍历节点之间的关系。它在这方面特别优化（就像其他图数据存储一样）。\n\n让我们创建一些彼此之间存在关系的节点。\n\n\n\n```\npackage\
  \ com.apress.springrecipes.nosql;\nimport org.neo4j.graphdb.*;\nimport org.neo4j.graphdb.factory.GraphDatabaseFactory;\n\
  import java.nio.file.Paths;\nimport static com.apress.springrecipes.nosql.Main.RelationshipTypes.*;\n\
  public class Main {\nenum RelationshipTypes implements RelationshipType {FRIENDS_WITH,\
  \ MASTER_OF, SIBLING, LOCATION}\npublic static void main(String[] args) {\nfinal\
  \ String DB_PATH = System.getProperty(\"user.home\") + \"/friends\";\nfinal GraphDatabaseService\
  \ db = new GraphDatabaseFactory()    .newEmbeddedDatabase(Paths.get(DB_PATH).toFile());\n\
  final Label character = Label.label(\"character\");\nfinal Label planet = Label.label(\"\
  planet\");\ntry (Transaction tx1 = db.beginTx()) {\n// Planets\nNode dagobah = db.createNode(planet);\n\
  dagobah.setProperty(\"name\", \"Dagobah\");\nNode tatooine = db.createNode(planet);\n\
  tatooine.setProperty(\"name\", \"Tatooine\");\nNode alderaan = db.createNode(planet);\n\
  alderaan.setProperty(\"name\", \"Alderaan\");\n// Characters\nNode yoda = db.createNode(character);\n\
  yoda.setProperty(\"name\", \"Yoda\");\nNode luke = db.createNode(character);\nluke.setProperty(\"\
  name\", \"Luke Skywalker\");\nNode leia = db.createNode(character);\nleia.setProperty(\"\
  name\", \"Leia Organa\");\nNode han = db.createNode(character);\nhan.setProperty(\"\
  name\", \"Han Solo\");\n// Relations\nyoda.createRelationshipTo(luke, MASTER_OF);\n\
  yoda.createRelationshipTo(dagobah, LOCATION);\nluke.createRelationshipTo(leia, SIBLING);\n\
  luke.createRelationshipTo(tatooine, LOCATION);\nluke.createRelationshipTo(han, FRIENDS_WITH);\n\
  leia.createRelationshipTo(han, FRIENDS_WITH);\nleia.createRelationshipTo(alderaan,\
  \ LOCATION);\ntx1.success();\n}\nResult result = db.execute(\"MATCH (n) RETURN n.name\
  \ as name\");\nresult.stream()\n.flatMap(m -> m.entrySet().stream())\n.map(row ->\
  \ row.getKey() + \" : \" + row.getValue() + \";\")\n.forEach(System.out::println);\n\
  db.shutdown();\n}\n}\n```\n\n这段代码反映了《星球大战》宇宙中的一小部分。它包含了角色及其所在地点（实际上是行星）。人物之间也存在关系（关系图见图\
  \ 12-4）。\n\n![A314861_4_En_12_Fig4_HTML.gif](img/A314861_4_En_12_Fig4_HTML.gif)\n\
  \n图 12-4.\n\n关系示例\n\n代码中的关系是通过使用一个实现了 Neo4j 接口 `RelationshipType` 的枚举来实现的。顾名思义，这是为了区分不同类型的关系所必需的。节点的类型则通过为节点添加标签来区分。名称被设置为节点上的一个基本属性。运行代码时，它将执行\
  \ Cypher 查询 `MATCH (n) RETURN n.name as name`。这会选择所有节点并返回所有节点的 `name` 属性。\n\n###\
  \ 使用 Neo4j 映射对象\n\n到目前为止的代码都是相当底层的，并且与纯 Neo4j 绑定。创建和操作节点非常繁琐。理想情况下，你会使用一个 `Planet`\
  \ 类和一个 `Character` 类，并让它们能够从 Neo4j 中存储/检索。首先创建 `Planet` 和 `Character` 类。\n\n```\n\
  package com.apress.springrecipes.nosql;\npublic class Planet {\nprivate long id\
  \ = -1;\nprivate String name;\n// Getters and Setters omitted\n}\npackage com.apress.springrecipes.nosql;\n\
  import java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.List;\n\
  public class Character {\nprivate long id = -1;\nprivate String name;\nprivate Planet\
  \ location;\nprivate final List friends = new ArrayList();\nprivate Character apprentice;\n\
  public void addFriend(Character friend) {\nfriends.add(friend);\n}\n// Getters and\
  \ Setters omitted\n}\n```\n\n`Planet` 类非常简单。它拥有 `id` 和 `name` 属性。`Character` 类则稍微复杂一些。它同样拥有\
  \ `id` 和 `name` 属性，此外还包含一些用于表示关系的额外属性。其中包括用于 `LOCATION` 关系的 `location` 值、用于 `FRIENDS_WITH`\
  \ 关系的 `Character` 集合，以及用于 `MASTER_OF` 关系的学徒（apprentice）。\n\n为了能够存储这些类，让我们创建一个 `StarwarsRepository`\
  \ 接口来保存相关操作。\n\n```\npackage com.apress.springrecipes.nosql;\npublic interface StarwarsRepository\
  \ {\nPlanet save(Planet planet);\nCharacter save(Character character);\n}\n```\n\
  \n以下是针对 Neo4j 的实现：\n\n```\npackage com.apress.springrecipes.nosql;\nimport org.neo4j.graphdb.GraphDatabaseService;\n\
  import org.neo4j.graphdb.Label;\nimport org.neo4j.graphdb.Node;\nimport org.neo4j.graphdb.Transaction;\n\
  import static com.apress.springrecipes.nosql.RelationshipTypes.*;\npublic class\
  \ Neo4jStarwarsRepository implements StarwarsRepository {\nprivate final GraphDatabaseService\
  \ db;\npublic Neo4jStarwarsRepository(GraphDatabaseService db) {\nthis.db = db;\n\
  }\n@Override\npublic Planet save(Planet planet) {\nif (planet.getId() != null) {\n\
  return planet;\n}\ntry (Transaction tx = db.beginTx()) {\nLabel label = Label.label(\"\
  planet\");\nNode node = db.createNode(label);\nnode.setProperty(\"name\", planet.getName());\n\
  tx.success();\nplanet.setId(node.getId());\nreturn planet;\n}\n}\n@Override\npublic\
  \ Character save(Character character) {\nif (character.getId() != null) {\nreturn\
  \ character;\n}\ntry (Transaction tx = db.beginTx()) {\nLabel label = Label.label(\"\
  character\");\nNode node = db.createNode(label);\nnode.setProperty(\"name\", character.getName());\n\
  if (character.getLocation() != null) {\nPlanet planet = character.getLocation();\n\
  planet = save(planet);\nnode.createRelationshipTo(db.getNodeById(planet.getId()),\
  \ LOCATION);\n}\nfor (Character friend : character.getFriends()) {\nfriend = save(friend);\n\
  node.createRelationshipTo(db.getNodeById(friend.getId()), FRIENDS_WITH);\n}\nif\
  \ (character.getApprentice() != null) {\nsave(character.getApprentice());\nnode.createRelationshipTo(db.getNodeById(character.getApprentice().getId()),\
  \ MASTER_OF);\n}\ntx.success();\ncharacter.setId(node.getId());\nreturn character;\n\
  }\n}\n}\n```\n\n这里进行了大量操作来将对象转换为 `Node` 对象。对于 `Planet` 对象来说，这相当简单。首先检查它是否已经被持久化（在这种情况下\
  \ ID 大于 -1）；如果没有，则启动一个事务，创建一个节点，设置 `name` 属性，并将 `id` 值传递给 `Planet` 对象。然而，对于 `Character`\
  \ 类来说，情况稍微复杂一些，因为需要考虑所有关系。\n\n`Main` 类需要修改以反映这些类的变化。\n\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.neo4j.graphdb.GraphDatabaseService;\nimport org.neo4j.graphdb.Result;\n\
  import org.neo4j.graphdb.Transaction;\nimport org.neo4j.graphdb.factory.GraphDatabaseFactory;\n\
  import java.nio.file.Paths;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nfinal String DB_PATH = System.getProperty(\"user.home\") + \"/starwars\"\
  ;\nfinal GraphDatabaseService db = new GraphDatabaseFactory().newEmbeddedDatabase(Paths.get(DB_PATH).toFile());\n\
  StarwarsRepository repository = new Neo4jStarwarsRepository(db);\ntry (Transaction\
  \ tx = db.beginTx()) {\n// 行星\nPlanet dagobah = new Planet();\ndagobah.setName(\"\
  Dagobah\");\nPlanet alderaan = new Planet();\nalderaan.setName(\"Alderaan\");\n\
  Planet tatooine = new Planet();\ntatooine.setName(\"Tatooine\");\ndagobah = repository.save(dagobah);\n\
  repository.save(alderaan);\nrepository.save(tatooine);\n// 角色\nCharacter han = new\
  \ Character();\nhan.setName(\"Han Solo\");\nCharacter leia = new Character();\n\
  leia.setName(\"Leia Organa\");\nleia.setLocation(alderaan);\nleia.addFriend(han);\n\
  Character luke = new Character();\nluke.setName(\"Luke Skywalker\");\nluke.setLocation(tatooine);\n\
  luke.addFriend(han);\nluke.addFriend(leia);\nCharacter yoda = new Character();\n\
  yoda.setName(\"Yoda\");\nyoda.setLocation(dagobah);\nyoda.setApprentice(luke);\n\
  repository.save(han);\nrepository.save(luke);\nrepository.save(leia);\nrepository.save(yoda);\n\
  tx.success();\n}\nResult result = db.execute(\"MATCH (n) RETURN n.name as name\"\
  );\nresult.stream()\n.flatMap(m -> m.entrySet().stream())\n.map(row -> row.getKey()\
  \ + \" : \" + row.getValue() + \";\")\n.forEach(System.out::println);\ndb.shutdown();\n\
  }\n}\n```\n\n执行时，结果应与之前相同。然而，主要区别在于现在代码使用的是领域对象，而不是直接操作节点。将对象作为节点存储在 Neo4j 中相当繁琐。幸运的是，Spring\
  \ Data Neo4j 可以帮助简化这一过程。\n\n**使用 Neo4j OGM 映射对象**\n\n在转换为节点和关系时，属性可能会非常繁琐。如果能像使用\
  \ JPA 那样，通过注解简单地指定存储位置和内容，岂不是很好？Neo4j OGM 提供了这些注解。要使一个对象成为 Neo4j 映射实体，请在类型上使用 `@NodeEntity`\
  \ 注解。关系可以使用 `@Relationship` 注解来建模。要标识用于 ID 的字段，请添加 `@GraphId` 注解。将这些注解应用于 `Planet`\
  \ 和 `Character` 类后，它们将如下所示：\n\n```\npackage com.apress.springrecipes.nosql;\nimport\
  \ org.neo4j.ogm.annotation.GraphId;\nimport org.neo4j.ogm.annotation.NodeEntity;\n\
  @NodeEntity\npublic class Planet {\n@GraphId\nprivate Long id;\nprivate String name;\n\
  // 省略 getter/setter\n}\n```\n\n以下是 `Character` 类：\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.neo4j.ogm.annotation.GraphId;\nimport org.neo4j.ogm.annotation.NodeEntity;\n\
  import org.neo4j.ogm.annotation.Relationship;\nimport java.util.Collections;\nimport\
  \ java.util.HashSet;\nimport java.util.Objects;\nimport java.util.Set;\n@NodeEntity\n\
  public class Character {\n@GraphId\nprivate Long id;\nprivate String name;\n@Relationship(type\
  \ = \"LOCATION\")\nprivate Planet location;\n@Relationship(type=\"FRIENDS_WITH\"\
  )\nprivate final Set friends = new HashSet();\n@Relationship(type=\"MASTER_OF\"\
  )\nprivate Character apprentice;\n// 省略 getter/setter\n}\n```\n\n现在实体已经添加了注解，可以重写仓库以使用\
  \ `SessionFactory` 和 `Session` 来简化访问。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.neo4j.ogm.model.Result;\nimport org.neo4j.ogm.session.Session;\nimport\
  \ org.neo4j.ogm.session.SessionFactory;\nimport org.neo4j.ogm.transaction.Transaction;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Repository;\n\
  import javax.annotation.PreDestroy;\nimport java.util.Collections;\n@Repository\n\
  public class Neo4jStarwarsRepository implements StarwarsRepository {\nprivate final\
  \ SessionFactory sessionFactory;\n@Autowired\npublic Neo4jStarwarsRepository(SessionFactory\
  \ sessionFactory) {\nthis.sessionFactory = sessionFactory;\n}\n@Override\npublic\
  \ Planet save(Planet planet) {\nSession session = sessionFactory.openSession();\n\
  try (Transaction tx = session.beginTransaction()) {\nsession.save(planet);\nreturn\
  \ planet;\n}\n}\n@Override\npublic Character save(Character character) {\nSession\
  \ session = sessionFactory.openSession();\ntry (Transaction tx = session.beginTransaction())\
  \ {\nsession.save(character);\nreturn character;\n}\n}\n@Override\npublic void printAll()\
  \ {\nSession session = sessionFactory.openSession();\nResult result = session.query(\"\
  MATCH (n) RETURN n.name as name\", Collections.emptyMap(), true);\nresult.forEach(m\
  \ -> m.entrySet().stream()\n.map(row -> row.getKey() + \" : \" + row.getValue()\
  \ + \";\")\n.forEach(System.out::println));\n}\n}\n```\n\n有几点需要注意：使用 `SessionFactory`\
  \ 和 `Session` 后代码更加简洁，因为许多底层工作（尤其是节点与对象的映射）已为你完成。最后要注意的是新增的 `printAll` 方法。添加该方法是为了将代码从\
  \ `Main` 类迁移到仓库中。\n\n接下来需要修改的是 `Main` 类，因为它现在需要构建一个 `SessionFactory`。要构建 `SessionFactory`，你需要指定它需要扫描哪些包以查找带有\
  \ `@NodeEntity` 注解的类。\n\n```\npackage com.apress.springrecipes.nosql;\nimport org.neo4j.ogm.session.SessionFactory;\n\
  public class Main {\npublic static void main(String[] args) {\nSessionFactory sessionFactory\
  \ = new SessionFactory(\"com.apress.springrecipes.nosql\");\nStarwarsRepository\
  \ repository = new Neo4jStarwarsRepository(sessionFactory);\n// 行星\nPlanet dagobah\
  \ = new Planet();\ndagobah.setName(\"Dagobah\");\nPlanet alderaan = new Planet();\n\
  alderaan.setName(\"Alderaan\");\nPlanet tatooine = new Planet();\ntatooine.setName(\"\
  Tatooine\");\ndagobah = repository.save(dagobah);\nrepository.save(alderaan);\n\
  repository.save(tatooine);\n// 角色\nCharacter han = new Character();\nhan.setName(\"\
  Han Solo\");\nCharacter leia = new Character();\nleia.setName(\"Leia Organa\");\n\
  leia.setLocation(alderaan);\nleia.addFriend(han);\nCharacter luke = new Character();\n\
  luke.setName(\"Luke Skywalker\");\nluke.setLocation(tatooine);\nluke.addFriend(han);\n\
  luke.addFriend(leia);\nCharacter yoda = new Character();\nyoda.setName(\"Yoda\"\
  );\nyoda.setLocation(dagobah);\nyoda.setApprentice(luke);\nrepository.save(han);\n\
  repository.save(luke);\nrepository.save(leia);\nrepository.save(yoda);\nrepository.printAll();\n\
  sessionFactory.close();\n}\n}\n```\n\n创建了一个 `SessionFactory`，并用它来构建 `Neo4jStarwarsRepository`。接下来设置数据，并调用\
  \ `printAll` 方法。最初位于 `Main` 类中的代码现在已移至该方法中。最终结果应与之前得到的结果类似。\n\n**使用 Spring 进行配置**\n\
  \n到目前为止，所有内容都是手动配置和连接的。让我们创建一个 Spring 配置类。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.neo4j.ogm.session.SessionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration\npublic\
  \ class StarwarsConfig {\n@Bean\npublic SessionFactory sessionFactory() {\nreturn\
  \ new SessionFactory(\"com.apress.springrecipes.nosql\");\n}\n@Bean\npublic Neo4jStarwarsRepository\
  \ starwarsRepository(SessionFactory sessionFactory) {\nreturn new Neo4jStarwarsRepository(sessionFactory);\n\
  }\n}\n```\n\n\n\n现在，`SessionFactory` 和 `Neo4jStarwarsRepository` 都是 Spring 管理的 Bean。你可以让\
  \ `Main` 类使用此配置来引导一个 `ApplicationContext`，并从中获取 `StarwarsRepository`。\n\n```\npackage\
  \ com.apress.springrecipes.nosql;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\nAnnotationConfigApplicationContext\
  \ context = new AnnotationConfigApplicationContext(StarwarsConfig.class);\nStarwarsRepository\
  \ repository = context.getBean(StarwarsRepository.class);\n// 行星\nPlanet dagobah\
  \ = new Planet();\ndagobah.setName(\"Dagobah\");\nPlanet alderaan = new Planet();\n\
  alderaan.setName(\"Alderaan\");\nPlanet tatooine = new Planet();\ntatooine.setName(\"\
  Tatooine\");\ndagobah = repository.save(dagobah);\nrepository.save(alderaan);\n\
  repository.save(tatooine);\n// 角色\nCharacter han = new Character();\nhan.setName(\"\
  Han Solo\");\nCharacter leia = new Character();\nleia.setName(\"Leia Organa\");\n\
  leia.setLocation(alderaan);\nleia.addFriend(han);\nCharacter luke = new Character();\n\
  luke.setName(\"Luke Skywalker\");\nluke.setLocation(tatooine);\nluke.addFriend(han);\n\
  luke.addFriend(leia);\nCharacter yoda = new Character();\nyoda.setName(\"Yoda\"\
  );\nyoda.setLocation(dagobah);\nyoda.setApprentice(luke);\nrepository.save(han);\n\
  repository.save(luke);\nrepository.save(leia);\nrepository.save(yoda);\nrepository.printAll();\n\
  context.close();\n}\n}\n```\n\n代码大体上相同。主要区别在于，现在由 Spring 来控制 Bean 的生命周期。\n\nSpring\
  \ Data Neo4j 还提供了一个 `Neo4jTransactionManager` 实现，它可以为你处理事务的启动和停止，就像其他 `PlatformTransactionManager`\
  \ 实现一样。首先，让我们修改配置以包含它，并添加 `@EnableTransactionManagement`。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.neo4j.ogm.session.SessionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.neo4j.transaction.Neo4jTransactionManager;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  @Configuration\n@EnableTransactionManagement\npublic class StarwarsConfig {\n@Bean\n\
  public SessionFactory sessionFactory() {\nreturn new SessionFactory(\"com.apress.springrecipes.nosql\"\
  );\n}\n@Bean\npublic Neo4jStarwarsRepository starwarsRepository(SessionFactory sessionFactory)\
  \ {\nreturn new Neo4jStarwarsRepository(sessionFactory);\n}\n@Bean\npublic Neo4jTransactionManager\
  \ transactionManager(SessionFactory sessionFactory) {\nreturn new Neo4jTransactionManager(sessionFactory);\n\
  }\n}\n```\n\n有了这个配置，你现在可以进一步清理 `Neo4jStarwarsRepository` 类。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.neo4j.ogm.model.Result;\nimport org.neo4j.ogm.session.Session;\nimport\
  \ org.neo4j.ogm.session.SessionFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Repository;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import javax.annotation.PreDestroy;\nimport java.util.Collections;\n@Repository\n\
  @Transactional\npublic class Neo4jStarwarsRepository implements StarwarsRepository\
  \ {\nprivate final SessionFactory sessionFactory;\n@Autowired\npublic Neo4jStarwarsRepository(SessionFactory\
  \ sessionFactory) {\nthis.sessionFactory = sessionFactory;\n}\n@Override\npublic\
  \ Planet save(Planet planet) {\nSession session = sessionFactory.openSession();\n\
  session.save(planet);\nreturn planet;\n}\n@Override\npublic Character save(Character\
  \ character) {\nSession session = sessionFactory.openSession();\nsession.save(character);\n\
  return character;\n}\n@Override\npublic void printAll() {\nSession session = sessionFactory.openSession();\n\
  Result result = session.query(\"MATCH (n) RETURN n.name as name\", Collections.emptyMap(),\
  \ true);\nresult.forEach(m -> m.entrySet().stream()\n.map(row -> row.getKey() +\
  \ \" : \" + row.getValue() + \";\")\n.forEach(System.out::println));\n}\n@PreDestroy\n\
  public void cleanUp() {\nSession session = sessionFactory.openSession();\nsession.query(\"\
  MATCH (n) OPTIONAL MATCH (n)-[r]-() DELETE n,r\", null);\n}\n}\n```\n\n`Main` 类可以保持不变，存储和查询功能应该和以前一样工作。\n\
  \n使用 Spring Data Neo4j 仓库\n\n代码已经大大简化。使用 `SessionFactory` 和 `Session` 使得通过 Neo4j\
  \ 处理实体变得容易得多。它甚至可以更简单。与 Spring Data 的 JPA 或 Mongo 版本一样，它可以为你生成仓库。你唯一需要做的就是编写一个接口。让我们创建\
  \ `PlanetRepository` 和 `CharacterRepository` 类来操作实体。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.springframework.data.repository.CrudRepository;\npublic interface CharacterRepository\
  \ extends CrudRepository {}\n```\n\n这是 `PlanetRepository`：\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.springframework.data.repository.CrudRepository;\npublic interface PlanetRepository\
  \ extends CrudRepository {}\n```\n\n这些仓库都扩展了 `CrudRepository`，但也可以扩展 `PagingAndSortingRepository`\
  \ 或特殊的 `Neo4jRepository` 接口。对于本示例来说，`CrudRepository` 就足够了。\n\n接下来，将 `StarwarsRepository`\
  \ 及其实现重命名为 `StarwarsService`，因为它实际上不再是一个仓库了；实现也需要更改，以操作这些仓库而不是 `SessionFactory`。\n\
  \n```\npackage com.apress.springrecipes.nosql;\nimport org.springframework.stereotype.Service;\n\
  import org.springframework.transaction.annotation.Transactional;\nimport javax.annotation.PreDestroy;\n\
  @Service\n@Transactional\npublic class Neo4jStarwarsService implements StarwarsService\
  \ {\nprivate final PlanetRepository planetRepository;\nprivate final CharacterRepository\
  \ characterRepository;\nNeo4jStarwarsService(PlanetRepository planetRepository,\
  \ CharacterRepository characterRepository) {\nthis.planetRepository=planetRepository;\n\
  this.characterRepository=characterRepository;\n}\n@Override\npublic Planet save(Planet\
  \ planet) {\nreturn planetRepository.save(planet);\n}\n@Override\npublic Character\
  \ save(Character character) {\nreturn characterRepository.save(character);\n}\n\
  @Override\npublic void printAll() {\nplanetRepository.findAll().forEach(System.out::println);\n\
  characterRepository.findAll().forEach(System.out::println);\n}\n@PreDestroy\npublic\
  \ void cleanUp() {\ncharacterRepository.deleteAll();\nplanetRepository.deleteAll();\n\
  }\n}\n```\n\n\n\n现在所有操作都在特定的仓库接口上完成。这些接口本身不会创建实例。为了启用创建功能，需要在配置类中添加`@EnableNeo4jRepositories`注解。同时，添加一个`@ComponentScan`注解，以便让`StarwarsService`被检测并自动装配。\n\
  \n```\n@Configuration\n@EnableTransactionManagement\n@EnableNeo4jRepositories\n\
  @ComponentScan\npublic class StarwarsConfig { ... }\n```\n\n请注意`@EnableNeo4jRepositories`注解。该注解会扫描配置的基础包以查找仓库。当找到仓库时，会创建一个动态实现，该实现最终委托给`SessionFactory`。\n\
  \n最后，修改`Main`类以使用重构后的`StarwarsService`。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import com.apress.springrecipes.nosql.config.StarwarsConfig;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\nAnnotationConfigApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(StarwarsConfig.class);\nStarwarsService\
  \ service = context.getBean(StarwarsService.class);\n...\n}\n}\n```\n\n现在所有组件都已修改为使用动态创建的\
  \ Spring Data Neo4j 仓库。\n\n连接到远程 Neo4j 数据库\n\n到目前为止，所有针对 Neo4j 的编码都是在嵌入式 Neo4j 实例上完成的；然而，在开始时，您已经下载并安装了\
  \ Neo4j。现在让我们更改配置以连接到该远程 Neo4j 实例。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.neo4j.ogm.session.SessionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.neo4j.repository.config.EnableNeo4jRepositories;\n\
  import org.springframework.data.neo4j.transaction.Neo4jTransactionManager;\nimport\
  \ org.springframework.transaction.annotation.EnableTransactionManagement;\n@Configuration\n\
  @EnableTransactionManagement\n@EnableNeo4jRepositories\n@ComponentScan\npublic class\
  \ StarwarsConfig {\n@Bean\npublic org.neo4j.ogm.config.Configuration configuration()\
  \ {\nreturn new org.neo4j.ogm.config.Configuration.Builder().uri(\"bolt://localhost\"\
  ).build();\n}\n@Bean\npublic SessionFactory sessionFactory() {\nreturn new SessionFactory(configuration(),\"\
  com.apress.springrecipes.nosql\");\n}\n@Bean\npublic Neo4jTransactionManager transactionManager(SessionFactory\
  \ sessionFactory) {\nreturn new Neo4jTransactionManager(sessionFactory);\n}\n}\n\
  ```\n\n现在有一个`Configuration`对象供`SessionFactory`使用；您可以使用`new Configuration`或使用`Builder`来构建`Configuration`对象。您需要指定\
  \ Neo4j 服务器的 URI。在本例中，即`localhost`。默认驱动程序是 Bolt 驱动程序，它使用二进制协议传输数据。也可以使用 HTTP(S)，但这需要另一个依赖项。创建的`Configuration`对象由`SessionFactory`用于自身配置。\n\
  \n12-4. 使用 Couchbase\n\n问题\n\n您希望在应用程序中使用 Couchbase 来存储文档。\n\n解决方案\n\n首先下载、安装并设置\
  \ Couchbase；然后使用 Spring Data Couchbase 项目从数据存储中存储和检索文档。\n\n工作原理\n\n在开始使用 Couchbase\
  \ 之前，您需要安装并运行一个实例。当它运行起来后，您需要连接到它，以便能够使用数据存储进行实际存储。您将从基于普通 Couchbase 的仓库开始，演示如何存储和检索文档，然后逐步过渡到\
  \ Spring Data Couchbase，最后以仓库的响应式版本结束。\n\n下载、安装并设置 Couchbase\n\n下载并启动 Couchbase\
  \ 后，打开浏览器并访问`http://localhost:8091`。您应该会看到一个类似于图 12-5 的页面。在该页面上，只需单击“Setup”按钮。\n\
  \n![A314861_4_En_12_Fig5_HTML.jpg](img/A314861_4_En_12_Fig5_HTML.jpg)\n\n图 12-5.\
  \ 安装 Couchbase\n\n在下一个屏幕（见图 12-6）上，您可以配置集群。您可以启动一个新集群，也可以加入现有集群。对于本食谱，您将启动一个新集群。指定内存限制，并可选择指定磁盘存储的路径。对于本食谱，保留默认值即可。然后点击“Next”。\n\
  \n![A314861_4_En_12_Fig6_HTML.jpg](img/A314861_4_En_12_Fig6_HTML.jpg)\n\n图 12-6.\
  \ 安装 Couchbase，集群设置\n\n注意\n\n如果您运行的是 Docker 化的 Couchbase，则需要减少数据 RAM 配额，因为该配额是有限的。\n\
  \n下一个屏幕（图 12-7）允许您选择示例数据以使用 Couchbase 的默认样本。由于本食谱不需要这些数据，请取消所有选择并点击“Next”。\n\n![A314861_4_En_12_Fig7_HTML.jpg](img/A314861_4_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7. 安装 Couchbase，示例存储桶\n\n图 12-8 所示的屏幕允许您创建默认存储桶。对于本食谱，只需保留设置并点击“Next”。\n\n\
  ![A314861_4_En_12_Fig8_HTML.jpg](img/A314861_4_En_12_Fig8_HTML.jpg)\n\n图 12-8. 安装\
  \ Couchbase，创建默认存储桶\n\n如果您想注册产品，请填写表单并决定是否希望收到软件更新通知。您至少需要勾选同意条款和条件的复选框（图 12-9）。然后，几乎是最后一次，点击“Next”。\n\
  \n![A314861_4_En_12_Fig9_HTML.jpg](img/A314861_4_En_12_Fig9_HTML.jpg)\n\n图 12-9.\
  \ 安装 Couchbase，通知和注册\n\n最后，您需要为服务器的管理员帐户选择用户名和密码。本食谱使用 admin 作为用户名，密码为 sr4-admin，但您也可以自由选择自己的凭据。见图\
  \ 12-10。\n\n![A314861_4_En_12_Fig10_HTML.jpg](img/A314861_4_En_12_Fig10_HTML.jpg)\n\
  \n图 12-10. 安装 Couchbase，设置管理员用户\n\n使用 Couchbase 存储和检索文档\n\n要在 Couchbase 中存储对象，您需要创建一个`Document`，它可以容纳各种类型的内容，例如`serializable`对象、JSON、`string`、日期，或\
  \ Netty `ByteBuf`形式的二进制数据。然而，主要的内容类型是 JSON。这样您也可以将其与其他技术一起使用。当使用`SerializableDocument`时，您将自身限制在基于\
  \ Java 的解决方案中。\n\n但是，在 Couchbase 中存储对象之前，您需要连接到集群。要连接到 Couchbase，您需要一个`Cluster`才能访问您在设置\
  \ Couchbase 时创建的`Bucket`。您可以使用`CouchbaseCluster`类创建到之前设置的集群的连接。生成的`Cluster`可用于通过`openBucket()`方法打开一个`Bucket`。对于本食谱，您将使用`default`存储桶和最简单的集群设置。\n\
  \n首先，创建一个`Vehicle`类（或重用食谱 12-1 中的类），您将把它存储在 Couchbase 中。\n\n\n```java\npackage com.apress.springrecipes.nosql;\n\
  import java.io.Serializable;\npublic class Vehicle implements Serializable {\nprivate\
  \ String vehicleNo;\nprivate String color;\nprivate int wheel;\nprivate int seat;\n\
  public Vehicle() {\n}\npublic Vehicle(String vehicleNo, String color, int wheel,\
  \ int seat) {\nthis.vehicleNo = vehicleNo;\nthis.color = color;\nthis.wheel = wheel;\n\
  this.seat = seat;\n}\npublic String getColor() {\nreturn color;\n}\npublic int getSeat()\
  \ {\nreturn seat;\n}\npublic String getVehicleNo() {\nreturn vehicleNo;\n}\npublic\
  \ int getWheel() {\nreturn wheel;\n}\npublic void setColor(String color) {\nthis.color\
  \ = color;\n}\npublic void setSeat(int seat) {\nthis.seat = seat;\n}\npublic void\
  \ setVehicleNo(String vehicleNo) {\nthis.vehicleNo = vehicleNo;\n}\npublic void\
  \ setWheel(int wheel) {\nthis.wheel = wheel;\n}\n@Override\npublic String toString()\
  \ {\nreturn \"Vehicle [\" +\n\"vehicleNo='\" + vehicleNo + '\\'' +\n\", color='\"\
  \ + color + '\\'' +\n\", wheel=\" + wheel +\n\", seat=\" + seat +\n']';\n}\n}\n\
  ```\n\n请注意这一部分：`implements Serializable`。这是必需的，因为首先你将使用 Couchbase 中的 `SerializableDocument`\
  \ 类来存储对象。\n\n为了与 Couchbase 通信，你需要创建一个仓库。首先定义接口。\n\n```java\npackage com.apress.springrecipes.nosql;\n\
  public interface VehicleRepository {\nvoid save(Vehicle vehicle);\nvoid delete(Vehicle\
  \ vehicle);\nVehicle findByVehicleNo(String vehicleNo);\n}\n```\n\n以下是实现，它将使用 `SerializableDocument`\
  \ 存储 `Vehicle` 值：\n\n```java\npackage com.apress.springrecipes.nosql;\nimport com.couchbase.client.java.Bucket;\n\
  import com.couchbase.client.java.document.SerializableDocument;\nclass CouchBaseVehicleRepository\
  \ implements VehicleRepository {\nprivate final Bucket bucket;\npublic CouchBaseVehicleRepository(Bucket\
  \ bucket) {\nthis.bucket=bucket;\n}\n@Override\npublic void save(Vehicle vehicle)\
  \ {\nSerializableDocument vehicleDoc = SerializableDocument    .create(vehicle.getVehicleNo(),\
  \ vehicle);\nbucket.upsert(vehicleDoc);\n}\n@Override\npublic void delete(Vehicle\
  \ vehicle) {\nbucket.remove(vehicle.getVehicleNo());\n}\n@Override\npublic Vehicle\
  \ findByVehicleNo(String vehicleNo) {\nSerializableDocument doc = bucket.get(vehicleNo,\
  \ SerializableDocument.class);\nif (doc != null) {\nreturn (Vehicle) doc.content();\n\
  }\nreturn null;\n}\n}\n```\n\n仓库需要一个 `Bucket` 来存储文档；它类似于数据库中的表（`Bucket` 类似于表，而 `Cluster`\
  \ 更类似于整个数据库）。当存储 `Vehicle` 时，它会被包装在 `SerializableDocument` 中，并且 `vehicleNo` 值被用作\
  \ ID；之后，会调用 `upsert` 方法。该方法会根据文档是否已存在来执行更新或插入操作。\n\n让我们创建一个 `Main` 类，用于在 bucket\
  \ 中存储和检索 `Vehicle` 的数据。\n\n```java\npackage com.apress.springrecipes.nosql;\nimport\
  \ com.couchbase.client.java.Bucket;\nimport com.couchbase.client.java.Cluster;\n\
  import com.couchbase.client.java.CouchbaseCluster;\npublic class Main {\npublic\
  \ static void main(String[] args) {\nCluster cluster = CouchbaseCluster.create();\n\
  Bucket bucket = cluster.openBucket();\nCouchBaseVehicleRepository vehicleRepository\
  \ = new CouchBaseVehicleRepository(bucket);\nvehicleRepository.save(new Vehicle(\"\
  TEM0001\", \"GREEN\", 3, 1));\nvehicleRepository.save(new Vehicle(\"TEM0004\", \"\
  RED\", 4, 2));\nSystem.out.println(\"Vehicle: \" + vehicleRepository.findByVehicleNo(\"\
  TEM0001\"));\nSystem.out.println(\"Vehicle: \" + vehicleRepository.findByVehicleNo(\"\
  TEM0004\"));\nbucket.remove(\"TEM0001\");\nbucket.remove(\"TEM0004\");\nbucket.close();\n\
  cluster.disconnect();\n}\n}\n```\n\n首先，使用 `CouchbaseCluster.create()` 方法建立与 `Cluster`\
  \ 的连接。默认情况下，这将连接到 `localhost` 上的集群。在生产环境中使用 Couchbase 时，你可能希望使用其他 `create` 方法，并传入要连接的主机列表，或者使用\
  \ `CouchbaseEnvironment` 设置更多属性（例如设置 `queryTimeout`、`searchTimeout` 等）。对于本示例，使用默认的\
  \ `Cluster` 就足够了。接下来，你需要指定用于存储和检索文档的 `Bucket`。由于你将使用默认设置，使用 `cluster.openBucket()`\
  \ 就足够了。还有其他几个重载方法可用于指定特定的 `Bucket` 以及设置与 bucket 连接的属性（例如超时设置、用户名/密码等）。\n\n`Bucket`\
  \ 用于创建 `CouchbaseVehicleRepository` 的实例。之后，存储、检索并再次删除两个 `Vehicle`（以免本示例留下杂乱数据）。最后，关闭连接。\n\
  \n虽然你现在正在将文档存储到 CouchBase 中，但有一个缺点：你使用的是 `SerializableDocument`，而 CouchBase 无法用它进行索引。此外，它只能被其他基于\
  \ Java 的客户端读取，而无法使用不同的语言（如 JavaScript）读取。因此，建议改用 `JsonDocument`。让我们重写 `CouchbaseVehicleRepository`\
  \ 以反映这一点。\n\n```java\npackage com.apress.springrecipes.nosql;\nimport com.couchbase.client.java.Bucket;\n\
  import com.couchbase.client.java.document.JsonDocument;\nimport com.couchbase.client.java.document.json.JsonObject;\n\
  class CouchbaseVehicleRepository implements VehicleRepository {\nprivate final Bucket\
  \ bucket;\npublic CouchbaseVehicleRepository(Bucket bucket) {\nthis.bucket=bucket;\n\
  }\n@Override\npublic void save(Vehicle vehicle) {\nJsonObject vehicleJson = JsonObject.empty()\n\
  .put(\"vehicleNo\", vehicle.getVehicleNo())\n.put(\"color\", vehicle.getColor())\n\
  .put(\"wheels\", vehicle.getWheel())\n.put(\"seat\", vehicle.getSeat());\nJsonDocument\
  \ vehicleDoc = JsonDocument.create(vehicle.getVehicleNo(), vehicleJson);\nbucket.upsert(vehicleDoc);\n\
  }\n@Override\npublic void delete(Vehicle vehicle) {\nbucket.remove(vehicle.getVehicleNo());\n\
  }\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\nJsonDocument doc\
  \ = bucket.get(vehicleNo, JsonDocument.class);\nif (doc != null) {\nJsonObject result\
  \ = doc.content();\nreturn new Vehicle(result.getString(\"vehicleNo\"), result.getString(\"\
  color\"), result.getInt(\"wheels\"), result.getInt(\"seat\"));\n}\nreturn null;\n\
  }\n}\n```\n\n请注意，这段代码使用了 `JsonObject` 对象，并将 `Vehicle` 转换为 `JsonObject` 对象，反之亦然。再次运行\
  \ `Main` 类，应该会再次从 Couchbase 中存储、检索并删除两个文档。\n\n对于较大的对象图，JSON 的相互转换可能会变得相当繁琐，因此除了手动处理之外，你还可以使用像\
  \ Jackson 这样的 JSON 库来进行 JSON 的相互转换。\n\n```\n```\npackage com.apress.springrecipes.nosql;\n\
  import com.couchbase.client.java.Bucket;\nimport com.couchbase.client.java.document.JsonDocument;\n\
  import com.couchbase.client.java.document.json.JsonObject;\nimport com.fasterxml.jackson.core.JsonProcessingException;\n\
  import com.fasterxml.jackson.databind.ObjectMapper;\nimport java.io.IOException;\n\
  class CouchbaseVehicleRepository implements VehicleRepository {\nprivate final Bucket\
  \ bucket;\nprivate final ObjectMapper mapper;\npublic CouchbaseVehicleRepository(Bucket\
  \ bucket, ObjectMapper mapper) {\nthis.bucket=bucket;\nthis.mapper=mapper;\n}\n\
  @Override\npublic void save(Vehicle vehicle) {\nString json = null;\ntry {\njson\
  \ = mapper.writeValueAsString(vehicle);\n} catch (JsonProcessingException e) {\n\
  throw new RuntimeException(\"Error encoding JSON.\", e);\n}\nJsonObject vehicleJson\
  \ = JsonObject.fromJson(json);\nJsonDocument vehicleDoc = JsonDocument.create(vehicle.getVehicleNo(),\
  \ vehicleJson);\nbucket.upsert(vehicleDoc);\n}\n@Override\npublic void delete(Vehicle\
  \ vehicle) {\nbucket.remove(vehicle.getVehicleNo());\n}\n@Override\npublic Vehicle\
  \ findByVehicleNo(String vehicleNo) {\nJsonDocument doc = bucket.get(vehicleNo,\
  \ JsonDocument.class);\nif (doc != null) {\nJsonObject result = doc.content();\n\
  try {\nreturn mapper.readValue(result.toString(), Vehicle.class);\n} catch (IOException\
  \ e) {\nthrow new RuntimeException(\"Error decoding JSON.\", e);\n}\n}\nreturn null;\n\
  }\n}\n```\n\n现在，你使用强大的 Jackson 库来进行 JSON 的转换。\n\n使用 Spring\n\n目前，所有配置都在 `Main` 类中。让我们将配置部分移到一个\
  \ `CouchbaseConfiguration` 类中，并使用它来引导一个应用程序。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import com.couchbase.client.java.Bucket;\nimport com.couchbase.client.java.Cluster;\n\
  import com.couchbase.client.java.CouchbaseCluster;\nimport com.fasterxml.jackson.databind.ObjectMapper;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class CouchbaseConfiguration {\n@Bean(destroyMethod = \"\
  disconnect\")\npublic Cluster cluster() {\nreturn CouchbaseCluster.create();\n}\n\
  @Bean\npublic Bucket bucket(Cluster cluster) {\nreturn cluster.openBucket();\n}\n\
  @Bean\npublic ObjectMapper mapper() {\nreturn new ObjectMapper();\n}\n@Bean\npublic\
  \ CouchbaseVehicleRepository vehicleRepository(Bucket bucket, ObjectMapper mapper)\
  \ {\nreturn new CouchbaseVehicleRepository(bucket, mapper);\n}\n}\n```\n\n注意 `Cluster`\
  \ Bean 上的 `destroyMethod` 方法。当应用程序关闭时，此方法将被调用。`Bucket` 上的 `close` 方法将被自动调用，因为它是自动检测到的预定义\
  \ `methods` 之一。`CouchbaseVehicleRepository` 的构造方式仍然相同，但现在你向它传递了两个 Spring 管理的 Bean。\n\
  \n修改 `Main` 类以使用 `CouchbaseConfiguration`。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\nApplicationContext\
  \ context = new AnnotationConfigApplicationContext(CouchbaseConfiguration.class);\n\
  VehicleRepository vehicleRepository =context.getBean(VehicleRepository.class);\n\
  vehicleRepository.save(new Vehicle(\"TEM0001\", \"GREEN\", 3, 1));\nvehicleRepository.save(new\
  \ Vehicle(\"TEM0004\", \"RED\", 4, 2));\nSystem.out.println(\"Vehicle: \" + vehicleRepository.findByVehicleNo(\"\
  TEM0001\"));\nSystem.out.println(\"Vehicle: \" + vehicleRepository.findByVehicleNo(\"\
  TEM0004\"));\nvehicleRepository.delete(vehicleRepository.findByVehicleNo(\"TEM0001\"\
  ));\nvehicleRepository.delete(vehicleRepository.findByVehicleNo(\"TEM0004\"));\n\
  }\n}\n```\n\n`VehicleRepository` 是从构建的 `ApplicationContext` 中检索出来的，并且仍然有 `Vehicle`\
  \ 实例被存储、检索和从 Couchbase 集群中删除。\n\n使用 Spring Data 的 CouchbaseTemplate\n\n虽然使用 Java\
  \ 和 Jackson 进行 JSON 映射来操作 Couchbase 相当直接，但在处理较大的仓库或使用特定索引和 N1QL 查询时，它会变得相当繁琐，更不用说如果你想将其集成到具有其他数据存储方式的应用程序中。Spring\
  \ Data Couchbase 项目包含一个 `CouchbaseTemplate` 模板，它消除了你现在在仓库中做的一部分样板工作，例如 JSON 的映射以及将异常转换为\
  \ `DataAccessException`。这使得它更容易与 Spring 使用的其他数据访问技术集成。\n\n首先，重写仓库以使用 `CouchbaseTemplate`。\n\
  \n```\npackage com.apress.springrecipes.nosql;\nimport org.springframework.data.couchbase.core.CouchbaseTemplate;\n\
  public class CouchbaseVehicleRepository implements VehicleRepository {\nprivate\
  \ final CouchbaseTemplate couchbase;\npublic CouchbaseVehicleRepository(CouchbaseTemplate\
  \ couchbase) {\nthis.couchbase = couchbase;\n}\n@Override\npublic void save(Vehicle\
  \ vehicle) {\ncouchbase.save(vehicle);\n}\n@Override\npublic void delete(Vehicle\
  \ vehicle) {\ncouchbase.remove(vehicle);\n}\n@Override\npublic Vehicle findByVehicleNo(String\
  \ vehicleNo) {\nreturn couchbase.findById(vehicleNo, Vehicle.class);\n}\n}\n```\n\
  \n现在，仓库被缩减为仅仅几行代码。为了能够存储 `Vehicle` 对象，你需要对 `Vehicle` 进行注解；它需要知道哪个字段用于 ID。\n\n```\n\
  package com.apress.springrecipes.nosql;\nimport com.couchbase.client.java.repository.annotation.Field;\n\
  import com.couchbase.client.java.repository.annotation.Id;\nimport java.io.Serializable;\n\
  public class Vehicle implements Serializable{\n@Id\nprivate String vehicleNo;\n\
  @Field\nprivate String color;\n@Field\nprivate int wheel;\n@Field\nprivate int seat;\n\
  // getters/setters omitted.\n}\n```\n\n字段 `vehicleNo` 已使用 `@Id` 注解进行标注，其他字段则使用了\
  \ `@Field`。虽然后者不是必须的，但建议指定它。你还可以使用 `@Field` 注解为 JSON 属性的名称指定一个不同的名称，这在需要将现有文档映射到\
  \ Java 对象时会很方便。\n\n最后，你需要在配置类中配置一个 `CouchbaseTemplate` 模板。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import com.couchbase.client.java.Bucket;\nimport com.couchbase.client.java.Cluster;\n\
  import com.couchbase.client.java.CouchbaseCluster;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.couchbase.core.CouchbaseTemplate;\n\
  @Configuration\npublic class CouchbaseConfiguration {\n@Bean(destroyMethod = \"\
  disconnect\")\npublic Cluster cluster() {\nreturn CouchbaseCluster.create();\n}\n\
  @Bean\npublic Bucket bucket(Cluster cluster) {\nreturn cluster.openBucket();\n}\n\
  @Bean\npublic CouchbaseVehicleRepository vehicleRepository(CouchbaseTemplate couchbaseTemplate)\
  \ {\nreturn new CouchbaseVehicleRepository(couchbaseTemplate);\n}\n@Bean\npublic\
  \ CouchbaseTemplate couchbaseTemplate(Cluster cluster, Bucket bucket) {\nreturn\
  \ new CouchbaseTemplate(cluster.clusterManager(\"default\",\"\").info(), bucket);\n\
  }\n}\n```\n\n一个 `CouchbaseTemplate` 对象需要一个 `Bucket`，并且需要访问 `ClusterInfo`，这可以通过 `ClusterManager`\
  \ 获得；这里你传递了 `Bucket` 的名称，即 `default`，并且没有密码。你也可以传递 admin/sr4-admin 作为用户名/密码组合。最后，使用这个配置好的模板创建了配置好的\
  \ `CouchbaseVehicleRepository` 实例。\n\n当运行 `Main` 类时，访问仍然可用，并且存储、检索和删除操作仍然有效。\n\n\
  为了使配置更简单一些，Spring Data Couchbase 提供了一个基础配置类 `AbstractCouchbaseConfiguration`，你可以继承它，这样就不再需要配置\
  \ `Cluster`、`Bucket` 或 `CouchbaseTemplate` 对象了。\n```\n\n```content\n```\npackage\
  \ com.apress.springrecipes.nosql;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.couchbase.config.AbstractCouchbaseConfiguration;\n\
  import org.springframework.data.couchbase.core.CouchbaseTemplate;\nimport java.util.Collections;\n\
  import java.util.List;\n@Configuration\npublic class CouchbaseConfiguration extends\
  \ AbstractCouchbaseConfiguration {\n@Override\nprotected List getBootstrapHosts()\
  \ {\nreturn Collections.singletonList(\"localhost\");\n}\n@Override\nprotected String\
  \ getBucketName() {\nreturn \"default\";\n}\n@Override\nprotected String getBucketPassword()\
  \ {\nreturn \"\";\n}\n@Bean\npublic CouchbaseVehicleRepository vehicleRepository(CouchbaseTemplate\
  \ couchbaseTemplate) {\nreturn new CouchbaseVehicleRepository(couchbaseTemplate);\n\
  }\n}\n```\n\n现在配置类继承了 `AbstractCouchbaseConfiguration` 基类，你只需要提供存储桶名称、可选密码以及主机列表即可。该基类配置提供了\
  \ `CouchbaseTemplate` 及其所需的所有对象。\n\n**使用 Spring Data 的 Couchbase 仓库**\n\n与其他技术类似，Spring\
  \ Data Couchbase 提供了定义接口并在运行时获得实际仓库实现的功能。这样，你只需创建接口，而无需创建具体实现。为此，与其他 Spring Data\
  \ 项目一样，你需要继承 `CrudRepository`。请注意，如果需要相应功能，你也可以继承 `CouchbaseRepository` 或 `CouchbasePagingAndSortingRepository`。在本示例中，你将使用\
  \ `CrudRepository`。\n\n```\npackage com.apress.springrecipes.nosql;\nimport org.springframework.data.repository.CrudRepository;\n\
  public interface VehicleRepository extends CrudRepository {}\n```\n\n如你所见，该接口没有额外的方法，因为所有\
  \ CRUD 方法都已提供。\n\n接下来，需要在配置类上添加 `@EnableCouchbaseRepositories` 注解。\n\n```\npackage\
  \ com.apress.springrecipes.nosql;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.couchbase.config.AbstractCouchbaseConfiguration;\n\
  import org.springframework.data.couchbase.repository.config.EnableCouchbaseRepositories;\n\
  import java.util.Collections;\nimport java.util.List;\n@Configuration\n@EnableCouchbaseRepositories(\n\
  public class CouchbaseConfiguration extends AbstractCouchbaseConfiguration { ...\
  \ }\n```\n\n最后，`Main` 类需要稍作修改，因为你需要使用 `findById` 方法，而不是 `findByVehicleNo`。\n\n```\n\
  package com.apress.springrecipes.nosql;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\nApplicationContext\
  \ context = new AnnotationConfigApplicationContext(CouchbaseConfiguration.class);\n\
  VehicleRepository vehicleRepository =context.getBean(VehicleRepository.class);\n\
  vehicleRepository.save(new Vehicle(\"TEM0001\", \"GREEN\", 3, 1));\nvehicleRepository.save(new\
  \ Vehicle(\"TEM0004\", \"RED\", 4, 2));\nvehicleRepository.findById(\"TEM0001\"\
  ).ifPresent(System.out::println);\nvehicleRepository.findById(\"TEM0004\").ifPresent(System.out::println);\n\
  vehicleRepository.deleteById(\"TEM0001\");\nvehicleRepository.deleteById(\"TEM0004\"\
  );\n}\n}\n```\n\n`findById` 方法返回一个 `java.util.Optional` 对象，因此你可以使用 `ifPresent` 方法将其打印到控制台。\n\
  \n**使用 Spring Data 的响应式 Couchbase 仓库**\n\n除了阻塞式仓库，还可以利用 `ReactiveCouchbaseRepository`\
  \ 来获得响应式仓库。对于返回零个或一个元素的方法（如 `findById`），它将返回 `Mono`；对于返回零个或多个元素的方法（如 `findAll`），它将返回\
  \ `Flux`。默认的 Couchbase 驱动已内置响应式支持。要使用此功能，你需要在类路径中包含 RxJava 和 RxJava 响应式流。要使用 `ReactiveCouchbaseRepository`\
  \ 中的响应式类型，你还需要在类路径中包含 Pivotal Reactor。\n\n要为 Couchbase 配置响应式仓库，请修改 `CouchbaseConfiguration`。让它继承\
  \ `AbstractReactiveCouchbaseConfiguration`，并使用 `@EnableReactiveCouchbaseRepositories`\
  \ 代替 `@EnableCouchbaseRepositories`。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.couchbase.config.AbstractReactiveCouchbaseConfiguration;\n\
  import org.springframework.data.couchbase.repository.config.EnableReactiveCouchbaseRepositories;\n\
  import java.util.Collections;\nimport java.util.List;\n@Configuration\n@EnableReactiveCouchbaseRepositories\n\
  public class CouchbaseConfiguration extends AbstractReactiveCouchbaseConfiguration\
  \ {\n@Override\nprotected List getBootstrapHosts() {\nreturn Collections.singletonList(\"\
  localhost\");\n}\n@Override\nprotected String getBucketName() {\nreturn \"default\"\
  ;\n}\n@Override\nprotected String getBucketPassword() {\nreturn \"\";\n}\n}\n```\n\
  \n配置的其余部分与常规 Couchbase 配置保持一致；你仍然需要连接到相同的 Couchbase 服务器并使用相同的 `Bucket`。\n\n接下来，`VehicleRepository`\
  \ 应继承 `ReactiveCrudRepository` 而不是 `CrudRepository`。\n\n```\npackage com.apress.springrecipes.nosql;\n\
  import org.springframework.data.repository.reactive.ReactiveCrudRepository;\npublic\
  \ interface VehicleRepository extends ReactiveCrudRepository {}\n```\n\n这基本上就是获得响应式仓库所需的全部操作。为了能够测试它，你还需要修改\
  \ `Main` 类。\n\n```\npackage com.apress.springrecipes.nosql;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import reactor.core.publisher.Flux;\nimport reactor.core.publisher.Mono;\nimport\
  \ java.util.Arrays;\nimport java.util.concurrent.CountDownLatch;\npublic class Main\
  \ {\npublic static void main(String[] args) throws InterruptedException {\nApplicationContext\
  \ context = new AnnotationConfigApplicationContext(CouchbaseConfiguration.class);\n\
  VehicleRepository repository =context.getBean(VehicleRepository.class);\nCountDownLatch\
  \ countDownLatch = new CountDownLatch(1);\nrepository.saveAll(Flux.just(new Vehicle(\"\
  TEM0001\", \"GREEN\", 3, 1), //\nnew Vehicle(\"TEM0004\", \"RED\", 4, 2)))\n.last().log()\n\
  .then(repository.findById(\"TEM0001\")).doOnSuccess(System.out::println)\n.then(repository.findById(\"\
  TEM0004\")).doOnSuccess(System.out::println)\n.then(repository.deleteById(Flux.just(\"\
  TEM0001\", \"TEM00004\")))\n.doOnSuccess(x -> countDownLatch.countDown())\n.doOnError(t\
  \ -> countDownLatch.countDown())\n.subscribe();\ncountDownLatch.await();\n}\n}\n\
  ```\n```\n\n\n创建 `ApplicationContext` 和获取 `VehicleRepository` 的方式并无不同。然而，在此之后，你会看到一系列方法调用，一个接一个地串联起来。首先，你向数据存储中添加两个\
  \ `Vehicle` 实例。当最后一个实例保存完成后，你将查询每个实例对应的仓库。当查询完成后，所有数据会被再次删除。为了让整个过程能够顺利完成，你可以选择使用\
  \ `block()` 方法进行阻塞，或者自行等待。通常，在响应式系统中使用 `block()` 是应该避免的。因此，你使用了 `CountDownLatch`；当\
  \ `deleteById` 方法执行完毕时，`CountDownLatch` 的值会递减。`countDownLatch.await()` 方法会一直等待，直到计数器归零，然后程序结束。\n\
  \n**总结**\n\n在本节中，你初步了解了不同类型的数据存储，包括如何使用它们，以及如何利用 Spring Data 系列的不同模块来简化使用过程。你首先研究了以\
  \ MongoDB 为代表的文档型存储，以及 Spring Data MongoDB 模块的使用。接着，你了解了键值存储；你使用 Redis 作为实现，并使用了\
  \ Spring Data Redis 模块。最后一种数据存储是基于图的 Neo4j，你探索了嵌入式 Neo4j、如何使用它，以及如何构建用于存储实体的仓库。\n\
  \n对于其中两种数据存储，你还通过扩展响应式版本的接口以及为这些数据存储配置响应式驱动程序，探索了其响应式特性。\n\n**13. Spring Java 企业服务与远程调用技术**\n\
  \n在本章中，你将学习 Spring 对最常见 Java 企业服务的支持：使用 Java 管理扩展 (JMX)、使用 JavaMail 发送电子邮件以及使用 Quartz\
  \ 调度任务。此外，你还将了解 Spring 对各种远程调用技术的支持，例如 RMI、Hessian、HTTP Invoker 和 SOAP Web 服务。\n\
  \nJMX 是 Java SE 的一部分，是一种用于管理和监控系统资源（如设备、应用程序、对象和服务驱动型网络）的技术。这些资源被表示为托管 Bean (MBean)。Spring\
  \ 支持 JMX，可以将任何 Spring Bean 导出为模型 MBean，而无需针对 JMX API 进行编程。此外，Spring 可以轻松访问远程 MBean。\n\
  \nJavaMail 是在 Java 中发送电子邮件的标准 API 和实现。Spring 进一步提供了一个抽象层，以独立于实现的方式发送电子邮件。\n\n在 Java\
  \ 平台上调度任务主要有两种选择：JDK Timer 和 Quartz Scheduler ([`http://quartz-scheduler.org/`](http://quartz-scheduler.org/))。JDK\
  \ Timer 提供了与 JDK 捆绑的简单任务调度功能。与 JDK Timer 相比，Quartz 提供了更强大的作业调度功能。对于这两种选择，Spring\
  \ 都提供了实用类，可以在 Bean 配置文件中配置调度任务，而无需直接使用任一 API。\n\n远程调用是开发分布式应用程序（尤其是多层企业应用程序）的关键技术。它允许运行在不同\
  \ JVM 或不同机器上的不同应用程序或组件使用特定协议相互通信。Spring 的远程调用支持在不同远程调用技术之间保持一致。在服务器端，Spring 允许你通过服务导出器将任意\
  \ Bean 公开为远程服务。在客户端，Spring 提供了各种代理工厂 Bean，用于为远程服务创建本地代理，这样你就可以像使用本地 Bean 一样使用远程服务。\n\
  \n你将学习如何使用一系列远程调用技术，包括 RMI、Hessian、HTTP Invoker，以及使用 Spring Web Services (Spring-WS)\
  \ 的 SOAP Web 服务。\n\n**13-1. 将 Spring POJO 注册为 JMX MBean**\n\n**问题**\n\n你希望将 Java\
  \ 应用程序中的对象注册为 JMX MBean，以便能够查看正在运行的服务并在运行时操纵其状态。这将允许你执行诸如重新运行批处理作业、调用方法和更改配置元数据等任务。\n\
  \n**解决方案**\n\nSpring 支持 JMX，允许你将其 IoC 容器中的任何 Bean 导出为模型 MBean。这可以通过简单地声明一个 `MBeanExporter`\
  \ 实例来完成。借助 Spring 的 JMX 支持，你无需直接处理 JMX API。此外，Spring 允许你声明 JSR-160（Java 管理扩展远程 API）连接器，通过使用工厂\
  \ Bean，通过特定协议公开 MBean 以供远程访问。Spring 为服务器和客户端都提供了工厂 Bean。\n\nSpring 的 JMX 支持还附带其他机制，你可以通过这些机制来组装\
  \ MBean 的管理接口。这些选项包括使用方法名称、接口和注解来导出 Bean。Spring 还可以自动检测 IoC 容器中声明的、并使用 Spring 定义的\
  \ JMX 特定注解进行注解的 Bean，并将其导出为 MBean。\n\n**工作原理**\n\n假设你正在开发一个用于将文件从一个目录复制到另一个目录的实用程序。让我们设计这个实用程序的接口：\n\
  \n```\npackage com.apress.springrecipes.replicator;\n...\npublic interface FileReplicator\
  \ {\npublic String getSrcDir();\npublic void setSrcDir(String srcDir);\npublic String\
  \ getDestDir();\npublic void setDestDir(String destDir);\npublic FileCopier getFileCopier();\n\
  public void setFileCopier(FileCopier fileCopier);\npublic void replicate() throws\
  \ IOException;\n}\n```\n\n源目录和目标目录被设计为复制器对象的属性，而不是方法参数。这意味着每个文件复制器实例仅针对特定的源目录和目标目录复制文件。你可以在应用程序中创建多个复制器实例。\n\
  \n但在实现这个复制器之前，让我们先创建另一个接口，该接口根据给定的文件名将文件从一个目录复制到另一个目录。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  ...\npublic interface FileCopier {\npublic void copyFile(String srcDir, String destDir,\
  \ String filename)\nthrows IOException;\n}\n```\n\n实现这个文件复制器有多种策略。例如，你可以利用 Spring\
  \ 提供的 `FileCopyUtils` 类。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  ...\nimport org.springframework.util.FileCopyUtils;\npublic class FileCopierJMXImpl\
  \ implements FileCopier {\npublic void copyFile(String srcDir, String destDir, String\
  \ filename)\nthrows IOException {\nFile srcFile = new File(srcDir, filename);\n\
  File destFile = new File(destDir, filename);\nFileCopyUtils.copy(srcFile, destFile);\n\
  }\n}\n```\n\n借助文件复制器，你可以实现文件复制器，如下代码所示：\n\n```\npackage com.apress.springrecipes.replicator;\n\
  import java.io.File;\nimport java.io.IOException;\npublic class FileReplicatorJMXImpl\
  \ implements FileReplicator {\nprivate String srcDir;\nprivate String destDir;\n\
  private FileCopier fileCopier;\n// 为简洁起见，省略了 getter 方法\npublic void setSrcDir(String\
  \ srcDir) {\nthis.srcDir = srcDir;\n}\npublic void setDestDir(String destDir) {\n\
  this.destDir = destDir;\n}\npublic void setFileCopier(FileCopier fileCopier) {\n\
  this.fileCopier = fileCopier;\n}\npublic synchronized void replicate() throws IOException\
  \ {\nFile[] files = new File(srcDir).listFiles();\nfor (File file : files) {\nif\
  \ (file.isFile()) {\nfileCopier.copyFile(srcDir, destDir, file.getName());\n}\n\
  }\n}\n}\n```\n\n每次调用 `replicate()` 方法时，源目录中的所有文件都会被复制到目标目录。为了避免并发复制引起的意外问题，你将此方法声明为\
  \ `synchronized`。\n\n\n\n现在，你可以在一个 Java 配置类中配置一个或多个文件复制器实例。`documentReplicator`\
  \ 实例需要引用两个目录：一个用于读取文件的源目录，以及一个用于备份文件的目标目录。此示例中的代码会尝试从操作系统用户主目录下名为 `docs` 的目录中读取文件，然后将其复制到操作系统用户主目录下名为\
  \ `docs_backup` 的文件夹中。\n\n当这个 Bean 启动时，如果这两个目录尚不存在，它会创建它们。\n\n提示\n\n“主目录”因操作系统而异，但在\
  \ Unix 系统上，它通常是 `~` 所解析到的目录。在 Linux 机器上，该文件夹可能是 `/home/user`。在 macOS 上，该文件夹可能是 `/Users/user`，而在\
  \ Windows 上，它可能类似于 `C:\\Documents and Settings\\user`。\n\n```\npackage com.apress.springrecipes.replicator.config;\n\
  ...\n@Configuration\npublic class FileReplicatorConfig {\n@Value(\"#{systemProperties['user.home']}/docs\"\
  )\nprivate String srcDir;\n@Value(\"#{systemProperties['user.home']}/docs_backup\"\
  )\nprivate String destDir;\n@Bean\npublic FileCopier fileCopier() {\nFileCopier\
  \ fCop = new FileCopierJMXImpl();\nreturn fCop;\n}\n@Bean\npublic FileReplicator\
  \ documentReplicator() {\nFileReplicator fRep = new FileReplicatorJMXImpl();\nfRep.setSrcDir(srcDir);\n\
  fRep.setDestDir(destDir);\nfRep.setFileCopier(fileCopier());\nreturn fRep;\n}\n\
  @PostConstruct\npublic void verifyDirectoriesExist() {\nFile src = new File(srcDir);\n\
  File dest = new File(destDir);\nif (!src.exists())\nsrc.mkdirs();\nif (!dest.exists())\n\
  dest.mkdirs();\n}\n}\n```\n\n首先，使用 `@Value` 注解声明了两个字段，以获取用户的主目录并定义源目录和目标目录。接着，使用\
  \ `@Bean` 注解创建了两个 Bean 实例。请注意 `verifyDirectoriesExist()` 方法上的 `@PostConstuct` 注解，它确保了源目录和目标目录的存在。\n\
  \n现在你已经拥有了应用程序的核心 Bean，让我们来看看如何将 Bean 注册和访问为 MBean。\n\n在没有 Spring 支持的情况下注册 MBean\n\
  \n首先，让我们看看如何直接使用 JMX API 注册一个模型 MBean。在下面的 `Main` 类中，你从 IoC 容器中获取 `FileReplicator`\
  \ Bean，并将其注册为用于管理和监控的 MBean。所有属性和方法都包含在 MBean 的管理接口中。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  ...\nimport java.lang.management.ManagementFactory;\nimport javax.management.Descriptor;\n\
  import javax.management.JMException;\nimport javax.management.MBeanServer;\nimport\
  \ javax.management.ObjectName;\nimport javax.management.modelmbean.DescriptorSupport;\n\
  import javax.management.modelmbean.InvalidTargetObjectTypeException;\nimport javax.management.modelmbean.ModelMBeanAttributeInfo;\n\
  import javax.management.modelmbean.ModelMBeanInfo;\nimport javax.management.modelmbean.ModelMBeanInfoSupport;\n\
  import javax.management.modelmbean.ModelMBeanOperationInfo;\nimport javax.management.modelmbean.RequiredModelMBean;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.support.GenericXmlApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) throws IOException {\n\
  ApplicationContext context =\nnew AnnotationConfigApplicationContext(\"com.apress.springrecipes.replicator.config\"\
  );\nFileReplicator documentReplicator = context.getBean(FileReplicator.class);\n\
  try {\nMBeanServer mbeanServer = ManagementFactory.getPlatformMBeanServer();\nObjectName\
  \ objectName = new ObjectName(\"bean:name=documentReplicator\");\nRequiredModelMBean\
  \ mbean = new RequiredModelMBean();\nmbean.setManagedResource(documentReplicator,\
  \ \"objectReference\");\nDescriptor srcDirDescriptor = new DescriptorSupport(new\
  \ String[] {\n\"name=SrcDir\", \"descriptorType=attribute\",\n\"getMethod=getSrcDir\"\
  , \"setMethod=setSrcDir\" });\nModelMBeanAttributeInfo srcDirInfo = new ModelMBeanAttributeInfo(\n\
  \"SrcDir\", \"java.lang.String\", \"Source directory\",\ntrue, true, false, srcDirDescriptor);\n\
  Descriptor destDirDescriptor = new DescriptorSupport(new String[] {\n\"name=DestDir\"\
  , \"descriptorType=attribute\",\n\"getMethod=getDestDir\", \"setMethod=setDestDir\"\
  \ });\nModelMBeanAttributeInfo destDirInfo = new ModelMBeanAttributeInfo(\n\"DestDir\"\
  , \"java.lang.String\", \"Destination directory\",\ntrue, true, false, destDirDescriptor);\n\
  ModelMBeanOperationInfo getSrcDirInfo = new ModelMBeanOperationInfo(\n\"Get source\
  \ directory\",\nFileReplicator.class.getMethod(\"getSrcDir\"));\nModelMBeanOperationInfo\
  \ setSrcDirInfo = new ModelMBeanOperationInfo(\n\"Set source directory\",\nFileReplicator.class.getMethod(\"\
  setSrcDir\", String.class));\nModelMBeanOperationInfo getDestDirInfo = new ModelMBeanOperationInfo(\n\
  \"Get destination directory\",\nFileReplicator.class.getMethod(\"getDestDir\"));\n\
  ModelMBeanOperationInfo setDestDirInfo = new ModelMBeanOperationInfo(\n\"Set destination\
  \ directory\",\nFileReplicator.class.getMethod(\"setDestDir\", String.class));\n\
  ModelMBeanOperationInfo replicateInfo = new ModelMBeanOperationInfo(\n\"Replicate\
  \ files\",\nFileReplicator.class.getMethod(\"replicate\"));\nModelMBeanInfo mbeanInfo\
  \ = new ModelMBeanInfoSupport(\n\"FileReplicator\", \"File replicator\",\nnew ModelMBeanAttributeInfo[]\
  \ { srcDirInfo, destDirInfo },\nnull,\nnew ModelMBeanOperationInfo[] { getSrcDirInfo,\
  \ setSrcDirInfo,\ngetDestDirInfo, setDestDirInfo, replicateInfo },\nnull);\nmbean.setModelMBeanInfo(mbeanInfo);\n\
  mbeanServer.registerMBean(mbean, objectName);\n} catch (JMException e) {\n...\n\
  } catch (InvalidTargetObjectTypeException e) {\n...\n} catch (NoSuchMethodException\
  \ e) {\n...\n}\nSystem.in.read();\n}\n}\n```\n\n要注册一个 MBean，你需要一个 `javax.managment.MBeanServer`\
  \ 接口的实例。你可以调用静态方法 `ManagementFactory.getPlatformMBeanServer()` 来定位一个平台 MBean 服务器。如果不存在\
  \ MBean 服务器，它会创建一个，然后注册该服务器实例以供将来使用。每个 MBean 都需要一个包含域名的 MBean 对象名称。上述 MBean 在域 `bean`\
  \ 下以名称 `documentReplicator` 注册。\n\n\n\n从上述代码可以看出，对于每个 MBean 属性和 MBean 操作，你需要创建一个\
  \ `ModelMBeanAttributeInfo` 对象和一个 `ModelMBeanOperationInfo` 对象来进行描述。之后，你需要通过整合上述信息，创建一个\
  \ `ModelMBeanInfo` 对象来描述 MBean 的管理接口。关于这些类的使用细节，你可以查阅它们的 Javadocs。此外，在调用 JMX API\
  \ 时，你必须处理 JMX 特有的异常。这些异常是必须处理的受检异常。请注意，在使用 JMX 客户端工具查看应用程序内部状态之前，必须防止应用程序终止。使用 `System.in.read()`\
  \ 从控制台请求一个键值是一个不错的选择。\n\n最后，你需要添加 VM 参数 `-Dcom.sun.management.jmxremote` 来启用对此应用程序的本地监控。如果你使用的是本书的源代码，可以使用以下命令：\n\
  \n```\njava -Dcom.sun.management.jmxremote -jar  Recipe_13_1_i-4.0.0.jar\n```\n\n\
  现在，你可以使用任何 JMX 客户端工具在本地监控你的 MBeans。最简单的工具是 JConsole，它随 JDK 一起提供。要启动 JConsole，只需执行位于\
  \ JDK 安装目录 `bin` 文件夹中的 `jconsole` 可执行文件。\n\n当 JConsole 启动时，你可以在连接窗口的“本地”选项卡中看到已启用\
  \ JMX 的应用程序列表。选择与正在运行的 Spring 应用程序对应的进程（即 `Recipe_13_1_i-1.0-SNAPSHOT.jar`）。如图 13-1\
  \ 所示。\n\n![A314861_4_En_13_Fig1_HTML.jpg](img/A314861_4_En_13_Fig1_HTML.jpg)\n\n\
  图 13-1.\n\nJConsole 启动窗口\n\n警告\n\n如果你使用的是 Windows 系统，可能在 JConsole 中看不到任何进程。这是一个已知的\
  \ bug，即 JConsole 无法检测到正在运行的 Java 进程。要解决此问题，你需要确保用户在临时文件夹中拥有 `hsperfdata` 文件夹。Java\
  \ 和 JConsole 使用此文件夹来跟踪正在运行的进程，但它可能不存在。例如，如果你以用户 John.Doe 身份运行应用程序，请确保以下路径存在：`C:\\\
  Users\\John.Doe\\AppData\\Local\\Temp\\hsperfdata_John.Doe\\`。\n\n连接到复制应用程序后，转到\
  \ MBeans 选项卡。接下来，单击左侧树中的 Bean 文件夹，然后点击“操作”部分。在主屏幕上，你将看到一系列用于调用 Bean 操作的按钮。要调用 `replicate()`，只需单击“replicate”按钮。此屏幕如图\
  \ 13-2 所示。\n\n![A314861_4_En_13_Fig2_HTML.jpg](img/A314861_4_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2.\n\nJConsole 模拟 Spring Bean 操作\n\n你将看到一个“方法成功调用”的弹出窗口。通过此操作，源文件夹中的所有过滤器都会被复制/同步到目标文件夹中。\n\
  \n使用 Spring 支持注册 MBean\n\n之前的应用程序直接依赖于 JMX API。正如你在 `Main` 应用程序类中所见，存在大量难以编写、管理和有时难以理解的代码。要将\
  \ Spring IoC 容器中配置的 Bean 导出为 MBean，你只需创建一个 `MBeanExporter` 实例，并指定要导出的 Bean，以其 MBean\
  \ 对象名称作为键。这可以通过添加以下配置类来完成。请注意，`beansToExport` 映射中的键条目被用作对应条目值所引用 Bean 的 `ObjectName`。\n\
  \n```\npackage com.apress.springrecipes.replicator.config;\nimport com.apress.springrecipes.replicator.FileReplicator;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jmx.export.MBeanExporter;\n\
  import java.util.HashMap;\nimport java.util.Map;\n@Configuration\npublic class JmxConfig\
  \ {\n@Autowired\nprivate FileReplicator fileReplicator;\n@Bean\npublic MBeanExporter\
  \ mbeanExporter() {\nMBeanExporter mbeanExporter = new MBeanExporter();\nmbeanExporter.setBeans(beansToExport());\n\
  return mbeanExporter;\n}\nprivate Map beansToExport() {\nMap beansToExport = new\
  \ HashMap();\nbeansToExport.put(\"bean:name=documentReplicator\", fileReplicator);\n\
  return beansToExport;\n}\n}\n```\n\n上述配置将 `FileReplicator` Bean 导出为 MBean，位于域 bean\
  \ 下，名称为 `documentReplicator`。默认情况下，所有公共属性都作为属性包含在内，所有公共方法（`java.lang.Object` 中的方法除外）都作为操作包含在\
  \ MBean 的管理接口中。借助 Spring JMX `MBeanExporter`，应用程序中的主类可以缩减为以下几行：\n\n```\npackage\
  \ com.apress.springrecipes.replicator;\n...\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) throws IOException {\n\
  new AnnotationConfigApplicationContext(\"com.apress.springrecipes.replicator.config\"\
  );\nSystem.in.read();\n}\n}\n```\n\n处理多个 MBean 服务器实例\n\nSpring `MBeanExporter` 方法可以隐式地定位\
  \ MBean 服务器实例并向其注册 MBean。JDK 在首次定位 MBean 服务器时会创建一个，因此无需显式创建。如果应用程序在提供 MBean 服务器的环境（例如\
  \ Java 应用服务器）中运行，情况也是如此。\n\n但是，如果你有多个 MBean 服务器在运行，则需要告诉 `mbeanServer` Bean 它应该绑定到哪个服务器。你可以通过指定服务器的\
  \ `agentId` 值来实现。要确定 JConsole 中给定服务器的 `agentId` 值，请转到 MBeans 选项卡，在左侧树中依次进入 JMImplementation/MBeanServerDelegate/Attributes/MBeanServerId。在那里，你将看到字符串值。在我们的本地机器上，该值为\
  \ `workstation_1253860476443`。要启用它，请配置 MBeanServer 的 `agentId` 属性。\n\n```\n@Bean\n\
  public MBeanServerFactoryBean mbeanServer() {\nMBeanServerFactoryBean mbeanServer\
  \ = new MBeanServerFactoryBean();\nmbeanServer.setLocateExistingServerIfPossible(true);\n\
  mbeanServer.setAgentId(\"workstation_1253860476443\");\nreturn mbeanServer;\n}\n\
  ```\n\n如果你的上下文中存在多个 MBean 服务器实例，你可以为 `MBeanExporter` 显式指定一个特定的 MBean 服务器来导出你的 MBean。在这种情况下，`MBeanExporter`\
  \ 不会定位 MBean 服务器；它将使用指定的 MBean 服务器实例。当有多个 MBean 服务器可用时，此属性用于指定一个特定的 MBean 服务器。\n\
  \n```\n@Bean\npublic MBeanExporter mbeanExporter() {\nMBeanExporter mbeanExporter\
  \ = new MBeanExporter();\nmbeanExporter.setBeans(beansToExport());\nmbeanExporter.setServer(mbeanServer().getObject());\n\
  return mbeanExporter;\n}\n@Bean\npublic MBeanServerFactoryBean mbeanServer() {\n\
  MBeanServerFactoryBean mbeanServer = new MBeanServerFactoryBean();\nmbeanServer.setLocateExistingServerIfPossible(true);\n\
  return mbeanServer;\n}\n```\n\n通过 RMI 注册 MBean 以实现远程访问\n\n\n\n如果你希望你的 MBeans 能够被远程访问，你需要为\
  \ JMX 启用一个远程协议。JSR-160 通过 JMX 连接器定义了 JMX 远程连接的标准。Spring 允许你通过 `ConnectorServerFactoryBean`\
  \ 创建一个 JMX 连接器服务器。\n默认情况下，`ConnectorServerFactoryBean` 会创建并启动一个绑定到服务 URL `service:jmx:jmxmp://localhost:9875`\
  \ 的 JMX 连接器服务器，该服务器通过 JMX 消息协议（JMXMP）暴露 JMX 连接器。然而，大多数 JMX 实现并不支持 JMXMP。因此，你应该为你的\
  \ JMX 连接器选择一个广泛支持的远程协议，例如 RMI。要通过特定协议暴露你的 JMX 连接器，你只需为其提供服务 URL 即可。\n\n```\n@Bean\n\
  public FactoryBean rmiRegistry() {\nreturn new RmiRegistryFactoryBean();\n}\n@Bean\n\
  @DependsOn(\"rmiRegistry\")\npublic FactoryBean connectorServer() {\nConnectorServerFactoryBean\
  \ connectorServerFactoryBean = new ConnectorServerFactoryBean();\nconnectorServerFactoryBean\n\
  .setServiceUrl(\"service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator\"\
  );\nreturn connectorServerFactoryBean;\n}\n```\n\n你指定上述 URL 是为了将你的 JMX 连接器绑定到一个监听在\
  \ `localhost` 的 1099 端口上的 RMI 注册表。如果没有外部创建 RMI 注册表，你应该使用 `RmiRegistryFactoryBean`\
  \ 创建一个。该注册表的默认端口是 1099，但你可以在其 port 属性中指定另一个端口。请注意，`ConnectorServerFactoryBean` 必须在\
  \ RMI 注册表创建并准备就绪之后才能创建连接器服务器。你可以为此设置 `depends-on` 属性。\n\n现在，你的 MBeans 可以通过 RMI 进行远程访问了。请注意，无需像之前的应用那样使用\
  \ JMX 的 `-Dcom.sun.management.jmxremote` 标志来启动支持 RMI 的应用。当 JConsole 启动时，你可以在连接窗口的“远程进程”部分的服务\
  \ URL 中输入 `service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator`。如图\
  \ 13-3 所示。\n\n![A314861_4_En_13_Fig3_HTML.jpg](img/A314861_4_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3. 通过 RMI 使用 JConsole 连接 MBean\n\n一旦连接建立，你就可以像之前的示例一样调用 bean 的方法。\n\n组装 MBeans\
  \ 的管理接口\n\n默认情况下，Spring 的 `MBeanExporter` 会将 bean 的所有公共属性导出为 MBean 属性，并将所有公共方法导出为\
  \ MBean 操作。但你可以使用 MBean 装配器来组装 MBeans 的管理接口。Spring 中最简单的 MBean 装配器是 `MethodNameBasedMBeanInfoAssembler`，它允许你指定要导出的方法名称。\n\
  \n```\n@Configuration\npublic class JmxConfig {\n...\n@Bean\npublic MBeanExporter\
  \ mbeanExporter() {\nMBeanExporter mbeanExporter = new MBeanExporter();\nmbeanExporter.setBeans(beansToExport());\n\
  mbeanExporter.setAssembler(assembler());\nreturn mbeanExporter;\n}\n@Bean\npublic\
  \ MBeanInfoAssembler assembler() {\nMethodNameBasedMBeanInfoAssembler assembler;\n\
  assembler = new MethodNameBasedMBeanInfoAssembler();\nassembler.setManagedMethods(new\
  \ String[] {\"getSrcDir\",\"setSrcDir\",\"getDestDir\",\"setDestDir\",\"replicate\"\
  });\nreturn assembler;\n}\n}\n```\n\n另一个 MBean 装配器是 `InterfaceBasedMBeanInfoAssembler`，它会导出你指定的接口中定义的所有方法。\n\
  \n```\n@Bean\npublic MBeanInfoAssembler assembler() {\nInterfaceBasedMBeanInfoAssembler\
  \ assembler = new InterfaceBasedMBeanInfoAssembler();\nassembler.setManagedInterfaces(new\
  \ Class[] {FileReplicator.class});\nreturn assembler;\n}\n```\n\nSpring 还提供了 `MetadataMBeanInfoAssembler`，用于根据\
  \ bean 类中的元数据来组装 MBean 的管理接口。它支持两种类型的元数据：JDK 注解和 Apache Commons 属性（在幕后，这是通过一个名为\
  \ `JmxAttributeSource` 的策略接口实现的）。对于使用 JDK 注解标注的 bean 类，你需要指定一个 `AnnotationJmxAttributeSource`\
  \ 实例作为 `MetadataMBeanInfoAssembler` 的属性源。\n\n```\n@Bean\npublic MBeanInfoAssembler\
  \ assembler() {\nMetadataMBeanInfoAssembler assembler = new MetadataMBeanInfoAssembler();\n\
  assembler.setAttributeSource(new AnnotationJmxAttributeSource());\nreturn assembler;\n\
  }\n```\n\n然后，你使用 `@ManagedResource`、`@ManagedAttribute` 和 `@ManagedOperation` 注解来标注你的\
  \ bean 类和方法，以便 `MetadataMBeanInfoAssembler` 为该 bean 组装管理接口。这些注解很容易理解。它们会暴露它们所标注的元素。如果你有一个符合\
  \ JavaBeans 规范的属性，JMX 会使用术语“属性”。类本身被称为“资源”。在 JMX 中，方法被称为“操作”。了解了这些，就很容易看出以下代码的作用：\n\
  \n```\npackage com.apress.springrecipes.replicator;\n...\nimport org.springframework.jmx.export.annotation.ManagedAttribute;\n\
  import org.springframework.jmx.export.annotation.ManagedOperation;\nimport org.springframework.jmx.export.annotation.ManagedResource;\n\
  @ManagedResource(description = \"文件复制器\")\npublic class FileReplicatorJMXImpl implements\
  \ FileReplicator {\n...\n@ManagedAttribute(description = \"获取源目录\")\npublic String\
  \ getSrcDir() {\n...\n}\n@ManagedAttribute(description = \"设置源目录\")\npublic void\
  \ setSrcDir(String srcDir) {\n...\n}\n@ManagedAttribute(description = \"获取目标目录\"\
  )\npublic String getDestDir() {\n...\n}\n@ManagedAttribute(description = \"设置目标目录\"\
  )\npublic void setDestDir(String destDir) {\n...\n}\n...\n@ManagedOperation(description\
  \ = \"复制文件\")\npublic synchronized void replicate() throws IOException {\n...\n\
  }\n}\n```\n\n使用注解注册 MBeans\n\n除了使用 `MBeanExporter` 显式导出 bean 之外，你还可以简单地配置其子类 `AnnotationMBeanExporter`，以从\
  \ IoC 容器中声明的 bean 中自动检测 MBeans。你无需为此导出器配置 MBean 装配器，因为它默认使用带有 `AnnotationJmxAttributeSource`\
  \ 的 `MetadataMBeanInfoAssembler`。你可以删除此注册之前的 beans 和 assembler 属性，只需保留以下内容：\n\n\
  ```\n@Configuration\npublic class JmxConfig {\n@Bean\npublic MBeanExporter mbeanExporter()\
  \ {\nAnnotationMBeanExporter mbeanExporter = new AnnotationMBeanExporter();\nreturn\
  \ mbeanExporter;\n}\n}\n```\n\n`AnnotationMBeanExporter` 会检测 IoC 容器中配置的带有 `@ManagedResource`\
  \ 注解的任何 bean，并将它们导出为 MBeans。默认情况下，此导出器会将 bean 导出到与其包名同名的域中。此外，它使用 IoC 容器中的 bean\
  \ 名称作为其 MBean 名称，并使用 bean 的短类名作为其类型。因此，`documentReplicator` bean 将在以下 MBean 对象名称下导出：`com.apress.springrecipes.replicator:name=documentReplicator,\
  \ type=FileReplicatorJMXImpl`。\n\n如果你不想使用包名作为域名，你可以通过添加 `defaultDomain` 属性来为导出器设置默认域：\n\
  \n```\n@Bean\npublic MBeanExporter mbeanExporter() {\nAnnotationMBeanExporter mbeanExporter\
  \ = new AnnotationMBeanExporter();\nmbeanExporter.setDefaultDomain(\"bean\");\n\
  return mbeanExporter;\n}\n```\n\n将默认域设置为 bean 后，`documentReplicator` bean 将在以下 MBean\
  \ 对象名称下导出：\n\n```\nbean:name=documentReplicator,type=FileReplicatorJMXImpl\n```\n\
  \n\n\n此外，你可以在 `@ManagedResource` 注解的 `objectName` 属性中指定 Bean 的 MBean 对象名称。例如，你可以通过以下注解将文件复制器导出为\
  \ MBean：\n\n```\npackage com.apress.springrecipes.replicator;\n...\nimport org.springframework.jmx.export.annotation.ManagedOperation;\n\
  import org.springframework.jmx.export.annotation.ManagedOperationParameter;\nimport\
  \ org.springframework.jmx.export.annotation.ManagedOperationParameters;\nimport\
  \ org.springframework.jmx.export.annotation.ManagedResource;\n@ManagedResource(\n\
  objectName = \"bean:name=fileCopier,type=FileCopierJMXImpl\",\ndescription = \"\
  文件复制器\")\npublic class FileCopierImpl implements FileCopier {\n@ManagedOperation(\n\
  description = \"将文件从源目录复制到目标目录\")\n@ManagedOperationParameters( {\n@ManagedOperationParameter(\n\
  name = \"srcDir\", description = \"源目录\"),\n@ManagedOperationParameter(\nname =\
  \ \"destDir\", description = \"目标目录\"),\n@ManagedOperationParameter(\nname = \"\
  filename\", description = \"要复制的文件\") })\npublic void copyFile(String srcDir, String\
  \ destDir, String filename)\nthrows IOException {\n...\n}\n}\n```\n\n然而，以这种方式指定对象名称仅适用于你将在\
  \ IoC 容器中创建单个实例的类（例如，文件复制器），而不适用于你可能创建多个实例的类（例如，文件复制器）。这是因为你只能为一个类指定一个对象名称。因此，你不应在不更改名称的情况下多次运行同一服务器。\n\
  \n最后，另一种可能性是依赖 Spring 类扫描来导出带有 `@ManagedResource` 注解的 MBean。如果 Bean 在 Java 配置类中初始化，你可以使用\
  \ `@EnableMBeanExport` 注解来装饰配置类。这会告诉 Spring 导出任何使用 `@Bean` 注解创建且带有 `@EnableMBeanSupport`\
  \ 注解的 Bean。\n\n```\npackage com.apress.springrecipes.replicator.config;\n...\nimport\
  \ org.springframework.context.annotation.EnableMBeanExport;\n@Configuration\n@EnableMBeanExport\n\
  public class FileReplicatorConfig {\n....\n@Bean\npublic FileReplicatorJMXImpl documentReplicator()\
  \ {\nFileReplicatorJMXImpl fRep = new FileReplicatorJMXImpl();\nfRep.setSrcDir(srcDir);\n\
  fRep.setDestDir(destDir);\nfRep.setFileCopier(fileCopier());\nreturn fRep;\n}\n\
  ...\n}\n```\n\n由于存在 `@EnableMBeanExport` 注解，类型为 `FileReplicatorJMXImpl` 的 Bean `documentReplicatior`\
  \ 会被导出为 MBean，因为其源代码使用了 `@ManagedResource` 注解进行装饰。\n\n注意\n\n`@EnableMBeanExport`\
  \ 注解的使用是针对带有具体类的 `@Bean` 实例，而不是像之前示例中的接口。基于接口的 Bean 会隐藏目标类以及 JMX 托管资源注解，导致 MBean\
  \ 不会被导出。\n\n13-2. 发布和监听 JMX 通知\n\n问题\n\n你希望从你的 MBean 发布 JMX 通知，并使用 JMX 通知监听器监听这些通知。\n\
  \n解决方案\n\nSpring 允许你的 Bean 通过 `NotificationPublisher` 接口发布 JMX 通知。你还可以在 IoC 容器中注册标准的\
  \ JMX 通知监听器来监听 JMX 通知。\n\n工作原理\n\n要发布事件，你需要访问 `NotificationPublisher`，你可以通过实现 `NotificationPublisherAware`\
  \ 接口来获得 Spring 的访问权限。要监听事件，你可以使用默认的 JMX 构造，即实现 `NotificationListener` 接口，并将此实现注册到\
  \ JMX。\n\n发布 JMX 通知\n\nSpring IoC 容器支持将要导出为 MBean 的 Bean 发布 JMX 通知。这些 Bean 必须实现\
  \ `NotificationPublisherAware` 接口才能访问 `NotificationPublisher`，从而发布通知。\n\n```\npackage\
  \ com.apress.springrecipes.replicator;\n...\nimport javax.management.Notification;\n\
  import org.springframework.jmx.export.notification.NotificationPublisher;\nimport\
  \ org.springframework.jmx.export.notification.NotificationPublisherAware;\n@ManagedResource(description\
  \ = \"文件复制器\")\npublic class FileReplicatorImpl implements FileReplicator,\nNotificationPublisherAware\
  \ {\n...\nprivate int sequenceNumber;\nprivate NotificationPublisher notificationPublisher;\n\
  public void setNotificationPublisher(\nNotificationPublisher notificationPublisher)\
  \ {\nthis.notificationPublisher = notificationPublisher;\n}\n@ManagedOperation(description\
  \ = \"复制文件\")\npublic void replicate() throws IOException {\nnotificationPublisher.sendNotification(\n\
  new Notification(\"replication.start\", this, sequenceNumber));\n...\nnotificationPublisher.sendNotification(\n\
  new Notification(\"replication.complete\", this, sequenceNumber));\nsequenceNumber++;\n\
  }\n}\n```\n\n在这个文件复制器中，每当复制开始或完成时，你都会发送一个 JMX 通知。该通知既会在控制台的标准输出中可见，也会在 JConsole\
  \ 的 MBean 选项卡的通知菜单中可见，如图 13-4 所示。\n\n![A314861_4_En_13_Fig4_HTML.jpg](img/A314861_4_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4. JConsole 中报告的 MBean 事件\n\n要在 JConsole 中查看通知，你必须首先点击底部出现的“订阅”按钮，如图 13-4\
  \ 所示。然后，当你使用 JConsole 中 MBean 操作部分的按钮调用 `replicate()` 方法时，你将看到两个新通知到达。Notification\
  \ 构造函数中的第一个参数是通知类型，第二个参数是通知源。\n\n监听 JMX 通知\n\n现在，让我们创建一个通知监听器来监听 JMX 通知。由于监听器会收到许多不同类型的通知，例如当\
  \ MBean 的属性发生更改时的 `javax.management.AttributeChangeNotification`，你必须过滤出你感兴趣处理的通知。\n\
  \n```\npackage com.apress.springrecipes.replicator;\nimport javax.management.Notification;\n\
  import javax.management.NotificationListener;\npublic class ReplicationNotificationListener\
  \ implements NotificationListener {\npublic void handleNotification(Notification\
  \ notification, Object handback) {\nif (notification.getType().startsWith(\"replication\"\
  )) {\nSystem.out.println(\nnotification.getSource() + \" \" +\nnotification.getType()\
  \ + \" #\" +\nnotification.getSequenceNumber());\n}\n}\n}\n```\n\n然后，你可以将此通知监听器注册到你的\
  \ MBean 导出器，以监听来自特定 MBean 发出的通知。\n\n```\n@Bean\npublic AnnotationMBeanExporter mbeanExporter()\
  \ {\nAnnotationMBeanExporter mbeanExporter = new AnnotationMBeanExporter();\nmbeanExporter.setDefaultDomain(\"\
  bean\");\nmbeanExporter.setNotificationListenerMappings(notificationMappings());\n\
  return mbeanExporter;\n}\npublic Map notificationMappings() {\nMap mappings = new\
  \ HashMap();\nmappings.put(\"bean:name=documentReplicator,type=FileReplicatorJMXImpl\"\
  ,\nnew ReplicationNotificationListener());\nreturn mappings;\n}\n```\n\n13-3. 在\
  \ Spring 中访问远程 JMX MBean\n\n问题\n\n你希望访问由 JMX 连接器暴露的、运行在远程 MBean 服务器上的 JMX MBean。当直接使用\
  \ JMX API 访问远程 MBean 时，你必须编写复杂的 JMX 特定代码。\n\n解决方案\n\nSpring 提供了两种简化远程 MBean 访问的方法。首先，它提供了一个工厂\
  \ Bean 来声明式地创建 MBean 服务器连接。通过此服务器连接，你可以查询和更新 MBean 的属性，以及调用其操作。其次，Spring 提供了另一个工厂\
  \ Bean，允许你为远程 MBean 创建代理。通过此代理，你可以像操作本地 Bean 一样操作远程 MBean。\n\n工作原理\n\n\n\n为了简化 JMX\
  \ 的使用，Spring 提供了两种方法：一种是通过帮助配置与 MBean 服务器的连接，来简化纯 JMX 的使用；另一种则更类似于 Spring 的其他远程技术，通过为远程\
  \ MBean 提供代理来实现。\n\n## 通过 MBean 服务器连接访问远程 MBean\n\nJMX 客户端需要 MBean 服务器连接才能访问在远程\
  \ MBean 服务器上运行的 MBean。Spring 提供了 `org.springframework.jmx.support.MBeanServerConnectionFactoryBean`，供您以声明方式创建与远程支持\
  \ JSR-160 的 MBean 服务器的连接。您只需提供服务 URL 即可定位 MBean 服务器。现在，让我们在客户端 Bean 配置类中声明这个工厂 Bean。\n\
  \n```\npackage com.apress.springrecipes.replicator.config;\nimport org.springframework.beans.factory.FactoryBean;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jmx.support.MBeanServerConnectionFactoryBean;\nimport\
  \ javax.management.MBeanServerConnection;\nimport java.net.MalformedURLException;\n\
  @Configuration\npublic class JmxClientConfiguration {\n@Bean\npublic FactoryBean\
  \ mbeanServerConnection()\nthrows MalformedURLException {\nMBeanServerConnectionFactoryBean\
  \ mBeanServerConnectionFactoryBean =\nnew MBeanServerConnectionFactoryBean();\n\
  mBeanServerConnectionFactoryBean\n.setServiceUrl(\"service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator\"\
  );\nreturn mBeanServerConnectionFactoryBean;\n}\n}\n```\n\n通过此工厂 Bean 创建的 MBean\
  \ 服务器连接，您可以访问并操作在端口 1099 上运行的 RMI 服务器上的 MBean。\n\n**提示**\n\n您可以使用配方 13-1 中介绍的 RMI\
  \ 服务器，该服务器会暴露 MBean。如果您使用的是本书的源代码，在使用 Gradle 构建应用程序后，可以使用以下命令启动服务器：`java -jar Recipe_14_1_iii-1.0-SNAPSHOT.jar`。\n\
  \n建立连接后，您可以通过 `getAttribute()` 和 `setAttribute()` 方法查询和更新 MBean 的属性，只需提供 MBean 的对象名称和属性名称。您还可以使用\
  \ `invoke()` 方法调用 MBean 的操作。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  import javax.management.Attribute;\nimport javax.management.MBeanServerConnection;\n\
  import javax.management.ObjectName;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.support.Generic XmlApplicationContext;\npublic\
  \ class Client {\npublic static void main(String[] args) throws Exception {\nApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(\"com.apress.springrecipes.replicator.config\"\
  );\nMBeanServerConnection mbeanServerConnection =\ncontext.getBean(MBeanServerConnection.class);\n\
  ObjectName mbeanName = new ObjectName(\"bean:name=documentReplicator\");\nString\
  \ srcDir = (String) mbeanServerConnection.getAttribute(mbeanName, \"SrcDir\");\n\
  mbeanServerConnection.setAttribute(mbeanName,     new Attribute(\"DestDir\", srcDir\
  \ + \"_backup\"));\nmbeanServerConnection.invoke(mbeanName, \"replicate\", new Object[]\
  \ {}, new String[] {});\n}\n}\n```\n\n此外，让我们创建一个 JMX 通知监听器，以便监听文件复制通知。\n\n```\n\
  package com.apress.springrecipes.replicator;\nimport javax.management.Notification;\n\
  import javax.management.NotificationListener;\npublic class ReplicationNotificationListener\
  \ implements NotificationListener {\npublic void handleNotification(Notification\
  \ notification, Object handback) {\nif (notification.getType().startsWith(\"replication\"\
  )) {\nSystem.out.println(\nnotification.getSource() + \" \" +\nnotification.getType()\
  \ + \" #\" +\nnotification.getSequenceNumber());\n}\n}\n}\n```\n\n您可以将此通知监听器注册到\
  \ MBean 服务器连接，以监听从此 MBean 服务器发出的通知。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  ...\nimport javax.management.MBeanServerConnection;\nimport javax.management.ObjectName;\n\
  public class Client {\npublic static void main(String[] args) throws Exception {\n\
  ...\nMBeanServerConnection mbeanServerConnection =\n(MBeanServerConnection) context.getBean(\"\
  mbeanServerConnection\");\nObjectName mbeanName = new ObjectName(\n\"bean:name=documentReplicator\"\
  );\nmbeanServerConnection.addNotificationListener(\nmbeanName, new ReplicationNotificationListener(),\
  \ null, null);\n...\n}\n}\n```\n\n运行此应用程序客户端后，请检查 RMI 服务器应用程序的 JConsole——使用远程进程设置为\
  \ `service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator`。在 MBeans 选项卡的\
  \ Notifications 菜单下，您将看到类型为 `jmx.attribute.change` 的新通知，如图 13-5 所示。\n\n![A314861_4_En_13_Fig5_HTML.jpg](img/A314861_4_En_13_Fig5_HTML.jpg)\n\
  \n**图 13-5.** 通过 RMI 调用的 JConsole 通知事件\n\n## 通过 MBean 代理访问远程 MBean\n\nSpring 提供的另一种远程\
  \ MBean 访问方法是通过 `MBeanProxy`，它可以通过 `MBeanProxyFactoryBean` 创建。\n\n```\npackage com.apress.springrecipes.replicator.config;\n\
  ...\nimport org.springframework.beans.factory.FactoryBean;\nimport org.springframework.jmx.access.MBeanProxyFactoryBean;\n\
  import org.springframework.jmx.support.MBeanServerConnectionFactoryBean;\nimport\
  \ javax.management.MBeanServerConnection;\nimport java.net.MalformedURLException;\n\
  @Configuration\npublic class JmxClientConfiguration {\n...\n@Bean\npublic MBeanProxyFactoryBean\
  \ fileReplicatorProxy() throws Exception {\nMBeanProxyFactoryBean fileReplicatorProxy\
  \ = new MBeanProxyFactoryBean();\nfileReplicatorProxy.setServer(mbeanServerConnection().getObject());\n\
  fileReplicatorProxy.setObjectName(\"bean:name=documentReplicator\");\nfileReplicatorProxy.setProxyInterface(FileReplicator.class);\n\
  return fileReplicatorProxy;\n}\n}\n```\n\n您需要指定要代理的 MBean 的对象名称和服务器连接。最重要的是代理接口，其本地方法调用将在后台转换为远程\
  \ MBean 调用。现在，您可以通过此代理操作远程 MBean，就像操作本地 Bean 一样。前面直接在 MBean 服务器连接上调用的 MBean 操作可以简化为如下形式：\n\
  \n```\npackage com.apress.springrecipes.replicator;\n...\npublic class Client {\n\
  public static void main(String[] args) throws Exception {\n...\nFileReplicator fileReplicatorProxy\
  \ = context.getBean(FileReplicator.class);\nString srcDir = fileReplicatorProxy.getSrcDir();\n\
  fileReplicatorProxy.setDestDir(srcDir + \"_backup\");\nfileReplicatorProxy.replicate();\n\
  }\n}\n```\n\n## 13-4. 使用 Spring 的邮件支持发送电子邮件\n\n### 问题\n\n许多应用程序需要发送电子邮件。在 Java 应用程序中，您可以使用\
  \ JavaMail API 发送电子邮件。但是，使用 JavaMail 时，您必须处理 JavaMail 特定的邮件会话和异常。因此，应用程序会变得依赖 JavaMail，并且难以切换到其他电子邮件\
  \ API。\n\n### 解决方案\n\nSpring 的邮件支持通过提供一个抽象且与实现无关的 API 来发送电子邮件，从而简化了电子邮件的发送。Spring\
  \ 邮件支持的核心接口是 `MailSender`。`JavaMailSender` 接口是 `MailSender` 的子接口，它包含了专门的 JavaMail\
  \ 特性，例如多用途互联网邮件扩展（MIME）消息支持。要发送包含 HTML 内容、内嵌图片或附件的电子邮件，您必须将其作为 MIME 消息发送。\n\n###\
  \ 工作原理\n\n假设您希望前面配方中的文件复制器应用程序在发生任何错误时通知管理员。首先，创建以下 `ErrorNotifier` 接口，其中包含一个用于通知文件复制错误的方法：\n\
  \n\n\n```\npackage com.apress.springrecipes.replicator;\npublic interface ErrorNotifier\
  \ {\npublic void notifyCopyError(String srcDir, String destDir, String filename);\n\
  }\n```\n\n注意\n\n在发生错误时调用此通知器的实现留待您自行完成。\n由于您可以将错误处理视为横切关注点，AOP\n将是解决此问题的理想方案。您可以编写一个后置抛出通知来调用此通知器。\n\
  \n接下来，您可以实现此接口，以您选择的方式发送通知。\n最常见的方式是发送电子邮件。在以这种方式实现接口之前，\n您可能需要一个支持简单邮件传输协议（SMTP）的本地邮件服务器\n\
  用于测试目的。我们推荐安装 Apache James Server（[`http://james.apache.org/server/index.html`](http://james.apache.org/server/index.html)），它易于安装和配置。\n\
  \n注意\n\n您可以从 Apache James 网站下载 Apache James Server（例如版本 2.3.2），\n并将其解压到您选择的目录中即可完成安装。\n\
  要启动它，只需执行运行脚本（位于 `bin` 目录中）。\n\n让我们创建两个用户账户，用于通过此服务器发送和接收电子邮件。\n默认情况下，James 的远程管理服务监听\
  \ 4555 端口。您可以使用控制台\ntelnet 到此端口，并运行以下命令来添加用户 system 和 admin，其密码均为 12345：\n\n```\n\
  > telnet 127.0.0.1 4555\nJAMES Remote Administration Tool 2.3.2\nPlease enter your\
  \ login and password\nLogin id:\nroot\nPassword:\nitroot\nWelcome root. HELP for\
  \ a list of commands\nadduser system 12345\nUser system added\nadduser admin 12345\n\
  User admin added\nlistusers\nExisting accounts 2\nuser: admin\nuser: system\nquit\n\
  Bye\n```\n\n使用 JavaMail API 发送电子邮件\n\n现在，让我们看看如何使用 JavaMail API 发送电子邮件。您可以实现\n`ErrorNotifier`\
  \ 接口，在发生错误时发送电子邮件通知。\n\n```\npackage com.apress.springrecipes.replicator;\nimport\
  \ java.util.Properties;\nimport javax.mail.Message;\nimport javax.mail.MessagingException;\n\
  import javax.mail.Session;\nimport javax.mail.Transport;\nimport javax.mail.internet.InternetAddress;\n\
  import javax.mail.internet.MimeMessage;\npublic class EmailErrorNotifier implements\
  \ ErrorNotifier {\npublic void notifyCopyError(String srcDir, String destDir, String\
  \ filename) {\nProperties props = new Properties();\nprops.put(\"mail.smtp.host\"\
  , \"localhost\");\nprops.put(\"mail.smtp.port\", \"25\");\nprops.put(\"mail.smtp.username\"\
  , \"system\");\nprops.put(\"mail.smtp.password\", \"12345\");\nSession session =\
  \ Session.getDefaultInstance(props, null);\ntry {\nMessage message = new MimeMessage(session);\n\
  message.setFrom(new InternetAddress(\"system@localhost\"));\nmessage.setRecipients(Message.RecipientType.TO,\n\
  InternetAddress.parse(\"admin@localhost\"));\nmessage.setSubject(\"File Copy Error\"\
  );\nmessage.setText(\n\"Dear Administrator,\\n\\n\" +\n\"An error occurred when\
  \ copying the following file :\\n\" +\n\"Source directory : \" + srcDir + \"\\n\"\
  \ +\n\"Destination directory : \" + destDir + \"\\n\" +\n\"Filename : \" + filename);\n\
  Transport.send(message);\n} catch (MessagingException e) {\nthrow new RuntimeException(e);\n\
  }\n}\n}\n```\n\n首先，通过定义属性打开一个连接到 SMTP 服务器的邮件会话。然后，从该会话创建一条消息来构建您的电子邮件。之后，通过调用 `Transport.send()`\
  \ 发送电子邮件。在使用 JavaMail API 时，您必须处理受检异常 `MessagingException`。请注意，所有这些类、接口和异常均由 JavaMail\
  \ 定义。\n\n接下来，在 Spring IoC 容器中声明一个 `EmailErrorNotifier` 实例，用于在文件复制错误时发送电子邮件通知。\n\n\
  ```\npackage com.apress.springrecipes.replicator.config;\nimport com.apress.springrecipes.replicator.EmailErrorNotifier;\n\
  import com.apress.springrecipes.replicator.ErrorNotifier;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration\npublic\
  \ class MailConfiguration {\n@Bean\npublic ErrorNotifier errorNotifier() {\nreturn\
  \ new EmailErrorNotifier();\n}\n}\n```\n\n您可以编写以下 `Main` 类来测试 `EmailErrorNotifier`。运行后，您可以配置您的电子邮件应用程序，通过\
  \ POP3 从 James 服务器接收电子邮件。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.support.GenericXmlApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\nApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(\"com.apress.springrecipes.replicator.config\"\
  );\nErrorNotifier errorNotifier = context.getBean(ErrorNotifier.class);\nerrorNotifier.notifyCopyError(\"\
  c:/documents\", \"d:/documents\", \"spring.doc\");\n}\n}\n```\n\n要验证电子邮件是否已发送，您可以登录到\
  \ Apache James 附带的 POP 服务器。您可以使用控制台 telnet 到 110 端口，并运行以下命令来查看用户 admin 的电子邮件，其密码与创建时设置的一致：\n\
  \n```\n> telnet 127.0.0.1 110\nOK workstation POP3 server  ready\nUSER admin\n+OK\n\
  PASS 12345\n+OK Welcome admin\nLIST\n+ OK 1 698\nRETR 1\n+OK Message follows\n...\n\
  ```\n\n使用 Spring 的 MailSender 发送电子邮件\n\n现在，让我们看看如何借助 Spring 的 `MailSender` 接口发送电子邮件，该接口可以在其\
  \ `send()` 方法中发送 `SimpleMailMessage`。使用此接口，您的代码不再特定于 JavaMail，并且更易于测试。\n\n```\n\
  package com.apress.springrecipes.replicator;\nimport org.springframework.mail.MailSender;\n\
  import org.springframework.mail.SimpleMailMessage;\npublic class EmailErrorNotifier\
  \ implements ErrorNotifier {\nprivate MailSender mailSender;\npublic void setMailSender(MailSender\
  \ mailSender) {\nthis.mailSender = mailSender;\n}\npublic void notifyCopyError(String\
  \ srcDir, String destDir, String filename) {\nSimpleMailMessage message = new SimpleMailMessage();\n\
  message.setFrom(\"system@localhost\");\nmessage.setTo(\"admin@localhost\");\nmessage.setSubject(\"\
  File Copy Error\");\nmessage.setText(\n\"Dear Administrator,\\n\\n\" +\n\"An error\
  \ occurred when copying the following file :\\n\" +\n\"Source directory : \" + srcDir\
  \ + \"\\n\" +\n\"Destination directory : \" + destDir + \"\\n\" +\n\"Filename :\
  \ \" + filename);\nmailSender.send(message);\n}\n}\n```\n\n接下来，您必须在 bean 配置文件中配置一个\
  \ `MailSender` 实现，并将其注入到 `EmailErrorNotifier` 中。在 Spring 中，此接口的唯一实现是 `JavaMailSenderImpl`，它使用\
  \ JavaMail 发送电子邮件。\n\n```\n@Configuration\npublic class MailConfiguration {\n@Bean\n\
  public ErrorNotifier errorNotifier() {\nEmailErrorNotifier errorNotifier = new EmailErrorNotifier();\n\
  errorNotifier.setMailSender(mailSender());\nreturn errorNotifier;\n}\n@Bean\npublic\
  \ JavaMailSenderImpl mailSender() {\nJavaMailSenderImpl mailSender = new JavaMailSenderImpl();\n\
  mailSender.setHost(\"localhost\");\nmailSender.setPort(25);\nmailSender.setUsername(\"\
  system\");\nmailSender.setPassword(\"12345\");\nreturn mailSender;\n}\n}\n```\n\n\
  `JavaMailSenderImpl` 使用的默认端口是标准 SMTP 端口 25，因此如果您的邮件服务器在此端口上监听 SMTP，您可以简单地省略此属性。此外，如果您的\
  \ SMTP 服务器不需要用户身份验证，则无需设置用户名和密码。\n\n如果您在 Java 应用服务器中配置了 JavaMail 会话，您可以首先借助 `JndiLocatorDelegate`\
  \ 查找它。\n\n```\n@Bean\npublic Session mailSession() throws NamingException {\nreturn\
  \ JndiLocatorDelegate\n.createDefaultResourceRefLocator()\n.lookup(\"mail/Session\"\
  , Session.class);\n}\n```\n\n\n\n你可以将 JavaMail 会话注入到 `JavaMailSenderImpl` 中供其使用。在这种情况下，你不再需要设置主机、端口、用户名或密码。\n\
  \n```\n@Bean\npublic JavaMailSenderImpl mailSender() {\nJavaMailSenderImpl mailSender\
  \ = new JavaMailSenderImpl();\nmailSender.setSession(mailSession());\nreturn mailSender;\n\
  }\n```\n\n定义电子邮件模板\n\n在方法体中从头构建电子邮件消息效率不高，因为你必须硬编码电子邮件属性。此外，用 Java 字符串编写电子邮件文本也可能有困难。你可以考虑在\
  \ Bean 配置文件中定义电子邮件消息模板，并从中构建新的电子邮件消息。\n\n```\n@Configuration\npublic class MailConfiguration\
  \ {\n...\n@Bean\npublic ErrorNotifier errorNotifier() {\nEmailErrorNotifier errorNotifier\
  \ = new EmailErrorNotifier();\nerrorNotifier.setMailSender(mailSender());\nerrorNotifier.setCopyErrorMailMessage(copyErrorMailMessage());\n\
  return errorNotifier;\n}\n@Bean\npublic SimpleMailMessage copyErrorMailMessage()\
  \ {\nSimpleMailMessage message = new SimpleMailMessage();\nmessage.setFrom(\"system@localhost\"\
  );\nmessage.setTo(\"admin@localhost\");\nmessage.setSubject(\"文件复制错误\");\nmessage.setText(\"\
  尊敬的 Administrator，\\n\" +\n\"\\n\" +\n\"                     复制以下文件时发生错误：\\n\" +\n\
  \"\\t\\t       源目录：%s\\n\" +\n\"\\t\\t       目标目录：%s\\n\" +\n\"\\t\\t       文件名：%s\"\
  );\nreturn message;\n}\n}\n```\n\n请注意，在上述消息文本中，你包含了占位符 `%s`，这些占位符将通过 `String.format()`\
  \ 被消息参数替换。当然，你也可以使用更强大的模板语言（如 Velocity 或 FreeMarker）根据模板生成消息文本。将邮件消息模板与 Bean 配置文件分离也是一个好做法。\n\
  \n每次发送电子邮件时，你可以从这个注入的模板中构建一个新的 `SimpleMailMessage` 实例。然后，你可以使用 `String.format()`\
  \ 生成消息文本，用你的消息参数替换 `%s` 占位符。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  ...\nimport org.springframework.mail.SimpleMailMessage;\npublic class EmailErrorNotifier\
  \ implements ErrorNotifier {\n...\nprivate SimpleMailMessage copyErrorMailMessage;\n\
  public void setCopyErrorMailMessage(SimpleMailMessage copyErrorMailMessage) {\n\
  this.copyErrorMailMessage = copyErrorMailMessage;\n}\npublic void notifyCopyError(String\
  \ srcDir, String destDir, String filename) {\nSimpleMailMessage message = new SimpleMailMessage(copyErrorMailMessage);\n\
  message.setText(String.format(\ncopyErrorMailMessage.getText(), srcDir, destDir,\
  \ filename));\nmailSender.send(message);\n}\n}\n```\n\n发送带附件的电子邮件（MIME 消息）\n\n到目前为止，你使用的\
  \ `SimpleMailMessage` 类只能发送简单的纯文本电子邮件消息。要发送包含 HTML 内容、内嵌图片或附件的电子邮件，你必须构建并发送 MIME\
  \ 消息。JavaMail 通过 `Javax.mail.internet.MimeMessage` 类支持 MIME。\n\n首先，你必须使用 `JavaMailSender`\
  \ 接口，而不是其父接口 `MailSender`。你注入的 `JavaMailSenderImpl` 实例确实实现了这个接口，因此你无需修改 Bean 配置。以下通知器将\
  \ Spring 的 Bean 配置文件作为电子邮件附件发送给管理员：\n\n```\npackage com.apress.springrecipes.replicator;\n\
  import javax.mail.MessagingException;\nimport javax.mail.internet.MimeMessage;\n\
  import org.springframework.core.io.ClassPathResource;\nimport org.springframework.mail.MailParseException;\n\
  import org.springframework.mail.SimpleMailMessage;\nimport org.springframework.mail.javamail.JavaMailSender;\n\
  import org.springframework.mail.javamail.MimeMessageHelper;\npublic class EmailErrorNotifier\
  \ implements ErrorNotifier {\nprivate JavaMailSender mailSender;\nprivate SimpleMailMessage\
  \ copyErrorMailMessage;\npublic void setMailSender(JavaMailSender mailSender) {\n\
  this.mailSender = mailSender;\n}\npublic void setCopyErrorMailMessage(SimpleMailMessage\
  \ copyErrorMailMessage) {\nthis.copyErrorMailMessage = copyErrorMailMessage;\n}\n\
  public void notifyCopyError(String srcDir, String destDir, String filename) {\n\
  MimeMessage message = mailSender.createMimeMessage();\ntry {\nMimeMessageHelper\
  \ helper = new MimeMessageHelper(message, true);\nhelper.setFrom(copyErrorMailMessage.getFrom());\n\
  helper.setTo(copyErrorMailMessage.getTo());\nhelper.setSubject(copyErrorMailMessage.getSubject());\n\
  helper.setText(String.format(\ncopyErrorMailMessage.getText(), srcDir, destDir,\
  \ filename));\nClassPathResource config = new ClassPathResource(\"beans.xml\");\n\
  helper.addAttachment(\"beans.xml\", config);\n} catch (MessagingException e) {\n\
  throw new MailParseException(e);\n}\nmailSender.send(message);\n}\n}\n```\n\n与 `SimpleMailMessage`\
  \ 不同，`MimeMessage` 类由 JavaMail 定义，因此你只能通过调用 `mailSender.createMimeMessage()` 来实例化它。Spring\
  \ 提供了辅助类 `MimeMessageHelper` 来简化 `MimeMessage` 的操作。它允许你从 Spring 的 `Resource` 对象添加附件。然而，这个辅助类的操作仍然可能抛出\
  \ JavaMail 的 `MessagingException`。为了保持一致性，你必须将此异常转换为 Spring 的邮件运行时异常。Spring 还提供了另一种构建\
  \ MIME 消息的方法，即通过实现 `MimeMessagePreparator` 接口。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  ...\nimport javax.mail.internet.MimeMessage;\nimport org.springframework.mail.javamail.MimeMessagePreparator;\n\
  public class EmailErrorNotifier implements ErrorNotifier {\n...\npublic void notifyCopyError(\n\
  final String srcDir, final String destDir, final String filename) {\nMimeMessagePreparator\
  \ preparator = new MimeMessagePreparator() {\npublic void prepare(MimeMessage mimeMessage)\
  \ throws Exception {\nMimeMessageHelper helper =\nnew MimeMessageHelper(mimeMessage,\
  \ true);\nhelper.setFrom(copyErrorMailMessage.getFrom());\nhelper.setTo(copyErrorMailMessage.getTo());\n\
  helper.setSubject(copyErrorMailMessage.getSubject());\nhelper.setText(String.format(\n\
  copyErrorMailMessage.getText(), srcDir, destDir, filename));\nClassPathResource\
  \ config = new ClassPathResource(\"beans.xml\");\nhelper.addAttachment(\"beans.xml\"\
  , config);\n}\n};\nmailSender.send(preparator);\n}\n}\n```\n\n在 `prepare()` 方法中，你可以准备\
  \ `MimeMessage` 对象，该对象是为 `JavaMailSender` 预先创建的。如果抛出任何异常，它将被自动转换为 Spring 的邮件运行时异常。\n\
  \n13-5. 使用 Spring 的 Quartz 支持调度任务\n\n问题\n\n你的应用程序有一个高级调度需求，希望使用 Quartz 调度器来实现。这样的需求可能看起来比较复杂，例如能够在任意时间或奇怪的间隔运行（“每隔一个星期四，但仅在上午\
  \ 10 点之后和下午 2 点之前”）。此外，你希望以声明式的方式配置调度作业。\n\n解决方案\n\nSpring 为 Quartz 提供了实用工具类，使你无需针对\
  \ Quartz API 编程即可调度作业。\n\n工作原理\n\n首先，你将了解如何在不使用 Spring 实用工具类的情况下将 Quartz 与 Spring\
  \ 结合使用，然后介绍使用 Spring 为 Quartz 提供的实用工具类的方法。\n\n使用不带 Spring 支持的 Quartz\n\n\n\n要使用\
  \ Quartz 进行任务调度，首先需要通过实现 `Job` 接口来创建一个任务。例如，以下任务会执行之前食谱中设计的文件复制器的 `replicate()`\
  \ 方法。它通过 `JobExecutionContext` 对象获取任务数据映射（这是 Quartz 中用于定义任务的概念）。\n\n```\npackage\
  \ com.apress.springrecipes.replicator;\n...\nimport org.quartz.Job;\nimport org.quartz.JobExecutionContext;\n\
  import org.quartz.JobExecutionException;\npublic class FileReplicationJob implements\
  \ Job {\npublic void execute(JobExecutionContext context)\nthrows JobExecutionException\
  \ {\nMap dataMap = context.getJobDetail().getJobDataMap();\nFileReplicator fileReplicator\
  \ =\n(FileReplicator) dataMap.get(\"fileReplicator\");\ntry {\nfileReplicator.replicate();\n\
  } catch (IOException e) {\nthrow new JobExecutionException(e);\n}\n}\n}\n```\n\n\
  创建任务后，你需要使用 Quartz API 对其进行配置和调度。例如，以下调度器每 60 秒运行一次文件复制任务，首次执行延迟 5 秒：\n\n```\npackage\
  \ com.apress.springrecipes.replicator;\n...\nimport org.quartz.JobDetail;\nimport\
  \ org.quartz.JobDataMap;\nimport org.quartz.JobBuilder;\nimport org.quartz.Trigger;\n\
  import org.quartz.TriggerBuilder;\nimport org.quartz.SimpleScheduleBuilder;\nimport\
  \ org.quartz.DateBuilder.IntervalUnit.*;\nimport org.quartz.Scheduler;\nimport org.quartz.impl.StdSchedulerFactory;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.support.GenericXmlApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) throws Exception {\n\
  ApplicationContext context =\nnew AnnotationConfigApplicationContext(\"com.apress.springrecipes.replicator.config\"\
  );\nFileReplicator documentReplicator = context.getBean(FileReplicator.class);\n\
  JobDataMap jobDataMap = new JobDataMap();\njobDataMap.put(\"fileReplicator\", documentReplicator);\n\
  JobDetail job = JobBuilder.newJob(FileReplicationJob.class)\n.withIdentity(\"documentReplicationJob\"\
  )\n.storeDurably()\n.usingJobData(jobDataMap)\n.build();\nTrigger trigger = TriggerBuilder.newTrigger()\n\
  .withIdentity(\"documentReplicationTrigger\")\n.startAt(new Date(System.currentTimeMillis()\
  \ + 5000))\n.forJob(job)\n.withSchedule(SimpleScheduleBuilder.simpleSchedule()\n\
  .withIntervalInSeconds(60)\n.repeatForever())\n.build();\nScheduler scheduler =\
  \ new StdSchedulerFactory().getScheduler();\nscheduler.start();\nscheduler.scheduleJob(job,\
  \ trigger);\n}\n}\n```\n\n在 `Main` 类中，首先创建一个任务映射。本例中只有一个任务，键是描述性名称，值是任务的对象引用。接着，在\
  \ `JobDetail` 对象中定义文件复制任务的详细信息，并在其 `jobDataMap` 属性中准备任务数据。然后，创建一个 `SimpleTrigger`\
  \ 对象来配置调度属性。最后，创建一个调度器，使用此触发器运行任务。\n\nQuartz 支持多种调度类型，可在不同时间间隔运行任务。调度作为触发器的一部分进行定义。在最新版本中，Quartz\
  \ 的调度包括 `SimpleScheduleBuilder`、`CronScheduleBuilder`、`CalendarIntervalScheduleBuilder`\
  \ 和 `DailyTimeIntervalScheduleBuilder`。`SimpleScheduleBuilder` 允许你通过设置开始时间、结束时间、重复间隔和重复次数等属性来调度任务。`CronScheduleBuilder`\
  \ 接受 Unix cron 表达式，用于指定任务的运行时间。例如，你可以将前面的 `SimpleScheduleBuilder` 替换为以下 `CronScheduleBuilder`，以便每天\
  \ 17:30 运行任务：`.withSchedule(CronScheduleBuilder.cronSchedule(\"0 30 17 * * ?\"))`。一个\
  \ `cron` 表达式由七个字段组成（最后一个字段可选），字段之间用空格分隔。表 13-1 展示了 `cron` 表达式的字段说明。\n\n表 13-1. cron\
  \ 表达式的字段说明\n\n位置 | 字段名 | 范围\n--- | --- | ---\n1 | 秒 | 0–59\n2 | 分钟 | 0–59\n3 | 小时\
  \ | 0–23\n4 | 月份中的日期 | 1–31\n5 | 月份 | 1–12 或 JAN–DEC\n6 | 星期中的日期 | 1–7 或 SUN–SAT\n\
  7 | 年份（可选） | 1970–2099\n\n`cron` 表达式的每个部分可以指定一个具体值（例如 3）、一个范围（例如 1–5）、一个列表（例如 1,3,5）、一个通配符（*\
  \ 匹配所有值）或一个问号（? 用于“月份中的日期”和“星期中的日期”字段之一，以匹配其中一个字段，但不同时匹配两者）。`CalendarIntervalScheduleBuilder`\
  \ 允许你基于日历时间（日、周、月、年）进行调度，而 `DailyTimeIntervalScheduleBuilder` 则提供了便捷工具来设置任务的结束时间（例如\
  \ `endingDailyAt()` 和 `endingDailyAfterCount()` 等方法）。\n\n结合 Spring 支持使用 Quartz\n\
  \n使用 Quartz 时，你可以通过实现 `Job` 接口来创建任务，并通过 `JobExecutionContext` 从任务数据映射中检索任务数据。为了将任务类与\
  \ Quartz API 解耦，Spring 提供了 `QuartzJobBean`，你可以通过扩展它并利用 setter 方法来检索任务数据。`QuartzJobBean`\
  \ 会将任务数据映射转换为属性，并通过 setter 方法注入它们。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  ...\nimport org.quartz.JobExecutionContext;\nimport org.quartz.JobExecutionException;\n\
  import org.springframework.scheduling.quartz.QuartzJobBean;\npublic class FileReplicationJob\
  \ extends QuartzJobBean {\nprivate FileReplicator fileReplicator;\npublic void setFileReplicator(FileReplicator\
  \ fileReplicator) {\nthis.fileReplicator = fileReplicator;\n}\nprotected void executeInternal(JobExecutionContext\
  \ context)\nthrows JobExecutionException {\ntry {\nfileReplicator.replicate();\n\
  } catch (IOException e) {\nthrow new JobExecutionException(e);\n}\n}\n}\n```\n\n\
  然后，你可以通过 `JobDetailBean` 在 Spring 的 bean 配置文件中配置 Quartz 的 `JobDetail` 对象。默认情况下，Spring\
  \ 会使用此 bean 的名称作为任务名称。你可以通过设置 `name` 属性来修改它。\n\n```\n@Bean\n@Autowired\npublic JobDetailFactoryBean\
  \ documentReplicationJob(FileReplicator fileReplicator) {\nJobDetailFactoryBean\
  \ documentReplicationJob = new JobDetailFactoryBean();\ndocumentReplicationJob.setJobClass(FileReplicationJob.class);\n\
  documentReplicationJob.setDurability(true);\ndocumentReplicationJob.setJobDataAsMap(\n\
  Collections.singletonMap(\"fileReplicator\", fileReplicator));\nreturn documentReplicationJob;\n\
  }\n```\n\nSpring 还提供了 `MethodInvokingJobDetailFactoryBean`，用于定义执行特定对象单个方法的任务。这省去了创建任务类的麻烦。你可以使用以下任务详情来替换之前的：\n\
  \n```\n@Bean\n@Autowired\npublic MethodInvokingJobDetailFactoryBean documentReplicationJob(FileReplicator\
  \ fileReplicator) {\nMethodInvokingJobDetailFactoryBean documentReplicationJob =\n\
  new MethodInvokingJobDetailFactoryBean();\ndocumentReplicationJob.setTargetObject(fileReplicator);\n\
  documentReplicationJob.setTargetMethod(\"replicatie\");\nreturn documentReplicationJob;\n\
  }\n```\n\n定义任务后，你可以配置 Quartz 触发器。Spring 支持 `SimpleTriggerFactoryBean` 和 `CronTriggerFactoryBean`。`SimpleTriggerFactoryBean`\
  \ 需要引用一个 `JobDetail` 对象，并提供调度属性的常用值，例如开始时间和重复次数。\n\n```\n@Bean\n@Autowired\npublic\
  \ SimpleTriggerFactoryBean documentReplicationTrigger(JobDetail documentReplicationJob)\
  \ {\nSimpleTriggerFactoryBean documentReplicationTrigger = new SimpleTriggerFactoryBean();\n\
  documentReplicationTrigger.setJobDetail(documentReplicationJob);\ndocumentReplicationTrigger.setStartDelay(5000);\n\
  documentReplicationTrigger.setRepeatInterval(60000);\nreturn documentReplicationTrigger;\n\
  }\n```\n\n你也可以使用 `CronTriggerFactoryBean` bean 来配置类似 `cron` 的调度。\n\n\n\n```\n@Bean\n\
  @Autowired\npublic CronTriggerFactoryBean documentReplicationTrigger(JobDetail documentReplicationJob)\
  \ {\nCronTriggerFactoryBean documentReplicationTrigger = new CronTriggerFactoryBean();\n\
  documentReplicationTrigger.setJobDetail(documentReplicationJob);\ndocumentReplicationTrigger.setStartDelay(5000);\n\
  documentReplicationTrigger.setCronExpression(\"0/60 * * * * ?\");\nreturn documentReplicationTrigger;\n\
  }\n```\n\n最后，一旦你有了 Quartz 任务和触发器，就可以配置一个\n`SchedulerFactoryBean`\n实例来创建用于运行触发器的\
  \ `Scheduler` 对象。你可以在该工厂 bean 中指定多个触发器。\n\n```\n@Bean\n@Autowired\npublic SchedulerFactoryBean\
  \ scheduler(Trigger[] triggers) {\nSchedulerFactoryBean scheduler = new SchedulerFactoryBean();\n\
  scheduler.setTriggers(triggers);\nreturn scheduler;\n}\n```\n\n现在，你可以通过以下 `Main`\
  \ 类简单地启动调度器。通过这种方式，你无需编写任何一行调度任务的代码。\n\n```\npackage com.apress.springrecipes.replicator;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) throws Exception {\n\
  new AnnotationConfigApplicationContext(\"com.apress.springrecipes.replicator.config\"\
  );\n}\n}\n```\n\n13-6\\. 使用 Spring 的调度功能安排任务\n\n问题\n\n你希望以一致的方式安排方法调用，可以使用 `cron`\
  \ 表达式、固定间隔或固定速率，并且不想为此而使用 Quartz。\n\n解决方案\n\nSpring 支持配置 `TaskExecutor` 和 `TaskScheduler`。此功能结合使用\
  \ `@Scheduled` 注解安排方法执行的能力，使得 Spring 的调度支持以最少的配置工作运行：你只需要一个方法、一个注解，并启用注解扫描器即可。\n\
  \n工作原理\n\n让我们重新审视上一个配方中的示例：你希望使用 `cron` 表达式安排对 bean 上的复制方法的调用。配置类如下所示：\n\n```\n\
  package com.apress.springrecipes.replicator.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  import org.springframework.scheduling.annotation.SchedulingConfigurer;\nimport org.springframework.scheduling.config.ScheduledTaskRegistrar;\n\
  import java.util.concurrent.Executor;\nimport java.util.concurrent.Executors;\n\
  @Configuration\n@EnableScheduling\npublic class SchedulingConfiguration implements\
  \ SchedulingConfigurer {\n@Override\npublic void configureTasks(ScheduledTaskRegistrar\
  \ taskRegistrar) {\ntaskRegistrar.setScheduler(scheduler());\n}\n@Bean\npublic Executor\
  \ scheduler() {\nreturn Executors.newScheduledThreadPool(10);\n}\n}\n```\n\n通过指定\
  \ `@EnableScheduling` 来启用注解驱动的调度支持。这将注册一个 bean，用于扫描应用程序上下文中的 bean 以查找 `@Scheduled`\
  \ 注解。你还实现了 `SchedulingConfigurer` 接口，因为你想对调度器进行一些额外的配置。你想为其提供一个包含十个线程的线程池来执行你的调度任务。\n\
  \n```\npackage com.apress.springrecipes.replicator;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
  import java.io.File;\nimport java.io.IOException;\npublic class FileReplicatorImpl\
  \ implements FileReplicator {\n@Scheduled(fixedDelay = 60 * 1000)\npublic synchronized\
  \ void replicate() throws IOException {\nFile[] files = new File(srcDir).listFiles();\n\
  for (File file : files) {\nif (file.isFile()) {\nfileCopier.copyFile(srcDir, destDir,\
  \ file.getName());\n}\n}\n}\n}\n```\n\n请注意，你已使用 `@Scheduled` 注解标记了 `replicate()`\
  \ 方法。在这里，你告诉调度器每 60 秒执行一次该方法。或者，你也可以为 `@Scheduled` 注解指定一个 `fixedRate` 值，该值将测量连续启动之间的时间，然后触发下一次运行。\n\
  \n```\n@Scheduled(fixedRate = 60 * 1000)\npublic synchronized void replicate() throws\
  \ IOException {\nFile[] files = new File(srcDir).listFiles();\nfor (File file :\
  \ files) {\nif (file.isFile()) {\nfileCopier.copyFile(srcDir, destDir, file.getName());\n\
  }\n}\n}\n```\n\n最后，你可能希望对方法的执行进行更复杂的控制。在这种情况下，你可以使用 `cron` 表达式，就像在 Quartz 示例中所做的那样。\n\
  \n```\n@Scheduled( cron = \"0/60 * * * * ? \" )\npublic synchronized void replicate()\
  \ throws IOException {\nFile[] files = new File(srcDir).listFiles();\nfor (File\
  \ file : files) {\nif (file.isFile()) {\nfileCopier.copyFile(srcDir, destDir, file.getName());\n\
  }\n}\n}\n```\n\n在 Java 中也支持配置所有这些内容。如果你不想或无法向现有的 bean 方法添加注解，这可能会很有用。下面展示了如何使用 Spring\
  \ 的 `ScheduledTaskRegistrar` 重新创建上述以注解为中心的示例：\n\n```\npackage com.apress.springrecipes.replicator.config;\n\
  import com.apress.springrecipes.replicator.FileReplicator;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.scheduling.annotation.EnableScheduling;\nimport org.springframework.scheduling.annotation.SchedulingConfigurer;\n\
  import org.springframework.scheduling.config.ScheduledTaskRegistrar;\nimport java.io.IOException;\n\
  import java.util.concurrent.Executor;\nimport java.util.concurrent.Executors;\n\
  @Configuration\n@EnableScheduling\npublic class SchedulingConfiguration implements\
  \ SchedulingConfigurer {\n@Autowired\nprivate FileReplicator fileReplicator;\n@Override\n\
  public void configureTasks(ScheduledTaskRegistrar taskRegistrar) {\ntaskRegistrar.setScheduler(scheduler());\n\
  taskRegistrar.addFixedDelayTask(() -> {\ntry {\nfileReplicator.replicate();\n} catch\
  \ (IOException e) {\ne.printStackTrace();\n}\n}, 60000);\n}\n@Bean\npublic Executor\
  \ scheduler() {\nreturn Executors.newScheduledThreadPool(10);\n}\n}\n```\n\n13-7\\\
  . 通过 RMI 暴露和调用服务\n\n问题\n\n你希望从 Java 应用程序中暴露一个服务，供其他基于 Java 的客户端远程调用。由于双方都运行在 Java\
  \ 平台上，你可以选择纯 Java 的解决方案，而无需考虑跨平台的可移植性。\n\n解决方案\n\n远程方法调用（RMI）是一种基于 Java 的远程处理技术，允许运行在不同\
  \ JVM 中的两个 Java 应用程序相互通信。通过 RMI，一个对象可以调用远程对象的方法。RMI 依赖对象序列化来编组和解组方法参数及返回值。\n\n要通过\
  \ RMI 暴露服务，你必须创建扩展 `java.rmi.Remote` 的服务接口，并且其方法声明抛出 `java.rmi.RemoteException`。然后，你为该接口创建服务实现。之后，你启动一个\
  \ RMI 注册表并将你的服务注册到其中。因此，暴露一个简单的服务需要相当多的步骤。\n\n要通过 RMI 调用服务，你首先在 RMI 注册表中查找远程服务引用，然后就可以调用其上的方法。但是，要调用远程服务上的方法，你必须处理\
  \ `java.rmi.RemoteException`，以防远程服务抛出任何异常。\n\n\n\nSpring 的远程调用功能可以显著简化 RMI 在服务端和客户端的使用。在服务端，你可以使用\
  \ `RmiServiceExporter` 将一个 Spring POJO 导出为 RMI 服务，使其方法能够被远程调用。这只需要几行 Bean 配置，无需任何编程。以这种方式导出的\
  \ Bean 不需要实现 `java.rmi.Remote` 或抛出 `java.rmi.RemoteException`。\n在客户端，你可以简单地使用 `RmiProxyFactoryBean`\
  \ 为远程服务创建一个代理。它让你能够像使用本地 Bean 一样使用远程服务。同样，这完全不需要额外的编程。\n\n工作原理\n\n假设你要为运行在不同平台上的客户端构建一个天气\
  \ Web 服务。该服务包含一个查询城市在多个日期温度的操作。首先，让我们创建 `TemperatureInfo` 类，它代表特定城市和日期的最低、最高和平均温度。\n\
  \n```\npackage com.apress.springrecipes.weather;\n...\npublic class TemperatureInfo\
  \ implements Serializable {\nprivate String city;\nprivate Date date;\nprivate double\
  \ min;\nprivate double max;\nprivate double average;\n// 构造方法、Getter 和 Setter\n\
  ...\n}\n```\n\n接下来，让我们定义包含 `getTemperatures()` 操作的服务接口，该操作返回一个城市在多个日期的温度。\n\n```\n\
  package com.apress.springrecipes.weather;\n...\npublic interface WeatherService\
  \ {\nList getTemperatures(String city, List dates);\n}\n```\n\n你必须为该接口提供一个实现。在生产应用中，你会通过查询数据库来实现此服务接口。这里，为了测试目的，我们将硬编码温度值。\n\
  \n```\npackage com.apress.springrecipes.weather;\n...\npublic class WeatherServiceImpl\
  \ implements WeatherService {\npublic List getTemperatures(String city, List dates)\
  \ {\nList temperatures = new ArrayList();\nfor (Date date : dates) {\ntemperatures.add(new\
  \ TemperatureInfo(city, date, 5.0, 10.0, 8.0));\n}\nreturn temperatures;\n}\n}\n\
  ```\n\n暴露一个 RMI 服务\n\n接下来，让我们将天气服务暴露为 RMI 服务。为了使用 Spring 的远程调用功能，你需要创建一个 Java 配置类来创建必要的\
  \ Bean，并通过使用 `RmiServiceExporter` 将天气服务导出为 RMI 服务。\n\n```\npackage com.apress.springrecipes.weather.config;\n\
  ...\nimport com.apress.springrecipes.weather.WeatherService;\nimport com.apress.springrecipes.weather.WeatherServiceImpl;\n\
  import org.springframework.remoting.rmi.RmiServiceExporter;\n@Configuration\npublic\
  \ class WeatherConfig {\n@Bean\npublic WeatherService weatherService() {\nreturn\
  \ new WeatherServiceImpl();\n}\n@Bean\npublic RmiServiceExporter rmiService() {\n\
  RmiServiceExporter rmiService = new RmiServiceExporter();\nrmiService.setServiceName(\"\
  WeatherService\");\nrmiService.setServiceInterface(com.apress.springrecipes.weather.WeatherService.class);\n\
  rmiService.setService(weatherService());\nreturn rmiService;\n}\n}\n```\n\n你必须为\
  \ `RmiServiceExporter` 实例配置几个属性，包括服务名称、服务接口以及要导出的服务对象。你可以将 IoC 容器中配置的任何 Bean 导出为\
  \ RMI 服务。`RmiServiceExporter` 将创建一个 RMI 代理来包装此 Bean，并将其绑定到 RMI 注册表。当代理从 RMI 注册表接收到调用请求时，它将在\
  \ Bean 上调用相应的方法。默认情况下，`RmiServiceExporter` 会尝试在本地主机端口 1099 上查找 RMI 注册表。如果找不到 RMI\
  \ 注册表，它将启动一个新的注册表。但是，如果你希望将服务绑定到另一个正在运行的 RMI 注册表，可以在 `registryHost` 和 `registryPort`\
  \ 属性中指定该注册表的主机和端口。请注意，一旦指定了注册表主机，即使指定的注册表不存在，`RmiServiceExporter` 也不会启动新的注册表。运行以下\
  \ `RmiServer` 类来创建一个应用上下文：\n\n```\npackage com.apress.springrecipes.weather;\nimport\
  \ com.apress.springrecipes.weather.config.WeatherConfigServer;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class RmiServer {\npublic static void main(String[] args) {\nnew AnnotationConfigApplicationContext(WeatherConfigServer.class);\n\
  }\n}\n```\n\n在此配置中，服务器将启动；在输出中，你应该会看到一条消息，指示找不到现有的 RMI 注册表。\n\n调用一个 RMI 服务\n\n通过使用\
  \ Spring 的远程调用功能，你可以像调用本地 Bean 一样调用远程服务。例如，你可以创建一个客户端，通过其接口引用天气服务。\n\n```\npackage\
  \ com.apress.springrecipes.weather;\nimport java.util.Arrays;\nimport java.util.Date;\n\
  import java.util.List;\npublic class WeatherServiceClient {\nprivate final WeatherService\
  \ weatherService;\npublic WeatherServiceClient(WeatherService weatherService) {\n\
  this.weatherService = weatherService;\n}\npublic TemperatureInfo getTodayTemperature(String\
  \ city) {\nList dates = Arrays.asList(new Date());\nList temperatures =\nweatherService.getTemperatures(city,\
  \ dates);\nreturn temperatures.get(0);\n}\n}\n```\n\n请注意，`weatherService` 字段是通过构造函数注入的，因此你需要创建此\
  \ Bean 的一个实例。`weatherService` 将使用 `RmiProxyFactoryBean` 为远程服务创建一个代理。然后，你可以像使用本地\
  \ Bean 一样使用此服务。以下 Java 配置类说明了 RMI 客户端所需的 Bean：\n\n```\npackage com.apress.springrecipes.weather.config;\n\
  import com.apress.springrecipes.weather.WeatherService;\nimport com.apress.springrecipes.weather.WeatherServiceClient;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.remoting.rmi.RmiProxyFactoryBean;\n@Configuration\npublic\
  \ class WeatherConfigClient {\n@Bean\npublic RmiProxyFactoryBean weatherService()\
  \ {\nRmiProxyFactoryBean rmiProxy = new RmiProxyFactoryBean();\nrmiProxy.setServiceUrl(\"\
  rmi://localhost:1099/WeatherService\");\nrmiProxy.setServiceInterface(WeatherService.class);\n\
  return rmiProxy;\n}\n@Bean\npublic WeatherServiceClient weatherClient(WeatherService\
  \ weatherService) {\nreturn new WeatherServiceClient(weatherService);\n}\n}\n```\n\
  \n你必须为 `RmiProxyFactoryBean` 实例配置两个属性。服务 URL 属性指定了 RMI 注册表的主机和端口，以及服务名称。服务接口允许此工厂\
  \ Bean 针对一个已知的、共享的 Java 接口为远程服务创建代理。该代理将透明地将调用请求传输到远程服务。除了 `RmiProxyFactoryBean`\
  \ 实例之外，你还需要创建一个名为 `weatherClient` 的 `WeatherServiceClient` 实例。\n\n接下来，运行以下 `RmiClient`\
  \ 主类：\n\n```\npackage com.apress.springrecipes.weather;\nimport com.apress.springrecipes.weather.config.WeatherConfigClient;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class RmiClient {\npublic static void main(String[] args) {\nApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(WeatherConfigClient.class);\n\
  WeatherServiceClient client = context.getBean(WeatherServiceClient.class);\nTemperatureInfo\
  \ temperature = client.getTodayTemperature(\"Houston\");\nSystem.out.println(\"\
  最低温度 : \" + temperature.getMin());\nSystem.out.println(\"最高温度 : \" + temperature.getMax());\n\
  System.out.println(\"平均温度 : \" + temperature.getAverage());\n}\n}\n```\n\n13-8.\
  \ 通过 HTTP 暴露和调用服务\n\n问题\n\nRMI 通过其自有协议进行通信，这可能无法穿透防火墙。理想情况下，你希望通过 HTTP 进行通信。\n\n\
  解决方案\n\n\n\nHessian 是由 Caucho 技术公司（[`www.caucho.com/`](http://www.caucho.com/)）开发的一种简单轻量级的远程调用技术。它通过\
  \ HTTP 使用专有消息进行通信，并拥有自己的序列化机制，但比 RMI 简单得多。Hessian 的消息格式除了 Java 之外，还支持其他平台，例如 PHP、Python、C#\
  \ 和 Ruby。这使得你的 Java 应用程序能够与运行在其他平台上的应用程序进行通信。\n\n除了上述技术，Spring 框架还提供了一种名为 HTTP Invoker\
  \ 的远程调用技术。它也通过 HTTP 进行通信，但使用 Java 的对象序列化机制来序列化对象。与 Hessian 不同，HTTP Invoker 要求服务的两端都运行在\
  \ Java 平台上，并且使用 Spring 框架。然而，它可以序列化各种 Java 对象，其中一些对象可能无法被 Hessian 的专有机制序列化。\n\n\
  Spring 的远程调用设施在使用这些技术暴露和调用远程服务时是一致的。在服务端，你可以创建一个服务导出器，例如 `HessianServiceExporter`\
  \ 或 `HttpInvokerServiceExporter`，将一个 Spring Bean 导出为远程服务，其方法可以被远程调用。这只需要几行 Bean\
  \ 配置，无需任何编程。在客户端，你也可以配置一个代理工厂 Bean，例如 `HessianProxyFactoryBean` 或 `HttpInvokerProxyFactoryBean`，为远程服务创建一个代理。它允许你将远程服务当作本地\
  \ Bean 来使用。同样，这完全不需要额外的编程。\n\n工作原理\n\n要导出一个服务，你需要一个服务导出器，在这里你将了解 `HessianServiceExporter`\
  \ 和 `HttpInvokerServiceExporter`。要消费已暴露的服务，有一些辅助类，分别是 `HessianProxyFactoryBean`\
  \ 和 `HttpInvokerProxyFactoryBean`。这里将探讨 Hessian 和 HTTP 两种解决方案。\n\n暴露一个 Hessian 服务\n\
  \n你将使用之前 RMI 示例中相同的天气服务，并通过 Spring 将其暴露为 Hessian 服务。你将创建一个使用 Spring MVC 的简单 Web\
  \ 应用程序来部署该服务。首先，让我们创建一个 `WeatherServiceInitializer` 类来引导 Web 应用程序和 Spring 应用程序上下文。\n\
  \n```\npackage com.apress.springrecipes.weather.config;\nimport org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;\n\
  public class WeatherServiceInitializer extends AbstractAnnotationConfigDispatcherServletInitializer\
  \ {\n@Override\nprotected String[] getServletMappings() {\nreturn new String[] {\"\
  /*\"};\n}\n@Override\nprotected Class[] getRootConfigClasses() {\nreturn null;\n\
  }\n@Override\nprotected Class[] getServletConfigClasses() {\nreturn new Class[]\
  \ {WeatherConfigHessianServer.class};\n}\n}\n```\n\n`WeatherServiceInitializer`\
  \ 类创建了一个 `DispatcherServlet` Servlet，用于映射根路径（`/*`）下的所有 URL，并将使用 `WeatherConfigHessianServer`\
  \ 类进行配置。\n\n```\npackage com.apress.springrecipes.weather.config;\nimport com.apress.springrecipes.weather.WeatherService;\n\
  import com.apress.springrecipes.weather.WeatherServiceImpl;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.remoting.caucho.HessianServiceExporter;\n\
  @Configuration\npublic class WeatherConfigHessianServer {\n@Bean\npublic WeatherService\
  \ weatherService() {\nWeatherService wService = new WeatherServiceImpl();\nreturn\
  \ wService;\n}\n@Bean(name = \"/weather\")\npublic HessianServiceExporter exporter()\
  \ {\nHessianServiceExporter exporter = new HessianServiceExporter();\nexporter.setService(weatherService());\n\
  exporter.setServiceInterface(WeatherService.class);\nreturn exporter;\n}\n}\n```\n\
  \n扫描组件允许 Spring 检查一个 Java 配置类，该类实例化了 `weatherService` Bean，其中包含了将由 `HessianServiceExporter`\
  \ 实例暴露的操作。此处的 `weatherService` Bean 与之前 RMI 示例中使用的完全相同。你也可以查阅本书的源代码以获取预构建的应用程序。\n\
  \n对于一个 `HessianServiceExporter` 实例，你必须配置一个要导出的服务对象及其服务接口。你可以将任何 Spring Bean 导出为\
  \ Hessian 服务。`HessianServiceExporter` 创建一个代理来包装这个 Bean。\n\n当代理接收到调用请求时，它会调用该 Bean\
  \ 上的相应方法。默认情况下，`BeanNameUrlHandlerMapping` 已为 Spring MVC 应用程序预先配置，这意味着 Bean 会被映射到以\
  \ Bean 名称指定的 URL 模式。上述配置将 URL 模式 `/weather` 映射到此导出器。接下来，你可以将此 Web 应用程序部署到 Web 容器（例如\
  \ Apache Tomcat）中。默认情况下，Tomcat 监听 8080 端口，因此如果你将应用程序部署到 Hessian 上下文路径，你可以通过以下 URL\
  \ 访问此服务：`http://localhost:8080/hessian/weather`。\n\n调用一个 Hessian 服务\n\n通过使用 Spring\
  \ 的远程调用设施，你可以像调用本地 Bean 一样调用远程服务。在客户端应用程序中，你可以在 Java 配置类中创建一个 `HessianProxyFactoryBean`\
  \ 实例，为远程 Hessian 服务创建一个代理。然后，你可以像使用本地 Bean 一样使用此服务。\n\n```\n@Bean\npublic HessianProxyFactoryBean\
  \ weatherService() {\nHessianProxyFactoryBean factory = new HessianProxyFactoryBean();\n\
  factory.setServiceUrl(\"http://localhost:8080/hessian/weather\");\nfactory.setServiceInterface(WeatherService.class);\n\
  return factory;\n}\n```\n\n对于一个 `HessianProxyFactoryBean` 实例，你必须配置两个属性。服务 URL 属性指定目标服务的\
  \ URL。服务接口属性用于让此工厂 Bean 为远程服务创建一个本地代理。该代理将透明地将调用请求发送到远程服务。\n\n暴露一个 HTTP Invoker\
  \ 服务\n\n类似地，使用 HTTP Invoker 暴露服务的配置与 Hessian 相似，只是你必须使用 `HttpInvokerServiceExporter`\
  \ 代替。\n\n```\n@Bean(name = \"/weather\")\npublic HttpInvokerServiceExporter exporter()\
  \ {\nHttpInvokerServiceExporter exporter = new HttpInvokerServiceExporter();\nexporter.setService(weatherService());\n\
  exporter.setServiceInterface(WeatherService.class);\nreturn exporter;\n}\n```\n\n\
  调用一个 HTTP Invoker 服务\n\n调用由 HTTP Invoker 暴露的服务也与 Hessian 和 Burlap 类似。这次，你必须使用 `HttpInvokerProxyFactoryBean`。\n\
  \n```\n@Bean\npublic HttpInvokerProxyFactoryBean weatherService() {\nHttpInvokerProxyFactoryBean\
  \ factory = new HttpInvokerProxyFactoryBean();\nfactory.setServiceUrl(\"http://localhost:8080/httpinvoker/weather\"\
  );\nfactory.setServiceInterface(WeatherService.class);\nreturn factory;\n}\n```\n\
  \n13-9. 使用 JAX-WS 暴露和调用 SOAP Web 服务\n\n问题\n\nSOAP 是一种企业级标准且跨平台的应用程序通信技术。大多数现代且关键任务的软件远程调用任务（例如，银行服务、库存应用程序）通常使用此标准。你希望能够从你的\
  \ Java 应用程序调用第三方 SOAP Web 服务，以及从你的 Java 应用程序暴露 Web 服务，以便不同平台上的第三方可以通过 SOAP 调用它们。\n\
  \n解决方案\n\n使用 JAX-WS 的 `@WebService` 和 `@WebMethod` 注解，以及 Spring 的 `SimpleJaxWsServiceExporter`，以允许通过\
  \ SOAP 访问 Bean 的业务逻辑。你还可以利用 Apache CXF 与 Spring 结合，在像 Tomcat 这样的 Java 服务器中暴露 SOAP\
  \ 服务。要访问 SOAP 服务，你可以使用 Apache CXF 与 Spring 结合，或者利用 Spring 的 `JaxWsPortProxyFactoryBean`。\n\
  \n工作原理\n\n\n\nJAX-WS 2.0 是 JAX-RPC 1.1 的继任者——后者是基于 XML 的 Web 服务的 Java API。因此，如果你要在\
  \ Java 环境中使用 SOAP，JAX-WS 是同时受 Java EE 和标准 JDK 支持的最新标准。\n\n### 利用 JDK 中的 JAX-WS 端点支持公开\
  \ Web 服务\n\n你可以依赖 Java JDK 的 JAX-WS 运行时支持来公开 JAX-WS 服务。这意味着你不必将 JAX-WS 服务作为 Java\
  \ Web 应用的一部分进行部署。默认情况下，如果没有其他运行时，则会使用 JDK 中的 JAX-WS 支持。让我们使用 JDK 中的 JAX-WS 来实现之前菜谱中的天气服务应用。你需要为天气服务添加注解，以表明它应该向客户端公开。修改后的\
  \ `WeatherServiceImpl` 实现需要使用 `@WebService` 和 `@WebMethod` 注解进行修饰。`Main` 类使用 `@WebService`\
  \ 修饰，而将由服务公开的方法则使用 `@WebMethod` 修饰。\n\n```\npackage com.apress.springrecipes.weather;\n\
  import javax.jws.WebMethod;\nimport javax.jws.WebService;\nimport java.util.ArrayList;\n\
  import java.util.Date;\nimport java.util.List;\n@WebService(serviceName = \"weather\"\
  , endpointInterface = \" com.apress.springrecipes.weather.WeatherService \")\npublic\
  \ class WeatherServiceImpl implements WeatherService {\n@WebMethod(operationName\
  \ = \"getTemperatures\")\npublic List getTemperatures(String city, List dates) {\n\
  List temperatures = new ArrayList();\nfor (Date date : dates) {\ntemperatures.add(new\
  \ TemperatureInfo(city, date, 5.0, 10.0, 8.0));\n}\nreturn temperatures;\n}\n}\n\
  ```\n\n请注意，你不需要为注解提供任何参数，例如 `endpointInterface` 或 `serviceName`，但此处提供它们是为了使生成的 SOAP\
  \ 契约更具可读性。同样，你也不需要为 `@WebMethod` 注解提供 `operationName`。不过，这通常是一种良好的实践，因为它可以使 SOAP\
  \ 端点的客户端免受你在 Java 实现上可能进行的任何重构的影响。\n\n接下来，为了让 Spring 能够检测到带有 `@WebService` 注解的 Bean，你需要依赖\
  \ Spring 的 `SimpleHttpServerJaxWsServiceExporter`。这是在 Java 配置类中该类的 `@Bean` 定义：\n\
  \n```\n@Bean\npublic SimpleHttpServerJaxWsServiceExporter jaxWsService() {\nSimpleHttpServerJaxWsServiceExporter\
  \ simpleJaxWs =\nnew SimpleHttpServerJaxWsServiceExporter();\nsimpleJaxWs.setPort(8888);\n\
  simpleJaxWs.setBasePath(\"/jaxws/\");\nreturn simpleJaxWs;\n}\n```\n\n注意，Bean 定义调用了\
  \ `setPort` 和 `setBasePath`，并将它们设置为 `8888` 和 `/jaxws/`。这是应用 JAX-WS 服务的端点。在这个地址下——一个由\
  \ JDK 启动的独立服务器——所有使用 `@WebService` 注解定义的 Bean 都将驻留于此。因此，如果有一个名为 `weather` 的 `@WebService`，它将可以通过\
  \ `http://localhost:8888/jaxws/weather` 访问。\n\n注意\n\n如果你将其作为 Web 部署的一部分使用，请改用 `SimpleJaxWsServiceExporter`，因为\
  \ `SimpleHttpServerJaxWsServiceExporter` 会启动一个嵌入式 HTTP 服务器，这在 Web 部署中通常是不可行的。\n\n\
  如果你启动浏览器并在 `http://localhost:8888/jaxws/weather?wsdl` 检查结果，你将看到生成的 SOAP WSDL 契约，如下所示：\n\
  \nSOAP WSDL 契约供客户端用于访问服务。如果你检查生成的 WSDL，你会发现它非常基础——描述了天气服务方法——但更重要的是，它与编程语言无关。这种无关性正是\
  \ SOAP 的全部意义所在：能够跨可解释 SOAP 的不同平台访问服务。\n\n### 使用 CXF 公开 Web 服务\n\n使用 JAX-WS 服务导出器和\
  \ JAX-WS JDK 支持来公开独立的 SOAP 端点很简单。然而，这种解决方案忽略了现实环境中大多数 Java 应用运行在 Java 应用运行时（如 Tomcat）上的事实。Tomcat\
  \ 本身不支持 JAX-WS，因此你需要为应用配备一个 JAX-WS 运行时。\n\n有很多选择，你可以自由挑选。一个流行的选择是 CXF，这是一个 Apache\
  \ 项目。在本例中，你将嵌入 CXF，因为它健壮、经过充分测试，并且支持其他重要标准，例如用于 RESTful 端点的 API——JAX-RS。\n\n首先，让我们看一下\
  \ `Initializer` 类，它用于在符合 Servlet 3.1 规范的服务器（如 Apache Tomcat 8.5）上引导应用。\n\n```\n\
  package com.apress.springrecipes.weather.config;\nimport org.springframework.web.WebApplicationInitializer;\n\
  import org.springframework.web.servlet.DispatcherServlet;\nimport org.springframework.web.context.ContextLoaderListener;\n\
  import org.springframework.web.context.support.XmlWebApplicationContext;\nimport\
  \ org.apache.cxf.transport.servlet.CXFServlet;\nimport javax.servlet.ServletRegistration;\n\
  import javax.servlet.ServletContext;\nimport javax.servlet.ServletException;\npublic\
  \ class Initializer implements WebApplicationInitializer {\npublic void onStartup(ServletContext\
  \ container) throws ServletException {\nXmlWebApplicationContext context = new XmlWebApplicationContext();\n\
  context.setConfigLocation(\"/WEB-INF/appContext.xml\");\ncontainer.addListener(new\
  \ ContextLoaderListener(context));\nServletRegistration.Dynamic cxf = container.addServlet(\"\
  cxf\", new CXFServlet());\ncxf.setLoadOnStartup(1);\ncxf.addMapping(\"/*\");\n}\n\
  }\n```\n\n这个 `Initializer` 类看起来与所有 Spring MVC 应用非常相似。唯一的例外是你配置了一个 `CXFServlet`，它处理了公开服务所需的大量繁重工作。在\
  \ Spring MVC 配置文件中，你将使用 CXF 提供的 Spring 命名空间支持来配置服务。Spring 上下文文件很简单；大部分是样板化的 XML\
  \ 命名空间和 Spring 上下文文件导入。这里只展示两个重要的节，你首先像往常一样配置服务本身。最后，你使用 CXF 的 `jaxws:endpoint`\
  \ 命名空间来配置端点。\n\n```\npackage com.apress.springrecipes.weather.config;\nimport com.apress.springrecipes.weather.WeatherService;\n\
  import com.apress.springrecipes.weather.WeatherServiceImpl;\nimport org.apache.cxf.Bus;\n\
  import org.apache.cxf.jaxws.EndpointImpl;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.ImportResource;\n\
  @Configuration\n@ImportResource(\"classpath:META-INF/cxf/cxf.xml\")\npublic class\
  \ WeatherConfig {\n@Bean\npublic WeatherService weatherService() {\nreturn new WeatherServiceImpl();\n\
  }\n@Bean(initMethod = \"publish\")\npublic EndpointImpl endpoint(Bus bus) {\nEndpointImpl\
  \ endpoint = new EndpointImpl(bus, weatherService());\nendpoint.setAddress(\"/weather\"\
  );\nreturn endpoint;\n}\n}\n```\n\n你使用 `EndpointImp` 类注册一个端点。它需要 CXF 的 `Bus`（在导入的\
  \ `cxf.xml` 文件中配置，该文件由 Apache CXF 提供），并使用 `weatherService` Spring Bean 作为实现。你通过\
  \ `address` 属性告诉它在哪个地址发布服务。在这种情况下，由于 `Initializer` 将 CXF Servlet 挂载在根目录 (`/`) 下，CXF\
  \ 的 `weatherService` 端点将可以通过 `/cxf/weather` 访问（因为应用部署在 `/cxf` 上）。\n\n\n\n请注意，`publish`\
  \ 方法被用作 `initMethod`。除了使用此方法和 `setAddress` 之外，你也可以使用 `endpoint.publish(\"/weather\"\
  )`。然而，使用 `initMethod` 可以在端点发布之前，通过回调来增强或配置实际的 `EndpointImpl`。例如，如果你有多个需要配置 SSL 的端点，这会非常方便。\n\
  \n请注意，`weatherServiceImpl` 中的 Java 代码与之前保持一致，仍然使用 `@WebService` 和 `@WebMethod` 注解。启动应用程序和\
  \ Web 容器，然后在浏览器中打开该应用程序。在本书的源代码中，该应用程序被构建为一个名为 `cxf.war` 的 WAR 包，并且由于 CXF 部署在 `/cxf`\
  \ 路径下，SOAP WSDL 契约可通过 `http://localhost:8080/cxf/weather` 访问。如果你在浏览器中打开 `http://localhost:8080/cxf`\
  \ 页面，你将看到可用服务及其操作的目录。点击服务的 WSDL 链接——或者直接在服务端点后附加 `?wsdl`——即可查看该服务的 WSDL。该 WSDL 契约与上一节中使用\
  \ JAX-WS JDK 支持描述的契约非常相似。唯一的区别在于，此处的 WSDL 契约是在 CXF 的帮助下生成的。\n\n使用 Spring 的 JaxWsPortProxyFactoryBean\
  \ 调用 Web 服务\n\nSpring 提供了访问 SOAP WSDL 契约并与底层服务进行通信的功能，就像操作一个普通的 Spring Bean 一样。此功能由\
  \ `JaxWsPortProxyFactoryBean` 提供。以下是一个使用 `JaxWsPortProxyFactoryBean` 访问 SOAP 天气服务的\
  \ Bean 定义示例：\n\n```\n@Bean\npublic JaxWsPortProxyFactoryBean weatherService() throws\
  \ MalformedURLException {\nJaxWsPortProxyFactoryBean weatherService = new JaxWsPortProxyFactoryBean();\n\
  weatherService.setServiceInterface(WeatherService.class);\nweatherService.setWsdlDocumentUrl(new\
  \ URL(\"http://localhost:8080/cxf/weather?WSDL\"));\nweatherService.setNamespaceUri(\"\
  http://weather.springrecipes.apress.com/\");\nweatherService.setServiceName(\"weather\"\
  );\nweatherService.setPortName(\"WeatherServiceImplPort\");\nreturn weatherService;\n\
  }\n```\n\n该 Bean 实例被命名为 `weatherService`。通过这个引用，你将能够像调用本地方法一样调用底层的 SOAP 服务方法（例如，`weatherService.getTemperatures(city,\
  \ dates)`）。`JaxWsPortProxyFactoryBean` 需要设置以下几个属性，下面将逐一说明。\n\n`serviceInterface`\
  \ 属性定义了 SOAP 调用的服务接口。以天气服务为例，你可以直接使用服务器端的实现代码，两者是相同的。如果你要访问一个没有服务器端代码的 SOAP 服务，你始终可以使用像\
  \ `java2wsdl` 这样的工具，根据 WSDL 契约创建这个 Java 接口。请注意，客户端使用的 `serviceInterface` 需要使用与服务器端实现相同的\
  \ JAX-WS 注解（即 `@WebService`）。\n\n`wsdlDocumentUrl` 属性表示 WSDL 契约的位置。在本例中，它指向本方案中的\
  \ CXF SOAP 端点，但你同样可以将此属性定义为访问本方案中的 JAX-WS JDK 端点，或者任何其他 WSDL 契约。\n\n`namesapceUrl`、`serviceName`\
  \ 和 `portName` 属性都与 WSDL 契约本身相关。由于一个 WSDL 契约中可能包含多个命名空间、服务和端口，你需要告诉 Spring 使用哪些值来访问服务。此处提供的值可以通过手动检查天气服务的\
  \ WSDL 契约轻松验证。\n\n使用 CXF 调用 Web 服务\n\n现在，让我们使用 CXF 来定义一个 Web 服务客户端。该客户端与之前方案中的相同，无需进行特殊的\
  \ Java 配置或编码。你只需要将服务的接口放在类路径上即可。完成后，你就可以使用 CXF 的命名空间支持来创建客户端。\n\n```\npackage com.apress.springrecipes.weather.config;\n\
  import com.apress.springrecipes.weather.WeatherService;\nimport com.apress.springrecipes.weather.WeatherServiceClient;\n\
  import org.apache.cxf.jaxws.JaxWsProxyFactoryBean;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.ImportResource;\n\
  @Configuration\n@ImportResource(\"classpath:META-INF/cxf/cxf.xml\")\npublic class\
  \ WeatherConfigCxfClient {\n@Bean\npublic WeatherServiceClient weatherClient(WeatherService\
  \ weatherService) {\nreturn new WeatherServiceClient(weatherService);\n}\n@Bean\n\
  public WeatherService weatherServiceProxy() {\nJaxWsProxyFactoryBean factory = new\
  \ JaxWsProxyFactoryBean();\nfactory.setServiceClass(WeatherService.class);\nfactory.setAddress(\"\
  http://localhost:8080/cxf/weather\");\nreturn (WeatherService) factory.create();\n\
  }\n}\n```\n\n请注意 `@ImportResource(\"classpath:META-INF/cxf/cxf.xml\")`，它导入并加载了 Apache\
  \ CXF 提供所需的基础设施 Bean。\n\n要创建客户端，你可以使用 `JaxWsProxyFactoryBean`，并为其传递需要使用的服务类以及需要连接的地址。然后，使用\
  \ `create` 方法创建一个代理，该代理的行为就像一个普通的 `WeatherService`。这就是全部所需的工作。之前方案中的示例在其他方面保持不变：你将客户端注入到\
  \ `WeatherServiceClient` 中，并使用 `weatherService` 引用调用它（例如，`weatherService.getTemperatures(city,\
  \ dates)`）。\n\n13-10. 使用契约优先的 SOAP Web 服务\n\n问题\n\n你希望开发一个契约优先的 SOAP Web 服务，而不是像上一个方案中那样开发代码优先的\
  \ SOAP Web 服务。\n\n解决方案\n\n开发 SOAP Web 服务有两种方法。一种称为代码优先，即从 Java 类开始，然后逐步构建出 WSDL\
  \ 契约。另一种方法称为契约优先，即从 XML 数据契约（比 WSDL 更简单）开始，然后逐步构建出实现服务的 Java 类。要为契约优先的 SOAP Web\
  \ 服务创建数据契约，你需要一个 XSD 文件或 XML Schema 文件，用于描述服务支持的操作和数据。之所以需要 XSD 文件，是因为在“底层”，SOAP\
  \ 服务客户端和服务器之间的通信是以 XSD 文件中定义的 XML 格式进行的。然而，由于正确编写 XSD 文件可能比较困难，更好的做法是先创建示例 XML 消息，然后从中生成\
  \ XSD 文件。有了 XSD 文件后，你可以利用 Spring-WS 之类的工具，从 XSD 文件构建 SOAP Web 服务。\n\n工作原理\n\n开始构建契约优先\
  \ Web 服务的最简单方法是编写示例 XML 消息。编写完成后，你可以使用工具从中提取契约，即 XSD 文件。获得 XSD 文件后，你可以使用另一个工具来构建\
  \ Web 服务客户端。\n\n创建示例 XML 消息\n\n让我们再次实现之前方案中介绍的天气服务，但这次使用 SOAP 契约优先的方法。你需要编写一个 SOAP\
  \ 服务，该服务能够根据城市和日期传递天气信息，并返回最低、最高和平均温度。与之前方案中编写代码支持上述功能不同，让我们使用契约优先的方法，通过如下所示的 XML\
  \ 消息来描述特定城市和日期的温度：\n\n```\n5.0\n10.0\n8.0\n\n```\n\n\n\n这是以**契约优先**方式为天气服务建立数据契约的第一步。现在，让我们定义一些操作。您希望允许客户端查询特定城市在多个日期的温度。每个请求包含一个城市元素和多个日期元素。您还需要为此请求指定命名空间，以避免与其他\
  \ XML 文档发生命名冲突。让我们创建这个 XML 消息并将其保存到一个名为 `request.xml` 的文件中。\n\n```\nHouston\n2013-12-01\n\
  2013-12-08\n2013-12-15\n\n```\n\n对上述类型请求的响应将包含多个 `TemperatureInfo` 元素，每个元素根据请求的日期表示特定城市和日期的温度。让我们创建这个\
  \ XML 消息并将其保存到一个名为 `response.xml` 的文件中。\n\n```\n\n5.0\n10.0\n8.0\n\n4.0\n13.0\n\
  7.0\n\n10.0\n18.0\n15.0\n\n```\n\n从示例 XML 消息生成 XSD 文件\n\n现在，您可以从前面的示例 XML 消息生成 XSD\
  \ 文件。大多数 XML 工具和企业级 Java IDE 都可以从几个 XML 文件生成 XSD 文件。这里，您将使用 Apache XMLBeans ( [`http://xmlbeans.apache.org/`](http://xmlbeans.apache.org/)\
  \ ) 来生成 XSD 文件。\n\n注意\n\n您可以从 Apache XMLBeans 网站下载 Apache XMLBeans（例如 v2.6.0），并将其解压到您选择的目录中以完成安装。\n\
  \nApache XMLBeans 提供了一个名为 `inst2xsd` 的工具，用于从 XML 文件生成 XSD 文件。它支持几种用于生成 XSD 文件的设计类型。最简单的一种称为**俄罗斯套娃设计**，它会为目标\
  \ XSD 文件生成局部元素和局部类型。由于您的 XML 消息中没有使用枚举类型，您可以禁用枚举生成功能。您可以执行以下命令，从之前的 XML 文件生成 XSD\
  \ 文件：\n\n```\ninst2xsd -design rd -enumerations never request.xml response.xml\n\
  ```\n\n生成的 XSD 文件将具有默认名称 `schema0.xsd`，位于同一目录中。让我们将其重命名为 `temperature.xsd`。\n\n\
  优化生成的 XSD 文件\n\n如您所见，生成的 XSD 文件允许客户端查询无限数量的日期。如果您想对最大和最小查询日期添加约束，可以修改 `maxOccurs`\
  \ 和 `minOccurs` 属性。\n\n```\n\n...\n\n```\n\n预览生成的 WSDL 文件\n\n正如您稍后将全面了解到的，Spring-WS\
  \ 能够从 XSD 文件自动生成 WSDL 契约。以下代码片段说明了用于此目的的 Spring Bean 配置——我们将在下一个配方中添加关于如何使用此代码片段的上下文，该配方描述了如何使用\
  \ Spring-WS 构建 SOAP Web 服务。\n\n在这里，您将预览生成的 WSDL 文件，以便更好地理解服务契约。为简单起见，省略了不太重要的部分。\n\
  \n```\n\n...\n\n...\n\n```\n\n在 `Weather` 端口类型中，定义了一个 `GetTemperatures` 操作，其名称源自输入和输出消息的前缀（即\
  \ `<GetTemperaturesRequest>` 和 `<GetTemperaturesResponse>`）。这两个元素的定义包含在 `<wsdl:types>`\
  \ 部分中，如数据契约中所定义。\n\n现在有了 WSDL 契约，您可以生成必要的 Java 接口，然后为每个最初以 XML 消息形式存在的操作编写后端代码。这种完整的技术将在下一个配方中探讨，该配方使用\
  \ Spring-WS 进行处理。\n\n13-11. 使用 Spring-WS 暴露和调用 SOAP Web 服务\n\n问题\n\n您有一个 XSD 文件用于开发契约优先的\
  \ SOAP Web 服务，但不知道如何或使用什么来实现该契约优先的 SOAP 服务。\n\nSpring-WS 从一开始就被设计为支持契约优先的 SOAP Web\
  \ 服务。然而，这并不意味着 Spring-WS 是在 Java 中创建 SOAP Web 服务的唯一方法。像 CXF 这样的 JAX-WS 实现也支持这种技术。尽管如此，在\
  \ Spring 应用程序的上下文中，Spring-WS 是执行契约优先 SOAP Web 服务更成熟、更自然的方法。描述其他契约优先的 SOAP Java 技术将超出\
  \ Spring 框架的范围。\n\n解决方案\n\nSpring-WS 提供了一组设施来开发契约优先的 SOAP Web 服务。构建 Spring-WS Web\
  \ 服务的基本任务包括：\n\n1.  为 Spring-WS 设置和配置一个 Spring MVC 应用程序。\n2.  将 Web 服务请求映射到端点。\n\
  3.  创建服务端点来处理请求消息并返回响应消息。\n4.  为 Web 服务发布 WSDL 文件。\n\n设置 Spring-WS 应用程序\n\n为了使用\
  \ Spring-WS 实现一个 Web 服务，让我们首先创建一个 Web 应用程序初始化器类，以引导一个带有 SOAP Web 服务的 Web 应用程序。您需要配置\
  \ `MessageDispatcherServlet` Servlet，它是 Spring-WS 的一部分。该 Servlet 专门用于将 Web 服务消息分派到适当的端点，并检测\
  \ Spring-WS 的框架设施。\n\n```\npackage com.apress.springrecipes.weather.config;\nimport\
  \ org.springframework.ws.transport.http.support.AbstractAnnotationConfigMessageDispatcherServletInitializer;\n\
  public class Initializer extends AbstractAnnotationConfigMessageDispatcherServletInitializer\
  \ {\n@Override\nprotected Class[] getRootConfigClasses() {\nreturn null;\n}\n@Override\n\
  protected Class[] getServletConfigClasses() {\nreturn new Class[] {SpringWsConfiguration.class};\n\
  }\n}\n```\n\n为了简化配置，有一个 `AbstractAnnotationConfigMessageDispatcherServletInitializer`\
  \ 基类可供您扩展。您需要为其提供构成 `rootConfig` 和 `servletConfig` 的配置类。前者可以为 `null`，而后者是必需的。\n\n\
  前面的配置将使用 `SpringWsConfiguration` 类引导 `MessageDispatcherServlet`，并将其注册到 `/services/*`\
  \ 和 `*.wsdl` URL。\n\n```\npackage com.apress.springrecipes.weather.config;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.ws.config.annotation.EnableWs;\nimport org.springframework.ws.wsdl.wsdl11.DefaultWsdl11Definition;\n\
  import org.springframework.xml.xsd.SimpleXsdSchema;\nimport org.springframework.xml.xsd.XsdSchema;\n\
  @Configuration\n@EnableWs\n@ComponentScan(\"com.apress.springrecipes.weather\")\n\
  public class SpringWsConfiguration {\n...\n}\n```\n\n`SpringWsConfiguration` 类使用\
  \ `@EnableWs` 注解，该注解注册了使 `MessageDispatcherServlet` 工作所需的 Bean。还有 `@ComponentScan`\
  \ 注解，用于扫描 `@Service` 和 `@Endpoint` Bean。\n\n创建服务端点\n\nSpring-WS 支持通过 `@Endpoint`\
  \ 注解将任意类标记为服务端点，使其可作为服务访问。除了 `@Endpoint` 注解外，您还需要使用 `@PayloadRoot` 注解来注解处理方法，以映射服务请求。每个处理方法还依赖\
  \ `@ResponsePayload` 和 `@RequestPayload` 注解来处理传入和传出的服务数据。\n\n\n\n```\npackage com.apress.springrecipes.weather;\n\
  import org.dom4j.Document;\nimport org.dom4j.DocumentHelper;\nimport org.dom4j.Element;\n\
  import org.dom4j.XPath;\nimport org.dom4j.xpath.DefaultXPath;\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
  import org.springframework.ws.server.endpoint.annotation.PayloadRoot;\nimport org.springframework.ws.server.endpoint.annotation.RequestPayload;\n\
  import org.springframework.ws.server.endpoint.annotation.ResponsePayload;\nimport\
  \ java.text.DateFormat;\nimport java.text.SimpleDateFormat;\nimport java.util.*;\n\
  @Endpoint\npublic class TemperatureEndpoint {\nprivate static final String namespaceUri\
  \ = \"http://springrecipes.apress.com/weather/schemas\";\nprivate XPath cityPath;\n\
  private XPath datePath;\nprivate final WeatherService weatherService;\npublic TemperatureEndpoint(WeatherService\
  \ weatherService) {\nthis.weatherService = weatherService;\n// 创建 XPath 对象，包含命名空间\n\
  Map namespaceUris = new HashMap();\nnamespaceUris.put(\"weather\", namespaceUri);\n\
  cityPath = new DefaultXPath(\"/weather:GetTemperaturesRequest/weather:city\");\n\
  cityPath.setNamespaceURIs(namespaceUris);\ndatePath = new DefaultXPath(\"/weather:GetTemperaturesRequest/weather:date\"\
  );\ndatePath.setNamespaceURIs(namespaceUris);\n}\n@PayloadRoot(localPart = \"GetTemperaturesRequest\"\
  , namespace = namespaceUri)\n@ResponsePayload\npublic Element getTemperature(@RequestPayload\
  \ Element requestElement) throws Exception {\nDateFormat dateFormat = new SimpleDateFormat(\"\
  yyyy-MM-dd\");\n// 从请求消息中提取服务参数\nString city = cityPath.valueOf(requestElement);\n\
  List dates = new ArrayList();\nfor (Object node : datePath.selectNodes(requestElement))\
  \ {\nElement element = (Element) node;\ndates.add(dateFormat.parse(element.getText()));\n\
  }\n// 调用后端服务处理请求\nList temperatures =\nweatherService.getTemperatures(city, dates);\n\
  // 根据后端服务的结果构建响应消息\nDocument responseDocument = DocumentHelper.createDocument();\n\
  Element responseElement = responseDocument.addElement(\n\"GetTemperaturesResponse\"\
  , namespaceUri);\nfor (TemperatureInfo temperature : temperatures) {\nElement temperatureElement\
  \ = responseElement.addElement(\n\"TemperatureInfo\");\ntemperatureElement.addAttribute(\"\
  city\", temperature.getCity());\ntemperatureElement.addAttribute(\n\"date\", dateFormat.format(temperature.getDate()));\n\
  temperatureElement.addElement(\"min\").setText(\nDouble.toString(temperature.getMin()));\n\
  temperatureElement.addElement(\"max\").setText(\nDouble.toString(temperature.getMax()));\n\
  temperatureElement.addElement(\"average\").setText(\nDouble.toString(temperature.getAverage()));\n\
  }\nreturn responseElement;\n}\n}\n```\n\n在 `@PayloadRoot` 注解中，你需要指定要处理的有效负载根元素的本地名称（`getTemperaturesRequest`）和命名空间（[`http://springrecipes.apress.com/weather/schemas`](http://springrecipes.apress.com/weather/schemas)）。接下来，该方法使用\
  \ `@ResponsePayload` 注解进行修饰，表明该方法的返回值是服务响应数据。此外，方法的输入参数使用 `@RequestPayload` 注解进行修饰，以表明它是服务输入值。\n\
  \n然后在处理器方法内部，你首先从请求消息中提取服务参数。这里，你使用 XPath 来帮助定位元素。XPath 对象在构造函数中创建，以便它们可以在后续的请求处理中被重用。请注意，你必须在\
  \ XPath 表达式中包含命名空间，否则它们将无法正确定位元素。提取服务参数后，你调用后端服务来处理请求。由于此端点配置在 Spring IoC 容器中，因此它可以轻松地通过依赖注入引用其他\
  \ Bean。最后，你根据后端服务的结果构建响应消息。在此示例中，你使用了 dom4j 库，它提供了丰富的 API 来构建 XML 消息。但你也可以使用任何其他你想要的\
  \ XML 处理 API 或 Java 解析器（例如 DOM）。\n\n由于你已经在 `SpringWsConfiguration` 类中定义了 `@ComponentScan`\
  \ 注解，Spring 会自动拾取所有 Spring-WS 注解并将端点部署到 Servlet。\n\n发布 WSDL 文件\n\n完成 SOAP Web 服务的最后一步是发布\
  \ WSDL 文件。在 Spring-WS 中，你无需手动编写 WSDL 文件；你只需要向 `SpringWsConfiguration` 类中添加一个 Bean\
  \ 即可。\n\n```\n@Bean\npublic DefaultWsdl11Definition temperature() {\nDefaultWsdl11Definition\
  \ temperature = new DefaultWsdl11Definition();\ntemperature.setPortTypeName(\"Weather\"\
  );\ntemperature.setLocationUri(\"/\");\ntemperature.setSchema(temperatureSchema());\n\
  return temperature;\n}\n@Bean\npublic XsdSchema temperatureSchema() {\nreturn new\
  \ SimpleXsdSchema(new ClassPathResource(\"/META-INF/xsd/temperature.xsd\"));\n}\n\
  ```\n\n`DefaultWsdl11Definition` 类要求你指定两个属性：服务的 `portTypeName`，以及部署最终 WSDL 的 `locationUri`。此外，它还要求你指定用于创建\
  \ WSDL 的 XSD 文件的位置——有关如何创建 XSD 文件的详细信息，请参阅之前的配方。在此示例中，XSD 文件将位于应用程序的 `META-INF`\
  \ 目录中。由于你在 XSD 文件中定义了 `<GetTemperaturesRequest>` 和 `<GetTemperaturesResponse>`，并且将端口类型名称指定为\
  \ `Weather`，WSDL 构建器将为你生成以下 WSDL 端口类型和操作。以下片段取自生成的 WSDL 文件：\n\n最后，你可以通过将定义的 Bean\
  \ 名称与 `.wsdl` 后缀拼接来访问此 WSDL 文件。假设 Web 应用程序被打包成一个名为 `springws` 的 WAR 文件，那么该服务部署在\
  \ `http://localhost:8080/springws/` 下——因为初始化器中的 Spring-WS Servlet 部署在 `/services`\
  \ 目录上——并且 WSDL 文件的 URL 将是 `http://localhost:8080/springws/services/weather/temperature.wsdl`，前提是\
  \ WSDL 定义的 Bean 名称为 temperature。\n\n使用 Spring-WS 调用 SOAP Web 服务\n\n现在，让我们创建一个 Spring-WS\
  \ 客户端，根据其发布的契约来调用天气服务。你可以通过解析请求和响应 XML 消息来创建 Spring-WS 客户端。作为示例，你将使用 dom4j 来实现它，但你可以自由选择任何其他\
  \ XML 解析 API。\n\n为了向客户端屏蔽底层调用细节，你将创建一个本地代理来调用 SOAP Web 服务。该代理也实现了 `WeatherService`\
  \ 接口，并将本地方法调用转换为远程 SOAP Web 服务调用。\n\n\n```\n```\npackage com.apress.springrecipes.weather;\n\
  import org.dom4j.Document;\nimport org.dom4j.DocumentHelper;\nimport org.dom4j.Element;\n\
  import org.dom4j.io.DocumentResult;\nimport org.dom4j.io.DocumentSource;\nimport\
  \ org.springframework.ws.client.core.WebServiceTemplate;\nimport java.text.DateFormat;\n\
  import java.text.ParseException;\nimport java.text.SimpleDateFormat;\nimport java.util.ArrayList;\n\
  import java.util.Date;\nimport java.util.List;\npublic class WeatherServiceProxy\
  \ implements WeatherService {\nprivate static final String namespaceUri = \"http://springrecipes.apress.com/weather/schemas\"\
  ;\nprivate final WebServiceTemplate webServiceTemplate;\npublic WeatherServiceProxy(WebServiceTemplate\
  \ webServiceTemplate) throws Exception {\nthis.webServiceTemplate = webServiceTemplate;\n\
  }\npublic List getTemperatures(String city, List dates) {\nprivate DateFormat dateFormat\
  \ = new SimpleDateFormat(\"yyyy-MM-dd\");\nDocument requestDocument = DocumentHelper.createDocument();\n\
  Element requestElement = requestDocument.addElement(\n\"GetTemperaturesRequest\"\
  , namespaceUri);\nrequestElement.addElement(\"city\").setText(city);\nfor (Date\
  \ date : dates) {\nrequestElement.addElement(\"date\").setText(dateFormat.format(date));\n\
  }\nDocumentSource source = new DocumentSource(requestDocument);\nDocumentResult\
  \ result = new DocumentResult();\nwebServiceTemplate.sendSourceAndReceiveToResult(source,\
  \ result);\nDocument responsetDocument = result.getDocument();\nElement responseElement\
  \ = responsetDocument.getRootElement();\nList temperatures = new ArrayList();\n\
  for (Object node : responseElement.elements(\"TemperatureInfo\")) {\nElement element\
  \ = (Element) node;\ntry {\nDate date = dateFormat.parse(element.attributeValue(\"\
  date\"));\ndouble min = Double.parseDouble(element.elementText(\"min\"));\ndouble\
  \ max = Double.parseDouble(element.elementText(\"max\"));\ndouble average = Double.parseDouble(\n\
  element.elementText(\"average\"));\ntemperatures.add(\nnew TemperatureInfo(city,\
  \ date, min, max, average));\n} catch (ParseException e) {\nthrow new RuntimeException(e);\n\
  }\n}\nreturn temperatures;\n}\n}\n```\n\n在 `getTemperatures()` 方法中，你首先使用 dom4j API\
  \ 构建请求消息。`WebServiceTemplate` 提供了一个 `sendSourceAndReceiveToResult()` 方法，该方法接受一个\
  \ `java.xml.transform.Source` 对象和一个 `java.xml.transform.Result` 对象作为参数。你需要构建一个 dom4j\
  \ `DocumentSource` 对象来包装你的请求文档，并创建一个新的 dom4j `DocumentResult` 对象，供该方法将响应文档写入其中。最后，你获取响应消息并从中提取结果。\n\
  \n编写好服务代理后，你可以在配置类中声明它，然后使用独立类进行调用。\n\n```\npackage com.apress.springrecipes.weather.config;\n\
  import com.apress.springrecipes.weather.WeatherService;\nimport com.apress.springrecipes.weather.WeatherServiceClient;\n\
  import com.apress.springrecipes.weather.WeatherServiceProxy;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.ws.client.core.WebServiceTemplate;\n\
  @Configuration\npublic class SpringWsClientConfiguration {\n@Bean\npublic WeatherServiceClient\
  \ weatherServiceClient(WeatherService weatherService) throws Exception {\nreturn\
  \ new WeatherServiceClient(weatherService);\n}\n@Bean\npublic WeatherServiceProxy\
  \ weatherServiceProxy(WebServiceTemplate webServiceTemplate) throws Exception {\n\
  return new WeatherServiceProxy(webServiceTemplate);\n}\n@Bean\npublic WebServiceTemplate\
  \ webServiceTemplate() {\nWebServiceTemplate webServiceTemplate = new WebServiceTemplate();\n\
  webServiceTemplate.setDefaultUri(\"http://localhost:8080/springws/services\");\n\
  return webServiceTemplate;\n}\n}\n```\n\n请注意，`webServiceTemplate` 的 `defaultUri`\
  \ 值被设置为前几节中为 Spring-WS 端点定义的端点地址。一旦应用程序加载了配置，你就可以使用以下类调用 SOAP 服务：\n\n```\npackage\
  \ com.apress.springrecipes.weather;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.support.GenericXmlApplicationContext;\npublic\
  \ class SpringWSInvokerClient {\npublic static void main(String[] args) {\nApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(\"com.apress.springrecipes.weather.config\"\
  );\nWeatherServiceClient client = context.getBean(WeatherServiceClient.class);\n\
  TemperatureInfo temperature = client.getTodayTemperature(\"Houston\");\nSystem.out.println(\"\
  Min temperature : \" + temperature.getMin());\nSystem.out.println(\"Max temperature\
  \ : \" + temperature.getMax());\nSystem.out.println(\"Average temperature : \" +\
  \ temperature.getAverage());\n}\n}\n```\n\n13-12. 使用 Spring-WS 和 XML 编组开发 SOAP Web\
  \ 服务\n\n问题\n\n为了采用契约优先的方法开发 Web 服务，你必须处理请求和响应 XML 消息。如果直接使用 XML 解析 API 解析 XML 消息，你将不得不使用底层\
  \ API 逐个处理 XML 元素，这是一项繁琐且低效的任务。\n\n解决方案\n\nSpring-WS 支持使用 XML 编组技术，将对象编组为 XML 文档，以及从\
  \ XML 文档解组为对象。通过这种方式，你可以处理对象属性，而不是 XML 元素。这项技术也称为对象/XML 映射（OXM），因为你实际上是在对象和 XML\
  \ 文档之间进行映射。要使用 XML 编组技术实现端点，你可以为其配置一个 XML 编组器。表 13-2 列出了 Spring 为不同 XML 编组 API 提供的编组器。\n\
  \n表 13-2. 不同 XML 编组 API 的编组器\n\nAPI\n | 编组器\n |\n\n| --- | --- | --- | --- | ---\
  \ |\n\nJAXB 2.0\n | `org.springframework.oxm.jaxb.Jaxb2Marshaller`\n |\n\nCastor\n\
  \ | `org.springframework.oxm.castor.CastorMarshaller`\n |\n\nXMLBeans\n | `org.springframework.oxm.xmlbeans.XmlBeansMarshaller`\n\
  \ |\n\nJiBX\n | `org.springframework.oxm.jibx.JibxMarshaller`\n |\n\nXStream\n |\
  \ `org.springframework.oxm.xstream.XStreamMarshaller`\n |\n\n类似地，Spring WS 客户端也可以使用相同的编组和解组技术来简化\
  \ XML 数据处理。\n\n工作原理\n\n你可以在端点和客户端中使用编组和解组。首先，你将看到如何创建端点并利用 Spring OXM 编组器，然后是如何创建使用相同技术的客户端。\n\
  \n使用 XML 编组创建服务端点\n\nSpring-WS 支持多种 XML 编组 API，包括 JAXB 2.0、Castor、XMLBeans、JiBX\
  \ 和 XStream。作为示例，你将使用 Castor（[`www.castor.org`](http://www.castor.org)）作为编组器来创建一个服务端点。使用其他\
  \ XML 编组 API 的方式类似。使用 XML 编组的第一步是根据 XML 消息格式创建对象模型。这个模型通常可以由编组 API 生成。对于某些编组 API，对象模型必须由它们生成，以便它们可以插入编组特定的信息。由于\
  \ Castor 支持 XML 消息与任意 Java 对象之间的编组，你可以自行开始创建以下类：\n\n```\npackage com.apress.springrecipes.weather;\n\
  ...\npublic class GetTemperaturesRequest {\nprivate String city;\nprivate List dates;\n\
  // 构造方法、Getter 和 Setter\n...\n}\npackage com.apress.springrecipes.weather;\n...\n\
  public class GetTemperaturesResponse {\nprivate List temperatures;\n// 构造方法、Getter\
  \ 和 Setter\n...\n}\n```\n\n创建好对象模型后，你可以轻松地在任何端点上集成编组功能。让我们将此技术应用于前一个配方中介绍的端点。\n\
  ```\n\n```java\npackage com.apress.springrecipes.weather;\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
  import org.springframework.ws.server.endpoint.annotation.PayloadRoot;\nimport org.springframework.ws.server.endpoint.annotation.RequestPayload;\n\
  import org.springframework.ws.server.endpoint.annotation.ResponsePayload;\nimport\
  \ java.util.List;\n@Endpoint\npublic class TemperatureMarshallingEndpoint {\nprivate\
  \ static final String namespaceUri = \"http://springrecipes.apress.com/weather/schemas\"\
  ;\nprivate final WeatherService weatherService;\npublic TemperatureMarshallingEndpoint(WeatherService\
  \ weatherService) {\nthis.weatherService = weatherService;\n}\n@PayloadRoot(localPart\
  \ = \"GetTemperaturesRequest\", namespace = namespaceUri)\npublic @ResponsePayload\
  \ GetTemperaturesResponse getTemperature(@RequestPayload GetTemperaturesRequest\
  \ request) {\nList temperatures =\nweatherService.getTemperatures(request.getCity(),\
  \ request.getDates());\nreturn new GetTemperaturesResponse(temperatures);\n}\n}\n\
  ```\n\n请注意，在这个新的方法端点中，你只需处理请求对象并返回响应对象。然后，它将被编组为响应 XML 消息。除了修改端点之外，编组端点还要求同时设置 `marshaller`\
  \ 和 `unmarshaller` 属性。通常，你可以为这两个属性指定同一个编组器。对于 Castor，你需要声明一个 `CastorMarshaller`\
  \ bean 作为编组器。除了编组器，你还需要注册 `MethodArgumentResolver` 和 `MethodReturnValueHandler`\
  \ 来实际处理方法参数和返回类型的编组。为此，你需要扩展 `WsConfigurerAdapter`，重写 `addArgumentResolvers` 和 `addReturnValueHandlers`\
  \ 方法，并将 `MarshallingPayloadMethodProcessor` 添加到两个列表中。\n\n```java\n@Configuration\n\
  @EnableWs\n@ComponentScan(\"com.apress.springrecipes.weather\")\npublic class SpringWsConfiguration\
  \ extends WsConfigurerAdapter {\n@Bean\npublic MarshallingPayloadMethodProcessor\
  \ marshallingPayloadMethodProcessor() {\nreturn new MarshallingPayloadMethodProcessor(marshaller());\n\
  }\n@Bean\npublic Marshaller marshaller() {\nCastorMarshaller marshaller = new CastorMarshaller();\n\
  marshaller.setMappingLocation(new ClassPathResource(\"/mapping.xml\"));\nreturn\
  \ marshaller;\n}\n@Override\npublic void addArgumentResolvers(List argumentResolvers)\
  \ {\nargumentResolvers.add(marshallingPayloadMethodProcessor());\n}\n@Override\n\
  public void addReturnValueHandlers(List returnValueHandlers) {\nreturnValueHandlers.add(marshallingPayloadMethodProcessor());\n\
  }\n}\n```\n\n请注意，Castor 需要一个映射配置文件来了解如何在对象和 XML 文档之间进行映射。你可以在类路径根目录下创建此文件，并在 `mappingLocation`\
  \ 属性中指定它（例如 `mapping.xml`）。以下 Castor 映射文件定义了 `GetTemperaturesRequest`、`GetTemperaturesResponse`\
  \ 和 `TemperatureInfo` 类的映射：\n\n此外，在所有日期字段中，你必须指定一个处理器，以使用特定的日期格式转换日期。该处理器如下所示：\n\
  \n```java\npackage com.apress.springrecipes.weather;\n...\nimport org.exolab.castor.mapping.GeneralizedFieldHandler;\n\
  public class DateFieldHandler extends GeneralizedFieldHandler {\nprivate DateFormat\
  \ format = new SimpleDateFormat(\"yyyy-MM-dd\");\npublic Object convertUponGet(Object\
  \ value) {\nreturn format.format((Date) value);\n}\npublic Object convertUponSet(Object\
  \ value) {\ntry {\nreturn format.parse((String) value);\n} catch (ParseException\
  \ e) {\nthrow new RuntimeException(e);\n}\n}\npublic Class getFieldType() {\nreturn\
  \ Date.class;\n}\n}\n```\n\n使用 XML 编组调用 Web 服务\n\nSpring-WS 客户端也可以将请求和响应对象编组和解组为\
  \ XML 消息。例如，你将创建一个使用 Castor 作为编组器的客户端，以便可以重用服务端点中的对象模型 `GetTemperaturesRequest`、`GetTemperaturesResponse`\
  \ 和 `TemperatureInfo`，以及映射配置文件 `mapping.xml`。让我们使用 XML 编组来实现服务代理。`WebServiceTemplate`\
  \ 提供了一个 `marshalSendAndReceive()` 方法，该方法接受一个请求对象作为方法参数，该对象将被编组为请求消息。此方法必须返回一个将从响应消息中解组的响应对象。\n\
  \n```java\npackage com.apress.springrecipes.weather;\nimport org.springframework.ws.client.core.WebServiceTemplate;\n\
  import java.util.Date;\nimport java.util.List;\npublic class WeatherServiceProxy\
  \ implements WeatherService {\nprivate WebServiceTemplate webServiceTemplate;\n\
  public WeatherServiceProxy(WebServiceTemplate webServiceTemplate) throws Exception\
  \ {\nthis.webServiceTemplate = webServiceTemplate;\n}\npublic List getTemperatures(String\
  \ city, List dates) {\nGetTemperaturesRequest request = new GetTemperaturesRequest(city,\
  \ dates);\nGetTemperaturesResponse response = (GetTemperaturesResponse)\nthis.webServiceTemplate.marshalSendAndReceive(request);\n\
  return response.getTemperatures();\n}\n}\n```\n\n当你使用 XML 编组时，`WebServiceTemplate`\
  \ 要求同时设置 `marshaller` 和 `unmarshaller` 属性。如果你扩展此类以自动创建 `WebServiceTemplate`，也可以将它们设置为\
  \ `WebServiceGatewaySupport`。通常，你可以为这两个属性指定同一个编组器。对于 Castor，你需要声明一个 `CastorMarshaller`\
  \ bean 作为编组器。\n\n```java\npackage com.apress.springrecipes.weather.config;\nimport\
  \ com.apress.springrecipes.weather.WeatherService;\nimport com.apress.springrecipes.weather.WeatherServiceClient;\n\
  import com.apress.springrecipes.weather.WeatherServiceProxy;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.oxm.castor.CastorMarshaller;\nimport org.springframework.ws.client.core.WebServiceTemplate;\n\
  @Configuration\npublic class SpringWsClientConfiguration {\n@Bean\npublic WeatherServiceClient\
  \ weatherServiceClient(WeatherService weatherService) throws Exception {\nreturn\
  \ new WeatherServiceClient(weatherService);\n}\n@Bean\npublic WeatherServiceProxy\
  \ weatherServiceProxy(WebServiceTemplate webServiceTemplate) throws Exception {\n\
  return new WeatherServiceProxy(webServiceTemplate);\n}\n@Bean\npublic WebServiceTemplate\
  \ webServiceTemplate() {\nWebServiceTemplate webServiceTemplate = new WebServiceTemplate(marshaller());\n\
  webServiceTemplate.setDefaultUri(\"http://localhost:8080/springws/services\");\n\
  return webServiceTemplate;\n}\n@Bean\npublic CastorMarshaller marshaller() {\nCastorMarshaller\
  \ marshaller = new CastorMarshaller();\nmarshaller.setMappingLocation(new ClassPathResource(\"\
  /mapping.xml\"));\nreturn marshaller;\n}\n}\n```\n\n总结\n\n\n本章讨论了 JMX 及其相关的几个规范。你学习了如何将\
  \ Spring Bean 导出为 JMX MBean，以及如何通过 Spring 的代理，在客户端远程和本地使用这些 MBean。你还在 Spring 中发布和监听了\
  \ JMX 服务器上的通知事件。此外，你还学习了如何借助 Spring 完成电子邮件任务，包括如何创建电子邮件模板以及发送带附件的邮件（MIME 消息）。你还学习了如何使用\
  \ Quartz 调度器以及 Spring 的任务命名空间来调度任务。本章向你介绍了 Spring 支持的各种远程处理技术。你学习了如何发布和使用 RMI 服务。我们还讨论了如何使用三种不同的技术/协议（Burlap、Hessian\
  \ 和 HTTP Invoker）构建通过 HTTP 运行的服务。接下来，我们讨论了 SOAP Web 服务，以及如何使用 JAX-WS 和 Apache CXF\
  \ 框架来构建和使用这些类型的服务。最后，我们讨论了契约优先的 SOAP Web 服务，以及如何利用 Spring-WS 来创建和使用这些类型的服务。\n\n\
  14. Spring 消息传递\n\n在本章中，你将学习 Spring 对消息传递的支持。消息传递是一种非常强大的应用程序扩展技术。它允许将原本可能压垮服务的工作排队处理。它还鼓励采用解耦的架构。例如，一个组件可能只消费基于单个\
  \ `java.util.Map` 键值对的消息。这种松散的契约使其成为多个不同系统之间可行的通信枢纽。\n\n在本章中，我们将大量引用主题（Topic）和队列（Queue）。消息传递解决方案旨在解决两种类型的架构需求：从应用程序中的一个点到另一个已知点的消息传递，以及从应用程序中的一个点到许多其他未知点的消息传递。这些模式分别相当于中间件中的面对面告知某人某事，以及通过扩音器对一屋子人说话。\n\
  \n如果你希望将发送到消息队列的消息广播给一组正在“监听”该消息的未知客户端（就像扩音器的比喻），那么你应该在主题（Topic）上发送消息。如果你希望将消息发送给单个已知客户端，那么你应该通过队列（Queue）发送。\n\
  \n到本章结束时，你将能够使用 Spring 创建和访问基于消息的中间件。本章还将为你提供消息传递的一般工作知识，这将有助于你在下一章学习 Spring Integration。\n\
  \n我们将研究消息传递抽象，以及如何使用它与 JMS、AMQP 和 Apache Kafka 协同工作。对于每种技术，Spring 都通过基于模板的方法简化了使用，以便轻松发送和接收消息。此外，Spring\
  \ 允许在其 IoC 容器中声明的 Bean 监听消息并对其做出响应。它对每种技术都采用了相同的方法。\n\n注意\n\n在 `ch14\\bin` 目录中，有几个脚本用于启动不同消息提供者的\
  \ Docker 化版本：用于 JMS 的 ActiveMQ、用于 AMQP 的 RabbitMQ，以及最后的 Apache Kafka。\n\n14-1. 使用\
  \ Spring 发送和接收 JMS 消息\n\n问题\n\n要发送或接收 JMS 消息，你必须执行以下任务：\n\n1.  在消息代理上创建一个 JMS 连接工厂。\n\
  2.  创建一个 JMS 目的地，可以是队列或主题。\n3.  从连接工厂打开一个 JMS 连接。\n4.  从连接中获取一个 JMS 会话。\n5.  使用消息生产者或消费者发送或接收\
  \ JMS 消息。\n6.  处理 `JMSException`，这是一个必须处理的受检异常。\n7.  关闭 JMS 会话和连接。\n\n如你所见，发送或接收一条简单的\
  \ JMS 消息需要编写大量代码。事实上，这些任务大部分都是样板代码，每次处理 JMS 时都需要重复执行。\n\n解决方案\n\nSpring 提供了一个基于模板的解决方案来简化\
  \ JMS 代码。使用 JMS 模板（Spring 框架类 `JmsTemplate`），你可以用更少的代码发送和接收 JMS 消息。该模板处理样板任务，并将\
  \ JMS API 的 `JMSException` 层次结构转换为 Spring 的运行时异常 `org.springframework.jms.JmsException`\
  \ 层次结构。\n\n工作原理\n\n假设你正在开发一个邮局系统，该系统包含两个子系统：前台子系统和后台子系统。当前台收到邮件时，它会将邮件传递给后台进行分类和投递。同时，前台子系统会向后台子系统发送一条\
  \ JMS 消息，通知它有新邮件。邮件信息由以下类表示：\n\n```\npackage com.apress.springrecipes.post;\npublic\
  \ class Mail {\nprivate String mailId;\nprivate String country;\nprivate double\
  \ weight;\n// 构造方法、Getter 和 Setter\n...\n}\n```\n\n发送和接收邮件信息的方法定义在 `FrontDesk` 和\
  \ `BackOffice` 接口中，如下所示：\n\n```\npackage com.apress.springrecipes.post;\npublic\
  \ interface FrontDesk {\npublic void sendMail(Mail mail);\n}\npackage com.apress.springrecipes.post;\n\
  public interface BackOffice {\npublic Mail receiveMail();\n}\n```\n\n在没有 Spring\
  \ JMS 模板支持的情况下发送和接收消息\n\n让我们看看如何在没有 Spring JMS 模板支持的情况下发送和接收 JMS 消息。下面的 `FrontDeskImpl`\
  \ 类直接使用 JMS API 发送 JMS 消息。\n\n```\npackage com.apress.springrecipes.post;\nimport\
  \ javax.jms.Connection;\nimport javax.jms.ConnectionFactory;\nimport javax.jms.Destination;\n\
  import javax.jms.JMSException;\nimport javax.jms.MapMessage;\nimport javax.jms.MessageProducer;\n\
  import javax.jms.Session;\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  import org.apache.activemq.command.ActiveMQQueue;\npublic class FrontDeskImpl implements\
  \ FrontDesk {\npublic void sendMail(Mail mail) {\nConnectionFactory cf =\nnew ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\nDestination destination = new ActiveMQQueue(\"mail.queue\"\
  );\nConnection conn = null;\ntry {\nconn = cf.createConnection();\nSession session\
  \ =\nconn.createSession(false, Session.AUTO_ACKNOWLEDGE);\nMessageProducer producer\
  \ = session.createProducer(destination);\nMapMessage message = session.createMapMessage();\n\
  message.setString(\"mailId\", mail.getMailId());\nmessage.setString(\"country\"\
  , mail.getCountry());\nmessage.setDouble(\"weight\", mail.getWeight());\nproducer.send(message);\n\
  session.close();\n} catch (JMSException e) {\nthrow new RuntimeException(e);\n}\
  \ finally {\nif (conn != null) {\ntry {\nconn.close();\n} catch (JMSException e)\
  \ {\n}\n}\n}\n}\n}\n```\n\n在前面的 `sendMail()` 方法中，你首先使用 ActiveMQ 提供的类创建了 JMS 特定的\
  \ `ConnectionFactory` 和 `Destination` 对象。如果你在本地主机上运行 ActiveMQ，消息代理 URL 是其默认值。在 JMS\
  \ 中，有两种类型的目的地：队列和主题。\n\n正如本章开头所解释的，队列用于点对点通信模型，而主题用于发布-订阅通信模型。因为你正在从前台到后台进行点对点的\
  \ JMS 消息发送，所以你应该使用消息队列。你可以使用 `ActiveMQTopic` 类轻松地将主题创建为目的地。\n\n\n\n接下来，在发送消息之前，你需要创建一个连接、会话和消息生产者。JMS\
  \ API 中定义了多种消息类型，包括 `TextMessage`、`MapMessage`、`BytesMessage`、`ObjectMessage` 和\
  \ `StreamMessage`。`MapMessage` 以键值对的形式包含消息内容，类似于一个映射表。所有这些类型都是接口，其超类均为 `Message`。同时，你必须处理\
  \ `JMSException`，该异常可能由 JMS API 抛出。最后，务必记得关闭会话和连接以释放系统资源。每次关闭 JMS 连接时，其所有已打开的会话都会自动关闭。因此，你只需确保在\
  \ `finally` 块中正确关闭 JMS 连接即可。\n\n另一方面，下面的 `BackOfficeImpl` 类直接使用 JMS API 接收 JMS 消息：\n\
  \n```\npackage com.apress.springrecipes.post;\nimport javax.jms.Connection;\nimport\
  \ javax.jms.ConnectionFactory;\nimport javax.jms.Destination;\nimport javax.jms.JMSException;\n\
  import javax.jms.MapMessage;\nimport javax.jms.MessageConsumer;\nimport javax.jms.Session;\n\
  import org.apache.activemq.ActiveMQConnectionFactory;\nimport org.apache.activemq.command.ActiveMQQueue;\n\
  public class BackOfficeImpl implements BackOffice {\npublic Mail receiveMail() {\n\
  ConnectionFactory cf =\nnew ActiveMQConnectionFactory(\"tcp://localhost:61616\"\
  );\nDestination destination = new ActiveMQQueue(\"mail.queue\");\nConnection conn\
  \ = null;\ntry {\nconn = cf.createConnection();\nSession session =\nconn.createSession(false,\
  \ Session.AUTO_ACKNOWLEDGE);\nMessageConsumer consumer = session.createConsumer(destination);\n\
  conn.start();\nMapMessage message = (MapMessage) consumer.receive();\nMail mail\
  \ = new Mail();\nmail.setMailId(message.getString(\"mailId\"));\nmail.setCountry(message.getString(\"\
  country\"));\nmail.setWeight(message.getDouble(\"weight\"));\nsession.close();\n\
  return mail;\n} catch (JMSException e) {\nthrow new RuntimeException(e);\n} finally\
  \ {\nif (conn != null) {\ntry {\nconn.close();\n} catch (JMSException e) {\n}\n\
  }\n}\n}\n}\n```\n\n此方法中的大部分代码与发送 JMS 消息的代码类似，不同之处在于你创建了一个消息消费者，并从中接收 JMS 消息。请注意，这里你使用了连接的\
  \ `start()` 方法，而在之前的 `FrontDeskImpl` 示例中并未使用。\n\n当使用 `Connection` 接收消息时，你可以向连接添加监听器，这些监听器在收到消息时被调用；或者你可以同步阻塞，等待消息到达。容器无法知道你将要采用哪种方式，因此在显式调用\
  \ `start()` 之前，它不会开始轮询消息。如果你要添加监听器或进行任何类型的配置，应在调用 `start()` 之前完成。\n\n最后，让我们为前台子系统（例如\
  \ `FrontOfficeConfiguration`）和后台子系统（例如 `BackOfficeConfiguration`）各创建一个配置类。\n\n```\n\
  package com.apress.springrecipes.post.config;\nimport com.apress.springrecipes.post.FrontDeskImpl;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class FrontOfficeConfiguration {\n@Bean\npublic FrontDeskImpl\
  \ frontDesk() {\nreturn new FrontDeskImpl();\n}\n}\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.BackOfficeImpl;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration\npublic\
  \ class BackOfficeConfiguration {\n@Bean\npublic BackOfficeImpl backOffice() {\n\
  return new BackOfficeImpl();\n}\n}\n```\n\n现在，前台和后台子系统已基本准备好发送和接收 JMS 消息。但在进入最后一步之前，请启动\
  \ ActiveMQ 消息代理（如果尚未启动）。\n\n你可以轻松监控 ActiveMQ 消息代理的活动。在默认安装中，你可以打开 `http://localhost:8161/admin/queueGraph.jsp`\
  \ 查看 `mail.queue`（这些示例中使用的队列）的状态。或者，ActiveMQ 通过 JMX 暴露了非常有用的 Bean 和统计信息。只需运行 `jconsole`，然后在\
  \ MBeans 选项卡中深入查看 `org.apache.activemq` 即可。\n\n接下来，让我们创建几个主类来运行消息系统：一个用于前台子系统（`FrontDeskMain`\
  \ 类），另一个用于后台子系统（`BackOfficeMain` 类）。\n\n```\npackage com.apress.springrecipes.post;\n\
  import com.apress.springrecipes.post.config.FrontOfficeConfiguration;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class FrontDeskMain {\npublic static void main(String[] args) {\nApplicationContext\
  \ context = new AnnotationConfigApplicationContext(FrontOfficeConfiguration.class);\n\
  FrontDesk frontDesk = context.getBean(FrontDesk.class);\nfrontDesk.sendMail(new\
  \ Mail(\"1234\", \"US\", 1.5));\n}\n}\npackage com.apress.springrecipes.post;\n\
  import com.apress.springrecipes.post.config.BackOfficeConfiguration;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class BackOfficeMain {\npublic static void main(String[] args) {\nApplicationContext\
  \ context = new AnnotationConfigApplicationContext(BackOfficeConfiguration.class);\n\
  BackOffice backOffice = context.getBean(BackOffice.class);\nMail mail = backOffice.receiveMail();\n\
  System.out.println(\"Mail #\" + mail.getMailId() + \" received\");\n}\n}\n```\n\n\
  每次你使用前面的 `FrontDeskMain` 类运行前台应用程序时，都会向代理发送一条消息；每次你使用前面的 `BackOfficeMain` 类运行后台应用程序时，都会尝试从代理中获取一条消息。\n\
  \n使用 Spring 的 JMS 模板发送和接收消息\n\nSpring 提供了一个 JMS 模板，可以显著简化你的 JMS 代码。要使用此模板发送 JMS\
  \ 消息，你只需调用 `send()` 方法，并提供消息目的地以及一个 `MessageCreator` 对象，该对象用于创建你要发送的 JMS 消息。`MessageCreator`\
  \ 对象通常实现为匿名内部类。\n\n```\npackage com.apress.springrecipes.post;\nimport javax.jms.Destination;\n\
  import javax.jms.JMSException;\nimport javax.jms.MapMessage;\nimport javax.jms.Message;\n\
  import javax.jms.Session;\nimport org.springframework.jms.core.JmsTemplate;\nimport\
  \ org.springframework.jms.core.MessageCreator;\npublic class FrontDeskImpl implements\
  \ FrontDesk {\nprivate JmsTemplate jmsTemplate;\nprivate Destination destination;\n\
  public void setJmsTemplate(JmsTemplate jmsTemplate) {\nthis.jmsTemplate = jmsTemplate;\n\
  }\npublic void setDestination(Destination destination) {\nthis.destination = destination;\n\
  }\npublic void sendMail(final Mail mail) {\njmsTemplate.send(destination, new MessageCreator()\
  \ {\npublic Message createMessage(Session session) throws JMSException {\nMapMessage\
  \ message = session.createMapMessage();\nmessage.setString(\"mailId\", mail.getMailId());\n\
  message.setString(\"country\", mail.getCountry());\nmessage.setDouble(\"weight\"\
  , mail.getWeight());\nreturn message;\n}\n});\n}\n}\n```\n\n请注意，内部类只能访问声明为 `final`\
  \ 的外部方法参数或变量。`MessageCreator` 接口只声明了一个 `createMessage()` 方法供你实现。在此方法中，你使用提供的 JMS\
  \ 会话创建并返回你的 JMS 消息。\n\n\n\nJMS 模板可帮助您获取和释放 JMS 连接与会话，并发送由您的 `MessageCreator` 对象创建的\
  \ JMS 消息。此外，它还将 JMS API 的 `JMSException` 层次结构转换为 Spring 的 JMS 运行时异常层次结构，其基类为 `org.springframework.jms.JmsException`。您可以捕获从\
  \ `send` 及其变体方法抛出的 `JmsException`，并在 `catch` 块中根据需要采取相应措施。\n\n在前台子系统的 Bean 配置文件中，您声明了一个\
  \ JMS 模板，该模板引用了用于打开连接的 JMS 连接工厂。然后，您将此模板以及消息目的地注入到前台 Bean 中。\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.FrontDeskImpl;\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  import org.apache.activemq.command.ActiveMQQueue;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import javax.jms.ConnectionFactory;\nimport javax.jms.Queue;\n@Configuration\npublic\
  \ class FrontOfficeConfiguration {\n@Bean\npublic ConnectionFactory connectionFactory()\
  \ {\nreturn new ActiveMQConnectionFactory(\"tcp://localhost:61616\");\n}\n@Bean\n\
  public Queue destination() {\nreturn new ActiveMQQueue(\"mail.queue\");\n}\n@Bean\n\
  public JmsTemplate jmsTemplate() {\nJmsTemplate jmsTemplate = new JmsTemplate();\n\
  jmsTemplate.setConnectionFactory(connectionFactory());\nreturn jmsTemplate;\n}\n\
  @Bean\npublic FrontDeskImpl frontDesk() {\nFrontDeskImpl frontDesk = new FrontDeskImpl();\n\
  frontDesk.setJmsTemplate(jmsTemplate());\nfrontDesk.setDestination(destination());\n\
  return frontDesk;\n}\n}\n```\n\n要使用 JMS 模板接收 JMS 消息，您可以通过提供消息目的地来调用 `receive()`\
  \ 方法。此方法返回一个 JMS 消息 `javax.jms.Message`，其类型是基础的 JMS 消息类型（即一个接口），因此您必须将其转换为适当的类型才能进行后续处理。\n\
  \n```\npackage com.apress.springrecipes.post;\nimport javax.jms.Destination;\nimport\
  \ javax.jms.JMSException;\nimport javax.jms.MapMessage;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import org.springframework.jms.support.JmsUtils;\npublic class BackOfficeImpl implements\
  \ BackOffice {\nprivate JmsTemplate jmsTemplate;\nprivate Destination destination;\n\
  public void setJmsTemplate(JmsTemplate jmsTemplate) {\nthis.jmsTemplate = jmsTemplate;\n\
  }\npublic void setDestination(Destination destination) {\nthis.destination = destination;\n\
  }\npublic Mail receiveMail() {\nMapMessage message = (MapMessage) jmsTemplate.receive(destination);\n\
  try {\nif (message == null) {\nreturn null;\n}\nMail mail = new Mail();\nmail.setMailId(message.getString(\"\
  mailId\"));\nmail.setCountry(message.getString(\"country\"));\nmail.setWeight(message.getDouble(\"\
  weight\"));\nreturn mail;\n} catch (JMSException e) {\nthrow JmsUtils.convertJmsAccessException(e);\n\
  }\n}\n}\n```\n\n然而，在从接收到的 `MapMessage` 对象中提取信息时，您仍然需要处理 JMS API 的 `JMSException`。这与框架的默认行为形成了鲜明对比——在调用\
  \ `JmsTemplate` 上的方法时，框架会自动为您映射异常。为了使此方法抛出的异常类型保持一致，您必须调用 `JmsUtils.convertJmsAccessException()`\
  \ 将 JMS API 的 `JMSException` 转换为 Spring 的 `JmsException`。\n\n在后端子系统的 Bean 配置文件中，您声明了一个\
  \ JMS 模板，并将其与消息目的地一起注入到后台 Bean 中。\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.BackOfficeImpl;\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  import org.apache.activemq.command.ActiveMQQueue;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.core.JmsTemplate;\n\
  import javax.jms.ConnectionFactory;\nimport javax.jms.Queue;\n@Configuration\npublic\
  \ class BackOfficeConfiguration {\n@Bean\npublic ConnectionFactory connectionFactory()\
  \ {\nreturn new ActiveMQConnectionFactory(\"tcp://localhost:61616\");\n}\n@Bean\n\
  public Queue destination() {\nreturn new ActiveMQQueue(\"mail.queue\");\n}\n@Bean\n\
  public JmsTemplate jmsTemplate() {\nJmsTemplate jmsTemplate = new JmsTemplate();\n\
  jmsTemplate.setConnectionFactory(connectionFactory());\njmsTemplate.setReceiveTimeout(10000);\n\
  return jmsTemplate;\n}\n@Bean\npublic BackOfficeImpl backOffice() {\nBackOfficeImpl\
  \ backOffice = new BackOfficeImpl();\nbackOffice.setDestination(destination());\n\
  backOffice.setJmsTemplate(jmsTemplate());\nreturn backOffice;\n}\n}\n```\n\n请特别注意\
  \ JMS 模板的 `receiveTimeout` 属性，它指定了等待的毫秒数。默认情况下，此模板会在目的地无限期等待 JMS 消息，同时调用线程会被阻塞。为避免长时间等待消息，您应该为此模板指定一个接收超时时间。如果在指定时间内目的地没有可用消息，JMS\
  \ 模板的 `receive()` 方法将返回 `null` 消息。\n\n在您的应用程序中，接收消息的主要用途可能是期望对某件事的响应，或者希望按时间间隔检查消息、处理消息，然后暂停直到下一个时间间隔。如果您打算接收消息并作为服务进行响应，那么您很可能希望使用本章后面描述的消息驱动\
  \ POJO 功能。在那里，我们将讨论一种机制，该机制将持续等待消息，并在消息到达时通过回调您的应用程序来处理它们。\n\n向默认目的地发送消息和从默认目的地接收消息\n\
  \n您可以为 JMS 模板指定一个默认目的地，而不是为每个 JMS 模板的 `send()` 和 `receive()` 方法调用都指定消息目的地。这样，您就不再需要将其注入到消息发送者和接收者\
  \ Bean 中。\n\n```\n@Configuration\npublic class FrontOfficeConfiguration {\n...\n\
  @Bean\npublic JmsTemplate jmsTemplate() {\nJmsTemplate jmsTemplate = new JmsTemplate();\n\
  jmsTemplate.setConnectionFactory(connectionFactory());\njmsTemplate.setDefaultDestination(mailDestination());\n\
  return jmsTemplate;\n}\n@Bean\npublic FrontDeskImpl frontDesk() {\nFrontDeskImpl\
  \ frontDesk = new FrontDeskImpl();\nfrontDesk.setJmsTemplate(jmsTemplate());\nreturn\
  \ frontDesk;\n}\n}\n```\n\n对于后台，配置如下所示：\n\n```\n@Configuration\npublic class BackOfficeConfiguration\
  \ {\n...\n@Bean\npublic JmsTemplate jmsTemplate() {\nJmsTemplate jmsTemplate = new\
  \ JmsTemplate();\njmsTemplate.setConnectionFactory(connectionFactory());\njmsTemplate.setDefaultDestination(mailDestination());\n\
  jmsTemplate.setReceiveTimeout(10000);\nreturn jmsTemplate;\n}\n@Bean\npublic BackOfficeImpl\
  \ backOffice() {\nBackOfficeImpl backOffice = new BackOfficeImpl();\nbackOffice.setJmsTemplate(jmsTemplate());\n\
  return backOffice;\n}\n}\n```\n\n为 JMS 模板指定默认目的地后，您可以从消息发送者和接收者类中删除消息目的地的 setter\
  \ 方法。现在，当您调用 `send()` 和 `receive()` 方法时，不再需要指定消息目的地。\n\n\n\n```\npackage com.apress.springrecipes.post;\n\
  ...\nimport org.springframework.jms.core.MessageCreator;\npublic class FrontDeskImpl\
  \ implements FrontDesk {\n...\npublic void sendMail(final Mail mail) {\njmsTemplate.send(new\
  \ MessageCreator() {\n...\n});\n}\n}\npackage com.apress.springrecipes.post;\n...\n\
  import javax.jms.MapMessage;\n...\npublic class BackOfficeImpl implements BackOffice\
  \ {\n...\npublic Mail receiveMail() {\nMapMessage message = (MapMessage) jmsTemplate.receive();\n\
  ...\n}\n}\n```\n\n此外，除了为 JMS 模板指定 `Destination` 接口的实例外，你还可以指定目标名称，让 JMS 模板自行解析，这样你就可以从两个\
  \ Bean 配置类中删除目标属性声明。这可以通过添加 `defaultDestinationName` 属性来实现。\n\n```\n@Bean\npublic\
  \ JmsTemplate jmsTemplate() {\nJmsTemplate jmsTemplate = new JmsTemplate();\n...\n\
  jmsTemplate.setDefaultDestinationName(\"mail.queue\");\nreturn jmsTemplate;\n}\n\
  ```\n\n扩展 JmsGatewaySupport 类\n\nJMS 发送方和接收方类也可以扩展 `JmsGatewaySupport` 来获取 JMS 模板。对于扩展\
  \ `JmsGatewaySupport` 的类，你有以下两种选项来创建它们的 JMS 模板：\n\n*   为 `JmsGatewaySupport` 注入一个\
  \ JMS 连接工厂，让它自动创建一个 JMS 模板。但是，如果采用这种方式，你将无法配置 JMS 模板的详细信息。\n\n*   为 `JmsGatewaySupport`\
  \ 注入一个由你创建和配置的 JMS 模板。\n\n其中，如果你需要自行配置 JMS 模板，第二种方法更为合适。你可以从发送方和接收方类中删除私有字段 `jmsTemplate`\
  \ 及其 setter 方法。当你需要访问 JMS 模板时，只需调用 `getJmsTemplate()` 即可。\n\n```\npackage com.apress.springrecipes.post;\n\
  import org.springframework.jms.core.support.JmsGatewaySupport;\n...\npublic class\
  \ FrontDeskImpl extends JmsGatewaySupport implements FrontDesk {\n...\npublic void\
  \ sendMail(final Mail mail) {\ngetJmsTemplate().send(new MessageCreator() {\n...\n\
  });\n}\n}\npackage com.apress.springrecipes.post;\n...\nimport org.springframework.jms.core.support.JmsGatewaySupport;\n\
  public class BackOfficeImpl extends JmsGatewaySupport implements BackOffice {\n\
  public Mail receiveMail() {\nMapMessage message = (MapMessage) getJmsTemplate().receive();\n\
  ...\n}\n}\n```\n\n14-2. 转换 JMS 消息\n\n问题\n\n你的应用程序从消息队列接收消息，但需要将这些消息从 JMS 特定类型转换为业务特定的类。\n\
  \n解决方案\n\nSpring 提供了 `SimpleMessageConverter` 的实现，用于处理将接收到的 JMS 消息转换为业务对象，以及将业务对象转换为\
  \ JMS 消息。你可以利用默认实现，也可以提供自己的实现。\n\n工作原理\n\n之前的方案处理的是原始的 JMS 消息。Spring 的 JMS 模板可以帮助你使用消息转换器在\
  \ JMS 消息和 Java 对象之间进行转换。默认情况下，JMS 模板使用 `SimpleMessageConverter` 来转换 `TextMessage`\
  \ 与字符串、`BytesMessage` 与字节数组、`MapMessage` 与映射、以及 `ObjectMessage` 与可序列化对象。\n\n对于之前方案中的前台和后台类，你可以使用\
  \ `convertAndSend()` 和 `receiveAndConvert()` 方法来发送和接收映射，其中映射与 `MapMessage` 之间进行相互转换。\n\
  \n```\npackage com.apress.springrecipes.post;\n...\npublic class FrontDeskImpl extends\
  \ JmsGatewaySupport implements FrontDesk {\npublic void sendMail(Mail mail) {\n\
  Map map = new HashMap();\nmap.put(\"mailId\", mail.getMailId());\nmap.put(\"country\"\
  , mail.getCountry());\nmap.put(\"weight\", mail.getWeight());\ngetJmsTemplate().convertAndSend(map);\n\
  }\n}\npackage com.apress.springrecipes.post;\n...\npublic class BackOfficeImpl extends\
  \ JmsGatewaySupport implements BackOffice {\npublic Mail receiveMail() {\nMap map\
  \ = (Map) getJmsTemplate().receiveAndConvert();\nMail mail = new Mail();\nmail.setMailId((String)\
  \ map.get(\"mailId\"));\nmail.setCountry((String) map.get(\"country\"));\nmail.setWeight((Double)\
  \ map.get(\"weight\"));\nreturn mail;\n}\n}\n```\n\n你也可以通过实现 `MessageConverter`\
  \ 接口来创建自定义消息转换器，用于转换邮件对象。\n\n```\npackage com.apress.springrecipes.post;\nimport\
  \ javax.jms.JMSException;\nimport javax.jms.MapMessage;\nimport javax.jms.Message;\n\
  import javax.jms.Session;\nimport org.springframework.jms.support.converter.MessageConversionException;\n\
  import org.springframework.jms.support.converter.MessageConverter;\npublic class\
  \ MailMessageConverter implements MessageConverter {\npublic Object fromMessage(Message\
  \ message) throws JMSException,\nMessageConversionException {\nMapMessage mapMessage\
  \ = (MapMessage) message;\nMail mail = new Mail();\nmail.setMailId(mapMessage.getString(\"\
  mailId\"));\nmail.setCountry(mapMessage.getString(\"country\"));\nmail.setWeight(mapMessage.getDouble(\"\
  weight\"));\nreturn mail;\n}\npublic Message toMessage(Object object, Session session)\
  \ throws JMSException,\nMessageConversionException {\nMail mail = (Mail) object;\n\
  MapMessage message = session.createMapMessage();\nmessage.setString(\"mailId\",\
  \ mail.getMailId());\nmessage.setString(\"country\", mail.getCountry());\nmessage.setDouble(\"\
  weight\", mail.getWeight());\nreturn message;\n}\n}\n```\n\n要应用此消息转换器，你必须在两个 Bean\
  \ 配置类中声明它，并将其注入到 JMS 模板中。\n\n```\n@Configuration\npublic class BackOfficeConfiguration\
  \ {\n...\n@Bean\npublic JmsTemplate jmsTemplate() {\nJmsTemplate jmsTemplate = new\
  \ JmsTemplate();\njmsTemplate.setMessageConverter(mailMessageConverter());\n...\n\
  return jmsTemplate;\n}\n@Bean\npublic MailMessageConverter mailMessageConverter()\
  \ {\nreturn new MailMessageConverter();\n}\n}\n```\n\n当你为 JMS 模板显式设置消息转换器时，它将覆盖默认的\
  \ `SimpleMessageConverter`。现在，你可以调用 JMS 模板的 `convertAndSend()` 和 `receiveAndConvert()`\
  \ 方法来发送和接收邮件对象。\n\n```\npackage com.apress.springrecipes.post;\n...\npublic class\
  \ FrontDeskImpl extends JmsGatewaySupport implements FrontDesk {\npublic void sendMail(Mail\
  \ mail) {\ngetJmsTemplate().convertAndSend(mail);\n}\n}\npackage com.apress.springrecipes.post;\n\
  ...\npublic class BackOfficeImpl extends JmsGatewaySupport implements BackOffice\
  \ {\npublic Mail receiveMail() {\nreturn (Mail) getJmsTemplate().receiveAndConvert();\n\
  }\n}\n```\n\n14-3. 管理 JMS 事务\n\n问题\n\n你希望参与 JMS 事务，以便消息的接收和发送具有事务性。\n\n解决方案\n\n\
  你可以使用与任何 Spring 组件相同的事务策略。根据需要利用 Spring 的 `TransactionManager` 实现，并将行为注入到 Bean 中。\n\
  \n工作原理\n\n当在单个方法中生成或消费多个 JMS 消息时，如果中间发生错误，目标位置生成或消费的 JMS 消息可能会处于不一致状态。你必须用事务包围该方法以避免此问题。\n\
  \n在 Spring 中，JMS 事务管理与其他数据访问策略是一致的。例如，你可以使用 `@Transactional` 注解来标记需要事务管理的方法。\n\n\
  \n\n```\npackage com.apress.springrecipes.post;\nimport org.springframework.jms.core.support.JmsGatewaySupport;\n\
  import org.springframework.transaction.annotation.Transactional;\n...\npublic class\
  \ FrontDeskImpl extends JmsGatewaySupport implements FrontDesk {\n@Transactional\n\
  public void sendMail(Mail mail) {\n...\n}\n}\npackage com.apress.springrecipes.post;\n\
  import org.springframework.jms.core.support.JmsGatewaySupport;\nimport org.springframework.transaction.annotation.Transactional;\n\
  ...\npublic class BackOfficeImpl extends JmsGatewaySupport implements BackOffice\
  \ {\n@Transactional\npublic Mail receiveMail() {\n...\n}\n}\n```\n\n然后，在两个 Java\
  \ 配置类中，添加 `@EnableTransactionManagement` 注解并声明一个事务管理器。本地 JMS 事务对应的事务管理器是 `JmsTransactionManager`，它需要引用\
  \ JMS 连接工厂。\n\n```\npackage com.apress.springrecipes.post.config;\n...\nimport org.springframework.jms.connection.JmsTransactionManager;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  import javax.jms.ConnectionFactory;\n@Configuration\n@EnableTransactionManagement\n\
  public class BackOfficeConfiguration {\n@Bean\npublic ConnectionFactory connectionFactory()\
  \ { ... }\n@Bean\npublic PlatformTransactionManager transactionManager() {\nreturn\
  \ new JmsTransactionManager(connectionFactory());\n}\n}\n```\n\n如果你需要跨多个资源（例如数据源和\
  \ ORM 资源工厂）进行事务管理，或者需要分布式事务管理，则必须在应用服务器中配置 JTA 事务并使用 `JtaTransactionManager`。\n\
  请注意，对于多资源事务支持，JMS 连接工厂必须符合 XA 标准（即，它必须支持分布式事务）。\n\n14-4. 在 Spring 中创建消息驱动的 POJO\n\
  \n问题\n\n当你在 JMS 消息消费者上调用 `receive()` 方法来接收消息时，调用线程会被阻塞，直到有消息可用。该线程除了等待什么也做不了。这种消息接收方式称为同步接收，因为应用程序必须等待消息到达才能完成其工作。你可以创建一个消息驱动的\
  \ POJO (MDP) 来支持 JMS 消息的异步接收。MDP 使用 `@MessageDriven` 注解进行装饰。\n\n注意\n\n本食谱上下文中的消息驱动\
  \ POJO 或 MDP 指的是一个能够监听 JMS 消息且无需任何特定运行时要求的 POJO。它不指代需要 EJB 容器的、符合 EJB 规范的**消息驱动\
  \ Bean (MDB)**。\n\n解决方案\n\nSpring 允许在其 IoC 容器中声明的 Bean 以与基于 EJB 规范的 MDB 相同的方式监听\
  \ JMS 消息。由于 Spring 为 POJO 添加了消息监听能力，因此它们被称为**消息驱动的 POJO (MDP)**。\n\n工作原理\n\n假设你想在邮局的后台办公室添加一个电子公告板，以便在邮件从前台到达时实时显示邮件信息。当前台发送一条包含邮件信息的\
  \ JMS 消息时，后台子系统可以监听这些消息并将其显示在电子公告板上。为了获得更好的系统性能，你应该采用异步 JMS 接收方式，以避免阻塞接收这些 JMS 消息的线程。\n\
  \n使用消息监听器监听 JMS 消息\n\n首先，你创建一个消息监听器来监听 JMS 消息。该消息监听器提供了与之前食谱中 `BackOfficeImpl` 使用\
  \ `JmsTemplate` 的方法不同的另一种选择。监听器也可以从代理消费消息。例如，以下 `MailListener` 监听包含邮件信息的 JMS 消息：\n\
  \n```\npackage com.apress.springrecipes.post;\nimport javax.jms.JMSException;\n\
  import javax.jms.MapMessage;\nimport javax.jms.Message;\nimport javax.jms.MessageListener;\n\
  import org.springframework.jms.support.JmsUtils;\npublic class MailListener implements\
  \ MessageListener {\npublic void onMessage(Message message) {\nMapMessage mapMessage\
  \ = (MapMessage) message;\ntry {\nMail mail = new Mail();\nmail.setMailId(mapMessage.getString(\"\
  mailId\"));\nmail.setCountry(mapMessage.getString(\"country\"));\nmail.setWeight(mapMessage.getDouble(\"\
  weight\"));\ndisplayMail(mail);\n} catch (JMSException e) {\nthrow JmsUtils.convertJmsAccessException(e);\n\
  }\n}\nprivate void displayMail(Mail mail) {\nSystem.out.println(\"Mail #\" + mail.getMailId()\
  \ + \" received\");\n}\n}\n```\n\n消息监听器必须实现 `javax.jms.MessageListener` 接口。当 JMS\
  \ 消息到达时，`onMessage()` 方法将被调用，并将消息作为方法参数传入。在此示例中，你只需将邮件信息打印到控制台。请注意，从 `MapMessage`\
  \ 对象提取消息信息时，你需要处理 JMS API 的 `JMSException`。你可以调用 `JmsUtils.convertJmsAccessException()`\
  \ 将其转换为 Spring 的运行时异常 `JmsException`。\n\n接下来，你必须在后台办公室的配置中配置此监听器。仅声明此监听器不足以监听 JMS\
  \ 消息。你需要一个消息监听器容器来监控消息目标上的 JMS 消息，并在消息到达时触发你的消息监听器。\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.MailListener;\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.listener.SimpleMessageListenerContainer;\nimport\
  \ javax.jms.ConnectionFactory;\n@Configuration\npublic class BackOfficeConfiguration\
  \ {\n@Bean\npublic ConnectionFactory connectionFactory() { ... }\n@Bean\npublic\
  \ MailListener mailListener() {\nreturn new MailListener();\n}\n@Bean\npublic Object\
  \ container() {\nSimpleMessageListenerContainer smlc = new SimpleMessageListenerContainer();\n\
  smlc.setConnectionFactory(connectionFactory());\nsmlc.setDestinationName(\"mail.queue\"\
  );\nsmlc.setMessageListener(mailListener());\nreturn smlc;\n}\n}\n```\n\nSpring\
  \ 在 `org.springframework.jms.listener` 包中提供了几种类型的消息监听器容器供你选择，其中最常用的是 `SimpleMessageListenerContainer`\
  \ 和 `DefaultMessageListenerContainer`。`SimpleMessageListenerContainer` 是最简单的，不支持事务。如果你在接收消息时有事务需求，则必须使用\
  \ `DefaultMessageListenerContainer`。\n\n现在，你可以启动消息监听器了。由于你不需要调用 Bean 来触发消息消费——监听器会为你完成——因此以下仅启动\
  \ Spring IoC 容器的主类就足够了：\n\n```\npackage com.apress.springrecipes.post;\nimport org.springframework.context.support.GenericXmlApplicationContext;\n\
  public class BackOfficeMain {\npublic static void main(String[] args) {\nnew AnnotationConfigApplicationContext(BackOfficeConfiguration.class);\n\
  }\n}\n```\n\n当你启动此后台办公室应用程序时，它将监听消息代理（即 ActiveMQ）上的消息。一旦前台应用程序向代理发送消息，后台办公室应用程序就会做出反应并将消息显示到控制台。\n\
  \n使用 POJO 监听 JMS 消息\n\n实现 `MessageListener` 接口的监听器可以监听消息，在 Spring IoC 容器中声明的任意 Bean\
  \ 也可以。这样做意味着 Bean 既与 Spring 框架接口解耦，也与 JMS `MessageListener` 接口解耦。要使此 Bean 的方法在消息到达时被触发，该方法必须接受以下类型之一作为其唯一的方法参数：\n\
  \n\n\n*   原始 JMS 消息类型：适用于 `TextMessage`、`MapMessage`、`BytesMessage` 和\n    `ObjectMessage`\n\
  \n*   `String`：仅适用于\n    `TextMessage`\n\n*   `Map`：仅适用于 `MapMessage`\n\n*   `byte[]`：仅适用于\n\
  \    `BytesMessage`\n\n*   `Serializable`：\n    仅适用于 `ObjectMessage`\n\n例如，要监听 `MapMessage`，你可以\n\
  声明一个接受 `Map` 作为参数的方法\n并用 `@JmsListener` 注解它。这个\n类不再需要实现 `MessageListener`\n接口。\n\
  \n```\npackage com.apress.springrecipes.post;\nimport org.springframework.jms.annotation.JmsListener;\n\
  import java.util.Map;\npublic class MailListener {\n@JmsListener(destination = \"\
  mail.queue\")\npublic void displayMail(Map map) {\nMail mail = new Mail();\nmail.setMailId((String)\
  \ map.get(\"mailId\"));\nmail.setCountry((String) map.get(\"country\"));\nmail.setWeight((Double)\
  \ map.get(\"weight\"));\nSystem.out.println(\"Mail #\" + mail.getMailId() + \" received\"\
  );\n}\n}\n```\n\n要检测 `@JmsListener`\n注解，你需要在配置类上添加 `@EnableJms` 注解，\n并且需要注册一个 `JmsListenerContainerFactory`，\n\
  默认情况下，它会检测名为 `jmsListenerContainerFactory` 的工厂。\n\n一个 POJO 通过 `JmsListenerContainerFactory`\
  \ 注册到监听器容器。\n该工厂创建并配置一个 `MessageListenerContainer`，\n并将注解的方法作为消息监听器注册到其中。你可以\n实现自己的\
  \ `JmsListenerContainerFactory` 版本，\n但通常使用提供的类之一就足够了。`SimpleJmsListenerContainerFactory`\n\
  创建 `SimpleMessageListenerContainer` 的实例，\n而 `DefaultJmsListenerContainerFactory`\n\
  创建 `DefaultMessageListenerContainer`。\n\n现在你将使用 `SimpleJmsListenerContainerFactory`。\n\
  如果需要，你可以很容易地切换到 `DefaultMessageListenerContainer`，\n例如，当需要事务处理或使用 `TaskExecutor`\
  \ 进行异步处理时。\n\n```\npackage com.apress.springrecipes.post.config;\nimport com.apress.springrecipes.post.MailListener;\n\
  import org.apache.activemq.ActiveMQConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.jms.config.SimpleJmsListenerContainerFactory;\nimport\
  \ org.springframework.jms.listener.SimpleMessageListenerContainer;\nimport org.springframework.jms.listener.adapter.MessageListenerAdapter;\n\
  import javax.jms.ConnectionFactory;\n@Configuration\n@EnableJms\npublic class BackOfficeConfiguration\
  \ {\n@Bean\npublic ConnectionFactory connectionFactory() {\nreturn new ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\n}\n@Bean\npublic MailListener mailListener() {\nreturn\
  \ new MailListener();\n}\n@Bean\npublic SimpleJmsListenerContainerFactory jmsListenerContainerFactory()\
  \ {\nSimpleJmsListenerContainerFactory listenerContainerFactory = new SimpleJmsListenerContainerFactory();\n\
  listenerContainerFactory.setConnectionFactory(connectionFactory());\nreturn listenerContainerFactory;\n\
  }\n}\n```\n\n转换 JMS 消息\n\n你也可以创建一个消息转换器，用于\n从包含邮件信息的 JMS 消息中转换邮件对象。\n因为消息监听器只接收消息，所以\
  \ `toMessage()` 方法将不会\n被调用，因此你可以简单地为其返回 `null`。但是，\n如果你也使用此消息转换器发送消息，则必须\n实现此方法。以下示例重印了之前编写的\
  \ `MailMessageConvertor`\n类：\n\n```\npackage com.apress.springrecipes.post;\nimport\
  \ javax.jms.JMSException;\nimport javax.jms.MapMessage;\nimport javax.jms.Message;\n\
  import javax.jms.Session;\nimport org.springframework.jms.support.converter.MessageConversionException;\n\
  import org.springframework.jms.support.converter.MessageConverter;\npublic class\
  \ MailMessageConverter implements MessageConverter {\npublic Object fromMessage(Message\
  \ message) throws JMSException,\nMessageConversionException {\nMapMessage mapMessage\
  \ = (MapMessage) message;\nMail mail = new Mail();\nmail.setMailId(mapMessage.getString(\"\
  mailId\"));\nmail.setCountry(mapMessage.getString(\"country\"));\nmail.setWeight(mapMessage.getDouble(\"\
  weight\"));\nreturn mail;\n}\npublic Message toMessage(Object object, Session session)\
  \ throws JMSException,\nMessageConversionException {\n...\n}\n}\n```\n\n消息转换器应应用于监听器容器工厂，\n\
  以便在调用你的 POJO 方法之前将消息转换为对象。\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.MailListener;\nimport com.apress.springrecipes.post.MailMessageConverter;\n\
  import org.apache.activemq.ActiveMQConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.annotation.EnableJms;\n\
  import org.springframework.jms.config.SimpleJmsListenerContainerFactory;\nimport\
  \ javax.jms.ConnectionFactory;\n@Configuration\n@EnableJms\npublic class BackOfficeConfiguration\
  \ {\n@Bean\npublic ConnectionFactory connectionFactory() {\nreturn new ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\n}\n@Bean\npublic MailListener mailListener() {\nreturn\
  \ new MailListener();\n}\n@Bean\npublic MailMessageConverter mailMessageConverter()\
  \ {\nreturn new MailMessageConverter();\n}\n@Bean\npublic SimpleJmsListenerContainerFactory\
  \ jmsListenerContainerFactory() {\nSimpleJmsListenerContainerFactory listenerContainerFactory\
  \ = new SimpleJmsListenerContainerFactory();\nlistenerContainerFactory.setConnectionFactory(connectionFactory());\n\
  listenerContainerFactory.setMessageConverter(mailMessageConverter());\nreturn listenerContainerFactory;\n\
  }\n}\n```\n\n使用此消息转换器，你的 POJO 的监听器方法可以接受\n一个邮件对象作为方法参数。\n\n```\npackage com.apress.springrecipes.post;\n\
  import org.springframework.jms.annotation.JmsListener;\npublic class MailListener\
  \ {\n@JmsListener(destination = \"mail.queue\")\npublic void displayMail(Mail mail)\
  \ {\nSystem.out.println(\"Mail #\" + mail.getMailId() + \" received\");\n}\n}\n\
  ```\n\n管理 JMS 事务\n\n如前所述，`SimpleMessageListenerContainer`\n不支持事务。因此，如果你需要对消息\n监听器方法进行事务管理，则必须使用\
  \ `DefaultMessageListenerContainer`\n。对于本地 JMS 事务，你可以简单地启用其 `sessionTransacted`\n\
  属性，你的监听器方法将在本地 JMS\n事务（相对于 XA 事务）中运行。要使用 `DefaultMessageListenerContainer`，\n请将\
  \ `SimpleJmsListenerContainerFactory`\n更改为 `DefaultJmsListenerContainerFactory`\n\
  并配置所述 `sessionTransacted`\n属性。\n\n```\n@Bean\npublic DefaultJmsListenerContainerFactory\
  \ jmsListenerContainerFactory() {\nDefaultJmsListenerContainerFactory listenerContainerFactory\
  \ = new DefaultJmsListenerContainerFactory();\nlistenerContainerFactory.setConnectionFactory(cachingConnectionFactory());\n\
  listenerContainerFactory.setMessageConverter(mailMessageConverter());\nlistenerContainerFactory.setSessionTransacted(true);\n\
  return listenerContainerFactory;\n}\n```\n\n但是，如果你希望你的监听器参与 JTA 事务，\n你需要声明一个 `JtaTransactionManager`\n\
  实例并将其注入到你的监听器容器工厂中。\n\n14-5\\. 缓存和池化 JMS 连接\n\n问题\n\n\n\n为简单起见，本章通篇使用 `org.apache.activemq.ActiveMQConnectionFactory`\
  \ 的一个简单实例作为连接工厂来探索 Spring 对 JMS 的支持。但这在实践中并非最佳选择。与所有事物一样，这里也存在性能方面的考量。\n\n问题的关键在于\
  \ `JmsTemplate` 在每次调用时都会关闭会话和消费者。这意味着它会销毁所有这些对象并释放内存。这种做法虽然“安全”，但性能不佳，因为某些创建的对象（如消费者）本应是长期存在的。这种行为源于在应用服务器环境中使用\
  \ `JmsTemplate`，在这种环境中，通常使用应用服务器的连接工厂，而该工厂内部提供了连接池。在这种环境下，恢复所有对象只是将其归还给池，这才是理想的行为。\n\
  \n解决方案\n\n对此没有“一刀切”的解决方案。你需要权衡你所追求的特性，并做出相应的反应。\n\n工作原理\n\n通常，在使用 `JmsTemplate`\
  \ 发布消息时，你需要一个提供某种池化和缓存功能的连接工厂。寻找池化连接工厂的首选位置可能是你的应用服务器。它很可能默认就提供了一个。\n\n在本章的示例中，你在独立配置中使用\
  \ ActiveMQ。与许多供应商一样，ActiveMQ 提供了一个池化连接工厂类作为替代方案。实际上，ActiveMQ 提供了两种：一种用于通过 JCA 连接器消费消息，另一种用于在\
  \ JCA 容器之外使用。在发送消息时，你可以使用它们来处理生产者和会话的缓存。以下配置在独立配置中池化了一个连接工厂。对于发布消息的先前示例，它是一个可直接替换的组件。\n\
  \n```\n@Bean(destroyMethod = \"stop\")\npublic ConnectionFactory connectionFactory()\
  \ {\nActiveMQConnectionFactory connectionFactoryToUse =\nnew ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\nPooledConnectionFactory connectionFactory = new PooledConnectionFactory();\n\
  connectionFactory.setConnectionFactory(connectionFactoryToUse);\nreturn connectionFactory;\n\
  }\n```\n\n如果你正在接收消息，你仍然可以进一步提高效率，因为 `JmsTemplate` 每次也会构造一个新的 `MessageConsumer`。在这种情况下，你有几种替代方案：使用\
  \ Spring 的各种 `*MessageListenerContainer` 实现（MDP），因为它能正确地缓存消费者；或者使用 Spring 的 `ConnectionFactory`\
  \ 实现。第一个实现 `org.springframework.jms.connection.SingleConnectionFactory` 每次返回相同的底层\
  \ JMS 连接（根据 JMS API，这是线程安全的），并忽略对 `close()` 方法的调用。\n\n通常，此实现与 JMS API 配合良好。一个较新的替代方案是\
  \ `org.springframework.jms.connection.CachingConnectionFactory`。首先，其明显优势在于能够缓存多个实例。其次，它缓存会话、消息生产者和消息消费者。最后，无论你的\
  \ JMS 连接工厂实现如何，它都能正常工作。\n\n```\n@Bean\npublic ConnectionFactory cachingConnectionFactory()\
  \ {\nreturn new CachingConnectionFactory(connectionFactory());\n}\n```\n\n14-6.\
  \ 使用 Spring 发送和接收 AMQP 消息\n\n问题\n\n你想使用 RabbitMQ 发送和接收消息。\n\n解决方案\n\nSpring AMQP\
  \ 项目提供了对 AMQP 协议的便捷访问。它拥有类似于 Spring JMS 的支持。它附带了一个 `RabbitTemplate`，提供了基本的发送和接收选项；它还附带了一个\
  \ `MessageListenerContainer` 选项，模仿了 Spring JMS。\n\n工作原理\n\n让我们看看如何使用 `RabbitTemplate`\
  \ 发送消息。要访问 `RabbitTemplate`，最简单的方法是扩展 `RabbitGatewaySupport`。你将使用 `FrontDeskImpl`，它使用了\
  \ `RabbitTemplate`。\n\n不使用 Spring 模板支持发送和接收消息\n\n让我们看看如何在不使用 Spring 模板支持的情况下发送和接收消息。下面的\
  \ `FrontDeskImpl` 类使用纯 API 向 RabbitMQ 发送消息：\n\n```\npackage com.apress.springrecipes.post;\n\
  import com.fasterxml.jackson.databind.ObjectMapper;\nimport com.rabbitmq.client.Channel;\n\
  import com.rabbitmq.client.Connection;\nimport com.rabbitmq.client.ConnectionFactory;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport java.io.IOException;\n\
  import java.util.Locale;\nimport java.util.Random;\nimport java.util.concurrent.TimeoutException;\n\
  public class FrontDeskImpl implements FrontDesk {\nprivate static final String QUEUE_NAME\
  \ = \"mail.queue\";\npublic void sendMail(final Mail mail) {\nConnectionFactory\
  \ connectionFactory = new ConnectionFactory();\nconnectionFactory.setHost(\"localhost\"\
  );\nconnectionFactory.setUsername(\"guest\");\nconnectionFactory.setPassword(\"\
  guest\");\nconnectionFactory.setPort(5672);\nConnection connection = null;\nChannel\
  \ channel = null;\ntry {\nconnection = connectionFactory.newConnection();\nchannel\
  \ = connection.createChannel();\nchannel.queueDeclare(QUEUE_NAME, true, false, false,\
  \ null);\nString message = new ObjectMapper().writeValueAsString(mail);\nchannel.basicPublish(\"\
  \", QUEUE_NAME, null, message.getBytes(\"UTF-8\"));\n} catch (IOException | TimeoutException\
  \ e) {\nthrow new RuntimeException(e);\n} finally {\nif (channel != null) {\ntry\
  \ {\nchannel.close();\n} catch (IOException | TimeoutException e) {\n}\n}\nif (connection\
  \ != null) {\ntry {\nconnection.close();\n} catch (IOException e) {\n}\n}\n}\n}\n\
  }\n```\n\n首先，你创建一个 `ConnectionFactory` 来获取与 RabbitMQ 的连接；这里我们将其配置为 localhost，并提供了用户名/密码组合。接下来，你需要获取一个\
  \ `Channel` 来最终创建一个队列。然后，传入的 `Mail` 消息使用 Jackson 的 `ObjectMapper` 转换为 JSON，并最终发送到队列。在创建连接和发送消息时，你需要处理可能发生的各种异常，并且在发送后，你需要正确地关闭并再次释放\
  \ `Connection`，这也可能抛出异常。\n\n在发送和接收 AMQP 消息之前，你需要安装一个 AMQP 消息代理。\n\n注意\n\n在 `bin`\
  \ 目录中有一个 `rabbitmq.sh` 文件，它会下载并在 Docker 容器中启动一个 RabbitMQ 代理。\n\n下面的 `BackOfficeImpl`\
  \ 类使用纯 RabbitMQ API 接收消息：\n\n```\npackage com.apress.springrecipes.post;\nimport\
  \ com.fasterxml.jackson.databind.ObjectMapper;\nimport com.rabbitmq.client.*;\n\
  import org.springframework.stereotype.Service;\nimport javax.annotation.PreDestroy;\n\
  import java.io.IOException;\nimport java.util.concurrent.TimeoutException;\n@Service\n\
  public class BackOfficeImpl implements BackOffice {\nprivate static final String\
  \ QUEUE_NAME = \"mail.queue\";\nprivate MailListener mailListener = new MailListener();\n\
  private Connection connection;\n@Override\npublic Mail receiveMail() {\nConnectionFactory\
  \ connectionFactory = new ConnectionFactory();\nconnectionFactory.setHost(\"localhost\"\
  );\nconnectionFactory.setUsername(\"guest\");\nconnectionFactory.setPassword(\"\
  guest\");\nconnectionFactory.setPort(5672);\nChannel channel = null;\ntry {\nconnection\
  \ = connectionFactory.newConnection();\nchannel = connection.createChannel();\n\
  channel.queueDeclare(QUEUE_NAME, true, false, false, null);\nConsumer consumer =\
  \ new DefaultConsumer(channel) {\n@Override\npublic void handleDelivery(String consumerTag,\
  \ Envelope envelope, AMQP.BasicProperties properties, byte[] body)\nthrows IOException\
  \ {\nMail mail = new ObjectMapper().readValue(body, Mail.class);\nmailListener.displayMail(mail);\n\
  }\n};\nchannel.basicConsume(QUEUE_NAME, true, consumer);\n} catch (IOException |\
  \ TimeoutException e) {\nthrow new RuntimeException(e);\n}\nreturn null;\n}\n@PreDestroy\n\
  public void destroy() {\nif (this.connection != null) {\ntry {\nthis.connection.close();\n\
  } catch (IOException e) {\n}\n}\n}\n}\n```\n\n\n\n这段代码与 `FrontDeskImpl` 基本相同，区别在于你现在注册了一个\
  \ `Consumer` 对象来检索消息。在这个消费者中，你再次使用 Jackson 将消息映射到 `Mail` 对象，并将其传递给 `MailListener`，后者再将转换后的消息打印到控制台。使用通道时，你可以添加一个消费者，该消费者将在收到消息时被调用。一旦通过\
  \ `basicConsume` 方法向通道注册，该消费者就会准备就绪。\n\n如果你已经运行了 `FrontDeskImpl`，你会看到消息很快地传入。\n\n\
  使用 Spring 的模板支持发送消息\n\n`FrontDeskImpl` 类继承了 `RabbitGatewaySupport`，后者会根据你传入的配置来配置一个\
  \ `RabbitTemplate`。要发送消息，你需要使用 `getRabbitOperations` 方法获取模板，然后进行转换并发送消息。为此，你需要使用\
  \ `convertAndSend` 方法。该方法会先使用 `MessageConverter` 将消息转换为 JSON，然后将其发送到你已配置的队列中。\n\n\
  ```\npackage com.apress.springrecipes.post;\nimport org.springframework.amqp.rabbit.core.RabbitGatewaySupport;\n\
  public class FrontDeskImpl extends RabbitGatewaySupport implements FrontDesk {\n\
  public void sendMail(final Mail mail) {\ngetRabbitOperations().convertAndSend(mail);\n\
  }\n}\n```\n\n让我们来看一下配置：\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.FrontDeskImpl;\nimport org.springframework.amqp.rabbit.connection.CachingConnectionFactory;\n\
  import org.springframework.amqp.rabbit.connection.ConnectionFactory;\nimport org.springframework.amqp.rabbit.core.RabbitTemplate;\n\
  import org.springframework.amqp.support.converter.Jackson2JsonMessageConverter;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class FrontOfficeConfiguration {\n@Bean\npublic ConnectionFactory\
  \ connectionFactory() {\nCachingConnectionFactory connectionFactory = new CachingConnectionFactory(\"\
  127.0.0.1\");\nconnectionFactory.setUsername(\"guest\");\nconnectionFactory.setPassword(\"\
  guest\");\nconnectionFactory.setPort(5672);\nreturn connectionFactory;\n}\n@Bean\n\
  public RabbitTemplate rabbitTemplate() {\nRabbitTemplate rabbitTemplate = new RabbitTemplate();\n\
  rabbitTemplate.setConnectionFactory(connectionFactory());\nrabbitTemplate.setMessageConverter(new\
  \ Jackson2JsonMessageConverter());\nrabbitTemplate.setRoutingKey(\"mail.queue\"\
  );\nreturn rabbitTemplate;\n}\n@Bean\npublic FrontDeskImpl frontDesk() {\nFrontDeskImpl\
  \ frontDesk = new FrontDeskImpl();\nfrontDesk.setRabbitOperations(rabbitTemplate());\n\
  return frontDesk;\n}\n}\n```\n\n该配置与 JMS 配置非常相似。你需要一个 `ConnectionFactory` 来连接到你的\
  \ RabbitMQ 代理。你使用 `CachingConnectionFactory` 以便可以重用连接。接下来是 `RabbitTemplate`，它使用该连接并拥有一个\
  \ `MessageConverter` 来转换消息。消息使用 Jackson2 库转换为 JSON，这就是配置 `Jackson2JsonMessageConverter`\
  \ 的原因。最后，`RabbitTemplate` 被传入 `FrontDeskImpl` 类，以便其可供使用。\n\n```\npackage com.apress.springrecipes.post;\n\
  import com.apress.springrecipes.post.config.FrontOfficeConfiguration;\nimport org.springframework.context.ConfigurableApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class FrontDeskMain {\npublic static void main(String[] args) throws Exception\
  \ {\nConfigurableApplicationContext context =\nnew AnnotationConfigApplicationContext(FrontOfficeConfiguration.class);\n\
  FrontDesk frontDesk = context.getBean(FrontDesk.class);\nfrontDesk.sendMail(new\
  \ Mail(\"1234\", \"US\", 1.5));\nSystem.in.read();\ncontext.close();\n}\n}\n```\n\
  \n使用消息监听器监听 AMQP 消息\n\nSpring AMQP 支持 `MessageListenerContainer` 来检索消息，其方式与 Spring\
  \ JMS 对 JMS 的支持相同。Spring AMQP 拥有 `@RabbitListener` 注解来指示基于 AMQP 的消息监听器。让我们看一下所使用的\
  \ `MessageListener`。\n\n```\npackage com.apress.springrecipes.post;\nimport org.springframework.amqp.rabbit.annotation.RabbitListener;\n\
  public class MailListener {\n@RabbitListener(queues = \"mail.queue\")\npublic void\
  \ displayMail(Mail mail) {\nSystem.out.println(\"Received: \" + mail);\n}\n}\n```\n\
  \n`MailListener` 与配方 14-4 中为接收 JMS 消息而创建的监听器完全相同。区别在于配置。\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.MailListener;\nimport org.springframework.amqp.rabbit.annotation.EnableRabbit;\n\
  import org.springframework.amqp.rabbit.config.SimpleRabbitListenerContainerFactory;\n\
  import org.springframework.amqp.rabbit.connection.CachingConnectionFactory;\nimport\
  \ org.springframework.amqp.rabbit.connection.ConnectionFactory;\nimport org.springframework.amqp.rabbit.listener.RabbitListenerContainerFactory;\n\
  import org.springframework.amqp.support.converter.Jackson2JsonMessageConverter;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\n@EnableRabbit\npublic class BackOfficeConfiguration {\n@Bean\npublic\
  \ RabbitListenerContainerFactory rabbitListenerContainerFactory() {\nSimpleRabbitListenerContainerFactory\
  \ containerFactory = new SimpleRabbitListenerContainerFactory();\ncontainerFactory.setConnectionFactory(connectionFactory());\n\
  containerFactory.setMessageConverter(new Jackson2JsonMessageConverter());\nreturn\
  \ containerFactory;\n}\n@Bean\npublic ConnectionFactory connectionFactory() {\n\
  CachingConnectionFactory connectionFactory = new CachingConnectionFactory(\"127.0.0.1\"\
  );\nconnectionFactory.setUsername(\"guest\");\nconnectionFactory.setPassword(\"\
  guest\");\nconnectionFactory.setPort(5672);\nreturn connectionFactory;\n}\n@Bean\n\
  public MailListener mailListener() {\nreturn new MailListener();\n}\n}\n```\n\n\
  要启用基于 AMQP 注解的监听器，你需要在配置类上添加 `@EnableRabbit` 注解。由于每个监听器都需要一个 `MessageListenerContainer`，你需要配置一个\
  \ `RabbitListenerContainerFactory`，它负责创建这些容器。默认情况下，`@EnableRabbit` 逻辑会查找名为 `rabbitListenerContainerFactory`\
  \ 的 bean。\n\n`RabbitListenerContainerFactory` 需要一个 `ConnectionFactory`。为此，你使用了 `CachingConnectionFactory`。在\
  \ `MessageListenerContainer` 调用 `MailListener.displayMail` 方法之前，它需要使用 `Jackson2JsonMessageConverter`\
  \ 将 JSON 格式的消息负载转换为 `Mail` 对象。\n\n要监听消息，请创建一个包含 main 方法的类，该方法只需构建应用程序上下文即可。\n\n\
  ```\npackage com.apress.springrecipes.post;\nimport com.apress.springrecipes.post.config.BackOfficeConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class BackOfficeMain {\npublic static void main(String[] args) {\nnew AnnotationConfigApplicationContext(BackOfficeConfiguration.class);\n\
  }\n}\n```\n\n14-7. 使用 Spring Kafka 发送和接收消息\n\n问题\n\n你想要使用 Apache Kafka 发送和接收消息。\n\
  \n解决方案\n\nSpring Kafka 项目提供了对 Apache Kafka 的便捷访问。它使用 Spring Messaging 抽象提供了类似于 Spring\
  \ JMS 的支持。它附带 `KafkaTemplate`，提供了基本的发送选项；它还附带了一个 `MessageListenerContainer` 选项，该选项模仿了\
  \ Spring JMS，并可以通过 `@EnableKafka` 启用。\n\n工作原理\n\n首先，你将看到如何设置 `KafkaTemplate` 来发送消息，以及如何使用\
  \ `KafkaListener` 监听消息。最后，你将了解如何使用 `MessageConverters` 将对象转换为消息负载。\n\n使用 Spring\
  \ 的模板支持发送消息\n\n\n\n让我们首先重写 `FrontOfficeImpl` 类，使其使用 `KafkaTemplate` 发送消息。为此，你实际上需要一个实现了\
  \ `KafkaOperations` 接口的对象，而 `KafkaTemplate` 正是该接口的实现。\n\n```\npackage com.apress.springrecipes.post;\n\
  import com.fasterxml.jackson.core.JsonProcessingException;\nimport com.fasterxml.jackson.databind.ObjectMapper;\n\
  import org.springframework.kafka.core.KafkaOperations;\nimport org.springframework.kafka.support.SendResult;\n\
  import org.springframework.util.concurrent.ListenableFuture;\nimport org.springframework.util.concurrent.ListenableFutureCallback;\n\
  public class FrontDeskImpl implements FrontDesk {\nprivate final KafkaOperations\
  \ kafkaOperations;\npublic FrontDeskImpl(KafkaOperations kafkaOperations) {\nthis.kafkaOperations\
  \ = kafkaOperations;\n}\npublic void sendMail(final Mail mail) {\nListenableFuture>\
  \ future =     kafkaOperations.send(\"mails\", convertToJson(mail));\nfuture.addCallback(new\
  \ ListenableFutureCallback>() {\n@Override\npublic void onFailure(Throwable ex)\
  \ {\nex.printStackTrace();\n}\n@Override\npublic void onSuccess(SendResult result)\
  \ {\nSystem.out.println(\"Result (success): \" + result.getRecordMetadata());\n\
  }\n});\n}\nprivate String convertToJson(Mail mail) {\ntry {\nreturn new ObjectMapper().writeValueAsString(mail);\n\
  } catch (JsonProcessingException e) {\nthrow new IllegalArgumentException(e);\n\
  }\n}\n}\n```\n\n请注意 `kafkaOperations` 字段，其类型为 `KafkaOperations<Integer, String>`。这意味着你发送的消息使用\
  \ `Integer` 类型作为键（在发送消息时生成），并且你将发送 `String` 类型的消息。这要求你将传入的 `Mail` 实例转换为 `String`。这个转换工作由\
  \ `convertToJson` 方法使用 Jackson2 的 `ObjectMapper` 完成。消息将被发送到 `mails` 主题，该主题是 `send`\
  \ 方法的第一个参数；第二个参数是要发送的有效载荷（即转换后的 `Mail` 消息）。\n\n使用 Kafka 发送消息通常是一个异步操作，`KafkaOperations.send`\
  \ 方法通过返回一个 `ListenableFuture` 来体现这一点。它是一个标准的 `Future`，因此你可以调用 `get()` 方法使其变为阻塞操作，或者注册\
  \ `ListenableFutureCallback` 来接收操作成功或失败的通知。\n\n接下来，你需要创建一个配置类，用于配置 `FrontDeskImpl`\
  \ 中使用的 `KafkaTemplate`。\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.FrontDeskImpl;\nimport org.apache.kafka.clients.producer.ProducerConfig;\n\
  import org.apache.kafka.common.serialization.IntegerSerializer;\nimport org.apache.kafka.common.serialization.StringSerializer;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.kafka.core.DefaultKafkaProducerFactory;\nimport org.springframework.kafka.core.KafkaTemplate;\n\
  import org.springframework.kafka.core.ProducerFactory;\nimport java.util.HashMap;\n\
  import java.util.Map;\n@Configuration\npublic class FrontOfficeConfiguration {\n\
  @Bean\npublic KafkaTemplate kafkaTemplate() {\nKafkaTemplate kafkaTemplate = new\
  \ KafkaTemplate(producerFactory());\nreturn kafkaTemplate;\n}\n@Bean\npublic ProducerFactory\
  \ producerFactory() {\nDefaultKafkaProducerFactory producerFactory = new DefaultKafkaProducerFactory(producerFactoryProperties());\n\
  return producerFactory;\n}\n@Bean\npublic Map producerFactoryProperties() {\nMap\
  \ properties = new HashMap();\nproperties.put(ProducerConfig.BOOTSTRAP_SERVERS_CONFIG,\
  \ \"localhost:9092\");\nproperties.put(ProducerConfig.KEY_SERIALIZER_CLASS_CONFIG,\
  \ IntegerSerializer.class);\nproperties.put(ProducerConfig.VALUE_SERIALIZER_CLASS_CONFIG,\
  \ StringSerializer.class);\nreturn properties;\n}\n@Bean\npublic FrontDeskImpl frontDesk()\
  \ {\nreturn new FrontDeskImpl(kafkaTemplate());\n}\n}\n```\n\n上述配置创建了一个最小化配置的 `KafkaTemplate`。你需要配置\
  \ `KafkaTemplate` 所使用的 `ProducerFactory`；它至少需要指定要连接的 URL，并且需要告知它你希望将消息序列化为哪种键和值类型。URL\
  \ 通过 `ProducerConfig.BOOTSTRAP_SERVERS_CONFIG` 指定，它可以接受一个或多个要连接的服务器地址。`ProducerConfig.KEY_SERIALIZER_CLASS_CONFIG`\
  \ 和 `ProducerConfig.VALUE_SERIALIZER_CLASS_CONFIG` 分别配置了所使用的键序列化器和值序列化器。由于你希望使用\
  \ `Integer` 作为键、`String` 作为值，因此分别配置了 `IntegerSerializer` 和 `StringSerializer`。\n\
  \n最后，构建好的 `KafkaTemplate` 被传递给 `FrontDeskImpl`。要运行前台应用程序，只需要以下 `Main` 类：\n\n```\n\
  package com.apress.springrecipes.post;\nimport org.springframework.context.ConfigurableApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import com.apress.springrecipes.post.config.FrontOfficeConfiguration;\npublic class\
  \ FrontDeskMain {\npublic static void main(String[] args) throws Exception {\nConfigurableApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(FrontOfficeConfiguration.class);\n\
  context.registerShutdownHook();\nFrontDesk frontDesk = context.getBean(FrontDesk.class);\n\
  frontDesk.sendMail(new Mail(\"1234\", \"US\", 1.5));\nSystem.in.read();\n}\n}\n\
  ```\n\n这将启动前台应用程序并通过 Kafka 发送一条消息。\n\n使用 Spring Kafka 监听消息\n\nSpring Kafka 也提供了消息监听器容器，用于监听主题上的消息，这与\
  \ Spring JMS 和 Spring AMQP 类似。要启用这些容器的使用，你需要在配置类上添加 `@EnableKafka` 注解，并使用 `@KafkaListener`\
  \ 创建和配置你的 Kafka 消费者。\n\n首先，让我们创建监听器，这只需在一个带单个参数的方法上标注 `@KafkaListener` 注解即可。\n\n\
  ```\npackage com.apress.springrecipes.post;\nimport org.springframework.kafka.annotation.KafkaListener;\n\
  public class MailListener {\n@KafkaListener(topics = \"mails\")\npublic void displayMail(String\
  \ mail) {\nSystem.out.println(\" Received: \" + mail);\n}\n}\n```\n\n目前，我们关注的是原始的基于\
  \ `String` 的有效载荷，因为发送的正是这种类型。\n\n接下来，你需要配置监听器容器。\n\n\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import com.apress.springrecipes.post.MailListener;\nimport org.apache.kafka.clients.consumer.ConsumerConfig;\n\
  import org.apache.kafka.common.serialization.IntegerDeserializer;\nimport org.apache.kafka.common.serialization.StringDeserializer;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.kafka.annotation.EnableKafka;\nimport org.springframework.kafka.config.ConcurrentKafkaListenerContainerFactory;\n\
  import org.springframework.kafka.config.KafkaListenerContainerFactory;\nimport org.springframework.kafka.core.ConsumerFactory;\n\
  import org.springframework.kafka.core.DefaultKafkaConsumerFactory;\nimport org.springframework.kafka.listener.ConcurrentMessageListenerContainer;\n\
  import java.util.HashMap;\nimport java.util.Map;\n@Configuration\n@EnableKafka\n\
  public class BackOfficeConfiguration {\n@Bean\nKafkaListenerContainerFactory> kafkaListenerContainerFactory()\
  \ {\nConcurrentKafkaListenerContainerFactory factory =     new ConcurrentKafkaListenerContainerFactory();\n\
  factory.setConsumerFactory(consumerFactory());\nreturn factory;\n}\n@Bean\npublic\
  \ ConsumerFactory consumerFactory() {\nreturn new DefaultKafkaConsumerFactory(consumerConfiguration());\n\
  }\n@Bean\npublic Map consumerConfiguration() {\nMap properties = new HashMap();\n\
  properties.put(ConsumerConfig.BOOTSTRAP_SERVERS_CONFIG, \"localhost:9092\");\nproperties.put(ConsumerConfig.KEY_DESERIALIZER_CLASS_CONFIG,\
  \ IntegerDeserializer.class);\nproperties.put(ConsumerConfig.VALUE_DESERIALIZER_CLASS_CONFIG,\
  \ StringDeserializer.class);\nproperties.put(ConsumerConfig.GROUP_ID_CONFIG, \"\
  group1\");\nreturn properties;\n}\n@Bean\npublic MailListener mailListener() {\n\
  return new MailListener();\n}\n}\n```\n\n该配置与客户端类似；你需要传递用于连接 Apache Kafka 的 URL（或\n\
  多个 URL），并且由于需要反序列化消息，你必须指定键和值的\n反序列化器。最后，你需要添加一个组 ID，否则将无法\n连接到 Kafka。URL 通过 `ConsumerConfig.BOOTSTRAP_SERVERS_CONFIG`\
  \ 传递；\n所使用的键和值反序列化器分别是：键使用 `IntegerDeserializer`\n（因为键是整数）；由于有效载荷是 `String`，你需要\n\
  使用 `StringDeserializer`。\n最后，设置组属性。\n\n有了这些属性，你就可以配置 `KafkaListenerContainerFactory`，\n\
  这是一个用于创建基于 Kafka 的 `MessageListenerContainer` 的工厂。\n该容器由添加 `@EnableKafka` 注解所启用的功能在内部使用。\n\
  对于每个使用 `@KafkaListener` 注解的方法，都会创建一个\n`MessageListenerContainer`。\n\n要运行后台办公应用程序，你需要加载此\n\
  配置并让其开始监听：\n\n```\npackage com.apress.springrecipes.post;\nimport com.apress.springrecipes.post.config.BackOfficeConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class BackOfficeMain {\npublic static void main(String[] args) {\nnew AnnotationConfigApplicationContext(BackOfficeConfiguration.class);\n\
  }\n}\n```\n\n现在，当前台办公应用程序启动时，`Mail` 消息将被\n转换为 `String` 并通过 Kafka 发送到后台，产生如下输出：\n\
  \n```\nReceived: {\"mailId\":\"1234\",\"country\":\"US\",\"weight\":1.5}\n```\n\n\
  使用 MessageConverter 将有效载荷转换为对象\n\n监听器现在接收的是 `String`，但如果能自动将其转换回 `Mail` 对象\n就更好了。通过对配置进行一些调整，这很容易实现。\n\
  这里使用的 `KafkaListenerContainerFactory`\n接受一个 `MessageConverter`，为了自动将 `String` 转换为\n\
  所需的对象，你可以向其传递一个 `StringJsonMessageConverter`。\n这将获取 `String` 并将其转换为 `@KafkaListener`\n\
  注解方法中参数指定的对象。\n\n首先更新配置。\n\n```\npackage com.apress.springrecipes.post.config;\n\
  import org.springframework.kafka.support.converter.StringJsonMessageConverter;\n\
  @Configuration\n@EnableKafka\npublic class BackOfficeConfiguration {\n@Bean\nKafkaListenerContainerFactory>\
  \ kafkaListenerContainerFactory() {\nConcurrentKafkaListenerContainerFactory factory\
  \ = new ConcurrentKafkaListenerContainerFactory();\nfactory.setMessageConverter(new\
  \ StringJsonMessageConverter());\nfactory.setConsumerFactory(consumerFactory());\n\
  return factory;\n}\n...\n}\n```\n\n接下来，你需要修改 `MailListener`，使其使用\n`Mail` 对象而不是普通的\
  \ `String`。\n\n```\npackage com.apress.springrecipes.post;\nimport org.springframework.kafka.annotation.KafkaListener;\n\
  public class MailListener {\n@KafkaListener(topics = \"mails\")\npublic void displayMail(Mail\
  \ mail) {\nSystem.out.println(\"Mail #\" + mail.getMailId() + \" received\");\n\
  }\n}\n```\n\n当同时运行后台和前台时，消息仍然会被\n发送和接收。\n\n将对象转换为有效载荷\n\n在前台，`Mail` 实例被手动转换为 JSON\n\
  字符串。虽然这并不困难，但如果框架能透明地完成这项工作就更好了。\n这可以通过配置 `JsonSerializer`\n而不是 `StringSerializer`\
  \ 来实现。\n\n```\npackage com.apress.springrecipes.post.config;\nimport com.apress.springrecipes.post.FrontDeskImpl;\n\
  import org.apache.kafka.clients.producer.ProducerConfig;\nimport org.apache.kafka.common.serialization.IntegerSerializer;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.kafka.core.DefaultKafkaProducerFactory;\nimport org.springframework.kafka.core.KafkaTemplate;\n\
  import org.springframework.kafka.core.ProducerFactory;\nimport org.springframework.kafka.support.serializer.JsonSerializer;\n\
  import java.util.HashMap;\nimport java.util.Map;\n@Configuration\npublic class FrontOfficeConfiguration\
  \ {\n@Bean\npublic KafkaTemplate kafkaTemplate() {\nreturn new KafkaTemplate(producerFactory());\n\
  }\n@Bean\npublic ProducerFactory producerFactory() {\nreturn new DefaultKafkaProducerFactory(producerFactoryProperties());\n\
  }\n@Bean\npublic Map producerFactoryProperties() {\nMap properties = new HashMap();\n\
  properties.put(ProducerConfig.BOOTSTRAP_SERVERS_CONFIG, \"localhost:9092\");\nproperties.put(ProducerConfig.KEY_SERIALIZER_CLASS_CONFIG,\
  \ IntegerSerializer.class);\nproperties.put(ProducerConfig.VALUE_SERIALIZER_CLASS_CONFIG,\
  \ JsonSerializer.class);\nreturn properties;\n}\n@Bean\npublic FrontDeskImpl frontDesk()\
  \ {\nreturn new FrontDeskImpl(kafkaTemplate());\n}\n}\n```\n\n现在你不再使用 `KafkaTemplate<Integer,\
  \ String>`，而是使用 `KafkaTemplate<Integer, Object>`，因为你现在可以将序列化为 `String` 的对象发送到 Kafka。\n\
  \n`FrontOfficeImpl` 类\n现在也可以清理了，因为 JSON 转换现在由\n`KafkaTemplate` 处理。\n\n```\npackage\
  \ com.apress.springrecipes.post;\nimport org.springframework.kafka.core.KafkaOperations;\n\
  import org.springframework.kafka.support.SendResult;\nimport org.springframework.util.concurrent.ListenableFuture;\n\
  import org.springframework.util.concurrent.ListenableFutureCallback;\npublic class\
  \ FrontDeskImpl implements FrontDesk {\nprivate final KafkaOperations kafkaOperations;\n\
  public FrontDeskImpl(KafkaOperations kafkaOperations) {\nthis.kafkaOperations =\
  \ kafkaOperations;\n}\npublic void sendMail(final Mail mail) {\nListenableFuture>\
  \ future = kafkaOperations.send(\"mails\", mail);\nfuture.addCallback(new ListenableFutureCallback>()\
  \ {\n@Override\npublic void onFailure(Throwable ex) {\nex.printStackTrace();\n}\n\
  @Override\npublic void onSuccess(SendResult result) {\nSystem.out.println(\"Result\
  \ (success): \" + result.getRecordMetadata());\n}\n});\n}\n}\n```\n\n总结\n\n\n\n\
  本章探讨了 Spring 的消息传递支持以及如何利用它来构建面向消息的架构。您学习了如何使用不同的消息传递解决方案来生产和消费消息。针对不同的消息传递解决方案，您了解了如何使用\
  \ `MessageListenerContainer` 构建消息驱动的 POJO。\n\n您学习了如何结合 ActiveMQ（一个可靠的开源消息队列）使用 JMS\
  \ 和 AMQP，并简要了解了 Apache Kafka。\n\n下一章将探讨 Spring Integration，这是一个类似 ESB 的框架，用于构建应用程序集成解决方案，类似于\
  \ Mule ESB 和 ServiceMix。您将能够利用本章获得的知识，借助 Spring Integration 将您的面向消息的应用程序提升到新的高度。\n\
  \n15. Spring Integration\n\n在本章中，您将学习企业应用集成（EAI）背后的原理，许多现代应用程序都使用它来解耦组件之间的依赖关系。Spring\
  \ 框架提供了一个强大且可扩展的框架，称为 Spring Integration。Spring Integration 为不同的系统和数据提供了与核心 Spring\
  \ 框架为应用程序内部组件提供的相同级别的解耦。本章旨在为您提供所有必要的知识，以理解 EAI 中涉及的模式，从而理解什么是企业服务总线（ESB），并最终理解如何使用\
  \ Spring Integration 构建解决方案。如果您使用过 EAI 服务器或 ESB，您会发现 Spring Integration 比您以前可能使用过的任何东西都简单得多。\n\
  \n完成本章后，您将能够编写相当复杂的 Spring Integration 解决方案来集成应用程序，以便它们可以共享服务和数据。您还将学习 Spring Integration\
  \ 的多种配置选项。如果您愿意，Spring Integration 可以完全在标准 XML 命名空间中进行配置，但您可能会发现使用注解和 XML 的混合方法更为自然。您还将了解为什么对于具有经典企业应用集成背景的人来说，Spring\
  \ Integration 是一个非常有吸引力的替代方案。如果您以前使用过 ESB（例如 Mule 或 ServiceMix）或经典的 EAI 服务器（例如 Axway\
  \ 的 Integrator 或 TIBCO 的 ActiveMatrix），那么这里解释的惯用模式应该很熟悉，并且其配置会令人耳目一新地简单。\n\n15-1.\
  \ 使用 EAI 将一个系统与另一个系统集成\n\n问题\n\n您有两个需要通过外部接口相互通信的应用程序。您需要在应用程序的服务和/或数据之间建立连接。\n\n\
  解决方案\n\n您需要采用 EAI，这是一门使用一组众所周知的模式来集成应用程序和数据的学科。这些模式在一本里程碑式的书籍《企业集成模式》（Gregor Hohpe\
  \ 和 Bobby Woolf 著）中得到了有益的总结和体现。如今，这些模式已成为规范，是现代 ESB 的通用语言。\n\n工作原理\n\n有几种不同的集成风格可供您使用，您可以使用文件系统、数据库、消息传递，甚至执行远程过程调用。接下来，您将探讨如何实现或实现不同的集成风格，以及除了\
  \ Spring Integration 之外还有哪些选择。\n\n选择一种集成风格\n\n有多种集成风格，每种风格都最适合特定类型的应用程序和需求。基本前提很简单：您的应用程序无法使用一个系统中的原生机制直接与另一个系统通信。因此，您可以设计一个桥接连接，在另一个系统的某些特性之上构建、抽象或绕开这些特性，以对调用系统有利的方式工作。您抽象的内容因应用程序而异。有时是位置，有时是调用的同步或异步性质，有时是消息传递协议。选择集成风格有许多标准，与您希望应用程序的耦合程度、服务器亲和性、消息格式的需求等有关。从某种意义上说，TCP/IP\
  \ 是所有集成技术中最著名的，因为它将一个应用程序与另一个应用程序的服务器解耦。\n\n您可能已经构建过使用以下部分或全部集成风格的应用程序（当然，使用了 Spring！）。例如，共享数据库可以轻松地使用\
  \ Spring 的 JDBC 支持实现；远程过程调用可以轻松地使用 Spring 的导出器功能实现。\n\n四种集成风格如下：\n\n*   **文件传输**：让每个应用程序生成包含共享数据的文件供其他应用程序消费，并消费其他应用程序生成的文件。\n\
  *   **共享数据库**：让应用程序将它们想要共享的数据存储在一个公共数据库中。这通常采用一个不同应用程序都可以访问的数据库的形式。这通常不是首选方法，因为它意味着将您的数据暴露给可能不尊重您已设置（但未编码）的约束的不同客户端。使用视图和存储过程通常可以使这种选项成为可能，但这并不理想。Spring\
  \ Integration 本身并没有特别支持与数据库通信，但您可以构建一个端点，将 SQL 数据库中的新结果作为消息负载进行处理。与数据库的集成往往不是细粒度的或面向消息的，而是面向批处理的。毕竟，数据库中的一百万行新数据与其说是一个事件，不如说是一个批处理！因此，Spring\
  \ Batch（在第 11 章中讨论）包含了对面向 JDBC 的输入和输出的出色支持也就不足为奇了。\n*   **远程过程调用**：让每个应用程序公开其部分过程，以便可以远程调用它们，并让应用程序调用它们以启动行为并交换数据。Spring\
  \ Integration 提供了对优化 RPC 交换（包括远程过程调用，如 SOAP、RMI 和 HTTP Invoker）的特定支持。\n*   **消息传递**：让每个应用程序连接到一个公共消息传递系统，并使用消息交换数据和调用行为。这种风格在\
  \ JEE 世界中主要由 JMS 实现，也描述了其他异步或多播发布-订阅架构。从某种意义上说，ESB 或像 Spring Integration 这样的 EAI\
  \ 容器让您可以像处理消息队列一样处理大多数其他风格：请求进入队列，然后被管理、响应或转发到另一个队列。\n\n基于 ESB 解决方案进行构建\n\n\n\n\
  既然你已经明确了集成的方式，接下来就是具体实现了。当今世界，你有很多选择。如果需求足够常见，大多数中间件或框架都能以某种方式满足。JEE、.NET 等平台通过\
  \ SOAP、XML-RPC、EJB 或二进制远程调用等二进制层、JMS 或 MQ 抽象层，能够很好地处理常见场景。然而，如果需求比较特殊，或者需要大量配置，那么可能就需要\
  \ ESB 了。ESB 是一种中间件，它遵循 EAI 描述的模式精神，提供了一种高级的集成建模方法。ESB 提供了一种可管理的配置格式，能够以简单的高级格式编排集成中的不同部分。\n\
  \nSpringSource 产品组合中的 API——Spring Integration，为建模许多与 Spring 良好配合的集成场景提供了强大的机制。与许多其他\
  \ ESB 相比，Spring Integration 具有诸多优势，尤其是其框架的轻量级特性。新兴的 ESB 市场充满了选择。有些是前 EAI 服务器，经过改造以支持以\
  \ ESB 为中心的架构；有些是真正的 ESB，从一开始就为此而构建；还有一些则不过是带有适配器的消息队列。\n\n事实上，如果你正在寻找一款功能极其强大的 EAI\
  \ 服务器（几乎能与 JEE 平台集成，但价格不菲），可以考虑 Axway Integrator。它几乎无所不能。TIBCO 和 WebMethods 等供应商之所以声名鹊起（并随后被收购），是因为它们提供了处理企业集成的出色工具。这些选项虽然功能强大，但通常非常昂贵且以中间件为中心；你的集成被部署到中间件上。\n\
  \n诸如 Java 业务集成（JBI）之类的标准化尝试在一定程度上取得了成功，并且存在一些基于这些标准的优秀合规 ESB（例如 OpenESB 和 ServiceMix）。ESB\
  \ 市场的思想领袖之一是 Mule ESB，它享有良好声誉；它免费/开源友好、社区友好且轻量级。这些特性也使得 Spring Integration 颇具吸引力。通常，你只需要与另一个开放系统通信，而不想为比某些房子还贵的中间件申请采购审批！\n\
  \n每个 Spring Integration 应用程序都是完全嵌入式的，不需要服务器基础设施。事实上，你可以将集成部署在另一个应用程序内部，也许是在你的 Web\
  \ 应用程序端点中。Spring Integration 颠覆了大多数 ESB 的部署范式。你将 Spring Integration 部署到你的应用程序中；而不是将你的应用程序部署到\
  \ Spring Integration 中。没有启动和停止脚本，也没有需要守护的端口。最简单的可运行 Spring Integration 应用程序就是一个简单的\
  \ Java `public static void main()` 方法来引导 Spring 上下文。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String [] args){\nApplicationContext\
  \ applicationContext = new AnnotationConfigApplicationContext(IntegrationConfiguration.class);\n\
  }\n}\n```\n\n你创建了一个标准的 Spring 应用程序上下文并启动了它。Spring 应用程序上下文的内容将在后续的配方中讨论，但了解它有多么简单是很有帮助的。你可以决定将上下文提升到\
  \ Web 应用程序、EJB 容器或任何你想要的容器中。事实上，你可以使用 Spring Integration 来驱动 Swing/JavaFX 应用程序中的电子邮件轮询功能！它可以根据你的需要变得非常轻量级。在后续示例中，显示的配置应放入一个\
  \ XML 文件中，并在运行此类时将该 XML 文件作为第一个参数引用。当 main 方法运行完成时，你的上下文将启动 Spring Integration 总线，并开始响应应用程序上下文\
  \ XML 中配置的组件上的请求。\n\n15-2. 使用 JMS 集成两个系统\n\n问题\n\n你想构建一个集成，使用 JMS 将一个应用程序连接到另一个应用程序。JMS\
  \ 为 Java 应用程序的现代中间件提供了位置和时间上的解耦。你希望应用更复杂的路由，并将代码与消息来源（在本例中为 JMS 队列或主题）的具体细节隔离开来。\n\
  \n解决方案\n\n虽然你可以通过使用常规的 JMS 代码、EJB 对消息驱动 Bean（MDB）的支持，或使用核心 Spring 的消息驱动 POJO（MDP）支持来实现这一点，但这些方法都必须专门为处理来自\
  \ JMS 的消息而编码。你的代码与 JMS 绑定在一起。使用 ESB 可以让你对处理消息的代码隐藏消息的来源。你将使用此解决方案作为一种简单的方式来了解如何构建\
  \ Spring Integration 解决方案。Spring Integration 提供了一种与 JMS 协作的简便方法，就像你在核心 Spring 容器中使用\
  \ MDP 一样。然而，在这里，你可以设想将 JMS 中间件替换为电子邮件，而响应消息的代码可以保持不变。\n\n工作原理\n\n你可能还记得第 14 章，Spring\
  \ 可以通过使用 MDP 来替代 EJB 的 MDB 功能。对于任何想要构建处理消息队列上消息的人来说，这是一个强大的解决方案。你将构建一个 MDP，但将使用\
  \ Spring Integration 更简洁的配置来配置它，并提供一个非常基础的集成示例。这个集成所做的全部工作就是接收一个入站 JMS 消息（其负载类型为\
  \ `Map<String,Object>`）并将其写入日志。\n\n与标准的 MDP 一样，存在一个 `ConnectionFactory` 类的配置。下面展示了一个配置类。你可以在创建\
  \ Spring `ApplicationContext` 实例时将其作为参数传入（就像你在上一个配方的 `Main` 类中所做的那样）。\n\n\n\n```\n\
  package com.apress.springrecipes.springintegration;\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.IntegrationFlows;\n\
  import org.springframework.integration.jms.dsl.Jms;\nimport org.springframework.jms.connection.CachingConnectionFactory;\n\
  import org.springframework.jms.core.JmsTemplate;\nimport javax.jms.ConnectionFactory;\n\
  @Configuration\n@EnableIntegration\n@ComponentScan\npublic class IntegrationConfiguration\
  \ {\n@Bean\npublic CachingConnectionFactory connectionFactory() {\nActiveMQConnectionFactory\
  \ connectionFactory = new ActiveMQConnectionFactory(\"tcp://localhost:61616\");\n\
  return new CachingConnectionFactory(connectionFactory);\n}\n@Bean\npublic JmsTemplate\
  \ jmsTemplate(ConnectionFactory connectionFactory) {\nreturn new JmsTemplate(connectionFactory);\n\
  }\n@Bean\npublic InboundHelloWorldJMSMessageProcessor messageProcessor() {\nreturn\
  \ new InboundHelloWorldJMSMessageProcessor();\n}\n@Bean\npublic IntegrationFlow\
  \ jmsInbound(ConnectionFactory connectionFactory) {\nreturn return IntegrationFlows\n\
  .from(Jms.messageDrivenChannelAdapter(connectionFactory)\n.extractPayload(true)\n\
  .destination(\"recipe-15-2\"))\n.handle(messageProcessor())\n.get();\n}\n}\n```\n\
  \n如你所见，最令人望而生畏的部分是模式导入！其余代码都是标准的样板代码。你定义了一个`connectionFactory`，就像配置标准 MDP 时一样。\n\
  \n然后，你定义此解决方案特有的任何 bean，在本例中，是一个响应来自消息队列的消息的 bean，即`messageProcessor`。服务激活器是 Spring\
  \ Integration 中的一个通用端点，用于调用功能——无论是服务中的操作、常规 POJO 中的某个例程，还是你想要的任何其他功能——以响应输入通道上发送的消息。虽然这将在后面详细讨论，但这里它之所以有趣，仅仅是因为你用它来响应消息。这些\
  \ bean 共同构成了解决方案中的协作者，这个示例相当具有代表性，展示了大多数集成方案的样子。你定义协作组件，然后使用 Spring Integration\
  \ Java DSL 定义流程，该 DSL 配置了解决方案本身。\n\n提示\n\n还有一个 Spring Integration Groovy DSL。\n\n\
  配置从`IntegrationFlows`开始，它用于定义消息如何在系统中流动。流程从定义`messageDrivenChannelAdapter`开始，它基本上从`recipe-15-2`目标接收消息，并将其传递给\
  \ Spring Integration 通道。顾名思义，`messageDrivenChannelAdapter`是一个适配器。适配器是一种知道如何与特定类型的子系统通信，并将该子系统上的消息转换为可在\
  \ Spring Integration 总线中使用的消息的组件。适配器也反向执行相同操作，获取 Spring Integration 总线上的消息并将其转换为特定子系统能够理解的消息。这与服务激活器（将在后面介绍）不同，因为适配器旨在成为总线与外部端点之间的通用连接。而服务激活器仅帮助你在收到消息时调用应用程序的业务逻辑。你在业务逻辑中做什么（是否连接到另一个系统）完全取决于你。\n\
  \n下一个组件是服务激活器，它监听进入该通道的消息，并通过`handle`方法调用引用的 bean，在本例中是之前定义的`messageProcessor` bean。由于组件的方法上带有`@ServiceActivator`注解，Spring\
  \ Integration 知道要调用哪个方法。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport java.util.Map;\npublic class\
  \ InboundHelloWorldJMSMessageProcessor {\nprivate final Logger logger = LoggerFactory.getLogger(InboundHelloWorldJMSMessageProcessor.class);\n\
  @ServiceActivator\npublic void handleIncomingJmsMessage(Message> inboundJmsMessage)\n\
  throws Throwable {\nMap msg = inboundJmsMessage.getPayload();\nlogger.info(\"firstName:\
  \ {}, lastName: {}, id: {}\", msg.get(\"firstName\"),\nmsg.get(\"lastName\"),\n\
  msg.get(\"id\"));\n}\n}\n```\n\n请注意，有一个注解`@ServiceActivator`，它告诉 Spring 配置此组件，并将此方法作为来自通道的消息负载的接收者，该负载作为`Message<Map<String,\
  \ Object>> inboundJmsMessage`传递给方法。在前面的配置中，`extract-payload=\"true\"`告诉 Spring Integration\
  \ 从 JMS 队列中获取消息的负载（在本例中是一个`Map<String,Object>`），提取它，并将其作为通过 Spring Integration 通道传递的消息的负载（类型为`org.springframework.messaging.Message<T>`）。不要将\
  \ Spring 的`Message`接口与 JMS 的`Message`接口混淆，尽管它们有一些相似之处。如果你没有指定`extractPayload`选项，那么\
  \ Spring 的`Message`接口上的负载类型将是`javax.jms.Message`。提取负载的责任将落在你（开发者）身上，但有时访问该信息是有用的。重写以处理解包`javax.jms.Message`接口，该示例看起来会略有不同，如下所示：\n\
  \n```\npackage com.apress.springrecipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport javax.jms.MapMessage;\npublic\
  \ class InboundHelloWorldJMSMessageProcessor {\nprivate final Logger logger = LoggerFactory.getLogger(InboundHelloWorldJMSMessageProcessor.class);\n\
  @ServiceActivator\npublic void handleIncomingJmsMessageWithPayloadNotExtracted(\n\
  Message msgWithJmsMessageAsPayload) throws Throwable {\njavax.jms.MapMessage jmsMessage\
  \ = (MapMessage) msgWithJmsMessageAsPayload.getPayload();\nlogger.debug(\"firstName:\
  \ {}, lastName: {}, id: {}\", jmsMessage.getString(\"firstName\"),\njmsMessage.getString(\"\
  lastName\"),\njmsMessage.getLong(\"id\"));\n}\n}\n```\n\n你也可以将负载类型指定为传递给方法的参数类型。例如，如果来自\
  \ JMS 的消息负载是`Cat`类型，那么方法原型同样可以是`public void handleIncomingJmsMessageWithPayloadNotExtracted(\
  \ Cat inboundJmsMessage) throws Throwable`。Spring Integration 会自行判断正确的处理方式。在本例中，我们更倾向于访问\
  \ Spring 的`Message<T>`，因为它包含可用于检查的头信息。\n\n另请注意，你不需要指定`throws Throwable`。在 Spring\
  \ Integration 中，错误处理可以像你希望的那样通用或具体。\n\n\n\n在示例中，你使用 `@ServiceActivator`\n注解来调用集成结束时的功能。然而，你可以通过从方法中返回一个值，将来自激活的响应转发到下一个通道。返回值的类型将用于确定系统中发送的下一条消息。如果你返回一个\
  \ `Message<T>`，\n该消息将被直接发送。如果你返回的不是 `Message<T>`，\n该值将被包装为 `Message<T>`\n实例中的有效负载，并成为最终发送到处理管道中下一个组件的下一条消息。这个\
  \ `Message<T>`\n接口将在配置于服务激活器上的输出通道上发送。不需要在输出通道上发送与输入通道上消息类型相同的消息；这是转换消息类型的有效方式。服务激活器是一个非常灵活的组件，可用于在你的系统中插入钩子并帮助塑造集成。\n\
  \n这个解决方案相当直接，就单个 JMS 队列的配置而言，它并不比直接的 MDP 更有优势，因为需要克服一个额外的间接层。Spring Integration\
  \ 的功能使得构建复杂集成比 Spring Core 或 EJB3 更容易，因为配置是集中式的。你可以鸟瞰整个集成，路由和处理都集中在一起，因此你可以更好地重新定位集成中的组件。然而，正如你将看到的，Spring\
  \ Integration 并非旨在与 EJB 和 Spring Core 竞争；它在那些无法使用 EJB3 或 Spring Core 自然构建的解决方案中表现出色。\n\
  \n15-3\\. 查询 Spring Integration 消息以获取上下文信息\n\n问题\n\n你希望获取比消息类型隐式提供的信息更多的、关于进入 Spring\
  \ Integration 处理管道的消息的信息。\n\n解决方案\n\n查询 Spring Integration `Message<T>`\n接口以获取特定于该消息的标头信息。这些值在映射（类型为\
  \ `Map<String,Object>`）中作为标头值枚举。\n\n工作原理\n\nSpring `Message<T>`\n接口是一个通用包装器，包含指向消息实际有效负载的指针，以及提供上下文消息元数据的标头。你也可以操作或扩充这些元数据，以启用/增强下游组件的功能；例如，通过电子邮件发送消息时，指定\
  \ `TO`/`FROM` 标头非常有用。\n\n每当你向框架暴露一个类来处理某些需求（例如你为服务激活器组件或转换器组件提供的逻辑）时，都会有与 `Message<T>`\
  \ 和消息标头交互的机会。请记住，Spring Integration 会通过处理管道推送一个 `Message<T>`\n实例。每个与 `Message<T>`\n\
  实例交互的组件都必须对其执行操作、进行处理或将其转发。向这些组件提供信息，以及获取关于组件中到目前为止发生的情况的信息的一种方法是查询 `MessageHeaders`。\n\
  \n在使用 Spring Integration 时，你应该了解几个值（参见表 15-1 和 15-2）。这些常量暴露在 `org.springframework.messaging.MessageHeaders`\n\
  接口和 `org.springframework.integration.IntegrationMessageHeaderAccessor` 上。\n\n表 15-2.\n\
  \nSpring Integration 中常见的标头\n\n常量\n |\n 描述\n |\n\n| --- | --- | --- | --- | ---\
  \ |\n\n`CORRELATION_ID`\n |\n  这是可选的，被某些组件（如聚合器）用于在某种处理管道中将消息分组在一起。\n |\n\n`EXPIRATION_DATE`\n\
  \ |\n  这被某些组件用作处理阈值，超过该阈值后组件将不再等待处理。\n |\n\n`PRIORITY`\n |\n  这是消息的优先级；数字越大表示优先级越高。\n\
  \ |\n\n`SEQUENCE_NUMBER`\n |\n  这是消息排序的顺序；通常与排序器一起使用。\n |\n\n`SEQUENCE_SIZE`\n |\n\
  \  这是序列的大小，以便聚合器知道何时停止等待更多消息并继续前进。这在实现连接功能时非常有用。\n |\n\n`ROUTING_SLIP`\n |\n  这是在使用路由单模式时包含信息的标头。\n\
  \ |\n\n`CLOSEABLE_RESOURCE`\n |\n  这是可选的，被某些组件用于确定消息有效负载是否可以/应该被关闭（如文件或 InputStream）。\n\
  \ |\n\n表 15-1.\n\n核心 Spring Messaging 中常见的标头\n\n常量\n |\n 描述\n |\n\n| --- | --- |\
  \ --- | --- | --- |\n\n`ID`\n |\n  这是由 Spring Integration 引擎分配给消息的唯一值。\n |\n\n`TIMESTAMP`\n\
  \ |\n  这是分配给消息的时间戳。\n |\n\n`REPLY_CHANNEL`\n |\n  这是当前组件输出应发送到的通道的 `String` 名称。这可以被覆盖。\n\
  \ |\n\n`ERROR_CHANNEL`\n |\n  这是如果异常冒泡到运行时，当前组件输出应发送到的通道的 `String` 名称。这可以被覆盖。\n\
  \ |\n\n`CONTENT_TYPE`\n |\n  这是消息的内容类型（MIME 类型），主要用于 Web Socket 消息。\n |\n\n除了 Spring\
  \ Messaging 定义的标头之外，Spring Integration 中还有一些常用的标头；这些定义在 `org.springframework.integration.IntegrationMessageHeaderAccessor`\n\
  类中（参见表 15-2）。\n\n某些标头值特定于源消息有效负载的类型；例如，来自文件系统上文件的有效负载与来自 JMS 队列的有效负载不同，后者又与来自电子邮件系统的消息不同。这些不同的组件通常打包在自己的\
  \ JAR 中，并且通常有一些类提供用于访问这些标头的常量。特定于组件的标头是在 `org.springframework.integration.file.FileHeaders`\
  \ 上为文件定义的常量的示例：\n`FILENAME` 和\n`PREFIX`。\n当然，如有疑问，你可以手动枚举这些值，因为标头只是一个 `java.util.Map`\n\
  实例。\n\n```\npackage com.apress.springrecipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport org.springframework.messaging.MessageHeaders;\n\
  import java.io.File;\nimport java.util.Map;\npublic class InboundFileMessageServiceActivator\
  \ {\nprivate final Logger logger = LoggerFactory.getLogger(InboundFileMessageServiceActivator.class);\n\
  @ServiceActivator\npublic void interrogateMessage(Message message) {\nMessageHeaders\
  \ headers = message.getHeaders();\nfor (Map.Entry header : headers.entrySet()) {\n\
  logger.debug(\"{} : {}\", header.getKey(), header.getValue() );\n}\n}\n}\n```\n\n\
  这些标头让你能够查询这些消息的特定功能，而无需将它们作为具体的接口依赖暴露出来（如果你不希望如此）。它们也可以用于帮助处理，并允许你向下游组件指定自定义元数据。为下游组件的利益提供额外数据的行为称为消息富化。消息富化是指你获取给定消息的标头并向其中添加内容，通常是为了下游处理管道中的组件。你可以想象处理一条消息，向客户关系管理（CRM）系统添加一个客户，该系统会调用第三方网站来建立信用评级。这个信用信息被添加到标头中，以便负责添加或拒绝客户的下游组件可以根据这些标头值做出决策。\n\
  \n\n\n另一种获取消息头元数据的方式是将其作为参数传递给组件的方法。只需使用 `@Header` 注解标注参数，Spring Integration 就会处理其余部分。\n\
  \n```\npackage com.apress.springrecipes.springintegration;\nimport java.io.File;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.integration.file.FileHeaders;\nimport org.springframework.messaging.MessageHeaders;\n\
  import org.springframework.messaging.handler.annotation.Header;\npublic class InboundFileMessageServiceActivator\
  \ {\nprivate final Logger logger = LoggerFactory.getLogger(InboundFileMessageServiceActivator.class);\n\
  @ServiceActivator\npublic void interrogateMessage(\n@Header(MessageHeaders.ID) String\
  \ uuid,\n@Header(FileHeaders.FILENAME) String fileName, File file) {\nlogger.debug(\"\
  the id of the message is {}, and name of the file payload is {}\", uuid, fileName);\n\
  }\n}\n```\n\n你也可以让 Spring Integration 直接传递 `Map<String,Object>`。\n\n```\npackage\
  \ com.apress.springrecipes.springintegration;\nimport java.io.File;\nimport java.util.Map;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.integration.file.FileHeaders;\nimport org.springframework.messaging.MessageHeaders;\n\
  import org.springframework.messaging.handler.annotation.Header;\npublic class InboundFileMessageServiceActivator\
  \ {\nprivate final Logger logger = LoggerFactory.getLogger(InboundFileMessageServiceActivator.class);\n\
  @ServiceActivator\npublic void interrogateMessage(\n@Header(MessageHeaders.ID) Map\
  \ headers, File file) {\nlogger.debug(\"the id of the message is {}, and name of\
  \ the file payload is {}\",\nheaders.get(MessageHeaders.ID), headers.get(FileHeaders.FILENAME));\n\
  }\n}\n```\n\n15-4. 使用文件系统集成两个系统\n\n问题\n\n你想要构建一个解决方案，该方案利用已知的共享文件系统上的文件，作为与另一个系统集成的通道。例如，你的应用程序每小时生成一个包含所有新增客户的逗号分隔值（CSV）转储文件。公司第三方财务系统通过一个进程来更新这些销售数据，该进程会检查通过网络文件系统挂载的共享文件夹，并处理\
  \ CSV 记录。所需的是将新文件的存在视为总线上的一个事件。\n\n解决方案\n\n你大致知道如何使用标准技术构建此功能，但希望有更优雅的方式。让 Spring\
  \ Integration 将你从文件系统的事件驱动特性以及文件输入/输出需求中隔离出来。相反，让我们专注于编写处理 `java.io.File` 有效载荷本身的代码。通过这种方法，你可以编写可进行单元测试的代码，该代码接受输入并通过将客户添加到财务系统来做出响应。功能完成后，将其配置到\
  \ Spring Integration 管道中，让 Spring Integration 在文件系统上识别到新文件时调用你的功能。这是事件驱动架构（EDA）的一个示例。EDA\
  \ 让你忽略事件是如何生成的，专注于对事件做出反应，这与事件驱动的 GUI 让你将代码焦点从控制用户如何触发动作转移到实际响应调用本身的方式非常相似。Spring\
  \ Integration 使其成为构建松耦合解决方案的自然方法。实际上，这段代码看起来应该与你为 JMS 队列构建的解决方案类似，因为它只是另一个接受参数（Spring\
  \ Integration 的 `Message<T>` 接口、与消息有效载荷类型相同的参数等）的类。\n\n工作原理\n\n构建与 JMS 通信的解决方案已是老生常谈。相反，让我们考虑一下使用共享文件系统构建解决方案可能是什么样子。想象一下在没有\
  \ ESB 解决方案的情况下如何构建它。你需要某种机制来定期轮询文件系统并检测新文件。也许需要 Quartz 和某种缓存？你需要快速读取这些文件，然后高效地将有效载荷传递给处理逻辑。最后，你的系统需要处理该有效载荷。\n\
  \nSpring Integration 将你从所有这些基础设施代码中解放出来；你只需要进行配置。然而，处理基于文件系统的问题时，仍有一些问题需要你自己解决。在幕后，Spring\
  \ Integration 仍然在处理轮询文件系统和检测新文件。它不可能为你的应用程序提供一个语义上正确的关于文件何时“完全”写入的概念，因此需要你自己提供解决方法。\n\
  \n存在几种方法。你可以先写出一个文件，然后再写一个零字节文件。该文件的存在意味着可以安全地假设实际有效载荷已存在。配置 Spring Integration\
  \ 来查找该文件。如果找到它，就知道还有另一个文件（可能具有相同的名称和不同的文件扩展名？），并且可以开始读取/处理它。另一个类似的解决方案是让客户端（“生产者”）使用\
  \ Spring Integration 用于轮询目录的 glob 模式无法检测到的名称将文件写入目录。然后，在写入完成后，如果你信任你的文件系统能正确处理，就执行\
  \ `mv` 命令。\n\n让我们重新审视第一个解决方案，但这次使用基于文件的适配器。配置在概念上与之前相同，只是适配器的配置发生了变化，并且随之而去的是 JMS\
  \ 适配器的大量配置，例如连接工厂。相反，你告诉 Spring Integration 消息将来自另一个源：文件系统。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.integration.config.EnableIntegration;\nimport org.springframework.integration.dsl.IntegrationFlow;\n\
  import org.springframework.integration.dsl.IntegrationFlows;\nimport org.springframework.integration.dsl.Pollers;\n\
  import org.springframework.integration.file.dsl.Files;\nimport java.io.File;\nimport\
  \ java.util.concurrent.TimeUnit;\n@Configuration\n@EnableIntegration\n@ComponentScan\n\
  public class IntegrationConfiguration {\n@Bean\npublic InboundHelloWorldFileMessageProcessor\
  \ messageProcessor() {\nreturn new InboundHelloWorldFileMessageProcessor();\n}\n\
  @Bean\npublic IntegrationFlow inboundFileFlow(@Value(\"${user.home}/inboundFiles/new/\"\
  ) File directory) {\nreturn IntegrationFlows\n.from(\nFiles.inboundAdapter(directory).patternFilter(\"\
  *.csv\"),\nc -> c.poller(Pollers.fixedRate(10, TimeUnit.SECONDS)))\n.handle(messageProcessor())\n\
  .get();\n}\n}\n```\n\n这实际上都是你之前见过的内容。`Files.inboundAdapter` 的代码是唯一的新元素。`@ServiceActivator`\
  \ 注解的代码已更改，以反映你期望收到一条包含 `Message<java.io.File>` 类型消息的事实。\n\n\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport java.io.File;\npublic class\
  \ InboundHelloWorldFileMessageProcessor {\nprivate final Logger logger = LoggerFactory.getLogger(InboundHelloWorldFileMessageProcessor.class);\n\
  @ServiceActivator\npublic void handleIncomingFileMessage(Message inboundJmsMessage)\n\
  throws Throwable {\nFile filePayload = inboundJmsMessage.getPayload();\nlogger.debug(\"\
  absolute path: {}, size: {}\", filePayload.getAbsolutePath(), filePayload.length());\n\
  }\n}\n```\n\n15-5\\. 将消息从一种类型转换为另一种类型\n\n问题\n\n您希望将消息发送到总线，并在进一步处理之前对其进行转换。通常，这样做是为了使消息适应下游组件的需求。您可能还希望通过丰富消息来转换它——添加额外的标头或扩充有效负载，以便处理管道中的下游组件能够从中受益。\n\
  \n解决方案\n\n使用转换器组件接收一个有效负载为 `Message<T>` 接口的消息，并输出一个有效负载为其他类型的 `Message<T>` 消息。您还可以使用转换器为下游处理管道中的组件添加额外的标头或更新标头的值。\n\
  \n工作原理\n\nSpring Integration 提供了一个转换器消息端点，允许扩充消息标头或转换消息本身。在 Spring Integration 中，组件被链接在一起，一个组件的输出通过为该组件调用的方法返回。方法的返回值通过该组件的“回复通道”传递给下一个组件，下一个组件将其作为输入参数接收。转换器组件允许您更改返回对象的类型或添加额外的标头，更新后的对象将传递给链中的下一个组件。\n\
  \n修改消息的有效负载\n\n转换器组件的配置与您目前所见到的非常一致。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.integration.annotation.Transformer;\nimport org.springframework.messaging.Message;\n\
  import java.util.Map;\npublic class InboundJMSMessageToCustomerTransformer {\n@Transformer\n\
  public Customer transformJMSMapToCustomer(\nMessage> inboundSprignIntegrationMessage)\
  \ {\nMap jmsMessagePayload = inboundSprignIntegrationMessage.getPayload();\nCustomer\
  \ customer = new Customer();\ncustomer.setFirstName((String) jmsMessagePayload.get(\"\
  firstName\"));\ncustomer.setLastName((String) jmsMessagePayload.get(\"lastName\"\
  ));\ncustomer.setId((Long) jmsMessagePayload.get(\"id\"));\nreturn customer;\n}\n\
  }\n```\n\n这里并没有发生什么特别复杂的事情：传入了一个类型为 `Map<String,Object>` 的 `Message<T>` 接口。手动提取这些值，并用它们来构建一个\
  \ `Customer` 类型的对象。返回 `Customer` 对象，其效果是将其通过此组件的回复通道传递出去。配置中的下一个组件将接收此对象作为其输入的 `Message<T>`。\n\
  \n解决方案与您之前看到的基本相同，但有一个新的转换器元素。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import javax.jms.ConnectionFactory;\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.IntegrationFlows;\n\
  import org.springframework.integration.jms.dsl.Jms;\nimport org.springframework.jms.connection.CachingConnectionFactory;\n\
  import org.springframework.jms.core.JmsTemplate;\n@Configuration\n@EnableIntegration\n\
  @ComponentScan\npublic class IntegrationConfiguration {\n@Bean\npublic CachingConnectionFactory\
  \ connectionFactory() {\nActiveMQConnectionFactory connectionFactory = new ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\nreturn new CachingConnectionFactory(connectionFactory);\n\
  }\n@Bean\npublic JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {\n\
  return new JmsTemplate(connectionFactory);\n}\n@Bean\npublic InboundJMSMessageToCustomerTransformer\
  \ customerTransformer() {\nreturn new InboundJMSMessageToCustomerTransformer();\n\
  }\n@Bean\npublic InboundCustomerServiceActivator customerServiceActivator() {\n\
  return new InboundCustomerServiceActivator();\n}\n@Bean\npublic IntegrationFlow\
  \ jmsInbound(ConnectionFactory connectionFactory) {\nreturn IntegrationFlows\n.from(Jms.messageDrivenChannelAdapter(connectionFactory).extractPayload(true).destination(\"\
  recipe-15-5\"))\n.transform(customerTransformer())\n.handle(customerServiceActivator())\n\
  .get();\n}\n}\n```\n\n在这里，您指定了一个 `messageDrivenChannelAdapter` 组件，它将传入的内容移动到 `InboundJMSMessageToCustomerTransformer`，该转换器将其转换为\
  \ `Customer`，然后该 `Customer` 被发送到 `InboundCustomerServiceActivator`。\n\n现在，下一个组件中的代码可以毫无顾虑地声明对\
  \ `Customer` 接口的依赖。通过转换器，您可以从任意数量的源接收消息，并将它们转换为 `Customer`，以便重用 `InboundCustomerServiceActivator`\
  \ 实例。\n\n```\npackage com.apress.springrecipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\npublic class InboundCustomerServiceActivator\
  \ {\nprivate static final Logger logger = LoggerFactory.getLogger(InboundCustomerServiceActivator.class);\n\
  @ServiceActivator\npublic void doSomethingWithCustomer(Message customerMessage)\
  \ {\nCustomer customer = customerMessage.getPayload();\nlogger.debug(\"id={}, firstName:\
  \ {}, lastName: {}\",\ncustomer.getId(), customer.getFirstName(), customer.getLastName());\n\
  }\n}\n```\n\n修改消息的标头\n\n有时仅更改消息的有效负载是不够的。有时您希望同时更新有效负载和标头。这样做会稍微有趣一些，因为它涉及到使用 `MessageBuilder<T>`\
  \ 类，该类允许您创建具有任何指定有效负载和任何指定标头数据的新 `Message<T>` 对象。在这种情况下，XML 配置是相同的。\n\n\n```content\n\
  ```\npackage com.apress.springrecipes.springintegration;\nimport org.springframework.integration.annotation.Transformer;\n\
  import org.springframework.integration.core.Message;\nimport org.springframework.integration.message.MessageBuilder;\n\
  import java.util.Map;\npublic class InboundJMSMessageToCustomerTransformer {\n@Transformer\n\
  public Message transformJMSMapToCustomer(\nMessage> inboundSpringIntegrationMessage)\
  \ {\nMap jmsMessagePayload =\ninboundSpringIntegrationMessage.getPayload();\nCustomer\
  \ customer = new Customer();\ncustomer.setFirstName((String) jmsMessagePayload.get(\"\
  firstName\"));\ncustomer.setLastName((String) jmsMessagePayload.get(\"lastName\"\
  ));\ncustomer.setId((Long) jmsMessagePayload.get(\"id\"));\nreturn MessageBuilder.withPayload(customer)\n\
  .copyHeadersIfAbsent( inboundSpringIntegrationMessage.getHeaders())\n.setHeaderIfAbsent(\"\
  randomlySelectedForSurvey\", Math.random() > .5)\n.build();\n}\n}\n```\n\n和之前一样，这段代码只是一个带有输入和输出的方法。输出通过\
  \ `MessageBuilder<T>` 动态构建，用于创建一条与输入消息具有相同载荷的消息，同时复制现有消息头，并添加一个额外的消息头：`randomlySelectedForSurvey`。\n\
  \n15-6. 使用 Spring Integration 处理错误\n\n问题\n\nSpring Integration 将分布在不同节点、计算机、服务、协议和语言栈上的系统整合在一起。实际上，一个\
  \ Spring Integration 解决方案可能无法在与其启动时大致相同的时间段内完成。因此，对于任何具有异步行为的组件，异常处理永远无法像单线程中的语言级\
  \ `try`/`catch` 块那样简单。这意味着，你很可能构建的许多解决方案（使用各种通道和队列）都需要一种向产生错误的组件发送分布式且自然的错误信号的方式。因此，错误可能会通过\
  \ JMS 队列发送到不同的大洲，或者在进程内通过不同线程的队列发送。\n\n解决方案\n\n使用 Spring Integration 对错误通道的支持，既可以通过代码隐式实现，也可以显式实现。\n\
  \n工作原理\n\nSpring Integration 提供了捕获异常并将其发送到你选择的错误通道的能力。默认情况下，它是一个名为 `errorChannel`\
  \ 的全局通道。Spring Integration 默认会向该通道注册一个名为 `LoggingHandler` 的处理程序，该处理程序仅记录异常和堆栈跟踪。要使其生效，你需要告知消息驱动通道适配器，你希望将错误发送到\
  \ `errorChannel`；你可以通过配置错误通道属性来实现这一点。\n\n```\n@Bean\npublic IntegrationFlow jmsInbound(ConnectionFactory\
  \ connectionFactory) {\nreturn IntegrationFlows\n.from(Jms.messageDrivenChannelAdapter(connectionFactory).extractPayload(true).destination(\"\
  recipe-15-6\").errorChannel(\"errorChannel\"))\n.transform(customerTransformer())\n\
  .handle(customerServiceActivator())\n.get();\n}\n```\n\n使用自定义处理程序处理异常\n\n当然，你也可以让组件订阅此通道的消息，以覆盖异常处理行为。你可以创建一个类，每当\
  \ `errorChannel` 通道上有消息传入时，该类就会被调用。\n\n```\n@Bean\npublic IntegrationFlow errorFlow()\
  \ {\nreturn IntegrationFlows\n.from(\"errorChannel\")\n.handle(errorHandlingServiceActivator())\n\
  .get();\n}\n```\n\nJava 代码完全符合你的预期。当然，从 `errorChannel` 通道接收错误消息的组件不必是服务激活器。这里只是为了方便而使用它。以下服务激活器的代码展示了构建\
  \ `errorChannel` 处理程序时可能进行的一些操作：\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport org.springframework.messaging.MessagingException;\n\
  public class DefaultErrorHandlingServiceActivator {\nprivate static final Logger\
  \ logger = LoggerFactory.getLogger(DefaultErrorHandlingServiceActivator.class);\n\
  @ServiceActivator\npublic void handleThrowable(Message errorMessage)\nthrows Throwable\
  \ {\nThrowable throwable = errorMessage.getPayload();\nlogger.debug(\"Message: {}\"\
  , throwable.getMessage(), throwable);\nif (throwable instanceof MessagingException)\
  \ {\nMessage failedMessage = ((MessagingException) throwable).getFailedMessage();\n\
  if (failedMessage != null) {\n// 对原始消息进行处理\n}\n} else {\n// 这是在你创建的某个组件的代码执行过程中抛出的异常\n\
  }\n}\n}\n```\n\n所有从 Spring Integration 组件抛出的错误都将是 `MessagingException` 的子类。`MessagingException`\
  \ 携带了一个指向导致错误的原始 `Message` 的指针，你可以解析它以获取更多上下文信息。在示例中，你使用了一个不太优雅的 `instanceof`。显然，能够根据异常类型委托给自定义异常处理程序会非常有用。\n\
  \n根据异常类型路由到自定义处理程序\n\n有时需要更具体的错误处理。在以下代码中，该路由器被配置为异常类型路由器，它依次监听 `errorChannel`。然后，它使用异常类型作为谓词进行分流，以确定哪个通道应该接收结果。\n\
  \n```\n@Bean\npublic ErrorMessageExceptionTypeRouter exceptionTypeRouter() {\nErrorMessageExceptionTypeRouter\
  \ router = new ErrorMessageExceptionTypeRouter();\nrouter.setChannelMapping(MyCustomException.class.getName(),\
  \ \"customExceptionChannel\");\nrouter.setChannelMapping(RuntimeException.class.getName(),\
  \ \"runtimeExceptionChannel\");\nrouter.setChannelMapping(MessageHandlingException.class.getName(),\
  \ \"messageHandlingExceptionChannel\");\nreturn router;\n}\n@Bean\npublic IntegrationFlow\
  \ errorFlow() {\nreturn IntegrationFlows\n.from(\"errorChannel\")\n.route(exceptionTypeRouter())\n\
  .get();\n}\n```\n\n构建具有多个错误通道的解决方案\n\n前面的示例可能适用于简单情况，但通常不同的集成需要不同的错误处理方法，这意味着将所有错误发送到同一个通道最终可能导致一个包含大量\
  \ switch 语句的类，过于复杂而难以维护。相反，更好的做法是选择性地将错误消息路由到每个集成最合适的错误通道。这避免了将所有错误处理集中化。一种实现方法是显式指定给定集成的错误应发送到哪个通道。以下示例展示了一个组件（服务激活器），它在收到消息时，会添加一个指示错误通道名称的消息头。Spring\
  \ Integration 将使用该消息头，并将处理此消息过程中遇到的错误转发到该通道。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.apache.log4j.Logger;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.integration.core.Message;\nimport org.springframework.integration.core.MessageHeaders;\n\
  import org.springframework.integration.message.MessageBuilder;\npublic class ServiceActivatorThatSpecifiesErrorChannel\
  \ {\nprivate static final Logger logger = Logger.getLogger(\nServiceActivatorThatSpecifiesErrorChannel.class);\n\
  @ServiceActivator\npublic Message startIntegrationFlow(Message firstMessage)\nthrows\
  \ Throwable {\nreturn MessageBuilder.fromMessage(firstMessage).\nsetHeaderIfAbsent(\
  \ MessageHeaders.ERROR_CHANNEL,\n\"errorChannelForMySolution\").build();\n}\n}\n\
  ```\n\n\n\n因此，所有来自使用该组件的集成所产生的错误，都将被定向到 `customErrorChannel`，你可以将任何你喜欢的组件订阅到该通道。\n\
  \n15-7. 分支集成控制：拆分器与聚合器\n\n问题\n\n你希望将流程从一个组件分支到多个组件，要么一次性分发到所有组件，要么根据谓词条件分发到单个组件。\n\
  \n解决方案\n\n你可以使用拆分器组件（以及可能的其搭档——聚合器组件）来分别实现处理流程的分支与合并。\n\n工作原理\n\nESB 的基本基石之一是路由。你已经看到组件如何被链接在一起以创建序列，其中流程大多是线性的。某些解决方案需要能够将一条消息拆分成多个组成部分。一个可能的原因是，有些问题本质上是并行的，并且不依赖于彼此来完成。你应该尽可能追求并行处理的效率。\n\
  \n使用拆分器\n\n将大型有效负载拆分为具有独立处理流程的单独消息通常很有用。在 Spring Integration 中，这是通过使用拆分器组件来实现的。拆分器接收一条输入消息，并询问你（组件的用户）它应该基于什么标准来拆分\
  \ `Message<T>`：你需要负责提供拆分功能。一旦你告诉 Spring Integration 如何拆分 `Message<T>`，它就会将每个结果转发到拆分器组件的输出通道上。在少数情况下，Spring\
  \ Integration 自带了一些有用的、无需自定义的拆分器。一个例子是用于沿 XPath 查询对 XML 有效负载进行分区的拆分器 `XPathMessageSplitter`。\n\
  \n拆分器的一个有用应用示例是处理包含多行数据的文本文件，每一行都必须被处理。你的目标是能够将每一行提交给一个负责处理的服务。所需的是提取每一行并将每一行作为新的\
  \ `Message<T>` 转发的方法。此类解决方案的配置如下所示：\n\n```\n@Configuration\n@EnableIntegration\n\
  public class IntegrationConfiguration {\n@Bean\npublic CustomerBatchFileSplitter\
  \ splitter() {\nreturn new CustomerBatchFileSplitter();\n}\n@Bean\npublic CustomerDeletionServiceActivator\
  \ customerDeletionServiceActivator() {\nreturn new CustomerDeletionServiceActivator();\n\
  }\n@Bean\npublic IntegrationFlow fileSplitAndDelete(@Value(\"file:${user.home}/customerstoremove/new/\"\
  ) File inputDirectory) throws Exception {\nreturn IntegrationFlows.from(\nFiles.inboundAdapter(inputDirectory).patternFilter(\"\
  customerstoremove-*.txt\"), c -> c.poller(Pollers.fixedRate(1, TimeUnit.SECONDS)))\n\
  .split(splitter())\n.handle(customerDeletionServiceActivator())\n.get();\n}\n}\n\
  ```\n\n此配置与之前的解决方案没有太大区别。Java 代码也几乎相同，只是由 `@Splitter` 注解标注的方法的返回类型是 `java.util.Collection`。\n\
  \n```\npackage com.apress.springrecipes.springintegration;\nimport org.springframework.integration.annotation.Splitter;\n\
  import java.io.File;\nimport java.io.IOException;\nimport java.nio.file.Files;\n\
  import java.util.Collection;\npublic class CustomerBatchFileSplitter {\n@Splitter\n\
  public Collection splitAFile(File file) throws IOException {\nSystem.out.printf(\"\
  Reading %s....%n\", file.getAbsolutePath());\nreturn Files.readAllLines(file.toPath());\n\
  }\n}\n```\n\n消息有效负载作为 `java.io.File` 组件传入，并读取其内容。返回结果（一个集合或数组值；在此例中，是一个 `Collection<String>`\
  \ 集合）。Spring Integration 对结果执行一种 `foreach` 操作，将集合中的每个值发送到为拆分器配置的输出通道上。通常，你拆分消息是为了让各个部分能够被转发到更专注的处理流程中。由于消息更易于管理，处理需求也随之降低。这在许多不同的架构中都是如此。在\
  \ map/reduce 解决方案中，任务被拆分然后并行处理；在 BPM 系统中，fork/join 结构允许控制流并行进行，从而可以更快地完成总工作量。\n\n\
  使用聚合器\n\n在某些时候，你需要执行相反的操作：将多条消息合并为一条，并创建一个可以在输出通道上返回的单一结果。`@Aggregator` 收集一系列消息（基于你帮助\
  \ Spring Integration 在消息之间建立的某种关联性），并向下游组件发布一条单一消息。假设你知道系统中有 22 个参与者，你期望收到来自它们的\
  \ 22 条不同消息，但你不知道它们何时到达。这类似于一家公司拍卖合同，在选定最终供应商之前收集所有不同供应商的投标。公司不能在收到所有公司的投标之前接受任何一份投标。否则，就有过早签署一份不符合公司最佳利益合同的风险。聚合器非常适合构建此类逻辑。\n\
  \nSpring Integration 有多种关联传入消息的方法。为了确定需要读取多少条消息才能停止，它使用了 `SequenceSizeCompletionStrategy`\
  \ 类，该类会读取一个已知的标头值。（聚合器通常在拆分器之后使用。因此，默认的标头值由拆分器提供，尽管没有任何限制阻止你自己创建标头参数。）`SequenceSizeCompletionStrategy`\
  \ 类计算它应该寻找多少条消息，并记录消息相对于预期总数的索引（例如，3/22）。\n\n对于你可能不知道消息数量，但知道在已知时间内期望收到共享某个公共标头值的消息的情况，Spring\
  \ Integration 提供了 `HeaderAttributeCorrelationStrategy`。通过这种方式，它知道所有具有该值的消息来自同一个组，就像你的姓氏标识你是某个更大群体的一部分一样。\n\
  \n让我们重新审视前面的例子。假设文件已被拆分（按行，每行属于一个新客户）并随后被处理。你现在希望将客户重新聚合起来，并同时对所有人进行一些清理工作。在此示例中，你使用默认的完成策略和关联策略，因此你可以在集成流配置中使用默认的\
  \ `aggregate()`。结果被传递给另一个服务激活器，该激活器将打印一个小摘要。\n\n\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.IntegrationFlows;\n\
  import org.springframework.integration.dsl.Pollers;\nimport org.springframework.integration.file.dsl.Files;\n\
  import java.io.File;\nimport java.util.concurrent.TimeUnit;\n@Configuration\n@EnableIntegration\n\
  public class IntegrationConfiguration {\n@Bean\npublic CustomerBatchFileSplitter\
  \ splitter() {\nreturn new CustomerBatchFileSplitter();\n}\n@Bean\npublic CustomerDeletionServiceActivator\
  \ customerDeletionServiceActivator() {\nreturn new CustomerDeletionServiceActivator();\n\
  }\n@Bean\npublic SummaryServiceActivator summaryServiceActivator() {\nreturn new\
  \ SummaryServiceActivator();\n}\n@Bean\npublic IntegrationFlow fileSplitAndDelete(@Value(\"\
  file:${user.home}/customerstoremove/new/\") File inputDirectory) throws Exception\
  \ {\nreturn IntegrationFlows.from(\nFiles.inboundAdapter(inputDirectory).patternFilter(\"\
  customerstoremove-*.txt\"), c -> c.poller(Pollers.fixedRate(1, TimeUnit.SECONDS)))\n\
  .split(splitter())\n.handle(customerDeletionServiceActivator())\n.aggregate()\n\
  .handle(summaryServiceActivator())\n.get();\n}\n}\n```\n\n`SummaryServiceActivator`\
  \ 的 Java 代码非常简单。\n\n```\npackage com.apress.springrecipes.springintegration;\nimport\
  \ org.springframework.integration.annotation.ServiceActivator;\nimport java.util.Collection;\n\
  public class SummaryServiceActivator {\n@ServiceActivator\npublic void summary(Collection\
  \ customers) {\nSystem.out.printf(\"已移除 %s 位客户。%n\", customers.size());\n}\n}\n\
  ```\n\n15-8. 使用路由器实现条件路由\n\n问题\n\n你希望根据某些条件，将消息有条件地路由到不同的处理流程。这相当于企业应用集成（EAI）中的\
  \ `if`/`else` 分支。\n\n解决方案\n\n你可以使用路由器组件，根据某个谓词来改变处理流程。你也可以使用路由器将一条消息多播给多个订阅者（就像你使用拆分器所做的那样）。\n\
  \n工作原理\n\n通过路由器，你可以指定一个已知的通道列表，传入的 `Message` 对象应被传递到这些通道上。这具有一些强大的意义。这意味着你可以有条件地改变流程，也意味着你可以将\
  \ `Message` 对象转发到你想要的任意数量（或多或少的）通道。有一些方便的默认路由器可用于满足常见需求，例如基于负载类型的路由（`PayloadTypeRouter`）以及路由到一组或一个通道列表（`RecipientListRouter`）。\n\
  \n例如，设想一个处理管道，它将信用评分高的客户路由到一个服务，而将信用评分较低的客户路由到另一个流程，在该流程中，信息被排队等待人工审核和验证周期。配置一如既往地非常直接。以下示例展示了配置。其中一个路由器元素\
  \ `CustomerCreditScoreRouter` 将路由逻辑委托给一个类。\n\n```\n@Bean\npublic IntegrationFlow\
  \ fileSplitAndDelete(@Value(\"file:${user.home}/customerstoimport/new/\") File inputDirectory)\
  \ throws Exception {\nreturn IntegrationFlows.from(\nFiles.inboundAdapter(inputDirectory).patternFilter(\"\
  customers-*.txt\"), c -> c.poller(Pollers.fixedRate(1, TimeUnit.SECONDS)))\n.split(splitter())\n\
  .transform(transformer())\n.route(c -> c.getCreditScore() > 770,\nm -> m\n.channelMapping(Boolean.TRUE,\
  \ \"safeCustomerChannel\")\n.channelMapping(Boolean.FALSE, \"riskyCustomerChannel\"\
  ).applySequence(false)\n).get();\n}\n```\n\n你也可以使用一个带有 `@Router` 注解方法的类。它感觉很像工作流引擎的条件元素，甚至像\
  \ JSF 的后台 Bean 方法，因为它将路由逻辑从代码中抽离到 XML 配置中，将决策延迟到运行时。在示例中，返回的 `String` 是 `Message`\
  \ 组件应传递到的通道名称。\n\n```\npackage com.apress.springrecipes.springintegration;\nimport\
  \ org.springframework.integration.annotation.Router;\npublic class CustomerCreditScoreRouter\
  \ {\n@Router\npublic String routeByCustomerCreditScore(Customer customer) {\nif\
  \ (customer.getCreditScore() > 770) {\nreturn \"safeCustomerChannel\";\n} else {\n\
  return \"riskyCustomerChannel\";\n}\n}\n}\n```\n\n如果你决定不希望 `Message<T>` 继续传递并希望停止处理，你可以返回\
  \ `null` 而不是一个 `String`。\n\n15-9. 使用 Spring Batch 进行阶段化事件处理\n\n问题\n\n你有一个包含一百万条记录的文件。这个文件太大，无法作为一个事件来处理；更自然的做法是将每一行作为一个事件来响应。\n\
  \n解决方案\n\nSpring Batch 非常适合这类解决方案。它允许你获取一个输入文件或负载，并可靠且系统化地将其分解为企业服务总线（ESB）可以处理的事件。\n\
  \n工作原理\n\nSpring Integration 确实支持将文件读入总线，而 Spring Batch 也支持为数据提供自定义的、唯一的端点。然而，就像妈妈常说的：“能做不代表应该做。”尽管这里看起来有很多重叠之处，但事实证明它们之间是有区别的（尽管很细微）。虽然两个系统都可以处理文件和消息队列，或者任何你能想到的、可以编写代码与之通信的东西，但\
  \ Spring Integration 在处理大型负载方面表现不佳，因为处理像包含一百万行、可能需要数小时工作量的文件这样的大型事件是很困难的。这对 ESB\
  \ 来说负担太重了。在这一点上，“事件”一词已失去意义。CSV 文件中的一百万条记录不是总线上的一个事件；它是一个包含一百万条记录的文件，而每条记录本身可能又构成事件。这是一个微妙的区别。\n\
  \n一个包含一百万行的文件需要被分解成更小的事件。Spring Batch 可以在这里提供帮助：它允许你系统地读取、应用验证，并可选地跳过和重试无效记录。处理可以在像\
  \ Spring Integration 这样的 ESB 上开始。Spring Batch 和 Spring Integration 可以一起使用，以构建真正可扩展的解耦系统。\n\
  \n阶段化事件驱动架构（SEDA）是一种处理此类处理情况的架构风格。在 SEDA 中，你通过将负载分阶段放入队列来减轻架构组件的负载，并且只推进下游组件能够处理的部分。换句话说，想象一下视频处理。如果你运营一个拥有百万用户上传视频的网站，这些视频需要被转码，而你只有十台服务器，那么如果你的系统试图在收到上传视频后立即处理每个视频，系统就会崩溃。转码可能需要数小时，并且会占用一个\
  \ CPU（或多个 CPU！）。最明智的做法是存储文件，然后根据容量允许，逐个处理。通过这种方式，处理转码的节点上的负载得到了管理。总是只有足够的工作量让机器保持高效运转，但不会超负荷。\n\
  \n同样，没有哪个处理系统（如 ESB）能够一次高效地处理一百万条记录。努力将较大的事件和消息分解成较小的。让我们设想一个假设的解决方案，旨在处理代表每小时销售数据的批处理文件，这些文件用于订单履行。批处理文件被放置在一个\
  \ Spring Integration 正在监控的挂载点上。Spring Integration 一看到新文件就启动处理。Spring Integration\
  \ 将文件信息告知 Spring Batch，并异步启动一个 Spring Batch 作业。\n\n\n\nSpring Batch 读取文件，将记录转换为对象，并将输出写入一个\
  \ JMS 主题，同时使用一个键将原始批次与 JMS 消息关联起来。自然，这需要半天时间才能完成，但确实能完成。Spring Integration 完全不知道它半天前启动的任务现在已经完成，开始一条接一条地从主题中弹出消息。处理这些记录的工作随即开始。涉及多个组件的简单处理可能会在\
  \ ESB 上启动。\n\n如果履行是一个长期运行的过程，涉及许多参与者的长期对话状态，那么每条记录的履行工作或许可以交给 BPM 引擎来处理。BPM 引擎会将不同的参与者和工作列表串联起来，让工作能够持续数天，而不是像\
  \ Spring Integration 更擅长的毫秒级时间框架。在这个例子中，我们讨论了使用 Spring Batch 作为跳板来减轻下游组件的负载。在这种情况下，下游组件又是一个\
  \ Spring Integration 流程，它接收工作并将其设置好，以便导入 BPM 引擎，在那里开始最终处理。Spring Integration 可以使用目录轮询作为触发器来启动一个批处理任务，并提供要处理的文件名。为了从\
  \ Spring Integration 启动任务，Spring Batch 提供了 `JobLaunchingMessageHandler` 类。这个类接收一个\
  \ `JobLaunchRequest` 实例，以确定启动哪个任务以及使用哪些参数。你需要创建一个转换器，将传入的 `Message<File>` 转换为 `JobLaunchRequest`\
  \ 实例。\n\n该转换器可能如下所示：\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobParametersBuilder;\n\
  import org.springframework.batch.integration.launch.JobLaunchRequest;\nimport org.springframework.integration.annotation.Transformer;\n\
  import java.io.File;\npublic class FileToJobLaunchRequestTransformer {\nprivate\
  \ final Job job;\nprivate final String fileParameterName;\npublic FileToJobLaunchRequestTransformer(Job\
  \ job, String fileParameterName) {\nthis.job=job;\nthis.fileParameterName=fileParameterName;\n\
  }\n@Transformer\npublic JobLaunchRequest transform(File file) throws Exception {\n\
  JobParametersBuilder builder = new JobParametersBuilder();\nbuilder.addString(fileParameterName,\
  \ file.getAbsolutePath());\nreturn new JobLaunchRequest(job, builder.toJobParameters());\n\
  }\n}\n```\n\n转换器需要一个 `Job` 对象和一个 `filename` 参数来构造；这个参数在 Spring Batch 任务中用于确定需要加载哪个文件。传入的消息被转换为一个\
  \ `JobLaunchRequest`，并使用文件的完整路径作为参数值。这个请求可用于启动一个批处理任务。\n\n要将所有内容连接起来，你可以使用以下配置（注意，这里省略了\
  \ Spring Batch 的设置；有关设置 Spring Batch 的信息，请参见第 11 章）：\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.launch.JobLauncher;\n\
  import org.springframework.batch.integration.launch.JobLaunchingMessageHandler;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.IntegrationFlows;\n\
  import org.springframework.integration.dsl.Pollers;\nimport org.springframework.integration.file.dsl.Files;\n\
  import java.io.File;\nimport java.util.concurrent.TimeUnit;\npublic class IntegrationConfiguration\
  \ {\n@Bean\npublic FileToJobLaunchRequestTransformer transformer(Job job) {\nreturn\
  \ new FileToJobLaunchRequestTransformer(job, \"filename\");\n}\n@Bean\npublic JobLaunchingMessageHandler\
  \ jobLaunchingMessageHandler(JobLauncher jobLauncher) {\nreturn new JobLaunchingMessageHandler(jobLauncher);\n\
  }\n@Bean\npublic IntegrationFlow fileToBatchFlow(@Value(\"file:${user.home}/customerstoimport/new/\"\
  ) File directory, FileToJobLaunchRequestTransformer transformer, JobLaunchingMessageHandler\
  \ handler) {\nreturn IntegrationFlows\n.from(Files.inboundAdapter(directory).patternFilter(\"\
  customers-*.txt\"), c -> c.poller(Pollers.fixedRate(10, TimeUnit.SECONDS)))\n.transform(transformer)\n\
  .handle(handler)\n.get();\n}\n}\n```\n\n`FileToJobLaunchRequestTransformer` 和 `JobLaunchingMessageHandler`\
  \ 都已配置好。使用一个文件入站通道适配器来轮询文件。当检测到文件时，一条消息会被放置到通道上。配置了一个链来监听该通道。当收到消息时，首先进行转换，然后传递给\
  \ `JobLaunchingMessageHandler`。\n\n现在，一个批处理任务将被启动来处理该文件。一个典型的任务可能会使用 `FlatFileItemReader`\
  \ 来实际读取通过 `filename` 参数传递的文件。可以使用 `JmsItemWriter` 将每条读取的行作为消息写入主题。在 Spring Integration\
  \ 中，可以使用 JMS 入站通道适配器来接收消息并进行处理。\n\n15-10. 使用网关\n\n问题\n\n你希望为服务的客户端暴露一个接口，同时不暴露你的服务是基于消息中间件实现的这一事实。\n\
  \n解决方案\n\n使用网关——这是 Gregor Hohpe 和 Bobby Woolf 的经典著作《企业集成模式》中的一种模式，在 Spring Integration\
  \ 中得到了很好的支持。\n\n工作原理\n\n网关是一种独特的模式，与许多其他模式相似，但最终又有足够的不同之处，值得单独考虑。你在前面的示例中使用了适配器，使两个系统能够通过外部的、松散耦合的中间件组件进行通信。这个外部组件可以是任何东西：文件系统、JMS\
  \ 队列/主题、Twitter 等等。\n\n你也知道什么是外观模式，它通过一个简化的接口来抽象其他组件的功能，以提供更粗粒度的功能。你可能会使用外观模式来构建一个面向度假规划的接口，该接口反过来又抽象了使用租车、酒店预订和机票预订系统的繁琐细节。\n\
  \n另一方面，你构建网关是为了为你的系统提供一个接口，使客户端与系统中的中间件或消息传递解耦，这样它们就不会依赖于 JMS 或 Spring Integration\
  \ API 等。网关允许你对系统的输入和输出表达编译时的约束。\n\n你可能出于几个原因想要这样做。首先，它更简洁。其次，如果你有权限要求客户端遵守某个接口，这是提供该接口的好方法。你对中间件的使用可以是一个实现细节。也许你的架构使用消息中间件是为了利用异步消息传递带来的性能提升，但你并不打算让这些性能提升以牺牲精确、明确、面向外部的接口为代价。\n\
  \n\n\n这一特性——将消息传递隐藏在 POJO 接口背后的能力——非常有趣，并且一直是其他几个项目的关注焦点。Lingo 是 Codehaus.org 的一个项目，目前已不再活跃开发，它曾拥有一个专门针对\
  \ JMS 和 Java EE 连接器架构（JCA）的特性——该特性最初用于讨论 Java 加密架构，但现在更常用于 Java EE 连接器架构。此后，其开发者已转向\
  \ Apache Camel 项目。\n\n在本方案中，你将探索 Spring Integration 对消息网关的核心支持，并了解其对消息交换模式的支持。然后，你将看到如何从面向客户端的接口中完全移除实现细节。\n\
  \nSimpleMessagingGateway\n\n对网关最基础的支持来自 Spring Integration 的 `SimpleMessagingGateway`\
  \ 类。该类提供了指定请求发送通道和预期响应通道的能力。最后，还可以指定回复发送的通道。这使你能够在现有消息系统之上表达“输入-输出”和“仅输入”模式。该类支持基于负载（payload）进行操作，使你与消息发送和接收的繁琐细节隔离开来。这已经是一个抽象层级。可以想象，你可以使用\
  \ `SimpleMessagingGateway` 和 Spring Integration 的通道概念来与文件系统、JMS、电子邮件或任何其他系统交互，并仅处理负载和通道。Spring\
  \ Integration 已经提供了一些实现来支持部分常见端点，例如 Web 服务和 JMS。\n\n让我们看看如何使用一个通用的消息网关。在这个例子中，你将向一个服务激活器发送消息，然后接收响应。你将手动与\
  \ `SimpleMessageGateway` 交互，以便了解它有多么便捷。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.context.ConfigurableApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.messaging.MessageChannel;\npublic class Main {\npublic\
  \ static void main(String[] args) {\nConfigurableApplicationContext ctx = new AnnotationConfigApplicationContext(AdditionConfiguration.class);\n\
  MessageChannel request = ctx.getBean(\"request\", MessageChannel.class);\nMessageChannel\
  \ response = ctx.getBean(\"response\", MessageChannel.class);\nSimpleMessagingGateway\
  \ msgGateway = new SimpleMessagingGateway();\nmsgGateway.setRequestChannel(request);\n\
  msgGateway.setReplyChannel(response);\nmsgGateway.setBeanFactory(ctx);\nmsgGateway.afterPropertiesSet();\n\
  msgGateway.start();\nNumber result = msgGateway.convertSendAndReceive(new Operands(22,\
  \ 4));\nSystem.out.printf(\"Result: %f%n\", result.floatValue());\nctx.close();\n\
  }\n}\n```\n\n这个接口很直接。`SimpleMessagingGateway` 需要一个请求通道和一个响应通道，并协调其余部分。在这个例子中，你只是将请求转发给一个服务激活器，该激活器再将操作数相加并通过回复通道发送出去。配置很简洁，因为大部分工作都在那五行\
  \ Java 代码中完成了。\n\n```\npackage com.apress.springrecipes.springintegration;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.integration.config.EnableIntegration;\nimport org.springframework.integration.dsl.IntegrationFlow;\n\
  import org.springframework.integration.dsl.IntegrationFlows;\n@Configuration\n@EnableIntegration\n\
  public class AdditionConfiguration {\n@Bean\npublic AdditionService additionService()\
  \ {\nreturn new AdditionService();\n}\n@Bean\npublic IntegrationFlow additionFlow()\
  \ {\nreturn IntegrationFlows\n.from(\"request\")\n.handle(additionService(), \"\
  add\")\n.channel(\"response\")\n.get();\n}\n}\n```\n\n打破接口依赖\n\n前面的例子展示了幕后发生的事情。你只与\
  \ Spring Integration 的接口打交道，与端点的细微差别隔离开来。然而，仍然存在许多隐含的约束，客户端可能很容易违反。最简单的解决方案是将消息传递隐藏在接口背后。让我们看看如何构建一个虚构的酒店预订搜索引擎。搜索酒店可能需要很长时间，理想情况下，处理过程应该卸载到单独的服务器上。JMS\
  \ 是一个理想的解决方案，因为你可以实现积极的消费者模式，并通过添加更多消费者来轻松扩展。在这个例子中，客户端仍然会阻塞等待结果，但服务器（或多个服务器）不会过载或处于阻塞状态。\n\
  \n你将构建两个 Spring Integration 解决方案：一个用于客户端（其中包含网关），另一个用于服务本身，该服务可能位于独立的主机上，仅通过已知的消息队列与客户端连接。\n\
  \n让我们先看看客户端配置。客户端配置首先声明一个 `ConnectionFactory`。然后声明一个流程，该流程从 `VacationService` 接口的网关开始。`gateway`\
  \ 元素仅用于标识组件和接口，代理将转换为该接口并提供给客户端使用。`jms-outbound-gateway` 是完成大部分工作的组件。它接收你创建的消息，并将其发送到请求的\
  \ JMS 目标，同时设置回复头等。最后，你声明一个通用的 `gateway` 元素，它完成了大部分魔法般的工作。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import com.apress.springrecipes.springintegration.myholiday.VacationService;\nimport\
  \ org.apache.activemq.ActiveMQConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.IntegrationFlows;\n\
  import org.springframework.integration.jms.dsl.Jms;\nimport org.springframework.jms.connection.CachingConnectionFactory;\n\
  import java.util.Arrays;\n@Configuration\n@EnableIntegration\npublic class ClientIntegrationContext\
  \ {\n@Bean\npublic CachingConnectionFactory connectionFactory() {\nActiveMQConnectionFactory\
  \ connectionFactory = new ActiveMQConnectionFactory(\"tcp://localhost:61616\");\n\
  connectionFactory.setTrustAllPackages(true);\nreturn new CachingConnectionFactory(connectionFactory);\n\
  }\n@Bean\npublic IntegrationFlow vacationGatewayFlow() {\nreturn IntegrationFlows\n\
  .from(VacationService.class)\n.handle(\nJms.outboundGateway(connectionFactory())\n\
  .requestDestination(\"inboundHotelReservationSearchDestination\")\n.replyDestination(\"\
  outboundHotelReservationSearchResultsDestination\"))\n.get();\n}\n}\n```\n\n为了能够将\
  \ `VacationService` 用作网关，它需要使用 `@MessagingGateway` 注解进行标注，并且作为入口点的方法需要使用 `@Gateway`\
  \ 进行标注。\n\n```\npackage com.apress.springrecipes.springintegration.myholiday;\n\
  import org.springframework.integration.annotation.Gateway;\nimport org.springframework.integration.annotation.MessagingGateway;\n\
  import java.util.List;\n@MessagingGateway\npublic interface VacationService {\n\
  @Gateway\nList findHotels(HotelReservationSearch hotelReservationSearch);\n}\n```\n\
  \n这是面向客户端的接口。通过网关组件暴露的客户端接口与最终处理消息的服务接口之间没有耦合。你使用服务和客户端的接口来简化理解整个过程所需的名称。这与传统的同步远程调用不同，在传统方式中，服务接口和客户端接口是匹配的。\n\
  \n\n\n在这个示例中，你使用了两个非常简单的对象进行演示：`HotelReservationSearch` 和 `HotelReservation`。这些对象本身毫无特别之处；它们只是实现了\
  \ `Serializable` 的简单 POJO，并包含一些访问器/修改器来充实示例领域。\n\n以下客户端 Java 代码演示了这一切是如何整合的：\n\n\
  ```\npackage com.apress.springrecipes.springintegration;\nimport com.apress.springrecipes.springintegration.myholiday.HotelReservation;\n\
  import com.apress.springrecipes.springintegration.myholiday.HotelReservationSearch;\n\
  import com.apress.springrecipes.springintegration.myholiday.VacationService;\nimport\
  \ org.springframework.context.ConfigurableApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import java.time.LocalDate;\nimport java.time.ZoneId;\nimport java.util.Date;\n\
  import java.util.List;\npublic class Main {\npublic static void main(String[] args)\
  \ throws Throwable {\n// 启动服务器\nConfigurableApplicationContext serverCtx = new AnnotationConfigApplicationContext(ServerIntegrationContext.class);\n\
  // 启动客户端并发出搜索请求\nConfigurableApplicationContext clientCtx = new AnnotationConfigApplicationContext(ClientIntegrationContext.class);\n\
  VacationService vacationService = clientCtx.getBean(VacationService.class);\nLocalDate\
  \ now = LocalDate.now();\nDate start = Date.from(now.plusDays(1).atStartOfDay(ZoneId.systemDefault()).toInstant());\n\
  Date stop = Date.from(now.plusDays(8).atStartOfDay(ZoneId.systemDefault()).toInstant());\n\
  HotelReservationSearch hotelReservationSearch = new HotelReservationSearch(200f,\
  \ 2, start, stop);\nList results = vacationService.findHotels(hotelReservationSearch);\n\
  System.out.printf(\"找到 %s 个结果。%n\", results.size());\nresults.forEach(r -> System.out.printf(\"\
  \\t%s%n\", r));\nserverCtx.close();\nclientCtx.close();\n}\n}\n```\n\n没有比这更简洁的了！完全没有使用任何\
  \ Spring Integration 接口。你发出请求，执行搜索，处理完成后就能得到结果。这种设置下的服务实现很有趣，不是因为添加了什么，而是因为缺少了什么。\n\
  \n```\npackage com.apress.springrecipes.springintegration;\nimport com.apress.springrecipes.springintegration.myholiday.VacationServiceImpl;\n\
  import org.apache.activemq.ActiveMQConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.IntegrationFlows;\n\
  import org.springframework.integration.jms.dsl.Jms;\nimport org.springframework.jms.connection.CachingConnectionFactory;\n\
  import java.util.Arrays;\n@Configuration\n@EnableIntegration\npublic class ServerIntegrationContext\
  \ {\n@Bean\npublic CachingConnectionFactory connectionFactory() {\nActiveMQConnectionFactory\
  \ connectionFactory = new ActiveMQConnectionFactory(\"tcp://localhost:61616\");\n\
  connectionFactory.setTrustAllPackages(true);\nreturn new CachingConnectionFactory(connectionFactory);\n\
  }\n@Bean\npublic VacationServiceImpl vacationService() {\nreturn new VacationServiceImpl();\n\
  }\n@Bean\npublic IntegrationFlow serverIntegrationFlow() {\nreturn IntegrationFlows.from(\n\
  Jms.inboundGateway(connectionFactory()).destination(\"inboundHotelReservationSearchDestination\"\
  ))\n.handle(vacationService())\n.get();\n}\n}\n```\n\n这里，你定义了一个入站 JMS 网关。来自入站 JMS\
  \ 网关的消息被放入一个通道，正如你所料，该通道的消息会被转发给一个服务激活器。服务激活器负责实际处理。有趣的是，这里既没有为服务激活器指定响应通道，也没有为入站\
  \ JMS 网关指定。服务激活器查找回复通道但未找到，因此使用了由入站 JMS 网关组件创建的回复通道，而该网关组件又是根据入站 JMS 消息中的标头元数据创建了回复通道。因此，一切无需显式指定即可正常工作。\n\
  \n该实现是该接口的一个简单且无实际用途的实现。\n\n```\npackage com.apress.springrecipes.springintegration.myholiday;\n\
  import org.springframework.integration.annotation.ServiceActivator;\nimport javax.annotation.PostConstruct;\n\
  import java.util.Arrays;\nimport java.util.List;\npublic class VacationServiceImpl\
  \ implements VacationService {\nprivate List hotelReservations;\n@PostConstruct\n\
  public void afterPropertiesSet() throws Exception {\nhotelReservations = Arrays.asList(\n\
  new HotelReservation(\"Bilton\", 243.200F),\nnew HotelReservation(\"East Western\"\
  , 75.0F),\nnew HotelReservation(\"Thairfield Inn\", 70F),\nnew HotelReservation(\"\
  Park In The Inn\", 200.00F));\n}\n@ServiceActivator\npublic List findHotels(HotelReservationSearch\
  \ searchMsg) {\ntry {\nThread.sleep(1000);\n} catch (Throwable th) {\n}\nreturn\
  \ this.hotelReservations;\n}\n}\n```\n\n总结\n\n本章讨论了使用 Spring Integration（一个构建在 Spring\
  \ 框架之上的类 ESB 框架）构建集成解决方案。你了解了企业应用集成的核心概念。你学习了如何处理一些集成场景，包括 JMS 和文件轮询。\n\n在下一章中，你将探索\
  \ Spring 在测试领域的能力。\n\n16. Spring 测试\n\n在本章中，你将学习用于测试 Java 应用程序的基本技术，以及 Spring 框架提供的测试支持特性。这些特性可以使你的测试任务更轻松，并引导你设计出更好的应用程序。通常，使用\
  \ Spring 框架和依赖注入模式开发的应用程序易于测试。\n\n测试是确保软件开发质量的关键活动。测试有多种类型，包括单元测试、集成测试、功能测试、系统测试、性能测试和验收测试。Spring\
  \ 的测试支持侧重于单元测试和集成测试，但也能帮助进行其他类型的测试。测试可以手动执行，也可以自动执行。然而，由于自动化测试可以在开发过程的不同阶段重复且持续地运行，因此强烈推荐使用，尤其是在敏捷开发过程中。Spring\
  \ 框架是一个适合此类过程的敏捷框架。\n\nJava 平台上有许多可用的测试框架。目前，JUnit 和 TestNG 是最流行的。JUnit 在 Java 社区中历史悠久，用户群体庞大。TestNG\
  \ 是另一个流行的 Java 测试框架。与 JUnit 相比，TestNG 提供了额外的强大功能，例如测试分组、依赖测试方法和数据驱动测试。\n\nSpring\
  \ 的测试支持特性由 Spring TestContext 框架提供，该框架通过以下概念抽象了底层测试框架：\n\n*   测试上下文：它封装了测试执行时的上下文，包括应用程序上下文、测试类、当前测试实例、当前测试方法和当前测试异常。\n\
  \n\n\n*   **测试上下文管理器**：它为测试管理测试上下文，并在预定义的测试执行点触发测试执行监听器，这些点包括：准备测试实例时、执行测试方法之前（在任何框架特定的初始化方法之前），以及执行测试方法之后（在任何框架特定的清理方法之后）。\n\
  \n*   **测试执行监听器**：它定义了一个监听器接口；通过实现该接口，你可以监听测试执行事件。TestContext 框架为常见的测试功能提供了多个测试执行监听器，但你也可以自由创建自己的监听器。\n\
  \nSpring 为 JUnit 和 TestNG 提供了便捷的 TestContext 支持类，并预先注册了特定的测试执行监听器。你只需扩展这些支持类即可使用\
  \ TestContext 框架，而无需深入了解框架的细节。\n\n完成本章后，你将理解测试的基本概念和技术，以及流行的 Java 测试框架 JUnit 和 TestNG。你还将能够使用\
  \ Spring TestContext 框架创建单元测试和集成测试。\n\n16-1\\. 使用 JUnit 和 TestNG 创建测试\n\n问题\n\n\
  你想为你的 Java 应用程序创建自动化测试，以便可以重复运行它们来确保应用程序的正确性。\n\n解决方案\n\nJava 平台上最流行的测试框架是 JUnit\
  \ 和 TestNG。JUnit 和 TestNG 都允许你使用 `@Test` 注解来标记测试方法，这样任何公共方法都可以作为测试用例运行。\n\n工作原理\n\
  \n假设你要为一家银行开发一个系统。为了确保系统的质量，你必须测试它的每个部分。首先，让我们考虑一个利息计算器，其接口定义如下：\n\n```\npackage\
  \ com.apress.springrecipes.bank;\npublic interface InterestCalculator {\nvoid setRate(double\
  \ rate);\ndouble calculate(double amount, double year);\n}\n```\n\n每个利息计算器都需要设置一个固定的利率。现在，你可以使用简单的利息公式来实现这个计算器，如下所示：\n\
  \n```\npackage com.apress.springrecipes.bank;\npublic class SimpleInterestCalculator\
  \ implements InterestCalculator {\nprivate double rate;\npublic void setRate(double\
  \ rate) {\nthis.rate = rate;\n}\npublic double calculate(double amount, double year)\
  \ {\nif (amount < 0 || year < 0) {\nthrow new IllegalArgumentException(\"金额或年份必须为正数\"\
  );\n}\nreturn amount * year * rate;\n}\n}\n```\n\n接下来，你将使用流行的测试框架 JUnit 和 TestNG（版本\
  \ 5）来测试这个简单的利息计算器。\n\n提示\n\n通常，测试及其目标类位于同一个包中，但测试的源文件存储在与其它类源文件（例如 `src`）不同的独立目录（例如\
  \ `test`）中。\n\n使用 JUnit 进行测试\n\n一个测试用例就是一个带有 `@Test` 注解的公共方法。要设置数据，你可以使用 `@Before`\
  \ 注解一个方法。要清理资源，你可以使用 `@After` 注解一个方法。你还可以使用 `@BeforeClass` 或 `@AfterClass` 注解一个\
  \ `public static` 方法，使其在类中所有测试用例之前或之后运行一次。\n\n你需要直接调用 `org.junit.Assert` 类中声明的静态断言方法。但是，你可以通过静态\
  \ `import` 语句导入所有断言方法。你可以创建以下 JUnit 测试用例来测试你的简单利息计算器。\n\n注意\n\n要编译和运行为 JUnit 创建的测试用例，你必须将\
  \ JUnit 包含在你的 `CLASSPATH` 中。如果你使用 Maven，请将以下依赖项添加到你的项目中：\n\n```\njunit\njunit\n\
  4.12\n\n```\n\n对于 Gradle，请添加以下内容：\n\n```\ntestCompile 'junit:junit:4.12'\n```\n\n\
  ```\npackage com.apress.springrecipes.bank;\nimport static org.junit.Assert.*;\n\
  import org.junit.Before;\nimport org.junit.Test;\npublic class SimpleInterestCalculatorJUnit4Tests\
  \ {\nprivate InterestCalculator interestCalculator;\n@Before\npublic void init()\
  \ {\ninterestCalculator = new SimpleInterestCalculator();\ninterestCalculator.setRate(0.05);\n\
  }\n@Test\npublic void calculate() {\ndouble interest = interestCalculator.calculate(10000,\
  \ 2);\nassertEquals(interest, 1000.0, 0);\n}\n@Test(expected = IllegalArgumentException.class)\n\
  public void illegalCalculate() {\ninterestCalculator.calculate(-10000, 2);\n}\n\
  }\n```\n\nJUnit 提供了一个强大的功能，允许你期望在测试用例中抛出异常。你只需在 `@Test` 注解的 `expected` 属性中指定异常类型即可。\n\
  \n使用 TestNG 进行测试\n\nTestNG 测试看起来与 JUnit 测试类似，不同之处在于你必须使用 TestNG 框架定义的类和注解类型。\n\n\
  注意\n\n要编译和运行为 TestNG 创建的测试用例，你必须将 TestNG 添加到你的 `CLASSPATH` 中。如果你使用 Maven，请将以下依赖项添加到你的项目中：\n\
  \n```\norg.testng\ntestng\n6.11\n\n```\n\n对于 Gradle，请添加以下内容：\n\n```\ntestCompile\
  \ 'org.testng:testng:6.11'\n```\n\n```\npackage com.apress.springrecipes.bank;\n\
  import static org.testng.Assert.*;\nimport org.testng.annotations.BeforeMethod;\n\
  import org.testng.annotations.Test;\npublic class SimpleInterestCalculatorTestNGTests\
  \ {\nprivate InterestCalculator interestCalculator;\n@BeforeMethod\npublic void\
  \ init() {\ninterestCalculator = new SimpleInterestCalculator();\ninterestCalculator.setRate(0.05);\n\
  }\n@Test\npublic void calculate() {\ndouble interest = interestCalculator.calculate(10000,\
  \ 2);\nassertEquals(interest, 1000.0);\n}\n@Test(expectedExceptions = IllegalArgumentException.class)\n\
  public void illegalCalculate() {\ninterestCalculator.calculate(-10000, 2);\n}\n\
  }\n```\n\n提示\n\n如果你使用 Eclipse 进行开发，可以从 [`http://testng.org/doc/eclipse.html`](http://testng.org/doc/eclipse.html)\
  \ 下载并安装 TestNG Eclipse 插件，以便在 Eclipse 中运行 TestNG 测试。同样，如果所有测试通过，你将看到绿色条，否则将看到红色条。\n\
  \nTestNG 的强大功能之一是其内置的对数据驱动测试的支持。TestNG 将测试数据与测试逻辑清晰地分离，这样你就可以针对不同的数据集多次运行同一个测试方法。在\
  \ TestNG 中，测试数据集由数据提供者提供，数据提供者是带有 `@DataProvider` 注解的方法。\n\n```\npackage com.apress.springrecipes.bank;\n\
  import org.testng.annotations.BeforeMethod;\nimport org.testng.annotations.DataProvider;\n\
  import org.testng.annotations.Test;\nimport static org.testng.Assert.assertEquals;\n\
  public class SimpleInterestCalculatorTestNGTests {\nprivate InterestCalculator interestCalculator;\n\
  @BeforeMethod\npublic void init() {\ninterestCalculator = new SimpleInterestCalculator();\n\
  interestCalculator.setRate(0.05);\n}\n@DataProvider(name = \"legal\")\npublic Object[][]\
  \ createLegalInterestParameters() {\nreturn new Object[][]{new Object[]{10000, 2,\
  \ 1000.0}};\n}\n@DataProvider(name = \"illegal\")\npublic Object[][] createIllegalInterestParameters()\
  \ {\nreturn new Object[][]{\nnew Object[]{-10000, 2},\nnew Object[]{10000, -2},\n\
  new Object[]{-10000, -2}\n};\n}\n@Test(dataProvider = \"legal\")\npublic void calculate(double\
  \ amount, double year, double result) {\ndouble interest = interestCalculator.calculate(amount,\
  \ year);\nassertEquals(interest, result);\n}\n@Test(\ndataProvider = \"illegal\"\
  ,\nexpectedExceptions = IllegalArgumentException.class)\npublic void illegalCalculate(double\
  \ amount, double year) {\ninterestCalculator.calculate(amount, year);\n}\n}\n```\n\
  \n如果你使用 TestNG 运行上述测试，`calculate()` 方法将执行一次，而 `illegalCalculate()` 方法将执行三次，因为非法数据提供者返回了三个数据集。\n\
  \n16-2\\. 创建单元测试和集成测试\n\n问题\n\n\n\n一种常见的测试技术是先单独测试应用程序的每个模块，然后再将它们组合起来测试。你需要将这项技能应用于\
  \ Java 应用程序的测试中。\n\n解决方案\n\n单元测试用于测试单个编程单元。在面向对象语言中，一个单元通常是一个类或一个方法。单元测试的范围是单个单元，但在现实世界中，大多数单元无法独立工作。它们通常需要与其他单元协作才能完成任务。当测试一个依赖于其他单元的单元时，你可以采用的一种常见技术是使用桩（stub）和模拟对象（mock\
  \ object）来模拟这些依赖关系，这两种方法都能降低由依赖关系引起的单元测试复杂性。\n\n桩（stub）是一个模拟依赖对象的对象，它只包含测试所需的最少方法。这些方法以预定的方式实现，通常使用硬编码数据。桩还暴露一些方法，供测试验证其内部状态。与桩不同，模拟对象（mock\
  \ object）通常知道在测试中其方法应如何被调用。然后，模拟对象会验证实际调用的方法是否与预期一致。在 Java 中，有多个库可以帮助创建模拟对象，例如 Mockito、EasyMock\
  \ 和 jMock。桩和模拟对象的主要区别在于：桩通常用于状态验证，而模拟对象用于行为验证。\n\n相比之下，集成测试用于将多个单元作为一个整体进行组合测试。它们测试单元之间的集成和交互是否正确。每个单元都应已通过单元测试，因此集成测试通常在单元测试之后进行。\n\
  \n最后，请注意，使用接口与实现分离原则以及依赖注入模式开发的应用程序，无论是进行单元测试还是集成测试，都易于测试。这是因为这些原则和模式可以降低应用程序不同单元之间的耦合度。\n\
  \n工作原理\n\n首先，你将学习如何为单个类编写单元测试，然后将其扩展到测试带有模拟和/或桩协作对象的类。最后，你将了解如何编写集成测试。\n\n为独立类创建单元测试\n\
  \n银行系统的核心功能应围绕客户账户进行设计。首先，创建以下领域类 `Account`，并包含自定义的 `equals()` 和 `hashCode()` 方法：\n\
  \n```\npackage com.apress.springrecipes.bank;\npublic class Account {\nprivate String\
  \ accountNo;\nprivate double balance;\n// 构造方法、Getter 和 Setter\n...\n@Override\n\
  public boolean equals(Object o) {\nif (this == o) return true;\nif (o == null ||\
  \ getClass() != o.getClass()) return false;\nAccount account = (Account) o;\nreturn\
  \ Objects.equals(this.accountNo, account.accountNo);\n}\n@Override\npublic int hashCode()\
  \ {\nreturn Objects.hash(this.accountNo);\n}\n}\n```\n\n接下来，定义以下 DAO 接口，用于在银行系统的持久化层中持久化账户对象：\n\
  \n```\npackage com.apress.springrecipes.bank;\npublic interface AccountDao {\npublic\
  \ void createAccount(Account account);\npublic void updateAccount(Account account);\n\
  public void removeAccount(Account account);\npublic Account findAccount(String accountNo);\n\
  }\n```\n\n为了演示单元测试的概念，我们通过使用一个 Map 来存储账户对象，实现这个接口。`AccountNotFoundException` 和 `DuplicateAccountException`\
  \ 类是 `RuntimeException` 的子类，你应该能够自己创建它们。\n\n```\npackage com.apress.springrecipes.bank;\n\
  import java.util.Collections;\nimport java.util.HashMap;\nimport java.util.Map;\n\
  public class InMemoryAccountDao implements AccountDao {\nprivate Map accounts;\n\
  public InMemoryAccountDao() {\naccounts = Collections.synchronizedMap(new HashMap());\n\
  }\npublic boolean accountExists(String accountNo) {\nreturn accounts.containsKey(accountNo);\n\
  }\npublic void createAccount(Account account) {\nif (accountExists(account.getAccountNo()))\
  \ {\nthrow new DuplicateAccountException();\n}\naccounts.put(account.getAccountNo(),\
  \ account);\n}\npublic void updateAccount(Account account) {\nif (!accountExists(account.getAccountNo()))\
  \ {\nthrow new AccountNotFoundException();\n}\naccounts.put(account.getAccountNo(),\
  \ account);\n}\npublic void removeAccount(Account account) {\nif (!accountExists(account.getAccountNo()))\
  \ {\nthrow new AccountNotFoundException();\n}\naccounts.remove(account.getAccountNo());\n\
  }\npublic Account findAccount(String accountNo) {\nAccount account = accounts.get(accountNo);\n\
  if (account == null) {\nthrow new AccountNotFoundException();\n}\nreturn account;\n\
  }\n}\n```\n\n显然，这个简单的 DAO 实现不支持事务。但是，为了使其线程安全，你可以将存储账户的 Map 包装成一个同步 Map，这样它就会被串行访问。\n\
  \n现在，让我们使用 JUnit 为这个 DAO 实现创建单元测试。由于这个类不直接依赖于其他类，因此测试起来很容易。为了确保这个类在异常情况和正常情况都能正常工作，你还应该为其创建异常测试用例。通常，异常测试用例期望抛出异常。\n\
  \n```\npackage com.apress.springrecipes.bank;\nimport static org.junit.Assert.*;\n\
  import org.junit.Before;\nimport org.junit.Test;\npublic class InMemoryAccountDaoTests\
  \ {\nprivate static final String EXISTING_ACCOUNT_NO = \"1234\";\nprivate static\
  \ final String NEW_ACCOUNT_NO = \"5678\";\nprivate Account existingAccount;\nprivate\
  \ Account newAccount;\nprivate InMemoryAccountDao accountDao;\n@Before\npublic void\
  \ init() {\nexistingAccount = new Account(EXISTING_ACCOUNT_NO, 100);\nnewAccount\
  \ = new Account(NEW_ACCOUNT_NO, 200);\naccountDao = new InMemoryAccountDao();\n\
  accountDao.createAccount(existingAccount);\n}\n@Test\npublic void accountExists()\
  \ {\nassertTrue(accountDao.accountExists(EXISTING_ACCOUNT_NO));\nassertFalse(accountDao.accountExists(NEW_ACCOUNT_NO));\n\
  }\n@Test\npublic void createNewAccount() {\naccountDao.createAccount(newAccount);\n\
  assertEquals(accountDao.findAccount(NEW_ACCOUNT_NO), newAccount);\n}\n@Test(expected\
  \ = DuplicateAccountException.class)\npublic void createDuplicateAccount() {\naccountDao.createAccount(existingAccount);\n\
  }\n@Test\npublic void updateExistedAccount() {\nexistingAccount.setBalance(150);\n\
  accountDao.updateAccount(existingAccount);\nassertEquals(accountDao.findAccount(EXISTING_ACCOUNT_NO),\
  \ existingAccount);\n}\n@Test(expected = AccountNotFoundException.class)\npublic\
  \ void updateNotExistedAccount() {\naccountDao.updateAccount(newAccount);\n}\n@Test\n\
  public void removeExistedAccount() {\naccountDao.removeAccount(existingAccount);\n\
  assertFalse(accountDao.accountExists(EXISTING_ACCOUNT_NO));\n}\n@Test(expected =\
  \ AccountNotFoundException.class)\npublic void removeNotExistedAccount() {\naccountDao.removeAccount(newAccount);\n\
  }\n@Test\npublic void findExistedAccount() {\nAccount account = accountDao.findAccount(EXISTING_ACCOUNT_NO);\n\
  assertEquals(account, existingAccount);\n}\n@Test(expected = AccountNotFoundException.class)\n\
  public void findNotExistedAccount() {\naccountDao.findAccount(NEW_ACCOUNT_NO);\n\
  }\n}\n```\n\n使用桩和模拟对象为依赖类创建单元测试\n\n测试一个独立的类很容易，因为你无需考虑其依赖关系如何工作以及如何正确设置它们。然而，测试一个依赖于其他类或服务（例如数据库服务和网络服务）结果的类会稍微困难一些。例如，让我们考虑服务层中的以下\
  \ `AccountService` 接口：\n\n\n```content\n```\npackage com.apress.springrecipes.bank;\n\
  public interface AccountService {\nvoid createAccount(String accountNo);\nvoid removeAccount(String\
  \ accountNo);\nvoid deposit(String accountNo, double amount);\nvoid withdraw(String\
  \ accountNo, double amount);\ndouble getBalance(String accountNo);\n}\n```\n\n该服务接口的实现必须依赖于持久层中的\
  \ `AccountDao` 对象来持久化账户对象。`InsufficientBalanceException` 类也是 `RuntimeException`\
  \ 的一个子类，你需要自行创建。\n\n```\npackage com.apress.springrecipes.bank;\npublic class AccountServiceImpl\
  \ implements AccountService {\nprivate AccountDao accountDao;\npublic AccountServiceImpl(AccountDao\
  \ accountDao) {\nthis.accountDao = accountDao;\n}\npublic void createAccount(String\
  \ accountNo) {\naccountDao.createAccount(new Account(accountNo, 0));\n}\npublic\
  \ void removeAccount(String accountNo) {\nAccount account = accountDao.findAccount(accountNo);\n\
  accountDao.removeAccount(account);\n}\npublic void deposit(String accountNo, double\
  \ amount) {\nAccount account = accountDao.findAccount(accountNo);\naccount.setBalance(account.getBalance()\
  \ + amount);\naccountDao.updateAccount(account);\n}\npublic void withdraw(String\
  \ accountNo, double amount) {\nAccount account = accountDao.findAccount(accountNo);\n\
  if (account.getBalance() < amount) {\nthrow new InsufficientBalanceException();\n\
  }\naccount.setBalance(account.getBalance() - amount);\naccountDao.updateAccount(account);\n\
  }\npublic double getBalance(String accountNo) {\nreturn accountDao.findAccount(accountNo).getBalance();\n\
  }\n}\n```\n\n在单元测试中，一种降低依赖关系复杂性的常用技术是使用桩（stub）。桩必须实现与目标对象相同的接口，以便能够替代目标对象。例如，你可以为\
  \ `AccountDao` 创建一个桩，该桩存储单个客户账户，并且只实现 `findAccount()` 和 `updateAccount()` 方法，因为\
  \ `deposit()` 和 `withdraw()` 方法需要用到它们。\n\n```\npackage com.apress.springrecipes.bank;\n\
  import static org.junit.Assert.*;\nimport org.junit.Before;\nimport org.junit.Test;\n\
  public class AccountServiceImplStubTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate AccountDaoStub accountDaoStub;\nprivate AccountService accountService;\n\
  private class AccountDaoStub implements AccountDao {\nprivate String accountNo;\n\
  private double balance;\npublic void createAccount(Account account) {}\npublic void\
  \ removeAccount(Account account) {}\npublic Account findAccount(String accountNo)\
  \ {\nreturn new Account(this.accountNo, this.balance);\n}\npublic void updateAccount(Account\
  \ account) {\nthis.accountNo = account.getAccountNo();\nthis.balance = account.getBalance();\n\
  }\n}\n@Before\npublic void init() {\naccountDaoStub = new AccountDaoStub();\naccountDaoStub.accountNo\
  \ = TEST_ACCOUNT_NO;\naccountDaoStub.balance = 100;\naccountService = new AccountServiceImpl(accountDaoStub);\n\
  }\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO, 50);\n\
  assertEquals(accountDaoStub.accountNo, TEST_ACCOUNT_NO);\nassertEquals(accountDaoStub.balance,\
  \ 150, 0);\n}\n@Test\npublic void withdrawWithSufficientBalance() {\naccountService.withdraw(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(accountDaoStub.accountNo, TEST_ACCOUNT_NO);\nassertEquals(accountDaoStub.balance,\
  \ 50, 0);\n}\n@Test(expected = InsufficientBalanceException.class)\npublic void\
  \ withdrawWithInsufficientBalance() {\naccountService.withdraw(TEST_ACCOUNT_NO,\
  \ 150);\n}\n}\n```\n\n然而，自己编写桩需要大量的编码工作。一种更高效的技术是使用模拟对象。Mockito 库能够动态创建模拟对象，这些对象以记录/回放机制工作。\n\
  \n注意\n\n要使用 Mockito 进行测试，你必须将其添加到你的 `CLASSPATH` 中。如果你使用 Maven，请将以下依赖项添加到你的项目中：\n\
  \n```\norg.mockito\nmockito-core\n2.7.20\ntest\n\n```\n\n或者，如果使用 Gradle，请添加以下内容：\n\
  \n```\ntestCompile 'org.mockito:mockito-core:2.7.20'\n```\n\n```\npackage com.apress.springrecipes.bank;\n\
  import org.junit.Before;\nimport org.junit.Test;\nimport static org.mockito.Mockito.*;\n\
  public class AccountServiceImplMockTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate AccountDao accountDao;\nprivate AccountService accountService;\n\
  @Before\npublic void init() {\naccountDao = mock(AccountDao.class);\naccountService\
  \ = new AccountServiceImpl(accountDao);\n}\n@Test\npublic void deposit() {\n// 设置\n\
  Account account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  // 执行\naccountService.deposit(TEST_ACCOUNT_NO, 50);\n// 验证\nverify(accountDao, times(1)).findAccount(any(String.class));\n\
  verify(accountDao, times(1)).updateAccount(account);\n}\n@Test\npublic void withdrawWithSufficientBalance()\
  \ {\n// 设置\nAccount account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  // 执行\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\n// 验证\nverify(accountDao,\
  \ times(1)).findAccount(any(String.class));\nverify(accountDao, times(1)).updateAccount(account);\n\
  }\n@Test(expected = InsufficientBalanceException.class)\npublic void testWithdrawWithInsufficientBalance()\
  \ {\n// 设置\nAccount account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  // 执行\naccountService.withdraw(TEST_ACCOUNT_NO, 150);\n}\n}\n```\n\n使用 Mockito，你可以为任意接口或类动态创建模拟对象。可以指示这个模拟对象对方法调用具有特定的行为，并且你可以使用它来选择性地验证某些事情是否已经发生。在你的测试中，你希望\
  \ `findAccount` 方法返回某个特定的 `Account` 对象。为此，你可以使用 `Mockito.when` 方法，然后你可以返回一个值、抛出一个异常，或者使用\
  \ `Answer` 执行更复杂的操作。模拟对象的默认行为是返回 `null`。你可以使用 `Mockito.verify` 方法对应该发生的操作进行选择性验证。你需要确保\
  \ `findAccount` 方法被调用，并且账户被更新。\n\n创建集成测试\n\n集成测试用于组合测试多个单元，以确保这些单元正确集成并能够正确交互。例如，你可以创建一个集成测试，使用\
  \ `InMemoryAccountDao` 作为 DAO 实现来测试 `AccountServiceImpl`。\n\n```\npackage com.apress.springrecipes.bank;\n\
  import static org.junit.Assert.*;\nimport org.junit.After;\nimport org.junit.Before;\n\
  import org.junit.Test;\npublic class AccountServiceTests {\nprivate static final\
  \ String TEST_ACCOUNT_NO = \"1234\";\nprivate AccountService accountService;\n@Before\n\
  public void init() {\naccountService = new AccountServiceImpl(new InMemoryAccountDao());\n\
  accountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO), 150, 0);\n}\n@Test\n\
  public void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO),\
  \ 50, 0);\n}\n@After\npublic void cleanup() {\naccountService.removeAccount(TEST_ACCOUNT_NO);\n\
  }\n}\n```\n\n16-3. 为 Spring MVC 控制器实现单元测试\n\n问题\n\n在 Web 应用程序中，你想要测试使用 Spring MVC\
  \ 框架开发的 Web 控制器。\n\n解决方案\n```\n\n\n一个 Spring MVC 控制器\n由 `DispatcherServlet` 通过 HTTP\
  \ 请求对象和 HTTP 响应对象调用。处理完请求后，控制器将其返回给 `DispatcherServlet` 以渲染视图。对 Spring MVC 控制器以及其他\
  \ Web 应用框架中的 Web 控制器进行单元测试的主要挑战，在于如何在单元测试环境中模拟 HTTP 请求对象和响应对象。幸运的是，Spring 通过为 Servlet\
  \ API 提供一组模拟对象（包括 `MockHttpServletRequest`、`MockHttpServletResponse` 和 `MockHttpSession`）来支持\
  \ Web 控制器测试。\n\n要测试 Spring MVC 控制器的输出，你需要检查返回给 `DispatcherServlet` 的对象是否正确。Spring\
  \ 还提供了一组断言工具，用于检查对象的内容。\n\n工作原理\n\n在你的银行系统中，假设你要为银行职员开发一个 Web 界面，用于输入存款的账号和金额。你可以使用\
  \ Spring MVC 中已有的技术创建一个名为 `DepositController` 的控制器。\n\n```\npackage com.apress.springrecipes.bank.web;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.ModelMap;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RequestParam;\n@Controller\npublic\
  \ class DepositController {\nprivate AccountService accountService;\n@Autowired\n\
  public DepositController(AccountService accountService) {\nthis.accountService =\
  \ accountService;\n}\n@RequestMapping(\"/deposit.do\")\npublic String deposit(\n\
  @RequestParam(\"accountNo\") String accountNo,\n@RequestParam(\"amount\") double\
  \ amount,\nModelMap model) {\naccountService.deposit(accountNo, amount);\nmodel.addAttribute(\"\
  accountNo\", accountNo);\nmodel.addAttribute(\"balance\", accountService.getBalance(accountNo));\n\
  return \"success\";\n}\n}\n```\n\n由于这个控制器不处理 Servlet API，因此测试起来很容易。你可以像测试一个简单的 Java\
  \ 类一样测试它。\n\n```\npackage com.apress.springrecipes.bank.web;\nimport static org.junit.Assert.*;\n\
  import com.apress.springrecipes.bank.AccountService;\nimport org.junit.Before;\n\
  import org.junit.Test;\nimport org.mockito.Mockito;\nimport org.springframework.ui.ModelMap;\n\
  public class DepositControllerTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate static final double TEST_AMOUNT = 50;\nprivate AccountService\
  \ accountService;\nprivate DepositController depositController;\n@Before\npublic\
  \ void init() {\naccountService = Mockito.mock(AccountService.class);\ndepositController\
  \ = new DepositController(accountService);\n}\n@Test\npublic void deposit() {\n\
  //设置\nMockito.when(accountService.getBalance(TEST_ACCOUNT_NO)).thenReturn(150.0);\n\
  ModelMap model = new ModelMap();\n//执行\nString viewName =\ndepositController.deposit(TEST_ACCOUNT_NO,\
  \ TEST_AMOUNT, model);\nassertEquals(viewName, \"success\");\nassertEquals(model.get(\"\
  accountNo\"), TEST_ACCOUNT_NO);\nassertEquals(model.get(\"balance\"), 150.0);\n\
  }\n}\n```\n\n16-4. 在集成测试中管理应用上下文\n\n问题\n\n在为 Spring 应用创建集成测试时，你必须访问在应用上下文中声明的 Bean。如果没有\
  \ Spring 的测试支持，你必须在测试的初始化方法（JUnit 中带有 `@Before` 或 `@BeforeClass` 注解的方法）中手动加载应用上下文。然而，由于初始化方法在每个测试方法或测试类之前被调用，相同的应用上下文可能会被多次重新加载。在一个包含许多\
  \ Bean 的大型应用中，加载应用上下文可能需要大量时间，这会导致测试运行缓慢。\n\n解决方案\n\nSpring 的测试支持工具可以帮助你管理测试的应用上下文，包括从一个或多个\
  \ Bean 配置文件中加载它，并在多次测试执行之间缓存它。应用上下文将在单个 JVM 内的所有测试之间缓存，使用配置文件位置作为键。因此，你的测试可以运行得更快，而无需多次重新加载相同的应用上下文。\n\
  \nTestContext 框架提供了一些默认注册的测试执行监听器，如表 16-1 所示。\n\n表 16-1.\n\n默认测试执行监听器\n\n| TestExecutionListener\
  \ | 描述 |\n| --- | --- |\n| `DependencyInjectionTestExecutionListener` | 将依赖项（包括托管的应用上下文）注入到你的测试中。\
  \ |\n| `DirtiesContextTestExecutionListener`、`DirtiesContextBeforeModesTestExecutionListener`\
  \ | 处理 `@DirtiesContext` 注解，并在必要时重新加载应用上下文。 |\n| `TransactionalTestExecutionListener`\
  \ | 处理测试用例中的 `@Transactional` 注解，并在测试结束时执行回滚。 |\n| `SqlScriptsTestExecutionListener`\
  \ | 检测测试上的 `@Sql` 注解，并在测试开始前执行 SQL。 |\n| `ServletTestExecutionListener` | 在检测到 `@WebAppConfiguration`\
  \ 注解时处理 Web 应用上下文的加载。 |\n\n要让 TestContext 框架管理应用上下文，你的测试类必须在内部与测试上下文管理器集成。为了方便起见，TestContext\
  \ 框架提供了执行此操作的支持类，如表 16-2 所示。这些类与测试上下文管理器集成，并实现了 `ApplicationContextAware` 接口，因此它们可以通过受保护的字段\
  \ `applicationContext` 提供对托管应用上下文的访问。\n\n表 16-2.\n\n用于上下文管理的 TestContext 支持类\n\n\
  | 测试框架 | TestContext 支持类 |\n| --- | --- |\n| JUnit | `AbstractJUnit4SpringContextTests`\
  \ |\n| TestNG | `AbstractTestNGSpringContextTests` |\n\n你的测试类可以简单地扩展对应测试框架的 TestContext\
  \ 支持类。\n\n这些 TestContext 支持类仅启用了 `DependencyInjectionTestExecutionListener`、`DirtiesContextTestExecutionListener`\
  \ 和 `ServletTestExecutionListener`。\n\n如果你使用 JUnit 或 TestNG，你可以自行将测试类与测试上下文管理器集成，并直接实现\
  \ `ApplicationContextAware` 接口，而无需扩展 TestContext 支持类。这样，你的测试类就不会绑定到 TestContext\
  \ 框架的类层次结构，因此你可以扩展自己的基类。在 JUnit 中，你可以简单地使用测试运行器 `SpringRunner` 运行测试，以集成测试上下文管理器。但是，在\
  \ TestNG 中，你必须手动与测试上下文管理器集成。\n\n工作原理\n\n首先，让我们在配置类中声明一个 `AccountService` 实例和一个 `AccountDao`\
  \ 实例。稍后，你将为其创建集成测试。\n\n```\npackage com.apress.springrecipes.bank.config;\nimport\
  \ com.apress.springrecipes.bank.AccountServiceImpl;\nimport com.apress.springrecipes.bank.InMemoryAccountDao;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class BankConfiguration {\n@Bean\npublic InMemoryAccountDao\
  \ accountDao() {\nreturn new InMemoryAccountDao();\n}\n@Bean\npublic AccountServiceImpl\
  \ accountService() {\nreturn new AccountServiceImpl(accountDao());\n}\n}\n```\n\n\
  在 JUnit 中使用 TestContext 框架访问上下文\n\n\n\n如果你使用 JUnit 配合 TestContext 框架创建测试，有两种方式可以访问被管理的应用上下文。第一种方式是实现\
  \ `ApplicationContextAware` 接口，或者在 `ApplicationContext` 类型的字段上使用 `@Autowired` 注解。采用这种方式时，你必须显式指定一个\
  \ Spring 专用的测试运行器来运行测试：`SpringRunner`。你可以在类级别的 `@RunWith` 注解中指定它。\n\n```\npackage\
  \ com.apress.springrecipes.bank;\nimport com.apress.springrecipes.bank.config.BankConfiguration;\n\
  import org.junit.After;\nimport org.junit.Before;\nimport org.junit.Test;\nimport\
  \ org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
  import static org.junit.Assert.assertEquals;\n@RunWith(SpringRunner.class)\n@ContextConfiguration(classes\
  \ = BankConfiguration.class)\npublic class AccountServiceJUnit4ContextTests implements\
  \ ApplicationContextAware {\nprivate static final String TEST_ACCOUNT_NO = \"1234\"\
  ;\nprivate ApplicationContext applicationContext;\nprivate AccountService accountService;\n\
  @Override\npublic void setApplicationContext(ApplicationContext applicationContext)\
  \ throws BeansException {\nthis.applicationContext=applicationContext;\n}\n@Before\n\
  public void init() {\naccountService = applicationContext.getBean(AccountService.class);\n\
  accountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO), 150, 0);\n}\n@Test\n\
  public void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO),\
  \ 50, 0);\n}\n@After\npublic void cleanup() {\naccountService.removeAccount(TEST_ACCOUNT_NO);\n\
  }\n}\n```\n\n你可以在类级别的 `@ContextConfiguration` 注解的 `classes` 属性中指定配置类。如果使用基于 XML\
  \ 的配置，则可以使用 `locations` 属性代替。如果你没有指定任何测试配置，TestContext 会尝试自动检测一个。它首先会尝试在与测试类相同的包中，加载一个以测试类名加上\
  \ `-context.xml` 后缀命名的文件（例如 `AccountServiceJUnit4Tests-context.xml`）。接着，它会扫描测试类中所有被\
  \ `@Configuration` 注解标记的 `public static` 内部类。如果检测到文件或类，就会使用它们来加载测试配置。\n\n默认情况下，应用上下文会被缓存，并在每个测试方法中复用。但如果你希望在某个特定测试方法之后重新加载它，可以在该测试方法上添加\
  \ `@DirtiesContext` 注解，这样应用上下文就会为下一个测试方法重新加载。\n\n访问被管理应用上下文的第二种方式是继承 JUnit 专用的 TestContext\
  \ 支持类：`AbstractJUnit4SpringContextTests`。这个类实现了 `ApplicationContextAware` 接口，因此你可以通过继承它，并借助受保护的字段\
  \ `applicationContext` 来访问被管理的应用上下文。不过，你首先需要删除私有的 `applicationContext` 字段及其 setter\
  \ 方法。注意，如果你继承了该支持类，则无需在 `@RunWith` 注解中指定 `SpringRunner`，因为该注解会从父类继承。\n\n```\npackage\
  \ com.apress.springrecipes.bank;\n...\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit4.AbstractJUnit4SpringContextTests;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceJUnit4ContextTests\
  \ extends AbstractJUnit4SpringContextTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate AccountService accountService;\n@Before\npublic void init()\
  \ {\naccountService = applicationContext.getBean(AccountService.class);\naccountService.createAccount(TEST_ACCOUNT_NO);\n\
  accountService.deposit(TEST_ACCOUNT_NO, 100);\n}\n...\n}\n```\n\n在 TestNG 中使用 TestContext\
  \ 框架访问上下文\n\n要在 TestNG 中使用 TestContext 框架访问被管理的应用上下文，你可以继承 TestContext 支持类 `AbstractTestNGSpringContextTests`。该类同样实现了\
  \ `ApplicationContextAware` 接口。\n\n```\npackage com.apress.springrecipes.bank;\n\
  import com.apress.springrecipes.bank.config.BankConfiguration;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.AfterMethod;\nimport org.testng.annotations.BeforeMethod;\n\
  import org.testng.annotations.Test;\nimport static org.testng.Assert.assertEquals;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceTestNGContextTests\
  \ extends AbstractTestNGSpringContextTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate AccountService accountService;\n@BeforeMethod\npublic void\
  \ init() {\naccountService = applicationContext.getBean(AccountService.class);\n\
  accountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO), 150, 0);\n}\n@Test\n\
  public void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO),\
  \ 50, 0);\n}\n@AfterMethod\npublic void cleanup() {\naccountService.removeAccount(TEST_ACCOUNT_NO);\n\
  }\n}\n```\n\n如果你不希望 TestNG 测试类继承 TestContext 支持类，可以像在 JUnit 中那样实现 `ApplicationContextAware`\
  \ 接口。但是，你需要自行集成测试上下文管理器。详情请参考 `AbstractTestNGSpringContextTests` 的源代码。\n\n16-5\\\
  . 将测试夹具注入集成测试\n\n问题\n\nSpring 应用集成测试的测试夹具大多是应用上下文中声明的 bean。你可能希望 Spring 通过依赖注入自动注入测试夹具，从而省去手动从应用上下文中获取它们的麻烦。\n\
  \n解决方案\n\nSpring 的测试支持工具能够自动将受管理应用上下文中的 bean 作为测试夹具注入到你的测试中。你只需在测试的 setter 方法或字段上使用\
  \ Spring 的 `@Autowired` 注解或 JSR-250 的 `@Resource` 注解，即可实现夹具的自动注入。对于 `@Autowired`，夹具将按类型注入；对于\
  \ `@Resource`，则按名称注入。\n\n工作原理\n\n你将探索如何使用 JUnit 和 TestNG 注入测试夹具。\n\n在 JUnit 中使用\
  \ TestContext 框架注入测试夹具\n\n当使用 TestContext 框架创建测试时，你可以通过在字段或 setter 方法上添加 `@Autowired`\
  \ 或 `@Resource` 注解，让测试夹具从受管理应用上下文中注入。在 JUnit 中，你可以将 `SpringRunner` 指定为测试运行器，而无需继承支持类。\n\
  \n\n\n```\npackage com.apress.springrecipes.bank;\n...\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
  @RunWith(SpringRunner.class)\n@ContextConfiguration(classes = BankConfiguration.class)\n\
  public class AccountServiceJUnit4ContextTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\n@Autowired\nprivate AccountService accountService;\n@Before\npublic\
  \ void init() {\naccountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n...\n}\n```\n\n如果用 `@Autowired` 注解测试类的字段或 setter 方法，则会通过按类型自动装配的方式注入。你还可以在\
  \ `@Qualifier` 注解中提供候选 bean 的名称，以进一步指定自动装配的候选 bean。但是，如果你想按名称自动装配字段或 setter 方法，可以使用\
  \ `@Resource` 注解。\n\n通过继承 TestContext 支持类 `AbstractJUnit4SpringContextTests`，你也可以从管理的应用上下文中注入测试夹具。在这种情况下，你不需要为测试指定\
  \ `SpringRunner`，因为它已从父类继承。\n\n```\npackage com.apress.springrecipes.bank;\n...\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit4.AbstractJUnit4SpringContextTests;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceJUnit4ContextTests\
  \ extends AbstractJUnit4SpringContextTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\n@Autowired\nprivate AccountService accountService;\n...\n}\n```\n\
  \n在 TestNG 中使用 TestContext 框架注入测试夹具\n\n在 TestNG 中，你可以继承 TestContext 支持类 `AbstractTestNGSpringContextTests`，以从管理的应用上下文中注入测试夹具。\n\
  \n```\npackage com.apress.springrecipes.bank;\n...\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceTestNGContextTests\
  \ extends AbstractTestNGSpringContextTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\n@Autowired\nprivate AccountService accountService;\n@BeforeMethod\n\
  public void init() {\naccountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n...\n}\n```\n\n16-6\\. 在集成测试中管理事务\n\n问题\n\n在为访问数据库的应用程序创建集成测试时，通常会在初始化方法中准备测试数据。每个测试方法运行后，可能会修改数据库中的数据。因此，你必须清理数据库，以确保下一个测试方法能从一致的状态开始运行。结果，你需要开发许多数据库清理任务。\n\
  \n解决方案\n\nSpring 的测试支持设施可以为每个测试方法创建并回滚一个事务，这样你在一个测试方法中所做的更改就不会影响下一个测试方法。这也能省去你开发清理任务来清理数据库的麻烦。\n\
  \nTestContext 框架提供了一个与事务管理相关的测试执行监听器。如果你没有显式指定自己的监听器，默认情况下它会注册到测试上下文管理器中。\n\n`TransactionalTestExecutionListener`\
  \ 处理类或方法级别的 `@Transactional` 注解，并让方法自动在事务内运行。\n\n你的测试类可以继承对应测试框架的 TestContext 支持类，如表\
  \ 16-3 所示，以便其测试方法在事务内运行。这些类与测试上下文管理器集成，并在类级别启用了 `@Transactional`。请注意，bean 配置文件中也需要一个事务管理器。\n\
  \n表 16-3. 用于事务管理的 TestContext 支持类\n\n测试框架\n | TestContext 支持类* |\n| --- | --- |\
  \ --- | --- | --- |\nJUnit\n | `AbstractTransactionalJUnit4SpringContextTests` |\n\
  TestNG\n | `AbstractTransactionalTestNGSpringContextTests` |\n\n这些 TestContext 支持类除了启用\
  \ `DependencyInjectionTestExecutionListener` 和 `DirtiesContextTestExecutionListener`\
  \ 之外，还启用了 `TransactionalTestExecutionListener` 和 `SqlScriptsTestExecutionListener`。\n\
  \n在 JUnit 和 TestNG 中，你可以简单地在类级别或方法级别注解 `@Transactional`，以使测试方法在事务内运行，而无需继承 TestContext\
  \ 支持类。但是，为了与测试上下文管理器集成，你必须使用测试运行器 `SpringRunner` 运行 JUnit 测试，而对于 TestNG 测试，则需要手动操作。\n\
  \n工作原理\n\n假设我们将银行系统的账户存储在关系数据库中。你可以选择任何支持事务且符合 JDBC 规范的数据库引擎，然后在其上执行以下 SQL 语句来创建\
  \ `ACCOUNT` 表。为了测试，我们将使用内存中的 H2 数据库。\n\n```\nCREATE TABLE ACCOUNT (\nACCOUNT_NO\
  \    VARCHAR(10)    NOT NULL,\nBALANCE       DOUBLE         NOT NULL,\nPRIMARY KEY\
  \ (ACCOUNT_NO)\n);\n```\n\n接下来，创建一个使用 JDBC 访问数据库的新 DAO 实现。你可以利用 `JdbcTemplate` 来简化操作。\n\
  \n```\npackage com.apress.springrecipes.bank;\nimport org.springframework.jdbc.core.support.JdbcDaoSupport;\n\
  public class JdbcAccountDao extends JdbcDaoSupport implements AccountDao {\npublic\
  \ void createAccount(Account account) {\nString sql = \"INSERT INTO ACCOUNT (ACCOUNT_NO,\
  \ BALANCE) VALUES (?, ?)\";\ngetJdbcTemplate().update(\nsql, account.getAccountNo(),\
  \ account.getBalance());\n}\npublic void updateAccount(Account account) {\nString\
  \ sql = \"UPDATE ACCOUNT SET BALANCE = ? WHERE ACCOUNT_NO = ?\";\ngetJdbcTemplate().update(\n\
  sql, account.getBalance(), account.getAccountNo());\n}\npublic void removeAccount(Account\
  \ account) {\nString sql = \"DELETE FROM ACCOUNT WHERE ACCOUNT_NO = ?\";\ngetJdbcTemplate().update(sql,\
  \ account.getAccountNo());\n}\npublic Account findAccount(String accountNo) {\n\
  String sql = \"SELECT BALANCE FROM ACCOUNT WHERE ACCOUNT_NO = ?\";\ndouble balance\
  \ =\ngetJdbcTemplate().queryForObject(sql, Double.class, accountNo);\nreturn new\
  \ Account(accountNo, balance);\n}\n}\n```\n\n在创建集成测试来测试使用此 DAO 持久化账户对象的 `AccountService`\
  \ 实例之前，你必须在配置类中将 `InMemoryAccountDao` 替换为此 DAO，并配置目标数据源。\n\n注意\n\n要使用 H2，你必须将其作为依赖项添加到类路径中。\n\
  \n```\ncom.h2database:\nh2\n1.4.194\n\n```\n\n或者在使用 Gradle 时，添加以下内容：\n\n```\ntestCompile\
  \ 'com.h2database:h2:1.4.194'\n```\n\n```\n@Configuration\npublic class BankConfiguration\
  \ {\n@Bean\npublic DataSource dataSource() {\nDriverManagerDataSource dataSource\
  \ = new DriverManagerDataSource();\ndataSource.setUrl(\"jdbc:h2:mem:bank-testing\"\
  );\ndataSource.setUsername(\"sa\");\ndataSource.setPassword(\"\");\nreturn dataSource;\n\
  }\n@Bean\npublic AccountDao accountDao() {\nJdbcAccountDao accountDao = new JdbcAccountDao();\n\
  accountDao.setDataSource(dataSource());\nreturn accountDao;\n}\n@Bean\npublic AccountService\
  \ accountService() {\nreturn new AccountServiceImpl(accountDao());\n}\n}\n```\n\n\
  在 JUnit 中使用 TestContext 框架管理事务\n\n\n\n使用 TestContext 框架创建测试时，可以通过在类或方法级别标注 `@Transactional`\
  \ 让测试方法在事务中运行。在 JUnit 中，可以为测试类指定 `SpringRunner`，这样它就不需要继承支持类。\n\n```\npackage com.apress.springrecipes.bank;\n\
  ...\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.transaction.annotation.Transactional;\n\
  @RunWith(SpringRunner.class)\n@ContextConfiguration(classes = BankConfiguration.class)\n\
  @Transactional\npublic class AccountServiceJUnit4ContextTests {\nprivate static\
  \ final String TEST_ACCOUNT_NO = \"1234\";\n@Autowired\nprivate AccountService accountService;\n\
  @Before\npublic void init() {\naccountService.createAccount(TEST_ACCOUNT_NO);\n\
  accountService.deposit(TEST_ACCOUNT_NO, 100);\n}\n// 不再需要 cleanup()\n...\n}\n```\n\
  \n如果用 `@Transactional` 标注测试类，其所有测试方法都将在事务中运行。另一种选择是仅用 `@Transactional` 标注单个方法，而不是整个类。\n\
  \n默认情况下，测试方法的事务会在结束时回滚。可以通过禁用 `@TransactionConfiguration` 的 `defaultRollback` 属性来改变此行为，该注解应应用于类级别。此外，还可以使用\
  \ `@Rollback` 注解在方法级别覆盖类级别的回滚行为，该注解需要一个 `Boolean` 值。\n\n注意\n\n标注了 `@Before` 或 `@After`\
  \ 的方法将与测试方法在同一个事务中执行。如果某些方法需要在事务之前或之后执行初始化或清理任务，则必须用 `@BeforeTransaction` 或 `@AfterTransaction`\
  \ 标注它们。\n\n最后，还需要在 Bean 配置文件中配置一个事务管理器。默认情况下，会使用类型为 `PlatformTransactionManager`\
  \ 的 Bean，但可以通过 `@TransactionConfiguration` 注解的 `transactionManager` 属性指定另一个事务管理器，并给出其名称。\n\
  \n```\n@Bean\npublic DataSourceTransactionManager transactionManager(DataSource\
  \ dataSource) {\nreturn new DataSourceTransactionManager(dataSource);\n}\n```\n\n\
  在 JUnit 中，管理测试方法事务的另一种方法是继承事务性 TestContext 支持类 `AbstractTransactionalJUnit4SpringContextTests`，该类在类级别启用了\
  \ `@Transactional`，因此无需再次启用。通过继承此支持类，无需为测试指定 `SpringRunner`，因为它已从父类继承。\n\n```\n\
  package com.apress.springrecipes.bank;\n...\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit4.AbstractTransactionalJUnit4SpringContextTests;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceJUnit4ContextTests\
  \ extends AbstractTransactionalJUnit4SpringContextTests {\n...\n}\n```\n\n使用 TestContext\
  \ 框架在 TestNG 中管理事务\n\n要创建在事务中运行的 TestNG 测试，测试类可以继承 TestContext 支持类 `AbstractTransactionalTestNGSpringContextTests`，使其方法在事务中运行。\n\
  \n```\npackage com.apress.springrecipes.bank;\n...\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTransactionalTestNGSpringContextTests;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceTestNGContextTests\
  \ extends\nAbstractTransactionalTestNGSpringContextTests {\nprivate static final\
  \ String TEST_ACCOUNT_NO = \"1234\";\n@Autowired\nprivate AccountService accountService;\n\
  @BeforeMethod\npublic void init() {\naccountService.createAccount(TEST_ACCOUNT_NO);\n\
  accountService.deposit(TEST_ACCOUNT_NO, 100);\n}\n// 不再需要 cleanup()\n...\n}\n```\n\
  \n16-7\\. 在集成测试中访问数据库\n\n问题\n\n为访问数据库的应用程序（尤其是使用 ORM 框架开发的应用程序）创建集成测试时，可能需要直接访问数据库来准备测试数据，并在测试方法运行后验证数据。\n\
  \n解决方案\n\nSpring 的测试支持工具可以创建并提供 JDBC 模板，供你在测试中执行与数据库相关的任务。测试类可以继承一个事务性 TestContext\
  \ 支持类来访问预先创建的 `JdbcTemplate` 实例。这些类还需要在 Bean 配置文件中配置数据源和事务管理器。\n\n工作原理\n\n使用 TestContext\
  \ 框架创建测试时，可以继承相应的 TestContext 支持类，通过受保护的字段使用 `JdbcTemplate` 实例。对于 JUnit，此类是 `AbstractTransactionalJUnit4SpringContextTests`，它提供了类似便捷的方法，用于统计表中的行数、删除表中的行以及执行\
  \ SQL 脚本。\n\n```\npackage com.apress.springrecipes.bank;\n...\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit4.AbstractTransactionalJUnit4SpringContextTests;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceJUnit4ContextTests\
  \ extends AbstractTransactionalJUnit4SpringContextTests {\n...\n@Before\npublic\
  \ void init() {\nexecuteSqlScript(\"classpath:/bank.sql\",true);\njdbcTemplate.update(\n\
  \"INSERT INTO ACCOUNT (ACCOUNT_NO, BALANCE) VALUES (?, ?)\",\nTEST_ACCOUNT_NO, 100);\n\
  }\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO, 50);\n\
  double balance = jdbcTemplate.queryForObject(\n\"SELECT BALANCE FROM ACCOUNT WHERE\
  \ ACCOUNT_NO = ?\",\nDouble.class, TEST_ACCOUNT_NO);\nassertEquals(balance, 150.0,\
  \ 0);\n}\n@Test\npublic void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO,\
  \ 50);\ndouble balance = jdbcTemplate.queryForObject(\n\"SELECT BALANCE FROM ACCOUNT\
  \ WHERE ACCOUNT_NO = ?\",\nDouble.class, TEST_ACCOUNT_NO);\nassertEquals(balance,\
  \ 50.0, 0);\n}\n}\n```\n\n除了使用 `executeSqlScript` 方法，还可以在类或测试方法上放置 `@Sql` 注解来执行某些\
  \ SQL 或脚本。\n\n```\n@ContextConfiguration(classes = BankConfiguration.class)\n@Sql(scripts=\"\
  classpath:/bank.sql\")\npublic class AccountServiceJUnit4ContextTests extends AbstractTransactionalJUnit4SpringContextTests\
  \ {\nprivate static final String TEST_ACCOUNT_NO = \"1234\";\n@Autowired\nprivate\
  \ AccountService accountService;\n@Before\npublic void init() {\njdbcTemplate.update(\n\
  \"INSERT INTO ACCOUNT (ACCOUNT_NO, BALANCE) VALUES (?, ?)\",\nTEST_ACCOUNT_NO, 100);\n\
  }\n}\n```\n\n使用 `@Sql` 方法，可以执行在 `scripts` 属性中指定的脚本，或者直接在注解的 `statements` 属性中放入 SQL\
  \ 语句。最后，可以指定在测试方法之前或之后执行指定的指令。可以在一个类/方法上放置多个 `@Sql` 注解，以便在测试前后执行语句。\n\n在 TestNG\
  \ 中，可以继承 `AbstractTransactionalTestNGSpringContextTests` 来使用 `JdbcTemplate` 实例。\n\
  \n\n\n```\npackage com.apress.springrecipes.bank;\n...\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTransactionalTestNGSpringContextTests;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceTestNGContextTests\
  \ extends AbstractTransactionalTestNGSpringContextTests {\n...\n@BeforeMethod\n\
  public void init() {\nexecuteSqlScript(\"classpath:/bank.sql\",true);\njdbcTemplate.update(\n\
  \"INSERT INTO ACCOUNT (ACCOUNT_NO, BALANCE) VALUES (?, ?)\",\nTEST_ACCOUNT_NO, 100);\n\
  }\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO, 50);\n\
  double balance = jdbcTemplate.queryForObject(\n\"SELECT BALANCE FROM ACCOUNT WHERE\
  \ ACCOUNT_NO = ?\",\nDouble.class, TEST_ACCOUNT_NO);\nassertEquals(balance, 150,\
  \ 0);\n}\n@Test\npublic void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO,\
  \ 50);\ndouble balance = jdbcTemplate.queryForObject(\n\"SELECT BALANCE FROM ACCOUNT\
  \ WHERE ACCOUNT_NO = ?\",\nDouble.class, TEST_ACCOUNT_NO);\nassertEquals(balance,\
  \ 50, 0);\n}\n}\n```\n\n16-8. 使用 Spring 的通用测试注解\n\n问题\n\n你经常需要手动实现常见的测试任务，例如期望抛出异常、多次重复执行测试方法、确保测试方法在特定时间内完成等。\n\
  \n解决方案\n\nSpring 的测试支持提供了一套通用的测试注解，以简化测试的创建。这些注解是 Spring 特有的，但独立于底层测试框架。其中，表 16-4\
  \ 中的注解对于常见测试任务非常有用。不过，它们仅支持与 JUnit 一起使用。\n\n表 16-4. Spring 的测试注解\n\n| 注解 | 描述 |\n\
  | --- | --- |\n| `@Repeat` | 表示测试方法必须运行多次。运行次数由注解的值指定。 |\n| `@Timed` | 表示测试方法必须在指定的时间（毫秒）内完成，否则测试失败。请注意，该时间包括测试方法的重复执行以及任何初始化和清理方法的时间。\
  \ |\n| `@IfProfileValue` | 表示测试方法只能在特定的测试环境中运行。只有当实际的配置文件值与指定的值匹配时，该测试方法才会运行。你也可以指定多个值，这样只要匹配其中任何一个值，测试方法就会运行。默认情况下，使用\
  \ `SystemProfileValueSource` 来检索系统属性作为配置文件值，但你可以创建自己的 `ProfileValueSource` 实现，并在\
  \ `@ProfileValueSourceConfiguration` 注解中指定它。 |\n\n你可以通过扩展一个 TestContext 支持类来使用 Spring\
  \ 的测试注解。如果你没有扩展支持类，而是使用测试运行器 `SpringRunner` 运行 JUnit 测试，那么你也可以使用这些注解。\n\n工作原理\n\n\
  当使用 TestContext 框架为 JUnit 创建测试时，如果你使用 `SpringRunner` 运行测试，或者扩展了一个 JUnit TestContext\
  \ 支持类，就可以使用 Spring 的测试注解。\n\n```\npackage com.apress.springrecipes.bank;\n...\n\
  import org.springframework.test.annotation.Repeat;\nimport org.springframework.test.annotation.Timed;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit4.AbstractTransactionalJUnit4SpringContextTests;\n\
  @ContextConfiguration(locations = \"/beans.xml\")\npublic class AccountServiceJUnit4ContextTests\
  \ extends AbstractTransactionalJUnit4SpringContextTests {\n...\n@Test\n@Timed(millis\
  \ = 1000)\npublic void deposit() {\n...\n}\n@Test\n@Repeat(5)\npublic void withDraw()\
  \ {\n...\n}\n}\n```\n\n16-9. 为 Spring MVC 控制器实现集成测试\n\n问题\n\n在 Web 应用程序中，你希望对使用\
  \ Spring MVC 框架开发的 Web 控制器进行集成测试。\n\n解决方案\n\nSpring MVC 控制器由 `DispatcherServlet`\
  \ 通过 HTTP 请求对象和 HTTP 响应对象来调用。处理请求后，控制器将结果返回给 `DispatcherServlet` 以渲染视图。对 Spring\
  \ MVC 控制器以及其他 Web 应用程序框架中的 Web 控制器进行集成测试的主要挑战在于：在单元测试环境中模拟 HTTP 请求对象和响应对象，以及为单元测试设置模拟环境。幸运的是，Spring\
  \ 在 Spring 测试支持中提供了 Mock MVC 部分。这可以轻松设置模拟的 Servlet 环境。\n\nSpring Test Mock MVC 将根据你的配置设置一个\
  \ `WebApplicationContext`。接下来，你可以使用 MockMvc API 来模拟 HTTP 请求并验证结果。\n\n工作原理\n\n在银行应用程序中，你希望对\
  \ `DepositController` 进行集成测试。在开始测试之前，你需要创建一个配置类来配置与 Web 相关的 Bean。\n\n```\npackage\
  \ com.apress.springrecipes.bank.web.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.web.servlet.ViewResolver;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
  import org.springframework.web.servlet.view.InternalResourceViewResolver;\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.springrecipes.bank.web\"\
  )\npublic class BankWebConfiguration {\n@Bean\npublic ViewResolver viewResolver()\
  \ {\nInternalResourceViewResolver viewResolver = new InternalResourceViewResolver();\n\
  viewResolver.setPrefix(\"/WEB-INF/views/\");\nviewResolver.setSuffix(\".jsp\");\n\
  return viewResolver;\n}\n}\n```\n\n该配置通过使用 `@EnableWebMvc` 注解启用了基于注解的控制器；接着，你希望使用\
  \ `@ComponentScan` 注解自动扫描并拾取带有 `@Controller` 注解的 Bean。最后，有一个 `InternalResourceViewResolver`，它将视图名称转换为\
  \ URL（通常由浏览器渲染），你现在将在控制器中对其进行验证。\n\n现在，基于 Web 的配置已经就绪，你可以开始创建集成测试了。这个单元测试需要加载你的\
  \ `BankWebConfiguration` 类，并且还需要使用 `@WebAppConfiguration` 注解进行标注，以告知 TestContext\
  \ 框架你需要一个 `WebApplicationContext` 而不是常规的 `ApplicationContext`。\n\n使用 JUnit 集成测试\
  \ Spring MVC 控制器\n\n在 JUnit 中，最简单的方法是扩展一个基类，在本例中是 `AbstractTransactionalJUnit4SpringContextTests`，因为你希望插入一些测试数据，并在测试完成后回滚。\n\
  \n\n\n```\npackage com.apress.springrecipes.bank.web;\nimport com.apress.springrecipes.bank.config.BankConfiguration;\n\
  import com.apress.springrecipes.bank.web.config.BankWebConfiguration;\nimport org.junit.Before;\n\
  import org.junit.Test;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit4.AbstractTransactionalJUnit4SpringContextTests;\n\
  import org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.servlet.MockMvc;\n\
  import org.springframework.test.web.servlet.setup.MockMvcBuilders;\nimport org.springframework.web.context.WebApplicationContext;\n\
  import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultHandlers.print;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.forwardedUrl;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
  @ContextConfiguration(classes= { BankWebConfiguration.class, BankConfiguration.class})\n\
  @WebAppConfiguration\npublic class DepositControllerJUnit4ContextTests extends AbstractTransactionalJUnit4SpringContextTests\
  \ {\nprivate static final String ACCOUNT_PARAM = \"accountNo\";\nprivate static\
  \ final String AMOUNT_PARAM = \"amount\";\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate static final String TEST_AMOUNT = \"50.0\";\n@Autowired\n\
  private WebApplicationContext webApplicationContext;\nprivate MockMvc mockMvc;\n\
  @Before\npublic void init() {\nexecuteSqlScript(\"classpath:/bank.sql\", true);\n\
  jdbcTemplate.update(\n\"INSERT INTO ACCOUNT (ACCOUNT_NO, BALANCE) VALUES (?, ?)\"\
  ,\nTEST_ACCOUNT_NO, 100);\nmockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext).build();\n\
  }\n@Test\npublic void deposit() throws Exception {\nmockMvc.perform(\nget(\"/deposit.do\"\
  )\n.param(ACCOUNT_PARAM, TEST_ACCOUNT_NO)\n.param(AMOUNT_PARAM, TEST_AMOUNT))\n\
  .andDo(print())\n.andExpect(forwardedUrl(\"/WEB-INF/views/success.jsp\"))\n.andExpect(status().isOk());\n\
  }\n}\n```\n\n在 `init` 方法中，你通过便捷的 `MockMvcBuilders` 来准备 `MockMvc` 对象。使用工厂方法 `webAppContextSetup`，你可以利用已加载的\
  \ `WebApplicationContext` 来初始化 `MockMvc` 对象。`MockMvc` 对象基本上模拟了 `DispatcherServlet`\
  \ 的行为，后者在基于 Spring MVC 的应用程序中使用。它将使用传入的 `WebApplicationContext` 来配置处理器映射和视图解析策略，并且还会应用任何已配置的拦截器。\n\
  \n此外，还设置了一个测试账户，以便你有数据可以操作。\n\n在 `deposit` 测试方法中，使用已初始化的 `MockMvc` 对象来模拟一个对 `/deposit.do`\
  \ URL 的传入请求，该请求带有两个请求参数：`accountNo` 和 `amount`。`MockMvcRequestBuilders.get` 工厂方法会生成一个\
  \ `RequestBuilder` 实例，该实例被传递给 `MockMvc.perform` 方法。\n\n`perform` 方法返回一个 `ResultActions`\
  \ 对象，可用于对返回结果进行断言和某些操作。测试方法使用 `andDo(print())` 打印所创建请求和返回响应的信息，这在调试测试时非常有用。最后，有两个断言用于验证一切是否按预期工作。`DepositController`\
  \ 返回 `success` 作为 `viewname`，由于 `ViewResolver` 的配置，这应该会导致转发到 `/WEB-INF/views/success.jsp`。请求的返回码应为\
  \ 200 (OK)，可以通过 `status().isOk()` 或 `status().is(200)` 进行测试。\n\n使用 TestNG 集成测试 Spring\
  \ MVC 控制器\n\nSpring Mock MVC 也可以与 TestNG 一起使用，通过扩展相应的基类 `AbstractTransactionalTestNGSpringContextTests`\
  \ 并添加 `@WebAppConfiguration` 注解。\n\n```\n@ContextConfiguration(classes= { BankWebConfiguration.class,\
  \ BankConfiguration.class})\n@WebAppConfiguration\npublic class DepositControllerTestNGContextTests\n\
  extends AbstractTransactionalTestNGSpringContextTests {\n@BeforeMethod\npublic void\
  \ init() {\nexecuteSqlScript(\"classpath:/bank.sql\", true);\njdbcTemplate.update(\n\
  \"INSERT INTO ACCOUNT (ACCOUNT_NO, BALANCE) VALUES (?, ?)\",\nTEST_ACCOUNT_NO, 100);\n\
  mockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext).build();\n}\n\
  }\n```\n\n16-10. 为 REST 客户端编写集成测试\n\n问题\n\n你想为基于 `RestTemplate` 的客户端编写一个集成测试。\n\n\
  解决方案\n\n在为基于 REST 的客户端编写集成测试时，你不希望依赖外部服务的可用性。你可以使用模拟服务器编写集成测试，让其返回预期结果，而不是调用真实的端点。\n\
  \n工作原理\n\n在银行工作时，你需要验证人们输入的账号；你可以实现自己的验证逻辑，也可以重用现有的验证逻辑。你将实现一个 IBAN 验证服务，该服务将使用\
  \ [`http://openiban.com`](http://openiban.com) 上提供的 API。\n\n首先，你编写一个定义契约的接口。\n\n\
  ```\npackage com.apress.springrecipes.bank.web;\npublic interface IBANValidationClient\
  \ {\nIBANValidationResult validate(String iban);\n}\n```\n\n`IBANValidationResult`\
  \ 包含对验证端点的调用结果。\n\n```\npackage com.apress.springrecipes.bank.web;\nimport java.util.ArrayList;\n\
  import java.util.HashMap;\nimport java.util.List;\nimport java.util.Map;\npublic\
  \ class IBANValidationResult {\nprivate boolean valid;\nprivate List messages =\
  \ new ArrayList();\nprivate String iban;\nprivate Map bankData = new HashMap();\n\
  public boolean isValid() {\nreturn valid;\n}\npublic void setValid(boolean valid)\
  \ {\nthis.valid = valid;\n}\npublic List getMessages() {\nreturn messages;\n}\n\
  public void setMessages(List messages) {\nthis.messages = messages;\n}\npublic String\
  \ getIban() {\nreturn iban;\n}\npublic void setIban(String iban) {\nthis.iban =\
  \ iban;\n}\npublic Map getBankData() {\nreturn bankData;\n}\npublic void setBankData(Map\
  \ bankData) {\nthis.bankData = bankData;\n}\n@Override\npublic String toString()\
  \ {\nreturn \"IBANValidationResult [\" +\n\"valid=\" + valid +\n\", messages=\"\
  \ + messages +\n\", iban='\" + iban + '\\'' +\n\", bankData=\" + bankData +\n']';\n\
  }\n}\n```\n\n接下来编写 `OpenIBANValidationClient` 类，它将使用 `RestTemplate` 实例与 API 通信。为了便于访问\
  \ `RestTemplate` 实例，你可以扩展 `RestGatewaySupport`。\n\n```\npackage com.apress.springrecipes.bank.web;\n\
  import org.springframework.stereotype.Service;\nimport org.springframework.web.client.support.RestGatewaySupport;\n\
  @Service\npublic class OpenIBANValidationClient extends RestGatewaySupport implements\
  \ IBANValidationClient {\nprivate static final String URL_TEMPLATE = \"https://openiban.com/validate/{IBAN_NUMBER}?getBIC=true&validateBankCode=true\"\
  ;\n@Override\npublic IBANValidationResult validate(String iban) {\nreturn getRestTemplate().getForObject(URL_TEMPLATE,\
  \ IBANValidationResult.class, iban);\n}\n}\n```\n\n接下来，你将创建一个测试，为 `OpenIBANValidationClient`\
  \ 类构造一个 `MockRestServiceServer` 类，并将其配置为针对预期请求返回特定的 JSON 结果。\n\n\n\n```\npackage\
  \ com.apress.springrecipes.bank.web;\nimport com.apress.springrecipes.bank.config.BankConfiguration;\n\
  import org.junit.Before;\nimport org.junit.Test;\nimport org.junit.runner.RunWith;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.http.MediaType;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.web.client.MockRestServiceServer;\n\
  import static org.junit.Assert.assertFalse;\nimport static org.junit.Assert.assertTrue;\n\
  import static org.springframework.test.web.client.match.MockRestRequestMatchers.requestTo;\n\
  import static org.springframework.test.web.client.response.MockRestResponseCreators.withSuccess;\n\
  @RunWith(SpringRunner.class)\n@ContextConfiguration(classes= { BankConfiguration.class})\n\
  public class OpenIBANValidationClientTest {\n@Autowired\nprivate OpenIBANValidationClient\
  \ client;\nprivate MockRestServiceServer mockRestServiceServer;\n@Before\npublic\
  \ void init() {\nmockRestServiceServer = MockRestServiceServer.createServer(client);\n\
  }\n@Test\npublic void validIban() {\nmockRestServiceServer\n.expect(requestTo(\"\
  https://openiban.com/validate/NL87TRIO0396451440?getBIC=true&validateBankCode=true\"\
  ))\n.andRespond(withSuccess(new ClassPathResource(\"NL87TRIO0396451440-result.json\"\
  ), MediaType.APPLICATION_JSON));\nIBANValidationResult result = client.validate(\"\
  NL87TRIO0396451440\");\nassertTrue(result.isValid());\n}\n@Test\npublic void invalidIban()\
  \ {\nmockRestServiceServer\n.expect(requestTo(\"https://openiban.com/validate/NL28XXXX389242218?getBIC=true&validateBankCode=true\"\
  ))\n.andRespond(withSuccess(new ClassPathResource(\"NL28XXXX389242218-result.json\"\
  ), MediaType.APPLICATION_JSON));\nIBANValidationResult result = client.validate(\"\
  NL28XXXX389242218\");\nassertFalse(result.isValid());\n}\n}\n```\n\n测试类包含两个测试方法，两者非常相似。在\
  \ `init` 方法中，你使用 `OpenIBANValidationClient` 类创建了一个 `MockRestServiceService` 实例（之所以可行，是因为该类继承了\
  \ `RestGatewaySupport`；如果不是这种情况，则必须使用配置好的 `RestTemplate` 类来创建模拟服务器）。在测试方法中，你通过一个\
  \ URL 设置了预期行为，当该 URL 被调用时，类路径下的一个 JSON 响应将作为答案返回。\n\n为了进行测试，你可能希望使用服务器上一些已知的响应，为此你可以使用从真实系统记录的结果，或者服务器可能已经提供了用于测试的结果。\n\
  \n**总结**\n\n在本章中，你学习了测试 Java 应用程序时使用的基本概念和技术。JUnit 和 TestNG 是 Java 平台上最流行的测试框架。单元测试用于测试单个编程单元，在面向对象语言中通常是一个类或一个方法。当测试依赖于其他单元的单元时，你可以使用桩和模拟对象来模拟其依赖关系，从而使测试更简单。相比之下，集成测试则用于将多个单元作为一个整体进行测试。\n\
  \n在 Web 层，控制器通常难以测试。Spring 为 Servlet API 提供了模拟对象，使你可以轻松模拟 Web 请求和响应对象来测试 Web 控制器。此外，还有\
  \ Spring Mock MVC 可用于对控制器进行简单的集成测试。适用于控制器的原则同样适用于基于 REST 的客户端。为了帮助你测试这些客户端，Spring\
  \ 提供了 `MockRestServiceServer`，你可以用它来模拟外部系统。\n\nSpring 的测试支持工具可以通过从 Bean 配置文件加载应用程序上下文并在多次测试执行之间缓存它们，来为你的测试管理应用程序上下文。你可以在测试中访问被管理的应用程序上下文，并且测试夹具会自动从应用程序上下文中注入。此外，如果你的测试涉及数据库更新，Spring\
  \ 可以为其管理事务，以便在一个测试方法中所做的更改会被回滚，从而不会影响下一个测试方法。Spring 还可以为你创建一个 JDBC 模板，用于在数据库中准备和验证测试数据。\n\
  \nSpring 提供了一组通用的测试注解来简化测试创建。这些注解是 Spring 特有的，但独立于底层测试框架。不过，其中一些注解仅支持与 JUnit 一起使用。\n\
  \n**17. Grails**\n\n当你着手创建 Java Web 应用程序时，需要组合一系列 Java 类、创建配置文件并建立特定的布局，而这些工作与应用程序要解决的问题几乎无关。这些部分通常被称为脚手架代码或脚手架步骤，因为它们只是达到目的的手段——目的就是应用程序实际实现的功能。\n\
  \nGrails 是一个旨在减少 Java 应用程序中所需脚手架步骤数量的框架。它基于 Groovy 语言（一种与 Java 虚拟机兼容的语言），能够根据约定自动完成\
  \ Java 应用程序中需要执行的许多步骤。\n\n例如，当你创建应用程序控制器时，除了需要某种类型的配置文件使其工作外，最终还会伴随一系列视图（例如 JavaServer\
  \ Pages [JSP] 页面）。如果你使用 Grails 生成控制器，Grails 会利用约定自动完成许多步骤（例如创建视图和配置文件）。之后你可以将 Grails\
  \ 生成的内容修改为更具体的场景，但 Grails 无疑会缩短你的开发时间，因为你无需从头编写所有内容（例如编写 XML 配置文件、准备项目目录结构）。\n\n\
  Grails 与 Spring 完全集成，因此你可以使用它来快速启动 Spring 应用程序，从而减少开发工作量。\n\n**17-1. 获取并安装 Grails**\n\
  \n**问题**\n\n你想开始创建 Grails 应用程序，但不知道从哪里获取 Grails 以及如何设置它。\n\n**解决方案**\n\n你可以从 [`www.grails.org/`](http://www.grails.org/)\
  \ 下载 Grails。请确保下载 Grails 3.2 或更高版本。Grails 是一个自包含的框架，附带各种脚本，用于自动化创建 Java 应用程序。从这个意义上说，你只需解压发行版并执行几个安装步骤，即可在工作站上创建\
  \ Java 应用程序。\n\n**工作原理**\n\n在工作站上解压 Grails 后，在操作系统上定义两个环境变量：`GRAILS_HOME` 和 `PATH`。这使你能够从工作站的任何位置调用\
  \ Grails 操作。如果你使用 Linux 工作站，可以编辑位于 `/etc/` 目录下的全局 `bashrc` 文件，或位于用户主目录下的用户 `.bashrc`\
  \ 文件。请注意，根据 Linux 发行版的不同，后者的文件名可能有所不同（例如 `bash.bashrc`）。这两个文件使用相同的语法来定义环境变量，一个文件用于为所有用户定义变量，另一个用于为单个用户定义变量。将以下内容放入其中一个文件中：\n\
  \n```\nGRAILS_HOME=//grails\nexport GRAILS_HOME\nexport PATH=$PATH:$GRAILS_HOME/bin\n\
  ```\n\n\n\n如果您使用的是 Windows 工作站，请进入控制面板并点击**系统**图标。在打开的窗口中，点击**高级选项**选项卡。接着，点击“环境变量”框以打开环境变量编辑器。在此处，您可以按照以下步骤为单个用户或所有用户添加或修改环境变量：\n\
  \n1.  点击**新建**框。\n2.  创建一个名为 `GRAILS_HOME` 的环境变量，其值对应 Grails 的安装目录（例如，`/<安装目录>/grails`）。\n\
  3.  选择 `PATH` 环境变量，并点击**修改**框。\n4.  将 `;%GRAILS_HOME%\\bin` 值添加到 `PATH` 环境变量的末尾。\n\
  \n警告\n\n请务必仅添加此值，不要以任何其他方式修改 `PATH` 环境变量，因为这可能导致某些应用程序停止工作。\n\n在 Windows 或 Linux\
  \ 工作站上完成这些步骤后，您就可以开始创建 Grails 应用程序了。如果您在工作站的任意目录下执行命令 `grails help`，您应该会看到 Grails\
  \ 的众多命令。\n\n17-2. 创建 Grails 应用程序\n\n问题\n\n您想要创建一个 Grails 应用程序。\n\n解决方案\n\n要创建 Grails\
  \ 应用程序，请在您想要创建应用程序的任意位置调用以下命令：`grails create-app <grailsappname>`。这将创建一个 Grails\
  \ 应用程序目录，其项目结构符合框架的设计。如果此命令失败，请参考配方 17-1。如果 Grails 安装正确，`grails` 命令应该可以在任何控制台或终端中使用。\n\
  \n工作原理\n\n例如，输入 `grails create-app court` 会在名为 `court` 的目录下创建一个 Grails 应用程序。在此目录内，您会找到\
  \ Grails 基于约定生成的一系列文件和目录。图 17-1 展示了 Grails 应用程序的初始项目结构。\n\n![A314861_4_En_17_Fig1_HTML.jpg](img/A314861_4_En_17_Fig1_HTML.jpg)\n\
  \n图 17-1. Grails 应用程序项目结构\n\n注意\n\n除了此布局之外，Grails 还会为应用程序创建一系列工作目录和文件（即，不打算直接修改的）。这些工作目录和文件放置在用户主目录下，名称为\
  \ `.grails/<grails_version>/`。\n\n正如您从最后这个列表中所能注意到的，Grails 生成了一系列在大多数 Java 应用程序中常见的文件和目录。您将拥有一个名为\
  \ `src\\main\\groovy` 的目录用于存放源代码文件，以及一个 `src\\main\\web-app` 目录，其中包含 Java Web 应用程序的通用布局（例如，`/WEB-INF/`、`/META-INF/`、`css`、`images`\
  \ 和 `js`）。开箱即用，Grails 通过一个命令将这些常见的 Java 应用程序结构组合在一起，为您节省了时间。\n\n探索 Grails 应用程序的文件和目录结构\n\
  \n由于其中一些文件和目录是 Grails 特有的，我们将描述每个文件和目录的用途：\n\n*   `gradle.properties`：用于定义应用程序的构建属性，包括\
  \ Grails 版本、Servlet 版本和应用程序名称。\n*   `grails-app`：包含应用程序核心的目录，其中进一步包含以下文件夹：\n   \
  \ *   `assets`：包含应用程序静态资源（即 `.css` 和 `.js` 文件）的目录。\n    *   `conf`：包含应用程序配置源的目录。\n\
  \    *   `controllers`：包含应用程序控制器文件的目录。\n    *   `domain`：包含应用程序领域文件的目录。\n    * \
  \  `i18n`：包含应用程序国际化（i18n）文件的目录。\n    *   `services`：包含应用程序服务文件的目录。\n    *   `taglib`：包含应用程序标签库的目录。\n\
  \    *   `utils`：包含应用程序工具文件的目录。\n    *   `views`：包含应用程序视图文件的目录。\n*   `src\\main`：用于存放应用程序源代码文件的目录；包含一个名为\
  \ `groovy` 的子文件夹，用于存放用此语言编写的源代码（您可以添加一个 `java` 子文件夹来编写 Java 代码）。\n*   `src\\test`：用于存放应用程序单元测试文件的目录。\n\
  *   `src\\integration-test`：用于存放应用程序集成测试文件的目录。\n*   `web-app`：用于存放应用程序部署结构的目录；包含标准的\
  \ Web 归档（WAR）文件和目录结构（例如，`/WEB-INF/`、`/META-INF/`、`css`、`images` 和 `js`）。\n\n运行应用程序\n\
  \nGrails 预配置为在 Apache Tomcat Web 容器上运行应用程序。与创建 Grails 应用程序类似，运行 Grails 应用程序的过程也是高度自动化的。\n\
  \n在 Grails 应用程序的根目录下，调用 `grails run-app`。此命令将根据需要触发应用程序的构建过程，同时启动 Apache Tomcat\
  \ Web 容器并部署应用程序。\n\n由于 Grails 基于约定运行，应用程序会部署在以项目名称命名的上下文下。因此，例如，名为 `court` 的应用程序会部署到\
  \ URL `http://localhost:8080/`。图 17-2 展示了 Grails 应用程序的默认主屏幕。\n\n![A314861_4_En_17_Fig2_HTML.jpg](img/A314861_4_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2. court Grails 应用程序的默认主屏幕\n\n该应用程序仍处于其开箱即用状态。接下来，我们将说明如何创建您的第一个 Grails 构造，以实现更多节省时间的过程。\n\
  \n创建您的第一个 Grails 应用程序构造\n\n现在您已经看到创建 Grails 应用程序是多么容易，让我们以控制器的形式引入一个应用程序构造。这将进一步说明\
  \ Grails 如何自动化 Java 应用程序开发过程中的一系列步骤。\n\n在 Grails 应用程序的根目录下，调用 `grails create-controller\
  \ welcome`。执行此命令将执行以下步骤：\n\n1.  在应用程序目录 `grails-app/controllers` 下创建一个名为 `WelcomeController.groovy`\
  \ 的控制器。\n2.  在应用程序目录 `grails-app/views` 下创建一个名为 `welcome` 的目录。\n3.  在应用程序目录 `src/u`\
  \ 下创建一个名为 `WelcomeControllerSpec.groovy` 的测试类。\n\n作为第一步，让我们分析 Grails 生成的控制器内容。`WelcomeController.groovy`\
  \ 控制器的内容如下：\n\n```\nclass WelcomeController {\ndef index {}\n}\n```\n\n如果您不熟悉 Groovy，语法可能会显得别扭。但这只是一个名为\
  \ `WelcomeController` 的类，其中包含一个名为 `index` 的方法。其目的与您在第 3 章中创建的 Spring MVC 控制器相同。`WelcomeController`\
  \ 代表一个控制器类，而方法 `index` 代表一个处理器方法。然而，在这种状态下，控制器什么也不做。将其修改为如下所示：\n\n```\nclass WelcomeController\
  \ {\nDate now = new Date()\ndef index = {[today:now]}\n}\n```\n\n第一个添加项是一个分配给 `now`\
  \ 类字段的 `Date` 对象，用于表示系统日期。由于 `def index {}` 代表一个处理器方法，添加 `[today:now]` 用作返回值。在这种情况下，返回值代表一个名为\
  \ `today` 的变量，其值为 `now` 类字段，并且该变量的值将被传递给与该处理器方法关联的视图。\n\n\n\n假设你有一个控制器和一个返回当前日期的处理方法，就可以创建相应的视图。如果你进入\
  \ `grails-app/views/welcome` 目录，会发现其中没有任何视图。然而，Grails 会尝试根据处理方法的名称，在这个目录下为 `WelcomeController`\
  \ 控制器寻找一个视图；这同样是 Grails 采用的众多约定之一。\n\n因此，请在该目录下创建一个名为 `index.gsp` 的 GSP 页面，内容如下：\n\
  \n```\n\n欢迎\n\n欢迎使用球场预约系统\n今天是\n\n```\n\n这是一个标准的 GSP 页面，它使用了表达式和一个标签库。在编写 GSP 页面时，可以使用\
  \ `g` 标签来调用默认的标签库。`formatDate` 标签会渲染一个名为 `${today}` 的变量，这个变量正是名为 `index` 的控制器处理方法所返回的变量名。\n\
  \n接下来，从 Grails 应用的根目录执行命令 `grails run-app`。这会自动构建应用，编译控制器类，将文件复制到所需位置，同时启动 Apache\
  \ Tomcat Web 容器并部署应用。\n\n遵循相同的 Grails 约定流程，`WelcomeController` 及其处理方法和视图将通过上下文路径\
  \ `http://localhost:8080/welcome/` 被访问。由于 `index` 是上下文路径使用的默认页面，如果你打开浏览器访问 `http://localhost:8080/welcome/`\
  \ 或显式 URL `http://localhost:8080/welcome/index`，你将看到之前那个渲染控制器返回的当前日期的 JSP 页面。请注意\
  \ URL 中缺少视图扩展名（例如 `.html`）。Grails 默认隐藏了视图技术；在更高级的 Grails 场景中，这样做的原因会更加明显。\n\n当你重复创建应用控制器和视图所需的简单步骤时，请记住，你无需创建或修改任何配置文件，无需手动将文件复制到不同位置，也无需设置\
  \ Web 容器来运行应用。随着应用的推进，避免这些在 Java Web 应用中常见的脚手架步骤，可以极大地缩短开发时间。\n\n将 Grails 应用导出为\
  \ WAR 文件\n\n前面的步骤都是在 Grails 环境范围内执行的。也就是说，你依赖 Grails 来引导 Web 容器并运行应用。然而，当你想在生产环境中运行\
  \ Grails 应用时，你无疑需要生成一种格式，以便将应用部署到外部 Web 容器中，对于 Java 应用来说，这种格式就是 WAR 文件。\n\n在 Grails\
  \ 应用的根目录下，执行 `grails war` 命令。执行此命令会在根目录下生成一个名为 `<应用名称>-<应用版本>.war` 的 WAR 文件。这个 WAR\
  \ 文件是一个自包含的文件，包含了在任何 Java 标准 Web 容器上运行 Grails 应用所需的所有必要元素。以球场应用为例，会在 Grails 应用的根目录下生成一个名为\
  \ `court-0.1.war` 的文件，应用版本取自 `application.properties` 文件中定义的 `app.version` 参数。\n\
  \n根据 Apache Tomcat 的部署约定，名为 `court-0.1.war` 的 WAR 文件可以通过 `http://localhost:8080/court-0.1/`\
  \ 形式的 URL 访问。WAR 部署到 URL 的约定可能因 Java Web 容器（例如 Jetty 或 Oracle WebLogic）而异。\n\n17-3.\
  \ 获取 Grails 插件\n\n问题\n\n你希望在 Grails 应用中使用 Java 框架或 Java API 的功能，同时利用 Grails 技术来省去脚手架步骤。问题不仅仅是在应用中使用\
  \ Java 框架或 Java API（这可以通过简单地将相应的 JAR 包放入应用的 `lib` 目录来实现），而是要让 Java 框架或 Java API\
  \ 与 Grails 紧密集成，这正是 Grails 插件所提供的功能。\n\n所谓与 Grails 紧密集成，是指能够使用快捷指令（例如 `grails <插件任务>`）来执行特定的\
  \ Java 框架或 Java API 任务，或者能够在应用的类或配置文件中使用其功能，而无需采用脚手架步骤。\n\n解决方案\n\n实际上，Grails 自带了一些预安装的插件，尽管如果你只使用\
  \ Grails 的开箱即用功能，这一点并不明显。然而，有许多 Grails 插件可以使特定 Java 框架或 Java API 的使用过程像使用 Grails\
  \ 核心功能一样高效。以下是一些比较流行的 Grails 插件：\n\n*   App Engine：将 Google 的 App Engine SDK 和工具与\
  \ Grails 集成\n*   Quartz：集成 Quartz 企业级任务调度器，用于调度任务并按指定的时间间隔或 cron 表达式执行\n*   Spring\
  \ WS：基于 Spring Web Services 项目，集成并支持 Web 服务的提供\n*   Clojure：集成 Clojure，并允许在 Grails\
  \ 工件中执行 Clojure 代码\n\n要获取 Grails 插件的完整列表，可以执行命令 `grails list-plugins`。此命令会连接到 Grails\
  \ 插件仓库并显示所有可用的 Grails 插件。此外，可以使用命令 `grails plugin-info <插件名称>` 来获取特定插件的详细信息。或者，你也可以访问位于\
  \ [`http://grails.org/plugin/home`](http://grails.org/plugin/home) 的 Grails 插件页面。\n\
  \n安装 Grails 插件就像向你的 `build.gradle` 文件中添加一个依赖一样简单；卸载则是相反的操作，将其从 `build.gradle` 文件中移除。\n\
  \n工作原理\n\nGrails 插件遵循一系列约定，使其能够将特定的 Java 框架或 Java API 与 Grails 紧密集成。默认情况下，Grails\
  \ 预装了 Apache Tomcat 和 Hibernate 插件。\n\n除了这些默认插件之外，还可以按应用安装额外的插件。例如，要安装 Clojure 插件，你需要将以下依赖添加到\
  \ `build.gradle` 文件中：\n\n```\ndependencies {\ncompile \"org.grails.plugins:clojure:2.0.0.RC4\"\
  \n}\n```\n\n17-4. 在 Grails 环境中开发、生产与测试\n\n问题\n\n你希望根据应用运行的环境（例如开发、生产和测试）为同一个应用使用不同的参数。\n\
  \n解决方案\n\nGrails 预见到 Java 应用可能会经历需要不同参数的各个阶段。这些阶段，Grails 称之为环境，例如可以是开发、生产和测试。\n\n\
  最明显的场景涉及数据源，你可能会为开发、生产和测试环境使用不同的持久化存储系统。由于每个存储系统会使用不同的连接参数，因此为多个环境配置参数，并让 Grails\
  \ 根据应用的操作连接到相应的环境，会更加方便。\n\n除了数据源，Grails 还为其他可能在不同应用环境间变化的参数提供了相同的功能，例如用于创建应用绝对链接的服务器\
  \ URL。\n\nGrails 应用环境的配置参数在位于应用 `/grails-app/conf/` 目录下的文件中指定。\n\n工作原理\n\n\n\n根据您执行的操作，Grails\
  \ 会自动选择最合适的环境：开发、生产或测试。例如，当您调用 `grails run-app` 命令时，这表示您仍在本地开发应用程序，因此会假定为开发环境。实际上，当您执行此命令时，在输出中您会看到类似下面的一行：\n\
  \n```\nEnvironment set to development\n```\n\n这意味着为开发环境设置的任何参数都将用于构建、配置和运行应用程序。另一个例子是\
  \ `grails war` 命令。由于将 Grails 应用程序导出为独立的 WAR 文件意味着您将在外部 Web 容器上运行它，因此 Grails 会假定为生产环境。在此命令生成的输出中，您会找到类似下面的一行：\n\
  \n```\nEnvironment set to production\n```\n\n这意味着为生产环境设置的任何参数都将用于构建、配置和导出应用程序。最后，如果您运行像\
  \ `grails test-app` 这样的命令，Grails 会假定为测试环境。这意味着为测试环境设置的任何参数都将用于构建、配置和运行测试。在此命令生成的输出中，您会找到类似下面的一行：\n\
  \n```\nEnvironment set to test\n```\n\n在位于应用程序目录 `/grails-app/conf/` 下的 `application.yml`\
  \ 文件中，您可以找到如下格式的章节：\n\n```\nenvironments:\ndevelopment:\ndataSource:\ndbCreate:\
  \ create-drop\nurl: jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
  test:\ndataSource:\ndbCreate: update\nurl: jdbc:h2:mem:testDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
  production:\ndataSource:\ndbCreate: none\nurl: jdbc:h2:./prodDb;MVCC=TRUE;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE\n\
  ```\n\n在最后这个清单中，根据应用程序的环境，为持久化存储系统指定了不同的连接参数。这允许应用程序在不同的数据集上运行，因为您肯定不希望开发环境的修改发生在生产环境所使用的同一数据集上。需要注意的是，这并不意味着这些最后的示例是唯一允许根据应用程序环境进行配置的参数。您同样可以将任何参数放在相应的环境章节中。这些最后的示例仅仅代表了在应用程序的不同环境之间最可能发生变化的参数。\n\
  \n也可以根据给定的应用程序环境执行编程逻辑（例如，在类或脚本内部）。这是通过 `grails.util.Environment` 类实现的。以下清单说明了此过程：\n\
  \n```\nimport grails.util.Environment\n...\n...\nswitch(Environment.current) {\n\
  case Environment.DEVELOPMENT:\n// 执行开发逻辑\nbreak\ncase Environment.PRODUCTION:\n\
  // 执行生产逻辑\nbreak\n}\n```\n\n最后这段代码片段说明了类如何首先导入 `grails.util.Environment` 类。然后，根据包含应用程序运行环境的\
  \ `Environment.current` 值，代码使用 switch 条件语句根据此值执行逻辑。\n\n这种情况在诸如发送电子邮件或执行地理定位等领域可能很常见。在开发环境中发送电子邮件或确定用户的位置是没有意义的，因为开发团队的位置无关紧要，而且也不需要应用程序的电子邮件通知。\n\
  \n最后，值得一提的是，您可以覆盖任何 Grails 命令使用的默认环境。\n\n例如，默认情况下，`grails run-app` 命令使用为 `development`\
  \ 环境指定的参数。如果出于某种原因，您想使用为生产环境指定的参数来运行此命令，可以使用以下指令：`grails prod run-app`。如果您想使用为测试环境指定的参数，也可以使用以下指令：`grails\
  \ test run-app`。\n\n同样，对于像 `grails test-app` 这样使用为测试环境指定参数的命令，您可以通过使用命令 `grails\
  \ dev test-app` 来使用属于开发环境的参数。所有其他命令也是如此，只需在 `grails` 命令之后插入 `prod`、`test` 或 `dev`\
  \ 关键字即可。\n\n17-5. 创建应用程序的领域类\n\n问题\n\n您需要定义应用程序的领域类。\n\n解决方案\n\n领域类用于描述应用程序的主要元素和特性。如果应用程序是为处理预订而设计的，它很可能有一个用于保存预订的领域类。同样，如果预订与某个人相关联，应用程序将有一个用于保存人员信息的领域类。\n\
  \n在 Web 应用程序中，领域类通常是最先被定义的内容，因为这些类代表要保存到永久存储系统中的数据，以便与控制器交互，同时也代表要在视图中显示的数据。\n\n\
  在 Grails 中，领域类位于 `/grails-app/domain/` 目录下。与 Grails 中的大多数其他操作一样，可以通过执行一个简单的命令来创建领域类，格式如下：\n\
  \n```\ngrails create-domain-class \n```\n\n最后这个命令会在 `/grails-app/domain/` 目录下生成一个名为\
  \ `<domain_class_name>.groovy` 的领域类骨架文件。\n\n工作原理\n\nGrails 会创建领域类骨架，但您仍然需要修改每个领域类以反映应用程序的目的。\n\
  \n让我们创建一个预订系统，类似于您在第 4 章中为体验 Spring MVC 而创建的那个。创建两个领域类，一个名为 `Reservation`，另一个名为\
  \ `Player`。为此，请执行以下命令：\n\n```\ngrails create-domain-class Player\ngrails create-domain-class\
  \ Reservation\n```\n\n执行这些命令后，一个名为 `Player.groovy` 的类文件和另一个名为 `Reservation.groovy`\
  \ 的类文件会被放置在应用程序的 `/grails-app/domain/` 目录下。此外，还会为每个领域类在应用程序的 `src/test/groovy` 目录下生成相应的单元测试文件，不过测试将在配方\
  \ 17-10 中讨论。接下来，打开 `Player.groovy` 类，将其内容编辑如下：\n\n```\nclass Player {\nstatic hasMany\
  \ = [ reservations : Reservation ]\nString name\nString phone\nstatic constraints\
  \ = {\nname(blank:false)\nphone(blank:false)\n}\n}\n```\n\n第一个新增内容 `static hasMany\
  \ = [ reservations : Reservation ]` 表示领域类之间的关系。此语句表明 `Player` 领域类有一个 reservations\
  \ 字段，该字段关联了许多 `Reservation` 对象。接下来的语句表明 `Player` 领域类还有两个 `String` 字段，一个名为 `name`，另一个名为\
  \ `phone`。\n\n剩下的元素 `static constraints = { }` 定义了领域类的约束条件。在这种情况下，声明 `name(blank:false)`\
  \ 表明 `Player` 对象的 `name` 字段不能留空。声明 `phone(blank:false)` 表明除非提供了 `phone` 字段的值，否则无法创建\
  \ `Player` 对象。修改完 `Player` 领域类后，打开 `Reservation.groovy` 类来编辑其内容。\n\n\n\n```\npackage\
  \ court\nimport java.time.DayOfWeek\nimport java.time.LocalDateTime\nclass Reservation\
  \ {\nstatic belongsTo = Player\nString courtName;\nLocalDateTime date;\nPlayer player;\n\
  String sportType;\nstatic constraints = {\nsportType(inList: [\"Tennis\", \"Soccer\"\
  ])\ndate(validator: { val, obj ->\nif (val.getDayOfWeek() == DayOfWeek.SUNDAY &&\
  \ (val.getHour()  22)) {\nreturn ['invalid.holidayHour']\n} else if (val.getHour()\
  \  21) {\nreturn ['invalid.weekdayHour']\n}\n})\n}\n}\n```\n\n添加到 `Reservation`\
  \ 领域类的第一条语句 `static belongsTo = Player` 表明，一个 `Reservation` 对象始终属于一个 `Player` 对象。接下来的语句表明\
  \ `Reservation` 领域类包含一个名为 `courtName` 的 `String` 类型字段、一个名为 `date` 的 `LocalDateTime`\
  \ 类型字段、一个名为 `player` 的 `Player` 类型字段，以及另一个名为 `sportType` 的 `String` 类型字段。\n\n`Reservation`\
  \ 领域类的约束比 `Player` 领域类稍微复杂一些。第一个约束 `sportType(inList:[\"Tennis\", \"Soccer\"])`\
  \ 将 `Reservation` 对象的 `sportType` 字段限制为字符串值 `Tennis` 或 `Soccer`。第二个约束是一个自定义验证器，用于确保\
  \ `Reservation` 对象的日期字段根据星期几处于特定的小时范围内。\n\n现在你已经有了应用程序的领域类，就可以为应用程序创建相应的视图和控制器了。\n\
  \n不过，在继续之前，有必要先谈谈 Grails 领域类。虽然你在本教程中创建的领域类让你对定义 Grails 领域类所用的语法有了基本了解，但它们仅展示了 Grails\
  \ 领域类可用功能的一小部分。\n\n随着领域类之间的关系变得越来越复杂，定义 Grails 领域类时可能需要更复杂的结构。这是因为 Grails 依赖领域类来实现各种应用程序功能。\n\
  \n例如，如果从应用程序的持久化存储系统中更新或删除了一个领域对象，那么领域类之间的关系需要被良好地建立。如果关系没有良好建立，应用程序中就可能出现数据不一致的情况（例如，如果删除了一个人对象，其对应的预订也需要被删除，以避免应用程序预订状态不一致）。\n\
  \n同样，可以使用各种约束来强制领域类的结构。在某些情况下，如果约束过于复杂，通常会在创建某个领域类的对象之前，将其纳入应用程序的控制器中。不过，在本教程中，我们使用了模型约束来演示\
  \ Grails 领域类的设计。\n\n17-6. 为应用程序的领域类生成 CRUD 控制器和视图\n\n问题\n\n你需要为应用程序的领域类生成创建、读取、更新和删除（CRUD）控制器和视图。\n\
  \n解决方案\n\n应用程序的领域类本身用处不大。映射到领域类的数据仍然需要被创建、呈现给最终用户，并可能保存到持久化存储系统中以备将来使用。\n\n在由持久化存储系统支持的网络应用程序中，这些对领域类的操作通常被称为\
  \ CRUD 操作。在大多数网络框架中，生成 CRUD 控制器和视图需要大量的工作。这是因为需要能够创建、读取、更新和删除持久化存储系统中领域对象的控制器，以及为最终用户创建、读取、更新和删除这些相同对象而创建相应的视图（例如，JSP\
  \ 页面）。\n\n然而，由于 Grails 基于约定运作，为应用程序的领域类生成 CRUD 控制器和视图的机制很简单。你可以执行以下命令来为应用程序的领域类生成相应的\
  \ CRUD 控制器和视图：\n\n```\ngrails generate-all \n```\n\n工作原理\n\nGrails 能够检查应用程序的领域类，并生成必要的相应控制器和视图，以创建、读取、更新和删除属于应用程序领域类的实例。\n\
  \n例如，以你之前创建的 `Player` 领域类为例。要生成其 CRUD 控制器和视图，你只需从应用程序的根目录执行以下命令：\n\n```\ngrails\
  \ generate-all court.Player\n```\n\n类似的命令也适用于 `Reservation` 领域类。只需执行以下命令即可生成其 CRUD\
  \ 控制器和视图：\n\n```\ngrails generate-all court.Reservation\n```\n\n那么，执行这些步骤实际生成了什么呢？如果你看到了这些命令的输出，你会有相当清晰的概念，但我还是在此回顾一下这个过程。\n\
  \n1.  编译应用程序的类。\n2.  在 `grails-app/i18n` 目录下生成 12 个属性文件，以支持应用程序的国际化（例如，`messages_<language>.properties`）。\n\
  3.  创建一个名为 `<domain_class>Controller.groovy` 的控制器，其中包含为关系型数据库管理系统（RDBMS）设计的 CRUD\
  \ 操作，并将其放置在应用程序的 `grails-app/controllers` 目录下。\n4.  创建与控制器类的 CRUD 操作相对应的四个视图，分别命名为\
  \ `create.gsp`、`edit.gsp`、`index.gsp` 和 `show.gsp`。请注意，`.gsp` 扩展名代表“Groovy Server\
  \ Pages”，它相当于 JavaServer Pages，只是使用 Groovy 而非 Java 来声明程序语句。这些视图放置在应用程序的 `grails-app/views/<domain_class>`\
  \ 目录下。\n\n完成这些步骤后，你可以使用 `grails run-app` 启动 Grails 应用程序，并以最终用户的身份使用该应用程序。是的，你没看错；执行这些简单的命令后，应用程序现在就可以供最终用户使用了。这就是\
  \ Grails 基于约定运作的宗旨，通过一个单词的命令简化脚手架代码的创建。应用程序启动后，你可以在以下 URL 对 `Player` 领域类执行 CRUD\
  \ 操作：\n\n*   创建：`http://localhost:8080/player/create`\n*   读取：`http://localhost:8080/player/list`（用于所有玩家）或\
  \ `http://localhost:8080/court/player/show/<player_id>`\n*   更新：`http://localhost:8080/player/edit/<player_id>`\n\
  *   删除：`http://localhost:8080/player/delete/<player_id>`\n\n每个视图之间的页面导航比这些 URL 所呈现的更为直观，但我们稍后会通过一些截图来说明。关于这些\
  \ URL，需要注意的一个重要点是它们的约定。注意模式 `<domain>/<app_name>/<domain_class>/<crud_action>/<object_id>`，其中\
  \ `<object_id>` 根据操作类型是可选的。\n\n除了用于定义 URL 模式，这些约定还贯穿于应用程序的各个工件中。例如，如果你检查 `PlayerController.groovy`\
  \ 控制器，你会发现其中包含以各种 `<crud_action>` 值命名的处理方法。同样，如果你检查应用程序的后端关系型数据库管理系统（RDBMS），你会注意到领域类对象是使用与\
  \ URL 中相同的 `<player_id>` 来保存的。\n\n既然你已经了解了 CRUD 操作在 Grails 应用程序中的结构，那么请访问地址 `http://localhost:8080/player/create`\
  \ 来创建一个 `Player` 对象。访问此页面后，你会看到一个 HTML 表单，其中包含你为 `Player` 领域类定义的相同字段值。\n\n\n\n在\
  \ name 和 phone 字段中分别输入任意两个值并提交表单。你刚刚将一个 `Player` 对象持久化到了关系型数据库管理系统（RDBMS）中。默认情况下，Grails\
  \ 预配置为使用 HSQLDB（一种内存型 RDBMS）。后续的配方将说明如何将其更改为其他 RDBMS；目前，HSQLDB 已经足够。\n\n接下来，尝试提交相同的表单，但这次不输入任何值。Grails\
  \ 不会持久化 `Player` 对象；相反，它会显示两条警告消息，指示 name 和 phone 字段不能为空，如图 17-3 所示。\n\n![A314861_4_En_17_Fig3_HTML.jpg](img/A314861_4_En_17_Fig3_HTML.jpg)\n\
  \n图 17-3.\n\n在视图（本例中为 HTML 表单）中进行的 Grails 领域类验证\n\n此验证过程之所以生效，是因为你在 `Player` 领域类中放置了\
  \ `name(blank:false)` 和 `phone(blank:false)` 这两个声明。你无需修改应用程序的控制器或视图，甚至无需为这些错误消息创建属性文件；一切均由\
  \ Grails 基于约定的方法处理。\n\n注意\n\n使用支持 HTML5 的浏览器时，你将无法提交该表单。两个输入元素都被标记为必填，这会阻止在这些浏览器中提交表单。这些规则也是基于前面提到的声明添加的。\n\
  \n尝试使用 `Player` 领域类的其余可用视图，直接从 Web 浏览器创建、读取、更新和删除对象，以感受 Grails 如何处理这些任务。\n\n继续操作应用程序，你还可以通过以下\
  \ URL 对 `Reservation` 领域类执行 CRUD 操作：\n\n*   创建：`http://localhost:8080/reservation/create`\n\
  \n*   读取：`http://localhost:8080/reservation/list`（用于所有预订）或 `http://localhost:8080/court/reservation/show/<reservation_id>`\n\
  \n*   更新：`http://localhost:8080/reservation/edit/<reservation_id>`\n\n*   删除：`http://localhost:8080/reservation/delete/<reservation_id>`\n\
  \n这些最后的 URL 与 `Player` 领域类的 URL 用途相同：能够从 Web 界面创建、读取、更新和删除属于 `Reservation` 领域类的对象。\n\
  \n接下来，让我们分析用于创建 `Reservation` 对象的 HTML 表单，该表单位于 URL `http://localhost:8080/reservation/create`。图\
  \ 17-4 展示了此表单。\n\n![A314861_4_En_17_Fig4_HTML.jpg](img/A314861_4_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4.\n\nGrails 领域类 HTML 表单，填充了来自另一个类的领域对象\n\n图 17-4 在多个方面都很有趣。尽管 HTML 表单仍然是基于\
  \ `Reservation` 领域类的字段创建的，就像 `Player` 领域类的 HTML 表单一样，但请注意它包含多个预填充的 HTML 选择菜单。\n\n\
  第一个选择菜单属于 `sportType` 字段。由于此特定字段有一个定义约束，要求其字符串值必须为 `Soccer` 或 `Tennis`，因此 Grails\
  \ 会自动向用户提供这些选项，而不是允许开放式字符串并在之后进行验证。\n\n第二个选择菜单属于 `date` 字段。在这种情况下，Grails 会生成多个表示日期的\
  \ HTML 选择菜单，以使日期选择过程更容易，而不是允许开放式日期并在之后进行验证。\n\n第三个选择菜单属于 player 字段。此选择菜单的选项不同，因为它们取自你为应用程序创建的\
  \ `Player` 对象。这些值是通过查询应用程序的 RDBMS 提取的；如果你添加另一个 `Player` 对象，它将自动出现在此选择菜单中。\n\n此外，对\
  \ date 字段执行了验证过程。如果所选日期不符合特定范围，则 `Reservation` 对象无法持久化，并且表单上会出现一条警告消息。\n\n目前你无法提交有效的\
  \ `Reservation`，因为 `date` 字段只接受 `date` 而不接受时间。要解决此问题，请打开 `views/reservation` 目录下的\
  \ `create.gsp`（以及 `edit.gsp`）文件。其中包含一个 `<f:all bean=\"reservation\" />` 标签。此标签负责创建\
  \ HTML 表单，并根据字段类型渲染 HTML 输入元素。为了也能输入时间，请添加一个 `<g:datePicker />` 标签，并将 `date` 字段从默认表单中排除。\n\
  \n```\n\nDate\n\n```\n\n`<g:datePicker />` 标签允许你指定 `precision` 值。当设置为 `minute` 时，它允许在日期旁边设置小时和分钟。现在，当选择适当的范围时，就可以存储\
  \ `Reservation` 了。\n\n尝试使用 `Reservation` 领域类的其余可用视图，直接从 Web 浏览器创建、读取、更新和删除对象。\n\n\
  最后，为了全面了解情况，请认识到你的应用程序在几个步骤中已经完成的工作：验证输入；从 RDBMS 创建、读取、更新和删除对象；根据 RDBMS 中的数据完成 HTML\
  \ 表单；以及支持国际化。而你甚至还没有修改过配置文件，没有被要求使用 HTML，也不需要处理 SQL 或对象关系映射器（ORM）。\n\n17-7. 为消息属性实现国际化（I18n）\n\
  \n问题\n\n你需要国际化 Grails 应用程序中使用的值。\n\n解决方案\n\n默认情况下，所有 Grails 应用程序都具备支持国际化的能力。在应用程序的\
  \ `/grails-app/i18n/` 文件夹中，你可以找到一系列用于定义 12 种语言消息的 `*.properties` 文件。这些 `*.properties`\
  \ 文件中声明的值允许 Grails 应用程序根据用户的语言偏好或应用程序的默认语言显示消息。在 Grails 应用程序中，可以从包括视图（JSP 或 GSP\
  \ 页面）或应用程序上下文在内的位置访问 `*.properties` 文件中声明的值。\n\n工作原理\n\nGrails 根据两个标准确定为用户使用哪个区域设置（即来自哪个国际化属性文件）：\n\
  \n*   应用程序的 `/grails-app/conf/spring/resource.groovy` 文件中的显式配置\n\n*   用户的浏览器语言偏好\n\
  \n由于应用程序区域设置的显式配置优先于用户的浏览器语言偏好，因此应用程序的 `resource.groovy` 文件中不存在默认配置。这确保了如果用户的浏览器语言偏好设置为西班牙语（`es`）或德语（`de`），用户将收到来自西班牙语或德语属性文件（例如\
  \ `messages_es.properties` 或 `messages_de.properties`）的消息。另一方面，如果应用程序的 `resource.groovy`\
  \ 文件配置为使用意大利语（`it`），则无论用户的浏览器语言偏好如何，用户都将始终收到来自意大利语属性文件（例如 `messages_it.properties`）的消息。\n\
  \n因此，仅当你希望强制用户使用特定的语言区域设置时，才应在应用程序的 `/grails-app/conf/spring/resource.groovy` 文件中定义显式配置。例如，也许你不想更新多个国际化属性文件，或者你只是看重统一性。\n\
  \n由于 Grails 国际化基于 Spring 的区域设置解析器，你需要将以下内容放入应用程序的 `/grails-app/conf/spring/resource.groovy`\
  \ 文件中，以强制用户使用特定语言：\n\n```\nimport org.springframework.web.servlet.i18n.SessionLocaleResolver\n\
  beans = {\nlocaleResolver(SessionLocaleResolver) {\ndefaultLocale= Locale.ENGLISH\n\
  Locale.setDefault (Locale.ENGLISH)\n}\n}\n```\n\n\n\n通过使用这最后一条声明，任何访客都将收到来自英文属性文件（例如\
  \ `messages_en.properties`）的消息，无论其浏览器的语言偏好设置如何。同样值得一提的是，如果你指定了一个没有对应属性文件的区域设置，Grails\
  \ 会回退到使用默认的 `messages.properties` 文件。该文件默认是英文的，但如果你愿意，也可以轻松修改其值以反映另一种语言。当用户的浏览器语言偏好作为定义选择标准时（例如，如果用户浏览器的语言偏好设置为中文，但不存在中文属性文件，Grails\
  \ 就会回退到使用默认的 `messages.properties` 文件），也会出现同样的情况。\n\n现在你已经了解了 Grails 如何确定选择哪个属性文件来提供本地化内容，让我们来看看\
  \ Grails `*.properties` 文件的语法：\n\n```\ndefault.paginate.next=Next\ntypeMismatch.java.net.URL=Property\
  \ {0} must be a valid URL\ndefault.blank.message=Property [{0}] of class [{1}] cannot\
  \ be blank\ndefault.invalid.email.message=Property [{0}] of class [{1}] with value\
  \ [{2}] is not a valid e-mail address\ndefault.invalid.range.message=Property [{0}]\
  \ of class [{1}] with value [{2}] does not fall within the valid range from [{3}]\
  \ to [{4}]\n```\n\n第一行是 `*.properties` 文件中最简单的声明。如果 Grails 在应用程序中遇到名为 `default.paginate.next`\
  \ 的属性，它会将其替换为值 `Next`，或者根据用户确定的区域设置为该相同属性指定的任何其他值。\n\n在某些情况下，可能需要提供更明确的消息，这些消息最好在调用本地化消息的地方确定。这就是键\
  \ `{0}`、`{1}`、`{2}`、`{3}` 和 `{4}` 的用途。它们是用于本地化属性的参数。通过这种方式，显示给用户的本地化消息可以传达更详细的信息。图\
  \ 17-5 展示了根据用户浏览器语言偏好为法庭应用程序确定的本地化和参数化消息。\n\n![A314861_4_En_17_Fig5_HTML.jpg](img/A314861_4_En_17_Fig5_HTML.jpg)\n\
  \n图 17-5.\n\nGrails 本地化和参数化消息，根据用户浏览器语言偏好确定（从左到右，从上到下：西班牙语、德语、意大利语和法语）\n\n掌握了这些知识后，在\
  \ Grails `message.properties` 文件中定义以下四个属性：\n\n```\ninvalid.holidayHour=Invalid holiday\
  \ hour\ninvalid.weekdayHour=Invalid weekday hour\nwelcome.title=Welcome to Grails\n\
  welcome.message=Welcome to Court Reservation System\n```\n\n接下来，是时候探索如何在 Grails\
  \ 应用程序中定义属性占位符了。\n\n在配方 17-5 中，你可能没有意识到，但你为 `Reservation` 领域类声明了一个本地化属性。在验证部分（`static\
  \ constraints =  { }`），你创建了以下形式的语句：\n\n```\nreturn ['invalid.weekdayHour']\n```\n\
  \n如果执行到这条语句，Grails 会尝试在属性文件中找到一个名为 `invalid.weekdayHour` 的属性，并根据用户确定的区域设置替换其值。也可以将本地化属性引入应用程序的视图中。例如，你可以修改配方\
  \ 17-2 中创建并位于 `/court/grails-app/views/welcome/index.gsp` 的 GSP 页面，以使用以下内容：\n\n\
  ```\n\nToday is\n\n```\n\n这个 GSP 页面使用了 `<g:message/>` 标签。然后，使用 `code` 属性，定义了 `welcome.title`\
  \ 和 `welcome.messsage` 这两个属性，一旦 JSP 被渲染，这两个属性都将被替换为相应的本地化值。\n\n17-8. 更改永久存储系统\n\n\
  问题\n\n你想将 Grails 应用程序的永久存储系统更改为你喜欢的 RDBMS。\n\n解决方案\n\nGrails 被设计为使用 RDBMS 作为永久存储系统。默认情况下，Grails\
  \ 预配置为使用 HSQLDB。HSQLDB 是一个在部署应用程序时（即执行 `grails run-app`）由 Grails 自动启动的数据库。\n\n然而，HSQLDB\
  \ 的简单性也可能是其主要缺点。每次在开发和测试环境中重新启动应用程序时，由于 HSQLDB 被配置为在内存中运行，它会丢失所有数据。尽管在生产环境中，Grails\
  \ 应用程序配置了 HSQLDB 以将数据永久存储在文件中，但对于某些应用程序需求来说，HSQLDB 的功能集可能被视为有限。\n\n你可以通过修改位于 `grails-app/conf`\
  \ 目录下的应用程序 `application.yml` 文件，来配置 Grails 使用另一个 RDBMS。在此文件中，你可以配置最多三个 RDBMS，分别对应应用程序所处的三个环境——开发、生产和测试。有关\
  \ Grails 应用程序中开发、生产和测试环境的更多信息，请参见配方 17-4。\n\n工作原理\n\nGrails 依赖标准的 Java JDBC 表示法来指定\
  \ RDBMS 连接参数，以及依赖每个 RDBMS 供应商提供的相应 JDBC 驱动程序，来创建、读取、更新和删除信息。\n\n如果你更改 RDBMS，需要注意的一个重要方面是，Grails\
  \ 使用一个名为 Groovy 对象关系映射器（GROM）的 ORM 来与 RDBMS 交互。GROM 背后的目的与其他所有 ORM 解决方案相同——让你能够专注于应用程序的业务逻辑，而无需担心\
  \ RDBMS 实现的特殊性，这些特殊性可能包括数据类型差异到直接使用 SQL 等。GROM 允许你设计应用程序的领域类，并将你的设计映射到你选择的 RDBMS。\n\
  \n设置 RDBMS 驱动程序\n\n更改 Grails 默认 RDBMS 的第一步是，将你选择的 RDBMS 的 JDBC 驱动程序添加到 `gradle.build`\
  \ 文件中。这允许应用程序访问将对象持久化到特定 RDBMS 所需的 JDBC 类。\n\n配置 RDBMS 实例\n\n第二步包括修改位于应用程序 `grails-app/conf`\
  \ 目录下的 `application.yml` 文件。在此文件中，有三个用于定义 RDBMS 实例的部分。\n\n每个 RDBMS 实例对应一个不同的可能应用程序环境：开发、生产和测试。根据你采取的操作，Grails\
  \ 会选择其中一个实例来执行应用程序设计要执行的任何永久存储操作。有关 Grails 应用程序中开发、生产和测试环境的更多信息，请参见配方 17-4。\n\n\
  然而，在每个部分中声明 RDBMS 所使用的语法是相同的。表 17-1 包含了在 `dataSource` 定义中可用于配置 RDBMS 的各种属性。\n\n\
  表 17-1.\n\n用于配置 RDBMS 的 dataSource 属性\n\n属性\n |\n  定义\n |\n\n| --- | --- | --- |\
  \ --- | --- |\n\n`driverClassName`\n |\n  JDBC 驱动程序的类名\n |\n\n`username`\n |\n \
  \ 用于建立与 RDBMS 连接的用户名\n |\n\n`password`\n |\n  用于建立与 RDBMS 连接的密码\n |\n\n`url`\n |\n\
  \  RDBMS 的 URL 连接参数\n |\n\n`pooled`\n |\n  指示是否对 RDBMS 使用连接池；默认为 true\n |\n\n`jndiName`\n\
  \ |\n  指示数据源的 JNDI 连接字符串（这是直接在 Grails 中配置 `driverClassName`、`username`、`password`\
  \ 和 `url` 的替代方案，转而依赖在 Web 容器中配置的数据源）\n |\n\n`logSql`\n |\n  指示是否启用 SQL 日志记录\n |\n\
  \n`dialect`\n |\n  指示执行操作的 RDBMS 方言\n |\n\n`properties`\n |\n  用于指示 RDBMS 操作的额外参数\n\
  \ |\n\n`dbCreate`\n |\n  指示 RDBMS 数据定义语言（DDL）的自动生成\n |\n\ndbCreate 值\n |\n  定义\n\
  \ |\n\n\n\n`create-drop`\n |\n  当 Grails 运行时，删除并重新创建 RDBMS DDL（警告：会删除 RDBMS 中所有现有数据）\n\
  \ |\n\n`create`\n |\n  如果 RDBMS DDL 不存在则创建，若已存在则不修改（警告：会删除 RDBMS 中所有现有数据）\n |\n\n\
  `update`\n |\n  如果 RDBMS DDL 不存在则创建，若已存在则更新\n |\n\n如果你使用过 Java ORM（如 Hibernate 或\
  \ EclipseLink），那么表 17-1 中的参数应该相当熟悉。以下代码展示了 MySQL RDBMS 的 `dataSource` 定义：\n\n```\n\
  dataSource:\ndbCreate: update\npooled: true\njmxExport: true\ndriverClassName: com.mysql.jdbc.Driver\n\
  username: grails\npassword: groovy\n```\n\n在上述定义的属性中，最需要小心的是 `dbCreate`，因为它可能破坏\
  \ RDBMS 中的数据。在此例中，`update` 值是三个可用值中最保守的，如表 17-1 所述。\n\n如果你使用的是生产环境的 RDBMS，那么 `dbCreate=\"\
  update\"` 无疑是首选策略，因为它不会破坏 RDBMS 中的任何数据。另一方面，如果 Grails 应用正在测试阶段，你可能希望每次测试运行时都清空 RDBMS\
  \ 中的数据；因此，像 `dbCreate=\"create\"` 或 `dbCreate=\"create-drop\"` 这样的值会更常见。对于开发环境的\
  \ RDBMS，选择哪个选项作为更优策略，取决于 Grails 应用的开发进度。\n\nGrails 还允许你使用在 Web 容器中配置的 RDBMS。在这种情况下，Web\
  \ 容器（如 Apache Tomcat）会设置相应的 RDBMS 连接参数，并通过 JNDI 提供对 RDBMS 的访问。以下代码展示了通过 JNDI 访问\
  \ RDBMS 的 `dataSource` 定义：\n\n```\ndataSource:\njndiName: java:comp/env/grailsDataSource\n\
  ```\n\n最后，值得一提的是，你可以配置 `dataSource` 定义，使其在应用的不同环境中生效，同时为每个特定环境进一步指定属性。以下代码展示了这种配置：\n\
  \n```\ndataSource:\ndriverClassName: com.mysql.jdbc.Driver\nusername: grails\nenvironments:\n\
  production:\ndataSource:\nurl: jdbc:mysql://localhost/grailsDBPro\npassword: production\n\
  development:\ndataSource:\nurl: jdbc:mysql://localhost/grailsDBDev\npassword: development\n\
  ```\n\n如上代码所示，`dataSource` 的 `driverClassName` 和 `username` 属性是全局定义的，在所有环境中生效，而其他\
  \ `dataSource` 属性则针对每个单独的环境进行声明。\n\n17-9. 自定义日志输出\n\n问题\n\n你想要自定义 Grails 应用生成的日志输出。\n\
  \n解决方案\n\nGrails 依赖 Logback 来执行日志记录操作。因此，所有配置参数都在应用 `/grails-app/conf` 目录下的 `logback.groovy`\
  \ 文件中指定。请注意，如果你更熟悉 Logback 的 XML 配置，可以用 `logback.xml` 文件替换它。\n\n鉴于 Logback 日志记录的多功能性，Grails\
  \ 应用的日志记录可以通过多种方式进行配置。这包括创建自定义 appender、日志级别、控制台输出、按构件记录日志以及自定义日志布局。\n\n工作原理\n\n\
  Grails 预配置了一组基本参数。这些参数定义在应用 `/grails-app/conf` 目录下的 `logback.groovy` 文件中，具体如下：\n\
  \n```\nimport grails.util.BuildSettings\nimport grails.util.Environment\nimport\
  \ org.springframework.boot.logging.logback.ColorConverter\nimport org.springframework.boot.logging.logback.WhitespaceThrowableProxyConverter\n\
  import java.nio.charset.Charset\nconversionRule 'clr', ColorConverter\nconversionRule\
  \ 'wex', WhitespaceThrowableProxyConverter\n// 有关配置的详细信息，请参阅 http://logback.qos.ch/manual/groovy.html\n\
  appender('STDOUT', ConsoleAppender) {\nencoder(PatternLayoutEncoder) {\ncharset\
  \ = Charset.forName('UTF-8')\npattern =\n'%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint}\
  \ ' + // 日期\n'%clr(%5p) ' + // 日志级别\n'%clr(---){faint} %clr([%15.15t]){faint} '\
  \ + // 线程\n'%clr(%-40.40logger{39}){cyan} %clr(:){faint} ' + // 日志记录器\n'%m%n%wex'\
  \ // 消息\n}\n}\ndef targetDir = BuildSettings.TARGET_DIR\nif (Environment.isDevelopmentMode()\
  \ && targetDir != null) {\nappender(\"FULL_STACKTRACE\", FileAppender) {\nfile =\
  \ \"${targetDir}/stacktrace.log\"\nappend = true\nencoder(PatternLayoutEncoder)\
  \ {\npattern = \"%level %logger - %msg%n\"\n}\n}\nlogger(\"StackTrace\", ERROR,\
  \ ['FULL_STACKTRACE'], false)\n}\nroot(ERROR, ['STDOUT'])\n```\n\n在日志记录术语中，每个包被称为一个日志记录器（logger）。Logback\
  \ 支持以下日志级别：`error`、`warn`、`info`、`debug` 和 `trace`。`error` 是最严重的级别。因此，Grails 遵循保守的默认日志策略，在其大多数包中使用\
  \ `error` 级别。指定一个不那么严重的级别（例如 `debug`）会导致产生大量日志信息，这在大多数情况下可能不实用。\n\n默认情况下，所有日志消息都会发送到应用根目录下的\
  \ `stacktrace.log` 文件，并且（如果适用）发送到运行中应用的标准输出（即控制台）。当你执行 Grails 命令时，会观察到日志消息发送到标准输出。\n\
  \n配置自定义 Appender 和 Logger\n\nLogback 依赖 appender 和 logger 来提供多功能的日志记录功能。Appender\
  \ 是日志信息发送到的位置（例如文件或标准输出），而 logger 是生成日志信息的位置（例如类或包）。\n\nGrails 配置了一个根 logger，所有其他\
  \ logger 都继承其行为。在 Grails 应用中，可以通过在应用的 `Logback.groovy` 文件中使用以下语句来自定义默认 logger：\n\
  \n```\nroot(ERROR, ['STDOUT'])\n```\n\n最后一条语句定义了一个 logger，使得 error 级别或更严重级别的消息被记录到标准输出。这就是为什么你可以看到来自其他\
  \ logger（例如类或包）的日志消息被发送到标准输出；它们都继承了根 logger 的行为，此外还指定了自己的日志级别。另一方面，Logback appender\
  \ 提供了一种将日志消息发送到不同位置的方法。默认情况下有四种类型的 appender 可用。\n\n*   `jdbc`：记录到 JDBC 连接的 appender\n\
  *   `console`：记录到标准输出的 appender\n*   `file`：记录到文件的 appender\n*   `rollingFile`：记录到一组滚动文件的\
  \ appender\n\n要在 Grails 应用中定义 appender，你需要在应用的 `Logback.groovy` 文件中声明它们，如下所示：\n\n\
  ```\ndef USER_HOME = System.getProperty(\"user.home\")\nappender('customlogfile',\
  \ FileAppender) {\nencoder(PatternLayoutEncoder) {\nPattern = \"%d %level %thread\
  \ %mdc %logger - %m%n\"\n}\nfile = '${USER_HOME}/logs/grails.log'\n}\nappender('rollinglogfile',\
  \ RollingFileAppender) {\nencoder(PatternLayoutEncoder) {\nPattern = \"%d %level\
  \ %thread %mdc %logger - %m%n\"\n}\nrollingPolicy(TimeBasedRollingPolicy) {\nFileNamePattern\
  \ = \"${USER_HOME}/logs/rolling-grails-%d{yyyy-MM}.log\"\n}\n}\n```\n\n要使用 appender，你只需将它们添加到相应的\
  \ logger 中，以便它们可以接收输入。\n\n以下声明说明了如何组合使用 appender、logger 和日志级别：\n\n```\nroot(DEBUG,\
  \ ['STDOUT','customlogfile'])\n```\n\n\n\n最后这段配置覆盖了默认的根日志记录器。它指示使用调试级别将日志消息同时输出到\
  \ `stdout` 附加器（即标准输出或控制台）和 `customlogfile` 附加器，后者代表在附加器部分定义的一个文件。请注意，调试级别会产生大量日志信息。\n\
  \n17-10. 运行单元测试和集成测试\n\n问题\n\n为了确保应用程序的类按预期工作，你需要对它们执行单元测试和集成测试。\n\n解决方案\n\nGrails\
  \ 内置了对应用程序运行单元测试和集成测试的支持。之前当你生成 Grails 工件（例如应用程序的领域类）时，你可能记得会自动生成一系列测试类。\n\n在 Grails\
  \ 应用程序中，测试放置在应用程序的 `src/test` 或 `src/integration-test` 目录下。与 Grails 提供的其他功能类似，设置和配置应用程序测试的许多繁琐工作都由\
  \ Grails 处理。你只需专注于设计测试。\n\n一旦你设计好应用程序的测试，在 Grails 中运行测试就像从应用程序的根目录执行 `grails test-app`\
  \ 命令一样简单。\n\n工作原理\n\nGrails 会引导执行应用程序测试所需的环境。该环境包括库（即 JAR 文件）和持久存储系统（即关系数据库管理系统），以及执行单元测试和集成测试所需的任何其他工件。\n\
  \n让我们从分析执行 `grails test-app` 命令的输出开始，如图 17-6 所示。\n\n![A314861_4_En_17_Fig6_HTML.jpg](img/A314861_4_En_17_Fig6_HTML.jpg)\n\
  \n图 17-6.\n\n测试输出\n\n第一部分指示测试的执行情况，这些测试取自应用程序根目录下的 `src/test/groovy` 目录。在此例中，执行了\
  \ 13 个失败和 4 个成功的单元测试，这些测试对应于创建应用程序领域类时生成的骨架测试类。由于这些测试类包含测试骨架，因此大多数测试都失败了。\n\n第二部分指示测试是成功还是失败；在此例中，测试失败。结果以\
  \ HTML 报告的形式提供，并显示了链接；它们可以在项目的 `build/reports/tests/test` 目录中找到。\n\n现在你已经了解了 Grails\
  \ 如何执行测试，让我们修改预先存在的单元测试类，以纳入基于领域类逻辑的单元测试。鉴于 Grails 测试基于 JUnit 测试框架（ [`www.junit.org/`](http://www.junit.org/)\
  \ ）。如果你不熟悉此框架，我们建议你查阅其文档以掌握其语法和方法。以下各节假定你对 JUnit 有基本的了解（另请参见第 16 章）。\n\n将以下方法（即单元测试）添加到位于应用程序\
  \ `src/test/groovy` 目录下的 `PlayerSpec.groovy` 类中，并移除 `\"test something\"` 方法：\n\n\
  ```\nvoid \"A valid player is constructed\"() {\ngiven:\ndef player = new Player(name:\
  \ 'James', phone: '120-1111')\nwhen: \"validate is called\"\ndef result = player.validate();\n\
  then: \"it should be valid\"\nresult\n}\nvoid \"A player without a name is constructed\"\
  () {\ngiven:\ndef player = new Player(name: '', phone: '120-1111')\nwhen: \"validate\
  \ is called\"\ndef result = player.validate();\nthen: \"The name should be rejected\"\
  \n!result\nplayer.errors['name'].codes.contains('nullable')\n}\nvoid \"A player\
  \ without a phone is constructed\"() {\ngiven:\ndef player = new Player(name: 'James',\
  \ phone: '')\nwhen: \"validate is called\"\ndef result = player.validate()\nthen:\
  \ \"The phone number should be rejected.\"\n!result\nplayer.errors['phone'].codes.contains('nullable')\n\
  }\n```\n\n第一个单元测试创建一个 `Player` 对象，并用 name 字段和 phone 字段实例化它。根据 `Player` 领域类中声明的约束，这种类型的实例应始终有效。因此，语句\
  \ `assertTrue player.validate()` 确认此对象的验证始终为 `true`。\n\n第二个和第三个单元测试也创建了一个 `Player`\
  \ 对象。但是，请注意，在一个测试中，`Player` 对象是用空白的 `name` 字段实例化的，而在另一个测试中，`Player` 对象是用空白的 `phone`\
  \ 字段实例化的。根据 `Player` 领域类中声明的约束，这两个实例都应始终无效。因此，`then:` 块中的 `!result` 语句用于确认此类对象的验证始终为\
  \ `false`。`player.errors['phone'].codes.contains('nullable')` 部分检查验证是否包含验证异常所需的代码。\n\
  \n接下来，将以下方法（即单元测试）添加到位于应用程序 `src/test/groovy` 目录下的 `ReservationSpec.groovy` 类中：\n\
  \n```\nvoid testReservation() {\ngiven:\ndef calendar = LocalDateTime.of(2017, 10,\
  \ 13, 15, 00)\n.toInstant(ZoneOffset.UTC)\ndef validDateReservation = Date.from(calendar)\n\
  def reservation = new Reservation(\nsportType:'Tennis', courtName:'Main',\ndate:validDateReservation,player:new\
  \ Player(name:'James',phone:'120-1111'))\nexpect:\nreservation.validate()\n}\nvoid\
  \ testOutOfRangeDateReservation() {\ngiven:\ndef calendar = LocalDateTime.of(2017,\
  \ 10, 13, 23, 00)\n.toInstant(ZoneOffset.UTC)\ndef invalidDateReservation = Date.from(calendar)\n\
  def reservation = new Reservation(\nsportType:'Tennis',courtName:'Main',\ndate:invalidDateReservation,player:new\
  \ Player(name:'James',phone:'120-1111'))\nexpect:\n!reservation.validate()\nreservation.errors['date'].code\
  \ == 'invalid.weekdayHour'\n}\nvoid testOutOfRangeSportTypeReservation() {\ngiven:\n\
  def calendar = LocalDateTime.of(2017, 10, 13, 15, 00)\n.toInstant(ZoneOffset.UTC)\n\
  def validDateReservation = Date.from(calendar)\ndef reservation = new Reservation(\n\
  sportType:'Baseball',courtName:'Main',\ndate:validDateReservation,player:new Player(name:'James',phone:'120-1111'))\n\
  expect:\n!reservation.validate()\nreservation.errors['sportType'].codes.contains('not.inList')\n\
  }\n```\n\n最后这段代码包含三个单元测试，旨在验证 `Reservation` 对象的完整性。第一个测试创建一个 `Reservation` 对象实例，并确认其对应的值通过了\
  \ `Reservation` 领域类的约束。第二个测试创建一个违反领域类 `date` 约束的 `Reservation` 对象，并确认此类实例无效。第三个测试创建一个违反领域类\
  \ `sportType` 约束的 `Reservation` 对象，并确认此类实例无效。\n\n如果你执行 `grails test-app` 命令，Grails\
  \ 会自动执行所有先前的测试，并将测试结果输出到应用程序的构建目录。\n\n仍然存在失败的测试，特别是 `PlayerControllerSpec` 和 `ReservationControllerSpec`。打开后，有一个名为\
  \ `populateValidParams` 的方法，其中包含一个 `@TODO`。\n\n```\ndef populateValidParams(params)\
  \ {\nassert params != null\n// TODO: Populate valid properties like...\n//params[\"\
  name\"] = 'someValidName'\nassert false, \"TODO: Provide a populateValidParams()\
  \ implementation for this generated test suite\"\n}\n```\n\n要修复这些测试，需要修改它以向控制器提交正确的值。对于\
  \ `PlayerControllerSpec`，修改 `populateValidParams` 以包含 `params[\"name\"]` 和 `params[\"\
  phone\"]`。\n\n```\ndef populateValidParams(params) {\nassert params != null\nparams[\"\
  name\"] = 'J. Doe'\nparams[\"phone\"] = '555-123-4567'\n}\n```\n\n对于 `ReservationControllerSpec`，修改如下：\n\
  \n\n```groovy\ndef populateValidParams(params) {\nassert params != null\ndef calendar\
  \ = LocalDateTime.of(2017, 10, 13, 12, 00)\n.toInstant(ZoneOffset.UTC)\nparams[\"\
  courtName\"] = 'Tennis Court #1'\nparams[\"sportType\"] = \"Tennis\"\nparams[\"\
  date\"] = Date.from(calendar)\nparams[\"player\"] = new Player(name: \"J. Doe\"\
  , phone: \"555-432-1234\")\n}\n```\n\n现在唯一仍然失败的测试是 `WelcomeControllerSpec`，你可以将其删除以获得成功的构建。\n\
  \n既然你已经为 Grails 应用程序创建了单元测试，接下来让我们探索集成测试的创建。\n\n与单元测试不同，集成测试验证的是应用程序中更复杂的逻辑。各种领域类之间的交互或针对关系数据库管理系统（RDBMS）执行的操作，都属于集成测试的范畴。从这个意义上说，Grails\
  \ 通过自动引导一个 RDBMS 和其他应用程序属性来执行集成测试，从而辅助了集成测试过程。“运行单元测试和集成测试的 Grails 差异”侧边栏包含了 Grails\
  \ 为运行单元测试和集成测试所提供的不同方面的更多细节。\n\n单元测试旨在验证单个领域类中包含的逻辑。正因如此，除了自动化执行此类测试外，Grails 不提供任何类型的引导属性来执行这些类型的测试。\n\
  \n集成测试旨在验证可能跨越一系列应用程序类的更复杂逻辑。因此，Grails 不仅会引导一个 RDBMS 用于针对这种持久化存储系统运行测试，还会引导领域类的动态方法以简化此类测试的创建。当然，与单元测试相比，这会给执行此类测试带来额外的开销。\n\
  \n同样值得一提的是，如果你仔细观察 Grails 为单元测试和集成测试生成的骨架测试类，会发现它们之间没有任何区别。唯一的区别是，放在集成测试目录中的测试可以访问前面提到的一系列特性，而放在单元测试目录中的测试则不能。你可以选择将单元测试放在集成测试目录中，但这需要你根据便利性与开销的权衡来决定。\n\
  \n接下来，通过执行以下命令为应用程序创建一个集成类：`grails create-integration-test CourtIntegrationTest`。这会在应用程序的\
  \ `src/integration-test/groovy` 目录下生成一个集成测试类。\n\n将以下方法（即集成测试）合并到这个类中，以验证应用程序执行的\
  \ RDBMS 操作：\n\n```groovy\nvoid testQueries() {\ngiven: \"2 个现有玩家\"\n// 定义并保存玩家\n\
  def players = [ new Player(name:'James',phone:'120-1111'),\nnew Player(name:'Martha',phone:'999-9999')]\n\
  players*.save()\n// 确认数据库中有两个玩家被保存\nPlayer.list().size() == 2\nwhen: \"检索玩家 James\"\
  \n// 按名称从数据库获取玩家\ndef testPlayer = Player.findByName('James')\nthen:  \"电话号码应匹配\"\
  \n// 确认电话号码\ntestPlayer.phone == '120-1111'\nwhen: \"更新玩家 James\"\n// 更新玩家名称\ntestPlayer.name\
  \ = 'Marcus'\ntestPlayer.save()\nthen: \"数据库中的名称应已更新\"\n// 从数据库获取更新后的玩家，但现在按电话号码查找\n\
  def updatedPlayer = Player.findByPhone('120-1111')\n// 确认名称\nupdatedPlayer.name\
  \ == 'Marcus'\nwhen: \"删除更新后的玩家\"\n// 删除玩家\nupdatedPlayer.delete()\nthen: \"该玩家应从数据库中移除。\"\
  \n// 确认数据库中只剩一个玩家\nPlayer.list().size() == 1\n// 确认 updatedPlayer 已被删除\ndef nonexistantPlayer\
  \ = Player.findByPhone('120-1111')\nnonexistantPlayer == null\n}\n```\n\n最后这段代码对应用程序的\
  \ RDBMS 执行了一系列操作，从保存两个 `Player` 对象开始，然后对这些对象进行查询、更新和删除。每次操作后，都会执行一个验证步骤，以确保逻辑——在本例中位于\
  \ `PlayerController` 控制器类中——按预期运行（即控制器的 `list()` 方法返回 RDBMS 中正确的对象数量）。\n\n默认情况下，Grails\
  \ 针对 HSQLDB 执行 RDBMS 测试操作。不过，你可以使用任何你喜欢的 RDBMS。有关更改 Grails RDBMS 的详细信息，请参见配方 17-8。\n\
  \n最后，值得一提的是，如果你只想执行一种类型的测试（即单元测试或集成测试），可以使用命令标志 `-unit` 或 `-integration`。执行 `grails\
  \ test-app -unit` 命令仅运行应用程序的单元测试，而执行 `grails test-app -integration` 命令仅运行应用程序的集成测试。如果你有大量这两种测试，这会很有帮助，因为它可以减少执行测试所需的总时间。\n\
  \n17-11. 使用自定义布局和模板\n\n问题\n\n你需要自定义布局和模板来显示应用程序的内容。\n\n解决方案\n\n默认情况下，Grails 会应用一个全局布局来显示应用程序的内容。这使得视图可以拥有最少的显示元素（例如\
  \ HTML、CSS 和 JavaScript），并从单独的位置继承其布局行为。\n\n这种继承过程允许应用程序设计人员和图形设计人员分别进行工作，应用程序设计人员专注于创建包含必要数据的视图，而图形设计人员则专注于这些数据的布局（即美观性）。\n\
  \n你可以创建自定义布局，以包含复杂的 HTML 显示，以及自定义的 CSS 或 JavaScript 库。Grails 还支持模板的概念，其用途与布局相同，但应用于更细粒度的级别。此外，也可以使用模板来渲染控制器的输出，而不是像大多数控制器那样使用视图。\n\
  \n工作原理\n\n在应用程序的 `/grails-app/view/` 目录下，你可以找到一个名为 `layouts` 的子目录，其中包含应用程序可用的布局。默认情况下，有一个名为\
  \ `main.gsp` 的文件，其内容如下：\n\n```html\n\nToggle navigation\n\nGrails\n\n```\n\n虽然看起来是一个简单的\
  \ HTML 文件，但最后这段代码包含了一些用作占位符的元素，以便应用程序视图（即 JSP 和 GSP 页面）继承相同的布局。\n\n这些元素中的第一个是附加到\
  \ `<g:*>` 命名空间的 Groovy 标签。`<g:layoutTitle>` 标签用于定义布局标题部分的内容。如果某个视图继承了此布局的行为但缺少此值，Grails\
  \ 会自动分配 Grails 值，如默认属性所示。另一方面，如果继承的视图具有此值，则会在其位置显示该值。\n\n`<g:layoutHead>` 标签用于定义布局头部部分的内容。在继承此布局的视图头部中声明的任何值，在渲染时都会被放置在此位置。\n\
  \n`<asset:javascript src=\"application\">` 标签允许任何继承此布局的视图自动访问 JavaScript 库。在渲染时，此元素会被转换为以下内容：`<script\
  \ type=\"text/javascript\" src=\"/court/assets/application.js\"></script>`。请记住，JavaScript\
  \ 库必须放置在 Grails 的 `/<app-name>/web-app/assets/javascripts` 子目录中；在本例中，`<app-name>`\
  \ 对应的是 `court`。\n\n\n继续往下看，你还会发现几个形如 `${assetPath*}` 的声明，它们带有 `src` 属性。这类语句由 Grails\
  \ 翻译，以反映应用程序中包含的资源。例如，语句 `${assetPath(src: 'favicon.ico')}` 会被转换为 `/court/assets/images/favicon.ico`。请注意，转换后的值中会添加应用程序的名称（即上下文路径）。这使得布局可以在多个应用程序中重复使用，同时引用相同的图片，而该图片应放置在\
  \ Grails 的 `/court/web-app/assets/images` 子目录下。\n\n现在你已经了解了 Grails 布局的结构，让我们来看看视图是如何继承其行为的。如果你打开之前由应用程序控制器生成的任何视图——`player`、`reservation`\
  \ 或 `welcome`（也位于 `views` 目录下）——你会发现以下用于从 Grails 布局继承行为的语句：\n\n```\n\n`<meta>` 标签是一个标准的\
  \ HTML 标签，它对页面的显示没有影响，但 Grails 用它来检测视图应从哪个布局继承其行为。通过使用这最后一条语句，视图会自动使用名为 `main` 的布局进行渲染，这正是前面描述的模板。\n\
  \n进一步查看视图的结构，你会注意到所有生成的视图都被构建为独立的 HTML 页面；它们包含 `<html>`、`<body>` 以及其他类似的 HTML 标签，这与布局模板类似。然而，这并不意味着页面在渲染时会包含重复的\
  \ HTML 标签。Grails 会自动处理替换过程，将视图的 `<title>` 内容放入 `<g:layoutTitle>` 标签中，将视图的 `<body>`\
  \ 内容放入 `<g:layoutBody />` 标签中，以此类推。\n\n如果你从 Grails 视图中移除 `<meta>` 标签，会发生什么？从表面上看，这个问题的答案很明显：渲染视图时不会应用任何布局，这也意味着不会渲染任何视觉元素（例如图片、菜单和\
  \ CSS 边框）。然而，由于 Grails 基于约定进行操作，它总是会尝试根据控制器的名称来应用布局。\n\n例如，即使与 reservation 控制器对应的视图没有关联的\
  \ `<meta name=\"layout\">` 标签声明，如果应用程序的布局目录中存在名为 `reservation.gsp` 的布局，它也会被应用于该控制器对应的所有视图。\n\
  \n尽管布局为模块化应用程序的视图提供了极好的基础，但它们仅适用于视图的整个页面。为了提供更细粒度的方法，模板允许使视图页面的某些部分可重用。\n\n以用于显示球员预订信息的\
  \ HTML 部分为例。你希望在所有与此控制器对应的视图上显示此信息作为提醒。将此 HTML 部分显式地放置在所有视图上，不仅会导致更多的初始工作，而且如果此类\
  \ HTML 部分发生更改，还可能导致更多的持续工作。为了简化这种包含过程，可以使用模板。以下代码展示了一个名为 `_reservationList.gsp`\
  \ 的模板内容：\n\n```\n\n${fieldValue(bean:reservationInstance, field:'id')}\n${fieldValue(bean:reservationInstance,\
  \ field:'sportType')}\n${fieldValue(bean:reservationInstance, field:'date')}\n${fieldValue(bean:reservationInstance,\
  \ field:'courtName')}\n${fieldValue(bean:reservationInstance, field:'player')}\n\
  \n```\n\n这最后一个模板生成一个 HTML 表格，该表格依赖于 Groovy 标签 `<g:each>` 和一个预订列表。用于命名文件的下划线（`_`）前缀是\
  \ Grails 用来区分模板和独立视图的表示法；模板总是以下划线开头。\n\n要在视图中使用此模板，你需要使用此处说明的 `<g:render>` 标签：\n\
  \n```\n\n在这种情况下，`<g:render>` 标签接受两个属性：`template` 属性用于指示模板的名称，`model` 属性用于传递模板所需的引用数据。`<g:render>`\
  \ 标签的另一种变体包括模板的相对路径和绝对路径。通过声明 `template=\"reservationList\"`，Grails 会尝试在与声明该模板的视图相同的目录中定位该模板。为了便于重用，可以从一个公共目录加载模板，此时会使用绝对路径。例如，一个包含\
  \ `template=\"/common/reservationList\"` 形式语句的视图，会尝试在应用程序的 `grails-app/views/common`\
  \ 目录下定位名为 `_reservationList.gsp` 的模板。\n\n最后，值得一提的是，控制器也可以使用模板来渲染其输出。例如，大多数控制器使用以下语法将控制权返回给视图：\n\
  \n```\nrender view:'reservations', model:[reservationList:reservationList]\n```\n\
  \n然而，也可以使用以下语法将控制权返回给模板：\n\n```\nrender template:'reservationList', model:[reservationList:reservationList]\n\
  ```\n\n通过使用这最后一个渲染语句，Grails 会尝试定位一个名为 `_reservationList.gsp` 的模板。\n\n17-12. 使用 GORM\
  \ 查询\n\n问题\n\n你想对应用程序的 RDBMS 执行查询。\n\n解决方案\n\nGrails 使用 GORM（[`http://gorm.grails.org/latest/`](http://gorm.grails.org/latest/)）执行\
  \ RDBMS 操作。GORM 基于流行的 Java ORM Hibernate，允许 Grails 应用程序使用 Hibernate 查询语言（HQL）执行查询。然而，除了支持使用\
  \ HQL 之外，GORM 还拥有一系列内置功能，使得查询 RDBMS 变得非常简单。\n\n工作原理\n\n在 Grails 中，对 RDBMS 的查询通常从控制器内部执行。如果你检查任何\
  \ court 应用程序的控制器，最简单的查询之一如下：\n\n```\nPlayer.get(id)\n```\n\n此查询用于获取具有特定 ID 的 `Player`\
  \ 对象。然而，在某些情况下，应用程序可能需要根据另一组条件执行查询。例如，court 应用程序中的 `Player` 对象具有 `name` 和 `phone`\
  \ 字段，如 `Player` 域类中所定义。GORM 支持基于域类的字段名称进行查询。它通过提供 `findBy<field_name>` 形式的方法来实现这一点，如下所示：\n\
  \n```\nPlayer.findByName('Henry')\nPlayer.findByPhone('120-1111')\n```\n\n这两个语句用于查询\
  \ RDBMS 并根据姓名和电话号码获取 `Player` 对象。这些方法被称为动态查找器，因为 GORM 根据域类的字段提供了这些方法。\n\n类似地，拥有自己字段名称的\
  \ `Reservation` 域类将具有诸如 `findByPlayer()`、`findByCourtName()` 和 `findByDate()` 之类的动态查找器。如你所见，这个过程简化了在\
  \ Java 应用程序中针对 RDBMS 创建查询的过程。\n\n此外，动态查找器方法还可以使用比较器来进一步细化查询结果。以下代码片段说明了如何使用比较器来提取特定日期范围内的\
  \ `Reservation` 对象：\n\n```\ndef now = new Date()\ndef tomorrow = now + 1\ndef reservations\
  \ = Reservation.findByDateBetween( now, tomorrow )\n```\n\n除了 `Between` 比较器之外，在\
  \ court 应用程序中可能有用的另一个比较器是 `Like` 比较器。以下代码片段说明了如何使用 `Like` 比较器来提取名称以字母 A 开头的 `Player`\
  \ 对象：\n\n```\ndef letterAPlayers = Player.findByNameLike('A%')\n```\n\n表 17-2 描述了动态查找器方法可用的各种比较器。\n\
  \n表 17-2. GORM 动态查找器比较器\n\n| GORM 比较器 | 查询条件 |\n| :--- | :--- |\n| `InList` | 如果值存在于给定的值列表中\
  \ |\n\n\n\n`LessThan`\n |\n  用于小于给定值的对象\n |\n\n`LessThanEquals`\n |\n  用于小于或等于给定值的对象\n\
  \ |\n\n`GreaterThan`\n |\n  用于大于给定值的对象\n |\n\n`GreaterThanEquals`\n |\n  用于大于或等于给定值的对象\n\
  \ |\n\n`Like`\n |\n  用于匹配给定值的对象\n |\n\n`Ilike`\n |\n  用于不区分大小写地匹配给定值的对象\n |\n\n\
  `NotEqual`\n |\n  用于不等于给定值的对象\n |\n\n`Between`\n |\n  用于介于两个给定值之间的对象\n |\n\n`IsNotNull`\n\
  \ |\n  用于非空对象；不使用参数\n |\n\n`IsNull`\n |\n  用于空对象；不使用参数\n |\n\nGORM 还支持在构建动态查找器方法时使用布尔逻辑（`and`/`or`）。以下代码片段演示了如何查询同时满足特定球场名称和未来日期的\
  \ `Reservation` 对象：\n\n```\ndef reservations = Reservation.findAllByCourtNameLikeAndDateGreaterThan(\"\
  %main%\", new Date()+7)\n```\n\n类似地，在上一个动态查找器方法中，也可以使用 `Or` 语句（而不是 `And`）来提取满足至少一个条件的\
  \ `Reservation` 对象。\n\n最后，动态查找器方法还支持使用分页和排序来进一步优化查询。这是通过向动态查找器方法附加一个映射来实现的。以下代码片段说明了如何限制查询结果的数量，以及定义其排序和顺序属性：\n\
  \n```\ndef reservations = Reservation.findAllByCourtName(\"%main%\", [ max: 3, sort:\
  \ \"date\", order: \"desc\"] )\n```\n\n正如本教程开头所述，GORM 还支持使用 HQL 对关系数据库管理系统执行查询。虽然比前面的列表更冗长且更容易出错，但以下代码片段展示了几个使用\
  \ HQL 的等效查询：\n\n```\ndef letterAPlayers = Player.findAll(\"from Player as p where\
  \ p.name like 'A%'\")\ndef reservations = Reservation.findAll(\"from Reservation\
  \ as r\nwhere r.courtName like '%main%' order by r.date desc\", [ max: 3] )\n```\n\
  \n17-13. 创建自定义标签\n\n问题\n\n你希望在 Grails 视图中执行无法通过预构建的 GSP 或 JSTL 标签实现的逻辑，但又不想在视图中包含代码。\n\
  \n解决方案\n\nGrails 视图可以包含显示元素（例如 HTML 标签）、业务逻辑元素（例如 GSP 或 JSTL 标签）或直接的 Groovy 或 Java\
  \ 代码来实现其显示目标。在某些情况下，视图可能需要显示元素和业务逻辑的独特组合。例如，按月显示特定玩家的预订信息需要使用自定义代码。为了简化此类组合的包含并便于在多个视图中重用，你可以使用自定义标签。\n\
  \n工作原理\n\n要创建自定义标签，你可以使用 `grails create-taglib <tag-lib-name>` 命令。此命令会在应用程序的 `/grails-app/tag-lib/`\
  \ 目录下为自定义标签库创建一个骨架类。\n\n了解了这一点，让我们为球场应用程序创建一个自定义标签库，旨在显示特殊的预订优惠。第一个自定义标签将检测当前日期，并根据此信息显示特殊的预订优惠。最终结果是能够在应用程序的视图中使用像\
  \ `<g:promoDailyAd/>` 这样的标签，而不是在视图中放置内联代码或在控制器中执行此逻辑。\n\n执行 `grails create-taglib\
  \ DailyNotice` 命令来创建自定义标签库类。接下来，打开位于应用程序 `/grails-app/taglib/` 目录下生成的 `DailyNoticeTagLib.groovy`\
  \ 类，并添加以下方法（即自定义标签）：\n\n```\ndef promoDailyAd = { attrs, body ->\ndef dayoftheweek\
  \ = Calendar.getInstance().get(Calendar.DAY_OF_WEEK)\nout << body() << (dayoftheweek\
  \ == 7 ?\n\"We have special reservation offers for Sunday!\": \"No special offers\"\
  )\n}\n```\n\n此方法的名称定义了自定义标签的名称。方法的第一个声明（`attrs`、`body`）代表自定义标签的输入值——其属性和主体。接下来，使用\
  \ `Calendar` 对象确定星期几。\n\n之后，你可以找到一个基于星期几的条件语句。如果星期几是 7（星期六），条件语句解析为字符串 `\"We have\
  \ special reservation offers for Saturday!\"`。否则，解析为 `\"No special offers\"`。\n\n\
  该字符串通过 `<<` 输出，并首先通过 `body()` 方法赋值，该方法代表自定义标签的主体，然后通过 `out` 赋值，代表自定义标签的输出。通过这种方式，你可以使用以下语法在应用程序的视图中声明自定义标签：\n\
  \n```\n\n当包含此自定义标签的视图被渲染时，Grails 会执行支持类方法中的逻辑，并用结果替换它。这使得视图能够通过简单的声明，基于更复杂的逻辑来显示结果。\n\
  \n注意\n\n此类标签在 GSP 页面中自动可用，但在 JSP 页面中不可用。为了使此自定义标签在 JSP 中正常工作，需要将其添加到名为 `grails.tld`\
  \ 的相应标签库定义中。TLD 位于应用程序的 `/web-app/WEB-INF/tld/` 目录中。\n\n自定义标签也可以依赖作为标签属性传入的输入参数来执行支持类的逻辑。以下代码说明了另一个自定义标签，它期望一个名为\
  \ `offerdate` 的属性来确定其结果：\n\n```\ndef upcomingPromos  = { attrs, body ->\ndef dayoftheweek\
  \ = attrs['offerdate']\nout << body() << (dayoftheweek == 7 ?\n\"We have special\
  \ reservation offers for Saturday!\": \"No special offers\")\n}\n```\n\n虽然与之前的自定义标签类似，但最后一个列表使用语句\
  \ `attrs['offerdate']` 来确定星期几。在这种情况下，`attrs` 表示作为输入参数传递给类方法的属性（即在视图中声明的属性）。因此，要使用这最后一个自定义标签，需要使用如下声明：\n\
  \n```\n\n这种类型的自定义标签提供了更大的灵活性，因为其逻辑是基于视图中提供的数据执行的。甚至，还可以使用代表由控制器传递到视图的数据的变量，如下所示：\n\
  \n```\n\n最后，关于 Grails 自定义标签中使用的命名空间——默认情况下，Grails 将自定义标签分配给 `<g:>` 命名空间。要使用自定义命名空间，需要在自定义标签库类的顶部声明命名空间字段。\n\
  \n```\nclass DailyNoticeTagLib {\nstatic namespace = 'court'\ndef promoDailyAd =\
  \ { attrs, body ->\n...\n}\ndef upcomingPromos  = { attrs, body ->\n...\n}\n}\n\
  ```\n\n通过使用这最后一个语句，类的自定义标签被分配了它们自己的自定义命名空间，名为 `court`。使用自定义标签时，视图中的声明需要更改为以下内容：\n\
  \n17-14. 添加安全性\n\n问题\n\n你希望使用 Spring Security 来保护你的应用程序。\n\n解决方案\n\n使用 Grails Spring\
  \ Security 插件（关于插件的一般信息，请参见教程 17-3）为你的应用程序应用安全性。\n\n工作原理\n\n要保护应用程序，你需要将 Grails\
  \ 插件 `spring-security-core` 添加到应用程序中。为此，请打开 `build.gradle` 文件并将插件添加到其中。\n\n```\n\
  dependencies {\ncompile \"org.grails.plugins:spring-security-core:3.1.2\"\n}\n```\n\
  \n现在插件已添加，运行 `grails compile` 将下载并安装该插件。\n\n安装插件后，可以使用 `s2-quickstart` 命令设置安全性。此命令接受一个包名以及用于表示用户及其权限的类名。\n\
  \n```\ngrails s2-quickstart court SecUser SecRole\n```\n\n运行此命令将创建一个 `SecUser` 和\
  \ `SecRole` 域对象。它还会修改（或创建）`grails-app/conf/application.groovy` 文件。该文件将添加一个安全部分。\n\
  \n\n\n```\n// 由 Spring Security Core 插件添加：\ngrails.plugin.springsecurity.userLookup.userDomainClassName\
  \ = 'court.SecUser'\ngrails.plugin.springsecurity.userLookup.authorityJoinClassName\
  \ = 'court.SecUserSecRole'\ngrails.plugin.springsecurity.authority.className = 'court.SecRole'\n\
  grails.plugin.springsecurity.controllerAnnotations.staticRules = [\n[pattern: '/',\
  \               access: ['permitAll']],\n[pattern: '/error',          access: ['permitAll']],\n\
  [pattern: '/index',          access: ['permitAll']],\n[pattern: '/index.gsp',  \
  \    access: ['permitAll']],\n[pattern: '/shutdown',       access: ['permitAll']],\n\
  [pattern: '/assets/**',      access: ['permitAll']],\n[pattern: '/**/js/**',   \
  \    access: ['permitAll']],\n[pattern: '/**/css/**',      access: ['permitAll']],\n\
  [pattern: '/**/images/**',   access: ['permitAll']],\n[pattern: '/**/favicon.ico',\
  \ access: ['permitAll']]\n]\ngrails.plugin.springsecurity.filterChain.chainMap =\
  \ [\n[pattern: '/assets/**',      filters: 'none'],\n[pattern: '/**/js/**',    \
  \   filters: 'none'],\n[pattern: '/**/css/**',      filters: 'none'],\n[pattern:\
  \ '/**/images/**',   filters: 'none'],\n[pattern: '/**/favicon.ico', filters: 'none'],\n\
  [pattern: '/**',             filters: 'JOINED_FILTERS']\n]\n```\n\n使用 `grails run-app`\
  \ 运行应用程序时，应用程序将启动并应用安全设置。如果你尝试访问该应用程序，系统会提示你输入用户名和密码的登录界面（见图 17-7）。\n\n![A314861_4_En_17_Fig7_HTML.jpg](img/A314861_4_En_17_Fig7_HTML.jpg)\n\
  \n图 17-7.\n\n添加安全设置后的登录界面\n\n目前系统中没有用户和角色，因此暂时无法登录系统。\n\n引导安全设置\n\n要使用系统，你需要拥有密码和角色的用户，这些用户存在于实际运行的应用程序中。它们可以来自数据库、LDAP\
  \ 目录，或者文件系统中的某些文件。你将在应用程序的引导脚本中添加一些用户。打开 `grails-app/init` 目录下的 `BootStrap.groovy`\
  \ 文件，并向系统中添加两个用户和两个角色。\n\n```\nclass BootStrap {\ndef init = { servletContext ->\n\
  def adminRole = new court.SecRole(authority: 'ROLE_ADMIN').save(flush: true)\ndef\
  \ userRole = new court.SecRole(authority: 'ROLE_USER').save(flush: true)\ndef testUser\
  \ = new  court.SecUser(username: 'user', password: 'password')\ntestUser.save(flush:\
  \ true)\ndef testAdmin = new  court.SecUser(username: 'admin', password: 'secret')\n\
  testAdmin.save(flush: true)\ncourt.SecUserSecRole.create testUser, userRole, true\n\
  court.SecUserSecRole.create testAdmin, adminRole, true\n}\n...\n}\n```\n\n前两个角色\
  \ `ROLE_ADMIN` 和 `ROLE_USER` 被添加到系统中。接下来添加了两个用户，每个用户都带有用户名和密码。最后，建立了用户与角色之间的关联。\n\
  \n现在一切就绪，重启应用程序并登录系统（见图 17-8）。\n\n![A314861_4_En_17_Fig8_HTML.jpg](img/A314861_4_En_17_Fig8_HTML.jpg)\n\
  \n图 17-8.\n\n使用用户登录后的系统\n\n虽然你能够登录，但系统会显示一个页面，告知你无权访问所请求的页面。尽管系统中现在有了用户，但系统并不知道这些用户有权访问页面请求。为此，你需要添加配置，明确哪些\
  \ URL 允许被访问。\n\n保护 URL\n\n创建安全配置后，只添加了一些默认的 URL，这并不包含你应用程序的特定 URL。为此，请打开 `grails-app/conf`\
  \ 目录下的 `application.groovy` 文件。\n\n```\ngrails.plugin.springsecurity.controllerAnnotations.staticRules\
  \ = [\n[pattern: '/',               access: ['permitAll']],\n[pattern: '/error',\
  \          access: ['permitAll']],\n[pattern: '/index',          access: ['permitAll']],\n\
  [pattern: '/index.gsp',      access: ['permitAll']],\n[pattern: '/shutdown',   \
  \    access: ['permitAll']],\n[pattern: '/assets/**',      access: ['permitAll']],\n\
  [pattern: '/**/js/**',       access: ['permitAll']],\n[pattern: '/**/css/**',  \
  \    access: ['permitAll']],\n[pattern: '/**/images/**',   access: ['permitAll']],\n\
  [pattern: '/**/favicon.ico', access: ['permitAll']],\n[pattern: '/player/**',  \
  \    access: ['isAuthenticated()']],\n[pattern: '/reservation/**', access: ['isAuthenticated()']]\n\
  ]\n```\n\n注意新增的两项，一项针对网站的玩家部分，另一项针对预订部分。表达式 `/player/**` 是一种所谓的 Ant 风格模式，匹配所有以 `/player`\
  \ 开头的内容。`permitAll` 表示任何人都可以访问网站的这些部分（主要用于静态和公共内容）。使用 `isAuthenticated()` 时，只有经过身份验证的用户才允许访问该网站。有关更多允许的表达式，请参阅第\
  \ 7 章中关于 Spring Security 的配方。\n\n重新构建并启动应用程序后，你应该能够再次访问玩家和预订界面。\n\n使用注解实现安全控制\n\n\
  除了保护 URL，还可以保护方法；为此，你可以使用 `@Secured` 注解。让我们保护 create 方法，以便只有管理员才能创建新玩家。\n\n```\n\
  import grails.plugin.springsecurity.annotation.Secured\nclass PlayerController {\n\
  ...\n@Secured(['ROLE_ADMIN'])\ndef create() {\nrespond new Player(params)\n}\n}\n\
  ```\n\n注意在 create 方法上添加了 `@Secured` 注解。该注解接受一个允许访问的角色数组。这里指定了 `ROLE_ADMIN`，因为访问权限仅限于管理员。`@Secured`\
  \ 注解也可以放在类级别而不是方法级别，这将为类中的所有方法添加安全控制。以普通用户身份（使用 user/password）登录并尝试创建新玩家，将导致访问被拒绝的页面（与图\
  \ 17-8 所示相同）。如果以管理员身份（使用 admin/secret）执行相同操作，则允许进入创建新玩家的界面。\n\n总结\n\n在本章中，你学习了如何使用\
  \ Grails 框架开发 Java Web 应用程序。你首先了解了 Grails 应用程序的结构，然后通过一个示例应用程序快速实践，该示例演示了 Web 应用程序中多个步骤的自动化。\n\
  \n通过各个配方，你学习了 Grails 如何在其自动化过程中使用约定来创建应用程序的视图、控制器、模型和配置文件。此外，你还了解了 Grails 插件的存在，这些插件用于在\
  \ Grails 上下文中自动化与相关 Java API 或框架相关的任务。然后，你探索了 Grails 如何根据应用程序的工作环境（可以是开发、测试或生产环境）分离配置参数并执行任务。\n\
  \n接着，你学习了 Grails 如何从应用程序的领域类生成相应的控制器和视图，用于对关系型数据库执行 CRUD 操作。随后，你探索了 Grails 的国际化、日志记录和测试功能。\n\
  \n接下来，你探索了用于模块化应用程序显示的 Grails 布局和模板，然后了解了 Grails 对象关系映射功能以及自定义标签的创建。\n\n最后，你学习了如何将\
  \ Spring Security 应用于 Grails 项目，以及如何配置和使用它来保护 URL 和方法。\n\n部署到云端\n\n在过去的几年里，云技术发展迅速，许多公司现在提供以下类型的云解决方案：\n\
  \n\n\n*   平台即服务\n\n*   基础设施即服务\n\n*   软件即服务\n\n**平台即服务**，顾名思义，是一个用于运行应用程序的完整平台。通常，你可以为应用程序选择一些想要使用的服务（如数据库、消息传递、日志记录等）。这些服务由谷歌（Google\
  \ Cloud Platform）、Pivotal（CloudFoundry）和亚马逊（Amazon Web Services）等公司提供。\n\n**基础设施即服务**提供虚拟机和其他资源等基础设施，用于构建你自己的部署平台。一些例子包括\
  \ VMware ESX 和 Oracle VirtualBox。\n\n**软件即服务**是通过云交付的一个或多个软件，例如 Office 365 和 Google\
  \ Apps for Work。\n\n本章将重点介绍平台即服务云解决方案，特别是 Pivotal 提供的名为 CloudFoundry 的云解决方案。\n\n\
  A-1. 注册 CloudFoundry\n\n问题\n\n你想使用 CloudFoundry 来部署你的应用程序。\n\n解决方案\n\n在 [`http://run.pivotal.io`](http://run.pivotal.io)\
  \ 注册 CloudFoundry。\n\n工作原理\n\n要能够部署到 CloudFoundry，你需要一个账户。导航到 [`http://run.pivotal.io`](http://run.pivotal.io)\
  \ 并点击“免费注册”按钮（见图 A-1）。\n\n![A314861_4_En_BookBackmatter_Fig1_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig1_HTML.jpg)\n\
  \n图 A-1.\n\nCloudFoundry 注册界面\n\n注册 CloudFoundry 非常简单，只需输入你的姓名、电子邮件地址和密码，然后点击“注册”按钮（见图\
  \ A-2）。\n\n![A314861_4_En_BookBackmatter_Fig2_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig2_HTML.jpg)\n\
  \n图 A-2.\n\nCloudFoundry 注册表单\n\n点击按钮后，你将收到一封包含链接的确认邮件。点击此链接后，你将跳转到确认页面（见图 A-3）。\n\
  \n![A314861_4_En_BookBackmatter_Fig3_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig3_HTML.jpg)\n\
  \n图 A-3.\n\nCloudFoundry 确认页面\n\n接受服务条款并点击“下一步：领取试用”按钮后，你将跳转到账户验证页面（见图 A-4），系统会要求你输入手机号码。\n\
  \n![A314861_4_En_BookBackmatter_Fig4_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig4_HTML.jpg)\n\
  \n图 A-4.\n\nCloudFoundry 账户验证页面\n\n点击“发送验证码”按钮后，你的手机会收到一条包含验证码的短信。你可以在下一个验证页面输入此验证码（见图\
  \ A-5）。\n\n![A314861_4_En_BookBackmatter_Fig5_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig5_HTML.jpg)\n\
  \n图 A-5.\n\n输入验证码\n\n输入验证码后，系统会要求你创建一个组织（见图 A-6）。这可以是项目名称或你的组织名称。组织名称必须是唯一的，如果你尝试使用已存在的组织名称，将会收到错误提示。\n\
  \n![A314861_4_En_BookBackmatter_Fig6_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig6_HTML.jpg)\n\
  \n图 A-6.\n\n输入组织名称\n\nA-2. 安装并使用 CloudFoundry CLI\n\n问题\n\n你想使用 CloudFoundry CLI\
  \ 工具来推送你的应用程序。\n\n解决方案\n\n下载并安装 CloudFoundry CLI 工具。\n\n工作原理\n\n要能够操作你的 CloudFoundry\
  \ 实例，你需要一些工具。你可以在不同的 IDE 中找到这些工具，例如 Spring Source 的 Spring Tool Suite 和 Intellij\
  \ 的 IDEA。然而，最强大的是命令行工具。要安装命令行工具，首先从 [`https://github.com/cloudfoundry/cli/releases`](https://github.com/cloudfoundry/cli/releases)\
  \ 下载适合你系统的版本，或者你也可以使用包管理器来安装它们。选择并下载适合你系统的安装程序。安装完成后，这些工具就可以在命令行中使用了。\n\n现在你需要设置命令行工具，因此打开一个终端并输入\
  \ `cf login`。系统会提示你输入 API、电子邮件和密码。API 的 URL 是你的 CloudFoundry 实例的 URL。对于本教程，你使用的是公共\
  \ API，因此 URL 是 [`https://api.run.pivotal.io`](https://api.run.pivotal.io)。电子邮件地址和密码是你注册时使用的。\n\
  \n接下来，它会询问要使用的组织和空间。你可以跳过这些，因为目前你只有一个组织和一个空间。\n\n填写完这些问题后，配置会被写入用户主目录下 `.cf` 目录中的\
  \ `config.json` 文件。\n\n让我们创建一个简单的 Hello World 应用程序并将其部署到 CloudFoundry。\n\n```\n\
  package com.apress.springrecipes.cloud;\npublic class Main {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"Hello World from CloudFoundry.\");\n\
  }\n}\n```\n\n这个类是一个带有 `main` 方法的基本 Java 类。它所做的只是向控制台打印一条消息。编译该文件并为其创建 JAR 后，就可以将其部署到\
  \ CloudFoundry。要部署，请在命令行中输入 `cf push <application-name> -p Recipe_a_2_i-4.0.0.jar`，其中\
  \ `<application-name>` 是你为应用程序取的一个好名字。在部署期间，输出应如图 A-7 所示。\n\n![A314861_4_En_BookBackmatter_Fig7_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig7_HTML.jpg)\n\
  \n图 A-7.\n\n应用程序部署的输出\n\n首先要注意的是，启动应用程序似乎失败了。实际上，它确实启动了，但只是在控制台打印了一条消息，然后就立即退出了。对于\
  \ CloudFoundry 工具来说，这看起来像是启动失败，因为它在工具能够检测到它已启动之前就已经关闭了。\n\n输出的第一行是在 CloudFoundry\
  \ 上创建应用程序。它会预留一些空间并为其分配内存（默认是 1GB）。接下来，它会为公共应用程序创建路由 `<application-name>.cfapps.io`。此路由是带有\
  \ Web 界面的应用程序的入口点。对于当前应用程序来说，它没什么用（在 `cf push` 命令中添加 `--no-route` 选项可以防止创建路由）。\n\
  \n创建完成后，JAR 文件被上传。上传后，CloudFoundry 会检测它需要处理的是哪种类型的应用程序。当它确定类型后，相应的 buildpack 会被下载并添加。在这种情况下，意味着会安装\
  \ Java buildpack。之后，应用程序启动，工具将尝试检测应用程序是否成功启动。在这种情况下，它似乎失败了。\n\n输入 `cf logs <application-name>\
  \ --recent`，这将显示应用程序的最后日志记录（见图 A-8）。\n\n![A314861_4_En_BookBackmatter_Fig8_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig8_HTML.jpg)\n\
  \n图 A-8.\n\n应用程序的日志输出\n\n日志中包含你放在 `System.out` 中的那一行。所以，它实际上确实启动了，但随后立即结束，这使得它无法通过健康检查，健康检查因此发出信号表明它已崩溃。\n\
  \n\n\n如前所述，CloudFoundry 使用所谓的 buildpack 来（可选地）构建和运行应用程序。CloudFoundry 支持多种不同的 buildpack。在命令行输入\
  \ `cf buildpacks` 将列出默认支持的 buildpack 列表（见图 A-9）。\n\n![A314861_4_En_BookBackmatter_Fig9_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig9_HTML.jpg)\n\
  \n图 A-9. 默认支持的 buildpack\n\n如您所见，它支持多种语言，例如 Ruby、Python、Go、Java，甚至 .NET，这意味着 CloudFoundry\
  \ 不仅限于基于 Java 的应用程序。\n\nA-3. 部署 Spring MVC 应用程序\n\n问题\n\n您希望将基于 Spring MVC 的应用程序部署到\
  \ CloudFoundry。\n\n解决方案\n\n使用 `cf push` 将 WAR 文件推送到 CloudFoundry。\n\n工作原理\n\n首先，您将创建一个要部署到\
  \ CloudFoundry 的 Web 应用程序。在将创建的应用程序部署到 CloudFoundry 之前，您将学习如何添加特定于云的配置以及如何绑定到服务。完成所有这些操作后，您将使用\
  \ `cf push` 将应用程序发布到 CloudFoundry。\n\n创建应用程序\n\n让我们从创建一个简单的基于 Spring MVC 的 Web 应用程序开始。首先创建一个\
  \ `ContactRepository` 接口。\n\n```\npackage com.apress.springrecipes.cloud;\nimport\
  \ java.util.List;\npublic interface ContactRepository {\nList findAll();\nvoid save(Contact\
  \ c);\n}\n```\n\n现在，为该接口创建一个基于 `Map` 的实现。\n\n```\npackage com.apress.springrecipes.cloud;\n\
  import org.springframework.stereotype.Repository;\nimport java.util.ArrayList;\n\
  import java.util.HashMap;\nimport java.util.List;\nimport java.util.Map;\nimport\
  \ java.util.concurrent.atomic.AtomicLong;\n@Repository\npublic class MapBasedContactRepository\
  \ implements ContactRepository {\nprivate final AtomicLong SEQUENCE = new AtomicLong();\n\
  private Map contacts = new HashMap();\n@Override\npublic List findAll() {\nreturn\
  \ new ArrayList(contacts.values());\n}\n@Override\npublic void save(Contact c) {\n\
  if (c.getId() <= 0) {\nc.setId(SEQUENCE.incrementAndGet());\n}\ncontacts.put(c.getId(),\
  \ c);\n}\n}\n```\n\n当然，还需要一个 `Contact` 实体；这只是一个具有三个属性的简单类。\n\n```\npackage com.apress.springrecipes.cloud;\n\
  public class Contact {\nprivate long id;\nprivate String name;\nprivate String email;\n\
  public long getId() {\nreturn id;\n}\npublic void setId(long id) {\nthis .id = id;\n\
  }\npublic String getName() {\nreturn name;\n}\npublic void setName(String name)\
  \ {\nthis .name = name;\n}\npublic String getEmail() {\nreturn email;\n}\npublic\
  \ void setEmail(String email) {\nthis .email = email;\n}\n}\n```\n\n由于这是一个 Web 应用程序，让我们创建一个控制器。\n\
  \n```\npackage com.apress.springrecipes.cloud.web;\nimport com.apress.springrecipes.cloud.Contact;\n\
  import com.apress.springrecipes.cloud.ContactRepository;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.ModelAttribute;\n\
  import org.springframework.web.bind.annotation.PostMapping;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  @Controller\n@RequestMapping(\"/contact\")\npublic class ContactController {\nprivate\
  \ final ContactRepository contactRepository;\n@Autowired\npublic ContactController(ContactRepository\
  \ contactRepository) {\nthis .contactRepository = contactRepository;\n}\n@GetMapping\n\
  public String list(Model model) {\nmodel.addAttribute(\"contacts\", contactRepository.findAll());\n\
  return \"list\";\n}\n@GetMapping(\"/new\")\npublic String newContact(Model model)\
  \ {\nmodel.addAttribute( new Contact());\nreturn \"contact\";\n}\n@PostMapping(\"\
  /new\")\npublic String newContact(@ModelAttribute Contact contact) {\ncontactRepository.save(contact);\n\
  return \"redirect:/contact\";\n}\n}\n```\n\n这个控制器很简单。它有一个用于显示当前可用联系人列表的方法，还有一个用于添加新联系人的方法。接下来的两个视图需要创建在\
  \ `/WEB-INF/views` 目录中。首先，这是 `list.jsp` 文件：\n\n```\n\nSpring Recipes - Contact Sample\n\
  \nContacts\n\nName  Email\n\n${contact.name}  ${contact.email}\n\n\">New Contact\n\
  \n```\n\n接下来，这是用于添加新联系人的 `contact.jsp` 文件：\n\n```\n\nSpring Recipes - Contact Sample\n\
  \nContact\n\nContact Information\n\nName\n\nEmail Address\n\nSave\n\n```\n\n以上就是所有的应用程序代码。剩下的部分是应用程序配置和一个用于启动应用程序的类。首先，这是应用程序配置：\n\
  \n```\npackage com.apress.springrecipes.cloud.config;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\n@ComponentScan(basePackages\
  \ = {\"com.apress.springrecipes.cloud\"})\n@Configuration\npublic class ContactConfiguration\
  \ {}\n```\n\n应用程序配置相当简单。它只定义了一个组件扫描注解来检测服务和控制器。接下来，需要配置与 Web 相关的部分。\n\n```\npackage\
  \ com.apress.springrecipes.cloud.web;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.DefaultServletHandlerConfigurer;\n\
  import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport org.springframework.web.servlet.config.annotation.ViewControllerRegistry;\n\
  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;\nimport\
  \ org.springframework.web.servlet.view.InternalResourceViewResolver;\n@Configuration\n\
  @EnableWebMvc\npublic class ContactWebConfiguration implements WebMvcConfigurer\
  \ {\n@Override\npublic void configureDefaultServletHandling(DefaultServletHandlerConfigurer\
  \ configurer) {\nconfigurer.enable();\n}\n@Override\npublic void addViewControllers(ViewControllerRegistry\
  \ registry) {\nregistry.addViewController(\"/\").setViewName(\"redirect:/contact\"\
  );\n}\n@Bean\npublic InternalResourceViewResolver internalResourceViewResolver()\
  \ {\nInternalResourceViewResolver viewResolver = new InternalResourceViewResolver();\n\
  viewResolver.setPrefix(\"/WEB-INF/views/\");\nviewResolver.setSuffix(\".jsp\");\n\
  return viewResolver;\n}\n}\n```\n\n最后缺失的部分是应用程序初始化器。\n\n```\npackage com.apress.springrecipes.cloud.web;\n\
  import com.apress.springrecipes.cloud.config.ContactConfiguration;\nimport org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;\n\
  public class ContactWebApplicationInitializer extends AbstractAnnotationConfigDispatcherServletInitializer\
  \ {\n@Override\nprotected Class[] getRootConfigClasses() {\nreturn null ;\n}\n@Override\n\
  protected Class[] getServletConfigClasses() {\nreturn new Class[] {ContactConfiguration.class,\
  \ ContactWebConfiguration.class};\n}\n@Override\nprotected String[] getServletMappings()\
  \ {\nreturn new String[] {\"/\"} ;\n}\n}\n```\n\n现在一切就绪。构建 WAR 文件后，通过在命令行输入 `cf\
  \ push <application-name> -p contact.war` 将其推送到 CloudFoundry。这将显示上传、安装 buildpack\
  \ 和安装 Tomcat 的进度。成功部署后，应用程序可在 `<application-name>.cfapps.io` 访问（见图 A-10）。\n\n![A314861_4_En_BookBackmatter_Fig10_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig10_HTML.jpg)\n\
  \n图 A-10. CloudFoundry 上的联系人应用程序\n\n使用数据源\n\n目前，应用程序将联系人信息存储在 `HashMap` 中。这对于测试目的来说很好，但对于真正的应用程序，数据需要存储在数据库中。首先，创建一个\
  \ JDBC 驱动的 `ContactRepository` 实现。\n\n\n\n```\npackage com.apress.springrecipes.cloud;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jdbc.core.support.JdbcDaoSupport;\n\
  import org.springframework.stereotype.Service;\nimport javax.sql.DataSource;\nimport\
  \ java.util.List;\n@Service\npublic class JdbcContactRepository extends JdbcDaoSupport\
  \ implements ContactRepository {\n@Autowired\npublic JdbcContactRepository(DataSource\
  \ dataSource) {\nsuper .setDataSource(dataSource);\n}\n@Override\npublic List findAll()\
  \ {\nreturn getJdbcTemplate().query(\"select id, name, email from contact\", (rs,\
  \ rowNum) -> {\nContact contact = new Contact();\ncontact.setId(rs.getLong(1));\n\
  contact.setName(rs.getString(2));\ncontact.setEmail(rs.getString(3));\nreturn contact;\n\
  });\n}\n@Override\npublic void save(Contact c) {\ngetJdbcTemplate().update(\"insert\
  \ into contact (name, email) values (?, ?)\", c.getName(), c.getEmail());\n}\n}\n\
  ```\n\n接下来，更新配置并添加 `DataSource` 和 `DataSourceInitializer` 类。\n\n```\npackage com.apress.springrecipes.cloud.config;\n\
  import com.apress.springrecipes.cloud.ContactRepository;\nimport com.apress.springrecipes.cloud.JdbcContactRepository;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseBuilder;\n\
  import org.springframework.jdbc.datasource.embedded.EmbeddedDatabaseType;\nimport\
  \ org.springframework.jdbc.datasource.init.DataSourceInitializer;\nimport org.springframework.jdbc.datasource.init.ResourceDatabasePopulator;\n\
  import javax.sql.DataSource;\n@ComponentScan(basePackages = {\"com.apress.springrecipes.cloud\"\
  })\n@Configuration\npublic class ContactConfiguration {\n@Bean\npublic DataSource\
  \ dataSource() {\nreturn new EmbeddedDatabaseBuilder().setType(EmbeddedDatabaseType.H2).build();\n\
  }\n@Bean\npublic DataSourceInitializer dataSourceInitializer(DataSource dataSource)\
  \ {\nResourceDatabasePopulator populator = new ResourceDatabasePopulator();\npopulator.addScript(\
  \ new ClassPathResource(\"/sql/schema.sql\"));\npopulator.setContinueOnError( true\
  \ );\nDataSourceInitializer initializer = new DataSourceInitializer();\ninitializer.setDataSource(dataSource);\n\
  initializer.setDatabasePopulator(populator);\nreturn initializer;\n}\n}\n```\n\n\
  为了测试和本地部署，此处使用内存中的 H2 数据库来配置该实例。\n`EmbeddedDatabaseBuilder` 类用于创建 DataSource，而 `DataSourceInitializer`\
  \ 类负责执行创建脚本。\n\n再次构建 WAR 文件并部署到 CloudFoundry 后，应用程序应继续运行并使用内存数据库。\n然而，您希望使用一个真正的数据库，而不是内存数据库，以便内容能够在重新部署、宕机等情况下得以持久保存。\n\
  \nCloudFoundry 在市场中提供了多种服务。要查看概览，请在命令行中输入 `cf marketplace`（或 `cf m`）（参见图 A-11）。\n\
  \n![A314861_4_En_BookBackmatter_Fig11_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig11_HTML.jpg)\n\
  \n图 A-11.\n\nCloudFoundry 服务概览\n\n如您所见，这里有不同的服务，例如数据库实现、消息传递和电子邮件。对于本教程，需要一个数据库实例。有两个数据库选项：MySQL\
  \ 和 PostgreSQL。选择您喜欢的一个并创建一个实例。要构建一个基本的 MySQL 实例，请输入 `cf create-service cleardb\
  \ spark contacts-db`。数据库创建完成后，您需要将其绑定（使其可访问）到您的应用程序。输入 `cf bind-service <application-name>\
  \ contacts-db`。\n\n现在数据库已准备好可以使用。要使用它，只需重新启动或重新部署应用程序即可。\n\nCloudFoundry 有一个名为 **自动重新配置**\
  \ 的功能，默认情况下是启用的。它会查找特定类型的 bean，在本例中是 `DataSource`。它会尝试用您配置的服务提供的 DataSource 来替换它。然而，这仅在只有一个服务且只有一个该类型的\
  \ bean 时才有效。如果您有多个数据源，自动重新配置将无法工作。它适用于所有提供的服务，例如 AMQP 连接工厂和 MongoDB 实例。\n\n访问云服务\n\
  \n尽管自动重新配置是一个不错的功能，但如前所述，它并不总是有效。不过，有一种简单的方法可以明确告诉 CloudFoundry 在部署时使用哪个服务。CloudFoundry\
  \ 做的另一件好事是它会激活一个名为 `cloud` 的 profile。这个 profile 可用于判断应用程序是否部署在 CloudFoundry 上，因此，当部署在此处时，可以专门访问某些\
  \ bean。\n\n需要两个额外的依赖项。\n\n```\norg.springframework.cloud \nspring-cloud-cloudfoundry-connector\
  \ \n1.2.4.RELEASE\n\norg.springframework.cloud \nspring-cloud-spring-service-connector\
  \ \n1.2.4.RELEASE\n\n```\n\n这两个依赖项使得与 CloudFoundry 实例及其提供的服务进行交互变得容易。现在这些依赖项已可用，剩下的就是重新配置的问题了。\n\
  \n```\npackage com.apress.springrecipes.cloud.config;\nimport org.springframework.cloud.config.java.AbstractCloudConfig;\n\
  import org.springframework.context.annotation.Profile;\n...\n@Configuration\n@ComponentScan(basePackages\
  \ = {\"com.apress.springrecipes.cloud\"})\npublic class ContactConfiguration {\n\
  @Configuration\n@Profile(\"default\")\npublic static class LocalDatasourceConfiguration\
  \ {\n@Bean\npublic DataSource dataSource() {\nreturn new EmbeddedDatabaseBuilder().setType(EmbeddedDatabaseType.H2).build();\n\
  }\n}\n@Configuration\n@Profile(\"cloud\")\npublic static class CloudDatasourceConfiguration\
  \ extends AbstractCloudConfig {\n@Bean\npublic DataSource dataSource() {\nreturn\
  \ connectionFactory().dataSource(\"contacts-db\");\n}\n}\n}\n```\n\n请注意这两个内部配置类。它们都带有\
  \ `@Profile` 注解。当没有激活 cloud profile 时，`LocalDataSourceConfiguration` 可用。仅当部署到云环境时，`CloudDataSourceConfiguration`\
  \ 才可用。后者继承了 `AbstractCloudConfig` 类，该类提供了便捷的方法来访问所提供的服务。要获取数据源的引用，请在 `connectionFactory()`\
  \ 方法上使用 `dataSource()` 查找方法。对于默认服务（数据源、MongoDB、Redis 等），它提供了便捷的访问方法。如果您开发并部署了自定义服务，则可以使用通用的\
  \ `service()` 方法来访问它们。\n\n重新构建 WAR 并将其推送到 CloudFoundry 后，它仍然可以正常工作。\n\nA-4\\. 移除应用程序\n\
  \n问题\n\n您想从 CloudFoundry 中移除一个应用程序。\n\n解决方案\n\n使用 CloudFoundry 工具从您的空间中删除该应用程序。\n\
  \n工作原理\n\n要移除应用程序，您需要发出 `delete` 命令，而不是 `push`，让 CloudFoundry 移除该应用程序。要移除应用程序，请在命令行中输入\
  \ `cf delete <application-name>`。在确认您确实要删除该应用程序后，CloudFoundry 将开始移除该应用程序。\n\n输出应类似于图\
  \ A-12 所示。\n\n![A314861_4_En_BookBackmatter_Fig12_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig12_HTML.jpg)\n\
  \n图 A-12.\n\n从 CloudFoundry 移除应用程序的输出\n\n总结\n\n\n\n在本章中，你学习了如何将应用部署到 Pivotal 的 CloudFoundry\
  \ 提供的云平台，以及如何从该平台移除应用。首先，你部署了一个没有任何外部连接的基础 Web 应用。之后，你添加了一个数据源，并学习了如何创建服务并将其绑定到你的应用。一旦服务可用，你就体验到了\
  \ CloudFoundry 提供的自动重配置功能。\n\n最后，你探索了如何在应用配置中与云交互，而不是依赖自动重配置。\n\n缓存\n\n当程序中执行大量计算、数据检索速度缓慢或检索到的数据几乎从不变化时，应用缓存会非常有用。缓存是一种透明地存储和检索数据的能力，以便更快地向客户端提供数据。\n\
  \n在 Java 生态系统中，有多种缓存实现，从使用简单的 `Map` 实现到完全分布式缓存解决方案（例如 Oracle Coherence）。此外，还有久经考验且值得信赖的\
  \ Ehcache。\n\n从 Java Enterprise Edition 7 开始，还有一个名为 JCache 的通用缓存 API（JSR-107）。针对此规范，存在多种实现（例如\
  \ Apache JCS、Hazelcast 和符合 JCache 规范的 Oracle Coherence）。\n\nSpring 提供了一个缓存抽象，使得使用这些实现中的任何一种都更加容易，从而可以非常轻松地为你的应用添加缓存。在测试时，你可以使用基于简单\
  \ `Map` 的实现，而你的实际系统则可以使用 Oracle Coherence 集群进行缓存。\n\n在本附录中，你将探索 Spring 的缓存抽象，并了解将缓存应用于应用的不同策略。\n\
  \nB-1. 使用 Ehcache 实现缓存\n\n问题\n\n你有一个包含大量计算任务的应用，并且希望缓存计算结果并重复使用。\n\n解决方案\n\n使用 Ehcache\
  \ 存储计算结果。对于每次计算，检查结果是否已存在。如果存在，则返回缓存的值；如果不存在，则进行计算并将结果放入缓存。\n\n工作原理\n\n让我们创建 `CalculationService`，它通过使用\
  \ `Thread.sleep()` 方法来模拟大量计算。\n\n```\npackage com.apress.springrecipes.caching;\n\
  import java.math.BigDecimal;\npublic class PlainCalculationService implements CalculationService\
  \ {\n@Override\npublic BigDecimal heavyCalculation(BigDecimal base, int power) {\n\
  try {\nThread.sleep(500);\n} catch (InterruptedException e) {}\nreturn base.pow(power);\n\
  }\n}\n```\n\n如你所见，计算某个数的幂是一项繁重的计算。创建一个 `Main` 类来多次迭代运行此程序。\n\n```\npackage com.apress.springrecipes.caching;\n\
  import java.math.BigDecimal;\npublic class Main {\npublic static final void main(String[]\
  \ args) throws Exception {\nCalculationService calculationService = new PlainCalculationService();\n\
  for (int i = 0; i < 10 ;i++) {\nlong start = System.currentTimeMillis();\nSystem.out.println(calculationService.heavyCalculation(BigDecimal.valueOf(2L),\
  \ 16));\nlong duration = System.currentTimeMillis() - start;\nSystem.out.println(\"\
  Took: \" + duration);\n}\n}\n}\n```\n\n`Main` 类将运行计算十次，并输出结果以及计算所花费的时间。运行时，你会看到每次计算的时间大约为\
  \ 500 毫秒，这主要是由于 `Thread.sleep()` 造成的。\n\n不使用 Spring 的 Ehcache\n\n让我们通过引入缓存来改进系统。为此，你将使用纯\
  \ Ehcache。修改后的服务如下所示：\n\n```\npackage com.apress.springrecipes.caching;\nimport\
  \ net.sf.ehcache.Ehcache;\nimport net.sf.ehcache.Element;\nimport java.math.BigDecimal;\n\
  public class PlainCachingCalculationService implements CalculationService {\nprivate\
  \ final Ehcache cache;\npublic PlainCachingCalculationService(Ehcache cache) {\n\
  this .cache = cache;\n}\n@Override\npublic BigDecimal heavyCalculation(BigDecimal\
  \ base, int power) {\nString key = base +\"^\"+power;\nElement result = cache.get(key);\n\
  if (result != null ) {\nreturn (BigDecimal) result.getObjectValue();\n}\ntry {\n\
  Thread.sleep(500);\n} catch (InterruptedException e) {}\nBigDecimal calculatedResult\
  \ = base.pow(power);\ncache.putIfAbsent( new Element(key, calculatedResult));\n\
  return calculatedResult;\n}\n}\n```\n\n首先注意服务中新增了一个缓存变量。该缓存通过构造函数注入。让我们看看更新后的 `heavyCalculation`\
  \ 方法。它首先根据方法参数生成一个唯一键；此键用于从缓存中查找结果。如果找到，则返回该结果。如果没有缓存结果，则正常进行计算，计算完成后将其添加到缓存中；最后返回该值。\n\
  \n由于需要 Ehcache 缓存，`Main` 类需要修改，以便在构造服务之前引导 Ehcache 并查找缓存。更新后的 `Main` 类如下所示：\n\n\
  ```\npackage com.apress.springrecipes.caching;\nimport net.sf.ehcache.CacheManager;\n\
  import net.sf.ehcache.Ehcache;\n...\npublic class Main {\npublic static final void\
  \ main(String[] args) throws Exception {\nCacheManager cacheManager = CacheManager.getInstance();\n\
  Ehcache cache = cacheManager.getEhcache(\"calculations\");\nCalculationService calculationService\
  \ = new PlainCachingCalculationService(cache);\n...\ncacheManager.shutdown();\n\
  }\n}\n```\n\n首先需要构造一个 `CacheManager` 实例。为此，使用 `CacheManager` 类上的 `getInstance` 方法。该类将尝试从类路径根目录读取名为\
  \ `ehcache.xml` 的文件来配置缓存。接下来，请求一个名为 `calculations` 的缓存实例；生成的缓存被注入到 `PlainCachingCalculationService`\
  \ 实例中。\n\n`ehcache.xml` 文件是 Ehcache 的配置文件，内容如下：\n\n这将配置 Ehcache 和你想要使用的特定缓存。它在内存中保留\
  \ 100 个结果（`maxElementsInMemory`），持续 1 小时（`timeToLiveSeconds`）。当元素更多时，它会将这些元素存储到磁盘（`overflowToDisk`）。\n\
  \n运行 `Main` 类时，第一次计算大约需要 500 毫秒，而后续计算所需时间则少得多，大约为 0 到 1 毫秒。\n\n使用带 Spring 的 Ehcache\
  \ 进行配置\n\n该应用与 Spring 集成，并将利用 Spring 来配置 `CacheManager` 和构造服务。为此，你需要进行一些 Spring\
  \ 配置，并使用 `ApplicationContext` 对象来加载所有内容。配置如下：\n\n```\npackage com.apress.springrecipes.caching.config;\n\
  import com.apress.springrecipes.caching.CalculationService;\nimport com.apress.springrecipes.caching.PlainCachingCalculationService;\n\
  import net.sf.ehcache.CacheManager;\nimport net.sf.ehcache.Ehcache;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration\npublic\
  \ class CalculationConfiguration {\n@Bean\npublic CacheManager cacheManager() {\n\
  return CacheManager.getInstance();\n}\n@Bean\npublic CalculationService calculationService()\
  \ {\nEhcache cache = cacheManager().getCache(\"calculations\");\nreturn new PlainCachingCalculationService(cache);\n\
  }\n}\n```\n\n你还需要一个修改后的 `Main` 类，用于加载配置并从上下文中获取 `CalculationService` 类。\n\n\n\n\
  ```\npackage com.apress.springrecipes.caching;\nimport com.apress.springrecipes.caching.config.CalculationConfiguration;\n\
  import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import java.math.BigDecimal;\npublic class Main {\npublic static final void main(String[]\
  \ args) throws Exception {\nApplicationContext context = new AnnotationConfigApplicationContext(CalculationConfiguration.class);\n\
  CalculationService calculationService = context.getBean(CalculationService.class);\n\
  for (int i = 0; i < 10 ;i++) {\nlong start = System.currentTimeMillis();\nSystem.out.println(calculationService.heavyCalculation(BigDecimal.valueOf(2L),\
  \ 16));\nlong duration = System.currentTimeMillis() - start;\nSystem.out.println(\"\
  Took: \" + duration);\n}\n((AbstractApplicationContext) context).close();\n}\n}\n\
  ```\n\n虽然这减少了引导代码中对 Ehcache 的直接引用，但 `CalculationService` 类的实现仍然充斥着对 Ehcache 的引用。更不用说，手动缓存相当繁琐且容易出错，还会污染代码。如果缓存能像事务一样通过\
  \ AOP 应用，那就太好了。\n\n**使用 Spring 配置 Ehcache**\n\nSpring 包含一些 Ehcache 支持类，可以更轻松地配置\
  \ Ehcache 和获取缓存实例。要配置 Ehcache 的 `CacheManager`，可以使用 Spring 的 `EhCacheManagerFactoryBean`。要获取\
  \ `Cache` 实例，可以使用 `EhCacheFactoryBean`。\n\n使用 `EhCacheManagerFactoryBean` 的好处是它可以利用\
  \ Spring 的资源加载机制来加载 Ehcache 的配置文件。它还允许轻松重用已有的 `CacheManager`，并允许你使用特定名称注册它。\n\n\
  如果缓存尚不存在，`EhCacheFactoryBean` 将自动创建一个。在之前的代码中，使用的缓存是显式定义的。`EhCacheFactoryBean` 会首先尝试定位一个已存在的显式配置的缓存；如果不存在，则会使用\
  \ `ehcache.xml` 中的 `defaultCache` 元素创建一个。\n\n修改后的配置如下所示：\n\n```\npackage com.apress.springrecipes.caching.config;\n\
  import com.apress.springrecipes.caching.CalculationService;\nimport com.apress.springrecipes.caching.PlainCachingCalculationService;\n\
  import org.springframework.cache.ehcache.EhCacheFactoryBean;\nimport org.springframework.cache.ehcache.EhCacheManagerFactoryBean;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.core.io.ClassPathResource;\n@Configuration\npublic class\
  \ CalculationConfiguration {\n@Bean\npublic EhCacheManagerFactoryBean cacheManager()\
  \ {\nEhCacheManagerFactoryBean factory = new EhCacheManagerFactoryBean();\nfactory.setConfigLocation(\
  \ new ClassPathResource(\"ehcache.xml\"));\nreturn factory;\n}\n@Bean\npublic EhCacheFactoryBean\
  \ calculationsCache() {\nEhCacheFactoryBean factory = new EhCacheFactoryBean();\n\
  factory.setCacheManager(cacheManager().getObject());\nfactory.setCacheName(\"calculations\"\
  );\nreturn factory;\n}\n@Bean\npublic CalculationService calculationService() {\n\
  return new PlainCachingCalculationService(calculationsCache().getObject());\n}\n\
  }\n```\n\n**B-2. 使用 Spring 的缓存抽象进行缓存**\n\n**问题**\n\n你有一个应用程序，其中包含一些计算量大的任务。你想缓存结果并重用，但同时你不想绑定到单一的缓存实现。\n\
  \n**解决方案**\n\n使用 Ehcache 通过 Spring 的缓存抽象来存储计算结果。对于每次计算，检查结果是否已存在。如果存在，则返回缓存的值；如果不存在，则进行计算并将其放入缓存。\n\
  \n**工作原理**\n\n首先，使用 Spring 的 `Cache` 类将缓存添加到你的应用程序中。其次，使用 `get()` 方法检查结果是否已存在。如果存在，则\
  \ `return`；如果不存在，则继续执行程序。计算完成后，将值添加到缓存中。\n\n```\npackage com.apress.springrecipes.caching;\n\
  import org.springframework.cache.Cache;\nimport java.math.BigDecimal;\npublic class\
  \ PlainCachingCalculationService implements CalculationService {\nprivate final\
  \ Cache cache;\npublic PlainCachingCalculationService(Cache cache) {\nthis .cache\
  \ = cache;\n}\n@Override\npublic BigDecimal heavyCalculation(BigDecimal base, int\
  \ power) {\nString key = base +\"^\"+power;\nBigDecimal result = cache.get(key,\
  \ BigDecimal.class);\nif (result != null ) {\nreturn result;\n}\ntry {\nThread.sleep(500);\n\
  } catch (InterruptedException e) {}\nBigDecimal calculatedResult = base.pow(power);\n\
  cache.put(key, calculatedResult);\nreturn calculatedResult;\n}\n}\n```\n\n接下来，需要配置\
  \ `CacheManager` 类。首先，使用 `ConcurrentMapCacheManager` 配置一个简单的基于 `Map` 的缓存，顾名思义，它在底层使用\
  \ `ConcurrentMap` 进行缓存。\n\n```\npackage com.apress.springrecipes.caching.config;\n\
  ...\nimport org.springframework.cache.CacheManager;\nimport org.springframework.cache.concurrent.ConcurrentMapCacheManager;\n\
  @Configuration\npublic class CalculationConfiguration {\n@Bean\npublic CacheManager\
  \ cacheManager() {\nreturn new ConcurrentMapCacheManager();\n}\n@Bean\npublic CalculationService\
  \ calculationService() {\nreturn new PlainCachingCalculationService(cacheManager().getCache(\"\
  calculations\"));\n}\n}\n```\n\n你可以保持 `Main` 类不变。\n\n**将 Ehcache 与 Spring 的缓存抽象一起使用**\n\
  \n虽然 `ConcurrentMapCacheManager` 看起来能胜任工作，但它不是一个完整的缓存实现。它只会向缓存中添加内容；没有缓存驱逐或缓存溢出功能。而\
  \ Ehcache 则具备所有这些功能。使用 Ehcache（或其他缓存实现，如 JCS 或 Hazelcast）只需进行配置即可。\n\n要使用 Ehcache，首先使用\
  \ `EhCacheManagerFactoryBean` 配置 Ehcache，然后使用 `EhCacheCacheManager` 将其与 Spring 的缓存抽象挂钩。`PlainCachingCalculationService`\
  \ 可以保持不变，因为它已经使用 Spring 的缓存抽象来使用缓存。\n\n```\npackage com.apress.springrecipes.caching.config;\n\
  ...\nimport org.springframework.cache.CacheManager;\nimport org.springframework.cache.ehcache.EhCacheCacheManager;\n\
  import org.springframework.cache.ehcache.EhCacheManagerFactoryBean;\n@Configuration\n\
  public class CalculationConfiguration {\n@Bean\npublic CacheManager cacheManager()\
  \ {\nEhCacheCacheManager cacheManager = new EhCacheCacheManager();\ncacheManager.setCacheManager(ehCacheManagerFactoryBean().getObject());\n\
  return cacheManager;\n}\n@Bean\npublic EhCacheManagerFactoryBean ehCacheManagerFactoryBean()\
  \ {\nEhCacheManagerFactoryBean factory = new EhCacheManagerFactoryBean();\nfactory.setConfigLocation(\
  \ new ClassPathResource(\"ehcache.xml\"));\nreturn factory;\n}\n@Bean\npublic CalculationService\
  \ calculationService() {\nreturn new PlainCachingCalculationService(cacheManager().getCache(\"\
  calculations\"));\n}\n}\n```\n\n**B-3. 使用 AOP 实现声明式缓存**\n\n**问题**\n\n缓存是一种横切关注点。手动应用缓存可能既繁琐又容易出错。更简单的方法是声明式地指定你期望的行为，而不规定如何实现该行为。\n\
  \n**解决方案**\n\nSpring（自 3.1 版本起）提供了一种缓存通知，可以通过 `@EnableCaching` 启用。\n\n**工作原理**\n\
  \n要启用声明式缓存，你必须在配置类中添加 `@EnableCaching`。这将注册一个 `CacheInterceptor` 或 `AnnotationCacheAspect`\
  \ 类（取决于模式），该类将检测 `@Cacheable` 注解等。\n\n\n```public BigDecimal heavyCalculation(BigDecimal\
  \ base, int power) {\nString key = base +\"^\"+power;\nElement result = cache.get(key);\n\
  if (result != null ) {\nreturn (BigDecimal) result.getObjectValue();\n}\ntry {\n\
  Thread.sleep(500);\n} catch (InterruptedException e) {}\nBigDecimal calculatedResult\
  \ = base.pow(power);\ncache.putIfAbsent( new Element(key, calculatedResult));\n\
  return calculatedResult;\n}\n```\n\n注册的通知替换了**粗体**中的代码，因为这部分主要是样板代码，需要在每个要引入缓存的方法中重复编写。移除样板代码后，剩下的代码如下：\n\
  \n```\n@Override\npublic BigDecimal heavyCalculation(BigDecimal base, int power)\
  \ {\ntry {\nThread.sleep(500);\n} catch (InterruptedException e) {}\nreturn base.pow(power);\n\
  }\n```\n\n要为此方法启用缓存，需要在方法上添加 `@Cacheable` 注解。该注解需要指定要使用的缓存名称（通过注解的 `value` 属性）。\n\
  \n```\n@Override\n@Cacheable(\"calculations\")\npublic BigDecimal heavyCalculation(BigDecimal\
  \ base, int power) { ... }\n```\n\n该注解还有另外三个属性：`key`、`condition` 和 `unless`。每个属性都接受一个在运行时评估的\
  \ SpEL 表达式。`key` 属性指定用于计算缓存键的方法参数。默认使用所有方法参数。`condition` 属性可用于定义应用缓存的条件。默认情况下始终缓存，并在实际方法调用之前执行。`unless`\
  \ 属性的工作方式与 `condition` 属性类似，但它在实际方法调用之后执行。\n\n**使用 Spring AOP**\n\n`@EnableCaching`\
  \ 注解的默认操作模式是使用纯 Spring AOP。这意味着将为 `CalculationService` 创建一个代理。配置如下所示：\n\n```\npackage\
  \ com.apress.springrecipes.caching.config;\nimport com.apress.springrecipes.caching.CalculationService;\n\
  import com.apress.springrecipes.caching.PlainCalculationService;\nimport org.springframework.cache.CacheManager;\n\
  import org.springframework.cache.annotation.EnableCaching;\nimport org.springframework.cache.ehcache.EhCacheCacheManager;\n\
  import org.springframework.cache.ehcache.EhCacheManagerFactoryBean;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  @Configuration\n@EnableCaching\npublic class CalculationConfiguration {\n@Bean\n\
  public CacheManager cacheManager() {\nEhCacheCacheManager cacheManager = new EhCacheCacheManager();\n\
  cacheManager.setCacheManager(ehCacheManagerFactoryBean().getObject());\nreturn cacheManager;\n\
  }\n@Bean\npublic EhCacheManagerFactoryBean ehCacheManagerFactoryBean() {\nEhCacheManagerFactoryBean\
  \ factory = new EhCacheManagerFactoryBean();\nfactory.setConfigLocation( new ClassPathResource(\"\
  ehcache.xml\"));\nreturn factory;\n}\n@Bean\npublic CalculationService calculationService()\
  \ {\nreturn new PlainCalculationService();\n}\n}\n```\n\n现在配置中有了 `@EnableCaching`\
  \ 注解，而 `CalculationService` 只有 `@Cacheable` 注解，不再依赖缓存框架。\n\n**使用 AspectJ**\n\n使用\
  \ AspectJ 模式进行缓存只需将 `@EnableCaching` 注解的 `mode` 属性设置为 `ASPECTJ` 即可。根据使用的是编译时织入还是加载时织入，可能需要添加\
  \ `@EnableLoadTimeWeaving`。本示例假设代码使用加载时织入。为此，需要在配置类中添加上述注解。\n\n```\npackage com.apress.springrecipes.caching.config;\n\
  ...\nimport org.springframework.cache.annotation.EnableCaching;\nimport org.springframework.context.annotation.EnableLoadTimeWeaving;\n\
  @Configuration\n@EnableLoadTimeWeaving\n@EnableCaching(mode = AdviceMode.ASPECTJ)\n\
  public class CalculationConfiguration { ... }\n```\n\n关于加载时织入的更多信息，请参见配方 3-19。要运行主应用程序，需要使用所谓的\
  \ Java 代理启动。要使用加载时织入运行程序，请使用 `java -javaagent:./lib/spring-instrument-5.0.0.RELEASE.jar\
  \ -jar Recipe_19_3_ii-4.0.0.jar`（从本配方的 `build/libs` 目录执行）。\n\n**B-4. 配置自定义 KeyGenerator**\n\
  \n**问题**\n\n默认的 `KeyGenerator` 基于方法参数生成键。您希望修改此行为。\n\n**解决方案**\n\n实现一个自定义的 `KeyGenerator`，采用所需的策略，并配置缓存支持以使用此自定义\
  \ `KeyGenerator`。\n\n**工作原理**\n\n缓存抽象使用 `KeyGenerator` 接口作为键生成的回调机制。默认情况下，它使用 `SimpleKeyGenerator`\
  \ 类进行键生成。该类获取所有方法参数并计算哈希码，该哈希码用作键。\n\n您可以实现自己的生成策略并使用它来生成键。为此，创建一个实现 `KeyGenerator`\
  \ 接口并实现 `generate` 方法的类。\n\n```\npackage com.apress.springrecipes.caching;\nimport\
  \ org.springframework.cache.interceptor.KeyGenerator;\nimport java.lang.reflect.Method;\n\
  public class CustomKeyGenerator implements KeyGenerator {\n@Override\npublic Object\
  \ generate(Object target, Method method, Object ... params) {\nreturn params[0]\
  \ + \"^\" + params[1];\n}\n}\n```\n\n`CustomKeyGenerator` 获取第一个和第二个参数，并在它们之间附加一个\
  \ `^`（与示例中为缓存生成自定义键时的方式相同）。\n\n接下来，将自定义实现与 Spring 中的缓存支持连接起来。为此，使用 `CachingConfigurer`\
  \ 接口，该接口进一步配置 Spring 中的缓存支持。要实现它，可以使用 `CachingConfigurerSupport` 类仅覆盖要覆盖的配置部分。这里将覆盖\
  \ `keyGenerator` 和 `cacheManager`。\n\n**注意**\n\n不要忘记在覆盖的方法上添加 `@Bean` 注解，否则创建的实例将不会被\
  \ Spring 容器管理。\n\n```\npackage com.apress.springrecipes.caching.config;\nimport\
  \ org.springframework.cache.CacheManager;\nimport org.springframework.cache.annotation.CachingConfigurerSupport;\n\
  import org.springframework.cache.annotation.EnableCaching;\nimport org.springframework.cache.ehcache.EhCacheCacheManager;\n\
  import org.springframework.cache.ehcache.EhCacheManagerFactoryBean;\nimport org.springframework.cache.interceptor.KeyGenerator;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.core.io.ClassPathResource;\nimport com.apress.springrecipes.caching.CalculationService;\n\
  import com.apress.springrecipes.caching.CustomKeyGenerator;\nimport com.apress.springrecipes.caching.PlainCalculationService;\n\
  @Configuration\n@EnableCaching\npublic class CalculationConfiguration extends CachingConfigurerSupport\
  \ {\n@Bean\n@Override\npublic CacheManager cacheManager() {\nEhCacheCacheManager\
  \ cacheManager = new EhCacheCacheManager();\ncacheManager.setCacheManager(ehCacheManagerFactoryBean().getObject());\n\
  return cacheManager;\n}\n@Bean\n@Override\npublic KeyGenerator keyGenerator() {\n\
  return new CustomKeyGenerator();\n}\n@Bean\npublic EhCacheManagerFactoryBean ehCacheManagerFactoryBean()\
  \ {\nEhCacheManagerFactoryBean factory = new EhCacheManagerFactoryBean();\nfactory.setConfigLocation(\
  \ new ClassPathResource(\"ehcache.xml\"));\nreturn factory;\n}\n@Bean\npublic CalculationService\
  \ calculationService() {\nreturn new PlainCalculationService();\n}\n}\n```\n\n首先注意添加了\
  \ `CustomKeyGenerator`。\n\n\n作为一个 Bean，以便随时可用。接下来你将看到\n`CachingConfigurer` 的内部类\n\
  （你也可以创建一个普通的类，只要它实现了 `CachingConfigurer`\n接口即可）。`CachingConfigurer` 的实现\n返回了已配置好的\
  \ `CacheManager` 以及\n`KeyGenerator`。当\n\n使用 `CachingConfigurer` 时，\n`CacheManager`\
  \ 将\n不再被自动检测，而必须通过 `CachingConfigurer` 进行配置。\n\nB-5\\. 向缓存添加和移除对象\n\n问题\n\n你希望在创建、更新或移除对象时，使用缓存逐出和缓存放入功能。\n\
  \n解决方案\n\n在需要更新或使缓存中的对象失效的方法上，使用 `@CachePut` 和 `@CacheEvict`\n注解。\n\n工作原理\n\n除了\
  \ `@Cacheable` 之外，Spring\n还提供了 `@CachePut` 和 `@CacheEvict`\n注解，它们分别用于向缓存中添加或移除对象（或使整个缓存失效）。\n\
  \n使用缓存时，你不仅希望缓存被填满，还希望它能与应用程序内部发生的事情保持同步，包括对象的更新和移除。对于结果需要更新缓存的方法，请添加 `@CachePut`\
  \ 注解；对于使缓存中对象失效的方法，请使用 `@CacheEvict`\n注解。\n\n当使用 `CustomerRepository` 时，\n从底层数据源获取客户信息非常耗时。你决定为这个仓库添加缓存。首先创建\
  \ `CustomerRepository`\n接口。\n\n```\npackage com.apress.springrecipes.caching;\n\
  public interface CustomerRepository {\nCustomer find(long customerId);\nCustomer\
  \ create(String name);\nvoid update(Customer customer);\nvoid remove(long customerId);\n\
  }\n```\n\n你还需要一个 `Customer` 类。\n\n```\npackage com.apress.springrecipes.caching;\n\
  import java.io.Serializable;\npublic class Customer implements Serializable {\n\
  private final long id;\nprivate String name;\npublic Customer(long id) {\nthis .id\
  \ = id;\n}\npublic long getId() {\nreturn id;\n}\npublic String getName() {\nreturn\
  \ name;\n}\npublic void setName(String name) {\nthis .name = name;\n}\n@Override\n\
  public String toString() {\nreturn String.format(\"Customer [id=%d, name=%s]\",\
  \ this .id, this .name);\n}\n}\n```\n\n最后，`CustomerRepository` 接口的实现\n基于 `HashMap`，因为它仅用于测试目的。通过调用\
  \ `Thread.sleep()` 来模拟缓慢的检索过程。\n\n```\npackage com.apress.springrecipes.caching;\n\
  import org.springframework.cache.annotation.Cacheable;\nimport java.util.HashMap;\n\
  import java.util.Map;\nimport java.util.UUID;\npublic class MapBasedCustomerRepository\
  \ implements CustomerRepository {\nprivate final Map repository = new HashMap();\n\
  @Override\n@Cacheable(value = \"customers\")\npublic Customer find(long customerId)\
  \ {\ntry {\nThread.sleep(500);\n} catch (InterruptedException e) {}\nreturn repository.get(customerId);\n\
  }\n@Override\npublic Customer create(String name) {\nlong id = UUID.randomUUID().getMostSignificantBits();\n\
  Customer customer = new Customer(id);\ncustomer.setName(name);\nrepository.put(id,\
  \ customer);\nreturn customer;\n}\n@Override\npublic void update(Customer customer)\
  \ {\nrepository.put(customer.getId(), customer);\n}\n@Override\npublic void remove(long\
  \ customerId) {\nrepository.remove(customerId);\n}\n}\n```\n\n接下来，所有内容都需要通过一个配置类进行配置。\n\
  \n```\npackage com.apress.springrecipes.caching.config;\nimport com.apress.springrecipes.caching.CustomerRepository;\n\
  import com.apress.springrecipes.caching.MapBasedCustomerRepository;\nimport org.springframework.cache.CacheManager;\n\
  import org.springframework.cache.annotation.EnableCaching;\nimport org.springframework.cache.ehcache.EhCacheCacheManager;\n\
  import org.springframework.cache.ehcache.EhCacheManagerFactoryBean;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
  @Configuration\n@EnableCaching\npublic class CustomerConfiguration {\n@Bean\npublic\
  \ CacheManager cacheManager() {\nEhCacheCacheManager cacheManager = new EhCacheCacheManager();\n\
  cacheManager.setCacheManager(ehCacheManagerFactoryBean().getObject());\nreturn cacheManager;\n\
  }\n@Bean\npublic EhCacheManagerFactoryBean ehCacheManagerFactoryBean() {\nEhCacheManagerFactoryBean\
  \ factory = new EhCacheManagerFactoryBean();\nfactory.setConfigLocation( new ClassPathResource(\"\
  ehcache.xml\"));\nreturn factory;\n}\n@Bean\npublic CustomerRepository customerRepository()\
  \ {\nreturn new MapBasedCustomerRepository();\n}\n}\n```\n\n最后但同样重要的是，为了能够运行这个程序，你需要一个\
  \ `Main` 类。\n\n```\npackage com.apress.springrecipes.caching;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.context.support.AbstractApplicationContext;\nimport org.springframework.util.StopWatch;\n\
  import com.apress.springrecipes.caching.config.CustomerConfiguration;\npublic class\
  \ Main {\npublic static final void main(String[] args) throws Exception {\nApplicationContext\
  \ context =\nnew AnnotationConfigApplicationContext(CustomerConfiguration.class);\n\
  CustomerRepository customerRepository = context.getBean(CustomerRepository.class);\n\
  StopWatch sw = new StopWatch(\"Cache Evict and Put\");\nsw.start(\"Get 'Unknown\
  \ Customer'\");\nCustomer customer = customerRepository.find(1L);\nSystem.out.println(\"\
  Get 'Unknown Customer' (result) : \" + customer);\nsw.stop();\nsw.start(\"Create\
  \ New Customer\");\ncustomer = customerRepository.create(\"Marten Deinum\");\nSystem.out.println(\"\
  Create new Customer (result) : \" + customer);\nsw.stop();\nlong customerId = customer.getId();\n\
  sw.start(\"Get 'New Customer 1'\");\ncustomer = customerRepository.find(customerId);\n\
  System.out.println(\"Get 'New Customer 1' (result) : \" + customer);\nsw.stop();\n\
  sw.start(\"Get 'New Customer 2'\");\ncustomer = customerRepository.find(customerId);\n\
  System.out.println(\"Get 'New Customer 2' (result) : \" + customer);\nsw.stop();\n\
  sw.start(\"Update Customer\");\ncustomer.setName(\"Josh Long\");\ncustomerRepository.update(customer);\n\
  sw.stop();\nsw.start(\"Get 'Updated Customer 1'\");\ncustomer = customerRepository.find(customerId);\n\
  System.out.println(\"Get 'Updated Customer 1' (result) : \" + customer);\nsw.stop();\n\
  sw.start(\"Get 'Updated Customer 2'\");\ncustomer = customerRepository.find(customerId);\n\
  System.out.println(\"Get 'Updated Customer 2' (result) : \" + customer);\nsw.stop();\n\
  sw.start(\"Remove Customer\");\ncustomerRepository.remove(customer.getId());\nsw.stop();\n\
  sw.start(\"Get 'Deleted Customer 1'\");\ncustomer = customerRepository.find(customerId);\n\
  System.out.println(\"Get 'Deleted Customer 1' (result) : \" + customer);\nsw.stop();\n\
  sw.start(\"Get 'Deleted Customer 2'\");\ncustomer = customerRepository.find(customerId);\n\
  System.out.println(\"Get 'Deleted Customer 2' (result) : \" + customer);\nsw.stop();\n\
  System.out.println();\nSystem.out.println(sw.prettyPrint());\n((AbstractApplicationContext)\
  \ context).close();\n}\n}\n```\n\n首先要注意的是大量使用 `StopWatch` 的 `System.out` 调用。\n这些调用用于展示程序运行时的行为。运行这个类后，输出应该类似于图\
  \ B-1 所示。\n\n![A314861_4_En_BookBackmatter_Fig13_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig13_HTML.jpg)\n\
  \n图 B-1.\n\n\n\n运行 Main 的初始输出\n\n运行程序后，输出中有几点值得注意。首先，在移除客户后，尝试查找已删除的客户时仍然会得到结果。这是因为只有当对象仍在正在使用的缓存中时，才会从仓库中移除它。其次，创建客户后的第一次获取操作耗时较长；如果能让创建的客户立即被缓存，效率会更高。第三，虽然从输出中不直接明显，但对象更新后的第一次获取操作非常快。更新对象后，应该移除缓存的实例。\n\
  \n注意\n\n更新之所以看似有效，是因为我们更新的是与缓存中相同的 `Customer` 实例。如果更新是真正的 JDBC 更新，缓存将不会反映该更新！\n\n\
  使用 @CacheEvict 移除无效对象\n\n当对象从底层仓库中移除时，它也必须从缓存中移除（或者可能需要使整个缓存失效）。为此，请在 `remove` 方法上添加\
  \ `@CacheEvict` 注解。现在，当此方法被调用时，具有相同键的对象将从缓存中移除。\n\n```\npackage com.apress.springrecipes.caching;\n\
  import org.springframework.cache.annotation.CacheEvict;\n...\npublic class MapBasedCustomerRepository\
  \ implements CustomerRepository {\n...\n@Override\n@CacheEvict(value=\"customers\"\
  )\npublic void remove(long customerId) {\nrepository.remove(customerId);\n}\n}\n\
  ```\n\n请注意，`remove` 方法上的 `@CacheEvict` 注解需要指定要从中移除项的缓存名称。在本例中，缓存名称是 `customers`。它还有一些其他可用的属性（参见表\
  \ B-1）。\n\n表 B-1.\n\n@CacheEvict 属性\n\n属性\n |\n  描述\n |\n\n| --- | --- | --- | ---\
  \ | --- |\n\n`key`\n |\n  用于计算键的 SpEL 表达式。默认使用所有方法参数。\n |\n\n`condition`\n |\n \
  \ 决定缓存是否失效的条件。\n |\n\n`allEntries`\n |\n  设置是否应清空整个缓存；默认为 false。\n |\n\n`beforeInvocation`\n\
  \ |\n  设置应在方法调用之前还是之后（默认）使缓存失效。当在方法之前调用时，无论方法结果如何，缓存都将失效。\n |\n\n再次运行 `Main` 程序时，输出略有变化（参见图\
  \ B-2）。\n\n![A314861_4_En_BookBackmatter_Fig14_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig14_HTML.jpg)\n\
  \n图 B-2.\n\n向 remove 方法添加 @CacheEvict 后的输出\n\n查看输出，很明显，当客户被移除后，不再有结果返回。当检索已删除的客户时，返回的是\
  \ `null`，而不是缓存的实例。接下来，让我们将 `@CacheEvict` 注解添加到 `update` 方法；更新后，应该再次从底层数据源检索对象。然而，将其添加到\
  \ `update` 方法会带来一个问题。该方法的参数是一个 `Customer` 值，而缓存使用客户的 ID 作为键。（请记住，默认的键生成策略使用所有方法参数来生成键；`find`\
  \ 和 `remove` 方法都有一个 long 类型的方法参数。）\n\n为了解决这个问题，你可以在 `key` 属性中编写一个简短的 SpEL 表达式。你希望它使用第一个参数的\
  \ `id` 属性作为键。`#customer.id` 表达式将处理此问题。它将引用名为 `customer` 的方法参数。\n\n修改后的 update 方法如下所示：\n\
  \n```\npackage com.apress.springrecipes.caching;\n...\nimport org.springframework.cache.annotation.CacheEvict;\n\
  public class MapBasedCustomerRepository implements CustomerRepository {\n...\n@Override\n\
  @CacheEvict(value=\"customers\", key=\"#customer.id\")\npublic void update(Customer\
  \ customer) {\nrepository.put(customer.getId(), customer);\n}\n}\n```\n\n运行 `Main`\
  \ 类后，时间信息显示，对更新后客户的第一次查找花费的时间稍长（参见图 B-3）。\n\n![A314861_4_En_BookBackmatter_Fig15_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig15_HTML.jpg)\n\
  \n图 B-3.\n\n向 update 方法添加 @CacheEvict 后的输出\n\n使用 @CachePut 将对象放入缓存\n\n`create` 方法根据当前输入创建一个\
  \ `Customer` 对象。创建后对该对象的第一次 `find` 操作需要一些时间才能完成。虽然它能工作，但可以通过让 `create` 方法将对象放入缓存来使其更快。\n\
  \n要使方法将值放入缓存，可以使用 `@CachePut` 注解。该注解需要指定要添加对象的缓存名称。这是通过 `value` 属性完成的。与其他注解一样，还有\
  \ `key`、`condition` 和 `unless` 属性。\n\n```\npackage com.apress.springrecipes.caching;\n\
  import org.springframework.cache.annotation.CachePut;\n...\npublic class MapBasedCustomerRepository\
  \ implements CustomerRepository {\n@Override\n@CachePut(value=\"customers\", key\
  \ = \"#result.id\")\npublic Customer create(String name) { ... }\n}\n```\n\n首先注意\
  \ `update` 方法上的 `@CachePut` 注解。它通过 `value` 属性指定了缓存名称 `customers`。需要 `key` 属性，因为通常创建对象的方法会返回要缓存的实际对象。然而，键通常不是对象本身，这就是为什么你需要为\
  \ `key` 属性指定一个 SpEL 表达式。`#result` 占位符允许访问返回的对象。由于 `Customer` 对象的 `id` 是键，因此表达式 `#result.id`\
  \ 会产生所需的结果。\n\n运行主程序的结果应类似于图 B-4。\n\n![A314861_4_En_BookBackmatter_Fig16_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig16_HTML.jpg)\n\
  \n图 B-4.\n\n向 update 方法添加 @CachePut 后的结果\n\n现在，首次检索新创建的客户要快得多，因为对象是从缓存返回的，而不是从仓库中查找。\n\
  \n否决 @Cacheable 注解的结果\n\n目前，`find` 方法会缓存所有结果，即使方法返回 `null`。禁用缓存可能并不可取。对于某些结果，你可以在\
  \ `@Cacheable` 注解上使用 `unless` 属性。当满足条件（一个 SpEL 表达式）时，返回的对象将不会被缓存。\n\n```\npackage\
  \ com.apress.springrecipes.caching;\nimport org.springframework.cache.annotation.Cacheable;\n\
  ...\npublic class MapBasedCustomerRepository implements CustomerRepository {\n@Override\n\
  @Cacheable(value = \"customers\", unless=\"#result == null\")\npublic Customer find(long\
  \ customerId) { ... }\n...\n}\n```\n\n请注意 `unless` 属性中的表达式。如果结果为 `null`，缓存将被否决。`#result`\
  \ 占位符允许你访问从被调用方法返回的对象。这可用于编写表达式。这里的表达式是一个简单的 `null` 检查。\n\n图 B-5 显示了排除 `null` 被缓存后的结果。对已删除客户的两次查找花费的时间大致相同。\n\
  \n![A314861_4_En_BookBackmatter_Fig17_HTML.jpg](img/A314861_4_En_BookBackmatter_Fig17_HTML.jpg)\n\
  \n图 B-5.\n\n排除 null 被缓存后的结果\n\nB-6\\. 将缓存与事务资源同步\n\n问题\n\n你希望你的缓存能够感知事务。\n\n解决方案\n\
  \n某些 Spring 提供的 `CacheManager` 实现可以感知它们正在事务上下文中运行。`EhCacheCacheManager` 就是其中之一。要启用事务感知，请将\
  \ `transactionAware` 属性设置为 `true`。\n\n工作原理\n\n\n\n首先，创建一个 `CustomerRepository` 的事务性实现，例如使用\
  \ JDBC。\n\n```\npackage com.apress.springrecipes.caching;\nimport java.sql.Connection;\n\
  import java.sql.PreparedStatement;\nimport java.sql.ResultSet;\nimport java.sql.SQLException;\n\
  import javax.sql.DataSource;\nimport org.springframework.cache.annotation.CacheEvict;\n\
  import org.springframework.cache.annotation.CachePut;\nimport org.springframework.cache.annotation.Cacheable;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.jdbc.core.PreparedStatementCreator;\n\
  import org.springframework.jdbc.core.RowMapper;\nimport org.springframework.jdbc.support.GeneratedKeyHolder;\n\
  import org.springframework.jdbc.support.KeyHolder;\nimport org.springframework.stereotype.Repository;\n\
  import org.springframework.transaction.annotation.Transactional;\n@Repository\n\
  @Transactional\npublic class JdbcCustomerRepository implements CustomerRepository\
  \ {\nprivate final JdbcTemplate jdbc;\npublic JdbcCustomerRepository(DataSource\
  \ dataSource) {\nthis .jdbc = new JdbcTemplate(dataSource);\n}\n@Override\n@Cacheable(value\
  \ = \"customers\")\npublic Customer find(long customerId) {\nfinal String sql =\
  \ \"SELECT id, name FROM customer WHERE id=?\";\nreturn jdbc.query(sql, (rs, rowNum)\
  \ -> {\nCustomer customer = new Customer(rs.getLong(1));\ncustomer.setName(rs.getString(2));\n\
  return customer;\n}, customerId).stream().findFirst().orElse( null );\n}\n@Override\n\
  @CachePut(value=\"customers\", key = \"#result.id\")\npublic Customer create(String\
  \ name) {\nfinal String sql = \"INSERT INTO customer (name) VALUES (?);\";\nKeyHolder\
  \ keyHolder = new GeneratedKeyHolder();\njdbc.update(con -> {\nPreparedStatement\
  \ ps = con.prepareStatement(sql);\nps.setString(1, name);\nreturn ps;\n}, keyHolder);\n\
  Customer customer = new Customer(keyHolder.getKey().longValue());\ncustomer.setName(name);\n\
  return customer;\n}\n@Override\n@CacheEvict(value=\"customers\", key=\"#customer.id\"\
  )\npublic void update(Customer customer) {\nfinal String sql = \"UPDATE customer\
  \ SET name=? WHERE id=?\";\njdbc.update(sql, customer.getName(), customer.getId());\n\
  }\n@Override\n@CacheEvict(value=\"customers\")\npublic void remove(long customerId)\
  \ {\nfinal String sql = \"DELETE FROM customer WHERE id=?\";\njdbc.update(sql, customerId);\n\
  }\n}\n```\n\n现在，你需要将 `DataSource` 和 `DataSourceTransactionManager` 添加到配置中，当然还有 `JdbcCustomerRepository`。\n\
  \n```\n@Bean\npublic CustomerRepository customerRepository(DataSource dataSource)\
  \ {\nreturn new JdbcCustomerRepository(dataSource);\n}\n@Bean\npublic DataSourceTransactionManager\
  \ transactionManager(DataSource dataSource) {\nreturn new DataSourceTransactionManager(dataSource);\n\
  }\n@Bean\npublic DataSource dataSource() {\nreturn new EmbeddedDatabaseBuilder()\n\
  .setType(EmbeddedDatabaseType.H2)\n.setName(\"customers\")\n.addScript(\"classpath:/schema.sql\"\
  ).build();\n}\n```\n\n`CUSTOMER` 表在以下 `schema.sql` 中定义：\n\n```\nCREATE TABLE customer\
  \ (\nid bigint AUTO_INCREMENT PRIMARY KEY ,\nname VARCHAR(255) NOT NULL ,\n);\n\
  ```\n\n最后，将 `EhCacheCacheManager` 的 `transactionAware` 属性设置为 `true`。将此属性设置为 `true`\
  \ 将使用 `TransactionAwareCacheDecorator` 包装实际的 `Cache` 实例，该装饰器会将缓存上的操作注册到当前正在进行的事务中（如果没有可用事务，则直接执行）。\n\
  \n```\n@Bean\npublic CacheManager cacheManager() {\nEhCacheCacheManager cacheManager\
  \ = new EhCacheCacheManager();\ncacheManager.setCacheManager(ehCacheCacheManagerFactoryBean().getObject());\n\
  cacheManager.setTransactionAware( true );\nreturn cacheManager;\n}\n```\n\n现在，当你运行应用程序时，一切看起来应该仍然正常，但所有缓存操作都绑定到事务的成功执行上。因此，如果删除操作因异常而失败，`Customer`\
  \ 仍将保留在缓存中。\n\nB-7\\. 使用 Redis 作为缓存提供程序\n\n问题\n\n你想使用 Redis 作为缓存提供程序。\n\n解决方案\n\n\
  \n\n使用 Spring Data Redis 并配置一个 `RedisCacheManager` 对象来连接 Redis 实例。有关 Redis 和 Spring\
  \ Data Redis 的更多信息，另请参阅第 12 章。\n\n工作原理\n\n首先，请确保 Redis 已启动并正在运行。\n\n注意\n\n`bin`\
  \ 目录下有一个 `redis.sh` 文件，用于启动 Docker 化的 Redis 版本。\n\n配置 RedisCacheManager\n\n为了能够使用\
  \ Redis 进行缓存，你需要设置 `RedisCacheManager`，它将把缓存委托给 Redis。而 `RedisCacheManager` 又需要一个\
  \ `RedisTemplate` 类来执行其操作。\n\n```\n@Configuration\n@EnableCaching\npublic class\
  \ CustomerConfiguration {\n@Bean\npublic RedisCacheManager cacheManager(RedisConnectionFactory\
  \ connectionFactory) {\nreturn RedisCacheManager.create(connectionFactory);\n}\n\
  @Bean\npublic RedisConnectionFactory redisConnectionFactory() {\nreturn new JedisConnectionFactory();\n\
  }\n@Bean\npublic CustomerRepository customerRepository() {\nreturn new MapBasedCustomerRepository();\n\
  }\n}\n```\n\n要连接到 Redis，你需要设置 `JedisConnectionFactory`，它本身用于配置 `RedisCacheManager`。要创建一个\
  \ `RedisCacheManager` 对象，你可以将连接工厂传递给 `create` 方法，或者如果你想自定义缓存，可以使用 `builder` 方法。使用\
  \ `builder` 时，你可以自定义缓存名称、事务感知等属性。\n\n你可以保持其余代码不变。运行主程序时，它将显示向缓存添加和移除对象等操作。\n\n总结\n\
  \n在本章中，你了解了如何为应用程序添加缓存，以及这样做相当繁琐，尤其是当你想在代码的多个部分引入缓存时。你探索了纯 Ehcache API 和 Spring\
  \ 的缓存抽象。在完成手动缓存后，你探索了使用 AOP 应用缓存，包括使用代理的纯 Spring AOP 和使用加载时织入的 AspectJ。\n\n接下来，你学习了不同的注解：`@Cacheable`、`@CacheEvict`\
  \ 和 `@CachePut`，以及它们如何影响应用程序的缓存行为。你还学习了如何使用 SpEL 表达式来检索用于缓存或缓存失效的正确键，以及如何影响 `@Cacheable`\
  \ 注解的缓存行为。\n\n最后一个方案介绍了 Spring Gemfire 作为一种缓存解决方案，并探讨了如何将其用作本地或远程缓存解决方案。\n\n索引\n\
