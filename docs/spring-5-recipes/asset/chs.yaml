  ## 1-6\. 使用 Gradle Wrapper 构建 Spring 应用程序


  ### 问题


  你想从命令行使用 Gradle wrapper 来构建一个 Spring 应用程序。


  ### 解决方案


  从命令行运行 `gradlew` 脚本。


  ### 工作原理


  尽管 Gradle（参见技巧 1-5）是一款独立的命令行工具，但许多（开源）项目使用 Gradle wrapper 来让你访问 Gradle。这种方法的好处是应用程序完全自给自足。作为开发者，你无需安装
  Gradle，因为 Gradle wrapper 会下载特定版本的 Gradle 来构建项目。


  一旦你拥有一个使用 Gradle wrapper 的项目，只需在命令行键入 `./gradlew build`，Gradle 就会自动下载并运行构建。唯一的先决条件是安装
  Java SDK，因为 Gradle 在运行时需要它，并且 Gradle wrapper 也需要它才能运行。


  下载本书的源代码并将其解压到本地目录后，进入名为 `ch01/Recipe_1_6` 的目录。键入 `./gradlew` 来调用 Gradle wrapper
  并自动构建 `Recipe_1_6` 下的应用程序。输出将类似于图 1-21 中的内容。


