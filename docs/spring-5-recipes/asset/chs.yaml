  有时，当我们希望您特别注意代码示例中的某一部分时，我们会将该部分字体加粗。请注意，加粗并不一定反映与先前版本的代码更改。


  当一行代码过长而无法适应页面宽度时，我们会使用代码续行符将其断开。请注意，在输入代码时，您必须将行连接起来，中间不留任何空格。


  ## 前提条件


  由于 Java 编程语言是平台无关的，您可以自由选择任何受支持的操作系统。但是，本书中的一些示例使用了特定于平台的路径。在输入示例之前，请根据您的操作系统格式进行相应转换。


  为了充分利用本书，请安装 JDK 1.8 或更高版本。您应该安装一个 Java IDE 以简化开发。对于本书，示例代码基于 Gradle。如果您运行 Eclipse
  并安装 Gradle 插件，则可以在 Eclipse 中打开相同的代码，并且 `CLASSPATH` 和依赖项将由 Gradle 元数据填充。


  如果您使用 Eclipse，您可能更喜欢 SpringSource Tool Suite (STS)，因为它预装了在 Eclipse 中高效使用 Spring
  框架所需的插件。如果您使用 IntelliJ IDEA，则需要启用 Gradle（和 Groovy）插件。


