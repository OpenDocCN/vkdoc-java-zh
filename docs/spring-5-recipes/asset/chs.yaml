  在本章中，你学习了如何设置最流行的开发工具来创建 Spring 应用程序。你探索了如何使用四种工具箱来构建和运行 Spring 应用程序。其中两种工具箱涉及使用
  IDE：由 Spring 框架创建者分发的 Spring Tool Suite 和由 JetBrains 分发的 IntelliJ IDE。另外两种工具箱涉及使用命令行工具：Maven
  构建工具和较新的 Gradle 构建工具，后者正逐渐比 Maven 构建工具更受欢迎。


  '
- '# 2. Spring 核心任务


  在本章中，你将学习与 Spring 相关的核心任务。Spring 框架的核心是 Spring 控制反转（IoC）容器。IoC 容器用于管理和配置普通 Java
  对象（POJO）。由于 Spring 框架的主要吸引力之一在于使用 POJO 构建 Java 应用程序，因此 Spring 的许多核心任务都涉及在 IoC 容器中管理和配置
  POJO。


  因此，无论你计划将 Spring 框架用于 Web 应用程序、企业集成还是其他类型的项目，使用 POJO 和 IoC 容器都是你需要采取的首要步骤之一。本章中的大部分技巧涵盖了你在本书中以及日常开发
  Spring 应用程序时会用到的任务。


  注意


  在本书和 Spring 文档中，术语 bean 与 POJO 实例可互换使用。两者都指由 Java 类创建的对象实例。此外，术语组件与 POJO 类在本书和 Spring
  文档中也可互换使用。两者都指代创建对象实例的实际 Java 类。


  提示


  源代码下载已组织为使用 Gradle（通过 Gradle wrapper）来构建技巧应用程序。Gradle 负责加载所有必要的 Java 类和依赖项，并创建可执行的
  JAR 文件。第 1 章描述了如何设置 Gradle 工具。此外，如果一个技巧说明了多种方法，源代码会使用罗马字母进行分类（例如，`Recipe_2_1_i`、`Recipe_2_1_ii`、`Recipe_2_1_iii`
  等）。


  要构建每个应用程序，请进入 `Recipe` 目录（例如，`Ch2/Recipe_2_1_i/`）并执行 `./gradlew build` 命令来编译源代码。源代码编译完成后，会创建一个
  `build/libs` 子目录，其中包含应用程序的可执行文件。然后你可以从命令行运行应用程序 JAR（例如，`java -jar Recipe_2_1_i-4.0.0.jar`）。


  ## 2-1\. 使用 Java 配置来配置 POJO


  ### 问题


  你想使用 Spring 的 IoC 容器通过注解来管理 POJO。




  ### 解决方案


  设计一个 POJO 类。接着，创建一个带有 `@Configuration` 和 `@Bean` 注解的 Java 配置类，用于配置 POJO 实例的值；或者使用
  `@Component`、`@Repository`、`@Service` 或 `@Controller` 注解来设置 Java 组件，以便后续创建 POJO
  实例的值。然后，实例化 Spring IoC 容器来扫描带有注解的 Java 类。这样，POJO 实例或 Bean 实例就可以被访问，并组合成应用程序的一部分。


  ### 工作原理


  假设你要开发一个生成序列号的应用程序，并且需要为不同用途生成多个序列号系列。每个序列都有自己的前缀、后缀和初始值。因此，你必须为应用程序创建并维护多个生成器实例。创建一个
  POJO 类，并通过 Java 配置来创建 Bean。


  根据需求，你创建了一个 `SequenceGenerator` 类，它包含三个属性：`prefix`、`suffix` 和 `initial`。你还创建了一个私有字段
  `counter`，用于存储每个生成器的数值。每次在生成器实例上调用 `getSequence()` 方法时，你都会得到拼接了 `prefix` 和 `suffix`
  的上一个序列号。


  ```

  package com.apress.springrecipes.sequence;

  import java.util.concurrent.atomic.AtomicInteger;

  public class SequenceGenerator {

  private String prefix;

  private String suffix;

  private int initial;

  private final AtomicInteger counter = new AtomicInteger();

  public SequenceGenerator() {

  }

  public void setPrefix(String prefix) {

  this.prefix = prefix;

  }

  public void setSuffix(String suffix) {

  this.suffix = suffix;

  }

  public void setInitial(int initial) {

  this.initial = initial;

  }

  public String getSequence() {

  StringBuilder builder = new StringBuilder();

  builder.append(prefix)

  .append(initial)

  .append(counter.getAndIncrement())

  .append(suffix);

  return builder.toString();

  }

  }

  ```


  #### 使用 @Configuration 和 @Bean 创建 Java 配置以生成 POJO


  为了在 Spring IoC 容器中定义 POJO 类的实例，你可以创建一个带有实例化值的 Java 配置类。一个包含 POJO 或 Bean 定义的 Java
  配置类如下所示：


  ```

  package com.apress.springrecipes.sequence.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import com.apress.springrecipes.sequence.SequenceGenerator;

  @Configuration

  public class SequenceGeneratorConfiguration {

  @Bean

  public SequenceGenerator sequenceGenerator() {

  SequenceGenerator seqgen = new SequenceGenerator();

  seqgen.setPrefix("30");

  seqgen.setSuffix("A");

  seqgen.setInitial("100000");

  return seqgen;

  }

  }

  ```


  注意，`SequenceGeneratorConfiguration` 类使用了 `@Configuration` 注解进行修饰；这告诉 Spring 它是一个配置类。当
  Spring 遇到带有 `@Configuration` 注解的类时，它会在该类中查找 Bean 实例的定义，这些定义是使用 `@Bean` 注解修饰的 Java
  方法。这些 Java 方法创建并返回一个 Bean 实例。


  任何使用 `@Bean` 注解修饰的方法定义都会根据方法名生成一个 Bean 名称。或者，你也可以在 `@Bean` 注解中使用 `name` 属性显式指定 Bean
  名称。例如，`@Bean(name="mys1")` 使得该 Bean 以 `mys1` 的名称可用。


  注意


  如果你显式指定了 Bean 名称，那么在创建 Bean 时，方法名将被忽略。


  #### 实例化 Spring IoC 容器以扫描注解


  你必须实例化 Spring IoC 容器，以便扫描包含注解的 Java 类。通过这样做，Spring 会检测到 `@Configuration` 和 `@Bean`
  注解，这样你就可以随后从 IoC 容器本身获取 Bean 实例。


  Spring 提供了两种类型的 IoC 容器实现。基础的一种称为 Bean 工厂。更高级的一种称为应用上下文，它与 Bean 工厂兼容。请注意，这两种 IoC
  容器的配置文件是相同的。


  应用上下文在保持基本功能兼容的同时，提供了比 Bean 工厂更高级的特性。因此，我们强烈建议为每个应用程序使用应用上下文，除非应用程序的资源受限（例如，在 Applet
  或移动设备上运行 Spring 时）。Bean 工厂和应用上下文的接口分别是 `BeanFactory` 和 `ApplicationContext`。`ApplicationContext`
  接口是 `BeanFactory` 的子接口，用于保持兼容性。


  由于 `ApplicationContext` 是一个接口，你必须实例化它的一个实现。Spring 有多个应用上下文实现；我们建议你使用 `AnnotationConfigApplicationContext`，它是最新且最灵活的实现。使用这个类，你可以加载
  Java 配置文件。


  ```

  ApplicationContext context = new AnnotationConfigApplicationContext    (SequenceGeneratorConfiguration.class);

  ```


  一旦应用上下文被实例化，对象引用（此处为 `context`）就提供了一个访问 POJO 实例或 Bean 的入口点。


  #### 从 IoC 容器获取 POJO 实例或 Bean


  要从 Bean 工厂或应用上下文中获取一个已声明的 Bean，只需调用 `getBean()` 方法并传入唯一的 Bean 名称即可。`getBean()` 方法的返回类型是
  `java.lang.Object`，因此在使用前你必须将其强制转换为实际类型。


  ```

  SequenceGenerator generator =

  (SequenceGenerator) context.getBean("sequenceGenerator");

  ```


  `getBean()` 方法还支持另一种变体，你可以提供 Bean 的类名以避免强制类型转换。


  ```

  SequenceGenerator generator = context.getBean("sequenceGenerator",SequenceGenerator.class);

  ```


  如果只有一个 Bean，你可以省略 Bean 名称。


  ```

  SequenceGenerator generator = context.getBean(SequenceGenerator.class);

  ```


  一旦完成这一步，你就可以像使用在 Spring 外部通过构造函数创建的任何对象一样使用 POJO 或 Bean。


  一个用于运行序列生成器应用程序的 `Main` 类如下所示：


  ```

  package com.apress.springrecipes.sequence;

  import com.apress.springrecipes.sequence.config.SequenceGeneratorConfiguration;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  ApplicationContext context =

  new AnnotationConfigApplicationContext(SequenceGeneratorConfiguration.class);

  SequenceGenerator generator = context.getBean(SequenceGenerator.class);

  System.out.println(generator.getSequence());

  System.out.println(generator.getSequence());

  }

  }

  ```


  如果所有内容都在 Java 类路径中可用（`SequenceGenerator` POJO 类和 Spring JAR 依赖项），你应该会看到以下输出，以及一些日志消息：


  ```

  30100000A

  30100001A

  ```




  #### 使用 @Component 注解创建 POJO 类，通过 DAO 生成 Bean


  到目前为止，Spring Bean 的实例化都是通过在 Java 配置类中硬编码值来完成的。这是简化 Spring 示例的首选方法。


  然而，大多数应用程序的 POJO 实例化过程要么来自数据库，要么来自用户输入。因此，现在是时候向前迈进，使用更贴近真实世界的场景了。在本节中，我们将使用一个 `Domain`
  类和一个数据访问对象（DAO）类来创建 POJO。你仍然不需要设置数据库——实际上你会在 DAO 类中硬编码值——但熟悉这种类型的应用程序结构很重要，因为它是大多数实际应用程序和未来方案的基础。


  假设你需要开发一个像上一节中那样的序列生成器应用程序。你需要稍微修改类结构以适应 `Domain` 类和 DAO 模式。首先，创建一个名为 `Sequence`
  的领域类，其中包含 `id`、`prefix` 和 `suffix` 属性。


  ```

  package com.apress.springrecipes.sequence;

  public class Sequence {

  private final String id;

  private final String prefix;

  private final String suffix;

  public Sequence(String id, String prefix, String suffix) {

  this.id = id;

  this.prefix = prefix;

  this.suffix = suffix;

  }

  public String getId() {

  return id;

  }

  public String getPrefix() {

  return prefix;

  }

  public String getSuffix() {

  return suffix;

  }

  }

  ```


  然后，为 DAO 创建一个接口，该接口负责从数据库访问数据。`getSequence()` 方法通过 ID 从数据库表中加载一个 POJO 或 `Sequence`
  对象，而 `getNextValue()` 方法则检索特定数据库序列的下一个值。


  ```

  package com.apress.springrecipes.sequence;

  public interface SequenceDao {

  public Sequence getSequence(String sequenceId);

  public int getNextValue(String sequenceId);

  }

  ```


  在生产应用程序中，你会实现这个 DAO 接口以使用某种数据访问技术。但为了简化此示例，你将实现一个 DAO，在 `Map` 中硬编码值来存储序列实例和值。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.stereotype.Component;

  import java.util.HashMap;

  import java.util.Map;

  import java.util.concurrent.atomic.AtomicInteger;

  @Component("sequenceDao")

  public class SequenceDaoImpl implements SequenceDao {

  private final Map sequences = new HashMap();

  private final Map values = new HashMap();

  public SequenceDaoImpl() {

  sequences.put("IT", new Sequence("IT", "30", "A"));

  values.put("IT", new AtomicInteger(10000));

  }

  public Sequence getSequence(String sequenceId) {

  return sequences.get(sequenceId);

  }

  public int getNextValue(String sequenceId) {

  AtomicInteger value = values.get(sequenceId);

  return value.getAndIncrement();

  }

  }

  ```


  注意 `SequenceDaoImpl` 类是如何用 `@Component("sequenceDao")` 注解修饰的。这标记了该类，以便 Spring 可以从中创建
  POJO。`@Component` 注解内的值定义了 Bean 实例的 ID，在本例中为 `sequenceDao`。如果在 `@Component` 注解中没有提供
  Bean 值名称，则默认情况下 Bean 名称被分配为未大写的非限定类名。例如，对于 `SequenceDaoImpl` 类，默认的 Bean 名称将是 `sequenceDaoImpl`。


  对 `getSequence` 方法的调用返回给定 `sequenceID` 的值。而对 `getNextValue` 方法的调用则基于给定 `sequenceID`
  的值创建一个新值并返回该新值。


  POJO 在应用程序层中进行分类。在 Spring 中有三层：持久层、服务层和表示层。`@Component` 是一个通用注解，用于修饰 POJO 以供 Spring
  检测，而 `@Repository`、`@Service` 和 `@Controller` 则是 `@Component` 的特化，用于与持久层、服务层和表示层相关联的更具体的
  POJO 场景。


  如果你不确定 POJO 的用途，可以使用 `@Component` 注解来修饰它。但是，最好尽可能使用特化注解，因为这些注解提供了基于 POJO 用途的额外功能（例如，`@Repository`
  会导致异常被包装为 `DataAccessExceptions`，这使得调试更容易）。


  #### 使用过滤器实例化 Spring IoC 容器以扫描注解


  默认情况下，Spring 会检测所有用 `@Configuration`、`@Bean`、`@Component`、`@Repository`、`@Service`
  和 `@Controller` 等注解修饰的类。你可以自定义扫描过程以包含一个或多个包含/排除过滤器。当 Java 包中有数十或数百个类时，这很有帮助。对于某些
  Spring 应用程序上下文，可能需要排除或包含带有特定注解的 POJO。


  警告


  扫描每个包可能会不必要地减慢启动过程。


  Spring 支持四种类型的过滤器表达式。`annotation` 和 `assignable` 类型用于指定注解类型和用于过滤的类/接口。`regex` 和
  `aspectj` 类型允许你指定正则表达式和 AspectJ 切入点表达式来匹配类。你还可以使用 `use-default-filters` 属性禁用默认过滤器。


  例如，以下组件扫描包含 `com.apress.springrecipes.sequence` 中名称包含单词 `Dao` 或 `Service` 的所有类，并排除带有
  `@Controller` 注解的类：


  ```

  @ComponentScan(

  includeFilters = {

  @ComponentScan.Filter(

  type = FilterType.REGEX,

  pattern = {"com.apress.springrecipes.sequence.*Dao", "com.apress.springrecipes.sequence.*Service"})

  },

  excludeFilters = {

  @ComponentScan.Filter(

  type = FilterType.ANNOTATION,

  classes = {org.springframework.stereotype.Controller.class}) }

  )

  ```


  当应用包含过滤器来检测名称包含单词 `Dao` 或 `Service` 的所有类时，即使是没有注解的类也会被自动检测到。


  #### 从 IoC 容器获取 POJO 实例或 Bean


  然后，你可以使用以下 `Main` 类测试前面的组件：


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  ApplicationContext context =

  new AnnotationConfigApplicationContext("com.apress.springrecipes.sequence");

  SequenceDao sequenceDao = context.getBean(SequenceDao.class);

  System.out.println(sequenceDao.getNextValue("IT"));

  System.out.println(sequenceDao.getNextValue("IT"));

  }

  }

  ```


  ## 2-2. 通过调用构造函数创建 POJO


  ### 问题


  你想通过调用其构造函数在 Spring IoC 容器中创建一个 POJO 实例或 Bean，这是创建 Bean 最常见和最直接的方式。它相当于在 Java 中使用
  `new` 运算符创建对象。


  ### 解决方案


  定义一个带有一个或多个构造函数的 POJO 类。接下来，创建一个 Java 配置类，为 Spring IoC 容器配置带有构造函数的 POJO 实例值。然后，实例化
  Spring IoC 容器以扫描带有注解的 Java 类。POJO 实例或 Bean 实例变得可访问，以便作为应用程序的一部分组合在一起。




  ### 工作原理


  假设你要开发一个在线销售商品的商店应用程序。首先，创建 `Product` POJO 类，该类包含多个属性，例如产品名称和价格。由于商店中有多种产品类型，你将
  `Product` 类设为抽象类，以便为不同的产品子类进行扩展。


  ```

  package com.apress.springrecipes.shop;

  public abstract class Product {

  private String name;

  private double price;

  public Product() {}

  public Product(String name, double price) {

  this.name = name;

  this.price = price;

  }

  // Getters 和 Setters

  ...

  public String toString() {

  return name + " " + price;

  }

  }

  ```


  #### 使用构造函数创建 POJO 类


  然后创建两个产品子类：`Battery` 和 `Disc`。每个子类都有其自身的属性。


  ```

  package com.apress.springrecipes.shop;

  public class Battery extends Product {

  private boolean rechargeable;

  public Battery() {

  super();

  }

  public Battery(String name, double price) {

  super(name, price);

  }

  // Getters 和 Setters

  ...

  }

  package com.apress.springrecipes.shop;

  public class Disc extends Product {

  private int capacity;

  public Disc() {

  super();

  }

  public Disc(String name, double price) {

  super(name, price);

  }

  // Getters 和 Setters

  ...

  }

  ```


  #### 为 POJO 创建 Java 配置


  要在 Spring IoC 容器中定义 POJO 类的实例，你需要创建一个带有实例化值的 Java 配置类。通过调用构造函数来定义 POJO 或 Bean 的
  Java 配置类如下所示：


  ```

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Battery;

  import com.apress.springrecipes.shop.Disc;

  import com.apress.springrecipes.shop.Product;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  @Configuration

  public class ShopConfiguration {

  @Bean

  public Product aaa() {

  Battery p1 = new Battery("AAA", 2.5);

  p1.setRechargeable(true);

  return p1;

  }

  @Bean

  public Product cdrw() {

  Disc p2 = new Disc("CD-RW", 1.5);

  p2.setCapacity(700);

  return p2;

  }

  }

  ```


  接下来，你可以编写以下 `Main` 类，通过从 Spring IoC 容器中检索产品来测试它们：


  ```

  package com.apress.springrecipes.shop;

  import com.apress.springrecipes.shop.config.ShopConfiguration;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) throws Exception {

  ApplicationContext context =

  new AnnotationConfigApplicationContext(ShopConfiguration.class);

  Product aaa = context.getBean("aaa", Product.class);

  Product cdrw = context.getBean("cdrw", Product.class);

  System.out.println(aaa);

  System.out.println(cdrw);

  }

  }

  ```


  ### 问题


  构成应用程序的 POJO 实例或 Bean 通常需要相互协作才能完成应用程序的功能。你希望使用注解来实现 POJO 引用和自动装配。


  ### 解决方案


  对于在 Java 配置类中定义的 POJO 实例，你可以使用标准 Java 代码在 Bean 之间创建引用。要自动装配 POJO 引用，你可以在字段、setter
  方法、构造函数甚至任意方法上标记 `@Autowired` 注解。


  ### 工作原理


  首先，我们将向你介绍使用构造函数、字段和属性进行自动装配的不同方法。最后，你将了解如何解决自动装配中可能出现的问题。


  #### 在 Java 配置类中引用 POJO


  当 POJO 实例在 Java 配置类中定义时（如配方 2-1 和配方 2-2 所示），POJO 引用的使用非常直接，因为所有内容都是 Java 代码。在以下示例中，一个
  Bean 属性引用了另一个 Bean：


  ```

  package com.apress.springrecipes.sequence.config;

  import com.apress.springrecipes.sequence.DatePrefixGenerator;

  import com.apress.springrecipes.sequence.SequenceGenerator;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  @Configuration

  public class SequenceConfiguration {

  @Bean

  public DatePrefixGenerator datePrefixGenerator() {

  DatePrefixGenerator dpg = new DatePrefixGenerator();

  dpg.setPattern("yyyyMMdd");

  return dpg;

  }

  @Bean

  public SequenceGenerator sequenceGenerator() {

  SequenceGenerator sequence = new SequenceGenerator();

  sequence.setInitial(100000);

  sequence.setSuffix("A");

  sequence.setPrefixGenerator(datePrefixGenerator());

  return sequence;

  }

  }

  ```


  `SequenceGenerator` 类的 `prefixGenerator` 属性是一个 `DatePrefixGenerator` Bean 的实例。


  第一个 Bean 声明创建了一个 `DatePrefixGenerator` POJO。按照惯例，该 Bean 可通过 Bean 名称 `datePrefixGenerator`（即方法名）访问。但由于
  Bean 的实例化逻辑也是一个标准的 Java 方法，因此也可以通过标准的 Java 调用来访问该 Bean。当在第二个 Bean 中通过 setter 设置
  `prefixGenerator` 属性时，会通过标准的 Java 调用方法 `datePrefixGenerator()` 来引用该 Bean。




  #### 使用 @Autowired 注解自动装配 POJO 字段


  接下来，让我们对配方 2-1 第二部分中引入的 DAO 类 `SequenceDaoImpl` 的 `SequenceDao` 字段使用自动装配。你将在应用程序中添加一个服务类，以说明如何与
  DAO 类进行自动装配。


  用于生成服务对象的服务类是另一个实际应用的最佳实践，它充当访问 DAO 的门面——而不是直接访问 DAO。在内部，服务对象与 DAO 交互以处理序列生成请求。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.stereotype.Component;

  @Component

  public class SequenceService {

  @Autowired

  private SequenceDao sequenceDao;

  public void setSequenceDao(SequenceDao sequenceDao) {

  this.sequenceDao = sequenceDao;

  }

  public String generate(String sequenceId) {

  Sequence sequence = sequenceDao.getSequence(sequenceId);

  int value = sequenceDao.getNextValue(sequenceId);

  return sequence.getPrefix() + value + sequence.getSuffix();

  }

  }

  ```


  `SequenceService` 类使用了 `@Component` 注解进行修饰。这使得 Spring 能够检测到该 POJO。由于 `@Component`
  注解没有指定名称，因此默认的 bean 名称为 `sequenceService`，它基于类名生成。


  `SequenceService` 类的 `sequenceDao` 属性使用了 `@Autowired` 注解进行修饰。这使得 Spring 能够使用 `sequenceDao`
  bean（即 `SequenceDaoImpl` 类）自动装配该属性。


  `@Autowired` 注解也可以应用于数组类型的属性，让 Spring 自动装配所有匹配的 bean。例如，你可以使用 `@Autowired` 注解一个
  `PrefixGenerator[]` 属性。然后，Spring 会一次性自动装配所有与 `PrefixGenerator` 类型兼容的 bean。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class SequenceGenerator {

  @Autowired

  private PrefixGenerator[] prefixGenerators;

  ...

  }

  ```


  如果你在 IoC 容器中定义了多个与 `PrefixGenerator` 类型兼容的 bean，它们将被自动添加到 `prefixGenerators` 数组中。


  类似地，你也可以将 `@Autowired` 注解应用于类型安全的集合。Spring 可以读取该集合的类型信息，并自动装配所有类型兼容的 bean。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class SequenceGenerator {

  @Autowired

  private List prefixGenerators;

  ...

  }

  ```


  如果 Spring 发现 `@Autowired` 注解应用于一个类型安全的 `java.util.Map`，且其键为字符串类型，那么它会将所有兼容类型的 bean（以
  bean 名称作为键）添加到此 Map 中。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class SequenceGenerator {

  @Autowired

  private Map prefixGenerators;

  ...

  }

  ```


  #### 使用 @Autowired 注解自动装配 POJO 方法和构造函数，并使自动装配可选


  `@Autowired` 注解也可以直接应用于 POJO 的 setter 方法。例如，你可以使用 `@Autowired` 注解 `prefixGenerator`
  属性的 setter 方法。然后，Spring 会尝试装配一个与 `prefixGenerator` 类型兼容的 bean。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class SequenceGenerator {

  ...

  @Autowired

  public void setPrefixGenerator(PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  默认情况下，所有带有 `@Autowired` 注解的属性都是必需的。当 Spring 找不到匹配的 bean 进行装配时，会抛出异常。如果你希望某个属性是可选的，可以将
  `@Autowired` 的 `required` 属性设置为 `false`。这样，当 Spring 找不到匹配的 bean 时，将保持该属性未设置状态。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class SequenceGenerator {

  ...

  @Autowired(required=false)

  public void setPrefixGenerator(PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  你也可以将 `@Autowired` 注解应用于具有任意名称和任意数量参数的方法；在这种情况下，Spring 会尝试为方法的每个参数装配一个类型兼容的 bean。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class SequenceGenerator {

  ...

  @Autowired

  public void myOwnCustomInjectionName(PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  最后，你也可以将 `@Autowired` 注解应用于你希望用于自动装配的构造函数。该构造函数可以有任意数量的参数，Spring 会尝试为每个构造函数参数装配一个类型兼容的
  bean。


  ```

  @Service

  public class SequenceService {

  private final SequenceDao sequenceDao;

  @Autowired

  public SequenceService(SequenceDao sequenceDao) {

  this.sequenceDao=sequenceDao;

  }

  public String generate(String sequenceId) {

  Sequence sequence = sequenceDao.getSequence(sequenceId);

  int value = sequenceDao.getNextValue(sequenceId);

  return sequence.getPrefix() + value + sequence.getSuffix();

  }

  }

  ```


  提示


  从 Spring Framework 4.3 开始，如果你只有一个构造函数，Spring 将自动使用该构造函数进行自动装配。在这种情况下，你可以省略 `@Autowired`
  注解。


  #### 使用注解解决自动装配歧义性


  默认情况下，当 IoC 容器中存在多个类型兼容的 bean，且属性不是组类型（例如数组、列表、Map）时，按类型自动装配将无法工作，如前所述。然而，如果存在多个相同类型的
  bean，有两种解决按类型自动装配歧义性的方法：`@Primary` 注解和 `@Qualifier` 注解。


  ##### 使用 @Primary 注解解决自动装配歧义性


  Spring 允许你通过使用 `@Primary` 注解修饰候选 bean 来按类型指定一个候选 bean。当有多个候选 bean 符合自动装配单值依赖的条件时，`@Primary`
  注解会优先选择该 bean。


  ```

  package com.apress.springrecipes.sequence;

  ...

  import org.springframework.stereotype.Component;

  import org.springframework.context.annotation.Primary;

  @Component

  @Primary

  public class DatePrefixGenerator implements PrefixGenerator {

  public String getPrefix() {

  DateFormat formatter = new SimpleDateFormat("yyyyMMdd");

  return formatter.format(new Date());

  }

  }

  ```


  请注意，上述 POJO 实现了 `PrefixGenerator` 接口，并使用 `@Primary` 注解进行了修饰。如果你尝试自动装配一个 `PrefixGenerator`
  类型的 bean，即使 Spring 有多个具有相同 `PrefixGenerator` 类型的 bean 实例，Spring 也会自动装配 `DatePrefixGenerator`，因为它被标记了
  `@Primary` 注解。




  ##### 使用 @Qualifier 注解解决自动装配歧义


  Spring 还允许你通过在 `@Qualifier` 注解中提供名称，按类型指定候选 Bean。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.beans.factory.annotation.Qualifier;

  public class SequenceGenerator {

  @Autowired

  @Qualifier("datePrefixGenerator")

  private PrefixGenerator prefixGenerator;

  ...

  }

  ```


  完成此操作后，Spring 会尝试在 IoC 容器中查找具有该名称的 Bean，并将其注入到属性中。


  `@Qualifier` 注解也可以应用于方法参数以实现自动装配。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.beans.factory.annotation.Qualifier;

  public class SequenceGenerator {

  ...

  @Autowired

  public void myOwnCustomInjectionName(

  @Qualifier("datePrefixGenerator") PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  如果你想按名称自动装配 Bean 属性，可以使用下一个配方中描述的 JSR-250 `@Resource` 注解来标注 setter 方法、构造函数或字段。


  ## 2-4. 使用 @Resource 和 @Inject 注解自动装配 POJO


  ### 问题


  你想使用 Java 标准的 `@Resource` 和 `@Inject` 注解通过自动装配来引用 POJO，而不是使用 Spring 特有的 `@Autowired`
  注解。


  ### 解决方案


  JSR-250（即 Java 平台的通用注解）定义了 `@Resource` 注解，用于按名称自动装配 POJO 引用。JSR-330（即依赖注入的标准注解）定义了
  `@Inject` 注解，用于按类型自动装配 POJO 引用。


  ### 工作原理


  上一个配方中描述的 `@Autowired` 注解属于 Spring 框架，具体位于 `org.springframework.beans.factory.annotation`
  包中。这意味着它只能在 Spring 框架的上下文中使用。


  在 Spring 添加对 `@Autowired` 注解的支持后不久，Java 语言标准化了各种注解以实现与 `@Autowired` 注解相同的功能。这些注解包括属于
  `javax.annotation` 包的 `@Resource` 注解，以及属于 `javax.inject` 包的 `@Inject` 注解。


  #### 使用 @Resource 注解自动装配 POJO


  默认情况下，`@Resource` 注解的工作方式类似于 Spring 的 `@Autowired` 注解，并尝试按类型自动装配。例如，以下 POJO 属性使用了
  `@Resource` 注解进行标注，因此 Spring 会尝试定位与 `PrefixGenerator` 类型匹配的 POJO。


  ```

  package com.apress.springrecipes.sequence;

  import javax.annotation.Resource;

  public class SequenceGenerator {

  @Resource

  private PrefixGenerator prefixGenerator;

  ...

  }

  ```


  然而，与 `@Autowired` 注解需要使用 `@Qualifier` 注解来按名称自动装配 POJO 不同，如果存在多个相同类型的 POJO，`@Resource`
  注解的歧义会被消除。本质上，`@Resource` 注解提供了与组合使用 `@Autowired` 注解和 `@Qualifier` 注解相同的功能。


  #### 使用 @Inject 注解自动装配 POJO


  此外，`@Inject` 注解也尝试按类型自动装配，与 `@Resource` 和 `@Autowired` 注解类似。例如，以下 POJO 属性使用了 `@Inject`
  注解进行标注，因此 Spring 会尝试定位与 `PrefixGenerator` 类型匹配的 POJO：


  ```

  package com.apress.springrecipes.sequence;

  import javax.inject.Inject;

  public class SequenceGenerator {

  @Inject

  private PrefixGenerator prefixGenerator;

  ...

  }

  ```


  但是，与 `@Resource` 和 `@Autowired` 注解一样，如果存在多个相同类型的 POJO，则需要采用不同的方法来按名称匹配 POJO 或避免歧义。使用
  `@Inject` 注解进行按名称自动装配的第一步是创建一个自定义注解，以标识 POJO 注入类和 POJO 注入点。


  ```

  package com.apress.springrecipes.sequence;

  import java.lang.annotation.Documented;

  import java.lang.annotation.ElementType;

  import java.lang.annotation.Retention;

  import java.lang.annotation.RetentionPolicy;

  import java.lang.annotation.Target;

  import javax.inject.Qualifier;

  @Qualifier

  @Target({ElementType.TYPE, ElementType.FIELD, ElementType.PARAMETER})

  @Documented

  @Retention(RetentionPolicy.RUNTIME)

  public @interface DatePrefixAnnotation {

  }

  ```


  请注意，自定义注解使用了 `@Qualifier` 注解。此注解与 Spring 的 `@Qualifier` 注解不同，因为后者属于与 `@Inject` 注解相同的
  Java 包（即 `javax.inject`）。


  自定义注解完成后，需要用它来标注生成 Bean 实例的 POJO 注入类，在本例中为 `DatePrefixGenerator` 类。


  ```

  package com.apress.springrecipes.sequence;

  ...

  @DatePrefixAnnotation

  public class DatePrefixGenerator implements PrefixGenerator {

  ...

  }

  ```


  最后，使用相同的自定义注解来标注 POJO 属性或注入点，以限定 POJO 并消除任何歧义。


  ```

  package com.apress.springrecipes.sequence;

  import javax.inject.Inject;

  public class SequenceGenerator {

  @Inject @DataPrefixAnnotation

  private PrefixGenerator prefixGenerator;

  ...

  }

  ```


  正如你在配方 2-3 和 2-4 中所见，`@Autowired`、`@Resource` 和 `@Inject` 这三个注解可以实现相同的结果。`@Autowired`
  注解是基于 Spring 的解决方案，而 `@Resource` 和 `@Inject` 注解是 Java 标准（即 JSR）解决方案。如果你要进行基于名称的自动装配，`@Resource`
  注解提供了最简单的语法。对于按类类型自动装配，这三个注解使用起来都很直接，因为它们都只需要一个注解。


  ## 2-5. 使用 @Scope 注解设置 POJO 的作用域


  ### 问题


  当你使用像 `@Component` 这样的注解声明一个 POJO 实例时，实际上是在定义一个用于创建 Bean 的模板，而不是一个实际的 Bean 实例。当通过
  `getBean()` 方法请求 Bean 或从其他 Bean 中引用它时，Spring 会根据 Bean 的作用域决定返回哪个 Bean 实例。有时，你必须为
  Bean 设置一个合适的、非默认的作用域。


  ### 解决方案


  Bean 的作用域通过 `@Scope` 注解设置。默认情况下，Spring 为 IoC 容器中声明的每个 Bean 只创建一个实例，并且该实例在整个 IoC
  容器范围内共享。对于所有后续的 `getBean()` 调用和 Bean 引用，都会返回这个唯一的 Bean 实例。这种作用域称为 `singleton`，是所有
  Bean 的默认作用域。表 2-1 列出了 Spring 中所有有效的 Bean 作用域。


  表 2-1. Spring 中有效的 Bean 作用域


  | 作用域 | 描述 |

  | --- | --- |

  | `singleton` | 每个 Spring IoC 容器创建一个单一的 Bean 实例 |

  | `prototype` | 每次请求时创建一个新的 Bean 实例 |

  | `request` | 每个 HTTP 请求创建一个单一的 Bean 实例；仅在 Web 应用程序上下文中有效 |

  | `session` | 每个 HTTP 会话创建一个单一的 Bean 实例；仅在 Web 应用程序上下文中有效 |

  | `globalSession` | 每个全局 HTTP 会话创建一个单一的 Bean 实例；仅在门户应用程序上下文中有效 |




  ### 工作原理


  为了演示 Bean 作用域的概念，我们以购物应用中的购物车为例。首先，按如下方式创建 `ShoppingCart` 类：


  ```

  package com.apress.springrecipes.shop;

  ...

  @Component

  public class ShoppingCart {

  private List items = new ArrayList();

  public void addItem(Product item) {

  items.add(item);

  }

  public List getItems() {

  return items;

  }

  }

  ```


  然后，在 Java 配置文件中声明一些产品 Bean，以便稍后将其添加到购物车中。


  ```

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Battery;

  import com.apress.springrecipes.shop.Disc;

  import com.apress.springrecipes.shop.Product;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  @Configuration

  @ComponentScan("com.apress.springrecipes.shop")

  public class ShopConfiguration {

  @Bean

  public Product aaa() {

  Battery p1 = new Battery();

  p1.setName("AAA");

  p1.setPrice(2.5);

  p1.setRechargeable(true);

  return p1;

  }

  @Bean

  public Product cdrw() {

  Disc p2 = new Disc("CD-RW", 1.5);

  p2.setCapacity(700);

  return p2;

  }

  @Bean

  public Product dvdrw() {

  Disc p2 = new Disc("DVD-RW", 3.0);

  p2.setCapacity(700);

  return p2;

  }

  }

  ```


  完成上述操作后，你可以定义一个 `Main` 类，通过向购物车添加一些商品来测试它。假设有两个顾客同时在你的商店中浏览。第一个顾客通过 `getBean()`
  方法获取一个购物车，并向其中添加了两个商品。然后，第二个顾客也通过 `getBean()` 方法获取了一个购物车，并向其中添加了另一个商品。


  ```

  package com.apress.springrecipes.shop;

  import com.apress.springrecipes.shop.config.ShopConfiguration;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) throws Exception {

  ApplicationContext context =            new AnnotationConfigApplicationContext(ShopConfiguration.class);

  Product aaa = context.getBean("aaa", Product.class);

  Product cdrw = context.getBean("cdrw", Product.class);

  Product dvdrw = context.getBean("dvdrw", Product.class);

  ShoppingCart cart1 = context.getBean("shoppingCart", ShoppingCart.class);

  cart1.addItem(aaa);

  cart1.addItem(cdrw);

  System.out.println("购物车 1 包含 " + cart1.getItems());

  ShoppingCart cart2 = context.getBean("shoppingCart", ShoppingCart.class);

  cart2.addItem(dvdrw);

  System.out.println("购物车 2 包含 " + cart2.getItems());

  }

  }

  ```


  根据上述 Bean 声明，你可以看到两个顾客获取到了同一个购物车实例。


  ```

  购物车 1 包含 [AAA 2.5, CD-RW 1.5]

  购物车 2 包含 [AAA 2.5, CD-RW 1.5, DVD-RW 3.0]

  ```


  这是因为 Spring 的默认 Bean 作用域是 `singleton`，这意味着每个 IoC 容器中 Spring 只会创建一个购物车实例。


  在你的商店应用中，你期望每次调用 `getBean()` 方法时，每个顾客都能获得不同的购物车实例。为了确保这种行为，需要将 `shoppingCart` Bean
  的作用域设置为 `prototype`。这样，每次调用 `getBean()` 方法时，Spring 都会创建一个新的 Bean 实例。


  ```

  package com.apress.springrecipes.shop;

  ...

  import org.springframework.stereotype.Component;

  import org.springframework.context.annotation.Scope;

  @Component

  @Scope("prototype")

  public class ShoppingCart { ... }

  ```


  现在，如果你再次运行 `Main` 类，可以看到两个顾客获取到了不同的购物车实例。


  ```

  购物车 1 包含 [AAA 2.5, CD-RW 1.5]

  购物车 2 包含 [DVD-RW 3.0]

  ```


  ## 2-6\. 使用外部资源中的数据（文本文件、XML 文件、属性文件或图像文件）


  ### 问题


  有时，应用程序需要从不同位置（例如文件系统、类路径或 URL）读取外部资源（例如文本文件、XML 文件、属性文件或图像文件）。通常，你必须使用不同的 API 来从不同位置加载资源。


  ### 解决方案


  Spring 提供了 `@PropertySource` 注解，作为一种加载 `.properties` 文件内容（即键值对）以设置 Bean 属性的工具。


  Spring 还拥有一个资源加载器机制，它提供了一个统一的 `Resource` 接口，用于通过资源路径检索任何类型的外部资源。你可以为此路径指定不同的前缀，以使用
  `@Value` 注解从不同位置加载资源。要从文件系统加载资源，请使用 `file` 前缀。要从类路径加载资源，请使用 `classpath` 前缀。你也可以在资源路径中指定一个
  URL。


  ### 工作原理


  要读取属性文件的内容（即键值对）以设置 Bean 属性，你可以将 Spring 的 `@PropertySource` 注解与 `PropertySourcesPlaceholderConfigurer`
  结合使用。如果你想读取任何文件的内容，可以使用 Spring 的 `Resource` 机制，并配合 `@Value` 注解。




  #### 使用属性文件数据设置 POJO 实例化值


  假设你有一个属性文件，其中包含一系列你想用来设置 Bean 属性的值。通常，这可以是数据库的配置属性，或由键值组成的其他应用程序值。例如，以下键值存储在名为 `discounts.properties`
  的文件中：


  ```

  specialcustomer.discount=0.1 summer.discount=0.15 endofyear.discount=0.2

  ```


  注意


  关于读取属性文件以实现国际化（i18n）的内容，请参阅下一个技巧。要使 `discounts.properties` 文件的内容可用于设置其他 Bean，你可以使用
  `@PropertySource` 注解，将键值转换为 Java 配置类中的一个 Bean。


  ```

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Battery;

  import com.apress.springrecipes.shop.Disc;

  import com.apress.springrecipes.shop.Product;

  import org.springframework.beans.factory.annotation.Value;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.PropertySource;

  import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;

  @Configuration

  @PropertySource("classpath:discounts.properties")

  @ComponentScan("com.apress.springrecipes.shop")

  public class ShopConfiguration {

  @Value("${endofyear.discount:0}")

  private double specialEndofyearDiscountField;

  @Bean

  public static PropertySourcesPlaceholderConfigurer        propertySourcesPlaceholderConfigurer()
  {

  return new PropertySourcesPlaceholderConfigurer();

  }

  @Bean

  public Product dvdrw() {

  Disc p2 = new Disc("DVD-RW", 3.0, specialEndofyearDiscountField);

  p2.setCapacity(700);

  return p2;

  }

  }

  ```


  你定义了一个值为 `classpath:discounts.properties` 的 `@PropertySource` 注解，用于修饰 Java 配置类。`classpath:`
  前缀告诉 Spring 在 Java 类路径中查找 `discounts.properties` 文件。


  一旦定义了 `@PropertySource` 注解来加载属性文件，你还需要使用 `@Bean` 注解定义一个 `PropertySourcePlaceholderConfigurer`
  Bean。Spring 会自动连接 `@PropertySource discounts.properties` 文件，使其属性可作为 Bean 属性访问。


  接下来，你需要定义 Java 变量，从 `discounts.properties` 文件中获取值。要使用这些值定义 Java 变量值，你需要使用带有占位符表达式的
  `@Value` 注解。


  语法是 `@Value("${key:default_value}")`。系统会在所有已加载的应用程序属性中搜索该键值。如果在属性文件中找到匹配的 `key=value`，则相应的值会被赋给
  Bean 属性。如果在已加载的应用程序属性中未找到匹配的 `key=value`，则 `default_value`（即 `${key:` 之后的部分）会被赋给
  Bean 属性。


  一旦 Java 变量被设置为折扣值，你就可以用它来设置 Bean 实例的折扣属性。


  如果你希望将属性文件数据用于设置 Bean 属性之外的其他目的，则应使用 Spring 的 `Resource` 机制，这将在下一节中介绍。




  #### 使用任意外部资源文件中的数据供 POJO 使用


  假设你想在应用程序启动时显示一个横幅。该横幅由以下字符组成，并存储在一个名为 `banner.txt` 的文本文件中。此文件可以放在应用程序的类路径中。


  ```

  *************************

  *  Welcome to My Shop!  *

  *************************

  ```


  接下来，让我们编写一个 `BannerLoader` POJO 类来加载横幅并将其输出到控制台。


  ```

  package com.apress.springrecipes.shop;

  import org.springframework.core.io.Resource;

  ...

  import javax.annotation.PostConstruct;

  public class BannerLoader {

  private Resource banner;

  public void setBanner(Resource banner) {

  this.banner = banner;

  }

  @PostConstruct

  public void showBanner() throws IOException {

  InputStream in = banner.getInputStream();

  BufferedReader reader = new BufferedReader(new InputStreamReader(in));

  while (true) {

  String line = reader.readLine();

  if (line == null)

  break;

  System.out.println(line);

  }

  reader.close();

  }

  }

  ```


  请注意，POJO 的 `banner` 字段是 Spring 的 `Resource` 类型。当 bean 实例被创建时，该字段的值将通过 setter 注入来填充——稍后会解释。`showBanner()`
  方法调用 `getInputStream()` 方法从 `Resource` 字段中获取输入流。一旦你有了 `InputStream`，就可以使用标准的 Java
  文件操作类。在这个例子中，文件内容通过 `BufferedReader` 逐行读取并输出到控制台。


  还要注意，`showBanner()` 方法使用了 `@PostConstruct` 注解进行修饰。因为你希望在启动时显示横幅，所以使用此注解告诉 Spring
  在创建后自动调用该方法。这保证了 `showBanner()` 方法是应用程序最先运行的方法之一，从而确保横幅在开始时出现。


  接下来，POJO `BannerLoader` 需要被初始化为一个实例。此外，`BannerLoader` 的 `banner` 字段也需要被注入。因此，让我们创建一个
  Java 配置类来完成这些任务。


  ```

  @Configuration

  @PropertySource("classpath:discounts.properties")

  @ComponentScan("com.apress.springrecipes.shop")

  public class ShopConfiguration {

  @Value("classpath:banner.txt")

  private Resource banner;

  @Bean

  public static PropertySourcesPlaceholderConfigurer propertySourcesPlaceholderConfigurer()
  {

  return new PropertySourcesPlaceholderConfigurer();

  }

  @Bean

  public BannerLoader bannerLoader() {

  BannerLoader bl = new BannerLoader();

  bl.setBanner(banner);

  return bl;

  }

  }

  ```


  看看 `banner` 属性是如何用 `@Value("classpath:banner.txt")` 注解修饰的。这告诉 Spring 在类路径中搜索 `banner.txt`
  文件并注入它。Spring 使用预先注册的属性编辑器 `ResourceEditor` 将文件定义转换为 `Resource` 对象，然后再将其注入到 bean
  中。


  一旦 `banner` 属性被注入，它就会通过 setter 注入被赋值给 `BannerLoader` bean 实例。


  由于横幅文件位于 Java 类路径中，资源路径以 `classpath:` 前缀开头。前面的资源路径指定了文件系统相对路径中的资源。你也可以指定绝对路径。


  ```

  file:c:/shop/banner.txt

  ```


  当资源位于 Java 的类路径中时，你必须使用 `classpath` 前缀。如果没有提供路径信息，它将从类路径的根目录加载。


  ```

  classpath:banner.txt

  ```


  如果资源位于特定的包中，你可以指定从类路径根目录开始的绝对路径。


  ```

  classpath:com/apress/springrecipes/shop/banner.txt

  ```


  除了支持从文件系统路径或类路径加载外，还可以通过指定 URL 来加载资源。


  [`http://springrecipes.apress.com/shop/banner.txt`](http://springrecipes.apress.com/shop/banner.txt)


  由于 bean 类在 `showBanner()` 方法上使用了 `@PostConstruct` 注解，当 IoC 容器设置完成后，横幅就会被发送到输出。因此，无需修改应用程序的上下文或显式调用
  bean 来输出横幅。然而，有时可能需要访问外部资源来与应用程序的上下文进行交互。现在假设你想在应用程序结束时显示一个图例。该图例由之前在 `discounts.properties`
  文件中描述的折扣组成。要访问属性文件的内容，你也可以利用 Spring 的 `Resource` 机制。


  接下来，让我们使用 Spring 的 `Resource` 机制，但这次直接在应用程序的 `Main` 类中使用，以便在应用程序结束时输出图例。


  ```

  import org.springframework.core.io.ClassPathResource;

  import org.springframework.core.io.support.PropertiesLoaderUtils;

  ...

  ...

  public class Main {

  public static void main(String[] args) throws Exception {

  ...

  Resource resource = new ClassPathResource("discounts.properties");

  Properties props = PropertiesLoaderUtils.loadProperties(resource);

  System.out.println("And don''t forget our discounts!");

  System.out.println(props);

  }

  }

  ```


  Spring 的 `ClassPathResource` 类用于访问 `discounts.properties` 文件，该文件将文件内容转换为 `Resource`
  对象。接下来，使用 Spring 的 `PropertiesLoaderUtils` 类将 `Resource` 对象处理成 `Properties` 对象。最后，`Properties`
  对象的内容作为应用程序的最终输出发送到控制台。


  由于图例文件（即 `discounts.properties`）位于 Java 类路径中，因此使用 Spring 的 `ClassPathResource` 类来访问资源。如果外部资源位于文件系统路径中，则可以使用
  Spring 的 `FileSystemResource` 来加载资源。


  ```

  Resource resource = new FileSystemResource("c:/shop/banner.txt")

  ```


  如果外部资源位于 URL 上，则可以使用 Spring 的 `UrlResource` 来加载资源。


  ```

  Resource resource = new UrlResource("http://www.apress.com/")

  ```


  ## 2-7. 在属性文件中为不同区域解析国际化文本消息


  ### 问题


  你希望应用程序通过注解支持国际化。


  ### 解决方案


  `MessageSource` 是一个接口，它定义了多种用于在资源包中解析消息的方法。`ResourceBundleMessageSource` 是最常见的 `MessageSource`
  实现，它从不同区域的资源包中解析消息。在你实现了一个 `ResourceBundleMessageSource` POJO 之后，可以在 Java 配置文件中使用
  `@Bean` 注解，使国际化数据在应用程序中可用。




  ### 工作原理


  举例来说，为美国英语创建一个名为 `messages_en_US.properties` 的资源包。资源包从类路径的根目录加载，因此请确保它在 Java 类路径上可用。在文件中放置以下键值对：


  ```

  alert.checkout=A shopping cart has been checked out.

  alert.inventory.checkout=A shopping cart with {0} has been checked out at {1}.

  ```


  要从资源包中解析消息，我们创建一个包含 `ReloadableResourceBundleMessageSource` bean 实例的 Java 配置文件。


  ```

  package com.apress.springrecipes.shop.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.support.ReloadableResourceBundleMessageSource;

  @Configuration

  public class ShopConfiguration {

  @Bean

  public ReloadableResourceBundleMessageSource messageSource() {

  ReloadableResourceBundleMessageSource messageSource =            new ReloadableResourceBundleMessageSource();

  messageSource.setBasenames("classpath:messages");

  messageSource.setCacheSeconds(1);

  return messageSource;

  }

  }

  ```


  为了让应用上下文能够检测到该 bean 实例，其名称必须为 `messageSource`。


  在 bean 定义中，通过 `setBasenames` 方法声明一个 `String` 列表，以定位 `ResourceBundleMessageSource`
  的资源包。在此例中，仅指定了默认约定，即查找 Java 类路径下以 `messages` 开头的文件。此外，`setCacheSeconds` 方法将缓存时间设置为
  1 秒，以避免读取过时的消息。请注意，刷新尝试在实际重新加载之前会先检查属性文件的最后修改时间戳，因此如果文件没有变化，`setCacheSeconds` 的间隔可以设置得相当短，因为刷新尝试实际上并不会重新加载。


  对于此 `MessageSource` 定义，如果你要查找首选语言为英语的美国区域设置对应的文本消息，会首先考虑资源包 `messages_en_US.properties`。如果不存在这样的资源包或找不到该消息，则会考虑匹配语言的
  `messages_en.properties` 文件。如果仍然找不到资源包，则会选择所有区域设置的默认 `messages.properties` 文件。有关资源包加载的更多信息，可参考
  `java.util.ResourceBundle` 类的 Javadoc。


  接下来，你可以配置应用上下文，使用 `getMessage()` 方法解析消息。第一个参数是消息对应的键，第三个参数是目标区域设置。


  ```

  package com.apress.springrecipes.shop;

  import com.apress.springrecipes.shop.config.ShopConfiguration;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  import java.util.Date;

  import java.util.Locale;

  public class Main {

  public static void main(String[] args) throws Exception {

  ApplicationContext context =            new AnnotationConfigApplicationContext(ShopConfiguration.class);

  String alert = context.getMessage("alert.checkout", null, Locale.US);

  String alert_inventory = context.getMessage("alert.inventory.checkout", new Object[]{"[DVD-RW
  3.0]", new Date()}, Locale.US);

  System.out.println("The I18N message for alert.checkout is: " + alert);

  System.out.println("The I18N message for alert.inventory.checkout is: " + alert_inventory);

  }

  }

  ```


  `getMessage()` 方法的第二个参数是一个消息参数数组。在第一个 `String` 语句中，该值为 `null`；在第二个 `String` 语句中，则使用了一个对象数组来填充消息参数。


  在 `Main` 类中，你可以解析文本消息，因为你可以直接访问应用上下文。但对于需要解析文本消息的 bean，你必须将一个 `MessageSource` 实现注入到该
  bean 中。让我们为购物应用实现一个 `Cashier` 类，以说明如何解析消息。


  ```

  package com.apress.springrecipes.shop;

  ...

  @Component

  public class Cashier {

  @Autowired

  private MessageSource messageSource;

  public void setMessageSource(MessageSource messageSource) {

  this.messageSource = messageSource;

  }

  public void checkout(ShoppingCart cart) throws IOException {

  String alert = messageSource.getMessage("alert.inventory.checkout",

  new Object[] { cart.getItems(), new Date() }, Locale.US);

  System.out.println(alert);

  }

  }

  ```


  请注意，POJO 的 `messageSource` 字段是 Spring 的 `MessageSource` 类型。该字段值使用了 `@Autowired`
  注解进行修饰，因此在创建 bean 实例时，会通过注入来填充该字段。然后，`checkout` 方法可以访问 `messageSource` 字段，这使得该 bean
  能够访问 `getMessage` 方法，从而基于 i18n 标准获取文本消息。


  ## 2-8. 使用注解自定义 POJO 的初始化和销毁


  ### 问题


  某些 POJO 在使用前必须执行特定类型的初始化任务。这些任务可能包括打开文件、打开网络/数据库连接、分配内存等。此外，这些相同的 POJO 必须在其生命周期结束时执行相应的销毁任务。因此，有时需要在
  Spring IoC 容器中自定义 bean 的初始化和销毁。


  ### 解决方案


  Spring 可以通过在 Java 配置类的 `@Bean` 定义中设置 `initMethod` 和 `destroyMethod` 属性来识别初始化和销毁回调方法。或者，如果
  POJO 的方法分别使用了 `@PostConstruct` 和 `@PreDestroy` 注解进行修饰，Spring 也能识别初始化和销毁回调方法。Spring
  还可以使用 `@Lazy` 注解将 bean 的创建延迟到需要时才进行——这一过程称为延迟初始化。Spring 还可以使用 `@DependsOn` 注解确保某些
  bean 在其他 bean 之前完成初始化。



  ### 工作原理


  使用 `@Bean` 定义在 POJO 初始化和销毁之前运行的方法。我们以购物应用为例，考虑一个涉及结账功能的场景。修改 `Cashier` 类，将购物车中的商品和结账时间记录到一个文本文件中。


  ```

  package com.apress.springrecipes.shop;

  import java.io.*;

  import java.util.Date;

  public class Cashier {

  private String fileName;

  private String path;

  private BufferedWriter writer;

  public void setFileName(String fileName) {

  this.fileName = fileName;

  }

  public void setPath(String path) {

  this.path = path;

  }

  public void openFile() throws IOException {

  File targetDir = new File(path);

  if (!targetDir.exists()) {

  targetDir.mkdir();

  }

  File checkoutFile = new File(path, fileName + ".txt");

  if (!checkoutFile.exists()) {

  checkoutFile.createNewFile();

  }

  writer = new BufferedWriter(new OutputStreamWriter(

  new FileOutputStream(checkoutFile, true)));

  }

  public void checkout(ShoppingCart cart) throws IOException {

  writer.write(new Date() + "\t" + cart.getItems() + "\r\n");

  writer.flush();

  }

  public void closeFile() throws IOException {

  writer.close();

  }

  }

  ```


  在 `Cashier` 类中，`openFile()` 方法首先验证目标目录和要写入数据的文件是否存在。然后，它在指定的系统路径中打开文本文件，并将其赋值给 writer
  字段。之后，每次调用 `checkout()` 方法时，日期和购物车商品都会被追加到文本文件中。最后，`closeFile()` 方法关闭文件以释放其系统资源。


  接下来，我们探讨如何在 Java 配置类中设置这个 bean 定义，以便在 bean 创建之前执行 `openFile()` 方法，并在 bean 销毁之前执行
  `closeFile()` 方法。


  ```

  @Configuration

  public class ShopConfiguration {

  @Bean(initMethod = "openFile", destroyMethod = "closeFile")

  public Cashier cashier() {

  String path = System.getProperty("java.io.tmpdir") + "/cashier";

  Cashier c1 = new Cashier();

  c1.setFileName("checkout");

  c1.setPath(path);

  return c1;

  }

  }

  ```


  请注意，POJO 的初始化和销毁任务是通过 `@Bean` 注解的 `initMethod` 和 `destroyMethod` 属性定义的。通过在 bean
  声明中设置这两个属性，当创建 `Cashier` 类时，它会首先触发 `openFile()` 方法，验证目标目录和要写入数据的文件是否存在，并打开文件以追加记录。当
  bean 被销毁时，它会触发 `closeFile()` 方法，确保文件引用被关闭以释放系统资源。


  #### 使用 @PostConstruct 和 @PreDestroy 定义在 POJO 初始化和销毁之前运行的方法


  如果你在 Java 配置类之外定义 POJO 实例（例如，使用 `@Component` 注解），另一种替代方案是直接在 POJO 类中使用 `@PostConstruct`
  和 `@PreDestroy` 注解。


  ```

  @Component

  public class Cashier {

  @Value("checkout")

  private String fileName;

  @Value("c:/Windows/Temp/cashier")

  private String path;

  private BufferedWriter writer;

  public void setFileName(String fileName) {

  this.fileName = fileName;

  }

  public void setPath(String path) {

  this.path = path;

  }

  @PostConstruct

  public void openFile() throws IOException {

  File targetDir = new File(path);

  if (!targetDir.exists()) {

  targetDir.mkdir();

  }

  File checkoutFile = new File(path, fileName + ".txt");

  if(!checkoutFile.exists()) {

  checkoutFile.createNewFile();

  }

  writer = new BufferedWriter(new OutputStreamWriter(

  new FileOutputStream(checkoutFile, true)));

  }

  public void checkout(ShoppingCart cart) throws IOException {

  writer.write(new Date() + "\t" +cart.getItems() + "\r\n");

  writer.flush();

  }

  @PreDestroy

  public void closeFile() throws IOException {

  writer.close();

  }

  }

  ```


  `@Component` 注解告诉 Spring 管理该 POJO，就像之前的示例中使用的那样。POJO 的两个字段值通过 `@Value` 注解设置，这也是之前示例中探讨过的概念。`openFile()`
  方法使用了 `@PostConstruct` 注解，这告诉 Spring 在 bean 构造完成后立即执行该方法。`closeFile()` 方法使用了 `@PreDestroy`
  注解，这告诉 Spring 在 bean 销毁之前立即执行该方法。


  #### 使用 @Lazy 定义 POJO 的延迟初始化


  默认情况下，Spring 对所有 POJO 执行即时初始化。这意味着 POJO 在启动时就会被初始化。然而，在某些情况下，将 POJO 的初始化过程延迟到需要
  bean 时才进行会更方便。这种延迟初始化的方式被称为懒加载。


  懒加载有助于限制启动时的资源消耗峰值，并节省整体系统资源。对于执行重量级操作（例如网络连接、文件操作）的 POJO 来说，懒加载尤其相关。要标记一个 bean
  为懒加载，你可以使用 `@Lazy` 注解来修饰该 bean。


  ```

  package com.apress.springrecipes.shop;

  ...

  import org.springframework.stereotype.Component;

  import org.springframework.context.annotation.Scope;

  import org.springframework.context.annotation.Lazy;

  @Component

  @Scope("prototype")

  @Lazy

  public class ShoppingCart {

  private List items = new ArrayList();

  public void addItem(Product item) {

  items.add(item);

  }

  public List getItems() {

  return items;

  }

  }

  ```


  在上述声明中，由于 POJO 使用了 `@Lazy` 注解，如果该 POJO 从未被应用程序需要或被其他 POJO 引用，那么它永远不会被实例化。


  #### 使用 @DependsOn 定义 POJO 在其他 POJO 之前初始化


  随着应用程序中 POJO 数量的增长，POJO 初始化的数量也随之增加。如果 POJO 相互引用且分布在不同的 Java 配置类中，这可能会产生竞态条件。如果
  bean C 需要 bean B 和 bean F 中的逻辑，但 bean C 首先被检测到，而 Spring 尚未初始化 bean B 和 bean F，那么你将得到一个难以发现的错误。为了确保某些
  POJO 在其他 POJO 之前被初始化，并在初始化失败时获得更具描述性的错误信息，Spring 提供了 `@DependsOn` 注解。`@DependsOn`
  注解确保给定的 bean 在另一个 bean 之前被初始化。


  ```

  package com.apress.springrecipes.sequence.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.DependsOn;

  import org.springframework.context.annotation.Configuration;

  import com.apress.springrecipes.sequence.DatePrefixGenerator;

  import com.apress.springrecipes.sequence.NumberPrefixGenerator;

  import com.apress.springrecipes.sequence.SequenceGenerator;

  @Configuration

  public class SequenceConfiguration {

  @Bean

  @DependsOn("datePrefixGenerator")

  public SequenceGenerator sequenceGenerator() {

  SequenceGenerator sequence= new SequenceGenerator();

  sequence.setInitial(100000);

  sequence.setSuffix("A");

  return sequence;

  }

  }

  ```


  在上面的代码片段中，声明 `@DependsOn("datePrefixGenerator")` 确保了 `datePrefixGenerator` bean
  在 `sequenceGenerator` bean 之前被创建。`@DependsOn` 属性还支持通过花括号 `{}` 包裹的 CSV 列表来定义多个依赖
  bean（例如，`@DependsOn({"datePrefixGenerator,numberPrefixGenerator,randomPrefixGenerator"})`）。


  ## 2-9\. 创建后处理器以验证和修改 POJO


  ### 问题


  你希望在构造过程中对所有 bean 实例或特定类型的实例应用任务，以根据特定标准验证或修改 bean 属性。




  ### 解决方案


  Bean 后处理器允许在初始化回调方法（即分配给 `@Bean` 注解的 `initMethod` 属性或使用 `@PostConstruct` 注解修饰的方法）之前和之后处理
  Bean。Bean 后处理器的主要特点是它会处理 IoC 容器中的所有 Bean 实例，而不仅仅是单个 Bean 实例。通常，Bean 后处理器用于检查 Bean
  属性的有效性、根据特定标准更改 Bean 属性，或对所有 Bean 实例应用某些任务。


  Spring 还支持 `@Required` 注解，该注解由内置的 Spring 后处理器 `RequiredAnnotationBeanPostProcessor`
  支持。`RequiredAnnotationBeanPostProcessor` Bean 后处理器会检查所有带有 `@Required` 注解的 Bean 属性是否已被设置。


  ### 工作原理


  假设你想要审计每个 Bean 的创建过程。你可能出于调试应用程序、验证每个 Bean 的属性或其他场景而这样做。Bean 后处理器是实现此功能的理想选择，因为你无需修改任何预先存在的
  POJO 代码。


  #### 创建 POJO 以处理每个 Bean 实例


  要编写一个 Bean 后处理器，类必须实现 `BeanPostProcessor`。当 Spring 检测到实现此接口的 Bean 时，它会将 `postProcessBeforeInitialization()`
  和 `postProcessAfterInitialization()` 方法应用于 Spring 管理的所有 Bean 实例。你可以在这些方法中实现任何逻辑，以检查、修改或验证
  Bean 的状态。


  ```

  package com.apress.springrecipes.shop;

  import org.springframework.beans.BeansException;

  import org.springframework.beans.factory.config.BeanPostProcessor;

  import org.springframework.stereotype.Component;

  @Component

  public class AuditCheckBeanPostProcessor implements BeanPostProcessor {

  public Object postProcessBeforeInitialization(Object bean, String beanName)

  throws BeansException {

  System.out.println("In AuditCheckBeanPostProcessor.postProcessBeforeInitialization,
  processing bean type: " + bean.getClass());

  return bean;

  }

  public Object postProcessAfterInitialization(Object bean, String beanName)

  throws BeansException {

  return bean;

  }

  }

  ```


  请注意，`postProcessBeforeInitialization()` 和 `postProcessAfterInitialization()` 方法必须返回原始的
  Bean 实例，即使你在方法中未执行任何操作。


  要在应用程序上下文中注册 Bean 后处理器，只需使用 `@Component` 注解标注该类即可。应用程序上下文能够检测哪个 Bean 实现了 `BeanPostProcessor`
  接口，并将其注册以处理容器中的所有其他 Bean 实例。


  #### 创建 POJO 以处理选定的 Bean 实例


  在 Bean 构造期间，Spring IoC 容器会将所有 Bean 实例逐个传递给 Bean 后处理器。这意味着，如果你只想将 Bean 后处理器应用于特定类型的
  Bean，则必须通过检查其实例类型来过滤 Bean。这允许你更有选择性地跨 Bean 应用逻辑。


  假设你现在想要应用一个 Bean 后处理器，但仅针对 `Product` Bean 实例。以下示例是另一个执行此操作的 Bean 后处理器：


  ```

  package com.apress.springrecipes.shop;

  import org.springframework.beans.BeansException;

  import org.springframework.beans.factory.config.BeanPostProcessor;

  import org.springframework.stereotype.Component;

  @Component

  public class ProductCheckBeanPostProcessor implements BeanPostProcessor {

  public Object postProcessBeforeInitialization(Object bean, String beanName)

  throws BeansException {

  if (bean instanceof Product) {

  String productName = ((Product) bean).getName();

  System.out.println("In ProductCheckBeanPostProcessor.postProcessBeforeInitialization,
  processing Product: " + productName);

  }

  return bean;

  }

  public Object postProcessAfterInitialization(Object bean, String beanName)

  throws BeansException {

  if (bean instanceof Product) {

  String productName = ((Product) bean).getName();

  System.out.println("In ProductCheckBeanPostProcessor.postProcessAfterInitialization,
  processing Product: " + productName);

  }

  return bean;

  }

  }

  ```


  `postProcessBeforeInitialization()` 和 `postProcessAfterInitialization()` 方法都必须返回正在处理的
  Bean 的实例。然而，这也意味着你甚至可以在 Bean 后处理器中用新实例替换原始 Bean 实例。


  #### 使用 @Required 注解验证 POJO 属性


  在某些情况下，可能需要检查特定属性是否已被设置。除了创建自定义的后构造方法来验证 Bean 的特定属性之外，还可以使用 `@Required` 注解来修饰属性。`@Required`
  注解提供了对 `RequiredAnnotationBeanPostProcessor` 类的访问——这是一个 Spring Bean 后处理器，它可以检查某些
  Bean 属性是否已被设置。请注意，此处理器只能检查属性是否已被设置，但不能检查其值是否为 null 或其他情况。


  假设序列生成器的 `prefixGenerator` 和 `suffix` 属性都是必需的。你可以使用 `@Required` 注解标注它们的 setter 方法。


  ```

  package com.apress.springrecipes.sequence;

  import org.springframework.beans.factory.annotation.Required;

  public class SequenceGenerator {

  private PrefixGenerator prefixGenerator;

  private String suffix;

  ...

  @Required

  public void setPrefixGenerator(PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  @Required

  public void setSuffix(String suffix) {

  this.suffix = suffix;

  }

  ...

  }

  ```


  要让 Spring 检查这些属性是否已被设置，你只需启用扫描，以便 Spring 能够检测并强制执行 `@Required` 注解。如果任何带有 `@Required`
  注解的属性未被设置，则会抛出 `BeanInitializationException` 错误。


  ## 2-10. 使用工厂创建 POJO（静态方法、实例方法、Spring 的 FactoryBean）


  ### 问题


  你希望通过调用静态工厂方法或实例工厂方法在 Spring IoC 容器中创建 POJO 实例。此方法的目的是将对象创建过程分别封装在静态方法或另一个对象实例的方法中。请求对象的客户端可以简单地调用此方法，而无需了解创建细节。你希望使用
  Spring 的工厂 Bean 在 Spring IoC 容器中创建 POJO 实例。工厂 Bean 是一种在 IoC 容器内充当工厂来创建其他 Bean 的
  Bean。从概念上讲，工厂 Bean 类似于工厂方法，但它是 Spring 特定的 Bean，可以在 Bean 构造期间被 Spring IoC 容器识别。


  ### 解决方案


  要通过在 Java 配置类的 `@Bean` 定义中调用静态工厂来创建 POJO，你可以使用标准 Java 语法来调用静态工厂方法。要通过在 Java 配置类的
  `@Bean` 定义中调用实例工厂方法来创建 POJO，你需要创建一个 POJO 来实例化工厂值，并创建另一个 POJO 作为访问工厂的门面。


  为了方便起见，Spring 提供了一个名为 `AbstractFactoryBean` 的抽象模板类，用于扩展 Spring 的 `FactoryBean` 接口。


  ### 工作原理


  你将探索使用 Spring 定义和使用工厂方法的不同方式。首先，你将学习如何使用静态工厂方法，接着是实例工厂方法，最后你将了解 Spring 的 FactoryBean。




  #### 通过调用静态工厂方法创建 POJO


  例如，你可以编写以下 `createProduct` 静态工厂方法，根据预定义的产品 ID 创建产品。该方法根据产品 ID 决定实例化哪个具体产品类。如果没有匹配该
  ID 的产品，则会抛出 `IllegalArgumentException`。


  ```

  package com.apress.springrecipes.shop;

  public class ProductCreator {

  public static Product createProduct(String productId) {

  if ("aaa".equals(productId)) {

  return new Battery("AAA", 2.5);

  } else if ("cdrw".equals(productId)) {

  return new Disc("CD-RW", 1.5);

  } else if ("dvdrw".equals(productId)) {

  return new Disc("DVD-RW", 3.0);

  }

  throw new IllegalArgumentException("Unknown product");

  }

  }

  ```


  要在 Java 配置类的 `@Bean` 定义中使用静态工厂方法创建 POJO，你可以使用常规的 Java 语法来调用该工厂方法。


  ```

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Product;

  import com.apress.springrecipes.shop.ProductCreator;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  @Configuration

  public class ShopConfiguration {

  @Bean

  public Product aaa() {

  return ProductCreator.createProduct("aaa");

  }

  @Bean

  public Product cdrw() {

  return ProductCreator.createProduct("cdrw");

  }

  @Bean

  public Product dvdrw() {

  return ProductCreator.createProduct("dvdrw");

  }

  }

  ```


  #### 通过调用实例工厂方法创建 POJO


  例如，你可以编写以下 `ProductCreator` 类，使用可配置的映射来存储预定义的产品。`createProduct()` 实例工厂方法通过在映射中查找提供的
  `productId` 值来查找产品。如果没有匹配该 ID 的产品，则会抛出 `IllegalArgumentException`。


  ```

  package com.apress.springrecipes.shop;

  ...

  public class ProductCreator {

  private Map products;

  public void setProducts(Map products) {

  this.products = products;

  }

  public Product createProduct(String productId) {

  Product product = products.get(productId);

  if (product != null) {

  return product;

  }

  throw new IllegalArgumentException("Unknown product");

  }

  }

  ```


  要从这个 `ProductCreator` 创建产品，首先声明一个 `@Bean` 来实例化工厂值。接着，声明第二个 Bean 作为访问工厂的门面。最后，你可以调用工厂并执行
  `createProduct()` 方法来实例化其他 Bean。


  ```

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Battery;

  import com.apress.springrecipes.shop.Disc;

  import com.apress.springrecipes.shop.Product;

  import com.apress.springrecipes.shop.ProductCreator;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import java.util.HashMap;

  import java.util.Map;

  @Configuration

  public class ShopConfiguration {

  @Bean

  public ProductCreator productCreatorFactory() {

  ProductCreator factory = new ProductCreator();

  Map products = new HashMap();

  products.put("aaa", new Battery("AAA", 2.5));

  products.put("cdrw", new Disc("CD-RW", 1.5));

  products.put("dvdrw", new Disc("DVD-RW", 3.0));

  factory.setProducts(products);

  return factory;

  }

  @Bean

  public Product aaa() {

  return productCreatorFactory().createProduct("aaa");

  }

  @Bean

  public Product cdrw() {

  return productCreatorFactory().createProduct("cdrw");

  }

  @Bean

  public Product dvdrw() {

  return productCreatorFactory().createProduct("dvdrw");

  }

  }

  ```


  #### 使用 Spring 的工厂 Bean 创建 POJO


  虽然你很少需要编写自定义工厂 Bean，但通过示例了解其内部机制可能会有所帮助。例如，你可以编写一个工厂 Bean，用于创建应用了折扣价格的产品。它接受一个 `product`
  属性和一个 `discount` 属性，将折扣应用于产品，并将其作为新 Bean 返回。


  ```

  package com.apress.springrecipes.shop;

  import org.springframework.beans.factory.config.AbstractFactoryBean;

  public class DiscountFactoryBean extends AbstractFactoryBean {

  private Product product;

  private double discount;

  public void setProduct(Product product) {

  this.product = product;

  }

  public void setDiscount(double discount) {

  this.discount = discount;

  }

  public Class getObjectType() {

  return product.getClass();

  }

  protected Product createInstance() throws Exception {

  product.setPrice(product.getPrice() * (1 - discount));

  return product;

  }

  }

  ```


  通过扩展 `AbstractFactoryBean` 类，工厂 Bean 只需重写 `createInstance()` 方法即可创建目标 Bean 实例。此外，你必须在
  `getObjectType()` 方法中返回目标 Bean 的类型，以便自动装配功能正常工作。


  接下来，你可以使用常规的 `@Bean` 注解声明产品实例，以应用 `DiscountFactoryBean`。


  ```

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Battery;

  import com.apress.springrecipes.shop.Disc;

  import com.apress.springrecipes.shop.DiscountFactoryBean;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  @Configuration

  @ComponentScan("com.apress.springrecipes.shop")

  public class ShopConfiguration {

  @Bean

  public Battery aaa() {

  Battery aaa = new Battery("AAA", 2.5);

  return aaa;

  }

  @Bean

  public Disc cdrw() {

  Disc aaa = new Disc("CD-RW", 1.5);

  return aaa;

  }

  @Bean

  public Disc dvdrw() {

  Disc aaa = new Disc("DVD-RW", 3.0);

  return aaa;

  }

  @Bean

  public DiscountFactoryBean discountFactoryBeanAAA() {

  DiscountFactoryBean factory = new DiscountFactoryBean();

  factory.setProduct(aaa());

  factory.setDiscount(0.2);

  return factory;

  }

  @Bean

  public DiscountFactoryBean discountFactoryBeanCDRW() {

  DiscountFactoryBean factory = new DiscountFactoryBean();

  factory.setProduct(cdrw());

  factory.setDiscount(0.1);

  return factory;

  }

  @Bean

  public DiscountFactoryBean discountFactoryBeanDVDRW() {

  DiscountFactoryBean factory = new DiscountFactoryBean();

  factory.setProduct(dvdrw());

  factory.setDiscount(0.1);

  return factory;

  }

  }

  ```


  ## 2-11\. 使用 Spring 环境和配置文件加载不同的 POJO 集合


  ### 问题


  你希望使用同一组 POJO 实例或 Bean，但针对不同的应用场景（例如生产、开发和测试）使用不同的实例化值。


  ### 解决方案


  创建多个 Java 配置类，并将 POJO 实例或 Bean 分组到这些类中。根据分组目的，使用 `@Profile` 注解为 Java 配置类分配一个配置文件名称。获取应用程序上下文的环境，并设置配置文件以加载特定组的
  POJO。


  ### 工作原理


  POJO 实例化值可能因不同的应用场景而异。例如，一个常见场景是应用程序从开发阶段进入测试阶段，再到生产阶段。在每个场景中，某些 Bean 的属性可能会略有不同，以适应环境变化（例如数据库用户名/密码、文件路径等）。


  你可以创建多个 Java 配置类，每个类包含不同的 POJO（例如 `ShopConfigurationGlobal`、`ShopConfigurationStr`
  和 `ShopConfigurationSumWin`），并在应用程序上下文中仅根据场景加载给定的配置文件类。




  #### 使用 @Profile 注解创建 Java 配置类


  让我们为之前菜谱中介绍的购物应用创建一个带有 `@Profile` 注解的多重 Java 配置类。


  ```

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Cashier;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.Profile;

  @Configuration

  @Profile("global")

  @ComponentScan("com.apress.springrecipes.shop")

  public class ShopConfigurationGlobal {

  @Bean(initMethod = "openFile", destroyMethod = "closeFile")

  public Cashier cashier() {

  final String path = System.getProperty("java.io.tmpdir") + "cashier";

  Cashier c1 = new Cashier();

  c1.setFileName("checkout");

  c1.setPath(path);

  return c1;

  }

  }

  package com.apress.springrecipes.shop.config;

  import com.apress.springrecipes.shop.Battery;

  import com.apress.springrecipes.shop.Disc;

  import com.apress.springrecipes.shop.Product;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.Profile;

  @Configuration

  @Profile({"summer", "winter"})

  public class ShopConfigurationSumWin {

  @Bean

  public Product aaa() {

  Battery p1 = new Battery();

  p1.setName("AAA");

  p1.setPrice(2.0);

  p1.setRechargeable(true);

  return p1;

  }

  @Bean

  public Product cdrw() {

  Disc p2 = new Disc("CD-RW", 1.0);

  p2.setCapacity(700);

  return p2;

  }

  @Bean

  public Product dvdrw() {

  Disc p2 = new Disc("DVD-RW", 2.5);

  p2.setCapacity(700);

  return p2;

  }

  }

  ```


  `@Profile` 注解修饰了整个 Java 配置类，因此所有 `@Bean` 实例都属于同一个 Profile。要指定 `@Profile` 名称，只需将名称放在
  `""` 内即可。请注意，也可以使用由 `{}` 包围的逗号分隔值（CSV）语法来指定多个 `@Profile` 名称（例如 `{"summer","winter"}`）。


  #### 将 Profile 加载到环境中


  要将某个 Profile 中的 Bean 加载到应用程序中，你需要激活该 Profile。你可以一次加载多个 Profile，也可以通过 Java 运行时标志，甚至作为
  WAR 文件的初始化参数，以编程方式加载 Profile。


  要以编程方式加载 Profile（即通过应用程序上下文），你需要获取上下文环境，然后通过 `setActiveProfiles()` 方法从中加载 Profile。


  ```

  AnnotationConfigApplicationContext context = new AnnotationConfigApplicationContext();

  context.getEnvironment().setActiveProfiles("global", "winter");

  context.scan("com.apress.springrecipes.shop");

  context.refresh();

  ```


  也可以通过 Java 运行时标志来指示要加载哪个 Spring Profile。通过这种方式，你可以传递以下运行时标志来加载属于 global 和 winter
  Profile 的所有 Bean：


  ```

  -Dspring.profiles.active=global,winter

  ```


  #### 设置默认 Profile


  为了避免因没有为应用程序加载任何 Profile 而可能出现的错误，你可以定义默认 Profile。默认 Profile 仅在 Spring 无法检测到任何活动
  Profile 时使用，这些活动 Profile 可以通过编程方式、Java 运行时标志或 Web 应用程序初始化参数来定义。


  要设置默认 Profile，你也可以使用设置活动 Profile 的三种方法中的任何一种。以编程方式，使用 `setDefaultProfiles()` 方法代替
  `setActiveProfiles()` 方法；通过 Java 运行时标志或 Web 应用程序初始化参数，可以使用 `spring.profiles.default`
  参数代替 `spring.profiles.active` 参数。


  ## 2-12\. 使 POJO 感知 Spring 的 IoC 容器资源


  ### 问题


  尽管一个设计良好的组件不应直接依赖 Spring 的 IoC 容器，但有时 Bean 需要感知容器的资源。


  ### 解决方案


  你的 Bean 可以通过实现某些“感知”接口来感知 Spring IoC 容器的资源。表 2-2 列出了最常见的接口。Spring 会通过这些接口中定义的 setter
  方法，将相应的资源注入到实现这些接口的 Bean 中。


  表 2-2. Spring 中常见的感知接口


  | 感知接口 | 目标资源类型 |

  | --- | --- |

  | `BeanNameAware` | 在 IoC 容器中配置的其实例的 Bean 名称。 |

  | `BeanFactoryAware` | 当前的 Bean 工厂，通过它可以调用容器的服务。 |

  | `ApplicationContextAware` | 当前的应用程序上下文，通过它可以调用容器的服务。 |

  | `MessageSourceAware` | 消息源，通过它可以解析文本消息。 |

  | `ApplicationEventPublisherAware` | 应用程序事件发布器，通过它可以发布应用程序事件。 |

  | `ResourceLoaderAware` | 资源加载器，通过它可以加载外部资源。 |

  | `EnvironmentAware` | 与 `ApplicationContext` 接口关联的 `org.springframework.core.env.Environment`
  实例。 |


  注意


  `ApplicationContext` 接口实际上扩展了 `MessageSource`、`ApplicationEventPublisher` 和 `ResourceLoader`
  接口，因此你只需感知应用程序上下文即可访问所有这些服务。然而，最佳实践是选择一个能满足你需求且范围最小的感知接口。


  感知接口中的 setter 方法由 Spring 在 Bean 属性设置之后、初始化回调方法调用之前调用，如下列表所示：


  1.  通过构造函数或工厂方法创建 Bean 实例。  

  2.  为 Bean 属性设置值和 Bean 引用。  

  3.  调用感知接口中定义的 setter 方法。  

  4.  将 Bean 实例传递给每个 Bean 后处理器的 `postProcessBeforeInitialization()` 方法。调用初始化回调方法。
   

  5.  将 Bean 实例传递给每个 Bean 后处理器的 `postProcessAfterInitialization()` 方法。此时 Bean 已准备好可供使用。
   

  6.  当容器关闭时，调用销毁回调方法。  


  请记住，一旦一个类实现了感知接口，它们就与 Spring 绑定，并且在 Spring IoC 容器之外将无法正常工作。因此，请仔细考虑是否有必要实现此类专有接口。


  注意


  在较新版本的 Spring 中，并非严格需要实现感知接口。你也可以使用 `@Autowired` 来获取，例如，对 `ApplicationContext` 的访问。但是，如果你正在编写一个框架/库，那么实现这些接口可能会更好。




  ### 工作原理


  例如，你可以通过让购物应用的 `Cashier` 类的 POJO 实例实现 `BeanNameAware` 接口，使其能够感知对应的 Bean 名称。通过实现该接口，Spring
  会自动将 Bean 名称注入到 POJO 实例中。除了实现接口外，你还需要添加必要的 setter 方法来处理 Bean 名称。


  ```

  package com.apress.springrecipes.shop;

  ...

  import org.springframework.beans.factory.BeanNameAware;

  public class Cashier implements BeanNameAware {

  ...

  private String fileName;

  public void setBeanName(String beanName) {

  this.fileName = beanName;

  }

  }

  ```


  当 Bean 名称被注入后，你可以使用该值执行需要 Bean 名称的相关 POJO 任务。例如，你可以使用该值设置文件名，以记录收银员的结账数据。通过这种方式，你可以移除
  `fileName` 属性和 `setFileName()` 方法的配置。


  ```

  @Bean(initMethod = "openFile", destroyMethod = "closeFile")

  public Cashier cashier() {

  final String path = System.getProperty("java.io.tmpdir") + "cashier";

  Cashier cashier = new Cashier();

  cashier.setPath(path);

  return c1;

  }

  ```


  ## 2-13. 使用注解实现面向切面编程


  ### 问题


  你希望使用 Spring 和注解来实现面向切面编程。


  ### 解决方案


  你可以通过使用 `@Aspect` 注解修饰一个 Java 类来定义一个切面。类中的每个方法都可以通过另一个注解成为一条通知。你可以使用五种类型的通知注解：`@Before`、`@After`、`@AfterReturning`、`@AfterThrowing`
  和 `@Around`。


  为了在 Spring IoC 容器中启用注解支持，你需要在某个配置类上添加 `@EnableAspectJAutoProxy` 注解。为了应用 AOP，Spring
  会创建代理，默认情况下会创建基于接口的 JDK 动态代理。对于接口不可用或未在应用程序设计中使用的场景，可以依赖 CGLIB 来创建代理。要启用 CGLIB，你需要在
  `@EnableAspectJAutoProxy` 注解上设置属性 `proxyTargetClass=true`。


  ### 工作原理


  为了支持使用注解的面向切面编程，Spring 使用了与 AspectJ 相同的注解，并利用 AspectJ 提供的库进行切点解析和匹配。然而，其 AOP 运行时仍然是纯
  Spring AOP，不依赖于 AspectJ 编译器或织入器。


  为了演示如何使用注解启用面向切面编程，你将使用以下计算器接口来定义一组示例 POJO：


  ```

  package com.apress.springrecipes.calculator;

  public interface ArithmeticCalculator {

  public double add(double a, double b);

  public double sub(double a, double b);

  public double mul(double a, double b);

  public double div(double a, double b);

  }

  package com.apress.springrecipes.calculator;

  public interface UnitCalculator {

  public double kilogramToPound(double kilogram);

  public double kilometerToMile(double kilometer);

  }

  ```


  接下来，让我们为每个接口创建 POJO 类，并加入 `println` 语句以便了解每个方法何时被执行：


  ```

  package com.apress.springrecipes.calculator;

  import org.springframework.stereotype.Component;

  @Component("arithmeticCalculator")

  public class ArithmeticCalculatorImpl implements ArithmeticCalculator {

  public double add(double a, double b) {

  double result = a + b;

  System.out.println(a + " + " + b + " = " + result);

  return result;

  }

  public double sub(double a, double b) {

  double result = a - b;

  System.out.println(a + " - " + b + " = " + result);

  return result;

  }

  public double mul(double a, double b) {

  double result = a * b;

  System.out.println(a + " * " + b + " = " + result);

  return result;

  }

  public double div(double a, double b) {

  if (b == 0) {

  throw new IllegalArgumentException("Division by zero");

  }

  double result = a / b;

  System.out.println(a + " / " + b + " = " + result);

  return result;

  }

  }

  package com.apress.springrecipes.calculator;

  import org.springframework.stereotype.Component;

  @Component("unitCalculator")

  public class UnitCalculatorImpl implements UnitCalculator {

  public double kilogramToPound(double kilogram) {

  double pound = kilogram * 2.2;

  System.out.println(kilogram + " kilogram = " + pound + " pound");

  return pound;

  }

  public double kilometerToMile(double kilometer) {

  double mile = kilometer * 0.62;

  System.out.println(kilometer + " kilometer = " + mile + " mile");

  return mile;

  }

  }

  ```


  请注意，每个 POJO 实现都使用了 `@Component` 注解进行修饰，以创建 Bean 实例。


  #### 声明切面、通知和切点


  切面是一个 Java 类，它将一组横切多个类型和对象的关注点（例如日志记录或事务管理）模块化。用于模块化此类关注点的 Java 类会使用 `@Aspect` 注解进行修饰。在
  AOP 术语中，切面还辅以通知，而通知本身又包含切点。通知是一个简单的 Java 方法，带有其中一个通知注解。AspectJ 支持五种类型的通知注解：`@Before`、`@After`、`@AfterReturning`、`@AfterThrowing`
  和 `@Around`。切点是一个表达式，用于查找要应用切面通知的类型和对象。




  #### 使用 @Before 通知的切面


  要创建前置通知，在特定程序执行点之前处理横切关注点，你可以使用 `@Before` 注解，并将切入点表达式作为注解的值。


  ```

  package com.apress.springrecipes.calculator;

  import org.apache.commons.logging.Log;

  import org.apache.commons.logging.LogFactory;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Before;

  import org.springframework.stereotype.Component;

  @Aspect

  @Component

  public class CalculatorLoggingAspect {

  private Log log = LogFactory.getLog(this.getClass());

  @Before("execution(* ArithmeticCalculator.add(..))")

  public void logBefore() {

  log.info("The method add() begins");

  }

  }

  ```


  这个切入点表达式匹配 `ArithmeticCalculator` 接口的 `add()` 方法执行。表达式中的前导通配符匹配任何修饰符（`public`、`protected`
  和 `private`）和任何返回类型。参数列表中的两个点匹配任意数量的参数。


  要使上述切面生效（即输出其消息），你需要设置日志记录。具体来说，创建一个包含如下配置属性的 `logback.xml` 文件。


  ```


  %d [%15.15t] %-5p %30.30c - %m%n


  ```


  注意


  `@Aspect` 注解不足以在类路径中被自动检测。因此，你需要为这个 POJO 添加一个单独的 `@Component` 注解才能被检测到。


  接下来，你创建一个 Spring 配置来扫描所有 POJO，包括 POJO 计算器实现和切面，并包含 `@EnableAspectJAutoProxy` 注解。


  ```

  @Configuration

  @EnableAspectJAutoProxy

  @ComponentScan

  public class CalculatorConfiguration {

  }

  ```


  最后一步，你可以使用以下 `Main` 类来测试该切面：


  ```

  package com.apress.springrecipes.calculator;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  ApplicationContext context =

  new AnnotationConfigApplicationContext(CalculatorConfiguration.class);

  ArithmeticCalculator arithmeticCalculator =

  context.getBean("arithmeticCalculator", ArithmeticCalculator.class);

  arithmeticCalculator.add(1, 2);

  arithmeticCalculator.sub(4, 3);

  arithmeticCalculator.mul(2, 3);

  arithmeticCalculator.div(4, 2);

  UnitCalculator unitCalculator = context.getBean("unitCalculator", UnitCalculator.class);

  unitCalculator.kilogramToPound(10);

  unitCalculator.kilometerToMile(5);

  }

  }

  ```


  被切入点匹配的执行点被称为连接点。在这个术语中，切入点是一个用于匹配一组连接点的表达式，而通知则是在特定连接点处执行的动作。


  为了让你的通知能够访问当前连接点的详细信息，你可以在通知方法中声明一个 `JoinPoint` 类型的参数。然后，你就可以访问连接点的详细信息，例如方法名和参数值。现在，你可以通过将类名和方法名改为通配符来扩展你的切入点，以匹配所有方法。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import java.util.Arrays;

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Before;

  @Aspect

  @Component

  public class CalculatorLoggingAspect {

  ...

  @Before("execution(* *.*(..))")

  public void logBefore(JoinPoint joinPoint) {

  log.info("The method " + joinPoint.getSignature().getName()

  + "() begins with " + Arrays.toString(joinPoint.getArgs()));

  }

  }

  ```


  #### 使用 @After 通知的切面


  后置通知在连接点结束后执行，由带有 `@After` 注解的方法表示，无论连接点是正常返回还是抛出异常。以下后置通知会记录计算器方法的结束：


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.After;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @After("execution(* *.*(..))")

  public void logAfter(JoinPoint joinPoint) {

  log.info("The method " + joinPoint.getSignature().getName()

  + "() ends");

  }

  }

  ```


  #### 使用 @AfterReturning 通知的切面


  无论连接点是正常返回还是抛出异常，后置通知都会执行。如果你只想在连接点正常返回时才执行日志记录，你应该用返回后通知来替代后置通知。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.AfterReturning;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @AfterReturning("execution(* *.*(..))")

  public void logAfterReturning(JoinPoint joinPoint) {

  log.info("The method {}() ends with {}", joinPoint.getSignature().getName(), result);

  }

  }

  ```


  在返回后通知中，你可以通过向 `@AfterReturning` 注解添加一个 `returning` 属性来访问连接点的返回值。该属性的值应该是此通知方法中用于传入返回值的参数名。然后，你必须在通知方法签名中添加一个同名的参数。在运行时，Spring
  AOP 会通过这个参数传入返回值。另请注意，原始切入点表达式需要改为在 `pointcut` 属性中提供。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.AfterReturning;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @AfterReturning(

  pointcut = "execution(* *.*(..))",

  returning = "result")

  public void logAfterReturning(JoinPoint joinPoint, Object result) {

  log.info("The method " + joinPoint.getSignature().getName()

  + "() ends with " + result);

  }

  }

  ```




  #### 使用带有 @AfterThrowing 通知的切面


  后置抛出通知仅在连接点抛出异常时执行。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.AfterThrowing;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @AfterThrowing("execution(* *.*(..))")

  public void logAfterThrowing(JoinPoint joinPoint) {

  log.error("An exception has been thrown in {}()", joinPoint.getSignature().getName());

  }

  }

  ```


  类似地，可以通过为 `@AfterThrowing` 注解添加 `throwing` 属性来访问连接点抛出的异常。`Throwable` 类型是 Java 语言中所有错误和异常的父类。因此，以下通知将捕获连接点抛出的任何错误和异常：


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.AfterThrowing;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @AfterThrowing(

  pointcut = "execution(* *.*(..))",

  throwing = "e")

  public void logAfterThrowing(JoinPoint joinPoint, Throwable e) {

  log.error("An exception {} has been thrown in {}()", e, joinPoint.getSignature().getName());

  }

  }

  ```


  然而，如果你只对某一种特定类型的异常感兴趣，你可以将其声明为异常的参数类型。那么，你的通知将仅在抛出兼容类型（即该类型及其子类型）的异常时执行。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import java.util.Arrays;

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.AfterThrowing;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @AfterThrowing(

  pointcut = "execution(* *.*(..))",

  throwing = "e")

  public void logAfterThrowing(JoinPoint joinPoint, IllegalArgumentException e) {

  log.error("Illegal argument {} in {}()", Arrays.toString(joinPoint.getArgs()), joinPoint.getSignature().getName());

  }

  }

  ```


  #### 使用带有 @Around 通知的切面


  最后一种通知类型是环绕通知。它是所有通知类型中最强大的。它能够完全控制一个连接点，因此你可以将前面所有通知的动作合并到一个通知中。你甚至可以控制何时以及是否继续执行原始连接点。


  以下环绕通知是您之前创建的前置、返回后和抛出后通知的组合。请注意，对于环绕通知，连接点的参数类型必须是 `ProceedingJoinPoint`。它是 `JoinPoint`
  的子接口，允许您控制何时继续执行原始连接点。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.ProceedingJoinPoint;

  import org.aspectj.lang.annotation.Around;

  import org.aspectj.lang.annotation.Aspect;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import org.springframework.stereotype.Component;

  import java.util.Arrays;

  @Aspect

  @Component

  public class CalculatorLoggingAspect {

  private Logger log = LoggerFactory.getLogger(this.getClass());

  @Around("execution(* *.*(..))")

  public Object logAround(ProceedingJoinPoint joinPoint) throws Throwable {

  log.info("The method {}() begins with {}", joinPoint.getSignature().getName(), Arrays.toString(joinPoint.getArgs()));

  try {

  Object result = joinPoint.proceed();

  log.info("The method {}() ends with ", joinPoint.getSignature().getName(), result);

  return result;

  } catch (IllegalArgumentException e) {

  log.error("Illegal argument {} in {}()", Arrays.toString(joinPoint.getArgs()) ,
  joinPoint.getSignature().getName());

  throw e;

  }

  }

  }

  ```


  环绕通知类型强大且灵活，你甚至可以更改原始参数值和最终的返回值。使用此类型通知时必须非常小心，因为很容易忘记调用以继续执行原始连接点。


  提示


  选择通知类型的一个通用规则是：使用能够满足你需求的最不强大的那一种。


  ## 2-14. 访问连接点信息


  ### 问题


  在 AOP 中，通知被应用于不同的程序执行点，这些点被称为连接点。为了使通知采取正确的行动，它通常需要关于连接点的详细信息。


  ### 解决方案


  通知可以通过在通知方法签名中声明一个 `org.aspectj.lang.JoinPoint` 类型的参数来访问当前的连接点信息。


  ### 实现原理


  例如，你可以通过以下通知访问连接点信息。这些信息包括连接点类型（在 Spring AOP 中仅为方法执行）、方法签名（声明类型和方法名）、参数值，以及目标对象和代理对象。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Before;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import org.springframework.stereotype.Component;

  import java.util.Arrays;

  @Aspect

  @Component

  public class CalculatorLoggingAspect {

  private Logger log = LoggerFactory.getLogger(this.getClass());

  @Before("execution(* *.*(..))")

  public void logJoinPoint(JoinPoint joinPoint) {

  log.info("Join point kind : {}", joinPoint.getKind());

  log.info("Signature declaring type : {}", joinPoint.getSignature().getDeclaringTypeName());

  log.info("Signature name : {}", joinPoint.getSignature().getName());

  log.info("Arguments : {}", Arrays.toString(joinPoint.getArgs()));

  log.info("Target class : {}", joinPoint.getTarget().getClass().getName());

  log.info("This class : {}", joinPoint.getThis().getClass().getName());

  }

  }

  ```


  被代理包装的原始 bean 称为目标对象，而代理对象是 `this` 对象。它们可以通过连接点的 `getTarget()` 和 `getThis()` 方法访问。从以下输出中，你可以看到这两个对象的类并不相同：


  ```

  Join point kind : method-execution

  Signature declaring type : com.apress.springrecipes.calculator.ArithmeticCalculator

  Signature name : add

  Arguments : [1.0, 2.0]

  Target class : com.apress.springrecipes.calculator.ArithmeticCalculatorImpl

  This class : com.sun.proxy.$Proxy6

  ```


  ## 2-15. 使用 @Order 注解指定切面优先级


  ### 问题


  当有多个切面应用于同一个连接点时，除非你明确指定，否则这些切面的优先级是未定义的。


  ### 解决方案


  切面的优先级可以通过实现 `Ordered` 接口或使用 `@Order` 注解来指定。




  ### 工作原理


  假设你编写了另一个切面来验证计算器的参数。这个切面中只有一个前置通知。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.JoinPoint;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Before;

  import org.springframework.stereotype.Component;

  @Aspect

  @Component

  public class CalculatorValidationAspect {

  @Before("execution(* *.*(double, double))")

  public void validateBefore(JoinPoint joinPoint) {

  for (Object arg : joinPoint.getArgs()) {

  validate((Double) arg);

  }

  }

  private void validate(double a) {

  if (a < 0) {

  throw new IllegalArgumentException("Positive numbers only");

  }

  }

  }

  ```


  如果你同时应用这个切面和之前的切面，则无法保证哪个切面会先被应用。为了确保一个切面在另一个切面之前应用，你需要指定优先级。要指定优先级，你必须让两个切面都实现
  `Ordered` 接口，或者使用 `@Order` 注解。


  如果你决定实现 `Ordered` 接口，那么 `getOrder` 方法返回的值越小，优先级越高。因此，如果你希望验证切面先被应用，它应该返回一个比日志切面更小的值。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.springframework.core.Ordered;

  @Aspect

  @Component

  public class CalculatorValidationAspect implements Ordered {

  ...

  public int getOrder() {

  return 0;

  }

  }

  package com.apress.springrecipes.calculator;

  ...

  import org.springframework.core.Ordered;

  @Aspect

  @Component

  public class CalculatorLoggingAspect implements Ordered {

  ...

  public int getOrder() {

  return 1;

  }

  }

  ```


  另一种指定优先级的方式是通过 `@Order` 注解。顺序编号应放在注解的值中。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.springframework.core.annotation.Order;

  @Aspect

  @Component

  @Order(0)

  public class CalculatorValidationAspect { ... }

  package com.apress.springrecipes.calculator;

  ...

  import org.springframework.core.annotation.Order;

  @Aspect

  @Component

  @Order(1)

  public class CalculatorLoggingAspect { ... }

  ```


  ## 2-16. 重用切面切入点定义


  ### 问题


  在编写切面时，你可以直接将切入点表达式嵌入到通知注解中。你希望在多个通知中使用相同的切入点表达式，而无需多次嵌入。


  ### 解决方案


  你可以使用 `@Pointcut` 注解独立定义一个切入点，以便在多个通知中重用。


  ### 工作原理


  在切面中，可以通过一个带有 `@Pointcut` 注解的简单方法来声明切入点。切入点的方法体通常为空，因为将切入点定义与应用程序逻辑混合是不合理的。切入点方法的访问修饰符也控制着该切入点的可见性。其他通知可以通过方法名来引用此切入点。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.annotation.Pointcut;

  @Aspect

  @Component

  public class CalculatorLoggingAspect {

  ...

  @Pointcut("execution(* *.*(..))")

  private void loggingOperation() {}

  @Before("loggingOperation()")

  public void logBefore(JoinPoint joinPoint) {

  ...

  }

  @AfterReturning(

  pointcut = "loggingOperation()",

  returning = "result")

  public void logAfterReturning(JoinPoint joinPoint, Object result) {

  ...

  }

  @AfterThrowing(

  pointcut = "loggingOperation()",

  throwing = "e")

  public void logAfterThrowing(JoinPoint joinPoint, IllegalArgumentException e) {

  ...

  }

  @Around("loggingOperation()")

  public Object logAround(ProceedingJoinPoint joinPoint) throws Throwable {

  ...

  }

  }

  ```


  通常，如果你的切入点需要在多个切面之间共享，最好将它们集中放在一个公共类中。在这种情况下，它们必须声明为 `public`。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Pointcut;

  @Aspect

  public class CalculatorPointcuts {

  @Pointcut("execution(* *.*(..))")

  public void loggingOperation() {}

  }

  ```


  当你引用此切入点时，必须同时包含类名。如果该类与切面不在同一个包中，则还必须包含包名。


  ```

  package com.apress.springrecipes.calculator;

  ...

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @Before("CalculatorPointcuts.loggingOperation()")

  public void logBefore(JoinPoint joinPoint) {

  ...

  }

  @AfterReturning(

  pointcut = "CalculatorPointcuts.loggingOperation()",

  returning = "result")

  public void logAfterReturning(JoinPoint joinPoint, Object result) {

  ...

  }

  @AfterThrowing(

  pointcut = "CalculatorPointcuts.loggingOperation()",

  throwing = "e")

  public void logAfterThrowing(JoinPoint joinPoint, IllegalArgumentException e) {

  ...

  }

  @Around("CalculatorPointcuts.loggingOperation()")

  public Object logAround(ProceedingJoinPoint joinPoint) throws Throwable {

  ...

  }

  }

  ```


  ## 2-17. 编写 AspectJ 切入点表达式


  ### 问题


  横切关注点可能发生在不同的程序执行点，这些点被称为连接点。由于连接点的多样性，你需要一种强大的表达式语言来帮助匹配它们。


  ### 解决方案


  AspectJ 切入点语言是一种强大的表达式语言，可以匹配各种类型的连接点。然而，Spring AOP 仅支持在其 IoC 容器中声明的 Bean 的方法执行连接点。因此，本方案仅介绍
  Spring AOP 支持的切入点表达式。有关 AspectJ 切入点语言的完整描述，请参考 AspectJ 网站上提供的 AspectJ 编程指南（[`www.eclipse.org/aspectj/`](http://www.eclipse.org/aspectj/)）。Spring
  AOP 使用 AspectJ 切入点语言来定义其切入点，并在运行时通过 AspectJ 提供的库来解释切入点表达式。在为 Spring AOP 编写 AspectJ
  切入点表达式时，你必须牢记 Spring AOP 仅支持其 IoC 容器中 Bean 的方法执行连接点。如果你使用了超出此范围的切入点表达式，则会抛出 `IllegalArgumentException`。


  ### 工作原理


  让我们探索 Spring 支持的用于编写切入点表达式的模式。首先，你将看到如何基于方法签名、类型模式来编写切入点，以及如何使用（和访问）方法参数。




  #### 使用方法签名模式


  最典型的切入点表达式用于根据方法签名匹配多个方法。例如，以下切入点表达式匹配 `ArithmeticCalculator` 接口中声明的所有方法。开头的通配符匹配具有任何修饰符（`public`、`protected`
  和 `private`）和任何返回类型的方法。参数列表中的两个点匹配任意数量的参数。


  ```

  execution(* com.apress.springrecipes.calculator.ArithmeticCalculator.*(..))

  ```


  如果目标类或接口与切面位于同一包中，则可以省略包名。


  ```

  execution(* ArithmeticCalculator.*(..))

  ```


  以下切入点表达式匹配 `ArithmeticCalculator` 接口中声明的所有 `public` 方法：


  ```

  execution(public * ArithmeticCalculator.*(..))

  ```


  你也可以限制方法的返回类型。例如，以下切入点匹配返回 double 类型数值的方法：


  ```

  execution(public double ArithmeticCalculator.*(..))

  ```


  方法的参数列表也可以被限制。例如，以下切入点匹配第一个参数为原始 `double` 类型的方法。两个点随后匹配任意数量的后续参数。


  ```

  execution(public double ArithmeticCalculator.*(double, ..))

  ```


  或者，你可以在方法签名中指定所有参数类型以供切入点匹配。


  ```

  execution(public double ArithmeticCalculator.*(double, double))

  ```


  尽管 AspectJ 切入点语言在匹配各种连接点方面功能强大，但有时你可能无法为你想要匹配的方法找到任何共同特征（例如，修饰符、返回类型、方法名模式或参数）。在这种情况下，你可以考虑为它们提供一个自定义注解。例如，你可以定义以下标记注解。此注解可以应用于方法级别和类型级别。


  ```

  package com.apress.springrecipes.calculator;

  import java.lang.annotation.Documented;

  import java.lang.annotation.ElementType;

  import java.lang.annotation.Retention;

  import java.lang.annotation.RetentionPolicy;

  import java.lang.annotation.Target;

  @Target( { ElementType.METHOD, ElementType.TYPE })

  @Retention(RetentionPolicy.RUNTIME)

  @Documented

  public @interface LoggingRequired {

  }

  ```


  接下来，你可以使用此注解来注解所有需要日志记录的方法，或者注解类本身以将行为应用于所有方法。请注意，注解必须添加到实现类而不是接口，因为它们不会被继承。


  ```

  package com.apress.springrecipes.calculator;

  @LoggingRequired

  public class ArithmeticCalculatorImpl implements ArithmeticCalculator {

  public double add(double a, double b) {

  ...

  }

  public double sub(double a, double b) {

  ...

  }

  ...

  }

  ```


  然后，你可以编写一个切入点表达式，使用 `@Pointcut` 注解上的 `annotation` 关键字来匹配带有 `@LoggingRequired` 注解的类或方法。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Pointcut;

  @Aspect

  public class CalculatorPointcuts {

  @Pointcut("annotation(com.apress.springrecipes.calculator.LoggingRequired)")

  public void loggingOperation() {}

  }

  ```


  #### 使用类型签名模式


  另一种切入点表达式匹配特定类型内的所有连接点。当应用于 Spring AOP 时，这些切入点的范围将缩小为匹配类型内的所有方法执行。例如，以下切入点匹配 `com.apress.springrecipes.calculator`
  包内的所有方法执行连接点：


  ```

  within(com.apress.springrecipes.calculator.*)

  ```


  要匹配包及其子包内的连接点，你需要在通配符前再加一个点。


  ```

  within(com.apress.springrecipes.calculator..*)

  ```


  以下切入点表达式匹配特定类中的方法执行连接点：


  ```

  within(com.apress.springrecipes.calculator.ArithmeticCalculatorImpl)

  ```


  同样，如果目标类与切面位于同一包中，则可以省略包名。


  ```

  within(ArithmeticCalculatorImpl)

  ```


  你可以通过添加加号来匹配所有实现 `ArithmeticCalculator` 接口的类中的方法执行连接点。


  ```

  within(ArithmeticCalculator+)

  ```


  如前所述，自定义注解 `@LoggingRequired` 可以应用于类或方法级别。


  ```

  package com.apress.springrecipes.calculator;

  @LoggingRequired

  public class ArithmeticCalculatorImpl implements ArithmeticCalculator {

  ...

  }

  ```


  然后，你可以使用 `@Pointcut` 注解上的 `within` 关键字来匹配那些已被 `@LoggingRequired` 注解的类或方法中的连接点。


  ```

  @Pointcut("within(com.apress.springrecipes.calculator.LoggingRequired)")

  public void loggingOperation() {}

  ```


  #### 组合切入点表达式


  在 AspectJ 中，切入点表达式可以使用运算符 `&&`（与）、`||`（或）和 `!`（非）进行组合。例如，以下切入点匹配实现 `ArithmeticCalculator`
  或 `UnitCalculator` 接口的类中的连接点：


  ```

  within(ArithmeticCalculator+) || within(UnitCalculator+)

  ```


  这些运算符的操作数可以是任何切入点表达式或对其他切入点的引用。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Pointcut;

  @Aspect

  public class CalculatorPointcuts {

  @Pointcut("within(ArithmeticCalculator+)")

  public void arithmeticOperation() {}

  @Pointcut("within(UnitCalculator+)")

  public void unitOperation() {}

  @Pointcut("arithmeticOperation() || unitOperation()")

  public void loggingOperation() {}

  }

  ```


  #### 声明切入点参数


  访问连接点信息的一种方法是通过反射（即，通过通知方法中类型为 `org.aspectj.lang.JoinPoint` 的参数）。此外，你可以通过使用某些特殊的切入点表达式以声明方式访问连接点信息。例如，表达式
  `target()` 和 `args()` 捕获当前连接点的目标对象和参数值，并将它们作为切入点参数暴露出来。这些参数通过同名的参数传递给你的通知方法。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Before;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @Before("execution(* *.*(..)) && target(target) && args(a,b)")

  public void logParameter(Object target, double a, double b) {

  log.info("Target class : {}", target.getClass().getName());

  log.info("Arguments : {}, {}", a,b);

  }

  }

  ```


  当声明一个暴露参数的独立切入点时，你也必须将它们包含在切入点方法的参数列表中。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Pointcut;

  @Aspect

  public class CalculatorPointcuts {

  ...

  @Pointcut("execution(* *.*(..)) && target(target) && args(a,b)")

  public void parameterPointcut(Object target, double a, double b) {}

  }

  ```


  任何引用此参数化切入点的通知都可以通过同名的参数来访问切入点参数。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.Before;

  @Aspect

  public class CalculatorLoggingAspect {

  ...

  @Before("CalculatorPointcuts.parameterPointcut(target, a, b)")

  public void logParameter(Object target, double a, double b) {

  log.info("Target class : {}", target.getClass().getName());

  log.info("Arguments : {}, {}"a,b);

  }

  }

  ```


  ## 2-18\. 对 POJO 使用 AOP 进行引入




  ### 问题


  有时你可能会遇到一组具有共同行为的类。在面向对象编程中，它们必须继承同一个基类或实现同一个接口。这个问题实际上是一个横切关注点，可以通过面向切面编程（AOP）进行模块化。此外，Java
  的单继承机制只允许一个类最多继承一个基类。因此，你无法同时从多个实现类继承行为。


  ### 解决方案


  引介（Introduction）是 AOP 中一种特殊类型的通知。它通过为接口提供一个实现类，允许对象动态地实现该接口。这看起来就像对象在运行时扩展了一个实现类。此外，你还可以同时为对象引入多个接口及其对应的多个实现类。这可以达到与多继承相同的效果。


  ### 工作原理


  假设你有两个接口，`MaxCalculator` 和 `MinCalculator`，用于定义 `max()` 和 `min()` 操作。


  ```

  package com.apress.springrecipes.calculator;

  public interface MaxCalculator {

  public double max(double a, double b);

  }

  package com.apress.springrecipes.calculator;

  public interface MinCalculator {

  public double min(double a, double b);

  }

  ```


  然后，你为每个接口提供了一个实现，其中包含 `println` 语句，以便在方法执行时通知你。


  ```

  package com.apress.springrecipes.calculator;

  public class MaxCalculatorImpl implements MaxCalculator {

  public double max(double a, double b) {

  double result = (a >= b) ? a : b;

  System.out.println("max(" + a + ", " + b + ") = " + result);

  return result;

  }

  }

  package com.apress.springrecipes.calculator;

  public class MinCalculatorImpl implements MinCalculator {

  public double min(double a, double b) {

  double result = (a <= b) ? a : b;

  System.out.println("min(" + a + ", " + b + ") = " + result);

  return result;

  }

  }

  ```


  现在，假设你希望 `ArithmeticCalculatorImpl` 也能执行 `max()` 和 `min()` 计算。由于 Java 语言只支持单继承，`ArithmeticCalculatorImpl`
  类不可能同时继承 `MaxCalculatorImpl` 和 `MinCalculatorImpl` 类。唯一可行的方法是继承其中一个类（例如 `MaxCalculatorImpl`）并实现另一个接口（例如
  `MinCalculator`），要么复制实现代码，要么将处理委托给实际的实现类。无论哪种情况，你都必须重复声明方法。


  通过引介，你可以使用实现类 `MaxCalculatorImpl` 和 `MinCalculatorImpl`，让 `ArithmeticCalculatorImpl`
  动态地实现 `MaxCalculator` 和 `MinCalculator` 这两个接口。这与从 `MaxCalculatorImpl` 和 `MinCalculatorImpl`
  进行多继承具有相同的效果。引介背后的理念是，你无需修改 `ArithmeticCalculatorImpl` 类即可引入新方法。这意味着即使没有源代码，你也可以向现有类引入方法。


  > **提示**

  >

  > 你可能想知道引介在 Spring AOP 中是如何做到的。答案是动态代理。你可能还记得，你可以为一组动态代理指定一组接口来实现。引介的工作原理是将一个接口（例如
  `MaxCalculator`）添加到动态代理中。当在代理对象上调用此接口中声明的方法时，代理会将调用委托给后端的实现类（例如 `MaxCalculatorImpl`）。


  引介，如同通知一样，必须在切面内声明。为此，你可以创建一个新切面或重用现有切面。在这个切面中，你可以通过使用 `@DeclareParents` 注解标注任意字段来声明一个引介。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.DeclareParents;

  import org.springframework.stereotype.Component;

  @Aspect

  @Component

  public class CalculatorIntroduction {

  @DeclareParents(

  value = "com.apress.springrecipes.calculator.ArithmeticCalculatorImpl",

  defaultImpl = MaxCalculatorImpl.class)

  public MaxCalculator maxCalculator;

  @DeclareParents(

  value = "com.apress.springrecipes.calculator.ArithmeticCalculatorImpl",

  defaultImpl = MinCalculatorImpl.class)

  public MinCalculator minCalculator;

  }

  ```


  `@DeclareParents` 注解类型的 `value` 属性指明了哪些类是此引介的目标。要引入的接口由被注解字段的类型决定。最后，用于此新接口的实现类在
  `defaultImpl` 属性中指定。


  通过这两个引介，你可以动态地向 `ArithmeticCalculatorImpl` 类引入两个接口。实际上，你可以在 `@DeclareParents` 注解的
  `value` 属性中指定一个 AspectJ 类型匹配表达式，从而向多个类引入一个接口。


  由于你已经向算术计算器引入了 `MaxCalculator` 和 `MinCalculator` 这两个接口，你可以将其转换为相应的接口来执行 `max()`
  和 `min()` 计算。


  ```

  package com.apress.springrecipes.calculator;

  public class Main {

  public static void main(String[] args) {

  ...

  ArithmeticCalculator arithmeticCalculator =

  (ArithmeticCalculator) context.getBean("arithmeticCalculator");

  ...

  MaxCalculator maxCalculator = (MaxCalculator) arithmeticCalculator;

  maxCalculator.max(1, 2);

  MinCalculator minCalculator = (MinCalculator) arithmeticCalculator;

  minCalculator.min(1, 2);

  }

  }

  ```


  ## 2-19. 使用 AOP 为你的 POJO 引入状态


  ### 问题


  有时你可能希望为一组现有对象添加新状态，以跟踪它们的使用情况，例如调用次数、最后修改日期等。如果所有对象都有相同的基类，这或许不是一个解决方案。然而，如果这些类不在同一个类层次结构中，向不同的类添加此类状态会很困难。


  ### 解决方案


  你可以通过一个持有状态字段的实现类，为你的对象引入一个新接口。然后，你可以编写另一个通知，根据特定条件来更改该状态。




  ### 工作原理


  假设你想跟踪每个计算器对象的调用次数。由于原始计算器类中没有用于存储计数器值的字段，你需要通过 Spring AOP 引入一个。首先，为计数器的操作创建一个接口。


  ```

  package com.apress.springrecipes.calculator;

  public interface Counter {

  public void increase();

  public int getCount();

  }

  ```


  接下来，为该接口编写一个简单的实现类。这个类有一个用于存储计数器值的 `count` 字段。


  ```

  package com.apress.springrecipes.calculator;

  public class CounterImpl implements Counter {

  private int count;

  public void increase() {

  count++;

  }

  public int getCount() {

  return count;

  }

  }

  ```


  为了将 `Counter` 接口（以 `CounterImpl` 作为实现）引入到所有计算器对象中，你可以编写以下引入，并使用一个匹配所有计算器实现的类型匹配表达式：


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.annotation.Aspect;

  import org.aspectj.lang.annotation.DeclareParents;

  @Aspect

  @Component

  public class CalculatorIntroduction {

  ...

  @DeclareParents(

  value = "com.apress.springrecipes.calculator.*CalculatorImpl",

  defaultImpl = CounterImpl.class)

  public Counter counter;

  }

  ```


  这个引入将 `CounterImpl` 引入到每个计算器对象中。然而，这仍然不足以跟踪调用次数。你需要在每次调用计算器方法时增加计数器值。为此，你可以编写一个后置通知。请注意，你必须获取这个对象，而不是目标对象，因为只有代理对象实现了
  `Counter` 接口。


  ```

  package com.apress.springrecipes.calculator;

  ...

  import org.aspectj.lang.annotation.After;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  @Component

  public class CalculatorIntroduction {

  ...

  @After("execution(* com.apress.springrecipes.calculator.*Calculator.*(..))"

  + " && this(counter)")

  public void increaseCount(Counter counter) {

  counter.increase();

  }

  }

  ```


  在 `Main` 类中，你可以通过将每个计算器对象转换为 `Counter` 类型来输出其计数器值。


  ```

  package com.apress.springrecipes.calculator;

  public class Main {

  public static void main(String[] args) {

  ...

  ArithmeticCalculator arithmeticCalculator =

  (ArithmeticCalculator) context.getBean("arithmeticCalculator");

  ...

  UnitCalculator unitCalculator =

  (UnitCalculator) context.getBean("unitCalculator");

  ...

  Counter arithmeticCounter = (Counter) arithmeticCalculator;

  System.out.println(arithmeticCounter.getCount());

  Counter unitCounter = (Counter) unitCalculator;

  System.out.println(unitCounter.getCount());

  }

  }

  ```


  ## 2-20. 在 Spring 中使用 AspectJ 的加载时织入


  ### 问题


  Spring AOP 框架仅支持有限类型的 AspectJ 切入点，并且允许将切面应用于 IoC 容器中声明的 Bean。如果你想使用额外的切入点类型，或者将切面应用于
  Spring IoC 容器外部创建的对象，则必须在 Spring 应用程序中使用 AspectJ 框架。


  ### 解决方案


  织入是将切面应用于目标对象的过程。使用 Spring AOP 时，织入在运行时通过动态代理完成。相比之下，AspectJ 框架同时支持编译时织入和加载时织入。


  AspectJ 编译时织入是通过一个名为 `ajc` 的特殊 AspectJ 编译器完成的。它可以将切面织入到你的 Java 源文件中，并输出织入后的二进制类文件。它还可以将切面织入到已编译的类文件或
  JAR 文件中。此过程称为编译后织入。你可以在将类声明到 Spring IoC 容器之前，对其执行编译时和编译后织入。Spring 完全不参与织入过程。有关编译时和编译后织入的更多信息，请参阅
  AspectJ 文档。


  AspectJ 加载时织入（也称为 LTW）发生在目标类被类加载器加载到 JVM 时。对于要织入的类，需要一个特殊的类加载器来增强目标类的字节码。AspectJ
  和 Spring 都提供了加载时织入器，以便为类加载器添加加载时织入能力。你只需进行简单的配置即可启用这些加载时织入器。




  ### 工作原理


  要理解 Spring 应用中 AspectJ 的加载时织入过程，我们以复数计算器为例。首先，创建 `Complex` 类来表示复数。为此类定义 `toString()`
  方法，将复数转换为字符串表示形式 (a + bi)。


  ```

  package com.apress.springrecipes.calculator;

  public class Complex {

  private int real;

  private int imaginary;

  public Complex(int real, int imaginary) {

  this.real = real;

  this.imaginary = imaginary;

  }

  // Getters and Setters

  ...

  public String toString() {

  return "(" + real + " + " + imaginary + "i)";

  }

  }

  ```


  接下来，为复数运算定义一个接口。为简单起见，只支持 `add()` 和 `sub()` 方法。


  ```

  package com.apress.springrecipes.calculator;

  public interface ComplexCalculator {

  public Complex add(Complex a, Complex b);

  public Complex sub(Complex a, Complex b);

  }

  ```


  该接口的实现代码如下所示。每次操作都返回一个新的复数对象作为结果。


  ```

  package com.apress.springrecipes.calculator;

  import org.springframework.stereotype.Component;

  @Component("complexCalculator")

  public class ComplexCalculatorImpl implements ComplexCalculator {

  public Complex add(Complex a, Complex b) {

  Complex result = new Complex(a.getReal() + b.getReal(),

  a.getImaginary() + b.getImaginary());

  System.out.println(a + " + " + b + " = " + result);

  return result;

  }

  public Complex sub(Complex a, Complex b) {

  Complex result = new Complex(a.getReal() - b.getReal(),

  a.getImaginary() - b.getImaginary());

  System.out.println(a + " - " + b + " = " + result);

  return result;

  }

  }

  ```


  现在，你可以使用 `Main` 类中的以下代码来测试这个复数计算器：


  ```

  package com.apress.springrecipes.calculator;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  ApplicationContext context =

  new AnnotationConfigApplicationContext(CalculatorConfiguration.class);

  ComplexCalculator complexCalculator =

  context.getBean("complexCalculator", ComplexCalculator.class);

  complexCalculator.add(new Complex(1, 2), new Complex(2, 3));

  complexCalculator.sub(new Complex(5, 8), new Complex(2, 3));

  }

  }

  ```


  到目前为止，复数计算器运行良好。但是，你可能希望通过缓存复数对象来提高计算器的性能。由于缓存是一个众所周知的横切关注点，你可以使用切面将其模块化。


  ```

  package com.apress.springrecipes.calculator;

  import java.util.Collections;

  import java.util.HashMap;

  import java.util.Map;

  import org.aspectj.lang.ProceedingJoinPoint;

  import org.aspectj.lang.annotation.Around;

  import org.aspectj.lang.annotation.Aspect;

  @Aspect

  public class ComplexCachingAspect {

  private final Map cache = new ConcurrentHashMap();

  @Around("call(public Complex.new(int, int)) && args(a,b)")

  public Object cacheAround(ProceedingJoinPoint joinPoint, int a, int b)

  throws Throwable {

  String key = a + "," + b;

  Complex complex = cache.get(key);

  if (complex == null) {

  System.out.println("Cache MISS for (" + key + ")");

  complex = (Complex) joinPoint.proceed();

  cache.put(key, complex);

  }

  else {

  System.out.println("Cache HIT for (" + key + ")");

  }

  return complex;

  }

  }

  ```


  在这个切面中，你将复数对象缓存在一个映射中，以其实部和虚部作为键。然后，查找缓存的最佳时机是在通过调用构造函数创建复数对象时。你使用 AspectJ 的切入点表达式
  `call` 来捕获调用 `Complex(int,int)` 构造函数的连接点。


  接下来，你需要一个环绕通知来改变返回值。如果在缓存中找到相同值的复数对象，则直接将其返回给调用者。否则，继续执行原始的构造函数调用来创建一个新的复数对象。在将其返回给调用者之前，将其缓存到映射中供后续使用。


  Spring AOP 不支持 `call` 切入点，因此如果你尝试让 Spring 扫描该切入点注解，将会收到错误“unsupported pointcut primitive
  call”。


  由于 Spring AOP 不支持这种类型的切入点，你必须使用 AspectJ 框架来应用这个切面。AspectJ 框架的配置通过类路径根目录下 `META-INF`
  目录中名为 `aop.xml` 的文件完成。


  在这个 AspectJ 配置文件中，你必须指定切面以及你想要切面织入的类。这里，你指定将 `ComplexCachingAspect` 织入到 `com.apress.springrecipes.calculator`
  包中的所有类。


  最后，要实现这种加载时织入，你需要以下一节中描述的两种方式之一来运行应用程序。


  #### 使用 AspectJ 织入器实现加载时织入


  AspectJ 提供了一个加载时织入代理来启用加载时织入。你只需要在运行应用程序的命令中添加一个 VM 参数即可。然后，你的类在加载到 JVM 时就会被织入。


  ```

  java -javaagent:lib/aspectjweaver-1.9.0.jar -jar Recipe_2_19_ii-4.0.0.jar

  ```


  如果你使用上述参数运行应用程序，你将得到以下输出和缓存状态。AspectJ 代理会通知所有对 `Complex(int,int)` 构造函数的调用。


  ```

  Cache MISS for (1,2)

  Cache MISS for (2,3)

  Cache MISS for (3,5)

  (1 + 2i) + (2 + 3i) = (3 + 5i)

  Cache MISS for (5,8)

  Cache HIT for (2,3)

  Cache HIT for (3,5)

  (5 + 8i) - (2 + 3i) = (3 + 5i)

  ```


  #### 使用 Spring 加载时织入器实现加载时织入


  Spring 为不同的运行时环境提供了多个加载时织入器。要为你的 Spring 应用启用合适的加载时织入器，你只需要在你的配置类中添加 `@EnableLoadTimeWeaving`
  注解。


  Spring 将能够为你的运行时环境检测到最合适的加载时织入器。某些 Java EE 应用服务器具有支持 Spring 加载时织入机制的类加载器，因此无需在其启动命令中指定
  Java 代理。


  然而，对于简单的 Java 应用程序，你仍然需要 Spring 提供的织入代理来启用加载时织入。你必须在启动命令的 VM 参数中指定 Spring 代理。


  ```

  java -javaagent:lib/spring-instrument-5.0.0.jar -jar Recipe_2_19_iii-4.0.0.jar

  ```


  但是，如果你运行应用程序，你将得到以下输出和缓存状态：


  ```

  Cache MISS for (3,5)

  (1 + 2i) + (2 + 3i) = (3 + 5i)

  Cache HIT for (3,5)

  (5 + 8i) - (2 + 3i) = (3 + 5i)

  ```


  这是因为 Spring 代理仅通知由 Spring IoC 容器中声明的 bean 发起的 `Complex(int,int)` 构造函数调用。由于复数操作数是在
  `Main` 类中创建的，Spring 代理不会通知它们的构造函数调用。


  ## 2-21\. 在 Spring 中配置 AspectJ 切面


  ### 问题


  AspectJ 框架中使用的切面由 AspectJ 框架本身实例化。因此，你必须从 AspectJ 框架中检索切面实例来配置它们。


  ### 解决方案


  每个 AspectJ 切面都提供了一个名为 `Aspects` 的工厂类，该类有一个名为 `aspectOf()` 的静态工厂方法，允许你访问当前的切面实例。在
  Spring IoC 容器中，你可以通过调用 `Aspects.aspectOf(ComplexCachingAspect.class)` 来声明一个由此工厂方法创建的
  bean。




  ### 工作原理


  例如，你可以允许通过 setter 方法预配置 `ComplexCachingAspect` 的缓存映射。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.ProceedingJoinPoint;

  import org.aspectj.lang.annotation.Around;

  import org.aspectj.lang.annotation.Aspect;

  import java.util.Map;

  import java.util.concurrent.ConcurrentHashMap;

  @Aspect

  public class ComplexCachingAspect {

  private Map cache = new ConcurrentHashMap();

  public void setCache(Map cache) {

  this.cache.clear();

  this.cache.putAll(cache);

  }

  @Around("call(public Complex.new(int, int)) && args(a,b)")

  public Object cacheAround(ProceedingJoinPoint joinPoint, int a, int b) throws Throwable
  {

  String key = a + "," + b;

  Complex complex = cache.get(key);

  if (complex == null) {

  System.out.println("缓存未命中 (" + key + ")");

  complex = (Complex) joinPoint.proceed();

  cache.put(key, complex);

  } else {

  System.out.println("缓存命中 (" + key + ")");

  }

  return complex;

  }

  }

  ```


  要配置该切面，创建一个带有 `@Bean` 注解的方法，该方法调用前面提到的工厂方法 `Aspects.aspectOf`；这将为你提供切面的实例。然后可以对这个实例进行配置。


  ```

  package com.apress.springrecipes.calculator;

  import org.aspectj.lang.Aspects;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import java.util.HashMap;

  import java.util.Map;

  @Configuration

  @ComponentScan

  public class CalculatorConfiguration {

  @Bean

  public ComplexCachingAspect complexCachingAspect() {

  Map cache = new HashMap();

  cache.put("2,3", new Complex(2,3));

  cache.put("3,5", new Complex(3,5));

  ComplexCachingAspect complexCachingAspect =            Aspects.aspectOf(ComplexCachingAspect.class);

  complexCachingAspect.setCache(cache);

  return complexCachingAspect;

  }

  }

  ```


  要运行应用程序，你需要使用 AspectJ 的织入器。


  ```

  java -javaagent:lib/aspectjweaver-1.9.0.jar -jar Recipe_2_20-4.0.0.jar

  ```


  ## 2-22\. 使用 AOP 将 POJO 注入领域对象


  ### 问题


  在 Spring IoC 容器中声明的 Bean，可以通过 Spring 的依赖注入能力相互装配。然而，在 Spring IoC 容器外部创建的对象无法通过配置自动装配到
  Spring Bean 上。你必须通过编程代码手动执行装配。


  ### 解决方案


  在 Spring IoC 容器外部创建的对象通常是领域对象。它们通常使用 `new` 操作符创建，或者来自数据库查询的结果。要将 Spring Bean 注入到
  Spring 外部创建的领域对象中，你需要借助 AOP。实际上，Spring Bean 的注入也是一种横切关注点。由于领域对象不是由 Spring 创建的，因此你不能使用
  Spring AOP 进行注入。Spring 提供了一个专门用于此目的的 AspectJ 切面。你可以在 AspectJ 框架中启用这个切面。


  ### 工作原理


  假设你有一个用于格式化复数的全局格式化器。这个格式化器接受一个格式化模式，并使用标准的 `@Component` 和 `@Value` 注解来实例化一个 POJO。


  ```

  package com.apress.springrecipes.calculator;

  @Component

  public class ComplexFormatter {

  @Value("(a + bi)")

  private String pattern;

  public void setPattern(String pattern) {

  this.pattern = pattern;

  }

  public String format(Complex complex) {

  return pattern.replaceAll("a", Integer.toString(complex.getReal()))

  .replaceAll("b", Integer.toString(complex.getImaginary()));

  }

  }

  ```


  在 `Complex` 类中，你希望在 `toString()` 方法中使用这个格式化器将复数转换为字符串。它暴露了一个用于 `ComplexFormatter`
  的 setter 方法。


  ```

  package com.apress.springrecipes.calculator;

  public class Complex {

  private int real;

  private int imaginary;

  ...

  private ComplexFormatter formatter;

  public void setFormatter(ComplexFormatter formatter) {

  this.formatter = formatter;

  }

  public String toString() {

  return formatter.format(this);

  }

  }

  ```


  然而，由于 `Complex` 对象不是由 Spring IoC 容器实例化的，因此无法以常规方式配置依赖注入。Spring 在其切面库中包含了 `AnnotationBeanConfigurerAspect`，用于配置任何对象的依赖关系，即使它们不是由
  Spring IoC 容器创建的。


  首先，你必须使用 `@Configurable` 注解标注你的对象类型，以声明该类型的对象是可配置的。


  ```

  package com.apress.springrecipes.calculator;

  import org.springframework.beans.factory.annotation.Configurable;

  import org.springframework.beans.factory.annotation.Configurable;

  import org.springframework.context.annotation.Scope;

  @Configurable

  @Component

  @Scope("prototype")

  public class Complex {

  ...

  @Autowired

  public void setFormatter(ComplexFormatter formatter) {

  this.formatter = formatter;

  }

  }

  ```


  除了 `@Configurable` 注解之外，你还使用标准的 `@Component`、`@Scope` 和 `@Autowired` 注解来装饰 POJO，以便
  Bean 获得标准的 Spring 行为。然而，`@Configurable` 注解是最重要的配置部分，为此 Spring 定义了一个便捷的注解 `@EnableSpringConfigured`，供你启用上述切面。


  ```

  @Configuration

  @EnableSpringConfigured

  @ComponentScan

  public class CalculatorConfiguration {}

  ```


  当实例化一个带有 `@Configurable` 注解的类时，该切面会查找一个原型作用域的 Bean 定义，其类型与该类相同。然后，它会根据这个 Bean 定义配置新实例。如果
  Bean 定义中声明了属性，新实例也将拥有由该切面设置的相同属性。


  最后，要运行应用程序，你需要使用 AspectJ 代理在加载时将切面织入到你的类中。


  ```

  java -javaagent:lib/aspectjweaver-1.9.0.jar -jar Recipe_2_21-4.0.0.jar

  ```


  ## 2-23\. 使用 Spring 和 TaskExecutors 实现并发


  ### 问题


  你想用 Spring 构建一个多线程的并发程序，但由于没有标准方法，不知道应该采用哪种方式。


  ### 解决方案


  使用 Spring 的 `TaskExecutor` 抽象。这个抽象为许多环境提供了多种实现，包括基本的 Java SE `Executor` 实现、CommonJ
  `WorkManager` 实现以及自定义实现。


  在 Spring 中，所有实现都是统一的，并且也可以转换为 Java SE 的 `Executor` 接口。




  ### 工作原理


  线程处理是一个棘手的问题，在 Java SE 环境中使用标准线程实现起来可能特别繁琐。并发是服务器端组件的另一个重要方面，但在企业级 Java 领域几乎没有标准化。事实上，Java
  企业版规范的部分内容明确禁止显式创建和操作线程。


  在 Java SE 领域，多年来引入了许多选项来处理线程和并发。首先，自 Java 开发工具包 (JDK) 1.0 起就提供了标准的 `java.lang.Thread`
  支持。Java 1.3 引入了 `java.util.TimerTask` 来支持定期执行某些工作。Java 5 首次推出了 `java.util.concurrent`
  包，以及一个围绕 `java.util.concurrent.Executor` 构建线程池的重构层次结构。


  `Executor` 的应用程序编程接口 (API) 很简单。


  ```

  package java.util.concurrent;

  public interface Executor {

  void execute(Runnable command);

  }

  ```


  子接口 `ExecutorService` 提供了更多用于管理线程的功能，并支持向线程引发事件，例如 `shutdown()`。自 Java SE 5.0 以来，JDK
  附带了多种实现。其中许多可以通过 `java.util.concurrent` 包中的静态工厂方法获得。以下是几个使用 Java SE 类的示例。


  `ExecutorService` 类提供了一个 `submit()` 方法，该方法返回一个 `Future<T>` 对象。`Future<T>` 的实例可用于跟踪通常异步执行的线程的进度。你可以调用
  `Future.isDone()` 或 `Future.isCancelled()` 来分别确定作业是否已完成或已取消。当你在 `run` 方法没有返回类型的
  `Runnable` 实例内部使用 `ExecutorService` 和 `submit()` 时，对返回的 `Future` 调用 `get()` 会返回
  `null`，或者返回提交时指定的值。


  ```

  Runnable task = new Runnable(){

  public void run(){

  try{

  Thread.sleep( 1000 * 60 ) ;

  System.out.println("Done sleeping for a minute, returning! " );

  } catch (Exception ex) { /* ... */ }

  }

  };

  ExecutorService executorService  = Executors.newCachedThreadPool() ;

  if(executorService.submit(task, Boolean.TRUE).get().equals( Boolean.TRUE ))

  System.out.println( "Job has finished!");

  ```


  有了这些背景信息，你可以探索各种实现的一些特性。例如，下面是一个旨在使用 `Runnable` 标记时间流逝的类：


  ```

  package com.apress.springrecipes.spring3.executors;

  import java.util.Date;

  public class DemonstrationRunnable implements Runnable {

  public void run() {

  try {

  Thread.sleep(1000);

  } catch (InterruptedException e) {

  e.printStackTrace();

  }

  System.out.println(Thread.currentThread().getName());

  System.out.printf("Hello at %s \n", new Date());

  }

  }

  ```


  在探索 Java SE Executors 和 Spring 的 `TaskExecutor` 支持时，你将使用相同的实例。


  ```

  package com.apress.springrecipes.spring3.executors;

  import java.util.Date;

  import java.util.concurrent.ExecutorService;

  import java.util.concurrent.Executors;

  import java.util.concurrent.ScheduledExecutorService;

  import java.util.concurrent.TimeUnit;

  public class ExecutorsDemo {

  public static void main(String[] args) throws Throwable {

  Runnable task = new DemonstrationRunnable();

  ExecutorService cachedThreadPoolExecutorService =

  Executors.newCachedThreadPool();

  if (cachedThreadPoolExecutorService.submit(task).get() == null)

  System.out.printf("The cachedThreadPoolExecutorService "

  + "has succeeded at %s \n", new Date());

  ExecutorService fixedThreadPool = Executors.newFixedThreadPool(100);

  if (fixedThreadPool.submit(task).get() == null)

  System.out.printf("The fixedThreadPool has " +

  "succeeded at %s \n",

  new Date());

  ExecutorService singleThreadExecutorService =

  Executors.newSingleThreadExecutor();

  if (singleThreadExecutorService.submit(task).get() == null)

  System.out.printf("The singleThreadExecutorService "

  + "has succeeded at %s \n", new Date());

  ExecutorService es = Executors.newCachedThreadPool();

  if (es.submit(task, Boolean.TRUE).get().equals(Boolean.TRUE))

  System.out.println("Job has finished!");

  ScheduledExecutorService scheduledThreadExecutorService =

  Executors.newScheduledThreadPool(10);

  if (scheduledThreadExecutorService.schedule(

  task, 30, TimeUnit.SECONDS).get() == null)

  System.out.printf("The scheduledThreadExecutorService "

  + "has succeeded at %s \n", new Date());

  scheduledThreadExecutorService.scheduleAtFixedRate(task, 0, 5,

  TimeUnit.SECONDS);

  }

  }

  ```


  如果你使用接受 `Callable<T>` 的 `ExecutorService` 子接口的 `submit()` 方法版本，那么 `submit()` 会返回
  `Callable` 中主 `call()` 方法返回的任何内容。以下是 `Callable` 的接口：


  ```

  package java.util.concurrent;

  public interface Callable {

  V call() throws Exception;

  }

  ```


  在 Java EE 领域，已经创建了解决这类问题的不同方法，因为 Java EE 在设计上限制了线程的处理。


  Quartz（一个作业调度框架）是最早填补这一线程功能空白的解决方案之一，它提供了调度和并发功能。JCA 1.5（或 J2EE 连接器架构）是另一个规范，它为集成功能提供了原始类型的网关，并支持临时并发。使用
  JCA，组件会收到关于传入消息的通知并并发响应。JCA 1.5 提供了一个原始的、有限的企业服务总线——类似于集成功能，但远没有像 SpringSource 的
  Spring Integration 框架那样的精巧。


  不过，应用服务器供应商并没有忽视对并发的需求。许多其他举措也走到了前台。例如，在 2003 年，IBM 和 BEA 共同创建了 Timer 和 WorkManager
  API，这些 API 最终成为 JSR-237，然后与 JSR-236 合并，专注于如何在托管环境中实现并发。服务数据对象 (SDO) 规范 JSR-235 也有类似的解决方案。此外，近年来也涌现了
  CommonJ API 的开源实现来实现相同的解决方案。


  问题在于，与 Java SE 解决方案的情况类似，没有一种可移植、标准、简单的方法来在托管环境中控制线程并为组件提供并发。


  Spring 通过 `org.springframeworks.core.task.TaskExecutor` 接口提供了一个统一的解决方案。`TaskExecutor`
  抽象扩展了 `java.util.concurrent.Executor`，后者是 Java 1.5 的一部分。


  事实上，`TaskExecutor` 接口在 Spring 框架内部被大量使用。例如，对于 Spring Quartz 集成（支持线程）和消息驱动的 POJO
  容器支持，广泛使用了 `TaskExecutor`。


  ```

  package org.springframework.core.task;

  import java.util.concurrent.Executor;

  public interface TaskExecutor extends Executor {

  void execute(Runnable task);

  }

  ```


  在某些方面，各种解决方案镜像了核心 JDK 选项提供的功能。在其他方面，它们非常独特，并提供了与其他框架（如 CommonJ WorkManager）的集成。这些集成通常采用类的形式，该类可以存在于目标框架中，但你可以像操作任何其他
  `TaskExecutor` 抽象一样操作它。


  尽管支持将现有的 Java SE `Executor` 或 `ExecutorService` 适配为 `TaskExecutor`，但这在 Spring 中并不那么重要，因为
  `TaskExecutor` 的基类本身就是一个 `Executor`。通过这种方式，Spring 中的 `TaskExecutor` 弥合了 Java EE
  和 Java SE 上各种解决方案之间的差距。


  接下来，让我们看一个 `TaskExecutor` 的简单示例，使用之前定义的同一个 `Runnable`。代码的客户端是一个简单的 Spring POJO，你已向其中注入了
  `TaskExecutor` 的各种实例，唯一目的是提交 `Runnable`。


  ```

  package com.apress.springrecipes.executors;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.context.ApplicationContext;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  import org.springframework.core.task.SimpleAsyncTaskExecutor;

  import org.springframework.core.task.SyncTaskExecutor;

  import org.springframework.core.task.support.TaskExecutorAdapter;

  import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;

  import org.springframework.stereotype.Component;

  import javax.annotation.PostConstruct;

  @Component

  public class SpringExecutorsDemo {

  @Autowired

  private SimpleAsyncTaskExecutor asyncTaskExecutor;

  @Autowired

  private SyncTaskExecutor syncTaskExecutor;

  @Autowired

  private TaskExecutorAdapter taskExecutorAdapter;

  @Autowired

  private ThreadPoolTaskExecutor threadPoolTaskExecutor;

  @Autowired

  private DemonstrationRunnable task;

  @PostConstruct

  public void submitJobs() {

  syncTaskExecutor.execute(task);

  taskExecutorAdapter.submit(task);

  asyncTaskExecutor.submit(task);

  for (int i = 0; i < 500; i++)

  threadPoolTaskExecutor.submit(task);

  }

  public static void main(String[] args) {

  new AnnotationConfigApplicationContext(ExecutorsConfiguration.class)

  .registerShutdownHook();

  }

  }

  ```


  应用程序上下文演示了这些不同 `TaskExecutor` 实现的创建。大多数都非常简单，你可以手动创建它们。只有一种情况，你委托给一个工厂 bean 来自动触发执行，如下所示：


  ```

  package com.apress.springrecipes.executors;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.core.task.SimpleAsyncTaskExecutor;

  import org.springframework.core.task.SyncTaskExecutor;

  import org.springframework.core.task.support.TaskExecutorAdapter;

  import org.springframework.scheduling.concurrent.ScheduledExecutorFactoryBean;

  import org.springframework.scheduling.concurrent.ScheduledExecutorTask;

  import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;

  import java.util.concurrent.Executors;

  @Configuration

  @ComponentScan

  public class ExecutorsConfiguration {

  @Bean

  public TaskExecutorAdapter taskExecutorAdapter() {

  return new TaskExecutorAdapter(Executors.newCachedThreadPool());

  }

  @Bean

  public SimpleAsyncTaskExecutor simpleAsyncTaskExecutor() {

  return new SimpleAsyncTaskExecutor();

  }

  @Bean

  public SyncTaskExecutor syncTaskExecutor() {

  return new SyncTaskExecutor();

  }

  @Bean

  public ScheduledExecutorFactoryBean scheduledExecutorFactoryBean(ScheduledExecutorTask
  scheduledExecutorTask) {

  ScheduledExecutorFactoryBean scheduledExecutorFactoryBean = new ScheduledExecutorFactoryBean();

  scheduledExecutorFactoryBean.setScheduledExecutorTasks(scheduledExecutorTask);

  return scheduledExecutorFactoryBean;

  }

  @Bean

  public ScheduledExecutorTask scheduledExecutorTask(Runnable runnable) {

  ScheduledExecutorTask scheduledExecutorTask = new ScheduledExecutorTask();

  scheduledExecutorTask.setPeriod(1000);

  scheduledExecutorTask.setRunnable(runnable);

  return scheduledExecutorTask;

  }

  @Bean

  public ThreadPoolTaskExecutor threadPoolTaskExecutor() {

  ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

  taskExecutor.setCorePoolSize(50);

  taskExecutor.setMaxPoolSize(100);

  taskExecutor.setAllowCoreThreadTimeOut(true);

  taskExecutor.setWaitForTasksToCompleteOnShutdown(true);

  return taskExecutor;

  }

  }

  ```


  前面的代码展示了 `TaskExecutor` 接口的不同实现。第一个 bean，即 `TaskExecutorAdapter` 实例，是 `java.util.concurrence.Executors`
  实例的一个简单包装器，因此你可以根据 Spring `TaskExecutor` 接口来处理它。你在这里使用 Spring 来配置一个 `Executor` 实例，并将其作为构造函数参数传入。


  `SimpleAsyncTaskExecutor` 为每个提交的作业提供一个新 `Thread`。它不进行线程池化或重用。每个提交的作业都在一个线程中异步运行。


  `SyncTaskExecutor` 是 `TaskExecutor` 实现中最简单的一个。作业的提交是同步的，相当于启动一个 `Thread`，运行它，然后立即使用
  `join()` 连接它。这实际上等同于在调用线程中手动调用 `run()` 方法，完全跳过了线程处理。


  `ScheduledExecutorFactoryBean` 自动触发定义为 `ScheduledExecutorTask` bean 的作业。你可以指定一个
  `ScheduledExecutorTask` 实例列表来同时触发多个作业。`ScheduledExecutorTask` 实例可以接受一个周期来间隔任务的执行。


  最后一个示例是 `ThreadPoolTaskExecutor`，它是一个基于 `java.util.concurrent.ThreadPoolExecutor`
  构建的完整线程池实现。


  如果你想使用 IBM WebSphere 等应用服务器中可用的 CommonJ `WorkManager`/`TimerManager` 支持来构建应用程序，你可以使用
  `org.springframework.scheduling.commonj.WorkManagerTaskExecutor`。此类委托给 WebSphere
  内部可用的 CommonJ Work Manager 的引用。通常，你会为其提供指向适当资源的 JNDI 引用。


  在 JEE 7 中，添加了 `javax.enterprise.concurrent` 包，特别是 `ManagedExecutorService`。符合 JEE
  7 的服务器必须提供此 `ManagedExecutorService` 的实例。如果你想将此机制与 Spring `TaskExecutor` 支持一起使用，你可以配置一个
  `DefaultManagedTaskExecutor`，它将尝试检测默认的 `ManagedExecutorService`（如规范所述），或者你可以显式配置它。


  `TaskExecutor` 支持提供了一种通过统一接口访问应用服务器上调度服务的强大方式。如果你正在寻找可以在任何应用服务器（例如 Tomcat 和 Jetty）上部署的更健壮（尽管重量级得多）的支持，你可以考虑
  Spring 的 Quartz 支持。




  ## 2-24\. 在 POJO 之间传递应用事件


  ### 问题


  在 POJO 之间的典型通信中，发送方必须定位接收方才能调用其方法。这种情况下，发送方 POJO 必须知晓接收方组件。这种通信方式直接且简单，但发送方和接收方
  POJO 之间是紧密耦合的。


  使用 IoC 容器时，POJO 可以通过接口而非实现进行通信。这种通信模型有助于降低耦合度。然而，只有当发送方组件需要与一个接收方通信时，这种方式才高效。当发送方需要与多个接收方通信时，它必须逐一调用这些接收方。


  ### 解决方案


  Spring 的应用上下文支持其 Bean 之间基于事件的通信。在基于事件的通信模型中，发送方 POJO 只需发布事件，无需知道接收方是谁，因为实际上可能存在多个接收方。同时，接收方也未必知道是谁在发布事件。它可以同时监听来自不同发送方的多个事件。通过这种方式，发送方和接收方组件实现了松散耦合。


  传统上，为了监听事件，Bean 必须实现 `ApplicationListener` 接口，并通过指定类型参数来声明其希望被通知的事件类型，例如 `ApplicationListener<CheckoutEvent>`。这类监听器只能监听继承自
  `ApplicationEvent` 的事件，因为这是 `ApplicationListener` 接口的类型签名。


  要发布事件，Bean 需要访问 `ApplicationEventPublisher`，并且发送事件时需要调用 `publishEvent` 方法。为了获取 `ApplicationEventPublisher`
  的访问权限，类可以实现 `ApplicationEventPublisherAware` 接口，或者在类型为 `ApplicationEventPublisher`
  的字段上使用 `@Autowired` 注解。


  ### 工作原理


  首先，你将编写一个自定义的 `ApplicationEvent`，然后发布它，最后编写一个组件来接收这些事件并做出响应。


  #### 使用 ApplicationEvent 定义事件


  启用基于事件通信的第一步是定义事件。假设你希望一个收银员 Bean 在购物车结账后发布一个 `CheckoutEvent`。该事件包含一个结账时间属性。


  ```

  package com.apress.springrecipes.shop;

  import org.springframework.context.ApplicationEvent;

  import java.util.Date;

  public class CheckoutEvent extends ApplicationEvent {

  private final ShoppingCart cart;

  private final Date time;

  public CheckoutEvent(ShoppingCart cart, Date time) {

  super(cart);

  this.cart=cart;

  this.time = time;

  }

  public ShoppingCart getCart() {

  return cart;

  }

  public Date getTime() {

  return this.time;

  }

  }

  ```


  #### 发布事件


  要发布事件，只需创建一个事件实例，并调用应用事件发布器的 `publishEvent()` 方法。通过实现 `ApplicationEventPublisherAware`
  接口可以获取该发布器的访问权限。


  ```

  package com.apress.springrecipes.shop;

  ...

  import org.springframework.context.ApplicationEventPublisher;

  import org.springframework.context.ApplicationEventPublisherAware;

  public class Cashier implements ApplicationEventPublisherAware {

  ...

  private ApplicationEventPublisher applicationEventPublisher;

  public void setApplicationEventPublisher(

  ApplicationEventPublisher applicationEventPublisher) {

  this.applicationEventPublisher = applicationEventPublisher;

  }

  public void checkout(ShoppingCart cart) throws IOException {

  ...

  CheckoutEvent event = new CheckoutEvent(this, new Date());

  applicationEventPublisher.publishEvent(event);

  }

  }

  ```


  或者，你也可以简单地在字段属性上使用自动装配。


  ```

  package com.apress.springrecipes.shop;

  ...

  import org.springframework.context.ApplicationEventPublisher;

  public class Cashier {

  ...

  @Autowired

  private ApplicationEventPublisher applicationEventPublisher;

  public void checkout(ShoppingCart cart) throws IOException {

  ...

  CheckoutEvent event = new CheckoutEvent(cart, new Date());

  applicationEventPublisher.publishEvent(event);

  }

  }

  ```


  #### 监听事件


  在应用上下文中定义的任何实现了 `ApplicationListener` 接口的 Bean，都会收到所有与类型参数匹配的事件通知（通过这种方式，你可以监听特定的事件组，例如
  `ApplicationContextEvent`）。


  ```

  package com.apress.springrecipes.shop;

  ...

  import org.springframework.context.ApplicationListener;

  @Component

  public class CheckoutListener implements ApplicationListener {

  public void onApplicationEvent(CheckoutEvent event) {

  // 对结账金额和时间执行任何你喜欢的操作

  System.out.println("Checkout event [" + event.getTime() + "]");

  }

  }

  ```


  较新版本的 Spring 还允许你使用 `@EventListener` 注解来创建事件监听器，而无需实现 `ApplicationListener` 接口。


  ```

  package com.apress.springrecipes.shop;

  ...

  @Component

  public class CheckoutListener {

  @EventListener

  public void onApplicationEvent(CheckoutEvent event) {

  // 对结账金额和时间执行任何你喜欢的操作

  System.out.println("Checkout event [" + event.getTime() + "]");

  }

  }

  ```


  接下来，你需要在应用上下文中注册监听器，以便监听所有事件。注册过程非常简单，只需声明该监听器的一个 Bean 实例，或者让组件扫描自动检测到它。应用上下文能够识别实现了
  `ApplicationListener` 接口的 Bean，以及那些方法上标注了 `@EventListener` 注解的 Bean，并在它们感兴趣的事件发生时通知它们。


  使用 `@EventListener` 还有一个很好的特性，即事件不再需要继承 `ApplicationEvent`。这样一来，你的事件就不再依赖于 Spring
  框架的类，而是再次成为普通的 POJO。


  ```

  package com.apress.springrecipes.shop;

  import java.util.Date;

  public class CheckoutEvent {

  private final ShoppingCart cart;

  private final Date time;

  public CheckoutEvent(ShoppingCart cart, Date time) {

  this.cart=cart;

  this.time = time;

  }

  public ShoppingCart getCart() {

  return cart;

  }

  public Date getTime() {

  return this.time;

  }

  }

  ```


  注意


  最后，请记住应用上下文本身也会发布容器事件，例如 `ContextClosedEvent`、`ContextRefreshedEvent` 和 `RequestHandledEvent`。如果任何
  Bean 希望收到这些事件的通知，它们可以实现 `ApplicationListener` 接口。




  ## 总结


  在本章中，你学习了 Spring 的核心任务。你了解了 Spring 如何支持 `@Configuration` 和 `@Bean` 注解，通过 Java 配置类来实例化
  POJO。你还学习了如何使用 `@Component` 注解来让 Spring 管理 POJO。此外，你还了解了 `@Repository`、`@Service`
  和 `@Controller` 注解，它们提供了比 `@Component` 注解更具体的行为。


  你还学习了如何从其他 POJO 中引用 POJO，以及如何使用 `@Autowired` 注解，该注解可以按类型或名称自动关联 POJO。此外，你还探讨了标准的
  `@Resource` 和 `@Inject` 注解如何通过自动装配来引用 POJO，而不是使用 Spring 特有的 `@Autowired` 注解。


  接着，你学习了如何使用 `@Scope` 注解设置 Spring POJO 的作用域。你还学习了 Spring 如何读取外部资源，并使用 `@PropertySource`
  和 `@Value` 注解将这些数据用于 POJO 的配置和创建。此外，你还了解了 Spring 如何通过 i18n 资源包在 POJO 中支持不同语言。


  接下来，你学习了如何使用 `@Bean` 注解的 `initmethod` 和 `destroyMethod` 属性，以及 `@PostConstruct` 和
  `@PreDestroy` 注解来自定义 POJO 的初始化和销毁。此外，你还学习了如何使用 `@PreDestroy` 注解进行懒初始化，以及使用 `@DependsOn`
  注解定义初始化依赖关系。


  然后，你学习了 Spring 的后置处理器来验证和修改 POJO 值，包括如何使用 `@Required` 注解。接着，你探索了如何使用 Spring 环境和
  Profile 来加载不同的 POJO 集合，包括如何使用 `@Profile` 注解。


  接下来，你在 Spring 的上下文中探索了面向切面编程，并学习了如何创建切面、切点和通知。这包括使用 `@Aspect` 注解，以及 `@Before`、`@After`、`@AfterReturning`、`@AfterThrowing`
  和 `@Around` 注解。


  接着，你学习了如何访问 AOP 连接点信息并将其应用于不同的程序执行点。然后你学习了如何使用 `@Order` 注解指定切面优先级，以及如何重用切点定义。


  在本章中，你还学习了如何编写 AspectJ 切点表达式，以及如何应用 AOP 引入的概念，使得一个 POJO 可以同时继承多个实现类的行为。你还学习了如何通过
  AOP 为 POJO 引入状态，以及如何应用加载时织入技术。


  最后，你学习了如何在 Spring 中配置 AspectJ 切面，如何将 POJO 注入到领域对象中，如何使用 Spring 和 `TaskExecutor`
  处理并发，以及最后但同样重要的是，如何在 Spring 中创建、发布和监听事件。


  '
- "# 3. Spring MVC\n\nMVC 是 Spring 框架最重要的模块之一。它构建在强大的 Spring IoC 容器之上，并广泛利用容器的特性来简化其配置。\n\
  \n模型-视图-控制器（MVC）是 UI 设计中一种常见的设计模式。它通过分离应用程序中模型、视图和控制器各自的角色，将业务逻辑与 UI 解耦。模型负责封装供视图展示的应用数据。视图应仅展示这些数据，而不包含任何业务逻辑。控制器负责接收来自用户的请求，并调用后端服务进行业务处理。处理完成后，后端服务可能会返回一些数据供视图展示。控制器收集这些数据并准备模型供视图展示。MVC\
  \ 模式的核心思想是将业务逻辑与 UI 分离，使它们能够独立变化而不相互影响。\n\n在 Spring MVC 应用程序中，模型通常由领域对象组成，这些对象由服务层处理并由持久层持久化。视图通常是使用\
  \ Java 标准标签库（JSTL）编写的 JSP 模板。然而，也可以将视图定义为 PDF 文件、Excel 文件、RESTful Web 服务，甚至是 Flex\
  \ 界面（后者通常被称为富互联网应用程序，RIA）。\n\n完成本章后，你将能够使用 Spring MVC 开发 Java Web 应用程序。你还将理解 Spring\
  \ MVC 常见的控制器和视图类型，包括自 Spring 3.0 发布以来，使用注解创建控制器已成为事实上的标准。此外，你将理解 Spring MVC 的基本原理，这将为后续章节中更高级的主题奠定基础。\n\
  \n## 3-1. 使用 Spring MVC 开发一个简单的 Web 应用程序\n\n### 问题\n\n你想使用 Spring MVC 开发一个简单的 Web\
  \ 应用程序，以学习该框架的基本概念和配置。\n\n\n### 解决方案\n\nSpring MVC 的核心组件是一个前端控制器。在最简单的 Spring MVC\
  \ 应用中，这个控制器是你需要在 Java Web 部署描述符（即 `web.xml` 文件或 `ServletContainerInitializer`）中配置的唯一\
  \ Servlet。Spring MVC 控制器——通常被称为**调度 Servlet**——实现了 Sun 公司核心 Java EE 设计模式之一，即**前端控制器**。它充当\
  \ Spring MVC 框架的前端控制器，每个 Web 请求都必须经过它，以便它能够管理整个请求处理过程。\n\n当一个 Web 请求被发送到 Spring\
  \ MVC 应用时，控制器首先接收该请求。然后，它组织在 Spring 的 Web 应用上下文中配置的不同组件或控制器本身存在的注解，这些都是处理请求所必需的。图\
  \ 3-1 展示了 Spring MVC 中请求处理的主要流程。\n\n![A314861_4_En_3_Fig1_HTML.gif](img/A314861_4_En_3_Fig1_HTML.gif)\n\
  \n图 3-1.\n\nSpring MVC 中请求处理的主要流程\n\n要在 Spring 中定义一个控制器类，一个类必须使用 `@Controller` 或\
  \ `@RestController` 注解进行标记。\n\n当一个带有 `@Controller` 注解的类（即控制器类）接收到请求时，它会寻找合适的处理方法（handler\
  \ method）来处理该请求。这要求控制器类通过一个或多个处理器映射（handler mappings）将每个请求映射到一个处理方法。为此，控制器类的方法需要使用\
  \ `@RequestMapping` 注解进行修饰，使其成为处理方法。\n\n这些处理方法的签名——正如你对任何标准类所期望的那样——是开放式的。你可以为处理方法指定任意名称，并定义各种方法参数。同样，处理方法可以根据其实现的应用程序逻辑返回一系列值中的任何一个（例如，`String`\
  \ 或 `void`）。随着本书的深入，你将遇到可以使用 `@RequestMapping` 注解在处理方法中使用的各种方法参数。以下仅是有效参数类型的部分列表，旨在让你有个概念。\n\
  \n*   `HttpServletRequest` 或 `HttpServleResponse`\n*   任意类型的请求参数，使用 `@RequestParam`\
  \ 注解\n*   任意类型的模型属性，使用 `@ModelAttribute` 注解\n*   传入请求中包含的 Cookie 值，使用 `@CookieValue`\
  \ 注解\n*   `Map` 或 `ModelMap`，供处理方法向模型添加属性\n*   `Errors` 或 `BindingResult`，供处理方法访问命令对象的绑定和验证结果\n\
  *   `SessionStatus`，供处理方法通知其会话处理完成\n\n一旦控制器类选择了合适的处理方法，它就会使用该请求调用处理方法的逻辑。通常，控制器的逻辑会调用后端服务来处理请求。此外，处理方法的逻辑可能会从众多输入参数（例如\
  \ `HttpServletRequest`、`Map`、`Errors` 或 `SessionStatus`）中添加或删除信息，这些参数将成为正在进行的 Spring\
  \ MVC 流程的一部分。\n\n在处理方法完成请求处理后，它将控制权委托给一个视图，该视图表示为处理方法的返回值。为了提供灵活的方法，处理方法的返回值并不代表视图的实现（例如\
  \ `user.jsp` 或 `report.pdf`），而是代表一个逻辑视图（例如 `user` 或 `report`）——注意缺少文件扩展名。\n\n处理方法的返回值可以是表示逻辑视图名称的\
  \ `String`，也可以是 `void`，在这种情况下，将根据处理方法或控制器的名称确定默认的逻辑视图名称。\n\n要将信息从控制器传递到视图，处理方法返回的是逻辑视图名称（`String`\
  \ 或 `void`）并不重要，因为处理方法的输入参数将对视图可用。例如，如果处理方法将 `Map` 和 `SessionStatus` 对象作为输入参数——在处理方法的逻辑中修改它们的内容——这些相同的对象将对处理方法返回的视图可访问。\n\
  \n当控制器类接收到视图时，它通过视图解析器（view resolver）将逻辑视图名称解析为特定的视图实现（例如 `user.jsp` 或 `report.pdf`）。视图解析器是在\
  \ Web 应用上下文中配置的一个 bean，它实现了 `ViewResolver` 接口。其职责是为逻辑视图名称返回特定的视图实现（HTML、JSP、PDF\
  \ 或其他）。\n\n一旦控制器类将视图名称解析为视图实现，根据视图实现的设计，它会渲染由控制器处理方法传递的对象（例如 `HttpServletRequest`、`Map`、`Errors`\
  \ 或 `SessionStatus`）。视图的职责是向用户显示在处理方法的逻辑中添加的对象。\n\n### 工作原理\n\n假设你要为某个体育中心开发一个场地预订系统。该应用的\
  \ UI 是基于 Web 的，以便用户可以通过互联网进行在线预订。你想使用 Spring MVC 开发此应用。首先，在 `domain` 子包中创建以下领域类：\n\
  \n```\npackage com.apress.springrecipes.court.domain;\npublic class Reservation\
