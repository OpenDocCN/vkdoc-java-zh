  }\n@Override\npublic List query(String courtName) {\nreturn this.reservations.stream()\n\
  .filter(reservation -> Objects.equals(reservation.getCourtName(), courtName))\n\
  .collect(Collectors.toList());\n}\n}\n```\n\n\n\n#### 搭建 Spring MVC 应用程序\n\n接下来，你需要创建一个\
  \ Spring MVC 应用程序布局。通常，使用 Spring MVC 开发的 Web 应用程序与标准 Java Web 应用程序的设置方式相同，只是需要额外添加一些\
  \ Spring MVC 特有的配置文件和必需的库。\n\nJava EE 规范定义了由 Web 归档文件（WAR 文件）构成的 Java Web 应用程序的有效目录结构。例如，你必须在\
  \ `WEB-INF` 根目录下提供 Web 部署描述符（即 `web.xml`），或者提供一个或多个实现 `ServletContainerInitializer`\
  \ 的类。此 Web 应用程序的类文件和 JAR 文件应分别放在 `WEB-INF/classes` 和 `WEB-INF/lib` 目录中。\n\n对于你的球场预订系统，你需要创建以下目录结构。请注意，高亮显示的文件是\
  \ Spring 特有的配置文件。\n\n注意\n\n要使用 Spring MVC 开发 Web 应用程序，你必须将所有常规的 Spring 依赖项（更多信息请参见第\
  \ 1 章）以及 Spring Web 和 Spring MVC 依赖项添加到你的 `CLASSPATH` 中。如果你使用 Maven，请将以下依赖项添加到你的\
  \ Maven 项目中：\n\n```\norg.springframework\nspring-webmvc\n${spring.version}\n\n```\n\
  \n如果你使用 Gradle，请添加以下内容：\n\n```\ndependencies {\ncompile \"org.springframework:spring-webmvc:$springVersion\"\
  \n}\n```\n\n`WEB-INF` 目录之外的文件可以通过 URL 直接供用户访问，因此 CSS 文件和图像文件必须放在那里。使用 Spring MVC\
  \ 时，JSP 文件充当模板。框架会读取它们以生成动态内容，因此 JSP 文件应放在 `WEB-INF` 目录内，以防止直接访问它们。但是，某些应用服务器不允许\
  \ Web 应用程序内部读取 `WEB-INF` 内的文件。在这种情况下，你只能将它们放在 `WEB-INF` 目录之外。\n\n#### 创建配置文件\n\n\
  Web 部署描述符（`web.xml` 或 `ServletContainerInitializer` 是 Java Web 应用程序的基本配置文件）。在此文件中，你为应用程序定义\
  \ Servlet，以及 Web 请求如何映射到它们。对于 Spring MVC 应用程序，你只需定义一个 `DispatcherServlet` 实例，它充当\
  \ Spring MVC 的前端控制器，尽管如果需要，你也可以定义多个。\n\n在大型应用程序中，使用多个 `DispatcherServlet` 实例可能很方便。这允许将\
  \ `DispatcherServlet` 实例指定给特定的 URL，从而使代码管理更容易，并让各个团队成员处理应用程序的逻辑而不会相互干扰。\n\n```\n\
  package com.apress.springrecipes.court.web;\nimport com.apress.springrecipes.court.config.CourtConfiguration;\n\
  import org.springframework.web.context.support.AnnotationConfigWebApplicationContext;\n\
  import org.springframework.web.servlet.DispatcherServlet;\nimport javax.servlet.ServletContainerInitializer;\n\
  import javax.servlet.ServletContext;\nimport javax.servlet.ServletException;\nimport\
  \ javax.servlet.ServletRegistration;\nimport java.util.Set;\npublic class CourtServletContainerInitializer\
  \ implements ServletContainerInitializer {\n@Override\npublic void onStartup(Set>\
  \ c, ServletContext ctx) throws ServletException {\nAnnotationConfigWebApplicationContext\
  \ applicationContext =            new AnnotationConfigWebApplicationContext();\n\
  applicationContext.register(CourtConfiguration.class);\nDispatcherServlet dispatcherServlet\
  \ = new DispatcherServlet(applicationContext);\nServletRegistration.Dynamic courtRegistration\
  \ =            ctx.addServlet(\"court\", dispatcherServlet);\ncourtRegistration.setLoadOnStartup(1);\n\
  courtRegistration.addMapping(\"/\");\n}\n}\n```\n\n在这个 `CourtServletContainerInitializer`\
  \ 中，你定义了一个类型为 `DispatcherServlet` 的 Servlet。这是 Spring MVC 中的核心 Servlet 类，它接收 Web\
  \ 请求并将其分派给适当的处理器。你将此 Servlet 的名称设置为 court，并使用斜杠 (/) 映射所有 URL，斜杠代表根目录。请注意，URL 模式可以设置为更细粒度的模式。在较大的应用程序中，将模式委托给不同的\
  \ Servlet 可能更有意义，但为简单起见，应用程序中的所有 URL 都委托给单个 court Servlet。\n\n为了让 `CourtServletContainerInitializer`\
  \ 被检测到，你还需要在 `META-INF/services` 目录中添加一个名为 `javax.servlet.ServletContainerInitializer`\
  \ 的文件。该文件的内容应为 `CourtServletContainerInitializer` 的全名。此文件由 Servlet 容器加载，并用于引导应用程序。\n\
  \n```\ncom.apress.springrecipes.court.web.CourtServletContainerInitializer\n```\n\
  \n最后，添加 `CourtConfiguration` 类，这是一个简单的 `@Configuration` 类。\n\n```\npackage com.apress.springrecipes.court.config;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\n@ComponentScan(\"com.apress.springrecipes.court\")\npublic class\
  \ CourtConfiguration {}\n```\n\n这定义了一个 `@ComponentScan` 注解，它将扫描 `com.apress.springrecipes.court`\
  \ 包（及其子包），并注册所有检测到的 Bean（在本例中，是 `ReservationServiceImpl` 和尚未创建的带有 `@Controller`\
  \ 注解的类）。\n\n\n\n#### 创建 Spring MVC 控制器\n\n基于注解的控制器类可以是任意类，无需实现特定接口或继承特定基类。你可以使用\
  \ `@Controller` 注解对其进行标注。一个控制器中可以定义一个或多个处理器方法来处理单个或多个操作。处理器方法的签名足够灵活，可以接受多种参数。\n\
  \n`@RequestMapping` 注解可以应用于类级别或方法级别。第一种映射策略是将特定的 URL 模式映射到控制器类，然后将特定的 HTTP 方法映射到每个处理器方法。\n\
  \n```\npackage com.apress.springrecipes.court.web;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RequestMethod;\nimport java.util.Date;\n\
  @Controller\n@RequestMapping(\"/welcome\")\npublic class WelcomeController {\n@RequestMapping(method\
  \ = RequestMethod.GET)\npublic String welcome(Model model) {\nDate today = new Date();\n\
  model.addAttribute(\"today\", today);\nreturn \"welcome\";\n}\n}\n```\n\n该控制器创建了一个\
  \ `java.util.Date` 对象来获取当前日期，然后将其作为属性添加到输入的 `Model` 对象中，以便目标视图能够显示它。\n\n由于你已经在 `com.apress.springrecipes.court`\
  \ 包上激活了注解扫描，因此在部署时会检测到该控制器类的注解。\n\n`@Controller` 注解将该类定义为 Spring MVC 控制器。`@RequestMapping`\
  \ 注解则更有趣，因为它包含属性，并且可以在类或处理器方法级别声明。该类中使用的第一个值 `(\"/welcome\")` 用于指定控制器可操作的 URL，这意味着任何发送到\
  \ `/welcome` URL 的请求都将由 `WelcomeController` 类处理。\n\n一旦控制器类处理了一个请求，它会将调用委托给控制器中声明的默认\
  \ HTTP GET 处理器方法。之所以如此，是因为每个对 URL 的初始请求都是 HTTP GET 类型。因此，当控制器处理 `/welcome` URL 上的请求时，它会随后委托给默认的\
  \ HTTP GET 处理器方法进行处理。\n\n注解 `@RequestMapping(method = RequestMethod.GET)` 用于将 welcome\
  \ 方法装饰为控制器的默认 HTTP GET 处理器方法。值得一提的是，如果没有声明默认的 HTTP GET 处理器方法，则会抛出 `ServletException`。因此，Spring\
  \ MVC 控制器至少需要有一个 URL 路由和一个默认的 HTTP GET 处理器方法，这一点很重要。\n\n这种方法的另一种变体是，在方法级别使用的 `@RequestMapping`\
  \ 注解中同时声明两个值——URL 路由和默认的 HTTP GET 处理器方法。如下所示：\n\n```\n@Controller\npublic class\
  \ WelcomeController {\n@RequestMapping(value = \"/welcome\", method=RequestMethod.GET)\n\
  public String welcome(Model model) { ... }\n}\n```\n\n此声明与之前的声明等效。`value` 属性指示处理器方法映射到的\
  \ URL，`method` 属性将该处理器方法定义为控制器的默认 HTTP GET 方法。最后，还有一些便捷的注解，例如 `@GetMapping`、`@PostMapping`\
  \ 等，以最小化配置。以下映射将执行与前面声明相同的操作：\n\n```\n@Controller\npublic class WelcomeController\
  \ {\n@GetMapping(\"/welcome\")\npublic String welcome(Model model) { ... }\n}\n\
  ```\n\n`@GetMapping` 注解使类更简短，或许也更容易阅读。\n\n最后一个控制器说明了 Spring MVC 的基本原理。然而，一个典型的控制器可能会调用后端服务进行业务处理。例如，你可以创建一个控制器来查询特定场地的预订信息，如下所示：\n\
  \n```\npackage com.apress.springrecipes.court.web;\nimport com.apress.springrecipes.court.domain.Reservation;\n\
  import com.apress.springrecipes.court.service.ReservationService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.RequestParam;\nimport java.util.List;\n\
  @Controller\n@RequestMapping(\"/reservationQuery\")\npublic class ReservationQueryController\
  \ {\nprivate final ReservationService reservationService;\npublic ReservationQueryController(ReservationService\
  \ reservationService) {\nthis.reservationService = reservationService;\n}\n@GetMapping\n\
  public void setupForm() {}\n@PostMapping\npublic String sumbitForm(@RequestParam(\"\
  courtName\") String courtName, Model model) {\nList reservations = java.util.Collections.emptyList();\n\
  if (courtName != null) {\nreservations = reservationService.query(courtName);\n\
  }\nmodel.addAttribute(\"reservations\", reservations);\nreturn \"reservationQuery\"\
  ;\n}\n}\n```\n\n如前所述，控制器随后会查找默认的 HTTP GET 处理器方法。由于公共 void `setupForm()` 方法为此目的分配了必要的\
  \ `@RequestMapping` 注解，因此接下来会调用它。\n\n与之前的默认 HTTP GET 处理器方法不同，请注意此方法没有输入参数，没有逻辑，并且返回值为\
  \ `void`。这意味着两件事。由于没有输入参数和逻辑，视图仅显示在实现模板（例如 JSP）中硬编码的数据，因为控制器没有添加任何数据。由于返回值为 `void`，将使用基于请求\
  \ URL 的默认视图名称；因此，由于请求 URL 是 `/reservationQuery`，因此假定返回一个名为 `reservationQuery` 的视图。\n\
  \n剩下的处理器方法使用 `@PostMapping` 注解进行装饰。乍一看，有两个处理器方法只有类级别的 `/reservationQuery` URL 声明可能会令人困惑，但实际上非常简单。一个方法在\
  \ HTTP GET 请求发送到 `/reservationQuery` URL 时被调用；另一个方法在 HTTP POST 请求发送到同一 URL 时被调用。\n\
  \nWeb 应用程序中的大多数请求都是 HTTP GET 类型，而 HTTP POST 类型的请求通常在用户提交 HTML 表单时发出。因此，进一步揭示应用程序的视图（我们稍后将描述），一个方法在\
  \ HTML 表单初始加载时（即 HTTP GET）被调用，而另一个方法在 HTML 表单提交时（即 HTTP POST）被调用。\n\n仔细查看 HTTP POST\
  \ 默认处理器方法，注意两个输入参数。首先注意 `@RequestParam(\"courtName\") String courtName` 声明，用于提取名为\
  \ `courtName` 的请求参数。在这种情况下，HTTP POST 请求以 `/reservationQuery?courtName=<value>` 的形式传入；此声明使得该值在方法中可通过变量名\
  \ `courtName` 使用。其次，注意 `Model` 声明，用于定义一个对象，以便将数据传递到返回的视图。\n\n处理器方法执行的逻辑包括使用控制器的\
  \ `reservationService`，利用 `courtName` 变量执行查询。从该查询获得的结果被分配给 `Model` 对象，该对象稍后将可供返回的视图进行显示。\n\
  \n最后，请注意该方法返回一个名为 `reservationQuery` 的视图。此方法也可以像默认的 HTTP GET 一样返回 `void`，并且由于请求\
  \ URL 的原因，会被分配到相同的 `reservationQuery` 默认视图。两种方法完全相同。\n\n现在你已经了解了 Spring MVC 控制器的构成方式，是时候探索控制器处理器方法将其结果委托给的视图了。\n\
  \n\n\n#### 创建 JSP 视图\n\nSpring MVC 支持多种视图类型，以适应不同的展示技术。这些视图包括 JSP、HTML、PDF、Excel\
  \ 工作表 (XLS)、XML、JSON、Atom 和 RSS 订阅源、JasperReports 以及其他第三方视图实现。\n\n在 Spring MVC 应用程序中，视图最常使用\
  \ JSTL 编写的 JSP 模板。当应用程序 `web.xml` 文件中定义的 `DispatcherServlet` 接收到从处理器返回的视图名称时，它会将逻辑视图名称解析为用于渲染的视图实现。例如，你可以在\
  \ Web 应用程序上下文的 `CourtConfiguration` 中配置 `InternalResourceViewResolver` Bean，以将视图名称解析为\
  \ `/WEB-INF/jsp/` 目录下的 JSP 文件。\n\n```\n@Bean\npublic InternalResourceViewResolver\
  \ internalResourceViewResolver() {\nInternalResourceViewResolver viewResolver =\
  \ new InternalResourceViewResolver();\nviewResolver.setPrefix(\"/WEB-INF/jsp/\"\
  );\nviewResolver.setSuffix(\".jsp\");\nreturn viewResolver;\n}\n```\n\n通过使用上述配置，名为\
  \ `reservationQuery` 的逻辑视图将被委托给位于 `/WEB-INF/jsp/reservationQuery.jsp` 的视图实现。了解这一点后，你可以为欢迎控制器创建以下\
  \ JSP 模板，将其命名为 `welcome.jsp` 并放置在 `/WEB-INF/jsp/` 目录下：\n\n```\n\nWelcome\n\nWelcome\
  \ to Court Reservation System\nToday is .\n\n```\n\n在此 JSP 模板中，你使用了 JSTL 中的 `fmt`\
  \ 标签库，将 `today` 模型属性格式化为 `yyyy-MM-dd` 模式。别忘了在此 JSP 模板顶部包含 `fmt` 标签库的定义。\n\n接下来，你可以为预约查询控制器创建另一个\
  \ JSP 模板，并将其命名为 `reservationQuery.jsp` 以匹配视图名称。\n\n```\n\nReservation Query\n\n\
  Court Name\n\nCourt Name\nDate\nHour\nPlayer\n\n${reservation.courtName}\n\n${reservation.hour}\n\
  ${reservation.player.name}\n\n```\n\n在此 JSP 模板中，你包含了一个供用户输入要查询的球场名称的表单，然后使用 `<c:forEach>`\
  \ 标签循环遍历预约的模型属性以生成结果表格。\n\n#### 部署 Web 应用程序\n\n在 Web 应用程序的开发过程中，我们强烈建议安装一个带有 Web\
  \ 容器的本地 Java EE 应用服务器，用于测试和调试。为了方便配置和部署，我们选择 Apache Tomcat 8.5.x 作为 Web 容器。\n\n\
  此 Web 容器的部署目录位于 `webapps` 目录下。默认情况下，Tomcat 监听 8080 端口，并将应用程序部署到与应用程序 WAR 文件同名的上下文中。因此，如果你将应用程序打包为名为\
  \ `court.war` 的 WAR 文件，则可以通过以下 URL 访问欢迎控制器和预约查询控制器：\n\n```\nhttp://localhost:8080/court/welcome\n\
  http://localhost:8080/court/reservationQuery\n```\n\n提示\n\n该项目也可以创建一个包含应用程序的 Docker\
  \ 容器。运行 `../gradlew buildDocker` 即可获得一个包含 Tomcat 和应用程序的容器。然后，你可以启动一个 Docker 容器来测试应用程序（`docker\
  \ run -p 8080:8080 spring-recipes-4th/court-web`）。\n\n#### 使用 WebApplicationInitializer\
  \ 引导应用程序\n\n在上一节中，你创建了一个 `CourtServletContainerInitializer` 以及一个位于 `META-INF/services`\
  \ 中的文件来引导应用程序。\n\n现在，你将不再实现自己的初始化器，而是利用 Spring 提供的便捷实现 `SpringServletContainerInitializer`。该类是\
  \ `ServletContainerInitializer` 接口的实现，并扫描类路径以查找 `WebApplicationInitializer` 接口的实现。幸运的是，Spring\
  \ 提供了该接口的一些便捷实现，你可以将其用于应用程序；其中之一是 `AbstractAnnotationConfigDispatcherServletInitializer`。\n\
  \n```\npackage com.apress.springrecipes.court.web;\nimport com.apress.springrecipes.court.config.CourtConfiguration;\n\
  import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;\n\
  public class CourtWebApplicationInitializer extends AbstractAnnotationConfigDispatcherServletInitializer\
  \ {\n@Override\nprotected Class[] getRootConfigClasses() {\nreturn null;\n}\n@Override\n\
  protected Class[] getServletConfigClasses() {\nreturn new Class[] {CourtConfiguration.class};\n\
  }\n@Override\nprotected String[] getServletMappings() {\nreturn new String[] { \"\
  /\"};\n}\n}\n```\n\n新引入的 `CourtWebApplicationInitializer` 已经创建了一个 `DispatcherServlet`，因此你唯一需要做的就是在\
  \ `getServletMappings` 方法中配置映射，并在 `getServletConfigClasses` 中配置要加载的配置类。除了 Servlet\
  \ 之外，还会可选地创建另一个组件，即 `ContextLoaderListener`。这是一个 `ServletContextListener`，它也会创建一个\
  \ `ApplicationContext`，该上下文将用作 `DispatcherServlet` 的父 `ApplicationContext`。如果你有多个\
  \ Servlet 需要访问相同的 Bean（服务、数据源等），这将非常方便。\n\n## 3-2. 使用 @RequestMapping 映射请求\n\n###\
  \ 问题\n\n当 `DispatcherServlet` 接收到 Web 请求时，它会尝试将请求分派给已使用 `@Controller` 注解声明的各种控制器类。分派过程取决于控制器类及其处理方法中声明的各种\
  \ `@RequestMapping` 注解。你希望使用 `@RequestMapping` 注解定义一种映射请求的策略。\n\n### 解决方案\n\n在 Spring\
  \ MVC 应用程序中，Web 请求通过控制器类中声明的一个或多个 `@RequestMapping` 注解映射到处理器。\n\n处理器映射根据 URL 相对于上下文路径（即\
  \ Web 应用程序上下文的部署路径）和 Servlet 路径（即映射到 `DispatcherServlet` 的路径）的路径来匹配 URL。因此，例如，在\
  \ URL `http://localhost:8080/court/welcome` 中，要匹配的路径是 `/welcome`，因为上下文路径是 `/court`，并且没有\
  \ Servlet 路径——回想一下在 `CourtWebApplicationInitializer` 中声明的 Servlet 路径为 `/`。\n\n###\
  \ 工作原理\n\n首先，你将看到应用于方法级别的请求映射，接着你将探索类级别的请求映射，以及它与方法级别请求映射的结合使用。最后，你将看到如何将 HTTP 方法用于请求映射方法。\n\
  \n\n\n#### 按方法映射请求\n\n使用 `@RequestMapping` 注解最简单的策略是直接修饰处理方法。要使此策略生效，你必须为每个处理方法声明包含\
  \ URL 模式的 `@RequestMapping` 注解。如果处理方法的 `@RequestMapping` 注解与请求的 URL 匹配，`DispatcherServlet`\
  \ 就会将该请求分派给此处理方法进行处理。\n\n```\npackage com.apress.springrecipes.court.web;\nimport\
  \ com.apress.springrecipes.court.domain.Member;\nimport com.apress.springrecipes.court.service.MemberService;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.RequestParam;\n@Controller\npublic\
  \ class MemberController {\nprivate MemberService memberService;\npublic MemberController(MemberService\
  \ memberService) {\nthis.memberService = memberService;\n}\n@RequestMapping(\"/member/add\"\
  )\npublic String addMember(Model model) {\nmodel.addAttribute(\"member\", new Member());\n\
  model.addAttribute(\"guests\", memberService.list());\nreturn \"memberList\";\n\
  }\n@RequestMapping(value = {\"/member/remove\", \"/member/delete\"}, method = RequestMethod.GET)\n\
  public String removeMember(@RequestParam(\"memberName\")String memberName) {\nmemberService.remove(memberName);\n\
  return \"redirect:\";\n}\n}\n```\n\n这段代码展示了如何使用 `@RequestMapping` 注解将每个处理方法映射到特定的\
  \ URL。第二个处理方法演示了如何分配多个 URL，因此 `/member/remove` 和 `/member/delete` 都会触发该处理方法的执行。默认情况下，所有发往这些\
  \ URL 的传入请求都被假定为 HTTP GET 类型。\n\n#### 按类映射请求\n\n`@RequestMapping` 注解也可以用于修饰控制器类。这允许处理方法要么放弃使用\
  \ `@RequestMapping` 注解（如配方 4-1 中的 `ReservationQueryController` 控制器所示），要么使用自己的 `@RequestMapping`\
  \ 注解来匹配更细粒度的 URL。为了实现更广泛的 URL 匹配，`@RequestMapping` 注解还支持使用通配符（即 `*`）。\n\n以下代码说明了如何在\
  \ `@RequestMapping` 注解中使用 URL 通配符，以及如何在处理方法的 `@RequestMapping` 注解上进行更细粒度的 URL 匹配：\n\
  \n```\npackage com.apress.springrecipes.court.web;\nimport com.apress.springrecipes.court.domain.Member;\n\
  import com.apress.springrecipes.court.service.MemberService;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RequestMethod;\n\
  import org.springframework.web.bind.annotation.RequestParam;\n@Controller\n@RequestMapping(\"\
  /member/*\")\npublic class MemberController {\nprivate final MemberService memberService;\n\
  public MemberController(MemberService memberService) {\nthis.memberService = memberService;\n\
  }\n@RequestMapping(\"add\")\npublic String addMember(Model model) {\nmodel.addAttribute(\"\
  member\", new Member());\nmodel.addAttribute(\"guests\", memberService.list());\n\
  return \"memberList\";\n}\n@RequestMapping(value={\"remove\",\"delete\"}, method=RequestMethod.GET)\n\
  public String removeMember(@RequestParam(\"memberName\") String memberName) {\n\
  memberService.remove(memberName);\nreturn \"redirect:\";\n}\n@RequestMapping(\"\
  display/{member}\")\npublic String displayMember(@PathVariable(\"member\") String\
  \ member, Model model) {\nmodel.addAttribute(\"member\", memberService.find(member).orElse(null));\n\
  return \"member\";\n}\n@RequestMapping\npublic void memberList() {}\npublic void\
  \ memberLogic(String memberName) {}\n}\n```\n\n注意，类级别的 `@RequestMapping` 注解使用了 URL\
  \ 通配符：`/member/*`。这会将所有发往 `/member/` URL 下的请求委托给该控制器的处理方法。\n\n前两个处理方法使用了 `@RequestMapping`\
  \ 注解。当对 `/member/add` URL 发起 HTTP GET 请求时，会调用 `addMember()` 方法；而当对 `/member/remove`\
  \ 或 `/member/delete` URL 发起 HTTP GET 请求时，则会调用 `removeMember()` 方法。\n\n第三个处理方法使用了特殊的标记\
  \ `{path_variable}` 来指定其 `@RequestMapping` 的值。通过这种方式，URL 中的值可以作为输入传递给处理方法。注意，该处理方法声明了\
  \ `@PathVariable(\"user\") String user`。这样一来，如果收到形如 `member/display/jdoe` 的请求，处理方法就能访问到值为\
  \ `jdoe` 的 `member` 变量。这主要是一种便利机制，可以避免你直接操作处理方法的请求对象，并且在设计 RESTful Web 服务时尤其有用。\n\
  \n第四个处理方法也使用了 `@RequestMapping` 注解，但这次它没有指定 URL 值。由于类级别使用了 `/member/*` URL 通配符，该处理方法会作为“兜底”方法执行。因此，任何\
  \ URL 请求（例如 `/member/abcdefg` 或 `/member/randomroute`）都会触发此方法。注意其返回值为 `void`，这会使处理方法默认使用与其名称同名的视图（即\
  \ `memberList`）。\n\n最后一个方法——`memberLogic`——没有任何 `@RequestMapping` 注解，这意味着该方法只是该类的一个工具方法，对\
  \ Spring MVC 没有影响。\n\n\n\n#### 按 HTTP 请求类型映射请求\n\n默认情况下，`@RequestMapping` 注解会处理所有类型的传入请求。然而，在大多数情况下，你并不希望同一个方法同时处理\
  \ GET 请求和 POST 请求。为了区分 HTTP 请求，需要在 `@RequestMapping` 注解中明确指定请求类型，如下所示：\n\n```\n\
  @RequestMapping(value= \"processUser\", method =  RequestMethod.POST)\npublic String\
  \ submitForm(@ModelAttribute(\"member\") Member member, BindingResult result, Model\
  \ model) {\n}\n```\n\n你需要为处理器方法指定 HTTP 类型的程度，取决于控制器如何与什么进行交互。大多数情况下，Web 浏览器主要通过\
  \ HTTP GET 和 HTTP POST 请求执行操作。然而，其他设备或应用程序（例如 RESTful Web 服务）可能需要支持其他 HTTP 请求类型。总共有九种不同的\
  \ HTTP 请求类型：HEAD、GET、POST、PUT、DELETE、PATCH、TRACE、OPTIONS 和 CONNECT。不过，支持处理所有这些请求类型超出了\
  \ MVC 控制器的范围，因为 Web 服务器以及请求方都需要支持这些 HTTP 请求类型。考虑到绝大多数 HTTP 请求都是 GET 或 POST 类型，你几乎不需要实现对这些额外\
  \ HTTP 请求类型的支持。\n\n对于最常用的请求方法，Spring MVC 提供了专门的注解，如表 3-1 所示。\n\n表 3-1.\n\n请求方法与注解的映射\n\
  \n| 请求方法 | 注解 |\n| --- | --- |\n| POST | `@PostMapping` |\n| GET | `@GetMapping`\
  \ |\n| DELETE | `@DeleteMapping` |\n| PUT | `@PutMapping` |\n\n这些便捷注解都是专门的 `@RequestMapping`\
  \ 注解，使得编写请求处理方法更加简洁。\n\n```\n@PostMapping(\"processUser\")\npublic String submitForm(@ModelAttribute(\"\
  member\") Member member, BindingResult result, Model model) {\n}\n```\n\n你可能已经注意到，在\
  \ `@RequestMapping` 注解中指定的所有 URL 里，都没有出现像 `.html` 或 `.jsp` 这样的文件扩展名。尽管这种做法并未被广泛采用，但它是符合\
  \ MVC 设计原则的良好实践。\n\n控制器不应与任何表明视图技术（如 HTML 或 JSP）的扩展名绑定。这就是为什么控制器返回逻辑视图，并且匹配的 URL\
  \ 在声明时不应包含扩展名。\n\n在应用程序以不同格式（如 XML、JSON、PDF 或 XLS（Excel））提供相同内容已很常见的时代，应该由视图解析器来检查请求中提供的扩展名（如果有的话），并决定使用哪种视图技术。\n\
  \n在这段简短的介绍中，你已经看到了如何在 MVC 配置类中配置解析器，将逻辑视图映射到 JSP 文件，全程无需使用像 `.jsp` 这样的 URL 文件扩展名。\n\
  \n在后续的章节中，你将学习 Spring MVC 如何利用这种无扩展名的 URL 方法，通过不同的视图技术提供内容。\n\n## 3-3. 使用处理器拦截器拦截请求\n\
  \n### 问题\n\n由 Servlet API 定义的 Servlet 过滤器可以在请求被 Servlet 处理前后，对每个 Web 请求进行预处理和后处理。你希望在\
  \ Spring 的 Web 应用上下文中配置具有类似过滤器功能的东西，以便利用容器的特性。\n\n此外，有时你可能希望对由 Spring MVC 处理器处理的\
  \ Web 请求进行预处理和后处理，并在这些处理器返回的模型属性传递给视图之前对其进行操作。\n\n### 解决方案\n\nSpring MVC 允许你通过处理器拦截器拦截\
  \ Web 请求，进行预处理和后处理。处理器拦截器在 Spring 的 Web 应用上下文中配置，因此它们可以利用任何容器特性，并引用容器中声明的任何 Bean。可以为特定的\
  \ URL 映射注册处理器拦截器，这样它只会拦截映射到特定 URL 的请求。\n\n每个处理器拦截器必须实现 `HandlerInterceptor` 接口，该接口包含三个需要你实现的回调方法：`preHandle()`、`postHandle()`\
  \ 和 `afterCompletion()`。第一个和第二个方法分别在请求被处理器处理之前和之后调用。第二个方法还允许你访问返回的 `ModelAndView`\
  \ 对象，从而可以操作其中的模型属性。最后一个方法在所有请求处理完成之后（即视图渲染之后）调用。\n\n\n\n### 工作原理\n\n假设你要测量每个请求处理器处理\
  \ Web 请求的时间，并允许视图向用户显示这个时间。为此，你可以创建一个自定义的处理器拦截器。\n\n```\npackage com.apress.springrecipes.court.web;\n\
  ...\nimport org.springframework.web.servlet.HandlerInterceptor;\nimport org.springframework.web.servlet.ModelAndView;\n\
  public class MeasurementInterceptor implements HandlerInterceptor {\npublic boolean\
  \ preHandle(HttpServletRequest request,\nHttpServletResponse response, Object handler)\
  \ throws Exception {\nlong startTime = System.currentTimeMillis();\nrequest.setAttribute(\"\
  startTime\", startTime);\nreturn true;\n}\npublic void postHandle(HttpServletRequest\
  \ request,\nHttpServletResponse response, Object handler,\nModelAndView modelAndView)\
  \ throws Exception {\nlong startTime = (Long) request.getAttribute(\"startTime\"\
  );\nrequest.removeAttribute(\"startTime\");\nlong endTime = System.currentTimeMillis();\n\
  modelAndView.addObject(\"handlingTime\", endTime - startTime);\n}\npublic void afterCompletion(HttpServletRequest\
  \ request,\nHttpServletResponse response, Object handler, Exception ex)\nthrows\
  \ Exception {\n}\n}\n```\n\n在这个拦截器的 `preHandle()` 方法中，你记录开始时间并将其保存到请求属性中。此方法应返回\
  \ `true`，以允许 `DispatcherServlet` 继续处理请求。否则，`DispatcherServlet` 会认为此方法已处理完请求，从而直接将响应返回给用户。然后，在\
  \ `postHandle()` 方法中，你从请求属性中加载开始时间，并与当前时间进行比较。你可以计算出总耗时，然后将这个时间添加到模型中，以便传递给视图。最后，由于\
  \ `afterCompletion()` 方法无需执行任何操作，你可以将其方法体留空。\n\n当实现一个接口时，即使你不需要所有方法，也必须实现它们。更好的做法是扩展拦截器适配器类。该类默认实现了所有拦截器方法。你只需重写你需要的方法即可。\n\
  \n```\npackage com.apress.springrecipes.court.web;\n...\nimport org.springframework.web.servlet.ModelAndView;\n\
  import org.springframework.web.servlet.handler.HandlerInterceptorAdapter;\npublic\
  \ class MeasurementInterceptor extends HandlerInterceptorAdapter {\npublic boolean\
  \ preHandle(HttpServletRequest request,\nHttpServletResponse response, Object handler)\
  \ throws Exception {\n...\n}\npublic void postHandle(HttpServletRequest request,\n\
  HttpServletResponse response, Object handler,\nModelAndView modelAndView) throws\
  \ Exception {\n...\n}\n}\n```\n\n要注册一个拦截器，你需要修改第一个配方中创建的 `CourtConfiguration`。你需要让它实现\
  \ `WebMvcConfigurer` 并重写 `addInterceptors` 方法。该方法让你能够访问 `InterceptorRegistry`，你可以用它来添加拦截器。修改后的类如下所示：\n\
  \n```\n@Configuration\npublic class InterceptorConfiguration implements WebMvcConfigurer\
  \ {\n@Override\npublic void addInterceptors(InterceptorRegistry registry) {\nregistry.addInterceptor(measurementInterceptor());\n\
  }\n@Bean\npublic MeasurementInterceptor measurementInterceptor() {\nreturn new MeasurementInterceptor();\n\
  }\n...\n}\n```\n\n现在，你可以在 `welcome.jsp` 中显示这个时间，以验证此拦截器的功能。由于 `WelcomeController`\
  \ 没有太多操作，你可能会看到处理时间为 0 毫秒。如果是这种情况，你可以在此类中添加一个 sleep 语句，以便看到更长的处理时间。\n\n```\n\nWelcome\n\
  \n...\n\nHandling time : ${handlingTime} ms\n\n```\n\n默认情况下，`HandlerInterceptor`\
  \ 适用于所有 `@Controller`；但有时你希望区分拦截器应用于哪些控制器。命名空间和基于 Java 的配置允许将拦截器映射到特定的 URL。这只是一个配置问题。以下是此功能的\
  \ Java 配置：\n\n```\npackage com.apress.springrecipes.court.config;\nimport com.apress.springrecipes.court.web.ExtensionInterceptor;\n\
  import com.apress.springrecipes.court.web.MeasurementInterceptor;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.InterceptorRegistry;\n\
  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;\n@Configuration\n\
  public class InterceptorConfiguration implements WebMvcConfigurer {\n@Override\n\
  public void addInterceptors(InterceptorRegistry registry) {\nregistry.addInterceptor(measurementInterceptor());\n\
  registry.addInterceptor(summaryReportInterceptor()).addPathPatterns(\"/reservationSummary*\"\
  );\n}\n@Bean\npublic MeasurementInterceptor measurementInterceptor() {\nreturn new\
  \ MeasurementInterceptor();\n}\n@Bean\npublic ExtensionInterceptor summaryReportInterceptor()\
  \ {\nreturn new ExtensionInterceptor();\n}\n}\n```\n\n首先，添加了拦截器 bean `summaryReportInterceptor`。此\
  \ bean 的后备类结构与 `measurementInterceptor` 相同（即它实现了 `HandlerInterceptor` 接口）。但是，此拦截器执行的逻辑应仅限于映射到\
  \ `/reservationSummary` URI 的特定控制器。在注册拦截器时，你可以指定它映射到哪些 URL；默认情况下，这采用 Ant 风格的表达式。你将此模式传递给\
  \ `addPathPatterns` 方法；还有一个 `excludePathPatterns` 方法，你可以用它来排除某些 URL 的拦截器。\n\n##\
  \ 3-4. 解析用户区域设置\n\n### 问题\n\n为了使你的 Web 应用程序支持国际化，你必须识别每个用户的首选区域设置，并根据此区域设置显示内容。\n\
  \n### 解决方案\n\n在 Spring MVC 应用程序中，用户的区域设置由区域设置解析器识别，该解析器必须实现 `LocaleResolver` 接口。Spring\
  \ MVC 提供了几个 `LocaleResolver` 实现，供你根据不同的标准解析区域设置。或者，你也可以通过实现此接口来创建自己的自定义区域设置解析器。\n\
  \n你可以通过在 Web 应用程序上下文中注册一个类型为 `LocaleResolver` 的 bean 来定义区域设置解析器。你必须将区域设置解析器的 bean\
  \ 名称设置为 `localeResolver`，以便 `DispatcherServlet` 自动检测。请注意，每个 `DispatcherServlet`\
  \ 只能注册一个区域设置解析器。\n\n### 工作原理\n\n你将探索 Spring MVC 中可用的不同 `LocaleResolver`，以及如何使用拦截器更改用户的区域设置。\n\
  \n#### 通过 HTTP 请求头解析区域设置\n\nSpring 使用的默认区域设置解析器是 `AcceptHeaderLocaleResolver`。它通过检查\
  \ HTTP 请求的 `accept-language` 头来解析区域设置。此头由用户的 Web 浏览器根据底层操作系统的区域设置进行设置。请注意，此区域设置解析器无法更改用户的区域设置，因为它无法修改用户操作系统的区域设置。\n\
  \n#### 通过会话属性解析区域设置\n\n另一种解析区域设置的方法是使用 `SessionLocaleResolver`。它通过检查用户会话中的预定义属性来解析区域设置。如果会话属性不存在，此区域设置解析器将从\
  \ `accept-language` HTTP 头中确定默认区域设置。\n\n```\n@Bean\npublic LocaleResolver localeResolver\
  \ () {\nSessionLocaleResolver localeResolver = new SessionLocaleResolver();\nlocaleResolver.setDefaultLocale(new\
  \ Locale(\"en\"));\nreturn localeResolver;\n}\n```\n\n如果会话属性不存在，你可以为此解析器设置 `defaultLocale`\
  \ 属性。请注意，此区域设置解析器能够通过更改存储区域设置的会话属性来更改用户的区域设置。\n\n\n\n#### 通过 Cookie 解析区域设置\n\n你也可以使用\
  \ `CookieLocaleResolver`，通过检查用户浏览器中的 cookie 来解析区域设置。如果 cookie 不存在，此区域设置解析器会根据 `accept-language`\
  \ HTTP 标头确定默认区域设置。\n\n```\n@Bean\npublic LocaleResolver localeResolver() {\nreturn\
  \ new CookieLocaleResolver();\n}\n```\n\n此区域设置解析器使用的 cookie 可以通过设置 `cookieName`\
  \ 和 `cookieMaxAge` 属性进行自定义。`cookieMaxAge` 属性表示此 cookie 应持久保存的秒数。值为 -1 表示此 cookie\
  \ 将在浏览器关闭后失效。\n\n```\n@Bean\npublic LocaleResolver localeResolver() {\nCookieLocaleResolver\
  \ cookieLocaleResolver = new CookieLocaleResolver();\ncookieLocaleResolver.setCookieName(\"\
  language\");\ncookieLocaleResolver.setCookieMaxAge(3600);\ncookieLocaleResolver.setDefaultLocale(new\
  \ Locale(\"en\"));\nreturn cookieLocaleResolver;\n}\n```\n\n如果用户浏览器中不存在 cookie，你也可以为此解析器设置\
  \ `defaultLocale` 属性。此区域设置解析器能够通过修改存储区域设置的 cookie 来更改用户的区域设置。\n\n### 更改用户区域设置\n\n\
  除了通过显式调用 `LocaleResolver.setLocale()` 来更改用户区域设置外，你还可以将 `LocaleChangeInterceptor`\
  \ 应用于你的处理器映射。此拦截器会检测当前 HTTP 请求中是否存在一个特殊参数。参数名称可以通过此拦截器的 `paramName` 属性进行自定义。如果当前请求中存在此类参数，此拦截器会根据参数值更改用户的区域设置。\n\
  \n```\npackage com.apress.springrecipes.court.web.config;\nimport org.springframework.web.servlet.i18n.CookieLocaleResolver;\n\
  import org.springframework.web.servlet.i18n.LocaleChangeInterceptor;\nimport org.springframework.web.servlet.view.InternalResourceViewResolver;\n\
  import java.util.Locale;\n// 其他导入已省略\n@Configuration\npublic class I18NConfiguration\
  \ implements WebMvcConfigurer {\n@Override\npublic void addInterceptors(InterceptorRegistry\
  \ registry) {\nregistry.addInterceptor(measurementInterceptor());\nregistry.addInterceptor(localeChangeInterceptor());\n\
  registry.addInterceptor(summaryReportInterceptor()).addPathPatterns(\"/reservationSummary*\"\
  );\n}\n@Bean\npublic LocaleChangeInterceptor localeChangeInterceptor() {\nLocaleChangeInterceptor\
  \ localeChangeInterceptor = new LocaleChangeInterceptor();\nlocaleChangeInterceptor.setParamName(\"\
  language\");\nreturn localeChangeInterceptor;\n}\n@Bean\npublic CookieLocaleResolver\
  \ localeResolver() {\nCookieLocaleResolver cookieLocaleResolver = new CookieLocaleResolver();\n\
  cookieLocaleResolver.setCookieName(\"language\");\ncookieLocaleResolver.setCookieMaxAge(3600);\n\
  cookieLocaleResolver.setDefaultLocale(new Locale(\"en\"));\nreturn cookieLocaleResolver;\n\
  }\n...\n}\n```\n\n现在，任何带有 `language` 参数的 URL 都可以更改用户的区域设置。例如，以下两个 URL 分别将用户的区域设置更改为美国英语和德语：\n\
  \n```\nhttp://localhost:8080/court/welcome?language=en_US\nhttp://localhost:8080/court/welcome?language=de\n\
  ```\n\n然后，你可以在 `welcome.jsp` 中显示 HTTP 响应对象的区域设置，以验证区域设置拦截器的配置。\n\n```\n\nWelcome\n\
  \n...\n\nLocale : ${pageContext.response.locale}\n\n```\n\n## 3-5\\. 外部化区域敏感文本消息\n\
  \n### 问题\n\n在开发国际化 Web 应用程序时，你必须以用户偏好的区域设置来显示网页。你不想为不同的区域设置创建同一页面的不同版本。\n\n### 解决方案\n\
  \n为了避免为不同区域设置创建页面的不同版本，你应该通过外部化区域敏感的文本消息来使你的网页独立于区域设置。Spring 能够通过使用消息源为你解析文本消息，该消息源必须实现\
  \ `MessageSource` 接口。然后，你的 JSP 文件可以使用 Spring 标签库中定义的 `<spring:message>` 标签，根据给定的代码解析消息。\n\
  \n### 工作原理\n\n你可以通过在 Web 应用程序上下文中注册一个类型为 `MessageSource` 的 bean 来定义消息源。你必须将消息源的\
  \ bean 名称设置为 `messageSource`，以便 `DispatcherServlet` 自动检测。请注意，每个 `DispatcherServlet`\
  \ 只能注册一个消息源。`ResourceBundleMessageSource` 实现会针对不同的区域设置，从不同的资源包中解析消息。例如，你可以在 `WebConfiguration`\
  \ 中注册它，以加载基础名称为 `messages` 的资源包。\n\n```\n@Bean\npublic MessageSource messageSource()\
  \ {\nResourceBundleMessageSource messageSource = new ResourceBundleMessageSource();\n\
  messageSource.setBasename(\"messages\");\nreturn messageSource;\n}\n```\n\n然后，你创建两个资源包\
  \ `messages.properties` 和 `messages_de.properties`，分别存储默认区域设置和德语区域设置的消息。这些资源包应放在类路径的根目录下。\n\
  \n```\nwelcome.title=Welcome\nwelcome.message=Welcome to Court Reservation System\n\
  welcome.title=Willkommen\nwelcome.message=Willkommen zum Spielplatz-Reservierungssystem\n\
  ```\n\n现在，在诸如 `welcome.jsp` 的 JSP 文件中，你可以使用 `<spring:message>` 标签根据给定的代码解析消息。此标签会根据用户的当前区域设置自动解析消息。请注意，此标签定义在\
  \ Spring 的标签库中，因此你必须在 JSP 文件的顶部声明它。\n\n```\n\n...\n\n```\n\n在 `<spring:message>`\
  \ 中，你可以指定当无法解析给定代码的消息时要输出的默认文本。\n\n## 3-6\\. 按名称解析视图\n\n### 问题\n\n处理器完成请求处理后，会返回一个逻辑视图名称，此时\
  \ `DispatcherServlet` 必须将控制权委托给视图模板，以便渲染信息。你希望为 `DispatcherServlet` 定义一个策略，使其能够根据逻辑名称解析视图。\n\
  \n### 解决方案\n\n在 Spring MVC 应用程序中，视图由在 Web 应用程序上下文中声明的一个或多个视图解析器 bean 解析。这些 bean\
  \ 必须实现 `ViewResolver` 接口，以便 `DispatcherServlet` 自动检测它们。Spring MVC 提供了几种 `ViewResolver`\
  \ 实现，供你使用不同的策略来解析视图。\n\n### 工作原理\n\n你将探索不同的视图解析策略，从使用前缀和后缀生成实际名称的命名模板开始，到根据来自 XML\
  \ 文件或 ResourceBundle 的名称解析视图。最后，你将学习如何同时使用多个 ViewResolver。\n\n\n\n#### 基于模板名称和位置解析视图\n\
  \n解析视图的基本策略是将其直接映射到模板的名称和位置。视图解析器 `InternalResourceViewResolver` 通过 `prefix` 和 `suffix`\
  \ 声明，将每个视图名称映射到应用程序的目录。要注册 `InternalResourceViewResolver`，你可以在 Web 应用程序上下文中声明一个此类型的\
  \ Bean。\n\n```\n@Bean\npublic InternalResourceViewResolver viewResolver() {\nInternalResourceViewResolver\
  \ viewResolver = new InternalResourceViewResolver();\nviewResolver.setPrefix(\"\
  /WEB-INF/jsp/\");\nviewResolver.setSuffix(\".jsp\");\nreturn viewResolver;\n}\n\
  ```\n\n例如，`InternalResourceViewResolver` 会按以下方式解析视图名称 `welcome` 和 `reservationQuery`：\n\
  \n```\nwelcome --> /WEB-INF/jsp/welcome.jsp\nreservationQuery --> /WEB-INF/jsp/reservationQuery.jsp\n\
  ```\n\n解析后的视图类型可以通过 `viewClass` 属性指定。默认情况下，如果类路径中存在 JSTL 库（即 `jstl.jar`），`InternalResourceViewResolver`\
  \ 会将视图名称解析为 `JstlView` 类型的视图对象。因此，如果你的视图是包含 JSTL 标签的 JSP 模板，则可以省略 `viewClass` 属性。\n\
  \n`InternalResourceViewResolver` 很简单，但它只能解析可通过 Servlet API 的 `RequestDispatcher`（例如，内部\
  \ JSP 文件或 Servlet）转发的内部资源视图。对于 Spring MVC 支持的其他视图类型，你必须使用其他策略来解析它们。\n\n#### 从 XML\
  \ 配置文件解析视图\n\n另一种解析视图的策略是将视图声明为 Spring Bean，并通过其 Bean 名称进行解析。你可以在与 Web 应用程序上下文相同的配置文件中声明视图\
  \ Bean，但最好将它们隔离在单独的配置文件中。默认情况下，`XmlViewResolver` 从 `/WEB-INF/views.xml` 加载视图 Bean，但此位置可以通过\
  \ `location` 属性进行覆盖。\n\n```\nConfiguration\npublic class ViewResolverConfiguration\
  \ implements WebMvcConfigurer, ResourceLoaderAware {\nprivate ResourceLoader resourceLoader;\n\
  @Bean\npublic ViewResolver viewResolver() {\nXmlViewResolver viewResolver = new\
  \ XmlViewResolver();\nviewResolver.setLocation(resourceLoader.getResource(\"/WEB-INF/court-views.nl\"\
  ));\nreturn viewResolver;\n}\n@Override\npublic void setResourceLoader(ResourceLoader\
  \ resourceLoader) {\nthis.resourceLoader=resourceLoader;\n}\n}\n```\n\n请注意，在实现 `ResourceLoaderAware`\
  \ 接口时，你需要加载资源，因为 `location` 属性接受 `Resource` 类型的参数。在 Spring XML 文件中，从 `String` 到\
  \ `Resource` 的转换会自动为你处理；然而，当使用基于 Java 的配置时，你必须做一些额外的工作。在 `court-views.xml` 配置文件中，你可以通过设置类名和属性，将每个视图声明为普通的\
  \ Spring Bean。通过这种方式，你可以声明任何类型的视图（例如，`RedirectView` 甚至自定义视图类型）。\n\n#### 从资源包解析视图\n\
  \n除了 XML 配置文件，你还可以在资源包中声明视图 Bean。`ResourceBundleViewResolver` 从类路径根目录的资源包中加载视图 Bean。请注意，`ResourceBundleViewResolver`\
  \ 还可以利用资源包的功能，为不同的区域设置从不同的资源包加载视图 Bean。\n\n```\n@Bean\npublic ResourceBundleViewResolver\
  \ viewResolver() {\nResourceBundleViewResolver viewResolver = new ResourceBundleViewResolver();\n\
  viewResolver.setBasename(\"court-views\");\nreturn viewResolver;\n}\n```\n\n当你将\
  \ `court-views` 指定为 `ResourceBundleViewResolver` 的基本名称时，资源包就是 `court-views.properties`。在此资源包中，你可以以属性的格式声明视图\
  \ Bean。这种声明方式等同于 XML Bean 声明。\n\n```\nwelcome.(class)=org.springframework.web.servlet.view.JstlView\
  \ welcome.url=/WEB-INF/jsp/welcome.jsp reservationQuery.(class)=org.springframework.web.servlet.view.JstlView\
  \ reservationQuery.url=/WEB-INF/jsp/reservationQuery.jsp welcomeRedirect.(class)=org.springframework.web.servlet.view.RedirectView\
  \ welcomeRedirect.url=welcome\n```\n\n#### 使用多个解析器解析视图\n\n如果你的 Web 应用程序中有大量视图，仅选择一种视图解析策略通常是不够的。通常，`InternalResourceViewResolver`\
  \ 可以解析大多数内部 JSP 视图，但通常还有其他类型的视图必须由 `ResourceBundleViewResolver` 解析。在这种情况下，你必须结合两种策略来进行视图解析。\n\
  \n```\n@Bean\npublic ResourceBundleViewResolver viewResolver() {\nResourceBundleViewResolver\
  \ viewResolver = new ResourceBundleViewResolver();\nviewResolver.setOrder(0);\n\
  viewResolver.setBasename(\"court-views\");\nreturn viewResolver;\n}\n@Bean\npublic\
  \ InternalResourceViewResolver internalResourceViewResolver() {\nInternalResourceViewResolver\
  \ viewResolver = new InternalResourceViewResolver();\nviewResolver.setOrder(1);\n\
  viewResolver.setPrefix(\"/WEB-INF/jsp/\");\nviewResolver.setSuffix(\".jsp\");\n\
  return viewResolver;\n}\n```\n\n当同时选择多个策略时，指定解析优先级非常重要。为此，你可以设置视图解析器 Bean 的 `order`\
  \ 属性。order 值越低，优先级越高。请注意，你应该将最低优先级分配给 `InternalResourceViewResolver`，因为它无论视图是否存在都会进行解析。因此，如果其他解析器的优先级较低，它们将没有机会解析视图。现在，资源包\
  \ `court-views.properties` 应该只包含那些无法由 `InternalResourceViewResolver` 解析的视图（例如，重定向视图）。\n\
  \n```\nwelcomeRedirect.(class)=org.springframework.web.servlet.view.RedirectView\
  \ welcomeRedirect.url=welcome\n```\n\n#### 使用重定向前缀\n\n如果你在 Web 应用程序上下文中配置了 `InternalResourceViewResolver`，它可以通过在视图名称中使用\
  \ `redirect:` 前缀来解析重定向视图。然后，视图名称的其余部分将被视为重定向 URL。例如，视图名称 `redirect:welcome` 会触发对相对\
  \ URL `welcome` 的重定向。你也可以在视图名称中指定一个绝对 URL。\n\n## 3-7. 使用视图与内容协商\n\n### 问题\n\n你在控制器中依赖无扩展名的\
  \ URL——例如 `welcome` 而不是 `welcome.html` 或 `welcome.pdf`。你希望设计一种策略，以便为所有请求返回正确的内容和类型。\n\
  \n### 解决方案\n\n当收到对 Web 应用程序的请求时，该请求包含一系列属性，这些属性允许处理框架（此处为 Spring MVC）确定要返回给请求方的正确内容和类型。主要的两个属性包括请求中提供的\
  \ URL 扩展名和 HTTP Accept 头。例如，如果对形如 `/reservationSummary.xml` 的 URL 发出请求，控制器能够检查扩展名并将其委托给代表\
  \ XML 视图的逻辑视图。然而，也可能出现对形如 `/reservationSummary` 的 URL 发出请求的情况。这个请求应该被委托给 XML 视图还是\
  \ HTML 视图？或者可能是其他类型的视图？通过 URL 无法判断。但是，与其为这类请求决定一个默认视图，不如检查请求的 HTTP Accept 头，以决定哪种类型的视图更合适。\n\
  \n在控制器中检查 HTTP Accept 头可能是一个繁琐的过程。因此，Spring MVC 通过 `ContentNegotiatingViewResolver`\
  \ 支持对头的检查，允许根据 URL 文件扩展名或 HTTP Accept 头值来进行视图委托。\n\n\n\n### 工作原理\n\n关于 Spring MVC\
  \ 内容协商，你首先需要了解的是，它被配置为一个解析器，就像配方 3-6 中展示的那些一样。Spring MVC 的内容协商解析器基于 `ContentNegotiatingViewResolver`\
  \ 类。但在描述其工作原理之前，我们将先说明如何配置它并将其与其他解析器集成。\n\n```\n@Configuration\npublic class ViewResolverConfiguration\
  \ implements WebMvcConfigurer {\n@Autowired\nprivate ContentNegotiationManager contentNegotiationManager;\n\
  @Override\npublic void configureContentNegotiation(ContentNegotiationConfigurer\
  \ configurer) {\nMap mediatypes = new HashMap();\nmediatypes.put(\"html\", MediaType.TEXT_HTML);\n\
  mediatypes.put(\"pdf\", MediaType.valueOf(\"application/pdf\"));\nmediatypes.put(\"\
  xls\", MediaType.valueOf(\"application/vnd.ms-excel\"));\nmediatypes.put(\"xml\"\
  , MediaType.APPLICATION_XML);\nmediatypes.put(\"json\", MediaType.APPLICATION_JSON);\n\
  configurer.mediaTypes(mediatypes);\n}\n@Bean\npublic ContentNegotiatingViewResolver\
  \ contentNegotiatingViewResolver() {\nContentNegotiatingViewResolver viewResolver\
  \ = new ContentNegotiatingViewResolver();\nviewResolver.setContentNegotiationManager(contentNegotiationManager);\n\
  return viewResolver;\n}\n}\n```\n\n首先，你需要配置内容协商。默认配置会添加一个 `ContentNegotiationManager`，你可以通过实现\
  \ `configureContentNegotiation` 方法来配置它。要访问已配置的 `ContentNegotiationManager`，你只需在你的配置类中自动注入它即可。\n\
  \n现在将注意力转回到 `ContentNegotiatingViewResolver` 解析器上。此配置将该解析器设置为在所有解析器中拥有最高优先级，这是使内容协商解析器正常工作所必需的。该解析器拥有最高优先级的原因在于，它本身并不解析视图，而是将解析工作委托给其他视图解析器（它会自动检测这些解析器）。由于一个不解析视图的解析器可能会让人困惑，我们将通过一个例子来详细说明。\n\
  \n假设一个控制器接收到对 `/reservationSummary.xml` 的请求。一旦处理方法完成，它会将控制权交给一个名为 `reservation`\
  \ 的逻辑视图。此时，Spring MVC 的解析器开始发挥作用，其中第一个就是 `ContentNegotiatingViewResolver` 解析器，因为它拥有最高优先级。\n\
  \n`ContentNegotiatingViewResolver` 解析器首先根据以下标准确定请求的媒体类型：它会根据 `ContentNegotiatingManager`\
  \ Bean 配置中 `mediaTypes` 映射指定的默认媒体类型（例如 `text/html`），检查请求路径的扩展名（例如 `.html`、`.xml`\
  \ 或 `.pdf`）。如果请求路径有扩展名，但在默认的 `mediaTypes` 部分中找不到匹配项，则会尝试使用属于 Java 激活框架的 `FileTypeMap`\
  \ 来确定扩展名的媒体类型。如果请求路径中没有扩展名，则使用请求的 HTTP Accept 头。对于对 `/reservationSummary.xml` 发出的请求，媒体类型在步骤\
  \ 1 中被确定为 `application/xml`。然而，对于像 `/reservationSummary` 这样的 URL 发出的请求，媒体类型要到步骤\
  \ 3 才能确定。\n\nHTTP Accept 头包含诸如 `Accept: text/html` 或 `Accept: application/pdf` 之类的值。这些值有助于解析器在请求\
  \ URL 中没有扩展名的情况下，确定请求方期望的媒体类型。\n\n此时，`ContentNegotiatingViewResolver` 解析器拥有一个媒体类型和一个名为\
  \ `reservation` 的逻辑视图。基于此信息，它会根据剩余解析器的顺序对其进行迭代，以确定哪个视图能根据检测到的媒体类型最佳匹配该逻辑名称。\n\n\
  这个过程允许你拥有多个同名的逻辑视图，每个视图支持不同的媒体类型（例如 HTML、PDF 或 XLS），并由 `ContentNegotiatingViewResolver`\
  \ 解析出最佳匹配项。在这种情况下，控制器的设计会进一步简化，因为不再需要硬编码创建特定媒体类型所需的逻辑视图（例如 `pdfReservation`、`xlsReservation`\
  \ 或 `htmlReservation`），而只需使用一个单一的视图（例如 `reservation`），让 `ContentNegotiatingViewResolver`\
  \ 解析器来决定最佳匹配。\n\n此过程可能产生的一系列结果如下：\n\n*   媒体类型被确定为 `application/pdf`。如果优先级最高（order\
  \ 值较小）的解析器包含一个映射到名为 `reservation` 的逻辑视图，但该视图不支持 `application/pdf` 类型，则不会匹配——查找过程会继续到剩余的解析器。\n\
  *   媒体类型被确定为 `application/pdf`。匹配到优先级最高（order 值较小）且包含映射到名为 `reservation` 的逻辑视图并支持\
  \ `application/pdf` 的解析器。\n*   媒体类型被确定为 `text/html`。有四个解析器拥有名为 `reservation` 的逻辑视图，但映射到两个优先级最高解析器的视图不支持\
  \ `text/html`。最终匹配到的是剩余的那个包含名为 `reservation` 的视图映射且支持 `text/html` 的解析器。\n\n这种视图搜索过程会自动在应用程序中配置的所有解析器上进行。如果你不想依赖在\
  \ `ContentNegotiatingViewResolver` 解析器外部进行的配置，也可以在 `ContentNegotiatingViewResolver`\
  \ Bean 内部配置默认视图和解析器。\n\n配方 3-11 将展示一个依赖 `ContentNegotiatingViewResolver` 解析器来确定应用程序视图的控制器。\n\
  \n## 3-8. 将异常映射到视图\n\n### 问题\n\n当发生未知异常时，你的应用服务器通常会向用户显示令人不快的异常堆栈跟踪。你的用户与此堆栈跟踪无关，并抱怨你的应用程序不够用户友好。此外，这也是一种潜在的安全风险，因为你可能会向用户暴露内部方法调用层次结构。然而，可以配置\
  \ Web 应用程序的 `web.xml`，以便在发生 HTTP 错误或类异常时显示友好的 JSP 页面。Spring MVC 支持一种更健壮的方法来管理类异常的视图。\n\
  \n### 解决方案\n\n在 Spring MVC 应用程序中，你可以在 Web 应用程序上下文中注册一个或多个异常解析器 Bean 来解决未捕获的异常。这些\
  \ Bean 必须实现 `HandlerExceptionResolver` 接口，以便 `DispatcherServlet` 自动检测到它们。Spring\
  \ MVC 自带了一个简单的异常解析器，供你将每个异常类别映射到一个视图。\n\n\n\n### 工作原理\n\n假设您的预订服务因无法预订而抛出以下异常：\n\
  \n```\npackage com.apress.springrecipes.court.service;\n...\npublic class ReservationNotAvailableException\
  \ extends RuntimeException {\nprivate String courtName;\nprivate Date date;\nprivate\
  \ int hour;\n// 构造方法与 Getter 方法\n...\n}\n```\n\n要处理未捕获的异常，您可以通过实现 `HandlerExceptionResolver`\
  \ 接口来编写自定义异常解析器。通常，您需要将不同类别的异常映射到不同的错误页面。Spring MVC 提供了异常解析器 `SimpleMappingExceptionResolver`，方便您在\
  \ Web 应用上下文中配置异常映射。例如，您可以在配置中注册以下异常解析器：\n\n```\n@Override\npublic void configureHandlerExceptionResolvers(List\
  \ exceptionResolvers) {\nexceptionResolvers.add(handlerExceptionResolver());\n}\n\
  @Bean\npublic HandlerExceptionResolver handlerExceptionResolver() {\nProperties\
  \ exceptionMapping = new Properties();\nexceptionMapping.setProperty(\nReservationNotAvailableException.class.getName(),\
  \ \"reservationNotAvailable\");\nSimpleMappingExceptionResolver exceptionResolver\
  \ = new SimpleMappingExceptionResolver();\nexceptionResolver.setExceptionMappings(exceptionMapping);\n\
  exceptionResolver.setDefaultErrorView(\"error\");\nreturn exceptionResolver;\n}\n\
  ```\n\n在此异常解析器中，您为 `ReservationNotAvailableException` 定义了逻辑视图名称 `reservationNotAvailable`。您可以使用\
  \ `exceptionMappings` 属性添加任意数量的异常类，一直向下到更通用的异常类 `java.lang.Exception`。通过这种方式，根据异常类的类型，用户将看到与异常对应的视图。\n\
  \n属性 `defaultErrorView` 用于定义一个名为 `error` 的默认视图，当抛出的异常类未在 `exceptionMapping` 元素中映射时，将使用该视图。\n\
  \n处理相应的视图时，如果在您的 Web 应用上下文中配置了 `InternalResourceViewResolver`，那么当预订不可用时，将显示以下 `reservationNotAvailable.jsp`\
  \ 页面：\n\n```\n\nReservation Not Available\n\nYour reservation for ${exception.courtName}\
  \ is not available on  at ${exception.hour}:00.\n\n```\n\n在错误页面中，可以通过变量 `${exception}`\
  \ 访问异常实例，因此您可以向用户显示有关此异常的更多详细信息。\n\n为任何未知异常定义一个默认错误页面是一个好习惯。您可以使用属性 `defaultErrorView`\
  \ 定义一个默认视图，或者将页面映射到键 `java.lang.Exception` 作为映射的最后一项，这样如果之前没有匹配到其他条目，就会显示该页面。然后，您可以按如下方式创建此视图的\
  \ JSP 文件——`error.jsp`：\n\n```\n\nError\n\nAn error has occurred. Please contact\
  \ our administrator for details.\n\n```\n\n#### 使用 @ExceptionHandler 映射异常\n\n除了配置\
  \ `HandlerExceptionResolver`，您还可以使用 `@ExceptionHandler` 注解方法。其工作方式与 `@RequestMapping`\
  \ 注解类似。\n\n```\n@Controller\n@RequestMapping(\"/reservationForm\")\n@SessionAttributes(\"\
  reservation\")\npublic class ReservationFormController {\n@ExceptionHandler(ReservationNotAvailableException.class)\n\
  public String handle(ReservationNotAvailableException ex) {\nreturn \"reservationNotAvailable\"\
  ;\n}\n@ExceptionHandler\npublic String handleDefault(Exception e) {\nreturn \"error\"\
  ;\n}\n...\n}\n```\n\n这里有两个使用 `@ExceptionHandler` 注解的方法。第一个用于处理特定的 `ReservationNotAvailableException`；第二个是通用的（捕获所有）异常处理方法。您也不再需要在\
  \ `WebConfiguration` 中指定 `HandlerExceptionResolver`。\n\n使用 `@ExceptionHandler` 注解的方法可以有多种返回类型（类似于\
  \ `@RequestMapping` 方法）；这里您只返回需要渲染的视图名称，但您也可以返回 `ModelAndView`、`View` 等。\n\n尽管使用\
  \ `@ExceptionHandler` 注解的方法非常强大且灵活，但当您将它们放在控制器中时，存在一个缺点。这些方法仅对它们所在的控制器有效，因此如果异常发生在另一个控制器中（例如\
  \ `WelcomeController`），这些方法将不会被调用。通用的异常处理方法必须移到单独的类中，并且该类需要使用 `@ControllerAdvice`\
  \ 进行注解。\n\n```\n@ControllerAdvice\npublic class ExceptionHandlingAdvice {\n@ExceptionHandler(ReservationNotAvailableException.class)\n\
  public String handle(ReservationNotAvailableException ex) {\nreturn \"reservationNotAvailable\"\
  ;\n}\n@ExceptionHandler\npublic String handleDefault(Exception e) {\nreturn \"error\"\
  ;\n}\n}\n```\n\n此类将应用于应用上下文中的所有控制器，这就是它被称为 `@ControllerAdvice` 的原因。\n\n## 3-9. 使用控制器处理表单\n\
  \n### 问题\n\n在 Web 应用程序中，您经常需要处理表单。表单控制器必须向用户显示表单，同时处理表单提交。表单处理可能是一项复杂且多变的任务。\n\n\
  ### 解决方案\n\n当用户与表单交互时，需要控制器支持两个操作。首先，当表单被初始请求时，它会要求控制器通过 HTTP GET 请求显示表单，从而向用户呈现表单视图。然后，当表单提交时，会发出\
  \ HTTP POST 请求来处理表单中数据的验证和业务处理等事项。如果表单处理成功，则向用户呈现成功视图。否则，会再次呈现表单视图并附带错误信息。\n\n###\
  \ 工作原理\n\n假设您希望允许用户通过填写表单来进行球场预订。为了让您更好地了解控制器处理的数据，我们将首先介绍控制器的视图（即表单）。\n\n\n\n####\
  \ 创建表单视图\n\n让我们创建表单视图 `reservationForm.jsp`。该表单依赖于 Spring 的表单标签库，因为它简化了表单的数据绑定、错误消息的显示，以及在出现错误时重新显示用户输入的原始值。\n\
  \n```jsp\n<%@ taglib prefix=\"form\" uri=\"http://www.springframework.org/tags/form\"\
  %>\n<html>\n<head>\n    <title>预约表单</title>\n    <style>\n        .error {\n   \
  \         color: #ff0000;\n            font-weight: bold;\n        }\n    </style>\n\
  </head>\n<body>\n    <form:form method=\"post\" modelAttribute=\"reservation\">\n\
  \        <table>\n            <tr>\n                <td>场地名称</td>\n            \
  \    <td><form:input path=\"courtName\" /></td>\n                <td><form:errors\
  \ path=\"courtName\" cssClass=\"error\" /></td>\n            </tr>\n           \
  \ <tr>\n                <td>日期</td>\n                <td><form:input path=\"date\"\
  \ /></td>\n                <td><form:errors path=\"date\" cssClass=\"error\" /></td>\n\
  \            </tr>\n            <tr>\n                <td>小时</td>\n            \
  \    <td><form:input path=\"hour\" /></td>\n                <td><form:errors path=\"\
  hour\" cssClass=\"error\" /></td>\n            </tr>\n            <tr>\n       \
  \         <td colspan=\"3\"><input type=\"submit\" value=\"提交预约\" /></td>\n    \
  \        </tr>\n        </table>\n    </form:form>\n</body>\n</html>\n```\n\nSpring\
  \ 的 `<form:form>` 声明了两个属性。`method=\"post\"` 属性表示表单在提交时执行 HTTP POST 请求。`modelAttribute=\"\
  reservation\"` 属性表示表单数据绑定到名为 `reservation` 的模型。第一个属性你应该很熟悉，因为它用于大多数 HTML 表单。第二个属性在我们描述处理该表单的控制器时会变得更加清晰。\n\
  \n请记住，`<form:form>` 标签在发送给用户之前会被渲染成标准 HTML，因此 `modelAttribute=\"reservation\"` 并非对浏览器有用；该属性被用作生成实际\
  \ HTML 表单的一种工具。\n\n接下来，你可以找到 `<form:errors>` 标签，用于定义在表单不符合控制器设定的规则时放置错误信息的位置。属性\
  \ `path=\"*\"` 用于指示显示所有错误——鉴于通配符 *——而属性 `cssClass=\"error\"` 用于指示用于显示错误的 CSS 格式化类。\n\
  \n接下来，你可以找到表单的各种 `<form:input>` 标签，并伴随另一组相应的 `<form:errors>` 标签。这些标签使用属性 `path`\
  \ 来指示表单的字段，在本例中为 `courtName`、`date` 和 `hour`。\n\n`<form:input>` 标签通过使用 `path` 属性绑定到与\
  \ `modelAttribute` 对应的属性。它们向用户显示字段的原始值，该值要么是绑定的属性值，要么是由于绑定错误而被拒绝的值。它们必须用在 `<form:form>`\
  \ 标签内部，该标签通过名称定义了一个绑定到 `modelAttribute` 的表单。\n\n最后，你可以找到标准 HTML 标签 `<input type=\"\
  submit\" />`，它生成一个提交按钮并触发向服务器发送数据，随后是关闭表单的 `</form:form>` 标签。如果表单及其数据被正确处理，你需要创建一个成功视图来通知用户预约成功。下面展示的\
  \ `reservationSuccess.jsp` 就用于此目的：\n\n```jsp\n<%@ taglib prefix=\"form\" uri=\"\
  http://www.springframework.org/tags/form\"%>\n<html>\n<head>\n    <title>预约成功</title>\n\
  </head>\n<body>\n    您的预约已成功创建。\n</body>\n</html>\n```\n\n由于表单中提交了无效值，也可能发生错误。例如，如果日期格式无效，或者\
  \ `hour` 字段输入了字母字符，控制器会设计为拒绝这些字段值。然后控制器会为每个错误生成一系列选择性错误代码，返回给表单视图，这些值会被放置在 `<form:errors>`\
  \ 标签内。\n\n例如，对于 `date` 字段输入的无效值，控制器会生成以下错误代码：\n\n```\ntypeMismatch.command.date\n\
  typeMismatch.date\ntypeMismatch.java.time.LocalDate\ntypeMismatch\n```\n\n如果你定义了\
  \ `ResourceBundleMessageSource`，你可以在资源包中为相应的区域设置（例如，默认区域设置的 `messages.properties`）包含以下错误消息：\n\
  \n```\ntypeMismatch.date=无效的日期格式\ntypeMismatch.hour=无效的小时格式\n```\n\n如果在处理表单数据时发生失败，相应的错误代码及其值会返回给用户。\n\
  \n现在你已经了解了与表单相关的视图结构，以及表单处理的数据，让我们来看看处理表单中提交数据（即预约）的逻辑。\n\n#### 创建表单的服务处理\n\n这不是控制器，而是控制器用来处理表单数据预约的服务。首先在\
  \ `ReservationService` 接口中定义一个 `make()` 方法。\n\n```java\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic interface ReservationService {\n...\nvoid make(Reservation reservation)\n\
  throws ReservationNotAvailableException;\n}\n```\n\n然后，你通过向存储预约的列表中添加一个 `Reservation`\
  \ 项来实现这个 `make()` 方法。如果出现重复预约，则抛出 `ReservationNotAvailableException`。\n\n```java\n\
  package com.apress.springrecipes.court.service;\n...\npublic class ReservationServiceImpl\
  \ implements ReservationService {\n...\n@Override\npublic void make(Reservation\
  \ reservation) throws ReservationNotAvailableException {\nlong cnt = reservations.stream()\n\
  .filter(made -> Objects.equals(made.getCourtName(), reservation.getCourtName()))\n\
  .filter(made -> Objects.equals(made.getDate(), reservation.getDate()))\n.filter(made\
  \ -> made.getHour() == reservation.getHour())\n.count();\nif (cnt > 0) {\nthrow\
  \ new ReservationNotAvailableException(reservation\n.getCourtName(), reservation.getDate(),\
  \ reservation\n.getHour());\n} else {\nreservations.add(reservation);\n}\n}\n}\n\
  ```\n\n现在你已经更好地理解了与控制器交互的两个元素——表单视图和预约服务类——让我们创建一个控制器来处理场地预约表单。\n\n\n\n#### 创建表单控制器\n\
  \n用于处理表单的控制器，其使用的注解与之前示例中用到的基本相同。因此，我们直接来看代码。\n\n```\npackage com.apress.springrecipes.court.web;\n\
  ...\n@Controller\n@RequestMapping(\"/reservationForm\")\n@SessionAttributes(\"reservation\"\
  )\npublic class ReservationFormController {\nprivate final ReservationService reservationService;\n\
  @Autowired\npublic ReservationFormController(ReservationService reservationService)\
  \ {\nthis.reservationService = reservationService;\n}\n@RequestMapping(method =\
  \ RequestMethod.GET)\npublic String setupForm(Model model) {\nReservation reservation\
  \ = new Reservation();\nmodel.addAttribute(\"reservation\", reservation);\nreturn\
  \ \"reservationForm\";\n}\n@RequestMapping(method = RequestMethod.POST)\npublic\
  \ String submitForm(\n@ModelAttribute(\"reservation\") Reservation reservation,\n\
  BindingResult result, SessionStatus status) {\nreservationService.make(reservation);\n\
  return \"redirect:reservationSuccess\";\n}\n}\n```\n\n该控制器首先使用了标准的 `@Controller`\
  \ 注解，以及 `@RequestMapping` 注解，通过以下 URL 即可访问该控制器：\n\n```\nhttp://localhost:8080/court/reservationForm\n\
  ```\n\n当你在浏览器中输入此 URL 时，它会向你的 Web 应用发送一个 HTTP GET 请求。这进而会触发 `setupForm` 方法的执行，该方法根据其\
  \ `@RequestMapping` 注解被指定用于处理此类请求。\n\n`setupForm` 方法定义了一个 `Model` 对象作为输入参数，用于将模型数据发送到视图（即表单）。在该处理方法内部，创建了一个空的\
  \ `Reservation` 对象，并将其作为属性添加到控制器的 `Model` 对象中。然后，控制器将执行流程返回给 `reservationForm` 视图，在此处该视图被解析为\
  \ `reservationForm.jsp`（即表单）。\n\n最后一个方法最重要的方面是添加了一个空的 `Reservation` 对象。如果你分析 `reservationForm.jsp`\
  \ 表单，会注意到 `<form:form>` 标签声明了属性 `modelAttribute=\"reservation\"`。这意味着在渲染视图时，表单期望存在一个名为\
  \ `reservation` 的对象，而通过将其放入处理方法的 `Model` 中即可实现这一点。事实上，进一步检查会发现，每个 `<form:input>`\
  \ 标签的路径值都对应 `Reservation` 对象的字段名。由于表单是首次加载，显然期望的是一个空的 `Reservation` 对象。\n\n在分析另一个控制器处理方法之前，另一个至关重要的方面是\
  \ `@SessionAttributes(\"reservation\")` 注解——它声明在控制器类的顶部。由于表单可能包含错误，每次后续提交时丢失用户已提供的有效数据会带来不便。为了解决这个问题，`@SessionAttributes`\
  \ 注解用于将预约字段保存到用户的会话中，这样无论表单被提交两次还是更多次，对预约字段的任何后续引用实际上都指向同一个引用。这也是在整个控制器中只创建一个 `Reservation`\
  \ 对象并将其赋值给预约字段的原因。一旦在 HTTP GET 处理方法内部创建了空的 `Reservation` 对象，所有操作都在同一个对象上进行，因为它被分配给了用户的会话。\n\
  \n现在，让我们将注意力转向首次提交表单。填写完表单字段后，提交表单会触发一个 HTTP POST 请求，进而调用 `submitForm` 方法——这是由该方法的\
  \ `@RequestMapping` 值决定的。`submitForm` 方法声明了三个输入参数。`@ModelAttribute(\"reservation\"\
  ) Reservation reservation` 用于引用预约对象。`BindingResult` 对象包含用户新提交的数据。`SessionStatus`\
  \ 对象用于标记处理已完成，之后 `Reservation` 对象将从 HttpSession 中移除。\n\n此时，该处理方法尚未集成验证或执行对用户会话的访问，而这正是\
  \ `BindingResult` 对象和 `SessionStatus` 对象的用途——我们稍后将描述并集成它们。\n\n该处理方法执行的唯一操作是 `reservationService.make(reservation);`。此操作使用预约对象的当前状态调用预约服务。通常，在执行此类操作之前，会先对控制器对象进行验证。最后，请注意该处理方法返回一个名为\
  \ `redirect:reservationSuccess` 的视图。此处的实际视图名称是 `reservationSuccess`，它会被解析为你之前创建的\
  \ `reservationSuccess.jsp` 页面。\n\n视图名称中的 `redirect:` 前缀用于避免一个称为重复表单提交的问题。\n\n当你在表单成功视图页面中刷新网页时，刚刚提交的表单会被重新提交。为了避免这个问题，你可以应用\
  \ post/redirect/get 设计模式，该模式建议在表单提交成功处理后重定向到另一个 URL，而不是直接返回一个 HTML 页面。这就是在视图名称前加上\
  \ `redirect:` 前缀的目的。\n\n\n\n#### 初始化模型属性对象并用值预填充表单\n\n该表单旨在让用户进行预约。然而，如果你分析一下 `Reservation`\
  \ 领域类，就会发现表单仍缺少两个字段来创建完整的预约对象。其中一个字段是 `player` 字段，它对应一个 `Player` 对象。根据 `Player`\
  \ 类的定义，`Player` 对象同时包含 `name` 字段和 `phone` 字段。\n\n那么，能否将 player 字段整合到表单视图和控制器中呢？我们先来分析一下表单视图。\n\
  \n```\n\n预约表单\n\n...\n\n玩家姓名\n\n玩家电话\n\n```\n\n采用一种直接的方法，你可以添加两个额外的 `<form:input>`\
  \ 标签来表示 `Player` 对象的字段。尽管这些表单声明很简单，但你还需要对控制器进行修改。回想一下，通过使用 `<form:input>` 标签，视图期望能够访问由控制器传递的、与\
  \ `<form:input>` 标签的路径值相匹配的模型对象。\n\n虽然控制器的 HTTP GET 处理方法向最后一个视图返回了一个名为 `Reservation`\
  \ 的空预约对象，但 `player` 属性是 `null`，因此在渲染表单时会引发异常。为了解决这个问题，你必须初始化一个空的 `Player` 对象，并将其赋值给返回给视图的\
  \ `Reservation` 对象。\n\n```\n@RequestMapping(method = RequestMethod.GET)\npublic\
  \ String setupForm(\n@RequestParam(required = false, value = \"username\") String\
  \ username, Model model) {\nReservation reservation = new Reservation();\nreservation.setPlayer(new\
  \ Player(username, null));\nmodel.addAttribute(\"reservation\", reservation);\n\
  return \"reservationForm\";\n}\n```\n\n在这种情况下，创建空的 `Reservation` 对象后，使用 `setPlayer`\
  \ 方法为其分配一个空的 `Player` 对象。进一步注意，`Person` 对象的创建依赖于 `username` 值。这个特定的值是从 `@RequestParam`\
  \ 输入值中获取的，该输入值也被添加到了处理方法中。通过这样做，可以使用作为请求参数传入的特定 `username` 值来创建 `Player` 对象，从而使\
  \ `username` 表单字段预填充此值。\n\n因此，举例来说，如果以如下方式向表单发起请求：\n\n```\nhttp://localhost:8080/court/reservationForm?username=Roger\n\
  ```\n\n这将允许处理方法提取 `username` 参数来创建 `Player` 对象，进而用 `Roger` 值预填充表单的用户名字段。值得注意的是，`username`\
  \ 参数的 `@RequestParam` 注解使用了属性 `required=false`；这允许即使没有此类请求参数，也能处理表单请求。\n\n#### 提供表单参考数据\n\
  \n当请求表单控制器渲染表单视图时，它可能有一些类型的参考数据需要提供给表单（例如，要在 HTML 选择框中显示的选项）。现在假设你希望允许用户在预约场地时选择运动类型——这是\
  \ `Reservation` 类最后一个未考虑的字段。\n\n```\n\n预约表单\n\n...\n\n运动类型\n\n/\n\n```\n\n`<form:select>`\
  \ 标签提供了一种生成下拉列表的方式，该列表包含由控制器传递给视图的值。因此，表单将 `sportType` 字段表示为一组 HTML `<select>` 元素，而不是之前需要用户输入文本值的开放式字段——`<input>`。\n\
  \n接下来，让我们看看控制器如何将 `sportType` 字段分配为模型属性；这个过程与之前的字段略有不同。\n\n首先，在 `ReservationService`\
  \ 接口中定义 `getAllSportTypes()` 方法，用于检索所有可用的运动类型。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic interface ReservationService {\n...\npublic List getAllSportTypes();\n\
  }\n```\n\n然后，你可以通过返回一个硬编码列表来实现此方法。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic class ReservationServiceImpl implements ReservationService {\n...\n\
  public static final SportType TENNIS = new SportType(1, \"Tennis\");\npublic static\
  \ final SportType SOCCER = new SportType(2, \"Soccer\");\npublic List getAllSportTypes()\
  \ {\nreturn Arrays.asList(TENNIS, SOCCER);\n}\n}\n```\n\n现在你已经有了一个返回硬编码 `SportType`\
  \ 对象列表的实现，让我们看看控制器如何关联此列表，以便将其返回给表单视图。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  .....\n@ModelAttribute(\"sportTypes\")\npublic List populateSportTypes() {\nreturn\
  \ reservationService.getAllSportTypes();\n}\n@RequestMapping(method = RequestMethod.GET)\n\
  public String setupForm(\n@RequestParam(required = false, value = \"username\")\
  \ String username, Model model) {\nReservation reservation = new Reservation();\n\
  reservation.setPlayer(new Player(username, null));\nmodel.addAttribute(\"reservation\"\
  , reservation);\nreturn \"reservationForm\";\n}\n```\n\n请注意，负责将空 `Reservation` 对象返回给表单视图的\
  \ `setupForm` 处理方法保持不变。\n\n新增的部分，也是负责将 `SportType` 列表作为模型属性传递给表单视图的部分，是使用 `@ModelAttribute(\"\
  sportTypes\")` 注解修饰的方法。`@ModelAttribute` 注解用于定义全局模型属性，这些属性可用于处理方法中使用的任何返回视图。同样地，处理方法声明一个\
  \ `Model` 对象作为输入参数，并分配可在返回视图中访问的属性。\n\n由于使用 `@ModelAttribute(\"sportTypes\")` 注解修饰的方法的返回类型是\
  \ `List<SportType>`，并且调用了 `reservationService.getAllSportTypes()`，因此硬编码的 `TENNIS`\
  \ 和 `SOCCER SportType` 对象被赋值给名为 `sportTypes` 的模型属性。这最后一个模型属性在表单视图中用于填充下拉列表（即 `<form:select>`\
  \ 标签）。\n\n\n\n#### 绑定自定义类型的属性\n\n当表单提交时，控制器会将表单字段值绑定到同名模型对象的属性上，此处为`Reservation`对象。然而，对于自定义类型的属性，除非为其指定相应的属性编辑器，否则控制器无法进行转换。\n\
  \n例如，运动类型选择字段仅提交所选运动类型的 ID——这是 HTML `<select>` 字段的运作方式。因此，您需要通过属性编辑器将此 ID 转换为`SportType`对象。首先，您需要在`ReservationService`中提供`getSportType()`方法，以便通过\
  \ ID 检索`SportType`对象。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic interface ReservationService {\n...\npublic SportType getSportType(int\
  \ sportTypeId);\n}\n```\n\n为测试目的，您可以使用`switch`/`case`语句实现此方法。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic class ReservationServiceImpl implements ReservationService {\n...\n\
  public SportType getSportType(int sportTypeId) {\nswitch (sportTypeId) {\ncase 1:\n\
  return TENNIS;\ncase 2:\nreturn SOCCER;\ndefault:\nreturn null;\n}\n}\n}\n```\n\n\
  然后，您创建`SportTypeConverter`类，用于将运动类型 ID 转换为`SportType`对象。此转换器需要`ReservationService`来执行查找。\n\
  \n```\npackage com.apress.springrecipes.court.domain;\nimport com.apress.springrecipes.court.service.ReservationService;\n\
  import org.springframework.core.convert.converter.Converter;\npublic class SportTypeConverter\
  \ implements Converter {\nprivate ReservationService reservationService;\npublic\
  \ SportTypeConverter(ReservationService reservationService) {\nthis.reservationService\
  \ = reservationService;\n}\n@Override\npublic SportType convert(String source) {\n\
  int sportTypeId = Integer.parseInt(source);\nSportType sportType = reservationService.getSportType(sportTypeId);\n\
  return sportType;\n}\n}\n```\n\n现在您已拥有将表单属性绑定到`SportType`等自定义类所需的`SportTypeConverter`支持类，接下来需要将其与控制器关联。为此，您可以使用`WebMvcConfigurer`中的`addFormatters`方法。\n\
  \n通过在配置类中重写此方法，可以将自定义类型与控制器关联。这包括`SportTypeConverter`类以及`Date`等其他自定义类型。虽然我们之前未提及`date`字段，但它与运动类型选择字段存在相同问题。用户以文本值形式输入日期字段。为了让控制器将这些文本值分配给`Reservation`对象的日期字段，需要将日期字段与`Date`对象关联。鉴于`Date`类是\
  \ Java 语言的一部分，无需像`SportTypeConverter`那样创建特殊类。为此，Spring 框架已包含一个自定义类。\n\n了解到您需要将`SportTypeConverter`类和`Date`类都绑定到底层控制器，以下代码展示了配置类的修改：\n\
  \n```\npackage com.apress.springrecipes.court.web.config;\n...\nimport com.apress.springrecipes.court.domain.SportTypeConverter;\n\
  import com.apress.springrecipes.court.service.ReservationService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.format.FormatterRegistry;\nimport org.springframework.format.datetime.DateFormatter;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(\"com.apress.springrecipes.court.web\"\
  )\npublic class WebConfiguration implements WebMvcConfigurer {\n@Autowired\nprivate\
  \ ReservationService reservationService;\n@Override\npublic void addFormatters(FormatterRegistry\
  \ registry) {\nregistry.addConverter(new SportTypeConverter(reservationService));\n\
  }\n}\n```\n\n最后一个类中唯一的字段对应`reservationService`，用于访问应用程序的`ReservationService` bean。请注意使用了`@Autowired`注解，该注解支持\
  \ bean 的注入。接下来，您可以看到用于绑定`Date`和`SportTypeConverter`类的`addFormatters`方法。随后是两个用于注册转换器和格式化器的调用。这些方法属于`FormatterRegistry`对象，该对象作为输入参数传递给`addFormatters`方法。\n\
  \n第一个调用用于将`Date`类绑定到`DateFormatter`类。`DateFormatter`类由 Spring 框架提供，具备解析和打印`Date`对象的功能。\n\
  \n第二个调用用于注册`SportTypeConverter`类。由于您创建了`SportTypeConverter`类，应知道其唯一的输入参数是`ReservationService`\
  \ bean。通过这种方式，每个基于注解的控制器（即使用`@Controller`注解的类）都可以在其处理方法中访问相同的自定义转换器和格式化器。\n\n\n\n\
  #### 验证表单数据\n\n当表单提交时，标准做法是在提交成功之前验证用户提供的数据。Spring MVC 通过实现 `Validator` 接口的验证器对象来支持验证。你可以编写以下验证器来检查必填表单字段是否已填写，以及预约时间在节假日和工作日是否有效：\n\
  \n```\npackage com.apress.springrecipes.court.domain;\nimport org.springframework.stereotype.Component;\n\
  import org.springframework.validation.Errors;\nimport org.springframework.validation.ValidationUtils;\n\
  import org.springframework.validation.Validator;\nimport java.time.DayOfWeek;\n\
  import java.time.LocalDate;\n@Component\npublic class ReservationValidator implements\
  \ Validator {\npublic boolean supports(Class clazz) {\nreturn Reservation.class.isAssignableFrom(clazz);\n\
  }\npublic void validate(Object target, Errors errors) {\nValidationUtils.rejectIfEmptyOrWhitespace(errors,\
  \ \"courtName\",\n\"required.courtName\", \"Court name is required.\");\nValidationUtils.rejectIfEmpty(errors,\
  \ \"date\",\n\"required.date\", \"Date is required.\");\nValidationUtils.rejectIfEmpty(errors,\
  \ \"hour\",\n\"required.hour\", \"Hour is required.\");\nValidationUtils.rejectIfEmptyOrWhitespace(errors,\
  \ \"player.name\",\n\"required.playerName\", \"Player name is required.\");\nValidationUtils.rejectIfEmpty(errors,\
  \ \"sportType\",\n\"required.sportType\", \"Sport type is required.\");\nReservation\
  \ reservation = (Reservation) target;\nLocalDate date = reservation.getDate();\n\
  int hour = reservation.getHour();\nif (date != null) {\nif (date.getDayOfWeek()\
  \ == DayOfWeek.SUNDAY) {\nif (hour  22) {\nerrors.reject(\"invalid.holidayHour\"\
  , \"Invalid holiday hour.\");\n}\n} else {\nif (hour  21) {\nerrors.reject(\"invalid.weekdayHour\"\
  , \"Invalid weekday hour.\");\n}\n}\n}\n}\n}\n```\n\n在这个验证器中，你使用了 `ValidationUtils`\
  \ 类中的工具方法，例如 `rejectIfEmptyOrWhitespace()` 和 `rejectIfEmpty()`，来验证必填的表单字段。如果这些表单字段中有任何一个为空，这些方法将创建一个字段错误并将其绑定到该字段。这些方法的第二个参数是属性名称，而第三个和第四个参数分别是错误代码和默认错误消息。\n\
  \n你还需要检查预约时间在节假日和工作日是否有效。如果无效，应使用 `reject()` 方法创建一个对象错误，并将其绑定到预约对象，而不是某个字段。\n\n\
  由于验证器类使用了 `@Component` 注解进行标注，Spring 会尝试根据类名将该类实例化为一个 Bean，在本例中为 `reservationValidator`。\n\
  \n由于验证器在验证过程中可能会创建错误，因此你应该为错误代码定义消息，以便向用户显示。如果你定义了 `ResourceBundleMessageSource`，则可以在资源包中为相应的区域设置（例如，默认区域设置的\
  \ `messages.properties`）包含以下错误消息：\n\n```\nrequired.courtName=Court name is required\n\
  required.date=Date is required\nrequired.hour=Hour is required\nrequired.playerName=Player\
  \ name is required\nrequired.sportType=Sport type is required\ninvalid.holidayHour=Invalid\
  \ holiday hour\ninvalid.weekdayHour=Invalid weekday hour\n```\n\n要应用此验证器，你需要对控制器进行以下修改：\n\
  \n```\npackage com.apress.springrecipes.court.service;\n.....\nprivate ReservationService\
  \ reservationService;\nprivate ReservationValidator reservationValidator;\npublic\
  \ ReservationFormController(ReservationService reservationService,\nReservationValidator\
  \ reservationValidator) {\nthis.reservationService = reservationService;\nthis.reservationValidator\
  \ = reservationValidator;\n}\n@RequestMapping(method = RequestMethod.POST)\npublic\
  \ String submitForm(\n@ModelAttribute(\"reservation\") @Validated Reservation reservation,\n\
  BindingResult result, SessionStatus status) {\nif (result.hasErrors()) {\nreturn\
  \ \"reservationForm\";\n} else {\nreservationService.make(reservation);\nreturn\
  \ \"redirect:reservationSuccess\";\n}\n}\n@InitBinder\npublic void initBinder(WebDataBinder\
  \ binder) {\nbinder.setValidator(reservationValidator);\n}\n```\n\n对控制器的第一个新增内容是\
  \ `ReservationValidator` 字段，它使控制器能够访问验证器 Bean 的实例。\n\n下一个修改发生在 HTTP POST 处理方法中，该方法在用户提交表单时被调用。在\
  \ `@ModelAttribute` 注解旁边，现在有一个 `@Validated` 注解，它会触发对象的验证。验证之后，结果 `parameter`——即\
  \ `BindingResult` 对象——包含了验证过程的结果。接着，根据 `result.hasErrors()` 的值进行条件判断。如果验证类检测到错误，该值为\
  \ `true`。\n\n如果在验证过程中检测到错误，方法处理器会返回视图 `reservationForm`，该视图对应同一个表单，以便用户可以重新提交信息。如果在验证过程中未检测到错误，则会调用\
  \ `reservationService.make(reservation);` 来执行预约，然后重定向到成功视图 `reservationSuccess`。\n\
  \n验证器的注册是在 `@InitBinder` 注解的方法中完成的，并且验证器被设置在 `WebDataBinder` 上，以便在绑定后使用。要注册验证器，你需要使用\
  \ `setValidator` 方法。你也可以使用 `addValidators` 方法注册多个验证器，该方法接受一个或多个 `Validator` 实例的\
  \ `varargs` 参数。\n\n注意\n\n`WebDataBinder` 也可用于注册额外的 `ProperyEditor`、`Converter` 和\
  \ `Formatter` 实例以进行类型转换。这可以用来替代注册全局的 `PropertyEditor`、`Converter` 或 `Formatter`。\n\
  \n#### 使控制器的会话数据过期\n\n为了支持表单可能被多次提交，并且不会在提交之间丢失用户提供的数据，控制器依赖于使用 `@SessionAttributes`\
  \ 注解。通过这样做，对表示为 `Reservation` 对象的预约字段的引用会在请求之间保存。\n\n然而，一旦表单成功提交并且预约完成，就没有必要在用户的会话中保留\
  \ `Reservation` 对象了。事实上，如果用户在短时间内重新访问表单，如果不移除，则有可能出现旧的 `Reservation` 对象的残留。\n\n\
  使用 `@SessionAttributes` 注解分配的值可以使用 `SessionStatus` 对象移除，该对象可以作为输入参数传递给处理方法。以下代码说明了如何使控制器的会话数据过期：\n\
  \n```\npackage com.apress.springrecipes.court.web;\n@Controller\n@RequestMapping(\"\
  /reservationForm\")\n@SessionAttributes(\"reservation\")\npublic class ReservationFormController\
  \ {\n@RequestMapping(method = RequestMethod.POST)\npublic String submitForm(\n@ModelAttribute(\"\
  reservation\") Reservation reservation,\nBindingResult result, SessionStatus status)\
  \ {\nif (result.hasErrors()) {\nreturn \"reservationForm\";\n} else {\nreservationService.make(reservation);\n\
  status.setComplete();\nreturn \"redirect:reservationSuccess\";\n}\n}\n}\n```\n\n\
  一旦处理方法通过调用 `reservationService.make(reservation);` 执行了预约，并且在用户被重定向到成功页面之前，这就是使控制器会话数据过期的理想时机。这是通过调用\
  \ `SessionStatus` 对象上的 `setComplete()` 方法完成的。就是这么简单。\n\n## 3-10. 使用向导表单控制器处理多页表单\n\
  \n### 问题\n\n在 Web 应用程序中，有时你需要处理跨多个页面的复杂表单。这种表单通常被称为向导表单，因为用户必须逐页填写——就像使用软件向导一样。毫无疑问，你可以创建一个或多个表单控制器来处理向导表单。\n\
  \n\n\n### 解决方案\n\n由于向导表单包含多个表单页面，因此需要为向导表单控制器定义多个页面视图。控制器负责管理所有这些表单页面的状态。与单个表单类似，向导表单也可以使用单个控制器处理方法处理表单提交。然而，为了区分用户的操作，每个表单中都需要嵌入一个特殊的请求参数，通常指定为提交按钮的名称。\n\
  \n```\n`_finish`：完成向导表单。\n`_cancel`：取消向导表单。\n`_targetx`：跳转到目标页面，其中 x 是从零开始的页面索引。\n\
  ```\n\n利用这些参数，控制器处理方法可以根据表单和用户的操作决定下一步要执行的操作。\n\n### 工作原理\n\n假设你想提供一个功能，允许用户按固定时段定期预订场地。首先，在领域子包中定义\
  \ `PeriodicReservation` 类。\n\n```\npackage com.apress.springrecipes.court.domain;\n\
  ...\npublic class PeriodicReservation {\nprivate String courtName;\nprivate Date\
  \ fromDate;\nprivate Date toDate;\nprivate int period;\nprivate int hour;\nprivate\
  \ Player player;\n// Getters and Setters\n...\n}\n```\n\n然后，在 `ReservationService`\
  \ 接口中添加一个 `makePeriodic()` 方法，用于进行定期预订。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic interface ReservationService {\n...\npublic void makePeriodic(PeriodicReservation\
  \ periodicReservation)\nthrows ReservationNotAvailableException;\n}\n```\n\n该方法的实现涉及从\
  \ `PeriodicReservation` 生成一系列 `Reservation` 对象，并将每个预订传递给 `make()` 方法。显然，在这个简单的应用程序中，没有事务管理支持。\n\
  \n```\npackage com.apress.springrecipes.court.service;\n...\npublic class ReservationServiceImpl\
  \ implements ReservationService {\n...\n@Override\npublic void makePeriodic(PeriodicReservation\
  \ periodicReservation)\nthrows ReservationNotAvailableException {\nLocalDate fromDate\
  \ = periodicReservation.getFromDate();\nwhile (fromDate.isBefore(periodicReservation.getToDate()))\
  \ {\nReservation reservation = new Reservation();\nreservation.setCourtName(periodicReservation.getCourtName());\n\
  reservation.setDate(fromDate);\nreservation.setHour(periodicReservation.getHour());\n\
  reservation.setPlayer(periodicReservation.getPlayer());\nmake(reservation);\nfromDate\
  \ = fromDate.plusDays(periodicReservation.getPeriod());\n}\n}\n}\n```\n\n#### 创建向导表单页面\n\
  \n假设你想向用户展示一个分三页显示的定期预订表单。每页包含部分表单字段。第一页是 `reservationCourtForm.jsp`，仅包含定期预订的场地名称字段。\n\
  \n```\n\nReservation Court Form\n\n.error {\ncolor: #ff0000;\nfont-weight: bold;\n\
  }\n\nCourt Name\n\n```\n\n此页面中的表单和输入字段使用 Spring 的 `<form:form>` 和 `<form:input>`\
  \ 标签定义。它们绑定到模型属性 `reservation` 及其属性。此外，还有一个错误标签用于向用户显示字段错误消息。请注意，此页面有两个提交按钮。“下一步”按钮的名称必须为\
  \ `_target1`。它指示向导表单控制器前进到第二页，其页面索引为 1（从零开始）。“取消”按钮的名称必须为 `_cancel`。它指示控制器取消此表单。此外，还有一个隐藏的表单字段用于跟踪用户当前所在的页面；在本例中，它对应\
  \ 0。\n\n第二页是 `reservationTimeForm.jsp`。它包含定期预订的日期和时间字段。\n\n```\n\nReservation Time\
  \ Form\n\n.error {\ncolor: #ff0000;\nfont-weight: bold;\n}\n\nFrom Date\n\nTo Date\n\
  \nPeriod\n\nHour\n\n```\n\n此表单中有三个提交按钮。“上一步”和“下一步”按钮的名称必须分别为 `_target0` 和 `_target2`。它们指示向导表单控制器跳转到第一页和第三页。“取消”按钮指示控制器取消此表单。此外，还有一个隐藏的表单字段用于跟踪用户当前所在的页面；在本例中，它对应\
  \ 1。\n\n第三页是 `reservationPlayerForm.jsp`。它包含定期预订的玩家信息字段。\n\n```\n\nReservation Player\
  \ Form\n\n.error {\ncolor: #ff0000;\nfont-weight: bold;\n}\n\nPlayer Name\n\nPlayer\
  \ Phone\n\n```\n\n此表单中有三个提交按钮。“上一步”按钮指示向导表单控制器返回到第二页。“完成”按钮的名称必须为 `_finish`。它指示控制器完成此表单。“取消”按钮指示控制器取消此表单。此外，还有一个隐藏的表单字段用于跟踪用户当前所在的页面；在本例中，它对应\
  \ 2。\n\n\n\n#### 创建向导表单控制器\n\n现在我们来创建一个向导表单控制器，用于处理这个定期预约表单。与之前的 Spring MVC 控制器类似，该控制器包含四个主要处理方法——一个用于处理\
  \ HTTP GET 请求，其余用于处理 HTTP POST 请求——并且使用了之前控制器中相同的控制器元素（例如注解、验证或会话）。对于向导表单控制器，不同页面中的所有表单字段都绑定到单个模型属性\
  \ `Reservation` 对象上，该对象在多个请求期间存储在用户的会话中。\n\n```\npackage com.apress.springrecipes.court.web;\n\
  import com.apress.springrecipes.court.domain.PeriodicReservation;\nimport com.apress.springrecipes.court.domain.Player;\n\
  import com.apress.springrecipes.court.service.ReservationService;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.validation.BindingResult;\n\
  import org.springframework.validation.annotation.Validated;\nimport org.springframework.web.bind.annotation.*;\n\
  import org.springframework.web.bind.support.SessionStatus;\nimport org.springframework.web.util.WebUtils;\n\
  import javax.annotation.PostConstruct;\nimport javax.servlet.http.HttpServletRequest;\n\
  import java.util.Enumeration;\nimport java.util.HashMap;\nimport java.util.Map;\n\
  @Controller\n@RequestMapping(\"/periodicReservationForm\")\n@SessionAttributes(\"\
  reservation\")\npublic class PeriodicReservationController {\nprivate final Map\
  \ pageForms = new HashMap(3);\nprivate final ReservationService reservationService;\n\
  public PeriodicReservationController(ReservationService reservationService) {\n\
  this.reservationService = reservationService;\n}\n@PostConstruct\npublic void initialize()\
  \ {\npageForms.put(0, \"reservationCourtForm\");\npageForms.put(1, \"reservationTimeForm\"\
  );\npageForms.put(2, \"reservationPlayerForm\");\n}\n@GetMapping\npublic String\
  \ setupForm(Model model) {\nPeriodicReservation reservation = new PeriodicReservation();\n\
  reservation.setPlayer(new Player());\nmodel.addAttribute(\"reservation\", reservation);\n\
  return \"reservationCourtForm\";\n}\n@PostMapping(params = {\"_cancel\"})\npublic\
  \ String cancelForm(@RequestParam(\"_page\") int currentPage) {\nreturn pageForms.get(currentPage);\n\
  }\n@PostMapping(params = {\"_finish\"})\npublic String completeForm(\n@ModelAttribute(\"\
  reservation\") PeriodicReservation reservation,\nBindingResult result, SessionStatus\
  \ status,\n@RequestParam(\"_page\") int currentPage) {\nif (!result.hasErrors())\
  \ {\nreservationService.makePeriodic(reservation);\nstatus.setComplete();\nreturn\
  \ \"redirect:reservationSuccess\";\n} else {\nreturn pageForms.get(currentPage);\n\
  }\n}\n@PostMapping\npublic String submitForm(\nHttpServletRequest request,\n@ModelAttribute(\"\
  reservation\") PeriodicReservation reservation,\nBindingResult result, @RequestParam(\"\
  _page\") int currentPage) {\nint targetPage = getTargetPage(request, \"_target\"\
  , currentPage);\nif (targetPage  periods() {\nMap periods = new HashMap();\nperiods.put(1,\
  \ \"Daily\");\nperiods.put(7, \"Weekly\");\nreturn periods;\n}\nprivate int getTargetPage(HttpServletRequest\
  \ request, String paramPrefix, int currentPage) {\nEnumeration paramNames = request.getParameterNames();\n\
  while (paramNames.hasMoreElements()) {\nString paramName = paramNames.nextElement();\n\
  if (paramName.startsWith(paramPrefix)) {\nfor (int i = 0; i < WebUtils.SUBMIT_IMAGE_SUFFIXES.length;\
  \ i++) {\nString suffix = WebUtils.SUBMIT_IMAGE_SUFFIXES[i];\nif (paramName.endsWith(suffix))\
  \ {\nparamName = paramName.substring(0, paramName.length() - suffix.length());\n\
  }\n}\nreturn Integer.parseInt(paramName.substring(paramPrefix.length()));\n}\n}\n\
  return currentPage;\n}\n}\n```\n\n该控制器使用了与之前 `ReservationFormController` 控制器相同的一些元素，因此我们不再赘述已解释过的具体细节。但回顾一下，它使用\
  \ `@SessionAttributes` 注解将预约对象放置在用户的会话中。它拥有与之前相同的 HTTP GET 方法，用于在加载第一个表单视图时分配空的\
  \ `Reservation` 和 `Player` 对象。\n\n接下来，控制器定义了一个 `HashMap`，将页码与视图名称关联起来。该 `HashMap`\
  \ 在控制器中被多次使用，因为控制器需要为各种场景（例如验证，或用户点击“取消”或“下一步”）确定目标视图。\n\n你还可以找到使用 `@ModelAttribute(\"\
  periods\")` 注解修饰的方法。正如之前控制器所示，此声明允许将一组值提供给控制器中返回的任何视图。如果你查看之前的表单 `reservationTimeForm.jsp`，可以看到它期望访问一个名为\
  \ `periods` 的模型属性。\n\n然后你会发现，如果传入的请求 URL 中包含 `_cancel` 参数，则会调用第一个 `@PostMapping`\
  \ 方法。它还尝试通过使用 `@RequestParam(\"page\")` 从请求中提取 `page` 属性来获取 `currentPage` 值。当调用此方法时，它会将控制权返回给与\
  \ `currentPage` 值对应的视图。结果是输入被重置为更改输入字段内容之前的状态。\n\n如果传入的请求 URL 中包含 `_finish` 参数（即用户点击了“完成”按钮的情况），则会调用下一个\
  \ `@PostMapping(params={\"_finish\"})` 方法。由于这是流程中的最后一步，你需要验证 `Reservation` 对象，为此你使用\
  \ `@Validated` 注解对该属性进行标注。当没有错误时，处理方法通过调用 `reservationService.makePeriodic(reservation);`\
  \ 进行预约，并将用户重定向到 `reservationSuccess` 视图。\n\n最后一个带有 `@PostMapping` 的处理方法处理其余情况，并为\
  \ `HttpServletRequest` 声明了一个输入参数，允许处理方法访问该对象的内容。之前的处理方法使用诸如 `@RequestParam` 之类的参数来输入通常位于这些标准对象中的数据，作为一种快捷机制。这证明了在处理程序方法内部完全访问标准\
  \ `HttpServletRequest` 和 `HttpServletResponse` 对象是可行的。其余输入参数的名称和表示法你应该从之前的控制器中已经熟悉。如果调用了此处理方法，则意味着用户点击了任一表单上的“下一步”或“上一步”按钮。因此，这意味着在\
  \ `HttpServletRequest` 对象内部有一个名为 `_target` 的参数。这是因为表单的每个“下一步”和“上一步”按钮都被分配了这个参数。\n\
  \n使用 `getTargetPage` 方法，提取 `_target` 参数的值，该值对应于 `target0`、`target1` 或 `target2`，并被裁剪为\
  \ 0、1 或 2，代表目标页面。\n\n一旦你有了目标页码和当前页码，就可以确定用户是点击了“下一步”还是“上一步”按钮。如果目标页面小于当前页面，则表示用户点击了“上一步”按钮。如果目标页码大于当前页码，则表示用户点击了“下一步”按钮。\n\
  \n此时，你可能不清楚为什么需要确定用户点击的是“下一步”还是“上一步”按钮，尤其是因为总是返回与目标页面对应的视图。但此逻辑背后的原因如下：如果用户点击了“下一步”按钮，你将需要验证数据；而如果用户点击了“上一步”按钮，则无需验证任何内容。在下一节中将验证集成到控制器中时，这一点会变得显而易见。\n\
  \n由于 `PeriodicReservationController` 类使用了 `@RequestMapping(\"/periodicReservationForm\"\
  )` 注解进行修饰，你可以通过以下 URL 访问该控制器：\n\n```\nhttp://localhost:8080/court/periodicReservation\n\
  ```\n\n\n\n#### 验证向导表单数据\n\n在简单的表单控制器中，你会在表单提交时一次性验证整个模型属性对象。然而，由于向导表单控制器包含多个表单页面，你必须在每个页面提交时对其进行验证。因此，你创建了以下验证器，它将\
  \ `validate()` 方法拆分为多个细粒度的验证方法，每个方法验证特定页面中的字段：\n\n```\npackage com.apress.springrecipes.court.domain;\n\
  import org.springframework.validation.Errors;\nimport org.springframework.validation.ValidationUtils;\n\
  import org.springframework.validation.Validator;\npublic class PeriodicReservationValidator\
  \ implements Validator {\npublic boolean supports(Class clazz) {\nreturn PeriodicReservation.class.isAssignableFrom(clazz);\n\
  }\npublic void validate(Object target, Errors errors) {\nvalidateCourt(target, errors);\n\
  validateTime(target, errors);\nvalidatePlayer(target, errors);\n}\npublic void validateCourt(Object\
  \ target, Errors errors) {\nValidationUtils.rejectIfEmptyOrWhitespace(errors, \"\
  courtName\",\n\"required.courtName\", \"Court name is required.\");\n}\npublic void\
  \ validateTime(Object target, Errors errors) {\nValidationUtils.rejectIfEmpty(errors,\
  \ \"fromDate\",\n\"required.fromDate\", \"From date is required.\");\nValidationUtils.rejectIfEmpty(errors,\
  \ \"toDate\", \"required.toDate\",\n\"To date is required.\");\nValidationUtils.rejectIfEmpty(errors,\
  \ \"period\",\n\"required.period\", \"Period is required.\");\nValidationUtils.rejectIfEmpty(errors,\
  \ \"hour\", \"required.hour\",\n\"Hour is required.\");\n}\npublic void validatePlayer(Object\
  \ target, Errors errors) {\nValidationUtils.rejectIfEmptyOrWhitespace(errors, \"\
  player.name\",\n\"required.playerName\", \"Player name is required.\");\n}\n}\n\
  ```\n\n与之前的验证器示例类似，请注意此验证器也依赖 `@Component` 注解来自动将验证器类注册为 bean。一旦验证器 bean 注册完成，剩下的唯一工作就是将验证器集成到控制器中。\n\
  \n```\npackage com.apress.springrecipes.court.web;\nimport com.apress.springrecipes.court.domain.PeriodicReservation;\n\
  import com.apress.springrecipes.court.domain.PeriodicReservationValidator;\nimport\
  \ com.apress.springrecipes.court.domain.Player;\nimport com.apress.springrecipes.court.service.ReservationService;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
  import org.springframework.validation.BindingResult;\nimport org.springframework.validation.annotation.Validated;\n\
  import org.springframework.web.bind.WebDataBinder;\nimport org.springframework.web.bind.annotation.*;\n\
  import org.springframework.web.bind.support.SessionStatus;\nimport org.springframework.web.util.WebUtils;\n\
  import javax.annotation.PostConstruct;\nimport javax.servlet.http.HttpServletRequest;\n\
  import java.util.Enumeration;\nimport java.util.HashMap;\nimport java.util.Map;\n\
  @Controller\n@RequestMapping(\"/periodicReservationForm\")\n@SessionAttributes(\"\
  reservation\")\npublic class PeriodicReservationController {\nprivate final Map\
  \ pageForms = new HashMap(3);\nprivate final ReservationService reservationService;\n\
  private final PeriodicReservationValidator validator;\npublic PeriodicReservationController(ReservationService\
  \ reservationService,\nPeriodicReservationValidator periodicReservationValidator)\
  \ {\nthis.reservationService = reservationService;\nthis.validator = periodicReservationValidator;\n\
  }\n@InitBinder\npublic void initBinder(WebDataBinder binder) {\nbinder.setValidator(this.validator);\n\
  }\n@PostMapping(params = {\"_finish\"})\npublic String completeForm(\n@Validated\
  \ @ModelAttribute(\"reservation\") PeriodicReservation reservation,\nBindingResult\
  \ result, SessionStatus status,\n@RequestParam(\"_page\") int currentPage) {\nif\
  \ (!result.hasErrors()) {\nreservationService.makePeriodic(reservation);\nstatus.setComplete();\n\
  return \"redirect:reservationSuccess\";\n} else {\nreturn pageForms.get(currentPage);\n\
  }\n}\n@PostMapping\npublic String submitForm(\nHttpServletRequest request,\n@ModelAttribute(\"\
  reservation\") PeriodicReservation reservation,\nBindingResult result, @RequestParam(\"\
  _page\") int currentPage) {\nint targetPage = getTargetPage(request, \"_target\"\
  , currentPage);\nif (targetPage < currentPage) {\nreturn pageForms.get(targetPage);\n\
  }\nvalidateCurrentPage(reservation, result, currentPage);\nif (!result.hasErrors())\
  \ {\nreturn pageForms.get(targetPage);\n} else {\nreturn pageForms.get(currentPage);\n\
  }\n}\nprivate void validateCurrentPage(PeriodicReservation reservation,        BindingResult\
  \ result, int currentPage) {\nswitch (currentPage) {\ncase 0:\nvalidator.validateCourt(reservation,\
  \ result);\nbreak;\ncase 1:\nvalidator.validateTime(reservation, result);\nbreak;\n\
  case 2:\nvalidator.validatePlayer(reservation, result);\nbreak;\n}\n}\n...\n}\n\
  ```\n\n控制器中新增的第一个内容是验证器字段，它通过类的构造函数被分配了一个 `PeriodicReservationValidator` 验证器 bean\
  \ 的实例。然后，你可以在控制器中找到两处对验证器的引用。\n\n第一处是在用户完成表单提交时。要调用验证器，你需要在方法的 `Reservation` 参数上添加\
  \ `@Validated` 注解。为了使其实际生效，你还需要添加一个带有 `@InitBinder` 注解的方法，该方法将 `PeriodicReservationValidator`\
  \ 注册到数据绑定器中。如果验证器未返回错误，则提交 `reservation`，重置用户会话，并将用户重定向到 `reservationSuccess` 视图。如果验证器返回错误，则用户会被发送到当前视图表单以修正错误。（另请参阅配方\
  \ 3-9。）\n\n控制器中使用验证器的第二种情况是用户点击表单上的“下一步”按钮时。由于用户试图前进到下一个表单，因此有必要验证用户提供的所有数据。考虑到有三个可能的表单视图需要验证，这里使用了一个\
  \ `case` 语句来确定要调用哪个验证器方法。一旦验证器方法执行完毕，如果检测到错误，用户会被发送到 `currentPage` 视图以修正错误；如果未检测到错误，用户会被发送到\
  \ `targetPage` 视图；请注意，这些目标页面编号映射到了控制器中的一个 `Map`。\n\n## 3-11. 使用基于注解的 Bean 验证（JSR-303）\n\
  \n### 问题\n\n你希望使用基于 JSR-303 标准的注解来验证 Web 应用程序中的 Java Bean。\n\n### 解决方案\n\nJSR-303，即\
  \ Bean 验证，是一项规范，其目标是通过注解来标准化 Java Bean 的验证。\n\n在之前的示例中，你看到了 Spring 框架如何支持一种临时性的\
  \ Bean 验证技术。这要求你扩展 Spring 框架的某个类，以便为特定类型的 Java Bean 创建验证器类。\n\nJSR-303 标准的目标是直接在\
  \ Java Bean 类中使用注解。这允许将验证规则直接指定在它们所要验证的代码中，而不是像之前使用 Spring Validator 类那样，在单独的类中创建验证规则。\n\
  \n\n\n### 工作原理\n\n首先，你需要使用必要的 JSR-303 注解来修饰一个 Java Bean。以下代码展示了在 court 应用程序中使用的、用\
  \ JSR-303 注解修饰的 `Reservation` 领域类：\n\n```\npublic class Reservation {\n@NotNull\n\
  @Size(min = 4)\nprivate String courtName;\n@NotNull\nprivate Date date;\n@Min(9)\n\
  @Max(21)\nprivate int hour;\n@Valid\nprivate Player player;\n@NotNull\nprivate SportType\
  \ sportType;\n// 为简洁起见，省略了 Getter/Setter 方法\n}\n```\n\n`courtName` 字段被分配了两个注解：`@NotNull`\
  \ 注解表示该字段不能为空，`@Size` 注解用于指示该字段必须至少包含四个字符。\n\n`date` 和 `sportType` 字段使用 `@NotNull`\
  \ 注解，因为它们是必填字段。\n\n`hour` 字段使用 `@Min` 和 `@Max` 注解，因为它们分别是 `hour` 字段的下限和上限。\n\n`player`\
  \ 字段使用 `@Valid` 注解，以触发对嵌套的 `Player` 对象的验证，`Player` 领域类中的两个字段都使用了 `@NotNull` 注解。\n\
  \n现在你已经了解了如何使用属于 JSR-303 标准的注解来修饰一个 Java Bean 类。让我们看看这些验证器注解是如何在控制器中强制执行的。\n\n```\n\
  package com.apress.springrecipes.court.service;\n.....\nprivate final ReservationService\
  \ reservationService;\npublic ReservationFormController(ReservationService reservationService)\
  \ {\nthis.reservationService = reservationService;\n}\n@RequestMapping(method =\
  \ RequestMethod.POST)\npublic String submitForm(\n@ModelAttribute(\"reservation\"\
  ) @Valid Reservation reservation,\nBindingResult result, SessionStatus status) {\n\
  if (result.hasErrors()) {\nreturn \"reservationForm\";\n} else {\nreservationService.make(reservation);\n\
  return \"redirect:reservationSuccess\";\n}\n}\n```\n\n该控制器与配方 3-9 中的控制器几乎相同。唯一的区别是缺少了\
  \ `@InitBinder` 注解的方法。如果类路径中存在 `javax.validation.Validator`，Spring MVC 会检测到它。我们在类路径中添加了\
  \ `hibernate-validator`，这是一个验证实现。\n\n接下来，你会找到控制器的 HTTP POST 处理方法，该方法用于处理用户数据的提交。由于处理方法期望接收一个\
  \ `Reservation` 对象的实例（你已经用 JSR-303 注解修饰了它），因此你可以验证其数据。\n\n`submitForm` 方法的其余部分与配方\
  \ 3-9 中的相同。\n\n注意\n\n要在 Web 应用程序中使用 JSR-303 Bean 验证，你必须将某个实现的依赖项添加到你的 `CLASSPATH`\
  \ 中。如果你使用 Maven，请将以下依赖项添加到你的 Maven 项目中：\n\n```\norg.hibernate\nhibernate-validator\n\
  5.4.0.Final\n\n```\n\n对于 Gradle，请添加以下内容：\n\n```\ncompile 'org.hibernate:hibernate-validator:5.4.0.Final'\n\
  ```\n\n## 3-12. 创建 Excel 和 PDF 视图\n\n### 问题\n\n尽管 HTML 是显示 Web 内容最常用的方法，但有时你的用户可能希望以\
  \ Excel 或 PDF 格式从你的 Web 应用程序中导出内容。在 Java 中，有几个库可以帮助生成 Excel 和 PDF 文件。然而，要在 Web 应用程序中直接使用这些库，你必须在后台生成文件，并以二进制附件的形式将它们返回给用户。为此，你必须处理\
  \ HTTP 响应头和输出流。\n\n### 解决方案\n\nSpring 将 Excel 和 PDF 文件的生成集成到其 MVC 框架中。你可以将 Excel\
  \ 和 PDF 文件视为特殊类型的视图，这样你就可以在控制器中一致地处理 Web 请求，并将数据添加到模型中，以便传递给 Excel 和 PDF 视图。通过这种方式，你无需处理\
  \ HTTP 响应头和输出流。Spring MVC 支持使用 Apache POI 库（[`http://poi.apache.org/`](http://poi.apache.org/)）生成\
  \ Excel 文件。相应的视图类是 `AbstractExcelView`、`AbstractXlsxView` 和 `AbstractXlsxStreamingView`。PDF\
  \ 文件由 iText 库（[`www.lowagie.com/iText/`](http://www.lowagie.com/iText/)）生成，相应的视图类是\
  \ `AbstractPdfView`。\n\n### 工作原理\n\n假设你的用户想要生成某一天预约摘要的报告。他们希望这份报告能以 Excel、PDF 或基本的\
  \ HTML 格式生成。对于这个报告生成功能，你需要在服务层声明一个方法，该方法返回指定日期的所有预约。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic interface ReservationService {\n...\npublic List findByDate(LocalDate\
  \ date);\n}\n```\n\n然后，你通过遍历所有已创建的预约来为该方法提供一个简单的实现。\n\n```\npackage com.apress.springrecipes.court.service;\n\
  ...\npublic class ReservationServiceImpl implements ReservationService {\n...\n\
  public List findByDate(LocalDate date) {\nreturn reservations.stream()\n.filter(r\
  \ -> Objects.equals(r.getDate(), date))\n.collect(Collectors.toList());\n}\n}\n\
  ```\n\n现在，你可以编写一个简单的控制器，从 URL 中获取日期参数。日期参数被格式化为日期对象，并传递给服务层以查询预约。该控制器依赖于配方 3-7 中描述的内容协商解析器。因此，控制器返回一个单一的逻辑视图，并让解析器决定报告应以\
  \ Excel、PDF 还是默认的 HTML 网页形式生成。\n\n```\npackage com.apress.springrecipes.court.web;\n\
  ...\n@Controller\n@RequestMapping(\"/reservationSummary*\")\npublic class ReservationSummaryController\
  \ {\nprivate ReservationService reservationService;\n@Autowired\npublic ReservationSummaryController(ReservationService\
  \ reservationService) {\nthis.reservationService = reservationService;\n}\n@RequestMapping(method\
  \ = RequestMethod.GET)\npublic String generateSummary(\n@RequestParam(required =\
  \ true, value = \"date\")\nString selectedDate,\nModel model) {\nList reservations\
  \ = java.util.Collections.emptyList();\ntry {\nDate summaryDate = new SimpleDateFormat(\"\
  yyyy-MM-dd\").parse(selectedDate);\nreservations = reservationService.findByDate(summaryDate);\n\
  } catch (java.text.ParseException ex) {\nStringWriter sw = new StringWriter();\n\
  PrintWriter pw = new PrintWriter(sw);\nex.printStackTrace(pw);\nthrow new ReservationWebException(\"\
  预约摘要的日期格式无效\",new Date(),sw.toString());\n}\nmodel.addAttribute(\"reservations\"\
  ,reservations);\nreturn \"reservationSummary\";\n}\n}\n```\n\n该控制器仅包含一个默认的 HTTP\
  \ GET 处理方法。该方法执行的第一个操作是创建一个空的 `Reservation` 列表，用于存放从预约服务获得的结果。接下来，你会看到一个 `try`/`catch`\
  \ 块，它尝试从 `selectedDate @RequestParam` 创建一个 `Date` 对象，并使用创建的 `Date` 对象调用预约服务。如果创建\
  \ `Date` 对象失败，则会抛出一个名为 `ReservationWebException` 的自定义 Spring 异常。\n\n如果在 `try`/`catch`\
  \ 块中没有引发错误，则 `Reservation` 列表会被放入控制器的 `Model` 对象中。完成后，该方法将控制权返回给 `reservationSummary`\
  \ 视图。\n\n请注意，尽管该控制器支持 PDF、XLS 和 HTML 视图，但它只返回一个视图。这是可能的，因为 `ContentNegotiatingViewResolver`\
  \ 解析器会根据这个单一的视图名称来决定使用这些多个视图中的哪一个。有关此解析器的更多信息，请参阅配方 3-7。\n\n\n\n#### 创建 Excel 视图\n\
  \n可以通过继承 `AbstractXlsView` 或 `AbstractXlsxView` 类（用于 Apache POI）来创建 Excel 视图。此处以\
  \ `AbstractXlsxView` 为例。在 `buildExcelDocument()` 方法中，你可以访问从控制器传递过来的模型，以及一个预先创建的\
  \ Excel 工作簿。你的任务是用模型中的数据填充该工作簿。\n\n注意\n\n要在 Web 应用程序中使用 Apache POI 生成 Excel 文件，你必须在\
  \ `CLASSPATH` 中包含 Apache POI 依赖项。如果你使用的是 Apache Maven，请将以下依赖项添加到你的 Maven 项目中：\n\n\
  ```\norg.apache.poi\npoi\n3.10-FINAL\n\n```\n\n```\npackage com.apress.springrecipes.court.web.view;\n\
  import com.apress.springrecipes.court.domain.Reservation;\nimport org.apache.poi.ss.usermodel.Row;\n\
  import org.apache.poi.ss.usermodel.Sheet;\nimport org.apache.poi.ss.usermodel.Workbook;\n\
  import org.springframework.web.servlet.view.document.AbstractXlsxView;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\nimport java.text.DateFormat;\nimport\
  \ java.text.SimpleDateFormat;\nimport java.util.List;\nimport java.util.Map;\npublic\
  \ class ExcelReservationSummary extends AbstractXlsxView {\n@Override\nprotected\
  \ void buildExcelDocument(Map model, Workbook workbook, HttpServletRequest request,\
  \ HttpServletResponse response) throws Exception {\n@SuppressWarnings({\"unchecked\"\
  })\nfinal List reservations =            (List) model.get(\"reservations\");\nfinal\
  \ DateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\");\nfinal Sheet sheet\
  \ = workbook.createSheet();\naddHeaderRow(sheet);\nreservations.forEach(reservation\
  \ -> createRow(dateFormat, sheet, reservation));\n}\nprivate void addHeaderRow(Sheet\
  \ sheet) {\nRow header = sheet.createRow(0);\nheader.createCell((short) 0).setCellValue(\"\
  Court Name\");\nheader.createCell((short) 1).setCellValue(\"Date\");\nheader.createCell((short)\
  \ 2).setCellValue(\"Hour\");\nheader.createCell((short) 3).setCellValue(\"Player\
  \ Name\");\nheader.createCell((short) 4).setCellValue(\"Player Phone\");\n}\nprivate\
  \ void createRow(DateFormat dateFormat, Sheet sheet, Reservation reservation) {\n\
  Row row = sheet.createRow(sheet.getLastRowNum() + 1);\nrow.createCell((short) 0).setCellValue(reservation.getCourtName());\n\
  row.createCell((short) 1).setCellValue(dateFormat.format(reservation.getDate()));\n\
  row.createCell((short) 2).setCellValue(reservation.getHour());\nrow.createCell((short)\
  \ 3).setCellValue(reservation.getPlayer().getName());\nrow.createCell((short) 4).setCellValue(reservation.getPlayer().getPhone());\n\
  }\n}\n```\n\n在上述 Excel 视图中，你首先在工作簿中创建一个工作表。在此工作表中，你在第一行显示此报告的标题。然后，你遍历预约列表，为每个预约创建一行。\n\
  \n由于你在控制器中配置了 `@RequestMapping(\"/reservationSummary*\")`，并且处理器方法需要一个日期作为请求参数，你可以通过以下\
  \ URL 访问此 Excel 视图：\n\n```\nhttp://localhost:8080/court/reservationSummary.xls?date=2009-01-14\n\
  ```\n\n#### 创建 PDF 视图\n\n通过继承 `AbstractPdfView` 类来创建 PDF 视图。在 `buildPdfDocument()`\
  \ 方法中，你可以访问从控制器传递过来的模型，以及一个预先创建的 PDF 文档。你的任务是用模型中的数据填充该文档。\n\n注意\n\n要在 Web 应用程序中使用\
  \ iText 生成 PDF 文件，你必须在 `CLASSPATH` 中包含 iText 库。如果你使用的是 Apache Maven，请将以下依赖项添加到你的\
  \ Maven 项目中：\n\n```\ncom.lowagie\nitext\n4.2.1\n</dependency\n```\n\n```\npackage\
  \ com.apress.springrecipes.court.web.view;\n...\nimport org.springframework.web.servlet.view.document.AbstractPdfView;\n\
  import com.lowagie.text.Document;\nimport com.lowagie.text.Table;\nimport com.lowagie.text.pdf.PdfWriter;\n\
  public class PdfReservationSummary extends AbstractPdfView {\nprotected void buildPdfDocument(Map\
  \ model, Document document,\nPdfWriter writer, HttpServletRequest request,\nHttpServletResponse\
  \ response) throws Exception {\nList reservations = (List) model.get(\"reservations\"\
  );\nDateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\");\nTable table =\
  \ new Table(5);\ntable.addCell(\"Court Name\");\ntable.addCell(\"Date\");\ntable.addCell(\"\
  Hour\");\ntable.addCell(\"Player Name\");\ntable.addCell(\"Player Phone\");\nfor\
  \ (Reservation reservation : reservations) {\ntable.addCell(reservation.getCourtName());\n\
  table.addCell(dateFormat.format(reservation.getDate()));\ntable.addCell(Integer.toString(reservation.getHour()));\n\
  table.addCell(reservation.getPlayer().getName());\ntable.addCell(reservation.getPlayer().getPhone());\n\
  }\ndocument.add(table);\n}\n}\n```\n\n由于你在控制器中配置了 `@RequestMapping(\"/reservationSummary*\"\
  )`，并且处理器方法需要一个日期作为请求参数，你可以通过以下 URL 访问此 PDF 视图：\n\n```\nhttp://localhost:8080/court/reservationSummary.pdf?date=2009-01-14\n\
  ```\n\n#### 为 Excel 和 PDF 视图创建解析器\n\n在技巧 3-6 中，你学习了将逻辑视图名称解析为特定视图实现的不同策略。其中一种策略是从资源包中解析视图；这是将逻辑视图名称映射到由\
  \ PDF 或 XLS 类组成的视图实现更合适的策略。\n\n确保你在 Web 应用程序上下文中将 `ResourceBundleViewResolver` bean\
  \ 配置为视图解析器后，你就可以在包含于 Web 应用程序类路径根目录的 `views.properties` 文件中定义视图。\n\n你可以向 `views.properties`\
  \ 添加以下条目，以将 XLS 视图类映射到逻辑视图名称：\n\n```\nreservationSummary.(class)=com.apress.springrecipes.court.web.view.ExcelReservationSummary\n\
  ```\n\n由于应用程序依赖于内容协商过程，这意味着同一个视图名称会映射到多个视图技术。此外，由于无法在同一个 `views.properties` 文件中存在重复名称，你需要创建一个名为\
  \ `secondaryviews.properties` 的单独文件，以将 PDF 视图类映射到逻辑视图名称，如下所示：\n\n```\nreservationSummary.(class)=com.apress.springrecipes.court.web.view.PdfReservationSummary\n\
  ```\n\n请注意，这个文件——`secondaryviews.properties`——需要在其自己的 `ResourceBundleViewResolver`\
  \ 解析器中进行配置。属性名称——`reservationSummary`——对应于控制器返回的视图名称。`ContentNegotiatingViewResolver`\
  \ 解析器的任务是根据用户的请求确定使用这些类中的哪一个。一旦确定，相应类的执行将生成一个 PDF 或 XLS 文件。\n\n\n\n#### 创建基于日期的\
  \ PDF 和 XLS 文件名\n\n当用户通过以下任一 URL 请求 PDF 或 XLS 文件时：\n\n```\nhttp://localhost:8080/court/reservationSummary.pdf?date=2008-01-14\n\
  http://localhost:8080/court/reservationSummary.xls?date=2008-02-24\n```\n\n浏览器会向用户弹出类似“保存为\
  \ reservationSummary.pdf？”或“保存为 reservationSummary.xls？”的提示。这种约定基于用户请求资源的 URL。然而，考虑到用户还在\
  \ URL 中提供了日期，一个很好的功能是可以自动弹出“保存为 ReservationSummary_2009_01_24.xls？”或“保存为 ReservationSummary_2009_02_24.xls？”这样的提示。这可以通过应用一个拦截器来重写返回的\
  \ URL 来实现。以下代码说明了这个拦截器：\n\n```\npackage com.apress.springrecipes.court.web\n...\n\
  public class ExtensionInterceptor extends HandlerInterceptorAdapter {\npublic void\
  \ postHandle(HttpServletRequest request,\nHttpServletResponse response, Object handler,\n\
  ModelAndView modelAndView) throws Exception {\n// 请求中存在报告日期\nString reportName =\
  \ null;\nString reportDate = request.getQueryString().replace(\"date=\",\"\").replace(\"\
  -\",\"_\");\nif(request.getServletPath().endsWith(\".pdf\")) {\nreportName= \"ReservationSummary_\"\
  \ + reportDate + \".pdf\";\n}\nif(request.getServletPath().endsWith(\".xls\")) {\n\
  reportName= \"ReservationSummary_\" + reportDate + \".xls\";\n}\nif (reportName\
  \ != null) {\nresponse.setHeader(\"Content-Disposition\",\"attachment; filename=\"\
  +reportName);\n}\n}\n}\n```\n\n该拦截器会提取整个 URL，如果其中包含 `.pdf` 或 `.xls` 扩展名。如果检测到此类扩展名，它会以\
  \ `ReservationSummary_<report_date>.<.pdf|.xls>` 的形式创建返回文件名。为了确保用户收到这种形式的下载提示，HTTP\
  \ 头 `Content-Disposition` 会被设置为该文件名格式。\n\n要部署此拦截器，并使其仅应用于负责生成 PDF 和 XLS 文件的控制器对应的\
  \ URL，我们建议您查阅配方 3-3，其中包含了此特定配置以及关于拦截器类的更多详细信息。\n\n**在拦截器中进行内容协商和设置 HTTP 头**\n\n\
  尽管此应用程序使用 `ContentNegotiatingViewResolver` 解析器来选择适当的视图，但修改返回 URL 的过程超出了视图解析器的范围。因此，有必要使用拦截器来手动检查请求扩展名，并设置必要的\
  \ HTTP 头以修改传出 URL。\n\n## 总结\n\n在本章中，您学习了如何使用 Spring MVC 框架开发 Java Web 应用程序。Spring\
  \ MVC 的核心组件是 `DispatcherServlet`，它充当前端控制器，将请求分派给适当的处理器来处理请求。在 Spring MVC 中，控制器是使用\
  \ `@Controller` 注解修饰的标准 Java 类。通过各个配方，您学习了如何利用 Spring MVC 控制器中使用的其他注解，其中包括用于指示访问\
  \ URL 的 `@RequestMapping`、用于自动注入 Bean 引用的 `@Autowired`，以及用于在用户会话中维护对象的 `@SessionAttributes`\
  \ 等。您还学习了如何将拦截器集成到应用程序中；这允许您在控制器中更改请求和响应对象。此外，您还探讨了 Spring MVC 如何支持表单处理，包括使用 Spring\
  \ 验证器和 JSR-303 Bean 验证标准进行数据验证。您还探讨了 Spring MVC 如何整合 SpEL 以简化某些配置任务，以及 Spring MVC\
  \ 如何为不同的表示技术支持不同类型的视图。最后，您还学习了 Spring 如何支持内容协商，以根据请求的扩展名确定视图。\n\n"
- "# 4. Spring REST\n\n在本章中，您将学习 Spring 如何处理表述性状态转移（通常以其缩写 REST 指代）。自 2000 年 Roy Fielding（[`http://en.wikipedia.org/wiki/Roy_Fielding`](http://en.wikipedia.org/wiki/Roy_Fielding)）提出该术语以来，REST\
  \ 对 Web 应用程序产生了重要影响。\n\n基于 Web 超文本传输协议（HTTP）的基础，REST 所提出的架构在 Web 服务的实现中变得越来越流行。Web\
  \ 服务本身已成为 Web 上大量机器间通信的基石。正是许多组织做出的碎片化技术选择（例如 Java、Python、Ruby、.NET）使得需要一种能够弥合这些不同环境之间差距的解决方案。例如，如何让用\
  \ Java 支持的应用程序中的信息被用 Python 编写的应用程序访问？Java 应用程序如何从用 .NET 编写的应用程序中获取信息？Web 服务填补了这一空白。\n\
  \n实现 Web 服务有多种方法，但 RESTful Web 服务已成为 Web 应用程序中最常见的选择。它们被一些最大的互联网站点（例如 Google 和 Yahoo）用来提供对其信息的访问，支持浏览器发出的\
  \ Ajax 调用，并为新闻源（例如 RSS）等信息分发提供基础。\n\n在本章中，您将学习 Spring 应用程序如何使用 REST，以便您能够使用这种流行的方法来访问和提供信息。\n\
  \n## 4-1. 使用 REST 服务发布 XML\n\n### 问题\n\n您希望使用 Spring 发布一个基于 XML 的 REST 服务。\n\n###\
  \ 解决方案\n\n在 Spring 中设计 REST 服务有两种可能性。一种涉及将应用程序的数据作为 REST 服务发布；另一种涉及从第三方 REST 服务访问数据以在应用程序中使用。本配方描述如何将应用程序的数据作为\
  \ REST 服务发布。配方 4-2 描述如何从第三方 REST 服务访问数据。将应用程序的数据作为 REST 服务发布主要围绕使用 Spring MVC 注解\
  \ `@RequestMapping` 和 `@PathVariable`。通过使用这些注解来修饰 Spring MVC 处理器方法，Spring 应用程序能够将应用程序的数据作为\
  \ REST 服务发布。\n\n此外，Spring 支持一系列生成 REST 服务负载的机制。本配方将探讨最简单的机制，即使用 Spring 的 `MarshallingView`\
  \ 类。随着本章配方的深入，您将了解 Spring 支持的用于生成 REST 服务负载的更高级机制。\n\n### 工作原理\n\n将 Web 应用程序的数据作为\
  \ REST 服务发布（或者用 Web 服务术语更技术性地称为“创建端点”）与您在第 3 章中探讨的 Spring MVC 紧密相关。由于 Spring MVC\
  \ 依赖注解 `@RequestMapping` 来修饰处理器方法并定义访问点（即 URL），因此它是定义 REST 服务端点的首选方式。\n\n\n\n####\
  \ 使用 MarshallingView 生成 XML\n\n以下代码展示了一个 Spring MVC 控制器类，其中包含一个定义 REST 服务端点的处理方法：\n\
  \n```\npackage com.apress.springrecipes.court.web;\nimport com.apress.springrecipes.court.domain.Members;\n\
  import com.apress.springrecipes.court.service.MemberService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\n@Controller\npublic\
  \ class RestMemberController {\nprivate final MemberService memberService;\n@Autowired\n\
  public RestMemberController(MemberService memberService) {\nsuper();\nthis.memberService=memberService;\n\
  }\n@RequestMapping(\"/members\")\npublic String getRestMembers(Model model) {\n\
  Members members = new Members();\nmembers.addMembers(memberService.findAll());\n\
  model.addAttribute(\"members\", members);\nreturn \"membertemplate\";\n}\n}\n```\n\
  \n通过使用 `@RequestMapping(\"/members\")` 装饰控制器的处理方法，可以在 `host_name/[app-name]/members`\
  \ 访问 REST 服务端点。你可以观察到控制权被移交给了名为 `membertemplate` 的逻辑视图。以下代码展示了用于定义名为 `membertemplate`\
  \ 的逻辑视图的声明：\n\n```\n@Configuration\n@EnableWebMvc\n@ComponentScan(basePackages =\
  \ \"com.apress.springrecipes.court\")\npublic class CourtRestConfiguration {\n@Bean\n\
  public View membertemplate() {\nreturn new MarshallingView(jaxb2Marshaller());\n\
  }\n@Bean\npublic Marshaller jaxb2Marshaller() {\nJaxb2Marshaller marshaller = new\
  \ Jaxb2Marshaller();\nmarshaller.setClassesToBeBound(Members.class, Member.class);\n\
  return marshaller;\n}\n@Bean\npublic ViewResolver viewResolver() {\nreturn new BeanNameViewResolver();\n\
  }\n}\n```\n\n`membertemplate` 视图被定义为 `MarshallingView` 类型，这是一个通用类，允许使用编组器（marshaller）来渲染响应。编组是将对象的内存表示转换为数据格式的过程。因此，在这个特定案例中，编组器负责将\
  \ `Members` 和 `Member` 对象转换为 XML 数据格式。`MarshallingView` 使用的编组器是 Spring 提供的一系列 XML\
  \ 编组器之一——`Jaxb2Marshaller`。Spring 提供的其他编组器包括 `CastorMarshaller`、`JibxMarshaller`、`XmlBeansMarshaller`\
  \ 和 `XStreamMarshaller`。\n\n编组器本身也需要配置。我们选择使用 `Jaxb2Marshaller` 编组器，因为它简单且基于 Java\
  \ 架构的 XML 绑定（JAXB）。然而，如果你更习惯使用 Castor XML 框架，你可能会发现使用 `CastorMarshaller` 更容易；如果你更习惯使用\
  \ XStream，你可能会发现使用 `XStreamMarshaller` 更容易；其他可用的编组器情况类似。\n\n`Jaxb2Marshaller` 编组器需要配置一个名为\
  \ `classesToBeBound` 的属性或一个名为 `contextPath` 的属性。对于 `classesToBeBound`，分配给此属性的类指示将要转换为\
  \ XML 的类（即对象）结构。以下代码展示了分配给 `Jaxb2Marshaller` 编组器的 `Members` 和 `Member` 类：\n\n```\n\
  package com.apress.springrecipes.court.domain;\nimport javax.xml.bind.annotation.XmlRootElement;\n\
  @XmlRootElement\npublic class Member {\nprivate String name;\nprivate String phone;\n\
  private String email;\npublic String getEmail() {\nreturn email;\n}\npublic String\
  \ getName() {\nreturn name;\n}\npublic String getPhone() {\nreturn phone;\n}\npublic\
  \ void setEmail(String email) {\nthis.email = email;\n}\npublic void setName(String\
  \ name) {\nthis.name = name;\n}\npublic void setPhone(String phone) {\nthis.phone\
  \ = phone;\n}\n}\n```\n\n以下是 `Members` 类：\n\n```\npackage com.apress.springrecipes.court.domain;\n\
  import javax.xml.bind.annotation.XmlAccessType;\nimport javax.xml.bind.annotation.XmlAccessorType;\n\
  import javax.xml.bind.annotation.XmlElement;\nimport javax.xml.bind.annotation.XmlRootElement;\n\
  import java.util.ArrayList;\nimport java.util.Collection;\nimport java.util.List;\n\
  @XmlRootElement\n@XmlAccessorType(XmlAccessType.FIELD)\npublic class Members {\n\
  @XmlElement(name=\"member\")\nprivate List members = new ArrayList();\npublic List\
  \ getMembers() {\nreturn members;\n}\npublic void setMembers(List members) {\nthis.members\
  \ = members;\n}\npublic void addMembers(Collection members) {\nthis.members.addAll(members);\n\
  }\n}\n```\n\n注意 `Member` 类是一个用 `@XmlRootElement` 注解修饰的 POJO。此注解允许 `Jaxb2Marshaller`\
  \ 编组器检测类（即对象）的字段，并将其转换为 XML 数据（例如，`name=John` 转换为 `<name>john</name>`，`email=john@doe.com`\
  \ 转换为 `<email>john@doe.com</email>`）。\n\n回顾一下所描述的内容，这意味着当向 `http://[host_name]//app-name]/members.xml`\
  \ 形式的 URL 发出请求时，相应的处理程序负责创建一个 `Members` 对象，然后将其传递给名为 `membertemplate` 的逻辑视图。根据后一个视图的定义，使用编组器将\
  \ `Members` 对象转换为 XML 负载，并返回给 REST 服务的请求方。REST 服务返回的 XML 负载如下代码所示：\n\n```\n\nmarten@deinum.biz\n\
  Marten Deinum\n00-31-1234567890\n\njohn@doe.com\nJohn Doe\n1-800-800-800\n\njane@doe.com\n\
  Jane Doe\n1-801-802-803\n\n```\n\n这个 XML 负载代表了一种生成 REST 服务响应的简单方法。随着本章示例的深入，你将学习更复杂的方法，例如能够创建广泛使用的\
  \ REST 服务负载，如 RSS、Atom 和 JSON。\n\n如果你仔细查看上一段中描述的 REST 服务端点或 URL，你会注意到它有一个 `.xml`\
  \ 扩展名。如果你尝试其他扩展名——甚至省略扩展名——这个特定的 REST 服务可能不会被触发。这最后一种行为直接与 Spring MVC 及其处理视图解析的方式有关，与\
  \ REST 服务本身无关。\n\n默认情况下，由于与此特定 REST 服务处理方法关联的视图返回 XML，因此它由 `.xml` 扩展名触发。这允许同一个处理方法支持多个视图。例如，对于像\
  \ `http://[host_name]/[app-name]/members.pdf` 这样的请求，可以方便地以 PDF 文档形式返回相同的信息；对于像 `http://[host_name]/[app-name]/members.html`\
  \ 这样的请求，可以以 HTML 形式返回内容；或者对于像 `http://[host_name]/[app-name]/members.xml` 这样的请求，可以为\
  \ REST 请求返回 XML。\n\n那么，对于没有 URL 扩展名的请求，比如 `http://[host_name]/[app-name]/members?`\
  \ 会发生什么？这也很大程度上取决于 Spring MVC 的视图解析。为此，Spring MVC 支持一种称为内容协商的过程，通过该过程，可以根据请求的扩展名或\
  \ HTTP 标头来确定视图。\n\n由于 REST 服务请求通常带有 `Accept: application/xml` 形式的 HTTP 标头，配置为使用内容协商的\
  \ Spring MVC 可以确定为此类请求提供 XML（REST）负载，即使请求没有扩展名。这也允许基于 HTTP 标头，以 HTML、PDF 和 XLS 等格式发出无扩展名的请求。第\
  \ 3 章的配方 3-7 讨论了内容协商。\n\n\n\n#### 使用 @ResponseBody 生成 XML\n\n使用 `MarshallingView`\
  \ 生成 XML 是产生结果的一种方式；然而，当你希望同一份数据（例如 `Member` 对象列表）拥有多种表示形式（比如 JSON）时，添加另一个视图会是一项繁琐的任务。相反，你可以依赖\
  \ Spring MVC 的 `HttpMessageConverters` 将对象转换为用户请求的表示形式。以下代码展示了 `RestMemberController`\
  \ 所做的修改：\n\n```\n@Controller\npublic class RestMemberController {\n...\n@RequestMapping(\"\
  /members\")\n@ResponseBody\npublic Members getRestMembers() {\nMembers members =\
  \ new Members();\nmembers.addMembers(memberService.findAll());\nreturn members;\n\
  }\n}\n```\n\n第一个变化是，你现在额外使用 `@ResponseBody` 注解了控制器方法。这个注解告诉 Spring MVC，该方法的结果应被用作响应的主体。因为你想要\
  \ XML，所以这个编组工作由 Spring 提供的 `Jaxb2RootElementHttpMessageConverter` 类完成。第二个变化是，由于使用了\
  \ `@ResponseBody` 注解，你不再需要视图名称，而可以直接返回 `Members` 对象。\n\n提示\n\n当使用 Spring 4 或更高版本时，除了使用\
  \ `@ResponseBody` 注解方法外，你也可以用 `@RestController` 注解你的控制器来替代 `@Controller`，这会产生相同的结果。如果你的单个控制器有多个方法，这种方式尤其方便。\n\
  \n这些修改还允许你清理配置，因为你不再需要 `MarshallingView` 和 `Jaxb2Marshaller`。\n\n```\npackage com.apress.springrecipes.court.web.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.springrecipes.court\"\
  )\npublic class CourtRestConfiguration {}\n```\n\n当应用程序部署后，你从 `http://localhost:8080/court/members.xml`\
  \ 请求成员信息时，它将产生与之前相同的结果。\n\n```\n\nmarten@deinum.biz\nMarten Deinum\n00-31-1234567890\n\
  \njohn@doe.com\nJohn Doe\n1-800-800-800\n\njane@doe.com\nJane Doe\n1-801-802-803\n\
  \n```\n\n#### 使用 @PathVariable 限制结果\n\nREST 服务请求带有参数是很常见的。这样做是为了限制或过滤服务的负载。例如，形如\
  \ `http://[host_name]/[app-name]/member/353/` 的请求可用于专门检索成员 353 的信息。另一种变体是像 `http://[host_name]/[app-name]/reservations/07-07-2010/`\
  \ 这样的请求，用于检索 2010 年 7 月 7 日当天的预订信息。\n\n要在 Spring 中使用参数构建 REST 服务，你需要使用 `@PathVariable`\
  \ 注解。根据 Spring MVC 的约定，`@PathVariable` 注解作为输入参数添加到处理器方法中，以便在处理器方法体内使用。以下代码片段展示了使用\
  \ `@PathVariable` 注解的 REST 服务处理器方法：\n\n```\nimport org.springframework.web.bind.annotation.PathVariable;\n\
  @Controller\npublic class RestMemberController {\n...\n@RequestMapping(\"/member/{memberid}\"\
  )\n@ResponseBody\npublic Member getMember(@PathVariable(\"memberid\") long memberID)\
  \ {\nreturn memberService.find(memberID);\n}\n}\n```\n\n注意 `@RequestMapping` 的值包含\
  \ `{memberid}`。被 `{ }` 包围的值用于指示 URL 参数是变量。进一步注意，处理器方法定义时带有输入参数 `@PathVariable(\"\
  memberid\") long memberID`。这个最后的声明将 URL 中任何 `memberid` 的值关联起来，并将其赋值给一个名为 `memberID`\
  \ 的变量，该变量可在处理器方法内部访问。因此，形如 `/member/353/` 和 `/member/777/` 的 REST 端点将由这个最后的处理器方法处理，其中\
  \ `memberID` 变量分别被赋值为 `353` 和 `777`。在处理器方法内部，可以通过 `memberID` 变量对成员 353 和 777 进行适当的查询，并将结果作为\
  \ REST 服务的负载返回。\n\n向 `http://localhost:8080/court/member/2` 发送请求将返回 ID 为 2 的成员的\
  \ XML 表示。\n\n```\n\njohn@doe.com\nJohn Doe\n1-800-800-800\n\n```\n\n除了支持 `{ }` 表示法之外，还可以使用通配符（`*`）表示法来定义\
  \ REST 端点。当设计团队选择使用富有表现力的 URL（通常称为漂亮 URL）或采用搜索引擎优化（SEO）技术使 REST URL 对搜索引擎友好时，通常会采用这种方式。以下代码片段展示了使用通配符表示法声明\
  \ REST 服务的示例：\n\n```\n@RequestMapping(\"/member/*/{memberid}\")\n@ResponseBody\n\
  public Member getMember(@PathVariable(\"memberid\") long memberID) { ... }\n```\n\
  \n在这种情况下，添加通配符对 REST 服务执行的逻辑没有任何影响。但它会匹配形如 `/member/John+Smith/353/` 和 `/member/Mary+Jones/353/`\
  \ 的端点请求，这对最终用户的可读性和 SEO 有重要影响。\n\n同样值得一提的是，数据绑定可以在 REST 端点处理器方法的定义中使用。以下代码片段展示了使用数据绑定声明\
  \ REST 服务的示例：\n\n```\n@InitBinder\npublic void initBinder(WebDataBinder binder)\
  \ {\nSimpleDateFormat dateFormat = new SimpleDateFormat(\"yyyy-MM-dd\");\nbinder.registerCustomEditor(Date.class,\
  \ new CustomDateEditor(dateFormat, false));\n}\n@RequestMapping(\"/reservations/{date}\"\
  )\npublic void getReservation(@PathVariable(\"date\") Date resDate) { ... }\n```\n\
  \n在这种情况下，形如 `http://[host_name]/[app-name]/reservations/07-07-2010/` 的请求将由这个最后的处理器方法匹配，值\
  \ `07-07-2010` 作为变量 `resDate` 传入处理器方法，并可用于过滤 REST Web 服务的负载。\n\n#### 使用 ResponseEntity\
  \ 通知客户端\n\n用于检索单个 `Member` 实例的端点要么返回一个有效的成员，要么什么都不返回。这两种情况都会导致请求向客户端发送 HTTP 响应码\
  \ 200，即表示“成功”。然而，这可能不是你的用户所期望的。在处理资源时，你应该告知他们资源无法找到的事实。理想情况下，你会希望返回 HTTP 响应码 404，表示“未找到”。以下代码片段展示了修改后的\
  \ `getMember` 方法：\n\n```\npackage com.apress.springrecipes.court.web;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.http.ResponseEntity;\n...\n@Controller\npublic class\
  \ RestMemberController {\n...\n@RequestMapping(\"/member/{memberid}\")\n@ResponseBody\n\
  public ResponseEntity getMember(@PathVariable(\"memberid\") long memberID) {\nMember\
  \ member = memberService.find(memberID);\nif (member != null) {\nreturn new ResponseEntity(member,\
  \ HttpStatus.OK);\n}\nreturn new ResponseEntity(HttpStatus.NOT_FOUND);\n}\n}\n```\n\
  \n该方法的返回值已更改为 `ResponseEntity<Member>`。Spring MVC 中的 `ResponseEntity` 类充当一个包装器，用于将对象作为结果的主体与\
  \ HTTP 状态码一起使用。当你找到一个 `Member` 时，它会与 `HttpStatus.OK` 一起返回，这对应于 HTTP 状态码 200。当没有结果时，你返回\
  \ `HttpStatus.NOT_FOUND`，对应于 HTTP 状态码 404，表示“未找到”。\n\n## 4-2\\. 使用 REST 服务发布 JSON\n\
  \n### 问题\n\n你想使用 Spring 发布一个基于 JavaScript 对象表示法（JSON）的 REST 服务。\n\n\n\n### 解决方案\n\
  \nJSON 已成为 REST 服务最常用的负载格式。然而，与大多数依赖 XML 标记的 REST 服务负载不同，JSON 的特殊之处在于其内容是基于 JavaScript\
  \ 语言的一种特殊表示法。在本方案中，除了依赖 Spring 的 REST 支持外，你还需要使用 Spring 自带的 `MappingJackson2JsonView`\
  \ 类来简化 JSON 内容的发布。\n\n注意\n\n`MappingJackson2JsonView` 类依赖于 Jackson JSON 处理器库（版本\
  \ 2），该库可从 [`http://wiki.fasterxml.com/JacksonDownload`](http://wiki.fasterxml.com/JacksonDownload)\
  \ 下载。如果你使用 Maven 或 Gradle，只需将 Jackson 库作为依赖项添加到项目的构建文件中即可。\n\n如果你的 Spring 应用采用了\
  \ Ajax 设计，那么你很可能会设计以 JSON 作为负载的 REST 服务。这主要是因为浏览器的处理能力有限。虽然浏览器能够处理并提取发布 XML 负载的\
  \ REST 服务中的信息，但效率并不高。而通过改用基于浏览器原生解释语言（JavaScript）的 JSON 格式来传递负载，数据的处理和提取效率会更高。与\
  \ RSS 和 Atom 这类标准格式不同，JSON 除了需要遵循其语法（稍后你将了解）外，没有特定的结构要求。因此，JSON 元素的负载结构通常需要与负责应用\
  \ Ajax 设计的团队成员协商确定。\n\n### 工作原理\n\n首先，你需要确定要发布为 JSON 负载的信息。这些信息可以存储在关系数据库或文本文件中，通过\
  \ JDBC 或 ORM 访问，甚至可以是 Spring Bean 或其他类型的构造体的一部分。描述如何获取这些信息超出了本方案的范围，因此我们假设你将采用任何你认为合适的方式来访问它。如果你不熟悉\
  \ JSON，以下代码片段展示了该格式的一个示例：\n\n```\n{\n\"glossary\": {\n\"title\": \"example glossary\"\
  ,\n\"GlossDiv\": {\n\"title\": \"S\",\n\"GlossList\": {\n\"GlossEntry\": {\n\"ID\"\
  : \"SGML\",\n\"SortAs\": \"SGML\",\n\"GlossTerm\": \"Standard Generalized Markup\
  \ Language\",\n\"Acronym\": \"SGML\",\n\"Abbrev\": \"ISO 8879:1986\",\n\"GlossDef\"\
  : {\n\"para\": \"A meta-markup language, used to create markup languages such as\
  \ DocBook.\",\n\"GlossSeeAlso\": [\"GML\", \"XML\"]\n},\n\"GlossSee\": \"markup\"\
  \n}\n}\n}\n}\n}\n```\n\n如你所见，JSON 负载由文本和分隔符（如 `{`、`}`、`[`、`]`、`:` 和 `\"`）组成。我们不会深入探讨使用哪种分隔符的细节，但可以明确的是，与\
  \ XML 格式相比，这种语法使得 JavaScript 引擎更容易访问和操作数据。\n\n#### 使用 MappingJackson2JsonView 生成\
  \ XML\n\n由于你已经在方案 4-1 和 4-3 中探索了如何使用 REST 服务发布数据，我们将直奔主题，展示在 Spring MVC 控制器中实现此过程所需的实际处理方法。\n\
  \n```\n@RequestMapping(\"/members\")\npublic String getRestMembers(Model model)\
  \ {\nMembers members = new Members();\nmembers.addMembers(memberService.findAll());\n\
  model.addAttribute(\"members\", members);\nreturn \"jsonmembertemplate\";\n}\n```\n\
  \n你可能注意到，这与方案 4-1 中提到的控制器方法非常相似。唯一的区别是你返回了不同的视图名称。这里返回的视图名称 `jsonmembertemplate`\
  \ 不同，它映射到一个 `MappingJackson2JsonView` 视图。你需要在配置类中配置此视图。\n\n```\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.springrecipes.court\"\
  )\npublic class CourtRestConfiguration {\n...\n@Bean\npublic View jsonmembertemplate()\
  \ {\nMappingJackson2JsonView view = new MappingJackson2JsonView();\nview.setPrettyPrint(true);\n\
  return view;\n}\n}\n```\n\n`MappingJackson2JsonView` 视图使用 Jackson2 库在对象与 JSON 之间进行转换。它使用\
  \ Jackson2 的 `ObjectMapper` 实例来完成转换。当请求发送到 `http://localhost:8080/court/members.json`\
  \ 时，控制器方法将被调用，并返回一个 JSON 表示。\n\n```\n{\n\"members\" : {\n\"members\" : [ {\n\"name\"\
  \ : \"Marten Deinum\",\n\"phone\" : \"00-31-1234567890\",\n\"email\" : \"marten@deinum.biz\"\
  \n}, {\n\"name\" : \"John Doe\",\n\"phone\" : \"1-800-800-800\",\n\"email\" : \"\
  john@doe.com\"\n}, {\n\"name\" : \"Jane Doe\",\n\"phone\" : \"1-801-802-803\",\n\
  \"email\" : \"jane@doe.com\"\n} ]\n}\n}\n```\n\n实际上，每次对 `/members` 或 `/members.*`（例如，`/members.xml`\
  \ 也会生成 JSON）的调用都会生成此 JSON。现在，让我们将方案 4-1 中的方法和视图添加到控制器中。\n\n```\n@Controller\npublic\
  \ class RestMemberController {\n...\n@RequestMapping(value=\"/members\", produces=MediaType.APPLICATION_XML_VALUE)\n\
  public String getRestMembersXml(Model model) {\nMembers members = new Members();\n\
  members.addMembers(memberService.findAll());\nmodel.addAttribute(\"members\", members);\n\
  return \"xmlmembertemplate\";\n}\n@RequestMapping(value=\"/members\", produces=\
  \ MediaType.APPLICATION_JSON_VALUE)\npublic String getRestMembersJson(Model model)\
  \ {\nMembers members = new Members();\nmembers.addMembers(memberService.findAll());\n\
  model.addAttribute(\"members\", members);\nreturn \"jsonmembertemplate\";\n}\n}\n\
  ```\n\n现在你有了 `getMembersXml` 方法和 `getMembersJson` 方法；两者基本相同，区别在于它们返回不同的视图名称。请注意\
  \ `@RequestMapping` 注解上的 `produces` 属性。它用于决定调用哪个方法：`/members.xml` 现在将生成 XML，而 `/members.json`\
  \ 将生成 JSON。\n\n虽然这种方法可行，但为不同支持的视图类型复制所有方法对于企业级应用来说并非可行的解决方案。你可以创建一个辅助方法来减少重复，但由于\
  \ `@RequestMapping` 注解的差异，你仍然需要编写大量样板代码。\n\n\n\n#### 使用 @ResponseBody 生成 JSON\n\n\
  使用 `MappingJackson2JsonView` 生成 JSON 是产生结果的一种方式；然而，正如上一节所述，这种方式可能比较麻烦，尤其是在支持多种视图类型的情况下。相反，你可以依赖\
  \ Spring MVC 的 `HttpMessageConverters` 将对象转换为用户请求的表示形式。以下代码展示了 `RestMemberController`\
  \ 所做的修改：\n\n```\n@Controller\npublic class RestMemberController {\n...\n@RequestMapping(\"\
  /members\")\n@ResponseBody\npublic Members getRestMembers() {\nMembers members =\
  \ new Members();\nmembers.addMembers(memberService.findAll());\nreturn members;\n\
  }\n}\n```\n\n第一个变化是，你现在额外使用 `@ResponseBody` 注解了控制器方法。这个注解告诉 Spring MVC，该方法的结果应作为响应的主体。因为你想要\
  \ JSON，所以这个编组工作由 Spring 提供的 `Jackson2JsonMessageConverter` 类完成。第二个变化是，由于使用了 `@ResponseBody`\
  \ 注解，你不再需要视图名称，而可以直接返回 `Members` 对象。\n\n提示\n\n当使用 Spring 4 或更高版本时，除了用 `@ResponseBody`\
  \ 注解方法外，你还可以用 `@RestController` 注解你的控制器，而不是 `@Controller`，这将产生相同的结果。如果你有一个包含多个方法的单一控制器，这尤其方便。\n\
  \n这些变化也允许你清理配置，因为你不再需要 `MappingJackson2JsonView`。\n\n```\npackage com.apress.springrecipes.court.web.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.springrecipes.court\"\
  )\npublic class CourtRestConfiguration {}\n```\n\n当应用程序部署后，你从 `http://localhost:8080/court/members.json`\
  \ 请求成员信息时，它将产生与之前相同的结果。\n\n```\n{\n\"members\" : {\n\"members\" : [ {\n\"name\"\
  \ : \"Marten Deinum\",\n\"phone\" : \"00-31-1234567890\",\n\"email\" : \"marten@deinum.biz\"\
  \n}, {\n\"name\" : \"John Doe\",\n\"phone\" : \"1-800-800-800\",\n\"email\" : \"\
  john@doe.com\"\n}, {\n\"name\" : \"Jane Doe\",\n\"phone\" : \"1-801-802-803\",\n\
  \"email\" : \"jane@doe.com\"\n} ]\n}\n}\n```\n\n你可能已经注意到，`RestMemberController`\
  \ 和 `CourtRestConfiguration` 现在与配方 4-1 中的相同。当调用 `http://localhost:8080/court/members.xml`\
  \ 时，你将获得 XML。\n\n在没有额外配置的情况下，这是如何实现的？Spring MVC 会检测类路径上的内容；当它自动检测到 JAXB 2、Jackson\
  \ 和 Rome（参见配方 4-4）时，它会为可用的技术注册相应的 `HttpMessageConverter`。\n\n#### 使用 GSON 生成 JSON\n\
  \n到目前为止，你一直在使用 Jackson 从对象生成 JSON；另一个流行的库是 GSON，Spring 对其提供了开箱即用的支持。要使用 GSON，你需要将其添加到类路径中（代替\
  \ Jackson），然后它将被用来生成 JSON。\n\n当使用 Maven 时，添加以下依赖：\n\n```\ncom.google.code.gson\n\
  gson\n2.8.0\n\n```\n\n当使用 Gradle 时，添加以下内容：\n\n```\ncompile 'com.google.code.gson:gson:2.8.0'\n\
  ```\n\n就像使用 Jackson 一样，这就是使用 GSON 实现 JSON 序列化所需的全部操作。如果你启动应用程序并调用 `http://localhost:8080/court/members.json`，你仍然会收到\
  \ JSON，但现在是通过 GSON 生成的。\n\n## 4-3. 使用 Spring 访问 REST 服务\n\n### 问题\n\n你想从第三方（例如 Google、Yahoo\
  \ 或其他业务合作伙伴）访问 REST 服务，并在 Spring 应用程序中使用其负载。\n\n### 解决方案\n\n在 Spring 应用程序中访问第三方\
  \ REST 服务主要围绕使用 Spring 的 `RestTemplate` 类。`RestTemplate` 类的设计原则与许多其他 Spring `*Template`\
  \ 类（例如 `JdbcTemplate`、`JmsTemplate`）相同，提供了一种简化的方法，并带有执行耗时任务的默认行为。这意味着在 Spring 应用程序中，调用\
  \ REST 服务和使用其返回负载的过程得到了简化。\n\n\n\n### 工作原理\n\n在描述 `RestTemplate` 类的特性之前，有必要先探究 REST\
  \ 服务的生命周期，以便了解 `RestTemplate` 类实际执行的工作。通过浏览器最能探究 REST 服务的生命周期，因此请在工作站上打开你常用的浏览器开始操作。首先需要一个\
  \ REST 服务端点。你将复用配方 4-2 中创建的端点。该端点应可通过 `http://localhost:8080/court/members.xml`（或\
  \ `.json`）访问。当你在浏览器中加载这个 REST 服务端点时，浏览器会执行一个 GET 请求，这是 REST 服务支持的最流行的 HTTP 请求之一。加载\
  \ REST 服务后，浏览器会显示类似如下的响应负载：\n\n```\n\nmarten@deinum.biz\nMarten Deinum\n00-31-1234567890\n\
  \njohn@doe.com\nJohn Doe\n1-800-800-800\n\njane@doe.com\nJane Doe\n1-801-802-803\n\
  \n```\n\n上述负载代表一个格式良好的 XML 片段，这与大多数 REST 服务的响应一致。负载的实际含义高度依赖于具体的 REST 服务。在此例中，XML\
  \ 标签（`<members>`、`<member>` 等）是由你自行定义的，而每个 XML 标签内包含的字符数据则代表与 REST 服务请求相关的信息。\n\n\
  REST 服务消费者（即你）的任务是了解 REST 服务的负载结构（有时称为词汇表），以便正确处理其信息。尽管上述 REST 服务依赖于可视为自定义词汇表的内容，但一系列\
  \ REST 服务通常依赖于标准化词汇表（例如 RSS），这使得 REST 服务负载的处理更加统一。此外，值得注意的是，某些 REST 服务会提供 Web 应用描述语言（WADL）契约，以方便负载的发现和消费。\n\
  \n现在你已经熟悉了使用浏览器进行 REST 服务的生命周期，接下来可以看看如何使用 Spring 的 `RestTemplate` 类将 REST 服务的负载整合到\
  \ Spring 应用中。鉴于 `RestTemplate` 类专为调用 REST 服务而设计，其主要方法与 REST 的基础——HTTP 协议的方法（HEAD、GET、POST、PUT、DELETE\
  \ 和 OPTIONS）紧密相关，这并不令人意外。表 4-1 列出了 `RestTemplate` 类支持的主要方法。\n\n表 4-1. 基于 HTTP 协议请求方法的\
  \ RestTemplate 类方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `headForHeaders(String, Object...)`\
  \ | 执行 HTTP HEAD 操作 |\n| `getForObject(String, Class, Object...)` | 执行 HTTP GET\
  \ 操作，并将结果作为指定类的类型返回 |\n| `getForObject(String, Class, Object...)` | 执行 HTTP GET\
  \ 操作，并返回一个 `ResponseEntity` |\n| `postForLocation(String, Object, Object...)` |\
  \ 执行 HTTP POST 操作，并返回 location 头的值 |\n| `postForObject(String, Object, Class, Object...)`\
  \ | 执行 HTTP POST 操作，并将结果作为指定类的类型返回 |\n| `postForEntity(String, Object, Class, Object...)`\
  \ | 执行 HTTP POST 操作，并返回一个 `ResponseEntity` |\n| `put(String, Object, Object...)`\
  \ | 执行 HTTP PUT 操作 |\n| `delete(String, Object...)` | 执行 HTTP DELETE 操作 |\n| `optionsForAllow(String,\
  \ Object...)` | 执行 HTTP OPTIONS 操作 |\n| `execute(String, HttpMethod, RequestCallback,\
  \ ResponseExtractor, Object...)` | 可执行除 CONNECT 之外的任何 HTTP 操作 |\n\n如表 4-1 所示，`RestTemplate`\
  \ 类的方法以一系列 HTTP 协议方法（包括 HEAD、GET、POST、PUT、DELETE 和 OPTIONS）为前缀。此外，`execute` 方法作为一个通用方法，可以执行任何\
  \ HTTP 操作，包括更冷门的 HTTP 协议 TRACE 方法，但不包括 CONNECT 方法（`execute` 方法底层使用的 `HttpMethod`\
  \ 枚举不支持该方法）。请注意，REST 服务中最常用的 HTTP 方法是 GET，因为它代表一种安全的信息获取操作（即不修改任何数据）。另一方面，PUT、POST\
  \ 和 DELETE 等 HTTP 方法旨在修改提供者的信息，因此 REST 服务提供者支持它们的可能性较小。对于需要进行数据修改的情况，许多提供者会选择 SOAP\
  \ 协议，这是使用 REST 服务的一种替代机制。\n\n现在你已经了解了 `RestTemplate` 类的方法，接下来可以继续调用之前用浏览器调用的同一个\
  \ REST 服务，只不过这次使用 Spring 框架的 Java 代码。以下代码展示了一个访问 REST 服务并将其内容输出到 `System.out` 的类：\n\
  \n```\npackage com.apress.springrecipes.court;\nimport org.springframework.web.client.RestTemplate;\n\
  public class Main {\npublic static void main(String[] args) throws Exception {\n\
  final String uri = \"http://localhost:8080/court/members.json\";\nRestTemplate restTemplate\
  \ = new RestTemplate();\nString result = restTemplate.getForObject(uri, String.class);\n\
  System.out.println(result);\n}\n}\n```\n\n警告\n\n某些 REST 服务提供者会根据请求方限制对其数据源的访问。通常，拒绝访问的依据是请求中存在的数据（例如\
  \ HTTP 头或 IP 地址）。因此，根据具体情况，即使数据源在另一种媒介中似乎可以正常工作（例如，你可能可以在浏览器中访问 REST 服务，但尝试从 Spring\
  \ 应用访问同一数据源时却收到拒绝访问的响应），提供者也可能返回拒绝访问的响应。这取决于 REST 提供者设定的使用条款。\n\n第一行声明了在类体内访问 `RestTemplate`\
  \ 类所需的 `import` 语句。首先需要创建一个 `RestTemplate` 类的实例。接下来，可以看到调用了属于 `RestTemplate` 类的\
  \ `getForObject` 方法，如表 4-1 所述，该方法用于执行 HTTP GET 操作——就像浏览器获取 REST 服务负载时执行的操作一样。关于这个方法，有两个重要方面：其响应及其参数。\n\
  \n调用 `getForObject` 方法的响应被赋值给一个 `String` 对象。这意味着你在浏览器中看到的该 REST 服务的相同输出（即 XML 结构）被赋值给了一个\
  \ `String`。即使你从未在 Java 中处理过 XML，也很可能意识到将数据作为 Java `String` 进行提取和操作并非易事。换句话说，有些类比\
  \ `String` 对象更适合处理 XML 数据（以及其中的 REST 服务负载）。目前只需记住这一点；本章的其他配方将说明如何更好地提取和操作从 REST\
  \ 服务获取的数据。\n\n传递给 `getForObject` 方法的参数包括实际的 REST 服务端点。第一个参数对应 URL（即端点）声明。请注意，该 URL\
  \ 与你之前使用浏览器调用时使用的 URL 完全相同。\n\n执行此代码时，输出将与浏览器中的输出相同，只不过现在打印在控制台中。\n\n\n\n#### 从参数化\
  \ URL 检索数据\n\n上一节展示了如何调用 URI 来检索数据，但如果 URI 需要参数该怎么办？你肯定不希望将参数硬编码到 URL 中。使用 `RestTemplate`\
  \ 类，你可以使用带有占位符的 URL，这些占位符将在执行时被实际值替换。占位符使用 `{` 和 `}` 定义，这与请求映射的方式相同（参见配方 4-1 和 4-2）。\n\
  \nURI `http://localhost:8080/court/member/{memberId}` 就是这样一个参数化 URI 的例子。要能够调用此方法，你需要为占位符传入一个值。你可以通过使用\
  \ `Map` 并将其作为第三个参数传递给 `RestTemplate` 类的 `getForObject` 方法来实现这一点。\n\n```\npublic\
  \ class Main {\npublic static void main(String[] args) throws Exception {\nfinal\
  \ String uri = \"http://localhost:8080/court/member/{memberId}\";\nMap params =\
  \ new HashMap();\nparams.put(\"memberId\", \"1\");\nRestTemplate restTemplate =\
  \ new RestTemplate();\nString result = restTemplate.getForObject(uri, String.class,\
  \ params );\nSystem.out.println(result);\n}\n}\n```\n\n最后这段代码使用了 `HashMap` 类（Java\
  \ 集合框架的一部分），并创建了一个包含相应 REST 服务参数的实例，随后将其传递给 `RestTemplate` 类的 `getForObject` 方法。无论是向各种\
  \ `RestTemplate` 方法传递一系列 `String` 参数还是单个 `Map` 参数，所获得的结果都是相同的。\n\n#### 以映射对象形式检索数据\n\
  \n除了返回一个 `String` 供应用程序使用之外，你还可以（重新）使用你的 `Members` 和 `Member` 类来映射结果。无需将 `String.class`\
  \ 作为第二个参数传入，而是传入 `Members.class`，这样响应将被映射到这个类上。\n\n```\npackage com.apress.springrecipes.court;\n\
  import com.apress.springrecipes.court.domain.Members;\nimport org.springframework.web.client.RestTemplate;\n\
  public class Main {\npublic static void main(String[] args) throws Exception {\n\
  final String uri = \"http://localhost:8080/court/members.xml\";\nRestTemplate restTemplate\
  \ = new RestTemplate();\nMembers result = restTemplate.getForObject(uri, Members.class);\n\
  System.out.println(result);\n}\n}\n```\n\n`RestTemplate` 类使用了与带有 `@ResponseBody`\
  \ 标记方法的控制器相同的 `HttpMessageConverter` 基础设施。由于 JAXB 2（以及 Jackson）会被自动检测到，因此映射到 JAXB\
  \ 映射的对象非常容易。\n\n## 4-4\\. 发布 RSS 和 Atom 订阅源\n\n### 问题\n\n你希望在 Spring 应用程序中发布 RSS\
  \ 或 Atom 订阅源。\n\n### 解决方案\n\nRSS 和 Atom 订阅源已成为一种流行的信息发布方式。对这些类型订阅源的访问是通过 REST 服务提供的，这意味着构建\
  \ REST 服务是发布 RSS 和 Atom 订阅源的前提条件。除了依赖 Spring 的 REST 支持之外，依赖一个专门设计用于处理 RSS 和 Atom\
  \ 订阅源特性的第三方库也很方便。这使得 REST 服务更容易发布这种类型的 XML 负载。为此，你将使用 Project Rome，这是一个开源库，可在 [`http://rometools.github.io/rome/`](http://rometools.github.io/rome/)\
  \ 获取。\n\n提示\n\n尽管 RSS 和 Atom 订阅源通常被归类为新闻订阅源，但它们已经超越了最初仅提供新闻的使用场景。如今，RSS 和 Atom 订阅源被用于以跨平台的方式（即使用\
  \ XML）发布与博客、天气、旅行以及许多其他内容相关的信息。因此，如果你需要以跨平台可访问的方式发布任何类型的信息，鉴于其广泛采用（例如，许多应用程序支持它们，许多开发人员了解它们的结构），将其作为\
  \ RSS 或 Atom 订阅源发布可能是一个极好的选择。\n\n### 工作原理\n\n你需要做的第一件事是确定要作为 RSS 或 Atom 新闻订阅源发布的信息。这些信息可以位于关系数据库或文本文件中，可以通过\
  \ JDBC 或 ORM 访问，甚至可以包含在 Spring Bean 或其他类型的结构中。描述如何获取这些信息超出了本配方的范围，因此我们假设你将使用你认为合适的任何方式来访问它。一旦你确定了要发布的信息，就需要将其结构化为\
  \ RSS 或 Atom 订阅源，这就是 Project Rome 发挥作用的地方。\n\n如果你不熟悉 Atom 订阅源的结构，以下代码片段说明了这种格式的一个片段：\n\
  \n```\n\n示例订阅源\n\n2010-08-31T18:30:02Z\n\nJohn Doe\n\nurn:uuid:60a76c80-d399-11d9-b93C-0003939e0af6\n\
  \nAtom 驱动的机器人横冲直撞\n\nurn:uuid:1225c695-cfb8-4ebb-aaaa-80da344efa6a\n2010-08-31T18:30:02Z\n\
  一些文本。\n\n```\n\n以下代码片段说明了 RSS 订阅源结构的一个片段：\n\n```\n\nRSS 示例\n这是一个 RSS 订阅源的示例\nhttp://www.example.org/link.htm\n\
  Mon, 28 Aug 2006 11:12:55 -0400 \nTue, 31 Aug 2010 09:00:00 -0400\n\n项目示例\n这是一个项目的示例\n\
  http://www.example.org/link.htm\n\nTue, 31 Aug 2010 09:00:00 -0400\n\n```\n\n正如你从最后两个代码片段中看到的，RSS\
  \ 和 Atom 订阅源只是 XML 负载，它们依赖一系列元素来发布信息。虽然深入探讨 RSS 或 Atom 订阅源结构的细节本身就需要一本书，但这两种格式都有一系列共同特征；其中最主要的是：\n\
  \n*   它们有一个元数据部分来描述订阅源的内容（例如，Atom 格式的 `<author>` 和 `<title>` 元素，以及 RSS 格式的 `<description>`\
  \ 和 `<pubDate>` 元素）。\n*   它们有重复出现的元素来描述信息（例如，Atom 订阅源格式的 `<entry>` 元素和 RSS 订阅源格式的\
  \ `<item>` 元素）。此外，每个重复出现的元素都有自己的一组元素来进一步描述信息。\n*   它们有多个版本。RSS 版本包括 0.90、0.91 Netscape、0.91\
  \ Userland、0.92、0.93、0.94、1.0 和 2.0。Atom 版本包括 0.3 和 1.0。Project Rome 允许你根据 Java\
  \ 代码中可用的信息（例如，`String`、`Map` 或其他此类结构）创建订阅源的元数据部分、重复出现的元素以及前面提到的任何版本。\n\n现在你已经了解了\
  \ RSS 和 Atom 订阅源的结构，以及 Project Rome 在本配方中的作用，让我们来看一个负责向最终用户呈现订阅源的 Spring MVC 控制器：\n\
  \n\n\n```\n//FINAL\npackage com.apress.springrecipes.court.web;\nimport com.apress.springrecipes.court.feeds.TournamentContent;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport java.util.ArrayList;\n\
  import java.util.Date;\nimport java.util.List;\n@Controller\npublic class FeedController\
  \ {\n@RequestMapping(\"/atomfeed\")\npublic String getAtomFeed(Model model) {\n\
  List tournamentList = new ArrayList();\ntournamentList.add(TournamentContent.of(\"\
  ATP\", new Date(), \"Australian Open\", \"www.australianopen.com\"));\ntournamentList.add(TournamentContent.of(\"\
  ATP\", new Date(), \"Roland Garros\", \"www.rolandgarros.com\"));\ntournamentList.add(TournamentContent.of(\"\
  ATP\", new Date(), \"Wimbledon\", \"www.wimbledon.org\"));\ntournamentList.add(TournamentContent.of(\"\
  ATP\", new Date(), \"US Open\", \"www.usopen.org\"));\nmodel.addAttribute(\"feedContent\"\
  , tournamentList);\nreturn \"atomfeedtemplate\";\n}\n@RequestMapping(\"/rssfeed\"\
  )\npublic String getRSSFeed(Model model) {\nList tournamentList;\ntournamentList\
  \ = new ArrayList();\ntournamentList.add(TournamentContent.of(\"FIFA\", new Date(),\
  \ \"World Cup\", \"www.fifa.com/worldcup/\"));\ntournamentList.add(TournamentContent.of(\"\
  FIFA\", new Date(), \"U-20 World Cup\", \"www.fifa.com/u20worldcup/\"));\ntournamentList.add(TournamentContent.of(\"\
  FIFA\", new Date(), \"U-17 World Cup\", \"www.fifa.com/u17worldcup/\"));\ntournamentList.add(TournamentContent.of(\"\
  FIFA\", new Date(), \"Confederations Cup\", \"www.fifa.com/confederationscup/\"\
  ));\nmodel.addAttribute(\"feedContent\", tournamentList);\nreturn \"rssfeedtemplate\"\
  ;\n}\n}\n```\n\n这个 Spring MVC 控制器包含两个处理器方法。一个名为 `getAtomFeed()`，映射到形如 `http://[host_name]/[app-name]/atomfeed`\
  \ 的 URL；另一个名为 `getRSSFeed()`，映射到形如 `http://[host_name]/[app-name]/rssfeed` 的 URL。\n\
  \n每个处理器方法都定义了一个 `TournamentContent` 对象的 `List`，其中 `TournamentContent` 对象的支持类是一个\
  \ POJO。然后，这个 `List` 被赋值给处理器方法的 `Model` 对象，以便返回的视图可以访问它。每个处理器方法返回的逻辑视图分别是 `atomfeedtemplate`\
  \ 和 `rssfeedtemplate`。这些逻辑视图在 Spring 配置类中以如下方式定义：\n\n```\npackage com.apress.springrecipes.court.web.config;\n\
  import com.apress.springrecipes.court.feeds.AtomFeedView;\nimport com.apress.springrecipes.court.feeds.RSSFeedView;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.HandlerMapping;\n\
  import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.springrecipes.court\"\
  )\npublic class CourtRestConfiguration {\n@Bean\npublic AtomFeedView atomfeedtemplate()\
  \ {\nreturn new AtomFeedView();\n}\n@Bean\npublic RSSFeedView rssfeedtemplate()\
  \ {\nreturn new RSSFeedView();\n}\n...\n}\n```\n\n如你所见，每个逻辑视图都映射到一个类。每个类负责实现构建 Atom\
  \ 或 RSS 视图所需的逻辑。如果你还记得第 3 章的内容，当时你使用了完全相同的方法（即使用类）来实现 PDF 和 Excel 视图。\n\n对于 Atom\
  \ 和 RSS 视图，Spring 提供了两个专门构建在 Project Rome 基础之上的类。这两个类是 `AbstractAtomFeedView` 和\
  \ `AbstractRssFeedView`。这些类提供了构建 Atom 或 RSS 提要的基础，而无需处理这些格式的细节。\n\n以下代码展示了实现 `AbstractAtomFeedView`\
  \ 类的 `AtomFeedView` 类，它用于支持 `atomfeedtemplate` 逻辑视图：\n\n```\npackage com.apress.springrecipes.court.feeds;\n\
  import com.rometools.rome.feed.atom.Content;\nimport com.rometools.rome.feed.atom.Entry;\n\
  import com.rometools.rome.feed.atom.Feed;\nimport org.springframework.web.servlet.view.feed.AbstractAtomFeedView;\n\
  import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\n\
  public class AtomFeedView extends AbstractAtomFeedView {\n@Override\nprotected void\
  \ buildFeedMetadata(Map model, Feed feed, HttpServletRequest request) {\nfeed.setId(\"\
  tag:tennis.org\");\nfeed.setTitle(\"Grand Slam Tournaments\");\nList tournamentList\
  \ = (List) model.get(\"feedContent\");\nfeed.setUpdated(tournamentList.stream().map(TournamentContent::getPublicationDate).sorted().findFirst().orElse(null));\n\
  }\n@Override\nprotected List buildFeedEntries(Map model, HttpServletRequest request,\
  \ HttpServletResponse response)\nthrows Exception {\nList tournamentList = (List)\
  \ model.get(\"feedContent\");\nreturn tournamentList.stream().map(this::toEntry).collect(Collectors.toList());\n\
  }\nprivate Entry toEntry(TournamentContent tournament) {\nEntry entry = new Entry();\n\
  String date = String.format(\"%1$tY-%1$tm-%1$td\", tournament.getPublicationDate());\n\
  entry.setId(String.format(\"tag:tennis.org,%s:%d\", date, tournament.getId()));\n\
  entry.setTitle(String.format(\"%s - Posted by %s\", tournament.getName(), tournament.getAuthor()));\n\
  entry.setUpdated(tournament.getPublicationDate());\nContent summary = new Content();\n\
  summary.setValue(String.format(\"%s - %s\", tournament.getName(), tournament.getLink()));\n\
  entry.setSummary(summary);\nreturn entry;\n}\n}\n```\n\n关于这个类，首先要注意的是，除了实现 Spring\
  \ 框架提供的 `AbstractAtomFeedView` 类之外，它还从 `com.sun.syndication.feed.atom` 包中导入了几个 Project\
  \ Rome 类。这样一来，接下来唯一需要做的就是为从 `AbstractAtomFeedView` 类继承的两个方法提供提要的实现细节：`buildFeedMetadata`\
  \ 和 `buildFeedEntries`。\n\n`buildFeedMetadata` 有三个输入参数：一个 `Map` 对象，代表用于构建提要的数据（即处理器方法内分配的数据，在本例中是一个\
  \ `TournamentContent` 对象的 `List`）；一个基于 Project Rome 类的 `Feed` 对象，用于操作提要本身；以及一个 `HttpServletRequest`\
  \ 对象，以便在需要时操作 HTTP 请求。\n\n在 `buildFeedMetadata` 方法内部，你可以看到对 `Feed` 对象的 setter 方法（例如\
  \ `setId`、`setTitle`、`setUpdated`）进行了多次调用。其中两次调用使用了硬编码字符串，另一次调用则使用了在遍历提要数据（即 `Map`\
  \ 对象）后确定的值。所有这些调用都代表了对 Atom 提要元数据信息的赋值。\n\n注意\n\n如果你想为 Atom 提要的元数据部分分配更多值，或指定特定的\
  \ Atom 版本，请查阅 Project Rome 的 API。默认版本是 Atom 1.0。\n\n`buildFeedEntries` 方法也有三个输入参数：一个\
  \ `Map` 对象，代表用于构建提要的数据（即处理器方法内分配的数据，在本例中是一个 `TournamentContent` 对象的 `List`）；一个 `HttpServletRequest`\
  \ 对象，以便在需要时操作 HTTP 请求；以及一个 `HttpServletResponse` 对象，以便在需要时操作 HTTP 响应。同样重要的是要注意，`buildFeedEntries`\
  \ 方法返回一个对象的 `List`，在本例中对应一个基于 Project Rome 类的 `Entry` 对象的 `List`，其中包含 Atom 提要的重复元素。\n\
  \n\n\n在 `buildFeedEntries` 方法内部，你可以观察到，通过访问 `Map` 对象来获取在 handler 方法中赋值的 `feedContent`\
  \ 对象。完成此操作后，会创建一个空的 `Entry` 对象 `List`。接着，对 `feedContent` 对象执行循环，该对象包含一个 `TournamentContent`\
  \ 对象的 `List` 列表，并为每个元素创建一个 `Entry` 对象，并将其赋值给顶层的 `Entry` 对象 `List`。循环结束后，该方法返回一个填充好的\
  \ `Entry` 对象 `List`。\n\n注意\n\n如果你想为 Atom feed 的重复元素部分分配更多值，请查阅 Project Rome 的 API。\n\
  \n部署前面的类后，除了前面提到的 Spring MVC 控制器之外，访问形如 `http://[host_name]/[app-name]/atomfeed.atom`（或\
  \ `http://[host_name]/atomfeed.xml`）的 URL 将产生以下响应：\n\n```\n\nGrand Slam Tournaments\n\
  tag:tennis.org\n2017-04-19T01:32:52Z\n\nAustralian Open - Posted by ATP\ntag:tennis.org,2017-04-19:5\n\
  2017-04-19T01:32:52Z\nAustralian Open - www.australianopen.com\n\nRoland Garros\
  \ - Posted by ATP\ntag:tennis.org,2017-04-19:6\n2017-04-19T01:32:52Z\nRoland Garros\
  \ - www.rolandgarros.com\n\nWimbledon - Posted by ATP\ntag:tennis.org,2017-04-19:7\n\
  2017-04-19T01:32:52Z\nWimbledon - www.wimbledon.org\n\nUS Open - Posted by ATP\n\
  tag:tennis.org,2017-04-19:8\n2017-04-19T01:32:52Z\nUS Open - www.usopen.org\n\n\
  ```\n\n将注意力转向负责构建 RSS feed 的前一个 Spring MVC 控制器中的另一个 handler 方法——`getRSSFeed`，你会发现其过程与刚才描述的构建\
  \ Atom feed 的过程类似。该 handler 方法也会创建一个 `TournamentContent` 对象的 `List`，然后将其赋值给 handler\
  \ 方法的 `Model` 对象，以便返回的视图可以访问它。不过，在这种情况下，返回的逻辑视图现在对应一个名为 `rssfeedtemplate` 的视图。如前所述，此逻辑视图映射到一个名为\
  \ `RssFeedView` 的类。\n\n以下代码展示了实现 `AbstractRssFeedView` 类的 `RssFeedView` 类：\n\n```\n\
  package com.apress.springrecipes.court.feeds;\nimport com.rometools.rome.feed.rss.Channel;\n\
  import com.rometools.rome.feed.rss.Item;\nimport org.springframework.web.servlet.view.feed.AbstractRssFeedView;\n\
  import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\n\
  public class RSSFeedView extends AbstractRssFeedView {\n@Override\nprotected void\
  \ buildFeedMetadata(Map model, Channel feed, HttpServletRequest request) {\nfeed.setTitle(\"\
  World Soccer Tournaments\");\nfeed.setDescription(\"FIFA World Soccer Tournament\
  \ Calendar\");\nfeed.setLink(\"tennis.org\");\nList tournamentList = (List) model.get(\"\
  feedContent\");\nfeed.setLastBuildDate(tournamentList.stream().map( TournamentContent::getPublicationDate).sorted().findFirst().orElse(null)\
  \ );\n}\n@Override\nprotected List buildFeedItems(Map model, HttpServletRequest\
  \ request, HttpServletResponse response)\nthrows Exception {\nList tournamentList\
  \ = (List) model.get(\"feedContent\");\nreturn tournamentList.stream().map(this::toItem).collect(Collectors.toList());\n\
  }\nprivate Item toItem(TournamentContent tournament) {\nItem item = new Item();\n\
  item.setAuthor(tournament.getAuthor());\nitem.setTitle(String.format(\"%s - Posted\
  \ by %s\", tournament.getName(), tournament.getAuthor()));\nitem.setPubDate(tournament.getPublicationDate());\n\
  item.setLink(tournament.getLink());\nreturn item;\n}\n}\n```\n\n关于这个类，首先要注意的是，除了实现\
  \ Spring 框架提供的 `AbstractRssFeedView` 类之外，它还从 `com.sun.syndication.feed.rss` 包中导入了几个\
  \ Project Rome 类。完成此操作后，接下来唯一需要做的就是为从 `AbstractRssFeedView` 类继承的两个方法提供 feed 的实现细节：`buildFeedMetadata`\
  \ 和 `buildFeedItems`。`buildFeedMetadata` 方法在本质上与用于构建 Atom feed 的同名方法相似。请注意，`buildFeedMetadata`\
  \ 方法操作的是一个基于 Project Rome 类的 `Channel` 对象（用于构建 RSS feed），而不是用于构建 Atom feed 的 `Feed`\
  \ 对象。对 `Channel` 对象调用的 setter 方法（例如 `setTitle`、`setDescription`、`setLink`）表示对 RSS\
  \ feed 元数据信息的赋值。`buildFeedItems` 方法（其名称与 Atom 对应的 `buildFeedEntries` 不同）之所以如此命名，是因为\
  \ Atom feed 的重复元素称为 entries，而 RSS feed 的重复元素称为 items。除了命名约定之外，它们的逻辑是相似的。\n\n在 `buildFeedItems`\
  \ 方法内部，你可以观察到，通过访问 `Map` 对象来获取在 handler 方法中赋值的 `feedContent` 对象。完成此操作后，会创建一个空的 `Item`\
  \ 对象 `List`。接着，对 `feedContent` 对象执行循环，该对象包含一个 `TournamentContent` 对象的 `List`，并为每个元素创建一个\
  \ `Item` 对象，并将其赋值给顶层的 `Item` 对象 `List`。循环结束后，该方法返回一个填充好的 `Item` 对象 `List`。\n\n注意\n\
  \n如果你想为 RSS feed 的元数据和重复元素部分分配更多值，以及指定特定的 RSS 版本，请查阅 Project Rome 的 API。默认版本是 RSS\
  \ 2.0。\n\n当你部署前面的类时，除了前面提到的 Spring MVC 控制器之外，访问形如 `http://[host_name]/rssfeed.rss`（或\
  \ `http://[host_name]/rssfeed.xml`）的 URL 将产生以下响应：\n\n```\n\nWorld Soccer Tournaments\n\
  tennis.org\nFIFA World Soccer Tournament Calendar\nWed, 19 Apr 2017 01:32:31 GMT\n\
  \nWorld Cup - Posted by FIFA\nwww.fifa.com/worldcup/\nWed, 19 Apr 2017 01:32:31\
  \ GMT\n314861_4_EnFIFA\n\nU-20 World Cup - Posted by FIFA\nwww.fifa.com/u20worldcup/\n\
  Wed, 19 Apr 2017 01:32:31 GMT\n314861_4_EnFIFA\n\nU-17 World Cup - Posted by FIFA\n\
  www.fifa.com/u17worldcup/\nWed, 19 Apr 2017 01:32:31 GMT\n314861_4_EnFIFA\n\nConfederations\
  \ Cup - Posted by FIFA\nwww.fifa.com/confederationscup/\nWed, 19 Apr 2017 01:32:31\
  \ GMT\n314861_4_EnFIFA\n\n```\n\n## 总结\n\n在本章中，你学习了如何使用 Spring 开发和访问 REST 服务。REST\
  \ 服务与 Spring MVC 紧密相关，控制器负责分发对 REST 服务的请求，以及访问第三方 REST 服务以将这些信息用于应用程序内容。\n\n你学习了\
  \ REST 服务如何利用 Spring MVC 控制器中使用的注解，包括用于指示服务端点的 `@RequestMapping`，以及用于指定过滤服务负载的访问参数的\
  \ `@PathVariable`。此外，你还了解了 Spring 的 XML 编组器，例如 `Jaxb2Marshaller`，它允许将应用程序对象转换为 XML\
  \ 并作为 REST 服务的负载输出。你还学习了 Spring 的 `RestTemplate` 类，以及它如何支持包括 HEAD、GET、POST、PUT 和\
  \ DELETE 在内的一系列 HTTP 方法——所有这些方法都允许你直接从 Spring 应用程序的上下文中访问第三方 REST 服务并对其执行操作。\n\n\
  最后，你探索了如何通过利用 Project Rome API 在 Spring 应用程序中发布 Atom 和 RSS feed。\n\n\n\n"
- '# 5. Spring MVC：异步处理


  在 Servlet API 发布之初，大多数实现容器都采用每个请求一个线程的模式。这意味着线程会被阻塞，直到请求处理完成并将响应发送给客户端。


  然而，在早期，连接到互联网的设备远没有今天这么多。随着设备数量的增加，需要处理的 HTTP 请求数量也大幅增长。正因如此，对于许多 Web 应用来说，保持线程阻塞已不再可行。从
  Servlet 3 规范开始，可以异步处理 HTTP 请求，并释放最初处理该请求的线程。新线程将在后台运行，一旦结果可用，就会将其写入客户端。如果操作得当，这一切都可以在符合
  Servlet 3.1 规范的 Servlet 容器中以非阻塞方式完成。当然，所使用的所有资源也必须是非阻塞的。


  在过去几年中，响应式编程也日益流行。从 Spring 5 开始，可以编写响应式 Web 应用。响应式 Spring 项目使用 Project Reactor（与
  Spring 一样，由 Pivotal 维护）作为 Reactive Streams API 的实现。深入探讨响应式编程超出了本书的范围，但简而言之，它是一种实现非阻塞函数式编程的方式。


  传统上，在处理 Web 应用时，会有一个请求；HTML 在服务器端渲染，然后发送回客户端。最近几年，渲染 HTML 的工作转移到了客户端，通信不再通过 HTML
  进行，而是通过向客户端返回 JSON、XML 或其他表示形式。尽管这是由客户端通过 `XMLHttpRequest` 对象发起的异步调用驱动的，但传统上这仍然是一个请求-响应周期。然而，客户端和服务器之间还有其他通信方式；你可以利用服务器发送事件实现从服务器到客户端的单向通信，而对于全双工通信，则可以使用
  WebSocket 协议。


  ## 5-1. 使用控制器和 TaskExecutor 异步处理请求


  ### 问题


  为了减轻 Servlet 容器的负载，你希望异步处理请求。


  ### 解决方案


  当请求到达时，它会被同步处理，这会阻塞处理 HTTP 请求的线程。响应保持打开状态，并可供写入。当某个调用（例如）需要一些时间才能完成时，这非常有用。你可以让它在后台处理，并在完成后向用户返回一个值，而不是阻塞线程。


  ### 工作原理


  如配方 3-1 所述，Spring MVC 支持方法返回多种类型。除了这些返回类型之外，表 5-1 中的类型会以异步方式处理。


  表 5-1. 异步返回类型


  | 类型 | 描述 |

  | --- | --- |

  | `DeferredResult` | 稍后从另一个线程生成的异步结果 |

  | `ListenableFuture<?>` | 稍后从另一个线程生成的异步结果；`DeferredResult` 的等效替代 |

  | `CompletableStage<?> / CompletableFuture<?>` | 稍后从另一个线程生成的异步结果；`DeferredResult`
  的等效替代 |

  | `Callable<?>` | 异步计算，结果在计算完成后生成 |

  | `ResponseBodyEmitter` | 可用于异步地向响应写入多个对象 |

  | `SseEmitter` | 可用于异步地写入服务器发送事件 |

  | `StreamingResponseBody` | 可用于异步地写入 `OutputStream` |


  通用的异步返回类型可以容纳控制器的任何返回类型，包括要添加到模型的对象、视图的名称，甚至是 `ModelAndView` 对象。


  #### 配置异步处理


  要使用 Spring MVC 的异步处理功能，首先必须启用它们。Servlet 3.0 规范中已添加了对异步请求处理的支持，要启用它，你必须告知所有过滤器和 Servlet
  以异步方式运行。为此，你可以在注册过滤器或 Servlet 时调用 `setAsyncSupported()` 方法。


  在编写 `WebApplicationInitializer` 时，你需要执行以下操作：


  ```

  public class CourtWebApplicationInitializer implements WebApplicationInitializer
  {

  public void onStartup(ServletContext ctx) {

  DispatcherServlet servlet = new DispatcherServlet();

  ServletRegistration.Dynamic registration = ctx.addServlet("dispatcher", servlet);

  registration.setAsyncSupported(true);

  }

  }

  ```


  注意


  在进行异步处理时，应用程序中的所有 Servlet 过滤器和 Servlet 都应将此属性设置为 `true`，否则异步处理将无法工作！


  幸运的是，Spring 在这方面提供了帮助。当使用 `AbstractAnnotationConfigDispatcherServletInitializer`
  作为超类时，此属性默认对注册的 `DispatcherServlet` 和过滤器启用。要更改它，请重写 `isAsyncSupported()` 并实现逻辑以确定其应开启还是关闭。


  根据你的需求，你可能还需要配置一个 `AsyncTaskExecutor` 并将其注入到 MVC 配置中。


  ```

  package com.apress.springrecipes.court.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.core.task.AsyncTaskExecutor;

  import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;

  import org.springframework.web.servlet.config.annotation.AsyncSupportConfigurer;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurationSupport;

  @Configuration

  public class AsyncConfiguration extends WebMvcConfigurationSupport {

  @Override

  protected void configureAsyncSupport(AsyncSupportConfigurer configurer) {

  configurer.setDefaultTimeout(5000);

  configurer.setTaskExecutor(mvcTaskExecutor());

  }

  @Bean

  public ThreadPoolTaskExecutor mvcTaskExecutor() {

  ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

  taskExecutor.setThreadGroupName("mvc-executor");

  return taskExecutor;

  }

  }

  ```


  要配置异步处理，你需要重写 `WebMvcConfigurationSupport` 的 `configureAsyncSupport` 方法；重写此方法可以让你访问
  `AsyncSupportConfigurer`，并允许你设置 `defaultTimeout` 和 `AsyncTaskExecutor` 的值。超时时间设置为五秒，对于执行器，你将使用
  `ThreadPoolTaskExecutor`（另请参见配方 2-23）。


  #### 编写异步控制器


  编写一个控制器并使其异步处理请求，只需更改控制器处理方法的返回类型即可。假设对 `ReservationService.query` 的调用需要相当长的时间，但你不想因此阻塞服务器。




  #### 使用 Callable


  以下是使用 Callable 的方法：


  ```

  package com.apress.springrecipes.court.web;

  import com.apress.springrecipes.court.Delayer;

  import com.apress.springrecipes.court.domain.Reservation;

  import com.apress.springrecipes.court.service.ReservationService;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import java.util.List;

  import java.util.concurrent.Callable;

  @Controller

  @RequestMapping("/reservationQuery")

  public class ReservationQueryController {

  private final ReservationService reservationService;

  public ReservationQueryController(ReservationService reservationService) {

  this.reservationService = reservationService;

  }

  @GetMapping

  public void setupForm() {}

  @PostMapping

  public Callable sumbitForm(@RequestParam("courtName") String courtName, Model model)
  {

  return () -> {

  List reservations = java.util.Collections.emptyList();

  if (courtName != null) {

  Delayer.randomDelay(); // 模拟一个慢速服务

  reservations = reservationService.query(courtName);

  }

  model.addAttribute("reservations", reservations);

  return "reservationQuery";

  };

  }

  }

  ```


  如果你查看 `submitForm` 方法，它现在返回的是 `Callable<String>`，而不是直接返回 `String`。在新构建的 `Callable<String>`
  内部，在调用 `query` 方法之前，有一个随机等待来模拟延迟。


  现在，当进行预约时，你会在日志中看到类似这样的内容：


  ```

  2017-06-20 10:37:04,836 [nio-8080-exec-2] DEBUG o.s.w.c.request.async.WebAsyncManager    :
  Concurrent handling starting for POST [/court/reservationQuery]

  2017-06-20 10:37:04,838 [nio-8080-exec-2] DEBUG o.s.web.servlet.DispatcherServlet        :
  Leaving response open for concurrent processing

  2017-06-20 10:37:09,954 [mvc-executor-1 ] DEBUG o.s.w.c.request.async.WebAsyncManager    :
  Concurrent result value [reservationQuery] - dispatching request to resume processing

  2017-06-20 10:37:09,959 [nio-8080-exec-3] DEBUG o.s.web.servlet.DispatcherServlet        :
  DispatcherServlet with name ''dispatcher'' resumed processing POST request for [/court/reservationQuery]

  ```


  请注意，请求处理是在某个线程（这里是 `nio-8080-exec-2`）上进行的，该线程被释放，然后另一个线程进行处理并返回结果（这里是 `mvc-executor-1`）。最后，请求再次被分派到
  `DispatcherServlet`，以便在另一个线程上处理结果。


  #### 使用 DeferredResult


  除了 `Callable<String>`，你也可以使用 `DeferredResult<String>`。当使用 `DeferredResult` 时，你需要构造一个该类的实例，提交一个任务进行异步处理，并在该任务中使用
  `setResult` 方法填充 `DeferredResult` 的结果。当发生异常时，你可以将此异常传递给 `DeferredResult` 的 `setErrorResult`
  方法。


  ```

  package com.apress.springrecipes.court.web;

  import com.apress.springrecipes.court.Delayer;

  import com.apress.springrecipes.court.domain.Reservation;

  import com.apress.springrecipes.court.service.ReservationService;

  import org.springframework.core.task.AsyncTaskExecutor;

  import org.springframework.core.task.TaskExecutor;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import org.springframework.web.context.request.async.DeferredResult;

  import java.util.List;

  @Controller

  @RequestMapping("/reservationQuery")

  public class ReservationQueryController {

  private final ReservationService reservationService;

  private final TaskExecutor taskExecutor;

  public ReservationQueryController(ReservationService reservationService, AsyncTaskExecutor
  taskExecutor) {

  this.reservationService = reservationService;

  this.taskExecutor = taskExecutor;

  }

  @GetMapping

  public void setupForm() {}

  @PostMapping

  public DeferredResult sumbitForm(@RequestParam("courtName") String courtName, Model
  model) {

  final DeferredResult result = new DeferredResult();

  taskExecutor.execute(() -> {

  List reservations = java.util.Collections.emptyList();

  if (courtName != null) {

  Delayer.randomDelay(); // 模拟一个慢速服务

  reservations = reservationService.query(courtName);

  }

  model.addAttribute("reservations", reservations);

  result.setResult("reservationQuery");

  });

  return result;

  }

  }

  ```


  该方法现在返回一个 `DeferredResult<String>`，它仍然是待渲染视图的名称。实际结果通过一个 `Runnable` 设置，该 `Runnable`
  被传递给注入的 `TaskExecutor` 的 execute 方法。返回 `DeferredResult` 和返回 `Callable` 的主要区别在于，对于
  `DeferredResult`，你必须创建自己的 `Thread`（或将其委托给 `TaskExecutor`）；而对于 `Callable`，则不需要。


  #### 使用 CompletableFuture


  将方法的签名改为返回 `CompletableFuture<String>`，并使用 `TaskExecutor` 来异步执行代码。


  ```

  package com.apress.springrecipes.court.web;

  import com.apress.springrecipes.court.Delayer;

  import com.apress.springrecipes.court.domain.Reservation;

  import com.apress.springrecipes.court.service.ReservationService;

  import org.springframework.core.task.TaskExecutor;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import java.util.List;

  import java.util.concurrent.CompletableFuture;

  @Controller

  @RequestMapping("/reservationQuery")

  public class ReservationQueryController {

  private final ReservationService reservationService;

  private final TaskExecutor taskExecutor;

  public ReservationQueryController(ReservationService reservationService, TaskExecutor
  taskExecutor) {

  this.reservationService = reservationService;

  this.taskExecutor = taskExecutor;

  }

  @GetMapping

  public void setupForm() {}

  @PostMapping

  public CompletableFuture sumbitForm(@RequestParam("courtName") String courtName,
  Model model) {

  return CompletableFuture.supplyAsync(() -> {

  List reservations = java.util.Collections.emptyList();

  if (courtName != null) {

  Delayer.randomDelay(); // 模拟一个慢速服务

  reservations = reservationService.query(courtName);

  }

  model.addAttribute("reservations", reservations);

  return "reservationQuery";

  }, taskExecutor);

  }

  }

  ```


  当调用 `supplyAsync`（或者当返回类型为 `void` 时，你可以使用 `runAsync`）时，你提交一个任务并返回一个 `CompletableFuture`。这里你使用了
  `supplyAsync` 方法，它同时接受一个 `Supplier` 和一个 `Executor`，这样你就可以重用 `TaskExecutor` 进行异步处理。如果你使用只接受一个
  `Supplier` 的 `supplyAsync` 方法，它将使用 JVM 上默认的 fork/join 池来执行。


  当返回 `CompletableFuture` 时，你可以利用它的所有特性，例如组合和链式调用多个 `CompletableFuture` 实例。




  #### 使用 ListenableFuture


  Spring 提供了 `ListenableFuture` 接口，它是一个 `Future` 实现，当 `Future` 完成时会执行回调。要创建 `ListenableFuture`，你需要向
  `AsyncListenableTaskExecutor` 提交一个任务，该执行器会返回一个 `ListenableFuture`。之前配置的 `ThreadPoolTaskExecutor`
  就是 `AsyncListenableTaskExecutor` 接口的一个实现。


  ```

  // FINAL

  package com.apress.springrecipes.court.web;

  import com.apress.springrecipes.court.Delayer;

  import com.apress.springrecipes.court.domain.Reservation;

  import com.apress.springrecipes.court.service.ReservationService;

  import org.springframework.core.task.AsyncListenableTaskExecutor;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.util.concurrent.ListenableFuture;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import java.util.List;

  @Controller

  @RequestMapping("/reservationQuery")

  public class ReservationQueryController {

  private final ReservationService reservationService;

  private final AsyncListenableTaskExecutor taskExecutor;

  public ReservationQueryController(ReservationService reservationService, AsyncListenableTaskExecutor
  taskExecutor) {

  this.reservationService = reservationService;

  this.taskExecutor = taskExecutor;

  }

  @GetMapping

  public void setupForm() {}

  @PostMapping

  public ListenableFuture sumbitForm(@RequestParam("courtName") String courtName,
  Model model) {

  return taskExecutor.submitListenable(() -> {

  List reservations = java.util.Collections.emptyList();

  if (courtName != null) {

  Delayer.randomDelay(); // 模拟一个慢速服务

  reservations = reservationService.query(courtName);

  }

  model.addAttribute("reservations", reservations);

  return "reservationQuery";

  });

  }

  }

  ```


  你使用 `submitListenable` 方法向 `taskExecutor` 提交一个任务；这会返回一个 `ListenableFuture`，而该对象又可以用作方法的返回值。


  你可能会好奇，创建的 `ListenableFuture` 的成功和失败回调在哪里。Spring MVC 会将 `ListenableFuture` 适配为 `DeferredResult`，并在成功完成时调用
  `DeferredResult.setResult`，当发生错误时调用 `DeferredResult.setErrorResult`。这一切都由 Spring
  附带的 `HandlerMethodReturnValueHandler` 实现之一为你处理；在本例中，由 `DeferredResultMethodReturnValueHandler`
  处理。


  ## 5-2. 使用响应写入器


  ### 问题


  你有一个服务或多次调用，并希望将响应分块发送给客户端。


  ### 解决方案


  使用 `ResponseBodyEmitter`（或其同类 `SseEmitter`）来分块发送响应。


  ### 工作原理


  Spring 支持使用 `HttpMessageConverter` 基础设施将对象作为普通对象写入，结果将是一个分块（或流式）列表发送给客户端。你也可以不发送对象，而是将它们作为事件发送，即所谓的服务器发送事件（Server-Sent
  Events）。


  #### 在响应中发送多个结果


  Spring MVC 有一个名为 `ResponseBodyEmitter` 的类，当你希望向客户端返回多个对象，而不是单个结果（如视图名称或 `ModelAndView`）时，它特别有用。发送对象时，对象会使用
  `HttpMessageConverter` 转换为结果（另请参阅配方 4-2）。要使用 `ResponseBodyEmitter`，你必须从请求处理方法中返回它。


  修改 `ReservationQueryController` 的 `find` 方法，使其返回一个 `ResponseBodyEmitter`，并将结果逐个发送给客户端。


  ```

  // FINAL

  package com.apress.springrecipes.court.web;

  import com.apress.springrecipes.court.Delayer;

  import com.apress.springrecipes.court.domain.Reservation;

  import com.apress.springrecipes.court.service.ReservationService;

  import org.springframework.core.task.TaskExecutor;

  import org.springframework.http.MediaType;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter;

  import java.io.IOException;

  import java.util.Collection;

  import java.util.List;

  import java.util.concurrent.Callable;

  @Controller

  @RequestMapping("/reservationQuery")

  public class ReservationQueryController {

  private final ReservationService reservationService;

  private final TaskExecutor taskExecutor;

  ...

  @GetMapping(params = "courtName")

  public ResponseBodyEmitter find(@RequestParam("courtName") String courtName) {

  final ResponseBodyEmitter emitter = new ResponseBodyEmitter();

  taskExecutor.execute(() -> {

  Collection reservations = reservationService.query(courtName);

  try {

  for (Reservation reservation : reservations) {

  emitter.send(reservation);

  }

  emitter.complete();

  } catch (IOException e) {

  emitter.completeWithError(e);

  }

  });

  return emitter;

  }

  }

  ```


  首先，创建一个 `ResponseBodyEmitter`，并最终从该方法返回它。接下来，执行一个任务，该任务将使用 `ReservationService.query`
  方法查询预约。该调用的所有结果都通过 `ResponseBodyEmitter` 的 `send` 方法逐个返回。当所有对象都发送完毕后，需要调用 `complete()`
  方法，以便负责发送响应的线程可以完成请求并释放以处理下一个响应。当发生异常并且你想通知用户时，可以调用 `completeWithError`。该异常将通过 Spring
  MVC 的正常异常处理（另请参阅配方 3-8），之后响应完成。


  当使用 httpie 或 curl 等工具时，调用 URL `http://localhost:8080/court/reservationQuery courtName==''Tennis
  #1''` 将产生类似图 5-1 的结果。结果将是分块的，并且状态码为 200（OK）。


  ![A314861_4_En_5_Fig1_HTML.jpg](img/A314861_4_En_5_Fig1_HTML.jpg)


  图 5-1. 分块结果


  如果你想更改状态码或添加自定义标头，也可以将 `ResponseBodyEmitter` 包装在 `ResponseEntity` 中，这允许自定义返回码、标头等（参见配方
  4-1）。


  ```

  @GetMapping(params = "courtName")

  public ResponseEntity find(@RequestParam("courtName") String courtName) {

  final ResponseBodyEmitter emitter = new ResponseBodyEmitter();

  ....

  return ResponseEntity.status(HttpStatus.I_AM_A_TEAPOT)

  .header("Custom-Header", "Custom-Value")

  .body(emitter);

  }

  ```


  现在状态码将更改为 418，并且它将包含一个自定义标头（见图 5-2）。


  ![A314861_4_En_5_Fig2_HTML.jpg](img/A314861_4_En_5_Fig2_HTML.jpg)


  图 5-2. 修改后的分块结果




  #### 将多个结果作为事件发送


  `ResponseBodyEmitter` 的同类是 `SseEmitter`，它可以使用服务器发送事件（Server-Sent Events）将事件从服务器传递给客户端。服务器发送事件是从服务器端发送到客户端的消息，其内容类型标头为
  `text/event-stream`。它们非常轻量，并允许定义四个字段（参见表 5-2）。


  表 5-2. 服务器发送事件允许的字段


  | 字段 | 描述 |

  | --- | --- |

  | `id` | 事件的 ID |

  | `event` | 事件的类型 |

  | `data` | 事件数据 |

  | `retry` | 事件流的重新连接时间 |


  要从请求处理方法发送事件，你需要创建一个 `SseEmitter` 实例，并将其从请求处理方法中返回。然后，你可以使用 `send` 方法将单个元素发送给客户端。


  ```

  @GetMapping(params = "courtName")

  public SseEmitter find(@RequestParam("courtName") String courtName) {

  final SseEmitter emitter = new SseEmitter();

  taskExecutor.execute(() -> {

  Collection reservations = reservationService.query(courtName);

  try {

  for (Reservation reservation : reservations) {

  Delayer.delay(125);

  emitter.send(reservation);

  }

  emitter.complete();

  } catch (IOException e) {

  emitter.completeWithError(e);

  }

  });

  return emitter;

  }

  ```


  注意


  这里在向客户端发送每个项目时添加了延迟，只是为了让你看到不同的事件依次到达。在实际代码中你不会这样做。


  现在，当使用 curl 之类的工具调用 URL `http://localhost:8080/court/reservationQuery courtName==''Tennis
  #1''` 时，你将看到事件一个接一个地到达（图 5-3）。


  ![A314861_4_En_5_Fig3_HTML.jpg](img/A314861_4_En_5_Fig3_HTML.jpg)


  图 5-3. 服务器发送事件的结果


  请注意，`Content-Type` 标头的值为 `text/event-stream`，表示你获取的是一个事件流。你可以保持流打开状态，并持续接收事件通知。你还会注意到，每个写入的对象都会被转换为
  JSON；这是通过 `HttpMessageConverter` 完成的，就像普通的 `ResponseBodyEmitter` 一样。每个对象都作为事件数据写入
  `data` 标签中。


  如果你想向事件添加更多信息（换句话说，填写表 5-2 中提到的其他字段），可以使用 `SseEventBuilder`。要获取其实例，可以调用 `SseEmitter`
  上的 `event()` 工厂方法。让我们用它来将 `Reservation` 的哈希码填入 `id` 字段。


  ```

  @GetMapping(params = "courtName")

  public SseEmitter find(@RequestParam("courtName") String courtName) {

  final SseEmitter emitter = new SseEmitter();

  taskExecutor.execute(() -> {

  Collection reservations = reservationService.query(courtName);

  try {

  for (Reservation reservation : reservations) {

  Delayer.delay(120);

  emitter.send(emitter.event().id(String.valueOf(reservation.hashCode())).data(reservation));

  }

  emitter.complete();

  } catch (IOException e) {

  emitter.completeWithError(e);

  }

  });

  return emitter;

  }

  ```


  现在，当使用 curl 之类的工具调用 URL `http://localhost:8080/court/reservationQuery courtName==''Tennis
  #1''` 时，你将看到事件一个接一个地到达，并且它们将同时包含 `id` 和 `data` 字段。


  ## 5-3. 使用异步拦截器


  ### 问题


  Servlet API 定义的 Servlet 过滤器可以在每个 Web 请求被 Servlet 处理之前和之后对其进行预处理和后处理。你希望在 Spring
  的 Web 应用程序上下文中配置具有类似过滤器功能的东西，以便利用容器的特性。


  此外，有时你可能希望对由 Spring MVC 处理器处理的 Web 请求进行预处理和后处理，并在这些处理器返回的模型属性传递给视图之前对其进行操作。


  ### 解决方案


  Spring MVC 允许你通过处理器拦截器拦截 Web 请求以进行预处理和后处理。处理器拦截器在 Spring 的 Web 应用程序上下文中配置，因此它们可以利用任何容器特性并引用容器中声明的任何
  Bean。可以为特定的 URL 映射注册处理器拦截器，以便它仅拦截映射到特定 URL 的请求。


  如配方 3-3 所述，Spring 提供了 `HandlerInterceptor` 接口，该接口包含三个回调方法供你实现：`preHandle()`、`postHandle()`
  和 `afterCompletion()`。第一个和第二个方法分别在请求被处理器处理之前和之后调用。第二个方法还允许你访问返回的 `ModelAndView`
  对象，以便操作其中的模型属性。最后一个方法在所有请求处理完成之后（即视图渲染之后）调用。


  对于异步处理，Spring 提供了 `AsyncHandlerInterceptor`，它包含一个额外的回调方法供你实现：`afterConcurrentHandlingStarted`。该方法在异步处理开始时立即被调用，而不是调用
  `postHandle` 和/或 `afterCompletion`。当异步处理完成时，会再次调用正常的流程。




  ### 工作原理


  在配方 3-3 中，你创建了一个 `MeasurementInterceptor`，用于测量每个请求处理器处理 Web 请求的时间，并将其添加到 `ModelAndView`
  中。现在我们来修改它，使其记录请求和响应的处理时间，包括用于处理请求的线程。


  ```

  package com.apress.springrecipes.court.web;

  import org.springframework.web.servlet.AsyncHandlerInterceptor;

  import org.springframework.web.servlet.ModelAndView;

  import javax.servlet.http.HttpServletRequest;

  import javax.servlet.http.HttpServletResponse;

  public class MeasurementInterceptor implements AsyncHandlerInterceptor {

  public static final String START_TIME = "startTime";

  public boolean preHandle(HttpServletRequest request, HttpServletResponse response,
  Object handler) throws Exception {

  if (request.getAttribute(START_TIME) == null) {

  request.setAttribute(START_TIME, System.currentTimeMillis());

  }

  return true;

  }

  public void postHandle(HttpServletRequest request, HttpServletResponse response,
  Object handler, ModelAndView modelAndView) throws Exception {

  long startTime = (Long) request.getAttribute(START_TIME);

  request.removeAttribute(START_TIME);

  long endTime = System.currentTimeMillis();

  System.out.println("Response-Processing-Time: " + (endTime - startTime) + "ms.");

  System.out.println("Response-Processing-Thread: " + Thread.currentThread().getName());

  }

  @Override

  public void afterConcurrentHandlingStarted(HttpServletRequest request, HttpServletResponse
  response, Object handler) throws Exception {

  long startTime = (Long) request.getAttribute(START_TIME);

  request.setAttribute(START_TIME, System.currentTimeMillis());

  long endTime = System.currentTimeMillis();

  System.out.println("Request-Processing-Time: " + (endTime - startTime) + "ms.");

  System.out.println("Request-Processing-Thread: " + Thread.currentThread().getName());

  }

  }

  ```


  在该拦截器的 `preHandle()` 方法中，你记录了开始时间并将其保存到请求属性中。此方法应返回 `true`，以允许 `DispatcherServlet`
  继续处理请求。否则，`DispatcherServlet` 会认为该方法已处理完请求，从而直接将响应返回给用户。接下来，在 `afterConcurrentHandlingStarted`
  中，你获取已注册的时间，并计算出开始异步处理所花费的时间。之后，你重置开始时间，并将请求处理时间和线程打印到控制台。


  然后，在 `postHandle()` 方法中，你从请求属性中加载开始时间，并将其与当前时间进行比较。接着计算总耗时，并将其与当前线程名称一起打印到控制台。


  要注册拦截器，你需要修改第一个配方中创建的 `AsyncConfiguration`。你需要让它实现 `WebMvcConfigurer` 并重写 `addInterceptors`
  方法。该方法让你能够访问 `InterceptorRegistry`，你可以用它来添加拦截器。修改后的类如下所示：


  ```

  package com.apress.springrecipes.court.config;

  import com.apress.springrecipes.court.web.MeasurementInterceptor;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;

  import org.springframework.web.servlet.config.annotation.AsyncSupportConfigurer;

  import org.springframework.web.servlet.config.annotation.InterceptorRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  import java.util.concurrent.TimeUnit;

  @Configuration

  public class AsyncConfiguration implements WebMvcConfigurer {

  ...

  @Override

  public void addInterceptors(InterceptorRegistry registry) {

  registry.addInterceptor(new MeasurementInterceptor());

  }

  }

  ```


