  ## 1-3\. 使用 Maven 命令行界面构建 Spring 应用程序


  ### 问题


  你想从命令行使用 Maven 构建一个 Spring 应用程序。


  ### 解决方案


  从 [`http://maven.apache.org/download.cgi`](http://maven.apache.org/download.cgi)
  下载 Maven。确保 `JAVA_HOME` 环境变量设置为 Java SDK 的主目录。修改 `PATH` 环境变量，使其包含 Maven 的 `bin`
  目录。


  ### 工作原理


  Maven 作为一个独立的命令行界面工具提供。这使得 Maven 可以在各种开发环境中使用。例如，如果你更喜欢使用 emacs 或 vi 等文本编辑器来编辑应用程序代码，那么能够访问像
  Maven 这样的构建工具来自动化那些通常与 Java 应用程序构建过程相关的繁琐工作（例如，复制文件、一键编译）就变得至关重要。


  Maven 可以从 [`http://maven.apache.org/download.cgi`](http://maven.apache.org/download.cgi)
  免费下载。Maven 提供源代码和二进制两种版本。由于 Java 工具是跨平台的，我们建议你下载二进制版本，以避免额外的编译步骤。在撰写本文时，Maven 的最新稳定版本是
  3.5.0。


  下载 Maven 后，请确保你的系统上安装了 Java SDK，因为 Maven 在运行时需要它。通过解压 Maven 并定义 `JAVA_HOME` 和 `PATH`
  环境变量来继续安装。


  运行以下命令解压它：


  `www@ubuntu:∼$ tar -xzvf apache-maven-3.5.0-bin.tar.gz`


  使用以下命令添加 `JAVA_HOME` 变量：


  `www@ubuntu:∼$ export JAVA_HOME=/usr/lib/jvm/java-8-openjdk/`


  使用以下命令将 Maven 可执行文件添加到 `PATH` 变量：


  `www@ubuntu:∼$ export PATH=$PATH:/home/www/apache-maven-3.5.0/bin/`


  提示


  如果像前面那样声明 `JAVA_HOME` 和 `PATH` 变量，那么每次打开新的 shell 会话使用 Maven 时，都需要重复此过程。在 Unix/Linux
  系统上，你可以打开用户主目录下的 `.bashrc` 文件，并添加相同的 export 行，以避免每次会话都声明环境变量。在 Windows 系统上，你可以通过选择
  **我的电脑** 图标，右键点击，然后选择 **属性** 选项来永久设置环境变量。在弹出的窗口中，选择 **高级** 选项卡，然后点击 **环境变量** 按钮。


  Maven 可执行文件通过 `mvn` 命令使用。如果你按照上述说明正确设置了环境变量，那么在系统上的任何目录中键入 `mvn` 都会调用 Maven。描述关于
  Maven 执行的更多细节超出了本节的讨论范围。但是，接下来我们将描述如何使用 Maven 从本书的源代码构建一个 Spring 应用程序。


  下载本书的源代码并将其解压到本地目录后，进入名为 `ch01/springintro_mvn` 的目录。键入 `mvn` 来调用 Maven 并构建 `springintro_mvn`
  下的应用程序。输出应如图 1-18 所示。


  ![A314861_4_En_1_Fig18_HTML.jpg](img/A314861_4_En_1_Fig18_HTML.jpg)


  图 1-18.


  Maven 构建输出


  你已经成功构建了应用程序，恭喜！现在，让我们运行它。进入 Maven 在 `ch01/springintro_mvn` 目录下创建的名为 `target` 的目录。你将看到文件
  `springintro_mvn-4.0.0-SNAPSHOT.jar`，这就是构建好的应用程序。执行命令 `java -jar springintro_mvn-1-0.SNAPSHOT.jar`
  来运行应用程序。你将看到应用程序的日志消息，以及应用程序定义的问候消息。


  ## 1-4\. 使用 Gradle Wrapper 构建 Spring 应用程序


  ### 问题


  你想从命令行使用 Maven wrapper 构建一个 Spring 应用程序。


  ### 解决方案


  从命令行运行 `mvnw` 脚本。


  ### 工作原理


  尽管 Maven（参见 1-3 节）是一个独立的命令行工具，但许多（开源）项目使用 Maven wrapper 来让你访问 Maven。这种方法的好处是应用程序完全自给自足。作为开发人员，你不需要安装
  Maven，因为 Maven wrapper 会下载特定版本的 Maven 来构建项目。


  一旦你有了一个使用 Maven wrapper 的项目，你可以简单地在命令行键入 `./mvnw package`，让 Maven 自动下载并运行构建。唯一的先决条件是安装了
  Java SDK，因为 Maven 在运行时需要它，并且 Maven wrapper 也需要它才能运行。


  下载本书的源代码并将其解压到本地目录后，进入名为 `ch01/springintro_mvnw` 的目录。键入 `./mvnw` 来调用 Maven wrapper
  并自动构建应用程序。输出将类似于图 1-19。


