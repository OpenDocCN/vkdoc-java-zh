    ### 静态主入口点


    我们已经介绍了大量关于 Java 类的内容，但尚未讨论如何实际执行 Java 程序。为此，你必须至少有一个包含静态 main 方法的类，且该方法需符合特定的方法签名。让我们来看一下静态
    main 方法的签名。


    ```

    public static main(String[] args) { ... }

    ```


    每个相关视频游戏项目的静态主入口点都与项目本身同名。每个编程挑战中游戏设置的副本都采用相同的方法。当你在 NetBeans IDE 中构建项目时，可以将其配置为拥有一个默认类（包含静态
    main 方法），以便在程序执行时运行。


    要设置此值，请在 NetBeans IDE 中右键点击你的 Java 项目，然后选择“属性”选项。在弹出的窗口中，从左侧选择“运行”选项。


    ![](img/537429_1_En_7_Fig1_HTML.jpg)


    对话框的截图显示了内存匹配中不同类别的项目属性。右侧的配置、运行时平台、参数、工作目录和 VM 选项旁边有文本框。


    图 7-1


    NetBeans IDE 中项目运行设置的截图


    NetBeans IDE 运行设置的截图。


    一旦你设置了所需的静态 main 类，在构建项目后，你可以通过在命令行中使用以下代码来执行它。在 Windows 上，你可以使用命令提示符来执行命令。在 Mac
    或 Linux 上，你可以使用终端窗口。请在线搜索适用于你操作系统的启动正确控制台的步骤。你可以通过运行类似以下的命令来执行你新构建的 Java 程序：


    ```

    java -jar MemoryMatch.jar

    ```


    通常，新创建的 JAR 文件位于项目根目录的 `dist` 文件夹中。这是运行类似上述控制台命令的最佳位置。在进入下一节（一个新的代码挑战）之前，我想列出一个非常简单的、包含静态
    main 方法的类。


    ```

    01 public class SimpleExecutableClass {

    02     public int myField = 0;


    04     public static main(String[] args) {

    05         System.out.println("The SimpleExecutableClass has received " args.length
    + " arguments.");

    06     }

    07 }

    清单 7-12

    一个包含静态 Main 方法的基本 Java 类

    ```


    一个简单的可执行 Java 类示例。


    你可以将此示例作为未来任何可执行类的模板。大多数情况下，你的项目中应该只有一个包含静态 main 方法的类，但偶尔也可能有多个。在这种情况下，你可以使用以下命令来指定要运行哪个静态
    main 方法：


    ```

    java -cp MemoryMatch.jar com.test.project.newExecClass

    ```


    如果我们正在测试 Memory Match 游戏主可执行文件的新副本，我们需要运行以下命令：


    ```

    java -cp MemoryMatch.jar net.middlemind.MemoryMatch.MemoryMatch2

    ```


    在这两种情况下，我们都是通过提供完整的类路径、包名和类名作为 `-cp` 命令的参数来指定用作主可执行文件的类。思考一下类包在此处的作用，并牢记 Java
    中类的组织方式。这在我们下一章回顾库时会派上用场。接下来，我们将尝试另一个编码挑战，并在此过程中探索静态主入口点、项目设置和资源。


    ## 挑战：地牢陷阱的静态 Main


    在这个挑战中，也就是本章的第三个也是最后一个挑战，我们将研究 Memory Match 游戏的静态主入口点。我们将进一步了解项目及其资源是如何配置的，并且我们将创建一个包含两个静态主入口点的项目，以便获得运行可选可执行类的一些经验。让我们来看看这个挑战！


    涉及的包：


    ```

    net.middlemind.MemoryMatch_Chapter7_Challenge3

    net.middlemind.MemoryMatch_Chapter7_Challenge3_Solved

    ```


    描述：


    找到包 `net.middlemind.MemoryMatch_Chapter7_Challenge3`，并打开 `MemoryMatch.java` 文件。项目中的一些图形设计师想尝试为
    Memory Match 游戏使用一套新的资源，但又不想占用开发者太多时间。你的挑战是创建一个 `MemoryMatch.java` 静态 main 类的副本，并更改它使用的游戏引擎配置文件。将其指向这个新文件：


    ```

    engine_config_mmg_memory_match_test.xml

    ```


    这将把游戏连接到存储于以下目录中的一组新资源：


    ```

    .\MemoryMatch\cfg\drawable\MemoryMatchTest

    ```


    你需要更改项目设置以使用新的静态 main 文件，在测试时直接运行特定文件，或者使用正确的控制台命令来运行你刚刚创建的新静态 main 可执行文件。


    提示：


    回想一下你的第一个编码挑战，当时你修复了一个在测试后意外损坏的 Pong Clone 游戏版本。该挑战探讨了 Java 游戏项目与其资源之间的联系。本质上，每个游戏项目都使用一个配置文件，该文件设置视频游戏的名称并确定查找游戏资源的文件夹。


    通过为 Memory Match 游戏创建一个新的静态 main 方法，你可以指定一个新的游戏引擎配置文件，该文件将进而指定一组新的游戏资源。花点时间追踪任何包含的视频游戏项目，以便更好地了解它们是如何配置的。

