    \ Image resource is too small!\nat net.middlemind.PongClone.NewClass.ExceptionTest(NewClass.java:302)\n\
    at net.middlemind.PongClone.NewClass.main(NewClass.java:339)\n```\n\nTake a moment\
    \ to look over the stack trace and think about what’s\nhappening. There is a second\
    \ line in the trace now because there is a\nsecond entry on the execution stack\
    \ as the exception causing code now\nresides in the `ExceptionTest` method . By\
    \ extension,\nthis tells us that the first line number in the stack trace is the\n\
    location of the error causing line of code, while the last line number\nis the\
    \ location of the first method in the execution stack. That’s\nreally all I wanted\
    \ to go over with regard to the stack trace print-out.\nYou should have more confidence\
    \ now when dealing with a very long null\npointer exception stack trace!\n\nConclusion\n\
    That brings us to the conclusion of the chapter on debugging\ntechniques. I hope\
    \ you learned a thing or two about how to debug your\nJava programs. Let’s take\
    \ a look at the material we covered in this\nchapter.\n\nWhat We Covered\n\nThis\
    \ chapter was a short and sweet one. We still managed to cover a fair\namount\
    \ of important material. Let’s take a look at a summary of the\nchapter’s main\
    \ topics.\n\n*   Output Trace Debugging: We detailed a simple approach to\n  \
    \  debugging a program where we use output statements to outline the\n    execution\
    \ path of a certain method or block of code.\n\n*   IDE Debugging Features: We\
    \ also took a look at the more advanced\n    NetBeans IDE debugged that supports\
    \ break points and a number of actions\n    to take regarding execution of code\
    \ at break points.\n\n*   Handling Exceptions: We revisited the Try-Catch statement\
    \ and\n    talked about some of the philosophies involved with implementing\n\
    \    Try-Catch statements in your code.\n\n*   Defining Exceptions: We looked\
    \ at how we can define and use our\n    own exceptions.\n\n*   The Stack Trace:\
    \ A brief overview of a Java exception’s stack\n    trace.\n\nThis chapter should\
    \ give you all the tools you need in your coding\ntoolbox to triage even the most\
    \ difficult Java exceptions. You’ll even\nbe able to define your own custom exceptions\
    \ to use in your programs to\ncapture certain events or conditions and respond\
    \ by throwing an\nexception.\n\n10. Conclusion\n\nWelcome to the concluding chapter\
    \ of the text! If you’ve made it this\nfar, then you’ve completed a fairly detailed\
    \ review of the Java programming language\n including taking on a number of coding\
    \ challenges designed to\nget you working with slightly more mature projects and\
    \ code. That’s\nsomething to be proud of. You’ve gained a lot of good experience\
    \ and\nbuilt up a solid set of tools for your coding toolbox. Let’s take a\nmoment\
    \ to review some of the things we’ve accomplished together.\n\nAccomplishments\n\
    \nWe’ve covered a lot of ground together in this text. We started at the\nbeginning\
    \ and learned about the origins of the Java programming language\n and then moved\
    \ on to look at variables, data structures, and\neven object-oriented programming.\
    \ Let me outline some of the more\nnotable topics we’ve explored together while\
    \ learning about Java.\n\n*   Chapter [1](#537429_1_En_1_Chapter.xhtml):\n\n*\
    \   Setting Up Your Environment: A quick overview of how to prepare\n        your\
    \ Java game development environment and NetBeans IDE.\n\n*   Checking Out the\
    \ Games: We got to take the associated game project for a\n        test drive.\n\
    \n*   Pong Clone: The simplest project, a clone of the classic game\n        \
    \    Pong.\n\n*   Memory Match: The next most complicated project, a memory card\n\
    \            selection game.\n\n*   Dungeon Trap: The most complicated game implementation,\
    \ battle\n            enemy waves and survive for as long as you can.\n\n*   Chapter\
    \ [2](#537429_1_En_2_Chapter.xhtml):\n\n*   Basic Syntax Rules: A detailed review\
    \ of the basic syntax rules\n        of the Java programming language.\n\n*  \
    \ Keywords/Reserved Words: A review of the language’s reserved\n        words.\n\
    \n*   The Main Game Loop: An introduction to the concepts associated\n       \
    \ with the main game loop.\n\n*   Program Structure: A review of the structure\
    \ of the associated\n        Java game projects.\n\n*   Chapter [3](#537429_1_En_3_Chapter.xhtml):\n\
    \n*   Basic Data Types: A review of the Java language’s basic data\n        types.\n\
    \n*   Challenge: Basic Data Types : A coding\n        challenge to test your knowledge\
    \ of basic data types involving coding\n        changes to a copy of a game project.\n\
    \n*   Advanced Data Types: An introduction to more advanced data types\n     \
    \   in Java like arrays.\n\n*   Challenge: ArrayLists: A coding challenge to test\
    \ your knowledge\n        of the advanced data type: the `ArrayList`.\n\n*   Chapter\
    \ [4](#537429_1_En_4_Chapter.xhtml):\n\n*   Expressions and Operators : A detailed\n\
    \        review of the different types of expressions and operators in the Java\n\
    \        programming language.\n\n*   Flow Control: A review of the flow control\
    \ statements available\n        to you like Switch statements, if statements,\
    \ etc.\n\n*   Challenge: Flow Control: A coding challenge designed to test your\n\
    \        knowledge of Java’s flow control statements.\n\n*   More on Variables:\
    \ A deeper look into certain key aspects of Java\n        variables like enumerations\
    \ and classes.\n\n*   Challenge: Enumerations : A coding\n        challenge to\
    \ apply your knowledge of enumerations in Java.\n\n*   Chapter [5](#537429_1_En_5_Chapter.xhtml):\n\
    \n*   More on Data Structures: A review of the most common data\n        structures\
    \ and their use cases.\n\n*   Parameterized Types and Data Structures: We took\
    \ a moment to\n        discuss the concept of parameterized data structures.\n\
    \n*   Challenge: Stacks: One of the more difficult challenges involving\n    \
    \    refactoring code to use a Stack instead of a List.\n\n*   Chapter [6](#537429_1_En_6_Chapter.xhtml):\n\
    \n*   For Loops :\n        We reviewed the different types of for loops in Java.\n\
    \n*   While Loops: A review of the while loop construct.\n\n*   Main Game Loop:\
    \ Our second discussion on the main game loop where\n        we review in detail\
    \ a few different types of main game loops.\n\n*   Challenge: For-Each Loops:\
    \ A coding challenge that tasks you with\n        refactoring a for loop into\
    \ a for-each loop.\n\n*   Chapter [7](#537429_1_En_7_Chapter.xhtml):\n\n*   Classes\
    \ :\n        We revisited the concept of classes again and in detail as we covered\n\
    \        the most important aspects of Java classes.\n\n*   Challenge: The MmgBmp\
    \ Class: An interesting coding challenge that\n        is designed to get you\
    \ more experience working with some of the game\n        engine’s classes. Specifically,\
    \ the image class, `MmgBmp`.\n\n*   Challenge: The ScreenGame Class: A follow-up\
    \ challenge that ties\n        in user input to control the image configured in\
    \ the previous\n        challenge."
  trans: "\n这个堆栈跟踪应该很熟悉。我们在之前回顾异常处理时已经见过它。这里再次使用它是因为它非常简单。抛出错误的代码位于项目的静态 main 执行方法中。这意味着堆栈跟踪中只有一个条目。异常对象提供给我们的消息如下：\n\
    \n```\nnet.middlemind.PongClone.MyException: Image resource is too small!\n```\n\
    \n它告诉我们异常类以及与异常关联的消息。下一个条目是异常起源的行号和类方法。让我们来看一下。\n\n```\nnet.middlemind.PongClone.NewClass.main(NewClass.java:302)\n\
    ```\n\n在 PongClone 项目中，一个名为 `NewClass` 的类（这是我个人的测试类）中，在静态的 `main` 方法里，出现了一个错误，具体在第\
    \ 302 行。我将通过把异常移动到一个新的静态方法 `ExceptionTest` 中来演示这个“堆栈”。请记住，在没有对象实例的情况下，只能从静态方法访问静态类成员。现在让我们运行程序，看看异常堆栈跟踪是什么样的。\n\
    \n```\nnet.middlemind.PongClone.MyException: Image resource is too small!\nat\
    \ net.middlemind.PongClone.NewClass.ExceptionTest(NewClass.java:302)\nat net.middlemind.PongClone.NewClass.main(NewClass.java:339)\n\
    ```\n\n花点时间查看堆栈跟踪，思考一下发生了什么。现在跟踪中有了第二行，因为执行堆栈上有了第二个条目，因为导致异常的代码现在位于 `ExceptionTest`\
    \ 方法中。由此可知，堆栈跟踪中的第一个行号是导致错误的代码行的位置，而最后一个行号是执行堆栈中第一个方法的位置。关于堆栈跟踪的打印输出，我想讲的就是这些。现在，你在处理非常长的空指针异常堆栈跟踪时应该更有信心了！\n\
    \n结论\n至此，我们结束了关于调试技术的章节。我希望你学到了一些关于如何调试 Java 程序的知识。让我们回顾一下本章涵盖的内容。\n\n本章内容回顾\n\
    \n这一章简短而精炼。但我们仍然涵盖了相当多的重要材料。让我们看看本章主要主题的总结。\n\n*   **输出跟踪调试**：我们详细介绍了一种简单的程序调试方法，即使用输出语句来勾勒某个方法或代码块的执行路径。\n\
    \n*   **IDE 调试功能**：我们还了解了更高级的 NetBeans IDE 调试器，它支持断点以及在断点处执行代码时的多种操作。\n\n*   **处理异常**：我们重新讨论了\
    \ Try-Catch 语句，并探讨了在代码中实现 Try-Catch 语句所涉及的一些理念。\n\n*   **定义异常**：我们研究了如何定义和使用我们自己的异常。\n\
    \n*   **堆栈跟踪**：对 Java 异常的堆栈跟踪进行了简要概述。\n\n本章应该能为你提供编码工具箱中所需的所有工具，以处理甚至是最棘手的 Java\
    \ 异常。你甚至能够定义自己的自定义异常，在程序中使用它们来捕获特定事件或条件，并通过抛出异常来响应。\n\n10. 结论\n\n欢迎来到本书的最后一章！如果你已经读到这里，那么你已经完成了对\
    \ Java 编程语言的相当详细的回顾，包括完成了一系列旨在让你处理更成熟项目和代码的编程挑战。这是值得骄傲的事情。你获得了许多宝贵的经验，并为你的编码工具箱构建了一套扎实的工具。让我们花点时间回顾一下我们共同完成的一些事情。\n\
    \n成就\n\n在这本书中，我们一起涵盖了很多内容。我们从零开始，了解了 Java 编程语言的起源，然后继续学习了变量、数据结构，甚至面向对象编程。让我概述一下我们在学习\
    \ Java 过程中共同探索的一些更值得注意的主题。\n\n*   第 1 章：\n\n    *   **设置你的环境**：快速概述如何准备你的 Java\
    \ 游戏开发环境和 NetBeans IDE。\n\n    *   **试玩游戏**：我们试驾了相关的游戏项目。\n\n        *   **Pong\
    \ 克隆**：最简单的项目，经典游戏 Pong 的克隆版。\n\n        *   **记忆匹配**：下一个最复杂的项目，一个记忆卡选择游戏。\n\n\
    \        *   **地牢陷阱**：最复杂的游戏实现，对抗一波波敌人，尽可能长时间地生存。\n\n*   第 2 章：\n\n    *   **基本语法规则**：详细回顾\
    \ Java 编程语言的基本语法规则。\n\n    *   **关键字/保留字**：回顾语言的保留字。\n\n    *   **主游戏循环**：介绍与主游戏循环相关的概念。\n\
    \n    *   **程序结构**：回顾相关 Java 游戏项目的结构。\n\n*   第 3 章：\n\n    *   **基本数据类型**：回顾 Java\
    \ 语言的基本数据类型。\n\n    *   **挑战：基本数据类型**：一个编程挑战，通过修改游戏项目副本来测试你对基本数据类型的知识。\n\n   \
    \ *   **高级数据类型**：介绍 Java 中更高级的数据类型，如数组。\n\n    *   **挑战：ArrayLists**：一个编程挑战，测试你对高级数据类型\
    \ `ArrayList` 的知识。\n\n*   第 4 章：\n\n    *   **表达式和运算符**：详细回顾 Java 编程语言中不同类型的表达式和运算符。\n\
    \n    *   **流程控制**：回顾可用的流程控制语句，如 Switch 语句、if 语句等。\n\n    *   **挑战：流程控制**：一个旨在测试你对\
    \ Java 流程控制语句知识的编程挑战。\n\n    *   **更多关于变量**：更深入地探讨 Java 变量的某些关键方面，如枚举和类。\n\n \
    \   *   **挑战：枚举**：一个应用你在 Java 中枚举知识的编程挑战。\n\n*   第 5 章：\n\n    *   **更多关于数据结构**：回顾最常见的数据结构及其用例。\n\
    \n    *   **参数化类型和数据结构**：我们花时间讨论了参数化数据结构的概念。\n\n    *   **挑战：栈**：一个较难的挑战，涉及重构代码以使用\
    \ Stack 代替 List。\n\n*   第 6 章：\n\n    *   **For 循环**：我们回顾了 Java 中不同类型的 for 循环。\n\
    \n    *   **While 循环**：回顾 while 循环结构。\n\n    *   **主游戏循环**：我们第二次讨论主游戏循环，详细回顾了几种不同类型的主游戏循环。\n\
    \n    *   **挑战：For-Each 循环**：一个编程挑战，要求你将 for 循环重构为 for-each 循环。\n\n*   第 7 章：\n\
    \n    *   **类**：我们再次详细回顾了类的概念，涵盖了 Java 类最重要的方面。\n\n    *   **挑战：MmgBmp 类**：一个有趣的编程挑战，旨在让你获得更多使用游戏引擎某些类的经验。具体来说，是图像类\
    \ `MmgBmp`。\n\n    *   **挑战：ScreenGame 类**：一个后续挑战，将用户输入与之前挑战中配置的图像控制联系起来。\n"
- fmt: '# Advanced Class Topics

    We took a moment to talk about some more advanced class topics like class member
    access and static main entry points.


    # Challenge: Dungeon Trap’s Static Main

    A coding challenge that will help you understand the concept of the static main
    entry point in Java.


    # Chapter 8


    ## Encapsulation

    We took a look at a few key concepts of OOP including encapsulation in this chapter.


    ## Inheritance

    A review of class inheritance in Java.


    ## Polymorphism

    The last of the advanced OOP topics that we covered in this text; we reviewed
    the concepts of polymorphism in the Java programming language.


    ## Importing Class Libraries

    A brief but informative review of how to create and use class libraries.


    ## Challenge: Create a New Game Project

    A very important coding challenge where you are tasked with creating a new seed
    project for a game that includes a functioning copy of Pong Clone.


    # Chapter 9


    ## Basic Debugging

    We quickly reviewed a basic technique for tracing through your Java code to find
    bugs and trace the execution path.


    ## Advanced Debugging

    We also took a look at more advanced debugging techniques that use the NetBeans
    IDE to step through code.


    ## Exceptions

    A quick review of exceptions in Java explaining how to create and use your own
    exceptions.


    Even just listing the higher-level topics, the most important ones for each chapter
    we’ve clearly covered a lot of material. There are very few aspects of the Java
    programming language that you haven’t been exposed to in some way, but there are
    some. I encourage you to further your exploration of the Java programming language
    and learn more about advanced topics like referencing, abstract classes, and interfaces.


    # Acknowledgments

    I’d like to take a moment to make some important acknowledgments regarding the
    creation of this text and the associated game projects. First off, I’d like to
    mention two people who helped me get this project finished.


    **Gabriel Szabo**: A consummate IT professional who provided an expert technical
    review of this book.


    **Katia Pouleva**: A fantastic artist who created all of the Memory Match Pro
    game art and also cleaned up all of the screenshots in this text.


    With regard to the associated game projects, I’d like to make the following mentions.
    I’d like to thank Pipoya for creating some great, low-cost, 2D video game art.
    You can access Pipoya’s free RPG character sprites at the following URL. Be sure
    to support and check out all of the great work this artist has to offer.


    [Pipoya’s Free RPG Character Sprites 32x32](https://pipoya.itch.io/pipoya-free-rpg-character-sprites-32x32)


    The next content creator I’d like to thank is O_lobster. I used one of O_lobster’s
    free dungeon tilesets to build the DungeonTrap board. You can access O_lobster’s
    work at the following URL:


    [Simple Dungeon Crawler 16x16 Pixel Art Asset Pack](https://o-lobster.itch.io/simple-dungeon-crawler-16x16-pixel-pack%253Fdownload)


    I’d like to thank Robinhood76 and Leszek_Szary for the sound effects they shared
    on freesound.org. The two small sound effects are the only sounds used in the
    game jams within and can be found at the following URLs:


    [FreeSound Sound Effect 1](https://freesound.org/people/Robinhood76/sounds/95557/)


    [FreeSound Sound Effect 2](https://freesound.org/people/Leszek_Szary/sounds/146726/)


    I would also like to thank Chasersgaming and Zintoki, both from itch.io, for their
    artwork that was used in the MmgTestSpace API’s game engine demo application.
    All of the source artwork along with their original download URLs can be found
    in the `cfg/asset_src` folder found in the game engine’s project directory.


    With regard to the Memory Match game, I would like to make the following mentions.
    First off, the cloud convert website for providing a solid service that comes
    in handy when trying to convert audio resources between formats:


    [`https://cloudconvert.com/`](https://cloudconvert.com/)


    Secondly, I would like to thank the creators of the following free resources that
    were used to create the game:


    [Food Icons](https://ghostpixxells.itch.io/pixelfood)


    [Memory Match Logo Source Imagery](https://static.vecteezy.com/system/resources/previews/000/694/128/original/geometric-seamless-pattern-with-colorful-squares-vector.jpg)


    [Game Board Imagery 1](https://www.pexels.com/photo/brown-wood-surface-172289/)


    [Game Board Imagery 2](https://www.pexels.com/photo/macro-shot-of-wooden-planks-326333/)


    Without the talented and gracious work of those listed here, I would not have
    been able to get the associated game projects created for this text. Among the
    various acknowledgments, mentions, and links are some solid resources for video
    game images and audio. Keep an eye out for them!


    # Where You Go from Here

    It’s really up to you what direction you will move in after completing this text.
    Permit me to make a few suggestions.


    - Further your exploration of the Java programming language and learn to use some
    of the remaining, advanced topics that we haven’t covered here like interfaces,
    abstract classes, and object referencing.


    - Make changes to the included video game project. You’ve had a lot of experience
    working with the associated game projects throughout the text’s coding challenges.
    Take it one step further and start implementing your own new game features in
    any of them. Have fun with it!


    - Build your own video game from the Pong Clone seed project up. You’ve learned
    how to create a new seed project for a video game so why not try to create your
    own game.


    - Continue programming in Java and learn more about the classes included in the
    Java framework of standard classes.'
