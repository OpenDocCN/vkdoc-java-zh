    ### 获取游戏项目设置


    现在你已经正确安装了 JDK 和 NetBeans IDE，接下来需要下载与本书配套的项目副本。你可以通过以下网址下载：[`github.com/apress/intro-java-through-game-dev`](http://github.com/apress/intro-java-through-game-dev)。下载项目
    ZIP 文件，并将其解压到你计划存放 NetBeans 项目的目录中。完成此步骤后，打开 NetBeans IDE，选择“文件” ➤ “打开项目”。导航到你解压项目代码的目录。这里有三个项目需要你打开并配置，分别对应本书中将要使用的三个游戏。找到并打开以下项目：


    *   Pong Clone


    *   Memory Match


    *   Dungeon Trap


    你应该会看到类似图片 1-6 的画面。


    ![](img/537429_1_En_1_Fig6_HTML.jpg)


    一个计算机窗口的用户界面，包含一个菜单栏和四个面板：项目、导航器、输出以及一个空面板。


    图片 1-6


    截图 – NetBeans IDE 已打开的项目


    NetBeans IDE 的截图，显示了已打开的游戏项目。


    现在项目已加载，我们需要对其进行配置。首先要检查每个项目是否设置了正确的 JDK 和构建目录。为此，右键点击每个项目并选择“属性”。我们先检查“打包”配置。在属性对话框左侧选择“构建”选项下的“打包”条目（图片
    1-7）。


    ![](img/537429_1_En_1_Fig7_HTML.jpg)


    一个项目属性（Pong Clone）的用户界面，包含源、库、构建，其中编译、打包包括 JAR 文件、从 JAR 文件中排除、编译选项。


    图片 1-7


    截图 – NetBeans IDE 打包属性


    Pong Clone 项目打包属性的截图。


    对于此属性，我们只需检查“JAR 文件”路径是否包含“./dist/”目录。接下来，从“类别”列表中选择“运行”选项。请记住，我们需要对每个游戏项目都进行检查（图片
    1-8）。


    ![](img/537429_1_En_1_Fig8_HTML.jpg)


    一个项目属性的用户界面，包含类别：源、库、构建，以及应用程序和配置、运行时平台、主类、参数、工作目录和 VM 选项。


    图片 1-8


    截图 – NetBeans IDE 运行属性


    显示 Pong Clone 项目运行属性的截图。


    对于此项目属性，我们需要确保“工作目录”设置为项目 JAR 文件将要构建的目录。默认情况下，这是“./dist”目录。最后，选择“类别”列表中的“源”条目（图片
    1-9）。


    ![](img/537429_1_En_1_Fig9_HTML.jpg)


    一个项目属性（Pong Clone）的用户界面，包含类别：源、库、构建和应用程序。右侧是项目文件夹、源包文件夹、文本包文件夹、源和配置文件。


    图片 1-9


    截图 – NetBeans IDE 源属性


    显示源项目设置并选择了 JDK 11 的截图。


    “源/二进制格式”字段应设置为“JDK 11”。如果你打算尝试针对不同的 JDK 运行游戏，可以在此处更改项目设置。再次强调，请确保对每个游戏项目都执行这些项目设置检查。在运行游戏之前，最后需要做的是确保项目库已正确映射。为此，在项目属性对话框的“类别”列表中选择“库”选项（图片
    1-10）。


    ![](img/537429_1_En_1_Fig10_HTML.jpg)


    一个项目属性（Pong Clone）的用户界面，包含类别：库，其中包括 Java 平台、编译、处理器、运行、编译测试和运行测试。


    图片 1-10


    截图 – NetBeans IDE 库属性


    显示项目设置中库类别的截图，其中三个库已正确配置。


    每个游戏项目都应配置相同的三个库。我在此列出它们：


    *   jinput: ./lib/jinput/jinput-2.0.9.jar


    *   jutils: ./lib/jutils/jutils-1.0.0.jar


    *   MmgGameApiJava: ./lib/MmgGameApiJava.jar


    要添加库，请选择“类路径”标签旁边的“+”按钮，然后找到前面列出的 JAR 文件。每个游戏都有自己的本地“lib”文件夹，其中包含所需 JAR 文件的副本。库正确映射后，我们就可以进入有趣的部分，测试不同的游戏了。如果项目属性对话框仍处于打开状态，请关闭它，然后右键点击第一个游戏项目
    Dungeon Trap；从上下文菜单中选择“清理并构建”。观察项目构建过程，确保其无错误完成。对剩余的两个游戏项目也执行清理并构建过程。确保每个项目都能无错误地构建。


    ## 试玩游戏


    现在，让我们花点时间运行每个游戏项目，并稍微玩一下。如果你展开每个项目，并在项目树中展开源代码条目，你会看到每个项目都有一个主命名空间。主要项目命名空间如下：


    *   net.middlemind.DungeonTrap


    *   net.middlemind.PongClone


    *   net.middlemind.MemoryMatch


    每个项目的主命名空间中包含了驱动最终版本游戏的所有 Java 类。对于每个命名空间，都会有一个主文件作为程序的静态入口点。这个 Java 类将与项目同名。主要项目文件如下：


    *   DungeonTrap.java


    *   PongClone.java


    *   MemoryMatch.java


    你会注意到一些命名空间，名称类似于“PongClone_Chapter1_Challenge1”。这些是用于处理本书中不同挑战的沙盒环境。我们可以暂时忽略这些命名空间。对于每个游戏项目，右键点击主文件并选择“运行”选项。你应该会看到每个游戏对应的主菜单（图片
    1-11）。


    ![](img/537429_1_En_1_Fig11a_HTML.jpg)


    一个 Dungeon Trap MMG 文件的用户界面，其中黑屏显示游戏教程和玩家游戏 1、玩家游戏 2 以及退出游戏选项，并带有一个手形符号。


    ![](img/537429_1_En_1_Fig11b_HTML.jpg)![](img/537429_1_En_1_Fig11c_HTML.jpg)![](img/537429_1_En_1_Fig11d_HTML.jpg)![](img/537429_1_En_1_Fig11e_HTML.jpg)![](img/537429_1_En_1_Fig11f_HTML.jpg)


    图片 1-11


    截图 – NetBeans IDE 游戏演示


    一系列截图，展示了本书附带的每个示例游戏的主菜单。


    游戏演示部分到此结束。希望你喜欢这些小游戏，并期待开始学习 Java 编程语言以及尝试一些编码挑战！


    ## 结论


    作为本章的总结，我想指出我们刚才完成的事情相当了不起。我们在短短几秒钟内从零起步，完成了安装 JDK、安装 IDE，然后下载、配置并运行了三个游戏项目。这就是
    Java 强大能力的一个例证。当你接受旨在应用 Java 编程语言知识的不同编码挑战时，你一定会看到更多这样的例子。现在，让我们花点时间回顾一下本章的内容。

