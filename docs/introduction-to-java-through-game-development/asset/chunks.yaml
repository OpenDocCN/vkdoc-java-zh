    it should look familiar to you. Let’s break down what’s actually going on here.
    The for loop statement has three parts to it and a body. The first part of the
    for loop is ended by the first semicolon. This space is for initializing loop
    variables. Variables declared here are only available in the scope of the loop’s
    body, meaning you can’t refer to them outside of the loop. For instance, the example
    shown in Listing [6-2](#537429_1_En_6_Chapter.xhtml#PC2) would cause an error.


    ```

