    ***Java 编程说明：并非所有 Java IDE 都使用相同的项目结构。请花时间熟悉你的 Java IDE 创建的项目结构，并清楚了解你的包和 Java
    类文件所在的位置。**


    思考一下如何在你的程序中使用这个访问修饰符。你能想象哪些场景需要限制对包内类等的访问？这里没有绝对的对错，只是提供一些思考方向。接下来看第 3 行的下一个变量
    `numberOfPlayers`。这个变量使用了 `public` 访问修饰符，可以从任何其他类中访问。


    ```

    //代码

    1 public GameData gameMetaData = new GameData();

    2 System.out.println("Number of Players: " + gameMetaData.numberOfPlayers);

    //输出

    1 Number of Players: 1

    清单 7-4

    访问基本 Java 类公共字段的示例

    ```


    访问公共字段时，你只需指定正确实例化的类实例（此处为 `gameMetaData`），并使用点运算符“.”来指定你要访问的公共字段。


    ***游戏编程说明：在 Java 游戏实现中使用带有公共字段的简单类是完全正常的。当你需要了解字段值何时发生变化时，才开始关注对字段访问的控制。然后，你可以定义与字段交互的方法，并在必要时重构现有代码。**


    如你所见，公共访问修饰符非常简单，它提供了对类变量的无限制访问。在大多数情况下，如果你不确定真正需要哪种访问权限，可以从使用公共访问修饰符开始。看看使用这种类型的字段引用值是多么容易，如上一个清单代码部分的第
    2 行所示。我们要讨论的最后一个访问修饰符是未提供任何修饰符的情况，即默认访问修饰符。默认修饰符允许在以下条件下进行访问：


    *   封闭类中的任何代码

    *   与封闭类位于同一包中的其他类


    这与受保护访问修饰符没有太大区别，只是它不允许子类或扩展当前类的类进行访问，除非它们位于同一个包中。至此，我们关于类字段的章节就结束了。它们是你编码工具箱中的一个强大工具，因为现在你将能够创建不仅支持跟踪特定数据，还能通过使用
    Java 的访问修饰符来控制对该数据访问的类。在下一节中，我们将探讨类的另一个非常重要的部分：方法。


    ### 方法


    方法是另一种类型的类成员，这意味着它们总是在类定义的上下文中定义的。Java 中的方法类似于其他编程语言（如 C 和 C++）中的函数。它们是仅在调用时运行的代码块。它们可以接收参数，也可以返回值。


    到目前为止，我一直避免讨论作用域的概念，因为它是一个更高级的编程概念，与语言本身的细微差别关系不大，而更多与任何给定情况下语言元素的结构有关。Java 中的变量具有作用域。变量的作用域是指该变量有效且可访问的代码块（一个或多个代码块）。


    Java 中的字段与其他变量一样具有作用域，你不仅可以从类外部访问它们（如我们在清单 7-4 中所见），还可以在类内部的方法中访问它们。这允许你创建可重用的代码块，这些代码块与类的字段以及传递给方法的任何参数一起工作，以便在需要时生成返回值。实际上，方法可以不接受任何参数，也不返回任何数据。让我们通过几个不同方法声明的示例来进一步讨论。我们将继续使用前两个清单中虚构的
    `GameData` 类。让我们直接看代码！


