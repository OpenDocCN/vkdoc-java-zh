    异常

    在之前讨论 Java 编程语言中的流程控制时，我们曾简要接触过`Exception`类以及一般的 Java 错误处理。我们将重新讨论这个主题，并谈谈在 Java
    程序中使用异常的一些更细致的要点。


    处理异常

    当一行 Java 代码由于某种原因无法正常执行时，就会生成异常。发生这种情况时，会生成一个包含错误信息和当前执行堆栈跟踪的异常。为了响应这些错误，我们必须在代码中使用
    Try-Catch 语句。


    正如我们之前所见，Try-Catch 语句允许我们尝试运行一段代码，并响应在此过程中可能出现的任何错误。这可能会导致某些实现决策，这些决策可能对你的程序产生更广泛的影响，值得讨论。让我们看一些
    Try-Catch 语句的示例。请注意代码中的一些细微差别，我们接下来会讨论它们。


    ```

    //code

    01 System.out.println("Exception #1:");

    02 try {

    03     String s = null;

    04     int l = s.length();

    05 } catch (Exception e) {

    06     e.printStackTrace();

    07 }

    ```'
