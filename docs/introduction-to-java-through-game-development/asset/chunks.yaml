    class.


    As you can see from the previous listing, we’ve used inheritance, a

    powerful OOP tool in our coding toolbox, to create a new exception class

    based on the main one. Now that we’ve designed a custom exception, we

    can use it in specific places where we see fit. Let’s motivate the

    discussion with another example employing the exception class we just

    created: `MyException`  .


    ```

    //code

    1 public void ProcessImage(MmgBmp image) throws MyException {

