    59     //error, exit the program

    60     return;

    61 }


    63 //double

    64 u = "200.10";

    65 try {

    66     double tD;

    67     tD = Double.parseDouble(u);

    68 } catch (Exception e) {

    69     //error, exit the program

    70     return;

    71 }


    73 //boolean

    74 u = "true";

    75 try {

    76     boolean tBl;

    77     tBl = Boolean.parseBoolean(u);

    78 } catch (Exception e) {

    79     //error, exit the program

    80     return;

    81 }

    Listing 4-20

    Example of Converting from a String to the Basic Data Types

    ```


    A block of code showing conversion between a `String` and other basic data types.


    It looks a bit complicated, so we’ll talk about what’s going on here. Converting
    from a `String` data type to another basic data type isn’t that straightforward.
    There’s a bit of an encoding involved. For instance, if the string value that
    we’re converting isn’t a “true” or “false” value, then we won’t be able to accurately
    convert it to a `Boolean`, and an exception will be thrown.


    To perform the actual conversion, we rely on the “boxed” version of the data types
    – `Byte`, `Short`, `Integer`, `Long`, `Float`, `Double`, and `Boolean`. For the
    `char` conversion, we simply use the first character value in the string. This
    could be `null` or otherwise nonexistent, so we are prepared to catch an exception
    during this conversion as well. For the remaining basic data types, we use a parse
    method, which is a static method of the object version of the basic data types.


    A static method is a method that is defined for the class itself, not an instance
    of the class. For instance, to convert a `String`, `s`, to an `int`, `j`, you
    would use the following method call:


    ```

    j = Integer.parseInt(s);

    ```


    And be prepared to catch an exception in case the string doesn’t contain an integer
    in string form. Let’s look at how we would convert from the other basic data types
    to the `String` data type.


    ```

    01 //prep

    02 String u;


    04 u = (tB + ""); //byte

    05 u = (tC + ""); //char

    06 u = (tS + ""); //short

    07 u = (tI + ""); //int

    08 u = (tL + ""); //long

    09 u = (tF + ""); //float

    10 u = (tD + ""); //double

    11 u = (tBl + ""); //boolean

    Listing 4-21

    Example of Converting from the Basic Data Types to a String

    ```


    A null-safe way to convert from basic data type to the `String` data type. It
    continues from the code in Listing [4-20](#537429_1_En_4_Chapter.xhtml#PC26).


    In Listing [4-21](#537429_1_En_4_Chapter.xhtml#PC28), which continues from the
    code in Listing [4-20](#537429_1_En_4_Chapter.xhtml#PC26), we can see a null-safe
    way to convert each of the basic data types to the `String` data type. What makes
    this a null-safe way to convert the variable’s value? Notice that no method call
    is made to convert the values. Instead, we’re relying on the Java language itself,
    which converts an `Object`; in this case, it automatically boxes the basic data
    type converting it to an object of type – `Byte`, `Short`, `Integer`, `Long`,
    `Float`, `Double`, `Boolean`. Then it calls the internal `toString` method returning
    a string that can then be concatenated with the empty string. In this way, we
    can return a string value without calling a method.


    Now that we have got converting a `String` to and from the basic data types down,
    we can talk about converting some of the numeric basic data types to and from
    other numeric basic data types. It turns out that without any concern, we can
    convert from smaller data types to larger data types in some cases. For instance,
    the following conversions are allowed.


    ```

    01 //implicit conversion

    02 byte b = 8;

    03 //char c = b; //cannot convert to char implicitly

    04 int i = b;

    05 long l = b;

    06 float f = b;

    07 double d = b;


    09 //explicit conversion

    10 f = (float)d;

    11 l = (long)d;

    12 i = (int)d;

    13 c = (char)d;

    14 b = (byte)d;

    Listing 4-22

    Example of Implicit and Explicit Variable Conversion

    ```


    An example demonstrating the conversion of numeric basic data types to other numeric
    basic data types.


    The implicit conversions are done automatically by the compiler without so much
    as a complaint. The reason is that we’re converting from a smaller data type to
    a larger data type so there’s no possibility of data loss, lines 1–7. When converting
    data types in the other direction, though, we’ll get an error unless we tell the
    compiler that we’re aware the conversion we’re doing could possibly cause a loss
    of data. Why would data be lost?


    Well, it’s literally a matter of space. The amount of information used to describe
    a `long` could not fit into a `byte`. When converting from a `long` to a `byte`,
    we face the possibility of data loss because a `byte` can’t hold numbers as large
    as a variable of data type `long`. In order to perform this type of conversion,
    we have to let the compiler know that we are aware of the danger. We do so by
    adding the destination data type surrounded by parenthesis in front of the assignment
    operator. Try applying explicit and implicit casting to variables of other basic
    data types.'
