  trans: "\n\n![](img/978-1-4842-8951-8_CoverFigure.jpg)\n\nISBN 978-1-4842-8950-1\
    \ e-ISBN 978-1-4842-8951-8 [`doi.org/10.1007/978-1-4842-8951-8`](https://doi.org/10.1007/978-1-4842-8951-8)\
    \ © Victor G. Brusca 2023 标准 Apress 版本。本书中可能出现商标名称、标识和图片。为避免在每个商标名称、标识或图片出现时都使用商标符号，我们仅在编辑风格下使用这些名称、标识和图片，以维护商标所有者的利益，且无意侵犯商标权。本出版物中使用的商品名称、商标、服务标志及类似术语，即使未明确标识，也不应被视为对其是否受专有权利保护的立场表达。出版商、作者和编辑可合理假定，本书中的建议和信息在出版之日是真实准确的。出版商、作者或编辑均不对本书所含材料或可能存在的任何错误或遗漏提供明示或暗示的担保。出版商对已出版地图中的管辖权主张及机构归属保持中立。\n\
    \n本 Apress 印记由注册公司 APress Media, LLC（斯普林格自然集团的一部分）出版。\n\n注册公司地址为：美国纽约州纽约市新广场 1\
    \ 号，邮编 10004。\n\n*谨以此书献给我的父母、吉米叔叔和蒂安蒂。我深爱着你们。*\n\n引言\n\n在本书《通过游戏开发学习 Java》中，你将通过详细学习\
    \ Java 编程语言的基础知识，包括数据结构与面向对象编程（OOP），并通过贯穿全文的编程挑战来巩固所学。立即下载本书的项目和源代码开始学习吧： [`http://github.com/apress/introduction-to-java-through-gamedev/`](http://github.com/apress/introduction-to-java-through-gamedev/)\
    \ 通过使用相关的游戏项目以及针对特定主题的编程挑战，你将获得使用 Java 编程语言、NetBeans IDE、一个 2D 游戏引擎以及三款不同 2D 游戏的实践经验与知识！这本入门教材将为你打下坚实的\
    \ Java 和视频游戏编程基础，供你后续发展。\n\n关于作者\n\n# 1. 引言\n\n在本书《通过游戏开发学习 Java》中，你将通过动手实践游戏开发任务来学习\
    \ Java 编程语言的基础知识。通过完成针对文本中三款游戏特定方面的主题编程挑战，你将获得使用 Java 编程语言、NetBeans IDE、一个 2D\
    \ 游戏引擎以及三款不同 2D 游戏的实践经验与知识。闲话少叙，请允许我提供一些关于本书的详细信息，首先从本书的结构和约定开始。\n\n## 关于本书\n\n\
    本书将引导你学习 Java 编程语言的基础知识及部分高级主题。随着我们深入不同主题，你将面临挑战，需要修改、修复、编写和/或调试本书附带的三款游戏之一的副本：\n\
    \n*   Pong 克隆版\n\n*   记忆配对\n\n*   地牢陷阱\n\n每款游戏均使用本书附带的一个专有 2D 游戏引擎编写。该引擎是开源的，如果你想查看相关代码，可以在此处访问：\n\
    \n`github.com/apress/intro-java-through-game-dev`\n\n与此游戏项目相关的源代码可在同一仓库中找到。\n\n\
    每个项目都包含一个功能完整的游戏版本，附带完整源代码以及编程挑战。随着你阅读本书的深入，你将获得一些挑战，这些挑战要求你将特定的 Java 编程语言知识应用于当前游戏项目。每个章节的挑战都预先配置了特定的游戏项目副本。\n\
    \n一般来说，本书不要求你长时间连接互联网，除了下载本书及其相关代码和程序之外。你只需要少量的计算资源即可运行相关软件和游戏。你的计算机应至少满足以下最低配置要求：\n\
    \n*   双核 CPU\n\n*   4GB 系统内存\n\n*   2GB 存储空间\n\n任何相对现代的计算机都能轻松应对这些工作负载。在使用任何现代编程语言时，都必须决定如何用该语言进行编码。通常，你可以仅使用记事本和几个命令行工具来编写和构建程序。然而，在我们的案例中，我们希望使用更高级的工具，因此我们需要使用\
    \ IDE。\n\nIDE 是集成开发环境，它是一个相当复杂的程序，其任务是简化软件开发人员的某些工作，使他们能够承担更大的项目并专注于手头的编码工作。游戏是复杂的程序，通常包含许多动态部件。因此，使用\
    \ IDE 将使我们受益匪浅，所以我们选择了 NetBeans IDE。\n\n本书中的每个示例游戏都是为一个简单的 Java 2D 游戏引擎编写的。通过完成本书中的编程挑战所获得的经验，将极大地帮助读者打下坚实基础，从而能够使用附带的游戏引擎在\
    \ Java 中创建自己的 2D 游戏。\n\n## 关于格式说明\n\n全书采用一些一致的格式模式，我想在此说明。首先，每章都遵循相似的大致结构，如下所示：\n\
    \n*   章节引言\n    *   主题 #1\n\n    *   主题 #2\n\n    *   挑战描述\n\n    *   挑战解决方案\n\
    \n*   章节结论\n\n“主题”和“挑战”部分会根据需要重复，以涵盖章节的所有主题，其结构有时会略有变化。但总体而言，每章的结构都接近上述大纲。除了文本内容外，每章都会在相关游戏项目中为本章的每个挑战创建一个命名空间条目。\n\
    \n更多细节将在后续说明。目前，主要要点是每个挑战都会有一个小型的游戏沙盒副本供你操作，以及一个已完成的示例供你参考。代码挑战本身的结构已在章节大纲中呈现，但无论如何，在继续之前，让我们先稍微讨论一下它们。\n\
    \n*   挑战描述\n\n*   挑战解决方案\n\n上文列出了本书中编程挑战的一般结构。挑战将附带详细描述，如果提供线索，也会一并给出。当然，章节和章节标题会有所变化。挑战本身旨在应用当前编程语言主题中学到的知识。挑战可能各不相同，但始终是使用当前\
    \ Java 编程语言主题的小型开发任务。\n\n每个挑战部分之后，都会对正确的解决方法进行解释，包括截图或其他资源来演示正确的功能。我们还会明确指出在哪里可以找到已完成挑战的代码，这样你就不必担心不理解某个问题是如何解决的。\n\
    \n以上总结了本书章节和挑战部分的一般结构。本书的整体节奏从 Java 编程语言的基础方面开始，逐步深入到更高级的主题和语言特性。"
- fmt: '## Notes on Conventions


    There are a few conventions in the text we should also discuss before getting
    further into the text. First off, we have lists of items:


    *   Item 1

    *   Item 2

    *   Item 3


    In most cases, these will be simply shown in-line with the text and not be adorned
    with any special header or caption text. In rare cases where the list has some
    kind of special significance, it may appear with its own header and caption similar
    to the way code and images are shown. Code snippets in the text will be presented
    with a header and caption in the following format:


    ```

    1 int test = 0;

    Listing 1-1

    Code Listing Example – SomeClass.java

    ```


    Caption for the example code listing from the `SomeClass.java` file.


    Information about what code the snippet is showing can be found in the header
    text and/or the caption text or the context associated with the code snippet.
    Line numbers in code snippets are relative to the starting line of the code and
    are not absolute. The starting line of code is determined by the context of the
    text, what example the text is currently working with, and always starts at line
    1 unless the code is split across multiple listings. Images are presented in a
    similar fashion, as shown subsequently.


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig1_HTML.jpg)


    A user interface of a dungeon trap M M G file has the game tutorial and player
    game1, player game 2, and exit game options.


    Image 1-1


    Screenshot – Dungeon Trap Main Menu


    A screenshot of the Dungeon Trap game’s main menu.


    Lastly, there will be places in the text where a tip or aside is listed. There
    are two types of side notes in the text: notes about game development and notes
    about the Java programming language. These entries are formatted as follows:


    ***Game Development Note:** A note about Java game development or game engine
    use.*


    ***Java Programming Note:** A detailed note about Java programming.*


    This listing type will be used to present extended or advanced information on
    a topic as it’s associated with game development or the Java programming language.


    ## Objectives


    There are a few objectives that this book hopes to accomplish. The first is a
    complete review and demonstration of the Java programming language’s base features.
    The second is an introduction to select advanced features of the Java programming
    language. Lastly, this text is designed to give you experience working directly
    with game code using the NetBeans IDE and a set of included video game projects.
    Let’s take a look at these objectives in little more detail.


    ### Java Fundamental Topics


    The fundamental Java programming language topics covered in this text are listed
    as follows with a brief description:


    *   Overview: Programming Computers: A brief overview of programming computers

    *   The Java Programming Language: A brief history of the Java programming language

    *   Overview – Game Programming: A brief overview of game programming

    *   Basic Data Types: Basic data types in Java

    *   Advanced Data Types: Advanced, custom data types in Java

    *   Enumerations: Enumeration data types in Java

    *   Using Variables: Working with variables

    *   Numeric Expressions: Working with numeric expressions

    *   Boolean Expressions: Working with Boolean expressions

    *   If, Else, Else-If Statements: Flow control, if-else statements

    *   Switch Statements: Flow control, Switch statements

    *   Using Arrays: Working with arrays in Java

    *   Basic For Loop: Working with for loops

    *   While Loops: Working with while loops

    *   Importing Classes/Libraries: Working with Java classes and libraries


    This text will provide you with a solid foundation of experience working with
    fundamental aspects of the Java programming language. In the next section, we’ll
    look at the advanced Java programming topics that are addressed in this text.


    ### Java Advanced Topics


    This text does address some of the more advanced Java programming topics without
    getting too deep into very advanced programming. You may find these topics a little
    bit more challenging as they are inherently more complex. We’ll provide you with
    solid information and challenges to help you grasp the material. The advanced
    topics that are addressed in this text are as follows:


    *   Custom Data Types: Working with classes and enumerations

    *   Try-Catch Statements: Using try-catch statements to control flow

    *   Data Structures Lists: Simple example of using List data structures

    *   Data Structures Dictionaries: Simple example of using Dictionary data structures

    *   Generic vs. Specialized Data Structures: Brief introduction to generic and
    specialized data structures

    *   For-Each Loop: Using for-each loops

    *   Overview – Object Oriented Programming: Brief introduction to OOP design and
    implementation

    *   Classes: Brief introduction to classes

    *   Fields: Using class fields

    *   Methods: Using class methods

    *   Constructors: Using class constructors

    *   Static Members: Working with static class members

    *   Class Access: Talking points on class member access

    *   Class Design: Talking points on class design and implementation

    *   Encapsulation: Examples of encapsulation in a Java game project

    *   Polymorphism: Examples of using polymorphism in a Java game project

    *   Inheritance: Brief review of inheritance

    *   Project Structure: Brief review of project structure

    *   Debugging: Using debugging to trace program errors and issues.


    Java programming advanced topics can often lead to a tremendous amount of material
    to review and discuss. That is outside the scope of this text, so we’ll keep our
    topic discussions and challenges associated with advanced programming topics brief
    so that we can cover as many topics and material as possible.


    ### Game Development Topics


    Due to the introductory nature of this text, we won’t cover game development topics
    directly, but because each challenge in the text is focused on applying the Java
    programming language knowledge that you learn to an actual video game, you will
    gain some knowledge and exposure to the following game development topics:


    *   Project Structure: Experience working with three different games and their
    classes, project structure.

    *   Game Resources: Experience working with game resources.

    *   Game Engines: A full game engine is included with the text and is used by
    all the example games.

    *   Main Game Loop: Experience working with and understanding the importance of
    the main game loop.


    That brings us to the conclusion of this section. We’ve quickly outlined the different
    topics that we’ll cover in the text both directly via topics and challenges, and
    indirectly by working with parts of a larger more complex project. In the next
    section, we’ll set up your development environment and get the latest copy of
    the book’s code.'
  raw: '## Notes on Conventions


    There are a few conventions in the text we should also discuss before getting
    further into the text. First off, we have lists of items:


    *   Item 1


    *   Item 2


    *   Item 3


    In most cases, these will be simply shown in-line with the text and not be adorned
    with any special header or caption text. In rare cases where the list has some
    kind of special significance, it may appear with its own header and caption similar
    to the way code and images are shown. Code snippets in the text will be presented
    with a header and caption in the following format:


    ```

    1 int test = 0;

    Listing 1-1

    Code Listing Example – SomeClass.java

    ```


    Caption for the example code listing from the SomeClass.java file.


    Information about what code the snippet is showing can be found in the header
    text and/or the caption text or the context associated with the code snippet.
    Line numbers in code snippets are relative to the starting line of the code and
    are not absolute. The starting line of code is determined by the context of the
    text, what example the text is currently working with, and always starts at line
    1 unless the code is split across multiple listings. Images are presented in a
    similar fashion, as shown subsequently.


