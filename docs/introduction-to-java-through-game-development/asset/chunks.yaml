    \ Clone 新游戏的用户界面。屏幕显示玩家游戏 1、玩家游戏 2 和退出游戏选项。\n\n图 8-13\n显示新项目运行中的截图\n\n一张显示新游戏运行中的截图。注意标题与默认的\
    \ Pong Clone 游戏不同。\n恭喜！你现在可以使用简单的 Pong Clone 游戏作为起点来创建新的游戏项目了。你可以根据需要清理代码或修改代码。将这一知识与通过编辑\
    \ `ScreenGame` 类来修改游戏的经验相结合，你就可以开始构建自己的简单游戏了。\n\n结论\n至此，本章以及我们对 Java 类的讨论就结束了。我们实际了解了\
    \ Java 编程语言的许多不同特性，并完成了一些有难度的代码挑战。接下来，让我们总结一下本章涵盖的内容。\n\n本章内容回顾\n\n你掌握了一些高级概念，并完成了一系列困难的编码挑战。你已经证明了自己的实力。让我们回顾一下我们所学的内容。\n\
    \n*   **封装**\n    ：我们讨论了面向对象编程中封装的概念，以及如何在某些高级案例中进一步应用该概念。\n\n*   **继承**\n   \
    \ ：我们讨论了 Java 中的类继承，并通过几个示例进行了演示。\n\n*   **挑战：继承**：你接受了一个使用继承为 Dungeon Trap 游戏添加新武器“火焰长矛”的艰巨挑战。\n\
    \n*   **多态**\n    ：我们讨论了 Java 面向对象编程中多态的概念，并在类和方法层面进行了演示。\n\n*   **挑战：多态**：你的任务是进一步修改新的火焰长矛武器，使其可以投掷。这需要大量的技巧和知识。恭喜你完成了挑战！\n\
    \n*   **导入类库**：我们以讨论如何将代码打包成名为 JAR 文件的库来结束对类的回顾。我们通过讨论如何在项目中包含 JAR 文件以及如何使用 `import`\
    \ 语句在代码中访问新的 Java 类来结束本节。\n\n*   **视频游戏项目结构**\n    ：这是关于 Java 编程应用的重要章节之一，特别是关于使用所包含游戏引擎的项目结构。\n\
    \n*   **挑战：创建新游戏项目**：这是迄今为止你遇到的最困难的挑战之一。这个挑战非常特定于游戏引擎和项目结构。如果你没有完成这个挑战也没关系，因为它包含很多步骤。\n\
    \n我们已经掌握了 Java 类，并学会了如何创建 Pong Clone 游戏的全新副本，用作新游戏的起始项目。你已经准备好开始构建游戏了。回顾一下不同的编码挑战，记住如何向\
    \ `ScreenGame` 类添加新图像以及如何控制它们。你正在通往制作下一个伟大游戏的道路上！\n\n9. 调试技术\n\n无论你多么努力，你的第一个软件解决方案的实现很少是完美的。大多数时候，我们需要调试代码，以弄清楚它在做什么，更重要的是，它哪里做错了。为了成为任何语言的成功程序员，我们需要能够熟练地调试程序，因此我们将介绍一些关于这个主题的基本概念。\n\
    \n输出跟踪\n\n最基本、最有效的调试技术之一不需要特殊的软件、IDE 或库。输出跟踪使用输出语句来标记正在执行的代码以及某些变量的值。让我们通过一个例子来引出讨论。\n\
