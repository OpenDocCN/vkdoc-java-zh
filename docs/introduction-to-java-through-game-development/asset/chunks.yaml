    结论


    至此，我们结束了关于 Java 类的第一章。在本章中，我们花时间讨论了 Java 编程语言的一些面向对象特性。我们甚至花时间探讨了类设计的一些微妙之处，并完成了三个编码挑战。还不错。让我们来看看本章所涵盖内容的总结。


    我们涵盖的内容


    让我们来看看本章中遇到的面向对象编程主题和编码挑战：


    *   **类声明**：我们查看了一些基本的类定义，并讨论了这一级别的访问修饰符。

    *   **字段**：我们讨论了向类中添加字段，以及使用访问修饰符来控制这些类字段的使用方式。

    *   **方法**：我们通过回顾类方法、访问修饰符、方法参数等，进一步探索了 Java 类。

    *   **静态成员**：我们通过回顾静态字段和方法等静态类成员，进一步加深了对类的理解。

    *   **构造方法**：类初始化从未如此简单。我们查看了类的构造方法，并区分了默认构造方法和自定义构造方法。

    *   **挑战：MmgBmp 类**：这个挑战让我们通过向游戏中添加自己的图像，获得了直接修改游戏的经验。我们获得了更多使用游戏引擎类（如 `MmgBmp`
    和 `ScreenGame`）的经验。我们还成功地将自己的图像添加到了游戏画面中！

    *   **挑战：ScreenGame 类**：这个挑战让我们获得了更多处理用户输入的经验。我们配置了 `ScreenGame` 类来处理新的键盘输入，以动画方式显示和隐藏我们的新游戏图像。通过这种方式，我们添加了一个有点不必要的游戏功能，但添加类似新游戏功能的过程是相同的。

    *   **访问**：一个稍微高级的话题；我们讨论了类中访问修饰符的一些细节。

    *   **类设计**：我们讨论了一些类设计概念。这些是你在设计类时应该牢记的更高层次的想法。

    *   **静态主入口点**：一个非常重要的话题；没有静态主入口点，你就无法运行程序。我们涵盖了这一主题，并演示了如何创建静态主类，以及如何执行包默认的和目标可执行的
    Java 类。

    *   **挑战：地牢陷阱的静态主入口点**：本章的最后一个挑战；我们通过为记忆匹配游戏创建一个使用不同游戏资源集的新可执行 Java 类，获得了更多关于游戏引擎、游戏引擎配置文件、游戏资源和静态主入口点的经验。


    Java 类是我们编码工具箱中一个极其强大的工具。每次你坐下来编写 Java 程序时，都会用到类。知道如何创建类并通过访问修饰符、自定义构造方法和类方法来定义它们的用途，为你作为
    Java 开发者打开了一个全新的可能性世界。在下一章中，我们将更进一步，回顾一些强大的语言特性，这些特性让我们能够以更多方式使用类。


