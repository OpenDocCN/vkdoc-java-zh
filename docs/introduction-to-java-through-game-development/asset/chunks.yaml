    \ of using Java’s `Thread` class to sleep for a set time, allowing for the control\
    \ of the loop’s timing.\n\nThere are some subtle points in Listing 6-14 I’d like\
    \ to discuss. First, look at the `while` loop on line 1; notice the condition\
    \ of the loop. It’s the game’s main loop so it’s designed to exit when the game\
    \ ends. Next on line 2, we capture the frame’s start time in ms, `frameStart`.\
