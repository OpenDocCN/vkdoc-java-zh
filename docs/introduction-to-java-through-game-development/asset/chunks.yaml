    An example demonstrating the use of a custom exception class.

    In the previous listing, we can see the use of the `MyException` class. In

    this example, we use the exception in a fictional `ProcessImage` method . This
    method

    takes an `MmgBmp`, image

    resource argument, and returns no value. The purpose of this method is

    to check the passed-in image argument and make sure its dimensions are

    larger than 10 pixels in width and height. If not, an exception is

    thrown.

    Note that the method declares what exceptions are thrown in the body

    of the method using the `throws` keyword in the

    method declaration. There can be multiple, comma-separated entries here.

    When we want to throw an exception, we use the `throw` keyword

    followed by the instance of the exception class that we want to throw.

    In this example, we’re using our fictional `MyException` class and

    providing a descriptive error message. Why is this implementation not

    ideal?

    The reason why it isn’t an ideal implementation is because the

    exception class is not indicative of the error it is designed to

    represent. This is not as intuitive as say naming our exception class

    `ImageResourceException`

    as opposed to `MyException`. Again,

    being intuitive and clear is the better implementation choice. In the

    next section, we’ll briefly look at the information that comes back from

    a thrown exception, namely, the stack trace.


    The Stack Trace

    An important aspect of programming in Java is being able to handle

    unforeseen errors. These will manifest to you as exceptions and crash

    your program in the worst way when you least expect it. When you get an

    exception, you usually get a message and stack trace  printed to

    standard error.

    Sometimes, the environment you’re executing your programs in will not

    give you access to output streams. You may have to try to capture and

    indicate errors in the program itself. In this case, it is wise to

    implement a very high-level catch-all Try-Catch that prevents the

    program from crashing completely. This will give you a chance to display

    some information about the error that you can use to address the

    issue.


    In any case, you should have access to exception stack traces most of

    the time. NetBeans takes care of displaying any output during project

    execution right to a panel in the IDE. Let’s take a look at an example

    stack trace so we can get a better understanding of the information it

    provides us and how we can use it to fix bugs.


