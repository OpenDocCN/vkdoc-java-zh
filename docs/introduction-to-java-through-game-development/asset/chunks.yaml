  trans: '

    ### Switch 语句


    Switch 语句是 Java 编程语言中另一种流程控制工具，当需要根据某个变量的值执行多种不同操作时，它非常有用。在前面的示例中，该变量是字符变量 `c`。让我们看一段等效的代码片段，它用
    Switch 语句替换了 If-Else 语句。


    ```

    01 switch(c) {

    02     case ''x'':

    03         paddle1MoveUp = false;

    04         paddle1MoveDown = true;

    05         return true;

    06     case ''X'':

    07         paddle1MoveUp = false;

    08         paddle1MoveDown = true;

    09         return true;

    10     case ''s'':

    11         paddle1MoveUp = true;

    12         paddle1MoveDown = false;

    13         return true;

    14     case ''S'':

    15         paddle1MoveUp = true;

    16         paddle1MoveDown = false;

    17         return true;

    18 }

    代码清单 4-14

    Switch 语句示例

    ```


    一个 Switch 语句的示例，其中每个 case 都替换了一个 If-Else 或 Else-If 子句。


    花点时间看一下 Switch 语句的结构。每个 Else-If 语句都被一个检查特定值的 case 语句条目所取代。通常，Switch 语句的 `case`
    子句以 `break` 语句结束，但在某些情况下，`return` 语句也能很好地工作。让我们看一个稍微重构过的 Switch 语句，它更接近我们之前看到的第一个
    If-Else 语句，并且我们将用 break 语句替换 return 语句。


    ```

    01 switch(c) {

    02     case ''x'':

    03     case ''X'':

    04         paddle1MoveUp = false;

    05         paddle1MoveDown = true;

    06         break;

    07     case ''s'':

    08     case ''S'':

    09         paddle1MoveUp = true;

    10         paddle1MoveDown = false;

    11         break;

    12     default:

    13         paddle1MoveUp = false;

    14         paddle1MoveDown = false;

    15         break;

    16 }

    代码清单 4-15

    带有 Break 和 Default Case 的 Switch 语句示例


    一个 Switch 语句的示例，其中每个 case 都替换了一个 Else-If 子句。


    正如我们之前提到的，这是一个稍微调整过的 Switch 语句。请注意，“x”和“X”条件会执行相同的 `case` 分支代码。这是利用 Switch 语句的
    case 子句不带退出语句（`break` 或 `return`）来将相似代码分支分组的一个示例。例如，当用户按下“x”键时，与他们在开启大写锁定并按下“X”时运行的代码相同。这与我们之前看到的原始
    If-Else 语句中的结构相同。最后，Switch 语句有一个 default case。这类似于 If-Else-If 语句中的 Else 子句。当之前的
    Switch 语句 case 没有直接匹配时，default case 会执行。


    总的来说，Switch 语句非常直接。它们紧密遵循 If-Else 语句的逻辑，但在某些场景下提供了更简洁的语法。Switch 语句只能用于某些数据类型 `–`
    byte、short、char、int `–` 以及枚举数据类型，如数组和枚举。在下一节中，我们将介绍一种不同形式的流程控制：使用 Try-Catch 语句进行错误处理。


    ### Try-Catch 语句


    到目前为止，我们回顾的流程控制语句都是显式语句，我们检查变量的值并决定执行哪个代码分支。在大多数情况下，If-Else 语句非常擅长处理这种情况。有时，当比较同一个变量的值以决定多个不同的代码分支时，你需要使用
    Switch 语句来利用其更简洁的语法。


    在某些情况下，你需要控制程序的流程，但并非我们之前看到的正常场景。在这种情况下，我们关心的是在发生错误时控制程序的流程。针对这种特定情况，Java 为我们提供了
    Try-Catch 语句。让我们看一个基本示例。


    ```

    //代码

    1 try {

    2     int t;

    3     String u = "test";

    4     t = Integer.parseInt(u);

    5 } catch (Exception e) {

    6     e.printStackTrace();

    7 }

    //输出

    1 java.lang.NumberFormatException: For input string: "test"

    代码清单 4-16

    Try-Catch 语句示例

    ```


    一个使用 Try-Catch 语句在错误发生时控制程序流程的示例。


    在上一个代码清单中，第 3 行对 `String u` 的初始化是不正确的。该变量被初始化为一个单词，而不是数字字符串。通常，这完全没问题，但在第 4 行，我们使用该字符串变量作为源值来转换为
    Integer。现在，这段代码将会失败并抛出 `NumberFormatException –` 我们可以捕获它！


    出于我们的目的，我们捕获了更通用的 `Exception`。这对我们的演示来说没问题，但你应该使你的 Try-Catch 语句与它们旨在处理的异常类型保持一致。现在，在这个示例中，我们只做了报告错误（第
    6 行），但我们可以在 catch 子句中采取任意数量的措施来纠正遇到的异常，或者我们可以报告问题并优雅地退出程序。


    无论哪种情况，我们都能在遇到异常后控制程序的流程，因为我们在可能成为错误来源（即抛出异常）的代码周围使用了 Try-Catch 语句。通过这种方式，我们可以使用
    Try-Catch 语句来保护可能产生错误的代码，同时相应地响应错误，从而使我们自己的 Java 程序非常稳定。


    至此，本节内容就结束了。在下一节中，我们将通过一个关于该主题的挑战来巩固我们对程序流程控制的知识。让我们看看这个挑战，然后直接进入代码！


    ### 挑战：流程控制


    在本章的第一个挑战中，我们将利用流程控制的知识来修改一份 Pong Clone 游戏的副本。这个挑战要求我们修改游戏的输入处理，以支持更多的键盘按键。让我们看看具体细节。


    涉及的包：


    ```

    net.middlemind.PongClone_Chapter4_Challenge1

    net.middlemind.PongClone_Chapter4_Challenge1_Solved

    ```


    描述：


    找到包 net.middlemind.PongClone_Chapter4_Challenge1，并打开 ScreenGame.java 文件。一些测试人员报告说，在玩双人游戏时控制球拍有点困难。我们需要为玩家
    1 和玩家 2 映射两组新的按键（每组两个键），以添加新的球拍上下控制功能。


    找到 `ScreenGame` 类中的 `ProcessKeyPress` 和 `ProcessKeyRelease` 方法。你需要运用 Java 流程控制语句的知识，为两组新的键盘按键添加支持：一组用于玩家
    1 上下移动球拍，另一组用于玩家 2 执行相同操作。以玩家 1 已有的代码为模板。你必须运行此包的文件 `–` PongClone.java；右键单击并选择“运行文件”来测试游戏。


    提示：


    你需要根据使用的键盘按键以及按键是被按下还是释放，将以下变量设置为 true 或 false：


    *   paddle1MoveUp


    *   paddle1MoveDown


    *   paddle2MoveUp


    *   paddle2MoveDown


    记住，你必须在按键释放方法 `ProcessKeyRelease` 中重置布尔变量；否则，玩家的球拍会卡住，持续向上或向下移动。


    为了运行该包特定版本的游戏，你必须点击该包中包含的静态主类，并从上下文菜单中选择“运行文件”。否则，将执行项目的默认游戏。如果你正确解决了挑战，游戏应该能正常运行，并允许你使用刚刚创建的新键盘映射来控制玩家
    1 和玩家 2 的球拍。

