- fmt: '# Game Programming


    I’d be remiss in my duty if I didn’t spend a little bit of time talking about
    game programming. After all, we will be using three different games in our challenges
    as we explore the Java programming language. As I mentioned earlier, video games
    are a rather unique and challenging type of program. They often require real-time
    response, intelligent computer opponents, complex input, video, music, sound effects,
    and multiplayer/network support. That requires a video game developer to master
    the APIs necessary to do just about everything a computer can do.


    Fear not, game engines can help take much of that responsibility off of your shoulders.
    The games that are included in this book actually incorporate a compact 2D game
    engine. Each game is a self-contained project including a full engine source code
    all running in a little Java program. You’ll gain experience programming games
    in challenges designed to demonstrate understanding of Java programming language
    features.


    While we won’t attempt to build a game from scratch in this introductory text,
    you will get some solid game programming experience. Furthermore, you’ll gain
    experience working with the Application Programming Interface (API) of a game
    engine, and you can use this knowledge to write your own games.


    An important piece of introductory information, with regard to game programming,
    is the main game loop. The main game loop is a common attribute of games and game
    engines alike; it is a special structure that occurs in almost every game. It
    is fundamental to game programming, and as such, we’ll talk about the main game
    loop in a little bit more detail in the next section. We’ll also encounter this
    topic again, a little later in the text, and in much more detail.


    ## The Main Game Loop


    The main game loop is a common structure that occurs in just about every video
    game around. The code that makes a video game interactive and dynamic runs in
    the main game loop but is separated into different main responsibilities. The
    loop itself is a controlled infinite loop that makes a game run in real time;
    it''s the place where all the objects in your game will be updated and subsequently
    drawn on the screen^([⁷](#fn7)).


    The basic responsibilities of a game loop can be broken down into the following
    steps: initialize, update, and draw. The initialize step can occur at different
    times in the life cycle of a game, but it must occur at some point. The update
    step is where all the game logic runs. This is the code where things like collision
    detection, hits, sound effects, enemy AI, etc., are handled. Lastly, now that
    the game state has been updated, it’s time to draw the new game state on the screen.
    That’s where the draw step comes in. Also keep in mind that depending on the game
    in question, networking could be added into the update step.


    The main game loop will contain a sync with network objects in the case of a networked
    multiplayer game. That’s the structure of the main game loop, and it’s something
    you should keep in mind when working on game programming. In the next section,
    we’ll talk about the general structure of the included game projects. This will
    give us a hand when we start navigating around the different project’s classes.


    ## Program Structure


    The three games included with the text (Dungeon Trap, Memory Match, and Pong Clone)
    all use the same game engine. The Java version of the `MmgGameApi` 2D game engine.
    The entire engine exists in the included `MmgGameApiJava.jar` file. In general,
    the increasing complexity of the projects is as follows:


    *   Pong Clone: Easy

    *   Memory Match: Moderate

    *   Dungeon Trap: Expert


    Each project contains a custom version of the following Java classes along with
    proprietary supporting classes:


    *   Static Main Class: Has the same name as the game itself. Each package, including
    each challenge package, has a static main for executing that version of the game.

    *   `MainFrame.java`: The parent of the `GamePanel` class that represents the
    main window frame that holds the game panel.

    *   `GamePanel.java`: The main class responsible for drawing, processing input,
    switching screens, and much more.

    *   `ScreenGame.java`: The screen class that runs the game.

    *   `ScreenMainMenu.java`: The screen class that runs the game’s menu screen.


    The game classes are a bit complex, so don’t try to edit them on your own just
    yet. By the end of the book, you should be able to work with them just fine, but
    we have a bit of ground to cover before then. In the subsequent section, we’ll
    describe the games included with the text in a little more detail.


    ## Overview of Included Games


    Even though you got a chance to check out the actual games in the first chapter,
    let’s take a look at a brief description of each game.


    1.  **Pong Clone**: A simple two-player clone of the “Pong” video game. Players
    use different controls to move paddles up and down in order to keep a ball in
    play. The game uses AI enemy logic when playing in single-player mode. This is
    the simplest of the three games and includes only five Java classes.


    2.  **Memory Match**: A simple solitaire-style memory game that also supports
    two-player mode to share in the memory matching fun. The game supports three modes
    of increasing difficulty using more memory cards. This is the second most complex
    game in the set.


    3.  **Dungeon Trap**: A unique mini game where players are stuck in a dungeon
    room that is flooded with waves of enemies. Fight to stay alive and collect different
    power-ups to stay in the fight. You can even throw the furniture across the room
    to send enemies flying. This is the most complex of the three games and includes
    a number of Java classes. Despite the complexity, it follows the same basic structure
    as the other games, and the extra code logic is mainly used in the Java classes
    that actually run the game.


    That brings us to the conclusion of this section and the end of this chapter.
    I hope the game descriptions piqued your curiosity just a bit if the actual games
    did not. Let’s wrap up the chapter with a summary of the main topics that we’ve
    covered before moving on to our first chapter on the Java programming language.


    ## Conclusion


    In this chapter, we took a look at what it means to program computers and more
    specifically what it means to program using the Java programming language. We
    got to look at some high-level aspects of the language and focused on some key
    features of the types of programs we’re going to be working with. Let’s summarize
    the material we covered.'
