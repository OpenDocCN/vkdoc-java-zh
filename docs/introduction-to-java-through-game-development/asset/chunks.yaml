    A user interface of a new game of a pong clone. The screen displays\noptions for\
    \ player game 1, player game 2, and exit game options.\n\nImage 8-13\nScreenshot\
    \ Showing the New Project in Action\n\nA screenshot showing the new game in action.\
    \ Notice the title with\ndifferent value than the default Pong Clone game.\nCongratulations!\
    \ You can now create new game projects using the\nsimple Pong Clone game\n as\
    \ a starting point. You can clean out the code or alter it as\nyou see fit. Combine\
    \ this knowledge with your experience modifying games\nby editing the `ScreenGame`\
    \ class and\nyou can start building your own simple games.\n\nConclusion\nThat\
    \ brings us to the conclusion of the chapter and the end of our\ndiscussion on\
    \ Java classes. We got to take a look at a lot of different\nfeatures of the Java\
    \ programming language in action and took on a few\ndifficult code challenges.\
    \ Let’s summarize the material we covered in\nthis chapter subsequently.\n\nWhat\
    \ We Covered\n\nYou made your way through some advanced concepts and a gauntlet\
    \ of\ndifficult coding challenges. You’ve earned your stripes. Let’s review\n\
    what we’ve covered.\n\n*   Encapsulation\n    : We discuss the concept of encapsulation\
    \ in OOP and how to\n    further that concept in certain advanced cases.\n\n*\
    \   Inheritance\n    : We talked about class inheritance in Java and demonstrated\
    \ it\n    with a few examples.\n\n*   Challenge: Inheritance: You took on a tough\
    \ challenge using\n    inheritance to add a new weapon, the flame spear, to the\
    \ Dungeon Trap\n    game.\n\n*   Polymorphism\n    : We discussed the concept\
    \ of polymorphism in Java OOP and\n    demonstrated it at the class and method\
    \ level.\n\n*   Challenge: Polymorphism: You were tasked with modifying the new\n\
    \    flame spear weapon further to make it throwable. This took a lot of\n   \
    \ skill and knowledge. Congratulations for taking it on!\n\n*   Importing Class\
    \ Libraries : Wrapping up\n    our review on classes with a discussion on how\
    \ to wrap up your code into\n    libraries called JAR files. We concluded the\
    \ section by discussing how\n    to include JAR files in a project and access\
    \ the new Java classes in\n    your code using the import statement.\n\n*   Video\
    \ Game Project\n     Structure: One of the more important chapters on applied\
    \ Java\n    programming, specifically the structure of projects that use the\n\
    \    included game engine.\n\n*   Challenge: Create a New Game Project: One of\
    \ the most difficult\n    challenges you’ve encountered thus far. This one is\
    \ very specific to the\n    game engine and the project structure. It’s ok if\
    \ you didn’t get this\n    one; there are a lot of steps.\n\nWe’ve mastered Java\
    \ classes and learned how to create our own fresh\nnew copy of the Pong Clone\
    \ game for use as a new game’s starting\nproject. You’re ready to start building\
    \ a game. Look back to the\ndifferent coding challenges and remember how to add\
    \ new images to the\n`ScreenGame`\nclass and how to control them. You’re well\
    \ on your way to making your\nnext great game!\n\n9. Debugging Techniques\n\n\
    No matter how hard you try, chances are your first implementation of\na software\
    \ solution is rarely perfect. Most of the time we need to debug\nour code to figure\
    \ out what it’s doing and, more importantly, what it’s\ndoing wrong. In order\
    \ to be a successful programmer in any language, we\nneed to be able to competently\
    \ debug a program, so we’ll cover a few\nbasic ideas on the subject.\n\nOutput\
    \ Trace\n\nOne of the most basic and effective debugging techniques \nrequires\
    \ no special software, IDE, or libraries. The output trace uses\noutput statements\
    \ to mark what code is executing and what values certain\nvariables have. Let’s\
    \ motivate the discussion with an example.\n\n```\n//code\n01 public void CheckForMatches(MemoryItem\
    \ itm) {\n02     System.out.println(\"CheckForMatches: START\");\n03     if(clickedCards\
    \ != null) {\n04         int len = clickedCards.size();\n05         Stack tmp\
    \ = new Stack();\n06           System.out.println(\"CheckForMatches: AAA: \" +\
    \ len);\n\n08         for(int i = 0; i < len; i++) {\n09             MemoryItem\
    \ tItm = clickedCards.pop();\n10             ProcessMatchCheck(tItm, itm);\n11\
    \             tmp.push(tItm);\n12         }"
