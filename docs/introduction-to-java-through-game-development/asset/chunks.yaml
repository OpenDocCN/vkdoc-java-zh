  trans: '

    ### 类型转换与强制转换


    我们在此讨论的类型转换与强制转换，将仅限于基本数据类型（byte、char、short、int、long、float、double、String、boolean）之间的相互转换。String
    类型的转换比较特殊，所以我们先把它讲清楚。下面的代码片段展示了如何将 String 值转换为其他基本数据类型。让我们来看一下！


    ```

    01 //准备

    02 String u;


    04 //byte

    05 u = "128";

    06 try {

    07     byte tB;

    08     tB = Byte.parseByte(u);

    09 } catch (Exception e) {

    10     //错误，退出程序

    11     return;

    12 }


    14 //char

    15 u = "c";

    16 try {

    17     char tC = u.toCharArray()[0];

    18 } catch (Exception e) {

    19     //错误，退出程序

    20     return;

    21 }


    23 //short

    24 u = "1024";

    25 try {

    26     short tS;

    27     tS = Short.parseShort(u);

    28 } catch (Exception e) {

    29     //错误，退出程序

    30     return;

    31 }


    33 //int

    34 u = "10";

    35 try {

    36     int tI;

    37     tI = Integer.parseInt(u);

    38 } catch (Exception e) {

    39     //错误，退出程序

    40     return;

    41 }


    43 //long

    44 u = "2048";

    45 try {

    46     long tL;

    47     tL = Long.parseLong(u);

    48 } catch (Exception e) {

    49     //错误，退出程序

    50     return;

    51 }


    53 //float

    54 u = "100.05";

    55 try {

    56     float tF;

    57     tF = Float.parseFloat(u);

    58 } catch (Exception e) {

    59     //错误，退出程序

    60     return;

    61 }


    63 //double

    64 u = "200.10";

    65 try {

    66     double tD;

    67     tD = Double.parseDouble(u);

    68 } catch (Exception e) {

    69     //错误，退出程序

    70     return;

    71 }


    73 //boolean

    74 u = "true";

    75 try {

    76     boolean tBl;

    77     tBl = Boolean.parseBoolean(u);

    78 } catch (Exception e) {

    79     //错误，退出程序

    80     return;

    81 }

    清单 4-20

    从 String 转换为基本数据类型的示例

    ```


    一段展示 String 与其他基本数据类型之间转换的代码块。


    这段代码看起来有点复杂，所以我们来讨论一下这里发生了什么。从 `String` 数据类型转换为其他基本数据类型并非那么直接。这涉及到一些编码问题。例如，如果我们要转换的字符串值不是“true”或“false”，那么我们就无法准确地将其转换为布尔值，并且会抛出异常。


    为了执行实际的转换，我们依赖于这些数据类型的“包装”版本——`Byte`、`Short`、`Integer`、`Long`、`Float`、`Double`
    和 `Boolean`。对于 `char` 转换，我们简单地使用字符串中的第一个字符值。这个值可能是 `null` 或者根本不存在，因此我们也需要准备好在此转换过程中捕获异常。对于其余的基本数据类型，我们使用一个解析方法，它是基本数据类型对象版本的静态方法。


    静态方法是针对类本身定义的方法，而不是针对类的实例。例如，要将 `String` `s` 转换为 `int` `j`，你可以使用以下方法调用：


    ```

    j = Integer.parseInt(s);

    ```


    并且要准备好捕获异常，以防字符串不包含整数形式的字符串。让我们看看如何从其他基本数据类型转换为 `String` 数据类型。


    ```

    01 //准备

    02 String u;


    04 u = (tB + ""); //byte

    05 u = (tC + ""); //char

    06 u = (tS + ""); //short

    07 u = (tI + ""); //int

    08 u = (tL + ""); //long

    09 u = (tF + ""); //float

    10 u = (tD + ""); //double

    11 u = (tBl + ""); //boolean

    清单 4-21

    从基本数据类型转换为 String 的示例

    ```


    一种将基本数据类型转换为 `String` 数据类型的空安全方式。它延续了清单 4-20 中的代码。


    在清单 4-21 中，它延续了清单 4-20 中的代码，我们可以看到一种将每个基本数据类型转换为 `String` 数据类型的空安全方式。是什么让这种转换变量的方式成为空安全的呢？请注意，这里没有调用任何方法来转换这些值。相反，我们依赖的是
    Java 语言本身，它会转换一个 `Object`；在这种情况下，它会自动装箱基本数据类型，将其转换为相应类型的对象——`Byte`、`Short`、`Integer`、`Long`、`Float`、`Double`、`Boolean`。然后它调用内部的
    `toString` 方法，返回一个字符串，该字符串随后可以与空字符串拼接。通过这种方式，我们无需调用方法就能返回一个字符串值。


    现在我们已经掌握了 `String` 与基本数据类型之间的相互转换，接下来可以讨论一些数值型基本数据类型与其他数值型基本数据类型之间的转换了。事实证明，在某些情况下，我们可以毫无顾虑地将较小的数据类型转换为较大的数据类型。例如，以下转换是允许的。


    ```

    01 //隐式转换

    02 byte b = 8;

    03 //char c = b; //无法隐式转换为 char

    04 int i = b;

    05 long l = b;

    06 float f = b;

    07 double d = b;


    09 //显式转换

    10 f = (float)d;

    11 l = (long)d;

    12 i = (int)d;

    13 c = (char)d;

    14 b = (byte)d;

    清单 4-22

    隐式和显式变量转换的示例

    ```


    一个演示数值型基本数据类型转换为其他数值型基本数据类型的示例。


    隐式转换由编译器自动完成，不会发出任何抱怨。原因是我们是从较小的数据类型转换为较大的数据类型，因此不存在数据丢失的可能性，如第 1-7 行所示。然而，当反向转换数据类型时，除非我们告诉编译器，我们意识到正在进行的转换可能会导致数据丢失，否则会得到一个错误。为什么会丢失数据呢？


    嗯，这实际上是一个空间问题。用于描述 `long` 的信息量无法容纳在一个 `byte` 中。当从 `long` 转换为 `byte` 时，我们面临数据丢失的可能性，因为
    `byte` 无法容纳像 `long` 数据类型变量那样大的数字。为了执行这种类型的转换，我们必须让编译器知道我们意识到了这种危险。我们通过在赋值运算符前面加上用括号括起来的目标数据类型来实现这一点。尝试对其他基本数据类型的变量应用显式和隐式强制转换。

