- fmt: '### Switch Statements


    Switch statements are another flow control tool in the Java programming language,
    and they come in handy mainly when there are multiple, different, actions that
    must be taken based on the value of a certain variable. In the preceding example,
    that variable is the character variable `c`. Let’s take a look at an equivalent
    snippet of code that replaces the If-Else statement with a Switch statement.


    ```

    01 switch(c) {

    02     case ''x'':

    03         paddle1MoveUp = false;

    04         paddle1MoveDown = true;

    05         return true;

    06     case ''X'':

    07         paddle1MoveUp = false;

    08         paddle1MoveDown = true;

    09         return true;

    10     case ''s'':

    11         paddle1MoveUp = true;

    12         paddle1MoveDown = false;

    13         return true;

    14     case ''S'':

    15         paddle1MoveUp = true;

    16         paddle1MoveDown = false;

    17         return true;

    18 }

    Listing 4-14

    Example of Switch Statement

    ```


    An example of a Switch statement where each case has replaced an If-Else or Else-If
    clause.


    Take a moment to look over the Switch statement’s structure. Each Else-If statement
    is replaced by a `case` statement entry that checks a specific value. Normally,
    a Switch statement’s `case` clause is concluded with a `break` statement, but
    a `return` statement works just fine in certain circumstances. Let’s take a look
    at a slightly re-structured Switch statement that more closely matches the first
    If-Else statement we looked at, and we’ll replace the `return` statement with
    a `break` statement.


    ```

    01 switch(c) {

    02     case ''x'':

    03     case ''X'':

    04         paddle1MoveUp = false;

    05         paddle1MoveDown = true;

    06         break;

    07     case ''s'':

    08     case ''S'':

    09         paddle1MoveUp = true;

    10         paddle1MoveDown = false;

    11         break;

    12     default:

    13         paddle1MoveUp = false;

    14         paddle1MoveDown = false;

    15         break;

    16 }

    Listing 4-15

    Example of Switch Statement with Break and Default Case

    ```


    An example of a Switch statement where each case has replaced an Else-If clause.


    As we mentioned earlier, this is a slightly adjusted Switch statement. Notice
    that the “x” and “X” conditions evaluate to the same `case` branch code. This
    is an example of using the Switch statement’s `case` clause without an exit statement,
    `break` or `return`, to group up similar branches of code. For instance, the same
    code is run when the user presses the “x” key as when they have Caps Lock on and
    press “X”. This is the same structure that’s in the original If-Else statement
    we looked at earlier. Lastly, the Switch statement has a `default` case. This
    is similar to the `Else` clause of an If-Else-If statement. The `default` case
    executes in the case there isn’t a direct match on a previous Switch statement
    case.


    For the most part, Switch statements are really straightforward. They closely
    follow the logic of If-Else statements but provide a cleaner syntax in certain
    scenarios. Switch statements can only be used with certain data types – `byte`,
    `short`, `char`, `int` – and enumerated data types like arrays and enumerations.
    In the next section, we’ll take a look at a different form of flow control: error
    handling with Try-Catch statements.


    ### Try-Catch Statements


    Up until this point, the flow control statements we’ve reviewed are explicit statements
    where we check the value of a variable and make a decision as to which branch
    of code to execute. The If-Else statement is very good at handling this in most
    cases. Every now and then you will need to use a Switch statement to take advantage
    of the cleaner syntax when comparing the same variable’s value for multiple different
    branches of code.


    There are some cases where you need to control the flow of the program but not
    in the normal scenarios we’ve looked at prior. In this circumstance, we’re interested
    in controlling the flow of the program when an error occurs. For this particular
    situation, Java provides us with the Try-Catch statement. Let’s take a look at
    a basic example.


    ```

    //code

    1 try {

    2     int t;

    3     String u = "test";

    4     t = Integer.parseInt(u);

    5 } catch (Exception e) {

    6     e.printStackTrace();

    7 }

    //output

    1 java.lang.NumberFormatException: For input string: "test"

    Listing 4-16

    Example of Try-Catch Statement

    ```


    An example of a Try-Catch statement being used to control program flow around
    an error.


    In the previous listing, on line 3, the initialization of the `String u` is incorrect.
    The variable is initialized to a word and not a number string. Normally, this
    would be a perfectly fine choice, but on line 4, we’re using the string variable
    as the source value to convert to an Integer. Now, this code will fail and throw
    a `NumberFormatException` – that we can catch!


    For our purposes, we’re catching the more general, `Exception`. This is fine for
    our demonstration, but you should keep your Try-Catch statements aligned to the
    type of exceptions they are meant to handle. Now, in this example, all we do is
    report the error, line 6, but we could have taken any number of measures in the
    `catch` clause to correct the exception encountered or we could report the issue
    and gracefully exit the program.


    In either case, we’re able to control the flow of the program after encountering
    an exception because we employed the Try-Catch statement around code that could
    potentially be the source of an error, that is, throw an exception. In this way,
    we can make our own Java programs very stable by using Try-Catch statements to
    protect code that could generate an error while responding to the error accordingly.


    That brings us to the conclusion of this section. In the next section, we’ll reinforce
    our knowledge on program flow control with a challenge on the subject. Let’s check
    out the challenge and jump into some code!


    ### Challenge: Flow Control


    In our first challenge for this chapter, we’ll use our knowledge of flow control
    to alter a copy of the Pong Clone game. This challenge will require us to alter
    the game’s input handling to support more keyboard keys. Let’s take a look at
    the details.


    Packages Involved:


    ```

    net.middlemind.PongClone_Chapter4_Challenge1

    net.middlemind.PongClone_Chapter4_Challenge1_Solved

    ```


    Description:


    Find the package, `net.middlemind.PongClone_Chapter4_Challenge1`, and open the
    `ScreenGame.java` file. Some of the testers are reporting that it''s kind of difficult
    to control the paddles when playing a two-player game. We''ll have to map two
    new sets of two keys each to add new paddle down and up controls for players 1
    and 2.


    Find the `ProcessKeyPress` and `ProcessKeyRelease` methods of the `ScreenGame`
    class. You''ll have to use your knowledge of Java flow control statements to add
    support for two new sets of keyboard keys: one for player1 to move the paddle
    up and down and a set for player2 to do the same. Use the code that''s already
    in place for player1 as a template. You must run this package''s file – `PongClone.java`;
    right-click and select Run File to test the game.


    Clue:


    You''ll have to set the following variables to `true` or `false` depending on
    the keyboard key used and if the key is being pressed or released:


    *   `paddle1MoveUp`

    *   `paddle1MoveDown`

    *   `paddle2MoveUp`

    *   `paddle2MoveDown`


    Remember, you have to reset the Boolean variable in the key release method, `ProcessKeyRelease`;
    otherwise, the player''s paddle will be stuck, moving either up or down.


    In order to run the package’s specific version of the game, you have to click
    on the static main class contained in that package and select “Run File” from
    the context menu. Otherwise, the project’s default game will execute. If you’ve
    solved the challenge correctly, the game should run properly and allow you to
    control the player1 and player2 paddle using the new keyboard mappings you just
    made.'
