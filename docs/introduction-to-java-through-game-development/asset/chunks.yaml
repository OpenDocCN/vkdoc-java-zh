    \ before, that every class is a subclass of the `Object` super-class, and this\
    \ super-class defines a `toString` method that provides a string representation\
    \ of the class. By overriding it, we are customizing the method to return a specific\
    \ value. In this case, the following statement:  \n`This fish, [fish name], eats\
    \ ‘[food source]’`\n\nThis is an example of polymorphism as the `toString` method\
