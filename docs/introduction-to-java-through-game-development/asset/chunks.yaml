  trans: '

    ### 使用基本数据类型


    尽管它们是基本数据类型，但正如我之前提到的，它们是任何 Java 程序的基础。在上一节中，我们了解了如何使用基本数据类型声明变量。我将在代码清单 3-2 中总结基本数据类型在变量声明中的用法。


    ```

    1 boolean b;

    2 byte b;

    3 short s;

    4 int i;

    5 long l;

    6 float f;

    7 double d;

    8 char c;

    9 String s;

    代码清单 3-2

    变量声明与基本数据类型

    ```


    一个使用 Java 基本数据类型进行变量声明的示例。在最简单的形式中，变量声明由数据类型关键字后跟变量名组成。


    ***Java 编程提示：当变量是重要的高级变量时，请花时间为其赋予有意义的名称。对于临时变量，可以使用像上面所示的短名称。*


    基本变量声明的模式是数据类型关键字后跟一个有效的变量名。接下来，我们来介绍已声明变量的初始化。请注意，数据必须与数据类型匹配。在相似的数据类型之间允许进行一些类型转换（即转换），但我们不会在此处讨论这个高级主题。让我们看一下代码清单
    3-3。


    ```

    01 boolean b;

    02 b = true;


    04 byte b;

    05 b = 0;


    07 short s;

    08 s = 256;


    10 int i;

    11 i = -1;


    13 long l;

    14 l = 32000000;


    16 float f;

    17 f = 1.3f;


    19 double d;

    20 d = 2e15;


    22 char c;

    23 c = ‘c’;


    25 String s;

    26 s = "some string here";

    代码清单 3-3

    带初始化的变量声明与基本数据类型

    ```


    一个使用 Java 基本数据类型进行变量声明和初始化的示例。


    ***Java 编程提示：初始化变量时，最好遵循程序中现有代码所设定的相同范式（如果有的话）。如果程序是新的，则保持变量声明和初始化方法的一致性。*


    还有一种更短的声明和初始化形式，称为实例化。通常，这个概念仅适用于对象和类，但基本数据类型的语法类似，因此我粗略地将其称为实例化。代码清单 3-4 展示了所有基本数据类型的实例化示例。


    ```

    1 boolean b = true;

    2 byte b = 0;

    3 short s = 256;

    4 int i = -1;

    5 long l = 32000000;

    6 float f = 1.3f;

    7 double d = 2e15;

    8 char c = ‘c’;

    9 String s = "some string here";

    代码清单 3-4

    变量实例化与基本数据类型

    ```


    一个使用 Java 基本数据类型进行变量实例化的示例。


