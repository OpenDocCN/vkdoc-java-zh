    \ class, `RainbowTrout`, is defined, which extends the `Trout` class. This class,\
    \ being a specific type of trout, only has to customize some class methods, already\
    \ defined from the `Trout` and the `Fish` class. In this case, all we have to\
    \ do is override the `getName` method to specify the class is a rainbow trout\
    \ class. Notice that each class that extends the `Fish` class, or a subclass of\
