- fmt: '### Declaring Hashtables


    Hashes are a powerful tool to add to our coding toolbox. Now that we’ve had a
    brief introduction to the concept of hashes, let’s take a look at how we can use
    them in the Java programming language. Let’s have a look at how we declare and
    instantiate a hash table in Java.


    ```

    1 //simple hashtable declaration, using default key, value data type as Object
    implicitly

    2 Hashtable ht1 = new Hashtable();


    4 //advanced hashtable declaration specifying key, value data type as Object explicitly

    5 Hashtable ht2 = new Hashtable();


    7 //advanced hashtable declaration specifying key, value data types as Integers
    and short form of initialization

    8 Hashtable ht3 = new Hashtable();

    Listing 5-5

    Hashtables – Declaration Examples

    ```


    An example of declaring different hash tables using implicit and explicit data
    type specifications for the key and value pair.


    At first glance, this might seem a bit complex. Let’s talk through it and see
    what’s going on. A quick thought before we continue, let’s remember that the data
    structures we’re looking at here are more advanced than basic data types and even
    some of the data structures we’ve reviewed earlier. When we define a `Hashtable`,
    we are setting up a mapping between keys and values.


    That means given some key, you can look up a value. But both the key and value,
    in this case, also have their own data types. For instance, you could use a `String`
    for both and your `Hashtable` would function exactly like a little dictionary.
    Let me further the concept with an example.


    ```

    //code

    1 String key = "Java";

    2 String value = "Java is a computer programming language.";

    3 Hashtable ht = new Hashtable();


    5 ht.put(key, value);

    6 System.out.println("The value for key: " + key + " is: ''" + ht.get("Java")
    + "''");

    //output

    1 The value for key: Java is: ''Java is a computer programming language.''

    Listing 5-6

    Hashtables – String Key, Value Data Types

    ```


    An example of declaring a `Hashtable`, initializing it and setting, and getting
    a value.


    Take a look at Listing [5-6](#537429_1_En_5_Chapter.xhtml#PC6). Notice the use
    of basic data type, `String`, in the key and value pair definition, `<String,
    String>`, when declaring the hash table. We’ve seen these angled brackets before
    when we reviewed `ArrayList`s. They are used to configure certain data structures
    by setting their internal data types. In this case, they are used to set the data
    type of the `Hashtable`’s key and value.


    Diverting our attention back to Listing [5-5](#537429_1_En_5_Chapter.xhtml#PC5),
    take a look at line number 2. Notice that we didn’t specify a data type for the
    key or value of the hash table. No worries, Java takes care of it for us and will
    simply use a default data type, the `Object` data type. The `Object` data type
    is the parent of all classes defined in the Java programming language, even the
    ones you haven’t created yet. We’ll cover more on `Object`s when we cover object-oriented
    programming.


    For now, it’s safe to think of them as a placeholder for a less generic `Object`
    defined by you. For instance, you could choose to use a `String` object, like
    we did in Listing [5-6](#537429_1_En_5_Chapter.xhtml#PC6). On line 4 of Listing
    [5-5](#537429_1_En_5_Chapter.xhtml#PC5), we’ve used a form of `Hashtable` declaration
    that explicitly defines the data type of the key and value used by the hash table.
    Notice that we’ve explicitly defined the same data types that would have been
    used by default.


    Next, on line 8 of Listing [5-5](#537429_1_En_5_Chapter.xhtml#PC5), we have a
    `Hashtable` declared with boxed basic data types, `Integer`s as opposed to `int`s,
    for the table’s keys and values. Don’t worry if it’s a bit confusing right now.
    We’ll look at using hash tables next, and this will help refine your understanding
    of the data structure.


    ### Using Hashtables


    In this section, we’ll take our new coding tool, `Hashtable`s, for a spin and
    investigate some use cases like getting/setting values, clearing, and deleting
    `Hashtable`s. Let’s build on the example from Listing [5-6](#537429_1_En_5_Chapter.xhtml#PC6).
    Remember, when reading through these code samples, the data types of the key and
    value pair can be configured.


    Try to focus on the use of the `Hashtable` itself and how methods are used to
    manipulate data in the table. We’ve seen how to declare and initialize `Hashtable`
    in the previous section. Next, let’s take a look at how we can get/set values
    in a `Hashtable`.


    ```

    //code

    01 //prepare

    02 String key = "Java";

    03 String value = "Java is a computer programming language.";

    04 Hashtable ht = new Hashtable();


    06 //set

    07 ht.put(key, value);

    08 ht.put("JRE", "Java Runtime Environment");

    09 ht.put("JDK", "Java Development Kit");


    11 //get

    12 System.out.println("The value for key: " + key + " is: ''" + ht.get("Java")
    + "''");

    13 System.out.println("The value for key: JRE is: ''" + ht.get("JRE") + "''");

    14 key = "JDK";

    15 System.out.println("The value for key: JDK is: ''" + ht.get(key) + "''");

    //output

    01 The value for key: Java is: ''Java is a computer programming language.''

    02 The value for key: JRE is: ''Java Runtime Environment''

    03 The value for key: JDK is: ''Java Development Kit''

    Listing 5-7

    Hashtables – Getting and Setting Values

    ```


    An example of setting and getting values in a `Hashtable` using variables and
    constants as keys and values.


    Notice that we can use variables to specify the key and value pair of a `Hashtable`’s
    `put` method as shown on line 7 of the listing. In this case, because we’re working
    with `String`s as our key and value data type, we can also explicitly set the
    value we want to store by using `String` constants.


    Subsequently, on lines 12–15, we use the `Hashtable`’s `get` method to pull values
    from the data structure and append them to our output message. Next up, let’s
    take a look at how we can clear out a `Hashtable`’s values. There are a few ways
    we can do this. Let’s jump into some code!


    ```

    01 //prepare

    02 String key = "Java";

    03 String value = "Java is a computer programming language.";

    04 Hashtable ht = new Hashtable();


    06 //set

    07 ht.put(key, value);

    08 ht.put("JRE", "Java Runtime Environment");

    09 ht.put("JDK", "Java Development Kit");


    11 //explicitly remove all entries

    12 ht.remove(key);

    13 ht.remove("JRE");

    14 ht.remove("JDK");


    16 //implicitly remove all entries

    17 ht.clear();

    Listing 5-8

    Hashtables – Clearing Values Part 1

    ```


    An example of clearing values from a `Hashtable` using explicit and implicit approaches.


    As you can see from the listing, in most cases, you’ll want to know the key that
    you used to store your data. Without them, you could always clear the entire data
    structure, as shown on line 17, but what if you want to remove a specific entry
    and you don’t have the key for it? Turns out there is a nifty little way to get
    all the keys stored in the hash table and store them in an `ArrayList`; recall
    from our review of `ArrayList`s in Chapter [3](#537429_1_En_3_Chapter.xhtml).
    Let’s take a look at this approach next.


    ```

    //code

    01 //prepare

    02 String key = "Java";

    03 String value = "Java is a computer programming language.";

    04 Hashtable ht = new Hashtable();


    06 //set

    07 ht.put(key, value);

    08 ht.put("JRE", "Java Runtime Environment");

    09 ht.put("JDK", "Java Development Kit");


    11 ArrayList keys = (ArrayList)ht.keys();

    12 for(String name : keys) {

    13     ht.remove(name);

    14 }

    Listing 5-9

    Hashtables – Clearing Values Part 2

    ```


    An example of clearing values from a `Hashtable` using an `ArrayList` as an enumeration.'
