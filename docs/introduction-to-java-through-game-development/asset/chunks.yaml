    ***游戏编程提示：在设计游戏类结构时，类继承是一个非常强大的工具。在游戏中，你经常会遇到敌人、武器和物品，它们都是某个通用分类的更具体实例。在建模这种结构时，类继承非常有效。*

    清单 8-4 相当长；在继续之前，请花时间仔细阅读。这个示例展示了我们在此讨论的面向对象编程的三个关键方面如何协同工作。让我们回顾一下具体内容，并在此过程中探讨一些细节。首先，`Fish`
    类是一个封装良好的类的示例。它有三个字段：`avgWeight`、`avgLen` 和 `color`。它还定义了两个提供鱼类特定信息的方法：`getName`
    和 `getFoodSource` 方法。

    类中的最后一个方法需要稍作解释。`toString` 方法带有 `@Override` 注解前缀，这表明它替换了一个已有的方法。但替换的是哪个方法呢？我们并没有定义过
    `toString` 方法。实际上，正如我们之前提到的，在 Java 中，每个类都是 `Object` 超类的子类，而这个超类定义了一个 `toString`
    方法，用于提供该类的字符串表示形式。

    通过重写它，我们自定义了该方法以返回一个特定的值。在本例中，返回的是以下语句：

    这条鱼，[鱼名]，以''[食物来源]''为食

    这是多态性的一个示例，因为 `toString` 方法现在已专门为 `Fish` 类重新定义。在下一个示例中，`Trout` 类（鳟鱼是鱼类的一种特定类型）扩展了
    `Fish` 类。该类定义依赖于继承来扩展超类 `Fish`，并利用多态性重新定义某些超类方法。在本例中，`Trout` 类重新定义了 `getName`
    和 `getFoodSource` 方法，以提供鳟鱼特定的实现。

    为了进一步说明这个示例，我们定义了第三个类 `RainbowTrout`，它扩展了 `Trout` 类。这个类作为鳟鱼的一种特定类型，只需要自定义一些已经在
    `Trout` 和 `Fish` 类中定义过的类方法。在本例中，我们只需重写 `getName` 方法，以指明该类是虹鳟鱼类。请注意，每个扩展了 `Fish`
    类或其子类的类，都会继承其被重写的 `toString` 方法。

    查看提供的输出文本，并追踪每个类实例是如何向上转型为其超类 `Fish` 类的。请注意，即使我们将对象作为 `Fish` 类的实例进行交互，输出仍然保持自定义状态。这是多态性的一个示例，因为该类既是自身的实例，也是其所有超类的实例。这也体现了
    Java 中的方法多态性。

    `@Override` 方法注解用于指示某个方法是对超类定义的方法的替换。通过这种方式，可以为继承类逐个方法地定义新的、自定义的功能。这使得继承类能够扩展超类的功能。Java
    中的多态性不仅适用于通过重写类方法来定制功能，还适用于子类同时也是其超类的实例这一事实。

    因此，`Trout` 类的实例同时也是 `Fish` 类的实例，而 `Fish` 类的实例又是 `Object` 类的实例，以此类推。多态性的这一方面体现在第
    13–17 行将子类向上转型为超类的过程中。在下一节中，我们将探讨一个涉及多态性和地牢陷阱游戏的编程挑战。

