    the different ways to use an `Object` as the `List` data type on lines 8 and 9.


    Note that we’re using Java’s `ArrayList` class, which is an implementation of
    a `List`. Also, notice that the declaration of lists doesn’t use the actual basic
    data types. It uses an object version of them. Defining the data type of the list
    is done with the angle bracket operator, `<>`. When no data type is specified,
    the default, `Object`, is used. Next, let’s take a look at the long form of initialization
    for the `ArrayList` class.


