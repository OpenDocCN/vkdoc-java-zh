  trans: '

    *   高级类主题：我们花了一些时间讨论更高级的类主题，例如类成员访问和静态主入口点。

    *   挑战：地牢陷阱的静态主方法：一个编程挑战，将帮助你理解 Java 中静态主入口点的概念。

    *   第 8 章：

    *   封装：在本章中，我们探讨了面向对象编程的几个关键概念，包括封装。

    *   继承：回顾了 Java 中的类继承。

    *   多态：我们在本书中涵盖的最后一个高级面向对象编程主题；我们回顾了 Java 编程语言中多态的概念。

    *   导入类库：简要但信息丰富地回顾了如何创建和使用类库。

    *   挑战：创建一个新游戏项目：一个非常重要的编程挑战，你需要为游戏创建一个新的种子项目，其中包含一个可运行的 Pong Clone 副本。

    *   第 9 章：

    *   基本调试：我们快速回顾了一种基本技术，用于跟踪 Java 代码以查找错误并追踪执行路径。

    *   高级调试：我们还研究了更高级的调试技术，这些技术使用 NetBeans IDE 来单步执行代码。

    *   异常：快速回顾了 Java 中的异常，解释了如何创建和使用自己的异常。


    即使只是列出每个章节中较高级别、最重要的主题，我们显然也已经涵盖了大量内容。Java 编程语言中很少有某些方面是你尚未以某种方式接触过的，但确实还有一些。我鼓励你进一步探索
    Java 编程语言，并学习更多关于引用、抽象类和接口等高级主题的知识。


    致谢

    我想花点时间对本书及其相关游戏项目的创作致以重要的感谢。

    首先，我要感谢两位帮助我完成这个项目的人。

    Gabriel Szabo：一位出色的 IT 专业人士，为本书提供了专业的技术审阅。

    Katia Pouleva：一位出色的艺术家，她创作了所有 Memory Match Pro 游戏美术，并清理了本书中的所有截图。

    关于相关的游戏项目，我想做如下提及。我要感谢 Pipoya 创作了一些很棒且低成本的 2D 视频游戏美术。你可以通过以下网址访问 Pipoya 的免费 RPG
    角色精灵。请务必支持并查看这位艺术家提供的所有精彩作品。

    [Pipoya 的免费 RPG 角色精灵 32x32](https://pipoya.itch.io/pipoya-free-rpg-character-sprites-32x32)

    接下来我要感谢的内容创作者是 O_lobster。我使用了 O_lobster 的一个免费地牢图块集来构建 DungeonTrap 棋盘。你可以通过以下网址访问
    O_lobster 的作品：

    [简单地牢爬行者 16x16 像素艺术资源包](https://o-lobster.itch.io/simple-dungeon-crawler-16x16-pixel-pack%253Fdownload)

    我要感谢 Robinhood76 和 Leszek_Szary 在 freesound.org 上分享的音效。这两个小音效是书中游戏开发挑战中使用的唯一声音，可以在以下网址找到：

    [FreeSound 音效 1](https://freesound.org/people/Robinhood76/sounds/95557/)

    [FreeSound 音效 2](https://freesound.org/people/Leszek_Szary/sounds/146726/)

    我还要感谢来自 itch.io 的 Chasersgaming 和 Zintoki，他们的艺术作品被用于 MmgTestSpace API 的游戏引擎演示应用程序。所有原始艺术作品及其原始下载网址都可以在游戏引擎项目目录中的“cfg/asset_src”文件夹中找到。

    关于 Memory Match 游戏，我想做如下提及。首先，感谢 cloud convert 网站提供了可靠的服务，在尝试转换不同格式的音频资源时非常有用：

    [`https://cloudconvert.com/`](https://cloudconvert.com/)

    其次，我要感谢以下用于创建游戏的免费资源的创建者：

    [食物图标](https://ghostpixxells.itch.io/pixelfood)

    [Memory Match 标志源图像](https://static.vecteezy.com/system/resources/previews/000/694/128/original/geometric-seamless-pattern-with-colorful-squares-vector.jpg)

    [游戏棋盘图像 1](https://www.pexels.com/photo/brown-wood-surface-172289/)

    [游戏棋盘图像 2](https://www.pexels.com/photo/macro-shot-of-wooden-planks-326333/)

    没有此处所列各位才华横溢且慷慨的工作，我将无法为本书创建相关的游戏项目。在各种致谢、提及和链接中，有一些是视频游戏图像和音频的可靠资源。请留意它们！


    从这里出发


    完成本书后，你将朝哪个方向发展完全取决于你自己。请允许我提出一些建议。


    *   进一步探索 Java 编程语言，并学习使用我们在此未涉及的一些剩余高级主题，例如接口、抽象类和对象引用。

    *   对附带的视频游戏项目进行修改。在本书的编程挑战中，你已经积累了与相关游戏项目合作的大量经验。更进一步，开始在任何项目中实现你自己的新游戏功能。享受其中的乐趣吧！

    *   从 Pong Clone 种子项目开始构建你自己的视频游戏。你已经学会了如何为视频游戏创建新的种子项目，那么为什么不尝试创建你自己的游戏呢？

    *   继续用 Java 编程，并学习更多关于 Java 标准类框架中包含的类。

