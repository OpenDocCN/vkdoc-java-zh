    列表 4-13

    扩展后的 If-Else 语句示例

    ```


    一个扩展后的 If-Else 语句示例，其中每个情况都有自己的 Else-If 子句。


    请注意，我们可以使用 If-Else 语句（严格来说是 If-Else-If 语句，但你明白意思）来检查一系列不同的相关条件。这种语法有些冗余，因为我们必须反复检查同一个变量的值，每个分支检查一次。请思考一下这个问题。这听起来像是编程中常见的场景。虽然我们显然可以使用
    If-Else 语句来处理这种情况，但还有一种更简洁的方式，那就是使用 Switch 语句。

