- fmt: '***Java Programming Note:** You should only use this type of array declaration
    with a small amount of data. If you have more than just a few items, think about
    how you could data drive loading the array elements instead.*


    ***Game Programming Note:** While arrays can be thought of as antiquated and error
    prone when building games, using tightly controlled arrays can be much faster
    than other data structures. But the speed comes at the cost of static length and
    an increased potential for errors.*


    In this case, we know what values we want to set for the array, so when we instantiate
    the array, we can list those elements explicitly. In this way, not only are we
    initializing the array, we are also initializing the array’s elements. This is
    an important distinction to make between the code shown in Listing [3-10](#537429_1_En_3_Chapter.xhtml#PC12)
    and previous two listings, Listings [3-8](#537429_1_En_3_Chapter.xhtml#PC10) and
    [3-9](#537429_1_En_3_Chapter.xhtml#PC11). So what exactly is going on? We’re initializing
    an array and its elements. What does that mean?


    Well let me explain by going back a little bit. When you declare a variable, you
    don’t necessarily have to set its value. This is the distinction between declaration,
    initialization, and instantiation. We use the term “instantiation” here loosely.
    It actually applies more to the use of objects, but I like to maintain this distinction
    with all data types.


    **Declaration:** Basic variables are ready to use with a default value, while
    objects are `null` and not ready to use.


    ```

    int i;     //default value set to 0

    Object o;  //default value set to null

    ```


    **Declaration followed by initialization:** Basic variables are ready to use and
    are initialized to a specific value. For Variables with an Object data type, a
    new instance of the object is created and initialized by using the `new` keyword.


    ```

    int i;

    i = 2;              //ready to use

    Object o;

    o = new Object();   //ready to use

    ```


    **Instantiation:** Basic variables are ready to use and initialized to a specific
    value. Variables with an Object data type, a new instance of the object is created
    and initialized by using the `new` keyword.


    ```

    int i = 2;                 //ready to use

    Object o = new Object();   //ready to use

    ```


    With regard to arrays, the same rules apply, but you must stop and think about
    what an array is. It’s a data structure that stores a series of values all of
    the same data type. It has a fixed length, and you can access each element in
    the array by using its index. The array indexing starts at 0 and ends at `array
    length – 1`. Let’s look at what declaration, initialization, and instantiation
    look like for arrays.


    **Declaration:** The array is `null` and not ready to use.


    ```

    int[] i;          //default value set to null

    Object[] o;       //default value set to null

    ```


    **Declaration followed by initialization:** The array is ready to use. Arrays
    of basic data types are ready to use with each element set to a default value,
    while arrays of objects are not ready to use as each array element is still `null`.
    This is an important distinction.


    ```

    int[] i;

    i = new int[10];      //ready to use

    Object[] o;

    o = new Object[10];   //ready to use

    ```


    **Instantiation:** The array is ready to use. Arrays of basic data types are ready
    to use with each element set to a default value, while arrays of objects are not
    ready to use as each array element is `null`.


    ```

    int[] i = new int[10];           //ready to use

    Object[] o = new Object[10];  //elements set to null

    ```


    **Explicit array instantiation:** The array is ready to use. Arrays of basic data
    types are ready to use with each element set to a specific value. Arrays of objects
    are ready to use as each array element is set to a new instance of an object.


    ```

    int[] i = new int[]{10, 20, 30};                       //ready to use

    Object[] o = new Object[]{new Object(), new Object()}; //ready to use

    ```


    It is important to realize when it may be dangerous to use an array element because
    it has not been initialized. Now that we’ve seen how to declare and initialize
    an array, let’s take a look at how you can access, get and set, the elements of
    an array (Listing [3-11](#537429_1_En_3_Chapter.xhtml#PC20)).


    ```

    1 boolean[] bools = new boolean[]{false, true};


    3 //flip the values

    4 bool b = bools[0];

    5 bools[0] = bools[1];

    6 bools[1] = b;

    Listing 3-11

    Array Element Access – Get and Set

    ```


    A small code snippet showing how to get and set elements of an array by their
    index.


    That was pretty easy. As long as you know the index of an array element, you can
    get or set its value. You have to always use a value of the same, or compatible,
    data type as that of the array or you will get an error. One aspect of arrays
    that is particularly useful is the length of the array. Now, you could keep track
    of the array’s length in a variable:


    ```

    int len = 10;

    int[] a = new int[len];

    ```


    This can get a bit cumbersome, so the array object in Java has an attribute to
    help you with this; the `length` attribute is shown in Listing [3-12](#537429_1_En_3_Chapter.xhtml#PC22).


    ```

    //code

    1 int[] i = new int[10];

    2 System.out.println("Array Length Is: " + i.length);

    //output

    1 Array Length Is: 10

    Listing 3-12

    Array Length Attribute

    ```


    A tiny snippet of code that demonstrated using the array’s `length` attribute.


    You will see the `length` attribute a lot when we take a look at looping in Java.
    It comes in handy when iterating over the contents of an array. You might be wondering
    how do you copy an array? Well, you might think that the following would do the
    trick:


    ```

    int[] a = new int[] {0, 1, 2};

    int[] b = new int[] {4, 5, 6};

    b = a;

    ```


    This is more of a topic to be discussed during the review of Java’s object-oriented
    programming support. We may as well touch upon it since we’re here. Java uses
    a concept called a reference. These are applied to all objects including arrays
    in the language. In this way, `a` and `b` are variables, but they are references
    to array objects.


    When you try to copy a reference, it simply changes what the new variable points
    to. So while it may seem as if you’ve made a copy of integer array `a`, you’ve
    actually created two variables that reference the same array in memory, `a` and
    `b`. We can demonstrate this in Listing [3-14](#537429_1_En_3_Chapter.xhtml#PC25).


    ```

    //code1 int[] a = new int[] {1, 2, 3};

    2 int[] b = new int[] {4, 5, 6};


    4 b = a;

    5 System.out.println("Array b Element 0: " + b[0]);


    7 a[0] = -1;

    8 System.out.println("Array b Element 0: " + b[0]);

    //output

    1 Array b Element 0: 1

    2 Array b Element 0: -1

    Listing 3-13

    Array Copy – Creating a Reference to an Array

    ```


    An example of creating two variables that reference the same array.


    We can tell that `b` is a reference to the same array as variable `a` because
    when we change the first element of `a`, line 7, and print out the first element
    of `b`, the value changes. Again, we’ll cover this in more detail when it’s the
    proper time. For now, though, I’d like to show you two techniques that you can
    use to copy arrays, which actually work, in Listing [3-14](#537429_1_En_3_Chapter.xhtml#PC25).


    ```

    //code

    01 int[] a = new int[] {1, 2, 3};

    02 int[] b = new int[] {4, 5, 6};


    04 //old copy

    05 //b = a;


    07 //new copy

    08 for(int i = 0; i = 0 && i < a.length) {

    10         b[i] = a[i];

    11         //for objects you would use something like this

    12         //b[i] = a[i].clone();

    13         //to create a unique copy of the elements

    14     }

    15 }


    17 System.out.println("Array b Element 0: " + b[0]);


    19 a[0] = -1;

    20 System.out.println("Array b Element 0: " + b[0]);

    //output

