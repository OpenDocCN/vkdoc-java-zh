- fmt: '# Expressions and Operators


    As we mentioned earlier, the Java programming language has inherent support for
    a few main types of expressions and associated operators. Let’s take a look at
    what the language has to offer.


    - **Numeric**: Formulas or other numeric combinations of variables and numeric
    operators used to generate a number value

    - **Boolean**: A logical expression combining variables and Boolean operators
    to generate a `true`/`false` value

    - **Assignment**: Expressions used to apply an adjustment to a variable while
    assigning it a new value

    - **Increment/Decrement**: A set of expressions to streamline incrementing or
    decrementing a variable

    - **Inline If-Else**: An inline If-Else operator that can be used to control the
    variable initialization among other things

    - **Bit**: Expressions using Java’s bitwise and bit-shift operators to adjust
    data values and make comparisons at the bit level


    In general, the operators used in expressions of these main types fall into the
    following categories, separated by complexity:


    - **Unary Operator**: An operator that requires one value. Examples are the increment/decrement
    operators and the negative numeric operator.

    - **Binary Operator**: An operator that requires two values. Examples are the
    numeric operators (`+`, `-`, `/`, `*`, `%`) and the Boolean operators (`==`, `!=`,
    `<`, `>`, `<=`, `>=`).

    - **Ternary Operator**: A ternary operator requires three values. An example of
    a ternary operator is the in-line If-Else operator, `? :`, which we will talk
    about again when we get to flow control.


    Note that in Java, the `!` character is the logical complement. It converts a
    `true` value to a `false` value and vice versa. Another operator you might not
    be familiar with is the modulo operator, `%`. The modulo operator is used to return
    the remainder after integer division. Expressions can also be categorized by their
    use of multiple operators, values, and even other expressions.


    - **Simple Expression**: A basic expression that doesn’t include extra operators,
    variables, etc. For instance, a simple expression involving a unary operator should
    have only that operator and the required value it’s operating on.

    - **Compound Expression**: An advanced expression that includes the use of multiple
    operators, variables, method calls, or other expressions.


    That’s a decent amount of material to take in, so before we get into the details,
    let’s explore this topic further and discuss what exactly is an expression in
    the Java programming language in terms of its definition. According to the Java
    documentation:


    > *“An expression is a construct made up of variables, operators, and method invocations,
    which are constructed according to the syntax of the language, that evaluates
    to a single value.”*

    >

    > `—` From the official Java documentation^([⁸](#fn8))


    An expression, by definition, is a construct made of lower-level language features
    like variables, operators, and method calls that are syntactically correct and
    that can be processed to provide a single result. Let’s support this concept with
    some examples, shown in Listing [4-1](#537429_1_En_4_Chapter.xhtml#PC1). I’ll
    provide some examples from each of the main expression types listed previously.


    ```

    01 //preparation

    02 ArrayList listIntegers;

    03 listIntegers = new ArrayList();

    04 listIntegers.add(10);


    06 //Simple numeric expressions

    07 int i = 5;

    08 i = 10;

    09 i = 5 + 5;

    10 i = 11 - 1;

    11 i = 11 + -1;

    12 i = 100 / 10;

    13 i = 100 % 3;

    14 i = (1 * 10);


    16 i = 5;

    17 i = i + 5;

    18 i = i - +5;

    19 i = i / 5;

    20 i = i % 5;

    21 i = (i * 5);


    23 //simple boolean expressions

    24 boolean b;

    25 b = i == 5;

    26 b = (j != d);    //! is the logical complement operator

    27 b = (j < d);

    28 b = (j > listIntegers.get(0));

    29 b = (j <= d);

    30 b = (j >= d);


    32 //increment/decrement, negation, method use expressions

    33 i = 5;

    34 i++;

    35 i--;

    36 i = 5;

    37 i = -i;

    38 i = listIntegers.get(0) + 256;


    40 //simple string expressions

    41 String s;

    42 s = "Hello";

    43 s = s + " ";

    44 s += "World";


    46 //compound numeric expressions

    47 int j;

    48 double d;

    49 float f;

    50 i = 0 + 10 - 5;

    51 j = listIntegers.get(0) + 256;

    52 s = "Hello" + " " + "World!";

    53 d = 10 / 2.5 + 3;

    54 d = 10 * 2.5 - 3;

    55 f = (float)(12.7 / 10);

    56 listIntegers.set(0, 125 + j + i);


    58 //compound boolean expressions

    59 b = i + 1 == 5 + j;

    60 b = (j + listIntegers.get(0) != d);

    61 b = j < (listIntegers.get(0) * 2);

    62 b = (j <= d);

    63 b = (j >= -d);


    66 //assignment expressions

    67 i = 5;

    68 i += 5;

    69 i -= 5;

    70 i /= 5;

    71 i %= 5;

    72 i *= 5;


    74 //ternary operator, ? :, in-line If-Else

    75 s = b ? "b is true" : "b is false"; //if ? then : else


    77 //simple bit-wise expressions

    78 int x, y, z; //multi-variable declaration

    79 x = 5;

    80 y = 7;

    81 z = x | y; //bitwise OR, z = 7

    82 z = x & y; //bitwise AND, z = 5

    83 z = x ^ y; //bitwise XOR, z = 2

    84 z = ~x; //bitwise complement, z = 10


    86 //simple bit-shift expressions

    87 byte a = 64, g;

    88 i = a << 2; //i = 256

    89 g = (byte)(a << 2); //i = 0 due to overflow

    Listing 4-1

    Examples of Different Expressions and Operators in Java

    ```


    An example of each of the main expression types with associated operators. Some
    are shown in both a compound and a simple form.


    **Java Programming Note**: You’ll notice on line 89 and line 55 that there’s a
    data type in parentheses directly to the left of the given expression. This is
    called a cast, and it’s used to convert the data on the right to the type specified
    in parentheses, if possible.


    **Game Programming Note**: Compound expressions are fine, but if you can consolidate
    terms and simplify the expression, do so. A complex expression is less efficient
    than a simplified version of that same expression, and in game programming, it’s
    important to strive for efficiency.


    The use of class methods in expressions is a slightly more advanced topic that
    belongs to the discussion on Java classes. In the previous listing, we used method
    calls from the `ArrayList` class that you’re familiar with from the review of
    lists in Chapter [3](#537429_1_En_3_Chapter.xhtml), but we could have used any
    method call that returned a valid data type.


    ## Numeric Expressions


    The first type of expressions, numeric, is perhaps the most familiar to the average
    person. We’ve seen countless formulas when we weren’t paying attention in math
    class, and this is essentially how you write formulas in Java. Numeric expressions
    can be compound expressions and use numeric operators to connect multiple simple
    expressions together.


    ```

    01 //preparation

    02 ArrayList listIntegers;

    03 listIntegers = new ArrayList();

    04 listIntegers.add(10);


    06 //simple numeric expressions

    07 int i = 5;

    08 i = 10;

    09 i = 5 + 5;

    10 i = 11 - 1;

    11 i = 11 + -1;

    12 i = 100 / 10;

    13 i = 100 % 3;

    14 i = (1 * 10);


    16 i = 5;

    17 i = i + 5;

    18 i = i - +5;

    19 i = i / 5;

    20 i = i % 5;

    21 i = (i * 5);


    23 //compound numeric expressions

    24 int j;

    25 double d;

    26 float f;

    27 i = 0 + 10 - 5;

    28 j = listIntegers.get(0) + 256;

    29 s = "Hello" + " " + "World!";

    30 d = 10 / 2.5 + 3;

    31 d = 10 * 2.5 - 3;

    32 f = (float)(12.7 / 10);

    33 listIntegers.set(0, 125 + j + i);

    Listing 4-2

    Examples of Numeric Expressions

    ```


    A set of simple and compound numeric expressions.


    Numeric expressions are used frequently in variable initialization and in flow
    control statements like If-Else statements. In the next section, we’ll discuss
    the second most integral form of expressions in Java: the Boolean expressions.'
