    `MmgBmp` 图像资源参数，并且不返回任何值。此方法的目的是检查传入的图像参数，确保其宽度和高度尺寸大于 10 像素。如果不是，则抛出异常。


    请注意，该方法使用方法声明中的 `throws` 关键字声明了方法体中会抛出哪些异常。这里可以有多个逗号分隔的条目。当我们想要抛出异常时，我们使用 `throw`
    关键字，后跟我们想要抛出的异常类的实例。在这个示例中，我们使用了虚构的 `MyException` 类，并提供了一个描述性的错误消息。为什么这个实现不理想呢？


