    version of the for loop, which takes a number of arguments to define the constraints
    of the loop. Keeping control of loops in your programs is very important. For
    loops are inherently safer, though you can still abuse them, because they require
    you to define the starting point and ending point of the loop’s iteration . Let’s
    take a look at an example.


