    \ extended class is also an instance of its super-class. Certain classes override\
    \ method behavior in a demonstration of polymorphism.\n\n> **Game Programming\
    \ Note:** Class inheritance is a very powerful tool to use when designing the\
    \ class structure of your game. Quite often in games, you’ll have enemies, weapons,\
    \ and items that are more specific instances of a general classification. Class\
    \ inheritance works very well when modeling this structure.\n\nListing [8-4](#537429_1_En_8_Chapter.xhtml#PC6)\
    \ is a rather long one; take your time to read over it carefully before moving\
    \ on. This example shows the three key aspects of OO programming we’ve covered\
    \ here all working in tandem. Let’s review what’s going on and cover some finer\
    \ points as we do so.\n\nFirst of all, the `Fish` class is an example of a well-encapsulated\
    \ class. It has three fields – `avgWeight`, `avgLen`, and `color`. It also defines\
