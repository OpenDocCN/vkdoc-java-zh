    2 行，`State` 枚举是公共的。回顾我们对数据类型的讨论，枚举是一种自定义数据类型，专门用于一组唯一的值。


    在这个例子中，我们有一个非常简单的实现，只有三个值：`NONE`、`GAME_ON` 和 `GAME_OFF`。类变量在第 8-11 行声明；请注意，它们被赋予了显式的默认值。如果没有显式指定，Java
    将提供语言默认值。我们要看的第一个方法从第 13 行开始。它使用默认访问修饰符，并且不接受任何参数。该方法使用的命名约定表明它是一个“get”方法。

