  trans: "\n### 本章内容回顾\n\n在这简短的开篇章节中，我们涵盖了相当多的内容：\n\n*   **涵盖的基础 Java 主题**：我们列出并描述了将在全书中涵盖的基础主题。\n\
    *   **涵盖的高级 Java 主题**：我们同样列出并描述了将在本书中涵盖的高级主题。\n*   **JDK**：我们了解了 Java 开发工具包，以及本书相关游戏项目所使用的目标\
    \ JDK 11 LTS。我们还了解到 NetBeans IDE 可能使用其自带的 JRE，这与 JDK 11 中包含的 JRE 不同。\n*   **IDE**：我们了解了\
    \ NetBeans IDE，并下载和安装了它。\n*   **配置游戏项目**：我们深入探讨了 Java 游戏开发的世界，并准备了三个游戏项目，以便在我们的开发环境中使用。\n\
    *   **游戏，游戏，还是游戏**：我们构建并演示了三个复杂度各异的游戏项目，作为对本书后续将涉及的游戏的一个介绍。\n\n至此，引言章节就结束了。在下一章中，我们将开始\
    \ Java 编程学习之旅，首先概述“编程”计算机的含义，然后简要介绍 Java 编程语言的历史以及其他一些有趣的话题。\n\n# 2. 什么是 Java\
    \ 编程\n\n如果你已经决定开始学习如何用 Java 编程，并且已经读到了这里，那么讨论一下 Java 编程到底是什么可能是个好主意。在本章中，我们将简要回顾历史，从宏观层面讨论计算机编程以及用\
    \ Java 编程的含义。我们还将讨论游戏编程，并介绍那个备受推崇的主游戏循环。\n\n在深入探讨 Java 编程语言的起源故事之前，让我们先花点时间讨论一下计算机编程的总体概念。在接下来的几节中，我们将探索使用不同工具进行计算机编程，并逐步过渡到基于\
    \ IDE 的现代方法。让我们来看一看。\n\n## 计算机与编程\n\n在本节中，我们将讨论计算机编程的实际含义。如果你在网上搜索这个短语，可能会找到类似如下的定义：\n\
    \n“计算机编程是专业人员用来编写代码的过程，这些代码指示计算机、应用程序或软件程序如何执行^(¹)。在最基本的层面上，计算机编程是一组用于促成特定动作的指令。”\n\
    \n虽然这个定义相当准确，但我对其中的一点有异议，那就是“专业人员”这个词。编程并不需要是“专业人员”才能做；任何人都可以！让我们进一步探讨这个想法，并讨论几种不同的计算机编程方式。\n\
    \n### 计算机编程\n\n计算机编程可以有几种不同的形式。我想专注于计算机编程的某个特定方面，并用它来说明 Java 的重要性。我们之前说过，程序是计算机上“一组用于促成特定动作的指令”。这句话中巧妙地隐藏了编程语言的概念。\n\
    \n定义中提到的“一组指令”就是软件开发人员用来编写特定“指令集”以通过计算机程序解决给定问题的编程语言。其中一个基本的指令集是 CPU 的汇编指令集。在某个时期，软件是使用这些古老的工具编写的。汇编编程的一个示例如清单\
    \ 2-1 所示。\n\n```\n1 label_                   ;分支标签\n2 LSL     R0, R1, #0     \
    \  ;5.1\n3 LSL     R0, R1, #31\n4 LSR     R0, R1, #0\n5 LSR     R0, R1, #31\n\
    6 ASR     R0, R1, #0\n清单 2-1\n汇编源代码示例\n```\n\n一段汇编源代码的示例片段。\n\n这个汇编源代码的示例片段展示了一个更大程序的一部分。使用这种媒介编程有其优点，但也有其缺点。其中一个缺点就是使用纯汇编编写程序所需的时间。汇编源代码非常不直观，这导致用它编程时会遇到困难。正如你所见，这种语言的表现力不强。从清单\
    \ 2-1 的汇编代码行中，几乎无法推导出任何上下文含义。这使得使用汇编编程来编写复杂、抽象或繁琐的软件变得困难。\n\n### 编程语言\n\n为了解决汇编编程软件的缺点，开发人员开始创建编程语言。这些“语言”是基于文本的编码，可以转换为汇编源代码，进而转换为相关的二进制代码。\n\
    \n这种方法的好处是，使用更高级语言生成的软件更易于阅读和理解。编写程序变得更具表现力，复杂的程序也比单独使用汇编时更容易管理。清单 2-2 展示了一个更高级语言——C\
    \ 语言的示例。\n\n```\n1 #include \n2 int main()\n3 {\n4     printf(\"Hello World\"\
    );\n5     return 0;\n6 }\n清单 2-2\nC 编程语言示例\n```\n\n一个 C 语言程序示例。\n\n更高级的编程语言在代码复用、代码共享和项目管理方面提供了更强的能力。在计算机历史的这个时期，大约在\
    \ 1983 年，C++ 编程语言成为了用于计算机编程的事实上的“指令集”。虽然这种语言在其面向对象的软件设计支持方面提供了强大的能力，但它也产生了一个相当普遍且棘手的问题。\n\
    \n导致许多 C++ 开发人员花费大量时间调试的一个核心问题是内存泄漏的概念。清单 2-3 展示了一个非常简单的 C++ 程序，它创建了一个内存泄漏。\n\n\
    ```\n1 int main() {\n2     //安全使用内存\n3     int * p = new int;\n4     delete p;\n\
    5     //不安全使用内存\n6     int * q = new int;\n7     //没有 delete，内存泄漏\n8 }\n清单 2-3\n\
    C++ 编程语言内存泄漏示例\n```\n\n一段展示内存泄漏的 C++ 程序源代码片段。\n\n这个简单的示例程序演示了在 C++ 中泄漏内存是多么容易，而内存泄漏可能导致各种问题。这正是\
    \ Java 的用武之地。Java 编程语言的主要特性之一是其内置的垃圾回收器，它负责删除未使用的对象、释放内存、防止任何代价高昂的内存泄漏，并节省大量的调试时间。\n\
    \n我们将花更多时间讨论 Java 技术和该语言的历史，但现在，我想稍微转换一下方向，谈谈软件开发人员编写的几种不同类型的程序，以及 Java 在其中的位置。\n"
- fmt: "### Types of Programs/Programming\n\nThere are a lot of different computer\
    \ programs you can write. Some are very low level and are written in assembly\
    \ or a system programming language like `C`, `Rust`, or `Go`. Some are higher-level\
    \ programming languages that support object-oriented programming (OOP) design\
    \ like `C++`, `Java`, or `Python`.\n\nFurthermore, there are languages designed\
    \ for very specific programs like `JavaScript` for web programming, or `R` for\
    \ programming statistical computations. Different programming languages have different\
    \ attributes about them, just like any tool. Some languages are compiled, while\
    \ some are interpreted. A compiled language usually results in an executable file\
    \ that contains a binary representation of the original program.\n\nOther languages\
    \ are interpreted programming languages. An interpreted programming language is\
    \ compiled but not into machine code. Instead, an interpreted programming language\
    \ is compiled into an intermediary form that is understood by the programming\
    \ language’s interpreter. The interpreter is a special program that will run the\
    \ intermediary code and subsequently execute the program.\n\nThere are a lot of\
    \ important aspects of a programming language, but we’ll only touch upon the most\
    \ important ones. The main attributes of the `Java` programming language are that\
    \ it’s a strongly typed, interpreted programming language with OOP support. We’ll\
    \ cover what it means for `Java` to be strongly typed when we cover variables\
    \ in `Java`. For now, it’s enough to understand what this means in a simple way.\n\
    \n`Java` keeps track of and cares about the data type of any given variable in\
    \ a program and doesn’t let you store data in a variable that is of a different\
    \ type. Some languages, like `JavaScript`, have dynamic typing. This means that\
    \ in `JavaScript`, you can store any data type in any variable you want without\
    \ doing a redeclaration. There will be more on this to come during the programming\
    \ language review.\n\nJust like any tool, different programming languages have\
    \ different best uses. The `Java` programming language is good for a number of\
    \ different things, from applications to web servers and even games. Now, to be\
    \ fair, `Java` isn’t usually the first go-to language for building games. This\
    \ is generally because the interpreted nature of the language takes up some small\
    \ overhead that game developers do not like. The vast majority of games won’t\
    \ miss this small overhead and would probably benefit from the order and simplicity\
    \ that using `Java` provides.\n\nHowever, it remains that `Java` is a solid programming\
    \ language and its interpreted nature and inherent support for garbage collection\
    \ make it a great choice for learning how to program and in particular learning\
    \ how to program games. The design of a video game is different than that of most\
    \ other programs. Game programming requires you to build a program that responds\
    \ in real time to user input while at the same time handling all of the game’s\
    \ video, audio, collision detection, enemy AI, etc., to maintain the illusion\
    \ of the game. All the while doing so without losing any frames and keeping a\
    \ smooth animation.\n\nGame programming stands apart from other types of software\
    \ development due to the specific and sometimes extreme requirements that games\
    \ have. All that being said, `Java` is a great language to learn and a great language\
    \ to learn by working on video games! That brings us to the end of this section.\
    \ In the next section, we’ll take a quick stroll down memory lane and talk a bit\
    \ about the history of the `Java` programming language.\n\n## The Java Programming\
    \ Language\n\n`Java` was born at Sun Microsystems in 1991 when a team of Sun engineers,\
    \ James Gosling, Mike Sheridan, and Patrick Naughton, sought to create a new programming\
    \ language that was independent of the processor and could easily run on smaller\
    \ electronic devices. This is an important oversight of the history of `Java`\
    \ and perhaps the reason why `Java` became a fundamental part of the Android project.\n\
    \nThe team created a programming language with a similar `C++` like syntax that\
    \ could run on a small digital remote and control electronic elements like buttons\
    \ and screens. The project, the “Green Project” meant to explore the convergence\
    \ between digitally controlled home electronic devices and computers, ultimately\
    \ failed, but before the `Java` language was forever lost to time, there was a\
    \ potentially new application for it, the World Wide Web.\n\nIn 1993, the HTTP\
    \ protocol and one of the first browsers, Mosaic, arrived on the technology scene.\
    \ During this time, the `Java` team realized that the Internet would be perfect\
    \ for the hardware-agnostic attributes of the `Java` programming language, and\
    \ in 1995, James Gosling unveiled a browser called WebRunner that supported HTML\
    \ content and embedded `Java` applets.\n\nThat solidified `Java`’s popularity,\
    \ and as the early Internet took off, so did `Java`. Long before flash, the only\
    \ way you could really create an interactive experience online was by using `Java`\
    \ applets. In fact, when I first started out in college, `Java` applets using\
    \ AWT were one of the first things they taught us in computer science.\n\nApplets\
    \ are no longer a supported feature of most browsers. But `Java` has found its\
    \ way into many other aspects of modern cloud-based technology both on the server\
    \ side using Java EE/Jakarta and on the client side with Android, which is based\
    \ on an open source clone of the `Java` programming language.\n\nThe ability of\
    \ `Java` to be written once and “run everywhere” seems almost magical. How can\
    \ `Java` run on all these different devices and in all the different places that\
    \ it seems to? The answer is the Java Runtime Environment (JRE) and the Java virtual\
    \ machine (JVM).\n\n### The JRE\n\nThe JRE, and more specifically the Java virtual\
    \ machine, is responsible for actually executing the Java byte code that is the\
    \ result from compiling Java source code. Remember, `Java` is an interpreted language,\
    \ meaning that a compiled `Java` program is not in a binary form that can be run\
    \ by the given CPU. Rather, a virtual CPU, a.k.a. virtual machine, runs the byte\
    \ code and drives the underlying hardware.\n\nA definition for what the JRE is\
    \ can be found on the Amazon Web Services (AWS) website. It reads as follows:\n\
    \n> *The* *Java Runtime Environment (JRE)* *is software that Java programs require\
    \ to run correctly. Java is a computer language that powers many current web and\
    \ mobile applications. The JRE is the underlying technology that communicates\
    \ between the Java program and the operating system. It acts as a translator and\
    \ facilitator, providing all the resources so that once you write Java software,\
    \ it runs on any operating system, with a JRE, without further modifications.*\n\
    > \n> `—`From the Amazon Web Services site\n\nI find this definition to be very\
    \ concise and accurate. The last sentence is where the magic really happens. Once\
    \ “you write Java software, it runs on any operating system, with a JRE, without\
    \ further modifications”; this is extremely powerful and the second major selling\
    \ point of the `Java` programming language, in my humble opinion.\n\nNotice that\
    \ `Java` not only includes a programming language and libraries, it also includes/requires\
    \ a runtime environment to execute Java byte code. This is very different from\
    \ previous development environments using languages like `C` and `C++` where great\
    \ care had to be taken to make sure that the language, its data types, and core\
    \ libraries all performed the same on different computer hardware.\n\nNow with\
    \ the power of the JRE at your fingertips, you can leverage it to run your `Java`\
    \ programs on any operating system, including different hardware architectures\
    \ like ARM, so long as there’s a JRE for that OS. In the next section, we’ll take\
    \ a look at the second most important piece of the `Java` programming language,\
    \ the JDK."
