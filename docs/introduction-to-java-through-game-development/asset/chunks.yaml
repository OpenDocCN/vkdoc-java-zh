- fmt: '### Using Basic Data Types


    Although they are basic data types, as I mentioned earlier, they are fundamental
    to any Java program. We’ve seen, in the previous section, how to declare variables
    using the basic data types. I’ll summarize the use of the basic data types in
    variable declaration in Listing [3-2](#537429_1_En_3_Chapter.xhtml#PC2).


    ```

    1 boolean b;

    2 byte b;

    3 short s;

    4 int i;

    5 long l;

    6 float f;

    7 double d;

    8 char c;

    9 String s;

    Listing 3-2

    Variable Declaration and the Basic Data Types

    ```


    An example of a variable declaration using Java’s basic data types. In its simplest
    form, variable declaration is the data type keyword followed by the variable name.


    **Java Programming Note:** Take the time to give your variables meaningful names
    when they are important higher-level variables. Use short names, like those shown
    previously, for temporary variables.


    The pattern for basic variable declaration is the data type keyword followed by
    a valid variable name. Next, let’s cover initialization of a declared variable.
    Notice that the data must match the data type. Some casting, conversion, is allowed
    between similar data types, but we won’t cover this advanced topic here. Let’s
    take a look at Listing [3-3](#537429_1_En_3_Chapter.xhtml#PC3).


    ```

    01 boolean b;

    02 b = true;


    04 byte b;

    05 b = 0;


    07 short s;

    08 s = 256;


    10 int i;

    11 i = -1;


    13 long l;

    14 l = 32000000;


    16 float f;

    17 f = 1.3f;


    19 double d;

    20 d = 2e15;


    22 char c;

    23 c = ''c'';


    25 String s;

    26 s = "some string here";

    Listing 3-3

    Variable Declaration with Initialization and the Basic Data Types

    ```


    An example of a variable declaration and initialization using Java’s basic data
    types.


    **Java Programming Note:** When initializing variables, it’s best to follow the
    same paradigm set out by the current code in the program, if any. If the program
    is new, then keep a consistent approach to variable declaration and initialization.


    There is also a shorter form of declaration and initialization referred to as
    instantiation. Normally, this notion would only apply to objects and classes but
    the syntax for basic data types is similar, so I loosely refer to it as instantiation.
    An example of instantiation with all the basic data types is shown in Listing
    [3-4](#537429_1_En_3_Chapter.xhtml#PC4).


    ```

    1 boolean b = true;

    2 byte b = 0;

    3 short s = 256;

    4 int i = -1;

    5 long l = 32000000;

    6 float f = 1.3f;

    7 double d = 2e15;

    8 char c = ''c'';

    9 String s = "some string here";

    Listing 3-4

    Variable Instantiation and the Basic Data Types

    ```


    An example of a variable instantiation using Java’s basic data types.


    As you can see, the use of variables, of the basic data type, in Java is very
    straightforward. Don’t be disarmed by this simplicity; it’s very powerful. You
    can do quite a lot with variables of this type alone. But there are still more
    data types we must look at. Java is a robust language with a full set of features.
    Before we get to this though, let’s tackle a coding challenge to reinforce the
    material we’ve covered on variables and basic data types.


    ### Challenge: Basic Data Types


    Welcome to your first coding challenge. Each coding challenge will involve some
    introduction or setup and involve a special copy of one of the included video
    games specifically configured with a code challenge on the given Java programming
    topic. This copy of the game will exist in a special package that indicates the
    chapter and the number of the challenge in that chapter.


    Following the package that holds the coding challenge will be one that holds the
    solution. We’ll also cover the solution in the text, but it’s always best to look
    at the code and get experience reading and interpreting Java statements. Here
    is your first challenge:


    Packages Involved:


    ```

    net.middlemind.PongClone_Chapter3_Challenge1

    net.middlemind.PongClone_Chapter3_Challenge1_Solved

    ```


    Description:


    Find the package, `net.middlemind.PongClone_Chapter3_Challenge1`, and open the
    `PongClone.java` file. This version of the game accidentally had a bug introduced
    after testing. An inadvertent key strike has altered a variable value and broken
    the game. Your challenge is to find the variable that has the incorrect value
    and fix it. You must run this file – `PongClone.java` – right-click and select
    Run File to test the game.


    ![](images/537429_1_En_3_Chapter/537429_1_En_3_Fig1_HTML.jpg)


    A screenshot of a computer screen loading middle mind games. There is a list of
    different java files in the background under the projects.


    Image 3-1


    The Broken Version of This Challenge’s Game


    A screenshot of the copy of the game used in this challenge. It crashes on the
    loading screen.


    Clue:


    The Pong Clone video game uses a game “engine config file,” this is a hint, to
    data drive some aspects of the game’s configuration. The null pointer exception
    that the game throws when loading is caused by a game engine configuration error.


    Take a moment to try out the challenge. Hint, tracing the exception won’t help
    you in this case because the resource not being loaded doesn’t cause an exception
    at the source of the problem. It seems tricky, but it is perhaps deceptively simple.
    Give it a try before moving on to read the solution. Remember that the challenges
    take place in their own sandbox, a special package for the challenge.


    In order to run this package’s specific version of the game, you have to click
    on the static main class contained in the package and select “Run File” from the
    context menu. Otherwise, the project’s default game will execute. If you’ve solved
    the challenge correctly, the game should run properly.'
