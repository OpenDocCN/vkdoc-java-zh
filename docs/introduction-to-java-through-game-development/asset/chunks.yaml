  trans: "\n### 我们涵盖的内容\n\n本语言中涉及的 Java 语言特性如下：\n\n*   **数值表达式**：我们了解了主要表达式类型及其相关运算符之一：数值表达式。\n\
    *   **布尔表达式**：Java 中第二重要的表达式类型是布尔表达式，它用于创建条件语句，与流程控制语句结合使用时，可以控制程序的执行。\n*   **赋值表达式**：我们花了一点时间了解了不同的赋值表达式，包括复合赋值运算符的便利性。\n\
    *   **递增/递减表达式**：这是一个虽小但重要的主题。我们快速介绍了实现变量递增和递减的不同方法，包括一些非常高效的递增/递减运算符。\n*   **位运算表达式**：位运算表达式用于对数值信息执行位级逻辑运算，例如\
    \ AND、OR 和 XOR 操作。\n*   **位移表达式**：Java 表达式中第二个高深的部分；位移表达式用于快速乘以或除以一个值，并且可以更快地替代某些乘法运算。\n\
    *   **运算符优先级**：我们简要概述了完整的运算符优先级范围，包括列表中的位运算符和三元运算符。\n*   **If、If-Else、If-Else-If\
    \ 语句**：我们首次接触流程控制语句，了解了 If-Else 语句和分支代码。\n*   **Switch 语句**：我们学习了第二种分支代码的方式，但这种方式更适合基于单个变量的多分支代码。\n\
    *   **Try-Catch 语句**：我们学习了一种由抛出异常触发的流程控制形式。\n*   **挑战：流程控制**：我们接受了一个有趣的挑战，要求在\
    \ Pong Clone 游戏中创建新的按键映射，使玩家 1 和玩家 2 能够使用新按键控制他们的球拍。\n*   **枚举**：作为 Java 变量回顾的一部分，我们在回顾流程控制后，回过头来了解了如何通过使用枚举来创建自定义数据类型。\n\
    *   **非常基础的 Java 类**：我们在 Java 中创建自定义数据类型时回顾的第二种技术是使用非常简单的类。我们看了一个新的自定义数据类型的示例，它存储了关于正在执行的游戏的信息。\n\
    *   **挑战：枚举**：本章的最后一个挑战要求我们扩展当前的倒计时器实现，通过支持数字 4 和 5 的枚举条目来增加两秒。我们还必须调整一些类变量、它们的初始化以及\
    \ `DrawScreen` 方法的代码来完成挑战。\n\n我们现在拥有了一套相当不错的工具。我们不仅可以使用所有基本数据类型在 Java 中编写解决方案，还可以使用流程控制语句、类型转换、转换和自定义数据类型等。在接下来的章节中，当我们研究\
    \ Java 提供的一些更高级的特性时，我们将获得更多的经验和知识！\n\n脚注 1\n\n# 5. 更多数据结构\n\n欢迎来到第 5 章！在本章中，我们将花更多时间探索\
    \ Java 编程语言提供的一些常见数据结构。本章我们将涵盖的数据结构简要总结如下：\n\n*   **多维数组**：类似于你在本章之前使用过的数组，只是维度更多，允许我们映射表格数据等。\n\
    *   **哈希**：一种非常有用的数据结构，可以将其视为字典。哈希存储键值对。哈希有时以其实际的 Java 类名 `Hashtable` 或通俗术语 dictionary\
    \ 来指代。\n*   **栈**：一种重要的数据结构，允许对值栈进行压入和弹出访问。这是我们见过的第一种在访问时移除其元素的数据结构。它们还具有通过方法调用为你返回元素的特性。\n\
    *   **队列**：最后但同样重要的是，如果你曾经为某件事排过队，那么你应该熟悉队列这种数据结构。队列提供对值列表的添加或移除访问。\n\n    ***Java\
    \ 编程说明：文中使用的所有数据结构要么是 Java 编程语言的核心特性，要么包含在 java.util 包中。添加行* ***import java.util.****\
    \ *以在你的程序中使用这些类。*\n\n回顾我们在第 3 章中的复习，数据结构是保存其他变量的更高级的数据类型。通常，数据结构会被认为超出了入门级编程语言文本的范围，但我认为对它们进行温和的介绍将极大地帮助你进一步探索这个主题。我们已经有一些在\
    \ Java 中使用数组和列表的经验，因此我们将从多维数组开始讨论。你会发现语法和用法都很熟悉。让我们来看看！\n\n## 多维数组\n\n多维数组是数组的数组。让我们把\
    \ Java 中的数组想象成电子表格中的一行。行中的每一列代表一个数组索引并保存一些数据。现在，对于二维的多维数组，让我们把它想象成一个由行和列组成的完整电子表格。数组的第一个索引将指定查找数据的行，而第二个索引将定义列。\n\
    \n### 声明多维数组\n\n声明多维数组的过程应该从你之前对 Java 数组的回顾中就很熟悉了。让我们来看一下。\n\n```\n1 int[] oneDimension\
    \ = new int[10];\n2 int[][] twoDimensions = new int[10][10];\n3 int[][][] threeDimensions\
    \ = new int[10][10][10];\n清单 5-1\n多维数组 – 声明示例\n```\n\n一个演示声明 1 维、2 维或 3 维数组的示例。\n\
    \n让我们谈谈这个示例中发生了什么。第一行显示了一维数组的声明，正如你所熟知的。第二行显示了二维数组的声明。请注意，每增加一个数组索引，就会添加一组新的方括号\
    \ `[]`。\n\n***Java 编程说明：使用多维数组时要小心，因为它们会很快消耗大量内存。例如，一个每个数组有 1000 个元素的三维数组就有 10\
    \ 亿个条目，这绝不是一个小数目。***\n"
- fmt: '### Using Multidimensional Arrays


    Now that we understand how to declare multidimensional arrays, let’s take a look
    at a few use cases for getting and setting array values.


    ```

    01 int[] dim1 = new int[10];

    02 int[][] dim2 = new int[10][10];

    03 int[][][] dim3 = new int[10][10][10];


    05 //simple array index set

    06 dim1[0] = 10;


    08 //2-dimensional array index set

    09 dim2[0] = new int[10];

    10 dim2[0][0] = 11;


    12 //3-dimensional array index set

    13 dim3[0] = new int[10];

    14 dim3[0][0] = new int[10];

    15 dim3[0][0][0] = 12;

    Listing 5-2

    Multidimensional Array – Use Case Examples 1

    ```


    An example demonstrating setting a value using arrays of different dimensions.


    Take a moment to look over the get/set code for multidimensional arrays in Listing
    [5-2](#537429_1_En_5_Chapter.xhtml#PC2). Notice that as the dimension of the array
    increases, we have more initialization to perform. We must initialize each dimension
    of the array explicitly before we can use those array indexes to get or set a
    value. In the subsequent listing, we’ll take a look at how to get values out of
    a multidimensional array.


    ```

    //code

    01 int[] dim1 = new int[10];

    02 int[][] dim2 = new int[10][10];

    03 int[][][] dim3 = new int[10][10][10];


    05 //simple array index set

    06 dim1[0] = 10;


    08 //2-dimensional array index set

    09 dim2[0] = new int[10];

    10 dim2[0][0] = 11;


    12 //3-dimensional array index set

    13 dim3[0] = new int[10];

    14 dim3[0][0] = new int[10];

    15 dim3[0][0][0] = 12;


    17 System.out.println("Dim1 Index: 0 Value: " + dim1[0]);

    18 System.out.println("Dim2 Index: 0 Value: " + dim2[0]);

    19 System.out.println("Dim2 Index: 0,0 Value: " + dim2[0][0]);

    20 System.out.println("Dim3 Index: 0 Value: " + dim3[0]);

    21 System.out.println("Dim3 Index: 0,0 Value: " + dim3[0][0]);

    22 System.out.println("Dim3 Index: 0,0,0 Value: " + dim3[0][0][0]);

    //output

    01 Dim1 Index: 0 Value: 10

    02 Dim2 Index: 0 Value: [I@50f8360d

    03 Dim2 Index: 0,0 Value: 11

    04 Dim3 Index: 0 Value: [[I@13c78c0b

    05 Dim3 Index: 0,0 Value: [I@12843fce

    06 Dim3 Index: 0,0,0 Value: 12

    Listing 5-3

    Multidimensional Array – Use Case Examples 2

    ```


    An example demonstrating getting a value from arrays of different dimensions.


    Listing [5-3](#537429_1_En_5_Chapter.xhtml#PC3) adds some output to the previous
    listing so we can get an idea of how to get values from a multidimensional array.
    If you draw your attention to lines 1–6 of the output section, you’ll see the
    values stored in the specified array at the specified index. Wait a minute, what
    are all those funny values in the output? Care to venture a guess? Well, before
    I go ahead and answer, look back to the initialization code and see what is being
    assigned to that array index.


    If you thought that the strange looking values in the output, `[I@50f8360d`, are
    a representation of the array value at that index, then you’d be right. Those
    are a form of memory location in the Java virtual machine and indicate to us that
    an object of some kind is stored in that array index. In a similar fashion, take
    a moment to look at the array indices that actually print out a value. Can you
    spot the distinction between the two? In one case, we’re getting a value from
    an array index that holds an entire other array. In the other case, we’re getting
    a value from an array element at the specified multidimensional index that specifies
    a basic data type value.


    Let’s take a quick look at how you can clear out and delete a multidimensional
    array in Listing [5-4](#537429_1_En_5_Chapter.xhtml#PC4).


    ```

    01 int[] dim1 = new int[10];

    02 int[][] dim2 = new int[10][10];

    03 int[][][] dim3 = new int[10][10][10];


    05 //simple array index set

    06 dim1[0] = 10;


    08 //2-dimensional array index set

    09 dim2[0] = new int[10];

    10 dim2[0][0] = 11;


    12 //3-dimensional array index set

    13 dim3[0] = new int[10];

    14 dim3[0][0] = new int[10];

    15 dim3[0][0][0] = 12;


    17 //zero a simple array index value

    18 dim1[0] = 0;


    20 //delete the array

    21 dim1 = null;


    23 //zero a multi-dimensional array index value

    24 dim2[0][0] = 0;


    26 //delete the array at the specified index

    27 dim2[0] = null;


    29 //zero a multi-dimensional array index value

    30 dim3[0][0][0] = 0;


    32 //delete the array at the specified index

    33 dim3[0][0] = null;


    35 //delete the array at the specified index

    36 dim3[0] = null;


    38 //delete all arrays

    39 dim1 = null;

    40 dim2 = null;

    41 dim3 = null;

    Listing 5-4

    Multidimensional Array – Deletion

    ```


    An example demonstrating zeroing an array index value and deleting multidimensional
    arrays.


    It should be enough to simply set the array variable to `null` to properly delete
    an array. However, if you have an array of objects (references are important in
    this case), then you may want to delete individual parts of a multidimensional
    array. In the previous listing, Listing [5-4](#537429_1_En_5_Chapter.xhtml#PC4),
    example code demonstrates how to delete different parts of a multidimensional
    array.


    You might have noticed that the array indices that are set to `null` to clear
    a row or column of a multidimensional array are the same indices that required
    us to initialize a new instance of an array. Multidimensional arrays are a new
    powerful data structure we’ve added to our coding toolbox. We’ll continue on this
    thread of discussion, as promised, and take a look at another very useful data
    structure Java has to offer: hashes.


    ## Hashes


    Hashing is the process of employing a function to map a key to a value storing
    the data in a hash table. Hashes are another important data type that functions
    much like a dictionary. Let’s explore that idea for a moment. Can you think of
    a data structure we’ve learned about that almost acts like a dictionary? Think
    about arrays for a moment. What do you use to look up a value in an array? You
    use an index value that is an integer to find the data stored in that array index.


    That sort of sounds like we’re using a dictionary to look up a word except we’re
    using numbers instead of words. As it turns out, you can use an array to implement
    a hash, but that’s a little outside of the scope of this text. Java, as it so
    happens, has a very convenient implementation of the hash data structure called
    the `Hashtable`.'
