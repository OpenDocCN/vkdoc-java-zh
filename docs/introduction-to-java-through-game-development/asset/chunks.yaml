    don’t have to understand everything that’s going on here with regard to objects
    and methods, but you should understand what’s going on with regard to using a
    list as a dynamically sized replacement for an array. Let’s take a look at some
    ways to declare a list (Listing [3-15](#537429_1_En_3_Chapter.xhtml#PC32)).


    ```

    1 ArrayList listBooleans;

    2 ArrayList listBytes;

