    2    System.out.print(i + ", ");

    3 }

    4 System.out.println("The last index of the loop was " + i + ".");

    Listing 6-2

    Example of the Loop Control Variable’s Scope

    ```


    An example of erroneously accessing the loop control variable outside the scope
    of the loop.


    The second part of the for loop declaration is the definition of the testing condition.
    This is the condition you set to cause the loop to stop running. Needless to say,
    this is an important part of the loop’s declaration. This part is ended by the
    second semicolon. The last part of the declaration is the increment/decrement
    statement. This determines how the loop control variable is adjusted after each
    loop iteration.


    Now that you know all about the different parts of the for loop’s declaration
    , I can tell you that none of them are required. Let’s further the discussion
    with an example.


