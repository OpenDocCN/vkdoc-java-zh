    ## 类


    在开始讨论 Java 类之前，让我们先看看 Java 文档中对类的定义^(⁹)：


    > *“类是创建对象的蓝图或原型。”*


    这个定义引出了一些有趣的概念。首先，它暗示了你定义的类用于创建某种东西——对象。我们之前已经简单讨论过对象，但现在让我们开始将它们视为类的实例，并记住类在某个地方有一个文件，文件名与类名相同，扩展名为
    `.java`。这就是 Java 编程语言中类的一般性质。让我们进一步了解它们，以及如何开始定义我们自己的类。通常，Java 中类的定义可以包含以下信息：


    *   **访问修饰符**：类可以是 `public` 或 `private`，也可以使用默认访问修饰符。

    *   **类关键字**：使用 `class` 关键字来创建类。

    *   **类名**：名称应以字母开头，在 Java 中，通常首字母大写。

    *   **超类（可选）**：类的父类（超类）名称（如果有），前面加上关键字 `extends`。一个类只能继承（子类化）一个父类。

    *   **接口（可选）**：类实现的接口列表（如果有），以逗号分隔，前面加上关键字 `implements`。一个类可以实现多个接口。可以回想一下我们之前提到的
    `Enumerable` 接口。

    *   **类体**：类体由花括号 `{}` 包围。这里定义了类的成员——包括字段、方法和构造器。


    让我们重点关注如何声明一个类。至于类的扩展和接口，我们将在下一章讨论。现在，我们将专注于访问修饰符和基本的类声明。让我展示几个标准类声明的版本，然后我们再来分析它们的区别。


    ```

    01 package org.learn_java.classes;


    03 //类 #1，public 访问权限

    04 public class SimpleClassPublic { ... }


    06 //类 #2，默认访问权限

    07 class SimpleClassDefault { ... }


    09 //类 #3，错误，顶层类不允许使用

    10 protected class SimpleClassProtected { ... }


    12 //类 #4，错误，顶层类不允许使用

    13 private class SimpleClassPrivate { ... }

    清单 7-1

    简单类声明的示例

    ```


    该清单展示了一些正确的简单类声明，随后是两个错误的声明。你不能在顶层类上使用 `protected` 或 `private` 修饰符。


    在清单 7-1 中，有一些简单的类声明示例。前两个是有效的声明，因为它们指定了默认或 `public` 类访问权限。后两个是无效的；如果你使用 `protected`
    和 `private` 访问修饰符，编译器会报错。Java 不允许在顶层类声明中使用这些访问修饰符。下面总结一下可用于顶层类声明的修饰符：


    *   **public**：该类可以被任何其他类访问。

    *   **default**：该类只能被同一包中的类访问。当你未指定修饰符时，就会使用默认访问权限。包提供了一种组织类的方式。通常，相关的类属于同一个包。


    默认访问修饰符也称为包私有（package-private），这意味着所有成员在同一包内是可见的，但不能从其他包访问。现在我们已经知道了如何以最基本的形式声明一个类，接下来让我们看看如何自定义类。通常，类是创建某种事物模型的手段。因此，你需要能够将某些数据与类的实例关联起来。类字段正好提供了实现这一点的方法。让我们来看看！


    ### 字段


    在 Java 中，字段是与类关联的某种数据类型的变量。属性（attribute）是它们的另一个名称，但通常特指公共类字段。一个简单的演示将大大有助于你理解类字段。让我们回顾一下第
    4 章中的一个清单，这是一个基本 Java 类的示例。


    ```

    01 public class GameData {

    02     public State gameState = State.NONE;

    03     public int numberOfPlayers = 1;

    04     public boolean gameOver = false;

    05     public String playerName = "AAA";

    06 }


    08 public GameData gameMetaData;

    09 gameMetaData = new GameData();

    清单 7-2

    基本 Java 类的示例——原清单 4-18

    ```


    这是一个通过 Java 类定义的自定义数据类型的示例。注意使用字段来保存与该类关联的数据。


    在清单 7-2 中，`GameData` 类有四个不同数据类型的字段。所有字段都具有 `public` 访问修饰符，因此它们可以被任何其他类访问。在 Java
    中，所有代码在某种程度上都包含在类中，因此所有访问控制都是基于类的。在讨论定义类时可用的其他访问修饰符之前，让我们先演示如何使用类的字段。在下一个清单中，我将调整类和其字段使用的修饰符。看看你是否能理解声明所定义的访问级别。


    ```

    01 class GameData {

    02     State gameState = State.NONE;

    03     public int numberOfPlayers = 1;

    04     protected boolean gameOver = false;

    05     private String playerName = "AAA";

    06 }


    08 public GameData gameMetaData = new GameData();

    清单 7-3

    使用各种访问修饰符的基本 Java 类示例

    ```


    这是一个 Java 类的示例，它对类本身和类的字段使用了各种访问修饰符。


    清单 7-3 对 `GameData` 类使用了默认访问修饰符。这与清单 7-2 略有不同，后者使用了 `public` 访问修饰符。类似地，类的字段也已更新，分别使用了默认、`public`、`protected`
    和 `private` 访问修饰符。当然，我们可以将它们全部设置为 `public`，并将确保类字段正确使用的责任留给程序员。


    这又是一个将本可由 Java 编译器管理的责任留给开发者的例子。例如，既然我们可以在类定义本身中强制执行所需的使用方式，为什么还要担心正确且一致地使用类的变量呢？假设玩家名称是神圣不可侵犯的。在我们的游戏中，一旦设置了玩家名称，我们就不希望它被更改。


    为了强制执行这一点，我们在第 5 行的 `playerName` 变量上使用了 `private` 访问修饰符。现在，该变量不能通过任何代码随意更改。由于它是
    `private` 的，现在只能由 `GameData` 类本身通过类方法、构造器或变量默认值来更改，如清单 7-3 所示。`protected` 访问修饰符（第
    4 行）用于允许访问满足以下条件的字段：


    *   封闭类中的任何代码

    *   与封闭类位于同一包中的其他类

    *   子类，即扩展了该类的类，无论包如何


    请记住，包是 Java 组织类的方式。声明你的类属于哪个包很简单，只需在类 Java 文件的顶部添加以下行即可：


    ```

    package org.learn_java.classes;

    ```


    这意味着该 Java 类的源文件可以在 Java 项目源目录下的以下目录结构中找到。包和文件的位置是关联的。在尝试追踪项目中的类时，请记住这一点。


    ```

    ./src

    -> org

    -> learn_java

    -> classes

    -> GameData.java

    ```

