  raw: '### Challenge Solution


    The solution to the challenge can be found in the following package:


    ```

    net.middlemind.PongClone_Chapter3_Challenge1_Solved

    ```


    Specifically in the PongClone.java file. You can search for the text, “CHAPTER
    3 CHALLENGE 1 SOLUTION”, to find the solution code and an explanation. I will
    also briefly discuss the solution here. In this case, almost the exact name of
    the variable that needs to be adjusted is given in the description of the challenge,
    “engine config file”, which becomes “ENGINE_CONFIG_FILE”. The word “file” also
    gave us a clue because there are not many file names in the variable declaration
    section.


    To correct the issue, all you need to do is adjust the value of the `ENGINE_CONFIG_FILE`
    variable so that it matches the name of the file on the file system. In this case,
    the name should be “engine_config_mmg_pong_clone.xml” instead of “engine_config_mmg_png_clone.xml”,
    which is missing an “o”. This may seem like a silly example for a challenge, but
    it actually has some interesting attributes to it.


    ![](images/537429_1_En_3_Chapter/537429_1_En_3_Fig2_HTML.jpg)


    A screenshot of a computer game M M G pong clone. It indicates a list of options
    to choose from 1 or 2-player game or exit.


    Image 3-2


    The Working Version of This Challenge’s Game


    A screenshot of the fixed version of the game for this challenge.


    ***Game Programming Note: Games and game engines frequently have complex subsystem
    responsible for loading different resources. It’s often important to take the
    time to get to know these systems so that you can competently triage any related
    bugs during development.*


    For one, the error was not directly tied to the solution. It took some knowledge
    of the game engine to understand what the error really meant. From the perspective
    of the JRE, there is a null value, and an exception should be thrown. But from
    the perspective of the video game, there is a null value because a resource didn’t
    load. Either the missing resource was not specified properly or it doesn’t exist.
    Barring the nonexistence case, we are left with a configuration-driven, resource-loading
    issue.


    This points us directly at the game engine config file where we would look to
    see what configuration exists for the given game. That brings us to the conclusion
    of this section. In the next section, we’ll take a look at some of Java’s more
    advanced data types and their use.


    ## Advanced Data Types


    You can do a lot with just the basic data types, but Java has even more power
    to offer you as a developer. There are a few advanced data types that we should
    look at. These include a dynamic data type, as opposed to the static typing, we
    are used to. There are even some data types that help us define sets of data which
    we’ll also take a look at here.


    ### The var Keyword and Dynamic Typing


    Despite all my tough talk about Java’s rigorous, strong typing, the language actually
    supports dynamic typing. The `var` keyword, introduced in Java 10, uses data type
    inference in which it automatically detects the data type of a variable based
    on the surrounding context. This is a fairly advanced use of Java. We won’t go
    into too much detail here. There are a number of rules governing the use of the
    `var` keyword in the Java programming language.


    For simplicity’s sake, I’m going to generalize and oversimplify its use. If you
    feel comfortable exploring further, you can find more information here:


    [`www.geeksforgeeks.org/var-keyword-in-java/`](http://www.geeksforgeeks.org/var-keyword-in-java/)


    As I stated earlier, the var keyword allows you to use dynamic typing with a variable.
    You can declare a variable of type `var` in a few places, but for our purposes,
    we’ll limit its use to inside a method. I should also mention that variable data
    type redefinition is not supported. This means that Java will detect the data
    type for the `var` variable only the first time it is initialized. Subsequent
    assignments must adhere to the first detected data type. Allow me to advance this
    notion with an example shown in Listing [3-5](#537429_1_En_3_Chapter.xhtml#PC7).


    ```

    01 public static void main(String[] args) {

    02    //int

    03    var x = 100;


    05    //double

    06    var y = 1.90;


    08    //char

    09    var z = ''a'';


    11    //string

    12    var p = "tanu";


    14    //boolean

    15    var q = false;

    16 }

    Listing 3-5

    Variable Instantiation and the var Data Type

    ```


    An example showing the use of the var data type with variable instantiation.


    I’d also like to take a moment and demonstrate an incorrect usage of the `var`
    data type. In Listing [3-6](#537429_1_En_3_Chapter.xhtml#PC8), we’ll demonstrate
    redefining the data type of a `var` variable, which will cause an exception to
    be thrown. Let’s take a look.


    ```

    1 //the compiler interprets the variable as an int

    2 var id = 0;


    4 //error thrown because of incompatible data types

    5 id = "34";

    Listing 3-6

    Variable Data Type Redefinition and the var Data Type

    ```


    An example showing the use of the var data type with variable data type redefinition
    error.


    You can see from the example that the `var` keyword sort of acts as a placeholder
    for an unknown basic data type that is inferred when the variable is initialized.
    It sounds complicated, but if you think about it for a moment, it’s just like
    using the other basic data types, only in a roundabout way. You’re letting the
    data drive the variable’s data type instead of explicitly setting it when the
    variable is declared. Pretty neat!


    Ok, so after that whole section on the `var` data type and its use, I’m sad to
    inform you that we won’t be doing a challenge with this material. It’s just that
    I personally don’t use this feature very much and I rather enjoy the stricter
    approach to variables that the traditional data types offer. In the next section,
    we’ll take a look at another advanced data type and our first “data structure”:
    the array .'
