- fmt: '在 Java 中，编写 get/set 方法以开放对受保护类字段的访问是一种常见约定。这带来了集中化的好处，你可以通过其 get 和 set 方法轻松地跟踪、追踪和调试对该字段的访问。该方法返回类的`gameState`变量的值。在下一个方法中，我们提供了一种设置`gameState`变量值的方法，位于第
    17 行。该类方法也使用了默认访问修饰符，并且不返回任何值。


    为了表示一个方法不返回值，我们使用`void`关键字代替返回数据类型。这两个方法中隐藏着一个微妙的 Java 新特性。你能发现它吗？请将注意力集中在`gameState`变量以及它在每个方法体中是如何被引用的。关键字`this`用于引用当前类的实例。实际的类实例尚不存在，但当这个类在
    Java 程序中使用时，`this`关键字将解析为当前类的实例。


    在类方法中使用`this`关键字很常见，因为它直观地指示哪些变量实际上是类字段。我们要查看的下一对方法是`numberOfPlayers`变量的 get 和
    set 方法，位于第 21–27 行。在这种情况下，这些方法在声明上略有不同，因为它们都显式地设置为`public`，并且在引用变量时不使用`this`关键字。


