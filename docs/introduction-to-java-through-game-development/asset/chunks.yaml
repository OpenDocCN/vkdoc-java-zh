- fmt: '# Classes


    To start our discussion on Java classes, let’s take a look at the definition of
    a class from Java’s documentation^([⁹](#fn9)):


    > “A class is a blueprint or prototype from which objects are created.”


    The definition brings up some interesting concepts. For one thing, it alludes
    to the idea that the classes you define are used to create something, objects.
    We’ve talked about objects a bit before, but let’s start thinking of them as an
    instance of a class and let’s keep in mind that a class has a file somewhere,
    with the same name as the class and with a `.java` file extension. That is the
    general nature of classes in the Java programming language. Let’s understand a
    bit more about them and how to start defining our own. In general, the definition
    for a class in Java can contain the following pieces of information:


    - **Access Modifiers**: A class can be `public` or `private`, or use the default
    access modifier.

    - **Class Keyword**: The `class` keyword is used to create a class.

    - **Class Name**: The name should begin with a letter, and in Java, the letter
    is usually capitalized.

    - **Superclass (optional)**: The name of the class’ parent (superclass), if any,
    preceded by the keyword `extends`. A class can only extend (subclass) one parent.

    - **Interfaces (optional)**: A comma-separated list of interfaces implemented
    by the class, if any, preceded by the keyword `implements`. A class can implement
    more than one interface. Think of the `Enumerable` interface we mentioned earlier.

    - **Body**: The class body is surrounded by braces, `{}`. This is where the class’
    members – including fields, methods, and constructors – are defined.


    Let’s focus on how to declare a class. As such, we’ll look at class extension
    and interfaces in the next chapter. For now, we’ll focus on access modifiers and
    the basic class declaration. Let me show you a few versions of a standard class
    declaration, and we’ll review their differences afterward.


    ```

    01 package org.learn_java.classes;


    03 //class #1, public access

    04 public class SimpleClassPublic { ... }


    06 //class #2, default access

    07 class SimpleClassDefault { ... }


    09 //class #3, error not allowed for top-level classes

    10 protected class SimpleClassProtected { ... }


    12 //class #4, error not allowed for top-level classes

    13 private class SimpleClassPrivate { ... }

    Listing 7-1

    Example of Simple Class Declarations

    ```


    A listing showing a few correct, simple class declarations followed by two incorrect
    declarations. You cannot use the `protected` or `private` modifier on a top-level
    class.


    In Listing [7-1](#537429_1_En_7_Chapter.xhtml#PC4), there are a number of example,
    simple class declarations. The first two are valid declarations because they specify
    default or `public` class access. The last two are invalid; you’ll get a compiler
    error and use access modifiers `protected` and `private`. Java doesn’t like it
    if you use those access modifiers on a top-level class declaration. Let me summarize
    the modifiers you can use for a top-level class declaration here:


    - `public`: The class is accessible by any other class.

    - `default`: The class is only accessible by classes in the same package. This
    is used when you don''t specify a modifier. Packages are provided as a way for
    you to organize your classes. In general, classes that are related belong in the
    same package.


    The default access modifier is also called package-private, which means that all
    members are visible within the same package but aren''t accessible from other
    packages. Now that we know how to declare a class, in the most basic form, let’s
    take a look at how we can customize the class. In general, classes are a means
    to create a model of something. As such, you need to be able to associate certain
    data with an instance of your class. Class fields give you a way to do just that.
    Let’s take a look!


    ## Fields


    In Java, fields are variables of a certain data type that are associated with
    a class. An attribute is another name sometimes given to them, but it’s usually
    reserved for public class fields specifically. A brief demonstration will go a
    long way to furthering your understanding of class fields. Let’s bring back a
    listing from Chapter [4](#537429_1_En_4_Chapter.xhtml), an example of a basic
    Java class.


    ```

    01 public class GameData {

    02     public State gameState = State.NONE;

    03     public int numberOfPlayers = 1;

    04     public boolean gameOver = false;

    05     public String playerName = "AAA";

    06 }


    08 public GameData gameMetaData;

    09 gameMetaData = new GameData();

    Listing 7-2

    Example of a Basic Java Class – Originally Listing 4-18

    ```


    An example of a custom data type defined through a Java class. Notice the use
    of fields to hold data associated with the class.


    In Listing [7-2](#537429_1_En_7_Chapter.xhtml#PC5), the `GameData` class has four
    fields of varying data types. All the fields have the `public` access modifier,
    so they can be accessed by any other class. In Java, all code is contained in
    a class at some level, so all access control is class based. Let’s demonstrate
    using the class’ fields before we discuss the other access modifiers available
    to us when defining a class. In the next listing, I’ll adjust the modifiers used
    with the class and its fields. See if you can figure out the access levels defined
    by the declaration.


    ```

    01 class GameData {

    02     State gameState = State.NONE;

    03     public int numberOfPlayers = 1;

    04     protected boolean gameOver = false;

    05     private String playerName = "AAA";

    06 }


    08 public GameData gameMetaData = new GameData();

    Listing 7-3

    Example of a Basic Java Class with Various Access Modifiers

    ```


    An example of a Java class that uses various access modifiers for both the class
    itself and the class’ fields.


    Listing [7-3](#537429_1_En_7_Chapter.xhtml#PC6) uses the default access modifier
    for the `GameData` class. This is a slight adjustment from Listing [7-2](#537429_1_En_7_Chapter.xhtml#PC5),
    which used the `public` access modifier. Similarly, the class fields have been
    updated to use the default, `public`, `protected`, and `private` access modifiers,
    respectively. Sure, we could have set them all to `public` and left the responsibility
    up to the programmer to make sure the class fields were used properly.


    This is another example of leaving a responsibility to the developer that could
    be managed by the Java compiler. For instance, why worry about correct and consistent
    use of the class’ variables when we can enforce the desired use in the class definition
    itself. Let’s say that the player’s name is sacred. In our game, once the player’s
    name is set, we don’t want it changing.


    To enforce this, we use the `private` access modifier on the `playerName` variable
    on line 5. Now the variable can’t be changed by just any code. Because it’s `private`,
    it can now only be changed by the `GameData` class itself using a class method,
    constructor, or variable default, as shown in Listing [7-3](#537429_1_En_7_Chapter.xhtml#PC6).
    The `protected` access modifier, line 4, is used to allow access to fields that
    meet the following criteria:


    - Any code within the enclosing class

    - Other classes in the same package as the enclosing class

    - Subclasses, classes that extend this class, regardless of packages


    Remember, packages are Java’s way of organizing classes. Declaring what package
    your class belongs to is as simple as adding the following line to the top of
    your class’ java file:


    ```

    package org.learn_java.classes;

    ```


    This means that the Java class’ source file can be found in the following directory
    structure local to the Java project’s source directory. The package and the location
    of the file are connected. Keep this in mind when you’re trying to track down
    classes in your project.


    ```

    ./src

    -> org

    -> learn_java

    -> classes

    -> GameData.java

    ```'
