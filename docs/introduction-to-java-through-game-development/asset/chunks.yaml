    ### 本章内容概览


    本章涵盖了一些重要但偏高层面的主题，为我们开始探索 Java 语言并构建知识体系奠定了坚实的基础。以下是本章主要内容的总结：


    *   **计算机编程**：我们简要讨论了使用专门指令解决特定问题的计算机编程方式。

    *   **编程语言**：我们介绍了使用 C 和 C++ 等语言进行编程的概念，包括这些语言在内存管理方面带来的一些困难。

    *   **程序/编程类型**：简要讨论了使用 Java 可以创建的不同类型的程序。

    *   **Java 编程语言**：Java 编程语言的简要历史。

    *   **JRE**：我们讨论了 Java 运行时环境，并提到了我们在第 1 章中安装的版本。

    *   **JDK**：我们讨论了 Java 软件开发的要求，并介绍了 Java 开发工具包。

    *   **基本语法规则**：列出了 Java 编程语言的一些基本语法规则。

    *   **关键字/保留字**：列出了 Java 编程语言的关键字和保留字。

    *   **主游戏循环**：讨论了主程序循环及其职责。

    *   **程序结构**：我们回顾了三个附带视频游戏的核心共享结构。

    *   **附带游戏概览**：我们描述了不同的游戏，并根据其复杂程度进行了分类。


    现在我们已经了解了这些基础内容，可以开始使用 Java 编程语言了。在下一章中，我们将学习 Java 中的变量。


    脚注 1   2   3   4   5   6   7


    # 3. 变量


    我们学习 Java 编程语言的第一次尝试将是探索变量！变量对任何程序都至关重要，事实上，没有变量的支持，任何有用的程序都无法存在，它们种类繁多。变量代表数据，通常用于在整个程序或方法中跟踪某个值。有时，变量被用作指示器或标志，用于标记何时遇到了重要的数据或事件。在
    Java 程序中，变量有许多不同的用途，当你使用 Java 解决不同问题时，都会遇到它们。


    在本章中，我们将回顾变量的几个不同方面，包括声明变量和为其赋值。我们将获得一些使用 `Object` 数据类型变量的经验。在本书后面介绍 Java 的类这一方面之前，我们不会深入讨论类的细节，因此有些内容你暂时需要先接受。让我们来看看变量在
    Java 编程语言中是如何工作的。


    ## 数据类型


    什么是数据类型？回想一下我们之前关于编程语言和 Java 的讨论。我们指出 Java 是一种强类型语言，这意味着 Java “关心”每个变量的类型，并且不允许我们随意更改变量的类型，或者将不兼容类型的值赋给该变量。


    这是一种非常复杂的说法，简单来说就是：一个给定的变量只能保存一种类型的数据。现在，即使我这么说，Java 也有一些特性允许你拥有动态类型的变量，这些变量可以接受不同类型的数据，有点像
    JavaScript 中变量的工作方式。一旦你理解了静态类型变量是如何工作的，你就可以轻松地开始使用 `var` 关键字处理动态类型变量。我们将在高级部分介绍它们。


    但是，什么是数据类型呢？嗯，这是一个更难回答的问题。数据类型就是具有特定特征的数据。在我们的例子中，我们讨论的数据可以是像账号这样的单个值，也可以是使用不同数据类型保存多条信息的复杂对象。你还可以使用数组数据类型定义一系列值。我们将从查看
    Java 编程语言的基本数据类型开始。

