  trans: "\n挑战解决方案  \n本挑战的解决方案并不显而易见。你需要完成一系列配置步骤，才能创建一个新的视频游戏项目，并以功能完整的 Pong 克隆游戏副本作为项目的种子配置。下面我们来详细讲解每一步流程。\n\
    \n**步骤 1：创建新项目以进行自定义**\n\n从 NetBeans 菜单中选择“文件 ➤ 新建项目”。选择“Java 应用程序”作为项目类型。\n\n\
    ![](img/537429_1_En_8_Fig3_HTML.jpg)\n\n新建项目的用户界面对话框显示了一个选项，用于选择包含 Java 与 Maven、Gradle、Ant\
    \ 和 JavaScript 类别的项目。\n\n**图 8-3**  \n新建项目对话框截图 – 选择项目类型\n\n从“Java 与 Ant”项目类别中选择“Java\
    \ 应用程序”选项。\n\n将“项目名称”设置为“MyNewGame”，并选择项目的位置。不要勾选“创建主类”选项，因为我们将使用 PongClone 项目中的主类副本。\n\
    \n![](img/537429_1_En_8_Fig4_HTML.jpg)\n\n新建 Java 应用程序的用户界面对话框要求输入名称和位置。它包含项目名称、位置、文件夹名称、库存储位置以及主类。\n\
    \n**图 8-4**  \n新建项目对话框截图 – 名称和位置\n\n此截图显示了新建项目对话框的第二步。请记住**不要**勾选“创建主类”复选框。完成项目创建过程，并在\
    \ NetBeans 项目列表中展开其条目。\n\n**步骤 2：添加默认项目库**\n\n新项目设置完成后，现在你需要像我们在第 1 章中所做的那样，配置基础库集合。如有需要，可回顾该过程以完成此步骤。图\
    \ 8-5 显示了已添加 Java 库的截图。\n\n![](img/537429_1_En_8_Fig5_HTML.jpg)\n\n项目属性的用户界面对话框包含以下类别：Java\
    \ 平台、库（折叠）、编译、处理器、运行，以及添加项目和添加库弹出窗口。\n\n**图 8-5**  \n已配置库的项目属性截图\n\n此截图显示了 MyNewGame\
    \ 项目及其配置好的基础库集合。请参考第 1 章了解如何设置项目库。\n\n![](img/537429_1_En_8_Fig6_HTML.jpg)\n\n\
    新建项目的对话框包含菜单栏、工具栏、项目源、服务、文件以及我的新游戏的源代码。\n\n**图 8-6**  \n已配置库的新项目截图\n\n此截图显示了已配置库的新游戏项目。新的\
    \ NetBeans 项目和库已设置完毕，接下来我们可以添加 Pong 克隆游戏的资源文件夹。\n\n**步骤 3：复制资源文件夹**\n\n资源文件夹 `cfg`\
    \ 位于每个游戏的 NetBeans 项目文件夹的根目录下。它包含所有游戏资源和配置信息。将其复制到新项目中，即可作为新项目的游戏资源和配置信息来源。\n\n\
    ![](img/537429_1_En_8_Fig7_HTML.jpg)\n\n我的新游戏文件夹包含 build、configuration、nbproject\
    \ 和 source 子文件夹。项目路径为 documents、github、book learn java from games、code 以及 my new\
    \ game。\n\n**图 8-7**  \n包含游戏资源文件夹 `cfg` 的新项目截图\n\n此截图显示了新游戏项目及其复制过来的配置和资源文件夹 `cfg`。\n\
    \n只需将文件夹从 Pong 克隆游戏的项目文件夹复制并粘贴到新游戏的项目文件夹中即可。我们还需要稍微自定义游戏的配置文件，以便能够区分这是游戏的不同版本。找到并打开位于以下路径的游戏\
    \ XML 配置文件：\n\n```\n./MyNewGame/cfg/engine_config_mmg_pong_clone.xml\n```\n"
- fmt: "We want to change the `TITLE` and `COMPANY_NAME` entries to new string values\
    \ so we can tell our version of the game apart.\n\n![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig8_HTML.jpg)\n\
    \nA dialogue box of a new project source has a menu bar, options for projects\
    \ service, files, and an engine configuration code in nine lines with version\
    \ 1.0.\n\n**Image 8-8**  \nScreenshot of the New Project’s `engine_config_mmg_pong_clone`\
    \ Config File\n\nA screenshot of the new game project’s game engine configuration\
    \ file with `TITLE` and `COMPANY_NAME` entries changed to indicate a new copy\
    \ of the game.  \nYou can open and edit the file right in the NetBeans IDE by\
    \ locating it in the “Files” tab. Expand the entry for the new game project and\
    \ locate the file in the `cfg` directory.\n\n## Step 4: Copy Over the PongClone\
    \ Java Classes\n\nWe’ll populate our new project with Java classes from the Pong\
    \ Clone game. You can copy and paste them from project to project directly in\
    \ the NetBeans IDE.\n\n![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig9_HTML.jpg)\n\
    \nA dialogue box of a class file in the game panel, main frame, pong clone java,\
    \ screen game java, and screen main menu java file in a blue highlight, and code\
    \ lines on the right side.\n\n**Image 8-9**  \nScreenshot Showing the Selection\
    \ of the Pong Clone Class Files\n\nA screenshot showing the selection of the PongClone\
    \ project’s Java class files.\n\n![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig10_HTML.jpg)\n\
    \nA dialogue box of copy classes includes the project name, project location,\
    \ package, and a list of classes. The list of classes has a pong clone, game panel,\
    \ main menu, screen game, and main frame.\n\n**Image 8-10**  \nScreenshot Showing\
    \ the Refactor Copy Dialog\n\nA screenshot showing the refactor copy dialog. Click\
    \ the refactor button to refactor copy the classes into the new game project.\n\
    \nYou should rename the main executable class from `PongClone.java` to `MyNewGame.java`\
    \ by right-clicking the file and selecting “Refactor ➤ Rename” from the context\
    \ menu, as shown in Image [8-11](#537429_1_En_8_Chapter.xhtml#Fig11).\n\n![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig11_HTML.jpg)\n\
    \nA dialogue box of a rename class pong clone has an option for adding a new name\
    \ and applying rename on comments and preview, refactor, cancel, and help option\
    \ takes place.\n\n**Image 8-11**  \nScreenshot Showing the Renaming of the PongClone\
    \ Main Class\n\nA screenshot showing the rename file refactoring dialog.  \nYou’re\
    \ almost ready to run the game. You have the classes copied into place, the libraries\
    \ set up, and you’ve plugged in the resource folder. Next up, we’ll fine-tune\
    \ some project settings.\n\n## Step 5: Configure Project Settings\n\nThere are\
    \ a few project settings you should see to before running the game. The first\
    \ is to set the “Working Directory” for the project. Because the game needs to\
    \ find the `cfg` directory in an expected location, we set the “Working Directory”\
    \ field to `./dist` as shown in Image [8-12](#537429_1_En_8_Chapter.xhtml#Fig12).\
    \ You should also set the “Main Class”. The image depicts a default class; make\
    \ sure yours is set to the `MyNewGame.java` class.\n\n![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig12_HTML.jpg)\n\
    \nA dialogue box of the project properties has subparts sources, libraries, build\
    \ and run options, configuration, runtime platform, main class, and arguments.\n\
    \n**Image 8-12**  \nScreenshot Showing the New Project’s Run Settings\n\nA screenshot\
    \ showing the new project’s settings configured with working directory and main\
    \ class.  \nFinally, we can run the game!\n\n## Step 6: Execute the Pong Clone\
    \ Copy\n\nMake sure the project is freshly built by right-clicking on the project\
    \ and selecting “Clean and Build” from the context menu. Now run the project by\
    \ clicking on the `PongClone.java` file and selecting “Run File” from the context\
    \ menu.\n\n![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig13_HTML.jpg)\n\n\
    A user interface of a new game of a pong clone. The screen displays options for\
    \ player game 1, player game 2, and exit game options.\n\n**Image 8-13**  \nScreenshot\
    \ Showing the New Project in Action\n\nA screenshot showing the new game in action.\
    \ Notice the title with different value than the default Pong Clone game.  \n\
    Congratulations! You can now create new game projects using the simple Pong Clone\
    \ game as a starting point. You can clean out the code or alter it as you see\
    \ fit. Combine this knowledge with your experience modifying games by editing\
    \ the `ScreenGame` class and you can start building your own simple games.\n\n\
    ## Conclusion\n\nThat brings us to the conclusion of the chapter and the end of\
    \ our discussion on Java classes. We got to take a look at a lot of different\
    \ features of the Java programming language in action and took on a few difficult\
    \ code challenges. Let’s summarize the material we covered in this chapter subsequently.\n\
    \n## What We Covered\n\nYou made your way through some advanced concepts and a\
    \ gauntlet of difficult coding challenges. You’ve earned your stripes. Let’s review\
    \ what we’ve covered.\n\n*   **Encapsulation**: We discuss the concept of encapsulation\
    \ in OOP and how to further that concept in certain advanced cases.\n*   **Inheritance**:\
    \ We talked about class inheritance in Java and demonstrated it with a few examples.\n\
    *   **Challenge: Inheritance**: You took on a tough challenge using inheritance\
    \ to add a new weapon, the flame spear, to the Dungeon Trap game.\n*   **Polymorphism**:\
    \ We discussed the concept of polymorphism in Java OOP and demonstrated it at\
    \ the class and method level.\n*   **Challenge: Polymorphism**: You were tasked\
    \ with modifying the new flame spear weapon further to make it throwable. This\
    \ took a lot of skill and knowledge. Congratulations for taking it on!\n*   **Importing\
    \ Class Libraries**: Wrapping up our review on classes with a discussion on how\
    \ to wrap up your code into libraries called JAR files. We concluded the section\
    \ by discussing how to include JAR files in a project and access the new Java\
    \ classes in your code using the `import` statement.\n*   **Video Game Project\
    \ Structure**: One of the more important chapters on applied Java programming,\
    \ specifically the structure of projects that use the included game engine.\n\
    *   **Challenge: Create a New Game Project**: One of the most difficult challenges\
    \ you’ve encountered thus far. This one is very specific to the game engine and\
    \ the project structure. It’s ok if you didn’t get this one; there are a lot of\
    \ steps.\n\nWe’ve mastered Java classes and learned how to create our own fresh\
    \ new copy of the Pong Clone game for use as a new game’s starting project. You’re\
    \ ready to start building a game. Look back to the different coding challenges\
    \ and remember how to add new images to the `ScreenGame` class and how to control\
    \ them. You’re well on your way to making your next great game!\n\n# 9. Debugging\
    \ Techniques\n\nNo matter how hard you try, chances are your first implementation\
    \ of a software solution is rarely perfect. Most of the time we need to debug\
    \ our code to figure out what it’s doing and, more importantly, what it’s doing\
    \ wrong. In order to be a successful programmer in any language, we need to be\
    \ able to competently debug a program, so we’ll cover a few basic ideas on the\
    \ subject.\n\n## Output Trace\n\nOne of the most basic and effective debugging\
    \ techniques requires no special software, IDE, or libraries. The output trace\
    \ uses output statements to mark what code is executing and what values certain\
    \ variables have. Let’s motivate the discussion with an example.\n\n```\n//code\n\
    01 public void CheckForMatches(MemoryItem itm) {\n02     System.out.println(\"\
    CheckForMatches: START\");\n03     if(clickedCards != null) {\n04         int\
    \ len = clickedCards.size();\n05         Stack tmp = new Stack();\n06        \
    \   System.out.println(\"CheckForMatches: AAA: \" + len);\n\n08         for(int\
    \ i = 0; i < len; i++) {\n09             MemoryItem tItm = clickedCards.pop();\n\
    10             ProcessMatchCheck(tItm, itm);\n11             tmp.push(tItm);\n\
    12         }\n```"
