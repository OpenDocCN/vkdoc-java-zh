    一个采用基本封装的简单 Java 类示例。

    ***Java 编程说明：我喜欢将封装的概念进一步延伸，而不仅仅是使用 get 和 set 方法保护类数据。我认为正确的封装还应包括通过一组简单的类方法，恰当地暴露复杂的类功能。***

    在一个封装良好的类中，根据定义，我们通过将类字段设为私有来保护对它们的访问。然后通过使用 get 和 set 方法，开放对这些字段的受控访问。我知道这有点虎头蛇尾。这种面向对象编程哲学的实际实现其实一点也不难。在我看来，在设计游戏或其他
    Java 程序时，你可能会过度封装。如果这样做，可能会给游戏增加一些不必要的额外开销。

    例如，是否所有简单的游戏类都应该使用严格的封装？这将导致对这些类的所有字段访问都需要调用方法，而在大多数情况下，方法调用的效率低于直接公开字段访问。这个话题没有太多可讨论的。归根结底，就是使用类的
    get 和 set 方法以及字段访问修饰符，对类字段进行严格控制。在下一节中，我们将讨论 Java 中的类继承，并学习如何基于其他现有类创建新类。


    继承


    在 Java 中，**继承**是面向对象编程的关键特性之一，它允许我们基于现有类创建新类。创建的新类称为子类，而派生子类的现有类称为超类。让我们看看如何在
    Java 中实际声明一个子类。我们将基于清单 8-1 中使用的类进行构建。请留意封装和继承是如何协同工作的。


    ```

    //类声明

    01 public class BasicEncapClass {

    02     private int field1 = 0;


    04     public BasicEncapClass(int i) {

    05         this.field1 = i;

    06     }


    08     public int getField1() {

    09         return this.field1;

    10     }


    12     public void setField1(int i) {

    13         this.field1 = i;

    14     }

    15 }


    17 public class BasicSubClass extends BasicEncapClass {

    18     private int newField1 = 1;


    20     public BasicSubClass(int i) {

    21           super(i);

    22         this.newField1 = i;

    23     }


    25     @Override

    26     public int getField1() {

    27         return this.newField1;

    28     }


    30     @Override

    31     public void setField1(int i) {

    32         this.newField1 = i;

    33     }

    34 }

    清单 8-2

    使用 Java 类的封装与继承示例

    ```


    一组使用封装和继承的简单 Java 类示例。

    请注意清单 8-2 示例类中继承的使用。类 `BasicSubClass` 继承了类 `BasicEncapClass`。你可以使用 `extends` 关键字声明一个新的子类。在
    Java 中，你只能有一个超类，这意味着你一次只能继承一个其他类。在这个例子中，子类声明了一个新的类字段、构造函数以及 get/set 方法。在新的构造函数中，我希望你注意一个特殊的关键字，第
    21 行的 `super`。

    `super` 关键字允许你访问当前类的超类，以调用可用的方法并访问可用的字段。在子类构造函数中，它还有另一个用途。构造函数中的第一行，并且只能是第一行，可以调用超类的构造函数。在这种情况下，当你创建
    `BasicSubClass` 类的新实例时，它将调用 `BasicEncapClass` 的构造函数。另外，请注意子类保留了相同的方法 `getField1`
    和 `setField1`，只是重新定义了它们的功能，使其与新的类字段一起工作。

    `@Override` 关键字是一种特殊的方法注解，表示当前方法覆盖（替换）了超类中同名的方法。你看到在 Java 面向对象编程中封装和继承是如何协同工作的了吗？通过隐藏类字段并通过类方法暴露功能，子类可以以受控的方式维护和扩展其超类的功能。在下一节中，我们将进行一个编码挑战，结合我们新学的
    Java 面向对象编程知识。


    挑战：继承

    在这个编码挑战中（本章的第一个挑战），你将必须依靠你对类继承的知识，为地牢陷阱游戏添加一种新武器。让我们开始编码挑战吧！


    涉及的包：


    ```

    net.middlemind.DungeonTrap_Chapter8_Challenge1

    net.middlemind.DungeonTrap_Chapter8_Challenge1_Solved

    ```


    描述：


    找到包 `net.middlemind.DungeonTrap_Chapter8_Challenge1`，并打开 `MdtWeaponSpear.java`
    文件。你的任务是完成地牢陷阱游戏中的一些工作。具体任务是探索为游戏添加一把火焰长矛，作为两个玩家的默认武器。新武器资源的图形可以在游戏项目的图像资源目录中找到：


    ```

    ./cfg/drawable/DungeonTrap

    ```


    你还必须将新武器接入游戏。由于游戏中已经有一把长矛武器，主程序员要求你使用继承来创建新的 Java 类。除了使用的图像之外，保持其他一切不变，并使新武器更强大且速度稍慢。确保该武器是两个玩家的默认武器。这将需要修改
    `MdtCharInter.java` 类，该类是游戏中玩家和敌人角色的超类。你必须运行此包的文件 `–` `DungeonTrap.java`；右键单击并选择“运行文件”来测试游戏。

    提示：

    如果遇到困难，请仔细查看 `MdtCharInter.java` 类中如何使用 `MdtWeaponSpear.java` 类。如果你更改默认长矛的图像和攻击属性，就可以让它看起来像火焰长矛并具有其行为。思考一下这一点。然后思考
    Java 中的继承，以及如何使用复制粘贴快速复制现有类。最后一个提示，玩家和敌人的默认武器是在 `MdtCharInter.java` 类的构造函数中设置的。

