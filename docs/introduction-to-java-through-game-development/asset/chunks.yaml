    这段代码演示了如何通过先清空再置空的方式删除一个 `ArrayList`。


    ***Java 编程提示：请花时间妥善管理你的数据结构和元素。仅仅因为 Java 拥有垃圾回收器来自动清理未使用的内存，并不意味着我们可以让它承担过多的工作。**


    在处理数组时，我们需要同时追踪数组的初始化及其元素的初始化。这一概念同样适用于使用 `ArrayList`。在下一节中，我们将应对最后一个挑战，以检验我们对
    `ArrayList` 的掌握程度。


    ### 挑战：ArrayLists


    作为本章的最后一个挑战，我们将进一步积累处理 Pong Clone 游戏主屏幕 ScreenGame.java 的经验。在这个挑战中，我们需要在保持游戏功能不变的前提下，重构现有代码。我们将运用新学到的
    `ArrayList` 知识来完成这项任务。让我们开始吧。


    涉及的包：


    ```

    net.middlemind.PongClone_Chapter3_Challenge3

    net.middlemind.PongClone_Chapter3_Challenge3_Solved

    ```


    描述：


    找到 `net.middlemind.PongClone_Chapter3_Challenge3` 包，并打开 ScreenGame.java 文件。在回顾了上一个挑战所做的更改后，开发团队的一些成员希望使用动态长度的数据结构（而非数组）。本挑战以上一个挑战的解决方案为起点，因此请确保你已准备好正确的解决方案。你的任务是重构此文件中的工作代码，将
    `numbers` 变量从数组改为 `ArrayList`。


    你还需要调整变量的初始化方式，并在类的 `DrawScreen` 方法中注释掉旧代码，同时取消新代码的注释。如果一切操作正确，游戏应能无错误运行。你必须运行此包中的文件
    `–` PongClone.java；右键单击并选择“运行文件”来测试游戏。


    提示：


    除了注释掉 `DrawScreen` 方法中处理 `SHOW_COUNT_DOWN_IN_GAME` 和 `SHOW_COUNT_DOWN` 游戏状态的当前代码外，你只需将
    `numbers` 变量从数组转换为 `ArrayList`。


    ### 挑战解决方案


    解决此挑战需要对挑战包中的 ScreenGame.java 文件进行三处小修改。该文件是上一个挑战的解决方案，因此你已经在处理一个整数数组。这意味着代码状态已接近我们的需求。第一处修改是将
    `numbers` 变量的数据类型从 `int[]` 改为 `ArrayList`。


    此更改会在 `numbers` 变量初始化的位置触发一系列语法错误。需要调整这些代码，使其适用于列表而非数组。例如，`"numbers[0] ="` 应变为
    `"numbers.add("`。这是软件开发中反复出现的重构代码的绝佳示例。最初的实现并不总是最优的，有时需要一些调整。


    重构并不代表出现了错误或失误。它仅仅表明你的编程水平正在提高，并且想出了略有不同、略胜一筹的解决方案。解决挑战的最后一步是注释掉 `DrawScreen`
    方法中的当前代码，并取消新代码的注释。


    如有疑问，请查看解决方案包中的挑战文件。至此，本主题内容结束。在下一节中，我们将总结本章内容并回顾所学知识。


    ## 总结


    本章我们涵盖了大量内容，但仅触及了变量主题的皮毛。随着后续内容的深入，我们还会接触到更多信息，但本章已为后续学习奠定了坚实的基础。你已经掌握了一套不错的工具，可以在
    Java 程序中对数据进行建模。结合你处理数组以及列表等动态长度数据结构的能力，你正在精通这门语言的道路上稳步前进。


    ### 本章内容回顾


    在本章中，我们回顾了以下关于 Java 变量的主题。你还有机会完成了本章的三个挑战，我将在下面的列表中注明每个挑战所涉及的主题：


    *   **基本数据类型**：在本节中，我们讨论了 Java 编程语言的基本数据类型以及如何声明变量。


    *   **使用基本数据类型**：我们获得了一些使用变量的经验，并看到了几个初始化变量的示例。


    *   **挑战：基本数据类型**：我们的第一个挑战，要求我们修复 Pong Clone 游戏的一个损坏副本。


    *   **var 关键字与动态类型**：在本节中，我们通过 `var` 关键字探索了 Java 的动态类型支持。


    *   **数组**：数组及其声明的介绍。


    *   **使用数组**：我们探讨了如何初始化数组及其元素，并涵盖了复制和删除数组等实用主题。


    *   **挑战：数组**：一个有趣的挑战，要求我们在 Pong Clone 游戏的副本上重构代码。


    *   **列表**：我们比一般的入门教材更进一步，引入了第二种数据类型——列表，它是一种类似于数组的数据结构。


    *   **使用列表**：我们回顾了初始化 `ArrayList` 以及如何用元素填充它的方法。我们还涵盖了复制和删除列表等实用主题。


    *   **挑战：ArrayLists**：一个有趣的挑战，要求我们重构挑战 #2 的解决方案，使代码使用 `ArrayList` 而非数组。


    本章我们涉及了相当多的内容。我希望使用挑战而非枯燥的示例程序，能让你不仅在学习 Java 方面，而且在熟悉 NetBeans IDE 以及处理一些实际编码问题方面，都获得高效的体验。在下一章中，我们将探讨如何在
    Java 中控制程序的流程。


    # 4. 表达式与运算符、流程控制及变量的更多内容


    在上一章中，我们获得了大量使用 Java 变量的经验，甚至还了解了更复杂的变量和数据结构，如数组和列表。尽管我们使用 Java 数据类型建模数据的能力有所提升，但目前我们在编程方面能做的事情仍然有限。我们还需要一些额外的工具。


    在本章中，我们将扩展对 Java 编程语言的认识，从而为我们的编码工具箱增添更多工具。我们将回顾表达式、运算符和流程控制。利用这些新的语言特性，我们能够将变量和值与不同的运算符结合，创建表达式；同时，我们还能通过将流程控制语句与布尔表达式相结合，来控制程序的流程。


    最后，在结束本章之前，我们将回到变量这一主题，并讨论一些更精细的要点，例如类型转换和自定义数据类型。让我们直接进入主题，从 Java 编程语言中的表达式和运算符开始吧！

