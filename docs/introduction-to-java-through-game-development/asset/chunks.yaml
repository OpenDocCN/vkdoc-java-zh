    ## 挑战：For-Each 循环


    在本章唯一的编程挑战中，你需要运用新学到的知识和编程工具来完成要求。请查看以下描述和提示。如果在处理 for-each 循环时遇到任何问题，请回顾正文。祝你好运！


    涉及的包：


    ```

    net.middlemind.PongClone_Chapter6_Challenge1

    net.middlemind.PongClone_Chapter6_Challenge1_Solved

    ```


    描述：


    一位资深程序员注意到在 `MmgDraw` 方法中使用了基本的 for 循环。请重构此方法中的代码，改用 for-each 循环。如果操作正确，游戏应能正常运行且无错误。你必须运行此包中的文件
    `–` MemoryMatch.java；右键单击并选择“运行文件”来测试游戏。


    提示：


    回顾我们对 for 循环的讨论，for-each 循环与 for 循环类似，区别在于它声明了自己的临时变量，并且仅用于遍历数据结构中的内容。尝试在现有循环的正上方或正下方编写新的
    for-each 循环声明，以便在编码时比较两者。额外提示：正文中有一个特定列表演示了如何将 for 循环转换为 for-each 循环。搜索“第 6 章挑战
    1 解决方案”即可在已解决项目的文件中找到所有解决方案文本。


    ## 挑战解决方案


    此挑战的解决方案位于 `MmgDraw` 方法中，需要将标准的 for 循环转换为 for-each 循环，并额外注意确保布尔标志设置正确。仅此而已。处理这些挑战时请慢慢来，并且一如既往地运行游戏静态主文件
    MemoryMatch.java 的本地版本以测试你的工作。如果你转换了循环但卡片没有翻回，请检查你是否在 `MmgDraw` 方法中正确设置了 `flipped`
    字段。


    ![](img/537429_1_En_6_Fig1_HTML.jpg)


    一张 mmg 记忆匹配游戏的截图，显示 36 个方块排列成 4 行。第一行有 4 个方块，第二行有 2 个，第三行有 5 个，最后一行有 1 个方块是打开的。底部文字显示“按
    b 退出”。


    图 6-1


    在 MmgDraw 方法中使用重构后的 For 循环的记忆匹配游戏


    本挑战中使用的游戏副本截图。重构代码后，游戏按预期运行。


    至此，本节内容结束。成功完成编码挑战后，请花点时间玩一下游戏。确保游戏功能正常。


    ## 结论


    至此，关于循环和迭代的章节就结束了。实际上，关于循环这一主题还有相当多的内容需要介绍。例如，为什么我们几乎可以将任何数据结构插入到 for-each 循环声明中？我可能稍微提到过这一点，但这里无法详细展开。在接下来的两章中，当你学习
    Java 中的面向对象编程时，你会理解幕后发生的事情。现在，让我们看看本章所回顾内容的概要。


    ### 我们涵盖的内容


    在探索 Java 编程语言中的循环和迭代时，我们研究了 Java 中所有三种标准循环机制：for 循环、while 循环和 do-while 循环。我们仔细回顾了最著名的循环：主游戏循环。甚至了解了主游戏循环的三种最常见实现。让我简要总结一下这些主题。


    *   **基本 For 循环**：我们研究了如何声明基本 for 循环，以及在循环外部声明的变量的微妙使用如何改变我们与计数和循环控制变量的交互方式。


    *   **基本 For-Each 循环**：我们将 for 循环与 for-each 循环进行对比，重构了一些早期代码以使用新的循环结构。我们看到了 for-each
    循环可以多么简洁和直观。


    *   **基本 While 循环**：我们使用了基本 while 循环，研究了它们与 for 循环的区别，并指出了需要 while 循环而非 for 循环的不同用例。


    *   **主游戏循环**：在本章中，我们回顾了三种最常见的主游戏循环类型：隐式帧率、显式帧率和帧率无关。


    *   **Do-While 循环**：尽管许多人可能认为它是该语言的一个过时特性，但如果你恰好工作在循环至少需要执行一次的场景中，它可能会成为救星。我们简要的回顾结合关于
    while 循环的章节，应该能为你打下坚实的基础。


    *   **Break 和 Continue 语句**：任何关于 Java 循环的回顾如果不讨论 `break` 和 `continue` 语句都是不完整的。我们快速回顾了这一主题并举例说明了它们的用法。


    现在我们已经涵盖了循环，并为我们的编码工具箱添加了一整套新工具，我们准备迎接 Java 编程语言中更高级的方面之一：面向对象编程。你已经积累了相当多的经验，并拥有坚实的基础；将面向对象编程视为工具箱中新增的另一个工具即可。享受吧！


    # 7. 对象、类与 OOP


    在过去的几章中，你使用 Java 编程语言的经验有所增加，现在我们进入了更高级的主题：OOP，即面向对象编程。Java 首先是一种面向对象的编程语言。无论你是否意识到，你几乎在整个文本中都在使用类和
    OO（面向对象）编程，基本上是从数据结构开始的。


    如果你觉得这个主题过于令人生畏，那么这一事实应该能让你放松下来。让我们尝试给 Java 中的 OOP 下一个简单的定义。首先，你在同名的 Java 类文件中定义你的类。例如，如果你创建了一个新类来管理一艘宇宙飞船，该文件可能命名为


    ```

    SpaceShip.java

    ```


    并且你会以最基本的方式使用这个类，如下所示：


    ```

    SpaceShip testShip = new SpaceShip();

    ```


    实际上就这么简单。在最基本的层面上，类是你对某物进行建模的一种方式。我们如何在计算机上对某物进行建模？我们收集并跟踪数据。有时，这些数据是一张看起来像宇宙飞船的图片；有时，它只是描述宇宙飞船属性的数字；有时，两者兼有。


    这里的主要收获是，你在程序中定义的类会成为类的实例或对象。不要与所有 Java 类的超类——`Object` 类——混淆。现在，想想我们一起回顾过的所有不同数据结构。回忆一下用于定义数据结构内部数据类型的尖括号。为了进一步讨论，我们使用
    `SpaceShip` 类，看看如何将其与数据结构一起使用：


    ```

    // 来自 java.util 包的 ArrayList 类

    ArrayList enemyShips = new ArrayList();

    ```


    这很有趣。通过将我们自定义的类与 Java 自带的类一起使用，我们可以创建新的组合，帮助我们为各种不同的问题建模。例如，在之前展示的代码片段中，我们可能正在尝试找到一种方法来跟踪我们正在开发的新
    2D 太空射击游戏中当前关卡的所有敌舰。现在你已经对类是什么以及如何在 Java 程序中使用它有了基本的了解，让我们来看看如何在 Java 中正确定义一个类。

