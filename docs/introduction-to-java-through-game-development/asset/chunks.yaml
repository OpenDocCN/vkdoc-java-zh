  trans: '

    ## 运算符与运算符优先级


    既然我们已经涵盖了 Java 支持的所有主要表达式类别，现在应该全面审视所有涉及的运算符，并按运算符优先级对它们进行排序。什么是运算符优先级？运算符优先级是指运算符在表达式中被处理的顺序。


    下面的列表展示了 Java 运算符，从最重要（最先处理）到最不重要（最后处理）。每个运算符的文字描述旁边是其符号。


    *   数组索引 **[]**、成员访问 **.**、方法调用 **.**、后置自减 **--**、后置自增 **++**


    *   按位取反 **~**、类型转换 **()**、逻辑非 **!**、创建对象 **new**、前置自减 **--**、前置自增 **++**、一元减号
    **-**、一元加号 **+**


    *   除法 **/**、乘法 **\***、取余 **%**


    *   加法 **+**、字符串拼接 **+**、减法 **-**


    *   左移 **<<**、有符号右移 **>>**、无符号右移 **>>>**


    *   大于 **>**、大于等于 **>=**、小于 **<**、小于等于 **<=**、类型检查 **instanceof**


    *   等于 **==**、不等于 **!=**


    *   按位与 **&**、逻辑与 **&&**


    *   按位异或 **^**、逻辑异或 **^** **（针对布尔运算符）**


    *   按位或 `|`、逻辑或 **||**


    *   条件与 **&&** **（针对布尔运算符）**


    *   条件或 **||** **（针对布尔运算符）**


    *   条件 **?:** **（三元运算符）**


    *   赋值 **=**、复合赋值 **+=**、**-=**、**\*=**、**/=**、**%=**、**&=**、**^=**、**|=**、**<<=**、**>>=**、**>>>=**


    这并非需要死记硬背的内容，但你应该有所了解。在大多数情况下，我建议使用括号对运算符和值进行分组，并显式控制优先级。至此，本节内容就结束了。在下一节中，我们将探讨控制
    Java 程序流程的不同方式。


    ## 流程控制


    尽管到目前为止你已经学到了相当多的知识，但我们仍然只知道如何声明变量和建模数据。在控制程序如何执行方面，我们还没有太多方法。流程控制是任何程序的重要组成部分。没有它，我们就无法根据变量的值执行不同的代码分支。没有流程控制，你无法编写出很多有趣的程序。


    我们将探讨三种控制 Java 程序流程的不同方式。第一种是传统的 If-Else 语句，包括 Else-If 子句。第二种是用于支持将代码分离成多个不同分支的语句：Switch
    语句。最后，我们有一种流程控制方法，允许我们通过 Try-Catch 语句来响应程序中的异常（即意外错误），从而改变程序的执行路径。让我们来看看吧！


    ### If-Else 语句


    If-Else 语句（这也包括 Else-If 子句，但为了简洁，我们不会显式列出它）是你在 Java 程序中控制执行流程的主要方式。If-Else 语句接受一个布尔表达式，并根据表达式的结果有条件地执行特定代码。这种类型的布尔表达式被称为条件表达式。让我们来看一个没有显式条件表达式的基本
    If-Else 语句。


    ```

    1 if(条件表达式) {

    2    // then 子句

    3 } else {

    4    // else 子句

    5 }

    列表 4-9

    基本 If-Else 语句示例

    ```


    一个没有显式条件表达式的基本 If-Else 语句示例。


    让我们通过一个简单的示例来进一步理解这个概念，该示例使用 If-Else 语句来控制变量的初始化。


    ```

    1 boolean b = true;

    2 int i = 0;

    3 if(!b) {

    4    // then 子句

    5    i = 5;

    6 } else {

    7    // else 子句

    8    i = 10;

    9 }

    列表 4-10

    If-Else 语句与变量初始化示例

    ```


    一个使用 If-Else 语句控制变量初始化的示例。


    这种 If-Else 语句的用法是不是让你觉得似曾相识？你能想到另一种使用我们已有工具实现相同功能的方法吗？提示一下：它也是一种条件形式。如果你想到了三元运算符，那么你就想对了。


    ```

    1 boolean b = true;

    2 int i = !b ? i = 5 : i = 10;

    列表 4-11

    If-Else 语句与变量初始化示例

    ```


    一个使用条件表达式实现与 If-Else 语句相同变量初始化的示例。


    当然，If-Else 语句不仅仅是基本形式和变量初始化那么简单。让我们来看一个来自 Pong Clone 游戏 `ScreenGame.java` 类的示例。你可以在
    `net.middlemind.PongClone` 包中找到这个 Java 类。


    ```

    01 public boolean ProcessKeyPress(char c, int code) {

    02    if(state == State.SHOW_GAME && pause == false) {

    03         if(gameType == GameType.GAME_TWO_PLAYER) {

    04             if(c == ''x'' || c == ''X'') {

    05                 paddle1MoveUp = false;

    06                 paddle1MoveDown = true;

    07                 return true;

    08             } else if(c == ''s'' || c == ''S'') {

    09                 paddle1MoveUp = true;

    10                 paddle1MoveDown = false;

    11                 return true;

    12             }

    13         }

    14     }

    15     return false;

    16 }

    列表 4-12

    来自 ScreenGame.java 的复杂 If-Else 语句示例

    ```


    一个使用 If-Else 语句处理 Pong Clone 游戏键盘输入的复杂示例。


    让我们重点关注第 4 到 13 行的 If-Else 语句。我们将把这个 If-Else 语句提取出来，并稍微调整其结构。


    ```

    01 if(c == ''x'') {

    02     paddle1MoveUp = false;

    03     paddle1MoveDown = true;

    04     return true;

    05 } else if(c == ''X'') {

    06     paddle1MoveUp = false;

