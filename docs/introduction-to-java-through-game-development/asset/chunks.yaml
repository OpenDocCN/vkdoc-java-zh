- fmt: 'This process is the same process you used in Chapter [1](#537429_1_En_1_Chapter.xhtml)
    to set up the video game project with their local library files. Now that you
    have a library added to your project, you’ll need to include that package in your
    Java program before you can use it. To do so, you use Java’s `import` keyword.
    An example of importing the video game engine’s main packages is as follows:


    ```

    import net.middlemind.MmgGameApiJava.MmgCore.*;

    import net.middlemind.MmgGameApiJava.MmgBase.*;

    ```


    When using the wildcard feature of the class import process, you will get access
    to all classes in the specified Java package. This is convenient but isn’t intuitive,
    and it hides which classes actually belong to which packages. Let’s take a look
    at how to import just one Java class. In this case, we’re adding access to the
    `MmgBmp` class.


    ```

    import net.middlemind.MmgGameApiJava.MmgCore.MmgBmp;

    ```


    Notice that all Java classes are imported by their package name. Keep this in
    mind as you work with Java. Take the time to get to know the most commonly used
    packages in Java’s included framework of classes. Two important ones that you’ll
    use quite often are `java.io` and `java.util`. You can find out more about the
    classes available in the Java framework at this address: [`https://docs.oracle.com/en/java/javase/11/docs/api/index.html`](https://docs.oracle.com/en/java/javase/11/docs/api/index.html)


    That brings us to the conclusion of this section on importing and accessing libraries
    of classes. In the next section, we’ll take a look at the general, shared, structure
    of the video game projects.


    ## Video Game Project Structure


    Because all of the included video game projects are based on the same game engine,
    they share a similar setup and configuration. The following three Java classes
    set up the static main entry point and two key classes that plug the game engine’s
    screen into a window and panel. I’ll list the classes here:


    **Game’s Static Main Entry Point:** Usually named after the game itself, `PongClone.java`,
    `MemoryMatch.java`, and `DungeonTrap.java`. This part of the project provides
    the executable class for the game. It also, as you’ve seen in a few coding challenges,
    sets up the connection between the video game and its resources via the game engine’s
    config file.


    **MainFrame.java:** This class sets up the window of main frame where the `GamePanel`
    class will render itself. This class is mainly set up to maintain the super-class
    functionality. Note that it inherits from the game engine’s library of classes.


    **GamePanel.java:** This class is responsible for handling events from the loading
    and splash screens and for switching between game screens depending on the game
    state. Much of the functionality of this class comes from its super-class.


    Using these three classes with minor adjustments, refactoring the executable class
    and pointing the game to a new game engine configuration file, is the basis for
    setting up a new game. A very important class field in the game’s executable class
    is the `ENGINE_CONFIG_FILE`. I’ve listed the class field from the Pong Clone game.


    ```

    /**

    * Base engine config files.

    */

    public static String ENGINE_CONFIG_FILE = "../cfg/engine_config_mmg_pong_clone.xml";

    ```


    The game engine configuration file is used to specify a few key game engine settings.
    The main one we need to worry about is the NAME entry. The file uses an XML encoding,
    but it should be simple enough for you to edit without any research. Simply change
    the value in the “val” attribute of the name entry. This value has to be the same
    name as the folder that contains the game’s resources.


    which corresponds to the following directory structure local to the NetBeans project
    folder:


    ```

    ./cfg

    -> class_config

    -> MemoryMatch

    -> drawable

    -> MemoryMatch

    -> MemoryMatchTest

    -> playable

    -> MemoryMatch

    -> engine_config_mmg_memory_match.xml

    -> engine_config_mmg_memory_match_test.xml

    ```


    Some aspects of the game engine are beyond the scope of this text, but I want
    you to be able to create a new game and a video game project using the game engine.
    There are four supported resources in the `cfg` folder. The `class_config` directory
    contains configuration files used to adjust resources in a given game’s specific
    classes. The entries in this file provide data at runtime to set up a game screen’s
    image resources among other things. The `drawable` directory is used to hold image
    resources, and the following image file types are supported: PNG and JPG. Any
    image placed in the game’s folder will be loaded automatically and accessible
    by its full file name, including extension. We’ve also seen the image loading
    process before from previous coding challenges. The `playable` directory is similar
    to the `drawable` directory except that it is used to load sound files. We recommend
    using WAV files for your sound effects and music.


    Lastly, there are a few XML files in the base of the `cfg` folder. These are the
    game engine config files for specific copies of the game. Multiple projects can
    point to the same resources. This is exemplified in how the coding challenges
    are set up. Each challenge is a package in the game project itself and is configured,
    for the most part, to access the same resource and configuration files. You’ll
    notice that there is an `auto_load` folder in the `drawable` and `playable` directories.
    Any resources found in these folders are loaded by default and available to you
    in your game by its full file name.


    That brings us to the conclusion of this section on configuration and setup of
    the video game projects included with the text. In the next section, you’ll be
    challenged to create a new video game project on your own. Enjoy!


    ## Challenge: Create a New Game Project


    In this, the third challenge of the chapter, we’ll explore setting up a new game
    project. There’s not much more to it than that. This is a tough challenge; you
    may not make it through on your first try; don’t worry. You can always reference
    an existing project to see how it’s set up and copy the configuration.


    **Projects Involved:**


    ```

    PongClone

    MyNewGameSolved

    ```


    **Description:**


    This challenge is all about you. We won’t be doing any development tasks for anyone
    or anything like that. In this challenge, you’re going to explore the configuration
    of the video game project by creating a new game project that is a functioning
    clone of an existing project. I should mention that this is the first challenge
    where the solution is a project and not a package.


    Your goal is to use your knowledge about the NetBeans IDE, the game engine, and
    the project configuration from all the preceding chapters to clone the Pong Clone
    game into a new project named “MyNewGame”. I’ll outline the general steps needed
    to solve this challenge and leave it up to you. We’ll review the process in detail
    in this challenge’s solution section.


    1.  Create a new NetBeans IDE project with the name “MyNewGame”.

    2.  Add and configure the library files for `jutils`, `jinput`, and the `MmgGameApiJava`
    libraries.

    3.  Copy the `PongClone` project’s `cfg` directory to the local directory of the
    new `MyNewGame` project.

    4.  Copy all the Java class files from the `PongClone` project’s `net.middlemind.PongClone`
    package and “refactor copy” them into the new project. Name the refactored package
    whatever you would like.

    5.  Configure the project’s settings including the default static main class,
    the output directory, the Java version, and the working directory.

    6.  Execute the project and verify that the Pong Clone game runs correctly.


    Give it your best shot, good luck!


    **Clue:**


    You can use any of the associated video game projects as an example of how to
    configure your new NetBeans project. Use the `PongClone` project as an example
    of the actual classes and game resources to use. Remember, you want to create
    a copy of the Pong Clone game as a starting point for a new video game by cloning
    it into a new NetBeans project.'
