- fmt: '# Challenge Solution


    This challenge was an interesting one. In terms of the actual work needed to complete
    it, it’s an easy challenge. However, knowing exactly what to do is not very clear
    and relies on prior knowledge from previous coding challenges. Let’s talk about
    the steps needed to solve this problem. The first thing you may have noticed is
    that the challenge asks you to alter the game’s configuration file and gives us
    some new resources to use.


    A cursory exploration of the project’s directory structure reveals the new configuration
    file mentioned. Let me point out one important entry in the file:


    ```

    ./MemoryMatch/cfg/

    ```


    This line in the game configuration file is used to find the game’s resources
    in the local configuration folder.


    Take a moment to look through the project’s `cfg` directory and keep an eye out
    for any folders named `MemoryMatchTest`. You should have found a folder with that
    name in the project’s drawables resource directory. This folder is marked by its
    different image resources for the game’s logo, board, and countdown numbers.


    To solve this challenge, simply copy the static main, `MemoryMatch.java`, to a
    new file, `MemoryMatchTest.java`. Make sure to select the “Refactor Copy” option
    by right-clicking on the challenge’s package and selecting “Paste ➤ Refactor Copy”;
    specify the correct name, `MemoryMatchTest`, when refactoring. Now that you have
    the file set up, you’ll want to open it and change the XML configuration file
    specified in the following class field:


    ```

    public static String ENGINE_CONFIG_FILE = "../cfg/engine_config_mmg_memory_match_test.xml";

    ```


    Now that you’ve completed those steps, you should be able to alter the project’s
    settings to use the new static main executable by default. Or you can simply run
    the target file either in the IDE, by right-clicking it and selecting “Run File”,
    or by using the correct console command. The choice is yours. The main takeaway
    here is to understand the importance of the static main entry point and to get
    more experience working with the game engine. You should see the version of the
    game with grayscale images for a few key resources as opposed to color images
    (Image [7-2](#537429_1_En_7_Chapter.xhtml#Fig2)).


    ![](images/537429_1_En_7_Chapter/537429_1_En_7_Figa_HTML.jpg)


    A screenshot of the introduction page of memory match with options of a 1-player
    or 2-player game, or exiting the game.


    ![](images/537429_1_En_7_Chapter/537429_1_En_7_Fig2_HTML.jpg)


    A screenshot displays 36 tiles arranged in 4 rows. 1 tile in both the second and
    fourth rows is open. A text reads press b to exit, at the bottom.


    **Image 7-2** Screenshot of the Modified Memory Match Clone


    A set of screenshots showing the cloned version of the Memory Match game with
    altered configuration file that points to an alternate game resource folder with
    some grayscale resources replacing color images.


    That brings us to the conclusion of this section. Take your time and work through
    the chapter’s code challenges with care. If you get stuck, use the solution package
    to figure out where you went wrong.


    # Conclusion


    That brings us to the conclusion of the first chapter on Java classes. In this
    chapter, we took the time to talk about some of the OOP of the Java programming
    language. We even took the time to explore some subtle points of class design
    and took on three coding challenges. Not too shabby. Let’s take a look at a summary
    of the material we’ve covered here.


    ## What We Covered


    Let’s take a look at the object-oriented programming topics and coding challenges
    we encountered in this chapter:


    - **Class Declarations**: We took a look at some basic class definitions and talked
    about access modifiers at this level.

    - **Fields**: We discussed adding fields to our classes and using access modifiers
    to control how those class fields are used.

    - **Methods**: We furthered our exploration of Java classes by reviewing class
    methods, access modifiers, method parameters, and more.

    - **Static Members**: We managed to refine our understanding of classes further
    by reviewing static class members like static fields and methods.

    - **Constructors**: Class initialization never got easier. We took a look at class
    constructors and differentiated between default and custom constructors.

    - **Challenge: The MmgBmp Class**: This challenge gave us some direct experience
    modifying a game by adding our own image to it. We got some more experience working
    with game engine classes like `MmgBmp` and `ScreenGame`. We also got to add our
    own image to the game screen!

    - **Challenge: The ScreenGame Class**: This challenge gave us more experience
    with user input. We got to configure the `ScreenGame` class to handle new keyboard
    input to animate, show, and hide our new game image. In this way, we added a little
    unnecessary game feature, but it’s the same process when adding similar new game
    features.

    - **Access**: A slightly more advanced topic; we discussed some finer points about
    access modifiers in our classes.

    - **Class Design**: We discussed some class design concepts. Higher-level ideas
    that you should have in mind when designing your classes.

    - **Static Main Entry Point**: A very important topic; you can’t run your programs
    without a static main entry point. We covered this topic and demonstrated how
    to create a static main class and how to execute both a package default and a
    target executable Java class.

    - **Challenge: Dungeon Trap’s Static Main**: The last challenge in the chapter;
    we got more experience with the game engine, game engine configuration files,
    game resources, and static main entry points by creating a new executable Java
    class for the Memory Match game that uses a different set of game resources.


    Java classes are an extremely powerful tool to add to our coding toolbox. You
    will use classes every time you sit down and write a Java program. Knowing how
    to create classes and define their use via access modifiers, custom constructors,
    and class methods opens up a whole universe of new possibilities for you as a
    Java developer. In the next chapter, we’ll take things even further as we review
    some powerful language features that let us use classes in even more ways.


    # Footnotes


    8. Encapsulation, Inheritance, and Polymorphism


    This chapter is all about advanced Java OOP topics like encapsulation, inheritance,
    and polymorphism. Together they constitute three of the four main theoretical
    principles of object-oriented programming. The fourth principle, abstraction,
    is beyond the scope of this text, so we won’t be covering it here. Let’s set the
    stage for the discussion by defining each of these features of the Java, object-oriented,
    programming language.


    - **Encapsulation**: The *process of wrapping code and data together into a single
    unit* usually expressed as a Java class with highly controlled field access via
    class methods.

    - **Inheritance**: A key feature of OOP that allows us to create a new class from
    an existing class. The new class that is created is known as the subclass (child
    or derived class), and the existing class, from which the child class is derived,
    is known as a super-class (parent or base class).

    - **Polymorphism**: Polymorphism works with inheritance by allowing us to use
    inherited class methods differently than the super-class’ implementation.


    We’ll take a close look at each of these advanced topics in turn as we complete
    our review of Java’s object-oriented programming support, and we’ll get to work
    with a new game as we do it: Dungeon Trap! Enjoy!


    ## Encapsulation


    Encapsulation is the first principle of object-oriented programming that we’ll
    explore. Encapsulation in Java refers to the strategic protection of data, class
    fields, through the use of access modifiers and class methods. Let’s motivate
    the review with an example of basic encapsulation in a Java class.'
