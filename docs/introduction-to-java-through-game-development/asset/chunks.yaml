- fmt: '### Challenge Solution


    The solution to this challenge requires you to make two changes to the challenge
    package’s `ScreenGame.java` file, specifically in the `ProcessKeyPress` and `ProcessKeyRelease`
    methods. The first part of the solution requires us to follow the example in the
    `ProcessKeyPress` method so that we can support new keys in the same way as the
    original control keys. Let’s take a look at one example of a valid solution to
    this challenge.


    ```

    01 public boolean ProcessKeyPress(char c, int code) {

    02     if(state == State.SHOW_GAME && pause == false) {

    03         if(gameType == GameType.GAME_TWO_PLAYER) {

    04             if(c == ''x'' || c == ''X'' || c == ''1'' || c == ''!'') {

    05                 paddle1MoveUp = false;

