    An example of a simple Java class employing basic encapsulation.


    **Java Programming Note:** I like to take the notion of encapsulation a bit further
    than just the protection of class data with get and set methods. I like to think
    of proper encapsulation as also including the proper exposure of complex class
    functionality through a simple set of class methods.


    In a well-encapsulated class, by definition, we protect access to the class fields
    by making them `private`. Then open up controlled access to said fields by using
    get and set methods. I know it’s a little bit anticlimactic. The actual implementation
    of this OOP philosophy is not difficult at all. In my opinion, you can over-encapsulate
    when designing a game or other Java program. And you can add some unnecessary
    extra overhead to your game if you do.


    For instance, should all your simple game classes use strict encapsulation? This
    would make all field access to those classes require a method call, and method
    calls are, in most cases, less efficient than a direct public field access. There’s
    not much more to discuss on the topic. It boils down to applying strict control
    of class fields using a class’ get and set methods and field access modifiers.
    In the next section, we’ll discuss class inheritance in Java and discover how
    to create classes based on other, existing, classes.


    ## Inheritance


    Inheritance, in Java, is one of the key features of OOP that allows us to create
    a new class from an existing class. The new class that is created is known as
    a subclass, and the existing class from where the child class is derived is known
    as the super-class. Let’s see how we can actually declare a subclass in Java.
    We’re going to build off of the class we used in Listing [8-1](#537429_1_En_8_Chapter.xhtml#PC1).
    Keep an eye out for how encapsulation and inheritance work together.


    ```java

    //class declarations

    01 public class BasicEncapClass {

    02     private int field1 = 0;


    04     public BasicEncapClass(int i) {

    05         this.field1 = i;

    06     }


    08     public int getField1() {

    09         return this.field1;

    10     }


    12     public void setField1(int i) {

    13         this.field1 = i;

    14     }

    15 }


    17 public class BasicSubClass extends BasicEncapClass {

    18     private int newField1 = 1;


    20     public BasicSubClass(int i) {

    21           super(i);

    22         this.newField1 = i;

    23     }


    25     @Override

    26     public int getField1() {

    27         return this.newField1;

    28     }


    30     @Override

    31     public void setField1(int i) {

    32         this.newField1 = i;

    33     }

    34 }

    Listing 8-2

    Example of Encapsulation and Inheritance Using Java Classes

    ```


    An example of a set of simple Java classes using encapsulation and inheritance.


    Notice the use of inheritance in the example classes in Listing [8-2](#537429_1_En_8_Chapter.xhtml#PC2).
    The class `BasicSubClass` extends the class `BasicEncapClass`. You can declare
    a new subclass using the `extends` keyword. You can only have one super-class
    in Java, meaning you can only extend one other class at a time. In this example,
    the subclass declares a new class field, constructor, and get/set methods. In
    the new constructor, there is a special keyword I want you to take a look at,
    `super`, on line 21.


    The `super` keyword allows you to access the super-class of the current class
    to call available methods and access available fields. It has another use in the
    case of the subclass constructor. The first line in the constructor, and only
    the first line, can call a super-class constructor. In this case, when you create
    a new instance of the `BasicSubClass` class, it will call the constructor of the
    `BasicEncapClass`. Also, note that the subclass keeps the same methods, `getField1`
    and `setField1`, except that it redefines their functionality to work with a new
    class field.


    The `@Override` keyword is a special method annotation that indicates the current
    method overrides, replaces, a super-class method of the same name. Did you see
    how encapsulation and inheritance work together in Java OOP programming? By hiding
    class fields and exposing functionality via class methods, subclasses can maintain
    and extend the functionality of their super-classes in a controlled way. In the
    next section, we’ll take on a coding challenge that incorporates our new knowledge
    of Java OOP programming.


