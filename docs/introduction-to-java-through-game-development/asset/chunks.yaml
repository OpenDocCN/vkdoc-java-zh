- fmt: '### What We Covered


    In this brief introductory chapter, we managed to cover quite a lot of ground:


    - **Basic Java Topics Covered**: We listed and described the basic topics we’ll
    cover throughout the text.

    - **Advanced Java Topics Covered**: We also listed and described the advanced
    topics we’ll cover in this text.

    - **The JDK**: We learned about the Java Development Kit and the target JDK 11
    LTS that’s used by the book’s associated game projects. We also learned that the
    NetBeans IDE may use its own JRE that’s different than the one included in JDK
    11.

    - **The IDE**: We learned about the NetBeans IDE, downloaded and installed it.

    - **Configuring the Game Projects**: We took a deep dive into the world of Java
    game development and prepared three game projects for use in our development environment.

    - **Games, Games, Games**: We got to build and demo three game projects of varying
    complexity as an introduction to the games we’re going to be working with throughout
    this text.


    That brings us to the end of the introduction chapter. In the next chapter we’ll
    start our Java programming education with an overview of what it means to “program”
    a computer followed by a brief history of the Java programming language and a
    few other interesting topics.


    # 2. What Is Java Programming


    If you’ve decided to start learning how to program in Java and you’ve read this
    far, it’s probably a good idea to talk about what Java programming actually is.
    In this chapter, we’ll take a brief stroll down memory lane and talk, at a high
    level, about programming computers and what it means to program in Java. We’ll
    also talk about game programming and discuss the venerable main game loop.


    Before we get into the origin story behind the Java programming language, let’s
    take a moment to talk about programming computers in general. In the next few
    sections, we’ll explore programming computers using different tools and work our
    way up to the modern, IDE-based approach. Let’s have a look.


    ## Computers and Programming


    In this section, we’re going to discuss what programming a computer actually means.
    If you search the phrase online, you might find a definition similar to the following:


    > “Computer programming is the process that professionals use to write code that
    instructs how a computer, application, or software program performs. At its most
    basic, computer programming is a set of instructions to facilitate specific actions.”


    Although it is fairly accurate, I have one issue with this statement. The use
    of the word “professionals.” One doesn’t need to be a “professional” to program
    computers; anyone can do it! Let’s explore this idea a little further and discuss
    some different ways one can program a computer.


    ### Programming Computers


    Programming computers can take on a few different forms. I want to focus on a
    specific aspect of computer programming and use it to illustrate the importance
    of Java. We stated previously that a program was a “set of instructions to facilitate
    specific actions” on a computer. Cleverly hidden in this statement is the concept
    of a programming language.


    The “set of instructions” referenced in the definition is the programming language
    the software developer is using to write the specific “set of instructions” to
    solve the given problem with a computer program. One such fundamental set of instructions
    is the CPU’s assembly instruction set. At one point in time, software was written
    using these archaic tools. An example of assembly programming is shown in Listing
    2-1.


    ```

    1 label_                   ;branch label

    2 LSL     R0, R1, #0       ;5.1

    3 LSL     R0, R1, #31

    4 LSR     R0, R1, #0

    5 LSR     R0, R1, #31

    6 ASR     R0, R1, #0

    ```


    An example snippet of assembly source code.


    The example snippet of assembly source code shows a piece of a larger program.
    Programming in this medium has its benefits, but it also has its drawbacks. One
    such drawback is the time it takes to write a program using pure assembly. Assembly
    source code isn’t very intuitive, and this leads to difficulties when programming
    with it. The language is not very expressive, as you can see. There is little
    in the way of contextual meaning that can be derived from the lines of assembly
    in Listing 2-1. This makes it difficult to write complex, abstract, or complicated
    software using assembly programming.


    ### Programming Languages


    In order to address the shortcomings of assembly programming software, developers
    began creating programming languages. These “languages” were text-based encodings
    that could be converted into assembly source code and, subsequently, associated
    binary code.


    The benefit of this approach is that the software generated with higher-level
    languages was easier to read and understand. Writing programs became more expressive,
    and complex programs became easier to manage than with assembly alone. An example
    of a higher-level language, C, is shown in Listing 2-2.


    ```

    1 #include <stdio.h>

    2 int main()

    3 {

    4     printf("Hello World");

    5     return 0;

    6 }

    ```


    An example C program.


    Higher-level programming languages offered increased capabilities in code reuse,
    code sharing, and project management. At this point in the history of computers,
    circa 1983, the C++ programming language became the de facto “set of instructions”
    used to program computers. While this language provided great power in its object-oriented
    software design support, it also created a fairly pervasive and troublesome issue.


    One core issue that caused many C++ developers hours and hours of debugging time
    is the concept of memory leaks. Listing 2-3 depicts a very simple C++ program
    that creates a memory leak.


    ```

    1 int main() {

    2     //safe use of memory

    3     int * p = new int;

    4     delete p;

    5     //unsafe use of memory

    6     int * q = new int;

    7     //no delete, memory leaked

    8 }

    ```


    A snippet of source code from a C++ program showing a memory leak.


    This simple example program demonstrates how easy it is to leak memory in C++,
    and memory leaks can cause all types of issues. This is where Java comes to the
    rescue. One of the main features of the Java programming language is that it has
    a built-in garbage collector that takes care of deleting unused objects, freeing
    up memory, preventing any costly memory leaks, and saving tons of debugging time.


    We’ll spend a little bit more time talking about Java technology and the history
    of the language, but for now, I’d like to switch directions just a bit and talk
    about some of the different types of programs software developers write and where
    Java fits in.'
