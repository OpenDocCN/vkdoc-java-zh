- fmt: '### Basic Data Types


    One of the fundamental building blocks of any Java program is variables. Variables
    in Java, as we mentioned earlier, are typed, and as such, there are a set of data
    types that are considered to be the basic data types of the Java programming language.


    They are only basic in the sense that they are fundamental to the language and
    not class based. Mainly they are used to represent simple data like numeric values,
    totals, sums, words, names, descriptions, etc. A good analogy when thinking about
    variables is to think of them as the input on a web form. We’ve all filled out
    countless forms online.


    When you enter your name into a text field on a web page, you can think of this
    as assigning the value of your name to a variable meant to store that name. Since
    your name is a series of characters (in Java, we call this a string), we would
    expect to use a variable of type `String` to store the data. Listing [3-1](#537429_1_En_3_Chapter.xhtml#PC1)
    shows how this variable would be expressed in Java.


    ```

    1 String name;

    Listing 3-1

    Example of a String Variable

    ```


    An example of a string variable that could hold a person’s name.


    With that concept in mind, let’s take a look at the different basic data types
    available to us in the Java programming language.


    We’ll also include some information about each data type and an example variable
    declaration. All of this is shown subsequently in Table [3-1](#537429_1_En_3_Chapter.xhtml#Tab1).


    **Table 3-1** The Basic Data Types of the Java Programming Language


    | Name | Type | Min | Max (Inclusive) | Example |

    | --- | --- | --- | --- | --- |

    | Boolean | A binary, true/false, value | n/a (0 or false) | n/a (1 or true) |
    `boolean b;` |

    | Byte | An 8-bit whole number value | -128 | 127 | `byte b;` |

    | Short | A 16-bit whole number value | -32,768 | 32,767 | `short s;` |

    | `int` | A 32-bit whole number value | `-`2 E 31 | 2 E 31 – `1` | `int i;` |

    | `long` | A 64-bit whole number value | `-`2 E 63 | 2 E 63 – `1` | `long l;`
    |

    | `float` | A real number with IEEE 754 32-bit precision | 1.4 E -45 | 3.4028235
    E 38 | `float f;` |

    | `double` | A real number with IEEE 754 64-bit precision | 4.9 E -324 | 1.7976931348623157
    E 308 | `double d;` |

    | `char` | A single Unicode character | `''\u0000''` (0) | `''\uffff''` (65,535)
    | `char c;` |

    | `String` | A series of Unicode characters | 0 (empty string) | Max string length
    supported by the JRE on the given system or 2147483647 characters | `String s;`
    |


    *The set of basic data types in the Java programming language.*


    Don’t allow the table of data to overwhelm you. There’s really not too much going
    on here. Think of these as the basic tools you have for describing data in your
    programs. Some you will use more often than others. At times many may seem like
    a good choice. It will take some experience solving problems with Java before
    you will be able to quickly and confidently decide what data type your variable
    should be. And even then, it can be difficult to decide. In general, I would suggest
    using a data type that supports the data you expect to store in the given variable
    and no more.


    For instance, if you were storing bank account values, you could probably get
    away with using `float`s. Very few people will achieve the kind of wealth that
    would require a `double` data type. Let’s work through a general thought process
    when determining what data type to use. Do you need decimal-level precision? If
    not, then you can ignore `float` and `double`. If you aren’t storing a character
    or a string, then you can ignore `char` and `String` data types. That leaves you
    with `byte`, `short`, `int`, and `long`.


    Chances are `long` is too big, in very few cases do we need to work with numbers
    this large. `Byte` is very small. You only need to work with bytes when you’re
    working with binary data; `short`s and `int`s will suffice in most cases. However,
    `short`s have a small max value that’s kind of limiting. It’s not so large so
    it can’t be easily overcome numerically speaking.


    That would put us in an awkward position because our variable would cease to do
    its job properly. It would not be able to track numbers outside the range of a
    `short`. In this little thought experiment, we would most likely settle on using
    an `int`. If you had a reason to choose another basic data type, you would have
    come to that point when factoring the use of that data type, as we’ve done here.


    `Boolean` data types come in handy when you want to track the occurrence of something.
    There are many occasions in a program, video games included, where you will set
    a `Boolean` variable to `true` or `false` to indicate the existence of some situation,
    value, state, etc. The use of these variables stands out because you only need
    to indicate a change with a value. If you can replace the variable with an integer
    and use `0` and `1` to represent `false` and `true`, respectively, then that variable
    should probably use a `Boolean` data type.


    That’s all I want to cover for the introduction to basic variables. We’ll get
    some experience using them in just a moment when we encounter the chapter’s coding
    challenges. Let’s take a look at how to use basic data-typed variables.'
  raw: '### Basic Data Types


    One of the fundamental building blocks of any Java program is variables. Variables
    in Java, as we mentioned earlier, are typed, and as such, there are a set of data
    types that are considered to be the basic data types of the Java programming language.


    They are only basic in the sense that they are fundamental to the language and
    not class based. Mainly they are used to represent simple data like numeric values,
    totals, sums, words, names, descriptions, etc. A good analogy when thinking about
    variables is to think of them as the input on a web form. We’ve all filled out
    countless forms online.


    When you enter your name into a text field on a web page, you can think of this
    as assigning the value of your name to a variable meant to store that name. Since
    your name is a series of characters (in Java, we call this a string), we would
    expect to use a variable of type `String` to store the data. Listing [3-1](#537429_1_En_3_Chapter.xhtml#PC1)
    shows how this variable would be expressed in Java.


    ```

    1 String name;

    Listing 3-1

    Example of a String Variable

    ```


    An example of a string variable that could hold a person’s name.


    With that concept in mind, let’s take a look at the different basic data types
    available to us in the Java programming language.


    We’ll also include some information about each data type and an example variable
    declaration . All of this is shown subsequently in Table [3-1](#537429_1_En_3_Chapter.xhtml#Tab1).


    Table 3-1


    The Basic Data Types of the Java Programming Language


    | Name | Type | Min | Max (Inclusive) | Example |

    | --- | --- | --- | --- | --- |

    | Boolean | A binary, true/false, value | n/a (0 or false) | n/a (1 or true) |
    boolean b; |

    | Byte | An 8-bit whole number value | -128 | 127 | byte b; |

    | Short | A 16-bit whole number value | -32,768 | 32,767 | short s; |

    | `int` | A 32-bit whole number value | `-`2 E 31 | 2 E 31 – `1` | int i; |

    | long | A 64-bit whole number value | `-`2 E 63 | 2 E 63 – `1` | long l; |

    | float | A real number with IEEE 754 32-bit precision | 1.4 E -45 | 3.4028235
    E 38 | float f; |

    | double | A real number with IEEE 754 64-bit precision | 4.9 E -324 | 1.7976931348623157
    E 308 | double d; |

    | char | A single Unicode character | ‘\u0000’ (0) | ‘\uffff’ (65,535) | char
    c; |

    | String | A series of Unicode characters | 0 (empty string) | Max string length
    supported by the JRE on the given system or 2147483647 characters | String s;
    |


    *The set of basic data types in the* *Java programming language.*


    Don’t allow the table of data to overwhelm you. There’s really not too much going
    on here. Think of these as the basic tools you have for describing data in your
    programs. Some you will use more often than others. At times many may seem like
    a good choice. It will take some experience solving problems with Java before
    you will be able to quickly and confidently decide what data type your variable
    should be. And even then, it can be difficult to decide. In general, I would suggest
    using a data type that supports the data you expect to store in the given variable
    and no more.


    For instance, if you were storing bank account values, you could probably get
    away with using floats . Very few people will achieve the kind of wealth that
    would require a double data type. Let’s work through a general thought process
    when determining what data type to use. Do you need decimal-level precision? If
    not, then you can ignore float and double. If you aren’t storing a character or
    a string, then you can ignore char and string data types. That leaves you with
    byte, short, int, and long.


    Chances are long is too big, in very few cases do we need to work with numbers
    this large. Byte is very small. You only need to work with bytes when you’re working
    with binary data; `short`s and `int`s will suffice in most cases. However, shorts
    have a small max value that’s kind of limiting. It’s not so large so it can’t
    be easily overcome numerically speaking.


    That would put us in an awkward position because our variable would cease to do
    its job properly. It would not be able to track numbers outside the range of a
    short. In this little thought experiment, we would most likely settle on using
    an `int`. If you had a reason to choose another basic data type, you would have
    come to that point when factoring the use of that data type, as we’ve done here.


    Boolean data types come in handy when you want to track the occurrence of something.
    There are many occasions in a program, video games included, where you will set
    a Boolean variable to true or false to indicate the existence of some situation,
    value, state, etc. The use of these variables stands out because you only need
    to indicate a change with a value. If you can replace the variable with an integer
    and use 0 and 1 to represent false and true, respectively, then that variable
    should probably use a Boolean data type.


    That’s all I want to cover for the introduction to basic variables. We’ll get
    some experience using them in just a moment when we encounter the chapter’s coding
    challenges. Let’s take a look at how to use basic data-typed variables.'
  trans: '

    ### 基本数据类型


    任何 Java 程序的基本构建块之一就是变量。正如我们之前提到的，Java 中的变量是有类型的，因此，有一组数据类型被认为是 Java 编程语言的基本数据类型。


    它们之所以被称为“基本”，是因为它们是该语言的基础，而非基于类。它们主要用于表示简单数据，例如数值、总数、总和、单词、名称、描述等。在思考变量时，一个很好的类比是将它们视为网页表单上的输入字段。我们都在网上填写过无数表单。


    当你在网页的文本字段中输入姓名时，可以将其视为将你的姓名值赋给一个用于存储该姓名的变量。由于你的姓名是一系列字符（在 Java 中，我们称之为字符串），我们期望使用
    `String` 类型的变量来存储这些数据。清单 3-1 展示了如何在 Java 中表达这个变量。


    ```

    1 String name;

    清单 3-1

    字符串变量示例

    ```


    一个可以存储人名的字符串变量示例。


    有了这个概念，让我们来看看 Java 编程语言中可用的不同基本数据类型。


    我们还将包含关于每种数据类型的一些信息以及一个变量声明示例。所有这些内容随后都在表 3-1 中展示。


    表 3-1


    Java 编程语言的基本数据类型


    | 名称 | 类型 | 最小值 | 最大值（含） | 示例 |

    | --- | --- | --- | --- | --- |

    | Boolean | 二进制值，true/false | 不适用（0 或 false） | 不适用（1 或 true） | boolean b; |

    | Byte | 8 位整数值 | -128 | 127 | byte b; |

    | Short | 16 位整数值 | -32,768 | 32,767 | short s; |

    | `int` | 32 位整数值 | `-`2 E 31 | 2 E 31 – `1` | int i; |

    | long | 64 位整数值 | `-`2 E 63 | 2 E 63 – `1` | long l; |

    | float | 符合 IEEE 754 32 位精度的实数 | 1.4 E -45 | 3.4028235 E 38 | float f; |

    | double | 符合 IEEE 754 64 位精度的实数 | 4.9 E -324 | 1.7976931348623157 E 308 | double
    d; |

    | char | 单个 Unicode 字符 | ‘\u0000’ (0) | ‘\uffff’ (65,535) | char c; |

    | String | 一系列 Unicode 字符 | 0（空字符串） | 给定系统上 JRE 支持的最大字符串长度或 2147483647 个字符 | String
    s; |


    *Java 编程语言中的基本数据类型集合。*


    不要让这张数据表吓到你。这里其实并没有太多复杂的东西。把它们看作是在程序中描述数据的基本工具。有些你会比其他用得更频繁。有时，很多类型看起来都是不错的选择。你需要积累一些用
    Java 解决问题的经验，才能快速、自信地决定变量应该使用哪种数据类型。即便如此，有时也很难抉择。总的来说，我建议使用能够支持你期望存储在给定变量中的数据，并且不多不少刚刚好的数据类型。


    例如，如果你要存储银行账户余额，使用 `float` 可能就足够了。很少有人能拥有需要 `double` 数据类型才能表示的财富。让我们通过一个通用的思考过程来确定使用哪种数据类型。你需要小数级别的精度吗？如果不需要，那么可以忽略
    `float` 和 `double`。如果你不是要存储字符或字符串，那么可以忽略 `char` 和 `string` 数据类型。这样就剩下 `byte`、`short`、`int`
    和 `long`。


    很可能 `long` 太大了，我们很少需要处理这么大的数字。`Byte` 非常小。只有在处理二进制数据时才需要使用 `byte`；在大多数情况下，`short`
    和 `int` 就足够了。然而，`short` 的最大值较小，这有点限制性。它不够大，以至于在数值上很容易被超出。


    这会使我们陷入尴尬的境地，因为我们的变量将无法正常工作。它将无法跟踪超出 `short` 范围的数字。在这个小小的思维实验中，我们很可能会决定使用 `int`。如果你有理由选择另一种基本数据类型，那么在权衡使用该数据类型的因素时，你就会得出那个结论，就像我们在这里所做的一样。


    当你想要跟踪某件事是否发生时，`Boolean` 数据类型就派上用场了。在程序中（包括视频游戏），有很多情况你会将布尔变量设置为 `true` 或 `false`，以指示某种情况、值、状态等的存在。这些变量的使用很突出，因为你只需要用一个值来表示变化。如果你可以用一个整数替换该变量，并分别使用
    0 和 1 来表示 `false` 和 `true`，那么该变量很可能应该使用 `Boolean` 数据类型。


    关于基本变量的介绍，我想讲的就是这些。稍后当我们遇到本章的编程挑战时，我们将获得一些使用它们的经验。让我们来看看如何使用基本数据类型的变量。

