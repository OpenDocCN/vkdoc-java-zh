- fmt: '# Challenge Solution


    This solution required you to add code to five places in the `ScreenGame.java`
    class and potentially to add a new image to the project. It is by far the most
    complex solution yet, and it requires you to understand class fields and methods
    involved. What is more, it gives you more experience working with the `MmgBmp`
    class. The locations where you have to add new code are as follows:


    1.  Class header: A new class field, `myImg`, of the `MmgBmp` data type has to
    be added to the class at the bottom of the current list of class fields.


    2.  `LoadResources`: A new block of code has to be added near the bottom of the
    `LoadResources` method. This code should be based on existing image loading code
    that’s in the method but should be adjusted to load your chosen image and store
    it in the `myImg` field.


    3.  Positioning and Container: You must set a position for the image using the
    `SetPosition` method, and the image must be added to one of the `MmgContainer`
    fields in the class. You can experiment with different containers to see how it
    affects the visibility of the image.


    4.  `SetState`: In this method, you have to make two adjustments. One at the beginning
    of the method when cleaning up the `SHOW_GAME` state. The second change is lower
    down in the method, and it requires you to make your image visible when changing
    to the `SHOW_GAME` state.


    5.  `UnloadResources`: The last change you have to make is to clean up after yourself
    by setting the `myImg` field to `null` in this method.


    While the list of changes seems daunting, it’s actually very attainable, and there
    is a lot of example code you can use as a basis for your code changes. The end
    result of this coding challenge should be a visible image, of your choice, displayed
    on the in-game screen. There is a fair amount of room for interpretation here,
    so have some fun with it!


    # Challenge: The `ScreenGame` Class


    In order to make your own games using the game engine, you’ll need to understand
    how to load image resources; we’ve got that covered; you’ll also need to understand
    how to animate the image and how to respond to user input; to that end, we’ll
    be working with the `ScreenGame` class in this coding challenge.


    In this challenge, we’ll build off of the work we did in the previous challenge.
    This is the second time the code base for our challenge will be the solution to
    the previous challenge. Make sure you’ve completed the previous challenge successfully
    and double-check the solution if need be. You’ve added a new image to the game
    screen, and now we’re going to wire up some controls for it. Let’s take a look
    at the challenge!


    Packages Involved:


    ```

    net.middlemind.MemoryMatch_Chapter7_Challenge2

    net.middlemind.MemoryMatch_Chapter7_Challenge2_Solved

    ```


    Description:


    Find the package, `net.middlemind.MemoryMatch_Chapter7_Challenge2`, and open the
    `ScreenGame.java` file. We’ll continue on the same track and implement our own
    code to experiment with animating, moving an image in response to user input.
    Choose four different keyboard keys that aren’t used by the game. Two of these
    keys will be used to toggle your new image’s visibility. The other two will be
    used to move your image left and right.


    In order to handle user input, you’ll need to check for your target keys in the
    following methods:


    *   `ProcessKeyPress`


    *   `ProcessKeyRelease`


    It’s up to you to use the `GetPosition`, `SetPosition` methods of the `MmgBmp`
    class to control the image’s position. You’ll also need to use the `GetIsVisible`,
    `SetIsVisible` methods to control the image’s visibility. You should be familiar
    with the keyboard methods and the `MmgBmp` class methods from your experience
    using the class in previous challenges.


    Clue:


    You can rely on existing code in the `ProcessKeyPress` and `ProcessKeyRelease`
    methods to figure out how to support input for your four chosen keyboard keys.
    You can figure out how to use the `MmgBmp` class’ methods by researching their
    use in other parts of the `ScreenGame` class. Perform a text search to figure
    out how to use the class’ methods. You can add more class fields, if need be,
    to help manage the movement and positioning of your image.


    # Challenge Solution


    A simple solution to this coding challenge requires you only to make adjustments
    to the keyboard input handlers: the `ProcessKeyPress` and `ProcessKeyRelease`
    methods. If the target key for left movement is pressed, decrease the X position
    of our image by one. If the target key for right movement is pressed, increase
    the X position by one. Use `if` statements to check that you don’t go out of visual
    range if you so desire. Make sure to turn movement off when a key is released.


    That should take care of the first part of the coding challenge. The next part
    requires us to make our image visible or invisible depending on the target key
    pressed. In this case, we check to see when the key is released and in response
    call our image’s `SetIsVisible` method with a Boolean value to show or hide the
    image. In the next section, we’ll begin our discussion of some more advanced topics
    regarding Java classes.


    # Advanced Class Topics


    Classes are an extremely powerful and important new tool in our coding toolbox.
    We can now create all manner of classes to use in our games and other Java programs.
    I wanted to talk about a few high-level, advanced, aspects of OOP. In the next
    few sections, we’ll talk about access, class design, and the static main entry
    point.


    ## Access


    Access in this regard refers to the access modifiers you use to define your classes.
    In my opinion, it’s fine to use the `public` or default modifier while you’re
    designing your software. The need to make aspects of your classes `protected`
    or `private` will become more pronounced to you as your software matures.


    You can always refactor your code and tighten up the design by using more appropriate
    access modifiers in your class designs. In the next section, we’ll explore this
    concept further as we discuss a few points on class design.


    ## Class Design


    Class design refers to the structure of the classes you build. What class fields
    you use, what methods you define, etc. In general, you should keep your class
    design simple. Add complexity as you need it or if you expect it. For instance,
    if you often use the same few lines of code when working with your classes, you
    might want to move it into a class method.


    Similarly, don’t go overboard with the functionality you support in the classes
    you’re designing. For instance, if you’re adding new functionality in the form
    of class methods, you should ask yourself whether or not that code belongs in
    the given class, is your class responsible for it, or is another class. It may
    turn out a new class is in order to handle the functionality you desire.'
