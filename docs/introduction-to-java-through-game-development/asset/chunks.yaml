  trans: '

    ## 布尔表达式


    我们将讨论的第二种表达式是布尔表达式。简单和复合的布尔表达式均显示在之前的清单 4-1 中。它们主要用于布尔变量的初始化以及 If-Else 语句中。


    布尔表达式几乎是每个程序的重要组成部分，因为它们构成了主要流程控制语句（即 If-Else 语句）的核心。我们之前在第 71 行见过一个类似版本，涉及三元运算符，其功能类似于内联的
    If-Else 语句。


    ```

    01 //准备

    02 ArrayList listIntegers;

    03 listIntegers = new ArrayList();

    04 listIntegers.add(10);


    06 //简单布尔表达式

    07 boolean b;

    08 b = i == 5;

    09 b = (j != d);

    10 b = (j  listIntegers.get(0);

    12 b = (j = d;


    15 //复合布尔表达式

    16 b = i + 1 == 5 + j;

    17 b = (j + listIntegers.get(0) != d);

    18 b = j  (listIntegers.get(0) * 2);

    20 b = (j = -d;

    清单 4-3

    布尔表达式示例

    ```


    一组简单和复合的布尔表达式。


    关于布尔表达式，我还需要提及的一个方面是布尔逻辑的概念。全面介绍布尔逻辑超出了本文的范围，但你应花些时间学习它，因为这将极大地提升你在 If-Else 语句中对布尔运算符的使用能力。


    ## 赋值表达式


    Java 编程语言提供了一整套赋值表达式，将数值运算符和赋值操作合并为便捷的一步。例如，你将在清单 4-4 中看到赋值表达式的长格式。


    ```

    1 i = 5;

    2 i = i + 5;

    3 i = i - 5;

    4 i = i / 5;

    5 i = i % 5; //取模运算符返回整数除法的余数

    6 i = (i * 5);

    清单 4-4

    赋值表达式的长格式等价形式

    ```


    一组长格式等价赋值表达式的示例。


    前面表达式的短格式使用了 Java 便捷的赋值运算符。


    ```

    1 i = 5;

    2 i += 5;

    3 i -= 5;

    4 i /= 5;

    5 i %= 5;

    6 i *= 5;

    清单 4-5

    赋值表达式示例

    ```


    一组赋值表达式的示例。


    在赋值运算符中拥有如此细致的程度可能看起来有些多余，但使用几次后你就会爱上它们。在下一节中，我们将介绍一些便捷运算符，它们能使值的递增和递减操作更高效。


    ## 递增/递减表达式


    在处理常见的递增或递减值时，Java 语言提供了一些快捷方式。这种操作在编程中非常频繁，以至于专门为此设计了一个特殊运算符。首先，让我们看看使用现有工具集递增/递减变量的几种方式。


    ```

    i = i + 1;

    i += 1;

    i = i – 1;

    i -= 1;

    ```


    为了让事情更简单，你现在还可以使用以下选项来将变量递增或递减 1：


    ```

    i++;

    i--;

    ```


    我应该提一下，你也可以使用 `++i` 和 `--i` 这两种形式，它们的区别仅在于运算顺序不同。一种情况是先递增后赋值；另一种情况是先赋值后递增。让我们在清单
    4-6 中看看这种区别带来的微妙结果。


    ```

    //代码

    01 int q; //声明


    03 q = 5; //初始化

    04 int q1 = q++;


    06 q = 5; //初始化

    07 int q2 = ++q;


    09 System.out.println("q++: " + q1);

    10 System.out.println("++q: " + q2);

    //输出

    01 q++: 5

    02 ++q: 6

    清单 4-6

    赋值表达式示例

    ```


    一个展示使用 ++q、--q 与 q++、q-- 之间区别的示例。


    你能看出清单 4-6 示例代码中的区别吗？在一种情况下，先赋值然后递增，如第 4 行；而在第二种情况下，先递增然后赋值，如第 7 行。最终输出显示了赋值值的差异。关于这个主题，我想说的就是这些。在下一节中，我们将介绍可以对基于整数的变量执行的位运算。


    ## 位运算表达式


    位运算表达式并不常用。事实上，你可能编写 Java 程序多年也未曾使用过一次。这是因为它们属于底层操作，因此只有在处理字节和二进制数据时才会派上用场。然而，这并不能成为不熟悉它们的借口，所以让我们来看一下。


    ```

    01 //准备

    02 int x, y, z;


    04 //简单位运算表达式

    05 x = 5;

    06 y = 7;

    07 z = x | y; //按位或，z = 7

    08 z = x & y; //按位与，z = 5

    09 z = x ^ y; //按位异或，z = 2

    10 z = ~x; //按位取反，z = 10


    12 //复合位运算表达式

    13 z = ++x | y--;

    14 z = x * y & y + 10;

    15 z = x ^ y / 256;

    16 z = ~(x * 2);

    清单 4-7

    位运算表达式示例

    ```


    简单和复合位运算表达式的示例。


    详细讲解位级操作超出了本文的范围。花点时间查阅布尔运算 AND、XOR、OR 以及按位取反，以了解更多信息。再次强调，这是 Java 编程语言中一个相对深奥的领域。对这些内容有初步了解可能就足够了。在下一节中，我们将介绍
    Java 支持的其他一些位级表达式。


    ## 位移表达式


    我们将讨论的最后一组主要表达式也是位级的；它们是位移表达式。虽然你可能认为这些对你没用，因为你不会进行任何二进制编程，但请三思。位移是一种非常快速的乘以或除以
    2 的方法。


    这在某些情况下是一种非常频繁的调整，值得了解。如果你发现自己经常需要乘以或除以 2，那么可以考虑使用位移运算符。让我们快速看一些位移表达式。


    ```

    //代码

    1 byte a = 64, g;

    2 i = a << 2;

    3 g = (byte)(a << 2);

    4 System.out.println("a: " + a);

    5 System.out.println("i and g: " + i + ", " + g);

    //输出

    1 a: 64

    2 i and g: 256, 0

    清单 4-8

    位移表达式示例

    ```


    一个简单位移表达式的示例，比较了移位后的值在整数变量和字节变量赋值中的差异。


    请注意，在上一个清单中，原始值 64 变成了 256，即 64 * 4。这告诉我们关于将值左移两位的本质是什么？它告诉我们，左移两位相当于乘以 4。类似地，左移一位相当于乘以
    2，以此类推。反过来，当右移时，我们是在做除法。例如，从值 256 开始，执行右移两位操作，相当于将 256 除以 4，得到值 64，即原始值。


    有符号右移 `>>` 和无符号右移 `>>>` 之间的区别在于：对于有符号右移，位值被推向右侧，并且在数字左侧添加一个与数字符号相同值的新位。而对于无符号右移，新位始终为零。


    再次强调，位运算并非适合所有人，如果你不需要或不想使用它们，完全可以不用。但你应该知道这些功能的存在，即使你并不完全熟悉如何使用它们。在开始编码之前，你随时可以查阅一些示例。接下来，我们将总结
    Java 语言的全部运算符，并按优先级排序。

