    Taking the concept of frames and extending the idea, we have the concept of frames
    per second or how many frames the game or game engine can run in one second. Using
    seconds is not very efficient when working with times that are always much less
    than one second, so we’ll introduce the use of milliseconds. In almost all cases
    for smaller, 2D games, ms will suffice as a time measurement metric. Let’s take
    a look at a formula for calculating ms per frame.


    ```

    1 long msPerSec = 1000;

    2 long targetFrames = 30;

    3 long msPerFrame = msPerSec/targetFrames;

    Listing 6-13

    Calculating Milliseconds per Frame

    ```


    An example of calculating the ms per frame for a target frame rate, FPS, of 30.


    The simple calculation shown in Listing [6-13](#537429_1_En_6_Chapter.xhtml#PC13)
    is very useful when working with games that expect an explicit frame rate and
    work with a “pixels per frame” model. In this model, you move objects and perform
    your updates on the expectation that the game will run a set number of frames
    a second. Using this approach, you can control how your game performs across different
    hardware and ensure a consistent user experience.


    Let me guess; you’re wondering how you control the timing of the game loop. Let
    me show you how it’s done in the included video games. Because they all run on
    the same Java game engine, they all use the same lower-level library code for
    their main game loops. It’s a subtle point, but the main game loop is sometimes
    a part of the game engine you’re working with and not directly in your control.


    Nevertheless, you should be proficient enough in Java programming and game programming
    in particular to craft all three main game loop types. Let’s look at how to soak
    up some time to control the speed of a game loop.


    ```

    01 while (RunFrameRate.RUNNING == true) {

    02     frameStart = System.currentTimeMillis();


    04     if (RunFrameRate.PAUSE == false) {

    05         mf.Redraw();

    06     }


    08     frameStop = System.currentTimeMillis();

    09     frameTime = (frameStop - frameStart) + 1;

    10     aFps = (1000 / frameTime);


    12     frameTimeDiff = tFrameTime - frameTime;

    13     if (frameTimeDiff > 0) {

    14         try {

    15             Thread.sleep((int) frameTimeDiff);

    16         } catch (Exception e) {

    17             MmgHelper.wrErr(e);

    18         }

    19     }


    21     frameStop = System.currentTimeMillis();

    22     frameTime = (frameStop - frameStart) + 1;

    23     rFps = (1000 / frameTime);

    24     mf.SetFrameRate(aFps, rFps);

    25 }

