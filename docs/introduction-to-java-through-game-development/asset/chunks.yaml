- fmt: '# The Second Approach to Copying List Elements


    The second approach gives you more control over how you copy the list elements.
    Notice that we’re using the same code as before; we’ve just replaced the part
    that handles copying the list. This last little snippet of code shows us how to
    delete an `ArrayList` (Listing [3-22](#537429_1_En_3_Chapter.xhtml#PC40)).


    ```

    //code

    1 ArrayList bools = new ArrayList();

    2 bools.add(Boolean.FALSE);

    3 bools.add(Boolean.TRUE);

    4 bools.clear();

    5 bools = null;

    Listing 3-22

    Deleting an ArrayList

    ```


    A code snippet demonstrating how to delete an `ArrayList` by clearing it before
    setting it to `null`.


    **Java Programming Note:** Take the time to properly manage your data structures
    and elements. Just because Java has a garbage collector that cleans up unused
    memory for us doesn’t mean we have to give it a lot of work to do.


    When we were dealing with arrays, there was a concept of keeping track of both
    the initialization of the array and that of its elements. The same applies when
    using `ArrayList`s. In the next section, we’ll tackle one last challenge that’ll
    test our knowledge of `ArrayList`s.


    ## Challenge: ArrayLists


    In this challenge, the last one in this chapter, we’ll gain some more experience
    working with the Pong Clone game’s main screen, `ScreenGame.java`. In this challenge,
    we’ll be tasked with refactoring the current code while maintaining the functionality
    of the game. We’ll be using our newly acquired `ArrayList` knowledge to do so.
    Let’s take a look.


    **Packages Involved:**


    ```

    net.middlemind.PongClone_Chapter3_Challenge3

    net.middlemind.PongClone_Chapter3_Challenge3_Solved

    ```


    **Description:**


    Find the package, `net.middlemind.PongClone_Chapter3_Challenge3`, and open the
    `ScreenGame.java` file. After reviewing the changes made in the last challenge,
    some members of the development team want to use a data structure with a dynamic
    length as opposed to an array. This challenge starts with the solution from the
    previous challenge, so make sure you have the correct solution in place. Your
    challenge is to refactor the working code in this file so that the `numbers` variable
    is an `ArrayList` as opposed to an array.


    You’ll also have to adjust how the variable is initialized and comment out the
    old code while uncommenting the new code in the class’ `DrawScreen` method. If
    you’ve done everything correctly, the game should run without error. You must
    run this package’s file – `PongClone.java`; right-click and select Run File to
    test the game.


    **Clue:**


    Aside from commenting out the current code in the `DrawScreen` method that handles
    the `SHOW_COUNT_DOWN_IN_GAME` and `SHOW_COUNT_DOWN` game states, all you have
    to do is convert the `numbers` variable from an array to an `ArrayList`.


    ## Challenge Solution


    The solution to this challenge requires you to make three small changes to the
    challenge package’s `ScreenGame.java` file. This file is the solution to the previous
    challenge, so you’re working with an array of integers already. That means the
    code is in a state that is close to what we need. The first change to make is
    to alter the data type of the `numbers` variable from an `int[]` to an `ArrayList`.


    This change will trigger a number of syntax errors at the location of the `numbers`
    variable’s initialization. This code needs to be adjusted to work with lists instead
    of arrays. For example, `"numbers[0] ="` becomes `"numbers.add("`. This is a great
    example of something that will come up again and again in software development,
    refactoring code. It just so happens that the first implementation isn’t always
    the best and some adjusting is needed.


    Refactoring isn’t an indication of a mistake or error. It’s simply an indication
    that you’re getting better at programming and have come up with a slightly different,
    slightly better, way of doing something. The last change to solve the challenge
    is to comment out the current code and uncomment the new code in the `DrawScreen`
    method.


    When in doubt, check the solution package and look at the challenge file. That
    brings us to the end of this topic. In the next section, we’ll conclude the chapter
    and review the material we’ve covered.


    ## Conclusion


    We covered a lot of material in this chapter, and we’ve only scratched the surface
    of the variable topic. We’ll encounter more information as we cover more material,
    but this chapter constitutes a solid foundation for which to build. You already
    have a decent set of tools to model data in a Java program. Combine this with
    your ability to work with arrays and dynamic length data structures like lists
    and you’re well on your way to mastering the language.


    ### What We Covered


    In this chapter, we reviewed the following topics on Java variables. You also
    got a chance to take on three challenges in this chapter, and I’ll note what topics
    the challenges were associated with in the following list:


    *   **Basic Data Types:** In this section, we talked about the Java programming
    language’s basic data types and how to declare variables.

    *   **Using Basic Data Types:** We got some experience working with variables
    and saw some examples of how to initialize variables.

    *   **Challenge: Basic Data Types:** Our first challenge which required us to
    fix a broken copy of the Pong Clone game.

    *   **The var Keyword and Dynamic Typing:** In this section, we explored Java’s
    dynamic typing support via the `var` keyword.

    *   **Arrays:** An introduction to arrays and their declaration.

    *   **Using Arrays:** We explored how to initialize arrays and their elements
    and covered useful topics like copying and deleting arrays.

    *   **Challenge: Arrays:** An interesting challenge that required us to refactor
    the code on a copy of the Pong Clone game.

    *   **Lists:** We took it a little further than usual for an introductory text
    and introduced a second data type that is a data structure similar to an array:
    the list.

    *   **Using Lists:** We reviewed the ways in which you initialize an `ArrayList`
    and how to populate it with elements. We also covered useful topics like copying
    and deleting a list.

    *   **Challenge: ArrayLists:** An interesting challenge that required us to refactor
    the solution to challenge #2 so that the code uses an `ArrayList` as opposed to
    an array.


    We covered quite a bit of ground in this chapter. I hope that the use of challenges
    as opposed to boring example programs is an efficient way for you to get experience
    not only learning Java but working with the NetBeans IDE and taking on some real-world
    coding problems. In the next chapter, we’ll take a look at the ways that we can
    control the flow of a program in Java.


    # 4. Expressions and Operators, Flow Control, and More on Variables


    In the previous chapter, we got a fair amount of experience working with variables
    in Java and even took a look at more complex variables, data structures, like
    arrays and lists. Although our ability to model data using Java data types has
    increased, there’s not much we can do programming-wise at this point. We need
    some more tools to work with.


    In this chapter, we’ll expand our knowledge of the Java programming language,
    and by doing so, we’ll incorporate some more tools into our coding toolbox, as
    we review expressions, operators, and flow control. Using these new language features,
    we’ll be able to combine variables and values with different operators to create
    expressions, and we’ll also be able to control the flow of the program by combining
    flow control statements with Boolean expressions.


    Lastly, before we conclude the chapter, we’ll swing back around to the topic of
    variables and cover a few of the finer points on the subject like casting and
    custom data types. Let’s jump into things and start with expressions and operators
    in the Java programming language!'
