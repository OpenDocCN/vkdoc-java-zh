    # 3. Variables


    Our first foray into learning the Java programming language will be the exploration
    of variables! Variables are vitally important to any program, and indeed, no useful
    program could exist without relying on them, all sorts of them. Variables represent
    data and are often used to track a value throughout a program or method. Sometimes,
    variables are used as an indicator, a flag, to mark when some important data or
    event has been encountered. There are many different uses for variables in a Java
    program, and you’ll encounter them as you solve different problems with Java.


    We’ll be reviewing a few different aspects of variables in this chapter including
    declaring them and assigning values to them. We’ll get some experience with variables
    that have an `Object` data type. We won’t go into too much detail on classes until
    we cover that aspect of Java later on in the text so some of the material you
    will have to take for granted for the time being. Let’s take a look at how variables
    work in the Java programming language.


    ## Data Types


    What is a data type? Recall from our previous discussions about programming languages
    and Java. We specified that Java was a strongly typed language and that this meant
    Java “cared” about the type of each variable and doesn’t allow us to arbitrarily
    change the type of a variable or assign a value of an incompatible type to that
    variable.


    That’s a really complicated way of saying that a given variable will only hold
    one type of data. Now, even as I say this, there are features of Java that allow
    you to have dynamically typed variables that accept different types of data sort
    of similar to the way variables work in JavaScript. Once you understand how statically
    typed variables work, you can easily begin working with dynamic typed variables
    using the `var` keyword. We’ll cover them in the advanced section.


    But what is a type of data? Well, this is a more complicated question to answer.
    A type of data is just that, data that has certain characteristics. In our case,
    we’re talking about data that could be a single value like an account number or
    a complex object that holds multiple pieces of information using different data
    types. You could also define a series of values using an array data type. We’ll
    begin by looking at the Java programming language’s basic data types.'
