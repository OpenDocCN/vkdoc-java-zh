    ### 声明哈希表


    哈希表是我们编码工具箱中一个强大的工具。在简要介绍了哈希表的概念之后，让我们来看看如何在 Java 编程语言中使用它们。我们先看一下如何在 Java 中声明和实例化一个哈希表。


    ```

    1 //简单的哈希表声明，隐式使用默认的键、值数据类型为 Object

    2 Hashtable ht1 = new Hashtable();


    4 //高级哈希表声明，显式指定键、值数据类型为 Object

    5 Hashtable ht2 = new Hashtable();


    7 //高级哈希表声明，指定键、值数据类型为 Integer，并使用简写形式的初始化

    8 Hashtable ht3 = new Hashtable();

    清单 5-5

    哈希表 – 声明示例

    ```


    一个使用隐式和显式数据类型规范来声明不同哈希表的示例，针对键值对。


    乍一看，这可能有点复杂。让我们详细讨论一下，看看是怎么回事。在继续之前，先快速思考一下，请记住，我们在这里讨论的数据结构比基本数据类型甚至我们之前回顾的一些数据结构都要高级。当我们定义一个
    `Hashtable` 时，我们是在建立一个键和值之间的映射。


    这意味着给定某个键，你可以查找一个值。但在这个例子中，键和值也都有各自的数据类型。例如，你可以对两者都使用 `String`，那么你的 `Hashtable`
    就会像一个微型字典一样工作。让我用一个例子来进一步说明这个概念。


    ```

    //代码

    1 String key = "Java";

    2 String value = "Java is a computer programming language.";

    3 Hashtable ht = new Hashtable();


    5 ht.put(key, value);

    6 System.out.println("The value for key: " + key + " is: ''" + ht.get("Java")
    + "''");

    //输出

    1 The value for key: Java is: ''Java is a computer programming language.''

    清单 5-6

    哈希表 – 字符串键、值数据类型

    ```


    一个声明哈希表、初始化它、设置和获取值的示例。


    看一下清单 5-6。注意在声明哈希表时，键值对定义 `<String, String>` 中使用了基本数据类型 `String`。我们在回顾 `ArrayList`
    时见过这些尖括号。它们用于通过设置内部数据类型来配置某些数据结构。在这里，它们用于设置 `Hashtable` 的键和值的数据类型。


    将我们的注意力转回到清单 5-5，看一下第 2 行。注意我们没有为哈希表的键或值指定数据类型。不用担心，Java 会为我们处理，并简单地使用默认数据类型，即
    `Object` 数据类型。`Object` 数据类型是 Java 编程语言中所有类的父类，甚至包括你尚未创建的类。我们将在介绍面向对象编程时更详细地介绍
    `Object`。


    目前，可以安全地将它们视为由你定义的、不那么通用的 `Object` 的占位符。例如，你可以选择使用 `String` 对象，就像我们在清单 5-6 中所做的那样。在清单
    5-5 的第 4 行，我们使用了一种 `Hashtable` 声明形式，显式定义了哈希表使用的键和值的数据类型。注意，我们显式定义了与默认情况下会使用的相同数据类型。


    接下来，在清单 5-5 的第 8 行，我们声明了一个 `Hashtable`，其键和值使用了装箱的基本数据类型 `Integer`（而不是 `int`）。如果现在有点困惑，不用担心。我们接下来会学习如何使用哈希表，这将有助于加深你对这种数据结构的理解。


    ### 使用哈希表


    在本节中，我们将实际使用我们的新编码工具 `Hashtable`，并研究一些用例，例如获取/设置值、清空和删除 `Hashtable`。让我们基于清单 5-6
    中的示例进行构建。请记住，在阅读这些代码示例时，键值对的数据类型是可以配置的。


    试着将注意力集中在 `Hashtable` 本身的使用以及如何使用方法来操作表中的数据。我们在上一节已经了解了如何声明和初始化 `Hashtable`。接下来，让我们看看如何在
    `Hashtable` 中获取/设置值。


    ```

    //代码

    01 //准备

    02 String key = "Java";

    03 String value = "Java is a computer programming language.";

    04 Hashtable ht = new Hashtable();


    06 //设置

    07 ht.put(key, value);

    08 ht.put("JRE", "Java Runtime Environment");

    09 ht.put("JDK", "Java Development Kit");


    11 //获取

    12 System.out.println("The value for key: " + key + " is: ''" + ht.get("Java")
    + "''");

    13 System.out.println("The value for key: JRE is: ''" + ht.get("JRE") + "''");

    14 key = "JDK";

    15 System.out.println("The value for key: JDK is: ''" + ht.get(key) + "''");

    //输出

    01 The value for key: Java is: ''Java is a computer programming language.''

    02 The value for key: JRE is: ''Java Runtime Environment''

    03 The value for key: JDK is: ''Java Development Kit''

    清单 5-7

    哈希表 – 获取和设置值

    ```


    一个使用变量和常量作为键和值在 Hashtable 中设置和获取值的示例。


    注意，我们可以使用变量来指定 `Hashtable` 的 `put` 方法的键值对，如清单第 7 行所示。在这种情况下，因为我们使用 `String` 作为键和值的数据类型，我们也可以使用
    `String` 常量来显式设置要存储的值。


    随后，在第 12–15 行，我们使用 `Hashtable` 的 get 方法从数据结构中提取值，并将其附加到我们的输出消息中。接下来，让我们看看如何清空
    `Hashtable` 的值。有几种方法可以做到这一点。让我们直接看代码！


    ```

    01 //准备

    02 String key = "Java";

    03 String value = "Java is a computer programming language.";

    04 Hashtable ht = new Hashtable();


    06 //设置

    07 ht.put(key, value);

    08 ht.put("JRE", "Java Runtime Environment");

    09 ht.put("JDK", "Java Development Kit");


    11 //显式移除所有条目

    12 ht.remove(key);

    13 ht.remove("JRE");

    14 ht.remove("JDK");


    16 //隐式移除所有条目

    17 ht.clear();

    清单 5-8

    哈希表 – 清空值 第 1 部分

    ```


    一个使用显式和隐式方法从 Hashtable 中清空值的示例。


    从清单中可以看出，在大多数情况下，你需要知道用于存储数据的键。如果没有键，你总是可以清空整个数据结构，如第 17 行所示，但如果你想删除一个特定的条目却没有它的键，该怎么办？事实证明，有一种巧妙的方法可以获取哈希表中存储的所有键，并将它们存储在一个
    `ArrayList` 中；回想一下我们在第 3 章中对 `ArrayList` 的回顾。接下来让我们看看这种方法。


    ```

    //代码

    01 //准备

    02 String key = "Java";

    03 String value = "Java is a computer programming language.";

    04 Hashtable ht = new Hashtable();


    06 //设置

    07 ht.put(key, value);

    08 ht.put("JRE", "Java Runtime Environment");

    09 ht.put("JDK", "Java Development Kit");


    11 ArrayList keys = (ArrayList)ht.keys();

    12 for(String name : keys) {

    13     ht.remove(name);

    14 }

    清单 5-9

    哈希表 – 清空值 第 2 部分

    ```


    一个使用 ArrayList 作为枚举来清空 Hashtable 中值的示例。

