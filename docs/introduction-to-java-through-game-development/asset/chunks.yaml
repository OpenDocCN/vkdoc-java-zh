  trans: "\n此过程与你在第 1 章中设置视频游戏项目及其本地库文件时使用的过程相同。现在，你已向项目添加了一个库，在使用它之前，需要将该包包含到你的 Java\
    \ 程序中。为此，你需要使用 Java 的 `import` 关键字。以下是导入视频游戏引擎主要包的示例：\n\n```\nimport net.middlemind.MmgGameApiJava.MmgCore.*;\n\
    import net.middlemind.MmgGameApiJava.MmgBase.*;\n```\n\n当使用类导入过程中的通配符功能时，你将能够访问指定\
    \ Java 包中的所有类。这很方便，但并不直观，而且会隐藏哪些类实际属于哪些包。让我们看看如何只导入一个 Java 类。在本例中，我们添加了对 `MmgBmp`\
    \ 类的访问权限。\n\n```\nimport net.middlemind.MmgGameApiJava.MmgCore.MmgBmp;\n```\n\n\
    请注意，所有 Java 类都是通过其包名导入的。在使用 Java 时请牢记这一点。花些时间熟悉 Java 内置类框架中最常用的包。你会经常用到的两个重要包是\
    \ `java.io` 和 `java.util`。你可以在以下地址找到有关 Java 框架中可用类的更多信息：\n [`https://docs.oracle.com/en/java/javase/11/docs/api/index.html`](https://docs.oracle.com/en/java/javase/11/docs/api/index.html)\
    \ \n至此，我们关于导入和访问类库的部分就结束了。在下一节中，我们将了解视频游戏项目的通用共享结构。\n\n视频游戏项目结构\n由于所有附带的视频游戏项目都基于同一个游戏引擎，因此它们具有相似的设置和配置。以下三个\
    \ Java 类设置了静态主入口点，以及两个将游戏引擎屏幕连接到窗口和面板的关键类。我将在此列出这些类：\n**游戏的静态主入口点：** 通常以游戏本身命名，例如\
    \ PongClone.java、MemoryMatch.java 和 DungeonTrap.java。项目的这一部分为游戏提供了可执行类。同时，正如你在一些编程挑战中所见，它还通过游戏引擎的配置文件建立了视频游戏与其资源之间的连接。\n\
    \n**MainFrame.java：** 此类设置主框架的窗口，`GamePanel` 类将在其中渲染自身。此类主要用于维持超类功能。请注意，它继承自游戏引擎的类库。\n\
    \n**GamePanel.java：** 此类负责处理加载屏幕和启动屏幕的事件，并根据游戏状态在游戏屏幕之间切换。此类的许多功能都来自其超类。\n\n使用这三个类，稍作调整，重构可执行类并将游戏指向新的游戏引擎配置文件，是设置新游戏的基础。游戏可执行类中一个非常重要的类字段是\
    \ `ENGINE_CONFIG_FILE`。我列出了 Pong Clone 游戏中的这个类字段。\n\n```\n/**\n* 基础引擎配置文件。\n*/\n\
    public static String ENGINE_CONFIG_FILE = \"../cfg/engine_config_mmg_pong_clone.xml\"\
    ;\n```\n\n游戏引擎配置文件用于指定一些关键的游戏引擎设置。我们需要关注的主要是 NAME 条目。该文件使用 XML 编码，但应该足够简单，你无需任何研究即可编辑。只需更改\
    \ name 条目中“val”属性的值即可。该值必须与包含游戏资源的文件夹名称相同。\n\n```\n\n这对应于 NetBeans 项目文件夹本地的以下目录结构：\n\
    \n```\n./cfg\n-> class_config\n-> MemoryMatch\n-> drawable\n-> MemoryMatch\n->\
    \ MemoryMatchTest\n-> playable\n-> MemoryMatch\n-> engine_config_mmg_memory_match.xml\n\
    -> engine_config_mmg_memory_match_test.xml\n```\n\n游戏引擎的某些方面超出了本文的范围，但我希望你能够使用游戏引擎创建新游戏和视频游戏项目。cfg\
    \ 文件夹中有四种受支持的资源。class_config 目录包含用于调整特定游戏类中资源的配置文件。此文件中的条目在运行时提供数据，用于设置游戏屏幕的图像资源等。\n\
    drawable 目录用于存放图像资源，支持以下图像文件类型：PNG 和 JPG。放置在游戏文件夹中的任何图像都将自动加载，并可通过其完整文件名（包括扩展名）访问。我们之前也在之前的编程挑战中看到过图像加载过程。playable\
    \ 目录与 drawable 目录类似，只是它用于加载声音文件。我们建议对音效和音乐使用 WAV 文件。\n最后，cfg 文件夹的根目录下还有一些 XML\
    \ 文件。这些是特定游戏副本的游戏引擎配置文件。多个项目可以指向相同的资源。编程挑战的设置方式就体现了这一点。每个挑战都是游戏项目本身中的一个包，并且在大多数情况下配置为访问相同的资源和配置文件。你会注意到\
    \ drawable 和 playable 目录中都有一个 auto_load 文件夹。这些文件夹中的任何资源都会默认加载，并且你可以通过其完整文件名在游戏中使用它们。\n\
    至此，我们关于本文附带的视频游戏项目的配置和设置部分就结束了。在下一节中，你将面临挑战，需要自己创建一个新的视频游戏项目。祝你玩得开心！\n\n挑战：创建一个新的游戏项目\n\
    在本章第三个挑战中，我们将探索如何设置一个新的游戏项目。仅此而已。这是一个艰巨的挑战；你可能第一次尝试无法成功；别担心。你随时可以参考现有项目，了解其设置方式并复制配置。\n\
    \n涉及的项目：\n\n```\nPongClone\nMyNewGameSolved\n```\n\n描述：\n这个挑战完全关乎你自己。我们不会为任何人或任何事执行任何开发任务。在这个挑战中，你将通过创建一个新游戏项目来探索视频游戏项目的配置，该项目是现有项目的功能克隆。我应该提一下，这是第一个解决方案是项目而非包的挑战。\n\
    \n你的目标是利用你对 NetBeans IDE、游戏引擎以及前面所有章节中项目配置的知识，将 Pong Clone 游戏克隆到一个名为“MyNewGame”的新项目中。我将概述解决此挑战所需的一般步骤，剩下的就靠你自己了。我们将在本挑战的解决方案部分详细回顾该过程。\n\
    \n1.  创建一个名为“MyNewGame”的新 NetBeans IDE 项目。\n\n2.  添加并配置 jutils、jinput 和 MmgGameApiJava\
    \ 库的库文件。\n\n3.  将 PongClone 项目的 cfg 目录复制到新的 MyNewGame 项目的本地目录中。\n\n4.  从 PongClone\
    \ 项目的 net.middlemind.PongClone 包中复制所有 Java 类文件，并将它们“重构复制”到新项目中。为重构后的包任意命名。\n\n\
    5.  配置项目设置，包括默认的静态主类、输出目录、Java 版本和工作目录。\n\n6.  执行项目并验证 Pong Clone 游戏是否正常运行。\n\n\
    全力以赴，祝你好运！\n提示：\n你可以使用任何相关的视频游戏项目作为如何配置新 NetBeans 项目的示例。使用 PongClone 项目作为实际类和游戏资源的示例。请记住，你的目标是通过将\
    \ Pong Clone 游戏克隆到一个新的 NetBeans 项目中，创建一个副本作为新视频游戏的起点。\n"
- fmt: '# Challenge Solution


    The solution to this challenge isn’t obvious. You have to work through a number
    of configuration steps in order to create new video game project with a functioning
    copy of the Pong Clone game as the seed configuration of the project. Let’s go
    over each step in the process in detail.


    ## Step 1: Create a New Project to Customize


    Select “File ➤ New Project” from the NetBeans menu. Choose “Java Application”
    for the project type.


    ![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig3_HTML.jpg)


    A dialogue box of the user interface of a new project displays an option to choose
    the project that has categories java with maven, Gradle, ant, and javascript.


    **Image 8-3** Screenshot of the New Project Dialog – Choose Project Type


    Select the `Java Application` option from the `Java with Ant` project category.


    Set the “Project Name” to `MyNewGame` and select the location of the project.
    Don’t select the `Create Main Class` option as we’ll use a copy of one from the
    `PongClone` project.


    ![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig4_HTML.jpg)


    A dialogue box of a user interface of a new java application asks for input of
    the name and location. It includes project name, location, folder name, storing
    libraries, and main class takes place.


    **Image 8-4** Screenshot of the New Project Dialog – Name and Location


    A screenshot showing the second step in the new project creation dialog. Remember
    NOT to check the `Create Main Class` checkbox. Complete the project creation process
    and expand its entry in the NetBeans project list.


    ## Step 2: Add the Default Project Libraries


    Once the new project is set up, now you have to configure the base set of libraries
    like we did in Chapter [1](#537429_1_En_1_Chapter.xhtml). Feel free to refer back
    in to review the process in order to complete this step. A screenshot showing
    the added Java libraries is shown in Image [8-5](#537429_1_En_8_Chapter.xhtml#Fig5).


    ![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig5_HTML.jpg)


    A dialogue box of a user interface of project properties includes categories such
    as java platform, libraries folded, compile, processor, run, and add project and
    add library popup.


    **Image 8-5** Screenshot of the Project’s Properties with Configured Libraries


    A screenshot showing the `MyNewGame` project with configured set of base libraries.
    Use Chapter [1](#537429_1_En_1_Chapter.xhtml) as a reference on how to set up
    the project’s libraries.


    ![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig6_HTML.jpg)


    A dialogue box of a new project has a menu bar, toolbar, project source, services,
    file, and the source code of my new game.


    **Image 8-6** Screenshot of the New Project with Configured Libraries


    A screenshot of the new game project with configured libraries. The new NetBeans
    project and the libraries are set up so we can add the Pong Clone game’s resource
    folder.


    ## Step 3: Copy Over the Resource Folder


    The resource folder, `cfg`, is located on the root directory of each game’s NetBeans
    project folder. It contains all the game resources and configuration information.
    Copying it to a new project makes it available as a source of game resources and
    configuration information for the new project.


    ![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig7_HTML.jpg)


    A folder of my new game folder consists of build, configuration, n b project,
    and source. The pathway of the project is documents, git hub, book learn java
    from games, code, and my new game.


    **Image 8-7** Screenshot of the New Project with Game Resource Folder – `cfg`


    A screenshot showing the new game project with the copied-over configuration and
    resource folder, `cfg`.


    Simply copy and paste the folder from the Pong Clone game’s project folder into
    the new game’s project folder. We’ll want to customize the game’s configuration
    file a little so that we can tell it’s a different version of the game. Find and
    open the game’s XML configuration file located here:


    ```

    ./MyNewGame/cfg/engine_config_mmg_pong_clone.xml

    ```'
