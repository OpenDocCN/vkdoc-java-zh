    \ 9-1**  \nExample of Using Output Statements to Debug a Program\n\nAn example\
    \ of using simple standard output statements to trace and debug a program. You\
    \ might remember this snippet of code from the Memory Match game’s coding challenges.\
    \ In this listing, we’re using output statements to trace through the functionality\
    \ of the method. Notice that key information like the start and end of the method\
    \ call and the size of the `clickedCards` data structure are tracked. Debugging\
    \ like this can help you visualize what happens when a block of code executes.\
    \ This can greatly aid in fixing any bugs in your code implementation.\n\nThat\
    \ brings us to the conclusion of the basic debugging technique of output tracing.\
    \ In the next section, we’ll take a look at the more advanced technique of using\
    \ the IDE to debug your programs. Let’s take a look at the tools available in\
    \ the NetBeans IDE for debugging our Java games!\n\n## IDE Debugging Features\n\
    \nAnother slightly more advanced approach to debugging your Java programs is to\
    \ rely on the tools available in the NetBeans IDE. This has the advantage of being\
    \ a bit more advanced, efficient, and powerful at the cost of requiring the IDE\
    \ to accomplish your debugging tasks. This is fine, but if you’re doing some “on-device”\
    \ debugging, you won’t have the luxury of accessing the IDE’s tools. You’ll have\
    \ to fall back to the more basic output trace technique.\n\nLet’s take a moment\
    \ to talk about the debugging features in the NetBeans IDE. We’ll keep it high\
    \ level and focus on the features that are designed to help us find and fix bugs\
    \ in our code. We won’t get into more project-level debugging in this chapter.\
    \ The debugging button bar in the NetBeans IDE is shown in Image [9-1](#537429_1_En_9_Chapter.xhtml#Fig1).\n\
    \n![](images/537429_1_En_9_Chapter/537429_1_En_9_Fig1_HTML.jpg)\n\nAn image of\
    \ NetBeans debugging bar icons in two rows with stop, pause, play, rewind, forward,\
    \ download, and upload buttons.\n\n**Image 9-1**  \nAn Image Depicting the NetBeans\
    \ Debugging Bar\n\nYou can find this bar of buttons at the top center of the NetBeans\
    \ IDE after entering debugging mode, `Ctrl+F5`. The buttons shown are stop, pause,\
    \ continue, step over, step over expression, step into, and step out. To see the\
    \ debugging button bar, you must be in project debugging mode. Click the debug\
    \ project button from the top of the IDE window or press `Ctrl+F5` on your keyboard\
    \ to start debugging the current program. In the previous image, you can see the\
    \ debugging bar before the trace has begun, inactive buttons, and, afterward,\
    \ active buttons. The NetBeans IDE debugger is meant to work with break points.\
    \ You can set a break point at any line in your code by clicking near the line\
    \ numbers, at the edge of the text editor. This will create a red highlight on\
    \ the selected line to indicate it has been set as a debugging break point.\n\n\
    What is a break point you ask? Well, a break point tells the debugger to stop\
    \ executing the program at that point in the code so you can look around and see\
    \ what’s happening with different variables at that point in the code. Let’s take\
    \ a look at what a break point looks like in the NetBeans IDE.\n\n![](images/537429_1_En_9_Chapter/537429_1_En_9_Fig2_HTML.jpg)\n\
    \nA screenshot of the computer screen has a menu bar with four panels of projects,\
    \ navigators, a program of a break point in NetBeans, and output.\n\n**Image 9-2**\
    \  \nAn Image Depicting a Break Point in the NetBeans IDE\n\nA screenshot showing\
    \ what a break point looks like in the NetBeans IDE.\n\nLet’s look at what happens\
    \ when we start debugging the program after setting a break point in the code\
    \ before we talk about what the different debugging buttons actually do.\n\n![](images/537429_1_En_9_Chapter/537429_1_En_9_Fig3_HTML.jpg)\n\
    \nA screenshot has a menu bar and four panels of debugging, navigators, programming\
    \ code for screen game java, and variables.\n\n**Image 9-3**  \nAn Image Depicting\
    \ Stopping at a Break Point During Debugging\n\nAn image depicting NetBeans IDE\
    \ in debugging mode stopping at a break point. Notice that the debugging button\
    \ bar is now fully active. When the debugger reaches a break point, in this case,\
    \ the break point is set in a copy of the Memory Match game from Challenge 1 in\
    \ Chapter [5](#537429_1_En_5_Chapter.xhtml). This particular break point is reached\
    \ when two cards have been clicked on the Memory Match game board. The debugger\
    \ will detect the break point and stop to await our instructions. We can use all\
    \ the buttons on the debugging bar to adjust the next executed line of the program.\n\
    \nThis feels like a good time to talk about what each button on the debugging\
    \ button bar does. I’ll list them here with a brief description of their use.\n\
    \n*   **Debug Project (`Ctrl+F5`)**: Used to start a project debugging session.\n\
    *   **Finish Debugging Session (`Shift+F5`)**: Used to end the project debugging\
    \ session.\n*   **Pause**: A button used to pause the current debug session.\n\
    *   **Continue (`F5`)**: Used to continue the debugger. The program will execute\
    \ until another break point is hit.\n*   **Step Over (`F8`)**: When a break point\
    \ is reached, use this button to execute the next line of code.\n*   **Step Over\
    \ Expression (`Shift+F8`)**: This button lets you proceed through each method\
    \ call in an expression and view the input parameters as well as resulting output\
    \ values of each method call. If there are no further method calls, Step Over\
    \ Expression behaves like the Step Over command.\n*   **Step Into (`F7`)**: Use\
    \ this button to step into a method call to see the method parameters and return\
    \ values and to continue debugging through the method execution.\n*   **Step Out\
    \ (`Ctrl+F7`)**: Use this command to execute the rest of the current function\
    \ and it breaks when the function return is completed.\n\nAs you can see from\
    \ the options available, it’s very easy to explore the variables, parameters,\
    \ and return values of your Java program when using NetBeans’ built-in debugger.\
    \ It may take you some time to gain experience and really get the most out of\
    \ the debugging tools, but that’s fine, you were going to be coding anyway. That\
    \ brings us to the conclusion of this section. In the next section, we’ll take\
    \ a look at exceptions in the Java programming language.\n\n## Exceptions\n\n\
    We’ve had a little bit of exposure to the `Exception` class, and Java error handling\
