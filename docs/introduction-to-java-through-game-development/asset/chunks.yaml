    prompts. In the next section, we’ll install and configure the book’s associated
    game projects.'
  trans: '

    ## 搭建开发环境


    在本节中，我们将启动并运行您的开发环境，以便您能对附带的游戏项目进行简单测试，并观察其运行效果。这将让您对这些项目有一个初步了解。首先，我们需要安装并配置好
    IDE。本书使用 NetBeans IDE 进行 Java 项目管理和开发。


    首先，我们需要安装一份 Java 开发工具包（JDK）。您可以从 [`www.oracle.com/java/technologies/downloads/`](http://www.oracle.com/java/technologies/downloads/)
    网站下载 Oracle JDK 的各个版本。下载某些版本的开发工具包可能需要您拥有一个账户。如果您已经安装了 JDK，那也没问题；不过，建议您安装并使用与附带游戏项目编码时所用版本一致的
    JDK 进行开发和操作。


    在撰写本文时，Java SE 18 是 JDK 的最新版本。附带的项目是基于 Java SE 11 LTS 编写的。我建议您在处理附带游戏项目时使用 Java
    SE 11 LTS，但您也可以尝试使用您喜欢的任何 Java 版本，如果遇到问题，再回退到 Java SE 11 LTS。您可以在此处找到 Java 11
    JDK：


    [`www.oracle.com/java/technologies/downloads/#java11`](http://www.oracle.com/java/technologies/downloads/%2523java11)


    我们先安装 JDK，然后再安装 NetBeans IDE。我使用的是 Windows 电脑，因此下载了与我的硬件对应的 JDK。双击您刚刚下载的 JDK 11
    安装程序。安装过程应该非常简单。如果在安装过程中遇到任何问题，请使用以下网址进行故障排除。


    [`https://docs.oracle.com/en/java/javase/11/install/installation-jdk-microsoft-windows-platforms.html`](https://docs.oracle.com/en/java/javase/11/install/installation-jdk-microsoft-windows-platforms.html)


    JDK 安装完成后，我们将继续设置 NetBeans IDE 和附带的游戏项目。在您常用的浏览器中导航至 [`https://netbeans.apache.org`](https://netbeans.apache.org)
    网站，并下载最新的 LTS 版本。在撰写本文时，NetBeans IDE 的下载链接位于网站主页上。点击该链接，然后找到适用于您电脑操作系统的 IDE 最新
    LTS 版本。该过程如图 1-2 至 1-5 所示。


    ![](img/537429_1_En_1_Fig2_HTML.jpg)


    一个打开的 Apache NetBeans 网站的用户界面，其中有一个箭头指向下载选项，并展示了三个主要特点：快速编辑、编程语言和跨平台。


    图 1-2


    截图 – NetBeans IDE 下载 1


    一张展示撰写本文时 NetBeans IDE 下载链接的截图。


    找到适用于您操作系统的安装二进制文件。我使用的是 64 位 Windows 机器，因此我将选择相应的安装二进制文件，如下图所示。


    ![](img/537429_1_En_1_Fig3_HTML.jpg)


    一个 Apache NetBeans 网站的用户界面，其中有一个红色矩形框内包含 Apache NetBeans 13 的 64 位 Windows 版本下载选项，并提供了社区安装程序。


    图 1-3


    截图 – NetBeans IDE 下载 2


    请务必选择适合您计算机架构和操作系统的安装程序。


    打开您为目标开发计算机下载的 NetBeans IDE 安装程序。您应该会看到类似于图 1-4 所示的界面。


    ![](img/537429_1_En_1_Fig4_HTML.jpg)


    一个打开的 Apache NetBeans IDE 安装程序窗口的用户界面，包含欢迎、自定义选项，以及一个带有“下一步”选项的矩形框，底部有“取消”选项。


    图 1-4


    截图 – NetBeans IDE 安装 1


    Apache NetBeans IDE 13 主安装界面。


    我们将专门使用 Java，因此可以接受默认的安装选项。您可以根据需要调整设置，但我们建议您直接按照默认安装选项进行。在点击安装按钮之前，请确保选中“检查更新”复选框（图
    1-5）。


    ![](img/537429_1_En_1_Fig5_HTML.jpg)


    一个 Apache NetBeans IDE 安装程序的用户界面，显示安装应用程序的摘要，并在底部的矩形框中突出显示了“安装”选项。


    图 1-5


    截图 – NetBeans IDE 安装 2


    Apache NetBeans IDE 13 安装过程，即将开始安装。请确保勾选检查更新选项。


    安装完成后，打开 NetBeans 并按照任何软件更新提示进行操作。在下一节中，我们将安装并配置本书附带的游戏项目。

