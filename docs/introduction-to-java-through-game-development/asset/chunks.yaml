  raw: '### Static Main Entry Point


    We’ve covered a lot of material on Java classes, but we haven’t talked about how
    you actually execute a Java program. In order to do so, you must have at least
    one class that has a static main method that matches a specific method signature.
    Let’s look at the signature of a static main method .


    ```

    public static main(String[] args) { ... }

    ```


    The static main entry point for each of the associated video game project has
    the same name as the project itself. The copy of the game setup for each coding
    challenge uses the same approach. When you build a project in the NetBeans IDE,
    you can configure it to have a default class, with a static main, to run when
    the program is executed.


    To set this value, right-click on your Java project in the NetBeans IDE and select
    the properties option. From the pop-up window, select the “Run” option from the
    left-hand side of the window.


    ![](images/537429_1_En_7_Chapter/537429_1_En_7_Fig1_HTML.jpg)


    A screenshot of the dialogue box shows different categories of project properties
    in memory match. There are text boxes beside configuration, runtime platform,
    arguments, working directory, and V M option at the right.


    Image 7-1


    Screenshot of a Project’s Run Settings in the NetBeans IDE


    A screenshot of the NetBeans IDE’s Run settings.


    Once you’ve set the desired static main class, when you build your project, you
    can execute it by using the following code on the command line. On Windows, you
    can use a command prompt to execute the commands. On Mac or Linux, you can use
    a terminal window. Search online for the steps to launch the correct console for
    your operating system. You can run your newly built Java programs by running a
    command similar to the following:


    ```

    java -jar MemoryMatch.jar

    ```


    Usually, the newly created JAR file is located in the dist folder of your project’s
    root directory. That would be the best location to run a console command like
    that shown previously. Before we move on to the next section, a new code challenge,
    I want to list a very simple class with a static main method.


    ```

    01 public class SimpleExecutableClass {

    02     public int myField = 0;


    04     public static main(String[] args) {

    05         System.out.println("The SimpleExecutableClass has received " args.length
    + " arguments.");

    06     }

    07 }

    Listing 7-12

    A Basic Java Class with a Static Main Method

    ```


    An example of a simple executable class in Java.


    You can use this example as a template for any future executable classes you intend
    to write. For the most part, you should only have one class with a static main
    method in your project, but every now and then, you may have more than one. In
    that case, you can use the following command to specify which static main method
    you want to run:


    ```

    java -cp MemoryMatch.jar com.test.project.newExecClass

    ```


    If we were testing a new copy of the Memory Match game’s main executable, we’d
    have to run the following command:


    ```

    java -cp MemoryMatch.jar net.middlemind.MemoryMatch.MemoryMatch2

    ```


    In both cases, we’re specifying the class to use as the main executable by providing
    the full class path, package name and class name, as an argument to the -cp command.
    Think about how the class package factors in here and keep in mind how classes
    are organized in Java. It’ll come in handy when we review libraries in the next
    chapter. Next up, we’ll try another coding challenge and explore static main entry
    points, project settings, and resources while we’re at it.


    ## Challenge: Dungeon Trap’s Static Main


    In this challenge, the chapter’s third and last, we’ll take a look at the static
    main entry point for the Memory Match game. We’ll learn a bit more about how a
    project and its resources are configured, and we’ll create a project that has
    two static main entry points so we can get some experience running select executable
    classes. Let’s take a look at the challenge!


    Packages Involved:


    ```

    net.middlemind.MemoryMatch_Chapter7_Challenge3

    net.middlemind.MemoryMatch_Chapter7_Challenge3_Solved

    ```


    Description:


    Find the package, net.middlemind.MemoryMatch_Chapter7_Challenge3, and open the
    MemoryMatch.java file. Some of the graphic artists on the project wanted to try
    out a new set of assets with the Memory Match game but don’t want to create a
    big drain on the developer’s time. Your challenge is to create a copy of the MemoryMatch.java
    static main class and change the game engine configuration file it uses. Point
    it to this new file instead:


    ```

    engine_config_mmg_memory_match_test.xml

    ```


    This will connect the game to a new set of resources stored in the following directory:


    ```

    .\MemoryMatch\cfg\drawable\MemoryMatchTest

    ```


    You’ll need to change the project settings to use the new static main file, run
    the specific file directly when testing, or use the correct console command to
    run the new static main executable you just made.


    Clue:


    Recall from your very first coding challenge where you fixed a version of the
    Pong Clone game that was accidentally broken after testing. This challenge explored
    the connection between the Java game project and its resources. Essentially, each
    game project uses a configuration file that sets the name of the video game and
    determines which folder to look for game resources.


    By creating a new static main for the Memory Match game, you can specify a new
    game engine configuration file that will in turn specify a new set of resources
    to use for the game. Take your time to trace through any of the included video
    game projects to get a better idea of how they are configured.'
