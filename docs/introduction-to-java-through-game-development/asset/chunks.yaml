  raw: '### Arrays


    Up until this point, we’ve been working with variables that are used to keep track
    of one value, and we’ve mainly been using basic data types. A common occurrence
    in problem solving is the concept of sets of data. Any series of tests will give
    a series of scores. It becomes arduous to have to name and define a new variable
    to track each and every value in cases like this.


    Allow me to further this notion with another example, the results from a test
    given to a group of students in a classroom. In this case, we have two sets of
    data to track: the students and the test results. Now, using the knowledge we
    currently have about the Java programming language, we could add a new variable
    for each student and one for each student’s test results.


    This would be possible but would quickly become an untenable program to use and/or
    manage. You would have so many variables to keep track of that it would quickly
    become a self-defeating solution. Fear not, we have the array to rely on to streamline
    this type of data representation , namely, groups of similar data of a known size.


    An array is a special type of variable that contains other variables. It can be
    thought of as an object that holds a fixed number of values of a single data type.
    The length of an array is set when the array is created and remains fixed. You
    can manually resize an array by reinitializing it, but there is no automatic process
    for doing so. There are other data types to use in those circumstances. We’ll
    take a look at some of them soon.


    Let’s take a look at how to declare an array. In Listing [3-7](#537429_1_En_3_Chapter.xhtml#PC9),
    we’ll demonstrate the code necessary to declare an array of the basic data types
    we’ve just finished reviewing.


    ```

    01 boolean[] arrayOfBooleans;

    02 byte[] arrayOfBytes;

    03 short[] arrayOfShorts;

    04 int[] arrayOfInts;

    05 long[] arrayOfLongs;

    06 float[] arrayOfFloats;

    07 double[] arrayOfDoubles;

    08 char[] arrayOfChars;

    09 String[] arrayOfStrings;

    10 Object[] arrayOfObjects;

    Listing 3-7

    Array Declaration and the Basic Data Types + 1

    ```


    An example showing the code used to declare an array of the basic data types and
    one additional data type, the Object type.


    As you can see, it’s not much different from the variable declarations we’ve seen
    previously. Notice the use of the brackets, `[]`; these indicate that the variable
    is going to be an array of the type listed. The reason for this is because brackets
    are also used to reference a particular element in an array. In this way, they
    are sort of synonymous with arrays in the Java programming language, so using
    them to indicate that the declared variable is an array of a specified type is
    intuitive.


    You may have noticed that the last entry in the listing isn’t an array of a basic
    data type. This is an early introduction to an object. Java is an object-oriented
    programming language that supports the creation of custom objects by creating
    a class definition for that object. All of this is a bit much to discuss this
    early on. For now, think of the `Object` data type as the parent of all objects
    that are created in Java. In the next section, we will look at how you initialize
    and use arrays.


    ### Using Arrays


    Using arrays is a little bit more complicated than the basic data types we’ve
    worked with thus far, but there are strong similarities in how you use them, in
    fact, in how you use any variable in Java. In the previous section, we saw how
    you can declare an array. This is similar to the declaration of a variable of
    a basic data type with the exception that arrays are data structures.


    Previous variables we looked at were variables that stored a single value. Arrays,
    however, are designed to hold many values. But as you might expect, this requires
    some initialization. For instance, you may be asking how many values does an array
    hold? Good question. It’s your choice up to the maximum value of the integer data
    type or until you run out of memory, whichever comes first.


    In any case, you should create arrays with a size designed to work with the data
    that the array is intended to hold. If you’re creating a representation of the
    days of the week, then you could use an array of length seven. You get the idea.
    Let’s take a look at declaration and instantiation of different arrays of basic
    data types and the `Object` data type. Why not. Take a look at Listing [3-8](#537429_1_En_3_Chapter.xhtml#PC10)
    for the demonstration code.


    ```

    01 boolean[] arrayOfBooleans;

    02 arrayOfBooleans = new boolean[10];


    04 byte[] arrayOfBytes;

    05 arrayOfBytes = new byte[10];


    07 short[] arrayOfShorts;

    08 arrayOfShorts = new short[10];


    10 int[] arrayOfInts;

