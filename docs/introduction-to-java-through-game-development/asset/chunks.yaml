- fmt: 'The first few lines of code in Listing [5-9](#537429_1_En_5_Chapter.xhtml#PC9)
    are the same as the prior listing. The differences start on line 11. Notice that
    we’re calling the `Hashtable` class’ `keys()` method that returns a value that
    we can cast as an `ArrayList`. Because the hash table’s data type for its keys
    is a `String`, we need an `ArrayList` of `String`s to store the information.


    As we’ve seen before, angled brackets, `<>`, in the list declaration are used
    to specify its data type. Our list can hold the keys from the hash table, and
    in doing so, we can iterate over the keys and access each value stored in the
    hash table. Keep in mind we don’t have to have any knowledge of what’s inside
    the hash table; we can now, in a data-driven way, iterate through and see what
    value each key is mapped to.


    Notice in the example on line 13 that we specifically remove each entry from the
    hash table using this approach. With more advanced data structures, there’s usually
    a lot more to talk about, and hash tables are no exception. For our purposes here,
    you have a solid foundation to build on and a powerful new tool in our coding
    toolbox. In the next section, we’ll take a look at another data structure: the
    stack.


    ## Stacks


    Stacks are another fundamental data structure that is very useful in programming.
    It comes up frequently in different situations and in different algorithms. A
    stack is a bit more of an abstract data structure. It’s based on the concept that
    the last item pushed into the stack is the first item popped out of it.


    The reason why I would describe this data structure as abstract is that it can
    easily be implemented using some of the other data structures we’ve reviewed thus
    far. For instance, we could use an array or a list to implement a stack fairly
    easily. This is something to keep in mind when working with data structures because
    the way they are implemented can impact their performance in different ways.


    ***Game Programming Note:** Not all data structures are created equally. They
    each have different attributes regarding their performance during common operations
    like retrieval, search, sort, etc. Take the time to choose the best data structure
    for your use case.*


    In the next section, we’ll take a look at how to declare and initialize a stack
    in Java. We won’t get into the underlying implementation of the stack, but we’ll
    learn the basics of how to use one. Let’s take a look!


    ### Declaring Stacks


    Java, being a mature and complete programming language, has an implementation
    of a stack already for us to use: the `Stack` class. In Listing [5-10](#537429_1_En_5_Chapter.xhtml#PC10),
    we’ll take a look at how to declare and initialize one.


    ```

    1 //basic stack declaration using the default data type, Object

    2 Stack stck1;


    4 //stack declaration using the String data type

    5 Stack stck2;


    7 //stack declaration using the Object data type

    8 Stack stck3;

    Listing 5-10

    Stacks – Declaring Stacks

    ```


    An example of declaring a stack configured to hold different data types.


    Simple enough, declaring a stack looks a lot like working with the other data
    structures we’ve reviewed thus far. Let’s further the discussion with an example
    showing us how to instantiate a stack in different ways.


    ```

    01 //basic stack instantiation using the default data type, Object

    02 Stack stck1;

    03 stck1 = new Stack();


    05 //stack instantiation using the String data type

    06 Stack stck2 = new Stack();


    08 //stack instantiation using the Object data type

    09 Stack stck3;

    10 stck3 = new Stack();

    Listing 5-11

    Stacks – Instantiating Stacks

    ```


    An example of instantiating a stack configured to hold different data types.


    Declaring a stack is very similar to the other data structure declarations we’ve
    reviewed throughout the text. Take note of the use of angled brackets to customize
    the stack’s data type. A shortcut is to use only the brackets, `<>`, excluding
    the data type when instantiating the variable. It is enough in Java to specify
    the data type in the declaration of the variable carrying that through to the
    instantiation is not mandatory. An example of this can be seen in the previous
    listing on lines 9–10. Now that we know how to declare a `Stack`, let’s take a
    look at how we can use them.'
