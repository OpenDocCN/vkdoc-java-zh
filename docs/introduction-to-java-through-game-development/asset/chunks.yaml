  trans: '

    ## 关于格式的说明


    在深入阅读正文之前，我们还需要讨论一下文中使用的几种格式。首先是项目列表：


    *   项目 1


    *   项目 2


    *   项目 3


    大多数情况下，这些列表会直接嵌入正文中，不会附带任何特殊的标题或说明文字。在极少数情况下，如果列表具有某种特殊意义，它可能会像代码和图片一样，拥有自己的标题和说明文字。文中的代码片段将采用以下格式呈现，并带有标题和说明：


    ```

    1 int test = 0;

    代码清单 1-1

    代码列表示例 – SomeClass.java

    ```


    来自 SomeClass.java 文件的示例代码清单的说明文字。


    关于代码片段所展示内容的信息，可以在标题文字、说明文字或与代码片段相关的上下文中找到。代码片段中的行号是相对于代码起始行的，并非绝对行号。代码的起始行由正文的上下文、当前示例所处理的内容决定，并且始终从第
    1 行开始，除非代码被分割到多个代码清单中。图片的呈现方式与此类似，如下所示。


    ![](img/537429_1_En_1_Fig1_HTML.jpg)


    一个地牢陷阱 MMG 文件的用户界面，包含游戏教程、玩家游戏 1、玩家游戏 2 和退出游戏选项。


    图片 1-1


    截图 – 地牢陷阱主菜单


    地牢陷阱游戏主菜单的截图。


    最后，文中还会出现一些提示或旁注。正文中有两种类型的旁注：关于游戏开发的注释和关于 Java 编程语言的注释。这些条目的格式如下：


    ***游戏开发注释：关于 Java 游戏开发或游戏引擎使用的注释。*


    ***Java 编程注释：关于 Java 编程的详细注释。*


    这种列表类型将用于呈现与游戏开发或 Java 编程语言相关的主题的扩展或高级信息。


    ## 目标


    本书希望达成几个目标。首先是全面回顾并演示 Java 编程语言的基础特性。其次是介绍 Java 编程语言中精选的高级特性。最后，本书旨在让你通过使用 NetBeans
    IDE 和一组附带的视频游戏项目，获得直接处理游戏代码的经验。让我们更详细地看看这些目标。


    ### Java 基础主题


    本书涵盖的 Java 编程语言基础主题及其简要描述如下：


    *   概述：计算机编程：计算机编程的简要概述

    *   Java 编程语言：Java 编程语言的简史

    *   概述 `–` 游戏编程：游戏编程的简要概述

    *   基本数据类型：Java 中的基本数据类型

    *   高级数据类型：Java 中的高级自定义数据类型

    *   枚举：Java 中的枚举数据类型

    *   使用变量：处理变量

    *   数值表达式：处理数值表达式

    *   布尔表达式：处理布尔表达式

    *   If、Else、Else-If 语句：流程控制，if-else 语句

    *   Switch 语句：流程控制，Switch 语句

    *   使用数组：在 Java 中使用数组

    *   基本 For 循环：处理 for 循环

    *   While 循环：处理 while 循环

    *   导入类/库：使用 Java 类和库


    本书将为你打下坚实的基础，让你获得处理 Java 编程语言基础方面的经验。在下一节中，我们将介绍本书涉及的高级 Java 编程主题。


    ### Java 高级主题


    本书确实涉及了一些更高级的 Java 编程主题，但不会深入探讨非常高级的编程。你可能会发现这些主题更具挑战性，因为它们本质上更复杂。我们将为你提供扎实的信息和挑战，以帮助你掌握这些内容。本书涉及的高级主题如下：


    *   自定义数据类型：使用类和枚举

    *   Try-Catch 语句：使用 try-catch 语句控制流程

    *   数据结构列表：使用 List 数据结构的简单示例

    *   数据结构字典：使用 Dictionary 数据结构的简单示例

    *   泛型与特化数据结构：泛型与特化数据结构的简要介绍

    *   For-Each 循环：使用 for-each 循环

    *   概述 `–` 面向对象编程：面向对象编程设计与实现的简要介绍

    *   类：类的简要介绍

    *   字段：使用类字段

    *   方法：使用类方法

    *   构造器：使用类构造器

    *   静态成员：处理静态类成员

    *   类访问：关于类成员访问的讨论要点

    *   类设计：关于类设计与实现的讨论要点

    *   封装：Java 游戏项目中的封装示例

    *   多态：Java 游戏项目中使用多态的示例

    *   继承：继承的简要回顾

    *   项目结构：项目结构的简要回顾

    *   调试：使用调试追踪程序错误和问题。


    Java 编程高级主题通常会导致大量需要回顾和讨论的材料。这超出了本书的范围，因此我们将与高级编程主题相关的讨论和挑战保持简短，以便能够涵盖尽可能多的主题和材料。


    ### 游戏开发主题


    由于本书的入门性质，我们不会直接涵盖游戏开发主题，但书中的每个挑战都侧重于将你学到的 Java 编程语言知识应用于实际的视频游戏，因此你将获得一些关于以下游戏开发主题的知识和接触：


    *   项目结构：处理三个不同游戏及其类和项目结构的经验。

    *   游戏资源：处理游戏资源的经验。

    *   游戏引擎：本书附带了一个完整的游戏引擎，所有示例游戏都使用它。

    *   主游戏循环：处理并理解主游戏循环重要性的经验。


    至此，本节内容结束。我们快速概述了本书将涵盖的不同主题，这些主题既通过主题和挑战直接涉及，也通过处理更大更复杂项目的一部分间接涉及。在下一节中，我们将设置你的开发环境，并获取本书代码的最新副本。

    '
- fmt: '# Setting Up Your Environment


    In this section, we’ll get your development environment up and running so that
    you can take the included game projects for a little test run and see them in
    action. This will give you an idea of what the projects are all about. First off,
    we’ll need to get the IDE installed and set up. This text uses the NetBeans IDE
    for Java project management and development.


    First off, we need to install a copy of the Java Development Kit (JDK). You can
    download versions of the Oracle JDK from the [`www.oracle.com/java/technologies/downloads/`](http://www.oracle.com/java/technologies/downloads/)
    website. You may need an account to download certain versions of the development
    kit. If you already have a JDK installed, that’s fine; however, you should try
    installing and working with the version of the JDK that the included games were
    coded against.


    At the time of this writing, Java SE 18 is the latest version of the JDK. The
    included projects were written against Java SE 11 LTS. I recommend using Java
    SE 11 LTS when working with the included game projects, but you can try working
    with whatever Java version you like and fall back to Java SE 11 LTS if you run
    into any issues. You can find the Java 11 JDK here:


    [`www.oracle.com/java/technologies/downloads/#java11`](http://www.oracle.com/java/technologies/downloads/%2523java11)


    Let’s install the JDK first, then the NetBeans IDE. I’m working on a Windows computer,
    so I downloaded the JDK corresponding with my hardware. Double-click the JDK 11
    installer you just downloaded. The process should be very straightforward. If
    you run into any issues during the installation, use the following URL to troubleshoot
    the process.


    [`https://docs.oracle.com/en/java/javase/11/install/installation-jdk-microsoft-windows-platforms.html`](https://docs.oracle.com/en/java/javase/11/install/installation-jdk-microsoft-windows-platforms.html)


    Once the JDK is installed, we’re going to move on and setup the NetBeans IDE and
    the included game project. Navigate your favorite browser to the [`https://netbeans.apache.org`](https://netbeans.apache.org)
    website and download the latest LTS release. At the time of this writing, the
    NetBeans IDE download link is on the website’s main page. Click it, then locate
    the latest LTS version of the IDE for your computer’s OS. The process is depicted
    in Images [1-2](#537429_1_En_1_Chapter.xhtml#Fig2) to [1-5](#537429_1_En_1_Chapter.xhtml#Fig5).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig2_HTML.jpg)


    A user interface of an Apache NetBeans site opened in which an arrow has the download
    option and three major factors, such as fast editing, programming language, and
    cross platform, take place.


    Image 1-2


    Screenshot – NetBeans IDE Download 1


    A screenshot depicting the NetBeans IDE download link at the time of this writing.


    Locate the installation binary for your OS. I’m using a 64-bit Windows machine,
    so I’ll choose the appropriate installation binary as shown in the subsequent
    image.


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig3_HTML.jpg)


    A user interface of an Apache NetBeans site in which a red rectangular box has
    the Apache NetBeans 13 Windows 64-bit version download option and has community
    installers.


    Image 1-3


    Screenshot – NetBeans IDE Download 2


    Make sure to choose the installer that is right for your computer architecture
    and operating system.


    Open the NetBeans IDE installer you downloaded for your target development computer.
    You should see something similar to that shown in Image [1-4](#537429_1_En_1_Chapter.xhtml#Fig4).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig4_HTML.jpg)


    A user interface of an Apache NetBeans IDE installer window opened, which welcomes,
    customize, and a rectangular box has the next option, and the cancel option is
    at the bottom.


    Image 1-4


    Screenshot – NetBeans IDE Installation 1


    Apache NetBeans IDE 13 main installation screen.


    We’re going to be working exclusively with Java so we can accept the default installation
    options. Feel free to adjust settings as you see fit, but we recommend just following
    the default installation options. Before you hit the install button, make sure
    the “Check for updates” check box is checked (Image [1-5](#537429_1_En_1_Chapter.xhtml#Fig5)).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig5_HTML.jpg)


    A user interface of an Apache NetBeans IDE installer has a summary to install
    the application and highlights the install option in the rectangle box at the
    bottom.


    Image 1-5


    Screenshot – NetBeans IDE Installation 2


    Apache NetBeans IDE 13 installation process, about to install. Make sure to check
    for updates.


    When the installation completes, open up NetBeans and follow any software update
    prompts. In the next section, we’ll install and configure the book’s associated
    game projects.'
