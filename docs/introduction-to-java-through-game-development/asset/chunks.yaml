    2 System.out.println("Number of Players: " + gameMetaData.numberOfPlayers);

    //output

    1 Number of Players: 1

    Listing 7-4

    Example of Accessing a Public Field of a Basic Java Class

    ```


    When accessing public fields, you only need to specify the properly instantiated
    class instance, `gameMetaData` in this case, and use the dot operator, `.`, to
    specify the public field you want to access.


    **Game Programming Note:** Using simple classes with public fields is perfectly
    normal in a Java game implementation. Start worrying about controlling field access
    more when you need to know that a field’s value is changing. Then you can define
    methods to interact with the field and refactor your existing code if need be.


    As you can see, the public access modifier is very simple and offers unrestricted
    access to a class’ variable. In most cases, and if you’re not sure what access
    you really need, you can start off using the public access modifier. Look how
    easy it is to reference a value using a field of this type, line 2 in the code
    section of the previous listing. The last access modifier we have to discuss is
    the case where none is provided, the default access modifier. The default modifier
    allows access under the following conditions:


    - Any code within the enclosing class

    - Other classes in the same package as the enclosing class


    This is not too different than the protected access modifier except that it doesn’t
    allow access to subclasses, or classes that extend the current class unless they
    are in the same package. That brings us to the conclusion of the section on class
    fields. They are a powerful tool to add to your coding toolbox as you will now
    be able to create classes that not only support tracking certain data but can
    also control access to that data by using Java’s access modifiers. In the next
    section, we’ll take a look at another very important part of a class, its methods.


    ## Methods


    Methods are another type of class member, meaning they are always defined within
    the context of a class definition. Methods in Java are similar to functions in
    other programming languages, like C and C++. They are blocks of code that only
    run when called. They can receive parameters and can return a value.


    Up until now, I’ve avoided discussing the concept of scope as it’s a more advanced
    programming concept that has less to do with the nuances of the language itself
    than more to do with the structure of the language elements in any given case.
    Variables in Java have a scope. The scope of a variable is the block, or blocks
    of code, where that variable is valid and accessible.


    Fields in Java have a scope just like other variables do, and you can access them
    not only from outside the class, as we saw in Listing 7-4, but also inside the
    class in methods. This allows you to create reusable blocks of code that work
    with the class’ fields, and any parameters passed to the method, to generate a
    return value, if need be. Methods can in fact take no parameters and return no
    data. Let’s further this discussion with a few examples of different method declarations.
    We’ll keep working with the fictional `GameData` class we’ve used in the previous
    two listings. Let’s jump into some code!


    ```

    01 class GameData {

    02     public enum State {

    03         NONE,

    04         GAME_ON,

    05         GAME_OFF

    06     }


    08     State gameState = State.NONE;

    09     public int numberOfPlayers = 1;

    10     protected boolean gameOver = false;

    11     private String playerName = "AAA";


    13     State getGameState() {

    14         return this.gameState;

    15     }


    17     void setGameState(State newState) {

    18         this.gameState = newState;

    19     }


    21     public int getNumberOfPlayers() {

    22         return numberOfPlayers;

    23     }


    25     public void setNumberOfPlayers(int p) {

    26         numberOfPlayers = p;

    27     }


    29     protected boolean getGameOver() {

    30         return gameOver;

    31     }


    33     protected Boolean getGameOver2() {

    34         return gameOver;

    35     }


    37     public void setGameOver(boolean b) {

    38         gameOver = b;

    39     }


    41     public void setGameOver2(Boolean b) {

    42         gameOver = b;

    43     }


    45     public String getPlayerName() {

    46         return this.internalGetPlayerName();

    47     }


    49     public void setPlayerName(String pName) {

    50         this.internalSetPlayerName(pName);

    51     }


    53     private String internalGetPlayerName() {

    54         return this.playerName;

    55     }


    57     private void internalSetPlayerName(String pName) {

    58         this.playerName = pName;

    59     }

    60 }

    Listing 7-5

    Example of Different Class Method Declarations

    ```


    A complete listing of the fictional `GameData` class showing the `State` enumeration,
    fields, and class get/set methods.


    Take a close look at the listing and make sure to identify which access modifier
    is used where; we’ll go over the class and each method in detail now. As you can
    see from the class declaration, the default access modifier is used. This means
    that the class is package-private. On line 2, the `State` enumeration is public.
    Recall from our review of data types that an enumeration is a type of custom data
    type that is specialized for a list of unique values.


    In this case, we have a very simple implementation with only three values: `NONE`,
    `GAME_ON` and `GAME_OFF`. The class variables are declared on lines 8–11; note
    that they are assigned explicit default values. If none were explicitly expressed,
    Java will provide a language default. The first method for us to look at starts
    on line 13. It uses the default access modifier and takes no arguments. The naming
    convention used by the method indicates that it’s a “get” method.'
