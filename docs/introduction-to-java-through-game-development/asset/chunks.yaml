  raw: '### Challenge: Enumerations


    The second challenge for this chapter is a bit more complex than previous challenges,
    but don’t worry, you can use existing code as a template for all the changes required
    to solve this challenge.


    Packages Involved:


    ```

    net.middlemind.PongClone_Chapter4_Challenge2

    net.middlemind.PongClone_Chapter4_Challenge2_Solved

    ```


    Description:


    Find the package, net.middlemind.PongClone_Chapter4_Challenge2, and open the ScreenGame.java
    file. One of the lead programmers on the project wants to test making the countdown
    longer. Your challenge is to increase the countdown from three to five seconds.
    You’ll also update the images used for the countdown so that they don’t have the
    blue border. This will make our changes stand out a bit.


    In order to accomplish this challenge, you have to do a few things. I’ll list
    the general steps here.


    1.  Update the countdown enumeration to support numbers 4 and 5\. Use the existing
    enumeration entries as a basis for your change.


    2.  Update the class to include variables `number4` and `number5`. Use the existing
    variables – `number1`, `number2`, and `number3` – as a basis for your change.


    3.  Locate the `LoadResources` method in the `ScreenGame` class and find where
    the variables `number1`, `number2`, and `number3` are initialized. Add `number4`
    and `number5` to the variables initialized. Use the existing code as a basis for
    the new variables.


    4.  Change the files used to initialize the number 1–5 variables by adding a 2
    before the “.png”. For instance, the file name “num_1_lrg.png” becomes “num_1_lrg2.png.”


    5.  Locate the `DrawScreen` method and uncomment the new code that draws five
    numbers during the countdown and comment out the old code that only supported
    drawing three numbers.


    Once those steps are complete, you should be able to run the package’s PongClone.java
    class and play the game. You’ll notice a five-second countdown to start the game
    and in-between points. Also, none of the number images have a blue outline.


    Clue:


    The best clue to give you for this challenge is to look at the code that is already
    in place and use it as a template.


    In order to run the package’s specific version of the game, you have to click
    on the static main class contained in that package and select “Run File” from
    the context menu. Otherwise, the project’s default game will execute. If you’ve
    solved the challenge correctly, the game should run properly and display a five-second
    countdown with no blue borders around the numbers. Make sure to take your time
    with this challenge. It’s easy to make a mistake due to the similarity between
    variable names.


    ### Challenge: Solution


    The solution to this challenge requires you to make four changes to the ScreenGame.java
    file. The first change is to add the new entries in the state tracking enumeration
    for the countdown timer. There are already entries for numbers 1 through 3, so
    you just have to use the existing code as a template and add numbers 4 and 5.


    The second change you must make is to add new `MmgBmp` variables, `number4` and
    `number5`, to represent the 4th and the 5th second of the countdown. Again, in
    this case, you have code present for declaring variables numbers 1–3\. Use the
    existing code as a template and create variables for numbers 4 and 5. Similarly,
    find where these variables are initialized in the `LoadResources` method and add
    in the necessary code for numbers 4 and 5\.


    This step can seem somewhat daunting, but if you give yourself some space, just
    paste in a copy of one of the existing code initialization snippets and customize
    it for numbers 4 and 5, respectively. I’ll show an example of the snippet of code
    for initializing a number variable.


    ```

    01 //Load number three config

    02 key = "bmpNumberThree";

    03 if(classConfig.containsKey(key)) {

    04     file = classConfig.get(key).str;

    05 } else {

    06     file = "num_3_lrg2.png";

    07 }


    09 lval = MmgHelper.GetBasicCachedBmp(file);

    10 number3 = lval;

    11 if(number3 != null) {

    12     MmgHelper.CenterHorAndVert(number3);

    13     number3 = MmgHelper.ContainsKeyMmgBmpScaleAndPosition("numberThree", number3,
    classConfig, number3.GetPosition());

    14     number3.SetIsVisible(false);

    15     AddObj(number3);

    16 }

    Listing 4-23

    Example of the Initialization of a Number Variable

    ```


    An example demonstrating the initialization of a number variable.


    Remember, you also have to adjust the names of the image resources used to load
    numbers 1`–`3\. Use file names that end in "2.png". If everything goes to plan,
    then you should see clean numbers in the new five-second countdown timer.


    ![](images/537429_1_En_4_Chapter/537429_1_En_4_Fig1_HTML.jpg)


    A screenshot displays the following. Press B to exit. Goal colon first player
    to 7 points wins. 4\. Player 1 colon right paddle, use up-down keys to move the
    paddle.


    Image 4-1


    Screenshot of the Pong Clone Game with Five-Second Countdown Timer


    A screenshot showing the modified countdown timer in action. No blue outlines
    and a five-second countdown.


    That brings us to the end of the second challenge and the conclusion of the chapter.
    We’ll take a look at the material we’ve covered and wrap things up in the remaining
    sections.


    ## Conclusion


    That brings us to the end of this chapter on expressions, operators, flow control,
    and variables. We covered a decent amount of material and expanded our coding
    toolbox to include some very useful tools like If-Else and Switch statements.
    We’re going to continue our exploration of the Java language by introducing you
    to a few more very useful data structures in the next chapter. Before we say farewell
    to this chapter, let’s take a look at what we covered here.'
