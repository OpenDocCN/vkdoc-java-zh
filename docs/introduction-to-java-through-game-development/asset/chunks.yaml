- fmt: '# Java Programming Note


    Not all Java IDEs will use the same project structure. Take the time to get to
    know the structure of the projects that your Java IDE creates and have a clear
    understanding of where your packages and Java class files reside.


    Think about how you might use this access modifier in your own programs. What
    situations can you imagine where you want to limit access to package classes,
    etc.? There’s no right or wrong answer here, just food for thought. Moving on
    to the next variable on line 3, `numberOfPlayers`. This variable has a `public`
    access modifier and can be accessed from any other class.


    ```

