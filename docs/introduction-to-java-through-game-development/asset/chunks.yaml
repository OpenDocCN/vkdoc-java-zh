    One important thing that should stand out to you is the separation of the player1
    and player2 key event handler into two different If-Else statements. Why do you
    think that is? Well, if you think about how we converted an If-Else statement
    into a Switch statement, what would happen if both player1 and player2 inputs
    were handled by the same Switch statement?


    If you’re thinking that both players would not be able to process key presses
    at the same time due to the nature of a Switch statement only processing one `case`
    clause, you’d be right. The same thing would happen if we only used one If-Else
    statement. If we want both players’ input to function independently, we need to
    make the input handling code function independently by using two separate If-Else
    statements.


    ## More on Variables


    We covered a fair amount of material in this chapter so far, but I wanted to swing
    back around to the subject of variables and briefly discuss a few finer points
    to really round out our review of the subject. Now that we have experience working
    with different Java expressions and have explicitly covered Boolean expressions
    and If-Else statements, there are a few more things I want to cover on the subject
    of variables.


    I would like to briefly explore the topics of custom data types and data type
    casting, conversion with regard to variables in Java. First up, we’ll tackle custom
    data types with an introduction to Enumerations.


    ### Enumerations


    The Java programming language has the concept of an Enumeration. An Enumeration
    is a list of named constants. In Java, an Enumeration defines a class type. An
    Enumeration can have constructors, methods, and instance variables. It is created
    using the `enum` keyword. Each enumeration constant is public, static, and final
    by default.


    The information on class features like constructors, methods, and field access,
    public or static, will be explained in more detail when we cover Java classes.
    You’ll get some very basic exposure to classes in this chapter. For now, simply
    follow along and keep these concepts at the back of your mind. Don’t fret if you
    don’t quite understand them yet. Let’s look at a basic, but common, use of the
    `enum` keyword to create an enumeration.


    ```

    01 private enum State {

    02     NONE,

    03     SHOW_GAME,

    04     SHOW_COUNT_DOWN,

    05     SHOW_COUNT_DOWN_IN_GAME,

    06     SHOW_GAME_OVER,

    07     SHOW_GAME_EXIT

    08 };


    10 public State gameState = State.NONE;

    Listing 4-18

    Example of Basic Enumeration Use

    ```


    An example of basic enumeration use including variable declaration and initialization.


    Once you have an Enumeration declared and initialized, you can refer to its members
    using Java’s member operator, `.`, like so:


    ```

    if (gameState == State.SHOW_GAME) { ... }

    ```


    This makes using enumerations clean and intuitive. You could accomplish the same
    thing in another way. Let’s say you use a set of integers to do the job.


    ```

    int NONE = -1;

    int SHOW_GAME = 0;

    int SHOW_COUNT_DOWN = 1;

    int SHOW_COUNT_DOWN_IN_GAME = 2;

    int SHOW_GAME_OVER = 3;

    int SHOW_GAME_EXIT = 4;

    ```


    This implementation is not so bad. It’s intuitive and also clean. One issue though
    is that we have to explicitly define a unique value for the integers representing
    the different variables. Whereas prior, the enumeration took care of this for
    us. Let’s see what this approach looks like in practice.


    ```

    if (gameState == SHOW_GAME) { ... }

    ```


    The difference is subtle, but in the prior example, we lose the concept of “State”.
    This is slightly less important in the example because the variable we’re using
    is properly named, `gameState`. Still, without too much investigation, we can
    see the use of enumerations makes the code a little cleaner and a little more
    intuitive. Enumerations are a very powerful tool in the Java programming language.
    Keep them in mind when you’re coding up your next project.


    ### Very Basic Java Classes


    It’s clear that while enumerations have their use and can be easily customized
    creating a new data type for you to use in your programs, they also have their
    limitation. For one thing, the members have to be integers. That limitation alone
    will make us look elsewhere for other approaches to data type customization. Following
    along the same thread of discovery, we come to another way to create custom data
    types: the plain old Java class.


    ```

    1 public class GameData {

    2     public State gameState = State.NONE;

    3     public int numberOfPlayers = 1;

    4     public boolean gameOver = false;

    5     public String playerName = "AAA";

    6 }


    8 public GameData gameMetaData;

    9 gameMetaData = new GameData();

    Listing 4-19

    Example of a Basic Java Class

    ```


    An example of a custom data type defined through a Java class.


    The code in the previous listing should look somewhat similar to that of Listing
    [4-18](#537429_1_En_4_Chapter.xhtml#PC21). What we have here is a very simple
    Java class that is designed to hold a few different pieces of information. We
    have referred to these as variables before, but in this context, we shall call
    them class fields or more generally class members.


    Notice that we can now create variables of this data type as shown on lines 8–9.
    This is very similar to the way we used enumerations, but in this case, we are
    able to create classes that hold fields of different types including other classes
    and enumerations. This gives us a lot of power in the type of data we can model.
    Think about that for a moment.


    That brings us to the conclusion of this section. In the next section, we’ll focus
    more on variables of the basic data types and how they can be converted to/from
    other different basic data types.'
