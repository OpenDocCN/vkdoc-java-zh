- fmt: '## Boolean Expressions


    The second type of expressions we’ll discuss is the Boolean expressions. Boolean
    expressions, both simple and compound, are shown in the previous listing, Listing
    [4-1](#537429_1_En_4_Chapter.xhtml#PC1). These are mainly used in the initialization
    of Boolean variables and `If-Else` statements.


    Boolean expressions are an important part of just about every program as they
    are integral to the main flow control statement: the `If-Else` statement. We’ve
    seen a version of this before on line 71 with regard to the ternary operator that
    performs a function similar to an inline `If-Else` statement.


    ```

    01 //preparation

    02 ArrayList listIntegers;

    03 listIntegers = new ArrayList();

    04 listIntegers.add(10);


    06 //simple boolean expressions

    07 boolean b;

    08 b = i == 5;

    09 b = (j != d);

    10 b = (j  listIntegers.get(0);

    12 b = (j = d;


    15 //compound boolean expressions

    16 b = i + 1 == 5 + j;

    17 b = (j + listIntegers.get(0) != d);

    18 b = j  (listIntegers.get(0) * 2);

    20 b = (j = -d;

    Listing 4-3

    Examples of Boolean Expressions

    ```


    A set of simple and compound Boolean expressions.


    One more aspect of Boolean expressions I should mention is the concept of Boolean
    logic. It’s beyond the scope of this text to cover Boolean logic, but you should
    spend some time reading up on it as it will greatly improve your use of Boolean
    operators in `If-Else` statements.


    ## Assignment Expressions


    The Java programming language has a full set of assignment expressions that combine
    numeric operators and assignments into one convenient step. For instance, the
    long form of the assignment expressions you’ll see next is in Listing [4-4](#537429_1_En_4_Chapter.xhtml#PC4).


    ```

    1 i = 5;

    2 i = i + 5;

    3 i = i - 5;

    4 i = i / 5;

    5 i = i % 5; //modulo operator returns the remainder of integer division

    6 i = (i * 5);

    Listing 4-4

    Long-Form Equivalent of Assignment Expressions

    ```


    A set of example long-form equivalent assignment expressions.


    The short form of the previous expressions uses Java’s convenient assignment operators.


    ```

    1 i = 5;

    2 i += 5;

    3 i -= 5;

    4 i /= 5;

    5 i %= 5;

    6 i *= 5;

    Listing 4-5

    Examples of Assignment Expressions

    ```


    A set of example assignment expressions.


    It may seem like overkill to have this level of specificity in our assignment
    operators, but use them a few times and you’ll be hooked. In the next section,
    we’ll take a look at some convenience operators that make incrementing and decrementing
    a value more efficient.


    ## Increment/Decrement Expressions


    The Java language has some shortcuts when it comes to the common practice of incrementing
    or decrementing a value. This happens so frequently in programming that there
    is literally a special operator just for it. First, let’s take a look at the ways
    we can increment/decrement a variable using our current set of tools.


    ```

    i = i + 1;

    i += 1;

    i = i – 1;

    i -= 1;

    ```


    To make things just that much easier, you also now have the following options
    available to you for incrementing and decrementing a variable by 1:


    ```

    i++;

    i--;

    ```


    I should mention that you can also use the forms `++i` and `--i`, which are only
    different in the sense that the order of operations is different. In one case,
    you have increment then assign; in the other case, you have assign then increment.
    Let’s look at a subtle result of this distinction in Listing [4-6](#537429_1_En_4_Chapter.xhtml#PC8).


    ```

    //code

    01 int q; //declare


    03 q = 5; //init

    04 int q1 = q++;


    06 q = 5; //init

    07 int q2 = ++q;


    09 System.out.println("q++: " + q1);

    10 System.out.println("++q: " + q2);

    //output

    01 q++: 5

    02 ++q: 6

    Listing 4-6

    Examples of Assignment Expressions

    ```


    An example of the distinction between using `++q`, `--q` and `q++`, `q--`.


    Can you see the distinction in the example code in Listing [4-6](#537429_1_En_4_Chapter.xhtml#PC8)?
    In one case, the value is assigned, and then it is incremented, line 4, while
    in the second case, the value is incremented and then assigned, line 7. The resulting
    output shows the difference in the assigned value. That’s all I want to cover
    on this topic. In the next section, we’ll take a look at the bitwise operations
    that you can perform on integer-based variables.


    ## Bitwise Expressions


    Bitwise expressions aren’t used that often. In fact, you can probably program
    in Java for years without using them once. This is because they are rather low
    level and as such only come in handy when working with bytes and binary data.
    However, that’s not an excuse not to have some level of familiarity with them,
    so let’s take a look.


    ```

    01 //preparation

    02 int x, y, z;


    04 //simple bitwise expressions

    05 x = 5;

    06 y = 7;

    07 z = x | y; //bitwise OR, z = 7

    08 z = x & y; //bitwise AND, z = 5

    09 z = x ^ y; //bitwise XOR, z = 2

    10 z = ~x; //bitwise compliment, z = 10


    12 //compound bitwise expressions

    13 z = ++x | y--;

    14 z = x * y & y + 10;

    15 z = x ^ y / 256;

    16 z = ~(x * 2);

    Listing 4-7

    Examples of Bitwise Expressions

    ```


    An example of simple and compound bitwise expressions.


    To go over the bit-level operations is beyond the scope of this text. Take a moment
    to look up the Boolean operations AND, XOR, and OR and bitwise complement to learn
    more about them. Again, this is a somewhat erudite area of the Java programming
    language. It may be enough to have a passing familiarity with the material. In
    the next section, we’ll take a look at some of the other bit-level expressions
    Java supports.


    ## Bit-Shift Expressions


    The last main set of expressions we’ll discuss is also bit level; they are the
    bit-shift expressions. While you might think that these are useless to you as
    you will not be doing any binary programming, think again. Bit shifting is a very
    fast way to multiply or divide by 2.


    This happens to be an adjustment that is made very frequently in certain situations
    and is worth being aware of. If you find yourself multiplying or dividing by 2
    with any frequency, you might want to look into using a bit-shift operator. Let’s
    take a quick look at some bit-shift expressions.


    ```

    //code

    1 byte a = 64, g;

    2 i = a << 2;

    3 g = (byte)(a << 2);

    4 System.out.println("a: " + a);

    5 System.out.println("i and g: " + i + ", " + g);

    //output

    1 a: 64

    2 i and g: 256, 0

    Listing 4-8

    Example of Bit-Shift Expressions

    ```


    An example of a simple bit-shift expression with comparison between integer and
    byte variable assignment of the shifted value.


    Notice that in the previous listing, the original value 64 is now 256, which is
    64 * 4. What does that tell us about the nature of shifting a value left two positions?
    Well, it tells us that a two-position bit shift to the left is the same as multiplying
    by 4. Similarly, a one position bit shift to the left is the same as multiplying
    by 2 and so on. In the reverse, when bit shifting to the right, we are dividing.
    For example, starting with a value of 256 and performing a two-position bit shift
    to the right divides 256 by 4, resulting in a value of 64, the original value.


    The difference between the signed right shift, `>>`, and the unsigned right shift,
    `>>>`, is that with the signed shift, the bit values are pushed to the right and
    a new bit, with the same value as the number’s sign, is added on the left of the
    number. With an unsigned shift, the new bit always has a value of zero.


    Again, bit operations aren’t for everyone, and if you don’t need or want to use
    them, simply don’t. But you should be aware the functionality exists even if you’re
    not entirely comfortable using it. You can always look up some examples before
    you start coding. Next up we’ll summarize the language’s entire set of operators
    and sort them by precedence.'
