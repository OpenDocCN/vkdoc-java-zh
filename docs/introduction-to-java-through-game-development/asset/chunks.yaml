    ### 构造函数


    到目前为止，我们在文中使用的都是非常基础的类初始化方式。大多数情况下，我们看到了声明和初始化，或者实例化后直接设置类字段，或者使用类方法来完成。虽然这确实是一种直接且直观的配置类实例的方式，但有时会显得有些繁琐。想象一下，处理一个拥有
    10 个或 20 个字段且需要正确初始化的类会怎样？


    我们可以用已有的工具通过几种不同的方式来实现。一种方法是显式地将每个类字段设置为所需的值。另一种方法是调用某种初始化方法，就像我们在处理虚构的 `GameData`
    类时试验过的 `setAll` 方法那样。让我们进一步探讨这个想法。要求开发者调用一个特定的方法来正确初始化一个类，听起来也不算太糟糕。


    但话说回来，我们又到了将责任推给开发者的时候，而开发者可能已经有足够多的事情要操心了。相反，让我们把这个责任推给 Java，自己就不用操心了。让我们来看看
    Java 编程语言中一个我们一直在使用却未必真正了解的特性：类构造函数。我将提供一个示例来引出讨论。


    ```

    1 GameData gameData1 = new GameData();

    2 gameData1.setAll(State.NONE, 0, true, "");


    4 GameData gameData2 = new GameData(State.NONE, 0, true, "");

    清单 7-10

    使用类构造函数进行初始化的示例

    ```


    该清单演示了在实例化时使用自定义构造函数来初始化类，而不是使用 `setAll` 类方法。


    在上一个清单中，我们初始化虚构的 `GameData` 类的两种方式之间存在一个微妙但强大的区别。在第一种情况（第 1-2 行）中，我们要求开发者知道他们必须使用
    `setAll` 方法以及何时使用。在第二个示例（第 4 行）中，我们使用自定义构造函数为 `GameData` 类的这个实例 `gameData2` 设置所需的数据。这种方法的好处是更直观，并且需要关于如何配置类的特殊知识更少。作为开发者，你提供了一个构造函数，它将为开发者配置好类。让我们来看看如何为我们的类定义自定义构造函数。


    ```

    //类定义

    01 class SimpleClass1 {

    02     public int simpleField1;

    03 }


    05 class SimpleClass2 {

    06     public int simpleField1;

    07     public boolean simpleField2;


    09     public SimpleClass2() {

    10         simpleField1 = 0;

    11         simpleField2 = false;

    12     }


    14     public SimpleClass2(int i, boolean b) {

    15         simpleField1 = i;

    16         simpleField2 = b;

    17     }

    18 }

    //类使用

    01 //默认构造函数始终可用

    02 SimpleClass1 simp1 = new SimpleClass1();


    04 //显式声明的简单构造函数

    05 SimpleClass2 simp2 = new SimpleClass2();


    07 //使用自定义构造函数重新初始化

    08 simp2 = new SimpleClass2(1, true);

    清单 7-11

    使用默认构造函数与自定义类构造函数的示例

    ```


    演示了在类定义中使用默认构造函数和自定义构造函数。


    在清单 7-11 中，我们介绍了两个简单的类。第一个类只有一个字段，没有定义构造函数。当我们创建这个类的实例时（第 2 行），我们使用的是默认构造函数。当你没有显式声明构造函数时，Java
    会负责提供一个默认构造函数。如果我们确实定义了一个自定义构造函数会发生什么？看看第二个类定义，第 5 行的 `SimpleClass2`。请注意，这个类定义了两个构造函数。


    第一个构造函数是对默认构造函数的重新创建。如果我们决定定义一个自定义构造函数，就必须这样做，因为一旦定义了自定义构造函数，Java 将不再提供默认构造函数。使用默认构造函数可能导致类配置错误并产生错误，因此，为了支持它，在这种情况下，你必须自己显式地创建它。你可以在第
    9-12 行看到我们的实现，自定义构造函数在第 14-17 行。


    现在我们可以使用 `SimpleClass2` 的自定义构造函数，它允许我们为类的字段提供值，或者我们可以使用一个空的构造函数来模拟默认构造函数，如类使用部分的第
    5 行所示。请记住，你可以根据需要为你的类创建任意数量的自定义构造函数，但不要过度使用这个能力。否则，你最终会得到一些非常令人困惑、难以实例化的类。至此，本节内容结束。是时候进行一个编程挑战来巩固我们目前所学的知识了。


    ## 挑战：MmgBmp 类


    在这个编程挑战中，我们将运用新学到的 Java 类技能，并进一步了解本书附带游戏中的游戏引擎和图像绘制。因为它们都建立在相同的游戏引擎之上，你学到的任何关于它的知识都可以同样应用于所有附带的游戏。


    2D 游戏引擎的核心方面之一是在屏幕上绘制图像的能力。我们的游戏引擎使用 `MmgBmp` 类来处理这个任务。在这个挑战中，我们将进一步了解这个类，并观察它的实际应用。在完成挑战的过程中，请牢记我们在这里讨论的关于类定义和面向对象编程的所有方面。祝你好运！


    涉及的包：


    ```

    net.middlemind.MemoryMatch_Chapter7_Challenge1

    net.middlemind.MemoryMatch_Chapter7_Challenge1_Solved

    ```


    描述：


    找到包 `net.middlemind.MemoryMatch_Chapter7_Challenge1`，并打开 `ScreenGame.java` 文件。在这个挑战中，你不需要为别人解决任何问题；你将获得一些乐趣，为视频游戏添加一个图形，该图形显示在屏幕上的特定位置，并且仅在特定的游戏状态下显示。你可以提供自己的图像，也可以使用附带的图像之一。此游戏项目的图像存储在以下文件夹中：


    ```

    .\ MemoryMatch\cfg\drawable\MemoryMatch

    ```


    你可以使用自己的 png 或 jpg 图像。如果你提供自己的图像，图像大小应在 200×200 像素左右。只需将图像复制并粘贴到前面提到的目录中，并确保记住图像文件的名称。如果你没有自己的图像，只需从目录中挑选一个图像并记住它的名称。


    找到 `LoadResources` 文件夹，并找到一个代码示例，该示例演示了如何在某个初始化方法中将你自己的图像加载到 `MmgBmp` 类字段中。向类中添加一个名为
    `myImg` 的图像变量，并在 `LoadResources` 方法的底部附近对其进行初始化。你还需要使用 `SetPosition` 方法设置图像的位置，并将图像添加到类中的一个容器
    `MmgContainer` 中，以便正确配置显示。在完成这个挑战的过程中，你将了解 `MmgBmp` 类及其一些字段和方法。


    为了显示新图像，你必须为 `SHOW_GAME` 游戏状态在 `SetState` 方法中添加代码。查看该方法中的代码，特别是图像如何根据当前游戏状态显示和隐藏。将你的新图像添加到其中，并遵循现有代码设定的先例。最后，你需要进行清理。找到
    `UnloadResources` 方法，并通过将 `myImg` 类字段设置为 `null` 来确保清理你的资源。你必须运行此包的文件 `–` MemoryMatch.java；右键单击并选择“运行文件”来测试游戏。


    提示：


    如果遇到困难，请停下来，花点时间理清思路。查找一个现有的 `MmgBmp` 数据类型的类字段，并追踪它在此编程挑战中列出的方法中是如何使用的。你可以遵循相同的示例，只是在加载图像时使用你选择的文件名。

