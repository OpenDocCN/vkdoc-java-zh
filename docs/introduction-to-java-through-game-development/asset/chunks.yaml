    挑战解决方案

    这个挑战是文本中较为高级的挑战之一，但如果你仔细阅读了描述和线索，我认为其中有足够的信息供你完成。整个解决方案的关键在于你对 Java 继承的运用。目标是利用现有的武器类
    `MdtWeaponSpear.java` 来创建一个新版本的长矛。你需要对代码进行四处调整，包括创建新的火焰长矛 Java 武器类，以便将新武器作为玩家的默认武器添加到游戏中。现在让我们来详细了解一下这些调整。


    正如我们之前提到的，你需要做的第一项调整是重构复制 `MdtWeaponSpear.java` 类，并将其重命名为类似火焰长矛类的名称。我们选择将其命名为
    `MdtWeaponSpearFlame.java` 类。接下来，我们必须修改用于显示武器的图像资源，使其看起来更像火焰长矛，而不是普通长矛。图像资源已包含在游戏的资源文件夹中供你使用。


    找到它们，并使用图像文件的名称（包括扩展名）来更改新火焰长矛类所使用的图像资源。接着，我们需要让武器的表现有所不同，实现一次更强但更慢的攻击。为此，我们将攻击强度从
    1 点增加到 2 点，并通过将武器时间从 250 毫秒减少到 350 毫秒，使武器速度减慢 100 毫秒。


    最后，我们需要将火焰长矛设置为游戏中所有玩家的默认武器。要实现这一点，我们必须查看 `MdtCharInter.java` 类。这是游戏中所有角色的超类，因此其中包含设置默认武器的代码。按照现有代码的示例，将新武器添加到角色支持的武器列表中，然后将其设置为已装备的武器。如果你完成了所有适当的调整，最终应该会得到一个像图片
    8-1 中所示的红色长矛。


    ![](img/537429_1_En_8_Fig1_HTML.jpg)


    一个地牢陷阱游戏的用户界面。屏幕显示玩家 1 的生命值，顶部有一个弹出窗口，显示“按 B 退出”、“等级 0”以及所用时间 051。两个卡通角色正在互相射击。


    图片 8-1

    展示新火焰长矛运行效果的截图


    一张展示新火焰长矛在“地牢陷阱”游戏中运行效果的截图。


    至此，本章的这一部分就结束了。我们将在回顾高级类主题时继续讨论，接下来会探讨 Java 中的多态性。如果你无法让代码更改在此挑战中正常工作，请花点时间查看解决方案包中的代码。


    多态性


    多态性，在计算机编程语境之外定义，意为“多种形态”，它发生在通过继承相互关联的类之间。事实上，我们在本章前面已经见过一个例子，只是当时我们尚未意识到。现在，让我向你展示我们之前看过的同一个代码清单，即清单
    8-2，我们将从 Java 面向对象编程中多态性的角度来讨论它。


    ```

    //类声明

    01 public class BasicEncapClass {

    02     private int field1 = 0;


    04     public BasicEncapClass(int i) {

    05         this.field1 = i;

    06     }


    08     public int getField1() {

    09         return this.field1;

    10     }


    12     public void setField1(int i) {

    13         this.field1 = i;

    14     }

    15 }


    17 public class BasicSubClass extends BasicEncapClass {

    18     private int newField1 = 1;


    20     public BasicSubClass(int i) {

    21            super(i);

    22         this.newField1 = i;

    23     }


    25     @Override

    26     public int getField1() {

    27         return this.newField1;

    28     }


    30     @Override

    31     public void setField1(int i) {

    32         this.newField1 = i;

    33     }

    34 }

    清单 8-3

    使用 Java 类展示封装、继承和多态性的示例

    ```


    一个示例清单，与清单 8-2 相同，演示了基本的继承和多态性。注意封装是如何在超类定义中发挥作用的。


    什么？我们看的是同一个类清单，但用它来回顾一个不同的主题。这是怎么回事？嗯，我使用同一个清单是有原因的。我希望你注意到封装、继承和多态性这些概念是相辅相成、紧密相连的。没有一个封装良好的类，继承就会变得不那么有用，甚至近乎混乱，需要依赖类字段和访问修饰符来控制使用。


    良好的封装带来良好的继承，而这又引出了多态性。花点时间看看第 26 行和第 31 行中两个被重写的方法 `getField1` 和 `setField1`。`BasicEncapClass`
    中存在同名的方法，但现在在 `BasicSubClass` 类中被重新定义了。这就是多态性的一个例子，因为方法名称保持不变，但其含义和用法可以改变。


    这个主题可能有点令人困惑，在某些方面似乎有些循环论证，所以让我们换个角度来审视一下。与其使用无意义的虚构类，不如尝试用我们更熟悉的类和概念来演示这些编程特性：鱼。让我们来看一些代码！


    ```

    //类声明

    01 class Fish {

    02     private int avgLen;

    03     private int avgWeight;

    04     private String color;


    06     public Fish() {

    07     }


    09     public int getAvgLen() {

    10         return this.avgLen;

    11     }


    13     public void setAvgLen(int i) {

    14         this.avgLen = i;

    15     }


    17     public int getAvgWeight() {

    18         return this.avgWeight;

    19     }


    21     public void setAvgWeight(int i) {

    22         this.avgWeight = i;

    23     }


    25     public String getColor() {

    26         return this.color;

    27     }


    29     public void setColor(String s) {

    30         this.color = s;

    31     }


    33     public String getName() {

    34         return "Fish";

    35     }


    37     public String getFoodSource() {

    38         return "Worms";

    39     }


    41     @Override

    42     public String toString() {

    43         return "This fish, " + this.getName() + ", eats ''" + this.getFoodSource()
    + "''.";

    44     }

    45 }


    47 class Trout extends Fish {

    48     public Trout() {

    49         super.setAvgLen(25);

    50         super.setAvgWeight(8);

    51         super.setColor("Brown");

    52     }


    54     @Override

    55     public String getName() {

    56         return "Trout";

    57     }


    59     @Override

    60     public String getFoodSource() {

    61         return "Worms and insects";

    62     }

    63 }


    65 class RainbowTrout extends Trout {

    66     public RainbowTrout() {

    67         super.setAvgLen(30);

    68         super.setAvgWeight(10);

    69         super.setColor("Rainbow");

    70     }


    72     @Override

    73     public String getName() {

    74         return "Rainbow Trout";

    75     }

    76 }

    //代码

    01 Fish fish = new Fish();

    02 System.out.println("fish - toString: " + fish);

    03 System.out.println("");


    05 Trout trout = new Trout();

    06 System.out.println("trout - toString: " + trout);

    07 fish = trout;

    08 System.out.println("fish = trout - toString: " + fish);

    09 System.out.println("");


    11 RainbowTrout rbTrout = new RainbowTrout();

    12 System.out.println("rbTrout - toString: " + rbTrout);

    13 trout = (Trout)rbTrout;

    14 System.out.println("trout = rbTrout - toString: " + trout);

    15 fish = (Fish)trout;

    16 System.out.println("fish = trout - toString: " + fish);

    17 fish = (Fish)rbTrout;

    18 System.out.println("fish = rbTrout - toString: " + fish);

    //输出

    01 //fish

    02 fish - toString: This fish, Fish, eats ''Worms''.


    04 //trout

    05 trout - toString: This fish, Trout, eats ''Worms and insects''.

    06 fish = trout - toString: This fish, Trout, eats ''Worms and insects''.

