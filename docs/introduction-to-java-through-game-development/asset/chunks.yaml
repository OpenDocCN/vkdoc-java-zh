  trans: '

    ### 程序/编程的类型


    你可以编写许多不同类型的计算机程序。有些是非常底层的，用汇编语言或系统编程语言（如 C、Rust 或 Go）编写。有些是支持面向对象编程（OOP）设计的高级编程语言，如
    C++、Java 或 Python。


    此外，还有一些专为特定程序设计的语言，例如用于 Web 编程的 JavaScript，或用于统计计算的 R。不同的编程语言就像不同的工具一样，各有其独特的属性。有些语言是编译型语言，而有些则是解释型语言。编译型语言通常会产生一个包含原始程序二进制表示形式的可执行文件。


    其他语言则是解释型编程语言。解释型编程语言也会被编译，但并非编译成机器码。相反，解释型编程语言会被编译成一种中间形式，这种形式能被编程语言的解释器所理解。解释器是一个特殊的程序，它会运行中间代码，并随后执行该程序。


    编程语言有很多重要的方面，但我们只触及其中最重要的部分。Java 编程语言的主要属性是：它是一种强类型、支持 OOP 的解释型编程语言。当我们介绍 Java
    中的变量时，会详细说明 Java 是强类型语言的含义。目前，简单理解其含义就足够了。


    Java 会跟踪并关注程序中任何给定变量的数据类型，并且不允许你将不同类型的数据存储到变量中。有些语言，如 JavaScript，采用动态类型。这意味着在
    JavaScript 中，你可以将任何数据类型存储到任何变量中，而无需重新声明。在后续的编程语言回顾中，会有更多相关内容。


    就像任何工具一样，不同的编程语言有不同的最佳用途。Java 编程语言适用于许多不同的领域，从应用程序到 Web 服务器，甚至游戏。不过，公平地说，Java
    通常不是构建游戏的首选语言。这主要是因为该语言的解释特性会带来一些微小的开销，这是游戏开发者不喜欢的。然而，绝大多数游戏并不会在意这点微小开销，反而可能会受益于使用
    Java 所带来的有序性和简洁性。


    尽管如此，Java 仍然是一种可靠的编程语言，其解释特性和对垃圾回收的内置支持使其成为学习编程，特别是学习游戏编程的绝佳选择。视频游戏的设计与大多数其他程序不同。游戏编程要求你构建一个能实时响应用户输入的程序，同时还要处理游戏的所有视频、音频、碰撞检测、敌方
    AI 等，以维持游戏的沉浸感。并且在此过程中不能丢失任何帧，保持动画流畅。


    由于游戏具有特定且有时极为苛刻的要求，游戏编程与其他类型的软件开发截然不同。话虽如此，Java 是一门很棒的语言，通过开发视频游戏来学习 Java 也是一个很棒的方法！本节内容到此结束。在下一节中，我们将快速回顾历史，聊聊
    Java 编程语言的发展历程。


    ## Java 编程语言


    Java 诞生于 1991 年的 Sun Microsystems 公司，当时由 James Gosling、Mike Sheridan 和 Patrick
    Naughton 组成的 Sun 工程师团队试图创建一种独立于处理器、能轻松在小型电子设备上运行的新编程语言。这是 Java 历史中一个重要的被忽视的方面，或许也是
    Java 成为 Android 项目基础部分的原因。


    该团队创建了一种具有类似 C++ 语法的编程语言，它可以在小型数字遥控器上运行，并控制按钮和屏幕等电子元件。这个名为“Green Project”的项目旨在探索数字控制的家用电子设备与计算机之间的融合，但最终失败了。然而，在
    Java 语言即将被历史遗忘之前，它找到了一个潜在的新应用领域——万维网。


    1993 年，HTTP 协议和最早的浏览器之一 Mosaic 登上了技术舞台。在此期间，Java 团队意识到互联网非常适合 Java 编程语言与硬件无关的特性。1995
    年，James Gosling 发布了一款名为 WebRunner 的浏览器，它支持 HTML 内容和嵌入式 Java 小程序。


    这巩固了 Java 的流行地位，随着早期互联网的兴起，Java 也随之蓬勃发展。在 Flash 出现之前很久，在线创建交互式体验的唯一真正方法就是使用 Java
    小程序。事实上，当我刚上大学时，使用 AWT 的 Java 小程序是计算机科学课程中最早教授的内容之一。


    如今，大多数浏览器已不再支持小程序功能。但 Java 已渗透到现代云技术的许多其他方面，既包括使用 Java EE/Jakarta 的服务器端，也包括基于
    Java 编程语言开源克隆版的 Android 客户端。


    Java 能够“一次编写，到处运行”的能力近乎神奇。Java 是如何在所有这些不同的设备和地方运行的呢？答案在于 Java 运行时环境（JRE）和 Java
    虚拟机（JVM）。


    ### JRE


    JRE，更具体地说是 Java 虚拟机，负责实际执行编译 Java 源代码后生成的 Java 字节码。请记住，Java 是一种解释型语言，这意味着编译后的
    Java 程序并非可由给定 CPU 直接运行的二进制形式。相反，一个虚拟 CPU（即虚拟机）会运行字节码并驱动底层硬件。


    关于 JRE 的定义，可以在亚马逊云服务（AWS）网站上找到。其内容如下：


    > *Java 运行时环境（JRE）是 Java 程序正确运行所需的软件。Java 是一种为许多当前 Web 和移动应用程序提供动力的计算机语言。JRE 是连接
    Java 程序和操作系统的底层技术。它充当翻译和促进者的角色，提供所有资源，以便一旦你编写了 Java 软件，它就可以在任何安装了 JRE 的操作系统上运行，无需进一步修改。*

    >

    > `—`摘自亚马逊云服务网站


    我认为这个定义非常简洁准确。最后一句是神奇之处所在。一旦“你编写了 Java 软件，它就可以在任何安装了 JRE 的操作系统上运行，无需进一步修改”；依我拙见，这极其强大，也是
    Java 编程语言的第二大卖点。


    请注意，Java 不仅包含一种编程语言和库，它还包含/需要一个运行时环境来执行 Java 字节码。这与之前使用 C 和 C++ 等语言的开发环境截然不同，在那些环境中，必须非常小心地确保语言、其数据类型和核心库在不同计算机硬件上表现一致。


    现在，有了 JRE 的强大功能，你可以利用它在任何操作系统上运行 Java 程序，包括不同的硬件架构（如 ARM），只要该操作系统有对应的 JRE。在下一节中，我们将介绍
    Java 编程语言的第二个最重要的部分——JDK。

    '
- fmt: '### The JDK


    The Java Development Kit (`JDK`) is a fundamental aspect of developing software
    with the Java programming language. The `JDK` is a collection of software tools
    that you need to develop Java applications. You can download the `JDK` and start
    writing Java programs with just a text editor. In fact, we already installed the
    `JDK`, Java 11 SE LTS, and an IDE, NetBeans, so we’re ready to start coding.


    Now that we’ve covered the main aspects of Java software development in more detail,
    let’s take a very high-level view of the syntax and semantics of Java programming.
    You can expect to get a fair amount of experience working with syntactically correct
    Java code through the completion of the challenges throughout the text.


    ## Syntax and Semantics


    What is the correct syntax? In the world of software development, syntax is the
    set of rules that defines the combinations of symbols that are considered to be
    correctly structured statements or expressions in that language^([³](#fn3)). Sounds
    simple enough. We deal with syntax a lot in our everyday lives. Language and grammar
    all have a syntax. This is often the analogy that is used to explain the syntax
    of programming languages.


    Did I use the correct semantics? Well… maybe? Semantics with regard to programming
    languages becomes a bit of a complicated topic. Let’s explore the idea of semantics
    a little further. If syntax refers to the grammar of a language, then semantics
    refers to meaning expressed by the syntactically correct statements in that language.


    In human languages, this roughly translates to you saying something that makes
    sense. Of course, you could obey all the rules of grammar and still not say anything
    coherent or sensical. The same can be said for computer languages. But in this
    case, the concept of semantics becomes slightly fuzzy as there are certainly many
    ways to express one solution correctly. Just as there are many ways to convey
    the same meaning in human languages.


    While you will have to learn and master syntax first in your Java programming
    language development, you can’t compile a program with a syntax error. You can,
    and will, write programs that are semantically incorrect. Over time you will develop
    the skill necessary to define the problem you are trying to solve in a correctly
    structured Java program. Think of it as learning the idiomatic expressions of
    a new human language you have mastered the grammar, syntax, of. It will take you
    some time to express yourself fluently in that language.


    The same applies to programming languages. You have to learn the correct way to
    structure programs and approach problems, and that’s a skill that you’ll develop
    and refine over time. For now, let’s take a look at the core syntax rules of the
    Java programming language.


    ### Basic Syntax Rules


    In this section, we’ll briefly review the Java programming language’s basic syntax
    rules. We’ll focus on the fundamentals of the language. The following points are
    important to keep in mind when writing Java code^([⁴](#fn4)):


    *   Case Sensitivity: Java is case sensitive, which means the identifiers `Hello`
    and `hello` would have different meanings in a Java program.


    *   Class Names: For all class names, the first letter should be uppercase. If
    several words are used to form a name of the class, each inner word’s first letter
    should be uppercase, referred to as upper camel-case, that is, `SomeClassName`.


    *   Method Names: All method names should start with a lowercase letter. If several
    words are used to form the name of the method, then each inner word''s first letter
    should be uppercase, camel-case, that is, `someMethodName`.


    *   Program File Name: The name of the program file should exactly match the class
    name. In fact, the Java compiler will complain if there isn’t a public class that
    matches the current Java file’s name.


    *   Classes^([⁵](#fn5)): Each class should be in a separate file with a `.java`
    extension. Class files are usually grouped into folders. These folders are called
    packages.


    *   Programs: The beginning of Java program processing always starts in the main
    method: `public static void main(String[] args)`. A static main method is a required
    part of any Java program but not necessarily for a Java library.


    *   Blocks and Statements: In Java syntax, there are delimiters `{...}` that denote
    a block of code and a new area of code. Each code statement must end with a semicolon.


    *   Keywords/Reserved Words: These are special words that cannot be used by the
    software developer to name symbols like classes, methods, variables, etc.


    Syntax is something you’ll learn with experience. The IDE will go a long way to
    detecting any syntax errors before you even hit the compile button. One other
    thing we want to touch upon before we move on is the set of reserved words in
    the Java programming language. This is listed as the last point in the summarized
    list of basic syntax rules.


    ### Keywords/Reserved Words


    As with any programming language, Java has a set of words used explicitly by Java
    itself, and as such, you aren’t allowed to use them to create symbols, classes,
    methods, variables, etc., in your programs. The keywords of the Java programming
    language are shown in Listing [2-4](#537429_1_En_2_Chapter.xhtml#PC4). There are
    two reserved words that aren’t currently in use by Java but are, however, restricted
    from use in the same way as keywords.


    ```

    abstract    continue    for          new          switch

    assert      default     goto*        package      synchronized

    boolean     do          if           private      this

    break       double      implements   protected    throw

    byte        else        import       public       throws

    case        enum        instanceof   return       transient

    catch       extends     int          short        try

    char        final       interface    static       void

    class       finally     long         strictfp     volatile

    const*      float       native       super        while

    Listing 2-4

    The Java Programming Language Keywords/Reserved Words6

    ```


    Words adorned with an Asterix, `*`, indicate reserved words.


    You aren’t expected to memorize these words right now. You’ll get to know them
    as you gain experience with the language. The main takeaway here is that there
    are reserved words that you can’t use, as is, in your program as symbols, classes,
    methods, variables, etc.


    That brings us to the end of this section. Before we wrap up the chapter, I want
    to talk a little bit about game programming. We’ll be working with three different
    games to learn about Java programming, so we should have a little background on
    game programming in general as well as the games we’ll be working with.'
