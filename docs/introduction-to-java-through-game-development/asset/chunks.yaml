    The game uses AI enemy logic when playing in single-player mode. This is the simplest
    of the three games and includes only five Java classes.


    2.  Memory Match: A simple solitaire-style memory game that also supports two-player
    mode to share in the memory matching fun. The game supports three modes of increasing
    difficulty using more memory cards. This is the second most complex game in the
    set.


    3.  Dungeon Trap: A unique mini game where players are stuck in a dungeon room
    that is flooded with waves of enemies. Fight to stay alive and collect different
    power-ups to stay in the fight. You can even throw the furniture across the room
    to send enemies flying. This is the most complex of the three games and includes
    a number of Java classes. Despite the complexity, it follows the same basic structure
    as the other games, and the extra code logic is mainly used in the Java classes
    that actually run the game.


    That brings us to the conclusion of this section and the end of this chapter.
    I hope the game descriptions piqued your curiosity just a bit if the actual games
    did not. Let’s wrap up the chapter with a summary of the main topics that we’ve
    covered before moving on to our first chapter on the Java programming language.


    ## Conclusion


    In this chapter, we took a look at what it means to program computers and more
    specifically what it means to program using the Java programming language. We
    got to look at some high-level aspects of the language and focused on some key
    features of the types of programs we’re going to be working with. Let’s summarize
    the material we covered.'
  trans: '

    ## 游戏编程


    如果不花点时间谈谈游戏编程，那将是我的失职。毕竟，在探索 Java 编程语言的过程中，我们将在挑战中使用三款不同的游戏。正如我之前提到的，电子游戏是一种相当独特且具有挑战性的程序类型。它们通常需要实时响应、智能的电脑对手、复杂的输入、视频、音乐、音效以及多人/网络支持。这就要求电子游戏开发者掌握必要的
    API，以便完成计算机几乎能做的所有事情。


    别担心，游戏引擎可以帮助你卸下大部分重担。本书中包含的游戏实际上整合了一个紧凑的 2D 游戏引擎。每个游戏都是一个独立的项目，包含完整的引擎源代码，全部运行在一个小小的
    Java 程序中。你将在旨在展示对 Java 编程语言特性理解的挑战中，获得编程游戏的经验。


    虽然我们不会在这本入门教材中尝试从头构建一个游戏，但你将获得一些扎实的游戏编程经验。此外，你还能获得使用游戏引擎应用程序编程接口（API）的经验，并可以利用这些知识编写自己的游戏。


    关于游戏编程，一个重要的入门信息是主游戏循环。主游戏循环是游戏和游戏引擎的一个共同属性；它是一种几乎出现在每个游戏中的特殊结构。它是游戏编程的基础，因此，我们将在下一节中更详细地讨论主游戏循环。稍后，我们还会在本书中再次遇到这个主题，并且会讨论得更深入。


    ### 主游戏循环


    主游戏循环是一种常见结构，几乎出现在每一款电子游戏中。使电子游戏具有交互性和动态性的代码在主游戏循环中运行，但被划分为不同的主要职责。循环本身是一个受控的无限循环，使游戏能够实时运行；它是游戏中所有对象被更新并随后绘制到屏幕上的地方^(⁷)。


    游戏循环的基本职责可以分解为以下步骤：初始化、更新和绘制。初始化步骤可能发生在游戏生命周期的不同时刻，但必须在某个时刻发生。更新步骤是所有游戏逻辑运行的地方。在这里，代码处理诸如碰撞检测、命中、音效、敌方
    AI 等事务。最后，既然游戏状态已经更新，就该将新的游戏状态绘制到屏幕上了。这就是绘制步骤的用武之地。同时请记住，根据具体游戏的不同，网络功能也可以添加到更新步骤中。


    在联网多人游戏的情况下，主游戏循环将包含与网络对象的同步。这就是主游戏循环的结构，在进行游戏编程时，你应该牢记这一点。在下一节中，我们将讨论所包含游戏项目的一般结构。这将有助于我们开始浏览不同项目的类。


    ### 程序结构


    本书附带的三款游戏（地牢陷阱、记忆匹配和乒乓克隆）都使用相同的游戏引擎。即 Java 版本的 MmgGameApi 2D 游戏引擎。整个引擎存在于附带的 `MmgGameApiJava.jar`
    文件中。总的来说，项目的复杂度递增如下：


    *   乒乓克隆：简单

    *   记忆匹配：中等

    *   地牢陷阱：专家级


    每个项目都包含以下 Java 类的自定义版本以及专有的支持类：


    *   静态主类：与游戏本身同名。每个包，包括每个挑战包，都有一个用于执行该版本游戏的静态主类。

    *   `MainFrame.java`：`GamePanel` 类的父类，代表容纳游戏面板的主窗口框架。

    *   `GamePanel.java`：负责绘制、处理输入、切换屏幕等更多功能的主类。

    *   `ScreenGame.java`：运行游戏的屏幕类。

    *   `ScreenMainMenu.java`：运行游戏菜单屏幕的屏幕类。


    游戏类有点复杂，所以暂时不要尝试自行编辑它们。到本书结束时，你应该能够很好地处理它们，但在此之前我们还有不少内容要学习。在接下来的部分中，我们将更详细地描述本书附带的游戏。


    ### 附带游戏概览


    尽管你在第一章中已经有机会查看实际游戏，但让我们还是简要描述一下每款游戏。


    1.  **乒乓克隆**：一款简单的双人版“乒乓”电子游戏克隆。玩家使用不同的控制方式上下移动球拍，以使球保持在场内。在单人模式下，游戏使用 AI 敌方逻辑。这是三款游戏中最简单的一款，仅包含五个
    Java 类。


    2.  **记忆匹配**：一款简单的纸牌式记忆游戏，也支持双人模式，共享记忆匹配的乐趣。游戏支持三种模式，难度递增，使用更多的记忆卡。这是该系列中第二复杂的游戏。


    3.  **地牢陷阱**：一款独特的迷你游戏，玩家被困在一个充满一波波敌人的地牢房间中。为了生存而战，并收集不同的强化道具以继续战斗。你甚至可以把家具扔到房间对面，把敌人击飞。这是三款游戏中最复杂的一款，包含许多
    Java 类。尽管复杂，但它遵循与其他游戏相同的基本结构，额外的代码逻辑主要用于实际运行游戏的 Java 类中。


    至此，我们结束了本节以及本章的内容。如果实际游戏没有引起你的兴趣，我希望这些游戏描述能稍微激发你的好奇心。在进入关于 Java 编程语言的第一章之前，让我们总结一下本章涵盖的主要主题，以此结束本章。


    ## 结论


    在本章中，我们探讨了计算机编程的含义，更具体地说，是使用 Java 编程语言进行编程的含义。我们了解了该语言的一些高级方面，并重点关注了我们将要处理的程序类型的一些关键特性。让我们总结一下所涵盖的内容。

    '
