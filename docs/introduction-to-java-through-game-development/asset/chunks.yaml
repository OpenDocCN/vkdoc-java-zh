- fmt: "![](images/978-1-4842-8951-8_CoverFigure.jpg)\n\nISBN 978-1-4842-8950-1 e-ISBN\
    \ 978-1-4842-8951-8 [https://doi.org/10.1007/978-1-4842-8951-8](https://doi.org/10.1007/978-1-4842-8951-8)\
    \ © Victor G. Brusca 2023 Standard Apress Trademarked names, logos, and images\
