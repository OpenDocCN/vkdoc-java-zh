    ## Using Lists


    The first thing we’ll look at in this section is how to get and set elements in
    a list, specifically Java’s `ArrayList` object. Let’s look at the same code we
    used in the section on using arrays except we’ll adjust the code to work specifically
    for `ArrayList`s. Let’s take a look at Listing [3-18](#537429_1_En_3_Chapter.xhtml#PC35).


    ```

    1 ArrayList bools = new ArrayList();

    2 bools.add(Boolean.FALSE);

    3 bools.add(Boolean.TRUE);


    5 //flip the values

    6 Boolean b = bools.get(0);

    7 bools.set(0, bools.get(1));

    8 bools.set(1, b);

    Listing 3-18

    ArrayList Element Access – Get and Set

    ```


    Code snippet showing an `ArrayList` having two elements flipped demonstrating
    how to get and set values.


    Notice that the code is very similar, except that we use explicit methods, `get`
    and `set`, to interact with the list elements instead of array index notation,
    `[]`. Also take a moment to note how we use the object version of the `boolean`
    basic data type. Because lists require objects for elements, we are forced to
    use the Java objects that “box” their corresponding basic data types.


    Converting between basic data types and their corresponding object equivalents
    is referred to as boxing and unboxing. More on this to come. Let’s take a look
    at some important methods of the `ArrayList` class in Listing [3-19](#537429_1_En_3_Chapter.xhtml#PC36).


    ```

    //code

    1 ArrayList bools = new ArrayList();

    2 bools.add(Boolean.FALSE);

    3 bools.add(Boolean.TRUE);


    5 System.out.println("ArrayList Size: " + bools.size());

    6 System.out.println("ArrayList IsEmpty: " + bools.isEmpty());

    //output

    1 ArrayList Size: 2

    2 ArrayList IsEmpty: false

    Listing 3-19

    ArrayList – Important Methods

    ```


    Code snippet showing some important `ArrayList` methods in use.


    Another useful action to perform with `ArrayList`s is to copy them. The code is
    a bit different than with arrays:


    ```

    ArrayList newBools = new ArrayList(bools);

    ```


    Using the array, `bools`, from the previous listing, we can create a copy of it
    by initializing a new `ArrayList` and using the previous one as an argument. You
    could also manually copy the `ArrayList` elements as shown in Listing [3-20](#537429_1_En_3_Chapter.xhtml#PC38).


    ```

    //code

    01 ArrayList bools = new ArrayList();

    02 bools.add(Boolean.FALSE);

    03 bools.add(Boolean.TRUE);


    05 System.out.println("Bools ArrayList Size: " + bools.size());

    06 System.out.println("Bools ArrayList IsEmpty: " + bools.isEmpty());


    08 ArrayList newBools = new ArrayList(bools);

    09 System.out.println("NewBools ArrayList Size: " + newBools.size());

    10 System.out.println("NewBools ArrayList IsEmpty: " + newBools.isEmpty());

    //output

    Bools ArrayList Size: 2

    Bools ArrayList IsEmpty: false

    NewBools ArrayList Size: 2

    NewBools ArrayList IsEmpty: false

    Listing 3-20

    ArrayList – Copy List Using Initialization

    ```


    An example of how to copy an `ArrayList` using initialization.


    There’s more than one way to copy an `ArrayList`. Listing [3-21](#537429_1_En_3_Chapter.xhtml#PC39)
    demonstrates copying one using an explicit approach.


    ```

    //code

    01 ArrayList bools = new ArrayList();

    02 bools.add(Boolean.FALSE);

    03 bools.add(Boolean.TRUE);


    05 System.out.println("Bools ArrayList Size: " + bools.size());

    06 System.out.println("Bools ArrayList IsEmpty: " + bools.isEmpty());


    08 ArrayList newBools = new ArrayList();

    09 for(int i = 0; i < newBools.size(); i++) {

    10    if(i < bools.size()) {

    11        newBools.add(bools.get(i));

    12    }

    13 }


    15 System.out.println("NewBools ArrayList Size: " + newBools.size());

    16 System.out.println("NewBools ArrayList IsEmpty: " + newBools.isEmpty());

    //output

    01 Bools ArrayList Size: 2

    02 Bools ArrayList IsEmpty: false

    03 NewBools ArrayList Size: 2

    04 NewBools ArrayList IsEmpty: false

    Listing 3-21

    ArrayList – Copy List Using Explicit Add

    ```


    An example of how to copy an `ArrayList` using explicit add.'
