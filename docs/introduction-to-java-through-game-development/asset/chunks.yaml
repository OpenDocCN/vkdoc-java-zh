- fmt: '# Challenge: Polymorphism


    The second coding challenge for this chapter will test your ability to leverage
    Java’s polymorphic capabilities to change how the flame spear you implemented
    in the previous challenge functions in the game. This is the third challenge in
    the text that starts off from the solution to the previous challenge. As such,
    it’s vitally important that you have the correct solution to the previous challenge
    before proceeding. Take a moment to double-check and make sure. As always, enjoy
    the challenge!


    ## Packages Involved


    ```

    net.middlemind.DungeonTrap_Chapter8_Challenge2

    net.middlemind.DungeonTrap_Chapter8_Challenge2_Solved

    ```


    ## Description


    Find the package, `net.middlemind.DungeonTrap_Chapter8_Challenge2`, and open the
    `MdtWeaponSpearFlame.java` file. This challenge is another of the more complicated
    challenges, and as such, you’ll need to look at code in the following Java classes:


    * `MdtWeaponSpearFlame.java`

    * `MdtWeapon.java`

    * `ScreenGame.java`

    * `MdtWeaponAxe.java`


    Some of the developers like the new spear but think it’s too similar to the original
    spear. They want to test out making the spear shoot out, like a throwing weapon,
    instead. In order to implement this change, you’ll need to make a few adjustments
    to the code. There’s a weapon that exists as a throwing weapon, the `MdtWeaponAxe.java`
    class. There are a few methods that we need to use from this class to make our
    weapon throwable. First, you’ll need to copy and paste the following methods from
    the `MdtWeaponAxe.java` file to the `MdtWeaponSpearFlame.java` file:


    * `GetX()`

    * `SetX(int i)`

    * `GetY()`

    * `SetY(int i)`

    * `SetPosition(MmgVector2 v)`

    * `SetPosition(int x, int y)`


    This will allow the new flame spear to handle setting its X, Y coordinate or position
    in the same way the axe, a throwable weapon, does. Next, we’ll need to adjust
    the super-class of all weapons, the `MdtWeapon.java` class, to support the new
    throwable spear. Find the following methods in this class:


    * `GetWeaponRect()`

    * `MmgDraw(MmgPen p)`


    There are special branches of code to handle a throwing axe; expand the two `if`
    statements to support throwable spears as well. A similar change must be made
    to the `ScreenGame.java` class’ `ProcessAClick` method. Find the two places in
    the method where you have to alter an `if` statement to include throwable spears,
    not just axes. Making these adjustments will make the new spear fly out and rotate,
    if implemented properly. You must run this package’s file – `DungeonTrap.java`;
    right-click and select Run File to test the game.


    **Clue:** This is a tough challenge, and there’s not much in the way of a clue
    to guide you if you run into trouble. Carefully read through the classes and methods
    provided in the description. Keep an eye out for the different behavior of the
    axe in the code and keep in mind you’re making a throwing spear, so it will function
    the same way as the axe.


    ## Challenge Solution


    The solution to this challenge, as we mentioned earlier, requires the correct
    solution to this chapter’s first challenge on inheritance. If you ran into trouble
    but want to keep moving forward, you can use the solution to challenge 1 in Chapter
    [7](#537429_1_En_7_Chapter.xhtml) as the starting point for this challenge by
    copying and pasting in the marked code changes. This solution requires you to
    make five changes to the game’s code in order to successfully solve the challenge.


    This solution requires making changes in five different places. Let me list the
    locations of the adjustments and the order we’ve assigned them. You could have
    done things in a different way, and that’s just fine.


    * `MdtWeaponSpearFlame.java` and `MdtWeaponAxe.java`: In this case, we need to
    copy the methods that override positioning functionality, allowing the weapon
    to move independently of the wielder.

    * `MdtWeapon.java`: An adjustment is necessary in the `GetWeaponRect` method.

    * `MdtWeapon.java`: An adjustment is necessary in `MmgDraw` method.

    * `ScreenGame.java`: An adjustment is necessary in the `ProcessAClick` when firing
    the weapon.


    Let’s review the adjustment made in sequence and in some details. The first change
    that we need to make uses polymorphism to override the functionality of the super-class
    positioning methods. The adjustment we’re making here allows the weapon to now
    move independently of the player holding it. We can get away with reusing the
    code from the `MdtWeaponAxe` class because it is also throwable. Next, we move
    on to the `MdtWeapon.java` class and take a look at the `GetWeaponRect` method.
    This method is used to calculate the rectangle that describes where the weapon
    should be drawn on the screen. For stabbing weapons that aren’t thrown, the method
    calculates the rectangle based on how far into the stab animation the weapon is.
    For thrown weapons, the axe and now the flame spear, we return the rectangle that
    describes where the projectile is on the screen and what direction it’s facing.
    The `if` statements need to be adjusted to include the `SPEAR` weapon type. You
    have all the tools you need in your coding toolbox to get it done. A similar change
    needs to be made to the `MmgDraw` method to include the spear when drawing thrown
    weapons.


    Notice that this class, `MdtWeapon`, is the super-class of the `MdtWeaponAxe`,
    `MdtWeaponSpear`, and `MdtWeaponSpearFlame` classes. That’s why changing the code
    here affects all extended classes. The centralization gives us leverage but also
    increases complexity as we have to support different weapons, throwing and stabbing,
    at this level. The last change we need to make is to support adding a new copy
    of the weapon to the game’s drawable objects. This is accomplished in the `ScreenGame`
    class’ `ProcessAClick` method. When the player fires the weapon, a clone of it
    is added to the game. Because of all the changes we’ve made, this clone can fly
    off on its own and rotate while doing so until it collides with something.


    Those are the changes we needed to make to solve this coding challenge. Not an
    easy task by any means and it definitely took a few tools from our coding toolbox
    to do it. Don’t worry if you didn’t get it; as long as you learn by reviewing
    the solution, you’re doing a great job. In the next section, we’ll wrap up our
    review of classes by talking about how to share them and include them in our programs.


    ## Importing Class Libraries


    Now that you have a good understanding of Java classes and OOP concepts like encapsulation,
    inheritance, and polymorphism, you need to develop a good understanding of how
    to package up your code and use it in other programs. To do this, you’ll need
    to build a Java project and get the resulting JAR file. In most cases, these types
    of projects do not contain a static `main` method and only contain Java classes.


    This is commonly referred to as a library. You can share your libraries by sharing
    your project’s JAR file. To add a library to a project in the NetBeans IDE, right-click
    on a project and select “Properties” from the context menu. In the properties
    popup, select the “Libraries” option from the left-hand categories section. When
    using a local JAR file, we’ll add a new entry to the “classpath” section. Click
    the “+” button and select “Add JAR/Folder” from the available options. A screenshot
    of this process is shown in Image [8-2](#537429_1_En_8_Chapter.xhtml#Fig2).


    ![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig2_HTML.jpg)


    A dialogue box of the user interface of project properties includes major components
    such as sources, libraries, build, run, application, header, formatting, and hints.


    **Image 8-2** Screenshot of a Project’s Libraries Settings in the NetBeans IDE


    A screenshot showing the “Libraries” section of the project’s properties popup.'
