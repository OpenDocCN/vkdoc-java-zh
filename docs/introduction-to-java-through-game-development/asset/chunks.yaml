    The main game loop is just what it sounds like; it’s the main loop running the
    key processes of a video game. Just about every video game has one so I’d be remiss
    in my duty if we didn’t talk about it a bit. There are a few different versions
    of the main game loop; let me list them here. Let me prefix this topic by saying
    that the discussion gets a bit advanced. It’s more important for me to review
    this information accurately than to try to simplify it. This is a section you
    should come back to from time to time.


    *   Implicit Frame Rate: I know it sounds surprising but why bother adding the
    extra assembly code to control the frame rate when the hardware is capped at a
    25MHz clock frequency? Am I right? In this case, the FPS is set by the limits
    of the hardware itself.


    *   Explicit Frame Rate: In this version of the main game loop, you keep track
    of how much time it took to complete the current frame’s work. If there is time
    left over from the allotted time per frame, then the game waits until this time
    passes. By waiting, the frame rate is kept near the target FPS instead of increasing
    to the hardware-supported maximum FPS.


    *   Frame Rate Independent: With this version of the main game loop, you don’t
    enforce a frame rate at all; it is FPS independent, but you still maintain control
    over the speed at which the game runs. Instead of an implicit or explicit frame
    rate, pixels per frame, you look at things in the context of time, pixels per
    second. To do so, you have to calculate a time delta for the current frame, which
    I’ll show you how to do in just a bit. More on this soon.


    We can’t really talk about main game loops without talking about frames and frame
    rates. A frame, in a video game, is one iteration of the game loop. The main responsibilities
    of the main game loop are as follows:


    *   Update: Poll hardware for the state of input, update the enemy AI, update
    the enemy positions, etc. This step in the game loop is where we process the game
    logic and give it life.


    *   Draw: Sometimes referred to as “render,” the draw step is where all the calculations
    necessary to represent the game on the screen are performed.


    The actual code used to power the game engine’s main game loop, used by all the
    associated game projects, is as follows. We won’t review it in depth here, but
    can you spot where the update and draw work are performed? Here’s a hint: look
    for those words in the code listing and you’ll find the associated method calls.


    ```

    01 if (PAUSE == true || EXIT == true) {

    02     //do nothing

    03 } else {

    04     UpdateGame();

    05 }


    07 //update graphics

    08 bg = GetBuffer();

    09 g = backgroundGraphics;


    11 if (currentScreen == null || currentScreen.IsPaused() == true || currentScreen.IsReady()
    == false) {

    12     //do nothing

    13 } else {

    14     //clear background

    15     g.setColor(Color.DARK_GRAY);

    16     g.fillRect(0, 0, winWidth, winHeight);


