  trans: '

    ## 挑战解决方案


    本解决方案要求你在 `ScreenGame.java` 类中的五个位置添加代码，并可能为项目添加一张新图片。这是迄今为止最复杂的解决方案，它要求你理解所涉及的类字段和方法。更重要的是，它能让你获得更多使用
    `MmgBmp` 类的经验。你需要添加新代码的位置如下：


    1.  类头部：需要在当前类字段列表的底部，为类添加一个数据类型为 `MmgBmp` 的新类字段 `myImg`。


    2.  LoadResources：需要在 `LoadResources` 方法底部附近添加一个新的代码块。此代码应基于该方法中现有的图片加载代码，但应进行调整以加载你选择的图片并将其存储在
    `myImg` 字段中。


    3.  定位与容器：你必须使用 `SetPosition` 方法为图片设置位置，并且必须将图片添加到类中的某个 `MmgContainer` 字段中。你可以尝试不同的容器，看看它如何影响图片的可见性。


    4.  SetState：在此方法中，你需要进行两处调整。一处是在方法开头清理 `SHOW_GAME` 状态时。第二处更改在方法靠下的位置，它要求你在切换到
    `SHOW_GAME` 状态时使你的图片可见。


    5.  UnloadResources：你需要做的最后一项更改是通过在此方法中将 `myImg` 字段设置为 `null` 来进行清理。


    虽然更改列表看起来令人生畏，但实际上非常可行，并且有很多示例代码可以作为你进行代码更改的基础。此编码挑战的最终结果应该是，在你选择的游戏内屏幕上显示一张可见的图片。这里有很大的解释空间，所以尽情享受吧！


    ## 挑战：ScreenGame 类


    为了使用游戏引擎制作你自己的游戏，你需要了解如何加载图片资源；这部分我们已经涵盖了；你还需要了解如何让图片动起来以及如何响应用户输入；为此，我们将在本次编码挑战中处理
    `ScreenGame` 类。


    在这个挑战中，我们将基于上一个挑战的工作进行构建。这是我们第二次将上一个挑战的解决方案作为本次挑战的代码基础。请确保你已成功完成上一个挑战，并在需要时仔细检查解决方案。你已经向游戏屏幕添加了一张新图片，现在我们要为它连接一些控制功能。让我们来看看这个挑战！


    涉及的包：


    ```

    net.middlemind.MemoryMatch_Chapter7_Challenge2

    net.middlemind.MemoryMatch_Chapter7_Challenge2_Solved

    ```


    描述：


    找到 `net.middlemind.MemoryMatch_Chapter7_Challenge2` 包，并打开 `ScreenGame.java` 文件。我们将继续沿着相同的路线，实现我们自己的代码来试验动画效果，即根据用户输入移动图片。选择四个游戏未使用的不同键盘按键。其中两个按键将用于切换新图片的可见性。另外两个将用于向左和向右移动图片。


    为了处理用户输入，你需要在以下方法中检查你的目标按键：


    *   `ProcessKeyPress`


    *   `ProcessKeyRelease`


    你需要自行决定使用 `MmgBmp` 类的 `GetPosition`、`SetPosition` 方法来控制图片的位置。你还需要使用 `GetIsVisible`、`SetIsVisible`
    方法来控制图片的可见性。根据你在之前挑战中使用该类的经验，你应该熟悉键盘方法和 `MmgBmp` 类的方法。


    提示：


    你可以依赖 `ProcessKeyPress` 和 `ProcessKeyRelease` 方法中的现有代码，来弄清楚如何为你选择的四个键盘按键提供输入支持。你可以通过研究
    `MmgBmp` 类方法在 `ScreenGame` 类其他部分的使用情况，来弄清楚如何使用它们。执行文本搜索以了解如何使用该类的方法。如果需要，你可以添加更多的类字段来帮助管理图片的移动和定位。


    ## 挑战解决方案


    此编码挑战的一个简单解决方案只需要你对键盘输入处理程序：`ProcessKeyPress` 和 `ProcessKeyRelease` 方法进行调整。如果按下了向左移动的目标键，则将图片的
    X 坐标减一。如果按下了向右移动的目标键，则将 X 坐标加一。使用 if 语句检查，如果你愿意，可以确保图片不会移出可视范围。确保在释放按键时关闭移动。


    这应该能解决编码挑战的第一部分。下一部分要求我们根据按下的目标键，使图片可见或不可见。在这种情况下，我们检查按键何时被释放，并响应地调用图片的 `SetIsVisible`
    方法，传入一个布尔值来显示或隐藏图片。在下一节中，我们将开始讨论一些关于 Java 类的高级主题。


    ## 高级类主题


    类是我们编码工具箱中极其强大且重要的新工具。我们现在可以创建各种类，用于我们的游戏和其他 Java 程序中。我想谈谈面向对象编程的几个高层次、高级的方面。在接下来的几节中，我们将讨论访问权限、类设计以及静态
    main 入口点。


    ### 访问权限


    这里的访问权限指的是你用来定义类的访问修饰符。在我看来，在设计软件时使用 `public` 或默认修饰符是可以的。随着你的软件日趋成熟，将类的某些方面设置为
    `protected` 或 `private` 的需求会变得更加明显。


    你总是可以通过在类设计中使用更合适的访问修饰符来重构代码并收紧设计。在下一节中，当我们讨论类设计的一些要点时，我们将进一步探讨这个概念。


    ### 类设计


    类设计指的是你构建的类的结构。你使用哪些类字段，定义哪些方法等等。通常，你应该保持类设计简单。根据需要或预期来增加复杂性。例如，如果你在处理类时经常使用相同的几行代码，你可能希望将其移入一个类方法中。


    同样，不要在你设计的类中过度支持功能。例如，如果你以类方法的形式添加新功能，你应该问自己，这段代码是否属于给定的类，是你的类负责它，还是另一个类负责。结果可能是需要一个新类来处理你期望的功能。

