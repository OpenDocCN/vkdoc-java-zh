- fmt: '# Frame Rate Calculation and Game Loop Control


    The total time it took to process the frame is calculated on line 9. The core
    value is incremented by 1 to prevent the inconvenient value of 0. To determine
    the actual frames per second of the current frame, line 10, we divide 1000ms by
    the frame time. The `timeFrameDiff` variable stores the difference between the
    allotted time for each frame and the actual time. If that value is greater than
    zero, then we have some extra time on our hands.


    To kill some time, we sleep the current thread for the extra time, line 15. The
    last calculation is to determine the real frame rate, after the time sink. The
    actual frame rate is based on letting the game run as fast as possible, while
    the real frame rate measures the rate the game is trying to maintain. Lastly,
    on line 24, the frame rate values are updated for the current program. You can
    see these values every time you run an associated game project. From the example
    main game loop in the previous listing, you can see that this approach tries to
    control the game’s performance by controlling the amount of work done each frame
    in milliseconds. By controlling the number of frames run each second we control
    the speed of the game.


    This is the “pixels per frame” approach I mentioned earlier. What happens if we
    let go of the idea of trying to control the frame rate of the game. Well, you’d
    say that would be a bad idea as the game will run differently on different hardware.
    Let’s come up with a calculation that tells us, given no limit on the loop’s execution
    time, what percentage of a second passed between the current frame time and the
    last frame time. Let me demonstrate with some code.


    ```

    1 float deltaTime = (frameStart - lastFrameStart) / 1000.0f;

    Listing 6-15

    Calculating the Delta Time Between Frames

    ```


    An example of calculating the delta time of the current frame. This small factor
    has to be applied to all update metrics to synchronize them to the same timing.


    The delta time or change in time is the difference between the start of this frame
    and the moment before work started on the last frame. Essentially, we’re capturing
    the time it took to complete an update and dividing it by 1000ms or 1 second.
    That gives us a small factor that represents a tiny slice of a second. Think about
    this. We’re not controlling frames here. The game can run as fast as it wants.
    That will result in a very small `deltaTime`. The calculation is simple enough,
    but looking at it out of context isn’t doing wonders for us. Let’s take a look
    at a full implementation.


    ```

    1 while (RunFrameRate.RUNNING == true) {

    2     frameStart = System.currentTimeMillis();


    4     float deltaTime = (frameStart - lastFrameStart) / 1000.0f;

    5     lastFrameStart = System.currentTimeMillis();


    7     Update(deltaTime);

    8     Draw(deltaTime);

    9 }

    Listing 6-16

    Example of a Frame Rate Independent Main Game Loop

    ```


    An example implementation of a frame rate independent main game loop. Using this
    approach requires the consistent use of the `deltaTime` factor to synchronize
    timing and movement.


    **Game Programming Note:** It’s probably not a good idea to declare a variable
    in your main game loop if you really don’t have to. We left this declaration in
    the listing to enforce the fact that the `deltaTime`, `float`, variable is a real
    number.


    Notice that in the full version of the frame rate independent main game loop,
    we can see where the timing values are set in relation to the work done on update.
    In this case, we’ve included both the update and the draw methods in the timing
    calculation. That should result in the value of


    ```

    (frameStart - lastFrameStart)

    ```


    being a small number, just a few milliseconds. Dividing a small number by 1000.0ms
    results in an even smaller number, and this is the delta time value that we now
    have to apply to all movement, animation, and timing values for the current frame.
    Basically, anything that changes a certain amount each second now changes only
    the amount associated with a small portion of a second.


    What we’ve done is change the way the main game loop runs so that we’re making
    small adjustments each game frame in response to the time it took to process the
    previous frame. This requires making all our update logic time based and not frame
    based. Let’s see what the difference might look like.


    ```

    //frame based

    int targetFPS = 60;

    int movementPerSecond = 600; //600 pixels

    int movementPerFrame = movementPerSecond/targetFPS;

    enemy1.moveXY(movementPerFrame);

    //time based

    movementPerFrame = (int)(movementPerSecond * deltaTime);

    enemy2.moveXY(movementPerFrame);

    Listing 6-17

    Example of Frame- and Time-Based Object Movement

    ```


    An example demonstrating frame-based and time-based movement calculations. Note
    the use of the `deltaTime` factor.


    That brings us to the conclusion of our discussion on main game loops. I hope
    you found it interesting and a good application of our `while` loop knowledge.
    In the next section, we’ll wrap up our review of loops in the Java programming
    language with the lesser used, but still important, `do-while` loop.


    ## Do-While Loops


    The last loop for us to review in the Java programming language is a bit peculiar.
    The `do-while` loop is not used as often as its `for` and `while` loop counterparts
    because it has a certain attribute, which makes it very useful in only a narrow
    band of circumstances. The `do-while` loop will always execute at least once.
    This loop is very similar to the `while` loop you just reviewed, so we’ll cover
    it quickly.


    ### Basic Do-While Loop


    The syntax of the basic `do-while` loop is demonstrated in Listing 6-18.


    ```

    //basic do-while loop

    do {

    //work to do each frame

    } while (RunFrameRate.RUNNING == true);

    Listing 6-18

    Example of a Do-While Main Game Loop

    ```


    An example of a `do-while` loop–based main game loop. This will get you kicked
    out of some places.


    Although I would actually never use one, I do intend for my game to run at least
    once, so maybe it’s not so crazy to use a `do-while` loop as your main game loop.
    Nope, it’s crazy; stick to the `while` loop. There’s really nothing more to it.
    Just keep in mind that this loop will execute once before the condition is checked.
    Otherwise, you can think of it exactly like you would a `while` loop.


    ## Break and Continue


    We can’t talk about looping without talking about the `break` and `continue` statements.
    These are loop control statements that allow you to explicitly exit a loop or
    jump to the next iteration of the loop if the condition allows for one. It’s much
    easier to demonstrate this than to describe it, so let’s motivate this discussion
    with a code sample.


    ```

    01 //basic while loop with loop control

    02 while (RunFrameRate.RUNNING == true) {

    03     if (PAUSE == true) {

    04         continue;

    05     } else {

    06         UpdateGame();

    07         DrawGame();

    08     }


    10     if(EXIT == true) {

    11         break;

    12     }

    13 }

    Listing 6-19

    Example of Using Break and Continue for Loop Control

    ```


    An example of a `while` loop with loop control using the `break` and `continue`
    statement.


    As you can see from the example, we can use the `break` and `continue` statements
    to control how the `while` loop behaves. In this case, we’re skipping to the next
    iteration of the loop if the `PAUSE` Boolean is set to `true`. The `continue`
    statement does this for us. Similarly, the `break` statement is used to exit the
    loop in the case that the `EXIT` Boolean is set to `true`.


    We could have accomplished the same behavior with some variables and a slightly
    different structure of the loop’s body. The benefit here is how quick and intuitive
    it is to control your loop using these statements. Keep these in mind when you
    need to skip a loop iteration or to escape one. Don’t abuse them; just like anything
    else, use them in moderation.'
