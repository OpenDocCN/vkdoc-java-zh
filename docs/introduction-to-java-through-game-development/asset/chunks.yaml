    **Listing 9-2** Example of Try-Catch Statements Catching Different Exceptions


    An example demonstrating the use of different Try-Catch statements designed to
    catch different exceptions.


    Looking at exception examples #1 and #2, on lines 1–15, we have two seemingly
    identical Try-Catch statements. Can you spot the difference between the two? If
    you thought that the exceptions being caught are different, then you thought right.
    The first example uses the `Exception` class; this is the super-class of all other
    Java exceptions. Catching an exception of this type doesn’t give us any information
    about what went wrong.


    The following Try-Catch statement, exception #2, is similar, but it is designed
    to catch a `NumberFormatException`, which is a more specific exception class.
    This version of the Try-Catch statement is more intuitive because you can clearly
    see what type of error the code is designed to handle. In general, I agree with
    this approach. Sometimes, however, I go against the grain and implement the more
    general Try-Catch statement. Why?


    Well, there are many cases you’ll encounter when writing Java programs and games
    of different sorts where you really don’t care what the error was. All you really
    care about was that there was an error at all. This is perfectly fine if you don’t
    derive value from using more specific exception classes. Just keep in mind that
    best practices recommend that we do.


    The last two examples in the code snippet, exceptions #3 and #4, present a new
    version of the Try-Catch statement. One that is able to catch multiple types of
    exceptions. Direct your attention to line 23; notice that the catch clause of
    the Try-Catch statement is designed to catch both a `NullPointerException` and
    a `NumberFormatException`. Juxtapose this with the last exception example where
    only the super-class, `Exception`, is caught.


    In this case, we have a lot less information about the code in the Try-Catch look.
    We don’t know what exceptions it might throw. Note that the code must be adjusted
    to throw each type of exception since whichever exception that is encountered
    first will exit the Try clause.


    This comes back to the same point of form vs. function. If knowing the type of
    exception is beneficial to you and it makes your code more intuitive and reusable,
    then use that approach. If you are simply concerned with knowing when something
    failed and not why, then don’t use more specific exceptions in your Try-Catch
    statements. In the next section, we’ll talk a little bit about how to define our
    own exceptions to use in our Java programs.


    ## Defining Exceptions


    Exceptions, like everything else in Java, are based on classes. As I’ve alluded
    to previously, all exceptions in the Java programming language are subclasses
    of the `Exception` super-class. As such, you can define your own exceptions to
    use in your code. Let’s take a look at an example.


    ```java

    1 public class MyException extends Exception {

    2     public MyException(String errorMessage) {

    3         super(errorMessage);

    4     }

    5 }

    ```


    **Listing 9-3** Example of Defining a Custom Exception Class


    An example demonstrating the creation of a custom exception class.


    As you can see from the previous listing, we’ve used inheritance, a powerful OOP
    tool in our coding toolbox, to create a new exception class based on the main
    one. Now that we’ve designed a custom exception, we can use it in specific places
    where we see fit. Let’s motivate the discussion with another example employing
    the exception class we just created: `MyException`.


    ```java

    //code

    1 public void ProcessImage(MmgBmp image) throws MyException {

    2      if(image.GetWidth() < 10 || image.GetHeight() < 10) {

    3         throw new MyException("Image resource is too small!");

    4     }

    5 }

    //output

    1 net.middlemind.PongClone.MyException: Image resource is too small!

    2    at net.middlemind.PongClone.NewClass.main(NewClass.java:302)

    ```


    **Listing 9-4** Example of Using a Custom Exception Class


    An example demonstrating the use of a custom exception class.


    In the previous listing, we can see the use of the `MyException` class. In this
    example, we use the exception in a fictional `ProcessImage` method. This method
    takes an `MmgBmp` image resource argument, and returns no value. The purpose of
    this method is to check the passed-in image argument and make sure its dimensions
    are larger than 10 pixels in width and height. If not, an exception is thrown.


    Note that the method declares what exceptions are thrown in the body of the method
    using the `throws` keyword in the method declaration. There can be multiple, comma-separated
    entries here. When we want to throw an exception, we use the `throw` keyword followed
    by the instance of the exception class that we want to throw. In this example,
    we’re using our fictional `MyException` class and providing a descriptive error
    message. Why is this implementation not ideal?


    The reason why it isn’t an ideal implementation is because the exception class
    is not indicative of the error it is designed to represent. This is not as intuitive
    as say naming our exception class `ImageResourceException` as opposed to `MyException`.
    Again, being intuitive and clear is the better implementation choice. In the next
    section, we’ll briefly look at the information that comes back from a thrown exception,
    namely, the stack trace.


    ## The Stack Trace


    An important aspect of programming in Java is being able to handle unforeseen
    errors. These will manifest to you as exceptions and crash your program in the
    worst way when you least expect it. When you get an exception, you usually get
    a message and stack trace printed to standard error.


    Sometimes, the environment you’re executing your programs in will not give you
    access to output streams. You may have to try to capture and indicate errors in
    the program itself. In this case, it is wise to implement a very high-level catch-all
