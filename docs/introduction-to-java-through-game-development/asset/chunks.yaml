- fmt: '# Queues


    `Queue`s are very similar to `Stack`s in many ways; as such, we won’t have as
    detailed a discussion about them. Instead, we’ll talk briefly about the difference
    between `Stack`s and `Queue`s and reinforce our review with an example.


    A `Queue` is similar to a `Stack` except it operates using a first in, first out
    method. Much like `Stack`s, `Queue`s are abstract data structures, meaning they
    can be implemented using other data structures. They have the same type of interaction,
    namely, calling a method to add a value to the data structure and calling a method
    to pull a value from it.


    Without further ado, let us motivate the discussion with an example. We’re going
    to look at the code from Listing [5-14](#537429_1_En_5_Chapter.xhtml#PC14).


    ```

    //code

    01 LinkedList ll = new LinkedList();

    02 char c = ''!'';


    04 ll.add(c);

    05 System.out.println("Add #1 Value: " + c);


    07 c = ''k'';

    08 ll.add(c);

    09 System.out.println("Add #2 Value: " + c);


    11 c = ''c'';

    12 ll.add(c);

    13 System.out.println("Add #3 Value: " + c);


    15 c = ''a'';

    16 ll.add(c);

    17 System.out.println("Add #4 Value: " + c);


    19 c = ''B'';

    20 ll.add(c);

    21 System.out.println("Add #5 Value: " + c);


    23 System.out.println("Poll #1 Value: " + ll.poll());

    24 System.out.println("Poll #2 Value: " + ll.poll());

    25 System.out.println("Poll #3 Value: " + ll.poll());

    26 System.out.println("Poll #4 Value: " + ll.poll());

    27 System.out.println("Poll #5 Value: " + ll.poll());

    //output

    01 Add #1 Value: !

    02 Add #2 Value: k

    03 Add #3 Value: c

    04 Add #4 Value: a

    05 Add #5 Value: B

    06 Poll #1 Value: !

    07 Poll #2 Value: k

    08 Poll #3 Value: c

    09 Poll #4 Value: a

    10 Poll #5 Value: B

    Listing 5-15

    Queues – Example of Queue Refactored from Listing 5-14

    ```


    Compare the output of this listing with that of Listing [5-14](#537429_1_En_5_Chapter.xhtml#PC14).
    Can you see the difference between first in, last out and first in, first out?


    As you can see from the output of Listing [5-15](#537429_1_En_5_Chapter.xhtml#PC15),
    the `Queue` behaves much like a line at the bathroom; the first person in line
    is the first person to leave the line and use the restroom. You must also remember
    that just like a queue for the bathroom, when someone leaves the line, they leave
    the queue. When you pull data out of a queue, it is removed from the queue.


    That wraps up round two of our introduction to Java data structures! Well not
    quite, I wanted to spend a little bit of time talking about those angled brackets
    we use to configure the data type(s) our data structures use.


    ## Parameterized Types and Data Structures


    We’ve encountered them a number of times throughout our review of different data
    structures. They are the angled brackets, `<>`, we use to configure the given
    data structure’s internal data types. Why do we need to do this you ask? Well
    let’s think about this for a moment.


    Although you haven’t had a formal review on Java classes, you have had some exposure
    to them so far. In the Java programming language, the `Object` is the super-class
    of all other classes in Java. This means that the `Object` class is the most general
    of all the classes, and a variable of the `Object` data type can store an instance
    of a `String`, `Integer`, `ArrayList`, and any other class.


    That sounds powerful. But it also sounds a little insecure. That means that if
    you don’t specify a data type for your data structure, and the default data type,
    `Object`, is used, then any object can be stored in that data structure. That’s
    just not good coding. It’s error prone because you don’t know what object you
    can expect from the data structure.


    This puts the responsibility on the programmer, not the compiler, to make sure
    you use the data structure consistently. I don’t know about you, but I’d rather
    rely on the compiler. By defining a specific data type to use with a given data
    structure, the compiler will ensure no variables of another data type are stored
    in that data structure, giving you one less thing to worry about.


    ## Challenge: Stacks


    This challenge is a bit more difficult than previous challenges because you have
    to not only adjust a variable’s data type but also refactor its use by tracking
    down and replacing method calls from the `ArrayList` class with method calls from
    the `Stack` class. You also have to be aware of the caveat that iterating over
    a `Stack` removes the elements from it.


    You have seen both data structures in use in a few examples from Chapters [3](#537429_1_En_3_Chapter.xhtml)
    and [5](#537429_1_En_5_Chapter.xhtml), so you have the tools to do the job. If
    you get stuck, re-read the challenge description and the clue.


    Packages Involved:


    ```

    net.middlemind.MemoryMatch_Chapter5_Challenge1

    net.middlemind.MemoryMatch_Chapter5_Challenge1_Solved

    ```


    Description:


    Find the package, `net.middlemind.MemoryMatch_Chapter5_Challenge1`, and open the
    `ScreenGame.java` file. The data structure used to track clicked cards is an `ArrayList`.
    Some of the game programmers wanted to see how it would look to use a `Stack`
    instead. Refactor the code in the `ScreenGame.java` class to use a `Stack` as
    requested. You''ll need to adjust code in a few places throughout the file. The
    variable used to track the clicked cards is called `clickedCards`.


    Keep in mind when using the `pop` method, the value that was stored in the `Stack`
    is removed. This means that you''ll have to keep track of popped values and restore
    them if you want to loop over a `Stack` multiple times. You can keep the `MemoryItems`
    popped off of the stack in another data structure and add them back in using the
    `Stack` class’ `addAll` method. You must run this package''s file `–` `MemoryMatch.java`;
    right-click and select Run File to test the game. Good luck!


    Clue:


    There are a few ways to find all the places in the file where you have to adjust
    some code. One way is to change the data type of the variable and look for the
    errors caused by this change. You could also perform a text search on the name
    of the variable or right-click the variable and select the "Find Usages" option.
    You''ll have to change the class methods used to get/set values in the data structure
    from those used by an `ArrayList` to those used by a `Stack`. You’ll have to create
    a new `Boolean` class field to track when a match has been found so you can decide
    if you need to add the elements popped off of the `Stack` back in.'
