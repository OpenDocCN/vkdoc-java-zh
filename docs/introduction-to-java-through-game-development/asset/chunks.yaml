- fmt: '# Challenge Solution


    The solution to this challenge is fairly straightforward but requires you to search
    through the file to find the locations where you have to change an `ArrayList`
    method, or constructor, to an equivalent method, or constructor, in the `Stack`
    class. Looking at the solution package will show you the exact locations of the
    changes you need to make.


    The idea is to change these method calls:


    ```

    clickedCards.add(itm);

    clickedCards.get(i);

    ```


    with:


    ```

    clickedCards.push(itm);

    clickedCards.pop();

    ```


    You’ll also need change the declaration and initialization of the variable. And
    you’ll also have to make sure you don’t lose data when popping values off of the
    stack. After you finish making the changes, run the local package version of the
    `MemoryMatch.java` file by right-clicking it and selecting the “Run File” option.
    You should see no disruption in the functionality of the game as the `Stack` will
    functionally replace the `ArrayList` in this case.


    ![](images/537429_1_En_5_Chapter/537429_1_En_5_Fig1_HTML.jpg)


    An illustration of the user interface of a memory match file with 9 columns and
    4 rows. Two of them open as a reward. A message on the bottom says, press B to
    exit.


    Image 5-1


    MemoryMatch with Stack-Based Click Tracking


    A screenshot showing the refactored code managing the clicked cards.


    If you run into an error where only one of your cards resets, you need to look
    at the `CheckForMatches` method and make sure you are storing the popped elements
    and returning them to the `clickedCards` stack. Otherwise, the `MemoryItem` would
    be lost and won’t be available to be reset in case no match is found. This means
    you also have to track if a match has been found in a class field and use it to
    decide to restore values back to the stack. That brings us to the conclusion of
    this chapter; let’s take a look at what we’ve accomplished.


    ## Conclusion


    In general, data structures are really outside the scope of introductory programming
    language texts. However, we’re learning by working with full game projects, and
    it’s important to have a basic level of knowledge with regard to them. You really
    do need data structures to build advanced programs like games, and I want you
    to be able to build your own games at the conclusion of the text.


    ### What We Covered


    In our second foray into the world of data structures, we traversed a fair amount
    of ground. Let’s take a look at a summary of the material.


    *   **Multidimensional Arrays:** We took a look at multidimensional arrays even
    touching about third dimensional arrays and the concept of how fast its memory
    usage can grow. We saw some examples of how to declare and use the data structure.


    *   **Hashes:** Really one of the most powerful tools in programming, hashes allow
    you to quickly look up data using a key instead of an array index. One use of
    this data structure is to make dictionary style lookups where a key returns information
    of some kind.


    *   **Stacks and Queues:** A very important set of data structures that maybe
    aren’t used as often as some of the others we’ve reviewed. Nevertheless, they
    are a very important tool in any programming language. Similarly, we took a look
    at basic use cases and functionality.


    *   **Parameterized Types and Data Structures:** We took a moment to talk about
    the configuration we’ve been doing with the different data structures and their
    internal data types.


    *   **Challenge: Stacks:** We took on one of the most difficult challenges yet,
    refactoring an entire variable’s implementation in the `ScreenGame.java` file
    of the `MemoryMatch` class.


    Sadly, we won’t be reviewing anymore data structures in this text, but we will
    be taking a look at looping in Chapter [6](#537429_1_En_6_Chapter.xhtml) and learn
    different ways we can iterate over the elements of a data structure.


    # 6. Looping and Iteration


    You’ve built up your coding toolbox, and you have a good selection of powerful
    tools, including data structures, at your fingertips. One thing that we’ve looked
    at in a few code listings but haven’t reviewed in detail is how to run code over
    and over again in a loop.


    Looping and iteration, much like flow control, are integral to many Java programs.
    In fact, we couldn’t really have games without them. I’ll elaborate on this further
    when we cover main game loops, in depth, later on in the chapter. For now, let’s
    focus on the fundamentals of looping. The Java programming language gives us three
    different techniques we can use to employ looping and iteration in our programs.
    Let’s see what we have to work with.


    *   **For Loops:** We’ve seen these a few times in the example listings and coding
    challenges.


    *   **For-Each Loops:** Much like their close counterpart, the for loop, for-each
    loops follow the same logical structure but are expressed differently.


    *   **Do-While Loops:** The outlier in the set of looping constructs, although
    very useful in certain cases.


    I’ve also mentioned the concept of iteration, and we’ll explore this a bit further
    when we talk about the for-each loop. As it turns out, Java, being a full featured
    and mature programming language, has the concept of Interfaces. An interface is
    exactly as it sounds, a set way to interact with something. When applied to data
    structures, we can define a set way to iterate over them. That is, ask the data
    structure for the next element in the series if there is one. Next up, we’ll take
    a look at for loops in Java.


    ## For Loops


    For loops, in my opinion, are the workhorse of looping constructs in Java. They
    tend to be the go-to solution for most situations that require repeated execution
    of code in a loop. We’ll start the discussion on looping with an introduction
    to basic for loops.'
