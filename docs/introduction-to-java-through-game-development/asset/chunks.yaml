    - 1, MmgScreenData.GetGameWidth() + 1, MmgScreenData.GetGameHeight() + 1);


    22     g.setColor(Color.BLACK);

    23     g.fillRect(MmgScreenData.GetGameLeft(), MmgScreenData.GetGameTop(), MmgScreenData.GetGameWidth(),
    MmgScreenData.GetGameHeight());


    25     p.SetGraphics(g);

    26     p.SetAdvRenderHints();

    27     currentScreen.MmgDraw(p);


    29     if (MmgHelper.LOGGING == true) {

    30         tmpF = g.getFont();

    31         g.setFont(debugFont);

    32         g.setColor(debugColor);

    33         g.drawString(GamePanel.FPS, 15, 15);

    34         g.drawString("Var1: " + GamePanel.VAR1, 15, 35);

    35         g.drawString("Var2: " + GamePanel.VAR2, 15, 55);

    36         g.setFont(tmpF);

    37     }

    38 }

    Listing 6-11

    MmgGameApiJava Game Engine’s Main Game Loop – Game Panel Class

    ```


    An example of a main game loop’s workload. Can you see the place where the frame
    rate data is updated for display?


    Let’s start things off with an example of the most basic main game loop, one that
