- fmt: "### Getting the Game Projects Setup\n\nNow that you have the JDK and the NetBeans\
    \ IDE properly installed, you’ll need to download a copy of the project associated\
    \ with this text. You can do so at the following URL: [`github.com/apress/intro-java-through-game-dev`](http://github.com/apress/intro-java-through-game-dev).\
    \ Download the project ZIP file and decompress it into the directory where you\
    \ plan to keep your NetBeans projects. Once this step is complete, open the NetBeans\
    \ IDE and select “File” ➤ “Open Project”. Navigate to the directory where you\
    \ unzipped the project code. There are three projects that you have to open and\
    \ configure. One for each game that we’ll be working with in this text. Locate\
    \ and open the following projects:\n\n*   Pong Clone\n*   Memory Match\n*   Dungeon\
    \ Trap\n\nYou should see something similar to Image [1-6](#537429_1_En_1_Chapter.xhtml#Fig6).\n\
    \n![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig6_HTML.jpg)\n\nA user interface\
    \ of a computer window has a menu bar and four panels of projects, navigators,\
    \ output, and an empty panel.\n\nImage 1-6  \nScreenshot – NetBeans IDE Opened\
    \ Projects  \nA screenshot of the NetBeans IDE with the game projects opened.\n\
    \nNow that we have the projects loaded, we need to configure them. The first thing\
    \ we’re going to check is that each project has the correct JDK and build directory\
    \ set. To do so, right-click on each project and select “Properties”. We’ll check\
    \ the “Packaging” configuration first. Select the “Build” option’s “Packaging”\
    \ entry on the left-hand side of the properties dialogue (Image [1-7](#537429_1_En_1_Chapter.xhtml#Fig7)).\n\
    \n![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig7_HTML.jpg)\n\nA user interface\
    \ of a project properties pong clone has sources, libraries, build in which compiling,\
    \ packaging include JAR file, exclude from JAR file, compile option.\n\nImage\
    \ 1-7  \nScreenshot – NetBeans IDE Packaging Property  \nA screenshot of the Packaging\
    \ properties for the Pong Clone project.\n\nFor this property, we just want to\
    \ check that the “JAR File” path includes the `./dist/` directory. Next, select\
    \ the “Run” option from the “Categories” list. Remember, we want to check this\
    \ for each game project (Image [1-8](#537429_1_En_1_Chapter.xhtml#Fig8)).\n\n\
    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig8_HTML.jpg)\n\nA user interface\
    \ of project properties has categories of sources, libraries, build, and application\
    \ and configuration, runtime platform, main class, arguments, working directory,\
    \ and VM options.\n\nImage 1-8  \nScreenshot – NetBeans IDE Run Property  \nA\
    \ screenshot showing the Run property of the Pong Clone project.\n\nFor this project\
    \ property, we want to make sure that the “Working Directory” is set to the directory\
    \ where the project JAR file will be built. By default, this is the `./dist` directory.\
    \ Lastly, select the “Sources” entry in the “Categories” list (Image [1-9](#537429_1_En_1_Chapter.xhtml#Fig9)).\n\
    \n![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig9_HTML.jpg)\n\nA user interface\
    \ of a project properties pong clone has categories with source, libraries, build,\
    \ and applications. On the right, are project folders, sources package folders,\
    \ text package folders, sources, and profiles.\n\nImage 1-9  \nScreenshot – NetBeans\
    \ IDE Sources Property  \nA screenshot showing the Sources project settings with\
    \ JDK 11 selected.\n\nThe “Sources/Binary Format” field should be set to “JDK\
    \ 11”. If you were planning to try running the games against a different JDK,\
    \ this is where you would change the project settings. Again, make sure you perform\
    \ these project settings checks for each game project. The last thing we need\
    \ to do before we can play the games is make sure the project libraries are properly\
    \ mapped. To do so, select the “Libraries” option in the “Categories” list of\
    \ the project properties dialogue (Image [1-10](#537429_1_En_1_Chapter.xhtml#Fig10)).\n\
    \n![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig10_HTML.jpg)\n\nA user interface\
    \ of a project properties pong clone has categories with libraries which include\
    \ the java platform, compile, processor, run, compile tests, and run tests.\n\n\
    Image 1-10  \nScreenshot – NetBeans IDE Libraries Property  \nA screenshot showing\
    \ the libraries category of the project settings with three libraries properly\
    \ configured.\n\nEach game project should have the same three libraries configured.\
    \ I’ll list them here:\n\n*   `jinput`: `./lib/jinput/jinput-2.0.9.jar`\n*   `jutils`:\
    \ `./lib/jutils/jutils-1.0.0.jar`\n*   `MmgGameApiJava`: `./lib/MmgGameApiJava.jar`\n\
    \nTo add a library, select the “+” button adjacent to the “Classpath” label and\
    \ locate the JAR file listed previously. Each game has its own local `lib` folder\
    \ with a copy of the required JAR files. Once the libraries are properly mapped,\
    \ we can move on to the fun part and test the different games. Close the project\
    \ properties dialogue if it’s still opened and right-click the first game project,\
    \ Dungeon Trap; select “Clean and Build” from the context menu. Watch the project\
    \ build process and ensure that it completes without error. Perform the clean\
    \ and build process on the two remaining game projects. Ensure each can be built\
    \ without error.\n\n## Checking Out the Games\n\nNow let’s take a moment to run\
    \ each game project and play around with it a little bit. If you expand each project\
    \ and expand the source code entry in the project tree, you’ll see a main namespace\
    \ for each project. The main project namespaces are as follows:\n\n*   `net.middlemind.DungeonTrap`\n\
    *   `net.middlemind.PongClone`\n*   `net.middlemind.MemoryMatch`\n\nIn each project’s\
    \ main namespace lies all the Java classes that power the final version of the\
    \ game. For each namespace, there will be a main file that is the static entry\
    \ point into the program. This Java class will have the same name as the project.\
    \ The main project files are as follows:\n\n*   `DungeonTrap.java`\n*   `PongClone.java`\n\
    *   `MemoryMatch.java`\n\nYou’ll notice a number of namespaces with names like\
    \ `PongClone_Chapter1_Challenge1`. These are the sandbox environments for handling\
    \ the different challenges throughout the text. We can ignore those namespaces\
    \ for now. For each game project, right-click the main file and select the “Run”\
    \ option. You should see the main menus corresponding with each game (Image [1-11](#537429_1_En_1_Chapter.xhtml#Fig11)).\n\
    \n![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11a_HTML.jpg)\n\nA user interface\
    \ of a dungeon trap MMG file in which a black screen has the game tutorial and\
    \ player game 1, player game 2, and the exit game options with a hand symbol.\n\
    \n![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11b_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11c_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11d_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11e_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11f_HTML.jpg)\n\
    \nImage 1-11  \nScreenshot – NetBeans IDE Game Demos  \nA series of screenshots\
    \ depicting the main menu of each sample game included with the text.\n\nThat\
    \ wraps up the game demonstration section. I hope you enjoyed the little games\
    \ and are excited to start learning the Java programming language and trying some\
    \ coding challenges!\n\n## Conclusion\n\nTo conclude this introductory chapter,\
    \ I’d like to point out that what we just did was pretty remarkable. We went from\
    \ 0 to 60 in just a few seconds. Installing the JDK, installing the IDE, followed\
    \ by downloading, configuring, and running three game projects. That is an example\
    \ of the power of Java. You’ll be sure to see more examples as you take on different\
    \ coding challenges designed to apply your Java programming language knowledge.\
    \ Let’s take a moment to review the chapter’s material."
  raw: '### Getting the Game Projects Setup


    Now that you have the JDK and the NetBeans IDE properly installed, you’ll need
    to download a copy of the project associated with this text. You can do so at
    the following URL: [`github.com/apress/intro-java-through-game-dev`](http://github.com/apress/intro-java-through-game-dev)
    . Download the project ZIP file and decompress it into the directory where you
    plan to keep your NetBeans projects. Once this step is complete, open the NetBeans
    IDE and select “File” ➤ “Open Project”. Navigate to the directory where you unzipped
    the project code. There are three projects that you have to open and configure.
    One for each game that we’ll be working with in this text. Locate and open the
    following projects :


    *   Pong Clone


    *   Memory Match


    *   Dungeon Trap


    You should see something similar to Image [1-6](#537429_1_En_1_Chapter.xhtml#Fig6).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig6_HTML.jpg)


    A user interface of a computer window has a menu bar and four panels of projects,
    navigators, output, and an empty panel.


    Image 1-6


    Screenshot – NetBeans IDE Opened Projects


    A screenshot of the NetBeans IDE with the game projects opened.


    Now that we have the projects loaded, we need to configure them. The first thing
    we’re going to check is that each project has the correct JDK and build directory
    set. To do so, right-click on each project and select “Properties”. We’ll check
    the “Packaging” configuration first. Select the “Build” option’s “Packaging” entry
    on the left-hand side of the properties dialogue (Image [1-7](#537429_1_En_1_Chapter.xhtml#Fig7)).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig7_HTML.jpg)


    A user interface of a project properties pong clone has sources, libraries, build
    in which compiling, packaging include J A R file, exclude from JAR file, compile
    option.


    Image 1-7


    Screenshot – NetBeans IDE Packaging Property


    A screenshot of the Packaging properties for the Pong Clone project.


    For this property, we just want to check that the “JAR File” path includes the
    “./dist/” directory. Next, select the “Run” option from the “Categories” list.
    Remember, we want to check this for each game project (Image [1-8](#537429_1_En_1_Chapter.xhtml#Fig8)).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig8_HTML.jpg)


    A user interface of project properties has categories of sources, libraries, build,
    and application and configuration, runtime platform, main class, arguments, working
    directory, and V M options.


    Image 1-8


    Screenshot – NetBeans IDE Run Property


    A screenshot showing the Run property of the Pong Clone project .


    For this project property, we want to make sure that the “Working Directory” is
    set to the directory where the project JAR file will be built. By default, this
    is the “./dist” directory. Lastly, select the “Sources” entry in the “Categories”
    list (Image [1-9](#537429_1_En_1_Chapter.xhtml#Fig9)).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig9_HTML.jpg)


    A user interface of a project properties pong clone has categories with source,
    libraries, build, and applications. On the right, are project folders, sources
    package folders, text package folders, sources, and profiles.


    Image 1-9


    Screenshot – NetBeans IDE Sources Property


    A screenshot showing the Sources project settings with JDK 11 selected.


    The “Sources/Binary Format” field should be set to “JDK 11”. If you were planning
    to try running the games against a different JDK, this is where you would change
    the project settings. Again, make sure you perform these project settings checks
    for each game project. The last thing we need to do before we can play the games
    is make sure the project libraries are properly mapped. To do so, select the “Libraries”
    option in the “Categories” list of the project properties dialogue (Image [1-10](#537429_1_En_1_Chapter.xhtml#Fig10)).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig10_HTML.jpg)


    A user interface of a project properties pong clone has categories with libraries
    which include the java platform, compile, processor, run, compile tests, and run
    tests.


    Image 1-10


    Screenshot – NetBeans IDE Libraries Property


    A screenshot showing the libraries category of the project settings with three
    libraries properly configured.


    Each game project should have the same three libraries configured. I’ll list them
    here:


    *   jinput: ./lib/jinput/jinput-2.0.9.jar


    *   jutils: ./lib/jutils/jutils-1.0.0.jar


    *   MmgGameApiJava: ./lib/MmgGameApiJava.jar


    To add a library, select the “+” button adjacent to the “Classpath” label and
    locate the JAR file listed previously. Each game has its own local “lib” folder
    with a copy of the required JAR files. Once the libraries are properly mapped,
    we can move on to the fun part and test the different games. Close the project
    properties dialogue if it’s still opened and right-click the first game project,
    Dungeon Trap; select “Clean and Build” from the context menu. Watch the project
    build process and ensure that it completes without error. Perform the clean and
    build process on the two remaining game projects. Ensure each can be built without
    error.


    ## Checking Out the Games


    Now let’s take a moment to run each game project and play around with it a little
    bit. If you expand each project and expand the source code entry in the project
    tree, you’ll see a main namespace for each project. The main project namespaces
    are as follows:


    *   net.middlemind.DungeonTrap


    *   net.middlemind.PongClone


    *   net.middlemind.MemoryMatch


    In each project’s main namespace lies all the Java classes that power the final
    version of the game. For each namespace, there will be a main file that is the
    static entry point into the program. This Java class will have the same name as
    the project. The main project files are as follows:


    *   DungeonTrap.java


    *   PongClone.java


    *   MemoryMatch.java


    You’ll notice a number of namespaces with names like “PongClone_Chapter1_Challenge1”.
    These are the sandbox environments for handling the different challenges throughout
    the text. We can ignore those namespaces for now. For each game project, right-click
    the main file and select the “Run” option. You should see the main menus corresponding
    with each game (Image [1-11](#537429_1_En_1_Chapter.xhtml#Fig11)).


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11a_HTML.jpg)


    A user interface of a dungeon trap M M G file in which a black screen has the
    game tutorial and player game 1, player game 2, and the exit game options with
    a hand symbol.


    ![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11b_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11c_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11d_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11e_HTML.jpg)![](images/537429_1_En_1_Chapter/537429_1_En_1_Fig11f_HTML.jpg)


    Image 1-11


    Screenshot – NetBeans IDE Game Demos


    A series of screenshots depicting the main menu of each sample game included with
    the text.


    That wraps up the game demonstration section. I hope you enjoyed the little games
    and are excited to start learning the Java programming language and trying some
    coding challenges!


    ## Conclusion


    To conclude this introductory chapter, I’d like to point out that what we just
    did was pretty remarkable. We went from 0 to 60 in just a few seconds. Installing
    the JDK, installing the IDE, followed by downloading, configuring, and running
    three game projects. That is an example of the power of Java. You’ll be sure to
    see more examples as you take on different coding challenges designed to apply
    your Java programming language knowledge. Let’s take a moment to review the chapter’s
    material.'
