    An example demonstrating the use of different Try-Catch statements

    designed to catch different exceptions.

    Looking at exception examples #1 and #2, on lines 1–15, we have two

    seemingly identical Try-Catch statements. Can you spot the difference

    between the two? If you thought that the exceptions being caught are

    different, then you thought right. The first example uses the `Exception` class
    ; this is the

    super-class of all other Java exceptions. Catching an exception of this

    type doesn’t give us any information about what went wrong.

    The following Try-Catch statement ,

    exception #2, is similar, but it is designed to catch a `NumberFormatException`,

    which is a more specific exception class. This version of the Try-Catch

    statement is more intuitive because you can clearly see what type of

    error the code is designed to handle. In general, I agree with this

    approach. Sometimes, however, I go against the grain and implement the

    more general Try-Catch statement. Why?

    Well, there are many cases you’ll encounter when writing Java

    programs and games of different sorts where you really don’t care what

    the error was. All you really care about was that there was an error at

    all. This is perfectly fine if you don’t derive value from using more

    specific exception classes. Just keep in mind that best practices

    recommend that we do.

    The last two examples in the code snippet, exceptions #3 and #4,

    present a new version of the Try-Catch statement. One that is able to

    catch multiple types of exceptions. Direct your attention to line 23;

    notice that the catch clause of the Try-Catch statement is designed to

    catch both a `NullPointerException`

    and a `NumberFormatException`.

    Juxtapose this with the last exception example where only the

    super-class, `Exception`, is caught.

    In this case, we have a lot less information about the code in the

    Try-Catch look. We don’t know what exceptions it might throw. Note that

    the code must be adjusted to throw each type of exception since

    whichever exception that is encountered first will exit the Try

    clause.

    This comes back to the same point of form vs. function. If knowing

    the type of exception is beneficial to you and it makes your code more

    intuitive and reusable, then use that approach. If you are simply

    concerned with knowing when something failed and not why, then don’t use

    more specific exceptions in your Try-Catch statements. In the next

    section, we’ll talk a little bit about how to define our own exceptions

    to use in our Java programs.


    Defining Exceptions


    Exceptions, like everything else in Java, are based on classes. As I’ve

    alluded to previously, all exceptions in the Java programming language

    are subclasses of the `Exception`

    super-class. As such, you can define your own exceptions to use in your

    code. Let’s take a look at an example.


    ```

    1 public class MyException extends Exception {

    2     public MyException(String errorMessage) {

    3         super(errorMessage);

    4     }

    5 }

