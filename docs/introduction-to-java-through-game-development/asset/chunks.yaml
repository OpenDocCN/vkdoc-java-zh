    8.  封装、继承和多态


    本章全部关于高级 Java 面向对象编程主题，如封装、继承和多态。它们共同构成了面向对象编程的四个主要理论原则中的三个。第四个原则，抽象，超出了本文的范围，因此我们不会在此讨论。让我们通过定义
    Java 面向对象编程语言的这些特性来为讨论奠定基础。


    *   **封装**：*将代码和数据包装成一个单一单元的过程*，通常表现为一个 Java 类，通过类方法对字段访问进行高度控制。

