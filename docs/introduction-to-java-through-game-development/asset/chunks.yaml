- fmt: '### Constructors


    Up to this point in the text, we’ve used very basic class initialization. For
    the most part, we’ve seen declaration and initialization, or instantiation followed
    by directly setting the class fields or using class methods to do so. While this
    is certainly a direct and intuitive way to configure our class instances, it can
    get a bit cumbersome. Imagine working with a class that has 10 or 20 fields that
    need to be properly initialized?


    We could do it with the tools we have in a few different ways. One way would be
    to explicitly set each class field to the desired value. Another way would be
    to call some sort of initialization method, not unlike the `setAll` method we
    experimented with when working with the fictional `GameData` class. Let’s explore
    that idea a bit more. Requiring a developer to call a specific method to properly
    initialize a class doesn’t sound too terrible.


    Again, we’re at a point where we’ve pushed the responsibility onto the developer,
    who probably has enough to worry about. Instead, let’s push that responsibility
    onto Java and not worry about it. Let’s take a look at a feature of the Java programming
    language we’ve been using without really knowing: the class constructor. I’ll
    provide an example to motivate the discussion.


    ```

    1 GameData gameData1 = new GameData();

    2 gameData1.setAll(State.NONE, 0, true, "");


    4 GameData gameData2 = new GameData(State.NONE, 0, true, "");

    Listing 7-10

    Example of Using Class Constructors for Initialization

    ```


    A listing demonstrating the use of a custom constructor to initialize a class
    upon instantiation as opposed to the `setAll` class method.


    There is a subtle but powerful distinction between the two ways we’ve initiated
    the fictional `GameData` class in the previous listing. In one case, lines 1–2,
    we’re requiring the developer to know they have to use the `setAll` method and
    when. In the second example, line 4, we’re using a custom constructor to set the
    required data for this instance of the `GameData` class, `gameData2`. The benefit
    of this approach is that it’s more intuitive and requires less special knowledge
    on how to configure the class. As the developer, you’ve provided a constructor
    that will configure the class for the developer. Let’s take a look at how to define
    custom constructors for our classes.


    ```

    //class definitions

    01 class SimpleClass1 {

    02     public int simpleField1;

    03 }


    05 class SimpleClass2 {

    06     public int simpleField1;

    07     public boolean simpleField2;


    09     public SimpleClass2() {

    10         simpleField1 = 0;

    11         simpleField2 = false;

    12     }


    14     public SimpleClass2(int i, boolean b) {

    15         simpleField1 = i;

    16         simpleField2 = b;

    17     }

    18 }

    //class usage

    01 //default constructor is always available

    02 SimpleClass1 simp1 = new SimpleClass1();


    04 //explicitly declared simple constructor

    05 SimpleClass2 simp2 = new SimpleClass2();


    07 //re-initialization using the custom constructor

    08 simp2 = new SimpleClass2(1, true);

    Listing 7-11

    Example of Using Default vs. Custom Class Constructors

    ```


    A demonstration of using default constructors and custom constructors in a class
    definition.


    In Listing [7-11](#537429_1_En_7_Chapter.xhtml#PC16), we’re introduced to two
    simple classes. The first class has only a field and no constructor defined. When
    we create an instance of this class, line 2, we are using the default constructor.
    Java takes care of providing a default constructor when you don’t explicitly declare
    one. What happens if we do define a custom constructor? Take a look at the second
    class definition, `SimpleClass2`, on line 5. Note that this class defines two
    constructors.


    The first constructor is a re-creation of the default constructor. We have to
    do this if we decide to define a custom constructor because Java will no longer
    provide the default constructor once a custom constructor is defined. The use
    of a default constructor could lead to an incorrectly configured class and errors,
    so in order to support it, in this case, you have to explicitly create it yourself.
    You can see our implementation on lines 9–12 and the custom constructor on lines
    14–17.


    We can now use `SimpleClass2`’s custom constructor, which lets us provide values
    for the class’ fields, or we can use an empty constructor that will mimic the
    default constructor, line 5 of the class usage section. Keep in mind that you
    can create as many custom constructors as you need for your class, but don’t overuse
    this capability. You’ll end up with very confusing classes to instantiate. That
    brings us to the end of this section. Time for a coding challenge to reinforce
    the material we’ve covered so far.


    ## Challenge: The MmgBmp Class


    In this coding challenge, we’ll use our newly acquired Java class skills and get
    to know a little bit more about the game engine and drawing images in the book’s
    included games. Because they are all built on the same game engine, any knowledge
    you learn with regard to it can be applied equally to all included games.


    One of the core aspects of a 2D game engine is the ability to draw images on the
    screen. Our game engine uses the `MmgBmp` class to handle this task. In this challenge,
    we’ll get to know this class a bit more and see it in action. Keep in mind all
    the aspects of class definitions and object-oriented programming that we’ve covered
    here as you work through the challenge. Enjoy!


    **Packages Involved:**


    ```

    net.middlemind.MemoryMatch_Chapter7_Challenge1

    net.middlemind.MemoryMatch_Chapter7_Challenge1_Solved

    ```


    **Description:**


    Find the package, `net.middlemind.MemoryMatch_Chapter7_Challenge1`, and open the
    `ScreenGame.java` file. In this challenge, you won’t be solving any problems for
    someone else; you’ll be having a little fun adding a graphic to the video game
    that displays at a certain position on the screen and only on certain game states.
    You can provide your own image, or you can use one of the included images. The
    images for this game project are stored in the following folder:


    ```

    .\ MemoryMatch\cfg\drawable\MemoryMatch

    ```


    You can use a png or jpg image of your own. The image should be around 200×200
    pixels if you’re providing one. Simply copy and paste the image into the directory
    mentioned previously and make sure to remember the name of the image file. If
    you don’t have one of your own, just pick an image out of the directory and keep
    its name in mind.


    Locate the `LoadResources` folder and find an example of the code used to load
    your own image into an `MmgBmp` class field in one of the initialization methods.
    Add your own image variable named `myImg` to the class and initialize it near
    the bottom of the `LoadResources` method. You’ll also need to set the image’s
    position using the `SetPosition` method and add the image to a container, `MmgContainer`,
    in the class so that it can be properly configured for display. You’ll get to
    know the `MmgBmp` class and some of its fields and methods as you complete this
    challenge.


    In order to display the new image, you must add code to the `SetState` method
    for the `SHOW_GAME` game state. Take a look at the code in the method and specifically
    how images are shown and hidden depending on the current game state. Add your
    new image into the mix and follow the precedent set by the current code. Lastly,
    you’ll need to clean things up. Find the `UnloadResources` method and make sure
    to clean up your resources by setting the `myImg` class field to `null`. You must
    run this package''s file – `MemoryMatch.java`; right-click and select Run File
    to test the game.


    **Clue:**


    If you run into trouble, stop and take a moment to clear your mind. Look for an
    existing class field of the `MmgBmp` data type and trace how it’s used in the
    methods listed in this coding challenge. You can follow the same example except
    using your chosen file name when loading the image.'
