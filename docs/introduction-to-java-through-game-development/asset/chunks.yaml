    \ to the material contained herein or for any errors or omissions that may have\
    \ been made. The publisher remains neutral with regard to jurisdictional claims\
    \ in published maps and institutional affiliations.\n\nThis Apress imprint is\
    \ published by the registered company APress Media, LLC, part of Springer Nature.\n\
    \nThe registered company address is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\
    \n*I’d like to dedicate this book to my Mom and Dad and to my Uncle Jimmy and\
    \ Tianti. I love you all very much.*\n\n# Introduction\n\nIn this book, “Learning\
    \ Java Through Game Development,” you will learn the fundamentals of the Java\
    \ programming language through a detailed review of the language’s features, including\
    \ data structures and OOP, reenforced by coding challenges throughout the text.\
    \ Get started today by downloading the book’s projects and source code here: [`http://github.com/apress/introduction-to-java-through-gamedev/`](http://github.com/apress/introduction-to-java-through-gamedev/)\
    \ Using the associated game projects along with topic specific coding challenges\
    \ you will gain experience and knowledge working with the Java programming language,\
    \ the NetBeans IDE, a 2D game engine, and three different 2D games! This introductory\
    \ text will give you a solid foundation of experience in Java and video game programming\
    \ for you to build on.\n\n# About the Author\n\n# 1. Introduction\n\nIn this book,\
    \ *Introduction to Java Through Game Development*, you will learn the fundamentals\
    \ of the Java programming language through hands-on game development tasks. Through\
    \ the completion of topic-specific coding challenges, focused on a particular\
    \ aspect of one of the three games included with the text, you will gain experience\
    \ and knowledge working with the Java programming language, the NetBeans IDE,\
    \ a 2D game engine, and three different 2D games. And without further ado, allow\
    \ me to provide some details about this book starting with information on the\
    \ structure and conventions used in this text.\n\n## About This Text\n\nThis text\
    \ will guide you through the basics, and some advanced topics, of the Java programming\
    \ language. As we proceed through the different topics involved, you will be challenged\
    \ to alter, fix, write, and/or debug a copy of one of the three games included\
    \ with the text:\n\n* Pong Clone\n* Memory Match\n* Dungeon Trap\n\nEach game\
    \ is written in a proprietary 2D game engine included with the text. The engine\
    \ is open source and can be accessed here if you want to take a look at the code\
    \ involved:\n\n`github.com/apress/intro-java-through-game-dev`\n\nThe source code\
    \ associated with this game project can be found in the same repo.\n\nEach project\
    \ includes a fully functioning version of the game with full source code as well\
    \ as coding challenges. As you progress through this text, you will be given challenges\
    \ that apply certain Java programming language knowledge to the game project at\
    \ hand. There will be specific copies of the game project preconfigured for the\
    \ current chapter’s challenge.\n\nGenerally speaking, this text will not require\
    \ you to be connected to the Internet for prolonged periods of time outside of\
    \ downloading a copy of this text and its associated code and programs. You will\
    \ need only a small amount of computing resources to run the associated software\
    \ and games. You should have a computer with resources at least equal to the following\
    \ minimum requirements:\n\n* Dual core CPU\n* 4GB of system RAM\n* 2GB of storage\
    \ space\n\nAny relatively modern computer should be able to handle the workload\
    \ without a sweat. When working with any modern programming language, a decision\
    \ must be made as to how to code in that language. Oftentimes, you can just use\
    \ Notepad and a few command-line tools to write and build programs. In our case,\
    \ however, we would like to use more advanced tools, so we’ll require the use\
    \ of an IDE.\n\nAn IDE is an Integrated Development Environment and is a fairly\
    \ complex program whose job it is to make some of the tasks of the software developer\
    \ easier so they can take on larger projects and focus on the coding at hand.\
    \ Games are complex programs that often have a lot of moving parts, literally.\
    \ As such, we stand to benefit greatly by using an IDE, so we chose the NetBeans\
    \ IDE for our purposes.\n\nEach example game in this text is written for a simple\
    \ Java 2D game engine. The experience gained from working through the coding challenges\
    \ in this text will go a long way to giving the reader a solid foundation to create\
    \ some of their own 2D games in Java using the included game engine.\n\n## Notes\
    \ on Formatting\n\nThroughout the text there are some consistent formatting patterns\
    \ I would like to discuss. First off, each chapter follows a similar, general\
    \ structure, listed as follows:\n\n* Chapter Introduction\n  * Topic #1\n  * Topic\
    \ #2\n  * Challenge Description\n  * Challenge Solution\n* Chapter Conclusion\n\
    \nThe “Topic” and “Challenge” sections are repeated as necessary to touch upon\
    \ all the chapter’s topics and will sometimes vary slightly in their construction.\
    \ In general, though, each chapter will have a structure close to that outlined\
    \ previously. In addition to the text, each chapter will have a namespace entry\
    \ in the associated game project for each challenge in that chapter.\n\nThere\
    \ will be more on this to come. For now, the main takeaway is that each challenge\
    \ will have a little sandbox copy of the game for you to work with and a completed\
    \ example to look at. The structure of the code challenges themselves is present\
    \ in the chapter outline, but in any case, let’s discuss them a little bit before\
    \ we move on.\n\n* Challenge Description\n* Challenge Solution\n\nThe general\
    \ structure of the coding challenges presented in the text is listed previously.\
    \ The challenge will be presented with a detailed description and a clue, if any\
    \ is provided. Of course, there will be variations in the sections and section\
    \ titles. The challenges themselves are designed to apply the knowledge learned\
    \ in the current programming language topic. Challenges can vary but will always\
    \ be a small development task using the Java programming language topic at hand.\n\
    \nFollowing every challenge section will be an explanation of the correct way\
    \ to solve the challenge including screenshots or other resources to demonstrate\
    \ the proper functionality. We’ll also indicate clearly where to look for the\
    \ completed challenge’s code, so you don’t have to worry about not understanding\
    \ how a problem was solved.\n\nThat sums up the general structure of the chapters\
    \ and challenge sections of the text. The overall cadence of the text starts with\
    \ the fundamental aspects of the Java programming language and works toward more\
    \ advanced topics and language features."
