    你几乎已经准备好运行游戏了。类已复制到位，库已设置好，并且已连接资源文件夹。接下来，我们将微调一些项目设置。\n\n步骤 5：配置项目设置\n\n在运行游戏之前，你需要检查一些项目设置。首先是设置项目的“工作目录”。由于游戏需要在预期位置找到\
