- fmt: '# Challenge: For-Each Loops


    In this chapter’s only coding challenge, you’ll have to rely on your newly gained
    knowledge and coding tools to accomplish the request. Take a look at the following
    description and clue. Refer back to the text if you have any questions working
    with for-each loops. Good luck!


    ## Packages Involved


    ```

    net.middlemind.PongClone_Chapter6_Challenge1

    net.middlemind.PongClone_Chapter6_Challenge1_Solved

    ```


    ## Description


    One of the senior programmers noticed the use of a basic for loop in the `MmgDraw`
    method. Refactor the code in this method to use a for-each loop. If done correctly,
    the game should function normally without error. You must run this package’s file
    `–` `MemoryMatch.java`; right-click and select Run File to test the game.


    ## Clue


    Recall from our review of for loops that a for-each loop is similar to a for loop
    except that it declares its own temporary variable and is only used to loop over
    the contents of a data structure. Try and write the declaration for the new for-each
    loop right above or below the existing loop so that you can compare the two as
    you code. As an added hint, there is a specific listing in the text that demonstrates
    converting a for loop to a for-each loop. Search for “CHAPTER 6 CHALLENGE 1 SOLUTION”
    to find all the solution text in the solved project’s file.


    # Challenge Solution


    The solution to this challenge takes place in the `MmgDraw` method, and it requires
    a standard for to for-each loop conversion plus a little extra care to make sure
    the Boolean flag is set properly. That’s all there is to it. Take your time when
    working on these challenges, and as always, run the local version of the game’s
    static main, `MemoryMatch.java`, to test your work. If you converted the loop
    but your cards aren’t flipping back over, check that you’re setting the `flipped`
    field properly in the `MmgDraw` method.


    ![](images/537429_1_En_6_Chapter/537429_1_En_6_Fig1_HTML.jpg)


    A screenshot of mmg memory match game with 36 tiles arranged in 4 rows. 4 tiles
    in the first row, 2 tiles in the second, 5 tiles in the third, and 1 tile is open
    in the last row. A text reads press b to exit at the bottom.


    **Image 6-1** Memory Match with a Refactored For Loop in the `MmgDraw` Method


    A screenshot of the copy of the game used in this challenge. After refactoring
    the code, the game runs as expected.


    That brings us to the conclusion of this section. Take a moment to play the game
    once you’ve successfully completed the coding challenge. Make sure the game functions
    as expected.


    # Conclusion


    That brings us to the end of the chapter on looping and iteration. There’s actually
    a fair amount of more material to cover on the subject of looping. For instance,
    why were we able to plug in just about any data structure into a for-each loop
    declaration? I might have made some small mention of this, but we couldn’t cover
    it in detail here. You’ll get an understanding of what’s happening behind the
    scenes when you review object-oriented programming in Java over the next two chapters.
    For now, let’s look at a synopsis of the material reviewed in this chapter.


    ## What We Covered


    During our exploration of looping and iteration in the Java programming language,
    we managed to look at all three standard looping mechanisms in Java `–` the for,
    while, and do-while loops. We took care to review the most famous loop of all:
    the main game loop. And we even got to look at the three most common implementations
    of main game loops. Let me briefly summarize the topics.


    - **Basic For Loops**: We looked at how to declare basic for loops and how the
    subtle use of variables declared outside of the loop can change how we interact
    with counting and loop control variables.


    - **Basic For-Each Loops**: We juxtaposed for loops with for-each loops refactoring
    some earlier code to use the new looping construct. We got to see how clean and
    intuitive for-each loops can be.


    - **Basic While Loops**: We worked with basic while loops looking at the difference
    between them and for loops and indicating the different use cases that require
    a while loop as opposed to a for loop.


    - **Main Game Loops**: In this chapter, we reviewed three of the most common types
    of main game loops: implicit frame rate, explicit frame rate, and frame rate independent.


    - **Do-While Loops**: Although many might consider it an antiquated feature of
    the language, if you happen to be working in a solution space where loops iterate
    at least once, it can be a life saver. Our brief review coupled with the sections
    on while loops should give you a solid foundation to build on.


    - **Break and Continue Statements**: No review on Java looping would be complete
    without a discussion about the `break` and `continue` statements. We quickly reviewed
    this topic and exemplified their use.


    Now that we’ve covered looping and added a whole new set of tools to our coding
    toolbox, we’re ready to take on one of the more advanced aspects of the Java programming
    language: object-oriented programming. You have a good amount of experience and
    a solid foundation to build on; consider object-oriented programming just one
    more tool to add to your toolbox. Enjoy!


    # 7. Objects, Classes, and OOP


    You’ve increased your experience working with the Java programming language over
    the last few chapters, and now we’ve reached the more advanced topic of OOP, object-oriented
    programming. Java is, first and foremost, an object-oriented programming language.
    Whether you were aware of it or not, you have been using classes and OO, object-oriented,
    programming throughout almost the entire text, essentially starting with data
    structures.


    That fact right there should put you at ease if you find the subject matter too
    intimidating. Let’s take a shot at a simple definition of OOP in Java. First,
    you define your class in a Java class file of the same name. For instance, if
    you created a new class to manage a spaceship, the file might be named


    ```

    SpaceShip.java

    ```


    And you would use this class in the most basic way, like so:


    ```

    SpaceShip testShip = new SpaceShip();

    ```


    That’s really all there is to it. At the most basic level, classes are a way for
    you to model something. How do we model something on a computer? We collect and
    track data. Sometimes, that data is an image that actually looks like a spaceship;
    sometimes, it’s just numbers that describe the attributes of a spaceship; and
    sometimes, it’s both.


    The main takeaway here is that the classes you define when used in a program become
    instances of classes or objects. Not to be confused with the super-class of all
    Java classes: the `Object` class. Now, think about all the different data structures
    we’ve reviewed together. Recall the angled brackets that are used to define the
    internal data type of the data structure. Using the `SpaceShip` class to further
    the discussion, let’s look at using it with a data structure:


    ```

    //the ArrayList class from the java.util package

    ArrayList enemyShips = new ArrayList();

    ```


    That’s interesting. By using our custom classes with classes that come with Java,
    we can create new combinations that help us model all sorts of different problems.
    For instance, in the previously shown code snippet, we could be trying to find
    a way to track the current level’s enemy ships in a new 2D space shooter we’re
    working on. Now that you have the basic understanding of what a class is and how
    it might be used in a Java program, let’s take a look at how to properly define
    a class in Java.'
