- fmt: '# Operators and Operator Precedence


    Now that we’ve covered all the main categories of expressions that Java supports,
    we should take a complete look at all of the operators involved and sort them
    by operator precedence. What is operator precedence? Operator precedence is the
    order in which the operators are processed as part of an expression.


    The subsequent list shows Java operators from the most important, first processed,
    to the least important, last processed. Next to the text description of each operator
    is the symbol for it.


    - Array index `[]`, member access `.`, method call `.`, post-decrement `--`, post-increment
    `++`

    - Bitwise complement `~`, cast `()`, logical complement `!`, object creation `new`,
    pre-decrement `--`, pre-increment `++`, unary minus `-`, unary plus `+`

    - Division `/`, multiplication `*`, remainder `%`

    - Addition `+`, string concatenation `+`, subtraction `-`

    - Left shift `<<`, signed right shift `>>`, unsigned right shift `>>>`

    - Greater than `>`, greater than or equal to `>=`, less than `<`, less than or
    equal to `<=`, type checking `instanceof`

    - Equality `==`, inequality `!=`

    - Bitwise AND `&`, logical AND `&&`

    - Bitwise exclusive OR `^`, logical exclusive OR `^` (on Boolean operators)

    - Bitwise inclusive OR `|`, logical inclusive OR `||`

    - Conditional AND `&&` (on Boolean operators)

    - Conditional OR `||` (on Boolean operators)

    - Conditional `?:` (ternary operator)

    - Assignment `=`, compound assignment `+=`, `-=`, `*=`, `/=`, `%=`, `&=`, `^=`,
    `|=`, `<<=`, `>>=`, `>>>=`


    This isn’t something you need to necessarily memorize, but it’s something you
    should be aware of. In most cases, I would recommend using parenthesis to group
    the operators and values and control precedence explicitly. That brings us to
    the conclusion of this section. In the next section, we’ll take a look at different
    ways that we can control the flow of a Java program.


    ## Flow Control


    While you’ve learned a considerable amount up to this point, we still only know
    how to declare variables and model our data. We don’t have much in the way of
    controlling how the program executes. Flow control is an essential part of any
    program. Without it, we wouldn’t be able to execute an alternate branch of code
    based on the value of a variable. You can’t write many interesting programs without
    flow control.


    We’ll take a look at three different ways that you can control the flow of a Java
    program. The first is the traditional If-Else statement including the Else-If
    clause. The second is a statement that is used to support separating into many
    different branches of code: the Switch statement. Lastly, we have a method of
    flow control that allows us to alter the course of the program in response to
    exceptions, unexpected errors, in the program using Try-Catch statements. Let’s
    take a look!


    ### If-Else Statements


    If-Else statements (this also includes the Else-If clause, but we’ll exclude explicitly
    listing it for brevity) are the primary way you will control the flow of execution
    in a Java program. An If-Else statement takes a Boolean expression and conditionally
    executes certain code depending on the result of the expression. Boolean expressions
    of this type are referred to as conditionals. Let’s take a look at a basic If-Else
    statement without an explicit condition expressed.


    ```

    1 if(conditional expression) {

    2    //then clause

    3 } else {

    4    //else clause

    5 }

    Listing 4-9

    Example of Basic If-Else Statement

    ```


    An example of a basic If-Else statement without an explicit conditional expression.


    Let’s further this concept with a simple example where we use an If-Else statement
    to control the initialization of a variable.


    ```

    1 boolean b = true;

    2 int i = 0;

    3 if(!b) {

    4    //then clause

    5    i = 5;

    6 } else {

    7    //else clause

    8    i = 10;

    9 }

    Listing 4-10

    Example of If-Else Statement and Variable Initialization

    ```


    An example of using an If-Else statement to control variable initialization.


    Something about this use of the If-Else statement should seem familiar, no? Can
    you think of another way to do the same thing using something we already have
    in our toolbox? Here’s a hint: it’s also a form of conditional. If you thought
    about the ternary operator, then you thought right.


    ```

    1 boolean b = true;

    2 int i = !b ? i = 5 : i = 10;

    Listing 4-11

    Example of If-Else Statement and Variable Initialization

    ```


    An example of using a conditional to do the same variable initialization as an
    If-Else statement.


    Of course, there’s more to it If-Else statements that just the basic form, and
    the initialization of variables. Let’s look at an example from the Pong Clone
    game’s `ScreenGame.java` class. You can find this Java class in the `net.middlemind.PongClone`
    package.


    ```

    01 public boolean ProcessKeyPress(char c, int code) {

    02    if(state == State.SHOW_GAME && pause == false) {

    03         if(gameType == GameType.GAME_TWO_PLAYER) {

    04             if(c == ''x'' || c == ''X'') {

    05                 paddle1MoveUp = false;

    06                 paddle1MoveDown = true;

    07                 return true;

    08             } else if(c == ''s'' || c == ''S'') {

    09                 paddle1MoveUp = true;

    10                 paddle1MoveDown = false;

    11                 return true;

    12             }

    13         }

    14     }

    15     return false;

    16 }

    Listing 4-12

    Example of Complex If-Else Statement from ScreenGame.java

    ```


    A complex example of the If-Else statement in use to process keyboard input for
    the Pong Clone game.


    Let’s focus on the If-Else statement on lines 4–13. We’ll pull this If-Else statement
    out and adjust its structure a little bit.


    ```

    01 if(c == ''x'') {

    02     paddle1MoveUp = false;

    03     paddle1MoveDown = true;

    04     return true;

    05 } else if(c == ''X'') {

    06     paddle1MoveUp = false;

    07     paddle1MoveDown = true;

    08     return true;

    09 } else if(c == ''s'') {

    10     paddle1MoveUp = true;

    11     paddle1MoveDown = false;

    12     return true;

    13 } else if(c == ''S'') {

    14     paddle1MoveUp = true;

    15     paddle1MoveDown = false;

    16     return true;

    17 }

    Listing 4-13

    Example of Expanded If-Else Statement

    ```


    An example of an expanded If-Else statement where each case has its own Else-If
    clause.


    Notice that we can use If-Else statements, well technically If-Else-If statements
    but you get the idea, to check a bunch of different related conditions. The syntax
    is a bit redundant in that we have to check the value of the same variable over
    and over again, once for each branch. Think about this for a minute. This sounds
    like a common occurrence in programming. While, clearly, we can handle this using
    an If-Else statement, there’s a slightly cleaner way to do it using a Switch statement.'
