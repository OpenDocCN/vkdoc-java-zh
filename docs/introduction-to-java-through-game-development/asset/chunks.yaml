    call its `setAll` method with some parameters. In a similar fashion, on lines
    5–6, we have a slightly more condensed version of the same process. The variable
    `gameData2` is instantiated, declared, and initialized in one line, on line 5,
    leaving the variable ready to use. A call to the `setAll` method is made on line
    6\. In both cases, we could only use the method once an instance of the class
    had been properly declared and initialized. Lines 8–9 are a demonstration of what
    not to do. This code will throw an error; you can’t call the method of an uninitialized
    object.


    Now we get to the really interesting part. On line 12, we have an example of a
    static class field. They are very similar to the class fields you have reviewed
    thus far except that they are prefixed with the `static` keyword. The `static`
    keyword makes the new field a member of the class itself and not of a class instance.
    What does this mean? Well, it means that you can access the field without any
    prior code.


    As you can see on line 12, we’re setting the value of a static class field, but
    we aren’t using a variable; we haven’t declared or initialized anything. In this
    case, we’re using the name of the class itself. A static class field belongs to
    the class and can be accessed from the name of the class itself. Just like with
    class fields, there is a static version of class methods. Together they constitute
    the pair of static class members supported by the Java programming language.


    On line 15 of Listing [7-7](#537429_1_En_7_Chapter.xhtml#PC12), you can see the
    use of a static class method. In general, static fields and methods should be
    capitalized to show that they are different from normal fields and methods, but
    this is just a convention. I recommend sticking to it though; it will make your
    code that much more intuitive. We’ve seen how we can use static class members
    and how they are different from the normal class members we’ve worked with thus
    far, but we haven’t seen exactly how we declare them. Let’s take a look at how
    to define static class members by adding some to our fictional `GameData` class.


    ```

    1 class GameData {

    2     public static int MAX_NUM_PLAYERS = 5;

    3     public static void SetMaxNumPlayers(int i) {

    4         GameData.MAX_NUM_PLAYERS = i;

    5     }


    7     ...

    8 }

    Listing 7-8

    Example of Static Class Members – GameData Class

    ```


    A static class field and a static class method added to the GameData class. The
    remainder of the fictional GameData class has been abridged in this listing.


    ***Java Programming Note: It’s good practice to not only use capitalized variable
    names for a class’ static fields, you should also place them at the very start
    of your class’ definition. With regard to static methods, there isn’t as strong
    a precedence, although using capitalized method names is common. There isn’t an
    equivalent practice with regard to the placement of static methods, but I like
    to keep them grouped together and near the start of the class’ body.*


    Static class members, fields and methods, are very similar to normal class fields
    and methods, and as such, you can use all the same access modifiers. The only
    caveat there is pertains to the use of static class methods. You cannot directly
    access other class fields or methods unless they are also `static`, or you have
    an instance of the class at hand. What does this mean? Well, it means that if
    you’re accessing a static method, that static method can only access other static
    methods and fields because it is associated with the class itself, not a class
    instance. Let me further this discussion with a brief example.


    ```

    1 public static void SetMaxNumPlayers(int i) {

    2     this.numberOfPlayers = i; //incorrect

    3     GameData.MAX_NUM_PLAYERS = i; //correct

    4 }

    Listing 7-9

    Example of Static Class Method Usage

    ```


    This listing has an error. You cannot access a class field, numberOfPlayers, because
    no class instance is present when accessing a static class member.


    Can you spot the issue with the code in Listing [7-9](#537429_1_En_7_Chapter.xhtml#PC14)?
    If you thought that accessing the class field from a static method might be an
    issue, you thought right. That brings us to the conclusion of the section on static
    class members. They are an important tool in your coding toolbox and especially
    come in handy when setting up information associated with the class itself and
    not an instance.'
