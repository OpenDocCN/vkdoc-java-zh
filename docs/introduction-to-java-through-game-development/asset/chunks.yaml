- fmt: "### What We Covered\n\nThe Java language features we covered in this language\
    \ are as follows:\n\n- **Numeric Expressions**: We took a look at one of the main\
    \ types of expressions and associated operators: the numeric expressions.\n- **Boolean\
    \ Expressions**: The next most important type of expression in Java is the Boolean\
    \ expression, and it’s used to create conditionals that, when combined with flow\
    \ control statements, allow us to control the execution of our program.\n- **Assignment\
    \ Expressions**: We took a moment to look at the different assignment expressions\
    \ including the convenience of compound assignment operators.\n- **Increment/Decrement\
    \ Expressions**: This is a small but important topic. We quickly covered the different\
    \ ways you can accomplish incrementing and decrementing a variable including some\
    \ very efficient increment/decrement operators.\n- **Bitwise Expressions**: Bitwise\
    \ expressions are used to perform bit-level logic on numeric information like\
    \ AND, OR, and XOR operations.\n- **Bit-Shift Expressions**: A second erudite\
    \ section of Java expressions; the bit-shift expressions are used to quickly multiply\
    \ or divide a value and can be a faster replacement for certain multiplication.\n\
    - **Operator Precedence**: We briefly outlined the full spectrum of operator precedence\
    \ including bitwise and ternary operators in the listing.\n- **If, If-Else, If-Else-If\
    \ Statements**: Our first look at flow control statements introduced us to If-Else\
    \ statements and branching code.\n- **Switch Statements**: We learned a second\
    \ way to branch code but one that is more suitable for multiple branches of code\
    \ based on a single variable.\n- **Try-Catch Statements**: We learned a form of\
    \ flow control that is triggered by an exception being thrown.\n- **Challenge:\
    \ Flow Control**: We took on an interesting challenge that asked us to create\
    \ new key mappings in the Pong Clone game allowing player1 and player2 to control\
    \ their paddles using the new keys.\n- **Enumerations**: As part of our review\
    \ of Java variables, we swung back around after the review on flow control and\
    \ took a look at how to create custom data types through the use of enumerations.\n\
    - **Very Basic Java Classes**: The second technique we reviewed when creating\
    \ custom data types in Java is by using very simple classes. We took a look at\
    \ an example of a new, custom, data type that stored information about an executing\
    \ game.\n- **Challenge: Enumerations**: The last challenge of the chapter asked\
    \ us to expand the current countdown timer implementation and add two seconds\
    \ to it by supporting enumeration entries for numbers 4 and 5. We also had to\
    \ adjust some class variables, their initialization, and the `DrawScreen` method’s\
    \ code to complete the challenge.\n\nWe have a decent set of tools to work with\
    \ now. Not only can we use all the basic data types to write a solution in Java,\
    \ we can also use flow control statements, casting, conversion, and custom data\
    \ types, among other things. We’ll pick up even more experience and knowledge\
    \ as we look at some of the more advanced features that Java has to offer in the\
    \ coming chapters!\n\nFootnotes [1](#537429_1_En_4_Chapter.xhtml#Fn1_source)\n\
    \n# 5. More Data Structures\n\nWelcome to Chapter [5](#537429_1_En_5_Chapter.xhtml)!\
    \ In this chapter, we’ll spend some more time exploring some common data structures\
    \ provided by the Java programming language. A brief summary of the data structures\
    \ we’ll cover in this chapter is as follows:\n\n- **Multidimensional Arrays**:\
    \ Similar to the arrays you worked with prior to this chapter, just with more\
    \ dimensions, allowing us to map tabular data, etc.\n- **Hashes**: A very useful\
    \ data structure that can be thought of as a dictionary. Hashes store key-value\
    \ pairs. Hashes are sometimes referred to by their actual Java class name, `Hashtable`,\
    \ or the colloquial term, dictionary.\n- **Stacks**: An important data structure\
    \ that allows push and pop access to a stack of values. These are the first data\
    \ structures we’ve seen that remove their elements when they are accessed. They\
    \ also have the property that they return the element for you with a method call.\n\
    - **Queues**: Last but not least, the queue is a data structure you should be\
    \ familiar with if you’ve ever had to wait in line for something. A queue provides\
    \ add or remove access to a list of values.\n\n***Java Programming Note**: All\
    \ the data structures used in the text are either core features of the Java programming\
    \ language or are contained in the `java.util` package. Add the line `import java.util.*;`\
    \ to use these classes in your programs.*\n\nRecall from our review in Chapter\
    \ [3](#537429_1_En_3_Chapter.xhtml) that data structures are more advanced data\
    \ types that hold other variables. Normally, data structures would be considered\
    \ outside the scope of an introductory programming language text, but I feel that\
    \ a gentle introduction to them will help you greatly when you further explore\
    \ the topic. We’ve had some experience working with arrays and lists in Java,\
    \ so we’ll start the discussion with multidimensional arrays. You’ll find the\
    \ syntax and usage familiar. Let’s take a look!\n\n## Multidimensional Arrays\n\
    \nMultidimensional arrays are an array of arrays. Let’s think of arrays in Java\
    \ as a row in a spreadsheet. Each column in the row represents an array index\
    \ and holds some data. Now, with regard to a multidimensional array of two dimensions,\
    \ let’s think of this as an entire spreadsheet of rows and columns. One index\
    \ into the array will specify the row to find the data, while the second index\
    \ will define the column.\n\n### Declaring Multidimensional Arrays\n\nThe process\
    \ for declaring multidimensional arrays should be familiar to you from your previous\
    \ review of Java arrays. Let’s take a look.\n\n```\n1 int[] oneDimension = new\
    \ int[10];\n2 int[][] twoDimensions = new int[10][10];\n3 int[][][] threeDimensions\
    \ = new int[10][10][10];\n```\n\n*Listing 5-1*  \nMultidimensional Array – Declaration\
    \ Examples\n\nAn example demonstrating the declaration of arrays of 1, 2, or 3\
    \ dimensions.\n\nLet’s talk a little bit about what’s going on in this example.\
    \ The first line shows the declaration of a one-dimensional array, as you well\
    \ know. The second line shows the declaration of a two-dimensional array. Note\
    \ that a new set of brackets, `[]`, is added for each new array index.\n\n***Java\
    \ Programming Note**: Be careful when using multidimensional arrays as you can\
    \ eat up quite a bit of memory rather quickly. For instance, a three-dimensional\
    \ array with 1000 elements in each array has 1 billion entries, not a paltry amount\
    \ by any means.*"
