- fmt: '### Using Stacks


    Stacks, as mentioned previously, have a specific property such that the first
    item pushed into the stack is always the last item removed from the stack. Let’s
    start off the exploration by taking a look at how we initialize a stack. In the
    example in Listing [5-12](#537429_1_En_5_Chapter.xhtml#PC12), we’ll look at an
    example using a stack configured to use `Integer`s. Let’s take a look at some
    code!


    ```

    01 //prep

    02 Stack stck;

    03 stck = new Stack();


    05 //initialize

    06 stck.push(0); //example of automatic boxing of int

    07 stck.push(new Integer(1));

    08 stck.push(Integer.valueOf(2));

    09 stck.push(3);

    10 stck.push(4);

    Listing 5-12

    Stacks – Initializing Stacks

    ```


    An example of declaring and initializing a stack configured to hold `Integer`s.
    Notice the automatic boxing of an `int` value on line 6.


    When working with stacks, when we want to add a new piece of data into the `Stack`,
    we “push” it onto the stack. You’ll notice in the previous listing that although
    the stack was configured to hold `Integer`s, we got away with using just an `int`,
    line 6. This is because Java will automatically take care of converting the basic
    data type, `int`, to an object form, an `Integer`.


    After initializing the stack, we have the following list of data elements at the
    following positions in the stack:


    *   Position: 4 Value: 0

    *   Position: 3 Value: 1

    *   Position: 2 Value: 2

    *   Position: 1 Value: 3

    *   Position: 0 Value: 4


    This seems slightly counterintuitive since we added the 0 value to the stack first.
    If we were working with a list, the last element in the list would have a value
    of 4, because it was added first, not a value of 0. This has to do with the nature
    of a `Stack`; by design, it returns values using a first in, last out approach.
    By extension of this idea, the last value in would be the first value out.


    As it turns out, that’s exactly what we get. Let’s further this discussion with
    an example demonstrating the get/set use case. Pay special attention to the order
    of the values returned. I will use simple, increasing values as data to make things
    that much clearer.


    ```

    //code

    01 int val = 0;

    02 stck.push(val);

    03 System.out.println("Push #1 Value: " + val);


    05 val = new Integer(1);

    06 stck.push(val);

    07 System.out.println("Push #2 Value: " + val);


    09 val = Integer.valueOf(2);

    10 stck.push(val);

    11 System.out.println("Push #3 Value: " + val);


    13 val = 3;

    14 stck.push(val);

    15 System.out.println("Push #4 Value: " + val);


    17 val = 4;

    18 stck.push(val);

    19 System.out.println("Push #5 Value: " + val);


    21 System.out.println("Pop #1 Value: " + stck.pop());

    22 System.out.println("Pop #2 Value: " + stck.pop());

    23 System.out.println("Pop #3 Value: " + stck.pop());

    24 System.out.println("Pop #4 Value: " + stck.pop());

    25 System.out.println("Pop #5 Value: " + stck.pop());

    //output

    01 Push #1 Value: 0

    02 Push #2 Value: 1

    03 Push #3 Value: 2

    04 Push #4 Value: 3

    05 Push #5 Value: 4

    06 Pop #1 Value: 4

    07 Pop #2 Value: 3

    08 Pop #3 Value: 2

    09 Pop #4 Value: 1

    10 Pop #5 Value: 0

    Listing 5-13

    Stacks – Getting/Setting Values Part 1

    ```


    An example of declaring and initializing a stack configured to hold `Integer`s
    followed by a demonstration of getting and setting stack values.


    **Java Programming Note:** Although you’ve seen a few different ways you can convert
    to/from boxed versions of the basic data types, boxed meaning `Integer` instead
    of `int`, `Float` instead of `float` etc. You should only do this manually if
    you must. Java will do it for you in most cases.


    Putting it all together in one place really makes the pattern emerge, doesn’t
    it? There are a lot of uses of this pattern in programming; recursion is one of
    them. Keep in mind that popping a value off of the stack removes it from the stack.
    If you want to iterate over the same stack multiple times, you must store and
    re-push the popped-off values. Can you think of a really simple use of the properties
    of the stack? Take a look at the next listing for an answer.


    ```

    01 Stack stck4 = new Stack();

    02 char c = ''!'';


    04 stck4.push(c);

    05 System.out.println("Push #1 Value: " + c);


    07 c = ''k'';

    08 stck4.push(c);

    09 System.out.println("Push #2 Value: " + c);


    11 c = ''c'';

    12 stck4.push(c);

    13 System.out.println("Push #3 Value: " + c);


    15 c = ''a'';

    16 stck4.push(c);

    17 System.out.println("Push #4 Value: " + c);


    19 c = ''B'';

    20 stck4.push(c);

    21 System.out.println("Push #5 Value: " + c);


    23 System.out.println("Pop #1 Value: " + stck4.pop());

    24 System.out.println("Pop #2 Value: " + stck4.pop());

    25 System.out.println("Pop #3 Value: " + stck4.pop());

    26 System.out.println("Pop #4 Value: " + stck4.pop());

    27 System.out.println("Pop #5 Value: " + stck4.pop());

    //output

    01 Push #1 Value: !

    02 Push #2 Value: k

    03 Push #3 Value: c

    04 Push #4 Value: a

    05 Push #5 Value: B

    06 Pop #1 Value: B

    07 Pop #2 Value: a

    08 Pop #3 Value: c

    09 Pop #4 Value: k

    10 Pop #5 Value: !

    Listing 5-14

    Stacks – Getting/Setting Values Part 2

    ```


    In this example, we’ve used the properties of the `Stack` data structure to reverse
    a word.


    In Listing [5-14](#537429_1_En_5_Chapter.xhtml#PC14), we can see a quick and dirty
    use of the `Stack` data structure. It’s not the most interesting piece of code,
    but it will actually reverse words, so why not? As you can see, using a `Stack`
    has inherent properties that you should keep in mind when you’re coding. This
    is an important tool in any programmer’s toolbox but not one that gets as much
    use, still it is important to have a working familiarity with the stack. In the
    next section, we’ll take a quick look at our next data structure: the `Queue`.'
