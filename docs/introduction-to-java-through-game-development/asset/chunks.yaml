- fmt: "# Challenge Solution\n\nThis challenge is one of the more advanced ones in\
    \ the text, but if you carefully read through the description and the clue, I\
    \ think there’s enough information there for you to get it. The entire solution\
    \ really rests on your use of Java inheritance. The goal here is to use an existing\
    \ weapon class, the `MdtWeaponSpear.java`, to create a new version of the spear.\
    \ There are four adjustments to the code, including the creation of the new flame\
    \ spear Java weapon class, you must make in order to add the new weapon to the\
    \ game as the default player weapon. Let’s go through them in detail now.\n\n\
    As we mentioned earlier, the first adjustment you have to make is to refactor\
    \ copy the `MdtWeaponSpear.java` class and rename to something that resembles\
    \ a flame spear class. We chose to call it the `MdtWeaponSpearFlame.java` class.\
    \ Next, we have to alter the image resources used to display the weapon so that\
    \ it looks more like a flame spear and less like a regular spear. The image assets\
    \ are already included for you in the game’s resource folder.\n\nFind them and\
    \ use the name of the image files, including the extension to change the image\
    \ resources used by the new flame spear class. Next, we were asked to make the\
    \ weapon perform differently, a stronger but slower attack. To this end, we increased\
    \ the attack strength from 1 point to 2 and slowed the weapon down by 100ms by\
    \ decreasing the weapon time from 250ms to 350ms.\n\nLastly, we need to set the\
    \ flame spear as the default weapon for all players in the game. To accomplish\
    \ this, we have to look at the `MdtCharInter.java` class. This is the super-class\
    \ for all characters in the game and as such has the code that sets the default\
    \ weapon. Follow the example set by the existing code to add the new weapon to\
    \ the list of the character’s supported weapons and then set it as the equipped\
    \ weapon. If you make all the appropriate adjustments, you should end up with\
    \ a red spear like the one shown in Image [8-1](#537429_1_En_8_Chapter.xhtml#Fig1).\n\
    \n![](images/537429_1_En_8_Chapter/537429_1_En_8_Fig1_HTML.jpg)\n\nA user interface\
    \ of a dungeon trap game. The screen displays player 1 life and a popup on the\
    \ top, Press B to exit, Level 0, and the time taken is 051. Two cartoon characters\
    \ are shooting at each other.\n\n**Image 8-1**  \nA Screenshot Showing the New\
    \ Flame Spear in Action\n\nA screenshot depicting the new flame spear in action\
    \ in the Dungeon Trap game.\n\nThat brings us to the conclusion of this section\
    \ of the chapter. We’ll pick things back up in our review of advanced class topics\
    \ with a discussion on polymorphism in Java. If you could not get your coding\
    \ changes to work properly for this challenge, take a moment to review the solution\
    \ package’s code.\n\n## Polymorphism\n\nPolymorphism, defined outside of the context\
    \ of computer programming, means \"many forms,\" and it occurs when we have classes\
    \ that are related to one another by inheritance. In fact, we’ve seen an example\
    \ of it earlier in this chapter; we just didn’t know it yet. Let me present to\
    \ you the same listing we looked at earlier, Listing [8-2](#537429_1_En_8_Chapter.xhtml#PC2),\
    \ which we’ll now discuss with regard to polymorphism in Java OO programming.\n\
    \n```\n//class declarations\n01 public class BasicEncapClass {\n02     private\
    \ int field1 = 0;\n\n04     public BasicEncapClass(int i) {\n05         this.field1\
    \ = i;\n06     }\n\n08     public int getField1() {\n09         return this.field1;\n\
    10     }\n\n12     public void setField1(int i) {\n13         this.field1 = i;\n\
    14     }\n15 }\n\n17 public class BasicSubClass extends BasicEncapClass {\n18\
    \     private int newField1 = 1;\n\n20     public BasicSubClass(int i) {\n21 \
    \           super(i);\n22         this.newField1 = i;\n23     }\n\n25     @Override\n\
    26     public int getField1() {\n27         return this.newField1;\n28     }\n\
    \n30     @Override\n31     public void setField1(int i) {\n32         this.newField1\
    \ = i;\n33     }\n34 }\nListing 8-3\nExample of Encapsulation, Inheritance, and\
    \ Polymorphism Using Java Classes\n```\n\nAn example listing, the same as Listing\
    \ [8-2](#537429_1_En_8_Chapter.xhtml#PC2), which demonstrates basic inheritance\
    \ and polymorphism. Notice how encapsulation factors into the super-class definition.\n\
    \nWhat? We’re looking at the same class listing but using it to review a different\
    \ topic. What gives? Well, I used the same listing for a reason. I wanted you\
    \ to notice that the concepts of encapsulation, inheritance, and polymorphism\
    \ go hand in hand and are closely tied to one another. Without a well-encapsulated\
    \ class, inheritance becomes less useful and almost chaotic, relying on class\
    \ fields and access modifiers to control usage.\n\nWith good encapsulation comes\
    \ good inheritance, and that brings us to polymorphism. Take a moment to look\
    \ over the two overridden methods, `getField1` and `setField1`, on lines 26 and\
    \ 31 respectively. Methods with the same names exist in the `BasicEncapClass`\
    \ but are now being redefined in the `BasicSubClass` class. This is an example\
    \ of polymorphism as the name of the method stays static, but its meaning and\
    \ usage can change.\n\nThis topic can be a bit confusing and seem almost circular\
    \ in some ways, so let’s take a moment to look at it from a slightly different\
    \ angle. Instead of using meaningless, fictional classes, let’s try to demonstrate\
    \ these programming features using classes and concepts we’re more familiar with:\
    \ fish. Let’s look at some code!\n\n```\n//class declarations\n01 class Fish {\n\
    02     private int avgLen;\n03     private int avgWeight;\n04     private String\
    \ color;\n\n06     public Fish() {\n07     }\n\n09     public int getAvgLen()\
    \ {\n10         return this.avgLen;\n11     }\n\n13     public void setAvgLen(int\
    \ i) {\n14         this.avgLen = i;\n15     }\n\n17     public int getAvgWeight()\
    \ {\n18         return this.avgWeight;\n19     }\n\n21     public void setAvgWeight(int\
    \ i) {\n22         this.avgWeight = i;\n23     }\n\n25     public String getColor()\
    \ {\n26         return this.color;\n27     }\n\n29     public void setColor(String\
    \ s) {\n30         this.color = s;\n31     }\n\n33     public String getName()\
    \ {\n34         return \"Fish\";\n35     }\n\n37     public String getFoodSource()\
    \ {\n38         return \"Worms\";\n39     }\n\n41     @Override\n42     public\
    \ String toString() {\n43         return \"This fish, \" + this.getName() + \"\
    , eats '\" + this.getFoodSource() + \"'.\";\n44     }\n45 }\n\n47 class Trout\
    \ extends Fish {\n48     public Trout() {\n49         super.setAvgLen(25);\n50\
    \         super.setAvgWeight(8);\n51         super.setColor(\"Brown\");\n52  \
    \   }\n\n54     @Override\n55     public String getName() {\n56         return\
    \ \"Trout\";\n57     }\n\n59     @Override\n60     public String getFoodSource()\
    \ {\n61         return \"Worms and insects\";\n62     }\n63 }\n\n65 class RainbowTrout\
    \ extends Trout {\n66     public RainbowTrout() {\n67         super.setAvgLen(30);\n\
    68         super.setAvgWeight(10);\n69         super.setColor(\"Rainbow\");\n\
    70     }\n\n72     @Override\n73     public String getName() {\n74         return\
    \ \"Rainbow Trout\";\n75     }\n76 }\n//code\n01 Fish fish = new Fish();\n02 System.out.println(\"\
    fish - toString: \" + fish);\n03 System.out.println(\"\");\n\n05 Trout trout =\
    \ new Trout();\n06 System.out.println(\"trout - toString: \" + trout);\n07 fish\
    \ = trout;\n08 System.out.println(\"fish = trout - toString: \" + fish);\n09 System.out.println(\"\
    \");\n\n11 RainbowTrout rbTrout = new RainbowTrout();\n12 System.out.println(\"\
    rbTrout - toString: \" + rbTrout);\n13 trout = (Trout)rbTrout;\n14 System.out.println(\"\
    trout = rbTrout - toString: \" + trout);\n15 fish = (Fish)trout;\n16 System.out.println(\"\
    fish = trout - toString: \" + fish);\n17 fish = (Fish)rbTrout;\n18 System.out.println(\"\
    fish = rbTrout - toString: \" + fish);\n//output\n01 //fish\n02 fish - toString:\
    \ This fish, Fish, eats 'Worms'.\n\n04 //trout\n05 trout - toString: This fish,\
    \ Trout, eats 'Worms and insects'.\n06 fish = trout - toString: This fish, Trout,\
    \ eats 'Worms and insects'.\n```"
