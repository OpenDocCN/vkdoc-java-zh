  引言


  在本书《通过游戏开发学习 Java》中，你将通过详细学习 Java 编程语言的基础知识，包括数据结构与面向对象编程（OOP），并通过贯穿全文的编程挑战来巩固所学。立即下载本书的项目和源代码开始学习吧：
  [`http://github.com/apress/introduction-to-java-through-gamedev/`](http://github.com/apress/introduction-to-java-through-gamedev/)
  通过使用相关的游戏项目以及针对特定主题的编程挑战，你将获得使用 Java 编程语言、NetBeans IDE、一个 2D 游戏引擎以及三款不同 2D 游戏的实践经验与知识！这本入门教材将为你打下坚实的
  Java 和视频游戏编程基础，供你后续发展。


