  \ Java 编程语言的第二大卖点。\n\n请注意，Java 不仅包含一种编程语言和库，它还包含/需要一个运行时环境来执行 Java 字节码。这与之前使用 C\
  \ 和 C++ 等语言的开发环境截然不同，在那些环境中，必须非常小心地确保语言、其数据类型和核心库在不同计算机硬件上表现一致。\n\n现在，有了 JRE 的强大功能，你可以利用它在任何操作系统上运行\
  \ Java 程序，包括不同的硬件架构（如 ARM），只要该操作系统有对应的 JRE。在下一节中，我们将介绍 Java 编程语言的第二个最重要的部分——JDK。\n\
  \n\n\n### JDK\n\nJava 开发工具包（JDK）是使用 Java 编程语言开发软件的基础。JDK 是开发 Java 应用程序所需的一系列软件工具的集合。你可以下载\
  \ JDK，仅凭一个文本编辑器就能开始编写 Java 程序。事实上，我们已经安装了 JDK（Java 11 SE LTS）和集成开发环境 NetBeans，因此我们已经准备好开始编码了。\n\
  \n既然我们已经更详细地介绍了 Java 软件开发的主要方面，接下来让我们从非常宏观的角度审视 Java 编程的语法和语义。通过完成本书中的各项挑战，你将获得大量编写语法正确的\
  \ Java 代码的经验。\n\n## 语法与语义\n\n什么是正确的语法？在软件开发领域，语法是一套规则，它定义了哪些符号组合被视为该语言中结构正确的语句或表达式^(³)。这听起来很简单。我们在日常生活中经常与语法打交道。语言和语法都有其语法规则。这通常被用来类比解释编程语言的语法。\n\
  \n我是否使用了正确的语义？嗯……也许吧？编程语言中的语义是一个略显复杂的话题。让我们进一步探讨语义的概念。如果说语法指的是语言的文法，那么语义则指的是该语言中语法正确的语句所表达的含义。\n\
  \n在人类语言中，这大致相当于你说出了有意义的话。当然，你可以遵守所有语法规则，却仍然说不出连贯或合理的内容。计算机语言也是如此。但在这里，语义的概念变得有些模糊，因为正确表达一个解决方案的方式肯定有很多种。就像在人类语言中，传达相同含义的方式也有很多种。\n\
  \n在 Java 编程语言的学习过程中，你首先需要学习和掌握语法，因为存在语法错误的程序是无法编译的。但你可以，也一定会编写出语义不正确的程序。随着时间的推移，你将培养出必要的技能，能够用结构正确的\
  \ Java 程序来定义你试图解决的问题。可以把它想象成学习一门新人类语言中的地道表达——在你掌握了其语法之后。你需要一些时间才能用这门语言流利地表达自己。\n\
  \n编程语言也是如此。你必须学习构建程序和解决问题的正确方法，这是一项需要你随着时间推移不断培养和完善的技能。现在，让我们来看看 Java 编程语言的核心语法规则。\n\
  \n### 基本语法规则\n\n在本节中，我们将简要回顾 Java 编程语言的基本语法规则。我们将重点关注该语言的基础知识。在编写 Java 代码时，以下几点需要牢记^(⁴)：\n\
  \n*   **区分大小写**：Java 是区分大小写的，这意味着标识符`Hello`和`hello`在 Java 程序中具有不同的含义。\n\n*   **类名**：所有类名的首字母应大写。如果类名由多个单词组成，则每个内部单词的首字母也应大写，这被称为大驼峰命名法，例如：`SomeClassName`。\n\
  \n*   **方法名**：所有方法名应以小写字母开头。如果方法名由多个单词组成，则每个内部单词的首字母应大写，即驼峰命名法，例如：`someMethodName`。\n\
  \n*   **程序文件名**：程序文件的名称必须与类名完全一致。事实上，如果不存在与当前 Java 文件名匹配的公共类，Java 编译器会报错。\n\n* \
  \  **类**^(⁵)：每个类应位于一个独立的文件中，扩展名为`.java`。类文件通常分组到文件夹中，这些文件夹被称为包。\n\n*   **程序**：Java\
  \ 程序的处理始终从`main`方法开始：`public static void main(String[] args)`。一个静态的`main`方法是任何 Java\
  \ 程序的必需部分，但对于 Java 库来说则不一定。\n\n*   **代码块与语句**：在 Java 语法中，使用分隔符`{...}`来表示一个代码块和新的代码区域。每条代码语句必须以分号结尾。\n\
  \n*   **关键字/保留字**：这些是特殊单词，软件开发人员不能将其用作类、方法、变量等符号的名称。\n\n语法是你将在实践中学习的东西。在你点击编译按钮之前，IDE\
  \ 就能在很大程度上检测出任何语法错误。在继续之前，我们还想提一下 Java 编程语言中的保留字集。这被列为基本语法规则总结列表中的最后一点。\n\n### 关键字/保留字\n\
  \n与任何编程语言一样，Java 有一套由 Java 本身明确使用的单词，因此，你不允许在程序中使用它们来创建符号、类、方法、变量等。Java 编程语言的关键字如代码清单\
  \ 2-4 所示。有两个保留字目前未被 Java 使用，但同样被限制使用，与关键字一样。\n\n```\nabstract    continue    for\
  \          new          switch\nassert      default     goto*        package   \
  \   synchronized\nboolean     do          if           private      this\nbreak\
  \       double      implements   protected    throw\nbyte        else        import\
  \       public       throws\ncase        enum        instanceof   return       transient\n\
  catch       extends     int          short        try\nchar        final       interface\
  \    static       void\nclass       finally     long         strictfp     volatile\n\
  const*      float       native       super        while\n代码清单 2-4\nJava 编程语言关键字/保留字⁶\n\
  ```\n\n带有星号（*）的单词表示保留字。\n\n你现在不需要记住这些单词。随着你对这门语言经验的积累，你会逐渐熟悉它们。这里的主要要点是，存在一些保留字，你不能在程序中直接将其用作符号、类、方法、变量等。\n\
  \n至此，本节内容结束。在结束本章之前，我想稍微谈谈游戏编程。我们将通过三个不同的游戏来学习 Java 编程，因此我们有必要对游戏编程本身以及我们将要使用的游戏有一些基本的了解。\n\
  \n\n\n## 游戏编程\n\n如果不花点时间谈谈游戏编程，那将是我的失职。毕竟，在探索 Java 编程语言的过程中，我们将在挑战中使用三款不同的游戏。正如我之前提到的，电子游戏是一种相当独特且具有挑战性的程序类型。它们通常需要实时响应、智能的电脑对手、复杂的输入、视频、音乐、音效以及多人/网络支持。这就要求电子游戏开发者掌握必要的\
  \ API，以便完成计算机几乎能做的所有事情。\n\n别担心，游戏引擎可以帮助你卸下大部分重担。本书中包含的游戏实际上整合了一个紧凑的 2D 游戏引擎。每个游戏都是一个独立的项目，包含完整的引擎源代码，全部运行在一个小小的\
  \ Java 程序中。你将在旨在展示对 Java 编程语言特性理解的挑战中，获得编程游戏的经验。\n\n虽然我们不会在这本入门教材中尝试从头构建一个游戏，但你将获得一些扎实的游戏编程经验。此外，你还能获得使用游戏引擎应用程序编程接口（API）的经验，并可以利用这些知识编写自己的游戏。\n\
  \n关于游戏编程，一个重要的入门信息是主游戏循环。主游戏循环是游戏和游戏引擎的一个共同属性；它是一种几乎出现在每个游戏中的特殊结构。它是游戏编程的基础，因此，我们将在下一节中更详细地讨论主游戏循环。稍后，我们还会在本书中再次遇到这个主题，并且会讨论得更深入。\n\
  \n### 主游戏循环\n\n主游戏循环是一种常见结构，几乎出现在每一款电子游戏中。使电子游戏具有交互性和动态性的代码在主游戏循环中运行，但被划分为不同的主要职责。循环本身是一个受控的无限循环，使游戏能够实时运行；它是游戏中所有对象被更新并随后绘制到屏幕上的地方^(⁷)。\n\
  \n游戏循环的基本职责可以分解为以下步骤：初始化、更新和绘制。初始化步骤可能发生在游戏生命周期的不同时刻，但必须在某个时刻发生。更新步骤是所有游戏逻辑运行的地方。在这里，代码处理诸如碰撞检测、命中、音效、敌方\
  \ AI 等事务。最后，既然游戏状态已经更新，就该将新的游戏状态绘制到屏幕上了。这就是绘制步骤的用武之地。同时请记住，根据具体游戏的不同，网络功能也可以添加到更新步骤中。\n\
  \n在联网多人游戏的情况下，主游戏循环将包含与网络对象的同步。这就是主游戏循环的结构，在进行游戏编程时，你应该牢记这一点。在下一节中，我们将讨论所包含游戏项目的一般结构。这将有助于我们开始浏览不同项目的类。\n\
  \n### 程序结构\n\n本书附带的三款游戏（地牢陷阱、记忆匹配和乒乓克隆）都使用相同的游戏引擎。即 Java 版本的 MmgGameApi 2D 游戏引擎。整个引擎存在于附带的\
  \ `MmgGameApiJava.jar` 文件中。总的来说，项目的复杂度递增如下：\n\n*   乒乓克隆：简单\n*   记忆匹配：中等\n*   地牢陷阱：专家级\n\
  \n每个项目都包含以下 Java 类的自定义版本以及专有的支持类：\n\n*   静态主类：与游戏本身同名。每个包，包括每个挑战包，都有一个用于执行该版本游戏的静态主类。\n\
  *   `MainFrame.java`：`GamePanel` 类的父类，代表容纳游戏面板的主窗口框架。\n*   `GamePanel.java`：负责绘制、处理输入、切换屏幕等更多功能的主类。\n\
  *   `ScreenGame.java`：运行游戏的屏幕类。\n*   `ScreenMainMenu.java`：运行游戏菜单屏幕的屏幕类。\n\n游戏类有点复杂，所以暂时不要尝试自行编辑它们。到本书结束时，你应该能够很好地处理它们，但在此之前我们还有不少内容要学习。在接下来的部分中，我们将更详细地描述本书附带的游戏。\n\
