  \ //将多维数组索引值归零\n24 dim2[0][0] = 0;\n\n26 //删除指定索引处的数组\n27 dim2[0] = null;\n\n29\
  \ //将多维数组索引值归零\n30 dim3[0][0][0] = 0;\n\n32 //删除指定索引处的数组\n33 dim3[0][0] = null;\n\
  \n35 //删除指定索引处的数组\n36 dim3[0] = null;\n\n38 //删除所有数组\n39 dim1 = null;\n40 dim2 =\
  \ null;\n41 dim3 = null;\n清单 5-4\n多维数组 – 删除\n```\n\n一个演示如何将数组索引值归零以及删除多维数组的示例。\n\
  \n只需将数组变量设置为 `null` 即可正确删除数组。但是，如果你有一个对象数组（在这种情况下引用很重要），那么你可能需要删除多维数组的各个部分。在前面的清单\
  \ 5-4 中，示例代码演示了如何删除多维数组的不同部分。\n\n你可能已经注意到，为了清除多维数组的行或列而设置为 `null` 的数组索引，正是那些需要我们初始化新数组实例的索引。多维数组是我们添加到编码工具箱中的一种新的强大数据结构。我们将按照承诺继续讨论这个话题，并看看\
  \ Java 提供的另一种非常有用的数据结构：哈希。\n\n## 哈希\n\n哈希是使用函数将键映射到值，并将数据存储在哈希表中的过程。哈希是另一种重要的数据类型，其功能很像字典。让我们暂时探讨一下这个想法。你能想到我们学过的一种几乎像字典一样的数据结构吗？想想数组。你用什么来查找数组中的值？你使用一个整数索引值来查找存储在该数组索引中的数据。\n\
  \n这听起来有点像我们用字典查单词，只不过我们用的是数字而不是单词。事实证明，你可以使用数组来实现哈希，但这有点超出了本文的范围。实际上，Java 有一个非常方便的哈希数据结构实现，称为\
  \ `Hashtable`。\n\n\n\n### 声明哈希表\n\n哈希表是我们编码工具箱中一个强大的工具。在简要介绍了哈希表的概念之后，让我们来看看如何在\
  \ Java 编程语言中使用它们。我们先看一下如何在 Java 中声明和实例化一个哈希表。\n\n```\n1 //简单的哈希表声明，隐式使用默认的键、值数据类型为\
  \ Object\n2 Hashtable ht1 = new Hashtable();\n\n4 //高级哈希表声明，显式指定键、值数据类型为 Object\n\
  5 Hashtable ht2 = new Hashtable();\n\n7 //高级哈希表声明，指定键、值数据类型为 Integer，并使用简写形式的初始化\n\
  8 Hashtable ht3 = new Hashtable();\n清单 5-5\n哈希表 – 声明示例\n```\n\n一个使用隐式和显式数据类型规范来声明不同哈希表的示例，针对键值对。\n\
  \n乍一看，这可能有点复杂。让我们详细讨论一下，看看是怎么回事。在继续之前，先快速思考一下，请记住，我们在这里讨论的数据结构比基本数据类型甚至我们之前回顾的一些数据结构都要高级。当我们定义一个\
  \ `Hashtable` 时，我们是在建立一个键和值之间的映射。\n\n这意味着给定某个键，你可以查找一个值。但在这个例子中，键和值也都有各自的数据类型。例如，你可以对两者都使用\
  \ `String`，那么你的 `Hashtable` 就会像一个微型字典一样工作。让我用一个例子来进一步说明这个概念。\n\n```\n//代码\n1 String\
  \ key = \"Java\";\n2 String value = \"Java is a computer programming language.\"\
  ;\n3 Hashtable ht = new Hashtable();\n\n5 ht.put(key, value);\n6 System.out.println(\"\
  The value for key: \" + key + \" is: '\" + ht.get(\"Java\") + \"'\");\n//输出\n1 The\
  \ value for key: Java is: 'Java is a computer programming language.'\n清单 5-6\n哈希表\
  \ – 字符串键、值数据类型\n```\n\n一个声明哈希表、初始化它、设置和获取值的示例。\n\n看一下清单 5-6。注意在声明哈希表时，键值对定义 `<String,\
  \ String>` 中使用了基本数据类型 `String`。我们在回顾 `ArrayList` 时见过这些尖括号。它们用于通过设置内部数据类型来配置某些数据结构。在这里，它们用于设置\
  \ `Hashtable` 的键和值的数据类型。\n\n将我们的注意力转回到清单 5-5，看一下第 2 行。注意我们没有为哈希表的键或值指定数据类型。不用担心，Java\
  \ 会为我们处理，并简单地使用默认数据类型，即 `Object` 数据类型。`Object` 数据类型是 Java 编程语言中所有类的父类，甚至包括你尚未创建的类。我们将在介绍面向对象编程时更详细地介绍\
  \ `Object`。\n\n目前，可以安全地将它们视为由你定义的、不那么通用的 `Object` 的占位符。例如，你可以选择使用 `String` 对象，就像我们在清单\
  \ 5-6 中所做的那样。在清单 5-5 的第 4 行，我们使用了一种 `Hashtable` 声明形式，显式定义了哈希表使用的键和值的数据类型。注意，我们显式定义了与默认情况下会使用的相同数据类型。\n\
  \n接下来，在清单 5-5 的第 8 行，我们声明了一个 `Hashtable`，其键和值使用了装箱的基本数据类型 `Integer`（而不是 `int`）。如果现在有点困惑，不用担心。我们接下来会学习如何使用哈希表，这将有助于加深你对这种数据结构的理解。\n\
  \n### 使用哈希表\n\n在本节中，我们将实际使用我们的新编码工具 `Hashtable`，并研究一些用例，例如获取/设置值、清空和删除 `Hashtable`。让我们基于清单\
  \ 5-6 中的示例进行构建。请记住，在阅读这些代码示例时，键值对的数据类型是可以配置的。\n\n试着将注意力集中在 `Hashtable` 本身的使用以及如何使用方法来操作表中的数据。我们在上一节已经了解了如何声明和初始化\
  \ `Hashtable`。接下来，让我们看看如何在 `Hashtable` 中获取/设置值。\n\n```\n//代码\n01 //准备\n02 String\
  \ key = \"Java\";\n03 String value = \"Java is a computer programming language.\"\
  ;\n04 Hashtable ht = new Hashtable();\n\n06 //设置\n07 ht.put(key, value);\n08 ht.put(\"\
  JRE\", \"Java Runtime Environment\");\n09 ht.put(\"JDK\", \"Java Development Kit\"\
  );\n\n11 //获取\n12 System.out.println(\"The value for key: \" + key + \" is: '\"\
  \ + ht.get(\"Java\") + \"'\");\n13 System.out.println(\"The value for key: JRE is:\
  \ '\" + ht.get(\"JRE\") + \"'\");\n14 key = \"JDK\";\n15 System.out.println(\"The\
  \ value for key: JDK is: '\" + ht.get(key) + \"'\");\n//输出\n01 The value for key:\
  \ Java is: 'Java is a computer programming language.'\n02 The value for key: JRE\
  \ is: 'Java Runtime Environment'\n03 The value for key: JDK is: 'Java Development\
  \ Kit'\n清单 5-7\n哈希表 – 获取和设置值\n```\n\n一个使用变量和常量作为键和值在 Hashtable 中设置和获取值的示例。\n\n注意，我们可以使用变量来指定\
  \ `Hashtable` 的 `put` 方法的键值对，如清单第 7 行所示。在这种情况下，因为我们使用 `String` 作为键和值的数据类型，我们也可以使用\
  \ `String` 常量来显式设置要存储的值。\n\n随后，在第 12–15 行，我们使用 `Hashtable` 的 get 方法从数据结构中提取值，并将其附加到我们的输出消息中。接下来，让我们看看如何清空\
  \ `Hashtable` 的值。有几种方法可以做到这一点。让我们直接看代码！\n\n```\n01 //准备\n02 String key = \"Java\"\
  ;\n03 String value = \"Java is a computer programming language.\";\n04 Hashtable\
  \ ht = new Hashtable();\n\n06 //设置\n07 ht.put(key, value);\n08 ht.put(\"JRE\", \"\
  Java Runtime Environment\");\n09 ht.put(\"JDK\", \"Java Development Kit\");\n\n\
  11 //显式移除所有条目\n12 ht.remove(key);\n13 ht.remove(\"JRE\");\n14 ht.remove(\"JDK\"\
  );\n\n16 //隐式移除所有条目\n17 ht.clear();\n清单 5-8\n哈希表 – 清空值 第 1 部分\n```\n\n一个使用显式和隐式方法从\
  \ Hashtable 中清空值的示例。\n\n从清单中可以看出，在大多数情况下，你需要知道用于存储数据的键。如果没有键，你总是可以清空整个数据结构，如第 17\
  \ 行所示，但如果你想删除一个特定的条目却没有它的键，该怎么办？事实证明，有一种巧妙的方法可以获取哈希表中存储的所有键，并将它们存储在一个 `ArrayList`\
  \ 中；回想一下我们在第 3 章中对 `ArrayList` 的回顾。接下来让我们看看这种方法。\n\n```\n//代码\n01 //准备\n02 String\
  \ key = \"Java\";\n03 String value = \"Java is a computer programming language.\"\
  ;\n04 Hashtable ht = new Hashtable();\n\n06 //设置\n07 ht.put(key, value);\n08 ht.put(\"\
  JRE\", \"Java Runtime Environment\");\n09 ht.put(\"JDK\", \"Java Development Kit\"\
  );\n\n11 ArrayList keys = (ArrayList)ht.keys();\n12 for(String name : keys) {\n\
  13     ht.remove(name);\n14 }\n清单 5-9\n哈希表 – 清空值 第 2 部分\n```\n\n一个使用 ArrayList 作为枚举来清空\
  \ Hashtable 中值的示例。\n\n\n\n清单 5-9 中的前几行代码与之前的清单相同。差异从第 11 行开始。请注意，我们调用了 `Hashtable`\
  \ 类的 keys 方法，该方法返回一个可以强制转换为 `ArrayList` 的值。由于哈希表键的数据类型是 `String`，我们需要一个 `String`\
  \ 类型的 `ArrayList` 来存储这些信息。\n\n正如我们之前所见，列表声明中的尖括号 `<>` 用于指定其数据类型。我们的列表可以存储哈希表中的键，这样一来，我们就可以遍历这些键并访问哈希表中存储的每个值。请记住，我们无需了解哈希表内部的具体内容；现在，我们可以采用数据驱动的方式，遍历哈希表并查看每个键映射到的值。\n\
  \n请注意，在第 13 行的示例中，我们使用这种方法专门从哈希表中删除了每个条目。对于更高级的数据结构，通常有更多内容需要讨论，哈希表也不例外。就我们这里的目的而言，你已经拥有了一个坚实的基础，并且我们的编程工具箱中又多了一个强大的新工具。在下一节中，我们将介绍另一种数据结构：栈。\n\
  \n## 栈\n\n栈是另一种基础数据结构，在编程中非常有用。它经常出现在不同的场景和不同的算法中。栈是一种更抽象的数据结构。它基于这样一个概念：最后压入栈中的项最先被弹出栈。\n\
  \n我之所以将这种数据结构描述为抽象，是因为它可以很容易地使用我们目前已经介绍过的其他一些数据结构来实现。例如，我们可以使用数组或列表来相当容易地实现一个栈。在处理数据结构时，这一点需要牢记，因为它们的实现方式会以不同的方式影响其性能。\n\
  \n***游戏编程提示：并非所有数据结构都是平等的。它们在检索、搜索、排序等常见操作中的性能各有不同的属性。请花时间选择最适合你用例的数据结构。*\n\n在下一节中，我们将了解如何在\
  \ Java 中声明和初始化一个栈。我们不会深入探讨栈的底层实现，但会学习如何使用栈的基础知识。让我们开始吧！\n\n### 声明栈\n\nJava 作为一种成熟且完整的编程语言，已经为我们提供了一个栈的实现：`Stack`\
  \ 类。在清单 5-10 中，我们将了解如何声明和初始化一个栈。\n\n```\n1 //使用默认数据类型 Object 的基本栈声明\n2 Stack stck1;\n\
  \n4 //使用 String 数据类型的栈声明\n5 Stack stck2;\n\n7 //使用 Object 数据类型的栈声明\n8 Stack stck3;\n\
  清单 5-10\n栈 – 声明栈\n```\n\n一个声明配置为保存不同数据类型的栈的示例。\n\n非常简单，声明一个栈看起来与我们目前介绍的其他数据结构的操作非常相似。让我们通过一个示例来进一步讨论，该示例展示了如何以不同方式实例化一个栈。\n\
  \n```\n01 //使用默认数据类型 Object 的基本栈实例化\n02 Stack stck1;\n03 stck1 = new Stack();\n\n\
  05 //使用 String 数据类型的栈实例化\n06 Stack stck2 = new Stack();\n\n08 //使用 Object 数据类型的栈实例化\n\
  09 Stack stck3;\n10 stck3 = new Stack();\n清单 5-11\n栈 – 实例化栈\n```\n\n一个实例化配置为保存不同数据类型的栈的示例。\n\
  \n声明一个栈与我们在本文中介绍的其他数据结构声明非常相似。请注意使用尖括号来自定义栈的数据类型。一种快捷方式是在实例化变量时仅使用括号 `<>`，而不包含数据类型。在\
