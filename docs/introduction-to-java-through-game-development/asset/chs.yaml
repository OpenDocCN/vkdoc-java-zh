  \ `ScreenGame` 类添加新图像以及如何控制它们。你正在通往制作下一个伟大游戏的道路上！\n\n9. 调试技术\n\n无论你多么努力，你的第一个软件解决方案的实现很少是完美的。大多数时候，我们需要调试代码，以弄清楚它在做什么，更重要的是，它哪里做错了。为了成为任何语言的成功程序员，我们需要能够熟练地调试程序，因此我们将介绍一些关于这个主题的基本概念。\n\
  \n输出跟踪\n\n最基本、最有效的调试技术之一不需要特殊的软件、IDE 或库。输出跟踪使用输出语句来标记正在执行的代码以及某些变量的值。让我们通过一个例子来引出讨论。\n\
  \n```\n//code\n01 public void CheckForMatches(MemoryItem itm) {\n02     System.out.println(\"\
  CheckForMatches: START\");\n03     if(clickedCards != null) {\n04         int len\
  \ = clickedCards.size();\n05         Stack tmp = new Stack();\n06           System.out.println(\"\
  CheckForMatches: AAA: \" + len);\n\n08         for(int i = 0; i < len; i++) {\n\
  09             MemoryItem tItm = clickedCards.pop();\n10             ProcessMatchCheck(tItm,\
  \ itm);\n11             tmp.push(tItm);\n12         }\n\n\n\n14             System.out.println(\"\
  CheckForMatches: BBB: \" +  clickFreeze);\n15         if(!clickFreeze) {\n16   \
  \          clickedCards.addAll(tmp);\n17         }\n\n19         System.out.println(\"\
  CheckForMatches: CCC: \" + clickedCards.size());\n20     }\n21     System.out.println(\"\
  CheckForMatches: STOP\");\n22 }\n//output\n01 CheckForMatches: START\n02 CheckForMatches:\
  \ AAA: 1\n03 CheckForMatches: BBB: true\n04 CheckForMatches: CCC: 2\n05 CheckForMatches:\
  \ STOP\n清单 9-1\n使用输出语句调试程序的示例\n\n一个使用简单标准输出语句来跟踪和调试程序的示例。\n你可能还记得记忆匹配游戏编程挑战中的这段代码片段。在这个清单中，我们使用输出语句来跟踪该方法的功能。请注意，我们跟踪了关键信息，例如方法调用的开始和结束，以及`clickedCards`数据结构的大小。像这样的调试可以帮助你直观地了解代码块执行时发生的情况。这可以极大地帮助你修复代码实现中的任何错误。\n\
  \n至此，我们介绍了输出跟踪这一基本调试技术。在下一节中，我们将介绍使用 IDE 调试程序的更高级技术。让我们来看看 NetBeans IDE 中可用于调试 Java\
  \ 游戏的工具！\n\nIDE 调试功能\n另一种稍微高级一点的调试 Java 程序的方法是依赖 NetBeans IDE 中可用的工具。其优点是更高级、更高效、更强大，但代价是需要使用\
  \ IDE 来完成调试任务。这没问题，但如果你正在进行“设备上”调试，则无法享受使用 IDE 工具的便利。你将不得不退回到更基本的输出跟踪技术。\n\n让我们花点时间讨论一下\
  \ NetBeans IDE 中的调试功能。我们将保持高层次的概述，并专注于那些旨在帮助我们查找和修复代码中错误的功能。本章不会深入探讨更高级别的项目调试。NetBeans\
  \ IDE 中的调试按钮栏如图 9-1 所示。\n\n![](img/537429_1_En_9_Fig1_HTML.jpg)\n\n一张 NetBeans 调试栏图标的图片，分为两行，包含停止、暂停、播放、快退、快进、下载和上传按钮。\n\
  \n图 9-1\n描绘 NetBeans 调试栏的图片\n\n在进入调试模式（Ctrl+F5）后，你可以在 NetBeans IDE 顶部中央找到这个按钮栏。显示的按钮有：停止、暂停、继续、单步跳过、单步跳过表达式、单步进入和单步跳出。\n\
  要看到调试按钮栏，你必须处于项目调试模式。点击 IDE 窗口顶部的“调试项目”按钮，或按键盘上的 Ctrl+F5 开始调试当前程序。\n在上图中，你可以看到跟踪开始前的调试栏（非活动按钮）以及跟踪开始后的调试栏（活动按钮）。NetBeans\
  \ IDE 调试器旨在与断点配合使用。你可以通过点击代码行号附近（文本编辑器的边缘）来在代码的任何行设置断点。这将在所选行上创建一个红色高亮，表明它已被设置为调试断点。\n\
  \n你可能会问，什么是断点？嗯，断点告诉调试器在代码的该点停止执行程序，以便你可以查看并了解在该代码点不同变量的情况。让我们看看 NetBeans IDE 中的断点是什么样子的。\n\
  \n![](img/537429_1_En_9_Fig2_HTML.jpg)\n\n一张电脑屏幕截图，显示了一个菜单栏和四个面板，分别是项目、导航器、NetBeans\
