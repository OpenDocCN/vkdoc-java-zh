  \n## 数值表达式\n\n第一种表达式类型，数值型，可能是普通人最熟悉的。我们在数学课上走神时见过无数公式，而这基本上就是在 Java 中编写公式的方式。数值表达式可以是复合表达式，并使用数值运算符将多个简单表达式连接在一起。\n\
