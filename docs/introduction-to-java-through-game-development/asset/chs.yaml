  \n在我们讨论不同调试按钮的实际功能之前，先看看在代码中设置断点后开始调试程序会发生什么。\n\n![](img/537429_1_En_9_Fig3_HTML.jpg)\n\
  \n一张截图，包含一个菜单栏和四个面板，分别是调试、导航器、屏幕游戏 Java 的编程代码以及变量。\n\n图 9-3\n描绘调试过程中在断点处停止的图片\n\n\
  一张描绘 NetBeans IDE 在调试模式下停在断点处的图片。请注意，调试按钮栏现在已完全激活。\n当调试器到达一个断点时（在本例中，该断点设置在第 5 章挑战\
  \ 1 中记忆匹配游戏的一个副本中），这个特定的断点会在记忆匹配游戏板上点击了两张卡片时被触发。调试器将检测到断点并停止，等待我们的指令。我们可以使用调试栏上的所有按钮来调整程序的下一个执行行。\n\
  \n现在似乎是讨论调试按钮栏上每个按钮功能的好时机。我将在此列出它们并附上简要的用途说明。\n\n*   **调试项目 (Ctrl+F5)**：用于启动项目调试会话。\n\
  *   **结束调试会话 (Shift+F5)**：用于结束项目调试会话。\n*   **暂停**：用于暂停当前调试会话的按钮。\n*   **继续 (F5)**：用于继续调试器。程序将执行直到遇到下一个断点。\n\
  *   **单步跳过 (F8)**：当到达断点时，使用此按钮执行下一行代码。\n*   **单步跳过表达式 (Shift+F8)**：此按钮允许你逐步执行表达式中的每个方法调用，并查看每个方法调用的输入参数以及产生的输出值。如果没有更多的方法调用，单步跳过表达式的行为与单步跳过命令相同。\n\
  *   **单步进入 (F7)**：使用此按钮进入方法调用，以查看方法参数和返回值，并继续调试方法执行过程。\n*   **单步跳出 (Ctrl+F7)**：使用此命令执行当前函数的剩余部分，并在函数返回完成时中断。\n\
  \n从可用的选项可以看出，使用 NetBeans 内置调试器探索 Java 程序的变量、参数和返回值非常容易。你可能需要一些时间来积累经验，才能真正充分利用这些调试工具，但这没关系，反正你本来就要编写代码。至此，本节内容结束。在下一节中，我们将了解\
  \ Java 编程语言中的异常。\n\n异常\n在之前讨论 Java 编程语言中的流程控制时，我们曾简要接触过`Exception`类以及一般的 Java 错误处理。我们将重新讨论这个主题，并谈谈在\
  \ Java 程序中使用异常的一些更细致的要点。\n\n处理异常\n当一行 Java 代码由于某种原因无法正常执行时，就会生成异常。发生这种情况时，会生成一个包含错误信息和当前执行堆栈跟踪的异常。为了响应这些错误，我们必须在代码中使用\
  \ Try-Catch 语句。\n\n正如我们之前所见，Try-Catch 语句允许我们尝试运行一段代码，并响应在此过程中可能出现的任何错误。这可能会导致某些实现决策，这些决策可能对你的程序产生更广泛的影响，值得讨论。让我们看一些\
  \ Try-Catch 语句的示例。请注意代码中的一些细微差别，我们接下来会讨论它们。\n\n```\n//code\n01 System.out.println(\"\
  Exception #1:\");\n02 try {\n03     String s = null;\n04     int l = s.length();\n\
  05 } catch (Exception e) {\n06     e.printStackTrace();\n07 }\n```\n\n\n09 System.out.println(\"\
