  | String | 一系列 Unicode 字符 | 0（空字符串） | 给定系统上 JRE 支持的最大字符串长度或 2147483647 个字符 | String
  s; |


  *Java 编程语言中的基本数据类型集合。*


  不要让这张数据表吓到你。这里其实并没有太多复杂的东西。把它们看作是在程序中描述数据的基本工具。有些你会比其他用得更频繁。有时，很多类型看起来都是不错的选择。你需要积累一些用
  Java 解决问题的经验，才能快速、自信地决定变量应该使用哪种数据类型。即便如此，有时也很难抉择。总的来说，我建议使用能够支持你期望存储在给定变量中的数据，并且不多不少刚刚好的数据类型。


  例如，如果你要存储银行账户余额，使用 `float` 可能就足够了。很少有人能拥有需要 `double` 数据类型才能表示的财富。让我们通过一个通用的思考过程来确定使用哪种数据类型。你需要小数级别的精度吗？如果不需要，那么可以忽略
  `float` 和 `double`。如果你不是要存储字符或字符串，那么可以忽略 `char` 和 `string` 数据类型。这样就剩下 `byte`、`short`、`int`
  和 `long`。


  很可能 `long` 太大了，我们很少需要处理这么大的数字。`Byte` 非常小。只有在处理二进制数据时才需要使用 `byte`；在大多数情况下，`short`
  和 `int` 就足够了。然而，`short` 的最大值较小，这有点限制性。它不够大，以至于在数值上很容易被超出。


  这会使我们陷入尴尬的境地，因为我们的变量将无法正常工作。它将无法跟踪超出 `short` 范围的数字。在这个小小的思维实验中，我们很可能会决定使用 `int`。如果你有理由选择另一种基本数据类型，那么在权衡使用该数据类型的因素时，你就会得出那个结论，就像我们在这里所做的一样。


  当你想要跟踪某件事是否发生时，`Boolean` 数据类型就派上用场了。在程序中（包括视频游戏），有很多情况你会将布尔变量设置为 `true` 或 `false`，以指示某种情况、值、状态等的存在。这些变量的使用很突出，因为你只需要用一个值来表示变化。如果你可以用一个整数替换该变量，并分别使用
  0 和 1 来表示 `false` 和 `true`，那么该变量很可能应该使用 `Boolean` 数据类型。


  关于基本变量的介绍，我想讲的就是这些。稍后当我们遇到本章的编程挑战时，我们将获得一些使用它们的经验。让我们来看看如何使用基本数据类型的变量。




