  12 }\n\n14 //char\n15 u = \"c\";\n16 try {\n17     char tC = u.toCharArray()[0];\n\
  18 } catch (Exception e) {\n19     //错误，退出程序\n20     return;\n21 }\n\n23 //short\n\
