  \n\n\n## 挑战解决方案\n\n本挑战的解决方案相当直接，但需要你在文件中搜索需要修改的位置，将 `ArrayList` 的方法或构造函数替换为 `Stack`\
  \ 类中的等效方法或构造函数。查看解决方案包将显示你需要进行修改的确切位置。\n\n核心思路是将这些方法调用：\n\n```\nclickedCards.add(itm);\n\
  clickedCards.get(i);\n```\n\n替换为：\n\n```\nclickedCards.push(itm);\nclickedCards.pop();\n\
  ```\n\n你还需要更改变量的声明和初始化。同时，必须确保在从栈中弹出值时不会丢失数据。完成修改后，右键点击本地包版本中的 `MemoryMatch.java`\
  \ 文件，选择“运行文件”选项来运行它。你应该不会看到游戏功能有任何中断，因为在这种情况下，`Stack` 将功能性地替代 `ArrayList`。\n\n![](img/537429_1_En_5_Fig1_HTML.jpg)\n\
