  \n***游戏编程说明：在 Java 游戏实现中使用带有公共字段的简单类是完全正常的。当你需要了解字段值何时发生变化时，才开始关注对字段访问的控制。然后，你可以定义与字段交互的方法，并在必要时重构现有代码。**\n\
