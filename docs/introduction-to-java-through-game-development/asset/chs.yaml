  \ 类\n```\n\n许多新的方法声明展示了类方法的某些方面，例如多个方法参数、方法变量作用域以及 Java 语言的变长参数特性。\n\n在清单 7-6 中，我展示了一些声明类方法的微妙细节。在第\
  \ 1 行，`setAll` 方法接受多个不同数据类型的参数，并使用它们来初始化类的字段。接下来，在第 8 行，`testVariableScope` 方法用于演示声明一个隐藏了类字段的局部方法变量。在这种情况下，`numberOfPlayers`\
