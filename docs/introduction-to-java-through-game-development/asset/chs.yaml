  \ Java 编程学习之旅，首先概述“编程”计算机的含义，然后简要介绍 Java 编程语言的历史以及其他一些有趣的话题。\n\n"
- "# 2. 什么是 Java 编程\n\n如果你已经决定开始学习如何用 Java 编程，并且已经读到了这里，那么讨论一下 Java 编程到底是什么可能是个好主意。在本章中，我们将简要回顾历史，从宏观层面讨论计算机编程以及用\
  \ Java 编程的含义。我们还将讨论游戏编程，并介绍那个备受推崇的主游戏循环。\n\n在深入探讨 Java 编程语言的起源故事之前，让我们先花点时间讨论一下计算机编程的总体概念。在接下来的几节中，我们将探索使用不同工具进行计算机编程，并逐步过渡到基于\
  \ IDE 的现代方法。让我们来看一看。\n\n## 计算机与编程\n\n在本节中，我们将讨论计算机编程的实际含义。如果你在网上搜索这个短语，可能会找到类似如下的定义：\n\
  \n“计算机编程是专业人员用来编写代码的过程，这些代码指示计算机、应用程序或软件程序如何执行^(¹)。在最基本的层面上，计算机编程是一组用于促成特定动作的指令。”\n\
  \n虽然这个定义相当准确，但我对其中的一点有异议，那就是“专业人员”这个词。编程并不需要是“专业人员”才能做；任何人都可以！让我们进一步探讨这个想法，并讨论几种不同的计算机编程方式。\n\
  \n### 计算机编程\n\n计算机编程可以有几种不同的形式。我想专注于计算机编程的某个特定方面，并用它来说明 Java 的重要性。我们之前说过，程序是计算机上“一组用于促成特定动作的指令”。这句话中巧妙地隐藏了编程语言的概念。\n\
  \n定义中提到的“一组指令”就是软件开发人员用来编写特定“指令集”以通过计算机程序解决给定问题的编程语言。其中一个基本的指令集是 CPU 的汇编指令集。在某个时期，软件是使用这些古老的工具编写的。汇编编程的一个示例如清单\
  \ 2-1 所示。\n\n```\n1 label_                   ;分支标签\n2 LSL     R0, R1, #0       ;5.1\n\
  3 LSL     R0, R1, #31\n4 LSR     R0, R1, #0\n5 LSR     R0, R1, #31\n6 ASR     R0,\
  \ R1, #0\n清单 2-1\n汇编源代码示例\n```\n\n一段汇编源代码的示例片段。\n\n这个汇编源代码的示例片段展示了一个更大程序的一部分。使用这种媒介编程有其优点，但也有其缺点。其中一个缺点就是使用纯汇编编写程序所需的时间。汇编源代码非常不直观，这导致用它编程时会遇到困难。正如你所见，这种语言的表现力不强。从清单\
  \ 2-1 的汇编代码行中，几乎无法推导出任何上下文含义。这使得使用汇编编程来编写复杂、抽象或繁琐的软件变得困难。\n\n### 编程语言\n\n为了解决汇编编程软件的缺点，开发人员开始创建编程语言。这些“语言”是基于文本的编码，可以转换为汇编源代码，进而转换为相关的二进制代码。\n\
  \n这种方法的好处是，使用更高级语言生成的软件更易于阅读和理解。编写程序变得更具表现力，复杂的程序也比单独使用汇编时更容易管理。清单 2-2 展示了一个更高级语言——C\
  \ 语言的示例。\n\n```\n1 #include \n2 int main()\n3 {\n4     printf(\"Hello World\");\n\
  5     return 0;\n6 }\n清单 2-2\nC 编程语言示例\n```\n\n一个 C 语言程序示例。\n\n更高级的编程语言在代码复用、代码共享和项目管理方面提供了更强的能力。在计算机历史的这个时期，大约在\
  \ 1983 年，C++ 编程语言成为了用于计算机编程的事实上的“指令集”。虽然这种语言在其面向对象的软件设计支持方面提供了强大的能力，但它也产生了一个相当普遍且棘手的问题。\n\
  \n导致许多 C++ 开发人员花费大量时间调试的一个核心问题是内存泄漏的概念。清单 2-3 展示了一个非常简单的 C++ 程序，它创建了一个内存泄漏。\n\n\
  ```\n1 int main() {\n2     //安全使用内存\n3     int * p = new int;\n4     delete p;\n\
  5     //不安全使用内存\n6     int * q = new int;\n7     //没有 delete，内存泄漏\n8 }\n清单 2-3\n\
  C++ 编程语言内存泄漏示例\n```\n\n一段展示内存泄漏的 C++ 程序源代码片段。\n\n这个简单的示例程序演示了在 C++ 中泄漏内存是多么容易，而内存泄漏可能导致各种问题。这正是\
  \ Java 的用武之地。Java 编程语言的主要特性之一是其内置的垃圾回收器，它负责删除未使用的对象、释放内存、防止任何代价高昂的内存泄漏，并节省大量的调试时间。\n\
  \n我们将花更多时间讨论 Java 技术和该语言的历史，但现在，我想稍微转换一下方向，谈谈软件开发人员编写的几种不同类型的程序，以及 Java 在其中的位置。\n\
  \n\n\n### 程序/编程的类型\n\n你可以编写许多不同类型的计算机程序。有些是非常底层的，用汇编语言或系统编程语言（如 C、Rust 或 Go）编写。有些是支持面向对象编程（OOP）设计的高级编程语言，如\
  \ C++、Java 或 Python。\n\n此外，还有一些专为特定程序设计的语言，例如用于 Web 编程的 JavaScript，或用于统计计算的 R。不同的编程语言就像不同的工具一样，各有其独特的属性。有些语言是编译型语言，而有些则是解释型语言。编译型语言通常会产生一个包含原始程序二进制表示形式的可执行文件。\n\
  \n其他语言则是解释型编程语言。解释型编程语言也会被编译，但并非编译成机器码。相反，解释型编程语言会被编译成一种中间形式，这种形式能被编程语言的解释器所理解。解释器是一个特殊的程序，它会运行中间代码，并随后执行该程序。\n\
  \n编程语言有很多重要的方面，但我们只触及其中最重要的部分。Java 编程语言的主要属性是：它是一种强类型、支持 OOP 的解释型编程语言。当我们介绍 Java\
  \ 中的变量时，会详细说明 Java 是强类型语言的含义。目前，简单理解其含义就足够了。\n\nJava 会跟踪并关注程序中任何给定变量的数据类型，并且不允许你将不同类型的数据存储到变量中。有些语言，如\
  \ JavaScript，采用动态类型。这意味着在 JavaScript 中，你可以将任何数据类型存储到任何变量中，而无需重新声明。在后续的编程语言回顾中，会有更多相关内容。\n\
  \n就像任何工具一样，不同的编程语言有不同的最佳用途。Java 编程语言适用于许多不同的领域，从应用程序到 Web 服务器，甚至游戏。不过，公平地说，Java\
  \ 通常不是构建游戏的首选语言。这主要是因为该语言的解释特性会带来一些微小的开销，这是游戏开发者不喜欢的。然而，绝大多数游戏并不会在意这点微小开销，反而可能会受益于使用\
  \ Java 所带来的有序性和简洁性。\n\n尽管如此，Java 仍然是一种可靠的编程语言，其解释特性和对垃圾回收的内置支持使其成为学习编程，特别是学习游戏编程的绝佳选择。视频游戏的设计与大多数其他程序不同。游戏编程要求你构建一个能实时响应用户输入的程序，同时还要处理游戏的所有视频、音频、碰撞检测、敌方\
  \ AI 等，以维持游戏的沉浸感。并且在此过程中不能丢失任何帧，保持动画流畅。\n\n由于游戏具有特定且有时极为苛刻的要求，游戏编程与其他类型的软件开发截然不同。话虽如此，Java\
  \ 是一门很棒的语言，通过开发视频游戏来学习 Java 也是一个很棒的方法！本节内容到此结束。在下一节中，我们将快速回顾历史，聊聊 Java 编程语言的发展历程。\n\
  \n## Java 编程语言\n\nJava 诞生于 1991 年的 Sun Microsystems 公司，当时由 James Gosling、Mike Sheridan\
  \ 和 Patrick Naughton 组成的 Sun 工程师团队试图创建一种独立于处理器、能轻松在小型电子设备上运行的新编程语言。这是 Java 历史中一个重要的被忽视的方面，或许也是\
  \ Java 成为 Android 项目基础部分的原因。\n\n该团队创建了一种具有类似 C++ 语法的编程语言，它可以在小型数字遥控器上运行，并控制按钮和屏幕等电子元件。这个名为“Green\
  \ Project”的项目旨在探索数字控制的家用电子设备与计算机之间的融合，但最终失败了。然而，在 Java 语言即将被历史遗忘之前，它找到了一个潜在的新应用领域——万维网。\n\
  \n1993 年，HTTP 协议和最早的浏览器之一 Mosaic 登上了技术舞台。在此期间，Java 团队意识到互联网非常适合 Java 编程语言与硬件无关的特性。1995\
  \ 年，James Gosling 发布了一款名为 WebRunner 的浏览器，它支持 HTML 内容和嵌入式 Java 小程序。\n\n这巩固了 Java\
  \ 的流行地位，随着早期互联网的兴起，Java 也随之蓬勃发展。在 Flash 出现之前很久，在线创建交互式体验的唯一真正方法就是使用 Java 小程序。事实上，当我刚上大学时，使用\
  \ AWT 的 Java 小程序是计算机科学课程中最早教授的内容之一。\n\n如今，大多数浏览器已不再支持小程序功能。但 Java 已渗透到现代云技术的许多其他方面，既包括使用\
  \ Java EE/Jakarta 的服务器端，也包括基于 Java 编程语言开源克隆版的 Android 客户端。\n\nJava 能够“一次编写，到处运行”的能力近乎神奇。Java\
  \ 是如何在所有这些不同的设备和地方运行的呢？答案在于 Java 运行时环境（JRE）和 Java 虚拟机（JVM）。\n\n### JRE\n\nJRE，更具体地说是\
  \ Java 虚拟机，负责实际执行编译 Java 源代码后生成的 Java 字节码。请记住，Java 是一种解释型语言，这意味着编译后的 Java 程序并非可由给定\
  \ CPU 直接运行的二进制形式。相反，一个虚拟 CPU（即虚拟机）会运行字节码并驱动底层硬件。\n\n关于 JRE 的定义，可以在亚马逊云服务（AWS）网站上找到。其内容如下：\n\
  \n> *Java 运行时环境（JRE）是 Java 程序正确运行所需的软件。Java 是一种为许多当前 Web 和移动应用程序提供动力的计算机语言。JRE 是连接\
  \ Java 程序和操作系统的底层技术。它充当翻译和促进者的角色，提供所有资源，以便一旦你编写了 Java 软件，它就可以在任何安装了 JRE 的操作系统上运行，无需进一步修改。*\n\
