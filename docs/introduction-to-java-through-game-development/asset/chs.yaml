  \ 类中的代码，使其使用`Stack`。你需要在文件中的几个地方调整代码。用于跟踪已点击卡片的变量名为`clickedCards`。\n\n请记住，使用 pop\
  \ 方法时，存储在`Stack`中的值会被移除。这意味着，如果你想多次遍历`Stack`，就必须跟踪弹出的值并在之后恢复它们。你可以将栈中弹出的`MemoryItems`保存在另一个数据结构中，然后使用`Stack`类的`addAll`方法将它们重新添加回去。你必须运行此包的文件\
