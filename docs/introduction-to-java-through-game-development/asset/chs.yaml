  \ 和 #2（第 1–15 行），我们有两个看似相同的 Try-Catch 语句。你能看出两者的区别吗？如果你认为它们捕获的异常不同，那么你猜对了。第一个示例使用了\
  \ `Exception` 类；这是所有其他 Java 异常的父类。捕获这种类型的异常不会给我们提供任何关于出错原因的信息。\n\n接下来的 Try-Catch\
  \ 语句（异常 #2）与之类似，但它旨在捕获 `NumberFormatException`，这是一个更具体的异常类。这个版本的 Try-Catch 语句更直观，因为你可以清楚地看到代码设计用于处理哪种类型的错误。总的来说，我赞同这种方法。但有时，我也会反其道而行之，实现更通用的\
  \ Try-Catch 语句。为什么呢？\n\n嗯，在编写各种 Java 程序和游戏时，你会遇到很多情况，你其实并不关心错误是什么。你真正关心的只是是否发生了错误。如果你觉得使用更具体的异常类没有价值，那么这样做完全没问题。只需记住，最佳实践建议我们使用更具体的异常类。\n\
  \n代码片段中的最后两个示例（异常 #3 和 #4）展示了一个新版本的 Try-Catch 语句。它能够捕获多种类型的异常。请注意第 23 行；该 Try-Catch\
  \ 语句的 catch 子句旨在同时捕获 `NullPointerException` 和 `NumberFormatException`。将其与最后一个异常示例（仅捕获父类\
  \ `Exception`）进行对比。\n\n在这种情况下，我们对 Try-Catch 块中的代码了解的信息要少得多。我们不知道它可能会抛出哪些异常。请注意，代码必须进行调整以抛出每种类型的异常，因为无论首先遇到哪个异常，都会退出\
  \ Try 子句。\n\n这又回到了形式与功能的相同点上。如果了解异常类型对你有益，并且能让你的代码更直观、更可复用，那么就使用这种方法。如果你只关心知道何时出错，而不关心原因，那么就不要在\
  \ Try-Catch 语句中使用更具体的异常。在下一节中，我们将讨论如何在 Java 程序中定义自己的异常。\n\n定义异常\n\n与 Java 中的其他一切一样，异常也是基于类的。正如我之前提到的，Java\
  \ 编程语言中的所有异常都是 `Exception` 父类的子类。因此，你可以定义自己的异常在代码中使用。让我们看一个示例。\n\n```\n1 public\
  \ class MyException extends Exception {\n2     public MyException(String errorMessage)\
  \ {\n3         super(errorMessage);\n4     }\n5 }\n清单 9-3\n定义自定义异常类的示例\n\n一个演示如何创建自定义异常类的示例。\n\
