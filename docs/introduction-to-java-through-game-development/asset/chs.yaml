  地牢陷阱游戏主菜单的截图。\n\n最后，文中还会出现一些提示或旁注。正文中有两种类型的旁注：关于游戏开发的注释和关于 Java 编程语言的注释。这些条目的格式如下：\n\
  \n***游戏开发注释：关于 Java 游戏开发或游戏引擎使用的注释。*\n\n***Java 编程注释：关于 Java 编程的详细注释。*\n\n这种列表类型将用于呈现与游戏开发或\
  \ Java 编程语言相关的主题的扩展或高级信息。\n\n## 目标\n\n本书希望达成几个目标。首先是全面回顾并演示 Java 编程语言的基础特性。其次是介绍\
  \ Java 编程语言中精选的高级特性。最后，本书旨在让你通过使用 NetBeans IDE 和一组附带的视频游戏项目，获得直接处理游戏代码的经验。让我们更详细地看看这些目标。\n\
  \n### Java 基础主题\n\n本书涵盖的 Java 编程语言基础主题及其简要描述如下：\n\n*   概述：计算机编程：计算机编程的简要概述\n*  \
  \ Java 编程语言：Java 编程语言的简史\n*   概述 `–` 游戏编程：游戏编程的简要概述\n*   基本数据类型：Java 中的基本数据类型\n\
  *   高级数据类型：Java 中的高级自定义数据类型\n*   枚举：Java 中的枚举数据类型\n*   使用变量：处理变量\n*   数值表达式：处理数值表达式\n\
  *   布尔表达式：处理布尔表达式\n*   If、Else、Else-If 语句：流程控制，if-else 语句\n*   Switch 语句：流程控制，Switch\
  \ 语句\n*   使用数组：在 Java 中使用数组\n*   基本 For 循环：处理 for 循环\n*   While 循环：处理 while 循环\n\
  *   导入类/库：使用 Java 类和库\n\n本书将为你打下坚实的基础，让你获得处理 Java 编程语言基础方面的经验。在下一节中，我们将介绍本书涉及的高级\
  \ Java 编程主题。\n\n### Java 高级主题\n\n本书确实涉及了一些更高级的 Java 编程主题，但不会深入探讨非常高级的编程。你可能会发现这些主题更具挑战性，因为它们本质上更复杂。我们将为你提供扎实的信息和挑战，以帮助你掌握这些内容。本书涉及的高级主题如下：\n\
  \n*   自定义数据类型：使用类和枚举\n*   Try-Catch 语句：使用 try-catch 语句控制流程\n*   数据结构列表：使用 List 数据结构的简单示例\n\
  *   数据结构字典：使用 Dictionary 数据结构的简单示例\n*   泛型与特化数据结构：泛型与特化数据结构的简要介绍\n*   For-Each 循环：使用\
  \ for-each 循环\n*   概述 `–` 面向对象编程：面向对象编程设计与实现的简要介绍\n*   类：类的简要介绍\n*   字段：使用类字段\n\
  *   方法：使用类方法\n*   构造器：使用类构造器\n*   静态成员：处理静态类成员\n*   类访问：关于类成员访问的讨论要点\n*   类设计：关于类设计与实现的讨论要点\n\
  *   封装：Java 游戏项目中的封装示例\n*   多态：Java 游戏项目中使用多态的示例\n*   继承：继承的简要回顾\n*   项目结构：项目结构的简要回顾\n\
  *   调试：使用调试追踪程序错误和问题。\n\nJava 编程高级主题通常会导致大量需要回顾和讨论的材料。这超出了本书的范围，因此我们将与高级编程主题相关的讨论和挑战保持简短，以便能够涵盖尽可能多的主题和材料。\n\
  \n### 游戏开发主题\n\n由于本书的入门性质，我们不会直接涵盖游戏开发主题，但书中的每个挑战都侧重于将你学到的 Java 编程语言知识应用于实际的视频游戏，因此你将获得一些关于以下游戏开发主题的知识和接触：\n\
  \n*   项目结构：处理三个不同游戏及其类和项目结构的经验。\n*   游戏资源：处理游戏资源的经验。\n*   游戏引擎：本书附带了一个完整的游戏引擎，所有示例游戏都使用它。\n\
  *   主游戏循环：处理并理解主游戏循环重要性的经验。\n\n至此，本节内容结束。我们快速概述了本书将涵盖的不同主题，这些主题既通过主题和挑战直接涉及，也通过处理更大更复杂项目的一部分间接涉及。在下一节中，我们将设置你的开发环境，并获取本书代码的最新副本。\n\
  \n\n\n## 搭建开发环境\n\n在本节中，我们将启动并运行您的开发环境，以便您能对附带的游戏项目进行简单测试，并观察其运行效果。这将让您对这些项目有一个初步了解。首先，我们需要安装并配置好\
  \ IDE。本书使用 NetBeans IDE 进行 Java 项目管理和开发。\n\n首先，我们需要安装一份 Java 开发工具包（JDK）。您可以从 [`www.oracle.com/java/technologies/downloads/`](http://www.oracle.com/java/technologies/downloads/)\
