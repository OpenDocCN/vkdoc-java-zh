  21 System.out.println(\"添加 #5 值: \" + c);\n\n23 System.out.println(\"取出 #1 值: \"\
  \ + ll.poll());\n24 System.out.println(\"取出 #2 值: \" + ll.poll());\n25 System.out.println(\"\
