  \ Java 的访问修饰符来控制对该数据访问的类。在下一节中，我们将探讨类的另一个非常重要的部分：方法。\n\n### 方法\n\n方法是另一种类型的类成员，这意味着它们总是在类定义的上下文中定义的。Java\
  \ 中的方法类似于其他编程语言（如 C 和 C++）中的函数。它们是仅在调用时运行的代码块。它们可以接收参数，也可以返回值。\n\n到目前为止，我一直避免讨论作用域的概念，因为它是一个更高级的编程概念，与语言本身的细微差别关系不大，而更多与任何给定情况下语言元素的结构有关。Java\
  \ 中的变量具有作用域。变量的作用域是指该变量有效且可访问的代码块（一个或多个代码块）。\n\nJava 中的字段与其他变量一样具有作用域，你不仅可以从类外部访问它们（如我们在清单\
  \ 7-4 中所见），还可以在类内部的方法中访问它们。这允许你创建可重用的代码块，这些代码块与类的字段以及传递给方法的任何参数一起工作，以便在需要时生成返回值。实际上，方法可以不接受任何参数，也不返回任何数据。让我们通过几个不同方法声明的示例来进一步讨论。我们将继续使用前两个清单中虚构的\
