  ## 高级数据类型


  仅使用基本数据类型就能做很多事情，但 Java 作为开发工具还能为你提供更强大的能力。有一些高级数据类型值得我们关注。这些包括一种动态数据类型，与我们习惯的静态类型相对。甚至还有一些数据类型帮助我们定义数据集，我们也将在此处进行介绍。


  ### var 关键字与动态类型


  尽管我之前对 Java 严谨、强类型的特点大加赞赏，但该语言实际上支持动态类型。Java 10 中引入的 `var` 关键字使用了数据类型推断，它会根据上下文自动检测变量的数据类型。这是
  Java 的一个相当高级的用法。我们在此不会深入探讨。Java 编程语言中有许多规则来管理 `var` 关键字的使用。


  为简单起见，我将对其用法进行概括和过度简化。如果你愿意进一步探索，可以在此处找到更多信息：


  [`www.geeksforgeeks.org/var-keyword-in-java/`](http://www.geeksforgeeks.org/var-keyword-in-java/)


  正如我之前所说，`var` 关键字允许你对变量使用动态类型。你可以在少数几个地方声明 `var` 类型的变量，但就我们的目的而言，我们将其使用限制在方法内部。我还应该提到，不支持变量数据类型重定义。这意味着
  Java 仅在 `var` 变量首次初始化时检测其数据类型。后续的赋值必须符合首次检测到的数据类型。请允许我通过清单 3-5 中的示例来进一步说明这一点。


