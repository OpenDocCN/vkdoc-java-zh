  \ `ProcessImage` 方法中使用了该异常。该方法接受一个 `MmgBmp` 图像资源参数，并且不返回任何值。此方法的目的是检查传入的图像参数，确保其宽度和高度尺寸大于\
  \ 10 像素。如果不是，则抛出异常。\n\n请注意，该方法使用方法声明中的 `throws` 关键字声明了方法体中会抛出哪些异常。这里可以有多个逗号分隔的条目。当我们想要抛出异常时，我们使用\
  \ `throw` 关键字，后跟我们想要抛出的异常类的实例。在这个示例中，我们使用了虚构的 `MyException` 类，并提供了一个描述性的错误消息。为什么这个实现不理想呢？\n\
  \n它不是一个理想实现的原因在于，异常类并不能指示它设计用来表示的错误。这不如将我们的异常类命名为 `ImageResourceException` 而不是 `MyException`\
  \ 那样直观。再次强调，直观和清晰是更好的实现选择。在下一节中，我们将简要了解抛出异常后返回的信息，即堆栈跟踪。\n\n堆栈跟踪\n\nJava 编程的一个重要方面是能够处理不可预见的错误。这些错误会以异常的形式显现出来，并在你最意想不到的时候以最糟糕的方式使程序崩溃。当你遇到异常时，通常会收到一条消息和打印到标准错误的堆栈跟踪。\n\
  \n有时，你执行程序的环境可能不允许你访问输出流。你可能需要尝试在程序本身中捕获并指示错误。在这种情况下，明智的做法是实现一个非常高级的、包罗万象的 Try-Catch，以防止程序完全崩溃。这将让你有机会显示一些关于错误的信息，你可以利用这些信息来解决问题。\n\
  \n无论如何，大多数时候你都应该能够访问异常堆栈跟踪。NetBeans 会在项目执行期间将任何输出直接显示到 IDE 中的一个面板中。让我们看一个堆栈跟踪示例，以便更好地理解它为我们提供的信息以及我们如何利用它来修复错误。\n\
  \n```\n1 net.middlemind.PongClone.MyException: 图像资源太小！\n2    at net.middlemind.PongClone.NewClass.main(NewClass.java:302)\n\
  清单 9-5\n简单异常堆栈跟踪示例\n\n一个由 Java 异常产生的简单堆栈跟踪示例。\n\n\n\n这个堆栈跟踪应该很熟悉。我们在之前回顾异常处理时已经见过它。这里再次使用它是因为它非常简单。抛出错误的代码位于项目的静态\
  \ main 执行方法中。这意味着堆栈跟踪中只有一个条目。异常对象提供给我们的消息如下：\n\n```\nnet.middlemind.PongClone.MyException:\
  \ Image resource is too small!\n```\n\n它告诉我们异常类以及与异常关联的消息。下一个条目是异常起源的行号和类方法。让我们来看一下。\n\
  \n```\nnet.middlemind.PongClone.NewClass.main(NewClass.java:302)\n```\n\n在 PongClone\
  \ 项目中，一个名为 `NewClass` 的类（这是我个人的测试类）中，在静态的 `main` 方法里，出现了一个错误，具体在第 302 行。我将通过把异常移动到一个新的静态方法\
  \ `ExceptionTest` 中来演示这个“堆栈”。请记住，在没有对象实例的情况下，只能从静态方法访问静态类成员。现在让我们运行程序，看看异常堆栈跟踪是什么样的。\n\
  \n```\nnet.middlemind.PongClone.MyException: Image resource is too small!\nat net.middlemind.PongClone.NewClass.ExceptionTest(NewClass.java:302)\n\
  at net.middlemind.PongClone.NewClass.main(NewClass.java:339)\n```\n\n花点时间查看堆栈跟踪，思考一下发生了什么。现在跟踪中有了第二行，因为执行堆栈上有了第二个条目，因为导致异常的代码现在位于\
  \ `ExceptionTest` 方法中。由此可知，堆栈跟踪中的第一个行号是导致错误的代码行的位置，而最后一个行号是执行堆栈中第一个方法的位置。关于堆栈跟踪的打印输出，我想讲的就是这些。现在，你在处理非常长的空指针异常堆栈跟踪时应该更有信心了！\n\
