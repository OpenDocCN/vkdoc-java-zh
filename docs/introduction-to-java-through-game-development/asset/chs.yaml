  这更像是一个在回顾 Java 面向对象编程支持时需要讨论的话题。既然我们讲到这里，不妨提一下。Java 使用一个称为引用的概念。这适用于所有对象，包括语言中的数组。这样，`a`
  和 `b` 是变量，但它们是对数组对象的引用。


  当你尝试复制一个引用时，它只是改变了新变量所指向的内容。因此，虽然看起来你似乎复制了整数数组 a，但实际上你创建了两个变量 `a` 和 `b`，它们引用内存中的同一个数组。我们可以在清单
  3-14 中演示这一点。


