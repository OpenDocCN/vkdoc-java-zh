  \ 循环与 for-each 循环进行对比，重构了一些早期代码以使用新的循环结构。我们看到了 for-each 循环可以多么简洁和直观。\n\n*   **基本\
  \ While 循环**：我们使用了基本 while 循环，研究了它们与 for 循环的区别，并指出了需要 while 循环而非 for 循环的不同用例。\n\n\
