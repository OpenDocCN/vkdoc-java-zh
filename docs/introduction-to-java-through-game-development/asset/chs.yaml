  \n## 位运算表达式\n\n位运算表达式并不常用。事实上，你可能编写 Java 程序多年也未曾使用过一次。这是因为它们属于底层操作，因此只有在处理字节和二进制数据时才会派上用场。然而，这并不能成为不熟悉它们的借口，所以让我们来看一下。\n\
  \n```\n01 //准备\n02 int x, y, z;\n\n04 //简单位运算表达式\n05 x = 5;\n06 y = 7;\n07 z = x\
  \ | y; //按位或，z = 7\n08 z = x & y; //按位与，z = 5\n09 z = x ^ y; //按位异或，z = 2\n10 z\
  \ = ~x; //按位取反，z = 10\n\n12 //复合位运算表达式\n13 z = ++x | y--;\n14 z = x * y & y + 10;\n\
  15 z = x ^ y / 256;\n16 z = ~(x * 2);\n清单 4-7\n位运算表达式示例\n```\n\n简单和复合位运算表达式的示例。\n\
  \n详细讲解位级操作超出了本文的范围。花点时间查阅布尔运算 AND、XOR、OR 以及按位取反，以了解更多信息。再次强调，这是 Java 编程语言中一个相对深奥的领域。对这些内容有初步了解可能就足够了。在下一节中，我们将介绍\
  \ Java 支持的其他一些位级表达式。\n\n## 位移表达式\n\n我们将讨论的最后一组主要表达式也是位级的；它们是位移表达式。虽然你可能认为这些对你没用，因为你不会进行任何二进制编程，但请三思。位移是一种非常快速的乘以或除以\
  \ 2 的方法。\n\n这在某些情况下是一种非常频繁的调整，值得了解。如果你发现自己经常需要乘以或除以 2，那么可以考虑使用位移运算符。让我们快速看一些位移表达式。\n\
  \n```\n//代码\n1 byte a = 64, g;\n2 i = a << 2;\n3 g = (byte)(a << 2);\n4 System.out.println(\"\
  a: \" + a);\n5 System.out.println(\"i and g: \" + i + \", \" + g);\n//输出\n1 a: 64\n\
  2 i and g: 256, 0\n清单 4-8\n位移表达式示例\n```\n\n一个简单位移表达式的示例，比较了移位后的值在整数变量和字节变量赋值中的差异。\n\
  \n请注意，在上一个清单中，原始值 64 变成了 256，即 64 * 4。这告诉我们关于将值左移两位的本质是什么？它告诉我们，左移两位相当于乘以 4。类似地，左移一位相当于乘以\
  \ 2，以此类推。反过来，当右移时，我们是在做除法。例如，从值 256 开始，执行右移两位操作，相当于将 256 除以 4，得到值 64，即原始值。\n\n有符号右移\
  \ `>>` 和无符号右移 `>>>` 之间的区别在于：对于有符号右移，位值被推向右侧，并且在数字左侧添加一个与数字符号相同值的新位。而对于无符号右移，新位始终为零。\n\
  \n再次强调，位运算并非适合所有人，如果你不需要或不想使用它们，完全可以不用。但你应该知道这些功能的存在，即使你并不完全熟悉如何使用它们。在开始编码之前，你随时可以查阅一些示例。接下来，我们将总结\
  \ Java 语言的全部运算符，并按优先级排序。\n\n\n\n## 运算符与运算符优先级\n\n既然我们已经涵盖了 Java 支持的所有主要表达式类别，现在应该全面审视所有涉及的运算符，并按运算符优先级对它们进行排序。什么是运算符优先级？运算符优先级是指运算符在表达式中被处理的顺序。\n\
  \n下面的列表展示了 Java 运算符，从最重要（最先处理）到最不重要（最后处理）。每个运算符的文字描述旁边是其符号。\n\n*   数组索引 **[]**、成员访问\
  \ **.**、方法调用 **.**、后置自减 **--**、后置自增 **++**\n\n*   按位取反 **~**、类型转换 **()**、逻辑非 **!**、创建对象\
  \ **new**、前置自减 **--**、前置自增 **++**、一元减号 **-**、一元加号 **+**\n\n*   除法 **/**、乘法 **\\\
  ***、取余 **%**\n\n*   加法 **+**、字符串拼接 **+**、减法 **-**\n\n*   左移 **<<**、有符号右移 **>>**、无符号右移\
  \ **>>>**\n\n*   大于 **>**、大于等于 **>=**、小于 **<**、小于等于 **<=**、类型检查 **instanceof**\n\
  \n*   等于 **==**、不等于 **!=**\n\n*   按位与 **&**、逻辑与 **&&**\n\n*   按位异或 **^**、逻辑异或 **^**\
  \ **（针对布尔运算符）**\n\n*   按位或 `|`、逻辑或 **||**\n\n*   条件与 **&&** **（针对布尔运算符）**\n\n* \
  \  条件或 **||** **（针对布尔运算符）**\n\n*   条件 **?:** **（三元运算符）**\n\n*   赋值 **=**、复合赋值 **+=**、**-=**、**\\\
  *=**、**/=**、**%=**、**&=**、**^=**、**|=**、**<<=**、**>>=**、**>>>=**\n\n这并非需要死记硬背的内容，但你应该有所了解。在大多数情况下，我建议使用括号对运算符和值进行分组，并显式控制优先级。至此，本节内容就结束了。在下一节中，我们将探讨控制\
  \ Java 程序流程的不同方式。\n\n## 流程控制\n\n尽管到目前为止你已经学到了相当多的知识，但我们仍然只知道如何声明变量和建模数据。在控制程序如何执行方面，我们还没有太多方法。流程控制是任何程序的重要组成部分。没有它，我们就无法根据变量的值执行不同的代码分支。没有流程控制，你无法编写出很多有趣的程序。\n\
  \n我们将探讨三种控制 Java 程序流程的不同方式。第一种是传统的 If-Else 语句，包括 Else-If 子句。第二种是用于支持将代码分离成多个不同分支的语句：Switch\
  \ 语句。最后，我们有一种流程控制方法，允许我们通过 Try-Catch 语句来响应程序中的异常（即意外错误），从而改变程序的执行路径。让我们来看看吧！\n\n\
  ### If-Else 语句\n\nIf-Else 语句（这也包括 Else-If 子句，但为了简洁，我们不会显式列出它）是你在 Java 程序中控制执行流程的主要方式。If-Else\
  \ 语句接受一个布尔表达式，并根据表达式的结果有条件地执行特定代码。这种类型的布尔表达式被称为条件表达式。让我们来看一个没有显式条件表达式的基本 If-Else\
  \ 语句。\n\n```\n1 if(条件表达式) {\n2    // then 子句\n3 } else {\n4    // else 子句\n5 }\n\
  列表 4-9\n基本 If-Else 语句示例\n```\n\n一个没有显式条件表达式的基本 If-Else 语句示例。\n\n让我们通过一个简单的示例来进一步理解这个概念，该示例使用\
  \ If-Else 语句来控制变量的初始化。\n\n```\n1 boolean b = true;\n2 int i = 0;\n3 if(!b) {\n4\
  \    // then 子句\n5    i = 5;\n6 } else {\n7    // else 子句\n8    i = 10;\n9 }\n列表\
  \ 4-10\nIf-Else 语句与变量初始化示例\n```\n\n一个使用 If-Else 语句控制变量初始化的示例。\n\n这种 If-Else 语句的用法是不是让你觉得似曾相识？你能想到另一种使用我们已有工具实现相同功能的方法吗？提示一下：它也是一种条件形式。如果你想到了三元运算符，那么你就想对了。\n\
  \n```\n1 boolean b = true;\n2 int i = !b ? i = 5 : i = 10;\n列表 4-11\nIf-Else 语句与变量初始化示例\n\
  ```\n\n一个使用条件表达式实现与 If-Else 语句相同变量初始化的示例。\n\n当然，If-Else 语句不仅仅是基本形式和变量初始化那么简单。让我们来看一个来自\
  \ Pong Clone 游戏 `ScreenGame.java` 类的示例。你可以在 `net.middlemind.PongClone` 包中找到这个 Java\
  \ 类。\n\n```\n01 public boolean ProcessKeyPress(char c, int code) {\n02    if(state\
  \ == State.SHOW_GAME && pause == false) {\n03         if(gameType == GameType.GAME_TWO_PLAYER)\
  \ {\n04             if(c == 'x' || c == 'X') {\n05                 paddle1MoveUp\
  \ = false;\n06                 paddle1MoveDown = true;\n07                 return\
  \ true;\n08             } else if(c == 's' || c == 'S') {\n09                 paddle1MoveUp\
  \ = true;\n10                 paddle1MoveDown = false;\n11                 return\
  \ true;\n12             }\n13         }\n14     }\n15     return false;\n16 }\n\
  列表 4-12\n来自 ScreenGame.java 的复杂 If-Else 语句示例\n```\n\n一个使用 If-Else 语句处理 Pong Clone\
  \ 游戏键盘输入的复杂示例。\n\n让我们重点关注第 4 到 13 行的 If-Else 语句。我们将把这个 If-Else 语句提取出来，并稍微调整其结构。\n\
  \n```\n01 if(c == 'x') {\n02     paddle1MoveUp = false;\n03     paddle1MoveDown\
  \ = true;\n04     return true;\n05 } else if(c == 'X') {\n06     paddle1MoveUp =\
  \ false;\n07     paddle1MoveDown = true;\n08     return true;\n09 } else if(c ==\
  \ 's') {\n10     paddle1MoveUp = true;\n11     paddle1MoveDown = false;\n12    \
  \ return true;\n13 } else if(c == 'S') {\n14     paddle1MoveUp = true;\n15     paddle1MoveDown\
  \ = false;\n16     return true;\n17 }\n列表 4-13\n扩展后的 If-Else 语句示例\n```\n\n一个扩展后的\
  \ If-Else 语句示例，其中每个情况都有自己的 Else-If 子句。\n\n请注意，我们可以使用 If-Else 语句（严格来说是 If-Else-If\
  \ 语句，但你明白意思）来检查一系列不同的相关条件。这种语法有些冗余，因为我们必须反复检查同一个变量的值，每个分支检查一次。请思考一下这个问题。这听起来像是编程中常见的场景。虽然我们显然可以使用\
  \ If-Else 语句来处理这种情况，但还有一种更简洁的方式，那就是使用 Switch 语句。\n\n\n\n### Switch 语句\n\nSwitch\
  \ 语句是 Java 编程语言中另一种流程控制工具，当需要根据某个变量的值执行多种不同操作时，它非常有用。在前面的示例中，该变量是字符变量 `c`。让我们看一段等效的代码片段，它用\
  \ Switch 语句替换了 If-Else 语句。\n\n```\n01 switch(c) {\n02     case 'x':\n03        \
  \ paddle1MoveUp = false;\n04         paddle1MoveDown = true;\n05         return\
  \ true;\n06     case 'X':\n07         paddle1MoveUp = false;\n08         paddle1MoveDown\
  \ = true;\n09         return true;\n10     case 's':\n11         paddle1MoveUp =\
  \ true;\n12         paddle1MoveDown = false;\n13         return true;\n14     case\
  \ 'S':\n15         paddle1MoveUp = true;\n16         paddle1MoveDown = false;\n\
  17         return true;\n18 }\n代码清单 4-14\nSwitch 语句示例\n```\n\n一个 Switch 语句的示例，其中每个\
  \ case 都替换了一个 If-Else 或 Else-If 子句。\n\n花点时间看一下 Switch 语句的结构。每个 Else-If 语句都被一个检查特定值的\
  \ case 语句条目所取代。通常，Switch 语句的 `case` 子句以 `break` 语句结束，但在某些情况下，`return` 语句也能很好地工作。让我们看一个稍微重构过的\
  \ Switch 语句，它更接近我们之前看到的第一个 If-Else 语句，并且我们将用 break 语句替换 return 语句。\n\n```\n01 switch(c)\
  \ {\n02     case 'x':\n03     case 'X':\n04         paddle1MoveUp = false;\n05 \
  \        paddle1MoveDown = true;\n06         break;\n07     case 's':\n08     case\
  \ 'S':\n09         paddle1MoveUp = true;\n10         paddle1MoveDown = false;\n\
  11         break;\n12     default:\n13         paddle1MoveUp = false;\n14      \
  \   paddle1MoveDown = false;\n15         break;\n16 }\n代码清单 4-15\n带有 Break 和 Default\
  \ Case 的 Switch 语句示例\n\n一个 Switch 语句的示例，其中每个 case 都替换了一个 Else-If 子句。\n\n正如我们之前提到的，这是一个稍微调整过的\
  \ Switch 语句。请注意，“x”和“X”条件会执行相同的 `case` 分支代码。这是利用 Switch 语句的 case 子句不带退出语句（`break`\
  \ 或 `return`）来将相似代码分支分组的一个示例。例如，当用户按下“x”键时，与他们在开启大写锁定并按下“X”时运行的代码相同。这与我们之前看到的原始\
  \ If-Else 语句中的结构相同。最后，Switch 语句有一个 default case。这类似于 If-Else-If 语句中的 Else 子句。当之前的\
  \ Switch 语句 case 没有直接匹配时，default case 会执行。\n\n总的来说，Switch 语句非常直接。它们紧密遵循 If-Else\
  \ 语句的逻辑，但在某些场景下提供了更简洁的语法。Switch 语句只能用于某些数据类型 `–` byte、short、char、int `–` 以及枚举数据类型，如数组和枚举。在下一节中，我们将介绍一种不同形式的流程控制：使用\
  \ Try-Catch 语句进行错误处理。\n\n### Try-Catch 语句\n\n到目前为止，我们回顾的流程控制语句都是显式语句，我们检查变量的值并决定执行哪个代码分支。在大多数情况下，If-Else\
  \ 语句非常擅长处理这种情况。有时，当比较同一个变量的值以决定多个不同的代码分支时，你需要使用 Switch 语句来利用其更简洁的语法。\n\n在某些情况下，你需要控制程序的流程，但并非我们之前看到的正常场景。在这种情况下，我们关心的是在发生错误时控制程序的流程。针对这种特定情况，Java\
  \ 为我们提供了 Try-Catch 语句。让我们看一个基本示例。\n\n```\n//代码\n1 try {\n2     int t;\n3     String\
  \ u = \"test\";\n4     t = Integer.parseInt(u);\n5 } catch (Exception e) {\n6  \
  \   e.printStackTrace();\n7 }\n//输出\n1 java.lang.NumberFormatException: For input\
  \ string: \"test\"\n代码清单 4-16\nTry-Catch 语句示例\n```\n\n一个使用 Try-Catch 语句在错误发生时控制程序流程的示例。\n\
  \n在上一个代码清单中，第 3 行对 `String u` 的初始化是不正确的。该变量被初始化为一个单词，而不是数字字符串。通常，这完全没问题，但在第 4 行，我们使用该字符串变量作为源值来转换为\
  \ Integer。现在，这段代码将会失败并抛出 `NumberFormatException –` 我们可以捕获它！\n\n出于我们的目的，我们捕获了更通用的\
  \ `Exception`。这对我们的演示来说没问题，但你应该使你的 Try-Catch 语句与它们旨在处理的异常类型保持一致。现在，在这个示例中，我们只做了报告错误（第\
  \ 6 行），但我们可以在 catch 子句中采取任意数量的措施来纠正遇到的异常，或者我们可以报告问题并优雅地退出程序。\n\n无论哪种情况，我们都能在遇到异常后控制程序的流程，因为我们在可能成为错误来源（即抛出异常）的代码周围使用了\
  \ Try-Catch 语句。通过这种方式，我们可以使用 Try-Catch 语句来保护可能产生错误的代码，同时相应地响应错误，从而使我们自己的 Java 程序非常稳定。\n\
  \n至此，本节内容就结束了。在下一节中，我们将通过一个关于该主题的挑战来巩固我们对程序流程控制的知识。让我们看看这个挑战，然后直接进入代码！\n\n### 挑战：流程控制\n\
  \n在本章的第一个挑战中，我们将利用流程控制的知识来修改一份 Pong Clone 游戏的副本。这个挑战要求我们修改游戏的输入处理，以支持更多的键盘按键。让我们看看具体细节。\n\
