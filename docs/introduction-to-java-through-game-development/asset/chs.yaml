  \  封装、继承和多态\n\n本章全部关于高级 Java 面向对象编程主题，如封装、继承和多态。它们共同构成了面向对象编程的四个主要理论原则中的三个。第四个原则，抽象，超出了本文的范围，因此我们不会在此讨论。让我们通过定义\
  \ Java 面向对象编程语言的这些特性来为讨论奠定基础。\n\n*   **封装**：*将代码和数据包装成一个单一单元的过程*，通常表现为一个 Java 类，通过类方法对字段访问进行高度控制。\n\
  *   **继承**：面向对象编程的一个关键特性，允许我们从现有类创建一个新类。创建的新类称为子类（子类或派生类），而派生子类的现有类称为超类（父类或基类）。\n\
  *   **多态**：多态与继承协同工作，允许我们以与超类实现不同的方式使用继承的类方法。\n\n在我们完成对 Java 面向对象编程支持的回顾时，我们将依次仔细研究这些高级主题中的每一个，并且在此过程中我们将使用一个新游戏：地牢陷阱！尽情享受吧！\n\
  \n封装\n\n封装是我们将要探讨的第一个面向对象编程原则。Java 中的封装指的是通过使用访问修饰符和类方法来对数据（类字段）进行战略性保护。让我们通过一个\
  \ Java 类中基本封装的例子来引入这次回顾。\n\n\n\n```\n01 public class BasicEncapClass {\n02     private\
  \ int field1 = 0;\n\n04     public BasicEncapClass(int i) {\n05         this.field1\
  \ = i;\n06     }\n\n08     public int getField1() {\n09         return this.field1;\n\
  10     }\n\n12     public void setField1(int i) {\n13         this.field1 = i;\n\
  14     }\n15 }\n清单 8-1\n简单 Java 类中的封装示例\n```\n\n一个采用基本封装的简单 Java 类示例。\n***Java 编程说明：我喜欢将封装的概念进一步延伸，而不仅仅是使用\
  \ get 和 set 方法保护类数据。我认为正确的封装还应包括通过一组简单的类方法，恰当地暴露复杂的类功能。***\n在一个封装良好的类中，根据定义，我们通过将类字段设为私有来保护对它们的访问。然后通过使用\
  \ get 和 set 方法，开放对这些字段的受控访问。我知道这有点虎头蛇尾。这种面向对象编程哲学的实际实现其实一点也不难。在我看来，在设计游戏或其他 Java\
  \ 程序时，你可能会过度封装。如果这样做，可能会给游戏增加一些不必要的额外开销。\n例如，是否所有简单的游戏类都应该使用严格的封装？这将导致对这些类的所有字段访问都需要调用方法，而在大多数情况下，方法调用的效率低于直接公开字段访问。这个话题没有太多可讨论的。归根结底，就是使用类的\
  \ get 和 set 方法以及字段访问修饰符，对类字段进行严格控制。在下一节中，我们将讨论 Java 中的类继承，并学习如何基于其他现有类创建新类。\n\n\
  继承\n\n在 Java 中，**继承**是面向对象编程的关键特性之一，它允许我们基于现有类创建新类。创建的新类称为子类，而派生子类的现有类称为超类。让我们看看如何在\
  \ Java 中实际声明一个子类。我们将基于清单 8-1 中使用的类进行构建。请留意封装和继承是如何协同工作的。\n\n```\n//类声明\n01 public\
  \ class BasicEncapClass {\n02     private int field1 = 0;\n\n04     public BasicEncapClass(int\
  \ i) {\n05         this.field1 = i;\n06     }\n\n08     public int getField1() {\n\
  09         return this.field1;\n10     }\n\n12     public void setField1(int i)\
  \ {\n13         this.field1 = i;\n14     }\n15 }\n\n17 public class BasicSubClass\
  \ extends BasicEncapClass {\n18     private int newField1 = 1;\n\n20     public\
  \ BasicSubClass(int i) {\n21           super(i);\n22         this.newField1 = i;\n\
  23     }\n\n25     @Override\n26     public int getField1() {\n27         return\
  \ this.newField1;\n28     }\n\n30     @Override\n31     public void setField1(int\
  \ i) {\n32         this.newField1 = i;\n33     }\n34 }\n清单 8-2\n使用 Java 类的封装与继承示例\n\
  ```\n\n一组使用封装和继承的简单 Java 类示例。\n请注意清单 8-2 示例类中继承的使用。类 `BasicSubClass` 继承了类 `BasicEncapClass`。你可以使用\
  \ `extends` 关键字声明一个新的子类。在 Java 中，你只能有一个超类，这意味着你一次只能继承一个其他类。在这个例子中，子类声明了一个新的类字段、构造函数以及\
  \ get/set 方法。在新的构造函数中，我希望你注意一个特殊的关键字，第 21 行的 `super`。\n`super` 关键字允许你访问当前类的超类，以调用可用的方法并访问可用的字段。在子类构造函数中，它还有另一个用途。构造函数中的第一行，并且只能是第一行，可以调用超类的构造函数。在这种情况下，当你创建\
  \ `BasicSubClass` 类的新实例时，它将调用 `BasicEncapClass` 的构造函数。另外，请注意子类保留了相同的方法 `getField1`\
  \ 和 `setField1`，只是重新定义了它们的功能，使其与新的类字段一起工作。\n`@Override` 关键字是一种特殊的方法注解，表示当前方法覆盖（替换）了超类中同名的方法。你看到在\
  \ Java 面向对象编程中封装和继承是如何协同工作的了吗？通过隐藏类字段并通过类方法暴露功能，子类可以以受控的方式维护和扩展其超类的功能。在下一节中，我们将进行一个编码挑战，结合我们新学的\
  \ Java 面向对象编程知识。\n\n挑战：继承\n在这个编码挑战中（本章的第一个挑战），你将必须依靠你对类继承的知识，为地牢陷阱游戏添加一种新武器。让我们开始编码挑战吧！\n\
