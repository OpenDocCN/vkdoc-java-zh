  \ 方法，传入一个布尔值来显示或隐藏图片。在下一节中，我们将开始讨论一些关于 Java 类的高级主题。\n\n## 高级类主题\n\n类是我们编码工具箱中极其强大且重要的新工具。我们现在可以创建各种类，用于我们的游戏和其他\
  \ Java 程序中。我想谈谈面向对象编程的几个高层次、高级的方面。在接下来的几节中，我们将讨论访问权限、类设计以及静态 main 入口点。\n\n### 访问权限\n\
  \n这里的访问权限指的是你用来定义类的访问修饰符。在我看来，在设计软件时使用 `public` 或默认修饰符是可以的。随着你的软件日趋成熟，将类的某些方面设置为\
  \ `protected` 或 `private` 的需求会变得更加明显。\n\n你总是可以通过在类设计中使用更合适的访问修饰符来重构代码并收紧设计。在下一节中，当我们讨论类设计的一些要点时，我们将进一步探讨这个概念。\n\
  \n### 类设计\n\n类设计指的是你构建的类的结构。你使用哪些类字段，定义哪些方法等等。通常，你应该保持类设计简单。根据需要或预期来增加复杂性。例如，如果你在处理类时经常使用相同的几行代码，你可能希望将其移入一个类方法中。\n\
  \n同样，不要在你设计的类中过度支持功能。例如，如果你以类方法的形式添加新功能，你应该问自己，这段代码是否属于给定的类，是你的类负责它，还是另一个类负责。结果可能是需要一个新类来处理你期望的功能。\n\
  \n\n\n### 静态主入口点\n\n我们已经介绍了大量关于 Java 类的内容，但尚未讨论如何实际执行 Java 程序。为此，你必须至少有一个包含静态 main\
  \ 方法的类，且该方法需符合特定的方法签名。让我们来看一下静态 main 方法的签名。\n\n```\npublic static main(String[]\
  \ args) { ... }\n```\n\n每个相关视频游戏项目的静态主入口点都与项目本身同名。每个编程挑战中游戏设置的副本都采用相同的方法。当你在 NetBeans\
  \ IDE 中构建项目时，可以将其配置为拥有一个默认类（包含静态 main 方法），以便在程序执行时运行。\n\n要设置此值，请在 NetBeans IDE 中右键点击你的\
  \ Java 项目，然后选择“属性”选项。在弹出的窗口中，从左侧选择“运行”选项。\n\n![](img/537429_1_En_7_Fig1_HTML.jpg)\n\
