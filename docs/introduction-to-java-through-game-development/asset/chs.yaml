  length)

  ```


  请注意，`src` 和 `dest` 方法参数的数据类型是 `Object`，而不是我们目前见过的数组数据类型。这是因为数组是 `Object` 的一个实例。我们将在介绍对象和类时进一步讨论这一点。感觉我经常这么说。


  但说正经的，这种数组复制方案表明，在 Java 编程语言中，数组（如 `int[]`）是 `Object` 的一个实例。然后你可以像清单 3-14 中的代码那样执行相同的数组复制操作：


