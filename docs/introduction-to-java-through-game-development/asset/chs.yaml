  \n## 关于变量的更多内容\n\n到目前为止，我们在本章中已经介绍了相当多的内容，但我还想回到变量这个主题，简要讨论一些更细致的要点，以真正完善我们对这个主题的回顾。既然我们已经有了使用不同\
  \ Java 表达式的经验，并且已经明确地介绍了布尔表达式和 If-Else 语句，那么在变量这个主题上，我还有几件事想谈谈。\n\n我想简要探讨一下自定义数据类型和数据类型转换，即\
  \ Java 中与变量相关的类型转换。首先，我们将通过介绍枚举来讲解自定义数据类型。\n\n### 枚举\n\nJava 编程语言有枚举的概念。枚举是一个命名常量的列表。在\
  \ Java 中，枚举定义了一个类类型。枚举可以有构造方法、方法和实例变量。它是使用 `enum` 关键字创建的。默认情况下，每个枚举常量都是 public、static\
  \ 和 final 的。\n\n关于类特性（如构造方法、方法和字段访问权限、public 或 static）的信息，将在我们介绍 Java 类时进行更详细的解释。在本章中，你将接触到一些非常基础的类知识。现在，只需跟着学习，并在脑海中记住这些概念。如果你还不太理解它们，也不必担心。让我们来看一个使用\
  \ `enum` 关键字创建枚举的基本但常见的用法。\n\n```\n01 private enum State {\n02     NONE,\n03   \
  \  SHOW_GAME,\n04     SHOW_COUNT_DOWN,\n05     SHOW_COUNT_DOWN_IN_GAME,\n06    \
  \ SHOW_GAME_OVER,\n07     SHOW_GAME_EXIT\n08 };\n\n10 public State gameState = State.NONE;\n\
  代码清单 4-18\n基本枚举使用示例\n```\n\n一个包含变量声明和初始化的基本枚举使用示例。\n\n一旦你声明并初始化了一个枚举，就可以使用 Java\
  \ 的成员运算符 `.` 来引用其成员，如下所示：\n\n```\nif (gameState == State.SHOW_GAME) { ... }\n```\n\
  \n这使得枚举的使用既简洁又直观。你也可以通过其他方式实现同样的效果。假设你使用一组整数来完成这项工作。\n\n```\nint NONE = -1;\nint\
  \ SHOW_GAME = 0;\nint SHOW_COUNT_DOWN = 1;\nint SHOW_COUNT_DOWN_IN_GAME = 2;\nint\
  \ SHOW_GAME_OVER = 3;\nint SHOW_GAME_EXIT = 4;\n```\n\n这种实现方式还不错。它直观且简洁。但有一个问题，我们必须为表示不同变量的整数显式定义唯一的值。而之前的枚举则为我们处理了这个问题。让我们看看这种方法在实际中是什么样子的。\n\
  \n```\nif (gameState == SHOW_GAME) { ... }\n```\n\n区别很微妙，但在前面的例子中，我们丢失了“状态”的概念。在这个例子中，这一点不太重要，因为我们使用的变量命名得当，即\
  \ `gameState`。尽管如此，无需过多研究，我们就能看出使用枚举使代码更简洁、更直观。枚举是 Java 编程语言中一个非常强大的工具。在编写下一个项目时，请记住它们。\n\
  \n### 非常基础的 Java 类\n\n很明显，虽然枚举有其用途，并且可以轻松地为你自定义一种可在程序中使用的数据类型，但它们也有局限性。首先，枚举成员必须是整数。仅此一个限制就会促使我们寻找其他数据类型自定义的方法。沿着同样的探索思路，我们找到了另一种创建自定义数据类型的方法：普通的旧式\
  \ Java 类。\n\n```\n1 public class GameData {\n2     public State gameState = State.NONE;\n\
  3     public int numberOfPlayers = 1;\n4     public boolean gameOver = false;\n\
