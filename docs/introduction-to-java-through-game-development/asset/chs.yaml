  \ 15 行，是 Java 编程语言中一个较少使用的特性的示例：`vararg` 修饰符。\n\n在方法参数后添加省略号 `...`，是告诉 Java 编译器该参数将作为给定数据类型的数组传入，在本例中，是一个\
  \ `Object` 数组。注意我们是如何检查数组参数的长度，如果存在足够的值，我们就将它们从数组中强制转换出来并设置类字段。虽然这是 Java 编程语言的一个强大特性，在某些方法中有其用武之地，但这是一个你不应该过于频繁使用的工具。\n\
  \n如果你经常使用它，你应该问问自己到底想做什么，并考虑另一种实现策略。在我们审查的这一点上，你应该已经能够自如地声明类并定义不同的类字段和方法了。但是所有这些类成员都需要一个有效的类实例才能使用它们。我们如何创建一个由类的所有实例共享的类属性呢？\n\
  \n这就是 `static` 关键字派上用场的地方。\n\n\n\n### 静态成员\n\nJava 编程语言支持定义类的成员，这些成员对于类的每个实例而言都是唯一存在的。我们之前已经见过这些成员；它们就是类字段。Java\
  \ 还支持定义类的成员，这些成员既存在于类本身，也存在于类的每个实例中。让我快速回顾一下与类相关的声明和实例化概念，以便我们理解静态类成员的重要性。\n\n```\n\
  01 GameData gameData1;//声明\n02 gameData1 = new GameData();//初始化\n03 gameData1.setAll(State.NONE,\
  \ 0, true, \"\");\n\n05 GameData gameData2 = new GameData();//实例化\n06 gameData2.setAll(State.NONE,\
  \ 0, true, \"\");\n\n08 GameData gameData3;//未初始化\n09 gameData3.setAll(State.NONE,\
  \ 0, true, \"\");//错误：此类实例未初始化\n\n11 //设置一个静态类字段\n12 GameData.MAX_NUM_PLAYERS =\
  \ 2;\n\n14 //调用一个静态类方法\n15 GameData.SetMaxNumPlayers(2);\n清单 7-7\n声明和实例化类实例\n```\n\
  \n一个演示声明、初始化和实例化类的示例。请注意，我们可以在没有任何声明、初始化或实例化的情况下使用静态类成员。\n\n在清单 7-7 中，我们有三个使用类方法的示例，随后是两个演示如何使用\
  \ `static` 类成员的示例。在第 1 到 3 行，我们可以看到 `gameData1` 变量的声明和初始化。一旦类实例（对象）准备就绪，我们就可以调用它的\
  \ `setAll` 方法并传入一些参数。类似地，在第 5 到 6 行，我们有一个更简洁的相同过程版本。变量 `gameData2` 在第 5 行通过一行代码完成了实例化、声明和初始化，使该变量随时可用。第\
  \ 6 行调用了 `setAll` 方法。在这两种情况下，我们只能在类的实例被正确声明和初始化后才能使用该方法。第 8 到 9 行演示了不应该做什么。这段代码会抛出错误；你不能调用一个未初始化对象的方法。\n\
  \n现在我们进入真正有趣的部分。在第 12 行，我们有一个静态类字段的示例。它们与你到目前为止所了解的类字段非常相似，区别在于它们以 `static` 关键字作为前缀。`static`\
  \ 关键字使这个新字段成为类本身的成员，而不是类实例的成员。这意味着什么？这意味着你可以在没有任何前置代码的情况下访问该字段。\n\n正如你在第 12 行所见，我们正在设置一个静态类字段的值，但我们没有使用变量；我们没有声明或初始化任何东西。在这种情况下，我们使用的是类本身的名称。静态类字段属于该类，并且可以通过类本身的名称来访问。就像类字段一样，类方法也有静态版本。它们共同构成了\
  \ Java 编程语言所支持的静态类成员对。\n\n在清单 7-7 的第 15 行，你可以看到静态类方法的使用。通常，静态字段和方法应该使用大写字母命名，以表明它们与普通字段和方法不同，但这只是一个约定。不过，我建议坚持这样做；它会使你的代码更直观。我们已经了解了如何使用静态类成员，以及它们与我们目前使用的普通类成员有何不同，但我们还没有看到如何声明它们。让我们看看如何通过向虚构的\
  \ `GameData` 类添加一些静态类成员来定义它们。\n\n```\n1 class GameData {\n2     public static int\
  \ MAX_NUM_PLAYERS = 5;\n3     public static void SetMaxNumPlayers(int i) {\n4  \
  \       GameData.MAX_NUM_PLAYERS = i;\n5     }\n\n7     ...\n8 }\n清单 7-8\n静态类成员示例\
  \ – GameData 类\n```\n\n一个添加到 GameData 类中的静态类字段和一个静态类方法。此清单中省略了虚构的 GameData 类的其余部分。\n\
  \n***Java 编程说明：良好的实践不仅包括对类的静态字段使用大写变量名，还应该将它们放在类定义的最开始位置。对于静态方法，虽然没有这么强的优先级，但使用大写方法名是常见的。关于静态方法的放置位置，没有等效的实践，但我喜欢将它们分组在一起，并放在类主体的开头附近。**\n\
  \n静态类成员（字段和方法）与普通类字段和方法非常相似，因此你可以使用所有相同的访问修饰符。唯一的注意事项与静态类方法的使用有关。你不能直接访问其他类字段或方法，除非它们也是\
  \ `static` 的，或者你手头有一个类的实例。这意味着什么？这意味着，如果你正在访问一个静态方法，该静态方法只能访问其他静态方法和字段，因为它与类本身相关联，而不是与类实例相关联。让我用一个简短的例子进一步讨论这一点。\n\
  \n```\n1 public static void SetMaxNumPlayers(int i) {\n2     this.numberOfPlayers\
  \ = i; //不正确\n3     GameData.MAX_NUM_PLAYERS = i; //正确\n4 }\n清单 7-9\n静态类方法使用示例\n\
  ```\n\n此清单中有一个错误。你不能访问类字段 `numberOfPlayers`，因为在访问静态类成员时没有类实例存在。\n\n你能发现清单 7-9 中代码的问题吗？如果你认为从静态方法访问类字段可能是个问题，那么你想对了。这让我们得出了关于静态类成员这一节的结论。它们是你编码工具箱中的重要工具，并且在设置与类本身（而非实例）相关的信息时尤其有用。\n\
  \n\n\n### 构造函数\n\n到目前为止，我们在文中使用的都是非常基础的类初始化方式。大多数情况下，我们看到了声明和初始化，或者实例化后直接设置类字段，或者使用类方法来完成。虽然这确实是一种直接且直观的配置类实例的方式，但有时会显得有些繁琐。想象一下，处理一个拥有\
  \ 10 个或 20 个字段且需要正确初始化的类会怎样？\n\n我们可以用已有的工具通过几种不同的方式来实现。一种方法是显式地将每个类字段设置为所需的值。另一种方法是调用某种初始化方法，就像我们在处理虚构的\
  \ `GameData` 类时试验过的 `setAll` 方法那样。让我们进一步探讨这个想法。要求开发者调用一个特定的方法来正确初始化一个类，听起来也不算太糟糕。\n\
  \n但话说回来，我们又到了将责任推给开发者的时候，而开发者可能已经有足够多的事情要操心了。相反，让我们把这个责任推给 Java，自己就不用操心了。让我们来看看\
  \ Java 编程语言中一个我们一直在使用却未必真正了解的特性：类构造函数。我将提供一个示例来引出讨论。\n\n```\n1 GameData gameData1\
  \ = new GameData();\n2 gameData1.setAll(State.NONE, 0, true, \"\");\n\n4 GameData\
  \ gameData2 = new GameData(State.NONE, 0, true, \"\");\n清单 7-10\n使用类构造函数进行初始化的示例\n\
  ```\n\n该清单演示了在实例化时使用自定义构造函数来初始化类，而不是使用 `setAll` 类方法。\n\n在上一个清单中，我们初始化虚构的 `GameData`\
  \ 类的两种方式之间存在一个微妙但强大的区别。在第一种情况（第 1-2 行）中，我们要求开发者知道他们必须使用 `setAll` 方法以及何时使用。在第二个示例（第\
  \ 4 行）中，我们使用自定义构造函数为 `GameData` 类的这个实例 `gameData2` 设置所需的数据。这种方法的好处是更直观，并且需要关于如何配置类的特殊知识更少。作为开发者，你提供了一个构造函数，它将为开发者配置好类。让我们来看看如何为我们的类定义自定义构造函数。\n\
  \n```\n//类定义\n01 class SimpleClass1 {\n02     public int simpleField1;\n03 }\n\n\
  05 class SimpleClass2 {\n06     public int simpleField1;\n07     public boolean\
  \ simpleField2;\n\n09     public SimpleClass2() {\n10         simpleField1 = 0;\n\
  11         simpleField2 = false;\n12     }\n\n14     public SimpleClass2(int i,\
  \ boolean b) {\n15         simpleField1 = i;\n16         simpleField2 = b;\n17 \
  \    }\n18 }\n//类使用\n01 //默认构造函数始终可用\n02 SimpleClass1 simp1 = new SimpleClass1();\n\
  \n04 //显式声明的简单构造函数\n05 SimpleClass2 simp2 = new SimpleClass2();\n\n07 //使用自定义构造函数重新初始化\n\
  08 simp2 = new SimpleClass2(1, true);\n清单 7-11\n使用默认构造函数与自定义类构造函数的示例\n```\n\n演示了在类定义中使用默认构造函数和自定义构造函数。\n\
  \n在清单 7-11 中，我们介绍了两个简单的类。第一个类只有一个字段，没有定义构造函数。当我们创建这个类的实例时（第 2 行），我们使用的是默认构造函数。当你没有显式声明构造函数时，Java\
  \ 会负责提供一个默认构造函数。如果我们确实定义了一个自定义构造函数会发生什么？看看第二个类定义，第 5 行的 `SimpleClass2`。请注意，这个类定义了两个构造函数。\n\
  \n第一个构造函数是对默认构造函数的重新创建。如果我们决定定义一个自定义构造函数，就必须这样做，因为一旦定义了自定义构造函数，Java 将不再提供默认构造函数。使用默认构造函数可能导致类配置错误并产生错误，因此，为了支持它，在这种情况下，你必须自己显式地创建它。你可以在第\
  \ 9-12 行看到我们的实现，自定义构造函数在第 14-17 行。\n\n现在我们可以使用 `SimpleClass2` 的自定义构造函数，它允许我们为类的字段提供值，或者我们可以使用一个空的构造函数来模拟默认构造函数，如类使用部分的第\
  \ 5 行所示。请记住，你可以根据需要为你的类创建任意数量的自定义构造函数，但不要过度使用这个能力。否则，你最终会得到一些非常令人困惑、难以实例化的类。至此，本节内容结束。是时候进行一个编程挑战来巩固我们目前所学的知识了。\n\
