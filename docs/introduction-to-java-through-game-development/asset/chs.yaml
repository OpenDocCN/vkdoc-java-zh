  通过鱼类建模展示封装、继承和多态性的示例\n```\n\n一个正确封装的类 `Fish` 的示例，由 `Trout` 类扩展，而 `Trout` 类又由 `RainbowTrout`\
  \ 类扩展。请注意，每个扩展类同时也是其超类的一个实例。某些类重写了方法行为，以演示多态性。\n***游戏编程提示：在设计游戏类结构时，类继承是一个非常强大的工具。在游戏中，你经常会遇到敌人、武器和物品，它们都是某个通用分类的更具体实例。在建模这种结构时，类继承非常有效。*\n\
  清单 8-4 相当长；在继续之前，请花时间仔细阅读。这个示例展示了我们在此讨论的面向对象编程的三个关键方面如何协同工作。让我们回顾一下具体内容，并在此过程中探讨一些细节。首先，`Fish`\
  \ 类是一个封装良好的类的示例。它有三个字段：`avgWeight`、`avgLen` 和 `color`。它还定义了两个提供鱼类特定信息的方法：`getName`\
  \ 和 `getFoodSource` 方法。\n类中的最后一个方法需要稍作解释。`toString` 方法带有 `@Override` 注解前缀，这表明它替换了一个已有的方法。但替换的是哪个方法呢？我们并没有定义过\
  \ `toString` 方法。实际上，正如我们之前提到的，在 Java 中，每个类都是 `Object` 超类的子类，而这个超类定义了一个 `toString`\
  \ 方法，用于提供该类的字符串表示形式。\n通过重写它，我们自定义了该方法以返回一个特定的值。在本例中，返回的是以下语句：\n这条鱼，[鱼名]，以'[食物来源]'为食\n\
  这是多态性的一个示例，因为 `toString` 方法现在已专门为 `Fish` 类重新定义。在下一个示例中，`Trout` 类（鳟鱼是鱼类的一种特定类型）扩展了\
  \ `Fish` 类。该类定义依赖于继承来扩展超类 `Fish`，并利用多态性重新定义某些超类方法。在本例中，`Trout` 类重新定义了 `getName`\
  \ 和 `getFoodSource` 方法，以提供鳟鱼特定的实现。\n为了进一步说明这个示例，我们定义了第三个类 `RainbowTrout`，它扩展了 `Trout`\
  \ 类。这个类作为鳟鱼的一种特定类型，只需要自定义一些已经在 `Trout` 和 `Fish` 类中定义过的类方法。在本例中，我们只需重写 `getName`\
  \ 方法，以指明该类是虹鳟鱼类。请注意，每个扩展了 `Fish` 类或其子类的类，都会继承其被重写的 `toString` 方法。\n查看提供的输出文本，并追踪每个类实例是如何向上转型为其超类\
  \ `Fish` 类的。请注意，即使我们将对象作为 `Fish` 类的实例进行交互，输出仍然保持自定义状态。这是多态性的一个示例，因为该类既是自身的实例，也是其所有超类的实例。这也体现了\
  \ Java 中的方法多态性。\n`@Override` 方法注解用于指示某个方法是对超类定义的方法的替换。通过这种方式，可以为继承类逐个方法地定义新的、自定义的功能。这使得继承类能够扩展超类的功能。Java\
  \ 中的多态性不仅适用于通过重写类方法来定制功能，还适用于子类同时也是其超类的实例这一事实。\n因此，`Trout` 类的实例同时也是 `Fish` 类的实例，而\
  \ `Fish` 类的实例又是 `Object` 类的实例，以此类推。多态性的这一方面体现在第 13–17 行将子类向上转型为超类的过程中。在下一节中，我们将探讨一个涉及多态性和地牢陷阱游戏的编程挑战。\n\
  \n\n\n挑战：多态性\n本章的第二个编程挑战将考验你运用 Java 多态能力，改变你在上一个挑战中实现的火焰长矛在游戏中的功能。这是本文中第三个从上一个挑战的解决方案出发的挑战。因此，在继续之前，确保你拥有上一个挑战的正确解决方案至关重要。请花点时间仔细核对确认。一如既往，享受挑战吧！\n\
  \n涉及的包：\n\n```\nnet.middlemind.DungeonTrap_Chapter8_Challenge2\nnet.middlemind.DungeonTrap_Chapter8_Challenge2_Solved\n\
  ```\n\n描述：\n\n找到包 `net.middlemind.DungeonTrap_Chapter8_Challenge2`，并打开 `MdtWeaponSpearFlame.java`\
  \ 文件。这个挑战是另一个较为复杂的挑战，因此你需要查看以下 Java 类中的代码：\n\n*   `MdtWeaponSpearFlame.java`\n\n\
  *   `MdtWeapon.java`\n\n*   `ScreenGame.java`\n\n*   `MdtWeaponAxe.java`\n\n一些开发者喜欢新的长矛，但认为它与原始长矛过于相似。他们想尝试让长矛像投掷武器一样发射出去。为了实现这一改变，你需要对代码进行一些调整。游戏中存在一个投掷武器类\
  \ `MdtWeaponAxe.java`。我们需要从这个类中使用一些方法，使我们的武器可投掷。首先，你需要将以下方法从 `MdtWeaponAxe.java`\
  \ 文件复制并粘贴到 `MdtWeaponSpearFlame.java` 文件中：\n\n*   `GetX()`\n\n*   `SetX(int i)`\n\
  \n*   `GetY()`\n\n*   `SetY(int i)`\n\n*   `SetPosition(MmgVector2 v)`\n\n*   `SetPosition(int\
  \ x, int y)`\n\n这将使新的火焰长矛能够像投掷武器斧头一样处理其 X、Y 坐标或位置的设置。接下来，我们需要调整所有武器的超类 `MdtWeapon.java`\
  \ 类，以支持新的可投掷长矛。在这个类中找到以下方法：\n\n*   `GetWeaponRect()`\n\n*   `MmgDraw(MmgPen p)`\n\
  \n其中有专门处理投掷斧头的代码分支；请扩展这两个 `if` 语句，使其也支持可投掷长矛。类似地，必须在 `ScreenGame.java` 类的 `ProcessAClick`\
  \ 方法中进行更改。在该方法中找到两处需要修改 `if` 语句以包含可投掷长矛（而不仅仅是斧头）的地方。如果实现正确，进行这些调整将使新的长矛飞出并旋转。你必须运行此包的文件\
  \ `–` `DungeonTrap.java`；右键单击并选择“运行文件”来测试游戏。\n\n提示：\n这是一个艰巨的挑战，如果你遇到困难，几乎没有线索可以指引你。请仔细阅读描述中提供的类和方法的说明。留意代码中斧头的不同行为，并记住你正在制作一把投掷长矛，因此它的功能将与斧头相同。\n\
  \n挑战解决方案\n正如我们之前提到的，解决这个挑战需要正确完成本章关于继承的第一个挑战。如果你遇到了困难但仍想继续前进，你可以通过复制并粘贴标记的代码更改，使用第\
  \ 7 章挑战 1 的解决方案作为本挑战的起点。此解决方案要求你对游戏代码进行五处更改，才能成功解决挑战。\n\n该解决方案需要在五个不同的地方进行更改。让我列出调整的位置以及我们指定的顺序。你完全可以用不同的方式完成，这完全没问题。\n\
  \n*   `MdtWeaponSpearFlame.java` 和 `MdtWeaponAxe.java`：在这种情况下，我们需要复制覆盖定位功能的方法，使武器能够独立于持有者移动。\n\
  \n*   `MdtWeapon.java`：需要在 `GetWeaponRect` 方法中进行调整。\n\n*   `MdtWeapon.java`：需要在\
  \ `MmgDraw` 方法中进行调整。\n\n*   `ScreenGame.java`：需要在发射武器时的 `ProcessAClick` 方法中进行调整。\n\
  \n让我们按顺序并详细地回顾一下所做的调整。我们需要做的第一个更改是利用多态性覆盖超类定位方法的功能。我们在此进行的调整使武器现在可以独立于持有它的玩家移动。我们可以重用\
  \ `MdtWeaponAxe` 类中的代码，因为它也是可投掷的。接下来，我们转到 `MdtWeapon.java` 类，查看 `GetWeaponRect`\
  \ 方法。此方法用于计算描述武器应在屏幕上绘制位置的矩形。\n\n对于非投掷的刺击武器，该方法根据武器刺击动画的进度来计算矩形。对于投掷武器（斧头和现在的火焰长矛），我们返回描述投射物在屏幕上的位置及其朝向的矩形。需要调整\
  \ `if` 语句以包含 `SPEAR` 武器类型。你的编码工具箱中拥有完成此任务所需的所有工具。需要对 `MmgDraw` 方法进行类似的更改，以便在绘制投掷武器时包含长矛。\n\
  \n请注意，`MdtWeapon` 类是 `MdtWeaponAxe`、`MdtWeaponSpear` 和 `MdtWeaponSpearFlame` 类的超类。这就是为什么在此处更改代码会影响所有扩展类。集中化给我们带来了便利，但也增加了复杂性，因为我们必须在此级别支持不同的武器（投掷和刺击）。我们需要做的最后一个更改是支持将武器的新副本添加到游戏的可绘制对象中。这通过\
  \ `ScreenGame` 类的 `ProcessAClick` 方法实现。当玩家发射武器时，会向游戏中添加一个克隆体。由于我们进行的所有更改，这个克隆体可以自行飞出并旋转，直到与某物碰撞。\n\
  \n以上就是我们解决这个编程挑战所需进行的更改。这绝非易事，并且肯定用到了我们编码工具箱中的一些工具。如果你没有成功，请不要担心；只要通过复习解决方案学到了东西，你就做得很好。在下一节中，我们将通过讨论如何共享类并将其包含在我们的程序中，来结束对类的回顾。\n\
  \n导入类库\n既然你已经对 Java 类以及封装、继承和多态等 OOP 概念有了很好的理解，你需要深入了解如何打包代码并在其他程序中使用它。为此，你需要构建一个\
  \ Java 项目并获取生成的 JAR 文件。在大多数情况下，这类项目不包含静态 main 方法，只包含 Java 类。\n\n这通常被称为库。你可以通过共享项目的\
  \ JAR 文件来共享你的库。要在 NetBeans IDE 中向项目添加库，请右键单击项目，然后从上下文菜单中选择“属性”。在属性弹出窗口中，从左侧的类别部分选择“库”选项。当使用本地\
  \ JAR 文件时，我们将在“类路径”部分添加一个新条目。单击“+”按钮，然后从可用选项中选择“添加 JAR/文件夹”。此过程的屏幕截图如图 8-2 所示。\n\
  \n![](img/537429_1_En_8_Fig2_HTML.jpg)\n\n项目属性用户界面的对话框包含主要组件，如源、库、构建、运行、应用程序、标头、格式化和提示。\n\
  \n图 8-2\nNetBeans IDE 中项目库设置的屏幕截图\n\n显示项目属性弹出窗口中“库”部分的屏幕截图。\n\n\n\n此过程与你在第 1 章中设置视频游戏项目及其本地库文件时使用的过程相同。现在，你已向项目添加了一个库，在使用它之前，需要将该包包含到你的\
  \ Java 程序中。为此，你需要使用 Java 的 `import` 关键字。以下是导入视频游戏引擎主要包的示例：\n\n```\nimport net.middlemind.MmgGameApiJava.MmgCore.*;\n\
  import net.middlemind.MmgGameApiJava.MmgBase.*;\n```\n\n当使用类导入过程中的通配符功能时，你将能够访问指定\
  \ Java 包中的所有类。这很方便，但并不直观，而且会隐藏哪些类实际属于哪些包。让我们看看如何只导入一个 Java 类。在本例中，我们添加了对 `MmgBmp`\
  \ 类的访问权限。\n\n```\nimport net.middlemind.MmgGameApiJava.MmgCore.MmgBmp;\n```\n\n\
  请注意，所有 Java 类都是通过其包名导入的。在使用 Java 时请牢记这一点。花些时间熟悉 Java 内置类框架中最常用的包。你会经常用到的两个重要包是 `java.io`\
  \ 和 `java.util`。你可以在以下地址找到有关 Java 框架中可用类的更多信息：\n [`https://docs.oracle.com/en/java/javase/11/docs/api/index.html`](https://docs.oracle.com/en/java/javase/11/docs/api/index.html)\
  \ \n至此，我们关于导入和访问类库的部分就结束了。在下一节中，我们将了解视频游戏项目的通用共享结构。\n\n视频游戏项目结构\n由于所有附带的视频游戏项目都基于同一个游戏引擎，因此它们具有相似的设置和配置。以下三个\
  \ Java 类设置了静态主入口点，以及两个将游戏引擎屏幕连接到窗口和面板的关键类。我将在此列出这些类：\n**游戏的静态主入口点：** 通常以游戏本身命名，例如\
  \ PongClone.java、MemoryMatch.java 和 DungeonTrap.java。项目的这一部分为游戏提供了可执行类。同时，正如你在一些编程挑战中所见，它还通过游戏引擎的配置文件建立了视频游戏与其资源之间的连接。\n\
  \n**MainFrame.java：** 此类设置主框架的窗口，`GamePanel` 类将在其中渲染自身。此类主要用于维持超类功能。请注意，它继承自游戏引擎的类库。\n\
  \n**GamePanel.java：** 此类负责处理加载屏幕和启动屏幕的事件，并根据游戏状态在游戏屏幕之间切换。此类的许多功能都来自其超类。\n\n使用这三个类，稍作调整，重构可执行类并将游戏指向新的游戏引擎配置文件，是设置新游戏的基础。游戏可执行类中一个非常重要的类字段是\
  \ `ENGINE_CONFIG_FILE`。我列出了 Pong Clone 游戏中的这个类字段。\n\n```\n/**\n* 基础引擎配置文件。\n*/\n\
  public static String ENGINE_CONFIG_FILE = \"../cfg/engine_config_mmg_pong_clone.xml\"\
  ;\n```\n\n游戏引擎配置文件用于指定一些关键的游戏引擎设置。我们需要关注的主要是 NAME 条目。该文件使用 XML 编码，但应该足够简单，你无需任何研究即可编辑。只需更改\
  \ name 条目中“val”属性的值即可。该值必须与包含游戏资源的文件夹名称相同。\n\n```\n\n这对应于 NetBeans 项目文件夹本地的以下目录结构：\n\
  \n```\n./cfg\n-> class_config\n-> MemoryMatch\n-> drawable\n-> MemoryMatch\n-> MemoryMatchTest\n\
  -> playable\n-> MemoryMatch\n-> engine_config_mmg_memory_match.xml\n-> engine_config_mmg_memory_match_test.xml\n\
  ```\n\n游戏引擎的某些方面超出了本文的范围，但我希望你能够使用游戏引擎创建新游戏和视频游戏项目。cfg 文件夹中有四种受支持的资源。class_config\
  \ 目录包含用于调整特定游戏类中资源的配置文件。此文件中的条目在运行时提供数据，用于设置游戏屏幕的图像资源等。\ndrawable 目录用于存放图像资源，支持以下图像文件类型：PNG\
  \ 和 JPG。放置在游戏文件夹中的任何图像都将自动加载，并可通过其完整文件名（包括扩展名）访问。我们之前也在之前的编程挑战中看到过图像加载过程。playable\
  \ 目录与 drawable 目录类似，只是它用于加载声音文件。我们建议对音效和音乐使用 WAV 文件。\n最后，cfg 文件夹的根目录下还有一些 XML 文件。这些是特定游戏副本的游戏引擎配置文件。多个项目可以指向相同的资源。编程挑战的设置方式就体现了这一点。每个挑战都是游戏项目本身中的一个包，并且在大多数情况下配置为访问相同的资源和配置文件。你会注意到\
  \ drawable 和 playable 目录中都有一个 auto_load 文件夹。这些文件夹中的任何资源都会默认加载，并且你可以通过其完整文件名在游戏中使用它们。\n\
  至此，我们关于本文附带的视频游戏项目的配置和设置部分就结束了。在下一节中，你将面临挑战，需要自己创建一个新的视频游戏项目。祝你玩得开心！\n\n挑战：创建一个新的游戏项目\n\
