  在使用栈时，当我们想向 `Stack` 中添加新数据时，我们将其“压入”栈中。你会注意到，在前面的代码清单中，尽管栈被配置为存储 `Integer` 对象，我们在第\
  \ 6 行却只使用了一个 `int` 值。这是因为 Java 会自动将基本数据类型 `int` 转换为其对象形式 `Integer`。\n\n初始化栈后，我们在栈的以下位置得到以下数据元素列表：\n\
  \n*   位置：4 值：0\n\n*   位置：3 值：1\n\n*   位置：2 值：2\n\n*   位置：1 值：3\n\n*   位置：0 值：4\n\
  \n这看起来有点反直觉，因为我们首先将值 0 添加到了栈中。如果我们在处理列表，列表中的最后一个元素的值会是 4，因为它是最后添加的，而不是 0。这与栈的特性有关；按设计，它采用后进先出的方式返回值。由此推论，最后进入的值将最先被取出。\n\
