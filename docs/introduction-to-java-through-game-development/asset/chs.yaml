- "# 7. 对象、类与 OOP\n\n在过去的几章中，你使用 Java 编程语言的经验有所增加，现在我们进入了更高级的主题：OOP，即面向对象编程。Java 首先是一种面向对象的编程语言。无论你是否意识到，你几乎在整个文本中都在使用类和\
  \ OO（面向对象）编程，基本上是从数据结构开始的。\n\n如果你觉得这个主题过于令人生畏，那么这一事实应该能让你放松下来。让我们尝试给 Java 中的 OOP\
  \ 下一个简单的定义。首先，你在同名的 Java 类文件中定义你的类。例如，如果你创建了一个新类来管理一艘宇宙飞船，该文件可能命名为\n\n```\nSpaceShip.java\n\
  ```\n\n并且你会以最基本的方式使用这个类，如下所示：\n\n```\nSpaceShip testShip = new SpaceShip();\n```\n\
  \n实际上就这么简单。在最基本的层面上，类是你对某物进行建模的一种方式。我们如何在计算机上对某物进行建模？我们收集并跟踪数据。有时，这些数据是一张看起来像宇宙飞船的图片；有时，它只是描述宇宙飞船属性的数字；有时，两者兼有。\n\
  \n这里的主要收获是，你在程序中定义的类会成为类的实例或对象。不要与所有 Java 类的超类——`Object` 类——混淆。现在，想想我们一起回顾过的所有不同数据结构。回忆一下用于定义数据结构内部数据类型的尖括号。为了进一步讨论，我们使用\
  \ `SpaceShip` 类，看看如何将其与数据结构一起使用：\n\n```\n// 来自 java.util 包的 ArrayList 类\nArrayList\
  \ enemyShips = new ArrayList();\n```\n\n这很有趣。通过将我们自定义的类与 Java 自带的类一起使用，我们可以创建新的组合，帮助我们为各种不同的问题建模。例如，在之前展示的代码片段中，我们可能正在尝试找到一种方法来跟踪我们正在开发的新\
  \ 2D 太空射击游戏中当前关卡的所有敌舰。现在你已经对类是什么以及如何在 Java 程序中使用它有了基本的了解，让我们来看看如何在 Java 中正确定义一个类。\n\
  \n\n\n## 类\n\n在开始讨论 Java 类之前，让我们先看看 Java 文档中对类的定义^(⁹)：\n\n> *“类是创建对象的蓝图或原型。”*\n\n\
  这个定义引出了一些有趣的概念。首先，它暗示了你定义的类用于创建某种东西——对象。我们之前已经简单讨论过对象，但现在让我们开始将它们视为类的实例，并记住类在某个地方有一个文件，文件名与类名相同，扩展名为\
  \ `.java`。这就是 Java 编程语言中类的一般性质。让我们进一步了解它们，以及如何开始定义我们自己的类。通常，Java 中类的定义可以包含以下信息：\n\
  \n*   **访问修饰符**：类可以是 `public` 或 `private`，也可以使用默认访问修饰符。\n*   **类关键字**：使用 `class`\
  \ 关键字来创建类。\n*   **类名**：名称应以字母开头，在 Java 中，通常首字母大写。\n*   **超类（可选）**：类的父类（超类）名称（如果有），前面加上关键字\
  \ `extends`。一个类只能继承（子类化）一个父类。\n*   **接口（可选）**：类实现的接口列表（如果有），以逗号分隔，前面加上关键字 `implements`。一个类可以实现多个接口。可以回想一下我们之前提到的\
  \ `Enumerable` 接口。\n*   **类体**：类体由花括号 `{}` 包围。这里定义了类的成员——包括字段、方法和构造器。\n\n让我们重点关注如何声明一个类。至于类的扩展和接口，我们将在下一章讨论。现在，我们将专注于访问修饰符和基本的类声明。让我展示几个标准类声明的版本，然后我们再来分析它们的区别。\n\
  \n```\n01 package org.learn_java.classes;\n\n03 //类 #1，public 访问权限\n04 public class\
  \ SimpleClassPublic { ... }\n\n06 //类 #2，默认访问权限\n07 class SimpleClassDefault { ...\
  \ }\n\n09 //类 #3，错误，顶层类不允许使用\n10 protected class SimpleClassProtected { ... }\n\n\
  12 //类 #4，错误，顶层类不允许使用\n13 private class SimpleClassPrivate { ... }\n清单 7-1\n简单类声明的示例\n\
  ```\n\n该清单展示了一些正确的简单类声明，随后是两个错误的声明。你不能在顶层类上使用 `protected` 或 `private` 修饰符。\n\n在清单\
  \ 7-1 中，有一些简单的类声明示例。前两个是有效的声明，因为它们指定了默认或 `public` 类访问权限。后两个是无效的；如果你使用 `protected`\
  \ 和 `private` 访问修饰符，编译器会报错。Java 不允许在顶层类声明中使用这些访问修饰符。下面总结一下可用于顶层类声明的修饰符：\n\n*   **public**：该类可以被任何其他类访问。\n\
  *   **default**：该类只能被同一包中的类访问。当你未指定修饰符时，就会使用默认访问权限。包提供了一种组织类的方式。通常，相关的类属于同一个包。\n\
  \n默认访问修饰符也称为包私有（package-private），这意味着所有成员在同一包内是可见的，但不能从其他包访问。现在我们已经知道了如何以最基本的形式声明一个类，接下来让我们看看如何自定义类。通常，类是创建某种事物模型的手段。因此，你需要能够将某些数据与类的实例关联起来。类字段正好提供了实现这一点的方法。让我们来看看！\n\
  \n### 字段\n\n在 Java 中，字段是与类关联的某种数据类型的变量。属性（attribute）是它们的另一个名称，但通常特指公共类字段。一个简单的演示将大大有助于你理解类字段。让我们回顾一下第\
  \ 4 章中的一个清单，这是一个基本 Java 类的示例。\n\n```\n01 public class GameData {\n02     public\
  \ State gameState = State.NONE;\n03     public int numberOfPlayers = 1;\n04    \
  \ public boolean gameOver = false;\n05     public String playerName = \"AAA\";\n\
  06 }\n\n08 public GameData gameMetaData;\n09 gameMetaData = new GameData();\n清单\
