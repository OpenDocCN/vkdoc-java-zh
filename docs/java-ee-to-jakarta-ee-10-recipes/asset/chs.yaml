  \ {\n\nauthorList = null;\n\nauthorList = new ArrayList<>();\n\nauthorList.add(new\
  \ Author(\"Tarun\", \"Telang\", telangBio));\n\nreturn \"recipe03_14a\";\n\n}\n\n\
  public String populateJakarta EERecipesAuthorList() {\n\nSystem.out.println(\"正在初始化作者列表\"\
  );\n\nauthorList = new ArrayList<>();\n\nauthorList.add(new Author(\"Josh\", \"\
  Juneau\", juneauBio));\n\nauthorList.add(new Author(\"Tarun\", \"Telang\", telangBio));\n\
  \nreturn \"recipe03_14b\";\n\n}\n\npublic String displayAuthor(String last) {\n\n\
  for (Author author : authorList) {\n\nif (author.getLast().equals(last)) current\
  \ = author\n\n}\n\nreturn \"recipe03_14c\";\n\n}\n\n// getters 和 setters\n\n// ...\n\
  \n}\n\n最终，整个应用程序将如图 3-22 所示。要从源代码运行该应用程序，请将 WAR 文件分发部署到您的应用服务器，然后在浏览器中加载以下 URL：http://your-server:port_number/Jakarta\
  \ EERecipes/faces/chapter03/\n\nchapter03_14a.xhtml。\n\n***图 3-22.** 使用 Facelets\
  \ 模板的应用程序*\n\n第 3 章 ■ Jakarta Server Faces\n\n工作原理\n\n\n\n在 Jakarta Server Faces\
  \ 应用中为单个视图应用 Facelets 模板相当简单。使用模板的视图被称为*模板客户端*。如配方 3-14 所述，视图模板可以在模板上任何可能插入视图内容的位置指定单独的\
  \ `ui:insert` 标签及其 `name` 属性。`ui:insert` 标签中的 `name` 属性将与模板客户端中 `ui:define` 标签的\
  \ `name` 属性配对，以确定插入的内容。\n\n■ **注意** 如配方 3-14 所述，每个使用 Facelets 模板的视图都可以称为一个组合（composition），也可以称为模板客户端。需要注意的是，模板客户端（或组合）包含一对开闭的\
  \ `<ui:composition>` 标签。这些标签之外的所有内容在渲染时实际上会被忽略，因为会使用模板主体来代替。你也可以在模板客户端中省略 `<html>`\
  \ 标签，而仅使用 `<ui:composition>` 标签来打开和关闭视图。有关示例，请参见“使用 <ui:composition> 打开/关闭模板客户端”边栏。\n\
  \n**使用 <UI:COMPOSITION> 打开/关闭模板客户端**\n\n通常，模板客户端视图会使用开闭的 `<html>` 标签，如本配方解决方案中的示例视图所示。然而，由于\
  \ `<ui:composition>` 标签之外的所有内容在渲染时都会被忽略，你可以完全省略这些标签。有时使用 `<ui:composition>` 标签来打开和关闭模板客户端会很有用。但是，某些页面编辑器可能无法处理此类代码，或者会显示错误，因为视图的根元素不包含\
  \ `<html>` 元素。以下是一个使用 `<ui:composition>` 作为模板客户端开闭元素的示例：\n\n<ui:composition\n\n\
  xmlns:h=http://xmlns.jcp.org/jsf/html\n\ntemplate=\"./layout/custom_template.xhtml\"\
  >\n\n<<与本配方解决方案中视图示例的代码相同>>\n\n</ui:composition>\n\n请使用最适合您应用的技术！请记住，Jakarta Server\
  \ Faces 和 Facelets 会以相同方式处理每个视图，并且您可以通过指定 `<ui:composition>` 作为根元素来节省几行代码。\n\n**应用模板**\n\
  \n可以通过在视图的 `ui:composition` 标签的 `template` 属性中指定模板，将其应用于视图。例如，本示例中的所有视图都指定了相同的模板，如下摘录所示：\n\
  \n<ui:composition template=\"./layout/custom_template.xhtml\">\n\n第 3 章 ■ Jakarta\
  \ Server Faces\n\n示例中的模板名为 `custom_template.xhtml`，模板路径为 `./layout/`。`ui:composition`\
  \ 标签应封装 Facelets 视图中的所有其他标记。所有要使用该模板的视图都必须指定 `ui:composition` 标签。Facelets 还附带了许多其他有用的\
  \ Facelets 模板标签，如表 3-7 所述。\n\n***表 3-7.** Facelets 页面控制与模板标签*\n\n**标签**\n\n**描述**\n\
  \n`ui:component`\n\n定义一个模板组件，并为该组件指定一个文件名\n\n`ui:composition`\n\n定义一个页面组合，并封装所有其他\
  \ Jakarta Server Faces 标记\n\n`ui:debug`\n\n创建一个调试组件，该组件在渲染时捕获调试信息，即组件树的状态和应用程序中的作用域变量\n\
  \n`ui:define`\n\n定义由模板插入到页面中的内容\n\n`ui:decorate`\n\n装饰页面的各个部分\n\n`ui:fragment`\n\
  \n定义一个模板片段，与 `ui:component` 非常相似，区别在于标签外的所有内容不会被忽略\n\n`ui:include`\n\n允许在视图中封装并重用另一个\
  \ XHTML 页面\n\n`ui:insert`\n\n将内容插入到模板中\n\n`ui:param`\n\n向包含的文件或模板传递参数\n\n`ui:repeat`\n\
  \n遍历数据集合\n\n`ui:remove`\n\n从页面中移除内容\n\n`ui:define` 标签封装了将插入到模板中 `ui:insert` 标签位置的内容。`ui:define`\
  \ 标签根据两个标签共有的 `name` 属性值与模板的 `ui:insert` 标签进行匹配。从本示例的第一个视图列表可以看出，第一个 `ui:define`\
  \ 标签为 `name` 属性指定了 `top`，这将与模板中 `name` 属性等于 `top` 的 `ui:insert` 标签相对应。但模板中并没有指定这样的标签！这没关系；`ui:define`\
  \ 和 `ui:insert` 标签之间不必一一对应。视图可以指定任意数量的 `ui:define` 标签，如果它们与模板中的任何 `ui:insert` 标签都不对应，则会被忽略。同样，模板可以指定任意数量的\
  \ `ui:insert` 标签，如果它们与模板客户端视图中的 `ui:define` 标签不对应，则会显示模板在该位置定义的内容。\n\n再看同一个视图，另一个\
  \ `ui:define` 标签包含一个值为 `content` 的 `name` 属性，该标签确实与模板中一个同样具有 `name` 属性值为 `content`\
  \ 的 `ui:insert` 标签相对应。\n\n以下摘录取自模板，显示了与视图中具有相同 `name` 属性的 `ui:define` 标签相对应的 `ui:insert`\
  \ 标签。您可以在配方 3-14 中查看模板的完整列表。\n\n<div id=\"content\" class=\"left_content\">\n\n\
  <ui:insert name=\"content\">Content</ui:insert>\n\n</div>\n\n![](img/index-214_1.jpg)\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n如您所见，定义一个可应用于应用中多个视图的视图模板非常强大。Facelets 模板技术为定义此类模板提供了非常强大的解决方案，可实现一致的页面布局和可重用的页面代码。\n\
  \n**3-15. 将资源纳入其中**\n\n**问题**\n\n您希望在视图中包含资源，例如 CSS、图像和 JavaScript 代码，以便应用中的每个视图都能访问使用。例如，与其硬编码图像的\
  \ URL，不如引用图像位置，让应用在运行时动态创建指向该图像位置的 URL。\n\n**解决方案**\n\n创建一个资源目录，并可选地在资源目录内创建子文件夹，以存放应用将使用的资源。放置在资源文件夹子目录中的任何\
  \ CSS 文件、图像等，都可以通过 Jakarta Server Faces 组件的 `library` 属性在 Jakarta Server Faces 视图中引用，而无需指定资源的完整路径。在以下示例中，使用层叠样式表来设置应用中作者表格的样式。在本配方中，您将使用之前配方中应用于\
  \ `h:dataTable` 的 `styles.css` 样式表。\n\n样式表声明将位于 `custom_template.xhtml` 模板中，您将使用\
  \ `h:outputStylesheet` 组件而不是 `<link>` 标签。事实上，所有 `<link>` 标签都将被移除，并替换为 `h:outputStylesheet`\
  \ 组件，以利用资源文件夹。\n\n正确设置后，目录结构应如图 3-23 所示。\n\n***图 3-23.** 使用资源目录*\n\n以下列表是更新后的 `custom_template.xhtml`，因为它现在使用\
