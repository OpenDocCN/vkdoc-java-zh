  \ Server 引擎会对其进行求值，并将其转换为 response.getParameter(\"param1\")。以下摘录展示了 Jakarta 表达式语言表达式的这种用法：\n\
  \n参数 1：${ param.param1 }\n\n两种技术执行相同的任务：获取指定的请求参数并将其显示在页面上。输出结果如图 2-10. 所示。\n\n\
