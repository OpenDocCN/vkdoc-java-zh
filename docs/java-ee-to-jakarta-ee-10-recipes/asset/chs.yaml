  \ 构建 JSON 对象\n\n问题\n\n您希望构建一个可以在客户端和服务器之间传递的 JSON 对象。\n\n第 14 章 ■ WebSocket 与 JSON\n\
  \n解决方案\n\n使用 `JsonObjectBuilder` 通过 Java 代码构建 JSON 对象。以下示例演示了如何利用 `JsonObjectBuilder()`\
  \ 实例创建一个新的 `JsonObject`。在此示例类中，通过读取数据库表的内容创建了多个 `JsonObject`。对象构建完成后，对象的各个部分被赋值给一个字符串，该字符串最终将被显示或持久化：\n\
  \n```java\npackage org.jakartaeerecipe.chapter14.recipe14_03;\n\nimport java.io.IOException;\n\
  import java.io.StringWriter;\nimport java.util.List;\nimport jakarta.ejb.EJB;\n\
  import jakarta.inject.Named;\nimport jakarta.json.Json;\nimport jakarta.json.JsonObject;\n\
  import jakarta.json.JsonObjectBuilder;\nimport jakarta.json.JsonWriter;\nimport\
  \ org.jakartaeerecipes.jpa.entity.BookAuthor;\nimport org.jakartaeerecipes.jpa.session.BookAuthorFacade;\n\
  \n@Named(\"jsonController\")\npublic class JsonController {\n\n    @EJB\n    BookAuthorFacade\
  \ bookAuthorFacade;\n\n    private String authorJson;\n\n    public void buildAuthors()\
  \ {\n        List<BookAuthor> authors = bookAuthorFacade.findAll();\n        JsonObjectBuilder\
  \ builder = Json.createObjectBuilder();\n        StringBuilder json = new StringBuilder();\n\
  \        try (StringWriter sw = new StringWriter();) {\n            for (BookAuthor\
  \ author : authors) {\n                System.out.println(\"author\" + author.getLast());\n\
  \                builder.add(\"author\", Json.createObjectBuilder()\n          \
  \          .add(\"authorId\", author.getId())\n                    .add(\"first\"\
  , author.getFirst())\n                    .add(\"last\", author.getLast())\n   \
  \                 .add(\"bio\", author.getBio()));\n            }\n            JsonObject\
  \ result = builder.build();\n            try (JsonWriter writer = Json.createWriter(sw))\
  \ {\n                writer.writeObject(result);\n            }\n            json.append(sw.toString());\n\
  \            authorJson = json.toString();\n        } catch (IOException ex) {\n\
  \            System.out.println(ex);\n        }\n    }\n    ...\n}\n```\n\n![](img/index-578_1.jpg)\n\
  \n第 14 章 ■ WebSocket 与 JSON\n\n创建完成后，`JsonObject` 可以传递给客户端进行处理，或者在本例中，可以持久化到磁盘。可以通过访问\
  \ URL `http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/recipe14_03.xhtml`\
  \ 来执行代码。输出将如图 14-5 所示。\n\n***图 14-5.** 配方 14-3 的输出*\n\n工作原理\n\n\n\nJavaScript 对象表示法处理（JSON-P）API\
  \ 自 Java EE 7 发布起被添加到 Java 企业平台。JSON-P，也被称为“带填充的 JSON”，已成为使用 Java 构建 JSON 对象的标准方式。JSON-P\
  \ API 包含一个辅助类，可用于使用构建器模式创建 JSON 对象。使用 `JsonObjectBuilder` 类，可以通过一系列方法调用来构建 JSON\
  \ 对象，每个调用都相互构建——这就是构建器模式。一旦 JSON 对象构建完成，可以调用 `JsonObjectBuilder` 的 `build` 方法来返回一个\
  \ `JsonObject`。\n\n在本配方的示例中，你将构建一个提供图书作者详细信息的 JSON 对象。\n\n`JsonObjectBuilder.beginObject()`\
  \ 方法用于表示正在创建一个新对象。`add` 方法用于添加更多的名称/值属性，这与 `Map` 非常相似。因此，下面这行代码添加了一个名为 `authorId`\
  \ 的属性，其值为 `author.getId()`：\n\n`.add(\"authorId\", author.getId())`\n\n对象可以相互嵌入，在一个\
  \ `JsonObject` 内创建不同部分的层次结构。在示例中，第一次调用 `add()` 之后，通过调用 `beginObject()` 并传入嵌入对象的名称，将另一个名为\
  \ `author` 的对象嵌入到初始的 `JsonObject` 中。嵌入对象也可以包含属性；因此，要向嵌入对象添加属性，请在嵌入对象内部调用 `add()`\
  \ 方法。`JsonObject` 可以根据需要包含任意数量的嵌入对象。以下代码行演示了嵌入对象定义的开始和结束：\n\n`.beginObject(\"author\"\
  )`\n\n`.add(\"first\", \"Josh\")`\n\n`.add(\"last\", \"Juneau\")`\n\n`.endObject()`\n\
  \n一个 `JsonObject` 也可能包含一个相关子对象的数组。要添加一个子对象数组，请调用 `beginArray()` 方法，并将数组名称作为参数传入。数组可以由对象甚至对象、数组等的层次结构组成。在本配方的示例中，`book`\
  \ 对象定义了几个数组，一个是 `editor` 对象数组，另一个是 `technicalReviewer` 对象数组。\n\n![](img/index-579_1.jpg)\n\
  \n第 14 章 ■ WebSocket 与 JSON\n\n一旦创建了 `JsonObject`，就可以将其传递给客户端。WebSocket 非常适合将 `JsonObject`\
  \ 传回客户端，但还有许多不同的技术可用于与 JSON 通信。\n\n14-4. 将 JSON 对象写入磁盘\n\n问题\n\n你想将一个 JSON 对象写入文件系统。\n\
  \n解决方案\n\n利用 JSON-P API 构建一个 JSON 对象，然后将其存储到文件系统。`JsonWriter` 类使得在磁盘上创建文件并将 JSON\
  \ 写入该文件成为可能。在以下示例中，使用此技术将配方 14-3 中生成的 `JsonObject` 写入磁盘：\n\n```java\npublic void\
  \ writeJson() {\n\n    try {\n\n        JsonObject jsonObject = jsonController.buildAuthorsJson();\n\
  \n        javax.json.JsonWriter jsonWriter = Json.createWriter(new FileWriter\n\n\
  \        (\"Authors.json\"));\n\n        jsonWriter.writeObject(jsonObject);\n\n\
  \        jsonWriter.close();\n\n        FacesContext.getCurrentInstance().addMessage(null,\
  \ new FacesMessage(\n\n                FacesMessage.SEVERITY_INFO, \"JSON Built\"\
  ,\n\n                \"JSON Built\"));\n\n    } catch (IOException ex) {\n\n   \
  \     System.out.println(ex);\n\n    }\n\n}\n```\n\n可以通过访问 URL `http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/recipe14_04.xhtml`\
  \ 来执行此代码。输出将如图 14-6 所示。\n\n***图 14-6.** 配方 14-4 的输出*\n\n第 14 章 ■ WebSocket 与 JSON\n\
  \n成功执行后，`Authors.json` 文件将在 `//JAVA_DEV/glassfish7/glassfish/domain/domain/config`\
  \ 目录下创建。\n\n工作原理\n\n`JsonWriter` 类可用于将 `JsonObject` 写入 Java 的 `Writer` 对象。通过将 `Writer`\
  \ 对象作为参数传入来实例化 `JsonWriter`。实例化 `JsonWriter` 将使用 JSON 格式写入作为参数传入的 `Writer` 对象。创建该\
  \ `Writer` 后，可以调用 `JsonWriter` 的 `writeObject()` 方法，并传入要写入的 `JsonObject`。写入 `JsonObject`\
  \ 后，可以通过调用其 `close()` 方法来关闭 `JsonWriter`。这些是将 JSON 对象写入 Java `Writer` 类类型所需的全部步骤。\n\
  \n14-5. 从输入源读取 JSON\n\n问题\n\n你想读取一个已构建或持久化到文件的 JSON 对象。\n\n解决方案\n\n获取你想要读取的 JSON\
  \ 对象，然后使用 `jakarta.json.Json` 的 `createReader` 工具进行读取。在以下示例中，从磁盘读取一个 JSON 文件，然后解析它以确定内部的事件层次结构。在解析\
  \ JSON 时，每个事件都会被打印到服务器日志中：\n\n```java\npublic String readObject() {\n\n    InputStream\
  \ in = new ByteArrayInputStream(controller.buildAndReturnAuthors().\n\n    getBytes());\n\
  \n    // 或者\n\n    //Reader fileReader = new InputStreamReader(getClass().getResourceAsStream\n\
  \n    (\"AuthorObject.json\"));\n\n    //JsonReader reader = Json.createReader(fileReader);\n\
  \n    JsonReader reader = Json.createReader(in);\n\n    JsonObject obj = reader.readObject();\n\
  \n    return obj.toString();\n\n}\n```\n\n![](img/index-581_1.png)\n\n第 14 章 ■ WebSocket\
  \ 与 JSON\n\n上述代码可以通过访问 URL `http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/recipe14_05.xhtml`\
  \ 来执行。输出将如图 14-7 所示。\n\n***图 14-7.** 配方 14-5 的输出*\n\n工作原理\n\n一旦 JSON 对象被持久化到磁盘，之后就需要将其读回以供使用。`JsonReader`\
  \ 对象负责处理此任务。要创建 `JsonReader` 对象，请调用 `Json.createReader()` 方法，并传入 `InputStream` 或\
  \ `Reader` 对象。创建 `JsonReader` 对象后，可以通过调用其 `readObject` 方法来生成一个 `JsonObject`。\n\n\
  解析内容\n\n为了执行某些任务，必须搜索 JSON 对象以仅找到当前任务所需且有用的内容。使用 JSON 解析器可以使此类工作更容易，因为解析器能够将对象分解成碎片，以便根据需要检查每个不同的碎片，从而产生所需的结果。\n\
  \n`jakarta.json.Json` 类包含一个静态工厂方法 `createParser()`，它接受多种输入并返回一个可迭代的 `JsonParser`。表\
  \ 14-3 列出了通过 `createParser()` 方法接受的不同可能的输入类型。\n\n***表 14-3.** createParser 方法输入类型*\n\
  \n| **输入类型** | **方法调用** |\n| :--- | :--- |\n| `InputStream` | `createParser(InputStream\
  \ in)` |\n| `JsonArray` | `createParser(JsonArray arr)` |\n| `JsonObject` | `createParser(JsonObject\
  \ obj)` |\n| `Reader` | `createParser(Reader reader)` |\n\n一旦创建了 `JsonParser`，就可以将其转换为\
  \ `Event` 对象的 `Iterator`。每个 `Event` 对应于 JSON 对象内的不同结构。例如，当创建 JSON 对象时，会发生 `START_OBJECT`\
  \ 事件；添加一个名称/值对将触发 `KEY_NAME` 和 `VALUE_STRING` 事件。\n\n第 14 章 ■ WebSocket 与 JSON\n\
  \n这些事件可用于从 JSON 对象中获取所需信息。在示例中，事件名称仅被打印到服务器日志。然而，在实际应用中，条件语句很可能会测试每次迭代以找到特定事件，然后执行一些处理。表\
  \ 14-4 列出了不同的 JSON 事件，以及每个事件发生时的描述。\n\n***表 14-4.** JSON 对象事件*\n\n| **事件** | **发生时机**\
  \ |\n| :--- | :--- |\n| `START_OBJECT` | 对象的开始 |\n| `END_OBJECT` | 对象的结束 |\n| `START_ARRAY`\
  \ | 数组的开始 |\n| `END_ARRAY` | 数组的结束 |\n| `KEY_NAME` | 键的名称 |\n| `VALUE_STRING` |\
  \ 字符串格式的名称/值对的值 |\n| `VALUE_NUMBER` | 数字格式的名称/值对的值 |\n\n\n\n数值格式的名称/值对的值\n\nVALUE_TRUE\n\
  \n布尔格式的名称/值对的值\n\nVALUE_FALSE\n\n布尔格式的名称/值对的值\n\nVALUE_NULL\n\n空值（NULL）的名称/值对的值\n\
  \n14-6\\. 在 JSON 与 Java 对象之间进行转换\n\n问题\n\n你从 Web 服务的响应中获取了一个 Java 对象列表，并希望将其转换为\
