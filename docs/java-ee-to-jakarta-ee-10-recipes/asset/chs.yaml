  工作原理\n\n有状态会话 Bean 是一个 Java 类，用于封装应用程序的业务逻辑。在大多数情况下，有状态 Bean 与实体类存在一一对应关系，即该 Bean\
  \ 处理与特定实体相关的所有数据库调用。从编程角度来看，有状态会话 Bean 在这方面与无状态会话 Bean 非常相似。然而，有状态会话 Bean 保证能够与客户端维持会话状态，而无状态会话\
  \ Bean 则不能。也就是说，应用服务器容器以不同的方式处理有状态会话 Bean，并且它们的生命周期与无状态会话 Bean 有很大不同。应用服务器容器维护一个供客户端使用的有状态会话\
  \ Bean 池，但客户端与 Bean 之间存在一一映射关系：当客户端调用一个有状态 Bean 时，在该客户端仍处于活动状态期间，容器不会将该 Bean 释放回池中。因此，有状态会话\
  \ Bean 的效率可能低于无状态 Bean，并且它们占用的内存空间可能比无状态会话 Bean 更大，因为如果有大量活动会话使用有状态 Bean，那么内存中就会保留大量处于活动状态的有状态\
  \ Bean 来服务这些会话。\n\n要创建有状态会话 Bean，必须使用 `@Stateful` 注解将该类标记为有状态。\n\n`@Stateful` 注解的可选\
  \ `name` 参数可用于为 Bean 指定一个基于字符串的名称。与无状态会话 Bean 类似，有状态会话 Bean 可以实现一个业务接口，但从 EJB 3.1\
  \ 开始，这不是强制性的。在本示例中，没有使用业务接口；因此，Bean 中任何具有 `public` 修饰符的方法都将可供客户端使用。任何用于存储会话状态的变量都必须是\
  \ Java 基本类型或可序列化类型。当使用实例变量存储数据时，该数据将在整个会话生命周期内得以维持。\n\n每个有状态会话 Bean 还必须包含一个方法，该方法将在\
  \ Bean 客户端移除该 Bean 时被调用。Bean 的状态将一直维持，直到调用 `@Remove` 方法。当发生这种情况时，容器将调用使用 `@Remove`\
  \ 注解的方法，并且在 `@Remove` 方法执行完毕后，该 Bean 将被移除。\n\n第 8 章 ■ Jakarta 企业 Bean\n\n**有状态会话\
  \ Bean 的生命周期**\n\n有状态会话 Bean 具有以下生命周期：\n\n1.  每当启动一个新的客户端会话时，容器会利用默认构造函数创建新的 Bean\
  \ 实例。\n2.  资源被注入到 Bean 中。\n3.  Bean 实例被存储在内存中。\n4.  执行客户端调用的方法。\n5.\n\n\n\nbean\
  \ 会等待并执行任何后续请求。\n\n6.\n\n如果客户端在一段时间内保持空闲，bean 会被*钝化*或从活动内存中移除并存入临时存储。\n\n7.\n\n\
  客户端对已钝化 bean 的调用会将其从临时存储中重新加载回内存。\n\n8.\n\n如果客户端在一段时间内未调用已钝化的 bean 实例，该 bean 将被销毁。\n\
  \n9.\n\n如果客户端请求移除某个 bean 实例，则该实例会在必要时被激活，然后被销毁。\n\n有状态会话 bean 会在内存中存储一段时间。如果客户端在一段时间后不再请求使用某个有状态\
  \ bean，则容器会将其钝化。钝化是指将有状态会话 bean 从活动内存中取出，并存储到磁盘上的临时位置的过程。容器通过序列化整个 bean 实例并将其移动到磁盘上的永久存储来实现这一点。之后，如果客户端调用该\
  \ bean，它会被重新激活，而激活是钝化的逆过程。\n\n另一种基于时间钝化有状态会话 bean 的方式是使用 `@StatefulTimeout` 注解类。此注解允许开发者选择维持\
  \ bean 状态的时间长度。在本示例中，状态会在 bean 被钝化前维持 30 分钟：\n\n`@StatefulTimeout(unit = TimeUnit.MINUTES,\
  \ value = 30)`\n\n有状态会话 bean 比无状态会话 bean 拥有更多的回调方法。回调方法可用于在 bean 生命周期的特定时刻执行操作。具体来说，可以在方法签名前放置以下注解，以便在给定的\
  \ bean 生命周期事件发生时标记它们以供执行：`@PostConstruct`、`@PrePassivate`、`@PostActivate` 和 `@PreDestroy`。`@PostConstruct`\
  \ 注解表示被注解的方法将在实例创建时由容器执行。`@PrePassivate` 表示被注解的方法将在钝化发生前由容器执行。`@PostActivate` 表示被注解的方法应在激活后执行，换句话说，即\
  \ bean 重新变为活动状态时。最后，被 `@PreDestroy` 注解的方法将在 bean 被销毁前由容器执行。\n\n如果你的会话 bean 需要在整个对话过程中保持状态的能力，那么你需要使用有状态会话\
  \ bean。然而，务必谨慎使用有状态会话 bean，因为它们的效率低于无状态会话 bean，并且在应用服务器上需要更大的内存占用。\n\n第 8 章 ■ Jakarta\
  \ Enterprise Beans\n\n8-4\\. 将会话 bean 与 Jakarta Server Faces 结合使用\n\n问题\n\n你想为会话\
  \ bean 开发一个基于 Web 的客户端，该客户端与会话 bean 本身位于同一容器内。\n\n解决方案\n\n编写一个 Java 客户端，并直接与你选择的会话\
  \ bean 进行交互。以下代码演示了一个直接与无状态会话 bean 交互的 CDI 控制器。名为 `BookController` 的 Jakarta Server\
  \ Faces CDI bean 是 `BookFacade` 会话 bean 的客户端类。从代码中你可以看到，该 bean 能够通过声明与 `BookFacade`\
