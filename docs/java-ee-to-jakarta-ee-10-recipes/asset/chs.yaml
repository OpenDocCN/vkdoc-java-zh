  工作原理\n\n\n\n命令组件使得 Jakarta Server Faces 与使用 Jakarta Server Pages 技术截然不同。在许多其他技术中，表单动作用于处理请求参数并执行所需的业务逻辑。而借助\
  \ Jakarta Server Faces 的命令组件，Java 方法可以直接绑定到按钮或链接上，并在组件被激活（点击按钮或链接）时被调用。在本配方的示例中，同时使用了\
  \ commandButton 和 commandLink 组件。commandButton 组件用于提交表单请求参数以进行处理，而 commandLink 组件则绑定到一个动作方法，该方法会执行重定向到另一个应用程序页面。\n\
  \n命令组件拥有一些值得注意的属性。这些属性及其描述分别列于表 4-5 和 4-6 中。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\
  \n***表 4-5.** commandButton 组件附加属性*\n\n**属性**\n\n**描述**\n\naction\n\n表达式，指定一个受管\
  \ Bean 动作方法，该方法将在用户激活组件时被调用\n\nactionListener 表达式，指定一个受管 Bean 动作方法，该方法将在组件被激活时收到通知。动作方法应为\
  \ public 类型，接受一个 ActionEvent 参数，并返回 void 类型\n\nclass\n\n可应用于组件的 CSS 样式类\n\ndir\n\
  \n文本方向指示（LTR，从左到右；RTL，从右到左）\n\ndisabled\n\n布尔值，指示组件是否被禁用\n\nimage\n\n将显示在按钮上的图像的绝对或相对\
  \ URL\n\nimmediate\n\n标志，指示如果用户激活此组件，应立即向感兴趣的监听器和动作发送通知（即在应用请求值阶段），而不是等待直到调用应用程序阶段\n\
  \nlabel\n\n组件的名称\n\nlang\n\n用于生成组件标记的语言代码\n\nreadonly\n\n布尔值，指示组件是否为只读\n\nrendererType\n\
  \n渲染器实例的标识符\n\ntabindex\n\n索引值，指示将组件置于焦点所需的 Tab 键按下次数\n\ntitle\n\n当鼠标悬停在组件上时显示的工具提示\n\
  \ntransient\n\n布尔值，指示组件是否应包含在组件树的状态中\n\ntype\n\n指示要创建的按钮类型。值为 submit（默认）、reset 和\
