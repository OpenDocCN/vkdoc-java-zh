  \n}\n\n类似地，JSON-B API 也可用于从 JSON 转换为 Java。在以下方法中，从 Web 服务调用返回一个 JSON 字符串，并将其转换为\
  \ Java 集合：\n\npublic List<Employee> fetchJavaFromJson(){\n\nWebTarget target = ClientBuilder.newClient().target(\"\
