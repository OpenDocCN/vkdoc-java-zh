  \n</ui:define>\n\n当页面被渲染时，每个组件将根据其关联的验证规则独立响应。\n\n也就是说，如果某个组件的验证失败，则只会显示与该验证失败的组件相对应的消息组件，尽管在\
  \ `f:ajax` 的 `render` 属性中指定的每个组件都会被重新渲染。\n\n\n\n■ **注意**：由于指定了全局的 `f:ajax` 标签，密码组件现在可以执行两个\
  \ Ajax 请求。其中一个用于验证字段是否为空，另一个用于确保给定的密码字符串强度足够。\n\n工作原理\n\n将多个组件分组到同一个 Ajax 行为下有其优势。例如，如果出于某种原因需要调整该行为，只需对\
  \ Ajax 行为进行一次修改，组内的所有组件即可受益于这一调整。然而，`f:ajax` 标签足够智能，能够使每个组件仍然利用各自独立的功能（如验证或操作），因此每个组件仍可拥有自定义的\
  \ Ajax 行为。要将组件分组到单个 `f:ajax` 标签下，它们必须作为 `f:ajax` 标签的子元素添加到视图中。也就是说，所有子组件都必须包含在 `f:ajax`\
  \ 的起始和结束标签之间。所有被包含的组件随后将使用 Ajax，通过 JavaScript 以异步方式向服务器发送请求。\n\n在本示例中，新闻简报订阅视图中的几个\
  \ `inputText` 组件被封装在一个 `f:ajax` 标签内，以便在它们失去焦点时，使用服务器端 Bean 验证对其值进行验证。用于分组组件的 `f:ajax`\
  \ 标签的 `event` 属性设置为 `blur`，其 `render` 属性包含基于字符串的标识符，这些标识符对应于组内每个组件所对应的消息组件。当 Ajax\
  \ 行为完成时，使用空格分隔的组件 ID 列表重新渲染每个消息组件，并显示因验证而产生的任何错误。\n\n4-16. Ajax 功能的自定义处理\n\n问题\n\
  \n您希望为应用程序视图中的 Jakarta Server Faces 组件自定义 Ajax 处理过程。\n\n解决方案\n\n编写用于处理请求的 JavaScript，并利用\
  \ `jsf.ajax.request()` 函数以及 Jakarta Server Faces 组件的标准 JavaScript 事件处理属性之一。\n\n\
  以下示例是 Acme Bookstore 应用程序中新闻简报订阅页面的 Jakarta Server Faces 视图。之前用于验证 `inputText` 字段（配方\
  \ 3-1）的所有 `f:ajax` 标签已被移除，每个 `inputText` 组件的 `onblur` 属性被设置为使用 `jsf.ajax.request()`\
  \ 方法，以实现组件的 Ajax 化。以下摘录自名为 `recipe04_15.xhtml` 的视图，代表更新后的新闻简报订阅 Jakarta Server Faces\
  \ 视图：\n\n...\n\n<h:outputScript name=\"jsf.js\" library=\"jakarta.faces\" target=\"\
  head\"/>\n\n<h1>订阅新闻简报</h1>\n\n<p>\n\n<h:outputText id=\"newsletterSubscriptionDesc\"\
  \n\nvalue=\"#{ch3ContactController.\n\nnewsletterDescription}\"/>\n\n</p>\n\n<br/>\n\
  \n<h:messages id=\"newsletterSubscriptionMsgs\" globalOnly=\"true\"\n\nerrorStyle=\"\
  color: red\" infoStyle=\"color: green\"/>\n\n<br/>\n\n<h:panelGrid columns=\"2\"\
  \ bgcolor=\"\" border=\"0\">\n\n<h:panelGroup>\n\n<h:outputLabel for=\"first\" value=\"\
  名：\"/>\n\n<h:inputText id=\"first\" size=\"40\" value=\"#{ch3ContactController.\n\
  \ncurrent.first}\"\n\nonblur=\"jsf.ajax.request(this, event, {execute:\n\n'first',\
  \ render: 'firstError'});\n\nreturn false;\">\n\n<f:validateLength minimum=\"1\"\
  \ maximum=\"40\"/>\n\n</h:inputText>\n\n</h:panelGroup>\n\n<h:panelGroup>\n\n<h:outputLabel\
  \ for=\"last\" value=\"姓：\"/>\n\n<h:inputText id=\"last\" size=\"40\" value=\"#{ch3ContactController.\n\
  \ncurrent.last}\"\n\nonblur=\"jsf.ajax.request(this, event, {execute:\n\n'last',\
  \ render: 'lastError'});\n\nreturn false;\">\n\n<f:validateLength minimum=\"1\"\
  \ maximum=\"40\"/>\n\n</h:inputText>\n\n</h:panelGroup>\n\n<h:message id=\"firstError\"\
  \n\nfor=\"first\"\n\nerrorStyle=\"color:red\"/>\n\n<h:message id=\"lastError\"\n\
  \nfor=\"last\"\n\nerrorStyle=\"color:red\"/>\n\n<h:panelGroup>\n\n<h:outputLabel\
  \ for=\"email\" value=\"邮箱：\"/>\n\n<h:inputText id=\"email\" size=\"40\" value=\"\
  #{ch3ContactController.\n\ncurrent.email}\"\n\nonblur=\"jsf.ajax.request(this, event,\
  \ {execute:\n\n'email', render: 'emailError'});\n\nreturn false;\"/>\n\n</h:panelGroup>\n\
  \n<h:panelGroup/>\n\n<h:message id=\"emailError\"\n\nfor=\"email\"\n\nerrorStyle=\"\
  color:red\"/>\n\n<h:panelGroup/>\n\n...\n\n■ **注意**：`<h:panelGroup/>` 标签用于在网格中添加一个占位面板组，以保持间距。\n\
  \n使用此技术，为 `onblur` 事件指定 Ajax 行为的 `inputText` 组件将在失去焦点时异步验证其值。如果需要使用任何自定义 JavaScript\
  \ 代码，可以将其添加到对 `jsf.ajax.request()` 的同一内联 JavaScript 调用中。\n\n■ **注意**：无法使用 `jsf.ajax.request()`\
  \ 技术调用 CDI 控制器的方法，因此无法通过 Ajax 请求显式调用监听器。\n\n工作原理\n\nJavaScript API 方法 `jsf.ajax.request()`\
  \ 可以被 Facelets 应用程序直接访问，使开发者比使用 `f:ajax` 标签拥有更多的控制权。在后台，`f:ajax` 标签会被转换为对 `jsf.ajax.request()`\
  \ 的调用，并通过标签的属性传递参数。要使用此技术，必须在视图中包含 `jsf.js` 库。应在视图中包含一个 Jakarta Server Faces 的 `outputScript`\
  \ 标签，指定 `jsf.js` 作为脚本名称，`jakarta.faces` 作为库。本示例中的 `jsf.js` 脚本将放置在视图的 `<head>` 部分，这是通过为\
  \ `outputScript` 标签的 `target` 属性指定 `head` 来实现的。以下示例摘录展示了该标签应如何编写：\n\n<h:outputScript\
  \ name=\"jsf.js\" library=\"jakarta.faces\" target=\"head\"/>\n\n■ **注意**：为避免嵌套\
  \ ID，建议在手动使用 `jsf.ajax.request()` 时，为 `h:form` 属性指定 `prependId=\"false\"`。例如，表单标签应如下所示：\n\
  \n<h:form prependId=\"false\">\n\n`jsf.ajax.request()` 方法可以内联调用，如本示例所示，并且可以从给定组件的任何\
  \ JavaScript 事件属性中调用。调用该 JavaScript 方法的格式如下：\n\njsf.ajax.request(component, event,{execute:'id\
  \ or keyword', render:'id or keyword'});\n\n通常，当使用内联调用发出请求时，第一个参数指定为 `this` 关键字，表示应传递当前组件。`event`\
  \ 关键字作为第二个参数传递，它同时传递了当前发生在组件上的事件。最后，传递一个名称-值对映射，分别指定 `execute` 和 `render` 属性以及组件标识符或关键字，这些标识符或关键字分别表示执行完成后应执行和渲染的内容。\n\
  \n■ **注意**：您还可以通过指定 `@ResourceDependency` 注解，从控制器类中使用 `jsf.ajax.request` 方法，如下所示：\n\
  \n@ResourceDependency(name=\"jsf.js\" library=\"jakarta.faces\" target=\"head\"\
  )\n\n以下代码可通过在浏览器中输入 URL `http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_15.xhtml`\
  \ 来运行。本配方的最终输出应如图 4-12 所示。\n\n![](img/index-287_1.jpg)\n\n***图 4-12.** 配方输出*\n\n\
  4-17. 监听系统级事件\n\n问题\n\n您希望在应用程序中发生系统级事件时调用一个方法。\n\n解决方案\n\n\n\n通过实现 `SystemEventListener`\
  \ 接口并重写 `processEvent(SystemEvent event)` 和 `isListenerForSource(Object source)`\
  \ 方法，创建一个系统事件监听器类。根据需求实现这些方法以执行所需的事件处理。以下代码展示了一个名为 `BookstoreAppListener` 的类，它在应用程序启动或关闭时被调用：\n\
  \n```java\npublic class BookstoreAppListener implements SystemEventListener {\n\n\
  \    @Override\n    public void processEvent(SystemEvent event) throws AbortProcessingException\
  \ {\n        if (event instanceof PostConstructApplicationEvent) {\n           \
  \ System.out.println(\"应用程序已构建完成...\");\n        }\n        if (event instanceof\
  \ PreDestroyApplicationEvent) {\n            System.out.println(\"应用程序正在销毁...\"\
  );\n        }\n    }\n\n    @Override\n    public boolean isListenerForSource(Object\
  \ source) {\n        return (source instanceof Application);\n    }\n}\n```\n\n\
  接下来，必须在 `faces-config.xml` 文件中注册系统事件监听器。以下摘录来自 Acme Bookstore 应用程序的 `faces-config.xml`\
  \ 文件：\n\n```xml\n...\n<application>\n    <system-event-listener>\n        <system-event-listener-class>\n\
  \            org.jakartaeerecipes.chapter03.recipe03_10.BookstoreAppListener\n \
  \       </system-event-listener-class>\n        <system-event-class>\n         \
  \   jakarta.faces.event.PostConstructApplicationEvent\n        </system-event-class>\n\
  \    </system-event-listener>\n    <system-event-listener>\n        <system-event-listener-class>\n\
  \            org.jakartaeerecipes.chapter03.recipe03_10.BookstoreAppListener\n \
  \       </system-event-listener-class>\n        <system-event-class>\n         \
  \   jakarta.faces.event.PreDestroyApplicationEvent\n        </system-event-class>\n\
  \    </system-event-listener>\n</application>\n...\n```\n\n当应用程序启动时，服务器日志中会显示消息“应用程序已构建完成...”。当应用程序关闭时，服务器日志中会显示消息“应用程序正在销毁...”。\n\
  \n**工作原理**\n\n在应用程序启动时执行某些任务的能力有时非常有用。例如，假设你希望在每次应用程序启动时向应用程序管理员发送一封电子邮件。你可以通过在一个实现\
  \ `SystemEventListener` 接口的类中执行发送电子邮件的任务来实现这一点。实现 `SystemEventListener` 的类必须重写两个方法：`processEvent(SystemEvent\
  \ event)` 和 `isListenerForSource(Object source)`。`processEvent()` 方法是实际执行操作的地方，因为你的自定义代码应放置在该方法中。\n\
  \n每当系统事件发生时，`processEvent()` 方法就会被调用。在此方法中，你需要执行检查以确定发生了哪种类型的事件，从而只处理相关的事件。要确定发生的事件，请对\
  \ `SystemEvent` 对象执行 `instanceof()` 检查。在示例中，使用了两个 `if` 语句来确定发生的事件类型，并为每种事件打印不同的消息。如果事件类型是\
  \ `PostConstructApplicationEvent`，则表示应用程序正在构建。否则，如果事件类型是 `PreDestroyApplicationEvent`，则表示应用程序即将销毁。`PostConstructApplicationEvent`\
  \ 事件在应用程序构建完成后被调用，而 `PreDestroyApplicationEvent` 则在应用程序销毁之前被调用。\n\n在 `SystemEventListener`\
  \ 类中必须重写的另一个方法是 `isListenerForSource()`。如果此监听器实例对接收来自 `source` 参数所引用实例的事件感兴趣，则此方法必须返回\
  \ `true`。由于示例类是为监听应用程序的系统事件而构建的，因此如果 `source` 参数是 `Application` 的实例，则返回 `true`。\n\
  \n编写完系统事件监听器类后，需要将其注册到\n\n\n\n应用。在示例中，你需要同时监听 `PostConstructApplicationEvent` 和\
  \ `PreDestroyApplicationEvent`，因此需要在 `faces-config.xml` 文件中为每个事件添加一个 `system-event-listener`\
  \ 元素。在 `system-event-listener` 元素内部，通过 `system-event-listener-class` 元素指定事件监听器类的名称，并通过\
  \ `system-event-class` 元素指定事件的名称。\n\n4-18. 监听组件事件\n\n问题\n\n你想在指定的组件事件发生时调用一个监听器方法。例如，你想监听一个组件的渲染事件。\n\
  \n解决方案\n\n在你想要监听事件的组件内嵌入一个 `f:event` 标签。`f:event` 标签允许组件根据当前的组件状态调用控制器类的监听器方法。例如，当一个组件正在被渲染或验证时，可以调用一个指定的监听器方法。在本配方的示例中，一个\
  \ `outputText` 组件被添加到 Acme Bookstore 应用的图书视图中，用于指明当前图书是否在用户的购物车中。当 `outputText`\
  \ 组件被渲染时，会调用一个组件监听器，检查购物车的当前状态，看图书是否在其中。如果在购物车中，`outputText` 组件将渲染一条消息说明这一点；如果不在，`outputText`\
  \ 组件将渲染一条消息说明它不在购物车中。\n\n以下摘录来自一个名为 `recipe04_17.xhtml` 的视图，它是该应用图书视图的一个衍生版本。它演示了在组件中使用\
  \ `f:event` 标签。请注意，`outputText` 组件不包含 `value` 属性，因为该值将在事件监听器中设置：\n\n...\n\n<h:outputText\
  \ id=\"isInCart\" style=\"font-style: italic;\">\n\n<f:event type=\"preRenderComponent\"\
  \ listener=\"#{ch3CartController.isBookInCart}\"/>\n\n</h:outputText>\n\n...\n\n\
  第 4 章 ■ 高级 Jakarta Server Faces\n\n`CartController` 类包含一个名为 `isBookInCart(ComponentSystemEvent)`\
  \ 的方法。视图中的 `f:event` 标签通过 `CartController` 的控制器名称 `ch3CartController` 引用此监听器方法。该监听器方法负责构造将在\
  \ `outputText` 组件中显示的文本：\n\npublic void isBookInCart(ComponentSystemEvent event)\
  \ {\n\nUIOutput output = (UIOutput) event.getComponent();\n\nif (cart != null) {\n\
  \nif (searchCart(authorController.getCurrentBook().getTitle()) > 0) {\n\noutput.setValue(\"\
  This book is currently in your cart.\");\n\n} else {\n\noutput.setValue(\"This book\
  \ is not in your cart.\");\n\n}\n\n} else {\n\noutput.setValue(\"This book is not\
  \ in your cart.\");\n\n}\n\n}\n\n工作原理\n\nJakarta Server Faces 应用中发生的一切都由应用生命周期控制。\n\
  \n作为生命周期的一部分，Jakarta Server Faces 组件在其整个生命周期中会经历不同的阶段。可以向 Jakarta Server Faces 组件添加监听器，以便在某个阶段开始或结束时执行不同的任务。创建组件监听器需要解决两个问题：嵌入在组件中的标签（你的监听器将为其执行任务）以及监听器方法本身。要向组件添加监听器，应将\
  \ `f:event` 标签嵌入到将被检查的组件的开始和结束标签之间。`f:event` 标签包含几个属性，但只有两个是必须使用的：`type` 和 `listener`。`type`\
  \ 属性指定要监听的事件类型，`listener` 属性指定当该事件发生时要调用的控制器类监听器方法。可以为 `name` 属性指定的有效值包括 `preRenderComponent`、`postAddToView`、`preValidate`\
  \ 和 `postValidate`。除了这些事件值之外，任何扩展了 `jakarta.faces.event.ComponentSystemEvent` 的\
  \ Java 类也可以为 `name` 属性指定。\n\n监听器方法必须接受一个 `ComponentSystemEvent` 对象。在示例中，监听器检查购物车是否为空，如果为空，则会为\
  \ `outputText` 组件的 `value` 设置一条指示购物车为空的消息。否则，如果购物车不为空，该方法会遍历购物车中的图书列表，查看当前选中的图书是否在购物车中。然后，一条指示图书是否在购物车中的消息会被添加到\
  \ `outputText` 组件的 `value` 中。通过监听器，组件的实际值被修改了。这种技术可以以多种方式用于修改组件以适应特定情况的需求。\n\n你可以通过在浏览器中访问以下\
  \ URL 来运行以下代码：`http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_16.xhtml`。本配方的最终结果应类似于图\
  \ 4-13。\n\n![](img/index-291_1.jpg)\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n***图 4-13.**\
  \ 配方 4-17 的输出*\n\n4-19. 开发页面流\n\n问题\n\n你想在应用中开发一个页面流，使这些页面能够相互共享信息。\n\n解决方案\n\n\
  使用 Faces Flow 技术定义一个页面流。该解决方案允许一组定义的视图相互关联，共享一组公共数据，而流外部的视图无法访问流的数据。流还有自己的一套导航逻辑，因此它们几乎就像应用中的一个子程序。为了使应用能够使用\
  \ Faces Flow，应在 `faces-config.xml` 文件中添加一个 `<flow-definition>` 部分。该部分可以为空，因为导航逻辑可以放在流的单独配置文件中。以下\
  \ `faces-config.xml` 文件演示了如何为应用启用 Faces Flow：\n\n<faces-config version=\"3.0\"\n\
  \nxsi:schemaLocation=\"https://jakarta.ee/xml/ns/jakartaee\n\nhttps://jakarta.ee/xml/ns/jakartaee/web-facesconfig_3_0.xsd\"\
  >\n\n...\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n<flow-definition>\n\n</flow-definition>\n\
  \n...\n\n</faces-config>\n\n属于某个流的视图应与应用的其他视图分开，并放置到应用 Web 目录根目录下的一个文件夹中。包含流视图的文件夹应命名为与流标识符相同的名称。导航和配置代码包含在位于流视图目录内的一个单独的\
  \ XML 配置文件中，该文件命名为 `flowname-flow.xml`，其中 `flowname` 是流标识符。以下配置文件演示了一个由 `exampleFlow`\
  \ 标识的非常基本的流的配置。关于流配置中可使用的不同元素的更多信息，请参阅“工作原理”部分：\n\n<faces-config version=\"3.0\"\
  \n\nxsi:schemaLocation=\"https://jakarta.ee/xml/ns/jakartaee\n\nhttps://jakarta.ee/xml/ns/jakartaee/web-\n\
  \nfacesconfig_3_0.xsd\">\n\n<flow-definition id=\"exampleFlow\">\n\n</flow-definition>\n\
  \n</faces-config>\n\n属于该流的视图应与流配置文件一起存放在流文件夹内。每个视图都可以访问一个专用于促进该流的控制器类。流共享一个上下文，该上下文在流被访问时开始，在流退出时结束。以下视图演示了一个名为\
  \ `exampleFlow` 的流的入口点。此示例视图可以在本书源码的 `recipes04_18.xhtml` 文件中找到：\n\n<ui:composition\n\
  \ntemplate=\"layout/custom_template_search.xhtml\">\n\n<ui:define name=\"content\"\
  >\n\n<h:messages globalOnly=\"true\" errorStyle=\"color: red\" infoStyle=\"color:\
  \ green\"/>\n\n<h:form id=\"flowForm\">\n\n<p>\n\nFaces Flow 示例\n\n</p>\n\n<h:commandButton\
  \ value=\"开始流\" action=\"exampleFlow\"/>\n\n<h:commandButton value=\"留在此处\" action=\"\
  stay\"/>\n\n</h:form>\n\n</ui:define>\n\n</ui:composition>\n\n\n\n接下来，让我们看一个访问专用于流程的控制器类的视图。在下面的视图中，访问了名为\
  \ `FlowBean` 的控制器类以调用一个方法，该方法将返回一个隐式导航字符串，将应用程序引导至流程中的下一个视图。请注意，此视图还访问了 `facesContext.application.flowHandler`，我将在“工作原理”部分进一步讨论：\n\
  \n<h:body>\n\n<f:view>\n\n<h:form>\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n<p>\n\n\
  这是流程的第一个视图。\n\n<br/><br/>\n\n流程 ID: #{facesContext.application.flowHandler.currentFlow.id}\n\
  \n<br/>\n\n<h:commandLink value=\"跳转到流程中的另一个视图\" action=\"#{flowBean.\n\nnavMethod()}\"\
  />\n\n</p>\n\n</h:form>\n\n</f:view>\n\n</h:body>\n\n流程中的每个后续视图也可以访问流程控制器类的资源。最后，我们来看一下包含在\
  \ `org.jakartaeerecipes.chapter03.FlowBean` 中的代码，这是专用于该流程的控制器类：\n\nimport jakarta.faces.flow.FlowScoped;\n\
  \nimport jakarta.inject.Named;\n\n@Named\n\n@FlowScoped(\"exampleFlow\")\n\npublic\
  \ class FlowBean implements java.io.Serializable {\n\n    private String flowValue;\n\
  \n    private String parameter1;\n\n    /**\n\n     * 创建 FlowBean 的新实例\n\n     */\n\
  \n    public FlowBean() {\n\n    }\n\n    /**\n\n     * 初始化流程\n\n     */\n\n   \
  \ public void initializeIt(){\n\n        System.out.println(\"初始化流程...\");\n\n \
  \   }\n\n    /**\n\n     * 结束流程\n\n     */\n\n    public void finalizeIt(){\n\n\
  \        System.out.println(\"结束流程...\");\n\n    }\n\n    public String navMethod(){\n\
  \n        return \"intermediateFlow\";\n\n    }\n\n    public String testMethod(){\n\
  \n        return \"intermediate\";\n\n    }\n\n    public String endFlow(){\n\n\
  \        return \"endingFlow\";\n\n    }\n\n    /**\n\n     * @return flowValue\n\
  \n     */\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n    public String getFlowValue()\
  \ {\n\n        return flowValue;\n\n    }\n\n    /**\n\n     * @param flowValue\
  \ 要设置的 flowValue\n\n     */\n\n    public void setFlowValue(String flowValue) {\n\
  \n        this.flowValue = flowValue;\n\n    }\n\n    /**\n\n     * @return parameter1\n\
  \n     */\n\n    public String getParameter1() {\n\n        return parameter1;\n\
  \n    }\n\n    /**\n\n     * @param parameter1 要设置的 parameter1\n\n     */\n\n  \
  \  public void setParameter1(String parameter1) {\n\n        this.parameter1 = parameter1;\n\
  \n    }\n\n}\n\n本解决方案快速概述了在 Jakarta Server Faces 应用程序中创建流程所需的文件。在下一节中，我将更详细地介绍这些特性。\n\
  \n工作原理\n\n自 Web 应用程序诞生以来，会话管理一直是一个难以攻克的难题。Web 流程指的是将一组相互关联的 Web 视图组合在一起，并且这些视图必须能够在流程内的每个视图之间共享信息。许多\
  \ Web 框架都试图通过创建不同的解决方案来解决这个问题，以促进跨多个视图的数据共享。通常，会话变量、请求参数和 Cookie 的混合使用被作为一种拼凑式的解决方案。\n\
  \n自 JSF 2.2 以来，采用了一种解决方案来将多个 Jakarta Server Faces 视图相互绑定，使它们能够彼此共享信息。该解决方案被称为 faces\
  \ 流程；它允许一组相互关联的视图属于一个流程实例，并且信息可以在属于该流程实例的所有视图之间共享。流程包含独立的导航，这些导航仅与流程本身相关，而非整个应用程序。因此，流程导航可以以\
  \ XML 格式或通过代码来定义。一个流程包含一个单一的入口点，并且可以从应用程序内的任何位置调用。\n\n定义流程\n\n如本解决方案中所述，使用流程特性的\
  \ Jakarta Server Faces 应用程序的 `faces-config.xml` 文件必须包含一个 `<flow-definition>` 部分。`faces-config.xml`\
  \ 文件的这一部分可以包含特定于应用程序中一个或多个流程的信息。然而，就本解决方案而言，解决方案使用了一个单独的 XML 配置文件来配合流程使用。两种方式都可行；语法略有不同，因为特定于流程的\
  \ XML 配置文件使用了一个新的 Jakarta Server Faces 标签库来访问特定于流程的配置标签。\n\n第 4 章 ■ 高级 Jakarta Server\
  \ Faces\n\n■ **注意** 要了解更多关于使用 `faces-config.xml` 文件进行流程配置的信息，请参考在线文档 ([`eclipse-\
  \ ee4j.github.io/jakartaee- tutorial/#navigation- model`](https://eclipse-ee4j.github.io/jakartaee-tutorial/#navigation-model))。\n\
  \n即使流程没有使用 `faces-config.xml` 文件来定义流程配置，也必须存在 `<flow-definition>` 部分，以告知 Jakarta\
  \ Server Faces 运行时应用程序中使用了流程。\n\n特定于流程的配置文件以及所有与流程相关的视图应位于同一文件夹中，该文件夹位于应用程序 Web\
  \ 目录的根目录下。文件夹的名称应与流程标识符相同。\n\n如解决方案中所述，流程配置文件的命名应为 `flowname-flow.xml`，其中 `flowname`\
  \ 与流程标识符相同。\n\n流程控制器类\n\n一个流程包含其自己的控制器类，该类使用 `@FlowScoped` 注解进行标注，这与 `@SessionScoped`\
  \ 不同，因为数据只能被属于该流程的其他视图（ViewNodes）访问。`@FlowScoped` 注解依赖于上下文和依赖注入（CDI），因为 `FlowScoped`\
  \ 是一个 CDI 作用域，它会使运行时将带有 `@FlowScoped` 注解的类视为处于指定流程的作用域内。`@FlowScoped` bean 维护着一个生命周期，该生命周期随流程实例的开始而开始，随其结束而结束。单个应用程序可以存在多个流程实例，如果用户在一个浏览器标签页中启动一个流程，然后打开另一个标签页，则新标签页中将启动一个新的流程实例。此解决方案解决了围绕会话和允许用户打开多个标签页的标准浏览器的许多遗留问题。为了维护独立的流程实例，Jakarta\
  \ Server Faces 使用 `ClientId` 来区分多个实例。\n\n每个流程可以包含一个初始化器和一个终结器（即，分别在进入流程时调用的方法和退出流程时调用的方法）。要声明初始化器，请在流程配置\
  \ `<flow-definition>` 内指定一个名为 `<initializer>` 的子元素。初始化器元素可以是一个 EL 表达式，用于声明控制器类的初始化方法，如下所示：\n\
  \n...\n\n<initializer>#{flowBean.initializeIt}></initializer>\n\n...\n\n类似地，可以在流程配置中指定一个\
  \ `<finalizer>` 元素，以定义退出流程时将调用的方法。以下演示了如何将终结器设置为声明控制器类终结器方法的 EL 表达式：\n\n...\n\n\
  <finalizer>#{flowBean.finalizeIt}></finalizer>\n\n...\n\n流程可以包含仅能通过流程节点访问的方法调用和变量值。这些方法和变量应放置在\
  \ `FlowScoped` bean 中，其使用方式与标准控制器类的方法和变量相同。主要区别在于，在 `FlowScoped` bean 中定义的任何方法或变量仅对单个流程实例可用。\n\
  \n第 4 章 ■ 高级 Jakarta Server Faces\n\n导航流程视图节点\n\n\n\n流程包含其自身的导航规则，这些规则可以在 `faces-config.xml`\
  \ 文件或单独的流程配置文件中定义。这些规则可以很简单，实现逐页导航，也可以包含条件逻辑。在导航规则中可以指定一系列元素，这些元素将有助于实现条件导航。表 4-20\
  \ 列出了这些不同的元素及其功能说明。\n\n***表 4-20.** 流程导航元素*\n\n**元素**\n\n**描述**\n\nview\n\n导航至标准\
  \ Jakarta Server Faces 视图\n\nswitch\n\n表示一个或多个条件评估为真或假的 EL 表达式。如果为真，则导航至指定的视图节点\n\
  \nflow-return\n\n由流程调用者决定的结果\n\nflow-call\n\n表示对另一个流程的调用；创建一个嵌套流程\n\nmethod-call\n\
  \n任意方法调用，可调用返回导航结果的方法\n\n以下导航序列是一个包含条件逻辑的流程导航示例，使用了表 4-20 中列出的元素：\n\n<flow-definition>\n\
  \n<start-node>exampleFlow</start-node>\n\n<switch id=\"startNode\">\n\n<navigation-case>\n\
  \n<if>#{flowBean.someCondition}</if>\n\n<from-outcome>newView</from-outcome>\n\n\
  </navigation-case>\n\n</switch>\n\n<view id=\"oneFlow\">\n\n<vdl-document>oneFlow.xhtml</vdl-document>\n\
  \n</view>\n\n<flow-return id=\"exit\">\n\n<navigation-case>\n\n<from-outcome>exitFlow</from-outcome>\n\
  \n</navigation-case>\n\n</flow-return>\n\n<finalizer>#{flowBean.finalizeIt}</finalizer>\n\
  \n</flow-definition>\n\n![](img/index-297_1.jpg)\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\
  \n流程表达式语言\n\n流程包含一个名为 `facesFlowScope` 的新表达式语言变量。此变量与当前流程关联，是一个可用于存储流程内任意值的映射。键值对可以通过\
  \ Jakarta Server Faces 视图或控制器类中的 Java 代码进行存储和读取。例如，要显示特定映射键的内容，可以使用以下代码：该键的内容为：#{facesFlowScope.myKey}\n\
  \n要执行此代码，请在浏览器中访问以下 URL：\n\nhttp://localhost:8080/JakartaEERecipes_Chapter04- 1.0-\
  \ SNAPSHOT/chapter04/recipe04_18.xhtml\n\n页面加载后，浏览器中的输出将类似于图 4-14。\n\n***图 4-14.**\
  \ 配方 4-18 的输出*\n\n4-20\\. 从服务器向所有客户端广播消息\n\n问题\n\n您的组织构建了一个 Jakarta EE 应用程序，并且有多个客户端正在使用它。您希望能够从服务器发送一条消息，并将该消息同时分发给所有客户端。\n\
  \n解决方案\n\n使用 `f:websocket` 标签（该标签随 JSF 2.3 版本发布）向所有正在监听的客户端发送消息。以下示例包含一个客户端视图，其中包含一个文本框、一个发送按钮和一个\
  \ `f:websocket` 标签。用户可以在文本框中输入消息并点击发送按钮，输入的消息将被发送到当前正在监听同一通道的所有其他客户端：\n\n<html\n\
  \n>\n\n<head>\n\n</head>\n\n<body>\n\n<ui:composition template=\"layout/custom_template_search.xhtml\"\
  >\n\n<ui:define name=\"content\">\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n<h:messages\
  \ globalOnly=\"true\" errorStyle=\"color: red\" infoStyle=\"color: green\"/>\n\n\
  <h:form id=\"webSocketForm\">\n\n<script type=\"text/javascript\">\n\nfunction messageListener(message)\
  \ {\n\ndocument.getElementById(\"messageDiv\").innerHTML += message +\n\n\"<br/>\"\
  ;\n\n}\n\n</script>\n\n<p>\n\nWebsocket 集成示例\n\n</p>\n\n<p>\n\n在下面的框中输入文本并按下发送按钮。这将向所有已连接的客户端发送一条消息。\n\
  \n</p>\n\n<h:inputText id=\"websocketMessageText\" value=\"#{bookstoreController.\n\
  \nmessageText}\"/>\n\n<br/>\n\n<h:commandButton id=\"sendMessage\" action=\"#{bookstoreController.\n\
  \nsendMessage}\" value=\"发送\">\n\n<f:ajax/>\n\n</h:commandButton>\n\n<br/>\n\n<f:websocket\
  \ channel=\"messagePusher\" onmessage=\"messageListener\" />\n\n\n\n<div id=\"messageDiv\"\
  />\n\n</h:form>\n\n</ui:define>\n\n</ui:composition>\n\n</body>\n\n</html>\n\n以下代码展示了\
  \ messagePusher 通道和 bookstoreController.sendMessage() 方法的后端代码：\n\nimport java.util.Date;\n\
  \nimport jakarta.enterprise.context.ApplicationScoped;\n\nimport jakarta.faces.push.Push;\n\
  \nimport jakarta.faces.push.PushContext;\n\nimport jakarta.inject.Inject;\n\nimport\
  \ jakarta.inject.Named;\n\n@Named(\"bookstoreController\")\n\n@ApplicationScoped\n\
  \npublic class BookstoreController {\n\nprivate Date dayAndTime = null;\n\nprivate\
  \ int counter;\n\n@Inject\n\n@Push(channel=\"messagePusher\")\n\nprivate PushContext\
  \ push;\n\nprivate String messageText;\n\n. . .\n\n![](img/index-299_1.jpg)\n\n\
  第 4 章 ■ 高级 Jakarta Server Faces\n\n/**\n\n* 向所有 WebSocket 客户端发起通知。\n\n*/\n\npublic\
  \ void sendMessage(){\n\nSystem.out.println(\"sending message\");\n\npush.send(messageText);\n\
  \nmessageText = null;\n\n}\n\n. . .\n\n}\n\n最终的解决方案如下所示。如果用户输入内容并点击发送，所有（同一视图上的）监听客户端都将收到该消息。可以通过在浏览器中访问\
  \ URL http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_19.xhtml\
  \ 来执行此代码。该配方的输出结果如图 4-15 所示。\n\n***图 4-15.** 在 Jakarta Server Faces 中使用 WebSocket\
  \ 向已连接的客户端发送消息* 256\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n工作原理\n\nWebSocket 已成为客户端与服务器通信的标准协议。实现\
  \ WebSocket 解决方案有多种不同方式。可以利用诸如 Atmosphere 之类的框架来开发 WebSocket，或者自 Java EE 7 发布以来，也可以使用原生的\
  \ WebSocket 支持。Jakarta Server Faces WebSocket 对这两种方法都提供支持。JSF 2.3 中的支持涵盖了这两种实现，因此提供了一定的灵活性。要启用此支持，必须在\
  \ `web.xml` 部署描述符中指定 `jakarta.faces.ENABLE_WEBSOCKET_ENDPOINT` 上下文参数，并将其值设置为 `true`，如下所示：\n\
  \n<context-param>\n\n<param-name>jakarta.faces.ENABLE_WEBSOCKET_ENDPOINT</param-name>\n\
  \n<param-value>true</param-value>\n\n</context-param>\n\n`f:websocket` 标签在 Jakarta\
  \ Server Faces 客户端视图中启用了对 WebSocket 的支持。该标签包含一个必需的 `channel` 属性，它是一个 `ValueExpression`，用于列出\
  \ WebSocket 客户端将监听的通道。该标签还包含一个必需的 `onmessage` 属性，它也是一个 `ValueExpression`，用于指定在接收到\
  \ WebSocket 消息时要执行的 JavaScript 函数的名称。在示例中，可以看到通道被设置为 `messagePusher`，这意味着服务器必须向名为\
  \ `messagePusher` 的通道发送消息，才能成功发送给此客户端。`message` 属性被设置为 `messageListener`，如果查看已添加到视图中的\
  \ JavaScript 源代码，可以看到它包含一个名为 `messageListener` 的函数。当接收到消息时，会执行此函数。在此示例中，该函数仅将消息打印到视图中\
  \ ID 为 `messageDiv` 的 `div` 元素中。此示例中 JavaScript 函数的签名仅接受消息本身。然而，如果需要，JavaScript\
  \ 函数也可以接受通道名称和事件参数。\n\n`f:websocket` 标签还包含许多其他有用的属性。虽然这些参数是可选的，但在某些情况下可能会用到：\n\n\
  *   `onclose`：指定在消息关闭时调用的 JavaScript 函数。\n*   `scope`：用于限制消息传播的范围。如果设置为 `session`，此属性将消息限制为仅限当前会话中具有相同\
  \ WebSocket 通道的所有客户端视图。\n*   `port`：如果需要，指定非 HTTP 端口的 TCP 端口号。\n\n现在让我们看一下服务器端的实现。此配方的解决方案使用了一个新的\
  \ `PushContext`，它被注入到一个 `ApplicationScoped` bean 中。此 `PushContext` 用于向所有监听客户端发送消息，并且可以通过包含\
  \ `@Push` 注解及其上下文将其注入到任何 CDI bean 中。通道的名称可以通过 `@Push` 注解上的可选 `channel` 属性来指定；否则，它将假定与\
  \ `PushContext` 标识符相同的名称。在示例中，`PushContext` 被简单地命名为“push”。这是所有客户端必须监听的通道。\n\n要发送消息，请调用\
  \ `PushContext` 的 `send()` 方法，并传入要广播的消息。该消息将被编码为 JSON，并传递给客户端上 JavaScript 函数的 `message`\
  \ 参数，该函数对应于 `f:websocket` 的 `onmessage` 属性中指定的函数。消息可以由任意数量的容器组成，包括纯字符串、`List`、`Map`、`Object`\
  \ 等。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n4-21. 以编程方式搜索组件\n\n问题\n\n您希望使用表达式语言或\
  \ Java 代码在 Jakarta Server Faces 视图中查找特定组件或一组组件。您可能希望获取组件访问权限的原因有很多，例如以编程方式调用组件或从视图中的另一个组件引用它们。\n\
  \n解决方案 #1\n\n通过使用表达式语言或从 Java 代码以编程方式，利用 Jakarta Server Faces 组件搜索框架。在以下示例中，使用关键的\
  \ Jakarta Server Faces 搜索术语通过表达式语言更新了一个 Jakarta Server Faces `panelGrid` 组件。`f:ajax`\
  \ 标签包含一个指定 `@parent` 的 `render` 属性，指示一旦 Ajax 过程完成，应重新渲染父组件：\n\n<h:panelGrid columns=\"\
  2\">\n\n<h:outputLabel for=\"password\" value=\"输入站点访问密码：\"/>\n\n<h:inputSecret\
  \ id=\"password\" size=\"40\" value=\"#{ch3ContactController.current.password}\"\
  >\n\n<f:validateRequired/>\n\n<f:ajax event=\"blur\" render=\"@parent\"/>\n\n</h:inputSecret>\n\
  \n<h:panelGroup/>\n\n<h:message id=\"passwordError\"\n\nfor=\"password\"\n\nstyle=\"\
  color:red\"/>\n\n<h:outputLabel for=\"passwordConfirm\" value=\"确认密码：\"/>\n\n<h:inputSecret\
  \ id=\"passwordConfirm\" size=\"40\" value=\"#{ch3ContactController.passwordConfirm}\"\
  \n\nvalidator=\"#{ch3ContactController.validatePassword}\">\n\n<f:ajax event=\"\
  blur\" render=\"@parent\"/>\n\n</h:inputSecret>\n\n<h:panelGroup/>\n\n<h:message\
  \ id=\"passwordConfirmError\"\n\nfor=\"passwordConfirm\"\n\nstyle=\"color:red\"\
  />\n\n</h:panelGrid>\n\n解决方案 #2\n\n利用编程 API 从服务器端 CDI 控制器类中搜索组件。在以下解决方案中，使用 Jakarta\
  \ Server Faces 视图中的一个按钮来调用 CDI bean 中的操作方法。该操作方法仅演示了编程搜索表达式 API。在操作方法中，通过显式 ID 查找组件：\n\
  \n第 4 章 ■ 高级 Jakarta Server Faces\n\npublic void findById() {\n\nFacesContext context\
  \ = FacesContext.getCurrentInstance();\n\nSearchExpressionContext searchContext\
  \ = SearchExpressionContext.createSearchExpressionContext(context, context.getViewRoot());\n\
  \ncontext.getApplication()\n\n.getSearchExpressionHandler()\n\n.resolveComponent(\n\
  \nsearchContext,\n\n\"passwordConfirm\",\n\n(ctx, target) -> out.print(target.getId()));\n\
  \n}\n\n工作原理\n\n\n\n多年来，Jakarta Server Faces 开发者在视图中通过 ID 引用组件时一直面临困难。如果尝试简单地通过 ID\
  \ 查找组件，可能会遇到几个问题。首先，如果没有为 Jakarta Server Faces 组件显式分配 ID，那么 `FacesServlet` 会自动分配一个。在这种情况下，ID\
  \ 在运行时之前是未知的，因此几乎不可能使用 EL 或在 Java 代码中引用该组件。其次，即使为 Jakarta Server Faces 组件分配了静态 ID，Jakarta\
  \ Server Faces 视图的嵌套架构和 Jakarta Server Faces 组件树也会导致每个父组件的 ID 被添加到子组件 ID 的前面。这可能导致组件\
  \ ID 过长，有时甚至难以维护。\n\n此外，即使通过添加父 ID 前缀可以轻松识别指定组件，某些组件（例如嵌套在表格中的组件）在运行时仍会被分配动态 ID。\n\
  \n已有许多第三方库开发了解决方案来应对此问题。OmniFaces 和 PrimeFaces 是其中使用最广泛的。将 Jakarta Server Faces\
  \ 搜索表达式 API 添加到 Jakarta Server Faces 核心中，显著减少了为获取视图中 Jakarta Server Faces 组件访问权限所需的工作量。当组件嵌套在视图中的其他组件深处，或者如前所述是\
  \ `dataTable` 的一部分时，情况尤其如此。搜索表达式 API 允许利用关键字以动态方式搜索组件树，而不是硬编码那些未来可能更改的静态 ID。\n\n\
  在 JSF 2.3 之前，有四个抽象搜索关键字可用于获取对组件的引用，即 `@all`、`@this`、`@form` 和 `@none`。此外，只能在 `f:ajax`\
  \ 标签中执行 EL 搜索表达式。这是一个相当大的限制，而 JSF 2.3 极大地扩展了此功能。请参考表 4-21 了解搜索关键字。搜索表达式 API 新增了以下功能：\n\
  \n• 关键字和搜索表达式可以以编程方式使用。\n\n• 增加了更多关键字。\n\n• 关键字接受参数。\n\n• 关键字是可扩展的，并且可以链式使用。\n\n\
  第 4 章 ■ 高级 Jakarta Server Faces\n\n***表 4-21.** 搜索关键字*\n\n**关键字**\n\n**描述**\n\n\
  `@child(n)`\n\n基础组件的第 n 个子组件\n\n`@composite`\n\n基础组件最近的复合组件\n\n`@id(id)`\n\n基础组件中\
  \ ID 与指定值匹配的最近后代组件\n\n`@namingcontainer`\n\n基础组件最近的命名容器\n\n`@next`\n\n视图中基础组件之后的下一个组件\n\
  \n`@parent`\n\n基础组件的父组件\n\n`@previous`\n\n基础组件的前一个组件\n\n`@root`\n\n`UIViewRoot`\n\
  \n该解决方案演示了如何使用 `@parent` 关键字查找组件，但也可以使用其他任何关键字，并将它们串联起来以查找所需的组件。\n\nJSF 2.3 的另一个新特性是编程式搜索表达式\
  \ API。这使得从控制器类内部获取组件的访问权限成为可能。解决方案中的第二个清单演示了如何使用编程式 API。要使用该 API，首先创建一个 `SearchExpressionContext`，稍后将其作为参数传递以帮助查找组件。其次，调用\
  \ `FacesContext` 通过 `getApplication()` 获取对应用程序的引用，然后调用 `getSearchExpressionHandler().resolveComponent()`，并传入\
  \ `SearchExpressionContext`、搜索表达式字符串以及找到组件时要调用的函数。这可用于通过编程式 API 搜索任何组件。\n\n![](img/index-304_1.png)\n\
  \n**第 5 章**\n\n**Jakarta MVC**\n\n多年来，Jakarta EE 已从一个以 Servlet 为中心的平台发展成为一个支持多种不同方法创建\
  \ Web 和企业应用程序的平台。在企业 Java 的早期，人们专注于开发 Servlet 来构建前端以及集成层和业务层。\n\n这是因为它主要关注组件导向。Jakarta\
  \ Server Pages 使事情变得更加动态。开发者现在可以将工作负载分配给专注于 HTML 标记和 Jakarta Server Pages 标签以生成前端的团队，以及专注于应用程序逻辑的团队。Jakarta\
  \ Server Faces 则更进一步，它遵循模型-视图-控制器模式，将代码逻辑与页面标记完全分离，创建了三个不同的层级。这种设计模式使开发更具逻辑性，长期维护也更加容易。模型-视图-控制器模式的架构如图\
  \ 5-1 所示。\n\n***图 5-1.** Jakarta MVC 架构*\n\nJakarta Server Faces 是用于构建企业应用程序的成熟且健壮的技术；该框架在某种程度上缺乏灵活性，因为您必须遵循许多理念。例如，Jakarta\
  \ Server Faces 有一个必须遵循的生命周期。生命周期的某些阶段可以跳过，但最终 `Faces` Servlet 仍然保留了一定程度的控制权。Jakarta\
  \ MVC 框架将模型-视图-控制器的关注点又向前推进了一步。它允许开发者遵循三层架构，而无需强制特定的行为。MVC 框架最初计划作为 JSR 371 包含在\
  \ Jakarta EE 8 中，但后来为了减少包含的新规范数量，它被从平台中移除。然而，Oracle 将 MVC 1.0 的所有权移交给了社区，社区随后将该规范转移到了\
  \ Eclipse 基金会。\n\n© Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang, *Java\
  \ EE 到 Jakarta EE 10 实战*[, https://doi.org/10.1007/978-1-4842-8079-9_5](https://doi.org/10.1007/978-1-4842-8079-9_5#DOI)\n\
  \n第 5 章 ■ Jakarta MVC\n\n在本章中，我将讨论 Jakarta MVC 应用程序的配置；如何开发控制器、模型和视图；以及如何将它们整合在一起。该框架构建在\
  \ Jakarta RESTful Web Services 之上，因此许多关键组件是相同的。因此，在本章中您还将学习一些 Jakarta RESTful Web\
  \ Services API 的基础知识。正如我常说的，如果您拥有更多工具，就能完成更多种类的任务。应用程序开发也是如此，像 Jakarta Server Faces\
  \ 这样的框架非常适合开发某些应用程序，但 Jakarta MVC 可能更适合开发其他应用程序。阅读本章后，您将更好地理解 Jakarta MVC 所提供的不同之处。您应该能够深入使用\
  \ Jakarta MVC 框架进行开发，因为我将使用 Apache NetBeans IDE 从头到尾引导您完成一个 Jakarta MVC 应用程序的开发。\n\
