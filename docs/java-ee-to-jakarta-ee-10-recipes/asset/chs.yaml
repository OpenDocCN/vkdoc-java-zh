  3. 使用语句执行数据库任务。\n4. 对数据库任务的结果进行处理。\n5. 关闭语句（如果使用完毕，也关闭数据库连接）。\n\n如果使用 `try-with-resources`\
  \ 子句，此步骤将自动为您完成，如本示例解决方案所示。\n\n使用 JDBC 执行查询与使用数据操作语言（DML）的主要区别在于，根据要执行的操作，您需要在 `Statement`\
  \ 对象上调用不同的方法。要执行查询，需要调用 `Statement` 的 `executeQuery` 方法。要执行 DML 任务（如插入、更新和删除），请调用\
  \ `executeUpdate` 方法。\n\n\n\n本方案中的 `performCreate` 方法演示了向数据库插入记录的操作。要向数据库中插入记录，你需要构建一个字符串格式的\
