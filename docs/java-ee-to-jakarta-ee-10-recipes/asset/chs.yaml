  \n<body-content>empty</body-content>\n\n<attribute>\n\n<name>authorName</name>\n\
  \n<rtexprvalue>true</rtexprvalue>\n\n<required>false</required>\n\n</attribute>\n\
  \n</tag>\n\n</taglib>\n```\n\n一旦类实现和 TLD 准备就绪，就可以在 Jakarta 服务器页面中使用该标签。以下 Jakarta\
  \ 服务器代码取自 `recipe_02_09.jspx`，它使用了自定义标签：\n\n```html\n<html\n>\n\n<jsp:directive.page\
  \ contentType=\"text/html\" pageEncoding=\"UTF-8\"/>\n\n<head>\n\n<title>配方 2-9：创建自定义\
  \ Jakarta 服务器标签</title>\n\n</head>\n\n<body>\n\n<h1>自定义 Jakarta 服务器标签</h1>\n\n<p>自定义\
  \ Jakarta 服务器标签用作此页面的页脚。</p>\n\n<br/>\n\n<cust:signature authorName=\"Josh Juneau\
  \ and Tarun Telang\"/>\n\n</body>\n\n</html>\n```\n\n现在，自定义标签的输出将显示在 Jakarta 服务器页面中\
  \ `cust:signature` 元素所在的位置。输出结果如图 2-11 所示。\n\n![](img/index-128_1.png)\n\n第 2 章\
  \ ■ Jakarta 服务器页面\n\n***图 2-11.** Jakarta 服务器页面配方 02-09 输出*\n\n工作原理\n\nJSP 2.0 最有用的新特性之一就是引入了\
  \ `SimpleTagSupport` 类，它为开发者提供了一种创建自定义标签的简便方法。在 2.0 版本发布之前，创建自定义标签需要更多的工作，因为开发者必须在标签的实现类中提供更多的代码来实现标签。`SimpleTagSupport`\
  \ 类为开发者处理了大部分实现工作，因此唯一需要做的就是实现 `doTag` 方法，以便为自定义标签提供实现。\n\n在本配方的示例中，创建了一个自定义标签，它会在\
  \ Jakarta 服务器页面中标签所在的位置打印一个签名。要创建自定义标签实现，需要创建一个继承 `SimpleTagSupport` 类的 Java 类，并为\
  \ `doTag` 方法提供实现。示例类还包含一个名为 `authorName` 的字段，该字段将在 TLD 中映射为自定义标签的一个属性。在 `doTag`\
  \ 方法中，通过调用 `getJspContext` 方法获取 Jakarta 服务器页面上下文的句柄。`getJspContext` 是 `SimpleTagSupport`\
  \ 中为你实现的一个自定义方法，可以轻松获取 Jakarta 服务器页面上下文。接下来，为了能够写入 Jakarta 服务器输出，通过调用 `PageContext`\
  \ 的 `getOut` 方法获取 `JspWriter` 的句柄：\n\n```java\nPageContext pageContext = (PageContext)\
  \ getJspContext();\nJspWriter out = pageContext.getOut();\n```\n\n`doTag` 中的后续代码通过一系列对\
  \ `out.println` 的调用来实现写入 Jakarta 服务器输出的功能。传递给 `out.println` 的任何内容都将显示在页面上。请注意，在示例中，会检查\
  \ `authorName` 字段是否包含空值。如果不包含空值，则将其显示在页面上；否则，将其省略。因此，如果 Jakarta 服务器页面中的标签包含 `authorName`\
  \ 属性的值，则该值将被打印在页面上。`out.println` 代码包含在 `try-catch` 块中，以防出现任何异常。\n\n\n\n■ **注意**：要让你的标签支持脚本片段，你需要使用*经典标签处理器*。经典标签处理器在\
  \ Jakarta Server 2.0 时代之前就已存在，至今仍可与简单标签处理器一起使用。简单标签处理器围绕 `doTag()` 方法展开，而经典标签处理器则涉及\
  \ `doStartTag()` 和 `doEndTag()` 方法以及其他方法。由于简单标签处理器可以与经典标签处理器共存，因此在同一个应用程序中，既可以利用简单标签方法，也可以使用一些更复杂的经典标签方法。这有助于从经典标签处理器向简单标签处理器的过渡。有关这两个\
  \ API 之间差异的更多信息，请搜索关键词 *Simple vs. Classic Tag Handlers* 查阅相关在线文档。\n\n第 2 章 ■ Jakarta\
  \ Server Pages\n\n至此，标签的实现就完成了。为了通过标签名称将实现类映射到文档对象模型（DOM），TLD 文件中必须包含指向该类的映射。在示例中，创建了一个名为\
  \ `custom.tld` 的 TLD 文件，其中包含了该类的映射。`short-name` 元素指定了在 Jakarta Server Page 中引用该标签时必须使用的名称。`uri`\
  \ 元素指定了 TLD 的名称，并在 Jakarta Server Page 中用于引用 TLD 文件本身。TLD 的核心内容包含在 `tag` 元素中。`name`\
  \ 元素用于指定标签的名称，它将在 Jakarta Server Page 中与 `short-name` 元素结合使用，以提供完整的标签名称。`tag-class`\
  \ 元素提供了实现该标签的类的名称，而 `body-content` 则指定一个值，用于指示 Jakarta Server Page 的主体内容是否可供标签实现类使用。在本示例中，该值设置为\
  \ `empty`。要为标签指定属性，必须在 TLD 中添加 `attribute` 元素，其中包含 `name`、`rtexprvalue` 和 `required`\
  \ 元素。`attribute` 的 `name` 元素指定了属性的名称，`rtexprvalue` 指示该属性是否可以包含 Jakarta 表达式语言表达式，`required`\
  \ 则指示该属性是否为必需。\n\n要在 Jakarta Server Page 中使用该标签，必须将 `custom.tld` TLD 映射到页面中，这可以通过\
  \ Jakarta Server 文档的 `<html>` 元素或标准 Jakarta Server 中的 `taglib` 指令来实现。以下两行代码展示了这两种方式的区别：\n\
  \n<!—Jakarta Server Document 语法 -->\n\n<html\n\n. . .（更多 taglib 指令） . . .>\n\n<!—Jakarta\
  \ Server 语法 -->\n\n<%@taglib prefix=\"cust\" uri=\"custom\" %>\n\n要在页面中使用该标签，只需指定\
  \ TLD 的 `short-name` 以及标签实现的映射名称和任何你想要提供的属性：\n\n<cust:signature authorName=\"Josh\
  \ Juneau and Tarun Telang\"/>\n\n在 Jakarta Server 中创建自定义标签比过去更加容易。自定义标签使开发者能够定义自定义操作和/或内容，这些操作和内容可以通过标签（而非脚本片段）在\
  \ Jakarta Server Page 中访问。自定义标签有助于开发者遵循 MVC 架构，将代码与业务逻辑分离。\n\n2-10. 将其他 Jakarta\
  \ Server Pages 包含到一个页面中\n\n问题\n\n你希望将页眉或页脚的内容放在单独的 Jakarta Server Page 中，然后通过引用的方式将它们引入到\
  \ Jakarta Server Pages 中，而不是在每个 Jakarta Server 中重复编写相同的页眉或页脚。\n\n解决方案\n\n使用 `<jsp:include>`\
  \ 标签将其他静态或动态页面嵌入到你的 Jakarta Server Page 中。以下示例演示了如何在一个页面中包含另外两个 Jakarta Server Pages。其中一个\
  \ Jakarta Server Page 用于构建页面的页眉，另一个用于构建页脚。下面的页面展示了主 Jakarta Server Page，它使用 `<jsp:include>`\
  \ 标签包含了另外两个页面。\n\n第 2 章 ■ Jakarta Server Pages\n\n\n\n名为 recipe02_10-header.jspx\
  \ 和 recipe02_10-footer.jspx 的 JSPX 文件被包含在主 Jakarta Server Page 的正文中，以提供页面的页眉和页脚部分：\n\
  \n<html >\n\n<jsp:directive.page contentType=\"text/html\" pageEncoding=\"UTF-8\"\
  />\n\n<head>\n\n<title>配方 2-10：将其他 Jakarta Server Pages 包含到页面中</title>\n\n</head>\n\
  \n<body>\n\n<jsp:include page=\"recipe02_10-header.jspx\" />\n\n<h1>这是主 Jakarta\
  \ Server Page 的正文。</h1>\n\n<p>\n\n此页面的页眉和页脚都是作为独立的 Jakarta Server Pages 创建的。\n\n\
  </p>\n\n<jsp:include page=\"recipe02_10-footer.jspx\"/>\n\n</body>\n\n</html>\n\n\
  接下来是构成页面页眉的 Jakarta Server 代码。它并不复杂，但仍然是一个独立的 Jakarta Server Page：\n\n<html >\n\n\
  <jsp:directive.page contentType=\"text/html\" pageEncoding=\"UTF-8\"/>\n\n<p>这是页面页眉</p>\n\
  \n</html>\n\n以下 Jakarta Server 代码构成了页面页脚：\n\n<html >\n\n<jsp:directive.page contentType=\"\
  text/html\" pageEncoding=\"UTF-8\"/>\n\n<p>这是页面页脚</p>\n\n</html>\n\n最终，这三个页面组合成一个包含页眉、正文和页脚的单一页面。\n\
  \n该页面的输出将如图 2-12. 所示。\n\n工作原理\n\n包含其他 Jakarta Server Pages 有助于提高开发人员的工作效率并减少维护时间。\n\
  \n使用此技术，开发人员可以提取出现在多个页面中的任何 Jakarta Server 特性，并将它们放入一个独立的 Jakarta Server Page 中。这样做将允许在需要更新这些特性之一时，实现单点维护。\n\
  \n要在 Jakarta Server Page 中包含另一个页面，请使用 `<jsp:include>` 标签。`<jsp:include>` 标签允许嵌入静态文件或其他\
  \ Web 组件。该标签包含一个 page 属性，用于指定相对 URL 或一个表达式，该表达式的结果是要包含在页面中的另一个文件或 Web 组件。\n\n![](img/index-131_1.png)\n\
  \n第 2 章 ■ Jakarta Server Pages\n\n***图 2-12.** Jakarta Server Pages 配方 02-10 输出*\n\
  \n■ **注意** 该标签还有一个可选的 flush 属性，可以设置为 true 或 false，以指示在包含页面之前是否应刷新输出缓冲区。flush 属性的默认值为\
  \ false。\n\n可选地，如果被包含的资源是动态的，可以在 `<jsp:include>` 的开始和结束标签之间放置 `<jsp:param>` 子句，以向该资源传递一个或多个名称-值对。执行此技术的示例如下代码行所示。在以下几行中，一个名称为\
  \ bookAuthor、值为 Juneau 的参数被传递给了页眉 Jakarta Server Page：\n\n<jsp:include page=\"header.jspx\"\
  >\n\n<jsp:param name=\"bookAuthor\" value=\"Juneau and Telang\"/>\n\n</jsp:include>\n\
  \n在 Jakarta Server Page 中包含其他内容的能力提供了一种封装资源和静态内容的方法。这允许开发人员创建一次内容，并将其包含在许多页面中。\n\
  \n2-11\\. 为数据库记录创建输入表单\n\n问题\n\n您想要创建一个 Jakarta Server Page，用于输入信息，这些信息将作为数据库记录插入。\n\
  \n解决方案\n\n创建一个输入表单，并使用 Jakarta servlet 操作方法将值插入数据库。此解决方案需要一个 Jakarta Server Pages\
  \ 文档和一个 Jakarta servlet 来完成数据库输入表单。在以下示例中，在 Jakarta Server 文档中创建了一个输入表单，用于填充名为 RECIPES\
  \ 的数据库表中的记录。当用户在表单的文本字段中输入信息并单击“提交”按钮时，将调用一个执行数据库插入事务的 servlet。\n\n第 2 章 ■ Jakarta\
  \ Server Pages\n\n以下代码是用于为数据库应用程序创建输入表单的 Jakarta Server 文档：\n\n<html\n\nversion=\"\
  2.0\">\n\n<jsp:directive.page contentType=\"text/html\" pageEncoding=\"UTF-8\"/>\n\
  \n<head>\n\n<title>配方 2-11：为数据库记录创建输入表单</title>\n\n\n\n</head>\n\n<body>\n\n<h1>配方输入表单</h1>\n\
  \n<p>\n\n请使用下方的文本字段输入配方详情。\n\n</p>\n\n<form method=\"POST\" action=\"../RecipeServlet\"\
  >\n\n<label for=\"recipeNumber\">配方编号：</label><br/>\n\n<input id=\"recipeNumber\"\
  \ type=\"number\" name=\"recipeNumber\"/><br/>\n\n<label for=\"name\">配方名称：</label><br/>\n\
  \n<input type=\"text\" name=\"name\" size=\"30\"/><br/>\n\n<label for=\"description\"\
  >配方描述：</label><br/>\n\n<textarea name=\"description\" rows=\"5\" cols=\"50\"> 在此处输入描述...\n\
  \n</textarea><br/>\n\n<label for=\"text\">配方文本：</label><br/>\n\n<textarea id=\"\
  text\" name=\"text\" rows=\"10\" cols=\"50\"> 在此处输入文本...\n\n</textarea><br/><br/>\n\
  \n<input type=\"submit\"/><input type=\"reset\"/>\n\n</form>\n\n</body>\n\n</html>\n\
  \n接下来是一个名为 `RecipeServlet` 的 servlet 代码。它负责从 Jakarta Server 文档输入表单中读取请求参数，并将这些字段插入到数据库中：\n\
  \npackage org.jakartaeerecipe.chapter02.recipe02_11;\n\nimport java.io.*;\n\nimport\
  \ java.sql.*;\n\nimport javax.servlet.ServletException;\n\nimport javax.servlet.annotation.WebServlet;\n\
  \nimport javax.servlet.http.*;\n\n@WebServlet(name = \"RecipeServlet\", urlPatterns\
  \ = {\"/RecipeServlet\"})\n\npublic class RecipeServlet extends HttpServlet {\n\n\
  /**\n\n* 处理 HTTP\n\n* <code>GET</code> 和\n\n* <code>POST</code> 方法的请求。\n\n*\n\n\
  第 2 章 ■ Jakarta Server Pages\n\n* @param request servlet 请求\n\n* @param response\
  \ servlet 响应\n\n* @throws ServletException 如果发生特定于 servlet 的错误\n\n* @throws IOException\
  \ 如果发生 I/O 错误\n\n*/\n\nprotected void processRequest(HttpServletRequest request,\
  \ HttpServletResponse response)\n\nthrows ServletException, IOException {\n\nresponse.setContentType(\"\
  text/html;charset=UTF-8\");\n\nPrintWriter out = response.getWriter();\n\nint result\
  \ = -1;\n\ntry {\n\n/*\n\n* TODO 在此处对请求参数执行验证\n\n*/\n\nresult = insertRow (request.getParameter(\"\
  recipeNumber\"),\n\nrequest.getParameter(\"name\"),\n\nrequest.getParameter(\"description\"\
  ),\n\nrequest.getParameter(\"text\"));\n\nout.println(\"\"\"\n\n<html>\n\n<head>\n\
  \n<title>Servlet RecipeServlet</title>\n\n</head>\n\n<body>\n\n\"\"\");\n\nout.printf(\"\
  <h1>Servlet RecipeServlet at \" + request.getContextPath() + \"</h1>\"); out.println(\"\
  <br/><br/>\");\n\nif(result > 0){\n\nout.println(\"\"\"\n\n<font color='green'>记录成功插入！</font>\n\
  \n<br/><br/>\n\n<a href='/JakartaEERecipes_Chapter02-1.0-SNAPSHOT/chapter02/recipe02_11.jspx'>\n\
  \n插入另一条记录\n\n</a>\n\n\"\"\");\n\n} else {\n\nout.println(\"\"\"\n\n<font color='red'>记录未插入！</font>\"\
  \n\n<br/><br/>\n\n<a href='/JakartaEERecipes_Chapter02-1.0-SNAPSHOT/chapter02/recipe02_11.jspx'>\n\
  \n重试\n\n</a>\n\n\"\"\");\n\n}\n\nout.println(\"</body>\");\n\nout.println(\"</html>\"\
  );\n\n} finally {\n\nout.close();\n\n}\n\n}\n\n第 2 章 ■ Jakarta Server Pages\n\n\
  public int insertRow(String recipeNumber,\n\nString name,\n\nString description,\n\
  \nString text) {\n\nString sql = \"INSERT INTO RECIPES VALUES(\" +\n\n\"RECIPES_SEQ.NEXTVAL,?,?,?,?)\"\
  ;\n\nPreparedStatement stmt = null;\n\nint result = -1;\n\ntry {\n\nCreateConnection\
  \ createConn = new CreateConnection();\n\nConnection conn = createConn.getConnection();\n\
  \nstmt = (PreparedStatement) conn.prepareStatement(sql);\n\nstmt.setString(1, recipeNumber);\n\
  \nstmt.setString(2, name);\n\nstmt.setString(3, description);\n\nstmt.setString(4,\
  \ text);\n\n// 返回行数，如果不成功则返回 0\n\nresult = stmt.executeUpdate();\n\nif (result >\
  \ 0){\n\nSystem.out.println(\"-- 记录已创建 --\");\n\n} else {\n\nSystem.out.println(\"\
  !! 记录未创建 !!\");\n\n}\n\n} catch (SQLException e) {\n\ne.printStackTrace();\n\n}\
  \ finally {\n\nif (stmt != null) {\n\ntry {\n\nstmt.close();\n\n} catch (SQLException\
  \ ex) {\n\nex.printStackTrace();\n\n}\n\n}\n\n}\n\nreturn result;\n\n}\n\n@Override\n\
  \nprotected void doGet(HttpServletRequest request, HttpServletResponse response)\n\
  \nthrows ServletException, IOException {\n\nprocessRequest(request, response);\n\
  \n}\n\n@Override\n\nprotected void doPost(HttpServletRequest request, HttpServletResponse\
  \ response)\n\nthrows ServletException, IOException {\n\nprocessRequest(request,\
  \ response);\n\n}\n\n}\n\n如果请求成功，记录将被插入到数据库中，用户将能够点击链接以添加另一条记录。当然，在实际应用中，您可能希望在输入表单内或服务器端\
  \ Java 代码中使用 JavaScript 编写一些验证逻辑，以帮助确保数据库的完整性。\n\n第 2 章 ■ Jakarta Server Pages\n\
  \n工作原理\n\n几乎每个企业应用程序的一项基本任务就是使用数据库输入表单。数据库输入表单使最终用户能够轻松地将数据填充到数据库表中。当使用 Jakarta\
  \ Server 技术以及 servlet 时，此操作可以变得相当简单。\n\nApache Derby 数据库预装在 GlassFish 服务器中，位于以下目录：\n\
  \nJAVA_DEV/glassfish7/javadb\n\n要运行本配方的代码，您需要首先创建一个新数据库。Apache Derby 数据库附带了一个交互式\
  \ SQL 脚本工具 `ij`。您可以通过进入以下目录从命令提示符启动它：`JAVA_DEV/glassfish7/javadb/bin`\n\n然后运行 `ij`\
  \ 命令。您应该会看到如下输出：\n\nij version 10.5\n\nij>\n\n要创建一个名为 `acmedb` 的新数据库，您可以使用 `connect`\
  \ 命令并提供 `create=true`：`ij> connect 'jdbc:derby:/path/to/database/acmedb;create=true;`\n\
  \n您可以将 `/path/to/database` 替换为您项目文件夹中的数据库文件夹。接下来，使用以下命令创建一个数据库表：\n\nij> create table\
  \ RECIPE >\n\n( ID INTEGER not null\n\n> constraint RECIPE_PK primary key,\n\n>\
  \ NAME VARCHAR(30) not null,\n\n> DESCRIPTION VARCHAR(250),\n\n> TEXT VARCHAR(1000)\n\
  \n> );\n\n表创建完成后，您可以通过执行以下命令断开与数据库的连接：`ij > disconnect;`\n\n![](img/index-136_1.jpg)\n\
  \n第 2 章 ■ Jakarta Server Pages\n\n图 2-13 展示了通过上述命令创建的表的表结构。\n\n***图 2-13.** RECIPE\
  \ 表的表结构*\n\n正如您在本配方的示例中所见，编写 Jakarta Server 输入表单非常直接，可以使用基本 HTML 进行编码。关键在于设置一个 Java\
  \ servlet 来接收提交的请求，并使用该 servlet 处理记录。这提供了一种将 Web 内容与应用程序逻辑分离的简便机制。\n\n在示例中，一个名为\
  \ `recipe02_11.jspx` 的 Jakarta Server 文档包含一个标准的 HTML 表单，其方法为 `POST`，动作为 `/JakartaEERecipes/RecipeServlet`。输入表单包含四个字段，这些字段映射到最终将插入数据的数据库列。输入标签包含四个对应字段的名称（`recipeNumber`、`name`、`description`\
  \ 和 `text`），这些字段将在提交时传递给表单动作。如您所见，唯一与 Java 代码相关的引用是包含在表单动作属性中的 servlet 名称。\n\n名为\
  \ `RecipeServlet` 的 Java servlet 负责获取通过 Jakarta Server 文档提交的请求参数，对其进行相应验证（示例中未显示），并将其插入到数据库中。当页面提交时，`RecipeServlet`\
  \ 被调用，并且由于 HTML 动作方法为 `POST`，请求被发送到 `doPost` 方法。`doGet` 和 `doPost` 方法实际上都只是名为 `processRequest`\
  \ 的处理方法的包装方法，该方法负责大部分工作。`processRequest` 方法负责获取请求参数、将其插入数据库，并向客户端发送响应。\n\n\n\n首先通过调用\
  \ `response.getWriter()` 声明并创建一个 `PrintWriter` 对象，因为该对象稍后将用于协助构建发送给客户端的响应。接着，声明一个名为\
  \ `result` 的 `int` 类型变量并初始化为 `-1`。此变量将用于判断 SQL 插入操作是否成功。完成这些声明后，打开一个 `try-catch`\
  \ 代码块，`try` 块的第一行是调用 `insertRow` 方法，并将请求参数作为值传入。`result` 变量将接收 `insertRows` 方法执行后返回的\
  \ `int` 值，该值用于指示插入是否成功：\n\n```java\nresult = insertRow(request.getParameter(\"recipeNumber\"\
  ),\n                   request.getParameter(\"name\"),\n                   request.getParameter(\"\
  description\"),\n                   request.getParameter(\"text\"));\n```\n\n因此，一条\
  \ SQL 插入语句被赋值给名为 `sql` 的字符串，并使用 `PreparedStatement` 格式进行设置。SQL 字符串中的每个问号都对应一个参数，在执行\
  \ SQL 时这些参数将被替换到字符串中：\n\n```java\nString sql = \"INSERT INTO RECIPES VALUES(\" +\
  \ \"RECIPES_SEQ.NEXTVAL,?,?,?,?)\";\n```\n\n![](img/index-137_1.png)\n\n第 2 章 ■\
  \ Jakarta Server Pages\n\n接下来，初始化 `PreparedStatement` 和 `int` 值，然后打开一个 `try-catch-finally`\
  \ 代码块，该块将包含 SQL 插入代码。在块内，通过调用名为 `CreateConnection` 的辅助类创建一个 `Connection` 对象。如果你想了解更多关于这个辅助类的信息，可以阅读第\
  \ 7 章关于 JDBC 的内容。目前，你只需要知道 `CreateConnection` 会返回一个数据库连接，该连接可用于操作数据库。如果由于某种原因连接失败，将执行\
  \ `catch` 块，随后执行 `finally` 块。从成功的连接中创建一个 `PreparedStatement` 对象，并将包含数据库插入操作的 SQL\
  \ 字符串赋值给它。然后，依次将每个请求参数值设置为 `PreparedStatement` 的参数。最后，调用 `PreparedStatement` 的 `executeUpdate`\
  \ 方法，该方法执行数据库插入操作。`executeUpdate` 的返回值被赋值给 `result` 变量，然后返回给 `processRequest` 方法。一旦控制权返回给\
  \ `processRequest`，就会使用一系列 `PrintWriter` 语句创建 Servlet 响应。如果插入成功，则显示一条表示成功的消息。\n\n\
  同样，如果插入失败，则显示一条表示失败的消息。\n\n***图 2-14.** Jakarta Server Pages recipe 02-11 的输出*\n\
  \n图 2-14 显示了 该配方的输出。使用 Jakarta Server 开发数据库输入表单相当容易。为了保持 MVC 结构，使用 Java Servlet\
  \ 处理请求和数据库逻辑是最佳选择。\n\n2-12. 在页面内循环遍历数据库记录\n\n问题\n\n你希望在 Jakarta Server Page 上显示数据库表中的记录。\n\
  \n![](img/index-138_1.jpg)\n\n第 2 章 ■ Jakarta Server Pages\n\n解决方案\n\n将数据库逻辑封装在\
  \ Java 类中，并从 Jakarta Server Page 中访问它。使用 Jakarta 标准标签库的 `c:forEach` 元素来遍历数据库行并在页面上显示它们。在这种情况下，将使用两个\
  \ Java 类来处理数据。其中一个类将代表你从数据库中查询的表，并且它包含该表中每个列的字段。另一个 JavaBean 类将用于包含查询数据库的数据库业务逻辑。以下是项目结构：\n\
  \n```\n.\n├── src\n│   └── main\n│       ├── java\n│       │   └── org\n│      \
  \ │       └── jakartaeerecipe\n│       │           └── chapter02\n│       │    \
  \           └── recipe02_12\n│       │                   ├── Author.java\n│    \
  \   │                   └── AuthorBean.java\n│       └── webapp\n│           ├──\
  \ WEB-INF\n│           │   └── web.xml\n│           └── chapter02\n│           \
  \    └── recipe02_12.jspx\n└── pom.xml\n```\n\n\n本示例将展示 BOOK_AUTHORS 数据库表中每位作者的姓名。该表应按照图\
  \ 2-15 中的结构创建。\n\n***图 2-15.** BOOK_AUTHOR 表的表结构*\n\n以下是创建该表的 SQL 命令：\n\ncreate\
  \ table BOOK_AUTHOR\n\n(\n\nID INTEGER not null\n\nconstraint BOOK_AUTHOR_PK\n\n\
  primary key,\n\nFIRSTNAME VARCHAR(50),\n\nLASTNAME VARCHAR(50),\n\nBIO VARCHAR(1000)\n\
  \n);\n\n您还可以使用以下命令创建一个序列来自动生成 ID：\n\ncreate sequence book_author_s\n\nstart with\
  \ 1\n\nincrement by 1;\n\n接下来，您可以运行以下 INSERT 语句向 BOOK_AUTHOR 表中填充数据： insert into\
  \ BOOK_AUTHOR (ID, FIRSTNAME, LASTNAME, BIO) values (\n\nnext value for book_author_s,\n\
  \n'Josh',\n\n'Juneau'\n\n'Author of Apress Books',\n\n);\n\ninsert into BOOK_AUTHOR\
  \ (ID, FIRSTNAME, LASTNAME, BIO) values (\n\nnext value for book_author_s,\n\n'Tarun',\n\
  \n'Telang'\n\n'Author of Apress Books',\n\n);\n\n以下代码用于创建 Jakarta Server 文档，该文档将使用基于标准\
  \ HTML 的表格以及 Jakarta 标准标签库的 `<c:forEach>` 标签来遍历行，从而显示表中的数据：\n\n<html\n\nversion=\"\
  2.0\">\n\n<jsp:directive.page contentType=\"text/html\" pageEncoding=\"UTF-8\"/>\n\
  \n<jsp:useBean id=\"authorBean\" scope=\"session\" class=\"org.jakartaeerecipe.chapter02.\n\
  \nrecipe02_12.AuthorBean\"/>\n\n<head>\n\n<title>配方 2-12：在页面内遍历数据库记录</title>\n\n\
  </head>\n\n<body>\n\n<h1>作者</h1>\n\n<p>\n\n以下列出了 Josh Juneau 参与编写的书籍的作者。\n\n</p>\n\
  \n<table border=\"1\">\n\n<c:forEach items=\"${authorBean.authorList }\" var=\"\
  author\">\n\n<tr>\n\n<td> ${ author.first } ${ author.last }</td>\n\n</tr>\n\n</c:forEach>\n\
  \n</table>\n\n</body>\n\n</html>\n\n如您所见，`<c:forEach>` 用于遍历 `${authorBean.authorList}`\
  \ 中包含的项目。列表中的每个项目都是一个 `Author` 类型的对象。以下 Java 代码是 `Author` 类的代码，用于保存表中每一行包含的数据：\n\
  \npackage org.jakartaeerecipe.chapter02.recipe02_12;\n\npublic class Author implements\
  \ java.io.Serializable {\n\nprivate int id;\n\nprivate String first;\n\nprivate\
  \ String last;\n\npublic Author(){\n\nid = -1;\n\nfirst = null;\n\nlast = null;\n\
  \n}\n\n/**\n\n* @return the id\n\n*/\n\npublic int getId() {\n\nreturn id;\n\n}\n\
  \n/**\n\n* @param id the id to set\n\n*/\n\npublic void setId(int id) {\n\nthis.id\
  \ = id;\n\n}\n\n/**\n\n* @return the first\n\n*/\n\npublic String getFirst() {\n\
  \nreturn first;\n\n}\n\n/**\n\n* @param first the first to set\n\n*/\n\npublic void\
  \ setFirst(String first) {\n\nthis.first = first;\n\n}\n\n/**\n\n* @return the last\n\
  \n*/\n\npublic String getLast() {\n\nreturn last;\n\n}\n\n/**\n\n* @param last the\
  \ last to set\n\n*/\n\npublic void setLast(String last) {\n\nthis.last = last;\n\
  \n}\n\n}\n\n最后，Jakarta Server 文档引用了一个名为 `AuthorBean` 的 JavaBean，它包含查询数据并将其作为列表返回给\
  \ Jakarta Server 页面的业务逻辑。以下代码包含在 `AuthorBean` 类中：\n\npackage org.jakartaeerecipe.chapter02.recipe02_12;\n\
  \nimport java.sql.Connection;\n\nimport java.sql.PreparedStatement;\n\nimport java.sql.ResultSet;\n\
  \nimport java.sql.SQLException;\n\nimport java.util.ArrayList;\n\nimport java.util.List;\n\
  \nimport org.jakartaeerecipe.common.CreateConnection;\n\npublic class AuthorBean\
  \ implements java.io.Serializable {\n\npublic static Connection conn = null;\n\n\
  private List authorList = null;\n\npublic List queryAuthors(){\n\nString sql = \"\
  SELECT ID, FIRST, LAST FROM BOOK_AUTHOR\";\n\nList<Author> authorList = new ArrayList<>();\n\
  \nPreparedStatement stmt = null;\n\nResultSet rs = null;\n\nint result = -1;\n\n\
  try {\n\nCreateConnection createConn = new CreateConnection();\n\nconn = createConn.getConnection();\n\
  \nstmt = (PreparedStatement) conn.prepareStatement(sql);\n\n// 返回行数，如果不成功则返回 0\n\
  \nrs = stmt.executeQuery();\n\nwhile (rs.next()){\n\nAuthor author = new Author();\n\
  \nauthor.setId(rs.getInt(\"ID\"));\n\nauthor.setFirst(rs.getString(\"FIRST\"));\n\
  \nauthor.setLast(rs.getString(\"LAST\"));\n\nauthorList.add(author);\n\n}\n\n} catch\
  \ (SQLException e) {\n\ne.printStackTrace();\n\n} finally {\n\nif (stmt != null)\
  \ {\n\ntry {\n\nstmt.close();\n\n} catch (SQLException ex) {\n\nex.printStackTrace();\n\
  \n}\n\n}\n\n}\n\nreturn authorList;\n\n}\n\npublic List getAuthorList(){\n\nauthorList\
  \ = queryAuthors();\n\nreturn authorList;\n\n}\n\n}\n\n表中记录包含的作者姓名将显示在页面上。图 2-16\
  \ 显示了本配方生成的输出截图：\n\n***图 2-16.** 配方 2-12 的输出*\n\n工作原理\n\n几乎所有的企业应用程序都会执行某种数据库查询。数据库查询的结果通常以表格形式显示。本配方中的示例演示了如何查询数据库并将结果返回给\
  \ Jakarta Server 页面，以便在标准 HTML 表格中显示。此示例中的 Jakarta Server 页面使用 Jakarta 标准标签库的 `c:forEach`\
  \ 元素来遍历数据库查询的结果。请注意，使用 Jakarta Server 开发此类数据库查询的方法不止一种；然而，本配方中演示的格式最推荐用于生产环境。\n\n\
  如前所述，本配方中的 Jakarta Server 页面结合使用了 `jsp:useBean` 元素和 `c:forEach` 元素来遍历数据库查询的结果。查询数据库的逻辑位于服务器端的\
  \ JavaBean 类中，该类在页面上的 `jsp:useBean` 元素中被引用。在示例中，JavaBean 名为 `AuthorBean`，它负责查询名为\
  \ `AUTHORS` 的数据库表，并用查询结果填充一个 `Author` 对象列表。当 `c:forEach` 元素被评估，且其 `items` 属性设置为\
  \ `${authorBean.authorList}` 时，它会调用名为 `getAuthorList` 的 JavaBean 方法，因为 Jakarta Server\
  \ 表达式总是在方法调用背后附加“get”，并将方法名的首字母大写。当调用 `getAuthorList` 方法时，`authorList` 字段会通过调用 `queryAuthors`\
  \ 来填充。`queryAuthors` 方法利用 Java 数据库连接（JDBC）数据库调用从 `AUTHORS` 表中获取作者。数据库查询返回的每一行都会创建一个新的\
  \ `Author` 对象，并且每个新的 `Author` 对象依次被添加到 `authorList` 中。最后，填充好的 `authorList` 包含多个\
  \ `Author` 对象，并被返回给 Jakarta Server 页面，然后使用 `c:forEach` 元素进行遍历。\n\n`c:forEach` 元素包含一个名为\
  \ `var` 的属性，该属性应设置为一个字符串，该字符串将代表正在遍历的列表中的每个元素。然后，在 `c:forEach` 元素的开始和结束标签之间使用 `var`\
  \ 来引用列表中的每个元素，打印每位作者的姓名。\n\n本配方提供了一些关于如何将 Jakarta 标准标签库标签的强大功能与 JDBC 等其他技术相结合以产生非常有用结果的见解。要了解有关\
  \ Jakarta Server 中不同 Jakarta 标准标签库标签的更多信息，请访问 [www.oracle.com/technetwork/java/jstl-137486.html](http://www.oracle.com/technetwork/java/jstl-137486.html)\
  \ 上的在线文档。要了解有关 JDBC 的更多信息，请阅读本书的第 7 章。\n\n2-13\\. 在 Jakarta Server 页面中处理错误\n\n问题\n\
  \n您希望在 Jakarta Server 页面遇到错误时显示一个格式良好的错误页面。\n\n解决方案\n\n\n\n创建一个标准错误页面，并在 Jakarta\
  \ Server Page 中发生异常时将控制权转发到该错误页面。以下采用 `.jsp` 格式（而非 `.jspx`）的 Jakarta Server Page\
  \ 演示了一个标准错误页面，用于在 Jakarta Server Pages 应用程序中发生错误时显示。如果应用程序中的任何 Jakarta Server Page\
  \ 发生异常，将显示以下错误页面。\n\n■ **注意**：本配方案例中的解决方案使用了 Jakarta 标准标签库的 `fmt` 库，该库提供了便捷的格式化功能，支持文本本地化以及日期和数字格式化。文本本地化功能允许设置区域设置，从而根据用户区域设置将文本格式化为不同语言。用于日期处理的标签使开发者能够轻松地在\
  \ Jakarta Server Page 中格式化日期和时间，并提供解析数据输入中的日期和时间的方法。最后，数字格式化标签提供了一种在页面中格式化和解析数字数据的方法。要了解更多关于\
  \ `fmt` Jakarta 标准标签库的信息，请参考在线文档：[`jakarta.ee/specifications/tags/2.0/tagdocs`](https://jakarta.ee/specifications/tags/2.0/tagdocs)。\n\
  \n[specifications/tags/2.0/tagdocs/](https://jakarta.ee/specifications/tags/2.0/tagdocs)\n\
  \n<%@page contentType=\"text/html\" pageEncoding=\"UTF-8\"%>\n\n<%@ page isErrorPage=\"\
  true\" %>\n\n<%@ taglib uri=\"http://java.sun.com/jsp/jstl/core\"\n\nprefix=\"c\"\
  \ %>\n\n<%@ taglib uri=\"http://java.sun.com/jsp/jstl/fmt\"\n\nprefix=\"fmt\" %>\n\
  \n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<title>Jakarta Server Pages - 错误页面</title>\n\
  \n</head>\n\n<body>\n\n<h1>遇到错误</h1>\n\n<br/>\n\n<br/>\n\n第 2 章 ■ Jakarta Server\
  \ Pages\n\n<p>\n\n应用程序遇到以下错误：\n\n<br/>\n\n<fmt:message key=\"ServerError\"/>: ${pageContext.errorData.statusCode}\n\
  \n</p>\n\n</body>\n\n</html>\n\n例如，如果名为 `param` 的参数为 null，以下 Jakarta Server 页面将产生一个错误（`NullPointerException`）。如果发生这种情况，将显示指定的错误页面：\n\
  \n<html\n\nversion=\"2.0\">\n\n<jsp:directive.page contentType=\"text/html\" pageEncoding=\"\
  UTF-8\"/>\n\n<jsp:directive.page errorPage=\"recipe02_13_errorPage.jsp\"/>\n\n<head>\n\
  \n<title>配方 2-13：处理 Jakarta Server 错误</title>\n\n</head>\n\n<body>\n\n<h1>此页面存在错误</h1>\n\
  \n<p>\n\n这将产生一个错误：\n\n<jsp:scriptlet>\n\nif (request.getParameter(\"param\").equals(\"\
  value\")) {\n\nSystem.out.println(\"test\");\n\n}\n\n</jsp:scriptlet>\n\n</p>\n\n\
  </body>\n\n</html>\n\n工作原理\n\n用户在使用应用程序时最烦人的问题之一就是遇到错误。通常会显示一条冗长、难看的堆栈跟踪信息，而用户完全不知道如何解决该错误。当此类错误发生时，最好显示一个用户友好的错误页面。Jakarta\
  \ Server 技术允许通过向每个可能产生错误的 Jakarta Server Page 添加页面指令来指定错误页面。该指令应指定一个错误页面，当包含该指令的页面产生错误时，将显示该页面。\n\
  \n本配方案例中的第二个 Jakarta Server 文档演示了一个 Jakarta Server Page，如果页面中请求的参数为 null，则会抛出错误。如果发生这种情况且未指定错误页面，则会显示\
  \ `NullPointerException` 错误消息。\n\n然而，此 Jakarta Server 页面通过使用以下语法在页面指令中指定了一个错误页面：\n\
  \n<jsp:directive.page errorPage=\"recipe02_13_errorPage.jsp\"/>\n\n![](img/index-145_1.png)\n\
  \n第 2 章 ■ Jakarta Server Pages\n\n当示例页面发生错误时，将显示 `recipe02_13.errorPage.jsp`。输出结果如图\
  \ 2-17 所示。本配方案例中列出的第一个 Jakarta Server 文档包含了 `recipe02_13.errorPage.jsp` 页面的源代码。它被标记为错误页面，因为它包含了一个指示该属性的页面指令：\n\
  \n<%@ page isErrorPage=\"true\" %>\n\n\n\n错误页面能够通过使用 `pageContext` 隐式对象来确定错误代码、状态、异常以及其他一系列信息。在示例中，`${pageContext.errorData.statusCode}`\
  \ 表达式用于显示异常的状态码。表 2-5 展示了可以从 `pageContext` 对象中获取的其他可能信息。\n\n***表 2-5.** pageContext\
  \ 隐式对象异常信息*\n\n**表达式**\n\n**值**\n\npageContext.errorData\n\n提供对错误信息的访问\n\npageContext.exception\n\
  \n返回异常对象的当前值\n\npageContext.errorData.requestURI\n\n返回请求 URI\n\npageContext.errorData.servletName\n\
  \n返回被调用的 Servlet 名称\n\npageContext.errorData.statusCode\n\n返回错误状态码\n\npageContext.errorData.throwable\n\
  \n返回导致错误的可抛出对象\n\n在任何应用程序中提供用户友好的错误页面，都有助于为最终用户创造更易用、功能更全面的体验。Jakarta Server 和 Java\
  \ 技术提供了强大的异常处理机制，可以在异常发生时帮助用户和管理员。\n\n***图 2-17.** Jakarta Server Pages 配方 02-13\
  \ 输出*\n\n2-14\\. 在页面中禁用脚本片段\n\n问题\n\n您希望确保 Java 代码无法嵌入到 Web 应用程序的 Jakarta Server\
  \ Pages 中。\n\n第 2 章 ■ Jakarta Server Pages\n\n解决方案\n\n将 Web 部署描述符中的 `scripting-invalid`\
  \ 元素设置为 `true`。以下来自 `web.xml` 部署描述符的摘录演示了如何执行此操作：\n\n<jsp-config>\n\n<jsp-property-group>\n\
  \n<scripting-invalid>true</scripting-invalid>\n\n</jsp-property-group>\n\n</jsp-config>\n\
  \n工作原理\n\n在鼓励使用模型-视图-控制器架构的环境中工作时，禁止在 Jakarta Server Pages 和文档中使用脚本片段可能非常有用。当 Jakarta\
  \ Server 2.1 发布时，它提供了解决方案来帮助开发者将 Java 代码从 Jakarta Server Pages 中移出，并放入其应属的服务器端 Java\
  \ 类中。在 Jakarta Server 的早期，页面中充斥着脚本片段和标记。这使得开发者难以将业务逻辑与内容分离，并且很难找到好的工具来有效开发此类页面。Jakarta\
  \ Server 2.1 引入了标签，使得在 Jakarta Server Pages 中消除脚本片段的使用成为可能，这有助于维护 MVC 架构的使用。\n\n\
  要禁止在应用程序的 Jakarta Server Pages 中使用脚本片段，请在要强制执行此规则的应用程序的 `web.xml` 文件中添加 `jsp-config`\
  \ 元素。添加一个 `jsp-property-group` 子元素以及 `scripting-invalid` 元素。`scripting-invalid`\
  \ 元素的值应设置为 `true`。\n\n2-15\\. 在页面中忽略 Jakarta 表达式语言\n\n问题\n\n您希望关闭 Jakarta Server\
  \ Page 中的 Jakarta 表达式语言表达式转换，以便旧版应用程序能够原样传递表达式。\n\n解决方案 #1\n\n通过在表达式前使用 `\\` 字符来转义页面中的\
  \ Jakarta 表达式语言表达式。例如，以下表达式将被忽略，因为 `\\` 字符出现在它们之前：\n\n\\${elBean.myProperty}\n\n\
  \\${2 + 4}\n\n解决方案 #2\n\n在应用程序的 `web.xml` 文件中配置一个 Jakarta Server Pages 属性组。在 `web.xml`\
  \ 文件中，`<jsp-property-group>` 元素可以包含子元素，这些子元素描述了 Jakarta Server Page 如何评估指定的项目。通过包含\
  \ `<el-ignored>true</el-ignored>` 元素，应用程序 Jakarta Server 文档中的所有 Jakarta 表达式语言都将被忽略并视为字面量。以下来自\
  \ `web.xml` 的摘录演示了此功能：\n\n第 2 章 ■ Jakarta Server Pages\n\n<jsp-property-group>\n\
  \n<el-ignored>true</el-ignored>\n\n</jsp-property-group>\n\n解决方案 #3\n\n包含一个包含 `isELIgnored`\
  \ 属性并将其设置为 `true` 的页面指令。可以将以下页面指令放置在给定 Jakarta Server 文档的顶部，以允许将每个 Jakarta 表达式语言表达式视为字面量：\n\
  \n<jsp:directive.page isELIgnored=\"true\"/>\n\n或者在标准的 Jakarta Server Pages 中：\n\
  \n<%@ page isELIgnored=\"true\" %>\n\n工作原理\n\n可能存在需要关闭 Jakarta 表达式语言表达式评估的情况。这种情况最常发生在使用旧版\
  \ Jakarta Server 技术的遗留应用程序中；当时 Jakarta 表达式语言表达式尚不可用。有几种不同的方法可以关闭 Jakarta 表达式语言表达式的评估，本配方演示了每一种方法。\n\
  \n在本配方的第一个解决方案中，演示了转义技术。可以通过将 `\\` 字符直接放在表达式前来转义 Jakarta 表达式语言表达式，如示例所示。这样做将导致 Jakarta\
  \ Server 解释器将该表达式视为字符串字面量，页面上的输出将是表达式本身，而不是其评估结果。本配方的第二个解决方案演示了向 `web.xml` 部署描述符添加\
  \ `jsp-property-group` 以忽略 Jakarta 表达式语言。通过包含 `isELIgnored` 元素并为其提供 `true` 值，应用程序中的所有\
  \ Jakarta 表达式语言都将被忽略。最后，最后一个解决方案演示了如何通过包含将 `isELIgnored` 属性设置为 `true` 的页面指令，在逐个页面的基础上忽略\
  \ Jakarta 表达式语言。\n\n每种忽略 Jakarta 表达式语言的不同解决方案都允许覆盖应用程序的不同部分。您选择的解决方案应取决于您希望在应用程序中忽略\
  \ Jakarta 表达式语言的广泛程度。\n\n**第 3 章**\n\n**Jakarta Server Faces**\n\nJakarta Server\
  \ Faces 于 2004 年由 Sun Microsystems 以 Java Server Faces 的名称发布。它旨在使 Web 应用程序创建更简单，并使用服务器端渲染。它是对\
  \ Jakarta Server Pages 框架的改进，具有更结构化的开发周期，并且在使用现代 Web 技术方面具有更大的灵活性。Jakarta Server\
  \ Faces 框架构建在模型-视图-控制器架构之上，并使用 XML 文件构建视图，使用 Java 类处理应用程序逻辑。Jakarta Server Faces\
  \ 框架还支持注解以简化视图构建。\n\nJakarta Server Faces 框架是请求驱动的，这意味着它响应来自客户端的请求，每个请求都由一个名为 `FacesServlet`\
  \ 的特殊 Servlet 处理。`FacesServlet` 负责构建组件树、处理事件、确定接下来要处理哪个视图以及渲染响应。`faces-config.xml`\
  \ 文件是 Jakarta Server Faces 1.x 的特定资源文件，用于定义应用程序信息，例如导航规则、监听器注册等。虽然 `faces-config.xml`\
  \ 文件在 Jakarta Server Faces 2.x 中仍然有用，但现代 Jakarta Server Faces 版本已专注于通过限制 XML 配置并使用注解来使事情更易于使用。`faces-config.xml`\
  \ 是一个指定 Jakarta Server Faces 配置的 XML 文件。它通常位于 Web 应用程序的 `WEB-INF` 目录中。\n\n该框架非常强大，包括与\
  \ Ajax 等技术的轻松集成，并使开发动态内容变得毫不费力。Jakarta Server Faces 与数据库配合良好，使用 RESTful 数据调用、JDBC\
  \ 或 EJB 技术与后端交互。JavaBean，称为 Jakarta Server Faces *控制器类* 或 *控制器*，用于应用程序业务逻辑并支持每个视图中的动态内容。\n\
  \n\n\n它们可以遵循不同的生命周期，具体取决于所指定的作用域。视图可以调用 Bean 中的方法来执行数据操作和表单处理等操作。也可以在 Bean 中声明属性并在视图中公开，这提供了一种便捷的方式，可以在视图中提供动态内容或传递请求值。Jakarta\
  \ Server Faces 允许开发者使用预先存在的验证和转换标签来自定义应用程序，这些标签可用于视图中的组件，以验证或转换数据。构建自定义验证器以及可应用于视图中组件的自定义组件也很容易。\n\
  \n本章包含的秘籍对于刚开始使用 Jakarta Server Faces 的开发者以及希望通过一些最新的 Jakarta Server Faces 技术来巩固框架基础知识的开发者都很有用。您将学习如何创建控制器类、使用标准组件以及处理页面导航。还有一些秘籍涵盖了有用的技术，例如构建自定义验证器和创建可添加书签的\
  \ URL。这些秘籍经过精炼，包含了最前沿的技术，并提供了使用它们的最实用的方法。学习完本章的秘籍后，您将能够构建标准的 Jakarta Server Faces\
  \ 应用程序，并为其添加一些自定义功能。\n\n© Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang,\
  \ *Java EE 到 Jakarta EE 10 秘籍*[, https://doi.org/10.1007/978-1-4842-8079-9_3](https://doi.org/10.1007/978-1-4842-8079-9_3#DOI)\n\
  \n![](img/index-149_1.png)\n\n第 3 章 ■ Jakarta Server Faces\n\n■ **注意** 许多人更喜欢在集成开发环境\
  \ (IDE) 中工作以提高生产力。要开始学习如何使用 NetBeans IDE 创建新的 Jakarta Server Faces 项目并进行管理，请参阅本书的附录。\n\
  \n3-1\\. 编写一个简单的 Jakarta Server Faces 应用程序\n\n问题\n\n您希望通过创建一个简单的 Jakarta Server\
  \ Faces 应用程序来快速上手并运行。\n\n解决方案 #1\n\n创建一个简单的 Jakarta Server Faces Web 应用程序，该应用程序由一个\
  \ XHTML 页面、一个称为支持 Bean 的简单 Java 类以及一个激活 Jakarta Server Faces 的 Bean 组成。本秘籍中的应用程序仅显示一条在支持\
  \ Bean 中初始化的消息。图 3-1 显示了 此解决方案的项目结构。\n\n***图 3-1.** 项目文件夹结构*\n\n■ **注意** 建议您使用 Java\
  \ IDE 来简化工作。有许多优秀的 IDE 可供选择。您可以选择自己喜欢的 IDE，并按照其关于使用 Jakarta Server Faces 的说明进行操作。\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n项目依赖项\n\n以下是来自 pom.xml 的片段，显示了此项目所需的依赖项：\n\n<dependencies>\n\
  \n<dependency>\n\n<groupId>jakarta.faces</groupId>\n\n<artifactId>jakarta.faces-api</artifactId>\n\
  \n<version>4.0.0</version>\n\n<scope>provided</scope>\n\n</dependency>\n\n<dependency>\n\
  \n<groupId>jakarta.platform</groupId>\n\n<artifactId>jakarta.jakartaee-api</artifactId>\n\
  \n<version>10.0.0</version>\n\n</dependency>\n\n</dependencies>\n\n显示 Jakarta Server\
  \ Faces 控制器字段值\n\n以下位于 \\webapp\\chapter03\\recipe03_01.xhtml 文件中的代码构成了将用于显示 Jakarta\
  \ Server Faces 支持 Bean 字段值的 XHTML 视图：\n\n<?xml version='1.0' encoding='UTF-8' ?>\n\
  \n<!DOCTYPE html>\n\n<html >\n\n<h:head>\n\n<title>秘籍 3-1：一个简单的 Jakarta Server Faces\
  \ 应用程序</title>\n\n</h:head>\n\n<h:body>\n\n<p>\n\n这个简单的应用程序利用了一个请求作用域的 Jakarta Server\
  \ Faces\n\n控制器类\n\n来显示下面的消息。如果您更改\n\n控制器类构造函数中的消息，然后重新编译应用程序，\n\n新消息就会出现。\n\n<br/>\n\
  \n<br/>\n\n#{helloWorldController.hello}\n\n<br/>\n\n或者\n\n<br/>\n\n<h:outputText\
  \ id=\"helloMessage\" value=\"#{helloWorldController.hello}\"/>\n\n</p>\n\n</h:body>\n\
  \n</html>\n\n\n\n如您所见，Jakarta Server Faces 页面使用了 Jakarta Server Faces 表达式；\n\n`#{helloWorldController.hello}`\
  \ 在表达式中被引用，同时还有要暴露的字段。\n\n第 3 章 ■ Jakarta Server Faces\n\n此外，请确保您的 `web.xml` 配置文件如下所示：\n\
  \n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<web-app\n\nxsi:schemaLocation=\"\
  https://jakarta.ee/xml/ns/jakartaee https://jakarta.ee/xml/ns/\n\njakartaee/web-app_5_0.xsd\"\
  \ version=\"5.0\">\n\n<context-param>\n\n<param-name>jakarta.faces.CONFIG_FILES</param-name>\n\
  \n<param-value>/faces-config.xml</param-value>\n\n</context-param>\n\n<servlet>\n\
  \n<servlet-name>Faces Servlet</servlet-name>\n\n<servlet-class>jakarta.faces.webapp.FacesServlet</servlet-class>\n\
  \n<load-on-startup>1</load-on-startup>\n\n</servlet>\n\n<servlet-mapping>\n\n<servlet-name>Faces\
  \ Servlet</servlet-name>\n\n<url-pattern>*.xhtml</url-pattern>\n\n</servlet-mapping>\n\
  \n</web-app>\n\n检查 Jakarta Server Faces 控制器\n\n以下代码是 `HelloWorldController` 的代码，它是本示例的\
  \ Jakarta Server Faces 控制器：\n\npackage org.jakartaeerecipe.chapter03.recipe03_01;\n\
  \nimport jakarta.enterprise.context.RequestScoped;\n\nimport jakarta.inject.Named;\n\
  \n@Named\n\n@RequestScoped\n\npublic class HelloWorldController {\n\nprivate String\
  \ hello = \"Hello World!\";\n\npublic String getHello() {\n\nreturn hello;\n\n}\n\
  \n}\n\n■ **注意** 在 JSF 2.0 之前，为了启用 JSF Servlet 来翻译 XHTML 页面，您需要确保 `web.xml` 文件包含一个指示\
  \ `jakarta.faces.webapp.FacesServlet` 类及其关联的 `servlet-mapping` URL 的 `servlet` 元素。如果您使用的是\
  \ Servlet 3.x 容器，`FacesServlet` 会自动为您映射，因此无需调整 `web.xml` 配置。\n\n要在浏览器中加载应用程序，请访问\
  \ `http://localhost:8080/JakartaEERecipes_Chapter03-1.0-SNAPSHOT/chapter03/recipe03_01.xhtml`，您将看到如图\
  \ 3-2 所示的文本。\n\n![](img/index-152_1.png)\n\n第 3 章 ■ Jakarta Server Faces\n\n***图\
  \ 3-2.** 生成的 Jakarta Server Faces 视图页面*\n\n剖析 Jakarta Server Faces 应用程序\n\n现在，我们来谈谈您阅读本示例的真正原因……即构建\
  \ Jakarta Server Faces 应用程序的说明！一个 Jakarta Server Faces 应用程序由以下部分组成：\n\n• 如果它使用或维护的是基于\
  \ Jakarta Server Faces 1.x 编写的 Jakarta Server Faces 应用程序，则包含负责将 `FacesServlet` 实例映射到\
  \ URL 路径的 `web.xml` 部署描述符。\n\n• 一个或多个使用 Jakarta Server Faces 组件来提供页面布局的网页（可能使用也可能不使用\
  \ Facelets 视图技术）。通常，这些网页被称为“视图”。\n\n• 视图中的 Jakarta Server Faces 组件标签。\n\n• 一个或多个控制器类，这些类是简单的、轻量级的容器管理对象，负责支持页面结构和基本服务。\n\
  \n• 可选地，一个或多个配置文件（如 `faces-config.xml`），可用于定义导航规则以及配置 Bean 和其他自定义对象。\n\n• 可选地，支持对象，如监听器、转换器或自定义组件。\n\
  \n• 可选地，用于 Jakarta Server Faces 视图的自定义标签。\n\n**JAKARTA SERVER FACES 应用程序的生命周期**\n\
  \nJakarta Server Faces 视图处理生命周期包含六个阶段。这些阶段如下：\n\n1.  恢复视图\n2.  应用请求值\n3.  处理验证\n\
  4.  更新模型值\n\n第 3 章 ■ Jakarta Server Faces\n\n5.  调用应用程序\n6.  渲染响应\n\n恢复视图是 Jakarta\
  \ Server Faces 生命周期的第一个阶段，负责构建视图。然后，组件树使用组件树的 `decode` 方法将请求参数应用于每个对应的组件值。这发生在应用请求值阶段。在此阶段，任何值转换错误都将被添加到\
  \ `FacesContext` 中，以便在渲染响应阶段作为错误消息显示。接下来，所有\n\n\n\n验证过程已执行。在处理验证阶段，每个注册了验证器的组件都会被检查，局部值会与验证规则进行比较。如果出现任何验证错误，则会进入渲染响应阶段，并显示相应的验证错误信息。\n\
  \n如果处理验证阶段顺利通过且无错误，则进入更新模型值阶段。在此阶段，树结构中包含局部值的每个对应输入组件都会设置控制器类的属性。同样，如果发生任何错误，则会进入渲染响应阶段，并显示相应的错误信息。在更新模型值阶段成功完成后，应用程序级事件将在调用应用程序阶段进行处理。此类事件包括页面提交或重定向到其他页面。最后，进入渲染响应阶段，页面将呈现给用户。如果应用程序使用的是\
  \ Jakarta Server Pages，那么 Jakarta Server Faces 实现会允许 Jakarta Server Pages 容器来渲染页面。\n\
  \n本教程中的示例使用了这些部分中最少的部分。要运行该示例，如果它运行在 Jakarta Server Faces 2\\. *x* 之前的版本环境中，你需要确保\
  \ `web.xml` 文件包含正确的 Jakarta Server Faces 配置。你需要有一个支持 bean，它声明了在 Jakarta Server Faces\
  \ 视图中暴露的字段，以及使其正常工作所需的必要访问器方法。最后，你需要有一个 XHTML Jakarta Server Faces 视图页面，其中包含暴露支持\
  \ bean 中声明的字段的 Jakarta Server Faces 表达式。支持 bean 是 UI 背后的模型。它包含应用程序中用于用数据填充其视图的属性。JSF\n\
  \n容器通过按需实例化这些对象，并使用以“#”为前缀的名称，通过 Jakarta 表达式语言表达式将它们注入实例变量来管理这些对象。\n\n支持 bean 类与\
  \ Jakarta Server Page 的 JavaBean 非常相似，它为特定页面提供应用程序逻辑，这样 Java 代码就不需要嵌入到视图代码中。在 Jakarta\
  \ Server Faces 视图中使用的组件（也称为 Jakarta Server Faces 标签）被映射到 Jakarta Server Faces 支持\
  \ bean 中包含的服务器端字段和方法。在示例中，Jakarta Server Faces 控制器类名为 `HelloWorldController`，并声明了一个名为\
  \ `hello` 的字段，通过 `getHello()` 方法向公众公开。当请求包含对 bean 引用的页面时，Jakarta Server Faces bean\
  \ 类会被实例化和初始化，其作用域决定了支持 bean 的生命周期。在本示例中，支持 bean 通过\n\n`@RequestScoped` 注解包含请求作用域。因此，其生命周期是单个请求的生命周期，并且每次发出请求时都会重新实例化。在本例中，即当示例中的页面被重新加载时。要了解有关控制器类可用的作用域和注解的更多信息，请参阅配方\
  \ 3-2。\n\nJakarta Server Faces 技术利用了一个称为 Facelets 的 Web 视图声明框架。Facelets 使用一组特殊的\
  \ XML 标签，其风格类似于标准的 Jakarta Server Faces 标签，来帮助构建组件化的 Web 视图。虽然本示例未使用 Facelets，但它是\
  \ Jakarta Server Faces 视图技术的重要组成部分。Facelets 页面通常使用 XHTML，这是一种由格式良好的 XML 组件组成的 HTML\
  \ 页面。本教程中的示例 Jakarta Server Faces 视图结构良好，它包含两个 Jakarta 表达式语言表达式，负责实例化控制器\n\n110\n\
  \n第三章 ■ Jakarta Server Faces\n\n类并显示 `hello` 字段的内容。当 Jakarta 表达式语言表达式\n\n\n\n`#{helloWorldController.hello}`\
  \ 由 `FacesServlet` 进行翻译，它会调用 `HelloWorldController` 的 `getHello()` 方法。\n\n在本入门配方中，您接触到了大量信息。本配方中的简单示例为使用\
  \ Jakarta Server Faces 技术提供了一个良好的起点。请继续学习本章中的其他配方，以更全面地了解用于开发 Jakarta Server Faces\
  \ Web 应用程序的各个组件。\n\n3-2\\. 编写控制器类\n\n问题\n\n您希望在 Jakarta Server Faces 应用程序的 Web 页面中使用一个服务器端\
  \ Java 类。\n\n解决方案\n\n开发一个 Jakarta Server Faces 控制器类，这是一个轻量级的容器管理组件，它将为您的 Jakarta\
  \ Server Faces 应用程序 Web 页面提供应用逻辑。本配方中的示例是一个 Jakarta Server Faces 视图和一个 Jakarta Server\
  \ Faces 控制器类。该应用程序计算用户输入的两个数字，然后根据用户的选择对它们进行加、减、乘或除运算。以下代码是控制器类，负责为用户输入的每个数字声明字段，以及为计算结果声明一个字段。控制器类还负责创建一个字符串列表，该列表将显示在\
  \ Jakarta Server Faces 视图中的 `h:selectOneMenu` 元素内，并保留用户选择的值。\n\n尽管这个控制器类看起来做了很多工作，但实现起来非常简单！控制器类实际上是一个功能增强的普通\
  \ Java 对象（POJO），其中包含一些可以从 Jakarta Server Faces 视图组件调用的方法。\n\n控制器类\n\n以下代码是用于计算示例的控制器类。该类名为\
  \ `CalculationController`，在 Jakarta Server Faces 视图中以 `calculationController` 的形式被引用。Jakarta\
  \ Server Faces 在其命名约定中采用“约定优于配置”的原则。默认情况下，Jakarta Server Faces 视图可以包含 Jakarta 表达式语言，该语言通过指定类名（首字母小写）来引用控制器类。\n\
  \n```java\npackage org.jakartaeerecipe.chapter03.recipe03_02;\n\nimport java.io.Serializable;\n\
  \nimport java.util.*;\n\nimport jakarta.enterprise.context.SessionScoped;\n\nimport\
  \ jakarta.faces.application.FacesMessage;\n\nimport jakarta.faces.context.FacesContext;\n\
  \nimport jakarta.faces.model.SelectItem;\n\nimport jakarta.inject.Named;\n\n@Named\n\
  \n@SessionScoped\n\npublic class CalculationController implements Serializable {\n\
  \n    private int num1;\n\n    private int num2;\n\n    private int result;\n\n\
  \    private String calculationType;\n\n    private static final String ADDITION\
  \ = \"Addition\";\n\n    private static final String SUBTRACTION = \"Subtraction\"\
  ;\n\n    private static final String MULTIPLICATION = \"Multiplication\";\n\n  \
  \  private static final String DIVISION = \"Division\";\n\n    List<SelectItem>\
  \ calculationList;\n\n    /**\n     * Creates a new instance of CalculationController\n\
  \     */\n    public CalculationController() {\n        // 初始化变量\n        num1 =\
  \ 0;\n        num2 = 0;\n        result = 0;\n        calculationType = null;\n\
  \        // 初始化 SelectOneMenu 的值列表\n        populateCalculationList();\n       \
  \ System.out.println(\"initialized the bean!\");\n    }\n\n    // getters and setters\n\
  \    // ...\n\n    private void populateCalculationList(){\n        calculationList\
  \ = new ArrayList<>();\n        calculationList.add(new SelectItem(ADDITION));\n\
  \        calculationList.add(new SelectItem(SUBTRACTION));\n        calculationList.add(new\
  \ SelectItem(MULTIPLICATION));\n        calculationList.add(new SelectItem(DIVISION));\n\
  \    }\n\n    public void performCalculation() {\n        switch (getCalculationType())\
  \ {\n            case ADDITION -> setResult(num1 + num2);\n            case SUBTRACTION\
  \ -> setResult(num1 - num2);\n            case MULTIPLICATION -> setResult(num1\
  \ * num2);\n            case DIVISION -> {\n                try {\n            \
  \        setResult(num1 / num2);\n                } catch (Exception ex) {\n   \
  \                 FacesMessage facesMsg = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\
  \                            \"Invalid Calculation\", \"Invalid Calculation\");\n\
  \                    FacesContext.getCurrentInstance().addMessage(null, facesMsg);\n\
  \                }\n            }\n        }\n    }\n}\n```\n\n接下来是构成 Web 页面的视图，该视图将显示给用户。视图在\
  \ XHTML 文档中构成，是一个格式良好的 XML。\n\nJakarta Server Faces 视图\n\n该视图包含 Jakarta Server Faces\
  \ 组件，这些组件显示为文本框，用户可以在其中输入信息；一个供用户选择的不同计算类型的选取列表；一个负责显示计算结果的组件；以及一个用于提交表单值的 `h:commandButton`\
  \ 组件：\n\n```html\n<html\nxmlns:h=\"http://xmlns.jcp.org/jsf/html\"\nxmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
  >\n<h:head>\n    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
  />\n    <title>Recipe 3-2: Writing a Jakarta Server Faces Managed Bean</title>\n\
  </h:head>\n<h:body>\n    <f:view>\n        <h2>Perform a Calculation</h2>\n    \
  \    <p>\n            Use the following form to perform a calculation on two numbers.\n\
  \            <br/>\n            Enter\n            the numbers in the two text fields\
  \ below, and select a calculation to\n            <br/>\n            perform, then\
  \ hit the Calculate button.\n            <br/>\n            <br/>\n            <h:messages\
  \ errorStyle=\"color: red\" infoStyle=\"color: green\"\n                       \
  \ globalOnly=\"true\"/>\n            <br/>\n            <h:form id=\"calculationForm\"\
  >\n                Number1:\n                <h:inputText id=\"num1\" value=\"#{calculationController.num1}\"\
  />\n                <br/>\n                Number2:\n                <h:inputText\
  \ id=\"num2\" value=\"#{calculationController.num2}\"/>\n                <br/>\n\
  \                <br/>\n                Calculation Type:\n                <h:selectOneMenu\
  \ id=\"calculationType\" value=\"#{calculationController.calculationType}\">\n \
  \                   <f:selectItems value=\"#{calculationController.calculationList}\"\
  />\n                </h:selectOneMenu>\n                <br/>\n                <br/>\n\
  \                Result:\n                <h:outputText id=\"result\" value=\"#{calculationController.result}\"\
  />\n                <br/>\n                <br/>\n                <h:commandButton\
  \ action=\"#{calculationController.performCalculation()}\"\n                   \
