  \n\n您可能希望为消息提供一些属性，以便消费者能够更轻松地筛选并找到他们想要的消息。\n\n解决方案\n\n利用消息选择器来过滤正在被消费的消息。消息选择器是基于字符串的表达式，可以在创建消费者时分配给它们，通常用于过滤消费者将接收的消息类型。在以下示例中，`sendMessage1`\
  \ 和 `sendMessage2` 方法都会创建消息。`sendMessage1` 方法在消息上设置了一个名为 `TYPE`、值为 `JAKARTAEE` 的属性。设置此属性后，会创建一个\
  \ `MessageProducer` 并发送消息。`sendMessage2` 方法在消息上设置了一个名为 `TYPE`、值为 `JAVASE` 的属性。与\
  \ `sendMessage1` 类似，`sendMessage2` 方法随后创建一个 `MessageProducer` 并发送消息。`receiveMessage`\
  \ 方法设置了一个 `MessageConsumer`，并指定了一个选择器，使其仅消费 `TYPE` 属性值为 `JAKARTAEE` 的消息。\n\n以下摘录自名为\
  \ `org.jakartaeerecipes.chapter12.recipe12_05.Example12_05.java` 的类：\n\n```java\n\
  public void sendMessage1() {\n\n    if (connection != null) {\n\n        try (Session\
