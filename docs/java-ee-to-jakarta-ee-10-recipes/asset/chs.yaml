  \ 表单可以将参数传递给托管 bean 控制器，该控制器再将这些参数传递给 HTTP 请求登录方法，以使用凭据执行编程式身份验证。\n\n如本方案解决方案中列出的登录表单所示，可以编写一个标准的\
  \ JSF 视图，将 inputText 组件中的值传递给相应的托管 bean 控制器。相应的字段（username 和 password）绑定到托管 bean\
  \ 控制器中的属性。\n\n然后，将 username 设置到新的 User 实体对象的 username 属性中，并将 password 值直接传递给 EJB\
  \ 以供后续使用。password 完全不会存储在托管 bean 控制器中，因此也不会存储到会话中。\n\n让我们花点时间讨论托管 bean 控制器中的方法。在示例中，视图中包含一个\
  \ commandButton，它绑定到托管 bean 控制器的 login 方法。一旦被调用，login 方法会调用 EJB 中的一个方法，该方法负责针对应用服务器容器和\
  \ JPA 数据存储用户表执行实际的身份验证。\n\n第 15 章 ■ Jakarta 安全性\n\n在这种情况下，EJB 方法也被命名为 login，当它被调用时，User\
  \ 实体对象会被传递给 EJB，以便使用存储在对象中的 username 属性进行身份验证。托管 bean 控制器中的 login 方法调用 EJB 的 login\
  \ 方法，该方法返回一个布尔值，指示凭据是否已成功验证用户身份。\n\n\n\n根据结果，用户将被授予或拒绝访问应用程序的权限。托管 Bean 控制器中还包含一个登出方法。该方法通过获取外部上下文（即应用服务器上下文），然后调用其\
  \ `invalidate()` 方法来使当前会话失效。\n\nEJB 中的登录方法是实际活动发生的地方，因为正是在这里调用了应用服务器的 HTTP 请求登录方法来验证凭据。首先，从外部上下文获取\
  \ `HttpServletRequest` 对象，然后调用其 `login` 方法。该方法接受用户名和密码值，启动应用服务器的身份验证机制，如果凭据无效则抛出异常。否则，如果凭据有效，则在\
  \ `HttpSession` 对象上设置一个时间限制。传递给 `session.setMaxInactiveInterval` 方法的值表示用户会话在应用服务器自动使其失效之前可以保持非活动状态的时间。该方法的其余部分用于使用\
  \ `User` 实体对象执行特定于应用程序的身份验证。在示例中，实体管理器被刷新，然后发出一个查询，统计与登录表单中输入的用户名匹配的 `User` 实体对象的数量。查询实体时，设置了一个提示，强制每次发起请求时都查询数据库。以下代码行摘自\
  \ `AuthenticationBean` 类的 `login` 方法，演示了如何设置此提示：`user.setHint(\"jakarta.persistence.cache.retrieveMode\"\
  , CacheRetrieveMode.BYPASS);`\n\n如果给定用户名没有匹配的实体对象，则该用户未通过应用程序的身份验证，并向托管 Bean 控制器返回\
  \ `false` 值以指示凭据无效。\n\n否则，如果给定用户名存在匹配的实体对象，则获取该匹配的实体对象，并设置一个会话属性以指示用户已成功通过身份验证。\n\
  \n■ **注意** 应用程序可以包含自己的一组用户，这组用户与由 GlassFish 应用服务器或数据库管理的用户是分开的。实现此目的的一种方法是为每个应用程序创建一个单独的数据库表，用于存储可能访问该应用程序的用户的用户名和角色。然后，托管\
  \ Bean 控制器中包含的登录逻辑可以对特定于应用程序的表执行查询，以查看登录视图中指定的用户名是否包含在该表中。如果用户名在表中，则用户可以获准访问应用程序；否则，将拒绝访问。此方法在身份验证过程中增加了两个步骤：应用服务器基于表单的身份验证和数据库表级别的身份验证。\n\
  \n15-4. 使用数据库凭据通过安全 API 进行身份验证\n\n问题\n\n您希望利用标准解决方案将基于表单的身份验证集成到您的应用程序中，并使用数据库来存储凭据。\n\
  \n第 15 章 ■ Jakarta 安全\n\n解决方案\n\n利用 Jakarta Security，使用与配方 15-3 中演示的相同的表单身份验证来验证用户身份。但是，此解决方案将使用保存在数据库中的凭据，尽管也可以通过安全\
  \ API 使用 LDAP 身份验证或其他自定义方式。数据库的配置通过应用程序中的注解进行，因此无需进行应用服务器配置。\n\n要配置应用程序，请使用 `@ApplicationScoped`\
  \ 注解一个 Bean，以指示将用于应用程序的身份验证身份存储。在这种情况下，使用 `@DatabaseIdentityStoreDefinition` 注解将数据库配置为应用程序的身份存储：\n\
  \npackage org.jakartaeerecipe.chapter15;\n\nimport jakarta.enterprise.context.ApplicationScoped;\n\
  \n\n\nimport jakarta.inject.Named;\n\nimport jakarta.security.enterprise.identitystore.DatabaseIdentityStoreDefinition;\n\
  \nimport jakarta.security.enterprise.identitystore.Pbkdf2PasswordHash;\n\n@DatabaseIdentityStoreDefinition(\n\
  \ndataSourceLookup = \"${'jdbc/acmedb'}\",\n\ncallerQuery = \"#{'select password\
  \ from caller_store where name = ?'}\",\n\ngroupsQuery = \"select group_name from\
  \ caller_groups where caller_name = ?\",\n\nhashAlgorithm = Pbkdf2PasswordHash.class,\n\
  \npriorityExpression = \"#{100}\",\n\nhashAlgorithmParameters = {\n\n\"Pbkdf2PasswordHash.Iterations=3072\"\
  ,\n\n\"${applicationConfig.hash}\"\n\n} // 仅用于测试/示例\n\n)\n\n@ApplicationScoped\n\
  \n@Named\n\npublic class ApplicationConfig {\n\npublic String[] getHash() {\n\n\
  return new String[]{\"Pbkdf2PasswordHash.Algorithm=PBKDF2WithHmacSHA512\",\n\n\"\
  Pbkdf2PasswordHash.SaltSizeBytes=64\"};\n\n}\n\n}\n\n单例可用于配置数据库连接。此代码将在每次应用程序启动时运行一次，并加载数据库配置，同时填充安全数据库以用于测试目的。在实际应用中，此类仅用于配置数据源，因为安全数据库通常由管理员填充。以下摘录自单例\
  \ EJB 的源代码：\n\nimport java.sql.Connection;\n\nimport java.sql.PreparedStatement;\n\
  \nimport java.sql.SQLException;\n\nimport java.util.HashMap;\n\nimport java.util.Map;\n\
  \nimport jakarta.annotation.PostConstruct;\n\nimport jakarta.annotation.PreDestroy;\n\
  \nimport jakarta.annotation.Resource;\n\nimport jakarta.annotation.sql.DataSourceDefinition;\n\
  \n第 15 章 ■ Jakarta 安全\n\nimport jakarta.ejb.Singleton;\n\nimport jakarta.ejb.Startup;\n\
  \nimport jakarta.inject.Inject;\n\nimport jakarta.sql.DataSource;\n\nimport jakarta.security.enterprise.identitystore.Pbkdf2PasswordHash;\n\
  \n@DataSourceDefinition(\n\nname = \"java:global/JakartaEERecipes/acmedb\",\n\n\
  className = \"org.apache.derby.jdbc.ClientDataSource\",\n\nserverName=\"localhost\"\
  ,\n\ndatabaseName=\"acme\",\n\nuser = \"acmeuser\",\n\npassword = \"databasepassword\"\
  \n\n)\n\n@Singleton\n\n@Startup\n\npublic class LoadDatabase {\n\n@Resource(lookup=\"\
  java:global/JakartaEERecipes/acmedb\")\n\nprivate DataSource dataSource;\n\n@Inject\n\
  \nprivate Pbkdf2PasswordHash passwordHash;\n\n@PostConstruct\n\npublic void init()\
  \ {\n\nMap<String, String> parameters= new HashMap<>();\n\nparameters.put(\"Pbkdf2PasswordHash.Iterations\"\
  , \"3072\");\n\nparameters.put(\"Pbkdf2PasswordHash.Algorithm\", \"PBKDF2WithHmacSHA512\"\
  );\n\nparameters.put(\"Pbkdf2PasswordHash.SaltSizeBytes\", \"64\");\n\npasswordHash.initialize(parameters);\n\
  \nexecuteUpdate(dataSource, \"CREATE TABLE caller_store(name VARCHAR(64) PRIMARY\
  \ KEY,\n\npassword VARCHAR(255))\");\n\nexecuteUpdate(dataSource, \"CREATE TABLE\
  \ caller_groups(caller_name VARCHAR(64),\n\ngroup_name VARCHAR(64))\");\n\nexecuteUpdate(dataSource,\
  \ \"INSERT INTO caller_store VALUES('juneau', '\" +\n\npasswordHash.generate(\"\
  eerecipes\".toCharArray()) + \"')\");\n\nexecuteUpdate(dataSource, \"INSERT INTO\
  \ caller_groups VALUES('juneau', 'group1')\");\n\nexecuteUpdate(dataSource, \"INSERT\
  \ INTO caller_groups VALUES('juneau', 'group2')\");\n\n}\n\n@PreDestroy\n\npublic\
  \ void destroy() {\n\ntry {\n\nexecuteUpdate(dataSource, \"DROP TABLE IF EXISTS\
  \ caller_store\");\n\nexecuteUpdate(dataSource, \"DROP TABLE IF EXISTS caller_groups\"\
  );\n\n} catch (Exception e) {\n\n// 静默忽略，涉及内存数据库\n\n}\n\n}\n\nprivate void executeUpdate(DataSource\
  \ dataSource, String query) {\n\ntry (Connection connection = dataSource.getConnection())\
  \ {\n\ntry (PreparedStatement statement = connection.prepareStatement(query)) {\n\
  \nstatement.executeUpdate();\n\n}\n\n} catch (SQLException e) {\n\n第 15 章 ■ Jakarta\
  \ 安全\n\n// 不做任何处理\n\n}\n\n}\n\n}\n\n与配方 15-3（/webapp/chapter15/login.xhtml）中相同的\
  \ Jakarta Server Faces 登录表单可用于此场景中的身份验证 UI，但需要传递凭据并调用 SecurityContext.authenticate()。这是一个不同的基于表单的场景，它利用了\n\
  \n@CustomFormAuthenticationMechanismDefinition 注解。以下摘录自 Jakarta Server Faces 登录表单，其中包含一个\
  \ PrimeFaces commandButton 组件，该组件绑定到 CDI 控制器操作以执行验证：\n\n<html\n\n>\n\n<h:head>\n\
  \n\n\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"/>\n\
  \n<title>Jakarta Recipes = 第 15 章示例</title>\n\n</h:head>\n\n<h:body>\n\n<ui:composition\
  \ template=\"layout/custom_template_search.xhtml\">\n\n<ui:define name=\"content\"\
  >\n\n<h1>Jakarta EE Recipes 应用程序的登录表单</h1>\n\n<h:form id=\"loginForm\">\n\n<p:messages\
  \ id=\"messages\"/>\n\n<p:panelGrid columns=\"2\">\n\n<p:outputLabel for=\"username\"\
  \ value=\"用户名：\"/>\n\n<p:inputText id=\"username\" value=\"#{standardizedAuthentication\n\
  \nController.username}\"/>\n\n<p:outputLabel for=\"password\" value=\"密码 \"/>\n\n\
  <p:password id=\"password\" value=\"#{standardizedAuthentication\n\nController.password}\"\
  />\n\n</p:panelGrid>\n\n<br/>\n\n<p:commandButton id=\"loginAction\" action=\"#{standardizedAuthentication\n\
  \nController.login}\"\n\nvalue=\"登录\"\n\nupdate=\"messages\"/>\n\n</h:form>\n\n\
  </ui:define>\n\n</ui:composition>\n\n</h:body>\n\n</html>\n\n最后，认证 CDI 控制器 bean\
  \ 的代码如下所示。`@RequestScoped` 控制器包含用于传递用户名和密码的属性，以及验证用户提供的凭据的逻辑：\n\nimport jakarta.enterprise.context.RequestScoped;\n\
  \nimport jakarta.faces.application.FacesMessage;\n\nimport jakarta.faces.context.FacesContext;\n\
  \n第 15 章 ■ Jakarta 安全\n\nimport jakarta.inject.Inject;\n\nimport jakarta.inject.Named;\n\
  \nimport jakarta.security.enterprise.credential.Credential;\n\nimport jakarta.security.enterprise.credential.Password;\n\
  \nimport jakarta.security.enterprise.credential.UsernamePasswordCredential;\n\n\
  import jakarta.security.enterprise.identitystore.CredentialValidationResult;\n\n\
  import jakarta.security.enterprise.identitystore.IdentityStoreHandler;\n\nimport\
  \ jakarta.servlet.http.HttpServletRequest;\n\nimport jakarta.servlet.http.HttpServletResponse;\n\
  \nimport jakarta.validation.constraints.NotNull;\n\n/**\n\n*\n\n* @author Juneau\n\
  \n*/\n\n@Named\n\n@RequestScoped\n\npublic class StandardizedAuthenticationController\
  \ {\n\n@Inject\n\nprivate IdentityStoreHandler identityStoreHandler;\n\n@NotNull\n\
  \nprivate String username;\n\n@NotNull\n\nprivate String password;\n\npublic void\
  \ login() {\n\nFacesContext context = FacesContext.getCurrentInstance();\n\nCredential\
  \ credential = new UsernamePasswordCredential(username, new\n\nPassword(password));\n\
  \nCredentialValidationResult cres = identityStoreHandler.validate(credential);\n\
  \nif (cres.getStatus().equals(CredentialValidationResult.Status.VALID)) {\n\ncontext.responseComplete();\n\
  \ncontext.addMessage(null, new FacesMessage(FacesMessage.SEVERITY_INFO,\n\n\"认证成功\"\
  , null));\n\n} else if (cres.getStatus().equals(CredentialValidationResult.Status.INVALID))\
  \ {\n\ncontext.addMessage(null,\n\nnew FacesMessage(FacesMessage.SEVERITY_ERROR,\
  \ \"认证\n\n失败\", null));\n\n}\n\n}\n\nprivate static HttpServletResponse getResponse(FacesContext\
  \ context) {\n\nreturn (HttpServletResponse) context\n\n.getExternalContext()\n\n\
  .getResponse();\n\n}\n\nprivate static HttpServletRequest getRequest(FacesContext\
  \ context) {\n\nreturn (HttpServletRequest) context\n\n.getExternalContext()\n\n\
  .getRequest();\n\n}\n\n/**\n\n第 15 章 ■ Jakarta 安全\n\n* @return 用户名\n\n*/\n\npublic\
  \ String getUsername() {\n\nreturn username;\n\n}\n\n/**\n\n* @param username 要设置的用户名\n\
  \n*/\n\npublic void setUsername(String username) {\n\nthis.username = username;\n\
  \n}\n\n/**\n\n* @return 密码\n\n*/\n\npublic String getPassword() {\n\nreturn password;\n\
  \n}\n\n/**\n\n* @param password 要设置的密码\n\n*/\n\npublic void setPassword(String password)\
  \ {\n\nthis.password = password;\n\n}\n\n}\n\n工作原理\n\nJakarta Security 定义了一组注解，可用于配置应用程序的身份存储和\
  \ `HttpAuthenticationMechanism`，以及其他安全配置。这些标准化注解作为 Jakarta Security 的一部分，在所有符合 Jakarta\
  \ EE 10 的容器中可用，允许将安全配置作为应用程序的一部分打包，而无需额外的 XML 配置要求。这使得创建包含安全性的可移植应用程序成为可能，并且可以在多个容器中使用相同的安全配置。\n\
  \n身份存储通常保存调用者和调用者组的列表，以及用于验证调用者的安全凭据。API 定义了以下一组标准的身份存储注解，它们提供了身份存储的抽象：\n\n• `@LdapIdentityStoreDefinition`：支持存储在外部\
  \ LDAP 服务器中的调用者\n\n• `@DatabaseIdentityStoreDefinition`：支持存储在外部数据库中的调用者，该数据库可通过\
  \ JNDI 绑定的数据源访问\n\n身份存储注解必须在标记为 `@ApplicationScoped` 的 CDI bean 中定义，以便在每次应用程序启动时配置一次。身份存储是无状态的，它应包含将调用者认证到应用程序所需的信息。调用者不应直接与身份存储交互。相反，应由\
  \ `HttpAuthenticationMechanism`（将在下文解释）执行交互。身份存储包含两个方法，认证机制可以实现这些方法来验证调用者的凭据并返回调用者的安全组。这两个方法分别是\
  \ `validate()` 和 `getCallerGroups()`。身份存储可以实现其中一个或两个方法，调用身份存储的 `validationTypes()`\
  \ 方法会返回一组值，这些值通过以下值指示实现了哪些方法：`VALIDATE`、`PROVIDE_GROUPS`。\n\n`validate()` 方法接受一个\
  \ `Credential` 对象，这是一个可移植对象，包含调用者提供的用户名/密码。`validate()` 方法返回一个 `CredentialValidationResult`，指示验证状态。`CredentialValidationResult`\
  \ 可用于获取信息，例如最终的验证状态，如果成功，则还包含身份存储 ID、调用者主体、调用者在身份存储中的唯一 ID 以及调用者的组。`CredentialValidationResult`\
  \ 的 `getStatus()` 方法将返回以下状态值之一：\n\n• `VALID`：验证成功，并且可以获取调用者组（如果有）。\n\n• `INVALID`：验证失败。\n\
  \n• `NOT_VALIDATED`：由于凭据类型无效而未尝试验证。\n\n可以通过设置优先级为应用程序配置多个身份存储。身份存储也可以通过实现 `IdentityStore`\
  \ 接口进行编程，或者通过使用前面概述的身份存储注解进行注入。这些主题以及对身份存储概念的更深入分析，在 javaee.github.io 上提供的 JSR 375\
  \ 规范中有详细说明：\n\n[`javaee.github.io/security- spec/`](https://javaee.github.io/security-spec/)。\n\
  \n`HttpAuthenticationMechanism` 由安全 API 用于验证用户的凭据。符合 Jakarta EE 的应用程序服务器容器必须提供三种\
  \ `HttpAuthenticationMechanism`，如下所示：\n\n• *Basic* (`@BasicAuthenticationMechanismDefinition`)：根据\
  \ HTTP 基本认证语义进行认证。\n\n• *Form* (`@FormAuthenticationMechanismDefinition`)：根据基于表单的认证语义进行认证。\n\
  \n• *Custom form* (`authenticate`)：根据基于表单的认证语义进行认证；但是，它不是通过回发到 `j_security_check`\
  \ 来进行的。而是使用传入的凭据调用 `SecurityContext.authenticate()`。\n\n可以通过实现 `HttpAuthenticationMechanism`\
  \ 来编写 `HttpAuthenticationMechanism`\n\n\n\n接口，或者可以使用注解之一进行注入。要实现该机制，必须编写 `validateRequest()`\
  \ 方法，该方法会在 servlet 过滤器的 `doFilter()` 方法或任何 servlet 的 `service()` 方法之前被调用。此外，当代码调用\
  \ `HttpServletRequest` 的 `authenticate()` 方法时，也会调用 `validateRequest()` 方法。`HttpAuthenticationMechanism`\
  \ 中有两个方法不需要实现：`secureResponse()` 和 `cleanSubject()`。\n\n`validateRequest()` 方法用于允许调用者进行身份验证。`secureResponse()`\
  \ 方法用于对 servlet 或 servlet 过滤器生成的响应进行后处理。\n\n`cleanSubject()` 方法用于在调用者注销后进行清理。\n\n\
  由于符合规范的容器必须提供 `HttpAuthenticationMechanism` 的默认实现，因此应用程序可以简单地使用该机制，而无需编写代码或提供注解。本示例中的做法正是如此；要验证这一点，您可以在浏览器中访问以下\
  \ URL：`http://localhost:8080/JakartaEERecipes_Chapter15-1.0-SNAPSHOT/chapter15/login.xhtml`。当调用者在登录界面输入凭据并点击按钮时，会调用\
  \ `StandardizedAuthenticationController` 的 `login()` 方法。该控制器类包含一个注入的 `IdentityStoreHandler`，用于连接到容器提供的\
  \ `HttpAuthenticationMechanism`。在 `login()` 方法中，调用者的用户名和密码被传入一个 `UsernamePasswordCredential`\
  \ 对象，以返回一个 `Credential`。然后，该 `Credential` 被传入 `IdentityStoreHandler.validate()`\
  \ 方法，返回一个 `CredentialValidationResult` 对象。该对象可用于获取身份验证尝试的成功或失败信息。可以通过调用 `CredentialValidationResult.getStatus()`\
  \ 方法来测试成功或失败的结果。\n\nJakarta Security API 有助于为平台中过去非常不标准化的领域带来标准化。虽然许多容器可能仍会保留其专有的安全\
  \ API 和技术，但任何符合 Jakarta EE 10 规范的容器也必须遵守 Jakarta Security 的标准。\n\n■ **注意** 在 Jakarta\
  \ EE Security API (Soteria) 的 GitHub 项目页面 [`github.com/eclipse-ee4j/soteria`](https://github.com/eclipse-ee4j/soteria)\
  \ 上可以找到大量示例。通读规范也是一个好主意，该规范不到 50 页，可以在 [`jakarta.ee/specifications/security/3.0/`](https://jakarta.ee/specifications/security/3.0/)\
  \ 找到。\n\n15-5. 在 Jakarta Server Faces 应用程序中管理页面访问\n\n问题\n\n您已经为 JSF 应用程序设置了身份验证，通过用户名和密码组合指定了对有限用户群的访问权限。您希望限制应用程序中的某些视图，使得只有特定角色的成员才能获得访问权限。\n\
  \n解决方案\n\n将用户认证到应用程序，并存储一个布尔值，指示用户已成功通过身份验证。利用该布尔值在 Jakarta Server Faces 视图中执行条件逻辑，以渲染仅允许通过身份验证的用户访问的表单。如果用户成功通过身份验证，则渲染表单；如果用户未成功通过身份验证，则表单将显示一条错误消息，指示需要身份验证才能访问。\n\
  \n以下 Jakarta Server Faces 视图 (`/webapp/chapter15/recipe15_04.xhtml`) 演示了如何使用条件逻辑来显示需要受控访问的页面部分：\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\n<!DOCTYPE html PUBLIC \"\
  -//W3C//DTD XHTML 1.0 Transitional//EN\" \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
  >\n\n<html\n\n>\n```\n\n\n<ui:composition template=\"/layout/fess_template.xhtml\"\
  >\n\n<ui:define name=\"title\">\n\n<h:outputText value=\"Jakarta EE 10 菜谱：受控访问\"\
  ></h:outputText>\n\n</ui:define>\n\n<ui:define name=\"body\">\n\n<h:panelGroup id=\"\
  messagePanel\" layout=\"block\">\n\n<h:messages errorStyle=\"color: red\" infoStyle=\"\
  color: green\" layout=\"table\"/> 579\n\n第 15 章 ■ Jakarta 安全\n\n</h:panelGroup>\n\
  \n<p:panel rendered=\"#{authenticationController.authenticated}\">\n\n<h:form>\n\
  \n视图的这一部分包含机密内容！\n\n</h:form>\n\n</p:panel>\n\n<p:panel rendered=\"#{!authenticationController.authenticated}\"\
  >\n\n请<a href=\"#{request.contextPath}/ chapter15/recipe15_03.xhtml\">进行身份验证</a>以使用此表单。\n\
  \n</p:panel>\n\n</ui:define>\n\n</ui:composition>\n\n</html>\n\n工作原理\n\nJakarta\
  \ Server Faces 组件的 `rendered` 属性可用于执行条件渲染。\n\n如果将 `rendered` 属性绑定到一个托管 Bean 属性，该属性返回一个布尔值，指示用户是否已通过身份验证，那么此技术可用于控制对特定组件的访问。在本示例中，该技术通过\
  \ PrimeFaces 面板组件进行演示。该面板包含需要保护的信息，并且仅在 `authenticated` 属性返回 `true` 值时才会渲染。如果 `authenticated`\
  \ 属性包含 `false` 值，则会渲染另一个面板组件，该组件向用户显示一条消息，指示需要进行身份验证。\n\n在 Jakarta Server Faces\
  \ 应用程序中用于程序化身份验证的控制器应包含一个布尔值，该值可以绑定到 Jakarta Server Faces 视图中的条件逻辑，以指示当前用户是否已成功通过身份验证。对于此示例，托管\
  \ Bean 控制器 `org.jakartaeerecipe.chapter15.recipe15_03.AuthenticationController`\
  \ 包含一个名为 `authenticated` 的布尔字段。以下类摘录显示了 `isAuthenticated()` 方法，当从 Jakarta Server\
  \ Faces 视图访问 `authenticated` 属性时会调用该方法：\n\n```java\npublic boolean isAuthenticated()\
  \ {\n    try {\n        boolean auth = (Boolean) getSession().getAttribute(\"authenticated\"\
  );\n        if (auth) {\n            this.authenticated = true;\n        } else\
  \ {\n            authenticated = false;\n        }\n    } catch (Exception e) {\n\
  \        this.authenticated = false;\n    }\n    return authenticated;\n}\n```\n\
  \n同样的技术可用于根据用户的身份验证状态来隐藏或显示单个组件。此外，通过使用 Jakarta 表达式语言条件表达式，可以利用细粒度的访问控制为 `rendered`\
  \ 属性提供布尔值。例如，如果某些组件只能由属于特定安全角色的用户访问，则可以使用条件表达式来渲染组件（如果用户属于指定角色）。以下代码行演示了如果用户属于 `ADMIN`\
  \ 安全角色，如何渲染一个 `outputText` 组件：\n\n```xml\n<h:outputLink rendered=\"${authenticationController.user.securityRole\
  \ eq 'ADMIN'}\" value=\"#\"\nonclick=\"dialog.show()\">删除属性</h:outputLink>\n```\n\
  \n尽管 `rendered` 属性可能无法让您保护应用程序的每个部分，但当与诸如注解方法（菜谱 15-2）等其他安全措施结合使用时，它有助于提供一个非常安全的环境。\n\
  \n15-6. 在 GlassFish 中配置 LDAP 身份验证\n\n问题\n\n您希望基于组织企业中的集中式 LDAP 服务器对应用程序的用户进行身份验证。\n\
  \n解决方案\n\n从管理控制台实用程序中为 GlassFish 创建一个 LDAP 安全域，并将其设置为 `com.sun.enterprise.security.auth.realm.ldap.LDAPRealm`。要在\
  \ GlassFish 中创建 LDAP 安全域，请使用以下步骤：\n\n• 登录到 GlassFish 管理控制台。\n• 通过展开左侧树菜单 **配置**\
  \ ➤ **服务器配置** ➤ **安全** ➤ **域**，导航到“域”表单。\n• 在“域”表单中单击 **新建...** 按钮以创建新的安全域。\n\n\n\
  \n• 在“新建领域”表单中，为安全领域提供一个名称。接着，从“类名”下拉菜单中选择\n\n`com.sun.enterprise.security.auth.realm.ldap.LDAPRealm`。这将打开用于设置\
  \ LDAP 领域的配置界面\n\n（如图 15-11 所示）。\n\n![](img/index-621_1.jpg)\n\n第 15 章 ■ Jakarta\
  \ 安全性\n\n***图 15-11.** 新建 LDAP 安全领域*\n\n填写该类特有的属性，以便连接到您选择的 LDAP 服务器。\n\n1.  通过点击**添加属性**按钮并输入每个属性的名称-值信息，添加以下附加属性：\n\
  \n    • `search-bind-dn`：输入您的 LDAP 主机、目录以及您将进行身份验证的 LDAP 账户的完全限定 DN。例如：\n\n    `CN=account-name,OU=AccountGroup,DC=dc1,DC=dc2,DC=dc3`\n\
  \n    • `search-bind-password`：输入您之前指定的账户名称的密码。\n\n    • `search-filter`：将此属性的值输入为以下内容：\n\
  \n    `(sAMAccountName=%s)`\n\n2.  重新启动应用服务器。\n\n工作原理\n\n也许对应用进行身份验证最高效的方式之一就是使用\
  \ LDAP 账户。使用 LDAP 账户进行身份验证可以为组织内的所有服务器和应用提供单点登录解决方案。LDAP 身份验证还为账户信息提供了单一维护点，同时仍允许各个应用通过角色维护其自身的细粒度安全性。本方案解答列举了在\
  \ GlassFish 应用服务器中设置 LDAP 安全领域所涉及的步骤。不过，您也可以遵循类似的过程在其他应用服务器容器中设置 LDAP 安全领域。\n\n\
  第 15 章 ■ Jakarta 安全性\n\n一旦在应用服务器中设置了 LDAP 身份验证，您就可以配置您的应用来使用它。要配置应用使用 LDAP 身份验证，请在\
  \ `web.xml` 部署描述符中添加以下配置：\n\n```xml\n<login-config>\n    <auth-method>FORM</auth-method>\n\
  \    <realm-name>REALM-NAME</realm-name>\n    <form-login-config>\n        <form-login-page>/faces/login.xhtml</form-login-page>\n\
  \        <form-error-page>/faces/loginError.xhtml</form-error-page>\n    </form-login-config>\n\
  </login-config>\n```\n\n在上述 `web.xml` 的摘录中，`realm-name` 元素应与您在 GlassFish 中创建的 LDAP\
  \ 安全领域的名称相同。`form-login-page` 和 `form-error-page` 的值应分别引用用于登录应用的视图以及登录出错时显示的视图。对\
  \ LDAP 安全领域进行身份验证的方式与方案 15-3 中所述相同。只需调用 `HttpRequest` 对象的 `login` 方法，使用用户通过登录视图提供的凭据进行身份验证即可。\n\
  \n15-7. 在 GlassFish 中配置自定义安全证书\n\n问题\n\n您希望在 GlassFish 环境中使用自定义证书来通过 SSL 保护访问安全。\n\
  \n解决方案\n\n从认证的证书颁发机构获取证书，然后将其安装到 GlassFish 应用服务器容器中。安装完成后，通过使用 SSL 的安全端口路由请求，并强制用户接受安全证书才能继续。要安装从有效证书颁发机构获取的证书，请遵循以下步骤：\n\
  \n1.  将受信任的根证书从您的认证机构复制到您的服务器。在命令行或终端中执行以下命令：\n\n    `keytool –import –alias root\
  \ –keystore keystore_name.keystore –trustcacerts –file trustedcarootcertificate.crt`\n\
  \n2.  接着，导入受信任的证书：\n\n    `keytool –import –alias cert_alias –keystore keystore_name.keystore\
  \ –trustcacerts –file certificate.crt`\n\n3.  在 GlassFish 管理控制台中调整 SSL 设置。要调整设置，请依次进入“配置”\
  \ ➤ “网络配置” ➤ “网络监听器” ➤ `http-listener-2`，以打开安全的 HTTP 监听器页面。打开后，选择\n\n\n\n在 SSL 选项卡中，输入与步骤\
  \ 2 中使用的证书昵称和密钥库相匹配的信息。参见图 15-12。\n\n![](img/index-623_1.png)\n\n第 15 章 ■ Jakarta\
  \ 安全性\n\n***图 15-12.** 修改 SSL 设置*\n\n4.  重启服务器，然后使用以下 URL 安全地访问您的应用程序：\n\n    https://localhost:8181/your_application_context。\n\
  \n■ **注意** 在上述编号列表中，keystore_name.keystore 代表密钥库的名称，而 trustedcarootcertificate.crt\
  \ 和 certificate.crt 代表证书的名称。\n\n工作原理\n\nGlassFish 自带一个适用于测试环境的自签名安全证书。但是，当将 GlassFish\
  \ 用作生产应用程序服务器解决方案时，必须安装来自受信任证书颁发机构的证书，以确保应用程序传输的安全。本方案演示了如何安装用于 SSL 的安全证书，以实现安全传输。\n\
  \n在安装经过验证的证书之前，您需要先获取它。您需要从众多证书颁发机构中选择一个，然后发送一个证书请求，该请求包含来自您的应用程序服务器的密钥。需要创建一个密钥库来生成证书请求。在命令行或终端中执行以下命令来创建密钥库：\n\
  \nkeytool –keysize 2048 –genkey –alias –keyalg RSA –dname \"CN=yourdomain.org,O=company_\n\
  name,L=city,S=state,C=country\" –keypass glassfish_master_password –storepass glassfish_\n\
  master_password –keystore choose_keystore_name.keystore\n\n第 15 章 ■ Jakarta 安全性\n\
  \n密钥库创建完成后，即可生成一个将发送给证书颁发机构的证书签名请求 (CSR)。要生成证书签名请求 (CSR)，请在您的服务器上执行以下命令：\n\nkeytool\
  \ –certreq –alias –keystore chosen_keystore_name.keystore –storepass glassfish_master_\n\
  password –keypass glassfish_master_password –file csrname.csr\n\n■ **注意** 要更改 GlassFish\
  \ 主密码，请在 GlassFish 域停止时执行以下命令：asadmin change-master-password –savemasterpassword=true。\n\
  \n将 CSR 提交给证书颁发机构后，证书颁发机构将返回一个有效的安全证书，您可以将其安装到服务器中。按照本方案解决方案中的步骤将证书安装到 GlassFish\
  \ 中。证书安装完成后，您的服务器将通过证书颁发机构验证为安全，用户在访问您的安全站点时，应在浏览器中看到一条指示此状态的消息（通常是一个锁图标）。\n\n**第\
  \ 16 章**\n\n**并发与批处理**\n\nJakarta 并发工具和批处理 API 包含了用于并发处理任务的标准技术以及批处理应用程序处理的标准规范。\n\
  \n这两个 API 的规模都相当大，并且包含了多年来被各种企业项目广泛使用的成熟解决方案。过去，在 Java EE 应用程序中使用诸如 java.util.concurrent\
  \ 和 java.lang.Thread 之类的 Java SE 并发工具一直存在问题，因为应用程序服务器容器无法与这些资源协同工作。java.util.concurrent\
  \ API 的扩展使应用程序服务器和其他容器能够识别这些并发资源。这些扩展允许企业应用程序通过使用企业环境中可用的 java.util.concurrent.ExecutorService\
  \ 资源来适当地利用异步操作。\n\n用于批处理的 API 为开发人员提供了精细化的体验，使他们能够以多种不同的方式生成和处理批处理应用程序。企业应用程序不再需要使用自定义类来执行批处理，从而可以遵循一个被采纳的标准。\n\
  \n如前所述，这些附加 API 的范围非常广泛，本章不会试图涵盖每个特性。然而，本章中包含的方案应能提供足够的信息，使开发人员能够使用每个 API 中一些最常用的部分来启动和运行。有关\
  \ Jakarta 并发细节的更深入信息，请参考位于 [`jakarta.ee/specifications/concurrency/`](https://jakarta.ee/specifications/concurrency/)\
  \ 的 JavaDoc。本章的方案适用于 Eclipse GlassFish。其他符合 Jakarta EE 规范的应用程序服务器，如 Open Liberty\
  \ 和 WildFly，也包含针对这些问题的类似解决方案。\n\n16-1. 在应用程序服务器中创建用于异步处理任务的资源\n\n问题\n\n您希望在应用程序服务器环境中注册一个\
  \ ManagedExecutorService 资源。\n\n© Josh Juneau 和 Tarun Telang 2022\nJ. Juneau 和 T.\
  \ Telang，《Java EE 到 Jakarta EE 10 实战》[，https://doi.org/10.1007/978-1-4842-8079-9_16](https://doi.org/10.1007/978-1-4842-8079-9_16#DOI)\n\
  \n![](img/index-626_1.png)\n\n第 16 章 ■ 并发与批处理\n\n解决方案 #1\n\n使用 GlassFish 的 asadmin\
  \ create-managed-executor-service 工具创建一个新的 ManagedExecutorService。要使用诸如 reporter\
  \ 任务之类的并发工具，必须将应用程序服务器配置为使用 ManagedExecutorService。要在 GlassFish 中创建 ManagedExecutorService，请在命令提示符下运行以下命令：\n\
  \n<path-to-glassfish>/bin/asadmin create-managed-executor-service concurrent/BatchExecutor\
  \ 您应该会看到如图 16-1 所示的输出。\n\n***图 16-1.** 在 GlassFish 中创建 ManagedExecutorService*\n\
  \n在上述命令行操作中，正在创建的 ManagedExecutorService 的名称为 concurrent/BatchExecutor。但是，可以更改此名称以更好地适应应用程序。要查看\
  \ create-managed-executor-service 命令的所有可用选项，请使用 --help 标志。图 16-2 显示了执行此操作的结果。\n\n\
  ![](img/index-627_1.png)\n\n第 16 章 ■ 并发与批处理\n\n***图 16-2.** 使用 create-managed-executor-service\
  \ 命令的 --help 选项的结果*\n\n解决方案 #2\n\n使用 GlassFish 管理控制台创建 ManagedExecutorService。为此，请成功验证管理控制台的身份，然后使用左侧树形菜单导航到“并发资源”➤“托管执行器服务”管理面板（参见图\
  \ 16-3）。\n\n![](img/index-628_1.jpg)\n![](img/index-628_2.jpg)\n\n第 16 章 ■ 并发与批处理\n\
  \n***图 16-3.** GlassFish 托管执行器服务面板*\n\n打开面板后，单击“新建”按钮创建一个新服务。这将打开“新建托管执行器服务”面板，您需要在此面板中为您的服务填写一个\
  \ JNDI 名称（参见图 16-4）。\n\n***图 16-4.** 新建托管执行器服务面板*\n\n第 16 章 ■ 并发与批处理\n\n此面板提供了相当多的选项来创建服务。但是，唯一必需的选项是\
  \ JNDI 名称，因为所有其他选项都填充了默认值。指定的 JNDI 名称应遵循 concurrent/YourExecutorServiceName 的格式，其中\
  \ YourExecutorServiceName 是您选择的自定义名称。\n\n工作原理\n\nManagedExecutorService 提供了生成由应用程序服务器管理的异步任务的能力。尽管有一个默认的\
  \ ManagedExecutorService 可供使用，但应用程序服务器管理员可以在应用程序服务器内创建可由一个或多个应用程序使用的 ManagedExecutorService\
  \ 资源，这与 Java 消息服务 (JMS) 主题或队列非常相似。\n\n\n\n要创建服务，请在命令提示符下执行 `asadmin create-managed-executor-service`\
  \ 命令，并传入用于标识服务的名称。有许多选项可用于以不同方式自定义服务。例如，可以将服务配置为允许任务运行指定的时间，可以配置线程池等，从而生成最符合应用程序需求的\
  \ `ManagedExecutorService`。\n\n对于希望在 GlassFish 管理控制台内操作的用户，有几个管理面板可以更轻松地创建和管理并发资源。**Managed\
  \ Executor Service** 面板可用于创建新的应用服务器 `ManagedExecutorService` 资源，以及管理已有的资源。\n\n■\
  \ **注意** GlassFish 和其他符合 Jakarta EE 规范的应用服务器都附带一个预配置的默认 `ManagedExecutorService`\
  \ 资源，其名称为 `java:comp/DefaultManagedExecutorService`。\n\n16-2\\. 配置和创建报告任务\n\n问题\n\
  \n您希望创建一个长时间运行的任务，该任务将与数据库通信并最终生成报告。\n\n解决方案\n\n一旦配置好应用服务器并创建了 `ManagedExecutorService`，就可以编写应用程序来使用这个新创建的服务。在应用程序中，您可以选择通过\
  \ XML 配置应用程序以使用 `ManagedExecutorService`，或者使用 `@Resource` 注解来注入该资源。要通过 XML 进行配置，请向\
  \ Web 部署描述符中添加一个 `<resource-env-ref>` 元素。在这种情况下，您需要配置一个类型为 `*jakarta.enterprise.concurrent.ManagedExecutorService*`\
  \ 的资源，如下面的 `/webapp/WEB-INF/web.xml` 摘录所示：\n\n<resource-env-ref>\n\n<description>\n\
  \n此执行器用于应用程序的报告任务。此执行器具有以下要求：\n\n运行位置：不适用\n\n上下文信息：本地命名空间\n\n</description>\n\n\
  <resource-env-ref-name>\n\nconcurrent/BatchExecutor\n\n</resource-env-ref-name>\n\
  \n<resource-env-ref-type>\n\njakarta.enterprise.concurrent.ManagedExecutorService\n\
  \n</resource-env-ref-type>\n\n</resource-env-ref>\n\n在 XML 配置中，该资源被分配了一个引用名称 `concurrent/BatchExecutor`，但您可以根据应用程序的需要来命名该引用。如果您更愿意使用注解，则可以指定以下\
  \ `@Resource` 注解，将 `ManagedExecutorService` 注入到类中使用。稍后您将看到一个使用示例：\n\n@Resource(name\
  \ = \"concurrent/BatchExecutor\")\n\nManagedExecutorService mes;\n\n配置完成后，您可以创建一个报告任务类，该类实现了\
  \ `Runnable` 接口，并负责运行实际的报告。以下类 `org.jakartaeerecipe.chapter16.recipe16_02.ReporterTask`\
  \ 就是这样一个类的示例：\n\npackage org.jakartaeerecipe.chapter16.recipe16_02;\n\nimport java.util.List;\n\
  \nimport jakarta.ejb.EJB;\n\nimport org.jakartaeerecipe.jpa.entity.Book;\n\nimport\
  \ org.jakartaeerecipe.jpa.entity.BookAuthor;\n\nimport org.jakartaeerecipe.jpa.session.BookAuthorFacade;\n\
  \nimport org.jakartaeerecipe.jpa.session.BookFacade;\n\npublic class ReporterTask\
  \ implements Runnable {\n\nString reportName;\n\n@EJB\n\nprivate BookAuthorFacade\
  \ bookAuthorFacade;\n\n@EJB\n\nprivate BookFacade bookFacade;\n\npublic ReporterTask(String\
  \ reportName) {\n\nthis.reportName = reportName;\n\n}\n\npublic void run() {\n\n\
  // 运行指定的报告\n\nif (\"AuthorReport\".equals(reportName)) {\n\nrunAuthorReport();\n\
  \n} else if (\"BookReport\".equals(reportName)) {\n\nrunBookReport();\n\n}\n\n}\n\
  \n/**\n\n* 将作者列表打印到系统日志。\n\n*/\n\npublic void runAuthorReport() {\n\nList<BookAuthor>\
  \ authors = bookAuthorFacade.findAuthor();\n\nSystem.out.println(\"作者列表报告\");\n\n\
  System.out.println(\"=====================\");\n\nfor (BookAuthor author : authors)\
  \ {\n\nSystem.out.println(author.getFirst() + \" \" + author.getLast());\n\n}\n\n\
  }\n\n/**\n\n\n\n* 将书籍列表打印到文件\n\n*/\n\nvoid runBookReport() {\n\nSystem.out.println(\"\
  正在查询数据库\");\n\nPath reportFile = Paths.get(\"BookReport.txt\");\n\ntry (BufferedWriter\
  \ writer = Files.newBufferedWriter(\n\nreportFile, Charset.defaultCharset())) {\n\
  \nFiles.deleteIfExists(reportFile);\n\nreportFile = Files.createFile(reportFile);\n\
  \nwriter.append(\"书籍列表报告\");\n\nwriter.newLine();\n\nwriter.append(\"===================\"\
  );\n\nwriter.newLine();\n\nList<Book> books = bookFacade.findAllBooks();\n\nfor\
  \ (Book book : books) {\n\nwriter.append(book.getTitle());\n\nwriter.newLine();\n\
  \n}\n\nwriter.flush();\n\n} catch (IOException exception) {\n\nSystem.out.println(\"\
  写入文件时出错\");\n\n}\n\n}\n\n}\n\n最后，该报告需要由在 `web.xml` 中配置的 `ManagedExecutorService`\
  \ 调用。在此示例中，`ManagedExecutorService` 被注入到一个 servlet 中，然后用于调用报告，如下代码所示：\n\n@WebServlet(name\
  \ = \"BookReportServlet\", urlPatterns = {\"/BookReportServlet\"}) public class\
  \ ReportServlet extends HttpServlet implements Servlet { // 缓存我们的执行器\n\n实例\n\n@Resource(name\
  \ = \"concurrent/BatchExecutor\")\n\nManagedExecutorService mes;\n\nprotected void\
  \ processRequest(HttpServletRequest request, HttpServletResponse response)\n\nthrows\
  \ ServletException, IOException {\n\nresponse.setContentType(\"text/html;charset=UTF-8\"\
  );\n\n第 16 章 ■ 并发与批处理\n\ntry (PrintWriter out = response.getWriter()){\n\nout.println(\"\
  \"\"\n\n<html>\n\n<head>\n\n<title>书籍报告调用器</title>\n\n</head>\n\n<body>\n\n<h2>此\
  \ servlet 启动书籍报告任务。请\n\n在服务器日志中查看结果。</h2> <br />\n\n网页更新并非异步运行，但\n\n报告生成将独立处理。\n\
  \n<br/><br/> \"\"\");\n\nReporterTask reporterTask = new ReporterTask(\"BookReport\"\
  );\n\nFuture reportFuture = mes.submit(reporterTask);\n\nwhile( !reportFuture.isDone()\
  \ )\n\nout.println(\"正在运行...<BR>\");\n\nif (reportFuture.isDone()){\n\nout.println(\"\
  报告完成\");\n\n}\n\nout.println(\"</body>\");\n\nout.println(\"</html>\");\n\n}\n\n\
  }\n\n...\n\n当访问该 servlet 时，报告任务将被启动，并开始生成结果。\n\n工作原理\n\n创建 `ManagedExecutorService`\
  \ 后，它可以被一个或多个应用程序用于执行并发操作。应用程序必须通过 XML 进行配置，以允许访问应用程序服务器容器中的 `ManagedExecutorService`\
  \ 资源，或者可以通过使用 `@Resource` 注解注入该资源。在本配方的示例中，演示了这两种选项。\n\n出于示例目的，假设使用 `@Resource`\
  \ 注解将服务注入到 servlet 中。\n\n要使用该服务并发运行任务，您必须在实现 `java.util.Runnable` 的单独类中创建任务，以便它可以像标准\
  \ Java 线程一样作为独立进程被调用。在示例中，一个名为 `ReporterTask` 的类实现了 `Runnable`，并且在 `run()` 方法中，报告任务执行我们希望以异步方式运行的任务。在此示例中，从\
  \ `run` 方法内部调用了几个方法。生成的 `Runnable` 类随后可以传递给 `ManagedExecutorService`，以便在应用程序执行其他任务时并发运行。要使用\
  \ `ManagedExecutorService`，请通过 XML 或资源注入将其注册到应用程序中。在本配方的示例中，使用了资源注入，使得 `ManagedExecutorService`\
  \ 在 Java servlet 中可用。要注入资源，请在 `@Resource` 注解中指定其名称：\n\n@Resource(name = \"concurrent/BatchExecutor\"\
  )\n\nManagedExecutorService mes;\n\n第 16 章 ■ 并发与批处理\n\n然后可以通过调用 `submit()` 方法并传递我们想要提交处理的\
  \ `Runnable` 任务实例来调用 `ManagedExecutorService`。在这种情况下，`ReporterTask` 类被实例化，其实例随后被传递给服务，返回一个\
  \ `java.util.concurrent.`\n\n\n\nFuture 对象：\n\n```java\nReporterTask reporterTask\
  \ = new ReporterTask(\"BookReport\");\nFuture reportFuture = mes.submit(reporterTask);\n\
  ```\n\n提交后，可以定期检查返回的 Future 对象，通过调用其 `isDone()` 方法来判断任务是否仍在运行或已完成。可以通过调用 `cancel()`\
  \ 方法来取消任务，并通过调用 `isCanceled()` 方法来检查任务是否已被取消。\n\nreporter 任务是一个长时间运行的任务，它会查询数据库以获取生成报告所需的数据。\n\
  \n**16-3. 同时运行多个任务**\n\n**问题**\n\n你需要在应用程序中同时运行两个或更多任务。例如，你正在编写的应用程序需要能够连接数据库，并从两个或多个表中同时检索数据以获得结果。你希望在将结果返回给用户之前，先将这些结果聚合起来。\n\
  \n**解决方案**\n\n创建一个构建器任务，用于并行运行两个不同的任务。每个任务可以从不同的数据源检索数据，最后将数据合并并聚合以形成结果。要使用构建器任务，必须首先按照配方\
  \ 16-1 所述，为应用服务器环境配置一个 `ManagedExecutorService`。配置好资源后，可以通过 XML 或注解来配置应用程序以使用该资源。要使用\
  \ XML 配置，请在 `web.xml` 部署描述符中添加一个 `<resource-env-ref>` 元素。在这种情况下，你需要配置一个类型为 `jakarta.enterprise.concurrent.ManagedExecutorService`\
  \ 的资源，如配方 16-2 中的 `web.xml` 摘录所示，并重复如下：\n\n```xml\n<resource-env-ref>\n    <description>\n\
  \        此执行器用于应用程序的构建器任务。此执行器具有以下要求：\n        运行位置：本地\n        上下文信息：本地命名空间，安全\n\
  \    </description>\n    <resource-env-ref-name>\n        concurrent/BuilderExecutor\n\
  \    </resource-env-ref-name>\n    <resource-env-ref-type>\n        jakarta.enterprise.concurrent.ManagedExecutorService\n\
  \    </resource-env-ref-type>\n</resource-env-ref>\n```\n\n**第 16 章 ■ 并发与批处理**\n\
  \n在此示例中，应用程序中的 `ManagedExecutorService` 资源被配置为与已在应用服务器容器中注册、并通过 JNDI 名称 `concurrent/BuilderExecutor`\
  \ 标识的资源一起工作。如果你更愿意使用注解，则可以指定以下 `@Resource` 注解，将 `ManagedExecutorService` 注入到类中，以便在\
  \ `Runnable` 中使用：\n\n```java\n@Resource(name = \"concurrent/BuilderExecutor\")\n\
  ManagedExecutorService mes;\n```\n\n一旦应用程序配置好与 `ManagedExecutorService` 资源一起工作，你就可以为你希望运行的每个不同任务创建任务类。每个任务类必须实现\
  \ `jakarta.enterprise.concurrent.ManagedTask` 接口。以下代码来自文件 `org.jakartaeerecipe.chapter16.recipe16_03.AuthorTask.java`，展示了任务类应有的样子：\n\
  \n```java\npublic class AuthorTask implements Callable<AuthorInfo>, ManagedTask\
  \ {\n\n    // 按需报告请求的 ID。\n    BigDecimal authorId;\n    AuthorInfo authorInfo;\n\
  \    Map<String, String> execProps;\n\n    public AuthorTask(BigDecimal id) {\n\
  \        this.authorId = id;\n        execProps = new HashMap<>();\n        execProps.put(ManagedTask.IDENTITY_NAME,\
  \ getIdentityName());\n    }\n\n    public AuthorInfo call() {\n        // 查找实体\
  \ bean 并将其返回给客户端。\n        return authorInfo;\n    }\n\n    public String getIdentityName()\
  \ {\n        return \"AuthorTask: AuthorID=\" + authorId;\n    }\n\n    public Map<String,\
  \ String> getExecutionProperties() {\n        return execProps;\n    }\n\n    public\
  \ String getIdentityDescription(Locale locale) {\n        // 使用资源包...\n        return\
  \ \"AuthorTask 异步 EJB 调用器\";\n    }\n\n    @Override\n    public ManagedTaskListener\
  \ getManagedTaskListener() {\n        return new CustomManagedTaskListener();\n\
  \    }\n}\n```\n\n可以实现一个或多个这样的任务类，然后通过使用已在应用服务器容器中注册的 `ManagedExecutorService` 资源，由构建器任务处理它们。以下\
  \ Servlet 使用 `ManagedExecutorService` 来协调两个任务类的调用。在此例中，任务类名称为 `AuthorTask` 和 `AuthorTaskTwo`：\n\
  \n```java\n@WebServlet(name = \"BuilderServlet\", urlPatterns = {\"/builderServlet\"\
  })\npublic class BuilderServlet extends HttpServlet implements Servlet {\n\n   \
  \ // 获取我们的执行器实例。\n    @Resource(name = \"concurrent/BuilderExecutor\")\n    ManagedExecutorService\
  \ mes;\n\n    AuthorInfo authorInfoHome;\n    BookInfo bookInfoHome;\n\n    protected\
  \ void processRequest(HttpServletRequest req, HttpServletResponse resp) throws\n\
  \            ServletException, IOException {\n        try {\n            PrintWriter\
  \ out = resp.getWriter();\n\n            // 创建任务实例\n            ArrayList<Callable<AuthorInfo>>\
  \ builderTasks = new ArrayList<Callable<AuthorInfo>>();\n            builderTasks.add(new\
  \ AuthorTask(BigDecimal.ONE));\n            builderTasks.add(new AuthorTaskTwo(BigDecimal.ONE));\n\
  \n            // 提交任务并等待。\n            List<Future<AuthorInfo>> taskResults = mes.invokeAll(builderTasks);\n\
  \n            ArrayList<AuthorInfo> results = new ArrayList<AuthorInfo>();\n   \
  \         for(Future<AuthorInfo> result: taskResults){\n                results.add(result.get());\n\
  \                out.write(\"处理结果...\");\n            }\n\n        } catch (InterruptedException|ExecutionException\
  \ ex) {\n            Logger.getLogger(BuilderServlet.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n        }\n    }\n    ...\n}\n```\n\n**工作原理**\n\n创建 `ManagedExecutorService`\
  \ 后，它可以被一个或多个应用程序用来执行并发操作。必须通过 XML 配置应用程序以允许访问应用服务器容器中的 `ManagedExecutorService`\
  \ 资源，或者可以通过使用 `@Resource` 注解来注入该资源。在本配方的示例中，演示了这两种选项。\n\n对于使用 Servlet 的示例，假设使用了\
  \ `@Resource` 注解将服务注入到 Servlet 中，并且没有进行 XML 配置。\n\n为了通过 `ManagedExecutorService`\
  \ 以异步方式协调任务的处理，需要处理的任务应包含在单独的类中，或者是同一任务类的多个实例。每个任务类都应实现 `java.util.concurrent.Callable<V>`\
  \ 和 `jakarta.enterprise.concurrent.ManagedTask` 接口。任务类应包含一个构造函数，允许调用者传递实例化对象所需的参数，并应实现一个\
  \ `call()` 方法，该方法返回构建报告所需的信息给客户端。然后，可以通过 `ManagedExecutorService` 调用两个或更多这样的任务类，以便将所有结果处理成所需的格式。\n\
  \n为了组装要处理的任务，创建一个 `ArrayList<Callable>`，并将每个任务的实例添加到该数组中。在示例中，数组被命名为 `builderTasks`，并将两个不同任务类型的实例添加到该数组中：\n\
  \n```java\nArrayList<Callable<AuthorInfo>> builderTasks = new ArrayList<Callable<AuthorInfo>>();\n\
  builderTasks.add(new AuthorTask(BigDecimal.ONE));\nbuilderTasks.add(new AuthorTaskTwo(BigDecimal.ONE));\n\
  ```\n\n**第 16 章 ■ 并发与批处理**\n\n接下来，将构建好的数组传递给 `ManagedExecutorService`，返回一个 `List<Future<Object>>`，然后可以用它来处理结果：\n\
  \n```java\nList<Future<AuthorInfo>> results = mes.invokeAll(builderTasks);\nAuthorInfo\
  \ authorInfo = (AuthorInfo) results.get(0).get();\n// 处理结果\n```\n\n\n\n利用此技术，可以并发处理一系列任务，并返回结果，这些结果随后可用于制定响应。在此示例中，通过调用两个任务类并返回查询信息的结果来构建一份报告。同样的技术可应用于一系列不同的任务，使应用程序能够在一个中心位置处理多次任务调用的结果。\n\
  \n16-4. 在任务中使用事务\n\n问题\n\n你希望在应用程序任务中管理一个事务，该任务将使用 `ManagedExecutorService` 资源进行处理。\n\
  \n解决方案\n\n利用 `jakarta.transaction.UserTransaction` 来创建和管理事务。以下示例演示了如何在将由 `ManagedExecutorService`\
  \ 处理的任务类中使用 `UserTransaction` 接口来划分事务：\n\n```java\npublic class UserTransactionTask\
  \ implements Runnable {\n\n    @Resource\n    SessionContext ctx;\n\n    @EJB\n\
  \    private BookAuthorFacade bookAuthorFacade;\n\n    UserTransaction ut = ctx.getUserTransaction();\n\
  \n    public void run() {\n        try {\n            // 开始一个事务\n            ut.begin();\n\
  \            List<BookAuthor> authors = bookAuthorFacade.findAuthor();\n       \
  \     for (BookAuthor author : authors) {\n                // 执行某些操作\n         \
  \   }\n            ut.commit();\n        } catch (NotSupportedException | SystemException\
  \ | RollbackException\n                | HeuristicMixedException | HeuristicRollbackException\
  \ ex) {\n            Logger.getLogger(UserTransactionTask.class.getName()).log(Level.SEVERE,\n\
  \                    null, ex);\n        }\n    }\n}\n```\n\n第 16 章 ■ 并发与批处理\n\n\
  然后，可以通过实现如下解决方案，由 `ManagedExecutorService` 处理上述类：\n\n```java\n@WebServlet(name =\
  \ \"UserTransactionServlet\", urlPatterns = {\"/userTransactionServlet\"})\npublic\
  \ class UserTransactionServlet extends HttpServlet implements Servlet {\n\n    @Resource(name\
  \ = \"concurrent/BatchExecutor\")\n    ManagedExecutorService mes;\n\n    protected\
  \ void processRequest(HttpServletRequest request, HttpServletResponse response)\n\
  \            throws ServletException, IOException {\n        response.setContentType(\"\
  text/html;charset=UTF-8\");\n        PrintWriter out = response.getWriter();\n \
  \       try {\n            // servlet 输出...\n            UserTransactionTask utTask\
  \ = new UserTransactionTask();\n            Future utFuture = mes.submit(utTask);\n\
  \            while (!utFuture.isDone())\n                out.println(\"运行中...<BR>\"\
  );\n            if (utFuture.isDone()) {\n                out.println(\"报告完成\");\n\
  \            }\n            out.println(\"</body>\");\n            out.println(\"\
  </html>\");\n        } finally {\n            out.close();\n        }\n    }\n}\n\
  ```\n\n工作原理\n\n在某些情况下，应用程序可能需要在将通过 `ManagedExecutorService` 处理的任务中进行事务协调。可以通过使用\
  \ `jakarta.transaction.UserTransaction` 接口在这些任务中执行事务。可以通过调用 `SessionContext.getUserTransaction()`\
  \ 方法获取 `UserTransaction`。可以使用 `@Resource` 注解将 `SessionContext` 资源注入到 bean 中。\n\n\
  一旦获取了 `UserTransaction`，就可以通过调用 `UserTransaction` 的 `begin` 方法来启动事务。可以通过调用 `UserTransaction`\
  \ 的 `commit()` 方法来结束事务。该事务涵盖了在调用 `begin` 之后、调用 `commit` 之前执行的所有任务。如果事务中的某个任务失败，则事务中执行的所有工作都将停止，并且值将恢复到事务开始之前的状态。这有助于确保任务所需的所有流程在成功时完成，或在失败时回滚。\n\
  \n16-5. 在计划时间运行并发任务\n\n问题\n\n你正在使用的应用程序需要能够按时间间隔定期执行任务。\n\n第 16 章 ■ 并发与批处理\n\n解决方案\n\
  \n使用 `ManagedScheduledExecutorService` 在应用程序中创建计划任务。在应用程序可以使用该服务之前，必须在应用程序服务器容器中创建它。要在\
  \ GlassFish 中创建 `ManagedScheduledExecutorService` 实例，请从命令行发出以下命令：\n\n\n\nbin/asadmin\
  \ create-managed-scheduled-executor-service concurrent/name-of-service\n\n在此命令中，name-of-service\
  \ 可以是您选择的任意名称。create-managed-scheduled-executor-service 命令有许多可指定的选项。要查看并详细了解每个选项，请在命令后使用\
  \ `--help` 标志调用命令帮助，而不是提供要创建的服务名称。或者，您也可以使用应用服务器资源（例如 GlassFish 管理控制台）来创建该服务。\n\n\
  一旦在容器内创建了该服务，应用程序即可使用它。要使用此类服务，必须通过 XML 或注解来配置环境。若要使用 XML 配置，请在 `web.xml` 部署描述符中添加一个\
  \ `<resource-env-ref>` 元素。在这种情况下，您需要配置一个类型为 `jakarta.enterprise.concurrent.ManagedScheduledExecutorService`\
  \ 的资源，如下面的 `web.xml` 摘录所示：\n\n<resource-env-ref>\n<description>定期向服务器日志打印警报（如有必要）</description>\n\
  <resource-env-ref-name>\nconcurrent/__defaultScheduledManagedExecutorService\n</resource-env-ref-name>\n\
  <resource-env-ref-type>\njakarta.enterprise.concurrent.ManagedScheduledExecutorService\n\
  </resource-env-ref-type>\n</resource-env-ref>\n\n如果您希望使用注解而非 XML，则可以在客户端代码中使用 `@Resource`\
  \ 注解来注入 `ManagedScheduledExecutorService`，如下所示。在这种情况下，注入的资源引用了一个由名称 `concurrent/__defaultManagedScheduledExecutorService`\
  \ 标识的 `ManagedScheduledExecutorService`：\n\n@Resource(name=\"concurrent/ScheduledAlertExecutor\"\
  )\nManagedScheduledExecutorService mes;\n\n要编写您希望调度的任务，请创建一个实现 `Runnable` 的 Java\
  \ 类。这样，该类将包含一个 `run` 方法，每次启动调度任务时都会调用该方法。\n\n以下示例演示了如何构建一个可用于日志记录的任务。在此示例中，`BookAuthor`\
  \ 实体被定期查询，以确定是否有新作者添加到数据库中：\n\npublic class ScheduledLoggerExample implements Runnable\
  \ {\n    CreateConnection createConn = null;\n\n    @Override\n    public void run()\
  \ {\n        queryAuthors();\n    }\n\n    public void queryAuthors(){\n       \
  \ createConn = new CreateConnection();\n        String qry = \"select object(o)\
  \ from BookAuthor o\";\n        createConn.loadProperties();\n        try (Connection\
  \ conn = createConn.getConnection();\n             Statement stmt = conn.createStatement();\n\
  \             ResultSet rs = stmt.executeQuery(qry);) {\n            while (rs.next())\
  \ {\n                // 如果是新作者，则发出警报\n            }\n        } catch (SQLException\
  \ e) {\n            e.printStackTrace();\n        }\n    }\n}\n\n要定期调用该任务，请使用 `ManagedScheduledExecutorService`\
  \ 资源。以下 JSF 托管 Bean 类演示了如何调用此类服务：\n\n@Named\npublic class ScheduledTaskClient {\n\
  \    Future alertHandle = null;\n\n    @Resource(name=\"concurrent/__defaultManagedScheduledExecutorService\"\
  )\n    ManagedScheduledExecutorService mes;\n\n    public void alertScheduler()\
  \ {\n        ScheduledAuthorAlert ae = new ScheduledAuthorAlert();\n        alertHandle\
  \ = mes.scheduleAtFixedRate(\n            ae, 5L, 5L, TimeUnit.MINUTES);\n     \
  \   FacesMessage facesMsg = new FacesMessage(FacesMessage.SEVERITY_INFO,\n     \
  \       \"任务已调度\", \"任务已调度\");\n        FacesContext.getCurrentInstance().addMessage(null,\
  \ facesMsg);\n    }\n}\n\n**工作原理**\n\n要调度任务在特定时间运行，请使用 `jakarta.concurrent.ManagedScheduledExecutorService`\
  \ 接口。该接口扩展了 `java.util.concurrent.ScheduledExecutorService` 和 `jakarta.enterprise.concurrent.ManagedExecutorService`\
  \ 接口。\n\n`ManagedScheduledExecutorService` 可用于根据指定的调度计划执行 `Runnable` 任务。\n\n如前所述，`ManagedScheduledExecutorService`\
  \ 可用于调度 `Runnable` 任务。也就是说，任何实现了 `java.lang.Runnable` 的类都可以通过该服务被调用。每次启动任务时，都会调用任务类\
  \ `run` 方法中包含的代码。在本配方的示例中，`run` 方法执行了该类中的另一个方法，该方法用于查询实体并对结果执行某些操作。\n\n要使用 `ManagedScheduledExecutorService`，可以在应用服务器容器内创建一个。这可以通过执行\
  \ `asadmin create-managed-scheduled-executor-service` 命令来完成，如本配方的示例所示。然而，任何符合 Jakarta\
  \ EE 8 规范的应用服务器都应包含一个默认的 `ManagedScheduledExecutorService` 供使用。一旦在应用服务器中创建了该资源，应用程序就可以使用它。为了使应用程序能够访问该服务，可以使用\
  \ `web.xml` 部署描述符中的 XML 配置，或者使用 `@Resource` 注解来注入该资源。在本配方的示例中，两种技术都有演示。不过，在用于启动示例任务的类中，使用了\
  \ `@Resource` 注解来注入应用服务器的默认 `ManagedScheduledExecutorService`，该服务可通过名称 `concurrent/__defaultManagedScheduledExecutorService`\
  \ 进行标识：\n\n@Resource(name=\"concurrent/__defaultManagedScheduledExecutorService\"\
  )\nManagedScheduledExecutorService mes;\n\n要调度任务，请创建任务类的一个实例，然后将该实例传递给 `ManagedScheduledExecutorService`\
  \ 的某个调度方法，这些方法通过 `ScheduledExecutorService` 接口提供。可用于调度任务的方法如表 16-1 所示。\n\n***表 16-1.**\
  \ ScheduledExecutorService 方法*\n\n| **方法** | **描述** |\n| --- | --- |\n| schedule(Callable<V>\
  \ callable, long delay, TimeUnit unit) | 创建并执行一个 `ScheduledFeature` 对象。该对象在指定的延迟时间后可用。\
  \ |\n| schedule(Runnable command, long delay, TimeUnit unit) | 创建并执行一个一次性任务，该任务在指定的延迟时间后可用。\
  \ |\n| scheduleAtFixedRate(Runnable command, long initialDelay, long period, TimeUnit\
  \ unit) | 创建并执行一个周期性任务，该任务在指定的初始延迟时间后可用。后续执行将在初始延迟后按指定的周期增量进行调度。 |\n| scheduleWithFixedDelay(Runnable\
  \ command, long initialDelay, long delay, TimeUnit unit) | 创建并执行一个周期性任务，该任务在指定的初始延迟时间后可用。后续执行将在每次执行之间按指定的延迟时间进行调度。\
  \ |\n\n在本配方的示例中，调用了 `scheduleAtFixedRate()` 方法，传入了任务类以及五分钟的初始延迟时间，此后任务每五分钟执行一次。\n\
  \n**16-6. 创建线程实例**\n\n**问题**\n\n您的应用程序需要能够在其他任务执行的同时，在后台执行任务的能力。\n\n**解决方案**\n\n\
  通过使用 `ManagedThreadFactory` 资源创建线程实例，以在后台运行任务。\n\n在应用程序可以使用该服务之前，必须在应用服务器容器内创建它。要在\
  \ GlassFish 中创建 `ManagedThreadFactory` 实例，请从命令行发出以下命令：\n\nasadmin create-managed-thread-factory\
  \ concurrent/myThreadFactory\n\n在此命令中，name-of-service 可以是您选择的任意名称。create-managed-thread-factory\
  \ 命令有许多可指定的选项。要查看并详细了解每个选项，请在命令后使用 `--help` 标志调用命令帮助，而不是提供要创建的服务名称。\n\n\n\n要使用 `ManagedThreadFactory`，必须通过\
  \ XML 或注解对环境进行配置。若使用 XML 配置，需在 `web.xml` 部署描述符中添加 `<resource-env-ref>` 元素。此时，你需要配置一个类型为\
  \ `jakarta.enterprise.concurrent.ManagedThreadFactory` 的资源，如下方 `web.xml` 片段所示：\n\
  \n<resource-env-ref>\n\n<description>\n\n</description>\n\n<resource-env-ref-name>\n\
  \nconcurrent/AcmeThreadFactory\n\n</resource-env-ref-name>\n\n<resource-env-ref-type>\n\
  \njakarta.enterprise.concurrent.ManagedThreadFactory\n\n</resource-env-ref-type>\n\
  \n</resource-env-ref>\n\n若使用注解而非 XML 配置，则可通过如下注解注入 `ManagedThreadFactory`：\n\n@Resource(name=\"\
  concurrent/AcmeThreadFactory\");\n\nManagedThreadFactory threadFactory;\n\n在此示例中，`ManagedThreadFactory`\
  \ 将被注入到 Jakarta Enterprise Beans 中，以便在 Jakarta Enterprise Beans 创建或销毁时，通过日志任务将输出打印到服务器日志。以下代码演示了如何创建可供\
  \ `ManagedThreadFactory` 使用的任务：\n\npublic class MessagePrinter implements Runnable\
  \ {\n\n@Override\n\npublic void run() {\n\nprintMessage();\n\n}\n\npublic void printMessage(){\n\
  \nSystem.out.println(\"Here we are performing some work...\");\n\n}\n\n}\n\n要启动线程，需调用\
  \ `ManagedThreadFactory`，该工厂可通过 `@Resource` 注解注入到使用类中。随后可调用 `ManagedThreadFactory`\
  \ 的 `newThread()` 方法来生成新线程，并将线程应处理的 `Runnable` 类实例传递给它。在以下 Servlet 上下文监听器示例中，当线程上下文初始化时，会实例化前面代码清单中列出的\
  \ `Runnable` 类 `MessagePrinter`，并将其传递给 `ManagedThreadFactory` 以生成新线程：\n\npublic\
  \ class ServletCtxListener implements ServletContextListener {\n\nThread printerThread\
  \ = null;\n\n@Resource(name =\"concurrent/AcmeThreadFactory\")\n\nManagedThreadFactory\
  \ threadFactory;\n\n第 16 章 ■ 并发与批处理\n\npublic void contextInitialized(ServletContextEvent\
  \ scEvent) {\n\nMessagePrinter printer = new MessagePrinter();\n\nprinterThread\
  \ = threadFactory.newThread(printer);\n\nprinterThread.start();\n\n}\n\npublic void\
  \ contextDestroyed(ServletContextEvent scEvent) {\n\nsynchronized (printerThread)\
  \ {\n\nprinterThread.interrupt();\n\n}\n\n}\n\n}\n\n工作原理\n\n要在企业应用程序中使用线程，应在应用服务器容器中创建\
  \ `ManagedThreadFactory` 资源，并根据需要在应用程序中使用这些资源。\n\n要在 GlassFish 应用服务器中创建 `ManagedThreadFactory`\
  \ 资源，请在命令提示符下调用 `asadmin create-managed-thread-factory` 命令。调用该命令时，至少应包含资源的所需名称。不过，还可以指定多种不同选项来自定义资源。要了解这些选项的更多信息，请参阅在线文档\
  \ [`jakarta.ee/specifications/concurrency/`](https://jakarta.ee/specifications/concurrency/)。\n\
  \n如示例所述，应用程序可通过在 `web.xml` 部署描述符中配置 XML，或在需要使用资源的类中通过 `@Resource` 注解注入，来使用 `ManagedThreadFactory`\
  \ 资源。一旦资源被注入，即可调用其 `newThread()` 方法来生成新线程。`newThread()` 方法返回一个 `Thread` 实例，随后可根据需要调用该线程实例的方法来使用它。\n\
  \n在本方案的解决方案中，通过调用线程的 `start()` 方法启动线程，当上下文被销毁时，则调用线程的 `interrupt()` 方法。\n\n通过遵循\
  \ `ManagedThreadFactory` API 的使用规范，你的企业应用程序可以使用公认的标准解决方案实现多线程。\n\n16-7. 创建面向项目的批处理流程\n\
  \n问题\n\n\n\n您希望创建一个在后台运行并执行任务的作业。\n\n解决方案\n\n利用 Java 平台批处理应用程序 API 来创建一个处理面向条目处理的作业。面向条目的批处理也称为“块”处理。在此示例中，创建了一个批处理流程，用于从文件中读取文本，对文本进行相应处理，然后写出处理后的文本。首先，构建一个\
  \ XML 文件来定义该作业。此示例的 XML 文件将命名为 `acmeFileProcessor.xml`。我们将在“工作原理”部分逐行解析该文件，并讨论编写作业\
  \ XML 的不同选项。现在，我们先来看一下作业流程的样子。以下代码行来自 `acmeFileProcessor.xml` 文件：\n\n```xml\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n\n<job id=\"myJob\" >\n\n<step id=\"readingStep\"\
  \ >\n\n<chunk item-count=\"2\">\n\n<reader ref=\"acmeReader\"></reader>\n\n<processor\
  \ ref=\"acmeProcessor\"></processor>\n\n</chunk>\n\n</step>\n\n<step id=\"writingStep\"\
  \ >\n\n<chunk item-count=\"1\">\n\n<writer ref=\"acmeWriter\"></writer>\n\n</chunk>\n\
  \n</step>\n\n</job>\n```\n\n该作业中执行了三个任务：`acmeReader`、`acmeProcessor` 和 `acmeWriter`。这三个任务可以与位于\
  \ `src/main/resources/META-INF` 目录下的 `batch.xml` 文件中的 Java 类实现相关联。以下代码展示了 `batch.xml`\
  \ 的内容：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<batch-artifacts\
  \ >\n<ref id=\"acmeReader\" class=\"org.jakartaeerecipe.chapter16.recipe16_07.AcmeReader\"\
  />\n<ref id=\"acmeProcessor\" class=\"org.jakartaeerecipe.chapter16.recipe16_07.AcmeProcessor\"\
  />\n<ref id=\"acmeWriter\" class=\"org.jakartaeerecipe.chapter16.recipe16_07.AcmeWriter\"\
  />\n</batch-artifacts>\n```\n\n接下来，我们来看一下每个类的实现。首先查看以下 `AcmeReader` 类的实现。该类负责读取文件，并为每一行文本创建一个新的\
  \ `WidgetReportItem` 对象：\n\n```java\npackage org.jakartaeerecipe.chapter16.recipe16_07;\n\
  \nimport java.nio.charset.Charset;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
  import java.nio.file.Paths;\nimport java.util.List;\nimport jakarta.batch.api.AbstractItemReader;\n\
  \npublic class AcmeReader extends AbstractItemReader<WidgetReportItem> {\n\n   \
  \ public AcmeReader() {\n    }\n\n    /**\n     * 读取报告行，并将每一行存储到 WidgetReportItem\
  \ 对象中。\n     * 读取完所有行后，返回 null 以触发文件结束。\n     * @return\n     * @throws Exception\n\
  \     */\n    @Override\n    public WidgetReportItem readItem() throws Exception\
  \ {\n        Path file = Paths.get(\"widgetFile.txt\");\n        List<String> fileLines;\n\
  \        Charset charset = Charset.forName(\"US-ASCII\");\n        fileLines = Files.readAllLines(file,\
  \ charset);\n        for(String line:fileLines){\n            return new WidgetReportItem(line);\n\
  \        }\n        return null;\n    }\n}\n```\n\n接下来，我们来看一下 `AcmeProcessor` 类。该类负责相应地处理每个\
  \ `WidgetReportItem`。在此例中，如果对象中包含的文本行含有字符串“Two”，则该行将被添加到一个 `WidgetOutputItem` 对象中（请参见以下\
  \ `WidgetReportItem` 和 `WidgetOutputItem` 的代码）：\n\n```java\npackage org.jakartaeerecipe.chapter16.recipe16_07;\n\
  \nimport jakarta.batch.api.ItemProcessor;\n\npublic class AcmeProcessor implements\
  \ ItemProcessor<WidgetReportItem, WidgetOutputItem> {\n\n    public AcmeProcessor(){}\n\
  \n    /**\n     * 写出所有包含文本 \"Two\" 的行\n     * @param item\n     * @return\n    \
  \ * @throws Exception\n     */\n    @Override\n    public WidgetOutputItem processItem(WidgetReportItem\
  \ item) throws Exception {\n        if(item.getLineText().contains(\"Two\")){\n\
  \            return new WidgetOutputItem(item.getLineText());\n        } else {\n\
  \            return null;\n        }\n    }\n}\n```\n\n最后，我们来看一下 `AcmeWriter` 类的样子。该类负责写出由\
  \ `AcmeProcessor` 处理过的 `WidgetOutputItem` 对象：\n\n```java\npackage org.jakartaeerecipe.chapter16.recipe16_07;\n\
  \nimport java.util.List;\nimport jakarta.batch.api.AbstractItemWriter;\n\npublic\
  \ class AcmeWriter extends AbstractItemWriter<WidgetOutputItem> {\n```\n\n\n@Override\n\
  \npublic void writeItems(List<WidgetOutputItem> list) throws Exception {\n\nfor(WidgetOutputItem\
  \ item:list){\n\nSystem.out.println(\"Write to file:\" + item.getLineText());\n\n\
  }\n\n}\n\n}\n\n第 16 章 ■ 并发与批处理\n\n`WidgetReportItem` 和 `WidgetOutputItem` 对象仅仅是用于保存文本字符串的容器。\n\
  \n以下是 `WidgetReportItem` 的实现；除了名称不同，`WidgetOutputItem` 对象与之完全相同：\n\npackage org.jakartaeerecipe.chapter16.recipe16_07;\n\
  \npublic class WidgetReportItem {\n\nprivate String lineText;\n\npublic WidgetReportItem(String\
  \ line){\n\nthis.lineText = line;\n\n}\n\n/**\n\n* @return the lineText\n\n*/\n\n\
  public String getLineText() {\n\nreturn lineText;\n\n}\n\n/**\n\n* @param lineText\
  \ the lineText to set\n\n*/\n\npublic void setLineText(String lineText) {\n\nthis.lineText\
  \ = lineText;\n\n}\n\n}\n\n当执行此批处理作业时，会读取并处理文本文件，然后将特定的文本行写入系统日志。读取和处理任务作为第一步执行，然后写入作为第二步执行。\n\
  \n工作原理\n\n在 Java EE 批处理应用程序出现之前，组织和个人必须编写自己的自定义程序来处理批处理作业。利用批处理 API，开发人员可以通过结合使用\
  \ XML 定义作业和 Java 编程实现来创建批处理作业。在本节的解决方案中，一个简单的批处理作业从文件中读取文本，使用比较逻辑进行处理，然后输出处理后的文本。这个示例批处理程序很简单，但该\
  \ API 使得编写非常复杂的作业变得容易。\n\n让我们首先从高层次简要了解一下该 API。一个作业由一个或多个步骤组成，每个步骤恰好有一个 `ItemReader`、一个\
  \ `ItemWriter` 和一个 `ItemProcessor`。`JobOperator` 负责启动作业，`JobRepository` 用于维护有关当前正在运行的作业的元数据。作业通过\
  \ XML 定义，`<Job>` 元素是作业定义的根元素。因此，`<Job>` 是基础元素，它包含一个或多个 `<step>` 元素，并且还定义了作业的其他细节，例如作业名称以及是否可重启。作业的每个\
  \ `<step>` 由一个或多个 chunk 或 batchlet 组成。在本节中，涵盖了面向项的处理，每个步骤只有一个 chunk，尽管通常步骤可能包含一个或多个\
  \ chunk。要了解更多关于 batchlet 的信息，请参阅规范或在线文档：\n\n[`jakarta.ee/specifications/batch/2.1/apidocs/jakarta.batch/jakarta/batch/api/`](https://jakarta.ee/specifications/batch/2.1/apidocs/jakarta.batch/jakarta/batch/api/batchlet)\n\
  \n[batchlet](https://jakarta.ee/specifications/batch/2.1/apidocs/jakarta.batch/jakarta/batch/api/batchlet)\n\
  \n正如预期的那样，步骤的每个 chunk 都在 XML 中使用 `<chunk>` 元素定义。`<chunk>` 元素定义了批处理作业的读取器、写入器和处理器模式。一个\
  \ chunk 在事务范围内运行，如果未完成，则可以在检查点重新启动。`<reader>` 元素是 `<chunk>` 的子元素，用于指定该 chunk 的读取器。`<reader>`\
  \ 元素可以使用 `<properties>` 元素接受零个或多个名称/值对属性。`<processor>` 元素也是 `<chunk>` 的子元素，用于指定该\
  \ chunk 的处理器元素。与 `<reader>` 元素一样，`<processor>` 元素可以使用 `<properties>` 元素接受零个或多个名称/值对属性。`<writer>`\
  \ 元素同样是 `<chunk>` 的子元素，用于指定该 chunk 步骤的写入器。同样，与读取器和处理器一样，`<writer>` 元素可以使用 `<properties>`\
  \ 元素接受零个或多个名称/值对属性。\n\n作业的 XML 配置位于一个 XML 文件中，该文件应与其所属的批处理作业同名。此文件应位于名为 `batch-jobs`\
  \ 的文件夹内，而该文件夹又位于 `META-INF` 文件夹中。一个名为 `batch.xml` 的 XML 文件也应位于 `META-INF` 文件夹中。此文件包含项读取器、写入器和处理器元素的映射，使用\
  \ `<ref>` 元素并将项名称映射到 Java 实现类：\n\n<batch-artifacts >\n\n<ref id=\"acmeReader\" class=\"\
  org.jakartaeerecipe.chapter16.recipe16_07.AcmeReader\"/>\n\n<ref id=\"acmeProcessor\"\
  \ class=\"org.jakartaeerecipe.chapter16.recipe16_07.\n\nAcmeProcessor\"/>\n\n<ref\
  \ id=\"acmeWriter\" class=\"org.jakartaeerecipe.chapter16.recipe16_07.AcmeWriter\"\
  />\n\n</batch-artifacts>\n\n实现类应扩展抽象类（读取器和写入器）或实现接口（处理器）。`ItemReader` 实现类，在本例中为\
  \ `AcmeReader`，扩展了 `AbstractItemReader` 并接受一个对象，读取的项将存储到该对象中。在本节的示例中，该对象类名为 `WidgetReportItem`。因此，该类应实现\
  \ `readItem()` 方法，该方法负责执行读取操作。该方法应返回读取项所存储到的对象，或者在没有更多项可读取时返回 `null`：\n\npublic\
  \ class AcmeReader extends AbstractItemReader<WidgetReportItem> {\n\n...\n\n@Override\n\
  \npublic WidgetReportItem readItem() throws Exception {\n\nPath file = Paths.get(\"\
  widgetFile.txt\");\n\nList<String> fileLines;\n\nCharset charset = Charset.forName(\"\
  US-ASCII\");\n\nfileLines = Files.readAllLines(file, charset);\n\nfor(String line:fileLines){\n\
  \nreturn new WidgetReportItem(line);\n\n}\n\nreturn null;\n\n}\n\n...\n\n`ItemProcessor`\
  \ 类实现，在本例中为 `AcmeProcessor`，负责为 chunk 执行处理操作，它应实现 `ItemProcessor` 接口，同时接受包含已读取项的对象和将存储已处理项的对象。`ItemProcessor`\
  \ 实现类应实现 `processItem` 方法，该方法负责执行处理操作。\n\n`ItemWriter` 类实现，在本例中为 `AcmeWriter`，负责为\
  \ chunk 执行写入操作。该类实现应扩展 `AbstractItemWriter` 类，并接受将写入已处理项的对象。此实现必须包含 `writeItems`\
  \ 方法，该方法负责执行写入操作。\n\n正如本章引言中提到的，Jakarta 批处理 API 非常详细，本节仅浅显地介绍了如何编写批处理作业。\n\n**第\
  \ 17 章**\n\n**Jakarta NoSQL**\n\n为云构建的微服务和应用程序有时会受益于非中心化数据库，而许多最常用的数据库都是 NoSQL 数据库。NoSQL\
  \ 意为“不仅仅是 SQL”，此类数据库不遵循传统的关系型数据库管理系统（RDBMS）模型。Jakarta NoSQL 是一项规范，旨在提供标准化的 Java\
  \ API，用于将基于 Java 的应用程序与一些流行的 NoSQL 数据库连接起来。有关更多详细信息，请访问项目网站：[`jakarta.ee/`](https://jakarta.ee/specifications/nosql/)\n\
  \n[specifications/nosql/](https://jakarta.ee/specifications/nosql/)。本章将预览 Jakarta\
  \ NoSQL 规范，该规范包含两层：\n\n1.  *通信 API*：一个针对大多数知名 NoSQL 数据库的驱动程序，即 Jakarta NoSQL 数据库驱动程序。（要了解更多信息，请参考\
  \ [https://](https://github.com/eclipse/jnosql-communication-driver)\n[github.com/eclipse/jnosql-\
  \ communication- driver](https://github.com/eclipse/jnosql-communication-driver)。）\n\
  \n2.  *映射 API*：一个使用注解和 CDI 将 Java 集成到 NoSQL 数据库的层。它还与其他 Jakarta EE 技术（如 Bean 验证等）集成。（要了解更多信息，请参考\
  \ [`github.com/`](https://github.com/eclipse/jnosql-mapping-extension)\n\n\n\n[eclipse/jnosql-mapping-extension](https://github.com/eclipse/jnosql-mapping-extension)\
  \ 通信 API 由多个模块组成，用于处理多种 NoSQL 数据库类型，例如 ArangoDB、Cassandra、Couchbase、DynamoDB、Elasticsearch、Hazelcast、HBase、Infinispan、Memcached、MongoDB、OrientDB、RavenDB、Redis、Riak\
  \ 和 Solr。\n\n本章不会深入探讨这些 API 的功能，而是简要概述如何将 Jakarta NoSQL 与最广泛使用的 NoSQL 数据库之一 MongoDB\
  \ 结合使用。此外，还会简要介绍键值型数据库（如 Hazelcast）的使用。\n\n■ **注意** MongoDB 是一个文档数据库，了解这一点很有帮助：在使用文档数据库时，我们指的是数据集合。文档数据库中的集合类似于关系型数据库中的表。要了解更多关于\
  \ MongoDB 的信息，请参考在线文档：[`docs.mongodb.com/manual/`](https://docs.mongodb.com/manual/)\n\
  \n本章将涵盖使用 Jakarta NoSQL 规范的一些高级基础知识。由于该规范并非 Jakarta EE 10 版本的一部分，其部分内容在纳入 Jakarta\
  \ EE 平台之前可能会有所变更。\n\n© Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang,\
  \ *Java EE 到 Jakarta EE 10 实战*[, https://doi.org/10.1007/978-1-4842-8079-9_17](https://doi.org/10.1007/978-1-4842-8079-9_17#DOI)\n\
  \n第 17 章 ■ Jakarta NoSQL\n\n17-1. 配置 Jakarta NoSQL\n\n问题\n\n您希望将 Jakarta EE 应用程序配置为使用\
  \ NoSQL 数据库，而不是传统的关系型数据库管理系统。\n\n解决方案\n\n根据您希望使用的 NoSQL 数据库类型，向项目中添加相应的依赖项。接下来，创建一个类来加载数据库并使其在应用程序中可用。在本示例中，将使用\
  \ MongoDB 配置一个文档数据库。\n\n使用 Jakarta NoSQL 所需的第一个依赖项称为 Mapping Extensions，它是核心 API。\n\
  \n■ **注意** 请参考 Artemis 文档，地址为：[`github.com/eclipse/jnosql-mapping-extension`](https://github.com/eclipse/jnosql-mapping-extension)\n\
  \n<dependency>\n\n<groupId>jakarta.nosql.mapping</groupId>\n\n<artifactId>mapping-core</artifactId>\n\
  \n<version>1.0.0-b3</version>\n\n</dependency>\n\n还需要与所使用的数据库类型相关的`jakarta.nosql.mapping`依赖项。共有三种此类依赖项：\n\
  \n• 文档型（Document）\n• 键值型（Key-value）\n• 列型（Column）\n\n接下来，需要将数据库类型的 API 添加到项目中。以下摘录展示了每个\
  \ API 的 Maven 依赖项。根据项目中使用的 NoSQL 数据库类型，只需使用以下依赖项之一：\n\n<--mapping-document -->\n\
  \n<dependency>\n\n<groupId>jakarta.nosql.mapping</groupId>\n\n<artifactId>mapping-document</artifactId>\n\
  \n<version>1.0.0-b3</version>\n\n</dependency>\n\n<!-- mapping-key-value -->\n\n\
  <dependency>\n\n<groupId>jakarta.nosql.mapping</groupId>\n\n<artifactId>mapping-key-value</artifactId>\n\
  \n<version>1.0.0-b3</version>\n\n</dependency>\n\n<!-- mapping-column -->\n\n第 17\
  \ 章 ■ Jakarta NoSQL\n\n<dependency>\n\n<groupId>jakarta.nosql.mapping</groupId>\n\
  \n<artifactId>mapping-column</artifactId>\n\n<version>1.0.0-b3</version>\n\n</dependency>\n\
  \n支持大多数 NoSQL 数据库需要一个驱动程序依赖项，该依赖项由 Eclipse Jakarta NoSQL 提供。根据所使用的数据库类型，需要将正确的驱动程序引入项目。每个驱动程序的列表位于\
  \ GitHub 上：[`github.com/eclipse/jnosql-communication-driver`](https://github.com/eclipse/jnosql-communication-driver)\n\
  \n在以下 POM 摘录中，使用了 MongoDB 驱动程序：\n\n<dependency>\n\n<groupId>jakarta.nosql.communication</groupId>\n\
  \n<artifactId>communication-document</artifactId>\n\n<version>1.0.0-b3</version>\n\
  \n</dependency>\n\n<dependency>\n\n<groupId>org.eclipse.jnosql.communication</groupId>\n\
  \n<artifactId>mongodb-driver</artifactId>\n\n<version>1.0.0-b3</version>\n\n</dependency>\n\
  \n最后，通过 CLASSPATH 上的属性文件或硬编码值提供适当的配置。配置应包括主机名、端口号，可能还包括凭据。在本例中，通过类中的硬编码值来配置数据库。在以下源代码中，使用名为`DocumentCollectionManagerProducer`的类来配置数据库并生成一个`DocumentCollectionManager`，该管理器可用于处理数据：\n\
  \npackage org.jakarateerecipe.chapter17;\n\nimport jakarta.enterprise.context.ApplicationScoped;\n\
  \nimport jakarta.enterprise.inject.Produces;\n\nimport jakarta.nosql.Settings;\n\
  \nimport jakarta.nosql.document.DocumentCollectionManagerFactory;\n\nimport jakarta.nosql.document.DocumentConfiguration;\n\
  \nimport org.eclipse.jnosql.communication.mongodb.document.MongoDBDocumentConfiguration;\n\
  \nimport java.util.Collections;\n\nimport java.util.Map;\n\n@ApplicationScoped\n\
  \npublic class DocumentCollectionManagerProducer {\n\n    // 设置数据库名称\n    private\
  \ static final String COLLECTION = \"acmepools\";\n\n    private DocumentConfiguration\
  \ configuration;\n\n    private DocumentCollectionManagerFactory managerFactory;\n\
  \n    @PostConstruct\n    public void init() {\n        configuration = new MongoDBDocumentConfiguration();\n\
  \n第 17 章 ■ Jakarta NoSQL\n\n        Map<String, Object> settings = Collections.singletonMap(\"\
  mongodb-server-host-1\",\n                \"localhost:27017\");\n        managerFactory\
  \ = configuration.get(Settings.of(settings));\n    }\n\n    @Produces\n    public\
  \ DocumentCollectionManagerProducer getManager() {\n        return managerFactory.get(COLLECTION);\n\
  \    }\n}\n\n`DocumentCollectionManagerProducer`可以被注入到类中，然后调用`DocumentCollectionManager`来处理数据。\n\
  \n工作原理\n\n与应用程序的任何数据库配置一样，NoSQL 数据库也需要一些设置。NoSQL 应用程序所需的配置可以类比于 JDBC 或 JPA 的`DriverManager`或`EntityManager`配置。\n\
  \n首先，需要多个依赖项，但好处是 Jakarta NoSQL 规范包含了所有这些依赖项，因此无需在 Web 或 Maven Central 上四处寻找。为了整合适用于\
  \ NoSQL 的适当依赖项，您还必须知道所使用的数据库类型。如前所述，每种 NoSQL 数据库类型都有不同的依赖项。\n\n通信层定义了三个模块：`diana-key-value`、`diana-column`和`diana-document`。每个模块对应相应的\
  \ NoSQL 数据库类型。NoSQL 映射数据库不在通信模块的覆盖范围内，因为它们已由 Apache TinkerPop 处理（[`tinkerpop.apache.org/`](https://tinkerpop.apache.org/)）。\n\
  \n■ **注意** Apache TinkerPop 是一个用于图数据库和图分析系统的图计算框架。\n\n每种数据库类型都需要设置必要的参数，例如数据库主机和端口。在文档型、列型或键值型数据库中，这些设置可以放入配置文件中，然后放到\
  \ CLASSPATH 上。它们也可以在应用程序中硬编码，如下所示：\n\nMap<String, Object> map = new HashMap<>();\n\
  map.put(\"mongodb-server-host-1\", \"localhost:27017\");\n\n\n\n下一个 API，也称为映射扩展，用于将\
  \ NoSQL 数据库数据映射到 Java 类，这与标准数据库的对象关系映射非常相似。使用映射 API 需要配置依赖项，以及当前所用数据库类型对应的 Artemis\
  \ 驱动程序。如果使用文档数据库，则需要使用 artemis-document 依赖项。配置的关键部分是通过提供主机、端口、用户名和密码（如果需要）来初始化数据库。初始化数据库有多种方法，从在\
  \ Java SE 应用程序中使用 main 方法，到在企业应用程序中使用@ApplicationScoped CDI bean。\n\n第 17 章 ■ Jakarta\
  \ NoSQL\n\n在示例中，一个@ApplicationScoped bean 在带有@PostConstruct 注解的方法中包含了数据库的初始化。任何标记为@PostConstruct\
  \ 的方法都会在 bean 初始化后立即执行。由于示例中的 bean 是应用程序作用域的，它会在应用程序启动时启动。在这种情况下，会从 MongoDbDocumentConfiguration\
  \ 实例化一个 DocumentConfiguration。然后使用 Map 来存储一些配置设置，这些设置也可以放在 CLASSPATH 上的属性文件中。接着，将设置\
  \ Map 放入 DocumentConfiguration，并返回一个 DocumentCollectionManagerFactory。应用程序将使用此管理器来执行数据库交互。\n\
  \n17-2. 为文档数据库编写查询\n\n问题\n\n您已配置应用程序使用基于文档的 NoSQL 数据库，现在希望通过创建查询来获取数据。\n\n解决方案\n\
  \n利用方案 17-1 配置中的 DocumentCollectionManager 对集合发起查询。在此示例中，DocumentTemplate 被注入到一个受管\
  \ bean 中，用于查询 acmepools 数据库中的 Pool 集合。以下示例展示了受管 bean 中查询代码的片段：\n\npackage org.jakarateerecipe.chapter17.service;\n\
  \nimport jakarta.nosql.mapping.document.DocumentTemplate;\n\nimport jakarta.nosql.document.Document;\n\
  \nimport jakarta.nosql.document.DocumentEntity;\n\nimport jakarta.nosql.document.DocumentQuery;\n\
  \n...\n\n@Inject\n\nDocumentTemplate documentTemplate;\n\n...\n\nDocumentQuery query\
  \ = select().from(\"Pool\")\n\n.where(\"_id\").eq(id).build();\n\n这个特定的查询从 Pool\
  \ 集合中选择 _id 等于给定值的记录。\n\n要从查询中获取值，可以将其传递给注入的 DocumentTemplate 实例，该实例将返回一个可选结果：\n\
  \n...\n\nOptional<Customer> customerOptional = documentTemplate.singleResult(query);\n\
  \nSystem.out.println(\"Entity found: \" + customerOptional.get());\n\n第 17 章 ■ Jakarta\
  \ NoSQL\n\n工作原理\n\n使用 Jakarta NoSQL API 进行查询时，其感觉与使用 CriteriaQuery API 非常相似。表 17-1\
  \ 和 17-2 展示了可用于帮助为文档数据库生成查询的各种构建器方法。\n\n***表 17-1.** DocumentQuery.DocumentFrom\
  \ 方法*\n\n**构建器方法**\n\n**描述**\n\nlimit\n\n定义要检索的最大结果数\n\norderBy(String name)\n\n\
  确定结果的显示顺序\n\nskip(long skip)\n\n定义第一个检索结果的位置\n\nwhere(String name)\n\n开始一个新条件，定义列名\n\
  \n***表 17-2.** DocumentQuery.DocumentWhere 方法*\n\n**构建器方法**\n\n**描述**\n\nbetween\n\
  \n创建 between 条件\n\neq\n\n创建等于条件\n\ngt\n\n创建大于条件\n\ngte\n\n创建大于或等于条件\n\nin\n\n创建\
  \ in 条件\n\nlike\n\n创建 like 条件\n\nlt\n\n创建小于条件\n\nlte\n\n创建小于或等于条件\n\nnot\n\n创建不等于条件\n\
  \n以下示例展示了如何选择集合中的所有记录：\n\nDocumentQuery query = select().from(\"Pool\").build();\n\
  \nList<DocumentEntity> entities = manager.getManager().select(query);\n\n\n\n■ **注意**\
  \ 如果使用不同类型的 NoSQL 数据库，也有类似的构建器技术可用于检索数据。有关使用 Jakarta NoSQL 查询各类 NoSQL 数据库的更多信息，请参阅文档：[`jakarta.ee/specifications/nosql/`](https://jakarta.ee/specifications/nosql/)。\n\
  \n第 17 章 ■ Jakarta NoSQL\n\n既可以将 `DocumentTemplate` 注入到 CDI bean 中（如示例所示），也可以在 Java\
  \ SE 环境中通过 `SeContainer` 获取。以后者为例，可以通过调用 `SeContainerInitializer` 获取 `SeContainer`，然后通过将\
  \ `DocumentTemplate.class` 传递给容器的 `select()` 方法，从该容器中获取 `DocumentTemplate`：\n\n\
  ```java\ntry (SeContainer se = SeContainerInitializer.newInstance().initialize()){\n\
  \n    DocumentTemplate documentTemplate = se.select(DocumentTemplate.class).get();\n\
  \n    DocumentQuery query = select().from(\"Pool\").build();\n\n    List<Pool> results\
  \ = documentTemplate.select(query);\n\n    ...\n\n}\n```\n\nJakarta NoSQL 规范允许以标准化的方式查询面向文档的\
  \ NoSQL 数据库以及其他类型的 NoSQL 数据库。\n\n17-3. 从面向文档的数据库中插入、更新和删除\n\n问题\n\n您希望利用应用程序对面向文档的\
  \ NoSQL 数据库执行标准的 CRUD 操作。\n\n解决方案\n\n利用配置（配方 17-1）中生成的 `DocumentCollectionManagerFactory`\
  \ 获取一个管理器，该管理器可用于在面向文档的数据库中创建、读取、更新或删除数据：\n\n```java\npackage org.jakarateerecipe.chapter17.service;\n\
  \nimport com.mongodb.MongoWriteException;\n\nimport jakarta.inject.Inject;\n\nimport\
  \ jakarta.nosql.document.Document;\n\nimport jakarta.nosql.document.DocumentDeleteQuery;\n\
  \nimport jakarta.nosql.document.DocumentEntity;\n\nimport jakarta.nosql.document.DocumentQuery;\n\
  \nimport jakarta.nosql.mapping.document.DocumentTemplate;\n\nimport jakarta.ws.rs.*;\n\
  \nimport org.jakarateerecipe.chapter17.DocumentCollectionManagerProducer;\n\nimport\
  \ org.jakarateerecipe.chapter17.entity.Customer;\n\nimport org.jakarateerecipe.chapter17.entity.Pool;\n\
  \nimport java.util.Random;\n\nimport java.util.stream.Stream;\n\n第 17 章 ■ Jakarta\
  \ NoSQL\n\nimport static jakarta.nosql.document.DocumentDeleteQuery.delete;\n\n\
  import static jakarta.nosql.document.DocumentQuery.select;\n\n@Path(\"acmepools\"\
  )\n\npublic class AcmePoolsService {\n\n    @Inject\n    DocumentCollectionManagerProducer\
  \ manager;\n\n    @Inject\n    DocumentTemplate documentTemplate;\n\n    // ...\n\
  \    // ...\n}\n```\n\n插入\n\n在面向文档的数据库中生成新实体有几种不同的技术：使用 `DocumentTemplate` 或使用 `DocumentEntity`。\n\
  \n使用 `DocumentTemplate` 创建实体时，工作流程与 Jakarta Persistence API 及 Criteria API 非常相似。查看以下从\
  \ AcmePoolsNoSql 项目的 `AcmePoolsService` 类中摘录的代码，可以看到对象是使用纯 Java 创建的，然后通过文档模板插入到数据库中。在此例中，`DocumentTemplate`\
  \ 已被注入到 CDI bean 中：\n\n```java\n@GET\n@Path(\"testDocumentDb\")\npublic String testDocumentDb()\
  \ {\n\n    Random random = new Random();\n    Long id = random.nextLong();\n   \
  \ StringBuilder builder = new StringBuilder(\"\");\n    Customer customer = new\
  \ Customer(\"Josh\", \"Juneau\", \"123 AcmeWay\", \"JavaLand\",\n            \"\
  JJ\", \"12345\");\n    // ...\n```\n\n使用 `DocumentEntity` 构造和 `DocumentCollectionManagerFactory`\
  \ 生成一个新实体，以添加到现有数据集合中，然后使用管理器插入该实体。要验证此方法，请向以下端点发送 GET 请求：`http://localhost:8080/JakartaEERecipes_Chapter17-1.0-SNAPSHOT/rest/acmepools/testDocumentDb`。\n\
  \n更新\n\n\n\n要更新一个实体，请修改 `DocumentEntity` 实例，然后将其传递给 `insert()` 方法。以下是 `AcmePoolsService`\
  \ 类的代码片段；此处创建了一个新实体，并将其添加到现有的池数据集合中：\n\n第 17 章 ■ Jakarta NoSQL\n\n@POST\n\n@Path(\"\
  createNewDocument/{id}\")\n\npublic void createNewDocument(@PathParam(\"id\") int\
  \ id) {\n\nSystem.out.println(\"Insert new document with ID: \" + id);\n\nif (id\
  \ > 0) {\n\n// 使用 DocumentEntity 创建文档\n\ntry {\n\nDocumentEntity documentEntity\
  \ = DocumentEntity.of(\"Pool\");\n\ndocumentEntity.add(Document.of(\"_id\", id));\n\
  \ndocumentEntity.add(Document.of(\"length\", 30.0));\n\ndocumentEntity.add(Document.of(\"\
  width\", 15.0));\n\nDocumentEntity saved = manager.getManager().insert(documentEntity);\n\
  \n// 更新文档\n\nsaved.add(Document.of(\"Customer\", \"Juneau\"));\n\nDocumentEntity\
  \ updated = manager.getManager().update(documentEntity);\n\n} catch (MongoWriteException\
  \ e) {\n\nSystem.out.println(\"Error: \" + e);\n\n}\n\n} else {\n\nSystem.out.println(\"\
  You cannot insert a NULL entity, please provide an id\");\n\n}\n\n}\n\n要验证此方法，请向以下端点发送\
  \ POST 请求：http://localhost:8080/\n\nJakartaEERecipes_Chapter17- 1.0- SNAPSHOT/rest/acmepools/createNewDocument/{id}。\n\
  \n将路径参数 `{id}` 替换为表示文档 ID 的任何数字，例如 1234。\n\n**删除**\n\n`DocumentDeleteQuery` 接口可用于轻松地从数据集合中删除实体：\n\
  \npublic void deleteDocument(){\n\nDocumentDeleteQuery delete = delete().from(\"\
  Pools\").where(\"length\").\n\ngte(36.0).build();\n\nmanager.getManager().delete(delete);\n\
  \n}\n\n**工作原理**\n\n在 Jakarta NoSQL 中，`DocumentTemplate` 可用于对 NoSQL 数据库执行 CRUD 操作。`DocumentTemplate`\
  \ 可用于对 `jakarta.nosql.mapping.Entity` 类执行事务，这与 Java 持久化 API 非常相似。当使用 `DocumentCollectionManager`\
  \ 时，可以调用持久化方法，并传递 `DocumentEntity` 对象或 `DocumentQuery` 对象来触发行为。\n\n`DocumentTemplate`\
  \ 可以通过 CDI 注入，也可以从 `SeContainer` 实例创建。创建后，它可用于对实体类执行操作。在插入示例中，创建了 `Pool` 实体，然后使用\
  \ `DocumentTemplate.insert()` 方法将其插入。表 17-3 显示了通过 `DocumentTemplate` 可用的不同方法。\n\n\
  第 17 章 ■ Jakarta NoSQL\n\n***表 17-3.** DocumentTemplate 接口的方法*\n\n| **方法** | **描述**\
  \ |\n| :--- | :--- |\n| `insert(T entity)` | 将实体插入到集合中 |\n| `insert(T entity, Duration)`\
  \ | 插入具有生存时间的实体 |\n| `insert(Iterable<T> entities)` | 保存一组实体 |\n| `insert(Iterable<T>\
  \ entities, Duration)` | 保存具有生存时间的一组实体 |\n| `update(T entity)` | 更新一个实体 |\n| `update(Iterable<T>\
  \ entities)` | 更新一组实体 |\n| `delete(DocumentDeleteQuery)` | 删除通过查询获取的实体 |\n| `select(DocumentQuery)`\
  \ | 从查询中选择实体 |\n| `query(String query)` | 执行一个查询 |\n| `singleResult(String query)`\
  \ | 执行查询并返回单个唯一结果 |\n| `prepare(String query)` | 从查询创建 PreparedStatement |\n| `find(T\
  \ entity, ID)` | 通过 ID 查找实体类 |\n| `delete(T entity, ID)` | 通过 ID 删除实体类 |\n| `count(String\
  \ documentCollection)` | 返回文档集合中的元素数量 |\n| `count(T entityType)` | 返回文档集合中的元素数量\
  \ |\n| `singleResult(DocumentQuery)` | 执行查询并返回单个唯一结果 |\n\n本示例中的其余部分演示了使用 `DocumentCollectionManager`\
  \ 的各种持久化事务。这也可以通过 CDI 注入，或从 `SeContainer` 实例创建。\n\n在 Jakarta EE 应用程序中，通常配置将在单个 `@ApplicationScoped`\
  \ bean 内完成，该 bean 会 `@Produces` 一个 `DocumentCollectionManager`（参见示例 17-1）。\n\n当使用\
  \ `DocumentCollectionManager` 时，调用各种持久化方法，并传递 `DocumentQuery` 或 `DocumentEntity`\
  \ 对象。\n\n\n\n在示例中，使用 `DocumentCollectionManager` 构建并插入了针对 Pool 的 `DocumentEntity`。下一个示例采用了不同的方法，构建了一个\
  \ `DocumentDeleteQuery` 来从 Pool 集合中删除实体。随后调用了 `DocumentCollectionManager` 的 `delete()`\
  \ 方法，并传入 `DocumentDeleteQuery` 对象。表 17-4 展示了 `DocumentCollectionManager` 上可用的方法。\n\
  \n第 17 章 ■ Jakarta NoSQL\n\n***表 17-4. DocumentCollectionManager 接口的方法***\n\n**方法**\n\
  \n**描述**\n\n`close()`\n\n关闭资源\n\n`delete(DocumentDeleteQuery)`\n\n删除通过查询获取的实体\n\n\
  `insert(DocumentEntity)`\n\n插入实体\n\n`insert(DocumentEntity, Duration)`\n\n插入具有生存时间的实体\n\
