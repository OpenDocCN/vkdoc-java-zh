  \ 4-11.** 使用`f:ajax`标签进行 Ajax 验证*\n\n在 JSF 2.0 之前的版本中，执行即时验证需要手动编写 JavaScript 代码或使用第三方组件库。`f:ajax`标签随\
  \ 2.0 版本的发布被添加到 Jakarta Server Faces 工具集中，它带来了使用标准或第三方组件轻松为 Jakarta Server Faces\
  \ 视图添加即时验证（以及其他异步处理）的能力。`f:ajax`标签可以嵌入到任何 Jakarta Server Faces 输入组件中，以立即增强该组件，为其添加\
  \ Ajax 功能。这为开发者带来了诸多好处，因为不再需要手动编写 JavaScript 来执行客户端验证。它还允许验证在服务器端（在 Jakarta Server\
  \ Faces 控制器类中的 Java 代码内）异步进行，实现了客户端与服务器之间的无缝交互，并向客户端生成即时响应。\n\n其结果是构建出一个丰富的现代 Web\
  \ 应用程序，其行为方式与原生桌面应用程序非常相似。现在，验证可以在最终用户眼前即时完成，无需为了修复所有可能的问题而多次提交页面。\n\n第 4 章 ■ 高级\
  \ Jakarta Server Faces\n\n\n\n要使用 `f:ajax` 标签，只需将其嵌入到任何 Jakarta Server Faces 组件中即可。`f:ajax`\
  \ 可以指定多个属性，如表 4-18 所述。如果未指定某个属性，则会使用其默认值。`f:ajax` 标签完全可以不包含任何属性，如果这样做，则嵌入该 `f:ajax`\
  \ 标签的组件的默认属性值将生效。\n\n***表 4-18.** f:ajax 标签属性*\n\n**属性**\n\n**描述**\n\n`delay`\n\n\
  以毫秒为单位指定的值，对应于从客户端队列向服务器发送 Ajax 请求之间的延迟时间。可以指定值 `none` 来禁用此功能\n\n`disabled`\n\n\
  指示标签状态的布尔值。值为 `true` 表示不应渲染 Ajax 行为，值为 `false` 表示应渲染 Ajax 行为。默认值为 `false`\n\n`event`\n\
  \n一个字符串，用于标识 Ajax 动作应应用的事件类型。如果指定，它必须是受支持的组件事件之一。默认值是触发 Ajax 行为的父组件的 Ajax 请求的事件。对于\
  \ `ActionSource` 组件，默认事件是 `action`；对于 `EditableValueHolder` 组件，默认事件是 `valueChange`\n\
  \n`execute`\n\n一个集合，用于标识要在服务器上执行的一组组件。此属性的值可以指定为以空格分隔的组件标识符字符串，也可以指定为 `ValueExpression`（Jakarta\
  \ 表达式语言）。默认值为 `@this`，即 Ajax 行为的父组件\n\n`immediate`\n\n布尔值，指示是否在生命周期的早期处理输入值。如果为\
  \ `true`，则这些值将被处理，并且它们对应的事件将在“应用请求值”阶段广播；否则，事件将在“调用应用程序”阶段广播\n\n`listener`\n\n当\
  \ `AjaxBehaviorEvent` 已为监听器广播时，所调用的监听器方法的名称\n\n`onevent`\n\n用于处理 UI 事件的 JavaScript\
  \ 函数名称\n\n`onerror`\n\n用于处理错误的 JavaScript 函数名称\n\n`resetValues`\n\n如果为 `true`，则此特定的\
  \ Ajax 事务将重置这些值\n\n`render`\n\n一个集合，用于标识 Ajax 行为完成时要在客户端渲染的组件。此属性的值可以指定为以空格分隔的组件标识符字符串，也可以指定为\
  \ `ValueExpression`（Jakarta 表达式语言）。默认值为 `@none`，表示 Ajax 行为完成时不渲染任何组件\n\n`f:ajax`\
  \ 标签的 `execute` 和 `render` 属性可以指定多个关键字，分别用于指示哪些组件在服务器上为 Ajax 行为执行，或者哪些组件在 Ajax 行为完成后重新渲染。表\
  \ 4-19 列出了可以为这两个属性指定的值。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n***表 4-19.** f:ajax\
  \ 标签 execute 和 render 属性值*\n\n**属性值**\n\n**描述**\n\n`@all`\n\n所有组件标识符都在服务器上执行，并且一旦\
  \ Ajax 行为完成，所有组件标识符都会重新渲染\n\n`@form`\n\n包含该组件的表单\n\n`@none`\n\n无组件标识符（`render` 属性的默认值）\n\
  \n`@this`\n\nAjax 行为的父组件\n\n`@child(n)`\n\n基础组件的第 n 个子组件\n\n`@composite`\n\n基础组件最近的复合组件祖先\n\
  \n`@id(id)`\n\n基础组件下所有具有指定 id 的组件后代\n\n`@namingcontainer`\n\n基础组件最近的 `NamingContainer`\
  \ 祖先\n\n`@next`\n\n视图中基础组件之后的下一个组件\n\n`@parent`\n\n基础组件的父组件\n\n`@previous`\n\n基础组件的前一个组件\n\
  \n`@root`\n\n`UIViewRoot`\n\n组件 ID\n\n以空格分隔的单个组件标识符列表\n\n\n\n解析为字符串标识符集合的 Jakarta\
  \ 表达式语言表达式\n\n在本配方的示例中，一个 `f:ajax` 标签被嵌入到表单内的许多输入组件中。这些组件都已实现 Ajax 化，即作为组件值输入的数据现在将能够使用与\
  \ JSF 关联的 JavaScript 资源库进行处理。在幕后，JavaScript 资源库的 `jsf.ajax.request()` 方法会收集每个已 Ajax\
  \ 化的组件的数据，并将请求发送到 Java Server Faces 生命周期。实际上，数据被发送到控制器类属性，而无需以传统方式提交页面。\n\n请注意，`event`\
  \ 属性指定了一个将用于触发 Ajax 行为的 JavaScript 事件。可以为 `event` 属性指定的 JavaScript 事件与父组件标签上可用的\
  \ JavaScript 事件属性相同，但 `on` 前缀已被移除。例如，如果希望在 `inputText` 组件失去焦点时对其执行 Ajax 行为，则应为 `f:ajax`\
  \ 的 `event` 属性指定 `blur`，而不是 `onBlur`。将此概念应用于示例，当用户离开名字或姓氏字段时，将立即使用它们关联的 `f:validate`\
  \ 标签进行验证，因为 `f:ajax` 标签已嵌入其中，并且 `f:ajax` 标签上的 `event` 被指定为 `blur`。当 Ajax 行为（本例中为验证）完成时，在\
  \ `f:ajax` 的 `render` 属性中指定标识符的组件将被重新渲染。对于名字和姓氏的 `inputText` 字段，它们关联的消息组件将被重新渲染，显示验证过程中可能发生的任何错误。\n\
  \n**使用动作监听器**\n\n可以将动作监听器绑定到 `f:ajax` 标签，以便在触发动作时调用监听器方法。为什么要绑定动作监听器？这样做有很多原因。例如，假设您想捕获用户正在文本字段中输入的文本。您可以通过将控制器类中的动作方法绑定到\
  \ `inputText` 字段对应 `f:ajax` 标签的 `listener` 属性，然后从动作方法中的 `AjaxBehaviorEvent` 对象获取当前组件的值来实现。例如，假设您想测试密码的复杂性，并显示一条相应的消息，指示密码是否足够强。\n\
  \n第 4 章 ■ 高级 Jakarta Server Faces\n\n密码的 `inputSecret` 组件可以修改为包含一个 `f:ajax` 标签，其\
  \ `event` 指定为 `keyup`，`listener` 指定为 `#{ch3ContactController.passwordStrength}`，如下所示：在视图中：\n\
  \n```xhtml\n<h:outputLabel for=\"password\" value=\"输入站点访问密码：\"/>\n<h:inputSecret\
  \ id=\"password\" size=\"40\"\n               value=\"#{ch3ContactController.current.password}\"\
  >\n    <f:validateRequired/>\n    <f:ajax event=\"keyup\" listener=\"#{ch3ContactController.passwordStrength}\"\
  \n            render=\"passwordStrengthMessage\"/>\n</h:inputSecret>\n...\n```\n\
  \n在控制器中：\n\n```java\n...\nprivate String passwordStrengthMessage;\n...\npublic void\
  \ passwordStrength(AjaxBehaviorEvent event){\n    UIInput password = (UIInput) event.getComponent();\n\
  \    boolean isStrong = false;\n    String input = password.getValue().toString();\n\
  \    if(input.matches(\"((?=.*\\\\d)(?=.*[a-z])(?=.*[A-Z]).{6,})\")) {\n       \
  \ isStrong = true;\n    }\n    if(isStrong == true){\n        setPasswordStrengthMessage(\"\
  密码强度高\");\n    } else {\n        setPasswordStrengthMessage(\"密码强度弱\");\n    }\n\
  }\n```\n\n此示例中的代码将创建一个监听器事件，当用户输入值时，该事件会检查当前输入是否满足安全密码的给定标准。然后会向用户显示一条消息，告知他们密码是否安全。\n\
  \n使用 `f:ajax` 标签可以轻松地向 Jakarta Server Faces 组件添加 Ajax 行为。在 `f:ajax` 标签出现之前，通常使用特殊的第三方\
  \ JavaScript 库在 Jakarta Server Faces 视图中实现类似的行为。`f:ajax` 带来的好处是允许开发者在选择使用 Ajax 行为时，无需编写一行\
  \ JavaScript 代码。\n\n**4-13. 无需页面重载即可提交页面**\n\n**问题**\n\n您希望使输入表单能够提交输入字段进行处理，而无需重新加载页面。本质上，您希望您的\
  \ Web 应用程序输入表单的反应更像桌面应用程序，而不是在页面之间导航来处理数据。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n\
  **解决方案**\n\n在视图的命令组件中嵌入一个 `<f:ajax/>` 标签，以便在不提交页面的情况下调用 CDI 控制器类动作。启用 `f:ajax` 来更新视图中的消息组件，以便可以显示处理产生的任何错误或成功消息。在此示例中，Acme\
  \ Bookstore 的新闻通讯订阅页面将被更改，以便使用 Ajax 提交表单，并且 `commandButton` 组件在不以传统方式提交表单的情况下进行处理。以下摘录自配方\
  \ `recipe03_06.xhtml` 的新闻通讯订阅表单源，演示了如何向表单中的动作组件添加 Ajax 功能：\n\n```xhtml\n...\n<h:commandButton\
  \ id=\"contactSubmit\" action=\"#{ch3ContactController.subscribe}\" value=\"保存\"\
  >\n    <f:ajax event=\"action\" execute=\"@form\" render=\"@all\"/>\n</h:commandButton>\n\
  <h:panelGrid columns=\"2\" width=\"400px;\">\n...\n```\n\n当按钮或链接被点击时，JavaScript\
  \ 将在后台用于处理请求，以便立即显示结果，无需刷新页面。\n\n**工作原理**\n\n传统上，Web 应用程序的用户体验遵循“点击、等待、页面刷新”的模式。虽然这种体验并非特别糟糕，但它不如原生桌面应用程序中常见的即时响应那样好。在\
  \ Web 应用程序中使用 Ajax 有助于创建更统一的用户体验，使 Web 应用程序能够像原生桌面应用程序一样产生“即时”响应。字段验证（在配方 4-13 中介绍）是即时反馈的绝佳候选，但即时响应效果好的另一个领域是表单提交时。\n\
  \n`f:ajax` 标签可以嵌入到动作组件中，以便在幕后使用 JavaScript 调用相应的动作方法。`f:ajax` 标签包含许多属性，涵盖在表 4-18\
  \ 中（参见配方 4-13），这些属性可用于在指定事件发生时调用 Ajax 行为，并在该 Ajax 行为完成时重新渲染视图组件。请参考表 4-19 查看可以为\
  \ `f:ajax` 标签的 `execute` 和 `render` 属性指定的值。\n\n\n\n在本示例中，标识符为 `contactSubmit` 的\
  \ `commandButton` 组件包含一个 `f:ajax` 标签，该标签将 `event` 属性指定为 `action`，`execute` 属性指定为\
  \ `@form`，`render` 属性指定为 `@all`。这意味着当按钮被调用时，`ch3ContactController.subscribe` 方法将使用\
  \ JavaScript 异步调用，并将表单中的所有输入组件值发送到服务器（控制器类）进行处理。当 Ajax 行为（`subscribe` 方法）完成时，视图中的所有组件都将被重新渲染。通过重新渲染视图中的所有组件，这些消息组件可以显示因验证失败或表单提交成功而排队的任何消息。在\
  \ Ajax 行为期间，可以只处理或渲染指定的组件；要了解更多相关信息，请参阅配方 4-15。\n\n■ **注意** 当 `f:ajax` 标签嵌入在 `UICommand`\
  \ 组件中时，`event` 属性的默认值为 `action`。然而，在本示例的代码中为了保持一致性，明确指定了该属性。\n\n第 4 章 ■ 高级 Jakarta\
  \ Server Faces\n\n4-14. 进行部分页面更新\n\n问题\n\n您希望仅使用 Ajax 事件执行页面的一部分，然后在 Ajax 行为完成时渲染相应部分的组件。\n\
  \n解决方案\n\n使用 `f:ajax` 标签为您希望执行并在 Ajax 行为完成时渲染的组件添加 Ajax 功能。对于 `f:ajax` 标签的 `execute`\
  \ 属性，仅指定与这些组件对应的组件标识符，或 `@form`、`@this` 或其他 `execute` 关键字。同样，在 `render` 属性中仅指定相应消息组件的组件标识符。\n\
  \n假设 Acme 书店希望执行新闻简报订阅表单值的提交，并且仅在提交完成时更新表单的全局消息。以下 `commandButton` 组件将仅执行其所在的表单以及标识符为\
  \ `newsletterSubscriptionMsgs` 的组件：\n\n...\n\n<h:commandButton id=\"contactSubmit\"\
  \ action=\"#{ch3ContactController.subscribe}\" value=\"保存\">\n\n<f:ajax event=\"\
  action\" execute=\"@form\" render=\"newsletterSubscriptionMsgs\"/>\n\n</h:commandButton>\n\
  \n...\n\n当按钮被点击时，当前表单组件值将随请求一起被处理，并且 `ContactController` 控制器类的 `subscribe()` 方法将被调用。一旦\
  \ `subscribe()` 方法完成，表单中包含标识符 `newsletterSubscriptionMsgs` 的组件（在本例中是一个消息组件）将被重新渲染。\n\
  \n■ **注意** 对于 Acme 书店的新闻简报订阅表单，在完成时进行部分页面渲染是一个坏主意。这是因为如果表单中的值未正确验证，表单将永远不会被提交。在这种情况下，如果某些表单值未正确验证，那么当点击保存按钮时页面上将不会显示任何内容，因为\
  \ `subscribe` 方法永远不会被调用。\n\n如果 `f:ajax` 标签的 `render` 属性设置为 `@all`，那么所有验证失败的组件都会显示相应的错误消息。这个例子应该能说明，为了达到您想要的结果，处理页面适当的部分是多么重要。\n\
  \n工作原理\n\n`f:ajax` 标签使得执行部分页面更新变得简单。为此，请为 `f:ajax` 的 `execute` 属性指定您希望执行的组件的标识符。如本配方示例中所述，假设您只想执行页面的一部分，而不是给定页面上的所有组件。您可以通过识别视图中希望执行的组件，将它们指定在\
  \ `f:ajax` 的 `execute` 属性中，然后在 Ajax 行为完成时渲染相应的消息组件来实现。如果 `f:ajax` 的 `execute` 属性未指定任何内容，则\
  \ `f:ajax` 标签必须嵌入在一个组件内部，在这种情况下，父组件将被执行。这就是 `f:ajax` 的 `execute` 属性的默认行为。在示例中，`f:ajax`\
  \ 标签的 `execute` 属性指定了 `@form` 关键字，而不是特定的组件 ID。如前所述，可以为 `f:ajax` 标签的 `execute` 和\
  \ `render` 属性指定多个关键字。这些关键字列在表 4-19 中，该表描述了 `@form` 关键字表示当 Ajax 行为发生时，与给定 `f:ajax`\
  \ 标签位于同一表单中的所有组件都将被执行。因此，在本示例中，当按钮被点击时，新闻简报订阅表单中的所有字段都将被发送到控制器类进行处理。\n\n`render`\
  \ 属性也是如此，一旦 Ajax 行为完成，为 `f:ajax` 标签的 `render` 属性指定的任何组件都将被重新渲染。因此，如果由于 `f:ajax`\
  \ 方法调用的结果，在处理组件时发生验证，则可以在验证失败后在页面上显示相应的验证失败消息。任何组件都可以被重新渲染，并且可以为 `execute` 属性指定的相同关键字也可以用于\
  \ `render` 属性。在示例中，一旦 Ajax 行为完成，`newsletterSubscriptionMsgs` 组件就会被渲染。\n\n4-15. 将\
  \ Ajax 功能应用于一组组件\n\n问题\n\n您希望将 Ajax 功能应用于一组输入组件，而不是分别应用于每个组件。\n\n解决方案\n\n将您希望应用\
  \ Ajax 功能的任何组件包含在一个 `f:ajax` 标签内。`f:ajax` 标签可以是一个或多个 Jakarta Server Faces 组件的父标签，在这种情况下，每个子组件都会继承给定的\
  \ Ajax 行为。将 Ajax 功能应用于多个组件的操作在以下代码清单中进行了演示。在以下示例摘录中，Acme 书店应用程序的新闻简报订阅视图进行了调整，使得每个包含验证器的\
