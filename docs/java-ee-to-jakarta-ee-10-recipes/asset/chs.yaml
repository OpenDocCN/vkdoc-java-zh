  ***图 3-17.** 生成的 Jakarta Server Faces 视图*\n\n工作原理\n\n过去，Jakarta Server Faces 应用程序有一个弱点，即它们需要一个启动视图，该视图创建了访问应用程序的入口点。这为应用程序提供了一个视图，用于设置应用程序会话的初始状态。虽然这个概念很好，因为每个用户会话都会从一个初始化的应用程序状态开始，但它阻止了通过\
  \ URL 直接链接记录的能力。有时，能够将视图链接到包含请求参数的 URL 是非常有用的，这样可以在无需用户进一步交互的情况下，将匹配给定参数的记录返回给视图；例如，假设一个网站包含关于一本书的信息，并希望包含一个\
  \ URL 来了解更多关于该书作者的信息。直接链接到包含该作者信息的视图，比将用户重定向到一个需要他们手动搜索作者的网站要好得多。\n\n此类 URL 也称为*可书签化*\
  \ URL，因为该 URL 包含了发出请求所需的所有状态。因此，它们允许 Web 应用程序的用户为直接访问应用程序中的特定点而将 URL 加入书签。\n\nJakarta\
  \ Server Faces 2.0 引入了包含视图参数的能力，增加了视图接受请求参数的能力。利用基于 GET 的 URL，可以将请求参数及其值附加到 URL\
  \ 末尾，包含新视图参数的视图可以在响应呈现之前将参数传递给控制器类。然后，Bean 可以接受参数值，并在呈现响应之前查询数据库或搜索其他数据集合，以找到与给定值匹配的记录。\n\
  \n要在视图中包含一个或多个视图参数，必须向视图添加开闭的 `f:metadata` 元素，并在它们之间嵌入所需数量的 `f:viewParam` 元素。`f:viewParam`\
  \ 元素包含两个必须具有值的属性，即 `name` 和 `value` 属性。`name` 属性指定请求参数的名称，即你希望它在可书签化 URL 中显示的名称；`value`\
  \ 属性指定应映射到该请求参数的控制器类字段。在本配方的示例中，Jakarta Server Faces 视图包含一个视图参数，允许在请求视图时指定作者的姓氏。在以下示例中，对配方\
  \ 3-9 中创建的控制器类进行了修改，添加了一个名为 `authorLast` 的新属性，以适应新的视图参数。\n\n第 3 章 ■ Jakarta Server\
  \ Faces\n\n\n\n一个名为 `authorLast` 的视图参数，以及控制器类中关联的 `authorLast` 字段包含一个 setter 方法，该方法在页面被请求时被调用。以下视图摘录展示了添加元数据和视图参数的代码行：\n\
  \n<f:metadata>\n\n<f:viewParam name=\"authorLast\" value=\"#{authorTableController.authorLast}\"\
  />\n\n</f:metadata>\n\n添加视图参数后，可以通过包含 `authorLast` 请求参数的 URL 来请求页面，如下所示：\n\n[`my-server.com/JakartaEERecipes/chapter03/chapter03_11.xhtml?authorLast=Juneau`](http://my-server.com/JakartaEERecipes/chapter03/chapter03_11.xhtml?authorLast=Juneau)\n\
  \n当页面被请求时，视图参数的值会调用控制器类中的 `setAuthorLast` 方法，该方法随后会搜索与给定请求参数值匹配的姓氏的作者记录：\n\n...\n\
  \npublic void setAuthorLast(String authorLast) {\n\ndisplayAuthor(authorLast);\n\
  \n}\n\n...\n\n在 Jakarta Server Faces 2.0 中添加视图参数使得创建可书签化的 URL 变得容易。这使得应用程序更加灵活，并能立即产生结果，而无需用户在产生结果之前浏览多个页面。\n\
  \n3-12. 显示对象列表\n\n问题\n\n你希望在渲染的 Jakarta Server Faces 页面中显示一个对象列表。\n\n解决方案\n\n使用\
  \ Jakarta Server Faces 的 `h:dataTable` 组件来显示列表对象，遍历列表中的每个对象并显示指定的值。`h:dataTable`\
  \ 组件高度可定制，可以配置为以多种布局显示内容。以下 Jakarta Server Faces 视图包含两个 `h:dataTable` 组件，用于显示 *Java\
  \ 9 Recipes* 书籍的作者，这些作者信息来自之前菜谱中开发的控制器类。视图中的第一个表格直接显示了每位作者的姓名，并已格式化为交替行颜色。第二个表格为每个对应的列表元素包含两行，第一行显示作者姓名，第二行显示其简介：\n\
  \n<html>\n\n<h:head>\n\n<title>菜谱 3-12：显示对象列表</title>\n\n<link href=\"#{facesContext.externalContext.requestContextPath}/css/styles.css\"\
  \n\nrel=\"stylesheet\" type=\"text/css\" />\n\n</h:head>\n\n<h:body>\n\n第 3 章 ■\
  \ Jakarta Server Faces\n\n<h:form id=\"componentForm\">\n\n<p>\n\n<h:graphicImage\
  \ id=\"java9recipes\" style=\"width: 10%; height: 20%\"\n\nlibrary=\"image\" name=\"\
  java9recipes.png\"/>\n\n<br/>\n\n#{authorTableController.current.bio}\n\n</p>\n\n\
  <h:dataTable id=\"authorTable\" border=\"1\"\n\nvalue=\"#{authorTableController.authorList}\"\
  \n\nstyleClass=\"authorTable\"\n\nrowClasses=\"authorTableOdd, authorTableEven\"\
  \n\nvar=\"author\">\n\n<f:facet name=\"header\">\n\nJava 9 Recipes 作者\n\n</f:facet>\n\
  \n<h:column>\n\n<h:outputText id=\"authorName\" value=\"#{author.first} #{author.last}\"\
  />\n\n</h:column>\n\n</h:dataTable>\n\n<br/><br/>\n\n<h:dataTable id=\"authorTable2\"\
  \ border=\"1\" value=\"#{authorTableController.\n\nauthorList}\"\n\nvar=\"author\"\
  \ width=\"500px;\">\n\n<f:facet name=\"header\">\n\nJava 9 Recipes 作者\n\n</f:facet>\n\
  \n<h:column>\n\n<h:panelGrid columns=\"2\" border=\"1\" width=\"100%\">\n\n<h:outputText\
  \ id=\"authorFirst\" value=\"#{author.first}\"\n\nstyle=\"width: 50%\"/>\n\n<h:outputText\
  \ id=\"authorLast\" value=\"#{author.last}\"\n\nstyle=\"width:50%\"/>\n\n</h:panelGrid>\n\
  \n<h:outputText id=\"authorBio\" value=\"#{author.bio}\"/>\n\n</h:column>\n\n</h:dataTable>\n\
  \n</h:form>\n\n</h:body>\n\n</html>\n\n该示例利用层叠样式表来帮助格式化表格的颜色。样式表的源代码如下：\n\n.authorTable{\n\
  \nborder-collapse:collapse;\n\n}\n\n.authorTableOdd{\n\ntext-align:center;\n\nbackground:none\
  \ repeat scroll 0 0 #CCFFFF;\n\nborder-top:1px solid #BBBBBB;\n\n}\n\n![](img/index-201_1.png)\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n.authorTableEven{\n\ntext-align:center;\n\nbackground:none\
  \ repeat scroll 0 0 #99CCFF;\n\nborder-top:1px solid #BBBBBB;\n\n}\n\n生成的页面应类似于图\
  \ 3-18。\n\n***图 3-18.** Jakarta Server Faces dataTable 组件示例*\n\n工作原理\n\n\n\nJakarta\
  \ Server Faces 的 `h:dataTable` 组件可用于在页面中显示对象列表。渲染时，会构建一个 HTML 表格，并用每个列表元素或数据记录的数据填充表格单元格。`h:dataTable`\
  \ 可以遍历数据集合，将其以列格式布局，包括列标题，并能够使用层叠样式表 (CSS) 自定义外观。该组件包含许多重要属性，如表 3-6 所列。其中最重要的可能是\
  \ `value` 和 `var` 属性。`value` 属性指定要遍历的数据集合，`var` 属性列出一个字符串，该字符串将用于引用表格的每一行。该集合通常来自控制器类，例如本配方的示例。`value`\
  \ 属性的合法数据类型是 `Array`、`DataModel`、`List` 和 `Result`。`var` 属性在每个列中用于引用相应行对象中的特定字段。\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n***表 3-6. DataTable 属性***\n\n**属性**\n\n**描述**\n\
  \n`id`\n\n组件的 ID\n\n`border`\n\n表示边框粗细的整数；0 为默认值\n\n`bgcolor`\n\n表格的背景颜色\n\n`cellpadding`\n\
  \n单元格边框与其内容之间的内边距\n\n`cellspacing`\n\n单元格内的间距\n\n`width`\n\n表格的总宽度，以像素或百分比指定\n\n\
  `first`\n\n要显示集合中的第一个条目\n\n`rows`\n\n要显示的总行数\n\n`styleClass`, `captionClass`,\n\n\
  CSS 属性\n\n`headerClass`, `footerClass`,\n\n`rowClasses`, `columnClasses`\n\n`rendered`\n\
  \n指示组件是否将被渲染的布尔值\n\n`h:dataTable` 可以包含任意数量的列，每个列都在 Jakarta Server Faces 视图中的 `h:dataTable`\
  \ 组件内指定。嵌套的 `h:column` 元素包含每个列的输出。一个列可以包含几乎任何有效的组件或 HTML，甚至嵌入的 `dataTable`。`h:column`\
  \ 通常不指定任何属性，但它始终包含一个表达式或硬编码值用于显示：\n\n`<h:column>my column value</h:column>`\n\n\
  或\n\n`<h:column>#{myTable.myColValue}</h:column>`\n\n通常，HTML 表格中的列包含标题。您可以通过在 `h:dataTable`\
  \ 内、列规范之外嵌入 `f:facet` 元素，或在每个 `h:column` 内通过将 `name` 属性指定为 `header` 来向 `h:dataTable`\
  \ 或单个列添加标题。`f:facet` 元素还可以为 `name` 属性指定 `caption`，以便为表格添加标题。以下示例摘录演示了一个包含所有这些功能的\
  \ `h:dataTable`：\n\n`<h:dataTable id=\"authorTable\" border=\"1\"`\n\n`value=\"\
  #{authorTableController.authorList}\"`\n\n`styleClass=\"authorTable\"`\n\n`rowClasses=\"\
  authorTableOdd, authorTableEven\"`\n\n`var=\"author\">`\n\n`<f:facet name=\"header\"\
  >`\n\n`Java EE to Jakarta EE 10 Recipes Authors`\n\n`</f:facet>`\n\n`<h:column>`\n\
  \n`<h:outputText id=\"authorName\" value=\"#{author.first} #{author.last}\"/>`\n\
  \n`</h:column>`\n\n`</h:dataTable>`\n\n第 3 章 ■ Jakarta Server Faces\n\n在示例中，您可以看到\
  \ `h:dataTable` 的 `value` 属性被列为 `#{authorTableController.authorList}`，这是在控制器类中声明的\
  \ `Author` 对象列表。`var` 属性建立了一个名为 `author` 的变量，该变量引用当前正在从作者列表中处理的作者。然后，可以在每个 `h:column`\
  \ 中访问 `author` 变量，以显示与当前列表元素关联的数据。\n\n使表格更易于阅读和理解的一个重要部分是可用于设置表格样式的 CSS。`h:dataTable`\
  \ 支持各种属性，允许您将外部定义的 CSS 类应用于表格，具体来说，是 `styleClass`、`captionClass`、`headerClass`、`footerClass`、`rowClasses`\
  \ 和 `columnClasses` 属性。每个属性都可以包含用于格式化的 CSS 类规范。示例演示了此功能。\n\n3-13. 创建页面模板\n\n问题\n\
  \n您希望应用程序中的每个 Jakarta Server Faces 视图都遵循相同的结构。\n\n此外，您希望能够为每个视图重用相同的布局。\n\n解决方案\n\
  \n使用 Facelets 视图定义语言创建页面模板。Facelets 是 Jakarta Server Faces 的一部分，您可以使用它以熟练的方式为视图创建高度复杂的布局。本配方中演示的模板将用于定义应用程序内所有页面的标准布局。本章的演示应用程序是一个书店网站。该网站将在屏幕左侧显示多个书名，顶部显示页眉，底部显示页脚，中间显示主视图。当在左侧菜单中点击书名时，中间视图会发生变化，显示所选书籍的作者列表。\n\
  \n要创建模板，您必须首先开发一个新的 XHTML 视图文件，然后向其添加适当的 HTML/Jakarta Server Faces/XML 标记。一旦模板应用于一个或多个\
  \ Jakarta Server Faces 视图，其他视图的内容将替换模板中的 `ui:insert` 元素。以下源代码是一个名为 `/webapp/chapter03/layout/custom_template.xhtml`\
