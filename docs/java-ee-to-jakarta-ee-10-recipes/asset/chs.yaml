  工作原理\n\n虽然标准的 JDBC 语句也能完成任务，但严酷的现实是它们可能不安全且难以使用。例如，如果使用动态 SQL 语句查询数据库，并且用户接受的字符串被赋值给变量并与预期的\
  \ SQL 拼接在一起，就可能会发生糟糕的情况。\n\n\n\n字符串。在大多数普通情况下，用户接受的字符串会被拼接，然后按预期用于查询数据库。然而，攻击者可能会决定在字符串中放置恶意代码（即*SQL\
  \ 注入*），这些代码随后会通过标准的 Statement 对象被无意中发送到数据库。使用 PreparedStatements 可以防止恶意字符串被拼接到 SQL\
  \ 字符串中并传递给 DBMS。PreparedStatements 使用替换变量而非拼接来使 SQL 字符串动态化。它们也是预编译的，这意味着在 SQL 发送到\
  \ DBMS 之前，会形成一个有效的 SQL 字符串。此外，PreparedStatements 可以帮助你的应用程序获得更好的性能，因为如果同一个 SQL 需要运行多次，每个会话只需编译一次。之后，替换变量可以互换，但\
  \ PreparedStatement 可以非常快速地执行 SQL。\n\n让我们看看 PreparedStatement 在实践中是如何工作的。如果你查看本方案示例中的代码，可以看到在\
  \ `performFind()` 方法中查询了数据库表 `BOOK_AUTHOR`，将作者的 ID 作为替换变量发送，并检索匹配记录的结果。SQL 字符串如下所示：\n\
  \n```java\nString qry = \"SELECT ID, LASTNAME, FIRSTNAME, BIO \"\n    + \"FROM BOOK_AUTHOR\
  \ \"\n    + \"WHERE ID = ?\";\n```\n\n除了字符串末尾的问号（?）之外，SQL 文本看起来一切正常。\n\n在 SQL 字符串中放置问号表示在执行\
  \ SQL 时，将使用一个替换变量来代替该问号。\n\n使用 PreparedStatement 的下一步是声明一个 `PreparedStatement` 类型的变量。你可以通过下面这行代码看到这一点：\n\
  \n```java\nPreparedStatement stmt = null;\n```\n\n现在，PreparedStatement 已经声明完毕，可以投入使用了。然而，使用\
  \ PreparedStatement 可能会也可能不会抛出异常。因此，任何对 PreparedStatement 的使用都应该放在 try-catch 块中，以便能够优雅地处理任何异常。例如，如果数据库连接因某种原因不可用，或者\
  \ SQL 字符串无效，就可能会发生异常。与其因为此类问题导致应用程序崩溃，最好在 catch 块中明智地处理异常。下面的 try-catch 块包含了将 SQL\
  \ 字符串发送到数据库并检索结果所需的代码：\n\n```java\ntry (Connection conn = CreateConnection.getConnection();\n\
  \     PreparedStatement stmt = conn.prepareStatement(qry)) {\n\n    stmt.setInt(1,\
  \ id);\n\n    try (ResultSet rs = stmt.executeQuery();) {\n        if (rs.next())\
  \ {\n            int author_id = rs.getInt(\"ID\");\n            String first_name\
  \ = rs.getString(\"FIRST\");\n            String last_name = rs.getString(\"LAST\"\
  );\n            String bio = rs.getString(\"BIO\");\n            author = new Author(author_id,\n\
  \                                first_name,\n                                last_name,\n\
  \                                bio);\n        }\n    }\n\n} catch (SQLException\
  \ e) {\n    e.printStackTrace();\n}\n```\n\n首先，你可以看到使用 Connection 对象来实例化一个 PreparedStatement\
  \ 对象。SQL 字符串在创建时被传递给 PreparedStatement 对象的构造函数。接下来，PreparedStatement 对象用于为 SQL 字符串中的任何替换变量设置值。如你所见，示例中使用\
  \ PreparedStatement 的 `setString()` 方法将位置 1 的替换变量设置为 `id` 变量的内容。替换变量的位置与 SQL 字符串中问号（?）的位置相关联。字符串中的第一个问号分配给第一个位置，第二个问号分配给第二个位置，依此类推。问号的数量必须等于替换变量的数量，否则将抛出错误。\n\
  \n如果有多个替换变量需要赋值，则需要多次调用 PreparedStatement 的设置方法，依次为每个变量赋值，直到所有变量都被处理完毕。\n\nPreparedStatements\
  \ 可以接受多种不同数据类型的替换变量。例如，如果要将 Date 值赋给一个替换变量，则需要调用 `setDate(position, variable)` 方法。请参阅在线文档或你的\
  \ IDE 的代码补全功能，以获取可用于使用 PreparedStatement 对象分配替换变量的完整方法集。\n\n也可以使用命名参数，而不是索引。要使用此技术，请为每个替换变量提供一个以冒号为前缀的名称，而不是问号。以下几行代码演示了命名参数：\n\
  \n```java\nString qry = \"SELECT ID, LAST, FIRST, BIO \"\n    + \"FROM BOOK_AUTHOR\
  \ \"\n    + \"WHERE LAST = :last \"\n    + \"AND FIRST = :first\";\n\nList authorList\
  \ = new ArrayList();\n\ntry (Connection conn = CreateConnection.getConnection();\n\
  \     PreparedStatement stmt = conn.prepareStatement(qry)) {\n\n    stmt.setString(\"\
  last\", last);\n    stmt.setString(\"first\", first);\n\n    try (ResultSet rs =\
  \ stmt.executeQuery();) {\n        . . .\n```\n\n一旦所有变量都赋值完毕，就可以执行 SQL 字符串了。PreparedStatement\
  \ 对象包含一个 `executeQuery()` 方法，用于执行代表查询的 SQL 字符串。`executeQuery()` 方法返回一个 ResultSet\
  \ 对象，其中包含针对特定 SQL 查询从数据库中获取的结果。接下来，可以遍历 ResultSet 以获取从数据库中检索到的值。有两种不同的方法可以从 ResultSet\
  \ 中检索结果。\n\n可以使用位置分配来检索结果，方法是调用 ResultSet 对象的相应 getter 方法并传递列值的位置，或者可以将要获取的列值的字符串标识符传递给\
  \ getter 方法。如果传递位置，则由列名在 SQL 字符串中出现的顺序决定。在示例中，使用基于字符串的列标识符来获取值。从示例中可以看出，将列标识符传递给适当的\
  \ getter 方法将检索到该值。当从 ResultSet 中获取记录值后，它们被存储到局部变量中。一旦收集完某个作者的所有变量，它们就被存储到一个 Author\
  \ 对象中，该对象最终将从方法中返回。当然，如果替换变量设置不正确，或者 SQL 字符串有问题，则会抛出异常。这将导致 catch 块中包含的代码被执行。\n\n\
  如果你没有像解决方案中演示的那样使用 try-with-resources 子句，那么在使用完 PreparedStatements 后，应确保通过关闭语句来进行清理。一个好的做法是将所有清理代码放在一个\
  \ finally 块中，以确保即使抛出异常也能执行。例如，用于清理未使用的 Statement 和 Connection 对象的 finally 块可能如下所示：\n\
  \n```java\nfinally {\n    if (stmt != null) {\n        try {\n            stmt.close();\n\
  \        } catch (SQLException ex) {\n            ex.printStackTrace();\n      \
  \  }\n    }\n    if (conn != null) {\n        try {\n            conn.close();\n\
  \            conn = null;\n        } catch (SQLException ex) {\n            ex.printStackTrace();\n\
  \        }\n    }\n    return author;\n}\n```\n\n\n\n可以看到，实例化的 `PreparedStatement`\
  \ 对象 `stmt` 会被检查是否为 `NULL`。如果不是，则通过调用 `close()` 方法将其关闭。仔细阅读本方案中的代码，你会发现类似的代码也用于处理数据库的插入、更新和删除语句。这些情况的唯一区别在于，调用的是\
  \ `PreparedStatement` 的 `executeUpdate()` 方法，而不是 `executeQuery()` 方法。`executeUpdate()`\
  \ 方法会返回一个 `int` 值，表示受 SQL 语句影响的行数。\n\n使用 `PreparedStatement` 对象优于使用 JDBC `Statement`\
  \ 对象。这是因为前者更安全，性能也更好。它们还能让你的代码更易于理解和维护。\n\n第 6 章 ■ 使用 Jakarta EE 进行 JDBC 操作\n\n\
  6-9. 利用 Java 对象进行数据库访问\n\n问题\n\n你的应用程序需要与底层数据库交互，以存储和检索数据。你更希望使用 Java 对象来编写业务逻辑，而不是直接使用\
  \ JDBC 和 SQL 来执行数据库操作。\n\n解决方案\n\n为每个数据库表创建一个数据访问对象（DAO），用于执行那些繁琐的 JDBC 和 SQL 工作。在\
