  \n│ │ └── AuthorWorkPKNonEmbedded.java\n\n│ ├── recipe06_02\n\n│ …\n\n└── sql\n\n\
  └── create_database.sql\n\n6-2\\. 获取数据库驱动程序并将其添加到 CLASSPATH\n\n问题\n\n您需要能够从应用程序中使用数据库，因此需要获取驱动程序并为应用程序配置数据库。\n\
  \n解决方案\n\n为您要使用的数据库下载相应的驱动程序，并将其添加到应用程序的 CLASSPATH 中。在此解决方案中，我假设您将开发一个企业级 Web 应用程序并将其部署到\
  \ GlassFish 应用服务器。该应用程序将使用 Oracle 数据库进行持久化。在这种情况下，建议下载最新的 Oracle 数据库 297\n\n第 6\
  \ 章 ■ 使用 Jakarta EE 进行 JDBC 编程\n\nJava 数据库连接（JDBC）驱动程序。在撰写本文时，该驱动程序是 `ojdbc8.jar`，但您可以在\
  \ [www.oracle.com/database/technologies/appdev/jdbc-ucp-21-4c-patched-downloads.html](http://www.oracle.com/database/technologies/appdev/jdbc-ucp-21-4c-patched-downloads.html)\
  \ 找到最新版本。或者，可以通过以下 Maven 坐标将其用作 Maven 依赖项：\n\n<!-- https://mvnrepository.com/artifact/com.oracle.database.jdbc/ojdbc11\
  \ -->\n\n<dependency>\n\n<groupId>com.oracle.database.jdbc</groupId>\n\n<artifactId>ojdbc11</artifactId>\n\
  \n<version>21.4.0.0.1</version>\n\n</dependency>\n\n您的应用程序的驱动程序可能不同，具体取决于您计划使用的数据库。例如，要使用\
  \ PostgreSQL 数据库，您需要从 [`jdbc.postgresql.org/`](https://jdbc.postgresql.org/) 下载驱动程序。\n\
  \n下载了数据库所需的驱动程序后，将它们添加到应用程序的 CLASSPATH 中。如果使用 IDE，您可以相应地调整应用程序项目的项目属性，以包含包含数据库驱动程序的\
  \ JAR 文件。如果您从命令行或终端工作，可以通过发出以下命令之一将驱动程序添加到 CLASSPATH，具体取决于您使用的操作系统平台。\n\n在基于 Unix\
  \ 的系统或 OS X 上使用以下命令：\n\nexport CLASSPATH=/<jar 的路径>/ojdbc11.jar\n\n在 Windows 上使用以下命令：\n\
  \nset CLASSPATH=C:\\<jar 的路径>\\ojdbc11.jar\n\n将 `<jar 的路径>` 替换为您计算机上 ojdbc jar 文件的实际路径。\n\
  \n您现在应该能够从应用程序中使用数据库了，但要部署到 GlassFish 应用服务器，您需要使数据库驱动程序对 GlassFish 可用。您可以通过将包含数据库驱动程序的\
  \ JAR 文件复制到 GlassFish 的 lib 目录来实现此目的。重新启动应用服务器实例，您就可以部署数据库应用程序了。\n\n工作原理\n\n\n\n\
  从应用程序中操作任何数据库的第一步，都是为所选的具体数据库供应商配置数据库驱动程序。无论你决定使用 Apache Derby、MySQL、PostgreSQL、Oracle、Microsoft\
  \ SQL 还是其他数据库，大多数数据库都提供了相应的 JDBC 驱动程序。此驱动程序必须添加到应用程序的 CLASSPATH 中，如果使用了集成开发环境（IDE），还需添加到\
  \ IDE 项目的 CLASSPATH 中。如果通过命令行或终端操作，每次打开新会话时都需要设置 CLASSPATH。如果使用 IDE，通常可以保存设置，只需配置一次即可。将数据库驱动程序添加到应用程序或项目\
  \ CLASSPATH 后，就可以开始操作数据库了。\n\n当需要将应用程序部署到服务器时，必须确保服务器能够访问该数据库驱动程序。你只需将数据库的驱动程序 JAR\
  \ 文件添加到 lib 目录并重启服务器即可。完成此操作后，就可以部署基于 JDBC 的应用程序，或者为数据库设置数据库连接池。有关如何使用标准 JDBC 连接从应用程序内部连接到数据库，或如何通过\
  \ GlassFish 或 Payara 应用服务器设置 JDBC 连接池的更多信息，请参阅配方 6-2。\n\n第 6 章 ■ 使用 Jakarta EE 进行\
  \ JDBC 编程\n\n6-3. 连接到数据库\n\n问题\n\n你需要连接到数据库，以便应用程序能够执行数据库事务。\n\n解决方案 #1\n\n在应用程序内部执行\
  \ JDBC 连接到数据库。通过创建一个新的 Connection 对象，然后加载特定数据库所需的驱动程序来实现。Connection 对象准备就绪后，调用其\
  \ getConnection() 方法。以下代码演示了如何获取与 Oracle 数据库的连接：\n\npublic class OracleConnection\
  \ {\n\nprivate final String HOST = \"myHost\"; // 数据库主机名\n\nprivate final String\
  \ PORT = \"1521\"; // 数据库端口\n\nprivate final String DB = \"myDatabase\"; // 数据库名称\n\
  \nprivate final String USER = \"user\"; // 数据库用户名\n\nprivate final String PASSWORD\
  \ = \"password\"; // 数据库密码\n\npublic static Connection getConnection() throws SQLException\
  \ {\n\nConnection conn = null;\n\nString jdbcUrl = \"jdbc:oracle:thin:@\" + HOST\
  \ + \":\"\n\n+ PORT + \":\" + DB;\n\nconn = DriverManager.getConnection(jdbcUrl,\
  \ USER, PASSWORD);\n\nSystem.out.println(\"Successfully connected\");\n\nreturn\
  \ conn;\n\n}\n\npublic static void main(String[] args) throws SQLException {\n\n\
  getConnection();\n\n}\n\n}\n\n此示例中展示的方法返回一个已准备好用于数据库访问的 Connection 对象。编译并执行上述 Java\
  \ 类后，控制台应打印消息 “Successfully connected”。\n\n解决方案 #2\n\n在应用服务器内配置一个数据库连接池，并从应用程序中连接到该连接池。\n\
  \n使用 DataSource 对象来创建连接池。DataSource 对象必须已在应用服务器环境中正确实现并部署。DataSource 对象实现并部署后，应用程序即可使用它来获取数据库连接。\n\
  \n■ **注意** 连接池是由应用服务器（容器管理的连接池）分配的一组相同的数据库连接，供应用程序用于各个客户端会话。\n\n![](img/index-342_1.jpg)\n\
  \n第 6 章 ■ 使用 Jakarta EE 进行 JDBC 编程\n\n要使用 GlassFish 管理控制台创建连接池，首先通过访问 http://localhost:4848（假设你与服务器在同一台机器上，并且你的\
  \ GlassFish 安装使用默认端口号），使用安装时指定的凭据登录控制台。\n\n成功登录控制台后，单击“资源”下的“JDBC”菜单，然后展开“JDBC 连接池”菜单，如图\
  \ 6-2 所示。\n\n***图 6-2.** 在 GlassFish 管理控制台中显示 JDBC 连接池* 单击“JDBC 连接池”屏幕上的“新建”按钮，它将导航至“新建\
  \ JDBC 连接池（步骤 1/2）”屏幕。在此处，你可以命名连接池、选择资源类型以及选择数据库驱动程序供应商。在本示例中，我使用的是 Oracle Database\
  \ 12c。因此，条目应如图 6-3 所示进行指定，不过你可以将连接池名称更改为你喜欢的名称。\n\n![](img/index-343_1.png)\n\n\
  ![](img/index-343_2.png)\n\n第 6 章 ■ 使用 Jakarta EE 进行 JDBC 编程\n\n***图 6-3.** 创建 GlassFish\
  \ JDBC 连接池*\n\n当下一个屏幕打开时，它应自动包含你的 Oracle 数据库 DataSource 类名映射，即 oracle.jdbc.pool.OracleDataSource。如果看起来不像图\
  \ 6-4，那么你可能尚未将 ojdbc8.jar 数据库驱动程序放入应用服务器的 **lib** 目录。请务必选中“Ping”选项旁边的“已启用”复选框。\n\
  \n***图 6-4.** 数据源类名自动填充*\n\n![](img/index-344_1.jpg)\n\n第 6 章 ■ 使用 Jakarta EE 进行\
  \ JDBC 编程\n\n最后，向下滚动到第二个屏幕的底部，并选中“附加属性”表中的所有属性，但 User、Password 和 URL 属性除外。请根据你要连接的数据库为这些属性指定信息，如图\
  \ 6-5 所示。相应填写后，单击“完成”按钮。\n\n***图 6-5.** 为你的数据库填充附加属性*\n\n单击“完成”后，你应该会看到一条消息，指示“ping”已成功。现在，你可以通过单击左侧树形菜单中的“JDBC\
  \ 资源”菜单来设置 JDBC 资源。当“JDBC 资源”屏幕出现时，单击“新建...”按钮。为你的资源输入一个 JNDI 名称，以 jdbc/ 开头，然后为你刚刚创建的数据库连接池选择连接池名称。屏幕应类似于图\
  \ 6-6。相应填写后，单击“确定”按钮以完成资源的创建。\n\n■ **注意** JNDI 是一种通信技术，允许应用程序在应用服务器容器内按名称与服务进行通信\
  \ (https://docs.oracle.com/javase/jndi/tutorial/getStarted/overview/index.html)。\n\
  \n![](img/index-345_1.jpg)\n\n第 6 章 ■ 使用 Jakarta EE 进行 JDBC 编程\n\n***图 6-6.** 创建\
  \ JDBC 资源*\n\n你可以使用以下代码通过 DataSource 对象获取数据库连接：\n\npublic static Connection getDSConnection()\
  \ {\n\nConnection conn = null;\n\ntry {\n\nContext ctx = new InitialContext();\n\
  \nDataSource ds = (DataSource)ctx.lookup(\"jdbc/OracleConnection\");\n\nconn = ds.getConnection();\n\
  \n} catch (NamingException | SQLException ex) {\n\nex.printStackTrace();\n\n}\n\n\
  return conn;\n\n}\n\n请注意，在 DataSource 实现中唯一需要的信息是一个有效的 DataSource 对象的名称。获取数据库连接所需的所有信息都在应用服务器内部进行管理。\n\
  \n工作原理\n\n你有几种选项可用于创建 Java 应用程序中使用的数据库连接。如果你正在编写独立或桌面应用程序，通常标准 JDBC 连接是最佳选择。然而，如果处理企业级或基于\
  \ Web 的应用程序，DataSource 对象可能是正确的选择。本配方的解决方案 #1 涵盖了前一种选项，它是在独立环境中创建数据库连接的最简单方法。我将首先通过解决方案\
  \ #1 介绍 JDBC 连接的创建。\n\n\n\n一旦确定了要使用的数据库，就需要为所选数据库供应商及其版本获取正确的驱动程序。有关获取驱动程序并将其放入\
  \ `CLASSPATH` 以供使用的更多信息，请参阅配方 6-1。将 JAR 文件放入 `CLASSPATH` 后，就可以使用 JDBC `DriverManager`\
  \ 来获取与数据库的连接。\n\n第 6 章 ■ 使用 Jakarta EE 的 JDBC\n\n■ **注意** 从 JDBC 4.0 版本开始，包含在 `CLASSPATH`\
  \ 中的驱动程序会自动加载到 `DriverManager` 对象中。如果你使用的是 4.0 之前的 JDBC 版本，则需要手动加载驱动程序。\n\n要使用 `DriverManager`\
  \ 获取与数据库的连接，需要向其传递一个包含 JDBC URL 的字符串。JDBC URL 由数据库供应商名称、托管数据库的服务器名称、数据库名称、数据库端口号，以及有权访问所需模式的有效数据库用户名和密码组成。很多时候，用于创建\
  \ JDBC URL 的值可以从属性文件中获取，这样在需要时可以轻松更改这些值。要了解有关使用属性文件存储连接值的更多信息，请参阅配方 6-4。用于为解决方案\
  \ #1 创建 JDBC URL 的代码如下所示：\n\n```java\nString jdbcUrl = \"jdbc:oracle:thin:@\" +\
  \ this.hostname + \":\" +\nthis.port + \":\" + this.database;\n```\n\n一旦所有变量都被替换到字符串中，它将类似于以下内容：`jdbc:oracle:thin:@hostname:1521:database`\n\
  \n创建 JDBC URL 后，可以将其传递给 `DriverManager.getConnection()` 方法以获取 `java.sql.Connection`\
  \ 对象。如果传递给 `getConnection()` 方法的信息不正确，将抛出 `java.sql.SQLException`；否则，将返回一个有效的 `Connection`\
  \ 对象。\n\n■ **注意** 示例中 `jdbcUrl` 连接字符串的前缀 `jdbc:oracle:thin` 表示你将使用位于 `ojdbc11.jar`\
  \ 中的 Oracle 驱动程序。`DriverManager` 负责建立关联。\n\n如果在应用程序服务器（如 GlassFish）上运行，获取连接的首选方式是使用\
  \ `DataSource`。要使用 `DataSource` 对象，你需要有一个应用程序服务器来部署它。任何符合规范的应用程序服务器，如 Apache TomEE、GlassFish、Oracle\
  \ WebLogic 或 Open Liberty 都可以。像 Payara Micro 这样的微服务容器也可以与 `DataSource` 配合使用。大多数应用程序服务器都包含一个管理\
  \ Web 界面，可用于轻松部署 `DataSource` 对象，例如本配方的解决方案 #2 中通过 GlassFish 演示的那样。但是，你也可以通过使用如下所示的代码手动部署\
  \ `DataSource` 对象：\n\n```java\norg.jakartaeerecipes.chapter5.recipe05_02.FakeDataSourceDriver\
  \ ds =\n    new org.jakartaeerecipes.chapter5.recipe05_02.FakeDataSourceDriver();\n\
  ds.setServerName(\"my-server\");\nds.setDatabaseName(\"JakartaEERecipes\");\nds.setDescription(\"\
  Database connection for Jakarta EE 8 Recipes\");\n```\n\n这段代码实例化了一个代表新 `DataSource`\
  \ 驱动类的类，然后根据要注册的数据库设置属性。此处演示的 `DataSource` 代码通常用于在应用程序服务器中注册 `DataSource`，或用于访问\
  \ JNDI 服务器。如果你使用基于 Web 的管理工具来部署 `DataSource`，应用程序服务器通常会在后台完成这项工作。大多数数据库供应商会随其 JDBC\
  \ 驱动程序一起提供 `DataSource` 驱动程序，因此如果正确的 JAR 文件位于应用程序或服务器的 `CLASSPATH` 中，它应该能被识别并可供使用。\n\
  \n一旦 `DataSource` 被实例化并配置好，下一步就是向 JNDI 命名服务注册该 `DataSource`。\n\n以下代码演示了如何使用 JNDI\
  \ 注册 `DataSource`：\n\n```java\ntry {\n    Context ctx = new InitialContext();\n\
  ```\n\n\nDataSource ds =\n\n(DataSource) ctx.bind(\"jdbc/OracleConnection\");\n\n\
  } catch (NamingException ex) {\n\nex.printStackTrace();\n\n}\n\n一旦 DataSource 部署完成，任何部署到同一应用服务器的应用程序都可以访问它。使用\
  \ DataSource 对象的美妙之处在于，你的应用程序代码无需知道数据库的任何连接信息（例如用户凭证）；它只需要知道 DataSource 的名称。按照惯例，DataSource\
  \ 的名称以 `jdbc/` 前缀开头，后跟一个标识符。要查找 DataSource 对象，需要使用 `InitialContext` 对象。`InitialContext`\
  \ 会检查应用服务器中所有可用的 DataSource，如果找到则返回一个有效的 DataSource；否则，它将抛出 `java.naming.NamingException`\
  \ 异常。在方案 #2 中，你可以看到 `InitialContext` 返回一个必须强制转换为 DataSource 的对象：\n\nContext ctx\
  \ = new InitialContext();\n\nDataSource ds = (DataSource)ctx.lookup(\"jdbc/OracleConnection\"\
  );\n\n如果 DataSource 是一个连接池缓存，那么当应用程序请求连接时，应用服务器会发送池中的一个可用连接。以下代码行从 DataSource 返回一个\
  \ Connection 对象：\n\nConnection conn = ds.getConnection();\n\n当然，如果无法获得有效连接，则会抛出\
  \ `java.sql.SQLException` 异常。DataSource 技术优于手动指定所有详细信息并将其传递给 `DriverManager`，因为数据库连接信息只存储在一个地方：应用服务器或微服务容器中，而不是每个应用程序内部。一旦部署了有效的\
  \ DataSource，它就可以被多个应用程序使用。\n\n当你的应用程序获得有效连接后，就可以用它来操作数据库。要了解有关使用 Connection 对象操作数据库的更多信息，请参阅本章中关于数据库操作的相关内容。\n\
  \n6-4. 处理数据库连接异常\n\n问题\n\n你的应用程序中的数据库活动抛出了异常。你需要处理该 SQL 异常，以防止应用程序崩溃。\n\n第 6 章 ■\
  \ 使用 Jakarta EE 的 JDBC\n\n解决方案\n\n使用 `try-catch` 块来捕获并处理 JDBC 连接或 SQL 查询抛出的任何 SQL\
  \ 异常。以下代码演示了如何实现 `try-catch` 块以捕获 SQL 异常：\n\ntry {\n\n// 执行数据库任务\n\n} catch (java.sql.SQLException){\n\
  \n// 执行异常处理\n\n}\n\n工作原理\n\n可以使用标准的 `try-catch` 块来捕获 `java.sql.SQLException` 异常。如果不处理这些异常，你的代码将无法编译，并且为了防止应用程序在抛出这些异常时崩溃，处理它们是一个好主意。几乎所有针对\
  \ `java.sql.Connection` 对象执行的操作都需要进行错误处理，以确保数据库异常得到正确处理。你需要确保在完成操作且不再使用 Connection\
  \ 对象后关闭连接。同样，关闭 `java.sql.Statement` 对象以清理内存分配也是一个好主意。\n\n由于 Statement 和 Connection\
  \ 对象需要关闭，通常使用 `try-with-resource` 来确保所有资源都得到妥善处理。你很可能看到类似以下风格的 JDBC 代码：\n\ntry (Connection\
  \ conn = DriverManager.getConnection(jdbcUrl)) {\n\n// 执行数据库任务\n\n} catch (java.sql.SQLException\
  \ ex) {\n\n// 执行异常处理\n\n}\n\n适当的异常处理有时会使 JDBC 代码编写起来相当繁琐，但它也能确保需要数据库访问的应用程序不会失败，从而导致数据丢失。\n\
  \n6-5. 简化连接管理\n\n问题\n\n你的应用程序需要使用数据库。为了操作数据库，你需要打开一个连接。\n\n\n\n与其每次需要访问数据库时都编写打开数据库连接的逻辑，不如简化连接过程。\n\
  \n解决方案\n\n编写一个类来处理应用程序内的所有连接管理。这样做将允许你调用该类来获取连接，而不是每次需要访问数据库时都设置一个新的 `Connection`\
  \ 对象。执行以下步骤为你的 JDBC 应用程序设置一个连接管理环境：\n\n第 6 章 ■ 使用 Jakarta EE 的 JDBC\n\n1.  创建一个名为\
  \ `CreateConnection.java` 的类，该类将封装应用程序的所有连接逻辑。\n2.  创建一个属性文件来存储你的连接信息。将该文件放在指定位置，以便\
  \ `CreateConnection` 类可以加载它。\n3.  使用 `CreateConnection` 类来获取你的数据库连接。\n\n■ **注意**\
  \ 如果使用应用服务器，你可以通过容器管理的连接池来处理类似的解决方案。但是，如果应用程序未部署到应用服务器容器中，那么构建一个如本解决方案中的连接管理工具是一个很好的替代方案。\n\
  \n以下代码是 `org.jakartaeerecipes.chapter06.CreateConnection` 类，可用于集中式连接管理：\n\n```java\n\
  package org.jakartaeerecipes.chapter06;\n\nimport java.io.File;\nimport java.io.FileInputStream;\n\
  import java.io.FileNotFoundException;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
  import java.nio.file.FileSystems;\nimport java.nio.file.Files;\nimport java.sql.Connection;\n\
  import javax.sql.DataSource;\nimport java.sql.DriverManager;\nimport java.sql.SQLException;\n\
  import java.util.Properties;\nimport javax.naming.Context;\nimport javax.naming.InitialContext;\n\
  import javax.naming.NamingException;\n\npublic final class CreateConnection {\n\n\
  \    static Properties props = new Properties();\n    static String hostname = null;\n\
  \    static String port = null;\n    static String database = null;\n    static\
  \ String username = null;\n    static String password = null;\n    static String\
  \ jndi = null;\n\n    public CreateConnection() {\n    }\n\n    public static void\
  \ loadProperties() {\n        // 如果主机名已加载则返回\n        if(hostname != null){\n  \
  \          return;\n        }\n\n        try(InputStream in = Files.newInputStream(FileSystems.getDefault().getPath(System.\n\
  \                getProperty(\"user.dir\")\n                + File.separator + \"\
  db_props.properties\"));) {\n            // 在项目 src 目录的根目录中查找属性文件\n            System.out.println(FileSystems.getDefault().getPath(System.\n\
  \                    getProperty(\"user.dir\")\n                    + File.separator\
  \ + \"db_props.properties\"));\n            props.load(in);\n        } catch (IOException\
  \ ex) {\n            ex.printStackTrace();\n        }\n\n        hostname = props.getProperty(\"\
  host_name\");\n        port = props.getProperty(\"port_number\");\n        database\
  \ = props.getProperty(\"db_name\");\n        username = props.getProperty(\"username\"\
  );\n        password = props.getProperty(\"password\");\n        jndi = props.getProperty(\"\
  jndi\");\n        System.out.println(hostname);\n    }\n\n    public static Connection\
  \ getConnection() throws SQLException {\n        Connection conn = null;\n     \
  \   String jdbcUrl = \"jdbc:oracle:thin:@\" + hostname + \":\"\n               \
  \ + port + \":\" + database;\n        conn = DriverManager.getConnection(jdbcUrl,\
  \ username, password);\n        System.out.println(\"Successfully connected\");\n\
  \        return conn;\n    }\n\n    public static Connection getDSConnection() {\n\
  \        Connection conn = null;\n        try {\n            Context ctx = new InitialContext();\n\
  \            DataSource ds = (DataSource) ctx.lookup(jndi);\n            conn =\
  \ ds.getConnection();\n        } catch (NamingException | SQLException ex) {\n \
  \           ex.printStackTrace();\n        }\n        return conn;\n    }\n\n  \
  \  public static void main(String[] args) {\n        Connection conn = null;\n \
  \       try {\n            CreateConnection.loadProperties();\n            System.out.println(\"\
  Beginning connection..\");\n            conn = CreateConnection.getConnection();\n\
  \            //performDbTask();\n        } catch (java.sql.SQLException ex) {\n\
  \            ex.printStackTrace();\n        } finally {\n            if (conn !=\
  \ null) {\n                try {\n                    conn.close();\n          \
  \      } catch (SQLException ex) {\n                    ex.printStackTrace();\n\
  \                }\n            }\n        }\n    }\n}\n```\n\n接下来，以下代码行是用于获取数据库连接的属性文件应包含内容的示例。在此示例中，属性文件名为\
  \ `db_props.properties`：\n\n```\nhost_name=your_db_server_name\ndb_name=your_db_name\n\
  username=db_username\npassword=db_username_password\nport_number=db_port_number\n\
  jndi=jndi_connection_string\n```\n\n最后，使用 `CreateConnection` 类为你的应用程序获取连接。以下代码演示了这一概念：\n\
  \n```java\nConnection conn = null;\ntry {\n    CreateConnection.loadProperties();\n\
  \    System.out.println(\"Beginning connection..\");\n    conn = CreateConnection.getConnection();\n\
  \    //performDbTask();\n} catch (java.sql.SQLException ex) {\n    System.out.println(ex);\n\
  } finally {\n    if (conn != null) {\n        try {\n            conn.close();\n\
  \        } catch (SQLException ex) {\n            ex.printStackTrace();\n      \
  \  }\n    }\n}\n```\n\n■ **注意** 你可以更新此代码以使用 `try-with-resources` 语法来消除 `finally`\
  \ 块的要求。但是，我展示此语法是为了演示如何确保 `Connection` 对象被关闭，如果你没有使用 `try-with-resources` 的话。\n\n\
  要运行代码进行测试，请执行 `org.jakartaeerecipes.chapter06.CreateConnection` 类，因为它包含一个用于测试目的的\
  \ `main` 方法。\n\n第 6 章 ■ 使用 Jakarta EE 的 JDBC\n\n工作原理\n\n在数据库应用程序中获取连接可能涉及大量代码。此外，如果每次需要获取连接时都重新输入代码，该过程容易出错。通过将数据库连接逻辑封装在单个类中，你可以在每次需要连接到数据库时重用相同的连接代码。这提高了你的生产力，减少了输入错误的可能性，并且还增强了可管理性，因为如果你需要进行更改，可以在一个地方进行，而不是在多个不同的位置。\n\
  \n创建一种策略性的连接方法对你以及将来可能需要维护你代码的其他人都有好处。尽管在使用应用服务器或 JNDI 时，数据源是管理数据库连接的首选技术，但本配方的解决方案演示了如何使用标准的\
  \ JDBC `DriverManager` 连接。使用 `DriverManager` 的一个安全问题是，你需要将数据库凭据存储在某个地方供应用程序使用。将这些凭据以明文形式存储在任何地方都是不安全的，将它们嵌入到应用程序代码中也是不安全的，因为代码将来可能会被反编译。如解决方案所示，使用一个位于磁盘上的属性文件来存储数据库凭据。假设此属性文件在部署到服务器之前的某个时刻会被加密。\n\
  \n如解决方案所示，代码从属性文件中读取数据库凭据、主机名、数据库名称和端口号。然后将这些信息拼接起来形成一个 JDBC URL，`DriverManager`\
  \ 可以使用该 URL 来获取与数据库的连接。一旦获取到连接，就可以在任何地方使用它，然后关闭它。类似地，如果使用已部署到应用服务器的 `DataSource`，则可以使用属性文件来存储\
  \ JNDI 连接。这是使用 `DataSource` 获取数据库连接所需的唯一信息。对于开发人员来说，这两种连接类型之间的唯一区别是为了获取 `Connection`\
  \ 对象而调用的方法名称，在示例中分别是 `getDSConnection()` 或 `getConnection()`。\n\n\n\n您可以开发一个 JDBC\
  \ 应用程序，但这样用于获取连接的代码就需要在整个程序中硬编码。而本方案则能将所有获取连接的代码封装到单个类中，使开发者无需为此操心。这种技术还能让代码更易于维护。例如，如果应用程序最初使用\
  \ DriverManager 部署，但后来需要改用 DataSource，只需修改极少量代码即可。\n\n6-6\\. 查询数据库\n\n问题\n\n公司数据库中有一个包含作者信息的表，您需要查询该表以检索记录。\n\
  \n解决方案\n\n使用配方 6-2 或 6-4 中介绍的技术之一获取 JDBC 连接；然后使用`java.sql.Connection`对象创建`Statement`对象。`java.sql.Statement`对象包含`executeQuery`方法，可用于解析文本字符串并查询数据库。执行查询后，您可以将查询结果检索到`ResultSet`对象中。以下示例摘自`org.jakartaeerecipes.chapter06.dao.AuthorDAO`类，它查询名为`BOOK_AUTHOR`的数据库表，并将结果打印到服务器日志：\n\
  \n![](img/index-353_1.png)\n\n第 6 章 ■ 使用 Jakarta EE 的 JDBC\n\n```java\npublic void\
  \ queryBookAuthor() {\n\n    final String qry = \"select id, first, last, bio from\
  \ book_author\";\n\n    CreateConnection.loadProperties();\n\n    try (Connection\
  \ conn = CreateConnection.getConnection();\n\n         Statement stmt = conn.createStatement();\n\
  \n         ResultSet rs = stmt.executeQuery(qry)) {\n\n        while (rs.next())\
  \ {\n\n            int author_id = rs.getInt(\"ID\");\n\n            String first_name\
  \ = rs.getString(\"FIRSTNAME\");\n\n            String last_name = rs.getString(\"\
  LASTNAME\");\n\n            String bio = rs.getString(\"BIO\");\n\n            System.out.println(author_id\
  \ + \"\\t\" + first_name\n\n                    + \" \" + last_name + \"\\t\" +\
  \ bio);\n\n        }\n\n    } catch (SQLException e) {\n\n        e.printStackTrace();\n\
  \n    }\n\n}\n```\n\n针对本书附带的数据库模式执行此方法，考虑到每个作者记录的`BIO`列均为空，将产生如图 6-7 所示的结果。\n\n\
  ***图 6-7.** AuthorDAO 类的 queryBookAuthor()方法的输出*\n\n**工作原理**\n\n对数据库执行的最常见操作之一就是查询。使用\
  \ JDBC 执行数据库查询相当简单，尽管每次执行查询时都需要使用一些样板代码。首先，您需要为要查询的数据库和模式获取一个`Connection`对象。您可以使用配方\
  \ 6-2 中的解决方案之一来完成此操作。接下来，您需要构建一个查询并将其存储为字符串格式。然后通过调用`loadProperties()`方法加载`CreateConnection`属性，这确保使用`db_props.properties`文件来填充数据库连接信息。接着，使用`try-with-resources`子句创建查询数据库所需的对象。由于这些对象是在`try-with-resources`中实例化的，因此一旦不再使用，它们将自动关闭。然后使用`Connection`对象创建`Statement`。您的查询字符串将传递给`Statement`对象的`executeQuery`方法，以实际查询数据库：\n\
  \n第 6 章 ■ 使用 Jakarta EE 的 JDBC\n\n```java\nString qry = \"select ID, FIRSTNAME,\
  \ LASTNAME, BIO from book_author\";\n\nCreateConnection.loadProperties();\n\ntry\
  \ (Connection conn = CreateConnection.getConnection();\n\n     Statement stmt =\
  \ conn.createStatement();\n\n     ResultSet rs = stmt.executeQuery(qry);) {\n\n\
  \    . . .\n```\n\n如您所见，`Statement`对象的`executeQuery`方法接受一个字符串并返回一个`ResultSet`对象。`ResultSet`对象使处理查询结果变得容易，您可以按任何顺序获取所需的信息。如果您查看下一行代码，会在`ResultSet`对象上创建一个`while`循环。此循环将继续调用`ResultSet`对象的`next`方法，每次迭代获取查询返回的下一行。在本例中，`ResultSet`对象名为`rs`，因此只要`rs.next()`返回`true`，循环就会继续处理。一旦处理完所有返回的行，`rs.next()`将返回`false`，表示没有更多行需要处理。\n\
  \n在`while`循环内，处理每一行返回的数据。每次遍历都会解析`ResultSet`对象以获取指定列名的值。请注意，如果预期列返回字符串，则必须调用`ResultSet`的`getString()`方法，并以字符串格式传递列名。类似地，如果预期列返回整数，则应调用`ResultSet`的`getInt()`方法，并以字符串格式传递列名。其他数据类型也是如此。这些方法将返回相应的列值。在本配方的解决方案示例中，这些值被存储到局部变量中：\n\
  \n```java\nint author_id = rs.getInt(\"ID\");\n\nString first_name = rs.getString(\"\
  FIRSTNAME\");\n\nString last_name = rs.getString(\"LASTNAME\");\n\nString bio =\
  \ rs.getString(\"BIO\");\n```\n\n获取列值后，您可以对存储在局部变量中的值进行任何操作。在本例中，它们通过`System.out.println()`方法打印出来。\n\
  \n请注意，此示例中使用了`try-catch-finally`块。尝试查询数据库时可能会抛出`java.sql.SQLException`（例如，如果`Connection`对象未正确获取，或者您尝试查询的数据库表不存在）。您必须提供异常处理来处理这些情况下的错误。因此，所有数据库处理代码都应放在`try`块内。然后`catch`块处理`SQLException`，因此如果抛出异常，将使用`catch`块内的代码进行处理。听起来很简单，对吧？确实如此，但每次执行数据库查询时都必须这样做。这意味着大量的样板代码。在`finally`块内，您会看到如果`Statement`和`Connection`对象不为`null`，则它们会被关闭。\n\
  \n■ **注意** 执行这些任务还会带来处理`java.sql.SQLException`的开销。如果尝试关闭一个`null`对象，可能会发生这种情况。关闭打开的语句和连接始终是一个好习惯。这将有助于确保系统能够根据需要重新分配资源，并对数据库保持尊重。尽快关闭连接非常重要，以便其他进程可以重用它们。\n\
  \n第 6 章 ■ 使用 Jakarta EE 的 JDBC\n\n6-7\\. 执行 CRUD 操作\n\n问题\n\n您需要能够从企业应用程序中执行标准数据库操作。也就是说，您需要能够创建、检索、更新和删除（CRUD）数据库记录。\n\
  \n解决方案\n\n创建一个`Connection`对象，并使用配方 6-2 中提供的解决方案之一获取数据库连接；然后使用从`java.sql.Connection`对象获取的`java.sql.Statement`对象执行\
  \ CRUD 操作。以下代码取自`org.jakartaeerecipes.chapter06.recipe05_06.AuthorDAOStandard.java`，演示了如何使用\
