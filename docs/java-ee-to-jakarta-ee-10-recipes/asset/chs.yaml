  \nHttpURLConnection conn = (HttpURLConnection) url.openConnection();\n\nconn.setChunkedStreamingMode(2);\n\
  \nconn.setDoOutput(true);\n\nconn.connect();\n\nif (in != null) {\n\nInputStreamReader\
  \ inReader = new InputStreamReader(in);\n\nBufferedReader reader = new BufferedReader(inReader);\n\
  \n\n\n```java\nString text = \"\";\n\nout.println(\"Beginning Read\");\n\ntry (BufferedWriter\
  \ output = new BufferedWriter(new OutputStreamWriter(conn.\n\ngetOutputStream())))\
  \ {\n\nout.println(\"got the output...beginning loop\");\n\nwhile ((text = reader.readLine())\
  \ != null) {\n\nout.println(\"reading text: \" + text);\n\nout.flush();\n\noutput.write(text);\n\
  \nThread.sleep(1000);\n\noutput.write(\"Ending example now..\");\n\nout.flush();\n\
  \n}\n\noutput.flush();\n\noutput.close();\n\n}\n\n}\n\nout.println(\"Review the\
  \ Glassfish server log for messages...\");\n\nout.println(\"</body>\");\n\nout.println(\"\
  </html>\");\n\n} catch (InterruptedException | IOException ex) {\n\nLogger.getLogger(ReaderExample.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n\n}\n\n}\n\n// Http Servlet Methods ...\n\n...\n\n}\n```\n\n当访问该 Servlet\
  \ 时，将执行对 `test.txt` 文件的异步非阻塞读取，其文本内容将显示在服务器日志中。\n\n第 1 章 ■ Jakarta Servlet\n\n工作原理\n\
  \n自 Servlet 技术诞生以来，在请求处理过程中仅允许传统的（阻塞式）输入/输出。在 Servlet 3.1 版本中，引入了非阻塞 I/O API，使得\
  \ Servlet 能够无阻塞地进行读写操作。这意味着在读写操作进行的同时，可以执行其他任务，无需等待。\n\n为了实现非阻塞 I/O 解决方案，Servlet\
  \ 3.1 版本为 `ServletInputStream` 和 `ServletOutputStream` 添加了编程接口，以及两个事件监听器：`ReadListener`\
  \ 和 `WriteListener`。`ReadListener` 和 `WriteListener` 接口通过回调方法使 Servlet I/O 处理以非阻塞方式进行，这些回调方法在可以无阻塞地读取或写入\
  \ Servlet 内容时被调用。使用 `ServletInputStream.setReadListener(ServletInputStream, AsyncContext)`\
  \ 方法向 `ServletInputStream` 注册一个 `ReadListener`，并使用 `ServletInputStream.setWriteListener(ServletOutputStream,\
  \ AsyncContext)` 方法注册一个 `WriteListener`。以下代码行演示了如何向 `ServletInputStream` 注册一个 `ReadListener`\
  \ 实现：\n\n```java\nAsyncContext context = request.startAsync();\nServletInputStream\
  \ input = request.getInputStream();\ninput.setReadListener(new ReadListenerImpl(input,\
  \ context));\n```\n\n■ **注意** 在 Servlet 3.0 中，引入了 `AsyncContext` 来表示在 Servlet 请求上发起的异步操作的执行上下文。要使用异步上下文，Servlet\
  \ 应被注解为 `@WebServlet`，并且该注解的 `asyncSupported` 属性必须设置为 `true`。`@WebFilter` 注解也包含\
  \ `asyncSupported()` 属性。\n\n在向 `ServletInputStream` 注册监听器后，可以通过调用 `ServletInputStream.isReady()`\
  \ 和 `ServletInputStream.isFinished()` 方法来检查非阻塞读取的状态。\n\n例如，一旦 `ServletInputStream.isReady()`\
  \ 方法返回 `true`，就可以开始读取，如下所示：\n\n```java\nwhile (is.isReady() && (b = input.read())\
  \ != -1)) {\n    len = is.read(b);\n    String data = new String(b, 0, len);\n}\n\
  ```\n\n要创建 `ReadListener` 或 `WriteListener`，必须重写三个方法：`onDataAvailable()`、`onAllDataRead()`\
  \ 和 `onError()`。当有数据可读或可写时，会调用 `onDataAvailable()` 方法；当所有数据都已读取或写入完毕后，会调用 `onAllDataRead()`\
  \ 方法；如果遇到错误，则会调用 `onError()` 方法。本方案解决方案中的 `AcmeReadListenerImpl` 代码演示了如何重写这些方法。\n\
  \n在 `onAllDataRead()` 方法中调用 `AsyncContext.complete()` 方法，以指示读取已完成并提交响应。该方法也在 `onError()`\
  \ 实现中被调用，以便读取能够完成，因此，在 `onError()` 方法体内执行任何清理工作以确保不泄漏资源等非常重要。\n\n要实现 `WriteListener`，请使用\
  \ `ServletOutputStream.canWrite` 方法，该方法确定是否能够以非阻塞方式写入数据。`WriteListener` 实现类必须重写以下方法：`onWritePossible()`\
  \ 和 `onError()`。当可以进行非阻塞写入时，会调用 `onWritePossible()` 方法。写入实现应在此方法体内进行。`onError()`\
  \ 方法与其对应的 `ReadListener` 实现非常相似，因为它是在发生错误时被调用的。\n\n![](img/index-96_1.png)\n\n第\
  \ 1 章 ■ Jakarta Servlet\n\n以下代码行演示了如何向 `ServletOutputStream` 注册一个 `WriteListener`：\n\
  \n```java\nAsyncContext context = request.startAsync();\nServletOutputStream os\
  \ = response.getOutputStream();\nos.setWriteListener(new WriteListenerImpl(os, context));\n\
  ```\n\n`WriteListener` 实现类必须包含对 `onWritePossible()` 和 `onError()` 的重写方法。以下是 `WriteListener`\
  \ 实现类的示例：\n\n```java\nimport jakarta.servlet.AsyncContext;\nimport jakarta.servlet.ServletOutputStream;\n\
  import jakarta.servlet.WriteListener;\n\npublic class WriteListenerImpl implements\
  \ WriteListener {\n    ServletOutputStream os;\n    AsyncContext context;\n\n  \
  \  public WriteListenerImpl(ServletOutputStream out, AsyncContext ctx){\n      \
  \  this.os = out;\n        this.context = ctx;\n        System.out.println(\"Write\
  \ Listener Initialized\");\n    }\n\n    @Override\n    public void onWritePossible()\
  \ {\n        System.out.println(\"Now possible to write...\");\n        // Write\
  \ implementation here...\n    }\n\n    @Override\n    public void onError(Throwable\
  \ throwable) {\n        System.out.println(\"Error occurred\");\n        context.complete();\n\
  \    }\n}\n```\n\n■ **注意** 在大多数情况下，`ReadListener` 和 `WriteListener` 实现类可以嵌入到调用它们的\
  \ Servlet 中。在本书的示例中，为了演示目的，它们被拆分成了单独的类。\n\n非阻塞 I/O API 有助于使 Servlet API 符合当前的 Web\
  \ 标准，同时使得创建以异步方式良好运行的基于 Web 的应用程序成为可能。\n\n***图 1-19.** DisplayCookieServlet Servlet\
  \ 输出*\n\n第 1 章 ■ Jakarta Servlet\n\n1-19. 从服务器向客户端推送资源\n\n问题\n\n您希望在用户访问 Web 应用程序中的特定页面时，自动将资源推送到客户端，而不是发送多个请求。\n\
  \n解决方案\n\n使用 Servlet HTTP/2 推送 API 在页面加载之前推送资源。这将导致所有资源都包含在单个响应中，而不是像 HTTP 1.1 实现中那样需要多个响应。在以下示例中，创建了一个\
  \ `PushBuilder`，然后在加载页面之前将一些静态类型的资源推送到客户端：\n\n```java\n@WebServlet(name = \"PushServlet\"\
  , urlPatterns = {\"/PushServlet\"})\npublic class PushServlet extends HttpServlet\
  \ {\n\n    protected void processRequest(HttpServletRequest request,\n         \
  \                         HttpServletResponse response) throws ServletException,\
  \ IOException {\n        response.setContentType(\"text/html;charset=UTF-8\");\n\
  \        try (PrintWriter out = response.getWriter()) {\n            out.printf(\"\
  \"\"<html>\n<head>\n<title>Push Servlet</title>\");\n</head>\n<body>\n<h1>Servlet\
  \ PushServlet at %s!</h1>\n</body>\n</html>\"\"\",request.getContextPath());\n \
  \       }\n    }\n\n    @Override\n    protected void doGet(HttpServletRequest request,\
  \ HttpServletResponse response)\n            throws ServletException, IOException\
  \ {\n        System.out.println(\"In the servlet\");\n        if (request.getRequestURI().equals(\"\
  /JakartaEERecipes/PushServlet\")\n                && request.getPushBuilder() !=\
  \ null) {\n            System.out.println(\"Pushing resources\");\n            PushBuilder\
  \ builder =\n                    request.newPushBuilder().path(\"/resources/images/jakartaee10recipes.png\"\
  );\n            builder.path(\"/resources/images/jakartaee10recipes.png\");\n  \
  \          builder.push();\n        }\n        processRequest(request, response);\n\
  \    }\n    . . .\n}\n```\n\n第 1 章 ■ Jakarta Servlet\n\n工作原理\n\n\n\n从 Web 提供内容的一个显著问题始终是请求与响应的生命周期。HTTP\
  \ 1.1 需要多个 TCP 连接发出并行请求，才能加载包含 JavaScript 文件和图像等各种资源的页面内容。这不仅会导致严重的性能问题，还会耗尽网络资源。HTTP/2\
  \ 则根本不同，它是完全多路复用的，而非有序且阻塞的。它还允许使用单个连接并行发出请求，从而显著提升性能并大幅减少网络资源占用。HTTP/2 的其他区别包括：使用头部压缩来减少开销，并允许服务器主动向活跃客户端推送资源。本示例中涵盖了\
  \ HTTP/2 的后一项特性，即由服务器推送资源，而非让客户端自行获取每个所需资源。\n\n`PushBuilder` 接口随 Servlet 4.0 引入，后者是\
  \ Java EE 8 和 Jakarta EE 平台的一部分。`PushBuilder` 用于基于 `HttpServletRequest` 构建推送请求。获取\
  \ `PushBuilder` 后，可通过 `path()` 方法添加资源，这些资源将在目标页面处理期间被推送给客户端。在示例中，使用 `path` 方法添加了一个\
  \ PNG 图像资源。然而，应用程序可以编码为：特定页面所需的任何资源都可以抢先推送给客户端并加载到浏览器缓存中。获取 `PushBuilder` 后，可根据需要多次使用。加载完所有资源后，调用\
  \ `PushBuilder.push()` 方法执行推送操作。\n\n资源推送完成后，将加载被调用的页面来处理资源，判断哪些资源已被缓存，哪些需要从服务器推送加载。\n\
  \n如果客户端浏览器缓存中已有该资源，则会返回一个 `RST_STREAM` 以指示服务器无需发送该资源。\n\n**第 2 章**\n\n**Jakarta\
  \ Server Pages**\n\n与 Jakarta Servlet API 相比，Jakarta Server Pages Web 框架为 Java Web\
  \ 开发者的生产力带来了巨大提升。Jakarta Server Pages 是一个允许 Web 开发者快速创建动态在线内容的框架。它可以包含可扩展标记语言（XML）或超文本标记语言（HTML），甚至可以在\
  \ *scriptlet*（脚本代码片段）中嵌入 Java 代码。Jakarta Server Pages 框架易于掌握，允许开发者快速生成动态内容，同时还能使用他们偏好的\
  \ HTML 编辑器创建美观的网站。Jakarta Server Pages 开发于多年前，至今仍是至关重要的 Java Web 技术之一。尽管它随着时间的推移不断演进，但许多应用程序仍在使用其旧版本。\n\
  \n如今，动态 Web 内容的开发已变得更加稳定，用于创建 Web 应用程序的技术在未来也更容易维护。标记与业务逻辑的分离正变得越来越重要。早期版本的 Jakarta\
  \ Server Pages 通常以 Java 和 XML 语法混合编写。而如今的 Jakarta Server Pages 相比其前身或其他竞争性 Web 框架，要求标记与业务逻辑之间有更清晰的区分。\n\
  \nWeb 环境的这些变化已被更新版本的 Jakarta Server Pages 所适应，它为开发者提供了更多自由，无需嵌入任何 Java 代码，而是利用页面内的标记和自定义标签来创建高度动态的内容。\n\
  \n本章将向您展示 Jakarta Server 开发的方方面面。从创建一个简单的 Jakarta Server 应用程序开始，您将学习如何从头开始使用 Jakarta\
  \ Server 技术开发应用程序，并充分利用该技术所提供的生产力和强大功能。本章还涉及高级技术，例如开发自定义 Jakarta Server 标签以及利用条件标签调用\
  \ Java 函数。本章中的示例为您奠定了坚实的基础，使您能够开始使用 Jakarta Server Pages 开发应用程序。\n\n■ **注意** 在使用基于\
  \ Java 的 Web 技术（如 Jakarta Server Pages）进行开发时，利用集成开发环境（IDE）可以节省大量时间。请参阅本书附录，了解如何在\
  \ NetBeans IDE 中开发 Jakarta Server Pages 应用程序。\n\n2-1. 创建一个简单的 Jakarta Server Page\n\
  \n问题\n\n您希望使用 HTML 标记开发一个能够包含动态内容的网页。\n\n© Josh Juneau 和 Tarun Telang 2022\nJ. Juneau\
  \ 和 T. Telang，《Java EE 到 Jakarta EE 10 实战》[，https://doi.org/10.1007/978-1-4842-8079-9_2](https://doi.org/10.1007/978-1-4842-8079-9_2#DOI)\n\
  \n![](img/index-100_1.png)\n\n第 2 章 ■ Jakarta Server Pages\n\n解决方案\n\n使用 Jakarta\
  \ Server Pages 创建一个结合标准标记与嵌入在标记中的 Java 代码块的网页。在 `/webapp` 文件夹内创建一个名为 `recipe02_01.jsp`\
  \ 的 jsp 文件。\n\n项目文件夹结构如图 2-1 所示，供您参考。\n\n***图 2-1.** IntelliJ IDEA 项目文件夹结构*\n\n\
  以下 Jakarta Server Page 标记演示了如何在页面中包含动态代码：\n\n```jsp\n<%@page contentType=\"text/html\"\
  \ pageEncoding=\"UTF-8\"%>\n<!DOCTYPE html>\n<html>\n<head>\n<meta http-equiv=\"\
  Content-Type\" content=\"text/html; charset=UTF-8\">\n<title>Jakarta Server Page\
  \ 示例</title>\n</head>\n<body>\n<jsp:useBean id=\"dateBean\" scope=\"application\"\
  \ class=\"org.jakartaeerecipe.chapter02.\nrecipe02_01.DateBean\"/>\nHello World!<br/>\n\
  当前日期是：${dateBean.currentDate}!\n</body>\n</html>\n```\n\n![](img/index-101_1.png)\n\
  \n第 2 章 ■ Jakarta Server Pages\n\n该代码使用一个 JavaBean 将当前日期拉取到页面中。以下 Java 代码是 Jakarta\
  \ Server Page 代码所使用的 JavaBean：\n\n```java\npackage org.jakartaeerecipe.chapter02.recipe02_01;\n\
  import java.util.Date;\npublic class DateBean {\n    private Date currentDate =\
  \ new Date();\n    /**\n     * @return the currentDate\n     */\n    public Date\
  \ getCurrentDate() {\n        return currentDate;\n    }\n    /**\n     * @param\
  \ currentDate the currentDate to set\n     */\n    public void setCurrentDate(Date\
  \ currentDate) {\n        this.currentDate = currentDate;\n    }\n}\n```\n\n输出结果将如图\
  \ 2-2 所示。当然，当您运行代码时，页面将显示当前日期。\n\n***图 2-2.** Jakarta Server Pages 示例 02-01 输出*\n\
  \n工作原理\n\nJakarta Server Pages 技术通过提供一组标签和值表达式，将动态 Java 字段暴露给网页，从而使得开发能够同时利用静态和动态\
  \ Web 内容的网页变得简单。使用 Jakarta Server Page 技术，页面开发者可以访问底层的 JavaBean 类，在客户端和服务器之间传递内容。在本示例中，使用\
  \ Jakarta Server Page 来显示从服务器上的 JavaBean 类获取的当前日期和时间。因此，当用户在浏览器中访问该 Jakarta Server\
  \ Page 时，将显示服务器上的当前时间和日期。\n\n\n\n一个标准基于 HTML 的 Jakarta 服务器页面应具有.jsp 扩展名。其他类型的 Jakarta\
  \ 服务器页面包含不同的扩展名；其中一种是具有.jspx 扩展名的 Jakarta 服务器页面文档类型。Jakarta 服务器页面文档是一种基于 XML 的格式良好的\
  \ Jakarta 服务器页面。您可以在配方 2-6 中了解更多关于 Jakarta 服务器页面文档的信息。Jakarta 服务器页面可以包含 HTML 标记、特殊的\
  \ Jakarta 服务器页面标签、页面指令、JavaScript、嵌入式 Java 代码等。此示例包含`<jsp:useBean>`标签，以及一个用于显示 JavaBean\
  \ 中字段内容的值表达式。`<jsp:useBean>`标签用于包含对将在 Jakarta 服务器页面标记中引用的 Java 类的引用。在本例中，被引用的类名为`org.jakartaeerecipe.chapter02.recipe02_01.DateBean`，并且在页面内将作为`dateBean`被引用。有关`<jsp:useBean>`标签的完整描述，请参考配方\
  \ 2-3。\n\n<jsp:useBean id=\"dateBean\" scope=\"application\" class=\"org.jakartaeerecipe.chapter02.\n\
  recipe02_01.DateBean\"/>\n\n由于`<jsp:useBean>`标签包含对`DateBean` Java 类的引用，包含该标签的 Jakarta\
  \ 服务器页面可以使用该类中包含的任何公共字段或方法，或者通过公共“getter”方法访问私有字段。这一点通过使用表达式语言值表达式来演示，该表达式包含在`${}`字符中。要了解更多关于\
  \ Jakarta 表达式语言表达式的信息，请参见配方 2-4。在示例中，名为`currentDate`的 JavaBean 字段的值显示在页面上。\n\n私有字段的值通过公共“getter”方法`getCurrentDate`自动检索。\n\
  \n当前日期是：${dateBean.currentDate}!\n\n**JAKARTA 服务器页面的生命周期**\n\nJakarta 服务器页面的生命周期与\
  \ Java servlet 的生命周期非常相似。这是因为 Jakarta 服务器页面在后台由一个特殊的 servlet 转换为 servlet（`HttpJspBase`类）。当请求发送到\
  \ Jakarta 服务器页面时，该特殊 servlet 会检查以确保 Jakarta 服务器页面的 servlet 不比页面本身更旧。如果是，则 Jakarta\
  \ 服务器页面会重新转换为 servlet 类并进行编译。Jakarta 服务器页面到 servlet 的转换是自动的，这使得 Jakarta 服务器页面非常高效。\n\
  \n当 Jakarta 服务器页面被转换时，会自动创建一个名称类似于`0002f<name>_jsp.java`的 servlet，其中`<name>`是 Jakarta\
  \ 服务器页面的名称。如果在转换过程中出现错误，这些错误将在显示 Jakarta 服务器页面响应时显示。\n\n在转换为 Java servlet 的过程中，Jakarta\
  \ 服务器页面的不同部分会被区别对待。\n\n如果 Jakarta 服务器页面的 servlet 尚不存在，则容器会执行以下操作：\n\n• 模板数据被转换为代码。\n\
  • Jakarta 服务器页面脚本元素被插入到 Jakarta 服务器页面的 servlet 类中。\n• `<jsp:XXX .../>`元素被转换为方法调用。\n\
  \n转换后，其生命周期与 servlet 生命周期类似：\n\n1. 加载 servlet 类\n2. 实例化 servlet 类\n3. 通过调用`jspInit`方法初始化\
  \ servlet 实例\n\n本配方仅包含关于 Jakarta 服务器页面技术可能性的入门知识。要了解更多关于该技术以及使用 Jakarta 服务器页面时的最佳实践，请继续阅读本章中的其他配方。\n\
  \n![](img/index-103_1.jpg)\n\n**2-2. 将 Java 嵌入到 Jakarta 服务器页面中**\n\n**问题**\n\n您希望将一些\
  \ Java 代码嵌入到标准的 Jakarta 服务器页面网页中，以实现动态内容创建。\n\n**解决方案**\n\n使用 Jakarta 服务器页面脚本元素将\
  \ Java 代码嵌入到页面中，然后显示 Java 字段内容。在`/webapp`文件夹内创建一个名为`recipe02_02.jsp`的 jsp 文件。以下\
  \ Jakarta 服务器页面代码演示了如何导入 Java `Date`类，然后使用它来获取当前日期，而无需使用服务器端的 JavaBean 类：\n\n<%@page\
  \ import=\"java.util.Date\"%>\n<%@page contentType=\"text/html\" pageEncoding=\"\
  UTF-8\"%>\n<%! Date currDate = null; %>\n<% currDate = new Date(); %>\n<html>\n\
  <head>\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\">\n\
  <title>Jakarta 服务器页面示例</title>\n</head>\n<body>\nHello World!<br/>\n当前日期是：<%= currDate\
  \ %>\n</body>\n</html>\n\n此页面将显示托管 Jakarta 服务器页面应用程序的服务器上的当前系统日期。图 2-3 显示了本配方的输出。\n\
  \n***图 2-3.** Jakarta 服务器页面配方 02-02 输出*\n\n**工作原理**\n\n在 Jakarta 服务器页面中使用脚本元素允许您将\
  \ Java 代码直接嵌入到网页中。然而，需要注意的是，这并不是 Web 开发的最佳方法。脚本元素编程曾被认为是使用 Jakarta 服务器页面技术编写 Web\
  \ 应用程序的最佳方式之一。但是，当需要对 Jakarta 服务器页面进行维护活动，或者向使用脚本元素的 Jakarta 服务器页面代码库引入新开发人员时，噩梦就开始了，因为为了调试问题，开发人员必须搜索嵌入在\
  \ HTML 以及 Java 类本身中的脚本。有时，能够将 Java 代码直接嵌入到页面中仍然很方便，即使只是为了测试，这就是为什么我在此配方中展示如何做到这一点。\n\
  \n更好的方法是将业务逻辑与视图代码分离，您在配方 2-1 中已经看到，并且在后续配方中也会看到。\n\n在此示例中，当前日期通过 Java `Date`类被引入到\
  \ Jakarta 服务器页面中。一个新的`Date`实例被赋值给名为`currDate`的字段。使用以下行通过导入页面指令将`java.util.Date`类导入到\
  \ Jakarta 服务器页面中：\n\n<%@page import=\"java.util.Date\"%>\n\n`currDate`的声明是在声明脚本元素中完成的。声明脚本元素以字符序列`<%!`开头，以字符序列`%>`结尾。从示例中摘录，`currDate`字段在以下代码行中声明：\n\
  \n<%! Date currDate = null; %>\n\n声明中包含的任何内容都会直接进入生成的 Jakarta 服务器页面 servlet 类的`jspService()`方法，为整个\
  \ servlet 创建一个全局声明以供使用。任何变量或方法都可以在声明的字符序列内声明。\n\n■ **注意** 声明仅在 Jakarta 服务器页面最初转换为\
  \ servlet 时执行一次。如果 Jakarta 服务器页面上的任何代码发生更改，它将再次转换为 servlet，届时声明将再次被评估。如果您希望每次浏览器加载\
  \ Jakarta 服务器页面时都执行代码，请不要将其放在声明中。\n\n在本配方的示例中，您可以看到没有使用 Jakarta 服务器页面标签来引用服务器端的\
  \ JavaBean 类来创建`Date`类的新实例，这是因为实例化是在 Jakarta 服务器页面代码中，在称为*脚本片段*的字符序列`<% %>`之间直接完成的。\n\
  \n\n\n脚本片段（Scriptlets）的语法与声明基本相同，区别在于其起始字符序列中不包含感叹号。脚本片段用于嵌入你希望在请求处理阶段、每次加载 Jakarta\
  \ 服务器页面时运行的任何 Java 代码。在翻译阶段，脚本片段中包含的所有内容都会被放入翻译后的 Jakarta 服务器页面 Servlet 中一个名为 `_jspService`\
  \ 的方法内，并且该方法会在每次请求该 Jakarta 服务器页面时执行。脚本片段是在 Jakarta 服务器页面中使用嵌入式 Java 代码最常见的地方。由于在此示例中，你希望每次加载页面时都显示当前日期，因此在脚本片段中实例化了新的\
  \ `Date` 类并将其赋值给 `currDate` 变量：\n\n<% currDate = new Date(); %>\n\n稍后在 Jakarta 服务器页面中，使用表达式来显示\
  \ `currDate` 字段，该表达式由 `<%=` 和 `%>` 字符序列括起来。表达式用于显示内容，当处理请求时，表达式中的任何内容都会自动转换为字符串。字符串转换后，它会作为输出显示在页面上：\n\
  \n当前日期和时间是：<%= currDate %>\n\n第 2 章 ■ Jakarta 服务器页面\n\n■ **注意** 如果表达式中的代码无法转换为字符串，将会发生异常。\n\
  \n虽然在 Jakarta 服务器页面中嵌入 Java 代码是可行的，但在 Java 社区中这种做法并不被提倡，因为模型-视图-控制器（MVC）范式能使代码更加清晰。要了解如何在不使用脚本元素的情况下编写\
  \ Jakarta 服务器页面应用程序，请参阅下一个示例，即配方 2-3。\n\n2-3. 将业务逻辑与视图代码分离\n\n问题\n\n你希望将业务逻辑与用于在\
  \ Web 应用程序中创建视图的代码分离开来。\n\n解决方案\n\n将业务逻辑分离到一个 JavaBean 类中，并使用 Jakarta 服务器页面标签将逻辑整合到视图中。在以下示例中，从\
  \ Jakarta 服务器页面内部引用了一个 JavaBean，并且该 JavaBean 的其中一个字段显示在页面上。每次刷新页面时，字段值都会更新，因为页面调用了底层\
  \ JavaBean 字段的 getter 方法，而字段正是在该方法中初始化的。\n\n在 `/webapp` 文件夹内创建一个名为 `recipe02_03.jsp`\
  \ 的 jsp 文件。以下 Jakarta 服务器页面标记包含对名为 `RandomBean` 的 JavaBean 的引用，并在页面上显示该 bean 的一个字段：\n\
  \n<%@page contentType=\"text/html\" pageEncoding=\"UTF-8\"%>\n\n<html>\n\n<head>\n\
  \n<title>配方 2-3：将业务逻辑与视图代码分离</title>\n\n</head>\n\n<body>\n\n<jsp:useBean id=\"\
  randomBean\" scope=\"application\"\n\nclass=\"org.jakartaeerecipe.chapter02.recipe02_03.RandomBean\"\
  />\n\n显示一个随机数！<br/>\n\n您的随机数是 ${randomBean.randomNumber}。刷新页面查看另一个随机数！\n\n</body>\n\
  \n</html>\n\n接下来的代码是 Jakarta 服务器页面代码中引用的 JavaBean 类，即 `RandomBean`：package org.jakartaeerecipe.chapter02.recipe02_03;\n\
  \nimport java.util.Random;\n\npublic class RandomBean {\n\nRandom randomGenerator\
  \ = new Random();\n\nprivate int randomNumber = 0;\n\n/**\n\n* @return randomNumber\n\
  \n*/\n\n![](img/index-106_1.png)\n\n第 2 章 ■ Jakarta 服务器页面\n\npublic int getRandomNumber()\
  \ {\n\nrandomNumber = randomGenerator.nextInt();\n\nreturn randomNumber;\n\n}\n\n\
  }\n\n要执行上述代码，请在浏览器中打开 URL `http://localhost:8080/JakartaEERecipies-1.0-SNAPSHOT/chapter02/recipe02_03.jsp`。页面的输出结果类似于图\
  \ 2-4，但每次加载页面时随机数都会不同。\n\n***图 2-4.** Jakarta 服务器页面配方 02-03 输出*\n\n工作原理\n\n有时，将\
  \ Java 代码直接嵌入 Jakarta 服务器页面会很有帮助，并且可以满足需求。然而，在大多数情况下，将任何 Java 代码与用于创建 Web 视图的标记代码分离开来是一个好主意。这样做可以使维护更容易，并允许页面开发者专注于创建美观的网页，而不是在\
  \ Java 代码中摸索。在某些组织中，Java 开发者可以编写服务器端的业务逻辑代码，而 Web 开发者则可以专注于视图。在当今的许多组织中，同一个人同时执行这两项任务，使用\
  \ MVC 方法有助于分离逻辑并提高生产力。\n\n在 Jakarta 服务器页面的早期，将 Java 直接嵌入 Jakarta 服务器页面被认为是最佳方式，但随着时间的推移，MVC\
  \ 范式流行起来，Jakarta 服务器页面也随之更新。作为最佳实践，使用 Jakarta 服务器页面标签将 Java 代码与页面标记分离开来是很好的做法。在示例中，`<jsp:useBean>`\
  \ 元素用于引用服务器端的 JavaBean 类，以便该类中的公共字段和方法，以及通过公共“getter”方法访问的私有字段，都可以整合到 Jakarta 服务器页面中。`jsp:useBean`\
  \ 元素要求你提供一个 ID 和一个作用域，以及一个类名或 beanName。在示例中，`id` 属性设置为 `randomBean`，并且此 ID 用于在 Jakarta\
  \ 服务器页面中引用该 bean。`scope` 属性设置为 `application`，这意味着该 bean 可以被应用程序中的任何 Jakarta 服务器页面使用。表\
  \ 2-1 显示了所有可能的作用域及其含义。`class` 属性设置为 Java 类的完全限定名，该类将通过 `id` 属性设置的名称（在本例中为 `randomBean`）进行引用。\n\
  \n第 2 章 ■ Jakarta 服务器页面\n\n***表 2-1.** jsp:useBean 元素作用域*\n\n**作用域**\n\n**描述**\n\
  \npage（默认）\n\n该 bean 可以在包含 `jsp:useBean` 元素的同一个 Jakarta 服务器页面中使用\n\nrequest\n\n\
  该 bean 可以在处理同一请求的任何 Jakarta 服务器页面中使用\n\nsession\n\n该 bean 可以在与创建该 bean 的 Jakarta\
  \ 服务器页面处于同一会话中的任何 Jakarta 服务器页面中使用。创建该 bean 的页面必须有一个 `session=\"true\"` 的页面指令\n\n\
  application\n\n该 bean 可以在与创建它的 Jakarta 服务器页面处于同一应用程序中的任何 Jakarta 服务器页面中使用\n\n在页面中添加了\
  \ `jsp:useBean` 元素后，就可以在 Jakarta 服务器页面中使用 JavaBean 属性，并且可以从页面调用公共方法。该示例演示了如何使用 `${\
  \ }` 表示法显示 JavaBean 属性的值。JavaBean 中任何包含“getter”和“setter”方法的变量都可以通过在 `${` 和 `}` 字符序列之间引用类成员字段来从\
  \ Jakarta 服务器页面访问，这更广为人知的名称是 Jakarta 表达式语言表达式。要了解更多关于 Jakarta 表达式语言表达式的信息，请参阅配方\
  \ 2-4。以下来自示例的摘录演示了如何显示 JavaBean 中的 `randomNumber` 字段：您的随机数是 ${randomBean.randomNumber}。刷新页面查看另一个随机数！\n\
  \n在 Jakarta 服务器页面技术中，将业务逻辑与视图逻辑分离的关键是 `jsp:useBean` 元素。这将允许你在 Jakarta 服务器页面中使用 JavaBean\
  \ 类，而无需将代码直接嵌入页面。将业务逻辑与视图代码分离有助于将来更容易地维护代码，并使代码更易于理解。\n\n2-4. 获取或设置值\n\n问题\n\n你希望在\
  \ Jakarta 服务器页面中显示 JavaBean 的值。此外，你希望能够在 Jakarta 服务器页面中设置值。\n\n解决方案\n\n\n\n在 `/webapp`\
  \ 文件夹内创建一个名为 `recipe02_04.jsp` 的 JSP 文件。使用 Jakarta 表达式语言（Jakarta Expression Language）的\
  \ `${bean.value}` 语法，在 Jakarta 服务器页面中暴露 Bean 中的值。在以下 Jakarta 服务器页面代码中，将使用一个名为 `EasyBean`\
  \ 的 Java 类来保存用户输入到文本字段中的值。随后，将从 Bean 中读取该值，并使用 Jakarta 表达式语言将其显示在页面上。\n\n以下代码展示了一个包含输入表单的\
  \ Jakarta 服务器页面，并显示输入到文本框中的值：\n\n```jsp\n<%@page contentType=\"text/html; charset=UTF-8\"\
  %>\n\n<html>\n\n<head>\n\n<title>配方 2-4：获取或设置值</title>\n\n</head>\n\n<body>\n\n\
  <jsp:useBean id=\"easyBean\" scope=\"page\" class=\"org.jakartaeerecipe.chapter02.recipe02_04.EasyBean\"\
  />\n\n<jsp:setProperty name=\"easyBean\" property=\"*\"/>\n\n<form method=\"post\"\
  >\n\n使用下面的输入文本框设置值，然后点击提交。\n\n<br/><br/>\n\n<label for=\"fieldValue\">设置字段值：</label>\n\
  \n<input id=\"fieldValue\" name=\"fieldValue\" type=\"text\" size=\"30\"/>\n\n<br/>\n\
  \n字段中当前包含的值为：\n\n<jsp:getProperty name=\"easyBean\" property=\"fieldValue\"/>\n\n\
  <input type=\"submit\">\n\n</form>\n\n</body>\n\n</html>\n```\n\n接下来，在 `/src` 文件夹内创建\
  \ JavaBean 类，该类用于保存页面所使用的值；代码如下所示：\n\n```java\npackage org.jakartaeerecipe.chapter02.recipe02_04;\n\
  \npublic class EasyBean implements java.io.Serializable {\n\n    private String\
  \ fieldValue;\n\n    public EasyBean(){\n        fieldValue = null;\n    }\n\n \
  \   /**\n     * @return the fieldValue\n     */\n    public String getFieldValue()\
  \ {\n        return fieldValue;\n    }\n\n    /**\n     * @param fieldValue the\
  \ fieldValue to set\n     */\n    public void setFieldValue(String fieldValue) {\n\
  \        this.fieldValue = fieldValue;\n    }\n\n}\n```\n\n这个简单的示例演示了如何输入一个值，将其“设置”到\
  \ Bean 变量中，然后显示在页面上。要查看此页面，请在浏览器中打开 URL `http://localhost:8080/JakartaEERecipies-1.0-SNAPSHOT/chapter02/recipe02_04.jsp`。输出结果将如图\
  \ 2-5 所示。\n\n![图 2-5 输出结果](img/index-109_1.png)\n\n***图 2-5.** Jakarta 服务器页面配方 02-04\
  \ 的输出*\n\n**工作原理**\n\n也许最有用的 Web 结构之一就是输入表单，它允许用户在页面的文本框或其他输入结构中输入信息，并将其提交给服务器进行处理。Jakarta\
  \ 服务器页面使得从 HTML 表单提交值变得非常容易，同样，将数据显示回页面也非常简单。为此，需要在 Java 类中声明一个字段，并提供访问器方法（即 getter\
  \ 和 setter），以便其他类可以将值保存到该字段，并获取当前存储在该字段中的值。\n\n有时，包含带有访问器方法的字段的 Java 类被称为 JavaBean\
  \ *类*。这些类也可以包含其他用于执行任务的方法，但最佳实践是尽可能保持 Bean 的简单性。JavaBean 类还应实现 `java.io.Serializable`，以便它们可以轻松地存储为字节流并恢复。\n\
  \n在本配方的示例中，一个名为 `EasyBean` 的 Java 类包含一个名为 `fieldValue` 的私有字段。访问器方法 `getFieldValue`\
  \ 和 `setFieldValue` 分别用于获取和存储 `fieldValue` 中的值。这些访问器方法被声明为 `public`，因此它们可以从另一个 Java\
  \ 类或 Jakarta 服务器页面中使用。Jakarta 服务器页面使用 `jsp:useBean` 元素来获取对 `EasyBean` 类的引用。作用域设置为\
  \ `page`，以便该类只能在包含 `jsp:useBean` 元素的 Jakarta 服务器页面内使用。表 2-1（可在上一个配方中找到）列出了可与 `jsp:useBean`\
  \ 元素一起使用的不同作用域：\n\n```jsp\n<jsp:useBean id=\"easyBean\" scope=\"page\" class=\"\
  org.jakartaeerecipe.chapter02.recipe02_04.EasyBean\"/>\n```\n\n\n\n接下来，在 Jakarta\
  \ 服务器页面中定义了一个使用 POST 方法的 HTML 表单，其中包含一个名为 `fieldValue` 的输入字段，允许用户输入一段文本，该文本将在表单提交时作为请求参数提交。请注意，示例中的表单没有指定\
  \ action 属性；这意味着将使用相同的 URL 进行表单提交，并且同一个 Jakarta 服务器页面将用于表单提交，并在表单提交后再次显示。由于该 Jakarta\
  \ 服务器页面在页面上指定了 `jsp:useBean` 元素，因此当页面提交时，所有请求参数都将发送到该 bean。确保输入到 `fieldValue` 输入文本字段中的值存储到\
  \ Java 类中的 `fieldValue` 变量中的关键在于在表单中使用 `jsp:setProperty` 元素。`jsp:setProperty` 元素允许使用相应的\
  \ setter 方法在 JavaBean 类中设置一个或多个属性。在示例中，`<jsp:useBean>` 用于实例化 `EasyBean` Java 类，而\
  \ `<jsp:setProperty>` 用于将 `fieldValue` 输入文本框中输入的值设置到 `EasyBean` 类中的 `fieldValue`\
  \ 变量。`jsp:setProperty` 的 `name` 属性必须等于 `jsp:useBean` 的 `id` 属性值。`jsp:setProperty`\
  \ 的 `property` 属性可以等于您想要在 bean 中设置的 Java 类中的字段名称，也可以使用通配符 `*` 将所有输入字段提交给 bean。`jsp:setProperty`\
  \ 的 `value` 属性可用于为属性指定一个静态值。以下示例摘录展示了如何使用 `jsp:setProperty` 标签：\n\n<jsp:setProperty\
  \ name=\"easyBean\" property=\"*\"/>\n\n第 2 章 ■ Jakarta 服务器页面\n\n■ **注意** Jakarta\
  \ 服务器页面元素的顺序非常重要。`<jsp:useBean>` 必须位于 `<jsp:setProperty>` 之前，因为 `jsp:useBean` 元素负责实例化其对应的\
  \ Java 类。由于 Jakarta 服务器页面是从页面顶部向下执行的，因此在指定 `jsp:useBean` 之前，任何元素都无法使用该 bean。\n\n\
  当用户在输入字段中输入值并提交请求时，该值将作为请求参数提交给与该页面的 `jsp:useBean` 元素对应的 Java 类。有几种不同的方法可以显示已填充到\
  \ JavaBean 字段中的数据。示例演示了如何使用 `jsp:getProperty` 元素来显示 `fieldValue` 变量的值。\n\n`<jsp:getProperty>`\
  \ 元素必须指定一个 `name` 属性，该属性对应于 `jsp:useBean` 元素中指定的 Java 类的 id。它还必须指定一个 `property`\
  \ 属性，该属性对应于您想要显示的 JavaBean 属性的名称。以下示例摘录演示了 `jsp:getProperty` 标签的使用：\n\n<jsp:getProperty\
  \ name=\"easyBean\" property=\"fieldValue\"/>\n\n也可以使用 Jakarta 表达式语言表达式来显示 JavaBean\
  \ 属性的值，方法是使用 `jsp:useBean` 元素中指定的 id 以及属性名称。要尝试此操作，您可以将 `jsp:getProperty` 元素替换为以下\
  \ Jakarta 表达式语言表达式：`${easyBean.fieldValue}`\n\n与使用 servlet 相比，Jakarta 服务器框架使得使用\
  \ Java 技术开发 Web 应用程序变得更加容易。如本例所示的输入表单展示了 Jakarta 服务器页面与标准 servlet 编码相比效率有多高。与任何事物一样，servlet\
  \ 和 Jakarta 服务器页面技术在您的工具箱中都有其用武之地。对于创建简单的数据输入表单，Jakarta 服务器页面无疑更胜一筹。\n\n2-5\\. 在条件表达式中调用函数\n\
  \n问题\n\n您希望在 Jakarta 服务器页面中使用 Java 函数来执行条件求值。\n\n\n\n然而，你并不希望将 Java 代码直接嵌入到 Jakarta\
  \ Server Page 中。\n\n解决方案\n\n将函数编写在 JavaBean 类中，然后通过 `<jsp:useBean>` 标签将该 Bean 注册到\
  \ Jakarta Server Page。接着，你需要在标签库描述符（TLD）中注册该函数，以便它能通过标签在 Jakarta Server Page 上使用。最后，为注册了该函数的\
  \ TLD 设置一个页面指令，并在页面中使用该函数标签。在接下来的示例中，一个 Jakarta Server Page 将使用一个函数来告知用户给定的 Java\
  \ 类型是否为原始类型。用户将在文本框中输入一个字符串值，该值将被提交到 JavaBean 的一个字段。然后，该字段的内容将与 Java 原始类型列表进行比较，以确定是否匹配。如果输入到字段中的值是原始类型，将向用户显示一条消息。以下是该项目的文件夹结构：\n\
  \n第 2 章 ■ Jakarta Server Pages\n\n**├──** src\n\n├── main\n\n│ ├── java\n\n│ │ └──\
  \ org\n\n│ │ └── jakartaeerecipe\n\n│ │ ├── chapter02\n\n│ │ │ ├── recipe02_05\n\
  \n│ │ │ │ └── ConditionalClass.java\n\n│ └── webapp\n\n│ ├── WEB-INF\n\n│ │ ├──\
  \ tlds\n\n│ │ │ ├── functions.tld\n\n│ │ └── web.xml\n\n│ ├── chapter02\n\n│ ├──\
  \ recipe02_05.jsp\n\n以下代码是包含函数实现的 Java 类，该函数将在 Jakarta Server Page 中使用。该 Bean 还包含一个字段，用于在\
  \ Jakarta Server Page 中设置和获取用户输入的值：\n\npackage org.jakartaeerecipe.chapter02.recipe02_05;\n\
  \nimport java.io.Serializable;\n\nimport java.util.*;\n\npublic class ConditionalClass\
  \ implements Serializable {\n\nprivate String typename = null;\n\npublic static\
  \ Set<String> javaTypes = new HashSet<>();\n\npublic ConditionalClass() {\n\njavaTypes.add(\"\
  byte\");\n\njavaTypes.add(\"short\");\n\njavaTypes.add(\"int\");\n\njavaTypes.add(\"\
  long\");\n\njavaTypes.add(\"float\");\n\njavaTypes.add(\"double\");\n\njavaTypes.add(\"\
  boolean\");\n\njavaTypes.add(\"char\");\n\n}\n\npublic static boolean isPrimitive(String\
  \ value){\n\nreturn javaTypes.contains(value.toLowerCase());\n\n}\n\n/**\n\n* @return\
  \ the typename\n\n*/\n\npublic String getTypename() {\n\nreturn typename;\n\n}\n\
  \n第 2 章 ■ Jakarta Server Pages\n\n/**\n\n* @param typename the typename to set\n\
  \n*/\n\npublic void setTypename(String typename) {\n\nthis.typename = typename;\n\
  \n}\n\n}\n\n字段 `typename` 将在 Jakarta Server Page 中用于设置用户输入的值，并检索该值以传递给名为 `isPrimitive()`\
  \ 的函数，该函数用于将给定值与 Java 原始类型列表进行比较。接下来是用于注册该函数的 TLD 列表，以便它可以在 Jakarta Server Page\
  \ 中作为标签使用。为简单起见，TLD 文件命名为 `functions.tld`，并放置在 `/webapp` 文件夹中：\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n\n<taglib\n\nxsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\n\
  \nhttp://java.sun.com/xml/ns/javaee/web-jsptaglibrary_2_1.xsd\"\n\nversion=\"2.1\"\
  \ >\n\n<tlib-version>1.0</tlib-version>\n\n<short-name>fct</short-name>\n\n<uri>functions</uri>\n\
  \n<function>\n\n<name>isPrimitive</name>\n\n<function-class>org.jakartaeerecipe.chapter02.recipe02_05.ConditionalClass\n\
  \n</function-class>\n\n<function-signature>boolean isPrimitive(java.lang.String)</function-signature>\n\
  \n</function>\n\n</taglib>\n\n最后是 Jakarta Server Page 代码，其中包含使用 TLD 的页面指令以及通过标签对\
  \ `isPrimitive()` 函数的条件调用：\n\n<%@ page contentType=\"text/html;charset=UTF-8\" %>\n\
  \n<%@ taglib uri=\"http://java.sun.com/jsp/jstl/core\"\n\nprefix=\"c\" %>\n\n<%@\
  \ taglib uri=\"/WEB-INF/tlds/functions.tld\" prefix=\"fct\" %>\n\n<html>\n\n<head>\n\
  \n<title>配方 2-5：在表达式中调用函数</title>\n\n</head>\n\n<body>\n\n<form method=\"get\">\n\
  \n<label for=\"typename\">\n\n请说出一种 Java 原始类型名称：\n\n</label>\n\n<input type=\"text\"\
  \ id=\"typename\" name=\"typename\" size=\"40\"/>\n\n<br/>\n\n<input type=\"submit\"\
  >\n\n</form>\n\n![](img/index-113_1.png)\n\n第 2 章 ■ Jakarta Server Pages\n\n<jsp:useBean\
  \ id=\"conditionalBean\" scope=\"page\" class=\"org.jakartaeerecipe.chapter02.\n\
  \nrecipe02_05.ConditionalClass\"/>\n\n<jsp:setProperty name=\"conditionalBean\"\
  \ property=\"typename\"/>\n\n<c:if test=\"${fct:isPrimitive(conditionalBean.typename)}\"\
  >\n\n${ conditionalBean.typename } 是一个原始类型。\n\n</c:if>\n\n<c:if test=\"${conditionalBean.typename\
  \ ne null and !fct:isPrimitive(conditionalBean.\n\ntypename)}\">\n\n${ conditionalBean.typename\
  \ } 不是一个原始类型。\n\n</c:if>\n\n</body>\n\n</html>\n\n遵循本解决方案中使用的策略，你可以创建一个可通过 Jakarta\
  \ Server Page 标签在页面中使用的条件测试。输出结果如图 2-6 所示。\n\n***图 2-6.** Jakarta Server Pages 配方\
  \ 02-05 输出*\n\n工作原理\n\nJakarta 表达式语言函数必须使用 `public static` 修饰符声明，以便框架能够执行它。在本配方中，函数\
  \ `isPrimitive` 被声明为 `public static`，它返回一个布尔值，指示用户是否键入了 Java 原始类型的名称。\n\n使函数可通过\
  \ Jakarta Server Page 访问的下一步是将其注册到 TLD 中。在示例中，创建了一个名为 `functions.tld` 的 TLD。如果你的应用程序中已有自定义\
  \ TLD，则可以将函数注册到其中，而无需额外创建一个。\n\n本例中的 TLD 有一个 `short-name` 属性 `fct`，该属性将在 Jakarta\
  \ Server Page 标签中使用。要实际注册该函数，你必须在 TLD 中创建一个 `function` 元素，提供函数名称，指明函数所在的类，最后指定函数签名：\n\
  \n<function>\n\n<name>isPrimitive</name>\n\n<function-class>org.jakartaeerecipe.chapter02.recipe02_05.ConditionalClass\n\
  \n</function-class>\n\n<function-signature>boolean isPrimitive(java.lang.String)</function-signature>\n\
  \n</function>\n\n第 2 章 ■ Jakarta Server Pages\n\n现在，该函数已准备好可在 Jakarta Server Page\
  \ 中使用。要使该函数可通过 Jakarta Server Page 访问，请通过包含一个 `taglib` 指令来注册包含该 `function` 元素的 TLD，并指定该\
  \ TLD 的 `uri` 和 `prefix`。`uri` 是 TLD 的路径，`prefix` 应与 TLD 的 `short-name` 元素中给出的名称匹配。以下摘自本例\
  \ Jakarta Server Page 的代码片段显示了 `taglib` 指令：\n\n<%@ taglib uri=\"/WEB-INF/tlds/functions.tld\"\
  \ prefix=\"fct\" %>\n\n现在，通过在 Jakarta Server Page 中指定标签库前缀以及函数在 TLD 中注册的名称，即可通过\
  \ Jakarta 表达式语言表达式访问该函数。示例中的 Jakarta 表达式语言表达式调用该函数，并传递 `typename` 参数。`isPrimitive`\
  \ 函数用于确定 `typename` Bean 字段中包含的文本是否等于某个 Java 原始类型：\n\n<c:if test=\"${fct:isPrimitive(conditionalBean.typename)}\"\
  \ >\n\n本配方中的解决方案还使用了 Jakarta 标准标签库核心。根据所使用的服务器环境，这可能需要单独下载。Jakarta 标准标签库为 Jakarta\
  \ Server Page API 提供的标准标签集提供了扩展。有关 Jakarta 标准标签库的更多信息，请参考在线文档，该文档可在 [https://](https://jakarta.ee/specifications/tags/2.0/jakarta-tags-spec-2.0.pdf)\n\
  \n[jakarta.ee/specifications/tags/2.0/jakarta- tags- spec- 2.0.pdf](https://jakarta.ee/specifications/tags/2.0/jakarta-tags-spec-2.0.pdf)\
  \ 找到。\n\n\n\nJakarta 标准标签库的 `<c:if>` 标签可用于测试条件，当条件测试返回真值时，执行其开始和结束标签之间的标记。不出所料，`<c:if>`\
  \ 标签包含一个 `test` 属性，该属性指定一个 Jakarta 表达式语言表达式，用于指示需要执行的测试。在示例中，`isPrimitive` 函数在 Jakarta\
  \ 表达式语言表达式中被调用，并传入 bean 的值。如果测试返回真值，则会打印一条消息，指示给定值等于一个 Java 原始类型。示例中第一个 `<c:if>`\
  \ 测试之后是另一个测试，这次它测试以确保属性值不等于 `null`，并且不是 Java 原始类型。表达式语言用于通过 `ne` 表达式判断属性值是否等于 `null`。`and`\
  \ 表达式将第一个和第二个条件表达式在 Jakarta 表达式语言表达式中结合在一起，这意味着两个表达式都必须求值为真值才能满足条件。如果两个条件都满足，则用户指定的值不是\
  \ Java 原始类型，并会打印相应的消息：\n\n```jsp\n<c:if test=\"${conditionalBean.typename ne null\
  \ and !fct:isPrimitive(conditionalBean.typename)}\" >\n    ${ conditionalBean.typename\
  \ } is not a primitive type.\n</c:if>\n```\n\n以下是 `pom.xml` 文件中将 Jakarta 标准标签库支持添加到项目中的代码片段：\n\
  \n```xml\n<dependency>\n    <groupId>jakarta.servlet.jsp.jstl</groupId>\n    <artifactId>jakarta.servlet.jsp.jstl-api</artifactId>\n\
  \    <version>2.0.0</version>\n    <scope>compile</scope>\n</dependency>\n```\n\n\
  第 2 章 ■ Jakarta 服务器页面\n\n只需几个简单的步骤即可创建一个用于 Jakarta 服务器页面的条件函数。首先，在 JavaBean 类中，必须创建一个返回布尔值的\
  \ `public static` 函数。其次，创建一个 TLD，该文件将通过 Jakarta 服务器页面标签使该函数可用。最后，在 Jakarta 服务器页面中使用自定义标签，并结合\
  \ Jakarta 标准标签库的条件测试标签，根据条件显示内容。\n\n2-6. 创建 Jakarta 服务器页面文档\n\n问题\n\n您希望确保 Jakarta\
  \ 服务器页面代码遵循 XML 标准，并且仅包含有效的 HTML 和 Jakarta 服务器页面标签，而不是使用标准的 HTML 格式。\n\n解决方案\n\n\
  创建 Jakarta 服务器页面文档，而不是标准的 Jakarta 服务器页面。Jakarta 服务器页面文档是基于 XML 的标准 Jakarta 服务器页面文档表示形式，符合\
  \ XML 标准。以下 Jakarta 服务器页面文档包含与配方 2-4 的 Jakarta 服务器页面代码相同的代码，但改用 Jakarta 服务器页面文档格式。如您所见，差异不大，因为创建标准\
  \ Jakarta 服务器页面文档时已经使用了格式良好的标签。该页面也以 `jspx` 扩展名保存，而不是 `jsp`：\n\n```jsp\n<html version=\"\
  2.0\">\n<head>\n    <title>Recipe 2-4: Yielding or Setting Values</title>\n</head>\n\
  <body>\n    <jsp:directive.page contentType=\"text/html\" pageEncoding=\"UTF-8\"\
  />\n    <jsp:useBean id=\"easyBean\" class=\"org.jakartaeerecipe.chapter02.recipe02_04.EasyBean\"\
  />\n    <jsp:setProperty name=\"easyBean\" property=\"*\"/>\n    <form method=\"\
  post\">\n        Use the input text box below to set the value, and then hit submit.\n\
  \        <br/><br/>\n        <label for=\"fieldValue\">Set the field value: </label>\n\
  \        <input id=\"fieldValue\" name=\"fieldValue\" type=\"text\" size=\"30\"\
  />\n        <br/>\n        The value contained within the field is currently:\n\
  \        <jsp:getProperty name=\"easyBean\" property=\"fieldValue\"/>\n        <input\
  \ type=\"submit\"/>\n    </form>\n</body>\n</html>\n```\n\n此 Jakarta 服务器页面文档将产生与\
  \ `recipe02_04.jsp` 中相同的输出。但是，将强制使用格式良好的文档，这将排除在页面中使用脚本元素。\n\n第 2 章 ■ Jakarta 服务器页面\n\
  \n工作原理\n\n\n\n正如配方 2-3 中所预示的，将业务逻辑与标记代码分离可能因多种原因而至关重要。标准的 Jakarta 服务器页面可以遵循 MVC\
  \ 范式，但并非强制要求。有时，通过严格遵循格式良好的 XML 文档（仅使用 Jakarta 服务器页面标签与服务器端 Java 类交互）来强制分离业务逻辑是合理的。格式良好意味着文档应只有一个根元素，并且每个起始标签都必须有对应的结束标签。创建\
  \ Jakarta 服务器页面文档是一种解决方案，因为此类文档强制使用格式良好的 XML，并且不允许在 Jakarta 服务器页面中使用脚本元素。仍然可以使用\
  \ `<jsp:expression/>` 标签或值表达式在 Jakarta 服务器页面文档的主体中显示脚本表达式的值，如配方 2-8 所示。\n\n多个 Jakarta\
  \ 服务器页面标签可用于与 Java 类通信、执行 Jakarta 服务器页面特定功能，并使标记易于理解。因此，基于现代 Jakarta 服务器页面的应用程序应使用格式良好的\
  \ Jakarta 服务器页面文档，利用这些 Jakarta 服务器页面标签，而不是在整个标记中嵌入脚本元素。表 2-2 描述了不同 Jakarta 服务器页面标签的功能。\n\
  \n***表 2-2.** Jakarta 服务器页面标签*\n\n**标签**\n\n**描述**\n\n<jsp:attribute>\n\n为 Jakarta\
  \ 服务器页面定义属性\n\n<jsp:body>\n\n定义元素主体\n\n<jsp:declaration>\n\n定义页面声明\n\n<jsp:directive>\n\
  \n定义页面包含和页面指令\n\n<jsp:doBody>\n\n执行由调用 Jakarta 服务器页面用于调用标签的 Jakarta 服务器页面标签的主体\n\
  \n<jsp:element>\n\n动态生成 XML 元素\n\n<jsp:expression>\n\n插入脚本语言表达式的值，并转换为字符串\n\n<jsp:forward>\n\
  \n将请求转发到另一个页面。新页面可以是 HTML、Jakarta 服务器页面或 Servlet\n\n<jsp:getProperty>\n\n获取 bean\
  \ 属性的值并将其放入页面\n\n<jsp:include>\n\n在页面中包含另一个 Jakarta 服务器页面或 Web 资源\n\n<jsp:invoke>\n\
  \n调用指定的 Jakarta 服务器页面片段\n\n<jsp:output>\n\n指定文档类型声明\n\n<jsp:plugin>\n\n使用指定的插件执行\
  \ Applet 或 Bean\n\n<jsp:root>\n\n定义标准元素和标签库命名空间\n\n<jsp:scriptlet>\n\n必要时将代码片段嵌入页面\n\
  \n<jsp:setProperty>\n\n将指定值设置到 bean 属性中\n\n<jsp:text>\n\n包含模板数据\n\n<jsp:useBean>\n\
  \n使用名称引用并实例化（如果需要）JavaBean 类，并提供作用域\n\n第二章 ■ Jakarta 服务器页面\n\n创建格式良好的 Jakarta 服务器页面可以带来更简单的开发、更易于维护以及更好的整体设计。由于这一点非常重要，本章剩余的配方将使用\
  \ Jakarta 服务器页面文档格式。\n\n2-7\\. 在 Jakarta 表达式语言中嵌入表达式\n\n问题\n\n您希望在 Jakarta 服务器页面中使用一些条件表达式和/或算术运算，而不使用脚本元素嵌入\
  \ Java 代码。\n\n解决方案\n\n在 Jakarta 服务器页面标签中使用 Jakarta 表达式语言表达式来执行条件和/或算术表达式。本解决方案将介绍两个\
  \ Jakarta 表达式语言表达式的示例。\n\n第一个示例演示了如何使用 Jakarta 表达式语言表达式执行条件逻辑。请注意，此例中还使用了 Jakarta\
  \ 标准标签库标签库，以便在表达式结果为 true 时在页面上有条件地显示消息：\n\n<html\n\nversion=\"2.0\">\n\n<jsp:directive.page\
  \ contentType=\"text/html\" pageEncoding=\"UTF-8\"/>\n\n<head>\n\n<title>配方 2-7：在\
  \ Jakarta 表达式语言中嵌入表达式</title>\n\n</head>\n\n<body>\n\n<h1>条件表达式</h1>\n\n<p>\n\n\
  页面的以下部分将仅显示结果为 true 的条件表达式。\n\n</p>\n\n<c:if test=\"${1 + 1 == 2}\">\n\n\n\n条件表达式\
  \ (1 + 1 == 2) 的结果为 TRUE。\n\n<br/>\n\n</c:if>\n\n<c:if test=\"${'x' == 'y'}\">\n\
  \n条件表达式 (x == y) 的结果为 TRUE。\n\n<br/>\n\n</c:if>\n\n<c:if test=\"${(100/10) gt 5}\"\
  >\n\n条件表达式 ((100/10) > 5) 的结果为 TRUE。\n\n<br/>\n\n</c:if>\n\n<c:if test=\"${20 mod\
  \ 3 eq 2}\">\n\n条件表达式 (20 mod 3 eq 2) 的结果为 TRUE。\n\n<br/>\n\n</c:if>\n\n![](img/index-118_1.png)\n\
  \n第 2 章 ■ Jakarta 服务器页面\n\n</body>\n\n</html>\n\n此 Jakarta 服务器页面将显示以下输出：\n\n...\n\
  \n条件表达式 (1 + 1 == 2) 的结果为 TRUE。\n\n条件表达式 ((100/10) > 5) 的结果为 TRUE。\n\n条件表达式 (20\
  \ mod 3 eq 2) 的结果为 TRUE。\n\n...\n\n输出结果如图 2-7 所示。\n\n***图 2-7.** Jakarta 服务器页面配方\
  \ 02-07 的输出*\n\n算术表达式也可以使用 Jakarta 表达式语言进行计算。以下 Jakarta 服务器页面代码演示了在 Jakarta 表达式语言中使用算术运算的一些示例：\n\
  \n<html version=\"2.0\">\n\n<head>\n\n<title>配方 2-7：在 Jakarta 表达式语言中嵌入表达式</title>\n\
