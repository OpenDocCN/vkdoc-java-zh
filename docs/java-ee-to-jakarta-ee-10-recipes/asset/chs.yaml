  , null));\n\nauthorList.add(new Author(\"Tarun\", \"Telang\", null));\n\nSystem.out.println(\"\
  作者列表大小：\" +authorList.size());\n\n}\n\npublic void addAuthor() {\n\ngetAuthorList().add(\n\
  \nnew Author(this.getNewAuthorFirst(),\n\nthis.getNewAuthorLast(),\n\nthis.getBio()));\n\
  \n}\n\n// getter 和 setter 方法\n\n// ...\n\n}\n\n![](img/index-163_1.png)\n\n第 3 章\
  \ ■ Jakarta Server Faces\n\n最后，`Author` 类用于保存加载到 `authorList` 实例变量中的 `Author` 对象实例。以下是\
  \ `Author` 类的代码：\n\npackage org.jakartaeerecipe.chapter03.recipe03_03;\n\npublic\
  \ record Author ( private String getFirst, private String getLast, private String\n\
  \ngetBio) implements Serializable {\n\n}\n\n生成的网页将类似于图 3-5 所示的页面。\n\n***图 3-5.**\
  \ 复杂的 Jakarta Server Faces 视图示例*\n\n第 3 章 ■ Jakarta Server Faces\n\n工作原理\n\nJakarta\
  \ Server Faces 视图由格式良好的 XML 组成，是 HTML 和 Jakarta Server Faces 组件标签的混合体。任何格式良好的 HTML\
  \ 都可以在 Jakarta Server Faces 视图中使用，但组件是 Jakarta Server Faces 与控制器类实例通信的手段。Jakarta\
  \ Server Faces 内置了一些组件，可用于向视图添加图像、文本区域、按钮、复选框等。此外，还有几个非常优秀的组件库，其中包含可在应用程序中使用的额外\
  \ Jakarta Server Faces 组件。本示例旨在让您全面了解 Jakarta Server Faces 组件及其工作原理。\n\n您可以通过阅读第\
  \ 5 章的示例，了解更多关于 Jakarta Server Faces 组件以及使用外部组件库的详细信息。\n\n在 Jakarta Server Faces\
  \ 视图中使用组件的第一步是在页面上声明标签库。这通常在页面顶部的 HTML 元素内完成。本示例在页面顶部附近的 HTML 元素内同时声明了 Jakarta Server\
  \ Faces 核心组件库和 Jakarta Server Faces HTML 组件库。这两个库是标准的 Jakarta Server Faces 组件库，应在每个\
  \ Jakarta Server Faces 视图中声明：\n\n...\n\n<html\n\n>\n\n...\n\n声明库后，可以通过指定库命名空间以及要使用的组件，在视图中使用该库中的组件。例如，要指定一个用于显示文本的\
  \ HTML 元素，请使用 Jakarta Server Faces 的 `h:outputText` 组件标签以及各种组件属性。\n\n在 JSF 2.0 之前，必须将\
  \ Jakarta Server Faces 视图及其所有组件都包含在 `f:view` 标签中。自 Jakarta Server Faces 2.0 起，不再需要该标签，因为底层的\
  \ Facelets 视图技术默认已成为每个 Jakarta Server Faces 视图的一部分，因此它会自动处理视图的指定。然而，`f:view` 元素对于指定区域设置、内容类型或编码仍然有用。有关这些功能使用的更多信息，请参阅在线文档：[https://](https://javadoc.io/doc/jakarta.faces/jakarta.faces-api/latest/index.html)\n\
  \n[javadoc.io/doc/jakarta.faces/jakarta.faces- api/latest/index.html](https://javadoc.io/doc/jakarta.faces/jakarta.faces-api/latest/index.html)。\n\
  \n`<h:head>` 和 `<h:body>` 标签可用于指定 Jakarta Server Faces Web 视图的头部和主体。不过，使用标准的 HTML\
  \ `<head>` 和 `<body>` 标签也是可以的。一些 Java IDE 在编写 Jakarta Server Faces 视图时会自动使用 `<h:head>`\
  \ 和 `<h:body>` 代替标准 HTML 标签。一个重要的注意事项是，必须将要作为 HTML 输入表单处理的任何内容用 `<h:form>` Jakarta\
  \ Server Faces 标签括起来。该标签包含一个 Jakarta Server Faces 表单，并在未指定方法时默认使用 POST 方法渲染一个 HTML\
  \ 表单。Jakarta Server Faces 表单标签不需要 action 属性，因为 Jakarta Server Faces 控制器类的操作是通过使用\
  \ Jakarta Server Faces 操作组件（如 `h:commandButton` 或 `h:commandLink`）之一来调用的。\n\n■ **提示**\
  \ 始终为 `h:form` 标签指定一个 id，因为在页面渲染时，表单 id 会作为前缀添加到所有 Jakarta Server Faces 组件标签的 id\
  \ 中。例如，如果表单 id 为 `myform`，其中包含一个 id 为 `mytag` 的组件标签，那么该组件 id 将渲染为 `myform:mytag`。如果您不指定\
  \ id，则会自动为您生成一个。如果您想使用 JavaScript 处理任何页面组件，则需要为 `h:form` 指定一个 id，否则将永远无法以编程方式访问它们。\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n■ **注意** 本示例快速概述了标准 Jakarta Server Faces 组件中的一部分。有关\
  \ Jakarta Server Faces 组件及其用法的深入解释，请参阅第 4 章。\n\n标准 Jakarta Server Faces 组件库包含多种组件，示例中使用了其中的一部分。`h:graphicImage`\
  \ 标签可用于在页面上放置图像，并在需要时使用 Jakarta Server Faces 控制器类。`h:graphicImage` 标签被渲染为 HTML 组件，并且与所有其他\
  \ Jakarta Server Faces 组件一样，它在其属性中接受 Jakarta 表达式语言表达式，从而允许渲染动态图像。在本示例中，使用 `url`\
  \ 属性指定了一个静态图像，但也可以使用表达式，通过 Jakarta Server Faces 控制器类字段来指定。`library` 属性用于指定资源（本例中为图像）所在的目录：\n\
  \n<h:graphicImage id=\"jakartaee10recipes\" library=\"image\" name=\"jakartaee10recipes.png\"\
  \n\nwidth=\"350px\"/>\n\n\n\n`h:outputLabel` 标签在渲染视图时，可用于读取控制器类的属性并显示其值。它们会作为视图中对应字段的标签进行渲染。该示例为\
  \ `h:outputLabel` 组件使用了静态值，但如有需要，也可以包含 Jakarta Server Faces 表达式。`h:outputText` 组件同样可用于读取控制器类的属性并显示其值。该组件在页面上渲染基本文本。`h:outputLabel`\
  \ 和 `h:outputText` 的区别在于它们会被渲染成不同的 HTML 标签。这两个组件的 `value` 属性都可以接受 Jakarta Server\
  \ Faces 控制器类的表达式。\n\n在示例中，使用 `h:inputText` 组件在页面上显示了一些文本字段，该组件会渲染一个输入字段。`h:inputText`\
  \ 的 `value` 属性可以设置为 Jakarta Server Faces 控制器类的字段，从而将文本字段绑定到相应的控制器类属性。例如，示例中包含一个\
  \ `h:inputText` 组件，其 `value` 为 `#{authorController.newAuthorFirst}`，这会将组件绑定到 `AuthorController`\
  \ 类中的 `newAuthorFirst` 属性。如果该字段包含值，则在页面渲染时，文本字段中会显示该值。如果在相应的文本字段中输入值并提交表单，该值将通过其\
  \ setter 方法设置到 `newAuthorFirst` 字段中。`h:inputText` 标签允许对控制器类属性进行读写操作，因为它使用了左值 Jakarta\
  \ 表达式语言表达式。`h:inputTextarea` 标签与 `h:inputText` 非常相似，工作方式相同，但它渲染的是文本区域而非文本字段。\n\n\
  `h:commandButton` 组件用于在页面上渲染一个提交按钮。其 `action` 属性可以设置为 Jakarta Server Faces 控制器类的方法。当按下按钮时，将执行相应的控制器类方法，并提交表单。请求将被发送到\
  \ `FacesServlet` 控制器，并且页面上的所有属性都将被设置。有关 Jakarta Server Faces 生命周期的更多详细信息，请参阅配方 3-1。示例中使用的\
  \ `h:commandButton` 的 `action` 属性为 `#{authorController.addAuthor}`，这将调用 `AuthorController`\
  \ 类中的 `addAuthor` 方法。从该方法可以看出，当它被调用时，会利用在相应的 `h:inputText` 组件中为 `newAuthorFirst`、`newAuthorLast`\
  \ 和 `bio` 字段填充的值，向 `authorList` 中添加一个新的 `Author` 对象。以下摘自示例 Jakarta Server Faces\
  \ 视图的代码片段列出了 `h:commandButton` 组件：\n\n<h:commandButton id=\"addAuthor\" action=\"\
  #{authorController.addAuthor}\"\n\nvalue=\"Add Author\"/>\n\n示例中最后一个需要解释的组件是 `h:dataTable`。这个\
  \ Jakarta Server Faces 组件会被渲染成一个 HTML 表格，它使开发者能够用来自控制器类的数据集合动态填充表格。在示例中，`h:dataTable`\
  \ 的 `value` 属性被设置为控制器类属性 `#{authorController.authorList}`，该属性映射到一个填充了 `Author` 对象的实例列表。`dataTable`\
  \ 的 `var` 属性包含一个字符串，用于引用表格每一行中包含的不同对象。在示例中，`var` 属性被设置为 `author`，因此在 `dataTable`\
  \ 中引用 `#{author.first}` 将返回当前 `Author` 对象的 `first` 属性的值。示例中的 `dataTable` 有效地打印出了\
  \ `authorList` 中每个 `Author` 对象的 `first` 和 `last` 名称。这只是对 Jakarta Server Faces `dataTable`\
  \ 组件工作原理的快速概述。更多详细信息，请参考配方 3-12。\n\n随着您更多地构建 Jakarta Server Faces 视图，您将非常熟悉组件库。这些标签将变得得心应手，您将能够为您的应用程序构建高度复杂的视图。要了解每个组件的更多信息，请参考此\
  \ Javadoc 链接：[`javadoc.io/doc/jakarta.faces/jakarta.faces-api/latest/index.html`](https://javadoc.io/doc/jakarta.faces/jakarta.faces-api/latest/index.html)。将外部的\
  \ Jakarta Server Faces 组件库与 Ajax 结合使用来更新组件，才是真正的锦上添花！您将在第 5 章中学习更多关于如何锦上添花以及创建美观且用户友好的视图的知识！\n\
  \n3-4. 在 Jakarta Server Faces 页面中显示消息\n\n问题\n\n您需要为应用程序用户在屏幕上显示一条信息消息。\n\n解决方案\n\
  \n将 `h:messages` 组件添加到您的 Jakarta Server Faces 视图中，并使用 `FacesMessage` 对象在视图的控制器类中根据需要创建消息。以下\
  \ Jakarta Server Faces 视图摘自文件 `/webapp/chapter03/recipe03_04.xhtml`；它包含一个 `h:messages`\
  \ 组件标签，该标签将渲染在相应页面的控制器类中使用 `FacesContext` 注册的任何消息。它还包含一个绑定到 `h:inputText` 字段的 `h:message`\
  \ 组件。`h:message` 组件可以显示特定于相应文本字段的消息：\n\n<?xml version='1.0' encoding='UTF-8' ?>\n\
  \n<!DOCTYPE html>\n\n<html\n\n>\n\n<h:head>\n\n<meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=UTF-8\"/>\n\n<title>配方 3-4：在 Jakarta Server Faces\
  \ 中显示消息</title>\n\n</h:head>\n\n<h:body>\n\n<h:form id=\"componentForm\">\n\n<h1>Jakarta\
  \ Server Faces 消息</h1>\n\n<p>\n\n此页面下方包含一个 Jakarta Server Faces 消息组件。一旦 bean 被初始化，\n\
  \n它将显示来自 Jakarta Server Faces 托管 bean 的消息。\n\n</p>\n\n<h:messages errorStyle=\"\
  color: red\" infoStyle=\"color: green\" globalOnly=\"true\"/>\n\n<br/>\n\n<br/>\n\
  \n在此处输入单词 Java：\n\n<h:inputText id=\"javaText\" value=\"#{messageController.javaText}\"\
  />\n\n<h:message for=\"javaText\" errorStyle=\"color: red\" infoStyle=\"color: green\"\
  />\n\n<br/><br/>\n\n<h:commandButton id=\"addMessage\" action=\"#{messageController.newMessage}\"\
  \n\nvalue=\"新消息\"/>\n\n</h:form>\n\n</h:body>\n\n</html>\n\n此示例中的控制器类名为 `MessageController`。它将在初始化时创建一条\
  \ Jakarta Server Faces 消息，然后每次调用 `newMessage` 方法时，都会显示另一条消息。此外，如果在与 `h:inputText`\
  \ 标签对应的文本字段中输入文本 *java*，则会为该组件显示一条成功消息。否则，如果在该字段中输入了不同的值或该字段留空，则会显示一条错误消息。以下是 `MessageController`\
  \ 的代码：\n\npackage org.jakartaeerecipe.chapter03.recipe03_04;\n\nimport java.util.Date;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\n\nimport jakarta.faces.application.FacesMessage;\n\
  \nimport jakarta.faces.context.FacesContext;\n\nimport jakarta.inject.Named;\n\n\
  @Named\n\n@SessionScoped\n\npublic class MessageController implements java.io.Serializable\
  \ {\n\nint hitCounter = 0;\n\nprivate String javaText;\n\n/**\n\n* 创建 MessageController\
  \ 的新实例\n\n*/\n\npublic MessageController() {\n\njavaText = null;\n\nFacesMessage\
  \ facesMsg = new FacesMessage(FacesMessage.SEVERITY_INFO, \"托管 Bean\n\n已初始化\", null);\n\
  \nFacesContext.getCurrentInstance().addMessage(null, facesMsg);\n\n}\n\npublic void\
  \ newMessage(){\n\nString hitMessage;\n\nhitCounter++;\n\nif(hitCounter > 1){\n\n\
  hitMessage = hitCounter + \" 次\";\n\n} else {\n\nhitMessage = hitCounter + \" 次\"\
  ;\n\n}\n\nDate currDate = new Date();\n\nFacesMessage facesMsg = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\
  \n\"您已经按了那个按钮 \" + hitMessage + \"！当前日期\n\n和时间：\"\n\n+ currDate, null);\n\n\n\n\
  `FacesContext.getCurrentInstance().addMessage(null, facesMsg);`\n\n`FacesMessage\
  \ javaTextMsg;`\n\n`if (getJavaText().equalsIgnoreCase(\"java\")){`\n\n`javaTextMsg\
  \ = new FacesMessage(FacesMessage.SEVERITY_INFO,`\n\n`\"做得好，这是正确的文本！\", null);`\n\
  \n`} else {`\n\n`javaTextMsg = new FacesMessage(FacesMessage.SEVERITY_ERROR,`\n\n\
  `\"抱歉，这不是正确的文本！\", null);`\n\n`}`\n\n`FacesContext.getCurrentInstance().addMessage(\"\
  componentForm:javaText\", javaTextMsg);`\n\n`}`\n\n`/**`\n\n`* @return the javaText`\n\
  \n`*/`\n\n`public String getJavaText() {`\n\n`return javaText;`\n\n`}`\n\n`/**`\n\
  \n`* @param javaText the javaText to set`\n\n`*/`\n\n`public void setJavaText(String\
  \ javaText) {`\n\n`this.javaText = javaText;`\n\n`}`\n\n`}`\n\n如果消息是错误消息，页面将以红色文本显示；如果是信息性消息，则以绿色文本显示。在此示例中，初始化消息以绿色打印，更新消息以红色打印。在浏览器中输入\
  \ URL `http://localhost:8080/JakartaEERecipes_Chapter03-1.0-SNAPSHOT/chapter03/recipe03_04.xhtml`，将显示如图\
  \ 3-6 所示的输出。\n\n***图 3-6.** 生成的 Jakarta Server Faces 视图*\n\n第 3 章 ■ Jakarta Server\
  \ Faces\n\n工作原理\n\n向应用程序用户传递消息始终是一个好主意，尤其是在用户需要执行某些操作时。Jakarta Server Faces 框架提供了一个简单的\
  \ API，允许从 Jakarta Server Faces 控制器类向视图添加消息。要使用该 API，请将 `h:message` 组件添加到视图中，用于显示绑定到特定组件的消息；并将\
  \ `h:messages` 组件添加到视图中，用于显示未绑定到特定组件的消息。`h:message` 组件包含许多可用于自定义消息输出和其他内容的属性。\n\n\
  可以通过在 `h:message` 的 `for` 属性中指定同一视图中某个组件的 ID，将其绑定到该组件。`h:message` 组件最重要的属性如下：\n\n\
  • `id`：指定组件的唯一标识符\n• `rendered`：指定是否渲染消息\n• `errorStyle`：指定应用于错误消息的 CSS 样式\n• `errorClass`：指定应用于错误消息的\
  \ CSS 类\n• `infoStyle`：指定应用于信息性消息的 CSS 样式\n• `infoClass`：指定应用于信息性消息的 CSS 类\n• `for`：指定消息所属的组件\n\
  \n有关 `h:message` 组件所有可用属性的列表，请参阅在线文档。在本配方的示例中，`h:message` 组件绑定到 ID 为 `javaText`\
  \ 的 `h:inputText` 组件。当页面提交时，将调用 `MessageController` 类中的 `newMessage` 方法。\n\n此示例中使用该方法生成要在页面上显示的消息。如果在\
  \ `javaText` 属性中输入的文本与 `Java` 匹配，则页面上将打印一条成功消息。要创建消息，需要生成一个 `jakarta.faces.application.FacesMessage`\
  \ 类的实例，并传递三个参数，分别对应消息严重性、消息摘要和消息详情。创建 `FacesMessage` 对象时可以不传递任何参数，但通常更高效的做法是在实例化时将消息传递给构造函数。创建\
  \ `FacesMessage` 对象的一般格式如下：\n\n`new FacesMessage(FacesMessage.severity severity,\
  \ String summary, String detail)`\n\n通过传递 `FacesMessage` 类中的静态字段来指定消息严重性。表 3-2 显示了可能的消息严重性值及其描述。\n\
  \n***表 3-2.** FacesMessage 严重性值*\n\n**严重性**\n\n**描述**\n\n`SEVERITY_ERROR`\n\n表示发生了错误\n\
  \n`SEVERITY_FATAL`\n\n表示发生了严重错误\n\n`SEVERITY_INFO`\n\n表示信息性消息，而非错误\n\n`SEVERITY_WARN`\n\
  \n表示可能发生了错误\n\n\n\n在示例中，如果为 `javaText` 属性输入的值等于 `Java`，则会创建一条信息性消息。否则，将创建一条错误消息。无论哪种情况，一旦消息创建完成，就需要使用\
  \ `FacesContext.getCurrentInstance()` 将其传递到当前上下文中。\n\n第 3 章 ■ Jakarta Server Faces\n\
  \n`addMessage(String componentId, FacesMessage message)`。在示例中，调用该方法时传递了组件 ID `componentForm:javaText`。这指向\
  \ Jakarta Server Faces 视图中 ID 为 `javaText` 的组件（`h:inputText` 组件）。`componentForm`\
  \ 标识符属于包含 `h:inputText` 组件的表单（`h:form` 组件），因此实际上 `h:inputText` 组件是嵌套在 `h:form` 组件中的。要引用嵌套组件，请使用冒号作为分隔符组合组件\
  \ ID。以下是示例中的摘录，演示了如何创建消息并将其发送到 `h:message` 组件：\n\n```java\nFacesMessage javaTextMsg\
  \ = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\"抱歉，这不是正确的文本！\", null);\nFacesContext.getCurrentInstance().addMessage(\"\
  componentForm:javaText\", javaTextMsg);\n```\n\n`h:messages` 组件可用于显示与视图相关的所有消息，也可以通过使用\
  \ `globalOnly` 属性仅显示非组件相关的消息。`h:messages` 的所有其他属性与 `h:message` 组件非常相似。通过为 `globalOnly`\
  \ 属性指定 `true` 值，您是在告诉组件忽略任何特定于组件的消息。因此，任何发送到特定组件的 `FacesMessage` 都不会由 `h:messages`\
  \ 显示。在示例中，由 `h:messages` 显示的消息生成方式与特定于组件的消息相同，只是没有指定消息所属的特定组件。以下摘录演示了向 `h:messages`\
  \ 组件发送错误消息。请注意，传递给 `FacesMessage` 调用的最后一个参数是 `null` 值。此参数应为 `clientId` 规范，通过将其设置为\
  \ `null`，您表示没有指定的客户端标识符。因此，该消息应为全局消息，而不是绑定到特定组件。\n\n```java\nFacesMessage facesMsg\
  \ = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\"您已按下该按钮 \" + hitMessage + \"\
  ！当前日期和时间：\"\n+ currDate, null);\nFacesContext.getCurrentInstance().addMessage(null,\
  \ facesMsg);\n```\n\n在应用程序中，在适当的时间显示适当的消息非常重要。通过使用 `FacesMessages` 对象，并利用 `h:message`\
  \ 或 `h:messages` 组件显示它们，您可以确保应用程序用户充分了解应用程序状态。\n\n3-5. 无需重新编译即可更新消息\n\n问题\n\n您希望将消息指定在属性文件中，以便可以即时编辑，而不是将消息硬编码到控制器类中。\n\
  \n解决方案\n\n创建一个资源包或属性文件，并在其中指定您的消息。然后从资源包中检索消息并将其添加到 `FacesMessages` 对象中，而不是硬编码字符串值。在下面的示例中，使用资源包来指定要在页面上显示的消息。如果您需要随时更改消息，只需修改资源包并重新加载浏览器中的页面，无需重新部署整个应用程序或更改任何代码。\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n以下代码摘自文件（`/webapp/chapter03/recipe03_05.xhtml`）；这是一个\
  \ Jakarta Server Faces 视图，其中包含用于显示来自相应控制器类消息的 `h:messages` 组件：\n\n```xml\n<?xml\
  \ version='1.0' encoding='UTF-8' ?>\n<!DOCTYPE html>\n<html\n>\n<h:head>\n<meta\
  \ http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"/>\n<title>配方\
  \ 3-5：指定可更新消息</title>\n</h:head>\n```\n\n\n\n<h:body>\n\n<h:form id=\"componentForm\"\
  >\n\n<h1>使用资源包</h1>\n\n<p>\n\n下方消息来自一个资源包。添加 `h:outputText` 组件到页面仅用于实例化本示例中的 bean。若要更改消息，只需修改资源包中对应的消息，然后刷新页面即可。\n\
  \n</p>\n\n<h:outputText id=\"exampleProperty\" value=\"#{exampleController.exampleProperty}\"\
  />\n\n<br/>\n\n<h:messages errorStyle=\"color: red\" infoStyle=\"color: green\"\
  \ globalOnly=\"true\"/>\n\n</h:form>\n\n</h:body>\n\n</html>\n\n接下来，控制器类负责创建消息并通过\
  \ `FacesContext` 将其发送到 `h:messages` 组件。以下是 `ExampleController` 的源代码，它是本示例中 Jakarta\
  \ Server Faces 视图的控制器类：\n\npackage org.jakartaeerecipe.chapter03.recipe03_05;\n\n\
  import java.util.ResourceBundle;\n\nimport jakarta.enterprise.context.RequestScoped;\n\
  \nimport jakarta.faces.application.FacesMessage;\n\nimport jakarta.faces.context.FacesContext;\n\
  \nimport jakarta.inject.Named;\n\n@Named(value=\"exampleController\")\n\n@RequestScoped\n\
  \npublic class ExampleController {\n\nprivate String exampleProperty;\n\n/**\n\n\
  * 创建 ExampleController 的新实例\n\n*/\n\n![](img/index-172_1.png)\n\n第 3 章 ■ Jakarta\
  \ Server Faces\n\npublic ExampleController() {\n\nexampleProperty = \"用于实例化 bean。\"\
  ;\n\nFacesMessage facesMsg = new FacesMessage(FacesMessage.SEVERITY_INFO,\n\nResourceBundle.getBundle(\"\
  /org/jakartaeerecipe/chapter03/Bundle\").\n\ngetString(\"ExampleMessage\"), null);\n\
  \nFacesContext.getCurrentInstance().addMessage(null, facesMsg);\n\n}\n\n/**\n\n\
  * @return exampleProperty\n\n*/\n\npublic String getExampleProperty() {\n\nreturn\
  \ exampleProperty;\n\n}\n\n/**\n\n* @param exampleProperty 要设置的 exampleProperty\n\
  \n*/\n\npublic void setExampleProperty(String exampleProperty) {\n\nthis.exampleProperty\
  \ = exampleProperty;\n\n}\n\n}\n\n资源包的位置如图 3-7 所示。\n\n***图 3-7.** 国际化后包含消息的资源包*\n\
  \n包含消息的资源包由控制器类读取以获取消息。\n\n如果你想更新消息，无需重新编译任何代码即可完成：\n\n"
- "# 这是一个示例资源包文件\n\nExampleMessage=此消息可通过更新消息包来更改！\n\n当页面加载时，`h:outputText` 组件会实例化\
  \ `ExampleController`，后者进而创建用于在屏幕上显示消息的 `FacesMessage` 对象。\n\n![](img/index-173_1.png)\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n工作原理\n\n通常，能够更新自定义系统消息或用户消息而非硬编码它们是非常有用的。这在某些特定消息中包含的自定义信息未来可能发生变化的情况下尤为实用。能够简单地以文本格式更新消息，而不是编辑代码、重新编译和重新部署应用程序，这非常方便。使用资源包可以创建可更新的消息。资源包本质上是一个属性文件，包含名称-值对。向资源包添加自定义消息时，需为消息指定合适的名称，然后将自定义消息作为属性的值部分添加。应用程序随后可以通过名称查找该属性并使用其值。在本例中，该值是一个字符串，用于创建\
  \ `FacesMessage` 实例。\n\n在示例中，资源包包含一个名为 `ExampleMessage` 的属性及其对应的值。当 Jakarta Server\
  \ Faces 视图加载到浏览器时，`ExampleController` 类被实例化，从而执行其构造函数。创建一个 `FacesMessage` 实例，生成类型为\
  \ `FacesMessage.SEVERITY_INFO` 的消息，并读取资源包以获取 `ExampleMessage` 属性的值。以下摘录演示了如何从资源包中获取指定的消息值：\n\
  \nResourceBundle.getBundle(\"/org/jakartaeerecipe/chapter03/Bundle\").\n\n\n\ngetString(\"\
  ExampleMessage\"), null);\n\n消息创建后，会被添加到当前 `FacesContext` 实例中，随后在页面渲染时显示出来。使用资源包来指定消息可以大大简化工作，因为您不再需要重新编译代码来更新这些消息。此功能在国际化中也非常有用，因为它可用于存储特定于区域设置的资源。图\
  \ 3-8 展示了本配方的输出结果。\n\n***图 3-8.** 生成的 Jakarta Server Faces 视图*\n\n3-6. 基于条件进行导航\n\
  \n问题\n\n您的 Jakarta Server Faces 应用程序包含多个页面，并且您希望设置它们之间的导航。\n\n![](img/index-174_1.png)\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n解决方案\n\n利用以下技术之一在 Jakarta Server Faces 应用程序中执行导航：\n\
  \n• 通过使用 Jakarta Server Faces 控制器类方法以及相应的 `faces-config.xml` 配置文件来使用显式导航，以控制应用程序的导航。\n\
  \n• 使用隐式导航，在控制器类中指定要渲染的下一个视图，从操作方法中以 `String` 格式返回视图的名称。\n\n• 使用隐式导航，通过将视图名称指定为组件标签的\
  \ `action` 属性，完全绕过控制器类。\n\n本配方中的示例由四个 Jakarta Server Faces 视图组成，每个视图都包含调用导航到另一个视图的\
  \ `h:commandButton` 组件。这些 `h:commandButton` 组件链接到视图对应控制器类 `NavigationController`\
