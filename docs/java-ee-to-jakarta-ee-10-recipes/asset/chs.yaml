  \ 669\n\nxxxv\n\n**关于作者**\n\n**Josh Juneau** 从事软件和数据库系统开发已有多年。自职业生涯伊始，数据库应用开发与复杂\
  \ Web 应用便一直是其工作重心。早期，他成为 Oracle 数据库管理员，并采用 PL/SQL 语言执行管理任务及开发 Oracle 数据库应用。为了构建更复杂的解决方案，他开始将\
  \ Java 融入 PL/SQL 应用，随后又使用 Java 开发独立应用和 Web 应用。Josh 早期的 Java Web 应用利用 JDBC 与后端数据库交互。后来，他将框架（包括\
  \ Java EE、Spring 和 JBoss Seam）引入企业级解决方案。如今，他主要使用 Java EE 开发企业级 Web 解决方案。\n\n他通过使用\
  \ Jython 和 Groovy 等其他 JVM 语言开发应用，拓展了对 JVM 的认知。2006 年，Josh 成为《Jython Monthly》新闻通讯的编辑和出版人。2008\
  \ 年底，他开始制作一个专注于 Jython 编程语言的播客。Josh 是《The Definitive Guide to Jython》、《Oracle PL/SQL\
  \ Recipes》和《Java 7 Recipes》的主要作者，这些书均由 Apress 出版。\n\n此后，他继续为 Apress 撰写 Java 相关书籍，包括其最新著作《Java\
  \ 9 Recipes》。他是 Oracle《Java Magazine》的活跃撰稿人，并有机会在 Java 用户组和会议上发表演讲。\n\n他担任应用开发人员和系统分析师，同时也是芝加哥\
  \ Java 用户组的贡献者。Josh 是 Apache NetBeans 提交者和 Java Champion。他参与 JCP，并曾是 Jakarta Faces\
  \ 专家组的一员，参与 Java EE 8 的开发。Josh 有一位贤惠的妻子和五个孩子，他非常珍惜与家人共度的时光。想了解更多 Josh 的信息，请关注他的博客，网址为[`jj-blogger.blogspot.com`](http://jj-blogger.blogspot.com)。您也可以在\
  \ Twitter 上通过@javajuneau 关注他。\n\n**Tarun Telang** 是一位实践型技术专家，在设计和实现多层、高度可扩展的软件应用方面拥有丰富经验。他曾任职于微软、Oracle、Polycom\
  \ 和 SAP 等多家知名公司。他在架构和开发商业应用方面拥有超过 17 年的经验。\n\n他的职业生涯始于 SAP 的企业 Java 开发人员，在那里他为大型公司开发分布式应用软件。他从企业会话\
  \ Bean 和消息驱动 Bean 入手，并利用 Java 管理扩展（JMX）技术对企业应用的配置和管理进行监控。\n\n他迅速掌握了各种企业技术，如 Enterprise\
  \ Beans、Java Management\n\nExtensions、Servlets 和 Server Pages 技术。在成为开发人员的第一年，他就获得了\
  \ Java 平台标准版 6 的 Sun 认证程序员资格，以及 SAP NetWeaver Java Web 应用服务器（一个符合 Java EE 5 标准的应用服务器）的\
  \ SAP 认证开发顾问资格。\n\n\n\n他还精通 XML 技术，如 XSLT 和 XSD，并利用这些技术，通过会话 Bean 和消息驱动 Bean 开发了多个解决方案，以处理跨多个系统的面向消息的通信。2007\
  \ 年，Tarun 因其在 SAP 开发者社区中关于新兴技术的文章和博客文章，以及推广创新解决方案，被授予 SAP 导师和社区影响者称号。他经常撰写关于 Java\
  \ 及相关技术的文章。Tarun 还创作了多门在线课程，其中包括一门关于 YAML 数据序列化语言的畅销课程。\n\nxxxvii\n\n■ 关于作者\n\n\
  他曾在多个开发者大会上发表技术演讲，包括 SAP TechEd 和 Great Indian Developer Summit。他在会议上发表关于软件技术的演讲已有超过\
  \ 15 年，并积极发表技术论文和博客，以帮助大家更好地掌握软件技术的基础知识。Tarun 还使用 Spring 框架的微服务架构开发了基于云的视频会议应用程序，并拥有使用持久化\
  \ API 和 Hazelcast 框架构建基于 REST 的服务的工作经验。\n\n后来，他领导了多个端到端云端解决方案的开发，使用了包括微服务和面向服务架构在内的多种架构模式。Tarun\
  \ 在 Web、移动和云技术方面积累了专业知识。他还精通应用敏捷方法论，包括以用户为中心和移动优先的设计，用于管理跨地域的跨职能团队项目。\n\nTarun 曾在加拿大和德国工作，目前与妻子和孩子居住在印度海得拉巴。您可以通过\
  \ LinkedIn 或 Twitter（@taruntelang）关注他。\n\nxxxviii\n\n![](img/index-38_1.jpg)\n\n\
  **关于技术审校**\n\n**Manuel Jordan Elera** 是一位自学成才的开发者和研究员，他喜欢学习新技术用于自己的实验并创建新的集成。Manuel\
  \ 曾获得 Springy Award – Community Champion 和 Spring Champion 2013 奖项。在闲暇时间，他阅读圣经并用吉他作曲。Manuel\
  \ 以 dr_pompeii 之名闻名。他为 Apress 技术审校了多本书籍，包括 *Pro Spring MVC with WebFlux* (2020),\
  \ *Pro Spring Boot 2* (2019), *Rapid Java Persistence and Microservices* (2019),\
  \ *Java Language Features* (2018), *Spring Boot 2 Recipes* (2018), 以及 *Java APIs,\
  \ Extensions and Libraries* (2018)。阅读他关于许多 Spring 技术的 13 篇详细教程，可以通过他的博客 [www.manueljordanelera.blogspot.com](http://www.manueljordanelera.blogspot.com)\
  \ 联系他，并在 Twitter 上关注他，账号 @dr_pompeii。\n\nxxxix\n\n**致谢**\n\n致我的妻子 Angela：我依然对你感到惊叹，并将永远如此。再次感谢你激励我，并让我在事业上不断前进。你一直是我的支柱，我感激你所做的一切。\n\
  \n致我的孩子们，Kaitlyn, Jacob, Matthew, Zachary 和 Lucas – 我非常爱你们，我珍惜我们在一起的每一刻。我希望你们能找到生活中的热情，并像我享受与你们在一起的每一天一样享受每一天。我希望我能让时间慢下来……你们成长得太快了！\n\
  \n我要感谢我的家人对我职业生涯的持续支持。我还要感谢我的同事们，让我能够指导组织的应用程序开发工作，并构建成功的解决方案，使我们不断前进。\n\n致 Apress\
  \ 的朋友们 – 我感谢你们再次给我机会与他人分享我的知识。我特别感谢 Jonathan Gennick 对我工作的持续支持，并持续提供指导，为我们的读者制作有用的内容。我还要感谢\
  \ Jill Balzano 在协调这个项目以及我之前许多其他项目方面所做的出色工作。最后，我要感谢 Apress 所有参与本书工作的其他人。\n\n致 Java\
  \ 社区 – 再次感谢你们帮助 Java 平台成为应用程序开发如此创新和有效的领域。我特别要感谢 Java EE 社区中那些通过 EE4J、Eclipse 工作组、Java\
  \ EE Guardians 以及其他 Java EE 和 Jakarta EE 的演讲者、作者和布道者，为推动事情发展做出贡献的人。致芝加哥 Java 用户组的成员们，我要感谢你们帮助芝加哥成为\
  \ Java 专业知识的最佳地点之一。我还要感谢我的 Java OffHeap 播客的同伴们 – Freddy Guime, Bob Paulin, Michael\
  \ Minella 和 Jeff Palmer – 你们让我始终参与所有 Java 技术，并且每月有机会见面讨论 Java 是我的荣幸。\n\n—Josh Juneau\n\
  \n我要感谢我的妻子 Nikita 和儿子 Vihan，在我撰写本书的过程中给予我的耐心和爱。我感激所有在我职业生涯每个阶段不断鼓励我成长的导师和朋友。\n\n\
  我要感谢我的父母，他们引导我走向正确的技术方向，并始终支持我的每一步，即使我决定做一些与他们期望完全不同的事情。\n\n同样重要的是，如果没有他们，我可能不会成为一名开发者并拥有如此出色的职业生涯。最后，再次感谢我的妻子（也是灵魂伴侣）Nikita。与一个不仅在职业上而且在个人方面都能激励你、挑战你的人在一起，这种感觉太棒了。谢谢你一直在我身边！\n\
  \n我要特别感谢 Josh Juneau（合著者）和 Manuel Jordan Elera（技术审校）在本书中做出的无可挑剔的工作。我也非常感谢 Steve\
  \ Anglin、Mark Powers 以及 Apress Media (apress.com) 的每一位，感谢他们为本书出版提供的支持。\n\n最后但同样重要的是，我要感谢您，读者，感谢您花时间阅读本书。我希望它能帮助您成为更好的\
  \ Jakarta EE 开发者。\n\n—Tarun Telang\n\nxli\n\n**引言**\n\nJava 平台是世界上最流行的应用程序开发平台之一。这个平台非常流行，以至于存在多个不同的\
  \ Java 版本，可用于开发在多种环境中运行的应用程序。从开发桌面、移动或 Web 应用程序到操作系统，开发者可以利用 Java 创建几乎任何解决方案。Java\
  \ 在构建 Web 和企业应用程序方面变得极其流行，它以其安全性、可靠性等优势提供 Web 服务。\n\n企业 Java（目前称为 Jakarta 企业版）是构建和部署企业应用程序最广泛采用的平台。自\
  \ 1997 年诞生以来，它已经走过了漫长的道路。它最初是作为 Java 2 平台标准版（J2SE）的扩展开始的，并逐渐演变成一个模块化的编程模型，包含许多支持中间件技术的不同规范。Sun\
  \ Microsystems 最初于 1999 年将其作为 Java 2 平台企业版（J2EE）发布。J2EE 的第一个版本旨在使用 JSP 作为在 Web 浏览器上渲染\
  \ HTML 页面的视图技术，以及使用 Servlet 在服务器端处理 Java 代码，来构建基于组件的 n 层分布式客户端-服务器应用程序。\n\n尽管有多个企业框架可用于在\
  \ Java 平台上开发可靠和安全的应用程序，但将特定解决方案标准化以最小化定制并帮助采用围绕 Java 企业开发的行业标准是有意义的。该平台最初包含少量用于标准化的规范，包括\
  \ Java Servlet、Java Server Pages、RMI、Java 数据库连接（JDBC）、Java 消息服务 API（JMS）、Java 事务\
  \ API（JTA）和企业 JavaBean。\n\n\n\nJ2EE 应用的早期开发存在显著的学习曲线，并且由于需要大量 XML 配置而显得繁琐。尽管存在这些障碍，但由于\
  \ Java 的普及及其众所周知的安全优势，它仍然在大型组织和公司中流行起来。\n\n2001 年，J2EE 1.3 发布，为平台增加了更多规范，包括 Java\
  \ 服务器页面标准标签库（JSTL）和 Java 认证与授权服务（JAAS）。其他规范，如 Java Servlet，也在 J2EE 1.3 版本中得到了增强，为平台带来了渐进式的改进。\n\
  \n2003 年 J2EE 1.4 的发布标志着 Java 企业版的一个重要里程碑，因为许多新规范被添加到平台中，为更多 Java 技术提供了标准。J2EE 1.4\
  \ 标志着 J2EE 1.1 的 Web 服务、Java Server Faces 以及用于 XML 解决方案的 Java API（如 JAXP、JAXR 等）的首次迭代。尽管\
  \ J2EE 1.4 版本包含了许多规范，但它仍被认为“难以学习”、“繁琐”且“效率不高”。在接下来的几年里，J2EE 被重新设计，试图使其更易于学习和用于构建现代\
  \ Web 应用程序。虽然 XML 是一种出色的配置手段，但它可能难以管理和维护，因此配置成为下一个版本要解决的重点问题。诸如企业 JavaBean（EJB）之类的技术包含一些冗余特性，使得\
  \ EJB 编码耗时且管理复杂，因此对 EJB 进行彻底改革也势在必行。\n\n2006 年 5 月，Sun Microsystems 发布了 Java EE\
  \ 5，摒弃了 J2EE 这个缩写，改名为 Java EE。Java EE 5 平台显著更易于使用和维护，因为它引入了诸如注解之类的特性，大大减少了 XML 配置的数量。现在可以通过注解注入配置。这使得\
  \ EJB 更易于开发，并且 Java 持久化 API（JPA）成为对象关系映射的一项有市场价值的技术。因此，Java 企业版已成为企业开发中广泛采用且成熟的平台。\n\
  \n在收购 Sun Microsystems 之后，Oracle 公司于 2009 年发布了 Java EE 6，使配置和 API 更加简单，并为平台增加了更多规范。引入了诸如上下文和依赖注入（CDI）以及\
  \ Bean 验证等规范，极大地改变了平台的面貌并简化了开发流程。\n\nJava EE 7（2013 年发布）继续加强和现代化该平台，增加了 WebSockets\
  \ 和 JSON-P 规范。在 Java EE 7 版本中，Java Server Faces 和 EJB 等规范也得到了增强，增加了更多功能以提高生产力和功能性，并更好地适用于更现代的\
  \ Web 解决方案。\n\n时间线上接下来发生的事情对 Java EE 平台来说是一个决定性的变革。Java EE 8 计划于 2015 年开始，构成该平台的许多规范也开始运作。Java\
  \ EE 8 的重点是继续在整个 API 中实现与 Java SE 8 的兼容性，并继续使 API 更易于使用。另一个重点是创建新的规范，以便更容易地使用 Java\
  \ EE 开发微服务。\n\n2015 年底，许多规范的进展停滞不前，整个平台全面陷入停顿。少数规范，如 Java Server Faces、CDI 和 JSON-B\
  \ 继续推进，而其他许多规范则陷入僵局。社区开始担忧 Java EE 的未来，并且有一种看法认为 Oracle 将终止它。Oracle 对 Java EE 8\
  \ 的进展保持沉默，不确定性弥漫在空气中。大约在同一时期，Java EE Guardians 组织成立，其重点是试图让 Oracle 就该平台的未来方向发表声明，并使该平台开源，而不是放弃它。大约在同一时间，Microprofile\
  \ 项目也作为多个 Java EE 容器供应商的合作努力而启动，专注于为 Java EE 平台提供一个真正的微服务配置文件。\n\n2016 年底，Oracle\
  \ 改变了 Java EE 8 的方向，移除了一些先前计划的规范更新，并增加了其他内容。为了在 2017 年发布最终版本，人们重新努力推动 Java EE 8\
  \ 向前发展，致力于打造一个更好的平台来构建基于微服务的应用程序。Java EE 8 版本于 2017 年秋季最终确定，其中包括对许多规范的更新。然而，为了按时发布，Oracle\
  \ 放弃了一些计划用于增强微服务开发的规范，包括 MVC 和健康检查 API。\n\n就在 Java EE 8 发布之前，Oracle 宣布他们将开源 Java\
  \ EE。不久之后，Oracle 还宣布将把所有的 Java EE 源代码（针对每个底层规范）以及所有文档和 TCK（技术兼容性工具包）贡献给 Eclipse\
  \ 基金会。2017 年底，EE4J（Eclipse Enterprise for Java）项目成立，每个规范的转移工作也随之开始。\n\n2018 年初，开源\
  \ EE4J 项目下的平台新名称定为 Jakarta EE。平台供应商使用 TCK 来测试其 Jakarta EE 实现与 Jakarta EE 规范的兼容性。TCK\
  \ 提供了一套全面的测试，确保所有规范特性的实现都是正确且一致的。一旦 Oracle 转移了所有规范源代码、文档和 TCK，Jakarta EE 8 就成为第一个与\
  \ Java EE 8 对等的版本。\n\n2020 年 11 月，Eclipse 基金会发布了 Jakarta EE 9。它不包含对平台的任何重大更改。最重要的里程碑是将所有\
  \ API 从 `*.javax*` 命名空间迁移到 `*.jakarta*` 命名空间，因为由于商标限制，不允许修改 `*.javax*` 命名空间。\n\n\
  2021 年 2 月，Eclipse 基金会发布了 Jakarta EE 9.1。Jakarta EE 9.1 在 Jakarta EE 9 的基础上增加了对\
  \ Java SE 11 的支持。Jakarta EE 平台现在旨在提供企业级的云原生开发特性。它计划通过每个新版本改进和简化其企业级 API。\n\nJakarta\
  \ EE 10 是 `*.jakarta*` 命名空间迁移后的第一个主要 Jakarta EE 版本。它也是自 Java 社区流程（JCP）过渡到 Eclipse\
  \ 基金会以来的第三个 Jakarta EE 版本。此版本的关键主题围绕 CDI 对齐、Java SE 对齐以及缩小标准化差距等特性。随着 Jakarta EE\
  \ 10 的发布，其中一些组件规范对其 API 进行了重大更改，需要从上一个版本进行主版本升级。同时，许多其他组件规范引入了二进制兼容的更新，只需要进行次版本更新。\n\
  \nJakarta EE 平台包含了所有组件规范。它针对需要 Jakarta EE 全部功能的企业应用程序。相比之下，以下配置文件规范包含了专注于开发 Web\
  \ 平台和微服务架构的各个规范。\n\nJakarta EE Web Profile 是 Jakarta EE 平台的一个子集，它提供了开发 Web 平台所需的最基本组件集合。\n\
  \n\n\nJakarta EE Core Profile 是 Jakarta EE 平台的一个子集，它提供了一个更小、更轻量级的运行时环境，用于开发云原生应用。它仅包含最核心的\
  \ API 和组件，非常适合需要快速启动和较小体积的微服务。\n\n从 Jakarta EE 8 迁移到 10 的过程中，社区增加了许多新功能。我在下面列出了一些比较有趣的功能。\n\
  \nHTTP/2 现在默认对所有 Servlet 和 Filter 启用。它使用多路复用连接来同时处理多个请求，而不是串行处理，从而显著降低了相对于 HTTP\
  \ 1.1 的延迟。\n\n现在，你可以直接将环境属性注入到应用程序中，并且可以使用应用程序上下文来配置资源。它允许你在单个位置配置资源，例如 RESTful\
  \ Web 服务或模型-视图-控制器（MVC）等组件的类和模板，而不是分散在多个部署描述符中。\n\n如果上述新功能还不够，那么与 Jakarta EE 8 相比，此版本的\
  \ Jakarta EE 在性能上也有显著提升。Jakarta EE 10 可与 Java SE 11 配合使用，充分利用了 JVM 和平台库中的最新优化。\n\
  \n本书重点介绍 Jakarta EE 10 版本。在本书中，我将把该平台称为 Jakarta EE。本书将整体介绍该平台，涉及构成 Jakarta EE 的大多数广泛使用的规范。你将通过实际案例和解决方案，学习如何使用每个主要规范。本书将涵盖已增强的\
  \ API，为平台新手提供完整的介绍。它还包含介绍平台最新特性的方案，以便经验丰富的企业级 Java 开发人员可以跳过那些入门概念，深入研究更新的内容。\n\n\
  我每天都在使用 Jakarta EE，并且对平台所涉及的技术充满热情。我希望这本书能激发你对整个平台的热情，并提高你的生产力。\n\n**本书读者对象**\n\n\
  希望无需阅读冗长的手册和费力寻找技术就能开发出有效且经过验证的解决方案的 Java 开发人员，将受益于本书。初级 Java 程序员会发现本书有助于学习该平台的各种不同解决方案，而高级开发人员则会喜欢这种问题-解决方案方法的便捷性，从而快速拓宽他们对平台最新技术的了解。\n\
  \n本书面向有兴趣学习 Jakarta 企业版（Jakarta EE）开发的 Java 开发人员，以及已经了解 Java EE/Jakarta EE 但希望了解\
  \ Jakarta EE 10 中包含的新功能信息的开发人员。Jakarta EE 开发新手可以阅读本书，它将帮助他们从零开始，快速上手并运行。希望用 Jakarta\
  \ EE 10 提供的最新功能更新自己技能库的中高级 Java 开发人员，也可以阅读本书，快速更新和刷新他们的技能。它还可以作为正在将应用程序从 Java EE\
  \ 迁移到 Jakarta EE 的组织的开发人员的指南。\n\n**本书结构**\n\n本书的结构使得读者无需从头到尾通读。实际上，它的结构允许开发人员选择他们想阅读的主题，并直接跳转到这些主题。每个方案都包含一个待解决的问题、一个或多个解决方案，以及关于解决方案如何工作的详细解释。虽然某些方案可能建立在其他方案中讨论过的概念之上，但它们会包含适当的引用，以便开发人员可以找到对解决方案有益的其他相关方案。本书旨在让开发人员能够快速上手并运行一个解决方案，以便他们能及时回家吃晚饭。\n\
  \n**约定**\n\n在整本书中，我保持了一致的风格来呈现 Java 代码、SQL、命令行文本和结果。当文本中出现代码片段、SQL、保留字或代码片段时，它们将以等宽\
  \ Courier 字体呈现，例如这个（可工作的）示例：\n\n```java\npublic class MyExample {\n    public static\
  \ void main(String[] args){\n        System.out.println(\"Jakarta EE is excellent!\"\
  );\n    }\n}\n```\n\n**下载代码**\n\n本书中示例的代码可在 `github.com/apress/javaEE-to-jakartaEE10-recipes`\
  \ 获取。\n\n> **注意** 本书的源代码可能会随着时间的推移而发生变化，以提供结合了 Jakarta EE 最新功能的新实现。也就是说，如果在源代码中发现任何问题，请通过本书的\
  \ Github 仓库提交，代码将相应地进行调整。\n\n**测试 Jakarta EE 应用程序项目**\n\n测试对于项目的成功极其重要且必不可少。话虽如此，我想通过我的测试\
  \ Jakarta EE 应用程序项目的方法，为你指明正确的方向。\n\n当然，测试是符合“多多益善”原则的目标之一，因此我认为采用多管齐下的方法进行测试非常重要。最明显的测试是，你必须测试应用程序的用户界面，并确保应用程序\
  \ UI 和业务逻辑在用户测试期间按预期运行。这可能是最简单的测试，因为它只需要对 Web 应用程序中的每个表单进行用户文档化测试。在用户测试开始之前，应该进行自动化单元测试和\
  \ UI 测试。所谓自动化单元测试，我指的是使用像 JUnit (https://junit.org/junit5/) 这样的框架来测试应用程序的业务逻辑。可以将此类测试配置为在每次构建和编译项目时运行。\n\
  \n自动化 UI 测试可以通过使用诸如 Arquillian (https://arquillian.org/) 之类的测试 API 以及像 Graphene\
  \ (http://arquillian.org/arquillian-graphene/) 这样的附加组件来实现。\n\n我的方法是利用 Arquillian\
  \ 通过 JUnit 进行所有单元测试的配置和协调，并通过 Graphene 进行自动化 UI 测试的编排。\n\n虽然这个主题太大，无法在本节中涵盖，但我想向你推荐一些在线资源，你可以使用它们开始对\
  \ Jakarta EE 应用程序项目进行 Arquillian 测试。通过阅读文档 (https://arquillian.org/docs/) 来充分理解\
  \ Arquillian 框架非常重要。\n\n最困难的部分之一是用正确的依赖项设置 Maven POM 文件。你可以在此处找到用于设置带有 Graphene\
  \ 扩展的 Arquillian 的示例 POM 文件依赖项列表：https://arquillian.org/guides/getting_started/#add_the_arquillian_apis。一旦依赖项设置好，创建每次构建项目时都会执行的测试就非常容易了。\n\
  \n\n\nArquillian 测试文件本质上是一个 Java 类，其中包含 JUnit（或其他测试框架）的测试，并在 Arquillian 框架下运行。该框架允许为每个测试类设置自定义部署包，仅打包运行单个测试所需的依赖项。然后，可以将此部署包部署到正在运行的应用服务器容器中，也可以部署到嵌入式容器中。根据我的经验，部署到现有服务器（通常是我本地机器上用于开发的同一台服务器）的成功率最高。\n\
  \nGraphene 扩展可用于编写应用程序特定页面上的 Web 交互代码。\n\n你可以编写完成 Web 表单（例如点击按钮）的代码，并测试指定的结果。\n\n\
  请使用以下链接中的指南开始使用 Arquillian 和 Graphene：\n\n• *入门指南* ([`arquillian.org/guides/getting_started/`](http://arquillian.org/guides/getting_started/))*：了解如何将\
  \ Arquillian 测试套件添加到你的项目，并创建你的第一个 Arquillian 测试。\n\n• *入门指南：重复与迭代* ([`arquillian.org/guides/getting_`](http://arquillian.org/guides/getting_started_rinse_and_repeat/)\n\
  \n[*started_rinse_and_repeat/*](http://arquillian.org/guides/getting_started_rinse_and_repeat/))：学习如何使用远程容器测试更复杂的\
  \ Jakarta EE 项目。\n\n• *使用 ShrinkWrap 创建可部署归档文件* ([`arquillian.org/guides/`](http://arquillian.org/guides/shrinkwrap_introduction/)\n\
