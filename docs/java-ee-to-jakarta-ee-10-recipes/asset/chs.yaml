  \ 2-8.** Jakarta 服务器页面配方 02-07a 的输出*\n\n工作原理\n\nJakarta 服务器页面技术使得处理表达式变得简单。条件页面渲染可以通过结合使用\
  \ Jakarta 表达式语言值表达式（包含在 `${ }` 字符序列中）和 Jakarta 标准标签库标签来实现。算术表达式也可以使用 Jakarta 表达式语言表达式来执行。为简化操作，表达式语言包含可用于帮助构成表达式的关键字或字符。本配方的示例包含了使用\
  \ Jakarta 标准标签库 `<c:if>` 标签的各种表达式和条件页面渲染。\n\n在示例中显示的第一个 Jakarta 服务器页面中，有一些条件页面渲染的示例。要使用\
  \ `<c:if>` 标签执行条件测试，必须确保在 Jakarta 服务器页面中导入 Jakarta 标准标签库。为此，请添加对 Jakarta 标准标签库的导入，并将其分配给一个字符或字符串。在以下配方摘录中，Jakarta\
  \ 标准标签库被分配给字符 `c`：\n\n<html\n\nversion=\"2.0\">\n\nJakarta 表达式语言值表达式包含在 `${` 和 `}`\
  \ 字符序列之间。\n\n这些字符内的任何内容都将被视为 Jakarta 表达式语言，因此语法必须正确，否则 Jakarta 服务器页面将无法编译成 servlet，并会抛出错误。所有使用\
  \ `${ }` 语法的表达式都会立即求值，并且它们是只读表达式。\n\n也就是说，不能使用此语法的任何表达式将值设置到 JavaBean 属性中。Jakarta\
  \ 服务器页面引擎首先对表达式求值，然后将其转换为字符串，最后将值返回给标签处理器。值表达式中可以引用四种类型的对象。它们是 JavaBean 组件、集合、枚举类型和隐式对象。如果使用\
  \ JavaBean 组件，则必须使用 `jsp:useBean` 元素（参见配方 2-3）在 Jakarta 服务器页面中注册该 JavaBean。\n\n\n\
  \n详细信息）。集合或枚举类型也可以通过已在页面中注册的 JavaBean 进行引用。隐式对象是指那些允许访问页面上下文、作用域变量以及其他类似对象的对象。表\
  \ 2-3 列出了可以从 Jakarta 表达式语言表达式中引用的不同隐式对象。\n\n第 2 章 ■ Jakarta 服务器页面\n\n***表 2-3.**\
