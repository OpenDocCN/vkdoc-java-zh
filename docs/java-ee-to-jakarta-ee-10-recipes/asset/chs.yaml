  f:validateLongRange\n\n向组件注册一个 LongRangeValidator\n\nf:validator\n\n向组件注册一个自定义验证器\n\
  \nf:validateRegex\n\n向组件注册一个 RegExValidator（JSF 2.0）\n\nf:validateBean\n\n将对本地值的验证委托给\
  \ BeanValidator（JSF 2.0）\n\nf:validateWholeBean\n\n对整个 bean 或类进行验证委托\n\nf:validateRequired\n\
  \n确保父组件中存在一个值\n\n\n\n■ **注意**：第 4 章中用于运行应用程序的常见源代码和已完成的类均包含在 `org.jakartaeerecipe.chapter04`\
  \ 包中，本章中的一个或多个示例将使用该包中的类。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n通用组件标签属性\n\n每个标准\
  \ Jakarta Server Faces 组件标签都包含一组属性，必须指定这些属性以将其与其他组件唯一区分、将组件注册到受管 Bean 等。有一组属性是所有组件标签共有的，本节将列出这些属性及其说明。*除\
  \ id 之外的所有属性*都可以使用 Jakarta 表达式语言指定：\n\n• `binding`：可以为该属性指定一个受管 Bean 属性，并可用于将标签绑定到受管\
  \ Bean 中的组件实例。这样做可以让你在受管 Bean 中以编程方式控制该组件。\n\n• `id`：此属性可设置为唯一标识该组件。如果你未指定 `id`\
  \ 属性的值，则 Jakarta Server Faces 将自动生成一个。视图中的每个组件必须具有唯一的 `id` 属性，否则在渲染页面时将生成错误。我建议你手动为每个组件标签指定\
  \ `id` 属性的值，因为这样在需要时，可以轻松地从脚本语言或受管 Bean 中静态引用该标签。如果你让 Jakarta Server Faces 自动填充此属性，它每次可能都不同，并且你将永远无法从脚本语言中静态引用该标签。\n\
  \n• `immediate`：对于输入和命令组件，可以将此属性设置为 `true`，以便在应用请求参数值时强制处理验证、转换和事件。\n\n• `rendered`：`rendered`\
  \ 属性可用于指定是否应渲染该组件。此属性通常在绑定到返回布尔结果的受管 Bean 属性的 Jakarta 表达式语言中指定。该表达式必须是一个右值表达式，意味着它是只读的，不能设置值。\n\
  \n• `style`：此属性允许将 CSS 样式应用于该组件。当组件作为输出渲染时，将应用指定的样式。\n\n• `styleClass`：此属性允许将 CSS\
  \ 样式类应用于该组件。当组件作为输出渲染时，将应用指定的样式。\n\n• `value`：此属性标识给定组件的值。对于某些组件，`value` 属性用于将标签绑定到受管\
  \ Bean 属性。在这种情况下，为组件指定的值将从受管 Bean 属性中读取或设置。其他组件，例如 `commandButton` 组件，使用 `value`\
  \ 属性为给定组件指定标签。\n\n通用 JavaScript 组件标签\n\n表 4-3 列出了许多组件共享的几个属性，这些属性使 JavaScript 功能能够与组件交互。\n\
  \n第 4 章 ■ 高级 Jakarta Server Faces\n\n***表 4-3.** 通用组件属性*\n\n**属性**\n\n**描述**\n\n\
  `onblur`\n\n当组件失去焦点时应执行的 JavaScript 代码\n\n`onchange`\n\n当组件失去焦点且值发生变化时应执行的 JavaScript\
  \ 代码\n\n`ondblclick`\n\n当组件被双击时应执行的 JavaScript 代码\n\n`onfocus`\n\n当组件获得焦点时应执行的 JavaScript\
  \ 代码\n\n`onkeydown`\n\n当用户按下某个键且组件处于焦点时应执行的 JavaScript 代码\n\n`onkeypress`\n\n当用户按下某个键且组件处于焦点时应执行的\
  \ JavaScript 代码\n\n`onkeyup`\n\n当按键操作完成且组件处于焦点时应执行的 JavaScript 代码\n\n`onmousedown`\n\
  \n\n\n当用户点击鼠标按钮且组件处于焦点时应执行的 JavaScript 代码\n\nonmouseout\n\n当用户将鼠标移离组件时应执行的 JavaScript\
  \ 代码\n\nonmouseover\n\n当用户将鼠标移至组件上时应执行的 JavaScript 代码\n\nonmousemove\n\n当用户在组件内移动鼠标时应执行的\
  \ JavaScript 代码\n\nonmouseup\n\n当鼠标按钮点击完成且组件处于焦点时应执行的 JavaScript 代码\n\nonselect\n\
  \n当组件被用户选中时应执行的 JavaScript 代码\n\n将组件绑定到属性\n\n所有 Jakarta Server Faces 组件都可以绑定到受管\
  \ bean 的属性。具体做法是：在受管 bean 中为要绑定的组件类型声明一个属性，然后使用组件的 `binding` 属性引用该属性。例如，以下 `dataTable`\
  \ 组件被绑定到一个受管 bean 属性，然后在 bean 内部对其进行操作。\n\n在视图中：\n\n<h:dataTable id=\"myTable\"\
  \ binding=\"#{myBean.myTable}\" value=\"#{myBean.myTableCollection}\"/>\n\n在 bean\
  \ 中：\n\n// 为此属性提供 getter 和 setter 方法\n\nprivate jakarta.faces.component.UIData myTable;\n\
  \n...\n\nmyTable.setRendered(true);\n\n...\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n\
  在某些情况下，绑定可能非常有用，尤其是当您需要在重新渲染视图之前以编程方式操作组件的状态时。例如，如果用户已经提交了表单，您可能需要禁用一个按钮。或者，您可能需要根据下拉菜单的选择来设置文本字段的值。\n\
  \n在这两种情况下，绑定都是实现所需结果的最佳方式。通过绑定，您可以在重新渲染视图之前以编程方式操作组件树。\n\n本章的项目文件夹结构\n\n包含本章配方的源代码按照以下文件夹结构组织：\n\
