  \nCSS\n\n`dataTable` 使用了一些 CSS 样式类以使其更易于阅读。以下摘录来自 Acme 书店应用程序样式表 `styles.css`，其中包含了表格所使用的样式。`styles.css`\
  \ 样式表链接到了视图，因为它被声明为模板中的一个资源。\n\n.tocTableOdd{\n\nbackground: #c0c0c0;\n\n}\n\n.tocTableEven{\n\
  \nbackground: #e0e0e0;\n\n}\n\n.col1{\n\ntext-indent: 15px;\n\nfont-weight: bold;\n\
  \n}\n\n■ **注意** 在 Jakarta Server Faces 2.3 中，`dataTable` 新增了一个 `rowClass` 属性，该属性接受\
  \ Jakarta 表达式语言来访问当前行。因此，可以实现类似以下的功能：\n\n<h:dataTable id=\"bookDetail\" border=\"\
  1\"\n\nvalue=\"#{ch4AuthorController.currentBook.chapters}\"\n\n第 4 章 ■ 高级 Jakarta\
  \ Server Faces\n\nvar=\"book\" style=\"width:100%\"\n\nrowClass=\"#{book eq 'Java\
  \ EE to Jakarta EE 10 Recipes ' ? style1:style2}\"\n\ncolumnClasses=\"col1\">\n\n\
  `h:column` 在 Jakarta Server Faces 2.3 中新增了一个 `styleClass` 属性。该属性允许你将指定的样式应用于单个列。\n\
  \n托管 Bean\n\n为了适配新表格，应用程序中添加了一个名为 `Chapter` 的类。`Chapter` 类是一个对象，它将包含每本书中每个章节的编号、标题和描述。每本书的每个章节都需要实例化一个\
  \ `Chapter` 对象。要查看列表，请参见源码中的 `org.jakartaeerecipe.chapter04.Chapter` 类。为了填充每本书的\
  \ `Chapter` 对象，`AuthorController` 托管 Bean 已进行了更新。以下摘录来自 `AuthorController` 托管 Bean，展示了章节是如何填充到\
  \ `Book` 对象中的。\n\n■ **注意** 该示例演示了在 Java 类中硬编码字符串的做法。这通常不是一个好主意，对于企业级应用程序来说，使用数据库或资源包来获取字符串是更合适的选择。\n\
  \n\n\n@PostConstruct\n\npublic void init(){\n\nauthorLast = null;\n\npopulateAuthors();\n\
  \npopulateJakartaFundamentalsAuthorList();\n\n}\n\n...\n\npublic void populateAuthors(){\n\
  \n...\n\nBook book1 = new Book(\"Java EE 到 Jakarta EE 10 实战\", \"book.png\");\n\n\
  book1 = addChapters1(book1);\n\n...\n\n}\n\n...\n\nprivate Book addChapters1(Book\
  \ book){\n\nChapter chapter1 = new Chapter(1, \"什么是 Jakarta EE\", null);\n\nChapter\
  \ chapter2 = new Chapter(2, \"历史\", null);\n\nChapter chapter3 = new Chapter(3,\
  \ \"Jakarta EE 的必要性及其指导原则\", null);\n\nChapter chapter4 = new Chapter(4, \"规范\"\
  , null);\n\nChapter chapter5 = new Chapter(5, \"规范概述\", null);\n\nChapter chapter6\
  \ = new Chapter(6, \"测试兼容性工具包 (TCK)\", null);\n\nChapter chapter7 = new Chapter(7,\
  \ \"兼容实现\", null);\n\n![](img/index-265_1.jpg)\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\
  \nList <Chapter> chapterList = new ArrayList<>();\n\nchapterList.add(chapter1);\n\
  \nchapterList.add(chapter2);\n\nchapterList.add(chapter3);\n\nchapterList.add(chapter4);\n\
  \nchapterList.add(chapter5);\n\nchapterList.add(chapter6);\n\nchapterList.add(chapter7);\n\
  \nbook.setChapters(chapterList);\n\nreturn book;\n\n}...\n\n书籍页面上生成的目录将如图 4-8 所示。可以通过在浏览器中访问\
  \ URL http://localhost:8080/JakartaEERecipes_Chapter04- 1.0- SNAPSHOT/chapter04/\n\
  \nrecipe04_09.xhtml 来执行该代码。\n\n***图 4-8.** 使用 dataTable 组件*\n\n工作原理\n\nJakarta Server\
  \ Faces 的 dataTable 组件可用于以统一方式显示数据集合。该组件易于使用，并且允许灵活地处理数据集合中的每个字段。还有其他显示数据集合的方式，例如使用\
  \ ui-repeat Facelets 标签或 panelGrid 组件，但如果表格不需要进行*极致*定制，dataTable 能让开发者的工作变得轻松。\n\
  \n第 4 章 ■ 高级 Jakarta Server Faces\n\ndataTable 组件包含多种属性，可用于自定义表格的外观和风格，以及一些行为特征。这些属性均列于表\
  \ 4-16 中。每个 dataTable 还包含列组件，这些组件通过 h:column 标签在 dataTable 组件内部声明。与任何其他 Jakarta\
  \ Server Faces 标签一样，h:column 标签也有许多对应的属性，如表 4-17 所示。\n\n***表 4-16.** dataTable 属性*\n\
  \n**属性**\n\n**描述**\n\nbgcolor\n\n表格背景颜色的名称或代码\n\nbodyrows\n\n逗号分隔的行索引列表，用于指定应开始新\
  \ <tbody> 元素的行\n\nborder\n\n表格周围边框的宽度（像素）\n\ncaptionClass\n\n空格分隔的 CSS 样式类列表，将应用于为表格生成的任何标题\n\
  \ncaptionStyle\n\n渲染标题时应用的 CSS 样式\n\ncellpadding\n\n定义用户代理应在每个单元格边框与其内容之间留出多少空间\n\
  \ncellspacing\n\n定义用户代理应在表格左侧与最左列之间、表格顶部与最顶行顶部之间，以及表格右侧和底部之间留出多少空间。同时指定单元格之间应留出多少空间\n\
  \ncolumnClasses\n\n逗号分隔的 CSS 样式列表，将应用于表格的列。也可以为任何单个列指定空格分隔的类列表\n\ncolumns\n\n在开始新行之前要渲染的列数\n\
