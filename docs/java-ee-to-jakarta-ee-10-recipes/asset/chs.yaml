  \ Jakarta 企业 Bean 和一个用于将视图方法和字段绑定到后端逻辑的 Jakarta Servlet Faces 控制器组成。\n\n控制器应具有会话作用域，以便用户状态可以在整个会话期间得到维护。最后，如果您使用数据库表来包含所有有权访问应用程序的用户名，那么将需要为该数据库表创建一个实体类。\n\
