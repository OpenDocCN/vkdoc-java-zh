  \ newsletterDescription) {\n\nthis.newsletterDescription = newsletterDescription;\n\
  \n}\n\n...\n\n生成的页面如图 4-3 所示。请注意，文本内容相同，因为它只是从托管 Bean 属性中读取了相同的文本。另外，页面底部新增了一个名为“主页”的链接。可通过在浏览器中访问以下\
