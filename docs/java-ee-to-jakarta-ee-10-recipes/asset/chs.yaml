  \ 组件的示例产生相同的输出：\n\n<h:link id=\"homeLink\" value=\"首页\" outcome=\"home\"/> 参数和图像也可以像\
  \ outputLink 一样嵌入到 h:link 标签中。link 组件还包含一些自定义属性，如表 4-10 所列。\n\n***表 4-10.** link\
  \ 组件附加属性*\n\n**属性**\n\n**描述**\n\ncharset\n\n超链接所指定资源的字符编码\n\ncords\n\n屏幕上热点的位置和形状，通常用于生成包含多个链接的地图或图像时\n\
  \ndisabled\n\n指示该组件不应接收焦点的标志\n\nfragment\n\n点击链接时应聚焦的页面片段的标识符。该标识符附加在 # 字符之后\n\n\
  （*续*）\n\n第四章 ■ 高级 Jakarta Server Faces\n\n***表 4-10.*** （*续*）\n\n**属性**\n\n**描述**\n\
  \nhreflang\n\n此链接指定资源的语言\n\nincludeviewparams 布尔值，指示重定向时是否包含页面参数\n\noutcome\n\n\
  用于解析导航案例的逻辑结果\n\nrel\n\n当前文档与链接指定资源之间的关系\n\nrev\n\n从此链接指定的锚点到当前文档的反向链接\n\nshape\n\
  \n屏幕上热点的形状\n\ntarget\n\n显示链接资源的框架名称\n\ntype\n\n链接资源的內容类型\n\n本配方提供了 Jakarta Server\
  \ Faces 标准输出组件的高级概述。在 Jakarta Server Faces 2.0+ 中，需要注意的是，你可以直接包含一个 Jakarta 表达式语言表达式，而无需使用输出组件来在页面中显示文本。然而，在某些情况下，这些组件仍然非常有用，使其成为你技术储备中重要的一组组件。\n\
  \n4-5. 添加表单验证\n\n问题\n\n为了确保通过表单提交的是有效数据，你需要在输入字段中加入一些验证。\n\n解决方案 #1\n\n尽可能在视图的输入组件上使用\
  \ Jakarta Server Faces 预构建的验证器标签。Jakarta Server Faces 附带了一些预构建的验证器，可以通过将验证器标签嵌入到要验证的组件中，将其应用于视图内的组件。以下代码摘录自一个\
  \ Jakarta Server Faces 视图，该视图定义了 Acme Bookstore 应用程序新闻通讯订阅页面的布局。源代码可以在名为 recipe04_04.xhtml\
  \ 的视图中找到，该摘录演示了将预构建的验证器应用于一些 inputText 组件：\n\n...\n\n<h:outputLabel for=\"first\"\
  \ value=\"名： \"/>\n\n<h:inputText id=\"first\" size=\"40\" value=\"#{contactController.current.first}\"\
  >\n\n<f:validateLength minimum=\"1\" maximum=\"40\"/>\n\n</h:inputText><br/>\n\n\
  <h:message id=\"firstError\" for=\"first\" errorStyle=\"color:red\"/><br/>\n\n<h:outputLabel\
  \ for=\"last\" value=\"姓： \"/>\n\n<h:inputText id=\"last\" size=\"40\" value=\"\
  #{contactController.current.last}\">\n\n<f:validateLength minimum=\"1\" maximum=\"\
  40\"/>\n\n</h:inputText><br/>\n\n<h:message id=\"lastError\" for=\"last\" errorStyle=\"\
  color:red\"/><br/>\n\n...\n\n第四章 ■ 高级 Jakarta Server Faces\n\n在上面的代码摘录中，你可以看到 f:validateLength\
  \ 验证器标签已嵌入到不同的 inputText 组件中。当表单提交时，这些验证器将应用于 inputText 组件字段中的值，如果未满足约束条件，将返回一条错误消息。\n\
  \n解决方案 #2\n\n通过使用验证注解来注解受管 bean 字段，利用 Jakarta Server Faces Bean 验证。\n\n可以通过使用所需的验证注解来注解属性字段声明，从而在受管\
  \ bean 内部执行验证。当表单提交时，将执行 Bean 验证。\n\n■ **注意** 如果你使用 validationGroups 来委托本地值的验证给\
  \ Bean 验证 API，则可以在视图的组件中嵌入一个 f:validateBean 标签。如果你使用 f:validateBean，validationGroups\
  \ 属性将作为一个过滤器，指示应强制执行哪些约束。\n\n以下代码摘录自 Jakarta Server Faces 视图，该视图定义了 Acme Bookstore\
  \ 应用程序新闻通讯订阅页面的布局。源代码可以在名为 recipe04_04.xhtml 的视图中找到。\n\n...\n\n<h:outputLabel for=\"\
  email\" value=\"电子邮件： \"/>\n\n<h:inputText id=\"email\" size=\"40\" value=\"#{contactController.current.email}\"\
  /><br/>\n\n<h:message id=\"emailError\" for=\"email\" errorStyle=\"color:red\"/>\n\
  \n...\n\n接下来是 Contact 受管 bean 的一个摘录，演示了将验证注解应用于 email 属性字段声明：\n\n...\n\n@Pattern(regexp\
  \ = \"[a-zA-Z0-9]+@[a-zA-Z0-9]+\\\\.[a-zA-Z0-9]+\", message = \"电子邮件格式无效。\")\n\n\
  private String email;\n\n...\n\n当表单提交时，将对 email 字段进行验证。如果输入到 inputText 组件中的值与注解中指定的正则表达式不匹配，则相应的消息组件中将显示该消息。\n\
  \n解决方案 #3\n\n在受管 bean 中创建一个自定义验证器方法，并通过为组件的 validator 属性指定适当的 Jakarta 表达式语言，将该方法注册到输入组件。以下代码摘录自\
  \ Jakarta Server Faces 视图，该视图定义了 Acme Bookstore 应用程序新闻通讯订阅页面的布局。源代码可以在名为 recipe04_04.xhtml\
  \ 的视图中找到，该摘录演示了通过为 validator 属性指定自定义验证器方法，将其应用于一个组件：\n\n...\n\n<h:outputLabel for=\"\
  password\" value=\"输入用于站点访问的密码： \"/>\n\n<h:inputSecret id=\"password\" size=\"40\"\
  \ redisplay=\"true\" value=\"#{contactController.current.\n\npassword}\"/>\n\n<br/>\n\
  \n<h:outputLabel for=\"passwordConfirm\" value=\"确认密码： \"/>\n\n<h:inputSecret id=\"\
  passwordConfirm\" size=\"40\"\n\n\n\nredisplay=\"true\" validator=\"#{contactController.validatePassword}\"\
  />\n\n<br/>\n\n<h:message id=\"passwordConfirmError\" for=\"passwordConfirm\" style=\"\
  color:red\"/>\n\n...\n\n■ **注意** 如果你能跳出思维定式，就会发现前面的代码片段非常适合创建为一个复合组件！如果创建了复合组件，只需在表单中添加一个类似\
  \ `<custom:passwordValidate>` 的标签即可。有关开发复合组件的更多详细信息，请参阅配方 4-4。\n\n`validator` 属性指定了\
  \ `ContactController` 托管 bean 中的 `validatePassword` 方法。以下摘录自 `ContactController`，展示了验证器方法的实现：\n\
  \n...\n\n/**\n\n* 自定义验证器，确保密码字段内容匹配\n\n* @param context\n\n* @param component\n\n\
  * @param value\n\n*/\n\npublic void validatePassword(FacesContext context,\n\nUIComponent\
  \ component,\n\nObject value){\n\nMap <String, String> map = context.getExternalContext().getRequestParameterMap();\n\
  \nString passwordText = (String) map.get((\"contactForm:password\"));\n\nString\
  \ confirmPassword = value.toString();\n\nif (!passwordText.equals(confirmPassword))\
  \ {\n\nthrow new ValidatorException(new FacesMessage(\"Passwords do not match\"\
  ));\n\n}\n\n}\n\n...\n\n当表单提交时，`validatePassword` 方法将在“处理验证”阶段被调用。该方法将读取 `password`\
  \ 和 `passwordConfirm` 字段的值，如果它们不匹配，则会抛出一个异常。例如，如果新闻订阅页面的输入表单在没有任何值的情况下提交，那么页面应被重新渲染，并看起来像图\
  \ 4-4。可以通过在浏览器中访问 URL `http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_04.xhtml`\
  \ 来执行代码。\n\n![](img/index-245_1.png)\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n***图\
  \ 4-4.** 输入字段上的验证错误*\n\n工作原理\n\n有几种不同的方法可以对表单输入字段应用验证。对输入组件应用验证最简单的方法是使用 Jakarta\
  \ Server Faces 自带的预构建验证器标签。有一些预构建的标签用于验证指定长度、范围等的数据。有关验证器标签的完整列表，请参阅本章引言中的表 4-2。你也可以选择使用\
  \ Bean 验证对输入组件应用验证。Bean 验证要求在托管 bean 中的属性声明上放置验证注解。另一种可能的验证方法是创建一个自定义验证方法，并在输入组件的\
  \ `validator` 属性中指定该方法。本节将简要概述每个预构建的验证标签，介绍 Bean 验证的基础知识，并演示如何构建自定义验证方法。\n\n■ **注意**\
  \ 可以创建一个实现 `Validator` 接口的类来执行验证。更多信息，请参阅配方 3-7。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\
  \n无论你选择实现哪种验证方案，验证都发生在 Jakarta Server Faces 生命周期的“处理验证”阶段。当表单通过命令组件或 Ajax 请求提交时，树中组件上注册的所有验证器都会被处理。组件属性中指定的规则将与组件的本地值进行比较。此时，如果任何验证失败，消息将返回给相应的消息组件并显示给用户。\n\
  \n要使用预构建的验证标签，必须将它们嵌入到输入组件的开始和结束标签之间，并根据你在解决方案 #1 中想要设置的验证参数指定属性。在本配方中，你学习了如何使用\
  \ `f:validateLength` 验证器标签，该标签允许对指定长度的组件数据进行验证。`minimum` 和 `maximum` 属性分别设置为最小字符串长度和最大字符串长度。\n\
  \n`f:validateLongRange` 验证器可用于检查输入的数值范围。`f:validateLongRange` 的 `minimum` 和 `maximum`\
  \ 属性分别用于确定输入的值是否落在下限和上限范围内。\n\n与 `f:validateLongRange` 类似的是 `f:validateDoubleRange`\
  \ 验证器，它用于验证浮点值的范围。同样，`f:validateDoubleRange` 的 `minimum` 和 `maximum` 属性分别用于确定输入的值是否落在下限和上限范围内。\n\
  \nJakarta Server Faces 2.0 版本新增了 `f:validateRequired` 验证器，用于确保输入字段不为空。此验证器不需要任何属性；只需将其嵌入到组件标签内，即可确保该组件不会包含空值。\n\
  \nJakarta Server Faces 2.0 版本附带的另一个新验证器是 `f:validateRegex` 验证器。此验证器使用正则表达式模式来确定输入的值是否与指定的模式匹配。验证器的\
  \ `pattern` 属性用于指定正则表达式模式，如本配方解决方案 #1 的示例所示。\n\n在解决方案 #2 中，演示了 Jakarta Server Faces\
  \ Bean 验证，这也是 Jakarta Server Faces 2.0 版本的一个新特性。Bean 验证允许你使用约束注解来注解托管 bean 字段，这些注解指示应执行的验证类型。当提交包含引用这些字段的输入组件的表单时，验证会自动在注解字段上执行。可以应用于\
  \ bean 字段的标准约束注解有几种，列在表 4-11 中。每个注解接受不同的属性；更多详细信息请参阅在线文档。\n\n***表 4-11.** 用于 Bean\
  \ 验证的约束注解*\n\n**注解**\n\n**描述**\n\n@AssertFalse 被注解的元素必须为 false\n\n@AssertTrue\n\n\
  被注解的元素必须为 true\n\n@DecimalMax\n\n被注解的元素必须是一个十进制数，其值小于或等于指定的最大值\n\n@DecimalMin\n\n\
  被注解的元素必须是一个十进制数，其值大于或等于指定的最小值\n\n@Digits\n\n被注解的元素必须是可接受范围内的数字\n\n@Email\n\n被注解的元素必须符合电子邮件地址的格式\n\
  \n@Future\n\n被注解的元素必须是将来的日期\n\n@Max\n\n被注解的元素必须是一个数字，其值小于或等于指定的最大值\n\n( *续*)\n\n\
  第 4 章 ■ 高级 Jakarta Server Faces\n\n***表 4-11.*** ( *续*)\n\n**注解**\n\n**描述**\n\n\
  @Min\n\n被注解的元素必须是一个数字，其值大于或等于指定的最小值\n\n@Negative\n\n被注解的元素必须是一个负数\n\n@NotBlank\n\
  \n被注解的元素在去除任何尾随或前导空白后不能为 null 或空白\n\n@NotEmpty\n\n被注解的元素不能为 null 或空\n\n@NotNull\n\
  \n被注解的元素不能为 null\n\n@Null\n\n被注解的元素必须为 null\n\n@Past\n\n被注解的元素必须是过去的日期\n\n@Pattern\n\
  \n被注解的元素必须匹配正则注解的正则表达式中指定的模式\n\n@Positive\n\n被注解的元素必须是一个正数\n\n@Size\n\n被注解的元素必须在指定的边界之间\n\
  \n\n\n使用 Bean 验证时，引用带注解的 Bean 字段的输入组件可以包含 `f:validateBean` 标签来自定义行为。`f:validateBean`\
  \ 标签的 `validationGroups` 注解可用于指定可用于验证该组件的验证组。例如，这样的解决方案可能类似于以下内容：\n\n<h:inputText\
  \ id=\"email\" size=\"40\" value=\"#{contactController.current.email}\">\n\n<f:validateBean/>\n\
  \n</h:inputText>\n\n■ **注意** 验证组定义了可用于验证的约束子集。验证组由一个空的 Java 接口表示。然后，该接口名称可以应用于 Bean\
  \ 类中的注解约束，以便将这些约束分配给特定组。例如，以下字段使用了 `@Size` 和 `@Email` 验证约束进行注解。\n\n@Size(min=2,\
  \ max=30)\n\n@Email\n\nprivate String email;\n\n当使用 `f:validateBean` 标签时，指定组中包含的任何约束注解都将应用于该字段进行验证。\n\
  \n第 4 章 ■ 高级 Jakarta Server Faces\n\n使用 Bean 验证时，如果字段验证失败，可以显示自定义错误消息。要添加自定义消息，请在注解中包含\
  \ `message` 属性，以及您希望显示的错误消息。最佳实践是，错误消息应从消息包中提取，以便无需更改代码即可更新。\n\n解决方案 #3 的示例演示了如何使用自定义验证器方法对输入组件执行验证。输入组件的\
  \ `validator` 属性可以引用一个托管 Bean 方法，该方法没有返回类型，并接受 `FacesContext`、`UIComponent` 和 `Object`。该方法可以利用这些参数分别访问当前的\
  \ `FacesContext`、正在验证的 `UIComponent` 以及对象中包含的当前值。如果值未通过验证，验证逻辑可以抛出 `jakarta.faces.validator.ValidatorException`，然后通过异常向用户返回一条消息。在该示例中，名为\
  \ `validatePassword` 的方法用于比较两个密码字段的内容，以确保它们匹配。该方法中的前两行代码用于获取 ID 为 `password` 的组件的值，并将其保存到局部变量中。实际的验证逻辑将该值与传入参数的\
  \ `Object` 值（即正在验证的组件的当前值）进行比较，以确定是否匹配。如果不匹配，则抛出带有相应消息的 `ValidationException`。然后，该消息将显示在与正在验证的组件相对应的消息组件中。\n\
  \n如本方案开头所述，有几种验证输入的方法。它们之间没有优劣之分；其使用取决于应用程序的需求。如果您经常更改验证模式，那么您可能希望坚持使用预构建的验证器标签，这样您就不需要为了更改验证而重新编译代码。另一方面，如果您知道您的验证不会改变，那么使用\
  \ Bean 验证技术可能会更容易。无论哪种情况，使用 Ajax 都可以使验证变得更加容易，该主题将在第 5 章中介绍。\n\n4-6\\. 向页面添加选择列表\n\
  \n问题\n\n您希望为页面上的某些输入字段提供可供选择的选项列表。\n\n解决方案\n\n根据应用程序所需的列表类型，使用 Jakarta Server Faces\
  \ 的 `selectOneMenu`、`selectManyMenu`、`selectOneListbox` 或 `selectManyListbox` 组件。这些选择组件中的每一个都允许从特定值集合中进行单项或多项选择。本方案的示例将添加到\
  \ Acme Bookstore 的新闻通讯订阅页面。该书店应用程序将允许客户从下拉列表中选择他们的职业，并从多选列表中选择一个或多个他们想要订阅的新闻通讯。由于他们只需为职业选择一个选项，因此使用了\
  \ `selectOneMenu`。但是，由于可以选择多个新闻通讯，因此 `selectManyListbox` 是最佳选择。\n\n视图：recipe04_05.xhtml\n\
  \n以下摘录自名为 `recipe04_05.xhtml` 的 Jakarta Server Faces 视图，它演示了这些组件的用法：\n\n...\n\n\
  <h:outputLabel for=\"occupation\" value=\"职业: \"/>\n\n<h:selectOneMenu id=\"occupation\"\
  \ value=\"#{contactController.current.occupation}\">\n\n<f:selectItem itemLabel=\"\
  \" itemValue=\"\"/>\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n<f:selectItems value=\"\
  #{contactController.occupationList}\"/>\n\n</h:selectOneMenu>\n\n<br/><br/>\n\n\
  <h:outputLabel for=\"newsletterList\" value=\"新闻通讯:\"/>\n\n<h:selectManyListbox\
  \ id=\"newsletterList\" value=\"#{contactController.current.\n\nnewsletterList}\"\
  >\n\n<f:selectItems value=\"#{contactController.allNewsletters}\"/>\n\n</h:selectManyListbox>\n\
  \n...\n\n托管 Bean 控制器：ContactController.java\n\n这些组件绑定到 `ContactController` 托管 Bean\
  \ 中的属性。以下摘录自 `ContactController`，显示了属性的声明及其相应的初始化方法：\n\n@RequestScoped\n\n@Named(value=\"\
  contactController\")\n\npublic class ContactController {\n\n...\n\npublic ContactController()\
  \ {\n\ncurrent = null;\n\nnewsletterDescription = \"请在下方输入您的信息，以便添加到 Acme Bookstore\
  \ 的新闻通讯列表中。\";\n\nsubscription = new Subscription();\n\npopulateNewsletterList();\n\
  \npopulateOccupationList();\n\n}\n\n...\n\n// 托管 Bean 属性的声明\n\nprivate List<String>\
  \ occupationList;\n\nprivate Map<String, Object> newsletterList;\n\n...\n\n// 填充对象的示例\n\
  \nprivate void populateOccupationList(){\n\noccupationList = new ArrayList();\n\n\
  occupationList.add(\"作者\");\n\noccupationList.add(\"IT 专业人士\");\n\n}\n\n// 填充对象的示例\n\
  \nprivate void populateNewsletterList(){\n\nallNewsletters = new LinkedHashMap<String,Object>();\n\
  \nallNewsletters = new LinkedHashMap<String,Object>();\n\nallNewsletters.put(\"\
  Java 17 基础入门\", \"Java\");\n\nallNewsletters.put(\"Jakarta EE 基础\", \"Jakarta EE\"\
  );\n\nallNewsletters.put(\"构建高性能 Java 17 应用程序\", \"GraalVM\");\n\nallNewsletters.put(\"\
  每周新书\", \"新书\");\n\n}\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n/**\n\n* @return the\
  \ occupationList\n\n*/\n\npublic List<String> getOccupationList() {\n\nreturn occupationList;\n\
  \n}\n\n/**\n\n* @param occupationList the occupationList to set\n\n*/\n\npublic\
  \ void setOccupationList(List<String> occupationList) {\n\nthis.occupationList =\
  \ occupationList;\n\n}\n\npublic Map<String, Object> getAllNewsletters() {\n\nreturn\
  \ allNewsletters;\n\n}\n\npublic void setAllNewsletters(Map<String, Object> allNewsletters)\
  \ {\n\nthis.allNewsletters = allNewsletters;\n\n}\n\n以下摘录自 `Contact`，显示了属性的声明及其相应的访问器方法：\n\
  \n...\n\n/**\n\n* @return the newsletterList\n\n*/\n\npublic Map<String,Object>\
  \ getNewsletterList() {\n\nreturn newsletterList;\n\n}\n\n/**\n\n* @param newsletterList\
  \ the newsletterList to set\n\n*/\n\npublic void setNewsletterList(Map<String,Object>\
  \ newsletterList) {\n\nthis.newsletterList = newsletterList;\n\n}\n\n...\n\n新更新的新闻通讯订阅页面应如图\
  \ 4-5 所示。可以通过在浏览器中访问 URL `http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_05.xhtml`\
  \ 来执行代码。\n\n![](img/index-251_1.jpg)\n\n\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n\
  ***图 4-5.** 包含值列表的选择组件*\n\n工作原理\n\n为确保数据完整性，尽可能使用预填充数据的输入组件始终是个好主意。这样做既能确保用户不会在文本框中输入各种格式的自由文本值，也能为用户提供便捷的选项选择。利用选择组件可为用户提供可供选择的值列表，允许进行单项或多项选择。标准\
  \ Jakarta Server Faces 组件库提供了四个接受数据列表的输入组件，用户可从中选择一项或多项。这些选择组件分别是：selectOneListbox、selectManyListbox、selectOneMenu\
  \ 和 selectManyMenu。每个组件都共享一组通用属性。表 4-12 列出了表 4-2 中未展示的那些通用属性。\n\n第 4 章 ■ 高级 Jakarta\
  \ Server Faces\n\n***表 4-12.** 选择组件属性*\n\n**属性**\n\n**描述**\n\naccesskey\n\n访问键，按下时将焦点转移到该组件\n\
  \ndir\n\n文本方向指示（LTR：从左到右；RTL：从右到左）\n\ndisabled\n\n布尔值，指示组件是否被禁用\n\ndisabledClass\n\
  \n应用于禁用选项渲染标签的 CSS 样式类\n\nenabledClass\n\n应用于启用选项渲染标签的 CSS 样式类\n\nlabel\n\n组件的本地化用户可读名称\n\
  \nlang\n\n描述组件生成标记中所用语言的代码\n\nsize\n\n始终显示的可用选项数量（selectManyListbox）\n\ntabindex\n\
  \n指示将组件聚焦所需 Tab 键按下次数的索引值\n\ntitle\n\n鼠标悬停在组件上时显示的工具提示\n\n填充选择列表\n\n在深入探讨这四个组件及其工作原理之前，需要重点说明：每个组件都显示一个数据集合，并使用`f:selectItem`或`f:selectItems`标签来指定该数据集。如果要单独列出每个数据项，则应使用`f:selectItem`标签。一个`f:selectItem`标签代表值集合中的一个元素。`f:selectItem`标签包含多个属性，但这里只讨论其中一些重要的属性。每个`f:selectItem`标签至少应包含`itemValue`和`itemLabel`属性，分别指定元素的值和要显示的标签。这些属性接受\
  \ Jakarta 表达式语言表达式或文本字符串。在示例中，`itemValue`和`itemLabel`属性都留空，这将为第一个菜单选项渲染一个空选项。当用户从列表中选择一个选项时，`itemValue`属性值将被设置到相应的选择组件值中。\n\
  \n`f:selectItems`标签可用于指定组件应使用的数据集合。可以在受管 Bean 中构建一个`SelectItem`对象列表，并将其指定给`f:selectItems`标签。与`f:selectItem`标签类似，该标签也可使用多个属性，这里将介绍其中关键属性。`itemValue`和`itemLabel`属性也可为`f:selectItems`标签指定，分别对应值列表或映射以及字符串标签。但最常见的是指定`value`属性，引用一个包含对象集合或数组的受管\
  \ Bean 属性。该集合或数组可以包含任何有效的 Java 对象，在示例中，使用`LinkedHashMap`来填充`newsletterList`属性。也可以填充单个`SelectItem`对象，然后将其加载到列表中供`f:selectItems`标签使用。以下代码行展示了如何填充新闻通讯集合：\n\
  \nprivate void populateNewsletterList(){\n\nallNewsletters = new LinkedHashMap<String,Object>();\n\
  \nallNewsletters.put(\"Introducing Java 17 Fundamentals\", \"Java\");\n\nallNewsletters.put(\"\
  Jakarta EE Fundamentals\", \"Jakarta EE\");\n\nallNewsletters.put(\"Building High\
  \ Performing Java 17 Applications\", \"GraalVM\"); allNewsletters.put(\"New Books\
  \ Weekly\", \"New Books\");\n\n}\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n关于各组件类型\n\
  \n`selectOneMenu`可能是最常用的选择组件，它将数据集合渲染为下拉列表。用户可以从菜单中选择一个条目，所选条目将被设置到为组件`value`属性指定的受管\
  \ Bean 属性中。在本节示例中，值设置为`#{contactController.current.occupation}`，因此当从列表中选择一个条目时，它将被设置到当前选中的`Contact`对象的`occupation`字段中。\n\
  \n`selectOneListbox`允许用户从数据列表中选择一个值。用户可以在屏幕上的列表框中看到至少几个条目，并从列表框中选择一个选项。`selectOneListbox`包含一个名为`collectionType`的额外属性，允许使用字面值指定集合类型。\n\
  \n`selectManyMenu`和`selectManyListbox`组件都允许用户在选择列表中选择多个选项。示例演示了如何使用`selectManyListbox`组件，允许用户从列表中选择多个新闻通讯。使用这些组件的主要区别在于，组件的受管\
  \ Bean 属性值必须能够接受多个值。在示例中，`selectManyListbox`组件值引用了`Contact`类的`newsletterList`字段。`newsletterList`字段被声明为`String`对象列表，因此当用户从`newsletterList`中选择多个值时，所有选择都可以存储在当前的`Contact`对象中。\n\
  \n在本节示例中，使用了两个组件来显示可供选择的选项列表。一个组件允许用户从集合中选择一个值，并以下拉列表形式显示选项；另一个组件允许用户选择多个值，并在列表框中显示选项。\n\
  \n4-7. 向页面添加图形\n\n问题\n\n您希望将图形整合到站点模板或其他选定的应用程序页面中。\n\n解决方案\n\n将要显示的图像放入应用程序`webapp`文件夹内`resources`文件夹的库中，然后使用`graphicImage`组件显示它们。Acme\
  \ Bookstore 应用程序的`book.xhtml`视图包含商店中每本书的图片。为了渲染图片，书籍图片名称从`Book`受管 Bean 的`image`字段中获取。以下摘自`book.xhtml`的代码片段演示了如何使用`h:graphicImage`标签：\n\
  \n<h:graphicImage id=\"bookImage\" library=\"image\"\n\nstyle=\"width: 100px; height:\
  \ 120px\" name=\"#{book.image}\"/>\n\n工作原理\n\n自 Jakarta Server Faces 诞生以来，`graphicImage`组件就一直用于显示图像。\n\
  \n通过使用`graphicImage`组件的`library`属性，Jakarta Server Faces 视图可以引用图像资源，而无需指定图像文件的完整路径。在本节解决方案中，为`library`属性指定的值是`image`，这意味着图像可以在`\\\
  webapp\\resource\\image`文件夹中找到。它还提供了在需要时接受 Jakarta 表达式语言属性的便利性，从而可以根据相应受管 Bean 属性中的当前值动态加载图像。`graphicImage`组件使得动态和静态显示图像都变得简单。\n\
  \n受管 Bean: Book.java\n\n\n\n这个托管 Bean 封装了书籍图片名称；以下是该类的代码：package com.jakartaeerecipe.chapter04;\n\
  \nimport jakarta.inject.Named;\n\n@Named(value = \"book\")\n\npublic class Book\
  \ {\n\nprivate String image;\n\npublic Book(){\n\nimage = \"book.png\";\n\n}\n\n\
  public String getImage() {\n\nreturn image;\n\n}\n\npublic void setImage(String\
  \ image) {\n\nthis.image = image;\n\n}\n\n}\n\n`h:graphicImage` 标签支持许多属性，这些属性超出了标准\
  \ Jakarta Server Faces 组件属性的范围，如表 4-13 所列。\n\n***表 4-13.** graphicImage 组件专用属性*\n\
  \n**属性**\n\n**描述**\n\nalt\n\n组件所渲染元素的替代文本描述\n\ndir\n\n文本方向指示（LTR，从左到右；RTL，从右到左）\n\
  \nheight\n\n覆盖图片的高度\n\nismap\n\n布尔值，指示图片是否用作服务器端图像映射\n\nlang\n\n描述组件生成标记中所用语言的代码\n\
  \nlongdesc\n\n指向元素所代表图片的详细描述的 URI\n\ntitle\n\n关于组件所生成标记元素的建议标题信息\n\nusemap\n\n客户端图像映射的名称，该元素为此映射提供图片\n\
  \nwidth\n\n覆盖图片的宽度\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n当本配方的示例页面被渲染时，位于应用程序 `resources/image`\
  \ 目录中、与标签上 `name` 属性对应的图片将被显示。如果用户从菜单中选择了一本不同的书，那么该书的图片将使用同一个 `graphicImage` 组件显示，因为图片指定的名称可以根据托管\
  \ Bean 中当前选中的书籍对象而改变。\n\n通过在视图中使用 `graphicImage`，你可以让图片具备标准 Jakarta Server Faces\
  \ 组件的动态特性。要查看此示例代码的实际效果，请参考配方 4-17。\n\n4-8\\. 向视图添加复选框\n\n问题\n\n你需要向应用程序视图添加复选框字段。\n\
  \n解决方案\n\n在视图中使用 `selectOneCheckbox` 和 `selectManyCheckbox` 组件。这些组件允许你通过简单地勾选复选框表示真值、取消勾选表示假值，来指定一个布尔值作为输入。\n\
  \n视图：recipe04_07.xhtml\n\n以下代码摘录自名为 `recipe04_07.xhtml` 的视图，演示了这些组件的使用：\n\n...\n\
  \n<h:outputLabel for=\"notifyme\" value=\"您是否希望接收其他促销邮件？\"/>\n\n<h:selectBooleanCheckbox\
  \ id=\"notifyme\"\n\nvalue=\"#{contactController.current.receiveNotifications}\"\
  />\n\n<br/><br/>\n\n<h:outputLabel for=\"notificationTypes\"\n\nvalue=\"您对接收哪种类型的通知感兴趣？\"\
  />\n\n<h:selectManyCheckbox id=\"notificationTypes\" value=\"#{contactController.current.\n\
  \nnotificationType}\">\n\n<f:selectItems value=\"#{contactController.notificationTypes}\"\
  />\n\n</h:selectManyCheckbox>\n\n...\n\n托管 Bean 控制器\n\n每个组件都绑定到一个 `Contact` 对象，因此当表单提交时，如果数据有效，当前的\
  \ `Contact` 对象将接收这些数据。以下列表包含更新后的 `Contact` 类的摘录，该类用于保存联系人的信息。完整列表请参见源代码中 `org.jakartaeerecipe.chapter04`\
  \ 包内的 `Contact.java` 源文件。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n...\n\nprivate boolean\
  \ receiveNotifications;\n\nprivate Map<String, Object> notificationType;\n\n...\n\
  \n/**\n\n* @return the receiveNotifications\n\n*/\n\npublic boolean isReceiveNotifications()\
  \ {\n\nreturn receiveNotifications;\n\n}\n\n/**\n\n* @param receiveNotifications\
  \ the receiveNotifications to set\n\n*/\n\npublic void setReceiveNotifications(boolean\
  \ receiveNotifications) {\n\nthis.receiveNotifications = receiveNotifications;\n\
  \n}\n\n/**\n\n* @return the notificationTypes\n\n*/\n\npublic Map<String, Object>\
  \ getNotificationTypes() {\n\nreturn notificationTypes;\n\n}\n\n/**\n\n* @param\
  \ notificationTypes the notificationTypes to set\n\n*/\n\n\n\npublic void setNotificationTypes(Map<String,\
  \ Object> notificationTypes) {\n\nthis.notificationTypes = notificationTypes;\n\n\
  }\n\n拼图的最后一块是绑定到 `h:selectManyCheckbox` 组件内嵌的 `f:selectItems` 标签上的通知类型列表。这些列表绑定到\
  \ `ContactController` 托管 Bean 中名为 `notificationTypes` 的属性。以下清单包含了该类的相关摘录：\n\n...\n\
  \n// 声明\n\nprivate Map<String, String> notificationTypes;\n\n...\n\n/**\n\n* 创建\
  \ ContactController 的新实例\n\n*/\n\npublic ContactController() {\n\ncurrent = null;\n\
  \nnewsletterDescription = \"请在下方输入您的信息，以便添加到 Acme Bookstore 的新闻通讯列表中。\";\n\nsubscription\
  \ = new Subscription();\n\npopulateOccupationList();\n\npopulateNewsletterList();\n\
  \n// 在构造函数中调用 populateNotificationTypes 方法进行填充\n\npopulateNotificationTypes();\n\
  \n}\n\n![](img/index-257_1.jpg)\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\nprivate void\
  \ populateNotificationTypes() {\n\nnotificationTypes = new HashMap<>();\n\nnotificationTypes.put(\"\
  产品更新\", \"1\");\n\nnotificationTypes.put(\"畅销书提醒\", \"2\");\n\nnotificationTypes.put(\"\
  垃圾邮件\", \"3\");\n\n}\n\n...\n\nAcme Bookstore 应用程序最终的新闻通讯订阅输入界面（包含新的复选框组件）将如图 4-6\
  \ 所示。您可以在浏览器中访问 URL http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_07.xhtml\
  \ 来执行此代码。\n\n***图 4-6.** 在页面中集成复选框*\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n工作原理\n\
  \n复选框在应用程序中非常常见，因为它们为用户提供了一种输入布尔值的简便方法。复选框要么被选中，要么未被选中，选中的框对应 `true` 值，未选中的框对应 `false`\
  \ 值。Jakarta Server Faces 标准组件库提供了几种不同的复选框选择组件，即 `selectBooleanCheckbox` 和 `selectManyCheckbox`。`selectBooleanCheckbox`\
  \ 在页面上渲染一个带有 `type=\"checkbox\"` 的单个 HTML 输入元素，而 `selectManyCheckbox` 组件则渲染多个带有\
  \ `type=\"checkbox\"` 的 HTML 输入元素。与所有 Jakarta Server Faces 组件一样，复选框选择组件除了通用的 Jakarta\
  \ Server Faces 组件属性外，还共享一组标准属性，这些属性列在表 4-14 中。\n\n***表 4-14.** 复选框选择组件属性*\n\n**属性**\n\
  \n**描述**\n\naccessKey\n\n访问键，按下时将焦点转移到该元素\n\nborder\n\n围绕包含选项列表的表格绘制的边框宽度（`selectManyCheckbox`）\n\
  \ndir\n\n文本方向指示（LTR，从左到右；RTL，从右到左）\n\ndisabled\n\n布尔值，指示该元素是否应接收焦点或包含在提交中\n\nlabel\n\
  \n组件的本地化用户可显示名称\n\nlang\n\n描述组件生成标记中所用语言的代码\n\nlayout\n\n要创建的选项列表的方向（`selectManyCheckbox`）\n\
  \nreadonly\n\n布尔值，指示组件是否为只读\n\ntabindex\n\n索引值，指示将组件带入焦点所需的 Tab 键按下次数\n\ntitle\n\
  \n鼠标悬停在组件上时显示的工具提示\n\n`selectBooleanCheckbox` 组件的值属性 Jakarta 表达式语言表达式应对应于托管 Bean\
  \ 中的一个布尔属性。在本示例中，`selectBooleanCheckbox` 的值设置为 `#{contactController.current.receiveNotifications}`，这是当前\
  \ `Contact` 对象中的一个布尔字段，指示该联系人是否希望接收通知。如果用户勾选了该组件的复选框，则 `receiveNotifications` 字段的值将设置为\
  \ `true`；否则，将设置为 `false`。`value` 属性是唯一必需的属性。\n\n\n\n然而，通常情况下，`valueChangeListener`\
  \ 属性被设置为托管 Bean 中的一个方法，当组件的值发生变化时，该方法会被调用。这在使用 Ajax 表单提交时最为有用，这样客户端可以立即看到 `ValueChangeEvent`\
  \ 的结果，而无需等待表单重新渲染。\n\n`selectManyCheckbox` 组件在页面上显示一个或多个复选框。该组件的 `value` 属性应对应一个字符串数组。组件中包含的每个复选框都有一个对应的字符串值。现在你可能会想，字符串和布尔值有什么关系？实际上，数组中的每个字符串对应页面上的一个复选框，当某个复选框被选中时，与该复选框对应的字符串就会被添加到数组中。如果没有选中任何复选框，则数组中不会添加任何字符串。因此，字符串的存在即表示与该字符串值对应的复选框已被选中。\n\
  \n■ 第四章 ■ 高级 Jakarta Server Faces\n\n要添加复选框，可以为每个复选框使用单独的 `f:selectItem` 标签，或者使用\
  \ `f:selectItems` 标签添加一组复选框。如果你使用 `f:selectItem`，那么 `itemValue` 属性应设置为与该复选框对应的字符串值，而\
  \ `itemLabel` 属性则设置为复选框的标签。在示例中，使用了 `f:selectItems` 标签来为组件填充复选框。示例中的 `f:selectItems`\
  \ 标签包含一个 `value` 属性，该属性设置为 `#{contactController.notificationTypes}`，对应于 `ContactController`\
  \ 类中的 `notificationTypes` 字段。\n\n如果你查看 `notificationTypes` 字段，会发现它被声明为 `Map<String,\
  \ Object>` 类型，数组中的每个元素将对应一个复选框。当 `ContactController` 类被实例化时，会调用 `populateNotificationTypes`\
  \ 方法，该方法用每个复选框的值填充这个映射。以下是 `populateNotificationTypes` 方法的代码清单。映射中的每个元素对应一个复选框：\n\
  \n```java\nprivate void populateNotificationTypes() {\n    notificationTypes = new\
  \ HashMap<>();\n    notificationTypes.put(\"Product Updates\", \"1\");\n    notificationTypes.put(\"\
  Best Seller Alerts\",\"2\");\n    notificationTypes.put(\"Spam\", \"3\");\n}\n```\n\
  \n复选框使用户能够轻松地为给定选项指示真或假（选中或未选中）的值。Jakarta Server Faces 复选框选择组件有助于组织页面上的内容，并且由于用户无需输入自由文本，它们提供了一种确保数据完整性的好方法。\n\
  \n**4-9. 向视图添加单选按钮**\n\n**问题**\n\n你想在页面上以单选按钮的形式显示一组项目，并允许用户仅选择其中一个。\n\n**解决方案**\n\
  \n在页面上使用单选按钮，为用户提供从一组选项中选择一个的选项。当你希望一次性在屏幕上显示所有选项，但只允许选择一个时，单选按钮通常是一个很好的解决方案。在本技巧中，Acme\
  \ Bookstore 希望在新闻通讯订阅页面上添加一个单选按钮，以确定订阅者是男性还是女性。\n\n**视图：recipe04_08.xhtml**\n\n\
  以下摘录自名为 `recipe04_08.xhtml` 的 Jakarta Server Faces 视图，它演示了 `selectOneRadio` 组件：\n\
  \n```xhtml\n...\n<h:outputLabel for=\"gender\" value=\"Gender: \"/>\n<h:selectOneRadio\
  \ id=\"gender\" value=\"#{contactController.current.gender}\">\n    <f:selectItem\
  \ itemValue=\"M\" itemLabel=\"Male\"/>\n    <f:selectItem itemValue=\"F\" itemLabel=\"\
  Female\"/>\n</h:selectOneRadio>\n<br/><br/>\n```\n\n![](img/index-260_1.png)\n\n\
  ■ 第四章 ■ 高级 Jakarta Server Faces\n\n```xhtml\n<h:message id=\"genderError\"\n   \
  \       for=\"gender\"\n          errorStyle=\"color:red\"/>\n<br/>\n...\n```\n\n\
  **托管 Bean**\n\n该组件绑定到 `Contact` 类中一个名为 `gender` 的托管 Bean 属性。以下代码清单包含 `Contact` 类的摘录，展示了为整合新字段所做的更新：\n\
  \n```java\n...\nprivate String gender;\n...\n/**\n * @return the gender\n */\npublic\
  \ String getGender() {\n    return gender;\n}\n\n/**\n * @param gender the gender\
  \ to set\n */\npublic void setGender(String gender) {\n    this.gender = gender;\n\
  }\n...\n```\n\n当 `selectOneRadio` 组件在屏幕上渲染时，它会为每个可用选项添加一个单选按钮。更新后的 Acme Bookstore\
  \ 新闻通讯页面如图 4-7 所示。你可以通过访问浏览器中的 URL `http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_08.xhtml`\
  \ 来执行代码。\n\n***图 4-7.** 使用 selectOneRadio 组件*\n\n■ 第四章 ■ 高级 Jakarta Server Faces\n\
  \n**工作原理**\n\n单选按钮与复选框非常相似，它们都为用户提供针对指定页面值的开或关选项。使用单选按钮的附加价值在于，它们可以轻松地在屏幕上同时显示多个选项，并允许用户仅选择其中一个。如果用户尝试选择另一个选项，则当前选中的项目将变为未选中状态，从而强制用户只能选择一个选项。\n\
  \nJakarta Server Faces 的 `selectOneRadio` 组件用于在页面上渲染单选按钮，其工作方式与 `selectManyCheckbox`\
  \ 组件（参见技巧 4-7）非常相似。\n\n`selectOneRadio` 拥有与 `selectBooleanCheckbox` 组件相同的所有属性。有关这些属性的列表，请参见表\
  \ 4-14。`selectOneRadio` 组件还包含许多额外的属性，如表 4-15 所列。\n\n***表 4-15.** selectOneRadio\
  \ 属性（除表 4-14 所列之外）*\n\n| **属性** | **描述** |\n| :--- | :--- |\n| disabledClass | 应用于禁用选项的渲染标签的\
  \ CSS 样式类 |\n| group | 指定该组件所属的单选按钮组 |\n| enabledClass | 应用于启用选项的渲染标签的 CSS 样式类 |\n\
  \n要使用 `selectOneRadio` 组件，`value` 属性应设置为一个字符串。在示例中，`selectOneRadio` 组件的值设置为当前 `Contact`\
  \ 对象中的 `gender` 字段。当选中其中一个单选按钮时，与该按钮对应的字符串值将被设置到该字段中。\n\n单选按钮的填充方式与 `selectManyCheckbox`\
  \ 组件（参见技巧 4-7）类似，可以使用 `f:selectItem` 标签或 `f:selectItems` 标签。在示例中，使用了两个 `f:selectItem`\
  \ 标签来为组件添加两个单选按钮；`itemValue` 属性是提交给所选按钮的字符串，而 `itemLabel` 属性是显示在相应按钮旁边的字符串。\n\n\
  如果你想使用 `f:selectItems` 标签来填充一组单选按钮，则 `f:selectItems` 的 `value` 属性应设置为一个托管 Bean 属性，该属性声明为字符串数组、映射或\
  \ `SelectItem` 对象列表。要查看示例，请回顾技巧 4-7 中关于 `selectManyCheckbox` 组件的示例。\n\n■ **注意**\
  \ 在 Jakarta Server Faces 2.3 中，为该组件添加了 `group` 属性。此属性允许将单选按钮单独放置在视图中，同时仍能与同一组中的所有其他按钮共享选择。\n\
  \n单选按钮是一种向用户显示多个选项并允许他们选择一个的简单方法。如果你理解了 `selectManyCheckbox` 组件的工作原理，那么 `selectOneRadio`\
  \ 与之非常相似。\n\n**4-10. 显示数据集合**\n\n**问题**\n\n你希望在 Jakarta Server Faces 应用程序页面中显示一个数据集合。\n\
  \n■ 第四章 ■ 高级 Jakarta Server Faces\n\n**解决方案**\n\n\n\n使用 `dataTable` 组件来展示数据集合。`dataTable`\
  \ 组件可用于遍历数据集合，为每一行对象提供一个句柄，以便在需要时查询列数据或直接显示。在本示例中，书籍页面正在更新，以显示所选书籍的目录。目录将在一个经过可读性定制的\
  \ `dataTable` 组件中展示。\n\n视图：recipe04_09.xhtml\n\n以下列表展示了名为 `recipe04_09.xhtml` 的视图，它是\
  \ `book.xhtml` 视图的一个不完整快照：\n\n<html>\n\n<h:head>\n\n<meta http-equiv=\"content-type\"\
  \ content=\"text/html; charset=UTF-8\"/>\n\n<title>Acme 书店</title>\n\n</h:head>\n\
  \n<h:body>\n\n<ui:composition template=\"./layout/custom_template_search.xhtml\"\
  >\n\n<ui:define name=\"content\">\n\n<h:form id=\"componentForm\">\n\n<h1>#{ch4AuthorController.currentBook.title}\
  \ 的作者列表</h1>\n\n<p>\n\n以下是作者列表。点击作者的姓氏可获取更多关于该作者的信息。\n\n</p>\n\n<h:graphicImage\
  \ id=\"javarecipes\" library=\"image\"\n\nstyle=\"width: 100px; height: 120px\"\n\
  \nname=\"#{ch4AuthorController.currentBook.image}\"/>\n\n<br/>\n\n<h:dataTable id=\"\
