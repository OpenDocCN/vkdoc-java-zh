  \                                       |\n\n3-11. 创建可书签化的 URL\n\n问题\n\n你希望应用程序能够支持通过\
  \ URL 链接来显示特定对象。例如，你想使用一个 GET URL，如 `http://localhost:8080/JakartaEERecipes_Chapter03-1.0-SNAPSHOT/chapter03/recipe03_11.xhtml?authorLast=Juneau`，来显示一个包含指定姓氏作者信息的页面。\n\
  \n解决方案\n\n通过 `f:viewParam` 标签（它是 `f:metadata` 标签的子标签）定义参数，为要创建可书签化 URL 的 Jakarta\
  \ Server Faces 视图添加视图参数。这样做将允许页面通过包含请求参数的 URL 进行访问，这些参数可用于记录标识。在此示例中，视图通过 `f:viewParam`\
  \ 标签包含了一个视图参数，允许在请求视图时指定作者的姓氏。在以下示例中，对配方 3-9 中创建的控制器类进行了修改，添加了一个名为 `authorLast`\
  \ 的新属性，以适应新的视图参数。\n\n名为 `\\webapp\\chapter03\\recipe03_11.xhtml` 的视图的源代码如下所示。它们与名为\
  \ `recipe03_09b.xhtml` 的视图非常相似，不同之处在于它们包含一个 `f:viewParam` 元素，该元素被包含在开闭的 `f:metadata`\
  \ 元素之间：\n\n```html\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\n      xmlns:h=\"\
  http://xmlns.jcp.org/jsf/html\"\n      xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
  >\n    <h:head>\n        <title>Recipe 3-11: Creating Bookmarkable URLs</title>\n\
  \    </h:head>\n    <h:body>\n        <f:metadata>\n            <f:viewParam name=\"\
  authorLast\" value=\"#{authorTableController.authorLast}\"/>\n        </f:metadata>\n\
  \        <h:form id=\"componentForm\">\n            <h1>#{authorTableController.current.first}\
  \ #{authorTableController.current.last}</h1>\n            <p>\n                <h:graphicImage\
  \ id=\"java9recipes\" library=\"image\" style=\"width: 10%; height: 20%\" name=\"\
  java9recipes.png\"/>\n                <br/>\n                #{authorTableController.current.bio}\n\
  \            </p>\n            <h:link value=\"Go Back to List\" outcome=\"recipe03_09a\"\
  />\n        </h:form>\n    </h:body>\n</html>\n```\n\n与此示例相关的 `AuthorController`\
  \ 类的代码如下所示：\n\n```java\n@Named(value = \"authorController\")\n@SessionScoped\npublic\
  \ class AuthorController implements Serializable {\n    ...\n    private String\
  \ authorLast;\n    ...\n    /**\n     * @return the authorLast\n     */\n    public\
  \ String getAuthorLast() {\n        return authorLast;\n    }\n\n    /**\n     *\
  \ @param authorLast the authorLast to set\n     */\n    public void setAuthorLast(String\
  \ authorLast) {\n        displayAuthor(authorLast);\n    }\n}\n```\n\n如前所述，此控制器中包含了一个名为\
  \ `authorLast` 的属性。该属性使得示例中列出的 Jakarta Server Faces 视图能够通过 GET URL 接受名为 `authorLast`\
  \ 的请求参数，并在请求页面时将其传递给 Bean。最后，访问该视图并请求作者 Josh Juneau 详细信息的 URL 如下：`http://localhost:8080/JakartaEERecipes_Chapter03-1.0-SNAPSHOT/chapter03/recipe03_11.xhtml?authorLast=Juneau`\n\
