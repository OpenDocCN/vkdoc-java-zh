  <h1>Jakarta Server Faces 导航 - 第 4 页</h1>\n\n<p>\n\n点击下方的提交按钮将使用条件导航规则将您带到第 1 页。\n\
  \n</p>\n\n<br/>\n\n<h:commandButton id=\"navButton2\" action=\"recipe03_06c\"\n\n\
  value=\"隐式导航到第 3 页\"/>\n\n</h:form>\n\n</h:body>\n\n</html>\n\n现在让我们看看 `NavigationController`\
  \ 的源代码清单。它包含了在每个页面的 `h:commandButton` 的 `action` 属性中指定的方法。其中一些方法返回一个 `String` 值，而另一些则不返回。然而，在方法被调用之后，`FacesServlet`\
  \ 会处理请求，并在需要时遍历 `faces-config.xml` 配置文件，以确定要渲染的下一个视图：\n\npackage org.jakartaeerecipe.chapter03.recipe03_06;\n\
  \nimport jakarta.inject.Named;\n\nimport jakarta.enterprise.context.RequestScoped;\n\
  \n@Named(value = \"navigationController\")\n\n@RequestScoped\n\npublic class NavigationController\
  \ implements java.io.Serializable{\n\n第 3 章 ■ Jakarta Server Faces\n\nprivate boolean\
  \ authenticated = false;\n\n/**\n\n* 创建 NavigationController 的一个新实例\n\n*/\n\npublic\
  \ NavigationController() {\n\n}\n\npublic String pageOne(){\n\nreturn \"PAGE_1\"\
  ;\n\n}\n\npublic String pageTwo(){\n\nreturn \"PAGE_2\";\n\n}\n\n/**\n\n* 利用隐式导航，可以从操作方法返回一个页面名称，\n\
  \n* 而不是在 faces-config.xml 中列出导航规则。\n\n* @return 页面名称\n\n*/\n\npublic String nextPage(){\n\
  \n// 执行某些任务，然后隐式列出要渲染的页面\n\nreturn \"recipe03_06c\";\n\n}\n\n/**\n\n* 演示条件导航的使用\n\
  \n*/\n\npublic void login(){\n\n// 如果需要，执行某些任务，然后返回布尔值\n\nsetAuthenticated(true);\n\
  \nSystem.out.println(\"Here\");\n\n}\n\n/**\n\n* @return 认证状态\n\n*/\n\npublic boolean\
  \ isAuthenticated() {\n\nreturn authenticated;\n\n}\n\n/**\n\n* @param authenticated\
  \ 要设置的认证状态\n\n*/\n\npublic void setAuthenticated(boolean authenticated) {\n\nthis.authenticated\
  \ = authenticated;\n\n}\n\n}\n\n导航的核心是 `/WEB-INF/faces-config.xml` 文件。它指定了在相应结果之后应显示哪个视图。其中两条导航规则使用标准的\
  \ Jakarta Server Faces 导航，最后一条导航规则使用条件导航：\n\n<?xml version='1.0' encoding='UTF-8'?>\n\
  \n<faces-config version=\"3.0\"\n\nxsi:schemaLocation=\"https://jakarta.ee/xml/ns/jakartaee\n\
  \n![](img/index-178_1.png)\n\n第 3 章 ■ Jakarta Server Faces\n\nhttps://jakarta.ee/xml/ns/jakartaee/web-facesconfig_3_0.xsd\"\
  >\n\n<navigation-rule>\n\n<from-view-id>/chapter03/recipe03_06a.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>PAGE_2</from-outcome>\n\n<to-view-id>/chapter03/recipe03_06b.xhtml</to-view-id>\n\
  \n</navigation-case>\n\n</navigation-rule>\n\n<navigation-rule>\n\n<from-view-id>/chapter03/recipe03_06b.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>PAGE_1</from-outcome>\n\n<to-view-id>/chapter03/recipe03_06a.xhtml</to-view-id>\n\
  \n</navigation-case>\n\n</navigation-rule>\n\n<navigation-rule>\n\n<navigation-case>\n\
  \n<from-action>#{navigationController.login}</from-action>\n\n<if>#{navigationController.authenticated}</if>\n\
  \n<to-view-id>/chapter03/recipe03_06d.xhtml</to-view-id>\n\n<redirect/>\n\n</navigation-case>\n\
  \n\n\n</navigation-rule>\n\n</faces-config>\n\n项目文件夹结构如图 3-10 所示。\n\n***图 3-10.**\
  \ 项目文件夹结构*\n\n第 3 章 ■ Jakarta Server Faces\n\n工作原理\n\n构建 Web 应用程序时最艰巨的任务之一，就是确定整体的页面导航。\n\
  \n许多 Web 框架都采用了 XML 配置文件来组织页面导航。这是 Java Server Faces Web 框架使用的一种技术，导航 XML 被放置在 Jakarta\
  \ Server Faces 应用程序的 `faces-config.xml` 配置文件中。当使用标准导航时，Jakarta Server Faces 会利用导航规则，根据页面操作的结果来确定要渲染哪个视图。\n\
  \n如果使用标准的 Jakarta Server Faces 导航，当页面操作发生时，与该操作关联的控制器类方法可以返回一个字符串值。然后，该值会使用 `faces-config.xml`\
  \ 文件中定义的导航规则进行评估，并用于确定接下来要渲染哪个页面。\n\n标准导航基础设施在大多数情况下都能很好地工作，但在某些情况下，直接在控制器类中列出要渲染的下一个页面，而不是在配置文件中制定导航规则，会更有意义。当调用控制器类操作时，它可以返回一个视图的名称（不带\
  \ `.xhtml` 后缀）。这种导航是在 Jakarta Server Faces 2.0 发布时引入的，被称为*隐式导航*。如解决方案的第四个示例所示，你也可以通过为组件标签的操作属性指定不带后缀的视图名称来执行隐式导航。\n\
  \nJakarta Server Faces 2.0 还引入了另一种导航类型，它允许在 `faces-config.xml` 导航规则中使用 Jakarta 表达式语言表达式，从而将导航提升到了一个新的水平。条件导航允许在导航规则中指定一个\
  \ `<if>` 元素，该元素对应一个 Jakarta 表达式语言条件。如果条件评估为真，则渲染指定的视图。\n\n导航规则由位于 `faces-config.xml`\
  \ 描述符中的 XML 构建而成，每条规则都有一个根元素 `navigation-rule`。在每个规则结构中，`from-view-id` 元素应包含调用操作方法的视图名称。`from-view-id`\
  \ 元素之后应跟一系列 `navigation-case`。每个 `navigation-case` 包含一个 `from-outcome` 元素，该元素应设置为一个字符串值，该字符串值与后续操作方法返回的字符串值相对应。例如，当示例中调用\
  \ `pageOne` 方法时，会返回字符串 `\"PAGE_1\"`，并且该字符串应在 `faces-config.xml` 文件的 `navigation-case`\
  \ 中的 `from-outcome` 元素内指定。最后，`to-view-id` 元素应跟在 `navigation-case` 中的 `from-outcome`\
  \ 元素之后，并且如果操作方法返回了 `from-outcome` 中的字符串，则该元素应指定要渲染哪个视图。以下摘录显示了允许应用程序从页面 1 导航到页面\
  \ 2 的标准导航规则：\n\n<navigation-rule>\n\n<from-view-id>/chapter03/recipe03_06a.xhtml</from-view-id>\n\
  \n<navigation-case>\n\n<from-outcome>PAGE_1</from-outcome>\n\n<to-view-id>/chapter03/recipe03_06b.xhtml</to-view-id>\n\
  \n</navigation-case>\n\n</navigation-rule>\n\n隐式导航不需要声明任何 XML 导航规则。通过 `h:commandButton`\
  \ 调用的操作方法会返回一个字符串，该字符串等于接下来应渲染的视图的名称。在示例中，视图 1 上的第二个 `h:commandButton` 调用了 `nextPage`\
  \ 控制器类方法，该方法返回了应渲染的下一个视图的名称：\n\npublic String nextPage(){\n\n// 执行某些任务，然后隐式列出要渲染的页面\n\
  \nreturn \"recipe03_06c\";\n\n}\n\n\n\n如果你想使用隐式导航，可以完全绕过控制器类，直接在 `h:commandButton`\
  \ 或 `h:commandLink` 的 `action` 属性中指定要直接渲染的视图名称。示例中的第四个 Jakarta Server Faces 视图演示了这种技术。\n\
  \n![](img/index-180_1.jpg)\n\n第 3 章 ■ Jakarta Server Faces\n\n示例中的第三个视图名为 `recipe03_05c.xhtml`，演示了条件导航。其\
  \ `h:commandButton` 的 `action` 调用了 `NavigationController` 类中的 `login` 方法。在该示例中，该方法不包含太多业务逻辑，但它确实将\
  \ bean 的 `authenticated` 字段设置为 `true`。假设有人输入了错误的密码且未能通过身份验证；在这种情况下，`authenticated`\
  \ 字段将被设置为 `false`。执行 `login` 方法后，会解析 `faces-config.xml` 文件以确定要渲染的下一个视图，条件导航规则利用\
  \ Jakarta 表达式语言来指定导航条件。`from-action` 元素被设置为用于调用 `login` 方法的 Jakarta 表达式语言，并且指定了一个\
  \ `<if>` 元素，通过 Jakarta Server Faces EL 引用 `navigationController.authenticated` 字段。如果该字段等于\
  \ `true`，则将渲染 `to-view-id` 元素中指定的视图。请注意，需要 `<redirect/>` 来告知 Jakarta Server Faces\
  \ 重定向到 `<to-view-id>` 元素中列出的视图，因为 Jakarta Server Faces 使用重定向而非转发：\n\n<navigation-rule>\n\
  \n<navigation-case>\n\n<from-action>#{navigationController.login}</from-action>\n\
  \n<if>#{navigationController.authenticated}</if>\n\n<to-view-id>/chapter03/recipe03_06d.xhtml</to-view-id>\n\
  \n<redirect/>\n\n</navigation-case>\n\n</navigation-rule>\n\n</faces-config>\n\n\
  标准的 Jakarta Server Faces 导航在大多数情况下提供了足够的灵活性，其架构也比其他 Web 框架复杂得多。然而，在 Jakarta Server\
  \ Faces 2.0 中，引入了两种新的导航技术，即*隐式导航*和*条件导航*。随着这些新技术的加入，Jakarta Server Faces 导航变得更加健壮且易于管理。要查看此配方的输出，请在浏览器中导航至\
  \ URL `http://localhost:8080/JakartaEERecipes_Chapter03-1.0-SNAPSHOT/chapter03/recipe03_06a.xhtml`，即可看到如图\
  \ 3-11 所示的输出。\n\n***图 3-11.** 生成的 Jakarta Server Faces 视图*\n\n第 3 章 ■ Jakarta Server\
  \ Faces\n\n3-7. 验证用户输入\n\n问题\n\n你希望为应用程序添加验证 Jakarta Server Faces 表单中输入数据的能力。\n\n\
  解决方案\n\n在任何需要验证的文本字段组件或其他输入组件上注册 Jakarta Server Faces 验证器。在适用的情况下使用预定义的 Jakarta\
  \ Server Faces 验证器，并在需要时创建自定义验证器类。本配方的示例对两个 `h:inputText` 组件使用了预定义验证器，以确保输入的值具有适当的长度。第三个文本字段添加了一个自定义验证器，负责确保文本包含指定的字符串。这三个字段构成了一个员工输入表单，当输入员工信息且数据验证成功时，会创建一个新的\
  \ `Employee` 对象并将其添加到员工列表中。视图中的 `h:dataTable` 元素用于在存在员工时显示员工列表。这或许不是最贴近实际的示例，但你可以应用基本理念来验证自己应用程序中的实际需求。\n\
  \n以下列表是构建员工输入表单的 Jakarta Server Faces 视图（`\\webapp\\chapter03\\recipe03_07.xhtml`），包括每个输入文本字段的验证标签：\n\
  \n<html>\n\n<h:head>\n\n<title>配方 3-7：验证数据</title>\n\n</h:head>\n\n<h:body>\n\n\
  <h:form id=\"employeeForm\">\n\n<h1>Java 开发者员工信息</h1>\n\n<br/>\n\n\n\n<h:messages\
  \ globalOnly=\"true\" errorStyle=\"color: red\" infoStyle=\"color: green\"/>\n\n\
  <br/>\n\n<h:dataTable id=\"empTable\" var=\"emp\"\n\nborder=\"1\" value=\"#{employeeController.employeeList}\"\
  \n\nrendered=\"#{employeeController.employeeList.size() > 0}\">\n\n<f:facet name=\"\
  header\">\n\n当前员工\n\n</f:facet>\n\n<h:column id=\"empNameCol\">\n\n<f:facet name=\"\
  header\">员工</f:facet>\n\n<h:outputText id=\"empName\" value=\"#{emp.employeeFirst}\n\
  \n#{emp.employeeLast}\"/>\n\n</h:column>\n\n<h:column id=\"titleCol\">\n\n<f:facet\
  \ name=\"header\">职位</f:facet>\n\n<h:outputText id=\"title\" value=\"#{emp.employeeTitle}\"\
  />\n\n</h:column>\n\n</h:dataTable>\n\n第 3 章 ■ Jakarta Server Faces\n\n<p>\n\n请使用下方表单输入员工信息。\n\
  \n</p>\n\n<h:panelGrid columns=\"3\">\n\n<h:outputLabel for=\"employeeFirst\" value=\"\
  名：\" />\n\n<h:inputText id=\"employeeFirst\" value=\"#{employeeController.employeeFirst}\"\
  >\n\n<f:validateLength minimum=\"3\" maximum=\"30\"/>\n\n</h:inputText>\n\n<h:message\
  \ for=\"employeeFirst\" errorStyle=\"color:red\"/>\n\n<h:outputLabel for=\"employeeLast\"\
  \ value=\"姓：\" />\n\n<h:inputText id=\"employeeLast\" value=\"#{employeeController.employeeLast}\"\
  >\n\n<f:validateLength minimum=\"3\" maximum=\"30\"/>\n\n</h:inputText>\n\n<h:message\
  \ for=\"employeeLast\" errorStyle=\"color:red\"/>\n\n<h:outputLabel for=\"employeeTitle\"\
  \ value=\"职位（必须是 Java 相关职位）：\"/>\n\n<h:inputText id=\"employeeTitle\" value=\"#{employeeController.employeeTitle}\"\
  >\n\n<f:validator validatorId=\"employeeTitleValidate\" />\n\n</h:inputText>\n\n\
  <h:message for=\"employeeTitle\" errorStyle=\"color:red\"/>\n\n</h:panelGrid>\n\n\
  <h:commandButton id=\"employeeInsert\" action=\"#{employeeController.\n\ninsertEmployee}\"\
  \n\nvalue=\"插入员工\"/>\n\n</h:form>\n\n</h:body>\n\n</html>\n\n视图中的第三个 `h:inputText`\
  \ 组件使用了自定义验证器。`f:validator` 标签用于指定自定义验证器，其 `validatorId` 属性用于指定对应的验证器类。\n\n以下清单是名为\
  \ `EmployeeTitleValidate` 的 Java 代码，即该文本字段的自定义验证类：\n\npackage org.jakartaeerecipe.chapter03.recipe03_07;\n\
  \nimport jakarta.faces.application.FacesMessage;\n\nimport jakarta.faces.component.UIComponent;\n\
  \nimport jakarta.faces.context.FacesContext;\n\nimport jakarta.faces.validator.FacesValidator;\n\
  \nimport jakarta.faces.validator.Validator;\n\nimport jakarta.faces.validator.ValidatorException;\n\
  \n@FacesValidator(\"employeeTitleValidator\")\n\npublic class EmployeeTitleValidate\
  \ implements Validator {\n\n@Override\n\npublic void validate(FacesContext facesContext,\
  \ UIComponent uiComponent, Object value)\n\nthrows ValidatorException {\n\ncheckTitle(value);\n\
  \n}\n\nprivate void checkTitle(Object value) {\n\nString title = value.toString();\n\
  \n第 3 章 ■ Jakarta Server Faces\n\nif (!title.contains(\"Java\")) {\n\nString messageText\
  \ = \"职位名称不包含 Java 字样\";\n\nthrow new ValidatorException(new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\
  \nmessageText, messageText));\n\n}\n\n}\n\n}\n\n■ **注意** 自 Jakarta Server Faces\
  \ 2.3 起，可以将资源注入验证器类。用户生成的验证器类也可以注入到其他资源中。\n\n现在让我们来看一下包含验证标签的 Jakarta Server Faces\
  \ 视图所对应的 Jakarta Server Faces 控制器类。控制器类名为 `EmployeeController`，其中的动作方法 `insertEmployee`\
  \ 用于将包含有效数据的新的 `Employee` 对象添加到 `ArrayList` 中：\n\npackage org.jakartaeerecipe.chapter03.recipe03_07;\n\
  \nimport java.io.Serializable;\n\nimport java.util.ArrayList;\n\nimport java.util.List;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\n\nimport jakarta.faces.application.FacesMessage;\n\
  \nimport jakarta.faces.context.FacesContext;\n\nimport jakarta.inject.Named;\n\n\
  @Named(value=\"employeeController\")\n\n@SessionScoped\n\npublic class EmployeeController\
  \ implements Serializable {\n\nprivate String employeeFirst;\n\nprivate String employeeLast;\n\
  \nprivate String employeeTitle;\n\nprivate List <Employee> employeeList;\n\npublic\
  \ EmployeeController(){\n\nemployeeList = new ArrayList();\n\n}\n\npublic void insertEmployee(){\n\
  \nEmployee emp = new Employee(employeeFirst,\n\nemployeeLast,\n\nemployeeTitle);\n\
  \nemployeeList.add(emp);\n\n\n\n```java\nFacesMessage facesMsg = new FacesMessage(FacesMessage.SEVERITY_INFO,\
  \ \"员工\n成功添加\", null);\nFacesContext.getCurrentInstance().addMessage(null, facesMsg);\n\
  }\n// getters 和 setters\n// ....\n}\n```\n\n![](img/index-184_1.png)\n\n第 3 章 ■\
  \ Jakarta Server Faces\n\n以下是 Employee 类的代码，它是一个简单的纯旧式 Java 对象（POJO）类。\n\n```java\n\
  package org.jakartaeerecipe.chapter03.recipe03_07;\n\npublic record Employee(String\
  \ getEmployeeFirst, String getEmployeeLast, String\ngetEmployeeTitle) {\n}\n```\n\
  \n最终，如果用户尝试输入员工名字或姓氏时使用了无效长度，或输入了不包含 *Java* 一词的职位，验证器将抛出异常。当用户输入验证失败时，错误消息会显示在包含无效条目的组件旁边。本配方的输出结果如图\
  \ 3-12 所示。\n\n***图 3-12.** 生成的 Jakarta Server Faces 视图*\n\n工作原理\n\nJakarta Server\
  \ Faces 框架包含许多功能，使开发者能够更方便地自定义应用程序。验证器就是这些功能之一，因为它们可用于固化应用程序数据，并确保在将数据存储到数据库或其他数据存储之前数据是正确的。Jakarta\
  \ Server Faces 框架内置了大量已实现的验证器。要使用这些预定义的验证器，只需在视图中的组件标签内嵌入相应的验证器标签，即可验证该组件的数据值。有时，标准验证器无法满足需求。在这种情况下，Jakarta\
  \ Server Faces 提供了一种开发自定义验证器类的方法，这些类可以像预定义验证器一样在视图中使用。\n\n在本配方的示例中，两个 `h:inputText`\
  \ 组件包含了用于验证输入值长度的标准 Jakarta Server Faces 验证器。`f:validateLength` 标签可以嵌入到组件中用于字符串长度验证，该标签的\
  \ `minimum` 和 `maximum` 属性可以分别设置最小和最大字符串长度。如前所述，Jakarta Server Faces 内置了大量此类预定义验证器。开发者只需将验证器标签嵌入到需要验证的组件中即可。表\
  \ 3-3 列出了所有标准验证器标签及其功能。有关每个验证器属性的详细信息，请参阅在线文档。\n\n第 3 章 ■ Jakarta Server Faces\n\
  \n***表 3-3.** 标准验证器*\n\n**验证器标签**\n\n**描述**\n\nvalidateLength\n\n检查字符串长度\n\nvalidateLongRange\n\
  \n检查数值范围\n\nvalidateDoubleRange\n\n检查浮点数值范围\n\nvalidateRequired\n\n确保输入字段不为空（也可替代在输入字段组件标签上使用\
  \ required 属性）\n\nvalidateRegex\n\n根据给定的正则表达式模式验证组件\n\n通常，对于特定组件，可能需要进行其他类型的验证。在这种情况下，开发自定义验证器类可能是最佳选择。许多开发者不愿编写自己的验证器，因为乍看之下这似乎是一项艰巨的任务。然而，Jakarta\
  \ Server Faces 2.0 在使自定义验证器类更易于编写和理解方面取得了长足进步。\n\n要创建自定义验证器类，需要实现 `jakarta.faces.validator.Validator`\
  \ 接口。使用 `@FacesValidator` 注解标注验证器类，并指定用于在 `f:validator` 标签中注册验证器的字符串。在示例中，用于引用验证器类的名称是\
  \ `employeeTitleValidate`。唯一的要求是验证器类必须重写 `validate` 方法，自定义验证逻辑就写在该方法中。`validate`\
  \ 方法具有以下签名：\n\n\n\npublic void validate(FacesContext facesContext, UIComponent uiComponent,\
  \ Object value)\n\nthrows ValidatorException\n\n利用传入方法的参数，你可以获取当前的 `FacesContext`、被验证组件的句柄以及该组件的值。在示例中，从\
  \ `validate` 方法内部调用了一个辅助方法，用于检查组件的值，并确保其中包含单词 *Java*。如果验证未通过，则会创建并抛出 `ValidatorException`。如果验证失败，放置在\
  \ `ValidatorException` 中的消息将显示在被验证组件旁边。以下摘自验证类的代码演示了如何创建并抛出 `ValidatorException`：\n\
  \nthrow new ValidatorException(new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\n\
  messageText, messageText));\n\n那么，验证何时发生？这是验证器的关键，不是吗？答案是立即发生，在请求被发送到控制器类动作方法之前。任何验证都发生在\
  \ *Process Validations* 阶段，如果视图中的一个或多个被验证组件抛出了 `ValidatorException`，则处理过程停止，请求不会被发送到动作方法。当用户点击提交按钮时，首先进行验证，如果一切正常，则请求被传递给动作方法。\n\
  \n■ **注意** 验证输入组件是否包含值的一种方法是使用 `required` 属性。可以将输入组件标签的 `required` 属性设置为 `true`，以强制为该组件输入一个值。\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n在 Jakarta Server Faces 视图中使用标准验证器验证组件，确实可以节省开发人员的时间，并提高应用程序数据的可用性和精确性。创建自定义验证器的能力允许为任何场景执行验证。请积极地在应用程序的所有输入表单上使用验证，并创建自定义验证器以使用独特的技术执行验证。您的应用程序用户会感激的！\n\
  \n3-8\\. 立即评估页面表达式\n\n问题\n\n您希望某些 Jakarta Server Faces 组件值被立即评估，而不是等到表单提交时。\n\n\
  解决方案\n\n为组件标签的 `immediate` 属性指定 `true`，同时指定组件的 `onchange` 属性并将其设置为 `submit()`。这将导致当组件的值发生变化时立即提交输入表单，并且\
  \ Jakarta Server Faces 将跳过渲染响应阶段，并在应用请求值 Jakarta Server Faces 生命周期阶段执行所有指定了 `immediate`\
  \ 属性为 `true` 的组件。本配方的示例使用了一个员工表单。\n\n第一个和最后一个 `h:inputText` 组件不会等到表单提交，而是在它们的值发生变化时，在应用请求值阶段立即被评估和验证。以下是名为\
  \ `/webapp/chapter03/recipe03_08.xhtml` 的 Jakarta Server Faces 视图的源代码：\n\n<html\n\
  \n>\n\n<h:head>\n\n<title>配方 3-8 立即视图评估</title>\n\n</h:head>\n\n<h:body>\n\n<h:form\
  \ id=\"employeeForm\">\n\n<h1>Java 开发人员员工信息</h1>\n\n<br/>\n\n<h:messages globalOnly=\"\
  true\" errorStyle=\"color: red\" infoStyle=\"color: green\"/>\n\n<br/>\n\n<h:dataTable\
  \ id=\"empTable\" var=\"emp\"\n\nborder=\"1\" value=\"#{employeeController.employeeList}\"\
  \n\nrendered=\"#{employeeController.employeeList.size() > 0}\">\n\n<f:facet name=\"\
  header\">\n\n当前员工\n\n</f:facet>\n\n<h:column id=\"empNameCol\">\n\n<f:facet name=\"\
  header\">员工</f:facet>\n\n<h:outputText id=\"empName\" value=\"#{emp.employeeFirst}\n\
  \n#{emp.employeeLast}\"/>\n\n</h:column>\n\n<h:column id=\"titleCol\">\n\n<f:facet\
  \ name=\"header\">职位</f:facet>\n\n<h:outputText id=\"title\" value=\"#{emp.employeeTitle}\"\
  />\n\n第 3 章 ■ Jakarta Server Faces\n\n</h:column>\n\n</h:dataTable>\n\n<p style=\"\
  width: 40%;\">\n\n请使用下面的表单插入员工信息。第一个和最后一个文本字段将在应用请求值阶段导致立即评估，而中间的文本字段将导致标准评估，并在调用应用阶段进行验证。\n\
  \n<br/><br/>\n\n要测试，请尝试在第一个文本字段中仅插入一个字符，然后按 Tab 键切换到下一个字段。您应该会看到立即的结果。\n\n</p>\n\
  \n<h:panelGrid columns=\"3\">\n\n<h:outputLabel for=\"employeeFirst\" value=\"名:\
  \ \" />\n\n<h:inputText id=\"employeeFirst\" **immediate=\"true\" onchange=\"submit()\"\
  **\n\nvalue=\"#{employeeController.employeeFirst}\">\n\n<f:validateLength minimum=\"\
  3\" maximum=\"30\"/>\n\n</h:inputText>\n\n<h:message for=\"employeeFirst\" errorStyle=\"\
  color:red\"/>\n\n<h:outputLabel for=\"employeeLast\" value=\"姓: \" />\n\n<h:inputText\
  \ id=\"employeeLast\" value=\"#{employeeController.employeeLast}\">\n\n<f:validateLength\
  \ minimum=\"3\" maximum=\"30\"/>\n\n</h:inputText>\n\n<h:message for=\"employeeLast\"\
  \ errorStyle=\"color:red\"/>\n\n<h:outputLabel for=\"employeeTitle\" value=\"职位\
  \ (必须是 Java 职位): \"/>\n\n<h:inputText id=\"employeeTitle\" **immediate=\"true\"\
  **\n\nvalue=\"#{employeeController.employeeTitle}\">\n\n<f:validator validatorId=\"\
  employeeTitleValidator\" />\n\n</h:inputText>\n\n<h:message for=\"employeeTitle\"\
  \ errorStyle=\"color:red\"/>\n\n</h:panelGrid>\n\n<h:commandButton id=\"employeeInsert\"\
  \ action=\"#{employeeController.\n\ninsertEmployee}\"\n\nvalue=\"插入员工\"/>\n\n</h:form>\n\
  \n</h:body>\n\n</html>\n\n如您所见，id 为 `employeeFirst` 和 `employeeTitle` 的 `h:inputText`\
  \ 组件同时指定了 `immediate=\"true\"` 和 `onchange=\"submit()\"` 属性。这两个属性导致这些组件被立即验证，而不是在调用\
  \ `h:commandButton` 动作时验证。本配方的输出如图 3-13 所示。\n\n![](img/index-188_1.png)\n\n第 3 章\
  \ ■ Jakarta Server Faces\n\n***图 3-13.** 生成的 Jakarta Server Faces 视图*\n\n工作原理\n\n\
  立即发生的事件处理在您不想为了处理输入而验证整个表单，而是希望选定的组件被立即验证的情况下非常有用。\n\n如配方 3-1 所述，当处理 Jakarta Server\
  \ Faces 视图时，会执行多个阶段。因此，当提交表单时，调用应用阶段会启动视图组件的事件处理器，并进行验证。当组件的 `immediate` 属性设置为 `true`\
  \ 时，该组件的事件处理器会在应用请求值阶段执行，该阶段发生在通常进行组件验证的处理验证阶段之前。这允许对指定组件进行立即验证响应，如果需要，可以立即显示错误消息。\n\
  \n如前所述，如果您希望某个组件被立即评估，请为其指定 `immediate` 属性并将其设置为 `true`。这将导致该组件在应用请求值阶段被评估和验证。当您同时指定\
  \ `onclick` 属性并将其设置为 `submit()` 时，真正的乐趣就来了，这会导致当组件的值发生变化时提交表单。如此指定属性将导致视图中任何具有 `immediate`\
  \ 属性设置为 `true` 的组件在组件值发生变化时被验证。\n\n■ **注意** `immediate` 属性在 `commandButton` 组件上也很有用，例如在您不希望进行任何表单处理的情况下，比如您想设置一个取消按钮或其他按钮来绕过表单处理。\n\
  \n3-9\\. 将页面参数传递给方法\n\n问题\n\n您希望通过表达式语言 (EL) 从 Jakarta Server Faces 视图内部将参数（例如 `lastName`）传递给控制器类方法。\n\
  \n解决方案\n\n\n\n使用标准 Jakarta 表达式语言表达式调用控制器类方法，并将要传递给方法的参数括在括号内。在本配方的示例中，使用 `h:dataTable`\
  \ 组件在视图中显示 `Author` 对象列表。`h:dataTable` 中的每一行都包含一个 `h:commandLink` 组件，该组件在被选中时会调用\
  \ Jakarta Server Faces 控制器类方法。`h:commandLink` 显示当前行的作者姓名，并在点击时调用 `AuthorController`\
  \ 类的 `displayAuthor` 方法，同时传递当前行所显示作者的姓氏。在 `displayAuthor` 方法中，遍历作者列表，找到包含与传递给方法的参数相同姓氏的元素。然后，当前作者会显示在后续页面中，该页面使用隐式导航进行渲染。\n\
  \n以下源代码是名为 `recipe03_09a.xhtml` 的 Jakarta Server Faces 视图，它使用 `h:dataTable` 组件显示作者列表：\n\
  \n```html\n<html>\n<h:head>\n<title>配方 3-9：向方法传递页面参数</title>\n</h:head>\n<h:body>\n\
  <h:form id=\"componentForm\">\n<h1>作者列表</h1>\n<p>\n以下是作者列表。点击作者的姓氏可获取关于该作者的更多信息。\n\
  </p>\n<h:graphicImage id=\"java9recipes\" style=\"width: 10%; height: 20%\"\nlibrary=\"\
  image\" name=\"java9recipes.png\"/>\n<br/>\n<h:dataTable id=\"authorTable\" border=\"\
  1\" value=\"#{authorTableController.authorList}\"\nvar=\"author\">\n<f:facet name=\"\
  header\">\nJava 9 配方作者\n</f:facet>\n<h:column>\n<h:commandLink id=\"authorName\"\
  \ action=\"#{authorTableController.displayAuthor(author.last)}\"\nvalue=\"#{author.first}\
  \ #{author.last}\"/>\n</h:column>\n</h:dataTable>\n<br/>\n<br/>\n</h:form>\n</h:body>\n\
  </html>\n```\n\n接下来的代码是上述 Jakarta Server Faces 视图的控制器类。该控制器类在实例化时使用 `Author` 对象填充一个\
  \ `ArrayList`：\n\n```java\npackage org.jakartaeerecipes.chapter03.recipe03_09;\n\
  \nimport java.io.Serializable;\nimport java.util.ArrayList;\nimport java.util.List;\n\
  import jakarta.enterprise.context.SessionScoped;\nimport jakarta.inject.Named;\n\
  \n@Named(value = \"authorTableController\")\n@SessionScoped\npublic class AuthorController\
  \ implements Serializable {\n\n    private List<Author> authorList = null;\n   \
  \ private final String juneauBio = \"这是 Josh Juneau 的简介\";\n    private final String\
  \ telangBio = \"这是 Tarun Telang 的简介\";\n    private Author current;\n    private\
  \ String authorLast;\n\n    /**\n     * 创建一个新的 RecipeController 实例\n     */\n  \
  \  public AuthorController() {\n        super();\n        authorLast = null;\n \
  \       populateAuthorList();\n    }\n\n    private void populateAuthorList() {\n\
  \        if(authorList == null){\n            System.out.println(\"正在初始化作者列表\");\n\
  \            authorList = new ArrayList<>();\n            authorList.add(new Author(\"\
  Josh\", \"Juneau\", juneauBio));\n            authorList.add(new Author(\"Tarun\"\
  , \"Telang\", telangBio));\n        }\n    }\n\n    public String displayAuthor(String\
  \ last){\n        for(Author author:authorList){\n            if(author.getLast().equals(last)){\n\
  \                current = author;\n                break;\n            }\n    \
  \    }\n        return \"recipe03_09b\";\n    }\n\n    // getters and setters\n\
  \    // ....\n}\n```\n\n页面的输出应如图 3-14 所示。\n\n![](img/index-191_1.jpg)\n\n***图 3-14.**\
  \ 生成的 Jakarta Server Faces 视图*\n\n`Author` 类与配方 3-3 中使用的 `Author` 普通 Java 对象（POJO）相同。有关\
  \ `Author` 类的源代码，请参考该配方。最后，以下代码是名为 `recipe03_09b.xhtml` 的 Jakarta Server Faces 视图，即每位作者的详细信息视图。当在第一个视图的\
  \ `h:dataTable` 组件中点击作者姓名时，会调用该组件对应的控制器类方法，然后渲染此视图以显示所选作者的信息：\n\n```html\n<html>\n\
  <h:head>\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
  />\n<title>配方 3-9：向方法传递页面参数</title>\n</h:head>\n<h:body>\n<h:form id=\"componentForm\"\
  >\n```\n\n\n<h1>#{authorTableController.current.first} #{authorTableController.current.last}</h1>\n\
  \n<p>\n\n<h:graphicImage library=\"image\" name=\"jakartaee10recipes.png\"\n\nid=\"\
  jakartaee10recipes\" style=\"width: 10%; height: 20%\"/>\n\n<br/>\n\n#{authorTableController.current.bio}\n\
  \n</p>\n\n<h:link value=\"返回列表\" outcome=\"recipe03_09a\"/>\n\n</h:form>\n\n![](img/index-192_1.jpg)\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n</h:body>\n\n</html>\n\n点击作者姓名，将跳转至一个页面，其输出结果如图\
  \ 3-15 所示。\n\n***图 3-15.** 生成的 Jakarta Server Faces 视图*\n\n工作原理\n\n2.0 版本包含了许多增强功能，使得\
  \ Jakarta Server Faces 开发者的工作比以往更加轻松。其中一项增强功能就是能够从 Jakarta Server Faces 视图内向控制器类方法传递参数。正如本配方的示例所示，你可以像在\
  \ Java 中调用任何带参数的方法一样，通过将参数括在方法名后的括号内，在 Jakarta 表达式语言结构中向方法传递参数。没有比这更简单的了！\n\n让我们来看看使这个示例运转起来的代码行。第一个\
  \ Jakarta Server Faces 视图显示了一个作者姓名表格，每个姓名都使用 `h:commandLink` 组件显示。`h:commandLink`\
  \ 组件的 `value` 属性设置为作者姓名，`action` 属性设置为 Jakarta Server Faces EL，该 EL 调用一个名为 `displayAuthor`\
  \ 的控制器类操作方法。请注意，在调用控制器类方法时，作者的姓氏的 Jakarta 表达式语言作为字符串参数传递。\n\n<h:dataTable id=\"\
  authorTable\" border=\"1\" value=\"#{authorTableController.authorList}\"\n\nvar=\"\
  author\">\n\n<f:facet name=\"header\">\n\nJava 9 Recipes 作者\n\n</f:facet>\n\n<h:column>\n\
  \n<h:commandLink id=\"authorName\" action=\"#{authorTableController.displayAuthor(author.last)}\"\
  \n\nvalue=\"#{author.first} #{author.last}\"/>\n\n</h:column>\n\n</h:dataTable>\n\
  \n第 3 章 ■ Jakarta Server Faces\n\n控制器类中的 `displayAuthor` 方法接受一个字符串参数值，即作者的姓氏，然后在作者列表中查找包含相同姓氏的\
  \ `Author` 对象。\n\n找到后，一个名为 `current` 的类字段被设置为与匹配列表元素对应的 `Author` 对象。\n\n随后的 Jakarta\
  \ Server Faces 视图利用当前的作者信息显示内容。\n\n在 Jakarta Server Faces 2.0 之前，开发者无法从视图内向控制器类方法传递参数。这使得执行此类技术变得稍微困难一些，并且通常需要编写更多的代码。\n\
  \n3-10. 在表达式中使用运算符和保留字\n\n问题\n\n你希望在 Jakarta Server Faces 视图中执行一些算术运算并组合表达式。\n\n\
  解决方案\n\nJakarta Server Faces Jakarta 表达式语言表达式可以使用标准算术运算符进行算术运算。还可以利用一些 Jakarta Server\
  \ Faces EL 保留字来组合两个或多个表达式。在以下示例（recipe03_10.xhtml）中，使用了一些 Jakarta 表达式语言表达式在页面上显示数学结果。算术运算和保留字的使用体现在下面的表达式中：\n\
  \n<html>\n\n<h:head>\n\n<title>配方 3-10：算术运算和保留字</title>\n\n</h:head>\n\n<h:body>\n\
  \n<h:form id=\"componentForm\">\n\n<h1>Jakarta Server Faces 中的算术运算和保留字（Jakarta 表达式语言）</h1>\n\
  \n<p>\n\n以下示例使用 Jakarta 表达式语言执行一些算术运算。\n\n</p>\n\n1 + 1 = #{1 + 1}\n\n<br/>\n\n\
  <h:outputText value=\"20 / 5 = #{20 / 5}\"/>\n\n<br/>\n\n<h:outputText rendered=\"\
  #{1 + 1 eq 2}\" value=\"1 + 1 确实等于 2\"/>\n\n<br/>\n\n<h:outputText rendered=\"#{5\
  \ * 4 != 20}\" value=\"5 * 4 等于 20 吗？\"/>\n\n<br/>\n\n<h:outputText rendered=\"\
  #{5 * 5 eq 25 and 1 + 1 eq 2}\" value=\"组合一些表达式\"/>\n\n<br/>\n\n</h:form>\n\n</h:body>\n\
