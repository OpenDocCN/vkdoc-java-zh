  \n14-8. 替换 JSON 文档中的指定元素\n\n问题\n\n你希望替换 JSON 文档中与给定模式匹配的值。\n\n解决方案\n\n利用 JSON-P\
  \ 的 patch 功能来替换 JSON 文档中的值。在以下示例中，从 JSF 表单获取一段文本字符串，并用它创建一个 JSON 指针，指向 JSON 字符串中匹配的姓氏。然后使用\
  \ JSON Replace 功能将匹配的 JSON 字符串值替换为字符串值“JsonMaster”：\n\npublic void findEmployeeByLast()\
  \ {\n\nsetSearchResult(null);\n\nString text = \"/\" + this.lastSearchText;\n\n\
  JsonObject json = Json.createObjectBuilder().build();\n\nJsonValue object = json.getJsonObject(fetchJson());\n\
  \nif (lastSearchText != null && object != null) {\n\nJsonPointer pointer = Json.createPointer(text);\n\
  \nSystem.out.println(\"text: \" + text + pointer);\n\nSystem.out.println(\"json:\
  \ \" + object);\n\nJsonValue result = pointer.getValue(object.asJsonArray());\n\n\
  ![](img/index-588_1.jpg)\n\n第 14 章 ■ WebSocket 与 JSON\n\n// 替换一个值\n\nJsonArray array\
  \ = (JsonArray) pointer.replace(object.asJsonArray(),\n\nJson.createValue(\"JsonMaster\"\
  ));\n\nsetSearchResult(array.toString());\n\n}\n\n}\n\n以下标记显示了用于发送搜索文本并显示结果的 Jakarta\
  \ Server Faces 表单：\n\n<h:form id=\"jsonPointerForm\">\n\n<p:panel header=\"Employee\
  \ Search By Address\">\n\n<p:outputLabel for=\"lastSearchText\" value=\"Pointer\
  \ String:\"/>\n\n<p:inputText id=\"lastSearchText\" value=\"#{employeeJsonController.lastSearchText}\"\
  />\n\n<br/><br/>\n\n<p:commandButton id=\"searchButton\"\n\naction=\"#{employeeJsonController.findEmployeeByLast}\"\
  \n\nupdate=\"searchResult\" value=\"Find Value\"/>\n\n</p:panel>\n\n<br/>\n\n<h:outputText\
  \ id=\"searchResult\" value=\"#{customerController.searchResult}\"/>\n\n</h:form>\n\
  \n可以通过访问 URL http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/recipe14_08.xhtml\
  \ 来执行此配方代码。\n\n输出将如图 14-9 所示。\n\n***图 14-9. 配方 14-8 的输出***\n\n第 14 章 ■ WebSocket\
  \ 与 JSON\n\n工作原理\n\nJSON-P 1.1 API 增加了指向指定 JSON 值以及替换 JSON 文档中值的能力。JSON Pointer\
  \ 功能允许识别 JSON 文档中的特定值。要使用 JSON Pointer 功能，必须首先通过调用适当的 Json 接口方法来获取一个 JsonObject，以便处理将要使用的\
  \ JSON。在本配方的解决方案中，调用了 Json.createObjectBuilder().build() 方法来返回一个 JsonObject。然后可以使用该\
  \ JsonObject 执行 JSON Patch 操作。示例中的 fetchJson() 方法返回一个 JSON 字符串：\n\nJsonObject json\
  \ = Json.createObjectBuilder().build();\n\nJsonValue object = json.getJsonObject(fetchJson());\n\
  \n通过调用 Json 接口的 createPointer() 方法，并传入要在 JSON 中查找的文本字符串，即可获得 JsonPointer 对象。以下来自解决方案的摘录展示了获取\
  \ JSON 指针的过程：\n\nJsonPointer pointer = Json.createPointer(text);\n\nJSON Patch 功能提供了添加、删除或替换通过\
  \ JSON 指针获取的 JSON 文档或字符串的一部分的能力。在解决方案中，使用 Replace 功能将指向的姓氏替换为字符串“JsonMaster”。这是通过调用\
  \ JsonPointer 的 replace() 方法，并将 JSON 对象作为第一个参数，将替换原始 JSON 的 Json 值作为第二个参数来实现的：\n\
  \nJsonArray array = (JsonArray) pointer.replace(object.asJsonArray(),\n\nJson.createValue(\"\
  JsonMaster\"));\n\nJsonPointer 对象还包含 add() 和 replace() 方法。add() 方法可用于向 JSON 对象添加值或向数组插入值。add()\
  \ 方法接受一个 JsonObject 作为第一个参数，以及要添加的 Json 值作为第二个参数。remove() 方法允许从 JSON 文档中移除一个 JsonPointer\
  \ 值。\n\n**第 15 章**\n\n**Jakarta 安全**\n\n企业级应用最重要的组成部分之一就是安全性。事实上，企业应用必须坚如磐石且安全可靠，以防止数据和应用程序功能落入不法之徒手中。结合使用应用容器安全性和应用级安全性，有助于保护应用程序免受针对企业数据的恶意攻击。\n\
  \nJakarta Security 提供了一个标准 API，可用于在 Jakarta EE 平台中保护应用程序安全。在之前的版本中，安全性当然是可能的，但没有标准\
  \ API，因此在使用该平台的应用程序中，存在各种自制的身份验证解决方案和第三方 API。在本章中，我将介绍之前版本中可能用于保护应用程序安全的技术，并且还将概述利用\
  \ Jakarta EE 平台中标准安全 API 的类似解决方案。\n\n有三种不同类型的安全性可应用于企业级应用：声明式安全性、编程式安全性和传输安全性。*声明式*安全性发生在应用程序的部署描述符中，或通过添加到应用程序中类和方法上的注解来实现。声明式安全性用于为应用服务器容器提供能力，通过使用用户身份验证和角色来保护对特定应用程序功能的访问。*编程式*安全性发生在开发人员手动编写身份验证方法，自定义应用程序身份验证需求时。*传输*安全性发生在客户端和服务器之间，负责保护两者之间传递的信息的安全。\n\
  \n本章将涉及这三个安全级别。它包含一些配方，涵盖了使用 GlassFish 服务器设置数据库和 LDAP 的应用服务器配置。\n\n\n\n（轻量级目录访问协议）认证，适用于部署在容器内的应用程序。您还将学习如何利用\
  \ XML 配置、注解和 Jakarta 表达式语言来保护应用程序的各个部分。最后，本章将简要介绍如何通过 SSL 和证书保护传输安全。本章还将涉及 Jakarta\
  \ EE 安全 API，它提供了一种标准化解决方案，使开发人员能够生成可移植的应用程序，并将安全实现打包在应用程序内部，而非容器中。\n\n15-1. 在 GlassFish\
  \ 中设置应用程序用户和组\n\n问题\n\n您希望在应用程序服务器容器内创建用户、组和角色，以便与部署到该容器的应用程序一起使用。\n\n© Josh Juneau\
  \ 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang，《Java EE 到 Jakarta EE 10 实战》[，https://doi.org/10.1007/978-1-4842-8079-9_15](https://doi.org/10.1007/978-1-4842-8079-9_15#DOI)\n\
  \n![](img/index-591_1.jpg)\n\n第 15 章 ■ Jakarta 安全\n\n解决方案\n\n登录 GlassFish 管理控制台，将用户添加到\
  \ File 安全域。然后，您可以在创建用户时通过指定组名将用户添加到组中。本示例将引导您在 GlassFish 应用服务器中完成新用户的配置。\n\n通过导航至\
  \ http://localhost:4848 并以管理员用户身份登录管理控制台。\n\n使用屏幕左侧的树形菜单导航至 Configurations ➤ server-config\n\
  \n➤ Security ➤ Realms 菜单。单击 Realms 菜单选项后，将显示 Realms 表单\n\n（图 15-1）。\n\n***图 15-1.**\
  \ GlassFish Realms 表单*\n\n![](img/index-592_1.png)\n\n![](img/index-592_2.jpg)\n\
  \n第 15 章 ■ Jakarta 安全\n\n1. 单击“file”领域链接进入 Edit Realm 表单，如图 15-2 所示。\n\n***图 15-2.**\
  \ GlassFish Edit Realm 表单*\n\n2. 单击 Edit Realm 表单中的 Manage Users 按钮以打开 File Users\n\
  \n表单，然后单击 File Users 表单中的 New 按钮（图 15-3）进入 New File Realm User 表单（图 15-4）。\n\n***图\
  \ 15-3.** GlassFish File Users 表单*\n\n![](img/index-593_1.png)\n\n![](img/index-593_2.jpg)\n\
  \n第 15 章 ■ Jakarta 安全\n\n***图 15-4.** GlassFish New File Realm User 表单*\n\n3. 填写用户\
  \ ID 和密码信息以完成 New File Realm\n\nUser 表单，并可选择在 Group List 字段中添加组名。单击\n\nSave 按钮将用户添加到\
  \ File Users 列表（图 15-5）。\n\n***图 15-5.** File Users 列表*\n\n创建完成后，GlassFish 域中的用户可用于应用程序身份验证。要了解有关配置应用程序以使用应用服务器容器用户身份验证的更多信息，请参阅配方\
  \ 15-2。\n\n工作原理\n\n添加身份验证提示以允许用户访问安全区域，是任何应用程序的最佳保护形式之一。幸运的是，Java 平台使您可以轻松地将身份验证添加到应用程序中。大多数应用服务器都有某种添加用户帐户的机制，这些帐户可用于访问部署在服务器域中的应用程序。GlassFish\
  \ 提供了将用户和组添加到不同安全域的功能，然后可以将这些域应用于应用程序以进行身份验证。\n\n■ **注意** 大多数应用服务器容器还允许与 LDAP 服务器或数据库连接，从而能够针对\
  \ LDAP 服务器内或存储在数据库表中的用户帐户进行身份验证，而不是在容器本身内进行。有关 LDAP 身份验证的示例，请阅读配方 15-6。\n\n将用户添加到\
  \ GlassFish 时，必须将其与安全域关联。默认安装中可使用 File 安全域，但如果需要，也可以创建更多安全域。将用户添加到域是一个相当简单的过程，可以按照本配方解决方案中提到的步骤添加单个用户。创建用户时，可以指定的选项之一是*组*。您可以将\
  \ GlassFish 用户组视为角色，因为多个用户可以属于一个组。\n\nGlassFish 不包含管理组本身的机制；实际上，对于 GlassFish 来说，组只是一个字符串值。但是，如果您按照配方\
  \ 15-2 中的步骤操作，您将看到可以在应用程序级别将组映射到角色。因此，如果 UserA 属于名为 standard 的组，那么 UserA 也可以属于名为\
  \ admin 的组。然后，应用程序可以根据用户所属的组或角色，授予 UserA 对应用程序不同部分的访问权限。\n\nGlassFish 中的用户很简单，因为它们仅用于已部署应用程序中的身份验证和访问目的。用户只能在每个服务器安装的基础上进行管理，因此它们有些笨重，因为它们无法跨服务器共享以提供单点登录解决方案。因此，建议仅将\
  \ GlassFish 用户用于较小的应用程序/环境或测试目的。对于更重要的企业级身份验证解决方案，数据库或 LDAP 用户帐户将是更好的选择。\n\n■ **注意**\
  \ 要了解在 GlassFish 应用服务器中配置基于表单的身份验证并使用数据库存储用户凭据，请参阅配方 15-4。\n\n15-2. 执行基本 Web 应用程序授权\n\
  \n问题\n\n您已在应用服务器容器内创建了用户并将其与组关联。现在，您希望根据用户对应用程序所需的访问级别将用户分配到特定角色，并为访问指定的应用程序视图应用基本身份验证机制。\n\
  \n解决方案 #1\n\n使用 Web 应用程序部署描述符中的基本身份验证配置基于表单的安全性。如果需要，在 glassfish-web.xml 部署描述符中将角色映射到组。以下摘录取自\
  \ JakartaEERecipes NetBeans 项目源的 web.xml 部署描述符。它演示了如何保护位于 chapter15 文件夹内的所有视图（由\
  \ web.xml 中的 url-pattern 元素确定），以便需要用户名和密码组合才能访问。web.xml 中的 auth-method 标签指定了将用于应用程序的身份验证类型。在示例中，您将使用\
  \ BASIC 身份验证。只有那些已在 GlassFish 文件域中配置了相应组的用户名和密码才能获得访问权限；在本例中，该角色是 users：\n\n<security-constraint>\n\
  \n<web-resource-collection>\n\n<web-resource-name>secured</web-resource-name>\n\n\
  <url-pattern>/faces/chapter15/*</url-pattern>\n\n<http-method>GET</http-method>\n\
  \n<http-method>POST</http-method>\n\n</web-resource-collection>\n\n<auth-constraint>\n\
  \n<role-name>users</role-name>\n\n</auth-constraint>\n\n<user-data-constraint>\n\
  \n<transport-guarantee>CONFIDENTIAL</transport-guarantee>\n\n</user-data-constraint>\n\
  \n</security-constraint>\n\n<login-config>\n\n<auth-method>BASIC</auth-method>\n\
  \n<realm-name>file</realm-name>\n\n</login-config>\n\n<security-role>\n\n<role-name>users</role-name>\n\
  \n</security-role>\n\n</web-app>\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n如果 `/webapp/WEB-INF/web.xml` 部署描述符中指定的角色名称与 GlassFish 中已关联用户的组名称相同，那么您就完成了。用户将根据组关联被授予对应用程序中已受保护区域的访问权限。但是，如果角色名称与已关联到用户的组不同，您可以通过在应用程序的\
  \ `/webapp/WEB-INF/glassfish-web.xml` 文件中指定 `security-role-mapping` 来手动将角色名称映射到组名称。\n\
  \n以下摘录自 JakartaEERecipes 应用程序的 `glassfish-web.xml` 配置文件，演示了如何将角色映射到 GlassFish 用户。在此例中，为\
  \ Recipe 15-1 中的账户指定的 `standard` 角色被映射到 `users` 角色。`users` 角色有权访问 `/faces/chapter15/*`\
  \ URL 模式：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE glassfish-web-app\
  \ PUBLIC \"-//GlassFish.org//DTD GlassFish Application Server 3.1 Servlet 3.0//EN\"\
  \n\"http://glassfish.org/dtds/glassfish-web-app_3_0-1.dtd\">\n<glassfish-web-app>\n\
  \    <security-role-mapping>\n        <role-name>users</role-name>\n        <group-name>standard</group-name>\n\
  \    </security-role-mapping>\n</glassfish-web-app>\n```\n\n![](img/index-596_1.jpg)\n\
  \n![](img/index-596_2.png)\n\n第 15 章 ■ Jakarta 安全性\n\n一旦所有配置完成，访问权限将根据 `web.xml`\
  \ 部署描述符中的配置进行授予。要测试身份验证机制，请将 JakartaEERecipes WAR 文件部署到您的 GlassFish 应用服务器，并访问以下\
  \ URL：`https://localhost:8080/JakartaEERecipes_Chapter15-1.0-SNAPSHOT/chapter15/index.xhtml`\n\
  \n您会看到您的请求现在被重定向到 HTTPS 端口 8181，因为我们在 `web.xml` 中将 `transport-guarantee` 设置为 `CONFIDENTIAL`：\n\
  \n```xml\n<user-data-constraint>\n    <transport-guarantee>CONFIDENTIAL</transport-guarantee>\n\
  </user-data-constraint>\n```\n\n您还会看到提示输入用户名和密码（图 15-6）以验证用户身份。\n\n***图 15-6.**\
  \ 页面 /chapter15/index.xhtml 的登录提示*\n\n**解决方案 #2**\n\n在类和类方法上使用注解，在应用程序中声明角色，以便根据需要访问受保护的页面。要对特定类或方法实施访问控制，请使用\
  \ `@DeclareRoles` 和/或 `@RolesAllowed` 进行注解，并指定可用于访问它们的角色。经过身份验证且属于指定角色之一的用户将被授予访问内容的权限。\n\
  \n在与本配方对应的示例中，`chapter15/recipe15_02.xhtml` Jakarta Server Faces 视图包含两个命令按钮，这些按钮调用托管\
  \ bean 中的操作。图 15-7 显示了此视图在浏览器中运行的情况。\n\n***图 15-7.** 页面 /chapter15/recipe15_02.xhtml\
  \ 的内容*\n\n![](img/index-597_1.jpg)\n\n![](img/index-597_2.jpg)\n\n第 15 章 ■ Jakarta\
  \ 安全性\n\n每个按钮在 bean 中调用不同的操作。其中一个按钮调用通过 `@RolesAllowed` 注解保护的方法，另一个则没有。图 15-8 显示了用户点击“受保护内容”后的视图。\n\
  \n***图 15-8.** 在 /chapter15/recipe15_02.xhtml 中点击“受保护内容”按钮后的输出*\n\n以下摘录自类 `org.jakartaeerecipe.chapter15.recipe15_02.Recipe15_02b`，它是包含从命令按钮调用的两个方法的托管\
  \ bean 控制器：\n\n```java\npublic class Recipe15_02b implements Serializable {\n\n\
  \    public String unsecuredProcess(){\n        return \"recipe15_02_1.xhtml\";\n\
  \    }\n\n    @RolesAllowed(\"users\")\n    public String securedProcess(){\n  \
  \      return \"recipe15_02_2.xhtml\";\n    }\n}\n```\n\n当单击调用 `securedProcess()`\
  \ 方法的 `commandButton` 时，如果用户尚未进行身份验证，系统将提示他们进行身份验证。身份验证提示如图 15-9 所示。\n\n***图 15-9.**\
  \ 配方 15-2 解决方案 #2 的登录提示*\n\n第 15 章 ■ Jakarta 安全性\n\n**工作原理**\n\n有几种方法可以使用基本应用服务器身份验证来保护应用程序。通常，应用程序通过使用\
  \ `web.xml` 部署描述符中的 XML 配置以及 `glassfish-web.xml` 部署描述符中的可选配置来提供基本身份验证安全性。也可以仅使用代码，通过声明式安全性将基本身份验证安全性添加到应用程序中。声明式安全性基于使用注解来声明访问应用程序类和方法的角色。虽然这两种技术在概念上非常相似，但每种技术在特定情况下都有其自身的一系列优势。\n\
  \n在本配方的解决方案 #1 中，使用 XML 配置来保护对应用程序特定文件夹内所有 Web 视图的访问。要通过 XML 配置文件添加安全性，需要在 `web.xml`\
  \ 部署描述符中添加 `security-constraint`、`login-config` 和 `security-role` 元素，以便将应用程序角色映射到\
  \ GlassFish 用户和组。`security-constraint` 元素包含几个子元素，用于告诉应用服务器容器要保护应用程序的哪些区域以及哪些账户能够访问这些受保护区域。首先，使用\
  \ `web-resource-collection` 元素来声明要保护的应用程序位置以及要保护的 HTTP 方法。以下元素应嵌入在 `web-resource-collection`\
  \ 元素中：\n\n*   `web-resource-name`：这是可以为受保护位置指定的可选名称。在配方解决方案中，指定了名称 `secured`。\n\
  *   `url-pattern`：这是用于确定应用程序哪些区域需要受保护的 URL 模式。星号 (`*`) 用作通配符。在配方解决方案中，`chapter15/*`\
  \ 指定了 `chapter15` 文件夹中包含的所有视图都应受到保护。如果要保护特定页面，则使用指向该页面的 URL 模式，包括页面名称。\n*   `http-method`：用于指定哪些\
  \ HTTP 方法在访问由 `url-pattern` 元素指定的位置时应受到保护。\n\n可以在 `security-constraint` 元素内声明的另一个子元素是\
  \ `auth-constraint` 元素。此元素通过添加 `role-name` 子元素，列出用于保护由 `url-pattern` 指定的位置的不同安全角色。在配方解决方案中，为应用程序声明了\
  \ `users` 角色。`user-data-constraint` 元素也可以作为子元素包含在 `security-constraint` 元素中，以指定在客户端和服务器之间传输数据时将应用的保护类型。在示例中，这被设置为\
  \ `CONFIDENTIAL`。可以为传输保证指定的值如下：\n\n*   `NONE`：数据不需要传输安全保护。\n*   `INTEGRAL`：数据在客户端和服务器之间的传输过程中不能被更改。\n\
  *   `CONFIDENTIAL`：外部实体无法观察传输的内容。在这种情况下将使用安全套接字层 (SSL)，并且必须在 Web 服务器中进行配置。\n\n`security-role`\
  \ XML 元素列出了可用于保护对应用程序页面访问的不同角色。为每个角色规范向 `security-role` 添加 `role-name` 子元素。`login-config`\
  \ XML 元素用于指定用于保护应用程序的身份验证方法。在大多数情况下，`auth-method` 应设置为 `BASIC`，但所有可能的值是 `BASIC`、`DIGEST`、`FORM`\
  \ 和 `CLIENT-CERT`。\n\n第 15 章 ■ Jakarta 安全性\n\n\n\n按照本节所述，将指定元素添加到 `web.xml` 部署描述符中，即可为应用程序提供足够的能力，通过用户凭证保护指定的安全位置。在某些情况下，在应用程序代码本身中使用注解来声明角色是合理的。对于此类情况，可以在类或方法上指定\
  \ `@DeclareRoles` 和 `@RolesAllowed` 注解。以下注解可用于在类中指定安全性。对于每个注解，可以指定单个角色或角色列表：\n\n\
  • `@DeclareRoles`：在类或方法级别指定，注解中应指明允许访问该类的每个角色。例如，可以使用以下语法为访问该类指定一个或多个角色：\n\n类级别：\n\
  \n@DeclareRoles(\"users\")\n\npublic class MyClass {\n\n...\n\n}\n\n方法级别：\n\npublic\
  \ class MyClass {\n\n...\n\n@DeclareRoles({\"role1\", \"role2\"})\n\npublic void\
  \ calculatePay(){\n\n...\n\n}\n\n...\n\n}\n\n• `@RolesAllowed`：在类或方法级别指定。注解中应指明允许访问该类或方法的角色列表。语法与\
  \ `@DeclareRoles` 相同。\n\n• `@PermitAll`：在类或方法级别指定。表示允许所有角色访问。\n\n• `@DenyAll`：在类或方法级别指定。表示不允许任何角色访问。\n\
  \n当 `@DeclareRoles` 和 `@RolesAllowed` 注解同时用于同一个类时，每个注解中列出的角色都允许访问该类。使用 `@RolesAllowed`\
  \ 为特定方法指定的访问角色会覆盖为访问整个类而列出的角色。\n\n可以通过调用 `SessionContext` 的 `isUserInRole()` 方法，以编程方式检查经过身份验证的用户属于哪些角色。这允许您使用条件逻辑来允许访问应用程序的功能，如下面的代码行所示：\n\
  \n@DeclareRoles({\"role1\", \"role2\", \"role3\"})\n\npublic class MyClass {\n\n\
  ...\n\n@RolesAllowed(\"role2\")\n\npublic void calculatePay(){\n\n...\n\n}\n\n@PermitAll\n\
  \npublic void calculatePay(){\n\n第 15 章 ■ Jakarta 安全性\n\nif (ctx.isUserInRole(\"\
  role1\")) {\n\n...\n\n} else if (ctx.isUserInRole(\"role3\")){\n\n...\n\n}\n\n}\n\
  \n...\n\n}\n\n15-3. 开发具有自定义身份验证验证的编程式登录表单\n\n问题\n\n您希望将 Jakarta Server Faces 应用程序保护给指定的用户组。此外，您希望创建一个自定义登录视图，该视图将用于将用户凭证传递给适当的业务对象进行身份验证。\n\
  \n解决方案\n\n开发一个登录表单，该表单包含用户名和密码的 `inputText` 字段，以及一个 `commandButton`，用于调用托管 Bean\
  \ 控制器中的编程式登录操作。在托管 Bean 控制器中开发用于验证用户身份的逻辑。在以下示例中，使用 Jakarta Server Faces 和 Facelets\
  \ 生成登录表单，并利用托管 Bean 进行身份验证控制。\n\n创建登录表单\n\n登录表单基本上与其他任何表单相同，不同之处在于它接受用户名和密码作为参数，并将它们传递给一个\
