  \ API 相同的结果。通过调用 `ConnectionFactory` 的 `createContext` 方法获得一个 `JMSContext` 对象，它可以用来启动一个方法调用链，最终仅用一行代码即可发送消息。分解来看，在获得\
  \ `JMSContext` 之后，可以调用其 `createProducer` 方法，并链式调用 `send` 方法，传递队列和要发送的消息。\n\n不同应用服务器产品之间的消息实现可能有所不同。然而，所有\
  \ JMS 消息类型都共享一些共同特征。例如，所有消息都实现 `jakarta.jms.Message` 接口。消息由标头、属性和正文组成。消息的标头包含客户端和提供者用于路由和标识的值，属性提供消息过滤，消息的正文部分承载实际的消息内容或有效载荷。消息标头用于将消息相互链接，一个名为\
  \ `JMSCorrelationID` 的字段包含此内容。消息对象支持应用程序定义的属性值。这些属性可以通过称为消息选择器的结构来设置，它们负责过滤消息。有关\
