  \n}\n\n}\n\n解决方案 #2\n\n利用 RESTful Web 服务为你的应用程序获取数据。如解决方案 #1 所述，创建实体类，将每个数据库表映射到对应的\
  \ Java 对象。实体类创建完成后，为每个实体类开发 REST 服务类。如果使用 Apache NetBeans 等 IDE，只需点击几下即可生成这些 RESTful\
  \ Web 服务，因为大多数 IDE 都提供了自动生成选项。否则，只需创建一个普通 Java 对象（POJO）并添加相应注解，即可开发 RESTful 服务类。\n\
  \n首先，创建一个新包，命名为 `org.jakartaeerecipe.bookstore.service`。接着，在新创建的包中创建 RESTful 类。在\
  \ Apache NetBeans IDE 中，右键点击该包，选择“新建…” ➤ “Web 服务” ➤ “来自实体类的 RESTful Web 服务”，然后点击“下一步”。当“来自实体类的新\
  \ RESTful Web 服务”对话框显示时，选择 `org.jakartaeerecipes.entity.BookAuthor` 类。在下一个界面中，将资源包修改为\
  \ `org.jakartaeerecipes.bookstore.service`，如图 5-7 所示。最后，点击“完成”创建该类。\n\n![](img/index-317_1.png)\n\
  \n第 5 章 ■ Jakarta MVC\n\n***图 5-7.** 在 Apache NetBeans IDE 中从实体类创建 RESTful Web 服务*\n\
  \n与 Jakarta Enterprise Beans 的创建类似，RESTful Web 服务的创建也提供了可用于对数据库执行创建、读取、更新和删除操作的方法。此外，由于这些方法被注解为\
  \ REST 服务，因此可以通过 REST 客户端调用它们。以下代码展示了 `BookAuthor` 实体的 RESTful Web 服务类。该类名为 `BookAuthorFacadeREST`\n\
  \n\n\n由 NetBeans IDE 生成，或者如果从头开始创建，也可以使用不同的名称：\n\npackage org.jakartaeerecipe.bookstore.service;\n\
  \nimport java.math.BigDecimal;\n\nimport java.util.List;\n\nimport jakarta.ejb.Stateless;\n\
  \nimport jakarta.persistence.*;\n\nimport jakarta.ws.rs.*;\n\nimport org.jakartaeerecipe.bookstore.entity.BookAuthor;\n\
  \n@Stateless\n\n@Path(\"org.jakartaeerecipe.bookstore.entity.bookauthor\")\n\npublic\
  \ class BookAuthorFacadeREST extends AbstractFacade<BookAuthor> {\n\n@PersistenceContext(unitName\
  \ = \"BookStore_1.0PU\")\n\nprivate EntityManager em;\n\n第 5 章 ■ Jakarta MVC\n\n\
  public BookAuthorFacadeREST() {\n\nsuper(BookAuthor.class);\n\n}\n\n@POST\n\n@Override\n\
  \n@Consumes({MediaType.APPLICATION_XML, MediaType.APPLICATION_JSON})\n\npublic void\
  \ create(BookAuthor entity) {\n\nsuper.create(entity);\n\n}\n\n@PUT\n\n@Path(\"\
  {id}\")\n\n@Consumes({MediaType.APPLICATION_XML, MediaType.APPLICATION_JSON})\n\n\
  public void edit(@PathParam(\"id\") BigDecimal id, BookAuthor entity) {\n\nsuper.edit(entity);\n\
  \n}\n\n@DELETE\n\n@Path(\"{id}\")\n\npublic void remove(@PathParam(\"id\") BigDecimal\
  \ id) {\n\nsuper.remove(super.find(id));\n\n}\n\n@GET\n\n@Path(\"{id}\")\n\n@Produces({MediaType.APPLICATION_XML,\
  \ MediaType.APPLICATION_JSON})\n\npublic BookAuthor find(@PathParam(\"id\") BigDecimal\
  \ id) {\n\nreturn super.find(id);\n\n}\n\n@GET\n\n@Override\n\n@Produces({MediaType.APPLICATION_XML,\
  \ MediaType.APPLICATION_JSON})\n\npublic List<BookAuthor> findAll() {\n\nreturn\
  \ super.findAll();\n\n}\n\n@GET\n\n@Path(\"{from}/{to}\")\n\n@Produces({MediaType.APPLICATION_XML,\
  \ MediaType.APPLICATION_JSON})\n\npublic List<BookAuthor> findRange(@PathParam(\"\
  from\") Integer from, @PathParam(\"to\") Integer to) {\n\nreturn super.findRange(new\
  \ int[]{from, to});\n\n}\n\n@GET\n\n@Path(\"count\")\n\n@Produces(MediaType.TEXT_PLAIN)\n\
  \npublic String countREST() {\n\nreturn String.valueOf(super.count());\n\n}\n\n\
  @Override\n\nprotected EntityManager getEntityManager() {\n\nreturn em;\n\n}\n\n\
  }\n\n第 5 章 ■ Jakarta MVC\n\n要了解更多关于生成 RESTful Web 服务及相关注解的信息，请参阅第 13 章。一旦创建了 RESTful\
  \ Web 服务，其他应用程序就可以调用它以获取各种格式的数据，包括 XML、JSON、纯文本或其他媒介。Jakarta MVC 应用程序可以利用 JAX-RS\
  \ 客户端调用 RESTful Web 服务来获取数据。\n\n这可以通过生成一个包含 Jakarta RESTful Web 服务客户端和 Web 服务调用的服务类来实现，以获取数据。\n\
  \n首先，在 `org.jakartaeerecipe.bookstore.service` 包中创建一个类，并将其命名为 `BookAuthorService`。这将是一个会话作用域的\
  \ CDI Bean（有关 CDI 的详细信息，请参阅第 11 章），它会在 Bean 构造时创建一个客户端，然后根据需要加载数据以供应用程序使用。在下一节介绍\
  \ Jakarta MVC 控制器的内容中，我将演示如何从控制器类中调用此服务类以获取数据。\n\n以下代码展示了 `BookAuthorService` 类的最终成品：\n\
  \npackage org.jakartaeerecipe.bookstore.service;\n\nimport java.util.List;\n\nimport\
  \ jakarta.annotation.PostConstruct;\n\nimport jakarta.enterprise.context.SessionScoped;\n\
  \nimport jakarta.ws.rs.client.*;\n\nimport jakarta.ws.rs.core.GenericType;\n\nimport\
  \ org.jakartaeerecipe.bookstore.entity.BookAuthor;\n\n@SessionScoped\n\npublic class\
  \ BookAuthorService implements java.io.Serializable {\n\nClient jaxRsClient;\n\n\
  private List<BookAuthor> bookAuthorList;\n\nfinal String hostUri = \"http://localhost:8080/BookStore/bookstore\"\
  ;\n\npublic BookAuthorService(){\n\n}\n\n@PostConstruct\n\npublic void init(){\n\
  \n// 构造一个 Jakarta RESTful Web 服务客户端\n\njaxRsClient = ClientBuilder.newClient();\n\
  \nloadData();\n\n}\n\nprivate void loadData(){\n\nbookAuthorList = jaxRsClient.target(hostUri\
  \ + \"/org.jakartaeerecipe.bookstore.\n\nentity.bookauthor/findAll\")\n\n.request(\"\
  application/xml\")\n\n.get(new GenericType<List<BookAuthor>>() {\n\n}\n\n);\n\n\
  }\n\n/**\n\n* @return bookAuthorList\n\n*/\n\npublic List<BookAuthor> getBookAuthorList()\
  \ {\n\n第 5 章 ■ Jakarta MVC\n\nif(bookAuthorList == null){\n\nloadData();\n\n}\n\n\
  return bookAuthorList;\n\n}\n\n/**\n\n* @param bookAuthorList\n\n*/\n\npublic void\
  \ setBookAuthorList(List<BookAuthor> bookAuthorList) {\n\nthis.bookAuthorList =\
  \ bookAuthorList;\n\n}\n\n}\n\n该服务类可用于加载数据并为我们的应用程序获取数据集。此类以后可以根据需要修改，以提供用于创建、更新和删除数据的\
  \ RESTful Web 服务方法。\n\n工作原理\n\n大多数企业应用程序都会处理数据。Jakarta MVC 应用程序也不例外，因为数据通常扮演着重要角色。为\
  \ Jakarta MVC 应用程序获取数据的方式与许多其他 Java Web 应用程序非常相似，RESTful Web 服务或 Jakarta Enterprise\
  \ Beans 是一些很好的选择。请记住，这些并不是将数据拉取到 Jakarta MVC 应用程序的唯一选择。由于 Jakarta MVC 框架提供了一种非常灵活的设计模式，它允许开发者在过程中做出多种选择。因此，当然也可以使用其他方法，例如\
  \ JDBC 或自建的数据访问对象（DAO）来协调与数据库的工作。本方案展示了两种最标准的方法。\n\nJakarta MVC 基于模型-视图-控制器（Model-View-Controller）设计模式，该模式将应用程序分为三个组件：模型（Model）、视图（View）和控制器（Controller）。\n\
  \n容器被注入到控制器中。控制器可以访问所有服务。它负责处理所有传入的请求，并将其映射到相应的操作。它还从模型中检索数据，并将其传递给视图。然后，视图使用这些数据生成响应，并发送回用户。\n\
  \n在解决方案 #1 中，我展示了如何基于现有（或新）数据库表创建实体类，然后编写一个 Jakarta Enterprise Beans 外观，与实体类协同工作以处理数据。这是迄今为止将数据强制转换为\
  \ Java 对象最标准的方法之一，其历史可以追溯到 J2EE 时代。在 J2EE 时代，开发人员需要编写重量级的 EJB 解决方案和大量的 XML 才能完成如今使用带有注解的简单\
  \ POJO 即可实现的功能。\n\n使用 Jakarta Enterprise Beans 与使用实体类将数据库表映射到 Java 对象是相辅相成的。要了解更多关于实体类的使用，请参阅第\
  \ 6 章，其中讨论了对象关系映射。一旦构建了实体类，就很容易创建一个 Jakarta Enterprise Beans，用于与实体类协同工作以编排数据。由于第\
  \ 8 章专门介绍了 Jakarta Enterprise Beans 的使用，您可以查阅该章以获取有关创建和使用它们的更多信息。本方案的重点是展示如何在 Jakarta\
  \ MVC 应用程序中使用这些选项。可以将 Jakarta Enterprise Beans 的使用与 Jakarta MVC 控制器类绑定，以根据需要获取和操作数据。在下一节中，您将了解更多关于\
  \ Jakarta MVC 控制器类的信息。\n\n第 5 章 ■ Jakarta MVC\n\n\n\n方案二展示了如何利用实体类将 Java 对象映射到数据库表，但改用\
  \ RESTful 服务类来获取数据。该方案演示了如何创建提供数据的 RESTful Web 服务，同时也展示了如何创建一个可用于调用 RESTful Web\
  \ 服务获取数据的 Jakarta RESTful Web Services 客户端服务类。在这两种方案中，Jakarta RESTful Web Services\
  \ 和 Web 服务客户端很可能不属于同一个应用程序。通常，一个应用程序或微服务会从数据库获取数据，并通过 Web 服务提供给其他消费者；而其他应用程序或微服务则作为消费者，使用\
  \ Jakarta RESTful Web Services 客户端从 Web 服务获取数据。我在此应用程序中同时演示 Web 服务和客户端，仅出于示例目的。\n\
  \n由于第 13 章完整介绍了 RESTful Web 服务，我将引导您参考该章节以获取更多信息。让我们聚焦于如何为我们的 MVC 应用程序使用 Jakarta\
  \ RESTful Web Services 客户端从 Web 服务中收集数据。通常，MVC 控制器（参见下一个方案）会调用 Jakarta RESTful Web\
  \ Services 客户端来获取应用程序所需的数据。在方案二中，创建了一个简单的客户端，用于从 Web 服务获取`BookAuthor`实体列表并将其加载到本地列表中。`BookAuthorService`类是一个会话作用域的\
  \ CDI Bean，因此它使用了`@SessionScoped`（`jakarta.enterprise.context.SessionScoped`）注解。由于此类可能需要保存到磁盘以存储会话数据，因此必须使其可序列化。接下来，声明一个`jakarta.ws.rs.client.Client`和一个`List<BookAuthor>`，以便创建客户端并将`BookAuthor`对象列表存储在会话中。该类应在\
  \ Bean 创建时创建客户端并加载数据，因此其中一个方法应使用`@PostConstruct`注解，以便在 Bean 构造时自动调用。在本例中，`init()`方法在构造时被调用，允许客户端向`org.jakartaeerecipe.bookstore.entity.bookauthor`\
  \ Web 服务发起 RESTful 服务调用，以获取所有记录并将其存储到`bookAuthorList`中。图 5-8 展示了 Jakarta MVC 框架的关键组件以及它们之间的交互方式。\n\
  \n![](img/index-322_1.png)\n\n第 5 章 ■ Jakarta MVC\n\n***图 5-8.** Jakarta MVC 的层次结构*\n\
  \n第 5 章 ■ Jakarta MVC\n\n尽管本方案不直接涉及 Jakarta MVC 应用程序方法论，但它是为应用程序获取数据这一拼图中的重要一环。在下一个方案中，我将直接深入探讨\
  \ Jakarta MVC 控制器类，它是 Jakarta MVC 应用程序业务逻辑的核心。\n\n5-3. 编写控制器类\n\n问题\n\n您希望为 Jakarta\
  \ MVC 应用程序编排导航和业务逻辑。\n\n解决方案\n\n开发 Jakarta MVC 控制器类，为应用程序提供业务逻辑和导航逻辑。首先，创建一个新包来存放应用程序的控制器。在本例中，我将包命名为`org.jakartaeerecipe.bookstore.controller`。同时，创建一个包来存放将用作应用程序内数据传输对象的类。将此包命名为`org.jakartaeerecipe.bookstore.container`。在创建控制器类之前，需要在新创建的`org.jakartaeerecipe.bookstore.container`包中创建一个容器，并将其命名为`BookAuthorContainer`。该类仅是一个会话作用域的\
  \ CDI Bean，用于持有`BookAuthor`对象的实例，并将其暴露给应用程序的 Web 视图。`BookAuthorContainer`的源代码应如下所示：\n\
  \n```java\npackage org.jakartaeerecipe.bookstore.container;\n\nimport java.util.List;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\n\nimport jakarta.inject.Inject;\n\
  \nimport jakarta.inject.Named;\n\nimport org.jakartaeerecipe.bookstore.entity.BookAuthor;\n\
  \n@Named\n\n@SessionScoped\n\npublic class BookAuthorContainer implements java.io.Serializable\
  \ {\n\n    private BookAuthor bookAuthor;\n\n    private List<BookAuthor> bookAuthorList;\n\
  \n    public BookAuthorContainer(){\n\n    }\n\n    // ... Getters and Setters ...\n\
  \n}\n```\n\n接下来，在`org.jakartaeerecipe.bookstore.controller`包中创建一个名为`BookAuthorController`的类，并使用`@Path(\"\
  /bookAuthor\")`和`@Controller`注解对该控制器类进行标注。然后，创建一个返回类型为`String`的公共方法，命名为`getBookAuthors`，该方法不接受任何参数。使用`@GET`注解标注该方法，并在该方法中查询数据以加载`BookAuthor`列表，最后返回字符串`\"\
  bookAuthor.jsp\"`。以下源代码展示了`BookAuthorController`类的代码：\n\n第 5 章 ■ Jakarta MVC\n\n\
  ```java\npackage org.jakartaeerecipe.bookstore.controller;\n\nimport java.util.List;\n\
  \nimport jakarta.inject.Inject;\n\nimport jakarta.ws.rs.Path;\n\nimport jakarta.mvc.annotation.Controller;\n\
  \nimport jakarta.ws.rs.GET;\n\nimport org.jakartaeerecipe.bookstore.entity.BookAuthor;\n\
  \nimport org.jakartaeerecipe.bookstore.service.BookAuthorService;\n\n@Path(\"/bookAuthor\"\
  )\n\n@Controller\n\npublic class BookAuthorController {\n\n    @Inject\n    private\
  \ BookAuthorService bookAuthorService;\n\n    public BookAuthorController(){\n \
  \   }\n\n    @GET\n    public String getBookAuthors(){\n        // 获取作者列表\n    \
  \    return \"bookAuthor.jsp\";\n    }\n}\n```\n\n如果加载了包含`@Path`注解所指示路径的 URI，则会加载`bookAuthor.jsp`视图。\n\
  \n工作原理\n\nJakarta MVC 控制器类用于将业务逻辑绑定到视图，并处理请求和响应。控制器类是 CDI 控制器，包含多个注解，因为 Jakarta\
  \ MVC 控制器外观基于 Jakarta RESTful Web Services API。每个控制器类都通过`jakarta.mvc.annotation.Controller`注解进行标识。`jakarta.ws.rs.Path`注解应用于控制器类级别，以指示将通过\
  \ Web 应用程序访问控制器类方法的 URI。例如，由于只有一个方法，该控制器类可以通过匹配以下格式的 URI 进行访问：\n\n`http://localhost:8080/BookStore/controller/bookAuthor`\n\
  \n需要注意的是，控制器类的注解方式与 Jakarta RESTful Web Services 类相同。Jakarta MVC 框架中的控制器是使用与实现 Jakarta\
  \ RESTful Web 服务类相同的注解来实现的。也就是说，当使用上述 URI 访问应用程序时，由于应用程序路径为`/BookStore/`，且匹配的`@Path`注解指定了`/bookAuthor`作为匹配路径，因此会调用`BookAuthor`\
  \ CDI 控制器。调用时，GET 请求由`getBookAuthors()`方法处理，因为该方法使用了`@GET`注解且未指定路径。`@GET`注解用于指示\
  \ HTTP GET 方法。由于此控制器只有一个使用`@GET`注解的控制器方法，因此默认路径将调用该唯一方法。如果控制器中有多个方法，则每个方法还需要使用`@Path`注解来指示调用每个方法所需的子路径。Jakarta\
  \ MVC 控制器应利用其他 HTTP 方法，例如`@PUT`和`@POST`，用于在数据库中插入或更新记录。\n\n第 5 章 ■ Jakarta MVC\n\
  \n在示例中，当调用`getBookAuthors()`方法时，会调用`BookAuthorService`，进而调用`getBookAuthorList()`方法并加载本地的`bookAuthors`列表。接下来，加载到列表中的数据将通过视图进行访问。本方案省略了数据加载过程，但将在方案\
  \ 5-5 中更详细地介绍。\n\n\n\n最后需要注意的一个重要细节是，`getBookAuthorList()` 方法的返回值是响应返回后将要渲染的下一个视图。控制器方法的默认返回类型是\
  \ `text/html`，但可以通过 `@Produces` 注解进行更改。控制器方法返回的字符串即为视图路径。在本例中，接下来将加载 `bookAuthor.jsp`\
  \ 视图。可以通过多种方式提供到下一个视图的导航，而返回下一个视图的名称是第一种技术。\n\n控制器方法也可以将返回类型设为 `void`，在这种情况下，该方法必须使用\
  \ `@View(\"returnViewName\")` 注解。如下所示，基于字符串的视图名称作为属性传递给该注解。这种技术可以轻松地将导航逻辑与业务逻辑分离：\n\
  \n```java\n@GET\n@View(\"bookAuthor.jsp\")\npublic void getBookAuthors(){\n    //\
  \ 获取作者信息\n}\n```\n\n下一种技术涉及返回一个 `Viewable` 对象，代码如下所示。`Viewable` 提供了灵活性，尤其是在希望实现非标准视图引擎的情况下：\n\
  \n```java\n@GET\npublic Viewable getBookAuthors(){\n    // 获取作者信息\n    return new\
  \ Viewable(\"bookAuthor.jsp\");\n}\n```\n\n控制导航的最后一种技术是返回一个响应对象，该对象提供了大量信息，因为它可以根据不同情况包含不同的响应码：\n\
  \n```java\n@GET\npublic Response getBookAuthors(){\n    // 获取作者信息\n    return Response.status(Response.Status.OK).entity(\"\
  bookAuthor.jsp\").build();\n}\n```\n\n如前所述，Jakarta MVC 控制器类与 Jakarta RESTful Web\
  \ Services 类非常相似，因为它们都使用常见的注解。在示例中，控制器类仅用作 Jakarta MVC 控制器，但控制器类也可以成为混合类，同时包含 Jakarta\
  \ RESTful Web Services 方法。为此，需要将 `@Controller` 注解移动到每个 Jakarta MVC 方法上，而不是放在类级别。`jakarta.mvc.annotation.View`\
  \ 注解也可以应用于类级别或方法级别。如前所述，它指向控制器方法的视图。\n\n控制器方法定义了 Jakarta MVC 应用程序的业务逻辑。控制器利用注解并为请求-响应生命周期提供支持。最后，控制器负责返回响应，包括向应用程序视图返回数据。\n\
  \n第 5 章 ■ Jakarta MVC\n\n5-4. 使用模型向视图公开数据\n\n问题\n\n您希望从数据源获取数据，并使其在应用程序视图中可用。\n\n\
  解决方案\n\n在控制器类中注入并使用 Models API。在以下示例中，当访问控制器的 URI 路径时，会调用 `getBookAuthors()` 方法，该方法从\
  \ Web 服务获取数据（更多信息请参见配方 5-2），并使用模型填充数据以供视图使用：\n\n```java\npackage org.jakartaeerecipe.bookstore.controller;\n\
  \nimport java.util.List;\nimport jakarta.inject.Inject;\nimport jakarta.mvc.Models;\n\
  import jakarta.ws.rs.Path;\nimport jakarta.mvc.annotation.Controller;\nimport jakarta.ws.rs.GET;\n\
  import org.jakartaeerecipe.bookstore.entity.BookAuthor;\nimport org.jakartaeerecipe.bookstore.service.BookAuthorService;\n\
  \n@Path(\"/bookAuthor\")\n@Controller\npublic class BookAuthorController {\n\n \
  \   @Inject\n    private Models models;\n\n    @Inject\n    private BookAuthorService\
  \ bookAuthorService;\n\n    public BookAuthorController(){\n    }\n\n    @GET\n\
  \    public String getBookAuthors(){\n        List<BookAuthor> bookAuthors = bookAuthorService.getBookAuthorList();\n\
  \        models.put(\"bookauthors\", bookAuthors);\n        return \"bookAuthor.jsp\"\
  ;\n    }\n}\n```\n\n包含在 `bookAuthor.jsp` JSP 视图中的 JSP 视图标记如下所示：\n\n```jsp\n<%@ page\
  \ contentType=\"text/html;charset=UTF-8\" language=\"java\" %>\n<%@ taglib prefix=\"\
  c\" uri=\"http://java.sun.com/jsp/jstl/core\" %>\n<!DOCTYPE html>\n<html>\n<head>\n\
  <meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\">\n```\n\n\
  \n<title>使用 JSP 视图的 Jakarta MVC 示例</title>\n\n</head>\n\n![](img/index-327_1.jpg)\n\
  \n第 5 章 ■ Jakarta MVC\n\n<body>\n\n<h1>图书作者</h1>\n\n<table class=\"table table-striped\"\
  >\n\n<colgroup>\n\n<col style=\"width: 80%;\" />\n\n</colgroup>\n\n<thead>\n\n<tr>\n\
  \n<th class=\"text-left\">作者</th>\n\n</tr>\n\n</thead>\n\n<tbody>\n\n<c:forEach\
  \ var=\"bookAuthor\" items=\"${bookauthors}\">\n\n<tr>\n\n<td class=\"text-center\"\
  >\n\n${bookAuthor.last}\n\n</td>\n\n</tr>\n\n</c:forEach>\n\n</tbody>\n\n</table>\n\
  \n</body>\n\n</html>\n\n通过在浏览器中打开 URL http://localhost:8080/JakartaEE_Chapter05-1.0-SNAPSHOT/views/bookAuthor.xhtml\
  \ 即可执行该代码。给定示例数据集后，简单视图的结果将如图 5-9 所示。\n\n***图 5-9.** bookAuthor.jsp 结果示例*\n\n工作原理\n\
  \nModels API 必须包含在 Jakarta MVC 框架的每个实现中。本质上，Models API 提供了一个 `jakarta.mvc.Models`\
  \ 映射，用于存储带有键标识符的数据集，作为键/值对暴露给下一个渲染的视图。Models API 的 `HashMap` 遵循以下格式：\n\nMap<String,\
  \ Object> model = new HashMap<String, Object>();\n\n第 5 章 ■ Jakarta MVC\n\n在示例中，Models\
  \ 映射通过 CDI `@Inject` 注入到控制器类中。注入后，模型可用于存储待暴露的数据。一个 `List<BookAuthor>` 被放入 Models\
  \ 映射中，如下所示：\n\nmodels.put(\"bookauthors\", bookAuthors);\n\n模型通过 `bookauthors` 键暴露给视图。在示例\
  \ JSP 视图中，`${bookauthors}` 表达式在 JSTL `c:if` 标签内使用，以在表格中显示记录：\n\n<c:forEach var=\"\
  bookAuthor\" items=\"${bookauthors}\">\n\n<tr>\n\n<td class=\"text-center\">\n\n\
  ${bookAuthor.last}\n\n</td>\n\n</tr>\n\n</c:forEach>\n\n如示例所示，Models API 非常易于使用。然而，它并非暴露数据的首选方法，因为\
  \ CDI 更受青睐。通常首选 CDI，因为它比 Models API 提供了更大的灵活性。配方 5-5 将深入探讨如何利用 CDI Bean 来暴露数据。\n\
  \n5-5. 利用 CDI 暴露数据\n\n问题\n\n您希望将数据从控制器暴露到视图中，但不想使用 Jakarta MVC Models 来实现。相反，您希望利用\
  \ CDI 的强大功能将数据暴露给视图。\n\n解决方案\n\n利用 CDI 模型将数据返回给视图。使用 CDI 是将数据暴露给视图的首选技术。在本配方中，一个\
  \ CDI Bean 被注入到控制器中，然后用于存储数据。该 CDI Bean 是会话作用域的，因此放入 Bean 中的数据将在整个 Web 会话期间持续存在。以下代码是用于暴露数据的\
  \ CDI Bean：\n\npackage org.jakartaeerecipe.bookstore.container;\n\nimport java.util.List;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\n\nimport jakarta.inject.Named;\n\
  \nimport org.jakartaeerecipe.bookstore.entity.Book;\n\n@Named\n\n@SessionScoped\n\
  \npublic class BookContainer implements java.io.Serializable {\n\nprivate Book book;\n\
  \nprivate List<Book> bookList;\n\npublic BookContainer(){\n\n}\n\n第 5 章 ■ Jakarta\
  \ MVC\n\n...\n\n// Getters and setters\n\n...\n\n}\n\n接下来，控制器类利用 CDI Bean 存储数据并使其对视图可用：\n\
  \n@Path(\"/book\")\n\n@Controller\n\npublic class BookController {\n\n@Inject\n\n\
  private BookContainer bookContainer;\n\npublic BookController() {\n\n}\n\n/**\n\n\
  * 使用 <code>BookService</code> 查询所有图书，然后\n\n* 返回到 <code>book.jsp</code> JSP 页面。\n\
  \n* @return\n\n*/\n\n@GET\n\npublic String getBooks(){\n\nBook book = new Book();\n\
  \nbook.setTitle(\"Jakarta EE Recipes\");\n\nbookContainer.setBook(book);\n\nreturn\
  \ \"book.jsp\";\n\n}\n\n以下是 `book.jsp` 视图的标记。从示例中可以看出，该视图简单地显示了加载到 CDI Bean 中的图书名称：\n\
  \n<%@page contentType=\"text/html\" pageEncoding=\"UTF-8\"%>\n\n<!DOCTYPE html>\n\
  \n<html>\n\n<head>\n\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"\
  >\n\n<title>Jakarta EE Recipes：配方 5-5</title>\n\n</head>\n\n<body>\n\n<h1>图书列表</h1>\n\
  \n在 BookController 中加载的图书：${bookContainer.book.title}\n\n\n\n</body>\n\n</html>\n\
  \n要执行此代码，请在浏览器中打开 http://localhost:8080/JakartaEERecipes_Chapter05-1.0-SNAPSHOT/views/bookAuthor.jsp。图\
  \ 5-10 展示了本秘籍中提供的代码的输出结果。\n\n![](img/index-330_1.png)\n\n第 5 章 ■ Jakarta MVC\n\n\
  ***图 5-10.** book.jsp 结果示例*\n\n工作原理\n\n向 Jakarta MVC 应用程序的 Web 视图公开数据的首选技术是利用上下文和依赖注入（CDI）Bean。CDI\
  \ 是一种将许多 Java EE 和 Jakarta EE 技术绑定在一起的规范。CDI 是一个包含许多细节的大型规范，但对该规范的深入解释超出了本秘籍的范围。有关\
  \ CDI 的更多详细信息，请参阅第 11 章。CDI 的功能之一是连接 Bean，从而有效地使数据和作用域能够在类之间以及应用程序的后端和前端视图之间共享。\n\
  \n就 Jakarta MVC 框架而言，其核心关注点之一是在后端代码和前端视图之间共享上下文对象的能力。在这个简单的示例中，CDI Bean 只是一个名为 `BookContainer`\
  \ 的 `SessionScoped` 容器。如代码所示，`BookContainer` 类使用了 `@Named` 注解，这将其标记为 CDI Bean，并使其能够通过使用首字母小写的类名注入到其他类中。在这种情况下，该\
  \ Bean 将通过名称 `bookContainer` 进行注入。`@Named` 注解接受一个基于字符串的别名，可以在注入时从视图中调用该类。`BookContainer`\
  \ 类还使用了 `@SessionScoped` 注解，该注解定义了 Bean 的作用域。其他可用的作用域选项包括 `@RequestScoped`、`@ApplicationScoped`\
  \ 和 `@ConversationScoped`。\n\n`BookController` 通过使用 `@Inject` 注解注入 Bean 的实例，从而利用该\
  \ Bean 的上下文代理。该 Bean 在 `getBooks()` 方法中使用，因为它接受一个已填充了标题和描述的 `Book` 实例。也可以在 CDI Bean\
  \ 中定义不同的类字段，并直接向其中填充数据，以将其公开给视图或其他类。一旦数据被填充，就可以使用表达式语言从视图中访问 `BookController` Bean，或者将同一个\
  \ Bean 实例注入到另一个类中并使其可访问。在此示例中，控制器方法 `getBooks()` 仅返回要加载的下一个视图的名称 `books.jsp`。`books.jsp`\
  \ JSP 视图通过注入名称 `${bookContainer.book.title}` 引用 Bean 来访问书籍的标题。\n\nCDI 对于管理 Jakarta\
  \ EE 应用程序中类的上下文实例非常强大。在 Jakarta MVC 应用程序中使用 CDI 将数据公开给视图，可以实现与使用 Models API 相同的功能，并且如果需要，还允许在其他类中使用这些数据。\n\
  \n第 5 章 ■ Jakarta MVC\n\n5-6. 向用户提供消息反馈\n\n问题\n\n您希望在请求处理后向用户显示反馈。\n\n解决方案\n\n利用\
  \ CDI Bean，以屏幕上显示的消息形式轻松地向用户提供反馈。在以下场景中，书店中的所有书籍都会被加载并显示在 `book.jsp` 视图中。一个名为 `Messages`\
  \ 的 `RequestScoped` CDI Bean 用于封装存储信息或错误消息的逻辑。在控制器类中，使用 `info` 字段将一条指示已加载书籍数量的消息设置到\
  \ Bean 中。然后，该 Bean 可在视图中显示。\n\n首先，来看一下名为 `Messages` 的 CDI Bean：\n\n```java\npackage\
  \ org.javaee8recipes.bookstore.container;\n\nimport jakarta.enterprise.context.RequestScoped;\n\
  \nimport jakarta.inject.Named;\n\nimport java.util.ArrayList;\n\nimport java.util.Collections;\n\
  \nimport java.util.List;\n\n/**\n```\n\n\n* 该类封装了向用户显示的消息。可以有一条\n\n* 信息消息和多条错误消息。控制器可以使用此类\n\
  \n* 来排队等待渲染的消息。该类展示了如何将命名的 CDI Bean\n\n* 用作视图的模型。是否在规范中包含类似这样的类\n\n* 尚未决定。\n\n*/\n\
  \n@Named\n\n@RequestScoped\n\npublic class Messages {\n\nprivate String info;\n\n\
  private final List<String> errors = new ArrayList<>();\n\npublic Messages addError(String\
  \ error) {\n\nerrors.add(error);\n\nreturn this;\n\n}\n\npublic List<String> getErrors()\
  \ {\n\nreturn Collections.unmodifiableList(errors);\n\n}\n\npublic String getInfo()\
  \ {\n\nreturn info;\n\n}\n\npublic void setInfo(String info) {\n\nthis.info = info;\n\
  \n}\n\n}\n\n第 5 章 ■ Jakarta MVC\n\n用于加载图书列表并提供消息的控制器类代码如下：\n\n@Inject\n\nprivate\
  \ Messages messages;\n\n...\n\n@GET\n\n@Path(\"/books\")\n\npublic String displayBookListing()\
  \ {\n\nbookList = bookService.getBookList();\n\nbookContainer.setBookList(bookList);\n\
  \nmessages.setInfo(\"There are \" + bookList.size() + \" books in the library.\"\
  ); return \"book.jsp\";\n\n}\n\n随后的 book.jsp 视图标记如下：\n\n<%@page contentType=\"text/html\"\
  \ pageEncoding=\"UTF-8\"%>\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<meta http-equiv=\"\
  Content-Type\" content=\"text/html; charset=UTF-8\">\n\n<link href=\"${pageContext.request.contextPath}/webjars/bootstrap/3.3.4/dist/css/\n\
  \nbootstrap.css\" rel=\"stylesheet\">\n\n<script src=\"${pageContext.request.contextPath}/webjars/bootstrap/3.3.4/dist/js/\n\
  \nbootstrap.js\"></script>\n\n<title>Jakarta EE 实战指南</title>\n\n</head>\n\n<body>\n\
  \n<h1>图书列表</h1>\n\n在 BookController 中加载的图书：${bookContainer.book.title}\n\n<br/><br/>\n\
  \n<c:if test=\"${messages.info != null}\">\n\n<div class=\"alert alert-success\"\
  \ role=\"alert\">\n\n${messages.info}\n\n</div>\n\n</c:if>\n\n<c:if test=\"${not\
  \ empty messages.errors}\">\n\n<div class=\"alert alert-danger\" role=\"alert\"\
  >\n\n<ul class=\"list-unstyled\">\n\n<c:forEach var=\"error\" items=\"${messages.errors}\"\
  >\n\n<li>${error}</li>\n\n</c:forEach>\n\n</ul>\n\n</div>\n\n</c:if>\n\n<br/>\n\n\
  <table class=\"table table-striped\">\n\n<colgroup>\n\n<col style=\"width: 80%;\"\
  \ />\n\n</colgroup>\n\n![](img/index-333_1.jpg)\n\n第 5 章 ■ Jakarta MVC\n\n<thead>\n\
