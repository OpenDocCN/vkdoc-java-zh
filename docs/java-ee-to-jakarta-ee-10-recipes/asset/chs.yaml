  \ 对象的 `executeUpdate` 方法。如果删除成功，将返回一个整数值，指明已删除的行数。否则，如果删除失败，将返回零，或者抛出 `SQLException`\
  \ 异常，表明语句或数据库连接存在问题。\n\n几乎每个数据库应用程序都会在某个时刻使用至少一种 CRUD 操作。如果你在 Java 应用程序中处理数据库，这是你需要了解的一项基本\
  \ JDBC 知识。即使你不直接使用 JDBC API，了解这些基础知识也是有益的。\n\n6-8. 防止 SQL 注入\n\n问题\n\n你的应用程序执行数据库任务。为了降低\
  \ SQL 注入攻击的风险，你需要确保没有未经过滤的文本字符串被附加到 SQL 语句中并针对数据库执行。\n\n■ **提示** 预编译语句不仅提供针对 SQL\
  \ 注入攻击的保护。它们还提供了一种集中化并更好地控制应用程序内所用 SQL 的方法，并带来性能上的好处。与其创建同一查询的多个可能不同的版本，不如将查询创建为一次预编译语句，然后从代码中的许多不同位置调用它。对查询逻辑的任何更改只需在准备该语句的地方进行即可。\n\
