  \ SQL 更新语句。接着，要执行更新操作，需将该 SQL 字符串传递给 `Statement` 对象的 `executeUpdate` 方法。如果更新成功执行，将返回一个整数值，指明已更新的记录数。如果更新操作未成功执行，则可能返回零，或者抛出\
  \ `SQLException` 异常，表明语句或数据库连接存在问题。\n\n本方案涵盖的最后一个数据库操作是删除操作。方案中的 `performDelete`\
