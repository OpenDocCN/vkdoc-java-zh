  \n***图 2-9.** Jakarta Server Pages 配方 02-08a 输出*\n\n***图 2-10.** Jakarta Server\
  \ Pages 配方 02-08b 输出*\n\n2-9. 创建自定义 Jakarta Server 标签\n\n问题\n\n您希望创建一个 Jakarta Server\
  \ 标签，为您的应用程序提供自定义功能。\n\n解决方案\n\n使用 Jakarta Server 2.0 *简单标签支持* 创建自定义 Jakarta Server\
  \ 标签。假设您想创建一个自定义标签，该标签会在放置标签的 Jakarta Server 页面中插入一个签名。该自定义标签将打印一个默认签名，但它也接受一个 authorName\
  \ 属性，如果提供了该属性，则会在签名中包含指定的作者姓名。首先，您需要定义一个继承 SimpleTagSupport 类的 Java 类。该类将为您的标签提供实现。以下代码是一个名为\
  \ Signature 的类的实现，它为自定义标签提供了实现：81\n\n第 2 章 ■ Jakarta Server Pages\n\npackage org.jakartaeerecipe.chapter02.recipe02_09;\n\
  \nimport jakarta.servlet.jsp.JspException;\n\nimport jakarta.servlet.jsp.JspWriter;\n\
  \nimport jakarta.servlet.jsp.PageContext;\n\nimport jakarta.servlet.jsp.tagext.SimpleTagSupport;\n\
  \npublic class Signature extends SimpleTagSupport {\n\nprivate String authorName\
  \ = null;\n\n/**\n\n* @param authorName 要设置的 authorName\n\n*/\n\npublic void setAuthorName(String\
  \ authorName) {\n\nthis.authorName = authorName;\n\n}\n\n@Override\n\npublic void\
  \ doTag() throws JspException {\n\nPageContext pageContext = (PageContext) getJspContext();\n\
  \nJspWriter out = pageContext.getOut();\n\ntry {\n\nif(authorName != null){\n\n\
  out.println(\"Written by \" + authorName);\n\nout.println(\"<br/>\");\n\n}\n\nout.println(\"\
  Published by Apress\");\n\n} catch (Exception e) {\n\nSystem.out.println(e);\n\n\
  }\n\n}\n\n}\n\n以下是此项目的文件夹结构：\n\n├── src\n\n│ └── main\n\n│ └── java\n\n│ │ └── org\n\
