  }\n\n}\n\n从示例中可以看出，一个 Jakarta Server Faces CDI 控制器客户端也可以与另一个 Jakarta Server Faces\
  \ CDI 控制器客户端协同工作，因为 `BookController` 类为 `AuthorController` CDI 控制器声明了一个变量，并将其注入到该类中。Jakarta\
  \ Server Faces 视图可以直接与 Bean 中的方法进行交互，从而可以轻松地利用数据库中的信息形成 Web 视图的完整周期。\n\n![](img/index-435_1.jpg)\n\
  \n第 8 章 ■ Jakarta 企业 Bean\n\n工作原理\n\nJakarta 企业 Bean 是应用程序中用于直接与数据库对象交互的类。\n\nJakarta\
  \ Server Faces Web 视图和桌面 Java 客户端无法直接与 Jakarta 企业 Bean 的方法交互，因为这些方法位于应用服务器上。因此，Jakarta\
  \ 企业 Bean 必须提供一种方式，让客户端能够与其方法通信，无论该客户端与 Jakarta 企业 Bean 本身位于同一容器中，还是位于远程位置。\n\n\
  在大多数已开发的 Jakarta EE 应用程序中，会使用诸如 Jakarta Server Faces 之类的 Web 框架与 Jakarta 企业 Bean\
  \ 协同工作，以操作或读取数据源中的数据。此类客户端与 Jakarta 企业 Bean 池所在的容器是本地关系，因此它们会通过本地业务接口访问 Jakarta\
  \ 企业 Bean。\n\n■ **注意** 起初，本地客户端的概念可能难以理解，因此我将尝试更详细地解释。典型的 Jakarta Server Faces 应用程序利用本地客户端（即上下文和依赖注入（CDI）控制器类）来直接与\
  \ Jakarta 企业 Bean 交互。虽然 Web 应用程序的用户位于 Jakarta 企业 Bean 服务器容器的远程位置，但他们使用的是浏览器中由 Jakarta\
  \ Server Faces 视图生成的 HTML 页面，而这些视图直接与控制器交互。这几乎就像视图直接绑定到控制器上，而控制器通常与 Jakarta 企业 Bean\
  \ 位于同一容器中。图 8-1 展示了这种关系是如何工作的。\n\n\n\n***图 8-1.** HTML 客户端（Jakarta Server Faces\
  \ 视图）与 Jakarta 企业 Beans 的关系* 自 EJB 3.1+ 起，本地客户端已能够利用“无接口”业务视图来访问公开的 Jakarta 企业 Beans\
  \ 方法，从而免去了 Jakarta 企业 Beans 实现接口的需要。使用无接口视图技术能让开发者更高效，因为需要维护的 Java 文件减少了一个（无需接口），并且工作流程变得更易理解，因为本地客户端可以直接与\
  \ Jakarta 企业 Beans 交互，而无需通过接口。远程客户端（例如在远程应用服务器容器中运行的 Java 类）无法使用无接口视图，因此在这种情况下仍然需要\
  \ `@Remote` 业务接口。\n\n该解决方案演示了如何使用无接口视图，让 Jakarta Server Faces CDI 控制器能够与公开声明的 Jakarta\
  \ 企业 Beans 方法协同工作。要通过依赖注入获取 EJB 无接口视图的引用，请使用 `jakarta.naming.EJB` 注解，并声明企业 Bean\
  \ 的实现类。以下代码摘录自解决方案中的 CDI 控制器，演示了依赖注入技术：\n\n@EJB\n\nBookFacade ejbFacade;\n\n第 8\
  \ 章 ■ Jakarta 企业 Beans\n\n也可以使用 JNDI 对 Jakarta 企业 Beans 执行查找，而非使用依赖注入，尽管这种情况很少需要。为此，请使用\
  \ `jakarta.naming.InitialContext` 接口的 `lookup` 方法执行 JNDI 查找，如下所示：\n\nBookFacade\
  \ ejbFacade = (BookFacade)\n\nInitialContext.lookup(\"java:module/BookFacade\");\n\
  \n■ **注意** Jakarta 企业 Beans 允许开发者专注于应用功能，而无需担心生命周期和资源处理。容器负责管理生命周期和资源。\n\n8-5. 持久化对象\n\
  \n问题\n\n你希望在 Java 企业应用中持久化一个对象。换句话说，你希望在应用使用的某个数据库表中创建一条新的数据库记录。\n\n解决方案\n\n使用方案\
  \ 8-1 中提供的某个方法创建一个 `EntityManager` 对象，然后调用其 `persist()` 方法，并传入你想要持久化的对象。以下代码行演示了如何使用\
  \ `EntityManager` 将对象持久化到数据库。在此例中，一个 `Book` 对象被持久化到 `BOOK` 数据库表中。此摘录取自 `BookFacade`\
  \ 会话 Bean：\n\n...\n\n@PersistenceContext(unitName = \"JakartaEERecipes\")\n\nprivate\
  \ EntityManager em;\n\n...\n\nem.persist(book);\n\n...\n\n工作原理\n\n实体对象的持久化发生在 Jakarta\
  \ 企业 Beans 类中。要将对象持久化到底层数据存储并进行管理，请调用 `EntityManager` 对象的 `persist()` 方法。你必须向 `persist()`\
  \ 方法传递一个有效的实体对象，并且该对象在数据库中尚不存在，这意味着它必须具有唯一的主键。\n\n在使用 `persist()` 方法时，可能会抛出几种不同的异常，这些异常有助于你确定正在发生的问题。`EntityExistsException`\
  \ 顾名思义，如果正在持久化的实体的主键已存在，则会抛出该异常。然而，在某些情况下，会在刷新或提交时抛出 `PersistenceException`，因此在调用\
  \ `persist` 时，你应该捕获这些异常中的每一个。如果你尝试持久化的对象不是实体，则会抛出 `IllegalArgumentException`。最后，如果在类型为\
  \ `PersistenceContextType.TRANSACTION` 的容器管理实体管理器上调用，并且没有进行事务处理，则会抛出 `TransactionRequiredException`。\n\
  \n第 8 章 ■ Jakarta 企业 Beans\n\n8-6. 更新对象\n\n问题\n\n实体对象的内容已被更改，你希望将更新持久化到底层数据源。\n\n\
  解决方案\n\n\n\n使用配方 8-1 中提供的任一解决方案创建一个 `EntityManager` 对象，然后调用该对象的 `merge()` 方法，并传入一个已填充数据且需要更新的实体对象。以下代码行演示了如何使用\
  \ `EntityManager` 将对象持久化到数据库。在此示例中，一个 `Book` 对象正在 `BOOK` 数据库表中被更新。此摘录取自 `BookFacade`\
  \ 会话 Bean：\n\n...\n\n@PersistenceContext(unitName = \"JakartaEERecipes\")\n\nprivate\
  \ EntityManager em;\n\n...\n\nem.merge(book);\n\n...\n\n■ **注意** 如果被持久化的实体对象（数据库记录）在表中尚不存在，它将被存储为一个新持久化的对象，而不是被更新。\n\
  \n工作原理\n\n负责更新底层数据存储中实体对象的代码实现位于 Jakarta Enterprise Beans 类中。必须有一个有效的 `EntityManager`\
  \ 对象可供使用，然后可以调用该对象的 `merge()` 方法，并传入一个有效的实体对象以在底层数据存储中进行更新。完成此操作后，实体对象的状态将被合并到数据存储中，底层数据也会相应更新。\n\
  \n尝试合并数据时可能会抛出两种异常。如果被合并的实例不是实体（数据库表不存在）或是一个已被移除的实体，则可能抛出 `IllegalArgumentException`。如果在类型为\
  \ `PersistenceContextType.TRANSACTION` 的容器管理实体管理器上调用 `merge()` 方法，且没有事务存在，则可能抛出\
  \ `TransactionRequiredException`。\n\n8-7. 返回数据以在表格中显示\n\n问题\n\n您希望通过 Jakarta Server\
  \ Faces 的 `dataTable` 显示数据库表的内容。\n\n第八章 ■ Jakarta Enterprise Beans\n\n解决方案 #1\n\n\
  从包含您要显示内容的底层表中返回一个实体对象列表。将 Jakarta Server Faces 的 `dataTable` 组件值映射到一个包含对象列表的上下文和依赖注入（CDI）控制器属性上。在这种情况下，控制器属性将是与数据库表对应的实体对象列表。在\
  \ CDI 控制器内部，可以通过调用 Jakarta Enterprise Beans 来获取实体对象列表。\n\n以下代码摘录自名为 `BookController`\
  \ 的控制器。名为 `completeBookList` 的 CDI 控制器属性将被 Jakarta Server Faces 视图中的 `dataTable`\
  \ 组件引用，以显示底层表中的数据：\n\n@Named(value=\"bookController\")\n\n@SessionScoped\n\npublic\
  \ class BookController implements java.io.Serializable {\n\n@EJB\n\nBookFacade ejbFacade;\n\
  \nprivate List<Book> completeBookList;\n\n@Inject\n\nprivate AuthorController authorController;\n\
  \n...\n\npublic List<Book> getCompleteBookList() {\n\ncompleteBookList = ejbFacade.findAll();\n\
  \nreturn completeBookList;\n\n}\n\npublic void setCompleteBookList(List<Book> completeBookList)\
  \ {\n\nthis.completeBookList = completeBookList;\n\n}\n\n...\n\n}\n\n接下来，让我们看看名为\
  \ `BookFacade` 的 Jakarta Enterprise Beans 的摘录。它是一个无状态会话 Bean，包含由 `BookController`\
  \ 调用的方法，以获取实体对象列表。\n\n■ **注意** `BookController` 调用的 `findAll()` 方法继承自 `AbstractFacade`\
  \ 类。\n\n...\n\n@Stateless\n\npublic class BookFacade extends AbstractFacade<Book>\
  \ {\n\n@PersistenceContext(unitName = \"JakartaEERecipes\")\n\nprivate EntityManager\
  \ em;\n\n@Override\n\nprotected EntityManager getEntityManager() {\n\nreturn em;\n\
  \n}\n\npublic BookFacade() {\n\nsuper(Book.class);\n\n}\n\n...\n\n第八章 ■ Jakarta\
  \ Enterprise Beans\n\n在 `AbstractFacade` 中，`findAll()` 方法以通用方式实现：\n\npublic abstract\
  \ class AbstractFacade<T> {\n\nprivate Class<T> entityClass;\n\npublic AbstractFacade(Class<T>\
  \ entityClass) {\n\nthis.entityClass = entityClass;\n\n}\n\nprotected abstract EntityManager\
  \ getEntityManager();\n\npublic List<T> findAll() {\n\njakarta.persistence.criteria.CriteriaQuery\
  \ cq = getEntityManager().\n\ngetCriteriaBuilder().createQuery();\n\n\n\n`Root<T>\
  \ root = cq.from(entityClass);`\n\n`cq.select(root);`\n\n`return getEntityManager().createQuery(cq).getResultList();`\n\
  \n}\n\n...\n\n}\n\n从 Jakarta Enterprise Beans 中 `findAll()` 方法返回的 `List<Book>` 包含在\
  \ `AbstractFacade` 抽象类中。该列表用于填充 `BookController` 中的 `completeBookList` 属性。由于 `BookController`\
  \ 直接与视图层通信，Jakarta Server Faces 视图将能够利用 `completeBookList` 属性来显示数据。\n\n**解决方案 #2**\n\
  \n返回一个包含针对底层表的原生 SQL 查询结果的 `Map` 对象列表。\n\nJakarta Server Faces CDI 控制器可以包含一个 `Map`\
  \ 对象列表类型的属性，并且可以从 Jakarta Server Faces 的 `dataTable` 组件中引用该属性。在这种情况下，由控制器调用的 Jakarta\
  \ Enterprise Beans 方法将对数据库执行原生 SQL 查询，从表中返回某些列的数据，并用这些列的值填充 map 对象。\n\n在以下摘录中，`BookController.getCustomBookList()`\
  \ 方法通过调用名为 `obtainCustomList` 的 Jakarta Enterprise Beans 方法来填充一个名为 `customBookList`\
  \ 的 CDI 控制器属性。接下来将展示包含这两个方法的摘录。\n\n以下是来自 `org.jakartaeerecipe.chapter08.BookController`\
  \ 的摘录：\n\n...\n\n`public List<Map> getCustomBookList(){`\n\n`customBookList = ejbFacade.obtainCustomList();`\n\
  \n`return customBookList;`\n\n}\n\n...\n\n以下是来自 `org.jakartaeerecipe.chapter08.session.BookFacade`\
  \ 的摘录：\n\n...\n\n`protected EntityManager getEntityManager() {`\n\n`return em;`\n\
  \n}\n\n...\n\n`public List<Map> obtainCustomList(){`\n\n`List<Object[]> results\
  \ = em.createNativeQuery(`\n\n`\"select id, title, description \" +`\n\n`\"FROM\
  \ BOOK \" +`\n\n`\" ORDER BY id\").getResultList();`\n\n`List data = new ArrayList<HashMap>();`\n\
  \n`if (!results.isEmpty()) {`\n\n`for (Object[] result : results) {`\n\n`HashMap\
  \ resultMap = new HashMap();`\n\n`resultMap.put(\"id\", result[0]);`\n\n`resultMap.put(\"\
  title\", result[1]);`\n\n`resultMap.put(\"description\", result[2]);`\n\n`data.add(resultMap);`\n\
  \n`}`\n\n`}`\n\n`return data;`\n\n}\n\n`BookController` 类的 `customBookList` 属性由\
  \ EJB 方法填充，从而使数据可用于视图。\n\n**工作原理**\n\nWeb 应用程序最常需要的任务之一就是显示内容。更重要的是，显示数据库内容几乎是每个企业应用程序的关键。以表格格式显示内容使用户能够查看数据，因为数据以列格式存储在底层表中。Jakarta\
  \ Server Faces 的 `dataTable` 组件为使用 Jakarta Server Faces 框架的 Jakarta EE 应用程序提供了一种高效且强大的方式，以表格格式显示实体数据。\n\
  \nJakarta Server Faces 的 `dataTable` 组件可以接收 `List`、`DataModel` 或 `Collection` 对象，并将其显示给用户。本方案涵盖了检索数据并将其存储在\
  \ `List` 中以供 `dataTable` 组件使用的两种不同变体。第一种解决方案是最常见的情况。在这两种解决方案中，都使用 CDI 控制器属性来存储实体对象的\
  \ `List`。然而，第一种解决方案存储的是实体对象本身的 `List`，而第二种解决方案存储的是 `Map` 对象的 `List`。让我们更详细地逐一分析。\n\
  \n在本方案的**解决方案 #1** 中，`BookController` CDI 控制器类中的 `completeBookList` 字段用于存储 `Book`\
  \ 实体的 `List`。`getCompleteBookList()` 方法通过调用 `BookFacade` 会话 Bean 的 `findAll()` 方法来填充该\
  \ `List`，以返回 `BOOK` 数据库表中的所有行。每个数据库行都存储在一个单独的 `Book` 实体对象中，并且每个 `Book` 实体对象又依次存储在\
  \ `List` 中。最后，该列表被返回给 `BookController` 并赋值给 `completeBookList` 字段。最终，Jakarta Server\
  \ Faces 的 `dataTable` 组件引用 `completeBookList` 来显示内容。\n\n\n\n在解决方案 #2 中，BookController\
  \ 中名为 customBookList 的字段用于填充 Jakarta Server Faces 的 dataTable。customBookList 字段是一个\
  \ Map 对象的 List。就 BookController 的填充方法而言，customBookList 字段的填充方式与解决方案 #1 中的 completeBookList\
  \ 非常相似。它调用了一个 Jakarta Enterprise Beans 方法，该方法返回填充好的对象 List。在本例中，名为 BookFacade 的\
  \ Jakarta Enterprise Beans 从一个原生 SQL 查询返回一个 Map 对象的 List。\n\nBookFacade 会话 Bean\
  \ 类方法 obtainCustomList 负责创建原生 SQL 查询，然后将结果存储到 Map 对象中。在此例中，原生查询仅返回 BOOK 数据库表中每行存在的列的子集作为\
  \ resultList，并将它们存储到 `List<Object[]>` 中。然后，创建一个新的 HashMap 的 ArrayList，并用数据库查询返回的\
  \ List 内容进行填充。为了填充这个 ArrayList，使用 for 循环遍历 `List<Object[]>`。为从数据库返回的每个对象创建一个 HashMap\
  \ 对象。HashMap 对象填充了名称-值对，其中列名是第一部分，实体对象中的值是每个元素的第二部分。通过查询检索到的每一列都存储到 HashMap 中，然后\
  \ HashMap 本身被添加到一个 List 中。最后，HashMap 对象的 List 被返回给 CDI 控制器，并存储到 customBookList 字段中。在\
  \ Jakarta Server Faces 视图中，使用与 HashMap 中每个数据库列关联的名称来引用这些值，以便在 dataTable 中显示。\n\n\
  本技巧中展示的两种解决方案都提供了从数据库显示数据的有效选项，这些选项在 Jakarta Server Faces dataTable 组件内使用了 Jakarta\
  \ Persistence。我建议尽可能使用第一种解决方案，因为它比解决方案 #2 更不容易出错，解决方案 #2 需要手动将数据库列映射到 Map 索引。此外，解决方案\
  \ #2 的 Jakarta Enterprise Beans 中硬编码了原生 SQL，这在必要时是可以的，但从来都不是最佳选择。能够利用 Jakarta Enterprise\
  \ Beans 方法（例如 AbstractFacade 中可用的 `findAll()` 方法，参见技巧 8-2）总是更好的，因为如果底层数据库表发生变化，则无需修改应用程序代码。\n\
  \n8-8. 创建单例 Bean\n\n问题\n\n您想要开发一个会话 Bean，所有应用程序客户端都将使用同一个实例。每个应用程序应只允许一个 Bean 实例，以便始终有一个单一的站点访问者计数器来统计访问者数量。\n\
  \n■ **注意** 在本技巧中，计数器不是累积的。也就是说，它不会在应用程序启动之间持久化。\n要创建一个累积计数器，当前计数必须在应用程序或服务器重启之前持久化到数据库，并在应用程序恢复时恢复。\n\
  \n解决方案\n\n开发一个允许所有应用程序客户端并发访问的单例会话 Bean。该 Bean 将跟踪访问书店的访问者数量，并在 Acme Bookstore 应用程序的页脚中显示该数字。以下名为\
  \ BookstoreSessionCounter 的 Bean 是 Acme Bookstore 的一个单例会话 Bean，负责跟踪活动会话计数：\n\n```java\n\
  package org.jakartaeerecipe.chapter08.session;\n\nimport jakarta.ejb.Singleton;\n\
  import jakarta.ejb.ConcurrencyManagement;\nimport static jakarta.ejb.ConcurrencyManagementType.CONTAINER;\n\
  \n@Singleton\n@ConcurrencyManagement(CONTAINER)\npublic class BookstoreSessionCounter\
  \ {\n    private int numberOfSessions;\n\n    /**\n     * 初始化 Bean\n     */\n  \
  \  @PostConstruct\n    public void init(){\n        // 在此处初始化 Bean\n        System.out.println(\"\
  正在初始化 Bean...\");\n    }\n\n    // 在应用程序启动时重置计数器\n    public BookstoreSessionCounter(){\n\
  \        numberOfSessions = 0;\n    }\n\n    /**\n     * @return numberOfSessions\n\
  \     */\n    public int getNumberOfSessions() {\n        numberOfSessions++;\n\
  \        return numberOfSessions;\n    }\n\n    /**\n     * @param numberOfSessions\
  \ 要设置的 numberOfSessions。如果当前计数器在应用程序关闭前被持久化，则可以从数据库设置此值\n     */\n    public void\
  \ setNumberOfSessions(int numberOfSessions) {\n        this.numberOfSessions = numberOfSessions;\n\
  \    }\n}\n```\n\n接下来，让我们看看调用单例会话 Bean 方法来更新站点计数器的 Jakarta Server Faces CDI 控制器。以下摘录自一个会话作用域的\
  \ CDI 控制器，名为 BookstoreSessionController，其中的 counter 属性用于更新 Jakarta Enterprise Beans\
  \ 中的访问者数量：\n\n```java\n...\n@Named(\"bookstoreSessionController\")\n@SessionScoped\n\
  public class BookstoreSessionController {\n    @EJB\n    BookstoreSessionCounter\
  \ bookstoreSessionCounter;\n    private int counter;\n    private boolean flag =\
  \ false;\n\n    /**\n     * @return counter\n     */\n    public int getCounter()\
  \ {\n        if (!flag) {\n            counter = bookstoreSessionCounter.getNumberOfSessions();\n\
  \            flag = true;\n        }\n        return counter;\n    }\n\n    /**\n\
  \     * @param counter 要设置的 counter\n     */\n    public void setCounter(int counter)\
  \ {\n        this.counter = counter;\n    }\n}\n```\n\n最后，计数器被绑定到 Acme Bookstore\
  \ Facelets 模板中的一个 Jakarta 表达式。以下代码行摘自名为 `custom_template_search.xhtml` 的模板，该模板位于本书源码的\
  \ `chapter08/layout` 目录中：\n\n```xhtml\nNumber of Visitors: #{bookstoreSessionController.counter}\n\
  ```\n\n工作原理\n\n被指定为单例的类在每个应用程序中只创建一次。在任何给定时间，只有一个单例类的实例，所有客户端会话都与该同一实例交互。要生成一个单例会话\
  \ Bean，通过指定 `jakarta.ejb.Singleton` 注解来将 Bean 标识为单例。\n\n从编程角度来看，注解规范是标准无状态会话 Bean\
  \ 和单例会话 Bean 编码的主要区别之一。然而，在功能上，容器对单例 Bean 的处理方式与标准无状态会话 Bean 有很大不同。\n\n单例会话 Bean\
  \ 由容器在任意时间点实例化。为了强制在应用程序启动时实例化单例，可以指定 `jakarta.ejb.Startup` 注解。在示例中，没有指定 `@Startup`\
  \ 注解，因此容器可以在任何给定时间点实例化该单例。但是，在任何应用程序 Jakarta Enterprise Beans 开始接收请求之前，单例将会被启动。在示例中，您可以看到使用了\
  \ `@PostConstruct` 回调注解。这会导致在 Bean 实例化后立即执行指定了该注解的方法。单例共享与标准无状态会话 Bean 相同的回调方法。要了解更多关于回调方法的信息，请参考技巧\
  \ 8-2。\n\n■ **注意** 如果一个或多个单例 Bean 依赖于其他单例 Bean 进行初始化，可以为该 Bean 指定 `@DependsOn` 注解，以表明它依赖于哪个\
  \ Bean。如果需要，可以使用此注解建立依赖链。\n\n\n\n默认情况下，单例是并发的，这意味着多个客户端可以同时访问它们（也称为*线程安全*）。有两种不同的方式可以控制对单例\
  \ Bean 的并发访问。可以指定 `@ConcurrencyManagement` 注解以及相应的 `ConcurrentManagementType`，以告知\
  \ Bean 使用哪种并发类型。这两种并发类型分别是 `CONTAINER`（如果未指定任何内容，则为默认类型）和 `BEAN`。在示例中，Bean 被注解以指定容器管理的并发。当指定了容器管理的并发时，Jakarta\
  \ Enterprise Beans 容器会管理并发。可以在单例的方法上指定 `@Lock` 注解，以告知容器应如何管理客户端对该方法的访问。要使用 `@Lock`\
  \ 注解，请在注解中指定锁定类型为 `LockType.READ` 或 `LockType.WRITE`（默认值），以告知容器多个客户端可以同时访问被注解的方法，或者当某个客户端正在访问该方法时，该方法应对其他客户端锁定。整个类也可以使用\
  \ `@Lock` 进行注解，在这种情况下，指定的锁定类型将用于该类中的每个方法，除非这些方法包含自己的锁定类型指定。例如，以下代码行指定了单例类中的一个方法，当客户端访问该方法时应将其锁定，以便一次只有一个客户端可以访问：\n\
  \n`@Lock(LockType.WRITE)`\n\n`public void setCounter(int counter){`\n\n`this.counter\
  \ = counter;`\n\n`}`\n\n第 8 章 ■ Jakarta Enterprise Beans\n\nBean 管理的并发则不同，它允许对类中所有方法的所有客户端进行完全并发的、线程安全的锁定访问。开发者可以使用\
  \ Java 同步技术（如 `synchronized` 和 `volatile`）来帮助管理那些被指定为 Bean 管理并发的单例中的并发状态。\n\n8-9.\
  \ 调度定时器服务\n\n问题\n\n您希望调度一个任务，该任务按固定时间间隔执行数据库事务。\n\n解决方案 #1\n\n使用定时器服务在 Bean 内通过自动定时器调度一个任务。该定时器将指定一个所需的时间间隔，并且每次时间间隔到期时，将调用用于执行该任务的方法。以下会话\
  \ Bean 被设置为创建一个自动定时器，该定时器将在应用程序部署时启动。以下代码包含在名为 `org.jakartaeerecipe.chapter08.timer.TimerBean`\
  \ 的 Java 文件中：\n\n`import jakarta.ejb.Singleton;`\n\n`import jakarta.ejb.Schedule;`\n\
  \n`@Singleton`\n\n`public class TimerBean {`\n\n`@Schedule(minute=\"*/5\", hour=\"\
  *\")`\n\n`public void automaticTimer(){`\n\n`System.out.println(\"*** Automatic\
  \ Timeout Occurred ***\");`\n\n`}`\n\n`}`\n\n当该类部署到应用服务器并且应用服务器启动时，自动定时器将启动。每五分钟，`automaticTimer()`\
  \ 方法以及在该方法内执行的任何进程都将被调用。\n\n解决方案 #2\n\n创建一个编程式定时器，并指定其在部署到应用服务器时启动。\n\n在定时器 Bean\
  \ 中配置一个初始化方法，该方法将在 Bean 初始化时自动创建定时器。以下示例类名为 `org.jakartaeerecipe.chapter08.timer.ProgrammaticTimerExample`，它将在应用程序部署时自动启动：\n\
  \n`package org.jakartaeerecipe.chapter08.timer;`\n\n`import jakarta.annotation.PostConstruct;`\n\
  \n`import jakarta.annotation.Resource;`\n\n`import jakarta.ejb.Singleton;`\n\n`import\
  \ jakarta.ejb.Timer;`\n\n`import jakarta.ejb.Timeout;`\n\n`import jakarta.ejb.TimerService;`\n\
  \n`@Singleton`\n\n`@Startup`\n\n第 8 章 ■ Jakarta Enterprise Beans\n\n`public class\
  \ ProgrammaticTimerExample {`\n\n`@Resource`\n\n`TimerService timerService;`\n\n\
  `@PostConstruct`\n\n`public void createTimer(){`\n\n`System.out.println(\"Creating\
  \ Timer...\");`\n\n`Timer timer = timerService.createTimer(100000, \"Timer has been\
  \ created...\");`\n\n`}`\n\n`@Timeout`\n\n`public void timeout(Timer timer){`\n\n\
  `System.out.println(\"Timeout of Programmatic Timer Example...\");`\n\n`}`\n\n`}`\n\
  \n\n\n部署后，您应在服务器日志中看到一条消息，显示“正在创建定时器...”，然后当定时器到期时，日志中会显示“编程定时器示例超时...”消息。\n\n工作原理\n\
  \n定时器解决方案使得将定时或计划任务集成到应用程序流程中变得简单。定时器服务有助于实现此类解决方案，因为它为应用程序提供了一种方法，用于调度将在指定时间间隔内由应用程序执行的任务。定时器有两种不同的类型：编程定时器和自动定时器。在本方案的解决方案\
  \ #1 中，演示了一个自动定时器。虽然该解决方案并未执行任何实际工作，但实际工作发生在使用 `@Schedule` 注解标注的方法中。当 Jakarta 企业\
  \ Bean 包含一个或多个使用 `@Schedule` 或 `@Schedules` 注解标注的方法时，就会创建一个自动定时器。`@Schedule` 接受一个基于日历的定时器表达式，用于指示标注的方法应在何时执行。\n\
  \n■ **注意** 一个或多个 `@Schedule` 注解可以分组在 `@Scheduled{ ... }` 内，每个 `@Schedule` 之间用逗号分隔。\n\
  \n基于日历的定时器表达式可以包含一个或多个日历属性及其对应的值，以指示方法调用的时间点。表 8-1 列出了不同的基于日历的定时器表达式及其描述。\n\n***表\
  \ 8-1.** 基于日历的定时器表达式*\n\n**属性**\n\n**描述**\n\ndayOfWeek\n\n一周中的一天或多天：(0–7) 或 (Sun,\
  \ Mon, Tue, Wed, Thu, Fri, Sat)\n\ndayOfMonth\n\n一个月中的一天或多天：(1–31) 或 (Last) 或 (1st,\
  \ 2nd, 3rd, 4th, 5th, Last) 以及任何 dayOfWeek 值\n\nmonth\n\n一年中的一个月或多个月：(1–12) 或月份缩写\n\
  \nyear\n\n四位数的日历年份\n\nhour\n\n一天中的一小时或多小时：(0–23)\n\nminute\n\n一小时中的一分钟或多分钟：(0–59)\n\
  \nsecond\n\n一分钟中的一秒或多秒：(0–59)\n\n第 8 章 ■ Jakarta 企业 Bean\n\n创建基于日历的定时器表达式时，星号 (*)\
  \ 可用作通配符。正斜杠 (/) 可用于表示时间间隔。时间间隔遵循以下模式：开始时间（较大单位）/ 频率\n\n因此，在示例中指定 `/5`（`minute=\"\
  */5\" hour=\"*\"`）表示您希望定时器在每小时内的每五分钟执行一次，因为通配符指示定时器从哪一小时开始，而数字 5 指示执行频率。\n\n定时器表达式属性可以包含多个值，每个值之间应用逗号分隔。\n\
  \n要指示您希望在凌晨 3:00 和早上 6:00 执行定时器，可以编写如下代码：\n\n`@Schedule(hour=\"3,6\")`\n\n也可以为定时器属性指定一个值范围。要指示您希望在凌晨\
  \ 4:00 到早上 7:00 之间每小时执行一次定时器，可以指定如下：\n\n`@Schedule(hour=\"4-7\")`\n\n可以组合多个定时器表达式，以更精细地调整定时器。例如，要指定一个在每周日凌晨\
  \ 1:00 执行的定时器计划，可以编写如下代码：\n\n`@Schedule(dayOfWeek=\"Sun\", hour=\"1\")`\n\n编程定时器是开发定时流程时可用的第二种选择，如解决方案\
  \ #2 所示。编程定时器与自动定时器不同，因为它不涉及计划。相反，客户端可以调用定时器，或者可以在 Bean 构造时初始化定时器。编程定时器包含一个使用 `@Timeout`\
  \ 注解标注的方法。当定时器到期时，将执行 `@Timeout` 方法。超时方法必须返回 `void`，并且可以选择接受一个 `jakarta.ejb.Timer`\
  \ 对象。超时方法不得抛出应用程序异常。\n\n要创建编程定时器，请调用 `TimerService` 接口的其中一个 `create` 方法。表 8-2 指出了可以使用的不同\
  \ `create` 方法。\n\n\n\n***表 8-2.** 编程式定时器创建方法*\n\n**方法**\n\n**描述**\n\ncreateTimer\n\
  \n标准定时器创建\n\ncreateSingleActionTimer\n\n创建仅触发一次的定时器\n\ncreateIntervalTimer\n\n创建基于指定时间间隔触发的定时器\n\
  \ncreateCalendarTimer\n\n创建基于日历的定时器\n\n在本方案的第 2 种解法中，创建了一个标准定时器，并传入 100,000 毫秒的时间间隔。\n\
  \n这意味着带有`@Timeout`注解的方法将在 100,000 毫秒后执行一次。以下是另一种可用于创建相同调度定时器的语法：`long duration =\
  \ 100000;`\n\n`Timer timer = timerService.createSingleActionTimer(duration, new\
  \ TimerConfig());`\n\n第 8 章 ■ Jakarta Enterprise Beans\n\n类似地，可以向创建方法传入一个日期，以指定定时器应触发的具体日期和时间。以下定时器将在应用部署之日起\
  \ 30 天后触发：\n\n`Calendar cal = Calendar.getInstance();`\n\n`cal.add(Calendar.DATE,\
  \ 30);`\n\n`Timer timer = timerService.createSingleActionTimer(cal.getTime(), new\
  \ TimerConfig());`\n\n要创建基于日历的编程式定时器，必须使用`ScheduleExpression`辅助类创建一个新的调度。这样做将允许你利用表\
  \ 8-1 中列出的基于日历的表达式来指定定时器触发日期。以下示例演示了一个定时器，它将根据应用服务器时钟在每周日凌晨 1:00 触发：\n\n`ScheduleExpression\
  \ schedule = new ScheduleExpression();`\n\n`schedule.dayOfWeek(\"Sun\");`\n\n`schedule.hour(\"\
  1\");`\n\n`Timer timer = timerService.createCalendarTimer(schedule);`\n\n定时器不需要在单例会话\
  \ Bean 中创建；它们也可以在无状态会话 Bean 中使用。\n\n■ **注意** 定时器不能在状态会话 Bean 中指定。\n\n定时器是一个无法在单个方案中完整讨论的主题。不过，这个关于定时器的简要介绍应该足以让你开始在应用程序中使用这项技术。\n\
  \n要了解更多关于定时器的信息，请参考在线文档：[`eclipse- ee4j.github.`](https://eclipse-ee4j.github.io/jakartaee-tutorial/#using-the-timer-service)\n\
  \n[io/jakartaee- tutorial/#using- the- timer- service.](https://eclipse-ee4j.github.io/jakartaee-tutorial/#using-the-timer-service)\n\
  \n■ **注意** 默认情况下，所有定时器都是持久的，这意味着如果服务器因某种原因关闭，当服务器重新启动时，定时器将再次激活。如果定时器在服务器关闭期间应该触发，那么一旦服务器恢复正常运行，定时器就会触发（或者`@Timeout`方法将被调用）。若要指示定时器不应持久化，请调用`TimerConfig.setPersistent(false)`，并将其传递给定时器创建方法。\n\
  \n8-10\\. 执行可选的事务生命周期回调\n\n问题\n\n你希望在 Bean 被实例化时开始一个事务，并在其被销毁时结束该事务。\n\n第 8 章 ■\
  \ Jakarta Enterprise Beans\n\n解决方案\n\n选择利用 Jakarta Enterprise Beans 内置的可选事务生命周期回调。要在`@PostConstruct`或`@PreDestroy`回调期间开始一个事务，请相应地使用`@TransactionAttribute`注解这些方法，并传入`TransactionAttributeType.REQUIRES_NEW`属性。在以下示例中，当名为`AcmeFacade`的\
  \ Bean 被创建时，一个事务开始。当该 Bean 被销毁时，另一个事务开始：\n\n`import jakarta.annotation.PostConstruct;`\n\
  \n`import jakarta.annotation.PreDestroy;`\n\n`import jakarta.ejb.Stateful;`\n\n\
  `import jakarta.ejb.TransactionAttribute;`\n\n`import jakarta.ejb.TransactionAttributeType;`\n\
  \n`import jakarta.persistence.EntityManager;`\n\n`import jakarta.persistence.PersistenceContext;`\n\
  \n`import jakarta.persistence.PersistenceContextType;`\n\n`@Stateful`\n\n`public\
  \ class AcmeFacade {`\n\n`@PersistenceContext(unitName = \"JakartaEERecipesPU\"\
  , type = PersistenceContextType.`\n\n`EXTENDED)`\n\n`private EntityManager em;`\n\
  \n\n\n@TransactionAttribute(TransactionAttributeType.REQUIRES_NEW)\n\n@PostConstruct\n\
  \npublic void init() {\n\nSystem.out.println(\"The Acme Bean has been created\"\
  );\n\n}\n\n@TransactionAttribute(TransactionAttributeType.REQUIRES_NEW)\n\n@PreDestroy\n\
  \npublic void destroy() {\n\nSystem.out.println(\"The Acme Bean is being destroyed...\"\
  );\n\nem.flush();\n\n}\n\n}\n\n工作原理\n\n会话 Bean 可以包含回调方法，这些方法在 Bean 生命周期的特定阶段被调用。\n\
  \n例如，可以通过注解在会话 Bean 中注册一个方法，使其在 Bean 构造完成后（@PostConstruct）、销毁之前（@PreDestroy）等时机被调用。有时，在这些事件发生时启动一个新事务是合理的。当使用容器管理的事务时，可以为会话\
  \ Bean 中带注解的生命周期回调方法指定其事务状态。\n\n该注解接受一个事务类型，具体值参见表 8-3。\n\n第 8 章 ■ Jakarta 企业 Bean\n\
  \n***表 8-3.** 容器管理的事务划分*\n\n**属性**\n\n**描述**\n\nMANDATORY\n\n容器必须在客户端的事务上下文中调用事务设置为该属性的企业\
  \ Bean 方法。客户端必须在事务上下文中调用。\n\nREQUIRED\n\n容器必须在客户端的事务上下文中调用事务设置为该属性的企业 Bean 方法。客户端必须在事务上下文中调用。如果客户端在未关联事务上下文的情况下调用企业\
  \ Bean 的方法，容器会在将方法调用委托给企业 Bean 方法之前自动启动一个新事务。\n\nREQUIRES_NEW\n\n容器必须使用新的事务上下文来调用事务设置为该属性值的企业\
  \ Bean 方法。\n\nSUPPORTS\n\n如果客户端带有事务上下文调用，则容器将其视为 REQUIRED。如果客户端不带事务上下文调用，则容器将其视为\
  \ NOT_SUPPORTED。\n\nNOT_SUPPORTED\n\n容器使用未指定的事务上下文来调用事务属性设置为该值的企业 Bean 方法。\n\nNEVER\n\
  \n容器在未定义 Jakarta 企业 Bean 规范所规定的事务上下文的情况下，调用事务设置为该值的企业 Bean 方法。\n\n默认情况下，为了保持向后兼容性，生命周期回调方法不是事务性的。通过使用\
  \ @TransactionAttribute 注解和首选的事务划分类型来注解回调方法，该回调方法可以选择加入事务性。\n\n8-11. 确保有状态会话 Bean\
  \ 不被钝化\n\n问题\n\n您希望将不活跃的有状态会话 Bean 保留在内存中，而不是让其被钝化。\n\n解决方案\n\n通过在 @Stateful 注解中指明该\
  \ Bean 不应被钝化，从而向容器指定该 Bean 不被钝化。要选择退出钝化，请将 @Stateful 注解的 passivationCapable 属性设置为\
  \ false，如下面的代码片段所示：\n\n@Stateful(passivationCapable=false)\n\npublic class AcmeFacade\
  \ {\n\n...\n\n}\n\n第 8 章 ■ Jakarta 企业 Bean\n\n工作原理\n\n当有状态会话 Bean 在一段时间内处于不活跃状态时，容器可能会选择钝化该\
  \ Bean，以节省内存和资源。通常，Jakarta 企业 Bean 容器会使用最近最少使用算法来钝化有状态会话 Bean。发生钝化时，Bean 会被移动到辅助存储并从内存中移除。在有状态会话\
  \ Bean 被钝化之前，任何带有 @PrePassivate 注解的方法都会被调用。当一个已被钝化的有状态会话 Bean 需要重新激活时，容器会激活该 Bean，然后调用任何带有\
  \ @PostActivate 注解的方法，最后将 Bean 移动到就绪阶段。\n\n\n\n有状态会话 Bean 可以选择退出钝化，这样它们将保留在内存中，而不会在非活动时被转移到辅助存储。这在某些情况下可能很有用，例如当\
  \ Bean 需要为应用程序进程保持活动状态，或者当 Bean 包含不可序列化的字段时，因为这些字段无法被钝化，并且在钝化时会被置为 null。要指示某个 Bean\
  \ 不应被钝化，请按照本解决方案所述，将 `@Stateful` 注解的 `passivationCapable` 属性设置为 `false`。\n\n8-12.\
  \ 指定本地和远程接口\n\n问题\n\n你希望为某个 EJB 显式指定一个本地或远程接口。\n\n解决方案\n\n一个业务接口不能同时被声明为 Bean 的本地和远程业务接口。因此，Jakarta\
  \ Enterprise Beans 规范包含一个 API，用于指定业务接口是作为本地接口还是远程接口。以下规则适用于企业 Bean 类实现的业务接口：\n\n\
  在确定 Bean 的本地或远程业务接口时，`java.io.Serializable`、`java.io.Externalizable` 以及由该包定义的接口始终被排除在外。\n\
  \n如果 Bean 类包含 `@Remote` 注解，则所有已实现的接口都被假定为远程接口。\n\n如果 Bean 类不包含任何注解，或者指定了 `@Local`\
  \ 注解，则所有已实现的接口都被假定为本地接口。\n\n任何为具有无接口视图的 Bean 显式定义的业务接口都必须被指定为 `@Local`。\n\n如果 Bean\
  \ 类显式指定了带有非空值的 `@Local` 或 `@Remote` 注解，则任何业务接口都必须被显式指定为本地或远程接口。\n\n如果部署描述符如此指定，则任何业务接口都必须被显式指定为本地或远程接口。\n\
  \n工作原理\n\n无接口视图极大地简化了开发，因为它使得本地业务接口成为可选项。无接口视图会自动将 Bean 的所有公有方法暴露给调用者。\n\n默认情况下，任何不包含\
  \ `implements` 子句且未定义本地或远程客户端视图的会话 Bean 都会自动暴露无接口视图。通过 Jakarta Enterprise Beans，你可以在需要显式指定本地和远程接口的情况下提供更细粒度的控制。\n\
  \n第 8 章 ■ Jakarta Enterprise Beans\n\n让我们分解一下本解决方案中定义的规则。首先，如果某个 EJB 暴露了本地接口，则无需显式地将\
  \ Bean 指定为本地接口。例如，以下 Bean 包含一个本地接口，尽管它没有被显式指定：\n\n```java\n@Stateless\npublic class\
  \ AcmeSession implements interfaceA {\n    ...\n}\n\npublic interfaceA { ... }\n\
  ```\n\n如果 Bean 类使用了 `@Remote` 注解，那么它实现的任何接口都被假定为远程接口。例如，以下 Bean 类实现了两个接口，尽管它们不包含任何指示性的注解，但两者都被假定为远程接口：\n\
  \n```java\n@Remote\n@Stateless\npublic class AcmeSession implements interfaceA,\
  \ interfaceB {\n    ...\n}\n```\n\n如果 Bean 类包含了 `@Local` 注解，那么它实现的任何接口都被假定为本地接口。例如，以下\
  \ Bean 类实现了两个接口，尽管它们不包含任何指示性的注解，但两者都被假定为本地接口：\n\n```java\n@Local\n@Stateless\npublic\
  \ class AcmeSession implements interfaceA, interfaceB {\n    ...\n}\n```\n\n如果 Bean\
  \ 类包含了 `@Local` 或 `@Remote` 注解，并在注解中指定了接口名称，那么将应用与该注解相同的指定。例如，以下 Bean 被注解为包含一个本地业务接口，并且接口的名称在注解中指定，从而使该接口成为本地接口：\n\
  \n```java\n@Local(interfaceA.class)\n@Stateless\npublic class AcmeSession implements\
  \ interfaceA {\n    ...\n}\n```\n\n\n\n这些新的指定规则使得指定和确定由 Bean 实现的企业接口类型变得更加容易。\n\n\
  第 8 章 ■ Jakarta Enterprise Beans\n\n8-13. 异步处理消息\n\n来自《Enterprise Beans》\n\n问题\n\
  \n你希望具备从会话 Bean 中异步处理消息的能力。\n\n解决方案\n\n开发一个消息驱动 Bean，为你的应用执行消息处理。要开发消息 Bean，请创建一个使用\
  \ `@MessageDriven` 注解并传递适当配置选项的 Jakarta Enterprise Beans。在 Bean 中，编写一个名为 `onMessage`\
  \ 的方法，该方法将执行所有消息处理。以下示例 `org.jakartaeerecipe.chapter08.jsf.AcmeMessageBean` 演示了如何编写一个消息驱动\
  \ Bean，用于处理来自已在应用服务器容器中配置的 `jakarta.jms.Queue` 的消息：\n\n■ **注意** 在运行这些示例之前，你必须在 GlassFish\
  \ 中创建 JMS 资源。更多详情请参考配方 12-1。\n\n```java\n@MessageDriven(mappedName=\"jms/Queue\"\
  , activationConfig = {\n    @ActivationConfigProperty(propertyName = \"destinationType\"\
  ,\n        propertyValue = \"jakarta.jms.Queue\")\n})\npublic class AcmeMessageBean\
  \ implements MessageListener {\n    public AcmeMessageBean(){\n    }\n    @Override\n\
  \    public void onMessage(Message msg) {\n        if(msg != null){\n          \
  \  performExtraProcessing();\n            System.out.println(\"Message has been\
  \ received: \" + msg);\n        } else {\n            System.out.println(\"No message\
  \ received\");\n        }\n    }\n    public void performExtraProcessing(){\n  \
  \      System.out.println(\"This method could perform extra processing\");\n   \
  \ }\n}\n```\n\n第 8 章 ■ Jakarta Enterprise Beans\n\n工作原理\n\n消息驱动 Bean 是用于异步处理消息的\
  \ Jakarta Enterprise Beans。大多数情况下，消息驱动 Bean 是 Jakarta Messaging 监听器，负责接收消息并进行相应处理。通过使用\
  \ `@MessageDriven` 注解 Bean 并可选地实现 `MessageListener` 接口来创建消息驱动 Bean。当容器队列中收到消息时，容器会调用\
  \ Bean 的 `onMessage()` 方法，该方法包含负责相应处理消息的业务逻辑。\n\n■ **注意** 任何会话 Bean 都可以用于处理消息，但只有消息驱动\
  \ Bean 能够以异步方式处理。\n\n消息驱动 Bean 必须声明为 public，且不能是 static 或 final。消息驱动 Bean 必须包含一个\
  \ public 的无参构造函数，并且必须包含一个名为 `onMessage` 的方法，该方法接受一个 `jakarta.jms.Message` 参数。`onMessage`\
  \ 方法负责执行所有消息处理，并且可以在需要时使用 Bean 中的其他方法来协助处理。\n\nBean 提供者可以通过 `@MessageDriven` 注解的\
  \ `activationConfig` 元素，为部署者提供消息驱动 Bean 的特殊配置，例如关于消息选择器、确认模式等信息。存在一组标准的 `activationConfig`\
  \ 属性，以提供与 JMS 2.0 的对齐。表 8-4 列出了这些新属性及其功能描述。\n\n***表 8-4.** Jakarta Messaging 对齐的\
  \ activationConfig 属性*\n\n| **属性** | **描述** |\n| :--- | :--- |\n| destinationLookup\
  \ | 向部署者提供关于消息驱动 Bean 是打算与 Queue 还是 Topic 关联的建议。此属性的值为 `jakarta.jms.Queue` 和 `jakarta.jms.Topic`\
  \ |\n| connectionFactoryLookup | 指定一个管理定义的 `ConnectionFactory` 对象的查找名称，该对象将用于连接到\
  \ Jakarta Messaging 提供者，消息驱动 Bean 将通过该连接发送消息 |\n| clientId | 指定将用于连接到 Jakarta Messaging\
  \ 提供者的客户端标识符，消息驱动 Bean 将通过该连接发送消息 |\n| subscriptionName | 如果消息驱动 Bean 打算与 Topic\
  \ 一起使用，则 Bean 提供者可以使用此属性指定持久订阅的名称，并将 `subscriptionDurability` 属性设置为 `Durable` |\n\
  | shareSubscriptions | 此属性仅在消息驱动 Bean 部署到集群应用服务器时使用，其值可以是 `true` 或 `false`。值为 `true`\
  \ 意味着集群中的每个实例将使用相同的持久订阅名称或非持久订阅。值为 `false` 意味着集群中的每个实例将使用不同的持久订阅名称或非持久订阅 |\n\n![](img/index-454_1.jpg)\n\
  \n第 8 章 ■ Jakarta Enterprise Beans\n\n要执行本配方中的代码，请访问页面 http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/chapter08/recipe08_13.xhtml。点击“发送消息”按钮应显示如图\
  \ 8-2 所示的输出，并且日志消息也会出现在 GlassFish 服务器日志中。\n\n***图 8-2.** 配方 8-13 的输出*\n\n**第 9 章**\n\
  \n**Jakarta Persistence 查询**\n\n**语言**\n\nJakarta Persistence API 使用一种查询语言来与底层数据存储进行通信。\n\
  \n尽管 Jakarta EE 使用实体而非 SQL 进行数据库访问，但它提供了一种查询语言，以便开发者可以通过实体获取所需信息。Jakarta Persistence\
  \ 查询语言正是为此而生，因为它提供了一种查询和处理 Jakarta EE 实体对象的工具。虽然它与 SQL 非常相似，但它是一种对象关系查询语言，因此开发者需要注意一些细微的差异。将\
  \ Jakarta Persistence 查询语言与 Jakarta EE 实体结合使用，允许开发者创建通用的应用程序，因为它不依赖于特定数据库，应用程序可以编写一次并部署在多种数据库之上运行。\n\
  \n本章中的配方不会试图涵盖 Jakarta Persistence 查询语言提供的所有功能，因为其功能众多。然而，这些配方包含了足够的信息，可以将初学者引入\
  \ Jakarta Persistence 查询语言的世界，并让中级开发者了解 Jakarta Persistence 查询语言提供的最新功能。要查看使用 Jakarta\
  \ Persistence 查询语言的完整文档集，请参阅 [`projects.eclipse.org/projects/ee4j.jpa`](https://projects.eclipse.org/projects/ee4j.jpa)\
  \ 上的在线资源。\n\n9-1. 查询实体的所有实例\n\n问题\n\n你想要检索特定实体的所有实例。也就是说，你想要查询与实体关联的底层数据库表并检索所有行。\n\
  \n解决方案\n\n调用 `EntityManager` 的 `createQuery` 方法，并使用 Jakarta Persistence 查询语言来制定一个查询，该查询将返回给定实体的所有实例。在以下示例中，使用\
  \ Jakarta Persistence 查询语言查询来返回 `BookAuthor` 实体中的所有对象：\n\n```java\npublic List<BookAuthor>\
  \ findAuthor(){\n    return em.createQuery(\"select object(o) from BookAuthor o\"\
  ).getResultList();\n}\n```\n\n© Josh Juneau 和 Tarun Telang 2022\nJ. Juneau 和 T.\
  \ Telang, *Java EE to Jakarta EE 10 Recipes*, https://doi.org/10.1007/978-1-4842-8079-9_9\n\
  \n![](img/index-456_1.jpg)\n\n第 9 章 ■ Jakarta Persistence 查询语言\n\n当调用 `findAuthor()`\
  \ 方法时，将返回一个包含实体中所有 `BookAuthor` 实体实例（底层数据库表中的所有记录）的 `List`。可以通过访问 URL http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/chapter09/recipe09_01.xhtml\
  \ 来执行此配方的代码，输出将如图 9-1 所示。\n\n***图 9-1.** 配方 9-1 的输出*\n\n工作原理\n\n\n\n实体实例在底层数据存储中可被称为*记录*。也就是说，给定数据库表中的每条记录都对应一个实体实例。话虽如此，有时检索给定实体的所有实例会很方便。某些应用程序可能需要获取所有对象，以便对每个对象执行特定任务，或者您的应用程序可能只需要向用户显示某个实体的所有实例。\n\
  \n无论哪种情况，都有几种方法可以检索给定实体的所有实例。每种技术都可以在 Jakarta Enterprise Beans 或 RESTful 服务类中实现。\n\
  \nJakarta Persistence 查询语言可用于查询某个实体的所有实例。要创建动态查询，请调用 `EntityManager` 的 `createQuery`\
  \ 方法，您可以向其传递一个基于字符串的查询（由 Jakarta Persistence 查询语言语法组成），或者传递一个 `jakarta.persistence.Query`\
  \ 实例。`Query` 接口有大量可用于处理查询对象的方法。表 9-1 描述了这些方法的作用。\n\n***表 9-1.** jakarta.persistence.Query\
  \ 接口方法*\n\n**方法**\n\n**描述**\n\n`executeUpdate`\n\n执行更新或删除语句（返回：`int`）\n\n`getFirstResult`\n\
  \n指定查询对象设置为检索的第一个结果的位置（返回：`int`）\n\n`getFlushMode`\n\n获取查询执行生效的刷新模式（返回：`FlushModeType`）\n\
  \n（*续*）\n\n第 9 章 ■ Jakarta Persistence 查询语言\n\n***表 9-1.*** （*续*）\n\n**方法**\n\n\
  **描述**\n\n`getHints`\n\n获取查询实例生效的属性和提示及其关联值（返回：`java.util.Map<String, Object>`）\n\
  \n`getLockMode`\n\n获取查询的当前锁定模式（返回：`LockModeType`）\n\n`getMaxResults`\n\n指定查询对象设置为检索的最大结果数（返回：`int`）\n\
  \n`getParameter`\n\n获取与声明的定位参数相对应的参数对象（返回：`Parameter<?>`）\n\n`getParameters`\n\n\
  获取与查询声明的参数相对应的参数对象（返回：`java.util.Set<Parameter<?>>`）\n\n`getParameterValue(int)`\n\
  \n返回绑定到定位参数的值（返回：`Object`）\n\n`getResultList`\n\n执行 SELECT 查询，然后将查询结果作为未类型化的 List\
  \ 返回（返回：`java.util.List`）\n\n`getSingleResult`\n\n执行 SELECT 查询，然后返回单个未类型化的结果（返回：`java.lang.Object`）\n\
  \n`isBound`\n\n返回一个布尔值，指示是否已将值绑定到该参数\n\n在示例中，一个查询字符串被传递给该方法，其内容如下：\n\n`select object(o)\
  \ from BookAuthor o`\n\n分解来看，该查询是从 `BookAuthor` 实体中选择所有对象。查询中可以使用任何字母来代替 `o` 字符，但由于\
  \ Jakarta Persistence 查询语言指的是对象，因此 `o` 算是一种标准。所有查询都包含一个 SELECT 子句，用于定义您想要获取的实体实例类型。在示例中，选择的是\
  \ `BookAuthor` 实体中的整个实例，而不是实例中包含的单个字段。由于 Jakarta Persistence 处理的是对象，查询应始终返回整个对象；如果您只想使用对象中的部分字段，则可以从查询返回的实例中调用这些字段。`object`\
  \ 关键字是可选的，主要目的是为了提高可读性。相同的 Jakarta Persistence 查询语言可以写成如下形式：\n\n`select o from BookAuthor\
  \ o`\n\nFROM 子句可以引用一个或多个标识变量，这些变量可以引用实体的名称、单值关系的元素、集合关系的元素，或者一对多关系中多端集合的成员。在示例中，`BookAuthor`\
  \ 变量指的是实体本身。\n\n\n\n■ **注意** 有关完整查询语言语法的更多信息，请参阅在线文档：[`eclipse- ee4j.github.io/jakartaee-\
  \ tutorial/#the- jakarta-`](https://eclipse-ee4j.github.io/jakartaee-tutorial/#the-jakarta-persistence-query-language)\n\
  \n[持久化查询语言](https://eclipse-ee4j.github.io/jakartaee-tutorial/#the-jakarta-persistence-query-language)。\n\
  \n![](img/index-458_1.jpg)\n\n第 9 章 ■ Jakarta 持久化查询语言\n\n9-2\\. 设置参数以筛选查询结果\n\n\
  问题\n\n您希望查询一个实体，并仅检索其中符合指定条件的实例子集。\n\n解决方案 #1\n\n编写一个动态查询，并指定可通过绑定变量绑定到查询的参数。调用查询对象的\
  \ `setParameter()` 方法，为每个绑定变量分配一个参数值。在以下示例中，编写了一个查询，用于在 Book 实体中搜索由指定作者编写的所有 Book\
  \ 实例。此示例中的 `BookAuthor` 对象是一个命名参数，将通过绑定变量绑定到查询：\n\n```java\npublic List<Book> findBooksByAuthor(BookAuthor\
  \ authorId){\n\n    return em.createQuery(\"select o from Book o \" +\n\n      \
  \      \"where :bookAuthor MEMBER OF o.authors\")\n\n            .setParameter(\"\
  bookAuthor\", authorId)\n\n            .getResultList();\n\n}\n```\n\n将返回与给定作者匹配的\
  \ Book 实例。要查看上述代码的输出，请在浏览器中打开该 URL。您的浏览器中应会打开如图 9-2 所示的页面。\n\n***图 9-2.** 配方 9-2\
  \ 解决方案 #1 的输出*\n\n第 9 章 ■ Jakarta 持久化查询语言\n\n工作原理\n\n通常，我们希望从查询中返回一个经过筛选的结果列表，而不是返回数据库表中的全部记录。在标准\
  \ SQL 中，`WHERE` 子句允许指定一个或多个表达式，从而最终筛选查询结果。使用 Jakarta 持久化查询语言时，`WHERE` 子句的工作方式相同，并且筛选查询结果的过程与使用标准\
  \ JDBC 几乎完全相同。\n\n在本配方的解决方案中，使用了 Jakarta 持久化查询语言技术来筛选针对 Book 实体的查询结果，从而仅返回与指定作者所著书籍相关的实例。`org.jakartaeerecipes.chapter09.session.BookFacade`\
  \ 类中的 `findBooksByAuthor()` 方法接受一个 `BookAuthor` 对象作为参数，然后该参数将被用于筛选查询结果。正如您将在代码中看到的，`findBooksByAuthor()`\
  \ 方法中仅用一行代码（使用了高效的 Java 构建器模式）就完成了整个任务。\n\n调用了 `EntityManager` 的 `createQuery()`\
  \ 方法，传入了一个基于字符串的 Jakarta 持久化查询语言查询，其中包含一个名为 `:bookAuthor` 的绑定变量。以下查询中的 `MEMBER OF`\
  \ 结构用于测试绑定变量的值是否包含在 `o.authors` 列表中。Jakarta 持久化查询语言字符串如下：\n\n```sql\nselect o from\
  \ Book o where :bookAuthor MEMBER OF o.authors\n```\n\n■ **注意** Java 构建器模式在以下参考资料中有详细说明：[`en.wikipedia.org/`](https://en.wikipedia.org/wiki/Builder_pattern)\n\
  \n[wiki/Builder_pattern](https://en.wikipedia.org/wiki/Builder_pattern)。\n\n创建查询对象后，可以调用\
  \ `Query` 接口的 `setParameter` 方法，传入要替换值的绑定变量的名称，以及要用来替换它的值。在本例中，传入了字符串 `bookAuthor`\
  \ 以及您希望匹配以获取 Book 实例的 Author 对象。如果需要指定多个参数，可以连续多次调用 `setParameter()`，以便每个绑定变量都有一个匹配的替换值。\n\
  \n最后，一旦设置了所有参数，就可以对 Query 对象调用 `getResultList()` 方法，返回匹配的对象。\n\n\n\n■ **注意**：Jakarta\
  \ 持久化查询语言支持两种参数类型：命名参数和位置参数。本示例以及本书中许多其他示例均使用命名参数。\n\n位置参数的写法略有不同，它们在 Jakarta 持久化查询语言中使用问号（?）表示，并且使用位置编号代替将变量名传递给\
  \ `setParameter()` 方法。本示例中使用的相同查询可以重写如下，以使用位置参数：\n\n```java\nreturn em.createQuery(\"\
  select o from Book o \" +\n\"where ? MEMBER OF o.authors\")\n.setParameter(1, authorId)\n\
  .getResultList();\n```\n\n命名参数和位置参数都能达到相同的结果。但是，我建议不要使用位置参数，因为它会使代码更难管理，尤其是在使用多个参数的情况下。此外，`setParameter()`\
  \ 调用也更容易输错，如果传递了错误的位置编号和错误的参数值，则可能会出现问题。要执行本示例中的代码，请使用浏览器访问 URL `http://localhost:8080/JakartaEERecipes_Chapter08-\
  \ 1.0- SNAPSHOT/chapter09/recipe09_02b.xhtml`。输出将类似于图 9-3。\n\n***图 9-3.** 配方 9-2\
  \ 方案 #2 的输出*\n\n**9-3. 返回单个对象**\n\n**问题**\n\n您已为某个查询指定了 Jakarta 持久化查询语言，该查询将恰好返回一个匹配的实体实例，并且您希望将其存储在一个本地对象中，以便对其执行操作。\n\
  \n**解决方案**\n\n创建一个动态查询，指定获取符合给定条件的实体实例所需的 Jakarta 持久化查询语言。该 Jakarta 持久化查询语言将包含一个绑定变量，该变量将参数绑定到查询以获取所需的实例。以下代码片段中的方法可以在\
  \ `org.jakartaeerecipe.jpa.session.chapter09.BookFacade` 类中找到（位于源码中）：\n\n```java\n\
  public Book findByTitle(String title){\n    return (Book) em.createQuery(\"select\
  \ object(o) from Book o \" +\n    \"where o.title = :title\")\n    .setParameter(\"\
  title\", title)\n    .getSingleResult();\n}\n```\n\n要调用该方法并返回结果，可以从 CDI 控制器中调用上述位于\
  \ Jakarta 企业 Bean 中的方法。随后，可以在 Jakarta Server Faces 视图中引用控制器中定义的方法来显示结果。\n\n**工作原理**\n\
  \n通过指定一个查询以及必要的参数来将可能的匹配项缩小到单个对象，可以检索单个实体实例。`jakarta.persistence.Query` 接口的 `getSingleResult()`\
  \ 方法允许仅返回一个实例，前提是只有一个实例与给定的查询规范匹配。在本配方的示例中，假设每个 `Book` 实例都有一个唯一的名称来标识它。因此，可以确保当名称绑定到查询时，它将返回单个结果。\n\
  \n如果多个实例匹配条件，则可能出现问题。尝试使用返回多个实例的查询调用 `getSingleQuery()` 将导致抛出 `NonUniqueResultException`。\n\
  \n最好在应用程序中捕获此异常，以避免在存在多个匹配实例时向用户显示难看的错误消息。另一个需要注意的情况是查询根本不返回任何结果。如果没有返回结果，则会抛出 `NoResultException`。\n\
  \n**9-4. 创建原生查询**\n\n**问题**\n\n您要对实体使用的查询包含一些特定于应用程序所使用的数据库供应商的 SQL 功能，或者您更习惯使用标准\
  \ SQL 而不是 Jakarta 持久化查询语言。也就是说，您希望使用标准 SQL 查询您的某个实体对象。\n\n■ **注意**：使用原生查询时，您将被迫处理数据库记录，而不是\
  \ Java 对象。因此，除非必要，否则建议使用 Jakarta 持久化查询语言。\n\n**方案 #1**\n\n通过调用 `EntityManager` 对象的\
  \ `createNativeQuery()` 方法创建原生查询，并将 SQL 查询作为第一个参数传递，将希望返回查询结果的实体类作为第二个参数传递。创建查询后，调用相应的\
  \ `jakarta.persistence.Query` 方法（参见表 9-1）来返回结果。以下示例取自 `org.jakartaeerecipe.jpa.session.BookFacade`\
  \ Jakarta 企业 Bean，演示了在 `Book` 实体上使用原生查询：\n\n```java\npublic List<Book> obtainNativeList(){\n\
  \    Query query = em.createNativeQuery(\n    \"select id, title, description \"\
  \ +\n    \"FROM BOOK \" +\n    \" ORDER BY id\", org.jakartaeerecipes.jpa.entity.Book.class);\n\
  \    return query.getResultList();\n}\n```\n\n在前面的示例中，每个数据库属性都将映射到 `Book` 类中的一个字段。\n\
  \n**方案 #2**\n\n在要查询的实体类中指定一个 `@NamedNativeQuery`。通过注解为 `@NamedNativeQuery` 提供名称、查询和映射类。在\
  \ EJB 方法中，调用 `EntityManager` 对象的 `createNativeQuery()` 方法，并提供指定为命名原生查询的名称，而不是 SQL\
  \ 字符串。以下代码片段演示了为 `org.jakartaeerecipes.jpa.entity.Book` 实体创建命名原生查询：\n\n```java\n\
  ...\n@Entity\n@Table(name=\"BOOK\")\n@NamedNativeQuery(\n    name=\"allBooks\",\n\
  \    query = \"select id, title, description \" +\n    \"FROM BOOK \" +\n    \"\
  ORDER BY id\",\n    resultClass=Book.class)\n...\n```\n\n接下来，让我们看看如何从 EJB 内部调用命名原生查询。以下代码片段取自\
  \ `org.jakartaeerecipes.jpa.session.BookFacade` Bean，演示了调用名为 `allBooks` 的命名原生查询：\n\
  \n```java\npublic List<Book> obtainNamedNativeList(){\n    Query query = em.createNamedQuery(\n\
  \    \"allBooks\", org.jakartaeerecipes.jpa.entity.Book.class);\n    return query.getResultList();\n\
  }\n```\n\n图 9-4 显示了查询的输出。方案 #1 和方案 #2 可以分别通过打开文件 `recipe09_04a.xhtml` 和 `recipe09_04b.xhtml`\
  \ 来执行。\n\n***图 9-4.** 配方的输出*\n\n**工作原理**\n\n原生查询提供了一种利用原生 SQL 代码从底层数据存储中检索数据的方法。它们不仅允许不熟悉\
  \ Jakarta 持久化查询语言的开发人员使用原生 SQL 编写代码，而且还允许使用原生 SQL 语法，例如 Oracle 特定的 PL/SQL 函数或存储过程调用。然而，缺点是原生查询不会以面向实体的方式返回结果，而是作为普通的旧对象返回。因此，命名原生查询提供了指定应将结果返回到的实体类的选项。\n\
  \n有几种处理原生查询的方法，我在本配方中介绍了其中两种最常用的策略。`jakarta.persistence.Query` 可以通过调用 `EntityManager`\
  \ 的 `createNativeQuery()` 方法生成，也可以通过调用 `EntityManager` 的 `createNamedQuery()` 方法并传递一个命名原生查询来生成。\n\
  \n\n\n在解决方案 #1 中，使用基于字符串的 SQL 查询将结果检索到实体类中。首先，`createNativeQuery()` 方法的第一个参数接受字符串格式的查询或命名原生查询。在解决方案\
  \ #1 中，使用一个查询来获取 BOOK 数据库表中的所有记录。`createNativeQuery()` 方法的第二个参数是一个可选的映射类，查询结果将存储到该类中。解决方案\
  \ #1 将 `Book.class` 指定为第二个参数，这会将数据库表的列映射到 Book 实体中对应的字段。一旦创建了 `Query` 实例，就可以调用其方法来执行查询。在此例中，调用了\
  \ `getResultSet()` 方法，该方法将返回匹配记录的 `List`，并将每条记录绑定到一个 `Book` 实体类实例。\n\n在解决方案 #2 中，演示了命名原生查询。命名原生查询允许在相应的实体类中一次性指定\
  \ SQL 字符串，然后只需传递分配给该命名原生查询的基于字符串的名称即可执行。要使用命名原生查询，请在要查询的实体类上添加 `@NamedNativeQuery`\
  \ 注解，然后为该注解的三个参数指定值：`name`、`query` 和 `resultClass`。对于 `@NamedNativeQuery` 注解的 `name`\
  \ 参数，必须指定一个基于字符串的名称，用于引用该查询；`query` 参数必须是原生 SQL 字符串；`resultClass` 必须是查询结果将存储到的实体类。`@NamedNativeQuery`\
  \ 还包含 `resultSetMapping` 参数，可选项用于为涉及多个表的查询指定 `SqlResultSetMapping`。要执行命名原生查询，请使用与解决方案\
  \ #1 中演示的相同技术，但改为调用 `EntityManager` 对象的 `createNamedQuery()` 方法。无需指定 SQL 字符串，而是传递在\
  \ `@NamedNativeQuery` 注解中为相应查询指定的名称。\n\n■ **注意** 如果命名查询涉及多个数据库表，则必须定义一个 `SqlResultSetMapping`。更多详情请参见配方\
  \ 9-5。\n\n在某些情况下，使用原生 SQL 查询是检索应用程序所需数据的唯一解决方案。在所有情况下，建议尽可能使用 Jakarta Persistence\
  \ 查询语言，而不是原生 SQL。然而，对于那些原生 SQL 是唯一解决方案的情况，使用本配方中提供的技术之一创建原生查询绝对是可行的方法。哪种技术更好？这取决于你需要做什么。如果你试图创建一个动态查询，即查询的实际\
  \ SQL 字符串可能会动态变化，那么标准原生查询适合你。然而，如果你指定的 SQL 查询不会以动态方式变化，那么命名原生查询可能是最佳选择，原因有二。首先，命名原生查询允许将\
  \ SQL 组织并存储在一个位置，即 SQL 所查询的实体类中。其次，命名原生查询可以实现更好的性能，因为它们在第一次执行后会被缓存。因此，下次调用命名原生查询时，无需重新编译\
  \ SQL。标准原生查询则并非如此。每次调用标准原生查询时，都必须重新编译 SQL，这最终意味着其执行速度不会那么快。\n\n第 9 章 ■ Jakarta 持久化查询语言\n\
  \n9-5\\. 查询多个实体\n\n问题\n\n所使用的 Jakarta 持久化查询语言或原生 SQL 查询引用了多个实体或底层数据库表。由于来自多个表的属性，结果无法存储到单个实体对象中。\n\
  \n解决方案 #1\n\n\n\n使用 `SqlResultSetMapping` 可以指定多个实体类来返回查询结果。通过 `@SqlResultSetMapping`\
  \ 注解，可以将结果集映射到一个或多个实体，从而轻松实现数据库表的连接。在以下示例中，`BOOK` 和 `BOOK_AUTHOR` 数据库表通过原生 SQL 查询进行连接，并使用\
  \ `SqlResultSetMapping` 返回结果。以下 `@SqlResultSetMapping` 位于 `org.jakartaeerecipe.entity.BookAuthor`\
  \ 实体类中：\n\n```java\n@SqlResultSetMapping(name=\"authorBooks\",\nentities= {\n  \
  \  @EntityResult(entityClass=org.jakartaeerecipe.entity.Book.class, fields={\n \
  \       @FieldResult(name=\"id\", column=\"BOOK_ID\"),\n        @FieldResult(name=\"\
  title\", column=\"TITLE\")\n    }),\n    @EntityResult(entityClass=org.jakartaeerecipe.entity.BookAuthor.class,\
  \ fields={\n        @FieldResult(name=\"id\", column=\"AUTHOR_ID\"),\n        @FieldResult(name=\"\
  firstname\", column=\"FIRSTNAME\"),\n        @FieldResult(name=\"lastname\", column=\"\
  LASTNAME\")\n    })\n})\n```\n\n接下来，我们来看如何使用 `SqlResultSetMapping`。以下方法取自 `org.jakartaeerecipe.session.BookAuthorFacade`\
  \ 会话 Bean：\n\n```java\n**public List findAuthorBooksMapping(){**\n    **Query qry\
  \ = em.createNativeQuery(**\n        **\"select b.id as BOOK_ID, b.title as TITLE,\
  \ \" +**\n        **\"ba.id AS AUTHOR_ID, ba.firstname as FIRSTNAME, ba.lastname\
  \ as LASTNAME \" +**\n        **\"from book_author ba, book b, author_work aw \"\
  \ +**\n        **\"where aw.author_id = ba.id \" +**\n        **\"and b.id = aw.book_id\"\
  , \"authorBooks\");**\n    **return qry.getResultList();**\n**}**\n```\n\n随后，可以在\
  \ Jakarta Server Faces 的 `dataTable` 或其他客户端数据迭代设备中引用生成的 `List`，以显示查询结果。\n\n**第 9\
  \ 章 ■ Jakarta 持久化查询语言**\n\n**解决方案 #2**\n\n利用原生查询从多个数据库表中返回所需字段，并将结果返回至 `HashMap`，而非实体类。以下方法取自\
  \ `org.jakartaeerecipe.session.BookAuthorFacade` 会话 Bean，演示了该技术：\n\n```java\npublic\
  \ List<Map> findAuthorBooks(){\n    Query qry = em.createNativeQuery(\n        \"\
  select ba.id, ba.lastname, ba.firstname, ba.bio, b.id, b.title, b.image, b.description\
  \ \" +\n        \"from book_author ba, book b, author_work aw \" +\n        \"where\
  \ aw.author_id = ba.id \" +\n        \"and b.id = aw.book_id\");\n    List<Object[]>\
  \ results = qry.getResultList();\n    List data = new ArrayList<Map>();\n    if\
  \ (!results.isEmpty()) {\n        for (Object[] result : results) {\n          \
  \  Map resultMap = new HashMap<String, Object>();\n            resultMap.put(\"\
  authorId\", result[0]);\n            resultMap.put(\"authorLast\", result[1]);\n\
  \            resultMap.put(\"authorFirst\", result[2]);\n            resultMap.put(\"\
  authorBio\", result[3]);\n            resultMap.put(\"bookId\", result[4]);\n  \
  \          resultMap.put(\"bookTitle\", result[5]);\n            resultMap.put(\"\
  bookImage\", result[6]);\n            resultMap.put(\"bookDescription\", result[7]);\n\
  \            data.add(resultMap);\n        }\n    }\n    return data;\n}\n```\n\n\
  使用此解决方案，无需 `SqlResultSetMapping`，结果会手动存储到 `Map` 中，客户端（如 Jakarta Server Faces 视图）即可引用。\n\
  \n**工作原理**\n\n当需要将 `ResultSet` 映射到两个或更多实体类时，`SqlResultSetMapping` 会非常有用。如本方案的第一种解决方案所示，通过在查询的实体类上指定\
  \ `@SqlResultSetMapping` 注解来配置映射。`SqlResultSetMapping` 在处理原生查询和连接底层数据库表时尤为实用。\n\n\
  在示例中，`@SqlResultSetMapping` 注解用于在 `Book` 和 `BookAuthor` 实体类之间创建映射。`@SqlResultSetMapping`\
  \ 注解接受几个不同的参数，如表 9-2 所述。\n\n**第 9 章 ■ Jakarta 持久化查询语言**\n\n***表 9-2.** SqlResultSetMapping\
  \ 参数*\n\n| **参数** | **描述** |\n| --- | --- |\n| name | `SqlResultSetMapping` 的基于字符串的名称\
  \ |\n| entities | 一个或多个 `@EntityResult` 注解，表示映射的实体类 |\n| columns | 一个或多个用于映射结果集的列，通过\
  \ `@FieldResult` 指定 |\n\n\n\n@ColumnResult 注解\n\n要使用 `SqlResultSetMapping`，只需在创建原生查询时指定其名称，而不是实体类。在以下摘自解决方案的示例中，查询结果被映射到\
  \ `authorBooks` 这个 `SqlResultSetMapping`：\n\n```java\nQuery qry = em.createNativeQuery(\n\
  \    \"select b.id as BOOK_ID, b.title as TITLE, \" +\n    \"ba.id AS AUTHOR_ID,\
  \ ba.firstname as FIRSTNAME, ba.lastname as LASTNAME \" +\n    \"from book_author\
  \ ba, book b, author_work aw \" +\n    \"where aw.author_id = ba.id \" +\n    \"\
  and b.id = aw.book_id\", \"authorBooks\");\n```\n\n从此查询返回的结果列表可以在客户端（例如 JSF 视图）中使用，其方式与任何包含单个实体结果的列表相同。`SqlResultSetMapping`\
  \ 允许将实体类的字段映射到指定名称，然后可以通过该名称获取映射字段的值。例如，以下 Jakarta Server Faces 的 `dataTable` 源代码取自\
  \ `chapter09/recipe09_05a.xhtml` 视图，它显示了解决方案中查询的结果列表：\n\n```xml\n<h:dataTable id=\"\
  table\" value=\"#{authorController.authorBooks}\"\n    var=\"authorBook\">\n   \
  \ <h:column>\n        <f:facet name=\"header\">\n            <h:outputText value=\"\
  Book ID\"/>\n        </f:facet>\n        <h:outputText value=\"#{authorBook.id}\"\
  />\n    </h:column>\n    <h:column>\n        <f:facet name=\"header\">\n       \
  \     <h:outputText value=\"Title\"/>\n        </f:facet>\n        <h:outputText\
  \ value=\"#{authorBook.title}\"/>\n    </h:column>\n    <h:column>\n        <f:facet\
  \ name=\"header\">\n            <h:outputText value=\"Author\"/>\n        </f:facet>\n\
  \        <h:outputText value=\"#{authorBook.firstname} #{authorBook.lastname}\"\
  />\n    </h:column>\n</h:dataTable>\n```\n\n如前所述，实体字段可以映射到原生 SQL 查询中从数据库返回的指定字段。你可以通过在\
  \ `@SqlResultSetMapping` 注解的 `columns` 参数中指定 `@FieldResult` 或 `@ColumnResult` 注解来实现这一点。例如，在示例中，你只从\
  \ `BOOK` 数据库表返回了 `TITLE` 和 `BOOK_ID` 列，以及从 `BOOK_AUTHOR` 表返回了 `AUTHOR_ID`、`FIRSTNAME`\
  \ 和 `LASTNAME` 列。你在原生查询中包含了 SQL 来连接这些表并检索这些列的值，然后返回一个与以下内容对应的 `SqlResultSetMapping`：\n\
  \n```java\n@SqlResultSetMapping(name=\"authorBooks\",\n    entities= {\n       \
  \ @EntityResult(entityClass=org.jakartaeerecipe.entity.Book.class, fields={\n  \
  \          @FieldResult(name=\"id\", column=\"BOOK_ID\"),\n            @FieldResult(name=\"\
  title\", column=\"TITLE\")\n        }),\n        @EntityResult(entityClass=org.jakartaeerecipe.entity.BookAuthor.class,\
  \ fields={\n            @FieldResult(name=\"id\", column=\"AUTHOR_ID\"),\n     \
  \       @FieldResult(name=\"first\", column=\"FIRSTNAME\"),\n            @FieldResult(name=\"\
  last\", column=\"LASTNAME\")\n        })\n    })\n```\n\n在解决方案 #2 中，没有使用 `SqlResultSetMapping`，而是将查询结果返回到一个\
  \ `HashMap` 对象列表中，而不是实体对象中。查询返回一个 `Object[]` 列表，然后可以对其进行迭代，以便客户端能够访问数据。如示例所示，在获取\
  \ `Object[]` 列表后，可以使用 `for` 循环遍历列表中的每个 `Object`，获取每个返回的数据库记录字段的数据，并将其存储到 `HashMap`\
  \ 中。要访问字段数据，请指定一个位置索引，该索引对应于你想要获取的数据库字段数据的位置。位置索引与 SQL 查询中返回字段的顺序相关，从索引 0 开始。因此，要获取查询中返回的第一个字段的数据，请在每行的\
  \ `Object` 上指定索引 0。在遍历 `Object[]` 时，可以解析每条数据库记录，依次获取该行中每个字段的数据。然后将结果数据存储到 `HashMap`\
  \ 中，并指定一个基于字符串的键，该键对应于返回字段的名称，以便客户端能够访问这些数据。\n\n\n\n当从客户端（如 JSF 视图）访问 HashMap 形式的结果集时，可以像使用标准实体列表一样访问数据。这是因为每个\
  \ HashMap 元素都包含一个与数据字段名称对应的键字段。以下摘录自 chapter09/recipe09_05b.xhtml，演示了如何使用通过此技术存储到\
  \ HashMap 中的原生查询结果：\n\n<h:dataTable id=\"table\" value=\"#{authorController.authorBooks}\"\
  \n\nvar=\"authorBook\">\n\n<h:column>\n\n<f:facet name=\"header\">\n\n<h:outputText\
  \ value=\"标题\"/>\n\n</f:facet>\n\n<h:outputText value=\"#{authorBook.bookTitle}\"\
  />\n\n</h:column>\n\n<h:column>\n\n<f:facet name=\"header\">\n\n<h:outputText value=\"\
  作者\"/>\n\n</f:facet>\n\n<h:outputText value=\"#{authorBook.authorFirst} #{authorBook.authorLast}\"\
  />\n\n</h:column>\n\n</h:dataTable>\n\n第 9 章 ■ Jakarta 持久化查询语言\n\nSqlResultSetMapping\
  \ 是一个可重复注解，因此您可以在同一个实体类中使用多个该注解，而无需将其封装在容器注解中。SqlResultSetMapping 使得通过实体类对象返回自定义查询和连接结果成为可能。这是在使用\
  \ JPA 时帮助完善对象关系映射（ORM）体验的又一项技术。\n\n9-6\\. 调用 Jakarta 持久化查询语言\n\n聚合函数\n\n问题\n\n您希望从数据库表中返回符合指定过滤条件的记录总数。例如，您希望返回指定书籍的\
  \ BookAuthor 实例总数。\n\n解决方案\n\n使用 Jakarta 持久化查询语言的聚合函数 COUNT 来返回符合给定查询的对象总数。以下位于\
  \ org.jakartaeerecipes.session.AuthorWorkFacade 类中的方法使用了 COUNT 聚合函数：\n\npublic Long\
  \ findAuthorCount(Book book){\n\nQuery qry = em.createQuery(\"select COUNT(o.authorId)\
  \ from AuthorWork o \" +\n\n\"where o.bookId = :book\")\n\n.setParameter(\"book\"\
  , book.getId());\n\nreturn (Long) qry.getSingleResult();\n\n}\n\n该函数将返回一个 Long 类型的结果，即匹配的\
  \ AuthorWork 结果数量。\n\n工作原理\n\n聚合函数是指能够根据特定条件将多行值分组以形成单个值的函数。原生 SQL 包含聚合函数，可用于计算特定表中所有行的总和、列的最大值、列中的第一个值等。\n\
  \nJakarta 持久化查询语言包含多个可在查询中使用的聚合函数。\n\n在本节中，示例演示了 COUNT 函数的使用，该函数返回底层数据存储表中的总行数。该值计算后以\
  \ Long 数据类型返回，可通过调用 jakarta.persistence.Query 对象的 getSingleResult 方法进行类型转换。\n\n\
  然而，您还可以使用其他多个函数。表 9-3 列出了这些函数及其返回类型。\n\n第 9 章 ■ Jakarta 持久化查询语言\n\n***表 9-3. 聚合函数***\n\
  \n**函数**\n\n**描述**\n\n**返回类型**\n\nCOUNT\n\n记录总数\n\nLong\n\nMAX\n\n数值最大的记录\n\n与应用字段类型相同\n\
  \nMIN\n\n数值最小的记录\n\n与应用字段类型相同\n\nAVG\n\n列中所有数值的平均值\n\nDouble\n\nSUM\n\n列中所有值的总和\n\
  \n应用于整数类型时返回 Long\n\n应用于浮点类型时返回 Double\n\n应用于 BigInteger 时返回 BigInteger\n\n应用于 BigDecimal\
  \ 时返回 BigDecimal\n\n如果某个数据库记录在应用聚合函数的列中包含 NULL 值，则在应用函数之前会先排除该 NULL 值。可以使用 DISTINCT\
  \ 关键字指定在应用函数之前排除任何重复值。以下代码行演示了 DISTINCT 的使用：\n\nQuery qry = em.createQuery(\"select\
  \ DISTINCT(COUNT(o.title)) from Book o\");\n\n\n\n使用聚合函数时需要记住的重要一点是，它们会应用于满足查询条件的所有对象中的同一字段。这类似于将函数应用于查询中单列结果返回的所有值。\n\
  \n9-7. 原生调用数据库存储过程\n\n问题\n\n您正在编写的应用程序使用 Jakarta Persistence 查询语言，并依赖一个或多个数据库存储过程来对数据执行任务。您需要能够从\
  \ Java 应用程序代码的业务逻辑中调用这些存储过程。\n\n解决方案\n\n创建一个原生查询，并编写一个执行数据库存储过程的 SQL 字符串。假设您有一个名为\
  \ `CREATE_USER` 的数据库过程，它接受两个参数：用户名和密码。您可以通过原生 SQL 查询调用 `CREATE_USER` 过程。以下名为 `createUser`\
  \ 的方法接受用户名和密码作为参数，将它们传递给底层数据库过程并执行它：\n\n```java\npublic void createUser(String user,\
  \ String pass){\n    Query qry = (Query) em.createNativeQuery(\n        \"select\
  \ CREATE_USER('\" + user + \"','\" + pass + \"') from dual\");\n    qry.getSingleResult();\n\
  }\n```\n\n**第九章 ■ Jakarta 持久化查询语言**\n\n工作原理\n\n从历史上看，从 JPA 中使用数据库存储过程的唯一方法是利用原生查询。\n\
  \n本配方的解决方案演示了这种策略，因为使用了原生查询来调用数据库存储过程。在示例中，一个名为 `createUser` 的方法接受两个参数：用户名和密码，这两个参数都通过原生查询传递给名为\
  \ `CREATE_USER` 的数据库存储过程。\n\n调用了 `EntityManager` 的 `createNativeQuery()` 方法，并将一个对存储过程执行\
  \ `SELECT` 操作的 SQL 字符串传递给该方法。在 SQL 中，对存储过程执行 `SELECT` 将导致该过程被执行。请注意，SQL 中引用了 `DUAL`\
  \ 表。`DUAL` 是一个虚拟表，当您需要对不同的数据库结构（例如存储过程）应用 `SELECT` 语句时可以使用它。\n\n执行原生 SQL 是调用无返回值存储过程或只需维护少量\
  \ SQL 语句时可接受的解决方案。然而，在大多数需要应用程序进行多次存储过程调用或需要返回值的调用场景中，配方 9-10 中的 `@NamedStoredProcedure`\
  \ 解决方案可能更有利。\n\n9-8. 使用连接从多个实体检索实例\n\n问题\n\n您希望在实体之间创建连接，以从多个底层数据库表中返回字段。\n\n解决方案\n\
  \n使用 Jakarta Persistence 查询语言在具有一对多和多对一关系的两个实体之间创建连接。在此示例中，针对 `Book` 和 `Chapter`\
  \ 实体建立了一对多关系，使得一本书可以包含多个章节。以下来自 `org.jakartaeerecipe.entity.Book` 类的摘录演示了一对多关系的声明：\n\
  \n```java\n@OneToMany(mappedBy=\"book\", cascade=CascadeType.ALL)\nprivate List<Chapter>\
  \ chapters = null;\n```\n\n`Chapter` 实体与 `Book` 实体具有多对一关系，使得多个章节可以关联到一本书。以下来自 `org.jakartaeerecipe.entity.Chapter`\
  \ 类的摘录演示了多对一关系：\n\n```java\n@ManyToOne\n@JoinColumn(name = \"BOOK_ID\", insertable\
  \ = false, updatable = false)\nprivate Book book;\n```\n\n请注意，通过将连接列标记为 `insertable=false`\
  \ 和 `updatable=false`，该关系被声明为只读。最终，连接查询包含在一个名为 `findBookByChapterTitle()` 的方法中，该方法位于\
  \ `org.jakartaeerecipe.session.Chapter` 会话 Bean 中。\n\n以下代码摘录包含了构成该方法的代码行：\n\n```java\n\
  public List<Book> findBookByChapterTitle(String chapterTitle){\n    return em.createQuery(\"\
  select b from Book b INNER JOIN b.chapters c \" +\n                          \"\
  where c.title = :title\")\n             .setParameter(\"title\", chapterTitle)\n\
  \             .getResultList();\n}\n```\n\n**第九章 ■ Jakarta 持久化查询语言**\n\n■ **注意**\
  \ 若要在 SELECT 子句中返回多个不同的属性（而非一个对象），结果将以 `Object[]` 形式返回。要了解有关使用此类解决方案的更多信息，请参考配方\
  \ 9-5 的解决方案 #2。\n\n工作原理\n\n最常见的数据库表连接操作类型称为*内连接*。执行内连接时，每个表中的所有列都可以像单个组合表一样被返回。要在两个实体之间创建连接，它们必须通过一对多关系相互关联。这意味着其中一个实体可能包含一个实例，该实例可能包含对另一个实体的多个引用，而另一个实体可能包含多个实例，这些实例仅引用前一个实体的一个实例。在本配方的示例中，`Book`\
  \ 实体与 `Chapter` 实体具有一对多关系。这意味着单本书可能包含多个章节。\n\n本配方的示例演示了 `Book` 和 `Chapter` 实体之间的连接。方法\
  \ `findBookByChapterTitle()` 包含一个 Jakarta Persistence 查询，该查询将返回包含匹配章节标题的任何 `Book`\
  \ 对象。要生成内连接查询，请调用 `EntityManager` 对象的 `createQuery()` 方法，并传递包含连接语法的基于字符串的 Jakarta\
  \ Persistence 查询。\n\n用于执行内连接的 Jakarta Persistence 查询语言字符串应按以下格式编写，其中 `INNER` 是一个可选的（默认）关键字：\n\
  \n```sql\nSELECT a.col1, a.col2 from Entity1 a [INNER] JOIN a.collectionColumn b\
  \ WHERE expressions\n```\n\n在示例中，对于每个包含 `Chapter` 实例（其标题与参数匹配）的 `Book` 实体，将返回一个完整的\
  \ `Book` 实例。通常，连接发生在外键上，并且在一对多关系的情况下，它发生在作为相关实体实例集合的字段上。\n\n9-9. 连接以检索所有行（无论是否匹配）\n\
  \n问题\n\n您希望在实体之间创建连接，以生成包含左侧实体列出的所有对象以及匹配结果的结果，如果右侧实体列出的对象没有匹配项，则返回 NULL 值。\n\n\
  解决方案\n\n在此示例中，针对 `Book` 和 `Chapter` 实体建立了一对多关系，使得一本书可以包含多个章节。以下来自 `org.jakartaeerecipes.entity.Book`\
  \ 类的摘录演示了一对多关系的声明：\n\n```java\n@OneToMany(mappedBy=\"book\", cascade=CascadeType.ALL)\n\
  private List<Chapter> chapters = null;\n```\n\n`Chapter` 实体与 `Book` 实体具有多对一关系，使得多个章节可以关联到一本书。以下来自\
  \ `org.jakartaeerecipes.entity.Chapter` 类的摘录演示了多对一关系：\n\n**第九章 ■ Jakarta 持久化查询语言**\n\
  \n```java\n@ManyToOne\n@JoinColumn(name = \"BOOK_ID\")\nprivate Book book;\n```\n\
  \n包含左外连接查询的代码位于 `findAllBooksByChapterNumber()` 方法中，该方法包含在 `org.jakartaeerecipes.session.ChapterFacade`\
  \ 类中。以下摘自该类的摘录列出了该方法的实现：\n\n```java\npublic List<Book> findAllBooksByChapterNumber(BigDecimal\
  \ chapterNumber){\n    return em.createQuery(\"select b from Book b LEFT OUTER JOIN\
  \ b.chapters c \" +\n                          \"where c.chapterNumber = :num\"\
  )\n             .setParameter(\"num\", chapterNumber)\n             .getResultList();\n\
  }\n```\n\n工作原理\n\n\n\n外连接，也称为左外连接或左连接，其出现频率不如内连接常见。用数据库术语解释外连接：在左连接（LEFT SQL join）中，会返回\
  \ JOIN 关键字左侧表中的所有行，而“左外”连接则仅返回关键字右侧表中匹配的行。换句话说，外连接允许检索一组数据库记录，即使连接中可能不存在匹配的值。用 JPA\
  \ 术语来说，将返回 JOIN 关键字左侧实体类的所有实例。\n\n实体上的外连接通常发生在两个存在一对多或多对一关系的关联实体之间。要构建 Jakarta Persistence\
  \ Query Language 查询的外连接，请使用以下格式，其中 `[OUTER]` 关键字是可选的：\n\nSELECT a.col1, a.col2 FROM\
  \ Entity1 a LEFT [OUTER] JOIN a.collectionColumn b WHERE expression\n\n在示例中，将返回所有\
  \ Book 对象，但 ResultSet 中仅包含那些符合指定条件的 Chapter 对象。\n\n9-10. 应用 Jakarta Persistence\
  \ Query Language 函数表达式\n\n问题\n\n你希望在 Jakarta Persistence Query Language 字符串中应用函数，以改变执行结果。例如，你希望修改将在\
  \ Jakarta Persistence Query Language 查询的 WHERE 子句中使用的字符串。\n\n解决方案\n\n利用任何内置的 Jakarta\
  \ Persistence Query Language 函数，将函数表达式应用于你的 Jakarta Persistence Query Language。要修改在\
  \ Jakarta Persistence Query Language 查询中使用的字符串，请开发包含将在查询的 WHERE 子句中应用的字符串函数的查询。在以下示例中，使用了\
  \ UPPER 函数来将给定文本的大小写更改为全部大写。在此例中，设置了一个搜索页面，供用户输入作者姓氏并在数据库中搜索匹配项。用户输入的字符串被转换为大写，并用于查询数据库。\n\
  \n以下代码行取自搜索视图，该视图位于 chapter09/recipe09_10.xhtml 文件中的 Jakarta Server Faces 视图内：\n\
  \n<ui:composition template=\"layout/custom_template_search.xhtml\">\n\n<ui:define\
  \ name=\"content\">\n\n<h:form>\n\n<h2>Recipe 9-10: 使用 Jakarta Persistence Query\
  \ Language 字符串函数</h2>\n\n<br/>\n\n<p>在下方输入作者姓氏以搜索作者数据库。</p>\n\n<br/>\n\n<h:outputLabel\
  \ value=\"姓氏:\"/>\n\n<h:inputText id=\"last\" value=\"#{authorController.authorLast}\"\
  \ size=\"75\"/>\n\n<br/>\n\n<br/>\n\n<h:commandButton value=\"搜索\" action=\"#{authorController.findAuthorByLast}\"\
  />\n\n</h:form>\n\n</ui:define>\n\n</ui:composition>\n\n接下来，列出了 CDI Bean 控制器方法 `findAuthorByLast()`\
  \ 的代码。此方法位于 `org.jakartaeerecipes.jsf.AuthorController` 类中。此代码负责填充 `authorList`，然后将导航定向到\
  \ `recipe09_10b.xhtml` 视图：\n\npublic String findAuthorByLast(){\n\nauthorList =\
  \ ejbFacade.findAuthorByLast(authorLast);\n\nreturn \"/chapter09/recipe09_10b.xhtml\"\
  ;\n\n}\n\n最后，名为 `findAuthorByLast(String)` 的 EJB 方法包含在 `org.jakartaeerecipes.session.BookAuthorFacade`\
  \ 类中。该方法接受用户在 Web 搜索表单中输入的字符串值，并使用它来查询数据库以查找匹配的作者，在执行比较之前将文本转换为大写：\n\npublic List<BookAuthor>\
  \ findAuthorByLast(String authorLast){\n\nreturn em.createQuery(\"select o from\
  \ BookAuthor o \" +\n\n\"where o.last = UPPER(:authorLast)\")\n\n.setParameter(\"\
  authorLast\", authorLast).getResultList();\n\n}\n\n结果页面将显示与用户输入的文本匹配的任何作者姓名。\n\n\
  工作原理\n\nJPA 查询语言包含一些函数，可用于操作字符串、执行算术运算以及更轻松地处理日期。这些函数可以在查询字符串的 WHERE 或 HAVING 子句中指定。Jakarta\
  \ Persistence Query Language 包含几个字符串函数。\n\n表 9-4 列出了可用的不同字符串函数及其功能描述。\n\n***表 9-4.**\
  \ 字符串函数*\n\n**函数**\n\n**描述**\n\nCONCAT(string1, string2)\n\n返回由两个参数连接而成的字符串\n\n\
  SUBSTRING(string, expr1, expr2)\n\n返回指定字符串的子串。子串的第一个位置由 expr1 表示，子串的长度由 expr2 表示\n\
  \nTRIM([[spec][char]FROM] str)\n\n从字符串 (str) 中修剪指定的字符 (spec)\n\nLOWER(string)\n\n\
  返回给定字符串的小写形式\n\nUPPER(string)\n\n返回给定字符串的大写形式\n\nJakarta Persistence Query Language\
  \ 中还有几个函数用于在查询中执行算术运算。表 9-5 列出了可用的不同算术函数及其功能描述。\n\n***表 9-5.** 算术函数*\n\n**函数**\n\
  \n**描述**\n\nABS(expr)\n\n返回绝对值。接受一个数值参数，并返回相同类型的数值\n\nSQRT(expr)\n\n返回平方根值。接受一个数值参数，并返回一个双精度浮点数\n\
  \nMOD(expr1, expr2)\n\n以整数格式返回模数\n\nSIZE(collection)\n\n以整数格式返回给定集合中的元素总数。如果集合不包含任何元素，则计算结果为零\n\
  \n在任何编程语言中处理日期有时都会有点棘手。Jakarta Persistence Query Language 包含一些有用的日期时间函数，使其变得更容易一些。\n\
  \n表 9-6 列出了可用的不同日期时间函数及其功能描述。\n\n***表 9-6.** 日期时间函数*\n\n**函数**\n\n**描述**\n\nCURRENT_DATE\n\
  \n返回当前日期\n\nCURRENT_TIME\n\n返回当前时间\n\nCURRENT_TIMESTAMP\n\n返回当前时间戳\n\n9-11. 强制查询执行而非使用缓存\n\
  \n问题\n\n默认的 EntityManager 正在使用数据库查询的缓存结果，你希望强制每次加载表时都执行查询，而不是显示缓存的结果。\n\n解决方案\n\n\
  在创建 `jakarta.persistence.Query` 实例后，设置一个提示 `jakarta.persistence.cache.retrieveMode`\
  \ 以绕过缓存并强制执行查询。在以下代码行中，查询了 Book 实体，并通过设置提示绕过了缓存：\n\npublic List<Book> findAllBooks(){\n\
  \nQuery qry = em.createQuery(\"select o from Book o\");\n\nqry.setHint(\"jakarta.persistence.cache.retrieveMode\"\
  , CacheRetrieveMode.BYPASS);\n\nreturn qry.getResultList();\n\n}\n\n执行时，将强制执行查询，返回底层数据库表中的最新结果，如图\
  \ 9-5 所示。\n\n***图 9-5.** 配方的输出*\n\n■ **注意** 默认情况下，Jakarta Persistence API 查询的结果会被缓存以提供最佳性能。这使得在多次使用相同查询时能够返回缓存数据。\n\
  \n工作原理\n\n\n\n在某些场景下，应用程序需要显示或使用最新的表数据来执行特定任务。例如，若你开发一个股票市场应用，缓存当前市场结果将毫无意义，因为过时数据对投资者用处不大。在这种情况下，必须强制绕过缓存直接执行查询。这可以通过向\
  \ `jakarta.persistence.Query` 实例注册提示（hint）来实现。\n\n将 `jakarta.persistence.cache.retrieveMode`\
  \ 提示设置为 `CacheRetrieveMode.BYPASS` 后，Jakarta Persistence API 将始终强制执行查询。当查询执行时，它将始终从数据库返回最新结果。\n\
  \n第 9 章 ■ Jakarta Persistence 查询语言\n\n9-12. 执行批量更新与删除\n\n问题\n\n你需要更新或删除一组实体对象。\n\
  \n解决方案\n\n使用 Criteria API 执行批量更新或删除。Criteria API 允许通过构建器模式指定实体操作。以下示例对 Employee\
  \ 实体执行了批量更新。示例方法位于 `org.jakartaeerecipes.entity.Employee` 实体的会话 Bean 类中。会话 Bean\
  \ 类名为 `org.jakartaeerecipes.session.EmployeeSession.java`，以下摘自该类的代码展示了如何执行批量更新：\n\
  \n...\npublic String updateEmployeeStatusInactive() {\n    String returnMessage\
  \ = null;\n    CriteriaBuilder builder = em.getCriteriaBuilder();\n    CriteriaUpdate<Employee>\
  \ q = builder.createCriteriaUpdate(Employee.class);\n    Root<Employee> e = q.from(Employee.class);\n\
  \    q.set(e.get(\"status\"), \"ACTIVE\")\n     .where(builder.equal(e.get(\"status\"\
  ), \"INACTIVE\"));\n    Query criteriaUpdate = em.createQuery(q);\n    int result\
  \ = criteriaUpdate.executeUpdate();\n    if (result > 0){\n        returnMessage\
  \ = result + \" records updated\";\n    } else {\n        returnMessage = \"No records\
  \ updated\";\n    }\n    return returnMessage;\n}\n...\n\n类似地，Criteria API 也可用于执行批量删除。以下同样位于\
  \ EmployeeSession Bean 中的方法演示了如何实现：\n\n...\npublic String deleteEmployeeOnStatus(String\
  \ condition) {\n    CriteriaBuilder builder = em.getCriteriaBuilder();\n    CriteriaDelete<Employee>\
  \ q = builder.createCriteriaDelete(Employee.class);\n    Root<Employee> e = q.from(Employee.class);\n\
  \    q.where(builder.equal(e.get(\"status\"), condition));\n    return null;\n}\n\
  ...\n\n第 9 章 ■ Jakarta Persistence 查询语言\n\n工作原理\n\nCriteria API 支持批量更新和删除。它允许开发者使用\
  \ Java 语言语法执行数据库查询和操作，而非直接使用 Jakarta Persistence 或 SQL。`jakarta.persistence.criteria.CriteriaUpdate`\
  \ 对象可用于执行批量更新操作，而 `jakarta.persistence.criteria.CriteriaDelete` 对象则用于执行批量删除操作。如何获取这些对象？Criteria\
  \ API 依赖于 `jakarta.persistence.criteria.CriteriaBuilder` 接口，该接口用于返回可与指定实体类配合使用的对象。`CriteriaBuilder`\
  \ 包含 `createCriteriaUpdate()` 和 `createCriteriaDelete()` 方法，分别返回 `CriteriaUpdate`\
  \ 或 `CriteriaDelete` 对象。\n\n要使用 `CriteriaBuilder`，首先需要从 `EntityManager` 获取一个 `CriteriaBuilder`\
  \ 实例。然后，你可以使用该 `CriteriaBuilder` 获取所需的 `CriteriaUpdate` 或 `CriteriaDelete` 对象。在以下代码行中，获取了一个用于\
  \ Employee 实体的 `CriteriaUpdate` 对象：\n```java\nCriteriaBuilder builder = em.getCriteriaBuilder();\n\
  CriteriaUpdate<Employee> q = builder.createCriteriaUpdate(Employee.class);\n```\n\
  获取后，即可使用 `CriteriaUpdate` 构建查询并设置所需的值，以执行必要的更新或删除。在以下摘录中，`CriteriaUpdate` 对象用于将所有状态为\
  \ `INACTIVE` 的 Employee 对象更新为 `ACTIVE`：\n\n\n\n`Root<Employee> e = q.from(Employee.class);`\n\
  \n`q.set(e.get(\"status\"), \"ACTIVE\")`\n\n`.where(builder.equal(e.get(\"status\"\
  ), \"INACTIVE\"));`\n\n我们来稍微分解一下，解释具体发生了什么。首先，通过调用 `q.from` 方法并传入你想要获取根的实体类来设置查询根，其中\
  \ `q` 是 `CriteriaUpdate` 对象。接下来，调用 `q.set` 方法，传入指向 `Employee` 状态属性的 `Path` 以及字符串\
  \ `ACTIVE`。`q.set` 方法正在执行批量更新。为了进一步细化查询，通过链式调用 `.where` 方法并传入状态为 `INACTIVE` 的 `Employee`\
  \ 对象，添加了一个 `WHERE` 子句。整个条件可以在本配方的解决方案中看到。\n\n最后，为了完成事务，你必须创建 `Query` 对象，然后使用以下代码行执行它：\n\
  \n`Query criteriaUpd = em.createQuery(q);`\n\n`criteriaUpd.executeUpdate();`\n\n\
  批量删除非常类似，区别在于不是使用 `CriteriaBuilder` 获取 `CriteriaUpdate` 对象，而是使用它来获取 `CriteriaDelete`\
  \ 对象。要获取 `CriteriaDelete` 对象，请调用 `CriteriaBuilder` 的 `createCriteriaDelete` 方法，如下所示：\n\
  \n`CriteriaBuilder builder = em.getCriteriaBuilder();`\n\n`CriteriaDelete<Employee>\
  \ q = builder.createCriteriaDelete(Employee.class);`\n\n一旦获取了 `CriteriaDelete` 对象，就需要通过调用（或链式调用）`.where`\
  \ 方法来过滤结果，从而指定删除的条件。使用批量删除时，所有符合指定条件的对象都将被删除。例如，以下代码行演示了如何删除所有状态属性等于 `INACTIVE`\
  \ 的 `Employee` 对象：`Root<Employee> e = q.from(Employee.class);`\n\n`q.where(builder.equal(e.get(\"\
  status\"), \"INACTIVE\"));`\n\n第 9 章 ■ Jakarta 持久化查询语言\n\n■ **注意** 通过使用 `MetaModel`\
  \ API，可以使演示的 `CriteriaUpdate` 和 `CriteriaDelete` 示例更加类型安全。对于特定持久化单元中的每个实体类，都会创建一个带有尾随下划线的元模型类，以及与该实体类的持久化字段相对应的属性。此元模型可用于管理实体类及其持久化状态和关系。\n\
  \n因此，与其在 `Path` 中指定容易出错的字符串来获取特定属性，不如改为指定元模型属性，如下所示：`e.get(Employee_.status)`。\n\
  \n有关使用 `MetaModel` API 创建类型安全查询的更多信息，请参考在线文档。\n\nCriteria API 可以非常详细，同时也非常强大。要了解更多关于\
  \ Criteria API 的信息，请参阅在线文档，网址为 [`eclipse- ee4j.github.io/jakartaee- tutorial/#using-`](https://eclipse-ee4j.github.io/jakartaee-tutorial/#using-the-criteria-api-to-create-queries)\n\
  \n[the- criteria- api- to- create- queries.](https://eclipse-ee4j.github.io/jakartaee-tutorial/#using-the-criteria-api-to-create-queries)\n\
  \n9-13. 检索实体子类\n\n问题\n\n你想要获取一个实体的数据，以及该实体所有子类的数据。\n\n解决方案\n\n利用 Jakarta 持久化 API\
  \ 的下转型特性。为此，在 Jakarta 持久化查询的 `FROM` 和/或 `WHERE` 子句中指定 `TREAT` 关键字，以过滤你想要检索的特定类型和子类型。在以下示例中，查询将返回所有属于\
  \ IT 书籍的 `BookStore` 实体。假设 `ItCategory` 实体是 `BookCategory` 实体的子类型。示例中名为 `getBookCategories()`\
  \ 的方法位于 `org.jakartaeerecipes.session` 包内的 `BookCategoryFacade` 会话 Bean 中：\n\n`public\
  \ List getBookCategories(){`\n\n`TypedQuery<Object[]> qry = em.createQuery(\"select\
  \ a.name, a.genre, a.description \" +`\n\n`\"from BookStore s JOIN TREAT(s.categories\
  \ as ItCategory) a\", Object[].class);`\n\n`List data = new ArrayList();`\n\n\n\n\
  if (!qry.getResultList().isEmpty()) {\n\nList<Object[]> tdata = qry.getResultList();\n\
  \nfor (Object[] t : tdata) {\n\nHashMap resultMap = new HashMap();\n\nresultMap.put(\"\
  name\", t[0]);\n\nresultMap.put(\"genre\", t[1]);\n\nresultMap.put(\"categoryDesc\"\
  , t[2]);\n\ndata.add(resultMap);\n\n}\n\n}\n\nreturn data;\n\n}\n\n第 9 章 ■ Jakarta\
  \ 持久化查询语言\n\n当调用此查询时，它将从 `ItCategory` 实体（即 `BookCategory` 实体的子类）返回数据，如前所述。为了更好地理解如何关联实体，请参考这两个实体中的完整源代码，它们位于本书源码中的\
  \ `org.jakartaeerecipe.entity` 目录下。\n\n`BookCategory.java` 和 `org.jakartaeerecipe.entity.ItCategory.java`\
  \ 文件中。\n\n工作原理\n\n*向下转型* 的定义是将基类型或类引用强制转换为其派生类型或类之一。Jakarta EE 平台通过在查询中提供获取指定实体子类引用的能力，在\
  \ Jakarta 持久化 API 中引入了向下转型的概念。换句话说，你可以显式查询一个或多个实体，并检索每个实体的属性，以及那些显式声明的实体的子类实体的任何属性。为了提供这种能力，`TREAT`\
  \ 关键字被添加到 Jakarta 持久化中。\n\n`TREAT` 运算符用于在 `FROM` 和 `WHERE` 子句的路径表达式中支持向下转型。`TREAT`\
  \ 运算符的第一个参数应是目标类型的子类型；否则，该路径被视为无值，对最终结果没有任何贡献。`TREAT` 运算符可以过滤指定的类型和子类型，并执行向下转型。\n\
  \n`TREAT` 运算符的使用语法如下：\n\nSELECT b.attr1, b.attr2\n\nFROM EntityA a JOIN TREAT(a.referenceToEntityB\
  \ as EntityBSubType) b\n\n在上述查询中，`TREAT` 操作包含来自指定实体（`EntityA`）的一个属性，该属性关联到一个被连接的实体（`EntityB`）。`TREAT`\
  \ 操作告诉容器将引用的实体（`EntityB`）视为 `EntityBSubtype` 类型。因此，向下转型发生，并允许访问那些子类型实体。以下代码行演示了此技术的实际应用：\n\
  \nSELECT a.name, a.genre, a.description\n\nFROM BookStore s JOIN TREAT(s.categories\
  \ AS ItCategory) a\n\n如前所述，`TREAT` 运算符也可以在 `WHERE` 子句中使用，以根据子类型属性值过滤查询。向下转型支持使 Jakarta\
  \ 持久化对开发者来说更加灵活，使得更复杂的查询成为可能。此技术使得从相关实体或子类型获取值更加容易，而无需发出额外的查询。\n\n9-14. 使用 ON 条件进行连接\n\
  \n问题\n\n你想要检索所有符合指定连接条件的实体，以及左外连接左侧不匹配的每个实体。\n\n解决方案\n\n利用 `ON` 条件，根据指定的过滤条件连接两个或多个实体类。以下方法包含\
  \ Jakarta 持久化查询语言，用于检索所有 `Jobs` 实体，以及属于这些 `Jobs` 的 `Employee` 实体数量。此方法名为 `obtainActiveEmployeeCount()`，利用\
  \ `ON` 条件根据 `Employee` 状态过滤连接：\n\n第 9 章 ■ Jakarta 持久化查询语言\n\npublic List obtainActiveEmployeeCount()\
  \ {\n\nTypedQuery<Object[]> qry = em.createQuery(\"SELECT j.title, count(e) \"\n\
  \n+ \"FROM Jobs j LEFT JOIN j.employees e \"\n\n+ \"ON e.status = 'ACTIVE' \"\n\n\
  + \"WHERE j.salary >= 50000 \"\n\n+ \"GROUP BY j.title\", Object[].class);\n\nList\
  \ data = new ArrayList();\n\nif (!qry.getResultList().isEmpty()) {\n\nList<Object[]>\
  \ tdata = qry.getResultList();\n\nfor (Object[] t : tdata) {\n\nHashMap resultMap\
  \ = new HashMap();\n\nresultMap.put(\"title\", t[0]);\n\nresultMap.put(\"count\"\
  , t[1]);\n\ndata.add(resultMap);\n\n}\n\n}\n\nreturn data;\n\n}\n\n工作原理\n\n\n\n\
  在编写 Jakarta Persistence 查询语言（Jakarta Persistence Query Language）时，有时需要连接两个或多个数据库表来获取相关信息。此外，通常还需要根据特定条件过滤信息，以便返回的记录数量可控。Jakarta\
  \ Persistence 查询语言的连接通常包括内连接（INNER）、外连接（OUTER）和抓取连接（FETCH）。回顾一下，内连接\n\n允许从两个表中检索数据，返回的记录在两个表中至少有一个匹配项。例如，你可能希望查询\
  \ Employee 实体并将其与 Jobs 实体连接，以便只返回那些拥有特定职位的员工。外连接允许从两个表中检索数据，返回其中一个实体（左实体）的所有记录，无论它们是否与另一个实体中的记录匹配。最后，抓取连接允许在查询执行的同时获取关联数据。Jakarta\
  \ Persistence 查询语言包含 ON 条件，允许你执行外连接并在连接中包含指定条件。这一功能在 Jakarta Persistence 查询语言的 WHERE\
  \ 子句中一直可用，但当你希望返回所有匹配记录以及那些可能不匹配的记录（如外连接）时，又该如何处理呢？\n\nJakarta Persistence 通过使用\
  \ ON 条件以简洁的方式提供了此功能。简而言之，ON\n\n条件修改了连接查询，使其能够以简洁的方式更好地控制返回的数据。\n\n为了演示这个新语法，我们先看一个\
  \ SQL 查询，然后将其与对应的 Jakarta Persistence 查询语言版本进行比较。以下 SQL 将 EMPLOYEE 表与 JOBS 表在 JOB_ID\
  \ 字段上进行连接。它还会通过 WHERE 子句中的条件，将返回的记录限制为薪资大于或等于 50,000 的记录：\n\nSELECT J.TITLE, COUNT(E.ID)\n\
  \nFROM JOBS J LEFT JOIN EMPLOYEE E\n\nON J.JOB_ID = E.JOB_ID and E.STATUS = 'ACTIVE'\n\
  \nWHERE J.SALARY >= 50000\n\nGROUP BY J.TITLE;\n\n此 SQL 将返回所有 JOB 记录，并包含每个职位中状态为\
  \ ACTIVE 的员工数量。本方案中的方法包含了此 SQL 对应的 Jakarta Persistence 查询语言版本，使用 ON 条件来执行连接。最终，ON\
  \ 条件使 Jakarta Persistence 查询语言的外连接更加简洁且易于使用。尽管在 Jakarta Persistence 查询语言的早期版本中已经提供了相同的功能，但\
  \ ON\n\n子句使得使用连接进行记录过滤变得更加容易。\n\n9-15. 使用流处理查询结果\n\n问题\n\n你希望使用简洁的函数式风格处理 Jakarta\
  \ Persistence 查询的结果。\n\n解决方案\n\n利用流来处理 Jakarta Persistence 查询的结果。在以下示例中，从 Jakarta\
  \ Persistence 查询返回了一个流。然后使用流 API 处理该流以检索所需结果。此示例演示了如何使用流按作者处理作品：\n\npublic List<AuthorWork>\
  \ performFindByAuthorStream(BookAuthor author){\n\nStream<AuthorWork> awStream =\
  \ em.createQuery(\"select object(o) from AuthorWork o\")\n\n.getResultStream();\n\
  \nreturn awStream.filter(\n\nba -> author.equals(ba.getAuthorId()))\n\n.collect(Collectors.toList());\n\
  \n}\n\n■ **注意** 此示例演示了使用流过滤 SQL 查询的结果，这可能不是最有效的方法。非常大的结果集可能会显著增加处理时间。请务必权衡使用标准 Jakarta\
  \ Persistence 查询语言与使用流的性能优势，以确保为你的情况选择最佳方案。\n\n工作原理\n\n流为处理 SQL 结果集提供了一种强大的替代方案。Jakarta\
  \ Persistence API 与 Java SE 的流 API 保持一致，允许开发者在处理结果时受益于流 API 的使用。流 API 允许以函数式方式对数据应用过滤器和函数，使处理过程更加简洁且易于理解。*Query*\
  \ 和 TypeQuery 接口的 `getResultStream()` 方法允许返回结果流，而不是列表或单个对象结果。一旦返回流，就可以对其进行相应处理。\n\
  \n分解本方案的示例，首先查询 AuthorWork 实体而不加任何过滤器。请注意，这里调用的是 `getResultStream()` 而不是 `getResultList()`。这将返回被查询对象的流。一旦返回流，就通过过滤数据来处理它，只返回那些\
  \ authorId 与传入方法的值匹配的记录。请注意用于处理的符号如下：\n\nba -> authorId.equals(ba.getAuthorId())\n\
  \n首先，请注意该语法与 lambda 处理语法非常相似。`ba ->` 部分只是一个局部变量，用于表示流中的当前对象，箭头字符用于表示处理表达式紧随其后。流中的每个对象都会被迭代，并且\
  \ `ba` 会随之改变。接下来，应用过滤器，只保留那些 authorId 等于传入方法的值的记录。然后，我们希望从该过滤过程中返回结果列表，因此使用 Collectors\
  \ 工具将过滤后的结果收集到列表中：\n\n.collect(Collectors.toList())\n\n务必记住，如果可能通过传统方式（即 SQL WHERE\
  \ 子句）过滤查询，其性能可能优于流方案。原因是默认的 `toResultStream()` 实现会将查询中的所有数据提取到内存列表中，然后进行相应处理。如果结果集很大，这可能会非常糟糕。不同的实现可能会创建不同的处理过程。在\
  \ Jakarta EE 8 发布时，Hibernate 在其 `stream()` 方法中提供了类似的功能，该方法返回的是可滚动的 ResultSet，而不是整个结果列表。这种实现在大数据集场景下性能会好得多。\n\
  \n9-16. 转换属性数据类型\n\n问题\n\n你希望在从数据库检索特定实体类属性时转换其数据类型。相应地，在将数据持久化回数据库列时，希望转换回原始数据类型。\n\
  \n解决方案\n\n创建一个属性转换器，用于在检索和持久化数据时在不同数据类型之间进行转换。\n\n假设你希望在 Java 实体中的布尔型员工完整状态与数据库中的字符串型\
  \ ACTIVE 或 INACTIVE 值之间进行转换。每次访问该属性时，都会使用转换器自动在所需数据类型之间转换值：\n\npackage org.jakartaeerecipes.converter;\n\
  \nimport jakarta.persistence.AttributeConverter;\n\nimport jakarta.persistence.Converter;\n\
  \n@Converter\n\npublic class EmployeeStatusConverter implements AttributeConverter<Boolean,\
  \ String> {\n\n@Override\n\npublic String convertToDatabaseColumn(Boolean entityValue)\
  \ {\n\nif(entityValue){\n\nreturn \"ACTIVE\";\n\n} else {\n\nreturn \"INACTIVE\"\
  ;\n\n}\n\n}\n\n@Override\n\npublic Boolean convertToEntityAttribute(String databaseValue)\
  \ {\n\nreturn databaseValue.equals(\"ACTIVE\");\n\n}\n\n}\n\n该转换器可以应用于单个实体类属性，如下所示：\n\
  \n@Column(name= \"STATUS\")\n\n@Convert(converter=org.jakartaeerecipe.converter.EmployeeStatusConverter.class)\n\
  \nprivate boolean status;\n\n\n\n在此示例中，当 Employee 对象持久化到数据库时，`true` 会被转换为\n\n\"\
  ACTIVE\"。同样，当检索 Employee 对象时，\"INACTIVE\" 状态值会被转换为 `false`。\n\n工作原理\n\n属性转换器允许在数据库列和实体类属性之间进行数据类型转换。可以通过使用\
  \ `@Converter` 注解一个类并实现 `AttributeConverter` 接口来创建属性转换器。`AttributeConverter` 类型接受两个参数，分别是实体类属性的类型和数据库列的类型。实现\
  \ `AttributeConverter` 时，必须重写两个方法。`convertToDatabaseColumn()` 方法应提供\n\n从实体类属性到数据库列类型的转换实现。同样，`convertToEntityAttribute()`\
  \ 方法应提供相反的实现，即从数据库列类型到实体类属性的转换。\n\n在本示例中，属性转换器应用于单个实体类属性。为此，需要在属性上应用 `@Convert`\
  \ 注解，并将转换器类作为参数传递。也可以通过将属性转换器上的 `@Converter` 注解更改为以下内容，将转换器应用于所有属于该实体数据类型的实体类属性：`@Converter(autoApply=true)`。\n\
  \n**第 10 章**\n\n**Jakarta Bean 验证**\n\n任何数据驱动型应用中最重要的部分之一就是数据验证。在数据插入数据库之前对其进行验证以维护完整性是至关重要的。验证的原因有很多，其中最重要的是安全目的、数据一致性和正确的格式。许多\
  \ Web 应用通过 JavaScript 在表示层进行表单数据验证，并在持久层进行验证。然而，有时 JavaScript 可能会出现问题，因为代码可能变得难以管理，并且也无法保证其一定会执行。通常认为在领域模型内执行验证是一个好主意，尽管这可能会导致代码混乱。\n\
  \n在本章中，我们将介绍 Jakarta Bean 验证 API，它用于对 JavaBean 应用验证。在 Jakarta EE 的上下文中，由于 Jakarta\
  \ Persistence 实体类是普通 Java 对象（POJO），这允许开发者在实体类和实体类属性上使用 Jakarta Bean 验证。Java 控制器类可能包含验证逻辑，以确保只有特定的数据才能传递到数据库。Jakarta\
  \ Bean 验证 API 是通过基于注解的方法，在领域模型或表示层中使用元数据执行数据验证的另一种方式。要使用此 API 进行验证，只需根据需要将验证约束注解应用于实体类属性，约束验证器将自动强制执行验证。Jakarta\
  \ Bean 验证首次随 Java EE 6 引入 Jakarta EE 平台，并在 Java EE 8 中进行了改进，\n\n为 Bean Validation\
  \ 2.0 版本引入了几个新特性。在 Jakarta Bean Validation 3.0 中，仅进行了更改以支持 Jakarta EE 中将 `javax`\
  \ 迁移到 `jakarta` 包命名空间。尽管本章将重点介绍 Jakarta Bean 验证在 Jakarta EE 中的使用，但它可以用于所有不同风格的 Java，无论是\
  \ Java FX、之前的 Java EE 版本还是 Java SE。Jakarta Bean 验证包含一个可用于手动调用验证的 API，但在大多数情况下，由于跨各种\
  \ Jakarta EE 规范的集成，验证会自动发生。\n\nJakarta Bean 验证注解约束可以应用于类型、字段、方法、构造函数、参数、容器元素和其他容器注解。验证不仅应用于对象级别，还可以从超类继承。可以验证整个对象图，这意味着如果一个类声明了一个字段，该字段的类型是另一个包含验证的类，则可能发生级联验证。\n\
  \n本章将演示每种验证类型的示例，解释每种不同方法的优势。最后，您将很好地理解 Jakarta Bean 验证 API 的工作原理，并且应该能够将 Jakarta\
  \ Bean 验证策略应用到您的应用程序中。\n\n■ **注意** Jakarta Bean 验证也允许通过 XML 声明约束，而不是注解。\n\n为简洁起见，本章将不涵盖此功能。有关更多信息，请参阅\
  \ Bean Validation 3.0 规范（https://jakarta.ee/specifications/bean-validation/3.0/jakarta-bean-validation-spec-3.0.html）。\n\
  \n© Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang，《Java EE 到 Jakarta\
  \ EE 10 实战》，https://doi.org/10.1007/978-1-4842-8079-9_10\n\n第 10 章 ■ Jakarta Bean\
  \ 验证\n\n10-1. 使用内置约束验证字段\n\n问题\n\n假设您创建了一个 Chapter 实体类，用于存储有关书籍章节的内容。在此过程中，您希望对实体类的指定字段应用验证，以便只允许符合要求的数据插入或更新到数据库中。在这种情况下，假设有几个字段必须包含值，并且您还想确保文本字符串在底层数据库字段的大小限制内。\n\
  \n解决方案 #1\n\n将相关的 Jakarta Bean 验证约束应用于您希望验证的字段。在此示例中，标准的 `@NotNull` 和 `@Size` 约束注解被放置在\
  \ Chapter 实体的特定字段上。\n\n即，`id` 属性被标记为 `@NotNull`，因此它必须包含一个值，而 `title` 属性被标记为最大长度为\
  \ 150 个字符：\n\n```java\nimport jakarta.persistence.*;\nimport jakarta.validation.constraints.NotNull;\n\
  import jakarta.validation.constraints.Size;\nimport java.math.BigDecimal;\n\n@Entity\n\
  @Table(name=\"CHAPTER\")\npublic class Chapter {\n    @Id\n    @Basic(optional =\
  \ false)\n    @NotNull\n    @Column(name = \"ID\")\n    private BigDecimal id;\n\
  \n    @Column(name=\"CHAPTER_NUMBER\")\n    private short chapterNumber;\n\n   \
  \ @Size(max = 150)\n    @Column(name=\"TITLE\")\n    private String title;\n\n \
  \   @Lob\n    @Column(name = \"DESCRIPTION\")\n    private String description;\n\
  \    ...\n}\n```\n\n解决方案 #2\n\n将相关的 Jakarta Bean 验证约束注解应用于您希望验证的字段的 getter 方法（访问器方法）。在这种情况下，以下示例展示了\
  \ `getId()` 和 `getTitle()` 方法。每个访问器方法都相应地进行了注解：\n\n第 10 章 ■ Jakarta Bean 验证\n\n\
  ```java\n@NotNull\nprivate BigDecimal getId(){\n    return this.id;\n}\n...\n@Size(max=150)\n\
  private String getTitle(){\n    return this.title;\n}\n```\n\n工作原理\n\nJakarta Bean\
  \ 验证 API 提供了几个随时可用的内置约束定义。这些标准约束涵盖了数据验证的常见用例。表 10-1 列出了每个标准验证约束注解及其描述。\n\n***表 10-1.**\
  \ 标准内置约束*\n\n| **注解**      | **描述**                                   |\n|---------------|--------------------------------------------|\n\
  | `@Null`       | 被注解的元素必须为 null                    |\n| `@NotNull`    | 被注解的元素不能为\
  \ null                    |\n| `@AssertTrue` | 被注解的元素必须为 true                  \
  \  |\n| `@AssertFalse`| 被注解的元素必须为 false                   |\n| `@Min`        | 被注解的元素必须是一个数值，其值大于或等于\
  \ |\n\n\n\n指定最小值\n\n@Max\n\n被注解的元素必须是一个数值，且其值小于或等于指定的最大值。\n\n@DecimalMin\n\n被注解的元素必须是一个十进制数，且其值大于或等于指定的最小值。\n\
  \n@DecimalMax\n\n被注解的元素必须是一个十进制数，且其值小于或等于指定的最大值。\n\n@Negative\n\n被注解的元素必须是一个严格为负数的数值。\n\
  \n@NegativeOrZero\n\n被注解的元素必须是一个负数或零。\n\n@Positive\n\n被注解的元素必须是一个严格为正数的数值。\n\n@PositiveOrZero\n\
  \n被注解的元素必须是一个严格为正数或零的数值。\n\n@Size\n\n被注解的元素的大小必须在指定的边界范围内。\n\n@Digits\n\n被注解的元素必须是一个在可接受范围内的数值。\n\
  \n（*续*）\n\n第 10 章 ■ Jakarta Bean 验证\n\n***表 10-1.*** （*续*）\n\n**注解**\n\n**描述**\n\
  \n@Past\n\n被注解的元素必须是过去的一个瞬间、日期或时间。\n\n@PastOrPresent\n\n被注解的元素必须是过去或现在的一个瞬间、日期或时间。\n\
  \n@Future\n\n被注解的元素必须是未来的一个瞬间、日期或时间。\n\n@FutureOrPresent\n\n被注解的元素必须是未来或现在的一个瞬间、日期或时间。\n\
  \n@Pattern\n\n被注解的元素必须符合指定的正则表达式约束。\n\n@NotEmpty\n\n被注解的元素不能为空或 null。\n\n@NotBlank\n\
  \n被注解的元素不能为 null，并且必须至少包含一个非空白字符。\n\n@Email\n\n被注解的字符串必须是一个格式正确的电子邮件地址。\n\n要对字段应用验证，只需在字段声明上指定内置或自定义的\
  \ Jakarta Bean 验证注解，并附上相应的约束属性。你也可以选择注解字段对应的 getter 方法，而不是字段声明本身。任何一个字段都可以应用多个注解约束。你可以根据需要组合约束。如果一个被注解的类继承了另一个包含\
  \ Jakarta Bean 验证约束的类，那么这些约束将应用于所有被注解的字段，无论该字段属于父类还是子类。\n\n属性用于将元数据与注解关联起来，以指定诸如验证失败时要显示的错误消息或要验证的字符数等信息。\n\
  \n表 10-2 列出了你会在各种不同约束中遇到的常见约束注解属性。这些都被认为是保留名称。\n\n***表 10-2.** 常见约束注解属性*\n\n**属性**\n\
  \n**描述**\n\nmessage\n\n允许指定一个字符串，用于定义要显示的错误消息。\n\ngroups\n\n指定与该约束声明关联的处理组。\n\n\
  payload\n\n指定与该约束声明关联的有效负载。\n\nvalidationAppliesTo\n\n用于指定验证约束将应用于哪个约束目标。\n\n大多数约束属性是可选的。然而，在某些情况下，应该指定某个属性。\n\
  \n例如，在应用 `@Size` 约束时，如果未指定 `max` 属性，则默认值为 2147483647。因此，考虑到用户可能永远不会输入那么大的值，应该使用\
  \ `max` 属性指定一个最大尺寸。`groups` 属性用于指定某个特定的注解约束是否属于某个处理组。验证组定义了约束的一个子集，一个组可以简单地是一个空接口。组用于控制约束的评估顺序或对\
  \ JavaBean 执行部分状态验证。要了解更多关于应用组的信息，请参考配方 10-8。`payload` 属性用于为验证注解分配一个有效负载。有效负载通常由\
  \ Bean 验证客户端用于关联某种元数据信息。有效负载通常被定义为实现 `Payload` 接口的类。可以在配方 10-2 中更详细地了解有效负载。\n\n\
  第 10 章 ■ Jakarta Bean 验证\n\n10-2. 编写自定义约束验证器\n\n问题\n\n你的应用程序需要一种特定的验证，而这种验证在内置的\
  \ Jakarta Bean 验证约束中并未提供。例如，你希望验证一本书的标题中包含“Java”这个词。\n\n解决方案\n\n为应用程序实现一个自定义约束验证器。可以通过开发一个约束注解、一个验证器实现类和一个默认错误消息来创建自定义约束。\n\
  \n下面的示例演示了一个自定义约束，用于比较一个字符串是否包含文本“Java”。此类约束的注解类可能如下所示：\n\n```java\nimport jakarta.validation.Payload;\n\
  import java.lang.annotation.*;\nimport static java.lang.annotation.ElementType.*;\n\
  import static java.lang.annotation.RetentionPolicy.RUNTIME;\n\n@Target({FIELD, ANNOTATION_TYPE})\n\
  @Retention(RUNTIME)\n@Documented\npublic @interface JavaBookTitle {\n    String\
  \ message() default \"{org.jakartaeerecipe.annotation.message}\";\n    Class<?>[]\
  \ groups() default { };\n    Class<? extends Payload>[] payload() default { };\n\
  }\n```\n\n验证器的实现应类似于 `BookTitleValidator` 类：\n\n```java\nimport jakarta.validation.*;\n\
  \npublic class BookTitleValidator implements ConstraintValidator<JavaBookTitle,\
  \ String> {\n    @Override\n    public void initialize(JavaBookTitle constraintAnnotation)\
  \ {\n    }\n\n    @Override\n    public boolean isValid(String title, ConstraintValidatorContext\
  \ constraintValidatorContext) {\n        return title.toUpperCase().contains(\"\
  JAVA\");\n    }\n}\n```\n\n现在，约束注解已经创建完成，可以将其应用于字段，如下所示：\n\n```java\n@JavaBookTitle(message\
  \ = \"Book Title Should Contain The Word Java\")\n@Column(name = \"TITLE\")\nprotected\
  \ String title;\n```\n\n第 10 章 ■ Jakarta Bean 验证\n\n工作原理\n\n创建自定义验证约束注解相当容易，尽管其实现乍看之下可能有些令人生畏。一个验证约束由以下几部分组成：\n\
  \n*   约束注解\n*   验证器实现类\n*   默认错误消息\n\n约束注解的创建方式与任何标准 Java 注解相同。注解声明是一个标准的 Java 接口。该接口必须使用\
  \ `@Target` 进行注解，并传递一个用花括号括起来的列表，该列表指定了注解可以应用的类型。`@Retention` 注解也可以在声明上指定，传递一个值来指定注解将被保留多长时间。有效值包括\
  \ `SOURCE`、`CLASS` 和 `RUNTIME`。注解声明还可以包含 `@Documented` 注解，该注解指示注解声明是否默认会被 Javadoc\
  \ 记录。\n\n注解声明接口可以包含用于将元数据关联到验证约束的元素。\n\n\n\n一个约束注解必须包含三个元素：一个类型为 String 的 message\
  \ 元素、一个 groups() 方法以及一个 payload() 方法。每个元素都可以在注解约束中声明并赋予默认值，如示例所示。message 元素用于为验证器创建默认错误消息。该消息可以包含字符串插值，也可以从资源包中加载，以利用国际化等特性。groups()\
  \ 方法用于指定该约束所属的处理组。如果未指定组且数组为空，则声明为 Default 组。payload() 方法通常用于将元数据与给定的验证约束关联起来。\n\
  \n可以使用 validationAppliesTo 元素来指定该约束关联的目标。\n\n最后，可以选择声明一个自定义元素来辅助验证值。\n\n下一段必需的代码是约束实现类。该类应实现\
  \ `CustomValidator<AnnotationType, Type>`。在实现过程中，该类必须重写 `initialize()` 和 `isValid()`\
  \ 方法。如果需要在验证之前初始化任何数据，则应在 initialize 方法中完成。`isValid()` 方法应接受待验证的数据以及 `ConstraintValidatorContext`\
  \ 作为参数。该方法的实现应验证数据并返回一个布尔值，以指示数据是否符合约束。\n\n一旦这些代码就位，就可以在目标上指定该注解进行验证。\n\n如果需要，注解应指定额外的元素来关联元数据。在示例中，注解指定了\
  \ message 元素，允许声明默认错误消息。\n\n10-3. 在类级别进行验证\n\n问题\n\n你希望验证对象中的部分或全部字段，以确保这些字段包含有效数据。例如，你必须验证声明为\
  \ `numChapters` 的字段包含的章节数量与 `List<Chapter>` 类型字段中的章节数量相同。\n\n解决方案\n\n指定类级别的约束来执行验证。在本配方的示例中，Book\
  \ 实体包含多个字段，这些字段必须相互验证才能构成一个有效对象：\n\n@ValidNumChapters\npublic class Book implements\
  \ Serializable {\n    private static final long serialVersionUID = 1L;\n    @Id\n\
  \    @Basic(optional = false)\n    @NotNull\n    @Column(name = \"ID\")\n    private\
  \ BigDecimal id;\n    @Size(max = 150)\n    @Column(name = \"TITLE\")\n    protected\
  \ String title;\n    @Size(max = 500)\n    @Column(name = \"IMAGE\")\n    private\
  \ String image;\n    @Column(name = \"NUM_CHAPTERS\")\n    private int numChapters;\n\
  \    @Column(name = \"NUM_PAGES\")\n    private int numPages;\n    @Lob\n    @Column(name\
  \ = \"DESCRIPTION\")\n    private String description;\n    @Column(name = \"PUBLISH_DATE\"\
  )\n    private LocalDate publishDate;\n    @ManyToMany(mappedBy=\"books\")\n   \
  \ private Set<BookAuthor> authors;\n    @OneToMany(mappedBy=\"book\", cascade=CascadeType.ALL)\n\
  \    private List<Chapter> chapters = null;\n    ...\n}\n\n`@ValidateNumChapters`\
  \ 注解用于验证 `numChapters` 值是否大于或等于 `chapters` 列表。按照此逻辑，一本书可能正在编写中，并且随着章节完成，可以向列表中添加更多的\
  \ Chapter 对象，但 Chapter 对象的数量不能超过 `numChapters` 值。\n\n如配方 10-2 所述，要创建 `@ValidateNumChapters`\
  \ 注解，必须有一个注解声明类和一个约束实现类。以下类用于声明注解：\n\nimport java.lang.annotation.Documented;\n\
  import static java.lang.annotation.ElementType.ANNOTATION_TYPE;\nimport static java.lang.annotation.ElementType.TYPE;\n\
  import java.lang.annotation.Retention;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
  import java.lang.annotation.Target;\nimport jakarta.validation.Payload;\n\n@Target({\
  \ TYPE, ANNOTATION_TYPE})\n@Retention(RUNTIME)\n@Documented\npublic @interface ValidNumChapters\
  \ {\n    String message() default \"{org.jakartaeerecipe.annotation.message}\";\n\
  \    Class<?>[] groups() default { };\n    Class<? extends Payload>[] payload()\
  \ default { };\n}\n\n注解类包含默认错误消息以及注解本身的声明。以下类是用于验证书中章节数量的约束验证实现：\n\npublic class\
  \ NumChaptersValidator implements ConstraintValidator<ValidNumChapters, Book> {\n\
  \    @Override\n    public void initialize(ValidNumChapters constraintAnnotation)\
  \ {\n    }\n    @Override\n    public boolean isValid(Book book, ConstraintValidatorContext\
  \ cvc) {\n        return book == null ? true: book.getChapters().size() <= book.getNumChapters();\n\
  \    }\n}\n\n一旦创建了这些类，就可以将注解相应地放置在类上。\n\n工作原理\n\n类级别的验证约束有时可能更有用，因为它可以验证类的一个或多个字段。将验证约束应用于类级别意味着所有字段都必须遵守该验证约束。\n\
  \n如果内置的验证约束应用于类级别，则类中的所有字段都必须遵守该约束。例如，如果应用了 `@NotNull`，那么每个实例中的类内每个字段都必须有值。如果类包含非\
  \ String 类型的字段，则在类级别应用诸如 `@Size` 之类的约束将不起作用。类级别的约束大多是自定义创建的，并且仅适用于类字段的指定子集。\n\n\
  在本配方的示例中，`@ValidNumChapters` 约束被放置在类级别，这意味着该约束可以访问类中的每个字段。然而，约束实现实际上只验证 `numChapters`\
  \ 和 `chapters` 字段，以确定 `List<Chapter>` 中的 Chapter 对象数量是否小于或等于 `numChapters` 值。配方\
  \ 10-2 详细介绍了注解的声明，因此这里不再赘述。\n\n本配方的关键部分是仔细查看 `NumChaptersValidator` 类中的注解实现。要创建此实现，该类必须实现\
  \ `ConstraintValidator<A extends Annotation, T>`。`ConstraintValidator` 接口使用泛型来指定约束以及将要验证的对象。在接口的签名中，`A`\
  \ 必须是注解声明类的名称，因此在本例中为 `ValidNumChapters`。`T` 是任何给定的对象，它必须解析为非参数化类型，或者 `T` 的泛型参数必须是未限定的通配符类型。在示例中，Book\
  \ 实体类被指定为 `T`。\n\n该接口强制实现 `initialize(A constraintAnnotation)` 和 `isValid(T value,\
  \ ConstraintValidatorContext context)` 方法。很多时候，initialize 方法可以为空，但如果需要，它应包含用于初始化验证器以准备调用\
  \ isValid 的代码。isValid 方法包含实际的验证逻辑。首先检查传入该方法的 Book 对象以确保其不为 null。如果为 null，则返回 true；否则，将\
  \ chapters 列表中的 Chapter 对象数量与 numChapters 值进行比较，以返回布尔结果。\n\n类级别验证非常强大，因为它允许以自定义方式验证类字段。它也非常容易实现，在验证复杂对象（例如那些包含其他对象列表的对象）时，这使得它更加强大。\n\
  \n10-4. 验证参数\n\n问题\n\n你希望对方法指定一些前置条件，使得参数遵守指定的约束。\n\n解决方案\n\n\n\n将验证约束注解应用于方法参数，使得这些参数能够通过内置或自定义约束进行验证。这将在方法调用时强制执行约束逻辑，从而只有满足指定约束的参数才能作为给定方法的入参。以下示例展示了一个接受参数的方法，并包含验证约束：\n\
  \n```java\npublic void submitEmailAddress(@Email String emailAddress){\n    System.out.println(\"\
  Do something with the address: \" + emailAddress);\n}\n```\n\n在此示例中，仅验证了一个参数。然而，也可以包含多个带有验证约束的参数。此外，还可以在方法级别添加跨参数约束，用于对所有方法参数进行统一验证。\n\
  \n### 工作原理\n\nJakarta Bean Validation 允许在方法参数上添加验证约束，以此作为前置条件，确保无效数据无法传入方法。无论是内置约束还是自定义约束，均可应用于方法参数。如果向包含参数约束的方法传入了无效值，则会抛出验证错误，并且该方法不会执行。\n\
  \n在示例中，`submitEmailAddress` 方法接受一个参数 `emailAddress`。如果该参数不符合 `@Email` 验证约束所指定的有效电子邮件格式，则方法调用将失败。此外，还可以通过在方法本身上应用约束验证来验证多个方法参数。这与应用类级别约束（参见配方\
  \ 10-3）的方式类似，约束可以是内置的，也可以是自定义的。在方法级别应用的内置约束（如 `@NotNull`）将作用于该方法的每一个参数。自定义约束的创建方式与配方\
  \ 10-3 中所示相同，可用于验证一个或多个参数。放置在方法级别的约束必须在 `ConstraintValidator` 实现中使用 `@SupportedValidationTarget`\
  \ 注解进行配置，以指明该约束应作用于方法级别。这是因为返回类型约束也放置在方法级别，因此 `@SupportedValidationTarget` 有助于区分应执行哪种验证类型。以下代码示例演示了如何编写一个针对方法级别使用的约束验证实现：\n\
  \n```java\n@SupportedValidationTarget(value = ValidationTarget.PARAMETERS)\npublic\
  \ class ValidEmployeeEmailValidator implements ConstraintValidator<ValidEmployeeEmail,\
  \ Object[]> {\n\n    @Override\n    public void initialize(final ValidEmployeeEmail\
  \ constraintAnnotation) {\n        // 无操作\n    }\n\n    @Override\n    public boolean\
  \ isValid(final Object[] parameters, final ConstraintValidatorContext context) {\n\
  \        // 确保员工电子邮件来自本组织\n        return parameters == null || parameters[0].toString().contains(\"\
  @acme.com\");\n    }\n}\n```\n\n## 10-5. 构造函数验证\n\n### 问题\n\n您希望通过验证构造函数参数来验证类的实例化。\n\
  \n### 解决方案\n\n将验证约束注解应用于单个构造函数参数，或直接应用于构造函数本身以执行验证。在以下示例中，构造函数级别使用了 `@NotNull` 注解。因此，`@NotNull`\
  \ 验证约束将应用于该构造函数的每一个参数：\n\n```java\n@NotNull\npublic ConstructorValidationController(String\
  \ parameterOne, String parameterTwo){\n    this.p1 = parameterOne;\n    this.p2\
  \ = parameterTwo;\n}\n```\n\n### 工作原理\n\n在某些情况下，验证实例化时传入类的参数是合理的。Jakarta Bean Validation\
  \ 通过允许将约束注解应用于类构造函数的参数或构造函数本身，使这一过程变得简单。当注解放置在类构造函数的参数上时，如果验证失败，则无法实例化该类。类似地，如果约束注解直接放置在构造函数声明上，则该约束将应用于所有构造函数参数。这种应用于构造函数级别的约束称为跨参数约束。\n\
  \n在示例中，一个跨参数的 `@NotNull` 注解被应用于类的构造函数。构造函数的每个参数都必须包含一个值；否则，验证将失败，并且该类不会被实例化。如前所述，如果将自定义注解放置在构造函数上，它可以验证一个或多个参数，就像方法级别约束一样。\n\
  \n> **注意**：请特别注意，避免因子类型构造函数约束而导致意外行为。在对类或类构造函数应用验证约束时，牢记类层次结构非常重要。\n\n## 10-6. 验证返回值\n\
  \n### 问题\n\n您希望验证方法的返回值，使得返回的值必须符合某个约束。如果返回值不符合，则应抛出验证异常。\n\n### 解决方案\n\n在方法签名的返回类型上放置验证约束，以确保结果符合验证约束。在以下示例中，方法的返回类型通过放置在方法级别的注解进行验证。在这种情况下，返回的值必须是电子邮件地址格式：\n\
  \n```java\n@Email\npublic String getEmailAddress(){\n    return emailAddress;\n\
  }\n```\n\n### 工作原理\n\n放置在方法级别的验证约束注解可以针对返回值验证。这样做时，方法必须返回符合约束的有效值；否则，将抛出 Bean 验证异常。为了确保放置在方法级别的约束是针对返回类型验证的，验证器实现必须包含\
  \ `@SupportedValidationTarget` 注解，该注解指定验证器是应用于参数还是方法本身。如果验证约束实现未包含此规范，Jakarta Bean\
  \ Validation API 将无法确定验证应应用于何处。在这种情况下，实现应指定以下内容：\n\n```java\n@SupportedValidationTarget(value\
  \ = ValidationTarget.ANNOTATED_ELEMENT)\n```\n\n与许多其他验证类型一样，返回值验证可以使用标准约束和自定义约束。\n\
  \n## 10-7. 定义动态验证错误消息\n\n### 问题\n\n您希望提供一条动态错误消息，其中包含与约束验证值相关的信息。\n\n### 解决方案\n\n\
  在 Jakarta Bean Validation 的 `message` 属性中使用字符串插值。字符串插值允许将消息参数和消息表达式放入消息字符串中，从而创建动态的基于字符串的消息。在以下示例中，字符串值的实际长度将被替换到消息中，以提供更多反馈信息：\n\
  \n```java\n@Size(max = 150, message=\"标题不能超过 {max} 个字符，当前标题为 '$'{validatedValue}'\"\
  )\n@Column(name = \"TITLE\")\nprotected String title;\n```\n\n### 工作原理\n\n为用户提供清晰的错误消息可能决定应用程序的成败。在错误消息中使用字符串插值有助于向用户提供具体信息，以帮助指示验证失败的原因。与替换变量的工作方式类似，错误消息可以包含零个或多个可被替换的变量。\n\
  \n\n\n■ **注意**：字符串插值需要在项目中提供 Jakarta 表达式语言库。\n\n如果未将表达式语言 API 及其实现库添加到项目中，运行时将抛出错误。可通过添加以下\
  \ Maven 依赖项来满足此要求：\n\n<dependency>\n\n<groupId>jakarta.el</groupId>\n\n<artifactId>jakarta.el-api</artifactId>\n\
  \n<version>5.0.0</version>\n\n</dependency>\n\n<dependency>\n\n<groupId>org.glassfish.web</groupId>\n\
  \n<artifactId>jakarta.el</artifactId>\n\n<version>2.2.6</version>\n\n</dependency>\n\
  \n要使用字符串插值，可以用花括号将变量括起来，该变量将被替换为动态值。约束属性可以通过将属性放在花括号内进行插值。在示例中，`max` 属性将被替换为 `{max}`\
  \ 字符串插值。\n\n可以通过使用 EL 表示法指定已验证的值或自定义表达式变量来替换消息中的值，即将其括在花括号内，并在前面加上 `$`。在\n\n第 10\
  \ 章 ■ Jakarta Bean 验证\n\n示例中，`$'{validatedValue}'` 变量就是这样一个例子。当生成错误消息时，`$'{validatedValue}'`\
  \ 会被替换为当前已验证的值。\n\n消息插值分阶段进行，按以下顺序概述：\n\n1)  使用消息参数作为键，从名为 `ValidationMessages.properties`\
  \ 的资源包中解析任何消息参数。\n\n2)  使用消息参数作为键，从包含内置约束标准错误消息的资源包中解析任何消息参数。\n\n3)  使用值约束注解成员来替换消息参数。因此，消息参数将直接被同名的值约束注解成员替换。\n\
  \n4)  使用统一表达式语言的表达式求值来解析任何消息参数。这使我们能够基于条件逻辑来构建错误消息，并实现高级格式化。\n\n字符 `{`、`}` 和 `$`\
  \ 是消息描述符的特殊字符。因此，如果希望在验证错误消息中使用这些字符之一，必须在其前面加上 `\\` 进行转义。\n\n因此，要转义 `$`，应使用 `\\\
  $`。\n\n如果需要，可以通过插入自定义的 `MessageInterpolator` 实现来定义自定义消息插值算法。要开发自定义插值器，请实现 `jakarta.validation.MessageInterpolator`\
  \ 接口。该插值器必须是线程安全的，并且建议将最终实现委托给默认插值器。默认插值器可通过调用 `Configuration.getDefaultMessageInterpolator()`\
  \ 获得。更多信息，请参考 Jakarta Bean Validation 规范 (https://jakarta.ee/specifications/bean-validation/3.0/jakarta-bean-validation-spec-3.0.html)。\n\
  \n10-8. 手动调用验证器引擎\n\n问题\n\n您希望以编程方式调用 Jakarta Bean Validation 验证器引擎，而不是依赖自动调用。\n\
  \n解决方案\n\n使用验证器 API 执行验证。验证器 API 允许从几种不同的验证类型（即参数、返回值、类等）创建可执行验证器。以下示例演示了如何手动验证给定实体类的数据。在以下示例中，一个使用\
  \ Jakarta Bean Validation 约束注解的 `Book` 实体类被手动实例化，并使用验证器 API 进行验证：\n\nValidatorFactory\
  \ factory = Validation.buildDefaultValidatorFactory();\n\nValidator validator =\
  \ factory.getValidator();\n\nBook book = new Book();\n\nbook.setId(BigDecimal.ONE);\n\
  \nbook.setTitle(\"The Best Java Book\");\n\n\n\nSet<ConstraintViolation<Book>> violations\
  \ = validator.validate(book);\n\nfor(ConstraintViolation<Book> violation: violations){\n\
  \nSystem.out.println(violation.getMessage());\n\n}\n\n第 10 章 ■ Jakarta Bean 验证\n\
  \n工作原理\n\nJakarta Bean 验证通常在 Jakarta EE 环境中自动调用。例如，如果使用 Jakarta Server Faces，当表单通过\
  \ Ajax 同步或异步提交时，验证会在“处理验证”阶段自动进行。在某些情况下，手动调用 Validator API 的选项会很有用。这在 Java SE 环境或编写单元测试时可能非常有用。\n\
  \n要调用 Validator API，首先通过调用 `Validation.buildDefaultValidatorFactory()` 创建一个 `ValidatorFactory`。接着，使用该工厂生成一个\
  \ `Validator`。最后，通过调用验证器的 `validate()` 方法并传入要验证的 bean 来验证该 bean。该方法将返回一个 `Set<ConstraintViolation<T>>`\
  \ 对象。然后，您可以遍历每个返回的验证错误，并通过调用 `ConstraintViolation.getMessage()` 方法获取每个错误。\n\n添加以下\
  \ Maven 依赖项后，该配方可以作为独立的 Java 应用程序在命令行中执行以进行测试：\n\n<dependency>\n\n<groupId>org.hibernate.validator</groupId>\n\
  \n<artifactId>hibernate-validator</artifactId>\n\n<version>7.0.4.Final</version>\n\
  \n</dependency>\n\n10-9\\. 分组验证约束\n\n问题\n\n您希望将多个验证约束分组在一起，以便整个验证组可以同时进行。\n\n解决方案\n\
  \n可以通过约束注解的 `groups` 属性指定注解所属的组，从而将组应用于约束注解。组本身通过 Java 接口生成。以下接口定义了 `BookGroup`：\n\
  \npublic interface BookGroup {\n\n}\n\n第 10 章 ■ Jakarta Bean 验证\n\n通过在 `groups`\
  \ 注解属性中指定接口，可以将 `BookGroup` 组应用于一个或多个约束注解，如下例所示：\n\n...\n\n@Entity\n\n@Table(name\
  \ = \"BOOK\")\n\n@NamedNativeQuery(\n\nname=\"allBooks\",\n\nquery = \"select id,\
  \ title, description \" +\n\n\"FROM BOOK \" +\n\n\"ORDER BY id\",\n\nresultClass=Book.class)\n\
  \n@NamedQueries({\n\n@NamedQuery(name = \"Book.findAll\", query = \"SELECT b FROM\
  \ Book b\")})\n\n@XmlRootElement\n\n@ValidNumChapters\n\npublic class Book implements\
  \ Serializable {\n\nprivate static final long serialVersionUID = 1L;\n\n@Id\n\n\
  @Basic(optional = false)\n\n@NotNull\n\n@Column(name = \"ID\")\n\nprivate BigDecimal\
  \ id;\n\n@JavaBookTitle(message = \"书籍标题应包含单词 Java\")\n\n**@Size(max = 150, message=\"\
  标题不能超过 {max} 个字符，当前标题为**\n\n**$'{validatedValue}'\", groups={BookGroup.class})**\n\
  \n@Column(name = \"TITLE\")\n\nprotected String title;\n\n@Size(max = 500)\n\n@Column(name\
  \ = \"IMAGE\")\n\nprivate String image;\n\n@NotNull(**groups={BookGroup.class}**)\n\
  \n@Column(name = \"NUM_CHAPTERS\")\n\nprivate int numChapters;\n\n@Column(name =\
  \ \"NUM_PAGES\")\n\nprivate int numPages;\n\n@Lob\n\n@NotNull(**groups={BookGroup.class}**)\n\
  \n@Column(name = \"DESCRIPTION\")\n\nprivate String description;\n\n@Column(name\
  \ = \"PUBLISH_DATE\")\n\nprivate LocalDate publishDate;\n\n@ManyToMany(mappedBy=\"\
  books\")\n\nprivate Set<BookAuthor> authors;\n\n第 10 章 ■ Jakarta Bean 验证\n\n@OneToMany(mappedBy=\"\
  book\", cascade=CascadeType.ALL)\n\nprivate List<Chapter> chapters = null;\n\npublic\
  \ Book() {\n\n}\n\n...\n\n一旦组被设置好，就可以针对组进行验证，这将导致分配给该组的每个约束注解都被验证。以下是一个简要示例，说明如何利用验证\
  \ API 基于组进行验证：\n\nValidatorFactory factory = Validation.buildDefaultValidatorFactory();\n\
  \nValidator validator = factory.getValidator();\n\n...\n\nSet<ConstraintViolation<Book>>\
  \ violations = validator.validate(book, \"bookGroup\"); for(ConstraintViolation<Book>\
  \ violation: violations){\n\nSystem.out.println(violation.getMessage());\n\n}\n\n\
  工作原理\n\n\n\n将组应用于约束注解，可以使该注解与应用了相同组的其他注解共同形成一个分组。在执行需要始终验证指定约束集的任务时，制定注解组会非常有用。验证可以在组级别进行，从而根据需要验证约束组。\n\
  \n要创建组，必须使用一个接口。该 Java 接口应为空，并充当组的占位符。通过指定注解的 `groups` 属性并向其传递一个组列表，可以将组应用于约束注解。`groups`\
  \ 属性接受列表中的一个或多个组。以下示例演示了一个名为 `BookGroup` 的单个组被应用于注解约束：\n\n@NotNull(groups={BookGroup.class})\n\
  \n@Column(name = \"NUM_CHAPTERS\")\n\n要验证一组约束，请将要验证的一个或多个组传递给 `Validator` 的 `validate()`\
  \ 方法。在示例中，验证了单个组 `BookGroup`，但如果还有更多组需要验证，则会使用以下语法：\n\nvalidator.validate(book,\
  \ \"group1\", \"group2\");\n\n与配方 10-8 类似，本配方中的代码也可以在命令行中作为独立应用程序执行。只需确保已在 Maven\
  \ 依赖项中添加了 `hibernate-validator` 或任何其他 Jakarta Bean Validator 的参考实现。\n\n**第 11 章**\n\
  \n**Jakarta 上下文与依赖**\n\n**注入**\n\nJakarta EE 平台中最重要的规范之一是 Jakarta 上下文与依赖注入。正如 [cdi-spec.org](http://cdi-spec.org)\
  \ 网站所述，它是一套互补的服务，可以改善代码的整体结构和设计。根据 [cdi-spec.org](http://cdi-spec.org) 的说法，该规范为\
  \ Jakarta EE 和 Java SE 应用程序提供了以下特性：\n\n• 具有明确定义的生命周期的上下文对象，提供多种作用域的可用性\n• 能够在上下文对象与统一表达式语言\
  \ (EL) 之间直接绑定\n• 利用易于使用的类型安全系统进行依赖注入\n• 将拦截器绑定到上下文对象\n• 事件通知模型\n• 可移植扩展 SPI\n\n\
  如列表所述，Jakarta CDI 最广泛使用的特性之一可能是将 Jakarta EE 平台的 Web 层与业务逻辑层或事务层绑定在一起的能力。Jakarta\
  \ CDI 使得通过 EL 公开业务对象以便在 Web 视图中使用变得容易，从而开发者可以直接将 Jakarta Server Faces 视图组件绑定到公共\
  \ JavaBean 成员和方法。另一个广泛使用的特性是以类型安全且高效的方式将上下文类和资源注入到其他 Java 对象中。\n\n■ **注意** Jakarta\
  \ Faces ([`github.com/jakartaee/faces`](https://github.com/jakartaee/faces)) 是 Jakarta\
  \ EE 的开源规范，以前称为 Java Server Faces。\n\nJakarta CDI 基于两种方法论构建：上下文和依赖注入。*上下文*提供了将有状态组件的生命周期和交互绑定到定义明确但范围广泛的上下文的能力。在\
  \ Jakarta EE 教程中，*依赖注入*被定义为以类型安全的方式将组件注入应用程序的能力，包括在部署时选择注入特定接口的哪个实现的能力。要使用 Jakarta\
  \ CDI，开发者应熟悉一系列可用于装饰对象和注入组件的注解。本章将介绍演示此类注解及其使用位置的配方。\n\n© Josh Juneau 和 Tarun Telang\
  \ 2022\nJ. Juneau 和 T. Telang, *Java EE 到 Jakarta EE 10 配方*[, https://doi.org/10.1007/978-1-4842-8079-9_11](https://doi.org/10.1007/978-1-4842-8079-9_11#DOI)\n\
  \n第 11 章 ■ Jakarta 上下文与依赖注入\n\n由于 Jakarta CDI 提供了高度的松散耦合，它是任何 Java 企业应用程序的重要组成部分。那些正确使用\
  \ Jakarta CDI 的应用程序可以变得非常高效，因为 Jakarta CDI 提供了资源的解耦以及强类型，通过使用声明式 Java 消除了对基于字符串的托管资源名称的需求。本章将涵盖这一重要规范的广泛使用的特性，并涉及一些新特性，包括异步事件以及用于在\
  \ Java SE 环境中启动 Jakarta CDI 的 API。\n\n11-1. 注入上下文 Bean 或其他对象\n\n问题\n\n您希望从另一个类中使用上下文\
  \ Bean 或其他对象，以利用该 Bean 的状态。\n\n解决方案\n\n利用依赖注入使该 Bean 或对象可从另一个类中使用。以下类表示一个可以注入到另一个类中的对象：\n\
  \npackage org.jakartaeerecipe.chapter11;\n\nimport jakarta.inject.Named;\n\n@Named(\"\
  myBean\")\n\n@RequestScoped\n\npublic class CalculationBean implements java.io.Serializable{\n\
  \n    private int num1 = 0;\n    private int num2 = 1;\n    private int sum;\n\n\
  \    public CalculationBean() { }\n\n    // getters and setters\n    // ...\n\n\
  \    public int addNumbers(int[] numArray) {\n        System.out.println(\"addNumbers()\
  \ called...\");\n        setSum(getNum1() + getNum2());\n    }\n\n}\n\n如您所见，`CalculationBean`\
  \ 类代表一个标准的 Java 对象。这个对象可以通过使用 `@Inject` 注解注入到另一个类中。以下位于源码中与 `CalculationBean` 相同包内的类演示了如何注入一个对象。请注意，`CalculationBean`\
  \ 从未被显式实例化；相反，它被注入了：\n\npackage org.jakartaeerecipe.chapter11;\n\nimport jakarta.inject.Inject;\n\
  \n@Named\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\npublic class Calculator {\n\n    @Inject\n\
  \    CalculationBean calcBean;\n\n    public void performCalculation(){\n      \
  \  calcBean.addNumbers();\n    }\n\n}\n\n在示例中，`CalculationBean` 被注入到 Bean 中。一旦 Bean\
  \ 或资源被注入到另一个 Java 类中，就可以像引用该类本地的对象一样引用它。`@Inject` 注解可用于将字段、方法和构造函数标记为可注入。\n\n工作原理\n\
  \n依赖注入的概念大大减少了开发者从另一个 Java 类中获取上下文 Java 对象引用所需的开销。Jakarta EE 栈使得从另一个类中获取几乎任何 Java\
  \ 对象的引用变得非常容易。依赖注入指的是以类型安全的方式将组件注入应用程序的能力，包括在部署时选择注入特定接口的哪个实现的能力。Jakarta CDI 允许几乎任何\
  \ Java 对象在很少配置的情况下注入到另一个对象中。这种能力提高了资源的可用性，因为此类资源可以从任意数量的不同类中引用，并且在任何使用它们的地方都保持相同的状态。使用\
  \ Jakarta CDI，几乎任何对象都可以被注入到任何地方。\n\n以下是一些可以被注入的 Java 对象：\n\n• 几乎任何 Java 类\n• Session\
  \ Bean\n• Jakarta EE 资源：数据源、JMS 主题、队列、连接工厂\n• 持久化上下文\n• 生产者字段\n• 由生产者方法返回的对象\n•\
  \ Web 服务引用\n• 远程 EJB 引用\n\n要将资源注入到另一个资源中，应用程序模块或 JAR 文件必须包含一个包含 `beans.xml` 配置文件的\
  \ `META-INF` 目录。`beans.xml` 文件可以为空，也可以包含一个描述符来自定义应用程序内组件扫描的方式。因此，`beans.xml` 中的配置可能会根据应用程序的\
  \ Bean 发现模式而略有不同。\n\n\n\n然而，出于本示例的目的（以及大多数通用 Jakarta CDI 用例），`beans.xml` 文件指定应对应用程序内的所有类进行\
  \ bean 发现：\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<beans\n\nxsi:schemaLocation=\"\
  https://jakarta.ee/xml/ns/jakartaee https://jakarta.ee/xml/ns/\n\njakartaee/beans_4_0.xsd\"\
  \n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\nversion=\"4.0\"\n\nbean-discovery-mode=\"all\"\
  >\n\n</beans>\n\n`bean-discovery-mode` 属性指示扫描应如何进行。值为 `all` 表示处理所有组件，`annotated`\
  \ 表示仅处理包含类级别注解的组件，而 `none` 则有效禁用 Jakarta CDI。\n\n接下来，必须使用 `jakarta.inject.Inject`\
  \ 注解（`@Inject`）来标记被注入的类，方法是在对象类型的类成员上添加该注解。例如，如果要注入一个 `TypeA` 类型的 Java 对象，你需要声明一个\
  \ `TypeA` 类型的类变量，并用 `@Inject` 注解它，如下所示：\n\n@Inject\n\nTypeA myTypeVar;\n\n请注意，用于注入的对象（`CalculationBean`）在类级别包含一个\
  \ `@Named` 注解。除非 `bean-discovery-mode=\"annotated\"`，否则该注解并非使对象可用于注入的必要条件。`@Named`\
  \ 注解允许为对象提供自定义名称，并且还使该对象可从统一表达式语言中进行引用。\n\n一旦执行了上述注入，声明的字段就可以在整个类中使用，因为它是对指定 Java\
  \ 类型的原始类的直接引用。通过为注入的 bean 定义特定的作用域（配方 11-5），你可以指示注入的对象是会导致实例化该类型的新对象，还是会查找该类型的现有对象并重用。到目前为止，使用\
  \ Jakarta CDI 最方便、最有用的场景之一，就是能够将受管 bean 注入到另一个对象中，并利用其当前状态，仿佛其内容无处不在。\n\nJakarta\
  \ CDI 提供了类型安全的注入，因为无需指定基于字符串的名称来实例化或引用另一个对象。通过维护用作注入点的已声明变量，变量名本身就提供了强类型，从而减少了可能出现的错误数量。\n\
  \n11-2. 将 Bean 绑定到 Web 视图\n\n问题\n\n你想使用统一表达式语言（EL）将一个 JavaBean 绑定到 Jakarta Server\
  \ Faces 视图。\n\n解决方案\n\n使用 `@Named` 注解标注一个类，并可选择以字符串格式为类指定一个名称。\n\n`@Named` 注解中指定的字符串可用于从\
  \ Jakarta Server Faces 视图中获取对 bean 的引用。如果未指定可选的字符串，则使用首字母小写的类名来获取引用。以下示例演示了将 bean\
  \ 字段和方法绑定到 Jakarta Server Faces 视图。下面的 Java 类名为 `CalculationBean`，是一个 Jakarta CDI\
  \ 受管 bean，包含 `@Named` 注解，并将 `myBean` 指定为 bean 引用名称：\n\nimport jakarta.enterprise.context.RequestScoped;\n\
  \nimport jakarta.inject.Named;\n\n@Named(\"myBean\")\n\n@RequestScoped\n\npublic\
  \ class CalculationBean implements java.io.Serializable{\n\nprivate int num1 = 1;\n\
  \nprivate int num2 = 0;\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\nprivate int sum;\n\npublic\
  \ CalculationBean(){\n\n}\n\npublic void addNumbers(){\n\nSystem.out.println(\"\
  Called\");\n\nsetSum(getNum1() + getNum2());\n\n}\n\n// getters 和 setters ...\n\n\
  }\n\n该 bean 通过基于字符串的名称 `myBean` 绑定到 Jakarta Server Faces 视图，实现了 Web 视图与后端业务逻辑的无缝绑定。以下\
  \ Jakarta Server Faces 视图包含三个字段和一个 Jakarta Server Faces `commandButton` 组件，其操作通过\
  \ Jakarta Server Faces EL 绑定到 `myBean`：\n\n<html\n\n>\n\n<h:head>\n\n<meta http-equiv=\"\
  Content-Type\" content=\"text/html; charset=UTF-8\"/>\n\n<title>配方 11-2：将 Bean 绑定到\
  \ Jakarta Server Faces 视图</title>\n\n</h:head>\n\n<h:body>\n\n<p>\n\n<h:form>\n\n\
  <h:inputText value=\"#{myBean.num1}\"/>\n\n<br/>\n\n<h:inputText value=\"#{myBean.num2}\"\
  />\n\n<br/><br/>\n\n总和: <h:outputText id=\"sum\" value=\"#{myBean.sum}\"/>\n\n<br/><br/>\n\
  \n<h:commandButton value=\"计算\" type=\"submit\" action=\"#{myBean.addNumbers}\"\
  >\n\n</h:commandButton>\n\n</h:form>\n\n</p>\n\n</h:body>\n\n</html>\n\n如前所述，当指定\
  \ `@Named` 注解但未提供基于字符串的名称时，绑定名称将从类名派生，并将类名的首字母转换为小写。对于以下示例，假设前面示例中引用的 `CalculationBean`\
  \ 类将通过 EL 从 Jakarta Server Faces 视图中引用，只是 `@Named` 注解中未指定基于字符串的标识符。由于 `@Named` 注解未指定名称，EL\
  \ 将按如下方式引用类名：\n\n<html\n\n>\n\n<h:head>\n\n<meta http-equiv=\"Content-Type\" content=\"\
  text/html; charset=UTF-8\"/>\n\n<title>配方 11-2：将 Bean 绑定到 Jakarta Server Faces 视图</title>\n\
  \n</h:head>\n\n![](img/index-505_1.png)\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\n<h:body>\n\
  \n<p>\n\n<h:form>\n\n<h:inputText value=\"#{calculationBean.num1}\"/>\n\n<br/>\n\
  \n<h:inputText value=\"#{ calculationBean.num2}\"/>\n\n<br/><br/>\n\n总和: <h:outputText\
  \ id=\"sum\" value=\"#{ calculationBean.sum}\"/>\n\n<br/><br/>\n\n<h:commandButton\
  \ value=\"计算\" type=\"submit\" action=\"#{ calculationBean.\n\naddNumbers()}\">\n\
  \n</h:commandButton>\n\n</h:form>\n\n</p>\n\n</h:body>\n\n</html>\n\n**@MANAGEDBEAN\
  \ 对比 @NAMED？**\n\n如果 `@Named` 注解可用于为 Jakarta CDI bean 指定绑定名称，那么使用 `@ManagedBean`\
  \ 注解的意义何在？事实上，`@ManagedBean` 注解是从早期版本的 Jakarta Server Faces 继承而来的。虽然它仍然是一种将 bean\
  \ 标记为受管并为 Jakarta Server Faces 提供绑定标识符的有效机制，但建议仅在应用程序无法使用 Jakarta CDI 时使用。如果应用程序可以完全访问整个\
  \ Jakarta EE 栈，包括 Jakarta CDI，那么 `@ManagedBean` 注解就不是必需的。\n\nJakarta CDI 技术比 `@ManagedBean`\
  \ 强大得多，后者是 Jakarta Server Faces 的定制解决方案，因此 Jakarta CDI 是首选技术。之所以是首选技术，是因为 Jakarta\
  \ CDI 允许将更广泛的类归类为受管资源。Jakarta CDI 还附带了许多其他好处，例如事务管理和类型安全的依赖注入，这些都是 `@ManagedBean`\
  \ 所不具备的。\n\n从 Jakarta Server Faces 2.3 开始，某些功能仅在使用 Jakarta CDI 时可用，而 `@ManagedBean`\
  \ 已成为已弃用的技术。\n\n要运行上述代码，请在浏览器中启动此 URL：http://localhost:8080/\n\nJakartaEERecipes_Chapter08-\
  \ 1.0- SNAPSHOT/chapter11/recipe11_01.xhtml。\n\n您应该会看到如图 11-1 所示的输出。\n\n***图 11-1.**\
  \ 配方 11-2 的输出*\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\n工作原理\n\nJakarta CDI 最广泛使用的特性之一，是它有助于为应用程序的\
  \ Web 视图和后端业务逻辑提供无缝集成。利用 Jakarta CDI，可以非常轻松地使公共 bean 成员和方法对 Jakarta Server Faces\
  \ 视图可访问。`jakarta.\n\n\n\n`inject.Named` 注解提供了一种在 Jakarta Server Faces 视图中引用 JavaBean\
  \ 类的机制，可以通过接受一个用于创建引用的字符串，或者直接使用首字母小写的 JavaBean 类名来实现。本方案中提供的两种方法演示了这两种技术。从技术角度来看，不使用字符串提供引用的示例是最类型安全的解决方案。然而，有时需要像第一个示例那样提供字符串引用，但该方案仅建议在必要时使用。\n\
  \n■ **注意** 请注意，示例中的 bean `CalculationBean` 包含一个 `@RequestScoped` 注解。\n\n该注解指定了 bean\
  \ 状态的作用域。一个有趣的技巧是，尝试移除 `@RequestScoped` 注解，看看会发生什么。事实证明，bean 仍然会按预期工作，但不会返回任何结果。这是因为\
  \ bean 会在每次请求后重新初始化。因此，视图会调用 `getSum` 方法来读取 `sum` 字段的当前内容，而在请求发出之前，该字段已被重新初始化为 0。要了解更多关于\
  \ bean 作用域的信息，请参阅方案 11-4。\n\n通过使用 `@Named` 注解一个类，该类便可在同一应用程序中的 Jakarta Server Faces\
  \ 视图中使用。任何公共类成员或方法都可以通过在 Jakarta Server Faces 视图中指定首字母小写的类名以及所需的公共成员或方法来调用。例如，以下\
  \ Jakarta Server Faces EL 表达式调用了名为 `MyClass` 的类中包含的一个名为 `myMethod` 的方法。请注意，如果类名为\
  \ `MyClass` 并包含一个空的 `@Named` 注解，或者类名不同但包含 `@Named(\"myClass\")` 注解，此 EL 表达式均有效：\n\
  \n`#{myClass.myMethod}`\n\n如本方案的侧边栏所述，`@ManagedBean` 和 `@Named` 注解扮演着相似的角色，它们都使\
  \ Java 类可在 Web 视图中使用。然而，可以确定的是，`@Named` 注解比使用 `@ManagedBean` 更受推荐；请阅读前面的侧边栏以获取更多信息。\n\
  \n11-3. 分配特定 Bean 进行注入\n\n问题\n\n你有多个实现了特定 API 的 JavaBean，并且希望指定要注入哪个 bean。\n\n第\
  \ 11 章 ■ Jakarta 上下文和依赖注入\n\n解决方案\n\n为注入使用一个限定符。为了解决引用重复类的问题，为每个类添加一个限定符以将它们区分开来。在以下代码示例中，两个类\
  \ `PaperbackController` 和 `EbookController` 都实现了 `Book` 接口。为了让客户端 bean 开发者能够指定应注入哪个\
  \ bean 类，使用了限定符。在第一个代码清单中，我们来看一下 `IBook` 接口，该接口在示例中至少被两个 JavaBean 实现：\n\n```java\n\
  public interface IBook {\n\n    String title = null;\n\n    String description =\
  \ null;\n\n    String getTitle();\n\n    String getDescription();\n\n}\n```\n\n\
  `PaperbackController` 类使用限定符 `@Paperback` 来将其与实现 `Book` 接口的其他 bean 区分开来。以下是 `PaperbackController`\
  \ 类的代码清单。请注意，要在此示例中使用 `@Paperback` 注解，必须已存在 `Paperback` 接口（源代码如下所示）：\n\n```java\n\
  package org.jakartaeerecipe.chapter11.recipe11_03;\n\nimport jakarta.inject.Named;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\n\nimport java.io.Serializable;\n\
  \n@Named(value = \"paperbackController\")\n\n@SessionScoped\n\n@Paperback\n\npublic\
  \ class PaperbackController implements Serializable, IBook{\n\n    /**\n\n     *\
  \ Creates a new instance of PaperbackController\n\n     */\n\n    public PaperbackController()\
  \ {\n\n    }\n\n    ...\n\n}\n```\n\n另一个名为 `EbookController` 的 JavaBean 也实现了 `IBook`\
  \ 接口。它包含一个\n\n\n\n不同的限定符 `@Ebook`，用于将其与实现 `IBook` 接口的其他类区分开来。`EbookController` 类的代码如下所示：\n\
  \npackage org.jakartaeerecipe.chapter11.recipe11_03;\n\nimport jakarta.inject.Named;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\n\n@Named(value = \"ebookController\"\
  )\n\n@SessionScoped\n\n@Ebook\n\npublic class EbookController implements java.io.Serializable,\
  \ IBook {\n\n/**\n\n* 创建 EbookController 的新实例\n\n*/\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\
  \npublic EbookController() {\n\n}\n\n...\n\n}\n\n最后，让我们看看 `@Paperback` 和 `@Ebook`\
  \ 绑定注解的样子。以下两段代码展示了 `org.jakartaeerecipe.chapter11.recipe11_03.Paperback` 和 `org.jakartaeerecipe.chapter11.recipe11_03.Ebook`\
  \ 接口的内容，它们用于创建这两个注解：\n\nimport java.lang.annotation.*;\n\nimport jakarta.inject.Qualifier;\n\
  \n@Qualifier\n\n@Retention(RetentionPolicy.RUNTIME)\n\n@Target({ElementType.TYPE,\
  \ ElementType.METHOD, ElementType.FIELD, ElementType.PARAMETER})\n\npublic @interface\
  \ Paperback {}\n\nimport java.lang.annotation.*;\n\nimport jakarta.inject.Qualifier;\n\
  \n@Qualifier\n\n@Retention(RetentionPolicy.RUNTIME)\n\n@Target({ElementType.TYPE,\
  \ ElementType.METHOD, ElementType.FIELD, ElementType.PARAMETER})\n\npublic @interface\
  \ Ebook {}\n\n当客户端需要使用其中一个时，只需按如下方式调用限定符即可：\n\n@Paperback PaperbackController paperback;\n\
  \n@Ebook EbookController ebook;\n\n工作原理\n\n当有两个或更多类实现同一个 Java 接口时，Jakarta CDI 需要一些帮助来确定在注入点使用哪一个。如果部署了一个使用\
  \ Jakarta CDI 的应用程序，并尝试对实现与另一个类相同接口的类执行注入，那么 Weld 将抛出模糊依赖错误。这意味着它无法确定在给定注入点使用哪个\
  \ bean。当 Jakarta CDI 尝试确定在注入点应使用哪个 bean 时，它会考虑所有类类型，并且也会使用限定符。限定符是一种可以应用于类级别以指示\
  \ bean 类型的注解。限定符也可用于注解方法或其他代码区域，以帮助 Jakarta CDI 确定需要注入哪种类型的 bean。\n\n■ **注意** Weld\
  \ 是 Jakarta CDI 的参考实现。因此，在 Jakarta EE 应用程序中使用 Jakarta CDI 时，您会在服务器日志中看到对 Weld 的引用。有关\
  \ Weld 的更多信息，请参阅在线文档 [`weld.cdi-spec.org/`](http://weld.cdi-spec.org/)。\n\n第 11\
  \ 章 ■ Jakarta 上下文与依赖注入\n\n每个没有显式限定符的 bean 都会自动被 `@Default` 限定符注解。当使用其他限定符类型时，则不需要此限定符。在本配方的解决方案中，创建了两个限定符来标记\
  \ `IBook` 类型的两个不同 bean：`@Paperback` 和 `@Ebook` 限定符。要创建限定符，请生成一个 Java 接口，并使用 `@Qualifier`、`@Retention(RetentionPolicy.RUNTIME)`\
  \ 和 `@Target({ElementType.TYPE, ElementType.METHOD, ElementType.FIELD, ElementType.PARAMETER})`\
  \ 对该接口进行注解。所有限定符都以相同的方式创建，创建后即可用于注解 bean 以进行区分。从示例中可以看出，`PaperbackController` 和\
  \ `EbookController` 类都已使用各自的限定符进行了注解。\n\n这使得 Jakarta CDI 能够轻松确定要注入哪个 bean，因为这两个\
  \ bean 都是 `Book` 类型的不同实现。\n\nJakarta CDI API 提供了一些开箱即用的限定符，可以在您的 bean 类中使用。我已经讨论过\
  \ `@Default` 限定符，它会添加到任何未显式包含限定符的 bean 上。Jakarta CDI 提供的其他限定符包括 `@Named` 和 `@Any`。`@\n\
  \n\n\n命名限定符（Named qualifier）用于将 Bean 标记为 EL 可注入。如果 Bean 包含 `@Named` 限定符，则可以在 Jakarta\
  \ Server Faces 视图中引用它。所有 Bean 上也包含 `@Any` 限定符，它允许注入点引用特定 Bean 类型的所有 Bean 或事件。例如，要引用\
  \ `IBook` 类型的所有 Bean，可以按如下方式声明成员：\n\n`@Inject @Any Instance<IBook> anyBook;`\n\n\
  限定符在日常代码中并不常用，但它们是 Jakarta EE 的一项特性，在可能出现 Bean 注入歧义的情况下会派上用场。\n\n11-4. 确定 Bean 的作用域\n\
  \n问题\n\n你希望确保应用程序中特定 Bean 的作用域在用户的整个会话期间都可用。\n\n解决方案\n\n通过相应地为 Bean 添加注解，定义你想要使其可用的\
  \ Bean 的作用域。配方 11-3 中列出的 `org.jakartaeerecipe.chapter11.recipe11_03.PaperbackController`\
  \ 和 `org.jakartaeerecipe.chapter11.recipe11_03.EbookController` 是请求作用域 Bean 的示例，因为它们被如此注解。要使\
  \ Bean 在另一个作用域中可用，请使用其他基于作用域的注解之一进行注解。例如，让我们创建一个具有会话作用域的 Bean，这意味着它将在 Web 会话的生命周期内为多个\
  \ HTTP 请求保留其状态。要创建会话作用域的 Bean，请使用 `@SessionScoped` 注解该类。以下名为 `CartBean` 的类是一个 Jakarta\
  \ CDI 会话作用域的 JavaBean，它包含一个整数字段，当用户调用 `addItem` 或 `removeItem` 方法时，该字段将被调整：\n\n\
  ```java\npackage org.jakartaeerecipe.chapter11.recipe11_04;\n\n// 导入并更改为 @RequestScoped\
  \ 以查看功能差异\n//import jakarta.enterprise.context.RequestScoped;\nimport jakarta.enterprise.context.SessionScoped;\n\
  import jakarta.inject.Named;\n\n@Named\n@SessionScoped\npublic class CartBean implements\
  \ java.io.Serializable {\n\n    private int orderList = 0;\n\n    public CartBean(){}\n\
  \n    public void addItem(){\n        setOrderList(getOrderList() + 1);\n    }\n\
  \n    public void removeItem(){\n        setOrderList(getOrderList() - 1);\n   \
  \ }\n\n    /**\n     * @return the orderList\n     */\n    public int getOrderList()\
  \ {\n        return orderList;\n    }\n\n    /**\n     * @param orderList the orderList\
  \ to set\n     */\n    public void setOrderList(int orderList) {\n        this.orderList\
  \ = orderList;\n    }\n}\n```\n\n■ **注意** `CartBean` 类中的注释表明，如果将作用域更改为 `@RequestScoped`，你将看到功能差异。区别在于\
  \ `orderList` 字段将仅在一个 HTTP 请求期间保留其状态。因此，该数字永远不会增加到超过 1，也永远不会减少到低于 -1。\n\n如果你不在 Jakarta\
  \ Server Faces 视图中使用这个 Bean，那它还有什么乐趣呢？好吧，让我们看一个名为 `recipe11_04.xhtml` 的 Jakarta\
  \ Server Faces 视图，它利用 `CartBean` 类来显示 `orderList` 字段。该视图包含两个按钮，每个按钮都绑定到 `CartBean`\
  \ 类中的不同方法。一个按钮将增加 `orderList` 整数的值，另一个按钮将减少它：\n\n```xhtml\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
  \n      xmlns:h=\"jakarta.faces.html\">\n<h:head>\n    <meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=UTF-8\"/>\n    <title>配方 11-4：确定 Bean 的作用域</title>\n\
  </h:head>\n<h:body>\n    <p>\n        <h:form>\n            <h:outputText value=\"\
  #{cartBean.orderList}\"/>\n            <br/>\n            <br/><br/>\n         \
  \   <h:commandButton value=\"添加订单\" type=\"submit\" action=\"#{cartBean.addItem()}\"\
  />\n            <h:commandButton value=\"移除订单\" type=\"submit\" action=\"#{cartBean.removeItem()}\"\
  />\n        </h:form>\n    </p>\n</h:body>\n</html>\n```\n\n要查看如图 11-2 所示的结果，请将项目部署到你的\
  \ GlassFish 服务器，并通过浏览器访问 `http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/chapter11/recipe11_04.xhtml`。\n\
  \n***图 11-2.** 配方 11-4 的输出*\n\n工作原理\n\n根据应用程序的需求，某些 Bean 可能需要比其他 Bean 更长时间地保留状态。\n\
  \n\n\n有时，让应用程序的每个用户拥有特定 bean 的独立版本是合理的，此时 bean 的状态随用户会话而生灭。另一些情况下，让 bean 在应用程序的所有用户之间共享状态更为合理；还有些时候，bean\
  \ 的状态随每个用户请求而生灭更为合适。要指定 bean 保留其状态的时间长度，请使用 Jakarta CDI 作用域注解之一来注解 bean 类。表 11-1\
  \ 描述了不同的作用域注解。\n\n***表 11-1.** Jakarta CDI Bean 状态注解*\n\n**注解**\n\n**描述**\n\n@RequestScoped\n\
  \n每个用户，状态在单个 HTTP 请求期间保留\n\n@SessionScoped\n\n每个用户，状态在多个 HTTP 请求之间保留\n\n@ApplicationScoped\n\
  \n在应用程序内所有用户交互之间共享状态\n\n@Dependent\n\n对象存在是为了服务一个客户端 bean，并具有与该 bean 相同的生命周期（如果未指定，这是默认作用域）\n\
  \n@ConversationScoped\n\n每个用户作用域，用于基于 servlet 的应用程序，例如使用 Jakarta Server Faces 的应用程序。作用域的边界由开发者控制，并可跨\
  \ servlet 生命周期的多次调用扩展作用域。所有长时间运行的对话都限定在特定的 servlet 会话内，且不能跨越会话边界\n\n虽然为 bean 定义特定作用域很容易，但有时需要一些实践和测试才能确定为特定应用程序需求选择正确的作用域。此外，随着应用程序的演进，有必要审查已应用于各个\
  \ bean 的不同作用域，以确保分配的作用域仍然合适。\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\n■ **注意** 使用作用域注解时最常见的错误之一是为\
  \ bean 导入了错误的注解。请记住，Jakarta Server Faces 有自己的基于作用域的注解集，用于托管 bean（自 Jakarta Server\
  \ Faces 2.3 起仅用于向后兼容）。使用 Jakarta CDI 作用域时，务必从 `jakarta.enterprise.context.*` 包中导入，否则将得到错误结果。\n\
  \n11-5. 注入非 Bean 对象\n\n问题\n\n您希望将一个非 bean 对象注入到另一个 Java 类中。\n\n解决方案\n\n使用生产者字段来注入非\
  \ bean 对象、需要自定义初始化的对象，或在运行时可能具有不同值的对象。要创建生产者字段，请使用 `jakarta.injection.Produces`\
  \ 注解注解一个公共类字段，并返回要注入的字段。在大多数情况下，您还需要使用 Jakarta CDI 限定符注解生产者方法，以便 Jakarta CDI 知道在被调用时注入什么。\n\
  \n在此示例中，一个名为 `InitialValueController` 的 JavaBean 包含一个生产者字段，该字段将被调用来为 Jakarta CDI\
  \ bean 字段分配初始值。以下是 `InitialValueController` 类的源代码清单，其中包含生产者字段声明：\n\n```java\npackage\
  \ org.jakartaeerecipe.chapter11.recipe11_05;\n\nimport jakarta.enterprise.inject.Produces;\n\
  \npublic class InitialValueController implements java.io.Serializable {\n\n    @Produces\n\
  \    @InitValue\n    public int initialValue = 1000;\n}\n```\n\n该类清单中的生产者字段包含一个\
  \ `@InitValue` 限定符注解。限定符实现如下：\n\n```java\npackage org.jakartaeerecipe.chapter11.recipe11_05;\n\
  \nimport java.lang.annotation.*;\nimport jakarta.inject.Qualifier;\n\n@Retention(RetentionPolicy.RUNTIME)\n\
  @Target({ElementType.TYPE, ElementType.METHOD, ElementType.FIELD, ElementType.PARAMETER})\n\
  @Qualifier\npublic @interface InitValue {}\n```\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\n\
  生产者字段可以从任何地方调用。在此例中，它被注入到一个 Jakarta CDI bean 中以初始化 bean 字段值。在以下清单中，名为 `ProducerExample`\
  \ 的 Jakarta CDI bean 字段演示了如何注入生产者字段并使用它：\n\n```java\npackage org.jakartaeerecipe.chapter11.recipe11_05;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\nimport jakarta.inject.Inject;\n\
  import jakarta.inject.Named;\n\n@Named\n@SessionScoped\npublic class ProducerExample\
  \ implements java.io.Serializable {\n\n    @Inject\n    @InitValue\n    private\
  \ int initial;\n\n    private int orderList = -1;\n\n    public ProducerExample(){\
  \ }\n\n    public void addItem(){\n        setOrderList(getOrderList() + 1);\n \
  \   }\n\n    public void removeItem(){\n        setOrderList(getOrderList() - 1);\n\
  \    }\n\n    /**\n     * @return the orderList\n     */\n    public int getOrderList()\
  \ {\n        return orderList == -1 ? initial : orderList;\n    }\n\n    /*\n  \
  \   * @param orderList the orderList to set\n     */\n    public void setOrderList(int\
  \ orderList) {\n        this.orderList = orderList;\n    }\n}\n```\n\n当 `orderList`\
  \ 字段被添加到 Jakarta Server Faces 视图时，`getOrderList()` 方法将在视图加载时被调用，因为视图调用了 `orderList`\
  \ 属性。这反过来会导致 `orderList` 字段值在 Jakarta Server Faces 视图首次加载时被初始化。以下代码演示了该字段在 Jakarta\
  \ Server Faces 视图中的使用。要查看源代码，请查看 `chapter11/recipe11_05.xhtml` 文件：\n\n```xhtml\n\
  <html\nxmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n<h:head>\n    <meta http-equiv=\"\
  Content-Type\" content=\"text/html; charset=UTF-8\"/>\n    <title>Recipe 11-5: Injecting\
  \ Non-Bean Objects</title>\n</h:head>\n<h:body>\n    <p>\n        <h:form>\n   \
  \         <h:outputText value=\"#{producerExample.orderList}\"/>\n            <br/>\n\
  \            <br/><br/>\n            <h:commandButton value=\"Add Order\" type=\"\
  submit\" action=\"#{producerExample.addItem()}\"/>\n            <h:commandButton\
  \ value=\"Remove Order\" type=\"submit\" action=\"#{producerExample.removeItem()}\"\
  />\n        </h:form>\n    </p>\n</h:body>\n</html>\n```\n\n要执行本食谱中的代码，请打开页面 `http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/chapter11/recipe11_05.xhtml`\
  \ 查看输出，如图 11-3 所示。\n\n***图 11-3.** 食谱 11-5 的输出*\n\n工作原理\n\n有时会出现需要注入 Jakarta CDI\
  \ 托管 bean 或资源以外的对象的情况。诸如字段、方法等对象，如果被声明为生产者，则可以成为注入目标。在某些情况下，将类字段声明为可注入对象是合理的。为此，请使用\
  \ `jakarta.enterprise.inject.Produces` 注解（`@Produces`）注解该字段，EE 容器随后会将此字段视为该字段的 getter\
  \ 方法。在大多数情况下，还应创建 Jakarta CDI 限定符注解并用其注解该字段，以便在注入点通过限定符引用该字段。\n\n在本食谱的解决方案中，一个用于初始化值的字段在名为\
  \ `InitialValueController` 的 Java 类中声明。字段名为 `initialValue`，它将返回一个 `int` 类型，即用于初始化的数字。查看代码，您可以看到在字段声明处还放置了一个名为\
  \ `@InitValue` 的限定符。这将允许注入点简单地引用该限定符来获取注入目标的句柄。要使用 `initialValue` 字段，它被注入到一个 Jakarta\
  \ CDI 托管 bean 中，如下所示：\n\n```java\n@Inject\n@InitValue\nprivate int initial;\n```\n\
  \n第 11 章 ■ Jakarta 上下文与依赖注入\n\n一旦注入，该字段就可以像被注入类的一部分一样被使用。在此示例中，它用于初始化 `orderList`\
  \ 字段的值，然后通过名为 `chapter11/recipe11_05.xhtml` 的 Jakarta Server Faces 视图显示该值。\n\n\n\
  \n也可以创建生产者方法，这些方法可以返回可注入到 Bean 或非 Java（Jakarta Server Faces）上下文中的值。为此，使用 `@Produces`\
  \ 注解来标注该方法，其方式与声明字段生产者相同。例如，以下方法演示了生产者方法的声明，该方法将用于注入 `Book` 类型的对象。\n\n可以根据传递给它的类型来调用该方法，以返回所需的\
  \ `Book` 对象类型：\n\n```java\n@Produces @BookQualifier public Book getBook(Book book){\n\
  \    if(book.equals(EbookController.class))\n        return new EbookController();\n\
  \    else\n        return new PaperbackController();\n}\n```\n\n在这种情况下，该方法还使用了一个名为\
  \ `@BookQualifier` 的限定符。然后，生产者方法的结果可以注入到 Bean 或非 Java 上下文中。注入点引用该限定符以实现注入，容器会调用生产者方法来获取所需的实例对象，如下所示：\n\
  \n```java\n@Inject\n@BookQualifier\nBook getBook(ebookController);\n```\n\n生产者是开发可注入对象的绝佳方式。稍加练习，它们也能通过使用生产者方法，成为创建复杂对象工厂的有价值工具。\n\
  \n**11-6. 忽略类**\n\n**问题**\n\n您希望将一个类标记为被 Jakarta CDI 忽略。如果您希望避免在应用程序中使用某些类或方法，这会很有用。\n\
  \n**解决方案 #1**\n\n使用 `@Vetoed` 注解标注该类。任何包含 `@Vetoed` 注解的类都将被 Jakarta CDI 忽略。以下示例演示了\
  \ `@Vetoed` 的使用：\n\n```java\nimport jakarta.enterprise.inject.Vetoed;\n\n@Vetoed\n\
  public class OrderBean implements java.io.Serializable {\n    public OrderBean(){\
  \ }\n    // 类实现\n}\n```\n\n**解决方案 #2**\n\n使用 `@Requires` 注解标注该类，如果该类不满足指定要求，则将其标记为被\
  \ Jakarta CDI 忽略。以下示例演示了如何使用 `@Requires` 注解：\n\n```java\n@Requires(\"jakarta.persistence.EntityManager\"\
  )\npublic class EmployeeFacade {\n    ...\n    @Produces\n    public EntityManager\
  \ getEntityManager(){\n        ...\n    }\n    ...\n}\n```\n\n在此示例中，`@Requires`\
  \ 注解包含一个字符串 `jakarta.persistence.EntityManager` 作为参数。因此，如果指定的类不可用，或者该类无法满足指定的依赖关系，则它将被\
  \ Jakarta CDI 忽略。\n\n**工作原理**\n\n否决一个 Bean 意味着将其标记为被 Jakarta CDI 忽略。因此，如果一个 Bean\
  \ 包含 `@Vetoed` 注解，它就不能被 Jakarta CDI 处理。被否决的类将不具有上下文实例的生命周期，并且不能注入到其他类中。事实上，如果一个会话\
  \ Bean 包含 `@Vetoed` 注解，它根本就不能被视为会话 Bean。在某些情况下，将 Bean 标记为此类以确保它不能被 Jakarta CDI 管理是有意义的。以下代码演示了如何将\
  \ `@Vetoed` 注解应用于一个类。\n\n`@Vetoed` 注解也可以放在包声明上，这将阻止该包中包含的所有 Bean 被 Jakarta CDI 处理：\n\
  \n```java\n@Vetoed\npackage org.jakartaeerecipe.chapter11.*;\n...\n```\n\n被否决类型上的以下任何定义都不会被处理：\n\
  \n*   托管 Bean、会话 Bean、拦截器、装饰器\n*   观察者方法、生产者方法、生产者字段\n\n`@Requires` 注解可用于有条件地将一个类标记为被\
  \ Jakarta CDI 忽略，如果它不满足指定的必需条件。`@Requires` 注解接受一个基于字符串的、依赖项的完全限定类名。如果对象能够满足其依赖关系，那么它将被\
  \ Jakarta CDI 管理。与 `@Vetoed` 类似，`@Requires` 注解也可以放在包上。\n\n如果该包无法满足 `@Requires` 所表示的依赖关系，那么该包中包含的所有类都不会被\
  \ Jakarta CDI 管理。\n\n**11-7. 处理生产者字段的销毁**\n\n**问题**\n\n您的应用程序使用了一个生产者字段，并且您希望该生产者字段在不再需要使用时被销毁。\n\
  \n**解决方案**\n\n以下代码片段演示了一个生产者字段：\n\n```java\n...\n@Produces\nList<Book> books;\n\
  ...\n```\n\n**工作原理**\n\n生产者方法可用于生成一个对象，该对象在不再需要时需要被移除。\n\n与类的终结器非常相似，通过生产者方法注入的对象可以包含一个方法，该方法在注入的实例被销毁时被调用。这种方法被称为*销毁器方法*。要将一个方法声明为销毁器方法，请在生产者方法所在的同一个类中定义一个方法。销毁器方法必须至少有一个参数，其类型和限定符与生产者方法相同。该参数应使用\
  \ `@Disposes` 注解进行标注。\n\n**11-8. 在部署时指定替代实现**\n\n**问题**\n\n您希望能够为一个接口编写不同的实现，然后在部署应用程序时选择使用哪个实现。\n\
  \n**解决方案**\n\n为接口创建一个默认实现，然后为该接口创建任何替代实现，并使用 `@Alternative` 注解标注它们。指定 `jakarta.enterprise.inject.Alternative`\
  \ 注解会将一个类标记为替代类，如果该类在 `beans.xml` 文件中被注明，那么它将在部署时被加载，而不是默认的接口实现。\n\n以下代码片段演示了替代类实现的使用。为了演示，我们假设已经有一个名为\
  \ `BookstoreOrderBean` 的 `OrderType` 接口的默认实现：\n\n```java\n@Alternative\npublic class\
  \ WarehouseOrderBean implements OrderType {\n    ...\n}\n```\n\n要指定使用替代实现而不是默认实现，请修改\
  \ `beans.xml` 文件，列出替代类。以下是 `beans.xml` 文件中的一个示例片段，指定使用 `WarehouseOrderBean`：\n\n\
  ```xml\n<beans ... >\n    <alternatives>\n        <class>org.jakartaeerecipe.chapter11.WarehouseOrderBean</class>\n\
  \    </alternatives>\n</beans>\n```\n\n**工作原理**\n\n有时，为一个类创建两个或多个实现以用于不同环境是有意义的。但是，为了构建和分发每个环境的正确实现而删除或重命名类可能会变得非常繁琐。使用\
  \ `jakarta.enterprise.inject.Alternative` 注解允许使用一个接口的多个实现，并且可以通过在部署前修改文件来指定适当的实现。\n\
  \n**11-9. 注入 Bean 并获取元数据**\n\n**问题**\n\n您希望从应用程序类中获取关于 Bean 的元数据信息。\n\n**解决方案**\n\
  \n将 Bean 的接口注入到需要使用元数据的类中。一旦注入，调用 Bean 的方法来检索所需的元数据。在以下示例中，一个名为 `OtherBean` 的 Bean\
  \ 的元数据被注入并检索：\n\n```java\nimport jakarta.enterprise.inject.spi.Bean;\n\n@Named(\"\
  OtherBean\")\npublic class OtherBean {\n    @Inject Bean<Order> bean;\n\n    public\
  \ String getBeanName(){\n        return bean.getName();\n    }\n\n    public Class<?\
  \ extends Annotation> getBeanScope(){\n        return bean.getScope();\n    }\n\
  }\n```\n\n**工作原理**\n\n\n\n如果需要使用 Bean 元数据，可以通过注入目标 Bean 的元数据轻松获取。为此，需指定 `@Inject`\
  \ 注解，后跟目标 Bean 类型的 Bean 类。注入 Bean 接口后，即可调用其方法获取所需信息。表 11-2 描述了可在 Bean 类上调用的不同方法以获取元数据。\n\
  \n第 11 章 ■ Jakarta 上下文与依赖注入\n\n***表 11-2.** Bean 元数据*\n\n**方法**\n\n**描述**\n\ngetName\n\
  \n返回 Bean 的名称\n\ngetBeanClass\n\n返回 Bean 类\n\ngetInjectionPoints\n\n返回 Bean 的 InjectionPoint\
  \ 对象集合\n\ngetQualifiers\n\n返回 Bean 的限定符注解集合\n\ngetScope\n\n返回 Bean 的作用域\n\ngetStereotypes\n\
  \n返回 Bean 的原型数据（通用元数据）集合\n\ngetTypes\n\n返回 Bean 类型的集合\n\nisAlternative\n\n返回布尔值，指定\
  \ Bean 是否为替代 Bean\n\nisNullable\n\n返回布尔值，指定 Bean 是否可为空\n\n11-10. 调用与处理事件\n\n问题\n\
  \n你希望在应用程序中发生特定事件时调用某个操作。\n\n解决方案\n\n通过创建 Jakarta CDI 事件、可选的限定符、观察者和事件处理方法，以同步或异步方式处理事件。在此场景中，书店希望在每次发生销售时向图书出版商发送警报。如果发生在线销售，出版商将收到相应警报。同样，如果发生店内销售，出版商将收到不同的警报以指示发生了门店销售。首先，创建一个图书事件对象，其中包含事件调用时需要提供的数据元素。在本例中，事件对象将包含关于图书、销售门店、图书数量和价格的一些简单数据。`BookEvent`\
  \ 类的源代码如下：\n\n```java\npackage org.jakartaeerecipe.chapter11.event;\n\nimport java.math.BigDecimal;\n\
  import java.time.LocalDate;\nimport java.util.List;\n\npublic class BookEvent {\n\
  \    private BigDecimal book;\n    private String storeName;\n    private BigDecimal\
  \ price;\n    private int numBooks;\n    private LocalDate date;\n    private List<String>\
  \ notifyList;\n    // 访问器方法（getter 和 setter）\n}\n```\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\
  \n接下来，为每种可能发生的图书事件创建一个限定符。限定符是一个可选步骤，仅当存在多个同类型事件时才需要。在本例中，可能发生在线销售事件或门店销售事件。`OnlineSale`\
  \ 的限定符源代码如下，`StoreSale` 的限定符与之相同，仅名称不同：\n\n```java\npackage org.jakartaeerecipe.chapter11.qualifier;\n\
  \nimport static java.lang.annotation.ElementType.TYPE;\nimport static java.lang.annotation.ElementType.FIELD;\n\
  import static java.lang.annotation.ElementType.METHOD;\nimport static java.lang.annotation.ElementType.PARAMETER;\n\
  import java.lang.annotation.Retention;\nimport static java.lang.annotation.RetentionPolicy.RUNTIME;\n\
  import java.lang.annotation.Target;\nimport jakarta.inject.Qualifier;\n\n@Qualifier\n\
  @Retention(RUNTIME)\n@Target({METHOD, FIELD, PARAMETER, TYPE})\npublic @interface\
  \ OnlineSale {\n}\n```\n\n接着，需要使用观察者来监听事件调用并在事件发生后执行相应操作。在本例中，需要生成两个观察者，一个用于 `@OnlineSale`，另一个用于\
  \ `@StoreSale`。这些观察者位于名为 `BookEventHandler` 的类中：\n\n```java\npublic class BookEventHandler\
  \ {\n    @Inject\n    private BookController bookController;\n\n    public BookEventHandler(){\n\
  \    }\n\n    public void notifyPublisherOnline (@Observes @OnlineSale BookEvent\
  \ event) {\n        for (String s : event.getNotifyList()) {\n            System.out.println(\"\
  向出版商发送通知：\" + s + \" 在线购买图书：\"\n                + bookController.findById(event.getBook()).getTitle()\
  \ + \" 来自门店：\"\n                + event.getStoreName()\n                + \" 购买价格：$\"\
  \ + event.getPrice()\n                + \" 日期：\" + event.getDate());\n        }\n\
  \    }\n\n    public void notifyPublisherInStore (@Observes @StoreSale BookEvent\
  \ event) {\n        for (String s : event.getNotifyList()) {\n            System.out.println(\"\
  向出版商发送通知：\" + s + \" 店内购买图书：\"\n                + bookController.findById(event.getBook()).getTitle()\
  \ + \" 来自门店：\"\n                + event.getStoreName()\n                + \" 购买价格：$\"\
  \ + event.getPrice()\n                + \" 日期：\" + event.getDate());\n        }\n\
  \    }\n}\n```\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\n最后，创建一个事件处理方法，在发生销售时调用 Jakarta CDI\
  \ 事件。在本例中，将使用一个简单的 Jakarta Server Faces 用户界面来触发销售事件，因此事件处理方法将放置在 Jakarta Server\
  \ Faces 控制器类中：\n\n```java\n@Named\n@RequestScoped\npublic class BookstoreSaleController\
  \ {\n    @Inject\n    @OnlineSale\n    private Event<BookEvent> onlineSaleEvent;\n\
  \    private BookEvent currentEvent;\n\n    public BookstoreSaleController() {\n\
  \    }\n\n    /**\n     * 触发同步 Jakarta CDI 事件 BookEvent。\n     */\n    public void\
  \ onlineSaleAction() {\n        onlineSaleEvent.fire(currentEvent);\n    }\n\n \
  \   /**\n     * 触发异步 Jakarta CDI 事件 BookEvent。\n     */\n    public void storeSaleAction()\
  \ {\n        onlineSaleEvent.fireAsync(currentEvent)\n            .whenComplete((event,\
  \ throwable) -> {\n                if (throwable != null) {\n                  \
  \  FacesContext.getCurrentInstance().addMessage(null, new FacesMessage(\n      \
  \                  FacesMessage.SEVERITY_ERROR, \"失败\", \"发生错误：\" +\n          \
  \              throwable.getMessage()));\n                } else {\n           \
  \         FacesContext.getCurrentInstance().addMessage(null, new FacesMessage(\n\
  \                        FacesMessage.SEVERITY_INFO, \"成功\", \"实体门店销售处理成功...\"));\n\
  \                }\n            });\n    }\n\n    /**\n     * @return currentEvent\n\
  \     */\n    public BookEvent getCurrentEvent() {\n        return currentEvent;\n\
  \    }\n}\n```\n\n当触发销售时，可选择在线销售或店内销售类型。根据所选销售类型，将调用相应的 Jakarta Server Faces 控制器方法。\n\
  \n![](img/index-522_1.png)\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\n工作原理\n\nJakarta CDI 事件允许在多个\
  \ Bean 之间实现解耦的事件处理。Bean 类之间没有任何绑定，但可以在它们之间传递上下文，从而使 Bean 能够调用上下文事件而无需显式绑定。要编排事件，只需放置少量注解，无需额外配置。在示例中，书店可以完成两种类型的销售：在线销售和店内销售。因此，当图书售出时，将触发一个事件来通知出版商并指示发生了哪种类型的销售。\n\
  \n首先，使用一个上下文对象来包含每个事件的数据。因此，生成了一个名为 `BookEvent` 的 Bean，它是一个简单的普通 Java 对象（POJO）。接下来，编写事件限定符以区分两种可能的事件类型。事件限定符只是一个可以放置在事件处理器上的注解，它也用于创建指定类型的事件。在示例中，创建了在线和店内两种事件限定符。从限定符的代码中可以看出，注解声明使用了\
  \ `jakarta.inject.Qualifier` 注解进行标记，并且其目标为以下元素：`METHOD`、`FIELD`、`PARAMETER`、`TYPE`。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n当事件被触发时，会使用事件处理器来处理该事件。事件处理器也被称为观察者，它们本质上是包含至少一个方法的类，该方法可用于包含事件的处理逻辑。在示例中，`BookEventHandler`\
  \ 类包含两个用于执行事件动作的方法。事件处理方法必须接受一个事件（本质上是一个对象），该事件使用一个可选的限定符和 `@Observes` 注解进行标注。`@Observes`\
  \ 注解表示该方法正在观察传入方法的事件类型。在示例中，`BookEvent` 对象被用作参数，并且它针对每个相应的方法都使用了限定符注解进行标注。因此，名为\
  \ `notifyPublisherOnline()` 的方法观察 `@OnlineSale` 类型的事件，而 `notifyPublisherInStore()`\
  \ 方法观察 `@StoreSale` 事件类型。\n\n最后，在此示例中，事件发起发生在 Jakarta CDI 控制器类中，尽管其他类类型也可以调用某个动作。在示例中，`BookstoreSalesController`\
  \ 包含一个注入的 `Event<BookEvent>` 对象，该对象用于触发 `BookEvent` 类型的事件。该控制器包含用于触发在线销售和店内销售的方法。在线销售动作方法通过调用注入的\
  \ `Event` 的 `fire()` 方法并传递当前的 `BookEvent` 对象来触发一个同步事件。`fire()` 方法发起一个同步事件调用，因此一旦事件处理完成，控制权就会返回给调用者。\n\
  \n店内销售动作方法通过调用注入的 `Event` 的 `fireAsync()` 方法并传递当前的 `BookEvent` 对象来触发一个异步事件。然而，在这种情况下，一旦\
  \ `fireAsync()` 方法被发起，控制权就会返回给调用者，而事件则在后台处理。`fireAsync()` 方法是在 Jakarta EE 8 中随 Jakarta\
  \ CDI 2.0 的发布而引入的。\n\nJakarta CDI 事件模型可以被用来为各种类型的应用程序提供超强大的解决方案。由于事件可以通过松散耦合的架构来调用，这使得在新应用程序中实现事件调用以及在现有应用程序中添加事件调用变得容易。\n\
  \n要执行代码，请在浏览器中打开 URL `http://localhost:8080/JakartaEERecipes_Chapter08- 1.0-SNAPSHOT/chapter11/recipe11_10.xhtml`。输出应如图\
  \ 11-4 所示。\n\n***图 11-4.** 配方 11-10 的输出*\n\n第 11 章 ■ Jakarta 上下文和依赖注入\n\n11-11.\
  \ 拦截方法调用\n\n问题\n\n您希望拦截应用程序中的方法调用，使得每次调用该方法时，都会执行特殊功能。\n\n解决方案\n\n利用 Jakarta CDI\
  \ 拦截器，在每次调用指定方法或指定类中的所有方法时，执行特殊功能。在以下场景中，将使用拦截器在每次调用应用程序的某些方法时向管理员发送电子邮件。在此示例中，每次取消图书订单时，都会触发电子邮件。\n\
  \n首先，必须为拦截器生成一个注解。此处的拦截器注解名为 `Notified`，其源代码如下：\n\n```java\npackage org.jakartaeerecipe.chapter11.interceptor;\n\
  \nimport static java.lang.annotation.ElementType.*;\n\nimport java.lang.annotation.*;\n\
  \nimport jakarta.interceptor.InterceptorBinding;\n\n@Inherited\n\n@InterceptorBinding\n\
  \n@Retention(RUNTIME)\n\n@Target({METHOD,TYPE})\n\npublic @interface Notified {\n\
  \n}\n```\n\n接下来，创建拦截器类。拦截器类使用 `@Interceptor` 注解进行标注，并且包含一个使用 `@AroundInvoke` 注解的方法。每当调用某个使用\
  \ `@Notified` 注解的方法，或者调用包含在使用 `@Notified` 注解的类中的方法时，都会调用这个被注解的方法。在此例中，拦截器类名为 `NotificationInterceptor`，其实现如下：\n\
  \n```java\npackage org.jakartaeerecipe.chapter11.interceptor;\n\nimport java.util.Date;\n\
  \nimport java.util.Properties;\n\nimport jakarta.interceptor.AroundInvoke;\n\nimport\
  \ jakarta.interceptor.Interceptor;\n\nimport jakarta.interceptor.InvocationContext;\n\
  \nimport jakarta.mail.Message;\n\nimport jakarta.mail.Session;\n\nimport jakarta.mail.Transport;\n\
  \nimport jakarta.mail.internet.InternetAddress;\n\nimport jakarta.mail.internet.MimeMessage;\n\
  \n@Interceptor\n\n@Notified\n\npublic class NotificationInterceptor {\n\n@AroundInvoke\n\
  \npublic Object emailNotification(InvocationContext ctx) throws Exception {\n\n\
  String smtpServer = \"mysmtpserver.com\";\n\nString email = \"publisherEmail@publisher.com\"\
  ;\n\nProperties props = System.getProperties();\n\nprops.put(\"mail.smtp.host\"\
  , smtpServer);\n\nSession session = Session.getInstance(props, null);\n\nsendEmail(session,\n\
  \nemail,\n\n\"Method invocation\",\n\n\"Entering method: \" + ctx.getMethod().getName());\n\
  \nreturn ctx.proceed();\n\n}\n\nprotected void sendEmail(Session session, String\
  \ toEmail, String subject, String body) {\n\ntry {\n\nMimeMessage msg = new MimeMessage(session);\n\
  \n//set message headers\n\nmsg.addHeader(\"Content-type\", \"text/HTML; charset=UTF-8\"\
  );\n\nmsg.addHeader(\"format\", \"flowed\");\n\nmsg.addHeader(\"Content-Transfer-Encoding\"\
  , \"8bit\");\n\nmsg.setFrom(new InternetAddress(\"no_reply@jakartaeerecipe.com\"\
  , \"NoReply\")); msg.setReplyTo(InternetAddress.parse(\"no_reply@jakartaeerecipe.com\"\
  , false));\n\nmsg.setSubject(subject, \"UTF-8\");\n\nmsg.setText(body, \"UTF-8\"\
  );\n\nmsg.setSentDate(new Date());\n\nmsg.setRecipients(Message.RecipientType.TO,\
  \ InternetAddress.parse(toEmail,\n\nfalse));\n\nTransport.send(msg);\n\n} catch\
  \ (Exception e) {\n\ne.printStackTrace();\n\n}\n\n}\n\n}\n```\n\n最后，必须指定一个或多个类或方法用于拦截。在此示例中，我们希望每当有人登录管理控制台时通知管理员：\n\
  \n```java\n@Notified\n\n@Named\n\n@RequestScoped\n\npublic class AdminConsoleController\
  \ {\n\npublic AdminConsoleController(){\n\n}\n\npublic void login(){\n\nSystem.out.println(\"\
  This is an action method which would allow one to log into an\"\n\n+ \"administrative\
  \ console\");\n\n}\n\n}\n```\n\n在前面的示例代码中，`login()` 方法实际上将用于对个人进行身份验证以登录书店的管理控制台。但是，由于这仅用于演示目的，它只是在系统日志中显示一条消息。要启用此拦截器，必须将以下行添加到\
  \ `beans.xml` 配置中：\n\n```xml\n<interceptors>\n\n<class>org.jakartaeerecipe.chapter11.interceptor.NotificationInterceptor\n\
  \n</class>\n\n</interceptors>\n```\n\n工作原理\n\n拦截器允许将横切功能引入新的或现有的应用程序，而无需显式修改指定类或方法的代码。拦截器允许由于调用指定方法或调用指定类中的方法而执行该功能。因此，拦截器与\
  \ Jakarta CDI 事件非常相似，只是它们不需要显式调用 `fire()` 或 `fireAsync()` 来触发。\n\n一个拦截器解决方案需要一个拦截器绑定类型注解和一个实现类。\n\
  \n拦截器绑定类型注解是一个标准的注解声明，包含 `@Inherited` 和 `@InterceptorBinding` 注解。`@Inherited` 注解表示该注解可以从超类继承。拦截器绑定类型注解应包含\
  \ `METHOD` 和 `TYPE` 作为目标。\n\n拦截器实现类可以包含使用 `@AroundInvoke` 注解的方法，\n\n\n\n`@PostConstruct`、`@PreDestroy`、`@PrePassivate`、`@PostActivate`\
  \ 和 `@AroundTimeout`。这些注解用于指定拦截器方法何时被调用。当类或方法被标注了拦截器绑定时，拦截器实现将根据指定的实现被调用。`@AroundInvoke`\
  \ 指定当被拦截的方法被调用时，该实现将被执行。生命周期回调注解（`@PostConstruct`、`@PreDestroy`、\n\n`@PrePassivate`\
  \ 和 `@PostActivate`）指定当被拦截的方法或类进入指定状态时，拦截器实现将被调用。最后，`@AroundTimeout` 注解用于指示当被拦截的方法发生\
  \ EJB 超时时，该实现将被调用。\n\n`@AroundInvoke` 注解附带了一些要求。如果一个实现方法被标注为此注解，它必须接受一个 `jakarta.interceptor.InvocationContext`\
  \ 参数，并且必须调用该参数的 `proceed()` 方法。调用 `proceed()` 方法会导致目标被调用。\n\n一个拦截器实现类可以包含一个或多个被这些注解标注的方法。\n\
  \n然而，在给定的实现类中，每种类型只能指定一个。要启用拦截器，必须在 `beans.xml` 中指定它，如示例所示。\n\n拦截器是一种在不修改现有代码的情况下为流程添加额外功能的好方法。它们非常适合执行诸如每次访问方法时记录日志之类的操作。\n\
  \n通常，拦截器可以在多种情况下重复使用，因为其功能是通用的，并不绑定到特定的业务逻辑。要了解有关向现有方法添加更具体的业务逻辑功能的更多信息，请参阅涵盖装饰器的配方\
  \ 11-13。\n\n11-12. 引导 Java SE 环境\n\n问题\n\n您希望在 Jakarta EE 容器之外，在 Java SE 环境中利用 Jakarta\
  \ CDI 的功能。\n\n通过这种方法，您可以在独立的 Java 应用程序中使用 CDI 的所有功能，包括依赖注入、上下文生命周期管理和拦截器。\n\n![](img/index-526_1.png)\n\
  \n第 11 章 ■ Jakarta 上下文与依赖注入\n\n解决方案\n\n使用 `SeContainerInitializer` 引导 Java SE 应用程序。在此示例中，创建了一个名为\
  \ `BootstrapExample` 的标准 Java SE 应用程序。使用 Jakarta CDI 引用，将一个 `beans.xml` 文件添加到应用程序的\
  \ `META-INF` 文件夹中：\n\n```java\npublic class BootstrapExample {\n\n    public static\
  \ void main(String[] args) {\n\n        SeContainerInitializer initializer = SeContainerInitializer.newInstance();\n\
  \n        try (SeContainer container = initializer.initialize()) {\n\n         \
  \   /**\n\n             * 使用 Jakarta CDI\n\n             */\n\n            Calculator\
  \ calculator = container.select(Calculator.class).get();\n\n            System.out.println(calculator.addNumbers(new\
  \ int[]{1, 2, 3, 4}));\n\n        }\n\n    }\n\n}\n```\n\n当执行这段代码时，`SeContainer`\
  \ 可用于使用 Jakarta CDI 功能。图 11-5 显示了执行 `main()` 方法的输出。\n\n***图 11-5.** 配方 11-12 的输出*\n\
  \n工作原理\n\n在某些情况下，标准 Java SE 应用程序会受益于使用 Jakarta CDI 提供的实用程序。Jakarta CDI 版本通过添加引导\
  \ API 使这成为可能。要引导，您必须在应用程序中包含 Jakarta CDI 依赖项。还必须包含一个 `beans.xml` 文件，以指示将使用 Jakarta\
  \ CDI。如果使用 Maven 项目，请使用 `cdi-core` 依赖项的坐标，如下所示（根据需要更新版本）：\n\n```xml\n<dependency>\n\
  \n    <groupId>org.jboss.weld.se</groupId>\n\n    <artifactId>weld-se-shaded</artifactId>\n\
  \n    <version>5.0.0.CR1</version>\n\n</dependency>\n```\n\n第 11 章 ■ Jakarta 上下文与依赖注入\n\
  \n\n\n`beans.xml` 文件应包含 Jakarta CDI 配置信息。以下 `beans.xml` 源码提供了最小配置：\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n\n<beans xmlns:xsi=\"http://www.w3.org/2001/\n\nXMLSchema-instance\"\
  \n\nxsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee http://xmlns.jcp.org/xml/ns/\n\
  \njavaee/beans_4_0.xsd\"\n\nbean-discovery-mode=\"all\" version=\"4.0\">\n\n</beans>\n\
  \n`SeContainerInitializer` 类可用于返回自身的实例。通过调用其众多自定义方法，可以为应用程序配置 Jakarta CDI 容器。\n\n\
  ■ **注意** 请参阅在线文档以获取完整详情 (https://docs.jboss.org/weld/reference/latest/en-US/html_single/)\n\
  \n`SeContainerInitializer` 类应遵循构建器模式来配置选项，最后调用的方法应是其 `initialize()`，如示例所示。`SeContainerInitializer`\
  \ 是自动关闭的，因此它非常适合在 try-with-resources 块中使用。所有 Jakarta CDI 的使用都可以在 try 块内进行。在示例中，获取并使用了一个上下文\
  \ bean。\n\n虽然这个示例很简短，但它展示了为 Java SE 应用程序引导 Jakarta CDI 配置是多么容易。\n\n11-13. 增强方法的业务逻辑\n\
  \n问题\n\n您希望增强现有方法的功能，包括与 bean 的业务逻辑集成的能力。\n\n解决方案\n\n使用装饰器来实现对现有方法功能的增强。在以下示例中，为现有方法生成了一个装饰器，通过记录日志到数据库来增强功能。\n\
  \n在此示例中，使用注册表单来注册书店活动。装饰器将用于增强注册过程，将注册者添加到另一个数据库表中以参与抽奖。\n\n首先，每位注册者必须输入他们的名字、姓氏和电子邮件地址。这些信息将存入一个\
  \ `Registration` 对象。对象代码如下：\n\npublic class Registration {\n\nprivate String first;\n\
  \nprivate String last;\n\nprivate String email;\n\npublic Registration(){\n\n}\n\
  \n// ... Getters 和 Setters\n\n}\n\n第 11 章 ■ Jakarta 上下文和依赖注入\n\n接下来，必须为注册类型生成一个接口。在这种情况下，每个注册类型必须包含一个接受\
  \ `Registration` 对象的 `register()` 方法：\n\npublic interface BookstoreRegistration\
  \ {\n\npublic String register(Registration registration);\n\n}\n\n现在创建一个装饰器，它是一个公共抽象类，将之前创建的接口作为注入点：\n\
  \npackage org.jakartaeerecipe.chapter11.decorator;\n\nimport jakarta.decorator.Decorator;\n\
  \nimport jakarta.decorator.Delegate;\n\nimport jakarta.enterprise.inject.Any;\n\n\
  import jakarta.inject.Inject;\n\nimport org.jakartaeerecipe.chapter11.recipe11_13.BookstoreRegistration;\n\
  \nimport org.jakartaeerecipe.chapter11.recipe11_13.Registration;\n\n@Decorator\n\
  \npublic abstract class RegistrationDecorator implements BookstoreRegistration {\n\
  \n@Inject\n\n@Delegate\n\n@Any\n\nprivate BookstoreRegistration bookstoreRegistration;\n\
  \n@Override\n\npublic String register(Registration registration){\n\n// 提交到注册数据库表\n\
  \n// 提交到促销数据库表\n\nreturn registration.getEmail() + \" 已进入赠品活动\";\n\n}\n\n}\n\n最后，我们需要调用\
  \ `register` 方法来启动装饰器功能。在此示例中，我们通过 Jakarta Server Faces 控制器类方法进行调用：\n\n@Named\n\n\
  @ViewScoped\n\npublic class BookstoreRegistrationController implements BookstoreRegistration,\n\
  \nSerializable {\n\n@Inject\n\nprivate Registration current;\n\npublic BookstoreRegistrationController(){\n\
  \n}\n\n// Getters 和 Setters\n\npublic String register(){\n\nreturn register(current);\n\
  \n}\n\n@Override\n\npublic String register(Registration registration) {\n\n// 持久化当前注册信息\n\
  \nreturn \"chapter11/recipe11_13.xhtml\";\n\n}\n\n}\n\n![](img/index-529_1.png)\n\
  \n第 11 章 ■ Jakarta 上下文和依赖注入\n\n当调用 `register()` 方法时，增强的装饰器功能也将被调用，以将注册者添加到赠品数据库表中。要执行上述代码，请在浏览器中打开\
  \ URL http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/chapter11/recipe11_13.xhtml。输出应如图\
  \ 11-6 所示。\n\n***图 11-6.** 配方 11-13 的输出*\n\n点击注册按钮后，GlassFish 服务器日志中会打印以下日志消息：\n\
  \n[2022-04-13T16:00:25.872+0530] [glassfish 7.0] [INFO] [] [] [tid: _ThreadID=42\
  \ _\n\nThreadName=Thread-7] [timeMillis: 1649845825872] [levelValue: 800] [[\n\n\
  执行注册]]\n\n工作原理\n\n装饰器是 Jakarta CDI 的另一个强大组件。与拦截器非常相似，装饰器为现有方法添加增强功能。这两种构造的不同之处在于，装饰器增强功能，并且可以访问正在发生增强功能的\
  \ bean 的字段和方法。另一方面，拦截器无法访问 bean 的字段和方法，因此除了现有方法的标准功能之外，它们提供更通用的功能。\n\n要创建装饰器，必须使用接口作为注入点，并且接口的一个或多个方法将通过添加到装饰器类中的实现来增强。在示例中，通过将注册者添加到抽奖赠品活动中，增强了标准的书店账户注册。\n\
  \n尽管该示例并未实际演示数据库持久化等操作，但如果执行代码，您可以看到装饰器被调用。\n\n装饰器类必须使用 `@Decorator` 注解进行标记，并且它必须实现一个接口并包含至少一个方法实现。但是，装饰器类可以设为抽象类，这样它就不必实现接口中包含的每个方法。装饰器必须包含一个委托注入点，该注入点使用\
  \ `jakarta.decorator.Delegate` 进行注解。此注入点可以是装饰器类的字段、构造函数参数或初始化方法参数。\n\n要启用装饰器，必须将其添加到\
  \ `beans.xml` 文件中。以下 `beans.xml` 演示了 `RegistrationDecorator` 的添加：\n\n<decorators>\n\
  \n<class>org.jakartaeerecipe.chapter11.decorator.RegistrationDecorator</class>\n\
  \n</decorators>\n\n当然，一个应用程序可以包含多个装饰器。要管理装饰器的触发顺序，请使用 `beans.xml` 并按优先级顺序列出。另一种管理优先级的方法是使用\
  \ `@Priority` 注解来注解装饰器。拦截器优先于装饰器，因此如果一个方法同时包含拦截器和装饰器，则拦截器将首先被触发。\n\n**第 12 章**\n\
  \n**Jakarta 消息传递**\n\nJakarta 消息传递 API（以前称为 Java 消息服务或 JMS）是一个 API，允许软件应用程序在其他软件应用程序或组件之间创建、编辑、读取和发送消息。\n\
  \n该 API 允许在应用程序服务器内创建资源，这些资源有助于在各种上下文中实现消息传递功能。应用程序服务器托管连接工厂和目标资源，这些资源由应用程序服务器创建和维护。\n\
  \n\n\n除了基本消息传递功能外，Jakarta Messaging 还允许向目的地发送消息以及向订阅发布消息。本章包含的攻略侧重于 Jakarta Messaging\
  \ 的基本概念，以及 Jakarta EE 10 发布后 Jakarta EE 平台可用的一些高级技术。在跟随本章示例进行操作时，请注意，您可以在各种场景下使用\
  \ Jakarta Messaging 来创建多种不同类型的消息。为简洁起见，本章将仅涵盖核心概念并使用 `TextMessage` 对象。示例将通过 Jakarta\
  \ Server Faces 视图操作来调用，尽管在实际应用中实现消息发送和接收的方式有很多种。您可以在许多不同的上下文中利用 Jakarta Messaging，从内部消息调用到通过\
  \ Jakarta Enterprise Beans 定时器或 `ManagedExecutorService` 执行计划任务，甚至与消息驱动 Bean 进行消息传递。阅读完这些攻略后，您应该能够应用其中的策略来创建满足您需求的消息传递系统。\n\
  \nJakarta Messaging 3.1 通过一种简化的技术改进了 API，用于发送和接收消息。在本章中，您将看到传统的标准 API 和简化的 API，以便比较它们之间的差异。更新后的\
  \ API 还包括对消息订阅、投递延迟等方面的增强。Jakarta Messaging 的范围非常广泛，无法在本章中完全覆盖。要了解所有特性，请参考 Jakarta\
  \ Messaging 3.1 规范（[`jakarta.ee/specifications/messaging/3.0/jakarta-messaging-spec-3.0.html`](https://jakarta.ee/specifications/messaging/3.0/jakarta-messaging-spec-3.0.html)）。\n\
  \n■ **注意** 本章中的示例侧重于在 GlassFish 应用服务器环境中使用 Jakarta Messaging 资源。然而，尽管重点在于 GlassFish\
  \ 7.0，但主要概念和技术几乎可以应用于所有符合 Jakarta EE 规范的应用服务器环境。有关使用其他应用服务器或 IDE 的更具体细节，请参阅相应环境的特定文档。\n\
