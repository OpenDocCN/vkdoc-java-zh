  \n`EERecipesAuthorList}\">Jakarta EE 10 Recipes </h:commandLink>`\n\n`</h:form>`\n\
  \n`</div>`\n\n`<div id=\"content\" class=\"left_content\">`\n\n`<ui:insert name=\"\
  content\">Content</ui:insert>`\n\n`</div>`\n\n`</div>`\n\n`<div id=\"bottom\" style=\"\
  position: absolute;width: 100%;bottom: 20px;\"> Written by Josh Juneau and Tarun\
  \ Telang, Apress Author`\n\n`</div>`\n\n`</h:body>`\n\n`</html>`\n\n该模板定义了应用程序视图的整体结构。但是，它使用\
  \ CSS 样式表来声明模板中每个 `<div>` 元素的格式。名为 `default.css` 的样式表应包含在应用程序的 `resources` 目录中，以便视图可以访问它。有关\
  \ `resources` 目录的更多详细信息，请参阅配方 3-15。\n\n■ **注意** 如果您使用的是 NetBeans IDE，CSS 样式表可以自动为您生成。\n\
  \n模板中还使用了几个 Jakarta 表达式语言表达式。Jakarta 表达式语言引用了一个名为 `AuthorController` 的 Jakarta Server\
  \ Faces 控制器，该控制器由 `faceletsAuthorController` 引用。虽然此类的源代码对于整个应用程序非常重要，但您将等到配方 3-15\
  \ 再查看该代码，因为它不参与应用程序模板布局。\n\n工作原理\n\n\n\n为了打造统一的应用程序体验，所有视图应保持连贯，即外观相似且功能一致。开发网页模板的想法已存在多年，但遗憾的是，许多模板实现会在每个应用程序页面上包含重复的标记。虽然为每个独立网页复制相同的布局是可行的，但这会带来维护上的噩梦。当需要更新页面标题中的某个链接时会发生什么？如果模板在每个页面上都被复制，这种难题将迫使开发人员访问并手动更新应用程序的每个网页。Facelets\
  \ 视图定义语言为开发视图模板提供了强大的解决方案，这也是使用 Jakarta Server Faces 技术的主要优势之一。\n\nFacelets 允许将单个模板应用于应用程序中的一个或多个视图。这意味着开发人员可以创建一个视图来构建模板的页眉、页脚及其他部分，然后该视图可应用于任意数量的、负责包含主要视图内容的其他视图。这种技术缓解了诸如更改页面标题中单个链接之类的问题，因为现在只需用新链接更新模板，应用程序中的所有其他视图就会自动反映这一更改。\n\
  \n![](img/index-205_1.jpg)\n\n第 3 章 ■ Jakarta Server Faces\n\n要使用 Facelets 创建模板，需创建一个\
  \ XHTML 视图，声明所需的命名空间，然后相应地添加 HTML、Jakarta Server Faces 和 Facelets 标签来设计你想要的布局。模板可以被视为网页视图的“外壳”，因为它可以在其内部包含任意数量的其他视图。同样，任意数量的\
  \ Jakarta Server Faces 视图都可以应用相同的模板，因此应用程序的整体外观和感觉将保持一致。图 3-19 直观地展示了应用程序模板的概念。\n\
  \n***图 3-19.** Facelets 模板与客户端的可视化表示*\n\n你可能已经注意到，本方案示例的视图列表中包含一些带有 `ui:` 前缀的标签。这些是负责控制视图布局的\
  \ Facelets 标签。要使用这些 Facelets 标签，你需要在模板的 `<html>` 元素中为 Facelets 标签库声明 XML 命名空间。请注意，标准\
  \ Jakarta Server Faces 标签库的 XML 命名空间也在此处指定：\n\n<html\n\n>\n\n...\n\n■ **注意** Facelets\
  \ 模板必须包含 `<html>`、`<head>` 或 `<h:head>`，以及 `<body>` 或 `<h:body>` 元素，因为它们为每个使用该模板的视图定义了整体布局。每个使用\
  \ Facelets 模板的视图被称为一个组合。一个模板可以被多个组合或视图使用。实际上，在组合中，`<ui:composition>` 开始和结束标签之外的所有内容都会被忽略。\n\
  \n你将在下一个方案中了解更多相关信息！\n\n![](img/index-206_1.png)\n\n第 3 章 ■ Jakarta Server Faces\n\
  \nFacelets 包含几个可用于控制页面流程和布局的特殊标签。表 3-7（在方案 3-15 中）列出了对控制页面流程和布局有用的 Facelets 标签。本方案示例的模板中唯一使用的\
  \ Facelets 标签是 `ui:insert`。`ui:insert` 标签包含一个 `name` 属性，该属性设置为将包含在视图中的相应 `ui:define`\
  \ 元素的名称。\n\n查看本方案的源代码，你可以看到以下 `ui:insert` 标签：\n\n<ui:insert name=\"content\">Content</ui:insert>\n\
  \n如果使用该模板的视图（也称为模板客户端）指定了一个 `ui:define` 标签，其名称与 `ui:insert` 的 `name` 相同，那么放置在 `ui:define`\
  \ 开始和结束标签之间的任何内容都将被插入到视图中的该位置。但是，如果模板客户端不包含与 `ui:insert` 标签同名的 `ui:define` 标签，则会显示模板中\
  \ `ui:insert` 开始和结束标签之间的内容。\n\n可以通过 IDE（如 NetBeans）创建模板，以便更直观地呈现你想要实现的布局。要在 NetBeans\
  \ 中创建 Facelets 模板，请右键单击要放置模板的项目文件夹，然后从上下文菜单中选择“新建”➤“其他”以打开“新建文件”窗口。打开后，从“类别”菜单中选择“JavaServer\
  \ Faces”，然后从文件类型中选择“Facelets 模板”，如图 3-20 所示。\n\n***图 3-20.** 在 NetBeans 中创建 Facelets\
  \ 模板*\n\n![](img/index-207_1.png)\n\n第 3 章 ■ Jakarta Server Faces\n\n选择“Facelets\
  \ 模板”文件类型后，单击“下一步”按钮打开“新建 Facelets 模板”窗口（见图 3-21）。此窗口允许你选择要为应用程序视图组合的整体布局，以及选择模板的位置和名称。\n\
  \n***图 3-21.** NetBeans 中的“新建 Facelets 模板”窗口*\n\n选择好布局并填写其他选项后，模板将在 NetBeans 代码编辑器中打开，你可以开始将模板应用于\
  \ Jakarta Server Faces 视图客户端（参见方案 3-15）。使用像 NetBeans 提供的向导这样的工具会很有帮助，因为你可以创建时选择模板的可视化表示。\n\
  \n总之，Facelets 模板由 HTML 和 Jakarta Server Faces 标记组成，用于定义页面布局。模板的各个部分可以通过 `ui:insert`\
  \ 标签指定页面内容的显示位置。模板中包含 `ui:insert` 标签的任何区域都可以从模板客户端插入内容。\n\n第 3 章 ■ Jakarta Server\
  \ Faces\n\n3-14. 应用模板\n\n问题\n\n你已经为 Jakarta Server Faces 网页视图创建了一个模板，并希望将其应用于应用程序的视图。\n\
  \n解决方案\n\n在每个将使用该模板的视图中使用 `ui:composition` 标签。`ui:composition` 标签应用于调用模板，并且应在需要插入内容的位置放置\
  \ `ui:define` 标签。以下列表演示了如何将 Facelets 模板应用于各种视图。\n\n视图 #1：recipe03_14a.xhtml\n\n\
  recipe03_14a.xhtml 是书店应用程序中用于显示 *Java EE to Jakarta EE 10 Recipes* 一书作者的视图标记。模板应用于该视图，并且视图中使用了单独的\
  \ `ui:define` 标签来指定应插入到页面/视图中的内容：\n\n<html\n\n>\n\n<body>\n\n<ui:composition template=\"\
  ./layout/custom_template.xhtml\">\n\n<ui:define name=\"top\"/>\n\n<ui:define name=\"\
  left\"/>\n\n<ui:define name=\"content\">\n\n<h:form id=\"componentForm\">\n\n<h1>Java\
  \ EE to Jakarta EE 10 Recipes 作者列表</h1>\n\n<p>\n\n以下是作者列表。点击作者的姓氏可获取更多关于该作者的信息。\n\
  \n</p>\n\n<h:graphicImage id=\"javarecipes\" style=\"width: 100px; height: 120px\"\
  \n\nlibrary=\"image\" name=\"java9recipes.png\"/>\n\n<br/><br/>\n\n<h:dataTable\
  \ id=\"authorTable\" border=\"1\" value=\"#{faceletsAuthor\n\nController.authorList}\"\
  \n\nvar=\"author\">\n\n<f:facet name=\"header\">\n\nJava EE to Jakarta EE 10 Recipes\
  \ 作者\n\n</f:facet>\n\n<h:column>\n\n<h:commandLink id=\"authorName\" action=\"#{faceletsAuthorControll\n\
  \ner.displayAuthor(author.last)}\"\n\nvalue=\"#{author.first} #{author.last}\"/>\n\
  \n</h:column>\n\n</h:dataTable>\n\n</h:form>\n\n</ui:define>\n\n第 3 章 ■ Jakarta\
  \ Server Faces\n\n<ui:define name=\"bottom\">底部 </ui:define>\n\n</ui:composition>\n\
  \n</body>\n\n</html>\n\n视图 #2：recipe03_14b.xhtml\n\n\n\n以下是摘自 recipe03_14b.xhtml\
  \ 文件的内容，其中包含书店应用程序中第二个视图的源代码。该视图用于列出 *Java EE 到 Jakarta EE 10 Recipes* 一书的作者。此文件中的代码与\
  \ recipe03_15a 摘录中的代码基本相同：\n\n...\n\n<h:form id=\"componentForm\">\n\n<h1>《Java\
  \ EE 到 Jakarta EE 10 Recipes》作者列表</h1>\n\n<p>\n\n以下是作者列表。点击作者的姓氏可查看关于该作者的更多信息。\n\
  \n</p>\n\n<h:graphicImage id=\"akartaee10recipes\" library=\"image\" style=\"width:\
  \ 100px; height: 120px\" name=\"jakartaee10recipes.png\"/>\n\n<br/><br/>\n\n<h:dataTable\
  \ id=\"authorTable\" border=\"1\" value=\"#{faceletsAuthor\n\nController.authorList}\"\
  \n\nvar=\"author\">\n\n<f:facet name=\"header\">\n\n《Java EE 到 Jakarta EE 10 Recipes》作者\n\
  \n</f:facet>\n\n<h:column>\n\n<h:commandLink id=\"authorName\" action=\"#{faceletsAuthor\n\
  \nController.displayAuthor(author.last)}\"\n\nvalue=\"#{author.first} #{author.last}\"\
  />\n\n</h:column>\n\n</h:dataTable>\n\n...\n\n视图 #3：recipe03_14c.xhtml\n\nRecipe03_14c.xhtml\
  \ 包含书店应用程序中另一个列表视图的源代码。该视图负责显示单个作者的详细信息。同样，模板被应用于此页面：\n\n<html\n\n>\n\n<h:head>\n\
  \n<title>配方 3-14：Facelets 页面模板</title>\n\n</h:head>\n\n<h:body>\n\n第 3 章 ■ Jakarta\
  \ Server Faces\n\n<ui:composition template=\"./layout/custom_template.xhtml\">\n\
  \n<ui:define name=\"top\">\n\n</ui:define>\n\n<ui:define name=\"left\">\n\n</ui:define>\n\
  \n<ui:define name=\"content\">\n\n<h:form id=\"componentForm\">\n\n<h1>#{faceletsAuthorController.current.first}\n\
  \n#{faceletsAuthorController.current.last}</h1>\n\n<p>\n\n#{faceletsAuthorController.current.bio}\n\
