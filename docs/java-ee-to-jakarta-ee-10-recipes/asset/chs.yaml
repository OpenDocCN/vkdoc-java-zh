  />`\n\n`<title>#{faceletsAuthorController.storeName}</title>`\n\n`</h:head>`\n\n\
  `<h:body>`\n\n`<div id=\"top\">`\n\n`<h2>#{faceletsAuthorController.storeName}</h2>`\n\
