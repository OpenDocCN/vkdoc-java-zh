  </h:body>\n</html>\n```\n\n生成的 Jakarta Server Faces 视图在显示给用户时如图 3-3 所示。\n\n***图\
  \ 3-3.** 生成的 Jakarta Server Faces 视图页面*\n\n工作原理\n\nJakarta Server Faces 控制器类负责为基于\
  \ Jakarta Server Faces 的 Web 应用程序提供应用逻辑。就像 JavaBean 之于 Jakarta Server Pages 一样，控制器类是\
  \ Jakarta Server Faces 视图的支柱。它们也被称为*支持 bean* 或*托管 bean*，因为通常每个 Jakarta Server Faces\
  \ 视图对应一个 Jakarta Server Faces 控制器类。\n\n自 Jakarta Server Faces 技术引入以来，控制器类发生了一些变化。过去，每个控制器类都需要在\
  \ `faces-config.xml` 配置文件中进行配置，并且对于某些应用服务器，还需要在 `web.xml` 文件中进行配置。从 JSF 2.0 版本开始，控制器类的使用变得更加简单，编写功能强大的\
  \ Jakarta Server Faces 应用程序也比以往任何时候都更容易。本配方侧重于较新的控制器类技术。\n\n`@Named(value=\"calculationController\"\
  )`\n\n本配方的示例演示了 Jakarta Server Faces 控制器类的许多最重要特性。视图组件以 `calculationController`\
  \ 的形式引用控制器类。默认情况下，Jakarta Server Faces 控制器类可以在 Jakarta Server Faces 视图中使用 bean 类的名称（首字母小写）进行引用。控制器类必须使用\
  \ `@Named` 注解进行标注，以将其标记为可注入的 CDI bean。使用 `@Named` 注解，可以更改在视图中引用 bean 的字符串。在示例中，`calculationController`\
  \ 也作为传递给 `@Named` 注解的名称使用，但它本可以轻松地改为其他字符串。`@Named` 注解应放在类声明之前。\n\n`calculationList.add(new\
  \ SelectItem(ADDITION));`\n\n\n\n`jakarta.faces.model.SelectItem` 类是一个便捷类，用于封装可选择组件（如下拉列表）中单个项目的通用信息。`SelectItem`\
  \ 用于将一组相关项目组合在一起。在此，下拉列表组件由 `SelectItem` 对象数组表示。\n\n作用域\n\n示例中的 Bean 将在首次被会话访问时初始化，并在会话销毁时销毁。它是一个与会话“共存”的控制器类。Bean\
  \ 的作用域通过在类声明之前的类上添加注解来配置。每个可用作用域都有不同的注解可供使用。在本例中，注解为 `@SessionScoped`，表示该控制器类为会话作用域。所有可能的控制器类作用域均列于表\
  \ 3-1 中。\n\n***表 3-1.** 控制器类作用域*\n\n**作用域注解**\n\n**描述**\n\n`@ApplicationScoped`\n\
  \n指定 Bean 为应用程序作用域。在应用程序启动时初始化，在应用程序关闭时销毁。具有此作用域的控制器类在同一应用程序内对所有应用程序构造可用。\n\n`@RequestScoped`\n\
  \n指定 Bean 在 Web 应用程序上下文中为请求作用域。在向该 Bean 发出 HTTP 请求时初始化，在请求完成时销毁。\n\n`@SessionScoped`\n\
  \n指定 Bean 在 Web 应用程序上下文中为会话作用域。在会话中首次访问时初始化，在会话结束时销毁。对同一会话中发出的所有 Servlet 请求可用。\n\
  \n`@ConversationScoped`\n\n指定 Bean 为对话作用域。对话是一系列逐步发生的 HTTP 请求和响应，旨在完成一个流程。此应用程序作用域特定于\
  \ Web 应用程序上下文。在对话开始时初始化，在对话结束时销毁。具有此作用域的控制器在对话的整个生命周期内可用，并属于单个 HTTP 会话。如果 HTTP 会话结束，则在会话期间创建的所有对话上下文都将被销毁。\n\
  \n（续）\n\n第三章 ■ Jakarta 服务器面\n\n***表 3-1.*** （续）\n\n**作用域注解**\n\n**描述**\n\n`@Singleton`\n\
  \n这是一个伪作用域，意味着它不像其他 CDI 作用域那样被代理。此作用域指定整个应用程序中仅存在该 Bean 的一个实例。\n\n`@Dependent`\n\
  \n这是一个伪作用域，意味着它不像其他 CDI 作用域那样被代理。使用此作用域的 Bean 的行为与包含任何其他作用域的控制器类不同。\n\n`@TransactionScoped`\n\
  \n使用此作用域注解的 Bean 的生命周期表示其生命周期将持续到活动事务结束。当 CDI Bean 在会话中首次使用带有此注解的控制器时，将在整个事务中使用同一实例。\n\
  \n`@FlowScoped`\n\n此作用域的 Bean 用于 Jakarta 服务器面流程的上下文中。该 Bean 将在流程作用域内首次被访问时实例化，并在流程完成后销毁。\n\
  \n`@ViewScoped`\n\n此作用域表示该 Bean 将在 Jakarta 服务器面视图的整个生命周期内保持可用。\n\n`@Named` 注解向应用程序服务器容器指明该类是一个\
  \ CDI Bean。在 Jakarta 服务器面 2.0 之前，控制器类必须在 `faces-config.xml` 文件中声明，并且在 Jakarta 服务器面\
  \ 2.2+ 之前，它们使用 `@ManagedBean` 进行注解。注解的添加使得 Jakarta 服务器面控制器类无需 XML 配置。需要注意的是，控制器类实现了\
  \ `java.io.Serializable`；所有控制器类都应指定为可序列化，以便在必要时可由容器持久化到磁盘。\n\n控制器中声明的字段应指定为 `private`，以遵循面向对象的方法。\n\
  \n\n\n要使某个字段对公众可访问并能在 Jakarta Server Faces 视图中使用，应为其声明访问器方法。任何拥有对应“getter”和“setter”的字段都被称为\
  \ Jakarta Server Faces 控制器类的*属性*。通过在 Jakarta Server Faces 视图中使用左值 Jakarta 表达式语言表达式（即表达式包含在\
  \ `#{` 和 `}` 字符序列中，并且可读可写），这些属性可供使用。左值表达式可以指定目标，而右值表达式则不能。例如，要访问控制器类中声明的 `num1`\
  \ 字段，Jakarta Server Faces 视图可以使用 `#{calculationController.num1}` 表达式，正如你在示例的 Jakarta\
  \ Server Faces 视图代码中所见。\n\nJakarta Server Faces 控制器类中包含的任何公共方法都可以通过相同的 Jakarta 表达式语言语法从\
  \ Jakarta Server Faces 视图中访问，即指定 `#{beanName.methodName}` 作为表达式。在本配方的示例中，控制器类的 `performCalculation`\
  \ 方法通过使用 `h:commandButton` Jakarta Server Faces 组件从 Jakarta Server Faces 视图中调用。该组件的\
  \ action 属性等于将调用 Jakarta Server Faces 控制器类方法的 Jakarta 表达式语言表达式。要了解更多关于 Jakarta Server\
  \ Faces 组件以及如何在视图中使用它们的信息，请参阅配方 3-3 和第 5 章。\n\n<h:commandButton action=\"#{calculationController.performCalculation}\"\
  \ value=\"计算\"/>\n\n■ **注意** 此示例的输入表单标签不包含 action 属性。Jakarta Server Faces 表单不包含\
  \ action 属性，因为视图中的 Jakarta Server Faces 组件负责指定操作方法，而不是表单本身。这使得它基于组件，并增加了灵活性和简洁性。\n\
  \n第 3 章 ■ Jakarta Server Faces\n\nJakarta Server Faces 控制器类是 Jakarta Server Faces\
  \ Web 框架的基本组成部分。它们为使用 Java 平台开发动态、健壮且复杂的 Web 应用程序提供了手段。\n\n3-3. 使用组件构建复杂的 Jakarta\
  \ Server Faces 视图\n\n问题\n\n你想创建一个由预捆绑组件组成的复杂用户界面。\n\n解决方案\n\n在你的 Jakarta Server\
  \ Faces 视图中使用捆绑的 Jakarta Server Faces 组件。Jakarta Server Faces 组件包含捆绑的应用程序逻辑和视图结构，包括样式和\
  \ JavaScript 操作，只需在视图中添加标签即可在应用程序中使用。在以下示例中，使用了多个 Jakarta Server Faces 组件来创建一个视图，该视图显示\
  \ Apress 书籍的作者，并允许将新作者添加到列表中。图像应存在于文件夹结构中，如图 3-4 所示。\n\n***图 3-4.** 项目文件夹结构*\n\n\
  第 3 章 ■ Jakarta Server Faces\n\n以下代码来自 recipe03_03.xhtml，即 Jakarta Server Faces\
  \ 视图的 XHTML 文件：\n\n<html>\n\n<h:head>\n\n<title>配方 3-3：使用组件构建复杂的 Jakarta Server\
  \ Faces 视图</title>\n\n</h:head>\n\n<h:body>\n\n<h:form id=\"componentForm\">\n\n\
  <h1>Jakarta Server Faces 组件，创建复杂页面</h1>\n\n<p>\n\n此页面的视图完全由 Jakarta Server Faces\
