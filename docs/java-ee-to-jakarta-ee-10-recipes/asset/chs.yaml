  \n}\n\n/**\n\n* 将此 User 的 username 设置为指定值。\n\n* @param username 新的 username\n\n\
  */\n\npublic void setUsername(String username) {\n\nthis.username = username;\n\n\
  }\n\n/**\n\n* 获取此 User 的 securityRole。\n\n* @return securityRole\n\n*/\n\npublic\
