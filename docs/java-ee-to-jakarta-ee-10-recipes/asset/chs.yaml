  \ 是一个用于多种语言编程的跨平台集成开发环境（IDE）。它主要用 Java 编写，主要用于开发 Java 应用程序，但也可用于开发其他编程语言的应用程序，包括\
  \ C++、PHP、Python 和 Ruby。\n\n所有这些 IDE 都支持 Jakarta EE 应用程序的开发。使用哪一个取决于个人偏好。\n\n在本书中，我将使用\
  \ IntelliJ IDEA 终极版，但相同的概念也适用于 NetBeans 或 Eclipse IDE。\n\n第 1 章 ■ Jakarta ServletS\n\
  \n工作原理\n\nJakarta Servlets 为开发者提供了使用请求-响应编程模型设计应用程序的灵活性。它在 Java 平台上微服务和 Web 应用程序的开发中扮演着关键角色。可以创建不同类型的\
  \ servlet，每种类型都旨在提供不同的功能。第一种类型称为 GenericServlet，它提供与协议无关的服务和功能。第二种类型 HttpServlet\
  \ 是 GenericServlet 的子类，它利用 HTTP 提供功能和响应。本技巧的解决方案演示了后一种类型的 servlet，因为它会显示一个结果供用户在\
  \ Web 浏览器中查看。\n\nServlet 遵循一个生命周期来处理请求和发布结果。首先，Jakarta Servlet 容器调用 servlet 的构造函数。每个\
  \ servlet 的构造函数必须不接受任何参数。接下来，容器调用 servlet 的 `init()` 方法，该方法负责初始化 servlet。一旦 servlet\
  \ 被初始化，它就可以使用了。此时，servlet 可以开始处理请求。每个 servlet 都包含一个 `service()` 方法，该方法处理发出的请求并将其分派给适当的请求处理方法。实现\
  \ `service()` 方法是可选的。最后，容器调用 servlet 的 `destroy()` 方法，该方法负责终结 servlet 并将其停止服务。\n\
  \n每个 servlet 类都必须实现 `jakarta.servlet.Servlet` 接口或扩展另一个实现了该接口的类。在本技巧的解决方案中，名为 `SimpleServlet`\
  \ 的 servlet 扩展了 `HttpServlet` 类，该类提供了处理 HTTP 过程的方法。在此场景中，浏览器客户端请求从容器发送到 servlet；然后\
  \ servlet 的 `service()` 方法将 `HttpServletRequest` 对象分派给 `HttpServlet` 提供的适当方法。也就是说，`HttpServlet`\
  \ 类提供了 `doGet()`、`doPut()`、`doPost()` 和 `doDelete()` 方法来处理 HTTP 请求。最常用的方法是 `doGet()`\
  \ 和 `doPost()`。`HttpServlet` 类是抽象的，因此必须对其进行子类化，然后为其方法提供实现。表 1-1 描述了 `HttpServlet`\
  \ 可用的每个方法。\n\n***表 1-1.** HttpServlet 方法*\n\n**方法名称**\n\n**描述**\n\ndoGet\n\n用于处理\
  \ HTTP GET 请求。发送到 servlet 的输入必须包含在 URL 地址中。例如：`?publisher=Apress&topic=JakartaEE10`\n\
  \ndoPost\n\n用于处理 HTTP POST 请求。输入可以通过 HTML 表单字段发送到 servlet\n\ndoPut\n\n用于处理 HTTP\
  \ PUT 请求\n\ndoDelete\n\n用于处理 HTTP DELETE 请求\n\ndoHead\n\n用于处理 HTTP HEAD 请求\n\ndoOptions\n\
  \n由容器调用以允许处理 OPTIONS 请求\n\ndoTrace\n\n由容器调用以处理 TRACE 请求\n\ngetLastModified\n\n返回\
  \ `HttpServletRequest` 对象最后被修改的时间\n\ninit\n\n初始化 servlet\n\nservice\n\n由 servlet\
  \ 容器在 `init()` 方法之后调用。它允许 servlet 响应请求\n\ndestroy\n\n终结 servlet\n\ngetServletInfo\n\
  \n提供有关 servlet 的信息\n\n第 1 章 ■ Jakarta ServletS\n\n```\n\n\nServlet 通常在其方法实现中执行某些处理，然后向客户端返回响应。`HttpServletRequest`\
  \ 对象可用于处理通过请求发送的参数。例如，如果 HTML 表单包含一些发送到服务器的输入字段，这些字段将包含在 `HttpServletRequest` 对象中。`HttpServletResponse`\
  \ 对象用于向客户端浏览器发送响应。Servlet 中的 `doGet()` 和 `doPost()` 方法都接受相同的参数，即 `HttpServletRequest`\
  \ 和 `HttpServletResponse` 对象。\n\n■ **注意**：`doGet()` 方法用于拦截 HTTP GET 请求，而 `doPost()`\
  \ 用于拦截 HTTP POST 请求。通常，`doGet()` 方法用于在向客户端显示之前准备请求，而 `doPost()` 方法用于处理请求并从 HTML\
  \ 表单收集信息。\n\n在本方案的解决方案中，`doGet()` 和 `doPost()` 方法都将 `HttpServletRequest` 和 `HttpServletResponse`\
  \ 对象传递给 `processRequest()` 方法以进行进一步处理。在 `processRequest()` 方法中，`HttpServletResponse`\
  \ 对象用于设置响应的内容类型并获取 `PrintWriter` 对象的句柄。以下代码行展示了如何实现这一点，假设引用 `HttpServletResponse`\
  \ 对象的标识符是 `response`：\n\n```java\nresponse.setContentType(\"text/html;charset=UTF-8\"\
  );\nPrintWriter out = response.getWriter();\n```\n\n`GenericServlet` 可用于为 Web 应用程序提供服务。这种类型的\
  \ Servlet 通常用于记录事件，因为它实现了 `log()` 方法。`GenericServlet` 实现了 `Servlet` 和 `ServletConfig`\
  \ 接口，要编写一个通用 Servlet，只需重写 `service()` 方法。\n\n1-3. 打包、编译和部署 Servlet\n\n问题\n\n您已经编写了一个\
