  \n\n\n• +（加法）、-（二元和一元）、*（乘法）、/ 和 div（除法）、% 和 mod（取模）\n• and、&&、or、||、not、!\n• ==、!=、<、>、<=、>=\n\
  • X ? Y : Z（三元条件运算符）\n\n关于在 Jakarta Server Pages 中使用 Jakarta 表达式语言表达式，已有整本书的章节进行过论述。本技巧仅涉及值表达式的一些可能性。熟悉表达式的最佳方法是创建一个测试用的\
  \ Jakarta Server Page，并尝试使用各种可用选项。\n\n2-8\\. 在多个页面中访问参数\n\n问题\n\n你希望从 Web 应用的多个页面中访问某个参数。\n\
  \n解决方案\n\n创建一个输入表单，将参数提交到请求对象中，然后利用请求对象在另一个页面中检索这些值。在接下来的示例中，包含输入表单的 Jakarta Server\
  \ Page 通过将 HTML 表单的 `action` 属性设置为将使用这些参数的 Jakarta Server Page 的值，将值传递给另一个 Jakarta\
  \ Server Page。在本例中，接收参数的 Jakarta Server Page 仅显示参数值，但也可以执行其他操作。\n\n以下 Jakarta Server\
  \ Page 代码演示了如何使用输入表单将参数保存到请求对象中，并将其传递给名为 `recipe02_08b.jspx` 的页面：\n\n```html\n<html\
  \ >\n<jsp:directive.page contentType=\"text/html\" pageEncoding=\"UTF-8\"/>\n<head>\n\
  <style>div {\n  padding: 10px;\n}</style>\n<title>技巧 2-8：在多个页面中访问参数</title>\n</head>\n\
  <body>\n<h1>传递参数</h1>\n<p>以下参数将被传递给下一个 Jakarta Server。</p>\n<form method=\"get\"\
  \ action=\"recipe02_08b.jspx\">\n<div>\n  <label for=\"param1\">参数 1：</label>\n\
  \  <input id=\"param1\" name=\"param1\" type=\"text\" value=\"1\"/>\n</div>\n<div>\n\
  \  <label for=\"param2\">参数 2：</label>\n  <input id=\"param2\" name=\"param2\" type=\"\
  text\" value=\"2 + 0\"/>\n</div>\n<div>\n  <label for=\"param3\">参数 3：</label>\n\
  \  <input id=\"param3\" name=\"param3\" type=\"text\" value=\"three\"/>\n</div>\n\
  <div>\n  <input type=\"submit\" value=\"前往下一页\"/>\n</div>\n</form>\n</body>\n</html>\n\
  ```\n\n下一个 Jakarta Server Page 代码接收参数并显示其值：\n\n```html\n<html version=\"2.0\">\n\
  <jsp:directive.page contentType=\"text/html\" pageEncoding=\"UTF-8\"/>\n<head>\n\
  <title>技巧 2-8：在多个页面中访问参数</title>\n</head>\n<body>\n<h1>传递参数</h1>\n<p>以下参数是从原始 Jakarta\
  \ Server Pages 传递过来的。</p>\n<form method=\"post\" action=\"recipe02_08a.jspx\">\n\
  参数 1：<jsp:expression>request.getParameter(\"param1\") </jsp:expression>\n<br/>\n\
  参数 2：<jsp:expression> request.getParameter(\"param2\") </jsp:expression>\n<br/>\n\
  参数 3：<jsp:expression> request.getParameter(\"param3\") </jsp:expression>\n<br/>\n\
  或者使用值表达式\n<br/>\n参数 1：${ param.param1 }\n<br/>\n参数 2：${ param.param2 }\n<br/>\n\
  参数 3：${ param.param3 }\n<br/>\n<input type=\"submit\" value=\"返回页面 1\"/>\n</form>\n\
  </body>\n</html>\n```\n\n如你所见，可以使用几种不同的方式来显示参数值。这两种方式都会显示相同的结果。\n\n工作原理\n\n请求参数是\
  \ Web 应用最有用的特性之一。当用户在 Web 表单中输入数据并提交表单时，请求中会包含输入到表单中的参数。参数也可以静态嵌入到网页中，或附加到 URL 上，然后发送给接收的\
  \ Servlet 或 Jakarta Server Page。请求参数中包含的数据随后可以插入到数据库中、在另一个 Jakarta Server Page 上重新显示、用于执行计算，或用于其他各种用途。Jakarta\
  \ Server 技术提供了一种简单的机制，用于在其他 Jakarta Server Pages 中使用请求参数，本技巧中的示例演示了如何实现这一点。\n\n\
  ■ **注意** 请求参数始终会被转换为字符串值。\n\n\n\n请注意，在示例中，第一个 Jakarta Server Page 使用了一个简单的 HTML\
  \ 表单来获取用户输入的值并将其提交到请求中。该表单的外观如图 2-9. 另一个 Jakarta Server Page 所示，名为 recipe02_08b.jspx\
  \ 的页面被设置为表单的 action 属性，因此当表单提交时，它会将请求发送至 recipe02_08b.jspx。第一个 Jakarta Server Page\
  \ 上的输入字段同时指定了 id 属性和 name 属性，尽管只有 name 属性是必需的。输入字段的名称将用于引用输入的值，作为请求参数。\n\n■ **注意**\
  \ 始终包含 id 属性是一种良好的编程实践。ID 对于通过 DOM 进行操作以及通过 JavaScript 等脚本语言引用元素非常有用。\n\n在本例中，接收动作页面\
  \ recipe02_08b.jspx 可以调用 response.getParameter()，传入参数名称（输入字段名称）来获取对应文本字段中输入的值。为了符合\
