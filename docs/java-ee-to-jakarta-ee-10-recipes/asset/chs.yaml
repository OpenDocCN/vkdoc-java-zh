  \n[*testing_using_graphene/*](http://arquillian.org/guides/functional_testing_using_graphene/))*：学习如何使用\
  \ Arquillian Graphene 扩展执行功能测试。\n\nxlvii\n\n**第 1 章**\n\n**Jakarta Servlets**\n\n\
  Jakarta Servlets（原 Java Servlets）是用于构建动态 Web 应用程序的技术。1997 年，Sun Microsystems 发布了\
  \ Servlet 的第一个版本。自那时起，它经历了重大的演变，每个新版本都变得更加强大且更易于使用。Jakarta EE 10 包含了 Jakarta Servlets\
  \ 的 6.0 版本。\n\nJakarta Servlets 是所有 Jakarta EE 应用程序的基础。然而，开发者可以利用 Servlet 框架，例如\
  \ Jakarta Server Pages（原 Java Server Pages 或 JSP）和 Jakarta Server Faces（原 Java Server\
  \ Faces 或 JSF）。这两个框架都在后台使用 Servlet 容器将页面编译成 Jakarta Servlets。尽管如此，对 Jakarta Servlet\
  \ 技术的基本理解对于任何从事基于 Java 的 Web 应用程序开发的人来说都是非常有益的。\n\nJakarta Servlets 是响应请求并符合 Jakarta\
  \ Servlet API 的 Java 类。它们可以响应各种类型的请求，但主要是为响应基于 Web 的请求而编写的。Servlet 必须部署到 Servlet\
  \ 容器（无论是完整的应用服务器还是微容器）中才能使用。Servlet API 提供了多个用于在 Web 容器中启用 Servlet 功能的对象。这些对象包括请求和响应对象、pageContext\
  \ 以及许多其他对象。\n\n当这些对象被正确使用时，它们使 Servlet 能够执行基于 Web 的应用程序所需的几乎任何任务。\n\n动态 Web 应用程序是指那些根据用户输入而变化的应用程序。这与静态\
  \ Web 应用程序形成对比，在静态 Web 应用程序中，内容通常被视为不变且由 Web 服务器管理员决定。由于 Servlet 是用 Java 编写的，因此可以在\
  \ Servlet 类中使用任何有效的 Java 代码。这使得 Jakarta Servlets 能够与其他 Java 类、Web 容器、底层文件服务器等进行交互。\n\
  \nJakarta EE 8 带来了 Servlet 4.0 规范；这是一次围绕从 HTTP 1.1 升级到 HTTP/2 的重大修订。更新版本的 HTTP 协议带来了许多增强功能，包括请求/响应多路复用、服务器推送、二进制帧和流优先级。一些功能增强是在底层进行的，这意味着不需要\
  \ API 增强来支持它们。其他功能，例如服务器推送，则为开发者暴露了新的 API。\n\nServlet 5.0 作为 Jakarta EE 9 的一部分发布，使用了\
  \ Eclipse EE 规范流程。它包括从 *javax.** 命名空间到 *jakarta.** 命名空间的迁移。然而，它在功能上与 Servlet 4.0\
  \ 相同。\n\nJakarta EE 10 正在采用微服务优先的策略，将容器作为其主要部署载体。这意味着应用程序预计将被拆分为多个服务组件。Servlets\
  \ 非常适合这种方法，因为它们具有可扩展性，并且能够以最小的开销处理许多并发请求。\n\n本章将带你开始开发和部署 Servlets。你将学习开发 Servlets\
  \ 的基础知识、如何将它们与客户端 Web 会话一起使用，以及如何将 Servlet 链接到另一个应用程序。在此过程中，你将学习使用 Jakarta EE 平台下最新版\
  \ Java Servlet API 的标准，这使 Servlet 开发现代化，并使其比过去几年更加简单和高效。\n\n© Josh Juneau 和 Tarun\
  \ Telang 2022\n\nJ. Juneau 和 T. Telang, *Java EE 到 Jakarta EE 10 实战*[, https://doi.org/10.1007/978-1-4842-8079-9_1](https://doi.org/10.1007/978-1-4842-8079-9_1#DOI)\n\
  \n![](img/index-46_1.png)\n\n第 1 章 ■ Jakarta ServletS\n\n首先，你需要安装 Eclipse GlassFish\
  \ 应用服务[器 (https://glassfish.org/)](https://glassfish.org/)\n\n或 Payara 服务器 ([`www.payara.fish/)，这`](https://www.payara.fish/)两个都是健壮的\
  \ Servlet 容器，用于部署你复杂的 Jakarta EE 应用程序。\n\n在本书中，我将仅使用 Eclipse GlassFish 来分享解决方案。由于\
  \ Payara 服务器主要基于 GlassFish，如果需要，你可以轻松地切换到它。\n\n你将学习开发 Servlets 的基础知识、如何将它们与客户端 Web\
  \ 会话一起使用，以及如何将 Servlet 链接到另一个应用程序。在此过程中，你将学习使用最新版 Jakarta Servlet API 的标准，这使 Servlet\
  \ 开发现代化，并使其更加简单和高效。\n\n1-1. 设置 Jakarta EE 应用服务器\n\n问题\n\n你想要设置一个环境，用于部署和运行 Jakarta\
  \ Servlets 及其他 Jakarta EE\n\n技术。\n\n解决方案\n\n从 GlassFish 网站[ (https://](https://glassfish.org/)\n\
