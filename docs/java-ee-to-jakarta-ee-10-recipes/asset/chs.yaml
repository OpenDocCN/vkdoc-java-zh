  ID\"))\n\nprivate Set<Book> books;\n\npublic BookAuthor() {\n\n}\n\npublic BookAuthor(BigDecimal\
  \ id) {\n\nthis.id = id;\n\n}\n\n...\n\n// getters and setters\n\n...\n\n@Override\n\
  \npublic int hashCode() {\n\nint hash = 0;\n\nhash += (id != null ? id.hashCode()\
  \ : 0);\n\nreturn hash;\n\n}\n\n@Override\n\npublic boolean equals(Object object)\
  \ {\n\nif (!(object instanceof BookAuthor)) {\n\nreturn false;\n\n}\n\nBookAuthor\
  \ other = (BookAuthor) object;\n\nif ((this.id == null && other.id != null) || (this.id\
  \ != null && !this.\n\nid.equals(other.id))) {\n\nreturn false;\n\n}\n\nreturn true;\n\
