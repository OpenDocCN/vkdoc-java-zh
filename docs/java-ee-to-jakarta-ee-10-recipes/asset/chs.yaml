  \n![](img/index-238_1.jpg)\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n***图 4-3.** 在视图中使用输出组件*\n\
  \n工作原理\n\n输出组件可用于显示托管 Bean 中生成的输出，或渲染指向其他资源的链接。在许多情况下，它们对于在 Web 视图中显示动态输出非常有用。本例演示了五种输出组件类型中的三种：outputText、outputLink\
  \ 和 outputLabel。每个组件都共享一组通用属性，这些属性列于表 4-7 中。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\
  \n***表 4-7.** 通用输出组件属性（未在引言中列出）*\n\n**属性**\n\n**描述**\n\nclass\n\n用于样式设置的 CSS 类\n\
  \nconverter\n\n注册到组件的转换器\n\ndir\n\n文本方向（LTR：从左到右；RTL：从右到左）\n\nescape\n\n布尔值，指示是否转义\
  \ XML 和 HTML 敏感字符\n\nlang\n\n生成组件标记时使用的语言代码\n\nparent\n\n父组件\n\ntitle\n\n组件的工具提示文本\n\
  \ntransient\n\n布尔值，指示组件是否应包含在组件树的状态中\n\n■ **注意** 自 JSF 2.0 发布以来，outputText 组件的重要性有所降低，因为\
  \ Facelets 视图定义语言会隐式地将内联内容包裹在类似的输出组件中。因此，在 JSF 2.0 中，仅当需要使用某些标签属性进行渲染、调用 JavaScript\
  \ 等操作时，才有必要使用 outputText 标签。\n\n本例中的 outputText 组件包含值 #{contactController.newsletterDescription}，用于显示\
  \ ContactController 中 newsletterDescription 属性的内容。在 h:outputText 标签中只能指定通用输出组件属性。因此，可以使用\
  \ class 或 style 等属性为组件显示的文本应用样式。如果组件包含 HTML 或 XML，可将 escape 属性设置为 true 以指示应转义这些字符。\n\
  \noutputFormat 组件与 outputText 组件共享相同的属性集。outputFormat 组件可用于渲染参数化文本。因此，如果需要修改文本字符串的不同部分，可以通过使用\
  \ Jakarta Server Faces 参数（通过 f:param 标签）来实现。例如，假设您想列出某人在 Acme 书店购买的书籍名称，可以像下面这样使用\
  \ outputFormat 组件：\n\n<h:outputFormat value=\"购物车包含书籍 {0}、{1}、{2}\">\n\n<f:param\
  \ value=\"Jakarta EE 基础\"/>\n\n<f:param value=\"Java 17 基础入门\"/>\n\n<f:param value=\"\
  Jakarta EE 10 配方\"/>\n\n</h:outputFormat>\n\noutputLink 和 outputLabel 组件各自可以指定一些其他属性，这些属性在前文讨论的输出组件中不可用。这些额外属性分别列于表\
  \ 4-8（outputLink）和表 4-9（outputLabel）中。outputLink 组件可用于创建锚点或链接，当用户点击该链接时，会重定向到另一个页面。在本例中，outputLink\
  \ 组件用于将用户重定向到名为 home.xhtml 的视图。outputLink 组件的值可以设置为静态页面名称（如本例所示），也可以包含对应托管 Bean\
  \ 属性的表达式。还可以通过 outputLink 组件向另一个页面传递参数，方法是在 h:outputLink 的开始和结束标签之间嵌套 f:param 标签，如下所示：\n\
  \n第 4 章 ■ 高级 Jakarta Server Faces\n\n<h:outputLink id=\"homeLink\" value=\"home.xhtml\"\
  >\n\n<h:outputText value=\"用户主页\"/>\n\n<f:param name=\"username\" value=\"#{contactController.current.email}\"\
  />\n\n</h:outputLink>\n\n***表 4-8.** outputLink 额外属性*\n\n**属性**\n\n**描述**\n\naccessKey\n\
  \n将焦点转移到组件的访问键值\n\nbinding\n\n将此组件链接到支持 Bean 中属性的值表达式\n\ncharset\n\n此超链接所指定资源的字符编码\n\
  \ncords\n\n屏幕上热点的位置和形状\n\ndir\n\n文本方向指示（LTR：从左到右；RTL：从右到左）\n\ndisabled\n\n指定一个布尔值，指示组件是否被禁用\n\
  \nfragment\n\n页面片段的标识符，当目标页面渲染时应将焦点移至该片段\n\nhreflang\n\n超链接所指定资源的语言代码\n\nlang\n\n\
