  \n</html>\n\n类似地，除了在页面上将链接显示为文本外，还可以通过嵌入 graphicImage 组件来使用图像（详见配方 4-6）。\n\noutputLabel\
  \ 组件会渲染一个 HTML <label> 标签，其使用方式与 outputText 组件大致相同。在示例中，outputLabel 组件的值都使用了静态文本，但如果更适合应用程序，它们也可以利用\
  \ Jakarta 表达式语言表达式来使用受管 bean 的属性值。\n\n本配方中要介绍的最后一个输出组件是 link 组件。它是在 Jakarta Server\
  \ Faces 2.0 版本中引入的，使得向页面添加链接的任务变得更加简单。outputLink 和 link 组件产生的结果类似，但 link 组件有一些不同的属性，使其行为略有不同。h:link\
