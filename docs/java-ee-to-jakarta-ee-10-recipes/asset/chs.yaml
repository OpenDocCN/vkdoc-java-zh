  >\n\n<f:validateRequired/>\n\n<f:validateRegex pattern=\"\"/>\n\n</h:inputText><br/>\n\
  \n<h:outputLabel for=\"password\" value=\"输入站点访问密码：\"/>\n\n<h:inputSecret id=\"\
