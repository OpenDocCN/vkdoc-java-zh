  \n10 - 4 = ${10 - 4}<br/>\n\n85 / 15 = ${85 / 15}<br/>\n\n847 divided by 6 = ${847\
  \ div 6}<br/>\n\n</body>\n\n</html>\n\n上述 Jakarta 服务器页面将显示以下输出：\n\n...\n\n10 - 4\
