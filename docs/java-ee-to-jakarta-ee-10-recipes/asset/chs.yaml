  \ Server Faces\n\nJakarta Server Faces 提供了几个核心标签，可用于为组件提供更多功能。例如，这些标签可以嵌入到 Jakarta\
  \ Server Faces 组件标签内部，并指定可用于转换组件显示或用作输入值的规则。\n\n核心标签的其他用途包括：为选择组件提供选项列表、验证输入，以及提供操作和事件监听器。表\
  \ 4-2 描述了 Jakarta Server Faces 核心标签。\n\n***表 4-2.** Jakarta Server Faces 核心标签*\n\
  \n**标签**\n\n**功能**\n\nf:actionListener\n\n向组件注册一个操作监听器方法\n\nf:phaseListener\n\n\
  向页面注册一个 PhaseListener\n\nf:setPropertyActionListener\n\n注册一个特殊的表单提交操作监听器\n\nf:valueChangeListener\n\
  \n向组件注册一个值变更监听器\n\nf:converter\n\n向组件注册一个任意转换器\n\nf:convertDateTime\n\n向组件注册一个 DateTimeConverter\
  \ 实例\n\nf:convertNumber\n\n向组件注册一个 NumberConverter\n\nf:facet\n\n向特定的父容器添加一个嵌套组件\n\
  \nf:metadata\n\n向父组件注册一个特定的 facet\n\nf:selectItem\n\n封装列表中的一个项目\n\nf:selectItems\n\
