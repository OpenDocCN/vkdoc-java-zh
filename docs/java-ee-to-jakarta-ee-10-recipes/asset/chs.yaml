  \ Jakarta ServletS\n\n■ **注意** 如果使用集成开发环境或构建工具（如 Maven），则生成目录并将文件放入正确位置的所有手动工作都会自动完成。通常，强烈建议使用\
  \ IDE，因为它可以提高生产力并减少出错的机会。\n\n1-4. 无需 web.xml 注册 Servlet\n\n问题\n\n在 `web.xml` 文件中注册\
  \ Servlet 很繁琐，你希望完全无需修改 `web.xml` 即可部署 Servlet。\n\n解决方案\n\n使用 `@WebServlet` 注解来注册\
  \ Servlet，并省略 `web.xml` 注册。这将减轻每次向应用程序添加 Servlet 时都需要修改 `web.xml` 文件的需要。以下是对配方 1-2\
  \ 中使用的 `SimpleServlet` 类的改编，其中包含了 `@WebServlet` 注解并演示了其用法：\n\npackage org.jakartaeerecipe.chapter01.recipe01_04;\n\
  \nimport jakarta.servlet.annotation.*;\n\nimport jakarta.servlet.http.*;\n\nimport\
  \ java.io.*;\n\n@WebServlet(name = \"SimpleServletNoDescriptor\", urlPatterns =\
  \ {\"/\n\nSimpleServletNoDescriptor\"})\n\npublic class SimpleServletNoDescriptor\
  \ extends HttpServlet {\n\nprivate String message;\n\n@Override\n\npublic void init()\
  \ {\n\nmessage = \"Look ma, no WEB-XML!\";\n\n}\n\nprotected void processRequest(HttpServletRequest\
  \ request,\n\nHttpServletResponse response) throws ServletException, IOException\
  \ {\n\nresponse.setContentType(\"text/html;charset=UTF-8\");\n\ntry(PrintWriter\
  \ out = response.getWriter()) {\n\nout.printf(\"\"\"\n\n<html>\n\n<head>\n\n<title>Servlet\
  \ SimpleServlet</title>\n\n</head>\n\n![](img/index-56_1.png)\n\n第 1 章 ■ Jakarta\
  \ ServletS\n\n<body>\n\n<h2>Servlet SimpleServlet at %s</h2>\n\n<br/>%s\n\n</body>\n\
  \n</html>\n\n\"\"\", request.getContextPath(), message);\n\n}\n\n}\n\n@Override\n\
  \nprotected void doGet(HttpServletRequest request, HttpServletResponse response)\n\
  \nthrows ServletException, IOException {\n\nprocessRequest(request, response);\n\
  \n}\n\n@Override\n\nprotected void doPost(HttpServletRequest request, HttpServletResponse\
  \ response)\n\nthrows ServletException, IOException {\n\nprocessRequest(request,\
  \ response);\n\n}\n\n}\n\n最终，该 Servlet 将可以通过 URL 访问，就像它在 `web.xml` 中注册一样。你应该会看到页面加载，如图\
  \ 1-5 所示。\n\n***图 1-5.** SimpleServletNoDescriptor 输出*\n\n■ **注意** 删除 `web.xml`\
  \ 文件中任何现有的 Servlet 映射，以使用 `@WebServlet` 注解。\n\n工作原理\n\n有几种方法可以向 Web 容器注册 Servlet。第一种方法是使用\
  \ `web.xml` 部署描述符注册它们，如配方 1-1 所示。第二种方法是使用 `@WebServlet` 注解，它提供了一种更简单的技术来将 Servlet\
  \ 映射到 URL。`@WebServlet` 注解放在类声明之前，它接受表 1-2. 中列出的元素。\n\n第 1 章 ■ Jakarta ServletS\n\
  \n***表 1-2.** @WebServlet 注解元素*\n\n**元素**\n\n**描述**\n\ndescription\n\nServlet 的描述\n\
  \ndisplayName\n\nServlet 的显示名称\n\ninitParams\n\n接受一个 `@WebInitParam` 注解列表\n\nlargeIcon\n\
  \nServlet 的大图标\n\nloadOnStartup\n\nServlet 的启动加载顺序\n\nname\n\nServlet 名称\n\nsmallIcon\n\
  \nServlet 的小图标\n\nurlPatterns\n\n调用 Servlet 的 URL 模式\n\nasyncSupported\n\nServlet\
  \ 是否支持异步操作模式\n\n在本配方的解决方案中，`@WebServlet` 注解将名为 `SimpleServletNoDescriptor` 的 Servlet\
  \ 类映射到 URL 模式 `/SimpleServletNoDescriptor`，并且还将该 Servlet 命名为 `SimpleServletNoDescriptor`：\n\
  \n@WebServlet(name=\"SimpleServletNoDescriptor\", urlPatterns={\"/SimpleServletNoDescriptor\"\
  })\n\n1-5. 使用 Servlet 显示动态内容\n\n问题\n\n你希望向网页显示一些可能根据服务器端活动或用户输入而变化的内容。\n\n解决方案\n\
  \n\n\n在你的 Servlet 中定义一个字段，用于包含要显示的动态内容。通过使用 `PrintWriter println()` 方法，将包含该字段的内容追加到页面上，从而发布动态内容。以下示例\
  \ Servlet 声明了一个 `Date` 字段，并在每次页面加载时将其更新为当前日期：\n\n```java\npackage org.jakartaeerecipe.chapter01.recipe01_05;\n\
  \nimport java.io.*;\nimport java.util.Date;\nimport jakarta.servlet.annotation.*;\n\
  import jakarta.servlet.http.*;\n\n@WebServlet(name = \"CurrentDateAndTime\", urlPatterns\
  \ = {\"/CurrentDateAndTime\"})\npublic class CurrentDateAndTime extends HttpServlet\
  \ {\n\n    Date currDateAndTime = new Date();\n\n    protected void processRequest(HttpServletRequest\
  \ request, HttpServletResponse response)\n            throws ServletException, IOException\
  \ {\n        response.setContentType(\"text/html;charset=UTF-8\");\n        synchronized(currDateAndTime){\n\
  \            currDateAndTime = new Date();\n        }\n        try (PrintWriter\
  \ out = response.getWriter()) {\n            out.printf(\"\"\"\n               \
  \ <html>\n                <head>\n                <title>Servlet Current Date And\
  \ Time</title>\n                </head>\n                <body>\n              \
  \  <h1>Servlet CurrentDateAndTime at %s</h1><br/>\n                The current date\
  \ and time is: %s\n                </body>\n                </html>\"\"\", request.getContextPath(),\
  \ currDateAndTime);\n        }\n    }\n\n    @Override\n    protected void doGet(HttpServletRequest\
  \ request, HttpServletResponse response)\n            throws ServletException, IOException\
  \ {\n        processRequest(request, response);\n    }\n\n    @Override\n    protected\
  \ void doPost(HttpServletRequest request, HttpServletResponse response)\n      \
  \      throws ServletException, IOException {\n        processRequest(request, response);\n\
  \    }\n}\n```\n\n■ **注意** Servlet 是多线程的，许多客户端请求可能同时使用同一个 Servlet。当字段被声明为 Servlet\
  \ 类成员（而非方法内部）时，就像你对 `currDateAndTime` 所做的那样，你必须确保在任何时刻只有一个客户端请求能够操作该字段。你可以通过对字段的使用进行同步来实现这一点，如\
  \ `processRequest()` 方法所示。为了最小化延迟，你应该同步尽可能小的代码块。该 Servlet 的输出结果将是当前的日期和时间。\n\n```java\n\
  synchronized( currDateAndTime ) {\n    currDateAndTime = new Date();\n}\n```\n\n\
  ![](img/index-59_1.png)\n\n工作原理\n\nJava Servlet 如此有用的原因之一，是它们允许在网页上显示动态内容。这些内容可以来自服务器本身、数据库、另一个网站或任何其他可通过网络访问的资源。如果你过一段时间后刷新网页，你会看到当前时间动态更新为你当前的时间。Servlet\
  \ 不是静态网页；它们是动态的，这可以说是它们最大的优势。\n\n在本方案的解决方案中，使用了一个 Servlet 来显示服务器上的当前时间和日期。\n\n当\
  \ Servlet 被处理时，会调用 `doGet()` 方法，该方法随后调用 `processRequest()` 方法，并传入请求和响应对象。因此，`processRequest()`\
  \ 方法是主要工作发生的地方。`processRequest()` 方法通过调用 `response.getWriter()` 方法创建一个 `PrintWriter`，并使用该\
  \ `PrintWriter` 在生成的网页上显示内容。接着，通过创建一个新的 `Date` 并将其赋值给 `currDateAndTime` 字段，从服务器获取当前的日期和时间。\n\
  \n最后，`processRequest()` 方法通过 `out.println()` 方法发送网页内容，同时 `currDateAndTime` 字段的内容也被拼接成一个字符串，一并发送给\
  \ `out.println()`。\n\n每次处理 Servlet 时，它都会显示调用 Servlet 时的当前日期和时间，因为每次请求都会创建一个新的 `Date`。\n\
  \n这个例子只是浅尝辄止地展示了 Jakarta Servlet 的能力。虽然显示当前日期和时间很简单，但你可以修改该逻辑，以显示 Servlet 中包含的任何字段的内容。无论是显示\
  \ Servlet 容器执行计算结果的 `int` 字段，还是包含某些信息的 `String` 字段，可能性都是无限的。图 1-6 显示了此页面的输出。\n\n\
  ***图 1-6.** CurrentDateAndTime Servlet 输出*\n\n1-6. 处理请求和响应\n\n问题\n\n你想要创建一个接受用户输入并根据接收到的输入提供响应的\
  \ Web 表单。\n\n解决方案\n\n创建一个基于标准 HTML 的 Web 表单，当点击提交按钮时，调用一个 Servlet 来处理最终用户的输入并发布响应。为了研究这种技术，你将看到两段不同的代码。以下代码是用于生成输入表单的\
  \ HTML。这段代码存在于文件 `recipe01_06.html` 中。请浏览至 `/chapter01/recipe01_06.html` 来运行示例。请特别注意\
  \ `<form>` 和 `<input>` 标签。你会看到表单的 `action` 参数列出了 Servlet 名称 `MathServlet`：\n\n```html\n\
  <html>\n<head>\n<title>Simple Math Servlet</title>\n</head>\n<body>\n<h1>This is\
  \ a simple Math Servlet</h1>\n<form method=\"POST\" action=\"../MathServlet\">\n\
  <label for=\"numa\">Enter Number A: </label>\n<input type=\"text\" id=\"numa\" name=\"\
  numa\"/><br><br>\n<label for=\"numb\">Enter Number B: </label>\n<input type=\"text\"\
  \ id=\"numb\" name=\"numb\"/><br/><br/>\n<input type=\"submit\" value=\"Submit Form\"\
  />\n<input type=\"reset\" value=\"Reset Form\"/>\n</form>\n</body>\n</html>\n```\n\
  \n接下来，查看名为 `MathServlet` 的 Servlet 的以下代码。这是接收前面列出的 HTML 代码输入、相应处理并发布响应的 Java 代码：\n\
  \n```java\npackage org.jakartaeerecipe.chapter01.recipe01_06;\n\nimport jakarta.servlet.annotation.*;\n\
  import jakarta.servlet.http.*;\nimport jakarta.servlet.ServletException;\nimport\
  \ java.io.*;\n\n@WebServlet(name=\"MathServlet\", urlPatterns={\"/MathServlet\"\
  })\npublic class MathServlet extends HttpServlet {\n\n    @Override\n    public\
  \ void doPost(HttpServletRequest req, HttpServletResponse res)\n            throws\
  \ IOException, ServletException {\n        res.setContentType(\"text/html\");\n\
  \        // 将输入参数值存储到字符串中\n        String numA = req.getParameter(\"numa\");\n \
  \       String numB = req.getParameter(\"numb\");\n        int solution = 0;\n\n\
  \        try (PrintWriter out = res.getWriter()) {\n            try {\n        \
  \        solution= Integer.valueOf(numA) + Integer.valueOf(numB);\n            }\
  \ catch (java.lang.NumberFormatException ex) {\n                // 如果抛出异常，则显示错误信息\n\
  \                out.println(\"Please use numbers only...try again.\");\n      \
  \          return;\n            }\n\n            out.printf(\"\"\"\n           \
  \     <html>\n                <head>\n                <title>Test Math Servlet</title>\n\
  \                </head>\n                <body>\n                Solution: %d +\
  \ %d = %d\n                <br/>\n                <a href='recipe01_05.html'>Add\
  \ Two More Numbers</a>\n                </body>\n                </html>\"\"\",\
  \ numA, numB, solution);\n        }\n    }\n}\n```\n\n■ **注意** 要运行此示例，请将前面的 HTML\
  \ 代码复制到你的 `JakartaEERecipes_Chapter01` 应用程序的 Web 根目录下的一个名为 `recipe01_06.html` 的\
  \ HTML 文件中，然后在浏览器中输入以下地址：`http://localhost:8080/JakartaEERecipes_Chapter01-1.0-SNAPSHOT/chapter01/recipe01_06.html`。这假设你为应用服务器安装使用了默认端口号。\n\
  \n工作原理\n\n\n\nServlet 能够轻松创建遵循请求与响应生命周期的 Web 应用程序。它们可以在同一段代码中提供 HTTP 响应并处理业务逻辑。处理业务逻辑的能力使得\
  \ Servlet 比标准 HTML 代码强大得多。本方案演示了用于处理请求和发送响应的标准 Servlet 结构。一个 HTML Web 表单包含发送给 Servlet\
  \ 的参数。Servlet 随后以某种方式处理这些参数，并发布客户端可见的响应。对于 `HttpServlet` 对象而言，客户端是 Web 浏览器，响应则是一个网页。\n\
  \n***图 1-7.** 调用 MathServlet 的 HTML 表单*\n\n可以通过嵌入在 HTML `<form>` 中的 HTML `<input>`\
  \ 标签来获取 HTML 表单中的值。在本方案的解决方案中，接受两个值作为输入，并通过它们的 `id` 属性 `numa` 和 `numb` 来引用它们。表单中还有另外两个\
  \ `<input>` 标签；一个用于将值提交给表单的 `action`，另一个用于将表单字段重置为空白。表单的 `action` 是\n\n![](img/index-62_1.png)\n\
  \n第 1 章 ■ Jakarta ServletS\n\n表单值将作为参数传递到的 Servlet 的名称。在本例中，`action` 设置为 `MathServlet`。`<form>`\
  \ 标签还接受一种表单处理方法，即 `GET` 或 `POST`。在示例中，使用了 `POST` 方法，因为表单数据正在被发送到 `action`；在这种情况下，数据被发送到\
  \ `MathServlet`。当然，您可以创建任意复杂的 HTML 表单，然后以相同的方式将数据发送到任何 Servlet。这个例子相对基础；它旨在让您了解处理是如何执行的。\n\
  \n`<form>` 的 `action` 属性表明应使用 `MathServlet` 来处理表单中包含的值。`MathServlet` 名称可以通过 `web.xml`\
  \ 部署描述符或 `@WebServlet` 注解映射回 `MathServlet` 类。查看 `MathServlet` 代码，可以看到实现了一个 `doPost()`\
  \ 方法来处理 `POST` 表单值的处理。`doPost()` 方法接受 `HttpServletRequest` 和 `HttpServletResponse`\
  \ 对象作为参数。HTML 表单中包含的值嵌入在 `HttpServletRequest` 对象中。要获取这些值，需要调用请求对象的 `getParameter()`\
  \ 方法，并传入您想要获取的输入参数的 `id`。在本方案的解决方案中，这些值被获取并存储在局部 `String` 字段中：\n`String numA = req.getParameter(\"\
  numa\");`\n`String numB = req.getParameter(\"numb\");`\n\n***图 1-8.** MathServlet\
  \ 输出*\n\n一旦获取了这些值，就可以根据需要对其进行处理。在本例中，这些 `String` 值被转换为 `int` 值，然后相加得到一个总和，并存储在一个\
  \ `int` 字段中。该字段随后作为响应呈现在结果网页上：\n\n`int solution = Integer.valueOf(numA) + Integer.valueOf(numB);`\n\
  \n如前所述，HTML 表单可以复杂得多，包含任意数量的 `<input>` 字段。同样，Servlet 也可以对这些字段值执行更复杂的处理。\n\n这个例子仅仅是冰山一角，可能性是无限的。基于\
  \ Servlet 的 Web 框架，如 Jakarta Server Pages 和 Jakarta Server Faces，隐藏了将表单值传递给 Servlet\
  \ 和处理响应的许多复杂性。然而，幕后使用的仍然是相同的基本框架。\n\n1-7. 监听 Servlet 容器事件\n\n问题\n\n您希望能够监听应用程序启动和关闭事件。\n\
  \n解决方案\n\n创建一个 Servlet 上下文事件监听器，以便在应用程序启动或关闭时发出警报。以下解决方案演示了上下文监听器的代码，该监听器将记录应用程序启动和关闭事件，并发送电子邮件警报此类事件：\n\
  \n第 1 章 ■ Jakarta ServletS\n\n\n\npackage org.jakartaeerecipe.chapter01.recipe01_07;\n\
  \nimport java.util.Properties;\n\nimport jakarta.mail.*;\n\nimport jakarta.mail.internet.*;\n\
  \nimport jakarta.servlet.*;\n\nimport jakarta.servlet.annotation.WebListener;\n\n\
  @WebListener\n\npublic class StartupShutdownListener implements ServletContextListener\
  \ {\n\nprivate final String TAG = \"StartupShutdownListener: \";\n\n@Override\n\n\
  public void contextInitialized(ServletContextEvent event) {\n\nSystem.out.println(TAG\
  \ + \"Servlet 启动...\");\n\nSystem.out.println(TAG + event.getServletContext().getServerInfo());\n\
  \nSystem.out.println(TAG + System.currentTimeMillis());\n\nsendEmail(\"Servlet 上下文已初始化\"\
  );\n\n}\n\n@Override\n\npublic void contextDestroyed(ServletContextEvent event)\
  \ {\n\nSystem.out.println(TAG + \"Servlet 关闭...\");\n\nSystem.out.println(TAG +\
  \ event.getServletContext().getServerInfo());\n\nSystem.out.println(TAG + System.currentTimeMillis());\n\
  \n// 如果邮件发送失败，请查看 server.log 中的错误信息\n\nsendEmail(\"Servlet 上下文已被销毁...\");\n\n}\n\
  \n/**\n\n* 此实现使用 GMail 的 SMTP 服务器\n\n* @param message 要在邮件中发送的文本\n\n*/\n\nprivate\
  \ void sendEmail(String message) {\n\nString smtpHost = \"smtp.someserver.com\"\
  ; // 例如 smtp.smtp2go.com\n\nString smtpUsername = \"username\"; // SMTP 服务器的用户名\n\
  \nString smtpPassword = \"password\"; // SMTP 服务器的密码\n\nString from = \"fromaddress@domain.com\"\
  ; // 发件人邮箱地址\n\nString to = \"toaddress@domain.com\"; // 收件人邮箱地址\n\nint smtpPort\
  \ = 2525; // SMTP 服务器端口\n\nSystem.out.println(TAG + \"正在发送邮件...\");\n\ntry {\n\n\
  // 在此处发送邮件\n\n// 设置 SMTP 主机地址\n\nProperties props = new Properties();\n\nprops.put(\"\
  mail.smtp.host\", smtpHost);\n\n![](img/index-64_1.jpg)\n\n第 1 章 ■ Jakarta Servlet\n\
  \nprops.put(\"mail.smtp.auth\", \"true\");\n\nprops.put(\"mail.smtp.starttls.enable\"\
  , \"false\");\n\n// 创建一些属性并获取默认的 Session\n\nSession session = Session.getInstance(props);\n\
  \n// 创建一条消息\n\nMessage msg = new MimeMessage(session);\n\n// 设置发件人和收件人地址\n\nInternetAddress\
  \ addressFrom = new InternetAddress(from);\n\nmsg.setFrom(addressFrom);\n\nInternetAddress[]\
  \ address = new InternetAddress[1];\n\naddress[0] = new InternetAddress(to);\n\n\
  msg.setRecipients(Message.RecipientType.TO, address);\n\nmsg.setSubject( TAG + \"\
  Servlet 容器正在关闭\");\n\n// 添加页脚\n\nmsg.setContent(msg, \"text/plain\");\n\nTransport\
  \ transport = session.getTransport(\"smtp\");\n\ntransport.connect(smtpHost, smtpPort,\
  \ smtpUsername, smtpPassword);\n\nTransport.send(msg, smtpUsername, smtpPassword);\n\
  \n} catch (jakarta.mail.MessagingException ex) {\n\nSystem.out.println(TAG + e.getMessage());\n\
  \n}\n\nSystem.out.println(TAG + \"邮件已成功发送\");\n\n}\n\n}\n\n■ **注意** 要运行此示例，请确保已按照本章前面的配方\
  \ 1-2 所述添加了 `jakarta.mail.jar`。\n\n一旦 Servlet 成功初始化，它应该在 GlassFish 服务器日志文件中生成相应的日志消息，该文件位于以下位置：\n\
  \nJAVA_DEV/glassfish7/glassfish/domain/domain1/logs/server.log\n\n您也可以通过 IntelliJ\
  \ IDEA 的 *Services* ➤ *GlassFish Log* 查看此日志；参见图 1-9。\n\n***图 1-9.** 使用 IntelliJ\
  \ IDEA 的 Services 选项卡查看 GlassFish 日志*\n\n第 1 章 ■ Jakarta Servlet\n\n工作原理\n\n有时，了解应用服务器容器中何时发生某些事件是很有用的。这个概念在许多不同的场景下都很有用，但最常用于在启动时初始化应用程序，或在关闭后清理应用程序。可以将\
  \ Servlet 监听器注册到应用程序，以指示其何时启动或关闭。因此，通过监听此类事件，Servlet 可以在事件发生时执行某些操作。\n\n要创建一个基于容器事件执行操作的监听器，您必须开发一个实现\
  \ `ServletContextListener` 接口的类。需要实现的方法是 `contextInitialized()` 和 `contextDestroyed()`。这两个方法都接受一个\
  \ `ServletContextEvent` 作为参数。\n\n\n\n参数，它们会在 Servlet 容器初始化或关闭时分别被自动调用。要将监听器注册到容器中，可以使用以下技术之一：\n\
  \n• 使用 `@WebListener` 注解，如本配方的解决方案所示。\n\n• 在 `web.xml` 应用部署描述符中注册监听器。\n\n• 使用 `ServletContext`\
  \ 中定义的 `addListener()` 方法。\n\n例如，要在 `web.xml` 中注册此监听器，需要添加以下 XML 代码行：\n\n<listener>\n\
  \n<listener-class> org.jakartaeerecipe.chapter01.recipe01_06.StartupShutdownListener</\n\
  \nlistener-class>\n\n</listener>\n\n两种方式没有优劣之分。只有在某些情况下需要禁用监听器时，在应用部署描述符（`web.xml`）中注册监听器才会更有帮助。另一方面，如果使用\
  \ `@WebListener` 注册监听器，要禁用它，必须移除注解并重新编译代码。而修改 Web 部署描述符则不需要重新编译任何代码。\n\n监听器有多种类型，类实现的接口决定了监听器的类型。例如，在本配方的解决方案中，该类实现了\
  \ `ServletContextListener` 接口。这样就创建了一个用于监听 Servlet 上下文事件的监听器。然而，如果该类实现了 `HttpSessionListener`，它将成为\
  \ HTTP 会话事件的监听器。以下是监听器接口的完整列表：\n\n`jakarta.servlet.ServletRequestListener`\n\n`jakarta.servlet.ServletRequestAttributeListener`\n\
  \n`jakarta.servlet.ServletContextListener`\n\n`jakarta.servlet.ServletContextAttributeListener`\n\
  \n`jakarta.servlet.http.HttpSessionListener`\n\n`jakarta.servlet.http.HttpSessionAttributeListener`\n\
  \n`jakarta.servlet.http.HttpSessionIdListener`\n\n也可以创建一个实现多个监听器接口的监听器。要了解更多关于监听不同情况（如属性更改）的信息，请参阅配方\
  \ 1-10。\n\n第 1 章 ■ Jakarta ServletS\n\n1-8. 设置初始化参数\n\n问题\n\n您正在编写的 Servlet 需要能够在初始化时接受一个或多个参数。\n\
  \n解决方案 #1\n\n使用 `@WebInitParam` 注解设置 Servlet 初始化参数。以下代码设置了一个等于字符串值的初始化参数：\n\n```java\n\
  package org.jakartaeerecipe.chapter01.recipe01_08;\n\nimport java.io.*;\n\nimport\
  \ jakarta.servlet.*;\n\nimport jakarta.servlet.annotation.*;\n\nimport jakarta.servlet.http.*;\n\
  \n@WebServlet(name=\"SimpleServletCtx1\", urlPatterns={\"/SimpleServletCtx1\"},\
  \ initParams={ @WebInitParam(name=\"name\", value=\"Duke\") })\n\npublic class SimpleServletCtx1\
  \ extends HttpServlet {\n\n    @Override\n\n    public void doGet(HttpServletRequest\
  \ req, HttpServletResponse res)\n\n            throws IOException, ServletException\
  \ {\n\n        response.setContentType(\"text/html\");\n\n        try (PrintWriter\
  \ out = response.getWriter()) {\n\n            out.printf(\"\"\"\n\n           \
  \         <html>\n\n                    <head>\n\n                    <title> Simple\
  \ Servlet Context Example</title>\n\n                    </head>\n\n           \
  \         <body>\n\n                    <p>This is a simple servlet to demonstrate\
  \ context!\n\n                    Hello %s </p>\n\n                    </body>\n\
  \n                    </html>\n\n                    \"\"\", getServletConfig().getInitParameter(\"\
  name\"));\n\n        }\n\n    }\n\n}\n```\n\n要使用本书的源码执行此示例，请在 Web 浏览器中加载以下 URL：`http://localhost:8080/JakartaEERecipes_Chapter01-1.0-SNAPSHOT/SimpleServletCtx1`。生成的网页将显示如图\
  \ 1-10 所示的文本。\n\n![](img/index-67_1.png)\n\n第 1 章 ■ Jakarta ServletS\n\n***图 1-10.**\
  \ SimpleServletCtx1 Servlet 输出*\n\n解决方案 #2\n\n将初始化参数放在 `web.xml` 部署描述符文件中。以下代码行摘自\
  \ `SimpleServlet` 应用的 `web.xml` 部署描述符。它们包含了初始化参数的名称和值：\n\n```xml\n<web-app>\n\n\
  \    <servlet>\n\n        <servlet-name>SimpleServletCtx1</servlet-name>\n\n   \
  \     <servlet-class> org.jakartaeerecipe.chapter01.recipe01_08.SimpleServletCtx1\n\
  \n        </servlet-class>\n\n        <init-param>\n\n            <param-name>name</param-name>\n\
  \n            <param-value>Duke</param-value>\n\n        </init-param>\n\n...\n\
  ```\n\n\n</servlet>\n\n...\n\n</web-app>\n\n工作原理\n\n通常情况下，需要为 Servlet 设置初始化参数以初始化某些值。Servlet\
  \ 可以接受任意数量的初始化参数，并且有几种设置方式。第一种解决方案是使用 `@WebInitParam` 注解来标注 Servlet 类，如解决方案 #1 所示；第二种设置初始化参数的方式是在\
  \ `web.xml` 部署描述符中声明该参数，如解决方案 #2 所示。两种方式均可生效；然而，使用 `@WebInitParam` 的解决方案基于较新的 Jakarta\
  \ Servlet 5.0 API。因此，解决方案 #1 是更现代的方法，但解决方案 #2 对于沿用旧模型或使用旧版 Servlet 发布版本仍然有效。\n\n\
  要使用 `@WebInitParam` 注解，必须将其嵌入到 `@WebServlet` 注解中。\n\n因此，Servlet 必须通过 `@WebServlet`\
  \ 注解（而非在 `web.xml` 文件中）向 Web 应用注册。有关通过 `@WebServlet` 注解注册 Servlet 的更多信息，请参阅配方 1-4。\n\
  \n`@WebInitParam` 注解接受一个名称-值对作为初始化参数。在本配方的解决方案中，参数名称为 `name`，值为 `Duke`：\n\n`@WebInitParam(name=\"\
  name\", value=\"Duke\")`\n\n第 1 章 ■ Jakarta Servlet\n\n设置完成后，可以通过调用 `getServletConfig().getInitializationParameter()`\
  \ 并传入参数名称，在代码中使用该参数。\n\n注解具有简化开发的优点，并且使 Servlet 更易于作为单一包进行维护，而无需在 Servlet 和部署描述符之间来回切换。然而，这些优点是以编译为代价的，因为要使用\
  \ `@WebInitParam` 注解更改初始化参数的值，必须重新编译代码。\n\n使用 `web.xml` 部署描述符时则不存在这种情况。在确定设置初始化参数的标准之前，最好先评估你的应用场景。\n\
  \n1-9. 过滤 Web 请求\n\n问题\n\n你希望在访问应用时，如果使用了指定的 URL，则调用某些处理逻辑。例如，如果使用特定 URL 访问你的应用，你希望记录用户的\
  \ IP 地址。\n\n解决方案\n\n创建一个 Servlet 过滤器，当使用指定的 URL 格式访问应用时，该过滤器将被处理。\n\n在本例中，当使用符合\
  \ `/*` 格式的 URL 时，过滤器将被执行。此格式适用于应用中的任何 URL。因此，任何页面都会导致该 Servlet 被调用。\n\n```java\n\
  package org.jakartaeerecipe.chapter01.recipe01_09;\n\nimport java.io.IOException;\n\
  \nimport jakarta.servlet.*;\n\nimport jakarta.servlet.annotation.WebFilter;\n\n\
  @WebFilter(\"/*\")\n\npublic class LoggingFilter implements Filter {\n\n    private\
  \ FilterConfig filterConfig = null;\n\n    @Override\n    public void init(FilterConfig\
  \ filterConf) {\n        this.filterConf = filterConf;\n    }\n\n    @Override\n\
  \    public void doFilter(ServletRequest request,\n                         ServletResponse\
  \ response,\n                         FilterChain chain)\n            throws IOException,\
  \ ServletException {\n        String userIP = request.getRemoteHost();\n       \
  \ System.out.println(\"Visitor User IP: \" + userAddy);\n        chain.doFilter(request,\
  \ response);\n    }\n\n    @Override\n    public void destroy() {\n        throw\
  \ new UnsupportedOperationException(\"Not supported yet.\");\n    }\n}\n```\n\n\
  ![](img/index-69_1.png)\n\n第 1 章 ■ Jakarta Servlet\n\n工作原理\n\nWeb 过滤器对于预处理请求以及在访问给定\
  \ URL 时调用特定功能非常有用。过滤器并非直接调用位于给定 URL 的 Servlet，而是任何包含相同 URL 模式的过滤器都将在 Servlet 之前被调用。这在许多情况下都很有帮助，其中最有用的可能是执行日志记录、身份验证或其他在后台运行且无需用户交互的服务。\n\
  \n\n\n过滤器必须实现 `jakarta.servlet.Filter` 接口。该接口包含的方法包括 `init`、`destroy` 和 `doFilter`。`init`\
  \ 和 `destroy` 方法由容器调用。`doFilter` 方法用于实现过滤器类的任务。从本方案的解决方案可以看出，过滤器类可以访问 `ServletRequest`\
  \ 和 `ServletResponse` 对象。这意味着可以捕获请求，并从中获取信息。这也意味着，如果需要，可以对请求进行修改。\n\n例如，在使用身份验证过滤器后，将用户名包含在请求中。\n\
  \n如果你想要链式调用过滤器，或者对于给定的 URL 模式存在多个过滤器，它们将按照在 `web.xml` 部署描述符中配置的顺序被调用。如果每个 URL 模式使用多个过滤器，最好手动配置过滤器，而不是使用\
  \ `@WebFilter` 注解。要手动配置 `web.xml` 文件以包含过滤器，请使用 `<filter>` 和 `<filter-mapping>` XML\
  \ 元素及其相关的子元素标签。以下摘录展示了如何在 `web.xml` 配置文件中手动配置过滤器：\n\n<filter>\n\n<filter-name>LoggingFilter</filter-name>\n\
  \n<filter-class>LoggingFilter</filter-class>\n\n</filter>\n\n<filter-mapping>\n\n\
  <filter-name>LoggingFilter</filter-name>\n\n<url-pattern>/*</url-pattern>\n\n</filter-mapping>\n\
  \n当然，`@WebFilter` 注解会为您处理配置，因此在这种情况下不需要手动配置。\n\n■ **注意** 如果过滤器调用了链中的下一个实体，则每个过滤器服务方法必须在与应用到该\
  \ Servlet 的所有过滤器相同的线程中运行。\n\n除了 IDE 中的“服务”选项卡外，还可以通过浏览器访问以下 URL 来查看 GlassFish 服务器日志：\n\
  \nhttp://localhost:4848/management/domain/view-log\n\n图 1-11 的截图演示了如何通过查看服务器日志来验证过滤器的功能。\n\
  \n***图 1-11.** GlassFish 服务器日志*\n\n第 1 章 ■ Jakarta Servlet\n\n1-10. 监听属性更改\n\n问题\n\
  \n您希望能够在 Servlet 属性被添加、移除或更新时，在 Servlet 内执行某个操作。\n\n解决方案\n\n创建一个属性监听器 Servlet，用于监听诸如属性被添加、移除或修改等事件，并在这些事件发生时调用某个操作。以下类通过实现\
  \ `HttpSessionAttributeListener` 并监听 HTTP 会话中添加、移除或替换的属性来演示此技术：\n\npackage org.jakartaeerecipe.chapter01.recipe01_10;\n\
  \nimport jakarta.servlet.*;\n\nimport jakarta.servlet.annotation.WebListener;\n\n\
  import jakarta.servlet.http.*;\n\n@WebListener\n\npublic final class AttributeListener\
  \ implements ServletContextListener,\n\nHttpSessionAttributeListener {\n\nprivate\
  \ ServletContext context = null;\n\n@Override\n\npublic void attributeAdded(HttpSessionBindingEvent\
  \ se) {\n\nHttpSession session = se.getSession();\n\nString id = session.getId();\n\
  \nString name = se.getName();\n\nString value = (String) se.getValue();\n\nString\
  \ message = new StringBuffer(\"新属性已添加到会话：\\n\")\n\n.append(\"属性名称：\").append(name).append(\"\
  \\n\")\n\n.append(\"属性值：\").append(value).toString();\n\nlog(message);\n\n}\n\n\
  @Override\n\npublic void attributeRemoved(HttpSessionBindingEvent se) {\n\nHttpSession\
  \ session = se.getSession();\n\nString id = session.getId();\n\nString name = se.getName();\n\
  \nif (name == null) {\n\nname = \"未知\";\n\n}\n\nString value = (String) se.getValue();\n\
  \nString message = new StringBuffer(\"属性已从会话中移除：\\n\").\n\nappend(id).append(\"\\\
  n\")\n\n.append(\"属性名称：\").append(name).append(\"\\n\").append(\"属性值：\")\n\n第 1\
  \ 章 ■ Jakarta Servlet\n\n.append(value).toString();\n\nlog(message);\n\n}\n\n@Override\n\
  \npublic void attributeReplaced(HttpSessionBindingEvent se) {\n\nString name = se.getName();\n\
  \nif (name == null) {\n\nname = \"未知\";\n\n}\n\nString value = (String) se.getValue();\n\
  \n\n\n```java\nString message = new StringBuffer(\"Attribute has been replaced:\
  \ \\n \").append(name).\ntoString();\n\nlog(message);\n\n}\n\nprivate void log(String\
  \ message) {\n\nif (context != null) {\n\ncontext.log(\"SessionListener: \" + message);\n\
  \n} else {\n\nSystem.out.println(\"SessionListener: \" + message);\n\n}\n\n}\n\n\
  @Override\n\npublic void contextInitialized(ServletContextEvent event) {\n\nthis.context\
  \ = event.getServletContext();\n\nlog(\"contextInitialized()\");\n\n}\n\n@Override\n\
  \npublic void contextDestroyed(ServletContextEvent event) {\n\n}\n\n}\n```\n\n在此示例中，消息将显示在服务器日志文件中，指示属性何时被添加、移除或替换。\n\
  \n## 工作原理\n\n在某些情况下，了解属性何时被设置或属性值被设置为什么是很有用的。本配方的解决方案演示了如何创建属性监听器来获取这些信息。要创建 Servlet\
  \ 监听器，必须实现一个或多个 Servlet 监听器接口。要监听 HTTP 会话属性更改，请实现 `HttpSessionAttributeListener`。这样一来，监听器将实现\
  \ `attributeAdded`、`attributeRemoved` 和 `attributeReplaced` 方法。这些方法中的每一个都接受 `HttpSessionBindingEvent`\
  \ 作为参数，它们的实现分别定义了当 HTTP 会话属性被添加、移除或更改时将发生什么。\n\n在本配方的解决方案中，您可以看到上一段中列出的三个方法都包含类似的实现。在每个方法内部，都会对\
  \ `HttpSessionBindingEvent` 进行查询并将其分解为字符串值，这些字符串值表示导致监听器响应的属性的 ID、名称和值。例如，在 `attributeAdded`\
  \ 方法中，从 `HttpSessionBindingEvent` 获取会话，然后通过使用 `getSession` 检索会话 ID。属性信息可以直接从 `HttpSessionBindingEvent`\
  \ 使用 `getId` 和 `getName` 方法获取，如下代码行所示：\n\n```java\nHttpSession session = se.getSession();\n\
  String id = session.getId();\nString name = se.getName();\nString value = (String)\
  \ se.getValue();\n```\n\n获取这些值后，应用程序可以对它们执行任何需要的操作。在本配方中，属性 ID、名称和会话 ID 被简单地记录并打印出来：\n\
  \n```java\nString message = new StringBuffer(\"New attribute has been added to session:\
  \ \\n\")\n.append(\"Attribute Name: \").append(name).append(\"\\n\")\n.append(\"\
  Attribute Value:\").append(value).toString();\nlog(message);\n```\n\n`attributeReplaced`\
  \ 和 `attributeRemoved` 方法的主体包含类似的功能。最终，在每个方法内部都使用相同的例程来获取属性名称和值，然后对这些值执行某些操作。\n\n\
  有几种不同的选项可用于向容器注册监听器。`@WebListener` 注解是最简单的方法，使用它的唯一缺点是，如果需要移除监听器注解，则需要重新编译代码。监听器可以在\
  \ Web 部署描述符中注册，也可以使用 `ServletContext` 中包含的 `addListener` 方法之一进行注册。\n\n尽管本配方中的示例没有执行任何改变生命周期的事件，但它确实演示了如何创建和使用属性监听器。在现实世界中，如果应用程序需要捕获每个登录用户的用户名，或者在设置指定属性时需要发送电子邮件，那么这样的监听器就会变得非常有用。\n\
  \n请注意，可以使用诸如 `ServletRequestAttributeListener` 或 `ServletContextAttributeListener`\
  \ 之类的接口开发更复杂的解决方案，这些接口分别可用于接收有关 `ServletRequest` 或 `ServletContext` 属性更改的事件。\n\n\
  ## 1-11. 将会话监听器应用于会话\n\n### 问题\n\n您希望监听会话的创建和销毁，以便能够计算应用程序当前包含的活动会话数量，并为每个会话执行一些初始化操作。\n\
  \n### 解决方案\n\n创建一个会话监听器，并相应地实现 `sessionCreated` 和 `sessionDestroyed` 方法。在以下示例中，使用一个\
  \ Servlet 来跟踪活动会话。每当有人使用应用程序时，计数器就会加一。同样，每当有人离开应用程序时，计数器就会减一：\n\n```java\npackage\
  \ org.jakartaeerecipe.chapter01.recipe01_11;\n\nimport jakarta.servlet.annotation.WebListener;\n\
  import jakarta.servlet.http.*;\n\n@WebListener\npublic class SessionListener implements\
  \ HttpSessionListener {\n\n    private int numberOfSessions;\n\n    public SessionListener()\
  \ {\n        numberOfSessions = 0;\n    }\n\n    public int getNumberOfSessions()\
  \ {\n        return numberOfSessions;\n    }\n\n    @Override\n    public void sessionCreated(HttpSessionEvent\
  \ event) {\n        HttpSession session = event.getSession();\n        session.setMaxInactiveInterval(60);\n\
  \        session.setAttribute(\"testAttr\", \"testVal\");\n        synchronized\
  \ (this) {\n            numberOfSessions++;\n        }\n        System.out.println(\"\
  Session created, current count: \" + numberOfSessions);\n    }\n\n    @Override\n\
  \    public void sessionDestroyed(HttpSessionEvent event) {\n        HttpSession\
  \ session = event.getSession();\n        synchronized (this) {\n            numberOfSessions--;\n\
  \        }\n        System.out.println(\"Session destroyed, current count: \" +\
  \ numberOfSessions);\n        System.out.println(\"The attribute value: \" + session.getAttribute((\"\
  testAttr\")));\n    }\n}\n```\n\n每当有新访客访问应用程序时，就会启动一个新会话，并设置 `testAttr`。当会话超时时，它将被销毁，并且为该会话设置的所有属性都将被移除。\n\
  \n在此示例中，消息将显示在服务器日志文件中，如图 1-12 所示，指示会话何时被创建或销毁。\n\n***图 1-12.** GlassFish 服务器日志查看器输出*\n\
  \n## 工作原理\n\n跟踪 Web 应用程序用户的一种有意义的方法是在其 `HttpSession` 对象中放置值。使用 Jakarta Servlet，可以设置会话属性，这些属性将在\
  \ `HttpSession` 的生命周期内存在。一旦会话失效，这些属性将被移除。要设置会话监听器，请创建一个 Jakarta Servlet，使用 `@WebListener`\
  \ 注解对其进行注解，并实现 `jakarta.servlet.http.HttpSessionListener`。这样做将强制实现 `sessionCreated`\
  \ 和 `sessionDestroyed` 方法，会话的魔力就发生在这里。\n\n在本配方的示例中，`sessionCreated` 方法首先通过调用 `HttpSessionEvent`\
  \ 对象的 `getSession` 方法获取当前 `HttpSession` 对象的句柄。该句柄被分配给一个名为 `session` 的 `HttpSession`\
  \ 变量。现在，您已经用会话对象初始化了该变量，就可以使用它来设置生命周期，并放置那些将随会话生命周期共存亡的属性。示例中执行的第一个会话配置是将最大非活动生命周期设置为\
  \ 60（秒），超过此时间后，Servlet 容器将使会话失效。接下来，在会话中设置一个名为 `testAttr` 的属性，并赋予其值 `testVal`：\n\
  \n```java\nHttpSession session = arg.getSession();\nsession.setMaxInactiveInterval(60);\n\
  session.setAttribute(\"testAttr\", \"testVal\");\n```\n\n声明了一个名为 `numberOfSessions`\
  \ 的 Servlet 内部字段，每次启动新会话时，该字段都会递增。在 `session.setAttribute()` 调用之后，计数器在同步语句内递增。最后，向服务器日志打印一条消息，指示已创建新会话，并提供总的活动会话计数。\n\
  \n■ **注意** 将递增操作放在同步语句内有助于避免该字段的并发问题。有关 Java 同步和并发的更多信息，请参阅在线文档。\n\n\n\n[`docs.oracle.com/javase/tutorial/essential/concurrency/locksync.html`](http://docs.oracle.com/javase/tutorial/essential/concurrency/locksync.html).\n\
  \n一旦达到最大非活动秒数，就会在会话上调用 `sessionDestroyed` 方法。在此示例中，该方法将在非活动 60 秒后被调用。在 `sessionDestroyed`\
  \ 方法内部，另一个同步语句将 `numberOfSessions` 字段值减一，然后在服务器日志中打印几行内容，指示会话已被销毁，并提供新的活动会话总数。\n\
  \n会话监听器可用于设置 Cookie 和执行其他有用的策略，以帮助管理用户体验。它们易于使用且功能强大。\n\n1-12. 管理会话属性\n\n问题\n\n\
  当用户访问您的网站时，您希望在每个会话的基础上维护有关单个会话的一些信息。\n\n第 1 章 ■ Jakarta Servlet\n\n解决方案\n\n使用会话属性来保留基于会话的信息。为此，请使用\
  \ `HttpServletRequest` 对象获取对会话的访问权限，然后相应地使用 `getAttribute()` 和 `setAttribute()`\
  \ 方法。在以下场景中，使用 HTML 页面捕获用户的电子邮件地址，然后将该电子邮件地址放入会话属性中。然后，Jakarta Servlet 在应用程序的不同页面中使用该属性以维护状态。\n\
  \n以下代码演示了在此场景中 HTML 表单（`recipe01_12.html`）可能的样子：\n\n```html\n<html lang=\"en\">\n\
  \n<head>\n\n<title></title>\n\n<meta http-equiv=\"Content-Type\" content=\"text/html;\
  \ charset=UTF-8\">\n\n</head>\n\n<body>\n\n<h1>提供用于此交易的电子邮件地址</h1>\n\n</br>\n\n\
  <form method=\"POST\" action=\"SessionServlet\">\n\n<label for=\"email\">电子邮件</label>\n\
  \n<input type=\"email\" id=\"email\" name=\"email\" formnovalidate=\"false\" required/>\n\
  \n<br/></br>\n\n<input type=\"submit\" value=\"提交\"/>\n\n</form>\n\n</body>\n\n\
  </html>\n```\n\n接下来，当表单提交时，将启动名为 `SessionServlet`（使用 URL 模式 `/SessionServlet`）的\
  \ Jakarta Servlet。所有表单输入值都会传递给 `SessionServlet` 并进行相应处理。\n\n```java\npackage org.jakartaeerecipe.chapter01.recipe01_12;\n\
  \nimport java.io.*;\n\nimport jakarta.servlet.*;\n\nimport jakarta.servlet.annotation.WebServlet;\n\
  \nimport jakarta.servlet.http.*;\n\n@WebServlet(name=\"SessionServlet\", urlPatterns={\"\
  /SessionServlet\"})\n\npublic class SessionServlet extends HttpServlet {\n\n   \
  \ @Override\n\n    public void doPost (HttpServletRequest req, HttpServletResponse\
  \ res)\n\n            throws ServletException, IOException {\n\n        // 获取 Session\
  \ 对象\n\n        HttpSession session = req.getSession(true);\n\n        // 设置会话属性\n\
  \n        String email = (String)\n\n                session.getAttribute (\"session.email\"\
  );\n\n        if (email == null) {\n\n            email = req.getParameter(\"email\"\
  );\n\n            session.setAttribute (\"session.email\", email);\n\n        }\n\
  \n        ![](img/index-76_1.png)\n\n        // 第 1 章 ■ Jakarta Servlet\n\n    \
  \    String sessionId = session.getId();\n\n        res.setContentType(\"text/html\"\
  );\n\n        try (PrintWriter out = response.getWriter()) {\n\n            out.printf(\"\
  \"\"\n\n                    <html>\n\n                    <head>\n\n           \
  \         <title>使用会话</title>\n\n                    </head>\n\n               \
  \     <body>\n\n                    <h1>会话测试</h1>\n\n                    您的电子邮件地址是：%s\
  \ <br/>\n\n                    您的会话 ID：%s\n\n                    </body>\n\n   \
  \                 </html>\"\"\", email, sessionId);\n\n        }\n\n    }\n\n}\n\
  ```\n\n最后，原始 HTML 表单中输入的电子邮件地址被捕获，并在应用程序的不同页面中使用。\n\n***图 1-13.** SessionServlet\
  \ 输出*\n\n工作原理\n\n自 Web 开发之初，会话属性就被用于保留有关用户会话的重要信息。在使用 Jakarta Servlet 进行开发时，这一概念同样适用，并且\
  \ Servlet 使得设置和获取属性值变得容易。所有 `HttpServlet` 类都必须实现 `doGet` 或 `doPost` 方法以处理 Web 应用程序事件。在此过程中，这些方法可以访问作为参数传递给它们的\
  \ `HttpServletRequest` 对象。可以从 `HttpServletRequest` 中获取 `HttpSession` 对象，因此，可以根据需要使用它来检索和设置属性。\n\
  \n\n\n在本方案的解决方案中，使用了一个 HTTP 会话属性来存储电子邮件地址。随后，在整个应用程序的不同 Servlet 类中，通过获取会话对象并检索该属性值来使用该地址：\n\
  \n// 获取会话对象\n\nHttpSession session = req.getSession(true);\n\n// 设置一个会话属性\n\nString\
  \ email = (String)\n\nsession.getAttribute (\"session.email\");\n\n第 1 章 ■ Jakarta\
  \ ServletS\n\nif (email == null) {\n\nemail = req.getParameter(\"email\");\n\nsession.setAttribute\
  \ (\"session.email\", email);\n\n}\n\n只要会话保持有效，任何属性都将保留在 `HttpSession` 对象中。在页面之间跳转时，会话\
  \ ID 将保持一致。你可以看到，本方案的解决方案获取并打印了当前会话 ID 以供参考。在 `HttpSession` 中使用属性是在不同部分之间传递数据以维护会话状态的一种好方法。\n\
  \n1-13. 下载文件\n\n问题\n\n你希望让你的 Servlet 应用程序具备下载指定文件的能力。\n\n解决方案\n\n编写一个 Servlet，它接受所选文件的名称和路径，然后读取该文件并将其流式传输给文件请求者。以下网页可用于选择要由\
  \ Servlet 下载的文件。尽管以下 HTML（recipe01_13.html）包含一个静态类型的文件名，但它完全可以包含来自数据库或其他来源的动态文件列表：\n\
  \n<html>\n\n<head>\n\n<meta charset=\"UTF-8\">\n\n</head>\n\n<body>\n\n<h1>点击下方链接以下载文件。</h1>\n\
  \n<br/>\n\n<a href=\"DownloadServlet?filename=downloadTest.txt\">下载测试文件</a>\n\n\
  <br/>\n\n</body>\n\n</html>\n\n■ **注意** 对于本方案中的示例，你可以在根目录中（与 WEB-INF 文件夹相邻）创建并编辑一个文件，将其命名为\
  \ `downloadTest.txt`，以查看 Servlet 将数据传输到你的浏览器客户端。\n\n当用户点击前一个 HTML 网页上呈现的链接时，将使用以下\
  \ Servlet 来下载指定文件，方法是将 `HttpServletRequest` 和 `HttpServletResponse` 对象以及应下载的文件传递给它：\n\
  \npackage org.jakartaeerecipe.chapter01.recipe01_13;\n\nimport jakarta.servlet.*;\n\
  \nimport jakarta.servlet.http.*;\n\nimport jakarta.servlet.annotation.*;\n\n第 1\
  \ 章 ■ Jakarta ServletS\n\nimport java.io.IOException;\n\nimport java.io.InputStream;\n\
  \n@WebServlet(name = \"DownloadServlet\", value = \"/DownloadServlet\")\n\npublic\
  \ class DownloadServlet extends HttpServlet {\n\n/**\n\n* 处理 HTTP\n\n* <code>GET</code>\
  \ 方法。\n\n*\n\n* @param request servlet 请求\n\n* @param response servlet 响应\n\n* @throws\
  \ ServletException 如果发生特定于 servlet 的错误\n\n* @throws IOException 如果发生 I/O 错误\n\n\
  */\n\n@Override\n\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
  \ response)\n\nthrows ServletException, IOException {\n\n// 从包含要下载文件名的表单中读取参数\n\n\
  String fileToDownload = request.getParameter(\"filename\");\n\n// 使用给定的文件调用下载方法\n\
  \nSystem.err.println(\"正在下载文件...\");\n\ndoDownload(request, response, fileToDownload);\n\
  \n}\n\n/**\n\n* 将文件发送到输出流。\n\n*\n\n* @param request 请求\n\n* @param response 响应\n\
  \n* @param originalFile 浏览器应接收到的文件名。\n\n*/\n\nprivate void doDownload( HttpServletRequest\
  \ request, HttpServletResponse response,\n\nString originalFile) throws IOException\
  \ {\n\nfinal int BYTES = 1024;\n\nint length;\n\nServletOutputStream outStream =\
  \ response.getOutputStream();\n\nServletContext context = getServletConfig().getServletContext();\n\
  \nresponse.setContentType((context.getMimeType( originalFile ) != null) ?\n\ncontext.getMimeType(\
  \ originalFile ) : \"text/plain\" );\n\nresponse.setHeader(\"Content-Disposition\"\
  , \"attachment; filename=\\\"\" + originalFile\n\n+ \"\\\"\" );\n\nInputStream in\
  \ = context.getResourceAsStream(\"/\" + originalFile);\n\nbyte[] bbuf = new byte[BYTES];\n\
  \nwhile ((in != null) && ((length = in.read(bbuf)) != -1))\n\n{\n\n![](img/index-79_1.jpg)\n\
  \n第 1 章 ■ Jakarta ServletS\n\noutStream.write(bbuf,0,length);\n\n}\n\noutStream.flush();\n\
  \noutStream.close();\n\n}\n\n/**\n\n\n\n* 返回 Servlet 的简短描述。\n\n*\n\n* @return 包含\
  \ Servlet 描述的字符串\n\n*/\n\n@Override\n\npublic String getServletInfo() {\n\nreturn\
  \ \"简短描述\";\n\n}\n\n}\n\n该 Servlet 不会生成响应；当用户点击下载文件的链接时，它只会将指定文件下载到最终用户。\n\n***图\
  \ 1-14.** DownloadServlet 输出*\n\n工作原理\n\n文件下载几乎是所有 Web 应用程序的基本任务。按照本方案提供的步骤操作，可以轻松实现此任务。本方案中的示例演示了一个简单场景：用户可以访问网页，点击要下载的文件，然后文件会从服务器检索并复制到其计算机上。此示例中的\
  \ HTML 非常简单，它列出了一个 URL 链接，该链接会调用 Servlet 并传递要下载的文件名。当用户点击链接时，文件名会作为名为 `filename`\
  \ 的参数传递给 `/DownloadServlet`。点击链接后，会调用 Servlet 的 `doGet` 方法。`doGet` 方法中执行的第一项任务是从调用网页读取\
  \ `filename` 参数。然后，该信息连同 `HttpServletRequest` 和 `HttpServletResponse` 对象一起传递给 `doDownload`\
  \ 方法。\n\n在 `doDownload` 方法中，从 `HttpServletResponse` 对象获取 `ServletOutputStream`，并获取\
  \ `ServletContext` 以供后续使用。要下载文件，Servlet 必须提供与要下载文件类型匹配的响应类型。它还必须在响应头中指明包含附件。因此，`doDownload`\
  \ 方法要执行的第一项任务是适当地设置 `HttpServletResponse`：\n\n```java\nresponse.setContentType(\
  \ (context.getMimeType( originalFile ) != null) ?\ncontext.getMimeType( originalFile\
  \ ) : \"text/plain\" );\nresponse.setHeader( \"Content-Disposition\", \"attachment;\
  \ filename=\\\"\" + originalFile + \"\\\"\" );\n```\n\n在此例中，文件名 `originalFile` 用于获取文件的\
  \ MIME 类型。如果文件的 MIME 类型为 null，则返回 `text/plain`。同时，通过在 `Content-Disposition` 中将文件名作为附件附加，在响应头中设置附件。接下来，`doDownload`\
  \ 方法通过调用 `ServletContext` 的 `getResourceAsStream` 方法并传递文件名，获取对要下载文件的引用。这将返回一个 `InputStream`\
  \ 对象，可用于读取指定文件的内容。然后创建一个字节缓冲区，用于在读取文件时获取数据块。最后一项实际任务是读取文件内容并将其复制到输出流。这通过一个 `while`\
  \ 循环完成，该循环将持续从 `InputStream` 读取，直到所有内容处理完毕。使用循环读取数据块并写入输出流：\n\n```java\nwhile ((in\
  \ != null) && ((length = in.read(bbuf)) != -1))\n{\n    outStream.write(bbuf,0,length);\n\
  }\n```\n\n最后，调用 `ServletOutputStream` 对象的 `flush` 方法清除内容，然后关闭它以释放资源。然而，使用 Jakarta\
  \ Servlet 下载文件的魔力可能被此示例掩盖，因为此示例中使用的是静态文件作为下载源。在实际应用中，HTML 页面可能包含数据库中的文件列表，当用户选择要下载的文件时，Servlet\
  \ 会相应地处理该文件，甚至在必要时从数据库中提取文件。\n\n1-14. 分发请求\n\n问题\n\n您希望编写一个 Servlet，根据需要完成的任务将请求分发给其他\
  \ Servlet。此外，您希望在不将客户端重定向到其他站点的情况下分发请求，因此浏览器中的 URL 不应改变。\n\n解决方案\n\n\n\n创建一个请求分发器\
  \ Servlet，它将决定需要完成哪个任务，然后将请求发送到适当的 Servlet 来执行该任务。以下示例通过一个 HTML 表单演示了这一概念，该表单接受用户输入的两个数字，并允许用户决定服务器应执行哪种类型的数学运算。Servlet\
  \ 处理请求时，首先确定应执行哪种数学运算，然后将请求分派给适当的 Servlet 来执行任务。\n\n以下 HTML 表单接受用户输入的两个数字，并允许他们选择要对这两个数字执行哪种数学运算：\n\
  \n<html>\n\n<head>\n\n<title></title>\n\n<meta http-equiv=\"Content-Type\" content=\"\
  text/html; charset=UTF-8\">\n\n</head>\n\n<body>\n\n<h1>请求分发示例</h1>\n\n<p>执行数学运算。输入两个待计算的数字，然后选择要执行的运算类型。</p>\n\
  \n<form method=\"POST\" action=\"MathDispatcher\">\n\n<label for=\"numa\">输入数字 A：</label>\n\
  \n<input type=\"text\" id=\"numa\" name=\"numa\"/><br><br>\n\n<label for=\"numb\"\
  >输入数字 B：</label>\n\n<input type=\"text\" id=\"numb\" name=\"numb\"/><br/><br/>\n\
  \n<select id=\"eval\" name=\"eval\">\n\n<option value=\"add\">相加</option>\n\n<option\
  \ value=\"subtract\">相减</option>\n\n<option value=\"multiply\">相乘</option>\n\n<option\
  \ value=\"divide\">相除</option>\n\n</select>\n\n<input type=\"submit\" value=\"提交表单\"\
  />\n\n<input type=\"reset\" value=\"重置表单\"/>\n\n</form>\n\n</body>\n\n</html>\n\n\
  接下来的代码是 Servlet，它将根据 `matheval` 字段的值相应地分发请求：\n\npackage org.jakartaeerecipe.chapter01.recipe01_14;\n\
  \nimport java.io.IOException;\n\nimport jakarta.servlet.*;\n\nimport jakarta.servlet.annotation.WebServlet;\n\
  \nimport jakarta.servlet.http.*;\n\n@WebServlet(name = \"MathDispatcher\", urlPatterns\
  \ = {\"/MathDispatcher\"})\n\npublic class MathDispatcher extends HttpServlet {\n\
  \n/**\n\n* 处理 HTTP\n\n* <code>POST</code> 方法。\n\n*\n\n* @param request  servlet\
  \ 请求\n\n* @param response servlet 响应\n\n* @throws ServletException 如果发生特定于 servlet\
  \ 的错误\n\n* @throws IOException      如果发生 I/O 错误\n\n*/\n\n@Override\n\nprotected\
  \ void doPost(HttpServletRequest request, HttpServletResponse response)\n\nthrows\
  \ ServletException, IOException {\n\nSystem.out.println(\"进入 Servlet...\");\n\n\
  // 将输入参数值存储到字符串中\n\nString eval = request.getParameter(\"eval\");\n\nServletContext\
  \ sc = getServletConfig().getServletContext();\n\nRequestDispatcher rd = null;\n\
  \nswitch(eval){\n\ncase \"add\" -> rd = sc.getRequestDispatcher(\"/AddServlet\"\
  );\n\ncase \"subtract\" -> rd = sc.getRequestDispatcher(\"/SubtractServlet\");\n\
  \ncase \"multiply\" -> rd = sc.getRequestDispatcher(\"/MultiplyServlet\");\n\ncase\
  \ \"divide\" -> rd = sc.getRequestDispatcher(\"/DivideServlet\");\n\n}\n\nrd.forward(request,\
  \ response);\n\n}\n\n/**\n\n* 返回 servlet 的简短描述。\n\n*\n\n* @return 包含 servlet 描述的字符串\n\
  \n*/\n\n@Override\n\npublic String getServletInfo() {\n\nreturn \"简短描述\";\n\n}\n\
  \n}\n\n接下来是请求将被分发到的其中一个 Servlet 的示例。以下是 `AddServlet` 的代码，它将两个数字相加并将结果返回给用户：\n\n\
  package org.jakartaeerecipe.chapter01.recipe01_14;\n\nimport java.io.*;\n\nimport\
  \ jakarta.servlet.ServletException;\n\nimport jakarta.servlet.annotation.WebServlet;\n\
  \nimport jakarta.servlet.http.*;\n\n@WebServlet(name = \"AddServlet\", urlPatterns\
  \ = {\"/AddServlet\"})\n\npublic class AddServlet extends HttpServlet {\n\n/**\n\
  \n* 处理 HTTP\n\n* <code>GET</code> 和\n\n* <code>POST</code> 方法的请求。\n\n*\n\n* @param\
  \ request  servlet 请求\n\n* @param response servlet 响应\n\n* @throws ServletException\
  \ 如果发生特定于 servlet 的错误\n\n* @throws IOException      如果发生 I/O 错误\n\n*/\n\nprotected\
  \ void processRequest(HttpServletRequest request, HttpServletResponse response)\n\
  \nthrows ServletException, IOException {\n\nresponse.setContentType(\"text/html;charset=UTF-8\"\
  );\n\n\n\n// 将输入参数值存储到字符串中\n\nString numA = request.getParameter(\"numa\");\n\n\
  String numB = request.getParameter(\"numb\");\n\nint sum = Integer.valueOf(numA)\
  \ + Integer.valueOf(numB);\n\ntry (PrintWriter out = response.getWriter())\n\n{\n\
  \nout.printf(\"\"\"<html>\n\n<head>\n\n<title>数字之和</title>\");\n\n</head>\n\n<body>\n\
  \n<h1>总和：%s </h1>\n\n<br/>\n\n<a href=recipe01_14.html>再试一次</a>\n\n</body>\n\n</html>\"\
  \"\", sum);\n\n}\n\n/**\n\n* 处理 HTTP\n\n* <code>GET</code> 方法。\n\n*\n\n* @param\
  \ request  servlet 请求\n\n* @param response servlet 响应\n\n* @throws ServletException\
  \ 如果发生特定于 servlet 的错误\n\n* @throws IOException      如果发生 I/O 错误\n\n*/\n\n@Override\n\
  \nprotected void doGet(HttpServletRequest request, HttpServletResponse response)\n\
  \nthrows ServletException, IOException {\n\nprocessRequest(request, response);\n\
  \n}\n\n/**\n\n* 处理 HTTP\n\n* <code>POST</code> 方法。\n\n*\n\n* @param request  servlet\
  \ 请求\n\n* @param response servlet 响应\n\n* @throws ServletException 如果发生特定于 servlet\
  \ 的错误\n\n* @throws IOException      如果发生 I/O 错误\n\n*/\n\n@Override\n\nprotected\
  \ void doPost(HttpServletRequest request, HttpServletResponse response)\n\nthrows\
  \ ServletException, IOException {\n\n第 1 章 ■ Jakarta ServletS\n\nprocessRequest(request,\
  \ response);\n\n}\n\n/**\n\n* 返回 servlet 的简短描述。\n\n*\n\n* @return 包含 servlet 描述的字符串\n\
  \n*/\n\n@Override\n\npublic String getServletInfo() {\n\nreturn \"简短描述\";\n\n}\n\
  \n}\n\n其他每个 servlet 都与 AddServlet 非常相似，只是数学运算不同。\n\n要查看完整的代码清单，请参阅本书的源代码。\n\n工作原理\n\
  \n有时，向最终用户隐藏请求转发是一个好主意。其他时候，将请求从一个 servlet 移交给另一个 servlet 以便进行另一种类型的处理也是合理的。这只是在\
  \ servlet 内执行请求分派时很有用的两个例子。转发请求与分派请求不同，因为转发请求是在客户端移交请求，而分派请求是在服务器端移交请求。这种差异可能非常大，因为最终用户对服务器端的分派一无所知，而当请求在客户端转发时，浏览器会被重定向到不同的\
  \ URL。\n\n分派请求是一项简单的任务。执行此操作的工具直接内置于 ServletContext 中，因此一旦获得对 ServletContext 的引用，只需调用\
  \ getRequestDispatcher 方法即可获得可用于分派请求的 RequestDispatcher 对象。调用 getRequestDispatcher\
  \ 方法时，传入一个包含要移交请求的 servlet 名称的字符串。实际上，可以通过将资源的适当 URL 以字符串格式传递给 getRequestDispatcher\
  \ 方法，为应用程序中的任何有效 HTTP 资源获取 RequestDispatcher 对象。因此，如果你更愿意分派到 JSP 或 HTML 页面，也可以这样做。获得\
  \ RequestDispatcher 对象后，通过将 HttpServletRequest 和 HttpServletResponse 对象传递给它来调用其\
  \ forward 方法。forward 方法执行移交请求的任务：\n\nrd = sc.getRequestDispatcher(\"/AddServlet\"\
  );\n\nrd.forward(request, response);\n\n在本示例中，你可以将请求分派到不同的 servlet 以执行特定任务。一旦移交，获得请求的\
  \ servlet 负责向客户端提供响应。在这种情况下，servlet 返回指定数学运算的结果。\n\n![](img/index-85_1.png)\n\n\
  ![](img/index-85_2.png)\n\n第 1 章 ■ Jakarta ServletS\n\n***图 1-15.** 用于调用 MathDispatcher\
  \ servlet 的 HTML 表单*\n\n***图 1-16.** AddServlet servlet 输出*\n\n1-15. 重定向到不同的站点\n\
  \n问题\n\n当访问应用程序中的特定 URL 时，你需要将浏览器重定向到另一个 URL。\n\n解决方案\n\n\n\n使用 `HttpServletResponse`\
  \ 对象的 `sendRedirect()` 方法，可以从 Servlet 重定向到另一个 URL。在以下示例中，当使用与 `/redirect` 模式匹配的\
  \ URL 时，Servlet 会将浏览器重定向到另一个站点：\n\n```java\nimport java.io.IOException;\n\nimport\
  \ jakarta.servlet.*;\n\nimport jakarta.servlet.annotation.WebServlet;\n\nimport\
  \ jakarta.servlet.http.*;\n\n@WebServlet(name=\"RedirectServlet\", urlPatterns={\"\
  /redirect\"})\n\npublic class RedirectServlet extends HttpServlet {\n\n@Override\n\
  \nprotected void doGet(HttpServletRequest req, HttpServletResponse res)\n\nthrows\
  \ IOException, ServletException {\n\nString site = \"http://www.apress.com\";\n\n\
  res.sendRedirect(site);\n\n}\n\n}\n```\n\n在此示例中，Servlet 会将浏览器重定向到 [www.apress.com\
  \ 网站](http://www.apress.com)。\n\n第 1 章 ■ Jakarta Servlet\n\n工作原理\n\n在某些情况下，Web 应用程序需要将流量重定向到同一应用程序或另一个应用程序中的其他站点或\
  \ URL。对于此类情况，可以使用 `HttpServletResponse` 的 `sendRedirect` 方法。\n\n`sendRedirect` 方法接受一个字符串格式的\
  \ URL，然后将 Web 浏览器重定向到该 URL。由于 `sendRedirect` 接受基于字符串的 URL，因此也可以轻松构建动态 URL。\n\n例如，某些应用程序可能会根据用户传递的特定参数重定向到不同的\
  \ URL。在这种情况下，动态生成 URL 的代码可能如下所示：\n\n```java\nString redirectUrl = null;\n\nif(parameter.equals(\"\
  SOME STRING\")\n\nredirectUrl = \"/\" + urlPathA;\n\nelse\n\nredirectUrl = \"/\"\
  \ + urlPathB;\n\nres.sendRedirect(redirectUrl);\n```\n\n`sendRedirect()` 方法也可用于创建\
  \ Web 菜单和其他页面项的控制，这些项可以将 Web 流量发送到不同的位置。\n\n■ **注意** 与 Servlet 链式调用不同，这种简单的重定向不会将\
  \ `HttpRequest` 对象传递给目标地址。\n\n1-16. 在浏览器中安全地维护状态\n\n问题\n\n你需要在浏览器中为应用程序保存用户的状态。\n\
  \n解决方案\n\n使用“仅 HTTP”浏览器 Cookie 来保存状态。在以下示例中，一个 Servlet 用于将一些会话信息放入浏览器中的 Cookie 中。然后调用另一个\
  \ Servlet，该 Servlet 读取 Cookie 信息并将其显示给用户。以下 Servlet 演示了如何使用 Jakarta Servlet 在浏览器中存储\
  \ Cookie：\n\n```java\npackage org.jakartaeerecipe.chapter01.recipe01_16;\n\nimport\
  \ java.io.*;\n\nimport jakarta.servlet.ServletException;\n\nimport jakarta.servlet.annotation.WebServlet;\n\
  \nimport jakarta.servlet.http.*;\n\n@WebServlet(name = \"SetCookieServlet\", urlPatterns\
  \ = {\"/SetCookieServlet\"}) \npublic class SetCookieServlet extends HttpServlet\
  \ {\n\nprotected void processRequest(HttpServletRequest request, HttpServletResponse\
  \ response)\n\nthrows ServletException, IOException {\n\nresponse.setContentType(\"\
  text/html;charset=UTF-8\");\n\nPrintWriter out = response.getWriter();\n\n![](img/index-87_1.png)\n\
  \n第 1 章 ■ Jakarta Servlet\n\nCookie cookie = new Cookie(\"sessionId\",\"12345\"\
  );\n\ncookie.setHttpOnly(true);\n\ncookie.setMaxAge(-30);\n\nresponse.addCookie(cookie);\n\
  \ntry {\n\nout.println(\"\"\"<html>\n\n<head>\n\n<title>设置 Cookie</title>\n\n</head>\n\
  \n<body>\n\n<h1>Servlet SetCookieServlet 正在向浏览器设置 Cookie</h1>\n\n<br/><br/>\n\n\
  <a href='DisplayCookieServlet'>显示 Cookie 内容。</a>\n\n</body>\n\n</html>\"\"\");\n\
  \n} finally {\n\nout.close();\n\n}\n\n}\n\n@Override\n\nprotected void doGet(HttpServletRequest\
  \ request, HttpServletResponse response)\n\nthrows ServletException, IOException\
  \ {\n\nprocessRequest(request, response);\n\n}\n\n@Override\n\nprotected void doPost(HttpServletRequest\
  \ request, HttpServletResponse response)\n\nthrows ServletException, IOException\
  \ {\n\nprocessRequest(request, response);\n\n}\n\n}\n```\n\n***图 1-17.** SetCookieServlet\
  \ Servlet 的输出*\n\n接下来的代码清单演示了一个 Servlet，它读取浏览器中的 Cookie 并打印其内容：\n\n```java\npackage\
  \ org.jakartaeerecipe.chapter01.recipe01_16;\n\nimport java.io.*;\n\nimport jakarta.servlet.ServletException;\n\
  \nimport jakarta.servlet.annotation.WebServlet;\n\nimport jakarta.servlet.http.*;\n\
  ```\n\n\n\n第 1 章 ■ Jakarta ServletS\n\n@WebServlet(name = \"DisplayCookieServlet\"\
  , urlPatterns = {\"/DisplayCookieServlet\"}) public class DisplayCookieServlet extends\
  \ HttpServlet {\n\nprotected void processRequest(HttpServletRequest request, HttpServletResponse\
  \ response)\n\nthrows ServletException, IOException {\n\nresponse.setContentType(\"\
  text/html;charset=UTF-8\");\n\nCookie[] cookies = request.getCookies();\n\ntry (PrintWriter\
  \ out = response.getWriter()) {\n\nout.print(\"\"\"\n\n<html>\n\n<head>\n\n<title>显示\
  \ Cookie</title>\n\n</head>\n\n<body>\n\n\"\"\");\n\nfor(Cookie cookie:cookies){\n\
  \nout.printf(\"\"\"\n\n<p>Cookie 名称: %s <br/>\n\n值: %s\n\n</p>\n\n\"\"\", cookie.getName(),\
  \ cookie.getValue());\n\n}\n\nout.println(\"</body>\");\n\nout.println(\"</html>\"\
  );\n\n}\n\n}\n\n@Override\n\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
  \ response)\n\nthrows ServletException, IOException {\n\nprocessRequest(request,\
  \ response);\n\n}\n\n@Override\n\nprotected void doPost(HttpServletRequest request,\
  \ HttpServletResponse response)\n\nthrows ServletException, IOException {\n\nprocessRequest(request,\
  \ response);\n\n}\n\n}\n\n工作原理\n\n使用 Cookie 在浏览器中存储数据是一项已实践多年的技术。自 Servlet 3.0 API\
  \ 起，将 Cookie 标记为仅 HTTP 的功能已可用。这使得 Cookie 能够防范客户端脚本攻击，从而更加安全。任何标准 Servlet 都可以创建 Cookie\
  \ 并将其放入当前会话中。同样，同一会话中的任何 Servlet 都可以读取或更新会话的 Cookie 值。在本示例中，使用了两个 Servlet 来演示 Cookie\
  \ 的工作方式。第一个 Servlet 负责创建新 Cookie 并将其设置到浏览器会话中。第二个 Servlet 负责向用户显示 Cookie 的内容。\n\n\
  要创建 Cookie，只需实例化一个新的`jakarta.servlet.http.Cookie`对象，并为其分配名称和值。在实例化时将名称和值同时传递给 Cookie\
  \ 构造函数即可完成赋值，也可以通过将值传递给 Cookie 的`setName`和`setValue`方法来实现。\n\n第 1 章 ■ Jakarta ServletS\n\
  \nCookie 实例化后，可以设置属性来配置 Cookie。在本示例中，调用了 Cookie 的`setMaxAge`和`setHttpOnly`方法，用于设置\
  \ Cookie 的生命周期并确保其能防范客户端脚本。有关 Cookie 属性的完整列表，请参考表 1-3。最后，通过将 Cookie 传递给响应对象的`addCookie`方法将其放入响应中：\n\
  \nCookie cookie = new Cookie(\"sessionId\",\"12345\");\n\ncookie.setHttpOnly(true);\n\
  \ncookie.setMaxAge(-30);\n\nresponse.addCookie(cookie);\n\n***表 1-3.** Cookie 属性方法*\n\
  \n**属性**\n\n**描述**\n\nsetComment\n\n设置描述 Cookie 的注释\n\nsetDomain\n\n指定 Cookie 所属的域\n\
  \nsetHttpOnly\n\n将 Cookie 标记为仅 HTTP\n\nsetMaxAge\n\n设置 Cookie 的最大生命周期。负值表示 Cookie\
  \ 将在会话结束时过期\n\nsetPath\n\n指定客户端应返回 Cookie 的路径\n\nsetSecure\n\n指示 Cookie 仅应通过安全协议发送\n\
  \nsetValue\n\n为 Cookie 赋值\n\nsetVersion\n\n指定 Cookie 将遵循的 Cookie 协议版本\n\n示例中的第二个\
  \ Servlet DisplayCookieServlet 负责读取并显示会话的 Cookie 值。当调用 DisplayCookieServlet 时，会调用其`processRequest`方法，该方法通过调用`response.getCookies()`获取响应对象中的\
  \ Cookie，并将结果设置为 Cookie 对象数组：\n\nCookie[] cookies = request.getCookies();\n\n现在可以遍历\
  \ Cookie 对象数组以获取每个 Cookie 并打印其内容。\n\nServlet 通过使用 for 循环并打印每个 Cookie 的名称和值来实现这一点：\n\
  \nfor(Cookie cookie:cookies){\n\nout.printf(\"\"\"\"\n\n<p>\n\nCookie 名称: %s <br/>\n\
  \n值: %s\n\n\n\n</p>\n\n\"\"\", cookie.getName(), cookie.getValue());\n\n}\n\n![](img/index-90_1.jpg)\n\
  \n第 1 章 ■ Jakarta Servlet\n\n图 1-18 展示了 DisplayCookie Servlet 的输出结果。\n\n***图 1-18.**\
  \ DisplayCookieServlet Servlet 输出结果*\n\n1-17. 完成 Servlet 任务\n\n问题\n\n你希望当 Servlet\
  \ 不再使用时，它能自动清理某些资源。\n\n解决方案\n\n该问题的解决方案分为两步。首先，在 Servlet 的 destroy 方法中编写执行清理工作的代码。其次，如果存在可能长时间运行的方法，应对其进行编码，使其能够感知关闭事件，并在必要时停止并返回，以便\
  \ Servlet 能够干净地关闭。\n\n以下代码片段是 destroy 方法的一个小示例。在该代码中，它被用于初始化局部变量，并设置 beingDestroyed\
  \ 布尔值以指示 Servlet 正在关闭：\n\n...\n\n/**\n\n* 用于终结 Servlet\n\n*/\n\n@Override\n\npublic\
  \ void destroy() {\n\n// 告知 Servlet 正在关闭\n\nsetBeingDestroyed(true);\n\n// 执行任何清理工作\n\
  \nthisString = null;\n\n}\n\n...\n\ndestroy 方法中的代码可以成功完成 Servlet 的全面清理，但如果存在长时间运行的任务，则必须通知其关闭。以下代码片段代表了一个长时间运行的任务。一旦通过\
  \ beingDestroyed 值变为 true 指示关闭，该任务应停止处理：\n\nfor (int x = 0; (x <= 100000 && !isBeingDestroyed());\
  \ x++) {\n\ndoSomething();\n\n}\n\n第 1 章 ■ Jakarta Servlet\n\n■ **注意** 如果你想在调用 destroy\
  \ 方法之前执行清理工作，可以创建一个返回 void 的 public、protected 或 private 方法，并使用@preDestroy 注解进行标记。@preDestroy\
  \ 注解标记了一个在组件从容器中移除之前被调用的方法。该方法不得抛出受检异常。\n\n工作原理\n\nServlet 的终结非常重要，特别是当 Servlet\
  \ 使用某些可能导致内存泄漏的资源、使用可重用资源（如数据库连接）或需要为另一个会话持久化某些值时。在这种情况下，最好在 Servlet 的 destroy 方法中执行清理工作。每个\
  \ Servlet 都包含一个 destroy 方法（可以被实现以重载默认行为），一旦 Servlet 容器确定某个 Servlet 应停止服务，就会调用该方法。\n\
  \n当 Servlet 的所有 service 方法都停止运行后，destroy 方法会被调用。然而，如果存在长时间运行的 service 方法，则可以设置一个服务器宽限期，当达到宽限期时，将导致任何正在运行的\
  \ service 被关闭。如前所述，destroy 方法是清理资源的理想场所。然而，destroy 方法也是帮助清理长时间运行服务后的好地方。可以通过设置一个特定于\
  \ Servlet 的局部变量来指示 Servlet 正在被销毁，并让长时间运行的服务定期检查该变量的状态来实现清理。如果该变量指示 destroy 方法已被调用，则服务应停止执行。\n\
  \n1-18. 使用非阻塞 I/O 进行读写\n\n问题\n\n你希望以异步、非阻塞的方式进行 I/O 读写。\n\n解决方案\n\n使用 Servlet 3.1\
  \ 版本中引入的非阻塞 I/O API。要使用该技术，在执行非阻塞读取时实现 ReadListener 接口，在执行非阻塞写入时实现 WriteListener\
  \ 接口。\n\n然后，可以将实现类注册到 ServletInputStream 或 ServletOutputStream，以便当监听器发现可以无阻塞地读取或写入\
  \ Servlet 内容时，执行读取或写入操作。\n\n以下源代码来自位于源文件 org.jakartaeerecipe.chapter01.recipe01_07.AcmeReadListenerImpl.java\
  \ 中的 ReadListener 实现，它们演示了如何...\n\n\n\n实现 ReadListener：\n\npackage org.jakartaeerecipe.chapter01.recipe01_07;\n\
  \nimport java.io.IOException;\n\nimport java.util.logging.*;\n\nimport jakarta.servlet.*;\n\
  \npublic class AcmeReadListenerImpl implements ReadListener {\n\n第 1 章 ■ Jakarta\
  \ ServletS\n\nprivate ServletInputStream is = null;\n\nprivate AsyncContext async\
  \ = null;\n\npublic AcmeReadListenerImpl(ServletInputStream in, AsyncContext ac)\
  \ {\n\nthis.is = in;\n\nthis.async = ac;\n\nSystem.out.println(\"读取监听器已初始化\");\n\
  \n}\n\n@Override\n\npublic void onDataAvailable() {\n\nSystem.out.println(\"数据可用\"\
  );\n\ntry {\n\nStringBuilder sb = new StringBuilder();\n\nint len = -1;\n\nbyte\
  \ b[] = new byte[1024];\n\nwhile (is.isReady()\n\n&& (len = is.read(b)) != -1) {\n\
  \nString data = new String(b, 0, len);\n\nSystem.out.println(data);\n\n}\n\n} catch\
  \ (IOException ex) {\n\nLogger.getLogger(AcmeReadListenerImpl.class.getName()).log(Level.SEVERE,\n\
  \nnull, ex);\n\n}\n\n}\n\n@Override\n\npublic void onAllDataRead() {\n\nSystem.out.println(\"\
  所有数据已读取\");\n\nasync.complete();\n\n}\n\n@Override\n\npublic void onError(Throwable\
  \ throwable) {\n\nSystem.out.println(\"错误: \" + throwable);\n\nasync.complete();\n\
  \n}\n\n}\n\n接下来，通过将监听器注册到 `ServletInputStream`（对于 ReadListener）或 `ServletOutputStream`（对于\
  \ WriteListener）来使用它。在本例中，我将展示一个使用 `AcmeReadListenerImpl` 类的 Servlet。以下类的源代码位于 `org.jakartaeerecipe.chapter01.recipe01_07.AcmeReaderExample.java`\
  \ 文件中：\n\npackage org.jakartaeerecipe.chapter01.recipe01_07;\n\nimport java.io.IOException;\n\
  \nimport java.io.PrintWriter;\n\nimport jakarta.servlet.*;\n\n第 1 章 ■ Jakarta ServletS\n\
  \nimport jakarta.servlet.annotation.WebServlet;\n\nimport jakarta.servlet.http.*;\n\
  \n@WebServlet(urlPatterns = {\"/AcmeReaderServlet\"}, asyncSupported = true)\n\n\
  public class AcmeReaderServlet extends HttpServlet {\n\nprotected void processRequest(HttpServletRequest\
  \ request, HttpServletResponse response)\n\nthrows ServletException, IOException\
  \ {\n\nresponse.setContentType(\"text/html;charset=UTF-8\");\n\ntry (PrintWriter\
  \ output = response.getWriter()) {\n\nAsyncContext asyncCtx = request.startAsync();\n\
  \nServletInputStream input = request.getInputStream();\n\ninput.setReadListener(new\
  \ **AcmeReadListenerImpl**(input, asyncCtx));\n\n} catch (Exception ex) {\n\nSystem.out.println(\"\
  发生异常: \" + ex);\n\n}\n\n}\n\n// Http Servlet 方法 ...\n\n...\n\n}\n\n我们需要的最后一段代码是调用\
  \ `AcmeReaderServlet` 的 Servlet，它传递需要处理的消息。在本例中，服务器上的一个文件作为输入传递给 `AcmeReaderServlet`，然后通过\
  \ `AcmeReadListenerImpl` 类进行异步处理。\n\n以下代码取自 `org.jakartaeerecipe.chapter01.recipe01_07.ReaderExample.java`：\
  \ package org.jakartaeerecipe.chapter01.recipe01_07;\n\nimport java.io.*;\n\nimport\
  \ java.net.*;\n\nimport java.util.logging.*;\n\nimport jakarta.servlet.*;\n\nimport\
  \ jakarta.servlet.annotation.WebServlet;\n\nimport jakarta.servlet.http.*;\n\n@WebServlet(name\
  \ = \"ReaderExample\", urlPatterns = {\"/ReaderExample\"})\n\npublic class ReaderExample\
  \ extends HttpServlet {\n\nprotected void processRequest(HttpServletRequest request,\
  \ HttpServletResponse response)\n\nthrows ServletException, IOException {\n\nresponse.setContentType(\"\
  text/html;charset=UTF-8\");\n\nString filename = \"/WEB-INF/test.txt\";\n\nServletContext\
  \ context = getServletContext();\n\nInputStream in = context.getResourceAsStream(filename);\n\
  \ntry (PrintWriter out = response.getWriter()) {\n\nString path = \"http://\"\n\n\
  + request.getServerName()\n\n+ \":\"\n\n+ request.getServerPort()\n\n+ request.getContextPath()\n\
  \n+ **\"/AcmeReaderServlet**\";\n\nout.println(\"\"\"<html>\n\n<head>\n\n第 1 章 ■\
  \ Jakarta ServletS\n\n<title>Jakarta EE 10 入门 - Servlet 读取器示例</title>\n\n</head>\n\
  \n<body>\n\n<h1>Servlet ReaderExample 位于 %s</h1>\n\n调用端点: %s\n\n<br>\n\n\"\"\",\
