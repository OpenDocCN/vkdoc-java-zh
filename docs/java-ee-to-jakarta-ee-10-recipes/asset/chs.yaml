  \n使用标准 API 时，消费者通过会话对象创建，其方式与创建生产者相同（参见配方 12-3）：调用会话的 `createConsumer` 方法，并传入消费者将监听并接受消息的目标对象。消息消费者能够消费队列中等待的消息，并无限期监听新传入的消息。\n\
  \n要设置消费者，请调用会话对象的 `createConsumer` 方法，并传入您希望从中消费消息的目标对象。下一步是调用连接的 `start` 方法。这将告知\
  \ Jakarta Messaging 消费者已准备好开始接收消息。调用 `connection.start()` 方法后，消费者可以通过调用消费者对象的 `receive`\
  \ 方法来接收消息，并可选择传入以毫秒为单位的时间限制，让消费者监听消息。如果未指定时间限制，消费者将无限期监听。\n\n如本配方示例所示，一旦调用 `receive`\
  \ 方法，就会检索到一个 `Message` 对象。收到消息后，应用程序可以通过调用 `Message` 对象的相应 getter 方法来获取所需信息。\n\n\
  第 12 章 ■ Jakarta Messaging\n\n现在让我们看看如何使用简化 API。从解决方案 #2 可以看出，实现与解决方案 #1 相同的结果所需的代码行数更少。`JMSContext`\
