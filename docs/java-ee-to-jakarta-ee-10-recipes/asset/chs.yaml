  \ = true;\n\nsetUser(authenticationFacade.getUser());\n\nreturn \"SUCCESS_LOGIN\"\
  ;\n\n} else {\n\nthis.authenticated = false;\n\nsetUser(null);\n\nreturn \"BAD_LOGIN\"\
  ;\n\n}\n\n}\n\npublic String logout() {\n\nuser = null;\n\nthis.authenticated =\
  \ false;\n\nFacesContext facesContext = FacesContext.getCurrentInstance();\n\nExternalContext\
  \ externalContext = facesContext.getExternalContext();\n\nexternalContext.invalidateSession();\n\
  \nreturn \"SUCCESS_LOGOUT\";\n\n}\n\n/**\n\n* @return 是否已认证\n\n*/\n\npublic boolean\
  \ isAuthenticated() {\n\ntry {\n\nboolean auth = (Boolean) getSession().getAttribute(\"\
  authenticated\");\n\nif (auth) {\n\nthis.authenticated = true;\n\n} else {\n\nauthenticated\
  \ = false;\n\n}\n\n} catch (Exception e) {\n\nthis.authenticated = false;\n\n}\n\
  \nreturn authenticated;\n\n}\n\npublic void setAuthenticated(boolean authenticated)\
  \ {\n\nthis.authenticated = authenticated;\n\n}\n\n}\n```\n\n**用户实体**\n\n对于任何应用程序来说，维护一个可以访问应用程序页面的用户列表都是一个好主意。此外，如果应用程序需要细粒度的访问控制，那么为每个用户分配角色以指示每个用户在应用程序中应具有的权限级别就非常重要。为此，可以使用数据库表，该表应包含一个用于存储有权访问应用程序的每个用户名的字段，以及一个用于存储用户角色的字段。以下\
  \ SQL 用于在 Oracle 数据库中创建 `USER` 数据库表，尽管类似的 SQL 也可用于在其他关系数据库管理系统（RDMS）中创建表：\n\n```sql\n\
  create table user(\nuser_id number,\nusername varchar(150) not null,\npassword varchar(50)\
  \ not null,\nprimary key (id));\n```\n\n以下类清单来自 `org.jakartaeerecipe.chapter15.recipe15_03.User.java`\
  \ 文件，该文件是 `JakartaEERecipes_Chapter15` 项目中的一个实体类：\n\n```java\nimport java.io.Serializable;\n\
  import java.math.BigDecimal;\nimport jakarta.persistence.Column;\nimport jakarta.persistence.Entity;\n\
  import jakarta.persistence.Id;\nimport jakarta.persistence.Table;\n\n/**\n * 实体类\
  \ User\n */\n@Entity\n@Table(name = \"USER\")\npublic class User implements Serializable\
  \ {\n    @Id\n```\n\n\n\n@Column(name = \"USER_ID\", nullable = false)\n\nprivate\
  \ BigDecimal userId;\n\n@Column(name = \"USERNAME\")\n\n第 15 章 ■ Jakarta 安全性\n\n\
  private String username;\n\n@Column(name = \"SECURITY_ROLE\")\n\nprivate String\
