  \ntabindex\n\n指示将组件聚焦所需的 Tab 键按下次数的索引值\n\ntarget\n\n用于显示通过超链接检索到的资源的框架名称\n\ntitle\n\
  \n鼠标悬停在组件上时显示的工具提示\n\ntype\n\n要创建的按钮类型。值为 submit（默认）、reset 和 button\n\n***表 4-9.**\
