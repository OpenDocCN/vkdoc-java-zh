  \ 即可执行该配方代码。\n\n输出结果如图 14-8 所示。\n\n![](img/index-584_1.jpg)\n\n第 14 章 ■ WebSocket\
  \ 与 JSON\n\n***图 14-8.** 配方 14-6 的输出结果*\n\n工作原理\n\nJSON-B API 可用于在 JSON 与 Java 之间无缝转换。\n\
  \n■ **注意** 如需访问 JSON-B 网站并查看所有文档，请访问 [`javaee.github.io/jsonb-spec/`](https://javaee.github.io/jsonb-spec/)。\n\
  \nJSON-B API 的关键部分是 Jsonb 接口，它提供了对 JSON 绑定操作的抽象。可以使用 JsonbBuilder 获取 Jsonb 对象，该对象随后用于在\
  \ Java 与 JSON 之间进行转换。要创建 Jsonb 对象，请调用 JsonBuilder 的 create() 方法。获取 Jsonb 对象后，可通过将\
  \ Java 对象传递给 toJson() 方法，将其转换为 JSON 并进行序列化：\n\nJsonb jsonb = JsonbBuilder.create();\n\
  \nString result = null;\n\nresult = jsonb.toJson(employees);\n\n若要反向操作，即从 JSON 反序列化回\
  \ Java，请使用 Jsonb 的 fromJson() 方法，将 JSON 字符串作为第一个参数，将 JSON 要转换成的 Java 类型作为第二个参数：\n\
  \nJsonb jsonb = JsonbBuilder.create();\n\nList<Employee> employees = new ArrayList<>();\n\
  \nemployees = jsonb.fromJson(employeesJson, ArrayList.class);\n\n\n\n前面展示的技术只是转换回集合类型的一种方法。若要以类型安全的方式转换回泛型类型\
  \ `List<Employee>`，可以按如下方式操作：`employees = jsonb.fromJson(employeesJson, new ArrayList<Employee>(){}.getClass().getGenericSuperclass());`\n\
  \n`Jsonb` 对象也可以通过将 Java 对象类型作为第二个参数传递给 `fromJson()` 工具方法，从而转换回单个 Java 对象，如下所示：\n\
  \n```java\nJsonb jsonb = JsonbBuilder.create();\nEmployee employee = new Employee();\n\
  employee = jsonb.fromJson(singleEmployeeJson, Employee.class);\n```\n\n**第 14 章\
  \ ■ WebSocket 与 JSON**\n\n本方案涵盖了将 JSON 转换为 Java 以及反向转换的基础知识。有关自定义的更多信息，请参阅方案 14-7。\n\
  \n### 14-7 使用 JSON-B 进行自定义映射\n\n#### 问题\n\n你希望在转换为 Java 类时更改 JSON 属性名称，或者针对特定情况（例如转换特定日期格式或将指定字段标记为瞬态）执行自定义映射。\n\
  \n#### 解决方案\n\n利用 `JsonbConfig` 为 JSON 映射创建自定义运行时配置。此外，还有一些注解可以应用于 Java 类级别、字段级别或\
  \ getter/setter 方法，以自定义某些配置。在以下场景中，使用自定义配置创建了一个包含小写字母加下划线的属性命名策略：\n\n```java\nJsonbConfig\
  \ config = new JsonbConfig()\n    .withPropertyNamingStrategy(PropertyNamingStrategy.LOWER_CASE_WITH_UNDERSCORES);\n\
  Jsonb jsonb = JsonbBuilder.create(config);\n```\n\n如前所述，还有一些注解可用于自定义映射。在以下场景中，狗的\
  \ `color` 属性被标记为瞬态。这意味着在转换时，`color` 属性不会被序列化为 JSON：\n\n```java\npublic class Dog\
  \ {\n    private String name;\n    private int age;\n    private String gender;\n\
  \    @JsonbTransient\n    private String color;\n}\n```\n\n#### 工作原理\n\n`JsonbConfig`\
  \ 类使得为 JSON 映射和格式化创建自定义运行时配置变得简单。注解可用于创建自定义编译时配置。此类自定义可以包括更改默认属性命名约定或指定特定的属性顺序。要创建新配置，只需创建一个新的\
  \ `JsonbConfig` 类，并将配置传递给 `JsonbBuilder.create()` 方法，如下所示：\n\n```java\nJsonbConfig\
  \ config = new JsonbConfig();\nJsonb jsonb = JsonbBuilder.create(config);\n```\n\
  \n**第 14 章 ■ WebSocket 与 JSON**\n\n`JsonbConfig` 类可用于指定表 14-5 中包含的运行时配置。在本方案的示例中，指定了\
  \ `.withPropertyNamingStrategy()` 选项，以配置一个使用小写字母加下划线的属性命名策略。\n\n***表 14-5.** JsonbConfig\
  \ 选项*\n\n| **选项** | **描述** |\n| --- | --- |\n| `.withFormatting(boolean)` | 创建带格式的自定义配置\
  \ |\n| `.withPropertyNamingStrategy(strategy)` | 提供构建属性名称的策略。接受类型为 `PropertyNamingStrategy`\
  \ 的策略（`IDENTITY`、`LOWER_CASE_WITH_DASHES`、`LOWER_CASE_WITH_UNDERSCORES`、`UPPER_CAMEL_CASE`、`UPPER_CAMEL_CASE_WITH_SPACES`、`CASE_INSENSITIVE`）\
  \ |\n| `.withPropertyOrderStrategy(strategy)` | 提供属性排序策略。接受类型为 `PropertyOrderStrategy`\
  \ 的策略（`LEXICOGRAPHICAL`、`ANY`、`REVERSE`） |\n| `.withNullValues(boolean)` | 更改默认的\
  \ NULL 处理方式。全局配置 |\n| `.withDateFormat(\"format\")` | 更改默认日期格式。全局配置 |\n| `.withBinaryDataStrategy(strategy)`\
  \ | 提供二进制数据编码策略。默认为 `BYTE` 编码。接受 `BinaryDataStrategy`（`BYTE`、`BASE_64`、`BASE_64_URL`）\
  \ |\n| `.withAdapters(CustomAdapter)` | 为 `Jsonb` 配置分配一个 `CustomAdapter`。（有关适配器的更多信息，请参阅\
  \ JSON-B 文档） |\n| `.withSerializers(JsonbSerializer)` | 为 `Jsonb` 配置分配一个 `JsonbSerializer`\
  \ |\n| `.withDeserializers(JsonbDeserializer)` | 为 `Jsonb` 配置分配一个 `JsonbDeserializer`\
  \ |\n\n\n\n.withStrictIJSON(boolean)\n\n提供对 JSON 的 I-JSON 受限配置文件的支\n\n如前所述，也可以在编译时通过在\
  \ Java 类、字段或 getter 和 setter 上指定注解来进行配置。表 14-6 列出了可以放置在 Java 类、字段或访问器方法上的注解。\n\n\
  第 14 章 ■ WebSocket 与 JSON\n\n***表 14-6. 注解配置***\n\n**注解**\n\n**描述**\n\n@JsonbProperty(\"\
  name\")\n\n字段和 getter/setter 级别。更改特定属性的名称。放置在 getter 上：序列化写入 JSON 时将使用新名称。放置在 setter\
  \ 上：反序列化读取时将期望使用新名称。放置在字段上：新名称将同时应用于序列化和反序列化。\n\n@JsonbPropertyOrder(strategy)\n\
  \n类级别。自定义序列化属性的顺序。接受一个 PropertyOrderStrategy（LEXICOGRAPHICAL、ANY、REVERSE）。\n\n@JsonbTransient\n\
  \n字段和 getter/setter 级别。指示 JSON 绑定引擎应忽略带注解的字段。放置在字段上：序列化和反序列化期间忽略该属性。放置在 getter 上：序列化期间忽略该属性。放置在\
