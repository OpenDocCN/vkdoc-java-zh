  \ Web 视图与 Java 代码分离一样，你也应该将 JDBC 与用于执行业务逻辑的类分离开来。你是否曾经需要维护或调试一个充斥着业务逻辑和 SQL 语句的类？那简直是一场噩梦！通过将代码分解成更小、更易于管理的部分来简化代码，通常可以使维护和调试对开发者来说更加容易。将\
  \ JDBC 和特定于数据库的代码与应用程序中的其他业务逻辑分离的想法也遵循同样的概念。创建专门用于访问数据库的数据访问对象，可以让开发者针对 Java 对象而非数据库表进行编码。\n\
  \nDAO 并不是标准的 Java 企业对象。没有用于创建 DAO 的框架。\n\nDAO 只是一个类，它包含了与应用程序中单个数据库表交互所需的所有 JDBC\
  \ 代码。如果需要使用 20 个数据库表，那么就应该有同样数量的 DAO。一个 DAO 至少应包含八个不同的方法。对于可能发生的四种数据库事务（即 CREATE、READ、UPDATE\
  \ 和 DELETE），每种至少应有一个方法。这些方法将包含特定的 JDBC 代码，用于连接数据库、执行 JDBC 调用，然后关闭连接。DAO 还应包含四个门面方法，这些方法将直接被包含业务逻辑的类使用。这些方法应接受与\
  \ DAO 所对应的数据库表相关的 Java 对象，并将对象分解为单独的字段，然后传递给 JDBC 方法以执行实际的数据库事务。\n\n在本方案的解决方案中，`AuthorDAO`\
  \ 类包含的方法超过了八个。这是因为在数据库中有不止一种方式可以搜索作者记录，因此该类中有不止一个查找方法。提供了几个不同的 `performFind()` 方法，每个方法都有不同的方法签名。这些方法允许根据\
  \ ID 或姓名查找作者。一旦在数据库中找到匹配的作者记录，就会使用标准的 JDBC 方法检索该记录的值，并将其存储到新的 `Author` 对象中的相应字段中。最后，向调用者返回一个\
  \ `Author` 对象列表或单个 `Author` 对象。这些查找方法包含 `public` 修饰符，因此托管 bean 可以直接调用它们来检索 `Author`\
  \ 对象列表或单个 `Author` 对象。\n\n`performCreate()`、`performUpdate()` 和 `performDelete()`\
  \ 方法是私有的，因此它们只能被同一类中的其他方法访问。`insert`、`update` 和 `delete` 方法接受 `Author` 对象，并负责按字段分解\
  \ `Author` 对象，然后将适当的字段传递给相应的私有方法，以执行数据库操作。例如，bean 可以调用 `AuthorDAO` 的 `insert` 方法，并传递一个\
  \ `Author` 对象。然后 `insert` 方法调用 `performCreate` 方法，将 `Author` 对象的字段按各自位置传递。每个 CRUD\
  \ 操作都可以以相同的方式执行，从而允许业务逻辑直接与 `Author` 对象交互，而不是处理 SQL。\n\n6-10. 查询和存储大对象\n\n问题\n\n\
  你正在开发的应用程序需要存储可以包含无限数量字符的文本字符串。\n\n解决方案\n\n\n\n由于需要存储的字符串大小不受限制，最好使用字符大对象（CLOB）数据类型来存储数据。以下是创建\
  \ CHAPTER 表的 SQL 脚本：\n\n```sql\ncreate table CHAPTER\n(\n    ID NUMERIC(5) not null\n\
  \        primary key,\n    CHAPTER_NUMBER NUMERIC(5),\n    TITLE VARCHAR(500),\n\
  \    BOOK_ID NUMERIC(5)\n        constraint FK_CHAPTER_BOOK_ID\n            references\
  \ BOOK,\n    DESCRIPTION CLOB\n);\n```\n\n以下示例中的代码演示了如何将 CLOB 加载到数据库中以及如何查询它。以下摘录来自\
  \ `org.jakartaeerecipes.chapter06.dao.ChapterDAO` 类中的两个方法。\n\n让我们看看如何从数据库中读取 CLOB\
  \ 列的值。`readClob()` 方法查询数据库，从 CHAPTER 数据库表中读取 `CHAPTER_NUMBER`、`TITLE` 和 `DESCRIPTION`\
  \ 列。CLOB 列 `DESCRIPTION` 的长度会与章节编号、标题和描述一起打印到命令行：\n\n```java\npublic void readClob()\
  \ {\n    String qry = \"select chapter_number, title, description from chapter\"\
  ;\n    Clob theClob = null;\n    try (Connection conn = CreateConnection.getConnection();\n\
  \         PreparedStatement stmt = conn.prepareStatement(qry)) {\n        try (ResultSet\
  \ rs = stmt.executeQuery()) {\n            while (rs.next()) {\n               \
  \ int chapterNumber = rs.getInt(1);\n                String title = rs.getString(2);\n\
  \                theClob = rs.getClob(3);\n                System.out.println(\"\
  Clob length: \" + theClob.length());\n                System.out.println(chapterNumber\
  \ + \" - \" + title + \": \");\n                java.io.InputStream in =\n     \
  \               theClob.getAsciiStream();\n                int i;\n            \
  \    while ((i = in.read()) > -1) {\n                    System.out.print((char)\
  \ i);\n                }\n                System.out.println();\n            }\n\
  \        }\n    } catch (IOException | SQLException ex) {\n        ex.printStackTrace();\n\
  \    }\n}\n```\n\n该代码可以作为独立应用程序运行。运行该方法后，输出结果将类似于图 6-9，具体取决于数据库中存储的记录。\n\n![](img/index-371_1.png)\n\
  \n***图 6-9.** ChapterDAO 类的输出*\n\n那么如何将 CLOB 值插入数据库呢？下一个方法接受 CHAPTER 表记录中每个字段的值，构造\
  \ CLOB 内容，最后执行插入操作：\n\n```java\nprivate void performCreate(int chapterNumber, int\
  \ bookId, String title, String\n                           description) {\n    String\
  \ sql = \"INSERT INTO CHAPTER VALUES(\"\n        + \"CHAPTER_S.NEXTVAL, ?, ?, ?,\
  \ ?)\";\n    Clob textClob = null;\n    CreateConnection.loadProperties();\n   \
  \ try (Connection conn = CreateConnection.getConnection();\n         PreparedStatement\
  \ stmt = conn.prepareStatement(sql)) {\n        textClob = conn.createClob();\n\
  \        textClob.setString(1, description);\n        stmt.setInt(1, chapterNumber);\n\
  \        stmt.setString(2, title);\n        stmt.setClob(3, textClob);\n       \
  \ stmt.setInt(4, bookId);\n        // 返回行数，如果不成功则返回 0\n        int result = stmt.executeUpdate();\n\
  \        if (result > 0) {\n            System.out.println(\"-- 记录已创建 --\");\n \
  \       } else {\n            System.out.println(\"!! 记录未创建 !!\");\n        }\n\
  \    } catch (SQLException e) {\n        e.printStackTrace();\n    }\n}\n```\n\n\
  **工作原理**\n\n如果你的应用程序需要存储字符串值，你需要知道这些字符串可能变得多大。大多数数据库在 VARCHAR 字段的存储大小上都有上限。例如，Oracle\
  \ 数据库的上限是 4000 字节，任何超过该长度的内容都会被截断。如果你需要存储大量文本，请在数据库中使用 CLOB 字段。\n\n在 Java 代码中，CLOB\
  \ 的处理方式与字符串略有不同。事实上，刚开始使用它时可能会觉得有点奇怪，因为你必须通过 `Connection` 来创建 CLOB。\n\n■ **注意**\
  \ 实际上，CLOB 和 BLOB（二进制大对象）并不存储在定义它们的 Oracle 表中。相反，表中列存储的是大对象（LOB）定位器。Oracle 可能会将\
  \ CLOB 放在数据库服务器上的一个单独文件中。当 Java 创建 `Clob` 对象时，它可以用于保存数据以更新数据库中特定的 LOB 位置，或者从数据库中特定的\
  \ LOB 位置检索数据。\n\n让我们看看本方案中包含的 `performCreate()` 方法。如你所见，`Clob` 对象是使用 `Connection`\
  \ 对象的 `createClob()` 方法创建的。创建 `Clob` 后，你可以使用 `setString()` 方法设置其内容，该方法需要传入位置（指示将字符串放在哪里）和字符串文本本身：\n\
  \n```java\ntextClob = conn.createClob();\ntextClob.setString(1, \"This will be the\
  \ recipe text in clob format\");\n```\n\n创建并填充 `Clob` 后，只需使用 `PreparedStatement`\
  \ 的 `setClob()` 方法将其传递给数据库。在本例中，`PreparedStatement` 像往常一样通过调用 `executeUpdate()`\
  \ 方法向 CHAPTER 表执行数据库插入操作。查询 CLOB 也同样直接。如本方案中包含的 `readClob()` 方法所示，设置了一个 `PreparedStatement`\
  \ 查询，并将结果检索到 `ResultSet` 中。使用 `Clob` 和 `String` 的唯一区别在于，你必须将 `Clob` 加载到 `Clob` 类型中。调用\
  \ `Clob` 对象的 `getString()` 方法会返回一个看起来奇怪的字符串文本，它表示一个 `Clob` 对象。因此，调用 `Clob` 对象的 `getAsciiStream()`\
  \ 方法将返回存储在 `Clob` 中的实际数据。本方案中使用了这种技术。\n\n尽管 CLOB 使用起来相当简单，但准备它们需要多几个步骤。最好相应地规划你的应用程序，并尝试估计你使用的数据库字段是否可能因为大小限制而需要成为\
  \ CLOB。适当的规划将防止你以后回过头来更改标准的基于字符串的代码以使其适用于 CLOB。\n\n**第 7 章**\n\n**对象关系映射**\n\n多年来，Java\
  \ 数据库连接（JDBC）API 一直是 Java Web 和桌面应用程序处理数据库的标准。随着时间的推移，获取数据存储和应用程序内处理数据的技术不断发展，许多组织开始开发自己的更方便处理数据的策略。开发人员通常发现，处理关系数据时，使用\
  \ Java 对象比使用结构化查询语言（SQL）更容易。本章讨论了一些用于将 SQL 封装到单独的工具类中并将其从开发人员那里抽象出来的技术，以便他们可以使用\
  \ Java 对象而不是 SQL。这种策略被称为*对象关系映射*（ORM）策略，如今有许多组织提供了几种著名的 ORM 策略。\n\n对象关系映射（ORM）工具有助于开发人员使用\
  \ Java 对象而不是 SQL 来处理关系数据。有许多不同的 ORM 工具可用。其中最著名的 ORM 策略包括 Hibernate、Oracle TopLink（[www.oracle.com/middleware/technologies/top-link.html](http://www.oracle.com/middleware/technologies/top-link.html)）和\
  \ EclipseLink。\n\n\n\n为了规范行业，Jakarta Persistence 已被视为在 Java 和 Jakarta EE 领域向前推进所应采用的策略。Jakarta\
  \ Persistence 包含了许多最初在 Hibernate 和 TopLink 等 ORM 策略中引入的特性。事实上，许多不同 ORM 项目的顶级代表共同制定了用于生成\
  \ Jakarta Persistence API 的 Java 规范请求（JSR），为 Java 企业开发者提供了一种标准、高效且高生产力的方式，以便在 Java\
  \ 应用程序中操作底层关系型数据库管理系统（RDBMS）。Jakarta Persistence API 允许开发者从多种 Java 持久化提供者中进行选择，以使用他们最熟悉的配置，而无需在应用程序中包含多个第三方库或自定义项。一些可能的提供者如下：\n\
  \n• *EclipseLink* ([www.eclipse.org/eclipselink/](https://www.eclipse.org/eclipselink/))：默认的\
  \ Jakarta Persistence API 实现\n\n• *Hibernate* ([`hibernate.org`](https://hibernate.org))：一个流行的\
  \ Java ORM 工具\n\n• *OpenJPA* ([`openjpa.apache.org/`](https://openjpa.apache.org/))：Jakarta\
  \ Persistence 的一个开源实现\n\n• *MyBatis* ([`mybatis.org`](https://mybatis.org))：一个易于使用的\
  \ SQL 映射框架\n\n• *Oracle TopLink* ([www.oracle.com/middleware/technologies/top-link.html](http://www.oracle.com/middleware/technologies/top-link.html))：由\
  \ Oracle 创建的高级 ORM 工具\n\n对象关系映射是将 Java 对象映射到数据库表的过程，使得数据库表的每一列都映射到 Java 对象中的一个字段或属性。用于映射数据库表的\
  \ Java 对象被称为*实体类*，本章将重点介绍实体类的创建和使用。相关技巧将涵盖创建类和执行标准数据库事务等主题。你将学习如何配置数据库连接，如何利用 Jakarta\
  \ Persistence API 在不使用 SQL 的情况下持久化和检索对象，以及如何以有意义且高效的方式将对象相互关联。\n\nORM 编程不仅抽象了开发者直接操作数据库的实现细节，还提供了一种标准机制，用于在来自多个供应商的数据库上部署应用程序。Jakarta\
  \ Persistence API 负责将代码转换为 SQL 语句，因此一旦使用 Jakarta Persistence API 编写了应用程序，它就可以在几乎任何底层数据库上部署。\n\
  \n■ **注意** 本章中的技巧是否可用取决于你选择的 Jakarta Persistence API 提供者。例如，不同的提供者可能包含不同的元数据注解集。我不会列出每个技巧中可用的每个注解，而是会引导你查阅一些非常好的资源，以了解所有可能使用的注解以及最常用的提供者。虽然大多数注解在所有提供者中是通用的，但每个提供者都有一些自定义注解。\n\
  \nEclipseLink: [www.eclipse.org/eclipselink/documentation/](https://www.eclipse.org/eclipselink/documentation/)\n\
  \nHibernate: [`docs.jboss.org/hibernate/orm/6.0/javadocs/`](https://docs.jboss.org/hibernate/orm/6.0/javadocs/)\n\
  \nTopLink: [www.oracle.com/middleware/technologies/top-link.html](http://www.oracle.com/middleware/technologies/top-link.html)\n\
  \n本章的源代码位于 `org.jakartaeerecipe.chapter07` 包中。\n\n要运行本章的示例，请将应用程序部署到应用服务器，然后访问 URL\
  \ `http://localhost:8080/JakartaEERecipes/faces/chapter07/home.xhtml`。需要注意的是，本章的示例无法在没有其他技术（如\
  \ Enterprise JavaBean，将在第 8 章中介绍）的情况下在 Web 应用程序中运行。因此，本章中的许多示例使用独立的 Java 类进行测试。\n\
  \n7-1. 创建实体\n\n问题\n\n你想创建一个可以映射到数据库表的 Java 对象，以便该类可用于持久化，而不是使用 JDBC。\n\n解决方案\n\n\
  针对特定的数据库表创建一个实体类。为底层数据表中的每一列声明持久化字段或属性，并使用注解将这些字段映射到指定的列。为实体中声明的每个持久化字段或属性提供 getter\
  \ 和 setter 方法，以便其他类可以访问其内容。\n\n以下代码是一个名为 `BookAuthor` 的实体类，它将 `BOOK_AUTHOR` 数据库表映射到一个标准的\
  \ Java 对象，以便在应用程序中使用：\n\n```java\npackage org.jakartaeerecipe.chapter07.entity;\n\
  \nimport java.io.Serializable;\nimport java.math.BigDecimal;\nimport jakarta.persistence.*;\n\
  import jakarta.validation.constraints.NotNull;\nimport jakarta.validation.constraints.Size;\n\
  \n@Entity\n@Table(name = \"BOOK_AUTHOR\")\npublic class BookAuthor implements Serializable\
  \ {\n    private static final long serialVersionUID = 1L;\n    @Id\n    @Basic(optional\
  \ = false)\n    @NotNull\n    @Column(name = \"ID\")\n    private BigDecimal id;\n\
  \    @Size(max = 30)\n    @Column(name = \"LAST\")\n    private String last;\n \
  \   @Size(max = 30)\n    @Column(name = \"FIRST\")\n    private String first;\n\
  \    @Lob\n    @Column(name = \"BIO\")\n    private String bio;\n\n    public BookAuthor()\
  \ {\n    }\n\n    public BookAuthor(BigDecimal id) {\n        this.id = id;\n  \
  \  }\n\n    // ... getters and setters ...\n\n    @Override\n    public int hashCode()\
  \ {\n        int hash = 0;\n        hash += (id != null ? id.hashCode() : 0);\n\
  \        return hash;\n    }\n\n    @Override\n    public boolean equals(Object\
  \ object) {\n        if (!(object instanceof BookAuthor))\n            return false;\n\
  \        BookAuthor other = (BookAuthor) object;\n        if ((this.id == null &&\
  \ other.id != null) || (this.id != null && !this.id.equals(other.id)))\n       \
  \     return false;\n        return true;\n    }\n\n    @Override\n    public String\
  \ toString() {\n        return \"BookAuthor[ id=\" + id + \" ]\";\n    }\n\n   \
  \ public static void main(String[] args) {\n        EntityManagerFactory emf = Persistence.createEntityManagerFactory(\"\
  JakartaEERecipes_LOCAL\");\n        EntityManager em = emf.createEntityManager();\n\
  \        try {\n            EntityTransaction transaction = em.getTransaction();\n\
  \            transaction.begin();\n            Query query = em.createQuery(\"SELECT\
  \ b FROM BookAuthor b\");\n            List<BookAuthor> authorList = (List<BookAuthor>)\
  \ query.getResultList();\n            for (BookAuthor author : authorList) {\n \
  \               System.out.print(\"Name:\" + author.getFirstname() + \" \" + author.getLastname());\n\
  \                System.out.println();\n            }\n            transaction.commit();\n\
  \        } catch (Exception e) {\n            e.printStackTrace();\n        }\n\
  \    }\n}\n```\n\n实体本身不能单独用于访问数据库。至少需要一个持久化单元才能连接数据库并使用实体类执行事务。要了解更多关于创建持久化单元的信息，请参考技巧\
  \ 7-3。\n\n图 7-1 显示了上述代码的输出。\n\n***图 7-1.** 执行 BookAuthor.main() 方法的输出*\n\n工作原理\n\
  \n作为一名面向对象的开发者，有时处理代表数据的对象比处理数据变量并编写 SQL 来直接操作底层数据存储更有意义。\n\n\n\n将对象映射到数据库表的概念通常被称为*对象关系映射*。Java\
  \ 持久化 API 利用 ORM，通过使用称为*实体类*的对象类来存储和检索数据库中的数据。实体类是一个 Java 对象，它代表底层的一个数据库表。\n\n■\
  \ **注意** 在 EJB 3.0 之前，使用 XML 文件而非注解来管理实体类的元数据。如今你仍然可以使用 XML 描述符来管理元数据，但我不会在本书中介绍如何操作。大多数注解可用于有选择地覆盖类中的默认值。\n\
  \n实体类通常使用驼峰命名法（所有单词首字母大写）来分隔表名中的不同单词，其名称通常与底层数据库表名相同。例如，`BOOK_AUTHOR` 数据库表对应的 Java\
  \ 实体类名为 `BookAuthor`。实体的名称可以与底层数据库表的名称不同。然而，标准做法是将实体类命名为与表名相同。在实体类名称必须与数据库表名称不同的情况下，可以使用\
  \ `@Table` 注解来标注实体类，并提供底层数据表的名称。每个实体类都必须通过指定 `jakarta.persistence.Entity` 注解来进行标注。在示例中，`BookAuthor`\
  \ 实体类只指定了那些必需的注解。如果实体的名称需要与数据库表名不同，则可以按如下方式使用 `@Table` 注解：\n\n...\n\n@Entity\n\n\
  @Table(name = \"BOOK_AUTHOR\")\n\n...\n\n实体类必须有一个公共的或受保护的无参构造函数。通常建议通过实现 `java.io.Serializable`\
  \ 接口来使实体类可序列化，因为这样做可以确保实体类能够按值传递，并在需要时持久化到磁盘。所有实体类必须为底层数据库表中的每一列以及该实体可能与其他实体存在的每个关系包含私有的或受保护的实例变量。（要了解更多关于实体关系的信息，请参阅配方\
  \ 7-6、7-7 和 7-8。）所有将映射到 Java 实体类的数据库表都必须包含一个主键字段，并且实体类中映射到该主键列的对应实例变量必须使用 `@Id`\
  \ 注解进行标注。每个映射到数据库列的实例变量都可以使用 `@Column` 注解进行标注，以指定底层数据库列的名称。但是，如果未指定 `@Column` 注解，则变量名应与数据库列名完全一致，并使用驼峰命名法来分隔列名中的单词。为了表明某个特定的数据库列及其映射的实例变量不能包含\
  \ `NULL` 值，可以使用 `@NotNull` 注解对该变量进行标注。\n\n在本配方的示例中使用的另一个值得一提的注解是 `@Size`，它用于指定 `String`\
  \ 变量的最大长度。该长度值应与对应数据库列的大小一致。此外，`@Lob` 注解可用于表明底层数据库数据类型是一个大对象。还有其他注解可用于进一步自定义实体类；请参阅本章引言中关于你正在使用的\
  \ Jakarta Persistence API 提供商的链接，以了解更多关于所有可用注解的信息。表 7-1 总结了创建实体类时最常用的注解。这些注解将在本配方的解决方案中介绍。\n\
  \n第 7 章 ■ 对象关系映射\n\n***表 7-1.** 创建实体类的常用注解*\n\n**注解**\n\n**描述**\n\n@Entity\n\n将一个普通\
  \ Java 对象（POJO）类指定为实体，以便它可以与\n\n\n\n持久化服务。对于需要存储在关系数据库中的类，此注解是必需的。\n\n@Table\n\n\
  指定与实体关联的主表名称（可选）\n\n@Id\n\n指定实体的主键的一个或多个持久化字段或属性。没有 `@Id` 字段的 `@Entity` 会导致错误\n\n\
  @Basic\n\n指示一个字段应映射到表列，无需任何额外处理。其 `fetch` 属性默认将字段的获取类型配置为 `EAGER`。当实体被加载时，字段中的数据会被立即获取，即从数据库中检索并存储在内存中。它也可以设置为\
  \ `LAZY` 以实现懒加载。字段中的数据仅在需要时才会从数据库中检索。这有助于通过避免不必要的数据库查询来提高性能\n\n@Column\n\n如果列名不直观、与现有数据模型不兼容，或在数据库中作为列名无效，则使用不同的名称关联持久化属性\n\
  \n正如本方案解决方案中所述，实体类不能单独使用。它是处理底层数据源的完整解决方案的一部分。实体类可以轻松地将 Java 对象映射到数据库表。它们应与 Jakarta\
  \ 企业 Beans 类（第 8 章）和上下文与依赖注入（CDI）结合使用，或与持久化单元（方案 7-3）独立使用，以执行数据库操作。一个利用 Jakarta\
  \ Server Faces 框架的完整 Java EE 解决方案也可以使用托管 Bean 直接与 Jakarta 企业 Beans 或 Jakarta RESTful\
  \ Web 服务客户端交互，而这些客户端再通过实体类执行工作。\n\n■ **注意** 您可能想知道为什么在示例中重写了 `hashCode()` 和 `equals()`\
  \ 方法。\n\n`equals()` 方法存在于每个 Java 对象中，用于确定对象标识。每个实体类都需要包含这些方法的实现，以便区分不同的对象。两个实体对象很可能指向数据库表中的同一行。`equals()`\
  \ 方法可以判断两个实体是否指向同一行。此外，所有彼此相等的 Java 对象应具有相同的 `hashCode`。在实体类中，重写这些方法以确定对象是否代表同一数据库表行非常重要。\n\
  \n7-2\\. 映射数据类型\n\n问题\n\n您希望将数据库表列与实体类字段进行映射，但不确定应在类中为字段声明哪些数据类型。\n\n![](img/index-380_1.png)\n\
  \n第 7 章 ■ 对象关系映射\n\n■ **注意** 瞬态字段或属性不能包含映射注解。瞬态字段或属性不会持久化到数据库。\n\n解决方案\n\n在实体类中为列声明实例变量时，将数据库表列数据类型映射为\
  \ Java 语言规范中的等效数据类型。只要数据库列数据类型与包含指定列值的 Java 数据类型匹配，Jakarta EE 容器就会相应地转换数据库值。为了演示数据类型映射，将为\
  \ Acme Bookstore 的 CONTACT 数据库表编写一个实体类。CONTACT 表的描述如图 7-2 所示。\n\n***图 7-2.** 联系人表模式定义*\n\
  \n相应的实体类名为 Contact，其类清单如下所示，演示了如何将每个数据库列类型匹配到适当的 Java 数据类型：\n\npackage org.jakartaeerecipe.chapter07.recipe07_02;\n\
  \n...\n\n@Entity\n\n@Table(name = \"CONTACT\")\n\npublic class Contact implements\
  \ Serializable {\n\nprivate static final long serialVersionUID = 1L;\n\n@Id\n\n\
  @Basic(optional = false)\n\n@NotNull\n\n第 7 章 ■ 对象关系映射\n\n@Column(name = \"ID\"\
  )\n\nprivate BigDecimal id;\n\n@Size(max = 50)\n\n@Column(name = \"FIRSTNAME\")\n\
  \nprivate String first;\n\n@Size(max = 50)\n\n\n\n@Column(name = \"LASTNAME\")\n\
  private String last;\n\n@Size(max = 150)\n@Column(name = \"EMAIL\")\nprivate String\
  \ email;\n\n@Size(max = 30)\n@Column(name = \"PASSWORD\")\nprivate String password;\n\
  \n@Lob\n@Column(name = \"DESCRIPTION\")\nprivate String description;\n\n@Size(max\
  \ = 150)\n@Column(name = \"OCCUPATION\")\nprivate String occupation;\n\n@Size(max\
  \ = 1)\n@Column(name = \"RECEIVE_NOTIFICATIONS\")\nprivate String receivenotifications;\n\
  \n@Size(max = 1)\n@Column(name = \"GENDER\")\nprivate String gender;\n\npublic Contact()\
  \ { } // 默认构造函数\n\n...\n\n// getter 和 setter 方法\n\n...\n\n@Override\npublic int\
  \ hashCode() {\n...\n}\n\n@Override\npublic boolean equals(Object object) {\n...\n\
  }\n\n@Override\npublic String toString() {\nreturn \"org.jakartaeerecipe.chapter07.entity.Contact[\
  \ id=\" + id + \" ]\";\n}\n\n![](img/index-382_1.png)\n\n第 7 章 ■ 对象关系映射\n\npublic\
  \ static void main(String[] args) {\nEntityManagerFactory emf = Persistence.createEntityManagerFactory(\"\
  JakartaEERecip\nes_LOCAL\");\nEntityManager em = emf.createEntityManager();\nqueryAllContacts(em);\n\
  }\n\nprivate static void queryAllContacts(EntityManager em) {\ntry {\nEntityTransaction\
  \ transaction = em.getTransaction();\ntransaction.begin();\nQuery query = em.createQuery(\"\
  SELECT c FROM Contact c\");\nList<Contact> contactList = (List<Contact>) query.getResultList();\n\
  for (Contact contact : contactList) {\nSystem.out.print(\"Name:\" + contact.getFirst()\
  \ + \" \" + contact.getLast()); System.out.println();\n}\ntransaction.commit();\n\
  }catch (Exception e) {\ne.printStackTrace();\n}\n}\n}\n\n指定正确的映射数据类型非常重要，因为如果操作不当，后续可能会出现错误。数值数据类型尤其容易出现这种情况。\n\
  \n上述程序的输出结果如图 7-3 所示。\n\n***图 7-3.** Recipe07_02 的输出结果*\n\n工作原理\n\n要创建一个用于表示数据库表的\
  \ Java 类，必须将表的每一列映射到一个类实例变量。在此过程中，必须为变量分配一个与数据库列数据类型相对应的数据类型。在某些情况下，多个 Java 数据类型可以映射到单个数据库列的数据类型。但在其他情况下，数据库列的数据类型必须与特定的\
  \ Java 数据类型匹配。表 7-2 列出了不同的 Java 数据类型及其关联的数据库数据类型。如果您在工作中使用 Oracle 以外的其他数据库，请参阅该数据库的文档，以纠正与\
  \ Oracle 所用数据类型之间的任何差异。\n\nMySQL 数据映射文档：[`dev.mysql.com/doc/connector- j/8.0/en/`](https://dev.mysql.com/doc/connector-j/8.0/en/connector-j-reference-type-conversions.html)\n\
  [connector- j- reference- type- conversions.html](https://dev.mysql.com/doc/connector-j/8.0/en/connector-j-reference-type-conversions.html)\n\
  \n第 7 章 ■ 对象关系映射\n\n***表 7-2.** Oracle 数据库与 Java 数据类型映射*\n\n**Oracle 数据类型**\n**Java\
  \ 数据类型**\n\nBINARY_INTEGER, NATURAL, NATURALN, PLS_INTEGER, POSITIVE,\nint\nPOSITIVEN,\
  \ SIGNTYPE, INT, INTEGER\n\nCHAR, CHARACTER, VARCHAR2 LONG, STRING, VARCHAR\njava.lang.String\n\
  \nRAW, LONG RAW\nbyte[]\n\nDEC, DECIMAL, NUMBER\njava.math.BigDecimal\n\nDOUBLE\
  \ PRECISION, FLOAT\ndouble\n\nSMALLINT\nint\n\nREAL\nfloat\n\nDATE\njava.sql.Timestamp\n\
  java.sql.Date\n\nTIMESTAMP (或衍生类型)\njava.sql.Timestamp\n\nBOOLEAN\nboolean\n\nCLOB\n\
  java.sql.Clob\n\nBLOB\njava.sql.Blob\n\nVARRAY\njava.sql.Array\n\nREF CURSOR\njava.sql.ResultSet\n\
  \n正确映射数据类型是创建实体类中非常重要的一步，因为错误的映射可能导致数值精度不准确等问题。在将实体类映射到数据库表时，使用正确的数据类型可能因数据库供应商而异，但表\
  \ 7-2 应该可以轻松地从 Oracle 数据类型转换为您选择的 RDBMS 的数据类型。\n\n7-3. 创建持久化单元\n\n问题\n\n您希望使用实体类来执行数据库事务。因此，您需要配置应用程序的数据库连接。\n\
  \n解决方案\n\n创建一个持久化单元来配置数据库连接，然后使用该持久化单元与给定的实体类执行事务。持久化单元可以使用在应用服务器内配置的数据库连接池，也可以利用本地\
  \ JDBC 配置来获取数据库连接。在本例中，我将演示如何使用本地 JDBC 配置，因为该示例将作为独立应用程序运行，而不是部署到应用服务器上。\n\n第 7\
  \ 章 ■ 对象关系映射\n\n以下持久化单元配置为创建本地 JDBC 连接，而不是使用 Jakarta Persistence API 进行连接。但是，您可以在本配方的“工作原理”部分了解更多关于配置持久化单元以使用在应用服务器内配置的数据库连接池的信息。以下代码来自名为\
  \ `persistence.xml` 的文件，该文件位于本章的 `src/main/resource/META-INF` 目录中：\n\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<persistence\nxsi:schemaLocation=\"https://jakarta.ee/xml/ns/persistence\
  \ https://jakarta.ee/\nxml/ns/persistence/persistence_3_0.xsd\"\nversion=\"3.0\"\
  >\n<persistence-unit name=\"JakartaEERecipesLOCAL\" transaction- type=\"RESOURCE_LOCAL\"\
  >\n<class>org.jakartaeerecipe.entity.BookAuthor</class>\n<properties>\n<property\
  \ name=\"jakarta.persistence.jdbc.user\" value=\"username\"/>\n<property name=\"\
  jakarta.persistence.jdbc.password\" value=\"password\"/>\n<property name=\"jakarta.persistence.jdbc.url\"\
  \ value=\"jdbc:derby://<hostname>:\n<port>/<database>\"/>\n<!-- JDBC 驱动类 -->\n<property\
  \ name=\"jakarta.persistence.jdbc.driver\" value=\"org.apache.derby.jdbc.\nClientDriver\"\
  />\n</properties>\n</persistence-unit>\n</persistence>\n\n工作原理\n\n要与数据库交互，应用程序需要具备连接数据库的能力。通常，数据库连接对应于数据库中的单个用户名/密码。持久化上下文\
  \ XML 文件（在我们的例子中是 `persistence.xml` 文件）中存放着 Java Persistence API 的连接信息。一个持久化上下文可以包含多个数据库连接的配置。每个连接配置被称为一个*持久化单元*，每个单元都有一个唯一的名称，用于在应用程序类中标识该连接。`persistence.xml`\
  \ 文件可以作为 Web 归档 (WAR) 或企业归档 (EAR) 文件的一部分打包，也可以打包到 JAR 文件中，然后与 WAR 或 EAR 一起打包。如果与\
  \ EAR 文件一起打包，它应位于 `META-INF` 目录中。如果使用 WAR 文件，`persistence.xml` 文件应打包在 `resources/META-INF`\
  \ 目录中。最后，如果打包到 JAR 文件中，该 JAR 应位于 WAR 的 `WEB-INF/lib` 目录或 EAR 的库目录中。\n\n如前所述，每个 `persistence.xml`\
  \ 文件可以包含多个数据库配置，即多个持久化单元。每个持久化单元包含将用于连接的 Jakarta Persistence 提供程序类型、事务类型（JTA 或 RESOURCE_LOCAL）、用于持久化的类（实体类）以及数据库连接的具体信息。在本节中，我将分解为配方解决方案配置的持久化单元，并描述每个部分。\n\
  \n\n\n每个持久化单元的核心是 `persistence-unit` 元素，该元素包含 `name` 和 `transaction-type` 属性。每个持久化单元都有一个名称；在示例中，名称为\
  \ `JakartaEERecipesLOCAL`，应用程序代码通过此名称获取对持久化单元的引用。持久化单元的 `transaction-type` 属性指示将创建\
  \ Java 事务 API 实体管理器（用于应用服务器内部）还是 Resource-Local 实体管理器（用于独立应用程序）。\n\n第 7 章 ■ 对象关系映射\n\
  \n接下来，在示例中，您将看到一系列在单独的 `class` 元素中列出的类。在 `persistence-unit` 元素内，可以标识零个或多个类供持久化单元使用。这些类是将映射到底层数据库表的实体类。如果使用\
  \ `RESOURCE_LOCAL` 事务类型，则每个实体类都必须在持久化单元中列出。如果使用 JTA（部署到 WAR 或 EAR 文件中的应用服务器内），则容器负责识别实体类，它们无需在持久化单元中列出。如果实体类未在持久化单元中标识且事务类型为\
  \ `RESOURCE_LOCAL`，则该实体类将无法在应用程序中使用。\n\n■ **注意** 持久化单元还可以包含一个 `<exclude-unlisted-classes>`\
  \ 元素，该元素应设置为布尔值。此元素用于指示在使用 JTA 时，是否必须通过持久化单元内的 `<class>` 元素列出类，默认值为 FALSE。如果应用程序中使用了两个或多个数据源，并且每个数据源应仅使用指定的实体类，则将此元素设置为\
  \ TRUE 可能是有意义的。\n\n`properties` 元素应包含定义数据库连接的子元素。\n\n具体来说，用户名、密码和数据库 URL 在 `properties`\
  \ 元素的子属性中标识。对于 `RESOURCE_LOCAL` 持久化单元，以下几点成立：\n\n• 属性 `jakarta.persistence.jdbc.username`\
  \ 应用于标识连接的数据库用户名。\n• 属性 `jakarta.persistence.jdbc.password` 应用于标识连接的数据库用户密码。\n•\
  \ 属性 `jakarta.persistence.jdbc.url` 应用于标识连接的数据库 URL。\n\nJava 事务 API 连接的属性则不同。实际上，对于\
  \ JTA，可以不指定任何属性。相反，可以使用名为 `jta-data-source` 的元素来指定已在应用服务器内配置的数据库连接的 JNDI 名称。例如，假设数据库连接在应用服务器内配置为\
  \ `jdbc/DBConnection`。此外，假设您要将 WAR 文件部署到 GlassFish 应用服务器，并将使用 JTA 而不是 `RESOURCE_LOCAL`。如果是这种情况，持久化单元可能如下所示：\n\
  \n<persistence-unit name=\"JakartaEERecipesJTA\" transaction-type=\"JTA\">\n   \
  \ <jta-data-source>jdbc/DBConnection</jta-data-source>\n    <properties/>\n</persistence-unit>\n\
  \n■ **注意** JTA 示例中没有列出任何类，因为应用服务器会自动识别供持久化单元使用的实体类。但是，在某些情况下，列出类可能是有用的，如前一条注释所述。\n\
  \n要使用持久化单元，必须首先获取一个 `EntityManagerFactory` 对象。可以通过调用 `Persistence.createEntityManagerFactory`\
  \ 方法并传入要获取连接的持久化单元的字符串名称来获取 `EntityManagerFactory` 对象。一旦获取了 `EntityManagerFactory`\
  \ 对象，就可以创建并使用 `EntityManager` 对象来开始数据库事务。通过持久化单元获取连接的方式类似于以下代码：\n\n...\nEntityManagerFactory\
  \ emf = Persistence.createEntityManagerFactory(\"JakartaEERecipesLOCAL\");\nEntityManager\
  \ em = emf.createEntityManager();\ntry {\n    EntityTransaction entr = em.getTransaction();\n\
  \    entr.begin();\n    Query query = em.createNamedQuery(\"BookAuthor.findAll\"\
  );\n    ...\n\n■ **注意** 前面的示例使用 `createNamedQuery` 方法来替换命名查询，而不是内联编写 Java 持久化查询语言\
  \ (JPQL)。有关更多信息，请参阅配方 7-9。\n\n`persistence.xml` 配置文件包含应用程序用于与数据库交互的数据库连接信息。如果您使用\
  \ Jakarta 持久化 API，您将非常熟悉创建持久化单元，无论是使用本地 JDBC 连接还是应用服务器连接池。\n\n7-4. 使用数据库序列创建主键值\n\
  \n问题\n\n您的数据库包含用于为数据库表记录生成主键值的序列。您的应用程序需要使用这些数据库序列，以便在创建和持久化对象时分配主键值。\n\n解决方案\n\n\
  使用 `@SequenceGenerator` 注解实体类的主键字段，然后将其与实体生成器关联，以便利用数据库序列填充数据库表列值。在以下示例中，`BookAuthor`\
  \ 实体已更新为使用 `BOOK_AUTHOR_S` 数据库序列来创建主键值。因此，`id` 字段已相应地进行注解：\n\npackage org.jakartaeerecipe.chapter07.entity;\n\
  ...\n@Entity\n@Table(name = \"BOOK_AUTHOR\")\n// 命名查询在配方 7-9 中介绍\n@NamedQuery(name\
  \ = \"BookAuthor08.findAll\", query = \"SELECT b FROM BookAuthor08 b\")\n@NamedQuery(name\
  \ = \"BookAuthor08.findById\", query = \"SELECT b FROM BookAuthor08 b WHERE b.id\
  \ = :id\")\n@NamedQuery(name = \"BookAuthor08.findByLast\", query = \"SELECT b FROM\
  \ BookAuthor08 b WHERE b.last = :last\")\n@NamedQuery(name = \"BookAuthor08.findByFirst\"\
  , query = \"SELECT b FROM BookAuthor08 b WHERE b.first = :first\")\npublic class\
  \ BookAuthor implements Serializable {\n    private static final long serialVersionUID\
  \ = 1L;\n    @Id\n    @Basic(optional = false)\n    @SequenceGenerator(name=\"book_author_s_generator\"\
  , sequenceName=\"book_author_s\", initialValue=1, allocationSize=1)\n    @GeneratedValue(strategy=GenerationType.SEQUENCE,\
  \ generator=\"book_author_s_generator\")\n    @NotNull\n    @Column(name = \"ID\"\
  )\n    private BigDecimal id;\n    ...\n\n当一个新的 `BookAuthor` 对象被持久化到数据库时，`BOOK_AUTHOR_S`\
  \ 的下一个序列值将用作新数据库记录的主键值。一旦为本地 JDBC 数据库连接配置了持久化上下文（有关详细信息，请参阅配方 7-3），就可以运行类 `org.jakartaeerecipe.chapter07.recipe07_04.SequenceTest.java`\
  \ 来测试序列生成的主键。以下摘录取自 `SequenceTest` 类，演示了如何向数据库添加新的 `BookAuthor` 对象：\n\n...\nEntityManagerFactory\
  \ emf = Persistence.createEntityManagerFactory(\"JakartaEERecipesLOCAL\");\nEntityManager\
  \ em = emf.createEntityManager();\ntry {\n    EntityTransaction entr = em.getTransaction();\n\
  \    entr.begin();\n    BookAuthor author = new BookAuthor();\n    author.setFirst(\"\
  JOE\");\n    author.setLast(\"TESTER\");\n    author.setBio(\"An author test account.\"\
  );\n    boolean successful = false;\n    try {\n        em.persist(author);\n  \
  \      successful = true;\n    } finally {\n        if (successful){\n         \
  \   entr.commit();\n        } else {\n            entr.rollback();\n        }\n\
  \    }\n    Query query = em.createNamedQuery(\"BookAuthor.findAll\");\n    List\
  \ authorList = query.getResultList();\n    Iterator authorIterator = authorList.iterator();\n\
  \    while (authorIterator.hasNext()) {\n        author = (BookAuthor) authorIterator.next();\n\
  \        ![](img/index-388_1.png)\n        第 7 章 ■ 对象关系映射\n\n\n\nSystem.out.print(\"\
  Name:\" + author.getFirstname() + \" \" + author.getLastname()); System.out.println();\n\
  \n}\n\n} catch (Exception ex){\n\nex.printStackTrace();;\n\n} finally {\n\nem.close();\n\
  \n}\n\n...\n\n■ **注意** 本示例演示了数据库事务的使用。事务允许一次性执行整个流程序列。如果其中一个流程发生故障，则事务中的所有流程都将失败，并且对数据库的更改将被回滚。否则，如果事务中的所有流程都成功完成，则它们将被提交到数据库。在多个数据库事件相互依赖的情况下，事务非常有用。\n\
  \n执行上述代码将生成如图 7-4 所示的输出。\n\n***图 7-4.** Recipe07_04 的输出*\n\n工作原理\n\n在许多情况下，通过数据库序列为数据库表记录生成主键值是合理的。利用\
  \ Jakarta Persistence API，可以通过在实体类中结合使用 `@SequenceGenerator` 和 `@GeneratedValue`\
  \ 注解来实现这一点。每个映射到实体类的数据库表都必须有一个主键值，而使用数据库序列来获取这些值出于多种原因都是合理的。例如，在某些情况下，应用程序管理员需要知道下一个、当前或最后一个用于主键值的数字是什么。通过使用数据库序列，只需一次查询即可收集有关下一个、当前或最后一个数字的信息。\n\
  \n`@SequenceGenerator` 注解应直接放置在实体类中主键字段或属性声明之前，或者可以放置在实体类声明之前。请注意，其他注解可以放置在 `@SequenceGenerator`\
  \ 注解和实际变量声明之间。`@SequenceGenerator` 注解接受有关用于主键生成的数据库序列的值。更具体地说，该注解接受以下属性：\n\n• name（必需）：生成器的名称（此名称可以是任意值）\n\
  • sequenceName（可选）：用于获取主键值的数据库序列的名称\n• initialValue（可选）：序列对象的初始值\n• allocationSize（可选）：从序列分配数字时的增量大小\n\
  \n第 7 章 ■ 对象关系映射\n\n`@GeneratedValue` 注解用于指定实体的主键生成策略。与 `@SequenceGenerator` 属性一样，它可以放置在实体类中主键字段或属性声明之前，或者可以放置在实体类声明之前。它用于指定生成实体类主键的方式。三个选项如下：\n\
  \n• 实体类将在插入新记录之前自行生成主键值。\n• 实体类将使用数据库序列进行键生成。\n• 实体类将通过其他方式生成键。\n\n可以为 `@GeneratedValue`\
  \ 注解指定的属性如下：\n\n• generator（可选）：这是由 `@SequenceGenerator` 注解指定的要使用的主键生成器的名称。除非使用\
  \ `@TableGenerator`，否则此名称必须与为 `@SequenceGenerator` 注解提供的 name 属性匹配。默认值为持久化提供程序提供的\
  \ ID 生成器。\n• strategy（可选）：这是持久化提供程序将用于为带注解的字段或实体类生成主键的主键生成策略。如果未提供，则默认为 AUTO。\n\n\
  `@GeneratedValue` 的 strategy 属性可以接受四种不同的 `jakarta.persistence.GenerationType` 枚举值：\n\
  \n• AUTO：指示持久化提供程序应为特定数据库选择合适的策略\n\n\n\n• IDENTITY：表示持久化提供程序必须使用数据库标识列（identity\
  \ column）为实体分配主键。\n\n• SEQUENCE：表示持久化提供程序必须使用数据库序列列（sequence column）为实体分配主键。\n\n\
  • TABLE：表示持久化提供程序必须使用底层数据库表为实体分配主键，以确保提供唯一值。\n\n在本示例中，为 `@SequenceGenerator` 注解的\
  \ `sequenceName` 属性指定了 `BOOK_AUTHOR_S` 数据库序列，生成器的名称为 `book_author_s_generator`。请注意，`@GeneratedValue`\
  \ 的 `name` 属性必须与 `@SequenceGenerator` 注解中的名称匹配；这一点非常重要！一旦指定，当新对象被持久化时，实体类将自动从数据库序列中获取下一个值。\n\
  \n■ **注意** 还有其他生成键值的选项，例如 `AUTO`、`IDENTITY` 和 `TABLE`。这些策略在不同情况下可能有效。有关使用其他选项的更多信息，请参阅\
  \ Jakarta EE 在线文档：[`javaee.github.io/`](https://javaee.github.io/)。\n\n第 7 章 ■ 对象关系映射\n\
  \n7-5\\. 使用多个属性生成主键\n\n问题\n\n某个特定的数据库表不包含主键。由于 Java 持久化 API 要求使用主键将实体类映射到数据库表，因此需要将两个或多个表列的值合并起来，为每条记录创建一个主键。\n\
  \n解决方案 #1\n\n通过开发一个嵌入式复合主键类，并使用 `jakarta.persistence.EmbeddedId` 和 `jakarta.persistence.Id`\
  \ 类注解在实体中标记复合键字段，来创建复合主键。考虑用于 Acme Bookstore 应用程序的 `AUTHOR_WORK` 数据库表。假设 `AUTHOR_WORK`\
  \ 数据库表不包含主键列。\n\n可以根据其 `BOOK_ID` 和 `AUTHOR_ID` 列为每条记录生成一个主键。以下实体类是 `AuthorWork`\
  \ 实体。它没有使用 `ID` 列作为主键，而是将 `bookId` 和 `authorId` 列一起使用，以构成一个复合主键：\n\n```java\npackage\
  \ org.jakartaeerecipe.chapter07.entity;\n\nimport java.io.Serializable;\nimport\
  \ java.math.BigInteger;\nimport jakarta.persistence.*;\nimport jakarta.validation.constraints.NotNull;\n\
  import org.jakartaeerecipe.chapter07.entity.key.AuthorWorkPKEmbedded;\n\n@Entity\n\
  @Table(name = \"AUTHOR_WORK\")\n@NamedQuery(name = \"AuthorWork.findAll\", query\
  \ = \"SELECT a FROM AuthorWork a\")\npublic class AuthorWorkEmbedded implements\
  \ Serializable {\n\n    private static final long serialVersionUID = 1L;\n\n   \
  \ // 如果表包含多个列来组成主键，可以使用嵌入式 ID 代替标准 ID。\n    // 要使用非可嵌入主键，请注释掉此字段及其 getter 和 setter\
  \ 方法。\n    @EmbeddedId\n    private AuthorWorkPKEmbedded embeddedId;\n\n    public\
  \ AuthorWorkEmbedded(BigInteger bookId, BigInteger authorId) {\n        this.embeddedId\
  \ = new AuthorWorkPKEmbedded(bookId, authorId);\n    }\n\n    /**\n     * @return\
  \ the embeddedId\n     */\n    public AuthorWorkPKEmbedded getEmbeddedId() {\n \
  \       return embeddedId;\n    }\n\n    /**\n     * @param embeddedId the embeddedId\
  \ to set\n     */\n    public void setEmbeddedId(AuthorWorkPKEmbedded embeddedId)\
  \ {\n        this.embeddedId = embeddedId;\n    }\n}\n```\n\n要使用嵌入式主键，必须创建一个类，其中包含将主键\
  \ ID 映射到组成它的列的逻辑。在本例中，`AuthorWorkPKEmbedded` 类用于此目的，如下所示：\n\n```java\npackage org.jakartaeerecipe.chapter07.entity.key;\n\
  \nimport java.io.Serializable;\nimport java.math.BigInteger;\nimport jakarta.persistence.Embeddable;\n\
  \n/**\n * AuthorWork 的可嵌入主键类\n */\n@Embeddable\npublic class AuthorWorkPKEmbedded\
  \ implements Serializable {\n\n    private static final long serialVersionUID =\
  \ 1L;\n\n    @Column(name = \"AUTHOR_ID\")\n```\n\n\nprivate BigInteger authorId;\n\
  \n@Column(name = \"BOOK_ID\")\n\nprivate BigInteger bookId;\n\npublic AuthorWorkPKEmbedded()\
