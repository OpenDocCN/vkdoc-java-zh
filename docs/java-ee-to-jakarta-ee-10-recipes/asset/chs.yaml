  \ncharset\n\n\n\n超链接所指向资源的字符编码\n\n本示例中的 commandButton 和 commandLink 组件仅指定了最少的属性。也就是说，它们都指定了\
  \ id、action 和 value 属性。id 属性用于唯一标识每个组件。action 属性设置为 Jakarta Server Faces EL，将组件绑定到其托管\
  \ bean 的操作方法。commandButton 组件的 action 属性为 `#{contactController.subscribe}`，这意味着当页面上的按钮被点击时，将调用\
  \ ContactController 类的 subscribe 方法。commandLink 的 action 属性为 `#{contactController.manage}`，这意味着当链接被点击时，将调用\
  \ ContactController 类的 manage 方法。每个组件还指定了一个 value 属性，该属性设置为渲染时按钮或链接上显示的文本。\n\n如您所见，示例中仅使用了可用属性中的一小部分。然而，这些组件可以通过使用其他可用属性进行自定义。例如，可以指定一个\
  \ actionListener 方法，该方法会将托管 bean 方法绑定到组件，当组件被激活时，该方法将被调用。可以为以 on 开头的每个属性指定 JavaScript\
  \ 函数，从而提供实现客户端功能的能力。\n\n命令组件极大地改变了 Jakarta EE Web 应用程序开发的格局。它们允许从用户页面内部直接访问 Java\
  \ 方法，并为处理请求参数提供了一种简便的方法。\n\n4-4. 显示输出\n\n问题\n\n您希望在应用程序页面中显示来自托管 bean 属性的文本。\n\n\
  第 4 章 ■ 高级 Jakarta Server Faces\n\n解决方案\n\n将 Jakarta Server Faces 输出组件集成到您的视图中。输出组件用于在页面上显示静态或动态文本，以及表达式语言算术的结果。\n\
  \n标准 Jakarta Server Faces 组件库包含五个用于渲染输出的组件：outputLabel、outputText、outputFormat、outputLink\
  \ 和 link。Acme Bookstore 在书店通讯应用程序外观中使用了所有这些组件。\n\n视图：recipe04_03.xhtml\n\n在以下示例中，通讯订阅视图已被重写，以使用一些输出组件：\n\
