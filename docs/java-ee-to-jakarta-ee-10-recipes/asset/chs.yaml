  \n17-4\\. 使用键值数据库\n\n问题\n\n你希望将值放入键值数据库，并在稍后检索它们。例如，你希望将 Hazelcast 与 Jakarta NoSQL\
  \ API 结合使用。\n\n解决方案\n\n配置你的应用程序以使用键值 NoSQL 数据库。配置完成后，利用 `KeyValueConfiguration`\
  \ 生成一个 `BucketManagerFactory`。然后可以使用 `BucketManagerFactory` 来处理键/值对。\n\n为了支持 Hazelcast\
  \ 与 Jakarta NoSQL，需要在你的项目中添加以下依赖项，以及标准的 `artemis-core` 依赖项：\n\n```xml\n<dependency>\n\
  \    <groupId>org.eclipse.jnosql.communication</groupId>\n    <artifactId>hazelcast-driver</artifactId>\n\
  \    <version>1.0.0-b3</version>\n</dependency>\n```\n\n■ **注意** Hazelcast 是一个基于\
  \ Java 的开源内存数据网格。\n\n第 17 章 ■ Jakarta NoSQL\n\n添加依赖项后，就可以进行配置了。以下示例源代码演示了键值数据库的配置：\n\
  \n```java\nimport org.eclipse.jnosql.communication.hazelcast.keyvalue.HazelcastKeyValueConfiguration;\n\
  import jakarta.nosql.keyvalue.BucketManager;\nimport jakarta.nosql.keyvalue.BucketManagerFactory;\n\
  import jakarta.nosql.keyvalue.KeyValueConfiguration;\nimport jakarta.nosql.keyvalue.KeyValueEntity;\n\
  \n// ...\n\nKeyValueConfiguration configuration = new HazelcastKeyValueConfiguration();\n\
  BucketManagerFactory managerFactory = configuration.get();\nBucketManager bucketManager\
  \ = managerFactory.getBucketManager(\"Pools\");\n```\n\n可以使用一个普通的 Java 对象（POJO）来包含数据，并使用\
  \ `BucketManager` 来执行事务。在以下示例中，一个 Pool 对象已被填充，并使用 `BucketManager` 将该对象插入数据库：\n\n\
  ```java\nKeyValueEntity entity = KeyValueEntity.of(pool.getLength(), pool.Id);\n\
  bucketManager.put(entity);\n```\n\n工作原理\n\n回顾配方 17-2，键值导向数据库的配置与文档导向数据库非常相似。通常，在\
  \ Jakarta EE 应用程序中，会创建一个 `@ApplicationScoped` bean，在其中放置类型为 `KeyValueConfiguration`\
  \ 的配置。该 bean 也包含一个管理器，就像文档导向数据库一样。然而，这个管理器是一个 `BucketManager`，它将作为对数据库执行事务的基础。在\
  \ Java SE 环境中，可以从 `SeContainer` 实例获取 `BucketManager`。在企业环境中，可以通过 CDI 注入 `BucketManager`。\n\
  \n为了对键值 NoSQL 数据库执行事务，请利用调用 `BucketManager` 时可用的各种方法。表 17-5 列出了 `BucketManager`\
  \ 接口的一些方法。\n\n***表 17-5. BucketManager 方法***\n\n**方法**\n\n**描述**\n\n`close()`\n\n\
  关闭资源\n\n`delete(Iterable keys)`\n\n根据键移除实体\n\n`delete(K key)`\n\n根据键移除实体\n\n`get(Iterable\
  \ keys)`\n\n根据键查找值列表\n\n`get(K key)`\n\n根据键查找值\n\n`prepare(String query)`\n\n执行查询并返回结果\n\
  \n`put(Iterable entities)`\n\n保存可迭代的键集合\n\n`put(KeyValueEntity entity)`\n\n保存 KeyValueEntity\n\
  \n`put(K key, V value)`\n\n将指定值与键关联\n\n使用键值 NoSQL 数据库可以证明能够使代码易于维护，并提供性能良好的应用程序。Jakarta\
  \ NoSQL API 是处理键值数据库的强大工具。\n\n**第 18 章**\n\n**Jakarta EE 应用服务器**\n\nGlassFish 应用服务器是\
  \ Jakarta EE 的行业标准。GlassFish 7 是 Jakarta EE 的参考实现，因此它包含了比 Jakarta EE 10 发布时任何其他符合\
  \ Jakarta EE 规范的应用服务器都更新的特性。它是一个功能齐全且易于管理的应用服务器，是部署现代、健壮的 Jakarta EE 应用程序的强大选择。\n\
  \n尽管有许多优秀的应用服务器可供选择，其中许多符合或正在努力符合 Jakarta EE 10 规范，但对于那些希望在 Jakarta EE 领域使用最新实现的人来说，GlassFish\
  \ 仍将是最佳选择，因为它是撰写本文时该平台的参考实现。使用 GlassFish 的缺点是，目前该服务器不提供生产支持，因为它是开源的，而不是许可的供应商产品。\n\
  \n除了 GlassFish，还有许多优秀的符合 Jakarta EE 规范的应用服务器确实提供供应商支持。其中许多选项提供商业许可的实现，以及开源或“免费使用”的版本。这类服务器包括\
  \ Payara Server、Apache TomEE、WildFly 和 Open Liberty。其中一些选项提供付费支持，并且所有这些选项都完全符合 Jakarta\
  \ EE 10 规范。许多其他服务器也正在计划尽快实现合规性。\n\n交付 Jakarta EE 应用程序和服务的另一个领域是微服务和云空间。此空间中的此类应用程序和服务不会部署到传统的应用服务器容器中，而是部署到微容器和云平台。本章重点介绍如何使用参考实现\
  \ GlassFish 7。它还涵盖了使用 Jakarta EE 开发微服务以及使用 Docker 等容器解决方案的基础知识。\n\n18-1\\. 安装 GlassFish\
  \ 并启动\n\n问题\n\n你希望在你的机器上安装用于 Jakarta EE 10 开发的 Eclipse GlassFish 应用服务器。安装完成后，你希望启动服务器以便开始使用它。\n\
  \n解决方案\n\n从网站 [`glassfish.org/download`](https://glassfish.org/download) 下载 GlassFish\
  \ 7 ZIP 存档，并将存档内容解压到你的操作系统上。如果你正在寻找 GlassFish 的最新开发版本，请访问项目页面的下载部分。对于本配方示例，假设你将\
  \ GlassFish 7 服务器安装到 *nix 系统或 OS X 上的 `/JAVA_DEV/GlassFish` 目录，或 Windows 上的 `C:\\\
  JAVA_DEV\\GlassFish` 目录。\n\n下载并解压存档后，你就可以开始安装过程了。\n\n\n\n解压后的归档文件将位于名为 glassfish\
  \ 的根目录中。将 glassfish 目录及其所有内容复制到 /JAVA_DEV/GlassFish 目录中。安装目录的文件夹结构如图 18-1 所示。\n\n\
  © Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang 著，*Java EE 到 Jakarta\
  \ EE 10 实战*[, https://doi.org/10.1007/978-1-4842-8079-9_18](https://doi.org/10.1007/978-1-4842-8079-9_18#DOI)\n\
  \n![](img/index-660_1.png)\n\n第 18 章 ■ Jakarta EE 应用服务器\n\n***图 18-1.** GlassFish\
  \ 安装目录文件夹结构*\n\n现在，您可以启动服务器和/或开始配置您的 GlassFish 应用服务器了。\n\n工作原理\n\n安装 GlassFish 应用服务器只需下载\
  \ ZIP 归档文件并将其解压到您选择的目录中即可。完成后，您就可以开始配置服务器环境了。配置环境的第一步应该是更改默认管理员密码，这在配方 18-2 中有所概述。但是，如果您急于测试环境，可以进入\
  \ <<glassfish>>/bin 目录并使用以下命令启动服务器：\n\n*nix 和 OS X：\n\n./asadmin start-domain domain1\n\
  \nWindows：\n\nasadmin start-domain domain1\n\n■ **注意** 首次使用此命令启动应用服务器时，它将不包含管理密码。除非您在有防火墙配置的操作系统上，否则不建议在未设置管理员密码的情况下启动应用服务器，因为这样做可能会使您的系统易受攻击。有关设置或更改管理员用户密码的更多信息，请参见配方\
  \ 18-2。\n\n![](img/index-661_1.png)\n\n第 18 章 ■ Jakarta EE 应用服务器\n\n18-2. 更改管理员用户密码\n\
  \n问题\n\n您希望通过更改管理员用户密码来为新安装的 GlassFish 环境增加安全性。\n\n解决方案\n\n在您的终端或命令提示符中进入服务器的 /bin\
  \ 目录，然后输入以下内容：\n\n./asadmin change-admin-password\n\n发出命令后，按照提示相应地更改管理员密码，如图 18-2\
  \ 所示。\n\n***图 18-2.** change-admin-password 命令*\n\n18-3. 部署 WAR 文件\n\n问题\n\n您希望将\
  \ WAR 归档文件部署到应用服务器，以便您的 Web 应用程序可供使用。\n\n解决方案\n\n如果您尚未登录应用服务器主机，请先登录，然后利用 GlassFish\
  \ 应用服务器的自动部署选项。浏览文件系统以找到您要部署的 WAR 文件。\n\n复制所需的 WAR 文件。找到自动部署目录（路径）并将 WAR 文件粘贴到其中。假设应用程序归档文件没有配置问题，应用服务器将完成部署。\n\
  \n第 18 章 ■ Jakarta EE 应用服务器\n\n工作原理\n\n要使 Web 应用程序可供 Web 上的用户访问，必须将其部署到应用服务器。\n\n\
  GlassFish 有几种非常简单的技术可用于部署应用程序。Java Web 应用程序在部署前可以通过几种不同的方式进行打包。为了进一步理解部署过程，了解 Java\
  \ 企业应用程序的各种可能的部署场景会有所帮助。\n\n在 Jakarta EE 早期，最常见的包结构是企业归档（EAR）文件。EAR 文件是一个归档文件，包含一个或多个模块（通常采用\
  \ Java 归档（JAR）文件格式）以及 XML 部署描述符。标准的 EAR 结构包含两个 JAR 文件以及 XML 部署描述符。其中一个 JAR 文件包含\
  \ Web 资源，包括 HTML、JSP、JSF、JavaScript、WEB-INF 目录以及用于显示 Web 内容的其他文件。这个 JAR 文件被称为 *Web\
  \ 模块*，它对应于 Jakarta Servlet 规范中定义的 Web 应用程序。\n\n第二个 JAR 文件包含打包后用于应用程序业务逻辑的 Java 资源。这两个包可以组合成一个\
  \ EAR 文件并部署到 Jakarta EE 应用服务器，在这种情况下，应用服务器负责使用 XML 部署描述符将不同的模块放置到应用服务器内的适当位置。EAR\
  \ 文件至今仍在使用，大多数使用 Java EE 5 及更早版本编写的应用程序都使用 EAR 文件格式部署。直到最近，EAR 文件仍然是分发和部署 Java EE\
  \ 应用程序最常见的方式。\n\n目前，用于 Jakarta EE Web 应用程序部署的最常见的归档类型是 Web 归档（WAR）文件。WAR 文件是包含所有\
  \ Web 标记和 Java 资源在同一归档模块下的归档文件。通常，那些不包含企业应用程序结构（如 EJB、Web 服务等）的 Java Web 应用程序可以使用\
  \ WAR 文件格式部署。自 Java EE 6 以来，所有企业应用程序也可以使用 WAR 文件格式部署，这使得打包和部署应用程序更加容易。尽管如果您使用 Java\
  \ IDE，这项工作会为您完成，但部署 WAR 文件比部署 EAR 文件快得多，并且在同一个模块中处理应用程序的所有源文件比使用多个模块要容易得多。\n\nEAR\
  \ 和 WAR 文件格式都只是包含 .ear 或 .war 扩展名的 ZIP 文件。事实上，您可以通过将它们重命名为 .zip 扩展名并解压到您的文件系统来轻松查看这些归档文件的内容。GlassFish\
  \ 应用服务器使得部署每种文件类型变得容易，无论是使用管理控制台还是自动部署技术。当应用服务器部署归档文件时，它会将归档文件的内容解包到部署目录中，该目录位于\
  \ <GlassFish-Home>/glassfish/domains/domain1/applications 目录中。\n\n■ **注意** 在应用程序部署后，可以通过更新部署目录中的文件来编辑\
  \ Web 文件。任何不需要编译的 XHTML、HTML、JS 或其他代码文件，以及即时编译的 JSP，都可以在应用程序运行期间就地更新。这在生产环境中进行小的布局或\
  \ JavaScript 更改时有时会很有用。但是，请记住，如果取消部署应用程序或用另一个应用程序替换现有应用程序，则部署目录中的所有源文件都将被删除。\n\n\
  18-4. 添加数据库资源\n\n问题\n\n您的应用程序使用了底层关系数据库管理系统（RDBMS），并且您希望为此配置一个数据库资源。\n\n![](img/index-663_1.png)\n\
  \n第 18 章 ■ Jakarta EE 应用服务器\n\n解决方案\n\n为您要连接的数据库创建一个连接池资源。创建连接池后，定义一个新的 JDBC 资源，该资源将用于为应用程序提供连接数据库的方法。要执行这些任务，首先登录到\
  \ GlassFish 管理控制台（http://localhost:4848/），然后在左侧树形菜单中展开“资源”选项下的“JDBC”菜单，如图 18-3 所示。\n\
  \n***图 18-3.** GlassFish 管理控制台：JDBC 资源*\n\n\n\n接下来，点击 **JDBC 连接池** 菜单选项，这将在屏幕右侧打开\
  \ JDBC 连接池面板。在这里，您将看到当前连接池的列表，以及用于添加新池或删除现有池的按钮。点击 **新建** 按钮以开始创建新的连接池。\n\n![](img/index-664_1.png)\n\
  \n第 18 章 ■ Jakarta EE 应用服务器\n\n这将打开 **新建 JDBC 连接池（第 1 步，共 2 步）** 面板，如图 18-4 所示。在此面板中，指定您要创建的池的名称，然后从选择列表中选择资源类型和数据库供应商。\n\
  \n***图 18-4.** 新建 JDBC 连接池（第 1 步，共 2 步）面板*\n\n点击 **下一步** 按钮继续后，将显示创建新 JDBC 连接池的第二个屏幕（见图\
  \ 18-5），其中包含许多用于配置连接池的设置。例如，可以选择数据源类名、调整池设置以及微调事务管理选项。我建议保留所有默认配置，除非确定需要调整某些设置以实现应用程序功能。您随时可以重新访问连接池设置，并在需要时进行调整。\n\
  \n![](img/index-665_1.png)\n\n![](img/index-665_2.jpg)\n\n第 18 章 ■ Jakarta EE 应用服务器\n\
  \n***图 18-5.** 新建 JDBC 连接池（第 2 步，共 2 步）面板*\n\n在表单底部，您会找到 **附加属性** 表（见图 18-6），您需要在此处输入与要配置的数据库连接相关的具体信息。虽然表中默认列出了许多属性，但您只需为用户、密码和\
  \ URL 输入值即可获得连接。输入这些详细信息后，您就可以点击 **完成** 按钮来创建池。\n\n***图 18-6.** 附加 JDBC 连接属性*\n\n\
  ![](img/index-666_1.jpg)\n\n第 18 章 ■ Jakarta EE 应用服务器\n\n■ **注意** 您必须将要使用的数据库的数据库驱动程序（JAR\
  \ 文件）安装在应用服务器内。为此，只需将 JAR 文件复制到 `<GlassFish-Home>/glassfish7/domains/domain1/lib`\
  \ 目录中。例如，要启用 Oracle 数据库驱动程序，请下载名为 `ojdbc7.jar` 的 JDBC 驱动程序文件并使用它。\n\n创建池后，您可以生成一个\
  \ JDBC 资源以供应用程序内部使用。JDBC 资源本质上是一个引用您的数据库连接池的字符串标识符，它从 Web 应用程序的 `persistence.xml`\
  \ 单元中使用，以利用应用服务器连接池。要创建 JDBC 资源，请从树形菜单中点击 **JDBC 资源** 菜单选项，这将打开 **JDBC 资源** 窗格（见图\
  \ 18-7），列出所有现有资源。\n\n点击 **新建** 以配置新资源。\n\n***图 18-7.** JDBC 资源窗格*\n\n### 工作原理\n\n\
  几乎每个企业应用程序都使用底层数据库来存储和检索数据。要连接到数据库，您需要配置一个用于连接的数据库帐户，并编写负责打开和关闭连接的连接实用程序。嗯，这是一种方法；另一种方法是依赖应用服务器来管理数据库连接。利用应用服务器的数据库连接池非常有用，因为它减轻了在应用程序业务逻辑中处理连接的负担，并且通过维护池中一定数量的开放连接，有助于提高应用程序的整体性能。当某个进程需要与数据库交互时，它会获取一个开放的连接对象，使用它，然后在完成后将其放回池中。通过维护此池，减轻了为每个任务打开和关闭连接的开销，从而帮助您的应用程序运行得更快。让应用服务器管理连接的另一个好处是，用于获取连接的用户名和密码仅存储在一个地方，即应用服务器。用户名和密码无需硬编码到使用应用服务器\
  \ JDBC 资源的应用程序中。这不仅从安全角度来看很有帮助，从维护角度来看也是如此。\n\n当密码过期时，在一个位置更改密码，难道不比在每一个使用它的应用程序中费力地修改要容易得多吗？\n\
  \n在 GlassFish 应用服务器中配置数据源非常简单，因为您可以从管理控制台管理所有内容。但是，可以更改一些配置来改变连接池管理连接的方式。在连接池配置的第一个\
  \ **新建 JDBC 连接池** 面板中，您需要确定要创建的资源类型。表 18-1 描述了不同的资源类型。\n\n第 18 章 ■ Jakarta EE 应用服务器\n\
  \n***表 18-1.** JDBC 连接池资源类型*\n\n| **资源类型** | **描述** |\n| :--- | :--- |\n| `javax.sql.DataSource`\
  \ | 适用于本地事务 |\n| `javax.sql.XADataSource` | 适用于全局事务 |\n| `javax.sql.ConnectionPoolDataSource`\
  \ | 适用于本地事务，可能提升性能 |\n| `java.sql.Driver` | 标准驱动程序 |\n\n第二个 **新建 JDBC 连接池** 面板的\
  \ **池设置** 部分允许您配置可供应用程序使用的连接数量。默认情况下，应用服务器启动时的开放连接数为 8。这意味着应用程序可以从池中获取并使用 8 个连接，而不会产生任何额外开销，因为池已经打开了这些连接。\n\
  \n**最大池大小** 选项默认设置为 32。当应用程序需要使用连接时，它会前往池并请求一个连接。如果池中有可用的连接，则将其提供给应用程序。但是，如果没有可用连接，则会创建一个新连接。**最大池大小**\
  \ 值是可能创建的连接数的上限。因此，默认情况下，如果已有 32 个连接处于打开状态，而应用程序请求一个新连接，则会抛出数据库连接错误。请记住，当应用程序使用完连接后，它会将连接返回到池中，因此，如果应用程序正常工作并在使用完毕后释放连接，那么在大多数环境中，达到最大连接数应该是相当困难的。\n\
  \n\n\n您的连接池还可以管理许多其他配置，例如确定连接何时超时以及何时调整池大小。在应用程序使用连接池一段时间后，请根据需要相应调整。池的事务配置允许设置隔离级别。Oracle\
  \ 建议尽可能保持隔离级别不变。如果无法做到，请考虑将“隔离级别保证”设置为 false，并确保应用程序不会更改连接的隔离级别。不同的隔离级别如下所列，从上到下性能依次递减：\n\
  \n• READ_UNCOMMITTED（未提交读）\n\n• READ_COMMITTED（已提交读）\n\n• REPEATABLE_READ（可重复读）\n\
  \n• SERIALIZABLE（可串行化）\n\n18-5. 添加基于表单的身份验证\n\n问题\n\n您希望通过利用数据库表来存储用户名和密码，以及用于不同访问权限的用户组，从而为应用程序配置身份验证。\n\
  \n第 18 章 ■ Jakarta EE 应用服务器\n\n解决方案\n\n在 GlassFish 应用服务器中设置基于表单的身份验证，方法是创建必要的数据库表来包含用户帐户和组，然后配置应用服务器以使用这些表进行身份验证。设置基于表单的身份验证的第一步是创建支持身份验证所需的数据库构件。为此，需要创建两个数据库表。其中一个表将包含用户名和密码，第二个表将包含组以及有权访问这些组的用户。\n\
  \n以下 SQL 语句可用于生成这些表（Oracle 语法），以及用于填充表主键值的数据库序列：\n\ncreate table users(\n\nid number,\n\
  \nusername varchar(150) not null,\n\npassword varchar(50) not null,\n\nprimary key\
  \ (id));\n\ncreate table groups(\n\nid number,\n\nusername varchar2(150) not null,\n\
  \ngroupname varchar2(100) not null,\n\nprimary key(id));\n\ncreate sequence users_s\n\
  \nstart with 1\n\nincrement by 1;\n\ncreate sequence groups_s\n\nstart with 1\n\n\
  increment by 1;\n\n出于测试目的，让我们创建几个用户帐户以及几个不同的访问组。以下 SQL 语句将插入这些记录：\n\ninsert into\
  \ users values(\n\nusers_s.nextval,\n\n'admin',\n\ndbms_obfuscation_toolkit.md5(input=>utl_raw.cast_to_raw('jakartaeerecipes')));\n\
  \ninsert into users values(\n\nusers_s.nextval,\n\n'juneau',\n\ndbms_obfuscation_toolkit.md5(input=>utl_raw.cast_to_raw('testpass')));\n\
  \ninsert into groups values(\n\ngroups_s.nextval,\n\n'admin', 'administrator');\n\
  \ninsert into groups values(\n\ngroups_s.nextval,\n\n'juneau','reader');\n\n现在数据库已为身份验证设置完毕，接下来需要配置数据库以使用这些表进行身份验证。为此，请登录\
  \ GlassFish 管理控制台，导航至“配置”➤“服务器配置”➤“领域”菜单选项，然后单击“新建”按钮。这将打开“新建领域”面板，如图 18-8 所示。\n\
  \n![](img/index-669_1.png)\n\n第 18 章 ■ Jakarta EE 应用服务器\n\n***图 18-8.** 为 GlassFish\
  \ 创建新的安全领域*\n\n在“新建领域”表单中，输入领域名称，在本示例中将其命名为 JDBCAuth。\n\n接下来，对于类名，从下拉菜单中选择 com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm。完成表单的第一部分后，需要填写该类特有的属性。对于本示例，请使用表\
  \ 18-2 中显示的值来完成此表单。\n\n***表 18-2.** JDBC 安全领域类的特有属性*\n\n**属性**\n\n**值**\n\nJAAS\n\
  \njdbcAuth\n\nJNDI\n\njdbc/OracleConnection\n\n用户表\n\nusers\n\n用户名列\n\nusername\n\
  \n密码列\n\npassword\n\n组表\n\ngroups\n\n组名列\n\ngroupname\n\n密码加密算法\n\nMD5（SQL 插入语句中使用的算法）\n\
  \n\n\n完成后，点击 **OK** 保存值并创建域。新创建的域现在应出现在域列表中，如图 18-9 所示。\n\n![](img/index-670_1.png)\n\
  \n第 18 章 ■ Jakarta EE 应用服务器\n\n***图 18-9.** GlassFish 管理控制台中的域列表*\n\n应用服务器配置到此结束。现在如何使用新的安全域？一种方法是利用成熟的技术，创建一个登录视图，并对应用程序的\
  \ `web.xml` 文件进行一些配置更改，以在应用程序内实现身份验证。一种更现代的技术是利用 Jakarta Security API，该 API 在 Java\
  \ EE 8 中被引入到平台中。本方案涵盖了较旧的技术，并重点介绍了它与较新的 Jakarta Security API 之间的一些差异。要查看一个从头到尾的更现代示例，请参考第\
  \ 15 章。首先，让我们看看需要对 `web.xml` 进行哪些更改来配置表单身份验证。以下摘录自 JakartaEE10Recipes 源码中的 `web.xml`\
  \ 配置文件，展示了需要进行的更新：\n\n<security-constraint>\n\n<display-name>Admin</display-name>\n\
  \n<web-resource-collection>\n\n<web-resource-name>Admin Tools</web-resource-name>\n\
  \n<description/>\n\n<url-pattern>/faces/admin/*</url-pattern>\n\n<http-method>GET</http-method>\n\
  \n<http-method>POST</http-method>\n\n<http-method>HEAD</http-method>\n\n<http-method>PUT</http-method>\n\
  \n<http-method>OPTIONS</http-method>\n\n<http-method>TRACE</http-method>\n\n<http-method>DELETE</http-method>\n\
  \n</web-resource-collection>\n\n<auth-constraint>\n\n<description/>\n\n<role-name>admin</role-name>\n\
  \n</auth-constraint>\n\n</security-constraint>\n\n<security-constraint>\n\n<display-name>User</display-name>\n\
  \n<web-resource-collection>\n\n<web-resource-name>Protected Users Area</web-resource-name>\n\
  \n<description/>\n\n<url-pattern>/faces/users/*</url-pattern>\n\n<http-method>GET</http-method>\n\
  \n第 18 章 ■ Jakarta EE 应用服务器\n\n<http-method>POST</http-method>\n\n<http-method>HEAD</http-method>\n\
  \n<http-method>PUT</http-method>\n\n<http-method>OPTIONS</http-method>\n\n<http-method>TRACE</http-method>\n\
  \n<http-method>DELETE</http-method>\n\n</web-resource-collection>\n\n<auth-constraint>\n\
  \n<description/>\n\n<role-name>user</role-name>\n\n</auth-constraint>\n\n</security-constraint>\n\
  \n<login-config>\n\n<realm-name>JDBCRealm</realm-name>\n\n<form-login-config>\n\n\
  <form-login-page>/faces/loginForm.xhtml</form-login-page>\n\n<form-error-page>/faces/loginError.xhtml</form-error-page>\n\
  \n</form-login-config>\n\n</login-config>\n\n接下来，需要将 GlassFish 服务器安全角色映射添加到 `sun-web.xml`\
  \ 配置文件中，该映射将应用程序角色映射到数据库组。以下摘录展示了映射配置：\n\n<security-role-mapping>\n\n<role-name>admin</role-name>\n\
  \n<group-name>administrator</group-name>\n\n</security-role-mapping>\n\n<security-role-mapping>\n\
  \n<role-name>user</role-name>\n\n<group-name>reader</group-name>\n\n</security-role-mapping>\n\
  \n最后，用户将看到的视图必须包含用户名和密码输入文本字段的特定名称，并且表单操作必须设置为 `j_security_check`，这将导致控制权传递给应用服务器以处理身份验证。以下登录表单演示了此过程。您可以在\
  \ JakartaEE10Recipes 项目中的 `login.xhtml` 表单内看到这些源码。\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\" \"http://www.w3.org/TR/xhtml1/DTD/\n\
  \nxhtml1-strict.dtd\">\n\n<html\n\n>\n\n<h:head>\n\n<meta http-equiv=\"Content-Type\"\
  \ content=\"text/html; charset=UTF-8\"/>\n\n<title>TODO supply a title</title>\n\
  \n</h:head>\n\n第 18 章 ■ Jakarta EE 应用服务器\n\n<h:body>\n\n<p>\n\n<form method=\"POST\"\
  \ action=\"j_security_check\">\n\nUsername: <input type=\"text\" name=\"j_username\"\
  \ />\n\nPassword: <input type=\"password\" name=\"j_password\" />\n\n<br />\n\n\
  <input type=\"submit\" value=\"Login\" />\n\n<input type=\"reset\" value=\"Reset\"\
  \ />\n\n</form>\n\n</p>\n\n</h:body>\n\n</html>\n\n当用户将浏览器指向 `login.xhtml` 视图时，系统将提示他们登录应用程序。\n\
  \n工作原理\n\n保护应用程序的安全是任何企业应用程序的关键步骤。添加用于登录的用户名和密码是最基本的安全形式之一。GlassFish 应用服务器、底层数据库以及一些基本的\
  \ Jakarta EE 应用程序配置的结合，使得通过用户名和密码保护应用程序变得轻而易举。本方案的解决方案演示了如何在应用服务器内配置一个安全域，该域将利用数据库表来存储用户名和密码组合。虽然此解决方案中的一些数据库代码特定于\
  \ Oracle 数据库，但同样的技术可以应用于大多数关系数据库管理系统（RDBMS），只需对代码进行少量修改即可保护数据库中的密码。\n\n在 GlassFish\
  \ 中配置安全域的第一步是设置底层数据库表，该表将用于包含安全凭证。确保表中存储的密码已加密至关重要；否则，任何对为此解决方案创建的安全表具有只读访问权限的人都可以看到它们。在本方案的解决方案中，使用了\
  \ Oracle 数据库的 `dbms_obfuscation_toolkit.md5` 函数来对密码进行哈希处理。但是，如果您使用其他数据库系统，应该也有类似的工具可用于加密目的。配置数据库时，应创建一个表来保存用户名和密码，并创建另一个表来保存组或安全角色。这将允许使用该域的应用程序包含高级别的安全配置，从而可以根据角色向不同用户授予不同级别的访问权限。\n\
  \n创建数据库对象后，必须配置服务器以利用数据库进行身份验证。这是通过登录管理控制台并设置一个新的安全域来完成的。在“新建域”表单上需要填写多条信息，这些信息用于将域映射到相应的数据库表和列。为域指定的名称可以是任何有效的字符串，类名应为\
  \ `com.sun.enterprise.security.auth.realm.jdbc.JDBCRealm`，因为可以创建多种不同类型的安全域，包括 LDAP\
  \ 域等。表单上的其余信息应根据每个文本字段的说明进行填写。务必确保 JDBC 资源已配置好，并且为 JDBC 资源指定的名称与表单上 JNDI 字段提供的名称匹配。\n\
  \n要为应用程序配置使用安全域，必须在应用程序的 `web.xml` 配置文件中指定安全约束和登录配置。安全约束用于将指定的 Web 文件夹映射到应用程序的不同用户角色。这意味着应用程序的所有管理页面都可以放入一个文件夹中，并且可以在\
  \ `web.xml` 文件中设置安全约束，以根据安全凭证限制对该文件夹的访问。如果您查看解决方案中的配置示例，可以看到已经设置了一个安全约束。\n\n第 18\
  \ 章 ■ Jakarta EE 应用服务器\n\n\n\n配置时显示名称为 Admin。任何有效的字符串标识符都可以赋予安全约束的 display-name、web-resource-name\
  \ 或 description 元素。url-pattern 元素指定了该约束应保护哪个文件夹，放置在该文件夹中的任何内容都将受到保护，防止未经授权的用户访问。每个\
  \ http-method 元素列出了与给定文件夹内资源相关的不同 HTTP 方法。auth-constraint 子元素包含角色映射，可以为其赋予一个描述以及用于限制访问的\
  \ role-name。指定的 role-name 应与创建用于存储组的数据库表中放置的某个组值相匹配。任何与给定组或角色相对应的用户名，只要能够成功登录应用程序，都将有权访问受保护文件夹内的资源。如果部署到\
  \ GlassFish，则必须更新 `sun-web.xml` 配置文件，使其包含角色到组的映射。这可以通过向 `sun-web.xml` 文件添加 `security-role-mapping`\
  \ 元素来实现，并且每个元素必须包含一个 `role-name` 元素以及一个相应的 `groupname` 元素。\n\n最后一部分是创建一个登录表单。该表单必须包含一个名为\
  \ `j_security_check` 的 action，因为这将把身份验证的控制权传递给应用服务器。username 和 password 元素必须分别包含\
  \ `j_username` 和 `j_password` 的名称。这样做将允许这些元素被正确地传递给身份验证机制。当表单提交时，用户名和密码被发送到身份验证机制，该机制由应用服务器通过您创建的安全域进行处理。如果使用了正确的用户名和密码组合，会话将被授予访问已为经过身份验证的用户角色指定的任何资源的权限。如果给定用户的角色不允许其通过\
  \ `web.xml` 文件中设置的安全约束访问应用程序的某些区域，则该用户将被拒绝访问。\n\n配置基于表单的身份验证是控制应用程序访问权限的一种好方法。它允许每个应用程序包含自己的安全基础设施，从而能够将应用程序的某些区域限制给指定的角色。使用\
  \ JDBC 域的唯一缺点是密码必须存储在数据库表中。因此，只要使用良好的加密算法来混淆密码，这应该是一个很小的风险。\n\n■ **注意** 要改用 LDAP\
  \ 身份验证，请使用 `com.sun.enterprise.security.auth.realm.ldap.LDAPRealm` 类设置一个安全域。为 JaaS\
  \ 上下文指定一个字符串值，该值将用于引用该域。目录应设置为要用于身份验证的 LDAP 服务器的 URL。Base Dn 必须设置为将用于向 LDAP 服务器进行身份验证的用户的\
  \ Base Dn（使用一个对 LDAP 目录具有读取权限的单独 LDAP 帐户进行身份验证）。LDAP 配置可能需要的其他属性包括 `search-bind-password`、`search-bind-dn`\
  \ 和/或 `search-filter`。要了解有关 LDAP 配置的更多信息，请参考在线文档。\n\n18-6. 将微服务部署到 GlassFish\n\n\
  问题\n\n您希望将一个 Jakarta EE 应用程序部署到一个更轻量的应用服务器容器中，该容器仅包含支持应用程序所需的最少规范集。您还将开发一个旨在通过 Web\
  \ 服务提供特定数据集的应用程序。\n\n第 18 章 ■ Jakarta EE 应用服务器\n\n解决方案\n\n开发一个极简的应用程序，专注于为一组目标数据提供\
  \ Web 服务。在以下示例中，将开发一个小型 Jakarta EE Web 应用程序，用于托管一组提供图书作者数据的 Web 服务。这个小型 Web 应用程序将被配置为仅使用应用程序功能所需的\
  \ Jakarta EE 10 规范。然后，该应用程序将部署到 GlassFish 应用服务器。\n\n■ **注意** 此示例演示了解决方案所需的 Java\
  \ 类的构建。要查看包括配置文件在内的完整解决方案，请参阅本书的 AuthorService 项目源码。\n\n首先，创建一个名为 `AuthorService`\
  \ 的新 Maven Web 应用程序，并添加以下依赖项：\n\n*   RESTful Web 服务 (JAX-RS) 3.1\n*   Jakarta 持久化\
  \ (JPA) 3.1\n*   Apache Derby JDBC 10.15\n*   Bean 验证 3.0\n*   Jakarta 企业 Beans\
  \ (EJB) 4.0\n*   Eclipse 持久化 4.0\n\n完成后，POM 依赖项应如下所示：\n\n```xml\n<dependency>\n\
  \    <groupId>jakarta.ws.rs</groupId>\n    <artifactId>jakarta.ws.rs-api</artifactId>\n\
  \    <version>3.0.0</version>\n    <scope>provided</scope>\n</dependency>\n<dependency>\n\
  \    <groupId>jakarta.persistence</groupId>\n    <artifactId>jakarta.persistence-api</artifactId>\n\
  \    <version>3.0.0</version>\n    <scope>compile</scope>\n</dependency>\n<dependency>\n\
  \    <groupId>jakarta.validation</groupId>\n    <artifactId>jakarta.validation-api</artifactId>\n\
  \    <version>3.0.1</version>\n</dependency>\n<dependency>\n    <groupId>jakarta.ejb</groupId>\n\
  \    <artifactId>jakarta.ejb-api</artifactId>\n    <version>4.0.0</version>\n  \
  \  <type>jar</type>\n</dependency>\n<dependency>\n    <groupId>org.eclipse.persistence</groupId>\n\
  \    <artifactId>eclipselink</artifactId>\n    <version>3.0.2</version>\n    <scope>provided</scope>\n\
  </dependency>\n<dependency>\n    <groupId>org.apache.derby</groupId>\n    <artifactId>derbyclient</artifactId>\n\
  \    <version>10.15.2.0</version>\n</dependency>\n</dependencies>\n```\n\n接下来，添加两个\
  \ Java 包：`org.jakartaeerecipe.authorservice.entity` 和 `org.jakartaeerecipe.authorservice.rest`。在实体包中为\
  \ `AUTHOR_WORK`、`BOOK`、`BOOK_AUTHOR` 和 `CHAPTER` 数据库表创建实体类。Author 实体类的源代码如下所示。按照相同的方法生成其他实体类：\n\
  \n```java\npackage org.jakartaeerecipe.authorservice.entity;\n\nimport java.io.Serializable;\n\
  import java.math.BigDecimal;\nimport java.math.BigInteger;\nimport jakarta.persistence.*;\n\
  import jakarta.validation.constraints.NotNull;\n\n@Entity\n@Table(name = \"AUTHOR_WORK\"\
  )\n@NamedQueries({\n    @NamedQuery(name = \"AuthorWork.findAll\", query = \"SELECT\
  \ a FROM AuthorWork a\")})\n@XmlRootElement\npublic class AuthorWork implements\
  \ Serializable {\n    private static final long serialVersionUID = 1L;\n    @Id\n\
  \    @Basic(optional = false)\n    @NotNull\n    @Column(name = \"ID\")\n    private\
  \ BigDecimal id;\n    @Column(name = \"BOOK_ID\")\n    private BigDecimal bookId;\n\
  \    @JoinColumn(name = \"AUTHOR_ID\", referencedColumnName = \"ID\")\n    @ManyToOne(optional\
  \ = false)\n    private BookAuthor authorId;\n    // Getters and Setters\n    @Override\n\
  \    public int hashCode() {\n        int hash = 0;\n        hash += (id != null\
  \ ? id.hashCode() : 0);\n        return hash;\n    }\n    @Override\n    public\
  \ boolean equals(Object object) {\n        // TODO: Warning - this method won't\
  \ work if the id fields are not set\n        if (!(object instanceof AuthorWork))\
  \ {\n            return false;\n        }\n        AuthorWork other = (AuthorWork)\
  \ object;\n        if ((this.id == null && other.id != null) || (this.id != null\
  \ && !this.id.equals(other.id))) {\n            return false;\n        }\n     \
  \   return true;\n    }\n    @Override\n    public String toString() {\n       \
  \ return \"org.jakartaee10recipe.entity.AuthorWork[ id=\" + id + \" ]\";\n    }\n\
  }\n```\n\n■ **注意** 请记住为每个实体类添加 `@XmlRootElement` 注解，因为此注解使实体能够转换为 XML 格式。常见的 Web\
  \ 服务格式之一是 XML，因此您几乎总是希望启用此功能。\n\n\n\n接下来，创建一个 Web 服务类，该类将查询数据库并以适当的格式将数据返回给 Web\
  \ 服务客户端。为此，创建一个名为 `BookAuthorFacadeREST` 的类，其中包含多个方法，这些方法将查询实体类并以 JSON 或 XML 格式将数据返回给调用方。首先，使用\
  \ `@jakarta.ejb.Stateless` 注解该类，以便该类能够使用 JPA 执行事务性查询。接着，使用 `@jakarta.ws.rs.Path`\
  \ 注解，并提供一个路径，REST 服务将通过该路径在 URI 上可用。注入一个 `@PersistenceContext`，它引用了应用程序的持久化上下文单元名称。请注意，你需要为应用程序创建一个持久化单元，因此如有需要，请参考配方\
  \ 7-3 了解更多详情。持久化单元用于通过 JPA API 查询数据。由于此应用程序将部署到 Payara Micro 而非传统的应用服务器，因此最佳实践是在\
  \ `web.xml` 中定义数据源，然后在 `/src/main/resources/META-INF/persistence.xml` 中引用已定义的数据源。因此，创建一个包含以下配置的\
  \ `web.xml` 部署描述符：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app\n\
  \    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee http://xmlns.jcp.org/xml/ns/javaee/web-app_3_1.xsd\"\
  \n    version=\"3.1\">\n    <session-config>\n        <session-timeout>\n      \
  \  </session-timeout>\n    </session-config>\n    <data-source>\n        <name>java:global/DerbyDataSource</name>\n\
  \        <class-name>org.apache.derby.jdbc.ClientDriver</class-name>\n        <server-name>localhost</server-name>\n\
  \        <port-number>1527</port-number>\n        <url>jdbc:derby://localhost:1527/acme</url>\n\
  \        <user>acmeuser</user>\n        <password>yourpassword</password>\n    </data-source>\n\
  </web-app>\n```\n\n最后，编写用于查询数据库并以适当格式返回数据的方法。在本例中，这些方法将返回 `BookAuthor` 数据。其中一个方法将返回\
  \ `BOOK_AUTHOR` 数据库表中的所有记录，而另一个方法将返回包含匹配 ID 的 `BOOK_AUTHOR` 记录。\n\n```java\npackage\
  \ org.jakartaee10recipe.authorservice.rest;\n\nimport java.math.BigDecimal;\nimport\
  \ java.util.List;\nimport jakarta.ejb.Stateless;\nimport jakarta.persistence.EntityManager;\n\
  import jakarta.persistence.NoResultException;\nimport jakarta.persistence.PersistenceContext;\n\
  import jakarta.ws.rs.GET;\nimport jakarta.ws.rs.Path;\nimport jakarta.ws.rs.PathParam;\n\
  import jakarta.ws.rs.Produces;\nimport jakarta.ws.rs.core.MediaType;\nimport org.jakartaee10recipe.authorservice.entity.BookAuthor;\n\
  \n@Stateless\n@Path(\"bookAuthor\")\npublic class BookAuthorFacadeREST {\n\n   \
  \ @PersistenceContext(unitName = \"AuthorService_1.0PU\")\n    private EntityManager\
  \ em;\n\n    @GET\n    @Path(\"{id}\")\n    @Produces({MediaType.APPLICATION_XML,\
  \ MediaType.APPLICATION_JSON})\n    public BookAuthor find(@PathParam(\"id\") BigDecimal\
  \ id) {\n        BookAuthor bookAuthor = null;\n        try {\n            bookAuthor\
  \ = (BookAuthor)\n                em.createQuery(\"select object(o) from BookAuthor\
  \ o \" +\n                               \"where o.id = :id\")\n               \
  \   .setParameter(\"id\", id)\n                  .getSingleResult();\n        }\
  \ catch (NoResultException ex){\n            System.out.println(\"Error: \" + ex);\n\
  \        }\n        return bookAuthor;\n    }\n\n    @GET\n    @Produces({MediaType.APPLICATION_XML,\
  \ MediaType.APPLICATION_JSON})\n    public List<BookAuthor> findAll() {\n      \
  \  List<BookAuthor> bookAuthors = null;\n        try {\n            bookAuthors\
  \ = em.createQuery(\"select object(o) from BookAuthor o\")\n                   \
  \         .getResultList();\n        } catch (NoResultException ex){\n         \
  \   System.out.println(\"Error: \" + ex);\n        }\n        return bookAuthors;\n\
  \    }\n\n    protected EntityManager getEntityManager() {\n        return em;\n\
  \    }\n}\n```\n\n最后，对于应用程序，创建 `ApplicationConfig` 类，该类将用于为应用程序配置 JAX-RS：\n\n```java\n\
  @jakarta.ws.rs.ApplicationPath(\"rest\")\npublic class ApplicationConfig extends\
  \ Application {\n\n    @Override\n    public Set<Class<?>> getClasses() {\n    \
  \    Set<Class<?>> resources = new java.util.HashSet<>();\n        resources.add(org.jakartaee10recipe.authorservice.rest.BookAuthorFacadeREST.class);\n\
  \        return resources;\n    }\n}\n```\n\n现在，应用程序应该已经准备好部署到应用服务器。因此，它可以部署到 GlassFish\
  \ 7，并且应该可以正常工作，不会出现问题。\n\n`bookAuthor` 服务将在 `http://localhost:8080/AuthorService/rest/bookAuthor/`\
  \ 上可用。\n\n### 工作原理\n\n在本配方中，创建了一个简单的 Jakarta EE 应用程序“微服务”并将其部署到 GlassFish。为了创建这个极简的应用程序，创建一个\
  \ Maven Web 应用程序，并仅将运行应用程序所需的 Jakarta EE API 作为依赖项包含在内。在本例中，这些依赖项包括 Jakarta RESTful\
  \ Web Services、Jakarta Persistence、Bean Validation 和 Enterprise Beans。运行应用程序还需要另外两个依赖项，即\
  \ Apache Derby JDBC 驱动程序和 Eclipse Persistence JPA 实现。如示例所示，要创建 `SimpleService` 应用程序，请包含\
  \ `AuthorWork` 实体类。为应用程序创建一个 `web.xml` 部署描述符，并在其中定义一个数据源，该数据源将用于连接到 Apache Derby\
  \ 数据库。然后，可以创建一个持久化单元供应用程序的 JPA 调用使用。在部署描述符中配置数据源使得在 Payara Micro 上部署变得容易，因为无需进行服务器端配置。\n\
  \n这个简单的应用程序包含几个实体类，它们映射到查询 `BOOK_AUTHOR` 数据库表所需的数据库表。然后，这些实体类被用于在 `BookAuthorFacadeREST`\
  \ 类中创建 RESTful 服务。该类包含两个简单的 REST 服务，每个服务都是 `@GET` 服务。这意味着这些服务将用于检索数据。`find()` 方法创建了一个服务，允许你查询与给定\
  \ ID 匹配的 `BookAuthor` 实体。在调用服务时，可以在 URI 中指定该 ID。`findAll()` 方法简单地以 XML 或 JSON 格式返回所有\
  \ `BookAuthor` 结果。有关开发 RESTful Web 服务的更多详细信息，请参阅第 13 章。\n\n`ApplicationConfig` 类将\
  \ Jakarta RESTful Web Services 类注册到 API 本身，从而使 RESTful 服务可供使用。该类扩展了 `Application`\
  \ 抽象类，允许重写 `getClasses()` 以返回应用程序的 JAX-RS 资源列表。在本例中，唯一的 Jakarta RESTful Web Service\
  \ 资源是 `org.jakartaeerecipe.authorservice.rest.BookAuthorFacadeREST.class`。`@ApplicationPath`\
  \ 注解提供了应在 URI 中用于访问 RESTful 服务的路径。\n\n展开的 WAR 只是将 WAR 文件的内容提取到一个文件夹中。可以通过简单地将 `.war`\
  \ 扩展名更改为 `.zip` 并提取内容来提取 WAR 文件。如果你使用的是基于 Maven 的应用程序，编译后项目目录将包含一个 `target` 目录。在\
  \ `target` 目录内，将包含展开的 WAR，以及包括 WAR 文件本身在内的其他几个文件夹。\n\n有时，如果你希望更改那些不需要重新编译的文件（如 XHTML、JS、CSS、HTML、Jakarta\
  \ Server Pages 等）而无需重新编译 WAR，那么部署展开的 WAR 是有益的。\n\n**第 19 章**\n\n**部署到容器**\n\n\n\n\
  容器化技术领域已经蓬勃发展，如今在技术领域几乎不可能不遇到“容器化”或具体来说“Docker”这个词。Docker 是一种技术，它允许将完整的应用程序环境打包到一个轻量、可移植的容器中。这项技术提供了轻松配置和定制容器的能力，使其能够运行各种操作系统、虚拟机、数据库、应用服务器、Web\
  \ 服务器等，从而实现应用程序一次部署到容器，即可移植到几乎任何环境。凭借这种能力，开发人员可以轻松创建由多个相互通信的容器组成的应用程序，这些容器紧密集成，从而构建出健壮且容错性强的应用程序。\n\
  \n有人可能会问：“为什么要部署到容器，然后再交付容器，而不是直接交付一个 Web 归档 (WAR) 文件？”或者“为什么要创建多个较小的应用程序并部署到多个容器中，以构建一个单一的整体系统？”这些问题的答案有多种，具体取决于解决方案的需求。在某些情况下，部署到容器并无必要，标准的\
  \ WAR 文件就完全足够。然而，容器化的主要优势之一在于创建可重现的环境。这意味着可以创建一个容器，并将应用程序部署到该容器中，从而提供一个在任何地方都能以相同方式运行的可移植容器。当这样的容器交付给客户时，它的运行方式将与在开发人员机器上或测试环境中完全一致。可重现。这是一个巨大的优势。您有多少次在开发完应用程序后，将其部署到不同环境的应用服务器上，却遇到了难以捉摸的问题？许多开发人员都曾遭遇此类困扰，并花费无数小时试图寻找解决方案……\n\
  \n容器化可以提供帮助。该解决方案还使得共享预构建镜像以供其他用途成为可能。这正是 Docker Hub 背后的理念，它提供了一个预构建镜像库供用户使用。Docker\
  \ Hub 上的镜像可以直接使用，也可以进行扩展以根据需求进行定制。\n\n那么，开发多容器解决方案背后的理由是什么呢？当一个系统由多个相互独立运行的容器构建而成时，可以轻松实现容错。每个容器化应用程序可以只执行单个任务（或少量相关任务），并与其他容器进行通信。这种类型的解决方案也被称为“微服务”，许多成功的解决方案都是采用这种方法开发的。如果其中一个容器发生故障，其他容器将继续运行，只有整个系统的单个功能会变得不可用。更妙的是，可以使用容错机制自动生成一个新容器来替代不可用的容器。\n\
  \nDocker 和容器化解决方案还提供了许多其他优势，包括快速启动时间、易于管理的 CPU 和容器配置、小巧的可移植解决方案，以及容器的快速复制和/或重建，仅举几例。注意到容器化的所有这些优势，很容易理解人们为何会过度依赖容器，并将其用于一切。我必须强调，容器化并非在所有情况下都是最佳解决方案。您必须有所选择，并为手头的应用程序选择最佳策略。\n\
  \n© Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang, *Java EE 到 Jakarta\
  \ EE 10 实战*[, https://doi.org/10.1007/978-1-4842-8079-9_19](https://doi.org/10.1007/978-1-4842-8079-9_19#DOI)\n\
  \n第 19 章 ■ 部署到容器\n\n本章将简要概述如何使用 Docker 创建容器化应用程序。阅读完本章后，您将对如何创建 Docker 容器以及如何将应用程序部署到容器有基本的了解。您还将对如何使多个容器相互通信以创建一个统一的解决方案有基本的了解。\n\
  \n19-1\\. 创建 Docker 镜像并运行 Java\n\n问题\n\n您希望创建一个 Docker 镜像并运行一个小的 Java 可执行程序。\n\n\
  解决方案\n\n按照以下步骤创建一个 Docker 容器：\n\n1.  在您的机器上创建一个新文件夹，并将其命名为 **javaapp**。切换到该新文件夹：\n\
  \n    ```\n    mkdir javaapp\n    cd javaapp\n    ```\n\n2.  在新目录中创建一个文件，并将其命名为\
  \ **Dockerfile**，不带任何文件扩展名。该文件将包含构建容器的指令：\n\n    ```\n    nano Dockerfile\n    ```\n\
  \n    或\n\n    ```\n    vim Dockerfile\n    ```\n\n    ■ **注意** Nano 和 Vim 编辑器都是从终端使用的，并且它们适用于多种操作系统。\n\
  \n3.  将以下内容添加到 Dockerfile 中：\n\n    ```\n    FROM openjdk:17\n    COPY . /var/www/java\n\
  \    WORKDIR /var/www/java\n    RUN javac HelloDocker.java\n    CMD [\"java\", \"\
  HelloDocker\"]\n    ```\n\n    ![](img/index-682_1.png)\n\n    第 19 章 ■ 部署到容器\n\n\
  4.  创建一个包含 `main()` 方法的小型 Java 程序。将文件命名为 `HelloDocker.java`，并在其中放入以下内容：\n\n    ```\n\
  \    class HelloDocker {\n        public static void main(String[] args){\n    \
  \        System.out.println(\"Hello Docker!\");\n        }\n    }\n    ```\n\n5.\
  \  在 `jakartaeeapp` 目录内，通过命令行或终端执行以下命令来构建 Docker 镜像：\n\n    ```\n    docker build\
  \ -t javaapp .\n    ```\n\n6.  通过发出以下命令来运行 Docker 镜像：\n\n    ```\n    docker run\
  \ javaapp\n    >> Hello Docker!\n    ```\n\n    这将产生以下输出：\n\n    第 19 章 ■ 部署到容器\n\
  \n    工作原理\n\n    创建一个 Java 应用程序并将其打包到 Docker 镜像中非常简单。首先，必须在用于创建 Docker 容器的机器上安装\
  \ Docker 环境。\n\n    在 Windows 或 Mac 平台上，这通常意味着安装 Docker Desktop。在 Linux 上，这通常是社区版或\
  \ Docker 服务器环境，例如 Docker Enterprise Edition。\n\n    ■ **注意** 有关在 Linux、Mac 或 Windows\
  \ 上安装 Docker 的更多信息，请参阅在线文档：[`docs.docker.com/get-docker/`](https://docs.docker.com/get-docker/)。\n\
  \n    安装 Docker 后，即可创建容器并将其安装到本地镜像仓库中。\n\n    要开始创建基本的 Docker 镜像，请创建一个文件夹，用于存放将成为\
  \ Docker 镜像一部分的所有文件。接下来，在该文件夹内创建一个名为 **Dockerfile** 的文件，该文件将用于配置镜像。**Dockerfile**\
  \ 用于指定构建此镜像所基于的基础镜像，并且还允许指定配置，例如应用程序入口点、通信端口、数据库信息等。\n\n    在示例中，基础 Docker 镜像源自\
  \ OpenJDK 17，使用了语句 `FROM openjdk:17`。示例 Dockerfile 的下一行指示将当前文件夹的内容复制到镜像内的 `/var/www/java`\
  \ 文件夹中。Docker 的 `WORKDIR` 命令用于为后续的任何 `RUN`、`CMD`、`ENTRYPOINT`、`COPY` 和 `ADD` 指令设置工作目录。在示例中，下一行执行\
  \ Java 程序并创建一个镜像：\n\n    ```\n    RUN javac HelloDocker.java\n    ```\n\n    Docker\
  \ 容器运行一个通过 Dockerfile 中包含的命令创建的镜像。`RUN` 命令创建一个容器，该容器在作为容器基础的 OS 镜像之上合并一个镜像并运行它。\n\
  \n    `RUN`、`CMD` 和 `ENTRYPOINT` 指令可以以 Shell 形式或 Exec 形式执行。在此示例中，`CMD` 指令使用了 Exec\
  \ 形式。Exec 形式使用以下格式：\n\n    ```\n    <instruction> [\"executable\",\"parameter1\"\
  ,\"parameter2\"]\n    ```\n\n    Shell 形式采用以下格式：\n\n\n\n<instruction> 命令\n\n在示例中，Dockerfile\
  \ 的最后一行包含 CMD 命令。每个 Dockerfile 只能有一个 CMD 命令。如果存在多个 CMD 命令，则执行文件中的最后一个。CMD 命令为正在执行的容器提供默认值。在示例中，CMD\n\
  \n命令以 Exec 格式编写，该格式提供可执行文件，后跟参数：CMD [\"java\", \"HelloDocker\"]\n\n在这种情况下，可执行文件是“java”，参数是“HelloDocker”，这是可执行\
  \ Java 应用程序的名称。该命令的其他可能格式是“Entrypoint”和 Shell 形式。\n\n要了解有关不同格式以及不同 Dockerfile 命令的更多信息，请参阅在线文档：\n\
  \nhttps://docs.docker.com/engine/reference/builder/\n\n第 19 章 ■ 部署到容器\n\n构建 Dockerfile\
  \ 后，可以通过从命令行或终端调用 docker build 指令，使用 docker 可执行文件来构建镜像。在示例中，传递了 -t 选项，该选项为镜像指定了一个名称。要查看\
  \ docker build 可用的许多不同选项，请参阅在线文档：\n\nhttps://docs.docker.com/engine/reference/commandline/build/\n\
  \n最后，要运行容器，请从命令行或终端发出 docker run 指令。在示例中，仅将镜像名称传递给 docker run 命令。但是，还可以指定更多选项。请参阅在线文档以了解各种选项：https://docs.docker.com/engine/reference/run/\n\
  \n19-2\\. 利用官方 Payara Docker 镜像将镜像部署到 Payara 服务器\n\n问题\n\n您将利用 Payara 服务器的预构建 Docker\
  \ 镜像创建一个容器，并将应用程序部署到其中。\n\n解决方案\n\n利用 Docker Desktop 安装来运行存储在 Docker Hub 上的 Payara\
  \ Docker 镜像。以下命令将从 Docker Hub 拉取官方 Payara 镜像，创建一个包含“deployments”文件夹中存在的 WAR 文件的容器，并运行该容器：\n\
  \ndocker run -d -p 4848:4848 -p 8095:8080 -v /Java_Dev/deployments:/opt/payara/deployments\
  \ --name payara-container payara/server-full:latest\n\n工作原理\n\n要轻松启动一个基于 Payara\
  \ 服务器构建的容器，请使用 docker run 命令，并可选择传递一些操作符或参数来即时配置容器。该命令最基本的形式遵循以下格式：\n\ndocker run\
  \ <镜像名称>\n\n镜像名称的格式为 <社区>/<仓库>:标签。\n\n只需输入 docker run --help 即可查看可用参数。表 19-1 解释了一些最常用的参数。\n\
  \n第 19 章 ■ 部署到容器\n\n***表 19-1.** 常用 docker run 操作符*\n\n**操作符**\n\n**描述**\n\n-d\n\
  \n以分离模式运行容器\n\n-rm\n\n与 -d 一起使用时，在容器退出或守护进程退出时移除容器\n\n--name\n\n为容器提供标识符\n\n-p\n\
  \n将容器端口发布到主机端口，格式为\n\n主机端口:容器端口\n\n-v\n\n将卷从主机挂载到容器\n\n在示例中，容器内的端口 4848 映射到主机上的端口\
  \ 4848。同样，容器内的端口 8080 映射到主机上的端口 8095。主机上的卷 **/Java_Dev/Deployments** 映射到容器卷 **/opt/payara/deployments**。因此，如果主机卷中存在任何\
  \ WAR\n\n文件，当 Payara 服务器启动时，它们将被自动部署，因为它们会被复制到 Payara 的部署目录中。示例中的容器被命名为 *payara-container*，这比随机生成的编号更容易识别。最后，该容器基于最新的\
  \ Payara Server 镜像。\n\n19-3\\. 创建一个运行基本 Jakarta EE 应用程序的 Docker 容器\n\n问题\n\n\n\n\
  您希望从镜像创建一个 Docker 容器，并在该容器中运行 Jakarta EE 应用程序。\n\n解决方案\n\n利用一个容器镜像（例如 Payara 或 WildFly）作为\
  \ Jakarta EE Docker 容器的基础。在本解决方案中，将使用 Payara 来部署一个包含 Jakarta RESTful Web 服务的基本“Hello\
  \ World”Jakarta EE 应用程序。\n\n就本例而言，一个简单的 Jakarta EE 应用程序已随本书的源代码打包。该应用程序名为 **HelloApp**，您可以使用\
  \ Apache NetBeans 或 IntelliJ IDEA 等 IDE 打开该项目并将其编译成 WAR 文件。\n\n要部署到容器，需要构建一个 **Dockerfile**，它将拉取容器的基础镜像，然后可以在其上叠加后续镜像，以创建一个功能完整的容器。首先，在\
  \ **HelloApp** 项目的根目录中创建一个无扩展名的文件，并将其命名为 **Dockerfile**。在 **Dockerfile** 中，放置以下内容：\n\
  \nFROM payara/server-full:latest\n\nCOPY target/HelloApp-1.0.war $DEPLOY_DIR\n\n\
  接下来，通过执行 `docker run` 命令并传递镜像名称和版本来构建镜像。请务必包含末尾的点号（.），因为这表示将当前目录的内容包含在构建中：\n\ndocker\
  \ build -t hello-app:1.0 .\n\n第 19 章 ■ 部署到容器\n\n最后，通过执行 `docker run` 命令来运行容器，提供主机端口映射以及镜像名称和版本：\n\
  \ndocker run -it -p 8095:8080 hello-app:1.0\n\n执行此命令后，容器将启动，您可以访问 REST 端点（应位于 http://localhost:8095/HelloApp-1.0/rest/helloService/hello），并看到结果：Hello\
  \ World\n\n工作原理\n\n许多应用服务器容器供应商会以 Docker 就绪格式打包其容器，通常是在 Docker Hub 上。因此，很容易使用这些容器之一作为基础来构建镜像，然后将应用程序或服务部署到该容器中。\n\
  \n在本例中，Dockerfile 的第一行拉取了 Payara Server，用于创建基础镜像。接下来，使用 `COPY` 命令将 HelloApp-1.0.war\
  \ 文件复制到 Payara 服务器中由 `$DEPLOY_DIR` 引用的区域。关于此 `COPY` 命令，有几点需要注意。首先，假设 Dockerfile\
  \ 位于项目目录的根目录下。因此，在 Dockerfile 的同一层级应有一个 `target` 文件夹。在 `target` 文件夹内应有编译好的 HelloApp-1.0.war。因此，`COPY`\
  \ 命令引用了 `target/HelloApp-1.0.war`。其次，`$DEPLOY_DIR` 变量是使用 Payara 服务器镜像时引用的特殊变量。此变量指向容器的\
  \ `/opt/payara/deployments` 目录。总而言之，此命令是告诉 Docker 将 WAR 文件复制到自动部署目录中。\n\n可以通过执行\
  \ `docker build` 命令来构建镜像。在这种情况下，使用 `-t` 选项来指定镜像名称和版本。要查看此命令的完整选项列表，请参考在线文档：[`docs.docker.com/engine/reference/commandline/build/`](https://docs.docker.com/engine/reference/commandline/build/)。\n\
  \n为了运行容器，请执行 `docker run` 命令。在本例中，`-it` 选项指示 Docker 分配一个连接到容器标准输入的伪 TTY。这实质上是在容器内创建了一个交互式\
  \ bash。`-p` 选项指定了主机到容器的端口映射。传递给 `docker run` 的最后一个参数是镜像名称和版本。\n\n使用您从多个兼容的 Jakarta\
  \ EE 应用服务器容器中选择的一个来创建容器并部署应用程序是轻而易举的事。许多供应商都提供 Docker 就绪的容器，使得所需的工作量非常少。\n\n19-4\\\
  . 启用容器间的通信\n\n问题\n\n您希望提供多个容器之间的通信。\n\n解决方案\n\n\n\n要实现两个或多个容器之间的通信，必须确保端口号分配正确。利用\
  \ Docker 的网络功能可以帮助达到预期效果：`docker network connect hellonetwork`\n\n第 19 章 ■ 部署到容器\n\
  \n或者\n\n`docker run –net=hellonetwork -it -p 8096:8080 hello-app:1.0`\n\n在此方案中，一个名为\
  \ **HelloApp** 的 Jakarta RESTful Web 服务被部署到 hellonetwork 网络的 8096 端口上。另一个名为 **HelloAppClient**\
  \ 的 Jakarta Web 服务客户端被部署到同一个 hellonetwork 网络的 8097 端口上。在这种情况下，**HelloAppClient**\
  \ 调用通过 **HelloApp** 在 8096 端口上暴露的 RESTful 服务。\n\n首先，让我们看一下 **HelloAppClient** 的代码。需要注意的一点是，在这段代码中，为了简洁起见，RESTful\
  \ 服务调用的 URL 是硬编码的。然而，这种方式不适合生产环境使用。对于生产环境，最好设置一个包含 RESTful URL 的属性，该属性可以从 Jakarta\
  \ RESTful Web 服务客户端内部读取：\n\n```java\n@Path(\"helloclient\")\npublic class HelloService\
  \ {\n    @GET\n    @Produces(MediaType.APPLICATION_JSON)\n    public Response sayHello()\
  \ {\n        // 获取客户端实例\n        Client client = ClientBuilder.newClient();\n  \
  \      Response res = (Response) client.target(\"localhost:8096/HelloApp-1.0/rest/helloService/hello\"\
  )\n                .request(\"text/plain\").get();\n        return res;\n    }\n\
  }\n```\n\n接下来，在 **HelloApp** 项目目录中调用 `docker build` 命令来构建 **HelloApp** Docker 镜像。项目部署完成后，可以通过执行\
  \ `docker run` 命令来启动容器：\n\n`docker run -d --net=hellonetwork -it -p 8096:8080 hello-app:1.0`\n\
  \n**HelloAppClient** 项目的镜像应以相同的方式构建，然后可以将容器部署到同一个网络。为此，请切换目录进入 **HelloAppClient**\
  \ 项目目录。接着，执行 `docker build` 命令，然后执行以下 `docker run` 命令：`docker run -d --net=hellonetwork\
  \ -it -p 8097:8080 hello-app-client:1.0`\n\n打开浏览器并导航到 **HelloAppClient** 项目，应该可以看到来自\
  \ **HelloApp** 项目服务的文本：\n\n`http://localhost:8097/HelloAppClient/rest/helloclient`\n\
  \n工作原理\n\n`docker network` 命令允许创建一个网络，可以将任意数量的容器分配到该网络。网络中的每个容器都可以通过指定容器名称来相互通信。有多种不同的方式可以将多个服务部署到一个\
  \ Docker 网络，以便它们能够进行通信。\n\n第 19 章 ■ 部署到容器\n\n在本方案中，介绍了将容器加入同一个 Docker 网络的两种技术。\n\
  \n将容器加入 Docker 网络的第一种方法是按以下格式执行 `docker network` 命令：\n\n`docker network connect\
  \ <<网络>> <<容器名称>>`\n\n如果已经有容器在运行，这种方法效果很好。唯一的缺点是，使用此选项将容器加入网络时，必须知道容器名称。如果容器尚未启动，第二种方法更易于管理，因为可以在\
  \ `docker run` 命令中指定 `--net` 选项，在容器启动时将其分配到一个网络。\n\n将两个或多个容器加入同一个网络可以有效地实现容器通信。如果其中一个容器运行着数据库，而其他容器需要访问该数据库，则这是必须的。对于组织微服务以提供功能完整的应用程序来说，这也是必不可少的。还有一些工具，例如\
  \ Kubernetes，可用于帮助编排和管理大量服务。如果你计划运行许多服务，那么研究一下这些工具之一可能是有意义的。\n\n有关 Docker 容器网络的更多文档，请查阅在线文档：\n\
  \n[`docs.docker.com/engine/userguide/networking/dockernetworks/`](https://docs.docker.com/engine/userguide/networking/dockernetworks/)\n\
  \n**附录 A**\n\n**使用 Apache NetBeans IDE 进行 Jakarta EE 开发**\n\n在 JVM 上开发应用程序可能是一份有趣的工作；然而，如果你需要不断关注\
  \ Java 环境的细节，它也可能变得繁琐。当仅使用文本编辑器和命令行或终端开发应用程序时，你需要时刻牢记 CLASSPATH，以确保应用程序可以访问所有必需的库。此外，如果你同时处理多个应用程序，并且需要维护某种应用程序分离的方法，那么组织起来可能会很困难。如果你不在开发环境中工作，这些只是开发可能变得繁琐的几个原因。Apache\
  \ NetBeans 集成开发环境 (IDE) 旨在通过抽象维护 CLASSPATH 的需求、有效组织代码以及提供大量功能来简化企业开发，从而减轻开发人员的负担。\n\
  \n■ **注意** 本附录涵盖了最新的 NetBeans 版本。它也适用于 Jakarta EE 开发。\n\nA-1\\. 在 NetBeans 中配置应用服务器\n\
