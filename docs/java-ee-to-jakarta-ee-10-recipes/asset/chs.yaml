  \ 配方 12-5 的输出*\n\n工作原理\n\n消息选择器是基于字符串的表达式，可以在创建消费者时分配给它们。要创建选择器，需要构建一个包含表达式的字符串，该表达式的语法基于\
  \ SQL 92 条件表达式语法的子集。该表达式字符串应制定您在消费消息时希望使用的过滤器。表达式看起来非常像数据库查询中的 `WHERE` 子句。在本配方的示例中，选择器设置为以下字符串：\n\
  \n`TYPE = 'JAKARTAEE'`\n\n此选择器导致消费者过滤所有接收到的消息，仅消费那些包含名为 `TYPE` 且值为 `JAKARTAEE` 的消息。可以使用标准\
  \ SQL 92 来组合过滤器并构建一个表达式，以提供消费者所需的过滤能力。\n\n要将选择器分配给消费者，请将其传递给 JMS 会话的 `createConsumer`\
  \ 方法。之后，创建的消费者接收到的任何消息都将根据选择器表达式进行过滤。\n\n12-6. 检查消息队列\n\n问题\n\n您的应用程序使用了 Jakarta\
  \ Messaging 队列，并且您希望浏览队列中的每条消息，但不移除它们。\n\n解决方案\n\n创建一个 `QueueBrowser` 对象，并使用它来浏览队列中包含的每条消息。\n\
  \n在以下摘自 Java 类 `org.jakartaeerecipes.chapter12.recipe12_06.Example12_06.java` 的代码中，`browseMessages`\
  \ 方法连接到一个会话，创建一个浏览器队列，并遍历队列中的消息：\n\n```java\npublic void browseMessages() {\n\n\
  \    try(Connection connection = connectionFactory.createConnection();\n\n     \
  \   Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \n        QueueBrowser browser = session.createBrowser(myQueue);) {\n\n        Enumeration\
  \ msgs = browser.getEnumeration();\n\n        if(!msgs.hasMoreElements()){\n\n \
  \           System.out.println(\"No more messages within the queue...\");\n\n  \
  \      } else {\n\n            while(msgs.hasMoreElements()){\n\n              \
  \  Message currMsg = (Message)msgs.nextElement();\n\n                System.out.println(\"\
  Message ID: \" + currMsg.getJMSMessageID());\n\n            }\n\n        }\n\n \
  \   } catch (JMSException ex) {\n\n        System.out.println(ex);\n\n    }\n\n\
  }\n```\n\n运行示例\n\n如果您部署了 `JakartaEERecipes` 项目，可以通过在浏览器中访问以下 URL 来运行示例：`http://localhost:8080/JMSDemo-1.0-SNAPSHOT/chapter12/recipe12_06.xhtml`。您可以在视图中多次点击\
  \ **Send Message** 按钮，然后点击 **Browse Through Messages** 按钮，并查看服务器日志以查看与浏览消息相关的输出。\n\
  \n您将看到如图 12-7 所示的输出。\n\n***图 12-7.** 配方 12-6 的输出*\n\n工作原理\n\n有时，能够搜索消息以找到您想阅读的那一条非常重要。在这种情况下，消息队列浏览器就派上了用场。`QueueBrowser`\
  \ 对象使应用程序能够搜索队列中的每条消息，并显示每条消息的标头值。如果消息标头包含有助于区分特定应用程序发送的每种消息类型的重要信息，那么这种能力就至关重要。`QueueBrowser`\
  \ 对象使用与创建其他 Jakarta Messaging 对象类似的语义，使得筛选消息以找到您想要的那一条变得容易。\n\n要创建 `QueueBrowser`，您必须首先有一个打开的会话对象。然后，您可以调用\
  \ `Session` 对象的 `createBrowser` 方法，并将目标类型作为参数传递。因此，如果您希望浏览名为 `jms/myQueue` 的队列中的消息，您需要将\
  \ `jms/myQueue` 的注入资源传递给 `createBrowser` 方法。一旦创建了浏览器对象，只需遍历消息，并使用调用 `browser.getEnumeration()`\
  \ 方法返回的 `Enumeration` 来浏览它们。\n\n12-7. 创建持久化消息订阅者\n\n问题\n\n您希望确保应用程序能够接收所有发布的消息，即使订阅者处于非活动状态。\n\
  \n解决方案\n\n\n\n为 Topic 目的地创建一个持久订阅者，该目的地将用于发送和接收消息。创建完成后，可以使用标准的消息发布技术将消息发布到 Topic，如配方\
  \ 12-3 所示，即发送到包含该订阅的 Topic 目的地。然后，可以通过使用该 Topic 和订阅创建的消息消费者来消费这些消息。\n\n在此示例中，创建了一个持久消息订阅者，创建并发布消息到\
  \ Topic 目的地，最后消费该消息。\n\nTopic 连接\n\nTopic 连接与 Queue 连接略有不同，它使用名为 `TopicConnection`\
  \ 的对象，而不是标准的 `Connection` 对象。此外，必须将 `TopicConnectionFactory` 注入到一个对象中，才能创建 `TopicConnection`。以下代码行演示了如何创建一个连接工厂来生成用于处理订阅的\
  \ `TopicConnection`：\n\n```java\n@Resource(name = \"jms/jakartaEERecipesConnectionFactory\"\
  )\nprivate TopicConnectionFactory connectionFactory;\n\nTopicConnection connection\
  \ = (TopicConnection) connectionFactory.createConnection();\nconnection.setClientID(\"\
  durable\");\n```\n\n创建初始持久订阅者\n\n在创建持久订阅者时，必须在向 Topic 发送任何消息之前创建一个初始的持久订阅者。这个初始订阅者将初始化订阅，并使其可用于发布和接收目的。以下代码摘录自\
  \ `org.jakartaeerecipes.chapter12.recipe12_07.Example12_07.java`，演示了如何创建持久订阅者：\n\
  \n```java\npublic void createTopicSubscriber(){\n    try {\n        createConnection();\n\
  \        TopicSession session = connection.createTopicSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \        myTopic = (Topic) getContext().lookup(\"jms/jakartaEERecipesTopic\");\n\
  \        TopicSubscriber subscriber = session.createDurableSubscriber(myTopic, \"\
  jakartaEERecipesSub\");\n        connection.close();\n    } catch (javax.naming.NamingException\
  \ | JMSException ex) {\n        Logger.getLogger(Example12_07.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n    }\n}\n```\n\n对于演示应用程序，一个 JSF `h:commandButton` 组件会调用此方法，以便您可以在服务器日志中查看输出。\n\
  \n创建并发布消息\n\n创建消息并将其发布到 Topic 与将消息发布到 Queue 非常相似。但是，不是创建生产者，而是生成一个发布者。以下代码摘录自 `org.jakartaeerecipes.chapter12.recipe12_07.Example12_07.java`，演示了如何创建一条\
  \ `Message`，然后将其发布到持久订阅者：\n\n```java\npublic void sendMessage() {\n    try {\n \
  \       createConnection();\n        System.out.println(\"Creating session\");\n\
  \        TopicSession session = connection.createTopicSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \        System.out.println(\"Creating message\");\n        TextMessage message\
  \ = session.createTextMessage();\n        message.setText(\"Jakarta EE 8 Is the\
  \ Best!\");\n        message.setStringProperty(\"TYPE\", \"JAKARTAEE\");\n     \
  \   System.out.println(\"Creating producer\");\n        myTopic = (Topic) getContext().lookup(\"\
  jms/jakartaEERecipesTopic\");\n        TopicPublisher publisher = session.createPublisher(myTopic);\n\
  \        System.out.println(\"Sending message\");\n        publisher.publish(message);\n\
  \        System.out.println(\"Message sent, closing session\");\n        publisher.close();\n\
  \        session.close();\n        connection.close();\n    } catch (NamingException\
  \ | JMSException ex) {\n        Logger.getLogger(Example12_07.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n    }\n}\n```\n\n在我们的示例视图中，此方法也绑定到一个 `h:commandButton` 组件，您可以看到方法内操作产生的更多输出。\n\
  \n接收消息\n\n每条创建并发布到 Topic 的消息稍后都会被该 Topic 的订阅者消费。以下方法演示了如何创建持久订阅者并从中接收消息：\n\n```java\n\
  public void receiveMessage() {\n    boolean stopReceivingMessages = false;\n   \
  \ try {\n        createConnection();\n        System.out.println(\"Creating session\
  \ to receive messages\");\n        TopicSession session = connection.createTopicSession(false,\
  \ Session.AUTO_ACKNOWLEDGE);\n        myTopic = (Topic) getContext().lookup(\"jms/jakartaEERecipesTopic\"\
  );\n        System.out.println(\"Setting up consumer\");\n        String selector\
  \ = \"TYPE = 'JAKARTAEE'\";\n        TopicSubscriber subscriber = session.createDurableSubscriber(myTopic,\
  \ \"jakartaEERecipesSub\");\n        connection.start();\n        while (!stopReceivingMessages)\
  \ {\n            System.out.println(\"Receiving message\");\n            Message\
  \ inMessage = subscriber.receive();\n            if (inMessage != null) {\n    \
  \            System.out.println(inMessage);\n                if (inMessage instanceof\
  \ TextMessage) {\n                    String messageStr = ((TextMessage) inMessage).getText();\n\
  \                    System.out.println(messageStr);\n                    setDisplayMessage(messageStr);\n\
  \                } else {\n                    System.out.println(\"Message was\
  \ of another type\");\n                    setDisplayMessage(\"Message was of another\
  \ type\");\n                }\n            } else {\n                stopReceivingMessages\
  \ = true;\n            }\n        }\n        connection.stop();\n        subscriber.close();\n\
  \        session.close();\n        closeConnection();\n    } catch (NamingException\
  \ | JMSException ex) {\n        Logger.getLogger(Example12_07.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n    }\n}\n```\n\n在示例程序中，`receiveMessage` 方法绑定到 JSF 视图中的一个 `h:commandButton`\
  \ 组件，您可以跟随服务器日志中看到的输出。\n\n取消订阅\n\n使用完订阅者后取消订阅非常重要，因为订阅者会占用额外的资源，如“工作原理”部分所述。以下方法演示了如何取消订阅：\n\
  \n```java\npublic void unsubscribe(){\n    try {\n        createConnection();\n\
  \        TopicSession session = connection.createTopicSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \        // close subscriber if open, then unsubscribe\n        session.unsubscribe(\"\
  jakartaEERecipesSub\");\n        connection.close();\n    } catch (JMSException\
  \ ex) {\n        Logger.getLogger(Example12_07.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n    }\n}\n```\n\n运行示例\n\n可以通过将 `JakartaEERecipes` 项目部署到您的 GlassFish\
  \ 服务器并访问以下 URL 来执行一个示例，该示例将本配方中显示的所有方法绑定到 Jakarta Server Faces 视图：`http://localhost:8080/JakartaEERecipes/chapter12/recipe12_7.xhtml`\n\
  \n您将看到如图 12-8 所示的输出。\n\n***图 12-8.** 配方 12-7 的输出*\n\n工作原理\n\n消息订阅是一个 Jakarta Messaging\
  \ 消费者，它保持与指定 Topic 目的地的持久连接。消息订阅不能用于 Queue 目的地，只能用于 Topic，因为它们使用发布/订阅消息传递。默认情况下，持久订阅者保持持久性，因为默认的传递模式是\
  \ `PERSISTENT`。订阅存储在服务器缓存中，以便在服务器发生故障时可以检索它们。由于持久消息订阅者将消息保留在缓存中，它们会占用更大的内存空间。因此，重要的是订阅者仅在必要时保持订阅状态，然后取消订阅以释放内存。\n\
  \n■ **注意** 持久订阅一次只能有一个订阅者。\n\n要使用消息订阅者，必须使用一组特殊的连接和会话对象。\n\n首先，必须将 `TopicConnectionFactory`\
  \ 注入到任何将使用 Topic 的对象中。可以通过调用 `createTopicConnection` 方法来创建 `TopicConnection`。必须创建一个\
  \ `TopicSession`，而 `TopicSession` 又由 `TopicConnection` 创建。`TopicSession` 对象可用于创建持久消息订阅者和消息发布者。\n\
  \n创建订阅者时，必须调用 Jakarta Messaging 会话方法，\n\n\n\n调用 `createDurableSubscriber` 方法，并传入\
  \ Topic 目的地以及一个用于标识订阅者的字符串。这个字符串标识符非常重要，因为消费者将使用它来订阅发布到该 Topic 的消息。`createDurableSubscriber`\
  \ 方法会生成一个 `TopicSubscriber` 对象，而创建初始的持久订阅者对于建立 Topic 订阅至关重要。一旦创建了初始的持久订阅者，就可以向该订阅发送消息，消费者也可以订阅它。\n\
  \n要创建消息并将其发送到订阅，必须调用 Jakarta Messaging 会话的 `createPublisher` 方法，并将 Topic 目的地对象作为参数传入。调用\
  \ `createPublisher` 会生成一个 `TopicPublisher` 对象，该对象可用于向 Topic 订阅发布消息。任何类型的消息都可以发送到\
  \ Topic。要了解更多关于可发送的不同类型消息的信息，请参考配方 12-3。可以向 Topic 发送任意数量的消息，如果消费者已订阅该订阅者，它将接收到这些消息。新的订阅者将从其订阅时刻开始接收发送到该订阅的消息。\n\
  \n第 12 章 ■ Jakarta 消息传递\n\n要订阅一个 Topic，应通过调用会话的 `createDurableSubscriber` 方法来创建\
  \ `TopicSubscriber` 对象，并传入 Topic 目的地对象以及最初用于建立订阅者的基于字符串的标识符。一旦创建了 `TopicSubscriber`，就可以像往常一样消费消息，为每条将要消费的消息调用\
  \ `TopicSubscriber` 的 `receive` 方法。通常，应用程序会设置一个要消费的消息数量的边界限制，并执行一个循环来从订阅的 Topic\
  \ 接收该数量的消息。\n\n由于持久订阅会占用内存，因此消费者在完成 Topic 操作后取消订阅至关重要。如果消费者不取消订阅，应用服务器将耗尽其他订阅者资源，并最终耗尽可用内存。要取消订阅消费者，请调用会话的\
  \ `unsubscribe` 方法，并传入订阅者的基于字符串的名称。我之前说过，你用来标识订阅者的那个字符串非常重要！\n\n在某些情况下，创建消息订阅非常有用。使用订阅者的相关场景可能包括：为客户端消费者订阅以接收关于应用程序错误的消息，或者用于警报系统，以便管理员可以订阅他们希望接收的警报。无论如何，只要谨慎使用并以适当的方式维护，持久订阅都是有用的。\n\
  \n12-8. 延迟消息投递\n\n问题\n\n你想要延迟正在发送的消息。\n\n解决方案\n\n通过调用生产者（producer）的 `setDeliveryDelay(long)`\
  \ 方法来设置延迟时间（以毫秒为单位）。在以下示例中，消息发送将被延迟 1000 毫秒：\n\n```java\nTopicPublisher publisher\
  \ = session.createPublisher(myTopic);\npublisher.setDeliveryDelay(1000);\n```\n\n\
  工作原理\n\n可以延迟消息的投递。Jakarta Messaging API 为生产者提供了一个名为 `setDeliveryDelay` 的方法。可以在发送消息之前调用此方法，并传入以毫秒为单位的延迟时间。一旦设置了延迟，该生产者后续的所有消息投递都将被延迟。\n\
  \n**第 13 章**\n\n**RESTful Web 服务**\n\nWeb 服务可以描述为通过 HTTP 进行通信的客户端和服务器应用程序，它为不同应用程序之间的通信和互操作性提供了标准手段。在不同的编程平台上，有许多不同的\
  \ Web 服务实现可用。Web 服务通过端点实现来提供访问。整个应用程序都可以使用 Web 服务来实现，这些服务相互传输消息和数据。Jakarta RESTful\
  \ Web 服务（以前称为 JAX-RS）在企业应用程序开发中扮演着至关重要的角色。\n\nJakarta RESTful Web 服务是用于表述性状态转移（REST）Web\
  \ 服务的 API。REST 服务对于通过 HTTP 执行操作非常有用。REST 服务实现是无状态的，并且它们占用更少的带宽，使其即使在移动设备上也非常适合 HTTP。它们利用预定义的无状态操作状态。\n\
  \nREST 支持 SSL。诸如 JSON Web 令牌（JWT）之类的新安全 API 已被引入，为 Jakarta RESTful Web 服务提供了企业应用程序所需的安全级别。\n\
  \n在接下来的几个配方中，你将学习如何开发 Jakarta RESTful Web 服务。你将学习如何配置你的环境以使用 Jakarta RESTful Web\
  \ 服务，以及如何编写客户端代码来使用这些服务。\n\n**设置 REST 环境**\n\n在本章中，我们重点介绍如何使用基于 Jersey 的 Jakarta\
  \ RESTful Web 服务实现来处理 REST 服务。如果你使用的是 GlassFish 7.0.0，则发行版中已提供了 API jar 包，因此你无需下载任何额外的库即可为你的应用程序添加\
  \ REST 功能。\n\n为了让 Jakarta RESTful Web 服务处理 REST 请求，你需要在应用程序的 `web.xml` 配置文件或 Java\
  \ 类中配置一个 REST Servlet 调度器。以下来自 `web.xml` 配置文件的摘录演示了如何为应用程序设置 Jakarta RESTful Web\
  \ 服务：\n\n```xml\n<servlet>\n    <servlet-name>jakarta.ws.rs.core.Application</servlet-name>\n\
  \    <load-on-startup>1</load-on-startup>\n</servlet>\n<servlet-mapping>\n    <servlet-name>jakarta.ws.rs.core.Application</servlet-name>\n\
  \    <url-pattern>/rest/*</url-pattern>\n</servlet-mapping>\n```\n\n...\n\n© Josh\
  \ Juneau 和 Tarun Telang 2022\nJ. Juneau 和 T. Telang, *Java EE 到 Jakarta EE 10 配方*[,\
  \ https://doi.org/10.1007/978-1-4842-8079-9_13](https://doi.org/10.1007/978-1-4842-8079-9_13#DOI)\n\
  \n第 13 章 ■ RESTful Web 服务\n\n也可以使用 Java 类中的注解来配置 Jakarta RESTful Web 服务，而无需进行 `web.xml`\
  \ 配置。为此，请将 `@ApplicationPath` 注解添加到一个扩展 `jakarta.ws.rs.core.Application` 的类上，如下所示：\n\
  \n```java\n@jakarta.ws.rs.ApplicationPath(\"rest\")\npublic class ApplicationConfig\
  \ extends Application {\n}\n```\n\n13-1. 开发一个 RESTful Web 服务\n\n问题\n\n你想要创建一个 Jakarta\
  \ RESTful Web 服务，该服务将通过互联网公开，以处理对数据的操作。\n\n解决方案 #1\n\n通过创建一个根资源类（POJO）并向该类添加资源方法来创建一个\
  \ RESTful（表述性状态转移）Web 服务。要将一个类指定为根资源类，请使用 `@Path` 对其进行注解，或者在该类中创建至少一个使用 `@Path`\
  \ 和请求方法指示符（`@GET`、`@PUT`、`@POST` 或 `@DELETE`）注解的方法。以下示例演示了如何创建一个简单的 RESTful Web\
  \ 服务，该服务向客户端显示一个字符串或 HTML。此代码的源文件可以在 `JakartaEERecipes_Chapter13` 项目的 `org.jakartaeerecipe.chapter13.SimpleRest.java`\
  \ 文件中找到：\n\n```java\npackage org.jakartaeerecipe.chapter13.rest;\n\nimport jakarta.ws.rs.GET;\n\
  import jakarta.ws.rs.Produces;\nimport jakarta.ws.rs.Path;\n\n// 设置路径为 http://host:port/<application>/rest/simplerest/\n\
  @Path(\"/simplerest\")\npublic class SimpleRest {\n    @GET\n    // 生成纯文本消息\n  \
  \  @Produces(\"text/plain\")\n```\n\n\n\npublic String getPlainMessage() {\n\nreturn\
  \ \"Hello from a simple rest service\";\n\n}\n\n@GET\n\n// 生成纯文本消息\n\n@Produces(\"\
  text/html\")\n\npublic String getHTMLMessage() {\n\nreturn \"<P>Hello from a <b>simple</b>\
  \ rest service</P>\";\n\n}\n\n}\n\n![](img/index-552_1.png)\n\n![](img/index-552_2.png)\n\
  \n第 13 章 ■ RESTful Web 服务\n\n你可以部署 JakartaEERecipes 应用程序，然后访问以下 URL 来查看 REST 服务产生的结果：http://localhost:8080/JakartaEERecipes_Chapter13-1.0-SNAPSHOT/\n\
  \nrest/simplerest。输出将如图 13-1 所示。\n\n***图 13-1.** SimpleRest 服务的输出*\n\n解决方案 #2\n\n\
  使用 IDE（例如 NetBeans）来创建一个 RESTful Web 服务。NetBeans IDE 包含用于开发不同类型 Web 服务的向导。右键单击项目，从上下文菜单中选择“新建\
  \ ➤ 其他...”，将打开“新建文件”对话框，然后可以从选择列表中选择“Web 服务”。按照以下步骤从实体类生成 REST Web 服务：1) 从“新建文件”菜单中选择“来自实体类的\
  \ RESTful Web 服务”选项。\n\n2) 从“可用实体类”列表中选择一个或多个类，然后点击“添加”按钮。在本例中，我们将选择 `org.jakartaeerecipe.entity.Book`\
  \ 实体，如图 13-2 所示。点击“下一步”。\n\n***图 13-2.** 在 NetBeans 中为 RESTful Web 服务选择实体类*\n\n\
  3) 列出将生成 REST 服务类的包，以及包的位置（见图 13-3）。点击“完成”。\n\n![](img/index-553_1.png)\n\n第 13\
  \ 章 ■ RESTful Web 服务\n\n***图 13-3.** 在 NetBeans 中为 REST 服务类选择资源包*\n\n执行这些步骤后，将生成一个类似于以下类的\
  \ REST 服务类：\n\n// ....\n\n@Stateless\n\n@Path(\"org.jakartaeerecipe.entity.book\"\
  )\n\npublic class BookFacadeREST extends AbstractFacade<Book> {\n\n@PersistenceContext(unitName\
  \ = \"JakartaEERecipesPU\")\n\nprivate EntityManager em;\n\npublic BookFacadeREST()\
  \ {\n\nsuper(Book.class);\n\n}\n\n@POST\n\n@Override\n\n@Consumes({\"application/xml\"\
  , \"application/json\"})\n\npublic void create(Book entity) {\n\nsuper.create(entity);\n\
  \n}\n\n@PUT\n\n@Override\n\n@Consumes({\"application/xml\", \"application/json\"\
  })\n\npublic void edit(Book entity) {\n\nsuper.edit(entity);\n\n}\n\n@DELETE\n\n\
  @Path(\"{id}\")\n\npublic void remove(@PathParam(\"id\") BigDecimal id) {\n\nsuper.remove(super.find(id));\n\
  \n}\n\n第 13 章 ■ RESTful Web 服务\n\n@GET\n\n@Path(\"{id}\")\n\n@Produces({\"application/xml\"\
  , \"application/json\"})\n\npublic Book find(@PathParam(\"id\") BigDecimal id) {\n\
  \nreturn super.find(id);\n\n}\n\n@GET\n\n@Override\n\n@Produces({\"application/xml\"\
  , \"application/json\"})\n\npublic List<Book> findAll() {\n\nreturn super.findAll();\n\
  \n}\n\n@GET\n\n@Path(\"{from}/{to}\")\n\n@Produces({\"application/xml\", \"application/json\"\
  })\n\npublic List<Book> findRange(@PathParam(\"from\") Integer from, @PathParam(\"\
  to\") Integer to) {\n\nreturn super.findRange(new int[]{from, to});\n\n}\n\n@GET\n\
  \n@Path(\"count\")\n\n@Produces(\"text/plain\")\n\npublic String countREST() {\n\
  \nreturn String.valueOf(super.count());\n\n}\n\n@Override\n\nprotected EntityManager\
  \ getEntityManager() {\n\nreturn em;\n\n}\n\n}\n\n工作原理\n\nRESTful Web 服务易于开发，并且可以生成和消费多种不同类型的媒体。\n\
  \n在大多数情况下，对于需要通过互联网发送和接收信息的服务，推荐使用 REST Web 服务。在应用程序能够支持 REST 服务之前，必须对其进行适当的配置。本书使用了\
  \ Jakarta RESTful Web Services 实现，该实现基于行业标准的 REST 实现 Jersey。有关在应用程序中配置 Jakarta RESTful\
  \ Web Services 的更多信息，请参阅本章的介绍。\n\n一个作为 REST 服务实现的 Java 类包含大量的注解。表 13-1 列出了可能用于创建\
  \ REST 服务的注解。\n\n第 13 章 ■ RESTful Web 服务\n\n***表 13-1.** REST 服务注解*\n\n**注解**\n\n\
  **描述**\n\n@POST\n\n请求方法指示符，用于处理 HTTP POST 请求\n\n@GET\n\n请求方法指示符，用于处理 HTTP GET 请求\n\
  \n@PUT\n\n请求方法指示符，用于处理 HTTP PUT 请求\n\n@DELETE\n\n请求方法指示符，用于处理 HTTP DELETE 请求\n\n\
  @HEAD\n\n请求方法指示符，对应于 HTTP HEAD 方法。用于处理 HTTP HEAD 请求\n\n@Path\n\n此注解的值应与指示 Java 类所在位置的相对\
  \ URI 路径相关联。可以在 URI 中嵌入变量以形成 URI 路径模板\n\n@PathParam\n\n一种可以从请求 URI 中提取出来供资源类使用的参数类型。URI\
  \ 路径参数从请求 URI 中提取，参数名称对应于在 @Path 类级别注解中指定的 URI 路径模板变量名\n\n@QueryParam\n\n一种可以从请求中提取出来供资源类使用的参数类型。查询参数从请求中提取\n\
  \n@Consumes\n\n用于指定资源可以消费的表示的 MIME 媒体类型\n\n@Produces\n\n用于指定资源可以生成的表示的 MIME 媒体类型\n\
  \n@Provider\n\n用于任何 Jakarta RESTful Web Services 运行时感兴趣的内容，例如 MessageBodyHeader\
  \ 和 MessageBodyWriter\n\n要将一个类指定为 REST 服务，必须在类之前或至少一个类方法签名之前放置 @Path 注解。@Path 注解用于指示应与服务对应的\
  \ URI。完整的 URI 包括主机名、端口号、应用程序名称和 REST servlet 名称，后跟由 @Path 注解指定的路径。在示例中，@Path 注解将\
  \ `/simplerest` 指定为服务路径，因此 URL `http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/rest/simplerest`\
  \ 将调用该 Web 服务。可以通过使用语法 `{var}` 将变量括在括号内来在 URL 中包含变量。例如，如果每个用户都有自己特定站点的配置文件，则 @Path\
  \ 注解可以如下所示：\n\n...\n\n@Path(\"/simplerest/{user}\")\n\n...\n\n在这种情况下，URL 可能如下所示：`http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/rest/simplerest/Juneau`。\n\
  \n@Path 注解也可以在任何标记有 @GET、@POST、@PUT 或 @DELETE 的方法之前指定，以指定用于调用该方法的 URI。此外，可以在路径中放置变量以接受更动态的\
  \ URL。例如，假设在解决方案 #1 的类中添加了一个方法，该方法将为 URL 中作为参数指定的用户返回问候语。你可以执行类似以下操作来使 URL 唯一：\n\
  \n@Path(\"{user}\")\n\n@GET\n\n![](img/index-556_1.png)\n\n第 13 章 ■ RESTful Web\
  \ 服务\n\n@Produces(\"text/html\")\n\npublic String getUserMessage(@PathParam(\"user\"\
  ) String user){\n\nreturn \"Greetings \" + \"<b>\" + user + \"</b>\";\n\n}\n\n在这种情况下，如果将类似以下的\
  \ URL 输入浏览器，则会调用 `getUserMessage` 方法：`http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/rest/simplerest/josh`。如果指定了此\
  \ URL，则会调用该方法，将“josh”作为用户变量值传递，并且消息将如图 13-4 所示显示。\n\n***图 13-4.** 来自 /rest/simplerest/{user}\
  \ 服务的输出*\n\n■ **注意** 创建可读性强且能提供关于 Web 服务的直观信息的 URI 非常重要。基于这些标准的 URI 有助于减少客户端应用程序中的错误，并使\
  \ Web 服务更具功能性。\n\n\n\n使用 `@GET`、`@POST`、`@PUT` 或 `@DELETE` 注解来标记方法，以处理所需的 Web 服务请求类型。这样做将生成\
  \ Web 服务功能。如果 REST Web 服务实现中存在多个方法，并且 `@Path` 仅在类级别指定而未在方法级别指定，则将调用返回客户端所需 MIME\
  \ 类型的方法。如果你希望方法显示内容，请使用 `@GET` 标记方法。如果你希望创建一个用于新建对象的方法，请将方法标记为 `@POST`。如果你正在创建一个用于插入或替换已有对象的方法，请使用\
  \ `@PUT` 标记它。最后，如果你正在创建一个用于移除对象的方法，请使用 `@DELETE` 标记它。有关这些注解的更多信息，请参考配方 13-3。\n\n\
  如果 REST 服务包含许多不同的方法和路径，它可能会变得复杂。有些应用程序完全基于 REST 服务构建，其中所有 CRUD（创建、检索、更新、删除）操作都通过\
  \ Web 服务调用执行。本配方仅为使用 Jakarta RESTful Web Services 进行开发提供了基础，因为该主题过于复杂，无法用几个配方或单独一章来涵盖。\n\
  \n13-2. 使用 REST 进行消费与生产\n\n问题\n\n你希望使用 RESTful Web 服务生成不同类型的内容。此外，你还希望该 Web 服务也能消费内容。\n\
  \n解决方案\n\n在 Web 服务实现类中创建方法，使用 `@GET` 注解来生成输出，并可选择性地结合 `@Produces` 来指定输出类型。使用 `@POST`\
  \ 或 `@PUT` 注解方法来更新或插入数据。以下各节提供了使用这些解决方案的示例。\n\n第 13 章 ■ RESTful Web 服务\n\n在你的 `pom.xml`\
  \ 文件中添加 Jakarta XML Binding 库的 Maven 依赖项，如下所示：\n\n<dependency>\n\n<groupId>jakarta.xml.bind</groupId>\n\
  \n<artifactId>jakarta.xml.bind-api</artifactId>\n\n<version>4.0.0</version>\n\n\
  </dependency>\n\n生成输出\n\n使用 `@Produces` 注解来指定你希望从被修饰的方法生成的内容类型。以下摘录取自 JakartaEERecipes\
  \ 项目源码 `org.jakartaeerecipe.chapter13.rest.SimpleRest`，演示了 `@Produces` 的使用：\n\n\
  @GET\n\n// 生成一条 XML 消息\n\n@Produces(\"application/xml\")\n\npublic MessageWrapperList\
  \ getXMLMessage() {\n\n// 将字符串传递给 MessageWrapper 类，该类将 String 编组为 XML\n\nreturn\
  \ new MessageWrapper(\"来自简单 REST 服务的问候\");\n\n}\n\n生成列表输出\n\n使用 `@Produces` 注解来指定你希望从被修饰的方法生成的内容类型。以下摘录取自\
  \ JakartaEERecipes 项目源码 `org.jakartaeerecipe.chapter13.rest.SimpleRest`，演示了 `@Produces`\
  \ 的使用，并返回一个包含结果列表的对象：\n\n@GET\n\n// 生成一条 XML 消息\n\n@Path(\"all\")\n\n@Produces(\"\
  application/xml\")\n\npublic MessageWrapperList getXMLMessageList() {\n\nArrayList<String>\
  \ messageList = new ArrayList<>();\n\nmessageList.add(\"字符串 1\");\n\nmessageList.add(\"\
  字符串 2\");\n\nreturn new MessageWrapperList(messageList);\n\n}\n\n在此例中，`MessageWrapperList`\
  \ 对象的源代码如下所示，但此示例可以修改为接受任何对象类型的列表，而不仅仅是字符串：\n\npackage org.jakartaeerecipe.chapter13.recipe13_02;\n\
  \nimport java.util.ArrayList;\n\nimport java.util.Collection;\n\nimport java.util.List;\n\
  \nimport jakarta.xml.bind.annotation.XmlElement;\n\nimport jakarta.xml.bind.annotation.XmlRootElement;\n\
  \nimport jakarta.xml.bind.annotation.XmlSeeAlso;\n\n第 13 章 ■ RESTful Web 服务\n\n\
  @XmlRootElement(name=\"messageWrapperList\")\n\n@XmlSeeAlso(String.class)\n\npublic\
  \ class MessageWrapperList extends ArrayList<String> {\n\nprivate static final long\
  \ serialVersionUID = 1L;\n\npublic MessageWrapperList(){\n\nsuper();\n\n}\n\npublic\
  \ MessageWrapperList(Collection<? extends String> message){\n\nsuper(message);\n\
  \n}\n\n@XmlElement(name=\"messageList\")\n\npublic List<String> getMessageList()\
  \ {\n\nreturn this;\n\n}\n\n\n\npublic void setMessageList(List<String> messages)\
  \ {\n\nthis.addAll(messages);\n\n}\n\n}\n\n接收输入\n\n在 Web 服务类中使用 `@PUT` 注解方法，以指示某些内容正在被传递给该方法。要指定传递内容的类型，请使用\
  \ `@Consumes(content-type)` 注解同一方法。以下摘录自 JakartaEERecipes 项目源码 `org.jakartaeerecipe.chapter13.rest.SimpleRest.java`，演示了\
  \ `@Consumes` 的用法：\n\n@PUT\n\n@Path(\"add\")\n\n@Consumes(\"text/plain\")\n\npublic\
  \ String add(@QueryParam(\"text\") String text){\n\nthis.message = text;\n\nreturn\
  \ message;\n\n}\n\n要输入一条内容为“JakartaEERecipes”的新消息，应发出以下请求：\n\nPUT http://localhost:8080/JakartaEERecipes/rest/simplerest/add?text=JakartaEERecipes\n\
  \n图 13-5 展示了来自 POSTMAN 的请求/响应截图。\n\n![](img/index-559_1.jpg)\n\n第 13 章 ■ RESTFul\
  \ Web 服务\n\n***图 13-5.** 配方 13-2 的输出*\n\n工作原理\n\n按照配方 13-2 中概述的步骤创建一个 Web 服务类，然后通过适当注解将\
  \ Web 服务中的方法指定为生产者或消费者。将生成某种类型输出的方法应使用 `@Produces` 注解，该注解随后应指定生成的输出类型。此外，生成输出的方法还应使用\
  \ `@GET` 注解，这表示该方法是读取资源。将接收输入的方法应使用 `@PUT` 或 `@POST` 注解。`@PUT` 注解表示将创建一个新资源，而 `@POST`\
  \ 注解表示将更新现有资源或创建新资源。顺便提一下，接收输入的方法还应使用 `@Consumes` 注解，该注解随后应指定所消费内容的类型。总的来说，`@Produces`\
  \ 注解应与 `@GET` 注解的方法相对应。也就是说，使用 `@GET` 装饰的方法将向客户端返回一些内容。`@Consumes` 注解应与使用 `@PUT`\
  \ 或 `@POST` 注解的方法相对应。\n\n在本配方的解决方案中，演示了两种类型的方法。第一个示例演示了一个生成 XML 内容的 REST 方法，`@Produces(\"\
  application/xml\")` 注解表明了这一点。在该方法内部，一个字符串被传递给名为 `MessageWrapper` 的类。`MessageWrapper`\
  \ 类负责使用 Jakarta XML Binding 将该字符串编组为 XML。更多信息，请参考位于 `org.jakartaeerecipe.chapter13.recipe13_02.MessageWrapper.java`\
  \ 的源码，并查阅在线 Jakarta XML Binding 文档，网址为 [`eclipse-ee4j.github.io/jakartaee-tutorial/#using-jakarta-rest-with-jakarta-xml-binding`](https://eclipse-ee4j.github.io/jakartaee-tutorial/#using-jakarta-rest-with-jakarta-xml-binding)。Jakarta\
  \ RESTful Web 服务的美妙之处在于，几乎任何内容类型都可以生成。客户端应用程序可以访问与 Web 服务的 `@GET` 方法相对应的 URL，并将以适合该客户端的格式返回内容。例如，如果客户端是\
  \ Web 浏览器，它将在 Web 服务中查找生成 `text/html` 内容的方法，然后调用该方法。\n\n本配方解决方案中的另一个示例演示了一个消费字符串内容的\
  \ REST 方法。`@PUT` 注解表示将使用该请求生成一个新对象或更新一个现有对象。在这种情况下，基于字符串的消息字段会被更新为通过 `text` 变量传递给\
  \ Web 服务的内容。`@Path` 注解已放置在方法签名之上，以指示应使用格式为 `/add` 的路径来访问此方法。最后，`@Consumes` 注解指示该方法将消费纯文本。\n\
  \n第 13 章 ■ RESTFul Web 服务\n\n如果有人想要返回一个值列表，那么使用一个包装类来消费返回的实体对象列表并将其存储到本地 `List`\
  \ 中，可能是最佳方法之一。在示例中，`getXMLMessageList()` 服务返回一个 `List<String>`。这是通过使用一个名为 `MessageWrapperList`\
  \ 的包装对象实现的，该对象扩展了 `ArrayList<String>`，因此可以接受一个字符串列表，并在调用 `getMessageList()` 方法时返回该列表。使用这样的包装对象可以轻松地向\
  \ Web 服务发送数据列表或从中接收数据列表。\n\n此示例中的 REST 服务非常简短，而在实际场景中，REST 服务实现中会使用许多生成和消费不同类型内容的方法。通常认为在\
  \ POST/PUT 中使用查询参数是不好的做法。本配方中的代码片段仅用于演示 API 功能；因此，在生产场景中，需要谨慎使用。\n\n13-3. 过滤请求和响应\n\
  \n问题\n\n您希望在 Web 服务请求被发送到网络之前，或在 Web 服务响应被发送回客户端之前，对其执行某些操作。\n\n解决方案\n\n对 Web 服务请求或响应应用过滤器或拦截器以执行所需操作。以下示例过滤器用于在传入请求被处理之前以及在响应被发送回客户端之前，将警报写入系统日志：\n\
  \nimport java.io.BufferedReader;\n\nimport java.io.IOException;\n\nimport java.io.InputStream;\n\
  \nimport java.io.InputStreamReader;\n\nimport jakarta.annotation.Priority;\n\nimport\
  \ jakarta.ws.rs.Priorities;\n\nimport jakarta.ws.rs.container.ContainerRequestContext;\n\
  \nimport jakarta.ws.rs.container.ContainerRequestFilter;\n\nimport jakarta.ws.rs.container.ContainerResponseContext;\n\
  \nimport jakarta.ws.rs.container.ContainerResponseFilter;\n\nimport jakarta.ws.rs.ext.Provider;\n\
  \nimport org.jakartaeerecipe.chapter13.rest.interfaces.Alerter;\n\n@Provider\n\n\
  @Alerter\n\npublic class AlertFilter implements ContainerRequestFilter,\n\nContainerResponseFilter\
  \ {\n\n@Override\n\npublic void filter(ContainerRequestContext requestContext)\n\
  \nthrows IOException {\n\nalert(requestContext);\n\n}\n\n@Override\n\npublic void\
  \ filter(ContainerRequestContext crc, ContainerResponseContext crc1) throws\n\n\
  IOException {\n\nalert(crc);\n\n}\n\n第 13 章 ■ RESTFul Web 服务\n\npublic void alert(ContainerRequestContext\
  \ context) {\n\ntry(InputStream in = context.getEntityStream();) {\n\nif (in !=\
  \ null) {\n\nInputStreamReader inreader = new InputStreamReader(in);\n\nBufferedReader\
  \ reader = new BufferedReader(inreader);\n\nString text = \"\";\n\nwhile ((text\
  \ = reader.readLine()) != null) {\n\nSystem.out.println(text);\n\n}\n\n}\n\n} catch\
  \ (IOException ex) {\n\n// 错误处理\n\n}\n\n}\n\n}\n\n工作原理\n\n过滤器和拦截器的概念类似于邮局在邮件送达您的地址之前对其进行处理。消息并非直接从点\
  \ A 传递到点 B，而是首先被路由到一个或多个邮局，在那里进行进一步处理，然后才到达点 B。Web 资源过滤器和拦截器将相同的概念应用于通过 Web 服务处理的请求或响应。如果过滤器或拦截器绑定到某个\
  \ Web 资源，那么它将在对该 Web 资源的请求或响应的生命周期中的某个时刻被调用。过滤器或拦截器的类型决定了它在生命周期的哪个阶段被应用。拦截器（也称为实体拦截器）在指定的扩展点环绕方法调用。而过滤器则在指定的扩展点执行代码，但它们不会环绕方法。在接下来的几节中，您将更详细地了解每种类型及其用法。\n\
  \n过滤器\n\n\n\n扩展点是一个包含方法的接口，该方法负责过滤或拦截请求或响应。过滤器有四个这样的扩展点接口，分别是 `ClientRequestFilter`、`ClientResponseFilter`、`ContainerRequestFilter`\
  \ 和 `ContainerResponseFilter`。扩展点的名称有助于描述应用了哪个过滤器以及在哪个阶段应用。`ClientRequestFilter`\
  \ 和 `ClientResponseFilter` 用于 Jakarta RESTful Web Services 客户端 API。`ClientRequestFilter`\
  \ 在 HTTP 请求发送到网络之前应用。`ClientResponseFilter` 在收到服务器响应后、控制权返回给应用程序之前应用。`ContainerRequestFilter`\
  \ 和 `ContainerResponseFilter` 类用于 Jakarta RESTful Web Services 服务器端 API。与客户端过滤器类似，`ContainerRequestFilter`\
  \ 在收到客户端请求时应用，而 `ContainerResponseFilter` 在 HTTP 响应发送之前应用。\n\n实体拦截器\n\n如前所述，扩展点是一个包含方法的接口，该方法负责过滤或拦截请求或响应。实体拦截器有两个这样的扩展点，分别是\
  \ `ReaderInterceptor` 和 `WriterInterceptor`。一个实体拦截器类必须实现其中一个或两个扩展点。同样如前所述，实体拦截器包装了对方法的调用。更具体地说，`MessageBodyWriter`\
  \ 实现包装了对 `writeTo` 方法的调用，而 `MessageBodyReader` 实现包装了对 `readFrom` 方法的调用。\n\n第 13\
  \ 章 ■ RESTFul Web 服务\n\n绑定过滤器和拦截器\n\n过滤器和拦截器必须与应用程序类或方法关联，这个过程也称为*绑定*。默认的绑定类型是全局绑定，任何不包含注解的过滤器或拦截器都会被全局绑定。全局绑定将过滤器或拦截器与应用程序中的所有资源方法关联。也就是说，每当调用资源方法时，所有全局绑定的过滤器和拦截器也会被处理。\n\
  \n过滤器和拦截器可以通过 `Application` 或 `Configuration` 手动注册，也可以动态注册。要指示过滤器或拦截器应动态注册，应使用 `@Provider`\
  \ 对其进行注解。如果过滤器或拦截器未如此注解，则必须手动注册。\n\n要手动将过滤器或拦截器绑定到资源方法，过滤器或拦截器类必须使用 `@NameBinding`\
  \ 注解进行标记。`@NameBinding` 注解可以像标准注解一样编写，但其接口中也应包含 `@NameBinding` 注解。以下注解代码可用于创建一个\
  \ `@NameBinding` 注解，该注解可以放在负责触发警报的过滤器上：\n\n// ...\n\n@NameBinding\n\n@Target({ ElementType.TYPE,\
  \ ElementType.METHOD })\n\n@Retention(value = RetentionPolicy.RUNTIME)\n\npublic\
  \ @interface Alerter { }\n\n要将 `@NameBinding` 与过滤器或拦截器关联，只需使用它来注解过滤器或拦截器类。以下 `AlertFilter`\
  \ 类是一个使用 `@Alerter` 注解标记的过滤器实现：\n\n@Provider\n\n@Alerter\n\nclass AlertFilter implements\
  \ ContainerRequestFilter,\n\nContainerResponseFilter {\n\n...\n\n}\n\n现在，可以通过使用与过滤器类相同的\
  \ `@NameBinding` 注解来注解资源方法，从而将该过滤器绑定到资源方法，如下例所示：\n\n@GET\n\n@Produces(\"text/html\"\
  )\n\n@Alerter\n\npublic String getJobs(){\n\n...\n\n}\n\n■ **注意** 同样的概念可以应用于 `Application`\
  \ 子类，以全局绑定过滤器或拦截器。\n\n第 13 章 ■ RESTFul Web 服务\n\n设置优先级\n\n如前所述，过滤器和拦截器可以形成链。过滤器或拦截器链根据给定的优先级调用单个过滤器或拦截器。要为过滤器或拦截器分配优先级，请使用\
  \ `@BindingPriority` 注解标记实现类。使用整数值来关联优先级。整数值越大，优先级越高。因此，分配了最高优先级整数的过滤器或拦截器将首先被调用，而最低优先级整数将被最后调用。\n\
  \n13-4\\. 异步处理长时间运行的操作\n\n问题\n\n您的服务器端 Jakarta RESTful Web Services 方法包含一个长时间运行的操作，您希望在等待事件完成时避免阻塞。\n\
  \n解决方案\n\n执行异步处理，以便包含长时间运行操作的资源方法可以告知 Jakarta RESTful Web Services 响应尚未就绪，但将在未来某个时刻生成。在以下示例中，名为\
  \ `AsyncResource` 的 Jakarta RESTful Web Services 服务包含一个名为 `asyncOperation` 的资源方法。`asyncOperation`\
  \ 方法包含一个长时间运行的任务，该任务被交给 `ManagedExecutorService` 进行处理：\n\nimport jakarta.annotation.Resource;\n\
  \nimport jakarta.enterprise.concurrent.ManagedExecutorService;\n\nimport jakarta.ws.rs.GET;\n\
  \nimport jakarta.ws.rs.Path;\n\nimport jakarta.ws.rs.container.AsyncResponse;\n\n\
  import jakarta.ws.rs.container.Suspended;\n\n/**\n\n* 配方 13-5：异步处理\n\n* @author\
  \ Juneau\n\n*/\n\n@Path(\"/asynchronous/asyncResource\")\n\npublic class AsyncResource\
  \ {\n\n@Resource(name = \"concurrent/__defaultManagedExecutorService\")\n\nManagedExecutorService\
  \ mes;\n\n@GET\n\npublic void asyncOperation(@Suspended final AsyncResponse ar){\n\
  \nmes.submit(\n\nnew Runnable() {\n\npublic void run(){\n\n// 执行长时间运行的操作\n\nlongRunningOperation();\n\
  \nar.resume(\"正在执行异步操作\");\n\n}\n\n});\n\n}\n\n第 13 章 ■ RESTFul Web 服务\n\npublic\
  \ void longRunningOperation(){\n\n// 这是一个包含长时间运行操作的方法\n\nSystem.out.println( \"\
  正在执行长时间运行的任务...\");\n\n}\n\n}\n\n■ **注意** 要了解更多关于 `ManagedExecutorService` 的信息，请参见第\
  \ 16 章。\n\n工作原理\n\nJakarta RESTful Web Services API 可以将长时间运行的任务交给 `ManagedExecutorService`\
  \ 进行处理。这允许服务器端资源将控制权返回给客户端，并避免有问题的阻塞。\n\n该 API 还包含一种注册超时处理程序的方法，以防异步进程在指定时间内未返回，以及客户端异步功能。首先，将描述服务器端异步实现，然后是其他实现。\n\
  \n要在 Jakarta RESTful Web Services 资源中执行异步处理，包含长时间运行操作的资源方法必须通过使用 `@Suspended` 注解来接受一个\
  \ `AsyncResponse` 实例。`AsyncResponse` 类提供了一种恢复操作并将控制权返回给客户端的方法。必须在类中提供一个 `ManagedExecutorService`（更多信息请参见第\
  \ 16 章），并且必须调用它来提交一个新的 `Runnable`，其中包含长时间运行的操作以及对 `AsyncResponse.resume()` 的调用，以便在长时间运行的过程完成后将控制权返回给客户端。当调用\
  \ `ManagedExecutorService` 的 `submit` 方法时，`Runnable` 被传递给服务器进行进一步处理，派生一个线程来执行任务并立即返回。当长时间运行的任务完成时，它将被传递回应用程序，调用\
  \ `AsyncResponse` 的 `resume` 方法。\n\n为了避免长时间运行的操作永不返回并导致挂起的连接等待\n\n\n\n可以指定一个超时值。超时值可以通过\
  \ `AsyncResponse.setTimeoutHandler()` 方法设置一个超时处理器来指定，该方法需要传入一个新的 `TimeoutHandler`\
  \ 实例。\n\n在调用 `setTimeoutHandler` 之后，可以通过调用 `AsyncResponse.setTimeout()` 方法来设置超时时间，该方法需要传入一个\
  \ `java.util.concurrent.TimeUnit` 类型的单位。例如，以下几行代码演示了如何为本方案解决方案中资源所包含的长时间运行操作设置 30\
  \ 秒的超时时间：\n\n...\n\n@GET\n\npublic void asyncOperation(@Suspended final AsyncResponse\
  \ ar){\n\n    ar.setTimeoutHandler(new TimeoutHandler() {\n\n        public void\
  \ handleTimeout(AsyncResponse ar){\n\n            ar.resume(\"Timed out\");\n\n\
  \        }\n\n    });\n\n    ar.setTimeout(30, SECONDS);\n\n    mes.submit(\n\n\
  \        new Runnable() {\n\n            public void run(){\n\n                //\
  \ 执行长时间运行的操作\n\n                longRunningOperation();\n\n                ar.resume(\"\
  Performing asynchronous operation\");\n\n            }\n\n        });\n\n}\n\n...\n\
  \n■ **注意** 当达到超时值且没有超时处理器时，Jakarta RESTful Web Services 实现将生成一个状态码为 503 的 `ServiceUnavailableException`。\n\
  \n正如本节开头所述，异步 Jakarta RESTful Web Services API 也已扩展到客户端 API。默认情况下，从客户端到目标的调用是以同步方式执行的，但可以通过调用\
  \ `async` 方法并可选地注册一个 `InvocationCallback` 实例来将其更改为异步方式。例如，以下几行代码演示了客户端对本方案解决方案中展示的\
  \ Web 服务资源的调用：\n\nClient client = ClientBuilder.newClient();\n\nTarget target =\
  \ client.target(\"http://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/rest/asynchronous/asyncResource\"\
  );\n\nTarget.request().async().get();\n\n有关客户端 API 和异步操作的更多信息，请参阅在线 Jakarta RESTful\
  \ Web Services 文档。\n\n13-5. 从服务器推送单向异步更新\n\n问题\n\n您希望将单向消息从服务器推送到一个或多个客户端。\n\n解决方案\n\
  \n利用服务器发送事件（SSE）将消息从服务器推送到一个或多个客户端。Jakarta RESTful Web Services 2.1 API 引入了 SSE\
  \ 的概念，它允许将消息从服务器推送到已订阅的客户端。它还允许订阅事件来执行服务器操作。以下示例包含一个 Jakarta RESTful Web Services\
  \ 类的源代码。该类包含一个 `send` 方法，该方法允许客户端连接到服务器，并从服务器获取通过服务器发送事件广播的消息：\n\npackage org.jakartaeerecipe.chapter13.rest.service;\n\
  \nimport jakarta.ws.rs.GET;\n\nimport jakarta.ws.rs.Path;\n\nimport jakarta.ws.rs.Produces;\n\
  \nimport jakarta.ws.rs.core.Context;\n\nimport jakarta.ws.rs.core.MediaType;\n\n\
  import jakarta.ws.rs.sse.Sse;\n\nimport jakarta.ws.rs.sse.SseEventSink;\n\n@Path(\"\
  sse\")\n\npublic class SSEEventResource {\n\n    @Resource(name = \"DefaultManagedExecutorService\"\
  )\n\n    ManagedExecutorService executor;\n\n    public SSEEventResource() {\n\n\
  \    }\n\n    @GET\n\n    @Path(\"send\")\n\n    @Produces(MediaType.SERVER_SENT_EVENTS)\n\
  \n    public void send(@Context SseEventSink eventSink,\n\n                    \
  \ @Context Sse sse) {\n\n        executor.execute(() -> {\n\n            try (SseEventSink\
  \ sink = eventSink) {\n\n                eventSink.send(sse.newEvent(\"Welcome to\
  \ the List!\"));\n\n                eventSink.send(sse.newEvent(\"Message One!\"\
  ));\n\n                eventSink.send(sse.newEvent(\"SERVER-NOTIFICATION\", \"Message\
  \ Two!\"));\n\n                eventSink.send(sse.newEventBuilder()\n\n        \
  \                .comment(\"Nice Test\")\n\n                        .name(\"SERVER-TEST\"\
  )\n\n                        .data(\"Some data...could be an object\")\n\n     \
  \                   .build());\n\n                eventSink.close();\n\n       \
  \     }\n\n        });\n\n    }\n\n}\n\n可以访问以下 URL 查看广播的结果消息：\n\nhttp://localhost:8080/JakartaEERecipes_Chapter08-1.0-SNAPSHOT/rest/sse/send.\n\
  \n要同时向多个客户端广播，可以使用 `SseBroadcaster` 注册多个 `SseEventSink` 实例并发送消息。以下示例演示了如何构建一个 Jakarta\
  \ RESTful Web Services 类，该类允许客户端注册，并允许服务器向这些已注册的客户端广播事件：\n\npackage org.jakartaeerecipe.chapter13.rest.service;\n\
  \nimport java.util.UUID;\n\nimport jakarta.annotation.PostConstruct;\n\nimport jakarta.ejb.Singleton;\n\
  \nimport jakarta.ws.rs.GET;\n\nimport jakarta.ws.rs.POST;\n\nimport jakarta.ws.rs.Path;\n\
  \nimport jakarta.ws.rs.PathParam;\n\nimport jakarta.ws.rs.Produces;\n\nimport jakarta.ws.rs.core.Context;\n\
  \nimport jakarta.ws.rs.core.MediaType;\n\nimport jakarta.ws.rs.sse.Sse;\n\nimport\
  \ jakarta.ws.rs.sse.SseBroadcaster;\n\nimport jakarta.ws.rs.sse.SseEventSink;\n\n\
  @Path(\"/\")\n\n@Singleton\n\npublic class SSEEventBroadcaster {\n\n    @Context\n\
  \n    private Sse sse;\n\n    private volatile SseBroadcaster sseBroadcaster;\n\n\
  \    public SSEEventBroadcaster() {\n\n    }\n\n    @PostConstruct\n\n    public\
  \ void init() {\n\n        sseBroadcaster = sse.newBroadcaster();\n\n    }\n\n \
  \   @GET\n\n    @Path(\"register\")\n\n    @Produces(MediaType.SERVER_SENT_EVENTS)\n\
  \n    public void register(@Context SseEventSink eventSink) {\n\n        eventSink.send(sse.newEvent(\"\
  Thanks for registering!\"));\n\n        sseBroadcaster.register(eventSink);\n\n\
  \    }\n\n    @POST\n\n    @Path(\"send/{message}\")\n\n    public void broadcast(@PathParam(\"\
  message\") String message) {\n\n        sseBroadcaster.broadcast(sse.newEventBuilder()\n\
  \n                .mediaType(MediaType.APPLICATION_JSON_TYPE)\n\n              \
  \  .id(UUID.randomUUID().toString())\n\n                .name(\"SSEEventBroadcaster\
  \ Message\")\n\n                .data(message)\n\n                .build()\n\n \
  \       );\n\n    }\n\n}\n\n工作原理\n\nJakarta RESTful Web Services ([`jakarta.ee/specifications/restful-ws/`](https://jakarta.ee/specifications/restful-ws/))\
  \ 支持服务器发送事件（SSE）。服务器发送事件使得通过 HTTP 或 HTTPS 将消息从服务器同时推送到多个客户端成为可能。从客户端到服务器的连接可以保持打开状态，并且可以持续发送消息，直到客户端断开连接。该\
  \ API 包含多个用于向客户端发送消息、注册连接等的接口，它们都位于 `jakarta.ws.rs.sse` 包中。`Sse` 接口是服务器端用于创建 `OutboundSseEvent`\
  \ 和 `SseBroadcaster` 的入口点。它可以注入到字段中，或用作方法或构造函数的参数。\n\n`SseEventSink` 接口用于发送消息流，可以通过将其作为资源方法参数注入来获取。`SseEvent`\
  \ 是基础事件类，它定义了诸如 Id、Name 和 Comment 等属性。`OutboundSseEvent` 由服务器用于封装一个 `SseEvent`，而\
  \ `SseBroadcaster` 用于管理多个 `SseEventSink` 对象。`SseBroadcaster` 使服务器能够向所有已注册的客户端发送事件，并提供了处理异常的工具。\n\
  \n在第一个示例中，使用一个简单的 Jakarta RESTful Web Services 类来演示服务器如何使用单个方法注册客户端并发送一个或多个事件。在该示例中，该类在路径“sse”下注册为\
  \ RESTful Web 服务，而 `send()` 方法在路径“sse/send”下注册。`send()` 方法生成类型为 `MediaType.SERVER_SENT_EVENTS`\
  \ 的输出。它接受类型为 `SseEventSink` 和 `Sse` 的 `@Context` 参数，这些参数用于注册客户端和推送事件。该类还注入了一个 `ManagedExecutorService`\
  \ 实例，这是一个服务器端并发工具，用于执行并发进程。您可以在第 16 章中了解更多关于 `ManagedExecutorService` 的信息。在该方法内部，使用\
  \ try-with-resources 子句打开一个标识为 `eventSink` 的 `SseEventSink`。`eventSink` 用于发送多个 `SseEvent`\
  \ 实例。完成后，关闭 `eventSink`。整个过程被发送到 `ManagedExecutorService`，以便在服务器中排队并以并发方式执行。\n\n\
  \n\n下一个示例演示了如何构建一个可用于注册客户端和广播事件的 Jakarta RESTful Web Services 类。该类被注册为单例，这意味着只会构造该类的一个实例，并由所有会话使用。一个\
  \ Sse 上下文被注册到该类中，因为它可用于创建新的 SseBroadcaster 对象、新的 SseEvent 对象和新的事件构建器对象。一个 SseBroadcaster\
  \ 被声明为 volatile，这意味着它将存储在 Java 主内存中，而不是缓存中。有一个 init() 方法，它使用 @PostConstruct 注解，以便在构造后立即执行。init()\
  \ 方法包含对 sse.newBroadcaster() 的调用，从而获得一个新的 SseBroadcaster 实例。客户端可以通过调用 register Web\
  \ 服务方法来注册，该方法生成 MediaType.SERVER_SENT_EVENTS。一个 SseEventSink 上下文参数作为参数传递给 register\
  \ 方法，在实现中，通过 eventSink 发送一个新的 SseEvent。然后，该 SseEventSink 被注册到 SseBroadcaster 实例。broadcast\
  \ 方法接受一个 String 作为路径参数，在该方法内部，使用 SseBroadcaster broadcast() 来发送一个事件。该方法演示了 SseEvent\
  \ 构建器的使用。如您所见，调用 sse.\n\nnewEventBuilder() 允许使用构建器模式构建一个 SseEvent。在示例中，媒体类型被设置为\
  \ MediaType.APPLICATION_JSON_TYPE，表示 JSON：\n\nsseBroadcaster.broadcast(sse.newEventBuilder()\n\
  \n.mediaType(MediaType.APPLICATION_JSON_TYPE)\n\n.id(UUID.randomUUID().toString())\n\
  \n.name(\"SSEEventBroadcaster Message\")\n\n.data(message)\n\n.build()\n\n);\n\n\
  在下一个技巧中，我将演示如何将客户端注册到 SseBroadcaster，以及如何在客户端监听事件。\n\n13-6\\. 作为客户端接收服务器发送事件\n\n\
  问题\n\n您希望创建一个客户端，该客户端订阅一个 SseBroadcaster，服务器通过该广播器推送消息，并且您希望客户端在收到消息时执行一个操作。\n\n\
  解决方案\n\n利用服务器发送事件 (SSE) 将消息从服务器推送到一个或多个客户端。Jakarta RESTful Web Services 2.1 API\
  \ 引入了 SSE 的概念，它允许服务器向已注册的客户端广播消息。在以下示例中，一个 Jakarta Server Faces 客户端用于调用 Jakarta\
  \ RESTful Web Services SSE 广播器并进行注册。然后，客户端监听广播消息 1000\n\n毫秒：\n\npackage org.jakartaeerecipe.chapter13.rest.jsf;\n\
  \nimport jakarta.annotation.PostConstruct;\n\nimport jakarta.enterprise.context.RequestScoped;\n\
  \nimport jakarta.inject.Named;\n\n第 13 章 ■ RESTFul Web 服务\n\nimport jakarta.ws.rs.client.Client;\n\
  \nimport jakarta.ws.rs.client.ClientBuilder;\n\nimport jakarta.ws.rs.client.WebTarget;\n\
  \nimport jakarta.ws.rs.sse.SseEventSource;\n\n@Named\n\n@RequestScoped\n\npublic\
  \ class SseClient {\n\nprivate Client client;\n\n@PostConstruct\n\npublic void init()\
  \ {\n\nclient = ClientBuilder.newClient();\n\n}\n\npublic void listen() {\n\nWebTarget\
  \ target = client.target(\"http://localhost:8080/ http://localhost:8080/\n\nJakartaEERecipes_Chapter08-1.0-SNAPSHOT/rest/\
  \ ssebroadcaster/register\");\n\ntry (SseEventSource source = SseEventSource.target(target).build())\
  \ {\n\nsource.register(System.out::println);\n\nsource.open();\n\nThread.sleep(1000);\
  \ // 消费事件 1000 毫秒\n\nsource.close();\n\n} catch (InterruptedException e) {\n\n}\n\
  \n}\n\n}\n\n一个 Jakarta Server Faces commandButton 可以链接到 #{sseClient.listen} 方法，点击时将调用该客户端。\n\
  \n工作原理\n\nJakarta RESTful Web Services 客户端可以通过简单地调用广播器的注册方法来注册到 SSE 广播器。注册后，SseEventSource\
  \ 可以在定义的时间段内打开（不应无限制地保持 SseEventSource 打开），然后在完成消息监听后关闭。\n\n在示例中，SseEventSource\
  \ 被设置为广播器 URL 的目标。接下来，它将传入消息的输出注册到 System.out.println()。因此，接收到的每条消息都将写入系统日志。注册后，源被打开以接收传入消息。\n\
  \n在示例中，一个线程被硬编码为休眠 1000 毫秒。这只是为了让客户端保持打开状态以接收消息 1000 毫秒，对于生产应用程序，可能不会这样编码。\n\n最后，SseEventSource\
  \ 被关闭，从而结束客户端会话。\n\n**第 14 章**\n\n**WebSocket 与 JSON**\n\nJakarta EE 平台旨在为开发整合了\
  \ HTML5 和其他现代 Web 技术的 Java 企业解决方案提供一个通用基础。WebSocket 是一种全双工通信机制，允许在客户端和服务器之间发送文本和二进制消息，而无需\
  \ HTTP 请求/响应生命周期。WebSocket 允许客户端或服务器随时发送消息，为用户在执行任务时处理数据提供了一种异步解决方案。\n\nHTML5 已成为开发可通过万维网呈现的内容的主流标记语言。它定义了一个标准，可用于生成\
  \ HTML 和 XHTML\n\n文档。除了标准化之外，HTML5 还带来了以前仅在桌面应用程序平台上才能实现的语义特性。例如，<video> 和 <audio>\
  \ 等元素允许将媒体内容直接嵌入网页，而无需嵌入媒体播放器解决方案。\n\n毫无疑问，HTML 标准的第五次修订版 HTML5 为 Web 应用程序开发开启了新的可能性之门。\n\
  \n普遍支持的 JSON（JavaScript 对象表示法）对象已成为在端点之间发送数据的广泛采用的解决方案。基于 HTML5 的 Web 应用程序可以利用 JSON，使用\
  \ WebSocket、Ajax 或其他传输技术来传输数据。Jakarta EE 平台提供了 JSON\n\n处理 (JSON-P) API，该 API 引入了实用程序，使得在\
  \ Java 语言中构建和处理 JSON 对象更加容易。Jakarta EE 增强了对 JSON-P 的支持，允许指向 JSON 文档中的特定位置并修补现有的\
  \ JSON 文档。Jakarta EE 中还引入了 JSON 绑定 (JSON-B) API，为将 JSON 映射到 Java 对象提供了一个便捷的 API。\n\
  \n本章将重点介绍演示这些 API 的技巧。您将学习如何使用 WebSocket、JSON-P 和 JSON-B，以便您的应用程序的客户端-服务器通信变得无缝，无论用户界面是使用\
  \ HTML5、JSF 还是其他标记语言编写的。\n\n14-1\\. 创建 WebSocket 端点\n\n问题\n\n您希望创建一个可用于异步接收消息的 WebSocket\
  \ 端点。\n\n© Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang，《Java EE 到 Jakarta\
  \ EE 10 实战》[，https://doi.org/10.1007/978-1-4842-8079-9_14](https://doi.org/10.1007/978-1-4842-8079-9_14#DOI)\n\
  \n第 14 章 ■ WebSocket 与 JSON\n\n解决方案\n\n通过相应地注解服务器端 POJO（Plain Old Java Object，普通旧\
  \ Java 对象）类及其内部的方法来创建 WebSocket 端点。在以下示例中，一个名为 org.jakartaeerecipe.\n\nchapter14.recipe14_01.BookChatEndpoint\
  \ 的简单 POJO 类被注解，以指示它应作为 WebSocket 端点通过 Web 访问。该类包含一个名为 messageReceiver 的方法，该方法被注解，使其可作为可调用的消息消费者供客户端访问：\n\
  \npackage org.jakartaeerecipe.chapter14;\n\nimport jakarta.websocket.OnMessage;\n\
  \nimport jakarta.websocket.server.ServerEndpoint;\n\n@ServerEndpoint(value=\"/chat\"\
  )\n\npublic class BookChatEndpoint {\n\n@OnMessage\n\npublic String messageReceiver(String\
  \ message) {\n\nreturn \"Message Received: \" + message;\n\n}\n\n}\n\n\n\n在 GlassFish\
  \ 服务器中部署此应用程序。客户端可通过 URL `ws://localhost:8080/JakartaEERecipes_Chapter14-1.0-SNAPSHOT/chat`\
  \ 访问 WebSocket 端点。当客户端向该端点发送消息时，消息会被传递到 `messageReceiver` 方法，并在其中进行相应处理。在此例中，包含传递给端点的消息内容的字符串消息会被返回给客户端。\n\
  \n工作原理\n\n服务器端类可通过配置为 WebSocket 端点来接收来自客户端的消息。要开发一个 WebSocket 端点，需创建一个 Java POJO，并使用\
  \ `@ServerEndpoint` 注解对其进行标注。`@ServerEndpoint` 注解接受一个基于字符串的路径属性，该属性用于指示服务器可用于接受客户端消息的\
  \ URI。因此，当服务器启动时，路径属性的值会附加到 WebSocket 所在的上下文路径和应用名称的末尾。通过发起对该 URL 的调用，一个使用 `@OnMessage`\
  \ 注解的方法将被调用来处理发送的消息。\n\n在示例中，一个名为 `BookChatEndpoint` 的类被注解为 WebSocket，因此客户端可将其作为接收消息并返回响应的端点进行访问。当与\
  \ WebSocket 端点发起通信时，客户端必须使用包含“ws”URI 方案的 URL，而非“http”。“ws”URI 方案由 WebSocket 协议引入，因此表明该\
  \ URL 用于与 WebSocket 进行通信。在此示例中，客户端可通过 `BookChatEndpoint` WebSocket 向服务器发送消息，同时服务器也可向客户端发送消息，因为\
  \ WebSocket 支持全双工通信。*全双工通信*是 HTML5 标准，而非使用请求-响应通信的标准 HTTP。\n\n14-2. 向 WebSocket\
  \ 端点发送消息\n\n问题\n\n您希望将消息从客户端发送到服务器上可用的 WebSocket 端点。\n\n第 14 章 ■ WebSocket 与 JSON\n\
  \n解决方案\n\n设计一个 JavaScript 解决方案，用于将消息从客户端浏览器发送到 WebSocket 端点。通过绑定到视图中 HTML 输入标签的动作事件来调用\
  \ JavaScript 函数。在以下示例中，一个按钮包含 `onclick` 属性，该属性将调用名为 `bookChatRelay` 的 JavaScript\
  \ 函数。`bookChatRelay` 函数负责打开与 WebSocket 端点的会话，以便发送消息。以下列表摘自位于 JakartaEERecipes_Chapter14\
  \ 源代码包中 `/webapp/chapter14` 目录下的 `recipe14_02.html` 文件：\n\n```html\n<html>\n<head>\n\
  <script type=\"text/javascript\">\nvar ws;\nfunction bookChatRelay()\n{\nif (\"\
  WebSocket\" in window)\n{\nalert(\"您的浏览器支持 WebSocket！\");\nif (ws == null){\nalert(\"\
  正在创建新的 WebSocket 连接\");\nws = new WebSocket(\"ws://localhost:8080/JakartaEERecipes/chat\"\
  );\n} else {\nws.send(\"另一条消息\");\n}\nws.onopen = function()\n{\n// Web Socket 已连接，使用\
  \ send() 发送数据\nws.send(\"要发送的消息\");\nalert(\"消息已发送...\");\n};\nws.onmessage = function\
  \ (evt)\n{\nvar received_msg = evt.data;\nalert(\"来自服务器的消息: \" + received_msg);\n\
  };\nws.onclose = function()\n{\n// WebSocket 已关闭。\nalert(\"连接已关闭...\");\n};\n}\n\
  else\n{\n// 浏览器不支持 WebSocket\nalert(\"您的浏览器不支持 WebSocket！\");\n}\n}\nfunction closeConnection(){\n\
  if (ws !== null){\nws.close();\nws = null;\n}\n}\n</script>\n</head>\n<body>\n<input\
  \ id=\"wsRelay\" type=\"button\" value=\"WebSocket 测试消息\"\nonclick=\"bookChatRelay();\"\
  />\n<input id=\"closeConn\" type=\"button\" value=\"关闭连接\"\nonclick=\"closeConnection();\"\
  />\n</body>\n</html>\n```\n\n当点击按钮时，消息将从浏览器客户端发送到 WebSocket 端点，并且端点会向客户端返回一条消息。\n\
  \n\n\n■ **注意**：此测试中的 JavaScript 代码会在每次点击页面按钮时创建一个新的 WebSocket 连接。这对于测试目的来说是可以接受的，但在实际场景中，应尽可能保留并复用该连接。\n\
  \n工作原理\n\n客户端能够异步地向服务器发送消息（文本或二进制），这构成了 Ajax 和 HTML5 能力的基础。WebSockets API 允许开发者通过\
  \ JavaScript 调用 WebSocket 端点来向服务器发送消息。反过来，该 API 也允许客户端通过一系列 JavaScript 函数接收消息并进行相应处理。本示例演示了如何通过点击网页上的按钮向\
  \ WebSocket 端点发送消息。当按钮被点击时，会调用一个名为 `bookChatRelay` 的 JavaScript 函数，该函数封装了处理逻辑。\n\
  \n要通过 JavaScript 函数向 WebSocket 端点发送消息，首要任务是确认用户的浏览器是否支持 WebSocket（符合 HTML5 标准）。可以使用条件语句来执行此确认，通过以下\
  \ `if` 语句验证客户端中是否存在 `\"WebSocket\"` 对象：\n\n```javascript\nif(\"WebSocket\" in window){\n\
  \n...\n\n} else {\n\n...\n\n}\n```\n\n![](img/index-574_1.jpg)\n\n![](img/index-574_2.jpg)\n\
  \n第 14 章 ■ WebSocket 与 JSON\n\n图 14-1 显示了一个确认 WebSocket 支持的浏览器消息。\n\n***图 14-1.**\
  \ 浏览器中 WebSocket 支持的确认*\n\n如果客户端浏览器支持 WebSocket，则执行 `if` 块内的实现；否则，执行 `else` 块内的实现。要处理\
  \ WebSocket 消息，必须实例化一个新的 WebSocket 对象以建立服务器连接，这通过将 WebSocket 端点的 URL 传递给新的 WebSocket\
  \ 对象来完成：\n\n```javascript\nvar ws = new WebSocket(\"ws://localhost:8080/JakartaEERecipes_Chapter14-1.0-SNAPSHOT/chat\"\
  );\n```\n\n创建 WebSocket 的构造函数可以接受一个或两个参数。第一个参数是 WebSocket 将要连接的服务器 URL，可选的第二个参数是一个字符串，表示可用于消息传输的协议。WebSocket\
  \ 对象包含一些事件，用于帮助实现消息处理。新 WebSocket 连接的确认对话框将如图 14-2 所示。\n\n***图 14-2.** 新 WebSocket\
  \ 连接的确认*\n\n![](img/index-575_1.jpg)\n\n第 14 章 ■ WebSocket 与 JSON\n\n表 14-1 列出了\
  \ WebSocket 对象生命周期中可能发生的不同事件及其功能描述。\n\n***表 14-1.** JavaScript WebSocket 对象事件*\n\
  \n| **事件** | **处理程序方法** | **描述** |\n| :--- | :--- | :--- |\n| open | onOpen | 当\
  \ WebSocket 连接建立时发生 |\n| close | onClose | 当 WebSocket 连接关闭时发生 |\n| error | onError\
  \ | 当出现通信错误时发生 |\n| message | onMessage | 当从服务器接收到数据时发生 |\n\n成功实例化 WebSocket 对象后，将建立与服务器的连接，这将触发\
  \ `open` 事件。要处理此事件，请为 `onOpen` 处理程序分配一个函数，并在该函数内相应处理事件。消息通常在 `open` 事件发生时发送到服务器，示例中演示了这一点：\n\
  \n```javascript\nws.onopen = function()\n{\n    // Web Socket 已连接，使用 send() 发送数据\n\
  \    ws.send(\"Message to send\");\n    alert(\"Message is sent...\");\n};\n```\n\
  \n对应的输出如图 14-3 所示。\n\n***图 14-3.** WebSocket 消息发送确认提示*\n\n类似地，您可以监听任何其他事件的发生，并在事件发生时处理相应的任务。\n\
  \n在示例中，当从服务器接收到消息时，它会在一个警告对话框中打印出来。同样在示例中，当 WebSocket 关闭时，会向用户显示一个警告对话框。\n\n该示例并未演示\
  \ JavaScript 中 WebSocket 对象所有可能的用法。例如，您可以通过调用 `send()` 方法并将要发送的数据作为参数传递来向服务器发送消息。可以在\
  \ WebSocket 上调用 `close()` 方法来手动终止现有连接。图 14-4 说明了这一点。\n\n![](img/index-576_1.jpg)\n\
  \n第 14 章 ■ WebSocket 与 JSON\n\n***图 14-4.** 确认关闭 WebSocket 连接的提示*\n\nWebSocket 对象还包含有用的属性\
