  \n5-1. 为 Jakarta MVC 框架配置应用程序\n\n问题\n\n您希望创建一个 Jakarta MVC 应用程序项目。因此，您需要配置项目以使用\
  \ Jakarta MVC API（Jakarta MVC 的一种实现）。\n\n解决方案\n\n将适当的配置文件添加到项目中，并相应地配置 Jakarta RESTful\
  \ Web Services。在本章中，我将介绍使用 Maven 作为项目构建系统，但您也可以轻松地使用其他构建系统（如 Gradle）进行配置。Jakarta\
  \ MVC 应用程序的配置与使用 Jakarta RESTful Web Services 规范的应用程序非常相似。首先，让我们在 Apache NetBeans\
  \ 中创建一个新项目。创建一个 Maven Web 应用程序项目，并将其命名为 Bookstore，如图 5-2 和 5-3 所示。\n\n![](img/index-307_1.png)\n\
  \n第 5 章 ■ Jakarta MVC\n\n***图 5-2.** 新建项目*\n\n![](img/index-308_1.jpg)\n\n第 5 章\
  \ ■ Jakarta MVC\n\n***图 5-3.** 新建 Maven Web 应用程序：名称和位置*\n\n接下来，请务必选择 Jakarta EE\
  \ Web 或符合 Jakarta EE 标准的应用程序服务器进行部署，然后选择与您的应用程序服务器 Jakarta EE 版本相对应的 Jakarta EE\
  \ 版本。\n\n点击“完成”创建项目。项目创建完成后，生成一个 beans.xml 文件。为此，右键单击项目，然后点击“新建” ➤ “其他…”，如图 5-4\
  \ 所示。\n\n然后，在图 5-5 所示的对话框中，从“类别”中选择“上下文和依赖注入”，并从“文件类型”中选择“beans.xml (CDI 配置文件)”。\n\
  \n接下来，接受默认设置，将其创建在 WEB-INF 目录下并保留名称 beans.xml，最后点击“完成”。\n\n![](img/index-309_1.png)\n\
  \n![](img/index-309_2.png)\n\n第 5 章 ■ Jakarta MVC\n\n***图 5-4.** 新建文件：其他…*\n\n***图\
  \ 5-5.** 新建文件：beans.xml (CDI 配置文件)*\n\n第 5 章 ■ Jakarta MVC\n\n接下来，将所需的依赖项添加到 POM\
  \ 文件中。为此，右键单击项目，然后从上下文菜单中选择“打开 POM”。打开 POM 文件后，添加 Jakarta MVC API 的依赖项：\n\n<dependencies>\n\
  <dependency>\n<groupId>jakarta.platform</groupId>\n<artifactId>jakarta.jakartaee-web-api</artifactId>\n\
  <version>10.0.0-RC1</version>\n<scope>provided</scope>\n</dependency>\n<dependency>\n\
  <groupId>jakarta.mvc</groupId>\n<artifactId>jakarta.mvc-api</artifactId>\n<version>2.0.0</version>\n\
  </dependency>\n<dependency>\n<groupId>org.eclipse.krazo</groupId>\n<artifactId>krazo-core</artifactId>\n\
  <version>2.0.1</version>\n</dependency>\n<dependency>\n<groupId>org.eclipse.krazo</groupId>\n\
  <artifactId>krazo-jersey</artifactId>\n<version>2.0.1</version>\n</dependency>\n\
  </dependencies>\n\n`jakarta.mvc-api` 包含了 MVC 规范 2.0 中定义的 API，而 `krazo-core` 是其实现。\n\
  \n对于 GlassFish，由于其底层的 RESTful Web Service 提供者是 Jersey，您需要将 `krazo-jersey` 作为适配器添加到依赖中。如果您的应用程序服务器使用其他\
  \ RESTful Web Services 实现（如 RESTEasy 和 cxf），则需要将此依赖项替换为相应的适配器。\n\n最后，需要配置应用程序以使用\
  \ Jakarta RESTful Web Services。为此，在 `org.jakartaeerecipe.bookstore` 包中创建一个 `ApplicationConfig`\
  \ 类，方法是选择“文件” ➤ “新建” ➤ “Java 类”，如图 5-6 所示。\n\n![](img/index-311_1.jpg)\n\n第 5 章\
  \ ■ Jakarta MVC\n\n***图 5-6.** 创建 ApplicationConfig 类*\n\n`ApplicationConfig` 类用于将\
  \ RESTful Web 服务映射到 URI。`@ApplicationPath` 注解用于配置 URI 的路径。以下代码显示了此类的源代码：\n```java\n\
  package org.jakartaeerecipe.bookstore;\n\nimport java.util.*;\nimport jakarta.mvc.security.Csrf;\n\
  import jakarta.ws.rs.*;\n\n@ApplicationPath(\"controller\")\npublic class ApplicationConfig\
  \ extends Application {\n    @Override\n    public Map<String, Object> getProperties()\
  \ {\n        final Map<String, Object> map = new HashMap<>();\n        map.put(Csrf.CSRF_PROTECTION,\
  \ Csrf.CsrfOptions.EXPLICIT);\n        return map;\n    }\n}\n```\n一旦这些配置完成，您就可以开始编写\
  \ Jakarta MVC 应用程序了。\n\n第 5 章 ■ Jakarta MVC\n\n工作原理\n\nJakarta MVC 框架需要对项目进行一些简单的配置，以引入所需的依赖项并正确配置\
  \ CDI 和 Jakarta RESTful Web Services。在本方案中，我展示了如何进行这些配置，现在让我们看看为什么需要它们。如前所述，Jakarta\
  \ RESTful Web Services 配置应位于一个扩展 `jakarta.ws.rs.core.Application` 的类中，该类定义了 Jakarta\
  \ RESTful Web Services 应用程序的组件和元数据。\n\nJakarta MVC 框架构建在 Jakarta RESTful Web Services\
  \ API 之上，因此此配置是必需的，以便能够生成控制器类（更多详细信息请参见方案 5-3）。\n\n在解决方案中，我将扩展 `jakarta.ws.rs.core.Application`\
  \ 类的类命名为 `ApplicationConfig`。从代码中可以看出，通过扩展 `Application` 类，我们可以重写 `getProperties()`\
  \ 方法来提供特定于应用程序的配置。在这种情况下，我添加了 CSRF（跨站请求伪造）保护，这是一个标准的安全特性（请参见方案 5-8）。`getProperties()`\
  \ 方法应返回一个 `Map<String, Object>`。最后，该类应使用 `@ApplicationPath` 进行注解，并且控制器（或 Jakarta\
  \ RESTful Web Services 类）的 URI 映射应作为字符串传递。在本例中，路径是 `\"controller\"`，访问控制器类的 URL\
  \ 应转换为 `http://localhost:8080/Bookstore/controller/`。\n\nJakarta MVC 的依赖项必须在 Maven\
  \ POM 文件中引用。在这种情况下，存在依赖项，并且期望 Jakarta EE 完整版或 Web 版配置文件也是一个依赖项。\n\n■ **注意** Jakarta\
  \ EE 有不同的配置文件可用。Web 配置文件包含较少的用于开发 Web 项目的依赖项，而完整配置文件包含所有 Jakarta EE 依赖项。使用 Jakarta\
  \ EE 10，我们有了一个新的配置文件，称为核心配置文件，专为小型运行时设计。它包含面向微服务和提前编译的规范。\n\nJakarta MVC 所需的依赖项是\
  \ `jakarta.mvc-api` 和 `krazo`，后者是参考实现。最后，确保为上下文和依赖注入创建一个 `beans.xml` 配置文件。此配置文件允许指定如何发现\
  \ CDI bean。出于本示例的目的，接受默认的注解发现模式，如下所示：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"https://jakarta.ee/xml/ns/jakartaee\
  \ https://jakarta.ee/xml/ns/jakartaee/beans_3_0.xsd\"\n    bean-discovery-mode=\"\
  annotated\">\n</beans>\n```\n本方案逐步介绍了创建 Jakarta MVC 项目所需的配置。在接下来的方案中，我将介绍如何将项目构建成一个功能完备的\
  \ Web 应用程序。\n\n5-2. 为应用程序提供数据\n\n问题\n\n您需要为应用程序获取现有数据，并且希望轻松地使这些数据可用于您的 Web 视图。\n\
  \n第 5 章 ■ Jakarta MVC\n\n解决方案 #1\n\n利用 Jakarta Persistence API 和 Jakarta Enterprise\
  \ Beans 从数据库向应用程序提供数据。在本章中，我们将使用 Apache Derby 数据库。首先，创建实体类，将每个数据库表映射到相应的 Java 对象。有关生成实体类的更多详细信息，请参见第\
  \ 8 章。\n\n\n\n针对本章所开发的应用，将为本书中使用的多个数据库表生成实体类。在本方案中，仅生成一个实体类作为演示。不过，如果你查看示例应用的源代码，会发现应用内使用的每个表都对应一个实体类。\n\
  \n由于该应用将用于在线书店，因此应用所使用的数据库表与作者和书籍相关。在本方案中，我们将为 `BOOK_AUTHOR` 数据库表生成实体类。简单来说，实体类将数据库表的每一列映射到对应的类成员。以下是\
  \ `BookAuthor` 实体类的代码：\n\n```java\npackage org.jakartaeerecipe.bookstore.entity;\n\
