  \ 4-1.** 用于订阅 Acme Bookstore 新闻通讯的 Jakarta Server Faces 输入表单*\n\n工作原理\n\nJava Server\
  \ Faces 框架附带了一系列标准组件，可在 Jakarta Server Faces 视图中使用。有四个标准组件可用于捕获文本输入：`inputText`、`inputSecret`、`inputHidden`\
  \ 和 `inputTextarea`。这些组件标签，以及所有其他标准的 Jakarta Server Faces 组件标签，共享一组通用属性和一些每个特定标签独有的属性。要了解有关通用属性的更多信息，请参阅本章引言中的相关部分。\n\
  \n在本配方中，我将详细介绍每个输入组件的具体细节。`h:view` 组件用于定义视图的内容。它决定了应用程序中将显示什么内容以及数据的外观。通过 `h:form`\
  \ 标签指定的表单组件，用于在 Jakarta Server Faces 视图中创建输入表单。要在表单中处理的每个组件都应包含在开闭 `h:form` 标签之间。每个表单通常至少包含一个命令组件，例如\
  \ `commandButton`。一个视图可以包含多个表单组件，并且只有包含在表单中的组件才会在表单提交时被处理。\n\n第 4 章 ■ 高级 Jakarta\
  \ Server Faces\n\n■ **注意** 我建议你始终为每个组件指定 `id` 属性。最重要的是，为表单组件指定 `id` 属性。如果你没有为给定的\
  \ Jakarta Server Faces 组件指定 `id` 属性，则会自动为你生成一个。自动生成 Jakarta Server Faces 组件 ID 会阻止从脚本语言（如\
  \ JavaScript）或受管 Bean 中静态引用组件的能力。例如，在本配方的示例中，表单 `id` 属性设置为 `contactForm`，第一个 `inputText`\
  \ 组件的 `id` 设置为 `first`。这允许你通过将表单 ID 附加到组件 ID 来从脚本语言或受管 Bean 中静态引用该组件。在示例中，你可以将第一个组件引用为\
  \ `contactForm:first`。\n\n每个输入标签都支持表 4-4 中显示的属性列表，此外还支持本章引言中已列出的通用组件属性。\n\n***表\
  \ 4-4.** 输入组件标签属性*\n\n| **属性** | **描述** |\n| :--- | :--- |\n| converter | 允许将转换器应用于组件的数据\
  \ |\n| converterMessage | 指定当注册的转换器失败时将显示的消息 |\n| dir | 指定组件显示的文本方向（*LTR* 用于指示从左到右，*RTL*\
  \ 用于指示从右到左） |\n| immediate | 标志，指示如果此组件被用户激活，应立即向感兴趣的监听器和操作发送通知（即在应用请求值阶段），而不是等到调用应用程序阶段\
  \ |\n| label | 指定可用于组件标识的名称 |\n| lang | 允许为渲染的标记指定语言代码 |\n| required | 接受布尔值，指示用户是否必须为给定组件输入值\
  \ |\n| requiredMessage | 指定如果用户未为*必需*组件输入值时要显示的错误消息 |\n| validator | 允许将验证器应用于组件\
  \ |\n| valueChangeListener | 允许将受管 Bean 方法绑定用于事件处理目的。当组件发生更改时将调用该方法 |\n\n`inputText`\
  \ 组件用于在渲染页面中生成一个单行文本框。`inputText` 组件的 `value` 属性通常绑定到受管 Bean 属性，以便在处理表单时可以检索或设置该属性的值。在配方示例中，第一个\
  \ `inputText` 组件绑定到名为 `first` 的受管 Bean 属性。为组件值指定了 Jakarta 表达式语言表达式 `#{contactController.current.first}`，因此如果受管\
  \ Bean 的 `first` 属性包含值，则该值将显示在 `inputText` 组件中。同样，当提交表单时，在组件中输入的任何值都将保存在受管 Bean\
  \ 的 `first` 属性中。\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n`inputSecret` 组件在渲染页面中生成一个单行文本框，当在组件中输入文本时，文本不会显示；而是用星号代替输入的每个字符。此组件使用户可以输入私人文本（例如密码），而不会在屏幕上显示给其他人阅读。`inputSecret`\
  \ 组件的工作方式与 `inputText` 组件完全相同，只是用星号隐藏了文本。在示例中，`inputSecret` 组件的值通过 `#{contactController.current.password}`\
  \ 表达式绑定到名为 `password` 的受管 Bean 属性。\n\n`inputTextarea` 组件用于在渲染页面中生成一个多行文本框。因此，该组件有几个额外的属性可用于指示文本区域的大小。`inputTextarea`\
  \ 具有 `rows` 和 `cols` 属性，分别允许开发人员指定组件在页面上应占用的行数（高度）和列数（宽度）。除了这两个属性外，`inputTextarea`\
  \ 组件的工作方式与 `inputText` 组件非常相似。在示例中，`inputTextarea` 组件的 `value` 属性指定为 `#{contactController.current.description}`，因此当提交表单时，`description`\
  \ 属性将填充组件的内容。\n\n我尚未讨论的输入组件是 `inputHidden` 组件。此组件用于在表单中放置一个隐藏的输入字段。它的工作方式与 `inputText`\
  \ 组件相同，只是它不会在页面上渲染给用户看。`inputHidden` 组件的值可以像其他组件一样绑定到受管 Bean 属性。你可以使用此类组件在表单之间传递隐藏令牌。\n\
  \n利用 Jakarta Server Faces 标准输入组件，可以使用 Jakarta Server Faces Jakarta 表达式语言表达式将值绑定到受管\
  \ Bean 属性。这使得开发人员可以更轻松地从输入表单提交值进行处理。Jakarta Server Faces 框架为你处理了这些开销，而不是从页面检索参数、将它们分配给变量然后进行处理。虽然我没有在本配方中涵盖所有输入组件属性的用法，但我将在后续的配方中，在构建\
  \ Acme Bookstore 新闻通讯订阅页面时介绍更多内容。\n\n4-3\\. 从页面内调用操作\n\n问题\n\n你想从应用程序页面上的按钮或链接触发服务器端方法的调用。\n\
  \n解决方案\n\n\n\n在你的视图中使用 commandButton 或 commandLink 组件来调用受管 Bean 控制器中的操作方法。命令组件允许用户在受管\
  \ Bean 中调用操作。命令组件将页面上的按钮和链接直接绑定到操作方法，使开发者能够将更多时间用于思考应用程序的开发，而减少对 Java Servlet 处理生命周期的关注。\n\
  \n在本配方的示例中，为 Acme Bookstore 的新闻通讯页面添加了一个按钮和一个链接。添加到页面上的按钮将用于提交输入表单进行处理，而链接则允许用户登录应用程序并管理其订阅和书店账户。\n\
  \n■ **注意** 本配方不涉及任何身份验证或安全功能；它仅专注于在受管 Bean 中调用操作。有关身份验证的更多信息，请参见第 15 章。\n\n第 4 章\
