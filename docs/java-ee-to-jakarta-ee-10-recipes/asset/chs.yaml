  \ EE 10 攻略*[, https://doi.org/10.1007/978-1-4842-8079-9_12](https://doi.org/10.1007/978-1-4842-8079-9_12#DOI)\n\
  \n![](img/index-531_1.png)\n\n第 12 章 ■ Jakarta 消息传递\n\n12-1. 创建 Jakarta Messaging\
  \ 资源\n\n问题\n\n您希望提供创建 Jakarta Messaging 资源的能力，以便在 GlassFish 7.0+ 应用服务器环境中部署。\n\n\
  解决方案\n\n从 GlassFish 管理控制台创建一个新的 JMS 资源。在本攻略示例中，我们将创建一个 Jakarta Messaging 目的地资源。具体来说，我们将逐步创建一个\
  \ `jakarta.jms.Queue` 资源。请按照以下步骤创建该资源：\n\n1.  通过导航至 `https://localhost:4848` 登录\
  \ GlassFish 管理控制台。展开导航树中的 **Resources** ➤ **JMS Resources** 菜单，以显示 Destination Resources\
  \ 菜单选项（参见图 12-1）。\n\n***图 12-1.** GlassFish 管理控制台目的地资源菜单*\n\n2.  在 JMS 目的地资源窗口中点击\
  \ New 按钮，打开新建 JMS 目的地资源窗口。输入一个 JNDI 名称（以 `jms/` 开头），然后在 Physical Destination Name\
  \ 字段中输入一个唯一的名称（参见图 12-2）。最后，选择您想要创建的资源类型。\n\n![](img/index-532_1.jpg)\n\n第 12 章\
  \ ■ Jakarta 消息传递\n\n***图 12-2.** 新建 JMS 目的地资源*\n\n3.  点击 OK 创建该目的地。\n\n■ **注意**\
  \ 也可以使用 GlassFish 的 `asadmin create-jms-resource` 命令从命令行创建 JMS 管理对象。`asadmin` 工具还可用于执行其他任务。更多信息，请参考文档：[`glassfish.org/docs/latest/application-development-guide/jms.html#beaop`](https://glassfish.org/docs/latest/application-development-guide/jms.html#beaop)\n\
  \n工作原理\n\nJakarta Messaging API 利用管理资源来创建和消费消息。我们将这些资源称为 JMS 资源。可以创建两种不同类型的 JMS\
  \ 资源——连接资源和目的地资源。连接资源用于创建到提供者的连接。可以创建三种类型的连接资源：\n\n*   `ConnectionFactory`：`jakarta.jms.ConnectionFactory`\
  \ 接口的实例。可用于创建 Topic 和 Queue 类型。\n*   `TopicConnectionFactory`：`jakarta.jms.TopicConnectionFactory`\
  \ 接口的实例。\n*   `QueueConnectionFactory`：`jakarta.jms.QueueConnectionFactory` 接口的实例。\n\
  \n第 12 章 ■ Jakarta 消息传递\n\nJMS 连接工厂资源与 JDBC 连接工厂非常相似，因为它们提供了一个连接池，应用程序可以使用该池进行连接并生成会话。创建连接工厂资源时可以指定许多属性：\n\
  \n*   *初始和最小池大小*：连接池将创建和维护的初始和最小连接数。\n*   *最大池大小*：池中可以创建的最大连接数。\n*   *池调整数量*：当池空闲超时到期时将移除的连接数。\n\
  *   *空闲超时*：连接在空闲状态下可以在池中保留的最长时间（秒）。\n*   *最大等待时间*：调用者在连接超时发生之前等待的最长时间（毫秒）。\n*  \
  \ *发生任何故障时*：如果设置为 true（选中），则在发生故障时所有连接都将关闭并重新连接。\n*   *事务支持*：事务支持的级别（`XATransaction`、`LocalTransaction`、`NoTransaction`）。默认为空。\n\
  *   *连接验证*：如果设置为 true，则需要验证连接。\n\n■ **注意** `XATransaction` 始终处理一个协调事务管理器，包括一个或多个数据库，所有这些都在一个全局事务中。非\
  \ XA 事务始终涉及单个资源。\n\n您可以按照本攻略解决方案中提供的步骤，通过 GlassFish 管理控制台创建连接工厂对象，只需在第 1 步中选择 Connection\
  \ Factories 子菜单而不是 Destination Resources 子菜单即可。`ConnectionFactory` 对象一旦创建就会自动向 JNDI\
  \ 注册，然后可以注入到 Java 类中使用。以下代码行演示了如何将 `ConnectionFactory` 资源注入到类中：\n\n```java\n@Resource(name\
  \ = \"jms/MyConnectionFactory\")\nprivate static ConnectionFactory connectionFactory;\n\
  ```\n\n目的地资源也可以以类似于连接资源的方式创建。它们充当接收或消费所生成消息的目标。它们可以是两种类型之一：`jakarta.jms.Queue`（队列）或\
  \ `jakarta.jms.Topic`（主题）。Queue 是一种以点对点（PTP）方式消费消息的目的地资源，很像一条单向交通线路。当生产者向队列发送消息时，该消息将保留在队列中，直到被消费。Topic\
  \ 是一种用于发布者/订阅者场景的目的地，而发送到 Topic 的消息可能被多个接收者消费。一个或多个接收者可以订阅一个 Topic。\n\n\n\n本方案演示了如何使用管理控制台在\
  \ GlassFish 应用服务器中创建目标资源。控制台提供了一个向导，可轻松创建目标资源。创建目标时需提供的最重要信息是名称。与所有 JMS 资源一样，JNDI\
  \ 名称应以 `jms/` 前缀开头。创建目标资源时，还必须为目标资源名称提供一个唯一名称，尽管\n\n![](img/index-534_1.png)\n\n\
  第 12 章 ■ Jakarta 消息服务\n\n其他符合 Jakarta EE 规范的容器可能不会将此作为强制规范。目标资源可以像 ConnectionFactory\
  \ 资源一样注入到 Java 类中。以下代码行演示了 Topic 资源的注入：\n\n@Resource(name=\"jms/myTopic\")\n\nprivate\
  \ Topic myTopic;\n\n12-2. 创建会话\n\n问题\n\n您希望创建一个 Jakarta 消息服务会话，以便发送或消费消息。\n\n解决方案\n\
  \n创建一个连接，以便随后创建一个或多个会话，这些会话进而可以向目标发送消息或消费消息。要创建连接，请通过 `@Resource` 注解注入获取一个 `ConnectionFactory`\
  \ 对象，并调用其 `createConnection` 方法，如下代码行所示：\n\nConnection connection = connectionFactory.createConnection();\n\
  \n创建连接后，您需要启动一个会话。为此，请按如下方式调用连接对象的 `createSession` 方法：\n\nSession session = connection.createSession(false,\n\
  \nSession.AUTO_ACKNOWLEDGE);\n\n■ **注意** 如果您使用的是简化的 Jakarta 消息服务 API（将在配方 12-3 中更详细地介绍），则无需手动创建\
  \ Jakarta 消息服务会话。仅在使用标准 API 时才需要创建 Jakarta 消息服务会话。\n\n运行示例\n\n如果您查看 `org.jakartaeerecipe.chapter12`\
  \ 包中 JakartaEERecipe 项目内的源代码，可以看到创建 Jakarta 消息服务会话的完整演示。\n\n要查看实际示例，请在设置好 JMS 连接工厂（参见配方\
  \ 12-1）后，将 JakartaEERecipe 项目部署到您的应用服务器，并访问以下 URL：\n\nhttp://localhost:8080/JMSDemo-1.0-SNAPSHOT/recipe12_02.xhtml\n\
  \n您将看到如图 12-3 所示的输出。\n\n***图 12-3.** 配方 12-2 的输出*\n\n第 12 章 ■ Jakarta 消息服务\n\n工作原理\n\
  \n在开始发送或消费消息之前，您必须获取一个 JMS 连接，以便启动会话。会话可用于创建 JMS 资源，例如消息消费者、消息生产者、消息、队列浏览器以及临时队列和主题。可以使用\
  \ `Connection` 对象创建会话。要创建会话，请调用 `Connection` 对象的 `createSession` 方法，并根据应用程序的需要传递适当的参数。`createSession`\
  \ 语法如下：\n\ncreateSession(boolean isTransacted, int acknowledgementType)\n\n`createSession`\
  \ 方法的第一个参数是一个布尔值，用于指示会话中是否应进行事务处理。如果会话被创建为事务性的（将 `createSession` 的第一个参数设置为 `true`），则在整个事务成功提交后才会进行确认。如果由于某种原因事务未提交，则整个事务将回滚，所有消息将被重新投递。但是，如果会话不是事务性的，则必须指定需要接收哪种确认类型才能认为消息已成功发送。`createSession`\
  \ 方法的第二个参数指示确认类型。表 12-1 列出了不同的确认类型及其描述。\n\n***表 12-1.** 会话消息确认*\n\n**确认类型**\n\n\
  **类型描述**\n\n`Session.AUTO_ACKNOWLEDGE`\n\n会话自动确认客户端收到消息，无论是客户端成功从 `receive` 调用返回，还是其调用的用于处理消息的\
  \ `MessageListener` 成功返回。\n\n`Session.CLIENT_ACKNOWLEDGE`\n\n客户端通过调用消息的 `acknowledge`\
  \ 方法来确认收到消息。\n\n`Session.DUPS_OK_ACKNOWLEDGE`\n\n延迟确认消息，允许接收重复消息。\n\n在本配方的解决方案中，创建的会话是非事务性的，接收类型为\
  \ `Session.AUTO_ACKNOWLEDGE`。这是最常见的 Jakarta 消息服务会话创建类型。\n\n一旦创建了会话，就可以用它来创建 JMS\
  \ 资源。\n\n12-3. 创建和发送消息\n\n问题\n\n您希望创建并发送一条消息。\n\n解决方案 #1\n\n使用标准 API 创建和发送消息。为此，根据您要发送的消息类型创建一个\
  \ `Message` 对象，然后创建并使用消息生产者将消息发送到目标。要创建消息，首先确定您要发送的消息类型。确定后，从 JMS 会话中创建相应的消息对象。在此示例中，我们将演示创建文本消息。以下代码行演示了如何创建包含字符串的文本消息：\n\
  \nTextMessage message = session.createTextMessage();\n\nmessage.setText(\"Jakarta\
  \ EE 10 Is the Best!\");\n\n接下来，要创建 `MessageProducer` 并发送消息，请调用 Jakarta 消息服务会话的\
  \ `createProducer` 方法，并传递您要发送消息的目标的对象类型。以下代码行演示了如何创建消息生产者并发送在前几行中创建的文本消息。前几行代码演示了如何注入目标资源，然后是实际创建消息生产者和发送消息：\n\
  \npublic void sendMessage() {\n\nif (connection != null) {\n\nSystem.out.println(\"\
  Creating Session\");\n\ntry(Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \n) {\n\nmyQueue = (Queue) getContext().lookup(\"jms/jakartaEERecipeQueue\");\n\n\
  MessageProducer producer = session.createProducer(myQueue);\n\nTextMessage message\
  \ = session.createTextMessage();\n\nmessage.setText(\"Jakarta EE 10 Is the Best!\"\
  );\n\nproducer.send(message);\n\nproducer.close();\n\nsetConnectionString(\"Message\
  \ Successfully Sent to Queue\");\n\n} catch (NamingException | JMSException e) {\n\
  \nLogger.getLogger(org.jakartaeerecipe.chapter12.recipe12_02.Recipe12_02.\n\nclass.getName())\n\
  \n.log(Level.SEVERE, null, e);\n\nsetConnectionString(\"Session not created and\
  \ message not sent\");\n\n}\n\n} else {\n\nsetConnectionString(\"No connection available\"\
  );\n\n}\n\n}\n\n解决方案 #2\n\n使用简化的 API 创建和发送消息。要使用简化的 API，请创建一个 `JMSContext` 对象，然后利用它创建\
  \ `MessageProducer` 并将消息发送到适当的目标。在以下示例中，使用简化的 API 将一条简单的基于字符串的消息发送到队列。此技术提供与解决方案\
  \ #1 相同的结果：\n\npublic String sendMessageNew() {\n\nString response = \"Message Not\
  \ Sent...\";\n\ntry (JMSContext context = connectionFactory.createContext()) {\n\
  \ninboundQueue = (Queue) getContext().lookup(\"jms/jakartaEERecipeQueue\");\n\n\
  StringBuilder message = new StringBuilder();\n\nmessage.append(\"Jakarta EE 10 Is\
  \ the Best!\");\n\ncontext.createProducer().send(inboundQueue, message.toString());\n\
  \nresponse = \"Message Sent...\";\n\n![](img/index-537_1.png)\n\n第 12 章 ■ Jakarta\
  \ 消息服务\n\n} catch (NamingException e) {\n\nLogger.getLogger(org.jakartaeerecipe.chapter12.recipe12_02.Recipe12_02.class.\n\
  \ngetName())\n\n.log(Level.SEVERE, null, e);\n\n}\n\nreturn response;\n\n}\n\n运行示例\n\
  \n\n\n本配方提供了一个可在 Jakarta Server Faces 视图中运行的示例。位于 `org.jakartaeerecipes.chapter12.Example12_03.java`\
  \ 的代码包含一个托管 bean，其中包含一个使用标准 API 实现的 `sendMessage` 方法，以及一个使用简化 API 的 `sendMessageNew`\
  \ 方法。这两个方法都负责创建消息并将其发送到目标队列。通过运行该示例，您可以查看服务器日志以了解方法的输出。\n\n部署 JakartaEERecipes 项目并访问以下\
  \ URL 来运行示例：\n\nhttp://localhost:8080/JMSDemo -1.0-SNAPSHOT/recipe12_03.xhtml\n\n\
  您将看到如图 12-4 所示的输出。\n\n***图 12-4.** 配方 12-3 的输出*\n\n工作原理\n\n任何应用程序使用 Jakarta Messaging\
  \ 的原因都是为了集成发送或接收消息的能力。因此，Jakarta Messaging API 的开发旨在让开发人员非常轻松地完成这些任务，这并不令人意外。在 Java\
  \ EE 7 中，通过使用简化的 Jakarta Messaging API，事情变得更加简单。\n\n让我们首先讨论使用标准 API 发送消息所需的步骤。\n\
  \n要使用标准 API 发送消息，您需要为消息创建一个资源目标，并获取一个连接和一个会话，如配方 12-1 和 12-2 所示。一旦获得会话，下一步就是使用 `Session`\
  \ 的 `createProducer` 方法创建一个 `MessageProducer`，并将目标作为参数传递。完成这些准备工作后，就可以构建消息了。您可以通过调用与您希望创建的消息类型相对应的\
  \ `jakarta.jms.Session` 方法来创建消息。\n\n■ **注意** 要查看所有可用方法，请参阅 [`jakarta.`](https://jakarta.ee/specifications/messaging/3.0/jakarta-messaging-spec-3.0.html#sessions)\
  \ 的在线文档。\n\n[ee/specifications/messaging/3.0/jakarta- messaging- spec- 3.0.html#sessions](https://jakarta.ee/specifications/messaging/3.0/jakarta-messaging-spec-3.0.html#sessions).\n\
  \n第 12 章 ■ Jakarta 消息传递\n\n在本配方的示例中，通过调用 `session.createTextMessage()` 方法创建了一条文本消息。然后通过调用\
  \ `TextMessage` 对象的 `setText` 方法来设置文本。\n\n创建消息后，必须创建一个 `MessageProducer` 以便于发送消息。同样，`jakarta.jms.Session`\
  \ 在这里发挥了作用，我们可以调用其 `createProducer` 方法，并传递我们希望为其创建 `MessageProducer` 的目标资源。创建完成后，可以调用生产者的\
  \ `sendMessage` 方法，并传递您希望发送的消息。\n\n如前所述，`jakarta.jms.Session` 可用于生成不同的消息类型。\n\n\
