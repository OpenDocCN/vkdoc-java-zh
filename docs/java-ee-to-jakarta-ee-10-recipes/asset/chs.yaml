  \n第 7 章 ■ 对象关系映射\n\n工作原理\n\n在某些情况下，数据库表可能不包含单一主键值来唯一标识每一行。在处理遗留数据库时，这种情况经常发生。在 Java\
  \ 持久化 API 中，所有实体类都必须包含一个可用于唯一标识对象的主键。\n\n为了克服处理不包含单一主键值的表时的这一障碍，可以使用复合主键来唯一标识一个对象。\n\
  \n复合主键由实体类中的两个或多个字段或属性组成，这些字段或属性可以组合起来创建一个唯一标识符。可以将其理解为执行数据库查询并尝试返回仅匹配特定条件的记录。在这种情况下，你通常需要在\
  \ SQL 的`WHERE`子句中包含多个关系。在实体类中创建复合主键基本上也是同样的概念，即你是在告诉 Jakarta Persistence 使用复合键中指定的所有字段或属性来唯一标识一个对象。\n\
  \n有几种不同的技术（可嵌入和不可嵌入）可用于开发复合主键。这两种技术相似之处在于它们都需要创建一个单独的类来组成主键，但不同之处在于主键在实体类中的标注方式。实际上，这两种技术中的单独主键类几乎可以完全相同地创建，唯一的例外是可嵌入主键类必须使用`@Embeddable`进行注解，如本配方的解决方案#1\
  \ 所示。使用可嵌入主键类的实体应仅包含一个主键，并且该主键的数据类型应与可嵌入主键类相同。也就是说，主键类应使用`private`修饰符在实体中声明，并与其他所有持久化属性和字段一起，且应使用`@Id`注解来表明它是主键。以下来自解决方案#1\
  \ 的摘录展示了如何实现：\n\n@EmbeddedId\n\nprivate AuthorWorkPKEmbedded embeddedId;\n\n包含嵌入式主键的实体类应包含一个构造函数，该构造函数为用于主键的每个持久化字段或属性接受一个参数。在构造函数内部，应使用传入的参数实例化可嵌入主键类的一个新实例。使用可嵌入主键的实体类应包含主键字段或属性的访问器方法。然而，与大多数实体类不同，`hashCode()`和`equals()`方法并不存在于实体类中，因为它们位于主键类内部。现在，我已经介绍了使用可嵌入主键的实体类的具体细节，让我们来看看可嵌入主键类本身是如何工作的。\n\
  \n用于创建可嵌入主键的主键类应包含对每个将用于组成关联实体类主键的持久化字段或属性的声明。当然，这些字段或属性应设为私有，并且应有相应的 getter 和 setter\
  \ 方法来访问这些字段。可嵌入主键类应使用`@Embeddable`进行注解。它可以包含两个构造函数：一个无参构造函数，以及另一个可选的构造函数，该构造函数为组成主键的每个持久化字段或属性接受一个参数。还记得使用可嵌入主键的实体类不包含`hashCode()`方法吗？这是因为该方法位于主键类中，它只是将组成主键的每个字段的哈希码相加，并返回总和。\n\
  \n\n\n主键类中最重要的部分是 `equals()` 方法，因为它用于判断某个对象或数据库记录是否唯一匹配关联的主键。`equals()` 方法应接受一个\
  \ `Object` 类型的参数，该参数是与当前主键对象进行比较的对象。随后，对该对象进行比较，以确定它是否与当前主键对象相等；如果相等，则返回 `true`。如果不相等，则进一步判断该对象是否与可嵌入主键类属于同一类型；如果不是同一类型，则返回\
  \ `false`。如果该对象为 `NULL`，同样返回 `false`。最后，如果根据已测试的条件仍未返回布尔值，则将该对象强制转换为主键类的同一类型对象，并将其每个字段或属性与当前主键类中的对应项进行比较。如果相等，则返回\
  \ `true`；如果不相等，则返回 `false`。以下代码演示了 `equals()` 方法：\n\n```java\npublic boolean equals(Object\
  \ obj) {\n\nif (obj == this) {\n\nreturn true;\n\n}\n\nif (!(obj instanceof AuthorWorkPKEmbedded))\
  \ {\n\nreturn false;\n\n}\n\nif (obj == null) {\n\nreturn false;\n\n}\n\nAuthorWorkPKEmbedded\
  \ pk = (AuthorWorkPKEmbedded) obj;\n\nreturn (((bookId == ((AuthorWorkPKEmbedded)\
  \ obj).getBookId()))\n\n&& ((authorId == ((AuthorWorkPKEmbedded) obj).getAuthorId())));\n\
  \n}\n```\n\n解决方案 #2 涵盖了非嵌入主键的使用。有时，生成非可嵌入主键比使用嵌入主键更受青睐，因为有些人认为这样生成的实体类更易于阅读。非可嵌入主键的整体构造基本相同，但存在一些细微差异。例如，在开发非可嵌入主键的主键类时，该类上不需要\
  \ `@Embeddable` 注解。从解决方案 #2 的代码中可能注意到的另一个区别是，只使用了一个构造函数。当然，仍然可以创建一个可选的第二个构造函数，该构造函数接受用于组成主键的每个持久化字段或属性的参数。\n\
  \n大多数差异出现在实体类本身。要使用非嵌入复合主键，实体类必须使用 `@IdClass` 注解，并指定用于构造复合主键的类。在解决方案 #2 中，`@IdClass`\
  \ 如下所示：\n\n```java\n@IdClass(AuthorWorkPKNonEmbedded.class)\n```\n\n使用非可嵌入复合主键的实体类的另一个主要区别是，不再使用\
  \ `@Id` 注解将单个持久化字段或属性声明为 ID，而是将用于组成实体主键的两个或多个字段或属性直接声明在实体内部，并分别对它们进行注解。其余实现与使用嵌入复合主键的实体相同。\n\
  \n选择使用哪种类型的复合键完全取决于个人偏好。许多人使用非可嵌入主键来使实体类更易于理解，因为它比使用可嵌入复合主键的实体类更接近标准实体类。最终，两者都会产生相同的结果，并允许为那些不包含单个主键字段的数据库表创建实体类。\n\
  \n第 7 章 ■ 对象关系映射\n\n7-6. 定义一对一关系\n\n问题\n\n应用程序使用的数据库表中包含的数据与另一个表中的数据记录存在一对一引用关系。因此，你希望在应用程序中的两个实体对象之间创建一对一关系。\n\
  \n解决方案\n\n通过将每个实体类本身声明为彼此内部的持久化字段或属性（使用“拥有”关系），并用 `@OneToOne` 注解这些字段，来创建具有一对一关系的两个表之间的关联。例如，假设\
  \ `AUTHOR` 数据库表中的每条记录都可以与另一个名为 `AUTHOR_DETAIL` 表中的记录相关联，反之亦然。`AUTHOR_DETAIL` 表包含作者的联系信息，因此，实际上这些表具有一对一关系。为了在实体类内部将它们相互关联起来，请在关联到相应实体类的字段或属性上指定\
  \ `@OneToOne` 注解。为了能够从任一表中获取完整的作者信息，需要创建一个双向的一对一关系。\n\n■ **注意** 一对一映射可以是单向的或双向的。单向映射仅在拥有实体上包含对应实体类的\
  \ `@OneToOne` 注解，而双向映射则根据关联类型包含 `@ManyToOne`、`@OneToMany` 或 `@ManyToMany` 注解。\n\n\
  如果一个实体包含对另一个实体对象的引用（该引用指向实体本身），则这种关系称为*拥有*关系。另一方面，如果一个实体通过主键值引用另一个实体，则这种关系称为*非拥有*关系。\n\
  \n在本解决方案中，`Author` 实体将包含一个指向 `AuthorDetail` 实体的 `@OneToOne` 引用，以创建双向的一对一映射。在以下来自\
  \ `Author` 实体的代码片段中，`Author` 实体是拥有实体：\n\n```java\n...\n\n@Entity\n\n@Table(name\
  \ = \"AUTHOR\")\n\npublic class Author implements Serializable {\n\nprivate static\
  \ final long serialVersionUID = 1L;\n\n@Id\n\n@Basic(optional = false)\n\n@SequenceGenerator(name=\"\
  author_s_generator\",\n\nsequenceName=\"author_s\", initialValue=1, allocationSize=1)\n\
  \n@GeneratedValue(strategy=GenerationType.SEQUENCE,\n\ngenerator=\"author_s_generator\"\
  )\n\n@NotNull\n\n@Column(name = \"ID\")\n\nprivate BigDecimal id;\n\n@Size(max =\
  \ 30)\n\n@Column(name = \"LAST\")\n\nprivate String last;\n\n@Size(max = 30)\n\n\
  @Column(name = \"FIRST\")\n\nprivate String first;\n\n@Lob\n\n@Column(name = \"\
  BIO\")\n\nprivate String bio;\n\n@OneToOne\n\nprivate AuthorDetail authorId;\n\n\
  public Author() { }\n\n...\n```\n\n接下来是 `AUTHOR_DETAIL` 表的实体类片段。当然，它名为 `AuthorDetail`，并包含对\
  \ `Author` 实体类的引用：\n\n```java\n...\n\n@Entity\n\n@Table(name = \"AUTHOR_DETAIL\"\
  )\n\npublic class AuthorDetail implements Serializable {\n\nprivate static final\
  \ long serialVersionUID = 1L;\n\n@Id\n\n@Basic(optional = false)\n\n@SequenceGenerator(name=\"\
  author_detail_s_generator\",sequenceName=\"author__detail_s\", initialValue=1, allocationSize=1)\n\
  \n@GeneratedValue(strategy=GenerationType.SEQUENCE,\n\ngenerator=\"author_detail_s_generator\"\
  )\n\n@NotNull\n\n@Column(name = \"ID\")\n\nprivate BigDecimal id;\n\n@Size(max =\
  \ 200)\n\n@Column(name = \"ADDRESS1\")\n\nprivate String address1;\n\n@Size(max\
  \ = 200)\n\n@Column(name = \"ADDRESS2\")\n\nprivate String address2;\n\n@Size(max\
  \ = 250)\n\n@Column(name = \"CITY\")\n\nprivate String city;\n\n@Size(max = 2)\n\
  \n@Column(name = \"STATE\")\n\nprivate String state;\n\n@Size(max = 10)\n\n@Column(name\
  \ = \"ZIP\")\n\nprivate String zip;\n\n@Column(name = \"START_DATE\")\n\n@Temporal(TemporalType.DATE)\n\
  \nprivate Date startDate;\n\n@Lob\n\n@Column(name = \"NOTES\")\n\nprivate String\
  \ notes;\n\n**@OneToOne(optional=false, mappedBy=\"authorDetail\")**\n\n**private\
  \ Author authorId;**\n\npublic AuthorDetail() {\n\n}\n\n...\n```\n\n工作原理\n\n在关系型数据库的世界中，一个表依赖于另一个表的情况并不罕见。\n\
  \n\n\n当一个表中的记录与另一个表中的记录存在一一对应关系时，应配置一个表的实体类与另一个表的实体类建立一一对应关系。操作对象与操作数据库记录略有不同，但概念基本相同。在数据库中，使用唯一标识符将一个表与另一个表关联起来。例如，在本例中，`AUTHOR_DETAIL`\
  \ 表包含一个名为 `AUTHOR_ID` 的字段，该字段必须包含 `AUTHOR` 数据库表中的 ID，才能将两条记录映射在一起。被拥有实体关系的工作方式略有不同，它使用实体对象本身（而非\
  \ ID 号）来映射到另一个实体。\n\n在实体类之间创建双向的一对一关系时，每个实体类必须将另一个实体类声明为持久化字段或属性，然后使用 `@OneToOne`\
  \ 注解指定关系类型。`@OneToOne` 注解用于指定实体之间的一对一关系。该注解包含以下可选属性：\n\n• `cascade`：必须级联到关联目标的操作（例如，删除）。默认值：无操作。\n\
  • `fetch`：关联应延迟加载还是立即获取。默认值：`EAGER`。\n• `optional`：关联是否为可选的。例如，实体是否可以在没有关联的情况下持久化？默认值：`true`。\n\
  • `mappedBy`：拥有关系的字段。默认值：`\"\"`。\n\n在本方案的解决方案中，`AuthorDetail` 实体在声明 `Author` 字段之前指定了\
  \ `@OneToOne` 注解，并设置了 `mappedBy` 和 `optional` 属性。`mappedBy` 属性设置为 `authorDetail`，因为这将作为映射字段，而\
  \ `optional` 属性设置为 `false`。\n\n第 7 章 ■ 对象关系映射\n\n另一方面，`Author` 实体在声明 `AuthorDetail`\
  \ 字段之前指定了 `@OneToOne` 注解，且未指定任何属性。在实际使用中，当这些实体被使用时，将强制实施双向映射。这意味着，如果没有对应的 `Author`\
  \ 对象，`AuthorDetail` 对象就无法存在。\n\n7-7. 定义一对多和多对一关系\n\n问题\n\n您希望将两个实体类相互关联，使得一个实体对象可以包含对多个其他实体对象的引用。\n\
  \n解决方案\n\n通过在拥有对象中引用另一个实体类的字段或属性上指定 `@OneToMany` 注解，并在非拥有实体中引用拥有对象的字段或属性上指定 `@ManyToOne`\
  \ 注解，来定义两个实体之间的关系。例如，假设您允许一个 `Author` 对象包含多个不同的地址或 `AuthorDetail` 对象。实际上，一个 `Author`\
  \ 可以根据需要包含任意数量的地址。在这种情况下，每个 `AuthorDetail` 对象对应一个 `Author` 对象。同样，每个 `Author` 对象也可以对应多个\
  \ `AuthorDetail` 对象。\n\n在下面的代码清单中，我将演示 `Author` 和 `AuthorDetail` 对象之间的一对多关系。首先，让我们看看\
  \ `Author` 对象，它也被称为*拥有*对象。这个实体类可以包含对多个不同 `AuthorDetail` 对象的引用：\n\n```java\n@Entity\n\
  @Table(name = \"AUTHOR\")\npublic class Author implements Serializable {\n    private\
  \ static final long serialVersionUID = 1L;\n    @Id\n    @Basic(optional = false)\n\
  \    @SequenceGenerator(name=\"author_s_generator\",sequenceName=\"author_s\", initialValue=1,\
  \ allocationSize=1)\n    @GeneratedValue(strategy=GenerationType.SEQUENCE, generator=\"\
  author_s_generator\")\n    @NotNull\n    @Column(name = \"ID\")\n    private BigDecimal\
  \ id;\n    @Size(max = 30)\n    @Column(name = \"LAST\")\n    private String last;\n\
  \    @Size(max = 30)\n    @Column(name = \"FIRST\")\n    private String first;\n\
  \    @Lob\n    @Column(name = \"BIO\")\n}\n```\n\n\nprivate String bio;\n\n@OneToMany(mappedBy=\"\
  author\")\n\nprivate Set<AuthorDetail> authorDetail;\n\npublic Author() { }\n\n\
  ...\n\n接下来，我将展示非拥有方对象，即 AuthorDetail 类。一个 Author 对象中可能包含多个 AuthorDetail 对象：\n\n\
  public class AuthorDetail implements Serializable {\n\nprivate static final long\
  \ serialVersionUID = 1L;\n\n@Id\n\n@Basic(optional = false)\n\n@SequenceGenerator(name=\"\
  author_detail_s_generator\",sequenceName=\"author__detail_s\", initialValue=1, allocationSize=1)\n\
  \n@GeneratedValue(strategy=GenerationType.SEQUENCE,\n\ngenerator=\"author_detail_s_generator\"\
  )\n\n@NotNull\n\n@Column(name = \"ID\")\n\nprivate BigDecimal id;\n\n@Size(max =\
  \ 200)\n\n@Column(name = \"ADDRESS1\")\n\nprivate String address1;\n\n@Size(max\
  \ = 200)\n\n@Column(name = \"ADDRESS2\")\n\nprivate String address2;\n\n@Size(max\
  \ = 250)\n\n@Column(name = \"CITY\")\n\nprivate String city;\n\n@Size(max = 2)\n\
  \n@Column(name = \"STATE\")\n\nprivate String state;\n\n@Size(max = 10)\n\n@Column(name\
  \ = \"ZIP\")\n\nprivate String zip;\n\n@Column(name = \"START_DATE\")\n\n@Temporal(TemporalType.DATE)\n\
  \nprivate Date startDate;\n\n@Lob\n\n@Column(name = \"NOTES\")\n\nprivate String\
  \ notes;\n\n第 7 章 ■ 对象关系映射\n\n@ManyToOne\n\nprivate Author author;\n\npublic AuthorDetail()\
  \ { }\n\n...\n\n■ **注意** 要运行 `org.jakartaeerecipe.chapter07.recipe07_07.RecipeTest.java`\
  \ 示例，请务必将本示例的两个实体类添加到 `persistence.xml` 上下文文件中。同时，请确保注释掉持久化上下文中其他同名的实体，因为单个持久化上下文中不能存在重复的实体。\n\
  \n工作原理\n\n最常见的数据库表关系是一对多或多对一关系，即一个表中的记录可能与另一个表中的一条或多条记录相关联。考虑本解决方案中的场景：单个 AUTHOR\
  \ 表记录可能在 AUTHOR_DETAIL 表中拥有一条或多条地址记录。在实体类中定义这种关系很容易，因为可以使用注解来指示关系。\n\n在实体中创建一对多关系时，与“一条记录可对应另一表中多条记录”的表相对应的实体称为*拥有方*实体。而与“可能包含多条与另一表中单条记录相关联的记录”的数据库表相对应的实体称为*非拥有方*实体。拥有方实体类应为其关联的实体声明一个持久化字段或属性，并且可能拥有多个关联对象。由于可能存在多个非拥有方实体对象，拥有方实体必须声明一个非拥有方对象的\
  \ Set，并使用 `@OneToMany` 注解进行指示。`@OneToMany` 注解的 `mappedBy` 属性应设置为非拥有方实体中用于声明多对一关系的名称。在示例中，Author\
  \ 实体与 AuthorDetail 存在一对多关系。\n\n因此，Author 实体按如下方式声明关系：\n\n@OneToMany(mappedBy=\"\
  author\")\n\nprivate Set<AuthorDetail> authorDetail;\n\n另一端则是多对一关系。在示例中，多个 AuthorDetail\
  \ 对象可能关联到一个 Author 对象。因此，应在 AuthorDetail 实体类中为 Author 实体定义一个多对一关系。这通过为 Author 实体声明一个持久化字段或属性，并使用\
  \ `@ManyToOne` 注解指示关系来实现，如下所示：\n\n@ManyToOne\n\nprivate Author author;\n\n在处理实体时，包含一个或多个\
  \ AuthorDetail 对象的 Set 应持久化到单个 Author 对象中。以下代码演示了如何在应用程序中使用一对多关系：\n\nEntityManagerFactory\
  \ emf = Persistence.createEntityManagerFactory(\"JakartaEERecipesLOCAL\"); EntityManager\
  \ em = emf.createEntityManager();\n\ntry {\n\nem.getTransaction().begin();\n\n第\
  \ 7 章 ■ 对象关系映射\n\nAuthor author = new Author();\n\n\n\nauthor.setFirst(\"JOE\");\n\
  \nauthor.setLast(\"TESTER\");\n\nauthor.setBio(\"一个作者测试账户。\");\n\nSet detailSet\
  \ = new HashSet<AuthorDetail>();\n\nAuthorDetail detail = new AuthorDetail();\n\n\
  detail.setAddress1(\"地址 1\");\n\ndetail.setAddress2(\"地址 2\");\n\ndetail.setCity(\"\
  无人之地\");\n\ndetail.setState(\"ZZ\");\n\ndetail.setZip(\"12345\");\n\ndetail.setNotes(\"\
  这是一个测试详情\");\n\ndetailSet.add(detail);\n\nAuthorDetail detail2 = new AuthorDetail();\n\
  \ndetail.setAddress1(\"地址 1\");\n\ndetail.setAddress2(\"地址 2\");\n\ndetail.setCity(\"\
  无人之地\");\n\ndetail.setState(\"ZZ\");\n\ndetail.setZip(\"12345\");\n\ndetail.setNotes(\"\
  这是一个测试详情\");\n\ndetailSet.add(detail2);\n\nem.persist(author);\n\nem.getTransaction().commit();\n\
  \n} catch (Exception ex){\n\nex.printStackTrace();\n\n} finally{\n\nif (em != null){\n\
  \nem.close();\n\n}\n\n}\n\n@OneToMany 注解包含以下可选属性：\n\n• cascade：必须级联到关联目标的操作（例如，删除）。默认值：无操作\n\
  \n• fetch：关联应该被延迟加载还是必须立即获取。默认值：EAGER\n\n• orphanRemoval：是否对已从关系中移除的实体应用移除操作，并将移除操作级联到这些实体。默认值：False\n\
  \n• targetedEntity：作为关联目标的实体类。默认值：\"\"\n\n第 7 章 ■ 对象关系映射\n\n@ManyToMany 注解包含以下可选属性：\n\
  \n• cascade：必须级联到关联目标的操作（例如，删除）。默认值：无操作\n\n• fetch：关联应该被延迟加载还是必须立即获取。默认值：EAGER\n\
  \n• targetedEntity：作为关联目标的实体类。默认值：\"\"\n\n7-8\\. 定义多对多关系\n\n问题\n\n你的数据库中存在这样的情况：一个表中的多条记录可能与另一个表中的多条记录相关联。你希望为这些表定义实体关系。\n\
  \n解决方案\n\n通过在每个实体类中声明一个字段或属性，该字段或属性对应另一端实体类的 Set 对象，从而在两个表之间创建多对多关联。使用 @ManyToMany\
  \ 注解来指定关系，并通过在非拥有方实体的 @ManyToMany 注解上指定 mappedBy 属性来标记关系的拥有方。因此，类 org.jakartaeerecipe.chapter07.recipe07_08.Book\
  \ 是对应 BOOK 数据库表的实体类，它将在 BookAuthor 对象的 Set 声明上包含 @ManyToMany 注解。数据库中的映射表将“自动地”填充来自实体的关联映射。接下来是\
  \ Book 类（“拥有方”实体）的部分代码：\n\n@Entity\n\n@Table(name = \"BOOK\")\n\n@NamedQuery(name\
  \ = \"Book.findAll\", query = \"SELECT b FROM Book b\")\n\npublic class Book implements\
  \ Serializable {\n\nprivate static final long serialVersionUID = 1L;\n\n@Id\n\n\
  @Basic(optional = false)\n\n@SequenceGenerator(name=\"book_s_generator\",sequenceName=\"\
  book_s\", initialValue=1, allocationSize=1)\n\n@GeneratedValue(strategy=GenerationType.SEQUENCE,\n\
  \ngenerator=\"book_s_generator\")\n\n@NotNull\n\n@Column(name = \"ID\")\n\nprivate\
  \ BigDecimal id;\n\n@Size(max = 150)\n\n@Column(name = \"TITLE\")\n\nprivate String\
  \ title;\n\n@Size(max = 500)\n\n@Column(name = \"IMAGE\")\n\nprivate String image;\n\
  \n第 7 章 ■ 对象关系映射\n\n@Lob\n\n@Column(name = \"DESCRIPTION\")\n\nprivate String description;\n\
  \n@ManyToMany\n\nprivate Set<BookAuthorMany> bookAuthors;\n\nBookAuthor 类使用相同的概念映射到\
  \ Book 类。唯一的区别是它在 @ManyToOne 注解中包含了一个 mappedBy 属性，以指明拥有方表的关系：\n\n@Entity\n\n@Table(name\
  \ = \"BOOK_AUTHOR\")\n\n@NamedQueries({\n\n@NamedQuery(name = \"BookAuthor.findAll\"\
  , query = \"SELECT b FROM BookAuthor b\"),\n\n@NamedQuery(name = \"BookAuthor.findById\"\
  , query = \"SELECT b FROM BookAuthor b WHERE\n\nb.id = :id\"),\n\n@NamedQuery(name\
  \ = \"BookAuthor.findByLast\", query = \"SELECT b FROM BookAuthor b WHERE\n\nb.last\
  \ = :last\"),\n\n\n\n@NamedQuery(name = \"BookAuthor.findByFirst\", query = \"SELECT\
  \ b FROM BookAuthor b WHERE\n\nb.first = :first\")})\n\npublic class BookAuthorMany\
  \ implements Serializable {\n\nprivate static final long serialVersionUID = 1L;\n\
  \n@Id\n\n@Basic(optional = false)\n\n@SequenceGenerator(name=\"book_author_s_generator\"\
  ,sequenceName=\"book_author_s\", initialValue=1, allocationSize=1)\n\n@GeneratedValue(strategy=GenerationType.SEQUENCE,\n\
  \ngenerator=\"book_author_s_generator\")\n\n@NotNull\n\n@Column(name = \"ID\")\n\
  \nprivate BigDecimal id;\n\n@Size(max = 30)\n\n@Column(name = “LAST”)\n\nprivate\
  \ String last;\n\n@Size(max = 30)\n\n@Column(name = \"FIRST\")\n\nprivate String\
  \ first;\n\n@Lob\n\n@Column(name = \"BIO\")\n\nprivate String bio;\n\n@ManyToMany(mappedBy=\"\
  bookAuthors\")\n\nprivate Set<Book> books;\n\n第 7 章 ■ 对象关系映射\n\n■ **注意** 为了避免在 JakartaEE\
  \ Recipes 源码中出现冲突的实体类，`BookAuthor` 实体已被命名为 `BookAuthorMany`。同一应用程序中不能存在名称重复的实体。\n\
  \n工作原理\n\n数据库中，两个或多个不同的表之间可能存在多对多关系。以本示例中的情况为例，一本书可能有多位作者，一位作者也可能撰写过多本书。因此，包含书籍的数据库表和包含作者的数据库表通过多对多关系相互关联。通过使用\
  \ `@ManyToMany` 注解，可以轻松地将实体类关联起来，形成多对多关系。`@ManyToMany` 注解用于表示一个实体与带有该注解的持久化字段或属性之间存在多对多关联。\n\
  \n要创建这种关联，多对多关系中的每个实体都应声明一个字段或属性，用于存放关联实体对象的 `Set` 集合。在本示例中，`Book` 实体应声明一个 `BookAuthor`\
  \ 对象的 `Set` 集合，反之亦然。然后，使用 `@ManyToMany` 对该声明进行注解，并根据需要添加必要的属性来建立关联。`@ManyToMany`\
  \ 注解包含以下可选属性：\n\n• `targetEntity`：关联的目标实体类。仅当未使用 Java 泛型定义集合值关系属性时，才需要此属性。\n• `cascade`：必须级联到关联目标的操作。\n\
  • `fetch`：关联是应延迟加载还是立即获取。默认值为 `jakarta.persistence.FetchType.LAZY`。\n• `mappedBy`：拥有该关系的字段。如果关系是单向的，则不需要此属性。\n\
  \n因此，在创建任一类型的对象时，可以使用已用 `@ManyToMany` 注解的持久化字段或属性，持久化一个关联实体对象的 `Set` 集合。以下示例演示了如何创建一个具有多对多关系的实体（摘自\
  \ `org.jakartaeerecipe.chapter07.recipe07_08.RecipeTest` 类）：\n\nEntityManagerFactory\
  \ emf = Persistence.createEntityManagerFactory(\"JakartaEERecipesLOCAL\"); EntityManager\
  \ em = emf.createEntityManager();\n\ntry {\n\nem.getTransaction().begin();\n\nBook\
  \ book1 = new Book();\n\nbook1.setTitle(\"新书 1\");\n\nBook book2 = new Book();\n\
  \nbook2.setTitle(\"新书 2\");\n\nBookAuthorMany author1 = new BookAuthorMany();\n\n\
  author1.setFirst(\"JOE\");\n\nauthor1.setLast(\"作者 1\");\n\nBookAuthorMany author2\
  \ = new BookAuthorMany();\n\nauthor2.setFirst(\"MARYJJOE\");\n\nauthor2.setLast(\"\
  作者 2\");\n\nSet authors = new HashSet();\n\nauthors.add(author1);\n\n第 7 章 ■ 对象关系映射\n\
  \nauthors.add(author2);\n\nSet books = new HashSet();\n\nbooks.add(book1);\n\nbooks.add(book2);\n\
  \nbook1.setBookAuthor(authors);\n\nauthor1.setBooks(books);\n\nem.persist(author1);\n\
  \nem.persist(book1);\n\nem.getTransaction().commit();\n\n} catch (Exception ex){\n\
  \n// 生产环境中请使用日志框架，例如 log4j\n\nSystem.err.println(ex);\n\n} finally{\n\nif (em !=\
  \ null){\n\nem.close();\n\n}\n\n}\n\n当创建包含多对多关联的实体对象时，会在一个映射表中插入一条记录，该记录包含每个关联表记录的主键。你可以选择使用\
  \ `@JoinTable` 注解并指定表名来命名映射表。如果未使用 `@JoinTable` 注解，则映射表名将由两个实体类的名称拼接而成，并以拥有方实体开头。因此，在本示例中，映射表名为\
  \ `BOOK_BOOK_AUTHOR`，它包含一个用于存储每个表关联记录主键的字段。\n\n7-9. 使用命名查询进行查询\n\n问题\n\n你希望为一个实体类定义一个或多个可以通过名称调用的预定义查询，而不是向持久化单元发出\
  \ SQL 或 Jakarta 持久化查询。\n\n解决方案\n\n为一个实体类指定单个命名查询或一组命名查询。为每个命名查询提供一个名称，以便可以通过该名称调用它们。在本示例中，将向\
  \ `BookAuthor` 实体类添加一组命名查询，然后可以使用这些命名查询通过另一个类来查询该实体类。我们将基于一个 `persistence.xml` 文件创建\
  \ `EntityManagerFactory` 和数据库连接，该文件获取到数据库的本地 JDBC 连接。以下摘录自 `BookAuthor` 实体，演示了如何将命名查询与实体类关联：\n\
  \n@Entity\n\n@Table(name = \"BOOK_AUTHOR\")\n\n@NamedQuery(name = \"BookAuthor.findAll\"\
  , query = \"SELECT b FROM BookAuthor b\")\n\n@NamedQuery(name = \"BookAuthor.findById\"\
  , query = \"SELECT b FROM BookAuthor b WHERE\n\nb.id = :id\")\n\n@NamedQuery(name\
  \ = \"BookAuthor.findByLast\", query = \"SELECT b FROM BookAuthor b WHERE b.last\n\
  \n= :last\")\n\n第 7 章 ■ 对象关系映射\n\n@NamedQuery(name = \"BookAuthor.findByFirst\"\
  , query = \"SELECT b FROM BookAuthor b WHERE\n\nb.first = :first\")\n\npublic class\
  \ BookAuthor implements Serializable {\n\nprivate static final long serialVersionUID\
  \ = 1L;\n\n@Id\n\n@Basic(optional = false)\n\n@SequenceGenerator(name=\"book_author_s_generator\"\
  ,sequenceName=\"book_author_s\", initialValue=1, allocationSize=1)\n\n@GeneratedValue(strategy=GenerationType.SEQUENCE,\n\
  \ngenerator=\"book_author_s_generator\")\n\n@NotNull\n\n@Column(name = \"ID\")\n\
  \nprivate BigDecimal id;\n\n@Size(max = 30)\n\n@Column(name = \"LAST\")\n\nprivate\
  \ String last;\n\n@Size(max = 30)\n\n@Column(name = \"FIRST\")\n\nprivate String\
  \ first;\n\n@Lob\n\n@Column(name = \"BIO\")\n\nprivate String bio;\n\npublic BookAuthor()\
  \ { }\n\n...\n\n在另一个类中，可以通过名称调用已在 `BookAuthor` 实体中注册的命名查询。以下摘录自 `org.jakartaeerecipe.chapter07.recipe07_09.RecipeTest`\
  \ 类，演示了如何调用命名查询：\n\nEntityManagerFactory emf = Persistence.createEntityManagerFactory(\"\
  JakartaEERecipesLOCAL\"); EntityManager em = emf.createEntityManager();\n\ntry {\n\
  \nEntityTransaction entr = em.getTransaction();\n\nentr.begin();\n\nQuery query\
  \ = em.createNamedQuery(\"BookAuthor.findAll\");\n\nList authorList = query.getResultList();\n\
  \nIterator authorIterator = authorList.iterator();\n\nwhile (authorIterator.hasNext())\
  \ {\n\nBookAuthor author = (BookAuthor) authorIterator.next();\n\nSystem.out.print(\"\
  姓名:\" + author.getFirst() + \" \" + author.getLast());\n\nSystem.out.println();\n\
  \n}\n\n} catch (Exception ex){\n\nSystem.err.println(ex);\n\n}\n\n![](img/index-408_1.png)\n\
  \n第 7 章 ■ 对象关系映射\n\n图 7-5 将是本示例的输出结果。\n\n***图 7-5.** 示例 7-9 的输出结果*\n\n工作原理\n\n\n\
  \n命名查询包含在实体类中，由通过元数据指定的静态 Jakarta Persistence 查询组成。一个给定的实体类可以包含零个或多个命名查询。命名查询通过\
  \ `@NamedQuery` 注解表达，该注解包含两个属性：`name` 和 `query`。`@NamedQuery` 注解的 `name` 属性用于为查询指定一个基于字符串的名称，而\
  \ `query` 属性用于指定针对该实体的静态查询。如果一个实体包含一组命名查询注解，那么可以为每个查询重复使用 `@NamedQuery` 注解。\n\n\
  命名查询中的 Jakarta Persistence 查询语言可以包含零个或多个绑定变量，这些变量可以在调用命名查询时被替换为值。要使用命名查询，必须首先获取到数据库的活动连接。要了解更多关于通过\
  \ `EntityManagerFactory` 获取数据库活动连接的信息，请参考配方 7-3。一旦获取到活动数据库连接，就可以调用 `EntityManager`\
  \ 对象的 `createNamedQuery` 方法，并传入你想要执行的命名查询的基于字符串的名称。该调用会返回一个 `Query` 对象，可用于获取查询结果。\n\
  \n在本配方的示例中，你可以看到对 `BookAuthor` 实体进行了查询，返回了一个 `BookAuthor` 对象列表。使用一个简单的 `while` 循环来遍历该对象列表，并将每个\
  \ `BookAuthor` 对象的名和姓打印到 `System.out`。\n\n**7-10. 对实体字段执行验证**\n\n**问题**\n\n你希望为实体类中的特定字段指定验证规则，以防止无效数据被插入数据库。\n\
  \n**解决方案**\n\n在实体类中包含 Bean 验证约束。Bean 验证约束是应用于实体类持久化字段或属性的注解。Bean 验证机制提供了许多可以放置在字段或属性上的注解，以便以不同方式验证数据。\n\
  \n在以下示例中，`AuthorWork` 实体已被增强，为 `id`、`address1`、`state` 和 `zip` 字段包含了 Bean 验证：\n\n\
  ```java\n...\n\n@Entity\n@Table(name = \"AUTHOR_DETAIL\")\npublic class AuthorDetailBeanValidation\
  \ implements Serializable {\n\n    private static final long serialVersionUID =\
  \ 1L;\n\n    @Id\n    @Basic(optional = false)\n    @SequenceGenerator(name=\"author_detail_s_generator\"\
  , sequenceName=\"author__detail_s\", initialValue=1, allocationSize=1)\n    @GeneratedValue(strategy=GenerationType.SEQUENCE,\
  \ generator=\"author_detail_s_generator\")\n    @NotNull\n    @Column(name = \"\
  ID\")\n    private BigDecimal id;\n\n    @Size(max = 200)\n    @Pattern(regexp=\"\
  \", message=\"Invalid Address\")\n    @Column(name = \"ADDRESS1\")\n    private\
  \ String address1;\n\n    @Size(max = 200)\n    @Column(name = \"ADDRESS2\")\n \
  \   private String address2;\n\n    @Size(max = 250)\n    @Column(name = \"CITY\"\
  )\n    private String city;\n\n    @Size(max = 2)\n    @Column(name = \"STATE\"\
  )\n    @Pattern(regexp=\"^(?-i:A[LKSZRAEP]|C[AOT]|D[EC]|F[LM]|G[AU]|HI|I[ADLN]|K[SY]|LA|M[ADEHINOPST]|N[CDEHJMVY]|O[HKR]|P[ARW]|RI|S[CD]|T[NX]|UT|V[AIT]|W[AIVY])$\"\
  , message=\"Invalid State\")\n    private String state;\n\n    @Size(max = 10)\n\
  \    @Column(name = \"ZIP\")\n    @Pattern(regexp=\"^\\\\d{5}\\\\p{Punct}?\\\\s?(?:\\\
  \\d{4})?$\", message=\"Invalid Zip Code\")\n    private String zip;\n\n    @Column(name\
  \ = \"START_DATE\")\n    @Temporal(TemporalType.DATE)\n    private Date startDate;\n\
  \n    @Lob\n    @Column(name = \"NOTES\")\n    private String notes;\n\n    @ManyToOne\n\
  \    private AuthorBeanValidation author;\n\n    ...\n}\n```\n\n如果尝试插入不符合验证规则的值，该对象将不会被持久化，并且会显示与\
  \ Bean 验证注解相对应的消息。\n\n**工作原理**\n\n在处理用户输入时，采用数据验证策略始终是一个好主意，特别是当数据将被持久化到数据库或其他数据存储中以备后用的时候。Java\
  \ Persistence API 允许在实体类内部进行 Bean 验证，开发者可以直接将验证规则放置在持久化字段或属性上。默认情况下，在 `PrePersist`、`PreUpdate`\
  \ 和 `PreRemove` 生命周期事件发生后，持久化提供程序会自动对包含 Bean 验证注解约束的实体调用验证过程。此时，任何不符合给定验证约束的值都会导致实体停止持久化并显示一条关联消息。\n\
  \nBean 验证的细节是相同的，无论它是在普通的 Java 对象（POJO）上还是在实体类上。对于实体类，持久化字段或属性都可以使用所需的 Bean 验证约束进行注解。要查看可能的\
  \ Bean 验证约束注解列表，请参考第 10 章。\n\n在本配方的示例中，`@NotNull` 和 `@Pattern` 注解被指定在 `AuthorDetail`\
  \ 实体的持久化属性上。具体来说，`id` 字段使用 `@NotNull` 注解，尝试为该字段输入 `NULL` 值将导致验证失败。`state` 和 `zip`\
  \ 字段包含 `@Pattern` 注解，以及相应的正则表达式和失败消息。如果这些字段的值不符合指定的正则表达式，那么分配给 `@Pattern` 注解的 `message`\
  \ 属性的消息将通过 Jakarta Server Faces 视图中与被验证字段对应的 `h:message` 组件显示。如果你想对给定的字段或属性应用一组正则表达式模式怎么办？可以使用\
  \ `@Pattern.List` 语法来实现，该列表将包含一个逗号分隔的 `@Pattern` 注解列表。以下代码行演示了这种技术：\n\n```java\n\
  @Pattern.List({\n    @Pattern(regexp=\"regex-pattern\", message=\"Error Message\"\
  ),\n    @Pattern(regexp=\"another regex-pattern\", message=\"Error Message 2\")\n\
  })\n```\n\nBean 验证是确保无效数据不会提交到数据存储的好方法。然而，如今大多数高级桌面或 Web 应用程序会使用多层验证来提升用户体验。很多时候，Web\
  \ 应用程序首先使用 JavaScript 字段验证，这样用户无需提交页面就能在屏幕上看到验证错误。如果使用 Jakarta Server Faces 或其他\
  \ Web 框架，某些组件允许直接访问 Bean 验证，在这种情况下，给定字段或属性的 Ajax 提交会在后台进行，从而无需提交页面即可完成 Bean 验证。无论你采取何种策略，实体类中的\
  \ Bean 验证都很重要，并且应该成为你武器库中的一个便捷工具。\n\n**7-11. 自动生成数据库模式对象**\n\n**问题**\n\n你正在开发一个应用程序，并希望自动将你的实体类生成到底层数据库的表中。\n\
  \n**解决方案**\n\n使用 EJB 3.2 中引入的自动模式生成。模式生成由 `persistence.xml` 单元的对象-关系元数据决定，除非提供了用于生成的自定义脚本。应用程序开发者可以将脚本打包为持久化单元的一部分，或者提供脚本位置的\
  \ URL 用于模式生成。这些脚本的执行可以在数据库模式创建或删除时进行，或者两者都进行。\n\n\n由容器本身执行，或者容器可以指示持久化提供程序负责脚本的执行。本配方的“工作原理”部分中的表\
  \ 7-3 列出了用于配置模式生成的不同 `persistence.xml` 或 `EntityManagerFactory` 属性。这些属性作为 `Map`\
  \ 参数从容器传递给 `PersistenceProvider` 的 `generateSchema` 方法或 `createContainerEntityManagerFactory`\
  \ 方法。\n\n***表 7-3.** 模式生成属性*\n\n**属性**\n\n**用途**\n\n`schema-generation-action`\n\
  \n控制持久化提供程序在对象生成和销毁方面采取的操作。**值**：`none`、`create`、`drop-and-create` 和 `drop`\n\n\
  `schema-generation-target`\n\n控制模式是在数据库内创建，还是创建数据定义语言（DDL）脚本，或者两者都创建。**值**：`database`、`scripts`\
  \ 和 `database-and-scripts`\n\n`ddl-create-script-target`，\n\n如果 `schema-generation-target`\
  \ 指定了脚本生成，则控制写入脚本的目标位置。写入器已为持久化提供程序预配置。**值**：`java.io.Writer`（例如，`MyWriter.class`）或\
  \ URL 字符串\n\n`ddl-drop-script-target`\n\n`ddl-create-script-source`，\n\n指定读取 DDL\
  \ 脚本的位置。读取器已为持久化提供程序预配置。**值**：`java.io.Reader`（例如，`MyReader.class`）或 URL 字符串\n\n\
  `ddl-drop-script-source`\n\n`sql-load-script-source`\n\n指定 SQL 批量加载脚本的文件位置。**值**：`java.io.Reader`（例如，`MyReader.class`）或\
  \ URL 字符串\n\n`schema-generation-connection`\n\n用于执行模式生成的 JDBC 连接\n\n`database-product-name`，\n\
  \n如果需要生成脚本，则需要此属性。值从 JDBC `DatabaseMetaData` 获取\n\n`database-major-version`，\n\n\
  `database-minor-version`\n\n`create-database-schemas`\n\n持久化提供程序除了创建数据库对象（如表、序列、约束等）之外，是否还需要创建模式。**值**：`true`\
  \ 和 `false`\n\n要定义需要生成的不同对象，请相应地注解实体类。标准的实体类注解（`@Table`、`@Id` 等）决定了创建哪些对象以及它们的结构。有关在实体类中指定注解以生成模式对象的更多信息，请参考本配方“工作原理”部分中表\
  \ 7-4 列出的注解。\n\n第 7 章 ■ 对象关系映射\n\n***表 7-4.** 模式生成注解*\n\n**注解**\n\n**描述**\n\n**元素**\n\
  \n`@Table`\n\n用于生成表。默认情况下，表名由实体名生成，实体名默认使用类名\n\n`@SecondaryTable`\n\n创建一个辅助表，用于将实体状态的映射分区到多个表中\n\
  \n`@CollectionTable`\n\n为元素集合的映射创建一个集合表。可以使用 `@Column`、`@AttributeOverride` 和 `@AssociationOverride`\
  \ 注解来覆盖 `@CollectionTable` 的映射\n\n`@JoinTable`\n\n用于关联的映射。默认情况下，为多对多关系和单向一对多关系的映射创建连接表\n\
  \n`@TableGenerator`\n\n用于存储生成的主键值\n\n`@Column`\n\n确定表中列的名称和配置\n\n`unique`、`nullable`、`columnDefinition`、`table`、`length`、`precision`、`scale`、`name`\n\
  \n`@MapKeyColumn`\n\n当键为基本类型时，指定映射的键列的名称\n\n`unique`、`nullable`、`columnDefinition`、`table`、`length`、`precision`、`scale`\n\
  \n`@Enumerated`，\n\n控制为枚举类型的基本属性生成的是字符串值列还是整数值列，因此会影响这些类型的默认列映射\n\n`@MapKeyEnumerated`\n\
  \n`@Temporal`，\n\n控制为时态类型的基本属性生成的是日期值列、时间值列还是时间戳值列，因此会影响这些类型的默认列映射\n\n`@MapKeyTemporal`\n\
  \n`@Lob`\n\n指定将持久化属性映射到数据库大对象类型\n\n`@OrderColumn`\n\n指定生成一个列，用于维护在元素集合、一对多或多对多关系中表示的列表的持久化顺序\n\
  \n`name`、`nullable`、`columnDefinition`\n\n`@DiscriminatorColumn`\n\n为 `SINGLE_TABLE`\
  \ 映射策略生成，并且提供程序可以选择性地为 `JOINED` 继承策略生成\n\n`@Version`\n\n指定生成一个列，用作实体的乐观锁\n\n`@Id`\n\
  \n指定一个数据库主键列。使用 `@Id` 注解会导致创建一个由相应列组成的主键\n\n`@EmbeddedId`\n\n指定一个嵌入式属性，其对应的列构成数据库主键。使用\
  \ `@EmbeddedId` 注解会导致创建一个由相应列组成的主键\n\n`@GeneratedValue`\n\n指示一个应具有自动生成值的主键。如果指定了策略，并且目标数据库支持该策略，则提供程序必须使用它\n\
  \n`@JoinColumn`\n\n`@JoinColumn` 注解通常用于指定外键映射\n\n`name`、`referencedColumnName`、`unique`、`nullable`、`columnDefinition`、`table`、`foreignKey`\n\
  \n`@MapKeyJoinColumn`\n\n指定对作为元素集合或由映射值组成的关系中的映射键的实体的外键映射\n\n`name`、`referencedColumnName`、`unique`、`nullable`、`columnDefinition`、`table`、`foreignKey`\n\
  \n`@PrimaryKeyJoinColumn`\n\n指定将主键列用作外键。此注解用于指定 `JOINED` 映射策略，以及在一对一关系映射中将辅助表连接到主表\n\
  \n`@ForeignKey`\n\n在 `@JoinColumn`、`@JoinColumns`、`@MapKeyJoinColumn`、`@MapKeyJoinColumns`、`@PrimaryKeyJoinColumn`\
  \ 和 `@PrimaryKeyJoinColumns` 注解中使用，以指定或覆盖外键约束\n\n`@SequenceGenerator`\n\n创建一个用于\
  \ ID 生成的数据库序列\n\n`@Index`\n\n生成一个由指定列组成的索引\n\n`@UniqueConstraint`\n\n为给定表生成唯一约束\n\
  \n第 7 章 ■ 对象关系映射\n\n工作原理\n\n模式生成指的是创建底层数据库表、视图、约束和其他数据库工件。在 Java EE 7 版本之前，模式生成只能通过使用诸如\
  \ NetBeans 或 Eclipse 之类的 IDE 来自动化。然而，EE 7 版本通过允许为应用程序配置适当的 `persistence.xml` 文件来实现模式生成的自动化，从而朝着打破这种对\
  \ IDE 的依赖迈出了一步。\n\n模式生成可以直接应用于数据库，也可以生成可以手动应用于数据库的 SQL 脚本（或两者兼有），具体取决于为应用程序配置了哪些选项。模式生成可以在应用程序部署之前发生，也可以在作为应用程序部署和初始化的一部分创建\
  \ `EntityManagerFactory` 时发生。为了执行模式生成，容器可以独立于持久化单元的实体管理器工厂和/或在其之前调用 `PersistenceProvider`\
  \ 的 `generateSchema` 方法。`createContainerEntityManagerFactory` 调用可以接受额外信息，以使得模式结构的生成作为实体管理器工厂创建或初始化过程的一部分发生。此外，此信息可以确定是直接操作数据库，还是创建\
  \ SQL 脚本，或者两者都进行。\n\n\n\n■ **注意** 模式生成在 Java SE 环境中的托管容器（例如 Web 应用服务器）之外也可用。要在 Java\
  \ SE 环境中执行模式生成，应用程序可以调用 `Persistence` 的 `generateSchema` 方法（该方法独立于实体管理器工厂的创建，或在其创建之前调用），也可以向\
  \ `createEntityManagerFactory` 方法传递信息，以便在创建实体管理器工厂时一并生成模式。\n\n表 7-3 列出了可在 `persistence.xml`\
  \ 文件中指定的、用于自动化模式生成的不同模式生成属性。\n\n在编程层面，模式生成由放置在实体类中的一系列注解决定。`@Table` 注解表示实体与底层数据库表的映射。默认情况下，会为每个顶级实体生成一个表，并根据该实体的指定属性包含相应的列。因此，`@Column`\
  \ 和 `@JoinColumn` 注解用于为表生成这些列。列的顺序并非由 `@Column` 或 `@JoinColumn` 注解的顺序决定。如果列的顺序很重要，则必须提供数据定义语言（DDL）脚本来生成表。其他注解和注解属性（例如\
  \ `@Id`）在模式生成中也扮演着重要角色。表 7-4 列出了参与模式生成的不同注解，并附有简要说明以及可填充的元素，以便进一步控制生成的模式。\n\n根据表\
  \ 7-4，有几个注解是专门为方便模式生成而创建的。这些新注解是 `@Index` 和 `@ForeignKey`，其中 `@Index` 负责为指定的列生成索引。`@ForeignKey`\
  \ 用于在表上定义外键。\n\n以下是从 *persistence.xml* 中摘录的内容，用于在模式生成过程中启用表的创建：\n\n<property name=\"\
  jakarta.persistence.schema-generation.database.action\" value=\"create\"/>\n\n<property\
  \ name=\"jakarta.persistence.schema-generation.create-source\" value=\"metadata\"\
  /> 添加上述属性将导致数据库模式对象的自动生成。\n\n第 7 章 ■ 对象关系映射\n\n7-12\\. 映射日期时间值\n\n问题\n\n您希望使用日期时间\
  \ API 将 Java `LocalDate` 值持久化到数据库中。\n\n解决方案\n\n使用 JPA 2.2 对日期时间 API 的支持来处理 `LocalDate`。由于\
  \ JPA 2.2 维护版本支持 Java 日期时间 API，因此可以利用 Java 8 中引入的日期和时间对象进行持久化，而无需使用 `@Temporal`\
  \ 注解。以下实体类演示了如何实现这一功能：\n\npublic class Book implements Serializable {\n\nprivate\
  \ static final long serialVersionUID = 1L;\n\n@Id\n\n@Basic(optional = false)\n\n\
  @Column(name = \"ID\")\n\nprivate BigDecimal id;\n\n@Size(max = 150)\n\n@Column(name\
  \ = \"TITLE\")\n\nprotected String title;\n\n@Size(max = 500)\n\n@Column(name =\
  \ “IMAGE”)\n\nprivate String image;\n\n@Lob\n\n@Column(name = \"DESCRIPTION\")\n\
  \nprivate String description;\n\n@Column(name = \"PUBLISH_DATE\")\n\nprivate LocalDate\
  \ publishDate;\n\n@ManyToMany(mappedBy=\"books\")\n\nprivate Set<BookAuthor> authors;\n\
  \n@OneToMany(mappedBy=\"book\", cascade=CascadeType.ALL)\n\nprivate List<Chapter>\
  \ chapters = null;\n\npublic Book() { }\n\n...\n\n}\n\n如您所见，实体类包含一个 `LocalDate`\
  \ 字段，该字段没有包含任何特殊注解。\n\n第 7 章 ■ 对象关系映射\n\n工作原理\n\n当 Java 8 最初发布时，Java EE 和 JPA 并不支持更新的日期时间\
  \ API。因此，为了使用较新的日期和时间对象，必须开发一个转换器来执行新日期时间对象与 `java.util.Date` 之间的自动转换。自 JPA 2.2\
  \ 维护版本以来，这个问题得到了缓解，因为 Java 日期时间 API 已得到官方支持，使得持久化包含日期和时间值的字段比以往任何时候都更加容易。\n\n要将包含日期的数据库列映射到\
  \ Java 对象，只需使用 `@Column` 注解对该列进行注解，如果需要，可以指定列名。不再需要 `@Temporal` 注解。将以下数据类型之一应用于类字段：\n\
  \n• java.time.LocalDate\n\n• java.time.LocalTime\n\n• java.time.LocalDateTime\n\n\
  • java.time.OffsetTime\n\n• java.time.OffsetDateTime\n\n就是这么简单！Jakarta Persistence\
  \ API 的日期时间支持提供了在 Java EE 应用程序中使用该 API 的能力，而无需转换器。它还减少了代码量，因为不再需要 `@Temporal`。\n\
  \n7-13\\. 多次使用同一注解\n\n问题\n\n您希望在给定类中多次使用同一个注解。例如，假设您想在一个类中使用多个 `@PersistenceContext`\
  \ 注解。\n\n解决方案\n\n利用 JPA 2.2 提供的 Java 8 可重复注解支持。这种新增支持提供了在许多情况下使用可重复注解的能力。在以下示例中，`@NamedQuery`\
  \ 注解在同一个类中被多次使用。在 JPA 2.2 之前，如果不先将这些注解分组到一个容器注解中，这是行不通的：\n\n@Entity\n\n@Table(name\
  \ = \"EMPLOYEE\")\n\n@XmlRootElement\n\n@NamedQuery(name = \"Employee.findAll\"\
  , query = \"SELECT e FROM Employee e\")\n\n@NamedQuery(name = \"Employee.findById\"\
  , query = \"SELECT e FROM Employee e WHERE e.id = :id\")\n\n@NamedQuery(name = \"\
  Employee.findByFirst\", query = \"SELECT e FROM Employee e WHERE e.first =\n\n:first\"\
  )\n\n@NamedQuery(name = \"Employee.findByLast\", query = \"SELECT e FROM Employee\
  \ e WHERE e.last\n\n= :last\")\n\n@NamedQuery(name = \"Employee.findByAge\", query\
  \ = \"SELECT e FROM Employee e WHERE e.age\n\n= :age\")\n\n@NamedStoredProcedureQuery(name\
  \ = \"createEmp\", procedureName = \"CREATE_EMP\") 375\n\n第 7 章 ■ 对象关系映射\n\npublic\
  \ class Employee implements Serializable {\n\nprivate static final long serialVersionUID\
  \ = 1L;\n\n// @Max(value=?) @Min(value=?)//如果您知道十进制字段的范围，请考虑使用这些注解来强制执行字段验证\n\n\
  @Id\n\n@Basic(optional = false)\n\n//@NotNull\n\n@Column(name = \"ID\")\n\nprivate\
  \ BigDecimal id;\n\n@Size(max = 30)\n\n@Column(name = \"FIRSTNAME\")\n\nprivate\
  \ String first;\n\n@Size(max = 30)\n\n@Column(name = \"LASTNAME\")\n\nprivate String\
  \ last;\n\n@Column(name = “AGE”)\n\nprivate BigInteger age;\n\n@ManyToOne(optional\
  \ = false)\n\n@JoinColumn(name = \"JOB_ID\", nullable = false)\n\nprivate Jobs job;\n\
  \n@Column(name = \"STATUS\")\n\nprivate String status;\n\npublic Employee() { }\n\
  \n...\n\n}\n\n工作原理\n\n可重复注解支持随 Java 8 的发布而引入 Java 平台。这使得可以在代码段中多次使用同一个注解。注解默认是不可重复的；注解类必须使用\
  \ `@Repeatable` 注解指定为可重复。因此，并非所有注解都可以在类中多次使用。以下注解在 Java EE 8 版本中被设为可重复：\n\n• AssociationOverride\n\
  \n• AttributeOverride\n\n• Convert\n\n• JoinColumn\n\n• MapKeyJoinColumn\n\n• NamedEntityGraph\n\
  \n第 7 章 ■ 对象关系映射\n\n• NamedNativeQuery\n\n• NamedQuery\n\n• NamedStoredProcedureQuery\n\
  \n• PersistenceContext\n\n• PersistenceUnit\n\n• PrimaryKeyJoinColumn\n\n• SecondaryTable\n\
  \n• SqlResultSetMapping\n\n如前所述，注解必须通过使用 `@Repeatable` 标记来指定为可重复。\n\n\n\n`@Repeatable`\
  \ 注解。因此，如果你创建了一个自定义注解并希望使其可重复，那么你可以这样做。\n\n**第 8 章**\n\n**Jakarta 企业 Beans**\n\n\
  Jakarta 企业 Beans 的创建是为了将视图层与数据库访问层和业务层分离。在 Jakarta EE 应用中，所有数据库（EntityManager）访问和业务逻辑都可以在\
  \ Jakarta 企业 Beans 中完成，并且在过去的几个版本中，它们的使用已经变得非常简单。Jakarta 企业 Beans 用于协调实体相关的数据库任务，而\
  \ Jakarta Server Faces CDI 控制器（也称为控制器类）用于直接与 Jakarta Server Faces 视图或网页交互。CDI Beans\
  \ 用于在视图层和业务层之间提供外观。\n\nJakarta 企业 Beans 部署到管理 Bean 生命周期的应用服务器容器中。该容器还为 Jakarta 企业\
  \ Beans 提供事务管理和安全性等功能。Jakarta 企业 Beans 是可移植的，这意味着它们可以部署到不同的应用服务器容器中。这为 Jakarta 企业\
  \ Beans 开发者带来了好处，因为单个 Jakarta 企业 Beans 可以在多个应用中使用。此外，由于使用 Java 持久化查询语言（Java Persistence\
  \ Query Language，详见第 9 章）而非常规 SQL 来执行数据库操作，Jakarta 企业 Beans 还缓解了修改应用以适配多个数据库的问题。因此，如果一个应用是在某个数据库上开发的，它可以移植到另一个数据库，而无需重写任何\
  \ SQL。\n\n有三种类型的 Jakarta 企业 Beans 可供使用：无状态、有状态和消息驱动。本章将介绍前两种，消息驱动 Beans（MDB）将在介绍\
  \ Jakarta 消息服务的第 12 章中介绍。无状态会话 Beans 最常用，因为它们用于快速事务，并且不维护任何会话状态。另一方面，有状态 Beans 用于需要在多个客户端请求之间维护会话状态的情况。\n\
  \n本章包含一些技巧，帮助你熟悉有状态和无状态会话 Beans。你将学习如何从 Jakarta Server Faces CDI 控制器客户端访问 Jakarta\
  \ 企业 Beans，并在 Jakarta Server Faces 视图或网页中显示 Jakarta 企业 Beans 从数据库查询到的内容。此外，还有一些技巧涵盖了有用的策略，例如使用\
  \ Bean 定时器和创建单例会话 Beans。\n\n■ **注意** 近年来，由于 CDI Beans 现在可以替代它们，Jakarta 企业 Beans\
  \ 可能被视为较老的技术。\n\n© Josh Juneau 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang，*Java\
  \ EE 到 Jakarta EE 10 实战*，[`doi.org/10.1007/978-1-4842-8079-9_8`](https://doi.org/10.1007/978-1-4842-8079-9_8#DOI)\n\
  \n第 8 章 ■ Jakarta 企业 Beans\n\n8-1. 获取实体管理器\n\n问题\n\n你已为数据库连接创建了一个持久化单元，并希望使用它来获取一个用于处理数据库的连接。\n\
  \n解决方案 #1\n\n通过调用 `jakarta.persistence.Persistence.createEntityManagerFactory` 方法并传入\
  \ `JakartaEERecipesLOCAL` 持久化单元的名称，创建一个使用本地 JDBC 连接的 `EntityManagerFactory` 对象。从已创建的工厂对象中获取一个\
  \ `EntityManager` 对象，然后根据需要利用该 `EntityManager` 对象处理数据库实体。以下代码行演示了如何使用本地 JDBC 连接创建\
  \ `EntityManager` 对象：\n\n```java\nEntityManagerFactory emf = Persistence.createEntityManagerFactory(\"\
  JakartaEERecipesLOCAL\");\nEntityManager em = emf.createEntityManager();\n```\n\n\
  ■ **注意** 关于创建持久化单元的更多参考，请参见技巧 8-3。\n\n解决方案 #2\n\n在使用 Java 命名和目录接口（JNDI）的环境（例如应用服务器）中使用数据库连接时，将\
  \ `EntityManager` 注入到 EJB 中。为此，声明一个 `EntityManager` 类型的私有字段，并使用 `@PersistenceContext`\
  \ 注解对其进行注解。将相关持久化单元的名称传递给 `@PersistenceContext` 注解。以下代码行演示了如何执行此技术。在应用中，这些代码行将位于实体类的\
  \ EJB 中：\n\n```java\n@PersistenceContext(unitName = \"JakartaEERecipes\")\nprivate\
  \ EntityManager em;\n```\n\n工作原理\n\n在实体类可用于持久化对象或获取查询结果之前，必须从持久化单元数据库连接配置中创建一个实体管理器。创建实体管理器的方式将根据你使用的数据库连接类型而有所不同。例如，如果你是从本地\
  \ JDBC 连接创建实体管理器，则需要做更多工作，因为必须使用 `EntityManagerFactory` 来获取 `EntityManager` 对象。另一方面，如果你是从通过\
  \ JNDI 在应用服务器中注册的数据库连接创建容器管理的实体管理器，那么大部分工作将通过元数据注解在后台为你完成。这是首选方法，因为配置易于从应用服务器集中管理。\n\
  \n在本技巧的第一个解决方案中，使用与本地 JDBC 连接相关的持久化单元来获取 `EntityManager` 对象。如前所述，在 Jakarta 企业 Beans\
  \ 中，必须首先通过调用 `jakarta.persistence.Persistence` 类的 `createEntityManagerFactory` 方法并将基于字符串的持久化单元名称传递给该方法来获取\
  \ `EntityManagerFactory` 对象。然后，可以通过调用 `EntityManagerFactory` 的 `createEntityManager`\
  \ 方法来实例化一个 `EntityManager` 对象。\n\n第 8 章 ■ Jakarta 企业 Beans\n\n在本技巧的第二个解决方案中，获取了一个容器管理的\
  \ `EntityManager` 对象实例。如果应用部署到诸如 Eclipse GlassFish 之类的企业应用服务器容器中，这是获取 `EntityManager`\
  \ 的首选方式。利用容器管理的实体管理器使 Jakarta 持久化开发更加容易，因为 Jakarta EE 容器管理容器管理的实体管理器的生命周期。此外，容器管理的实体管理器会自动传播到单个\
  \ Jakarta 事务 API 事务中的所有应用组件。要获取容器管理的实体管理器，在 Jakarta 企业 Beans 中声明一个 `EntityManager`\
  \ 字段，只需使用 `@PersistenceContext` 注解对其进行注解，并将基于字符串的持久化单元名称传递给该注解。这样做会将实体管理器注入到应用组件中。\n\
  \n执行上述任一解决方案后，新获取的 `EntityManager` 对象即可使用。最常用的 `EntityManager` 方法是 `createQuery`、`createNamedQuery`、`find`\
  \ 和 `persist`。你将在接下来的技巧中了解更多关于使用 `EntityManager` 的内容。\n\n项目的 Maven 依赖项如下：\n\n```xml\n\
  <dependency>\n    <groupId>jakarta.ejb</groupId>\n    <artifactId>jakarta.ejb-api</artifactId>\n\
  \    <version>4.0.0</version>\n    <scope>provided</scope>\n</dependency>\n<dependency>\n\
  \    <groupId>jakarta.persistence</groupId>\n    <artifactId>jakarta.persistence-api</artifactId>\n\
  \    <version>3.1.0</version>\n</dependency>\n<dependency>\n    <groupId>org.eclipse.persistence</groupId>\n\
  \    <artifactId>eclipselink</artifactId>\n    <version>4.0.0-M3</version>\n</dependency>\n\
  <dependency>\n    <groupId>org.apache.derby</groupId>\n    <artifactId>derbyclient</artifactId>\n\
  \    <version>10.15.2.0</version>\n    <scope>runtime</scope>\n</dependency>\n<dependency>\n\
  \    <groupId>org.apache.derby</groupId>\n```\n\n\n\n<artifactId>derbynet</artifactId>\n\
  \n<version>10.15.2.0</version>\n\n<scope>runtime</scope>\n\n</dependency>\n\n<dependency>\n\
  \n<groupId>jakarta.platform</groupId>\n\n<artifactId>jakarta.jakartaee-web-api</artifactId>\n\
  \n<version>10.0.0-RC1</version>\n\n</dependency>\n\n第 8 章 ■ Jakarta 企业 Bean\n\n\
  8-2\\. 开发无状态会话 Bean\n\n问题\n\n您希望创建一个可用于为客户端执行任务的类，但应用程序不需要 Bean 在事务之间保留任何状态。此外，您还希望能够在类内部与数据库进行交互。\n\
  \n解决方案 #1\n\n为您要执行任务的实体类创建一个无状态会话 Bean。从持久化单元创建一个`EntityManager`对象，并使用实体类对数据库发起任务。\n\
  \n在以下解决方案中，创建了一个用于处理 Book 实体的无状态会话 Bean：\npackage org.jakartaeerecipe.chapter08.session;\n\
  \nimport jakarta.ejb.Stateless;\n\nimport jakarta.persistence.EntityManager;\n\n\
  import jakarta.persistence.PersistenceContext;\n\nimport org.jakartaeerecipe.chapter08.entity.Book;\n\
  \n**@Stateless**\n\npublic class BookFacade {\n\n@PersistenceContext(unitName =\
  \ \"JakartaEERecipes\")\n\nprivate EntityManager em;\n\nprotected EntityManager\
  \ getEntityManager() {\n\nreturn em;\n\n}\n\npublic BookFacade() {\n\n}\n\n/**\n\
  \n* 创建一个图书对象\n\n* @param book\n\n*/\n\npublic void create(Book book){\n\nem.persist(book);\n\
  \n}\n\n/**\n\n* 更新一个图书对象\n\n* @param book\n\n*/\n\npublic void edit(Book book){\n\
  \nem.merge(book);\n\n}\n\n/**\n\n* 移除一个图书对象\n\n* @param book\n\n*/\n\npublic void\
  \ remove(Book book){\n\nem.remove(book);\n\n第 8 章 ■ Jakarta 企业 Bean\n\n}\n\n/**\n\
  \n* 根据给定的标题返回一个 Book 对象。此方法假设数据库中不存在重复标题。\n\n* @param title\n\n* @return\n\n*/\n\
  \npublic Book findByTitle(String title){\n\nBook returnValue = null;\n\ntry{\n\n\
  returnValue = (Book) em.createQuery(\"select object(o) from Book o \" +\n\n\"where\
  \ o.title = :title\")\n\n.setParameter(\"title\", title.toUpperCase())\n\n.getSingleResult();\n\
  \n} catch (NoResultException ex){\n\nex.printStackTrace();\n\n}\n\nreturn returnValue;\n\
  \n}\n\n}\n\n在示例会话 Bean 中，客户端可以调用`create`、`edit`和`remove`方法来对数据库执行 CRUD 操作。客户端可以调用`findByTitle()`方法从数据库中获取一个`Book`对象。\n\
  \n解决方案 #2\n\n为您要执行任务的实体类创建一个无状态会话 Bean，并扩展一个封装了会话 Bean 标准操作的抽象类。从持久化单元创建一个`EntityManager`对象，并使用实体类对数据库发起任务。在以下解决方案中，创建了一个用于处理\
  \ Book 实体的无状态会话 Bean。它扩展了一个名为`AbstractFacade`的类，该类包含了 EJB 中大多数常用操作的实现。\n\n首先，让我们看一下`BookFacade`类，即无状态会话\
  \ Bean：\n\npackage org.jakartaeerecipe.chapter08.session;\n\nimport jakarta.ejb.Stateless;\n\
  \nimport jakarta.persistence.EntityManager;\n\nimport jakarta.persistence.PersistenceContext;\n\
  \nimport org.jakartaeerecipe.chapter08.entity.Book;\n\n@Stateless\n\npublic class\
  \ BookFacade extends AbstractFacade<Book> {\n\n@PersistenceContext(unitName = \"\
  JakartaEERecipes\")\n\nprivate EntityManager em;\n\n@Override\n\nprotected EntityManager\
  \ getEntityManager() {\n\nreturn em;\n\n}\n\npublic BookFacade() {\n\nsuper(Book.class);\n\
  \n第 8 章 ■ Jakarta 企业 Bean\n\n}\n\n/**\n\n* 根据给定的标题返回一个 Book 对象。此方法假设数据库中不存在重复标题。\n\
  \n* @param title\n\n* @return\n\n*/\n\npublic Book findByTitle(String title){\n\n\
  return (Book) em.createQuery(\"select object(o) from Book o \" +\n\n\"where o.title\
  \ = :title\")\n\n.setParameter(\"title\", title.toUpperCase())\n\n.getSingleResult();\n\
  \n}\n\n}\n\n如您所见，Jakarta 企业 Bean 中只实现了一个方法，即`findByTitle()`方法。然而，由于`BookFacade`扩展了`AbstractFacade`，因此也可以通过`BookFacade`会话\
  \ Bean 对 Book 实体执行其他 CRUD 功能，例如创建、更新和移除。`AbstractFacade`类是一个抽象类，它实现了最常用的 Jakarta\
  \ 企业 Bean 方法。\n\n它接受一个指定为泛型的实体类类型，其实现如下。\n\n■ **注意** 以下代码是在为 Book 实体类创建无状态会话 Bean\
  \ 后，由 Apache NetBeans IDE 与`BookFacade`会话 Bean 一起自动生成的。如果您使用的是其他 IDE，如 Eclipse 或\
  \ IntelliJ，则可能需要手动编写此代码。\n\npackage org.jakartaeerecipe.chapter08.session;\n\nimport\
  \ java.util.List;\n\nimport jakarta.persistence.EntityManager;\n\n/**\n\n* 会话 Bean\
  \ 的抽象 Facade\n\n*/\n\npublic abstract class AbstractFacade<T> {\n\nprivate Class<T>\
  \ entityClass;\n\npublic AbstractFacade(Class<T> entityClass) {\n\nthis.entityClass\
  \ = entityClass;\n\n}\n\nprotected abstract EntityManager getEntityManager();\n\n\
  public void create(T entity) {\n\ngetEntityManager().persist(entity);\n\n}\n\npublic\
  \ void edit(T entity) {\n\ngetEntityManager().merge(entity);\n\n}\n\npublic void\
  \ remove(T entity) {\n\ngetEntityManager().remove(getEntityManager().merge(entity));\n\
  \n}\n\npublic T find(Object id) {\n\nreturn getEntityManager().find(entityClass,\
  \ id);\n\n第 8 章 ■ Jakarta 企业 Bean\n\n}\n\npublic List<T> findAll() {\n\njakarta.persistence.criteria.CriteriaQuery\
  \ cq = getEntityManager().\n\ngetCriteriaBuilder().createQuery();\n\ncq.select(cq.from(entityClass));\n\
  \nreturn getEntityManager().createQuery(cq).getResultList();\n\n}\n\npublic List<T>\
  \ findRange(int[] range) {\n\njakarta.persistence.criteria.CriteriaQuery cq = getEntityManager().\n\
  \ngetCriteriaBuilder().createQuery();\n\ncq.select(cq.from(entityClass));\n\njakarta.persistence.Query\
  \ q = getEntityManager().createQuery(cq);\n\nq.setMaxResults(range[1] - range[0]);\n\
  \nq.setFirstResult(range[0]);\n\nreturn q.getResultList();\n\n}\n\npublic int count()\
  \ {\n\njakarta.persistence.criteria.CriteriaQuery cq = getEntityManager().\n\ngetCriteriaBuilder().createQuery();\n\
  \njakarta.persistence.criteria.Root<T> rt = cq.from(entityClass);\n\ncq.select(getEntityManager().getCriteriaBuilder().count(rt));\n\
  \njakarta.persistence.Query q = getEntityManager().createQuery(cq);\n\nreturn ((Long)\
  \ q.getSingleResult()).intValue();\n\n}\n\n}\n\n由于`BookFacade`扩展了该类，因此`AbstractFacade`中声明的所有方法都对`BookFacade`可用。使用抽象类来实现标准\
  \ CRUD 功能的最大好处之一是，它可以应用于许多不同的 Jakarta 企业 Bean，而无需每次都从头编写。\n\n工作原理\n\n用于封装应用程序业务逻辑和数据访问的\
  \ Java 类也称为*会话 Bean*。更具体地说，会话 Bean 通常对应于实体类，通常每个实体对应一个 Bean，尽管这不是必需的，并且在某些情况下这种实现效果不佳。应用程序的所有数据库事务都应封装在负责业务流程实现的会话\
  \ Bean 类中，然后客户端应调用会话 Bean 以调用这些业务流程。无状态会话 Bean 不保留任何状态，这意味着 Bean 中的变量不保证在多次调用之间保持其值。应用服务器容器维护一个会话\
  \ Bean 池供其客户端使用，当客户端调用 Bean 时，会从池中取出一个供使用。客户端完成调用任务后，Bean 会立即返回到池中。因此，无状态会话 Bean\
  \ 是线程安全的，并且在并发用户环境中表现良好。\n\n\n\n无状态会话 Bean 应包含一个无参构造器，并由应用服务器容器在应用启动时实例化。为了表明会话\
  \ Bean 是无状态的，该类应使用 `@Stateless` 注解，并可选择传递一个基于字符串的 Bean 名称参数。如果在 `@Stateless` 注解中未指定名称参数，则使用\
  \ Bean 的名称。无状态会话 Bean 不应是 final 或 abstract 的；因此，Bean 内的所有方法都应包含实现。它们可以继承其他会话 Bean\
  \ 或 POJO 以扩展功能。在 EJB 3.1 之前的版本中，要求会话 Bean 实现业务接口，这些接口包含那些供客户端使用的公共方法的方法签名。然而，会话\
  \ Bean 不再需要实现业务接口，事实上，本方案中的解决方案并未演示业务接口的使用（具体示例请参见方案 8-4）。\n\n可以在无状态会话 Bean 内声明零个或多个变量，但这些变量的内容在客户端调用之间不保证保留。无状态会话\
  \ Bean 通常至少包含一个 `EntityManager` 连接，尽管一个 Bean 也可以包含零个或多个连接。例如，在某些情况下，会话 Bean 不需要持久化数据，因此不需要数据库连接。在其他情况下，会话\
  \ Bean 可能需要能够与多个数据库协同工作，这时就需要多个数据库连接。在本方案的示例中，声明了一个单一的数据库连接作为 `EntityManager` 对象，对应于\
  \ JakartaEERecipes 持久化单元。在会话 Bean 中，也可以使用标准的 JDBC 持久化单元以及标准的 JDBC `DataSource` 对象。使用标准\
  \ JDBC `DataSource` 声明的示例如下：\n\n```java\n@Resource(name=\"jdbc/MyDataSource\")\n\
  private DataSource dataSource;\n```\n\n如前所述，无状态会话 Bean 可以实现业务接口，但这不是必需的。无状态会话 Bean\
  \ 可以实现的业务接口可以是本地接口、远程接口或 Web 服务端点。本地业务接口是为与无状态会话 Bean 位于同一容器实例内的客户端设计的。使用 `@Local`\
  \ 注解指定一个业务接口即表示其为本地接口。远程业务接口是为位于会话 Bean 容器实例外部的客户端设计的。远程业务接口通过 `@Remote` 注解表示。\n\
  \n无状态会话 Bean 包含“回调方法”，当某些生命周期事件发生时，容器会自动调用这些方法。具体来说，无状态会话 Bean 可以使用两个回调：`PostConstruct`\
  \ 和 `PreDestroy`。在容器构造了无状态会话 Bean 并注入了资源之后，Bean 内任何使用 `@PostConstruct` 注解标记的方法都将被调用。类似地，当容器决定将一个\
  \ Bean 从池中移除或销毁时，在 Bean 被销毁之前，任何使用 `@PreDestroy` 注解标记的方法都将被调用。回调方法对于实例化数据库连接等操作非常有用。\n\
  \n**无状态会话 Bean 的生命周期**\n\n无状态会话 Bean 具有以下生命周期：\n\n1.  容器使用默认的无参构造器创建一个无状态会话 Bean。\n\
  2.  根据需要注入资源（例如，数据库连接）。\n3.  生成一个受管理的 Bean 池，并将会话 Bean 的多个实例放入池中。\n4.  当从客户端接收到调用请求时，从池中取出一个空闲的\
  \ Bean。如果池中的所有 Bean 都正在使用，则会实例化更多 Bean，直到达到指定的最大 Bean 数量。\n5.  执行客户端调用的业务方法。\n6.\
  \  业务方法处理完成后，Bean 被返回到池中。\n7.  根据需要将 Bean 从池中销毁。\n\n在本方案的第一个解决方案中，列出了一个无状态会话 Bean，它没有实现任何接口，也没有继承任何其他类。这样的无状态会话\
  \ Bean 非常典型，在 EJB 3.1+ 应用中并不罕见。该解决方案中的 Bean 声明了一个 `EntityManager` 对象，由于指定了 `@PersistenceContext`\
  \ 注解，应用服务器容器会自动创建 `EntityManager` 并将其注入到 Bean 中。该注解必须指定一个持久化单元名称，以告知容器要注入的 `EntityManager`\
  \ 类型。如果 Bean 需要访问多个数据库连接，则可以声明多个 `EntityManager` 对象，为每个持久化单元指定不同的名称，以对应 Bean 所需的不同连接。根据无状态会话\
  \ Bean 的指导原则，指定了一个无参构造器。该解决方案还包含一个业务方法实现 `findByTitle()`，它接受一个 `String` 参数，并在 `Book`\
  \ 实体中查询指定的书名。如果找到，则将匹配的 `Book` 对象返回给调用者。`findByTitle()` 方法演示了在会话 Bean 中使用 `EntityManager`\
  \ 对象与数据库进行交互的典型用法。\n\n在本方案的第二个解决方案中，`BookFacade` 无状态会话 Bean 继承了一个名为 `AbstractFacade`\
  \ 的类。`AbstractFacade` 类包含了许多在会话 Bean 类中常用的方法实现。例如，`AbstractClass` 中的 `create` 方法可用于持久化一个对象（插入到数据库中），`edit`\
  \ 方法可用于更新一个对象。\n\n解决方案 #2 展示了一种良好的技术，可以将常用的业务逻辑封装到一个单独的类中，以便多个不同的 Bean 可以继承它。考虑一下，应用可能包含多个对应于不同实体类的无状态会话\
  \ Bean，并且每个 Bean 都需要包含 `create`、`edit` 和 `remove` 方法。简单地继承一个包含这些功能的类，比在每个单独的会话 Bean\
  \ 类中重写要容易得多。\n\n无状态会话 Bean 是高性能的对象，用于封装与应用实体相对应的业务逻辑和数据访问。虽然大多数情况下会为每个实体类编写一个会话\
  \ Bean，但这并非强制规则。在决定使用哪种类型的 Bean 来封装特定应用流程的逻辑时，应首先考虑无状态会话 Bean。如果客户端和 Bean 之间不需要会话状态（无需维护状态），那么无状态会话\
  \ Bean 是最佳选择，因为它们提供了最高的并发性和最佳的性能。\n\n然而，如果需要状态，则应考虑使用有状态会话 Bean。\n\n**8-3. 开发有状态会话\
  \ Bean**\n\n**问题**\n\n您希望开发一个能够与客户端维护会话状态的会话 Bean。例如，您希望客户端能够执行多步骤流程，而会话 Bean 的状态在请求之间不会丢失。\n\
  \n**解决方案**\n\n创建一个有状态会话 Bean，并实现与您选择的实体类相关的业务逻辑。\n\n\n\n假设客户正在浏览 Acme Bookstore\
