  \ 外观（会话 Bean）类。为此，首先创建一个包来存放所有会话 Bean 类。在本例中，创建一个名为 `org.jakartaeerecipes.bookstore.session`\
  \ 的包。接着，为已创建的每个实体类创建一个会话 Bean 类。要为 `BookAuthor` 类创建会话 Bean，请在新创建的包中创建一个类；如果使用 Apache\
  \ NetBeans，则右键单击新包，选择“新建” ➤ “来自实体类的会话 Bean”。将 Bean 命名为 `BookAuthorFacade`。如果使用 Apache\
  \ NetBeans，将生成两个类，其中一个是名为 `AbstractFacade` 的抽象类。该抽象类将被应用创建的每个会话 Bean 继承，其中包含一组可在所有会话\
  \ Bean 中使用的通用方法。\n\n如果从头开始创建会话 Bean，则需要为每个 Bean 创建这些方法，或者使用类似的技术为 Bean 提供通用实现，类似于\
  \ `AbstractFacade`。\n\n无论选择哪种技术，都需要为应用生成持久化单元。这是一个 XML 配置文件，用于包含数据库的连接配置。通常，持久化单元包含用于连接到应用服务器容器内已定义数据源的\
  \ Java 命名和目录接口（JNDI）信息。在本例中，如果使用 Apache NetBeans，请右键单击项目并选择“创建持久化单元”来创建持久化单元。选择\
  \ Apache NetBeans 中已为数据库配置的现有数据源。\n\n第 5 章 ■ Jakarta MVC\n\n\n\n以下代码是 `AbstractFacade`\
  \ 的内容，由 Apache NetBeans 自动生成：\n\npackage org.jakartaeerecipe.bookstore.session;\n\
  \nimport jakarta.persistence.*;\n\nimport jakarta.persistence.criteria.*;\n\nimport\
  \ java.util.List;\n\npublic abstract class AbstractFacade<T> {\n\nprivate final\
  \ Class<T> entityClass;\n\npublic AbstractFacade(Class<T> entityClass) {\n\nthis.entityClass\
  \ = entityClass;\n\n}\n\nprotected abstract EntityManager getEntityManager();\n\n\
  public void create(T entity) {\n\ngetEntityManager().persist(entity);\n\n}\n\npublic\
  \ void edit(T entity) {\n\ngetEntityManager().merge(entity);\n\n}\n\npublic void\
  \ remove(T entity) {\n\ngetEntityManager().remove(getEntityManager().merge(entity));\n\
  \n}\n\npublic T find(Object id) {\n\nreturn getEntityManager().find(entityClass,\
  \ id);\n\n}\n\npublic List findAll() {\n\nCriteriaQuery<Object> cq = getEntityManager().getCriteriaBuilder().createQuery();\n\
  \ncq.select(cq.from(entityClass));\n\nreturn getEntityManager().createQuery(cq).getResultList();\n\
  \n}\n\npublic List findRange(int[] range) {\n\nCriteriaQuery<Object> cq = getEntityManager().getCriteriaBuilder().createQuery();\n\
  \ncq.select(cq.from(entityClass));\n\nQuery q = getEntityManager().createQuery(cq);\n\
  \nq.setMaxResults(range[1] - range[0] + 1);\n\nq.setFirstResult(range[0]);\n\nreturn\
  \ q.getResultList();\n\n}\n\npublic int count() {\n\nCriteriaQuery<Object> cq =\
  \ getEntityManager().getCriteriaBuilder().createQuery();\n\nRoot<T> rt = cq.from(entityClass);\n\
  \ncq.select(getEntityManager().getCriteriaBuilder().count(rt));\n\nQuery q = getEntityManager().createQuery(cq);\n\
  \nreturn ((Long) q.getSingleResult()).intValue();\n\n}\n\n}\n\n第 5 章 ■ Jakarta MVC\n\
