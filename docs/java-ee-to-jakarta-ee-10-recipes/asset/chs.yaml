  . 插入和更新数据\n\n问题\n\n您希望使用表单来插入或更新数据。\n\n解决方案\n\n\n\n创建控制器方法时，需根据方法用途分别使用 `@PUT` 或\
  \ `@POST` 注解，前者用于更新操作，后者用于插入操作。以下摘自 `book.jsp` 的标记代码包含一个用于创建新图书记录的表单。请注意，在以下示例中，提交时调用的操作将通过\
  \ \"/create\" 路径启动 RESTful Web 服务：\n\n<form action=\"${pageContext.request.contextPath}/bookstore/book/create\"\
  \ method=\"POST\"\n\nclass=\"form-inline\">\n\n<div class=\"panel panel-default\"\
  >\n\n<div class=\"panel-heading\">\n\n<h3 class=\"panel-title\">图书信息</h3>\n\n</div>\n\
  \n<div class=\"panel-body\">\n\n<div class=\"form-group\">\n\n<label for=\"subject\"\
  >标题</label>\n\n<input type=\"text\" class=\"form-control\" id=\"title\" name=\"\
  title\"\n\nplaceholder=\"标题\"\n\nvalue=\"${book.title}\" autofocus>\n\n</div>\n\n\
  </div>\n\n</div>\n\n<br/><br/>\n\n<div class=\"form-group\">\n\n<label for=\"description\"\
  >描述：</label>\n\n<br/>\n\n<textarea cols=\"100\" rows=\"4\" class=\"form-control\"\
  \ id=\"description\"\n\nname=\"description\" placeholder=\"描述\">\n\n${book.description}\n\
  \n</textarea>\n\n</div>\n\n<br/><br/>\n\n<button type=\"submit\" class=\"btn btn-primary\"\
  >创建</button>\n\n</form>\n\n表单中的提交操作会调用名为 `createItem()` 的控制器方法，该方法获取通过表单提交的数据，并利用\
  \ Jakarta RESTful Web Services 将数据插入数据库：\n\n@POST\n\n@Path(\"/create\")\n\n@Controller\n\
  \npublic String createItem(@BeanParam @Valid Book form) {\n\n// 创建新图书\n\n// 获取图书列表以统计记录数，用于填充\
  \ ID\n\nbookList = bookService.getBookList();\n\n第 5 章 ■ Jakarta MVC\n\nform.setId(new\
  \ BigDecimal(bookList.size() + 1));\n\nBook entity = new Book();\n\nentity.setId(form.getId());\n\
  \nentity.setTitle(form.getTitle());\n\nentity.setDescription(form.getDescription());\n\
  \nbookService.create(entity);\n\nreturn displayBookListing();\n\n}\n\n方法执行完毕后，图书列表会刷新，因为\
  \ `createItem()` 的最后一行调用了 `displayBookListing()`，该方法执行以下代码：\n\n@GET\n\n@Path(\"\
  /books\")\n\npublic String displayBookListing() {\n\nbookList = bookService.getBookList();\n\
  \nbookContainer.setBookList(bookList);\n\nmessages.setInfo(\"图书馆中共有 \" + bookList.size()\
  \ + \" 本书。\"); System.out.println(\"图书数量：\" + bookList.size());\n\nreturn \"book.jsp\"\
  ;\n\n}\n\n最终视图 `http://localhost:8080/JakartaEERecipes_Chapter05-1.0-SNAPSHOT/views/book.jsp`\
  \ 将显示新创建的图书，并出现在图书列表中，如上一节配方中的图 5-11 所示。\n\n工作原理\n\nJakarta MVC 框架的核心理念是**完全控制**与**易用性**。本示例完美诠释了这些理念，展示了开发者如何掌控整个请求处理生命周期，而框架则让这一切变得简单易行。要创建或更新数据，需使用\
  \ HTML 表单将表单数据提交给控制器方法。在本例中，表单使用 JSP 标记编写，提交操作会调用名为 `createItem()` 的 RESTful 控制器方法。`createItem()`\
  \ 方法的签名返回一个 `String`，用于指定完成后渲染的下一个视图，并接受一个 `Book` 类型的参数。请注意，该参数使用了 `@BeanParam`\
  \ 和 `@Valid` 注解。`@BeanParam` 注解表示 `Book` 类包含一些用于指定字段的表单参数注解。\n\n具体来说，在本例中，`Book`\
  \ 实体类包含以下内容：\n\npublic class Book implements Serializable {\n\nprivate static final\
  \ long serialVersionUID = 1L;\n\n@Id\n\n@GeneratedValue(strategy = GenerationType.SEQUENCE,\n\
  \ngenerator = \"book_s_generator\")\n\n@SequenceGenerator(name = \"book_s_generator\"\
  , sequenceName = \"book_s\",\n\nallocationSize = 1)\n\n@Basic(optional = false)\n\
  \n// @NotNull\n\n@Column(name = \"ID\")\n\nprivate BigDecimal id;\n\n第 5 章 ■ Jakarta\
  \ MVC\n\n//@Size(max = 150)\n\n**@FormParam(value=\"title\")**\n\n@Column(name =\
  \ \"TITLE\")\n\nprotected String title;\n\n//@Size(max = 500)\n\n@Column(name =\
  \ \"IMAGE\")\n\nprivate String image;\n\n@FormParam(value=\"description\")\n\n@Lob\n\
  \n@Column(name = \"DESCRIPTION\")\n\nprivate String description;\n\n\n\n因此，`@BeanParam`\
  \ 注解会检查 Book 对象中的注入注解并相应地设置它们。`@Valid` 注解表示应对此对象调用 Bean 验证处理。在方法调用时（表单提交），Bean 验证将执行，并有助于防止提交错误数据。\n\
  \n一旦启动，图书列表将从 BookService 获取，该列表将用于统计图书数量。此数字用于递增一个数值，以生成正在创建的新记录的主键。然后创建新的 Book\
  \ 实体，相应地设置值，接着调用 `create()` 方法来持久化数据。数据持久化后，通过调用 `displayBookListing()` 再次查询数据库，然后返回响应并显示\
  \ `book.jsp` 视图。\n\n**第 6 章**\n\n**使用 Jakarta EE 进行 JDBC 编程**\n\nJava 数据库连接（JDBC）API\
  \ 是通过 Java 访问关系型数据库管理系统（RDBMS）的标准。它已使用多年，可用于开发所有类型的 Java 应用程序，包括桌面应用、独立应用和 Web 应用。几乎所有重要的应用程序都使用\
  \ RDBMS 来存储和检索数据。因此，对于所有类型的应用程序开发者来说，学习如何使用 JDBC 非常重要。\n\n企业应用程序开发已证明，当开发者直接使用 Java\
  \ 对象而不是进行数据库访问时，效率更高。尽管 JDBC API 在企业应用程序和微服务的开发中仍然非常主流，但许多开发者已开始采用对象关系映射编程接口作为标准。将\
  \ Java 对象映射到数据库表的最简单方法之一是将 JDBC 逻辑封装到包含私有方法的类中，这些私有方法用于执行数据库访问，并通过使用对象而非 SQL 的公共方法来暴露这些方法。本章包含一些示例，演示了将\
  \ JDBC 逻辑与普通业务逻辑分离的技术，有时也称为创建数据访问对象。\n\n有关最新 JDBC 版本的新功能和增强功能的完整列表，请访问在线文档：[`docs.oracle.com/en/database/oracle/oracle-database/21/jjdbc/index.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/jjdbc/index.html)。在阅读完本章包含的示例后，您应该能够熟练地在\
  \ Java Web 应用程序中使用 JDBC。\n\n■ **注意** 本章已完全重写了 Acme Bookstore 应用程序，以便使用 Oracle 数据库，而不是简单的\
  \ Java 数据列表。在运行本章示例之前，请先在您的数据库中运行 `create_database.sql` 脚本。此外，您需要在 `db_props.properties`\
  \ 文件和/或本章的代码示例中为您的数据库提供必要的数据库连接属性。如果您使用的是其他数据库供应商，您应该能够相应地调整 SQL 以使其适用于该数据库。要访问使用数据库的\
  \ Acme Bookstore 应用程序，请务必将 `JakartaEERecipes_Chapter06` Web 应用程序部署到您的 Eclipse GlassFish\
  \ 或 Payara 应用服务器，并访问 URL `http://localhost:8080/JakartaEERecipes_Chapter06-1.0-SNAPSHOT/faces/chapter06/home.xhtml`。本章通常会引用\
  \ Eclipse GlassFish 服务器（也称为 GlassFish），尽管大多数引用对于 Payara 服务器是相同的。\n\n© Josh Juneau\
  \ 和 Tarun Telang 2022\n\nJ. Juneau 和 T. Telang，*Java EE 到 Jakarta EE 10 实战*，[`doi.org/10.1007/978-1-4842-8079-9_6`](https://doi.org/10.1007/978-1-4842-8079-9_6#DOI)\n\
  \n![](img/index-338_1.jpg)\n\n第 6 章 ■ 使用 Jakarta EE 进行 JDBC 编程\n\n6-1\\. 项目结构\n\n\
  表示本章所用数据库模型的实体关系（ER）图如图 6-1 所示。\n\n***图 6-1.** 数据库模型的 ER 图*\n\n第 6 章 ■ 使用 Jakarta\
  \ EE 进行 JDBC 编程\n\n以下是包含本章示例的项目代码结构。用于创建表和向数据库表中插入记录的 SQL 脚本位于 *sql* 文件夹中。\n\n.├──\
  \ pom.xml\n\n└── src\n\n└── main\n\n├── java\n\n│ ├── db_props.properties\n\n│ └──\
