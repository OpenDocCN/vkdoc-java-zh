  .get(\n\nnew GenericType<List<Employee>>() {\n\n第 14 章 ■ WebSocket 与 JSON\n\n}));\n\
  \nSystem.out.println(\"Items: \" + employees);\n\nJsonb jsonb = JsonbBuilder.create();\n\
