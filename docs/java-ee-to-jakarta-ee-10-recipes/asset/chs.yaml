  \n│ │ └── web.xml\n\n│ ├── chapter02\n\n\n\n│ │ ├── recipe02_09.jspx\n\n│ └── index.jsp\n\
  \n├── pom.xml\n\n第 2 章 ■ Jakarta 服务器页面\n\n■ **注意** 要编译以下代码，需要将 `jakarta.servlet.jsp-api.jar`\
  \ 添加到类路径中：  \n`cd recipe02_09`  \n`javac -cp ...\\glassfish\\modules\\jakarta.servlet.jsp-api.jar\
  \ *.java`\n\n接下来，需要创建一个 TLD 文件，将 Signature 类标签实现映射到标签。`signature.tld` 是包含自定义标签映射的\
  \ TLD 源文件，其代码如下：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<taglib\
