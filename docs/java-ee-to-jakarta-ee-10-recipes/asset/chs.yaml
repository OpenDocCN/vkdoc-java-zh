  \ {\n\nthis.userId = userId;\n\n}\n\n/**\n\n* 获取此 User 的 userId。\n\n* @return userId\n\
  \n*/\n\npublic BigDecimal getUserId() {\n\nreturn this.userId;\n\n}\n\n/**\n\n*\
  \ 将此 User 的 userId 设置为指定值。\n\n* @param userId 新的 userId\n\n*/\n\npublic void setUserId(BigDecimal\
