  \n<h:outputLabel for=\"newAuthorLast\" value=\"新作者姓：\"/>\n\n<h:inputText id=\"newAuthorLast\"\
  \ value=\"#{authorController.newAuthorLast}\"/>\n\n<br/>\n\n<h:inputTextarea id=\"\
  bio\" cols=\"20\" rows=\"5\"\n\nvalue=\"#{authorController.bio}\"/>\n\n<br/>\n\n\
  <br/>\n\n<h:commandButton id=\"addAuthor\" action=\"#{authorController.addAuthor}\"\
  \n\nvalue=\"添加作者\"/>\n\n<br/>\n\n第 3 章 ■ Jakarta Server Faces\n\n<br/>\n\n</p>\n\
  \n</h:form>\n\n</h:body>\n\n</html>\n\n此示例使用了一个名为 `AuthorController` 的 Jakarta Server\
  \ Faces 控制器类。该控制器类声明了视图中暴露的几个属性，同时还声明并填充了一个作者列表，该列表在页面中通过 Jakarta Server Faces 的\
  \ `h:dataTable` 组件显示：\n\npackage org.jakartaeerecipe.chapter03.recipe03_03;\n\n\
  import java.io.Serializable;\n\nimport java.util.ArrayList;\n\nimport java.util.List;\n\
  \nimport jakarta.enterprise.context.SessionScoped;\n\nimport jakarta.inject.Named;\n\
  \n@Named(value = \"authorController\")\n\n@SessionScoped\n\npublic class AuthorController\
  \ implements Serializable {\n\nprivate String newAuthorFirst;\n\nprivate String\
  \ newAuthorLast;\n\nprivate String bio;\n\nprivate List<Author> authorList;\n\n\
  /**\n\n* 创建 RecipeController 的新实例\n\n*/\n\npublic AuthorController() {\n\npopulateAuthorList();\n\
  \n}\n\nprivate void populateAuthorList(){\n\nSystem.out.println(\"正在初始化作者列表\");\n\
