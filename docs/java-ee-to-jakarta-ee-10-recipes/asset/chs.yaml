  \n![](img/index-216_1.jpg)\n\n第 3 章 ■ Jakarta Server Faces\n\n在页面上渲染时，该表格现在应如图 3-24\
  \ 所示。\n\n***图 3-24.** 应用了样式的作者表格*\n\n**工作原理**\n\n向 Jakarta Server Faces 应用程序添加资源很容易，因为在声明资源时无需担心引用静态路径。自\
  \ Jakarta Server Faces 2.0 发布以来，`resources` 文件夹可用于列出子文件夹（也称为*库*），资源可以放置在这些子文件夹中。现在，可以使用资源的\
  \ Jakarta Server Faces 组件内置了 `library` 属性。这允许为这些组件指定特定的库，以便组件知道在哪里找到它所需的资源。\n\n\
  要使用新的 `resources` 文件夹，请在应用程序 Web 目录的根目录下创建一个文件夹，并将其命名为 `resources`。然后，该 `resources`\
  \ 文件夹可以包含子文件夹，这些子文件夹将成为可在 Jakarta Server Faces 组件中使用的库。例如，子文件夹可以命名为 `css` 和 `images`，然后这些名称可以指定给使用此类资源的\
  \ Jakarta Server Faces 组件的 `library` 属性。以下是供参考的项目结构：\n\n├── pom.xml\n\n└── src\n\
  \n└── main\n\n├── java\n\n├── org\n\n│ └── jakartaeerecipe\n\n│ └── chapter03\n\n\
  │ └── recipe03_15\n\n│ ├── Author.java\n\n│ ├── AuthorController.java\n\n│ ├── Book.java\n\
  \n│ └── Chapter.java\n\n└── webapp\n\n├── WEB-INF\n\n第 3 章 ■ Jakarta Server Faces\n\
  \n│ ├── beans.xml\n\n│ ├── faces-config.xml\n\n│ └── web.xml\n\n├── chapter03\n\n\
  │ ├── layout\n\n│ │ └── custom_template.xhtml\n\n│ ├── recipe03_15a.xhtml\n\n│ ├──\
  \ recipe03_15b.xhtml\n\n│ └──recipe03_15c.xhtml\n\n└── resources\n\n├── css\n\n\
  │ ├── cssLayout.css\n\n│ ├── default.css\n\n│ └── styles.css\n\n└── image\n\n├──\
  \ jakartaee10recipes.png\n\n└── jakartaee9fundamentals.jpeg\n\n在示例中，层叠样式表被放置在 `resources/css`\
  \ 文件夹中，然后通过使用 `h:outputStylesheet` 组件并指定 `css` 库来引用它们，如下所示：\n\n<h:outputStylesheet\
  \ library=\"css\" name=\"default.css\"/>\n\n其他资源也可以放置在这样的库中。`h:graphicImage` 组件也包含\
  \ `library` 属性，因此书籍的图像可以移动到名为 `resources/image` 的文件夹中，然后 `h:graphicImage` 标签可以像这样引用图像：\n\
  \n<h:graphicImage id=\"jakartaee10recipes\"\n\nlibrary=\"image\" style=\"width:\
  \ 100px; height: 120px\"\n\nname=\" jakartaee10recipes.jpeg\"/>\n\n从 Web 应用程序的页面中引用资源文件一直是一个挑战。要做到这一点，开发人员需要知道资源的准确路径，有时如果文件夹名称更改或应用程序部署在不同的服务器环境中，路径可能会失效。Jakarta\
  \ Server Faces 2.0 中 `resources` 文件夹的使用以及新的 `library` 属性大大降低了管理此类资源的复杂性。\n\n**第\
  \ 4 章**\n\n**高级 Jakarta Server Faces**\n\nJakarta Server Faces（以前称为 JSF 或 Java Server\
  \ Faces）框架允许开发人员利用一系列视图构建应用程序，每个视图都有一系列组件。该框架就像一个拼图，每个组件都必须安装到正确的位置，才能使整个系统平稳运行。在这些拼图块中，还融入了用于创建无缝用户界面体验的高级功能。\n\
  \n组件只是拼图的一部分。组件是构成 Jakarta Server Faces 视图的构建块。使用 Jakarta Server Faces 框架的优势之一是在视图中可用的组件非常丰富。组件是可以在\
  \ XHTML 视图中使用的标签。\n\n组件类似于标准的 HTML 标签；它们包含一组属性、一个开始标签和一个结束标签，并且组件通常可以包含在其他组件中。组件也可以用\
  \ Java 代码编写，它们的标签可以绑定到驻留在 Jakarta Server Faces 托管 bean（也称为控制器类）中的 Java 代码。Jakarta\
  \ Server Faces 框架自带几个标准组件。\n\nJakarta Server Faces 用户界面拼图的另一个重要部分是与后端业务逻辑的无缝集成。可以在后台独立于其他正在运行的任务运行的任务称为异步任务。JavaScript\
  \ 是最流行的现代浏览器语言，用于在 Web 应用程序中实现异步任务。Ajax 是一组技术，允许您使用 JavaScript 在后台执行异步任务，将响应从客户端浏览器发送到服务器，然后将响应发送回客户端。该响应用于更新页面的文档对象模型（DOM）。增强应用程序以利用此类异步请求和响应可以极大地改善整体用户体验。Jakarta\
  \ Server Faces 框架允许开发人员通过使用 Ajax 和 HTML5 等技术创建丰富的用户体验。这些技术背后的许多实现细节可以通过使用 Jakarta\
  \ Server Faces 组件对开发人员隐藏。因此，开发人员只需要关心如何使用 Jakarta Server Faces 组件标签并将其与服务器端属性关联起来。\n\
  \n本章深入探讨了如何将 Ajax 与 Jakarta Server Faces Web 框架结合使用。在此过程中，您将学习如何美化应用程序，使用户界面更丰富、更友好，使其行为更像桌面应用程序。您还将学习如何监听不同的组件阶段和系统事件，从而进一步自定义应用程序功能。\n\
  \n本章深入介绍了基本组件，并提供了相关配方，使您能够立即在应用程序中使用它们。本章主要介绍 Jakarta Server Faces 标准组件库。本章中的每个配方都从头到尾相互构建。在本章结束时，您将为\
  \ Acme Bookstore 创建一个完整的、功能齐全的新闻通讯页面。\n\n以下部分快速概述了 Jakarta Server Faces 标准组件和相关的通用组件标签，这在您学习配方时会派上用场。\n\
