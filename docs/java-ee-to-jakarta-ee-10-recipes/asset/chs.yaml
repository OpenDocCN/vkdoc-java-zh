  lang\n\n\n\n描述组件生成标记中所用语言的代码\n\nrowClass\n\n接受 Jakarta 表达式语言以访问行，可用于将 CSS 样式类应用于指定行\n\
  \nrowClasses\n\n以逗号分隔的 CSS 样式类列表，这些类将应用于表格的行。也可以为每一行指定一个以空格分隔的类列表\n\nrules\n\n指定哪些规则将出现在表格单元格之间的代码。有效值包括\
  \ none、groups、rows、cols 和 all\n\nsummary\n\n针对非可视化媒体渲染的用户代理，对表格用途和结构的摘要\n\ntitle\n\
  \n关于为组件生成的标记元素的建议标题信息\n\nwidth\n\n整个表格的宽度\n\n第 4 章 ■ 高级 Jakarta Server Faces\n\n\
  ***表 4-17.** h:column 属性*\n\n**属性**\n\n**描述**\n\nfooterClass\n\n将应用于列页脚的 CSS 类\n\
  \nheaderClass\n\n将应用于列标题的 CSS 类\n\nstyleClass\n\n允许将 CSS 类应用于单个列\n\n描述 dataTable\
  \ 最简单的方式是逐步讲解一个示例。本方案的解决方案包含一个 Jakarta Server Faces 视图，其中使用了两个 dataTable 组件。第一个\
  \ dataTable 的 id 属性为 authorTable，第二个 dataTable 的 id 属性为 bookTable。您最感兴趣的是第二个 dataTable，其\
  \ id 属性为 bookTable，尽管第一个 dataTable 的功能大致相同。bookTable 组件用于遍历 Chapter 对象的集合，并显示当前选中书籍对应的章节编号和标题。dataTable\
  \ 的 value 属性设置为 #{ch4AuthorController.currentBook.chapters}，这对应于 AuthorController\
  \ 托管 bean 中的一个 List<String> 属性。一个 dataTable 可以遍历多种不同的集合类型，包括列表、DataModel 和数组。从 Jakarta\
  \ Server Faces 2.2 版本开始，通用的 Collection 接口也得到了支持。dataTable 组件的 var 属性用于指定一个句柄，允许在行级别访问集合数据。这意味着如果需要，您可以精确地定位到数据集合的特定字段。dataTable\
  \ 标签本身不显示任何内容；它必须嵌入列组件才能显示内容。dataTable 中的每个 h:column 标签在渲染时都对应于结果表格中的一列。例如，如果您查看\
  \ id 为 bookDetail 的 dataTable 中的第一个 h:column 标签，它包含一个嵌入的 outputText 组件，该组件指定了 value\
  \ 为 #{book.chapterNumber}。这一特定列用于显示章节编号，该编号是 Chapter 对象中的一个字段，对应于 currentBook 对象的\
  \ chapters 列表。\n\n列组件可以包含任何有效的 Jakarta Server Faces 组件，也可以包含与集合中数据字段相对应的纯 Jakarta\
  \ Server Faces Jakarta 表达式语言。如果您查看 id 属性为 authorTable 的 dataTable，您会看到其中一列使用了 commandLink\
  \ 组件。这种情况很常见，因为您可能希望从表格单元格内链接到当前选中行的数据。id 为 authorTable 的 dataTable 就包含了一个很好的示例。表格中的\
  \ commandLink 包含一个 action 属性，该属性指定了 AuthorController 类中的一个方法，并且当前选中行的值 lastName\
  \ 作为参数传递给该方法。底层方法使用该参数检索选中行的所有数据，并在另一个视图中显示：\n\n<h:commandLink id=\"authorName\"\
  \ action=\"#{ch4AuthorController.displayAuthor(author.last)}\"\n\nvalue=\"#{author.first}\
  \ #{author.last}\"/>\n\n要在表格上放置页眉或页脚，您必须使用 f:facet 标签将一个 facet 嵌入到表格中。\n\n\n\n`f:facet`\
  \ 标签包含许多典型的 Jakarta Server Faces 组件属性，但对该组件而言，一个突出的属性是 `name` 属性。`name` 属性用于指定该标签属于哪种类型的\
  \ facet，对于 `dataTable` 组件而言，这些名称是 `header` 和 `footer`。要创建表格的页眉或页脚，只需在 `dataTable`\
  \ 组件内嵌入 `f:facet` 标签，并指定 facet 的名称（即要创建的 facet 类型）。\n\n■ **注意** 可用于 `dataTable`\
  \ 集合的一种独特数据类型是 `DataModel`。要能够显示行号，请使用 `DataModel`。\n\n第 4 章 ■ 高级 Jakarta Server\
  \ Faces\n\n当需要显示数据集合时，`dataTable` 组件会非常有用。使用 `dataTable` 的一个缺点是它没有提供过多的可定制性。然而，扩展\
  \ `dataTable` 的功能以满足特定需求是完全可行的。\n\n有许多第三方组件库正是为此而生；它们提供了扩展的 `dataTable`，具有排序、行展开、内联编辑等功能。要了解更多关于使用这些自定义\
  \ `dataTable` 组件的信息，请参阅第 7 章。\n\n4-11. 实现文件上传\n\n问题\n\n你想为应用程序添加一个文件上传组件。\n\n解决方案\n\
  \n使用 Jakarta Server Faces 文件上传组件为你的应用程序创建一个基于 Ajax 或非 Ajax 的文件上传系统。要使用 `inputFile`\
  \ 组件，它必须放置在一个 Jakarta Server Faces 表单内，该表单的 `enctype` 属性设置为 `multipart/form-data`，并且不指定\
  \ `id` 属性。`h:form` 元素包含 `enctype` 和 `prependId` 属性，可分别用于指定这些要求。一个 Jakarta Server\
  \ Faces 命令组件或 `f:ajax` 标签应设置为托管 Bean 中的一个操作方法，该方法将把文件保存到磁盘。\n\n以下 Jakarta Server\
  \ Faces 视图演示了在非 Ajax 解决方案中使用 `inputFile` 组件：\n\n```xml\n<h:form prependId=\"false\"\
  \ enctype=\"multipart/form-data\">\n    Choose a file to upload to the server: <br/>\n\
  \    <h:inputFile id=\"uploadFile\" value=\"#{ajaxBean.file}\"/>\n    <br/> <h:commandButton\
  \ action=\"#{ajaxBean.uploadFile()}\" value=\"Upload File\"/>\n</h:form>\n```\n\n\
  通过 `commandButton` 调用的 `uploadFile` 方法的源代码如下：\n\n```java\n@Named(value = \"ajaxBean\"\
  )\n@SessionScoped\npublic class AjaxBean implements Serializable {\n    private\
  \ Part file = null;\n    public AjaxBean() { }\n    // getters and setters\n   \
  \ // ...\n    public void uploadFile() {\n        try(InputStream is = file.getInputStream();)\
  \ {\n            byte[] b = new byte[1024];\n            is.read(b);\n         \
  \   String fileName = file.getName();\n            FileOutputStream os = new FileOutputStream(\"\
  /Java_Dev/\" + fileName);\n        } catch (IOException ex) {\n            Logger.getLogger(AjaxBean.class.getName()).log(Level.SEVERE,\
  \ null, ex);\n        }\n    }\n}\n```\n\n请注意，在示例中，路径 `/Java_Dev/` 表示上传文件将保存到的操作系统路径或目录。项目文件结构如图\
  \ 4-9 所示。\n\n```\nmain\n├── java\n│   └── org\n│       └── jakartaeerecipe\n│  \
  \         └── chapter04\n│               └── recipe04_11\n│                   └──\
  \ AjaxBean.java\n└── webapp\n    ├── WEB-INF\n    │   └── web.xml\n```\n\n***图 4-9.**\
  \ 项目文件结构*\n\n可以通过在浏览器中访问 URL `http://localhost:8080/JakartaEERecipes_Chapter04-1.0-SNAPSHOT/chapter04/recipe04_10.xhtml`\
  \ 来执行代码。图 4-10 显示了输出效果。\n\n***图 4-10.** 使用 dataTable 组件*\n\n第 4 章 ■ 高级 Jakarta Server\
  \ Faces\n\n工作原理\n\nJakarta Server Faces 2.2 包含一个新的文件上传组件，该组件依赖于新的 Servlet 3.1 文件上传支持。文件上传支持可以启用\
  \ Ajax 或非 Ajax。`inputFile` 组件可以与 `f:ajax` 标签一起使用，也可以不使用，因此文件可以在页面刷新（非 Ajax）或不刷新（Ajax）的情况下上传。\n\
  \n\n\n以下代码演示了如何为包含 `inputFile` 组件的表单设置属性：\n\n<h:form prependId=\"false\" enctype=\"\
  multipart/form-data\">\n\n`inputFile` 组件的 `value` 属性被设置为 `jakarta.servlet.http`\
  \ 类型的一个变量。\n\n该变量位于 `AjaxBean` 托管 Bean 中的 `Part` 部分，而 `commandButton` 的 `action`\
  \ 属性被设置为该托管 Bean 的 `uploadFile` 方法。要使解决方案利用 Ajax，只需在 `commandButton` 中嵌入一个 `f:ajax`\
  \ 标签，该标签会调用底层的托管 Bean 方法。\n\n在 Jakarta Server Faces 中增加原生文件上传组件是非常受欢迎的。多年来，Jakarta\
  \ Server Faces 开发者一直不得不依赖第三方库来处理文件上传流程。需要第三方集成的组件范围正在缩小，而默认的 Jakarta Server Faces\
  \ 组件工具集已足够完善，成为标准企业应用程序的唯一需求。\n\n4-12. 使用 Ajax 验证输入\n\n问题\n\n您希望验证表单文本字段中输入的值，但希望这些值能立即被评估，而不是在表单提交之后。\n\
  \n解决方案\n\n通过在要验证其值的每个组件中嵌入 `f:ajax` 标签来对字段执行验证。为 `event` 和 `render` 属性指定适当的值，以便在字段失去焦点时触发\
