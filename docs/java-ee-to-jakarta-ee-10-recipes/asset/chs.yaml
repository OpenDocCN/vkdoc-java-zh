  \ EE 开发\n\n开发 Java Web 或企业应用程序\n\n\n\nNetBeans IDE 让 Java Web 或企业级应用的开发变得简单。首先，你需要在\
  \ IDE 中创建一个 Jakarta EE 项目，然后使用 IDE 对项目进行相应配置。\n\nNetBeans 不仅简化了应用项目的配置，还通过自动补全、语法高亮、自动格式化等功能辅助开发。本节将介绍\
  \ NetBeans 如何帮助 Java EE 开发者完成一些最常见的 Jakarta EE 开发任务。\n\nA-2\\. 创建 NetBeans Java\
  \ Web 项目\n\n在 NetBeans 中创建 Java 企业级项目时，有几种不同的配置可供选择。本书将介绍如何在 NetBeans 中创建 Java Web\
  \ 应用程序项目，这是开发 Jakarta EE 应用的标准项目选择。\n\n要开始创建新项目，请选择“文件”➤“新建项目”，打开“新建项目”对话框。在“新建项目”对话框中，你会在左侧列表框中看到所有不同的\
  \ Java 项目类别。\n\n选择其中一个类别，右侧列表框中将显示该类别下的项目类型。要创建 Jakarta EE 项目，请选择 **Java Web** 类别，然后选择\
  \ **Web 应用程序**作为项目类型（见图 A-6）。\n\n***图 A-6.** 在 NetBeans 中创建新的 Java EE 项目*\n\n![](img/index-695_1.jpg)\n\
