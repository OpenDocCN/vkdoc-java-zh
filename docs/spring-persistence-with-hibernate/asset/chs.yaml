  \n——布莱恩·D·墨菲\n\nxiv\n\n**前言**\n\n自诞生以来，Spring 框架逐渐改变了 Java 社区中应用程序开发的规则。本书是开发者的理想指南和教学伴侣，适合那些有兴趣学习\
  \ Spring 框架，以及如何利用它结合当今最流行的 Java 持久化框架之一 Hibernate 来构建持久化驱动应用程序的开发者。《*Spring 与 Hibernate\
  \ 持久化*》将带你入门 Spring 的基本概念，以及将持久化集成到应用程序中的成熟设计模式。\n\n\n\n本书阐述的许多经验教训，均源自多年来使用 Spring\
  \ 和 Hibernate 构建可扩展、高流量 Web 应用的实战经验。在我们共同的经历中，一个尤为突出的细节是：通过动手实践来学习的重要性与益处。为此，我们将构建一个真实的应用，它使用了\
  \ Spring 3、Hibernate 3.5、JPA 2.0、Hibernate-Search、Grails、Spring Roo 和 Dozer。我们坚信，学习\
  \ Spring 和 Hibernate 远不止是理解各自框架的 API。要能够有效地运用这两项卓越技术进行开发，必须理解相关的设计模式和最佳实践，从而充分发挥这些框架的优势，并以一种一致且经过验证的方式在此基础上进行构建。我们希望本书能教给你的，不仅仅是如何将\
  \ Spring 和 Hibernate 结合使用。我们的目标是，将我们在开发实践中验证有效的经验、教训和最佳实践传递给你，使你能够将这些技能和工具应用到自己的应用中。\n\
  \n在本书中，我们将介绍 Hibernate 的核心基础知识，演示如何在 Spring 环境中最佳地利用该框架。我们将从基础概念入手，例如开发有效领域模型和 DAO\
  \ 层的策略，然后深入探讨使用 HQL、JPQL 和 Criteria API 的查询技术。在介绍完基础概念后，我们将转向更高级的主题，例如抓取和缓存策略。我们还将阐述几种构建事务性服务外观（Service\
  \ Facade）的架构方法。我们将同时审视编程式和声明式事务，展示使用 Spring 来表达事务语义的优势。\n\n*《Spring Persistence\
  \ with Hibernate》* 还将介绍 JPA，涵盖其历史以及 Hibernate 对其发展的影响。我们将讨论遵循 JPA 标准的好处，以及何时使用 Hibernate\
  \ 特有功能是合理的。本书还将介绍 Grails 和 GORM，阐述 DAO 与 Active Record 模式之间的差异。我们将把示例应用（将在本书开发过程中构建）移植到\
  \ Grails 和 Spring Roo 中，突出使用快速开发、约定优于配置平台的优势和差异。在这些章节中，我们将探讨与并发/乐观锁、Hibernate Session\
  \ 状态、缓存方法和事务管理相关的主题。\n\n本书的最后部分将介绍几种高级技术，这些技术对于处理企业级 Spring/Hibernate 应用至关重要。我们将阐述集成遗留数据库时的一些陷阱，以及开发\
  \ REST Web 服务、处理 Hibernate 代理和延迟集合、以及使用 Hibernate-Search 构建搜索功能的最佳实践。\n\n以下是我们在本书中将讨论的一些主要主题：\n\
  \nxv\n\n■ 前言\n\n目录\n\n*   基本 Spring 框架特性，如 IoC 和 AOP\n*   架构良好分层持久层的核心概念\n*   JPA\
  \ 概念及集成 JPA 的步骤\n*   使用 Hibernate 的基础和高级概念\n*   Hibernate 查询技术\n*   DAO 和服务外观层开发\n\
  *   Grails，以及 Active-Record 模式的介绍\n*   Spring Roo 介绍\n*   构建 REST Web 服务\n*   使用\
  \ Dozer 在领域模型和 DTO 之间进行转换\n*   利用其他框架和技术，如 Hibernate-Search\n*   高级缓存和集成策略\n\nxvi\n\
  \nxvi\n\n**第 1 章**\n\n■ ■ ■\n\n**使用 Spring、Hibernate 和模式架构你的应用**\n\n持久化通常是应用的生命线，它提供了软件在多次调用中保持有用性所需的长期记忆。尽管持久层至关重要，但在应用的设计或实现阶段，其架构却很少得到充分的考虑。这种缺乏规划的后果可能影响深远，并对组织造成破坏性影响。\n\
  \n本书的主要目标是为你提供架构和实现一个稳固、有效的持久层所需的最佳实践、工具和策略。本书中的许多概念都源自于设计并构建旨在支持数百万日活用户的 Web 应用的真实世界实战经验。我们的目标是阐述那些对我们行之有效的模式和方案，同时探讨在你的应用中使用\
  \ Spring 和 Hibernate 的集成细节。\n\n多年来我们学到的一个重要经验是，通过示例学习通常是最好的方式。为此，我们将在本书中构建一个真实的应用：一个图片库\
  \ Web 应用，它允许用户查看由管理员策划的幻灯片和展览。为了强调构建可扩展和可维护应用的经过验证的、实用的解决方案和架构模式，每一章都将聚焦于应用开发中与持久化相关的不同方面。通过代码示例和讨论，我们将追溯一个真实工作应用的设计、架构和实现。从基础开始，每一章都将建立在前一章的基础上，添加新的层、特性和测试。当然，与任何真实应用一样，随着我们发现\
  \ Spring 和 Hibernate 的新功能以及替代策略和框架，我们将进行大量的重构。事实上，最后两章将完全重新架构我们的图片库应用，因为我们审视了两个基于“约定优于配置”概念的新框架。Grails\
  \ 和 Roo 旨在提供一种更快速的开发风格，它们提供了一个更全面、更一致的开发环境，并具备由动态语言框架（如 Ruby on Rails 和 Django）推广的强大特性。\n\
  \n采用一致方法的好处\n\n正如你将在本书中学到的，数据保存和查询的方式是每个应用不可或缺的一部分。事实上，持久层通常作为构建应用的基础。在这个基础之上，是标准\
  \ Spring 持久层的三个核心组件：领域模型、数据访问对象层和服务外观。\n\n第 1 章 ■ 使用 Spring、Hibernate 和模式架构你的应用\n\
  \n如果你对这些术语中的某些感到陌生，请不要担心。在接下来的章节中，我们将解释每个组件的用途和功能，演示它们在应用中扮演的角色。\n\n虽然我们并不认为只有一种正确的方法来架构应用，但我们确实想强调使用关键设计模式和最佳实践的好处。这是一个你会在本书中反复看到的主题。\n\
  \n依赖注入的重要性\n\nSpring 框架极大地减少了设计和构建应用时的猜测工作。它已成为集成不同组件和框架的事实标准，并且其发展已远远超出了依赖注入的根源。依赖注入的目的是将解析外部软件组件的工作与你的应用业务逻辑解耦。\n\
  \n\n\n如果没有依赖注入，组件访问所需服务的细节可能会与组件代码混杂在一起。这不仅增加了出错的可能性、导致代码臃肿，还加剧了维护的复杂性；同时，它会使组件之间的耦合更加紧密，导致在重构或测试时难以修改依赖关系。\n\
  \nSpring 本质上有助于强制实施最佳编码实践，并减少对外部框架甚至应用程序内部类的依赖。在最简单的层面上，Spring 是一个轻量级的 IoC 容器，这意味着它将承担起连接应用程序依赖关系的责任。\n\
  \n这种连接责任究竟如何处理，将在本书中深入探讨。\n\n然而，你将在本书中反复看到的一个主题是，Spring 如何以松散耦合的方式轻松地将组件连接在一起。这对任何应用程序都有深远的影响，因为它使代码更容易重构和维护。在本书的背景下，它允许开发者构建一个不直接绑定到特定实现或框架的持久层。\n\
  \nSpring 的成功很大程度上归功于它提供的海量集成点，涵盖了广泛的框架和技术。当开发者意识到使用 Spring 来集成自己代码中的各种组件所带来的好处时，许多新的抽象层应运而生，它们依赖\
  \ Spring 来集成流行的开源框架。使用 Spring 集成特定框架不仅简化了该框架的引入，还允许以一致的方式执行集成——这与在应用程序上下文中连接协作组件的方式并无二致。此外，使用\
  \ Spring 的依赖注入来连接关键框架，确保了集成是以解耦的方式完成的。\n\nSpring 被广泛采用的主要催化剂之一是其对开源对象关系映射（ORM）框架\
  \ Hibernate 的支持。随着 Spring 框架开始流行，Java 开发社区也对 Hibernate 议论纷纷。那是开源框架的关键时期，因为 Spring\
  \ 和 Hibernate 都提供了革命性的解决方案，这些方案将改变许多新应用程序的架构和实现方式。正如你将看到的，Spring 和 Hibernate 在许多方面相辅相成，并且彼此都对对方的成功和广泛采用负有部分责任。\n\
  \n**协同伙伴关系**\n\n在本书中，我们将重点展示如何最有效地结合使用 Spring 和 Hibernate。\n\n尽管如此，我们仍将强调将 Hibernate\
  \ 与应用程序解耦的策略。这并非因为我们担心使用 Hibernate，而是因为松散耦合提供了更清晰的关注点分离。\n\n**第 1 章 ■ 使用 Spring、Hibernate\
  \ 和模式架构你的应用程序**\n\n无论一个框架有多好，保持依赖关系的解耦总是更好的。一个与具体技术无关的持久层不仅能带来更好、更清晰、更易于维护的代码（以及从一种持久化技术移植到另一种的便携性），还能确保整个应用程序的一致性。突然间，你的代码有了一个骨干支持，它处理依赖关系连接，提供面向切面编程（AOP）能力，并生成内聚的配置元数据，这些元数据隐式地记录了应用程序各部分如何组合在一起。\n\
  \nSpring 鼓励有助于保持应用程序所有依赖关系解耦的设计实践。无论是外部框架、应用程序组件，甚至是 Spring 或 Hibernate 本身，确保协作组件不直接绑定在一起，有助于防止一个层的关注点泄漏到另一个层。通过将所有连接细节委托给\
  \ Spring，你不仅通过消除创建基础设施“访问代码”的需求来简化代码库，还确保了组件的独立性。在接下来的几章中，你将学习如何通过面向接口编程以及使用 Spring\
  \ 的 ORM 抽象和通用异常层次结构来帮助实现这些目标。\n\n**Spring 和 Hibernate 的成功故事**\n\nSpring 的流行度上升不仅仅源于它通过帮助连接依赖关系来降低代码复杂性的能力。早期围绕\
  \ Spring 框架的许多兴奋点都源于它对其他领先开源框架（包括 Hibernate）的支持。Hibernate 是首批为构建持久层提供企业级解决方案的开源\
  \ ORM 框架之一。Spring 能够将集成细节外部化到 XML 配置文件，或通过 Java 注解表达依赖注入，这提供了一种强大的抽象，极大地简化和标准化了将\
  \ Hibernate 引导到应用程序中所需的集成工作。\n\nORM 框架在实际使用的持久化技术（通常是关系型数据库）之上提供了一个抽象层，允许开发者专注于其领域模型的对象导向细节，而不是低层次的数据库问题。数据库的关系表世界与\
  \ Java 的对象导向世界之间存在固有的*阻抗不匹配*，这使得实现有效的 ORM 抽象变得困难。这种阻抗不匹配源于关系型数据库与 Java 等面向对象语言之间的根本差异。例如，关系型数据库不实现多态、封装和可访问性等核心面向对象原则。此外，Java\
  \ 和 SQL 中“相等”的概念也大相径庭。我们将在本书中讨论其中一些差异，并探讨弥合 SQL 数据库与 Java 领域模型之间差距的方法。\n\nHibernate\
  \ 代表了弥合这一差距的重要一步，它提供了一个强大的开源框架来表达面向对象的领域模型，并定义了数据库的表和列如何与 JavaBean 中的对象实例和属性同步。\n\
  \n**更好的集成方法**\n\n尽管现在可以更高效地开发持久层，但将 Hibernate 集成到应用程序中仍然可能是一项艰巨的任务。由于缺乏标准化的集成方法，开发者不得不不断地重复造轮子，将大量资源投入到开发和维护将\
  \ Hibernate 塞入应用程序所需的基础设施代码上。\n\n随着 Hibernate 越来越受欢迎，Spring 框架也开始获得发展势头。当 Spring\
  \ 首次出现时，它的使命是让服务器端 Java 应用程序的开发变得更简单。首先也是最重要的，它提供了一种更好的解决方案来连接应用程序的依赖关系。因此，Spring\
  \ 常被称为*容器*，这意味着它提供了一个集中的抽象层，用于通过配置（而不是编写通常重复的代码）来集成协作依赖关系。\n\n**第 1 章 ■ 使用 Spring、Hibernate\
  \ 和模式架构你的应用程序**\n\n\n\nSpring 的部分动力源于其使应用程序能够提供企业级特性（如声明式事务和安全性）的方式，而无需承担企业 JavaBean（EJB）容器的开销和复杂性，也无需强迫开发者处理特定技术或标准的细节。时间证明，EJB\
  \ 虽然在理论上强大，却成为了过度设计的牺牲品。Spring 和 Hibernate 的成功很大程度上归功于它们提供了比 EJB 标准更合理、更有效的解决方案。Spring\
  \ 提供了一种更简单的声明式事务管理方法，而 Hibernate 则提供了更健壮、更直观的 ORM 抽象。\n\n这两个框架都是因市场对一种比以往方案更简单的解决方案的需求日益增长而构建并流行起来的。随着\
  \ Spring 和 Hibernate 的成功，人们更加强调构建更简单、更轻量级的应用程序，从而显著提高了易维护性和可扩展性。\n\n尽管依赖注入是 Spring\
  \ 的核心目的，但该框架已远远超越了其最初的 IoC 基础。Spring 框架已扩展到其他与其 IoC 根基自然融合的领域。Spring 现在提供了一个可插拔的事务管理层、AOP\
  \ 支持、与持久化框架（如 Hibernate）的集成点，以及一个名为 Spring MVC 的灵活 Web 框架。这些特性的添加是一个渐进的过程，由需求和必要性推动。\n\
  \n随着 Hibernate 的流行度飙升，开发者开始依赖 Spring 的持久化抽象来简化将 Hibernate 集成到应用程序中这一通常令人生畏的任务。得益于\
  \ Spring，启动并运行 Hibernate 的过程变得容易得多。开发者可以从一个 Spring 配置文件开始，该文件不仅引导了 Hibernate 的 **SessionFactory**（允许通过标准\
  \ XML 指定配置细节），还通过使用基于久经考验的设计模式（如 **HibernateTemplate** 和 **OpenSessionInView**）精心构建的抽象，简化了无数\
  \ Hibernate 操作的调用。我们将在接下来的几章中讨论这些 Spring-Hibernate 集成的核心细节。这里的关键点是，结合 Spring 和 Hibernate\
  \ 为开发者提供了一个极其强大的解决方案。\n\nSpring 不仅简化了 Hibernate 的集成，还降低了 Hibernate 与应用程序的耦合度。如果需要切换到不同的\
  \ ORM 或持久化技术，这种迁移工作会变得容易得多，因为对 Hibernate 本身的直接依赖很少。例如，Spring 为持久化相关错误提供了一个通用的异常层次结构。\n\
  \n虽然不是必须的，但将 Hibernate 异常转换为 Spring 的通用异常层次结构被认为是一种良好实践，这能进一步将你的应用程序与 Hibernate\
  \ 解耦。Spring 包含内置机制来简化这种转换，使其相当透明。此外，Spring 针对其他持久化技术（如 JDBC、JPA、TopLink 等）的集成代码也会处理到\
  \ Spring 通用异常层次结构的转换，从而进一步简化从一种持久化技术到另一种的迁移。\n\n建立松散耦合的依赖关系是 Spring 的核心目的之一。事实上，框架本身也尽可能限制与自身的直接耦合，这意味着你的应用程序很少会直接与\
  \ Spring 类绑定。\n\n架构应用程序的最佳实践\n\n你的代码越是抽象化，避免直接与数据库交互（并处理这些底层问题），切换到不同数据库或持久化技术就越容易。\n\
  \n同样，Hibernate 也为你的数据模型提供了抽象，让你能够专注于应用程序的持久化细节，而不是数据库的细节。通过这些解耦，持久化层在不同数据库之间的可移植性大大增强。\n\
  \n第 1 章 ■ 使用 Spring、Hibernate 和模式架构你的应用程序\n\nSpring 集中管理应用程序中的依赖关系，使维护和配置更容易，并促使开发者面向接口编程，从而带来更清晰、更好的代码。它还允许你更多地关注应用程序的业务逻辑，而较少关心这些信息是如何物理存储和检索的。这个概念通常被称为*分层*。每一层都专注于完成特定任务（对应用程序中的其他层知之甚少或耦合度很低）。\n\
  \n持久化层的层次\n\n处理持久化的应用程序层通常被称为*持久化层*。Spring 有助于实施一种模块化架构，其中持久化层被划分为几个核心层，包含以下内容：\n\
  \n• 领域模型\n\n• 数据访问对象（DAO）层\n\n• 服务层（或服务外观）\n\n这些层中的每一层都代表了经过验证的设计模式，这些模式是构建稳固、可维护架构的关键。在持久化层之外，一个典型的\
  \ Spring MVC 应用程序还有一个控制器层，它处理用户交互，委托给服务外观，并将必要的数据传回视图。我们将在接下来的几章中深入探讨这些实现细节。在这里，我们将简要介绍领域模型、DAO\
  \ 和服务层。\n\n领域模型\n\n领域模型代表应用程序中的关键实体，定义了它们之间的相互关系。每个实体定义了一系列属性，这些属性指定了其特征以及与其他实体的关系。领域模型中的每个类都包含与数据库中的列和关系相对应的各种属性和关联。通常，数据库中的每个表都有一个领域实体，但情况并非总是如此。\n\
  \n例如，我们可能需要定义一个 **Person** 领域实体，旨在表示应用程序和数据库中*人*的概念。**Person** 类可以表示如下：\n\n**@Entity**\n\
  \n**public class Person implements Serializable {**\n\n****private Long id;**\n\n\
  **private String firstName;**\n\n**private String lastName;**\n\n**private String\
  \ username;**\n\n**private String password;**\n\n**private Integer roleLevel;**\n\
  \n****private Integer version;**\n\n******public Person() {**\n\n**5\n\n第 1 章 ■\
  \ 使用 Spring、Hibernate 和模式架构你的应用程序\n\n**}**\n\n****@Id**\n\n**public final Long getId()\
  \ {**\n\n**return id;**\n\n**}**\n\n****@Version**\n\n**public Integer getVersion()\
  \ {**\n\n**return version;**\n\n**}**\n\n****. . . 省略其余 Getter 和 Setter 方法**\n\n\
  **}**\n\nHibernate 的部分工作是在领域模型实例和数据库行之间进行转换。开发者通过使用 XML 或注解指定映射规则，为 Hibernate 提供提示以帮助其执行这些转换。Hibernate\
  \ 使用这些元数据来定义领域模型的特征，以及领域模型类中的面向对象属性如何映射到数据库中的列和关系。\n\n虽然最初使用 XML 来定义映射规则，但我们建议使用注解，因为这种方法更简单、更简洁。事实上，通过将\
  \ @Entity 注解应用于一个类，可以假定该类属性应持久化到数据库，使用属性名作为数据库列名，并使用字段类型作为数据库列类型的提示。当然，所有这些细节都可以显式配置或覆盖，但由于合理的默认值，你的映射配置在大多数情况下应该相对简洁。\n\
  \n\n\n数据访问对象（DAO）层\n\nDAO 层定义了保存和查询领域模型数据的方法。DAO 有助于抽象出特定数据库或持久化技术的细节，从领域模型的角度提供持久化行为的接口，同时封装持久化技术的显式特性。DAO\
  \ 模式的目标是完全抽象底层持久化技术及其加载、保存和操作领域模型所表示数据的方式。DAO 模式的主要优势在于关注点分离——持久化技术和数据源的底层细节被抽象为一系列提供查询和保存功能的方法。如果底层持久化技术发生变化，大部分必要的修改将仅限于按照相同接口定义新的\
  \ DAO 实现。\n\n例如，我们可以创建一个 **PersonDAO** 类来定义应用程序中与 **Person** 实体相关的所有持久化需求。在 **PersonDao**\
  \ 中，我们可能会有一个类似如下的方法：**public Person getPersonById(Long id);**\n\n该方法将负责使用唯一标识符从数据库加载\
  \ **Person** 实体。\n\n以下可能是应用程序的另一个方法：\n\n**void savePerson(Person person);**\n\n\
  第 1 章 ■ 使用 Spring、Hibernate 和模式构建应用程序架构\n\n该方法旨在处理对 **Person** 表中给定行的所有更新（即创建或修改）。\n\
  \n在定义 DAO 时，最佳实践是先编写接口，该接口应描述应用程序所需的所有核心持久化相关方法。我们建议为领域模型中的每个持久化实体创建独立的 DAO，但在这方面没有明确的规则。然而，在独立接口中定义\
  \ DAO 方法至关重要，因为它将 DAO 的目的和契约与实际实现解耦，甚至允许你为给定的 DAO 接口编写多个实现。\n\n需要注意的是，此类接口与后台使用的持久化技术无关。换句话说，该接口仅依赖于相关的领域模型类，从而将应用程序与持久化细节解耦。当然，DAO\
  \ 实现类将使用 Hibernate、JPA 或我们选择的任何持久化技术。然而，应用程序的更高层通过 DAO 接口与这些细节隔离，为我们提供了可移植性、一致性和良好的分层架构。\n\
  \n正如我们之前提到的，Spring 框架还提供了一个通用的数据异常层次结构，适用于所有类型的持久化框架和使用场景。在每个持久化框架集成库中，Spring 出色地将每个框架特定的异常转换为\
  \ Spring 通用数据访问异常层次结构中的异常。Spring 通用异常层次结构中的所有异常都是非受检异常，这意味着你的应用程序代码无需捕获它们。Spring\
  \ 有助于将应用程序与特定持久化框架解耦，允许你针对通用且定义良好的异常层次结构进行编码，该层次结构可用于任何持久化技术。\n\n在第 6 章中，我们将深入探讨\
  \ DAO 实现策略，探索 Hibernate 和 JPA 提供的灵活查询和保存/更新功能。特别是查询可能相当复杂，为此，Hibernate 和 JPA 提供了两种不同的搜索和访问数据的方法。HQL\
  \ 和 JPQL（分别是 Hibernate 查询语言和 Java 持久化查询语言）都提供了面向对象的语法来表达查询，这与 SQL 非常相似。尽管简洁直观，但\
  \ HQL 和 JPQL 在运行时被解释，这意味着你无法使用编译器来验证查询的正确性和完整性。\n\n为了解决这一限制，Hibernate 还包含一个 Criteria\
  \ API，允许以编程方式表达查询。直到最近，JPA 还没有提供 Criteria API，这意味着如果开发者需要这种类型的查询功能，他们必须跳出 JPA 标准。然而，随着\
  \ JPA 2.0 的引入，Criteria API 现在已成为标准的一部分。\n\n使用 HQL/JPQL 还是 Criteria API 有时是风格问题。然而，在某些情况下，Criteria\
  \ API 更有效且更易于维护。例如，如果你正在构建一个需要动态过滤或排序的功能，能够根据用户的运行时规范以编程方式动态创建查询，比尝试通过字符串拼接动态生成\
  \ JPQL 查询字符串要清晰得多。我们将在第 6 章进一步讨论这些类型的实现决策。\n\n服务外观\n\n处理应用程序业务逻辑的层（令人惊讶地）被称为*服务层*。服务层通常定义应用程序的公共\
  \ API，将一个或多个底层 DAO 操作组合成一个内聚的事务单元。\n\n为了帮助你理解服务层是如何构建和使用的，让我们看几个例子：**Person loginUser(String\
  \ username, String password);**\n\n第 1 章 ■ 使用 Spring、Hibernate 和模式构建应用程序架构\n\n**loginUser()**\
  \ 方法旨在验证用户身份（即验证指定的用户名和密码是否匹配），然后将重要的用户信息加载到会话中（获取用户信息，如姓名、上次登录日期、角色类型等）。这些任务可能不会由单个\
  \ DAO 方法处理。相反，我们可能会基于两个不同的 DAO 类（PersonDAO 和 RoleDAO）的功能来构建：\n\n**interface PersonDao\
  \ {**\n\n****Person authenticatUser(String username, String password);**\n\n****.\
  \ . .**\n\n****}**\n\n********interface RoleDao {**\n\n****List<Role> getRolesForPerson(Person\
  \ person);**\n\n****. . .**\n\n****}**\n\n这些 DAO 方法共同实现了一个核心业务目标，其整体效果大于各部分之和。在这个例子中，我们使用了两个只读方法，但想象一个场景，我们有一个业务方法，例如：\n\
  \n**boolean transferMoney(Long amount, Account fromAccount, Account destAccount)**\
  \ **throws InvalidPermissionException, NotEnoughFundsException;**\n\n现在，假设上述服务层方法由几个\
  \ DAO 方法组成：**boolean validateSufficientFundsInAccount(Long accountId);**\n\n****boolean\
  \ removeFunds(Long accountId, Long amount);**\n\n****boolean addFunds(Long accountId,\
  \ Long amount);**\n\n\n\n这里的情况一目了然：我们验证特定账户中是否有足够的现金，然后从一个账户中提取资金并转入另一个账户。任务本身很简单，但无需过度想象就能预见，如果这个业务方法在半途中失败，可能会引发怎样的混乱——资金可能被扣划，却从未存入目标账户。起初这对银行或许有利，但用不了多久，整个经济体系就会崩溃，文明将退回到仅以疯狂吸管和星球大战人偶为基础的原始物物交换体系。\n\
  \n第 1 章 ■ 使用 Spring、Hibernate 和设计模式架构你的应用\n\n利用声明式事务\n\n服务外观方法通常将多个 DAO 方法组合在一起，作为一个工作单元来完成业务逻辑。这就是事务的概念：整个方法（及其所有副作用）要么\
  \ 100% 成功完成，要么应用程序回滚到调用该方法之前的状态。在 Spring 持久化技术出现之前，事务需求常常促使开发者转向 EJB，因为 EJB 允许他们为每个外观方法声明式地配置事务语义。当无法声明式地指定事务需求时，开发者必须改用编程式方法。这不仅增加了代码的复杂性，模糊了持久化逻辑的意图，还进一步将持久化技术与应用程序耦合在一起。\n\
  \n事务划分通常被认为是一个*横切关注点*，这意味着它代表影响代码库许多部分的功能，但与这些部分的其他特性是正交的。横切关注点会给代码增加冗余，因为它们需要被重复地编织到应用程序的业务逻辑结构中，从而降低了代码的模块化程度。面向切面编程旨在解决这个问题，它允许将这些关注点作为切面只表达一次，然后根据需要编织到业务逻辑中。\n\
  \n在 Spring 中，服务层通常旨在完成三项主要任务：\n\n• 作为核心 API，应用程序的其他层将通过它进行交互（这是外观模式的体现）\n• 定义核心业务逻辑，通常调用一个或多个\
  \ DAO 方法来实现此目标\n• 为每个外观方法定义事务细节\n\n理解面向切面编程 (AOP)\n\n服务层是 Spring 的 AOP 支持得到最佳利用的地方。Spring\
  \ 内置了事务支持，可以通过使用拦截器来增强你的服务层代码，将事务功能编织进去。拦截器是可以混入方法执行流程中的代码，通常在特定方法被调用之前和/或之后委托给拦截器。简单来说，拦截器在方法执行的某个点上封装了切面的行为。\n\
  \n仅仅指定一个方法应该是事务性的还不够。你不应该强制每个方法都在事务的范围内发生，出错时回滚，一切顺利时提交。也许某些方法不尝试修改任何数据，因此应该在只读事务的上下文中执行。或者更可能的是，某些异常会触发回滚，而其他异常则允许事务继续进行。\n\
  \n切入点（Pointcuts）是 Spring AOP 的另一个重要组成部分。它们有助于定义特定切面（可以编织到应用程序逻辑中的模块化功能，例如事务行为）应该被编织到何处。借助\
  \ Spring 的事务支持，你可以精细地控制哪些异常可能触发提交或回滚，以及事务本身的细节，例如确定隔离级别，以及一个方法是应该触发一个新事务、一个嵌套事务，还是在现有事务内执行。\n\
  \n在基本层面上，Spring 通过使用代理设计模式来实现 AOP。当你通过将横切行为注入到各种方法来增强你的类时，你实际上并没有在整个应用程序中注入代码（尽管从某种意义上说，这是使用\
  \ AOP 的最终效果）。\n\n相反，你是在请求 Spring 创建一个新的代理类，在该类中，功能被委托给你的现有类以及事务实现（或任何你想要编织到代码中的切面）。这个解释是对底层实际发生情况的过度简化，但重要的是要记住，当你通过\
  \ AOP 将横切行为编织到你的类中时，Spring 并不是直接插入代码；而是用包含你现有代码并与事务代码交织在一起的代理来替换你的类。在底层，这是使用 JDK\
  \ 动态代理或 CGLIB 字节码增强来实现的。\n\n同样，很容易看出这对于像 Spring 这样的轻量级 IOC 容器来说是多么自然。既然你已经将依赖关系的处理委托给了\
  \ Spring，那么让 Spring 也负责代理这些依赖关系，以便你可以分层添加新的横切行为，就完全合情合理了。\n\n尽管当你需要定义和引入要编织到实现中的新切面时，Spring\
  \ AOP 非常强大，但关键的事务功能是开箱即用的，无需学习 AOP 编程概念的细节。尽管如此，了解 Spring 在底层所做的基本工作仍然很有帮助。请记住，AOP\
  \ 不仅仅用于应用事务行为——它还有助于将任何横切关注点（例如日志记录或安全性）编织到你的应用程序中。我们将在本书后面更详细地讨论 AOP。\n\n简化事务\n\
  \n尽管使用 Spring 应用事务过去需要一些 AOP 知识，但在框架的最近版本中，这个过程已经大大简化了。现在，将事务行为应用于服务层类只需在类或方法级别指定\
  \ **@Transactional** 注解即可。该注解可以通过属性进行参数化以自定义其行为，但最重要的细节是事务是否为只读。许多开发者没有认识到使用事务的重要性——即使在只读上下文中也是如此。事务不仅仅用于确保原子性。事务还可以用于指定数据库隔离级别，并划定在事务范围之外可能不明确的其它上下文细节。我们强烈建议所有数据库操作都在某个事务的范围内进行——即使只是为了获得对数据库上下文状态的控制。我们将在第\
  \ 8 章讨论其中一些细节，例如理解隔离级别和高级事务选项。\n\n面向接口编程的好处\n\n\n\n我们可以依赖 Spring 将 DAO 依赖注入到服务层类中，确保这种集成以一致的方式进行，并且这两层之间的集成点是通过接口而非具体实现类。正如本章前面所述，这是利用\
  \ Spring 依赖注入的一个基本概念：通过面向接口编程，我们能获得更多价值。我们始终可以依赖 Spring 自动注入所需的依赖，但通过使用接口，我们获得了在运行时更改注入实现的额外好处。如果没有接口，就没有其他选择——我们必须硬编码哪些依赖需要注入到组件中。接口与\
  \ Spring 的依赖注入能力是一对动态组合，能显著提高灵活性。例如，无需更改任何代码，你就可以选择为单元测试注入一组依赖，而为生产部署注入另一组依赖。或者，你可以为每个环境选择使用哪些实现。这些都是遵循最佳实践并利用\
  \ Spring 框架所带来的好处。\n\n**测试持久层**\n\n正如你将在后续章节中看到的，这种关注点分离有助于保持代码整洁，并确保一个层的细节不会干扰另一层的代码。当需要重构时，这一优势可能非常显著。或许更重要的是，这些最佳实践对于确保有效的测试策略至关重要。在第\
  \ 8 章中，你将学习 Spring 如何极大地简化单元测试和集成测试的创建。在测试方面，直观地理解交换实现如何派上用场是相当容易的。Spring 3 包含一个强大的\
  \ TestContext 框架，它简化了单元测试和集成测试的创建与管理——甚至抽象掉了你碰巧使用的测试框架。集成测试通常可能很棘手，尤其是当你考虑实例化所有测试依赖和组件的细节时。\n\
  \n例如，集成测试可能需要访问数据库以及测试数据。Spring 可以引导 **ApplicationContext**，然后自动注入任何所需的依赖。在测试持久化相关代码的情况下，你可以选择让数据在事务范围内发生，然后在测试完成时自动回滚事务，以确保测试所做的修改被移除。\n\
  \n高级特性与性能调优\n\n本书还将涵盖一些更高级的持久化概念，这些概念在大多数应用中都是不可或缺的，例如加载和管理领域模型中复杂关系与集合的优化技术。我们将讨论性能和优化策略，例如急加载和缓存（在领域层和更高抽象层面）。正如我们之前提到的，Hibernate\
  \ 提供了许多可用于提升应用性能的特性。例如，Hibernate 和 JPA 为调优 HQL/JPQL 和 Criteria API 查询提供了极大的灵活性。\n\
  \n这些特性使开发者能够最大限度地减少与数据库的往返次数，从而允许仅用最少的 SQL 查询就能访问甚至是大数据集。Hibernate 还提供了诸如懒加载和强大的缓存机制等特性，这些机制可以被调优以控制缓存实体的大小和过期时间。理解这些特性如何工作，以及用于控制它们的众多选项，对于最大化性能至关重要。\n\
  \n缓存是一个经常被忽视的特性，它可能会阻止应用发挥其全部潜力。就缓存而言，要么没有被充分利用，要么没有投入足够的时间和精力进行调优和测试。然而，如果未经调优，缓存可能会显著降低应用性能。在第\
  \ 10 章中，你将学习 Hibernate 缓存的工作原理、调优和提升性能的策略，以及如何集成缓存提供者（如 ehcache）。我们还将探讨几个导致性能问题的常见陷阱，例如\
  \ *N+1 查询* 问题，以及如何识别和解决这些问题。\n\nHibernate-Search\n\n有时，你的应用会需要 Hibernate 或 Spring\
  \ 无法提供的功能。因此，我们将讨论一些扩展 Spring 和 Hibernate 的重要框架，例如 Hibernate-Search。Hibernate-Search\
  \ 将流行的开源搜索框架 Lucene 集成到 Hibernate 或 JPA 应用中。对于需要真正搜索功能的需求，关系型数据库无法提供 Lucene 所能提供的能力。Hibernate-Search\
  \ 将 Lucene 无缝集成到你的持久层中，允许你在 Hibernate Session 或 JPA Persistence Context 范围内执行 Lucene\
  \ 查询。在第 10 章中，你将学习这种集成的工作原理，以及 Lucene 和 Hibernate-Search 提供的功能范围。\n\n构建 REST Web\
  \ 服务\n\n由于许多应用将 Spring 和 Hibernate 作为 Web 应用的一部分，我们将探讨与构建 Web 应用相关的一些潜在问题和解决方案。我们将开发一个基于\
  \ REST 的 Web 服务，以探索一些在 Java 与 JSON 或 XML 之间编组领域实体的策略。我们将研究诸如 Dozer 之类的框架，这些框架有助于减少与序列化对象图和处理潜在的\
  \ **LazyInitializationException** 相关的一些复杂性。\n\n其他持久化设计模式\n\nSpring 基于久经考验的设计模式，这些模式在简化代码和减少维护方面大有裨益。既然我们正在讨论应用的一些核心构建块，让我们来看看\
  \ Spring 架构中常用的一些更流行的模式。\n\n■ **注意** 你将在本书中看到许多这些模式的实际应用，但了解一下那本推广使用模式来解决面向对象编程中重复问题的开创性著作可能会很有用。\n\
  \n这本著名的书是《设计模式：可复用面向对象软件的基础》，作者是 Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides（Addison-Wesley，1994\
  \ 年）。这四位作者及其相关的模式，常常被戏称为“四人帮”。\n\n模板模式\n\n模板模式是 Spring 的 ORM 框架集成包中最常用的惯用法之一。Spring\
  \ 为每个最流行的持久化框架都提供了模板，使得将代码移植到不同的持久化实现变得容易。Spring 框架还使用模板模式来更有效地集成 JMS、定义事务行为以及提供外发电子邮件消息能力等。\n\
  \n\n\n模板模式允许定义一个模板，其中包含一系列标准步骤，并将那些特定于业务逻辑的操作委托给子类。例如，在使用 Hibernate 时，首先需要创建并初始化一个新的\
  \ Hibernate 会话，并可选地开启一个事务，然后才能执行任何 Hibernate 操作。当操作完成后，需要关闭会话，并可选地提交或回滚事务。如果每次与\
  \ Hibernate 交互时都重复这些相同的步骤，将会相当冗余。相反，我们可以利用 Spring 的 **HibernateTemplate** 或 **JpaTemplate**\
  \ 抽象，它们为我们处理了这些步骤。虽然使用这些模板支持类是一种有效的方法，但我们将在本书后面探讨其他替代方案。\n\n通常，模板被定义为一个抽象类。为了指定要封装在模板化工作流中的操作，我们扩展模板类，提供或扩展在模板父类中定义的抽象方法的实现。\n\
  \n模板模式正如其名：它将样板代码和冗余任务提取到模板中，并将无法模板化的功能委托给你的具体实现。在大多数情况下，无法放入模板的代码正是你的持久化逻辑本身。使用模板模式意味着你可以专注于数据库操作，而无需担心一些琐碎的细节：\n\
  \n• 打开数据库连接\n• 开始一个事务\n• 将你的 SQL 操作包装在 try-catch 块中（以处理意外异常）\n• 提交或回滚事务\n• 关闭数据库连接（并处理此过程中的任何异常）\n\
  • 捕获事务中可能发生的任何异常\n\n如果不使用 Spring，你的大部分代码与持久化逻辑关系不大，而是每个操作都需要的相同样板代码。\n\nSpring 的\
  \ HibernateTemplate 和 JpaTemplate 提供了一系列便捷方法来简化许多常见的持久化相关功能。例如，HibernateTemplate\
  \ 提供了一些有用的方法，例如：\n\n• ***saveOrUpdate(Object entity)***\n• ***load(class entityClass,\
  \ Serializable id)***\n• ***find(String hqlQuery)***\n• ***findByCriteria(DetachedCritieria\
  \ criteria)***\n• ***delete(Object entity)***\n\nHibernateTemplate 还提供了更多的方法，以及上述某些方法的众多变体。然而，这些便捷方法并非模板模式的直接示例。相反，它们更像是包装方法，委托给\
  \ Spring 的 **HibernateTemplate** 抽象中的核心模板方法：\n\n**public Object execute(HibernateCallback\
  \ action) throws DataAccessException {**\n**return doExecute(action, false, false);**\n\
  **}**\n\n**要执行一系列 Hibernate 操作，并确保它们在必要的模板化步骤（例如初始化和关闭 Hibernate 会话）内发生，我们需要创建 **HibernateCallback**\
  \ 接口的匿名实现，该接口是上述 **execute** 方法的唯一参数。例如，要将一个实体保存到数据库，我们可以这样做：\n\n**public void customSavePerson(Person\
  \ person) {**\n**getHibernateTemplate().execute(**\n**new HibernateCallback() {**\n\
  **public Object doInHibernate(Session session) throws HibernateException {**\n**session.saveOrUpdate(person);**\n\
  **}**\n**}**\n**);**\n**}**\n\n当然，直接使用 **HibernateTemplate** 的 **save(Object entity)**\
  \ 方法会简单得多。然而，在这个刻意构造的例子中，我们定义了 **HibernateCallback** 接口的一个实现，它使用传入的 **Session**\
  \ 将 **Person** 实体持久化到数据库。通常，这种较低级别的持久化功能将是 DAO 类的一部分，这有助于将 Hibernate 特定的代码与应用程序的其余部分隔离开来。\n\
  \n尽管 **HibernateTemplate** 和 **JpaTemplate** 为简化持久化操作提供了有效的结构，但它们已不再像过去那样必要。Hibernate\
  \ 3 附带了一个称为上下文会话（Contextual Sessions）的功能，它为 **Session** 的作用域提供了更大的灵活性。Spring 的 ORM\
  \ 支持所提供的部分功能是促进围绕持久化行为的“会话”，允许 Hibernate 和 JPA 操作无缝集成到 Spring 的事务支持中。如果每个 Hibernate\
  \ 操作都创建一个新的 **Session** 和新的数据库连接，那么 Spring 的事务特性就无法得到正确利用。为了将多个较低级别的持久化操作绑定到一个整体的“会话”中，Spring\
  \ 使用了 **ThreadLocal** 的能力，允许不同的操作在连续的线程范围内进行作用域划分。较新版本的 Hibernate 提供了一种可插拔机制，用于定义如何访问当前\
  \ Session。这种新能力使得 **HibernateTemplate** 和 **JpaTemplate** 在某些情况下显得有些多余。我们将在接下来的几章中讨论\
  \ Spring ORM 模板的优缺点。\n\n■ **注意** Spring 既可以用于 JTA 管理的事务，也可以用于本地资源事务。在 JTA 环境中，事务由容器管理，并提供额外的行为，例如分布式事务。然而，利用\
  \ JTA 事务会有额外的开销，如果你的应用程序不需要 JTA 提供的功能，我们建议使用更轻量级的本地事务。使用 Spring 的优势之一是，在本地管理的事务和\
  \ JTA 之间切换只是一个配置问题。在 JTA 的情况下，Spring 将简单地委托给 JTA，而不是在应用程序线程中管理上下文状态。\n\nActive-Record\
  \ 模式\n\nDAO 模式并非执行数据操作的唯一策略。另一种最近开始获得更多关注的方法是 Active-Record 模式。Active-Record 是一种由\
  \ Ruby on Rails 和 Grails 等框架推广的设计模式，它采用了与将持久化功能抽象到单独层中不同的方法。相反，Active-Record 试图将领域对象的行为直接融合到领域类本身中。\n\
  \n通常，特定领域类的一个实例代表相应数据库表中的一行。要保存对该实例的更改（从而保存到数据库中的相应行），可以直接在实例上调用 **save** 实例方法。要删除一个实例，我们可以简单地在需要删除的实例上调用\
  \ **delete()**。查询操作通常作为静态方法在领域类本身上调用。例如，在 Grails 中，要查找所有 **lastName** 属性为 **Fisher**\
  \ 的 **Person** 实体，我们可以调用 **Person.findAllByLastName('Fisher')**。\n\nActive-Record\
  \ 的好处在于它提供了一种直观且简洁的方法来执行持久化操作，并且通常能显著减少代码开销。Active-Record 还试图将行为和属性结合到一个领域对象中，提供一种更面向对象的方法。你将在第\
  \ 11 章讨论 Grails 时了解更多关于 Active-Record 模式的内容。\n\n总结\n\n在本书中，我们将演示 Spring 如何与关键的持久化框架和策略集成。在此过程中，你将了解更多关于\
  \ Spring 的特性和能力，以及它用来有效完成工作的一些关键设计模式。\n\n\n\n直到几年前，简单的 Java 数据库连接（JDBC）还是实现应用程序持久化层最流行的选择之一。然而，EJB\
  \ 和诸如 Hibernate 之类的开源 ORM 框架显著改变了持久化领域的格局，它们允许开发者专注于基于 Java 的领域模型，在保持 Java 面向对象语义的同时，仍然能够处理\
  \ SQL 数据库的关系型概念。ORM 提供了一种抽象层次，通过将应用程序代码与关系型数据库的底层细节解耦，从而带来了更高的灵活性。\n\n然而，事情并不总是看起来那么简单。ORM\
  \ 并非没有缺点和后果。首先，正如我们之前提到的，面向对象的 Java 世界与关系型的 SQL 世界之间存在阻抗不匹配。像 Hibernate 这样的 ORM\
  \ 框架通过提供在 SQL 和 Java 之间进行映射的广泛选项，尽力解决这种不匹配。尽管如此，这两个领域之间的根本差异将永远存在，因此无法完全解决。\n\n\
  尽管存在这些局限性，ORM 框架通过简化开发者与关系型数据库交互的方式，提供了无与伦比的优势。例如，Hibernate 引入了辅助功能，如缓存和延迟加载，这些功能可以在几乎不增加编码工作量的情况下显著提升应用程序的性能。Hibernate\
  \ 和 JPA 还提供了无缝生成数据库模式，甚至使其与基于 Java 的领域模型保持同步的工具。这些特性使得应用程序代码与数据库之间的集成更加无缝——以至于你常常会忘记自己正在使用数据库！\n\
  \nSpring 以 IoC 容器为核心，通过处理将一个依赖与另一个依赖集成所需的细节，帮助降低应用程序的复杂性以及类之间的耦合度。Spring 还为众多持久化框架（如\
  \ Hibernate 和 JPA）提供了事务行为、AOP 能力以及基础设施类。\n\nHibernate 是一个 ORM 框架，旨在实现关系型数据库与面向对象开发领域之间的转换。Hibernate\
  \ 使用 Hibernate 查询语言（HQL）或 Hibernate Criteria API 提供查询接口。Spring 和 Hibernate 共同构成了一对黄金搭档，能够简化依赖协作、降低耦合度，并为持久化操作提供抽象。\n\
  \nJPA 是 Java 的持久化标准，其设计深受 Hibernate 开发者的影响。Hibernate 可以作为 JPA 的实现提供者，允许你遵循标准并获得框架的可移植性，同时仍然利用优秀的\
  \ Hibernate 实现。然而，JPA 中缺少一些有用的特性，这些特性仅存在于 Hibernate 实现中。随着 JPA 2.0 的发布，JPA 规范的许多局限性得到了解决，使\
  \ Hibernate 和 JPA 更加对等。例如，JPA 2.0 现在提供了一个 Criteria API，用于以面向对象的方式进行查询和编译时检查。\n\n\
  在本章中，我们概述了典型持久化层的基础层次，该层次由领域模型、DAO 层和服务外观组成。我们还讨论了一些 Spring 框架利用的集成设计模式，例如模板设计模式。尽管遵循持久化层的典型基础层次通常是最佳方法，但一些较新的框架采用了略有不同的策略，例如使用\
  \ Active-Record 模式。\n\n在下一章中，我们将基于本章介绍的概念和模式，逐步构建一个使用 Spring 和 Hibernate 的 Gallery\
  \ 应用程序。通过本书，我们的目标是阐述经过时间考验且实用的最佳实践，希望您也能在自己的应用程序中使用它们。\n\n第 1 章 ■ 使用 Spring、Hibernate\
  \ 和模式架构您的应用程序\n\n在我们开始编码之前，理解一些 Spring 和 Hibernate 的核心概念非常重要。因此，在下一章中，您将了解 Spring\
  \ 的架构和能力，例如依赖注入、AOP 和持久化相关特性。\n\n**第 2 章**\n\n■ ■ ■\n\n**Spring 基础**\n\nSpring 框架起源于\
  \ Rod Johnson 的著作《Expert One-on-One J2EE Design and Development》（Wrox，2002 年）的配套代码。这本书吸引了大量开发者的追随，他们在\
  \ Wrox 论坛上讨论这本书及其对应的代码。其中两位开发者，Juergen Hoeller 和 Yann Caroff，说服 Rod 将代码转变为开源项目。这本书将该框架称为\
  \ Interface21 框架，因为 Rod 认为它代表了企业级 Java 开发的未来——一个面向二十一世纪的框架。\n\n然而，当开源项目成立时，他们觉得需要一个更能激励社区的名字。Yann\
  \ 建议使用 Spring，因为它与自然相关，并且 Spring 代表了在传统 J2EE 开发的“寒冬”之后的新开始。该项目于 2003 年公开，Spring\
  \ 框架 1.0 版本于 2004 年发布。\n\n自那时起，Spring 被广泛采用，因为它兑现了简化开发的承诺，同时解决了一些非常复杂的问题。Spring\
  \ 声名鹊起的另一个关键因素是其卓越的文档。许多开源项目因缺乏完善的文档而逐渐被遗忘。Spring 的文档从项目早期就非常成熟。\n\n尽管有些人可能会声称，但\
  \ Spring 框架目前并非标准。标准技术很棒，Sun 公司在推动基于标准的 Java 技术成为主流方面功不可没。标准允许你做一些事情，比如在 Tomcat\
  \ 上开发 Web 应用程序，然后将其部署到 WebSphere 中，几乎不需要调整（至少在理论上是这样）。但是，尽管 Spring 框架如今非常流行，它并不代表一个真正的标准。\n\
  \n有些人认为 Spring 是*事实上的标准*，这得益于依赖它的应用程序数量庞大。\n\nSpring 提供了一种以一致的方式集成应用程序各个组件的方法，并且它被广泛部署在各种应用程序生态系统中。有时，这种*标准实现*比*标准规范*更有价值。\n\
  \n尽管有些反对者对于使用任何不是由大型企业志愿者委员会设计的技术嗤之以鼻，但在你的应用程序中使用 Spring 几乎没有风险。事实上，你越是利用 Spring\
  \ 将组件集成到应用程序中，你的集成策略就越一致，从而使维护和开发更加容易。没错——依赖 Spring 通常会带来更好、更清晰、更解耦的代码。\n\n由于 Spring\
  \ 是一个如此庞大的框架，并且其文档非常出色，我们无意涵盖所有内容。相反，本章将快速概述我们在本书其余部分中构建的最重要的概念。\n\n第 2 章 ■ Spring\
  \ 基础\n\n探索 Spring 的架构\n\nSpring 由一系列模块组成。这种设计的美妙之处在于，你可以挑选并选择你想要使用的组件。没有单一的 JAR\
  \ 文件。相反，你可以显式地将你想要的组件添加到项目依赖中。\n\n\n\n常言道，一图胜千言。图 2-1 描绘了 Spring 的各个组件。\n\n三大主要分组是核心模块、Web\
  \ 模块和数据访问模块。\n\n*图 2-1. Spring 框架模块*\n\n本书将涉及其中许多模块。本章将带你了解核心容器和 AOP。\n\n### 应用上下文（Application\
  \ Context）\n\nSpring 的工作是解析你的配置文件，然后实例化你管理的类，并解决它们之间的相互依赖关系。Spring 通常被称为一个*容器*，因为它旨在创建和管理应用程序中的所有依赖关系，作为一个基础和环境，通过它也可以查找\
  \ Bean。这个核心引擎由一个名为**BeanFactory**的基础接口表示。\n\n**BeanFactory**接口定义了 Spring 的核心引擎，它聚合你的\
  \ Bean 并将协作的依赖关系连接在一起。但 Spring 容器的能力远不止依赖注入。它还可以用于发布事件、提供 AOP 功能、支持资源加载抽象、促进国际化等等。对于许多这些高级功能，你需要使用**ApplicationContext**实例。\n\
  \n**ApplicationContext**扩展了**BeanFactory**接口，提供了一组更强大的特性。\n\n如果你正在构建一个非常轻量级的应用程序，并且不需要某些更高级的功能，这种分离会派上用场。但对于大多数应用程序（尤其是服务器端软件），你会希望使用**ApplicationContext**的实现。在\
  \ Web 应用程序的情况下，你将使用**WebApplicationContext**。Spring 附带了一个监听器，你可以将其放入**web.xml**文件中，以自动引导\
  \ Spring **ApplicationContext**并加载你的配置文件。只需在**web.xml**中添加以下几行即可：\n\n**<listener>**\n\
  \n**<listener-class>**\n\n**org.springframework.web.context.request.RequestContextListener**\n\
  \n**</listener-class>**\n\n**</listener>**\n\n这些行将确保 Spring 在应用程序首次启动时被加载，并解析位于**WEB-INF/applicationcontext.xml**的配置文件。\n\
  \n如果你不是在构建 Web 应用程序，加载 Spring 容器也同样简单。在这种情况下，我们建议使用**ClassPathXmlApplicationContext**实现，它旨在从类路径加载\
  \ Spring 配置文件。其调用方式如下：**ApplicationContext context =**\n\n**new ClassPathXmlApplicationContext(new\
  \ String[]{\"configfile1.xml\", \"configfile2.xml\"});** 你可以看到实例化一个 Spring 容器是多么容易。一旦你获得了对**ApplicationContext**的引用，就可以随意使用它。返回给你的引用是已加载的**ApplicationContext**，其中你定义的所有\
  \ Bean 都已实例化，依赖关系也已解决。\n\n如果你愿意，只需调用以下代码即可按名称访问 Bean：**UsefulClass usefulClass =\
  \ (UsefulClass) context.getBean(\"myBeanName\");** 假设你的 Bean 在你的 Spring 配置文件中某处已定义（通过\
  \ ID 或 name 属性引用），Spring 将把你的类实例交给你，并准备好使用（意味着它的所有依赖关系都已被注入）。然而，我们强烈建议你尽量避免调用**getBean()**。\n\
  \nSpring 的全部意义在于自动依赖注入，这意味着不需要在你需要时才去查找 Bean。那是依赖查找，已经是 1995 年的老黄历了。虽然这种方法确实解耦并延迟了类依赖关系，但它仍然需要一个显式的查找步骤。作为经验法则，如果你需要引用某个特定的依赖项，请在配置中指定这些细节，而不是在你的代码中。\n\
  \n一些开发者只在*总是*需要类的新实例（每次调用时）的情况下才依赖**getBean()**。解决这个问题的一个更好方法是使用 XML 配置中的**lookup-method**属性。此属性强制\
  \ Spring 用始终返回指定 Bean 新实例的代码来覆盖或实现指定的方法。\n\n从**ApplicationContext**访问 Bean 的另一种策略是实现**ApplicationContextAware**接口。该接口有以下方法：**void\
  \ setApplicationContext(ApplicationContext context);**\n\n通过访问 Spring 的**ApplicationContext**，你的类可以灵活地按名称或类型查找\
  \ Bean，而无需编写代码直接从类路径获取**ApplicationContext**。\n\n在实践中，不应该有很多情况需要将 Spring 的 API 如此深入地集成到你的代码中。更常见的方法是让\
  \ Spring 通过依赖注入动态管理 Bean 之间的关系。\n\n### Bean，Bean，神奇的果实\n\nSpring 框架秘诀的一个重要部分是使用普通\
  \ Java 对象，即 POJO。\n\nMartin Fowler、Rebecca Persons 和 Josh MacKenzie 最初在 2000 年创造了\
  \ POJO 这个术语。POJO 是没有强加任何契约的对象；也就是说，它们不实现接口或扩展特定类。\n\n关于 JavaBean 和 POJO 之间的区别，常常存在很多混淆。这两个术语往往可以互换使用，但这并不总是准确的。JavaBean\
  \ 最好被描述为一种特殊的 POJO。简单来说，JavaBean 是遵循三个简单约定的 POJO：\n\n*   它是可序列化的。\n*   它有一个公共的、默认的、无参的构造函数。\n\
  *   它为每个要读取或写入的属性分别包含公共的 getter 和 setter（通过仅定义 getter 而不定义 setter，可以隐藏写入权限）。\n\n\
  Java 中的对象可能是 POJO，但不是 JavaBean。例如，它可能实现接口或扩展特定类，但由于它引用了有状态的和/或存在于 Java 虚拟机（JVM）范围之外的对象——例如\
  \ HTTP 或数据库连接——它无法合理地序列化到磁盘然后恢复。\n\nJavaBean 的概念最初是为 Swing 设计的，以促进独立 GUI 组件的开发，但这种模式已被重新用于\
  \ Spring Bean 和 Hibernate 后端持久化的领域。\n\n### Spring 生命周期\n\nSpring 不仅实例化对象并连接依赖关系，它还处理每个受管理对象的*生命周期*。\n\
  \n例如，如果在 Spring 注入的属性设置之后，你需要在类中执行一些初始化，该怎么办？一种方法是通过构造函数注入（这样你就可以捕获 Bean 所有属性被注入的时刻）。但更简洁的方法是使用**init-method**特性。通过在\
  \ Bean 上定义**init-method**属性，你可以指定一个任意方法，该方法将在所有 Spring 属性被设置之后（即所有 setter 被调用之后）被调用。以下是使用\
  \ Spring **init-method**特性的示例：\n\n**<bean id=\"initTest\" class=\"com.prospringhibernate.gallery.InitTest\"\
  \ init-method=\"init\">**\n\n**<property name=\"testString\" value=\"让我离开这台电脑！\"\
  />**\n\n**</bean>**\n\n很简单，对吧？接下来，我们需要定义一个类，其中包含我们在上述配置中指定的**init-method**：\n\n\
  **package com.prospringhibernate.gallery;**\n\n****import org.springframework.util.Assert;**\n\
  \n****class InitTest {**\n\n****private String testString;**\n\n****public void\
  \ init() {**\n\n**// 让我们做一些初始化工作！**\n\n**Assert.notNull(this.testString,**\n\n**\"\
  你忘记设置 testString 属性了！你当时在想什么？？？\");**\n\n**}**\n\n\n\n****public Foo doBizLogic()\
  \ {**\n\n**...**\n\n**}**\n\n****public void setTestString(String testString) {**\n\
  \n**this.testString = testString;**\n\n**}**\n\n****public String getTestString()\
  \ {**\n\n**return this.testString;**\n\n**}**\n\n****}**\n\n如果你使用的是 Java 5 或更高版本，还可以利用\
  \ Spring 对初始化事件的注解支持。使用这种方法，你只需在类的方法上标注 **@PostConstruct** 注解，无需在 Spring 配置中指定初始化提示。例如，我们可以将之前的示例重构如下：\n\
  \n**package com.prospringhibernate.gallery;**\n\n****import org.springframework.util.Assert;**\n\
  \n****class InitTest {**\n\n****private String testString;**\n\n****@PostConstruct()**\n\
  \n**public void init() {**\n\n**// 让我们做一些初始化工作！**\n\n**Assert.notNull(this.testString,**\n\
  \n**\"你忘记设置 testString 属性了！你在想什么？？？\");**\n\n**}**\n\n****}**\n\n第 2 章 ■ Spring\
  \ 基础\n\n与 Spring 中的一切事物一样，解决问题的方法实际上不止一种。除了在配置中指定 **init-method** 或使用 **@PostConstruct**\
  \ 注解之外，你还可以让你的类实现 **InitializingBean** 接口。在某种程度上，使用这个接口会让事情变得稍微简单一些，因为你甚至不需要修改配置。该接口只要求你实现一个\
  \ **afterPropertiesSet()** 方法，一旦 Spring 完成所有已配置属性的设置，该方法就会被自动检测并调用。这种方法的缺点是你牺牲了简单的\
  \ POJO，并将你的 Bean 与 Spring 紧密耦合。虽然与 Spring 耦合并非不可接受，但更清晰的做法是将初始化细节完全保留在配置中，而不是代码中。所以，请将此作为你的座右铭：*将其保留在配置中*。\n\
  \n与在 Bean 创建时执行操作类似，你也可以在 Bean 被销毁时触发自定义逻辑。你可以通过以下几种方式实现：\n\n• 实现 **DisposableBean**\
  \ 接口，这本质上是 **InitializingBean** 的逆操作\n\n• 在相关方法上应用 **@PreDestroy** 注解\n\n• 在 Spring\
  \ XML 配置中配置 **destroy-method** 参数，这是我们推荐的做法，以最大限度地减少紧耦合\n\n现在你已经了解了如何接入 Spring 中的创建和销毁生命周期事件，在构建企业级应用时，Bean\
  \ 管理的另一个关键方面是：Bean 作用域。\n\n理解 Bean 作用域\n\n默认情况下，Spring 中定义的 Bean 都是单例作用域。*单例* 是一个保证在\
  \ JVM 中只有一个实例的类。单例非常适合存储应用程序状态，或者在任何你希望确保应用程序中只有一个引用的场景下使用。通常，你需要编写代码来实现这种保证。\n\n\
  典型的单例满足以下条件：\n\n• 有一个静态方法用于返回该类的唯一实例（作为类内部的静态引用存储）\n\n• 有一个私有构造函数，确保只有单例本身才能创建新实例（这可以保证你不会仅仅通过调用\
  \ **new Singleton()** 而意外创建多个实例）\n\n应用程序中的单例可能如下所示：\n\n**public class Singleton\
  \ {**\n\n**private static final Singleton INSTANCE = new Singleton();**\n\n**private\
  \ Singleton() {**\n\n**}**\n\n**public static Singleton getInstance() {**\n\n**return\
  \ INSTANCE;**\n\n**}**\n\n**}**\n\n第 2 章 ■ Spring 基础\n\n尽管上面的示例展示了一种有用的设计模式，但 Spring\
  \ 消除了编写这些样板代码的需要，再次允许你将这些细节移到配置中。默认情况下，所有 Spring Bean 都是单例的。如果这不是你的意图，你需要为你的 Bean\
  \ 指定一个不同的作用域。\n\n在 Spring 1.*x* 中，Bean 要么是原型 Bean，要么是单例 Bean。*原型* 意味着每次调用 **getBean()**\
  \ 都会返回一个全新的 Bean 实例。单例 Bean 保证在整个 Spring **ApplicationContext** 中，你的类只能有一个实例。Spring\
  \ 2.*x* 引入了几个新的标准作用域，以及定义自定义作用域的能力。Spring 3.*x* 添加了一个线程作用域，尽管默认情况下未注册。表 2-1 列出了\
  \ Spring 开箱即用提供的 Bean 作用域。\n\n*表 2-1. Spring Bean 作用域*\n\n**作用域 描述**\n\nSingleton（单例）\n\
  \n将单个 Bean 定义限定为每个 Spring IoC 容器对应一个对象实例。这是默认作用域。\n\nPrototype（原型）\n\n将单个 Bean 定义限定为任意数量的对象实例。\n\
  \nRequest（请求）\n\n将单个 Bean 定义限定为单个 HTTP 请求的生命周期；也就是说，每个 HTTP 请求都拥有基于单个 Bean 定义创建的自己的\
  \ Bean 实例。此作用域仅在支持 Web 的 Spring **ApplicationContext** 上下文中有效。\n\nSession（会话）\n\n\
  将单个 Bean 定义限定为 HTTP 会话的生命周期。此作用域仅在支持 Web 的 Spring **ApplicationContext** 上下文中有效。\n\
  \nGlobal session（全局会话）\n\n将单个 Bean 定义限定为全局 HTTP 会话的生命周期。此作用域仅在支持 Web 的 Spring **ApplicationContext**\
  \ 上下文中有效，并且通常仅在 Portlet 上下文中有效。\n\nSimple thread（简单线程）\n\n如果由于某种原因，请求、会话或全局会话作用域不能满足你的需求，你可以启用简单线程作用域，将\
  \ Bean 定义绑定到 **ThreadLocal** 实例。\n\n现在你已经知道如何在 Spring **ApplicationContext** 中创建\
  \ Bean 并管理它们的作用域和生命周期。下一个关键问题是如何在你的应用程序中从 Spring 容器中检索这些 Bean。\n\n第 2 章 ■ Spring\
  \ 基础\n\n依赖注入与控制反转\n\n企业级应用程序由许多提供行为以模拟业务流程的对象组成。为了管理面向对象应用程序中对象之间的关系，出现了两种非常重要的设计模式：\n\
  \n*依赖注入 (DI)*：采用依赖注入的类通过构造函数参数、工厂方法参数或公共修改器（也称为 *setter*）来指定它们与之交互的对象。对于像 Spring\
  \ 这样的依赖注入容器或框架，将简单的类属性外部化仅仅是个开始。开发人员可以创建复杂的依赖关系树，将如何创建和设置（也称为 *注入* 或 *装配*）每个依赖关系的工作留给\
  \ Spring 轻量级容器。\n\n*控制反转 (IoC)*：当对象定位或实例化不再是给定 Bean 的责任，而是留给框架时，控制权就被*反转*了。这种控制反转是一个非常强大的概念，代表了\
  \ Spring 框架的基础。\n\n依赖注入和控制反转引导你走向一条通往体现高内聚和低耦合的清晰代码的道路。\n\n基于 Setter 的依赖注入\n\n尽管简单得令人难以置信，但\
  \ Spring 使用 POJO 作为配置和集成手段的方式非常强大。考虑一个虚构的 **User** Bean 示例，它可以在应用程序中用于指定用户凭证信息：\n\
  \n**<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<beans xmlns=http://www.springframework.org/schema/beans**\n\
  \n**xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**\n\n**xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\"\
  >**\n\n****<bean id=\"userBean\" class=\"com.prospringhibernate.gallery.User\">**\n\
  \n**<property name=\"username\" value=\"admin\" />**\n\n**<property name=\"password\"\
  \ value=\"password\" />**\n\n**</bean>**\n\n****</beans>**\n\n\n\n从上述示例中，你可以学到几点。首先，我们使用了极其不安全的密码。但这确实演示了如何通过\
  \ XML 配置一个简单的 Spring Bean。\n\n要在 Java 端实现这一点，我们需要一个有效的 JavaBean 类，如下所示：\n\n**package\
  \ com.prospringhibernate.gallery;**\n\n****public class User implements Serializable\
  \ {**\n\n****private String username;**\n\n**private String password;**\n\n****public\
  \ User() {**\n\n**}**\n\n****public String getUsername() {**\n\n**return this.username;**\n\
  \n**}**\n\n****public void setUsername(String name) {**\n\n**this.username = name;**\n\
  \n**}**\n\n****public String getPassword() {**\n\n**return this.password;**\n\n\
  **}**\n\n****public void setPassword(password) {**\n\n**this.password = password;**\n\
  \n**}**\n\n****}**\n\n请注意，对于 Spring XML 配置中的每个属性实体，我们在 Java 类中都定义了相应的 getter 和 setter\
  \ 方法。在 Spring 术语中，这被称为*设值注入*，因为属性值是通过调用 JavaBean 的 setter 方法来配置的。\n\n基于构造函数的依赖注入\n\
  \n另一种方法是使用*构造函数注入*，它允许通过类的构造函数注入属性值。要使用构造函数注入，我们需要按如下方式重构代码和 Spring 配置：\n\n**<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<beans xmlns=http://www.springframework.org/schema/beans**\n\
  \n**xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**\n\n**xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\"\
  >**\n\n****<bean id=\"userBean\" class=\"com.prospringhibernate.gallery.User\">**\n\
  \n**<constructor-arg index=\"0\" value=\"admin\" />**\n\n**<constructor-arg index=\"\
  1\" value=\"password\" />**\n\n**</bean>**\n\n****</beans>**\n\n以下是更新后的 **User**\
  \ Bean 对应的代码：\n\n**package com.prospringhibernate.gallery;**\n\n****public class\
  \ User implements Serializable {**\n\n****private String username;**\n\n**private\
  \ String password;**\n\n****public User(String username, String password) {**\n\n\
  **this.username = username;**\n\n**this.password = password;**\n\n**}**\n\n****public\
  \ String getUsername() {**\n\n**return this.username;**\n\n**}**\n\n****public String\
  \ getPassword() {**\n\n**return this.password;**\n\n**}**\n\n****}**\n\n尽管两种方法都有效，但我们推荐基于设值的方法，因为它更符合\
  \ JavaBean 的约定，并且使你的代码在后续测试中更容易。\n\n实例协作\n\n在前面的示例中，我们注入了两个字符串值，这些值直接在配置文件中指定。这是一个有用的快捷方式，可以将基本的配置细节从代码中抽象出来，放到一个更易于修改的文件中。然而，同样的概念可以更进一步，用于满足应用程序中协作实例之间的依赖关系。\n\
  \n例如，假设身份验证是在一个单独的类中实现的。在我们的 Spring 配置文件中，可能会有如下内容：\n\n**<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>**\n\n**<beans xmlns=http://www.springframework.org/schema/beans**\n\n\
  **xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**\n\n**xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\"\
  >**\n\n****<bean id=\"userBean\" class=\"com.prospringhibernate.gallery.User\">**\n\
  \n**<property name=\"authHandler\" ref=\"authService\" />**\n\n**</bean>**\n\n****<bean\
  \ id=\"authService\" class=\"com.prospringhibernate.gallery.AuthService\"/>**\n\n\
  ****</beans>**\n\n以下是更新后的 **User** Bean 对应的代码：\n\n**package com.prospringhibernate.gallery;**\n\
  \n****public class User implements Serializable {**\n\n****private AuthenticationService\
  \ authHandler;**\n\n****public User() {**\n\n**}**\n\n****public AuthenticationService\
  \ getAuthHandler() {**\n\n**return this.authHandler;**\n\n**}**\n\n****public void\
  \ setAuthHandler(AuthenticationService authHandler) {**\n\n**this.authHandler =\
  \ authHandler;**\n\n**}**\n\n****}**\n\n很简单，不是吗？我们仅用几行配置就连接起了应用程序的关键部分。很容易想象，我们可以为另一个身份验证服务定义代码，然后只需修改\
  \ Spring 配置中的 Bean 引用，就能操纵应用程序的行为。\n\n面向接口编程\n\n之前，我们提到 Spring 倾向于引导开发者编写更好、更清晰、耦合度更低的代码。你可能开始明白为什么会这样了。你的类不仅摆脱了应用程序装配代码，而且你会发现基于\
  \ Spring 的应用程序通常更加面向接口，这意味着你的代码依赖于接口而非具体的实现。这种策略通常被称为*面向接口编程*，它允许你轻松地将一个实现替换为另一个，只需修改\
  \ Spring Bean 中的 class 属性即可。只要你的代码是依赖于接口编写的，并且接口没有变化，就无需修改你的类文件。\n\n例如，请注意在前面的示例中，**User**\
  \ Bean 依赖于一个 **AuthenticationService** Bean。在你的代码中，一个好的实践是定义一个 **AuthenticationService**\
  \ 接口，该接口指定与用户访问和安全相关的核心方法。然后，你的代码将引用 **AuthenticationService** 接口，而你的 Spring 配置会将具体的实现类映射到你的\
  \ **User** 对象。\n\n作为一个过度简化的例子，我们的 **AuthenticationService** 接口可能如下所示：\n\n**package\
  \ com.prospringhibernate.gallery;**\n\n****public interface AuthenticationService\
  \ {**\n\n**public User authenticateUser(String username, String password)** **throws\
  \ AuthenticationException;**\n\n**}**\n\n而我们的具体实现可能是这样的：\n\n**package com.prospringhibernate.gallery;**\n\
  \n****public class AuthenticationServiceImpl implements AuthenticationService {**\n\
  \n****public User authenticateUser(String username, String password)** **throws\
  \ AuthenticationException {**\n\n**// 身份验证逻辑写在这里**\n\n**}**\n\n****}**\n\n最后，在我们的\
  \ Spring 配置中将所有内容整合在一起，**userBean** 通过使用 **ref** 属性指向 **AuthenticationService**\
  \ 接口的特定实现。\n\n**<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<beans xmlns=http://www.springframework.org/schema/beans**\n\
  \n**xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**\n\n**xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\"\
  >**\n\n****<bean id=\"userBean\" class=\"com.prospringhibernate.gallery.User\">**\n\
  \n**<property name=\"authHandler\" ref=\"authService\" />**\n\n**</bean>**\n\n****<bean\
  \ id=\"authService\" class=\"com.prospringhibernate.gallery.AuthServiceImpl\"/>**\n\
  \n****</beans>**\n\n这里的关键点是，**User** 类并不直接依赖于 **AuthenticationServiceImpl** 实现，而是依赖于\
  \ **AuthenticationService** 接口。虽然这种差异可能看起来细微，但将依赖关系表达为接口是确保应用程序松散耦合的有效方法。如果你的代码没有与特定实现直接耦合，你将获得在\
  \ Spring 配置中（且仅在该配置中）定义这些细节的灵活性。通过这种方式，你可以轻松地替换实现，而无需重构代码。\n\n\n\n无论您需要将何种类型的库、类或框架集成到应用程序中，Spring\
  \ 都能让您以浅显的学习曲线，干净利落地处理这些内部和外部组件。这种无需直接耦合的集成方式，正是 IoC 最大的优势。本质上，对第三方库（甚至内部框架和类）的钩子被移出了源代码，放入了配置文件（或类中基于注解的元数据）中。这种配置方式让开发者无需过多担心代码各组件如何组合在一起，从而能更专注于核心功能本身的编码。\n\
  \n通过自动装配实现依赖注入\n\n另一种注入方式是 Spring 所谓的*自动装配*。这种方法允许您简单地定义特定类型或名称的 getter 和 setter\
  \ 方法，将判断注入哪个类的责任交给 Spring 容器。这个非常强大的功能也伴随着一些风险：如果对于注入哪个实例存在歧义，您可能会遇到问题。例如，如果您有一个依赖于\
  \ **AuthenticationService** 接口的类，并且在您的应用程序中定义了一个 **BasicAuthenticationServiceImpl**\
  \ 和一个 **RemoteAuthenticationServiceImpl**（两者都实现了 **AuthenticationService** 接口），Spring\
  \ 可能会混淆您打算注入哪个实现。\n\n基于注解的依赖注入\n\n到目前为止，我们已经展示了如何在 XML 配置文件中指定对象之间的依赖关系。随着时间的推移，企业应用程序的\
  \ XML 配置变得庞大且难以管理。从 Spring 2.5 和 JDK 1.5 开始，引入了另一种配置策略。利用基于注解的元数据，您现在可以直接在类内部指定依赖注入。这种方法的优点在于，类的依赖关系可以直接在代码中表达。缺点则是，您无法受益于拥有一个集中式的配置文件集合来展示和记录应用程序组件是如何装配的。\n\
  \n选择哪种路径取决于您。当然，使用注解确实简化了配置过程。此外，您可以混合使用 XML 配置和注解，允许某些依赖在 Spring XML 中配置，而其他依赖则通过注解来检测。\n\
  \n以下是我们的 **User** 对象，已修改为使用基于注解的方法。\n\n**package com.prospringhibernate.gallery;**\n\
  \n****import org.springframework.beans.factory.annotation.Autowired;**\n\n****public\
  \ class User implements Serializable {**\n\n****@Autowired**\n\n**private AuthenticationService\
  \ authHandler;**\n\n****public User() {**\n\n**}**\n\n****public AuthenticationService\
  \ getAuthHandler() {**\n\n**return this.authHandler;**\n\n**}**\n\n****public void\
  \ setAuthHandler(AuthenticationService authHandler) {**\n\n**this.authHandler =\
  \ authHandler;**\n\n**}**\n\n****}**\n\n请注意 **authHandler** 成员变量上方的 **@Autowired**\
  \ 注解。这告诉 Spring 注入（使用我们之前讨论过的自动装配策略）一个 **AuthenticationService** 接口的实现。\n\n在可能存在歧义的情况下，Spring\
  \ 提供了一种通过使用限定符向容器提供线索的方法。*限定符*可以作为单独的注解插入到 **@Autowired** 字段上，或者在 XML 配置中提供，以便向\
  \ Spring 容器提供特定提示，从而帮助消除特定类型或接口存在多个实例时的歧义。例如，我们可以通过添加以下注解来指明需要哪个 **AuthenticationService**：\n\
  \n**@Autowired**\n\n**@Qualifier(\"basicAuthHandler\")**\n\n**public void setAuthHandler(AuthenticationService\
  \ authHandler) {**\n\n**this.authHandler = authHandler;**\n\n**}**\n\n现在我们已经消除了上述\
  \ **setAuthHandler** 方法应注入哪个 **AuthenticationService** 实现的歧义，我们需要“标记”这个依赖，以便 Spring\
  \ 能够选择正确的实例。在 Spring XML 中，我们可以通过包含限定符元素来提供此提示：\n\n**<bean id=\"authHandler\" class=\"\
  com.prospringhibernate.gallery.BasicAuthServiceImpl\"/>**\n\n**<qualifier value=\"\
  basicAuthHandler\"/>**\n\n**</bean>**\n\n也可以通过将 **@Qualifier** 注解应用于为 Spring 组件扫描功能注解的类，来为依赖提供消除歧义的提示。我们将在本书后面演示这些特性。**@Autowired**\
  \ 注解不仅可以应用于成员变量，还可以应用于方法和构造函数。此外，**@Qualifier** 注解可以直接应用于方法参数，以将限定目标指向特定参数，或者对方法或构造函数中的不同参数应用不同的限定提示。\n\
  \n设置好，然后忘掉它！\n\n所有这些外部化处理起初看起来似乎没什么大不了的，但它确实意义重大，当您开始开发时就会注意到。您可以简单地专注于实现，而无需担心一个类如何获取对另一个类的引用。您学会只需为每个类所需的依赖定义\
  \ setter 和 getter 方法，然后将装配工作留给 Spring。想象一下其他一些替代方案。\n\n许多应用程序依赖单例来集中管理并分发所需依赖的引用。\n\
  \n这种策略当然可行，但不可避免地，您的代码会更多地关注如何将类装配在一起，而不是应用程序的核心功能。\n\nSpring 和 IoC 让您能够专注于应用程序设计和业务逻辑，而忘记装配工作。Ron\
  \ “Ronco” Popeil 在一些电视购物广告中使用了“设置好，然后忘掉它！”这句口号。您可能会发现，每次开始使用 Spring 进行开发时，这句口号都会在脑海中浮现。\n\
  \n精巧的配置和生命周期管理实际上只是整个 Spring 包的一小部分。Spring 还提供了与 Java 生态系统中大多数主流框架（包括许多持久化框架）的强大集成点。这极大地简化了将这些框架集成到应用程序中的过程，并使维护和开发整体上更加容易。除了这些集成点之外，Spring\
  \ 还提供了一套强大的 AOP 和代理功能，这对于配置声明式事务、日志记录和远程调用至关重要。这些能力使 Spring 成为 EJB 和 Java EE 应用服务器提供的企业级功能的可行替代方案。\n\
  \n使用 AOP 和拦截器注入代码\n\nAOP 对开发者来说通常是一个难以接受的概念。事实上，它可能是一个有点令人困惑的话题，因为它是一个相当新的开发范式。对于熟悉面向对象方法论的人来说，AOP\
  \ 可能看起来有点非常规。\n\nAOP 是一种允许将行为注入到应用程序中各个位置代码中的策略。与 Spring 提供将值和实例引用注入 bean 的方式非常相似，AOP\
  \ 允许开发者将一个类中的代码编织到另一个类中。您究竟为什么要这样做呢？嗯，有时，您希望将功能应用于一大类类，但通过继承基类来实现这个目标并不合理，因为您希望注入的功能可能与目标类正交。这个概念通常被称为*横切关注点*，因为\
  \ AOP 的意图是将功能应用于一系列类，而这些功能与这些类的主要目的关系不大。\n\n\n\n例如，假设你有几个类，它们被设计用来向关系型数据库存储和检索数据。作为此实现的一部分，你可能希望执行一些审计（例如，跟踪每次连续写入操作的详细信息）。从一个基础审计类进行扩展并不是完成此任务的可行或恰当方式。如果你确实要扩展某个类，你可能更希望继承与操作领域模型和保存数据相关的行为（你并不想继承审计行为）。在这个例子中，我们可以说审计功能与核心持久化功能是*正交*的（即完全独立于它）。此外，代码的审计方面可以以相当相似和标准的方式应用于所有应用程序代码。\n\
  \n这正是 AOP 的完美应用场景。你可以将不相关的审计功能方面应用于所有旨在处理图片库逻辑的类。\n\nAOP 在实际中的工作方式相当简单：一个类的方法可以被修改，以便在方法调用之前、之后或环绕（本质上是在调用*之前*和*之后*）注入新的功能。\n\
  \n因此，对于审计方面，你可以注入一段代码，每当某一类方法中的方法被调用时，这段代码就会在数据库中写入一行（构成整个审计跟踪的一部分）。\n\n一个类似的场景涉及安全性。可以将安全检查插入到你的核心数据访问代码中，以确保在每次调用某些方法时验证适当的权限或角色。这种方法的有趣之处在于，你可以将安全代码与核心实现完全分离（核心实现不再需要担心安全性的实现细节）。这带来了更清晰的代码，因为你的核心应用程序不必被安全实现的细节所拖累。\n\
  \n此外，让不同的团队管理不同的功能通常也很有用。AOP 使这成为可能，因为安全相关的代码可以由该领域的专家编写，而应用程序的业务逻辑则由另一个团队开发和维护。通过确保这两个方面（从代码角度来看）不相互混杂，专业化变得更加可行。这两个不同的功能部分可以完全独立地开发和维护，从而产生更清晰、耦合更松散的代码。\n\
  \n这种拦截方法调用并引入或*注入*新功能的能力，是 Spring 支持声明式事务背后的秘诀。使用 Spring 的声明式事务支持，你可以用事务语义来通知你的持久化外观层。我们将在第\
  \ 7 章详细讨论事务，但为了说明 AOP 提供的关注点分离，我们将用以下代码片段作为预告来结束本节：\n\n第 2 章 ■ SPRING 基础\n\n**public\
  \ class ServiceFacadeImpl implements ServiceFacade {**\n\n****@Transactional(readOnly\
  \ = false, propagation = Propagation.REQUIRES_NEW)** **public void save(Map map)\
  \ {**\n\n**// 业务逻辑写在这里**\n\n**}**\n\n****}**\n\n通过简单地将此方法注解为 **@Transactional**，Spring\
  \ 可以强制执行指定的事务语义，而无需你在 `save` 方法体中编写任何启动和完成事务的代码。现在不必担心与该注解相关的细节。只需知道，通过 AOP 将这种逻辑外部化，使得修改事务实现成为可能，而无需重构代码库中所有依赖它的部分。同样，你可以确信对核心业务逻辑的更改不会破坏事务语义。\n\
  \n总结\n\n在本章中，你了解了驱动 Spring 框架的基本概念。你看到了如何引导一个 Spring **ApplicationContext**，学习了在\
  \ Spring XML 配置文件中配置 Bean 依赖关系的基础知识，并理解了 Bean 的作用域和生命周期。依赖注入的好处现在已经很清楚了。你可以有效地委托\
  \ Spring 容器来管理和解析你的应用程序依赖关系，这样做有助于保持应用程序依赖关系的松散耦合。最后，你初步了解了使用 AOP 管理正交编码问题的强大功能。\n\
  \n在本书的其余部分，我们将基于本章介绍的 Spring 概念来定义和实现一个艺术画廊应用程序。\n\n**第 3 章**\n\n■ ■ ■\n\n**基本应用程序设置**\n\
  \n在本章中，我们将带你速成学习如何使用 Spring 和 Hibernate 设置一个基本项目。我们将用于管理应用程序的工具是 Apache Maven 3。如果你已经精通\
  \ Spring、Hibernate 和 Maven，你可能只想浏览本章，以便了解我们在整本书中构建艺术画廊应用程序时将使用的结构和约定。我们将很快地涵盖很多内容，并提供相关章节的参考，以便你在其中深入了解各种配置。\n\
  \n使用 Maven 进行应用程序管理\n\nMaven 由 Sonatype 的 Jason van Zyl 于 2002 年编写，并于 2004 年作为 Apache\
  \ 软件基金会的顶级项目达到 1.0 版本。Maven 致力于通过确保一个简单、可重复的过程来配置、管理和与基于 Java 的软件项目交互，从而简化日常开发。\n\
  \nMaven 围绕项目对象模型（POM）的概念展开，该模型代表了你项目或模块的配置。用 Maven 的术语来说，模块只是给定“父”Maven 项目的一个子项目。这种组织结构允许你创建一个被划分为更小模块集合的项目。你的\
  \ POM 描述了你项目的许多方面，包括所需的依赖项、插件配置以及编译和组装应用程序的顺序和操作。\n\nMaven 提供了大量开箱即用的功能。此外，其庞大的用户社区已经开发了大量的插件。当需要进一步自定义项目的构建过程时，自己编写\
  \ Maven 插件是轻而易举的事。\n\n托管依赖项\n\nMaven 的杀手锏是其依赖管理。当你构建或编译应用程序时，Maven 会从 Maven 仓库下载你项目的所有依赖项。在团队中工作时，这是一个巨大的优势。想要升级你的项目使用的\
  \ Spring 版本吗？只需更新项目依赖项，提交到源代码控制，团队中的每个人都会自动将其项目升级到最新版本的 Spring！Maven 甚至处理传递性依赖，这意味着\
  \ Maven 可以自动获取你的项目所依赖的库的依赖项，而无需你显式地全部包含它们。\n\n还记得我们告诉过你，有大量成熟的 Maven 插件可用吗？一个你可以使用的便捷插件的例子是优秀的\
  \ m2eclipse 插件，用于将 Maven 与 Eclipse 集成。图 3-1，由 m2eclipse 提供，向你展示了关于为什么使用像 Maven 这样的工具对于管理企业级\
  \ Java 应用程序至关重要的所有信息。\n\n![Image 5](img/index-50_1.png)\n\n![Image 6](img/index-50_2.png)\n\
  \n![Image 7](img/index-50_3.jpg)\n\n第 3 章 ■ 基本应用程序设置\n\n这张图片实际上难以辨认，你甚至看不到所有的依赖项，它们延伸到屏幕的左右两侧，因为构成我们应用程序的组件太多了。\n\
  \n\n\n*图 3-1\\. Maven 和 m2eclipse 显示的一组依赖关系* 依赖的数量乍看之下可能有些令人望而生畏，但当你使用 Spring 和\
  \ Hibernate 时，你会获得大量细粒度的选择，来决定包含哪些 JAR 包、何时包含、排除哪些等等。这导致了众多较小的库依赖。通过项目的依赖配置，Maven\
  \ 能够感知你的项目需要哪些 JAR 文件，以及哪些 JAR 之间存在相互依赖关系。它知道哪些库仅在执行单元测试时需要，以及哪些库应该被打包到最终的 WAR 文件中，以便部署到像\
  \ Apache Tomcat 这样的应用容器上。\n\n如此强大的功能也伴随着相当的复杂性，正因如此，Maven 也有不少批评者。但事实是，在撰写本文时，Maven\
  \ 仍然是大小型公司用于管理 Java 应用程序的最主流工具。一旦你熟悉了某些术语，Maven 的配置和使用就变得相当简单。从 **http://maven.apache.org**\
  \ 下载它开始，让我们看看如何将其投入使用。\n\n第 3 章 ■ 基本应用设置\n\n标准目录结构\n\n首先，我们需要为标准 Maven 3 Web 应用程序创建所需的文件夹结构。虽然你可以定义自定义目录结构并修改\
  \ Maven 设置，或者将 Maven 嫁接到一个已有目录结构的遗留项目上，但最好的选择是坚持使用 Maven 期望的基本文件夹结构。这将确保与所有可用插件和工具的正确互操作性。\n\
  \n由于我们正在构建一个基本的艺术画廊应用程序，首先创建一个名为 **gallery** 的文件夹：**mkdir gallery**\n\n在 **gallery**\
  \ 文件夹内，我们将创建 Java 应用程序惯用的文件夹：**mkdir gallery/src**\n\n**mkdir gallery/src/main**\n\
  \n**mkdir gallery/src/main/java**\n\n**mkdir gallery/src/main/resources**\n\n**mkdir\
  \ gallery/src/main/resources/META-INF**\n\n对于 Web 应用程序，我们需要一个 **webapp** 和 **WEB-INF**\
  \ 文件夹：**mkdir gallery/src/main/webapp**\n\n**mkdir gallery/src/main/webapp/WEB-INF**\n\
  \n我们还需要创建用于单元测试应用程序所需的文件夹：**mkdir gallery/src/test**\n\n**mkdir gallery/src/test/java**\n\
  \n**mkdir gallery/src/test/resources**\n\n最后，我们将创建通常放置 Spring 配置文件的文件夹：**mkdir gallery/src/main/webapp/WEB-INF/spring**\n\
  \n**mkdir gallery/src/main/resources/META-INF/spring**\n\n■ **注意** 你也可以通过使用 Maven\
  \ 的原型（archetype）功能，让 Maven 自动生成项目结构。Maven 原型就像项目模板，可用于简化 Maven 项目的创建过程，包括设置目录结构和基线\
  \ **pom.xml** 文件。\n\nPOM 解析\n\nMaven 的主要配置文件是 **pom.xml**。通过这个配置文件，你可以指定项目的重要元数据和构建细节。**pom.xml**\
  \ 文件位于给定 Maven 项目的根目录，因此我们将在 **gallery** 文件夹中创建它。为简洁起见，此列表已做删减。我们建议你查看本书附带的源代码中的完整列表。\n\
  \n第 3 章 ■ 基本应用设置\n\n**<project**\n\n****xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0**\n\
  \n**http://maven.apache.org/mavenv4_0_0.xsd\">**\n\n****<modelVersion>4.0.0</modelVersion>**\n\
  \n****<groupId>com.prospinghibernate</groupId>**\n\n**<artifactId>gallery</artifactId>**\n\
  \n**<version>1.0.0-SNAPSHOT</version>**\n\n****<packaging>war</packaging>**\n\n\
  ****<properties>**\n\n**<spring.version>3.0.2.RELEASE</spring.version>**\n\n**<hibernate.version>3.5.0-Final</hibernate.version>**\n\
  \n**</properties>**\n\n****<dependencies>**\n\n**<dependency>**\n\n**<groupId>org.springframework</groupId>**\n\
  \n**<artifactId>spring-core</artifactId>**\n\n**<version>${spring.version}</version>**\n\
  \n**</dependency>**\n\n****<dependency>**\n\n\n\n**<groupId>org.hibernate</groupId>**\n\
  \n**<artifactId>hibernate-core</artifactId>**\n\n**<version>${hibernate.version}</version>**\n\
  \n**</dependency>**\n\n****<!-- 为简洁起见，省略了大多数依赖项... -->**\n\n****</dependencies>**\n\
  \n****<build>**\n\n**<plugins>**\n\n**<plugin>**\n\n**<groupId>org.codehaus.mojo</groupId>**\n\
  \n**<artifactId>tomcat-maven-plugin</artifactId>**\n\n**<version>1.0</version>**\n\
  \n**</plugin>**\n\n**</plugins>**\n\n****<!-- 为简洁起见，省略了其他插件... -->**\n\n****</build>**\n\
  \n****</project>**\n\n第 3 章 ■ 基本应用程序设置\n\n这个 POM 配置文件中包含了很多内容。首先，你会注意到为 Maven 及其\
  \ POM 模式定义所声明的 XML 命名空间。\n\n**modelVersion** 用于声明项目 POM 的版本。这可以保护你在升级所使用的 Maven\
  \ 版本时免受兼容性问题的影响。\n\n接下来是一系列通常被称为*项目坐标*的字段，因为它们能唯一标识项目。按照惯例，**groupId** 使用创建该项目的组织的反向域名。**artifactId**\
  \ 是给定 **groupId** 内的唯一名称，而 **version** 是项目的特定发布版本。任何两个项目都不能拥有相同的 **groupId:artifactId:version**\
  \ 组合。\n\n**packaging** 元素是项目坐标中的一个特殊属性。它不作为唯一标识符的一部分，但描述了给定项目的输出类型。默认值是 **jar**，用于生成\
  \ Java 归档文件（JAR 文件）。由于我们正在构建一个 Web 应用程序，因此我们指定 **war** 来输出一个 Web 归档文件（WAR 文件）。\n\
  \n**properties** 部分提供了一个便捷的位置，用于定义在配置其余部分中使用的变量。在我们的项目中，有十个 Spring JAR 文件被列为依赖项。逐个管理它们非常繁琐。使用\
  \ **properties** 属性可以简化管理 Spring 版本升级的工作。\n\n最后，**build** 属性为你提供了一个位置，用于定义项目所需的插件以及其他内容。对于我们的项目，Tomcat\
  \ Maven 插件提供了一种极好的机制，可以轻松地在 Apache Tomcat 应用服务器上构建和运行我们的 Web 应用程序。\n\n至此，我们已经搭建了一个非常基本的应用程序框架。你可以在命令提示符下，从你的根目录\
  \ **gallery** 文件夹执行 **mvn initialize**。如果一切操作正确，Maven 将获取你的依赖项并显示消息 **BUILD SUCCESS**。\n\
  \n当然，我们的应用程序目前还*没有*执行任何操作。让我们开始配置 Spring，以便改变这种情况。\n\nSpring 配置\n\n在构建规模较大的 Spring\
  \ 应用程序时，你最终会在 Spring 的 **ApplicationContext** 中配置大量的 Spring Bean。正如你在第 2 章中所看到的，你在\
  \ Spring 容器中配置使用的每个对象都会注册到 **ApplicationContext** 中，它是 Spring 的 **BeanFactory**\
  \ 的一个子接口。\n\n**ApplicationContext** 为你提供了与已配置的 Bean 进行交互所需的工具。\n\n我们建议创建一个根配置文件，然后导入所有其他配置文件，这样\
  \ XML 文件就不会变得过于庞大和难以理解。\n\n以下是一个极其基本的 Spring 配置文件（**gallery/src/main/resources/META-INF/spring/spring-master.xml**）。\n\
  \n**<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>**\n\n**<beans**\n\
  \n******xsi:schemaLocation=\"http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**\
  \ **http://www.springframework.org/schema/context**\n\n**http://www.springframework.org/schema/context/spring-context-3.0.xsd\"\
  >**\n\n****<context:property-placeholder location=\"classpath*:META-INF/spring/*.properties\"\
  />**\n\n**37\n\n第 3 章 ■ 基本应用程序设置\n\n**<context:component-scan base-package=\"com.prospringhibernate\"\
  >**\n\n**<context:exclude-filter type=\"annotation\"**\n\n**expression=\"org.springframework.stereotype.Controller\"\
  />**\n\n**</context:component-scan>**\n\n****<import resource=\"spring-datasource.xml\"\
  />**\n\n****</beans>**\n\n让我们更详细地分解这个 **spring-master.xml** 文件的内容。\n\n命名空间支持\n\n\
  Spring 从框架 2.0 版本开始引入了广泛的命名空间支持。在 IoC 容器中，一切皆 Bean，但随着时间的推移，你的配置可能会变得极其冗长。引入命名空间旨在简化处理事务等集成点时的\
  \ XML 配置。如果需要，你甚至可以定义自己的命名空间。\n\n我们的 **spring-master.xml** 配置文件中使用了两个命名空间，由 **xmlns**\
  \ 声明标记：\n\n• **beans** 命名空间是定义应用程序所有基本 Bean 定义所必需的（例如 DAO、服务层 Bean 等）。\n\n• **context**\
  \ 命名空间作为便利工具提供，用于配置 Spring 的一些核心基础设施。\n\n外部化属性配置\n\n此配置定义了一个 **PropertyPlaceholderConfigurer**，它允许你将某些设置外部化到\
  \ Spring 配置文件之外的属性文件中。\n\n**<context:property-placeholder**\n\n**location=\"classpath*:META-INF/spring/*.properties\"\
  />** **property-placeholder** 将自动定位并解析你在类路径下 **META-INF/spring** 目录中的任何属性文件。任何你想要替换的属性都应在\
  \ Spring 配置中这样指示：**${propertyKey}**。在本章后面配置图库应用程序的数据源时，你将看到一个完整的示例。\n\n组件扫描\n\n\
  下一个重要的配置部分是组件扫描，它是在 Spring 2.5 中引入的，作为一种进一步简化 Spring 应用程序配置方式的机制。\n\n**<context:component-scan\
  \ base-package=\"com.prospringhibernate\">** 此声明将导致 Spring 定位应用程序中的每一个 **@Component**、**@Repository**\
  \ 和 **@Service**。实际上，这允许你编写一个 POJO，然后简单地将其注解为 **@Service**。Spring 将在启动时自动检测、实例化并依赖注入你的服务。\n\
  \n此外，组件扫描还会启用其他值得注意的 Spring 注解，如 **@Inject**、**@Named** 和 **@PostConstruct** 支持。这些注解允许你在类中使用常见的\
  \ Spring 和 Java EE 注解，而无需进行任何特殊配置。最常用的注解是 **@Inject**，它指示 Spring 将一个对象依赖注入到你的类中。然后，你还可以让这个新服务被注入到任何其他需要它的类中，只需在依赖类中为该服务声明一个字段即可。\n\
  \n■ **注意** **@Inject** 和 **@Named** 只是 JSR-330 定义的一部分注解。JSR-330 定义了一套用于 Java EE\
  \ 应用程序的标准注解。**@Inject** 和 **@Named** 完全替代了你可能已经熟悉的 Spring 中的 **@Autowired** 和 **@Qualifier**\
  \ 注解。这使得你的应用程序更具可移植性，以防你决定将依赖注入实现更改为类似 Google Guice 的方案。\n\n组件扫描器使用的匹配规则也可以通过包含或排除组件的过滤器进行自定义。你可以根据类型、注解、AspectJ\
  \ 表达式或名称模式的正则表达式来控制此匹配。甚至可以禁用默认的原型注解。在我们的配置中，我们声明了以下排除规则：\n\n**<context:exclude-filter\
  \ type=\"annotation\"**\n\n\n\n**expression=\"org.springframework.stereotype.Controller\"\
  \ />** 声明此 **exclude-filter** 是为了避免实例化我们的 **@Controller** 类，因为这些类应由 Web 层应用上下文实例化。是的，你没看错：我们的应用实际上会拥有多个不同的应用上下文。在本章稍后介绍通过\
  \ **web.xml** 配置 Web 应用时，我们会对此进行更详细的讨论。\n\n导入语句\n\n在 **property-placeholder** 配置器之后，你会注意到我们指定了一条\
  \ **import** 语句：\n\n**<import resource=\"spring-datasource.xml\"/>**\n\n导入功能允许你指定一个外部的\
  \ Spring 配置文件，并将其集成到你的应用上下文中。这是一个非常有用的结构，尤其是在我们的演示应用中，因为它使我们能够轻松地将不同的持久化策略外部化，并将每个版本保存在各自的文件中。这些导入语句还可以通过以下语法引用你的应用类路径：\n\
  \n**<import resource=\"classpath*:spring-config-name.xml\"/>** 在处理大型应用上下文时，导入功能非常宝贵，因为它为组织\
  \ Bean 定义提供了极大的灵活性。你可以将应用划分为任意数量的部分，使其更易于新开发者上手，并有助于理解项目随时间的变化。\n\n数据库集成\n\n现在你已经对\
  \ Spring 如何在应用中被引导有了更清晰的认识，让我们回到集成所选数据库的话题上。你已经了解到，Spring 对基于接口概念的坚持有助于将实现选择从代码中剥离出来，放入配置中。因此，无论你是选择使用\
  \ Java 命名和目录接口（JNDI）工厂 Bean 从外部 JNDI 目录中拉取数据库引用，还是直接配置特定的数据库驱动，你的代码都不会受到丝毫影响。最终，你总是会得到一个\
  \ JDBC **DataSource**，而这正是你的代码需要关心的全部内容。\n\nJDBC 支持\n\n在我们的示例中，我们将保持简单。让我们首先定义一个\
  \ Spring Bean，它将创建一个 JDBC **DataSource** 实例：\n\n**<bean id=\"galleryDataSource\"\
  **\n\n**class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\">**\
  \ **p:driverClassName=\"${jdbc.driverClassName}\"**\n\n**p:url=\"${jdbc.url}\"**\n\
  \n**p:username=\"${jdbc.username}\"**\n\n**p:password=\"${jdbc.password}\"/>**\n\
  \n**</bean>**\n\n如果我们想更高级一点，可以选择一个流行的数据库连接池作为我们的 Bean 实现。对于需要多个并发数据库操作的 Web 应用来说，连接池是理想的选择。连接池可以针对不同的使用场景进行优化，确保以更高效的方式将新的数据库连接交给应用。同样，切换到数据库连接池将使你的应用更高效，而无需更改任何代码。\n\
  \n■ **注意** 连接池曾经是开发人员必须自己编写的东西。实际上，使用连接池是一个有趣的衡量标准，可以用来判断工程师使用 Java 编写 Web 应用的时间有多长。如果他们编写过自己的连接池，那么他们可能已经从事这项工作很长时间了。由于需要自己编写连接池，每个开源项目最终都产生了独特的连接池实现。幸运的是，所有属于\
  \ Apache 软件基金会的项目共同创建了 **commons-dbcp** 库（**dbcp** 是数据库连接池的缩写）。\n\n请注意，在下面的配置中，我们切换到使用连接池是多么容易。这得益于面向接口编程、配置外部化和依赖注入。能够如此快速、轻松地进行如此大的更改，真是一种非常有益的体验。\n\
  \n**<bean id=\"galleryDataSource\"**\n\n**class=\"org.apache.commons.dbcp.BasicDataSource\"\
  >** **p:driverClassName=\"${jdbc.driverClassName}\"**\n\n**p:url=\"${jdbc.url}\"\
  **\n\n**p:username=\"${jdbc.username}\"**\n\n**p:password=\"${jdbc.password}\"/>**\n\
  \n**</bean>**\n\n你可能已经注意到，我们的 **DataSource** Bean 的 **id** 是 **galleryDataSource**。在大多数企业应用中，你最终会拥有多个数据源。因此，最好的方法是给每个数据源一个唯一的名称，以便更精细地控制应用的哪些部分使用哪个数据源。\n\
  \n还要注意，我们为 **datasource** Bean 指定了 **driverClassName**、**url**、**username** 和 **password**\
  \ 属性。这些属性决定了应用如何连接到给定的数据库。\n\n在 Spring 配置中，我们可以通过 **${}** 表示法使用占位符引用。这些占位符代表存储在\
  \ **jdbc.properties** 文件中的外部值，这些值通过我们的 **PropertyPlaceholderConfigurer** 注入到我们的配置文件中。这个细节并非必需，但它使我们的配置更具可移植性。它允许我们轻松地为不同的机器和平台定义不同的数据库配置，而无需更改我们的\
  \ Spring 配置。例如，以下是我们的 **src/main/resources/META-INF/spring/jdbc.properties** 文件的一个片段：**jdbc.url=jdbc\\\
  :h2\\:mem\\:prosh;DB_CLOSE_DELAY\\=-1**\n\n**jdbc.driverClassName=org.h2.Driver**\n\
  \n**jdbc.username=sa**\n\n**jdbc.password=**\n\n语法很直观。每行包含一个简单的表达式，其中左侧代表属性名称，右侧（在\
  \ **=** 之后）代表配置的值。这种外部化使得为不同环境交换不同的数据库配置变得容易，并更好地将这些细节从特定于应用的配置中外部化出来。\n\n不同的数据库需要不同的\
  \ JDBC URL。在这个例子中，我们使用了流行的 H2 数据库。H2 是一个基于 Java 的数据库，因此很容易集成到任何基于 Java 的应用中（它不需要单独的数据库进程）。你也可以轻松地使用\
  \ PostgreSQL、MySQL 或任何有 JDBC 驱动的数据库。只需确保你的数据库已启动、运行，并配置为监听 Bean 配置中指定的 URL。\n\n\
  同样关键的是，在应用首次启动时，你必须在类路径中包含相应的 JDBC 驱动。由于 H2 是基于 Java 的，只需将 H2 JAR 文件包含在类路径中即可开始运行。\n\
  \n与 JNDI 集成\n\nHibernate 几乎总是意味着关系型数据库，因此从这里开始是最合理的。Java 已经发展成为一个构建企业级应用的平台，因此有很多选项可以将其连接到标准的关系型数据库。\n\
  \n在最简单的层面上，你可以实例化所选数据库的数据库驱动，但大多数应用需要的远不止这些。许多应用服务器提供自己优化的数据库连接池，以在多个客户端同时使用应用时提高性能。\n\
  \n为了简化管理和集成，许多应用服务器使用 JNDI 来与数据库交互。\n\n\n\nJNDI 常被描述为 Spring IoC 的对立面。JNDI 并非将依赖自动注入到应用程序中，而是允许从集中管理的目录中查找依赖。这两种方法各有优势。例如，在使用\
  \ JNDI 的情况下，开发者可以在应用程序配置中为数据库资源定义逻辑名称，同时允许系统管理员在 Web 应用程序容器配置中管理该逻辑名称到正确数据库连接池的映射，从而有效地将数据库连接细节的指定推迟到运行时。当需要进行数据库迁移时，JNDI\
  \ 可以简化部分管理任务，因为无需修改应用程序配置。\n\n无论你决定采用哪种方法，Spring 都能让你轻松地将数据源集成到应用程序中。关键在于 Spring\
  \ 的持久化模板从不要求特定类型的数据源实现。相反，它们依赖于更通用的 **javax.sql.Datasource** 接口。\n\n无论你打算使用数据库连接池还是通过\
  \ JNDI 检索的数据源，最终的配置都应始终生成一个标准的 **javax.sql.Datasource** 引用。\n\n这引出了 Spring 中的一个关键概念：***FactoryBean**\
  \ 接口。**FactoryBean** 是 Spring 对广为人知的工厂设计模式的实现。其核心概念在于，通过将具体实现的选择或实例化延迟到运行时，从而消除对特定实现的直接依赖。你定义一个工厂，由工厂负责在运行时选择正确的实现并实例化（或查找）该特定类。\n\
  \n*Spring 的 **FactoryBean** 概念与此非常相似。通常，在 Spring 中，当你定义一个 bean 时，由 **classname**\
  \ 属性指定的类就是将被实例化并注入到其他引用了该 bean ID 的 bean 中的类。但对于 **FactoryBean** 来说情况并非如此。当你使用 **FactoryBean**\
  \ 时，你实际上是在实例化一个工厂类，然后由该工厂类负责创建用于解析 Spring 中依赖关系的具体实现。因此，本质上，此处的 **classname** 属性仅定义了一个工厂实现，其职责是创建你实际需要的目标实现。*\n\
  \n这一概念使我们能够使用多种策略来访问数据源，而无需将自己局限于某个特定方案。如果你使用 JNDI **FactoryBean**，你最终仍会得到一个数据源引用；如果你选择使用池化数据源实现，结果也是如此。\n\
  \n在 Spring 中使用 **FactoryBean** 还有其他原因。例如，**MapFactoryBean** 可用于完全在配置文件中创建一个 Java\
  \ **Map**（这在某些情况下非常方便）。\n\nSpring 的 **FactoryBean** 实现了 **FactoryBean** 接口，该接口定义了三个方法，分别用于实例化目标对象（即工厂旨在创建的实例）、获取目标对象的类型，以及判断目标对象是单例还是原型。针对我们的场景，我们可以按以下方式配置\
  \ JNDI 数据源：\n\n**<bean id=\"galleryDatasource\" class=\"org.springframework.jndi.JndiObjectFactoryBean\"\
  >**\n\n**<property name=\"jndiName\" value=\"java:comp/env/jdbc/gallery\"/>**\n\n\
  **</bean>**\n\n尽管上述示例相当简洁，但在某些情况下，通过导入一个旨在处理特定类型配置的命名空间，可以使配置更易读、更简洁。例如，通过导入 **jee**\
  \ 命名空间，我们可以进一步简化上述 JNDI 查找：\n\n**<jee:jndi-lookup id=\"galleryDatasource\"**\n\n\
  **jndi-name=\"java:comp/env/jdbc/gallery\"/>**\n\n我们不仅将配置缩减为一行，而且使配置的意图更加清晰。\n\n\
  第 3 章 ■ 基本应用程序设置\n\nWeb 应用程序配置\n\nJava Web 应用程序以 WAR 文件形式部署。WAR 文件是一种特殊的 JAR 文件，包含诸如\
  \ Servlet、JSP、标签库和静态 HTML 资源等内容。\n\nWAR 的关键配置文件是 **web.xml**，它根据 Java EE 规范概述了应用程序的结构。以下配置遵循\
  \ Servlet 2.5 规范，可被所有主流应用服务器容器（包括 Tomcat、Resin、Jetty、WebSphere、WebLogic、GlassFish\
  \ 等）解析。**web.xml** 文件应放置在 **WEB-INF** 目录下。对于 Maven 项目，**WEB-INF** 目录位于 **src/main/webapp**\
  \ 下。以下是一个基本的 **src/main/webapp/WEB-INF/web.xml** 文件，用于启动我们的艺术画廊应用程序。\n\n**<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>**\n\n**<web-app**\n\n****xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/javaee** **http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd\"\
  **\n\n**version=\"2.5\">**\n\n**<!-- 用于创建所有 Servlet 和 Filter 共享的 Spring 容器的监听器 -->**\n\
  \n**<context-param>**\n\n**<param-name>contextConfigLocation</param-name>**\n\n\
  **<param-value>**\n\n**classpath*:META-INF/spring/spring-master.xml**\n\n**</param-value>**\n\
  \n**</context-param>**\n\n**<listener>**\n\n**<listener-class>**\n\n**org.springframework.web.context.ContextLoaderListener**\n\
  \n**</listener-class>**\n\n**</listener>**\n\n**<!-- 用于处理 HTTP 请求的 Spring DispatcherServlet\
  \ -->**\n\n**<servlet>**\n\n**<servlet-name>galleryDispatcher</servlet-name>**\n\
  \n**<servlet-class>**\n\n**org.springframework.web.servlet.DispatcherServlet**\n\
  \n**</servlet-class>**\n\n**<init-param>**\n\n**<param-name>contextConfigLocation</param-name>**\n\
  \n**<param-value>**\n\n**WEB-INF/spring/spring-master-web.xml**\n\n**</param-value>**\n\
  \n**</init-param>**\n\n**<load-on-startup>1</load-on-startup>**\n\n**</servlet>**\n\
  \n**<servlet-mapping>**\n\n**<servlet-name>galleryDispatcher</servlet-name>**\n\n\
  **<url-pattern>*.art</url-pattern>**\n\n**</servlet-mapping>**\n\n**</web-app>**\n\
  \n第 3 章 ■ 基本应用程序设置\n\n如前所述，对于基于 Web 的 Spring 应用程序，你最终会得到包含所有 Spring Bean 的多个应用程序上下文。有一个单一的根应用程序上下文，以及可能多个子应用程序上下文。\n\
  \n**ContextLoaderListener** 实现了 **javax.servlet.ServletContextListener** 接口。实现了\
  \ **ServletContextListener** 接口的监听器会在 Servlet 上下文初始化或销毁时从应用程序容器接收通知。这是一种便捷机制，用于简化应用程序配置并方便系统维护。Spring\
  \ 的 **ContextLoaderListener** 在应用程序启动期间创建 Servlet 上下文时收到此类通知后触发。它期望在 Servlet 上下文中找到定义的\
  \ **contextConfigLocation** 参数，然后使用该参数检索 Bean 定义并实例化它们。由 **contextConfigLocation**\
  \ 定义的 Bean 组成了通常所说的*根应用程序上下文*。\n\nServlet 定义\n\n**web.xml** 文件也是配置应用程序所需的任何 **Servlet**\
  \ 接口实现的地方。Servlet 与其期望的初始化参数一起配置，然后关联到你希望该 Servlet 应用的 URL 模式。\n\n对于 Spring 应用程序，你可以利用框架的\
  \ **DispatcherServlet** 类。**DispatcherServlet** 是 **Servlet** 接口的一个灵活实现，充当 HTTP\
  \ 请求的中央路由机制。借助 Spring 提供的适配器类，你可以以一种良好的、可插拔的方式指定每个 **DispatcherServlet** 实例如何处理从视图解析到异常处理的所有事务。\n\
  \n\n\n每个 **DispatcherServlet** 实例都拥有自己的命名空间，通常被称为*子应用上下文*。这意味着每个 **DispatcherServlet**\
  \ 都有其自己的 **ApplicationContext**，但它们都共享根应用上下文。简而言之，这意味着在一个 **DispatcherServlet**\
  \ 的 **ApplicationContext** 中定义的 Spring Bean 可以引用根 **ApplicationContext** 中的 Bean，但反之则不行。这也意味着不同的\
  \ **DispatcherServlet** 实例不能共享它们的 Bean 定义。\n\n■ **注意** 每个 **DispatcherServlet**\
  \ 所使用的 **ApplicationContext** 在技术上是 Spring 的 **WebApplicationContext** 接口的一个实现。**WebApplicationContext**\
  \ 在通用的 **ApplicationContext** 接口上增加了一个 **getServletContext** 方法。它还定义了一个众所周知的应用程序属性名称，根上下文必须在引导过程中绑定到该名称上。\n\
  \n让我们再看一下我们的 **galleryDispatcher** Servlet 定义。就像我们的数据源一样，我们为每个配置的 **DispatcherServlet**\
  \ 赋予一个唯一的名称，因为我们预计最终会有多个这样的 Servlet。\n\n**<servlet>**\n\n**<servlet-name>galleryDispatcher</servlet-name>**\n\
  \n**<servlet-class>**\n\n**org.springframework.web.servlet.DispatcherServlet**\n\
  \n**</servlet-class>**\n\n**<init-param>**\n\n**<param-name>contextConfigLocation</param-name>**\
  \ 44\n\n第 3 章 ■ 基本应用程序设置\n\n**<param-value>**\n\n**WEB-INF/spring/spring-master-web.xml**\n\
  \n**</param-value>**\n\n**</init-param>**\n\n**<load-on-startup>1</load-on-startup>**\n\
  \n**</servlet>**\n\n该 Servlet 定义了一个名为 **contextConfigLocation** 的 **init-param**，它为\
  \ Servlet 提供了获取和实例化其 Spring Bean 配置所需的所有信息。并且，**spring-master-web.xml** 中的 Bean\
  \ 可以安全地引用在 **spring-master.xml** 及其后续导入中定义的 **ApplicationContext** 中的 Bean。\n\n\
  然而，这个 **ApplicationContext** 层次结构有一个很大的例外：**BeanFactoryPostProcessor** 接口及其兄弟接口\
  \ **BeanPostProcessor** 的实现仅适用于定义它们的 **BeanFactory**。本章前面描述的 **PropertyPlaceholderConfigurer**\
  \ 类就是这样一个例子。这意味着，除了已经在 **spring-master.xml** 根应用上下文中定义的一个属性占位符之外，你还需要为每个 **DispatcherServlet**\
  \ 再定义一个属性占位符。\n\n最后，我们指示应用程序容器将所有以 **/art/** 开头的请求映射到这个 **galleryDispatcher**：\n\
  \n**<servlet-mapping>**\n\n**<servlet-name>galleryDispatcher</servlet-name>**\n\n\
  **<url-pattern>/art/*</url-pattern>**\n\n**</servlet-mapping>**\n\n有了这个配置，一个对 **/art/foo**\
  \ 的模拟请求将被映射到 **galleryDispatcher**，然后该 Servlet 会将请求路由到适当的 Spring MVC 控制器。\n\nSpring\
  \ MVC\n\n从 Spring 3.0 开始，引导 Spring MVC 变得异常简单。以下是 **src/main/webapp/WEB-INF/spring/spring-master-web.xml**\
  \ 的内容，它是 **galleryDispatcher** Servlet 背后的配置文件。\n\n**<?xml version=\"1.0\" encoding=\"\
  UTF-8\" standalone=\"no\"?>**\n\n**<beans**\n\n********xsi:schemaLocation=\"http://www.springframework.org/schema/beans**\
  \ **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd** **http://www.springframework.org/schema/context**\n\
  \n**http://www.springframework.org/schema/context/spring-context-3.0.xsd** **http://www.springframework.org/schema/mvc**\n\
  \n**http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd\">**\n\n****<context:component-scan\
  \ base-package=\"com.prospringhibernate\"**\n\n**use-defaultfilters=\"false\">**\n\
  \n**<context:include-filter type=\"annotation\"**\n\n**expression=\"org.springframework.stereotype.Controller\"\
  />**\n\n**</context:component-scan>**\n\n第 3 章 ■ 基本应用程序设置\n\n****<mvc:annotation-driven/>**\n\
  \n****<!-- 选择一个静态视图进行渲染，无需显式控制器 -->**\n\n**<mvc:view-controller path=\"/index.jsp\"\
  />**\n\n****</beans>**\n\n我们在这个 **WebApplicationContext** 中再次使用了 Spring 的组件扫描。这次，我们指定了一个\
  \ **include-filter**，将我们实例化的 Bean 限制为仅那些带有 **@Controller** 原型注解的 POJO。\n\n接下来，我们使用\
  \ **mvc-namespace** 声明来启用对将请求映射到 Spring MVC **@Controller** 方法的支持。\n\n**<mvc:annotation-driven/>**\n\
  \n这个便捷的配置语法还会注册默认的 Spring 格式化器和 Spring 验证器，以便在所有控制器中使用。这允许我们编写如下所示的控制器代码：\n\n**@Controller**\n\
  \n**@RequestMapping(\"**/people\")**\n\n**public class PersonController {**\n\n\
  ****@RequestMapping(value = \"/{id}\", method = RequestMethod.GET)** **public String\
  \ show(@PathVariable(\"id\") Long id, ModelMap modelMap) {**\n\n**// 检索 Person 实体的业务逻辑**\n\
  \n**return \"person\";**\n\n**}**\n\n****@RequestMapping(value = \"/{id}\", method\
  \ = RequestMethod.DELETE)** **public String delete(@PathVariable(\"id\") Long id)\
  \ {**\n\n**// 删除 Person 实体并返回适当视图的业务逻辑在此处**\n\n**}**\n\n****}**\n\n这段简略的代码被注解为一个控制器。它还通过\
  \ Spring MVC 的 **@RequestMapping** 注解映射到了 **/people**。我们在方法级别再次使用 **@RequestMapping**\
  \ 注解，以指定任何对 **/people/{id}** 的 HTTP **GET** 请求都应触发 **show** 方法。**@PathVariable**\
  \ 注解将获取那个 **{id}** 参数，并将其设置为 **Long id**，以便在 **show** 方法内部使用。类似地，当对 URL **/art/people/{id}**\
  \ 发出 HTTP **DELETE** 请求时，该请求将通过 **galleryDispatcher** 路由到 **PersonController** 的\
  \ **delete** 方法。短时间内要消化这么多内容确实不少，但可以说，Spring 的 MVC 注解极大地减少了构建一个完整的企业级 Web 应用程序所需的代码量。\n\
  \n最后，我们演示了 Spring 用于静态视图解析的机制：\n\n**<mvc:view-controller path=\"/index.jsp\"/>**\n\
  \n通常，你希望简单地将请求路由到一个视图，而无需在控制器中包含任何逻辑。这就是 **mvc:view-controller** 的用武之地。\n\n第 3 章\
  \ ■ 基本应用程序设置\n\n总结\n\n在本章中，你已经了解了使用核心 Spring、Maven、数据库和 Spring MVC 设置 Web 应用程序所涉及的内容。\n\
  \nMaven 是一个很棒的工具，开发团队可以使用它来简化日常开发。你可以管理依赖关系，确保可重复的构建过程，并为团队中的开发人员提供一个一致的接口来与你的项目进行交互。\n\
  \n你还了解了 Spring 的一些特性，包括组件扫描、**BeanFactoryPostProcessors**（如 **PropertyPlaceholderConfigurer**）、Spring\
  \ 的命名空间支持，以及使用 **import** 声明进行更高级的 XML 配置管理。组件扫描很可能是这些特性中最重要的，因为它允许 Spring 在指定的包结构中定位类，以便管理这些组件并适当地解析依赖关系。\n\
  \n组件扫描功能允许开发人员使用注解作为 Spring 的提示。它简化了将依赖关系连接在一起所需的工作，甚至减少了所需的 XML 配置量。例如，**@Repository**\
  \ 注解应用于指示构成 DAO 层的那些类，**@Service** 注解可用于指定属于应用程序服务外观的那些类，而 **@Controller** 注解则表示存在一个应用于\
  \ Spring MVC 交互的 POJO。这些注解简化了各层的定义，为层类赋予了有助于描述其用途的元数据。\n\n\n\n您还了解了使用 Apache **commons-dbcp**\
  \ 库进行连接池，或通过 JNDI（如果您想使用应用容器提供的数据源）将数据库集成到 Spring 应用程序中所需要的内容。\n\n在接下来的章节中，我们将构建领域模型，并将\
  \ Hibernate 集成到我们的艺术画廊应用程序中。\n\n**第 4 章**\n\n■ ■ ■\n\n**使用 Hibernate 实现持久化**\n\n\
  与 Spring 非常相似，Hibernate 首次出现时就改变了软件开发格局。时机非常理想。开发人员对 J2EE 的复杂性以及特别是使用 EJB 进行持久化所带来的开销感到沮丧。Hibernate\
  \ 通过简洁、清晰且经过深思熟虑的设计解决了持久化问题。\n\n同样与 Spring 类似，Hibernate 严重依赖 POJO。其他 ORM 框架迫使开发人员通过限制性和僵化的要求（例如替代类和父类，以及数据传输对象\
  \ (DTO)）来污染其领域模型。Hibernate 在几乎不依赖或耦合 Hibernate 的情况下实现了持久化。Spring 通过其自身的几个类进一步帮助解耦\
  \ Hibernate，这些类有助于简化和标准化集成及持久化操作。此外，Spring 提供了一种与框架无关的解决方案，用于以标准化的声明方式实现事务行为，而无需特定于\
  \ Hibernate 的代码。\n\n回顾过去，很容易看出 Spring 和 Hibernate 如何对彼此的成功起到了关键作用。\n\n凭借强调轻量级方法论、简洁性和代码整洁性的理念，Hibernate-Spring\
  \ 组合为企业级 Java 应用程序和持久化开创了一个新时代。这种共同的成功对 Java 社区产生了巨大影响，并成为众多变革的催化剂，这些变革拥抱了更轻量级的应用程序开发方法。\n\
  \n关于 Java 生态系统中的各种持久化选项，通常存在很多困惑。\n\nEJB 3、JPA、JDO 和 Hibernate 之间到底有什么区别？在本章中，我们将通过回顾一些历史并定义一些术语来尝试厘清这些概念。在解决这些问题之后，我们将演示如何将\
  \ Hibernate 集成到 Spring 应用程序中。\n\nJava 数据库持久化的演进\n\nJDBC 由 Sun Microsystems 于 1997\
  \ 年作为 JDK 1.1 的一部分包含在内。JDBC 是一个面向关系型数据库的低级 API。它提供了查询和更新数据库的方法。JDBC 提供了一套出色的工具，但所有繁重的工作都完全留给了开发人员，他们必须编写\
  \ SQL、将查询结果映射到领域对象、管理连接和事务等等。大多数其他持久化框架都是作为 JDBC 之上的抽象层构建的，以减轻开发人员的负担。\n\n从 2000\
  \ 年开始，JDBC 规范 3.0 版作为 Java 社区流程 (JCP) 的一部分进行管理。JCP 创建于 1998 年，作为一种机制，允许相关方参与塑造 Java\
  \ 平台的未来方向。JCP 围绕 Java 规范请求 (JSR) 展开，这些是概述对 Java 平台拟议新增或更改的正式文档。每个 JSR 都有一个或多个个人担任规范负责人，以及一个称为专家组的成员团队，他们协作制定规范。最终的\
  \ JSR 还包括一个参考实现。\n\n第 4 章 ■ 使用 Hibernate 实现持久化\n\n*规范*和*实现*之间的这种区别是开发人员在讨论各种可用的持久化选项时产生混淆的主要来源之一。例如，JPA\
  \ 是一个*规范*，而 Hibernate 只是众多提供 JPA 规范*实现*的项目之一。JPA 规范的其他实现包括 OpenJPA、DataNucleus 和参考实现\
  \ EclipseLink。但我们有点超前了。让我们来梳理一下其中一些规范和实现的起源。\n\nEJB、JDO 和 JPA\n\n在 1990 年代末和 2000\
  \ 年代初，用 Java 开发大规模应用程序的主要技术是 EJB。EJB 最初由 IBM 于 1997 年构思，EJB 1.0 和 1.1 规范于 1999 年被\
  \ Sun 采纳。此后，EJB 通过 JCP 得到增强。JSR 19 作为 EJB 2.0 的孵化器，该规范于 2001 年最终确定。EJB 2.0 规范成为\
  \ Sun 的 Java 2 平台企业版（即 J2EE）参考实现的主要组成部分。\n\n毫无疑问，EJB 着手解决的问题，包括在分布式应用程序上实现事务完整性、远程过程调用\
  \ (RPC) 和 ORM，都是复杂的，但 EJB 很快就因得不偿失而声名狼藉。EJB 1.0、1.1 和 2.0 规范因受检异常、必需接口和大量使用抽象类的复杂性而受损。大多数应用程序根本不需要\
  \ EJB 1 和 2 所关联的沉重负担。在这种背景下，竞争和创新存在着巨大的机会。\n\nJCP 在 JDBC 之上创建轻量级抽象层的第一次官方尝试是 JSR\
  \ 12：Java 数据对象 (JDO)。JDO 背后的专家组于 1999 年开始着手定义一种标准方法，用于将 Java 对象持久化地存储在事务性数据存储中。此外，它还定义了一种将数据从关系型数据库转换为\
  \ Java 对象的方法，以及一种定义与这些对象关联的事务语义的标准方法。到 2002 年规范最终确定时，JDO 已经演变成一个基于 POJO 且与数据存储无关的\
  \ API。这意味着您可以将 JDO 与许多不同的数据存储一起使用，范围从关系型数据库管理系统 (RDBMS) 到文件系统，甚至面向对象数据库 (OODB)。有趣的是，主要的应用服务器供应商并未接受\
  \ JDO 1.0，因此它从未流行起来。\n\n在 JDO 和 EJB 之间，现在有两个相互竞争的管理持久化的标准，但两者都无法突破并赢得开发人员。这为商业参与者和开源框架打开了大门。Hibernate\
  \ 通常是人们认为取代 EJB 2.0 的 ORM 框架，但另一个主要参与者实际上更早出现。\n\n一个名为 TopLink 的 ORM 最初由 The Object\
  \ People 为 Smalltalk 编程语言开发。它被移植到 Java，并于 1998 年添加到公司的产品线中。TopLink 最终于 2002 年被 Oracle\
  \ 收购。TopLink 是一个令人印象深刻的框架，其特性在塑造后来在 Java 世界中出现的持久化规范方面发挥了重要作用。\n\n作为一个边缘商业项目，TopLink\
  \ 从未达到像 EJB 那样的采用水平，EJB 得到了 IBM 和 BEA 等应用服务器供应商的大力支持；它也无法真正与后来出现的轻量级开源框架（如 Hibernate）竞争。\n\
  \n\n\nGavin King 于 2001 年开始构建 Hibernate，旨在提供一种替代方案，以摆脱与 EJB 2 实体 Bean 相关的众所周知的问题。他觉得自己花在思考持久化上的时间比思考客户的业务问题还要多。Hibernate\
  \ 旨在提高生产力，使开发者能够更专注于对象建模，并简化持久化逻辑的实现。Hibernate 1.0 于 2002 年发布，Hibernate 2.0 于 2003\
  \ 年发布，Hibernate 3.0 于 2005 年发布。在整个时期，Hibernate 作为一款免费、基于 POJO 的 ORM 框架，凭借其完善的文档和极高的易用性，获得了巨大的发展势头。Hibernate\
  \ 提供了一种实用、简单、优雅且开源的开发企业级应用的方式。\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n在 Hibernate 存在的前五年里，它没有遵循任何规范，也没有参与任何标准化流程。Hibernate\
  \ 只是一个开源项目，你可以用它来解决实际问题并完成任务。在此期间，包括 Gavin King 本人在内的许多关键人物开始共同致力于 JSR 220：Enterprise\
  \ JavaBeans 3.0 的工作。他们的使命是创建一个新的标准，从开发者的角度解决与 EJB 相关的痛点。当专家组推进 EJB 3.0 规范时，决定将与关系型数据库管理系统（RDBMS）交互的持久化组件拆分为独立的\
  \ API。Java 持久化 API（JPA）由此诞生，它建立在许多核心概念之上，这些概念已在 TopLink 和 Hibernate 等 ORM 框架中得到实现和验证。作为\
  \ JSR 220 专家组的一部分，Oracle 通过其 TopLink 产品提供了 JPA 1.0 的参考实现。JSR 220 于 2006 年最终确定，EJB\
  \ 3 在 Sun 公司对 Java 企业版 5（JEE 5）的定义中扮演了核心角色。\n\n■ **注意** 请注意从 J2EE 到 JEE 的符号变化。J2EE\
  \ 现在是 Java 企业版的旧称。是时候更新你的简历了！s/J2EE/JEE/\n\n这一演进对 JPA 来说非常完美。JPA 1.0 是 Java 持久化领域的一个巨大里程碑。然而，许多对于已经使用\
  \ Hibernate 等工具的开发者至关重要的功能，由于时间限制未能包含在内。JPA 2.0 增加了许多重要特性，包括 Criteria API、缓存 API，以及对\
  \ Java 持久化查询语言（JPQL，JPA 的面向对象查询语言）的增强。JPA 2.0 标准于 2009 年 12 月最终确定，作为一个新的独立 JSR，旨在纳入\
  \ Java EE 6 规范。Oracle 将 TopLink 的源代码和开发资源捐赠给了 Sun，以创建 EclipseLink 项目。EclipseLink\
  \ 随后成为 JPA 2.0 的参考实现。Hibernate 3.5 于 2010 年春季发布，完全支持 JSR 317：JPA 2.0。\n\n这是一段漫长而曲折的历史，但最终结果相当不错。JPA\
  \ 现在涵盖了开发大规模企业级 Java 应用所需的大部分功能。\n\n**那 JDO 呢？**\n\nJava 中的持久化标准并不像人们期望的那样清晰。你看，JDO\
  \ 仍然非常活跃且运行良好。JSR 243 在 2006 年引入了 JDO 2.0，此后经历了数次小版本修订。在许多方面，JDO 是 JPA 的超集。因此，像\
  \ DataNucleus 这样的 JDO 实现者能够将 JDO 规范和 JPA 规范都整合到他们的产品中。由于各种原因，Hibernate 并未实现 JDO，并且\
  \ JDO 也完全没有被纳入 EJB 3 规范。尽管如此，近年来 JDO 还是经历了一定程度的复兴。\n\n因为 JDO 与数据存储无关，而 JPA 完全专注于关系型数据存储，所以存在许多有趣的使用场景不适合\
  \ JPA，但却恰好符合 JDO 的优势。例如，JDO 是在 Google App Engine（GAE）上开发 Java 应用的关键组成部分。GAE 是一种“平台即服务”（PaaS），它构建在\
  \ Google 的 BigTable 自定义数据存储之上，而非 RDBMS。\n\n那么，为什么不直接使用 JDO，而从一开始就放弃创建 JPA 呢？竞争性规范存在的原因有很多——有些是技术上的，有些是意识形态上的，还有些是政治上的。行业中的大公司对\
  \ JCP 有着巨大的影响力，而它们显然有时会有相互竞争的动机。\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\nHibernate 的定位\n\
  \n现在我们已经讨论了标准，让我们来看看 Hibernate 的定位，并澄清一些常见的误解。\n\n首先，Hibernate 3 不是 EJB 3，反之亦然。EJB\
  \ 3 是一个提供分布式、容器管理、服务器端组件架构的规范。EJB 3 封装了几个不同的规范，以促进许多功能，包括分布式事务管理、并发控制、消息传递、Web 服务和安全性——仅举几例。EJB\
  \ 3 规范假设持久化处理可以委托给 JPA 提供者。\n\n其次，Hibernate 不是 JPA。更准确地说，Hibernate 是众多提供符合标准的 JPA\
  \ 实现的框架之一。第一个支持 JPA 1.0 的 Hibernate 版本是 Hibernate 3.2，它于 2006 年秋季正式发布。\n\n像 Hibernate\
  \ 这样的框架通常提供一些超出 JPA 规范范围的专门特性。因此，Hibernate 可以被视为 JPA 的超集。在一个极端，Hibernate 的架构允许你完全不使用\
  \ JPA 规范的任何部分，仅使用 Hibernate Core。在另一个极端，你可以严格只使用 Hibernate 中符合 JPA 规范的部分。严格遵守 JPA\
  \ 规范可以确保与其他 JPA 实现（如 Apache 的 OpenJPA 项目）实现真正的无缝可移植性。\n\n在使用 Hibernate 时，我们建议开发者尽可能贴近\
  \ JPA 规范，但也不必过于苛求。由于开源项目的发展速度通常比 JCP 快得多，像 Hibernate 这样的框架会为标准化流程未解决的问题提供解决方案。如果这些自定义功能能够减轻开发者的痛苦，请务必务实并善加利用！这正是标准化流程的魅力所在——各种规范的实现者可以自由创新，而最好、最成功的想法很可能会被纳入规范的未来修订版中。\n\
  \nJPA 规范定义了一组可以应用于领域类的注解，以便将对象映射到数据库表，并将成员变量映射到列。JPA 还提供了一种类似 SQL 的语言，称为 JPQL，它可以用面向对象的方式查询数据库。要访问你映射到数据库的领域模型，或执行\
  \ JPQL 查询，你需要使用 **javax.persistence.EntityManager**。\n\n在 JPA 出现之前，Hibernate 应用主要围绕使用\
  \ Hibernate 的 **SessionFactory** 和 **Session** 接口。简单来说，Hibernate 的 **SessionFactory**\
  \ 负责全局配置细节，而 **Session** 的作用域仅限于当前事务。JPA 的 **EntityManager** 充当了 Hibernate 的 **SessionFactory**\
  \ 和 **Session** 之间的桥梁；因此，它既了解你的数据库连接配置，也了解事务上下文。在本章中，你将学习一些关于 JPQL、**EntityManager**\
  \ 以及它们如何与 Spring 交互的知识，但主要学习如何设置一个使用 Hibernate 实现 JPA 2.0 规范的应用。\n\nJPA 接口层次结构\n\
  \n\n\n图 4-1 概述了任何 JPA 应用程序中的四个关键接口。**EntityManagerFactory**代表了应用程序中数据库的配置。通常，你会为每个数据存储定义一个**EntityManagerFactory**。**EntityManagerFactory**用于创建多个**EntityManager**实例。\n\
  \n第 4 章 ■ 使用 Hibernate 进行持久化\n\n*图 4-1. JPA 接口*\n\n每个**EntityManager**实例类似于一个数据库连接。在多线程的\
  \ Web 应用程序中，每个线程都会拥有自己的**EntityManager**。\n\n■ **注意** 默认情况下，所有 Spring 对象都是单例的。**EntityManager**也不例外，但它仍然是线程安全的，并且了解事务边界。Spring\
  \ 会传入一个共享的代理**EntityManager**，该代理委托给一个线程绑定的**EntityManager**实例，这个实例了解请求的所有上下文（包括事务边界）。\n\
  \n每个**EntityManager**都有一个单一的**EntityTransaction**，用于将更改持久化到底层数据库。最后，**EntityManager**充当生成**Query**类的工厂。实现**Query**接口的类用于对数据库执行查询。\n\
  \n**EntityManagerFactory**仅在启动应用程序时相关，我们将向你展示如何在 Spring 应用程序中配置它。查询将在第 6 章中更深入地介绍，事务管理将在第\
  \ 7 章中讨论。正如你将在本章中看到的，**EntityManager**接口是你最常与之交互的接口。\n\n■ **注意** 由于 JPA 旨在用于重量级和轻量级容器，因此有许多配置选项。例如，你可以使用\
  \ EJB 容器来配置 JPA，然后通过 JNDI 暴露容器的**EntityManager**供 Spring 访问。或者，你可以使用现有的众多 JPA 实现之一直接在\
  \ Spring 中配置 JPA。一个显著的区别是需要（或不需要）*加载时织入*，这是 AOP 所需的一种字节码操作类型。加载时织入用于创建具有事务感知能力的\
  \ JPA **EntityManager**和能够执行延迟加载的**Entity**对象。EJB 服务器有自己的加载时织入机制，Spring 也是如此。单个**EntityManager**只能通过代理提供的间接层支持来处理此类功能。Hibernate\
  \ JPA 实现是不需要加载时织入的框架之一，因此它允许你尽快在 JPA 环境中启动并运行。\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n\
  艺术画廊领域模型与 DAO 结构\n\n现在，让我们回到构建艺术画廊应用程序的任务上。在艺术画廊应用程序中，我们必须表示的核心内容是艺术品的实体。在图 4-2\
  \ 中，你将看到**ArtEntity**类代表艺术品。在我们的画廊中，我们将允许画廊策展人将**ArtEntity**实体关联到**Category**实体，并允许公众应用**Tag**和**Comment**实体。这些**ArtEntity**实体被组织成**Exhibition**实体以供公开展示，并且我们通过一个名为**ArtData**的多态表示来捕获给定艺术品的所有元数据。我们还定义了一个**Person**类型来表示应用程序的所有用户。这些**Person**实体通过一个**enum**进行限定，该枚举表示它们可能承担的系统角色。\n\
  \n*图 4-2. 艺术画廊领域模型*\n\nJPA 允许我们通过注解指定 Java 类如何映射到数据库。最重要的注解是**@Entity**注解。\n\n第\
  \ 4 章 ■ 使用 Hibernate 进行持久化\n\n一个带有@Entity 注解的 POJO\n\n给一个 POJO 添加 JPA **@Entity**注解，就使其成为一个可持久化的对象！嗯，还不完全是——你仍然需要在某处添加一个**@Id**，并且理想情况下，还需要一个**@Version**字段，但就是这么简单。\n\
  \n**package com.prospringhibernate.gallery.domain;**\n\n****import javax.persistence.Id;**\n\
  \n**import javax.persistence.Entity;**\n\n**import javax.persistence.Version;**\n\
  \n**import javax.persistence.GeneratedValue;**\n\n****@Entity**\n\n**public class\
  \ Person implements Serializable, DomainObject {**\n\n****private Long id;**\n\n\
  **private Integer version;**\n\n****@Id**\n\n**@GeneratedValue**\n\n**public final\
  \ Long getId() {**\n\n**return id;**\n\n**}**\n\n****public void setId(Long id)\
  \ {**\n\n**this.id = id;**\n\n**}**\n\n****@Version**\n\n**public Integer getVersion()\
  \ {**\n\n**return version;**\n\n**}**\n\n****public void setVersion(Integer version)\
  \ {**\n\n**this.version = version;**\n\n**}**\n\n****// 省略了 getter、setter 和字段**\n\
  \n**}**\n\n■ **注意** 我们在代码清单中包含了所有必需的**import**语句，以帮助你了解各个注解的来源。注解对于消除 XML 非常有用，但随着给定类或方法上注解数量的增加，它们有时会变得有点难以阅读。**javax.persistence**包中的任何内容都是由\
  \ JPA 明确提供的。\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n除非另有说明，JPA 实现将采用约定优于配置的方式，并将此 Bean\
  \ 映射到**Person**表。**@GeneratedValue** JPA 注解告诉 Hibernate 使用自动生成的**id**列。Hibernate\
  \ 会为你正在使用的特定数据库选择最佳的 ID 生成策略。\n\nHibernate 也足够智能，能够根据每个成员变量使用的 Java 原始类型或枚举，确定每个数据库列的正确数据类型。你可以通过使用**@Basic**、**@Enumerated**、**@Temporal**和**@Lob**注解进一步自定义这些字段映射。实体的每个成员都被假定为持久的，除非它是**static**的或使用**@Transient**注解。我们将在第\
  \ 5 章中更详细地讨论约定优于配置的概念和 Hibernate 注解。\n\n就 JPA 规范而言，你在**Person**类中看到的**implements\
  \ Serializable**并非严格必要。但是，如果你要使用缓存或 EJB 远程调用，则需要它，因为这两者都要求对象是**Serializable**的。正如你将在第\
  \ 9 章中学到的，缓存是在任何 JPA 应用程序中实现最佳性能的关键组件，因此实现**Serializable**接口是一个好习惯。\n\n从 POJO 方面来说，这就是你需要做的全部，但一个带有**@Entity**注解的\
  \ POJO 本身并不能做任何事情。我们至少需要提供用于基本 CRUD 操作的代码。现在，我们将采用 DAO 模式。当我们分别在第十一章和第十二章介绍 Grails\
  \ 和 Roo 时，我们将探索使用 Active Record 模式进行更以领域为中心的编码。\n\n使用泛型的简化 DAO 模式\n\n让我们创建一个保存和查找**Person**实体的\
  \ DAO。我们将使用泛型来使我们的类层次结构变得复杂，这样我们就可以抽象出样板式的 CRUD 操作，否则这些操作将在我们应用程序中的每个 DAO 中一遍又一遍地重复。\n\
  \n在图 4-3 的伪 UML 中，请注意我们的**Person**领域对象实现了一个名为**DomainObject**的接口。该**DomainObject**接口是一个空接口，被我们的**GenericDao**接口以及**GenericDaoJpa**具体类使用，以泛型方式绑定我们的领域对象。这种结构使我们能够将通用方法推入**GenericDaoJpa**类，进而使我们能够保持\
  \ Hibernate DAO 的简洁。\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n*图 4-3. 艺术画廊领域与 DAO 类层次结构*\n\
  \n\n\n在图 4-3 的示意图中，实线表示继承关系，接口继承则用虚线表示。Java 泛型的关键用法通过“绑定 Person”注解进行了突出显示。\n\nJava\
  \ 中的泛型允许类型或方法操作各种类型的对象，同时提供编译时的类型安全性。\n\n让我们看看这在实际代码中是如何体现的。我们要处理的第一个类是 **GenericDao**：**package\
  \ com.prospringhibernate.gallery.dao;**\n\n****import java.util.List;**\n\n**import\
  \ com.prospringhibernate.gallery.domain.DomainObject;**\n\n****public interface\
  \ GenericDao<T extends DomainObject> {**\n\n****public T get(Long id);**\n\n**public\
  \ List<T> getAll();**\n\n**public void save(T object);**\n\n**public void delete(T\
  \ object);**\n\n****}**\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n每个泛型类型变量都表示为 **T**。如你所见，我们在这个接口中定义了四个基本方法，这些方法在管理持久化对象时至关重要。**delete**\
  \ 方法将从数据库中移除给定的实体。**save** 方法允许我们根据实体的内容在数据库中插入新行或更新现有行。两个基本的 getter 方法提供了一种读取任何实体\
  \ **T** 的方式，该实体使用了我们的 **DomainObject** 接口。\n\n在接下来的代码中，我们在具体的 **GenericDaoJpa**\
  \ 类上使用 JPA 的 **EntityManager** 实现了这些方法。\n\n**package com.prospringhibernate.gallery.dao.hibernate;**\n\
  \n****import java.util.List;**\n\n****import javax.persistence.EntityManager;**\n\
  \n**import javax.persistence.PersistenceContext;**\n\n****import org.springframework.transaction.annotation.Transactional;**\n\
  \n****import com.prospringhibernate.gallery.dao.GenericDao;**\n\n**import com.prospringhibernate.gallery.domain.DomainObject;**\n\
  \n****public class GenericDaoJpa<T extends DomainObject> implements GenericDao<T>\
  \ {**\n\n****private Class<T> type;**\n\n****protected EntityManager entityManager;**\n\
  \n****@PersistenceContext**\n\n**public void setEntityManager(EntityManager entityManager)\
  \ {**\n\n**this.entityManager = entityManager;**\n\n**}**\n\n****public GenericDaoJpa(Class<T>\
  \ type) {**\n\n**super();**\n\n**this.type = type;**\n\n**}**\n\n****@Transactional(readOnly=true)**\n\
  \n**public T get(Long id) {**\n\n**if (id == null) {**\n\n**return null;**\n\n**}\
  \ else {**\n\n**return entityManager.find(type, id);**\n\n**}**\n\n**}**\n\n****@Transactional(readOnly=true)**\n\
  \n**public List<T> getAll() {**\n\n**return entityManager.createQuery(**\n\n**\"\
  select o from \" + type.getName() + \"o\"**\n\n**).getResultList();**\n\n**}**\n\
  \n第 4 章 ■ 使用 Hibernate 进行持久化\n\n****public void save(T object) {**\n\n**entityManager.persist(object);**\n\
  \n**}**\n\n****public void remove(T object) {**\n\n**entityManager.remove(object);**\n\
  \n**}**\n\n****}**\n\n正如我们讨论过的，**EntityManager** 是与 JPA 交互的核心机制。它以事务感知的方式执行数据访问操作。借助它，**GenericDaoJpa**\
  \ 类可以执行基本的 CRUD 任务：查找类的单个或多个实例，以及保存、更新和删除实例。\n\n你会注意到 **SELECT** 子句看起来像是用 SQL 编写的，但并非如此。它是\
  \ JPQL，专门用于查询 JPA **Entity** 对象，而不是表。\n\n这个类使用了 **@Transactional** 和 **@PersistenceContext**\
  \ 注解。**@Transactional** 注解由 Spring 提供。它让 Spring 知道这个类需要事务管理，以及每个方法内执行的操作类型的详细信息。你可以在类级别添加\
  \ **@Transactional**，以告知 Spring 每个方法都需要一个事务。你也可以在方法级别使用 **@Transactional** 注解。如果你同时在类级别和方法级别进行注解，方法级别的注解将优先。我们将在第\
  \ 7 章深入讨论事务语义。\n\n\n\n**@PersistenceContext** 是一个 JPA 注解，它告诉 Spring 需要通过自动装配注入代理后的\
  \ **EntityManager**。**@PersistenceContext** 可以用于成员变量，但更推荐的做法是像这里展示的那样，将其用于 setter\
  \ 方法上。\n\n下一个接口是 **PersonDao**。该接口扩展了由 **Person** 类型限定的 **GenericDao**，并声明了在我们的\
  \ DAO 中与 **Person** 实体进行交互所特有的方法。我们的类层次结构使我们能够将以下代码简化到只需定义唯一适用于 **Person** 实体的方法签名即可。\n\
  \n**package com.prospringhibernate.gallery.dao;**\n\n****import com.prospringhibernate.gallery.domain.Person;**\n\
  \n**import com.prospringhibernate.gallery.exception.AuthenticationException;** **import\
  \ com.prospringhibernate.gallery.exception.EntityNotFoundException;**\n\n****public\
  \ interface PersonDao extends GenericDao<Person> {**\n\n****public Person getPersonByUsername(String\
  \ username) throws EntityNotFoundException;**\n\n****public Person authenticatePerson(String\
  \ username, String password)** **throws AuthenticationException;**\n\n****}**\n\n\
  第 4 章 ■ 使用 Hibernate 进行持久化\n\n最后，这里是 **PersonDaoJpa** 类的实现，它实现了 **PersonDao** 并扩展了由我们的\
  \ **Person** 实体限定的 **GenericDaoJpa**：\n\n**package com.prospringhibernate.gallery.dao.hibernate;**\n\
  \n****import java.util.List;**\n\n****import javax.persistence.Query;**\n\n**import\
  \ javax.persistence.EntityManager;**\n\n****import org.springframework.dao.DataAccessException;**\n\
  \n**import org.springframework.stereotype.Repository;**\n\n****import com.prospringhibernate.gallery.domain.Person;**\n\
  \n**import com.prospringhibernate.gallery.dao.PersonDao;**\n\n**import com.prospringhibernate.gallery.exception.AuthenticationException;**\
  \ **import com.prospringhibernate.gallery.exception.EntityNotFoundException;**\n\
  \n****public class PersonDaoJpa extends GenericDaoJpa<Person> implements PersonDao\
  \ {**\n\n****public PersonDaoJpa () {**\n\n**super(Person.class);**\n\n**}**\n\n\
  ****public Person authenticatePerson(String username, String password)** **throws\
  \ DataAccessException, AuthenticationException {**\n\n****List<Person> results =\
  \ null;**\n\n**Query query = entityManager.createQuery(**\n\n**\"from Person as\
  \ p where p.username = :username and p.password = :password\"**\n\n**);**\n\n**query.setParameter(\"\
  username\", username);**\n\n**query.setParameter(\"password\", password);**\n\n\
  **results = query.getResultList();**\n\n**if (results == null || results.size()\
  \ <= 0) {**\n\n**throw new AuthenticationException(\"No users found\");**\n\n**}\
  \ else {**\n\n**return results.get(0);**\n\n**}**\n\n**}**\n\n****public Person\
  \ getPersonByUsername(String username)**\n\n**throws DataAccessException, EntityNotFoundException\
  \ {**\n\n****List<Person> results = null;**\n\n**Query query = entityManager.createQuery(**\n\
  \n**\"from Person as p where p.username = :username\"**\n\n**);**\n\n**query.setParameter(\"\
  username\", username);**\n\n**results = query.getResultList();**\n\n**if (results\
  \ == null || results.size() <= 0) {**\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n**throw new\
  \ EntityNotFoundException(username + \" not found\");**\n\n**} else {**\n\n**return\
  \ results.get(0);**\n\n**}**\n\n**}**\n\n****}**\n\nSpring 的 **@Repository** 注解在此示例中有三个主要用途：\n\
  \n• 它告诉 Spring 此类可以通过类路径扫描导入。\n• 它是一个标记，让 Spring 知道此类需要 DAO 特定的 **RuntimeException**\
  \ 处理。\n• 我们指定在 Spring 上下文中用于表示此类的名称。通过指定 DAO 应被识别为 **personDao**（使用 **@Repository(\"\
  personDao\")**），我们可以在 Spring 配置的其他地方简单地将其引用为 **personDao**，而不是 **personDaoJpa**。这使我们能够以更小的阻力将底层\
  \ DAO 实现更改为其他实现。\n\n使用 **@Repository** 注解允许我们通过 IDE 搜索快速分组所有 DAO，并且还能让阅读者一眼看出此类是一个\
  \ DAO。\n\n由于我们使用了泛型，**PersonDaoJpa** 实现中剩余的代码简洁明了，并且仅与 **Person** 领域类相关。开发者常常对泛型感到畏惧，但它们可以帮助你避免大量机械重复且毫无价值的工作。\n\
  \n第 4 章 ■ 使用 Hibernate 进行持久化\n\nJPA 实体的生命周期\n\n让我们更仔细地看看 JPA 实际上是如何在内部处理我们的 **Person**\
  \ 实体的。图 4-4 突出了实体可能处于的各种状态、涉及的一些关键方法，以及一些用于拦截调用以通过横切方面修改行为的有用注解。\n\n*图 4-4. JPA\
  \ 实体的生命周期*\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n有五种关键状态：不存在、新建、托管、已删除和游离。此外，还有七个生命周期回调注解。当在你的实体类中实现时，这些回调注解被称为*内部回调方法*。或者，它们可以在给定的实体类外部定义为监听器类。这些被称为*外部回调方法*。你可以实现回调方法的任意子集，或者一个都不实现。你只能将特定的生命周期回调应用于单个方法。你可以通过应用所有适用的注解，在同一个方法上使用多个回调。你也可以在单个实体上同时使用内部回调和外部回调。\n\
  \n外部回调先触发，然后执行内部回调。利用这些回调有很多选择。\n\n■ **注意** 回调方法不应与其他实体对象交互，或调用 **EntityManager**\
  \ 或 **Query** 方法，以避免与仍在进行中的原始数据库操作发生冲突。\n\n让我们通过这五种关键状态，走一遍一个人的虚构生命周期：\n\n• *不存在*：我们从这里开始。\n\
  • *新建*：通过 **Person person = new Person()** 实例化一个新的 person 对象。在此阶段，**person** 对象处于新建状态。它不与任何\
  \ **EntityManager** 关联，并且在数据库中没有对应记录。此外，因为我们为主键使用了自动生成策略，该对象存在于内存中，但没有关联的 ID。再次强调，在集合中管理对象时需要注意这一点，因为如果一个实体的相等性基于其标识符，并且该属性在通过\
  \ Hibernate 持久化时突然从 null 变为一个实际值，那么该实体有可能破坏 **equals()** 和 **hashCode()** 契约。我们将在第\
  \ 5 章更详细地讨论这个问题。\n• *托管*：我们通过调用 **EntityManager.persist()** 来持久化 **person** 实体。如果我们有一个用\
  \ **@PrePersist** 注解的方法，该方法会先执行，然后执行数据库插入操作，之后可选地执行我们已用 **@PostPersist** 注解的任何自定义方法。现在我们的\
  \ **person** 实体处于托管状态。在此状态下，我们的 **person** 实体可能会发生很多事情。例如，我们可以调用 **EntityManager.refresh()**，这将丢弃内存中的对象并从数据库中检索一份新的副本，并可选择利用\
  \ **@PostLoad** 回调。或者，我们可以通过 **EntityManager.remove()** 删除该实体，这将导致调用 **@PreRemove**。\n\
  • *已删除*：一旦记录从数据库中删除，该实体就处于已删除状态，等待执行用 **@PostRemove** 注解的方法，然后返回到不存在状态。\n\n\n\n\
  • *游离态*：当对象不再与**EntityManager**或持久化上下文关联时，即进入游离态。游离对象通常从持久化层返回至 Web 层，并以某种形式展示给最终用户。可以对游离对象进行修改，但这些修改在实体重新与持久化上下文关联之前，不会持久化到数据库中。\n\
  \n第 4 章 ■ 使用 Hibernate 进行持久化\n\nJPA 配置\n\n还有几个待解决的问题。在拥有一个完整可运行的系统之前，我们需要完成以下工作：\n\
  \n• 设置一个能够识别**Person**领域对象的 JPA 环境。\n\n• 配置数据库连接。\n\n• 管理系统的事务。\n\n• 将所有内容注入到 DAO\
  \ 中。\n\n我们将首先从 JPA 端进行设置，然后处理 Spring 端的配置。\n\n最简 JPA 设置\n\nJPA 要求你创建一个**META-INF/persistence.xml**文件。我们将设置最简单的配置：\n\
  \n**<persistence**\n\n****xsi:schemaLocation = \"http://java.sun.com/xml/ns/persistence**\
  \ **http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"**\n\n**version=\"\
  2.0\">**\n\n****<persistence-unit name=\"galleryPersistenceUnit\" transaction-type=\"\
  RESOURCE_LOCAL\"/>**\n\n****</persistence>**\n\n这将创建一个名为**galleryPersistenceUnit**的持久化单元。建议你以能够表达与特定数据库关系的方式来命名持久化单元，以便日后可以轻松地集成更多数据存储，而不会使\
  \ Bean 定义变得过于混乱。默认情况下，所有标记为**@Entity**的类都将被添加到此持久化单元中。\n\n现在我们已经启动并运行了 JPA，需要让 Spring\
  \ 配置知道**persistence.xml**的存在。接下来我们将进行设置。\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\n**更多 JPA\
  \ 配置选项**\n\n在**persistence.xml**文件中，你可以选择性地配置要为特定单元包含哪些类，但这通常仅在更复杂的场景下才需要，例如在单个应用程序中管理多个数据库。当你确实需要将实体映射到特定的**persistence-unit**时，请像这样向**persistence.xml**添加**<class>**元素：\n\
  \n**<persistence**\n\n****xsi:schemaLocation=\"http://java.sun.com/xml/ns/persistence**\
  \ **http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"**\n\n**version=\"\
  2.0\">**\n\n**<persistence-unit name=\"galleryPersistenceUnit\" transaction-type=\"\
  RESOURCE_LOCAL\">**\n\n**<class>**\n\n**com.prospringhibernate.gallery.domain.Person**\n\
  \n**</class>**\n\n**</persistence-unit>**\n\n**</persistence>**\n\n此外还有映射文件的概念。你可以不内联定义类，而是声明一个映射文件，并在**persistence.xml**文件的**<mapping-file>**元素中引用它。该文件允许你声明实体类，甚至可以覆盖映射配置，例如列名和检索\
  \ ID 的机制。这种方法还允许你映射没有任何 JPA 注解的类。\n\n**persistence.xml**也可用于定义实现特定的属性，例如 Hibernate\
  \ 属性。Spring 的 JPA 配置要求你在**persistence.xml**的**<properties><property>**元素中配置这些属性。不幸的是，这意味着除非你使用更复杂的构建脚本，否则无法将特定于环境的配置细节放入\
  \ Spring 属性文件中。\n\nJPA 具有极高的可配置性和丰富的功能。有关**persistence.xml**配置文件的更多详细信息，请参阅专门讨论此主题的书籍，例如\
  \ Mike Keith 和 Merrick Schincariol 合著的《Pro JPA 2: Mastering the Java Persistence\
  \ API》（Apress，2009 年）。\n\n第 4 章 ■ 使用 Hibernate 进行持久化\n\nSpring 集成\n\n我们需要一种在 Spring\
  \ **ApplicationContext**中创建可用**EntityManager**的方法。按照典型的 Spring 风格，配置 JPA 的方法不止一种。以下是一些选项：\n\
  \n\n\n• **LocalEntityManagerFactoryBean** 使用 JPA 的 Java SE 引导方式。\n\n**LocalEntityManagerFactoryBean**\
  \ 要求 JPA 提供者（例如 Hibernate 或 OpenJPA）自行设置所需的一切，包括数据库连接和提供者特定的加载时织入配置。该 Bean 的配置如下所示：\n\
  \n**<bean id=\"entityManagerFactory\"**\n\n**class=\"org.springframework.orm.jpa.LocalEntityManagerFactoryBean\"\
  >**\n\n**<property name=\"persistenceUnitName\" value=\"galleryPersistenceUnit\"\
  />**\n\n**</bean>**\n\n• 如果你有一个 Java EE 容器并希望使用 EJB 3，可以利用 Spring 内置的 JNDI 查找功能：\n\
  \n**<jee:jndi-lookup id=\"entityManagerFactory\" jndi-name=\"persistence/galleryPersistenceUnit\"\
  />**\n\n• Spring JPA 的 **LocalContainerEntityManagerFactoryBean** 相比前两种方式需要更多的 Spring\
  \ 配置，但它也提供了最强大的 Spring 功能。配置 **LocalContainerEntityManagerFactoryBean** 需要你配置数据源和\
  \ JPA 供应商特定的适配器，以便通用的 Spring JPA 配置能够为每个供应商设置所需的额外内容。这也是本章将采用的方法。\n\n我们将使用之前提到的一些通用\
  \ Spring 配置，同时还会利用组件扫描来告诉 Spring 自动创建特定包中的 DAO。\n\n让我们在 **src/main/resources/META-INF/spring**\
  \ 目录下创建一个名为 **spring-jpa.xml** 的文件。该文件将包含 **LocalContainerEntityManagerFactoryBean**、数据源、JPA\
  \ 事务管理器以及基于注解的事务。我们将从 Spring 文件的命名空间配置开始编写 **spring-jpa.xml** 文件。我们会用到一系列 Spring\
  \ 命名空间来配置 JPA。\n\n**<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>**\n\
  \n**<beans**\n\n********xsi:schemaLocation=\"http://www.springframework.org/schema/beans**\
  \ **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd** **http://www.springframework.org/schema/tx**\
  \ **http://www.springframework.org/schema/tx/spring-tx-3.0.xsd\">**\n\n**<!-- 其余配置见下文\
  \ -->**\n\n**</beans>**\n\n第 4 章 ■ 使用 Hibernate 实现持久化\n\n这告诉 XML 解析器我们希望在配置中使用以下模式：\n\
  \n• 默认的 Spring **beans** 模式\n\n• **p** 模式，用于简化属性设置的冗长写法\n\n• **tx** 模式，用于事务管理\n\n\
  由于我们使用了 **p** 命名空间，可以更简洁地配置 Spring 值。例如，使用 **p:url** 与使用 **<property name=\"url\"\
  \ value=\"…\">** XML 片段效果相同。你还可以使用 **p** 命名空间来创建引用。\n\n接下来，让我们设置一个内存中的 H2 数据库数据源：\n\
  \n**<bean id=\"dataSource\"**\n\n**class=\"org.apache.commons.dbcp.BasicDataSource\"\
  **\n\n**destroy-method=\"close\"**\n\n**p:driverClassName=\"org.h2.Driver\"**\n\n\
  **p:url=\"jdbc:h2:mem:gallery;DB_CLOSE_DELAY=-1\"**\n\n**p:username=\"sa\"**\n\n\
  **p:password=\"\"/>**\n\n显然，你并非必须使用内存数据库。获取数据源的方式还有很多，包括 JNDI 查找和连接池。\n\n我们使用 **LocalContainerEntityManagerFactoryBean**，它会根据\
  \ JPA 的独立引导契约创建 JPA **EntityManager**。这是设置完全由 Spring 管理的 JPA **EntityManagerFactory**\
  \ 的方式：\n\n**<bean id=\"entityManagerFactory\"**\n\n**class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
  **\n\n**p:dataSource-ref=\"dataSource\"/>**\n\n**LocalContainerEntityManagerFactoryBean**\
  \ 可以使用 Spring 管理的数据源以及一些 Hibernate 特定的属性，例如 **showSql**、**generateDdl** 和 **databasePlatform**。\n\
  \n我们的 **@Repository** 注解会因 Spring 的组件扫描而被识别。回想一下，我们在 **spring-master.xml** 文件中设置了组件扫描，如下所示：\n\
  \n**<context:component-scan base-package= *\"com.prospringhibernate\"*** **>**\n\
  \n**<context:exclude-filter type= *\"annotation\"***\n\n\n\n****expression= *\"\
  org.springframework.stereotype.Repository\"*** **/>****\n\n*****</context:component-scan>**\n\
  \n该指令将确保 Spring 加载并管理我们应用程序中的所有 DAO 类。在此过程中，Spring 会将正确的 **EntityManager** 实例注入到相应的\
  \ DAO 中，正如 **@PersistenceContext** 注解所表达的那样。\n\n以下设置允许我们的环境执行 JPA 事务。我们的 JPA 应用程序要能够更新数据，就需要这个非常基础的配置。\n\
  \n第 4 章 ■ 使用 Hibernate 进行持久化\n\n**<bean id=\"transactionManager\"**\n\n**class=\"\
  org.springframework.orm.jpa.JpaTransactionManager\"**\n\n**p:entityManagerFactory-ref=\"\
  entityManagerFactory\"/>**\n\n****<tx:annotation-driven mode=\"aspectj\" transaction-manager=\"\
  transactionManager\"/>** 如你所见，JPA 配置涉及的内容相当多，但考虑到它所带来的强大功能，这些努力绝对是值得的！\n\n总结\n\n\
  像 Spring 和 Hibernate 这样的框架提供了一种解决复杂企业级挑战的方法。\n\nEJB 2.0 与 Spring 和 Hibernate 这类框架之间的关键区别在于，这种复杂性是一种你可以选择是否使用的选项，而不是你被迫接受的框架架构中不可或缺的组成部分。\n\
  \n在本章中，我们回顾了历史，了解了持久化在 Java 生态系统中的演变过程，现在你对相关术语以及规范与实现之间的区别有了更清晰的理解。你已经了解到，可以构建一个使用多种规范与实现组合的应用程序。例如，你可以构建一个单一的应用程序，它使用\
  \ EJB 3.0 作为基于分布式组件的架构，使用 JPA 进行持久化，并以 Hibernate 作为 JPA 的实现。你还对我们艺术画廊示例应用程序所依赖的领域模型和\
  \ DAO 结构有了初步了解。最后，你学到了很多关于在 Spring 环境中设置 JPA 应用程序的知识。现在，你已经掌握了足够的信息来让一个 JPA 应用程序运行起来。\n\
  \n在下一章中，我们将继续为我们的艺术画廊应用程序构建领域模型。\n\n**第 5 章**\n\n■ ■ ■\n\n**领域模型基础**\n\n领域模型是构建持久化层的基础。每个领域类定义了要持久化到数据库的属性，以及一个类与另一个类之间的关系。这种丰富的面向对象结构并不容易转换为关系型的数据库世界。\n\
  \nHibernate 提供了必要的机制来帮助解决这两个领域之间的阻抗不匹配问题。\n\n映射是一个过程，通过这个过程，你向 Hibernate 提供提示，说明你的领域类中的属性和引用如何转换为数据库中的表、字段和关联。\n\
  \n当 Hibernate 首次出现时，开发者使用 XML（称为 **.hbm.xml** 文件）来指定领域模型的映射规则。随着 JPA 规范的发布，出现了一系列可以应用于领域类的注解，它们提供了与\
  \ XML 映射文件类似的提示。\n\nHibernate 的优势在于开发者可以轻松地开始构建持久化层。第一步通常是使用简单的 JavaBean（或 POJO）来定义你的领域模型。在上一章中，我们介绍了构成我们应用程序领域模型基础的几个核心类。在本章中，我们将以此为基础，引入一些额外的类。\n\
  \n理解关联\n\n在第 4 章中，我们介绍了我们的艺术画廊领域模型，并创建了 **Person** 实体。我们提到 **ArtEntity** 类将代表我们画廊应用程序中的艺术品、图像和照片。我们还提到，我们的领域模型将包含一个\
  \ **Comment** 类，它将代表关于特定 **ArtEntity** 的单个评论。\n\n一个 **ArtEntity** 自然包含多个评论，以允许无限数量的网站访问者对他们正在观看的特定艺术品添加自己的评论。尽管一个\
  \ **ArtEntity** 可能包含许多 **Comment** 实例，但一个给定的 **Comment** 只能引用一个 **ArtEntity**，因为通常一条评论旨在关联画廊应用程序中的特定内容。\n\
  \n**ArtEntity** 与其 **Comment** 实例之间的关联最好描述为 *一对多* 关系。反过来，**Comment** 与其关联的 **ArtEntity**\
  \ 之间的关系被称为 *多对一* 关联。由于每个实体都能够引用另一个实体，因此这种关联被认为是 *双向的*。如果一个实体能够引用另一个实体，但反过来不成立，则这被认为是\
  \ *单向的* 关联。\n\n你应该使用单向关联还是双向关联取决于你的应用程序。\n\n然而，如果你没有使用双向关联的特定需求，坚持使用单向方法会更简单，因为双向关联可能需要循环引用，并最终使编组或序列化实现复杂化。\n\
  \n第 5 章 ■ 领域模型基础\n\n即使 ORM 抽象通常为我们处理这些细节，但考虑领域模型及其关系将如何转换为数据库模式始终很重要。**ArtEntity**\
  \ 和 **Comment** 关联需要两个表：一个 **Art_Entity** 表和一个 **Comment** 表。然后，一个 **ArtEntity**\
  \ 实例将通过 **Comment** 表中指向 **Art_Entity** 的外键引用与一个 **Comment** 关联，如图 5-1 所示。\n\n*图\
  \ 5-1\\. ArtEntity 表与 Comment 表之间的关系* 我们的画廊应用程序还需要一个 **Category** 类来表示一个类别，特定的 **ArtEntity**\
  \ 可以被放入其中（以帮助将艺术品和照片组织成逻辑组）。每个 **Category** 可能包含多个 **ArtEntity** 实例。同样，每个 **ArtEntity**\
  \ 可以被放入多个 **Category** 实体中。这种类型的关联通常被称为 *多对多*。多对多关联比一对多关系稍微复杂一些。在数据库中建模这种关系的最佳方式是使用\
  \ *连接表*。连接表仅包含来自两个相关表的外键，允许两个表中的行相互关联。\n\n图 5-2 说明了这种关系。\n\n*图 5-2\\. ArtEntity\
  \ 表与 Category 表之间的关系* 70\n\n第 5 章 ■ 领域模型基础\n\n虽然清楚了解领域模型的表结构很重要，但 Hibernate 可以为你处理这些特定于数据库的细节。相反，你需要专注于类的定义以及它们从面向对象的角度相互关联的方式。\n\
  \n对于定义 Hibernate 领域模型的最佳方式，开发者们有不同的理念。一些开发者认为最好先定义数据库模式，然后创建与数据库结构匹配的类。显然，只要你的应用程序能可靠地工作，这个过程就没有错误的方式。然而，根据我们的经验，我们通过先定义\
  \ Hibernate 映射取得了最佳效果，这使我们能够同时考虑 Java 类和数据库表结构。\n\n随着 JDK 1.5 和 Hibernate 3 的推出，不再需要以\
  \ XML 形式定义 Hibernate 映射文件。当然，你仍然可以继续使用这种更冗长的方法，并且对于许多开发者来说，将数据库映射的细节外部化确实是一件好事。\n\
  \n\n\n然而，很难否认使用 Hibernate 新的注解支持更简单且冗长代码更少这一事实。但使用注解并非你唯一（也未必是最佳）的选择。\n\n构建领域模型\n\
  \n我们已经描述了一些示例应用的核心实体及其对应的关联关系。现在我们已经考虑了这些实体在数据库中的表示方式，接下来开始构建我们的 Java 类。首先定义 **Comment**\
  \ 类：\n\n**@Entity**\n\n**public class Comment implements Serializable {**\n\n****private\
  \ Long id;**\n\n**private String comment;**\n\n**private ArtEntity commentedArt;**\n\
  \n**private Date commentDate;**\n\n**private String firstName;**\n\n**private String\
  \ lastName;;**\n\n**private Integer version;**\n\n****@Id**\n\n**@GeneratedValue**\n\
  \n**public Long getId() {**\n\n**return id;**\n\n**}**\n\n****public void setId(Long\
  \ id) {**\n\n**this.id = id;**\n\n**}**\n\n****@ManyToOne**\n\n**public ArtEntity\
  \ getCommentedArt() {**\n\n**return commentedArt;**\n\n**}**\n\n****public void\
  \ setCommentedArt(ArtEntity commentedArt) {**\n\n**this.commentedArt = commentedArt;**\n\
  \n**}**\n\n第 5 章 ■ 领域模型基础\n\n****@Temporal(TemporalType.TIMESTAMP)**\n\n**public\
  \ Date getCommentDate() {**\n\n**return commentDate;**\n\n**}**\n\n****public void\
  \ setCommentDate(Date commentDate) {**\n\n**this.commentDate = commentDate;**\n\n\
  **}**\n\n****@Version**\n\n**public Integer getVersion() {**\n\n**return version;**\n\
  \n**}**\n\n****public void setVersion(Integer version) {**\n\n**this.version = version;**\n\
  \n**}**\n\n****}**\n\n接下来，定义 **ArtEntity** 类：\n\n**@Entity**\n\n**public class ArtEntity\
  \ implements Serializable {**\n\n****private Long id;**\n\n**private String title;**\n\
  \n**private String subTitle;**\n\n**private Date uploadedDate;**\n\n**private Date\
  \ displayDate;**\n\n**private Integer width;**\n\n**private Integer height;**\n\n\
  **private String media;**\n\n**private String description;**\n\n**private String\
  \ caption;**\n\n**private String imagePath;**\n\n**private Integer version;**\n\n\
  **private Set<Category> categories = new HashSet();**\n\n**private Set<Comment>\
  \ comments = new HashSet();**\n\n****public ArtEntity() {**\n\n**}**\n\n****@Id**\n\
  \n**@GeneratedValue**\n\n**public Long getId() {**\n\n**return id;**\n\n**}**\n\n\
  ****72\n\n第 5 章 ■ 领域模型基础\n\n**public void setId(Long id) {**\n\n**this.id = id;**\n\
  \n**}**\n\n****@Version**\n\n**public Integer getVersion() {**\n\n**return version;**\n\
  \n**}**\n\n****public void setVersion(Integer version) {**\n\n**this.version = version;**\n\
  \n**}**\n\n****@ManyToMany(mappedBy = \"artEntities\")**\n\n**public Set<Category>\
  \ getCategories() {**\n\n**return categories;**\n\n**}**\n\n****public void setCategories(Set<Category>\
  \ categories){**\n\n**this.categories = categories;**\n\n**}**\n\n****@OneToMany**\n\
  \n**public Set<Comment> getComments() {**\n\n**return comments;**\n\n**}**\n\n****public\
  \ void setComments(Set<Comment> comments) {**\n\n**this.comments = comments;**\n\
  \n**}**\n\n****public boolean addCommentToArt(Comment comment) {**\n\n**comment.setCommentedArt(this);**\n\
  \n**return this.getComments().add(comment);**\n\n**}**\n\n****}**\n\n**■ **注意**\
  \ 为简单起见，这些代码清单中的领域对象仅实现了 Serializable。然而，正如我们在前一章中演示的，我们的 **GenericDao** 假定每个领域实体都实现了我们的\
  \ **DomainObject** 标记接口。虽然我们的代码示例遵循了这种方法，但为了便于说明，我们在此处简化了这些清单。\n\n第 5 章 ■ 领域模型基础\n\
  \n为了节省篇幅，我们省略了一些冗余的 getter 和 setter 方法。但你会立刻意识到，我们本质上是在定义一个 JavaBean 或 POJO。其中没有对\
  \ Hibernate 依赖的引用，也没有需要继承的父类。\n\n我们定义了需要持久化到数据库中的属性及其各自的 getter 和 setter 方法。除了适当的\
  \ getter 和 setter 之外，我们还添加了一个 **addCommentToArt(Comment comment)** 方法。这是用于双向关联的便捷方法，因为在关联的两端都设置引用非常重要。在\
  \ **addCommentToArt(Comment comment)** 方法中，我们确保指定的 **comment** 参数被添加到 **ArtEntity**\
  \ 的评论集合中，并且 **comment** 的 **commentedArt** 属性正确地引用了 **ArtEntity** 实例。我们强烈建议在关系的一端创建这种“关联管理”方法，以确保双向关系的两端都被正确设置。\n\
  \n我们的 **Comment** 领域实体也使用了 **@ManyToOne** 注解。这告诉 Hibernate，**commentedArt** 属性将与\
  \ **ArtEntity** 表建立多对一关联。从数据库的角度来看，在 **Comment** 字段上指定 **@ManyToOne** 注解，会在我们的 **Comment**\
  \ 表上添加一个指向 **ArtEntity** 表的外键字段。这也展示了使用 Hibernate 来架构领域模型和数据库模式的一些优势。如果使用 Hibernate\
  \ 来生成数据库模式，它还会为你的关联创建外键约束，以确保数据库的参照完整性不受损害。\n\n约定优于配置\n\nHibernate 注解支持的简洁性源于使用合理的默认值，以及\
  \ Hibernate 能够通过考虑每个 JavaBean 属性的 Java 类型来推断关联和数据库字段类型。当使用 XML 定义映射时，我们必须显式地描述每个属性和关联的细节。而使用\
  \ Hibernate，由于注解嵌入在代码中，我们可以从代码本身获得提示，这极大地简化了配置工作。\n\n正如你在第 4 章中学到的，Hibernate 持久化的关键注解是\
  \ **@Entity**。这个注解告诉 Hibernate 我们打算持久化这个类。如果我们遵循 XML 映射方法，那么就需要在 **hbm.xml** 映射文件中显式定义每个字段。而使用\
  \ Hibernate 注解，只需要定义那些不符合 Hibernate 默认行为的部分。\n\nHibernate 会查看每个属性的 Java 类型和名称，并分别使用这些元数据来定义列的字段类型和字段名称。默认行为是假定所有\
  \ POJO 属性都是可持久化的，但你也可以使用 **@Basic** 注解显式指定此行为。使用 **@Basic** 还提供了一种自定义各种持久化相关方面的方法，例如某个特定属性是否应该被延迟加载。如果你不希望某些字段被持久化，则需要使用\
  \ **@Transient** 注解将这些属性指定为瞬态。\n\n■ **注意** Hibernate 提供了对获取关联的控制，允许相关实体被延迟加载——也就是说，仅在需要时才加载，而不是在从数据库加载原始对象时立即加载。如果使用得当，这能带来显著的性能提升，但如果使用不当，也可能降低性能。我们将在第\
  \ 9 章更详细地介绍延迟加载。\n\n第 5 章 ■ 领域模型基础\n\n除了 **@Transient** 和 **@Basic** 注解之外，你还可以使用\
  \ **@Temporal** 注解来控制基于日期或时间的属性如何映射到数据库。在我们的 **Comment** 类中，我们指定了以下内容来声明一个 **Date**\
  \ 属性在数据库中作为时间戳持久化：\n\n**@Temporal(TemporalType.TIMESTAMP)**\n\n**public Date getCreatedDate()\
  \ {**\n\n**return this.createdDate;**\n\n**}**\n\n\n\n这种“合理默认值”的概念，即*约定优于配置*，确实大大减少了构建和运行领域模型所需的编码量。而\
  \ Hibernate 的注解支持提供了充足的灵活性，以便在你需要时覆盖任何默认行为。例如，如果我们想为 **Comment** 类定义一个与 Java 类名不同的表名，可以通过使用\
  \ **@Table** 注解来实现：\n\n**@Table(name = \"HOGWASH\")**\n\n**class Comment {**\n\n\
  **. . . (方法已省略)**\n\n**}**\n\n类似地，我们可以通过使用 **@Column** 注解，要求 **comment** 属性映射到 **commentText**\
  \ 列：\n\n**@Column(name = \"commentText\")**\n\n**public String getComment() {**\n\
  \n**return this.commentText;**\n\n**}**\n\n这种级别的定制非常有用，但在大多数情况下是不必要且多余的（除非你将领域模型映射到遗留数据库）。\n\
  \n■ **注意** 在覆盖 Hibernate 的任何默认行为之前，你应该有非常充分的理由。如果你觉得需要将 Java 属性映射到不同名称的列，你可能需要重新考虑你的命名约定。现在，列名和\
  \ Java 属性名之间存在差异并非错误，但配置的简洁性非常重要，我们鼓励你尽可能限制对默认行为的覆盖。毕竟，更少的代码意味着更少的维护。\n\n管理实体标识符\n\
  \nHibernate 的注解支持确实要求你定义主键以及所有 JavaBean 的关联。在我们的 **Comment** 类中，我们在 **getId()**\
  \ 方法上方添加了 **@Id** 注解。这个注解告诉 Hibernate，**Comment** 类的 **id** 属性是 **Comment** 实体的标识符（或主键）。\n\
  \n在 **@Id** 注解下方是 **@GeneratedValue** 注解，它指定了如何生成给定实例的标识符。默认值是 **AUTO**，在我们的示例中，这就是\
  \ Hibernate 将使用的标识符生成策略（因为我们根本没有定义策略）。**AUTO** 会查看底层数据库来决定如何创建标识符。选项包括使用序列、标识列或使用特殊表来生成新\
  \ ID。如果你想覆盖默认行为并使用序列，你的 **@GeneratedValue** 注解可能如下所示：\n\n**@GeneratedValue(strategy=GenerationType.SEQUENCE,\
  \ generator=\"COMMENT_ID_SEQ\")** 这将创建一个名为 **COMMENT_ID_SEQ** 的序列，用于为我们的 **Comment**\
  \ 表生成新 ID。Hibernate 为领域类的标识符提供了更多选项，包括基于 UUID 的生成，或者直接允许你的应用程序自行分配标识符。\n\n■ **注意**\
  \ 当使用 **AUTO** 模式进行 ID 生成时，Hibernate 会根据你使用的数据库选择理想的策略。然而，对于许多数据库，Hibernate 最终会创建一个单一的序列，用于所有表。这可能会变得有点混乱，我们经常发现为每个表创建显式序列会更清晰一些。如果你的领域模型具有一定复杂性，我们建议为每个表或类指定不同的序列。\n\
  \n使用级联选项建立数据关系\n\n领域模型中的关联表示不同领域实体如何相互关联。通常，这些关系可以用通俗的术语表示为*父子关系*，这意味着一个实体拥有或封装了另一个实体的集合。在数据库中，关联通过表连接来表示，但没有明确的类比来表示我们在\
  \ Java 中拥有的更层次化的关系。这就是 Hibernate 发挥作用的地方。级联选项有助于建立父子关系，或者更准确地说，是建立规则，规定应用于一个实体的操作（如保存和删除）应如何*级联*到关联的实体。这个概念通常被称为*传递持久性*。\n\
  \n例如，在我们的画廊应用程序中，我们会断言 **ArtEntity** 拥有一个 **Comment** 实例的集合。这是合乎逻辑的，因为一个 **Comment**\
  \ 是*附加*到特定的 **ArtEntity** 实例上的。最终用户可以对特定图片发表评论，而这条评论通常只与它所发布的图片相关。此外，如果一个 **ArtEntity**\
  \ 实例被删除，那么保留其相关的 **Comment** 实例也就没有意义了。本质上，评论是 **ArtEntity** 的子项。\n\n由于评论可以被视为 **ArtEntity**\
  \ 的子项，我们可以断言，对 **ArtEntity** 调用的保存操作也应该级联到与该 **ArtEntity** 实例关联的任何新增或更新的 **Comment**\
  \ 实例。此外，如果 **ArtEntity** 被删除，我们希望删除操作也级联到任何关联的 **Comment** 实例。我们可以使用以下注解来表示这些级联规则：\n\
  \n**@OneToMany(orphanRemoval = true, cascade = { javax.persistence.CascadeType.*ALL***\
  \ **})** **public Set<Comment> getComments() {**\n\n**return comments;**\n\n**}**\n\
  \n在这种情况下，我们将 **orphanRemoval** 设置为 **true**，这还将确保任何被解除引用的评论也会被删除。我们还指定了 **CascadeType**\
  \ 为 **SAVE_UPDATE**，这将确保对 **ArtEntity** 实例调用的保存和更新操作也会传递给子 **Comment** 实例。\n\n添加二级缓存\n\
  \nHibernate 允许实体以及关联集合（一组评论）被隐式缓存。启用缓存后，Hibernate 会首先尝试在缓存中查找实体或集合，然后再尝试查询数据库。由于从缓存加载数据的成本远低于执行数据库操作，因此缓存是提高应用程序性能的另一种有效策略。\n\
  \nHibernate 集成了多个缓存框架，例如 Ehcache，并且如果你想要添加自己的缓存解决方案，它还提供了一个 **CacheManager** 接口。一旦集成，缓存就会隐式发生，除了为每个实体和集合指定缓存规则外，不需要任何额外的编码。\n\
  \n为了在我们的领域模型上启用基本缓存，我们可以将以下注解添加到每个领域实体及其对应的集合上，以确保它们被适当地缓存：\n\n**@Entity**\n\n**@Cache(usage\
  \ = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)**\n\n**public class ArtEntity\
  \ implements Serializable {**\n\n****. . . 方法已省略 . . .**\n\n****@OneToMany(orphanRemoval\
  \ = true, cascade = { javax.persistence.CascadeType.*ALL*** **})**\n\n**@Cache(usage\
  \ = CacheConcurrencyStrategy.*NONSTRICT_READ_WRITE*)** **public Set<Comment> getComments()\
  \ {**\n\n**return comments;**\n\n**}**\n\n****public void setComments(Set<Comment>\
  \ comments) {**\n\n**this.comments = comments;**\n\n**}**\n\n****. . . 方法已省略 . .\
  \ .**\n\n****}**\n\n指定读写缓存策略可确保 Hibernate 在特定领域实例被更新时使缓存失效。这可以防止缓存中存储过时数据。\n\n\n\
  \nHibernate 提供了三种缓存选项：域缓存、集合缓存和查询缓存。前面的示例中演示了域缓存和集合缓存，因为我们为顶级域实体以及评论关联指定了 **@Cache**\
  \ 注解。\n\n应使用与所选缓存实现相对应的配置文件来调整缓存细节。如果使用 Ehcache，你可以在 **ehcache.xml** 文件中按域配置具体参数，例如生存时间和缓存大小。\n\
  \n我们将在第 9 章更详细地介绍缓存策略。\n\n第 5 章 ■ 域模型基础\n\n在 Hibernate 中使用多态\n\n对于我们的画廊应用程序，我们需要再添加几个类来为画廊的所有功能提供持久化细节。快速回顾一下，以下是当前域模型的概览：\n\
  \n• **Person**：代表我们画廊应用程序的管理员用户或注册用户。\n\n• **Exhibition**：将图像集合组织成逻辑组。\n\n• **ArtEntity**：代表应用程序中的一张图像，包含图像的元数据及其位置。\n\
  \n• **Comment**：代表与特定 **ArtEntity** 实例相关的单条评论。\n\n我们的 **ArtEntity** 类表示图像的基本元数据，但如果我们需要以不同分辨率存储图像，例如缩略图、中等分辨率版本和高分辨率版本，该怎么办？我们当然可以在\
  \ **ArtEntity** 类中插入额外的字段，但 Hibernate 提供了一个更简洁的解决方案。\n\n像 Hibernate 这样的 ORM 解决方案远不止于将数据库字段映射到域模型实例。\n\
  \nHibernate 还支持面向对象的概念，例如多态，这是建立共享一组核心属性和功能的域对象层次结构的有效方法。\n\n与其直接在 **ArtEntity**\
  \ 类中存储图像路径，不如将这些数据重构到一个名为 **ArtData** 的独立基类中。然后，我们将创建三个子类，每个子类都继承 **ArtData** 类（因此共享其属性），但专门用于表示特定类型的图像。\n\
  \n我们将定义以下四个新的域类：\n\n• **ArtData**：大部分属性将存储在此处，因为它是基类。\n\n• **ArtData_Gallery**：此类用于表示画廊列表页面中图像的标准视图。\n\
  \n• **ArtData_Thumbnail**：此类用于表示缩略图。\n\n• **ArtData_Storage**：**此类将持久化图像的高分辨率版本，适用于存档或放大查看。**\n\
  \n****■ **注意** 我们不会在此处包含域模型的全部源代码。如果你想跟着学习，可以下载本章的示例代码。\n\nHibernate 提供了四种不同的多态实现选项：*隐式多态*：此选项使用\
  \ Java 继承结构，但不需要这些结构细节影响数据库模式。换句话说，使用隐式多态，你将能够查询父类，并且 Hibernate 会针对指定 Java 类层次结构中的所有表发出\
  \ select 查询。虽然此策略允许你利用 Java 类中固有的多态结构而不影响数据库，但这种类型的查询可能效率较低，因为 Hibernate 必须做更多繁重的工作来将不同的表转换为连贯的类层次结构，而无法有效地利用数据库。其他多态策略在某种程度上依赖数据库来划分\
  \ Java 层次结构中类之间的关联。\n\n*每个层次结构一张表*：此选项将类层次结构的所有属性合并到单个表中，使用*鉴别器字段*来帮助确定数据库中的每一行代表哪种\
  \ Java 类型。鉴别器只是一个表列，其值用于指定该特定行应与哪个类关联。这种方法的优点是层次结构中任何类所需的所有字段都包含在单个表中，无需数据库连接的开销。缺点是设计不够规范化，并且对于任何给定的类型，都可能存在不会被使用的字段。这可能会对数据库模式施加限制，例如阻止你指定非空约束。\n\
  \n由于层次结构中不同类的字段需求不同，并且它们都共享在单个表中，因此你必须将模式简化为最低公分母。\n\n*每个子类一张表*：使用此选项，层次结构中的每个 Java\
  \ 类都由不同的表表示。与父类相关的属性持久化到单个表中。每个子类特有的特定属性存储在其自己的数据库表中。然后，通过父表和子表之间的连接来表示层次结构中的特定子类。这种方法的优点是设计干净且规范化，因为共享属性存储在单个父表中，只有子类特定的属性被隔离到它们自己的子类表中。\n\
  \n然而，虽然从关系数据库建模的角度来看更清晰，但你应该考虑因需要连接表而导致的性能损失。\n\n*每个具体类一张表*：此选项要求每个未声明为抽象的 Java\
  \ 类都由其自己的表表示。子类不作为多个表之间的连接来实现。相反，每个类的所有属性——包括从父类继承的属性——都持久化到它们自己的表中。这显然需要一些冗余，因为类层次结构中的相同字段将出现在每个映射的表中。\n\
  \n然而，Hibernate 可以通过利用映射到特定类层次结构的所有表上的 SQL 联合来更有效地实现多态查询。\n\n缺点是数据库模式中的冗余和冗长性增加。此外，Hibernate\
  \ 对使用此多态方法映射的表的 ID 生成策略施加了限制。\n\n使用哪个选项实际上取决于你的域模型。如果类层次结构中的类之间差异不大，那么每个层次结构一张表的选项可能最有意义。\n\
  \n在我们的案例中，我们将采用这种策略。\n\n让我们看一下基类 **ArtData** 实体：\n\n第 5 章 ■ 域模型基础\n\n**@Entity**\n\
  \n**@Inheritance(strategy=InheritanceType.SINGLE_TABLE)**\n\n**@DiscriminatorColumn(discriminatorType\
  \ = DiscriminatorType.STRING)**\n\n**@DiscriminatorValue(\"GENERIC\")**\n\n**public\
  \ class ArtData implements DomainObject {**\n\n****private Long id;**\n\n**private\
  \ byte[] picture;**\n\n**private Integer version;**\n\n****public ArtData() {**\n\
  \n**}**\n\n****public ArtData(byte[] picture) {**\n\n**this.picture = picture;**\n\
  \n**}**\n\n****@Id**\n\n**@GeneratedValue**\n\n**public Long getId() {**\n\n**return\
  \ id;**\n\n**}**\n\n****public void setId(Long id) {**\n\n**this.id = id;**\n\n\
  **}**\n\n****public byte[] getPicture() {**\n\n**return picture;**\n\n**}**\n\n\
  ****public void setPicture(byte[] picture) {**\n\n**this.picture = picture;**\n\n\
  **}**\n\n****@Version**\n\n**public Integer getVersion() {**\n\n**return version;**\n\
  \n**}**\n\n****public void setVersion(Integer version) {**\n\n**this.version = version;**\n\
  \n**}**\n\n****}**\n\n这个类的大部分内容应该看起来很熟悉。你会注意到标准的 JavaBean 约定以及核心的 Hibernate 注解。让我们重点关注模型中启用继承的注解。\n\
  \n\n\n**@Inheritance** 注解告诉 Hibernate 我们要使用继承，并且正在定义基类。\n\n第 5 章 ■ 领域模型基础\n\n**@Inheritance(strategy=InheritanceType.SINGLE_TABLE)**\n\
  \n我们还指定了打算使用“每个层次结构一张表”的策略（这意味着我们希望将整个层次结构中的所有字段持久化到单个表中）。\n\n**@DiscriminatorColumn**\
  \ 注解向 Hibernate 提供了关于鉴别器的详细信息。\n\n如前所述，鉴别器为 Hibernate 提供了推断特定数据库行对应哪个 Java 类型所需的线索。在我们的示例中，我们将鉴别器列定义为\
  \ **String** 类型。我们也可以使用 **char** 或 **Integer** 类型。\n\n最后，我们通过 **@DiscriminatorValue**\
  \ 注解定义了每个类型将使用的鉴别器值。对于 **ArtData** 基类，我们指定值为 **GENERIC**。因此，对于每个持久化到数据库的 **ArtData**\
  \ 实例，Hibernate 会将鉴别器列设置为 **GENERIC** 值。\n\n接下来，我们必须定义从 **ArtData** 基类继承的类。在我们的场景中，每个类彼此非常相似，但继承提供了一种清晰的方式来分类图库应用程序中不同类型的图像。此外，如果我们需要定义仅与特定图像类型相关的额外元数据（例如缩略图的宽高比或\
  \ **ArtData_Storage** 类的存档详细信息），这种方法也提供了未来的扩展点。\n\n以下是我们的 **ArtData_Thumbnail**\
  \ 类：\n\n**@Entity**\n\n**@DiscriminatorValue(\"THUMBNAIL\")**\n\n**public class\
  \ ArtData_Thumbnail extends ArtData {**\n\n****public ArtData_Thumbnail(byte[] picture)\
  \ {**\n\n**this.setPicture(picture);**\n\n**}**\n\n****public ArtData_Thumbnail()\
  \ {**\n\n**}**\n\n****}**\n\n这是一个相当简单的类。但请注意，我们设置了鉴别器值为 **THUMBNAIL**。\n\n让我们再次查看我们的\
  \ **ArtEntity** 类，现在已应用了所有重构：\n\n**@Entity**\n\n**public class ArtEntity implements\
  \ DomainObject {**\n\n****private Long id;**\n\n**private Integer version;**\n\n\
  **private ArtData_Gallery galleryPicture;**\n\n**private ArtData_Storage storagePicture;**\n\
  \n**private ArtData_Thumbnail thumbnailPicture;**\n\n**private Set<Category> categories\
  \ = new HashSet();**\n\n**private Set<Comment> comments = new HashSet();**\n\n****public\
  \ ArtEntity() {**\n\n**}**\n\n**81\n\n第 5 章 ■ 领域模型基础\n\n****@Id**\n\n**@GeneratedValue**\n\
  \n**public Long getId() {**\n\n**return id;**\n\n**}**\n\n****public void setId(Long\
  \ id) {**\n\n**this.id = id;**\n\n**}**\n\n******@Version**\n\n**public Integer\
  \ getVersion() {**\n\n**return version;**\n\n**}**\n\n****public void setVersion(Integer\
  \ version) {**\n\n**this.version = version;**\n\n**}**\n\n****@OneToOne(cascade\
  \ = CascadeType.ALL)**\n\n**@JoinColumn()**\n\n**public ArtData_Gallery getGalleryPicture()\
  \ {**\n\n**return galleryPicture;**\n\n**}**\n\n****public void setGalleryPicture(ArtData_Gallery\
  \ pic) {**\n\n**this.galleryPicture = pic;**\n\n**}**\n\n****@OneToOne(cascade =\
  \ CascadeType.ALL)**\n\n**@JoinColumn()**\n\n**public ArtData_Storage getStoragePicture()\
  \ {**\n\n**return storagePicture;**\n\n**}**\n\n****public void setStoragePicture(ArtData_Storage\
  \ pic) {**\n\n**this.storagePicture = pic;**\n\n**}**\n\n****@OneToOne(cascade =\
  \ CascadeType.ALL)**\n\n**@JoinColumn()**\n\n**public ArtData_Thumbnail getThumbnailPicture()\
  \ {**\n\n**return thumbnailPicture;**\n\n**}**\n\n****public void setThumbnailPicture(ArtData_Thumbnail\
  \ pic) {**\n\n**this.thumbnailPicture = pic;**\n\n**}**\n\n****82\n\n第 5 章 ■ 领域模型基础\n\
  \n**@ManyToMany(mappedBy = \"artEntities\")**\n\n**public Set<Category> getCategories()\
  \ {**\n\n**return categories;**\n\n**}**\n\n****@OneToMany(orphanRemoval = true,\
  \ cascade = { javax.persistence.CascadeType. *ALL*** **})**\n\n**@Cache(usage =\
  \ CacheConcurrencyStrategy. *NONSTRICT_READ_WRITE*)** **public Set<Comment> getComments()\
  \ {**\n\n**return comments;**\n\n**}**\n\n****public void setComments(Set<Comment>\
  \ comments) {**\n\n**this.comments = comments;**\n\n**}**\n\n****}**\n\n\n\n请注意，我们现在已经为\
  \ **thumbnailPicture**、**galleryPicture** 和 **storagePicture** 属性定义了一些一对一关系。为了简化代码，我们定义了三个独立的一对一关联。然而，我们也可以选择将所有\
  \ **ArtData** 实体放入一个集合中，并使用 **ArtData** 基类的泛型类型。由于每种图像类型都由不同的子类表示，因此区分不同的图像类型会很容易。\n\
  \n另外，请注意，我们为 **categories** 属性定义了一个到 **Category** 类的多对多关联。我们在此添加了 **mappedBy** 提示，以表明此关系的反向端由\
  \ **Comment** 类中的 **artEntities** 属性引用。对于双向多对多关联，我们需要告诉 Hibernate 哪一端是集合的所有者。通过在\
  \ **Comment** 类中添加 **mappedBy** 属性，我们断言 **Category** 类拥有该关系。\n\n**重写 EQUALS 和 HASHCODE**\n\
  \n在简单场景中，Hibernate 能够维护实体等价性，而无需对域对象本身进行任何特殊更改。但是，如果您的应用程序要求将实体添加到 Java 集合（例如 `java.util.Set`），或者您计划处理分离实体，则可能需要为您的域对象重写默认的\
  \ `equals()` 和 `hashCode()` 方法。\n\nHibernate 只能在单个 EntityManager 范围内维护实体等价性。如果您尝试重新附加一个分离实体，Hibernate\
  \ 将无法再做出相同的保证。解决此问题的方法是为每个域对象重写 `equals()` 和 `hashCode()`，提供能够反映其在数据库中身份的相等性规则。\n\
  \n最简单的方法是使用实体的标识符来确定相等性并生成其哈希码。\n\n但是，如果您计划使用生成的标识符策略，这可能会产生负面影响。\n\n当首次创建对象时，它将具有一个默认的空标识符。如果您尝试将此新创建的实体添加到\
  \ `java.util.Set`，然后稍后保存此实例，则调用 `EntityManager.save()` 将触发为该实体生成标识符。但是，由于您将 `equals`\
  \ 和 `hashCode` 基于对象的标识符，您将遇到对象 `hashCode` 突然改变的情况。这种改变破坏了许多 Java 集合类型（例如 `Set`）的约定，并可能导致应用程序中出现意外行为。\n\
  \n第 5 章 ■ 域模型基础\n\n有两种方法可以解决此问题：\n\n*   不要使用生成的标识符策略（而是在首次实例化域对象时分配实体标识符）\n*   将\
  \ `equals()` 和 `hashCode()` 基于业务相等性，而不是行相等性\n\n使用分配的标识符策略并不太难，但可能会对您的应用程序施加一些限制。\n\
  \n通常，推荐的方法是使用域对象关键属性的值来生成 `equals()` 和 `hashCode()`——具体来说，就是从业务逻辑角度定义对象唯一性的属性。\n\
  \n以下是 **Category** 域对象的自定义 `equals` 和 `hashCode` 示例：\n\n**@Override**\n\n**public\
  \ boolean equals(Object o) {**\n\n**if (this == o) return true;**\n\n**if (!(o instanceof\
  \ Category)) return false;**\n\n****Category category = (Category) o;**\n\n**if\
  \ (categoryName != null ?**\n\n**!categoryName.equals(category.categoryName) : category.categoryName\
  \ != null) {**\n\n**return false;**\n\n**} else {**\n\n**return true;**\n\n**}**\n\
  \n**}**\n\n****@Override**\n\n**public int hashCode() {**\n\n**return categoryName\
  \ != null ? categoryName.hashCode() : 0;**\n\n**}**\n\n总结\n\n在本章中，我们介绍了使用 Hibernate\
  \ 定义域模型的基础知识。您了解了映射过程，以及如何使用注解为 Hibernate 提供适当的线索，以有效地将面向对象的域类映射到关系数据库。\n\n我们还研究了关联映射，区分了\
  \ Hibernate 提供的各种基数选项。这些细节——例如是使用多对多还是一对多关联——对您的域模型设计以及最终的数据库模式都有重大影响。此外，仔细考虑关联应该是单向的还是双向的也很重要。虽然双向关联通常是简化引用遍历和访问所必需的，但此选项可能会在循环依赖方面产生后果，从而可能使编组实现复杂化。\n\
  \nHibernate 提供了一个称为级联的强大功能，它允许您将对一个实体应用的操作与其子实体关联起来，以便这些操作可以级联。此功能对于确保子实体与其父实体的状态和生命周期保持同步非常有用。\n\
  \n**第 6 章**\n\n■ ■ ■\n\n**DAO 与查询**\n\n如果说域模型是持久化层的基础，那么 DAO 层就可以被视为引擎。正如您在之前章节中学到的，DAO\
  \ 模式旨在抽象底层的持久化功能，包括创建、读取、更新和删除实体。但 DAO 通常提供的不仅仅是基本的 CRUD 功能。\n\n反映应用程序核心实体访问能力的专用查询通常被嵌入到\
  \ DAO 层中。例如，由于我们的画廊应用程序要求最终用户能够查看特定类别中的一系列图像，因此 DAO 类应提供按指定 **Category** 查询和加载相关\
  \ **ArtEntity** 域对象的能力。换句话说，您可以将应用程序的 DAO 类视为服务层用来为应用程序提供必要持久化相关功能的构建块。我们将在下一章讨论服务层，但请记住，服务层通常封装了应用程序的业务逻辑，并依赖\
  \ DAO 层来完成持久化的“脏活累活”。\n\nDAO 模式被认为是最佳实践的原因之一是它有助于将持久化实现细节（和技术）从 DAO 接口中抽象出来。这允许应用程序开发人员确定特定\
  \ DAO 的方法和特性，并将这些细节提取到接口中。然后，DAO 接口成为实际持久化实现和服务层之间的集成枢纽——即底层持久化功能的联系人。这是 Spring\
  \ 可以帮助解耦这些组件的另一个领域。\n\n在本章中，我们将为我们的艺术画廊应用程序构建一些 DAO 类，并了解如何使用 Hibernate 和 JPA 提供给我们的各种查询机制，例如\
  \ Hibernate 查询语言（HQL）、Java 持久化查询语言（JPQL）和 Criteria API。\n\n一个基本的 Hibernate DAO 实现\n\
  \n要开始我们的第一个 DAO 实现，我们将转向 Spring 的 **HibernateTemplate**。这个支持类利用了模板设计模式，该模式在整个框架中被多次使用。\n\
  \n■ **注意** 尽管这是更常用的技术之一，但基于 **HibernateTemplate** 构建 DAO 类并不是唯一的方法。我们将在本章后面研究一些替代方案。由于\
  \ **HibernateTemplate** 已经存在多年，即使您选择替代策略，也一定会遇到一些使用它的遗留代码。\n\n第 6 章 ■ DAO 与查询\n\n\
  \n\n**HibernateTemplate** 处理了 Hibernate 所需的大部分样板操作，将关键部分委托给你的代码。在使用 Hibernate（或任何持久化框架）时，需要相当多的资源管理才能确保一切可靠运行。例如，在执行持久化相关操作之前，需要进行一些设置。你需要打开数据库连接并获取\
  \ Hibernate 会话。你还可能需要设置事务要求，或检查是否有现有事务需要参与。最后，操作完成后，需要进行一些清理工作，确保会话关闭，事务正确提交或回滚。\n\
  \n**HibernateTemplate** 负责处理这些繁琐的步骤。它还会捕获可能发生的任何异常，并将其转换为 Spring 自身的数据访问异常。这种转换允许你使用一致的异常层次结构，该结构不依赖于特定的持久化框架，因此你可以轻松地在不同的持久化技术之间切换，而无需更改整个代码中的异常处理。\n\
  \n■ **注意** Spring 的异常层次结构不使用受检异常，这意味着你无需捕获这些异常中的任何一个。对于数据库操作而言，非受检异常要实用得多。如果在尝试写入数据库时出现问题，你的应用程序很可能无法恢复。那么，如果你对此无能为力，处理这个异常又有什么意义呢？\n\
  \n构建 DAO\n\n我们将从图库应用程序的 **CategoryDAO** 实现开始。**ArtEntity** 领域类可以组织到一个或多个类别中。此功能允许最终用户按类别浏览照片和艺术品。我们定义\
  \ **CategoryDao** 接口如下：**public interface CategoryDao {**\n\n****public List<Category>\
  \ getCategories() throws DataAccessException;**\n\n****public Category getCategory(Long\
  \ catId) throws DataAccessException;**\n\n****public List<ArtEntity> getArtworkInCategory(Long\
  \ catId)**\n\n**throws DataAccessException;**\n\n****public void saveCategory(Category\
  \ category) throws DataAccessException;**\n\n****}**\n\n■ **注意** 尽管我们在本书前面介绍了 **GenericDao**\
  \ 方法，但我们将退一步，从头开始研究如何构建 DAO。通常，我们会扩展 **GenericDao** 实现，并定义 **GenericDao** 基类未提供的那些额外方法。\n\
  \n第 6 章 ■ DAO 与查询\n\n通过这些方法，我们可以加载单个类别、查找所有类别以及访问特定类别中的艺术品。**CategoryDao** 还使我们能够保存\
  \ **Category** 对象的新实例。当然，我们的应用程序可能还会定义一些额外的与 **Category** 相关的持久化方法，但此接口足以用于说明目的。\n\
  \n使用 Spring 的 Hibernate 支持类\n\nSpring 擅长减少为让某些功能正常工作而需要编写的代码量。在构建 Hibernate DAO\
  \ 类时，你有多种选择。一种比较常见的解决方案是扩展 Spring 的 **HibernateDaoSupport** 类。这个抽象类要求你通过 **setSessionFactory(SessionFactory\
  \ sessionFactory)** setter 方法传入一个 Hibernate **SessionFactory**。\n\n当然，你应该在 Spring\
  \ 中配置你的 **SessionFactory**，以便可以通过配置轻松注入它。我们将很快演示此过程。\n\n当一个有效的 **SessionFactory**\
  \ 被注入到扩展了 **HibernateDaoSupport** 的类中时，会自动为你创建一个 **HibernateTemplate** 实例，该实例使用传入的\
  \ **SessionFactory** 引用。**HibernateTemplate** 的工作方式与 Spring 框架的其他模板抽象（例如 **JDBCTemplate**\
  \ 和 **TransactionTemplate**）类似。遵循模板设计模式，此类处理 Hibernate 所需的所有繁重工作，以便你可以专注于持久化逻辑。结果是代码更简洁，通常除了你正在实现的\
  \ Hibernate 持久化操作之外，几乎不反映其他内容。\n\n扩展 **HibernateDaoSupport** 类是减少代码的理想选择，因为它会自动为你的\
  \ Hibernate **SessionFactory** 定义一个 setter，并处理 **HibernateTemplate** 的创建。但是，如果你的\
  \ DAO 需要从不同的基类扩展，那么你将无法同时扩展 **HibernateDaoSupport**。当然，灵活性和解耦是 Spring 的关键理念，因此很少要求你扩展框架类（尽管有时这是首选）。相反，你可以直接创建你的\
  \ **HibernateTemplate**：\n\n**@Repository(\"categoryDao\")**\n\n**public class CategoryDaoImpl\
  \ implements CategoryDao {**\n\n****private SessionFactory sessionFactory;**\n\n\
  **private HibernateTemplate hibernateTemplate;**\n\n****@Autowired**\n\n**public\
  \ void setSessionFactory(SessionFactory sessionFactory) {**\n\n**this.sessionFactory\
  \ = sessionFactory;**\n\n**this.hibernateTemplate = new HibernateTemplate(sessionFactory);**\n\
  \n**}**\n\n****}**\n\n这种方法需要多一些的管道代码，但你现在可以不受任何框架特定类的约束。请注意，我们在 **setSessionFactory(SessionFactory\
  \ sf)** setter 方法中创建了 **HibernateTemplate**。这样，当 Spring 注入 Hibernate **SessionFactory**\
  \ 时，**HibernateTemplate** 将自动创建。我们应用了 **@Repository** 注解来帮助 Spring 通过组件扫描找到我们的 DAO，并使用\
  \ **@Autowired** 注解来注入 **SessionFactory**。\n\n在上面的代码片段中，我们使用 **@Autowired** 注解来自动注入一个类型为\
  \ **DataSource** 的 bean。只要我们只有一个类型为 **DataSource** 的 bean，这个例子就能正常工作。如果你的应用程序需要多个数据源，你需要确保消除任何潜在的歧义。如第\
  \ 2 章所述，你可以使用 **@Qualifier** 注解为 Spring 提供必要的提示，使其能够区分你的数据源。\n\n选择使用哪种配置方法主要取决于你的编码风格。在前面的示例中，我们使用了\
  \ **@Repository** 注解，表明我们正在配置一个具有持久化相关功能的类。Spring 的组件扫描机制会使用此注解，我们在第 3 章中介绍过。通过组件扫描，Spring\
  \ 会搜索指定的包结构，以找到那些被注解为组件的类，以便它们可以由 Spring 管理并在依赖注入中发挥作用。\n\nSpring 定义了三个核心的原型注解，每个注解代表典型应用程序中的一个层：\n\
  \n• **@Repository** 用于描述那些提供*数据仓库*功能的类。在这种情况下，它是我们的 DAO 实现，因为它服务于抽象所有与 **Category**\
  \ 领域对象相关的数据访问功能的目的。\n\n• **@Controller** 用于描述控制器类，这些类在 Web 层中用于处理请求。\n\n\n\n• **@Service**\
  \ 定义了一个服务外观。通常，服务层封装了 DAO 层，提供了一致且支持事务的服务，这通常作为应用程序的业务逻辑。服务层常被称为*外观*，因为它作为数据访问代码的抽象层，隐藏了底层实现细节，并提供了业务特定的\
  \ API。我们将在第 8 章更详细地讨论服务层。\n\n这三个注解在逻辑上都是从 **@Component** 注解扩展而来的，该注解定义了任何旨在由 Spring\
  \ 容器管理的 bean。实际上，在我们的示例中，我们完全可以轻松地使用 **@Component** 代替 **@Repository**，但这样会丢失我们类作为\
  \ DAO 的意图。换句话说，我们使用 **@Repository** 注解是为了向 Spring 表明我们的类是一个 DAO。\n\n为了确保我们的 **CategoryDao**\
  \ 类能够被配置到 Spring 的 **ApplicationContext** 中，我们需要在 Spring XML 配置中添加一个类似如下的组件扫描 bean：\n\
  \n**<context:component-scan base-package=**\n\n**\"com.prospringhibernate.gallery.dao.hibernate\"\
  >**\n\n**<context:include-filter type=\"annotation\" expression=**\n\n**\"org.springframework.stereotype.Repository\"\
  />**\n\n**</context:component-scan>**\n\n这段 XML 片段告诉 Spring 在 **com.prospringhibernate.gallery.dao.hibernate**\
  \ 包中查找带有 **@Repository** 注解的类。最终，这个包中将会有多个 DAO 实现，它们都以类似的方式进行配置。\n\n使用 HibernateTemplate\
  \ 启用查询缓存\n\n**HibernateTemplate** 包含两个用于支持查询缓存的方法。在 Hibernate 中使用查询缓存可以通过减少数据库访问次数来显著提升性能。但是，你应该仔细验证查询缓存的性能收益，因为有时查询缓存实际上可能对应用程序性能产生负面影响。我们将在第\
  \ 9 章更详细地讨论这一点。\n\n第 6 章 ■ DAO 与查询\n\n有几种不同的策略可以启用查询缓存。一种方法是在 Spring 配置中直接配置一个 **HibernateTemplate**。这样，你可以将查询缓存的细节外部化并进行集中管理：\n\
  \n**<bean id=\"hibernateTemplate\"**\n\n**class=\"org.springframework.orm.hibernate3.HibernateTemplate\"\
  >**\n\n**<property name=\"sessionFactory\" ref=\"sessionFactory\"/>**\n\n**<property\
  \ name=\"queryCacheRegion\" value=\"querycache_artwork\"/>**\n\n**<property name=\"\
  cacheQueries\" value=\"true\"/>**\n\n**</bean>**\n\n■ **注意** 你首先必须通过在创建 **SessionFactory**\
  \ 时，将以下 Hibernate 属性添加到 `hibernateProperties` 映射中，来全局启用查询缓存：\n\n**<prop key=\"hibernate.cache.use_query_cache\"\
  >true</prop>** 然后，你可以将这个预配置好的 **HibernateTemplate** 直接注入到你的 DAO 实现中。如果你的 DAO 继承了\
  \ **HibernateDaoSupport** 类，它将自动使用应用于你 Spring 配置的 **HibernateTemplate** 中的 **SessionFactory**。使用此策略，你可以确保所有使用\
  \ **HibernateTemplate** 的操作都启用了查询缓存。这种技术的缺点是你使用的是集中配置的 **HibernateTemplate**，这使得对依赖它的特定\
  \ DAO 进行自定义变得困难。另一种方法是通过扩展 **HibernateTemplate** 或直接设置查询缓存细节，在代码中配置查询缓存。\n\n摆脱模板\n\
  \n当你使用 Spring 的模板抽象时，无需担心处理样板代码和资源管理。大多数 Hibernate 操作都可以通过 **HibernateTemplate**\
  \ 进行管理。\n\n当直接使用 Hibernate 时，你通常需要从 **SessionFactory** 创建一个新的 Hibernate **Session**。对于大多数操作，你还需要关注事务细节，确保在操作开始时启动事务，并在操作完成时提交或回滚事务。**HibernateTemplate**（以及\
  \ Spring 框架的其他类）将确保 Hibernate **Session** 被打开和关闭，并且事务语义被正确应用。然而，当同时使用 Spring 和 Hibernate\
  \ 时，使用 **HibernateTemplate** 并不是唯一有效的方法。\n\n■ **注意** 你可以完全在代码中指定事务需求。但是，这样做可能会冗长且容易出错。相反，我们建议完全通过配置来指定事务需求，将事务细节与持久化逻辑分离。这是服务外观层的关键目的之一。\n\
  \n第 6 章 ■ DAO 与查询\n\n**HibernateTemplate** 的引入是在 Hibernate 开发的早期。在 Hibernate 3 之前，Hibernate\
  \ 存在“一些架构缺陷”。与当前版本不同，早期版本的 Hibernate 拥有受检异常层次结构，这迫使开发人员编写混乱的 DAO 代码，因为他们需要尝试通过一系列嵌套的\
  \ **try**-**catch**-**finally** 块来处理 Hibernate 的异常。\n\n随着 Hibernate 3.0.1 的发布，情况变得简单了一些。Hibernate\
  \ 将其受检异常层次结构替换为非受检异常，从而消除了对凌乱的 **try**-**catch** 块的需求。\n\n此外，Hibernate 引入了*上下文会话*的概念，它允许\
  \ Hibernate 将单个会话与当前事务关联并同步。这与 Spring 在其 Hibernate 支持中提供的功能类似，允许会话自动参与事务。\n\n在其\
  \ Hibernate 3 支持中，Spring 的 **LocalSessionFactoryBean** 类与 Hibernate 的上下文会话支持集成，默认创建一个代理的\
  \ Hibernate **SessionFactory**。这个代理版本的 **SessionFactory** 增强了其 **getCurrentSession**\
  \ 方法，使其能够自动与 Spring 的资源管理（如事务特性）同步。\n\n使用标准的 Hibernate API 而不是 Spring 的 **HibernateTemplate**\
  \ 可能会简化一些开发，但你会失去一些好处。Spring 的模板支持在各种持久化技术之间提供了一定程度的一致性；例如，Spring 的 **JDBCTemplate**\
  \ 的工作方式与 **HibernateTemplate** 或 **JPATemplate** 类似。\n\n此外，Spring 的模板支持会自动将特定持久化框架的异常转换为\
  \ Spring 的 **DataException** 层次结构中的相应异常，从而进一步将你的代码与特定技术解耦。但是，有一种方法可以在不使用 **HibernateTemplate**\
  \ 的情况下实现这一点。如果你添加一个 BeanFactory 后处理器，Spring 可以检测任何带有 **@Repository** 注解的 DAO 类，并自动将\
  \ Hibernate 异常转换为 Spring 通用的 **DataAccessException** 层次结构。要实现这一点，只需将以下 bean 添加到你的\
  \ Spring 配置中：\n\n**<bean class=\"org.springframework.dao.annotation.** «\n\n****PersistenceExceptionTranslationPostProcessor\"\
  />** 然后确保你的 DAO 类正确使用了 **@Repository** 注解，这样你就可以直接在 DAO 实现中使用 Hibernate API，而无需依赖\
  \ **HibernateTemplate**。你可以改为仅为 **Hibernate** **SessionFactory** 定义 getter 和 setter\
  \ 方法，让 **AnnotationSessionFactoryBean** 将一个代理的 **SessionFactory** 注入到你的类中。然后，你可以通过以下方式访问\
  \ Hibernate 会话来实现你的 DAO 方法：**this.getSessionFactory().getCurrentSession()**\n\n\n\
  \n一个更完整的实现可能如下所示：\n\n**@Repository(\"categoryDao\")**\n\n**public class CategoryDaoHibernate\
  \ implements CategoryDao {**\n\n****private SessionFactory sessionFactory;**\n\n\
  ****public SessionFactory getSessionFactory() {**\n\n**return this.sessionFactory;**\n\
  \n**}**\n\n**90\n\n第 6 章 ■ DAO 与查询\n\n**@Autowired**\n\n**public void setSessionFactory(SessionFactory\
  \ sessionFactory) {**\n\n**this.sessionFactory = sessionFactory;**\n\n**}**\n\n\
  ****@SuppressWarnings(\"unchecked\")**\n\n**public List<Category> getCategories()\
  \ throws DataAccessException {**\n\n**return this.getSessionFactory().getCurrentSession().createQuery(**\n\
  \n**\"select categories from Category categories\"**\n\n**).list();**\n\n**}**\n\
  \n****. . .**\n\n****}**\n\n这个例子有点刻意，但它应该能让您更清楚地了解如何直接利用 Hibernate API，同时仍然利用 Spring\
  \ 强大的资源管理功能。采用哪种方法取决于您的偏好和具体要求。例如，如果您的组织使用其他持久化技术（如 JDBC 或 iBatis），那么使用 **HibernateTemplate**\
  \ 可能仍然是个好主意，因为它能在组织内部乃至代码库中提供更高的一致性。此外，**HibernateTemplate** 还能提供一些直接使用 Hibernate\
  \ API 所不具备的快捷方式，例如在整个 DAO 中设置默认行为（例如激活缓存设置）。\n\n尽管本章对 Hibernate 的使用关注度略高于 JPA，但请记住，这两种方法非常相似——尤其是在\
  \ HQL 和 JPQL 语法方面。因此，我们不会从 Hibernate 和 JPA 两个角度逐一审视每个示例。不过，为了让您更清楚地了解如何设置基于 JPA\
  \ 的 DAO，让我们看一个简短的示例：\n\n**@Repository(\"categoryDao\")**\n\n**public class CategoryDaoHibernate\
  \ implements CategoryDao {**\n\n****private EntityManager entityManager;**\n\n****@PersistenceContext**\n\
  \n**public void setEntityManager(EntityManager entityManager) {**\n\n**this.entityManager\
  \ = entityManager;**\n\n**}**\n\n****@SuppressWarnings(\"unchecked\")**\n\n**public\
  \ List<Category> getCategories() throws DataAccessException {**\n\n**return this.entityManager.createQuery(**\n\
  \n**\"select categories from Category categories\"**\n\n**).getResultList();**\n\
  \n**}**\n\n****. . .**\n\n****}**\n\n第 6 章 ■ DAO 与查询\n\n请注意，我们简单 DAO 示例的 JPA 版本非常相似，只有一些语法上的差异。最显著的变化是使用\
  \ `@PersistenceContext` 来注入我们的 JPA `EntityManager`。此注解依赖于在 Spring 配置中包含一个 `BeanPostProcessor`，它将利用\
  \ `persistence.xml` 文件来帮助执行标准的 JPA 配置。\n\n您可以通过将以下内容添加到 Spring 配置中来添加此 `BeanPostProcessor`：\n\
  \n**<bean class=\"org.springframework.orm.jpa.support.** «\n\n**PersistenceAnnotationBeanPostProcessor\"\
  \ />** 在本书中，我们将包含使用 Hibernate API、Core JPA 以及 **HibernateTemplate** 或 **JPATemplate**\
  \ 的示例，以展示更广泛的实现方式。\n\nHibernate 中的查询\n\n现在我们已经研究了一些实现 DAO 的方法，并处理了所有装配细节，让我们继续讨论实际的实现。我们将以下内容视为\
  \ **CategoryDao** 实现的第一个版本：\n\n**@Repository(\"categoryDao\")**\n\n**public class\
  \ CategoryDaoImpl extends HibernateDaoSupport** «\n\n****implements CategoryDao\
  \ {**\n\n****public List<Category> getCategories() throws DataAccessException {**\n\
  \n**return this.getHibernateTemplate().find(**\n\n**\"select categories from Category\
  \ categories\"**\n\n**);**\n\n**}**\n\n****public Category getCategory(Long catId)\
  \ throws DataAccessException {**\n\n**return (Category) this.getHibernateTemplate()**\n\
  \n**.load(Category.class, catId);**\n\n**}**\n\n****public List<ArtEntity> getArtworkInCategory(Long\
  \ catId)**\n\n**throws DataAccessException {**\n\n**return this.getHibernateTemplate().findByNamedParam(**\n\
  \n\n\n**\"select art from Category cat \" +**\n\n**\"join cat.artEntities art \"\
  +**\n\n**\"where cat.id = :catId \",**\n\n**\"catId\", catId**\n\n**);**\n\n**}**\n\
  \n****public void saveCategory(Category category) throws DataAccessException {**\n\
  \n**this.getHibernateTemplate().saveOrUpdate(category);**\n\n**}**\n\n****}**\n\n\
  第 6 章 ■ DAO 与查询\n\n如果你不是要访问单个实体，那么很可能需要使用 HQL 或 Hibernate Criteria API 来执行查询。接下来，我们将探讨如何使用\
  \ HQL 来满足**CategoryDAO**的持久化需求。我们将从基础开始，逐步深入到更复杂的查询方法。\n\n加载实体\n\n在 Hibernate 中，最基本的操作之一就是通过标识符加载实体。\n\
  \nHibernate 提供了两种从数据库访问实体的主要方式：**load**和**get**。虽然这两种方法功能相同，但在行为上存在细微差别。\n\n例如，要从数据库加载一个**Category**实例，我们可以使用示例实现中定义的**getCategory**方法。或者，我们也可以直接使用\
  \ Hibernate 核心 API：**public Category getCategory(Long catId) throws DataAccessException\
  \ {**\n\n**return (Category) this.getSessionFactory().getCurrentSession()**«\n\n\
  ****.load(Category.class, catId);**\n\n**}**\n\n如本例所示，**load**方法接受实体类，后跟实体标识符。\n\
  \n我们也可以使用**Session.get**来实现**getCategory**方法：**public Category getCategory(Long\
  \ catId) throws DataAccessException {**\n\n**return (Category) this.getSessionFactory().getCurrentSession()**«\n\
  \n****.get(Category.class, catId);**\n\n**}**\n\n这两种方法看起来几乎相同，但存在细微差别。如果数据库中没有与指定标识符匹配的行，**Session.load**将抛出异常。然而，在使用\
  \ Spring 的持久化支持时，Hibernate 异常会自动转换为 Spring 一致的**DataAccessException**层次结构。如果实体不存在，**Session.get**将返回\
  \ null。\n\n不过，**load**提供了**get**所不具备的性能优势。例如，**load**可以返回一个代理对象，而不是立即访问数据库，这允许将多个加载操作批量处理。\n\
  \n查询特定类型\n\n一个常见的 HQL 操作是查找给定类型中符合特定条件的一组实体。HQL 在语义上与 SQL 非常接近，只是它提供了面向对象的视角，而 SQL\
  \ 则更偏向基于表的方法。以下是一个非常基础的查询：\n\n**select categories from Category categories**\n\n\
  在这个例子中，我们使用**select**关键字来指示要返回哪些项。我们也可以返回一个字符串列表，表示所有**Category**实体的类别名称，如下所示：**select\
  \ categories.name from Category categories**\n\n第 6 章 ■ DAO 与查询\n\n在这些示例中，我们使用**from**关键字来指示要查询的实体类型。然后，我们将**Category**别名为**categories**，从而可以在**select**子句中使用这个别名来进一步引用查询中的**Category**实体。\n\
  \n这两个查询将尝试处理**Category**表中的所有行。为了过滤结果，我们需要在查询中添加一个条件。接下来，我们来看看条件查询。\n\n使用命名参数\n\n\
  让我们直接跳到查找方法，该方法获取特定**Category**中的所有**ArtEntity**实例：**public List<ArtEntity> getArtworkInCategory(Long\
  \ catId)**\n\n**throws DataAccessException {**\n\n**return this.getHibernateTemplate().findByNamedParam(**\n\
  \n**\"select art from Category cat \" +**\n\n**\"join cat.artEntities art \" +**\n\
  \n**\"where cat.id = :catId \",**\n\n**\"catId\", catId**\n\n**);**\n\n**}**\n\n\
  这个方法使用了一个更复杂的 HQL 查询，它连接了**Category**和**ArtEntity**，并通过参数化的**CategoryId**指定了**where**条件。HQL\
  \ 中的连接允许你跨多个实体进行查询。在这个例子中，我们通过**Category**实体的**artEntities**属性来引用**ArtEntity**领域类。\n\
  \n在 Hibernate 中，可以显式或隐式地连接两个实体类型。隐式连接实际上并不使用**join**关键字，而是作为查询的一部分，在对象属性和关联之间进行导航。例如，我们可以使用以下查询隐式连接**Category**和**ArtEntity**领域对象：\n\
  \n**from ArtEntity artEntities where artEntities.category.id = :catId**\n\n这里，我们在**where**条件中跨关联进行导航。这通过不同的方法返回了相同的结果。\n\
  \n对于这个方法，我们使用了**HibernateTemplate**的**findByNamedParam**方法。该方法接受三个参数：HQL 查询、HQL\
  \ 参数名和参数本身。我们建议使用命名参数而不是位置参数，以使代码更清晰且更不易出错。位置参数依赖于参数传递的顺序，这具有歧义性且更容易出错。\n\n请注意，我们的\
  \ HQL 查询指定了条件**where cat.id = :catId**。**:catId**是 Hibernate 在查询中定义命名参数的方式。然后，这个名称可以作为参数名被**HibernateTemplate**的**findByNamedParam**方法引用。\n\
  \n在前面的例子中，我们只有一个参数，但通常情况并非如此。当你需要多个 HQL 参数时，可以使用**findByNamedParam**的重载版本，该版本接受一个**String**数组（作为第二个参数）来定义传递给查找方法的参数名，以及一个**Object**数组作为实际的参数值。这个更灵活的版本的工作方式与前面的例子基本相同，只是第二个和第三个参数分别接受数组，而不是**String**和**Object**。例如，让我们看看**PersonDaoImpl**类中的**authenticatePerson**方法：\n\
  \n第 6 章 ■ DAO 与查询\n\n**public Person authenticatePerson(String username, String\
  \ password)** **throws DataAccessException, AuthenticationException {**\n\n****List<Person>\
  \ validUsers = this.getHibernateTemplate().findByNamedParam(**\n\n**\"select people\
  \ from Person people where\" +**\n\n**\"people.username = :username \" +**\n\n**\"\
  and people.password = :password\",**\n\n**new String[] {\"username\", \"password\"\
  },** **new String[] {username, password }**\n\n**);**\n\n****if (validUsers == null\
  \ || validUsers.size() <= 0) {**\n\n**throw new AuthenticationException(\"未找到用户\"\
  );**\n\n**} else {**\n\n**return validUsers.get(0);**\n\n**}**\n\n****}**\n\n在这个例子中，我们向\
  \ HQL 查询传递了两个条件：**username**和**password**。第二个参数包含一个 HQL 参数名的**String**数组，第三个方法参数接受一个值的**String**数组。**HibernateTemplate**还提供了重载的替代方法，你可以指定一个**Object**或**Object**数组作为参数值，从而允许在\
  \ HQL 查询中使用任何 Java 类型作为参数值。\n\n使用核心 Hibernate 进行查询\n\n在上一节中，我们讨论了如何使用**HibernateTemplate**执行\
  \ HQL 查询。虽然这种方法效果不错，但你可能已经注意到，在指定多个命名参数时，事情会变得有些混乱。正如我们之前讨论的，**HibernateTemplate**并不总是实现\
  \ DAO 的最理想方式。现在，让我们看看如何使用 Hibernate 核心 API 来实现**authenticatePerson**方法：\n\n**public\
  \ Person authenticatePerson(String username, String password)** **throws DataAccessException,\
  \ AuthenticationException {**\n\n****Person validUser =**\n\n\n\n**(Person) this.getSessionFactory().getCurrentSession().createQuery(**\n\
  \n**\"select people from Person people where\" +**\n\n**\"people.username = :username\
  \ \" +**\n\n**\"and people.password = :password\")**\n\n**.setString(\"username\"\
  , username)**\n\n**.setString(\"password\", password)**\n\n**.uniqueResult()**\n\
  \n**);**\n\n****if (validUser == null) {**\n\n**throw new AuthenticationException(\"\
  未找到用户\");** 95\n\n第 6 章 ■ DAO 与查询\n\n**} else {**\n\n**return validUser;**\n\n**}**\n\
  \n****}**\n\n如你所见，这种形式比**HibernateTemplate**版本更清晰、更简洁。Hibernate 核心 API 提供了一种简便的方法，通过链式语法（即每个**Query**方法都返回**Query**实例，允许你连续调用多个方法）来逐个设置命名参数。你还可以返回一个列表，或者调用**uniqueResult()**，该方法假定查询只返回单个结果，从而允许你直接返回该结果。如果你希望查询返回一个列表，可以调用**.list()**\
  \ 代替**.uniqueResult()**。\n\nHibernate 还在**Query**类上提供了**.iterate()** 方法，如果查询返回的大部分实体很可能存储在缓存中，该方法会非常有用。**.iterate()**\
  \ 方法只会返回每个实体的标识符，而不是整个实体本身。假设这些 ID 已被缓存，这将带来更高的性能。\n\n使用命名查询\n\n尽管 Hibernate 核心\
  \ API 有助于简化我们的实现，但该方法仍然显得有些复杂，这主要是由于查询本身较长，我们将其拆分成多段以提高可读性。我们还依赖**String**拼接，这会对性能产生轻微影响。\n\
  \n使基于 HQL 的方法更清晰的一种方法是使用*命名查询*。命名查询允许你将查询从代码中外部化。这可以提高代码的清晰度，同时将查询集中管理——要么完全放在代码外部，要么分组在文件的特定部分。\n\
  \n如果你使用 Hibernate XML 映射文件，可以直接在这些文件中定义命名查询。这使得修改查询时无需重新编译 Java 代码。或者，你也可以通过**@NamedQuery**注解在代码中定义命名查询。\n\
  \n一旦指定了命名查询，就可以使用以下语法轻松访问它们（假设查询名为**my.named.query.name**）：\n\n**Query query = this.getSessionFactory().getSession().getNamedQuery(\"\
  my.named.query.name\");** 获得**Query**引用后，你可以像直接在代码中创建查询一样，以完全相同的方式使用它。\n\n我们建议你避免将\
  \ HQL 查询直接放在 DAO 代码中。相反，应使用 Hibernate 的命名查询功能。这允许你将 HQL 查询集中到 Hibernate 映射文件中，或通过**@NamedQuery**注解集中到领域类文件中。正如我们之前提到的，将命名查询保留在\
  \ XML 映射文件中，还可以让你在不重新编译类的情况下调整查询，这在开发或预发布环境中调试紧急问题时非常有用。\n\n使用多态查询\n\n在第 5 章中，你了解了映射\
  \ Java 类层次结构的不同策略。当你考虑查询功能时，可以看到 Hibernate 对多态支持的一些好处。\n\n例如，在第 5 章中，我们定义了一个类层次结构，旨在封装图库应用程序中持久化的不同图像分辨率：**ArtData**、**ArtData_Gallery**、**ArtData_Thumbnail**和**ArtData_Storage**。在这个层次结构中，后三个类继承自**ArtData**基类。现在假设我们想要查找所有继承自**ArtData**的实例。我们可以通过以下查询来实现：\n\
  \n**Select artData from ArtData artData**\n\n这将返回所有**ArtData**的实例，包括继承自**ArtData**父类的实体，如**ArtData_Gallery**和**ArtData_Thumbnail**。Hibernate\
  \ 对多态的支持非常强大，因为它允许我们在类层次结构中限制或扩展查询。事实上，我们可以通过运行以下查询来查找应用程序中每个领域对象的所有实例：**From Object**\n\
  \n上述查询将加载整个数据库，因为每个领域对象都隐式继承自**Object**。显然，我们强烈建议你不要在生产应用程序中尝试这样做！\n\n使用 Hibernate\
  \ 持久化数据\n\n既然我们已经讨论了使用**HibernateTemplate**和 Hibernate 核心 API 定义查找方法的一些选项，那么如何实际持久化数据呢？\n\
  \n保存和更新数据\n\n我们的**CategoryDaoImpl**类为**Category**实例定义了一个 save 方法，如下所示：**public void\
  \ saveCategory(Category category) throws DataAccessException {**\n\n**this.getHibernateTemplate().saveOrUpdate(category);**\n\
  \n**}**\n\n使用**HibernateTemplate**的**saveOrUpdate**类似于使用 Hibernate 核心 API 调用**Session.saveOrUpdate(Object)**。如果你需要更具体的持久化行为，**HibernateTemplate**中还提供了其他保存选项，例如\
  \ merge、save 和 update。\n\n甚至可以使用 Hibernate 执行批量操作，通过**where**条件确定应更新哪些实体，从而更新多个对象。你也可以通过遍历实体并对每个实体调用**saveOrUpdate**来更新领域对象集合。我们将在第\
  \ 9 章讨论保存对象的性能优化策略。\n\n处理二进制数据\n\n我们的**CategoryDao**相当简单，因为它只需要操作简单的**String**字段。然而，由于我们正在构建一个图库应用程序，我们需要处理大型数据类型，以便管理用于表示图像的数据。我们可以选择将图像数据存储在文件系统上，只存储图像存储位置的路径引用。但我们发现，将所有内容持久化到数据库中通常更灵活，这可以确保应用程序数据完全集中。这也有助于减少对文件系统的耦合，并使备份和迁移数据更加容易。\n\
  \n在数据库领域，大型对象（LOB）用于表示大型二进制字段。通常，LOB 或 BLOB 表示二进制数据，而 CLOB 用于表示非常大的（通常超过 4000 个字符）字符数据。在\
  \ Spring 中处理这些字段类型的过程是类似的。\n\n首先，我们需要创建一个**DefaultLobHandler**引用，用于我们的插入和查询中。这个\
  \ Spring 抽象旨在简化 LOB 字段的操作。我们可以通过将以下代码片段添加到 Spring 配置中来创建**DefaultLobHandler**：\n\
  \n**<bean id=\"defaultLobHandler\"**\n\n**class=\"org.springframework.jdbc.support.lob.DefaultLobHandler\"\
  \ />** 接下来，我们需要将**defaultLobHandler**引用注入到我们的 DAO 层。我们的**CategoryDao**实现不需要 LOB\
  \ 支持，而且我们还没有定义**ArtEntityDao**。为了节省篇幅，我们在此不深入讨论**ArtEntityDao**的细节。只需记住，该接口将处理**ArtEntity**领域对象（代表图库应用程序中的特定图像）的持久化操作。此外，请记住，领域模型中的\
  \ LOB 字段应使用@Lob 注解，以指示该属性应映射到数据库的 LOB 类型。\n\n让我们开始搭建**HibernateArtEntityDao**实现的框架：**public\
  \ class HibernateArtEntityDao implements ArtEntityDao {**\n\n**private HibernateTemplate\
  \ template;**\n\n**private LobHandler defaultLobHandler;**\n\n**// getters and setters\
  \ omitted**\n\n**}**\n\n\n\n我们需要确保 **LobHandler** 引用被注入到 **HibernateArtEntityDao**\
  \ 类中。\n\n接下来，让我们定义一个 **saveArtEntity** 方法，该方法接受一个 **ArtEntity** 参数，该参数封装了图像信息以及图像数据本身。（再次提醒，请记住这是对我们实际\
  \ **ArtEntityDao** 接口和领域实体的简化。）我们的 **saveArtEntity** 方法可能如下所示：\n\n**public void\
  \ saveArtEntity(ArtEntity artEntity) throws DataAccessException {**\n\n**this.getHibernateTemplate().saveOrUpdate(artEntity);**\n\
  \n**}**\n\n理解 Criteria API 的优势\n\n尽管 HQL 和 JPQL 是表达查询的有效且简洁的策略，但它们都存在一些局限性。首先，由于这些查询语言以纯文本形式表达，因此容易出错，且编译器无法捕获或验证这些错误。包含\
  \ HQL 或 JPQL 查询重大错误的方法可以完美编译，但只会在运行时抛出异常，或以意外方式执行。\n\nHQL 和 JPQL 也不利于表达动态查询，即查询的属性直到运行时才完全确定。例如，如果我们希望用户能够通过指定任意数量的标签来搜索图像，那么使用\
  \ HQL 或 JPQL 很难表示这种查询。为了实现这一点，我们可能会尝试通过连接每个标签参数的条件来动态生成 JPQL 查询字符串。显然，这是一个脆弱且笨拙的解决方案。\n\
  \n为了解决这些局限性，Hibernate 提供了 Criteria API。直到最近，JPA 还不包含 Criteria API，迫使需要此类功能的开发人员偏离\
  \ JPA 标准。\n\n然而，随着 JPA 2.0 的发布，现在有了一个基于标准的 Criteria API。\n\n第 6 章 ■ DAO 与查询\n\n\
  使用 JPA 2.0 Criteria API\n\n我们之前更多地关注了 Hibernate 特定的查询，现在让我们来研究新的 JPA 2.0 Criteria\
  \ API。为了说明 Criteria API，我们将为 **CategoryDao** 接口定义一个新的 DAO 方法：**public List<ArtEntity>\
  \ getArtEntitiesByTitle(String title);**\n\n此方法将返回所有与指定标题匹配的 **ArtEntity** 实例。显然，我们可以使用\
  \ JPQL 来表达此查询，但 Criteria API 提供了一些优势。主要优势之一是我们可以利用编译时检查来确保查询有效且符合领域模型的约束。在本节后面，我们还将研究\
  \ Criteria API 的其他一些优势，例如对查询应用动态约束，包括分页、过滤和排序细节。\n\n首先，让我们看一下我们的查询：\n\n**public\
  \ List<ArtEntity> getArtEntitiesByTitle(String title) {**\n\n**CriteriaBuilder criteriaBuilder\
  \ = entityManager.getCriteriaBuilder();** **CriteriaQuery<ArtEntity> criteriaQuery\
  \ =**\n\n**criteriaBuilder.createQuery(ArtEntity.class);**\n\n**Root<ArtEntity>\
  \ root = criteriaQuery.from(ArtEntity.class);** **Path<String> path = root.<String>get(\"\
  title\");** **criteriaQuery.where(criteriaBuilder.equal(path, title));**\n\n**return\
  \ entityManager.createQuery(criteriaQuery).getResultList();**\n\n**}**\n\n如果你了解\
  \ JPQL 查询的结构，那么你应该能够推断出上述方法的作用。第一行获取对 **CriteriaBuilder** 的引用。**CriteriaBuilder**\
  \ 类对于生成 Criteria 查询的重要方面是必需的，我们稍后会看到。下一行使用我们的 **CriteriaBuilder** 引用来创建一个 **CriteriaQuery**\
  \ 实例。注意，我们将 **ArtEntity.class** 作为唯一参数传递给 **createQuery** 方法。我们本质上是在请求一个使用 **ArtEntity**\
  \ 类型的泛型 **CriteriaQuery** 实例。这样做的目的是指定我们希望查询返回 **ArtEntity** 类型的结果。这并不一定意味着我们正在查询\
  \ **ArtEntity** 实例。实际上，我们可以向 **createQuery** 方法指定 **Long.class** 类型，以指示我们的查询应返回一个\
  \ **Long**，这在执行投影或聚合查询时很常见。\n\n现在我们有了 **CriteriaQuery** 实例，我们需要声明我们打算查询的类型。我们在 **CriteriaQuery**\
  \ 实例上调用 **from** 方法，指定 **ArtEntity** 作为参数。\n\n我们示例中的这行代码类似于一个 JPQL 子句：**“from ArtEntity”**。换句话说，我们表达了查询\
  \ **ArtEntity** 类型的意图。此方法调用返回一个 **Root** 实例，该实例被泛型化为我们的 **ArtEntity** 实例。现在，**Root**\
  \ 实例可以用作引用 **ArtEntity** 类上我们希望在查询中用作条件的属性的手段。\n\n我们方法中的下一行使用 **Root** 实例，通过在 **Root**\
  \ 实例上调用 **get** 方法并指定字符串 **“title”**（这是 **ArtEntity** 类上的适当属性名称）来访问 **ArtEntity**\
  \ 领域类上的 title 字段。这将返回一个 **Path** 实例，我们可以用它来表示 title 属性，以便在查询中表达条件。为了表达这个条件，我们在 **CriteriaQuery**\
  \ 实例上调用 **where** 方法。注意，作为 **where** 方法的参数，我们使用了嵌套的方法调用 **criteriaBuilder.equal(path,\
  \ title)**。我们使用 **criteriaBuilder** 作为工厂来构造 **equal** 条件，该条件返回一个 **Predicate** 实例。Predicate\
  \ 表示封装了返回 true 或 false 的逻辑，并作为 Criteria API 中的构建块来形成复杂查询。在我们的例子中，我们创建了一个 **Predicate**\
  \ 来表示 **Path** 实例（代表我们的 **ArtEntity.title** 字段）与传递给此方法的 **String** 类型 title 参数之间的比较逻辑。\n\
  \n现在我们已经阐明了 **CriteriaQuery** 的要求和条件，我们需要实际执行查询以便访问结果。方法的这一部分与执行 JPQL 查询的方式类似。我们在\
  \ **EntityManager** 引用上调用 **createQuery**，传入我们的 **CriteriaQuery** 实例。**createQuery**\
  \ 方法实际上会返回一个 **TypedQuery** 实例，该实例被泛型化为我们的 **ArtEntity** 领域类。然而，为了保持方法的简洁，我们在方法链上调用\
  \ **getResultList()** 来直接返回一个与查询条件匹配的 **ArtEntity** 实例的 **List**。\n\n你可能在想，上面的例子需要做相当多的工作来定义一个查询，而用\
  \ JPQL 可能定义为：\n\n**public List<ArtEntity> getArtEntitiesByTitle(String title) {**\n\
  \n**Query query = this.entityManager.createQuery(**\n\n**\"select art from ArtEntity\
  \ where art.title = :title \"**\n\n**);**\n\n**query.setParameter(\"title\", title);**\n\
  \n**return query.getResultList();**\n\n**}**\n\n\n\n诚然，JPQL 版本更为简洁。然而，我们之前担心的查询在编译时缺乏有效性检查的问题呢？使用\
  \ Criteria API 方法，我们可以获得查询语法可验证的某种保证，而在 JPQL 中，我们直到运行时才会发现问题。不过，在我们这个 Criteria API\
  \ 示例中，我们实际上有点亏待自己了。请记住，为了将 **ArtEntity.title** 字段表示为 **Path** 引用，我们使用了以下代码：\n\n\
  **Path<String> path = root.<String>get(\"title\");** 这行代码很直观，但我们仍然面临出错的风险，因为我们可能会拼错\
  \ title 字段，或者指定一个根本不存在的领域类属性。此外，当我们处理更复杂的查询（例如涉及关联的查询）时，我们可能会搞错正确的字段类型或数量。\n\n为了解决这个问题，JPA\
  \ 2.0 Criteria API 提供了一个 **MetaModel**，它可以用来描述与你的领域模型相关的元数据。虽然可以手动定义你自己的 **MetaModel**\
  \ 来镜像每个领域类的结构，但更简单的方法是使用 Java 1.6 的注解处理功能。Hibernate 提供了 `hibernate-jpamodelgen`\
  \ jar 包，它可以用来分析你的领域模型类，然后自动生成 **MetaModel** 的源代码。使其工作的第一步是将 `hibernate-jpamodelgen`\
  \ 作为依赖项添加到你的 Maven `pom.xml` 文件中：\n\n**<dependency>**\n\n**<groupId>org.hibernate</groupId>**\n\
  \n**<artifactId>hibernate-jpamodelgen</artifactId>**\n\n**<version>1.0.0.Final</version>**\n\
  \n**</dependency>**\n\n第 6 章 ■ DAO 与查询\n\n一旦添加了这个依赖项，每当你的代码被编译时，你的 **MetaModel**\
  \ 就会被自动生成和更新。虽然可以使这个过程更加隐式，但我们建议安装一个 Maven 插件来提供一定程度的控制和配置。\n\n例如，你可能想要指定 **MetaModel**\
  \ 类应该放在哪里。将以下插件配置复制到你的 `pom.xml` 的 `<plugins>` 块中：\n\n**<plugin>**\n\n**<artifactId>maven-compiler-plugin</artifactId>**\n\
  \n**<configuration>**\n\n**<source>1.6</source>**\n\n**<target>1.6</target>**\n\n\
  **<compilerArguments>**\n\n**<processor>**\n\n**org.hibernate.jpamodelgen.JPAMetaModelEntityProcessor**\n\
  \n**</processor>**\n\n**</compilerArguments>**\n\n**</configuration>**\n\n**</plugin>**\n\
  \n****<plugin>**\n\n**<groupId>org.bsc.maven</groupId>**\n\n**<artifactId>maven-processor-plugin</artifactId>**\n\
  \n**<executions>**\n\n**<execution>**\n\n**<id>process</id>**\n\n**<goals>**\n\n\
  **<goal>process</goal>**\n\n**</goals>**\n\n**<phase>generate-sources</phase>**\n\
  \n**<configuration>**\n\n**<!-- 源输出目录 -->**\n\n**<outputDirectory>src/main/generated-java</outputDirectory>**\n\
  \n**</configuration>**\n\n**</execution>**\n\n**</executions>**\n\n**</plugin>**\n\
  \n****<plugin>**\n\n**<groupId>org.codehaus.mojo</groupId>**\n\n**<artifactId>build-helper-maven-plugin</artifactId>**\n\
  \n**<version>1.3</version>**\n\n**<executions>**\n\n**<execution>**\n\n**<id>add-source</id>**\n\
  \n**<phase>generate-sources</phase>**\n\n**<goals>**\n\n**<goal>add-source</goal>**\n\
  \n**</goals>**\n\n**<configuration>**\n\n**<sources>**\n\n**<source>src/main/generated-java</source>**\n\
  \n第 6 章 ■ DAO 与查询\n\n**</sources>**\n\n**</configuration>**\n\n**</execution>**\n\
  \n**</executions>**\n\n**</plugin>**\n\n如果在自动安装上述插件时遇到问题，可能还需要在你的 `pom.xml` 中添加一个\
  \ **<pluginrepositories>** 块。你可以添加以下块，以确保可以下载必要的插件：\n\n**<pluginRepositories>**\n\
  \n**<pluginRepository>**\n\n**<id>maven-annotation</id>**\n\n**<url>**\n\n**http://maven-annotation-plugin.googlecode.com/svn/trunk/mavenrepo/**\n\
  \n**</url>**\n\n**</pluginRepository>**\n\n**</pluginRepositories>**\n\n一旦更新了 Maven\
  \ 配置，你应该能够运行 `mvn compile` 来触发注解处理，从而生成你的 **MetaModel**。上述 Maven 配置会将 **MetaModel**\
  \ 源代码生成到 `src/main/generated-java`，但你可以随意更新位置以满足自己的需求。\n\n生成 **MetaModel** 后，你应该能够在适当的位置找到这些类。**MetaModel**\
  \ 类镜像了你自己的领域模型类，只是在类名后添加了下划线后缀。例如，我们的 **ArtEntity** 领域类会在相同的包结构下有一个对应的 **MetaModel**\
  \ 类，但名称为 **ArtEntity_**。让我们看看我们的 **ArtEntity** **MetaModel** 类是什么样的：\n\n**@StaticMetamodel(ArtEntity.class)**\n\
  \n**public abstract class ArtEntity_ {**\n\n**public static volatile SingularAttribute<ArtEntity,\
  \ String> displayDate;** **public static volatile SingularAttribute<ArtEntity, Integer>\
  \ width;** **public static volatile SingularAttribute<ArtEntity, Integer> hashCode;**\
  \ **public static volatile SingularAttribute<ArtEntity, String> caption;** **public\
  \ static volatile SingularAttribute<ArtEntity, Boolean>** «\n\n**privilegeViewable;**\
  \ **public static volatile SingularAttribute<ArtEntity, Boolean>** «\n\n**generalViewable;**\
  \ **public static volatile SingularAttribute<ArtEntity, Integer> version;** **public\
  \ static volatile SingularAttribute<ArtEntity, Long> id;** **public static volatile\
  \ SingularAttribute<ArtEntity, String> subTitle;** **public static volatile SingularAttribute<ArtEntity,\
  \ String> title;** **public static volatile SingularAttribute<ArtEntity, Integer>\
  \ height;** **public static volatile SingularAttribute<ArtEntity, String> description;**\
  \ **public static volatile SingularAttribute<ArtEntity, ArtData_Gallery>** «\n\n\
  **galleryPicture;** 102\n\n第 6 章 ■ DAO 与查询\n\n**public static volatile SetAttribute<ArtEntity,\
  \ Category> categories;** **public static volatile SingularAttribute<ArtEntity,\
  \ ArtData_Thumbnail>** «\n\n**thumbnailPicture;** **public static volatile SingularAttribute<ArtEntity,\
  \ String> media;** **public static volatile SetAttribute<ArtEntity, Comment> comments;**\
  \ **public static volatile SingularAttribute<ArtEntity, ArtData_Storage>** «\n\n\
  **storagePicture;** **public static volatile SingularAttribute<ArtEntity, Date>\
  \ uploadedDate;**\n\n**}**\n\n请注意，这个类非常简单，只包含与我们的 **ArtEntity** 的每个领域类属性相对应的静态易失性属性。由于我们的\
  \ **ArtEntity** 领域类中的大多数字段都是标量属性，因此它们由 **SingularAttribute** 类型表示。但是，请注意，每个 **MetaModel**\
  \ 属性都进行了泛型化，以指示领域类类型（在本例中为 **ArtEntity**）以及字段的类型。这些元数据对于利用 Criteria API 查询所有方面的编译时检查（甚至包括引用特定字段的条件）将非常有价值。\n\
  \n我们还应该指出，**comments** 和 **categories** 属性由 **SetAttribute** 类型表示，而不是 **SingularAttribute**\
  \ 类型。与 **ArtEntity** 类中的其他字段不同，`categories` 和 `comments` 属性是集合关联，由 `java.util.Set`\
  \ 表示。\n\n现在我们对 **MetaModel** 以及如何生成它有了更清晰的理解，让我们回到 Criteria API，看看如何使用这个特性。为了更好地说明\
  \ Criteria API 的其他一些特性，我们将研究一个不同的查询，该查询将返回所有宽度和高度在最小值和最大值范围内的 **ArtEntity** 实例的计数。让我们看看这个方法：**public\
  \ Long getCountOfArtEntitiesBySize(MaxMin widthRange,**\n\n**MaxMin heightRange,**\n\
  \n**QueryOpts queryOpts) {**\n\n**CriteriaBuilder criteriaBuilder = entityManager.getCriteriaBuilder();**\
  \ **CriteriaQuery<Long> criteriaQuery =**\n\n\n```markdown\n\n**criteriaBuilder.createQuery(Long.class);**\n\
  \n**Root<ArtEntity> root = criteriaQuery.from(ArtEntity.class);** **Path<Integer>\
  \ widthPath = root.get(ArtEntity_.width);**\n\n**Path<Integer> heightPath = root.get(ArtEntity_.height);**\n\
  \n**criteriaQuery.where(criteriaBuilder.and(**\n\n**criteriaBuilder.between(widthPath,**\n\
  \n**widthRange.getMin(),**\n\n**widthRange.getMax()),**\n\n**criteriaBuilder.**\
  \ «\n\n****between(heightPath,**\n\n**heightRange.getMin(),**\n\n**heightRange.getMax())));**\n\
  \n****criteriaQuery.select(criteriaBuilder.count(root));**\n\n**Long count = entityManager.createQuery(criteriaQuery).getSingleResult();**\
  \ **return count;**\n\n**}**\n\n第 6 章 ■ DAO 与查询\n\n与之前的示例不同，此方法返回一个**Long**类型，因为我们需要的不是**ArtEntity**实例本身的列表，而是符合指定条件的实例数量。请注意，我们通过一个自定义的**MaxMin**类分别封装了高度和宽度的最小值和最大值。为清晰起见，以下是**MaxMin**类（它是我们**Dao**的一个内部类）：\n\
  \n****public static class MaxMin {**\n\n****private final int max;**\n\n**private\
  \ final int min;**\n\n****public MaxMin(int max, int min) {**\n\n**this.max = max;**\n\
  \n**this.min = min;**\n\n**}**\n\n****public int getMax() {**\n\n**return max;**\n\
  \n**}**\n\n****public int getMin() {**\n\n**return min;**\n\n**}**\n\n****}**\n\n\
  由于我们的查询将返回一个**Long**值，我们调用**criteriaBuilder.createQuery(Long.class)**来指明查询的预期返回值。我们使用**criteriaQuery.from()**方法来表示我们希望查询**ArtEntity**类，该方法会返回一个**Root<ArtEntity>**实例——这与之前的示例相同。然而，请注意在下一行，我们调用**root.get(ArtEntity_.width)**来返回一个**Path<Integer>**引用，用于指明**ArtEntity.width**字段。与之前的示例不同，我们使用**ArtEntity_**\
  \ **MetaModel**类以一致且类型安全的方式引用**ArtEntity**领域类的属性。请注意，我们返回的是一个**Path<Integer>**实例，它反映了正确的泛型类型。如果我们只是简单地指定一个字符串值\n\
  \n**“width”** 而不是使用**MetaModel**，我们就无法确保查询能准确反映正确的字段类型。\n\n接下来，我们使用一个**where**条件，在其中嵌套了一个**and**表达式，并在该表达式中进一步嵌套了两个**Predicate**子句，用于阐述查询的**between**条件。我们使用**CriteriaBuilder**作为工厂来生成一个**and**\
  \ **Predicate**，它接受可变数量的**Predicate**参数——所有这些参数都必须评估为真，查询条件才能满足。\n\n最后，我们调用**criteriaQuery.select()**，并传入一个嵌套调用**criteriaBuilder.count(root)**。内部的表达式定义了一个**count**聚合查询，指定了我们的**Root**实例。这本质上归结为统计所有符合上述**where**条件的**ArtEntity**实例。**criteriaQuery.select()**调用用于指明查询中要选择的内容，这实际上类似于\
  \ JPQL 查询中的 select 关键字。最后一步是使用**entityManager**引用调用**createQuery**，将配置好的**CriteriaQuery**作为参数，然后链式调用**getSingleResult()**。由于此查询旨在返回聚合查询的结果，我们希望调用**getSingleResult()**，而不是**getResultList()**。\n\
  \n到目前为止，我们已经看到了使用 Criteria API 的好处，这些好处来自于编译时检查以及对查询结构和语法、以及领域模型结构的验证。让我们再看一个示例，该示例涉及\
  \ Criteria API 的一些优势，即能够表达结构、条件和复杂性都是动态的查询。在此示例中，我们定义了一个方法，允许我们将**QueryOpts**实例作为参数传入，该实例封装了排序和分页信息。这个（经过一定简化的）示例的关键区别在于，我们能够定义一个可变长度的字段列表，用于对结果进行排序。然而，我们可以进一步扩展此示例，也允许指定动态的过滤条件。\n\
  \n首先，让我们检查一下**QueryOpts**类，它只是我们分页和排序需求的包装器：\n\n**public class QueryOpts {**\n\n\
  **private int pageNum;**\n\n**private int pageSize;**\n\n**private List<FieldOrder>\
  \ orderList;**\n\n****public QueryOpts() {**\n\n****}**\n\n****public QueryOpts(int\
  \ pageNum, int pageSize, List<FieldOrder> orderList) {**\n\n**this.pageNum = pageNum;**\n\
  \n**this.pageSize = pageSize;**\n\n**this.orderList = orderList;**\n\n**}**\n\n\
  ****public int getPageNum() {**\n\n**return pageNum;**\n\n**}**\n\n****public void\
  \ setPageNum(int pageNum) {**\n\n**this.pageNum = pageNum;**\n\n**}**\n\n****public\
  \ int getPageSize() {**\n\n**return pageSize;**\n\n**}**\n\n****public void setPageSize(int\
  \ pageSize) {**\n\n**this.pageSize = pageSize;**\n\n**}**\n\n****public List<FieldOrder>\
  \ getOrderList() {**\n\n**return orderList;**\n\n**}**\n\n****public void setOrderList(List<FieldOrder>\
  \ orderList) {**\n\n**this.orderList = orderList;**\n\n**}**\n\n******public static\
  \ class FieldOrder {**\n\n**private String field;**\n\n第 6 章 ■ DAO 与查询\n\n**boolean\
  \ ascending;**\n\n****public FieldOrder() {**\n\n****}**\n\n****public FieldOrder(String\
  \ field, boolean ascending) {**\n\n**this.field = field;**\n\n**this.ascending =\
  \ ascending;**\n\n**}**\n\n****public String getField() {**\n\n**return field;**\n\
  \n**}**\n\n****public void setField(String field) {**\n\n**this.field = field;**\n\
  \n**}**\n\n****public boolean isAscending() {**\n\n**return ascending;**\n\n**}**\n\
  \n****public void setAscending(boolean ascending) {**\n\n**this.ascending = ascending;**\n\
  \n**}**\n\n**}**\n\n****}**\n\n请注意，**QueryOpts**还包含静态内部类**FieldOrder**，用于表示字段名称及其排序方向（即升序或降序）。\n\
  \n现在我们对**QueryOpts**类有了更好的理解，让我们看看定义动态查询的方法：\n\n**public List<ArtEntity> getArtEntitiesByTitle(String\
  \ title,**\n\n**QueryOpts queryOpts) {**\n\n**CriteriaBuilder criteriaBuilder =\
  \ entityManager.getCriteriaBuilder();** **CriteriaQuery<ArtEntity> criteriaQuery\
  \ =**\n\n**criteriaBuilder.createQuery(ArtEntity.class);**\n\n**Root<ArtEntity>\
  \ root = criteriaQuery.from(ArtEntity.class);** **Path<String> path = root.get(ArtEntity_.title);**\n\
  \n**criteriaQuery.where(criteriaBuilder.equal(path, title));**\n\n**List<Order>\
  \ orderList = criteriaQuery.getOrderList();**\n\n**List<Order> newOrderList = new\
  \ ArrayList<Order>(orderList);** **for (QueryOpts.FieldOrder fieldOrder : queryOpts.getOrderList())\
  \ {**\n\n**Order order = null;**\n\n**if (fieldOrder.isAscending()) {**\n\n**order\
  \ = criteriaBuilder.asc(root.get(fieldOrder.getField()));** 106\n\n第 6 章 ■ DAO 与查询\n\
  \n**} else {**\n\n**order = criteriaBuilder.desc(root.get(fieldOrder.getField()));**\n\
  \n**}**\n\n**newOrderList.add(order);**\n\n**}**\n\n****criteriaQuery.orderBy(newOrderList);**\n\
  \n**TypedQuery<ArtEntity> query =**\n\n**entityManager.createQuery(criteriaQuery);**\n\
  \n**query.setFirstResult(queryOpts.getPageNum() *** «\n\n****queryOpts.getPageSize());**\n\
  \n**query.setMaxResults(queryOpts.getPageSize());**\n\n**return query.getResultList();**\n\
  \n**}**\n\n```\n\n\n我们再次查询与指定标题匹配的**ArtEntity**。不过，此方法还接受第二个参数，类型为**QueryOpts**。该方法的大部分内容与我们的第一个\
  \ Criteria API 示例类似。但请注意，我们是如何为查询指定**“order by”**条件的。我们调用**criteriaQuery.getOrderList()**来获取一个**Order**类的**List**。需要注意的是，我们不能直接修改这个列表，而是必须创建一个新的**ArrayList**，将原始列表中的所有**Order**项复制到新列表中。接下来，我们使用一个**for**循环来遍历嵌入在**QueryOpts**参数中的“排序条件”。\n\
  \n我们执行一些检查，以确定某个特定的**QueryOpts.FieldOrder**项是升序还是降序，然后使用**criteriaBuilder.asc**或**criteriaBuilder.desc**实例化相应的**javax.persistence.criteria.Order**实例。无论哪种情况，请注意我们使用**root.get()**提取一个**Path**实例，并传入我们希望排序的字段名。每个新创建的**javax.persistence.criteria.Order**实例都会被添加到我们的**newOrderList**中。\n\
  \n在完成对排序需求的循环后，我们调用**criteriaQuery.orderBy()**，并将**newOrderList**作为参数传入。此方法调用有效地设置了我们的排序条件，覆盖了之前为此查询指定的任何排序要求。\n\
  \n最后，我们使用**entityManager**引用来创建一个**TypedQuery<ArtEntity>**引用，然后使用嵌入在**QueryOpts**参数中的分页详情来设置**firstResult**和**maxResults**属性，从而有效控制查询的范围和页面大小。\n\
  \n如您所见，Criteria API 是一个强大的工具，能够以面向对象的方式动态表达查询。Criteria API 还支持更高级的功能，例如连接和复合谓词表达式，以及独特的能力，如“按示例查询”。对于某些查询，使用\
  \ JPQL 还是 Criteria API 可能只是风格问题。然而，我们认为深入理解 Criteria API 非常重要，这样您才能有效地利用这一特性——\n\
  \n尤其是在 JPQL 无法提供优雅或可行解决方案的情况下。\n\n总结\n\n在本章中，我们介绍了一些核心的 ORM 概念，并学习了更多关于如何将 Spring\
  \ 和 Hibernate 结合使用的知识。我们还回顾了一些关键的设计模式，这些模式对于 Spring 与许多持久化框架的集成方式至关重要。通过我们的画廊应用示例，我们演示了如何实现一个有效的\
  \ DAO 层。我们探讨了集成 Hibernate 的几种选择——使用**HibernateTemplate**以及使用 Hibernate 核心 API。\n\
  \n第 6 章 ■ DAO 与查询\n\nDAO 模式被认为是抽象持久化相关功能的最佳实践。\n\n使用 Hibernate，我们演示了如何通过标识符加载实体、保存或更新单个实体，以及使用\
  \ HQL 查询领域对象。我们讨论了一些查询技术，并研究了使用隐式和显式形式执行连接的各种方法。我们还对比了使用 Spring 的**HibernateTemplate**和\
  \ Hibernate 核心 API 的实现策略。\n\n尽管**HibernateTemplate**在 Spring 和 Hibernate 的历史中都扮演了重要角色，但由于\
  \ Hibernate 架构在 3.0.1 版本之后的改进，其使用已变得不那么重要。\n\n本章讨论了构建画廊应用 DAO 层的几种实现方案。我们基于前一章介绍的一些概念进行了构建，这些概念说明了我们应用领域模型的映射策略。在下一章中，我们将基于本章介绍的\
  \ DAO 层进行构建，演示如何使用服务层来定义应用的事务性业务逻辑。\n\n**第 7 章**\n\n■ ■ ■\n\n**事务管理**\n\n数据库事务帮助您将一组操作分组为一个工作单元。所有操作要么全部成功，要么全部失败。\n\
  \nSpring 强大而灵活的事务支持是其框架成功和流行的另一个因素。在 Spring 之前，复杂或声明式的事务特性通常要求组织使用 EJB 以及重量级的 JEE\
  \ 容器。通过使用面向切面编程（AOP）技术，Spring 帮助普及了企业级事务支持，使开发人员能够干净地将事务规则应用于其代码，无论他们使用的是完整的 JEE\
  \ 应用服务器、轻量级的 Web 容器，甚至是独立的单元测试。\n\nSpring 不仅帮助消除了对重量级容器的需求，而且还为事务管理提供了通用的抽象。无论您使用的是\
  \ Hibernate 事务、本地数据库事务，还是允许跨多个数据源进行分布式事务的 Java 事务 API（JTA），这都不再重要。就像 Spring 提供通用的**DataAccessException**层次结构一样，Spring\
  \ 对事务管理和划分的抽象有助于简化和解耦事务细节与应用程序代码及业务逻辑。\n\nEJB 的流行很大程度上源于其事务支持。EJB 提供了一种通过配置指定事务规则的方法，防止这些细节给数据访问代码增加过多复杂性。通过利用其\
  \ AOP 特性，Spring 能够提供类似的灵活性，但无需重量级 EJB 容器的开销，也无需添加组织不需要的复杂性或功能。\n\n使用 Spring，事务规则可以整合到配置中，这样代码就不会被这些类型的问题所困扰。在使用\
  \ JTA 数据源的 JEE 应用服务器和使用本地数据源的简单单元测试之间切换，只需修改 Spring 配置——无需更改任何代码。当使用 JTA 事务管理器时，Spring\
  \ 可以利用 JTA 提供的一些高级特性。然而，关键的好处在于，Spring 提供了一致的事务编程模型——无论您需要事务跨多个数据源（JTA 提供的特性）还是单个数据源，您定义这些事务问题的方式始终相同。\n\
  \n在极少数情况下，如果您确实希望以编程方式为应用程序定义事务规则，Spring 也提供了实现此目的的方法。您可以仅依赖 Hibernate 的事务编程模型，但通过利用\
  \ Spring 的抽象，您可以通过基于通用 API 编写持久化代码来减少对 Hibernate 的耦合。如果您将来决定放弃 Hibernate，或者（更可能的是）您的持久化层同时使用\
  \ Hibernate 和 JDBC，这可能会派上用场。\n\n第 7 章 ■ 事务管理\n\nSpring 允许您控制在每个方法级别上如何执行事务。事务管理可以通过\
  \ XML 配置或使用注解来应用。在本章中，我们将演示这两种方法。但是，我们建议使用注解，因为这种策略最直观，并且允许将事务元数据直接嵌入到服务层类或接口中。\n\
  \nACID 的乐趣\n\n在我们开始使用 Spring 向应用程序添加事务之前，让我们讨论一些基本的理论概念。关于事务有很多需要了解的内容，但最重要的细节都包含在首字母缩写词\
  \ ACID 中，它定义了事务的四个核心要求：\n\n\n\n**原子性**规定单个事务内的所有操作必须全部完成或全部不完成。换句话说，事务允许将多个数据库操作作为一个整体来执行。如果发生错误，整个操作集将被回滚。\n\
  \n**一致性**要求事务必须将数据库从一个一致状态转换到另一个一致状态。成功的事务不能使数据库处于违反数据库完整性约束或模式的状态。换言之，在事务提交之前，每次插入、更新或删除操作都必须遵守数据库约束和参照完整性规则。\n\
  \n**隔离性**定义了正在运行的事务如何影响或与其他并发运行的事务交互。事务上使用的隔离策略非常重要。如果选择的隔离级别过于宽松，可能会引入难以发现的错误，从而对数据的完整性产生不利影响。然而，如果隔离级别过高，则存在拖慢应用程序或导致数据库死锁的风险。此设置同时取决于应用服务器和数据库服务器。虽然技术上有八种隔离级别，但通常你只需要关注\
  \ ANSI/ISO SQL 标准定义的四种。你还应注意，不同数据库管理系统厂商之间的默认隔离级别差异很大。\n\n**持久性**确保一旦事务提交，其更改不会丢失，并且能够在数据库发生故障后幸存。\n\
  \n在本章中，我们将介绍 ACID 事务的基础知识，以及如何使用 Spring 以声明方式应用事务。这些概念无疑将对任何类型的应用程序开发都很有用，并且在你下一次求职面试时也可能派上用场！（不过我们建议等待这些话题在面试中自然出现——我们不建议一上来就表白你对\
  \ ACID 的热爱。）\n\nACID 可能看起来有点令人困惑，但它能确保你的数据安全，并且在处理持久化时绝对能让你保持头脑清醒。\n\n那么，为什么你应该关心\
  \ ACID？理解数据库行为的可用规则和选项非常重要，这样你才能在应用程序的上下文中有效利用这些特性。\n\n第 7 章 ■ 事务管理\n\n这些细节对于控制一组操作如何应用于数据库，或者并发数据库修改如何相互影响至关重要。不当的事务管理也会对企业应用程序的性能产生不利影响。\n\
  \n理解隔离级别\n\n你在实践中会遇到的四种隔离级别，按从最宽松到最严格的顺序排列，分别是：读未提交、读已提交、可重复读和可序列化。这些隔离级别也会对并发性产生影响。最宽松的隔离级别允许最高数量的并发数据库操作，而最严格的隔离级别几乎肯定会拖慢你的系统。图\
  \ 7-1 突出了每种隔离级别的后果，并展示了隔离级别与并发性之间的关联。\n\n*图 7-1. 隔离级别要求在一致性与并发性之间进行权衡* 为了解释图 7-1\
  \ 中概述的副作用，请考虑我们艺术画廊应用程序中的以下场景：\n\n1. Paul 打开一个数据库事务 T1，并从 **ArtEntity** 表中 **SELECT**\
  \ 所有内容。\n2. Brian 启动一个单独的事务 T2，从 **ArtEntity** 表中 **DELETE** 一件艺术品。\n3. Brian 仍在同一个\
  \ T2 事务中，**UPDATE** **ArtEntity** 表中的一条记录，修正一个拼写错误。\n4. Paul 仍在同一个 T1 事务中，第二次 **SELECT**\
  \ **ArtEntity** 表中的所有艺术品。\n\n\n\n5. 布莱恩的事务 T2 **提交**。\n\n6. 玛丽启动一个新事务 T3，并向 **ArtEntity**\
  \ 表**插入**一件新的艺术品。\n\n7. 仍在同一事务 T1 中的保罗，第三次**查询** **ArtEntity** 表中的所有艺术品。\n\n8. 玛丽的\
  \ T3 事务**提交**。\n\n9. 仍在同一事务 T1 中的保罗，第四次**查询** **ArtEntity** 表中的所有艺术品。\n\n10. 保罗的事务\
  \ T1 最终**提交**。\n\n保罗在第四步应该看到什么？第七步和第九步呢？你的数据库供应商会有默认行为定义，但重要的是，你要知道通过选择你偏好的事务隔离级别，你可以完全控制结果。让我们看看四种隔离级别如何影响这个场景。\n\
  \n可序列化\n\n最容易理解的隔离级别是可序列化，它要求完全隔离。如果我们选择可序列化作为隔离级别，那么在保罗开始一个新事务之前，他永远不会看到布莱恩或玛丽的任何更改。从保罗的角度来看，数据库始终保持完全一致，没有任何副作用；保罗的查询四次都会看到相同的结果，因为它们都发生在一个与任何其他修改隔离的单一事务中。这听起来很理想，对吧？那还有什么好讨论的呢？不幸的是，这种设置会带来大量开销。\n\
  \n使用可序列化会大大减少可能发生的并发操作数量，并可能导致涉及数据库锁的严重性能问题。因此，可序列化隔离级别应谨慎使用，仅在用例确实需要绝对一致性，并且可以接受并发事务可能被迫因错误而中止的风险时使用。\n\
  \n可重复读\n\n在我们的场景中，通过使用可重复读隔离级别来稍微放宽隔离性，将允许保罗看到任何已提交的插入，但看不到更新或删除。为了保证同一行的重复读取保持一致，底层数据库通常会实现行级共享读锁或多版本控制。在此隔离级别设置下，保罗在场景中的任何时刻都不会看到布莱恩的更新或删除。然而，在第九步玛丽提交事务后，保罗会看到她的插入。这种副作用——在单个事务（T1）中，之前（第四步和第七步）不可见的新插入并已提交的行，在保罗的查询（第九步）中变得可见——被称为幻读。\n\
  \n第 7 章 ■ 事务管理\n\n读已提交\n\n读已提交是大多数关系数据库管理系统供应商（包括 Oracle 和 PostgreSQL）使用的默认隔离级别。此隔离级别规定，事务只能读取数据库中已提交的数据。选择读已提交时，保罗将看到布莱恩或玛丽在其各自事务完成并提交后所做的任何更改。这提供了一定的数据一致性，同时仍能实现高并发性。与可重复读隔离级别一样，保罗仍然容易受到幻读的影响。与可重复读隔离级别的情况一样，保罗在第九步的查询将返回一个在其事务中之前不可见的新记录。选择读已提交时，保罗还会面临第二种类型的副作用：不可重复读。当在同一事务中重复读取同一行返回不同的数据时，就会发生不可重复读。这在第五步布莱恩的更新和删除被提交后成为可能。与可序列化或可重复读隔离级别下的情况不同，这些行级修改在第七步对保罗变得可见，尽管保罗之前已经读取过这两行，并且他仍然处于其第一个也是唯一一个事务\
  \ T1 的上下文中。\n\n如有疑问，请选择读已提交。\n\n读未提交\n\n\n\n与可序列化隔离级别截然相反的是读未提交隔离级别。如果我们在场景中采用读未提交，那么将完全不存在任何事务隔离。\n\
  \n因此，保罗的前三个相同查询将全部返回不同的结果。如果玛丽在第八步的提交成功，保罗的第四次查询将返回与他第三次查询相同的结果。\n\n在第四步，保罗看到了布莱恩的拼写更正（SQL\
  \ **UPDATE**）以及他执行的删除操作（SQL **DELETE**），而此时布莱恩的事务尚未提交。这第三种副作用通常被称为脏读，因为保罗读取的是暂存数据。如果布莱恩的提交在第五步失败，迫使其事务回滚，那么保罗正在查看的数据将变得完全不准确。在第七步，玛丽提交之前读取她的插入操作，同样属于脏读，因为那也代表了暂存数据。\n\
  \n选择读未提交隔离级别会使你暴露于所有这三种可能的副作用之下。\n\n直观来看，这代表了一种并不理想的策略。然而，读未提交隔离级别也有一线希望。由于该隔离级别提供了最高程度的并发性，可以预期保罗、布莱恩和玛丽各自的\
  \ SQL 操作都将极其快速。当你需要强调速度，并且确信你的应用程序能够应对这些副作用时，你可能会采用此隔离级别。与可序列化一样，读未提交只应在边缘用例中考虑。\n\
  \n控制 ACID 回流\n\n事务定义了数据如何以及何时提交到数据库。它们对于将持久化逻辑组合在一起、确保所有方法成功完成或数据库回滚到之前状态是不可或缺的。对于大多数操作，你还需要关注事务细节，确保事务在操作开始时启动，并在操作完成时提交或回滚。Spring\
  \ 通过三个核心概念实现了这些特性：\n\n第 7 章 ■ 事务管理\n\n• *平台事务管理* 指的是 Spring 用于处理提交和回滚的抽象。像 Hibernate\
  \ 和 iBatis 这样的框架有自己的事务实现。此外，事务在测试环境中的运行方式通常与在 EJB 服务器中不同。Spring 的平台事务管理抽象隐藏了这些细节，允许开发人员以一致的方式指定事务规则。\n\
  \n• *声明式事务管理* 允许开发人员通过元数据或配置来指定特定方法的事务需求。显然，设置、提交和回滚给定事务的代码仍然会被执行。然而，这些细节可以与代码本身分离，并外部化到配置文件或注解中。\n\
  \n• *编程式事务管理* 通过代码显式控制事务。Spring 提供了一个 **TransactionTemplate** 类，可以极大地简化将事务语义应用于给定方法所需的代码。\n\
  \n然而，这种方法要求将事务细节与业务逻辑混合在一起，并需要你的代码直接与 Spring API 交互。\n\n我们将在以下各节中介绍每种事务类型。\n\n平台事务管理\n\
  \nSpring 提供了多个 **TransactionManager** 实现，每个都扮演着（请击鼓）管理事务的角色。**TransactionManager**\
  \ 实例通常继承自 **AbstractPlatformTransactionManager** 类，而该类又实现了 **PlatformTransactionManager**\
  \ 接口。这些类构成了 Spring 事务支持的基础，并提供了访问、启动、回滚和提交事务的知识。该接口如下所示：**public interface PlatformTransactionManager\
  \ {**\n\n**TransactionStatus getTransaction(TransactionDefinition definition)**\
  \ **throws TransactionException;**\n\n****void commit(TransactionStatus status)\
  \ throws TransactionException;**\n\n****void rollback(TransactionStatus status)\
  \ throws TransactionException;**\n\n**}**\n\n有相当多的 **TransactionManager** 实现。例如，**DataSourceTransactionManager**\
  \ 用于 JDBC 和 iBATIS 实现。就我们的目的而言，我们主要关注 Spring 基于 ORM 的 **TransactionManager** 实现：**HibernateTransactionManager**\
  \ 和 **JpaTransactionManager**。\n\n你甚至会发现用于 EJB 的基于 JTA 的 **TransactionManager**\
  \ 实现。JTA 通常用于使事务能够跨越多个数据库甚至不同的技术，例如 Java 消息服务 (JMS)。这些包括通用的 **JtaTransactionManager**\
  \ 以及针对特定 EJB 服务器的实现，例如用于 Oracle 服务器的 **OC4JJtaTransactionManager**、用于 BEA 服务器的 **WebLogicJtaTransactionManager**\
  \ 和用于 IBM 服务器的 **WebSphereUowTransactionManager**。\n\n通过将 **<tx:jta-transaction-manager/>**\
  \ XML 标签添加到你的 Spring 配置中，你可以让 Spring 根据运行时信息确定使用哪个 JTA 事务管理器，这样你就不需要在配置中显式引用特定于平台的细节。\n\
  \n第 7 章 ■ 事务管理\n\n你可能已经注意到 **PlatformTransactionManager** 接口中包含的 **TransactionStatus**\
  \ 和 **TransactionDefinition** 接口。你很少需要自己使用这些接口。它们由 Spring 的声明式事务管理（将在下一节讨论）设置，但仍然值得了解，因为这些细节有助于解释\
  \ Spring 的事务特性如何在底层工作。\n\n**TransactionStatus**：封装与正在运行的事务相关的关键信息，例如是否已创建新事务以及事务应回滚还是提交。它还允许将事务标记为\
  \ **Rollback-Only**。将正在运行的事务设置为 **Rollback-Only** 会告诉事务系统该事务应被回滚。例如，在发生错误条件时，你可以编写代码在\
  \ **TransactionStatus** 实例上调用 **setRollbackOnly()**，这将确保正在运行的事务被回滚。\n\n**TransactionDefinition**：定义我们之前讨论过的\
  \ ACID 属性，包括诸如事务的隔离规则、你的事务是否将执行任何写入操作（或是只读）、事务在超时前允许运行多长时间，以及如何处理事务传播等细节。\n\n我们将在本章后面讨论编程式事务管理时，进一步了解这些类是如何被使用的。\n\
  \n声明式事务管理\n\n*声明式编程* 使用元数据来定义特定应用程序逻辑集合的需求，而不是直接编写定义此行为的步骤代码。通常，你在框架的上下文中使用声明式编程，该框架旨在分析元数据以相应地调整其行为。因此，使用声明式事务管理意味着你定义构成事务行为的规则或属性，而不是将这些逻辑直接散布在你的代码中。正如你可能猜到的，Spring\
  \ 通过利用其出色的 AOP 支持，将这些横切关注点应用到你的代码中。然而，由于事务是如此普遍和关键的特性，AOP 细节被稍微抽象化，以提供更清晰、更专注于事务的方法。\n\
  \n\n\nSpring 提供了一种基于注解的出色事务管理方法。另一种选择是使用基于 Spring 配置的 XML 驱动策略。我们将讨论这两种方法，从基于注解的事务管理开始，因为你在前面的章节中已经看到过相关示例。\n\
  \n事务注解\n\n使用 **@Transactional** 注解，你可以设置一些事务行为和属性。\n\n**Propagation** 为指定的方法定义事务行为。此设置决定是否应始终创建新事务、是否应创建嵌套事务，或者是否根本不创建事务。以下是可以在\
  \ Spring 中使用的 **Propagation** 值：\n\n• **REQUIRED**：如果存在事务，则支持它；否则，创建一个新事务。\n\n•\
  \ **SUPPORTS**：如果存在事务，则支持它，但这不是必需的。\n\n第 7 章 ■ 事务管理\n\n• **MANDATORY**：必须存在事务；否则，抛出异常。\n\
  \n• **REQUIRES_NEW**：创建一个新事务，如果当前事务存在，则挂起它。\n\n• **NOT_SUPPORTED**：在“事务化”方法内以非事务方式执行代码，并挂起当前事务。\n\
  \n• **NEVER**：如果存在事务，则抛出异常。\n\n• **NESTED**：如果存在事务，则执行嵌套事务；否则，创建一个新事务。嵌套事务提供了一种提供更细粒度事务行为的方法，允许执行一组内部事务。例如，这在某些嵌套事务可能回滚但不会中止整个操作的情况下很有用。\n\
  \n**Isolation** 是 ACID 中的“I”，它定义了正在运行的事务如何影响（以及如何受）应用程序中发生的其他数据库进程影响。用于控制给定事务隔离行为的设置如下：\n\
  \n• **DEFAULT**：让数据存储定义隔离级别。\n\n• **READ_UNCOMMITTED**：此隔离级别允许活动事务读取其他正在运行的事务所做的更改，即使这些其他事务尚未提交。换句话说，此设置允许脏读。\n\
  \n• **READ_COMMITTED**：不允许脏读和不可重复读，但允许幻读。只有成功提交的事务所做的更改才是可见的。\n\n• **REPEATABLE_READ**：表示防止脏读和不可重复读，但可能发生幻读。\n\
  \n• **SERIALIZABLE**：表示防止脏读、不可重复读和幻读。\n\nSpring 还提供了一种指定事务某些基本属性的方法。例如，你可以使用 **readOnly**\
  \ 属性来指示事务是否为只读（与执行插入或更新的事务相对）。**readOnly** 值为 **true** 可确保该方法仅执行读取操作。\n\n**timeout**\
  \ 属性定义了事务在不提交或回滚的情况下可以存活的时间。如果正在运行的事务在未完成的情况下超时，Spring 将自动回滚该事务。\n\nSpring 的事务支持提供了一种指定在抛出异常时事务应如何行为的方法。例如，我们可以指定，每当我们的\
  \ **ArtEntityService** 中的方法抛出 **InvalidImageException** 时，当前正在运行的事务应被回滚。\n\nSpring\
  \ 提供了 **rollbackFor** 和 **rollbackForClassName** 属性来实现此行为。此设置允许你指定一个异常类或类名（取决于使用的设置）数组，当抛出这些异常时，将触发当前正在执行的事务自动回滚。\n\
  \n类似地，你可以通过使用 **noRollbackForClass** 和 **noRollbackForClassName** 属性来指定相反的行为（哪些异常不应触发回滚）。这些选项的工作方式与\
  \ **rollbackFor** 和 **rollbackForClassName** 相同，但如果在执行此事务时抛出了指定的异常类之一，则会阻止事务回滚。\n\
  \n第 7 章 ■ 事务管理\n\n在更清晰地了解了 Spring 事务的一些配置选项后，让我们看看如何为我们的服务类指定事务语义。为简单起见，我们将检查 **ArtEntityService**\
  \ 类的一个缩减版本。\n\n**class ArtEntityServiceImpl implements ArtEntityService {**\n\n\
  ****@Transactional(rollbackFor=InvalidImageExeption.class,**\n\n**readOnly=false,**\n\
  \n**timeout=30,**\n\n**propagation=Propagation.SUPPORTS,**\n\n**isolation=Isolation.DEFAULT)**\n\
  \n**public void saveArtEntity(ArtEntity artEntity) throws InvalidImageException\
  \ {**\n\n**this.getArtEntityDao().saveArtEntity(artEntity);**\n\n**}**\n\n****}**\n\
  \n在这里，我们定义了一个事务性服务方法，该方法指定了 30 秒的超时时间，并且如果抛出 **InvalidImageException**，将自动回滚。请注意，我们还配置了事务为可写（**readOnly**\
  \ 设置为 **false**）。\n\n现在我们已经配置了事务的细节，我们需要设置事务管理器。如前所述，Spring 提供了一个 **PlatformTransactionManager**\
  \ 接口，以及一组用于不同持久化策略的实现。对于跨多个数据源的全局事务，我们需要使用 Spring 的 JTA 支持。在我们的示例中，我们将使用 Spring\
  \ 的 **JpaTransactionManager**。我们的 **spring-jpa.xml** 应更新为如下所示（事务支持的重要部分已加粗）：\n\n\
  **<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>**\n\n**<beans**\n\
  \n**********xsi:schemaLocation=\"http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**\
  \ **http://www.springframework.org/schema/context**\n\n**http://www.springframework.org/schema/context/spring-context-3.0.xsd**\
  \ http://www.springframework.org/schema/tx\n\n**http://www.springframework.org/schema/tx/spring-tx-3.0.xsd**\"\
  >****\n\n******<!-- JPA 实体管理器工厂 -->**\n\n**<bean id=\"entityManagerFactory\"**\n\
  \n**class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
  **\n\n**p:dataSource-ref=\"galleryDataSource\"/>**\n\n****<bean**\n\n**class=\"\
  org.springframework.orm.jpa.support.PersistenceAnnotationBeanPostProcessor\" />**\n\
  \n****117\n\n第 7 章 ■ 事务管理\n\n**<!-- 数据库 LOB 处理 -->**\n\n**<bean id=\"defaultLobHandler\"\
  **\n\n**class=\"org.springframework.jdbc.support.lob.DefaultLobHandler\" />**\n\n\
  ****<!-- 从 JPA 包中读取 DAO -->**\n\n**<context:component-scan base-package=\"com.prospringhibernate.gallery.dao.jpa\"\
  \ />**\n\n**<!-- 事务配置 -->\n\n<bean id=\"transactionManager\"\n\nclass=\"org.springframework.orm.jpa.JpaTransactionManager\"\
  \n\np:entityManagerFactory-ref=\"entityManagerFactory\"/>\n\n**<tx:annotation-driven\
  \ mode=\"aspectj\" transaction-manager=\"transactionManager\"/>\n\n****</beans>**\n\
  \n此示例中的 XML 配置指定了我们的 **artEntityService** bean 以及我们的 **PlatformTransactionManager**。我们使用的是\
  \ Spring 的 **JpaTransactionManager**，但如果我们决定创建 JDBC 实现，或者甚至需要通过 JTA 进行全局事务，我们声明式配置事务的方式也不会有所不同。Spring\
  \ 允许我们使用一致的策略来指定事务，无论底层实现细节如何。\n\n还要注意 Spring 在其 **tx** 命名空间中包含的 **tx:annotation-driven**\
  \ bean。此 XML\n\n\n\n`snippet` 是启用我们 **@Transactional** 注解所必需的。没有它，Spring 将无法为我们的\
  \ **ArtEntityService** 启用事务。**tx:annotation-driven** 注解支持以下特性：\n\n• **transaction-manager**：提供用于事务管理器的\
  \ bean 名称。理论上，你可以在 Spring 应用上下文中拥有多个事务管理器，但只使用其中一个。默认值为 **transactionManager**。\n\
  \n• **mode**：指定你想要的代理机制类型。你可以选择使用 Spring 代理的 **proxy**，或使用 AspectJ（一个工业级 AOP 框架）的\
  \ **aspectj**。默认值为 **proxy**。\n\n• **proxy-target-class**：默认情况下，Spring 会创建一个 Java\
  \ 代理对象，并且只附加该对象实现的接口。例如，如果你有一个实现 **PersonDao** 接口的 **PersonDaoJPA** 类，代理过程将创建一个实现\
  \ **PersonDao** 的对象，添加事务语义的实现，并将请求传递给你的实现。\n\n如果该类没有实现任何接口，或者你需要代理扩展该类而不仅仅是其接口，Spring\
  \ 将使用 Code Generation Library (CGLIB) 开源字节码操作框架来执行代理。\n\nCGLIB 方法确实有一个限制：你需要将事务注解放在类本身，而不是接口上。\n\
  \n• **order**：还有许多其他框架利用代理，但要使用它们，你可能需要显式地对事务和其他代理机制进行排序。数字较小的顺序会优先处理。\n\n第 7 章\
  \ ■ 事务管理\n\n通过 XML 进行声明式事务\n\n除了使用 **@Transactional** 注解来应用事务语义，你还可以采用纯 XML 驱动的方法。这种方法在你倾向于不使用注解，或者因为需要使用\
  \ JDK 1.4 而无法使用注解，或者你想将事务语义应用于无法修改的库时非常有用。\n\n将 **tx:advice** XML 配置与基于 XML 的 AOP\
  \ 配置相结合，可以产生协同效应。例如，你可以使用方法名称自动确定要应用哪种事务类型。\n\n以下是一个示例，指定以 `save`、`update` 和 `delete`\
  \ 开头的方法需要事务，而其他所有方法支持（但不要求）只读事务：\n\n**<tx:advice id=\"txAdvice\" >**\n\n**<tx:attributes>**\n\
  \n**<tx:method name=\"save*\" propagation=\"REQUIRED\"/>**\n\n**<tx:method name=\"\
  update*\" propagation=\"REQUIRED\"/>**\n\n**<tx:method name=\"delete*\" propagation=\"\
  REQUIRED\"/>**\n\n**<tx:method name=\"*\" propagation=\"SUPPORTS\" read-only=\"\
  true\"/>**\n\n**</tx:attributes>**\n\n**</tx:advice>**\n\n**tx:advice** 确实支持 **transaction-manager**\
  \ XML 属性，但默认情况下，它使用名称 **transactionManager**，就像 **tx:annotation-driven** 一样。\n\n\
  除了灵活的方法名称匹配外，**tx:method** 元素具有与 **@Transactional** 注解相同类型的参数。你可以为 **propagation**、**isolation**、**timeout**、**read-only**、**rollback-for**\
  \ 和 **no-rollback-for** 设置值。这些 **tx:method** XML 属性与其 **@Transactional** 对应项具有相同的值。\n\
  \n为了使这个示例完整，还需要添加一个细节。你需要使用 Spring 的 AOP 框架来定义哪些 bean 需要该通知。你可以通过在 Spring XML 文件中使用\
  \ **aop** 命名空间来实现这一点。例如，如果我们想将事务通知应用于 **com.prospringhibernate.gallery.service**\
  \ 包中的所有类，我们可以将以下内容添加到 Spring XML 文件中：\n\n**<aop:config>**\n\n**<aop:pointcut id=\"\
  allServices\"**\n\n**expression=\"execution(*com.prospringhibernate.gallery.service.*.*(..))\"\
  />**\n\n**<aop:advisor advice-ref=\"txAdvice\" pointcut-ref=\"allServices\"/>**\n\
  \n**</aop:config>**\n\nSpring AOP 非常灵活，甚至允许你使用注解来定义切入点。如果你想将 **txAdvice** 应用于任何带有\
  \ **@Transactional** 注解的类，你可以将 **allServices** 切入点更改为：\n\n**<aop:pointcut id=\"\
  allServices\"**\n\n**expression=\"@target(org.springframework.transaction.annotation.Transactional)\"\
  />** 你甚至可以组合这两种切入点方法，如下所示：\n\n第 7 章 ■ 事务管理\n\n**<aop:pointcut**\n\n**id=\"allServices\"\
  **\n\n**expression=\"execution(*com.prospringhibernate.gallery.service.*.*(..))\
  \ &&**\n\n**@target(org.springframework.transaction.annotation.Transactional)\"\
  />** 让我们再看一个 Spring AOP 技巧：使用 bean 名称来定义切入点。以下是如何将事务应用于名为 **personService** 的 bean：\n\
  \n**<aop:pointcut id=\"allServices\" expression =\"bean(personService)\"/>** 你也可以使用星号\
  \ (*****) 通配符来匹配所有以 **Service** 或 **Dao** 结尾的 bean，如下所示：\n\n**<aop:pointcut id=\"\
  allServices\" expression =\"bean(*Service) || bean(*Dao)\"/>** 如果对 ACID 事务应用复杂的\
  \ AOP 切入点仍然让你感到有些难以理解，那么你会发现外面有大量的文档可供参考。¹ 然而，你在这里收集到的信息应该能为你理解如何管理好你的 ACID 事务提供一个良好的开端。\n\
  \n编程式事务管理\n\n我们想不出太多实际用例需要采用编程式事务，而不是利用 Spring 更简单的声明式事务支持。然而，理解编程式事务有助于理解 Spring\
  \ 事务在底层的工作方式。\n\n为了演示编程式事务如何工作，我们将重新编写 **ArtEntityService** 示例，使用编程式事务，如下所示：\n\n\
  **public class ArtEntityServiceImpl implements ArtEntityService {**\n\n****private\
  \ TransactionTemplate transactionTemplate;**\n\n****public ArtEntityServiceImpl(PlatformTransactionManager\
  \ transactionManager) {**\n\n**this.transactionTemplate = new TransactionTemplate(transactionManager);**\n\
  \n**}**\n\n****public Object saveArtEntity(ArtEntity artEntity) {**\n\n**return\
  \ transactionTemplate.execute(**\n\n**new TransactionCallback() {**\n\n**public\
  \ Object doInTransactionWithoutResult(TransactionStatus status) {**\n\n**try {**\n\
  \n**this.getArtEntityDao().saveArtEntity(artEntity);** ¹ 如果你想了解更多关于庞大且重要的事务处理领域，请考虑阅读\
  \ Jim Gray 和 Andreas Reuter 所著的《Transaction Processing: Concepts and Techniques》（Morgan\
  \ Kaufmann, 1992）；Philip A. Bernstein 和 Eric Newcomer 所著的《Principles of Transaction\
  \ Processing》第二版（Morgan Kaufmann, 2009）；以及 Mike Keith 和 Merrick Schincariol 所著的《Pro\
  \ JPA 2: Mastering the Java Persistence API》（Apress, 2009）。\n\n第 7 章 ■ 事务管理\n\n\
  **} catch (ImageErrorException e) {**\n\n**status.setRollbackOnly();**\n\n**}**\n\
  \n**return;**\n\n**}**\n\n**}**\n\n**);**\n\n**}**\n\n****}**\n\n在这段代码片段中，我们依赖构造函数注入来提供对\
  \ **JpaTransactionManager**（它是 **PlatformTransactionManager** 接口的一个实现）的引用。使用 **transactionManager**，我们创建了一个\
  \ **TransactionTemplate** 实例，并用它来将我们的持久化行为包装在事务范围内。\n\n**TransactionTemplate** 的使用方式应该让你感到非常熟悉。这是一种常见的\
  \ Spring 惯用模式，其工作方式与我们 DAO 类中使用的 **HibernateTemplate** 类似。这里的关键区别在于，我们使用 **TransactionTemplate**\
  \ 来处理事务的样板流程，而不是处理数据库连接的建立和关闭。\n\n\n\n为了将持久化代码包装在事务中，我们在 **transactionTemplate**\
  \ 属性上调用 **execute** 方法，并传入一个 **TransactionCallback** 的匿名实现作为参数。在示例中，我们的服务方法没有返回值，因此我们实现了\
  \ **doInTransactionWithoutResult** 方法。然而，如果我们需要从事务中返回一个值，则应改用 **doInTransaction**。\n\
  \n在 **TransactionCallback** 的作用域内，我们调用了与基于注解的示例中相同的持久化代码。我们将繁重的工作委托给 **artEntityDao**\
  \ 处理。但请注意，我们捕获了 **ImageErrorException**，如果抛出该异常，我们会使用 **TransactionStatus** 参数来回滚事务。\n\
  \n显然，这种方法不如在 Spring 中使用声明式事务那样清晰或优雅。\n\n尽管如此，了解各个组件如何在不依赖 AOP 隐式注入此行为的情况下协同工作，仍然很有帮助。\n\
  \n事务示例\n\n现在我们已经介绍了主要的事务概念，接下来让我们看几个实际场景。我们将研究一个批处理应用程序以及涉及两个数据源的事务。\n\n创建批处理应用程序\n\
  \n批处理应用程序可能会有些繁琐，尤其是在使用 ORM 框架时。数据库和 ORM 框架都需要为事务中执行的每个操作保留宝贵的资源。数据库需要对已更改的表保持锁定。而\
  \ ORM 出于多种原因，需要缓存已持久化以及从数据库读取的对象。事务执行的操作越多，ORM 和数据库需要为其投入的资源就越多。\n\n让我们从以下示例开始，该示例更新了一大批记录：\n\
  \n**@Transactional(readOnly = false, propagation = Propagation.SUPPORTS)**  \n**public\
  \ void batchProcessAll() {**  \n    **int count = dao.getCount();**  \n    **//\
  \ 在一个大循环中执行你的 ACID 业务**  \n**}**\n\n在这里，我们试图在单个事务中更新所有数据。根据数据量和系统资源的不同，这可能无法实现，或者可能导致应用程序性能下降。相反，我们或许能够找到一种方法来定义更小的、可以提交的工作单元，这将释放数据库和\
  \ ORM 框架使用的一些资源。然而，提交事务的过程也会消耗资源。如果提交过于频繁，我们很可能会降低性能。在提交过于频繁和过于稀少之间需要取得平衡——例如，在处理了一定数量的项目后进行提交。\n\
  \n我们可以创建一个方法，处理 *x* 个工作单元，并在完成后提交。实际上，设置起来非常简单。我们选择 100 作为任意数量的 *工作单元*。\n\n**//\
  \ 此方法不再有事务**  \n**public void batchProcessAll() {**  \n    **int count = dao.getCount();**\
  \  \n    **for(int i=0; i<count; i+= 100) {**  \n        **doMyUnit(i, i+100);**\
  \  \n    **}**  \n**}**  \n\n**@Transactional(readOnly = false, propagation = Propagation.REQUIRES_NEW)**\
  \  \n**public void doMyUnit(int start, int finish) {**  \n    **// 从工作单元的 start\
  \ 到 finish 执行你的 ACID 业务**  \n    **dao.flush();**  \n**}**\n\n注意使用了 **Propagation.REQUIRES_NEW**。它告诉\
  \ Spring，当方法被调用时开始一个新事务，并在方法完成时提交。创建和提交事务就是这么简单。要确定理想的批处理大小，需要考虑从服务器容量到应用程序负载的许多变量，因此为你的应用程序确定最佳大小可能需要一些试错。\n\
  \n使用两个数据源\n\n假设你有两个数据库，并且希望将正确的事务应用于正确的 Bean。你需要创建两个不同的 **transactionManager**，它们必须应用于适当的\
  \ Spring Bean 子集。你可以通过一些巧妙的 AOP 工作来实现这一点。\n\n假设你已经配置了 **transactionManager1** 和\
  \ **transactionManager2** 这两个 Bean。\n\n你需要从以下 XML 开始：\n\n**<tx:advice id=\"txAdvice1\"\
  \ transaction-manager=\"transaction-manager1\" >**  \n    **<tx:attributes>**  \n\
  \        **<tx:method name=\"save*\" propagation=\"REQUIRED\"/>**  \n        **<tx:method\
  \ name=\"update*\" propagation=\"REQUIRED\"/>**  \n        **<tx:method name=\"\
  delete*\" propagation=\"REQUIRED\"/>**  \n        **<tx:method name=\"*\" propagation=\"\
  SUPPORTS\" read-only=\"true\"/>**  \n    **</tx:attributes>**  \n**</tx:advice>**\
  \  \n\n**<tx:advice id=\"txAdvice2\" transaction-manager=\"transaction-manager2\"\
  \ >**  \n    **<tx:attributes>**  \n        **<tx:method name=\"save*\" propagation=\"\
  REQUIRED\"/>**  \n        **<tx:method name=\"update*\" propagation=\"REQUIRED\"\
  />**  \n        **<tx:method name=\"delete*\" propagation=\"REQUIRED\"/>**  \n \
  \       **<tx:method name=\"*\" propagation=\"SUPPORTS\" read-only=\"true\"/>**\
  \  \n    **</tx:attributes>**  \n**</tx:advice>**  \n\n**<aop:config>**  \n    **<aop:advisor\
  \ advice-ref=\"txAdvice1\" pointcut-ref=\"allDatabaseOneBeans\"/>**  \n    **<aop:advisor\
  \ advice-ref=\"txAdvice2\" pointcut-ref=\"allDatabaseTwoBeans\"/>**  \n    **<!--\
  \ 在此处添加切入点 -->**  \n**</aop:config>**\n\n**tx:advice** 元素告诉 Spring 需要做什么，而 **aop:config**\
  \ 元素告诉 Spring 在哪里做。\n\n现在的问题是，哪些 Bean 应该应用哪个通知？有些 Bean 需要 **txAdvice1**；其他 Bean\
  \ 需要 **txAdvice2**；还有一些 Bean 可能需要两者。幸运的是，Spring AOP 提供了多种映射选项。\n\n你可以选择将类组织到不同的包中，以区分它们关联的两个数据源，并应用表达式切入点；或者你可以设计逻辑\
  \ Bean 名称，明确推断应应用哪个通知。你也可以创建自己的注解，例如 **@Transaction1** 和 **@Transaction2**，并使用 **expression=\"\
  @target(...)\"** 方法。\n\n让我们快速看一个 Bean 名称的示例。假设我们有两个数据源：**datasource1** 和 **datasource2**。假设所有\
  \ **datasource1** 的 Bean 在其名称中都包含 **ds1**。例如，如果 **PersonDao** 旨在与 **datasource1**\
  \ 交互，则它应被命名为 **ds1.personDao**。如果 **PersonService** 依赖于 **personDao** 以及来自 **datasource2**\
  \ 的 DAO，则它应被命名为 **ds1.ds2.personService**。\n\n我们的切入点将如下所示：\n\n**<aop:pointcut id=\"\
  allDatabaseOneBeans\" expression =\"bean(*ds1*)\"/>**  \n**<aop:pointcut id=\"allDatabaseTwoBeans\"\
  \ expression =\"bean(*ds2*)\"/>**\n\n我们定义了两个切入点表达式，它们利用 Bean 命名约定来正确推断给定事务应使用哪个数据源和\
  \ **transactionManager**。\n\n总结\n\n在本章中，你学习了使用 Spring 管理数据库事务的基础知识和底层细节。我们探讨了两种不同的声明式事务应用途径：通过注解和基于\
  \ XML 的 Spring 配置。也可以使用 **TransactionTemplate** 以编程方式利用 Spring 的事务管理。然而，这种方法将事务行为与应用程序的业务逻辑耦合在一起。\n\
  \n理解事务的工作原理以及可用的配置选项，对于开发和调试多用户应用程序至关重要。我们在本章中讨论了简单和复杂的场景，希望它们能让你领略到使用 Spring 进行事务管理的可能性。\n\
  \n\n\n最重要的是，无论架构或环境如何，Spring 都提供了一种一致的方法来将事务语义应用于应用程序。这意味着，无论你是使用 JTA 数据源部署到 JEE\
  \ 应用服务器，还是使用本地数据源部署到轻量级容器，都可以用相同的方式配置和编码你的应用程序。区别仅在于配置的不同。\n\n**第 8 章**\n\n■ ■ ■\n\
  \n**有效的测试**\n\n自动化测试，尤其是单元测试，现在已被普遍认为是软件开发的最佳实践。目前有许多可用的测试框架，并且关于单元测试与集成测试孰优孰劣、是使用\
  \ jMock 或 EasyMock 等框架模拟具有有趣行为的对象，还是采用更经典的基本桩方法、何时应用测试驱动开发（TDD）、行为驱动开发（BDD）是否会变得普遍等问题，仍有很大的争论空间。\n\
  \n在本书中，我们强调了几个最佳实践，包括对应用程序进行分层以及面向接口编程。在本章中，我们将演示这些原则如何有助于构建可靠的测试覆盖率，并适当强调隔离地测试应用程序的各个方面。\n\
  \n一个被分解成多个层、每层具有独特职责的代码库，比试图将多个功能方面合并到单个类中的代码更易于测试。\n\n可测试的代码是解耦的并划分为逻辑层的代码，而分层良好的代码是可测试的，因为它产生了应用程序整体愿景中小的、定义明确的部分。通过面向接口编程并利用\
  \ Spring 的依赖注入能力，当你在测试某一层（例如 DAO 层）之上的层（在本例中，是使用 DAO 的服务层）时，你能够模拟或桩化该层。\n\n像 Spring\
  \ 这样的依赖注入框架对于测试非常有用，因为它们使得直接实例化类变得相对容易，并通过代码提供协作者。特别是使用 Spring 时，你只需指定适当的注解，就可以在测试类中自动注入依赖项。这允许你为测试构建一个应用程序上下文，该上下文使用的配置选项可能与你的生产设置有很大不同。这种灵活性使你能够针对大量潜在输入测试你的代码。\n\
  \n当涉及到验证持久层的断言时，验证 DAO 和服务类的行为、领域类的配置细节和行为，甚至依赖项的协作和连接都是很重要的。\n\n在本章中，我们将浅尝辄止地介绍这些策略，但重要的是要记住，一个有效的测试策略应该同时包含单元测试和集成测试。幸运的是，Spring\
  \ 有助于简化这两种测试的创建，以及其他形式的自动化测试，例如使用 Selenium 等工具进行的功能测试。\n\n第 8 章 ■ 有效的测试\n\n单元测试、集成测试和功能测试\n\
  \nSpring 使得在不依赖应用服务器或其他基础设施细节的情况下测试代码的特定部分变得容易。你可以切换不同的数据库实现和数据源，或者通过模拟这些细节来隔离地测试你的\
  \ DAO 类。\n\n*单元测试* 是一种验证特定类在隔离环境中是否正常工作的有效策略。\n\n隔离地评估类非常有价值，并且没有比一个好的单元测试更好的替代方案。编写有效的单元测试涉及定义关于类中特定区域在隔离环境中的行为的断言。良好的测试覆盖率与哪些代码行的预期行为得到验证有关。\n\
  \n与单元测试不同，*集成测试* 通常同时验证多个组件，通常通过运行应用程序生产版本中使用的相同实现层来进行。例如，集成测试的一个常见做法是实例化 Spring\
  \ **ApplicationContext**，并使用真实的数据库以及 Spring Hibernate 抽象来测试 DAO 实现。这种方法的优点是你接触了多个组件，确保所有部分都能协同工作。缺点是它不能提供足够的粒度来确定特定组件本身是否正常工作。对于全面的测试策略，我们建议同时包含集成测试和单元测试。\n\
  \n一个*测试套件* 是一组设计为一起运行的单个测试类，它们通常对特定层或组件做出断言。例如，你可以创建一个由所有 DAO 测试组成的 DAO 测试套件。以下示例展示了创建测试套件所需的全部操作：\n\
  \n**public void static testSuite() {**\n\n**return new TestSuite(ArtworkDao.class,**\n\
  \n**CategoryDao.class,**\n\n**ExhibitionDao.class,**\n\n**PersonDao.class);**\n\n\
  **}**\n\n现代 IDE（Eclipse、IntelliJ IDEA、NetBeans 等）和其他运行时环境（如 Ant 和 Maven）知道如何运行单个单元测试和测试套件，这些套件可以同时包含单元测试和集成测试。通常使用套件的概念来策略性地将测试捆绑在一起。例如，你可能想要一个由快速单元测试组成的测试套件，在每次提交时运行；以及另一个由运行时间较长的集成测试组成的测试套件，按计划的时间间隔运行。\n\
  \n功能测试是验证应用程序是否正常工作的另一种策略。功能测试提供了对代码库最高级别的评估，并且通常要求应用程序在生产环境容器中运行——例如，使用 Servlet\
  \ 容器。\n\nWeb 应用程序上下文中的功能测试通常涉及一系列 HTTP 请求，然后对应该返回的响应进行断言。例如，一个 REST Web 服务可能包含一组功能测试，用于验证当一段\
  \ XML 被 **POST** 到特定 URL 时返回的数据。另一种类型的功能测试可能会验证给定特定 URL 时，返回的 HTTP 响应中的某些 HTML 元素。\n\
  \n功能测试的缺点，特别是当它们涉及验证 HTML 标记时，在于它们往往非常脆弱——这意味着它们可能会因为应用程序的微小更改而失败。\n\n然而，功能测试确实有其用武之地，并且它们通常是验证关于应用程序行为的基本假设的有效工具。\n\
  \n第 8 章 ■ 有效的测试\n\n使用 JUnit 进行有效测试\n\n目前 Java 社区中两个最大的单元测试框架是 JUnit 和 TestNG。在我们的示例中，我们将使用\
  \ JUnit。JUnit 4 的方法高度基于注解。**@Test** 注解就是你定义测试所需添加的全部内容：\n\n**package com.prospringhibernate.gallery.test;**\n\
  \n****import org.junit.Test;**\n\n**import org.junit.Assert;**\n\n****public class\
  \ TrivialJUnitTest {**\n\n****@Test**\n\n**public void testSimpleStuff() {**\n\n\
  **String name = \"ProSpringHibernate\";**\n\n**Assert.assertEquals(\"ProSpringHibernate\"\
  , name);**\n\n**}**\n\n****}**\n\n一些额外的基本 JUnit 注解可以帮助定义测试的生命周期。你可以使用 **@Before**\
  \ 和 **@After** 注解在每个测试方法之前和之后立即运行一些代码。\n\n猜猜哪个在测试之前运行？你还可以使用 **@BeforeClass** 和\
  \ **@AfterClass** 在特定类中的所有测试之前和之后运行代码。（注意，**@BeforeClass** 方法必须是静态的。）还有一个 **@Ignore**\
  \ 注解，它允许你使用 **@Test** 注解但不运行特定方法。\n\n\n\n当然，测试的主要目的是设定一个场景，然后验证一组断言。JUnit 提供了几个内置的断言，例如验证两个值应该相等、返回值不为\
  \ null 等。在下面的示例中，你会注意到许多这样的注解。\n\n**package com.prospringhibernate.gallery.test;**\n\
  \n**import org.junit.Test;**\n\n**import org.junit.Ignore;**\n\n**import org.junit.Assert;**\n\
  \n**import org.junit.Before;**\n\n**import org.junit.BeforeClass;**\n\n**public\
  \ class SimpleJUnitTest {**\n\n**public static String staticName = null;**\n\n**public\
  \ String memberName = null;**\n\n**@BeforeClass**\n\n**public static void initializeClass()\
  \ {**\n\n**staticName = \"Rod Johnson\";**\n\n**}**\n\n**127**\n\n**第 8 章 ■ 高效测试**\n\
  \n**@Before**\n\n**public void initializeTest() {**\n\n**memberName = \"Gavin King\"\
  ;**\n\n**}**\n\n**@Test**\n\n**public void simpleEqualsAssertion() {**\n\n**Assert.assertEquals(\"\
  Rod Johnson\", staticName);**\n\n**}**\n\n**@Test**\n\n**public void simpleBooleanAssertion()\
  \ {**\n\n**Assert.assertFalse(staticName.equals(memberName));**\n\n**}**\n\n**@Test**\n\
  \n**@Ignore**\n\n**public void dontTestThis() {**\n\n**// 注意，如果没有 @Ignore，这个测试会失败**\n\
  \n**Assert.assertEquals(\"Rod\", memberName);**\n\n**}**\n\n**}**\n\n现在，让我们超越基础知识，将一些测试应用到我们的艺术画廊应用程序中。\n\
  \n使用模拟对象进行单元测试\n\n前面示例中的测试相当简单，因为它们不依赖于 Spring 容器或其他类或组件的实现。由于我们的测试被隔离到特定的类，因此它们属于单元测试。大多数情况下，你需要超越这种基本测试，去模拟两个或多个类相互交互的效果。集成测试是实现这一点的一种方法，但这通常需要大量的代码和紧密的测试耦合。另一种策略是使用桩或模拟对象。\n\
  \n桩和模拟都试图模拟应用程序中特定组件或层的行为，而不依赖于实际的、功能完整的实现。这种方法有助于将测试关注点集中到实际被测试的代码上，而不是其他层的细节上。\n\
  \n桩通常意味着伪造一个特定的组件，返回“预设的响应”，从而使被测试层误以为它在与实际的实现进行通信。模拟也试图模拟特定的层，但它做的不仅仅是返回预设的响应。一个模拟对象还可以用于验证与其所代表的层相关的预期行为。例如，可以指定在模拟对象上调用某个特定方法，以及其他有助于对被测代码如何与模拟层集成提供有价值断言的细节。\n\
  \nSpring 提供了几个有用的模拟层，它们可以作为应用程序中各层的即插即用替代品。例如，JNDI、Servlet-API 和 Portlet 模拟层，它们模拟各自层的行为和相关期望。对于模拟其他组件，可以使用像\
  \ jMock、EasyMock 或 MockObjects 这样的框架。这些框架提供了一种可扩展的方式来动态定义你自己的模拟对象。\n\n**第 8 章 ■\
  \ 高效测试**\n\n在我们的示例中，我们将使用非常强大的 jMock 框架。jMock 允许你定义特定类的行为，以及在单元测试的上下文中，该类上的特定方法将如何被调用以及它们将返回什么的期望。jMock\
  \ 使用一个简单的 DSL，允许你指定相当灵活的行为范围。在本章后面我们查看带有模拟对象的单元测试时，会指出一些基本的 jMock 概念。\n\n让我们看一个单元测试，它试图验证我们的\
  \ **ArtworkService** 实现的行为：\n\n**package com.prospringhibernate.gallery.test;**\n\
  \n**import com.prospringhibernate.gallery.domain.Person;**\n\n**import com.prospringhibernate.gallery.exception.AuthenticationException;**\n\
  **import com.prospringhibernate.gallery.service.ArtworkFacade;**\n\n**import org.junit.Test;**\n\
  \n**import org.junit.Before;**\n\n**import org.junit.runner.RunWith;**\n\n**import\
  \ org.jmock.Mockery;**\n\n**import org.jmock.Expectations;**\n\n**import org.jmock.integration.junit4.JMock;**\n\
  \n**import org.jmock.integration.junit4.JUnit4Mockery;**\n\n**@RunWith(JMock.class)**\n\
  \n**public class JMockJUnitTestExample {**\n\n**Mockery context = new JUnit4Mockery();**\n\
  \n**private Person person;**\n\n**private ArtworkFacade artworkService;**\n\n**@Before**\n\
  \n**public void initializeTest() {**\n\n**person = new Person();**\n\n**person.setUsername(\"\
  username\");**\n\n**person.setPassword(\"goodpassword\");**\n\n**// 这里我们使用 jMock\
  \ 基于我们的接口创建一个模拟对象**\n**artworkService = context.mock(ArtworkFacade.class);**\n\n\
  **}**\n\n**@Test**\n\n**public void testAuthenticationSuccess() throws AuthenticationException\
  \ {**\n\n**// 为 authenticatePerson 方法定义期望**\n\n**context.checking(new Expectations()\
  \ {{**\n\n**allowing(artworkService).authenticatePerson(\"username\", \"goodpassword\"\
  );**\n**will(returnValue(person));**\n\n**}});**\n\n**artworkService.authenticatePerson(\"\
  username\", \"goodpassword\");**\n\n**}**\n\n**第 8 章 ■ 高效测试**\n\n**@Test (expected=AuthenticationException.class)**\n\
  \n**public void testAuthenticationFailure() throws AuthenticationException {**\n\
  \n**// 定义期望，假设用户名/密码错误**\n\n**context.checking(new Expectations() {{**\n\n**allowing(artworkService).authenticatePerson(\"\
  username\", \"badpassword\");**\n**will(throwException(new AuthenticationException()));**\n\
  \n**}});**\n\n**artworkService.authenticatePerson(\"username\", \"badpassword\"\
  );**\n\n**}**\n\n**}**\n\n请注意，这个单元测试不需要任何外部依赖。这不仅有助于隔离我们正在测试的代码，而且还能显著加快测试速度。回想一下，我们的\
  \ **ArtworkService** 门面依赖于几个 DAO，包括 **ArtEntityDao** 和 **PersonDao**，但在这段代码中，在 **authenticatePerson**\
  \ 方法执行之前，没有任何东西实例化这些类。\n\n我们通过提供 **@RunWith(JMock.class)** 注解来声明我们正在使用 jMock 框架。接下来，我们定义上下文实例变量，实例化一个\
  \ **JUnit4Mockery** 实例。然后，我们可以使用上下文实例变量来定义我们模拟的 **ArtworkFacade** 的行为和期望。\n\n我们通过调用上下文实例变量上的\
  \ **mock** 方法，并传入我们想要模拟的类型的接口来创建一个模拟实例：\n\n**artworkService = context.mock(ArtworkFacade.**\
  \ class**);**\n\n这行代码将我们的 **artworkService** 实例设置为 **ArtworkFacade** 接口的一个模拟实现。这样就完成了设置。\n\
  \n现在，我们需要为我们刚刚定义的模拟对象描述其行为和期望。这通过几个步骤完成。期望是通过调用 **context.checking()** 并传入一个类型为\
  \ **Expectations** 的匿名内部类来指定的。**Expectations** 类提供了 jMock 的大部分 DSL 特性，使我们能够更容易地表达我们打算模拟的每个方法的行为。\n\
  \n在这个 **Expectations** 块内部，事情变得有趣起来。我们可以为每个方法指定行为——甚至可以根据不同的参数或条件定义不同的行为。在模拟 **ArtworkFacade**\
  \ 的行为时，有几个选项可以定义。然而，我们必须首先为我们的方法将如何被调用设定期望。我们期望它被恰好调用一次、多次、在一定范围内、还是指定的次数？或者我们根本不关心我们的方法是否会被调用？这些细节被称为*调用计数*，并且是\
  \ jMock DSL 的第一部分。\n\n\n\n在我们的示例中，我们使用了 **allowing** 调用规则，它告诉 jMock 我们不太关心调用次数。如果我们确实在意，可能会使用\
  \ **oneOf**，这意味着我们期望该方法仅被调用一次。或者，我们也可以使用 **exactly(5).of()** 来要求我们的方法被精确调用五次。类似地，我们还可以使用\
  \ **atLeast(5).of()** 来坚持我们的方法至少被调用五次。如果在单元测试中未满足你指定的期望，jMock 将自动使测试失败。\n\n到目前为止，我们的\
  \ DSL 结构如下所示：\n\n**Invocation-Count(mockInstance).method(expectedParams);**\n\n\
  第 8 章 ■ 高效测试\n\n在这个结构中，我们指定了模拟方法应接收的预期参数。实际上，你可以定义多个规则，每个规则指定一组不同的参数。事实上，你甚至不需要指定具体的参数。你可以指定*匹配器*，它们可用于为特定行为规则定义更通用的条件。匹配器的作用是允许为模拟方法的期望表达灵活的条件。匹配器必须嵌套在\
  \ **with** 子句中：\n\n**atLeast(5).of(artworkService).**\n\n**authenticatePerson(with(any(String.class)),\
  \ with(any(String.class)));** 此规则规定 **authenticatePerson** 必须至少被调用五次，且带有两个必须为 **String**\
  \ 类型的参数。在这种情况下，我们使用了 **any** 匹配器，它允许我们指定参数必须匹配的类型。还有其他几种匹配器——例如 **aNull**、**aNonNull**、**not**\
  \ 和 **same**——你甚至可以定义自己的匹配器。\n\n至此，我们已经定义了模拟方法的基本期望。但是，我们如何表达模拟的行为呢？正如你可能从我们的示例中推断出的那样，jMock\
  \ 允许我们通过在期望之后指定一个 **will** 调用来为特定“规则”定义行为。我们为 **authenticatePerson** 方法定义了两种可能的结果。第一个期望定义了一个“正确”的用户名和密码。我们在该期望之后添加了以下内容：\n\
  \n**will(returnValue(successfulPerson));**\n\n这将确保每当在我们的单元测试中向 **authenticatePerson**\
  \ 方法提供 **pfisher** 和 **goodPassword** 时，都会返回一个 **successfulPerson** 实例（之前定义的）。\n\
  \n类似地，我们定义了另一个期望，假设用户名和密码无效。对于这种变体，我们指定了以下 **will** 调用：\n\n**will(throwException(new\
  \ AuthenticationException()));**\n\n这将确保在我们的单元测试中，每当向 **authenticatePerson** 方法提供无效的用户名和密码时（只要无效的用户名和密码符合我们非常严格的条件，即要求它们为\
  \ **username** 和 **badpassword**），都会抛出一个 **AuthenticationException**。\n\n**will**\
  \ 调用还可以使用其他一些变体，例如 **returnIterator** 和 **doAll**，以便在给定一组条件时为我们的模拟方法定义行为提供更大的灵活性。jMock\
  \ 还有一些更高级的功能，允许你将一组调用约束到特定序列，或者与状态机一起工作，并验证状态在从一个调用到下一个调用变化时的某些假设。请参阅 JMock 文档以了解更多信息。\n\
  \n■ **注意** 我们鼓励你更详细地探索模拟，因为它是创建有效单元测试策略的强大工具。通常，开发人员过于关注集成测试，仅仅是因为当需要“伪造”依赖项的行为时，单元测试可能看起来更复杂。模拟是一种实用的解决方案，可以轻松定义依赖项的行为和期望，从而鼓励开发更多的单元测试。\n\
  \n第 8 章 ■ 高效测试\n\n我们简要概述了如何对一段代码进行隔离的单元测试。然而，一个有效的测试策略还需要考虑特定组件在运行应用程序上下文中的工作方式。这就是集成测试的用武之地，而\
  \ Spring 通过帮助引导你的测试套件、解析依赖关系以及处理持久化细节（例如事务）来简化集成测试的开发。\n\nSpring 依赖注入与测试\n\nSpring\
  \ 框架提供了一个便捷的抽象层，极大地简化了在这些测试框架之间的切换，这个抽象层被称为 TestContext 框架。该框架作为 Spring 3 的一部分被添加，有助于抽象掉任何特定于测试框架的细节。通过使用\
  \ Spring 的 TestContext 框架，你不再需要担心特定测试框架的细节。这使得从一个测试策略切换到另一个测试策略变得特别容易。但更重要的是，TestContext\
  \ 框架有助于简化测试细节，不仅使编写有效的单元测试和集成测试更容易，而且还能集成 Spring 依赖项，并对你的持久化层做出有用的断言。\n\nSpring\
  \ 测试结合了 XML 和注解来影响测试类中依赖项的注入方式。XML 配置的工作方式与你之前在本书中看到的示例类似。在定义集成测试时，你可以使用与应用程序中相同（或多或少）的\
  \ XML 代码。然而，通常希望覆盖某些 bean（例如你的数据源），同时为你的应用程序 DAO 和服务对象保持相同的连接和实现细节。这种策略使你能够验证整个持久化层的行为，同时利用专门的测试数据库。\n\
  \n有相当多的 Spring 特定注解可用于将存储在应用程序中的测试配置和测试 XML 加载到正在运行的 JUnit 测试中。**@RunWith** 注解允许你指定要使用的测试框架。如前所述，使用\
  \ Spring 的 TestContext 框架的主要好处之一是，它允许你定义测试类，而无需将代码绑定到特定的测试框架。你可以通过使用 **@Test** 注解来指定某个特定类实际上是一个测试。\n\
  \n然后，为了指示应该使用哪个测试框架来运行测试，你可以使用 **@RunWith**，它允许你指定要运行的测试框架。对于本章中的示例，我们将坚持使用 JUnit\
  \ 4。我们将以下注解放在测试类的顶部：\n\n**@RunWith(SpringJUnit4ClassRunner.class)**\n\n如果我们想切换到\
  \ TestNG，只需更改此注解的值即可。\n\n将 **@RunWith** 注解添加到你的单元测试类中，将使 Spring 参与到测试运行和必要依赖项的连接中。然而，对于如何指定连接细节，有几种选择。你选择的策略取决于应用程序的独特需求。例如，如果你正在构建一个只有一个数据源的简单应用程序，那么你可以采用按类型自动装配的策略，该策略将隐式注入与添加注解的\
  \ setter 方法中指定的类型相匹配的类。但是，如果你的应用程序使用多个数据源，那么按类型自动装配的方法就不那么简单了。对于这些场景，你应该使用 **@Resource**\
  \ 或 **@Qualifier** 注解，以消除你想要注入的依赖项的歧义。\n\n\n\n虽然通常更推荐通过配置或注解让 Spring 处理依赖注入，但也可以让你的测试类实现\
  \ **ApplicationContextAware** 接口，或继承 **AbstractJUnit4SpringContextTests**，这样就能直接访问\
  \ **ApplicationContext**，并从中通过 Bean 名称进行查找：\n\n**context.getBean(“datasource”);**\n\
  \n第 8 章 ■ 高效测试\n\n至此，你已经了解了注入测试类所依赖的层的一些选项。剩下的问题是如何进行注入。在我们的画廊应用中，我们在一个名为 **spring-master.xml**\
  \ 的 XML 文件中定义了 Spring Bean，**该文件又导入了我们的 **spring-persistence.xml** 配置。我们可以通过添加以下注解来导入此配置：**\n\
  \n****@ContextConfiguration(locations = {\"classpath:/META-INF/spring/spring-master.xml\"\
  })** **@ContextConfiguration** 注解定义了配置文件的路径。你可以根据每个测试的具体情况，决定是使用完整应用的 Spring 配置文件，还是定义一个更具体的、为特定测试需求量身定制的单元测试配置。\n\
  \n通过 XML 进行 Spring 配置很方便，但现在你可能想知道如何访问配置中定义的某些 Bean，或者那些通过组件扫描获取的 Bean。还记得 Spring\
  \ 管理的 Bean 可以使用的 **@Autowired** 注解吗？你可以在测试代码中使用它，来告诉 Spring JUnit **Runner** 你需要一些\
  \ Spring Bean。\n\n以下是整合了所有这些内容后的 **PersonDAO** 测试代码：**package com.prospringhibernate.gallery.test;**\n\
  \n****import org.junit.Test;**\n\n**import org.junit.runner.RunWith;**\n\n**import\
  \ org.springframework.beans.factory.annotation.Autowired;**\n\n**import org.springframework.test.context.ContextConfiguration;**\n\
  \n**import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;**\n\n\
  ****import com.prospringhibernate.gallery.dao.PersonDao;**\n\n****@RunWith(SpringJUnit4ClassRunner.class)**\n\
  \n**@ContextConfiguration(locations = {\"classpath:spring-master.xml\"})** **public\
  \ class** PersonDaoTest **{**\n\n****@Autowired**\n\n**PersonDao personDao;**\n\n\
  ****@Test**\n\n**public void testPerson() {**\n\n**// 在此插入测试逻辑**\n\n**}**\n\n****}**\n\
  \n让我们探讨一下这里发生了什么。**@RunWith** 告诉 JUnit，该测试需要一些额外的逻辑才能正确设置。这些额外逻辑以一个实现了 JUnit 的 **Runner**\
  \ 接口的类实例的形式提供。在我们的例子中，我们有一个名为 **SpringJUnit4ClassRunner** 的 Spring **Runner**，它知道如何设置我们的应用上下文，并使用标准的\
  \ Spring 依赖注入注解（如 **@Autowired**）为我们的测试注入所需的所有基础设施。**SpringJUnit4ClassRunner** 还会查找其他一些注解，包括\
  \ **@ContextConfiguration** 和 **@Transactional**。\n\n正如你在示例中看到的，**@ContextConfiguration**\
  \ 告诉 **SpringJUnit4ClassRunner** 设置测试环境需要哪些配置文件。在幕后，**SpringJUnit4ClassRunner**\
  \ 会根据你在 **@ContextConfiguration** 中指定的路径，为你的单元测试设置并管理一个 Spring 应用上下文。**TestContext**\
  \ 框架负责实际执行 **@Autowired** 注入。**TestContext** 框架还会跟踪当前测试的状态结果，例如运行了哪个方法和类，以及测试过程中抛出了哪个异常。**@RunWith**\
  \ 和 **@ContextConfiguration** 是 Spring JUnit4 测试的核心组件。\n\n■ **注意** TestContext 框架有一些性能优化措施，如果你运行多个使用相同应用上下文配置的测试类，它能确保该框架仅为所有测试加载一次该配置。如果你需要更高级的测试，TestContext\
  \ 框架还有不少值得探索的额外高级功能。\n\n使用数据库进行测试\n\n现在你已经知道如何编写 JUnit 测试类并使用 Spring XML 进行配置，可以开始进行一些数据库测试了！最简单的数据库测试形式就是直接重用你一直在编写的那些精美的\
  \ DAO。你还可以应用常用的 Spring **@Transactional** 注解，以及另一个注解：**@TransactionConfiguration**。\n\
  \n**@TransactionConfiguration** 告诉事务性的 Spring 测试环境关于如何获取 **transactionManager**\
  \ 的信息，以及你希望在每次测试后提交还是回滚事务。\n\n以下测试将所有这些元素整合在一起并付诸实践：**package com.prospringhibernate.gallery.test;**\n\
  \n****import java.util.List;**\n\n****import junit.framework.Assert;**\n\n****import\
  \ org.junit.After;**\n\n**import org.junit.Test;**\n\n**import org.junit.Before;**\n\
  \n**import org.junit.runner.RunWith;**\n\n****import org.springframework.beans.factory.annotation.Autowired;**\n\
  \n**import org.springframework.test.context.ContextConfiguration;**\n\n**import\
  \ org.springframework.test.context.junit4.SpringJUnit4ClassRunner;** **Import org.springframework.test.context.transaction.TransactionConfiguration;**\
  \ **import org.springframework.transaction.annotation.Transactional;**\n\n****import\
  \ com.prospringhibernate.gallery.dao.PersonDao;**\n\n**import com.prospringhibernate.gallery.domain.Person;**\n\
  \n**import com.prospringhibernate.gallery.exception.AuthenticationException;**\n\
  \n****@RunWith(SpringJUnit4ClassRunner.class)**\n\n**@ContextConfiguration(locations\
  \ = {\"classpath:/META-INF/spring/spring-master.xml\"})**\n\n**@TransactionConfiguration(transactionManager\
  \ = \"transactionManager\", defaultRollback = true)** 134\n\n第 8 章 ■ 高效测试\n\n**@Transactional()**\n\
  \n**public class TestContextJUnitIntegrationTest {**\n\n****Person person;**\n\n\
  **PersonDao personDao;**\n\n****public PersonDao getPersonDao() {**\n\n**return\
  \ personDao;**\n\n**}**\n\n****@Autowired**\n\n**public void setPersonDao(PersonDao\
  \ personDao) {**\n\n**this.personDao = personDao;**\n\n**}**\n\n****@Before**\n\n\
  **public void preMethodSetup() {**\n\n**person = new Person();**\n\n**person.setFirstName(\"\
  First\");**\n\n**person.setLastName(\"Last\");**\n\n**person.setUsername(\"username\"\
  );**\n\n**person.setPassword(\"goodpassword\");**\n\n**person.setRoleLevel(Person.RoleLevel.\
  \ *ADMIN*.getLevel());** **person.setVersion(1);**\n\n**personDao.save(person);**\n\
  \n**}**\n\n****@After**\n\n**public void postMethodTearDown() {**\n\n**personDao.remove(Person.class,\
  \ person.getId());**\n\n**person = null;**\n\n**}**\n\n****@Test**\n\n**public void\
  \ testPersonPersisted() {**\n\n**final List<Person> people = personDao.getAll();**\n\
  \n**Assert.assertEquals(1, people.size());**\n\n**}**\n\n****@Test**\n\n**public\
  \ void testAuthenticationSuccess() throws AuthenticationException {**\n\n**Person\
  \ p = personDao.authenticatePerson(\"username\", \"goodpassword\");** **Assert.assertNotNull(p);**\n\
  \n**}**\n\n****@Test (expected=AuthenticationException.class)**\n\n**public void\
  \ testAuthenticationFailure() throws AuthenticationException {**\n\n**personDao.authenticatePerson(\"\
  username\", \"badpassword\");**\n\n**}**\n\n****}**\n\n第 8 章 ■ 高效测试\n\n\n\n本示例使用了我们\
  \ Web 应用程序中在 **spring-master.xml** 中定义的 Spring 配置，这意味着我们正在使用 H2 数据库配置。通过 **@Before**\
  \ 和 **@After** 注解，我们确保 **Person** 类的状态在每个测试方法调用时都是正确的。最后，在清晰的独立单元中，我们测试了 **PersonDao**\
  \ 在成功调用 **getAll()** 获取 **Person** 实体、成功调用数据库进行身份验证，以及最后尝试对我们通过 **preMethodSetup()**\
  \ 方法搭建的用户数据进行身份验证失败时的行为。\n\n另请注意，我们已将 **defaultRollback** 设置为 **true**，这将确保该方法在完成后自动回滚。在集成测试中自动回滚事务是一种有效的策略，可以确保每个测试方法将数据库恢复到其原始、干净的状态。在定义与数据库交互的集成测试时，减少数据库“副作用”的可能性，并确保每个测试独立运行，不受先前运行方法的影响或依赖，这一点非常重要。\n\
  \n总结\n\n本章介绍了一些针对 Spring 应用程序的测试策略。当然，你可以使用 JUnit 和 Spring 做更多测试，更不用说我们提到的模拟框架所实现的强大测试结构了。此外，性能测试和负载测试等主题与持久化也极其相关。\n\
  \n对于更高级的数据库集成测试，我们建议你查看 DbUnit JUnit 扩展。DbUnit 提供了出色的功能，可确保你的数据库在测试之间处于已知状态，并提供工具来帮助组装可在整个测试套件中使用的测试夹具数据。\n\
  \n**第 9 章**\n\n■ ■ ■\n\n**最佳实践与高级**\n\n**技术**\n\n在本书中，你已经学到了很多关于 Spring 和 Hibernate\
  \ 框架工作原理的知识。\n\n在本章中，你将学习构建高性能、可用于生产环境的应用程序所需的技术。尽管 Hibernate 和 Spring 相对容易启动，但它们的默认设置仅适用于简单的应用程序。如果你正在构建一个具有显著负载或性能要求的应用程序，则可能需要进行一些微调以达到最佳性能。在大多数情况下，你可以通过利用适当的优化或架构策略来规避性能问题。\n\
  \n延迟加载问题\n\n延迟加载长期以来一直被认为是 Hibernate 最有价值的特性之一，尤其是在提高性能方面。通过将领域对象的关联或属性声明为延迟加载，应用程序可以避免对底层数据库造成不必要的开销，这通常可以带来更快的响应时间和更小的数据集——这两者都是有利的特性。\n\
  \n如果没有延迟加载，一个简单的查询可能会被不必要地重复执行，或者更糟的是，对一个单一领域实体的查询可能会强制加载整个对象图，因为 Hibernate 会尝试从一个关联遍历到下一个关联。\n\
  \n问题在于，延迟加载是一把双刃剑。它对于维持良好的加载性能至关重要，但同时也是导致重大性能问题的重大风险。虽然延迟加载减少了从数据库加载的数据量（以及表连接的可能性），但这种延迟性对于无论如何都可能需要从数据库加载的数据来说可能非常成问题。\n\
  \n这并不意味着延迟加载是一个糟糕的特性，或者应该禁用它。这是一个被误解的问题，非常依赖于上下文。\n\n让我们首先来看一个影响基于持久化应用程序的、与延迟加载相关的最常见且最重要的问题之一。\n\
  \nN+1 次选择问题\n\n让我们检查一下延迟加载在典型用例中的工作方式。在我们的示例应用程序中，我们的 **Category** 领域对象包含一个到 **ArtEntity**\
  \ 领域对象的一对多关联。换句话说，一个 **Category** 包含一个 **ArtEntity** 实例的集合：137\n\n第 9 章 ■ 最佳实践与高级技术\n\
  \n**@Entity**\n\n**public class Category implements DomainObject {**\n\n****private\
  \ Long id;**\n\n**private String categoryName;**\n\n**private String categoryDescription;**\n\
  \n**private Set<ArtEntity> artEntities = new HashSet<ArtEntity>();**\n\n****. .\
  \ .**\n\n****@ManyToMany**\n\n**public Set<ArtEntity> getArtEntities() {**\n\n**return\
  \ artEntities;**\n\n**}**\n\n****public void setArtEntities(Set<ArtEntity> artEntities){**\n\
  \n**this.artEntities = artEntities;**\n\n**}**\n\n****. . .**\n\n****}**\n\n默认情况下，**ArtEntity**\
  \ 实体的 **java.util.Set** 被声明为延迟加载。让我们考虑一下当我们尝试为一系列 **categories** 加载所有 **artEntities**\
  \ 时，底层会发生什么。\n\n**entityManager.createQuery(\"SELECT c FROM Category c\").getResultList();**\
  \ 假设 **Category** 表中至少有一行，前面的语句将返回一个 **Category** 实例列表。然而，因为我们的 **artEntities**\
  \ 关联（在 **Category** 类内部）被声明为延迟加载，Hibernate 不会执行 SQL 连接来尝试从 **Category** 表和 **ArtEntity**\
  \ 表中的相关行加载数据。Hibernate 不会从数据库加载这些 **ArtEntity** 行，而是为每个返回的 **Category** 实例的 **artEntities**\
  \ 属性填充一个代理对象。\n\n对于集合，Hibernate 提供了持久化集合实现，这些实现充当了我们领域模型中集合关联的代理。例如，我们的 **artEntities**\
  \ 属性被声明为 **java.util.Set**。Hibernate 会将该属性设置为 **org.hibernate.collection.PersistentSet**\
  \ 的一个实例，这是一个特殊的类，旨在拦截访问被引用集合的尝试，以便可以初始化一个延迟集合。\n\nHibernate 会为应用程序中的每个领域对象生成代理，并将这些代理用于标记为延迟加载的单值关联。例如，我们可以使用以下注解将\
  \ **Comment** 领域对象中的 **commentedArt** 的多对一关联定义为延迟加载：\n\n**@ManyToOne(fetch=FetchType.LAZY)**\n\
  \n**public ArtEntity getCommentedArt() {**\n\n**return commentedArt;**\n\n**}**\n\
  \n这段代码片段将阻止 **Comment** 对关联 **ArtEntity** 的引用在访问该属性之前从数据库加载。\n\n第 9 章 ■ 最佳实践与高级技术\n\
  \n这些代理的目标是充当某种占位符。对于未从数据库加载的数据，Hibernate 不能简单地忽略这些属性。相反，可以使用代理来延迟加载行为。如果未尝试访问未初始化的延迟属性，则不会发生任何事情。\n\
  \n然而，如果尝试访问这些代理之一，代理将拦截此请求并触发对数据库的回调。最终结果是，延迟属性使用数据库中的相关数据进行了初始化。\n\n所有这些听起来都很理想。但让我们考虑一下，如果每个\
  \ **Category** 关联了多个 **ArtEntity** 实例，会发生什么。当首次加载一个给定的 **Category** 实例时，**artEntities**\
  \ 关联被设置为 **org.hibernate.collection.PersistentSet** 的一个实例。现在想象一下，我们想要遍历原始查询返回的所有\
  \ **Category** 实例的所有 **ArtEntities**。\n\n**for (Category category: categories) {**\n\
  \n**for (ArtEntity artEntity: category.getArtEntities()) {**\n\n**// 在此处隐式初始化另一个集合**\n\
  \n**System.out.println(\"art:\" + artEntity.getTitle());**\n\n**}**\n\n**}**\n\n\
  \n\n尽管这段代码看似无害，但实际上在代码行间隐藏着一个严重的性能问题。由于我们在首次获取每个 **Category** 实例时，**artEntities**\
  \ 关联尚未初始化，因此实际上我们在循环的每次迭代中都在初始化每个 **artEntities** 关联。由于 Hibernate 无法推断我们试图做什么，它只是在我们引用每个实例时将其初始化。结果就是为集合中的每个条目都执行了一次独立的\
  \ SQL 查询。\n\n因此，对于上述循环，我们实际上无意中执行了（*类别数量*）+ 1 次查询！\n\n突然间，懒加载似乎不再像是一种优化技术了。\n\n\
  这种令人不安的常见场景被称为 *N+1 查询* 问题，即执行了 *N* 次 **select** 查询（原始查询返回的每个条目各一次），再加上最初加载包含该集合的实体时执行的那次原始查询。\n\
  \n其他关联也会出现类似的问题，例如从 **Comment** 类到 **ArtEntity** 领域对象的多对一引用。在这种情况下，如果加载了一个 **Comment**\
  \ 实例列表，那么每次尝试访问 **commentedArt** 属性时，都会发起一次额外的 **select** 查询。假设一个 JSP 页面遍历一长串评论，试图显示评论及其关联艺术品的相关信息。这可能会导致需要数百次额外的数据库往返！\n\
  \n理解这个问题的可能性是第一步，但我们如何着手防止 N+1 查询问题呢？不幸的是，没有单一的解决方案。（如果有，它很可能已经成为 Hibernate 或 JPA\
  \ 的隐式部分了。）每种情况可能需要略微不同的方法。幸运的是，有几种策略可以帮助缓解这种潜在的有害场景。当然，目标是限制 SQL 查询的数量，并尽可能高效地加载所有必要的数据。\n\
  \n**减少懒加载映射**\n\n解决 N+1 查询问题的一个方法是更新受影响领域类的映射配置。集合的默认行为是懒加载，并在访问关联时通过 SQL **SELECT**\
  \ 来初始化集合。这种默认策略被称为 *select 抓取*，因为会发出第二个 **SELECT** 来初始化懒加载的关联或属性。最简单的解决方案是覆盖此默认行为，从一开始就阻止该属性被懒加载。\n\
  \n让我们重构影响 **Category** 实例上 **artEntities** 关联的映射配置，如下所示：\n\n**@ManyToMany**\n**@Fetch(FetchMode.JOIN)**\n\
  **public Set<ArtEntity> getArtEntities() {**\n**    return artEntities;**\n**}**\n\
  \n通过添加 **@Fetch** 注解并指定 **FetchMode** 为 **JOIN**，我们请求 Hibernate 在加载特定 **Category**\
  \ 实例时，使用左外连接自动初始化我们的 **artEntities** 集合。当导航到特定 **Category** 实例、通过 **get()** 或 **load()**\
  \ 加载实例，或通过 Criteria API 加载 **Category** 实例时，Hibernate 都会受到此 **@Fetch** 指令的影响。或者，您可以选择指定\
  \ **FetchMode.SUBSELECT**，这将在初始查询中包含一个 SQL 子查询来加载 **artEntities** 集合。无论哪种情况，最终结果都是\
  \ **artEntities** 关联不再懒加载，并且不需要额外的查询来初始化每个 **artEntities** 关联。\n\n那么问题解决了，对吧？并不完全是这样。还记得我们提到懒加载实际上是一个非常重要的特性，没有它，您可能会无意中将整个数据库的过多内容加载到内存中吗？换句话说，您可能并不总是需要\
  \ **artEntities** 关联，在这些情况下，最好保持该属性为懒加载。\n\n所以，有时候懒一点是好的，比如周末和假期休息的时候。但其他时候，懒惰可能会给您带来麻烦（尤其是在工作中）。Hibernate\
  \ 也是如此。\n\n解决 N+1 查询问题的最佳方法是保持关联默认声明为懒加载，但在知道需要该关联时覆盖此行为。例如，使用 JPQL，我们可以编写以下查询：\n\
  \n**List categories = entityManager.createQuery(\"SELECT c FROM category c**\n**LEFT\
  \ JOIN FETCH c.artEntities**\n**WHERE c.id = :id\").getResultList();**\n\n作为此 JPQL\
  \ 查询的一部分，我们发出了一个 **LEFT JOIN FETCH**。这将强制 Hibernate 初始化我们的 **artEntities** 关联，覆盖映射文件中的默认懒加载行为。\n\
  \n**批量处理以提高性能**\n\n另一种减少加载数据所需 SQL 查询数量的策略是使用 Hibernate 的批量处理功能，该功能可以加载多个实体或集合。批量处理提供了一种比控制懒加载更简单的解决方案。您尝试批量获取数据，以防止这些数据稍后在更多“单个查询”中被加载。批量处理的优点是它有助于提高性能，而无需对查询或代码进行重大更改。\n\
  \n**@BatchSize** 注解可以添加到领域实体或特定关联上。让我们再次更新 **Category** 类中的 **artEntities** 关联，看看如何使用\
  \ Hibernate 的批量处理功能：\n\n**@ManyToMany**\n**@BatchSize(size = 10)**\n**public Set<ArtEntity>\
  \ getArtEntities() {**\n**    return artEntities;**\n**}**\n\n现在，即使我们的 **artEntities**\
  \ 关联默认仍然是懒加载的，Hibernate 也会提前行动，尝试一次初始化不止一个 **artEntities** 集合。它通过使用 SQL **in** 条件来实现这一点，在从\
  \ **ArtEntity** 表加载时传入十个 **Category** 实例的标识符。\n\n换句话说，批量处理的工作方式类似于默认的懒加载配置。首先加载一个\
  \ **Category**，然后在一个单独的查询中加载其 **artEntities** 关联（当然，是在访问 **artEntities** 属性时）。但是，启用了批量处理后，Hibernate\
  \ 将尝试加载多个 **artEntities** 关联，查询数量由 **@BatchSize** 注解的 **size** 属性指定。\n\n请记住，**@BatchSize**\
  \ 不会尝试加载集合中的多个条目。一个集合通常通过一个单独的 **select** 完全初始化。相反，**@BatchSize** 会加载多个关联，以防止我们其他\
  \ **Category** 实例中的其他关联被初始化（以我们的示例为例）。\n\n**懒加载初始化异常**\n\n另一个常见问题是令人生畏的 **LazyInitializationException**。您可能从名称就能推断出此异常的含义：Hibernate\
  \ 无法初始化一个懒加载属性。什么情况会导致这样的问题呢？\n\n\n\n正如我们在第 4 章中讨论的，领域对象的持久化状态是通过 Hibernate 对 **EntityManager**\
  \ 接口的实现来管理的。如果实例化了一个新的领域对象，它会被视为瞬态对象，直到它与 **EntityManager** 关联。同样，一个已经持久化的领域对象在\
  \ **EntityManager** 关闭后可以继续保持持久化状态，此时实体将转换为分离状态。然而，对该领域对象的更改不会被“记录”，直到该领域对象通过重新与另一个\
  \ **EntityManager** 关联而转换回托管状态。\n\n与 **EntityManager** 解除关联的领域对象被称为*分离对象*。\n\nHibernate\
  \ 能够检测到对分离领域对象所做的更改，并在实例重新关联后将这些更改传播到数据库。然而，当 **EntityManager** 关闭时，有些问题难以处理，惰性属性就是其中之一。\n\
  \n正如你在上一节所学到的，Hibernate 通过使用代理来引用未初始化的属性来实现惰性加载——这些代理要么是特殊的持久化集合实现，要么是代理类，具体取决于关联或属性的类型。这些代理能够推迟关联的加载，直到尝试访问它们时才会加载。一旦发生访问，代理将访问\
  \ **EntityManager** 并尝试从数据库加载必要的数据。显然，如果 **EntityManager** 已关闭，这无法发生，因此会抛出 **LazyInitializationException**。\n\
  \n**LazyInitializationException** 最常见的原因是在 DAO 或控制器方法中未能初始化集合或惰性属性，而是让 JSP 或其他视图相关技术去发现未初始化的属性。问题在于，每当持久化操作完成时，Hibernate\
  \ 默认会关闭 **EntityManager**。在 DAO 或服务方法的情况下，当这些相关方法返回时，**EntityManager** 通常会关闭。\n\n\
  防止 **LazyInitializationException** 的最佳方法是确保视图所需的所有惰性关联和属性在领域对象传递到视图层之前已成功初始化。幸运的是，Spring\
  \ 提供了一些解决方案，即使在将领域对象传递给视图之前惰性属性未正确初始化，也有助于防止 **LazyInitializationException** 的发生。解决方案有几种变体，但它们都采用相同的总体策略：将\
  \ **EntityManager** 的关闭推迟到视图渲染完成之后。\n\n第 9 章 ■ 最佳实践与高级技术\n\n现在延迟关闭：让 EntityManager\
  \ 在“就寝时间”后保持打开\n\n推迟关闭 **EntityManager** 现在通常被称为“视图中打开 EntityManager”模式。应用此策略的最简单方法是使用\
  \ Servlet 过滤器，如下一节所述。然而，如果你正在使用 Spring MVC，另一种选择是使用拦截器。\n\n拦截器技术本质上是在 Servlet 请求开始时打开一个\
  \ **EntityManager**，并将该 **EntityManager** 绑定到当前线程，使其能够被 Spring 的 Hibernate 支持类访问。然后，在请求结束时，**EntityManager**\
  \ 被关闭并从线程中解绑。这有点过于简化，具体实现细节略有不同，取决于你使用的是 Servlet 过滤器还是控制器拦截器。然而，基本概念是相同的：打开一个 **EntityManager**\
  \ 并将其与活动线程关联，供持久化相关方法使用，然后确保 **EntityManager** 保持打开状态，直到请求完成。由于请求在视图渲染处理完成之前不会结束，因此\
  \ **LazyInitializationException** 的可能性显著降低。\n\n使用“视图中打开 EntityManager”模式相对简单。如果你已经在使用\
  \ Spring MVC，你可以将 **OpenEntityManagerInViewInterceptor** 类定义为一个新的 Bean，并将其添加到你的\
  \ Spring MVC 配置中，如下所示：\n\n**<bean name=\"openEntityManagerInViewInterceptor\"**\n\
  \n**class=\"org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor\"\
  **\n\n**/>**\n\n定义好 **OpenEntityManagerInViewInterceptor** 后，你需要将此拦截器添加到你的 MVC 拦截器列表中。此列表中定义的拦截器将（按顺序）作为每个\
  \ MVC 控制器请求处理流程的一部分被调用。Spring MVC 控制器提供了进入 MVC 控制器生命周期的钩子，例如 **preHandle**、**postHandle**\
  \ 和 **afterCompletion**。Spring 3 提供了一种简单的方法来全局定义拦截器。让我们来看一个 MVC 配置文件。\n\n**<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>**\n\n**<beans**\n\n**********xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**\
  \ **http://www.springframework.org/schema/context**\n\n**http://www.springframework.org/schema/context/spring-context-3.0.xsd**\
  \ **http://www.springframework.org/schema/mvc**\n\n**http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd\"\
  >**\n\n****<context:component-scan base-package=\"com.prospringhibernate.gallery\"\
  **\n\n**use-defaultfilters=\"false\">**\n\n**<context:include-filter type=\"annotation\"\
  />** **expression=\"org.springframework.stereotype.Controller\"**\n\n**</context:component-scan>**\n\
  \n****<!—- 通过 @Controller 集成 MVC 控制器 -->**\n\n**<mvc:annotation-driven/>**\n\n****<!—指定将应用于所有\
  \ handlerMappings 的拦截器 -->** 142\n\n第 9 章 ■ 最佳实践与高级技术\n\n**<mvc:interceptors>**\n\
  \n**<bean**\n\n**class=\"org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor\"\
  />**\n\n**</mvc:interceptors>**\n\n****. . .**\n\n****</beans>**\n\n在这个例子中，我们使用\
  \ **mvc:annotation-driven** 和 **component-scan** 特性来启用 Spring 的生命周期特性，并通过注解定义我们的控制器（这意味着我们可以将\
  \ **@Controller** 添加到类中，只要它们在适当的包路径下，Spring 就会将这些类集成为控制器）。还要注意，我们在 **mvc:interceptors**\
  \ 块内内联添加了 **OpenEntityManagerInViewInterceptor**。这里定义的任何拦截器 Bean 都将在请求生命周期的各个阶段调用相应的方法。\n\
  \n应用 Open EntityManager 过滤器\n\n如果你没有使用 Spring MVC，或者只是不想使用拦截器方法，你可以改为将 **OpenEntityManagerInViewFilter**\
  \ 添加到你的 **web.xml** 文件中。该方法与拦截器技术大致相同，不同之处在于打开和关闭 **EntityManager** 的钩子发生在 Servlet\
  \ 请求级别，而不是控制器级别。\n\n以下是如何将 **OpenEntityManagerInViewFilter** 添加到应用程序的 **web.xml**\
  \ 文件中的方法：\n\n\n\n**<!-- 将 JPA EntityManager 绑定到线程，用于处理整个请求 -->**\n\n**<filter>**\n\
  \n**<filter-name>OpenEntityManagerInViewFilter</filter-name>**\n\n**<filter-class>org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter</filter-class>**\n\
  \n**</filter>**\n\n**<!-- 将 EntityManager 过滤器映射到所有请求 -->**\n\n**<filter-mapping>**\n\
  \n**<filter-name>OpenEntityManagerInViewFilter</filter-name>**\n\n**<url-pattern>/*</url-pattern>**\n\
  \n**</filter-mapping>**\n\n此代码片段摘自 **web.xml** 文件，引用了集成 **OpenEntityManagerInViewFilter**\
  \ 所需的过滤器定义和映射。设置正确的 **filter-mapping** 全局模式非常重要，因为这将定义处理应应用于哪些 URL。\n\n缓存\n\n到目前为止，我们已经讨论了几种减少或优化数据库访问次数的策略。比改进数据查询方式更好的做法是，完全避免访问数据库。显然，某些数据库访问始终是必需的，但缓存可以在最大程度地减少数据库负载和提高应用程序性能方面发挥很大作用。\n\
  \nHibernate 的最大优势之一是它为开发者提供了许多“免费”功能。而这些免费功能之一就是隐式缓存。如果你决定使用 143\n\n第 9 章 ■ 最佳实践与高级技术\n\
  \n纯 JDBC 实现持久层，则需要显式地将缓存集成到 DAO 方法中，或在某个较低的抽象级别进行集成。虽然缓存表面上看起来实现起来很简单，但当你考虑失效规则（导致缓存中特定项目过期的因素）、防止冲突以及处理缓存项目的生存时间（TTL）时，你就会开始感受到其复杂性。\n\
  \n那么，既然 Hibernate 免费提供了所有这些缓存功能，理解缓存机制又有什么好处呢？尽管 Hibernate 包含一些基础的缓存功能，提供了基本的优化来限制不必要的数据库访问，但调整其默认缓存行为可以显著提高应用程序的性能。\n\
  \n为了能够利用缓存来提高应用程序性能，你需要了解 Hibernate 中不同层次的缓存以及实际可以缓存的内容。对于所有领域对象，Hibernate 提供了两个不同的缓存级别：\n\
  \n*   **一级缓存（L1 缓存）** 由 **EntityManager** 提供，因此仅与特定用户或请求的有限范围相关。一级缓存主要作为一种优化手段，防止重新查询已加载的领域对象。\n\
  *   **二级缓存（L2 缓存）** 的作用域是 **EntityManagerFactory**，因此生命周期更长，并且可以跨多个用户和请求提供缓存能力。二级缓存通过缓存提供了最大的实用性和灵活性来进行优化。\n\
  \n因此，方法是激活二级缓存并集成一个缓存提供程序来开始缓存。现在我们需要考虑可以缓存什么。\n\nHibernate 以略有不同的方式缓存领域对象。每个顶级领域对象都在不同的区域中被缓存。*区域*本质上是一个不同的部分或命名空间，旨在划分每个实体并防止潜在的冲突。每个领域对象都使用其标识符作为键持久化到缓存中。因此，给定一个缓存区域和一个标识符，你就可以访问特定领域对象的数据。每个领域对象通过存储其各自属性的值来进行缓存。\n\
  \n然而，领域对象的引用和集合是与领域对象*分开*持久化的。换句话说，领域对象的缓存表示将仅引用其引用的标识符。例如，多对一关联将作为单个 ID 持久化，而集合将作为标识符列表持久化。领域对象集合实际上是在一个单独的缓存区域中持久化的，该区域专门用于该特定集合。这种情况下的键仍然是父领域对象的标识符，但区域特定于该领域对象和集合名称。然而，值是一个标识符列表，列表中的每个标识符对应于原始集合中引用的每个实体的\
  \ ID。\n\nHibernate 使用此策略是因为仅存储集合中每个实体的 ID 比存储每个实体的完整数据更高效。其意图是拥有 ID 就足够了，因为完整数据应该在其他地方（在被引用的领域对象自己的缓存区域中）被缓存。此外，将引用缓存为标识符可以解耦它们所关联的领域对象，确保对被引用领域对象的更改仅缓存在一个位置。这显然比管理复杂的依赖树要简单得多——尤其是当你开始考虑在特定项目过期或数据库发生更新时使其失效的复杂性时。\n\
  \n集成缓存实现\n\nHibernate 为缓存功能提供了一个通用的抽象层，允许将众多缓存实现轻松插入到 Hibernate 基础设施中。有各种优秀的 144\n\
  \n第 9 章 ■ 最佳实践与高级技术\n\n缓存解决方案，包括 Ehcache、SwarmCache、JBoss Infinispan 等等。每个缓存实现在其提供的功能集上略有不同。例如，一些实现提供集群能力，允许集群内的多个节点共享相同的缓存数据（这可以减少缓存冲突和过时数据的可能性）。一些缓存解决方案提供专门的功能，例如事务行为。\n\
  \n■ **注意** 选择使用哪个缓存提供程序取决于你的需求。通常，我们推荐 Ehcache，这是一个灵活的、提供集群能力的开源缓存实现。如果你的应用程序对事务缓存或其他特定需求有要求，你应该考虑其他一些缓存提供程序选项。\n\
  \n让我们重新审视我们的 **persistence.xml** 配置，并修改它以集成 Ehcache。\n\n**<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\" standalone=\"no\"?>**\n\n**<persistence**\n\n****xsi:schemaLocation=\"\
  http://java.sun.com/xml/ns/persistence**\n\n****http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"\
  **\n\n**version=\"2.0\">**\n\n****<persistence-unit name=\"galleryPersistenceUnit\"\
  \ transaction-type=\"RESOURCE_LOCAL\">**\n\n**<provider>org.hibernate.ejb.HibernatePersistence</provider>**\n\
  \n**<properties>**\n\n**<property name=\"hibernate.dialect\" value=\"org.hibernate.dialect.H2Dialect\"\
  />**\n\n**<!--**\n\n**value='create' 表示每次运行时构建新数据库；** **value='update' 表示修改现有数据库；**\n\
  \n**value='create-drop' 表示每次运行时创建并删除表；** **value='validate' 表示不对数据库进行任何更改**\n\n\
  **-->**\n\n**<property name=\"hibernate.hbm2ddl.auto\" value=\"create\"/>**\n\n\
  **<property name=\"hibernate.show_sql\" value=\"true\"/>**\n\n<property name=\"\
  hibernate.cache.use_second_level_cache\" value=\"true\"/>\n\n<property name=\"hibernate.cache.provider_class\"\
  \n\nvalue=\"net.sf.ehcache.hibernate.SingletonEhCacheProvider\"/>\n\n**<property\
  \ name=\"hibernate.ejb.naming_strategy\"**\n\n**value=\"org.hibernate.cfg.ImprovedNamingStrategy\"\
  />**\n\n**</properties>**\n\n**</persistence-unit>**\n\n****</persistence>**\n\n\
  \n\n此处，我们通过在持久化单元上将 **hibernate.cache.use_second_level_cache** 属性设置为 **true** 来启用二级缓存。然后，我们通过\
  \ **hibernate.cache.provider_class** 属性指定缓存实现 **ehcache**。\n\n第 9 章 ■ 最佳实践与高级技术\n\
  \n一旦激活了二级缓存并选择了缓存提供者，你就正式开始了缓存工作。接下来，你需要配置缓存规则。\n\n确定缓存规则\n\n要为你的领域模型配置缓存规则，最简单的方法是在领域对象上添加\
  \ **@Cache** 注解。例如，让我们检查一下艺术画廊应用中 **Category** 领域对象的缓存配置：\n\n**@Entity**\n\n@Cache(region=\"\
  category\", usage = CacheConcurrencyStrategy.READ_WRITE) **public class Category\
  \ implements DomainObject {**\n\n**private Long id;**\n\n**private String categoryName;**\n\
  \n**private String categoryDescription;**\n\n**private Set<ArtEntity> artEntities\
  \ = new HashSet<ArtEntity>();**\n\n**@Id**\n\n**@GeneratedValue**\n\n**public final\
  \ Long getId() {**\n\n**return id;**\n\n**}**\n\n**public void setId(Long id) {**\n\
  \n**this.id = id;**\n\n**}**\n\n**. . .**\n\n**@ManyToMany**\n\n@Cache(usage=CacheConcurrencyStrategy.READ_WRITE)\n\
  \n**public Set<ArtEntity> getArtEntities() {**\n\n**return artEntities;**\n\n**}**\n\
  \n**public void setArtEntities(Set<ArtEntity> artEntities){**\n\n**this.artEntities\
  \ = artEntities;**\n\n**}**\n\n**. . .**\n\n****}**\n\n在这里，我们在两个地方添加了 **@Cache**\
  \ 注解：一处位于实体顶部，作为缓存领域对象本身的配置；另一处位于多对多关联 **artEntities** 之上。因此，我们为 **Category** 领域对象本身以及\
  \ **Category** 领域对象的 **artEntities** 集合都定义了缓存规则。\n\n在 **@Cache** 注解的第一个实例中，我们还设置了\
  \ **region** 属性。这允许我们设置持久化缓存数据的区域。对于 **artEntities** 集合，我们省略了这个属性，这将允许 Hibernate\
  \ 使用默认的区域设置。区域的默认值是类名（包含包名）。对于集合，区域的默认值是完整的类名，后跟 **.<collectionname>** 。因此，对于 **artEntities**\
  \ 集合，默认的区域名称将是 **com.prospringhibernate.gallery.domain.Category.artEntities**。当然，我们也可以选择通过为集合指定一个区域来覆盖此默认值。\n\
  \n**@Cache** 注解的 **usage** 属性定义了用于配置的实体或集合的缓存策略。使用 Ehcache 时，有三个选项：\n\n• **read-only**\
  \ 设置仅应在被缓存的数据永远不会更新时使用。**read-only** 缓存策略将提供最佳性能，因为缓存的数据永远不需要过期或失效。\n\n• **nonstrict-read-write**\
  \ 设置应在不太可能发生并发数据访问时使用，因为缓存实现不会尝试锁定缓存以防止争用或版本不匹配。\n\n• **read-write** 设置适用于可能发生并发访问和数据更新的情况，因为这种方法提供了读已提交隔离级别的语义。\n\
  \n配置缓存区域\n\n接下来，你需要为数据将被持久化的区域设置配置。Ehcache 使用一个在应用程序启动时加载的 XML 配置文件。通常，该文件名为 **ehcache.xml**，并放置在类路径的根目录下。但是，你可以通过在\
  \ **persistence.xml** 文件中设置以下属性来覆盖此默认位置：\n\n**<prop key=\"hibernate.cache.region.factory_class\"\
  >**\n\n**net.sf.ehcache.hibernate.EhCacheRegionFactory**\n\n**</prop>**\n\n**<prop\
  \ key=\"net.sf.ehcache.configurationResourceName\">**\n\n**/path/to/ehcache.xml**\n\
  \n**</prop>**\n\nEhcache 附带的默认 **ehcache.xml** 文件包含一个默认的缓存配置，其中包含将用于任何未显式定义的区域的设置。然而，通常最好为你计划在应用程序中包含的每个缓存区域进行配置。以下是我们为\
  \ **Category** 领域对象和 **Category.artEntities** 集合定义的缓存区域示例：\n\n**<cache name=\"Category\"\
  **\n\n**maxElementsInMemory=\"10000\"**\n\n**eternal=\"false\"**\n\n**timeToIdleSeconds=\"\
  300\"**\n\n**timeToLiveSeconds=\"600\"**\n\n**overflowToDisk=\"true\"**\n\n**/>**\n\
  \n**<cache name=\"com.prospringhibernate.gallery.domain.Category.artEntities\"**\n\
  \n**maxElementsInMemory=\"10000\"**\n\n**eternal=\"false\"**\n\n**timeToIdleSeconds=\"\
  300\"**\n\n**timeToLiveSeconds=\"600\"**\n\n**overflowToDisk=\"false\"**\n\n**/>**\n\
  \n第 9 章 ■ 最佳实践与高级技术\n\n我们定义了两个缓存区域，由 **name** 属性指定。通常，领域对象的 **name** 属性包含完全限定的类名（包含包名）。然而，在我们之前对\
  \ **Category** 领域对象的缓存配置中（上一节的列表），我们显式地更改了默认区域属性，使用了较短的区域名称 **Category**。我们为 **artEntities**\
  \ 集合保留了默认的区域值。\n\n这些缓存区域设置的工作方式如下：\n\n• **maxElementsInMemory** 指定此区域中可存储的最大缓存实体数量。我们对两个缓存区域都使用了\
  \ **10000** 这个值，但仔细考虑这个数字非常重要。使用过高的值可能会导致 **OutOfMemoryException** 问题，并降低性能。由于对象大小和访问模式在不同应用程序之间差异很大，因此最好尝试这些设置并对你的应用程序进行性能分析，以确定最佳值。\n\
  \n• **eternal** 指定缓存区域是否应该“永久存在”。当你希望在重启之间保持缓存预填充时，此值（与 **overFlowToDisk** 一起）会很有用。在填充缓存可能需要大量时间的情况下，这也很有价值。将\
  \ **eternal** 设置为 **true** 将确保你的缓存数据持久存在，即使应用程序需要重启。\n\n• **timeToIdleSeconds**\
  \ 指定缓存项在没有被尝试访问时，在缓存中保留的时间。例如，如果某个特定的 **Category** 实例存储在缓存中，但有一段时间没有尝试从缓存加载此值，那么保留此缓存项的好处就值得怀疑。最好将此设置保持在\
  \ **timeToLiveSeconds** 属性值的一半左右。\n\n• **timeToLiveSeconds** 对应于实体的 TTL——即缓存实体过期且数据从缓存中清除之前的时间量，无论上次访问时间如何。\n\
  \n• **overFlowToDisk** 指定如果超出 **maxElementsInMemory**，Ehcache 应开始将溢出数据存储到磁盘。虽然此设置听起来很有用，但请记住，与内存存储相比，将数据持久化到磁盘会带来显著的性能损失。你使用缓存是因为你有一个用于永久持久化数据的数据库。当然，缓存到磁盘的数据性能会优于数据库，但你仍然应该仔细考虑此设置。\n\
  \n\n\n仔细考虑你的 TTL 值非常重要。将这些值设置得过高会增加数据陈旧和版本冲突的风险。当应用程序以集群配置部署时（但每个应用服务器节点的缓存不共享），这种风险会显著增加。在典型的集群配置中，对一个节点所做的更新会使该节点的缓存失效，但这些更改不会传播到集群中其他节点的缓存。一种解决方案是为\
  \ **timeToLiveSeconds** 属性使用较低的 TTL 值，这可以减少缓存中数据陈旧的可能性。更好的解决方案是使用可集群的缓存方案，它允许集群中的所有节点使用共享缓存，从而显著减少冲突和数据陈旧的可能性。我们将在本章后面讨论集群缓存策略。\n\
  \n第 9 章 ■ 最佳实践与高级技术\n\n缓存查询\n\n与集合缓存非常相似，查询缓存尝试仅存储特定查询结果返回的实体的标识符。默认情况下，所有查询都缓存在单个区域中，但你可以通过为特定查询指定区域名称来覆盖此设置，从而强制将该查询缓存到其他地方。特定缓存查询的键由查询本身以及每个查询参数的标识符或值组成。这种方法确保每个缓存查询的结果被单独缓存。如果使用略有不同的参数调用相同的查询，则不会使用缓存。\n\
  \n虽然域对象和集合的缓存更多是默认配置的一部分，但查询缓存需要一些额外的步骤。首先，必须启用二级缓存，如上一节所述。接下来，必须在你的 **persistence.xml**\
  \ 文件中将以下属性设置为 true：\n\n**<property name=\"hibernate.cache.use_query_cache\" value=\"\
  true\"/>** Hibernate 利用一个额外的缓存区域来支持其查询缓存实现：**UpdateTimestampsCache**。这个缓存区域也应该在\
  \ Ehcache 配置文件中显式配置。以下是一个示例配置：\n\n****<cache name=\"org.hibernate.cache.UpdateTimestampsCache\"\
  **\n\n**maxElementsInMemory=\"5000\"**\n\n**eternal=\"true\"**\n\n**overflowToDisk=\"\
  true\"/>**\n\n在这里，我们指定了这个缓存区域应该是 **eternal**（永久的）。这是 **UpdateTimestampsCache** 的推荐设置，但至少，其\
  \ TTL 应该长于任何查询缓存区域的 TTL。\n\n如果你决定对所有查询缓存使用默认的缓存区域，你可以在 Ehcache 中为你的查询缓存本身配置如下：\n\
  \n****<cache name=\"org.hibernate.cache.StandardQueryCache\"**\n\n**maxElementsInMemory=\"\
  500\"**\n\n**eternal=\"false\"**\n\n**timeToLiveSeconds=\"120\"**\n\n**overflowToDisk=\"\
  true\"/>**\n\n**此配置定义了待缓存查询的缓存区域设置。\n\n第 9 章 ■ 最佳实践与高级技术\n\n**查询缓存注意事项**\n\n我们强烈建议在尝试使用查询缓存之前进行一些性能测试，因为它实际上可能会降低性能，而不是提升性能。\n\
  \n查询缓存有时会导致比完全不使用更差的性能，原因在于使用了 **UpdateTimestampsCache**。这个区域会跟踪应用程序中所有表的最新更新，为每个表存储对应的时间戳，记录该表上次更新的时间。当调用一个查询时，即使结果数据仍存储在缓存中，如果\
  \ Hibernate 检测到与查询关联的表自查询被缓存以来已发生更改，它会使查询数据失效，并且你必须访问数据库而不是缓存。因此，如果你的应用程序对任何表进行频繁更新，查询缓存的好处就会减少。此外，因为对任何表的更新也意味着对\
  \ **UpdateTimestampsCache** 的更改，由于锁竞争，这个资源会成为潜在的瓶颈。突然间，查询缓存听起来就没那么有用了。\n\n然而，我们并不想打击你。理解查询缓存功能的工作方式很重要，这样你就能更好地评估你的需求，并确定它是否适合你的应用程序。\n\
  \n集群配置中的缓存\n\n如果你正在构建一个旨在处理大量请求的应用程序，你可能需要以集群配置设置多个应用程序节点。虽然拥有多个节点将为你的应用程序提供更多资源，但如果每个节点维护自己的缓存，你将开始给数据库带来压力。随着集群中每增加一个节点，数据库负载也会相应增加，因此集群中的节点数量将代表数据库请求量的倍数：\n\
  \n( *集群中的节点数*) * ( *请求数*) = *数据库负载* 此外，一个节点对数据库的更新不会传播到集群中其他节点的缓存状态，从而导致陈旧读取。显然，数据库负载将随着集群中应用服务器节点数量的增加而成比例增加，但也必须考虑缓存因素；你的缓存策略越有效，数据库的负载就越小。话虽如此，即使采用激进的缓存策略，数据库负载仍然会乘以节点数量。实际上，随着集群中节点数量的增加，你的缓存效率会相应减弱。\n\
  \n在构建具有高写入量对象的应用程序时，解决方案是消除每个节点维护单个缓存的冗余，转而采用集群缓存配置。有几种缓存实现提供了集群能力，包括 Ehcache 和\
  \ SwarmCache。在我们的讨论中，我们将继续使用 Ehcache 作为我们的缓存提供者。\n\n第 9 章 ■ 最佳实践与高级技术\n\n集群缓存与复制机制\n\
  \nEhcache 提供了三种不同的机制来同步每个节点的缓存数据。当数据持久化到一个节点的缓存时，更改会使用特定的复制策略广播到集群中的其他节点。Ehcache\
  \ 支持通过 JMS、RMI、JGroups 或 Terracotta 进行复制。对于所有这些策略，Ehcache 不会尝试使用锁定作为防止集群节点间数据不一致的手段。这很可能是出于性能考虑，因此你的应用程序应该能够处理潜在的数据陈旧问题。\n\
  \n\n\n当在基本集群配置中使用时，Ehcache 并不会将全部缓存数据分布到集群中的每个节点上。相反，每个节点都包含一份完整的缓存数据集。虽然这会增加内存开销，但通过减少网络开销提升了性能。为了降低应用程序的内存占用，你应该调整每个缓存区域中存储的最大对象数量。同时，还应考虑特定缓存区域中可能存储的每个实体的平均大小，因为这会影响内存利用率。我们曾见过在缓存项数量较少的情况下，由于每个缓存项体积过大而导致内存问题逐渐显现。这些因素很少得到充分考量，却往往是造成重大瓶颈的原因。\n\
  \n无论采用何种复制机制，Ehcache 都提供了两种不同的策略来实际通知集群中的不同节点有关变更的信息：\n\n• 默认策略是发送被更新缓存项的键以及更新后的值。这种策略称为\
  \ **replicateUpdatesViaCopy**，因为更新后的值会被发送到集群中的所有其他节点。虽然这种方法通常是保持不同节点同步的最快方式，但它也带来了通过网络发送更新值的开销。当更新后的值非常大时，这可能会对性能产生影响。\n\
  \n• 另一种替代方案是仅向其他节点发送通知，告知它们应使其各自缓存中的数据失效。然后，一旦特定的缓存键失效，集群中的每个节点在下次尝试访问该特定实体（或集合）时，最终会从数据库中重新加载数据。显然，这会给数据库带来额外的负载——当集群中其他每个节点发生缓存未命中时，它们都需要重新查询数据库以填充各自的缓存。这种方法的优势在于，只需要将缓存键传输到其他节点。\n\
  \n默认的复制行为是异步通知其他节点变更，允许缓存传播在后台进行，并且不影响原始操作（通知者）的响应时间。在数据一致性是首要任务的高并发场景中，Ehcache\
  \ 可以改为同步执行复制，即直到集群中的其他节点成功收到通知后，缓存操作才会返回。由于这会对性能产生显著影响，因此只应在特殊情况下使用。\n\n配置复制\n\n\
  Ehcache 集群实现不需要对应用程序的代码或架构进行任何更改。你只需要修改 Ehcache 配置即可。\n\n为了在我们的示例中启动集群缓存配置，我们需要更新\
  \ **ehcache.xml** 文件。我们将选择 JGroups 复制机制。以下是 Ehcache 文档建议的代码片段：\n\n**151\n\n第 9 章\
  \ ■ 最佳实践与高级技术\n\n**<cacheManagerPeerProviderFactory**\n\n**class=\"net.sf.ehcache.distribution.jgroups.JGroupsCacheManagerPeerProviderFactory\"\
  **\n\n**properties=\"connect=UDP(mcast_addr=231.12.21.132;mcast_port=45566;ip_ttl=32;**\
  \ **mcast_send_buf_size=150000;mcast_recv_buf_size=80000):**\n\n**PING(timeout=2000;num_initial_members=6):**\n\
  \n**MERGE2(min_interval=5000;max_interval=10000):**\n\n**FD_SOCK:VERIFY_SUSPECT(timeout=1500):**\n\
  \n**pbcast.NAKACK(gc_lag=10;retransmit_timeout=3000):**\n\n**UNICAST(timeout=5000):**\n\
  \n**pbcast.STABLE(desired_avg_gossip=20000):**\n\n**FRAG:**\n\n**pbcast.GMS(join_timeout=5000;join_retry_timeout=2000;**\n\
  \n**shun=false;print_local_addr=true)\"**\n\n**propertySeparator=\"::\"**\n\n**/>**\n\
  \n这些细节指定了 Ehcache 的 **cacheManagerPeerProviderFactory** 的 JGroup 实现的网络和通信细节。\n\n\
  接下来，我们必须为每个缓存区域添加一个 **cacheEventListenerFactory** 元素。如果我们没有为每个缓存区域指定具体的配置，我们可以将此元素添加到默认区域配置中。让我们按如下方式配置\
  \ **ArtEntity** 缓存区域：\n\n**<cache name=\"com.prospringhibernate.gallery.domain.ArtEntity\"\
  **\n\n**maxElementsInMemory=\"5000\"**\n\n**eternal=\"false\"**\n\n**timeToIdleSeconds=\"\
  900\"**\n\n**timeToLiveSeconds=\"1800\"**\n\n**overflowToDisk=\"false\">**\n\n****<cacheEventListenerFactory**\n\
  \n**class=\"net.sf.ehcache.distribution.jgroups.JGroupsCacheReplicatorFactory\"\
  **\n\n**properties=\"replicateAsynchronously=true,**\n\n**replicatePuts=true,**\n\
  \n**replicateUpdates=true,**\n\n**replicateUpdatesViaCopy=true,**\n\n**replicateRemovals=true\"\
  />**\n\n**</cache>**\n\n在此配置中，我们将 **replicateAsynchronously** 设置为 **true**，确保更新异步进行。此外，我们将\
  \ **replicateUpdatesViaCopy** 设置为 **true**，确保更新后的缓存元素的值直接发送到所有其他集群节点。大多数其他属性应该是不言自明的。\n\
  \n第 9 章 ■ 最佳实践与高级技术\n\n**使用外部缓存服务器**\n\n另一种限制一致性问题的缓存解决方案是使用独立的缓存服务器。\n\nMemcached，一个流行的开源内存对象缓存系统，采用了类似的策略。\n\
  \nEhcache 提供了一个缓存服务器实现，这是一个自包含的缓存服务器，在其自己的 JVM 中运行。由于缓存服务器不与应用程序集群中的任何特定节点绑定，因此缓存之间版本冲突的风险不大（因为只有一个外部缓存）。如果你担心缓存服务器成为单点故障，你可以将其部署在集群配置中。\n\
  \n使用外部缓存服务器可以减少缓存数据不一致的可能性。\n\n然而，你必须权衡这一点与网络开销的代价，因为对缓存服务器的所有调用都必须通过网络进行（而不是在进程内）。再次强调，我们建议你尝试各种缓存选项，并选择最适合你应用程序需求的解决方案。\n\
  \n总结\n\n在本章中，我们探讨了评估和改进应用程序性能的几种策略。\n\nHibernate 开发者最常见的陷阱之一是 N+1 次查询问题。这个问题通常源于未能正确调整领域对象的映射配置或\
  \ DAO 层中的查询。理解这个问题如何出现以及如何检测它，对于确保良好的 ORM 性能至关重要。虽然调优确实取决于应用程序的独特需求，但通常的最佳解决方案是考虑服务层、控制器层或视图层中需要哪些数据，并优化你的查询以尽可能高效地加载这些数据。你看到使用\
  \ fetch-join 通常是初始化关联而不需要多次查询的有效方法。依赖 Hibernate 的批处理能力也是一个不错的策略，尽管它并不总是那么有效。\n\n\
  另一种提高性能的技术是利用 Hibernate 的缓存能力。\n\n正确调优缓存可以对应用程序性能产生显著影响。然而，如果操作不当，缓存也可能降低性能。例如，过度激进的缓存可能会触发\
  \ **OutOfMemoryException** 异常。了解 Hibernate 中不同的缓存配置选项将帮助你选择合适的行为。尝试不同的 TTL 设置也很重要。\n\
  \n\n\nHibernate 提供了多个不同的缓存层。一级缓存的作用域是 **EntityManager**，但通常不需要过多调整。二级缓存则提供了缓存领域对象、集合和查询的能力。每种缓存类型都独立管理和缓存。\n\
  \n领域对象通过其标识符作为键，对象所有属性的值都会被持久化到缓存中。然而，关联和查询仅持久化标识符的集合。这些标识符会与实体缓存进行交叉引用，以加载实际的领域对象数据。\n\
  \n某些缓存实现（例如 Ehcache）支持集群，允许将缓存更新持久化到集群中的其他节点。但是，如果无法保持集群内其他节点的缓存同步，就可能导致因版本冲突或数据陈旧而引发的严重问题。例如，对数据库进行的重要更新可能会被意外回滚。当某个节点的缓存未收到对数据库初始更新的通知时，就可能发生这种情况。\n\
  \n第 9 章 ■ 最佳实践与高级技术\n\n然后，当另一个用户尝试对同一实体执行写操作时，该用户是在陈旧数据的基础上应用其更新，这实际上会在第二个（陈旧的）进程被应用后，回滚最初的更新。\n\
  \n在部署集群应用时，使用可集群的缓存或集群中所有节点都能共享的集中式缓存服务器非常重要。Ehcache 提供了一个名为 Cache Server 的独立服务器产品。此外，Ehcache\
  \ 还提供了多种可配置选项，用于调整其集群特性。尝试各种设置以确定最适合你应用需求的选项至关重要。\n\n在下一章中，我们将继续研究为持久化层提供专门功能、提升性能以及运用最佳实践的高级策略。\n\
  \n**第 10 章**\n\n■ ■ ■\n\n**集成框架**\n\n很少有应用会仅需要 Spring 和 Hibernate。根据你的具体情况，很可能需要集成多个框架以满足应用需求。有时这些集成细节很简单。其他时候，与另一个框架的集成可能会带来一系列独特的挑战。\n\
  \n当今工程师面临的两个非常常见的需求是实现全文搜索和暴露基于 Web 的 API。在本章中，我们将向你展示如何利用多个框架来实现这些目标。为了给我们的艺术画廊应用暴露一个\
  \ API，我们将利用 Spring 3.0 中新增的 RESTful Web 服务增强功能，以及 Dozer、Spring 的对象/XML 映射支持，以及用于数据编组的\
  \ Data Transfer Object 模式。为了实现全文搜索，我们将利用 Hibernate Search，这是 Hibernate 的一个子项目，它提供了一种将\
  \ Lucene 无缝集成到基于 Hibernate 的应用中的方式。\n\n使用 Spring 实现 RESTful Web 服务\n\n如今，Web 应用的需求已变得日益复杂。随着处理能力和带宽的提升，用户的期望也随之提高，导致了更复杂的架构以及更具交互性和响应性的功能。由控制器和\
  \ JSP 驱动的模板驱动型 HTML 网页已很少能满足需求。相反，当今的典型应用需要客户端和服务器之间的异步消息传递——通常利用 Ajax 或 Flash。这种从纯服务器端处理的转变意味着渲染用户界面只是战斗的一部分。\n\
  \n在当今许多富互联网应用（RIA）中，大量工作通常围绕着与 Web 服务通信或将数据序列化作为远程处理策略的一部分。\n\nREST，即表述性状态转移，在实现\
  \ Web 服务方面已变得越来越流行。REST 最好被描述为一种架构风格，而非标准或协议。REST 利用 HTTP 提供一种一致的、面向资源的方法来表示数据。与远程过程调用（RPC）风格的通信（其隐喻更类似于方法调用）相反，REST\
  \ 专注于特定资源的表示，该资源通常体现为一个 URL。RESTful API 利用了 Web 的许多内置特性，例如缓存、代理和基于 HTTP 的身份验证策略。\n\
  \n![图片 8](img/index-171_1.jpg)\n\n第 10 章 ■ 集成框架\n\n■ **注意** Roy Fielding 于 2000\
  \ 年在其博士论文中首次提出了 REST 这一术语。Fielding 是 HTTP 规范的主要作者之一，REST 是与 HTTP 1.1 规范并行定义的。\n\n\
  名词、动词和内容类型\n\nRESTful API 通常用名词、动词和内容类型来表达：\n\n• *名词*是资源的名称。这些名称通常表示为 URL。\n\n•\
  \ *动词*是可以对资源执行的操作。这些动词是常见的 HTTP 动词：**GET**、**POST**、**PUT** 和 **DELETE**。\n\n• *内容类型表示*指的是用于实现机器间通信的数据格式。常见的表示有\
  \ XML、JSON、HTML、二进制数据（如图像），甚至 RDF 本体。\n\n名词、动词和表示可以如图 10-1 所示进行可视化。\n\n*图 10-1\\\
  . REST 信徒眼中的名词、动词和内容类型表示* 为了进一步说明名词、动词和内容类型表示之间的关系，假设 Apress 有一个用于管理其图书的 API。要创建你正在阅读的这本书，我们可能会在类似\
  \ **http://api.apress.com/book/** 的 URL 上发出一个 HTTP **POST**。该 **POST** 的正文以及返回数据的格式完全由\
  \ API 设计者决定。REST 并未规定特定的数据格式，因此 API 设计者必须根据自身情况做出正确选择。该 API 可能接受 XML、JSON 或任何可以通过\
  \ HTTP 传输的数据格式。Apress API 甚至可能支持数据的多种表示，允许 API 的消费者以 XML 或 JSON 格式向单个资源 URL 发出请求。通常，你会通过指定一个\
  \ **content-type** 头（例如 **json/text**）来处理这种*内容协商*。\n\n一个设计良好的 API 还可能允许你通过提供 **Accept**\
  \ 头来指示你期望接收哪种数据表示。遵循 HTTP 的语义，成功添加我们的图书将返回 HTTP 状态码 201（已创建）。该 API 很可能还会提供一个指向代表新创建实体的资源的链接，通过其名称\
  \ **http://api.apress.com/book/prospringhibernate**，或者更好的方式是通过 ISBN-13 编号 **http://api.apress.com/book/978-1430226323**。\n\
  \n定义了资源后，RESTful Web 服务就可以使用 HTTP 提供的动词来访问或操作这些资源所代表的数据。例如，如果你想检索我们图书的当前表示，你可以在资源\
  \ **http://api.apress.com/book/978-1430226323** 上发出一个 HTTP **GET**，并指定 **content-type**\
  \ 头为 **json/text**。JSON 响应可能如下所示：\n\n**{**\n\n**\"book\" : {**\n\n**\"ISBN-13\"\
  \ : \"978-1430226321\",**\n\n**\"title\" : \"Code Generation in Action\",**\n\n\
  **\"authors\" : {**\n\n**\"author\" : [ {**\n\n**\"first\" : \"Paul\", \"last\"\
  \ : \"Fisher\"**\n\n**}, {**\n\n**\"first\" : \"Brian\", \"last\" : \"Murphy\"**\n\
  \n**}**\n\n**] },**\n\n**\"publisher\" : \"Apress\"**\n\n**}**\n\n**}**\n\n\n\n\
  类似地，如果你想更新此资源的属性（例如更新与这本书相关的内容），你可以发送一个 HTTP **PUT** 请求，目标 URL 为 **http://api.apress.com/book/978-1430226323**，并在请求中传入资源更新后的状态。\n\
  \n在这里，我们将重点介绍 Spring 提供的用于简化 RESTful API 开发的特性。不过，在着手实现 Spring 之前，我们需要先确定一种序列化策略。为了在网络上传输丰富的领域模型，我们需要能够扁平化对象图，以便将其序列化并表示为\
  \ XML 或 JSON 格式。\n\n**序列化对象图**\n\n尽管 RESTful 架构本身具有简单性，但在将领域模型序列化为 Web 服务所选择的任何格式时，仍然存在一个挑战。例如，如果你选择将数据表示为\
  \ XML，那么有许多框架和技术可以将面向对象的领域模型转换为 XML。无论你选择哪种方式来编组你的领域对象，都很可能会遇到序列化过多对象图的问题。这是面向对象的\
  \ Java 领域与扁平的、基于文本的 XML 和 JSON 领域之间另一种类型阻抗不匹配的副作用。\n\n在第 9 章中，你了解了延迟加载的优缺点。在编组数据时，如果你不小心，并试图在\
  \ **EntityManager** 已经关闭后编组你的领域实体，延迟加载可能会再次引发问题。然而，即使 **EntityManager** 保持打开状态，当编组过程尝试将数据序列化为指定的负载格式时，你也必然会初始化你的对象图。\n\
  \n不幸的是，这是一个难以解决的问题。一种解决方案是插入一个专门的框架，旨在防止 **LazyInitializationException** 弹出，或防止无意中编组过多数据。其中一个解决方案是一个名为\
  \ Gilead 的框架。Gilead 尝试将你的领域实体克隆到一个新的实例中，在该实例中，Hibernate 代理已被过滤掉。这可以防止潜在的 **LazyInitializationException**\
  \ 发生，以及加载整个对象图的可能性，后者会导致严重的数据库开销和性能影响。\n\n将实体的所有关联“置空”以便将其序列化为更紧凑、更高效的格式，其问题在于，如果这些数据被读回应用程序并重新附加到\
  \ **EntityManager**，这些被置空的关联将导致 Hibernate 删除重要数据，例如删除特定实体上的集合。Gilead 为其所谓的*合并过程*提供了几种策略，在该过程中，返回给\
  \ Hibernate 应用程序的数据会被重新组装回原始结构。一种解决方案尝试将这些细节保存在 **HttpSession** 中，这需要最少的应用程序代码侵入，但也可能带来性能和可扩展性方面的代价。\n\
  \n另一种策略要求你的领域模型继承自 Gilead 提供的一个基类。然后，Gilead 使用这个基类作为一种手段，来存储将轻量级编组数据合并回 Hibernate\
  \ 应用程序所需的信息。你可以在 **http://noon.gilead.free.fr/gilead/** 了解更多关于 Gilead 的信息。\n\n**使用令人畏惧的\
  \ DTO 模式**\n\n数据传输对象（DTO）模式被许多人认为是一个“坏主意”。这是因为它有可能增加大量的代码冗余和复杂性，导致未来出现更多错误和维护开销。然而，有时\
  \ DTO 模式可以作为一个可行的解决方案，而处理领域模型的编组可以说是其中一种情况。\n\nDTO 模式通常需要创建专门的类，这些类仅用于传输领域对象的数据。通常，你会创建一个单独的包结构来帮助避免混淆。你的\
  \ DTO 类可能比你的领域对象更小、更紧凑，通常会用简单的标识符替换对象引用，并可能完全移除关联。\n\n显然，DTO 层的具体细节取决于你应用程序的独特需求。然而，由于你的\
  \ DTO 类不依赖于 Hibernate，更紧凑，并且产生循环引用的可能性要小得多，它们可以帮助简化编组策略所需的工作。\n\n使用 DTO 时提出的主要担忧是，你需要编写大量自定义代码来从一个类层次结构转换到另一个（从你的领域模型到\
  \ DTO，再转换回来）。这种转换工作不仅需要大量的前期开发时间，而且还可能导致错误，特别是如果你的领域类发生了更改，而你的 DTO 转换代码没有相应更新时。\n\
  \n这个问题的一个解决方案是 Dozer。Dozer 是一种不同类型的映射框架。与 Hibernate 不同，Dozer 不尝试将 Java 类映射到关系数据库。Dozer\
  \ 将 Java 类映射到其他 Java 类，并且它专门为领域模型到 DTO 的转换需求而设计。\n\n像 Dozer 这样的框架的主要优势在于，它卸载了将一个类转换为另一个类的复杂实现细节。Dozer\
  \ 能够就两个类如何关联做出一些智能判断。例如，如果两个打算相互映射的类共享同名的属性，Dozer 将尝试自动映射这些属性，除非另有指示。Dozer 还能够处理类型之间的转换，因此即使映射的属性不是同一类型，Dozer\
  \ 也会尝试使用其内置转换器之一从一种类型转换为另一种类型。如果找不到适用的转换器，你也可以创建自己的转换器。此外，Dozer 支持嵌套映射行为，因此如果你定义了两个类之间的映射行为，这些规则将应用于任何级别的转换。换句话说，即使你尝试映射两个不同的顶级类，Dozer\
  \ 也会根据需要应用任何其他已定义类的映射规则。即使对于嵌套属性和集合也是如此。当 Dozer 遇到可映射的场景时，它会自动应用这些规则。在查看几个示例时，这些细节会更加清晰，因此让我们开始将\
  \ Dozer 集成到我们的艺术画廊应用程序中。\n\n**引导 Dozer**\n\n要开始使用 Dozer，我们首先需要将必要的依赖项添加到我们的 Maven\
  \ **pom.xml** 文件中：\n\n**<!--Dozer -->**\n\n**<dependency>**\n\n**<groupId>net.sf.dozer</groupId>**\n\
  \n**<artifactId>dozer</artifactId>**\n\n**<version>5.2.2</version>**\n\n**</dependency>**\n\
  \n这将提供 Dozer 集成所需的所有 JAR 包。将此代码片段添加到你的 **pom.xml** 后，你可能需要运行 **mvn install** 才能将必要的依赖项下载到你的本地\
  \ Maven 仓库中。\n\n**构建 DTO 层**\n\n在我们进一步操作之前，需要定义我们的 DTO 类。通常，DTO 与其对应的领域类相似，但本质上更简单。通过移除双向关联、循环引用和不必要的属性，DTO\
  \ 类可以降低编组策略或远程实现中的复杂性。\n\n让我们定义我们的 **ArtEntityDTO** 类：\n\n**package com.prospringhibernate.gallery.dto;**\n\
