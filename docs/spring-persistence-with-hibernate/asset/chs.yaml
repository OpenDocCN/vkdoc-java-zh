  \n****@Transactional(propagation = Propagation.REQUIRES_NEW)**\n\n**public void\
  \ ArtEntityDataOnDemand.init() {**\n\n**if (data != null) {**\n\n**return;**\n\n\
  **}**\n\n****data = com.prospringhibernate.gallery.domain.ArtEntity.findArtEntityEntries(0,\
  \ 10);** **if (data == null)**\n\n**throw new IllegalStateException(**\n\n**\"Find\
