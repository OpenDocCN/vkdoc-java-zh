  \n**}**\n\n****public String getEmailAddress() {**\n\n**return emailAddress;**\n\
  \n**}**\n\n****public void setEmailAddress(String emailAddress) {**\n\n**this.emailAddress\
  \ = emailAddress;**\n\n**}**\n\n****public String getTelephone() {**\n\n**return\
  \ telephone;**\n\n**}**\n\n****public void setTelephone(String telephone) {**\n\n\
  **this.telephone = telephone;**\n\n**}**\n\n****}**\n\n**Comment** 领域类与 **CommentDTO**\
  \ 类之间的差异相当微小。我们移除了 **commentedArt** 属性，该属性会在 **ArtEntityDTO** 和 **CommentDTO** 之间创建循环引用（前提是我们将属性类型从\
  \ **ArtEntity** 改为 **ArtEntityDTO**）。\n\n使用 Spring 配置 Dozer\n\n现在我们已经定义了 DTO 类，接下来创建映射配置，指示\
  \ Dozer 如何将一个类映射到另一个类。Dozer 为 Spring 提供了 **DozerBeanMapperFactoryBean** 抽象，这是一个工厂\
  \ bean，有助于创建 Dozer 映射器。Dozer 映射器依赖一个 XML 配置文件来学习定义一个类属性如何映射到另一个类属性的规则。\n\n首先，让我们将适当的配置添加到\
  \ **spring-master.xml** 文件中：\n\n**<bean class=\"org.dozer.spring.DozerBeanMapperFactoryBean\"\
  >**\n\n**<property name=\"mappingFiles\" value=\"classpath*:/dozer-mapping.xml\"\
  />**\n\n**</bean>**\n\n这个 bean 实际上非常灵活，并支持用于定义自定义转换器、事件监听器和其他 Dozer 扩展点的附加属性。你可以在\
  \ Dozer 网站上了解更多关于 **DozerBeanMapperFactoryBean** 功能的信息。\n\n在上述配置中，我们指定 Dozer 映射文件应位于类路径下，名称为\
  \ **dozer-mapping.xml**。这个 XML 文件定义了 Dozer 的默认行为以及类之间映射的规则。让我们看看我们的 Dozer 映射配置：\n\
  \n**<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<mappings**\n\n****xsi:schemaLocation=\"\
  http://dozer.sourceforge.net**\n\n****http://dozer.sourceforge.net/schema/beanmapping.xsd\"\
  >**\n\n****<configuration>**\n\n**<stop-on-errors>true</stop-on-errors>**\n\n**<date-format>MM/dd/yyyy\
  \ HH:mm</date-format>**\n\n**<wildcard>true</wildcard>**\n\n**</configuration>**\n\
  \n****<mapping>**\n\n**<class-a>com.prospringhibernate.gallery.domain.ArtEntity</class-a>**\n\
  \n**<class-b>com.prospringhibernate.gallery.dto.ArtEntityDTO</class-b>**\n\n**<field>**\n\
  \n**<a>galleryPicture.url</a>**\n\n**<b>galleryURL</b>**\n\n**</field>**\n\n**<field>**\n\
  \n**<a>storagePicture.url</a>**\n\n**<b>storageURL</b>**\n\n**</field>**\n\n**<field>**\n\
  \n**<a>thumbnailPicture.url</a>**\n\n**<b>thumbnailURL</b>**\n\n**</field>**\n\n\
  **</mapping>**\n\n****<mapping>**\n\n**<class-a>com.prospringhibernate.gallery.domain.Category</class-a>**\n\
  \n**<class-b>com.prospringhibernate.gallery.dto.CategoryDTO</class-b>**\n\n**</mapping>**\n\
  \n****<mapping>**\n\n**<class-a>com.prospringhibernate.gallery.domain.Comment</class-a>**\n\
  \n**<class-b>com.prospringhibernate.gallery.dto.CommentDTO</class-b>**\n\n**</mapping>**\n\
  \n****<mapping>**\n\n**<class-a>com.prospringhibernate.gallery.domain.Exhibition</class-a>**\n\
  \n**<class-b>com.prospringhibernate.gallery.dto.ExhibitionDTO</class-b>**\n\n**</mapping>**\n\
  \n****</mappings>**\n\n让我们逐步了解此配置的重要组件。首先是文件顶部的一个配置块。此部分指定了 Dozer 的默认全局映射行为。\n\n\
  我们定义了一个默认的 **date-format**，并将 **wildcard** 行为设置为 **true**。**wildcard** 行为决定了 Dozer\
  \ 是否默认尝试自动映射所有明显的属性。例如，如果 **wildcard** 设置为 **true**，并且两个映射类共享相同名称的属性，Dozer 将尝试自动映射这些属性。此功能可以在特定映射规则中被覆盖。如果\
  \ **wildcard** 保持激活状态，你仍然可以通过使用 **field-exclude** 元素来省略某些属性的映射。例如，如果我们想阻止 **subTitle**\
  \ 属性被映射，我们可以将以下片段添加到 **ArtEntity** 映射配置中：\n\n**<field-exclude>**\n\n**<a>subTitle</a>**\n\
  \n**<b>subTitle</b>**\n\n**</field-exclude>**\n\n一对类的映射配置很直接。每个映射定义都封装在一个映射 XML\
  \ 块中。在每个块内，我们包含一个 **class-a** 元素和一个 **class-b** 元素，指定要映射的相应类。尽管配置本质上是顺序的，但请记住 Dozer\
  \ 默认是双向的。这意味着定义如何从 **ArtEntity** 类映射到 **ArtEntityDTO** 类的规则也可以反向应用，以从 DTO 类映射回领域类。你可以通过向映射元素添加属性\
  \ **type=\"one-way\"** 来要求映射规则仅应用于单一方向。\n\n在我们的 **ArtEntity** 到 **ArtEntityDTO**\
  \ 映射案例中，由于两个类之间的属性名称相当一致，大部分细节将是隐式的。尽管 **ArtEntityDTO** 上的 **comments** 集合属性包含不同类型的元素，但\
  \ Dozer 将通过应用指定的映射规则，自动将 **ArtEntity.comments** 集合中的每个 **Comment** 元素转换为 **CommentDTO**\
  \ 实例。\n\n\n\n我们需要在 **ArtEntity** 映射规则中显式定义的唯一例外，是三个 **ArtData** 引用与 **String** 属性之间的转换。在本例中，两个类之间的属性名称并不一致，因此我们需要为每个\
  \ **ArtData** 引用定义一个字段元素。请注意，我们不仅映射了名称不同的属性，还提取了子属性的值，并将其用于转换后的 DTO 属性。例如，在定义将 **ArtEntity.galleryPicture**\
  \ 属性（类型为 **ArtData_Gallery**）转换为 **ArtEntityDTO.galleryURL** 属性的映射规则时，我们尝试从 **galleryPicture**\
  \ 属性中提取 **url** 属性，作为 **galleryURL** 的值。这是通过在 Dozer 配置中指定嵌套表达式来实现的：\n\n**<field>**\n\
  \n**<a>galleryPicture.url</a>**\n\n**<b>galleryURL</b>**\n\n**</field>**\n\n元素 ***a**\
  \ 的值指定了一个嵌套属性，而元素 ***b** 的值则直接定义了该属性。Dozer 在这方面非常灵活，支持嵌套属性，并且在处理数组或集合时也支持索引属性。\n\
  \n**166\n\n第 10 章 ■ 集成框架\n\n实现映射\n\n配置细节处理完毕后，让我们尝试进行一些映射！验证一切是否正常工作的最简单方法是从测试开始。正如第\
  \ 8 章所讨论的，让我们创建一个集成测试。实际上，定义一个单元测试相当简单，因为我们的依赖关系非常少。\n\n然而，由于我们使用 Spring 配置指定了部分\
  \ Dozer 设置，让 Spring 来处理这些细节会更容易一些。\n\n以下是一个简单的测试，有助于确定我们的 Dozer 映射过程是否按预期工作：\n\n\
  **@RunWith(SpringJUnit4ClassRunner.class)**\n\n**@ContextConfiguration(locations\
  \ = {\"classpath:/META-INF/spring/spring-master.xml\"})** **public class DozerMappingTest\
  \ {**\n\n****private Mapper dozerMapper;**\n\n**private ArtEntity artEntity;**\n\
  \n****public Mapper getDozerMapper() {**\n\n**return dozerMapper;**\n\n**}**\n\n\
  ****@Autowired**\n\n**public void setDozerMapper(Mapper dozerMapper) {**\n\n**this.dozerMapper\
  \ = dozerMapper;**\n\n**}**\n\n****@Before**\n\n**public void preMethodSetup() {**\n\
  \n****Comment comment = new Comment();**\n\n**comment.setComment(\"这是一个测试评论。多酷的一张图片！\"\
  );** **comment.setCommentDate(new Date());**\n\n**comment.setEmailAddress(\"test@prospringhibernate.com\"\
  );** **comment.setFirstName(\"John\");**\n\n**comment.setLastName(\"Doe\");**\n\n\
  **comment.setTelephone(\"212-555-1212\");**\n\n****ArtData_Thumbnail thumbnail =\
  \ new ArtData_Thumbnail();**\n\n**thumbnail.setId(1L);**\n\n****artEntity = new\
  \ ArtEntity();**\n\n**artEntity.setCaption(\"标题测试\");**\n\n**artEntity.addCommentToArt(comment);**\n\
  \n**artEntity.setDescription(\"一张非常酷的树木图片。\");** **artEntity.setDisplayDate(\"10\
  \ 月 10 日\");**\n\n**artEntity.setHeight(500);**\n\n**artEntity.setWidth(300);**\n\
  \n**artEntity.setSubTitle(\"这是图片的副标题\");** **artEntity.setTitle(\"这是图片的标题\");**\
  \ 167\n\n第 10 章 ■ 集成框架\n\n**artEntity.setThumbnailPicture(thumbnail);**\n\n****}**\n\
  \n****@Test**\n\n**public void testMappingArtEntity() {**\n\n**ArtEntityDTO artEntityDTO\
  \ = this.getDozerMapper().map(artEntity,** **ArtEntityDTO.class);**\n\n**Assert.assertEquals(artEntity.getTitle(),\
  \ artEntityDTO.getTitle());** **Assert.assertTrue(artEntityDTO.getComments().size()\
  \ > 0);** **Assert.assertTrue(\"artData_thumbnail 应该是一个字符串值\",** **artEntityDTO.getThumbnailURL().length()\
  \ > 0);**\n\n**}**\n\n****}**\n\n你应该能认出前面测试示例中的许多样板细节。请注意，我们使用 **@ContextConfiguration**\
  \ 注解指定了顶层的 Spring 配置文件。该类中的大部分代码都包含在 **preMethodSetup()** 方法中，该方法使用 **@Before**\
  \ 注解进行标注，以确保它在我们的测试方法（使用 **@Test** 注解标注）之前被调用。在 **preMethodSetup()** 中，我们实例化了一个\
  \ **ArtEntity** 领域类，并设置了基本属性和关联。\n\n一旦我们配置好了 **ArtEntity** 实例，就会调用 **testMappingArtEntity()**\
  \ 方法，该方法包含我们实际测试的代码。在此方法中，我们在 **Mapper** 实例上调用了 **map** 方法，该实例由 Spring 通过自动装配注入到\
  \ **dozerMapper** 私有属性中。Dozer 映射器为我们完成了所有繁重的工作。我们传入上一步设置好的 **artEntity** 实例，以及我们希望将实例映射到的类类型，Dozer\
  \ 就会将我们的 **ArtEntity** 类转换为 **ArtEntityDTO**。\n\n为了确保一切按计划进行，我们对映射后的 **ArtEntityDTO**\
  \ 实例的几个属性进行了断言，验证了正确的值是否存在。尽管映射过程看似简单，但幕后发生了很多事情。我们现在拥有了一种有效且可靠的方法，可以将 Hibernate\
  \ 领域类转换为更简单的 DTO 类。\n\n利用 Spring 3 的 REST 支持\n\nSpring 3 为 MVC 开发提供了众多增强功能。当 Spring\
  \ 首次出现时，它因其优雅的、接口驱动的 MVC 方法而备受赞誉。自那时起，情况有了显著改善，有助于减少配置并简化开发工作。\n\n通过利用注解，Spring\
  \ 现在提供了一种更直观的方法来实现控制器。不再需要显式地从请求中提取请求参数和其他细节。此外，控制器的限制也大大减少。在定义方法签名时，你有更多的灵活性，无需遵守参数类型的契约。相反，Spring\
  \ 允许你将方法参数映射到传入请求的各个方面，例如查询参数、会话属性，甚至 URL 的各个部分。这种新的灵活性由注解驱动——可以说是一种更简洁、更直观的解决方案。让我们看一个例子：\n\
  \n**@Controller**\n\n**public class ArtEntityRestController {**\n\n****@Autowired**\n\
  \n**private ArtworkFacade artworkFacade;**\n\n第 10 章 ■ 集成框架\n\n****@Autowired**\n\
  \n**private Mapper dozerMapper;**\n\n****public static final String JAXB_VIEW =\
  \ \"jaxbView\";**\n\n****@RequestMapping(method=RequestMethod.GET, value=\"/api/artEntities/{id}\"\
  )** **public ModelAndView getArtEntity(@PathVariable Long id) {**\n\n**ArtEntity\
  \ artEntity = this.artworkFacade.getArtEntity(id);** **ArtEntityDTO artEntityDTO\
  \ = null;**\n\n**if (artEntity != null) {**\n\n**artEntityDTO = this.getDozerMapper().map(artEntity,\
  \ ArtEntityDTO.class);**\n\n**}**\n\n**ModelAndView modelAndView = new ModelAndView(JAXB_VIEW);**\n\
  \n**modelAndView.addObject(\"artEntity\", artEntityDTO);** **return modelAndView;**\n\
  \n**}**\n\n****@RequestMapping(method=RequestMethod.GET, value=\"/api/category/{category}/artEntities\"\
  )**\n\n**@ResponseBody()**\n\n**public List<ArtEntity> getArtEntities(@PathVariable\
  \ Long categoryId) {**\n\n**List<ArtEntity> artEntities = this.artworkFacade.getArtworkInCategory(categoryId);**\
  \ **return artEntities;**\n\n**}**\n\n****public ArtworkFacade getArtworkFacade()\
  \ {**\n\n**return artworkFacade;**\n\n**}**\n\n****public void setArtworkFacade(ArtworkFacade\
  \ artworkFacade) {**\n\n**this.artworkFacade = artworkFacade;**\n\n**}**\n\n****public\
  \ Mapper getDozerMapper() {**\n\n**return dozerMapper;**\n\n**}**\n\n****public\
  \ void setDozerMapper(Mapper dozerMapper) {**\n\n**this.dozerMapper = dozerMapper;**\n\
  \n**}**\n\n****}**\n\n在这个例子中，我们使用 **@Controller** 注解标注了我们的类。正如你所记得的，\n\n\n\n**@Controller**\
  \ 是一个从 **@Component** 扩展而来的构造型注解。与 **@Service** 和 **@Repository** 类似，**@Controller**\
  \ 有助于表明该类的用途，并且可以通过 Spring 的组件扫描功能自动进行管理。\n\n你还会注意到，我们自动装配了 **ArtworkFacade** 实现和\
  \ Dozer 映射器。真正的魔法发生在定义的两个方法中。这两个方法都使用了 **@RequestMapping** 注解，该注解告诉 Spring 此控制器方法的\
  \ URL 映射规则。在这两个方法中，我们都定义了控制器将关联的 URL。更重要的是，使用了 **{}** 字符。嵌入在花括号内的 URL 部分可以在方法中使用\
  \ **@PathVariable** 注解进行引用。通过这种方式，我们隐式地提取了 URL 的部分内容，并将其注入到方法参数中。\n\n除了 **@PathVariable**\
  \ 注解，Spring 还提供了其他几种选项来提取传入请求的各个方面，并将这些值映射到方法参数。例如，查询参数和会话属性也可以通过相应的注解映射到参数。请查阅\
  \ Spring 文档以了解更多关于实现 MVC 控制器的信息。\n\n使用 Spring OXM 进行数据编组\n\n我们不能忽略的一个重要细节是如何将 DTO\
  \ 渲染为 XML。为了实现这一点，我们利用了 Spring 3 的对象/XML 映射（OXM）支持。Spring 的 OXM 抽象有助于将编组实现细节与应用程序解耦。这使得你的代码更具可移植性，并简化了多种编组策略的集成。\n\
  \n让我们看一下驱动 REST 服务的 Spring MVC 配置。以下是 **spring-web-gallery.xml** 文件的精简版本。\n\n**<beans**\n\
  \n********xsi:schemaLocation=\"http://www.springframework.org/schema/beans**\n\n\
  ****http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**\n\n****http://www.springframework.org/schema/context**\n\
  \n****http://www.springframework.org/schema/context/spring-context-3.0.xsd**\n\n\
  ****http://www.springframework.org/schema/util**\n\n****http://www.springframework.org/schema/util/spring-util-3.0.xsd\"\
  >**\n\n****<bean class=\"org.springframework.web.servlet.view.ContentNegotiatingViewResolver\"\
  >**\n\n**<property name=\"mediaTypes\">**\n\n**<map>**\n\n**<entry key=\"xml\" value=\"\
  application/xml\"/>**\n\n**<entry key=\"html\" value=\"text/html\"/>**\n\n**</map>**\n\
  \n**</property>**\n\n**<property name=\"viewResolvers\">**\n\n**<list>**\n\n**<bean\
  \ class=\"org.springframework.web.servlet.view.BeanNameViewResolver\"/>**\n\n**<bean**\n\
  \n**class=\"org.springframework.web.servlet.view.InternalResourceViewResolver\"\
  >**\n\n**<property name=\"viewClass\"**\n\n**value=\"org.springframework.web.servlet.view.JstlView\"\
  />**\n\n**<property name=\"prefix\">**\n\n**<value>/WEB-INF/JSP/</value>**\n\n**</property>**\n\
  \n**<property name=\"suffix\">**\n\n**<value>.jsp</value>**\n\n**</property>**\n\
  \n**</bean>**\n\n**</list>**\n\n**</property>**\n\n**</bean>**\n\n******. . .**\n\
  \n****<context:component-scan base-package=\"com.prospringhibernate.gallery.restapi\"\
  />**\n\n****<bean**\n\n**class=\"org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping\"\
  />**\n\n**<bean**\n\n**class=\"org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter\"\
  />**\n\n****<bean id=\"jaxbView\" class=\"org.springframework.web.servlet.view.xml.MarshallingView\"\
  >**\n\n**<constructor-arg ref=\"jaxbMarshaller\"/>**\n\n**</bean>**\n\n****<!--\
  \ JAXB2 编组器。自动将 bean 转换为 xml -->**\n\n**<bean id=\"jaxbMarshaller\" class=\"org.springframework.oxm.jaxb.Jaxb2Marshaller\"\
  >**\n\n**<property name=\"classesToBeBound\">**\n\n**<list>**\n\n**<value>com.prospringhibernate.gallery.dto.ArtEntityDTO</value>**\n\
  \n**<value>com.prospringhibernate.gallery.dto.CategoryDTO</value>**\n\n**<value>com.prospringhibernate.gallery.dto.CommentDTO</value>**\n\
  \n**<value>com.prospringhibernate.gallery.dto.ExhibitionDTO</value>**\n\n**</list>**\n\
  \n**</property>**\n\n**</bean>**\n\n**. . .**\n\n****</beans>**\n\n让我们逐步了解几个核心组件。首先，我们包含了一个\
  \ **ContentNegotiatingViewResolver**。这个 bean 允许我们插入多个 **ViewResolver**（它们驱动特定的渲染策略），并根据请求的\
  \ **content-type** 指定使用哪个 **ViewResolver**。这个 bean 有两个重要属性：**mediaTypes** 和 **viewResolvers**。**mediaTypes**\
  \ 属性配置了 **contentTypes**。**viewResolvers** 属性指定了 **ViewResolver**。各个属性中条目的顺序是关键，因为这是将一个与另一个关联起来的方式。\n\
  \n我们还集成了 **component-scanning**，指定了 REST 控制器的包。\n\n此外，我们还包含了通过注解执行请求映射所需的 bean。\n\
  \n最后，我们使用 Spring 的 **org.springframework.web.servlet.view.xml.MarshallingView**\
  \ 类为 JAXB 视图指定了一个 bean。这个 bean 需要一个 **marshaller** 作为构造函数参数，我们通过引用接下来定义的 **jaxbMarshaller**\
  \ bean 来注入它。**jaxbMarshaller** bean 还需要一个要绑定的类列表，我们将所有 DTO 类（已使用 JAXB 注解正确标注）传递给它。\n\
  \n仅此而已！我们建议你查看源代码，以便更清楚地了解 REST 服务和 Spring 的 OXM 支持是如何运作的。\n\n处理并发\n\n在开发 REST Web\
  \ 服务时，我们通常会遇到的一个问题是可靠地处理对特定领域实体的并发修改尝试。在我们之前的 REST 示例中，我们研究了 HTTP GET 场景，其中我们的 Web\
  \ 服务仅返回数据库中特定实体（或多个实体）的静态表示。当处理 HTTP PUT 操作（通常意味着应更新资源）时，事情就没那么简单了。\n\n正确处理同时更新特定领域实体的尝试并不总是直截了当的。根据所采用的方法，可能会在可扩展性风险、数据库死锁可能性以及数据丢失或冲突方面产生后果。\n\
  \n乐观锁\n\n对于两个同时发生的事务冲突的可能性相当小的应用程序，Hibernate 和 JPA 提供了对乐观锁的支持。乐观锁对访问或写入数据没有任何限制。相反，在提交当前事务之前，会验证相关领域实体的版本字段。如果版本字段的值与数据库中代表该特定领域实体的行的值不匹配，则意味着并发事务已修改了该领域实体。\n\
  \n当向领域类添加版本字段时（通过使用 **@Version** 注解字段），每当特定领域实体被更新时，Hibernate 会自动递增该字段的值。然后，我们可以利用此功能来帮助防止在并发事务中修改的实体状态被还原。换句话说，典型的更新操作会通过添加一个\
  \ SQL 条件来检查版本字段，从而增强，例如更新 **ArtEntity** 领域实体的 name 属性将变为：\n\n**UPDATE artentity\
  \ SET name = ‘foo’, version = 8 where id = 4 and version = 7;** 乐观锁的好处在于它不会施加任何可能限制可扩展性的重大约束，例如数据库锁。然而，如果检测到版本不匹配，此策略将抛出异常，这意味着应用程序开发人员必须重新尝试事务，同时尝试协调冲突的数据。\n\
  \n悲观锁\n\n\n\n当并发修改的可能性较高时，您可能需要考虑改用**悲观锁**。悲观锁使用数据库锁，因此对可扩展性和数据库死锁的风险更大。悲观锁的主要优势在于它能限制对领域实体的并发访问或修改，这有助于在不使应用程序代码复杂化的情况下维护数据一致性。但请记住，悲观锁持有时间越长，对可扩展性的影响就越大。\n\
  \n在 JPA 2.0 中锁定实体相对简单。您可以在加载特定实体时获取悲观锁。您也可以在实体已加载后，通过调用 **entityManager** 实例上的 `lock`\
  \ 或 `refresh` 方法来显式锁定该实体。\n\n例如，要在加载特定 **ArtEntity** 实例时获取悲观写锁（一种排他锁），我们可以这样做：\n\
  \n**ArtEntity artEntity = entityManager.find(ArtEntity.class, 7, LockModeType.PESSIMISTIC_WRITE)**\n\
  \n如果我们之前已加载了一个 **ArtEntity** 实例，现在想要获取一个悲观读锁（一种共享锁），我们可以使用以下方法：\n\n**entityManager.lock(artEntity,\
  \ LockModeType.PESSIMISTIC_READ)**\n\n虽然可以同时获取多个读锁，但只能有一个悲观写锁。\n\n---\n\n**自由文本搜索**\n\
  \n尽管听起来可能令人惊讶，但有些解决方案并不在 Hibernate 的范畴内。认识到那些可能需要采用完全不同的策略来更好地满足需求的情况非常重要。这些场景并不总是那么明显，因此深入了解其他可用选项会很有帮助。\n\
  \n考虑在应用程序中提供类似搜索的功能。关系型数据库能够处理此功能，但仅限于一定程度。如果您的应用程序需要提供的搜索功能远远超出简单的“类似 SQL 的查询”所能满足的范围，那么是时候考虑替代方案了。\n\
  \n用户期望搜索功能是智能的。例如，如果您试图搜索“Spring Framework”，但无意中输入了“Sprong Framework”，您可能会期望应用程序能够绕过您的错误，仍然返回您想要的结果。这种功能通常被称为*模糊搜索*，因为它降低了匹配的严格性，允许包含拼写相似的词条。这个概念也可以扩展到支持同义词。例如，搜索“car”也可以匹配包含“automobile”的条目。\n\
  \n关系型数据库通常不擅长在文本块中查找词组，这种功能通常被称为*自由文本搜索*。在关系型数据库中提供这种搜索功能可能会带来显著的性能开销以及额外的开发时间。\n\
  \n查找以特定单词开头或结尾的文本内容可以使用 **like** 条件来实现，例如：\n\n**List<ArtEntity> blueEntities = entityManager.createQuery(**\n\
  \n**“select artEntities from ArtEntity artEntities where artEntities.description\
  \ like ‘blue%’”**\n\n**).list();**\n\n显然，这个查询有点刻意，因为我们不太可能使用硬编码的查询，特别是那种过滤 **description**\
  \ 字段以“blue”开头的条目的查询，但它仅用于演示目的。虽然这个查询可能具有合理的性能（因为我们可以依赖数据库索引快速找到以特定单词精确匹配开头的描述），但如果我们试图查找\
  \ **description** 中包含特定单词或短语的 **ArtEntities**，我们将开始承受更显著的性能损失。这种搜索操作通常需要索引扫描或表扫描，这会给数据库带来负担。\n\
  \n此外，我们仍然没有确定特定匹配项相关性的策略。如果五个 **description** 字段都包含单词 *blue*，我们如何确定哪个匹配项更相关？我们可以假设某个特定描述中单词\
  \ *blue* 出现的次数越多，其相关性就越高。然而，仅使用 Hibernate 来实现这个解决方案可能需要大量额外的编码，而且我们仍然勉强满足了用户搜索需求的基本期望。\n\
  \n如果我们想支持模糊匹配或处理同义词呢？\n\n仅使用 Hibernate 来解决搜索需求的根本问题在于，关系型数据库并非为提供此类功能而设计。然而，这正是\
  \ Apache Lucene——一个强大的开源 Java 搜索框架——所要解决的问题。\n\n---\n\n**Lucene 简介**\n\nLucene 是一个高性能、功能齐全的信息检索（IR）库，提供了用于索引和搜索操作的全面\
  \ API。索引是搜索引擎和数据库都使用的一种策略，旨在让内容能够被尽可能高效地找到。Lucene 索引与本书的索引并无太大区别。它提供了一种逻辑且系统的方式来定位和访问特定数据。\n\
  \n**使用 Lucene 进行索引**\n\nLucene 索引 API 的核心是 **Document** 类。类似于数据库表的概念，一个 **Document**\
  \ 由多个 **Field** 组成，每个 **Field** 包含从原始内容中提取的、旨在被索引的文本数据。与数据库不同，Lucene 文档是反规范化的。没有“连接”的概念，因为数据关系并不代表信息检索。相反，您可以将**文档**视为容器——一种组织内容以便日后能有效搜索的手段。\n\
  \nLucene **Document** 中的每个 **Field** 通常代表您希望搜索的内容的特定组成部分。例如，如果您想为您的个人音乐库建立索引，您可能会定义一个文档，其中包含音频曲目、曲目所属专辑、曲目艺术家、曲目文件名、您对曲目的注释、专辑发行日期等字段。为了辅助索引过程，Lucene\
  \ 提供了一组 **Analyzer**。**Analyzer** 有助于分解和过滤每个特定字段的内容，提取出标记流。例如，由于您对某张专辑的注释可能包含几段文本，因此您需要将这些内容分解成单词。然后，您可能希望将这些单词分解为词根，这样即使某条注释实际包含的是单词\
  \ *listens* 或 *listening*，您也能通过搜索单词 *listen* 来找到该注释。这个过程称为*词干提取*，有助于将单词分解为其根形式。分析器还可能过滤掉多余的内容，例如移除*停用词*，如\
  \ *the* 和 *a*。\n\n分析器提取的单个标记称为*词项*。词项是构成 **Index** 的基本元素，因此也是搜索查询的主要组成部分。\n\nLucene\
  \ 使用倒排索引来优化内容的查找方式。倒排索引使用索引过程中分析器步骤提取的标记作为特定内容的查找键。这种方法更有利于搜索，因为查找的重点放在了用户可能想要搜索的单个词项或单词上，而不是内容本身。\n\
  \n\n\n此外，Lucene 能够追踪特定词元的频率、它与其他词元的相对位置，以及它在原始内容中的偏移量。这些元数据对于众多搜索功能来说极具价值。\n\n第\
  \ 10 章 ■ 集成框架\n\nLucene 提供了一系列选项，用于自定义特定字段的索引方式。例如，某些字段可能更适合进行分词处理，而另一些字段则应保留其原始内容。在音乐库示例中，你可能希望对\
  \ **notes** 字段进行分词，因为你希望能够搜索笔记中包含的特定单词或短语。\n\n然而，你不会希望对曲目的文件名进行分词，因为该数据只有作为一个完整、未经修改的单元才有意义。\n\
  \nLucene 还允许你指定是否存储特定字段的原始内容。例如，虽然你可能不想对曲目的文件名进行分词，但你肯定希望存储这些数据。这样，当某个特定文档作为搜索结果列表的一部分返回时，你可以直接访问文件名，以便应用程序能够处理这些数据（例如，播放曲目或在文件系统中定位它）。\n\
  \n使用 Lucene 进行查询\n\nLucene 包含一个强大的查询 API，提供了一种灵活的方式来指定要搜索的字段和词条，并能够定义布尔表达式和分组表达式。\n\
  \n最简单的 Lucene 查询可能如下所示：\n\n**cupcake**\n\n这将在默认字段上搜索词条 *cupcake*。默认字段通常在 **QueryParser**\
  \ 中指定，**QueryParser** 是一个 Lucene 类，用于将用户定义的查询表达式解析为 **Query** 实例。\n\n更常见的情况是，Lucene\
  \ 查询会针对一个或多个字段，例如以下示例：**notes:cupcake AND album:Pepper**\n\n这将返回所有在 **notes** 字段中包含单词\
  \ *cupcake* 且在 **album** 字段中包含单词 *Pepper* 的文档。也可以将查询定义为如下形式：\n\n**+notes:cupcake\
  \ +album:Pepper**\n\n如你所见，你可以使用 `+` 前缀或 **AND** 关键字来定义布尔 **AND** 表达式。在 Lucene 中，布尔\
  \ **OR** 是默认操作，因此你可以简单地将多个表达式放在一起：**notes:cupcake album:Pepper**\n\n或者，你也可以显式地包含\
  \ **OR** 关键字：\n\n**notes:cupcake OR album:Pepper**\n\n如果你想确保搜索结果不包含某个特定词条，可以在其前面加上减号（**-**）字符。例如，如果你想确保搜索结果中不包含任何由披头士乐队演奏的曲目，可以使用以下查询：\n\
  \n**notes:cupcake AND album:Pepper –artist:”The Beatles”**\n\n此查询将查找包含单词 *cupcake*\
  \ 的笔记和包含单词 *Pepper* 的专辑，但曲目艺术家不能是 The Beatles。注意“The Beatles”两边的引号，它表示 **artist**\
  \ 字段必须匹配整个短语。因此，如果艺术家名称仅指定为 Beatles，你的搜索结果中仍可能出现披头士的曲目。为了防止这种情况，你可以直接使用 **Beatles**，不带引号。\n\
  \n但是，如果你希望确保库中曲目上拼写错误的艺术家归属不会影响你的搜索意图，该怎么办？为了解决这个问题，你可以使用波浪号（**~**）字符，它让 Lucene\
  \ 知道你想要允许模糊匹配：\n\n**(track:”Fixing a Hole” OR track:”Hey Jude”) AND artist:Beatles~**\n\
  \n此查询表达了你在 **artist** 字段上进行模糊搜索的意图。现在，即使库中的艺术家归属拼写为“Beetles”，它也很可能包含在你的搜索结果中。还要注意使用括号对查询的第一部分进行分组。这种分组指定了查询应返回匹配任一标题的曲目，前提是它们都由艺术家\
  \ Beatles 创作。\n\n如果你想确保结果只包含在特定日期范围内发布的曲目，可以利用 Lucene 的日期范围查询功能：\n\n**artist:Rol*\
  \ AND releaseDate:[5/18/1975 TO 5/18/2010]**\n\n此查询将查找任何发布日期在 1975 年 5 月 18 日到 2010\
  \ 年 5 月 18 日之间的曲目，只要艺术家名称以 *Rol* 开头。通配符修饰符（*****）表示你想要匹配具有指定前缀的艺术家。\n\n前面的查询示例应该让你对\
  \ Lucene 查询表达式的一些可能性有所了解。你很快就会学到如何将这些表达式解析为 Lucene **Query**。当然，也可以以编程方式定义查询，这样做通常能提供更大的灵活性。然而，使用这些示例中展示的一些约定来定义表达式，可以使你的设计更加清晰。\n\
  \nHibernate Search 简介\n\nHibernate Search 是一个扩展 Hibernate 的框架，旨在提供与 Apache Lucene\
  \ 的无缝集成。开发者可以直接将 Lucene 集成到他们的应用程序中。\n\n然而，如果你的目标是为领域类中的数据建立索引，那么要使这种集成可靠地工作，使得对领域模型所做的更改自动反映在索引中，并非易事。此外，在\
  \ Hibernate 操作的上下文中更新 Lucene 索引也很重要。\n\n例如，假设一个领域类作为 DAO 方法的一部分被更新，并且在此方法中，调用了 Lucene\
  \ 来触发对 Lucene 索引的更新。虽然这种设置可能有效，但如果领域类更新是在事务上下文中进行的，而事务突然回滚了，会发生什么？很可能，数据库和 Lucene\
  \ 索引会失去同步。\n\nHibernate Search 试图解决这类问题，它提供了一种实现，将 Lucene 集成到 Hibernate 的生命周期中，并尊重事务边界，以确保各自的资源保持同步。\n\
  \n第 10 章 ■ 集成框架\n\n集成 Hibernate Search\n\n让我们考虑一下图片库应用程序的搜索需求。用户可能希望能够通过标题、作者、名称或描述来查找图片，并可能按类别或标签过滤结果。我们还希望按相关性显示结果，而不仅仅是按字母顺序或日期排序。相关性的构成是搜索功能的一个重要关注点，因为最终，搜索的成功取决于用户能够多快地找到他们想要的东西。\n\
  \n要开始将 Hibernate Search 集成到我们的艺术画廊应用程序中，我们必须首先更新 Maven **pom.xml** 以包含必要的依赖项。这可以通过将以下代码片段添加到我们的\
  \ **pom.xml** 中轻松完成：\n\n**<!--Hibernate Search-->**\n\n**<dependency>**\n\n**<groupId>org.hibernate</groupId>**\n\
  \n**<artifactId>hibernate-search</artifactId>**\n\n**<version>3.2.1.Final</version>**\n\
  \n**</dependency>**\n\nHibernate Search 期望一些关键的配置属性来定义一些基本默认值，例如 Lucene 索引的位置。这些属性可以在\
  \ **persistence.xml** 文件中指定。以下是为启动我们的 Hibernate Search 集成而需要设置的关键属性。重要的新属性以粗体显示。\n\
  \n**<?xml version=”1.0” encoding=”UTF-8” standalone=”no”?>**\n\n**<persistence**\n\
  \n****xsi:schemaLocation=\"http://java.sun.com/xml/ns/persistence**\n\n\n\n*****http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"\
  **\n\n**version=\"2.0\">**\n\n****<persistence-unit name=\"persistenceUnit\" transaction-type=\"\
  RESOURCE_LOCAL\">**\n\n**<provider>org.hibernate.ejb.HibernatePersistence</provider>**\n\
  \n**<properties>**\n\n**<property name=\"hibernate.dialect\" value=\"org.hibernate.dialect.H2Dialect\"\
  />**\n\n**<property name=\"hibernate.hbm2ddl.auto\" value=\"create\"/>**\n\n**<property\
  \ name=\"hibernate.cache.use_second_level_cache\" value=\"true\"/>**\n\n**<property\
  \ name=\"hibernate.cache.provider_class\"**\n\n**value=\"net.sf.ehcache.hibernate.SingletonEhCacheProvider\"\
  />**\n\n<property name=\"hibernate.search.default.directory_provider\"\n\nvalue=\"\
  org.hibernate.search.store.FSDirectoryProvider\"/>\n\n<property name=\"hibernate.search.default.indexBase\"\
  \ value=\"./lucene/indexes\"/>\n\n**<property name=\"hibernate.search.default.batch.merge_factor\"\
  \ value=\"10\"/>**\n\n****<property name=\"hibernate.search.default.batch.max_buffered_docs\"\
  \ value=\"10\"/>\n\n**</properties>**\n\n**</persistence-unit>**\n\n****</persistence>**\n\
  \n第 10 章 ■ 集成框架\n\n此配置为 Hibernate Search 提供了启动所需的一些关键细节，例如要使用的目录提供程序（一种 Lucene 配置，用于描述管理和存储索引的策略）以及索引的位置。\n\
  \n添加 Hibernate Search 注解\n\n完成配置后，我们需要设计 Lucene 索引，指定 Lucene 文档中的字段，并定义这些字段如何映射到每个领域类中的属性。Hibernate\
  \ Search 在这方面非常灵活，允许你微调每个字段的需求。然而，遵循“约定优于配置”的原则，该框架包含了合理的默认值，因此你只需处理特殊需求即可。\n\n\
  默认情况下，每个被索引的领域类都会映射到自己的索引。每个领域类属性都会映射到同名的 Lucene 字段，除非你选择覆盖此默认设置。也可以为某个特定的领域类属性定义多个字段，如果需要对同一领域类属性使用多种索引策略，这会非常有用。例如，你可能希望有一个字段不进行分词，但以原始形式存储内容，而另一个字段则对内容进行分词。\n\
  \n为了将领域类属性映射到 Lucene 索引，Hibernate Search 提供了一组专门的注解，这些注解补充了我们用于定义 Hibernate 映射的\
  \ JPA 注解。让我们看看 **ArtEntity** 领域类，并添加 Hibernate Search 注解来建立 Lucene 映射：\n\n**@Entity**\n\
  \n**@Indexed**\n\n**@Cache(usage = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)**\n\
