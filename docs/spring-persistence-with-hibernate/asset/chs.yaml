  \n**public String getDescription() {**\n\n**return description;**\n\n**}**\n\n****public\
  \ void setDescription(String description) {**\n\n**this.description = description;**\n\
  \n**}**\n\n****@Field(index = Index.TOKENIZED, store=Store.NO)**\n\n**public String\
  \ getCaption() {**\n\n**return caption;**\n\n**}**\n\n****public void setCaption(String\
  \ caption) {**\n\n**this.caption = caption;**\n\n**}**\n\n****public Boolean getGeneralViewable()\
  \ {**\n\n**return isGeneralViewable;**\n\n**}**\n\n****public void setGeneralViewable(Boolean\
  \ generalViewable) {**\n\n**isGeneralViewable = generalViewable;**\n\n**}**\n\n\
  ****public Boolean getPrivilegeViewable() {**\n\n**return isPrivilegeViewable;**\n\
  \n**}**\n\n****public void setPrivilegeViewable(Boolean privilegeViewable) {**\n\
  \n**isPrivilegeViewable = privilegeViewable;**\n\n**}**\n\n****@ContainedIn**\n\n\
  **@ManyToMany(mappedBy = \"artEntities\")**\n\n**public Set<Category> getCategories()\
  \ {**\n\n**return categories;**\n\n**}**\n\n****public void setCategories(Set<Category>\
  \ categories) {**\n\n**this.categories = categories;**\n\n**}**\n\n****@ContainedIn**\n\
  \n**@OneToMany(orphanRemoval = true, cascade = { javax.persistence.CascadeType.ALL\
  \ })**\n\n**@Cache(usage = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)**\n\n\
  第 10 章 ■ 集成框架\n\n**public Set<Comment> getComments() {**\n\n**return comments;**\n\
  \n**}**\n\n****public void setComments(Set<Comment> comments) {**\n\n**this.comments\
  \ = comments;**\n\n**}**\n\n****}**\n\n基于前面介绍的 Lucene 概念，Hibernate Search 的注解相当直观。\n\
  \n让我们逐一检查该类中添加的内容。\n\n首先，我们需要使用 **@Indexed** 注解来标记一个类，以便将其纳入索引考虑范围。接下来，Hibernate\
  \ Search 要求使用 **@DocumentId** 注解来标记领域类的标识符。Hibernate Search 使用文档 ID 来桥接 Lucene 和\
  \ Hibernate 两个世界。\n\n在每个索引中，Lucene 都会存储 Hibernate 实体的完整类名及其标识符。它们共同构成了在 Hibernate\
  \ Search 中进行查询的基础，并允许将 Lucene 查询返回的文档列表转换为活动 Hibernate 实体的列表。\n\n除非领域类的属性使用 **@Field**\
  \ 注解进行标记，否则它不会被索引。**@Field** 注解指定将特定的领域类属性包含在 Lucene 索引中。该注解接受几个参数，包括覆盖字段名称的能力。然而，最重要的是\
  \ **index** 和 **store** 属性。这些参数告诉 Lucene 如何配置该字段。\n\n如前所述，字段可以被分词，这将把特定属性的内容提取到一个令牌流中，利用特定的分析器来过滤掉多余的词、执行词干提取、插入同义词，并可能根据所使用的分析器执行一系列其他操作。字段也可以被存储，这意味着原始内容将被插入到\
  \ Lucene 索引中。存储字段会增加索引的大小，因此对于大块文本来说，这通常不是一个好主意。\n\n然而，包含可能需要由应用程序显示的数据的字段——例如标题、文件名或业务标识符——应标记为已存储。让我们看几个例子：\n\
  \n*   在我们的 **ArtEntity** 领域类中，我们指定了 **title** 属性为已存储且已分词：\n\n**@Field(index = Index.TOKENIZED,\
  \ store=Store.YES)**\n\n**@Boost(2.0f)**\n\n**public String getTitle() {**\n\n**return\
  \ title;**\n\n**}**\n\n*   我们指定了 **width** 属性为未分词，但仍被存储：\n\n**@Field(index = Index.UN_TOKENIZED,\
  \ store=Store.YES)**\n\n**public Integer getWidth() {**\n\n**return width;**\n\n\
  **}**\n\n第 10 章 ■ 集成框架\n\n*   我们将 **description** 属性设置为已分词但不存储：\n\n**@Field(index\
  \ = Index.TOKENIZED, store=Store.NO)**\n\n**public String getDescription() {**\n\
  \n**return description;**\n\n**}**\n\n你可能还注意到了 **@DateBridge** 注解的使用。由于 Lucene 通常只在其索引中管理文本，Hibernate\
  \ Search 包含了一种桥接策略，作为将非文本数据转换为 **String**（并可能再转换回来）的方法。Hibernate Search 将使用适当的内置桥接器来映射诸如整数和长整数之类的字段，但对于更复杂的数据类型，你可以利用自定义桥接器或使用框架提供的桥接器之一。例如，我们可以通过以下方式映射\
  \ **uploadedDate** 属性：\n\n**@Field(index = Index.UN_TOKENIZED, store=Store.YES)**\n\
  \n**@DateBridge(resolution = Resolution.MINUTE)**\n\n**public Date getUploadedDate()\
  \ {**\n\n**return uploadedDate;**\n\n**}**\n\n此映射参数化了 **@DateBridge**，以便将日期值转换为可以进行字典排序的文本。该日期以分钟为分辨率存储在\
  \ Lucene 索引中。出于性能原因，你通常希望使用应用程序能够支持的最大分辨率设置（例如，优先选择 **Minute** 分辨率而非 **Second**，或者更好的是，选择\
  \ **Day** 而非 **Minute** 或 **Hour**）。\n\n**@Boost** 注解可用于提升 Lucene 索引中特定字段的权重。例如，要使\
  \ **title** 字段的相关性是 **description** 字段的两倍，我们可以指定一个 **2.0** 的权重因子：\n\n**@Field(index\
  \ = Index.TOKENIZED, store=Store.YES)**\n\n**@Boost(2.0f)**\n\n**public String getTitle()\
  \ {**\n\n**return title;**\n\n**}**\n\n也可以在查询中指定权重因子，但在需要一致权重的情况下，**@Boost** 注解会派上用场。\n\
  \n\n\n正如我们之前提到的，Lucene 索引是反范式的，它不像典型的关系型数据库那样提供隐式关系的概念。为了将某些 Hibernate 关联映射转换到 Lucene\
  \ 的世界中，Hibernate Search 提供了 **@IndexEmbedded** 注解。\n\n**@IndexEmbedded** 告诉 Hibernate\
  \ Search 将特定的关联嵌入到所属类中。然而，由于 Lucene 本质上是反范式的，Hibernate Search 必须随时了解嵌入实体何时发生变化。为了帮助追踪这些变化，Hibernate\
  \ Search 提供了 **@ContainedIn** 注解，用于标记嵌入关联的另一端。\n\n现在你已经更清楚地了解了如何为索引注解领域类，让我们来审视索引和搜索的过程。\n\
  \n第 10 章 ■ 集成框架\n\n使 Lucene 与 Hibernate 保持同步\n\nHibernate Search 的主要优势之一是 Hibernate\
  \ 与 Lucene 之间无缝的集成。Hibernate Search 依赖 Hibernate 事件，当对领域模型进行持久化状态更改时，触发对 Lucene\
  \ 索引的相应更改。\n\n在第 4 章中，我们介绍了 JPA 生命周期。遵循 JPA 生命周期，Hibernate 提供了一个细粒度的事件模型，根据领域对象的持久化状态变化广播特定事件。\n\
  \n例如，当持久化一个领域类实例时，Hibernate 会传播相应的事件。\n\n类似地，Hibernate 会广播许多其他事件，例如删除和更新通知，提供了一种监听和响应领域模型变化的方法。事件监听器是一种有效的设计模式，用于以解耦的方式定义应用程序行为，而\
  \ Hibernate Search 能够通过这种强大的机制接入领域生命周期事件。\n\n如果你是从头开始构建应用程序，并且从一个空数据库开始，那么填充 Lucene\
  \ 索引的过程就很简单。当你的领域对象首次持久化到数据库时，例如通过 **entityManager.save(artEntity)**，Hibernate Search\
  \ 会捕获生命周期事件，并将指定的 **artEntity** 添加到 Lucene 索引中。默认情况下，每个领域类都有自己的索引，并且所有适当的属性都会根据\
  \ Hibernate Search 注解指定的规则添加到索引中。由于 Hibernate Search 负责保持数据库和 Lucene 索引同步，因此两个框架之间的集成直观且简单。\n\
  \n然而，在某些情况下，你可能需要更明确地索引领域对象。例如，如果你正在将 Hibernate Search 集成到现有应用程序中，或者使用遗留数据库，则需要找到一种方法将现有数据改造到\
  \ Lucene 索引中。\n\nHibernate Search 也提供了一种更直接的方式来索引领域模型。\n\nHibernate Search 提供了 Hibernate\
  \ 的 **EntityManager** 的扩展版本，通过搜索特定功能增强了这些核心框架类。增强版的 JPA **EntityManager** 是 **FullTextEntityManager**。访问这个支持搜索的\
  \ **EntityManager** 相当无缝：**import org.hibernate.search.jpa.Search;**\n\n****FullTextEntityManager\
  \ fullTextEntityManager =**\n\n**Search.getFullTextEntityManager(entityManager);**\n\
  \n下一步是执行索引。以下是显式索引单个实体的方法：**public void indexEntity(T object) {**\n\n**FullTextEntityManager\
  \ fullTextEntityManager =**\n\n**Search.getFullTextEntityManager(entityManager);**\n\
  \n**fullTextEntityManager.index(object);**\n\n**}**\n\n此方法旨在添加到你的 **GenericDaoJpa**\
  \ 类中，以便提供一种通用的方式来索引领域类。如果你想实现一种方法来索引当前存储在数据库中的特定类型的所有实体，你可以在 **GenericDaoJpa** 实现中定义以下方法：\n\
  \n**public void indexAllItems() {**\n\n**FullTextEntityManager fullTextEntityManager\
  \ =**\n\n**Search.getFullTextEntityManager(entityManager);**\n\n**List results =\
  \ fullTextEntityManager.createQuery(\"from \" +**\n\n**type.getCanonicalName()).getResultList();**\n\
  \n第 10 章 ■ 集成框架\n\n**int counter = 0, numItemsInGroup = 10;**\n\n**Iterator resultsIt\
  \ = results.iterator();**\n\n**while (resultsIt.hasNext()) {**\n\n**fullTextEntityManager.index(resultsIt.next());**\n\
  \n**if (counter++ % numItemsInGroup == 0) {**\n\n**fullTextEntityManager.flushToIndexes();**\n\
  \n**fullTextEntityManager.clear();**\n\n**}**\n\n**}**\n\n**}**\n\n在这个方法中，我们使用 **FullTextEntityManager**\
  \ 执行一个标准的 JPA 查询，该查询简单地列出参数化类型的所有实体。然后我们遍历结果，索引每个实体。但是，每进行十次索引调用，我们就调用 **fullTextEntityManager.flushToIndexes()**。这会将排队的更改刷新到\
  \ Lucene 索引，而无需等待达到 Hibernate Search 的批处理阈值。接下来，我们调用 **fullTextEntityManager.clear()**，它会清除\
  \ JPA 的 **persistenceContext**。这并非总是必需的，但如果你正在遍历大型数据集，则需要尽可能减少内存占用。\n\n构建领域特定搜索\n\
  \n现在，让我们将本章涵盖的所有概念整合起来，提供一个基本的搜索功能，允许最终用户使用指定的搜索词跨多个 **ArtEntity** 字段进行搜索。以下是实现此功能的一个示例：\n\
  \n**public List<ArtEntity> searchForArtEntitiesByTerms(String searchTerms,**\n\n\
  ****Integer startIndex,**\n\n****Integer maxResults) {**\n\n****FullTextEntityManager\
  \ fullTextEntityManager =**\n\n**Search.getFullTextEntityManager(entityManager);**\n\
  \n**String[] fieldsToMatch = new String[] {\"title\", \"subTitle\", \"media\", \"\
  description\",**\n\n**\"caption\"};**\n\n**QueryParser parser = new MultiFieldQueryParser(Version.LUCENE_29,\
  \ fieldsToMatch,**\n\n****new StandardAnalyzer(Version.LUCENE_29));**\n\n****org.apache.lucene.search.Query\
  \ luceneQuery = null;**\n\n**try {**\n\n**luceneQuery = parser.parse(searchTerms);**\n\
  \n**} catch (ParseException e) {**\n\n**log.error(\"Error parsing lucene query:\
  \ \" + searchTerms);**\n\n**}**\n\n****Query jpaQuery = fullTextEntityManager.createFullTextQuery(luceneQuery,**\
  \ **ArtEntity.class);**\n\n**if (startIndex != null && maxResults != null) {**\n\
  \n**jpaQuery.setFirstResult(startIndex);**\n\n第 10 章 ■ 集成框架\n\n**jpaQuery.setMaxResults(maxResults);**\n\
  \n**}**\n\n**List<ArtEntity> artEntities = jpaQuery.getResultList();**\n\n****return\
  \ artEntities;**\n\n****}**\n\n为了跨 **ArtEntity** 的 **title**、**subtitle**、**media**、**description**\
  \ 和 **caption** 字段进行搜索，我们使用了一个名为 **MultiFieldQueryParser** 的特殊 Lucene 查询解析器。此查询解析器接收一个字段名称数组，以便用户指定的所有搜索词可以同等地应用于每个字段。换句话说，以这种方式使用\
  \ **MultiFieldQueryParser** 等同于以下 Lucene 查询，假设用户搜索了“test”：\n\n**title: test OR subtitle:\
  \ test OR media: test OR description:test OR caption:test** 在使用 **MultiFieldQueryParser**\
  \ 和指定的 **searchTerms** 解析 Lucene 查询后，我们在 **fullTextEntityManager** 引用上调用 **createFullTextQuery**\
  \ 方法。此方法返回一个标准的 **javax.persistence.Query** 实例，我们可以像使用任何 JPA 查询一样使用它。我们使用 **setFirstResult**\
  \ 和 **setMaxResults** 限制结果集（如果指定了这些参数），然后调用 **getResultList()** 返回一个 **ArtEntity**\
  \ 实例的 **List**。\n\n\n\n这里一个非常有趣的细节是，尽管我们调用了 Lucene 查询，但我们实际上是在 JPA 层面操作实体。这意味着我们无需担心如何关联\
  \ Lucene 查询结果来加载一系列 JPA 实体。Hibernate Search 为我们处理了这些细节，它在 Lucene 之上提供了一个非常强大的抽象层，模拟出一个完全以\
  \ Hibernate 或 JPA 为中心的世界。\n\n总结\n\n在本章中，我们演示了如何集成和扩展 Hibernate，以实现更高级的应用程序功能。我们讨论了在基于\
  \ Hibernate 的应用上暴露 RESTful Web 服务时面临的一些挑战，以及如何简化序列化或编组策略。我们研究了 Spring 3 的新 MVC 功能，以及它用于提供对象到\
  \ XML 编组的 OXM 抽象。\n\n我们还讨论了 DTO 模式，以及该策略如何降低序列化领域模型的复杂性。然而，将领域类转换为 DTO 类（以及反向转换）可能会成为缺陷和维护问题的来源。一种解决方案是使用像\
  \ Dozer 这样的框架。Dozer 通过约定优于配置和映射配置文件，处理两个不同类之间的映射。通过将这些转换细节抽象到专门的框架中，DTO 映射层固有的复杂性得到了显著降低。\n\
  \n提供全文搜索功能是许多应用程序中非常重要且常见的需求。Lucene 是一个开源的 Java 框架，提供了强大的索引和搜索能力，但将其集成到应用程序中可能很困难，通常需要编写大量胶水代码来同步领域模型与\
  \ Lucene 索引的变更。Hibernate Search 是一个桥接这两个优秀框架的桥梁，它增强了关键的 Hibernate 框架类，以提供 Lucene\
  \ 查询和索引能力。Hibernate Search 允许开发者在 Hibernate 的领域内执行 Lucene 查询，从而使搜索结果返回标准的 Hibernate\
  \ 实体。\n\n第 10 章 ■ 集成框架\n\nSpring 和 Hibernate 是令人惊叹的开源框架。然而，在这些工具的基础上进行构建是成功应用开发的关键。学习将持久层与其他框架集成的最佳实践，与学习持久化框架本身同样重要。\n\
  \n**第 11 章**\n\n■ ■ ■\n\n**GORM 与 Grails**\n\nGORM 是 Spring、Hibernate 和 Groovy 协同组合的最终产物。作为\
  \ Grails（一个受 Ruby on Rails 启发的快速开发 Web 框架）的核心组件之一，GORM 是一种不同类型的 ORM 层，它利用 Groovy\
  \ 语言的动态能力来简化应用程序领域模型的查询和持久化。\n\nGORM 的基础与 Ruby on Rails 成功的策略相同：*约定优于配置*。GORM 极大地简化了定义应用程序持久化逻辑所需的编码和工作量。使用\
  \ GORM 和 Grails，无需定义 DAO 层。相反，它采用了*Active Record* 设计模式，将持久化功能整合到领域类本身中，而无需预先开发来添加这些功能。这看起来可能有点神奇，但本章将通过深入探讨\
  \ Groovy 的动态特性，帮助你理解 GORM 在底层是如何工作的。\n\n尽管 GORM 是 Grails Web 框架内的核心持久化组件，但它也可以在\
  \ Grails 之外使用。通过将 GORM 嵌入到 Spring 应用程序中，你可以在更标准的架构中受益于 Grails 的高效和简洁。\n\n■ **注意**\
  \ 有些人可能会认为 Grails 并不完全适合一本关于 Spring 和 Hibernate 的书。然而，Grails 框架和 GORM 在很大程度上依赖 Spring\
  \ 和 Hibernate 来提供它们大部分的灵活性和持久化能力。这种合作带来的好处是 Spring 和 Hibernate 所提供的长寿性、企业级强度、高效性和灵活性。此外，Spring\
  \ 框架背后的公司 SpringSource 最近收购了 G2One（Grails 和 Groovy 大部分开发工作背后的公司），这清楚地表明了 Spring\
  \ 和 Grails 的一致性和投入。\n\nGroovy 速成课程\n\nGrails 和 GORM 的出现，源于 Ruby on Rails 框架成功所带来的关注。Ruby\
  \ on Rails 将“约定优于配置”和“不要重复自己（DRY）”的准则提升到了一个新的高度，极大地简化了创建新 Web 应用所需的工作。Ruby on Rails\
  \ 的成功部分源于 Ruby 是一种动态语言，它带来了在 Java 世界中不易实现的灵活性。例如，在运行时动态生成新行为，以提供针对领域模型特定属性定制的持久化和查询功能，这在\
  \ Java 中很难复制，因为该语言本身不支持方法的动态创建。幸运的是，Groovy 的出现为 Java 世界带来了这种灵活性。\n\nGrails 持久化与本书中讨论的其他方法最根本的区别在于，Grails\
  \ 是唯一不使用 Java 的策略。然而，Groovy 代码运行在 JVM 中，因此与 Java 代码在字节码层面兼容。这也意味着 Groovy 可以使用 Java\
  \ 库，使得这个新语言能够访问海量的开源 Java 库。\n\nGroovy 是一种动态语言，这意味着它在语法和使用方式上与 Java 存在一些显著差异。在这里，我们将对\
  \ Groovy 进行简要介绍，以帮助 Java 开发者理解这两种语言之间的一些核心差异。\n\nGroovy 的基本特性之一是其能够在运行时动态添加或修改行为。作为一个简短的示例，假设我们想在运行时向我们的\
  \ **Person** 实例添加一个名为 **sayHello()** 的新方法。这可以通过以下方式实现：\n\n**Person.metaClass.sayHello\
  \ = {**\n\n**println(\"Hello\")**\n\n**}**\n\n或者我们可以将其变成一个接受单个参数的静态方法：\n\n**Person.metaClass.static.sayHello\
  \ = {def name ->**\n\n**println(\"hello ${name}\")**\n\n**}**\n\n在 Groovy 中，每个类都持有一个对应\
  \ **metaClass** 实例的引用。对特定类或实例的方法调用会被委托给该类的 **metaClass**，然后 **metaClass** 会调用一个名为\
  \ **invokeMethod** 的方法，并传入要调用的方法名称和任何相应的参数。因此，你可以将 **metaClass** 视为一种中介或代理，使得类的更多行为可以在运行时确定。\n\
  \n通过在特定类的 **metaClass** 上定义一个新属性，我们实际上是在运行时实现了新的行为。一旦我们将 **sayHello** 属性定义为引用一个闭包块，未来对\
  \ **Person.sayHello()** 的调用最终将被委托给我们闭包块中指定的功能。\n\n■ **注意** 对于给定的方法、构造函数或属性，Groovy\
  \ 编译器实际上会生成对 **MetaClass.invokeMethod()** 的调用，并传入对象、方法名称和相应的参数。然后，Groovy 对象的 **metaClass**\
  \ 可以在运行时决定调用哪个代码。\n\n\n\n但什么是闭包？闭包是一段可赋值的代码块，功能类似于 Java 中的匿名内部类。尽管闭包的使用场景常与方法类似，但一个关键区别在于闭包可以赋值给变量，甚至被传递。稍后我们将更详细地讨论闭包。\n\
  \n第 11 章 ■ GORM 与 GRAILS\n\n释放你的类型\n\nGroovy 的变量和引用无需静态类型。例如，你可以通过以下方式定义一个变量：\n\n\
  **def myName = \"Sam\"**\n\n变量 **myName** 可以包含一个 **String**，也可以稍后更改为 **int**。**def**\
  \ 用于定义变量或属性，而不指定具体类型。这类似于在 Java 中使用 **Object** 类型，但使用 **def** 的重点在于类型并不重要，并且可能在不同上下文中发生变化。\n\
  \nGString——增强版字符串\n\nGroovy 支持一种称为 *GString* 的概念，它本质上是一个增强版的 Java **String**。在前面的例子中，请注意我们能够通过编写\
  \ **\"hello ${name}\"** 来创建一个动态的 **String**。这种策略将变量直接集成到 **String** 中，无需进行拼接。你甚至可以在\
  \ **${}** 块内直接调用方法。\n\nGroovy 中的默认构造函数\n\n另一个关键概念是，Groovy 类只需一个默认构造函数即可接受命名参数。\n\
  \n例如，你可以使用以下方法实例化一个 Groovy 类：**Class GroovyBean {**\n\n**String name**\n\n**String\
  \ favoriteColor**\n\n**}**\n\n**def myBean = new GroovyBean([name: 'Joe', color:\
  \ 'blue']);**\n\n在前面的例子中有几个重要的细节。首先，请注意我们定义了一个 Groovy bean，却没有实际定义相应的 getter 和 setter（也没有使用任何分号！）。\n\
  \nGroovy 在运行时为我们隐式地定义了这些。我们可以通过 **myBean.getName()** 来引用 **myBean** 实例的 **name**\
  \ 属性，但 **myBean.name** 更为简洁。\n\n还要注意我们用于传入 bean 属性的 **java.util.Map** 的快捷方式。Map\
  \ 可以使用以下语法定义：**[key: value]**。一个常见的惯用法是将空 map 定义为 **[:]**。\n\n类似地，**java.util.List**\
  \ 可以使用 **[]** 表示法定义。\n\nGroovy 中的闭包\n\nGroovy 最显著的特性之一是其对闭包的出色支持。*闭包* 类似于方法，但也可以被变量引用或作为参数传递给方法。例如，你可以使用以下代码创建一个闭包并将其存储在名为\
  \ **myClosure** 的变量中：**def myClosure = {def param ->**\n\n**println(\"The param\
  \ is ${param}\")**\n\n**}**\n\n第 11 章 ■ GORM 与 GRAILS\n\n请注意，闭包参数出现在第一个花括号之后，后面跟着\
  \ **->**。\n\n闭包可用于极大地简化代码。例如，你可以通过以下方式在 Groovy 中遍历一个列表：\n\n**List myList = [\"a\"\
  ,\"b\",\"c\"]**\n\n**myList.each {curItem ->**\n\n**println(curItem);**\n\n**}**\n\
  \n这个闭包将被传递给 **each** 方法，用于列表中的每个元素。将此方法与使用 Java **Iterator** 的方法进行对比：\n\n**List\
  \ myList<String> = new java.util.ArrayList();**\n\n**myList.add(\"a\"); myList.add(\"\
  b\"); myList.add(\"c\");** **Iterator<String> myIterator = myList.iterator();**\n\
  \n**while (myIterator.hasNext()) {**\n\n**String curItem = myIterator.next();**\n\
  \n**System.out.print(curItem);**\n\n**}**\n\n这已经很令人印象深刻了，但还有更好的。假设我们想要遍历一个 **String**\
  \ 列表，只返回那些包含序列 *cat* 的项。在 Groovy 中，这可以非常简单实现：\n\n**def stringList = [\"I like dogs\"\
  ,**\n\n**\"I like cats\", \"I like to scat sing\",**\n\n**\"What is a category\"\
  , \"I have gas\"]**\n\n**def matchingStrings = stringList.findAll {curString ->**\n\
  \n**curString.contains(\"cat\")**\n\n**}**\n\n调用闭包的方式与调用方法类似。你只需引用闭包属性，后面跟上 **()**。你也可以通过引用闭包并调用\
  \ **call()** 来显式调用闭包。\n\n现在我们已经介绍了一些基本的 Groovy 概念，让我们继续构建我们的 Grails 持久化层。\n\n■ **注意**\
  \ 关于 Groovy 还有很多需要学习。我们推荐你查阅 Christopher M. Judd、Joseph Faisal Nusairat 和 Jim Shingler\
  \ 合著的 *Beginning Groovy and Grails*（Apress，2008 年）。\n\n第 11 章 ■ GORM 与 GRAILS\n\n\
  让 Grails 运行起来\n\nGrails 的持久化解决方案与我们迄今为止在本书中探讨的其他基于 DAO 的持久化解决方案截然不同，以至于我们无法有效地在我们现有的应用程序代码库（我们之前一直能够使用的代码库）基础上进行构建。相反，我们需要从头开始，使用\
  \ Grails 方法来架构我们的画廊应用程序。这起初可能看起来是一项艰巨的任务，但 Grails 附带了许多快捷模板和脚本，旨在为你生成代码桩。\n\n在 Grails\
  \ 术语中，这种桩代码被称为*脚手架*。\n\n安装 Grails\n\n第一步是安装 Grails。前往 **http://www.grails.org**，下载最新版本。\n\
  \n解压下载的归档文件，并将所有内容复制到硬盘上的一个合理位置。接下来，确保 **bin** 目录下的所有内容都是可执行的。如果你使用的是基于 Unix 的操作系统，可以在\
  \ **bin** 目录内运行 **chmod ug+x ./***。\n\n最后，确保设置了 **GRAILS_HOME** 环境变量。**GRAILS_HOME**\
  \ 应指向你安装 Grails 的位置。同时，确保已将 **GRAILS_HOME/bin** 目录添加到你的 **PATH** 中，这样你每次调用 Grails\
  \ 脚本时就不需要指定 Grails 可执行文件的完整路径了。\n\n如果你使用的是基于 Unix 的操作系统，我们建议更新你主目录中的 **~/.bashrc**\
  \ 脚本，这样你就不需要多次进行此配置。在 Mac 上，你可以将以下行追加到你的 **~/.bashrc** 中：\n\n**export GRAILS_HOME=/opt/local/share/java/grails/**\n\
  \n**export PATH=$PATH:$GRAILS_HOME/bin**\n\n安装好 Grails 后，下一步是创建我们的画廊应用程序。\n\n创建\
  \ Grails 应用程序\n\nGrails 附带了用于生成样板代码以启动应用程序的脚本。我们将介绍的第一个脚本是 **create-app**：\n\n**grails\
  \ create-app grailsGallery**\n\n这里，我们将 **grailsGallery** 作为唯一参数传入。Grails 会运行几秒钟，然后瞧！\n\
  \n你现在有了一个新的 Grails 应用程序，已经设置好并可以运行了。\n\n约定优于配置概念的一部分是以标准化的方式组织和命名应用程序的关键部分。**create-app**\
  \ 脚本通过为你设置 Grails 目录结构使这变得容易。**create-app** 脚本完成后，你将得到以下目录结构：\n\n**gallery ->**\n\
  \n**grails-app**\n\n**conf**\n\n**spring**\n\n**resources.groovy**\n\n**Bootstrap.groovy**\n\
  \n第 11 章 ■ GORM 与 GRAILS\n\n**Datasource.groovy**\n\n**Urlmappings.groovy**\n\n\
  **controllers**\n\n**domain**\n\n**i18n**\n\n**services**\n\n**taglib**\n\n**utils**\n\
  \n**views**\n\n****scripts**\n\n**src**\n\n**java**\n\n**groovy**\n\n**test**\n\n\
  **integration**\n\n**unit**\n\n**web-app**\n\n**css**\n\n**js**\n\n**images**\n\n\
  **WEB-INF**\n\n**index.gsp**\n\n我们大部分的编码工作将集中在 **grails-app** 目录上，我们的大部分 Groovy\
  \ 代码都将存放在这里。在我们开始动手之前，让我们简要地浏览一下 Grails 应用程序的布局。\n\n\n\n毫不意外，**grails-app/conf**\
  \ 目录存放着应用程序的配置。Grails 在设计上本质上是高度模块化的，因此并不总是需要显式配置每一个依赖项。然而，由于 Grails 的核心实际上是一个 Spring\
  \ 应用程序，**grails-app/conf/spring/resources.groovy** 文件可用于配置你的依赖项。尽管这是一个 Spring 配置文件，但你会注意到它并非\
  \ XML 格式。Grails 提供了一种自定义领域特定语言（DSL）来配置你的 Spring Bean，并且由于这个文件本质上是可执行的 Groovy 代码，它比标准的基于\
  \ XML 的配置要灵活得多。\n\n■ **注意** Groovy 默认的应用程序配置方法使用 **resources.groovy** 文件。你也可以创建一个\
  \ **resources.xml** 文件，从而使用更标准的基于 XML 的 Spring 配置。\n\n使用 Spring DSL 相当直接。举个例子，假设我们想创建一个电子邮件服务，以便在向图库添加新图片时通过电子邮件通知最终用户。我们希望在\
  \ **resources.groovy** 文件中配置 Spring 的电子邮件组件，以便用户能够从我们的应用程序内部发送电子邮件。以下是该配置可能的样子：\n\
  \n**beans = {**\n\n**javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl)\
  \ {**\n\n**host = 'smtp.prospringhibernate.com'**\n\n**}**\n\n**}**\n\n这种模式相当直观。首先定义\
  \ Bean 名称，后面括号内是类名。然后，Bean 内部的属性在闭包块（即花括号 **{}** 内的代码部分）中进行配置。\n\n如果我们想将 **javaMailSender**\
  \ Bean 注入到 Grails 服务或控制器中，只需在相应的 Grails 服务或控制器类中声明一个名为 **javaMailSender** 的属性，就可以简单地依赖默认的按名称自动装配：\n\
  \n**class EmailService {**\n\n**def javaMailSender**\n\n**}**\n\n类似地，如果我们想在 **resources.groovy**\
  \ 文件中配置的另一个 Bean 中引用 Grails 的 **EmailService**，我们使用其隐式 Bean 名称——在本例中为 **emailService**。例如，我们可以在\
  \ **resources.groovy** 文件中定义一个 **NotificationComponent** Bean，如下所示：\n\n**beans =\
  \ {**\n\n**notificationComponent(com.prospringhibernate.NotificationComponent) {bean\
  \ ->** **emailService = ref(\"emailService\")**\n\n**bean.factoryMethod = \"getInstance\"\
  **\n\n**bean.singleton = \"false\"**\n\n**defaultNotificationMethods = [\"email\"\
  , \"sms\"]**\n\n**}**\n\n**}**\n\n请注意，我们在块的开头使用 **bean ->** 声明了一个 Bean 参数。通过声明 Bean\
  \ 参数，我们能够指定与所配置 Bean 类型相关的更详细的信息。在本例中，我们指定了 **factoryMethod** 为 **getInstance**，这确保了通过调用\
  \ **getInstance()** 来实例化该 Bean 的新实例。我们还指定了这不是一个单例 Bean。\n\n还要注意，我们通过使用约定 **ref(\"\
  \ *BEANNAME*\")** 注入了对 **EmailService** 的引用，其中 ***BEANNAME*** 是我们的 **EmailService**\
  \ Bean 的名称。我们可以将大部分 Spring 配置知识应用于这个基于 Groovy 的 DSL。然而，请注意以下示例中相对于 XML 的灵活性优势：\n\
  \n**beans = {**\n\n**javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl)\
  \ {**\n\n**if (Environment.getCurrent() == \"production\") {**\n\n**host = \"smtp.prospringhibernate.com\"\
  **\n\n**} else {**\n\n**host = \"smtp.dev.prospringhibernate.com\"**\n\n**}**\n\n\
  **}**\n\n**}**\n\n显然，可解释的代码相比静态 XML 有其优势。\n\n本概述仅涉及 Grails 的部分配置选项。还可以配置动态 Bean\
  \ 名称，以及指定属性占位符和覆盖配置。\n\n■ **注意** **grails-app/conf/Bootstrap.groovy** 文件提供了简单的钩子（**init()**\
  \ 和 **destroy()**）来处理应用程序的启动和关闭事件。在开发期间，**Bootstrap.groovy** 是使用默认数据填充应用程序数据库的有效方法。\n\
  \n配置你的应用程序\n\n**grails-app/conf/Config.groovy** 文件是指定 Grails 应用程序关键配置细节的集中位置。该文件包含有关应用程序应使用的字符编码以及日志记录详细信息（使用\
  \ log4j）的信息。\n\nGrails 利用环境的内在概念来促进不同开发和部署场景的创建与分离。例如，对于开发或测试，你可能需要使用与生产部署不同的数据库（需要不同的配置细节）。这些概念内置于\
  \ Grails 核心中，使得使用开发数据库进行测试，然后将应用程序部署到生产环境以使用实际数据库变得容易，而无需记住交换配置。环境特定的详细信息存在于几个关键的配置文件中。\n\
  \n**Config.groovy** 文件包含一段初始代码，用于指定生产环境的默认服务器 URL：\n\n**environments {**\n\n**production\
  \ {**\n\n**grails.serverURL = \"http://www.changeme.com\"**\n\n**}**\n\n**}**\n\n\
  如果你想为开发环境指定不同的 URL，可以相应地修改配置片段：\n\n**environments {**\n\n**production {**\n\n**grails.serverURL\
  \ = \"http://www.prospringhibernate.com\"\"**\n\n**}**\n\n**development {**\n\n\
  **grails.serverURL = \"http://www.prospringhibernate.com\"**\n\n**}**\n\n**}**\n\
  \n对于应用程序定义或使用的环境类型没有限制。你可以根据需要添加任意数量的环境。这对于你组织的开发流程、构建周期或测试策略来说可能会派上用场。\n\n配置你的数据源\n\
  \n由于大多数 Web 应用程序都需要数据库，Grails 专门定义了一个文件用于配置数据源相关的详细信息：**grails-app/conf/DataSource.groovy**。该文件也使用自定义的基于\
  \ Groovy 的 DSL，使得配置清晰简洁。环境概念也内置于此文件中。如果属性适用于所有环境，则可以在全局级别进行配置。然而，特定于环境的配置应嵌套在相应的环境块内。\n\
  \n以我们的图库应用程序为例，**DataSource.groovy** 文件可能如下所示（请记住，该文件的大部分内容已经为你创建，因此你只需要配置特定于应用程序的详细信息）：\n\
  \n**dataSource {**\n\n**pooled = true**\n\n**driverClassName = \"org.hsqldb.jdbcDriver\"\
  **\n\n**username = \"sa\"**\n\n**password = \"\"**\n\n**}**\n\n**hibernate {**\n\
  \n**cache.use_second_level_cache = true**\n\n**cache.use_query_cache = true**\n\n\
  **cache.provider_class = 'net.sf.ehcache.hibernate.EhCacheProvider'**\n\n**}**\n\
  \n**// environment specific settings**\n\n**environments {**\n\n**development {**\n\
  \n**dataSource {**\n\n**dbCreate = \"create-drop\"**\n\n**// one of 'create', 'create-drop','update'**\n\
  \n**url = \"jdbc:hsqldb:mem:devDB\"**\n\n**}**\n\n**}**\n\n**test {**\n\n**dataSource\
  \ {**\n\n**dbCreate = \"update\"**\n\n**url = \"jdbc:hsqldb:mem:testDb\"**\n\n**}**\n\
  \n**}**\n\n**production {**\n\n**dataSource {**\n\n**dbCreate = \"update\"**\n\n\
  **url = \"jdbc:hsqldb:file:prodDb;shutdown=true\"**\n\n**}**\n\n**}**\n\n**}**\n\
  \n\n\n请注意，**dataSource** 属性在文件顶部以及 **environments** 块内均有指定。全局细节（如数据库连接池设置和 JDBC\
  \ 驱动程序）通过将这些细节放在顶层的 **dataSource** 块中进行全局配置。特定于环境的细节（如 **development**、**test**\
  \ 和 **production** 环境的数据库 URL）则在各自环境的 **dataSource** 块中进行配置。如果你需要为生产环境使用不同的 JDBC\
  \ 驱动程序，可以将这些细节移至相应的环境块中，或者直接在相应环境中覆盖全局配置的细节。同样，你可以配置的环境类型不受限制：**development**、**test**\
  \ 和 **production** 只是 Grails 模板创建的默认环境。\n\n映射 URL\n\n我们需要介绍的 **grails-app/conf**\
  \ 目录中的最后一个文件是 **UrlMappings.groovy**。该文件提供了一种极其灵活的构造，用于将 URL 模式与特定的控制器和操作关联起来。例如，下面展示了如何将漂亮的\
  \ URL /**category/panoramas** 与 **CategoryController** 关联起来，并指定显示 **panaromas**\
  \ 类别：\n\n**class UrlMappings {**\n\n**static mappings = {**\n\n**\"/$controller/$action?/$id?\"\
  {**\n\n**constraints {**\n\n**}**\n\n**}**\n\n****\"/category/$categoryName\"(controller:\
  \ CategoryController, action: \"displayCategory\")**\n\n****\"/\"(view:\"/index\"\
  )**\n\n****\"500\"(view:'/error')**\n\n**}**\n\n**}**\n\n我们描述的映射实际上是此示例中的第二个块。映射的第一个组成部分是引号内的部分。我们本质上是在定义一个以\
  \ **/category/** 开头的正则表达式。**$categoryName** 定义了一个参数名称，该参数将使用 URL 中参数名称所在的部分自动传递给您的控制器。在我们的示例中，**/category/**\
  \ 之后的 URL 部分将被提取出来，然后存储在名为 **categoryName** 的参数中。\n\n如果你查看示例中的第一个块，你会注意到默认的 **URLMapping**。在这种情况下，我们定义了\
  \ **$controller** 和 **$action** 参数。这些是特殊的关键字；它们不是表示特定的参数，而是定义了匹配请求应定向到的控制器以及相应的操作。在我们的类别列表页面示例中，我们没有在映射表达式中定义\
  \ **$controller**，因此我们显式地指定了它，如下所示：**(controller: CategoryController,action: \"\
  \ displayCategory\")** 现在我们已经了解了 Grails 应用程序的目录结构，接下来让我们定义 Grails 领域模型。\n\n定义 Grails\
  \ 领域模型\n\n默认情况下，Grails 会生成三个核心层，它们类似于本书前面讨论过的层级：领域层、控制器层和服务层。为了提供一致性并更好地执行约定，Grails\
  \ 强制执行一个目录结构来帮助组织和隔离来自各个层的类。领域模型通常是 Grails 应用程序的基础，因此它通常是第一个要定义的层。\n\n正如你可能已经猜到的，领域模型类都放在\
  \ **grails-app/domain** 目录中。默认情况下，所有领域类都将位于默认的 Grails 包中。但是，你可以自由定义自己的包结构，对于较大的应用程序，建议这样做。此外，如果你需要从\
  \ Java 访问任何 Grails 代码，则必须将 Grails 类放在一个包内，否则将很难在 Grails/Groovy 世界之外访问它们。你也可以让你的\
  \ Groovy 类实现一个 Java 可访问的接口，作为更好地将 Grails 代码与 Java 集成的一种方式。\n\n让我们通过定义 **Person**\
  \ 领域实体来开始我们的基于 Grails 的图库应用程序。Grails 提供了脚本来帮助创建大多数核心 Grails 原型，每个原型对应一个特定的模板。如果你想更改默认视图或领域类和服务类的创建方式，可以编辑这些模板。为此，你需要运行\
  \ **grails install-templates**。然后，你将能够从 **src/templates** 目录中访问（和修改）这些模板。对于大多数 Grails\
  \ 开发来说，默认模板就足够了。\n\n要创建我们的 **Person** 领域类，请运行以下命令：\n\n**grails create-domain-class\
  \ Person**\n\n此脚本完成后，你将在 **grails-app/domain** 目录中找到 **Person.groovy** 类。Grails\
  \ 在后台使用 Hibernate 将 **Person** 实例持久化到数据库，并从数据库中检索它们。与 Hibernate 不同，Grails 不需要任何映射文件或注解，因为约定有助于\
  \ Grails 推断出处理领域模型持久化所需的大部分信息。\n\n现在我们已经为 **Person** 领域实体创建了存根，让我们定义其余属性：\n\n**class\
  \ Person {**\n\n****String firstName;**\n\n**String lastName;**\n\n**String username;**\n\
  \n**String password;**\n\n**String email;**\n\n****Integer roleLevel;**\n\n****public\
  \ static final USER_ROLE = 1;**\n\n**public static final ADMIN_ROLE = 2;**\n\n**public\
  \ static final SUPERUSER_ROLE = 4;**\n\n**public static final CONTACT_USER = 16;**\n\
  \n**public static final COMMENT_USER = 64;**\n\n****static constrants = {**\n\n\
  **firstName(maxSize:255, unique: false, blank: false)**\n\n**lastName(maxSize:255,\
  \ unique: false, blank: false)**\n\n**username(maxSize:255, unique: true, blank:\
  \ false)**\n\n**password(maxSize:25, unique: false, blank: false)**\n\n**email(email:true,\
  \ blank: false, unique: false)**\n\n**roleLevel()**\n\n**}**\n\n****static mapping\
  \ = {**\n\n**cache true**\n\n**}**\n\n****}**\n\n你可能会注意到的第一件事是这个类代码非常简洁。大多数属性应该是不言自明的。由于我们使用的是\
  \ Groovy，因此无需定义 getter 或 setter（这些在 Groovy 中是隐式的）。还要注意，没有为 **id** 或 **version**\
  \ 指定属性；这些字段由 Grails 自动创建。\n\n添加约束和验证\n\n现在让我们看看 **constraints** 块。约束允许你更好地定义领域模型中的每个字段，为\
  \ Grails 提供关于如何建模数据库模式的线索和要求。有许多约束选项可用，但以下是一些最有用的：\n\n• **blank**\n\n• **minSize**\n\
  \n• **maxSize**\n\n• **range**\n\n• **unique**\n\n• **size**\n\n• **range**\n\n\
  • **inList**\n\n• **email**\n\n• **creditCard**\n\n• **matches**\n\n• **nullable**\n\
  \n其中一些约束非常强大。例如，**matches** 约束允许你指定一个正则表达式，该表达式将用于验证指定字段中的值，确保其与指定的正则表达式匹配。\n\n\
  特定于领域的约束，如 **email** 和 **creditCard**，将分别帮助确保字段符合有效的电子邮件地址或信用卡号。\n\n如果你需要自定义约束，Groovy\
  \ 包含一个允许你定义自己的约束的构造。你指定属性，后跟约束类型及其对应值的映射。以下是一个示例：\n\n**username(blank: false, maxSize:\
  \ 255, unique: true)**\n\n这将确保 **username** 值不能留空，并且数据库字段的最大长度为 255 个字符。此外，**unique**\
  \ 约束也将被添加到 **username** 数据库字段中。\n\n当你尝试将领域实体保存到数据库时，约束就会发挥作用。如果某个特定字段未通过验证，则会将一个错误附加到领域实例的动态\
  \ **errors** 属性上。\n\n\n\n此外，为每个属性定义的约束条件，结合一致的命名规范，会被整合成错误消息代码，并自动用于默认的 Grails Groovy\
  \ Server Pages (GSP) 模板中。例如，如果你尝试保存一个 **Person** 实体，但没有指定 **username**，就会触发验证错误，并与该实例的\
  \ **errors** 属性关联。随后，这个错误会使用应用程序的 **messages.properties** 资源包中定义的错误代码，在默认的 GSP 模板中正确渲染。\n\
  \n当找到验证错误代码时，Grails 会尝试在 **messages.properties** 文件中查找相应的代码，从最具体的命名规范开始，逐步向更通用的规范查找，直到找到匹配项。这确保了即使你没有在\
  \ **messages.properties** 文件中添加特定的错误代码，用户仍然会看到合理的错误信息（例如，提示 **username** 字段的 **blank**\
  \ 约束被违反）。不过，你也可以通过指定一个针对 **Person** 类的 **blank** 约束错误代码，轻松覆盖这个默认消息。\n\n定义关联和属性\n\
  \n**Person** 领域实体是一个相当简单的例子，因为它实际上不包含任何关联或自定义映射。让我们看一个更复杂的实体，了解 Grails 如何处理典型场景。更新你的领域模型，然后我们将深入探讨。使用\
  \ **grails create-domain-class** 脚本分别创建 **ArtEntity**、**Category** 和 **Comment**\
  \ 类的存根。然后，**Comment** 类将被修改如下：\n\n**class Comment {**\n\n****String comment;**\n\
  \n**Date commentDate;**\n\n**Person person;**\n\n****static belongsTo = [commentedArt:\
  \ ArtEntity]**\n\n****static constraints = {**\n\n**comment(maxSize: 2000, blank:\
  \ false)**\n\n**commentDate(nullable: false)**\n\n**}**\n\n****static mapping =\
  \ {**\n\n**cache true**\n\n**}**\n\n****}**\n\n第 11 章 ■ GORM 和 GRAILS\n\n这个类与我们之前定义的\
  \ **Person** 实体类似。我们定义了一些属性，以及一个 **constraints** 块。新增的一个字段是 **belongsTo**，它为 Grails\
  \ 提供了两个实体之间关系的线索。在这个例子中，我们定义了 **Comment** 和 **ArtEntity** 之间的父子关系。我们还定义了一个名为 **commentedArt**\
  \ 的属性，并声明该属性的类型是 **ArtEntity**。我们可以通过向这个映射中添加更多项来指定额外的 **belongsTo** 关系。在每种情况下，**key**\
  \ 代表属性名，**value** 代表类型。\n\n■ **注意** **belongsTo** 属性定义了关联的拥有方。当一个领域类指定了 **belongsTo**\
  \ 属性时，它并不是关联的拥有者。关联的拥有者是 **belongsTo** 属性所引用的类。\n\n使用 **belongsTo** 也规定了级联规则。在前面的例子中，我们声明\
  \ **ArtEntity** 是此关系中的父级，这意味着（对 **ArtEntity** 的）保存和删除操作将适当地级联到相关的 **Comment** 实例。在我们检查另一侧，即\
  \ **ArtEntity** 领域类之后，这种关系将变得更加清晰。\n\n**class ArtEntity {**\n\n****String title;**\n\
  \n**String subTitle;**\n\n**Date uploadedDate;**\n\n**Date displayDate;**\n\n**int\
  \ width;**\n\n**int height;**\n\n**String media;**\n\n**String description;**\n\n\
  **String caption;**\n\n**ArtData_Gallery galleryPicture;**\n\n**ArtData_Storage\
  \ storagePicture;**\n\n**ArtData_Thumbnail thumbnailPicture;**\n\n**boolean isGeneralViewable;**\n\
  \n**boolean isPrivilegeViewable;**\n\n****static hasMany = [categories: Categories,\
  \ comments: Comment]**\n\n**static belongsTo = Category**\n\n****static constraints\
  \ = {**\n\n**title(blank:false, maxSize: 255)**\n\n**subTitle(blank:true, maxSize:\
  \ 255)**\n\n**uploadedDate(nullable: true)**\n\n**displayDate(nullable: false)**\n\
  \n**width(nullable: true)**\n\n\n\n**height(nullable: true)**\n\n**media(nullable:\
  \ true, maxSize: 255)**\n\n**description(nullable: false, blank: false, maxSize:\
  \ 2000)**\n\n第 11 章 ■ GORM 与 Grails\n\n**caption(nullable: true, maxSize: 2000)**\n\
  \n****}**\n\n**static mappings = {**\n\n**cache true**\n\n**}**\n\n****}**\n\n该类遵循类似的模式，但使用了\
  \ **hasMany** 属性，该属性定义了与另一个类的一对多关联。它也可以用于声明多对多关联，只要关系中的一方被认定为关联的所有者（通过使用 **belongsTo**）。\n\
  \n**hasMany** 关系的工作方式与 **belongsTo** 约定类似。你定义了一个映射，其中 **key** 对应属性（即集合）名称，**value**\
  \ 对应领域类。在我们的示例中，我们定义了两个关联：**comments** 和 **categories**。当 Grails 解析此属性时，它会创建相应的集合来保存这些关联。我们可以通过显式地将集合声明为属性来定义要使用的集合类型。例如，我们通过显式定义此属性，将\
  \ **categories** 关联（在我们的 **ArtEntity** 领域类中）定义为 **java.util.Set**：**Set categories\
  \ = new HashSet();**\n\n■ **提示** 如果需要确保集合在逻辑上有序，可以定义一个 **SortedSet** 类型的属性，然后让集合类实现\
  \ **Comparable** 接口，并在其中指定排序逻辑。例如，如果我们希望类别按字母顺序排序，可以让 **Category** 类实现 **Comparable**，并定义一个\
  \ **compareTo(def obj1, def ob2)** 方法，在该方法中根据类别名称进行排序。\n\n自定义领域类 Hibernate 映射\n\n\
  你可能注意到了，在每个示例领域类中都定义了一个静态的 **mappings** 属性。该字段可用于增强 Grails 在幕后创建和管理的 Hibernate 映射。\n\
  \n在我们的示例中，我们只是断言领域实体应被缓存，使用 **Config.groovy** 文件中指定的 **CacheManager**。然而，映射结构非常灵活，可用于修改特定领域类的默认\
  \ Hibernate 映射的许多方面。例如，如果需要覆盖表名或默认列名/类型，映射 DSL 提供了实现此目的的方法。还可以为集合添加缓存规则，或覆盖集合的默认获取策略，指定某个集合是延迟加载还是立即加载。你甚至可以指定一个或多个列映射到特定的\
  \ Hibernate **UserType**。\n\n在我们之前的 Hibernate 示例中，我们定义了一个 **ArtData** 类的层次结构（每个类都继承自\
  \ **ArtData** 基类）。在 Grails 中，实现多态领域类更加简单。以下是我们的 **ArtData** 类：\n\n第 11 章 ■ GORM\
  \ 与 Grails\n\n**class ArtData {**\n\n**byte[] picture;**\n\n**static mapping = {**\n\
  \n**cache true**\n\n**}**\n\n**}**\n\n以下是 **ArtData_Storage** 类（继承自 **ArtData**）：**class\
  \ ArtData_Storage extends ArtData {**\n\n**}**\n\n仅此而已。默认情况下，Grails 使用“每个层次结构一张表”的策略，这意味着它将整个层次结构中所有属性的总和持久化到单个表中。\n\
  \n与 Hibernate 不同，无需显式定义鉴别器（以帮助区分类型），因为 Grails 会处理这一点。然而，Grails 足够灵活，允许你使用不同的多态策略。例如，你可以像这样使用前面描述的自定义映射\
  \ DSL：\n\n**static mapping = {**\n\n**tablePerHierarchy false**\n\n**}**\n\n**现在我们已经定义了\
  \ Grails 领域模型，接下来让我们继续持久化和检索这些数据。\n\n使用 Active Record 作为 DAO 的替代方案\n\n在本书中，你已经了解了\
  \ Spring 如何通过强制执行几个关键设计模式（尤其是 DAO、模板和外观模式）来简化持久化层的开发。尽管 Grails 建立在 Spring 和 Hibernate\
  \ 的基础之上，但它为大多数 Spring 应用程序中典型的 DAO 模式提供了一种替代方案。遵循 Ruby on Rails 等其他快速开发框架的引领，Grails\
  \ 利用 Active Record 设计模式作为处理数据库持久化操作的方法。\n\n遵循 Active Record 模式，数据库中的表直接由领域类表示。例如，在我们的画廊示例中，我们已经定义了一个\
  \ **Person** 类，它描述了数据库中对应的 **Person** 表，这意味着表字段和关联由 **Person** 类中的属性表示。\n\n这种方法与我们本书中使用的领域模型似乎没有太大区别。然而，关键区别在于领域类同时也充当数据库操作的包装器。动态静态方法被注入到每个领域类中，提供了查询该类类型实例的方法。与\
  \ Hibernate 一样，数据库中的每一行都由相应领域类的一个实例表示。然而，**save()** 和 **update()** 方法被注入到每个领域类实例中，允许通过直接在该实例上调用\
  \ **save()** 或 **update()** 来持久化新创建或检索到的实例。\n\n例如，如果我们想要创建或更新 **Person** 表中的特定行，只需直接在我们想要保存的\
  \ **person** 实例上调用 **person.save()**。如果我们想要从数据库中加载特定的 **Person** 记录，只需调用静态方法 **Person.get(id)**，并传入我们想要检索的记录的主键。\n\
  \n将此方法与 DAO 模式进行对比，在 DAO 模式中，我们需要为与特定领域实体相关的所有数据库操作创建一个单独的抽象层。Active Record 模式极大地简化了我们检索和持久化数据的工作，因为无需定义任何\
  \ DAO 类或方法。相反，这种功能通过注入到每个领域类中的动态行为，隐式地存在于我们的领域模型中。\n\n如果我们不需要定义 DAO 实现，那么像 **Person.get(id)**\
  \ 和 **Person.save()** 这样的方法的实现来自哪里？Active Record 模式指出，我们应该能够简单地定义一个领域模型，并开始在这些类上调用方法，以实现我们试图构建的持久化逻辑。然而，问题仍然存在：如果我们可以在\
  \ **Person** 实例上简单地调用 **save()**，那么我们在哪里定义此方法的行为？让我们深入了解一下 GORM 的内部机制，以更好地理解其工作原理。\n\
  \n深入探究 GORM 的内部机制\n\n像 Groovy 这样的语言的关键优势之一是它们是动态的，这意味着，除其他外，你可以在任何时候为你的类定义新的行为。就\
  \ Grails 和 Active Record 模式而言，框架能够用与持久化相关的新功能来增强你的领域模型。这一策略是 Groovy 的一个关键概念，并通过使用\
  \ Groovy 的 **metaClass** 结构来实现，正如本章前面所讨论的。\n\n使用动态查找器方法\n\nGrails 将新功能注入到每个领域模型类中，以支持\
  \ Active Record 模式。\n\n与 DAO 方法不同，无需预先定义任何方法。相反，Grails 使用命名约定来解释如何与数据库交互。通过使用被调用方法的名称，Grails\
  \ 直觉地判断要执行的操作类型。通过几个示例可以最好地解释这一点。\n\n\n回到我们的图库应用程序，让我们定义一个简单的单元测试，演示如何保存和加载 **Person**\
  \ 领域类。由于我们希望展示 Grails 在运行中的应用中的行为，我们需要创建一个集成测试，它实际上会启动一个 Spring **ApplicationContext**，这样我们就可以测试依赖于\
  \ Grails 核心功能（如持久化）的特性。\n\nGrails 自带一个脚本，可以为我们创建集成测试的脚手架：**grails create-integration-test\
  \ Person**\n\n运行此命令后，你会在 **test/integration/grailsGallery/PersonTests.groovy** 下找到一个集成测试存根。在我们的测试中，我们将验证是否可以实例化、保存和加载一个\
  \ **Person** 领域实体：\n\n第 11 章 ■ GORM 和 GRAILS\n\n**class PersonTests extends GroovyTestCase\
  \ {**\n\n**...**\n\n**void testSavePerson() {**\n\n**Person person = new Person(**\n\
  \n**[firstName: \"Sam\", lastName: \"Smith\",**\n\n**username: \"ssmith\", password:\
  \ \"1234\",** **email: \"sam@notarealaddress.com\",**\n\n**roleLevel: Person.ADMIN_ROLE])**\n\
  \n**assertTrue(\"Person 实体有效且可保存\",** **(person.validate() && person.save()))**\n\
  \n**assertNotNull (\"person id 为空\", person.id)**\n\n**def loadedPerson = Person.get(person.id)**\n\
  \n**assertTrue(**\n\n**\"Person 已成功加载\",**\n\n**loadedPerson != null &&**\n\n**loadedPerson.username\
  \ != null)**\n\n**}**\n\n**}**\n\n这是一个非常直接的测试。请注意，我们使用一个包含 Groovy 类默认属性的 **java.util.Map**\
  \ 来实例化 **Person** 实体。在 **Person** 实例被实例化后，我们验证该实例是否验证并成功保存。**validate()** 会验证我们领域模型的\
  \ **constraints** 块中指定的所有要求。如果我们的领域模型验证失败，Grails 会在 **Person** 实例上设置一个 **errors**\
  \ 属性。**errors** 属性包含每个验证失败的详细信息，并且是 **org.springframework.validation.Errors** 接口的一个实现。\n\
  \n这个接口对于跟踪和管理表单提交非常有用，Spring MVC 的用户应该很熟悉。\n\n如果发生验证错误，我们可以遍历每个错误来找出具体问题：\n\n**person.errors.allErrors.each\
  \ {curError ->**\n\n**log.error(\"保存 Person 实例时出错: ${curError}\");**\n\n**}**\n\n\
  我们也可以通过这种方式获取错误计数：\n\n**person.errors.errorCount()**\n\n■ **注意** 一个 **log** 实例变量会自动注入到所有控制器和服务类中，让你能够轻松地输出日志消息。这是\
  \ log4j 的 **Logger** 类的一个实例，并在本章前面描述的 **Config.groovy** 文件中进行配置。\n\n第 11 章 ■ GORM\
  \ 和 GRAILS\n\nGrails 自带一个标签库，有助于在典型的表单提交中渲染错误。\n\n此外，默认的 Grails 模板会创建 GSP 视图，这些视图在发生任何验证或保存失败时会自动渲染清晰的错误消息。当然，可以通过更新\
  \ **messages.properties** 文件轻松覆盖默认的错误消息。\n\n至此，你应该对如何保存和加载领域实体有了扎实的理解。不幸的是，这还远远不够。你还需要能够查询数据库。\n\
  \n为了演示如何查询，我们首先需要向数据库中添加一些数据。\n\n让我们回到 **PersonTests.groovy** 文件，定义一个 **setup()**\
  \ 方法，该方法将在每次测试运行之前执行，并允许我们用一些示例数据填充数据库：**void setUp() {**\n\n**def baseNames = [**\n\
  \n**\"Sam\", \"Bob\", \"Heather\",**\n\n**\"Steve\", \"Sofia\"]**\n\n**baseNames.each\
  \ {curName ->**\n\n**def person = new Person(**\n\n**[firstName: curName,**\n\n\
  **lastName: curName,**\n\n**username: curName,**\n\n**password: \"1234\",**\n\n\
  **email: \"${curName}@apress.com\",**\n\n**roleLevel: Person.USER_ROLE])**\n\n**assertTrue\
  \ (**\n\n**\"Person 实体有效且可保存\",**\n\n**(person.validate() && person.save()))**\n\
  \n**assertFalse(**\n\n**\"保存的实体不应有错误\",**\n\n**person.hasErrors())**\n\n**}**\n\n\
  **}**\n\n这个方法有点过时，因为我们只是遍历一个 **java.util.List** 的名字，并使用这些名字作为每个字段的种子数据来创建新的 **Person**\
  \ 实体。还要注意，我们添加了一个新的断言来验证 **person.hasErrors()** 是否为 false。在 **save** 操作之后，调用 **hasErrors()**\
  \ 是一个有用的惯用方法，用于确认没有错误阻止实体被持久化到数据库。\n\n你会在默认的 Grails 控制器中频繁看到这种方法。\n\n现在我们有了用一些示例数据填充数据库的方法，让我们看看\
  \ Grails 如何使数据库查询变得非常直观。\n\n**void testFinders() {**\n\n****def foundPeople = Person.findAllByUsername(\"\
  Sam\");**\n\n****/* foundPeople 应引用一个包含一个 Person 实体的 List */**\n\n**assertEquals(\"\
  找到一个 Person\", 1, foundPeople.size())**\n\n****/* singlePerson 应引用单个 Person 实体，且\
  \ lastName 属性应等于 Sam */**\n\n**def singlePerson = Person.findByUsername(\"Sam\"\
  )**\n\n第 11 章 ■ GORM 和 GRAILS\n\n****assertEquals(**\n\n**\"姓氏是 Sam\", \"Sam\",\
  \ singlePerson.lastName)**\n\n****def allPeopleSorted =**\n\n**Person.list(max:\
  \ 3, order: \"asc\",**\n\n**sort: \"username\", offset: 0);**\n\n****assertTrue(**\n\
  \n**\"返回了三个 Person\", allPeopleSorted.size())**\n\n****assertEquals(**\n\n**\"列表中的第一个\
  \ Person 是 Sam\", \"Sam\",**\n\n**allPeopleSorted[0].username)**\n\n****}**\n\n\
  这个新方法有助于说明使用 Grails 的动态查找器概念查询数据的巨大灵活性。请注意，每个方法名称的格式决定了最终在数据库上生成的查询。\n\n在我们的第一个示例中，我们运行了\
  \ **Person.findAllByUsername(\"Sam\")**。这种结构返回与字段 **username** 匹配的*所有*数据。请注意，我们使用了驼峰命名法。这种格式可以通过以下结构更好地表达：\n\
  \n***DOMAIN*****.findAllBy< *PROPERTYNAME*>** 如果你查看断言，你会注意到这种类型的方法总是返回一个对象集合。相反，我们的下一个断言使用了以下格式：\n\
  \n***DOMAIN*****.findBy< *PROPERTYNAME*>**\n\n**这个方法的工作方式类似，但只返回单个对象。我们的断言验证了这一说法，因为我们演示了返回值是一个单独的\
  \ **Person** 实例，而不是一个集合。\n\n**findAllBy** 和 **findBy** 这两种动态方法也可以扩展，以便在属性名称上指定修饰符或提供进一步的约束。例如，如果我们想查找所有名字和姓氏以字母\
  \ *p* 开头的用户，可以通过以下方法表达：\n\n**Person.findAllByFirstNameIlikeAndLastNameIlike(\"P%\"\
  , \"P%\");** 在这个例子中，我们首先指定了一个条件属性 **firstName**，然后使用 **Ilike** 修改条件。**Ilike** 修饰符类似于\
  \ **like** 修饰符，但不区分大小写。接下来，我们在方法名后追加 **And**，以通过额外的属性条件进一步约束查询。\n\n类似的方法也可以用于查找数据库中匹配指定条件集的行数，通过使用\
  \ **countBy*** 动态查找器方法。基于这个例子，我们可以定义一个方法命名结构，来描述动态查找器方法的格式：\n\n**countBy/findBy/findAllBy<PROPERTYNAME><MODIFIER>AND/OR<PROPERTYNAME><MODIFIER>**\
  \ 208\n\n第 11 章 ■ GORM 和 GRAILS\n\n以下是一些可以使用的修饰符：\n\n• **Between**\n\n• **GreaterThan**\n\
  \n• **GreaterThanEquals**\n\n• **LessThan**\n\n• **LessThanEquals**\n\n• **Like**\n\
  \n• **Ilike**\n\n• **Not**\n\n• **Equal**\n\n\n\n我们的下一个示例简单地调用了 **Person.list()**，该方法会返回\
  \ **Person** 领域类的所有实例。不过，我们还传入了一个包含选项的 **Map**，用于帮助定义返回数据的约束条件和排序选项。这些选项也可用于分页，因为你可以设置返回的最大条目数（**max**）以及一个**偏移量（offset）**。表\
  \ 6-1 总结了可以传递给 **list()** 方法的选项。\n\n*表 6-1\\. 对结果集进行排序和分页的选项*\n\n**选项 用途**\n\n**sort**\n\
  \n排序依据的字段\n\n**order**\n\n排序方向（升序或降序）\n\n**max**\n\n返回的最大条目数\n\n**offset** 返回的第一个条目在总结果集中的偏移量\
  \ 一个包含表 6-1 所列选项的 **Map** 同样适用于 **findAllBy*** 方法。例如，我们可以请求 **Person** 实例的第二页（假设每页包含十个对象），并按名称降序排序：\n\
  \n**def people = Person.list(sort: \"name\", order: \"desc\", max: 10, offset: 10);**\
  \ 209\n\n第 11 章 ■ GORM 与 GRAILS\n\n创建高级查询方法\n\n上一节描述的动态查找器方法适用于大多数类型的查询。\n\n然而，有时拥有更多的灵活性也很重要。Grails\
  \ 还提供了 **find()** 和 **findAll()** 方法，允许你使用任意的 HQL 查询。**Find()** 返回单个实体，而 **findAll()**\
  \ 会返回多个实体。此外，还有一个更灵活的 **executeQuery()** 方法，允许你定义不返回特定领域实体的查询。\n\n让我们看一个使用 HQL 的示例。假设我们要查询属于某个特定类别的所有\
  \ **ArtEntity** 对象。这可以通过以下查询来表示：**List artEntities = ArtEntity.findAll(**\n\n**\"\
  from ArtEntity artEntity left join**\n\n**artEntity.categories as category with**\n\
  \n**category.id = :categoryId\",**\n\n**[\"categoryId\": category.id])**\n\n注意，我们对\
  \ **Category** 领域对象使用了左连接，并通过 **with** 约束指定了那些匹配特定类别 ID 的类别。\n\n在这个查询中，我们使用了命名参数。与典型的\
  \ HQL 查询一样，参数名称在查询中通过冒号前缀来表示。然后，参数名-值映射会作为一个 **Map** 传入（作为 **findAll** 查询的第二个参数）。\n\
  \n使用 Criteria API\n\n与标准的 Hibernate 一样，Grails 也提供了一种使用 Criteria API 表达查询的方式。不过，由于我们使用的是\
  \ Groovy 而非 Java，因此可以利用 Criteria DSL，从而以更简洁、更易读的方式定义查询条件。例如，我们可以通过以下查询，在两个指定类别之一中查找所有\
  \ **ArtEntity** 实例，并且这些实例还落在特定的日期范围内：\n\n**def criteria = ArtEntity.createCriteria()**\n\
  \n**def currentDate = new Date()**\n\n**def earlierDate = currentDate – 3**\n\n\
  **def catName1 = \"autumnPicts\"**\n\n**def catName2 = \"summerPicts\"**\n\n**def\
  \ results = criteria.list {**\n\n**between('displayDate', earlierDate, currentDate)**\n\
  \n**categories {**\n\n**or {**\n\n**equals(\"name\", catName1)**\n\n**equals(\"\
  name\", catName2)**\n\n**}**\n\n**}**\n\n**}**\n\n第 11 章 ■ GORM 与 GRAILS\n\n上述示例使用了\
  \ Grails Criteria Builder，使我们能够以一种非常直观的方式表达一组相当复杂的限制条件。如果你还记得标准的 Hibernate Criteria\
  \ API，应该就能推断出示例中大部分操作的含义。Criteria 的析取（disjunction）和合取（conjunction）可以分别通过 **or**\
  \ 和 **and** 块来指定。类似地，关联条件可以通过定义一个以关联名称命名的块来表达，这就是我们示例中 **categories** 块的作用。在我们的\
  \ **categories** 块内部，嵌套了一个 **or** 析取块，而该块内部则是我们的 **equals** 限制条件，用于过滤出那些匹配我们指定的任一类别名称的类别。\n\
  \n\n\n处理 Grails 中的关联关系\n\n我们已经描述了如何通过使用 **hasMany** 和 **belongsTo** 约定来定义关联关系。\n\
  \n这些结构能有效指示领域实体之间的相互关系。一旦领域模型定义完毕，我们就需要对其进行操作。\n\n回想一下，在 Hibernate 的世界里，编写代码以确保正确管理双向关联非常重要。例如，常见的做法是在\
  \ Hibernate 领域类中定义 **add*** 和 **remove*** 方法，以确保关联的两端都能被正确设置或移除。Grails 通过提供动态的 **addTo***\
  \ 和 **removeFrom*** 方法，帮助确保关联的两端都能被正确引用（或解除引用）。例如，如果我们想向一个 **ArtEntity** 添加新的 **Comment**\
  \ 实例，可以使用以下代码：**def loadedArtEntity = ArtEntity.findByName(\"Awesome Panorama\"\
  );** **def loggedInUser = Person.findByUsername(\"Sam\");**\n\n**Comment newComment\
  \ = new Comment(**\n\n**comment: \"Cool pict!\",**\n\n**commentDate: new Date(),**\n\
  \n**person: loggedInUser);**\n\n**loadedArtEntity.addToComments(newComment);**\n\
  \n**if (!loadedArtEntity.hasErrors() && loadedArtEntity.save()) {**\n\n**println(\"\
  new comment saved\");**\n\n**} else {**\n\n**println(\"Error saving new comment\"\
  );**\n\n**}**\n\n在我们的示例中，我们定义了一个新的 **Comment**，然后使用 **addToComments** 方法将其添加到 **ArtEntity**\
  \ 的 **comments** 关联中。我们也可以选择使用 **removeFromComments** 方法来移除特定的评论引用。请注意，我们没有直接对新创建的\
  \ **Comment** 实例调用 **save()** 方法。\n\n相反，我们保存了 **ArtEntity** 实例，从而允许保存操作级联到 **comments**\
  \ 关联，因为我们已指定 **ArtEntity** 是该关联的所有者。这种关联所有权在 **Comment** 领域类的以下代码行中体现：**static belongsTo\
  \ = [commentedArt: ArtEntity]**\n\n第 11 章 ■ GORM 和 GRAILS\n\n搭建脚手架并构建你的 Grails 应用程序\n\
  \n领域模型定义好后，我们可以依赖 Grails 的生成脚本来为我们的画廊应用程序创建脚手架功能。你可以从本书的网站下载完整的基于 Grails 的画廊应用程序。\n\
  \n要为特定的领域类生成控制器和视图，请确保你位于 Grails 画廊应用程序的根目录，然后运行以下命令：\n\n**grails generate-all <<\
  \ *domain-class*>>**\n\n请务必将 ***domain-class*** 替换为你想要为其生成控制器和 GSP 的领域实体名称。你也可以通过分别调用以下脚本来仅生成控制器或仅生成\
  \ GSP：\n\n**grails generate-controller <<domain-class>**\n\n**grails generate-views\
  \ <<domain-class>>**\n\n我们强烈建议检查生成的控制器和视图，以便更好地了解典型的 Grails 应用程序是如何工作的。请记住，生成的代码基于旨在以非常通用的方式工作的脚手架（以便它适用于所有类型的领域模型）。因此，检查示例\
  \ Grails 画廊应用程序以获得略有不同的视角也很有用。\n\n■ **注意** 有关 Grails 开发的详细信息，包括构建控制器和 GSP，请参阅 Graeme\
  \ Rocher 所著的 *The Definitive Guide to Grails, Second Edition* (Apress, 2009)。\n\n\
  你可以通过将 **grails.env** 环境变量传递给 **grails run-app** 脚本，轻松地在特定环境下启动你的 Grails 应用程序：**grails\
  \ –Dgrails.env=development run-app**\n\n此命令将使用 **development** 环境配置自动启动我们的应用程序。通常你不会想以这种方式运行生产或预发布环境，但这对于测试目的来说很方便。在内部，当你使用\
  \ **run-app** 命令时，Grails 会使用一个嵌入式的 Jetty 服务器来运行你的应用程序。\n\n如果你使用 Grails 的 **war**\
  \ 命令创建一个 WAR 文件，你可以将 Grails 部署到任何应用服务器上。如果你想创建一个部署到你自己的应用服务器中的应用程序，你应该运行以下命令：\n\n\
  **grails –Dgrails.env=production war**\n\n我们建议显式使用 **–Dgrails.env** 来指定环境，因为它同时支持默认环境和自定义环境。但是，如果你使用的是默认的\
  \ Grails 环境，你可以使用这个快捷方式：\n\n**grails prod war**\n\n第 11 章 ■ GORM 和 GRAILS\n\n在 Grails\
  \ 中定义事务性服务层\n\n你在本书中已经了解了事务支持。你知道确保特定方法内的操作全部完成（或回滚）作为一个单一的原子工作单元是多么重要。Grails 也鼓励使用服务外观模式，并使定义事务需求变得极其容易。然而，为了灵活性，Grails\
  \ 提供了几种选项来确保持久化操作在事务上下文中发生。\n\n如果你不想创建服务类，另一种确保持久化操作在事务上下文中发生的方法是将一段代码封装在一个闭包内，并将其传递给注入到每个领域类中的动态\
  \ **withTransaction** 方法。例如，我们可以通过以下方式确保对类别和 **ArtEntity** 的更新在一个事务内发生：**Comment.withTransaction\
  \ {txStatus ->**\n\n**def comments = Comment.findAllByCommentDateGreaterThan(lastWeek);**\
  \ **comments.each {Comment curComment ->**\n\n**if (Comment.hasSpam(curComment))\
  \ {**\n\n**curComment.delete()**\n\n**}**\n\n**}**\n\n**}**\n\n在这里，我们实际上定义了一个匿名闭包块，并将这个闭包传递给\
  \ **Comment** 领域对象的动态 **withTransaction** 方法。这是一个简单的例子，但它说明了使用 Grails 定义事务是多么简单。\n\
  \n■ **注意** **txStatus** 闭包参数是一个 **org.springframework.transaction.TransactionStatus**\
  \ 对象，它允许你获取当前正在执行的事务的信息，并通过调用 **txStatus.setRollbackOnly()** 以编程方式触发回滚。\n\n一个更清晰的方法是实现一个服务层，并将你的事务操作组织在服务方法中。在\
  \ Grails 中，你可以通过运行以下命令来创建一个新的服务方法：\n\n**grails create-service *servicename***\n\n\
  **这将在 **grails-app/services** 目录下创建一个新的服务。Grails 有一种相当简单的方式来声明一个特定的服务类是否应该是事务性的。只需在你的服务类顶部添加以下内容：\n\
  \n**static transactional = true;**\n\n如果 **transactional** 设置为 **true**，你的所有方法都将在事务上下文中运行。如果这个静态属性是\
  \ **false**，则不会使用事务。\n\n第 11 章 ■ GORM 和 GRAILS\n\n总结\n\n在本章中，我们介绍了使用 Groovy 和 Grails\
  \ 开发 Web 应用程序的一些基础知识。Grails 与前面章节涵盖的主题形成了有趣的对比。\n\n尽管 Grails 牢固地基于 Spring 和 Hibernate，但它利用\
  \ Active Record 作为 DAO 设计模式的替代方案。这种方法在 Grails 中更实用，因为它使用了动态语言 Groovy，允许动态定义新的行为和方法。通过使用约定优于配置，Grails\
  \ 可以显著减少启动并运行一个可用应用程序所需的工作量。\n\n尽管存在这些差异，但 Spring 的深远影响依然清晰可见，并且与其他持久化框架一起使用的大部分经验和模式仍然可以应用于\
  \ Grails。你已经看到了一些基本的 Spring 概念（例如依赖注入）如何通过基于 Groovy 的配置和隐式的、基于约定的装配得到进一步增强。\n\n\
  **第 12 章**\n\n■ ■ ■\n\n**Spring Roo**\n\n\n\nSpringSource 在消除企业软件工程师障碍方面有着日益增长的卓越记录。Spring\
  \ Roo 是其最新的大胆尝试，旨在为 Java 开发者带来快速应用开发（RAD）能力。\n\n在本章中，我们将从头重建我们的艺术画廊应用，以便让你亲眼看到 Roo\
  \ 能多快地启动一个项目。这也将为你提供一个绝佳的机会，来对比我们到目前为止手动完成的工作与 Roo 自动生成的一切。生产力提升将一目了然。\n\nRoo 是什么（以及它不是什么）\n\
  \nRoo 的架构主要围绕 Spring 和 AspectJ 展开，AspectJ 是 Spring 用于在各个 Spring 模块中表达切点的 AOP 框架。AspectJ\
  \ 提供了一个名为*类型间声明*（ITD）的特性，Spring Roo 将其用作代码生成过程的一部分。ITD 允许将你的源代码（**.java** 文件）与 Roo\
  \ 生成的源代码（**.aj** Aspect ITD 文件）清晰分离。\n\n这两个源文件随后在编译步骤中被合并，以生成代表所有预期功能的字节码。\n\n这种清晰的分离恰好提供了你对\
  \ RAD 框架所期望的一切：通过生成的 **.aj** 源文件实现了约定优于配置，并且你可以编写常规的 **.java** 类，在你认为合适时覆盖这些约定，而无需扩展或实现任何\
  \ Roo 特定的类或 API。由于这种巧妙的方法，所有 Roo 代码对 Java 开发者来说都会感觉完全自然。\n\n虽然使用 Roo 不需要 IDE，但像\
  \ Eclipse 和 SpringSource Tool Suite (STS) 这样的 IDE 可以利用 Java 的静态类型，为代码补全等便利功能提供全面集成。\n\
  \n由于 Roo 采用的编译方法，该框架对你的运行时环境完全没有要求！它是一个简单、有效的工具，用于加速开发，并使开发者能够高效地使用 Java，而无需经历学习新语言和运行时框架的学习曲线。\n\
  \nRoo 的核心基础设施提供了文件监控、元数据管理和类型内省等功能。Roo 最大的资产之一是其插件基础设施。Roo 是一个非常年轻的项目，但其插件库已经令人印象深刻。Roo\
  \ 1.0.*x* 版本是作为单一类加载器实现的。然而，从 1.1.0 版本开始，Roo 完全基于 OSGi。\n\nOSGi（原名开放服务网关倡议，现已过时）是\
  \ Java 编程语言的一个模块化系统和服务平台，实现了一个完整且动态的组件模型。这些模块（在 OSGi 术语中称为*bundle*）可以在不重启应用的情况下进行安装、启动、更新和卸载。每个\
  \ bundle 都有自己的类加载器，并且 bundle 之间可以通过服务注册表进行交互。OSGi 提供的模块化为 Roo 提供了一个可扩展的平台。你与之交互的所有关键组件，例如\
  \ Hibernate 和自动化集成测试，实际上都是作为 OSGi bundle 构建的。这种架构使得社区能够继续扩展 Roo。\n\n乍一看，SpringSource\
  \ 旗下拥有两个截然不同的 RAD 框架（上一章介绍的 Grails 和 Roo）可能有点奇怪。但我们相信这两者足够不同，可以共存。对于团队有时间学习新事物并且愿意使用动态类型语言的绿地项目，我们很难不推荐使用\
  \ Groovy 和 Grails。但如果你是在遗留应用的背景下工作，或者只是想坚持使用你最熟悉的工具和语言，那么 Roo 是一个极好的替代方案。在本章中，我们希望向你展示原因。\n\
  \n**JAVA、GRAILS 和 ROO**\n\nJava 在企业领域拥有非常稳固的地位，这并非没有道理。Java 由 James Gosling 创建，并于\
  \ 1995 年由 Sun Microsystems 首次发布。十五年后，其生态系统已经非常庞大！\n\nJava 已被用于编程从手机到厨房电器，再到需要亚毫秒级响应时间的极其复杂的全球交易系统等各种应用。它经常作为计算机科学课程的一部分被教授，并且有大量工程师在企业环境中拥有丰富的\
  \ Java 使用经验。这确保了可以轻松接触到各个经验水平的有才华的工程师。此外，还有许多框架和库可供选择，无论是开源的还是商业的，这样你就不必在每次遇到常见问题时重新发明轮子，这些问题的设计模式和最佳实践已经得到了充分的研究和理解。开发团队可以通过重用或扩展现有软件来节省大量时间和成本。这种系统脚手架使你能够专注于编写真正使你的组织与众不同的代码。所有这些原因使得选择\
  \ Java 作为驱动业务的平台非常有吸引力。\n\n尽管 Java 在企业领域前景广阔，但对单个 Java 程序员来说并非一切顺利。随着 Web 开发（尤其是开源软件）在过去十年中的蓬勃发展，我们看到了大量新编程语言和\
  \ Web 框架的涌入（有趣的是，我们也看到一些旧语言找到了新的定位）。如果你花时间探索过其中一些替代技术，Java 的生产力缺陷就会变得显而易见。在 Java\
  \ 环境中编程时，有许多技术障碍会拖慢开发者的速度。其中包括编译步骤、需要重启应用服务器才能看到更改效果，以及许多人提到的 Java 的“高仪式性”方面，工程师们因此浪费宝贵的时间来编写和维护大量的样板代码。\n\
  \n在 Java 社区中，我们看到采用更新脚本语言的框架出现，旨在经过实战检验的 JVM 之上提供更快的开发模型。Grails 就是这样一个框架，用 Groovy\
  \ 语言编写，在 Graeme Rocher 的领导下声名鹊起，后来被 SpringSource 收购。\n\n正如你在第 11 章中学到的，Grails 通过称为约定优于配置（有时称为按约定编码）的软件设计范式来提高生产力。应用这种范式的框架通常被认为是“非常固执己见的”。它们致力于减少开发者在构建应用时必须做出的决策数量，同时仍然提供足够的钩子，让你可以在应用偏离约定的地方指定或覆盖行为。例如，在我们的艺术画廊应用中，一个使用约定优于配置的框架会确保\
  \ **Person** 领域类默认映射到名为 **person** 的相应数据库表。如果我们知道数据库表实际上名为 **user** 而不是 **person**，该框架也会提供覆盖此类行为的方法。\n\
  \nGroovy 作为一种动态类型脚本语言的本质，消除了编译步骤的需要，并且在许多情况下，甚至消除了应用服务器重启的需要。Grails 通过大量使用反射和 Groovy\
  \ 的元编程模型在运行时动态生成代码，进一步减轻了开发者的负担，并解决了前面提到的障碍，从而减少了典型 Web 应用所需的大量样板代码。\n\n相反，在 Ben\
  \ Alex 的指导下，Spring Roo 让工程师能够利用纯 Java，配备他们熟悉和喜爱的所有工具，同时通过广泛的代码生成来加速开发生命周期。\n\n使用\
  \ Roo 创建领域模型\n\n\n\n领域驱动设计（DDD）是一种软件开发方法论，由埃里克·埃文斯在其著作《领域驱动设计：软件核心复杂性应对之道》（Addison-Wesley\
  \ Professional, 2003）中推广开来。DDD 试图通过在开发全过程中聚焦并优化应用的领域层，在软件中模拟现实世界的系统或流程。为此，埃文斯主张以高度迭代和互动的方式与领域专家合作，共同定义一种*通用语言*。这种通用语言提供了统一的术语和定义，使工程师和领域专家能够就系统中的实体进行有效沟通。\n\
  \nSpring Roo 并未明确倡导 DDD，但由于 Roo 极其重视实体层，DDD 的原则与之自然契合。作为 Roo 的入门介绍，我们将逐步演示如何使用它来创建我们的艺术画廊应用领域，如图\
  \ 12-1 所示。\n\n第 12 章 ■ SPRING ROO\n\n*图 12-1. 艺术画廊领域模型*\n\n开始使用 Roo\n\n请确保你的系统已配置好必备条件：Java\
  \ 5 或更高版本，以及 Maven 2.0.9 或更高版本。然后下载 Roo 独立版本并按照安装说明进行操作，该版本可在 **www.springsource.org/roo**\
  \ 获取，并确保 **roo** 已加入你的系统路径。\n\n接下来，在你的机器上为新项目创建一个名为 **rooGallery** 的目录。进入这个新目录并执行\
  \ **roo**。你将进入 Roo shell 环境，并看到 Roo 欢迎界面，如图 12-2 所示。\n\n![Image 9](img/index-233_1.png)\n\
  \n![Image 10](img/index-233_2.png)\n\n![Image 11](img/index-233_3.jpg)\n\n![Image\
  \ 12](img/index-233_4.png)\n\n![Image 13](img/index-233_5.png)\n\n![Image 14](img/index-233_6.png)\n\
  \n![Image 15](img/index-233_7.png)\n\n第 12 章 ■ SPRING ROO\n\n*图 12-2. Roo shell*\n\
  \n■ **提示** 在探索 Roo 时，你可以大量使用 **hint** 和 Tab 补全功能来获取 Roo 的上下文帮助。每个 Roo 命令都有一系列可指定的选项。在尝试命令时，请务必在\
  \ Roo shell 中尝试智能 Tab 补全功能，看看 Roo 如何引导你走上正确的道路，从而无需记忆 Roo 命令。\n\n在创建新项目之前，在 Roo\
  \ shell 中输入 **osgi** 命令，并使用 Tab 补全查看 Roo 提供的所有选项。Roo 基于 Apache Felix 运行时，其支持的最基本\
  \ OSGi 命令之一是 **ps**。执行 **osgi ps** 将列出 Roo 运行时中的所有 OSGi 包，以及版本信息和包的状态，例如 ACTIVE、STARTING\
  \ 等。\n\n第 12 章 ■ SPRING ROO\n\n创建新项目\n\n让我们开始正题。首先，在 Roo shell 中使用 **project** 命令创建你的项目，如下所示：\n\
  \nroo> **project --topLevelPackage com.prospringhibernate.gallery**\n\n****Created\
  \ ~/rooGallery/pom.xml**\n\n**Created SRC_MAIN_JAVA**\n\n**Created SRC_MAIN_RESOURCES**\n\
  \n**Created SRC_TEST_JAVA**\n\n**Created SRC_TEST_RESOURCES**\n\n**Created SRC_MAIN_WEBAPP**\n\
  \n**Created SRC_MAIN_RESOURCES/META-INF/spring**\n\n**Created SRC_MAIN_RESOURCES/META-INF/spring/applicationContext.xml**\n\
  \n**Created SRC_MAIN_RESOURCES/log4j.properties**\n\n此命令会为 Maven 项目创建所有必要的目录。此外，它还会设置你的\
  \ Maven **pom.xml** 文件，并创建一个 Spring **applicationContext.xml** 文件。\n\n在 Roo shell\
  \ 中执行 **hint**，查看消息如何更新以反映应用的当前上下文。你会看到已有基本结构，但缺少持久化机制。因此，我们将遵循 Roo 的建议，使用 Hibernate\
  \ 和 H2 内存数据库配置 JPA 提供程序和关联数据库，如下所示：\n\nroo> **persistence setup --provider HIBERNATE\
  \ --database H2_IN_MEMORY**\n\n你会在输出结果中注意到，Roo 创建了 JPA **persistence.xml** 配置文件以及\
  \ **database.properties** 文件。它还会修改 **applicationContext.xml** 文件，并向 **pom.xml**\
  \ 文件中引入一些依赖项。\n\n在 Roo 中仅执行两个命令后，你现在就拥有了一个完全配置好的 Spring 3 和 Hibernate 3.5 应用。Roo\
  \ 已自动使用合理的默认值创建了我们之前在本节中介绍的许多构造，包括 JPA 和声明式事务管理所需的所有 Spring Bean。\n\n■ **注意** 作为一个使用\
  \ Unix 变体近二十年的人，很难不爱上 Roo 的交互式 shell。Roo shell 远不止是一个执行命令的界面。每当你启动 Roo shell（无论是从\
  \ Unix 提示符还是 IDE 内部），Roo 都会密切关注项目中的文件，并在你对代码进行更改时，在后台无缝地即时修改你的项目。这听起来可能有点令人不安，但我们之前提到的那些\
  \ ITD 文件将 Roo 的更改局限在特定范围内。除非你明确发出命令，否则 Roo 不会触碰你的 Java 文件。而作为开发者，你只需尊重 Roo 的“领地”，避免编辑\
  \ ITD 文件本身。\n\n第 12 章 ■ SPRING ROO\n\n正如我们将在本章后面演示的那样，覆盖 Roo 自动生成的行为非常容易。所有这些考虑因素让你在开发应用时拥有很多选择。\n\
  \n你可以像往常一样在 IDE 中修改代码（例如，为实体添加字段），或者进入 Roo shell 以命令行方式创建代码。这种自动化和选择的灵活性释放了宝贵的开发时间，让你能够专注于真正重要的事情：手头的业务问题。\n\
  \n添加实体\n\n现在我们已经创建了项目并配置了持久化层。再次在 shell 中执行 **hint** 命令，你会看到 Roo 建议我们使用 **entity**\
  \ 命令开始充实领域层。**entity** 命令会生成一个带有 JPA 注解的简单 JavaBean。我们将首先使用 **entity** 命令创建 **ArtEntity**\
  \ 类型，如下所示：\n\nroo> **entity --class com.prospringhibernate.gallery.domain.ArtEntity\
  \ --testAutomatically**\n\n****Created SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain**\n\
