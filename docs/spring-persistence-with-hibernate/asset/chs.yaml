  创建**ArtDataGallery**和**ArtDataStorage**类型涉及相同的步骤。我们模型中的其他实体也有一些细微差别。请查看本书附带的**rooGallery**代码以了解详情。\n\
  \n添加 Spring MVC\n\n模型就位后，下一个合乎逻辑的步骤是将 Spring MVC 添加到组合中，为应用程序提供 HTML 或 RESTful 前端。Roo\
  \ 让这一切变得异常简单。如果你不需要对每个生成的类进行细粒度控制，只需一条命令即可搭建整个 Web 前端。\n\n**controller all --package\
  \ ~.web**\n\n就这样！在另一个 Shell 或 IDE 中，执行**mvn tomcat:run**或**mvn jetty:run**，然后将浏览器指向**http://localhost:8080**。你应该会看到类似图\
  \ 12-3 所示的页面。\n\n![Image 16](img/index-245_1.png)\n\n![Image 17](img/index-245_2.png)\n\
  \n![Image 18](img/index-245_3.jpg)\n\n![Image 19](img/index-245_4.png)\n\n第 12 章\
  \ ■ SPRING ROO\n\n*图 12-3. 运行我们的 Roo 应用程序*\n\n当然，这只是一个 Web 应用程序非常基础的脚手架，但它证明了 Spring\
  \ MVC Web 应用程序所需的一切都已就绪。在此基础上，你可以创建更多控制器或编辑已生成的控制器，以使应用程序满足业务需求。\n\n添加服务层和 DAO\n\
  \n为了追求简洁，Roo 只会生成*严格必要*的类。在构建真正简单的应用程序时，你可以将业务逻辑放在控制器或领域类中。\n\n对于非平凡的应用程序，我们强烈倾向于创建服务层。这样，你的控制器可以严格围绕\
  \ HTTP 语义管理和视图解析展开。你的 231\n\n第 12 章 ■ SPRING ROO\n\n业务逻辑则保留在领域模型中，并通过一个恰当的服务层外观进行封装。当建模需要在同一事务中操作多个实体的代码时，这一点尤其重要。\n\
  \n\n\nRoo 无法被合理地期望能够足够准确地预测您应用程序的意图，从而为您生成服务层类。幸运的是，由于 Roo 应用程序只是普通的 Spring 项目，您可以创建一个服务层类，并使用\
  \ **@Service** 原型注解对其进行标注，您的 Roo 应用程序将自动检测到它并将其纳入应用程序上下文。\n\n与服务层类似，Roo 并不会阻止您将\
  \ DAO 连接到应用程序中。最大的缺点在于 Roo 的附加组件基础设施不支持它们，因此您将无法享受到我们在此展示的一些好处，例如自动集成测试。\n\n**为何不使用\
  \ DAO？**\n\nRoo 团队坚持默认不生成 DAO 的立场是完全合理的。Roo 团队成员不遗余力地在他们出色的文档中解释了他们的决定。以下内容引自 *Spring\
  \ Roo 参考文档* 第 3 章“应用程序架构”的第 3.6 节“再见，DAO”（**http://static.springsource.org/spring-roo/reference/html/architecture.html**）。\n\
  \n如果我们稍加思考 DAO 的主要动机，就很容易理解为什么这些动机在 Roo 应用程序中不适用：\n\n• **测试**：在普通应用程序中，DAO 提供了一个接口，该接口可以很容易地在单元测试中被桩化。关于测试的一个有趣点是，在现代应用程序中，大多数人使用模拟（mocking）而不是桩化（stubbing），这使得直接模拟测试实际所需的一两个持久化方法（而不是桩化整个\
  \ DAO 接口这种粗糙做法）变得很有吸引力。在基于 Roo 的应用程序中，您只需模拟已引入实体的持久化相关方法即可。\n\n您可以对 Roo 实体上的实例方法使用常规的模拟方法，并对静态查找器方法使用\
  \ Spring Aspect 的 **@MockStaticEntityMethods** 支持。\n\n• **关注点分离**：拥有 DAO 层的一个原因是它允许追求更高内聚性的面向对象设计。高内聚等同于关注点分离，这降低了实现系统的概念负担。在基于\
  \ Roo 的应用程序中，关注点分离是通过独立的 ITD 实现的。概念负担也得以减轻，因为 Roo 处理了持久化方法，而不是强制程序员去处理它们。\n\n因此，在不需要\
  \ DAO 层的情况下，Roo 应用程序中仍然存在关注点分离。\n\n• **可插拔实现**：DAO 的另一个好处是它们简化了从一个持久化库切换到另一个的过程。在现代应用程序中，这种\
  \ API 抽象级别是通过 JPA 提供的。由于 Roo 在其生成的方法中使用 JPA，因此尽管没有正式的 DAO 层，插入替代实现的能力已经得到完全支持。您可以通过发出\
  \ `persistence setup` 命令并指定替代实现来亲自验证这一点。\n\n• **非 JPA 持久化**：某些实体可能使用没有 JPA 提供程序的技术进行存储。在这种情况下，Roo\
  \ 1.0.0 不直接支持这些实体。但是，如果只有少数实体受到此考虑的影响，则没有理由不能由用户提供一个或多个手写的 ITD，以保持与 Roo 应用程序其余部分（可能确实使用了一些\
  \ JPA）的概念对等。如果大量实体受到影响，该项目可能会受益于用户编写一个 Roo 附加组件，该组件将像 Roo 为 JPA 所做的那样自动管理 ITD。\n\
  \n• **架构原因**：人们常常因为一直以来的做法而偏好使用 DAO。虽然通常希望保持经过验证的现有方法，但在应用程序中采用 Roo 会大大降低 DAO 层的价值，以至于几乎没有什么（如果有的话）与工程相关的理由来保留它。\n\
  \n同样值得注意的是，大多数现代 RAD 框架都避免使用 DAO 层，并将持久化方法直接添加到实体中。如果您回顾与 Roo 类似的技术，您会发现这种避免使用 DAO\
  \ 层的做法是常见的、主流的，并且不会引起问题。\n\n**现在你看到我，现在你找不到我——移除 Roo**\n\nRoo 最受我们喜爱的方面之一是它很容易从项目中移除。由于您可以在现有的遗留项目上使用\
  \ Roo，并且很容易从源代码中移除 Roo 的任何痕迹，因此几乎没有理由不去尝试它。如果您从团队或组织那里遇到任何阻力，您可以在几分钟内将其移除，因此涉及的风险非常小。\n\
  \n移除 Roo 最好在理解 AspectJ 的 IDE（如 Eclipse 或 STS）中完成。以下是在安装了 AspectJ 开发工具 (AJDT) 的 Eclipse\
  \ 中的步骤：\n1.  停止任何可能正在运行的 Roo shell。\n2.  在 Eclipse 中，在 Java 浏览透视图下，右键单击您的项目并选择 Refactor\
  \ ` Push In。\n3.  您将看到一个列出所有 ITD 的对话框。选择“确定”以将所有代码从您的 **.aj** 源文件推送到相应的 **.java**\
  \ 源文件中。\n4.  对项目中的文件执行递归查找和替换，将正则表达式 **\\n.*Roo.*\\n** 替换为 **\\n**。这将移除所有 Roo 注解及其导入声明。\n\
  5.  从您的 Maven **pom.xml** 文件中移除所有 Roo 依赖项。\n\n就是这样。因为没有运行时依赖项，并且因为 Roo 构建在标准 Java\
  \ 技术之上，所以很容易脱离该框架，而不会丢失您所做的任何工作。\n\n**总结**\n\n正如您在本章中所见，尽管 Roo 还没有神奇到让程序员失业，但它确实在原始开发速度方面为您提供了巨大的飞跃。它通过在\
  \ AspectJ ITD 中自动生成样板代码，并在项目发展时修改您的 Spring 应用程序上下文配置，帮助消除了与企业 Java 应用程序开发相关的大量繁琐工作。\n\
  \nRoo 拥有基于 OSGi 和附加组件的强大架构。在 SpringSource 的支持下，随着 Roo 团队努力提供更多最佳解决方案以简化全球开发人员的生活，它很可能会以极快的速度发展。\n\
  \n在 JVM 上采用大多数 RAD 框架的最大障碍之一是，只有在编写新应用程序或在极少数情况下需要完全重写应用程序时，使用它们才是一个可行的选择。但是，Roo\
  \ 可以引入到现有应用程序中，而无需强制改变其他团队成员编写代码的方式。随着该框架在您的环境中得到验证，生产力的提升应该是无可辩驳的，您的开发团队很可能会接受这种积极的改变。我们强烈建议您尝试使用它来为您现有的基于\
  \ Spring 和 Hibernate 的应用程序实现一个新功能。\n\n**■ ■ ■\n\n**索引**\n\nSpring 配置, 37–40\n\n\
