  \n**}**\n\n**}**\n\n乍一看，**ArtEntityDTO** 与 **ArtEntity** 领域类非常相似。然而，仔细检查后，你会发现我们移除了一些引用。我们不再依赖于\
  \ **ArtData** 层级结构中的任何类。相反，我们将对特定 **ArtData** 子类的引用替换为一个 **String**，该字符串将包含相关图片的\
  \ URL（而不是一个包含图片元数据和二进制图片数据本身的包装类）。\n\n**ArtEntityDTO** 还省略了与 **Category** 领域类的多对多关联。这意味着我们将无法直接访问特定\
  \ **ArtEntity** 实例的关联类别。在我们的应用中，这并非关键需求。我们可以通过直接访问 **Category** 实例并导航到其子 **ArtEntity**\
  \ 实例，来访问与特定 **Category** 关联的 **ArtEntity** 实例。\n\n\n\n请注意，我们的 **ArtEntityDTO** 仍然包含一个\
  \ **comments** 属性。该属性由 **java.util.Set** 表示，但其中包含的是 **CommentDTO** 实例，而非 **Comment**\
  \ 领域类实例。\n\n我们尚未定义 **CommentDTO** 类，但与 **ArtEntityDTO** 类似，该类将作为 **Comment** 实体的简化表示。\n\
  \n我们为 **ArtEntityDTO** 添加的另一个细节是 **@XmlRootElement(name = \"artEntity\")** 注解。DTO\
  \ 类的一个用例是简化向 XML 或 JSON 的编组过程。\n\n**@XMLRootElement** 是 Java 架构用于 XML 绑定（JAXB）的注解——这是对象到\
  \ XML 编组的一项标准。本章稍后，我们将利用 JAXB 来渲染领域类的 XML 表示，作为 REST Web 服务的一部分。\n\n尽管 **ArtEntity**\
  \ 领域类与 **ArtEntityDTO** 之间的差异并不显著，但这些细微差别足以需要相当复杂的映射策略。例如，考虑将 **Comment** 实例集合映射到\
  \ **CommentDTO** 实例集合所需的工作。幸运的是，Dozer 能够处理这些类之间的映射和转换任务，而无需大量工作。\n\n接下来，让我们看看 **CommentDTO**\
  \ 类：\n\n**@XmlRootElement(name = \"comment\")**\n\n**public class CommentDTO {**\n\
  \n****private Long id;**\n\n**private String comment;**\n\n**private Date commentDate;**\n\
