  \n**private Date createDate;**\n\n****@Temporal(TemporalType.TIMESTAMP)**\n\n**@DateTimeFormat(style\
  \ = \"S-\")**\n\n**private Date displayDate;**\n\n****}**\n\n当然，Roo 并不能为我们包办一切。为了简化设计，框架设计者需要挑选并决定他们能够实际支持的约定。例如，在我们的画廊应用中，我们希望\
  \ `name` 字段是唯一的。虽然这是一个手动步骤，但实现起来相当简单。就像在任何使用 Bean 验证实现的项目中一样，只需应用 JSR-303 注解将列的值声明为\
  \ **unique**，如下所示：\n\n**@NotNull**\n\n**@Size(max = 50)**\n\n**@Column(unique=true)**\n\
  \n**private String name;**\n\n探索自动生成的测试基础设施\n\n现在，是时候看看我们之前创建 `ArtEntity` 类时使用的\
  \ `--**testAutomatically**` 参数了。\n\n正如我们在第 8 章中强调的，单元测试和集成测试对于企业级开发项目至关重要。Roo 在测试工具中配置所需一切的方法，是提高生产力的又一福音。Roo\
  \ 在 `ArtEntityDataOnDemand_Roo_DataOnDemand.aj` 源文件中创建了夹具数据，并在 `ArtEntityIntegrationTest_Roo_IntegrationTest.aj`\
  \ 中创建了一个集成测试。此外，还生成了两个 Java 源文件存根，供我们进一步丰富数据夹具，并编写自己的集成测试来执行 Roo 无法推断的业务逻辑。这让我们无需任何额外工作就能获得基本的测试覆盖率，同时也提供了自行完善测试所需的所有基础设施。\n\
  \n在整个 Roo 使用过程中，你都会注意到这种对细节的极致关注。\n\n以下是 Data On Demand ITD 的代码片段：\n\n**package\
