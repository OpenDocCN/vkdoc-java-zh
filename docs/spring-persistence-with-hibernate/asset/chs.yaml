  \ **set** 命令添加一个 **Category** 对象的集合。波浪号（**~**）字符是我们在启动项目时定义的 **topLevelPackage**\
  \ 的简写引用。\n\n以下是 **ArtEntity** 类中多对多关联的呈现方式：\n\n**@ManyToMany(cascade = CascadeType.ALL)**\n\
