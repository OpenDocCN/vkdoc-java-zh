  \n****@Entity**\n\n**@RooJavaBean**\n\n**@RooToString**\n\n**@RooEntity**\n\n**public\
  \ class ArtEntity {**\n\n第 12 章 ■ SPRING ROO\n\n**@NotNull**\n\n**@Size(max = 50)**\n\
