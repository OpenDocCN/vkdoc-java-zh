  \n![图片 3](img/index-12_3.jpg)\n\n**关于作者**\n\n■ **保罗·泰珀·费舍尔**最初在约翰霍普金斯大学开始从事技术工作，他在那里攻读研究生期间，花了数年时间为神经科学开发一个远程学习应用程序。他创立了两家科技初创公司：SmartPants\
  \ Media, Inc.（一家专注于交互式多媒体技术的软件开发公司）和 dialmercury.com（一家使用 VOIP 和 Java 开发电话应用程序的公司）。\n\
  \n保罗还曾担任 Wired.com 的技术经理，负责领导其在线出版物（包括 Wired.com、webmonkey.com 和 howto.wired.com）的软件开发团队，使用\
  \ Spring、Grails 和 Java 技术。\n\n目前，保罗是 Lime Wire 公司一项新音乐服务的工程总监，他使用敏捷方法论管理多个开发团队。该音乐服务由客户端和分布式服务器端组件组成，旨在实现水平可扩展性，以支持数百万最终用户和\
  \ TB 级数据。\n\n你可以通过以下网址阅读保罗的博客：**http://paultepperfisher.com**。\n\n■ **布莱恩·D·墨菲**是康泰纳仕集团的首席架构师和工程总监。他是\
  \ Spring 和 Hibernate 的早期采用者，并使用这两种技术为康泰纳仕旗下所有品牌（包括 wired.com、newyorker.com、epicurious.com\
  \ 和 vanityfair.com）提供在线支持，每月吸引数千万独立访客。布莱恩每天都应对构建可扩展分布式系统的挑战。他拥有罗格斯大学的计算机科学学士学位。你可以在\
  \ Twitter 上关注布莱恩，网址为\n\n**http://twitter.com/@brimurph**，或阅读他的博客：\n\n**http://turmoildrivendevelopment.com**。\n\
  \nxii\n\n![图片 4](img/index-13_1.jpg)\n\n**关于技术审校者**\n\n**Sia Cyrus** 在计算领域的经验跨越数十年，涉及软件开发的多个领域。在\
  \ 20 世纪 80 年代，他专注于欧洲的数据库开发。在 20 世纪 90 年代，他移居美国，专注于客户端-服务器应用程序。自 2000 年以来，他架构了许多结合\
  \ Spring 和 Hibernate 的中间层业务流程。最近，他专注于 Web 2.0、Ajax、GWT 和 Android。\n\nSia 是一位独立的软件顾问，是\
  \ Java 及 Java 企业级应用程序开发方面的专家。他负责创新和通用软件，并拥有一项数据库驱动用户界面的美国专利。Sia 为电信行业创建了一个非常成功的基于配置的框架，后来将其转换为\
  \ Spring 框架。他的热情可以概括为“开源中的企业架构”。\n\n在不尝试新技术的时候，他喜欢打冰球，尤其是和他的两个儿子 Jason 和 Brandon\
  \ 一起。可以通过 **sia.cyrus@comcast.net** 联系他。\n\nxiii\n\n**致谢**\n\n写书总是比你最初想象的要困难得多。虽然那些荒谬的深夜和失去的周末对作者来说是艰难的，但往往是他们身边的人最终承受了最多的痛苦。为此，我要感谢梅兰妮·科尔顿的无限耐心和毅力。她忍受了无数个凌晨\
  \ 4 点的夜晚和我嘈杂的打字声，这值得一枚勋章。没有她的支持、理解和灵感，这本书是不可能完成的。\n\n我还要感谢 Lime Company 的同事们，感谢他们持续的信任和支持。与这样一群才华横溢、尽职尽责的人共事是一种难得的经历，我很感激能有机会成为这次重要冒险的一部分。\n\
  \n我还要感谢所罗门·达斯基斯开启了这段旅程，以及他对技术——尤其是 Java 和 Spring——始终如一的热情。\n\n如果我不向我的父母表达我的感激之情，那将是我的疏忽。他们通过对我所做一切事情坚定不移的信任、支持和信念激励着我。\n\
  \n最后，我衷心感谢布莱恩·墨菲加入这个项目并推动其顺利进行。如果不是布莱恩的坚韧和动力，这本书永远不会面世。很荣幸能再次与你共事。\n\n——保罗·泰珀·费舍尔\n\
  \n我们要感谢 Apress 给予我们撰写本书的机会。特别感谢史蒂夫·安格林对我们的信任，并允许我们延长日程以深入涵盖高级主题。我们特别感谢玛丽·托宾，感谢她引导我们完成整个过程，并最终将我们拖过终点线。感谢汤姆·威尔士、玛丽莲·史密斯和\
  \ Sia Cyrus，他们在整个过程中提供了宝贵的反馈、建议和鼓励。由于他们的智慧和耐心，这本书变得更好。文本中的任何问题或错误均由我们负责。\n\n我要感谢我的妻子达尼亚，没有她，这本书就不可能完成。在我将无数夜晚和周末投入到写作中，时间远超预期时，她欣然承担了超级妈妈的角色。我要感谢我的儿子利亚姆，他是最棒的小孩。你带给我的快乐和对世界的新认识，远超你的想象。我还要感谢我们的第二个儿子，他将在本书出版后不久出生。我等不及要见到你了！\n\
