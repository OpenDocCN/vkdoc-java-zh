  \n**entity** 命令让你首次真正领略到 Roo 强大的代码生成能力。它自动创建了一个带有 JPA 和 Roo 注解的 **ArtEntity.java**\
  \ 实体 Bean。同时，它还创建了与我们的 Java 包结构相对应的文件夹结构。\n\n\n\n在此刻，你首次体验到了我们之前提到的那些 AspectJ ITD\
  \ 文件。生成的 **ArtEntity** 类本身非常精简，因为 Roo 已将大量经典的样板代码封装到一系列 ITD 文件中。请记住，**`.aj`** 文件中的所有内容将在编译时与你放置在\
  \ **`.java`** 源文件中的代码合并。\n\n让我们来看看创建的部分内容。以下是我们的 **ArtEntity.java** 类。\n\n**package\
  \ com.prospringhibernate.gallery.domain;**\n\n**import javax.persistence.Entity;**\n\
  \n**import org.springframework.roo.addon.entity.RooEntity;**\n\n**import org.springframework.roo.addon.javabean.RooJavaBean;**\n\
  \n**import org.springframework.roo.addon.tostring.RooToString;**\n\n**221\n\n第 12\
  \ 章 ■ SPRING ROO\n\n**@Entity**\n\n**@RooJavaBean**\n\n**@RooToString**\n\n**@RooEntity**\n\
  \n**public class ArtEntity {**\n\n**}**\n\n到目前为止，你应该对 **@Entity** 注解及其行为非常熟悉了。**@Roo**\
  \ 注解需要一些解释：\n\n• **@RooJavaBean** 告诉 Roo 为 **ArtEntity** 中存在的每个字段生成访问器和修改器。一旦我们添加一些字段，这些\
  \ getter 和 setter 将出现在名为 **ArtEntity_Roo_JavaBean.aj** 的文件中。\n\n• **ArtEntity_Roo_ToString.aj**\
  \ 源文件对应于 **@RooToString** 注解。该源文件将通过连接所有字段名称及其值，为我们的实体构建一个 **toString()** 方法表示。\n\
  \n• **@RooEntity** 负责生成与持久化相关的大部分代码。\n\n• 创建的 **ArtEntity_Roo_Configurable.aj**\
  \ 源文件将 Spring 的 **@Configurable** 注解添加到我们的 **ArtEntity** 类型中。此注解允许你从 Spring Bean\
  \ 工厂注入任何类型（例如 JPA 的 **EntityManager**）到 **ArtEntity** 类型中。\n\n此刻，最有趣的 ITD 文件可能是\
  \ **ArtEntity_Roo_Entity.aj**。它包含了你在 JPA 实体中期望找到的所有样板代码。在下面的清单中，请注意自动创建的代码包含一个自动生成的\
  \ **id**、一个合适的 **version** 字段、一个 **EntityManager** 引用，以及用于操作（如 **persist**、**remove**、**merge**\
  \ 和 **flush**）的方法和几个便捷的查找器。\n\n**package com.prospringhibernate.gallery.domain;**\n\
  \n**import com.prospringhibernate.gallery.domain.ArtEntity;**\n\n**import java.util.List;**\n\
  \n**import java.lang.Integer;**\n\n**import java.lang.Long;**\n\n**import java.lang.SuppressWarnings;**\n\
  \n**import javax.persistence.Id;**\n\n**import javax.persistence.Column;**\n\n**import\
  \ javax.persistence.Version;**\n\n**import javax.persistence.EntityManager;**\n\n\
  **import javax.persistence.GeneratedValue;**\n\n**import javax.persistence.GenerationType;**\n\
  \n**import javax.persistence.PersistenceContext;**\n\n**import org.springframework.transaction.annotation.Transactional;**\n\
  \n**privileged aspect ArtEntity_Roo_Entity {**\n\n第 12 章 ■ SPRING ROO\n\n**@PersistenceContext**\n\
  \n**transient EntityManager ArtEntity.entityManager;**\n\n**@Id**\n\n**@GeneratedValue(strategy\
  \ = GenerationType.AUTO)**\n\n**@Column(name = \"id\")**\n\n**private Long ArtEntity.id;**\n\
  \n**@Version**\n\n**@Column(name = \"version\")**\n\n**private Integer ArtEntity.version;**\n\
  \n**public Long ArtEntity.getId() {**\n\n**return this.id;**\n\n**}**\n\n**public\
  \ void ArtEntity.setId(Long id) {**\n\n**this.id = id;**\n\n**}**\n\n**public Integer\
  \ ArtEntity.getVersion() {**\n\n**return this.version;**\n\n**}**\n\n**public void\
  \ ArtEntity.setVersion(Integer version) {**\n\n**this.version = version;**\n\n**}**\n\
  \n**@Transactional**\n\n**public void ArtEntity.persist() {**\n\n**if (this.entityManager\
  \ == null)**\n\n**this.entityManager = entityManager();**\n\n**this.entityManager.persist(this);**\n\
  \n**}**\n\n**@Transactional**\n\n**public void ArtEntity.remove() {**\n\n**if (this.entityManager\
  \ == null)**\n\n**this.entityManager = entityManager();**\n\n**if (this.entityManager.contains(this))\
  \ {**\n\n**this.entityManager.remove(this);**\n\n**} else {**\n\n\n\n**ArtEntity\
  \ attached = this.entityManager.find(this.getClass(), this.id);** **this.entityManager.remove(attached);**\n\
  \n**}**\n\n**}**\n\n****@Transactional**\n\n**public void ArtEntity.flush() {**\n\
  \n**if (this.entityManager == null)**\n\n**this.entityManager = entityManager();**\n\
  \n第 12 章 ■ SPRING ROO\n\n**this.entityManager.flush();**\n\n**}**\n\n****@Transactional**\n\
  \n**public ArtEntity ArtEntity.merge() {**\n\n**if (this.entityManager == null)\
  \ this.entityManager = entityManager();** **ArtEntity merged = this.entityManager.merge(this);**\n\
  \n**this.entityManager.flush();**\n\n**return merged;**\n\n**}**\n\n****public static\
  \ final EntityManager ArtEntity.entityManager() {**\n\n**EntityManager em = new\
  \ ArtEntity().entityManager;**\n\n**if (em == null) throw new**\n\n**IllegalStateException(**\n\
  \n**\"Is the Spring Aspects JAR configured as an AJC/AJDT aspects library?)**\n\n\
  **\");**\n\n**return em;**\n\n**}**\n\n****public static long ArtEntity.countArtEntitys()\
  \ {**\n\n**return ((Number) entityManager().createQuery(**\n\n**\"select count(o)\
  \ from ArtEntity o\"**\n\n**).getSingleResult()).longValue();**\n\n**}**\n\n****@SuppressWarnings(\"\
  unchecked\")**\n\n**public static List<ArtEntity> ArtEntity.findAllArtEntitys()\
  \ {**\n\n**return entityManager().createQuery(\"select o from ArtEntity o\").getResultList();**\n\
  \n**}**\n\n****public static ArtEntity ArtEntity.findArtEntity(Long id) {**\n\n\
  **if (id == null) return null;**\n\n**return entityManager().find(ArtEntity.class,\
  \ id);**\n\n**}**\n\n****@SuppressWarnings(\"unchecked\")**\n\n**public static List<ArtEntity>\
  \ ArtEntity.findArtEntityEntries(int firstResult,** **int maxResults) {**\n\n**return\
  \ entityManager().createQuery(**\n\n**\"select o from ArtEntity o\"**\n\n**).setFirstResult(firstResult).setMaxResults(maxResults).getResultList();**\n\
  \n**}**\n\n****}**\n\n与 **@Entity** 注解一样，这段代码应该让人感到非常熟悉和自然。这正是 Roo 的精妙之处。它只是普通的\
  \ Java 代码，与你需要自己编写的代码并无二致。它已经遵循了最佳实践，并且当你升级到更新版本的 Roo 时，它也会随之升级，以应用更新的 Spring 和\
  \ Hibernate 约定。仅此一点，就可能为开发者节省无数小时的时间。同时，它还能通过降低升级成本和减少因疏忽大意引入的缺陷，为你的公司节省大量资金。\n\n\
  添加字段\n\n**field** 命令的用途不言自明。通过它，你可以向给定的实体添加成员。\n\n**field** 命令允许你指定属性，这些属性会被转换为\
  \ JPA 和 JSR-303 注解。\n\n在下面的一系列命令中，我们将添加几个 **string** 和 **date** 类型的字段，并对字段大小以及数据库中某列是否允许空值进行一些验证检查。\n\
  \n~.domain.ArtEntity roo> **field string --fieldName name --sizeMax 50 --notNull**\n\
  \n~.domain.ArtEntity roo> **field string --fieldName title --sizeMax 255 --notNull**\n\
  \n~.domain.ArtEntity roo> **field string --fieldName subtitle --sizeMax 255 --notNull**\n\
  \n~.domain.ArtEntity roo> **field string --fieldName description --sizeMax 255 --notNull**\n\
  \n~.domain.ArtEntity roo> **field string --fieldName caption --sizeMax 255 --notNull**\n\
  \n~.domain.ArtEntity roo> **field date --fieldName createDate --type java.util.Date\
  \ --notNull**\n\n~.domain.ArtEntity roo> **field date --fieldName displayDate --type\
  \ java.util.Date** 执行完每个命令后，你应该会在 Roo shell 中看到类似下面的输出。\n\n每个字段都会被添加到我们的 Java 类中，并且\
  \ ITD 文件也会相应更新。\n\n**Managed SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain/ArtEntity.java**\
  \ **Managed SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain/ArtEntity_Roo_JavaBean.aj**\
