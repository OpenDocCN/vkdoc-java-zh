  trans: '

    Gavin King 于 2001 年开始构建 Hibernate，旨在提供一种替代方案，以摆脱与 EJB 2 实体 Bean 相关的众所周知的问题。他觉得自己花在思考持久化上的时间比思考客户的业务问题还要多。Hibernate
    旨在提高生产力，使开发者能够更专注于对象建模，并简化持久化逻辑的实现。Hibernate 1.0 于 2002 年发布，Hibernate 2.0 于 2003
    年发布，Hibernate 3.0 于 2005 年发布。在整个时期，Hibernate 作为一款免费、基于 POJO 的 ORM 框架，凭借其完善的文档和极高的易用性，获得了巨大的发展势头。Hibernate
    提供了一种实用、简单、优雅且开源的开发企业级应用的方式。


    第 4 章 ■ 使用 Hibernate 进行持久化


    在 Hibernate 存在的前五年里，它没有遵循任何规范，也没有参与任何标准化流程。Hibernate 只是一个开源项目，你可以用它来解决实际问题并完成任务。在此期间，包括
    Gavin King 本人在内的许多关键人物开始共同致力于 JSR 220：Enterprise JavaBeans 3.0 的工作。他们的使命是创建一个新的标准，从开发者的角度解决与
    EJB 相关的痛点。当专家组推进 EJB 3.0 规范时，决定将与关系型数据库管理系统（RDBMS）交互的持久化组件拆分为独立的 API。Java 持久化
    API（JPA）由此诞生，它建立在许多核心概念之上，这些概念已在 TopLink 和 Hibernate 等 ORM 框架中得到实现和验证。作为 JSR 220
    专家组的一部分，Oracle 通过其 TopLink 产品提供了 JPA 1.0 的参考实现。JSR 220 于 2006 年最终确定，EJB 3 在 Sun
    公司对 Java 企业版 5（JEE 5）的定义中扮演了核心角色。


    ■ **注意** 请注意从 J2EE 到 JEE 的符号变化。J2EE 现在是 Java 企业版的旧称。是时候更新你的简历了！s/J2EE/JEE/


    这一演进对 JPA 来说非常完美。JPA 1.0 是 Java 持久化领域的一个巨大里程碑。然而，许多对于已经使用 Hibernate 等工具的开发者至关重要的功能，由于时间限制未能包含在内。JPA
    2.0 增加了许多重要特性，包括 Criteria API、缓存 API，以及对 Java 持久化查询语言（JPQL，JPA 的面向对象查询语言）的增强。JPA
    2.0 标准于 2009 年 12 月最终确定，作为一个新的独立 JSR，旨在纳入 Java EE 6 规范。Oracle 将 TopLink 的源代码和开发资源捐赠给了
    Sun，以创建 EclipseLink 项目。EclipseLink 随后成为 JPA 2.0 的参考实现。Hibernate 3.5 于 2010 年春季发布，完全支持
    JSR 317：JPA 2.0。


    这是一段漫长而曲折的历史，但最终结果相当不错。JPA 现在涵盖了开发大规模企业级 Java 应用所需的大部分功能。


    **那 JDO 呢？**


    Java 中的持久化标准并不像人们期望的那样清晰。你看，JDO 仍然非常活跃且运行良好。JSR 243 在 2006 年引入了 JDO 2.0，此后经历了数次小版本修订。在许多方面，JDO
    是 JPA 的超集。因此，像 DataNucleus 这样的 JDO 实现者能够将 JDO 规范和 JPA 规范都整合到他们的产品中。由于各种原因，Hibernate
    并未实现 JDO，并且 JDO 也完全没有被纳入 EJB 3 规范。尽管如此，近年来 JDO 还是经历了一定程度的复兴。


    因为 JDO 与数据存储无关，而 JPA 完全专注于关系型数据存储，所以存在许多有趣的使用场景不适合 JPA，但却恰好符合 JDO 的优势。例如，JDO 是在
    Google App Engine（GAE）上开发 Java 应用的关键组成部分。GAE 是一种“平台即服务”（PaaS），它构建在 Google 的 BigTable
    自定义数据存储之上，而非 RDBMS。


    那么，为什么不直接使用 JDO，而从一开始就放弃创建 JPA 呢？竞争性规范存在的原因有很多——有些是技术上的，有些是意识形态上的，还有些是政治上的。行业中的大公司对
    JCP 有着巨大的影响力，而它们显然有时会有相互竞争的动机。


    第 4 章 ■ 使用 Hibernate 进行持久化


    Hibernate 的定位


    现在我们已经讨论了标准，让我们来看看 Hibernate 的定位，并澄清一些常见的误解。


    首先，Hibernate 3 不是 EJB 3，反之亦然。EJB 3 是一个提供分布式、容器管理、服务器端组件架构的规范。EJB 3 封装了几个不同的规范，以促进许多功能，包括分布式事务管理、并发控制、消息传递、Web
    服务和安全性——仅举几例。EJB 3 规范假设持久化处理可以委托给 JPA 提供者。


    其次，Hibernate 不是 JPA。更准确地说，Hibernate 是众多提供符合标准的 JPA 实现的框架之一。第一个支持 JPA 1.0 的 Hibernate
    版本是 Hibernate 3.2，它于 2006 年秋季正式发布。


    像 Hibernate 这样的框架通常提供一些超出 JPA 规范范围的专门特性。因此，Hibernate 可以被视为 JPA 的超集。在一个极端，Hibernate
    的架构允许你完全不使用 JPA 规范的任何部分，仅使用 Hibernate Core。在另一个极端，你可以严格只使用 Hibernate 中符合 JPA 规范的部分。严格遵守
    JPA 规范可以确保与其他 JPA 实现（如 Apache 的 OpenJPA 项目）实现真正的无缝可移植性。


    在使用 Hibernate 时，我们建议开发者尽可能贴近 JPA 规范，但也不必过于苛求。由于开源项目的发展速度通常比 JCP 快得多，像 Hibernate
    这样的框架会为标准化流程未解决的问题提供解决方案。如果这些自定义功能能够减轻开发者的痛苦，请务必务实并善加利用！这正是标准化流程的魅力所在——各种规范的实现者可以自由创新，而最好、最成功的想法很可能会被纳入规范的未来修订版中。


    JPA 规范定义了一组可以应用于领域类的注解，以便将对象映射到数据库表，并将成员变量映射到列。JPA 还提供了一种类似 SQL 的语言，称为 JPQL，它可以用面向对象的方式查询数据库。要访问你映射到数据库的领域模型，或执行
    JPQL 查询，你需要使用 **javax.persistence.EntityManager**。


    在 JPA 出现之前，Hibernate 应用主要围绕使用 Hibernate 的 **SessionFactory** 和 **Session** 接口。简单来说，Hibernate
    的 **SessionFactory** 负责全局配置细节，而 **Session** 的作用域仅限于当前事务。JPA 的 **EntityManager**
    充当了 Hibernate 的 **SessionFactory** 和 **Session** 之间的桥梁；因此，它既了解你的数据库连接配置，也了解事务上下文。在本章中，你将学习一些关于
    JPQL、**EntityManager** 以及它们如何与 Spring 交互的知识，但主要学习如何设置一个使用 Hibernate 实现 JPA 2.0
    规范的应用。


    JPA 接口层次结构

