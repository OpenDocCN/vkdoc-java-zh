    **modelVersion** 用于声明项目 POM 的版本。这可以保护你在升级所使用的 Maven 版本时免受兼容性问题的影响。


    接下来是一系列通常被称为*项目坐标*的字段，因为它们能唯一标识项目。按照惯例，**groupId** 使用创建该项目的组织的反向域名。**artifactId**
    是给定 **groupId** 内的唯一名称，而 **version** 是项目的特定发布版本。任何两个项目都不能拥有相同的 **groupId:artifactId:version**
    组合。


    **packaging** 元素是项目坐标中的一个特殊属性。它不作为唯一标识符的一部分，但描述了给定项目的输出类型。默认值是 **jar**，用于生成 Java
    归档文件（JAR 文件）。由于我们正在构建一个 Web 应用程序，因此我们指定 **war** 来输出一个 Web 归档文件（WAR 文件）。


    **properties** 部分提供了一个便捷的位置，用于定义在配置其余部分中使用的变量。在我们的项目中，有十个 Spring JAR 文件被列为依赖项。逐个管理它们非常繁琐。使用
    **properties** 属性可以简化管理 Spring 版本升级的工作。


    最后，**build** 属性为你提供了一个位置，用于定义项目所需的插件以及其他内容。对于我们的项目，Tomcat Maven 插件提供了一种极好的机制，可以轻松地在
    Apache Tomcat 应用服务器上构建和运行我们的 Web 应用程序。


    至此，我们已经搭建了一个非常基本的应用程序框架。你可以在命令提示符下，从你的根目录 **gallery** 文件夹执行 **mvn initialize**。如果一切操作正确，Maven
    将获取你的依赖项并显示消息 **BUILD SUCCESS**。


