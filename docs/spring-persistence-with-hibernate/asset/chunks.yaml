    当在基本集群配置中使用时，Ehcache 并不会将全部缓存数据分布到集群中的每个节点上。相反，每个节点都包含一份完整的缓存数据集。虽然这会增加内存开销，但通过减少网络开销提升了性能。为了降低应用程序的内存占用，你应该调整每个缓存区域中存储的最大对象数量。同时，还应考虑特定缓存区域中可能存储的每个实体的平均大小，因为这会影响内存利用率。我们曾见过在缓存项数量较少的情况下，由于每个缓存项体积过大而导致内存问题逐渐显现。这些因素很少得到充分考量，却往往是造成重大瓶颈的原因。


    无论采用何种复制机制，Ehcache 都提供了两种不同的策略来实际通知集群中的不同节点有关变更的信息：


    • 默认策略是发送被更新缓存项的键以及更新后的值。这种策略称为 **replicateUpdatesViaCopy**，因为更新后的值会被发送到集群中的所有其他节点。虽然这种方法通常是保持不同节点同步的最快方式，但它也带来了通过网络发送更新值的开销。当更新后的值非常大时，这可能会对性能产生影响。


    • 另一种替代方案是仅向其他节点发送通知，告知它们应使其各自缓存中的数据失效。然后，一旦特定的缓存键失效，集群中的每个节点在下次尝试访问该特定实体（或集合）时，最终会从数据库中重新加载数据。显然，这会给数据库带来额外的负载——当集群中其他每个节点发生缓存未命中时，它们都需要重新查询数据库以填充各自的缓存。这种方法的优势在于，只需要将缓存键传输到其他节点。


    默认的复制行为是异步通知其他节点变更，允许缓存传播在后台进行，并且不影响原始操作（通知者）的响应时间。在数据一致性是首要任务的高并发场景中，Ehcache
    可以改为同步执行复制，即直到集群中的其他节点成功收到通知后，缓存操作才会返回。由于这会对性能产生显著影响，因此只应在特殊情况下使用。


    配置复制


    Ehcache 集群实现不需要对应用程序的代码或架构进行任何更改。你只需要修改 Ehcache 配置即可。


    为了在我们的示例中启动集群缓存配置，我们需要更新 **ehcache.xml** 文件。我们将选择 JGroups 复制机制。以下是 Ehcache 文档建议的代码片段：


    **151


    第 9 章 ■ 最佳实践与高级技术


    **<cacheManagerPeerProviderFactory**


    **class="net.sf.ehcache.distribution.jgroups.JGroupsCacheManagerPeerProviderFactory"**


    **properties="connect=UDP(mcast_addr=231.12.21.132;mcast_port=45566;ip_ttl=32;**
    **mcast_send_buf_size=150000;mcast_recv_buf_size=80000):**


    **PING(timeout=2000;num_initial_members=6):**


    **MERGE2(min_interval=5000;max_interval=10000):**


    **FD_SOCK:VERIFY_SUSPECT(timeout=1500):**


    **pbcast.NAKACK(gc_lag=10;retransmit_timeout=3000):**


    **UNICAST(timeout=5000):**


    **pbcast.STABLE(desired_avg_gossip=20000):**


    **FRAG:**


    **pbcast.GMS(join_timeout=5000;join_retry_timeout=2000;**


    **shun=false;print_local_addr=true)"**


    **propertySeparator="::"**


    **/>**


    这些细节指定了 Ehcache 的 **cacheManagerPeerProviderFactory** 的 JGroup 实现的网络和通信细节。


    接下来，我们必须为每个缓存区域添加一个 **cacheEventListenerFactory** 元素。如果我们没有为每个缓存区域指定具体的配置，我们可以将此元素添加到默认区域配置中。让我们按如下方式配置
    **ArtEntity** 缓存区域：


    **<cache name="com.prospringhibernate.gallery.domain.ArtEntity"**


    **maxElementsInMemory="5000"**


    **eternal="false"**


    **timeToIdleSeconds="900"**


    **timeToLiveSeconds="1800"**


    **overflowToDisk="false">**


    ****<cacheEventListenerFactory**


    **class="net.sf.ehcache.distribution.jgroups.JGroupsCacheReplicatorFactory"**


    **properties="replicateAsynchronously=true,**


    **replicatePuts=true,**


    **replicateUpdates=true,**


    **replicateUpdatesViaCopy=true,**


    **replicateRemovals=true"/>**


    **</cache>**


    在此配置中，我们将 **replicateAsynchronously** 设置为 **true**，确保更新异步进行。此外，我们将 **replicateUpdatesViaCopy**
    设置为 **true**，确保更新后的缓存元素的值直接发送到所有其他集群节点。大多数其他属性应该是不言自明的。


    第 9 章 ■ 最佳实践与高级技术


    **使用外部缓存服务器**


    另一种限制一致性问题的缓存解决方案是使用独立的缓存服务器。


    Memcached，一个流行的开源内存对象缓存系统，采用了类似的策略。


    Ehcache 提供了一个缓存服务器实现，这是一个自包含的缓存服务器，在其自己的 JVM 中运行。由于缓存服务器不与应用程序集群中的任何特定节点绑定，因此缓存之间版本冲突的风险不大（因为只有一个外部缓存）。如果你担心缓存服务器成为单点故障，你可以将其部署在集群配置中。


    使用外部缓存服务器可以减少缓存数据不一致的可能性。


    然而，你必须权衡这一点与网络开销的代价，因为对缓存服务器的所有调用都必须通过网络进行（而不是在进程内）。再次强调，我们建议你尝试各种缓存选项，并选择最适合你应用程序需求的解决方案。


    总结


    在本章中，我们探讨了评估和改进应用程序性能的几种策略。


    Hibernate 开发者最常见的陷阱之一是 N+1 次查询问题。这个问题通常源于未能正确调整领域对象的映射配置或 DAO 层中的查询。理解这个问题如何出现以及如何检测它，对于确保良好的
    ORM 性能至关重要。虽然调优确实取决于应用程序的独特需求，但通常的最佳解决方案是考虑服务层、控制器层或视图层中需要哪些数据，并优化你的查询以尽可能高效地加载这些数据。你看到使用
    fetch-join 通常是初始化关联而不需要多次查询的有效方法。依赖 Hibernate 的批处理能力也是一个不错的策略，尽管它并不总是那么有效。


    另一种提高性能的技术是利用 Hibernate 的缓存能力。


    正确调优缓存可以对应用程序性能产生显著影响。然而，如果操作不当，缓存也可能降低性能。例如，过度激进的缓存可能会触发 **OutOfMemoryException**
    异常。了解 Hibernate 中不同的缓存配置选项将帮助你选择合适的行为。尝试不同的 TTL 设置也很重要。

