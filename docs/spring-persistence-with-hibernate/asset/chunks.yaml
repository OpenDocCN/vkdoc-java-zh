    还有几个待解决的问题。在拥有一个完整可运行的系统之前，我们需要完成以下工作：


    • 设置一个能够识别**Person**领域对象的 JPA 环境。


    • 配置数据库连接。


    • 管理系统的事务。


    • 将所有内容注入到 DAO 中。


    我们将首先从 JPA 端进行设置，然后处理 Spring 端的配置。


    最简 JPA 设置


    JPA 要求你创建一个**META-INF/persistence.xml**文件。我们将设置最简单的配置：


    **<persistence**


    ****xsi:schemaLocation = "http://java.sun.com/xml/ns/persistence** **http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd"**


    **version="2.0">**


    ****<persistence-unit name="galleryPersistenceUnit" transaction-type="RESOURCE_LOCAL"/>**


    ****</persistence>**


    这将创建一个名为**galleryPersistenceUnit**的持久化单元。建议你以能够表达与特定数据库关系的方式来命名持久化单元，以便日后可以轻松地集成更多数据存储，而不会使
    Bean 定义变得过于混乱。默认情况下，所有标记为**@Entity**的类都将被添加到此持久化单元中。


    现在我们已经启动并运行了 JPA，需要让 Spring 配置知道**persistence.xml**的存在。接下来我们将进行设置。


    第 4 章 ■ 使用 Hibernate 进行持久化


    **更多 JPA 配置选项**


    在**persistence.xml**文件中，你可以选择性地配置要为特定单元包含哪些类，但这通常仅在更复杂的场景下才需要，例如在单个应用程序中管理多个数据库。当你确实需要将实体映射到特定的**persistence-unit**时，请像这样向**persistence.xml**添加**<class>**元素：


    **<persistence**


    ****xsi:schemaLocation="http://java.sun.com/xml/ns/persistence** **http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd"**


    **version="2.0">**


    **<persistence-unit name="galleryPersistenceUnit" transaction-type="RESOURCE_LOCAL">**


    **<class>**


    **com.prospringhibernate.gallery.domain.Person**


    **</class>**


    **</persistence-unit>**


    **</persistence>**


    此外还有映射文件的概念。你可以不内联定义类，而是声明一个映射文件，并在**persistence.xml**文件的**<mapping-file>**元素中引用它。该文件允许你声明实体类，甚至可以覆盖映射配置，例如列名和检索
    ID 的机制。这种方法还允许你映射没有任何 JPA 注解的类。


    **persistence.xml**也可用于定义实现特定的属性，例如 Hibernate 属性。Spring 的 JPA 配置要求你在**persistence.xml**的**<properties><property>**元素中配置这些属性。不幸的是，这意味着除非你使用更复杂的构建脚本，否则无法将特定于环境的配置细节放入
    Spring 属性文件中。


    JPA 具有极高的可配置性和丰富的功能。有关**persistence.xml**配置文件的更多详细信息，请参阅专门讨论此主题的书籍，例如 Mike Keith
    和 Merrick Schincariol 合著的《Pro JPA 2: Mastering the Java Persistence API》（Apress，2009
    年）。


