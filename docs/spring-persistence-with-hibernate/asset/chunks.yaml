    \ aspects, such as whether a particular property should be lazily loaded. If you\
    \ don’t want certain fields persisted, you need to specify that these properties\
    \ are transient using the `@Transient` annotation.\n\n> **Note:** Hibernate offers\
    \ control over fetching associations, allowing related entities to be lazily loaded\
    \ — that is, only when needed, rather than when the originating object is loaded\
    \ from the database. This has dramatic performance benefits (if used properly),\
    \ but can also degrade performance if you’re not careful. We’ll be covering lazy\
    \ loading in more detail in Chapter 9.\n\nIn addition to the `@Transient` and\
    \ `@Basic` annotations, you can also use the `@Temporal` annotation for controlling\
    \ the way date or time-based properties are mapped to the database. In our `Comment`\
    \ class, we specify the following to declare that a `Date` property be persisted\
    \ in the database as a timestamp:\n\n```java\n@Temporal(TemporalType.TIMESTAMP)\n\
    public Date getCreatedDate() {\n    return this.createdDate;\n}\n```"
