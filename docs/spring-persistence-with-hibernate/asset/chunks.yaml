- fmt: 'This is a nice, simple approach for generating a small amount of data for
    each entity in a given application, and it provides the perfect springboard to
    strive for complete test coverage. You may verify that all of the generated tests
    are working by executing `perform tests` within your Roo shell or by running `mvn
    test` from your command prompt.


    ## Mapping Associations


    The `field` command has some special properties that deliver support for associations
    between entities as well. From the shell, you can specify one-to-many or one-to-one
    relationships with the `reference` attribute, or you can build many-to-many mappings
    via the `set` property.


    In the following example, we re-create our `Category` entity, and then establish
    a many-to-many relationship between our `ArtEntity` and `Category` types.


    ```

    ~.domain.ArtEntity roo> entity --class com.prospringhibernate.gallery.domain.Category

    --testAutomatically

    ~.domain.Category roo> field string --fieldName name --notNull --sizeMax 50

    ~.domain.Category roo> field string --fieldName description --notNull --sizeMax
    2000

    ~.domain.Category roo> field set --fieldName artEntities

    --element com.prospringhibernate.gallery.domain.ArtEntity

    ~.domain.Category roo> focus --class ~.domain.ArtEntity

    ~.domain.ArtGallery roo> field set --fieldName categories

    --element com.prospringhibernate.gallery.domain.Category

    ```


    Creating the `Category` type is nearly identical to what we did previously to
    create `ArtEntity`, until the last property, `artEntities`, which establishes
    a collection of `ArtEntity` objects. We then use the `focus` command to change
    the context of our shell over to the `ArtGallery` type, and we add a collection
    of `Category` objects, again using the `set` command. The tilde (`~`) character
    offers a shorthand reference for the `topLevelPackage` we defined when we initiated
    the project.


    Here’s how the many-to-many association appears within the `ArtEntity` class:


    ```

    @ManyToMany(cascade = CascadeType.ALL)

    private Set<com.prospringhibernate.gallery.domain.Category> categories =

    new java.util.HashSet<com.prospringhibernate.gallery.domain.Category>();

    ```


    This, too, should be quite familiar to you by now, and Roo makes the setup trivial.


    ## Modeling Inheritance


    Now we will walk through setting up an aspect of our domain that requires inheritance.
    Here too, the framework designers have elected to keep Roo simple, rather than
    allow enormous complexity to bleed into the syntax in the Roo shell. Having a
    strong grasp of the inner workings of Spring and Hibernate becomes vital on any
    real project, whether or not you’re using a RAD framework. As you’ll see, Roo
    will help you stub out these classes, but you’ll still need to do a small amount
    of work on your own to actually make the associations work.


    First, the following commands create our entity and establish a one-to-many relationship
    between `ArtData` and `ArtEntity`.


    ```

    ~.domain.ArtGallery roo> entity --class com.prospringhibernate.gallery.domain.ArtData

    --testAutomatically

    ~.domain.ArtData roo> field set --fieldName artEntities

    --element com.prospringhibernate.gallery.domain.ArtEntity

    ```


    In order to introduce single-table inheritance between `ArtData` and its three
    subclasses—`ArtDataThumbnail`, `ArtDataStorage`, and `ArtDataGallery`—we need
    to manually add several annotations via either an IDE or text editor. The code
    in bold should be added manually.


    ```

    package com.prospringhibernate.gallery.domain;


    import java.util.Set;

    import javax.persistence.Lob;

    import javax.persistence.Basic;

    import javax.persistence.Entity;

    import javax.persistence.ManyToMany;

    import javax.persistence.CascadeType;

    import javax.persistence.Inheritance;

    import javax.persistence.InheritanceType;

    import javax.persistence.DiscriminatorType;

    import javax.persistence.DiscriminatorValue;

    ```'
