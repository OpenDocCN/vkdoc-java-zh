    \ <= 0) {\n            throw new AuthenticationException(\"No users found\");\n\
    \        } else {\n            return results.get(0);\n        }\n\n    }\n\n\
    \    public Person getPersonByUsername(String username) throws DataAccessException,\
    \ EntityNotFoundException {\n\n        List<Person> results = null;\n        Query\
    \ query = entityManager.createQuery(\n            \"from Person as p where p.username\
    \ = :username\"\n        );\n        query.setParameter(\"username\", username);\n\
    \        results = query.getResultList();\n\n        if (results == null || results.size()\
    \ <= 0) {\n            throw new EntityNotFoundException(username + \" not found\"\
    );\n        } else {\n            return results.get(0);\n        }\n\n    }\n\
    \n}\n```\n\nThe Spring `@Repository` annotation has three primary purposes in\
    \ this example:\n\n- It tells Spring that this class can be imported via classpath\
    \ scanning.\n- It’s a marker for Spring to know that this class requires DAO-specific\
    \ `RuntimeException` handling.\n- We specify the name to be used in the Spring\
    \ context to represent this class. By specifying that the DAO should be recognized\
    \ as `personDao`, via `@Repository(\"personDao\")`, we can refer to this DAO elsewhere\
    \ in our Spring configuration simply as `personDao`, rather than `personDaoJpa`.\
    \ This allows us to change the underlying DAO implementation to something else\
    \ with far less friction.\n\nUsing the `@Repository` annotation allows us to quickly\
