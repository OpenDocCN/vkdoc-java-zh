  raw: '• *Detached*: The Detached state comes into play when the object is no longer
    associated with an **EntityManager** or persistence context. Detached objects
    are often returned from a persistence tier to the web layer where they can be
    displayed to the end-user in some form. Changes can be made to a detached object,
    but these changes won’t be persisted to the database until the entity is reassociated
    with a persistence context.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    JPA Configuration


    A few pieces of the puzzle remain. Before we have a fully working system, we need
    to do the following:


    • Set up a JPA environment that knows about our **Person** domain object.


    • Configure a database connection.


    • Manage the system’s transactions.


    • Inject all of that into the DAO.


    We’ll first look at the setup from the JPA side, and then handle the Spring side
    of the configuration.


    Bare-Bones JPA Setup


    JPA requires you to create a **META-INF/persistence.xml** file. We’re going to
    set up the easiest possible configuration:


    **<persistence**


    ****xsi:schemaLocation = "http://java.sun.com/xml/ns/persistence** **http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd"**


    **version="2.0">**


    ****<persistence-unit name="galleryPersistenceUnit" transaction-type="RESOURCE_LOCAL"/>**


    ****</persistence>**


    This creates a persistence unit called **galleryPersistenceUnit**. It’s recommended
    that you name your persistence unit in a way that expresses the relationship to
    a given database so that you may easily incorporate more datastores later without
    your bean definitions getting too confusing. By default, all classes marked as
    **@Entity** will be added to this persistence unit.


    Now that we have JPA up and running, the Spring configuration needs to be made
    aware of the **persistence.xml**. We’ll set that up next.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    **MORE JPA CONFIGURATION OPTIONS**


    In the **persistence.xml** file, you can optionally configure which classes you
    want to include for a given unit, but generally that’s necessary only for more
    complicated scenarios, such as managing multiple databases in a single application.
    When you do need to map entities to a particular **persistence-unit**, add **<class>**
    elements to the **persistence.xml** like so:


    **<persistence**


    ****xsi:schemaLocation="http://java.sun.com/xml/ns/persistence** **http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd"**


    **version="2.0">**


    **<persistence-unit name="galleryPersistenceUnit" transaction-type="RESOURCE_LOCAL">**


    **<class>**


    **com.prospringhibernate.gallery.domain.Person**


    **</class>**


    **</persistence-unit>**


    **</persistence>**


    There’s also a concept of mapping files. Rather than define classes inline, you
    can declare a mapping file that’s referred to in the **persistence.xml** file
    in a **<mapping-file>** element. That file allows you to declare entity classes,
    and even override mapping configuration, such as column names and the mechanisms
    for retrieving IDs. This approach also lets you map classes that don’t have any
    JPA annotations whatsoever.


    The **persistence.xml** can also be used to define implementation-specific properties,
    such as Hibernate properties. Spring’s JPA configuration requires you to configure
    these properties in **persistence.xml** in a


    **<properties><property>** element. Unfortunately, that means that you won’t be
    able to put your environment-specific configuration details in a Spring property
    file without getting fancier with your build scripts.


    JPA is extremely configurable and feature-rich. For more details on the **persistence.xml**
    configuration file, see a book devoted to the topic, such as *Pro JPA 2: Mastering
    the Java Persistence API* by Mike Keith and Merrick Schincariol (Apress, 2009).


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    Spring Integration


    We need a way to create a usable **EntityManager** in the Spring **ApplicationContext**.
    In typical Spring fashion, there is more than one way to configure JPA. The following
    are some of the options:'
