    \ properties with the same name, Dozer will attempt to automatically map these\
    \ properties, unless it is told otherwise. Dozer is also able to handle conversion\
    \ between types, so even if mapped properties are not of the same type, Dozer\
    \ will attempt to convert from one type to another using one of its built-in converters.\
