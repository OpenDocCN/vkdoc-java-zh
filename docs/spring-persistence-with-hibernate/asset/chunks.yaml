    \ HQL 或 JPQL 查询严重错误的方法可以完美编译，但只会在运行时抛出异常或以意外方式执行。\n\nHQL 和 JPQL 也不利于表达动态查询，即查询的属性直到运行时才完全确定。例如，如果我们希望用户能够通过指定任意数量的标签来搜索图像，那么使用\
    \ HQL 或 JPQL 很难表示这种查询。为了实现这一点，我们可能会尝试通过连接每个标签参数的条件来动态生成 JPQL 查询字符串。显然，这是解决此问题的一种脆弱且笨拙的方法。\n\
