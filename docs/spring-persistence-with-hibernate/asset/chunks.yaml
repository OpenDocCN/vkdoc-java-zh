    ****}**


    CHAPTER 2 ■ SPRING BASICS


    As with everything in Spring, there’s actually more than one way to skin a cat.
    Instead of specifying **init-method** in the configuration or using the **@postConstruct**
    annotation, you could have your class implement the **InitializingBean** interface.
    To a certain extent, using this interface makes things a bit easier, since you
    don’t even need to change your configuration. The interface just requires you
    to implement an **afterPropertiesSet()** method, which will automatically be detected
    and called for you once Spring has finished setting all the configured properties.
    The downside with this approach is that you sacrifice your simple POJOs and tightly
    couple your beans to Spring. While coupling to Spring isn’t terrible, the cleaner
    approach is to keep initialization details entirely within configuration and out
    of the code. So let this be your mantra: *keep it in the configuration*.


    Similar to acting on bean creation, you may also trigger custom logic when beans
    are destroyed. You can accomplish this in several ways:


    • By implementing the **DisposableBean** interface, which is essentially the inverse
    of **InitializingBean**


    • By applying a **@preDestroy** annotation to the method in question


    • By configuring the **destroy-method** parameter in your Spring XML configuration,
    which is what we recommend to minimize tight coupling


    Now that you know how to tap into the creation and destruction life-cycle events
    in Spring, there’s another aspect of bean management that’s crucial to understand
    when building enterprise applications: bean scoping.


    Understanding Bean Scopes


    By default, beans defined in Spring are all scoped as singletons. A *singleton*
    is a class that is guaranteed to have only a single instance in the JVM. Singletons
    are great for storing application state, or for any case where you want to be
    assured that there is only ever one reference in your application. Normally, you
    would need to write code to achieve this assurance.


    The typical singleton meets the following criteria:


    • Has a static method to return the single instance of the class (stored as a
    static reference within the class)


    • Has a private constructor, ensuring that only the singleton itself can ever
    create a new instance (which is your assurance that you won’t accidentally create
    more than once instance simply by invoking **new Singleton()**)


    A singleton in your application might look like this:


    **public class Singleton {**


    **private static final Singleton INSTANCE = new Singleton();**


    **private Singleton() {**


    **}**


    **public static Singleton getInstance() {**


    **return INSTANCE;**


    **}**


    **}**


    CHAPTER 2 ■ SPRING BASICS


    Although the preceding sample illustrates a useful design pattern, Spring obviates
    the need to write this boilerplate code, once again allowing you to move these
    details into the configuration. By default, all Spring beans are singletons. If
    this is not your intention, you need to specify a different scope for your bean.


    In Spring 1\. *x*, beans were either prototype beans or singletons. *Prototype*
    means that each new call to **getBean()** will return a brand-new instance of
    your bean. Singleton beans guarantee that there can only ever be a single instance
    of your class in the entire Spring **ApplicationContext**. Spring 2\. *x* introduced
    several new standard scopes, as well as the ability to define custom scopes. Spring
    3\. *x* added a thread scope, though it’s not registered by default. Table 2-1
    lists the bean scopes that are provided by Spring out of the box.


    *Table 2-1\. Spring Bean Scopes*


    **Scope Description**


    Singleton


    Scopes a single bean definition to a single object instance per Spring IoC


    container. This is the default scope.


    Prototype


    Scopes a single bean definition to any number of object instances.


    Request


    Scopes a single bean definition to the life cycle of a single HTTP request; that
    is, each HTTP request has its own instance of a bean created off the back of a
    single bean definition. This scope is valid only in the context of a web-aware
    Spring **ApplicationContext**.


    Session


    Scopes a single bean definition to the life cycle of an HTTP session. This scope
    is valid only in the context of a web-aware Spring **ApplicationContext**.


    Global session


    Scopes a single bean definition to the life cycle of a global HTTP session. This
    scope is valid only in the context of a web-aware Spring **ApplicationContext**,
    and typically only in a portlet context.


    Simple thread


    If for some reason, the request, session, or global session scopes don’t satisfy
    your needs, you may enable the simple thread scope to bind a bean definition to
    an instance of **ThreadLocal**.


    So now you know how to create beans in the Spring **ApplicationContext** and manage
    their scope and life cycle. The next piece of the puzzle is how to retrieve those
    beans from the Spring container within your application.


    CHAPTER 2 ■ SPRING BASICS


    Dependency Injection and Inversion of Control


    Enterprise applications are composed of many objects that provide behavior to
    emulate business processes. Two very important design patterns have emerged to
    manage the relationships between objects in an object-oriented application:


    *Dependency injection (DI)*: Classes that employ dependency injection specify
    the objects that they interact with through constructor arguments, factory method
    parameters, or public mutators (aka *setters*). With a dependency-injection container
    or framework like Spring, the ability to externalize simple class properties is
    just the beginning. Developers can create a complex tree of dependencies, leaving
    the work of figuring out how each dependency is created and set (also called *injected*
    or *wired*) to the Spring lightweight container.


    *Inversion of Control (IoC)*: When object location or instantiation is removed
    as a responsibility for a given bean and instead left to the framework, control
    has been *inverted*. This inversion of control is a very powerful concept and
    represents the foundation on which the Spring Framework is based.


    Dependency injection and IoC lead you down a path toward clean code that embodies
    high cohesion and loose coupling.


    Setter-Based Dependency Injection


    Although frighteningly simple, Spring’s use of POJOs as a means of configuration
    and integration is quite powerful. Consider the example of a fictitious **User**
    bean, which could be used in an application to specify user credential information:


