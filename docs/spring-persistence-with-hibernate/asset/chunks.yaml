    • **REPEATABLE_READ**：表示防止脏读和不可重复读，但可能发生幻读。


    • **SERIALIZABLE**：表示防止脏读、不可重复读和幻读。


    Spring 还提供了一种指定事务某些基本属性的方法。例如，你可以使用 **readOnly** 属性来指示事务是否为只读（与执行插入或更新的事务相对）。**readOnly**
    值为 **true** 可确保该方法仅执行读取操作。


    **timeout** 属性定义了事务在不提交或回滚的情况下可以存活的时间。如果正在运行的事务在未完成的情况下超时，Spring 将自动回滚该事务。


    Spring 的事务支持提供了一种指定在抛出异常时事务应如何行为的方法。例如，我们可以指定，每当我们的 **ArtEntityService** 中的方法抛出
    **InvalidImageException** 时，当前正在运行的事务应被回滚。


    Spring 提供了 **rollbackFor** 和 **rollbackForClassName** 属性来实现此行为。此设置允许你指定一个异常类或类名（取决于使用的设置）数组，当抛出这些异常时，将触发当前正在执行的事务自动回滚。


    类似地，你可以通过使用 **noRollbackForClass** 和 **noRollbackForClassName** 属性来指定相反的行为（哪些异常不应触发回滚）。这些选项的工作方式与
    **rollbackFor** 和 **rollbackForClassName** 相同，但如果在执行此事务时抛出了指定的异常类之一，则会阻止事务回滚。


