- fmt: '# Domain-Driven Design and Spring Roo


    Domain-driven design (DDD) is a methodology for developing software popularized
    by Eric Evans in his exceptional book *Domain-Driven Design: Tackling Complexity
    in the Heart of Software* (Addison-Wesley Professional, 2003). DDD attempts to
    model real-world systems or processes in software by focusing on and refining
    your application’s domain layer throughout the entire development process. To
    achieve this, Evans advocates that you begin your work in a highly iterative and
    interactive manner with a domain expert to define a *ubiquitous language*. This
    ubiquitous language provides consistent terminology and definitions so that engineers
    and domain experts can effectively communicate about entities in the system.


    `Spring Roo` doesn’t explicitly advocate DDD, but since Roo places so much emphasis
    on your entity layer, the principles of DDD are a natural fit. As an introduction
    to Roo, we’ll walk through using it to create our art gallery applications domain,
    shown in Figure 12-1.


    *Figure 12-1. The art gallery domain model*


    ## Getting Started with Roo


    Be sure that you have the prerequisites, Java 5 or higher and Maven 2.0.9 or higher,
    configured on your system. Then download and follow the installation instructions
    for the stand-alone version of Roo available at **www.springsource.org/roo** to
    ensure that `roo` is available on your path.


    Next, create a directory on your machine for your new project, named `rooGallery`.
    Change into this new directory and execute `roo`. You’ll enter the Roo shell environment
    and be presented with a Roo welcome screen, as shown in Figure 12-2.


    ![Image 9](index-233_1.png)

    ![Image 10](index-233_2.png)

    ![Image 11](index-233_3.jpg)

    ![Image 12](index-233_4.png)

    ![Image 13](index-233_5.png)

    ![Image 14](index-233_6.png)

    ![Image 15](index-233_7.png)


    *Figure 12-2. The Roo shell*


    > **Tip** As you explore Roo, you can use `hint` and tab completion liberally
    to get contextual help from Roo. Each Roo command has an extensive list of options
    that you may specify. Be sure to fiddle with the intelligent tab completion in
    the Roo shell as you tinker with commands to see how Roo steers you down the right
    path, eliminating any need to memorize the Roo commands.


    Before we create a new project, in the Roo shell, type in the `osgi` command and
    use tab completion to see all of the options that Roo provides. One of the most
    basic OSGi commands supported by the Apache Felix runtime upon which Roo is based
    is `ps`. Executing `osgi ps` will list all of the OSGi bundles in the Roo runtime,
    along with version information and the status of the bundle, such as ACTIVE, STARTING,
    and so on.


    ## Creating a New Project


    Let’s get down to business. First, create your project using the `project` command
    at the Roo shell, as follows:


    ```

    roo> project --topLevelPackage com.prospringhibernate.gallery

    ```


    ```

    Created ~/rooGallery/pom.xml

    Created SRC_MAIN_JAVA

    Created SRC_MAIN_RESOURCES

    Created SRC_TEST_JAVA

    Created SRC_TEST_RESOURCES

    Created SRC_MAIN_WEBAPP

    Created SRC_MAIN_RESOURCES/META-INF/spring

    Created SRC_MAIN_RESOURCES/META-INF/spring/applicationContext.xml

    Created SRC_MAIN_RESOURCES/log4j.properties

    ```


    This command creates all of the necessary directories for a Maven project. Additionally,
    it sets up your Maven `pom.xml` file and creates a Spring `applicationContext.xml`
    file.


    From the Roo shell, execute `hint` to see how the messaging has updated to reflect
    the current context of your application. You’ll see that you have the basic structure,
    but no mechanism for persistence. So we’ll follow Roo’s suggestion and configure
    our JPA provider and associated database using Hibernate and the H2 in-memory
    database, as follows:


    ```

    roo> persistence setup --provider HIBERNATE --database H2_IN_MEMORY

    ```


    You’ll notice in the resulting output that Roo creates a JPA `persistence.xml`
    configuration as well as a `database.properties` file. It also modifies the `applicationContext.xml`
    file and introduces a handful of dependencies to the `pom.xml` file.


    After just two commands in Roo, you now have a completely configured Spring 3
    and Hibernate 3.5 application. Roo has created many of the constructs we covered
    earlier in this book automatically with sensible defaults, including all the Spring
    beans necessary for JPA and declarative transaction management.


    > **Note** As someone who has been using Unix variants for almost two decades,
    it’s hard not to fall in love with Roo’s interactive shell. The Roo shell is so
    much more than just an interface for executing commands. Whenever you start up
    a Roo shell, whether it’s from a Unix prompt or within an IDE, Roo keeps tabs
    on the files in your project and seamlessly makes modifications to your project
    on the fly in the background as you make changes to the code. This may sound a
    little disturbing at first, but those ITD files we mentioned earlier localize
    Roo’s changes. Roo won’t touch your Java files unless you explicitly issue commands
    to do so. And you, as a developer, just need to respect Roo’s turf and shy away
    from editing the ITD files themselves.


    As we’ll demonstrate later in this chapter, it is incredibly easy to override
    Roo’s automatically generated behavior. All of these considerations give you a
    lot of choice when developing an application.


    You may modify your code within your IDE as you normally would (for instance,
    to add fields to entities), or you can hop into your Roo shell and create your
    code in a command-line savvy way. This automation and flexibility of choice frees
    up precious development time to focus on what matters: the business problem at
    hand.


    ## Adding Entities


    Now we’ve created a project and configured our persistence layer. Again, execute
    the `hint` command within the shell, and you’ll see that Roo is suggesting that
    we begin fleshing out our domain with the `entity` command. The `entity` command
    generates a simple JavaBean with JPA annotations. We’ll start by creating our
    `ArtEntity` type using the `entity` command, as follows:


    ```

    roo> entity --class com.prospringhibernate.gallery.domain.ArtEntity --testAutomatically

    ```


    ```

    Created SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain

    Created SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain/ArtEntity.java

    Created SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain/ArtEntity_Roo_Entity.aj

    Created SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain/ArtEntity_Roo_ToString.aj

    Created SRC_MAIN_JAVA/com/prospringhibernate/gallery/domain/ArtEntity_Roo_Configurable.aj

    Created SRC_TEST_JAVA/com/prospringhibernate/gallery/domain

    Created SRC_TEST_JAVA/com/prospringhibernate/gallery/domain/ArtEntityDataOnDemand.java

    Created SRC_TEST_JAVA/com/prospringhibernate/gallery/domain/ArtEntityIntegrationTest.java

    Created SRC_TEST_JAVA/com/prospringhibernate/gallery/domain/ArtEntityDataOnDemand_Roo_Configurable.aj

    Created SRC_TEST_JAVA/com/prospringhibernate/gallery/domain/ArtEntityDataOnDemand_Roo_DataOnDemand.aj

    Created SRC_TEST_JAVA/com/prospringhibernate/gallery/domain/ArtEntityIntegrationTest_Roo_Configurable.aj

    Created SRC_TEST_JAVA/com/prospringhibernate/gallery/domain/ArtEntityIntegrationTest_Roo_IntegrationTest.aj

    ```


    The `entity` command gives you your first real glimpse into Roo’s impressive code
    generation. It automatically created an `ArtEntity.java` entity bean with JPA
    and Roo annotations. It also created the folder structure that corresponds to
    our Java packaging scheme.'
