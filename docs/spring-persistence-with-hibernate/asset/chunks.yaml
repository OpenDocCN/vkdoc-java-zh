    \ = sessionFactory;\n    }\n\n    @SuppressWarnings(\"unchecked\")\n    public\
    \ List<Category> getCategories() throws DataAccessException {\n        return\
    \ this.getSessionFactory().getCurrentSession().createQuery(\n            \"select\
    \ categories from Category categories\"\n        ).list();\n    }\n\n    // ...\n\
    }\n```\n\nThis example is a bit contrived, but it should provide you with a clearer\
    \ sense of how you can leverage the Hibernate API directly while still taking\
    \ advantage of Spring’s powerful resource-management features. Which approach\
    \ you take depends on your preferences and specific requirements. For example,\
    \ if your organization uses other persistence technologies, such as JDBC or iBatis,\
    \ then using `HibernateTemplate` may still be a good idea, since it provides greater\
    \ consistency within the organization and perhaps the code base. Additionally,\
    \ `HibernateTemplate` can also provide a few shortcuts that are not available\
    \ with the direct Hibernate APIs, such as setting default behavior (for example,\
    \ to activate cache settings) across an entire DAO.\n\nAlthough we focus on the\
    \ usage of Hibernate a bit more than JPA in this chapter, keep in mind that the\
    \ two approaches are quite similar—especially when it comes to HQL and JPQL syntax.\
    \ For this reason, we aren’t going to examine every example from both a Hibernate\
    \ and JPA perspective. However, to give you a clearer sense of how we might set\
    \ up a JPA-based DAO, let’s look at a short example:\n\n```java\n@Repository(\"\
    categoryDao\")\npublic class CategoryDaoHibernate implements CategoryDao {\n\n\
    \    private EntityManager entityManager;\n\n    @PersistenceContext\n    public\
    \ void setEntityManager(EntityManager entityManager) {\n        this.entityManager\
    \ = entityManager;\n    }\n\n    @SuppressWarnings(\"unchecked\")\n    public\
    \ List<Category> getCategories() throws DataAccessException {\n        return\
    \ this.entityManager.createQuery(\n            \"select categories from Category\
    \ categories\"\n        ).getResultList();\n    }\n\n    // ...\n}\n```\n\nNotice\
    \ that the JPA version of our simple DAO example is quite similar, with a few\
    \ syntax differences. The most significant variation is the use of `@PersistenceContext`\
    \ to inject our JPA `EntityManager`. This annotation depends on the inclusion\
