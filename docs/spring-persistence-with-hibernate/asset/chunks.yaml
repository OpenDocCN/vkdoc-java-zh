    图 4-1 概述了任何 JPA 应用程序中的四个关键接口。**EntityManagerFactory**代表了应用程序中数据库的配置。通常，你会为每个数据存储定义一个**EntityManagerFactory**。**EntityManagerFactory**用于创建多个**EntityManager**实例。


    第 4 章 ■ 使用 Hibernate 进行持久化


    *图 4-1. JPA 接口*


    每个**EntityManager**实例类似于一个数据库连接。在多线程的 Web 应用程序中，每个线程都会拥有自己的**EntityManager**。


    ■ **注意** 默认情况下，所有 Spring 对象都是单例的。**EntityManager**也不例外，但它仍然是线程安全的，并且了解事务边界。Spring
    会传入一个共享的代理**EntityManager**，该代理委托给一个线程绑定的**EntityManager**实例，这个实例了解请求的所有上下文（包括事务边界）。


    每个**EntityManager**都有一个单一的**EntityTransaction**，用于将更改持久化到底层数据库。最后，**EntityManager**充当生成**Query**类的工厂。实现**Query**接口的类用于对数据库执行查询。


    **EntityManagerFactory**仅在启动应用程序时相关，我们将向你展示如何在 Spring 应用程序中配置它。查询将在第 6 章中更深入地介绍，事务管理将在第
    7 章中讨论。正如你将在本章中看到的，**EntityManager**接口是你最常与之交互的接口。


    ■ **注意** 由于 JPA 旨在用于重量级和轻量级容器，因此有许多配置选项。例如，你可以使用 EJB 容器来配置 JPA，然后通过 JNDI 暴露容器的**EntityManager**供
    Spring 访问。或者，你可以使用现有的众多 JPA 实现之一直接在 Spring 中配置 JPA。一个显著的区别是需要（或不需要）*加载时织入*，这是
    AOP 所需的一种字节码操作类型。加载时织入用于创建具有事务感知能力的 JPA **EntityManager**和能够执行延迟加载的**Entity**对象。EJB
    服务器有自己的加载时织入机制，Spring 也是如此。单个**EntityManager**只能通过代理提供的间接层支持来处理此类功能。Hibernate
    JPA 实现是不需要加载时织入的框架之一，因此它允许你尽快在 JPA 环境中启动并运行。


    第 4 章 ■ 使用 Hibernate 进行持久化


    艺术画廊领域模型与 DAO 结构


    现在，让我们回到构建艺术画廊应用程序的任务上。在艺术画廊应用程序中，我们必须表示的核心内容是艺术品的实体。在图 4-2 中，你将看到**ArtEntity**类代表艺术品。在我们的画廊中，我们将允许画廊策展人将**ArtEntity**实体关联到**Category**实体，并允许公众应用**Tag**和**Comment**实体。这些**ArtEntity**实体被组织成**Exhibition**实体以供公开展示，并且我们通过一个名为**ArtData**的多态表示来捕获给定艺术品的所有元数据。我们还定义了一个**Person**类型来表示应用程序的所有用户。这些**Person**实体通过一个**enum**进行限定，该枚举表示它们可能承担的系统角色。


    *图 4-2. 艺术画廊领域模型*


    JPA 允许我们通过注解指定 Java 类如何映射到数据库。最重要的注解是**@Entity**注解。


    第 4 章 ■ 使用 Hibernate 进行持久化


    一个带有@Entity 注解的 POJO


    给一个 POJO 添加 JPA **@Entity**注解，就使其成为一个可持久化的对象！嗯，还不完全是——你仍然需要在某处添加一个**@Id**，并且理想情况下，还需要一个**@Version**字段，但就是这么简单。


    **package com.prospringhibernate.gallery.domain;**


    ****import javax.persistence.Id;**


    **import javax.persistence.Entity;**


    **import javax.persistence.Version;**


    **import javax.persistence.GeneratedValue;**


    ****@Entity**


    **public class Person implements Serializable, DomainObject {**


    ****private Long id;**


    **private Integer version;**


    ****@Id**


    **@GeneratedValue**


    **public final Long getId() {**


    **return id;**


    **}**


    ****public void setId(Long id) {**


    **this.id = id;**


    **}**


    ****@Version**


    **public Integer getVersion() {**


    **return version;**


    **}**


    ****public void setVersion(Integer version) {**


    **this.version = version;**


    **}**


    ****// 省略了 getter、setter 和字段**


    **}**


    ■ **注意** 我们在代码清单中包含了所有必需的**import**语句，以帮助你了解各个注解的来源。注解对于消除 XML 非常有用，但随着给定类或方法上注解数量的增加，它们有时会变得有点难以阅读。**javax.persistence**包中的任何内容都是由
    JPA 明确提供的。


    第 4 章 ■ 使用 Hibernate 进行持久化


    除非另有说明，JPA 实现将采用约定优于配置的方式，并将此 Bean 映射到**Person**表。**@GeneratedValue** JPA 注解告诉
    Hibernate 使用自动生成的**id**列。Hibernate 会为你正在使用的特定数据库选择最佳的 ID 生成策略。


    Hibernate 也足够智能，能够根据每个成员变量使用的 Java 原始类型或枚举，确定每个数据库列的正确数据类型。你可以通过使用**@Basic**、**@Enumerated**、**@Temporal**和**@Lob**注解进一步自定义这些字段映射。实体的每个成员都被假定为持久的，除非它是**static**的或使用**@Transient**注解。我们将在第
    5 章中更详细地讨论约定优于配置的概念和 Hibernate 注解。


    就 JPA 规范而言，你在**Person**类中看到的**implements Serializable**并非严格必要。但是，如果你要使用缓存或 EJB
    远程调用，则需要它，因为这两者都要求对象是**Serializable**的。正如你将在第 9 章中学到的，缓存是在任何 JPA 应用程序中实现最佳性能的关键组件，因此实现**Serializable**接口是一个好习惯。


    从 POJO 方面来说，这就是你需要做的全部，但一个带有**@Entity**注解的 POJO 本身并不能做任何事情。我们至少需要提供用于基本 CRUD 操作的代码。现在，我们将采用
    DAO 模式。当我们分别在第十一章和第十二章介绍 Grails 和 Roo 时，我们将探索使用 Active Record 模式进行更以领域为中心的编码。


    使用泛型的简化 DAO 模式


    让我们创建一个保存和查找**Person**实体的 DAO。我们将使用泛型来使我们的类层次结构变得复杂，这样我们就可以抽象出样板式的 CRUD 操作，否则这些操作将在我们应用程序中的每个
    DAO 中一遍又一遍地重复。


    在图 4-3 的伪 UML 中，请注意我们的**Person**领域对象实现了一个名为**DomainObject**的接口。该**DomainObject**接口是一个空接口，被我们的**GenericDao**接口以及**GenericDaoJpa**具体类使用，以泛型方式绑定我们的领域对象。这种结构使我们能够将通用方法推入**GenericDaoJpa**类，进而使我们能够保持
    Hibernate DAO 的简洁。


    第 4 章 ■ 使用 Hibernate 进行持久化


    *图 4-3. 艺术画廊领域与 DAO 类层次结构*

