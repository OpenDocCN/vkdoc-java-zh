- fmt: "# Spring 集成与依赖注入\n\n无论您需要将何种类型的库、类或框架集成到应用程序中，Spring 都能让您以浅显的学习曲线干净地处理这些内部和外部组件。这种无需直接耦合的集成是\
    \ IoC 的最大优势。本质上，对第三方库（甚至内部框架和类）的钩子被移出源代码，放入配置文件（或类中基于注解的元数据）中。这种配置方式让开发者减少对代码各组件如何组合的担忧，更专注于核心功能本身的编码。\n\
    \n## 通过自动装配实现依赖注入\n\n另一种注入方式是 Spring 所谓的*自动装配*。此方法允许您简单地定义特定类型或名称的 getter 和 setter，将确定注入哪个类的责任交给\
    \ Spring 容器。这个非常强大的功能也伴随着一些风险：如果对注入哪个实例存在歧义，您可能会遇到问题。例如，如果您有一个依赖于`AuthenticationService`接口的类，并且在应用程序中定义了`BasicAuthenticationServiceImpl`和`RemoteAuthenticationServiceImpl`（两者都实现了`AuthenticationService`接口），Spring\
    \ 可能会混淆您打算注入哪个实现。\n\n## 基于注解的依赖注入\n\n到目前为止，我们已经展示了如何在 XML 配置文件中指定对象之间的依赖关系。随着时间的推移，企业应用程序的\
    \ XML 配置变得庞大且难以管理。从 Spring 2.5 和 JDK 1.5 开始，引入了另一种配置策略。利用基于注解的元数据，您现在可以直接在类中指定依赖注入。这种方法的优点是类的依赖关系可以直接在代码中表达。缺点是无法受益于集中式的配置文件集合，这些文件可以说明和记录应用程序组件是如何连接的。\n\
    \n选择哪种方式取决于您。当然，使用注解确实简化了配置过程。此外，您可以混合使用 XML 配置和注解，允许某些依赖关系在 Spring XML 中配置，而其他依赖关系通过注解检测。\n\
    \n以下是我们的`User`对象，已修改为使用基于注解的方法：\n\n```java\npackage com.prospringhibernate.gallery;\n\
    \nimport org.springframework.beans.factory.annotation.Autowired;\n\npublic class\
    \ User implements Serializable {\n\n    @Autowired\n    private AuthenticationService\
    \ authHandler;\n\n    public User() {\n    }\n\n    public AuthenticationService\
    \ getAuthHandler() {\n        return this.authHandler;\n    }\n\n    public void\
    \ setAuthHandler(AuthenticationService authHandler) {\n        this.authHandler\
    \ = authHandler;\n    }\n\n}\n```\n\n注意成员变量`authHandler`上方的`@Autowired`注解。这告诉\
    \ Spring 注入（使用我们之前讨论的自动装配策略）一个`AuthenticationService`接口的实现。\n\n在可能存在歧义的情况下，Spring\
    \ 提供了一种通过使用限定符向容器提供线索的方法。*限定符*可以作为单独的注解插入到`@Autowired`字段上，或者在 XML 配置中提供，以向 Spring\
    \ 容器提供特定提示，帮助消除存在多个特定类型或接口实例时的歧义。例如，我们可以通过添加以下注解来指示需要哪个`AuthenticationService`：\n\
    \n```java\n@Autowired\n@Qualifier(\"basicAuthHandler\")\npublic void setAuthHandler(AuthenticationService\
    \ authHandler) {\n    this.authHandler = authHandler;\n}\n```\n\n现在我们已经消除了上述`setAuthHandler`方法中应注入哪个`AuthenticationService`实现的歧义，我们需要“标记”此依赖关系，以便\
    \ Spring 能够选择正确的实例。在 Spring XML 中，我们可以通过包含限定符元素来提供此提示：\n\n```xml\n<bean id=\"\
    authHandler\" class=\"com.prospringhibernate.gallery.BasicAuthServiceImpl\">\n\
    \    <qualifier value=\"basicAuthHandler\"/>\n</bean>\n```\n\n还可以通过将`@Qualifier`注解应用于为\
    \ Spring 的组件扫描功能注解的类，来为依赖关系提供消除歧义的提示。我们将在本书后面演示这些功能。`@Autowired`注解不仅可以应用于成员变量，还可以应用于方法和构造函数。此外，`@Qualifier`注解可以直接应用于方法参数，以将限定目标定位到特定参数，或者对方法或构造函数中的不同参数应用不同的限定提示。\n\
    \n## 设置好，然后忘记它！\n\n所有这些外部化起初看起来似乎没什么大不了的，但确实很重要，当您开始开发时就会注意到。您可以简单地专注于实现，而无需担心一个类如何获取对另一个类的引用。您学会只为每个类所需的依赖关系定义\
    \ setter 和 getter，然后将连接工作留给 Spring。想象一下其他替代方案。\n\n许多应用程序依赖单例来集中和分发对所需依赖关系的引用。这种策略当然有效，但不可避免地，您的代码更多地是关于连接类，而不是关于应用程序的核心功能。\n\
    \nSpring 和 IoC 允许您专注于应用程序设计和业务逻辑，而忘记连接。Ron “Ronco” Popeil 在一些电视购物广告中使用了“设置好，然后忘记它！”的口号。每次您开始使用\
    \ Spring 进行开发时，可能会发现这句口号在脑海中浮现。\n\n流畅的配置和生命周期管理实际上只是整个 Spring 包的一小部分。Spring 还提供了与\
    \ Java 生态系统中大多数主要框架（包括许多持久化框架）的强大集成点。这大大简化了将这些框架集成到应用程序中的过程，并使维护和开发整体上更加容易。除了这些集成点，Spring\
    \ 还提供了一套强大的 AOP 和代理功能，这对于配置声明式事务、日志记录和远程处理至关重要。这些能力使 Spring 成为 EJB 和 Java EE 应用服务器提供的企业级功能的可行替代方案。\n\
    \n## 使用 AOP 和拦截器注入代码\n\nAOP 对开发者来说通常是一个难以接受的概念。事实上，这可能是一个有点令人困惑的话题，因为它是一个相当新的开发范式。对于熟悉面向对象方法论的人来说，AOP\
    \ 可能看起来有点非常规。\n\nAOP 是一种允许将行为注入到应用程序中各处代码中的策略。与 Spring 提供将值和实例引用注入 bean 的方式非常相似，AOP\
    \ 允许开发者将一个类中的代码编织到另一个类中。为什么您会想要这样做呢？嗯，有时您希望将功能应用于一大类类，但通过继承基类来实现此目标没有意义，因为您希望注入的功能可能与目标类正交。这个概念通常被称为*横切关注点*，因为\
    \ AOP 的意图是将功能应用于一系列类，而这些功能与这些类的主要目的关系不大。"
  raw: 'No matter what type of library, class, or framework you need to integrate
    into your application, Spring will allow you to work with these internal and external
    components cleanly and with a shallow learning curve. This integration without
    direct coupling is the greatest benefit of IoC. Essentially, the hooks into third-party
    libraries (or even in-house frameworks and classes) are moved outside the source
    code and into configuration files (or annotation-based metadata within your classes).
    This type of configuration lets developers worry less about how the various components
    of code fit together and focus more on coding the core functionality itself.


    Dependency Injection via Autowiring


    Another type of injection is what Spring calls *autowiring*. This method allows
    you to simply define getters and setters of a particular type or name, putting
    on the Spring container the onus of figuring out which class to inject. This very
    powerful feature comes with some risk as well: should there be some ambiguity
    as to which instance to inject, you may run into problems. For instance, if you
    have a class 28


    CHAPTER 2 ■ SPRING BASICS


    that depends on the **AuthenticationService** interface and you have a **BasicAuthenticationServiceImpl**
    and a **RemoteAuthenticationServiceImpl** defined in your application (both of
    which implement the **AuthenticationService** interface), Spring may get confused
    as to which implementation you intend to inject.


    @Annotation-Based Dependency Injection


    Up to this point, we’ve shown how to specify how objects depend on one another
    in XML configuration files. Over time, XML configurations for enterprise applications
    grew massive and unwieldy. Beginning with Spring 2.5 and JDK 1.5, another configuration
    strategy was introduced. Utilizing annotation-based metadata, you can now specify
    dependency wiring directly within your classes. The advantage of this approach
    is that a class’s dependencies can be expressed directly within the code. The
    downside is that you don’t benefit from having a centralized collection of configuration
    files that illustrate and document how your application’s components are wired.


    Which path you take is up to you. Certainly, using annotations does simplify the
    configuration process. Furthermore, you can mix and match both XML configuration
    and annotations, allowing some dependencies to be configured within the Spring
    XML, while other dependencies are detected via annotations.


    Here’s our **User** object, revised to use an annotation-based approach.


    **package com.prospringhibernate.gallery;**


    ****import org.springframework.beans.factory.annotation.Autowired;**


    ****public class User implements Serializable {**


    ****@Autowired**


    **private AuthenticationService authHandler;**


    ****public User() {**


    **}**


    ****public AuthenticationService getAuthHandler() {**


    **return this.authHandler;**


    **}**


    ****public void setAuthHandler(AuthenticationService authHandler) {**


    **this.authHandler = authHandler;**


    **}**


    ****}**


    Notice the **@Autowired** annotation above the **authHandler** member variable.
    This tells Spring to inject (using the autowiring strategy we discussed earlier)
    an implementation of the **AuthenticationService** interface.


    In cases where ambiguity could be an issue, Spring provides a means for providing
    clues to the container by using qualifiers. *Qualifiers* can be inserted as a
    separate annotation on an **@Autowired** field, or within an XML configuration
    to provide specific hints to the Spring container in order to help disambiguate
    a situation in which multiple instances of a particular type or interface are
    present. For 29


    CHAPTER 2 ■ SPRING BASICS


    instance, we might indicate which **AuthenticationService** was needed by adding
    the following annotation:


    **@Autowired**


    **@Qualifier("basicAuthHandler")**


    **public void setAuthHandler(AuthenticationService authHandler) {**


    **this.authHandler = authHandler;**


    **}**


    Now that we have disambiguated which implementation of our **AuthenticationService**
    should be injected into the **setAuthHandler** method listed above, we need to
    “tag” this dependency so that Spring is able to select the correct instance. In
    Spring XML, we can provide this hint by including the qualifier element:


    **<bean id="authHandler" class="com.prospringhibernate.gallery.BasicAuthServiceImpl"/>**


    **<qualifier value="basicAuthHandler"/>**


    **</bean>**


    It is also possible to provide disambiguating hints on dependencies by applying
    the **@Qualifier** annotation to a class annotated for Spring’s component-scanning
    capability. We will demonstrate these features later in this book. The **@Autowired**
    annotation may be applied to more than just member variables. It can also be applied
    to methods and constructors. Furthermore, the **@Qualifier** annotation may be
    applied directly to method parameters to target qualification to a specific parameter
    or to apply different qualifying hints to different parameters within a method
    or constructor.


    Set It and Forget It!


    All this externalization doesn’t seem like a big deal at first, but it really
    is, and you’ll notice that when you begin development. You can simply focus on
    the implementation without worrying about how a reference from one class can get
    to another. You learn to simply define setters and getters for the dependencies
    each class requires, and then leave the wiring to Spring. Imagine some of the
    alternatives.


    Many applications rely on singletons to centralize and hand out references to
    needed dependencies.


    This type of strategy will certainly work, but inevitably, your code becomes more
    about wiring classes together than about your application’s core functionality.


    Spring and IOC allow you to focus on the application design and business logic,
    and forget about the wiring. Ron “Ronco” Popeil used the tagline “Set it, and
    forget it!” in some infomercial. You may find this slogan floating through your
    head each time you start developing with Spring.


    Slick configuration and life-cycle management are really only a small portion
    of the overall Spring package. Spring also provides powerful integration points
    to most major frameworks in the Java ecosystem, including many persistence frameworks.
    This greatly simplifies integrating these frameworks into an application and makes
    maintenance and development easier overall. Beyond these integration points, Spring
    also provides a powerful set of AOP and proxying features, which are instrumental
    for configuring declarative transactions, logging, and remoting. These capabilities
    make Spring a viable replacement for the enterprise-level features offered by
    EJB and Java EE application servers.


    CHAPTER 2 ■ SPRING BASICS


    Injecting Code Using AOP and Interceptors


    AOP is often a hard pill for developers to swallow. In truth, it can be a somewhat
    confusing topic, as it is a fairly new development paradigm. For those experienced
    in object-oriented methodologies, AOP can seem a bit unconventional.


    AOP is a strategy that allows behavior to be injected into code in places across
    an application. In much the same way that Spring provides a means to inject values
    and instance references into a bean, AOP allows developers to weave code from
    one class directly into another. Why on Earth would you ever want to do this?
    Well, sometimes, you want to apply functionality across a whole slew of classes,
    but extending from a base class to accomplish this goal doesn’t make sense, as
    the functionality you wish to inject may be orthogonal to the destination class.
    This notion is often called *cross-cutting concerns*, because the intention with
    AOP is to apply functionality across a series of classes that has little to do
    with the main purposes of those classes.'
  trans: '

    无论您需要将何种类型的库、类或框架集成到应用程序中，Spring 都能让您以浅显的学习曲线，干净利落地处理这些内部和外部组件。这种无需直接耦合的集成方式，正是
    IoC 最大的优势。本质上，对第三方库（甚至内部框架和类）的钩子被移出了源代码，放入了配置文件（或类中基于注解的元数据）中。这种配置方式让开发者无需过多担心代码各组件如何组合在一起，从而能更专注于核心功能本身的编码。


    通过自动装配实现依赖注入


    另一种注入方式是 Spring 所谓的*自动装配*。这种方法允许您简单地定义特定类型或名称的 getter 和 setter 方法，将判断注入哪个类的责任交给
    Spring 容器。这个非常强大的功能也伴随着一些风险：如果对于注入哪个实例存在歧义，您可能会遇到问题。例如，如果您有一个依赖于 **AuthenticationService**
    接口的类，并且在您的应用程序中定义了一个 **BasicAuthenticationServiceImpl** 和一个 **RemoteAuthenticationServiceImpl**（两者都实现了
    **AuthenticationService** 接口），Spring 可能会混淆您打算注入哪个实现。


    基于注解的依赖注入


    到目前为止，我们已经展示了如何在 XML 配置文件中指定对象之间的依赖关系。随着时间的推移，企业应用程序的 XML 配置变得庞大且难以管理。从 Spring
    2.5 和 JDK 1.5 开始，引入了另一种配置策略。利用基于注解的元数据，您现在可以直接在类内部指定依赖注入。这种方法的优点在于，类的依赖关系可以直接在代码中表达。缺点则是，您无法受益于拥有一个集中式的配置文件集合来展示和记录应用程序组件是如何装配的。


    选择哪种路径取决于您。当然，使用注解确实简化了配置过程。此外，您可以混合使用 XML 配置和注解，允许某些依赖在 Spring XML 中配置，而其他依赖则通过注解来检测。


    以下是我们的 **User** 对象，已修改为使用基于注解的方法。


    **package com.prospringhibernate.gallery;**


    ****import org.springframework.beans.factory.annotation.Autowired;**


    ****public class User implements Serializable {**


    ****@Autowired**


    **private AuthenticationService authHandler;**


    ****public User() {**


    **}**


    ****public AuthenticationService getAuthHandler() {**


    **return this.authHandler;**


    **}**


    ****public void setAuthHandler(AuthenticationService authHandler) {**


    **this.authHandler = authHandler;**


    **}**


    ****}**


    请注意 **authHandler** 成员变量上方的 **@Autowired** 注解。这告诉 Spring 注入（使用我们之前讨论过的自动装配策略）一个
    **AuthenticationService** 接口的实现。


    在可能存在歧义的情况下，Spring 提供了一种通过使用限定符向容器提供线索的方法。*限定符*可以作为单独的注解插入到 **@Autowired** 字段上，或者在
    XML 配置中提供，以便向 Spring 容器提供特定提示，从而帮助消除特定类型或接口存在多个实例时的歧义。例如，我们可以通过添加以下注解来指明需要哪个 **AuthenticationService**：


    **@Autowired**


    **@Qualifier("basicAuthHandler")**


    **public void setAuthHandler(AuthenticationService authHandler) {**


    **this.authHandler = authHandler;**


    **}**


    现在我们已经消除了上述 **setAuthHandler** 方法应注入哪个 **AuthenticationService** 实现的歧义，我们需要“标记”这个依赖，以便
    Spring 能够选择正确的实例。在 Spring XML 中，我们可以通过包含限定符元素来提供此提示：


    **<bean id="authHandler" class="com.prospringhibernate.gallery.BasicAuthServiceImpl"/>**


    **<qualifier value="basicAuthHandler"/>**


    **</bean>**


    也可以通过将 **@Qualifier** 注解应用于为 Spring 组件扫描功能注解的类，来为依赖提供消除歧义的提示。我们将在本书后面演示这些特性。**@Autowired**
    注解不仅可以应用于成员变量，还可以应用于方法和构造函数。此外，**@Qualifier** 注解可以直接应用于方法参数，以将限定目标指向特定参数，或者对方法或构造函数中的不同参数应用不同的限定提示。


    设置好，然后忘掉它！


    所有这些外部化处理起初看起来似乎没什么大不了的，但它确实意义重大，当您开始开发时就会注意到。您可以简单地专注于实现，而无需担心一个类如何获取对另一个类的引用。您学会只需为每个类所需的依赖定义
    setter 和 getter 方法，然后将装配工作留给 Spring。想象一下其他一些替代方案。


    许多应用程序依赖单例来集中管理并分发所需依赖的引用。


    这种策略当然可行，但不可避免地，您的代码会更多地关注如何将类装配在一起，而不是应用程序的核心功能。


    Spring 和 IoC 让您能够专注于应用程序设计和业务逻辑，而忘记装配工作。Ron “Ronco” Popeil 在一些电视购物广告中使用了“设置好，然后忘掉它！”这句口号。您可能会发现，每次开始使用
    Spring 进行开发时，这句口号都会在脑海中浮现。


    精巧的配置和生命周期管理实际上只是整个 Spring 包的一小部分。Spring 还提供了与 Java 生态系统中大多数主流框架（包括许多持久化框架）的强大集成点。这极大地简化了将这些框架集成到应用程序中的过程，并使维护和开发整体上更加容易。除了这些集成点之外，Spring
    还提供了一套强大的 AOP 和代理功能，这对于配置声明式事务、日志记录和远程调用至关重要。这些能力使 Spring 成为 EJB 和 Java EE 应用服务器提供的企业级功能的可行替代方案。


    使用 AOP 和拦截器注入代码


    AOP 对开发者来说通常是一个难以接受的概念。事实上，它可能是一个有点令人困惑的话题，因为它是一个相当新的开发范式。对于熟悉面向对象方法论的人来说，AOP
    可能看起来有点非常规。


    AOP 是一种允许将行为注入到应用程序中各个位置代码中的策略。与 Spring 提供将值和实例引用注入 bean 的方式非常相似，AOP 允许开发者将一个类中的代码编织到另一个类中。您究竟为什么要这样做呢？嗯，有时，您希望将功能应用于一大类类，但通过继承基类来实现这个目标并不合理，因为您希望注入的功能可能与目标类正交。这个概念通常被称为*横切关注点*，因为
    AOP 的意图是将功能应用于一系列类，而这些功能与这些类的主要目的关系不大。

