    第 11 章 ■ GORM 与 GRAILS


    创建高级查询方法


    上一节描述的动态查找器方法适用于大多数类型的查询。


    然而，有时拥有更多的灵活性也很重要。Grails 还提供了 **find()** 和 **findAll()** 方法，允许你使用任意的 HQL 查询。**Find()**
    返回单个实体，而 **findAll()** 会返回多个实体。此外，还有一个更灵活的 **executeQuery()** 方法，允许你定义不返回特定领域实体的查询。


    让我们看一个使用 HQL 的示例。假设我们要查询属于某个特定类别的所有 **ArtEntity** 对象。这可以通过以下查询来表示：**List artEntities
