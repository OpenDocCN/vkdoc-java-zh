- fmt: "Here, we enable second-level caching by setting the `hibernate.cache.use_second_level_cache`\
    \ property on the persistence unit to `true`. Then we specify the cache implementation,\
    \ `ehcache`, via the `hibernate.cache.provider_class` property.\n\n## CHAPTER\
    \ 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES\n\nOnce you’ve activated the second-level\
    \ cache and selected a cache provider, you have officially started caching. Next,\
    \ you need to configure the caching rules.\n\n### Determining Caching Rules\n\n\
    To configure the caching rules for your domain model, the simplest approach is\
    \ to add the `@Cache` annotation to your domain objects. As an example, let’s\
    \ examine the caching configuration of the `Category` domain object in our art\
    \ gallery application:\n\n```java\n@Entity\n@Cache(region=\"category\", usage\
    \ = CacheConcurrencyStrategy.READ_WRITE)\npublic class Category implements DomainObject\
    \ {\n\n    private Long id;\n    private String categoryName;\n    private String\
    \ categoryDescription;\n    private Set<ArtEntity> artEntities = new HashSet<ArtEntity>();\n\
    \n    @Id\n    @GeneratedValue\n    public final Long getId() {\n        return\
    \ id;\n    }\n\n    public void setId(Long id) {\n        this.id = id;\n    }\n\
    \n    . . .\n\n    @ManyToMany\n    @Cache(usage=CacheConcurrencyStrategy.READ_WRITE)\n\
    \    public Set<ArtEntity> getArtEntities() {\n        return artEntities;\n \
    \   }\n\n    public void setArtEntities(Set<ArtEntity> artEntities){\n       \
    \ this.artEntities = artEntities;\n    }\n\n    . . .\n\n}\n```\n\nHere, we have\
    \ added a `@Cache` annotation in two places: at the top of the entity, which serves\
    \ as the configuration for caching the domain object itself, and above our many-to-many\
    \ `artEntities` association. Therefore, we have defined the caching rules for\
    \ both the `Category` domain object itself and the `Category` domain object’s\
    \ `artEntities` collection.\n\nIn the first instance of the `@Cache` annotation,\
    \ we also set the `region` attribute. This allows us to set the region within\
    \ which we will be persisting our cached data. We omitted this attribute for the\
    \ `artEntities` collection, which will then allow Hibernate to use the default\
    \ region setting. The region default is the class name (including the package).\
    \ For collections, the region default is the full class name, followed by `.<collectionname>`.\
    \ So in the case of the `artEntities` collection, the default region name will\
    \ be `com.prospringhibernate.gallery.domain.Category.artEntities`. Of course,\
    \ we could choose to override this instead by specifying a region for the collection.\n\
    \nThe `@Cache` annotation’s `usage` attribute defines the cache strategy to use\
    \ for the configured entity or collection. When using Ehcache, there are three\
    \ options:\n\n- The `read-only` setting should be used only when the data to be\
    \ cached will never be updated. A `read-only` cache strategy will provide the\
    \ best performance, since cached data will never need to expire or be invalidated.\n\
    - The `nonstrict-read-write` setting should be used when concurrent access of\
    \ data is unlikely, as the caching implementation will not attempt to lock the\
    \ cache to prevent contention or version mismatch.\n- The `read-write` setting\
    \ is suitable when concurrent access and updating of data is likely, as this approach\
    \ provides the semantics of a read-committed isolation level.\n\n### Configuring\
    \ Cache Regions\n\nNext, you need to set up the configuration for the regions\
    \ into which your data will be persisted. Ehcache employs an XML configuration\
    \ file that is loaded at application startup. Typically, the file is called `ehcache.xml`\
    \ and placed at the root of the classpath. However, you can override this default\
    \ location by setting the following properties in your `persistence.xml` file:\n\
    \n```xml\n<prop key=\"hibernate.cache.region.factory_class\">\n    net.sf.ehcache.hibernate.EhCacheRegionFactory\n\
    </prop>\n<prop key=\"net.sf.ehcache.configurationResourceName\">\n    /path/to/ehcache.xml\n\
    </prop>\n```\n\nThe default `ehcache.xml` file that ships with Ehcache includes\
    \ a default cache configuration that contains the settings that will be used for\
    \ any region that is not explicitly defined. However, it is usually a good idea\
    \ to configure each cache region you plan to include in your application. Here\
    \ is an example of the definition of our cache regions for our `Category` domain\
    \ object and the `Category.artEntities` collection:\n\n```xml\n<cache name=\"\
    Category\"\n       maxElementsInMemory=\"10000\"\n       eternal=\"false\"\n \
    \      timeToIdleSeconds=\"300\"\n       timeToLiveSeconds=\"600\"\n       overflowToDisk=\"\
    true\"\n/>\n\n<cache name=\"com.prospringhibernate.gallery.domain.Category.artEntities\"\
    \n       maxElementsInMemory=\"10000\"\n       eternal=\"false\"\n       timeToIdleSeconds=\"\
    300\"\n       timeToLiveSeconds=\"600\"\n       overflowToDisk=\"false\"\n/>\n\
    ```\n\nWe have defined two cache regions, as specified by the `name` attribute.\
    \ Typically, the `name` attribute for a domain object includes the fully qualified\
    \ class name (including package). However, in our earlier caching configuration\
    \ of the `Category` domain object (the listing in the previous section), we explicitly\
    \ changed the default region attribute, using the shorter region name `Category`\
    \ instead. We left the default region value for the `artEntities` collection.\n\
    \nThese cache region settings work as follows:\n\n- `maxElementsInMemory` specifies\
    \ the maximum number of cached entities to store in this region. We used a value\
    \ of `10000` for both cache regions, but it is important to consider this number\
    \ very carefully. Using too high of a value can cause `OutOfMemoryException` issues,\
    \ as well as degrade performance. Because object sizes and access patterns can\
    \ vary so much from application to application, it is a good idea to experiment\
    \ with these settings and profile your application to determine optimal values.\n\
    - `eternal` specifies whether a cache region should “live forever.” This value\
    \ can come in handy (along with `overflowToDisk`) when you want to keep your cache\
    \ prepopulated in between restarts. This is also valuable in situations when it\
    \ might take a lot of time to populate your cache. A value of `true` for `eternal`\
    \ will ensure that your cached data will persist, even when the application needs\
    \ to be restarted.\n- `timeToIdleSeconds` specifies how long a cached item will\
    \ stay in the cache when there are no attempts to access it. For instance, if\
    \ a particular `Category` instance is stored in the cache but there are no attempts\
    \ to load this value from the cache for a while, then the benefit of keeping this\
    \ item cached is questionable. It is a good idea to keep this setting to around\
    \ half of the `timeToLiveSeconds` attribute value.\n- `timeToLiveSeconds` corresponds\
    \ to an entity’s TTL—the amount of time before the cached entity expires and the\
    \ data is purged from the cache, regardless of last access.\n- `overflowToDisk`\
    \ specifies that if the `maxElementsInMemory` is exceeded, Ehcache should begin\
    \ storing overflow on disk. While this setting sounds useful, keep in mind that\
    \ persisting data on disk incurs significant performance penalties when compared\
    \ to memory storage. You are using caching because you have a database for persisting\
    \ data permanently. Of course, data cached on disk will outperform a database,\
    \ but you should still consider this setting carefully."
  raw: 'Here, we enable second-level caching by setting the **hibernate.cache.use_second_level_cache**
    property on the persistence unit to **true**. Then we specify the cache implementation,
    **ehcache**, via the **hibernate.cache.provider_class** property.


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    Once you’ve activated the second-level cache and selected a cache provider, you
    have officially started caching. Next, you need to configure the caching rules.


    Determining Caching Rules


    To configure the caching rules for your domain model, the simplest approach is
    to add the **@Cache** annotation to your domain objects. As an example, let’s
    examine the caching configuration of the **Category** domain object in our art
    gallery application:


    **@Entity**


    @Cache(region="category", usage = CacheConcurrencyStrategy.READ_WRITE) **public
    class Category implements DomainObject {**


    **private Long id;**


    **private String categoryName;**


    **private String categoryDescription;**


    **private Set<ArtEntity> artEntities = new HashSet<ArtEntity>();**


    **@Id**


    **@GeneratedValue**


    **public final Long getId() {**


    **return id;**


    **}**


    **public void setId(Long id) {**


    **this.id = id;**


    **}**


    **. . .**


    **@ManyToMany**


    @Cache(usage=CacheConcurrencyStrategy.READ_WRITE)


    **public Set<ArtEntity> getArtEntities() {**


    **return artEntities;**


    **}**


    **public void setArtEntities(Set<ArtEntity> artEntities){**


    **this.artEntities = artEntities;**


    **}**


    **. . .**


    ****}**


    Here, we have added a **@Cache** annotation in two places: at the top of the entity,
    which serves as the configuration for caching the domain object itself, and above
    our many-to-many **artEntities** association. Therefore, we have defined the caching
    rules for both the **Category** domain object itself and the **Category** domain
    object’s **artEntities** collection.


    In the first instance of the **@Cache** annotation, we also set the **region**
    attribute. This allows us to set the region within which we will be persisting
    our cached data. We omitted this attribute for the **artEntities** collection,
    which will then allow Hibernate to use the default region setting. The region
    default is the class name (including the package). For collections, the region
    default is the full class name, followed by **.<collectionname>** . So in the
    case of the **artEntities** collection, the default region 146


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    name will be **com.prospringhibernate.gallery.domain.Category.artEntities**. Of
    course, we could choose to override this instead by specifying a region for the
    collection.


    The **@Cache** annotation’s **usage** attribute defines the cache strategy to
    use for the configured entity or collection. When using Ehcache, there are three
    options:


    • The **read-only** setting should be used only when the data to be cached will
    never be updated. A **read-only** cache strategy will provide the best performance,
    since cached data will never need to expire or be invalidated.


    • The **nonstrict-read-write** setting should be used when concurrent access of
    data is unlikely, as the caching implementation will not attempt to lock the cache
    to prevent contention or version mismatch.


    • The **read-write** setting is suitable when concurrent access and updating of
    data is likely, as this approach provides the semantics of a read-committed isolation
    level.


    Configuring Cache Regions


    Next, you need to set up the configuration for the regions into which your data
    will be persisted. Ehcache employs an XML configuration file that is loaded at
    application startup. Typically, the file is called **ehcache.xml** and placed
    at the root of the classpath. However, you can override this default location
    by setting the following properties in your **persistence.xml** file:


    **<prop key="hibernate.cache.region.factory_class">**


    **net.sf.ehcache.hibernate.EhCacheRegionFactory**


    **</prop>**


    **<prop key="net.sf.ehcache.configurationResourceName">**


    **/path/to/ehcache.xml**


    **</prop>**


    The default **ehcache.xml** file that ships with Ehcache includes a default cache
    configuration that contains the settings that will be used for any region that
    is not explicitly defined. However, it is usually a good idea to configure each
    cache region you plan to include in your application. Here is an example of the
    definition of our cache regions for our **Category** domain object and the **Category.artEntities**
    collection:


    **<cache name="Category"**


    **maxElementsInMemory="10000"**


    **eternal="false"**


    **timeToIdleSeconds="300"**


    **timeToLiveSeconds="600"**


    **overflowToDisk="true"**


    **/>**


    **<cache name="com.prospringhibernate.gallery.domain.Category.artEntities"**


    **maxElementsInMemory="10000"**


    **eternal="false"**


    **timeToIdleSeconds="300"**


    **timeToLiveSeconds="600"**


    **overflowToDisk="false"**


    **/>**


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    We have defined two cache regions, as specified by the **name** attribute. Typically,
    the **name** attribute for a domain object includes the fully qualified class
    name (including package). However, in our earlier caching configuration of the
    **Category** domain object (the listing in the previous section), we explicitly
    changed the default region attribute, using the shorter region name **Category**
    instead. We left the default region value for the **artEntities** collection.


    These cache region settings work as follows:


    • **maxElementsInMemory** specifies the maximum number of cached entities to store
    in this region. We used a value of **10000** for both cache regions, but it is
    important to consider this number very carefully. Using too high of a value can
    cause **OutOfMemoryException** issues, as well as degrade performance. Because
    object sizes and access patterns can vary so much from application to application,
    it is a good idea to experiment with these settings and profile your application
    to determine optimal values.


    • **eternal** specifies whether a cache region should “live forever.” This value
    can come in handy (along with **overFlowToDisk**) when you want to keep your cache
    prepopulated in between restarts. This is also valuable in situations when it
    might take a lot of time to populate your cache. A value of **true** for **eternal**
    will ensure that your cached data will persist, even when the application needs
    to be restarted.


    • **timeToIdleSeconds** specifies how long a cached item will stay in the cache
    when there are no attempts to access it. For instance, if a particular **Category**
    instance is stored in the cache but there are no attempts to load this value from
    the cache for a while, then the benefit of keeping this item cached is questionable.
    It is a good idea to keep this setting to around half of the **timeToLiveSeconds**
    attribute value.


    • **timeToLiveSeconds** corresponds to an entity’s TTL—the amount of time before
    the cached entity expires and the data is purged from the cache, regardless of
    last access.


    • **overFlowToDisk** specifies that if the **maxElementsInMemory** is exceeded,
    Ehcache should begin storing overflow on disk. While this setting sounds useful,
    keep in mind that persisting data on disk incurs significant performance penalties
    when compared to memory storage. You are using caching because you have a database
    for persisting data permanently. Of course, data cached on disk will outperform
    a database, but you should still consider this setting carefully.'
  trans: '

    此处，我们通过在持久化单元上将 **hibernate.cache.use_second_level_cache** 属性设置为 **true** 来启用二级缓存。然后，我们通过
    **hibernate.cache.provider_class** 属性指定缓存实现 **ehcache**。


    第 9 章 ■ 最佳实践与高级技术


    一旦激活了二级缓存并选择了缓存提供者，你就正式开始了缓存工作。接下来，你需要配置缓存规则。


    确定缓存规则


    要为你的领域模型配置缓存规则，最简单的方法是在领域对象上添加 **@Cache** 注解。例如，让我们检查一下艺术画廊应用中 **Category** 领域对象的缓存配置：


    **@Entity**


    @Cache(region="category", usage = CacheConcurrencyStrategy.READ_WRITE) **public
    class Category implements DomainObject {**


    **private Long id;**


    **private String categoryName;**


    **private String categoryDescription;**


    **private Set<ArtEntity> artEntities = new HashSet<ArtEntity>();**


    **@Id**


    **@GeneratedValue**


    **public final Long getId() {**


    **return id;**


    **}**


    **public void setId(Long id) {**


    **this.id = id;**


    **}**


    **. . .**


    **@ManyToMany**


    @Cache(usage=CacheConcurrencyStrategy.READ_WRITE)


    **public Set<ArtEntity> getArtEntities() {**


    **return artEntities;**


    **}**


    **public void setArtEntities(Set<ArtEntity> artEntities){**


    **this.artEntities = artEntities;**


    **}**


    **. . .**


    ****}**


    在这里，我们在两个地方添加了 **@Cache** 注解：一处位于实体顶部，作为缓存领域对象本身的配置；另一处位于多对多关联 **artEntities**
    之上。因此，我们为 **Category** 领域对象本身以及 **Category** 领域对象的 **artEntities** 集合都定义了缓存规则。


    在 **@Cache** 注解的第一个实例中，我们还设置了 **region** 属性。这允许我们设置持久化缓存数据的区域。对于 **artEntities**
    集合，我们省略了这个属性，这将允许 Hibernate 使用默认的区域设置。区域的默认值是类名（包含包名）。对于集合，区域的默认值是完整的类名，后跟 **.<collectionname>**
    。因此，对于 **artEntities** 集合，默认的区域名称将是 **com.prospringhibernate.gallery.domain.Category.artEntities**。当然，我们也可以选择通过为集合指定一个区域来覆盖此默认值。


    **@Cache** 注解的 **usage** 属性定义了用于配置的实体或集合的缓存策略。使用 Ehcache 时，有三个选项：


    • **read-only** 设置仅应在被缓存的数据永远不会更新时使用。**read-only** 缓存策略将提供最佳性能，因为缓存的数据永远不需要过期或失效。


    • **nonstrict-read-write** 设置应在不太可能发生并发数据访问时使用，因为缓存实现不会尝试锁定缓存以防止争用或版本不匹配。


    • **read-write** 设置适用于可能发生并发访问和数据更新的情况，因为这种方法提供了读已提交隔离级别的语义。


    配置缓存区域


    接下来，你需要为数据将被持久化的区域设置配置。Ehcache 使用一个在应用程序启动时加载的 XML 配置文件。通常，该文件名为 **ehcache.xml**，并放置在类路径的根目录下。但是，你可以通过在
    **persistence.xml** 文件中设置以下属性来覆盖此默认位置：


    **<prop key="hibernate.cache.region.factory_class">**


    **net.sf.ehcache.hibernate.EhCacheRegionFactory**


    **</prop>**


    **<prop key="net.sf.ehcache.configurationResourceName">**


    **/path/to/ehcache.xml**


    **</prop>**


    Ehcache 附带的默认 **ehcache.xml** 文件包含一个默认的缓存配置，其中包含将用于任何未显式定义的区域的设置。然而，通常最好为你计划在应用程序中包含的每个缓存区域进行配置。以下是我们为
    **Category** 领域对象和 **Category.artEntities** 集合定义的缓存区域示例：


    **<cache name="Category"**


    **maxElementsInMemory="10000"**


    **eternal="false"**


    **timeToIdleSeconds="300"**


    **timeToLiveSeconds="600"**


    **overflowToDisk="true"**


    **/>**


    **<cache name="com.prospringhibernate.gallery.domain.Category.artEntities"**


    **maxElementsInMemory="10000"**


    **eternal="false"**


    **timeToIdleSeconds="300"**


    **timeToLiveSeconds="600"**


    **overflowToDisk="false"**


    **/>**


    第 9 章 ■ 最佳实践与高级技术


    我们定义了两个缓存区域，由 **name** 属性指定。通常，领域对象的 **name** 属性包含完全限定的类名（包含包名）。然而，在我们之前对 **Category**
    领域对象的缓存配置中（上一节的列表），我们显式地更改了默认区域属性，使用了较短的区域名称 **Category**。我们为 **artEntities**
    集合保留了默认的区域值。


    这些缓存区域设置的工作方式如下：


    • **maxElementsInMemory** 指定此区域中可存储的最大缓存实体数量。我们对两个缓存区域都使用了 **10000** 这个值，但仔细考虑这个数字非常重要。使用过高的值可能会导致
    **OutOfMemoryException** 问题，并降低性能。由于对象大小和访问模式在不同应用程序之间差异很大，因此最好尝试这些设置并对你的应用程序进行性能分析，以确定最佳值。


    • **eternal** 指定缓存区域是否应该“永久存在”。当你希望在重启之间保持缓存预填充时，此值（与 **overFlowToDisk** 一起）会很有用。在填充缓存可能需要大量时间的情况下，这也很有价值。将
    **eternal** 设置为 **true** 将确保你的缓存数据持久存在，即使应用程序需要重启。


    • **timeToIdleSeconds** 指定缓存项在没有被尝试访问时，在缓存中保留的时间。例如，如果某个特定的 **Category** 实例存储在缓存中，但有一段时间没有尝试从缓存加载此值，那么保留此缓存项的好处就值得怀疑。最好将此设置保持在
    **timeToLiveSeconds** 属性值的一半左右。


    • **timeToLiveSeconds** 对应于实体的 TTL——即缓存实体过期且数据从缓存中清除之前的时间量，无论上次访问时间如何。


    • **overFlowToDisk** 指定如果超出 **maxElementsInMemory**，Ehcache 应开始将溢出数据存储到磁盘。虽然此设置听起来很有用，但请记住，与内存存储相比，将数据持久化到磁盘会带来显著的性能损失。你使用缓存是因为你有一个用于永久持久化数据的数据库。当然，缓存到磁盘的数据性能会优于数据库，但你仍然应该仔细考虑此设置。

    '
- fmt: "# 重要注意事项：仔细考虑 TTL 值\n\n仔细考虑你的 TTL 值非常重要。将这些值设置得过高会增加数据陈旧和版本冲突的可能性。在应用程序部署于集群配置（但每个应用服务器节点的缓存不共享）的情况下，这种风险会显著增加。在典型的集群配置中，对一个节点所做的更新会使该节点的缓存失效，但这些更改不会传播到集群中其他节点的缓存。一种解决方案是为`timeToLiveSeconds`属性使用较低的\
    \ TTL 值，这可以减少缓存中数据陈旧的可能性。更好的解决方案是使用可集群的缓存解决方案，它允许集群中的所有节点使用共享缓存，从而显著减少冲突和数据陈旧的可能性。我们将在本章后面讨论集群缓存策略。\n\
    \n# 第 9 章 ■ 最佳实践与高级技术\n\n## 缓存查询\n\n与集合缓存非常相似，查询缓存尝试仅存储特定查询结果返回的实体的标识符。默认情况下，所有查询都缓存在单个区域中，但你可以通过为特定查询指定区域名称来覆盖此设置，从而强制将查询缓存到其他地方。特定缓存查询的键由查询以及每个查询参数的标识符或值组成。这种方法确保每个缓存查询的结果被单独缓存。如果使用略有不同的参数调用相同的查询，则不会使用缓存。\n\
    \n虽然域对象和集合的缓存更像是默认配置的一部分，但查询缓存需要一些额外的步骤。首先，必须启用二级缓存，如上一节所述。接下来，必须在你的`persistence.xml`文件中将以下属性设置为`true`：\n\
    \n```xml\n<property name=\"hibernate.cache.use_query_cache\" value=\"true\"/>\n\
    ```\n\nHibernate 利用一个额外的缓存区域来支持其查询缓存实现：`UpdateTimestampsCache`。这个缓存区域也应该在 Ehcache\
    \ 配置文件中显式配置。以下是一个示例配置：\n\n```xml\n<cache name=\"org.hibernate.cache.UpdateTimestampsCache\"\
    \n       maxElementsInMemory=\"5000\"\n       eternal=\"true\"\n       overflowToDisk=\"\
    true\"/>\n```\n\n在这里，我们指定这个缓存区域应该是`eternal`。这是`UpdateTimestampsCache`的推荐设置，但至少，其\
    \ TTL 应该长于任何查询缓存区域的 TTL。\n\n如果你决定对所有查询缓存使用默认缓存区域，你可以在 Ehcache 中为查询缓存本身配置如下：\n\n\
    ```xml\n<cache name=\"org.hibernate.cache.StandardQueryCache\"\n       maxElementsInMemory=\"\
    500\"\n       eternal=\"false\"\n       timeToLiveSeconds=\"120\"\n       overflowToDisk=\"\
    true\"/>\n```\n\n此配置定义了要缓存的查询的缓存区域设置。\n\n# 第 9 章 ■ 最佳实践与高级技术\n\n## 查询缓存的一个警告\n\
    \n我们强烈建议在尝试使用查询缓存之前进行一些性能测试，因为它实际上可能会降低性能而不是提高性能。\n\n查询缓存有时会导致比不使用它更差的性能，原因在于`UpdateTimestampsCache`的使用。这个区域跟踪应用程序中所有表的最新更新，为每个表存储对应的时间戳，记录特定表上次更新的时间。当调用一个查询时，即使结果数据仍然存储在缓存中，如果\
    \ Hibernate 检测到与查询关联的表自查询被缓存以来已发生更改，它会使查询数据失效，并且你必须访问数据库而不是缓存。因此，如果你的应用程序在任何表上频繁发生更新，查询缓存的好处就会减少。此外，因为对任何表的更新也意味着对`UpdateTimestampsCache`的更改，由于锁竞争，这个资源可能成为瓶颈。突然间，查询缓存听起来就没那么有用了。\n\
    \n然而，我们不想让你气馁。理解查询缓存功能的工作方式很重要，这样你就能更好地评估你的需求，并确定它是否适合你的应用程序。\n\n## 集群配置中的缓存\n\
    \n如果你正在构建一个旨在处理大量请求的应用程序，你可能需要在集群配置中设置多个应用程序节点。虽然拥有多个节点将为你的应用程序提供更多资源，但如果每个节点维护自己的缓存，你将开始给数据库带来压力。随着集群中每增加一个节点，数据库负载将相应增加，使得集群中的节点数量代表数据库请求量的一个因子：\n\
    \n`(集群中的节点数) * (请求数) = 数据库负载`\n\n此外，一个节点对数据库的更新不会传播到集群中其他节点的缓存状态，从而导致脏读。显然，数据库负载将随着集群中应用服务器节点的数量成比例增加，但也必须考虑缓存；你的缓存策略越有效，数据库负载就越小。话虽如此，即使采用激进的缓存策略，数据库负载仍然会乘以节点数量。实际上，随着集群中节点数量的增加，你的缓存效率会相应减弱。\n\
    \n当构建具有高写入量对象的应用程序时，解决方案是消除每个节点维护单个缓存的冗余，转而采用集群缓存配置。有几种缓存实现提供了集群能力，包括 Ehcache\
    \ 和 SwarmCache。在我们的讨论中，我们将继续使用 Ehcache 作为我们的缓存提供者。\n\n# 第 9 章 ■ 最佳实践与高级技术\n\n\
    ## 集群缓存与复制机制\n\nEhcache 提供了三种不同的机制来同步每个节点的缓存数据。当数据持久化到一个节点的缓存时，更改会使用特定的复制策略广播到集群中的其他节点。Ehcache\
    \ 支持通过 JMS、RMI、JGroups 或 Terracotta 进行复制。对于所有这些策略，Ehcache 不会尝试使用锁定来防止集群节点之间的数据不一致。这很可能是出于性能考虑，因此你的应用程序应该能够处理潜在的数据陈旧问题。"
  raw: 'It is very important to carefully consider your TTL values. Setting these
    values too high increases the potential for stale data and version conflicts.
    This risk is significantly increased in situations where an application is deployed
    in a clustered configuration (but the cache for each application server node is
    not shared). In a typical cluster configuration, updates made to one node will
    invalidate that node’s cache, but these changes won’t propagate to the caches
    of other nodes in the cluster. One solution is to use a lower TTL value for the
    **timeToLiveSeconds** attribute, which reduces the likelihood of stale data in
    the cache. A better solution is to use a clusterable caching solution, which allows
    all the nodes in the cluster to use a shared cache, significantly reducing the
    potential for conflicts and stale data. We will discuss clustered caching strategies
    later in this chapter.


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    Caching Your Queries


    Much like collections caching, query caching attempts to store only the identifiers
    of the entities returned by a particular query’s result. By default, queries are
    all cached within a single region, but you can override this setting by specifying
    a region name for a particular query, forcing the query to be cached elsewhere.
    The key for a particular cached query is composed of the query along with the
    identifiers or values of each of the query’s parameters. This approach ensures
    that the results of each cached query are cached separately. If the same query
    is invoked with slightly different parameters, the cache will not be used.


    While caching of your domain objects and collections is more a part of the default
    configuration, query caching requires a few additional steps. First, the second-level
    cache must be enabled, as described in the previous section. Next, the following
    property must be set to true in your **persistence.xml** file:


    **<property name="hibernate.cache.use_query_cache" value="true"/>** Hibernate
    leverages an additional cache region for powering its query cache implementation:
    the **UpdateTimestampsCache**. This cache region should also be configured explicitly
    in the Ehcache configuration file. Here is a sample configuration:


    ****<cache name="org.hibernate.cache.UpdateTimestampsCache"**


    **maxElementsInMemory="5000"**


    **eternal="true"**


    **overflowToDisk="true"/>**


    Here, we specified that this cache region should be **eternal**. This is the recommended
    setting for the **UpdateTimestampsCache**, but at the very least, the TTL should
    be longer than the TTL of any of the query cache regions.


    If you decide to use the default cache region for all query caches, you could
    configure the following in Ehcache for your query cache itself:


    ****<cache name="org.hibernate.cache.StandardQueryCache"**


    **maxElementsInMemory="500"**


    **eternal="false"**


    **timeToLiveSeconds="120"**


    **overflowToDisk="true"/>**


    **This configuration defines the cache region settings for the queries to be cached.


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    **A QUERY CACHING CAVEAT**


    We strongly recommend doing some performance testing before attempting to use
    query caching, as it can actually degrade performance rather than improve it.


    The reason query caching can sometimes cause worse performance than not using
    it at all is due to the use of the **UpdateTimestampsCache**. This region keeps
    track of the most recent updates for all tables within the application, storing
    timestamps for each table corresponding to the last time a particular table was
    updated. When a query is invoked, even if the result data is still stored in the
    cache, if Hibernate detects that a table associated with your query has changed
    since your query was cached, it will invalidate the query data, and you must hit
    the database instead of the cache. Therefore, if your application incurs frequent
    updates across any of your tables, the benefits of query caching become reduced.
    Furthermore, because any update to any table also means changes to the **UpdateTimestampsCache**,
    this resource becomes a potential for bottlenecks, due to lock contention. Suddenly,
    query caching doesn’t sound so useful.


    We don’t want to discourage you, however. It is important to understand the way
    in which the query caching feature works, so that you can better evaluate your
    requirements and determine whether it is appropriate for your application.


    Caching in a Clustered Configuration


    If you are building an application that is intended to handle a high volume of
    requests, you will likely need to set up multiple application nodes in a clustered
    configuration. Although having multiple nodes will provide more resources for
    your application, if each node maintains its own cache, you will begin to strain
    the database. With each additional node added to the cluster, you will increase
    database load commensurately, such that the number of nodes in your cluster will
    represent the factor of database request volume:


    ( *Num Nodes in Cluster*) * ( *Requests*) = *Load on Database* Additionally, updates
    to the database by one node will not be propagated to the cache state of other
    nodes in the cluster, resulting in stale reads. Obviously, the load on the database
    will increase in proportion to the number of application server nodes in the cluster,
    but caching must also be taken into consideration; the more effective your caching
    strategy, the lesser the load on the database. That said, the database load will
    still be multiplied by the number of nodes, even with an aggressive caching strategy.
    In effect, your caching efficacy is commensurately weakened as the number of nodes
    in your cluster increases.


    When building applications that have objects that receive high volumes of writes,
    the solution is to remove the redundancy of maintaining a single cache per node,
    and instead move to a clustered caching configuration. There are several caching
    implementations that provide clustering capability, including Ehcache and SwarmCache.
    For our discussion, we’ll continue using Ehcache as our cache provider.


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    Cluster Caching and Replication Mechanics


    Ehcache provides three different mechanisms for synchronizing each node’s cache
    data. As data is persisted to one node’s cache, the changes are broadcast to the
    other nodes in the cluster using a particular replication strategy. Ehcache supports
    replication via JMS, RMI, JGroups, or Terracotta. For all of these strategies,
    Ehcache does not attempt to use locking as a means to prevent data inconsistencies
    between nodes in the cluster. This is likely done for performance considerations,
    and therefore your application should be able to deal with the potential for stale
    data.'
  trans: '

    仔细考虑你的 TTL 值非常重要。将这些值设置得过高会增加数据陈旧和版本冲突的风险。当应用程序以集群配置部署时（但每个应用服务器节点的缓存不共享），这种风险会显著增加。在典型的集群配置中，对一个节点所做的更新会使该节点的缓存失效，但这些更改不会传播到集群中其他节点的缓存。一种解决方案是为
    **timeToLiveSeconds** 属性使用较低的 TTL 值，这可以减少缓存中数据陈旧的可能性。更好的解决方案是使用可集群的缓存方案，它允许集群中的所有节点使用共享缓存，从而显著减少冲突和数据陈旧的可能性。我们将在本章后面讨论集群缓存策略。


    第 9 章 ■ 最佳实践与高级技术


    缓存查询


    与集合缓存非常相似，查询缓存尝试仅存储特定查询结果返回的实体的标识符。默认情况下，所有查询都缓存在单个区域中，但你可以通过为特定查询指定区域名称来覆盖此设置，从而强制将该查询缓存到其他地方。特定缓存查询的键由查询本身以及每个查询参数的标识符或值组成。这种方法确保每个缓存查询的结果被单独缓存。如果使用略有不同的参数调用相同的查询，则不会使用缓存。


    虽然域对象和集合的缓存更多是默认配置的一部分，但查询缓存需要一些额外的步骤。首先，必须启用二级缓存，如上一节所述。接下来，必须在你的 **persistence.xml**
    文件中将以下属性设置为 true：


    **<property name="hibernate.cache.use_query_cache" value="true"/>** Hibernate
    利用一个额外的缓存区域来支持其查询缓存实现：**UpdateTimestampsCache**。这个缓存区域也应该在 Ehcache 配置文件中显式配置。以下是一个示例配置：


    ****<cache name="org.hibernate.cache.UpdateTimestampsCache"**


    **maxElementsInMemory="5000"**


    **eternal="true"**


    **overflowToDisk="true"/>**


    在这里，我们指定了这个缓存区域应该是 **eternal**（永久的）。这是 **UpdateTimestampsCache** 的推荐设置，但至少，其 TTL
    应该长于任何查询缓存区域的 TTL。


    如果你决定对所有查询缓存使用默认的缓存区域，你可以在 Ehcache 中为你的查询缓存本身配置如下：


    ****<cache name="org.hibernate.cache.StandardQueryCache"**


    **maxElementsInMemory="500"**


    **eternal="false"**


    **timeToLiveSeconds="120"**


    **overflowToDisk="true"/>**


    **此配置定义了待缓存查询的缓存区域设置。


    第 9 章 ■ 最佳实践与高级技术


    **查询缓存注意事项**


    我们强烈建议在尝试使用查询缓存之前进行一些性能测试，因为它实际上可能会降低性能，而不是提升性能。


    查询缓存有时会导致比完全不使用更差的性能，原因在于使用了 **UpdateTimestampsCache**。这个区域会跟踪应用程序中所有表的最新更新，为每个表存储对应的时间戳，记录该表上次更新的时间。当调用一个查询时，即使结果数据仍存储在缓存中，如果
    Hibernate 检测到与查询关联的表自查询被缓存以来已发生更改，它会使查询数据失效，并且你必须访问数据库而不是缓存。因此，如果你的应用程序对任何表进行频繁更新，查询缓存的好处就会减少。此外，因为对任何表的更新也意味着对
    **UpdateTimestampsCache** 的更改，由于锁竞争，这个资源会成为潜在的瓶颈。突然间，查询缓存听起来就没那么有用了。


    然而，我们并不想打击你。理解查询缓存功能的工作方式很重要，这样你就能更好地评估你的需求，并确定它是否适合你的应用程序。


    集群配置中的缓存


    如果你正在构建一个旨在处理大量请求的应用程序，你可能需要以集群配置设置多个应用程序节点。虽然拥有多个节点将为你的应用程序提供更多资源，但如果每个节点维护自己的缓存，你将开始给数据库带来压力。随着集群中每增加一个节点，数据库负载也会相应增加，因此集群中的节点数量将代表数据库请求量的倍数：


    ( *集群中的节点数*) * ( *请求数*) = *数据库负载* 此外，一个节点对数据库的更新不会传播到集群中其他节点的缓存状态，从而导致陈旧读取。显然，数据库负载将随着集群中应用服务器节点数量的增加而成比例增加，但也必须考虑缓存因素；你的缓存策略越有效，数据库的负载就越小。话虽如此，即使采用激进的缓存策略，数据库负载仍然会乘以节点数量。实际上，随着集群中节点数量的增加，你的缓存效率会相应减弱。


    在构建具有高写入量对象的应用程序时，解决方案是消除每个节点维护单个缓存的冗余，转而采用集群缓存配置。有几种缓存实现提供了集群能力，包括 Ehcache 和
    SwarmCache。在我们的讨论中，我们将继续使用 Ehcache 作为我们的缓存提供者。


    第 9 章 ■ 最佳实践与高级技术


    集群缓存与复制机制


    Ehcache 提供了三种不同的机制来同步每个节点的缓存数据。当数据持久化到一个节点的缓存时，更改会使用特定的复制策略广播到集群中的其他节点。Ehcache
    支持通过 JMS、RMI、JGroups 或 Terracotta 进行复制。对于所有这些策略，Ehcache 不会尝试使用锁定作为防止集群节点间数据不一致的手段。这很可能是出于性能考虑，因此你的应用程序应该能够处理潜在的数据陈旧问题。

