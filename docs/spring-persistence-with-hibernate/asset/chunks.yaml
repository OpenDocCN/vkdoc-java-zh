    import org.junit.BeforeClass;\n\npublic class SimpleJUnitTest {\n\n    public\
    \ static String staticName = null;\n    public String memberName = null;\n\n \
    \   @BeforeClass\n    public static void initializeClass() {\n        staticName\
    \ = \"Rod Johnson\";\n    }\n\n    @Before\n    public void initializeTest() {\n\
