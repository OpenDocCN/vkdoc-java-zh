    URL 部分可以在方法中使用 **@PathVariable** 注解进行引用。通过这种方式，我们隐式地提取了 URL 的部分内容，并将其注入到方法参数中。


    除了 **@PathVariable** 注解，Spring 还提供了其他几种选项来提取传入请求的各个方面，并将这些值映射到方法参数。例如，查询参数和会话属性也可以通过相应的注解映射到参数。请查阅
    Spring 文档以了解更多关于实现 MVC 控制器的信息。


    使用 Spring OXM 进行数据编组


    我们不能忽略的一个重要细节是如何将 DTO 渲染为 XML。为了实现这一点，我们利用了 Spring 3 的对象/XML 映射（OXM）支持。Spring
    的 OXM 抽象有助于将编组实现细节与应用程序解耦。这使得你的代码更具可移植性，并简化了多种编组策略的集成。


    让我们看一下驱动 REST 服务的 Spring MVC 配置。以下是 **spring-web-gallery.xml** 文件的精简版本。


    **<beans**


    ********xsi:schemaLocation="http://www.springframework.org/schema/beans**


    ****http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**


    ****http://www.springframework.org/schema/context**


    ****http://www.springframework.org/schema/context/spring-context-3.0.xsd**


    ****http://www.springframework.org/schema/util**


    ****http://www.springframework.org/schema/util/spring-util-3.0.xsd">**


    ****<bean class="org.springframework.web.servlet.view.ContentNegotiatingViewResolver">**


    **<property name="mediaTypes">**


    **<map>**


    **<entry key="xml" value="application/xml"/>**


    **<entry key="html" value="text/html"/>**


    **</map>**


    **</property>**


    **<property name="viewResolvers">**


    **<list>**


    **<bean class="org.springframework.web.servlet.view.BeanNameViewResolver"/>**


    **<bean**


    **class="org.springframework.web.servlet.view.InternalResourceViewResolver">**


    **<property name="viewClass"**


    **value="org.springframework.web.servlet.view.JstlView"/>**


    **<property name="prefix">**


    **<value>/WEB-INF/JSP/</value>**


    **</property>**


    **<property name="suffix">**


    **<value>.jsp</value>**


    **</property>**


    **</bean>**


    **</list>**


    **</property>**


    **</bean>**


    ******. . .**


    ****<context:component-scan base-package="com.prospringhibernate.gallery.restapi"/>**


    ****<bean**


    **class="org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping"/>**


    **<bean**


    **class="org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter"/>**


    ****<bean id="jaxbView" class="org.springframework.web.servlet.view.xml.MarshallingView">**


    **<constructor-arg ref="jaxbMarshaller"/>**


    **</bean>**


    ****<!-- JAXB2 编组器。自动将 bean 转换为 xml -->**


    **<bean id="jaxbMarshaller" class="org.springframework.oxm.jaxb.Jaxb2Marshaller">**


    **<property name="classesToBeBound">**


    **<list>**


    **<value>com.prospringhibernate.gallery.dto.ArtEntityDTO</value>**


    **<value>com.prospringhibernate.gallery.dto.CategoryDTO</value>**


    **<value>com.prospringhibernate.gallery.dto.CommentDTO</value>**


    **<value>com.prospringhibernate.gallery.dto.ExhibitionDTO</value>**


    **</list>**


    **</property>**


    **</bean>**


    **. . .**


    ****</beans>**


    让我们逐步了解几个核心组件。首先，我们包含了一个 **ContentNegotiatingViewResolver**。这个 bean 允许我们插入多个 **ViewResolver**（它们驱动特定的渲染策略），并根据请求的
    **content-type** 指定使用哪个 **ViewResolver**。这个 bean 有两个重要属性：**mediaTypes** 和 **viewResolvers**。**mediaTypes**
    属性配置了 **contentTypes**。**viewResolvers** 属性指定了 **ViewResolver**。各个属性中条目的顺序是关键，因为这是将一个与另一个关联起来的方式。


    我们还集成了 **component-scanning**，指定了 REST 控制器的包。


    此外，我们还包含了通过注解执行请求映射所需的 bean。


    最后，我们使用 Spring 的 **org.springframework.web.servlet.view.xml.MarshallingView**
    类为 JAXB 视图指定了一个 bean。这个 bean 需要一个 **marshaller** 作为构造函数参数，我们通过引用接下来定义的 **jaxbMarshaller**
    bean 来注入它。**jaxbMarshaller** bean 还需要一个要绑定的类列表，我们将所有 DTO 类（已使用 JAXB 注解正确标注）传递给它。


    仅此而已！我们建议你查看源代码，以便更清楚地了解 REST 服务和 Spring 的 OXM 支持是如何运作的。


    处理并发


    在开发 REST Web 服务时，我们通常会遇到的一个问题是可靠地处理对特定领域实体的并发修改尝试。在我们之前的 REST 示例中，我们研究了 HTTP GET
    场景，其中我们的 Web 服务仅返回数据库中特定实体（或多个实体）的静态表示。当处理 HTTP PUT 操作（通常意味着应更新资源）时，事情就没那么简单了。


    正确处理同时更新特定领域实体的尝试并不总是直截了当的。根据所采用的方法，可能会在可扩展性风险、数据库死锁可能性以及数据丢失或冲突方面产生后果。


    乐观锁


    对于两个同时发生的事务冲突的可能性相当小的应用程序，Hibernate 和 JPA 提供了对乐观锁的支持。乐观锁对访问或写入数据没有任何限制。相反，在提交当前事务之前，会验证相关领域实体的版本字段。如果版本字段的值与数据库中代表该特定领域实体的行的值不匹配，则意味着并发事务已修改了该领域实体。


    当向领域类添加版本字段时（通过使用 **@Version** 注解字段），每当特定领域实体被更新时，Hibernate 会自动递增该字段的值。然后，我们可以利用此功能来帮助防止在并发事务中修改的实体状态被还原。换句话说，典型的更新操作会通过添加一个
    SQL 条件来检查版本字段，从而增强，例如更新 **ArtEntity** 领域实体的 name 属性将变为：


    **UPDATE artentity SET name = ‘foo’, version = 8 where id = 4 and version = 7;**
    乐观锁的好处在于它不会施加任何可能限制可扩展性的重大约束，例如数据库锁。然而，如果检测到版本不匹配，此策略将抛出异常，这意味着应用程序开发人员必须重新尝试事务，同时尝试协调冲突的数据。


