    **belongsTo**）。


    **hasMany** 关系的工作方式与 **belongsTo** 约定类似。你定义了一个映射，其中 **key** 对应属性（即集合）名称，**value**
    对应领域类。在我们的示例中，我们定义了两个关联：**comments** 和 **categories**。当 Grails 解析此属性时，它会创建相应的集合来保存这些关联。我们可以通过显式地将集合声明为属性来定义要使用的集合类型。例如，我们通过显式定义此属性，将
    **categories** 关联（在我们的 **ArtEntity** 领域类中）定义为 **java.util.Set**：**Set categories
    = new HashSet();**


