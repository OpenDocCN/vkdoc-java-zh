    \n```\nstatic mappings = {\n    cache true\n}\n```\n\n```\n}\n```\n\nThis class\
    \ follows a similar pattern, but uses the `hasMany` property, which defines a\
    \ one-to-many association to another class. It can also be used to declare a many-to-many\
    \ association, as long as one side of the relationship is deemed the owner of\
    \ the association (through the use of `belongsTo`).\n\nThe `hasMany` relationship\
    \ works in a similar fashion to the `belongsTo` convention. You are defining a\
    \ map in which the `key`s correspond to the property (that is, collection) names\
    \ and the `value`s correspond to the domain class. In our example, we are defining\
    \ two associations: `comments` and `categories`. When Grails deciphers this property,\
    \ it will create corresponding collections to be used to hold these associations.\
    \ We can define the type of collection we would like to use by explicitly declaring\
    \ the collection as a property. For instance, we define our `categories` association\
    \ (in our `ArtEntity` domain class) as a `java.util.Set` by explicitly defining\
    \ this property: `Set categories = new HashSet();`\n\n> **Tip** If you need to\
    \ ensure that a collection is logically ordered, you can define a property of\
    \ type `SortedSet`, and then have your collection class implement the `Comparable`\
    \ interface, in which the ordering logic is specified. For instance, if we wanted\
    \ our categories to be ordered alphabetically, we would have our `Category` class\
    \ implement `Comparable` and define a `compareTo(def obj1, def ob2)` method in\
    \ which the ordering is based on the category name.\n\n## Customizing Domain Class\
    \ Hibernate Mappings\n\nYou probably noticed the static `mappings` property defined\
    \ in each of our example domain classes. This field can be used to enhance the\
    \ Hibernate mapping that Grails creates and manages behind the scenes.\n\nIn our\
    \ example, we just assert that the domain entity be cached, using the `CacheManager`\
    \ specified in the `Config.groovy` file. However, the mapping construct is extremely\
    \ flexible and can be used to modify many areas of the default Hibernate mapping\
    \ for a particular domain class. For instance, if you need to override the table\
    \ name or the default column name or type, the mapping DSL provides a means for\
    \ this to be accomplished. It is also possible to add caching rules for collections\
    \ or override the default fetching policy for a collection, specifying whether\
    \ a particular collection will be lazily or eagerly fetched. You can even specify\
    \ that one or more columns map to a particular Hibernate `UserType`.\n\nIn our\
    \ earlier Hibernate example, we defined a hierarchy of `ArtData` classes (each\
    \ extended from the `ArtData` base class). In Grails, implementing polymorphic\
    \ domain classes is even simpler. Here is our `ArtData` class:\n\n## CHAPTER 11\
    \ ■ GORM AND GRAILS\n\n```\nclass ArtData {\n    byte[] picture;\n    static mapping\
    \ = {\n        cache true\n    }\n}\n```\n\nAnd here is the `ArtData_Storage`\
    \ class (which extends `ArtData`):\n\n```\nclass ArtData_Storage extends ArtData\
    \ {\n}\n```\n\nThat’s really all there is to it. By default, Grails uses the table-per-hierarchy\
    \ strategy, meaning it persists the sum of all the properties across the entire\
    \ hierarchy into a single table.\n\nUnlike with Hibernate, there is no need to\
    \ explicitly define a discriminator (to help differentiate between types), as\
    \ Grails will take care of this. However, Grails is flexible enough to allow you\
    \ to use a different polymorphic strategy. For example, you could use the custom\
    \ mapping DSL described earlier like so:\n\n```\nstatic mapping = {\n    tablePerHierarchy\
    \ false\n}\n```\n\nNow that we’ve defined our Grails domain model, let’s move\
    \ on to persisting and retrieving this data.\n\n## Using Active Record As an Alternative\
    \ to DAOs\n\nThroughout this book, you’ve learned how Spring simplifies the development\
    \ of a persistence tier by enforcing several key design patterns, most notably\
    \ the DAO, Template, and Facade patterns. Although Grails is built on the foundations\
    \ of Spring and Hibernate, it provides an alternative to the DAO pattern typical\
    \ of most Spring applications. Following the lead of other rapid development frameworks,\
    \ such as Ruby on Rails, Grails utilizes the Active Record design pattern as the\
    \ approach for handling database persistence operations.\n\nIn keeping with the\
    \ Active Record pattern, a table in the database is represented directly by a\
    \ domain class. For instance, in our gallery example, we have already defined\
    \ a `Person` class that describes a corresponding `Person` table in our database,\
    \ meaning table fields and associations are represented by properties within our\
    \ `Person` class.\n\nThis approach doesn’t seem too different from the domain\
    \ models we’ve used throughout this book. However, the key distinction is that\
    \ the domain class also serves as the wrapper around database operations. Dynamic\
    \ static methods are injected into each domain class, providing a means for querying\
    \ for instances of that class’s type. As in Hibernate, each row in our database\
    \ is represented by a corresponding instance of the appropriate domain class.\
    \ However, `save()` and `update()` methods are injected into each domain class\
    \ instance, allowing newly created or retrieved instances to be persisted by invoking\
    \ `save()` or `update()` directly on that instance.\n\nFor example, if we want\
    \ to create or update a particular row in the `Person` table, we just call `person.save()`\
    \ directly on the `person` instance we wish to save. If we want to load a particular\
    \ `Person` record from the database, we simply call the static method `Person.get(id)`,\
    \ passing in the primary key for the record we wish to retrieve.\n\nContrast this\
    \ approach with the DAO pattern, in which we need to create a separate abstraction\
    \ layer for all database operations related to a particular domain entity. The\
    \ Active Record pattern dramatically simplifies our effort for retrieving and\
    \ persisting data, since there is no need to define any DAO classes or methods.\
    \ Instead, this functionality is implicit within our domain model through dynamic\
    \ behavior that is injected into each domain class.\n\nIf we don’t need to define\
    \ a DAO implementation, where do the implementations for methods like `Person.get(id)`\
    \ and `Person.save()` come from? The Active Record pattern states that we should\
    \ simply be able to define a domain model and begin calling methods on these classes\
    \ to achieve the persistence logic we are trying to build. The question remains,\
    \ however: if we can simply call `save()` on our `Person` instance, where do we\
    \ define the behavior for this method? Let’s take a look under the hood of GORM\
    \ to get a better sense of how this works.\n\n## Looking Under the Hood of GORM\n\
    \nOne of the key advantages to languages like Groovy is that they are dynamic,\
    \ which means, among other things, that you are able to define new behavior for\
    \ your classes at any time. In the case of Grails and the Active Record pattern,\
    \ the framework is able to enhance your domain model with new functionality related\
    \ to persistence. This strategy is a key Groovy concept and is enabled through\
    \ the use of Groovy’s `metaClass` construct, as discussed earlier in this chapter.\n\
    \n## Working with Dynamic Finder Methods\n\nGrails injects new functionality into\
    \ every domain model class to facilitate the Active Record pattern.\n\nUnlike\
    \ with the DAO approach, no methods need to be defined up front. Instead, Grails\
    \ uses naming conventions to interpret how to interact with the database. Using\
    \ the name of the method invoked, Grails intuits what type of operation to perform.\
    \ This is best explained through a few examples."
