- fmt: "# Spring 事务管理\n\n最重要的是，Spring 提供了一种一致的方法来将事务语义应用于应用程序，无论架构或环境如何。这意味着您可以以相同的方式配置和编码应用程序，无论您是使用`JTA`数据源部署到`JEE`应用服务器，还是使用本地数据源部署到轻量级容器。区别仅在于配置。\n\
    \n# 第 8 章 有效测试\n\n自动化测试，特别是单元测试，现在被普遍认为是软件开发的最佳实践。有许多可用的测试框架，并且关于单元测试与集成测试的优劣、是否使用像`jMock`或`EasyMock`这样的框架来模拟具有有趣行为的对象、还是采用更经典的方法使用基本桩、何时应用测试驱动开发（`TDD`）、行为驱动开发（`BDD`）是否会变得普遍等问题，仍有很大的争论空间。\n\
    \n在本书中，我们强调了几个最佳实践，包括分层应用程序和面向接口编程。在本章中，我们将演示这些原则如何有助于构建可靠的测试覆盖，并适当强调隔离测试应用程序的各个方面。\n\
    \n一个被分解成多个层，使得每个层都有独特职责的代码库，比试图将多个功能方面合并到一个类中的代码更易于测试。\n\n可测试的代码是解耦并划分为逻辑层的代码，而良好分层的代码是可测试的，因为它产生了应用程序整体愿景中小的、定义明确的部分。通过面向接口编程并利用\
    \ Spring 的依赖注入能力，您可以在测试上层（在本例中，是使用`DAO`的服务层）时，模拟或桩化一个层（例如`DAO`层）。\n\n像 Spring\
    \ 这样的依赖注入框架对于测试非常有用，因为它们使得直接实例化类并通过代码提供协作者变得相对容易。特别是在 Spring 中，您只需指定适当的注解，就可以在测试类中自动注入依赖项。这允许您为测试构建一个应用程序上下文，该上下文使用的配置选项可能与您的生产设置有很大不同。这种灵活性使您能够针对大量潜在输入测试代码。\n\
    \n当涉及到验证持久化层的断言时，验证您的`DAO`和服务类的行为、域类的配置细节和行为，甚至依赖项的协作和连接都是很重要的。\n\n在本章中，我们将简要介绍这些策略，但重要的是要记住，一个有效的测试策略应该同时包含单元测试和集成测试。幸运的是，Spring\
    \ 有助于简化这两种测试的创建，以及其他形式的自动化测试，例如使用像`Selenium`这样的工具进行功能测试。\n\n## 单元测试、集成测试和功能测试\n\
    \nSpring 使得测试代码的特定部分变得容易，而无需依赖应用服务器或其他基础设施细节。您可以在不同的数据库实现和数据源之间切换，或者通过模拟这些细节来隔离测试您的`DAO`类。\n\
    \n*单元测试*是一种有效的策略，用于验证特定类在隔离环境中是否正常工作。\n\n隔离评估类非常有价值，并且没有可以替代好的单元测试的方法。编写有效的单元测试涉及定义关于类在隔离环境中特定区域行为的断言。好的测试覆盖与哪些代码行的预期行为得到验证有关。\n\
    \n与单元测试不同，*集成测试*通常同时验证多个组件，通常通过运行应用程序生产版本中使用的相同实现层。例如，集成测试的一个常见做法是实例化 Spring `ApplicationContext`，并使用真实的数据库以及\
    \ Spring Hibernate 抽象来测试`DAO`实现。这种方法的优点是您接触了多个组件，确保所有部分都能正确地协同工作。缺点是它不能提供足够的粒度来确定特定组件本身是否正常工作。对于全面的测试策略，我们建议同时包含集成测试和单元测试。\n\
    \n一个*测试套件*是一组设计为一起运行的单个测试类，它们通常对特定层或组件做出断言。例如，您可以创建一个由所有`DAO`测试组成的`DAO`测试套件。以下示例展示了创建测试套件所需的一切：\n\
    \n```\npublic void static testSuite() {\n    return new TestSuite(ArtworkDao.class,\n\
    \            CategoryDao.class,\n            ExhibitionDao.class,\n          \
    \  PersonDao.class);\n}\n```\n\n现代`IDE`（`Eclipse`、`IntelliJ IDEA`、`NetBeans`等）和其他运行时环境（如`Ant`和`Maven`）知道如何运行单个单元测试和测试套件，这些套件可以同时包含单元测试和集成测试。通常使用套件的概念来策略性地捆绑测试。例如，您可能想要一个由快速单元测试组成的测试套件，在每次提交时运行；以及另一个由运行时间较长的集成测试组成的测试套件，按计划的时间间隔运行。\n\
    \n功能测试是验证应用程序行为是否正确的另一种策略。功能测试提供了对代码库最高级别的评估，通常要求应用程序在生产环境容器中运行——例如，使用`servlet`容器。\n\
    \n在 Web 应用程序上下文中，功能测试通常涉及一系列`HTTP`请求，然后对应该返回的响应进行断言。例如，一个`REST` Web 服务可能包含一组功能测试，用于验证当一段`XML`被`POST`到特定`URL`时返回的数据。另一种类型的功能测试可能会验证给定特定`URL`时，返回的`HTTP`响应中的某些`HTML`元素。\n\
    \n功能测试的缺点，特别是当它们涉及验证`HTML`标记时，是它们往往非常脆弱——这意味着它们可能会因为应用程序的微小更改而中断。\n\n然而，功能测试确实有其用武之地，并且它们通常是验证关于应用程序行为的基本假设的有效工具。\n\
    \n## 使用 JUnit 进行有效测试\n\n目前 Java 社区中最大的两个单元测试框架是`JUnit`和`TestNG`。在我们的示例中，我们将使用`JUnit`。`JUnit\
    \ 4`的方法高度基于注解。`@Test`注解就是您定义测试所需添加的全部内容：\n\n```\npackage com.prospringhibernate.gallery.test;\n\
    \nimport org.junit.Test;\nimport org.junit.Assert;\n\npublic class TrivialJUnitTest\
    \ {\n\n    @Test\n    public void testSimpleStuff() {\n        String name = \"\
    ProSpringHibernate\";\n        Assert.assertEquals(\"ProSpringHibernate\", name);\n\
    \    }\n\n}\n```\n\n一些额外的基本`JUnit`注解可以帮助定义测试的生命周期。您可以使用`@Before`和`@After`注解在每个测试方法之前和之后立即运行一些代码。猜猜哪个在测试之前运行？您还可以使用`@BeforeClass`和`@AfterClass`在特定类中的所有测试之前和之后运行代码。（注意，`@BeforeClass`方法必须是静态的。）还有一个`@Ignore`注解，它允许您使用`@Test`注解但不运行特定方法。"
  raw: 'Most important, Spring provides a consistent approach for applying transactional
    semantics to an application, no matter what the architecture or environment. This
    means that you can configure and code your application the same way, regardless
    of whether you’re deploying to a JEE app server using a JTA datasource or to a
    lightweight container with a local datasource. The difference is just a matter
    of configuration.


    **C H A P T E R 8**


    ■ ■ ■


    **Effective Testing**


    Automated testing, and unit testing in particular, is now universally regarded
    as a best practice for software development. A number of testing frameworks are
    available, and there remains plenty of room to debate the merits of unit testing
    versus integration testing, whether to mock objects with interesting behavior
    with frameworks like jMock or EasyMock or take a more classic approach with basic
    stubs, when to apply test-driven development (TDD), whether behavior-driven development
    (BDD) will become commonplace, and so on.


    Throughout this book, we’ve highlighted several best practices, including layering
    your application and coding to interfaces. In this chapter, we’ll demonstrate
    how these principles lend themselves to building solid test coverage with proper
    emphasis on exercising aspects of an application in isolation.


    A code base that is broken down into layers so that each layer has a unique responsibility
    is much more testable than code that attempts to combine multiple aspects of functionality
    into a single class.


    Testable code is code that is decoupled and divided into logical layers, and well-layered
    code is testable because it produces small, defined parts of an application’s
    overall vision. By coding to interfaces and leveraging Spring’s dependency-injection
    capabilities, you gain the ability to mock or stub one layer (such as the DAO
    layer) when you’re testing the layer above it (in this case, the service layer
    that uses DAOs).


    Dependency-injection frameworks like Spring are tremendously useful for testing
    because they make it relatively easy to instantiate classes directly, providing
    collaborators through code. With Spring in particular, you can automatically inject
    dependencies within your test classes simply by specifying the appropriate annotations.
    This allows you to construct an application context for your tests that uses configuration
    options that may differ quite a bit from your production setup. This flexibility
    enables you to test your code against a large number of potential inputs.


    When it comes to verifying assertions of a persistence tier, it is important to
    verify the behavior of your DAO and service classes, the configuration details
    and behavior of your domain classes, and even the collaboration and wiring of
    dependencies.


    We will skim the surface of these strategies in this chapter, but it is important
    to keep in mind that an effective testing strategy should incorporate both unit
    and integration tests. Luckily, Spring helps to simplify the creation of both
    of these kinds of tests, as well as other forms of automated testing, such as
    functional testing with tools like Selenium.


    CHAPTER 8 ■ EFFECTIVE TESTING


    Unit, Integration, and Functional Testing


    Spring makes it easy to test specific parts of your code without relying on an
    application server or other infrastructural details. You can switch between different
    database implementations and datasources, or test your DAO classes in isolation
    by mocking these details.


    *Unit testing* is an effective strategy for verifying that a particular class
    works properly in isolation.


    Assessing classes in isolation is very valuable, and there is no commensurate
    replacement for a good unit test. Writing an effective unit test involves the
    definition of assertions regarding the behavior of specific areas of a class in
    isolation. Good test coverage is related to which lines of code have their expected
    behavior verified.


    Unlike unit testing, *integration testing* typically verifies multiple components
    simultaneously, often by running the same implementation layers used within the
    production version of an application. For instance, a common practice for integration
    testing is to instantiate the Spring **ApplicationContext** and test a DAO implementation
    using a real database along with the Spring Hibernate abstractions. The advantage
    of this approach is that you are touching multiple components, ensuring that all
    the pieces are working together properly. The disadvantage is that it doesn’t
    provide much granularity to ascertain whether a particular component works properly
    on its own. For a comprehensive testing strategy, we recommend including both
    integration and unit tests.


    A *test suite* is a set of individual test classes that are designed to run together
    and that typically make assertions related to a particular layer or component.
    For example, you can create a DAO test suite composed of all of your DAO tests.
    The following example shows all you need to do to create a suite of tests:


    **public void static testSuite() {**


    **return new TestSuite(ArtworkDao.class,**


    **CategoryDao.class,**


    **ExhibitionDao.class,**


    **PersonDao.class);**


    **}**


    Modern IDEs (Eclipse, IntelliJ IDEA, NetBeans, and many more) and other runtime
    environments (such as Ant and Maven) know how to run both individual unit tests
    and test suites, which can include both unit and integration tests. It’s common
    to use the notion of suites to strategically bundle tests together. For example,
    you might want a test suite of fast unit tests that are run on every commit and
    a different test suite composed of longer-running integration tests, which are
    done on some scheduled interval.


    Functional tests are another strategy for verifying your application is behaving
    properly. Functional tests provide the most high-level assessment of a code base,
    and typically require that an application run within a production environment
    container—for instance, using a servlet container.


    Functional tests in a web application context usually involve a series of HTTP
    requests and then assertions as to the responses that should be returned. For
    example, a REST web service might include a battery of functional tests that verify
    the data that is returned when a chunk of XML is **POST**ed to a particular URL.
    Another type of functional test might verify certain HTML elements within a returned
    HTTP response, given a particular URL.


    The downside of functional tests, especially as they relate to verifying HTML
    markup, is that they tend to be very brittle—meaning they are likely to break
    as a result of minor changes to the application.


    However, functional tests do have their place, and they are often an effective
    tool to verify basic assumptions regarding an application’s behavior.


    CHAPTER 8 ■ EFFECTIVE TESTING


    Using JUnit for Effective Testing


    The two biggest unit testing frameworks in the Java community at present are JUnit
    and TestNG. For our examples, we will use JUnit. JUnit 4’s approach is highly
    annotation-based. The **@Test** annotation is all you need to add to define a
    test:


    **package com.prospringhibernate.gallery.test;**


    ****import org.junit.Test;**


    **import org.junit.Assert;**


    ****public class TrivialJUnitTest {**


    ****@Test**


    **public void testSimpleStuff() {**


    **String name = "ProSpringHibernate";**


    **Assert.assertEquals("ProSpringHibernate", name);**


    **}**


    ****}**


    A couple of additional basic JUnit annotations can help define the life cycle
    of the test. You can run some code immediately before and after each test method
    using the **@Before** and **@After** annotations.


    Guess which one comes before a test? You can also run code before and after all
    tests in a particular class using **@BeforeClass** and **@AfterClass**. (Note
    that the **@BeforeClass** method must be static.) There’s also an **@Ignore**
    annotation, which allows you to use a **@Test** annotation and not run a particular
    method.'
