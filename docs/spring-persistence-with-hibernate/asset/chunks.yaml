    此外，为每个属性定义的约束条件，结合一致的命名规范，会被整合成错误消息代码，并自动用于默认的 Grails Groovy Server Pages (GSP)
    模板中。例如，如果你尝试保存一个 **Person** 实体，但没有指定 **username**，就会触发验证错误，并与该实例的 **errors** 属性关联。随后，这个错误会使用应用程序的
    **messages.properties** 资源包中定义的错误代码，在默认的 GSP 模板中正确渲染。


    当找到验证错误代码时，Grails 会尝试在 **messages.properties** 文件中查找相应的代码，从最具体的命名规范开始，逐步向更通用的规范查找，直到找到匹配项。这确保了即使你没有在
    **messages.properties** 文件中添加特定的错误代码，用户仍然会看到合理的错误信息（例如，提示 **username** 字段的 **blank**
    约束被违反）。不过，你也可以通过指定一个针对 **Person** 类的 **blank** 约束错误代码，轻松覆盖这个默认消息。


    定义关联和属性


    **Person** 领域实体是一个相当简单的例子，因为它实际上不包含任何关联或自定义映射。让我们看一个更复杂的实体，了解 Grails 如何处理典型场景。更新你的领域模型，然后我们将深入探讨。使用
    **grails create-domain-class** 脚本分别创建 **ArtEntity**、**Category** 和 **Comment**
    类的存根。然后，**Comment** 类将被修改如下：


    **class Comment {**


    ****String comment;**


    **Date commentDate;**


    **Person person;**


    ****static belongsTo = [commentedArt: ArtEntity]**


    ****static constraints = {**


    **comment(maxSize: 2000, blank: false)**


    **commentDate(nullable: false)**


    **}**


    ****static mapping = {**


    **cache true**


    **}**


    ****}**


    第 11 章 ■ GORM 和 GRAILS


    这个类与我们之前定义的 **Person** 实体类似。我们定义了一些属性，以及一个 **constraints** 块。新增的一个字段是 **belongsTo**，它为
    Grails 提供了两个实体之间关系的线索。在这个例子中，我们定义了 **Comment** 和 **ArtEntity** 之间的父子关系。我们还定义了一个名为
    **commentedArt** 的属性，并声明该属性的类型是 **ArtEntity**。我们可以通过向这个映射中添加更多项来指定额外的 **belongsTo**
    关系。在每种情况下，**key** 代表属性名，**value** 代表类型。


    ■ **注意** **belongsTo** 属性定义了关联的拥有方。当一个领域类指定了 **belongsTo** 属性时，它并不是关联的拥有者。关联的拥有者是
    **belongsTo** 属性所引用的类。


    使用 **belongsTo** 也规定了级联规则。在前面的例子中，我们声明 **ArtEntity** 是此关系中的父级，这意味着（对 **ArtEntity**
    的）保存和删除操作将适当地级联到相关的 **Comment** 实例。在我们检查另一侧，即 **ArtEntity** 领域类之后，这种关系将变得更加清晰。


    **class ArtEntity {**


    ****String title;**


    **String subTitle;**


    **Date uploadedDate;**


    **Date displayDate;**


    **int width;**


    **int height;**


    **String media;**


    **String description;**


    **String caption;**


    **ArtData_Gallery galleryPicture;**


    **ArtData_Storage storagePicture;**


    **ArtData_Thumbnail thumbnailPicture;**


    **boolean isGeneralViewable;**


    **boolean isPrivilegeViewable;**


    ****static hasMany = [categories: Categories, comments: Comment]**


    **static belongsTo = Category**


    ****static constraints = {**


    **title(blank:false, maxSize: 255)**


