- fmt: 'It’s easy to see what’s going on here: we verify that enough cash exists in
    a particular account, and then pull the funds from one account and transfer them
    to another. The task is simple enough, but it doesn’t take an overactive imagination
    to visualize the hysteria that might ensue should this business method fail halfway
    through the process—the funds might be withdrawn but never get deposited into
    the destination account. That might be good for the bank at first, but after a
    short while the entire economy collapses, and civilization is left with only a
    rudimentary barter system based on crazy straws and Star Wars action figures.


    # CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    ## Leveraging Declarative Transactions


    Service facade methods typically group together multiple DAO methods to accomplish
    business logic as a single unit of work. This is the concept of a transaction:
    the entire method (and all of its side effects) completes 100 percent successfully,
    or the application is rolled back to the state before the method was called. Before
    Spring persistence came on the scene, transactional requirements often prompted
    developers to look toward EJBs, which let them declaratively configure transactional
    semantics for each facade method. When they cannot specify transactional requirements
    declaratively, developers must instead use a programmatic approach. Not only does
    this add code complexity and obscure the intentions of the persistence logic,
    it further couples the persistence technology to the application.


    Transactional demarcation is often considered a *cross-cutting concern*, meaning
    it represents functionality that affects many parts of the codebase, but is orthogonal
    to their other features. Cross-cutting concerns add redundancy to code, since
    they need to be repetitively interweaved into the fabric of the business logic
    of an application, reducing code modularity. Aspect-Oriented Programming is aimed
    at solving this problem by allowing these concerns to be expressed once, and once
    only, as aspects, and then weaved into business logic as necessary.


    In Spring, the service layer typically is intended to accomplish three primary
    tasks:


    - Serve as the core API through which other layers of your application will interface
    (this is the incarnation of the facade pattern)

    - Define the core business logic, usually calling on one or more DAO methods to
    achieve this goal

    - Define transactional details for each facade method


    ## Understanding Aspect Oriented Programming (AOP)


    The service layer is where Spring’s AOP support is best utilized. Spring ships
    with transactional support that can be applied to application code through the
    use of interceptors that enhance your service layer code, by weaving in the transactional
    goodness. An interceptor is code that can be mixed into the execution flow of
    a method, usually delegating to the interceptor before and/or after a particular
    method is invoked. Simply speaking, an interceptor encapsulates the behavior of
    an aspect at a point in a method’s execution.


    It’s not enough to specify that a method should be transactional. You shouldn’t
    just force each method to occur within the confines of a transaction, rolling
    back if an error occurs and committing if all goes well. Perhaps certain methods
    don’t attempt to modify any data, and therefore should execute within the context
    of a read-only transaction. Or more likely, perhaps some exceptions will trigger
    a rollback, while others will allow the transaction to carry on.


    Pointcuts are another important component of Spring AOP. They help to define where
    a particular aspect (modularized functionality that can be weaved into application
    logic, such as transactional behavior) should be weaved. With Spring’s transactional
    support, you have fine-grained control over which exceptions may trigger a commit
    or rollback, as well as the details over the transaction itself, such as determining
    the isolation level and whether a method should trigger a new transaction or a
    nested transaction, or execute within the existing transaction.


    At a basic level, Spring accomplishes AOP through the use of the proxy design
    pattern. When you advise your classes by injecting cross-cutting behavior into
    various methods, you’re not actually injecting code throughout your application
    (although in a way, that is the net effect of using AOP).


    Rather, you’re requesting that Spring create a new proxy class, in which functionality
    is delegated to your existing class along with the transactional implementation
    (or whatever aspect you are trying to weave into your code). This explanation
    is an oversimplification of what actually happens under the hood, but the important
    thing to remember is that when you weave cross-cutting behavior into your classes
    via AOP, Spring is not directly inserting code; rather, it is replacing your classes
    with proxies that contain your existing code intertwined with the transactional
    code. Under the hood, this is implemented using JDK dynamic proxies or CGLIB bytecode
    enhancement.


    Again, it’s easy to see how this is a natural fit for a lightweight, IOC container
    like Spring. Since you’re already entrusting Spring with handling your dependencies,
    it makes perfect sense to let Spring also take care of proxying these dependencies
    so you can layer on new cross-cutting behavior.


    Although Spring AOP is amazingly powerful when you need to define and introduce
    new aspects to be weaved into your implementations, key transactional functionality
    is available out of the box and without the need to learn the details of AOP programming
    concepts. Still, understanding the basics of what Spring does under the hood is
    helpful. Keep in mind that AOP is useful for more than just applying transactional
    behavior—it is helpful for weaving any cross-cutting concern into your application,
    such as logging or security. We will discuss AOP in more detail later in this
    book.


    ## Simplifying Transactions


    Although applying transactions using Spring used to require a bit of AOP know-how,
    this process has been greatly simplified in recent versions of the framework.
    Now, applying transactional behavior to a service layer class is a matter of specifying
    the `@Transactional` annotation at either the class or method level. This annotation
    can be parameterized with attributes to customize its behavior, however the most
    significant detail is whether a transaction is read-only. Many developers don’t
    recognize the importance of using transactions—even within a read-only context.
    Transactions can be useful for more than just ensuring atomicity. Transactions
    can also be used to specify a database isolation-level, and to delineate other
    contextual details that might be ambiguous outside a transactional scope. We strongly
    recommend that all database operations occur within the scope of some transaction—even
    if just to gain control over the contextual state of the database. We will discuss
    some of these details, such as understanding isolation levels and advanced transactional
    options, in Chapter 8.


    ## The Benefit of Coding to Interfaces'
