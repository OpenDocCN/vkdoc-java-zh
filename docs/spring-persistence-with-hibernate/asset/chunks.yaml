    数据访问对象（DAO）层


    DAO 层定义了保存和查询领域模型数据的方法。DAO 有助于抽象出特定数据库或持久化技术的细节，从领域模型的角度提供持久化行为的接口，同时封装持久化技术的显式特性。DAO
    模式的目标是完全抽象底层持久化技术及其加载、保存和操作领域模型所表示数据的方式。DAO 模式的主要优势在于关注点分离——持久化技术和数据源的底层细节被抽象为一系列提供查询和保存功能的方法。如果底层持久化技术发生变化，大部分必要的修改将仅限于按照相同接口定义新的
    DAO 实现。


    例如，我们可以创建一个 **PersonDAO** 类来定义应用程序中与 **Person** 实体相关的所有持久化需求。在 **PersonDao** 中，我们可能会有一个类似如下的方法：**public
    Person getPersonById(Long id);**


    该方法将负责使用唯一标识符从数据库加载 **Person** 实体。


    以下可能是应用程序的另一个方法：


    **void savePerson(Person person);**


    第 1 章 ■ 使用 Spring、Hibernate 和模式构建应用程序架构


    该方法旨在处理对 **Person** 表中给定行的所有更新（即创建或修改）。


    在定义 DAO 时，最佳实践是先编写接口，该接口应描述应用程序所需的所有核心持久化相关方法。我们建议为领域模型中的每个持久化实体创建独立的 DAO，但在这方面没有明确的规则。然而，在独立接口中定义
    DAO 方法至关重要，因为它将 DAO 的目的和契约与实际实现解耦，甚至允许你为给定的 DAO 接口编写多个实现。


    需要注意的是，此类接口与后台使用的持久化技术无关。换句话说，该接口仅依赖于相关的领域模型类，从而将应用程序与持久化细节解耦。当然，DAO 实现类将使用 Hibernate、JPA
    或我们选择的任何持久化技术。然而，应用程序的更高层通过 DAO 接口与这些细节隔离，为我们提供了可移植性、一致性和良好的分层架构。


    正如我们之前提到的，Spring 框架还提供了一个通用的数据异常层次结构，适用于所有类型的持久化框架和使用场景。在每个持久化框架集成库中，Spring 出色地将每个框架特定的异常转换为
    Spring 通用数据访问异常层次结构中的异常。Spring 通用异常层次结构中的所有异常都是非受检异常，这意味着你的应用程序代码无需捕获它们。Spring
    有助于将应用程序与特定持久化框架解耦，允许你针对通用且定义良好的异常层次结构进行编码，该层次结构可用于任何持久化技术。


    在第 6 章中，我们将深入探讨 DAO 实现策略，探索 Hibernate 和 JPA 提供的灵活查询和保存/更新功能。特别是查询可能相当复杂，为此，Hibernate
    和 JPA 提供了两种不同的搜索和访问数据的方法。HQL 和 JPQL（分别是 Hibernate 查询语言和 Java 持久化查询语言）都提供了面向对象的语法来表达查询，这与
    SQL 非常相似。尽管简洁直观，但 HQL 和 JPQL 在运行时被解释，这意味着你无法使用编译器来验证查询的正确性和完整性。


    为了解决这一限制，Hibernate 还包含一个 Criteria API，允许以编程方式表达查询。直到最近，JPA 还没有提供 Criteria API，这意味着如果开发者需要这种类型的查询功能，他们必须跳出
    JPA 标准。然而，随着 JPA 2.0 的引入，Criteria API 现在已成为标准的一部分。


    使用 HQL/JPQL 还是 Criteria API 有时是风格问题。然而，在某些情况下，Criteria API 更有效且更易于维护。例如，如果你正在构建一个需要动态过滤或排序的功能，能够根据用户的运行时规范以编程方式动态创建查询，比尝试通过字符串拼接动态生成
    JPQL 查询字符串要清晰得多。我们将在第 6 章进一步讨论这些类型的实现决策。


    服务外观


    处理应用程序业务逻辑的层（令人惊讶地）被称为*服务层*。服务层通常定义应用程序的公共 API，将一个或多个底层 DAO 操作组合成一个内聚的事务单元。


    为了帮助你理解服务层是如何构建和使用的，让我们看几个例子：**Person loginUser(String username, String password);**


    第 1 章 ■ 使用 Spring、Hibernate 和模式构建应用程序架构


    **loginUser()** 方法旨在验证用户身份（即验证指定的用户名和密码是否匹配），然后将重要的用户信息加载到会话中（获取用户信息，如姓名、上次登录日期、角色类型等）。这些任务可能不会由单个
    DAO 方法处理。相反，我们可能会基于两个不同的 DAO 类（PersonDAO 和 RoleDAO）的功能来构建：


    **interface PersonDao {**


    ****Person authenticatUser(String username, String password);**


    ****. . .**


    ****}**


    ********interface RoleDao {**


    ****List<Role> getRolesForPerson(Person person);**


    ****. . .**


    ****}**


    这些 DAO 方法共同实现了一个核心业务目标，其整体效果大于各部分之和。在这个例子中，我们使用了两个只读方法，但想象一个场景，我们有一个业务方法，例如：


    **boolean transferMoney(Long amount, Account fromAccount, Account destAccount)**
    **throws InvalidPermissionException, NotEnoughFundsException;**


    现在，假设上述服务层方法由几个 DAO 方法组成：**boolean validateSufficientFundsInAccount(Long accountId);**


    ****boolean removeFunds(Long accountId, Long amount);**


    ****boolean addFunds(Long accountId, Long amount);**

