    命名空间支持


    Spring 从框架 2.0 版本开始引入了广泛的命名空间支持。在 IoC 容器中，一切皆 Bean，但随着时间的推移，你的配置可能会变得极其冗长。引入命名空间旨在简化处理事务等集成点时的
