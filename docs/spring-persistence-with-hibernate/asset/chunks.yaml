    four basic methods in this interface that are essential when managing persistent
    objects. The **delete** method will remove a given entity from the database. The
    **save** method allows us to insert a new row or update an existing row in the
    database based on the contents of the entity. The two basic getters provide a
    means for reading in any entity **T**, which uses our **DomainObject** interface.


