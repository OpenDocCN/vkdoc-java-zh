    Without it, Spring would not enable transactions for our **ArtEntityService**.
    The **tx:annotation-driven** annotation supports the following features:


    • **transaction-manager**: This supplies the name of the bean used for the transaction
    manager. Theoretically, you can have more than one transaction manager in your
    Spring application context and use only one. The default value is


    **transactionManager**.


    • **mode**: This specifies the type of proxying mechanism you want. You have a
    choice of **proxy** to use Spring proxying or **aspectj** to use AspectJ, an industrial-strength
    AOP framework. The default is **proxy**.


    • **proxy-target-class**: By default, Spring creates a Java proxy object, and
    attaches only the interfaces that the object implements. For example, if you have
    a **PersonDaoJPA** class that implements a **PersonDao** interface, the proxying
    process will create an object that implements **PersonDao**, adds on the implementation
    of your transactional semantics, and passes the request on to your implementation.


    If the class doesn’t implement any interfaces or you need the proxy to extend
    the class and not just its interfaces, Spring will then use the Code Generation
    Library (CGLIB) open source bytecode manipulation framework to perform the proxying.


    The CGLIB approach does have a limitation: you need to put the transactional annotations
    on the class itself, not on the interface.


    • **order**: There are plenty of other frameworks that take advantage of proxying,
    but to use them, you may need to explicitly order the transactional and other
    proxying mechanisms. Lower order numbers are processed first.


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    Declarative Transactions via XML


    Rather than using the **@Transactional** annotation for applying transactional
    semantics, you can take a pure XML-driven approach. This approach is useful in
    cases where you prefer not to apply annotations, or you can’t use annotations
    because you need to use JDK1.4 or you want to apply transactional semantics to
    a library that you can’t change.


    Coupling the **tx:advice** XML configuration with an XML-based AOP configuration
    makes for a synergistic combination. For example, you can use method names to
    automatically figure out what kind of transactionality you want to apply.


    Here’s an example that specifies that methods starting with save, update, and
    delete require a transaction, and everything else supports (but does not require)
    a read-only transaction:


    **<tx:advice id="txAdvice" >**


    **<tx:attributes>**


    **<tx:method name="save*" propagation="REQUIRED"/>**


    **<tx:method name="update*" propagation="REQUIRED"/>**


    **<tx:method name="delete*" propagation="REQUIRED"/>**


    **<tx:method name="*" propagation="SUPPORTS" read-only="true"/>**


    **</tx:attributes>**


    **</tx:advice>**


    ****tx:advice** does support a **transaction-manager** XML attribute, but by default,
    it uses the name **transactionManager**, just like **tx:annotation-driven**.


    In addition to the flexible method name matching, the **tx:method** element has
    the same types of parameters as the **@Transactional** annotation. You can set
    values for **propagation**, **isolation**, **timeout**, **read-only**, **rollback-for**,
    and **no-rollback-for**. These **tx:method** XML attributes have the same values
    as their **@Transactional** counterparts.


    One more detail needs to be added to this example in order to make it complete.
    You need to use Spring’s AOP framework to define which beans require the advice.
    You can accomplish this by using the **aop** namespace in your Spring XML file.
    For example, if we wanted to apply the transactional advice to all of the classes
    that are in the **com.prospringhibernate.gallery.service** package, we can add
    the following to our Spring XML file:


    **<aop:config>**


    **<aop:pointcut id="allServices"**


    **expression="execution(*com.prospringhibernate.gallery.service.*.*(..))"/>**


    **<aop:advisor advice-ref="txAdvice" pointcut-ref="allServices"/>**


    **</aop:config>**


    Spring AOP is pretty flexible, and even lets you use annotations to define the
    pointcut. If you want to apply **txAdvice** to any class that is annotated with
    **@Transactional**, you can change the **allServices** pointcut to this:


    **<aop:pointcut id="allServices"**


    **expression="@target(org.springframework.transaction.annotation.Transactional)"/>**
    You can even combine the two pointcut approaches, like so:


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    **<aop:pointcut**


    **id="allServices"**


    **expression="execution(*com.prospringhibernate.gallery.service.*.*(..)) &&**


    **@target(org.springframework.transaction.annotation.Transactional)"/>** Let’s
    take a look at one more Spring AOP trick: using the bean name to define a pointcut.
    Here’s how to apply a transaction to a bean named **personService**:


    **<aop:pointcut id="allServices" expression ="bean(personService)"/>** You can
    also use the asterisk (*****) wildcard character to match against all beans that
    end with **Service** or **Dao**, as follows:


    **<aop:pointcut id="allServices" expression ="bean(*Service) || bean(*Dao)"/>**
    If applying complex AOP pointcuts to ACID transactions is still a bit too mind-altering
    for you, you’ll find plenty of documentation out there.1 However, the information
    you’ve gleaned here should give you a running start in understanding how to get
    your ACID transactions in order.


