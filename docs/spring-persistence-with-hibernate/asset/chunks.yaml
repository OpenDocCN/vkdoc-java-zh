    DAO 类。


    *单元测试* 是一种验证特定类在隔离环境中是否正常工作的有效策略。


    隔离地评估类非常有价值，并且没有比一个好的单元测试更好的替代方案。编写有效的单元测试涉及定义关于类中特定区域在隔离环境中的行为的断言。良好的测试覆盖率与哪些代码行的预期行为得到验证有关。


    与单元测试不同，*集成测试* 通常同时验证多个组件，通常通过运行应用程序生产版本中使用的相同实现层来进行。例如，集成测试的一个常见做法是实例化 Spring
    **ApplicationContext**，并使用真实的数据库以及 Spring Hibernate 抽象来测试 DAO 实现。这种方法的优点是你接触了多个组件，确保所有部分都能协同工作。缺点是它不能提供足够的粒度来确定特定组件本身是否正常工作。对于全面的测试策略，我们建议同时包含集成测试和单元测试。


    一个*测试套件* 是一组设计为一起运行的单个测试类，它们通常对特定层或组件做出断言。例如，你可以创建一个由所有 DAO 测试组成的 DAO 测试套件。以下示例展示了创建测试套件所需的全部操作：


    **public void static testSuite() {**


    **return new TestSuite(ArtworkDao.class,**


    **CategoryDao.class,**


    **ExhibitionDao.class,**


    **PersonDao.class);**


    **}**


    现代 IDE（Eclipse、IntelliJ IDEA、NetBeans 等）和其他运行时环境（如 Ant 和 Maven）知道如何运行单个单元测试和测试套件，这些套件可以同时包含单元测试和集成测试。通常使用套件的概念来策略性地将测试捆绑在一起。例如，你可能想要一个由快速单元测试组成的测试套件，在每次提交时运行；以及另一个由运行时间较长的集成测试组成的测试套件，按计划的时间间隔运行。


    功能测试是验证应用程序是否正常工作的另一种策略。功能测试提供了对代码库最高级别的评估，并且通常要求应用程序在生产环境容器中运行——例如，使用 Servlet
    容器。


