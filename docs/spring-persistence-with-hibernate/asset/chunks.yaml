    那么，为什么你应该关心 ACID？理解数据库行为的可用规则和选项非常重要，这样你才能在应用程序的上下文中有效利用这些特性。


    第 7 章 ■ 事务管理


    这些细节对于控制一组操作如何应用于数据库，或者并发数据库修改如何相互影响至关重要。不当的事务管理也会对企业应用程序的性能产生不利影响。


    理解隔离级别


    你在实践中会遇到的四种隔离级别，按从最宽松到最严格的顺序排列，分别是：读未提交、读已提交、可重复读和可序列化。这些隔离级别也会对并发性产生影响。最宽松的隔离级别允许最高数量的并发数据库操作，而最严格的隔离级别几乎肯定会拖慢你的系统。图
    7-1 突出了每种隔离级别的后果，并展示了隔离级别与并发性之间的关联。


    *图 7-1. 隔离级别要求在一致性与并发性之间进行权衡* 为了解释图 7-1 中概述的副作用，请考虑我们艺术画廊应用程序中的以下场景：


    1. Paul 打开一个数据库事务 T1，并从 **ArtEntity** 表中 **SELECT** 所有内容。

    2. Brian 启动一个单独的事务 T2，从 **ArtEntity** 表中 **DELETE** 一件艺术品。

    3. Brian 仍在同一个 T2 事务中，**UPDATE** **ArtEntity** 表中的一条记录，修正一个拼写错误。

    4. Paul 仍在同一个 T1 事务中，第二次 **SELECT** **ArtEntity** 表中的所有艺术品。

