    import org.springframework.roo.addon.tostring.RooToString;\nimport org.springframework.roo.addon.entity.RooEntity;\n\
    \n@Entity\n@RooJavaBean\n@RooToString\n@RooEntity\n@Inheritance(strategy=InheritanceType.SINGLE_TABLE)\n\
    @DiscriminatorColumn(discriminatorType = DiscriminatorType.STRING)\n@DiscriminatorValue(\"\
    GENERIC\")\npublic class ArtData {\n\n    @Lob\n    @Basic(fetch=javax.persistence.FetchType.LAZY)\n\
    \    private byte[] file;\n\n    @ManyToMany(cascade = CascadeType.ALL)\n    private\
    \ Set<com.prospringhibernate.gallery.domain.ArtEntity> artEntities =\n       \
    \ new java.util.HashSet<com.prospringhibernate.gallery.domain.ArtEntity>();\n\n\
    }\n```\n\nYou’ll also likely recall that our `ArtData` class and its subclasses\
    \ had a BLOB field for storing the binary representation of the images. Roo doesn’t\
    \ yet support `byte[]` fields, but they’re simple enough to add and annotate on\
    \ our own via the adjustments shown in the preceding listing. We also need to\
    \ add a Spring bean to our application context for LOB handling.\n\nNow let’s\
    \ create the `ArtDataThumbnail` type, which extends `ArtData`.\n\n```\n~.domain.ArtData\
    \ roo> entity --class com.prospringhibernate.gallery.domain.ArtDataThumbnail\n\
    --extends ~.domain.ArtData --testAutomatically\n```\n\nThe `--extends` parameter\
    \ sets up our class hierarchy. But again, since Roo doesn’t have built-in support\
    \ for JPA entity inheritance, we need to add a `@DiscriminatorValue` annotation\
    \ ourselves.\n\n```java\npackage com.prospringhibernate.gallery.domain;\n\nimport\
    \ javax.persistence.Entity;\nimport javax.persistence.DiscriminatorValue;\nimport\
    \ org.springframework.roo.addon.entity.RooEntity;\nimport org.springframework.roo.addon.javabean.RooJavaBean;\n\
    import org.springframework.roo.addon.tostring.RooToString;\n\n@Entity\n@RooEntity\n\
    @RooJavaBean\n@RooToString\n@DiscriminatorValue(\"THUMBNAIL\")\npublic class ArtDataThumbnail\
    \ extends ArtData {\n\n}\n```\n\nCreating the `ArtDataGallery` and `ArtDataStorage`\
    \ types involves the same steps. The other entities in our model have some nuances\
    \ as well. Check out the `rooGallery` code that accompanies the book to see the\
    \ details.\n\n## Adding Spring MVC\n\nOnce your model is in place, the next logical\
    \ step is to add Spring MVC to the mix to provide a HTML or RESTful front end\
    \ for your application. Roo makes this ridiculously easy. If you don’t need fine-grained\
    \ control over each generated class, you can scaffold out the entire web front\
    \ end in a single command.\n\n```\ncontroller all --package ~.web\n```\n\nAnd\
    \ that’s it! In another shell or within your IDE, execute `mvn tomcat:run` or\
    \ `mvn jetty:run` and point your browser at `http://localhost:8080`. You should\
    \ see something like the page shown in Figure 12-3.\n\n![Image 16](index-245_1.png)\n\
    ![Image 17](index-245_2.png)\n![Image 18](index-245_3.jpg)\n![Image 19](index-245_4.png)\n\
    \n*Figure 12-3. Running our Roo application*\n\nOf course, this is only very basic\
    \ scaffolding for a web application, but it proves that everything you need for\
    \ a Spring MVC web application is in place. From here, you would create more controllers\
    \ or edit the generated ones to tailor the application to the needs of your business.\n\
    \n## Adding Service Layers and DAOs\n\nIn the pursuit of simplicity, Roo will\
    \ generate only the classes that are *strictly necessary*. When building a truly\
    \ simple application, you can place business logic in either your controller or\
    \ your domain class.\n\nFor nontrivial applications, we harbor strong preference\
    \ for creating a service layer. This way, your controllers can strictly revolve\
    \ around the management of HTTP semantics and view resolution. Your business logic\
    \ is kept within your domain model and wrapped with a nice service layer façade\
    \ as appropriate. This is especially important when modeling code that manipulates\
    \ multiple entities in the same transaction."
