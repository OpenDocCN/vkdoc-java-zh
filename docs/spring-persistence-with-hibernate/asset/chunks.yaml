  raw: '• **@Service** defines a service facade. Typically, the service layer wraps
    the DAO layer, providing a coherent, transactional service that often serves as
    the business logic for an application. The service layer is often called a *façade*,
    since it serves as an abstraction over the data-access code, hiding the lower-level
    implementation details and providing a business-specific API. We will discuss
    the service layer in more detail in Chapter 8.


    These three annotations logically extend from the **@Component** annotation, which
    defines any bean intended to be managed by the Spring container. In fact, we could
    just as easily have used **@Component** instead of **@Repository** in our example,
    but we would lose the intention of our class as a DAO. In other words, we use
    the **@Repository** annotation to clue Spring in to the fact that our class is
    a DAO.


    To ensure that our **CategoryDao** class will be configured into our Spring **ApplicationContext**,
    we will need to add a component-scanning bean like the following to our Spring
    XML configuration:


    **<context:component-scan base-package=**


    **"com.prospringhibernate.gallery.dao.hibernate">**


    **<context:include-filter type="annotation" expression=**


    **"org.springframework.stereotype.Repository"/>**


    **</context:component-scan>**


    This XML snippet tells Spring to look for classes annotated with **@Repository**
    within the **com.prospringhibernate.gallery.dao.hibernate** package. Eventually,
    we will have multiple DAO


    implementations in this package, all configured in a similar fashion.


    Enabling Query Caching with the HibernateTemplate


    The **HibernateTemplate** includes two methods needed to facilitate query caching.
    Using a query cache with Hibernate can provide a significant performance boost
    by minimizing the number of trips to the database. However, you should verify
    the performance benefits of query caching carefully, as sometimes query caching
    can actually have a detrimental effect on application performance. We discuss
    this in more detail in Chapter 9.


    CHAPTER 6 ■ DAOS AND QUERYING


    There are several different strategies for enabling query caching. One approach
    is to configure a **HibernateTemplate** directly in your Spring configuration.
    This way, you can externalize and centralize query cache specifics:


    **<bean id="hibernateTemplate"**


    **class="org.springframework.orm.hibernate3.HibernateTemplate">**


    **<property name="sessionFactory" ref="sessionFactory"/>**


    **<property name="queryCacheRegion" value="querycache_artwork"/>**


    **<property name="cacheQueries" value="true"/>**


    **</bean>**


    ■ **Note** You must first enable query caching globally by adding the following
    hibernate property to the hibernateProperties map when creating your **SessionFactory**:


    **<prop key="hibernate.cache.use_query_cache">true</prop>** You can then inject
    this preconfigured **HibernateTemplate** directly into your DAO implementation.
    If your DAO extends from the **HibernateDaoSupport** class, it will use the **SessionFactory**
    applied to your Spring-configured **HibernateTemplate** automatically. Using this
    strategy, you can ensure that query caching is enabled for all operations that
    make use of the **HibernateTemplate**. The downside to this technique is that
    you are using a centrally configured **HibernateTemplate**, which makes it difficult
    to apply customizations for specific DAOs that rely upon it. An alternative approach
    is to configure query caching details in code through extending **HibernateTemplate**
    or setting the query cache specifics directly.


    Going Template-less


    When you use Spring’s template abstractions, you don’t need to worry about handling
    boilerplate processes and resource management. Most Hibernate operations can be
    managed through the **HibernateTemplate**.


    When working with Hibernate directly, you normally are required to create a new
    Hibernate **Session** from a **SessionFactory**. For most operations, you also
    need to be concerned with transactional details, ensuring that transactions are
    started at the beginning of an operation, and then either committed or rolled
    back when the operation completes. The **HibernateTemplate** (along with other
    Spring Framework classes) will ensure that the Hibernate **Session** is opened
    and closed, and that transactional semantics are properly applied. However, using
    a **HibernateTemplate** is not the only valid approach, when using Spring and
    Hibernate together.


    ■ **Note** You are free to specify transactional requirements all in code. However,
    doing so can be verbose and error-prone. Instead, we recommend specifying transactional
    requirements entirely via configuration, separating transactional details from
    our persistence logic. This is one of the key purposes of the service facade layer.


    CHAPTER 6 ■ DAOS AND QUERYING


    The introduction of the **HibernateTemplate** came early in Hibernate’s development.
    Prior to Hibernate 3, Hibernate suffered from “a few architectural flaws.” Unlike
    today’s version, earlier versions of Hibernate had a checked exception hierarchy,
    which required developers to write messy DAO code as a result of attempting to
    handle Hibernate’s exceptions through a series of nested **try**-**catch**-**finally**
    blocks.


    With the release of Hibernate 3.0.1, things became a bit simpler. Hibernate swapped
    its checked exception hierarchy for unchecked exceptions, removing the requirement
    for sloppy **try**-**catch** blocks.


    Additionally, Hibernate introduced the concept of a *contextual session*, which
    allows Hibernate to associate and synchronize a single session with the current
    transaction. This is a similar to what Spring provides in its Hibernate support,
    allowing sessions to automatically participate in transactions.


    In its Hibernate 3 support, Spring’s **LocalSessionFactoryBean** classes integrate
    with Hibernate’s contextual session support, creating a proxied Hibernate **SessionFactory**
    by default. This proxied version of the **SessionFactory** enhances its **getCurrentSession**
    method, allowing it to be automatically synchronized with Spring’s resource management,
    such as transactional features.


    Going with the standard Hibernate APIs rather than utilizing Spring’s **HibernateTemplate**
    might simplify some development, but you lose some benefits. Spring’s template
    support provides a level of consistency across various persistence technologies;
    for example, Spring’s **JDBCTemplate** works in a similar fashion to the **HibernateTemplate**
    or the **JPATemplate**.


    Additionally, Spring’s template support automatically translates a particular
    persistence framework’s exceptions into the appropriate exception from Spring''s
    **DataException** hierarchy, further decoupling your code from a particular technology.
    But there is a way to achieve this without using the **HibernateTemplate**. If
    you add a BeanFactory PostProcessor, Spring can detect any DAO classes annotated
    with the **@Repository** annotation and automatically translate Hibernate exceptions
    into the Spring generic **DataAccessException** hierarchy. To make this work,
    simply add the following bean to your Spring configuration:


    **<bean class="org.springframework.dao.annotation.** «


    ****PersistenceExceptionTranslationPostProcessor"/>** Then ensure your DAO classes
    are properly annotated with **@Repository**, and you will be able to use the Hibernate
    API directly in your DAO implementation, rather than relying on **HibernateTemplate**.
    You can instead just define getters and setters for the **Hibernate** **SessionFactory**,
    allowing the **AnnotationSessionFactoryBean** to inject a proxied **SessionFactory**
    into your class. Then you can implement your DAO methods by accessing the Hibernate
    session via the following: **this.getSessionFactory().getCurrentSession()**'
