  trans: '

    领域驱动设计（DDD）是一种软件开发方法论，由埃里克·埃文斯在其著作《领域驱动设计：软件核心复杂性应对之道》（Addison-Wesley Professional,
    2003）中推广开来。DDD 试图通过在开发全过程中聚焦并优化应用的领域层，在软件中模拟现实世界的系统或流程。为此，埃文斯主张以高度迭代和互动的方式与领域专家合作，共同定义一种*通用语言*。这种通用语言提供了统一的术语和定义，使工程师和领域专家能够就系统中的实体进行有效沟通。


    Spring Roo 并未明确倡导 DDD，但由于 Roo 极其重视实体层，DDD 的原则与之自然契合。作为 Roo 的入门介绍，我们将逐步演示如何使用它来创建我们的艺术画廊应用领域，如图
    12-1 所示。


    第 12 章 ■ SPRING ROO


    *图 12-1. 艺术画廊领域模型*


    开始使用 Roo


    请确保你的系统已配置好必备条件：Java 5 或更高版本，以及 Maven 2.0.9 或更高版本。然后下载 Roo 独立版本并按照安装说明进行操作，该版本可在
    **www.springsource.org/roo** 获取，并确保 **roo** 已加入你的系统路径。


    接下来，在你的机器上为新项目创建一个名为 **rooGallery** 的目录。进入这个新目录并执行 **roo**。你将进入 Roo shell 环境，并看到
    Roo 欢迎界面，如图 12-2 所示。


    ![Image 9](img/index-233_1.png)


    ![Image 10](img/index-233_2.png)


    ![Image 11](img/index-233_3.jpg)


    ![Image 12](img/index-233_4.png)


    ![Image 13](img/index-233_5.png)


    ![Image 14](img/index-233_6.png)


    ![Image 15](img/index-233_7.png)


    第 12 章 ■ SPRING ROO


    *图 12-2. Roo shell*


    ■ **提示** 在探索 Roo 时，你可以大量使用 **hint** 和 Tab 补全功能来获取 Roo 的上下文帮助。每个 Roo 命令都有一系列可指定的选项。在尝试命令时，请务必在
    Roo shell 中尝试智能 Tab 补全功能，看看 Roo 如何引导你走上正确的道路，从而无需记忆 Roo 命令。


    在创建新项目之前，在 Roo shell 中输入 **osgi** 命令，并使用 Tab 补全查看 Roo 提供的所有选项。Roo 基于 Apache Felix
    运行时，其支持的最基本 OSGi 命令之一是 **ps**。执行 **osgi ps** 将列出 Roo 运行时中的所有 OSGi 包，以及版本信息和包的状态，例如
    ACTIVE、STARTING 等。


    第 12 章 ■ SPRING ROO


    创建新项目


    让我们开始正题。首先，在 Roo shell 中使用 **project** 命令创建你的项目，如下所示：


    roo> **project --topLevelPackage com.prospringhibernate.gallery**


    ****Created ~/rooGallery/pom.xml**


    **Created SRC_MAIN_JAVA**


    **Created SRC_MAIN_RESOURCES**


    **Created SRC_TEST_JAVA**


    **Created SRC_TEST_RESOURCES**


    **Created SRC_MAIN_WEBAPP**


    **Created SRC_MAIN_RESOURCES/META-INF/spring**


    **Created SRC_MAIN_RESOURCES/META-INF/spring/applicationContext.xml**


    **Created SRC_MAIN_RESOURCES/log4j.properties**


    此命令会为 Maven 项目创建所有必要的目录。此外，它还会设置你的 Maven **pom.xml** 文件，并创建一个 Spring **applicationContext.xml**
    文件。


    在 Roo shell 中执行 **hint**，查看消息如何更新以反映应用的当前上下文。你会看到已有基本结构，但缺少持久化机制。因此，我们将遵循 Roo
    的建议，使用 Hibernate 和 H2 内存数据库配置 JPA 提供程序和关联数据库，如下所示：


    roo> **persistence setup --provider HIBERNATE --database H2_IN_MEMORY**


    你会在输出结果中注意到，Roo 创建了 JPA **persistence.xml** 配置文件以及 **database.properties** 文件。它还会修改
    **applicationContext.xml** 文件，并向 **pom.xml** 文件中引入一些依赖项。


    在 Roo 中仅执行两个命令后，你现在就拥有了一个完全配置好的 Spring 3 和 Hibernate 3.5 应用。Roo 已自动使用合理的默认值创建了我们之前在本节中介绍的许多构造，包括
    JPA 和声明式事务管理所需的所有 Spring Bean。


    ■ **注意** 作为一个使用 Unix 变体近二十年的人，很难不爱上 Roo 的交互式 shell。Roo shell 远不止是一个执行命令的界面。每当你启动
    Roo shell（无论是从 Unix 提示符还是 IDE 内部），Roo 都会密切关注项目中的文件，并在你对代码进行更改时，在后台无缝地即时修改你的项目。这听起来可能有点令人不安，但我们之前提到的那些
    ITD 文件将 Roo 的更改局限在特定范围内。除非你明确发出命令，否则 Roo 不会触碰你的 Java 文件。而作为开发者，你只需尊重 Roo 的“领地”，避免编辑
    ITD 文件本身。


    第 12 章 ■ SPRING ROO


    正如我们将在本章后面演示的那样，覆盖 Roo 自动生成的行为非常容易。所有这些考虑因素让你在开发应用时拥有很多选择。


    你可以像往常一样在 IDE 中修改代码（例如，为实体添加字段），或者进入 Roo shell 以命令行方式创建代码。这种自动化和选择的灵活性释放了宝贵的开发时间，让你能够专注于真正重要的事情：手头的业务问题。


    添加实体


