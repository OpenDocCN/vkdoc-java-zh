    \ or simply allowing your application to assign identifiers directly.\n\n> **Note**:\
    \ When using the `AUTO` mode for ID generation, Hibernate will pick the ideal\
    \ strategy based on the database you are using. However, for many databases, Hibernate\
    \ will end up creating a single sequence to use across all your tables. This can\
    \ get a bit messy, and we have often found that creating explicit sequences for\
    \ each table is a little cleaner. If your domain model has some complexity to\
    \ it, we recommend specifying a different sequence for each table or class.\n\n\
    ## Using Cascading Options to Establish Data Relationships\n\nAssociations within\
    \ a domain model represent how different domain entities relate to one another.\
