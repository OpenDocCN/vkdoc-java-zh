    \n另外，请注意，我们为`categories`属性定义了一个到`Category`类的多对多关联。我们在此添加了`mappedBy`提示，以指示此关系的反向端由`Comment`类中的`artEntities`属性引用。对于双向多对多关联，我们需要告诉Hibernate哪一侧是集合的所有者。通过向`Comment`类添加`mappedBy`属性，我们断言`Category`类拥有该关系。\n\
    \n## 重写`equals()`和`hashCode()`\n\n在简单场景中，Hibernate能够维护实体等价性，而无需对域对象本身进行任何特殊更改。但是，如果您的应用程序要求将实体添加到Java集合（例如`java.util.Set`），或者您计划处理分离实体，则可能需要为域对象重写默认的`equals()`和`hashCode()`方法。\n\
    \nHibernate只能在单个`EntityManager`范围内维护实体等价性。如果您尝试重新附加一个分离实体，Hibernate将无法再做出相同的保证。解决此问题的方法是为每个域对象重写`equals()`和`hashCode()`，提供反映其在数据库中身份的相等性规则。\n\
    \n最简单的方法是使用实体的标识符来确定相等性并生成其哈希码。\n\n但是，如果您计划使用生成的标识符策略，这可能会产生负面影响。\n\n当首次创建对象时，它将具有默认的`null`标识符。如果您尝试将此新创建的实体添加到`java.util.Set`，然后稍后保存此实例，则调用`EntityManager.save()`将触发为该实体生成标识符。但是，由于您将`equals`和`hashCode`基于对象的标识符，您将遇到对象`hashCode`突然改变的情况。这种更改破坏了许多Java集合类型（如`Set`）的契约，并可能导致应用程序中出现意外行为。\n\
    \n有两种方法可以解决此问题：\n\n*   不要使用生成的标识符策略（而是在首次实例化域对象时分配实体标识符）\n*   将`equals()`和`hashCode()`基于业务相等性，而不是行相等性\n\
    \n使用分配的标识符策略并不太难，但可能会对您的应用程序施加一些限制。\n\n通常，推荐的方法是使用域对象关键属性的值来生成`equals()`和`hashCode()`——具体来说，是从业务逻辑角度定义对象唯一性的属性。\n\
    \n以下是`Category`域对象的自定义`equals`和`hashCode`示例：\n\n```java\n@Override\npublic boolean\
    \ equals(Object o) {\n    if (this == o) return true;\n    if (!(o instanceof\
    \ Category)) return false;\n\n    Category category = (Category) o;\n\n    if\
    \ (categoryName != null ?\n            !categoryName.equals(category.categoryName)\
    \ : category.categoryName != null) {\n        return false;\n    } else {\n  \
    \      return true;\n    }\n}\n\n@Override\npublic int hashCode() {\n    return\
    \ categoryName != null ? categoryName.hashCode() : 0;\n}\n```\n\n## 总结\n\n在本章中，我们介绍了使用Hibernate定义域模型的基础知识。您了解了映射过程，以及如何使用注解为Hibernate提供适当的线索，以有效地将面向对象的域类映射到关系数据库。\n\
    \n我们还研究了关联映射，区分了Hibernate提供的各种基数选项。这些细节——例如是使用多对多还是一对多关联——对您的域模型设计以及生成的数据库模式都有重大影响。此外，仔细考虑关联应该是单向还是双向也很重要。虽然双向关联通常是简化引用遍历和访问所必需的，但此选项可能会在循环依赖方面产生后果，从而可能使编组实现复杂化。\n\
    \nHibernate提供了一个称为级联的强大功能，它允许您将对一个实体执行的操作与其子实体关联起来，以便这些操作级联。此功能对于确保子实体与其父实体的状态和生命周期保持同步非常有用。\n\
    \n---\n\n# 第6章 DAO与查询\n\n如果说域模型是持久化层的基础，那么DAO层就可以被视为引擎。正如您在之前章节中学到的，DAO模式旨在抽象底层的持久化功能，包括创建、读取、更新和删除实体。但一个DAO通常提供的不仅仅是基本的CRUD功能。\n\
    \n反映应用程序核心实体访问能力的专用查询通常被嵌入到DAO层中。例如，由于我们的画廊应用程序要求最终用户能够查看特定类别中的一系列图像，因此DAO类应提供按指定`Category`查询和加载相关`ArtEntity`域对象的能力。换句话说，您可以将应用程序的DAO类视为服务层用来为应用程序提供必要持久化相关功能的构建块。我们将在下一章讨论服务层，但请记住，服务层通常封装了应用程序的业务逻辑，依赖DAO层来完成持久化的“脏活累活”。\n\
    \nDAO模式被认为是最佳实践的原因之一是它有助于将持久化实现细节（和技术）与DAO接口分离。这允许应用程序开发人员确定特定DAO的方法和特性，并将这些细节提取到接口中。然后，DAO接口成为实际持久化实现与服务层之间的集成枢纽——即底层持久化功能的联系人。这是Spring可以帮助解耦这些组件的另一个领域。\n\
    \n在本章中，我们将为艺术画廊应用程序构建一些DAO类，并了解如何使用Hibernate和JPA为我们提供的各种查询机制，例如Hibernate查询语言（HQL）、Java持久化查询语言（JPQL）和Criteria\
    \ API。\n\n## 一个基本的Hibernate DAO实现\n\n要开始我们的第一个DAO实现，我们将转向Spring的`HibernateTemplate`。这个支持类利用了模板设计模式，该模式在整个框架中被多次使用。\n\
    \n> **注意** 尽管`HibernateTemplate`是更常用的技术之一，但基于它构建DAO类并不是唯一的方法。我们将在本章后面研究一些替代方案。由于`HibernateTemplate`已经存在多年，即使您选择替代策略，也一定会遇到一些使用它的遗留代码。"
  raw: 'Notice that we have now defined a few one-to-one relationships for our **thumbnailPicture**,
    **galleryPicture**, and **storagePicture** properties. To simplify our code, we
    defined three separate one-to-one associations. However, we could have also chosen
    to put all the **ArtData** entities into a single collection, with a generic type
    of the **ArtData** base class. Since each image type is represented by a different
    subclass, it would be easy to differentiate between the different image types.


    Also, notice that we have defined a many-to-many association to the **Category**
    class for the **categories** property. We have added the **mappedBy** hint here
    to indicate that the inverse side of this relationship is referenced by the **artEntities**
    property in the **Comment** class. For bidirectional many-to-many associations,
    we need to tell Hibernate which side of the collection is the owner. By adding
    the **mappedBy** attribute to the **Comment** class, we are asserting that the
    **Category** class owns the relationship.


    **OVERRIDING EQUALS AND HASHCODE**


    In simple scenarios, Hibernate is able to maintain entity equivalence without
    requiring any special changes to the domain objects themselves. However, if your
    application requires that you add entities to Java collections, such as **java.util.Set**,
    or you plan to work with detached entities, you will probably need to override
    the default **equals()** and **hashCode()** methods for your domain objects.


    Hibernate is able to maintain entity equivalence only within a single EntityManager
    scope. If you attempt to reattach a detached entity, Hibernate is no longer able
    to make the same guarantees. The way to resolve this problem is to override **equals()**
    and **hashCode()** for each of your domain objects, providing equality rules that
    are reflective of its identity within the database.


    The simplest approach is to use an entity’s identifier to determine equality and
    generate its hash code.


    However, if you are planning to use a generated identifier strategy, this can
    have negative implications.


    When an object is first created, it will have a default null identifier. If you
    attempt to add this newly created entity to a **java.util.Set** and then later
    save this instance, the invocation of **EntityManager.save()** will trigger an
    identifier to be generated for the entity in question. However, because you have
    based **equals** and **hashCode** on the object’s identifier, you will run into
    a situation where the **hashCode** for the object suddenly changes. This change
    breaks the contract for many of the Java collection types, such as **Set**, and
    could lead to unexpected behavior in your application.


    CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS


    There are two options to get around this problem:


    • Don’t use a generated identifier strategy (and instead assign an entity identifier
    when the domain object is first instantiated)


    • Base **equals()** and **hashCode()** on business equality, rather than row equality
    Using an assigned identifier strategy isn’t too difficult, but can impose some
    limitations on your application.


    Generally, the recommended approach is to generate **equals()** and **hashCode()**
    using the values of key properties of a domain object—specifically, properties
    that define an object’s uniqueness from a business logic perspective.


    Here is an example of a customized **equals** and **hashCode** for the **Category**
    domain object:


    **@Override**


    **public boolean equals(Object o) {**


    **if (this == o) return true;**


    **if (!(o instanceof Category)) return false;**


    ****Category category = (Category) o;**


    **if (categoryName != null ?**


    **!categoryName.equals(category.categoryName) : category.categoryName != null)
    {**


    **return false;**


    **} else {**


    **return true;**


    **}**


    **}**


    ****@Override**


    **public int hashCode() {**


    **return categoryName != null ? categoryName.hashCode() : 0;**


    **}**


    Summary


    In this chapter, we’ve introduced the fundamentals for defining a domain model
    with Hibernate. You learned about the mapping process and how you can use annotations
    to provide Hibernate with the appropriate clues to effectively map your object-oriented
    domain classes to your relational database.


    We also examined association mapping, differentiating between the various cardinality
    options Hibernate provides. These details—such as whether to use many-to-many
    or one-to-many associations—have a significant impact on your domain model design,
    as well as the resultant database schema. Furthermore, it is important to think
    carefully about whether an association should be unidirectional or bidirectional.
    While bidirectional associations are often necessary to simplify reference walking
    and access, this option can have consequences in terms of circular dependencies
    that may complicate marshaling implementations.


    Hibernate provides a powerful feature called cascading that allows you to associate
    the operations applied to one entity with its children entities so that these
    operations cascade. This feature is useful for ensuring that child entities are
    kept in sync with the state and life cycle of their parent entities.


    **C H A P T E R 6**


    ■ ■ ■


    **DAOs and Querying**


    If the domain model serves as the persistence tier’s foundation, then the DAO
    layer might be considered the engine. As you’ve learned in previous chapters,
    the DAO pattern is intended to abstract lower-level persistence functionality,
    including creating, reading, updating, and deleting entities. But a DAO


    typically provides more than basic CRUD functionality.


    Specialized queries that reflect the core entity-access capability of an application
    are usually baked into a DAO layer. For example, since our gallery application
    requires that end users be able to view a series of images within a particular
    category, the ability to query and load the relevant **ArtEntity** domain objects
    by a specified **Category** should be provided by a DAO class. In other words,
    you can think of an application’s DAO classes as the building blocks utilized
    by the service layer to provide the necessary persistence-related functionality
    for the application. We will discuss the service layer in the next chapter, but
    it is helpful to keep in mind that the service layer typically encapsulates an
    application’s business logic, relying on the DAO layer to get the persistence
    dirty work done.


    One of the reasons that the DAO pattern is considered a best practice is that
    it helps to abstract the persistence implementation details (and technology) from
    the DAO interface. This allows application developers to settle on the methods
    and features of a particular DAO, extracting these specifics into the interface.
    The DAO interface then becomes the integration hub between the actual persistence
    implementation and the service layer—the contact for lower-level persistence functionality.
    This is another area where Spring can help to decouple these components.


    In this chapter, we will build some of the DAO classes for our art gallery application
    and look at how to use the various querying mechanisms afforded to us by Hibernate
    and JPA, such as Hibernate Query Language (HQL), Java Persistence Query Language
    (JPQL), and the Criteria API.


    A Basic Hibernate DAO Implementation


    To begin our first DAO implementation, we will turn to Spring’s **HibernateTemplate**.
    This support class leverages the Template design pattern, an approach used numerous
    times throughout the framework.


    ■ **Note** Although it is one of the more commonly used techniques, building DAO
    classes on the **HibernateTemplate** is not the only approach to take. We will
    examine a few alternative solutions later in this chapter. Since **HibernateTemplate**
    has been around for many years, you are bound to run into some legacy code that
    uses it, even if you opt for an alternative strategy.


    CHAPTER 6 ■ DAOS AND QUERYING'
