  trans: '

    与可序列化隔离级别截然相反的是读未提交隔离级别。如果我们在场景中采用读未提交，那么将完全不存在任何事务隔离。


    因此，保罗的前三个相同查询将全部返回不同的结果。如果玛丽在第八步的提交成功，保罗的第四次查询将返回与他第三次查询相同的结果。


    在第四步，保罗看到了布莱恩的拼写更正（SQL **UPDATE**）以及他执行的删除操作（SQL **DELETE**），而此时布莱恩的事务尚未提交。这第三种副作用通常被称为脏读，因为保罗读取的是暂存数据。如果布莱恩的提交在第五步失败，迫使其事务回滚，那么保罗正在查看的数据将变得完全不准确。在第七步，玛丽提交之前读取她的插入操作，同样属于脏读，因为那也代表了暂存数据。


    选择读未提交隔离级别会使你暴露于所有这三种可能的副作用之下。


    直观来看，这代表了一种并不理想的策略。然而，读未提交隔离级别也有一线希望。由于该隔离级别提供了最高程度的并发性，可以预期保罗、布莱恩和玛丽各自的 SQL 操作都将极其快速。当你需要强调速度，并且确信你的应用程序能够应对这些副作用时，你可能会采用此隔离级别。与可序列化一样，读未提交只应在边缘用例中考虑。


    控制 ACID 回流


    事务定义了数据如何以及何时提交到数据库。它们对于将持久化逻辑组合在一起、确保所有方法成功完成或数据库回滚到之前状态是不可或缺的。对于大多数操作，你还需要关注事务细节，确保事务在操作开始时启动，并在操作完成时提交或回滚。Spring
    通过三个核心概念实现了这些特性：


    第 7 章 ■ 事务管理


    • *平台事务管理* 指的是 Spring 用于处理提交和回滚的抽象。像 Hibernate 和 iBatis 这样的框架有自己的事务实现。此外，事务在测试环境中的运行方式通常与在
    EJB 服务器中不同。Spring 的平台事务管理抽象隐藏了这些细节，允许开发人员以一致的方式指定事务规则。


    • *声明式事务管理* 允许开发人员通过元数据或配置来指定特定方法的事务需求。显然，设置、提交和回滚给定事务的代码仍然会被执行。然而，这些细节可以与代码本身分离，并外部化到配置文件或注解中。


    • *编程式事务管理* 通过代码显式控制事务。Spring 提供了一个 **TransactionTemplate** 类，可以极大地简化将事务语义应用于给定方法所需的代码。


    然而，这种方法要求将事务细节与业务逻辑混合在一起，并需要你的代码直接与 Spring API 交互。


    我们将在以下各节中介绍每种事务类型。


    平台事务管理


    Spring 提供了多个 **TransactionManager** 实现，每个都扮演着（请击鼓）管理事务的角色。**TransactionManager**
    实例通常继承自 **AbstractPlatformTransactionManager** 类，而该类又实现了 **PlatformTransactionManager**
    接口。这些类构成了 Spring 事务支持的基础，并提供了访问、启动、回滚和提交事务的知识。该接口如下所示：**public interface PlatformTransactionManager
    {**


    **TransactionStatus getTransaction(TransactionDefinition definition)** **throws
    TransactionException;**


    ****void commit(TransactionStatus status) throws TransactionException;**


    ****void rollback(TransactionStatus status) throws TransactionException;**


    **}**


    有相当多的 **TransactionManager** 实现。例如，**DataSourceTransactionManager** 用于 JDBC 和
    iBATIS 实现。就我们的目的而言，我们主要关注 Spring 基于 ORM 的 **TransactionManager** 实现：**HibernateTransactionManager**
    和 **JpaTransactionManager**。


    你甚至会发现用于 EJB 的基于 JTA 的 **TransactionManager** 实现。JTA 通常用于使事务能够跨越多个数据库甚至不同的技术，例如
    Java 消息服务 (JMS)。这些包括通用的 **JtaTransactionManager** 以及针对特定 EJB 服务器的实现，例如用于 Oracle
    服务器的 **OC4JJtaTransactionManager**、用于 BEA 服务器的 **WebLogicJtaTransactionManager**
    和用于 IBM 服务器的 **WebSphereUowTransactionManager**。


    通过将 **<tx:jta-transaction-manager/>** XML 标签添加到你的 Spring 配置中，你可以让 Spring 根据运行时信息确定使用哪个
    JTA 事务管理器，这样你就不需要在配置中显式引用特定于平台的细节。


    第 7 章 ■ 事务管理


    你可能已经注意到 **PlatformTransactionManager** 接口中包含的 **TransactionStatus** 和 **TransactionDefinition**
    接口。你很少需要自己使用这些接口。它们由 Spring 的声明式事务管理（将在下一节讨论）设置，但仍然值得了解，因为这些细节有助于解释 Spring 的事务特性如何在底层工作。


    **TransactionStatus**：封装与正在运行的事务相关的关键信息，例如是否已创建新事务以及事务应回滚还是提交。它还允许将事务标记为 **Rollback-Only**。将正在运行的事务设置为
    **Rollback-Only** 会告诉事务系统该事务应被回滚。例如，在发生错误条件时，你可以编写代码在 **TransactionStatus** 实例上调用
    **setRollbackOnly()**，这将确保正在运行的事务被回滚。


    **TransactionDefinition**：定义我们之前讨论过的 ACID 属性，包括诸如事务的隔离规则、你的事务是否将执行任何写入操作（或是只读）、事务在超时前允许运行多长时间，以及如何处理事务传播等细节。


    我们将在本章后面讨论编程式事务管理时，进一步了解这些类是如何被使用的。


    声明式事务管理


    *声明式编程* 使用元数据来定义特定应用程序逻辑集合的需求，而不是直接编写定义此行为的步骤代码。通常，你在框架的上下文中使用声明式编程，该框架旨在分析元数据以相应地调整其行为。因此，使用声明式事务管理意味着你定义构成事务行为的规则或属性，而不是将这些逻辑直接散布在你的代码中。正如你可能猜到的，Spring
    通过利用其出色的 AOP 支持，将这些横切关注点应用到你的代码中。然而，由于事务是如此普遍和关键的特性，AOP 细节被稍微抽象化，以提供更清晰、更专注于事务的方法。

