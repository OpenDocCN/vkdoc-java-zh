    \ Criteria API 中的构建块来形成复杂查询。在我们的例子中，我们创建了一个`Predicate`来表示`Path`实例（代表我们的`ArtEntity.title`字段）与传入此方法的`String`类型`title`参数之间的比较逻辑。\n\
