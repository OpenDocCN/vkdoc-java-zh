- fmt: '# We Can Rely on Spring to Wire DAO Dependencies


    We can rely on Spring to wire DAO dependencies into our service layer classes,
    ensuring that this integration happens in a consistent way and that the integration
    point between these two layers is through interfaces rather than specific implementation
    classes. As we mentioned earlier in this chapter, this is a fundamental concept
    for leveraging Spring’s dependency injection: by coding to interfaces, we get
    more for our money. We can always rely on Spring to automatically inject required
    dependencies, but by using interfaces we gain the added benefit of being able
    to change which implementation should be injected at runtime. Without interfaces,
    there are no other options—we have hard-coded which dependencies must be injected
    into our components. Interfaces and Spring’s dependency injection capability are
    a dynamic duo that offer significantly increased flexibility. For instance, without
    changing any code, you can choose to inject one set of dependencies for unit-testing
    and another in production deployment. Or you can choose which implementations
    to use for each environment. These are some of the benefits afforded by adherence
    to best practices and leveraging the Spring Framework.


    ## Testing Your Persistence Tier


    As you’ll see in later chapters, this separation of concerns helps keep your code
    clean and ensures that details from one layer don’t interfere with the code from
    another layer. When it comes time for refactoring, this advantage can be significant.
    Perhaps even more important, these best practices are instrumental for ensuring
    an effective testing strategy. In Chapter 8, you will learn how Spring greatly
    simplifies the creation of unit and integration tests. When it comes to testing,
    it’s rather intuitive to see how swapping implementations can really come in handy.
    Spring 3 includes a powerful `TestContext` framework that simplifies the creation
    and management of unit and integration tests—even abstracting away which test
    framework you happen to be using. Integration tests can often be a tricky matter,
    especially when you consider the details of instantiating all of a test’s dependencies
    and components.


    For example, an integration test might require access to a database, as well as
    test data. Spring can bootstrap the `ApplicationContext` and then automatically
    inject any required dependencies. In the case of testing persistence-related code,
    you can choose to have your data occur within the scope of a transaction and then
    automatically rollback the transaction at the completion of the test to ensure
    that modifications made by the test are removed.


    ## Advanced Features and Performance Tuning


    This book will also cover some more advanced persistence concepts that are indispensable
    in most applications, such as optimization techniques for loading and managing
    complex relationships and collections within your domain model. We will discuss
    performance and optimization strategies, such as eager fetching and caching (at
    both the domain level and higher abstractions). As we mentioned earlier, Hibernate
    offers numerous features that can be leveraged to improve application performance.
    For instance, Hibernate and JPA offer a great deal of flexibility for tuning `HQL`/`JPQL`
    and `Criteria API` queries.


    These features enable developers to minimize round-trips to the database, allowing
    even large data sets to be accessed with minimal SQL queries. Hibernate also provides
    features such as lazy-loading and powerful caching mechanisms, which can be tuned
    to control the size and expiration time for cached entities. Understanding how
    these features work, as well as the myriad options available for controlling them,
    is critical for maximizing performance.


    Caching is an often overlooked feature which can prevent an application from realizing
    its full potential. In the case of caching, it is either not fully utilized, or
    not enough time and attention are given to tuning and testing. However, if left
    untuned, caching can significantly degrade application performance. In Chapter
    10, you will learn how Hibernate caching works, strategies for tuning and improving
    performance, and how to integrate a cache provider, such as `ehcache`. We will
    also explore several common pitfalls responsible for performance problems, such
    as the *N+1 Selects* issue, and how to go about identifying and resolving these
    issues.


    ## Hibernate-Search


    Sometimes, your application will require more than Hibernate or Spring have to
    offer. So we will discuss some important frameworks that extend Spring and Hibernate,
    such as Hibernate-Search. Hibernate-Search integrates the popular open source
    search framework, Lucene, into a Hibernate or JPA application. For features that
    require true search functionality, a relational database is not able to provide
    the capability that Lucene is able to offer. Hibernate-Search seamlessly integrates
    Lucene into your persistence tier, allowing you to execute Lucene queries within
    the scope of a Hibernate `Session` or a JPA `Persistence Context`. In Chapter
    10, you will learn how this integration works, as well as the range of functionality
    afforded by Lucene and Hibernate-Search.


    ## Building a REST Web Service


    Since many applications use Spring and Hibernate as part of a web application,
    we will explore some of the potential issues and work-arounds related to building
    web applications. We will develop a REST-based web service, to explore some strategies
    for marshalling domain entities back and forth between Java and JSON or XML. We
    will examine frameworks, such as Dozer, which help to reduce some of the complexity
    related to serializing the object graph and dealing with potential `LazyInitializationException`s.


    ## Other Persistence Design Patterns


    Spring is based on time-tested design patterns, which go a long way toward simplifying
    code and reducing maintenance. While we’re on the topic of some of the core building
    blocks of an application, let’s look at a few of the more prevalent patterns used
    in much of the Spring architecture.


    > **Note** You will see many of these patterns in action throughout this book,
    but it may be useful to take a look at the seminal work that popularized the use
    of patterns to solve recurring problems in object-oriented programming.


    This famous book is called *Design Patterns: Elements of Reusable Object-Oriented
    Software*, by Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides (Addison-Wesley,
    1994). The authors, and by association their patterns, are often jokingly referred
    to as “The Gang of Four”.


    ### The Template Pattern


    The Template pattern is one of the most frequently used idioms within Spring’s
    ORM framework integration packages. Spring provides templates for each of the
    most popular persistence frameworks, making it easy to port your code to a different
    persistence implementation. The Template Pattern is also used by the Spring framework
    to more effectively integrate JMS, define transactional behavior, and provide
    outbound email message capability, among other things.'
