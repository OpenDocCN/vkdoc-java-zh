    this book. However, the key distinction is that the domain class also serves as
    the wrapper around database operations. Dynamic static methods are injected into
    each domain class, providing a means for querying for instances of that class’s
    type. As in Hibernate, each row in our database is represented by a corresponding
    instance of the appropriate domain class. However, **save()** and **update()**
    methods are 204


    CHAPTER 11 ■ GORM AND GRAILS


    injected into each domain class instance, allowing newly created or retrieved
    instances to be persisted by invoking **save()** or **update()** directly on that
    instance.


