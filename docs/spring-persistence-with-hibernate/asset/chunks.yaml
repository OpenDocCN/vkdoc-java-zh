    引用上调用 **createFullTextQuery** 方法。此方法返回一个标准的 **javax.persistence.Query** 实例，我们可以像使用任何
    JPA 查询一样使用它。我们使用 **setFirstResult** 和 **setMaxResults** 限制结果集（如果指定了这些参数），然后调用
    **getResultList()** 返回一个 **ArtEntity** 实例的 **List**。

