  raw: 'The Data Access Object (DAO) Layer


    The DAO layer defines the means for saving and querying the domain model data.
    A DAO helps to abstract away those details specific to a particular database or
    persistence technology, providing an interface for persistence behavior from the
    perspective of the domain model, while encapsulating explicit features of the
    persistence technology. The goal of the DAO pattern is to completely abstract
    the underlying persistence technology and the manner in which it loads, saves,
    and manipulates the data represented by the domain model. The key benefit of the
    DAO pattern is separation of concerns—the lower-level details of the persistence
    technology and datasource are abstracted into a series of methods that provide
    querying and saving functionality. If the underlying persistence technology changes,
    most of the necessary changes would be limited to defining a new DAO implementation,
    following the same interface.


    For example, we might create a **PersonDAO** class to define all the application’s
    persistence needs related to the **Person** entity. In **PersonDao**, we would
    likely have a method like the following: **public Person getPersonById(Long id);**


    This method would be responsible for loading a **Person** entity from the database
    using its unique identifier.


    The following might be another method for our application:


    **void savePerson(Person person);**


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    This method would be designed to handle all updates to a given row in the **Person**
    table (that is, creation or modifications).


    When defining a DAO, it is good practice to first write the interface, which delineates
    all the core persistence-related methods the application will need. We recommend
    creating separate DAOs for each persistent entity in your domain model, but there
    are no clear rules in this area. However, defining DAO


    methods in a separate interface is crucial, as it decouples the purpose and contract
    of the DAO from the actual implementation, and even allows you to write more than
    one implementation for a given DAO


    interface.


    It’s important to note that such an interface is agnostic to the persistence technology
    being used behind the scenes. In other words, the interface only depends on the
    relevant domain model classes, decoupling our application from the persistence
    details. Of course, the DAO implementation class will use Hibernate, JPA, or whatever
    persistence technology we have chosen to employ. However, the higher layers of
    our application are insulated from these details by the DAO interface, giving
    us portability, consistency, and a well-tiered architecture.


    As we mentioned earlier, the Spring Framework also provides a generic data exception
    hierarchy, suitable for all types of persistence frameworks and usage. Within
    each persistence framework integration library, Spring does an excellent job of
    converting each framework-specific exception into an exception that is part of
    Spring’s generic data-access exception hierarchy. All of the exceptions in Spring’s
    generic exception hierarchy are unchecked, meaning your application code is not
    required to catch them. Spring helps to decouple your application from a particular
    persistence framework, allowing you to code to a generic and well-defined exception
    hierarchy that can be used with any persistence technology.


    In Chapter 6, we will dive deeper into DAO implementation strategies, exploring
    the flexible querying and save/update capability afforded by Hibernate and JPA.
    Querying in particular can require quite a bit of complexity, and to this end,
    Hibernate and JPA provide two different approaches for searching and accessing
    your data. HQL and JPQL (Hibernate Query Language and Java Persistence Query Language,
    respectively) both offer an object-oriented syntax for expressing queries that
    is very similar to SQL. Although concise and intuitive, HQL and JPQL are interpreted
    at runtime, which means you cannot use the compiler to verify the correctness
    and integrity of a query.


    To address this limitation, Hibernate also includes a Criteria API, which allows
    queries to be expressed programmatically. Until recently, JPA did not offer a
    Criteria API, which meant developers would have to go outside the JPA standard
    if they required this type of querying facility. However, with the introduction
    of JPA 2.0, a Criteria API is now available as part of the standard.


    Whether to use HQL/JPQL or the Criteria API is sometimes a matter of style. However,
    there are some cases where the Criteria API is more effective and maintainable.
    For instance, if you are building a feature that requires dynamic filtering or
    ordering, being able to dynamically create a query programmatically, based on
    the user’s runtime specifications, is much cleaner than attempting to dynamically
    generate a JPQL query string via concatenation. We will discuss these types of
    implementation decisions further in Chapter 6.


    The Service Facade


    The layer that handles the application business logic is (surprisingly enough)
    called the *service layer*. The service layer typically defines an application’s
    public-facing API, combining one or more lower-level DAO operations into a single,
    cohesive transactional unit.


    To help you understand how a service layer is built and used, let’s take a look
    at a few examples: **Person loginUser(String username, String password);**


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    The **loginUser()** method is intended to authenticate a user (that is, verify
    that the specified username and password match), and then load important user
    information into the session (grab user information, such as name, previous login
    date, role type, and so on). These tasks would likely not be handled by a single
    DAO method. Instead, we would probably build upon the functionality of two distinct
    DAO classes, a PersonDAO and a RoleDAO:


    **interface PersonDao {**


    ****Person authenticatUser(String username, String password);**


    ****. . .**


    ****}**


    ********interface RoleDao {**


    ****List<Role> getRolesForPerson(Person person);**


    ****. . .**


    ****}**


    Together, these DAO methods accomplish a core business goal that is greater than
    the sum of its parts. In this example, we are using two read-only methods, but
    imagine a scenario in which we have a business method, such as the following:


    **boolean transferMoney(Long amount, Account fromAccount, Account destAccount)**
    **throws InvalidPermissionException, NotEnoughFundsException;**


    Now, assume that the preceding service layer method is composed of several DAO
    methods: **boolean validateSufficientFundsInAccount(Long accountId);**


    ****boolean removeFunds(Long accountId, Long amount);**


    ****boolean addFunds(Long accountId, Long amount);**'
