- fmt: "# Hibernate Search 与 Lucene 集成\n\n## 索引与关联映射\n\n如前所述，Lucene 索引是反规范化的，不提供典型关系数据库中存在的隐式关系概念。为了将某些\
    \ Hibernate 关联映射转换到 Lucene 世界中，Hibernate Search 提供了`@IndexEmbedded`注解。\n\n`@IndexEmbedded`告诉\
    \ Hibernate Search 将特定关联嵌入到所属类中。然而，由于 Lucene 本质上是反规范化的，Hibernate Search 必须随时了解嵌入实体何时发生变化。为了帮助跟踪这些变化，Hibernate\
    \ Search 提供了`@ContainedIn`注解，用于标记嵌入关联的另一端。\n\n现在您已经更清楚地了解如何为索引注解领域类，让我们来检查索引和搜索过程。\n\
    \n## 使 Lucene 与 Hibernate 保持同步\n\nHibernate Search 的主要优势之一是 Hibernate 与 Lucene\
    \ 之间集成的无缝性。Hibernate Search 依赖 Hibernate 事件来触发对 Lucene 索引的适当更改，因为持久化状态变化会应用到您的领域模型。\n\
    \n在第 4 章中，我们介绍了 JPA 生命周期。遵循 JPA 生命周期，Hibernate 提供了一个细粒度的事件模型，根据领域对象的持久化状态变化广播特定事件。\n\
    \n例如，当领域类实例被持久化时，Hibernate 会传播相应的事件。\n\n类似地，Hibernate 会广播许多其他事件，例如删除和更新通知，提供了一种监听和响应领域模型变化的方式。事件监听器是一种有效的设计模式，用于以解耦的方式定义应用程序行为，Hibernate\
    \ Search 能够通过这种强大的机制接入领域生命周期事件。\n\n如果您是从头开始构建应用程序，并且从空数据库开始，那么填充 Lucene 索引的过程很简单。当您的领域对象首次持久化到数据库时（例如通过`entityManager.save(artEntity)`），Hibernate\
    \ Search 会捕获生命周期事件并将指定的`artEntity`添加到 Lucene 索引中。默认情况下，每个领域类都有自己的索引，所有适当的属性将根据\
    \ Hibernate Search 注解指定的规则添加到索引中。由于 Hibernate Search 负责保持数据库和 Lucene 索引同步，两个框架之间的集成直观且简单。\n\
    \n然而，在某些情况下，您可能需要更明确地索引领域对象。例如，如果您正在将 Hibernate Search 集成到现有应用程序中或使用遗留数据库，您需要找到一种方法将现有数据改造到\
    \ Lucene 索引中。\n\nHibernate Search 也提供了一种更直接的索引领域模型的方式。\n\n## 使用 FullTextEntityManager\n\
    \nHibernate Search 提供了 Hibernate 的`EntityManager`的扩展版本，用搜索特定功能增强了这些核心框架类。JPA `EntityManager`的增强版本是`FullTextEntityManager`。访问这个支持搜索的`EntityManager`相当无缝：\n\
    \n```\nimport org.hibernate.search.jpa.Search;\n\nFullTextEntityManager fullTextEntityManager\
    \ =\n    Search.getFullTextEntityManager(entityManager);\n```\n\n下一步是执行索引。以下是显式索引单个实体的方法：\n\
    \n```\npublic void indexEntity(T object) {\n    FullTextEntityManager fullTextEntityManager\
    \ =\n        Search.getFullTextEntityManager(entityManager);\n    fullTextEntityManager.index(object);\n\
    }\n```\n\n此方法旨在添加到您的`GenericDaoJpa`类中，以提供索引领域类的通用方式。如果您想实现一种方法来索引当前存储在数据库中的特定类型的所有实体，您可以在`GenericDaoJpa`实现上定义以下方法：\n\
    \n```\npublic void indexAllItems() {\n    FullTextEntityManager fullTextEntityManager\
    \ =\n        Search.getFullTextEntityManager(entityManager);\n    List results\
    \ = fullTextEntityManager.createQuery(\"from \" +\n        type.getCanonicalName()).getResultList();\n\
    \n    int counter = 0, numItemsInGroup = 10;\n    Iterator resultsIt = results.iterator();\n\
    \    while (resultsIt.hasNext()) {\n        fullTextEntityManager.index(resultsIt.next());\n\
    \        if (counter++ % numItemsInGroup == 0) {\n            fullTextEntityManager.flushToIndexes();\n\
    \            fullTextEntityManager.clear();\n        }\n    }\n}\n```\n\n在此方法中，我们使用`FullTextEntityManager`执行标准\
    \ JPA 查询，该查询仅列出参数化类型的所有实体。然后我们遍历结果，索引每个实体。然而，每十次索引调用，我们调用`fullTextEntityManager.flushToIndexes()`。这会将排队的更改刷新到\
    \ Lucene 索引，而无需等待 Hibernate Search 批处理阈值达到。接下来，我们调用`fullTextEntityManager.clear()`，清除\
    \ JPA `persistenceContext`。这可能并不总是必要的，但如果您正在遍历大型数据集，您希望尽可能减少内存占用。\n\n## 构建领域特定搜索\n\
    \n现在让我们将本章涵盖的所有概念整合起来，提供一个基本的搜索功能，允许最终用户使用指定的搜索词跨多个`ArtEntity`字段进行搜索。以下是实现此功能的示例：\n\
    \n```\npublic List<ArtEntity> searchForArtEntitiesByTerms(String searchTerms,\n\
    \                                                    Integer startIndex,\n   \
    \                                                 Integer maxResults) {\n    FullTextEntityManager\
    \ fullTextEntityManager =\n        Search.getFullTextEntityManager(entityManager);\n\
    \    String[] fieldsToMatch = new String[] {\"title\", \"subTitle\", \"media\"\
    , \"description\",\n        \"caption\"};\n    QueryParser parser = new MultiFieldQueryParser(Version.LUCENE_29,\
    \ fieldsToMatch,\n        new StandardAnalyzer(Version.LUCENE_29));\n    org.apache.lucene.search.Query\
    \ luceneQuery = null;\n    try {\n        luceneQuery = parser.parse(searchTerms);\n\
    \    } catch (ParseException e) {\n        log.error(\"Error parsing lucene query:\
    \ \" + searchTerms);\n    }\n\n    Query jpaQuery = fullTextEntityManager.createFullTextQuery(luceneQuery,\
    \ ArtEntity.class);\n    if (startIndex != null && maxResults != null) {\n   \
    \     jpaQuery.setFirstResult(startIndex);\n        jpaQuery.setMaxResults(maxResults);\n\
    \    }\n\n    List<ArtEntity> artEntities = jpaQuery.getResultList();\n    return\
    \ artEntities;\n}\n```\n\n为了跨`ArtEntity`的`title`、`subtitle`、`media`、`description`和`caption`字段进行搜索，我们使用了一个特殊的\
    \ Lucene 查询解析器，称为`MultiFieldQueryParser`。此查询解析器接受一个字段名称数组，以便所有用户指定的搜索词可以平等地应用于每个字段。换句话说，以这种方式使用`MultiFieldQueryParser`等同于以下\
    \ Lucene 查询（假设用户搜索了\"test\"）：\n\n```\ntitle: test OR subtitle: test OR media:\
    \ test OR description:test OR caption:test\n```\n\n使用我们的`MultiFieldQueryParser`和指定的`searchTerms`解析\
    \ Lucene 查询后，我们在`fullTextEntityManager`引用上调用`createFullTextQuery`方法。此方法返回一个标准的`javax.persistence.Query`实例，我们可以像使用任何\
    \ JPA 查询一样使用它。我们使用`setFirstResult`和`setMaxResults`限制结果集（如果指定了这些参数），然后调用`getResultList()`返回一个`ArtEntity`实例的`List`。"
  raw: 'As we mentioned earlier, a Lucene index is denormalized, offering no concept
    of implicit relationships as found in typical relational databases. To translate
    some of the Hibernate association mappings into the world of Lucene, Hibernate
    Search offers the **@IndexEmbedded** annotation.


    **@IndexEmbedded** tells Hibernate Search to embed a particular association into
    the owning class. However, because Lucene is inherently denormalized, Hibernate
    Search must be made aware any time the embedded entity changes. To help track
    these changes, Hibernate Search provides the **@ContainedIn** annotation, to mark
    the other side of an embedded association.


    Now that you have a clearer understanding of how to annotate a domain class for
    indexing, let’s examine the indexing and search processes.


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    Putting Lucene and Hibernate in Sync


    One of the primary advantages of Hibernate Search is the seamlessness of the integration
    between Hibernate and Lucene. Hibernate Search relies on Hibernate events to trigger
    the appropriate changes to the Lucene index as persistent state changes are made
    to your domain model.


    In Chapter 4, we covered the JPA life cycle. In adhering to the JPA life cycle,
    Hibernate offers a fine-grained event model, broadcasting specific events based
    on persistent state changes to a domain object.


    For example, when a domain class instance is persisted, Hibernate will propagate
    the appropriate event.


    Similarly, Hibernate will broadcast numerous other events, such as delete and
    update notifications, providing a means to listen and respond to changes to your
    domain model. Event listeners are an effective design pattern for defining application
    behavior in a decoupled way, and Hibernate Search is able to plug in to domain
    life-cycle events through this powerful mechanism.


    If you are building an application from scratch and are starting with an empty
    database, then the process of populating the Lucene index is straightforward.
    When your domain object is first persisted to the database, such as through **entityManager.save(artEntity)**,
    Hibernate Search will catch the life-cycle event and add the specified **artEntity**
    to the Lucene index. By default, each domain class will have its own index, and
    all the appropriate properties will be added to the index according to the rules
    specified through the Hibernate Search annotations. Because Hibernate Search takes
    care of keeping your database and your Lucene index in sync, the integration between
    the two frameworks is intuitive and simple.


    However, there are circumstances under which you may need to index your domain
    objects more explicitly. For instance, if you are integrating Hibernate Search
    into an existing application or working with a legacy database, you will need
    to find a way to retrofit your existing data into the Lucene index.


    Hibernate Search provides a more direct means of indexing your domain model as
    well.


    Hibernate Search provides an extended version of Hibernate’s **EntityManager**,
    enhancing these core framework classes with search-specific functionality. The
    enhanced version of the JPA **EntityManager** is the **FullTextEntityManager**.
    Accessing this search-capable **EntityManager** is fairly seamless: **import org.hibernate.search.jpa.Search;**


    ****FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    The next step is to perform the indexing. Here is how to explicitly index a single
    entity: **public void indexEntity(T object) {**


    **FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    **fullTextEntityManager.index(object);**


    **}**


    This method is intended to be added to your **GenericDaoJpa** class, in order
    to provide a generic means to index a domain class. If you want to implement a
    way to index all the entities of a particular type currently stored in the database,
    you could define the following method on your **GenericDaoJpa** implementation:


    **public void indexAllItems() {**


    **FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    **List results = fullTextEntityManager.createQuery("from " +**


    **type.getCanonicalName()).getResultList();**


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    **int counter = 0, numItemsInGroup = 10;**


    **Iterator resultsIt = results.iterator();**


    **while (resultsIt.hasNext()) {**


    **fullTextEntityManager.index(resultsIt.next());**


    **if (counter++ % numItemsInGroup == 0) {**


    **fullTextEntityManager.flushToIndexes();**


    **fullTextEntityManager.clear();**


    **}**


    **}**


    **}**


    In this method, we use the **FullTextEntityManager** to perform a standard JPA
    query, which simply lists all of the entities of the parameterized type. We then
    iterate through the results, indexing each entity. However, every ten index invocations,
    we call **fullTextEntityManager.flushToIndexes()**. This flushes the queued changes
    to the Lucene index, without waiting for the Hibernate Search batch threshold
    to be reached. Next, we call **fullTextEntityManager.clear()**, which clears out
    the JPA **persistenceContext**. This may not always be necessary, but if you are
    iterating through a large dataset, you want to reduce your memory footprint as
    much as possible.


    Building a Domain-Specific Search


    Now let’s put together all the concepts we’ve covered in this chapter to offer
    a basic search feature that allows end users to search across several of the **ArtEntity**
    fields using the specified search terms. Here is an example of how this can be
    implemented:


    **public List<ArtEntity> searchForArtEntitiesByTerms(String searchTerms,**


    ****Integer startIndex,**


    ****Integer maxResults) {**


    ****FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    **String[] fieldsToMatch = new String[] {"title", "subTitle", "media", "description",**


    **"caption"};**


    **QueryParser parser = new MultiFieldQueryParser(Version.LUCENE_29, fieldsToMatch,**


    ****new StandardAnalyzer(Version.LUCENE_29));**


    ****org.apache.lucene.search.Query luceneQuery = null;**


    **try {**


    **luceneQuery = parser.parse(searchTerms);**


    **} catch (ParseException e) {**


    **log.error("Error parsing lucene query: " + searchTerms);**


    **}**


    ****Query jpaQuery = fullTextEntityManager.createFullTextQuery(luceneQuery,**
    **ArtEntity.class);**


    **if (startIndex != null && maxResults != null) {**


    **jpaQuery.setFirstResult(startIndex);**


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    **jpaQuery.setMaxResults(maxResults);**


    **}**


    **List<ArtEntity> artEntities = jpaQuery.getResultList();**


    ****return artEntities;**


    ****}**


    In order to search across the **ArtEntity** **title**, **subtitle**, **media**,
    **description**, and **caption** fields, we use a special Lucene query parser
    called the **MultiFieldQueryParser**. This query parser takes an array of field
    names, so that all the user-specified search terms can be equally applied to each
    of the fields. In other words, using the **MultiFieldQueryParser** in this way
    is equivalent to the following Lucene query, assuming the user searched for “test”:


    **title: test OR subtitle: test OR media: test OR description:test OR caption:test**
    After parsing the Lucene query using our **MultiFieldQueryParser** and the specified
    **searchTerms**, we invoke the **createFullTextQuery** method on our **fullTextEntityManager**
    reference. This method returns a standard **javax.persistence.Query** instance,
    which we can use in the same manner as any JPA query. We limit our result set
    using **setFirstResult** and **setMaxResults** (if these parameters are specified),
    and then call **getResultList()** to return a **List** of **ArtEntity** instances.'
