  raw: 'Roo can’t reasonably be expected to predict the intent of your application
    well enough to generate service layer classes for you. Fortunately, because Roo
    applications are just normal Spring projects, you can create a service layer class,
    annotate it with the **@Service** stereotype annotation, and your Roo application
    will automatically detect it and incorporate it into your application context.


    As with a service layer, there’s nothing about Roo that would prevent you from
    wiring DAOs into your application. The biggest shortcoming would be that the Roo
    add-on infrastructure doesn’t support them, so you wouldn’t enjoy some of the
    benefits we’ve shown here, like automatic integration tests.


    **WHY NOT DAOS?**


    The Roo team is perfectly justified in their stance against generating DAOs by
    default. The Roo team members went out of their way to explain their decision
    in their exceptional documentation. The following is quoted from *The Spring Roo
    - Reference Documentation*, Chapter 3\. Application Architecture, Section 3.6.
    Goodbye DAOs (**http://static.springsource.org/spring-roo/reference/html/architecture.html**).


    If we reflect for a moment on the main motivations for DAOs, it is easy to see
    why these are not applicable in Roo applications:


    • Testing: In a normal application a DAO provides an interface that could be easily
    stubbed as part of unit testing. The interesting point about testing is that most
    people use mocking instead of stubbing in modern application, making it attractive
    to simply mock the persistence method or two that you actually require for a test
    (rather than the crudeness of stubbing an entire DAO interface). In Roo-based
    applications you simply mock the persistence-related methods that have been introduced
    to the entity.


    You can use normal mocking approaches for the instance methods on the Roo entity,
    and use Spring Aspect’s **@MockStaticEntityMethods** support for the static finder
    methods.


    • Separation of concern: One reason for having a DAO layer is that it allows a
    higher cohesion object-oriented design to be pursued. The high cohesion equates
    to a separation of concern that reduces the conceptual weight of implementing
    the system. In a Roo-based application separation of concern is achieved via the
    separate ITDs. The conceptual weight is also reduced because Roo handles the persistence
    methods rather than force the programmer to deal with them.


    Therefore separation of concern still exists in a Roo application without the
    requirement for a DAO layer.


    • Pluggable implementations: A further benefit of DAOs is they simplify the switching
    from one persistence library to another. In modern applications this level of
    API abstraction is provided via JPA. As Roo uses JPA in its generated methods,
    the ability to plug in an alternate implementation is already fully supported
    despite 232


    CHAPTER 12 ■ SPRING ROO


    there being no formal DAO layer. You can see this yourself by issuing the persistence
    setup command and specifying alternate implementations.


    • Non-JPA persistence: It is possible that certain entities are stored using a
    technology that does not have a JPA provider. In this case Roo 1.0.0 does not
    support those entities out of the box. However, if only a small number of entities
    are effected [sic] by this consideration there is no reason one or more hand-written
    ITDs could not be provided by the user in order to maintain conceptual parity
    with the remainder of the Roo application (which probably does have some JPA).
    If a large number of entities are effected [sic], the project would probably benefit
    from the user writing a Roo add-on which will automatically manage the ITDs just
    as Roo does for JPA.


    • Architectural reasons: Often people express a preference for a DAO because they’ve
    always done it that way. While maintaining a proven existing approach is generally
    desirable, adopting Roo for an application diminishes the value of a DAO


    layer to such an extent that it leaves little (if any) engineering-related reasons
    to preserve it.


    It’s also worth observing that most modern RAD frameworks avoid DAO layers and
    add persistence methods directly to entities. If you review similar technologies
    to Roo, you will see this is [sic] avoidance of a DAO layer is commonplace, mainstream
    and does not cause problems.


    Now You See Me, Now You Don’t—Removing Roo


    One of our favorite aspects of Roo is that it’s easy to remove it from a project.
    Since you can use Roo on existing legacy projects, and since it’s easy to remove
    any trace of Roo from your source code, there’s very little reason not to try
    it out. If you get any pushback from the team or your organization, you remove
    it in just a few moments, so there’s very little risk involved.


    Removing Roo is a task best undertaken from an IDE that understands AspectJ, such
    as Eclipse or STS. Here are the steps in Eclipse with AspectJ Development Tools
    (AJDT) installed: 1\. Stop any Roo shells that might be running.


    2\. In Eclipse, within the Java Browsing perspective, right-click your project
    and choose Refactor ` Push In.


    3\. You will see a dialog box listing all of the ITDs. Select OK to push all of
    that code from your **.aj** source files into the appropriate **.java** source
    files.


    4\. Perform a recursive find and replace on the files in your project where you
    replace the regular expression **\n.*Roo.*\n** with **\n**. This will remove all
    of the Roo annotations and their import declarations.


    5\. Remove any Roo dependencies from your maven **pom.xml** file.


    CHAPTER 12 ■ SPRING ROO


    And that’s it. Because there are no runtime dependencies and because Roo is built
    atop standard Java technologies, it’s easy to walk away from the framework and
    not lose any of the work that you’ve done.


    Summary


    As you’ve seen in this chapter, although Roo isn’t yet magical enough to put programmers
    out of work, it does give you an enormous jump-start in terms of raw development
    speed. It helps eliminate much of the tedium associated with developing enterprise
    Java applications by automatically generating boilerplate code into AspectJ ITDs
    and modifying your Spring application context configuration as your project grows.


    Roo boasts a strong architecture based on OSGi and add-ons. With the backing of
    SpringSource, it’s likely to evolve at a frantic pace as the Roo team strives
    to deliver more best-of-breed solutions that simplify the lives of developers
    around the globe.


    One of the biggest hurdles for adopting most RAD frameworks on the JVM is that
    using them is a viable option only when writing a new application or in the rare
    circumstance that a total application rewrite is in order. But Roo can be introduced
    into an existing application without forcing any changes to the way other team
    members write their code. As the framework is proven in your environment, the
    productivity gains should be irrefutable, and your development team will likely
    embrace the positive change. We highly recommend that you try using it to implement
    a new feature on your existing Spring-and Hibernate-powered application.


