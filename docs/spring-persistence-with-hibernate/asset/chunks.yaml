    **Comment** 领域类与 **CommentDTO** 类之间的差异相当微小。我们移除了 **commentedArt** 属性，该属性会在 **ArtEntityDTO**
    和 **CommentDTO** 之间创建循环引用（前提是我们将属性类型从 **ArtEntity** 改为 **ArtEntityDTO**）。


    使用 Spring 配置 Dozer


    现在我们已经定义了 DTO 类，接下来创建映射配置，指示 Dozer 如何将一个类映射到另一个类。Dozer 为 Spring 提供了 **DozerBeanMapperFactoryBean**
    抽象，这是一个工厂 bean，有助于创建 Dozer 映射器。Dozer 映射器依赖一个 XML 配置文件来学习定义一个类属性如何映射到另一个类属性的规则。


    首先，让我们将适当的配置添加到 **spring-master.xml** 文件中：


    **<bean class="org.dozer.spring.DozerBeanMapperFactoryBean">**


    **<property name="mappingFiles" value="classpath*:/dozer-mapping.xml"/>**


    **</bean>**


    这个 bean 实际上非常灵活，并支持用于定义自定义转换器、事件监听器和其他 Dozer 扩展点的附加属性。你可以在 Dozer 网站上了解更多关于 **DozerBeanMapperFactoryBean**
    功能的信息。


    在上述配置中，我们指定 Dozer 映射文件应位于类路径下，名称为 **dozer-mapping.xml**。这个 XML 文件定义了 Dozer 的默认行为以及类之间映射的规则。让我们看看我们的
    Dozer 映射配置：


    **<?xml version="1.0" encoding="UTF-8"?>**


    **<mappings**


    ****xsi:schemaLocation="http://dozer.sourceforge.net**


    ****http://dozer.sourceforge.net/schema/beanmapping.xsd">**


    ****<configuration>**


    **<stop-on-errors>true</stop-on-errors>**


    **<date-format>MM/dd/yyyy HH:mm</date-format>**


    **<wildcard>true</wildcard>**


    **</configuration>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.ArtEntity</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.ArtEntityDTO</class-b>**


    **<field>**


    **<a>galleryPicture.url</a>**


    **<b>galleryURL</b>**


    **</field>**


    **<field>**


    **<a>storagePicture.url</a>**


    **<b>storageURL</b>**


    **</field>**


    **<field>**


    **<a>thumbnailPicture.url</a>**


    **<b>thumbnailURL</b>**


    **</field>**


    **</mapping>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.Category</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.CategoryDTO</class-b>**


    **</mapping>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.Comment</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.CommentDTO</class-b>**


    **</mapping>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.Exhibition</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.ExhibitionDTO</class-b>**


    **</mapping>**


    ****</mappings>**


    让我们逐步了解此配置的重要组件。首先是文件顶部的一个配置块。此部分指定了 Dozer 的默认全局映射行为。


    我们定义了一个默认的 **date-format**，并将 **wildcard** 行为设置为 **true**。**wildcard** 行为决定了 Dozer
    是否默认尝试自动映射所有明显的属性。例如，如果 **wildcard** 设置为 **true**，并且两个映射类共享相同名称的属性，Dozer 将尝试自动映射这些属性。此功能可以在特定映射规则中被覆盖。如果
    **wildcard** 保持激活状态，你仍然可以通过使用 **field-exclude** 元素来省略某些属性的映射。例如，如果我们想阻止 **subTitle**
    属性被映射，我们可以将以下片段添加到 **ArtEntity** 映射配置中：


    **<field-exclude>**


    **<a>subTitle</a>**


    **<b>subTitle</b>**


    **</field-exclude>**


    一对类的映射配置很直接。每个映射定义都封装在一个映射 XML 块中。在每个块内，我们包含一个 **class-a** 元素和一个 **class-b** 元素，指定要映射的相应类。尽管配置本质上是顺序的，但请记住
    Dozer 默认是双向的。这意味着定义如何从 **ArtEntity** 类映射到 **ArtEntityDTO** 类的规则也可以反向应用，以从 DTO
    类映射回领域类。你可以通过向映射元素添加属性 **type="one-way"** 来要求映射规则仅应用于单一方向。


    在我们的 **ArtEntity** 到 **ArtEntityDTO** 映射案例中，由于两个类之间的属性名称相当一致，大部分细节将是隐式的。尽管 **ArtEntityDTO**
    上的 **comments** 集合属性包含不同类型的元素，但 Dozer 将通过应用指定的映射规则，自动将 **ArtEntity.comments**
    集合中的每个 **Comment** 元素转换为 **CommentDTO** 实例。

