- fmt: "# 闭包是什么？\n\n闭包（closure）是一段可赋值的代码块，其功能类似于 Java 中的匿名内部类。尽管闭包常被用于与方法相似的场景，但一个关键区别在于：闭包可以赋值给变量，甚至可以被传递。稍后我们将更详细地讨论闭包。\n\
    \n# 第11章 GORM 与 Grails\n\n## 释放类型约束\n\nGroovy 的变量和引用无需静态类型声明。例如，你可以通过以下方式定义变量：\n\
    \n```\ndef myName = \"Sam\"\n```\n\n变量`myName`可以包含`String`类型，也可以后续改为`int`类型。`def`用于定义变量或属性，而不指定具体类型。这类似于在\
    \ Java 中使用`Object`类型，但使用`def`时强调的是类型不重要，且可能在不同上下文中发生变化。\n\n## GString——增强版字符串\n\
    \nGroovy 支持一种称为 *GString* 的概念，它本质上是 Java `String`的增强版。在前面的示例中，我们能够通过编写`\"hello\
    \ ${name}\"`来创建动态`String`。这种策略将变量直接集成到`String`中，无需进行字符串拼接。你甚至可以在`${}`代码块中直接调用方法。\n\
    \n## Groovy 中的默认构造函数\n\n另一个关键概念是：Groovy 类只需一个默认构造函数即可接受命名参数。\n\n例如，你可以通过以下方式实例化一个\
    \ Groovy 类：\n\n```\nClass GroovyBean {\n    String name\n    String favoriteColor\n\
    }\n\ndef myBean = new GroovyBean([name: 'Joe', color: 'blue']);\n```\n\n上述示例中有几个重要细节。首先，我们定义了一个\
    \ Groovy Bean，却没有实际定义对应的 getter 和 setter 方法（也没有使用任何分号！）。Groovy 会在运行时为我们自动生成这些方法。我们可以通过`myBean.getName()`来引用`myBean`实例的`name`属性，但`myBean.name`更为简洁。\n\
    \n另外，请注意我们传入`java.util.Map`类型的 Bean 属性时所使用的快捷方式。Map 可以使用以下语法定义：`[key: value]`。一个常见的惯用法是将空\
    \ Map 定义为`[:]`。\n\n类似地，`java.util.List`可以使用`[]`表示法定义。\n\n## Groovy 中的闭包\n\nGroovy\
    \ 最显著的特性之一是其对闭包的出色支持。*闭包*类似于方法，但可以被变量引用或作为参数传递给方法。例如，你可以通过以下代码创建一个闭包并将其存储在名为`myClosure`的变量中：\n\
    \n```\ndef myClosure = { def param ->\n    println(\"The param is ${param}\")\n\
    }\n```\n\n请注意，闭包参数出现在第一个花括号之后，后面跟着`->`。\n\n闭包可以极大地简化代码。例如，在 Groovy 中遍历列表可以这样实现：\n\
    \n```\nList myList = [\"a\",\"b\",\"c\"]\nmyList.each { curItem ->\n    println(curItem);\n\
    }\n```\n\n这个闭包会被传递给`each`方法，作用于列表中的每个元素。将此方法与使用 Java `Iterator`的方式对比：\n\n```\n\
    List<String> myList = new java.util.ArrayList();\nmyList.add(\"a\"); myList.add(\"\
    b\"); myList.add(\"c\");\nIterator<String> myIterator = myList.iterator();\nwhile\
    \ (myIterator.hasNext()) {\n    String curItem = myIterator.next();\n    System.out.print(curItem);\n\
    }\n```\n\n这已经很令人印象深刻了，但还有更强大的功能。假设我们要遍历一个`String`列表，只返回那些包含序列 *cat* 的元素。在 Groovy\
    \ 中，这可以非常简单地实现：\n\n```\ndef stringList = [\"I like dogs\",\n                 \
    \ \"I like cats\", \"I like to scat sing\",\n                  \"What is a category\"\
    , \"I have gas\"]\ndef matchingStrings = stringList.findAll { curString ->\n \
    \   curString.contains(\"cat\")\n}\n```\n\n调用闭包的方式与调用方法类似。只需引用闭包属性，后跟`()`。你也可以通过引用闭包并调用`call()`来显式调用闭包。\n\
    \n现在我们已经介绍了一些基本的 Groovy 概念，接下来让我们开始构建 Grails 持久化层。\n\n> **注意** 关于 Groovy 还有很多内容需要学习。我们推荐阅读\
    \ Christopher M. Judd、Joseph Faisal Nusairat 和 Jim Shingler 合著的 *Beginning Groovy\
    \ and Grails*（Apress，2008 年）。\n\n# 让 Grails 运行起来\n\nGrails 的持久化解决方案与我们迄今为止在本书中探讨的其他基于\
    \ DAO 的持久化解决方案截然不同，以至于我们无法有效地在现有应用程序代码库的基础上进行构建（此前我们一直能够这样做）。相反，我们需要从头开始，使用 Grails\
    \ 方法来架构我们的画廊应用程序。这乍看起来可能是一项艰巨的任务，但 Grails 附带了许多快捷模板和脚本，旨在为你生成代码桩。\n\n这种桩代码在 Grails\
    \ 术语中被称为 *scaffolding*（脚手架）。\n\n## 安装 Grails\n\n第一步是安装 Grails。前往`http://www.grails.org`下载最新版本。\n\
    \n解压下载的归档文件，并将所有内容复制到硬盘上的一个合理位置。接下来，确保`bin`目录下的所有文件都是可执行的。如果你使用的是基于 Unix 的操作系统，可以在`bin`目录内运行`chmod\
    \ ug+x ./*`。\n\n最后，确保设置了`GRAILS_HOME`环境变量。`GRAILS_HOME`应指向你安装 Grails 的位置。同时，确保已将`GRAILS_HOME/bin`目录添加到你的`PATH`中，这样每次调用\
    \ Grails 脚本时就不需要指定 Grails 可执行文件的完整路径。\n\n如果你使用的是基于 Unix 的操作系统，我们建议更新主目录中的`~/.bashrc`脚本，这样就不需要多次进行此配置。在\
    \ Mac 上，你可以将以下行追加到`~/.bashrc`中：\n\n```\nexport GRAILS_HOME=/opt/local/share/java/grails/\n\
    export PATH=$PATH:$GRAILS_HOME/bin\n```\n\n安装完 Grails 后，下一步是创建我们的画廊应用程序。\n\n##\
    \ 创建 Grails 应用程序\n\nGrails 附带了用于生成样板代码的脚本，以帮助你启动应用程序。我们将介绍的第一个脚本是`create-app`：\n\
    \n```\ngrails create-app grailsGallery\n```\n\n这里，我们将`grailsGallery`作为唯一参数传入。Grails\
    \ 会运行几秒钟，然后——瞧！你现在已经拥有一个全新的 Grails 应用程序，可以开始使用了。\n\n约定优于配置（convention-over-configuration）概念的一部分是以标准化方式组织和命名应用程序的关键部分。`create-app`脚本通过为你设置\
    \ Grails 目录结构来简化这一过程。`create-app`脚本执行完毕后，你将得到以下目录结构：\n\n```\ngallery ->\n    grails-app\n\
    \        conf\n            spring\n                resources.groovy\n        \
    \    Bootstrap.groovy\n            Datasource.groovy\n            Urlmappings.groovy\n\
    \        controllers\n        domain\n        i18n\n        services\n       \
    \ taglib\n        utils\n        views\n    scripts\n    src\n        java\n \
    \       groovy\n    test\n        integration\n        unit\n    web-app\n   \
    \     css\n        js\n        images\n        WEB-INF\n        index.gsp\n```\n\
    \n我们的大部分编码工作将集中在`grails-app`目录上，这里是我们大部分 Groovy 代码存放的地方。在开始动手之前，让我们简要了解一下 Grails\
    \ 应用程序的布局。"
  raw: 'But what is a closure? A closure is an assignable block of code, similar in
    function to an anonymous inner class in Java. Although closures are often used
    in a similar context to methods, a key difference is that closures can be assigned
    to variables and even passed around. We will discuss closures in a bit more detail
    shortly.


    CHAPTER 11 ■ GORM AND GRAILS


    Letting Your Types Loose


    Groovy variables and references don’t need to be statically typed. For instance,
    you can define a variable in the following way:


    **def myName = "Sam"**


    The variable **myName** can contain a **String** or can later change to an **int**.
    **def** defines a variable or property without delineating a specific type. It
    is similar to using a type of **Object** in Java, but the emphasis when using
    **def** is that the type isn’t important and may change from one context to another.


    GStrings—Strings on Steroids


    Groovy supports a concept called *GString*, which is basically a Java **String**
    on steroids. In the earlier example, notice that we were able to create a dynamic
    **String** by writing **"hello ${name}"** . This strategy integrates a variable
    directly within a **String** without requiring concatenation. You can even invoke
    methods directly within a **${}** block.


    Default Constructors in Groovy


    Another key concept is that Groovy classes can take named parameters with just
    a default constructor.


    For instance, you can instantiate a Groovy class using the following approach:
    **Class GroovyBean {**


    **String name**


    **String favoriteColor**


    **}**


    **def myBean = new GroovyBean([name: ''Joe'', color: ''blue'']);**


    There are a few important details in the preceding example. First, notice that
    we defined a Groovy bean without actually defining corresponding getters and setters
    (and without using any semicolons!).


    Groovy defines these for us behind the scenes at runtime. We could reference the
    **name** property of the **myBean** instance with **myBean.getName()**, but **myBean.name**
    is more concise.


    Also notice the shortcut we used for passing in a **java.util.Map** of bean properties.
    Maps can be defined using the following syntax: **[key: value]**. A common idiom
    is to define an empty map as **[:]**.


    Similarly, a **java.util.List** can be defined using the **[]** notation.


    Closures in Groovy


    One of Groovy’s most significant features is its excellent support for closures.
    *Closures* are like methods but can also be referenced by variables or passed
    as parameters into methods. For instance, you can create a closure and store it
    in a variable called **myClosure** using the following code: **def myClosure =
    {def param ->**


    **println("The param is ${param}")**


    **}**


    CHAPTER 11 ■ GORM AND GRAILS


    Notice that closure parameters appear after the first curly brace and are then
    followed by **->** .


    Closures can be used to dramatically simplify code. For example, you can iterate
    through a list in Groovy this way:


    **List myList = ["a","b","c"]**


    **myList.each {curItem ->**


    **println(curItem);**


    **}**


    This closure will be passed to the **each** method for every element in the list.
    Contrast this approach with using a Java **Iterator**:


    **List myList<String> = new java.util.ArrayList();**


    **myList.add("a"); myList.add("b"); myList.add("c");** **Iterator<String> myIterator
    = myList.iterator();**


    **while (myIterator.hasNext()) {**


    **String curItem = myIterator.next();**


    **System.out.print(curItem);**


    **}**


    This is impressive, but it gets better. Imagine we wanted to iterate through a
    list of **String**s, returning only those items that contain the sequence *cat*.
    In Groovy, this can be accomplished quite simply:


    **def stringList = ["I like dogs",**


    **"I like cats", "I like to scat sing",**


    **"What is a category", "I have gas"]**


    **def matchingStrings = stringList.findAll {curString ->**


    **curString.contains("cat")**


    **}**


    Invoking a closure works in a similar way to invoking a method. You simply reference
    the closure property, followed by **()**. You can also call a closure explicitly
    by referencing the closure and invoking **call()**.


    Now that we’ve covered a few basic Groovy concepts, let’s move on to building
    our Grails persistence tier.


    ■ **Note** There is a lot more to learn about Groovy. We recommend you check out
    *Beginning Groovy and Grails* by Christopher M. Judd, Joseph Faisal Nusairat,
    and Jim Shingler (Apress, 2008).


    CHAPTER 11 ■ GORM AND GRAILS


    Getting Grails Running


    The Grails persistence solution is so dramatically different from the other DAO-based
    persistence solutions that we’ve explored so far in this book that we can’t effectively
    build on our existing application code base, which we have been able to do up
    until now. Instead, we need to start over and architect our gallery application
    using the Grails approach. This may seem like a daunting task at first, but Grails
    comes with many shortcut templates and scripts designed to start stubbing out
    code for you.


    This stub code is known as *scaffolding*, in Grails speak.


    Installing Grails


    The first step is to install Grails. Head over to **http://www.grails.org**, and
    download the latest release.


    Unzip the downloaded archive and copy everything to a logical location on your
    hard drive. Next, make sure that everything under the **bin** directory is executable.
    If you’re using a Unix-based operating system, you can run **chmod ug+x ./***
    from within the **bin** directory.


    Finally, make sure the **GRAILS_HOME** environment variable is set up. **GRAILS_HOME**
    should point to the location where you installed Grails. Also, make sure that
    you’ve added the **GRAILS_HOME/bin** directory to your **PATH**, so that you don’t
    need to specify the full path to the Grails executables each time you want to
    invoke a Grails script.


    If you are using a Unix-based operating system, we recommend updating your **~/.bashrc**
    script within your home directory so that you don’t need to do this configuration
    more than once. On a Mac, you can append the following lines to your **~/.bashrc**:


    **export GRAILS_HOME=/opt/local/share/java/grails/**


    **export PATH=$PATH:$GRAILS_HOME/bin**


    After you have Grails installed, the next step is to create our gallery application.


    Creating a Grails Application


    Grails ships with scripts that take care of generating boilerplate code to get
    your application started. The first of these scripts that we will introduce is
    **create-app**:


    **grails create-app grailsGallery**


    Here, we pass **grailsGallery** as the only argument. Grails will churn for a
    few seconds, and voilà!


    You now have a new Grails application set up and ready to go.


    Part of the convention-over-configuration concept is organizing and naming key
    parts of your application in a standardized way. The **create-app** script makes
    this easy by setting up the Grails directory structure for you. After the **create-app**
    script completes, you will end up with the following directory structure:


    **gallery ->**


    **grails-app**


    **conf**


    **spring**


    **resources.groovy**


    **Bootstrap.groovy**


    CHAPTER 11 ■ GORM AND GRAILS


    **Datasource.groovy**


    **Urlmappings.groovy**


    **controllers**


    **domain**


    **i18n**


    **services**


    **taglib**


    **utils**


    **views**


    ****scripts**


    **src**


    **java**


    **groovy**


    **test**


    **integration**


    **unit**


    **web-app**


    **css**


    **js**


    **images**


    **WEB-INF**


    **index.gsp**


    Most of our coding effort will be focused on the **grails-app** directory, which
    is where the majority of our Groovy code will live. Before we start getting our
    hands dirty, let’s take a brief tour of the Grails application layout.'
  trans: '

    但什么是闭包？闭包是一段可赋值的代码块，功能类似于 Java 中的匿名内部类。尽管闭包的使用场景常与方法类似，但一个关键区别在于闭包可以赋值给变量，甚至被传递。稍后我们将更详细地讨论闭包。


    第 11 章 ■ GORM 与 GRAILS


    释放你的类型


    Groovy 的变量和引用无需静态类型。例如，你可以通过以下方式定义一个变量：


    **def myName = "Sam"**


    变量 **myName** 可以包含一个 **String**，也可以稍后更改为 **int**。**def** 用于定义变量或属性，而不指定具体类型。这类似于在
    Java 中使用 **Object** 类型，但使用 **def** 的重点在于类型并不重要，并且可能在不同上下文中发生变化。


    GString——增强版字符串


    Groovy 支持一种称为 *GString* 的概念，它本质上是一个增强版的 Java **String**。在前面的例子中，请注意我们能够通过编写 **"hello
    ${name}"** 来创建一个动态的 **String**。这种策略将变量直接集成到 **String** 中，无需进行拼接。你甚至可以在 **${}**
    块内直接调用方法。


    Groovy 中的默认构造函数


    另一个关键概念是，Groovy 类只需一个默认构造函数即可接受命名参数。


    例如，你可以使用以下方法实例化一个 Groovy 类：**Class GroovyBean {**


    **String name**


    **String favoriteColor**


    **}**


    **def myBean = new GroovyBean([name: ''Joe'', color: ''blue'']);**


    在前面的例子中有几个重要的细节。首先，请注意我们定义了一个 Groovy bean，却没有实际定义相应的 getter 和 setter（也没有使用任何分号！）。


    Groovy 在运行时为我们隐式地定义了这些。我们可以通过 **myBean.getName()** 来引用 **myBean** 实例的 **name**
    属性，但 **myBean.name** 更为简洁。


    还要注意我们用于传入 bean 属性的 **java.util.Map** 的快捷方式。Map 可以使用以下语法定义：**[key: value]**。一个常见的惯用法是将空
    map 定义为 **[:]**。


    类似地，**java.util.List** 可以使用 **[]** 表示法定义。


    Groovy 中的闭包


    Groovy 最显著的特性之一是其对闭包的出色支持。*闭包* 类似于方法，但也可以被变量引用或作为参数传递给方法。例如，你可以使用以下代码创建一个闭包并将其存储在名为
    **myClosure** 的变量中：**def myClosure = {def param ->**


    **println("The param is ${param}")**


    **}**


    第 11 章 ■ GORM 与 GRAILS


    请注意，闭包参数出现在第一个花括号之后，后面跟着 **->**。


    闭包可用于极大地简化代码。例如，你可以通过以下方式在 Groovy 中遍历一个列表：


    **List myList = ["a","b","c"]**


    **myList.each {curItem ->**


    **println(curItem);**


    **}**


    这个闭包将被传递给 **each** 方法，用于列表中的每个元素。将此方法与使用 Java **Iterator** 的方法进行对比：


    **List myList<String> = new java.util.ArrayList();**


    **myList.add("a"); myList.add("b"); myList.add("c");** **Iterator<String> myIterator
    = myList.iterator();**


    **while (myIterator.hasNext()) {**


    **String curItem = myIterator.next();**


    **System.out.print(curItem);**


    **}**


    这已经很令人印象深刻了，但还有更好的。假设我们想要遍历一个 **String** 列表，只返回那些包含序列 *cat* 的项。在 Groovy 中，这可以非常简单实现：


    **def stringList = ["I like dogs",**


    **"I like cats", "I like to scat sing",**


    **"What is a category", "I have gas"]**


    **def matchingStrings = stringList.findAll {curString ->**


    **curString.contains("cat")**


    **}**


    调用闭包的方式与调用方法类似。你只需引用闭包属性，后面跟上 **()**。你也可以通过引用闭包并调用 **call()** 来显式调用闭包。


    现在我们已经介绍了一些基本的 Groovy 概念，让我们继续构建我们的 Grails 持久化层。


    ■ **注意** 关于 Groovy 还有很多需要学习。我们推荐你查阅 Christopher M. Judd、Joseph Faisal Nusairat
    和 Jim Shingler 合著的 *Beginning Groovy and Grails*（Apress，2008 年）。


    第 11 章 ■ GORM 与 GRAILS


    让 Grails 运行起来


    Grails 的持久化解决方案与我们迄今为止在本书中探讨的其他基于 DAO 的持久化解决方案截然不同，以至于我们无法有效地在我们现有的应用程序代码库（我们之前一直能够使用的代码库）基础上进行构建。相反，我们需要从头开始，使用
    Grails 方法来架构我们的画廊应用程序。这起初可能看起来是一项艰巨的任务，但 Grails 附带了许多快捷模板和脚本，旨在为你生成代码桩。


    在 Grails 术语中，这种桩代码被称为*脚手架*。


    安装 Grails


    第一步是安装 Grails。前往 **http://www.grails.org**，下载最新版本。


    解压下载的归档文件，并将所有内容复制到硬盘上的一个合理位置。接下来，确保 **bin** 目录下的所有内容都是可执行的。如果你使用的是基于 Unix 的操作系统，可以在
    **bin** 目录内运行 **chmod ug+x ./***。


    最后，确保设置了 **GRAILS_HOME** 环境变量。**GRAILS_HOME** 应指向你安装 Grails 的位置。同时，确保已将 **GRAILS_HOME/bin**
    目录添加到你的 **PATH** 中，这样你每次调用 Grails 脚本时就不需要指定 Grails 可执行文件的完整路径了。


    如果你使用的是基于 Unix 的操作系统，我们建议更新你主目录中的 **~/.bashrc** 脚本，这样你就不需要多次进行此配置。在 Mac 上，你可以将以下行追加到你的
    **~/.bashrc** 中：


    **export GRAILS_HOME=/opt/local/share/java/grails/**


    **export PATH=$PATH:$GRAILS_HOME/bin**


    安装好 Grails 后，下一步是创建我们的画廊应用程序。


    创建 Grails 应用程序


    Grails 附带了用于生成样板代码以启动应用程序的脚本。我们将介绍的第一个脚本是 **create-app**：


    **grails create-app grailsGallery**


    这里，我们将 **grailsGallery** 作为唯一参数传入。Grails 会运行几秒钟，然后瞧！


    你现在有了一个新的 Grails 应用程序，已经设置好并可以运行了。


    约定优于配置概念的一部分是以标准化的方式组织和命名应用程序的关键部分。**create-app** 脚本通过为你设置 Grails 目录结构使这变得容易。**create-app**
    脚本完成后，你将得到以下目录结构：


    **gallery ->**


    **grails-app**


    **conf**


    **spring**


    **resources.groovy**


    **Bootstrap.groovy**


    第 11 章 ■ GORM 与 GRAILS


    **Datasource.groovy**


    **Urlmappings.groovy**


    **controllers**


    **domain**


    **i18n**


    **services**


    **taglib**


    **utils**


    **views**


    ****scripts**


    **src**


    **java**


    **groovy**


    **test**


    **integration**


    **unit**


    **web-app**


    **css**


    **js**


    **images**


    **WEB-INF**


    **index.gsp**


    我们大部分的编码工作将集中在 **grails-app** 目录上，我们的大部分 Groovy 代码都将存放在这里。在我们开始动手之前，让我们简要地浏览一下
    Grails 应用程序的布局。

    '
- fmt: "# 排版后的内容\n\nNot surprisingly，`grails-app/conf`目录保存了应用程序的配置。Grails 在设计上具有高度的模块化特性，因此并不总是需要显式配置每一个依赖项。然而，由于\
    \ Grails 本质上是一个 Spring 应用程序，`grails-app/conf/spring/resources.groovy`文件可用于配置依赖项。尽管这是一个\
    \ Spring 配置文件，但你会注意到它并非 XML 格式。Grails 提供了一种自定义领域特定语言（DSL）来配置 Spring Bean，并且由于该文件本质上是可执行的\
    \ Groovy 代码，它比标准的基于 XML 的配置灵活得多。\n\n> **注意**：Groovy 默认的应用程序配置方法使用`resources.groovy`文件。你也可以创建一个`resources.xml`文件，从而使用更标准的基于\
    \ XML 的 Spring 配置。\n\n使用 Spring DSL 相当直接。例如，假设我们想创建一个电子邮件服务，以便在向图库添加新图片时通过电子邮件通知最终用户。我们希望在`resources.groovy`文件中配置\
    \ Spring 的电子邮件组件，以便用户能够从应用程序内部发送电子邮件。以下是该配置可能的样子：\n\n```\nbeans = {\n    javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl)\
    \ {\n        host = 'smtp.prospringhibernate.com'\n    }\n}\n```\n\n这种模式相当直观。首先定义\
    \ Bean 名称，后面跟着括号内的类名。然后，在闭包块（即花括号`{}`内的代码部分）中配置 Bean 内部的属性。\n\n如果我们想将`javaMailSender`Bean\
    \ 注入到 Grails 服务或控制器中，只需在相应的 Grails 服务或控制器类中声明一个名为`javaMailSender`的属性，即可依赖默认的按名称自动装配：\n\
    \n```\nclass EmailService {\n    def javaMailSender\n}\n```\n\n类似地，如果我们想在`resources.groovy`文件中配置的另一个\
    \ Bean 中引用 Grails 的`EmailService`，则使用其隐式 Bean 名称——在本例中为`emailService`。例如，我们可以在`resources.groovy`文件中定义一个`NotificationComponent`Bean，如下所示：\n\
    \n```\nbeans = {\n    notificationComponent(com.prospringhibernate.NotificationComponent)\
    \ {bean ->\n        emailService = ref(\"emailService\")\n        bean.factoryMethod\
    \ = \"getInstance\"\n        bean.singleton = \"false\"\n        defaultNotificationMethods\
    \ = [\"email\", \"sms\"]\n    }\n}\n```\n\n请注意，我们在块顶部使用`bean ->`声明了一个 Bean 参数。通过声明\
    \ Bean 参数，我们可以指定与所配置 Bean 类型相关的更详细的信息。在本例中，我们指定了`factoryMethod`为`getInstance`，这确保通过调用`getInstance()`来实例化该\
    \ Bean 的新实例。我们还指定了这不是一个单例 Bean。\n\n另外请注意，我们通过使用约定`ref(\"BEANNAME\")`注入了对`EmailService`的引用，其中`BEANNAME`是`EmailService`Bean\
    \ 的名称。我们可以将大部分 Spring 配置知识应用于这个基于 Groovy 的 DSL。然而，请注意以下示例中相对于 XML 的灵活性优势：\n\n\
    ```\nbeans = {\n    javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl)\
    \ {\n        if (Environment.getCurrent() == \"production\") {\n            host\
    \ = \"smtp.prospringhibernate.com\"\n        } else {\n            host = \"smtp.dev.prospringhibernate.com\"\
    \n        }\n    }\n}\n```\n\n显然，可解释的代码相比静态 XML 有其优势。\n\n本概述仅涉及 Grails 的部分配置选项。还可以配置动态\
    \ Bean 名称，以及指定属性占位符和覆盖配置。\n\n> **注意**：`grails-app/conf/Bootstrap.groovy`文件提供了简单的钩子（`init()`和`destroy()`）来处理应用程序的启动和关闭事件。在开发过程中，`Bootstrap.groovy`是向应用程序数据库填充默认数据的有效手段。\n\
    \n## 配置应用程序\n\n`grails-app/conf/Config.groovy`文件是指定 Grails 应用程序关键配置细节的集中位置。该文件包含有关应用程序应使用的字符编码以及日志记录细节（使用\
    \ log4j）的信息。\n\nGrails 利用环境的内在概念来促进不同开发和部署场景的创建与分离。例如，开发或测试时可能需要使用与生产部署不同的数据库（需要不同的配置细节）。这些概念内置于\
    \ Grails 核心中，使得使用开发数据库进行测试，然后部署应用程序到生产环境使用实时数据库变得容易，而无需记住交换配置。环境特定的细节存在于几个关键的配置文件中。\n\
    \n`Config.groovy`文件包含一个初始代码块，用于指定生产环境的默认服务器 URL：\n\n```\nenvironments {\n    production\
    \ {\n        grails.serverURL = \"http://www.changeme.com\"\n    }\n}\n```\n\n\
    如果你想为开发环境指定不同的 URL，可以相应地修改配置片段：\n\n```\nenvironments {\n    production {\n   \
    \     grails.serverURL = \"http://www.prospringhibernate.com\"\n    }\n    development\
    \ {\n        grails.serverURL = \"http://www.prospringhibernate.com\"\n    }\n\
    }\n```\n\n应用程序定义或使用的环境类型没有限制。你可以根据需要添加任意数量的环境。这对于组织的开发流程、构建周期或测试策略非常有用。\n\n##\
    \ 配置数据源\n\n由于大多数 Web 应用程序都需要数据库，Grails 定义了一个专门用于配置数据源相关细节的文件：`grails-app/conf/DataSource.groovy`。该文件也使用自定义的基于\
    \ Groovy 的 DSL，使得配置清晰简洁。环境概念也内置于此文件中。如果属性适用于所有环境，则可以在全局级别进行配置。然而，环境特定的配置应嵌套在相应的环境块内。\n\
    \n以我们的图库应用程序为例，`DataSource.groovy`文件可能如下所示（请记住，该文件的大部分内容已为你创建，因此你只需配置应用程序特定的细节）：\n\
    \n```\ndataSource {\n    pooled = true\n    driverClassName = \"org.hsqldb.jdbcDriver\"\
    \n    username = \"sa\"\n    password = \"\"\n}\n\nhibernate {\n    cache.use_second_level_cache\
