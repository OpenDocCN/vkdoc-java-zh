    • **SUPPORTS**：如果存在事务，则支持它，但这不是必需的。


    第 7 章 ■ 事务管理


    • **MANDATORY**：必须存在事务；否则，抛出异常。


    • **REQUIRES_NEW**：创建一个新事务，如果当前事务存在，则挂起它。


    • **NOT_SUPPORTED**：在“事务化”方法内以非事务方式执行代码，并挂起当前事务。


    • **NEVER**：如果存在事务，则抛出异常。


    • **NESTED**：如果存在事务，则执行嵌套事务；否则，创建一个新事务。嵌套事务提供了一种提供更细粒度事务行为的方法，允许执行一组内部事务。例如，这在某些嵌套事务可能回滚但不会中止整个操作的情况下很有用。


    **Isolation** 是 ACID 中的“I”，它定义了正在运行的事务如何影响（以及如何受）应用程序中发生的其他数据库进程影响。用于控制给定事务隔离行为的设置如下：


    • **DEFAULT**：让数据存储定义隔离级别。


    • **READ_UNCOMMITTED**：此隔离级别允许活动事务读取其他正在运行的事务所做的更改，即使这些其他事务尚未提交。换句话说，此设置允许脏读。


