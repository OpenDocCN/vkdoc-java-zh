    **afterPropertiesSet()** 方法，一旦 Spring 完成所有已配置属性的设置，该方法就会被自动检测并调用。这种方法的缺点是你牺牲了简单的
    POJO，并将你的 Bean 与 Spring 紧密耦合。虽然与 Spring 耦合并非不可接受，但更清晰的做法是将初始化细节完全保留在配置中，而不是代码中。所以，请将此作为你的座右铭：*将其保留在配置中*。


