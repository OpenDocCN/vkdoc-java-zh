    **<!-- 将 JPA EntityManager 绑定到线程，用于处理整个请求 -->**


    **<filter>**


    **<filter-name>OpenEntityManagerInViewFilter</filter-name>**


    **<filter-class>org.springframework.orm.jpa.support.OpenEntityManagerInViewFilter</filter-class>**


    **</filter>**


    **<!-- 将 EntityManager 过滤器映射到所有请求 -->**


    **<filter-mapping>**


    **<filter-name>OpenEntityManagerInViewFilter</filter-name>**


    **<url-pattern>/*</url-pattern>**


    **</filter-mapping>**


    此代码片段摘自 **web.xml** 文件，引用了集成 **OpenEntityManagerInViewFilter** 所需的过滤器定义和映射。设置正确的
    **filter-mapping** 全局模式非常重要，因为这将定义处理应应用于哪些 URL。


    缓存


    到目前为止，我们已经讨论了几种减少或优化数据库访问次数的策略。比改进数据查询方式更好的做法是，完全避免访问数据库。显然，某些数据库访问始终是必需的，但缓存可以在最大程度地减少数据库负载和提高应用程序性能方面发挥很大作用。


    Hibernate 的最大优势之一是它为开发者提供了许多“免费”功能。而这些免费功能之一就是隐式缓存。如果你决定使用 143


    第 9 章 ■ 最佳实践与高级技术


    纯 JDBC 实现持久层，则需要显式地将缓存集成到 DAO 方法中，或在某个较低的抽象级别进行集成。虽然缓存表面上看起来实现起来很简单，但当你考虑失效规则（导致缓存中特定项目过期的因素）、防止冲突以及处理缓存项目的生存时间（TTL）时，你就会开始感受到其复杂性。


    那么，既然 Hibernate 免费提供了所有这些缓存功能，理解缓存机制又有什么好处呢？尽管 Hibernate 包含一些基础的缓存功能，提供了基本的优化来限制不必要的数据库访问，但调整其默认缓存行为可以显著提高应用程序的性能。


    为了能够利用缓存来提高应用程序性能，你需要了解 Hibernate 中不同层次的缓存以及实际可以缓存的内容。对于所有领域对象，Hibernate 提供了两个不同的缓存级别：


    *   **一级缓存（L1 缓存）** 由 **EntityManager** 提供，因此仅与特定用户或请求的有限范围相关。一级缓存主要作为一种优化手段，防止重新查询已加载的领域对象。

    *   **二级缓存（L2 缓存）** 的作用域是 **EntityManagerFactory**，因此生命周期更长，并且可以跨多个用户和请求提供缓存能力。二级缓存通过缓存提供了最大的实用性和灵活性来进行优化。


    因此，方法是激活二级缓存并集成一个缓存提供程序来开始缓存。现在我们需要考虑可以缓存什么。


    Hibernate 以略有不同的方式缓存领域对象。每个顶级领域对象都在不同的区域中被缓存。*区域*本质上是一个不同的部分或命名空间，旨在划分每个实体并防止潜在的冲突。每个领域对象都使用其标识符作为键持久化到缓存中。因此，给定一个缓存区域和一个标识符，你就可以访问特定领域对象的数据。每个领域对象通过存储其各自属性的值来进行缓存。


    然而，领域对象的引用和集合是与领域对象*分开*持久化的。换句话说，领域对象的缓存表示将仅引用其引用的标识符。例如，多对一关联将作为单个 ID 持久化，而集合将作为标识符列表持久化。领域对象集合实际上是在一个单独的缓存区域中持久化的，该区域专门用于该特定集合。这种情况下的键仍然是父领域对象的标识符，但区域特定于该领域对象和集合名称。然而，值是一个标识符列表，列表中的每个标识符对应于原始集合中引用的每个实体的
    ID。


    Hibernate 使用此策略是因为仅存储集合中每个实体的 ID 比存储每个实体的完整数据更高效。其意图是拥有 ID 就足够了，因为完整数据应该在其他地方（在被引用的领域对象自己的缓存区域中）被缓存。此外，将引用缓存为标识符可以解耦它们所关联的领域对象，确保对被引用领域对象的更改仅缓存在一个位置。这显然比管理复杂的依赖树要简单得多——尤其是当你开始考虑在特定项目过期或数据库发生更新时使其失效的复杂性时。


    集成缓存实现


    Hibernate 为缓存功能提供了一个通用的抽象层，允许将众多缓存实现轻松插入到 Hibernate 基础设施中。有各种优秀的 144


    第 9 章 ■ 最佳实践与高级技术


    缓存解决方案，包括 Ehcache、SwarmCache、JBoss Infinispan 等等。每个缓存实现在其提供的功能集上略有不同。例如，一些实现提供集群能力，允许集群内的多个节点共享相同的缓存数据（这可以减少缓存冲突和过时数据的可能性）。一些缓存解决方案提供专门的功能，例如事务行为。


    ■ **注意** 选择使用哪个缓存提供程序取决于你的需求。通常，我们推荐 Ehcache，这是一个灵活的、提供集群能力的开源缓存实现。如果你的应用程序对事务缓存或其他特定需求有要求，你应该考虑其他一些缓存提供程序选项。


    让我们重新审视我们的 **persistence.xml** 配置，并修改它以集成 Ehcache。


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<persistence**


    ****xsi:schemaLocation="http://java.sun.com/xml/ns/persistence**


    ****http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd"**


    **version="2.0">**


    ****<persistence-unit name="galleryPersistenceUnit" transaction-type="RESOURCE_LOCAL">**


    **<provider>org.hibernate.ejb.HibernatePersistence</provider>**


    **<properties>**


    **<property name="hibernate.dialect" value="org.hibernate.dialect.H2Dialect"/>**


    **<!--**


    **value=''create'' 表示每次运行时构建新数据库；** **value=''update'' 表示修改现有数据库；**


    **value=''create-drop'' 表示每次运行时创建并删除表；** **value=''validate'' 表示不对数据库进行任何更改**


    **-->**


    **<property name="hibernate.hbm2ddl.auto" value="create"/>**


    **<property name="hibernate.show_sql" value="true"/>**


    <property name="hibernate.cache.use_second_level_cache" value="true"/>


    <property name="hibernate.cache.provider_class"


    value="net.sf.ehcache.hibernate.SingletonEhCacheProvider"/>


    **<property name="hibernate.ejb.naming_strategy"**


    **value="org.hibernate.cfg.ImprovedNamingStrategy"/>**


    **</properties>**


    **</persistence-unit>**


    ****</persistence>**

