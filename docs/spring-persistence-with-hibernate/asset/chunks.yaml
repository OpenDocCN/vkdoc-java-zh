    在这段代码片段中，我们依赖构造函数注入来提供对 **JpaTransactionManager**（它是 **PlatformTransactionManager**
    接口的一个实现）的引用。使用 **transactionManager**，我们创建了一个 **TransactionTemplate** 实例，并用它来将我们的持久化行为包装在事务范围内。


    **TransactionTemplate** 的使用方式应该让你感到非常熟悉。这是一种常见的 Spring 惯用模式，其工作方式与我们 DAO 类中使用的
