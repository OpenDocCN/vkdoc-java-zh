    \ jMock 框架。`JMock` 允许你定义特定类的行为，以及在该类上特定方法在单元测试上下文中如何被调用以及它们将返回什么的期望。jMock 使用一个简单的\
    \ DSL，允许你指定相当灵活的行为范围。当我们稍后在本章中查看带有模拟的单元测试时，我们将指出一些基本的 jMock 概念。\n\n让我们看一个试图验证我们的\
    \ `ArtworkService` 实现行为的单元测试：\n\n```\npackage com.prospringhibernate.gallery.test;\n\
    \nimport com.prospringhibernate.gallery.domain.Person;\nimport com.prospringhibernate.gallery.exception.AuthenticationException;\n\
