    \ that this class is a DAO.\n\nBecause of our use of generics, the code that remains\
    \ in the `PersonDaoJpa` implementation is nice and short, and relevant only to\
    \ the `Person` domain class. Developers are often intimidated by generics, but\
    \ they can help you avoid doing a lot of rote, repetitive work that adds no value.\n\
    \n## CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE\n\n## The Life Cycle of a JPA Entity\n\
    \nLet’s take a closer look at how JPA actually handles our `Person` entity internally.\
    \ Figure 4-4 highlights the various states that an entity might be in, some of\
    \ the key methods involved, and a handful of useful annotations for intercepting\
    \ calls to modify behavior with cross-cutting aspects.\n\n*Figure 4-4. The life\
    \ cycle of a JPA entity*\n\n## CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE\n\nThere\
    \ are five key states: Does Not Exist, New, Managed, Removed, and Detached. In\
    \ addition, there are seven life-cycle callback annotations. The callback annotations,\
    \ when implemented within your entity class, are referred to as *internal callback\
    \ methods*. Alternatively, they can be defined outside a given entity class as\
    \ a listener class. These are referred to as *external callback methods*. You\
    \ may implement any subset of the callback methods or none at all. You may apply\
    \ only a specific life-cycle callback to a single method. You may use multiple\
    \ callbacks on the same method by applying all of the annotations that apply.\
    \ You can also use both internal callbacks and external callbacks on a single\
