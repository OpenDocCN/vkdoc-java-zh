- fmt: '# SpringSource 的 RAD 框架：Spring Roo


    SpringSource 在提供消除企业软件工程师障碍的软件方面有着日益增长的记录。Spring Roo 是其最新的雄心勃勃的尝试，旨在将快速应用开发（RAD）带给
    Java 开发者。


    在本章中，我们将从头开始重建我们的艺术画廊应用程序，以便您能亲眼看到 Roo 启动项目的速度有多快。这也将为您提供一个绝佳的机会，来对比我们到目前为止手动完成的工作与
    Roo 自动生成的一切。生产力提升将立竿见影。


    ## Roo 是什么（以及它不是什么）


    Roo 的架构主要围绕 Spring 和 AspectJ（Spring 用于在各个 Spring 模块中表达切入点的 AOP 框架）展开。AspectJ 提供了一个称为*类型间声明*（ITD）的特性，Spring
    Roo 将其用作代码生成过程的一部分。ITD 允许将您的源代码（`.java`文件）和 Roo 生成的源代码（`.aj` Aspect ITD 文件）进行清晰分离。


    这两个源文件随后在编译步骤中合并，以生成代表所有预期功能的字节码。


    这种清晰的分离提供了您对 RAD 框架所期望的一切：通过生成的`.aj`源文件实现了约定优于配置，并且您可以编写正常的`.java`类，在认为合适时覆盖约定，而无需扩展或实现任何
    Roo 特定的类或 API。由于这种巧妙的方法，所有 Roo 代码对 Java 开发者来说都会感觉完全自然。


    虽然使用 Roo 不需要 IDE，但像 Eclipse 和 SpringSource Tool Suite（STS）这样的 IDE 可以利用 Java 的静态类型来为代码补全等便利功能提供全面集成。


    由于 Roo 采用的编译方法，该框架在运行时对您完全没有要求！它是一个简单、有效的工具，用于加速开发并赋能开发者高效使用 Java，而无需学习新语言和运行时框架所带来的学习曲线。


    Roo 的核心基础设施提供了文件监控、元数据管理和类型内省等功能。Roo 最大的资产之一是其插件基础设施。Roo 是一个非常年轻的项目，但其插件库已经令人印象深刻。Roo
    1.0.*x* 是作为单个类加载器实现的。然而，从 1.1.0 开始，Roo 完全基于 OSGi。


    OSGi（以前称为开放服务网关倡议，现已过时）是 Java 编程语言的一个模块化系统和服务平台，实现了一个完整且动态的组件模型。这些模块（在 OSGi 术语中称为*bundles*）可以在不重启应用程序的情况下安装、启动、更新和卸载。每个
    bundle 都有自己的类加载器，并且 bundles 可以通过服务注册表相互交互。OSGi 提供的模块化为 Roo 提供了一个可扩展的平台。您与之交互的所有关键组件，例如
    Hibernate 和自动化集成测试，实际上都是作为 OSGi bundles 构建的。这种架构使社区能够继续扩展 Roo。


    乍一看，SpringSource 拥有两个截然不同的 RAD 框架（Grails 和 Roo）可能有点奇怪。但我们相信这两者足够不同，可以共存。在团队有时间学习新事物并愿意使用动态类型语言的全新项目中，我们很难不推荐使用
    Groovy 和 Grails。但如果您在遗留应用程序的上下文中工作，或者只想坚持使用您最熟悉的工具和语言，Roo 是一个绝佳的选择。在本章中，我们希望向您展示原因。


    ## Java、Grails 和 Roo


    Java 在企业中拥有非常强大的立足点，这是有充分理由的。Java 由 James Gosling 创建，并于 1995 年由 Sun Microsystems
    首次发布。十五年后，其生态系统已经非常庞大！


    Java 已被用于编程从手机到厨房电器再到需要亚毫秒级响应时间的极其复杂的全球交易系统等各种设备。它经常作为计算机科学课程的一部分被教授，并且有大量在企业中拥有丰富
    Java 使用经验的工程师。这确保了可以轻松接触到各个经验水平的有才华的工程师。此外，还有许多框架和库可供选择，包括开源和商业的，这样您就不必在每次遇到常见问题时重新发明轮子，这些问题的设计模式和最佳实践已经得到充分研究和理解。开发团队可以通过重用或扩展现有软件来节省大量时间和成本。这样的系统脚手架使您能够专注于编写真正使您的组织与众不同的代码。所有这些原因使得选择
    Java 作为驱动业务的平台非常有吸引力。


    尽管 Java 在企业中前景广阔，但对于个人 Java 程序员来说，并非一切都很美好。随着 Web 开发（尤其是开源软件）在过去十年中的蓬勃发展，我们看到了大量新编程语言和
    Web 框架的涌入（有趣的是，我们也看到旧语言找到了新的利基市场）。如果您花过时间探索其中一些替代技术，Java 的生产力缺陷就会变得显而易见。在 Java
    环境中编程时，有许多技术障碍会拖慢开发者的速度。其中包括编译步骤、需要重启应用服务器才能看到更改效果，以及许多人提到的 Java 的“高仪式性”方面，工程师因此浪费宝贵时间编写和维护过多的样板代码。


    在 Java 社区中，我们已经看到采用较新脚本语言的框架出现，旨在经过实战考验的 JVM 之上提供更快的开发模型。Grails 就是这样一个框架，用 Groovy
    语言编写，在 Graeme Rocher 的领导下声名鹊起，后来被 SpringSource 收购。


    正如您在第十一章中学到的，Grails 通过称为约定优于配置（有时称为按约定编码）的软件设计范式来提高生产力。应用这种范式的框架通常被认为是“非常固执己见的”。它们致力于减少开发者在构建应用程序时必须做出的决策数量，同时仍然提供足够的钩子，让您可以在应用程序偏离约定的地方指定或覆盖行为。例如，在我们的艺术画廊应用程序中，使用约定优于配置的框架会确保`Person`领域类默认映射到名为`person`的相应数据库表。该框架还会提供一种方法来覆盖这种行为，如果我们知道我们的数据库表实际上名为`user`而不是`person`。


    Groovy 作为一种动态类型脚本语言的特性，消除了编译步骤的需要，在许多情况下甚至消除了应用服务器重启的需要。Grails 通过大量使用反射和 Groovy
    的元编程模型在运行时动态生成代码，进一步减轻了开发者的负担，并解决了前面提到的障碍，从而减少了典型 Web 应用程序所需的大量样板代码。


    相反，在 Ben Alex 的指导下，Spring Roo 让工程师能够利用纯 Java，以及他们熟悉和喜爱的所有工具，同时通过广泛的代码生成来加速开发生命周期。


    ## 使用 Roo 创建领域模型'
  raw: 'SpringSource has a growing track record of delivering software that removes
    impediments that plague enterprise software engineers. Spring Roo is its latest
    ambitious attempt to bring rapid application development (RAD) to Java developers.


    In this chapter, we’re going to rebuild our art gallery application from scratch
    so that you can see just how quickly Roo can jump-start a project. This will also
    provide you with an excellent opportunity to compare and contrast what we’ve done
    by hand up to this point with everything that Roo generates automatically. The
    productivity gains will be immediately obvious.


    What Roo Is (and What It Is Not)


    Roo’s architecture revolves primarily around Spring and AspectJ, the AOP framework
    that Spring uses to express pointcuts throughout the various Spring modules. AspectJ
    provides a feature called *inter-type* *declaration* (ITD), which Spring Roo uses
    as a part of its code-generation process. ITD allows for a clean separation of
    your source code (**.java** files) and Roo’s generated source code (**.aj** Aspect
    ITD files).


    These two source files are then combined during a compilation step to fabricate
    bytecode representing all of the intended functionality.


    This clean separation provides exactly what you would expect from a RAD framework:
    convention over configuration is realized via the generated **.aj** source files,
    and you may code your normal **.java** classes, overriding the conventions as
    you deem appropriate, without extending or implementing any Roo-specific classes
    or APIs. As a result of this clever approach, all Roo code will look and feel
    completely natural for Java developers.


    While an IDE isn’t required to use Roo, IDEs like Eclipse and SpringSource Tool
    Suite (STS) can take advantage of Java’s static typing to provide full integration
    for the conveniences like code completion.


    Because of the compilation approach Roo takes, the framework imposes absolutely
    no requirements on your runtime at all! It’s a simple, effective vehicle for speeding
    up development and empowering developers to be productive with Java, without the
    learning curve associated with picking up new languages and runtime frameworks.


    The core infrastructure of Roo delivers capabilities like file monitoring, metadata
    management, and type introspection. One of Roo’s greatest assets is its add-on
    infrastructure. Roo is a very young project, but its library of add-ons is already
    impressive. Roo 1.0. *x* was implemented as a single classloader. As of 1.1.0,
    however, Roo is entirely based on OSGi.


    OSGi (formerly known as the Open Services Gateway initiative, now an obsolete
    name) is a module system and service platform for the Java programming language
    that implements a complete and dynamic component model. These modules, referred
    to as *bundles* in OSGi parlance, can be installed, started, updated, and uninstalled
    without restarting the application. Each bundle has its own 215


    CHAPTER 12 ■ SPRING ROO


    classloader, and bundles may interact with each other through a service registry.
    The modularity provided by OSGi offers an extensible platform for Roo. All of
    the key components that you interact with, such as Hibernate and automated integration
    testing, are actually built as OSGi bundles. This architecture enables the community
    to continue to extend Roo.


    At first blush, it might seem a bit strange that SpringSource has two distinct
    RAD frameworks in its stable: Grails (covered in the previous chapter) and Roo.
    But we believe that the two are sufficiently different to coexist. On green field
    projects where a team is afforded the luxury of time to learn something new and
    open to using dynamically typed languages, we would be hard-pressed not to recommend
    using Groovy and Grails. But if you’re working in the context of a legacy application,
    or just want to stick with the tools and language you know best, Roo is a fantastic
    alternative. In this chapter, we hope to show you why.


    **JAVA, GRAILS, AND ROO**


    Java enjoys a very strong foothold in the enterprise, and for good reason. Java
    was created by James Gosling and first released by Sun Microsystems in 1995\.
    Fifteen years later, its ecosystem is enormous!


    Java has been used to program everything from cell phones to kitchen appliances
    to incredibly complex global trading systems that require submillisecond response
    times. It’s frequently taught as a part of computer science curriculums, and there
    are legions of engineers with extensive experience using Java in the enterprise.
    This ensures easy access to talented engineers at all experience levels. Additionally,
    there are many frameworks and libraries to choose from, both open source and commercial,
    so that you don’t need to reinvent the flat tire every time you are presented
    with commonly faced problems for which design patterns and best practices are
    well studied and understood. Development teams can reap prodigious time and cost
    savings by reusing or extending existing software. Such system scaffolding enables
    you to focus on writing code that truly differentiates your organization. All
    of these reasons make selecting Java as the platform that powers a business very
    attractive.


    Despite Java’s promise in the enterprise, all is not rosy for the individual Java
    programmer. As web development in general, and open source software in particular,
    has blossomed over the past decade, we’ve seen a tremendous influx of new programming
    languages and web frameworks (and interestingly enough, we’re seeing old languages
    finding new niches as well). If you’ve spent any time exploring some of these
    alternate technologies, Java’s productivity shortcomings become readily apparent.
    There are many technical hurdles when programming in a Java environment that can
    slow down a developer. Among them are compilation steps, a need to restart your
    application server to see the effect of changes, and what many cite as the “high
    ceremony” aspect of Java, whereby engineers lose precious time writing and maintaining
    an inordinate amount of boilerplate code.


    Within the Java community, we’ve seen frameworks that employ newer scripting languages
    emerge, aiming to deliver faster development models on top of the battle-tested
    JVM. Grails is one such framework, written in the Groovy language, which rose
    to prominence under the stewardship of Graeme Rocher and was later acquired by
    SpringSource.


    As you learned in Chapter 11, Grails delivers increased productivity through the
    software design paradigm known as convention over configuration (sometimes referred
    to as coding by convention). Frameworks that apply this paradigm are often said
    to be “very opinionated.” They strive to reduce the number of decisions that a
    developer must make in building an application, while still providing ample hooks
    for you to specify 216


    CHAPTER 12 ■ SPRING ROO


    or override behavior where your application deviates from convention. For example,
    in our art gallery application, a framework using convention over configuration
    would ensure that the **Person** domain class maps to a corresponding database
    table named **person** by default. The framework would also provide a means to
    override such behavior if we knew that our database table was actually named **user**
    rather than **person**.


    The very nature of Groovy as a dynamically typed scripting language obviates the
    need for compilation steps and, in many cases, even application server restarts.
    Grails further lessens the burden on developers and addresses the hurdles mentioned
    earlier through heavy use of reflection and Groovy’s metaprogramming model in
    order to dynamically generate code at runtime, thereby alleviating much of the
    boilerplate code required for typical web applications.


    Conversely, under the direction of Ben Alex, Spring Roo lets engineers leverage
    pure Java, complete with all the tooling they know and love, while speeding up
    the development life cycle through extensive code generation.


    Creating a Domain Model with Roo'
