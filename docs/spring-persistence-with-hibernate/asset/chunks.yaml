    处理二进制数据


    我们的**CategoryDao**相当简单，因为它只需要操作简单的**String**字段。然而，由于我们正在构建一个图库应用程序，我们需要处理大型数据类型，以便管理用于表示图像的数据。我们可以选择将图像数据存储在文件系统上，只存储图像存储位置的路径引用。但我们发现，将所有内容持久化到数据库中通常更灵活，这可以确保应用程序数据完全集中。这也有助于减少对文件系统的耦合，并使备份和迁移数据更加容易。


    在数据库领域，大型对象（LOB）用于表示大型二进制字段。通常，LOB 或 BLOB 表示二进制数据，而 CLOB 用于表示非常大的（通常超过 4000 个字符）字符数据。在
    Spring 中处理这些字段类型的过程是类似的。


    首先，我们需要创建一个**DefaultLobHandler**引用，用于我们的插入和查询中。这个 Spring 抽象旨在简化 LOB 字段的操作。我们可以通过将以下代码片段添加到
    Spring 配置中来创建**DefaultLobHandler**：


    **<bean id="defaultLobHandler"**


    **class="org.springframework.jdbc.support.lob.DefaultLobHandler" />** 接下来，我们需要将**defaultLobHandler**引用注入到我们的
    DAO 层。我们的**CategoryDao**实现不需要 LOB 支持，而且我们还没有定义**ArtEntityDao**。为了节省篇幅，我们在此不深入讨论**ArtEntityDao**的细节。只需记住，该接口将处理**ArtEntity**领域对象（代表图库应用程序中的特定图像）的持久化操作。此外，请记住，领域模型中的
    LOB 字段应使用@Lob 注解，以指示该属性应映射到数据库的 LOB 类型。


    让我们开始搭建**HibernateArtEntityDao**实现的框架：**public class HibernateArtEntityDao implements
    ArtEntityDao {**


    **private HibernateTemplate template;**


    **private LobHandler defaultLobHandler;**


    **// getters and setters omitted**


    **}**

