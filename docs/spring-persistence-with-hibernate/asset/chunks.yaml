    Spring 和 Hibernate 结合使用。我们的目标是，将我们在开发实践中验证有效的经验、教训和最佳实践传递给你，使你能够将这些技能和工具应用到自己的应用中。


    在本书中，我们将介绍 Hibernate 的核心基础知识，演示如何在 Spring 环境中最佳地利用该框架。我们将从基础概念入手，例如开发有效领域模型和 DAO
    层的策略，然后深入探讨使用 HQL、JPQL 和 Criteria API 的查询技术。在介绍完基础概念后，我们将转向更高级的主题，例如抓取和缓存策略。我们还将阐述几种构建事务性服务外观（Service
    Facade）的架构方法。我们将同时审视编程式和声明式事务，展示使用 Spring 来表达事务语义的优势。


    *《Spring Persistence with Hibernate》* 还将介绍 JPA，涵盖其历史以及 Hibernate 对其发展的影响。我们将讨论遵循
    JPA 标准的好处，以及何时使用 Hibernate 特有功能是合理的。本书还将介绍 Grails 和 GORM，阐述 DAO 与 Active Record
    模式之间的差异。我们将把示例应用（将在本书开发过程中构建）移植到 Grails 和 Spring Roo 中，突出使用快速开发、约定优于配置平台的优势和差异。在这些章节中，我们将探讨与并发/乐观锁、Hibernate
    Session 状态、缓存方法和事务管理相关的主题。


    本书的最后部分将介绍几种高级技术，这些技术对于处理企业级 Spring/Hibernate 应用至关重要。我们将阐述集成遗留数据库时的一些陷阱，以及开发 REST
    Web 服务、处理 Hibernate 代理和延迟集合、以及使用 Hibernate-Search 构建搜索功能的最佳实践。


