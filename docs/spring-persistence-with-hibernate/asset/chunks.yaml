    表上添加一个指向 **ArtEntity** 表的外键字段。这也展示了使用 Hibernate 来架构领域模型和数据库模式的一些优势。如果使用 Hibernate
    来生成数据库模式，它还会为你的关联创建外键约束，以确保数据库的参照完整性不受损害。


    约定优于配置


    Hibernate 注解支持的简洁性源于使用合理的默认值，以及 Hibernate 能够通过考虑每个 JavaBean 属性的 Java 类型来推断关联和数据库字段类型。当使用
    XML 定义映射时，我们必须显式地描述每个属性和关联的细节。而使用 Hibernate，由于注解嵌入在代码中，我们可以从代码本身获得提示，这极大地简化了配置工作。


    正如你在第 4 章中学到的，Hibernate 持久化的关键注解是 **@Entity**。这个注解告诉 Hibernate 我们打算持久化这个类。如果我们遵循
    XML 映射方法，那么就需要在 **hbm.xml** 映射文件中显式定义每个字段。而使用 Hibernate 注解，只需要定义那些不符合 Hibernate
    默认行为的部分。


    Hibernate 会查看每个属性的 Java 类型和名称，并分别使用这些元数据来定义列的字段类型和字段名称。默认行为是假定所有 POJO 属性都是可持久化的，但你也可以使用
    **@Basic** 注解显式指定此行为。使用 **@Basic** 还提供了一种自定义各种持久化相关方面的方法，例如某个特定属性是否应该被延迟加载。如果你不希望某些字段被持久化，则需要使用
    **@Transient** 注解将这些属性指定为瞬态。


    ■ **注意** Hibernate 提供了对获取关联的控制，允许相关实体被延迟加载——也就是说，仅在需要时才加载，而不是在从数据库加载原始对象时立即加载。如果使用得当，这能带来显著的性能提升，但如果使用不当，也可能降低性能。我们将在第
    9 章更详细地介绍延迟加载。


    第 5 章 ■ 领域模型基础


    除了 **@Transient** 和 **@Basic** 注解之外，你还可以使用 **@Temporal** 注解来控制基于日期或时间的属性如何映射到数据库。在我们的
    **Comment** 类中，我们指定了以下内容来声明一个 **Date** 属性在数据库中作为时间戳持久化：


    **@Temporal(TemporalType.TIMESTAMP)**


    **public Date getCreatedDate() {**


    **return this.createdDate;**


