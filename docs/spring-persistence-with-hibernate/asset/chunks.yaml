    \ let’s say we want to add a new method called `sayHello()` to our `Person` instance\
    \ at runtime. This could be accomplished as follows:\n\n```groovy\nPerson.metaClass.sayHello\
    \ = {\n    println(\"Hello\")\n}\n```\n\nOr we can make this a static method that\
    \ takes a single parameter:\n\n```groovy\nPerson.metaClass.static.sayHello = {def\
    \ name ->\n    println(\"hello ${name}\")\n}\n```\n\nIn Groovy, every class holds\
    \ a reference to a corresponding `metaClass` instance. Method calls to a particular\
    \ class or instance are delegated to that class’s `metaClass`, which then calls\
    \ a method named `invokeMethod`, passing along the name of the method to invoke\
    \ and any corresponding parameters. So you can think of `metaClass` as an intermediary,\
    \ or proxy of sorts, allowing more of a class’s behavior to be determined at runtime.\n\
    \nBy defining a new property on a particular class’s `metaClass`, we are effectively\
