    我们尚未定义 **CommentDTO** 类，但与 **ArtEntityDTO** 类似，该类将作为 **Comment** 实体的简化表示。


    我们为 **ArtEntityDTO** 添加的另一个细节是 **@XmlRootElement(name = "artEntity")** 注解。DTO
    类的一个用例是简化向 XML 或 JSON 的编组过程。


    **@XMLRootElement** 是 Java 架构用于 XML 绑定（JAXB）的注解——这是对象到 XML 编组的一项标准。本章稍后，我们将利用
    JAXB 来渲染领域类的 XML 表示，作为 REST Web 服务的一部分。


    尽管 **ArtEntity** 领域类与 **ArtEntityDTO** 之间的差异并不显著，但这些细微差别足以需要相当复杂的映射策略。例如，考虑将 **Comment**
    实例集合映射到 **CommentDTO** 实例集合所需的工作。幸运的是，Dozer 能够处理这些类之间的映射和转换任务，而无需大量工作。


    接下来，让我们看看 **CommentDTO** 类：


    **@XmlRootElement(name = "comment")**


    **public class CommentDTO {**


    ****private Long id;**


    **private String comment;**


