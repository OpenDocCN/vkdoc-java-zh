    此外，Lucene 能够追踪特定词元的频率、它与其他词元的相对位置，以及它在原始内容中的偏移量。这些元数据对于众多搜索功能来说极具价值。


    第 10 章 ■ 集成框架


    Lucene 提供了一系列选项，用于自定义特定字段的索引方式。例如，某些字段可能更适合进行分词处理，而另一些字段则应保留其原始内容。在音乐库示例中，你可能希望对
    **notes** 字段进行分词，因为你希望能够搜索笔记中包含的特定单词或短语。


    然而，你不会希望对曲目的文件名进行分词，因为该数据只有作为一个完整、未经修改的单元才有意义。


    Lucene 还允许你指定是否存储特定字段的原始内容。例如，虽然你可能不想对曲目的文件名进行分词，但你肯定希望存储这些数据。这样，当某个特定文档作为搜索结果列表的一部分返回时，你可以直接访问文件名，以便应用程序能够处理这些数据（例如，播放曲目或在文件系统中定位它）。


    使用 Lucene 进行查询


    Lucene 包含一个强大的查询 API，提供了一种灵活的方式来指定要搜索的字段和词条，并能够定义布尔表达式和分组表达式。


    最简单的 Lucene 查询可能如下所示：


    **cupcake**


    这将在默认字段上搜索词条 *cupcake*。默认字段通常在 **QueryParser** 中指定，**QueryParser** 是一个 Lucene
    类，用于将用户定义的查询表达式解析为 **Query** 实例。


    更常见的情况是，Lucene 查询会针对一个或多个字段，例如以下示例：**notes:cupcake AND album:Pepper**


    这将返回所有在 **notes** 字段中包含单词 *cupcake* 且在 **album** 字段中包含单词 *Pepper* 的文档。也可以将查询定义为如下形式：


    **+notes:cupcake +album:Pepper**


    如你所见，你可以使用 `+` 前缀或 **AND** 关键字来定义布尔 **AND** 表达式。在 Lucene 中，布尔 **OR** 是默认操作，因此你可以简单地将多个表达式放在一起：**notes:cupcake
    album:Pepper**


    或者，你也可以显式地包含 **OR** 关键字：


    **notes:cupcake OR album:Pepper**


    如果你想确保搜索结果不包含某个特定词条，可以在其前面加上减号（**-**）字符。例如，如果你想确保搜索结果中不包含任何由披头士乐队演奏的曲目，可以使用以下查询：


    **notes:cupcake AND album:Pepper –artist:”The Beatles”**


    此查询将查找包含单词 *cupcake* 的笔记和包含单词 *Pepper* 的专辑，但曲目艺术家不能是 The Beatles。注意“The Beatles”两边的引号，它表示
    **artist** 字段必须匹配整个短语。因此，如果艺术家名称仅指定为 Beatles，你的搜索结果中仍可能出现披头士的曲目。为了防止这种情况，你可以直接使用
    **Beatles**，不带引号。


    但是，如果你希望确保库中曲目上拼写错误的艺术家归属不会影响你的搜索意图，该怎么办？为了解决这个问题，你可以使用波浪号（**~**）字符，它让 Lucene
    知道你想要允许模糊匹配：


    **(track:”Fixing a Hole” OR track:”Hey Jude”) AND artist:Beatles~**


    此查询表达了你在 **artist** 字段上进行模糊搜索的意图。现在，即使库中的艺术家归属拼写为“Beetles”，它也很可能包含在你的搜索结果中。还要注意使用括号对查询的第一部分进行分组。这种分组指定了查询应返回匹配任一标题的曲目，前提是它们都由艺术家
    Beatles 创作。


    如果你想确保结果只包含在特定日期范围内发布的曲目，可以利用 Lucene 的日期范围查询功能：


    **artist:Rol* AND releaseDate:[5/18/1975 TO 5/18/2010]**


    此查询将查找任何发布日期在 1975 年 5 月 18 日到 2010 年 5 月 18 日之间的曲目，只要艺术家名称以 *Rol* 开头。通配符修饰符（*****）表示你想要匹配具有指定前缀的艺术家。


    前面的查询示例应该让你对 Lucene 查询表达式的一些可能性有所了解。你很快就会学到如何将这些表达式解析为 Lucene **Query**。当然，也可以以编程方式定义查询，这样做通常能提供更大的灵活性。然而，使用这些示例中展示的一些约定来定义表达式，可以使你的设计更加清晰。


    Hibernate Search 简介


    Hibernate Search 是一个扩展 Hibernate 的框架，旨在提供与 Apache Lucene 的无缝集成。开发者可以直接将 Lucene
    集成到他们的应用程序中。


    然而，如果你的目标是为领域类中的数据建立索引，那么要使这种集成可靠地工作，使得对领域模型所做的更改自动反映在索引中，并非易事。此外，在 Hibernate
    操作的上下文中更新 Lucene 索引也很重要。


    例如，假设一个领域类作为 DAO 方法的一部分被更新，并且在此方法中，调用了 Lucene 来触发对 Lucene 索引的更新。虽然这种设置可能有效，但如果领域类更新是在事务上下文中进行的，而事务突然回滚了，会发生什么？很可能，数据库和
    Lucene 索引会失去同步。


    Hibernate Search 试图解决这类问题，它提供了一种实现，将 Lucene 集成到 Hibernate 的生命周期中，并尊重事务边界，以确保各自的资源保持同步。


