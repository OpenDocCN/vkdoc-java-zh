- fmt: "# 排版后的内容\n\nAs we discussed in Chapter 4, a domain object's persistent state\
    \ is managed through Hibernate's implementation of the `EntityManager` interface.\
    \ If a new domain object is instantiated, it is considered transient until it\
    \ becomes associated with the `EntityManager`. Similarly, an already persistent\
    \ domain object can continue to be persistent if the `EntityManager` is closed,\
    \ which transitions the entity to a Detached state. However changes to this domain\
    \ object will not be \"recorded\" until the domain object transitions back to\
    \ a Managed state by being reassociated with another `EntityManager`.\n\nA domain\
    \ object that has become disassociated from an `EntityManager` is called a *detached\
    \ object*.\n\nHibernate is able to detect changes made to a detached domain object\
    \ and propagate these changes to the database once the instance is reassociated.\
    \ However, there are some things that are difficult to work around when an `EntityManager`\
    \ is closed, and lazy properties are one of those things.\n\nAs you learned in\
    \ the previous section, Hibernate implements laziness by referencing uninitialized\
    \ properties with proxies—either special persistent collection implementations\
    \ or proxy classes, depending on the type of association or property. These proxies\
    \ are able to defer the loading of an association until an attempt is made to\
    \ access them. Once that happens, the proxies will access the `EntityManager`\
    \ and attempt to load the necessary data from the database. Obviously, this can't\
    \ happen if the `EntityManager` is closed, so a `LazyInitializationException`\
    \ is thrown.\n\nThe most common cause of a `LazyInitializationException` stems\
    \ from failing to initialize a collection or lazy property in a DAO or controller\
    \ method, instead leaving a JSP or other view-related technology to discover an\
    \ uninitialized property. The problem is that Hibernate will close the `EntityManager`\
    \ by default whenever a persistent operation completes. In the case of a DAO or\
    \ service method, the `EntityManager` is normally closed when these relevant methods\
    \ return.\n\nThe best way to prevent the `LazyInitializationException` is to ensure\
    \ that all lazy associations and properties that are required by the view are\
    \ successfully initialized before the domain objects are passed to the view layer.\
    \ Fortunately, Spring provides some solutions that help to prevent the occurrence\
    \ of `LazyInitializationExceptions`, even when lazy properties are not properly\
    \ initialized before passing domain objects to the view. There are a couple of\
    \ variations on the solution, but they both employ the same general strategy:\
    \ defer the closing of the `EntityManager` until after the view has finished rendering.\n\
    \n## Chapter 9: Best Practices and Advanced Techniques\n\n### Now Open Late: Keeping\
    \ EntityManager Open Past Its Bedtime\n\nDeferring the `EntityManager` from being\
    \ closed is now typically known as the Open EntityManager In View pattern. The\
    \ simplest approach for applying this strategy is to use a servlet filter, as\
    \ described in the next section. However, if you are using Spring MVC, an alternative\
    \ is to use an interceptor.\n\nThe interceptor technique essentially opens an\
    \ `EntityManager` at the beginning of a servlet request and binds the `EntityManager`\
    \ to the current thread, allowing it to be accessed by Spring's Hibernate support\
    \ classes. Then, at the end of the request, the `EntityManager` is closed and\
    \ unbound from the thread. This is a bit of an oversimplification, and the implementation\
    \ details differ slightly, depending on whether you are using the servlet filter\
    \ or the controller interceptor. However, the basic concepts are the same: open\
    \ an `EntityManager` and associate it with the active thread to be used by persistence-related\
    \ methods, and then ensure the `EntityManager` is kept open until the request\
    \ completes. Because the request doesn't complete until after the view rendering\
    \ has finished processing, the potential for the `LazyInitializationException`\
    \ is significantly reduced.\n\nUsing the Open EntityManager In View pattern is\
    \ relatively simple. If you are already using Spring MVC, you can define the `OpenEntityManagerInViewInterceptor`\
    \ class as a new bean, adding it to your Spring MVC configuration, like so:\n\n\
    ```xml\n<bean name=\"openEntityManagerInViewInterceptor\"\n      class=\"org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor\"\
    \ />\n```\n\nWith your `OpenEntityManagerInViewInterceptor` defined, you then\
    \ need to add this interceptor to your list of MVC interceptors. The interceptors\
    \ defined in this list will be invoked (in order) as part of the request-processing\
    \ flow of each MVC controller. Spring MVC controllers provide hooks into the life\
    \ cycle of an MVC controller, such as `preHandle`, `postHandle`, and `afterCompletion`.\
    \ Spring 3 provides an easy way to globally define interceptors. Let's take a\
    \ look at an MVC configuration file.\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\" standalone=\"no\"?>\n<beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \                        http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\n\
    \                        http://www.springframework.org/schema/context\n     \
    \                   http://www.springframework.org/schema/context/spring-context-3.0.xsd\n\
    \                        http://www.springframework.org/schema/mvc\n         \
    \               http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd\"\
    >\n\n    <context:component-scan base-package=\"com.prospringhibernate.gallery\"\
    \n                            use-default-filters=\"false\">\n        <context:include-filter\
    \ type=\"annotation\"\n                                expression=\"org.springframework.stereotype.Controller\"\
    \ />\n    </context:component-scan>\n\n    <!-- integrates MVC Controllers via\
    \ @Controller -->\n    <mvc:annotation-driven />\n\n    <!-- specifies those interceptors\
    \ that will be applied to all handlerMappings -->\n    <mvc:interceptors>\n  \
    \      <bean class=\"org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor\"\
    \ />\n    </mvc:interceptors>\n\n    ...\n</beans>\n```\n\nIn this example, we\
    \ use the `mvc:annotation-driven` and `component-scan` features to allow us to\
    \ enable those Spring life-cycle features and to define our controllers via annotation\
    \ (meaning we can add `@Controller` to the class and Spring will integrate these\
    \ classes as controllers, provided they are in the appropriate package path).\
    \ Also notice that we added our `OpenEntityManagerInViewInterceptor` inline within\
    \ the `mvc:interceptors` block. Any interceptor beans defined here will have the\
    \ appropriate methods invoked within the various stages of the request life cycle.\n\
    \n### Applying the Open EntityManager Filter\n\nIf you aren't using Spring MVC,\
    \ or just don't want to use an interceptor approach, you can instead add the `OpenEntityManagerInViewFilter`\
    \ to your `web.xml` file. The approach is roughly the same as the interceptor\
    \ technique, except the hooks for opening and closing the `EntityManager` occur\
    \ at the servlet-request level rather than at the controller level.\n\nHere is\
    \ how you might add the `OpenEntityManagerInViewFilter` to your application's\
    \ `web.xml` file:"
  raw: 'As we discussed in Chapter 4, a domain object’s persistent state is managed
    through Hibernate’s implementation of the **EntityManager** interface. If a new
    domain object is instantiated, it is considered transient until it becomes associated
    with the **EntityManager**. Similarly, an already persistent domain object can
    continue to be persistent if the **EntityManager** is closed, which transitions
    the entity to a Detached state. However changes to this domain object will not
    be “recorded” until the domain object transitions back to a Managed state by being
    reassociated with another **EntityManager**.


    A domain object that has become disassociated from an **EntityManager** is called
    a *detached object*.


    Hibernate is able to detect changes made to a detached domain object and propagate
    these changes to the database once the instance is reassociated. However, there
    are some things that are difficult to work around when an **EntityManager** is
    closed, and lazy properties are one of those things.


    As you learned in the previous section, Hibernate implements laziness by referencing
    uninitialized properties with proxies—either special persistent collection implementations
    or proxy classes, depending on the type of association or property. These proxies
    are able to defer the loading of an association until an attempt is made to access
    them. Once that happens, the proxies will access the **EntityManager** and attempt
    to load the necessary data from the database. Obviously, this can’t happen if
    the **EntityManager** is closed, so a **LazyInitializationException** is thrown.


    The most common cause of a **LazyInitializationException** stems from failing
    to initialize a collection or lazy property in a DAO or controller method, instead
    leaving a JSP or other view-related technology to discover an uninitialized property.
    The problem is that Hibernate will close the **EntityManager** by default whenever
    a persistent operation completes. In the case of a DAO or service method, the
    **EntityManager** is normally closed when these relevant methods return.


    The best way to prevent the **LazyInitializationException** is to ensure that
    all lazy associations and properties that are required by the view are successfully
    initialized before the domain objects are passed to the view layer. Fortunately,
    Spring provides some solutions that help to prevent the occurrence of **LazyInitializationExceptions**,
    even when lazy properties are not properly initialized before passing domain objects
    to the view. There are a couple of variations on the solution, but they both employ
    the same general strategy: defer the closing of the **EntityManager** until after
    the view has finished rendering.


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    Now Open Late: Keeping EntityManager Open Past Its Bedtime


    Deferring the **EntityManager** from being closed is now typically known as the
    Open EntityManager In View pattern. The simplest approach for applying this strategy
    is to use a servlet filter, as described in the next section. However, if you
    are using Spring MVC, an alternative is to use an interceptor.


    The interceptor technique essentially opens an **EntityManager** at the beginning
    of a servlet request and binds the **EntityManager** to the current thread, allowing
    it to be accessed by Spring’s Hibernate support classes. Then, at the end of the
    request, the **EntityManager** is closed and unbound from the thread. This is
    a bit of an oversimplification, and the implementation details differ slightly,
    depending on whether you are using the servlet filter or the controller interceptor.
    However, the basic concepts are the same: open an **EntityManager** and associate
    it with the active thread to be used by persistence-related methods, and then
    ensure the **EntityManager** is kept open until the request completes. Because
    the request doesn’t complete until after the view rendering has finished processing,
    the potential for the **LazyInitializationException** is significantly reduced.


    Using the Open EntityManager In View pattern is relatively simple. If you are
    already using Spring MVC, you can define the **OpenEntityManagerInViewInterceptor**
    class as a new bean, adding it to your Spring MVC configuration, like so:


    **<bean name="openEntityManagerInViewInterceptor"**


    **class="org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor"**


    **/>**


    With your **OpenEntityManagerInViewInterceptor** defined, you then need to add
    this interceptor to your list of MVC interceptors. The interceptors defined in
    this list will be invoked (in order) as part of the request-processing flow of
    each MVC controller. Spring MVC controllers provide hooks into the life cycle
    of an MVC controller, such as **preHandle**, **postHandle**, and **afterCompletion**.
    Spring 3 provides an easy way to globally define interceptors. Let’s take a look
    at an MVC configuration file.


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<beans**


    **********xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**
    **http://www.springframework.org/schema/context**


    **http://www.springframework.org/schema/context/spring-context-3.0.xsd** **http://www.springframework.org/schema/mvc**


    **http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd">**


    ****<context:component-scan base-package="com.prospringhibernate.gallery"**


    **use-defaultfilters="false">**


    **<context:include-filter type="annotation"/>** **expression="org.springframework.stereotype.Controller"**


    **</context:component-scan>**


    ****<!—- integrates MVC Controllers via @Controller -->**


    **<mvc:annotation-driven/>**


    ****<!—specifies those interceptors that will be applied to all handlerMappings
    -->** 142


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    **<mvc:interceptors>**


    **<bean**


    **class="org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor"/>**


    **</mvc:interceptors>**


    ****. . .**


    ****</beans>**


    In this example, we use the **mvc:annotation-driven** and **component-scan** features
    to allow us to enable those Spring life-cycle features and to define our controllers
    via annotation (meaning we can add


    **@Controller** to the class and Spring will integrate these classes as controllers,
    provided they are in the appropriate package path). Also notice that we added
    our **OpenEntityManagerInViewInterceptor** inline within the **mvc:interceptors**
    block. Any interceptor beans defined here will have the appropriate methods invoked
    within the various stages of the request life cycle.


    Applying the Open EntityManager Filter


    If you aren’t using Spring MVC, or just don’t want to use an interceptor approach,
    you can instead add the **OpenEntityManagerInViewFilter** to your **web.xml**
    file. The approach is roughly the same as the interceptor technique, except the
    hooks for opening and closing the **EntityManager** occur at the servlet-request
    level rather than at the controller level.


    Here is how you might add the **OpenEntityManagerInViewFilter** to your application’s
    **web.xml** file:'
  trans: '

    正如我们在第 4 章中讨论的，领域对象的持久化状态是通过 Hibernate 对 **EntityManager** 接口的实现来管理的。如果实例化了一个新的领域对象，它会被视为瞬态对象，直到它与
    **EntityManager** 关联。同样，一个已经持久化的领域对象在 **EntityManager** 关闭后可以继续保持持久化状态，此时实体将转换为分离状态。然而，对该领域对象的更改不会被“记录”，直到该领域对象通过重新与另一个
    **EntityManager** 关联而转换回托管状态。


    与 **EntityManager** 解除关联的领域对象被称为*分离对象*。


    Hibernate 能够检测到对分离领域对象所做的更改，并在实例重新关联后将这些更改传播到数据库。然而，当 **EntityManager** 关闭时，有些问题难以处理，惰性属性就是其中之一。


    正如你在上一节所学到的，Hibernate 通过使用代理来引用未初始化的属性来实现惰性加载——这些代理要么是特殊的持久化集合实现，要么是代理类，具体取决于关联或属性的类型。这些代理能够推迟关联的加载，直到尝试访问它们时才会加载。一旦发生访问，代理将访问
    **EntityManager** 并尝试从数据库加载必要的数据。显然，如果 **EntityManager** 已关闭，这无法发生，因此会抛出 **LazyInitializationException**。


    **LazyInitializationException** 最常见的原因是在 DAO 或控制器方法中未能初始化集合或惰性属性，而是让 JSP 或其他视图相关技术去发现未初始化的属性。问题在于，每当持久化操作完成时，Hibernate
    默认会关闭 **EntityManager**。在 DAO 或服务方法的情况下，当这些相关方法返回时，**EntityManager** 通常会关闭。


    防止 **LazyInitializationException** 的最佳方法是确保视图所需的所有惰性关联和属性在领域对象传递到视图层之前已成功初始化。幸运的是，Spring
    提供了一些解决方案，即使在将领域对象传递给视图之前惰性属性未正确初始化，也有助于防止 **LazyInitializationException** 的发生。解决方案有几种变体，但它们都采用相同的总体策略：将
    **EntityManager** 的关闭推迟到视图渲染完成之后。


    第 9 章 ■ 最佳实践与高级技术


    现在延迟关闭：让 EntityManager 在“就寝时间”后保持打开


    推迟关闭 **EntityManager** 现在通常被称为“视图中打开 EntityManager”模式。应用此策略的最简单方法是使用 Servlet 过滤器，如下一节所述。然而，如果你正在使用
    Spring MVC，另一种选择是使用拦截器。


    拦截器技术本质上是在 Servlet 请求开始时打开一个 **EntityManager**，并将该 **EntityManager** 绑定到当前线程，使其能够被
    Spring 的 Hibernate 支持类访问。然后，在请求结束时，**EntityManager** 被关闭并从线程中解绑。这有点过于简化，具体实现细节略有不同，取决于你使用的是
    Servlet 过滤器还是控制器拦截器。然而，基本概念是相同的：打开一个 **EntityManager** 并将其与活动线程关联，供持久化相关方法使用，然后确保
    **EntityManager** 保持打开状态，直到请求完成。由于请求在视图渲染处理完成之前不会结束，因此 **LazyInitializationException**
    的可能性显著降低。


    使用“视图中打开 EntityManager”模式相对简单。如果你已经在使用 Spring MVC，你可以将 **OpenEntityManagerInViewInterceptor**
    类定义为一个新的 Bean，并将其添加到你的 Spring MVC 配置中，如下所示：


    **<bean name="openEntityManagerInViewInterceptor"**


    **class="org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor"**


    **/>**


    定义好 **OpenEntityManagerInViewInterceptor** 后，你需要将此拦截器添加到你的 MVC 拦截器列表中。此列表中定义的拦截器将（按顺序）作为每个
    MVC 控制器请求处理流程的一部分被调用。Spring MVC 控制器提供了进入 MVC 控制器生命周期的钩子，例如 **preHandle**、**postHandle**
    和 **afterCompletion**。Spring 3 提供了一种简单的方法来全局定义拦截器。让我们来看一个 MVC 配置文件。


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<beans**


    **********xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**
    **http://www.springframework.org/schema/context**


    **http://www.springframework.org/schema/context/spring-context-3.0.xsd** **http://www.springframework.org/schema/mvc**


    **http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd">**


    ****<context:component-scan base-package="com.prospringhibernate.gallery"**


    **use-defaultfilters="false">**


    **<context:include-filter type="annotation"/>** **expression="org.springframework.stereotype.Controller"**


    **</context:component-scan>**


    ****<!—- 通过 @Controller 集成 MVC 控制器 -->**


    **<mvc:annotation-driven/>**


    ****<!—指定将应用于所有 handlerMappings 的拦截器 -->** 142


    第 9 章 ■ 最佳实践与高级技术


    **<mvc:interceptors>**


    **<bean**


    **class="org.springframework.orm.jpa.support.OpenEntityManagerInViewInterceptor"/>**


    **</mvc:interceptors>**


    ****. . .**


    ****</beans>**


    在这个例子中，我们使用 **mvc:annotation-driven** 和 **component-scan** 特性来启用 Spring 的生命周期特性，并通过注解定义我们的控制器（这意味着我们可以将
    **@Controller** 添加到类中，只要它们在适当的包路径下，Spring 就会将这些类集成为控制器）。还要注意，我们在 **mvc:interceptors**
    块内内联添加了 **OpenEntityManagerInViewInterceptor**。这里定义的任何拦截器 Bean 都将在请求生命周期的各个阶段调用相应的方法。


    应用 Open EntityManager 过滤器


    如果你没有使用 Spring MVC，或者只是不想使用拦截器方法，你可以改为将 **OpenEntityManagerInViewFilter** 添加到你的
    **web.xml** 文件中。该方法与拦截器技术大致相同，不同之处在于打开和关闭 **EntityManager** 的钩子发生在 Servlet 请求级别，而不是控制器级别。


    以下是如何将 **OpenEntityManagerInViewFilter** 添加到应用程序的 **web.xml** 文件中的方法：

