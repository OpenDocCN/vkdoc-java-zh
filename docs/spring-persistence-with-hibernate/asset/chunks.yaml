  trans: '

    如果没有依赖注入，组件访问所需服务的细节可能会与组件代码混杂在一起。这不仅增加了出错的可能性、导致代码臃肿，还加剧了维护的复杂性；同时，它会使组件之间的耦合更加紧密，导致在重构或测试时难以修改依赖关系。


    Spring 本质上有助于强制实施最佳编码实践，并减少对外部框架甚至应用程序内部类的依赖。在最简单的层面上，Spring 是一个轻量级的 IoC 容器，这意味着它将承担起连接应用程序依赖关系的责任。


    这种连接责任究竟如何处理，将在本书中深入探讨。


    然而，你将在本书中反复看到的一个主题是，Spring 如何以松散耦合的方式轻松地将组件连接在一起。这对任何应用程序都有深远的影响，因为它使代码更容易重构和维护。在本书的背景下，它允许开发者构建一个不直接绑定到特定实现或框架的持久层。


    Spring 的成功很大程度上归功于它提供的海量集成点，涵盖了广泛的框架和技术。当开发者意识到使用 Spring 来集成自己代码中的各种组件所带来的好处时，许多新的抽象层应运而生，它们依赖
    Spring 来集成流行的开源框架。使用 Spring 集成特定框架不仅简化了该框架的引入，还允许以一致的方式执行集成——这与在应用程序上下文中连接协作组件的方式并无二致。此外，使用
    Spring 的依赖注入来连接关键框架，确保了集成是以解耦的方式完成的。


    Spring 被广泛采用的主要催化剂之一是其对开源对象关系映射（ORM）框架 Hibernate 的支持。随着 Spring 框架开始流行，Java 开发社区也对
    Hibernate 议论纷纷。那是开源框架的关键时期，因为 Spring 和 Hibernate 都提供了革命性的解决方案，这些方案将改变许多新应用程序的架构和实现方式。正如你将看到的，Spring
    和 Hibernate 在许多方面相辅相成，并且彼此都对对方的成功和广泛采用负有部分责任。


    **协同伙伴关系**


    在本书中，我们将重点展示如何最有效地结合使用 Spring 和 Hibernate。


    尽管如此，我们仍将强调将 Hibernate 与应用程序解耦的策略。这并非因为我们担心使用 Hibernate，而是因为松散耦合提供了更清晰的关注点分离。


    **第 1 章 ■ 使用 Spring、Hibernate 和模式架构你的应用程序**


    无论一个框架有多好，保持依赖关系的解耦总是更好的。一个与具体技术无关的持久层不仅能带来更好、更清晰、更易于维护的代码（以及从一种持久化技术移植到另一种的便携性），还能确保整个应用程序的一致性。突然间，你的代码有了一个骨干支持，它处理依赖关系连接，提供面向切面编程（AOP）能力，并生成内聚的配置元数据，这些元数据隐式地记录了应用程序各部分如何组合在一起。


    Spring 鼓励有助于保持应用程序所有依赖关系解耦的设计实践。无论是外部框架、应用程序组件，甚至是 Spring 或 Hibernate 本身，确保协作组件不直接绑定在一起，有助于防止一个层的关注点泄漏到另一个层。通过将所有连接细节委托给
    Spring，你不仅通过消除创建基础设施“访问代码”的需求来简化代码库，还确保了组件的独立性。在接下来的几章中，你将学习如何通过面向接口编程以及使用 Spring
    的 ORM 抽象和通用异常层次结构来帮助实现这些目标。


    **Spring 和 Hibernate 的成功故事**


    Spring 的流行度上升不仅仅源于它通过帮助连接依赖关系来降低代码复杂性的能力。早期围绕 Spring 框架的许多兴奋点都源于它对其他领先开源框架（包括
    Hibernate）的支持。Hibernate 是首批为构建持久层提供企业级解决方案的开源 ORM 框架之一。Spring 能够将集成细节外部化到 XML
    配置文件，或通过 Java 注解表达依赖注入，这提供了一种强大的抽象，极大地简化和标准化了将 Hibernate 引导到应用程序中所需的集成工作。


    ORM 框架在实际使用的持久化技术（通常是关系型数据库）之上提供了一个抽象层，允许开发者专注于其领域模型的对象导向细节，而不是低层次的数据库问题。数据库的关系表世界与
    Java 的对象导向世界之间存在固有的*阻抗不匹配*，这使得实现有效的 ORM 抽象变得困难。这种阻抗不匹配源于关系型数据库与 Java 等面向对象语言之间的根本差异。例如，关系型数据库不实现多态、封装和可访问性等核心面向对象原则。此外，Java
    和 SQL 中“相等”的概念也大相径庭。我们将在本书中讨论其中一些差异，并探讨弥合 SQL 数据库与 Java 领域模型之间差距的方法。


    Hibernate 代表了弥合这一差距的重要一步，它提供了一个强大的开源框架来表达面向对象的领域模型，并定义了数据库的表和列如何与 JavaBean 中的对象实例和属性同步。


    **更好的集成方法**


    尽管现在可以更高效地开发持久层，但将 Hibernate 集成到应用程序中仍然可能是一项艰巨的任务。由于缺乏标准化的集成方法，开发者不得不不断地重复造轮子，将大量资源投入到开发和维护将
    Hibernate 塞入应用程序所需的基础设施代码上。


    随着 Hibernate 越来越受欢迎，Spring 框架也开始获得发展势头。当 Spring 首次出现时，它的使命是让服务器端 Java 应用程序的开发变得更简单。首先也是最重要的，它提供了一种更好的解决方案来连接应用程序的依赖关系。因此，Spring
    常被称为*容器*，这意味着它提供了一个集中的抽象层，用于通过配置（而不是编写通常重复的代码）来集成协作依赖关系。


    **第 1 章 ■ 使用 Spring、Hibernate 和模式架构你的应用程序**

