    **C H A P T E R 7**


    ■ ■ ■


    **Transaction Management**


    Database transactions help you group a set of operations into a single unit of
    work. All operations either succeed or fail as a group.


    Spring’s powerful and flexible transaction support is another factor responsible
    for the framework’s success and popularity. Before Spring, complex or declarative
    transactional features typically required that an organization use EJB, along
    with a heavyweight JEE container. Using aspect-oriented programming (AOP) techniques,
    Spring helped democratize enterprise-level transactional support, allowing developers
    to cleanly apply transactional rules to their code whether they were using a full-fledged
    JEE application server, a lighter-weight web container, or even a stand-alone
    unit test.


    Not only did Spring help to obviate the need for a heavyweight container, but
    it also provided a generalized abstraction for transaction management. It no longer
    mattered whether you were using Hibernate transactions, local database transactions,
    or even the Java Transaction API (JTA), which allows for distributed transactions
    across multiple datasources. In much the same way that Spring provides a generic
    **DataAccessException** hierarchy, Spring''s abstraction for transaction management
    and demarcation helps to simplify and decouple transactional specifics from application
    code and business logic.


    Much of the popularity of EJB stemmed from its transactional support. EJB provided
    a way to specify transactional rules via configuration, preventing these details
    from adding too much complexity to data access code. By leveraging its AOP features,
    Spring is able to offer similar flexibility, but without the overhead of a heavy
    EJB container or the addition of complexity or features that an organization doesn''t
    require.


    Using Spring, transactional rules can be consolidated into configuration so that
    code need not be muddied with these types of concerns. Switching between a JEE
    application server using a JTA datasource and a simple unit test using a local
    datasource is just a matter of modifying the Spring configuration— no code needs
    to be altered. Spring can leverage some of the advanced features offered by JTA
    when employing a JTA transaction manager. The key benefit, however, is that Spring
    provides a transactional programming model that is consistent—whether you need
    to have transactions span across multiple datasources (a feature offered by JTA)
    or across a single datasource, the way you define these transactional concerns
    will always be the same.


    In rare cases where you actually want to define transactional rules for your application
    programmatically, Spring offers a means for accomplishing this as well. You could
    just rely on Hibernate''s transactional programming model, but by leveraging Spring''s
    abstractions, you reduce your coupling to Hibernate by basing your persistence
    code on generalized APIs. This might come in handy if you decide to move away
    from Hibernate in the future, or (more likely) if your persistence layer utilizes
    both Hibernate and JDBC.


