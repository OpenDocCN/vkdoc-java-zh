  trans: '

    您还了解了使用 Apache **commons-dbcp** 库进行连接池，或通过 JNDI（如果您想使用应用容器提供的数据源）将数据库集成到 Spring
    应用程序中所需要的内容。


    在接下来的章节中，我们将构建领域模型，并将 Hibernate 集成到我们的艺术画廊应用程序中。


    **第 4 章**


    ■ ■ ■


    **使用 Hibernate 实现持久化**


    与 Spring 非常相似，Hibernate 首次出现时就改变了软件开发格局。时机非常理想。开发人员对 J2EE 的复杂性以及特别是使用 EJB 进行持久化所带来的开销感到沮丧。Hibernate
    通过简洁、清晰且经过深思熟虑的设计解决了持久化问题。


    同样与 Spring 类似，Hibernate 严重依赖 POJO。其他 ORM 框架迫使开发人员通过限制性和僵化的要求（例如替代类和父类，以及数据传输对象
    (DTO)）来污染其领域模型。Hibernate 在几乎不依赖或耦合 Hibernate 的情况下实现了持久化。Spring 通过其自身的几个类进一步帮助解耦
    Hibernate，这些类有助于简化和标准化集成及持久化操作。此外，Spring 提供了一种与框架无关的解决方案，用于以标准化的声明方式实现事务行为，而无需特定于
    Hibernate 的代码。


    回顾过去，很容易看出 Spring 和 Hibernate 如何对彼此的成功起到了关键作用。


    凭借强调轻量级方法论、简洁性和代码整洁性的理念，Hibernate-Spring 组合为企业级 Java 应用程序和持久化开创了一个新时代。这种共同的成功对
    Java 社区产生了巨大影响，并成为众多变革的催化剂，这些变革拥抱了更轻量级的应用程序开发方法。


    关于 Java 生态系统中的各种持久化选项，通常存在很多困惑。


    EJB 3、JPA、JDO 和 Hibernate 之间到底有什么区别？在本章中，我们将通过回顾一些历史并定义一些术语来尝试厘清这些概念。在解决这些问题之后，我们将演示如何将
    Hibernate 集成到 Spring 应用程序中。


    Java 数据库持久化的演进


    JDBC 由 Sun Microsystems 于 1997 年作为 JDK 1.1 的一部分包含在内。JDBC 是一个面向关系型数据库的低级 API。它提供了查询和更新数据库的方法。JDBC
    提供了一套出色的工具，但所有繁重的工作都完全留给了开发人员，他们必须编写 SQL、将查询结果映射到领域对象、管理连接和事务等等。大多数其他持久化框架都是作为
    JDBC 之上的抽象层构建的，以减轻开发人员的负担。


    从 2000 年开始，JDBC 规范 3.0 版作为 Java 社区流程 (JCP) 的一部分进行管理。JCP 创建于 1998 年，作为一种机制，允许相关方参与塑造
    Java 平台的未来方向。JCP 围绕 Java 规范请求 (JSR) 展开，这些是概述对 Java 平台拟议新增或更改的正式文档。每个 JSR 都有一个或多个个人担任规范负责人，以及一个称为专家组的成员团队，他们协作制定规范。最终的
    JSR 还包括一个参考实现。


    第 4 章 ■ 使用 Hibernate 实现持久化


    *规范*和*实现*之间的这种区别是开发人员在讨论各种可用的持久化选项时产生混淆的主要来源之一。例如，JPA 是一个*规范*，而 Hibernate 只是众多提供
    JPA 规范*实现*的项目之一。JPA 规范的其他实现包括 OpenJPA、DataNucleus 和参考实现 EclipseLink。但我们有点超前了。让我们来梳理一下其中一些规范和实现的起源。


    EJB、JDO 和 JPA


    在 1990 年代末和 2000 年代初，用 Java 开发大规模应用程序的主要技术是 EJB。EJB 最初由 IBM 于 1997 年构思，EJB 1.0
    和 1.1 规范于 1999 年被 Sun 采纳。此后，EJB 通过 JCP 得到增强。JSR 19 作为 EJB 2.0 的孵化器，该规范于 2001 年最终确定。EJB
    2.0 规范成为 Sun 的 Java 2 平台企业版（即 J2EE）参考实现的主要组成部分。


    毫无疑问，EJB 着手解决的问题，包括在分布式应用程序上实现事务完整性、远程过程调用 (RPC) 和 ORM，都是复杂的，但 EJB 很快就因得不偿失而声名狼藉。EJB
    1.0、1.1 和 2.0 规范因受检异常、必需接口和大量使用抽象类的复杂性而受损。大多数应用程序根本不需要 EJB 1 和 2 所关联的沉重负担。在这种背景下，竞争和创新存在着巨大的机会。


    JCP 在 JDBC 之上创建轻量级抽象层的第一次官方尝试是 JSR 12：Java 数据对象 (JDO)。JDO 背后的专家组于 1999 年开始着手定义一种标准方法，用于将
    Java 对象持久化地存储在事务性数据存储中。此外，它还定义了一种将数据从关系型数据库转换为 Java 对象的方法，以及一种定义与这些对象关联的事务语义的标准方法。到
    2002 年规范最终确定时，JDO 已经演变成一个基于 POJO 且与数据存储无关的 API。这意味着您可以将 JDO 与许多不同的数据存储一起使用，范围从关系型数据库管理系统
    (RDBMS) 到文件系统，甚至面向对象数据库 (OODB)。有趣的是，主要的应用服务器供应商并未接受 JDO 1.0，因此它从未流行起来。


    在 JDO 和 EJB 之间，现在有两个相互竞争的管理持久化的标准，但两者都无法突破并赢得开发人员。这为商业参与者和开源框架打开了大门。Hibernate
    通常是人们认为取代 EJB 2.0 的 ORM 框架，但另一个主要参与者实际上更早出现。


    一个名为 TopLink 的 ORM 最初由 The Object People 为 Smalltalk 编程语言开发。它被移植到 Java，并于 1998
    年添加到公司的产品线中。TopLink 最终于 2002 年被 Oracle 收购。TopLink 是一个令人印象深刻的框架，其特性在塑造后来在 Java
    世界中出现的持久化规范方面发挥了重要作用。


    作为一个边缘商业项目，TopLink 从未达到像 EJB 那样的采用水平，EJB 得到了 IBM 和 BEA 等应用服务器供应商的大力支持；它也无法真正与后来出现的轻量级开源框架（如
    Hibernate）竞争。

