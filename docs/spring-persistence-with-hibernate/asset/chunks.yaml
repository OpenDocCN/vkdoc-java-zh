    **jdbc.driverClassName=org.h2.Driver**


    **jdbc.username=sa**


    **jdbc.password=**


    语法很直观。每行包含一个简单的表达式，其中左侧代表属性名称，右侧（在 **=** 之后）代表配置的值。这种外部化使得为不同环境交换不同的数据库配置变得容易，并更好地将这些细节从特定于应用的配置中外部化出来。


