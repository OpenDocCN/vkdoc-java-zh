    \ relationships*, meaning that one entity owns or encapsulates a collection of\
    \ another entity. Within the database, associations are represented through table\
    \ joins, but there is no clear analogue for representing the more hierarchical\
    \ relationships we have within Java. This is where Hibernate comes in. Cascading\
    \ options help to establish parent-child relationships, or more precisely, the\
    \ rules for how operations such as save and delete that are applied to one entity\
    \ should *cascade* to associated entities. This concept is often referred to as\
    \ *transitive persistence*.\n\nFor example, within our gallery application, we\
    \ would assert that `ArtEntity` owns a collection of `Comment` instances. This\
    \ is logical since a `Comment` is *attached* to a particular `ArtEntity` instance.\
    \ An end user can post a comment about a particular image, and this comment is\
