    \ com.prospringhibernate.gallery.exception.EntityNotFoundException;\n\npublic\
    \ interface PersonDao extends GenericDao<Person> {\n\n    public Person getPersonByUsername(String\
    \ username) throws EntityNotFoundException;\n\n    public Person authenticatePerson(String\
    \ username, String password) throws AuthenticationException;\n\n}\n```\n\n## CHAPTER\
    \ 4 ■ PERSISTENCE WITH HIBERNATE\n\nAnd finally, here's the implementation for\
    \ the `PersonDaoJpa` class, which implements `PersonDao` and extends `GenericDaoJpa`\
    \ bound with our `Person` entity:\n\n```\npackage com.prospringhibernate.gallery.dao.hibernate;\n\
