    \ DAO 方法：`public List<ArtEntity> getArtEntitiesByTitle(String title);`\n\n此方法将返回所有与指定标题匹配的`ArtEntity`实例。显然，我们可以使用\
    \ JPQL 来表达此查询，但 Criteria API 提供了一些优势。主要优势之一是我们可以利用编译时检查来确保查询有效并符合领域模型的约束。在本节后面，我们还将研究\
