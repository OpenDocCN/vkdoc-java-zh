- fmt: "The only exception we need to explicitly define in our `ArtEntity` mapping\
    \ rules is the conversion between the three `ArtData` references into `String`\
    \ properties. In this example, the names of the properties are not in sync between\
    \ the two classes, so we need to define a `field` element for each `ArtData` reference.\
    \ Notice that we are not only mapping properties with different names, but we\
    \ are also extracting the value of a subproperty and using this value for the\
    \ converted DTO property. For instance, in defining the mapping rule to convert\
    \ the `ArtEntity.galleryPicture` property of type `ArtData_Gallery` to the `ArtEntityDTO.galleryURL`\
    \ property, we attempt to extract the `url` property from the `galleryPicture`\
    \ property to use as the value for the `galleryURL`. This is accomplished by specifying\
    \ a nested expression in the Dozer configuration:\n\n```\n<field>\n  <a>galleryPicture.url</a>\n\
    \  <b>galleryURL</b>\n</field>\n```\n\nThe value of element `a` specifies a nested\
    \ property, and the value of element `b` simply defines the property directly.\
    \ Dozer is very flexible in this regard and supports nested properties as well\
    \ as indexed properties when using arrays or collections.\n\n## Making the Mapping\
    \ Happen\n\nWith the configuration details out of the way, let’s try to do some\
    \ mapping! The easiest way to verify that everything is working properly is to\
    \ start with a test. As discussed in Chapter 8, let’s create an integration test.\
    \ It would actually be fairly trivial to define a unit test, as our dependencies\
    \ are fairly minimal. However, since we have specified some of our Dozer setup\
    \ using Spring configuration, it’s a little easier to let Spring take care of\
    \ the details.\n\nHere is a simple test that will help ascertain whether our Dozer\
    \ mapping process is working as it should:\n\n```java\n@RunWith(SpringJUnit4ClassRunner.class)\n\
    @ContextConfiguration(locations = {\"classpath:/META-INF/spring/spring-master.xml\"\
    })\npublic class DozerMappingTest {\n\n    private Mapper dozerMapper;\n    private\
    \ ArtEntity artEntity;\n\n    public Mapper getDozerMapper() {\n        return\
    \ dozerMapper;\n    }\n\n    @Autowired\n    public void setDozerMapper(Mapper\
    \ dozerMapper) {\n        this.dozerMapper = dozerMapper;\n    }\n\n    @Before\n\
    \    public void preMethodSetup() {\n        Comment comment = new Comment();\n\
    \        comment.setComment(\"This is a test comment. What a cool picture!\");\n\
    \        comment.setCommentDate(new Date());\n        comment.setEmailAddress(\"\
    test@prospringhibernate.com\");\n        comment.setFirstName(\"John\");\n   \
    \     comment.setLastName(\"Doe\");\n        comment.setTelephone(\"212-555-1212\"\
    );\n\n        ArtData_Thumbnail thumbnail = new ArtData_Thumbnail();\n       \
    \ thumbnail.setId(1L);\n\n        artEntity = new ArtEntity();\n        artEntity.setCaption(\"\
    caption test\");\n        artEntity.addCommentToArt(comment);\n        artEntity.setDescription(\"\
    A very cool picture of trees.\");\n        artEntity.setDisplayDate(\"October\
    \ 10th\");\n        artEntity.setHeight(500);\n        artEntity.setWidth(300);\n\
    \        artEntity.setSubTitle(\"This is a subtitle for a picture\");\n      \
    \  artEntity.setTitle(\"This is a title of a picture\");\n        artEntity.setThumbnailPicture(thumbnail);\n\
    \    }\n\n    @Test\n    public void testMappingArtEntity() {\n        ArtEntityDTO\
    \ artEntityDTO = this.getDozerMapper().map(artEntity, ArtEntityDTO.class);\n \
    \       Assert.assertEquals(artEntity.getTitle(), artEntityDTO.getTitle());\n\
    \        Assert.assertTrue(artEntityDTO.getComments().size() > 0);\n        Assert.assertTrue(\"\
    artData_thumbnail should be a string value\", artEntityDTO.getThumbnailURL().length()\
    \ > 0);\n    }\n}\n```\n\nYou should recognize much of the boilerplate detail\
    \ from earlier testing examples. Notice that we specify our top-level Spring configuration\
    \ file using the `@ContextConfiguration` annotation. Most of the code in this\
    \ class is included in the `preMethodSetup()` method, which is annotated with\
    \ the `@Before` annotation to ensure it is called before our test method (which\
    \ is annotated with `@Test`). In `preMethodSetup()`, we instantiate an `ArtEntity`\
    \ domain class, setting basic properties and associations.\n\nOnce we have configured\
    \ our `ArtEntity` instances, the `testMappingArtEntity()` method is called, which\
    \ contains the code for our actual test. In this method, we call the `map` method\
    \ on our `Mapper` instance, which was injected by Spring via autowiring into the\
    \ `dozerMapper` private property. The Dozer mapper does all the real heavy lifting\
    \ for us. We pass in our `artEntity` instance, which was set up in the previous\
    \ step, along with the class type to which we want to map the instance, and Dozer\
    \ converts our `ArtEntity` class into an `ArtEntityDTO`.\n\nTo ensure that all\
    \ went according to plan, we assert a few properties on the mapped `ArtEntityDTO`\
    \ instance, verifying that the correct values are present. Although the mapping\
    \ process is deceptively simple, there is quite a bit going on behind the scenes.\
    \ We now have an effective and reliable approach for converting Hibernate domain\
    \ classes into simpler DTO classes.\n\n## Leveraging Spring 3’s REST Support\n\
    \nSpring 3 offers numerous enhancements to MVC development. When Spring first\
    \ appeared on the scene, it was praised for its elegant, interface-driven MVC\
    \ approach. Things have improved significantly since then, helping to reduce configuration\
    \ and simplify development effort. By taking advantage of annotations, Spring\
    \ now provides a much more intuitive approach for implementing controllers. It\
    \ is no longer necessary to explicitly extract request parameters and other details\
    \ from the request. Additionally, controllers are far less constrained. You have\
    \ more flexibility in defining method signatures, without needing to obey a contract\
    \ for parameter types. Instead, Spring lets you map method parameters to various\
    \ aspects of the incoming request, such as query parameters, session attributes,\
    \ and even sections of the URL. This newfound flexibility is powered by annotations—arguably\
