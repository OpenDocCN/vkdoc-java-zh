    \ entity has the potential to break the `equals()` and `hashCode()` contract if\
    \ an object's equality is based off its identifier and this property suddenly\
    \ changes from null to a real value upon being persisted via Hibernate. We will\
    \ discuss this issue in more detail in Chapter 5.\n- *Managed*: We persist the\
    \ `person` entity with a call to `EntityManager.persist()`. If we have a method\
    \ annotated with `@PrePersist`, that method is executed followed by an insert\
    \ into the database, optionally followed by the execution of any custom method\
    \ we’ve annotated with `@PostPersist`. Now our `person` entity is in the Managed\
    \ state. In this state, there are many things that could happen to our `person`\
    \ entity. For instance, we could make a call to `EntityManager.refresh()`, which\
    \ would discard the object in memory and retrieve a fresh copy from the database,\
    \ optionally taking advantage of the `@PostLoad` callback. Or we could delete\
    \ the entity via `EntityManager.remove()` resulting in a call to `@PreRemove`.\n\
    - *Remove*: Once the record is deleted from the database, the entity is in a Removed\
    \ state, pending execution of a method annotated with `@PostRemove` before returning\
    \ to the Does Not Exist state."
