    注意，我们对 **Category** 领域对象使用了左连接，并通过 **with** 约束指定了那些匹配特定类别 ID 的类别。


    在这个查询中，我们使用了命名参数。与典型的 HQL 查询一样，参数名称在查询中通过冒号前缀来表示。然后，参数名-值映射会作为一个 **Map** 传入（作为
    **findAll** 查询的第二个参数）。


    使用 Criteria API


    与标准的 Hibernate 一样，Grails 也提供了一种使用 Criteria API 表达查询的方式。不过，由于我们使用的是 Groovy 而非 Java，因此可以利用
    Criteria DSL，从而以更简洁、更易读的方式定义查询条件。例如，我们可以通过以下查询，在两个指定类别之一中查找所有 **ArtEntity** 实例，并且这些实例还落在特定的日期范围内：


