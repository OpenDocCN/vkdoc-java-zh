    XML, you’re ready to do some database testing! The simplest form of database testing
    can be to just reuse those fancy DAOs that you’ve been working on. You can also
    apply the usual Spring **@Transactional** annotations, along with another annotation:
    **@TransactionConfiguration**.


    **@TransactionConfiguration** tells the transactional Spring testing environment
