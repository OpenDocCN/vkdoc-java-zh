    Hibernate allows entities, as well as association collections (a group of comments)
    to be implicitly cached. With caching enabled, Hibernate will first try to find
    an entity or collection in the cache before trying to query the database. Since
    loading data from the cache is far less expensive than performing a database operation,
    caching is another effective strategy for improving application performance.


    Hibernate integrates with several caching frameworks, such as Ehcache, and provides
    a **CacheManager** interface if you want to add your own caching solution. Once
    integrated, caching happens implicitly, without requiring any additional coding,
    other than specifying caching rules for each entity and collection.


