- fmt: '# Without Dependency Injection: The Problem


    Without dependency injection, the details of how a component accesses required
    services can get muddled in with the component’s code. This not only increases
    the potential for errors, adds code bloat, and magnifies maintenance complexities;
    it couples components together more closely, making it difficult to modify dependencies
    when refactoring or testing.


    # How Spring Solves This


    By its very nature, Spring helps to enforce best coding practices and reduce dependency
    on external frameworks, or even classes within an application. At the simplest
    level, Spring is a lightweight IoC container, meaning that it will assume the
    responsibility of wiring your application dependencies.


    Exactly how this wiring responsibility is handled will be discussed in depth throughout
    this book. However, a theme you will see replayed throughout these pages is how
    Spring effortlessly ties components together in a loosely coupled manner. This
    has far-reaching effects for any application, as it allows code to be more easily
    refactored and maintained. And in the context of this book, it allows developers
    to build a persistence tier that is not directly tied to a particular implementation
    or framework.


    Spring owes much of its success to the sheer number of integration points it provides,
    covering a wide range of frameworks and technologies. As developers realized the
    benefits gleaned from using Spring for integrating the various components within
    their own code, many new abstractions appeared that relied on Spring to integrate
    popular open source frameworks. Using Spring to integrate a particular framework
    not only simplifies the introduction of the framework, it allows the integration
    to be performed in a consistent manner—no different than the way collaborating
    components are wired within the context of an application. Additionally, using
    Spring’s dependency injection to wire in a key framework ensures the integration
    is done in a decoupled way.


    One of the leading catalysts for Spring’s adoption was its support for the open
    source, object-relational mapping (ORM) framework, Hibernate. As the Spring Framework
    began to grow in popularity, the Java development community was also buzzing about
    Hibernate. It was a pivotal time for open source frameworks, as both Spring and
    Hibernate offered revolutionary solutions that would change the way many new applications
    were architected and implemented. As you will see, Spring and Hibernate complement
    each other in numerous ways, and each is partially responsible for the other’s
    success and widespread adoption.


    ## A Synergistic Partnership


    In this book, we will focus on showing how Spring and Hibernate can be used together
    most effectively. Nevertheless, we will still emphasize strategies for decoupling
    Hibernate from your application. This is not because we have any concerns about
    using Hibernate, but because loose coupling provides a cleaner separation of concerns.


    ## Chapter 1: Architecting Your Application with Spring, Hibernate, and Patterns


    No matter how good a framework might be, it’s always better to keep dependencies
    decoupled. Not only does an agnostic persistence tier lead to better, cleaner,
    more maintainable code (as well as portability from one persistence technology
    to another), but it also ensures consistency across your application. Suddenly,
    your code is supported by a backbone that handles dependency wiring, provides
    aspect-oriented programming (AOP) capability, and generates cohesive configuration
    metadata that implicitly documents the way your application’s pieces fit together.


    Spring encourages design practices that help to keep all of your application’s
    dependencies decoupled. Whether it be an external framework, an application component,
    or even Spring or Hibernate themselves, ensuring that collaborating components
    are not directly tied together helps prevent the concerns of one layer from leaking
    into another. By delegating all your wiring details to Spring, you not only simplify
    your code base by relieving the need to create infrastructural “access code,”
    you also ensure that components are kept distinct. In the next few chapters, you
    will learn how coding to interfaces and using Spring’s ORM abstractions and generic
    exception hierarchy can help to achieve these goals.


    ## The Story of Spring’s and Hibernate’s Success


    The rise in Spring’s popularity stems from more than just its ability to reduce
    code complexity by helping to wire dependencies together. Much of the early excitement
    around the Spring Framework was due to its support for other leading open source
    frameworks, including Hibernate. Hibernate was one of the first open source ORM
    frameworks that provided an enterprise-level solution for building a persistence
    tier. Spring’s ability to externalize integration details to an XML configuration
    file or express dependency injection through Java annotations provided a powerful
    abstraction that greatly simplified and standardized the integration efforts required
    to bootstrap Hibernate into an application.


    ORM frameworks provide an abstraction layer over the actual persistence technology
    being used (usually a relational database), allowing developers to focus on the
    object-oriented details of their domain model, rather than lower-level database
    concerns. There is an inherent *impedance mismatch* between the relational-table
    world of databases and the object-oriented world of Java, making an effective
    ORM abstraction difficult to implement. This impedance mismatch is due to the
    fundamental differences between relational databases and object-oriented languages,
    such as Java. For example, relational databases don’t implement core object-oriented
    principles such as polymorphism, encapsulation, and accessibility. Furthermore,
    the notion of equality is vastly different between Java and SQL. We will discuss
    some of these differences throughout this book, examining approaches to bridging
    the gap between a SQL database and a Java domain model.


    Hibernate represented a significant step in bridging this gap by offering a powerful
    open source framework for expressing an object-oriented domain model, and defining
    the ways in which the tables and columns of a database synchronized with the object
    instances and properties in JavaBeans.


    ## A Better Approach for Integration


    Despite the improvements and efficiency with which a persistence tier could now
    be developed, integrating Hibernate into an application could still be a painstaking
    endeavor. With no standardized integration approach, developers were left to continuously
    reinvent the wheel, spending significant resources on the development and maintenance
    of the infrastructure code required to wedge Hibernate into their applications.


    As Hibernate grew in popularity, the Spring Framework started to gain momentum
    as well. When Spring first came on the scene, its mission was to make the development
    of server-side Java applications simpler. First and foremost, it offered a better
    solution to wiring application dependencies together. For this reason, Spring
    is often referred to as a *container*, meaning that it offers a centralized abstraction
    for integrating collaborating dependencies via configuration, rather than writing
    (often repetitive) code to handle this task.'
