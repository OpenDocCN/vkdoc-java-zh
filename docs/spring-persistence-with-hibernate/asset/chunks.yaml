- fmt: '# Ehcache Clustered Configuration


    When used in the basic clustered configuration, `Ehcache` does not distribute
    the entirety of cached data across each of the nodes in the cluster. Rather, each
    node contains a complete set of the cached data. While this does increase memory
    overhead, it improves performance by reducing network overhead. To reduce your
    application’s memory footprint, you should adjust the maximum number of objects
    stored within each cache region. You should also consider the average size of
    each entity that might be stored within a particular cache region, as this will
    impact the memory utilization. We have seen memory issues creep up in cache configurations
    with a low number of cached items, due to the large size of each item stored in
    the cache. These factors are rarely given ample consideration, but are often the
    cause of significant bottlenecks.


    Regardless of the replication mechanism, `Ehcache` provides two different strategies
    for actually notifying different nodes in the cluster of changes:


    - The default strategy is to send the key of the cached item that was updated,
    along with the updated value. This strategy is called `replicateUpdatesViaCopy`,
    as the updated value is sent to all the other nodes in the cluster. While this
    approach is usually the fastest way to keep the different nodes in sync, it also
    carries the overhead of sending the updated value over the network. In cases where
    the updated value is quite large, this can have performance implications.


    - An alternative is to just send a notification to the other nodes that they should
    invalidate the data in their respective caches. Then once the particular cache
    key has been invalidated, it will eventually be reloaded from the database on
    the next attempt to access that particular entity (or collection) for each of
    the nodes in the cluster. Obviously, this will incur additional load on the database—when
    a cache miss occurs on each of the other nodes in the cluster, they will need
    to requery the database to populate their respective caches. The advantage of
    this approach is that only the cache key needs to be transmitted to the other
    nodes.


    The default replication behavior is to notify other nodes of changes asynchronously,
    allowing cache propagation to happen in the background and not affect the response
    time of the original operation (the notifier). In high-concurrency scenarios in
    which data coherency is a top priority, `Ehcache` can perform replication synchronously
    instead, preventing the cache operation from returning until the other nodes in
    the cluster have been successfully notified. Since this will have significant
    performance implications, it should be used only in specialized situations.


    ## Configuring Replication


    `Ehcache` clustering implementation does not require any changes to an application’s
    code or architecture. You just need to modify the `Ehcache` configuration.


    To get rolling with a clustered caching configuration for our example, we need
    to update our `ehcache.xml` file. We will select the `JGroups` replication mechanism.
    The following snippet is suggested by `Ehcache`’s documentation:


    ```

    <cacheManagerPeerProviderFactory

    class="net.sf.ehcache.distribution.jgroups.JGroupsCacheManagerPeerProviderFactory"

    properties="connect=UDP(mcast_addr=231.12.21.132;mcast_port=45566;ip_ttl=32;

    mcast_send_buf_size=150000;mcast_recv_buf_size=80000):

    PING(timeout=2000;num_initial_members=6):

    MERGE2(min_interval=5000;max_interval=10000):

    FD_SOCK:VERIFY_SUSPECT(timeout=1500):

    pbcast.NAKACK(gc_lag=10;retransmit_timeout=3000):

    UNICAST(timeout=5000):

    pbcast.STABLE(desired_avg_gossip=20000):

    FRAG:

    pbcast.GMS(join_timeout=5000;join_retry_timeout=2000;

    shun=false;print_local_addr=true)"

    propertySeparator="::"

    />

    ```


    These details specify the network and communication details for the `JGroup` implementation
    of `Ehcache`’s `cacheManagerPeerProviderFactory`.


    Next, we must add a `cacheEventListenerFactory` element to each of our cache regions.
    If we do not specify specific configuration for each cache region, we can just
    add this element to the default region configuration. Let’s configure our `ArtEntity`
    cache region as follows:


    ```

    <cache name="com.prospringhibernate.gallery.domain.ArtEntity"

    maxElementsInMemory="5000"

    eternal="false"

    timeToIdleSeconds="900"

    timeToLiveSeconds="1800"

    overflowToDisk="false">


    <cacheEventListenerFactory

    class="net.sf.ehcache.distribution.jgroups.JGroupsCacheReplicatorFactory"

    properties="replicateAsynchronously=true,

    replicatePuts=true,

    replicateUpdates=true,

    replicateUpdatesViaCopy=true,

    replicateRemovals=true"/>

    </cache>

    ```


    In this configuration, we set `replicateAsynchronously` to `true`, ensuring that
    updates happen asynchronously. Additionally, we set `replicateUpdatesViaCopy`
    to `true`, ensuring that the values of updated cache elements are sent directly
    to all of the other cluster nodes. Most of the other attributes should be fairly
    self-explanatory.


    ## Using an External Caching Server


    Another caching solution that limits the potential for coherency issues is to
    use a stand-alone cache server. `Memcached`, a popular open source memory object
    caching system, uses a similar strategy. `Ehcache` provides a `Cache Server` implementation,
    which is a self-contained caching server that runs inside its own `JVM`. Because
    `Cache Server` is not tied to any particular node within your application cluster,
    there isn’t much of a risk of version conflicts between caches (as there is only
    a single, external cache). If you are concerned about the caching server being
    a single point of failure, you can deploy it in a clustered configuration.


    Using an external caching server can reduce the potential for inconsistencies
    in your cached data. However, you must weigh this against the penalty of network
    overhead, incurred from the fact that all calls to the caching server must be
    made over the network (rather than in process). Again, we recommend that you experiment
    with the various caching options, and pick the solution that is most ideal for
    your application’s requirements.


    ## Summary


    In this chapter, we examined several strategies for evaluating and improving application
    performance.


    One of the most common pitfalls for `Hibernate` developers is the `N+1` selects
    issue. This problem typically stems from a failure to properly tune a domain object’s
    mapping configuration or the queries within the `DAO` layer. Understanding how
    this problem can appear, as well as how to detect it, is important in ensuring
    decent `ORM` performance. Although tuning really depends on the unique requirements
    of an application, often the best solution is to consider what data needs to be
    made available within the service, controller, or view layers, and optimize your
    queries to load this data as efficiently as possible. You saw that using a `fetch-join`
    is often an effective approach for initializing an association without requiring
    multiple queries. Relying on `Hibernate`’s batching capability can also be a decent
    strategy, although it isn’t always as effective.


    Another technique for improving performance is to leverage `Hibernate`’s caching
    capabilities. Properly tuning the cache can make a dramatic difference for application
    performance. However, caching can also degrade performance if it is not done correctly.
    For example, caching too aggressively can trigger `OutOfMemoryException` exceptions.
    Understanding the different caching configuration options within `Hibernate` will
    help you select the appropriate behavior. It is also important to experiment with
    different `TTL` settings.'
