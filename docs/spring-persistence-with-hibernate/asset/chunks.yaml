    some of these details, such as understanding isolation levels and advanced transactional
    options, in Chapter 8.


    The Benefit of Coding to Interfaces'
  trans: '

    这里的情况一目了然：我们验证特定账户中是否有足够的现金，然后从一个账户中提取资金并转入另一个账户。任务本身很简单，但无需过度想象就能预见，如果这个业务方法在半途中失败，可能会引发怎样的混乱——资金可能被扣划，却从未存入目标账户。起初这对银行或许有利，但用不了多久，整个经济体系就会崩溃，文明将退回到仅以疯狂吸管和星球大战人偶为基础的原始物物交换体系。


    第 1 章 ■ 使用 Spring、Hibernate 和设计模式架构你的应用


    利用声明式事务


    服务外观方法通常将多个 DAO 方法组合在一起，作为一个工作单元来完成业务逻辑。这就是事务的概念：整个方法（及其所有副作用）要么 100% 成功完成，要么应用程序回滚到调用该方法之前的状态。在
    Spring 持久化技术出现之前，事务需求常常促使开发者转向 EJB，因为 EJB 允许他们为每个外观方法声明式地配置事务语义。当无法声明式地指定事务需求时，开发者必须改用编程式方法。这不仅增加了代码的复杂性，模糊了持久化逻辑的意图，还进一步将持久化技术与应用程序耦合在一起。


    事务划分通常被认为是一个*横切关注点*，这意味着它代表影响代码库许多部分的功能，但与这些部分的其他特性是正交的。横切关注点会给代码增加冗余，因为它们需要被重复地编织到应用程序的业务逻辑结构中，从而降低了代码的模块化程度。面向切面编程旨在解决这个问题，它允许将这些关注点作为切面只表达一次，然后根据需要编织到业务逻辑中。


    在 Spring 中，服务层通常旨在完成三项主要任务：


    • 作为核心 API，应用程序的其他层将通过它进行交互（这是外观模式的体现）

    • 定义核心业务逻辑，通常调用一个或多个 DAO 方法来实现此目标

    • 为每个外观方法定义事务细节


    理解面向切面编程 (AOP)


    服务层是 Spring 的 AOP 支持得到最佳利用的地方。Spring 内置了事务支持，可以通过使用拦截器来增强你的服务层代码，将事务功能编织进去。拦截器是可以混入方法执行流程中的代码，通常在特定方法被调用之前和/或之后委托给拦截器。简单来说，拦截器在方法执行的某个点上封装了切面的行为。


    仅仅指定一个方法应该是事务性的还不够。你不应该强制每个方法都在事务的范围内发生，出错时回滚，一切顺利时提交。也许某些方法不尝试修改任何数据，因此应该在只读事务的上下文中执行。或者更可能的是，某些异常会触发回滚，而其他异常则允许事务继续进行。


    切入点（Pointcuts）是 Spring AOP 的另一个重要组成部分。它们有助于定义特定切面（可以编织到应用程序逻辑中的模块化功能，例如事务行为）应该被编织到何处。借助
    Spring 的事务支持，你可以精细地控制哪些异常可能触发提交或回滚，以及事务本身的细节，例如确定隔离级别，以及一个方法是应该触发一个新事务、一个嵌套事务，还是在现有事务内执行。


    在基本层面上，Spring 通过使用代理设计模式来实现 AOP。当你通过将横切行为注入到各种方法来增强你的类时，你实际上并没有在整个应用程序中注入代码（尽管从某种意义上说，这是使用
    AOP 的最终效果）。


    相反，你是在请求 Spring 创建一个新的代理类，在该类中，功能被委托给你的现有类以及事务实现（或任何你想要编织到代码中的切面）。这个解释是对底层实际发生情况的过度简化，但重要的是要记住，当你通过
    AOP 将横切行为编织到你的类中时，Spring 并不是直接插入代码；而是用包含你现有代码并与事务代码交织在一起的代理来替换你的类。在底层，这是使用 JDK
    动态代理或 CGLIB 字节码增强来实现的。


    同样，很容易看出这对于像 Spring 这样的轻量级 IOC 容器来说是多么自然。既然你已经将依赖关系的处理委托给了 Spring，那么让 Spring 也负责代理这些依赖关系，以便你可以分层添加新的横切行为，就完全合情合理了。


    尽管当你需要定义和引入要编织到实现中的新切面时，Spring AOP 非常强大，但关键的事务功能是开箱即用的，无需学习 AOP 编程概念的细节。尽管如此，了解
    Spring 在底层所做的基本工作仍然很有帮助。请记住，AOP 不仅仅用于应用事务行为——它还有助于将任何横切关注点（例如日志记录或安全性）编织到你的应用程序中。我们将在本书后面更详细地讨论
    AOP。


    简化事务


    尽管使用 Spring 应用事务过去需要一些 AOP 知识，但在框架的最近版本中，这个过程已经大大简化了。现在，将事务行为应用于服务层类只需在类或方法级别指定
    **@Transactional** 注解即可。该注解可以通过属性进行参数化以自定义其行为，但最重要的细节是事务是否为只读。许多开发者没有认识到使用事务的重要性——即使在只读上下文中也是如此。事务不仅仅用于确保原子性。事务还可以用于指定数据库隔离级别，并划定在事务范围之外可能不明确的其它上下文细节。我们强烈建议所有数据库操作都在某个事务的范围内进行——即使只是为了获得对数据库上下文状态的控制。我们将在第
    8 章讨论其中一些细节，例如理解隔离级别和高级事务选项。


    面向接口编程的好处

