- fmt: "Our next example simply calls `Person.list()`, which returns all the instances\
    \ of the `Person` domain class. However, we also pass in a `Map` of options that\
    \ help to define constraints and sorting options on our returned data. These options\
    \ can also be used for pagination, since you can set the maximum number of items\
    \ to return (`max`), as well as an `offset`. Table 6-1 summarizes the options\
    \ that can be passed to the `list()` method.\n\n*Table 6-1. Options for Sorting\
    \ and Paginating a Result Set*\n\n| Option | Purpose |\n| --- | --- |\n| `sort`\
    \ | Field to sort on |\n| `order` | Direction of sort (ascending or descending)\
    \ |\n| `max` | Maximum number of items to return |\n| `offset` | Offset within\
    \ total result set for first item returned |\n\nA `Map` containing the options\
    \ listed in Table 6-1 will also work with the `findAllBy*` methods. For instance,\
    \ we could request the second page (assuming each page contains ten objects) of\
    \ `Person` instances, sorted by name in descending order:\n\n```\ndef people =\
    \ Person.list(sort: \"name\", order: \"desc\", max: 10, offset: 10);\n```\n\n\
    ## Creating Advanced Query Methods\n\nThe dynamic finder approach described in\
    \ the previous section works well for most types of queries. However, sometimes\
    \ having a little more flexibility is important. Grails also provides the `find()`\
    \ and `findAll()` methods, which allow you to utilize arbitrary HQL queries. `Find()`\
    \ returns a single entity, and `findAll()` will return multiple entities. Alternatively,\
    \ an even more flexible `executeQuery()` method allows you to define queries that\
    \ don’t return a specific domain entity.\n\nLet’s look at an example using HQL.\
    \ Suppose we want to query for all `ArtEntity` objects that fall within a particular\
    \ category. This could be represented using the following query:\n\n```\nList\
    \ artEntities = ArtEntity.findAll(\n    \"from ArtEntity artEntity left join\n\
    \    artEntity.categories as category with\n    category.id = :categoryId\",\n\
    \    [\"categoryId\": category.id])\n```\n\nNotice that we use a left join on\
    \ the `Category` domain object, specifying a `with` constraint for those categories\
    \ matching the specified category ID. We use named parameters in this query. As\
    \ in a typical HQL query, parameter names are represented in the query by prefixing\
    \ the name with a colon. The parameter name-value mappings are then passed in\
    \ as a `Map` (as the second parameter to the `findAll` query).\n\n## Using the\
    \ Criteria API\n\nJust like standard Hibernate, Grails provides a means to express\
    \ queries using the Criteria API. However, because we are using Groovy instead\
    \ of Java, we can take advantage of a Criteria DSL, allowing us to define our\
    \ query criteria in a more concise and readable way. For instance, we could query\
    \ for all `ArtEntity` instances within one of two specified categories that also\
    \ fall within a particular date range using the following query:\n\n```\ndef criteria\
    \ = ArtEntity.createCriteria()\ndef currentDate = new Date()\ndef earlierDate\
    \ = currentDate – 3\ndef catName1 = \"autumnPicts\"\ndef catName2 = \"summerPicts\"\
    \ndef results = criteria.list {\n    between('displayDate', earlierDate, currentDate)\n\
    \    categories {\n        or {\n            equals(\"name\", catName1)\n    \
    \        equals(\"name\", catName2)\n        }\n    }\n}\n```\n\nThe preceding\
    \ example uses the Grails Criteria Builder, allowing us to express a fairly complex\
    \ set of restrictions in a very intuitive manner. If you recall the standard Hibernate\
    \ Criteria API, you should be able to infer most of what is occurring in our example.\
    \ Criteria disjunctions and conjunctions can be specified using `or` and `and`\
    \ blocks, respectively. Similarly, association criteria may be expressed by defining\
    \ a block with the association name, which is what our `categories` block does\
    \ in the preceding example. Within our `categories` block is a nested `or` disjunction,\
    \ and within that block are our `equals` restrictions, allowing us to filter those\
    \ categories that match either of the category names we’ve specified."
