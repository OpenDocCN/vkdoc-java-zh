    类似地，如果你想更新此资源的属性（例如更新与这本书相关的内容），你可以发送一个 HTTP **PUT** 请求，目标 URL 为 **http://api.apress.com/book/978-1430226323**，并在请求中传入资源更新后的状态。


    在这里，我们将重点介绍 Spring 提供的用于简化 RESTful API 开发的特性。不过，在着手实现 Spring 之前，我们需要先确定一种序列化策略。为了在网络上传输丰富的领域模型，我们需要能够扁平化对象图，以便将其序列化并表示为
    XML 或 JSON 格式。


    **序列化对象图**


    尽管 RESTful 架构本身具有简单性，但在将领域模型序列化为 Web 服务所选择的任何格式时，仍然存在一个挑战。例如，如果你选择将数据表示为 XML，那么有许多框架和技术可以将面向对象的领域模型转换为
    XML。无论你选择哪种方式来编组你的领域对象，都很可能会遇到序列化过多对象图的问题。这是面向对象的 Java 领域与扁平的、基于文本的 XML 和 JSON
    领域之间另一种类型阻抗不匹配的副作用。


    在第 9 章中，你了解了延迟加载的优缺点。在编组数据时，如果你不小心，并试图在 **EntityManager** 已经关闭后编组你的领域实体，延迟加载可能会再次引发问题。然而，即使
    **EntityManager** 保持打开状态，当编组过程尝试将数据序列化为指定的负载格式时，你也必然会初始化你的对象图。


    不幸的是，这是一个难以解决的问题。一种解决方案是插入一个专门的框架，旨在防止 **LazyInitializationException** 弹出，或防止无意中编组过多数据。其中一个解决方案是一个名为
    Gilead 的框架。Gilead 尝试将你的领域实体克隆到一个新的实例中，在该实例中，Hibernate 代理已被过滤掉。这可以防止潜在的 **LazyInitializationException**
    发生，以及加载整个对象图的可能性，后者会导致严重的数据库开销和性能影响。


    将实体的所有关联“置空”以便将其序列化为更紧凑、更高效的格式，其问题在于，如果这些数据被读回应用程序并重新附加到 **EntityManager**，这些被置空的关联将导致
    Hibernate 删除重要数据，例如删除特定实体上的集合。Gilead 为其所谓的*合并过程*提供了几种策略，在该过程中，返回给 Hibernate 应用程序的数据会被重新组装回原始结构。一种解决方案尝试将这些细节保存在
    **HttpSession** 中，这需要最少的应用程序代码侵入，但也可能带来性能和可扩展性方面的代价。


    另一种策略要求你的领域模型继承自 Gilead 提供的一个基类。然后，Gilead 使用这个基类作为一种手段，来存储将轻量级编组数据合并回 Hibernate
    应用程序所需的信息。你可以在 **http://noon.gilead.free.fr/gilead/** 了解更多关于 Gilead 的信息。


    **使用令人畏惧的 DTO 模式**


    数据传输对象（DTO）模式被许多人认为是一个“坏主意”。这是因为它有可能增加大量的代码冗余和复杂性，导致未来出现更多错误和维护开销。然而，有时 DTO 模式可以作为一个可行的解决方案，而处理领域模型的编组可以说是其中一种情况。


    DTO 模式通常需要创建专门的类，这些类仅用于传输领域对象的数据。通常，你会创建一个单独的包结构来帮助避免混淆。你的 DTO 类可能比你的领域对象更小、更紧凑，通常会用简单的标识符替换对象引用，并可能完全移除关联。


    显然，DTO 层的具体细节取决于你应用程序的独特需求。然而，由于你的 DTO 类不依赖于 Hibernate，更紧凑，并且产生循环引用的可能性要小得多，它们可以帮助简化编组策略所需的工作。


    使用 DTO 时提出的主要担忧是，你需要编写大量自定义代码来从一个类层次结构转换到另一个（从你的领域模型到 DTO，再转换回来）。这种转换工作不仅需要大量的前期开发时间，而且还可能导致错误，特别是如果你的领域类发生了更改，而你的
    DTO 转换代码没有相应更新时。


    这个问题的一个解决方案是 Dozer。Dozer 是一种不同类型的映射框架。与 Hibernate 不同，Dozer 不尝试将 Java 类映射到关系数据库。Dozer
    将 Java 类映射到其他 Java 类，并且它专门为领域模型到 DTO 的转换需求而设计。


    像 Dozer 这样的框架的主要优势在于，它卸载了将一个类转换为另一个类的复杂实现细节。Dozer 能够就两个类如何关联做出一些智能判断。例如，如果两个打算相互映射的类共享同名的属性，Dozer
    将尝试自动映射这些属性，除非另有指示。Dozer 还能够处理类型之间的转换，因此即使映射的属性不是同一类型，Dozer 也会尝试使用其内置转换器之一从一种类型转换为另一种类型。如果找不到适用的转换器，你也可以创建自己的转换器。此外，Dozer
    支持嵌套映射行为，因此如果你定义了两个类之间的映射行为，这些规则将应用于任何级别的转换。换句话说，即使你尝试映射两个不同的顶级类，Dozer 也会根据需要应用任何其他已定义类的映射规则。即使对于嵌套属性和集合也是如此。当
    Dozer 遇到可映射的场景时，它会自动应用这些规则。在查看几个示例时，这些细节会更加清晰，因此让我们开始将 Dozer 集成到我们的艺术画廊应用程序中。


    **引导 Dozer**


    要开始使用 Dozer，我们首先需要将必要的依赖项添加到我们的 Maven **pom.xml** 文件中：


    **<!--Dozer -->**


    **<dependency>**


    **<groupId>net.sf.dozer</groupId>**


    **<artifactId>dozer</artifactId>**


    **<version>5.2.2</version>**


    **</dependency>**


    这将提供 Dozer 集成所需的所有 JAR 包。将此代码片段添加到你的 **pom.xml** 后，你可能需要运行 **mvn install** 才能将必要的依赖项下载到你的本地
    Maven 仓库中。


    **构建 DTO 层**


    在我们进一步操作之前，需要定义我们的 DTO 类。通常，DTO 与其对应的领域类相似，但本质上更简单。通过移除双向关联、循环引用和不必要的属性，DTO 类可以降低编组策略或远程实现中的复杂性。


    让我们定义我们的 **ArtEntityDTO** 类：


    **package com.prospringhibernate.gallery.dto;**


    ****import java.net.URL;**


    **import java.util.Date;**


    **import java.util.HashSet;**


    **import java.util.Set;**


    **import javax.xml.bind.annotation.XmlElement;**


    **import javax.xml.bind.annotation.XmlRootElement;**


    ****@XmlRootElement(name = "artEntity")**

