    instance, using either `criteriaBuilder.asc` or `criteriaBuilder.desc`. In either
    case, notice that we extract a `Path` instance using `root.get()`, passing in
    the field name we wish to order by. Each newly created `javax.persistence.criteria.Order`
    instance is added to our `newOrderList`.


    After we have finished looping through our order requirements, we call `criteriaQuery.orderBy()`,
    passing in our `newOrderList` as a parameter. This method call effectively sets
    our order by criteria, overwriting any previously specified order requirements
    for this query.


