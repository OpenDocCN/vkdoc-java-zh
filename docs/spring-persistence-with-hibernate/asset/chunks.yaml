    \ parameter in your Spring XML configuration, which is what we recommend to minimize\
    \ tight coupling\n\nNow that you know how to tap into the creation and destruction\
    \ life-cycle events in Spring, there’s another aspect of bean management that’s\
    \ crucial to understand when building enterprise applications: bean scoping.\n\
    \n## Understanding Bean Scopes\n\nBy default, beans defined in Spring are all\
    \ scoped as singletons. A *singleton* is a class that is guaranteed to have only\
    \ a single instance in the JVM. Singletons are great for storing application state,\
    \ or for any case where you want to be assured that there is only ever one reference\
    \ in your application. Normally, you would need to write code to achieve this\
    \ assurance.\n\nThe typical singleton meets the following criteria:\n\n- Has a\
    \ static method to return the single instance of the class (stored as a static\
    \ reference within the class)\n- Has a private constructor, ensuring that only\
    \ the singleton itself can ever create a new instance (which is your assurance\
    \ that you won’t accidentally create more than once instance simply by invoking\
    \ `new Singleton()`)\n\nA singleton in your application might look like this:\n\
    \n```\npublic class Singleton {\n    private static final Singleton INSTANCE =\
    \ new Singleton();\n    private Singleton() {\n    }\n    public static Singleton\
    \ getInstance() {\n        return INSTANCE;\n    }\n}\n```\n\n## CHAPTER 2 ■ SPRING\
    \ BASICS\n\nAlthough the preceding sample illustrates a useful design pattern,\
    \ Spring obviates the need to write this boilerplate code, once again allowing\
    \ you to move these details into the configuration. By default, all Spring beans\
    \ are singletons. If this is not your intention, you need to specify a different\
    \ scope for your bean.\n\nIn Spring 1.x, beans were either prototype beans or\
    \ singletons. *Prototype* means that each new call to `getBean()` will return\
    \ a brand-new instance of your bean. Singleton beans guarantee that there can\
