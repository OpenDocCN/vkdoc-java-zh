- fmt: "# Domain Model Fundamentals\n\nThis concept of sensible defaults, or *convention\
    \ over configuration*, really reduces the amount of coding required to get a domain\
    \ model up and running. And Hibernate’s annotation support provides ample flexibility\
    \ to override any of the default behavior, should you be so inclined. For instance,\
    \ if we wanted to define a table name for our `Comment` class that is different\
    \ from the Java class name, we could accomplish this feat by using the `@Table`\
    \ annotation:\n\n```\n@Table(name = \"HOGWASH\")\nclass Comment {\n    . . . (Methods\
    \ Omitted)\n}\n```\n\nSimilarly, we can require that the `comment` property maps\
    \ to the column `commentText` by using the `@Column` annotation:\n\n```\n@Column(name\
    \ = \"commentText\")\npublic String getComment() {\n    return this.commentText;\n\
    }\n```\n\nThis level of customization is very useful, but most of the time is\
    \ unnecessary and redundant (unless you are mapping your domain model to a legacy\
    \ database).\n\n> **Note**: You should have a very good reason before you override\
    \ any of Hibernate’s default behavior. If you feel the need to map a Java property\
    \ to a column of a different name, you may want to reconsider your naming conventions.\
    \ Now, it’s not wrong to have discrepancies between column names and Java property\
    \ names, but simplicity of configuration is very important, and we encourage you\
    \ to limit the overriding of default behavior whenever possible. After all, less\
    \ code equals less maintenance.\n\n## Managing Entity Identifiers\n\nHibernate\
    \ annotation support does require that you define a primary key and all of your\
    \ JavaBean’s associations. In our `Comment` class, we have added the `@Id` annotation\
    \ above the `getId()` method. This annotation tells Hibernate that the `id` property\
    \ of our `Comment` class is the identifier (or primary key) for our `Comment`\
    \ entity.\n\nBelow the `@Id` annotation is the `@GeneratedValue` annotation, which\
    \ specifies the way in which a given instance’s identifier will be created. The\
    \ default is `AUTO`, and in our example, this is the identifier-generation strategy\
    \ Hibernate will use (since we haven’t defined a strategy at all). `AUTO` will\
    \ look at the underlying database to make the decision as to how identifiers should\
