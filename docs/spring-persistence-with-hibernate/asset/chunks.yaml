    \ session, or global session scopes don’t satisfy your needs, you may enable the\
    \ simple thread scope to bind a bean definition to an instance of `ThreadLocal`.\
    \ |\n\nSo now you know how to create beans in the Spring `ApplicationContext`\
    \ and manage their scope and life cycle. The next piece of the puzzle is how to\
    \ retrieve those beans from the Spring container within your application.\n\n\
    ## CHAPTER 2 ■ SPRING BASICS\n\n## Dependency Injection and Inversion of Control\n\
    \nEnterprise applications are composed of many objects that provide behavior to\
    \ emulate business processes. Two very important design patterns have emerged\
    \ to manage the relationships between objects in an object-oriented application:\n\
    \n- *Dependency injection (DI)*: Classes that employ dependency injection specify\
    \ the objects that they interact with through constructor arguments, factory method\
    \ parameters, or public mutators (aka *setters*). With a dependency-injection\
    \ container or framework like Spring, the ability to externalize simple class\
    \ properties is just the beginning. Developers can create a complex tree of dependencies,\
    \ leaving the work of figuring out how each dependency is created and set (also\
    \ called *injected* or *wired*) to the Spring lightweight container.\n- *Inversion\
    \ of Control (IoC)*: When object location or instantiation is removed as a responsibility\
    \ for a given bean and instead left to the framework, control has been *inverted*.\
    \ This inversion of control is a very powerful concept and represents the foundation\
    \ on which the Spring Framework is based.\n\nDependency injection and IoC lead\
    \ you down a path toward clean code that embodies high cohesion and loose coupling.\n\
    \n## Setter-Based Dependency Injection\n\nAlthough frighteningly simple, Spring’s\
