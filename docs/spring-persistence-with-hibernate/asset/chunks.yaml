- fmt: '# 使用 Spring、Hibernate 和模式架构你的应用程序


    本书中展示的许多经验教训，都源自多年来使用 `Spring` 和 `Hibernate` 构建可扩展、高流量 Web 应用程序的实践经验。在我们的共同经验中，一个突出的细节是通过动手实践学习的重要性和益处。为此，我们将构建一个真实的应用程序，该程序将使用
    `Spring 3`、`Hibernate 3.5`、`JPA 2.0`、`Hibernate-Search`、`Grails`、`Spring Roo`
    和 `Dozer`。我们坚信，学习 `Spring` 和 `Hibernate` 远不止是理解各自框架的 API。要能够有效地使用这两项出色的技术，有必要理解设计模式和最佳实践，以便从这些框架中获得最佳效果，并以一致且经过验证的方式构建它们。我们希望这本书能教给你的不仅仅是如何一起使用
    `Spring` 和 `Hibernate`。我们的目标是传递我们在经验中成功运用的开发经验、教训和最佳实践，以便你可以在自己的应用程序中应用这些技能和工具。


    在本书中，我们将介绍核心的 `Hibernate` 基础知识，演示如何在 `Spring` 上下文中最好地利用该框架。我们将从基础概念开始，例如开发有效领域模型和
    `DAO` 层的策略，然后进入使用 `HQL`、`JPQL` 和 `Criteria API` 的查询技术。在介绍了基本概念之后，我们将继续讨论更高级的主题，例如获取和缓存策略。我们还将说明几种架构事务性服务外观的方法。我们将检查编程式和声明式事务，展示使用
    `Spring` 表达事务语义的好处。


    *Spring Persistence with Hibernate* 还将介绍 `JPA`，涵盖其历史以及 `Hibernate` 影响其发展的方式。我们将讨论遵循
    `JPA` 标准的好处，以及何时使用 `Hibernate` 特定功能是有意义的。本书还将介绍 `Grails` 和 `GORM`，说明 `DAO` 和 `Active
    Record` 模式之间的差异。我们将把示例应用程序（将在本书过程中开发）移植到 `Grails` 和 `Spring Roo` 中，突出使用快速开发、约定优于配置平台的好处和差异。在这些章节中，我们将探讨与并发/乐观锁、`Hibernate
    Session` 状态、缓存方法和事务管理相关的主题。


    本书的最后部分将介绍一些高级技术，这些技术对于处理企业级 `Spring`/`Hibernate` 应用程序非常重要。我们将说明集成遗留数据库的一些陷阱，以及开发
    `REST` Web 服务、处理 `Hibernate` 代理和延迟集合以及使用 `Hibernate-Search` 构建搜索功能的最佳实践。


    以下是我们在本书中将讨论的一些主要主题：


    - 基本的 `Spring` 框架特性，如 `IoC` 和 `AOP`

    - 架构良好分层持久层的核心概念

    - `JPA` 概念和集成 `JPA` 的步骤

    - 使用 `Hibernate` 的基础和高级概念

    - `Hibernate` 查询技术

    - `DAO` 和服务外观层开发

    - `Grails`，以及 `Active-Record` 模式的介绍

    - `Spring Roo` 的介绍

    - 构建 `REST` Web 服务

    - 使用 `Dozer` 在领域模型和 `DTO` 之间进行转换

    - 利用其他框架和技术，例如 `Hibernate-Search`

    - 高级缓存和集成策略


    ## 第一章：使用 Spring、Hibernate 和模式架构你的应用程序


    持久化通常是应用程序的生命线，提供软件在多次调用中保持有用所需的长期记忆。尽管其重要性，但在应用程序的设计或实现阶段，持久层的架构很少得到充分的考虑。这种缺乏规划的后果可能是深远且对组织具有破坏性的。


    本书的主要目标是为你提供架构和实现一个坚实且有效的持久层所需的最佳实践、工具和策略。本书中的许多概念都源自设计构建旨在服务数百万日常用户的 Web 应用程序的真实世界实践经验。我们的目标是说明那些对我们有效的模式和方案，同时检查在你的应用程序中使用
    `Spring` 和 `Hibernate` 的集成细节。


    多年来我们学到的一个重要教训是，通过示例学习通常是最好的方式。为此，我们将在本书过程中构建一个真实的应用程序：一个图片库 Web 应用程序，它允许用户查看由管理员策划的幻灯片和展览。为了强调构建可扩展和可维护应用程序的经过验证的、实用的解决方案和架构模式，每一章都将关注应用程序开发中与持久化相关的不同方面。通过代码示例和讨论，我们将追溯一个真实工作应用程序的设计、架构和实现。从基础开始，每一章都将建立在前一章的基础上，添加新的层、特性和测试。当然，与任何真实世界的应用程序一样，随着我们发现
    `Spring` 和 `Hibernate` 的新功能以及替代策略和框架，我们将进行大量的重构。事实上，最后两章将完全重新架构我们的图片库应用程序，因为我们研究两个基于“约定优于配置”概念的新框架。`Grails`
    和 `Roo` 旨在提供更快速的开发风格，它们提供了一个更全面和一致的开发环境，并具有由动态语言框架（如 `Ruby on Rails` 和 `Django`）推广的强大特性。


    ### 一致方法的好处


    正如你将在本书中学到的，数据保存和查询的方式是每个应用程序不可或缺的一部分。事实上，持久层通常作为构建应用程序的基础。构建在这个基础上的是标准 `Spring`
    持久层的三个核心组件：领域模型、数据访问对象层和服务外观。


    如果你对这些术语中的一些不熟悉，请不要担心。在接下来的章节中，我们将解释每个组件的用途和功能，演示每个组件在应用程序中扮演的角色。


    虽然我们不建议只有一种正确的方法来架构应用程序，但我们确实想强调使用关键设计模式和最佳实践的好处。这是一个你会在书中反复看到的主题。


    ### 依赖注入的重要性


    `Spring` 框架帮助消除了设计和构建应用程序中的许多不确定性。它已成为集成不同组件和框架的事实标准，并且已经远远超出了其依赖注入的根源。依赖注入的目的是将解析外部软件组件的工作与你的应用程序业务逻辑解耦。'
  raw: 'Many of the lessons illustrated in this book were culled from years of practical
    experience building scalable, high-volume web applications using Spring and Hibernate.
    One of the details that stands out in our joint experience is the importance and
    benefit of learning through hands-on experience. To this end, we will build a
    real-world application that utilizes Spring 3, Hibernate 3.5, JPA 2.0, Hibernate-Search,
    Grails, Spring Roo, and Dozer. We firmly believe that learning about Spring and
    Hibernate implies far more than simply understanding the respective APIs of each
    framework. To be able to effectively develop with these two amazing technologies,
    it is necessary to understand the design patterns and best practices for getting
    the best from these frameworks, and building on them in a consistent, proven manner.
    We hope this book will teach you more than just how to use Spring and Hibernate
    together. Our goal is to channel the development experience, lessons, and best
    practices we’ve seen work successfully in our experience, so that you can apply
    these skills and tools in your own applications.


    Throughout these pages, we will introduce core Hibernate fundamentals, demonstrating
    how the framework can be best utilized within a Spring context. We will start
    with foundational concepts, such as strategies for developing an effective domain
    model and DAO layer, and then move into querying techniques using HQL, JPQL, and
    the Criteria API. After fundamental concepts are introduced, we will move on to
    more advanced topics, such as fetching and caching strategies. We will also illustrate
    several approaches for architecting a transactional service facade. Both programmatic
    and declarative transactions will be examined, showcasing the benefits of using
    Spring for expressing transactional semantics.


    *Spring Persistence with Hibernate* will also introduce JPA, covering its history
    and the ways in which Hibernate influenced its development. We will discuss the
    benefits of following the JPA standard, as well as when it makes sense to utilize
    Hibernate-specific features. The book will also introduce Grails and GORM, illustrating
    the differences between the DAO and Active Record patterns. We will port our sample
    application (which will be developed in the course of the book) into both Grails
    and Spring Roo, highlighting the benefits and differences of using a rapid-development,
    convention-over-configuration platform. In these sections, we will explore topics
    related to concurrency/optimistic locking, Hibernate Session state, caching approaches,
    and transaction management.


    The last part of the book will introduce several advanced techniques, important
    for working with enterprise Spring/Hibernate applications. We will illustrate
    some of the pitfalls with integrating legacy databases, as well as best practices
    for developing REST web services, handling Hibernate proxies and lazy collections,
    as well as building search functionality using Hibernate-Search.


    Here are some of the main topics we will discuss in this book:


    xv


    ■ PREFACE


    CONTENTS


    • Basic Spring Framework features such as IoC and AOP


    • Core concepts for architecting a well-layered persistence tier


    • JPA concepts and steps for integrating JPA


    • Foundational and advanced concepts for working with Hibernate


    • Hibernate querying techniques


    • DAO and Service Facade layer development


    • Grails, along with the introduction of Active-Record Pattern


    • Introduction of Spring Roo


    • Building a REST web service


    • Translating between a domain model and a DTO using Dozer


    • Leveraging other frameworks and technologies, such as Hibernate-Search


    • Advanced Caching and Integration strategies


    xvi


    xvi


    **C H A P T E R 1**


    ■ ■ ■


    **Architecting Your Application with**


    **Spring, Hibernate, and Patterns**


    Persistence is typically the lifeblood of an application, providing the long-term
    memory that software requires in order to be useful across multiple invocations.
    Despite its importance, the architecture of a persistence tier is rarely granted
    adequate consideration during the design or implementation stages of an application.
    The consequences of this lack of planning can be far-reaching and devastating
    to an organization.


    The primary goal of this book is to provide you with the best practices, tools,
    and strategies required to architect and implement a solid and effective persistence
    tier. Many of the concepts found on these pages were gleaned from real-world,
    practical experience designing and building web applications intended to scale
    to millions of daily users. Our objective is to illustrate the patterns and approaches
    that have worked for us, while examining the integration details for using Spring
    and Hibernate in your own applications.


    One important lesson we’ve acquired over the years is that it’s often best to
    learn by example. To this end, we will be building a real-world application over
    the course of the book: an Image Gallery web application, which allows users to
    view slideshows and exhibitions curated by administrators. To emphasize proven,
    pragmatic solutions and architectural patterns for building scalable and maintainable
    applications, each chapter will focus on a different aspect of application development,
    in regards to persistence. Through illustrated code samples and discussion, we
    will trace the design, architecture, and implementation of a real working application.
    Starting with the foundation, each successive chapter will build upon the previous
    one, adding new layers, features, and tests. And of course, as with any real-world
    application, we will do significant refactoring as we discover new capabilities
    of Spring and Hibernate, as well as alternative strategies and frameworks. In
    fact, the last two chapters will re-architect our Image Gallery application entirely,
    as we examine two new frameworks founded on the concept of “convention over configuration.”
    Intended for a more rapid style of development, Grails and Roo offer a more holistic
    and consistent development environment with powerful features popularized by frameworks
    from dynamic languages, such as Ruby on Rails and Django.


    The Benefit of a Consistent Approach


    As you will learn throughout this book, the manner in which data is saved and
    queried is an integral part of every application. In fact, the persistence layer
    often serves as the foundation upon which an application is built. Building on
    top of this foundation are the three core components of a standard Spring-based
    persistence tier: the domain model, the Data Access Object layer, and the service
    facade.


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    Don’t worry if some of these terms are unfamiliar to you. In the following chapters,
    we will explain the purpose and function of each of these components, demonstrating
    the role each plays in an application.


    While we don’t suggest that there is only one correct approach to architecting
    an application, we do want to emphasize the benefit of using key design patterns
    and best practices. This is a theme that you will see cropping up over and over
    again.


    The Significance of Dependency Injection


    The Spring Framework has helped to take much of the guesswork out of designing
    and building an application. It has become the de facto standard for integrating
    disparate components and frameworks, and has evolved far beyond its dependency
    injection roots. The purpose of dependency injection is to decouple the work of
    resolving external software components from your application business logic.'
