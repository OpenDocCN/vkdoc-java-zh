  raw: 'Not surprisingly, the **grails-app/conf** directory holds the application’s
    configuration. Grails was designed to be very modular in nature, so it isn’t always
    necessary to explicitly configure each one of your dependencies. However, since
    Grails is really a Spring application at its core, the **grails-app/conf/spring/resources.groovy**
    file can be used to configure your dependencies. Although this is a Spring configuration
    file, you’ll notice that it isn’t in XML format. Grails provides a custom domain-specific
    language (DSL) to configure your Spring beans, and since this file is essentially
    executable Groovy code, it can be a lot more flexible than a standard XML-based
    configuration.


    ■ **Note** The Groovy default application configuration approach uses a **resources.groovy**
    file. You can instead create a **resources.xml** file, which allows the use of
    the more standard XML-based Spring configuration.


    Using the Spring DSL is fairly straightforward. As an example, suppose we want
    to create an e-mail service, so that we can notify end users via e-mail when new
    images are added to the gallery. We want to configure the Spring e-mail component
    within our **resources.groovy** file so that user can send e-mail from within
    our application. Here is how this configuration might look: 194


    CHAPTER 11 ■ GORM AND GRAILS


    **beans = {**


    **javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl) {**


    **host = ''smtp.prospringhibernate.com''**


    **}**


    **}**


    The pattern is fairly intuitive. The bean name is defined first, followed by the
    class name within parentheses. Properties within the bean are then configured
    within a closure block, which is the part of the code within curly braces (**{}**).


    If we want to inject our **javaMailSender** bean into a Grails service or controller,
    we can simply rely on default autowiring by name, by declaring a property named
    **javaMailSender** within the appropriate Grails service or controller class:


    **class EmailService {**


    **def javaMailSender**


    **}**


    Similarly, if we want to reference our Grails **EmailService** within another
    bean configured within our **resources.groovy** file, we use its implicit bean
    name—in this case, **emailService**. For instance, we might define a **NotificationComponent**
    bean within our **resources.groovy** file as follows: **beans = {**


    **notificationComponent(com.prospringhibernate.NotificationComponent) {bean ->**
    **emailService = ref("emailService")**


    **bean.factoryMethod = "getInstance"**


    **bean.singleton = "false"**


    **defaultNotificationMethods = ["email", "sms"]**


    **}**


    **}**


    Notice that we’ve declared a bean parameter at the top of the block using **bean
    ->** . By declaring a bean parameter, we are able to specify more explicit details
    related to the type of bean we are configuring. In this case, we specified a **factoryMethod**
    of **getInstance**, which ensures that new instances of this bean will be instantiated
    by calling **getInstance()**. We have also specified that this is not a singleton
    bean.


    Also notice that we have injected a reference to our **EmailService** by using
    the convention **ref(" *BEANNAME*")**, where ***BEANNAME*** is the name of our
    **EmailService** bean. We are able to apply most of our Spring configuration knowledge
    to this Groovy-based DSL. However, notice the flexibility advantage over XML in
    the following example:


    **beans = {**


    **javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl) {**


    **if (Environment.getCurrent() == "production") {**


    **host = "smtp.prospringhibernate.com"**


    **} else {**


    **host = "smtp.dev.prospringhibernate.com"**


    **}**


    **}**


    **}**


    Clearly, interpretable code has its benefits over static XML.


    CHAPTER 11 ■ GORM AND GRAILS


    This overview only touches on some of the configuration options for Grails. It
    is also possible to configure dynamic bean names, as well as specify property
    placeholders and override configuration.


    ■ **Note** The **grails-app/conf/Bootstrap.groovy** file provides simple hooks
    (**init()** and **destroy()**) for handling application startup and shutdown events.
    During development, **Bootstrap.groovy** is an effective means for seeding your
    application’s database with default data.


    Configuring Your Application


    The **grails-app/conf/Config.groovy** file is a centralized location for specifying
    key configuration details about your Grails application. This file contains information
    about the character encoding your application should use, as well as logging details
    (using log4j).


    Grails leverages the innate concept of environments to facilitate the creation
    and separation of different development and deployment scenarios. For instance,
    you will likely need to use a different database (requiring variant configuration
    details) for development or testing than you would for your production deployment.
    These concepts are built into the Grails core, making it easy to test with a development
    database and then deploy your application to production for use with the live
    database, without needing to remember to swap out the configuration. Environment-specific
    details are present in several key configuration files.


    The **Config.groovy** file contains an initial block of code to specify the default
    server URL for production:


    **environments {**


    **production {**


    **grails.serverURL = "http://www.changeme.com"**


    **}**


    **}**


    If you want to specify a different URL for development, you can modify the configuration
    snippet accordingly:


    **environments {**


    **production {**


    **grails.serverURL = "http://www.prospringhibernate.com""**


    **}**


    **development {**


    **grails.serverURL = "http://www.prospringhibernate.com"**


    **}**


    **}**


    There are no constraints on the kinds of environments your application defines
    or uses. You can add as many environments as you see fit. This can come in handy
    for your organization’s development process, build cycle, or testing strategy.


    CHAPTER 11 ■ GORM AND GRAILS


    Configuring Your Datasource


    Since most web applications require a database, Grails defines a file specifically
    for configuring datasource-related details: **grails-app/conf/DataSource.groovy**.
    This file also uses a custom Groovy-based DSL, making this configuration clear
    and concise. The environment concept is built into this file as well. Properties
    can be configured at a global level if they apply to all environments. Environment-specific
    configuration, however, should be nested within the appropriate environment block.


    In the case of our gallery application, here’s what our **DataSource.groovy**
    file might look like (keep in mind that most of this file is already created for
    you, so you need to configure only the details that are specific to your application):


    **dataSource {**


    **pooled = true**


    **driverClassName = "org.hsqldb.jdbcDriver"**


    **username = "sa"**


    **password = ""**


    **}**


    **hibernate {**


    **cache.use_second_level_cache = true**


    **cache.use_query_cache = true**


    **cache.provider_class = ''net.sf.ehcache.hibernate.EhCacheProvider''**


    **}**


    **// environment specific settings**


    **environments {**


    **development {**


    **dataSource {**


    **dbCreate = "create-drop"**


    **// one of ''create'', ''create-drop'',''update''**


    **url = "jdbc:hsqldb:mem:devDB"**


    **}**


    **}**


    **test {**


    **dataSource {**


    **dbCreate = "update"**


    **url = "jdbc:hsqldb:mem:testDb"**


    **}**


    **}**


    **production {**


    **dataSource {**


    **dbCreate = "update"**


    **url = "jdbc:hsqldb:file:prodDb;shutdown=true"**


    **}**


    **}**


    **}**'
  trans: '

    毫不意外，**grails-app/conf** 目录存放着应用程序的配置。Grails 在设计上本质上是高度模块化的，因此并不总是需要显式配置每一个依赖项。然而，由于
    Grails 的核心实际上是一个 Spring 应用程序，**grails-app/conf/spring/resources.groovy** 文件可用于配置你的依赖项。尽管这是一个
    Spring 配置文件，但你会注意到它并非 XML 格式。Grails 提供了一种自定义领域特定语言（DSL）来配置你的 Spring Bean，并且由于这个文件本质上是可执行的
    Groovy 代码，它比标准的基于 XML 的配置要灵活得多。


    ■ **注意** Groovy 默认的应用程序配置方法使用 **resources.groovy** 文件。你也可以创建一个 **resources.xml**
    文件，从而使用更标准的基于 XML 的 Spring 配置。


    使用 Spring DSL 相当直接。举个例子，假设我们想创建一个电子邮件服务，以便在向图库添加新图片时通过电子邮件通知最终用户。我们希望在 **resources.groovy**
    文件中配置 Spring 的电子邮件组件，以便用户能够从我们的应用程序内部发送电子邮件。以下是该配置可能的样子：


    **beans = {**


    **javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl) {**


    **host = ''smtp.prospringhibernate.com''**


    **}**


    **}**


    这种模式相当直观。首先定义 Bean 名称，后面括号内是类名。然后，Bean 内部的属性在闭包块（即花括号 **{}** 内的代码部分）中进行配置。


    如果我们想将 **javaMailSender** Bean 注入到 Grails 服务或控制器中，只需在相应的 Grails 服务或控制器类中声明一个名为
    **javaMailSender** 的属性，就可以简单地依赖默认的按名称自动装配：


    **class EmailService {**


    **def javaMailSender**


    **}**


    类似地，如果我们想在 **resources.groovy** 文件中配置的另一个 Bean 中引用 Grails 的 **EmailService**，我们使用其隐式
    Bean 名称——在本例中为 **emailService**。例如，我们可以在 **resources.groovy** 文件中定义一个 **NotificationComponent**
    Bean，如下所示：


    **beans = {**


    **notificationComponent(com.prospringhibernate.NotificationComponent) {bean ->**
    **emailService = ref("emailService")**


    **bean.factoryMethod = "getInstance"**


    **bean.singleton = "false"**


    **defaultNotificationMethods = ["email", "sms"]**


    **}**


    **}**


    请注意，我们在块的开头使用 **bean ->** 声明了一个 Bean 参数。通过声明 Bean 参数，我们能够指定与所配置 Bean 类型相关的更详细的信息。在本例中，我们指定了
    **factoryMethod** 为 **getInstance**，这确保了通过调用 **getInstance()** 来实例化该 Bean 的新实例。我们还指定了这不是一个单例
    Bean。


    还要注意，我们通过使用约定 **ref(" *BEANNAME*")** 注入了对 **EmailService** 的引用，其中 ***BEANNAME***
    是我们的 **EmailService** Bean 的名称。我们可以将大部分 Spring 配置知识应用于这个基于 Groovy 的 DSL。然而，请注意以下示例中相对于
    XML 的灵活性优势：


    **beans = {**


    **javaMailSender(org.springframework.mail.javamail.JavaMailSenderImpl) {**


    **if (Environment.getCurrent() == "production") {**


    **host = "smtp.prospringhibernate.com"**


    **} else {**


    **host = "smtp.dev.prospringhibernate.com"**


    **}**


    **}**


    **}**


    显然，可解释的代码相比静态 XML 有其优势。


    本概述仅涉及 Grails 的部分配置选项。还可以配置动态 Bean 名称，以及指定属性占位符和覆盖配置。


    ■ **注意** **grails-app/conf/Bootstrap.groovy** 文件提供了简单的钩子（**init()** 和 **destroy()**）来处理应用程序的启动和关闭事件。在开发期间，**Bootstrap.groovy**
    是使用默认数据填充应用程序数据库的有效方法。


    配置你的应用程序


    **grails-app/conf/Config.groovy** 文件是指定 Grails 应用程序关键配置细节的集中位置。该文件包含有关应用程序应使用的字符编码以及日志记录详细信息（使用
    log4j）的信息。


    Grails 利用环境的内在概念来促进不同开发和部署场景的创建与分离。例如，对于开发或测试，你可能需要使用与生产部署不同的数据库（需要不同的配置细节）。这些概念内置于
    Grails 核心中，使得使用开发数据库进行测试，然后将应用程序部署到生产环境以使用实际数据库变得容易，而无需记住交换配置。环境特定的详细信息存在于几个关键的配置文件中。


    **Config.groovy** 文件包含一段初始代码，用于指定生产环境的默认服务器 URL：


    **environments {**


    **production {**


    **grails.serverURL = "http://www.changeme.com"**


    **}**


    **}**


    如果你想为开发环境指定不同的 URL，可以相应地修改配置片段：


    **environments {**


    **production {**


    **grails.serverURL = "http://www.prospringhibernate.com""**


    **}**


    **development {**


    **grails.serverURL = "http://www.prospringhibernate.com"**


    **}**


    **}**


    对于应用程序定义或使用的环境类型没有限制。你可以根据需要添加任意数量的环境。这对于你组织的开发流程、构建周期或测试策略来说可能会派上用场。


    配置你的数据源


    由于大多数 Web 应用程序都需要数据库，Grails 专门定义了一个文件用于配置数据源相关的详细信息：**grails-app/conf/DataSource.groovy**。该文件也使用自定义的基于
    Groovy 的 DSL，使得配置清晰简洁。环境概念也内置于此文件中。如果属性适用于所有环境，则可以在全局级别进行配置。然而，特定于环境的配置应嵌套在相应的环境块内。


    以我们的图库应用程序为例，**DataSource.groovy** 文件可能如下所示（请记住，该文件的大部分内容已经为你创建，因此你只需要配置特定于应用程序的详细信息）：


    **dataSource {**


    **pooled = true**


    **driverClassName = "org.hsqldb.jdbcDriver"**


    **username = "sa"**


    **password = ""**


    **}**


    **hibernate {**


    **cache.use_second_level_cache = true**


    **cache.use_query_cache = true**


    **cache.provider_class = ''net.sf.ehcache.hibernate.EhCacheProvider''**


    **}**


    **// environment specific settings**


    **environments {**


    **development {**


    **dataSource {**


    **dbCreate = "create-drop"**


    **// one of ''create'', ''create-drop'',''update''**


    **url = "jdbc:hsqldb:mem:devDB"**


    **}**


    **}**


    **test {**


    **dataSource {**


    **dbCreate = "update"**


    **url = "jdbc:hsqldb:mem:testDb"**


    **}**


    **}**


    **production {**


    **dataSource {**


    **dbCreate = "update"**


    **url = "jdbc:hsqldb:file:prodDb;shutdown=true"**


    **}**


    **}**


    **}**

    '
- fmt: "# Notice\n\nNotice that the `dataSource` property is specified at the top\
    \ of the file as well as within the `environments` block. Global details, such\
    \ as database connection pooling settings and the JDBC driver, are configured\
    \ globally by placing these details within a top-level `dataSource` block. Environment-specific\
    \ details, such as the database URL for the `development`, `test`, and `production`\
    \ environments, are configured in the `dataSource` blocks within their respective\
    \ environments. If you need to use a different JDBC driver for production, you\
    \ could either move these details within the appropriate environment blocks or\
    \ simply override the globally configured details within the appropriate environment.\
    \ Again, the types of environments you can configure are not restricted: `development`,\
    \ `test`, and `production` are just default environments created by the Grails\
    \ templates.\n\n# Mapping URLs\n\nThe last file we need to cover in the `grails-app/conf`\
    \ directory is `UrlMappings.groovy`. This file provides an amazingly flexible\
    \ construct for associating URL patterns with a particular controller and action.\
    \ For example, here’s how we might relate the pretty URL `/category/panoramas`\
    \ with the `CategoryController`, specifying that the `panoramas` category be displayed:\n\
    \n```\nclass UrlMappings {\n\n    static mappings = {\n\n        \"/$controller/$action?/$id?\"\
    {\n            constraints {\n            }\n        }\n\n        \"/category/$categoryName\"\
    (controller: CategoryController, action: \"displayCategory\")\n\n        \"/\"\
    (view:\"/index\")\n\n        \"500\"(view:'/error')\n    }\n}\n```\n\nThe mapping\
    \ we described is actually the second block in this example. The first component\
    \ of the mapping is the part in quotes. We are essentially defining a regular\
    \ expression that starts with `/category/`. The `$categoryName` defines a parameter\
    \ name that will be passed to your controller automatically, using the specified\
    \ chunk of the URL where the parameter name resides. In our example, the part\
    \ of the URL after `/category/` will be extracted and then stored in the parameter\
    \ named `categoryName`.\n\nIf you look at the first block in the example, you\
    \ will notice the default `URLMapping`. In this scenario, we are defining `$controller`\
    \ and `$action` parameters. These are special keywords; instead of denoting a\
    \ particular parameter, they define the controller to which the matching request\
    \ should be directed, as well as the corresponding action. In our category listing\
    \ page example, we haven’t defined a `$controller` within our mapping expression,\
    \ so we instead specify this explicitly, as follows: `(controller: CategoryController,\
    \ action: \"displayCategory\")`. Now that we’ve looked at the Grails application\
    \ directory structure, let’s move on to defining our Grails domain model.\n\n\
    # Defining the Grails Domain Model\n\nBy default, Grails generates three core\
    \ layers, which resemble the tiers we’ve discussed earlier in this book: domain,\
    \ controller, and service. To provide consistency and better enforce convention,\
    \ Grails enforces a directory structure to help organize and sequester classes\
    \ from each respective layer. The domain model typically serves as the foundation\
    \ for a Grails application, so it is usually the first layer to be defined.\n\n\
    As you probably already guessed, the domain model classes all go into the `grails-app/domain`\
    \ directory. By default, all domain classes will live in the default Grails package.\
    \ However, you are free to define your own package structure, and for larger applications,\
    \ this is recommended. Additionally, if you will need to access any of your Grails\
    \ code from Java, you must keep your Grails classes within a package, or it will\
    \ be difficult to access them outside the Grails/Groovy world. You can also have\
    \ your Groovy classes implement an interface that is accessible to Java, as a\
    \ means to better integrate your Grails code with Java.\n\nLet’s begin our Grails-based\
    \ gallery application by defining our `Person` domain entity. Grails provides\
    \ scripts to help create most of the core Grails archetypes, each corresponding\
    \ to a particular template. You can edit these templates if you want to change\
    \ the way your default views or domain and service classes are created. To do\
    \ this, you will need to run `grails install-templates`. You will then be able\
    \ to access (and modify) the templates from within the `src/templates` directory.\
    \ For most Grails development, the default templates are just fine.\n\nTo create\
    \ our `Person` domain class, run the following:\n\n```\ngrails create-domain-class\
    \ Person\n```\n\nOnce this script completes, you will find a `Person.groovy` class\
    \ within the `grails-app/domain` directory. Grails uses Hibernate behind the scenes\
    \ to persist `Person` instances to, and retrieve them from, the database. Unlike\
    \ Hibernate, Grails does not require any mapping files or annotations, since convention\
    \ helps Grails infer most of what it needs to handle persistence for your domain\
    \ model.\n\nNow that we’ve created our stub for our `Person` domain entity, let’s\
    \ define the rest of the properties:\n\n```\nclass Person {\n\n    String firstName;\n\
    \    String lastName;\n    String username;\n    String password;\n    String\
    \ email;\n    Integer roleLevel;\n\n    public static final USER_ROLE = 1;\n \
    \   public static final ADMIN_ROLE = 2;\n    public static final SUPERUSER_ROLE\
    \ = 4;\n    public static final CONTACT_USER = 16;\n    public static final COMMENT_USER\
    \ = 64;\n\n    static constraints = {\n        firstName(maxSize:255, unique:\
    \ false, blank: false)\n        lastName(maxSize:255, unique: false, blank: false)\n\
    \        username(maxSize:255, unique: true, blank: false)\n        password(maxSize:25,\
    \ unique: false, blank: false)\n        email(email:true, blank: false, unique:\
    \ false)\n        roleLevel()\n    }\n\n    static mapping = {\n        cache\
    \ true\n    }\n}\n```\n\nThe first thing you will probably notice in this class\
    \ is just how concise this code is. Most of the properties should be self-explanatory.\
    \ Since we are using Groovy, there is no need to define getters or setters (these\
    \ are implicit within Groovy). Also notice that there are no properties specified\
    \ for `id` or `version`; these fields are created by Grails automatically.\n\n\
    ## Adding Constraints and Validation\n\nLet’s now look at the `constraints` block.\
    \ Constraints allow you to better define each field within your domain model,\
    \ providing clues and requirements to Grails as to how your database schema should\
    \ be modeled. A number of constraint options are available, but here are some\
    \ of the most useful:\n\n- `blank`\n- `minSize`\n- `maxSize`\n- `range`\n- `unique`\n\
    - `size`\n- `range`\n- `inList`\n- `email`\n- `creditCard`\n- `matches`\n- `nullable`\n\
    \nSome of these constraints can be extremely powerful. For example, the `matches`\
    \ constraint allows you to specify a regular expression that will be used to validate\
    \ the value in the specified field, ensuring it matches the specified regular\
    \ expression.\n\nThe domain-specific constraints, such as `email` and `creditCard`,\
    \ will help to ensure that a field conforms to a valid e-mail address or credit\
    \ card number, respectively.\n\nIf you need a custom constraint, Groovy includes\
    \ a construct that allows you to define your own. You specify the property, followed\
    \ by a mapping of constraint types and their corresponding values. Here is an\
    \ example:\n\n```\nusername(blank: false, maxSize: 255, unique: true)\n```\n\n\
    This will ensure that the `username` value cannot be left blank and that the database\
    \ field has a maximum size of 255 characters. Additionally, a `unique` constraint\
    \ will also be added to the `username` database field.\n\nConstraints come into\
    \ play when you attempt to save a domain entity to the database. If a particular\
    \ field is not validated, an error will be attached to a dynamic `errors` property\
    \ on your domain instance."
