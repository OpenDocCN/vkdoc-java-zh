- fmt: '# Gavin King and the History of Hibernate


    Gavin King set out to build Hibernate in 2001 to provide an alternative to suffering
    through the well-known problems associated with EJB 2 entity beans. He felt that
    he was spending more time thinking about persistence than the business problems
    of his clients. Hibernate was intended to enhance productivity and enable developers
    to focus more on object modeling, and to simplify the implementation of persistence
    logic. Hibernate 1.0 was released in 2002, Hibernate 2.0 was released in 2003,
    and Hibernate 3.0 was released in 2005. Throughout that entire period, Hibernate
    gained a huge amount of momentum as a free, POJO-based ORM that was well documented
    and very approachable for developers. Hibernate was able to deliver a means to
    develop enterprise applications that was practical, simple, elegant, and open
    source.


    ## Persistence with Hibernate


    Throughout the first five years of Hibernate’s existence, it did not adhere to
    any specification, and it wasn’t a part of any standards process. Hibernate was
    just an open source project that you could use to solve real problems and get
    things done. During this time, many key players, including Gavin King himself,
    came together to begin working on JSR 220: Enterprise JavaBeans 3.0. Their mission
    was to create a new standard that remedied the pain points associated with EJBs
    from a developer’s point of view. As the expert group worked through the EJB 3.0
    specification, it was determined that the persistence component for interacting
    with RDBMSs should be broken off into its own API. The Java Persistence API (JPA)
    was born, building on many of the core concepts that had already been implemented
    and proven in the field by ORMs like TopLink and Hibernate. As a part of the JSR
    220 expert group, Oracle provided the reference implementation of JPA 1.0 with
    its TopLink product. JSR 220 was finalized in 2006, and EJB 3 played a central
    role in Sun’s definition of Java Enterprise Edition 5, or JEE 5.


    > **Note**: Please pay attention to the change in notation from J2EE to JEE. J2EE
    is now a legacy designation for the Enterprise Edition of Java. It’s time to fix
    your résumé! `s/J2EE/JEE/`


    This evolution played out perfectly for JPA. JPA 1.0 was a huge milestone for
    persistence in Java. However, many features that were essential for developers
    already using tools like Hibernate didn’t make the cut due to time constraints.
    JPA 2.0 added many important features, including the Criteria API, cache APIs,
    and enhancements to the Java Persistence Query Language (JPQL), JPA’s object-oriented
    query language. The JPA 2.0 standard was finalized in December 2009 as a new,
    stand-alone JSR that was targeted for inclusion in the Java EE 6 specification.
    Oracle donated the source code and development resources for TopLink to Sun in
    order to create the EclipseLink project. EclipseLink went on to become the reference
    implementation for JPA 2.0. Hibernate 3.5 was released in the spring of 2010 with
    full support for JSR 317: JPA 2.0.


    That’s a long and sordid history, but things have worked out quite nicely. JPA
    now encompasses most of the functionality that you need for developing large-scale
    enterprise Java applications.


    ### How About JDO?


    Persistence standards in Java aren’t quite as clear as one might like. You see,
    JDO is still very much alive and well. JSR 243 ushered in JDO 2.0 in 2006 and
    has seen several minor revisions since. In many ways, JDO is a superset of JPA.
    As a result, JDO implementers like DataNucleus have been able to incorporate both
    the JDO specification and the JPA specification into their products. For a variety
    of reasons, JDO isn’t implemented by Hibernate, and it isn’t incorporated into
    the EJB 3 specification at all. Nevertheless, JDO has been enjoying a bit of a
    resurgence in recent years.


    Because JDO is datastore-agnostic, while JPA is wholly about relational datastores,
    there are many interesting use cases that aren’t suitable for JPA but hit a sweet
    spot for JDO. For instance, JDO is a key ingredient for developing Java applications
    on the Google App Engine (GAE). GAE is a “platform as a service” (PaaS), which
    is built on top of Google’s BigTable custom datastore rather than an RDBMS.


    So why not just use JDO and forgo the creation of JPA in the first place? The
    reasons for competing specifications are numerous—some technical, some ideological,
    and some political. The largest companies in the industry heavily influence the
    JCP, and they obviously sometimes have competing motivations.


    ## How Hibernate Fits In


    Now that we’ve talked about the standards, let’s look at where Hibernate fits
    in and dispel a few common misconceptions.


    First of all, Hibernate 3 is not EJB 3 and vice versa. EJB 3 is a specification
    to provide a distributed, container-managed, server-side component architecture.
    EJB 3 encapsulates several distinct specifications to facilitate many things,
    including distributed transaction management, concurrency control, messaging,
    web services, and security—just to name a few. The EJB 3 specification assumes
    persistence handling can be delegated to a JPA provider.


    Secondly, Hibernate is not JPA. Rather, Hibernate is one of many frameworks that
    provide a standards-compliant implementation of JPA. The first release of Hibernate
    to support JPA 1.0 was Hibernate 3.2, which became generally available in the
    fall of 2006.


    There are often specialized features provided by frameworks like Hibernate that
    fall outside the JPA specification. As such, Hibernate can be thought of as a
    superset of JPA. On one end of the spectrum, Hibernate’s architecture allows you
    to use Hibernate Core without using any parts of the JPA specification at all.
    On the polar opposite end of the spectrum, you can strictly use only the pieces
    of Hibernate that adhere to the JPA specification. Strict adherence to the JPA
    specification ensures true frictionless portability to other JPA implementations
    like Apache’s OpenJPA project.


    When using Hibernate, we recommend that developers stick to the JPA specification
    as closely as possible, but don’t drive yourself crazy. Because open source projects
    tend to evolve at a much more rapid pace than the JCP, frameworks like Hibernate
    will offer solutions to problems not addressed by the standards process. If these
    custom offerings ease developer pain, please, please be pragmatic and take advantage
    of them! This is part of the beauty of the standards process—implementers of the
    various specifications are free to innovate, and the best, most successful ideas
    are likely to be incorporated into future revisions of the specification.


    The JPA specification defines a set of annotations that can be applied to domain
    classes in order to map objects to database tables and member variables to columns.
    JPA also features a SQL-like language called JPQL, which can query the database
    with an object-oriented flavor. To access your database-mapped domain model, or
    to execute JPQL queries, you use `javax.persistence.EntityManager`.


    Prior to JPA, Hibernate applications revolved around using Hibernate’s `SessionFactory`
    and `Session` interfaces. Simply speaking, Hibernate’s `SessionFactory` is aware
    of global configuration details, while the `Session` scope is limited to the current
    transaction. The JPA `EntityManager` serves as a cross between Hibernate’s `SessionFactory`
    and `Session`; therefore, it is aware of both your database connection configuration
    and the transaction context. In this chapter, you’ll learn a bit about JPQL, `EntityManager`,
    and how they interact with Spring, but mostly, you’ll learn how to go about setting
    up an application to use Hibernate’s implementation of the JPA 2.0 specification.


    ### JPA Interface Hierarchy'
