  raw: 'One of the really interesting details here is that even though we are invoking
    a Lucene query, we are working with entities at the JPA level. This means that
    we don’t need to worry about correlating the results of a Lucene query to load
    a series of JPA entities. Hibernate Search takes care of these details for us,
    providing a very powerful abstraction over Lucene to simulate a completely Hibernate
    or JPA-centric world.


    Summary


    In this chapter, we’ve demonstrated how to integrate and extend Hibernate in order
    to implement more advanced application features. We discussed some of the challenges
    with exposing RESTful web services on Hibernate-powered applications, and how
    to simplify a serialization or marshaling strategy. We examined Spring 3’s new
    MVC capabilities, as well as its OXM abstraction for providing object-to-XML


    marshaling.


    We also discussed the DTO pattern, and how this strategy can reduce the complexities
    of serializing your domain model. However, translating a domain class to a DTO
    class (and back again) can be a source of defects and maintenance problems. One
    solution is to use a framework like Dozer. Dozer handles the mapping between two
    different classes, using convention over configuration and mapping configuration
    files. By abstracting these translation details to a specialized framework, the
    complexities inherent in a DTO mapping layer are significantly reduced.


    Providing full-text search capability is a very important and common requirement
    for many applications. Lucene is an open source Java framework that offers powerful
    indexing and search capability, but can be difficult to integrate into an application
    without requiring significant glue code to sync changes to the domain model with
    the Lucene index. Hibernate Search is a framework that bridges the gap between
    these two excellent frameworks, enhancing key Hibernate framework classes to offer
    Lucene querying and indexing capabilities. Hibernate Search allows developers
    to execute Lucene queries within the realm of Hibernate, so that search results
    return standard Hibernate entities.


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    Spring and Hibernate are amazing open source frameworks. However, building upon
    the foundations of these tools is the key to successful application development.
    Learning best practices for integrating your persistence tier with other frameworks
    is as important as learning the persistence framework itself.


    **C H A P T E R 1 1**


    ■ ■ ■


    **GORM and Grails**


    GORM is the end result of the synergistic combination of Spring, Hibernate, and
    Groovy. Built as one of the core components of Grails—a rapid development web
    framework influenced by Ruby on Rails—


    GORM is a different kind of ORM layer that leverages the dynamic capabilities
    of the Groovy language to simplify querying and persisting an application’s domain
    model.


    At the foundation of GORM lies the same strategy responsible for Ruby on Rails’
    success: *convention* *over configuration*. GORM drastically simplifies the amount
    of coding and effort required to define your application’s persistence logic.
    With GORM and Grails, there is no need to define a DAO layer. Instead, the *Active
    Record* design pattern is employed, consolidating persistence functionality into
    the domain class itself without requiring up-front development to add these features.
    This may seem a bit like magic, but this chapter will help you understand how
    GORM works under the hood, by tapping into the dynamic features of Groovy.


    Although GORM is the core persistence component within the Grails web framework,
    it can also be used outside Grails. By embedding GORM within a Spring application,
    you can benefit from the efficiency and terseness of Grails within a more standard
    architecture.


    ■ **Note** Some may argue that Grails does not quite fit into a book about Spring
    and Hibernate. However, the Grails framework and GORM rely heavily on both Spring
    and Hibernate for much of the flexibility and persistence they afford. The benefits
    of this partnership are the longevity, enterprise strength, efficiency, and flexibility
    offered by Spring and Hibernate. Furthermore, SpringSource, the company behind
    the Spring Framework, recently acquired G2One, the company behind much of the
    Grails and Groovy development, demonstrating a clear alignment and dedication
    to Spring and Grails.


    A Crash Course in Groovy


    Grails and GORM came onto the scene as a result of the attention brought about
    by the success of the Ruby on Rails framework. Ruby on Rails took the mantras
    of “convention over configuration” and “don’t repeat yourself (DRY)” to a new
    level, significantly simplifying the effort required to create a new web application.
    Some of Ruby on Rails’ success stems from the fact that Ruby is a dynamic language,
    which brings a level of flexibility that is not easily attainable in the Java
    world. For instance, the capability to dynamically generate new behavior at runtime,
    in order to provide customized persistence and querying 189


    CHAPTER 11 ■ GORM AND GRAILS


    functionality tailored to the specific properties of the domain model, can’t be
    easily replicated in Java because the language doesn’t natively support the dynamic
    creation of new methods. Luckily, Groovy came onto the scene to bring this flexibility
    to the Java world.


    The most fundamental difference between Grails persistence and the other approaches
    we’ve discussed in this book is that Grails is the only strategy that doesn’t
    use Java. However, Groovy code runs in the JVM and so is bytecode-compatible with
    Java code. This also means that Groovy can utilize Java libraries, making the
    myriad of open source Java libraries accessible to this new language.


    Groovy is a dynamic language, which implies some significant differences from
    Java both syntactically and in the way Groovy can be used. Here, we’ll provide
    a brief introduction to Groovy, to help Java developers wrap their heads around
    some of the core differences between the two languages.


    One of the basic features of Groovy is its ability to dynamically add or modify
    behavior at runtime.


    As a brief, cursory example, let’s say we want to add a new method called **sayHello()**to
    our **Person** instance at runtime. This could be accomplished as follows:


    **Person.metaClass.sayHello = {**


    **println("Hello")**


    **}**


    Or we can make this a static method that takes a single parameter:


    **Person.metaClass.static.sayHello = {def name ->**


    **println("hello ${name}")**


    **}**


    In Groovy, every class holds a reference to a corresponding **metaClass** instance.
    Method calls to a particular class or instance are delegated to that class’s **metaClass,**
    which then calls a method named **invokeMethod**, passing along the name of the
    method to invoke and any corresponding parameters. So you can think of **metaClass**
    as an intermediary, or proxy of sorts, allowing more of a class’s behavior to
    be determined at runtime.


    By defining a new property on a particular class’s **metaClass**, we are effectively
    implementing new behavior at runtime. Once we have defined our **sayHello** property
    to reference a closure block, future calls to **Person.sayHello()** will end up
    being delegated to the functionality specified in our closure block.


    ■ **Note** For a given method, constructor, or property, the Groovy compiler actually
    generates a call to **MetaClass.invokeMethod()**, passing along the object, method
    name, and corresponding parameters. A Groovy object’s **metaClass** can then decide
    which code to invoke at runtime.'
  trans: '

    这里一个非常有趣的细节是，尽管我们调用了 Lucene 查询，但我们实际上是在 JPA 层面操作实体。这意味着我们无需担心如何关联 Lucene 查询结果来加载一系列
    JPA 实体。Hibernate Search 为我们处理了这些细节，它在 Lucene 之上提供了一个非常强大的抽象层，模拟出一个完全以 Hibernate
    或 JPA 为中心的世界。


    总结


    在本章中，我们演示了如何集成和扩展 Hibernate，以实现更高级的应用程序功能。我们讨论了在基于 Hibernate 的应用上暴露 RESTful Web
    服务时面临的一些挑战，以及如何简化序列化或编组策略。我们研究了 Spring 3 的新 MVC 功能，以及它用于提供对象到 XML 编组的 OXM 抽象。


    我们还讨论了 DTO 模式，以及该策略如何降低序列化领域模型的复杂性。然而，将领域类转换为 DTO 类（以及反向转换）可能会成为缺陷和维护问题的来源。一种解决方案是使用像
    Dozer 这样的框架。Dozer 通过约定优于配置和映射配置文件，处理两个不同类之间的映射。通过将这些转换细节抽象到专门的框架中，DTO 映射层固有的复杂性得到了显著降低。


    提供全文搜索功能是许多应用程序中非常重要且常见的需求。Lucene 是一个开源的 Java 框架，提供了强大的索引和搜索能力，但将其集成到应用程序中可能很困难，通常需要编写大量胶水代码来同步领域模型与
    Lucene 索引的变更。Hibernate Search 是一个桥接这两个优秀框架的桥梁，它增强了关键的 Hibernate 框架类，以提供 Lucene
    查询和索引能力。Hibernate Search 允许开发者在 Hibernate 的领域内执行 Lucene 查询，从而使搜索结果返回标准的 Hibernate
    实体。


    第 10 章 ■ 集成框架


    Spring 和 Hibernate 是令人惊叹的开源框架。然而，在这些工具的基础上进行构建是成功应用开发的关键。学习将持久层与其他框架集成的最佳实践，与学习持久化框架本身同样重要。


    **第 11 章**


    ■ ■ ■


    **GORM 与 Grails**


    GORM 是 Spring、Hibernate 和 Groovy 协同组合的最终产物。作为 Grails（一个受 Ruby on Rails 启发的快速开发
    Web 框架）的核心组件之一，GORM 是一种不同类型的 ORM 层，它利用 Groovy 语言的动态能力来简化应用程序领域模型的查询和持久化。


    GORM 的基础与 Ruby on Rails 成功的策略相同：*约定优于配置*。GORM 极大地简化了定义应用程序持久化逻辑所需的编码和工作量。使用 GORM
    和 Grails，无需定义 DAO 层。相反，它采用了*Active Record* 设计模式，将持久化功能整合到领域类本身中，而无需预先开发来添加这些功能。这看起来可能有点神奇，但本章将通过深入探讨
    Groovy 的动态特性，帮助你理解 GORM 在底层是如何工作的。


    尽管 GORM 是 Grails Web 框架内的核心持久化组件，但它也可以在 Grails 之外使用。通过将 GORM 嵌入到 Spring 应用程序中，你可以在更标准的架构中受益于
    Grails 的高效和简洁。


    ■ **注意** 有些人可能会认为 Grails 并不完全适合一本关于 Spring 和 Hibernate 的书。然而，Grails 框架和 GORM 在很大程度上依赖
    Spring 和 Hibernate 来提供它们大部分的灵活性和持久化能力。这种合作带来的好处是 Spring 和 Hibernate 所提供的长寿性、企业级强度、高效性和灵活性。此外，Spring
    框架背后的公司 SpringSource 最近收购了 G2One（Grails 和 Groovy 大部分开发工作背后的公司），这清楚地表明了 Spring
    和 Grails 的一致性和投入。


    Groovy 速成课程


    Grails 和 GORM 的出现，源于 Ruby on Rails 框架成功所带来的关注。Ruby on Rails 将“约定优于配置”和“不要重复自己（DRY）”的准则提升到了一个新的高度，极大地简化了创建新
    Web 应用所需的工作。Ruby on Rails 的成功部分源于 Ruby 是一种动态语言，它带来了在 Java 世界中不易实现的灵活性。例如，在运行时动态生成新行为，以提供针对领域模型特定属性定制的持久化和查询功能，这在
    Java 中很难复制，因为该语言本身不支持方法的动态创建。幸运的是，Groovy 的出现为 Java 世界带来了这种灵活性。


    Grails 持久化与本书中讨论的其他方法最根本的区别在于，Grails 是唯一不使用 Java 的策略。然而，Groovy 代码运行在 JVM 中，因此与
    Java 代码在字节码层面兼容。这也意味着 Groovy 可以使用 Java 库，使得这个新语言能够访问海量的开源 Java 库。


    Groovy 是一种动态语言，这意味着它在语法和使用方式上与 Java 存在一些显著差异。在这里，我们将对 Groovy 进行简要介绍，以帮助 Java 开发者理解这两种语言之间的一些核心差异。


    Groovy 的基本特性之一是其能够在运行时动态添加或修改行为。作为一个简短的示例，假设我们想在运行时向我们的 **Person** 实例添加一个名为 **sayHello()**
    的新方法。这可以通过以下方式实现：


    **Person.metaClass.sayHello = {**


    **println("Hello")**


    **}**


    或者我们可以将其变成一个接受单个参数的静态方法：


    **Person.metaClass.static.sayHello = {def name ->**


    **println("hello ${name}")**


    **}**


    在 Groovy 中，每个类都持有一个对应 **metaClass** 实例的引用。对特定类或实例的方法调用会被委托给该类的 **metaClass**，然后
    **metaClass** 会调用一个名为 **invokeMethod** 的方法，并传入要调用的方法名称和任何相应的参数。因此，你可以将 **metaClass**
    视为一种中介或代理，使得类的更多行为可以在运行时确定。


    通过在特定类的 **metaClass** 上定义一个新属性，我们实际上是在运行时实现了新的行为。一旦我们将 **sayHello** 属性定义为引用一个闭包块，未来对
    **Person.sayHello()** 的调用最终将被委托给我们闭包块中指定的功能。


    ■ **注意** 对于给定的方法、构造函数或属性，Groovy 编译器实际上会生成对 **MetaClass.invokeMethod()** 的调用，并传入对象、方法名称和相应的参数。然后，Groovy
    对象的 **metaClass** 可以在运行时决定调用哪个代码。

