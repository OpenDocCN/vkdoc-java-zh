- fmt: "# Part of Spring’s momentum stems from the way it enables applications to\
    \ deliver enterprise-level features, such as declarative transactions and security,\
    \ without requiring the overhead and complexity of an Enterprise JavaBean (EJB)\
    \ container or forcing developers to grapple with the details of specific technologies\
    \ or standards. Time has proven EJB, although powerful in theory, to be a victim\
    \ of overengineering. Spring and Hibernate owe much of their success to the fact\
    \ that they provide a more reasonable and effective solution than the EJB standard.\
    \ While Spring offers a simpler approach to declarative transaction management,\
    \ Hibernate provides a more robust and intuitive ORM abstraction.\n\nBoth frameworks\
    \ were built and popularized by the growing need for a solution that was less\
    \ complex than previous offerings. With the success of Spring and Hibernate came\
    \ a stronger emphasis on building applications that were simpler and lighter weight,\
    \ significantly increasing both ease of maintenance and scalability.\n\nAlthough\
    \ dependency injection was Spring’s core purpose, the framework has evolved far\
    \ beyond its original IoC foundation. The Spring Framework has expanded into other\
    \ areas that naturally blend with its IoC roots. Spring now provides a pluggable\
    \ transactional management layer, AOP support, integration points with persistence\
    \ frameworks (such as Hibernate), and a flexible web framework, called Spring\
    \ MVC. The addition of these features was a gradual process, spurred by demand\
    \ and necessity.\n\nAs Hibernate’s popularity surged, developers began to rely\
    \ on Spring’s persistence abstractions to simplify the often daunting task of\
    \ integrating Hibernate into an application. Thanks to Spring, the process of\
    \ getting up and running with Hibernate became a great deal easier. Developers\
    \ could start with a Spring configuration file that not only bootstrapped a Hibernate\
    \ `SessionFactory` (allowing configuration details to be specified via standard\
    \ XML), but also streamlined the invocation of myriad Hibernate operations through\
    \ the use of well-crafted abstractions founded on time-tested design patterns,\
    \ such as `HibernateTemplate` and `OpenSessionInView`. We will discuss these core\
    \ SpringHibernate integration details in the next few chapters. The important\
    \ point here is that combining Spring and Hibernate affords developers an extremely\
    \ powerful solution.\n\nNot only does Spring simplify the integration of Hibernate,\
    \ but it also reduces the coupling of Hibernate to an application. If the need\
    \ arises to switch to a different ORM or persistence technology, this migration\
    \ effort becomes much easier because there are few direct dependencies on Hibernate\
    \ itself. For example, Spring provides a generic exception hierarchy for persistence-related\
    \ errors.\n\nAlthough not required, it is considered good practice to convert\
    \ Hibernate exceptions to Spring’s generic exception hierarchy, which further\
    \ decouples your application from Hibernate. Spring includes built-in mechanisms\
    \ to simplify this conversion, to the point that it is fairly transparent. Additionally,\
    \ Spring’s integration code for other persistence technologies (such as JDBC,\
    \ JPA, TopLink, etc.) will also handle the translation to Spring’s generic exception\
    \ hierarchy, further simplifying a migration from one persistence technology to\
    \ another.\n\nEstablishing loosely coupled dependency relationships is one of\
    \ Spring’s core purposes. In fact, the framework itself limits direct coupling\
    \ to itself as much as possible, meaning that your application will rarely be\
    \ directly tied to Spring classes.\n\n## Best Practices for Architecting an Application\n\
    \nThe more your code is abstracted away from interfacing directly with a database\
    \ (and dealing with these lower-level concerns), the easier it is to switch to\
    \ a different database or persistence technology.\n\nSimilarly, Hibernate also\
    \ offers an abstraction over your data model, allowing you to focus on your application’s\
    \ persistence details rather than on the particulars of your database. Through\
    \ these decouplings, a persistence tier becomes far more portable across disparate\
    \ databases.\n\n## CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE,\
    \ AND PATTERNS\n\nSpring centralizes the wiring of dependencies within your application,\
    \ making maintenance and configuration easier, and coercing developers to code\
    \ to interfaces, which brings about cleaner and better code. It also allows you\
    \ to focus more on your application’s business logic, with less concern over how\
    \ this information is physically stored and retrieved. This concept is often called\
    \ *layering*. Each layer is focused specifically on accomplishing a particular\
    \ task (with little knowledge or coupling to other layers within the application).\n\
    \n### The Layers of a Persistence Tier\n\nThe application tier that deals with\
    \ persistence is often called the *persistence tier*. Spring helps to enforce\
    \ a modular architecture in which the persistence tier is divided into several\
    \ core layers that contain the following:\n\n- The Domain Model\n- The Data Access\
    \ Object (DAO) Layer\n- The Service Layer (or Service Façade)\n\nEach of these\
    \ layers is representative of proven design patterns that are key to building\
    \ a solid, maintainable architecture. Outside the persistence tier, a typical\
    \ Spring MVC application also has a controller layer, which handles user interaction,\
    \ delegating to the service facade and shuttling necessary data back to the view.\
    \ We will get into these implementation details over the next few chapters. Here,\
    \ we’ll take a brief look at the domain model, DAO, and service layers.\n\n###\
    \ The Domain Model\n\nThe domain model represents the key entities within an application,\
    \ defining the manner in which they relate to one another. Each entity defines\
    \ a series of properties, which designates its characteristics, as well as its\
    \ relationships to other entities. Each class within the domain model contains\
    \ the various properties and associations that correlate to columns and relationships\
    \ within the database. Typically, there is a domain entity for each table within\
    \ the database, but this is not always the case.\n\nFor example, we might need\
    \ to define a `Person` domain entity, designed to represent the concept of a *person*\
    \ within the application and the database. The `Person` class could be represented\
    \ as follows:\n\n```\n@Entity\npublic class Person implements Serializable {\n\
    \n    private Long id;\n    private String firstName;\n    private String lastName;\n\
    \    private String username;\n    private String password;\n    private Integer\
    \ roleLevel;\n    private Integer version;\n\n    public Person() {\n    }\n\n\
    \    @Id\n    public final Long getId() {\n        return id;\n    }\n\n    @Version\n\
    \    public Integer getVersion() {\n        return version;\n    }\n\n    . .\
    \ . Remaining Getters and Setters Omitted\n}\n```\n\nPart of Hibernate’s job is\
    \ to convert between domain model instances and rows in the database.\n\nDevelopers\
    \ provide hints to help Hibernate perform these conversions, by specifying mapping\
    \ rules using XML or annotations. This metadata is used by Hibernate to define\
    \ the characteristics of the domain model and how the object-oriented properties\
    \ within a domain model class map to columns and relationships within the database.\n\
    \nAlthough XML was initially used to define mapping rules, we recommend using\
    \ annotations as this approach is simpler and more concise. In fact, by applying\
    \ the `@Entity` annotation to a class, it is assumed that a class property should\
    \ be persisted to the database using the property name as the database column\
    \ name and using the field type as a hint for the database column type. Of course,\
    \ all these details can be explicitly configured or overridden, but thanks to\
    \ sensible defaults, your mapping configuration should be relatively terse most\
    \ of the time."
  raw: 'Part of Spring’s momentum stems from the way it enables applications to deliver
    enterprise-level features, such as declarative transactions and security, without
    requiring the overhead and complexity of an Enterprise JavaBean (EJB) container
    or forcing developers to grapple with the details of specific technologies or
    standards. Time has proven EJB, although powerful in theory, to be a victim of
    overengineering. Spring and Hibernate owe much of their success to the fact that
    they provide a more reasonable and effective solution than the EJB standard. While
    Spring offers a simpler approach to declarative transaction management, Hibernate
    provides a more robust and intuitive ORM abstraction.


    Both frameworks were built and popularized by the growing need for a solution
    that was less complex than previous offerings. With the success of Spring and
    Hibernate came a stronger emphasis on building applications that were simpler
    and lighter weight, significantly increasing both ease of maintenance and scalability.


    Although dependency injection was Spring’s core purpose, the framework has evolved
    far beyond its original IoC foundation. The Spring Framework has expanded into
    other areas that naturally blend with its IoC roots. Spring now provides a pluggable
    transactional management layer, AOP support, integration points with persistence
    frameworks (such as Hibernate), and a flexible web framework, called Spring MVC.
    The addition of these features was a gradual process, spurred by demand and necessity.


    As Hibernate’s popularity surged, developers began to rely on Spring’s persistence
    abstractions to simplify the often daunting task of integrating Hibernate into
    an application. Thanks to Spring, the process of getting up and running with Hibernate
    became a great deal easier. Developers could start with a Spring configuration
    file that not only bootstrapped a Hibernate **SessionFactory** (allowing configuration
    details to be specified via standard XML), but also streamlined the invocation
    of myriad Hibernate operations through the use of well-crafted abstractions founded
    on time-tested design patterns, such as **HibernateTemplate** and **OpenSessionInView**.
    We will discuss these core SpringHibernate integration details in the next few
    chapters. The important point here is that combining Spring and Hibernate affords
    developers an extremely powerful solution.


    Not only does Spring simplify the integration of Hibernate, but it also reduces
    the coupling of Hibernate to an application. If the need arises to switch to a
    different ORM or persistence technology, this migration effort becomes much easier
    because there are few direct dependencies on Hibernate itself. For example, Spring
    provides a generic exception hierarchy for persistence-related errors.


    Although not required, it is considered good practice to convert Hibernate exceptions
    to Spring’s generic exception hierarchy, which further decouples your application
    from Hibernate. Spring includes built-in mechanisms to simplify this conversion,
    to the point that it is fairly transparent. Additionally, Spring’s integration
    code for other persistence technologies (such as JDBC, JPA, TopLink, etc.) will
    also handle the translation to Spring’s generic exception hierarchy, further simplifying
    a migration from one persistence technology to another.


    Establishing loosely coupled dependency relationships is one of Spring’s core
    purposes. In fact, the framework itself limits direct coupling to itself as much
    as possible, meaning that your application will rarely be directly tied to Spring
    classes.


    Best Practices for Architecting an Application


    The more your code is abstracted away from interfacing directly with a database
    (and dealing with these lower-level concerns), the easier it is to switch to a
    different database or persistence technology.


    Similarly, Hibernate also offers an abstraction over your data model, allowing
    you to focus on your application’s persistence details rather than on the particulars
    of your database. Through these decouplings, a persistence tier becomes far more
    portable across disparate databases.


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    Spring centralizes the wiring of dependencies within your application, making
    maintenance and configuration easier, and coercing developers to code to interfaces,
    which brings about cleaner and better code. It also allows you to focus more on
    your application’s business logic, with less concern over how this information
    is physically stored and retrieved. This concept is often called *layering*. Each
    layer is focused specifically on accomplishing a particular task (with little
    knowledge or coupling to other layers within the application).


    The Layers of a Persistence Tier


    The application tier that deals with persistence is often called the *persistence
    tier*. Spring helps to enforce a modular architecture in which the persistence
    tier is divided into several core layers that contain the following:


    • The Domain Model


    • The Data Access Object (DAO) Layer


    • The Service Layer (or Service Façade)


    Each of these layers is representative of proven design patterns that are key
    to building a solid, maintainable architecture. Outside the persistence tier,
    a typical Spring MVC application also has a controller layer, which handles user
    interaction, delegating to the service facade and shuttling necessary data back
    to the view. We will get into these implementation details over the next few chapters.
    Here, we’ll take a brief look at the domain model, DAO, and service layers.


    The Domain Model


    The domain model represents the key entities within an application, defining the
    manner in which they relate to one another. Each entity defines a series of properties,
    which designates its characteristics, as well as its relationships to other entities.
    Each class within the domain model contains the various properties and associations
    that correlate to columns and relationships within the database. Typically, there
    is a domain entity for each table within the database, but this is not always
    the case.


    For example, we might need to define a **Person** domain entity, designed to represent
    the concept of a *person* within the application and the database. The **Person**
    class could be represented as follows:


    **@Entity**


    **public class Person implements Serializable {**


    ****private Long id;**


    **private String firstName;**


    **private String lastName;**


    **private String username;**


    **private String password;**


    **private Integer roleLevel;**


    ****private Integer version;**


    ******public Person() {**


    **5


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    **}**


    ****@Id**


    **public final Long getId() {**


    **return id;**


    **}**


    ****@Version**


    **public Integer getVersion() {**


    **return version;**


    **}**


    ****. . . Remaining Getters and Setters Omitted**


    **}**


    Part of Hibernate’s job is to convert between domain model instances and rows
    in the database.


    Developers provide hints to help Hibernate perform these conversions, by specifying
    mapping rules using XML or annotations. This metadata is used by Hibernate to
    define the characteristics of the domain model and how the object-oriented properties
    within a domain model class map to columns and relationships within the database.


    Although XML was initially used to define mapping rules, we recommend using annotations
    as this approach is simpler and more concise. In fact, by applying the @Entity
    annotation to a class, it is assumed that a class property should be persisted
    to the database using the property name as the database column name and using
    the field type as a hint for the database column type. Of course, all these details
    can be explicitly configured or overridden, but thanks to sensible defaults, your
    mapping configuration should be relatively terse most of the time.'
  trans: '

    Spring 的部分动力源于其使应用程序能够提供企业级特性（如声明式事务和安全性）的方式，而无需承担企业 JavaBean（EJB）容器的开销和复杂性，也无需强迫开发者处理特定技术或标准的细节。时间证明，EJB
    虽然在理论上强大，却成为了过度设计的牺牲品。Spring 和 Hibernate 的成功很大程度上归功于它们提供了比 EJB 标准更合理、更有效的解决方案。Spring
    提供了一种更简单的声明式事务管理方法，而 Hibernate 则提供了更健壮、更直观的 ORM 抽象。


    这两个框架都是因市场对一种比以往方案更简单的解决方案的需求日益增长而构建并流行起来的。随着 Spring 和 Hibernate 的成功，人们更加强调构建更简单、更轻量级的应用程序，从而显著提高了易维护性和可扩展性。


    尽管依赖注入是 Spring 的核心目的，但该框架已远远超越了其最初的 IoC 基础。Spring 框架已扩展到其他与其 IoC 根基自然融合的领域。Spring
    现在提供了一个可插拔的事务管理层、AOP 支持、与持久化框架（如 Hibernate）的集成点，以及一个名为 Spring MVC 的灵活 Web 框架。这些特性的添加是一个渐进的过程，由需求和必要性推动。


    随着 Hibernate 的流行度飙升，开发者开始依赖 Spring 的持久化抽象来简化将 Hibernate 集成到应用程序中这一通常令人生畏的任务。得益于
    Spring，启动并运行 Hibernate 的过程变得容易得多。开发者可以从一个 Spring 配置文件开始，该文件不仅引导了 Hibernate 的 **SessionFactory**（允许通过标准
    XML 指定配置细节），还通过使用基于久经考验的设计模式（如 **HibernateTemplate** 和 **OpenSessionInView**）精心构建的抽象，简化了无数
    Hibernate 操作的调用。我们将在接下来的几章中讨论这些 Spring-Hibernate 集成的核心细节。这里的关键点是，结合 Spring 和 Hibernate
    为开发者提供了一个极其强大的解决方案。


    Spring 不仅简化了 Hibernate 的集成，还降低了 Hibernate 与应用程序的耦合度。如果需要切换到不同的 ORM 或持久化技术，这种迁移工作会变得容易得多，因为对
    Hibernate 本身的直接依赖很少。例如，Spring 为持久化相关错误提供了一个通用的异常层次结构。


    虽然不是必须的，但将 Hibernate 异常转换为 Spring 的通用异常层次结构被认为是一种良好实践，这能进一步将你的应用程序与 Hibernate
    解耦。Spring 包含内置机制来简化这种转换，使其相当透明。此外，Spring 针对其他持久化技术（如 JDBC、JPA、TopLink 等）的集成代码也会处理到
    Spring 通用异常层次结构的转换，从而进一步简化从一种持久化技术到另一种的迁移。


    建立松散耦合的依赖关系是 Spring 的核心目的之一。事实上，框架本身也尽可能限制与自身的直接耦合，这意味着你的应用程序很少会直接与 Spring 类绑定。


    架构应用程序的最佳实践


    你的代码越是抽象化，避免直接与数据库交互（并处理这些底层问题），切换到不同数据库或持久化技术就越容易。


    同样，Hibernate 也为你的数据模型提供了抽象，让你能够专注于应用程序的持久化细节，而不是数据库的细节。通过这些解耦，持久化层在不同数据库之间的可移植性大大增强。


    第 1 章 ■ 使用 Spring、Hibernate 和模式架构你的应用程序


    Spring 集中管理应用程序中的依赖关系，使维护和配置更容易，并促使开发者面向接口编程，从而带来更清晰、更好的代码。它还允许你更多地关注应用程序的业务逻辑，而较少关心这些信息是如何物理存储和检索的。这个概念通常被称为*分层*。每一层都专注于完成特定任务（对应用程序中的其他层知之甚少或耦合度很低）。


    持久化层的层次


    处理持久化的应用程序层通常被称为*持久化层*。Spring 有助于实施一种模块化架构，其中持久化层被划分为几个核心层，包含以下内容：


    • 领域模型


    • 数据访问对象（DAO）层


    • 服务层（或服务外观）


    这些层中的每一层都代表了经过验证的设计模式，这些模式是构建稳固、可维护架构的关键。在持久化层之外，一个典型的 Spring MVC 应用程序还有一个控制器层，它处理用户交互，委托给服务外观，并将必要的数据传回视图。我们将在接下来的几章中深入探讨这些实现细节。在这里，我们将简要介绍领域模型、DAO
    和服务层。


    领域模型


    领域模型代表应用程序中的关键实体，定义了它们之间的相互关系。每个实体定义了一系列属性，这些属性指定了其特征以及与其他实体的关系。领域模型中的每个类都包含与数据库中的列和关系相对应的各种属性和关联。通常，数据库中的每个表都有一个领域实体，但情况并非总是如此。


    例如，我们可能需要定义一个 **Person** 领域实体，旨在表示应用程序和数据库中*人*的概念。**Person** 类可以表示如下：


    **@Entity**


    **public class Person implements Serializable {**


    ****private Long id;**


    **private String firstName;**


    **private String lastName;**


    **private String username;**


    **private String password;**


    **private Integer roleLevel;**


    ****private Integer version;**


    ******public Person() {**


    **5


    第 1 章 ■ 使用 Spring、Hibernate 和模式架构你的应用程序


    **}**


    ****@Id**


    **public final Long getId() {**


    **return id;**


    **}**


    ****@Version**


    **public Integer getVersion() {**


    **return version;**


    **}**


    ****. . . 省略其余 Getter 和 Setter 方法**


    **}**


    Hibernate 的部分工作是在领域模型实例和数据库行之间进行转换。开发者通过使用 XML 或注解指定映射规则，为 Hibernate 提供提示以帮助其执行这些转换。Hibernate
    使用这些元数据来定义领域模型的特征，以及领域模型类中的面向对象属性如何映射到数据库中的列和关系。


    虽然最初使用 XML 来定义映射规则，但我们建议使用注解，因为这种方法更简单、更简洁。事实上，通过将 @Entity 注解应用于一个类，可以假定该类属性应持久化到数据库，使用属性名作为数据库列名，并使用字段类型作为数据库列类型的提示。当然，所有这些细节都可以显式配置或覆盖，但由于合理的默认值，你的映射配置在大多数情况下应该相对简洁。

