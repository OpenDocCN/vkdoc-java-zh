    正如我们之前提到的，Lucene 索引是反范式的，它不像典型的关系型数据库那样提供隐式关系的概念。为了将某些 Hibernate 关联映射转换到 Lucene
    的世界中，Hibernate Search 提供了 **@IndexEmbedded** 注解。


    **@IndexEmbedded** 告诉 Hibernate Search 将特定的关联嵌入到所属类中。然而，由于 Lucene 本质上是反范式的，Hibernate
    Search 必须随时了解嵌入实体何时发生变化。为了帮助追踪这些变化，Hibernate Search 提供了 **@ContainedIn** 注解，用于标记嵌入关联的另一端。


    现在你已经更清楚地了解了如何为索引注解领域类，让我们来审视索引和搜索的过程。


    第 10 章 ■ 集成框架


    使 Lucene 与 Hibernate 保持同步


    Hibernate Search 的主要优势之一是 Hibernate 与 Lucene 之间无缝的集成。Hibernate Search 依赖 Hibernate
    事件，当对领域模型进行持久化状态更改时，触发对 Lucene 索引的相应更改。


    在第 4 章中，我们介绍了 JPA 生命周期。遵循 JPA 生命周期，Hibernate 提供了一个细粒度的事件模型，根据领域对象的持久化状态变化广播特定事件。


    例如，当持久化一个领域类实例时，Hibernate 会传播相应的事件。


    类似地，Hibernate 会广播许多其他事件，例如删除和更新通知，提供了一种监听和响应领域模型变化的方法。事件监听器是一种有效的设计模式，用于以解耦的方式定义应用程序行为，而
    Hibernate Search 能够通过这种强大的机制接入领域生命周期事件。


    如果你是从头开始构建应用程序，并且从一个空数据库开始，那么填充 Lucene 索引的过程就很简单。当你的领域对象首次持久化到数据库时，例如通过 **entityManager.save(artEntity)**，Hibernate
    Search 会捕获生命周期事件，并将指定的 **artEntity** 添加到 Lucene 索引中。默认情况下，每个领域类都有自己的索引，并且所有适当的属性都会根据
    Hibernate Search 注解指定的规则添加到索引中。由于 Hibernate Search 负责保持数据库和 Lucene 索引同步，因此两个框架之间的集成直观且简单。


    然而，在某些情况下，你可能需要更明确地索引领域对象。例如，如果你正在将 Hibernate Search 集成到现有应用程序中，或者使用遗留数据库，则需要找到一种方法将现有数据改造到
    Lucene 索引中。


    Hibernate Search 也提供了一种更直接的方式来索引领域模型。


    Hibernate Search 提供了 Hibernate 的 **EntityManager** 的扩展版本，通过搜索特定功能增强了这些核心框架类。增强版的
    JPA **EntityManager** 是 **FullTextEntityManager**。访问这个支持搜索的 **EntityManager**
    相当无缝：**import org.hibernate.search.jpa.Search;**


    ****FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    下一步是执行索引。以下是显式索引单个实体的方法：**public void indexEntity(T object) {**


    **FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    **fullTextEntityManager.index(object);**


    **}**


    此方法旨在添加到你的 **GenericDaoJpa** 类中，以便提供一种通用的方式来索引领域类。如果你想实现一种方法来索引当前存储在数据库中的特定类型的所有实体，你可以在
    **GenericDaoJpa** 实现中定义以下方法：


    **public void indexAllItems() {**


    **FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    **List results = fullTextEntityManager.createQuery("from " +**


    **type.getCanonicalName()).getResultList();**


    第 10 章 ■ 集成框架


    **int counter = 0, numItemsInGroup = 10;**


    **Iterator resultsIt = results.iterator();**


    **while (resultsIt.hasNext()) {**


    **fullTextEntityManager.index(resultsIt.next());**


    **if (counter++ % numItemsInGroup == 0) {**


    **fullTextEntityManager.flushToIndexes();**


    **fullTextEntityManager.clear();**


    **}**


    **}**


    **}**


    在这个方法中，我们使用 **FullTextEntityManager** 执行一个标准的 JPA 查询，该查询简单地列出参数化类型的所有实体。然后我们遍历结果，索引每个实体。但是，每进行十次索引调用，我们就调用
    **fullTextEntityManager.flushToIndexes()**。这会将排队的更改刷新到 Lucene 索引，而无需等待达到 Hibernate
    Search 的批处理阈值。接下来，我们调用 **fullTextEntityManager.clear()**，它会清除 JPA 的 **persistenceContext**。这并非总是必需的，但如果你正在遍历大型数据集，则需要尽可能减少内存占用。


    构建领域特定搜索


    现在，让我们将本章涵盖的所有概念整合起来，提供一个基本的搜索功能，允许最终用户使用指定的搜索词跨多个 **ArtEntity** 字段进行搜索。以下是实现此功能的一个示例：


    **public List<ArtEntity> searchForArtEntitiesByTerms(String searchTerms,**


    ****Integer startIndex,**


    ****Integer maxResults) {**


    ****FullTextEntityManager fullTextEntityManager =**


    **Search.getFullTextEntityManager(entityManager);**


    **String[] fieldsToMatch = new String[] {"title", "subTitle", "media", "description",**


