    \ in detail in Chapter 7, but to illustrate the separation of concerns offered\
    \ by AOP, we’ll leave you with this snippet of code as a teaser:\n\n## CHAPTER\
    \ 2 ■ SPRING BASICS\n\n```\npublic class ServiceFacadeImpl implements ServiceFacade\
    \ {\n\n    @Transactional(readOnly = false, propagation = Propagation.REQUIRES_NEW)\n\
    \    public void save(Map map) {\n\n        // business logic goes here\n\n  \
    \  }\n\n}\n```\n\nBy simply annotating this method as `@Transactional`, Spring\
    \ can enforce the transaction semantics specified, without requiring that you\
    \ write any code to start and complete a transaction in the body of the `save`\
    \ method. Don’t worry about the details associated with the annotation for now.\
    \ Just know that externalizing this logic via AOP enables modifications to the\
    \ transaction implementation without requiring you to refactor all the portions\
    \ of the code base that depend on it. Similarly, you can be confident that changes\
    \ to the core business logic won’t break the transaction semantics.\n\n## Summary\n\
    \nIn this chapter, you’ve learned about the fundamental concepts that power the\
    \ Spring Framework. You saw how to bootstrap a Spring `ApplicationContext`, learned\
    \ the basics of configuring bean dependencies in Spring XML configuration files,\
    \ and developed an understanding of bean scopes and life cycles. The benefits\
    \ of dependency injection are now clear. You can effectively delegate to the Spring\
    \ container to manage and resolve your application dependencies, and doing so\
    \ can help keep your application’s dependencies loosely coupled. Finally, you\
    \ were given a glimpse into the power of managing orthogonal coding concerns with\
    \ AOP.\n\nThroughout the rest of this book, we will build on the Spring concepts\
    \ introduced in this chapter to define and implement an art gallery application.\n\
    \n## CHAPTER 3\n\n■ ■ ■\n\n## Basic Application Setup\n\nIn this chapter, we’ll\
    \ take you on a crash course though setting up a basic project using Spring and\
