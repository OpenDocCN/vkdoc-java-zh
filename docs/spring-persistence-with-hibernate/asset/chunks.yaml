    **@Service**。Spring 将在启动时自动检测、实例化并依赖注入你的服务。


    此外，组件扫描还会启用其他值得注意的 Spring 注解，如 **@Inject**、**@Named** 和 **@PostConstruct** 支持。这些注解允许你在类中使用常见的
