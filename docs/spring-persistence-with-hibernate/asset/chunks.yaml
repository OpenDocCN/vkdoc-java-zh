    Now let’s move beyond the basics and apply some tests to our art gallery application.


    Unit Testing with Mocks


    The tests in the previous examples are fairly simple, in that they don’t have
    any dependencies on either the Spring container or implementations of other classes
    or components. Because our tests are isolated to a specific class, they qualify
    as unit tests. Most of the time, you’ll need to go beyond such basic testing to
    simulate the effects of two or more classes interacting with each other. Integration
    tests are one way to achieve this, but that generally entails a fair amount of
    code and tight coupling of tests. An alternate strategy is to use stubs or mocks.


    Stubbing and mocking both attempt to simulate the behavior of a particular component
    or layer within an application, without relying on an actual, full-featured implementation.
    This approach helps to focus your testing concerns on the code actually being
    tested, rather than the details of other layers.


    Stubbing usually implies that a particular component is faked, with “canned responses”
    being returned so that the layer being tested is fooled into believing that it
    is talking to the actual live implementation. Mocking also attempts to simulate
    a particular layer, but it does more than just return canned responses. A mocked
    object can also be used to validate expected behavior relating to the layer it
    is intended to represent. For example, it is possible to specify that a certain
    method is called on the mock as well as other details that help to provide valuable
    assertions about how the code you are testing integrates with the mocked layer.


    Spring provides several useful mock layers, which can be used as drop-in replacements
    for various layers within your application. For example, JNDI, Servlet-API, and
    Portlet mock layers that simulate behavior and associated expectations for their
    respective layers. For mocking other components, it is possible to use frameworks
    like jMock, EasyMock or MockObjects. These frameworks provide an extensible means
    for defining your own mocks dynamically.


    CHAPTER 8 ■ EFFECTIVE TESTING


    For our examples, we will use the very powerful jMock framework. JMock allows
    you to define the behavior for a particular class, as well as expectations for
    how particular methods on the class will be called and what they will return within
    the context of a unit test. jMock employs a simple DSL that allows you to specify
    a fairly flexible range of behavior. We’ll point out a few of the basic jMock
    concepts when we look at a unit test with mocks later in this chapter.


    Let’s look at a unit test that attempts to verify the behavior of our **ArtworkService**
    implementation: **package com.prospringhibernate.gallery.test;**


    ****import com.prospringhibernate.gallery.domain.Person;**


    **import com.prospringhibernate.gallery.exception.AuthenticationException;** **import
    com.prospringhibernate.gallery.service.ArtworkFacade;**


    ****import org.junit.Test;**


    **import org.junit.Before;**


    **import org.junit.runner.RunWith;**


    ****import org.jmock.Mockery;**


    **import org.jmock.Expectations;**


    **import org.jmock.integration.junit4.JMock;**


    **import org.jmock.integration.junit4.JUnit4Mockery;**


    ****@RunWith(JMock.class)**


    **public class JMockJUnitTestExample {**


    ****Mockery context = new JUnit4Mockery();**


    ****private Person person;**


    **private ArtworkFacade artworkService;**


    ****@Before**


    **public void initializeTest() {**


    **person = new Person();**


    **person.setUsername("username");**


    **person.setPassword("goodpassword");**


    ****// here we use jMock to create a mock based on our Interface** **artworkService
    = context.mock(ArtworkFacade.class);**


    **}**


    ****@Test**


    **public void testAuthenticationSuccess() throws AuthenticationException {**


    ****// define expectations for authenticatePerson method**


    **context.checking(new Expectations() {{**


    **allowing(artworkService).authenticatePerson("username", "goodpassword");** **will(returnValue(person));**


    **}});**


    **artworkService.authenticatePerson("username", "goodpassword");**


    ****}**


    CHAPTER 8 ■ EFFECTIVE TESTING


    ****@Test (expected=AuthenticationException.class)**


    **public void testAuthenticationFailure() throws AuthenticationException {**


    **// define expectations, assuming a bad**


    **// username/password**


    **context.checking(new Expectations() {{**


    **allowing(artworkService).authenticatePerson("username", "badpassword");** **will(throwException(new
    AuthenticationException()));**


    **}});**


    **artworkService.authenticatePerson("username", "badpassword");**


    ****}**


    ****}**


    Notice that no external dependencies are required for this unit test. This not
    only helps to isolate the code we are testing, but also significantly speeds up
    the test. Recall that our **ArtworkService** façade depends on several DAOs, including
    **ArtEntityDao** and **PersonDao**, but there’s nothing in this code that instantiates
    those classes before the **authenticatePerson** method is executed.


    We declare that we are using the jMock framework by supplying the **@RunWith(JMock.class)**
    annotation. Next, we define the context instance variable, instantiating a **JUnit4Mockery**
    instance. We can then use the context instance variable to define the behavior
    and expectations of our mocked **ArtworkFacade**.


    We create a mocked instance by calling the **mock** method on our context instance
    variable, passing in the interface for the type we wish to mock:


    **artworkService = context.mock(ArtworkFacade.** class**);**


    This line sets our **artworkService** instance to a mocked implementation of our
    **ArtworkFacade** interface. This takes care of the setup.


    Now we need to delineate the behavior and expectations for the mock we just defined.
    This is accomplished in a few steps. Expectations are specified by calling **context.checking()**
    and passing in an anonymous inner class of type **Expectations**. The **Expectations**
    class provides most of jMock’s DSL


    features, allowing us to more easily express the behavior of each method we intend
    to mock.


    Things get interesting within this **Expectations** block. We can specify the
    behavior for each method—even defining different behavior based on different parameters
    or conditions. There are several options that can be defined in mocking our **ArtworkFacade**’s
    behavior. However, we must first set the expectations for how our method will
    be called. Do we expect it to be called exactly once, more than once, within a
    range, or a specified number of times? Or do we not care whether our method will
    be called at all? These details are referred to as the *invocation count*, and
    represent the first part of the jMock DSL.'
