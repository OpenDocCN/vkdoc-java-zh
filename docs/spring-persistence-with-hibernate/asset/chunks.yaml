    **第 1 章**


    ■ ■ ■


    **使用 Spring、Hibernate 和模式架构你的应用**


    持久化通常是应用的生命线，它提供了软件在多次调用中保持有用性所需的长期记忆。尽管持久层至关重要，但在应用的设计或实现阶段，其架构却很少得到充分的考虑。这种缺乏规划的后果可能影响深远，并对组织造成破坏性影响。


    本书的主要目标是为你提供架构和实现一个稳固、有效的持久层所需的最佳实践、工具和策略。本书中的许多概念都源自于设计并构建旨在支持数百万日活用户的 Web 应用的真实世界实战经验。我们的目标是阐述那些对我们行之有效的模式和方案，同时探讨在你的应用中使用
    Spring 和 Hibernate 的集成细节。


    多年来我们学到的一个重要经验是，通过示例学习通常是最好的方式。为此，我们将在本书中构建一个真实的应用：一个图片库 Web 应用，它允许用户查看由管理员策划的幻灯片和展览。为了强调构建可扩展和可维护应用的经过验证的、实用的解决方案和架构模式，每一章都将聚焦于应用开发中与持久化相关的不同方面。通过代码示例和讨论，我们将追溯一个真实工作应用的设计、架构和实现。从基础开始，每一章都将建立在前一章的基础上，添加新的层、特性和测试。当然，与任何真实应用一样，随着我们发现
    Spring 和 Hibernate 的新功能以及替代策略和框架，我们将进行大量的重构。事实上，最后两章将完全重新架构我们的图片库应用，因为我们审视了两个基于“约定优于配置”概念的新框架。Grails
    和 Roo 旨在提供一种更快速的开发风格，它们提供了一个更全面、更一致的开发环境，并具备由动态语言框架（如 Ruby on Rails 和 Django）推广的强大特性。


    采用一致方法的好处


    正如你将在本书中学到的，数据保存和查询的方式是每个应用不可或缺的一部分。事实上，持久层通常作为构建应用的基础。在这个基础之上，是标准 Spring 持久层的三个核心组件：领域模型、数据访问对象层和服务外观。


    第 1 章 ■ 使用 Spring、Hibernate 和模式架构你的应用


    如果你对这些术语中的某些感到陌生，请不要担心。在接下来的章节中，我们将解释每个组件的用途和功能，演示它们在应用中扮演的角色。


    虽然我们并不认为只有一种正确的方法来架构应用，但我们确实想强调使用关键设计模式和最佳实践的好处。这是一个你会在本书中反复看到的主题。


    依赖注入的重要性


    Spring 框架极大地减少了设计和构建应用时的猜测工作。它已成为集成不同组件和框架的事实标准，并且其发展已远远超出了依赖注入的根源。依赖注入的目的是将解析外部软件组件的工作与你的应用业务逻辑解耦。

