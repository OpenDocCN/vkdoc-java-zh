    例如，假设你有几个类，它们被设计用来向关系型数据库存储和检索数据。作为此实现的一部分，你可能希望执行一些审计（例如，跟踪每次连续写入操作的详细信息）。从一个基础审计类进行扩展并不是完成此任务的可行或恰当方式。如果你确实要扩展某个类，你可能更希望继承与操作领域模型和保存数据相关的行为（你并不想继承审计行为）。在这个例子中，我们可以说审计功能与核心持久化功能是*正交*的（即完全独立于它）。此外，代码的审计方面可以以相当相似和标准的方式应用于所有应用程序代码。


    这正是 AOP 的完美应用场景。你可以将不相关的审计功能方面应用于所有旨在处理图片库逻辑的类。


    AOP 在实际中的工作方式相当简单：一个类的方法可以被修改，以便在方法调用之前、之后或环绕（本质上是在调用*之前*和*之后*）注入新的功能。


    因此，对于审计方面，你可以注入一段代码，每当某一类方法中的方法被调用时，这段代码就会在数据库中写入一行（构成整个审计跟踪的一部分）。


    一个类似的场景涉及安全性。可以将安全检查插入到你的核心数据访问代码中，以确保在每次调用某些方法时验证适当的权限或角色。这种方法的有趣之处在于，你可以将安全代码与核心实现完全分离（核心实现不再需要担心安全性的实现细节）。这带来了更清晰的代码，因为你的核心应用程序不必被安全实现的细节所拖累。


    此外，让不同的团队管理不同的功能通常也很有用。AOP 使这成为可能，因为安全相关的代码可以由该领域的专家编写，而应用程序的业务逻辑则由另一个团队开发和维护。通过确保这两个方面（从代码角度来看）不相互混杂，专业化变得更加可行。这两个不同的功能部分可以完全独立地开发和维护，从而产生更清晰、耦合更松散的代码。


    这种拦截方法调用并引入或*注入*新功能的能力，是 Spring 支持声明式事务背后的秘诀。使用 Spring 的声明式事务支持，你可以用事务语义来通知你的持久化外观层。我们将在第
    7 章详细讨论事务，但为了说明 AOP 提供的关注点分离，我们将用以下代码片段作为预告来结束本节：


    第 2 章 ■ SPRING 基础


    **public class ServiceFacadeImpl implements ServiceFacade {**


    ****@Transactional(readOnly = false, propagation = Propagation.REQUIRES_NEW)**
    **public void save(Map map) {**


    **// 业务逻辑写在这里**


    **}**


    ****}**


    通过简单地将此方法注解为 **@Transactional**，Spring 可以强制执行指定的事务语义，而无需你在 `save` 方法体中编写任何启动和完成事务的代码。现在不必担心与该注解相关的细节。只需知道，通过
    AOP 将这种逻辑外部化，使得修改事务实现成为可能，而无需重构代码库中所有依赖它的部分。同样，你可以确信对核心业务逻辑的更改不会破坏事务语义。


    总结


    在本章中，你了解了驱动 Spring 框架的基本概念。你看到了如何引导一个 Spring **ApplicationContext**，学习了在 Spring
    XML 配置文件中配置 Bean 依赖关系的基础知识，并理解了 Bean 的作用域和生命周期。依赖注入的好处现在已经很清楚了。你可以有效地委托 Spring
    容器来管理和解析你的应用程序依赖关系，这样做有助于保持应用程序依赖关系的松散耦合。最后，你初步了解了使用 AOP 管理正交编码问题的强大功能。


    在本书的其余部分，我们将基于本章介绍的 Spring 概念来定义和实现一个艺术画廊应用程序。


    **第 3 章**


    ■ ■ ■


    **基本应用程序设置**


    在本章中，我们将带你速成学习如何使用 Spring 和 Hibernate 设置一个基本项目。我们将用于管理应用程序的工具是 Apache Maven 3。如果你已经精通
    Spring、Hibernate 和 Maven，你可能只想浏览本章，以便了解我们在整本书中构建艺术画廊应用程序时将使用的结构和约定。我们将很快地涵盖很多内容，并提供相关章节的参考，以便你在其中深入了解各种配置。


    使用 Maven 进行应用程序管理


    Maven 由 Sonatype 的 Jason van Zyl 于 2002 年编写，并于 2004 年作为 Apache 软件基金会的顶级项目达到 1.0
    版本。Maven 致力于通过确保一个简单、可重复的过程来配置、管理和与基于 Java 的软件项目交互，从而简化日常开发。


    Maven 围绕项目对象模型（POM）的概念展开，该模型代表了你项目或模块的配置。用 Maven 的术语来说，模块只是给定“父”Maven 项目的一个子项目。这种组织结构允许你创建一个被划分为更小模块集合的项目。你的
    POM 描述了你项目的许多方面，包括所需的依赖项、插件配置以及编译和组装应用程序的顺序和操作。


    Maven 提供了大量开箱即用的功能。此外，其庞大的用户社区已经开发了大量的插件。当需要进一步自定义项目的构建过程时，自己编写 Maven 插件是轻而易举的事。


    托管依赖项


    Maven 的杀手锏是其依赖管理。当你构建或编译应用程序时，Maven 会从 Maven 仓库下载你项目的所有依赖项。在团队中工作时，这是一个巨大的优势。想要升级你的项目使用的
    Spring 版本吗？只需更新项目依赖项，提交到源代码控制，团队中的每个人都会自动将其项目升级到最新版本的 Spring！Maven 甚至处理传递性依赖，这意味着
    Maven 可以自动获取你的项目所依赖的库的依赖项，而无需你显式地全部包含它们。


    还记得我们告诉过你，有大量成熟的 Maven 插件可用吗？一个你可以使用的便捷插件的例子是优秀的 m2eclipse 插件，用于将 Maven 与 Eclipse
    集成。图 3-1，由 m2eclipse 提供，向你展示了关于为什么使用像 Maven 这样的工具对于管理企业级 Java 应用程序至关重要的所有信息。


