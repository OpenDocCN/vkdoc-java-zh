- fmt: 'JNDI is often described as the opposite of Spring’s IoC. Instead of having
    dependencies automatically injected into your application, JNDI allows dependencies
    to be looked up from a centrally managed directory. There are certainly benefits
    to both approaches. For example, in the case of JNDI, developers can define logical
    names for database resources in their application configuration, but allow a system
    administrator to manage mapping that logical name to the proper database connection
    pool in the web application container configurations, effectively deferring the
    specification of database connection details until runtime. When a database migration
    is required, JNDI can simplify some of these administrative tasks, as no changes
    to the application configuration will be required.


    No matter which approach you decide to take, Spring makes integrating a datasource
    into your application easy. The key factor is that Spring’s persistence templates
    never require a specific type of datasource implementation. Instead, they depend
    on the more generic `javax.sql.Datasource` interface.


    Whether you intend to use a database connection pool or a JNDI-retrieved datasource,
    the resultant configuration should always produce a standard `javax.sql.Datasource`
    reference.


    This brings us to a key concept in Spring: the `FactoryBean` interface. The `FactoryBean`
    is Spring’s answer to the well-known factory design pattern. The key concept here
    is that you remove a direct dependency on a specific implementation by delaying
    the selection or instantiation of the specific implementation until runtime. You
    define a factory, and it is the factory’s job to pick the correct implementation
    at runtime and instantiate (or look up) that specific class.


    The Spring `FactoryBean` concept is quite similar. Normally in Spring, when you
    define a bean, the class specified by the `classname` attribute is the class that
    will be instantiated and injected into other beans that have that bean ID wired
    into them. This isn’t the case with a `FactoryBean`. When you use a `FactoryBean`,
    you are instead instantiating a factory class that will then be responsible for
    creating the specific implementation used to resolve dependencies in Spring. So
    essentially, the `classname` attribute in this case just defines a factory implementation,
    whose job will then be to create the actual target implementation you need.


    This concept allows us to use multiple strategies to access a datasource without
    tying ourselves down to a particular solution. If you use the JNDI `FactoryBean`,
    you will still end up with a datasource reference, and the same will occur if
    you choose to use the pooled datasource implementation.


    There are other reasons to use a `FactoryBean` in Spring, as well. For instance,
    a `MapFactoryBean` can be used to create a Java `Map` entirely in your configuration
    file (which can be quite convenient in certain cases).


    A Spring `FactoryBean` implements the `FactoryBean` interface, which defines three
    methods designed to instantiate the target object (that is, the instance the factory
    is intended to create), the target object’s type, and whether the target object
    is a singleton or prototype. For our scenario, we would configure our JNDI datasource
    in the following way:


    ```

    <bean id="galleryDatasource" class="org.springframework.jndi.JndiObjectFactoryBean">

    <property name="jndiName" value="java:comp/env/jdbc/gallery"/>

    </bean>

    ```


    Although the preceding example is fairly concise, in some situations, you can
    make your configuration easier to read and more terse by importing a namespace
    intended to handle a very specific type of configuration. For example, by importing
    the `jee` namespace, we can simplify the preceding JNDI lookup further:


    ```

    <jee:jndi-lookup id="galleryDatasource"

    jndi-name="java:comp/env/jdbc/gallery"/>

    ```


    Not only have we reduced the configuration to a single line, but we’ve also made
    the intention of our configuration clearer.


    ## Web Application Configuration


    Java web applications are deployed as WAR files. A WAR file is a special kind
    of JAR file that includes things like servlets, JSPs, tag libraries, and static
    HTML assets.


    The key configuration file for a WAR is `web.xml`, which outlines the structure
    for an application in accordance with the Java EE specifications. The configuration
    that follows adheres to the Servlet 2.5 specification, and can be interpreted
    by all major application server containers, including Tomcat, Resin, Jetty, WebSphere,
    WebLogic, GlassFish, and so on. The `web.xml` file should be placed under the
    `WEB-INF` directory. For Maven projects, the `WEB-INF` directory is located under
    `src/main/webapp`. Here’s a basic `src/main/webapp/WEB-INF/web.xml` to get our
    art gallery application started.


    ```

    <?xml version="1.0" encoding="UTF-8" standalone="no"?>

    <web-app

    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd"

    version="2.5">

    <!-- Listener to create the Spring Container shared by all Servlets and Filters
    -->

    <context-param>

    <param-name>contextConfigLocation</param-name>

    <param-value>

    classpath*:META-INF/spring/spring-master.xml

    </param-value>

    </context-param>

    <listener>

    <listener-class>

    org.springframework.web.context.ContextLoaderListener

    </listener-class>

    </listener>

    <!-- Spring DispatcherServlet for HTTP requests -->

    <servlet>

    <servlet-name>galleryDispatcher</servlet-name>

    <servlet-class>

    org.springframework.web.servlet.DispatcherServlet

    </servlet-class>

    <init-param>

    <param-name>contextConfigLocation</param-name>

    <param-value>

    WEB-INF/spring/spring-master-web.xml

    </param-value>

    </init-param>

    <load-on-startup>1</load-on-startup>

    </servlet>

    <servlet-mapping>

    <servlet-name>galleryDispatcher</servlet-name>

    <url-pattern>*.art</url-pattern>

    </servlet-mapping>

    </web-app>

    ```


    As mentioned earlier, with web-based Spring applications, you ultimately end up
    with multiple application contexts containing all of your Spring beans. There’s
    a single root application context and potentially many child application contexts.


    `ContextLoaderListener` implements the `javax.servlet.ServletContextListener`
    interface. Listeners that implement the `ServletContextListener` interface receive
    notifications from the application container whenever the servlet context is initialized
    or destroyed. It’s a convenience mechanism to simplify your application configuration
    and ease system maintenance. Spring’s `ContextLoaderListener` fires upon receiving
    such a notification when the servlet context is created during application startup.
    It expects to find a `contextConfigLocation` parameter defined in the servlet
    context, and then uses this parameter to retrieve the bean definitions and instantiates
    them. The beans outlined by the `contextConfigLocation` compose what is commonly
    referred to as the *root application context*.


    ### Servlet Definition


    The `web.xml` file is also where you configure any implementations of the `Servlet`
    interface that your application requires. Servlets are configured, along with
    any initialization parameters the servlet class expects, and then associated with
    the URL pattern to which you want the servlet to be applied.


    For a Spring application, you would take advantage of the framework’s `DispatcherServlet`
    class. `DispatcherServlet` is a flexible implementation of the `Servlet` interface
    that serves as a central routing mechanism for HTTP requests. With the help of
    adapter classes offered by Spring, you can specify how each instance of `DispatcherServlet`
    handles everything from view resolution to exception handling in a nice, pluggable
    way.'
