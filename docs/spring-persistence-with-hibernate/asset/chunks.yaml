    **Category** 类实现 **Comparable**，并定义一个 **compareTo(def obj1, def ob2)** 方法，在该方法中根据类别名称进行排序。


    自定义领域类 Hibernate 映射


    你可能注意到了，在每个示例领域类中都定义了一个静态的 **mappings** 属性。该字段可用于增强 Grails 在幕后创建和管理的 Hibernate
    映射。


    在我们的示例中，我们只是断言领域实体应被缓存，使用 **Config.groovy** 文件中指定的 **CacheManager**。然而，映射结构非常灵活，可用于修改特定领域类的默认
    Hibernate 映射的许多方面。例如，如果需要覆盖表名或默认列名/类型，映射 DSL 提供了实现此目的的方法。还可以为集合添加缓存规则，或覆盖集合的默认获取策略，指定某个集合是延迟加载还是立即加载。你甚至可以指定一个或多个列映射到特定的
    Hibernate **UserType**。


    在我们之前的 Hibernate 示例中，我们定义了一个 **ArtData** 类的层次结构（每个类都继承自 **ArtData** 基类）。在 Grails
    中，实现多态领域类更加简单。以下是我们的 **ArtData** 类：


    第 11 章 ■ GORM 与 Grails


    **class ArtData {**


    **byte[] picture;**


    **static mapping = {**


    **cache true**


    **}**


    **}**


    以下是 **ArtData_Storage** 类（继承自 **ArtData**）：**class ArtData_Storage extends ArtData
    {**


    **}**


    仅此而已。默认情况下，Grails 使用“每个层次结构一张表”的策略，这意味着它将整个层次结构中所有属性的总和持久化到单个表中。


    与 Hibernate 不同，无需显式定义鉴别器（以帮助区分类型），因为 Grails 会处理这一点。然而，Grails 足够灵活，允许你使用不同的多态策略。例如，你可以像这样使用前面描述的自定义映射
    DSL：


    **static mapping = {**


    **tablePerHierarchy false**


    **}**


    **现在我们已经定义了 Grails 领域模型，接下来让我们继续持久化和检索这些数据。


    使用 Active Record 作为 DAO 的替代方案


    在本书中，你已经了解了 Spring 如何通过强制执行几个关键设计模式（尤其是 DAO、模板和外观模式）来简化持久化层的开发。尽管 Grails 建立在 Spring
    和 Hibernate 的基础之上，但它为大多数 Spring 应用程序中典型的 DAO 模式提供了一种替代方案。遵循 Ruby on Rails 等其他快速开发框架的引领，Grails
    利用 Active Record 设计模式作为处理数据库持久化操作的方法。


    遵循 Active Record 模式，数据库中的表直接由领域类表示。例如，在我们的画廊示例中，我们已经定义了一个 **Person** 类，它描述了数据库中对应的
    **Person** 表，这意味着表字段和关联由 **Person** 类中的属性表示。


    这种方法与我们本书中使用的领域模型似乎没有太大区别。然而，关键区别在于领域类同时也充当数据库操作的包装器。动态静态方法被注入到每个领域类中，提供了查询该类类型实例的方法。与
    Hibernate 一样，数据库中的每一行都由相应领域类的一个实例表示。然而，**save()** 和 **update()** 方法被注入到每个领域类实例中，允许通过直接在该实例上调用
    **save()** 或 **update()** 来持久化新创建或检索到的实例。


    例如，如果我们想要创建或更新 **Person** 表中的特定行，只需直接在我们想要保存的 **person** 实例上调用 **person.save()**。如果我们想要从数据库中加载特定的
    **Person** 记录，只需调用静态方法 **Person.get(id)**，并传入我们想要检索的记录的主键。


    将此方法与 DAO 模式进行对比，在 DAO 模式中，我们需要为与特定领域实体相关的所有数据库操作创建一个单独的抽象层。Active Record 模式极大地简化了我们检索和持久化数据的工作，因为无需定义任何
    DAO 类或方法。相反，这种功能通过注入到每个领域类中的动态行为，隐式地存在于我们的领域模型中。


    如果我们不需要定义 DAO 实现，那么像 **Person.get(id)** 和 **Person.save()** 这样的方法的实现来自哪里？Active
    Record 模式指出，我们应该能够简单地定义一个领域模型，并开始在这些类上调用方法，以实现我们试图构建的持久化逻辑。然而，问题仍然存在：如果我们可以在 **Person**
    实例上简单地调用 **save()**，那么我们在哪里定义此方法的行为？让我们深入了解一下 GORM 的内部机制，以更好地理解其工作原理。


    深入探究 GORM 的内部机制


    像 Groovy 这样的语言的关键优势之一是它们是动态的，这意味着，除其他外，你可以在任何时候为你的类定义新的行为。就 Grails 和 Active Record
    模式而言，框架能够用与持久化相关的新功能来增强你的领域模型。这一策略是 Groovy 的一个关键概念，并通过使用 Groovy 的 **metaClass**
    结构来实现，正如本章前面所讨论的。


    使用动态查找器方法


    Grails 将新功能注入到每个领域模型类中，以支持 Active Record 模式。


    与 DAO 方法不同，无需预先定义任何方法。相反，Grails 使用命名约定来解释如何与数据库交互。通过使用被调用方法的名称，Grails 直觉地判断要执行的操作类型。通过几个示例可以最好地解释这一点。'
- fmt: "# Getting Back to Our Gallery Application\n\nLet’s define a simple unit test\
    \ that illustrates saving and loading our `Person` domain class. Since we want\
    \ to demonstrate how Grails behaves within a running application, we need to create\
    \ an integration test, which actually bootstraps a Spring `ApplicationContext`,\
    \ so we can test functionality that relies on core Grails features such as persistence.\n\
    \nGrails ships with a script that creates the integration test scaffolding for\
    \ us: `grails create-integration-test Person`\n\nAfter running this command, you\
    \ will find an integration test stub under `test/integration/grailsGallery/PersonTests.groovy`.\
    \ In our test, we are going to verify that we can instantiate, save, and load\
    \ a `Person` domain entity:\n\n```\nclass PersonTests extends GroovyTestCase {\n\
    \    ...\n    void testSavePerson() {\n        Person person = new Person(\n \
    \           [firstName: \"Sam\", lastName: \"Smith\",\n             username:\
    \ \"ssmith\", password: \"1234\",\n             email: \"sam@notarealaddress.com\"\
    ,\n             roleLevel: Person.ADMIN_ROLE])\n        assertTrue(\"Person entity\
    \ is valid and can be saved\",\n            (person.validate() && person.save()))\n\
    \        assertNotNull (\"person id is null\", person.id)\n        def loadedPerson\
    \ = Person.get(person.id)\n        assertTrue(\n            \"Person was successfully\
    \ loaded\",\n            loadedPerson != null &&\n            loadedPerson.username\
    \ != null)\n    }\n}\n```\n\nThis is a very straightforward test. Notice that\
    \ we instantiate our `Person` entity using a `java.util.Map` containing default\
    \ properties for our Groovy class. After our `Person` instance is instantiated,\
    \ we verify that the instance validates and saves successfully. `validate()` verifies\
    \ all the requirements specified within our domain model’s `constraints` block.\
    \ If our domain model does not validate successfully, Grails will set an `errors`\
    \ property on our `Person` instance. The `errors` property contains details on\
    \ each validation failure and is an implementation of the `org.springframework.validation.Errors`\
    \ interface.\n\nThis interface is quite useful for tracking and managing form\
    \ submissions, and should be familiar to users of Spring MVC.\n\nIn the event\
    \ of a validation error, we can iterate through each error to find out exactly\
    \ what went wrong:\n\n```\nperson.errors.allErrors.each {curError ->\n    log.error(\"\
    Error saving Person instance: ${curError}\");\n}\n```\n\nWe can also get an error\
    \ count this way:\n\n```\nperson.errors.errorCount()\n```\n\n**Note:** A `log`\
    \ instance variable is automatically injected in all controller and service classes,\
    \ allowing you to easily emit logging messages. This is an instance of log4j’s\
    \ `Logger` class, and is configured in the `Config.groovy` file described earlier\
    \ in this chapter.\n\nGrails ships with a tag library that helps to render errors\
    \ within a typical form submission.\n\nAdditionally, the default Grails templates\
    \ will create GSP views that will automatically render clear error messages in\
    \ the event of any validation or save failures. Of course, default error messages\
    \ can be easily overridden by updating the `messages.properties` file.\n\nAt this\
    \ point, you should have a solid understanding of how to go about saving and loading\
    \ a domain entity. Unfortunately, that won’t get you very far. You’ll want to\
    \ be able to query the database.\n\nTo demonstrate how that works, we first need\
