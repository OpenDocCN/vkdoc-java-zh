    \n    @Id\n    @GeneratedValue\n    public Long getId() {\n        return id;\n\
    \    }\n\n    public void setId(Long id) {\n        this.id = id;\n    }\n\n \
    \   @ManyToOne\n    public ArtEntity getCommentedArt() {\n        return commentedArt;\n\
    \    }\n\n    public void setCommentedArt(ArtEntity commentedArt) {\n        this.commentedArt\
    \ = commentedArt;\n    }\n\n    @Temporal(TemporalType.TIMESTAMP)\n    public\
    \ Date getCommentDate() {\n        return commentDate;\n    }\n\n    public void\
    \ setCommentDate(Date commentDate) {\n        this.commentDate = commentDate;\n\
    \    }\n\n    @Version\n    public Integer getVersion() {\n        return version;\n\
    \    }\n\n    public void setVersion(Integer version) {\n        this.version\
    \ = version;\n    }\n}\n```\n\nNext, let’s define the `ArtEntity` class:\n\n```java\n\
    @Entity\npublic class ArtEntity implements Serializable {\n\n    private Long\
    \ id;\n    private String title;\n    private String subTitle;\n    private Date\
    \ uploadedDate;\n    private Date displayDate;\n    private Integer width;\n \
    \   private Integer height;\n    private String media;\n    private String description;\n\
    \    private String caption;\n    private String imagePath;\n    private Integer\
    \ version;\n    private Set<Category> categories = new HashSet();\n    private\
    \ Set<Comment> comments = new HashSet();\n\n    public ArtEntity() {\n    }\n\n\
    \    @Id\n    @GeneratedValue\n    public Long getId() {\n        return id;\n\
    \    }\n\n    public void setId(Long id) {\n        this.id = id;\n    }\n\n \
    \   @Version\n    public Integer getVersion() {\n        return version;\n   \
    \ }\n\n    public void setVersion(Integer version) {\n        this.version = version;\n\
    \    }\n\n    @ManyToMany(mappedBy = \"artEntities\")\n    public Set<Category>\
    \ getCategories() {\n        return categories;\n    }\n\n    public void setCategories(Set<Category>\
    \ categories) {\n        this.categories = categories;\n    }\n\n    @OneToMany\n\
    \    public Set<Comment> getComments() {\n        return comments;\n    }\n\n\
    \    public void setComments(Set<Comment> comments) {\n        this.comments =\
    \ comments;\n    }\n\n    public boolean addCommentToArt(Comment comment) {\n\
    \        comment.setCommentedArt(this);\n        return this.getComments().add(comment);\n\
    \    }\n}\n```\n\n> **Note:** For simplicity, the domain objects in these code\
    \ listings only implement `Serializable`. However, as we demonstrated in the previous\
    \ chapter, our `GenericDao` assumes that each domain entity implements our `DomainObject`\
    \ marker interface. Although our code samples follow this approach, we've kept\
    \ these listings a bit simpler for illustrative purposes.\n\nWe’ve omitted some\
    \ of the redundant getters and setters to conserve space. However, you’ll immediately\
    \ recognize that we’re essentially defining a JavaBean or POJO. There is no reference\
    \ to Hibernate dependencies, and no parent class from which to extend.\n\nWe have\
    \ defined the properties that we need to persist in the database along with their\
    \ respective getters and setters. As well as the appropriate getters and setters,\
    \ we have also added an `addCommentToArt(Comment comment)` method. This is a convenience\
    \ method for bidirectional associations, since it is important that references\
    \ are set on both sides of the association. In the `addCommentToArt(Comment comment)`\
    \ method, we ensure that the specified `comment` parameter is added to the `ArtEntity`’s\
    \ comment collection and that the `comment`’s `commentedArt` property properly\
    \ references the `ArtEntity` instance. We strongly recommend creating this type\
    \ of “association management” method on one side of the relationship to ensure\
    \ that both sides of a bidirectional relationship are properly set.\n\nOur `Comment`\
    \ domain entity also has the `@ManyToOne` annotation. This tells Hibernate that\
    \ the `commentedArt` property will have a many-to-one association to the `ArtEntity`\
    \ table. From a database perspective, specifying a `@ManyToOne` annotation on\
    \ the `Comment` field will add a foreign key field on our `Comment` table to the\
    \ `ArtEntity` table. This also demonstrates some of the advantages of using Hibernate\
    \ to architect both your domain model and your database schema. If Hibernate is\
    \ used to generate your schema, it will also create foreign key constraints for\
    \ your associations to ensure the referential integrity of your database is not\
    \ compromised.\n\n## Convention over Configuration\n\nThe simplicity of Hibernate’s\
    \ annotation support stems from using sensible defaults, as well as Hibernate’s\
    \ ability to infer associations and database field types by considering the Java\
    \ type of each JavaBean property. When mappings are defined in XML, we must explicitly\
    \ delineate the details of each property and association. With Hibernate, because\
    \ annotations are embedded into code, we have the benefit of drawing hints from\
    \ the code itself, which dramatically simplifies configuration efforts.\n\nAs\
    \ you learned in Chapter 4, the key annotation for Hibernate persistence is `@Entity`.\
    \ This annotation tells Hibernate that we intend to persist this class. If we\
    \ were following the XML mapping approach, we would then need to define each field\
    \ explicitly in the `hbm.xml` mapping file. With Hibernate annotations, it is\
    \ necessary to define only the details that don’t conform to Hibernate’s default\
