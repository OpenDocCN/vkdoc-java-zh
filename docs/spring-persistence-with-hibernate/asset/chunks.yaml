  raw: 'For example, say you have a few classes that are designed to store and retrieve
    data to and from a relational database. As part of this implementation, you may
    wish to do some auditing (for example, to track details of each successive write
    operation). Extending from a base auditing class isn’t a viable or proper way
    to accomplish this task. If you extend from any class at all, you probably want
    to inherit behavior that relates more to manipulating your domain model and saving
    data (you don’t want to inherit auditing behavior). In this example, we might
    say that auditing functionality is *orthogonal* to the core persistence functionality
    (that is, completely independent of it). Furthermore, the auditing aspects of
    the code can be applied in a reasonably similar and standard fashion across all
    the application code.


    This is the perfect scenario for AOP. You can apply aspects of the unrelated auditing
    functionality across all of the classes that aim to handle image gallery logic.


    The way AOP works in practice is fairly simple: a class’s methods can be altered
    so that new functionality can be injected before, after, or around (essentially,
    before *and* after) a method is called.


    So, in the case of an auditing aspect, you could inject a block of code that writes
    a row in a database (constituting a piece of an overall auditing trail) each time
    a method within a category of methods is called.


    A similar scenario concerns security. A security check can be inserted into your
    core data-access code to ensure appropriate permissions or roles are verified
    each time certain methods are called. The interesting part of this approach is
    that you can keep the security code entirely separate from your core implementation
    (which no longer needs to worry about the implementation details of security).
    This leads to cleaner code, as your core application need not get bogged down
    with details of your security implementation.


    Furthermore, it is often useful to have distinct teams manage features that are
    disparate. AOP makes this feasible, as security-related code can be crafted by
    experts in this domain, while the application business logic is developed and
    maintained by a different team. By ensuring these two facets don’t intermingle
    (from a code standpoint), specialization becomes more attainable. These two distinct
    pieces of functionality can be developed and maintained entirely separately, leading
    to cleaner and more loosely coupled code.


    This ability to intercept method calls and introduce, or *inject*, new functionality
    is the secret sauce behind Spring’s support for declarative transactions. Using
    Spring’s declarative transaction support, you can advise your persistence facade
    layer with transactional semantics. We’ll cover transactions in detail in Chapter
    7, but to illustrate the separation of concerns offered by AOP, we’ll leave you
    with this snippet of code as a teaser:


    CHAPTER 2 ■ SPRING BASICS


    **public class ServiceFacadeImpl implements ServiceFacade {**


    ****@Transactional(readOnly = false, propagation = Propagation.REQUIRES_NEW)**
    **public void save(Map map) {**


    **// business logic goes here**


    **}**


    ****}**


    By simply annotating this method as **@Transactional**, Spring can enforce the
    transaction semantics specified, without requiring that you write any code to
    start and complete a transaction in the body of the save method. Don’t worry about
    the details associated with the annotation for now. Just know that externalizing
    this logic via AOP enables modifications to the transaction implementation without
    requiring you to refactor all the portions of the code base that depend on it.
    Similarly, you can be confident that changes to the core business logic won’t
    break the transaction semantics.


    Summary


    In this chapter, you’ve learned about the fundamental concepts that power the
    Spring Framework. You saw how to bootstrap a Spring **ApplicationContext**, learned
    the basics of configuring bean dependencies in Spring XML configuration files,
    and developed an understanding of bean scopes and life cycles. The benefits of
    dependency injection are now clear. You can effectively delegate to the Spring
    container to manage and resolve your application dependencies, and doing so can
    help keep your application’s dependencies loosely coupled. Finally, you were given
    a glimpse into the power of managing orthogonal coding concerns with AOP.


    Throughout the rest of this book, we will build on the Spring concepts introduced
    in this chapter to define and implement an art gallery application.


    **C H A P T E R 3**


    ■ ■ ■


    **Basic Application Setup**


    In this chapter, we’ll take you on a crash course though setting up a basic project
    using Spring and Hibernate. The tool we’ll use for managing our application is
    Apache Maven 3\. If you’re already well versed in Spring, Hibernate, and Maven,
    you may want to just skim through this chapter, so you can get a feel for structure
    and conventions we’ll be using throughout the book as we flesh out an art gallery
    application. We’re going to cover a lot of ground very quickly and provide references
    to the chapters where we dive deeper into the various configurations along the
    way.


    Application Management with Maven


    Maven was written by Sonatype’s Jason van Zyl in 2002 and reached its 1.0 release
    as a top-level Apache Software Foundation project in 2004. Maven strives to simplify
    day-to-day development by ensuring an easy, repeatable process for configuring.
    managing, and interacting with Java-based software projects.


    Maven revolves around the concept of a Project Object Model (POM), which represents
    the configuration for your project or module. In Maven parlance, a module is just
    a subproject for a given


    “parent” Maven project. This organizational construct allows you to create a project
    that is compartmentalized into a collection of smaller modules. Your POM describes
    many things about your project, including required dependencies, plugin configuration.
    and the order and operations for compiling and assembling your application.


    Maven provides a ton of features out of the box. Also, a tremendous amount of
    plugins have been developed by its massive community of users. When the time comes
    to further customize your project’s build process, writing Maven plugins on your
    own is a snap.


    Managed Dependencies


    Maven’s killer feature is its dependency management. Maven downloads all of your
    project’s dependencies from Maven repositories when you build or compile your
    application. This is a huge win when working in a team. Do you want to upgrade
    the version of Spring your project uses? Just update the project dependencies,
    commit to source control, and everyone on the team will automatically have their
    project upgraded to the newest version of Spring as well! Maven even handles transitive
    dependencies, meaning that Maven can automatically fetch the dependencies of the
    libraries your project depends on without you explicitly including them all.


    Remember how we told you that there are a huge number of mature plugins available
    for Maven?


    One example of a handy plugin that you have at your disposal is the excellent
    m2eclipse plugin, for integrating Maven with Eclipse. Figure 3-1, which comes
    courtesy of m2eclipse, shows you everything 33


