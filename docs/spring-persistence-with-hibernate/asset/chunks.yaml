    现在，让我们超越基础知识，将一些测试应用到我们的艺术画廊应用程序中。


    使用模拟对象进行单元测试


    前面示例中的测试相当简单，因为它们不依赖于 Spring 容器或其他类或组件的实现。由于我们的测试被隔离到特定的类，因此它们属于单元测试。大多数情况下，你需要超越这种基本测试，去模拟两个或多个类相互交互的效果。集成测试是实现这一点的一种方法，但这通常需要大量的代码和紧密的测试耦合。另一种策略是使用桩或模拟对象。


    桩和模拟都试图模拟应用程序中特定组件或层的行为，而不依赖于实际的、功能完整的实现。这种方法有助于将测试关注点集中到实际被测试的代码上，而不是其他层的细节上。


    桩通常意味着伪造一个特定的组件，返回“预设的响应”，从而使被测试层误以为它在与实际的实现进行通信。模拟也试图模拟特定的层，但它做的不仅仅是返回预设的响应。一个模拟对象还可以用于验证与其所代表的层相关的预期行为。例如，可以指定在模拟对象上调用某个特定方法，以及其他有助于对被测代码如何与模拟层集成提供有价值断言的细节。


    Spring 提供了几个有用的模拟层，它们可以作为应用程序中各层的即插即用替代品。例如，JNDI、Servlet-API 和 Portlet 模拟层，它们模拟各自层的行为和相关期望。对于模拟其他组件，可以使用像
    jMock、EasyMock 或 MockObjects 这样的框架。这些框架提供了一种可扩展的方式来动态定义你自己的模拟对象。


    **第 8 章 ■ 高效测试**


    在我们的示例中，我们将使用非常强大的 jMock 框架。jMock 允许你定义特定类的行为，以及在单元测试的上下文中，该类上的特定方法将如何被调用以及它们将返回什么的期望。jMock
    使用一个简单的 DSL，允许你指定相当灵活的行为范围。在本章后面我们查看带有模拟对象的单元测试时，会指出一些基本的 jMock 概念。


    让我们看一个单元测试，它试图验证我们的 **ArtworkService** 实现的行为：


    **package com.prospringhibernate.gallery.test;**


    **import com.prospringhibernate.gallery.domain.Person;**


    **import com.prospringhibernate.gallery.exception.AuthenticationException;**

    **import com.prospringhibernate.gallery.service.ArtworkFacade;**


    **import org.junit.Test;**


    **import org.junit.Before;**


    **import org.junit.runner.RunWith;**


    **import org.jmock.Mockery;**


    **import org.jmock.Expectations;**


    **import org.jmock.integration.junit4.JMock;**


    **import org.jmock.integration.junit4.JUnit4Mockery;**


    **@RunWith(JMock.class)**


    **public class JMockJUnitTestExample {**


    **Mockery context = new JUnit4Mockery();**


    **private Person person;**


    **private ArtworkFacade artworkService;**


    **@Before**


    **public void initializeTest() {**


    **person = new Person();**


    **person.setUsername("username");**


    **person.setPassword("goodpassword");**


    **// 这里我们使用 jMock 基于我们的接口创建一个模拟对象**

    **artworkService = context.mock(ArtworkFacade.class);**


    **}**


    **@Test**


    **public void testAuthenticationSuccess() throws AuthenticationException {**


    **// 为 authenticatePerson 方法定义期望**


    **context.checking(new Expectations() {{**


    **allowing(artworkService).authenticatePerson("username", "goodpassword");**

    **will(returnValue(person));**


    **}});**


    **artworkService.authenticatePerson("username", "goodpassword");**


    **}**


    **第 8 章 ■ 高效测试**


    **@Test (expected=AuthenticationException.class)**


    **public void testAuthenticationFailure() throws AuthenticationException {**


    **// 定义期望，假设用户名/密码错误**


    **context.checking(new Expectations() {{**


    **allowing(artworkService).authenticatePerson("username", "badpassword");**

    **will(throwException(new AuthenticationException()));**


    **}});**


    **artworkService.authenticatePerson("username", "badpassword");**


    **}**


    **}**


    请注意，这个单元测试不需要任何外部依赖。这不仅有助于隔离我们正在测试的代码，而且还能显著加快测试速度。回想一下，我们的 **ArtworkService**
    门面依赖于几个 DAO，包括 **ArtEntityDao** 和 **PersonDao**，但在这段代码中，在 **authenticatePerson**
    方法执行之前，没有任何东西实例化这些类。


    我们通过提供 **@RunWith(JMock.class)** 注解来声明我们正在使用 jMock 框架。接下来，我们定义上下文实例变量，实例化一个 **JUnit4Mockery**
    实例。然后，我们可以使用上下文实例变量来定义我们模拟的 **ArtworkFacade** 的行为和期望。


    我们通过调用上下文实例变量上的 **mock** 方法，并传入我们想要模拟的类型的接口来创建一个模拟实例：


    **artworkService = context.mock(ArtworkFacade.** class**);**


    这行代码将我们的 **artworkService** 实例设置为 **ArtworkFacade** 接口的一个模拟实现。这样就完成了设置。


    现在，我们需要为我们刚刚定义的模拟对象描述其行为和期望。这通过几个步骤完成。期望是通过调用 **context.checking()** 并传入一个类型为
    **Expectations** 的匿名内部类来指定的。**Expectations** 类提供了 jMock 的大部分 DSL 特性，使我们能够更容易地表达我们打算模拟的每个方法的行为。


    在这个 **Expectations** 块内部，事情变得有趣起来。我们可以为每个方法指定行为——甚至可以根据不同的参数或条件定义不同的行为。在模拟 **ArtworkFacade**
    的行为时，有几个选项可以定义。然而，我们必须首先为我们的方法将如何被调用设定期望。我们期望它被恰好调用一次、多次、在一定范围内、还是指定的次数？或者我们根本不关心我们的方法是否会被调用？这些细节被称为*调用计数*，并且是
    jMock DSL 的第一部分。

    '
- fmt: '在 our example 中，我们使用`allowing`调用规则，它告诉`jMock`我们不太关心调用次数。如果我们确实关心，可能会使用`oneOf`，这意味着我们期望该方法只被调用一次。或者我们可以使用`exactly(5).of()`来要求方法被精确调用五次。类似地，我们也可以使用`atLeast(5).of()`来坚持方法至少被调用五次。如果指定的期望在单元测试中未得到满足，`jMock`会自动使测试失败。


    到目前为止，我们的 DSL 结构如下所示：


    `Invocation-Count(mockInstance).method(expectedParams);`


    在这种结构中，我们指定了模拟方法应接收的预期参数。实际上，你可以定义多个规则，每个规则指定一组不同的参数。事实上，你甚至不需要指定具体的参数。你可以指定匹配器（`matchers`），它们可用于为特定行为规则定义更通用的条件。匹配器的作用是允许为模拟方法的期望表达灵活的条件。匹配器必须嵌套在`with`子句中：


    ```

    atLeast(5).of(artworkService).

    authenticatePerson(with(any(String.class)), with(any(String.class)));

    ```


    该规则规定`authenticatePerson`必须被调用至少五次，且两个参数必须是`String`类型。在这种情况下，我们使用了`any`匹配器，它允许我们指定参数必须匹配的类型。还有其他几个匹配器——例如`aNull`、`aNonNull`、`not`和`same`——你甚至可以定义自己的匹配器。


    那么，我们已经定义了模拟方法的基本期望。但如何表达模拟的行为呢？正如你可能从我们的示例中推断出的那样，`jMock`允许我们通过在期望之后指定一个`will`调用来为特定“规则”定义行为。我们为`authenticatePerson`方法定义了两种可能的结果。第一个期望定义了一个“正确”的用户名和密码。我们在该期望之后添加以下内容：


    `will(returnValue(successfulPerson));`


    这将确保每当在单元测试中向`authenticatePerson`方法提供`pfisher`和`goodPassword`时，都会返回一个`successfulPerson`实例（之前定义的）。


    类似地，我们定义了另一个期望，假设用户名和密码无效。对于这种变体，我们指定了以下`will`调用：


    `will(throwException(new AuthenticationException()));`


    这将确保在单元测试中，每当向`authenticatePerson`方法提供无效的用户名和密码时（只要无效的用户名和密码符合我们非常严格的条件，即要求它们是`username`和`badpassword`），都会抛出一个`AuthenticationException`。


    `will`调用还可以使用其他一些变体，例如`returnIterator`和`doAll`，以便在为一组条件定义模拟方法的行为时提供更大的灵活性。`jMock`还有一些更高级的功能，允许你将一组调用约束到特定序列，或者与状态机一起工作，并验证状态在从一个调用到下一个调用变化时的某些假设。请参阅
    JMock 文档以了解更多信息。


    > **注意** 我们鼓励你更详细地探索模拟，因为它是创建有效单元测试策略的强大工具。通常，开发人员过于关注集成测试，仅仅是因为当需要“伪造”依赖项的行为时，单元测试可能看起来更复杂。模拟是一种实用的解决方案，可以轻松定义依赖项的行为和期望，从而鼓励开发更多的单元测试。


    我们已经对隔离测试一段代码进行了简要概述。然而，一个有效的测试策略还需要考虑特定组件在运行应用程序上下文中的工作方式。这就是集成测试的用武之地，而 Spring
    通过帮助引导测试套件、解析依赖关系以及处理持久化细节（如事务）来简化集成测试的开发。


    ## Spring 依赖注入与测试


    Spring 框架提供了一个便捷的抽象层，极大地简化了在这些测试框架之间的切换，这个抽象层被称为 TestContext 框架。该框架作为 Spring 3
    的一部分被添加，有助于抽象掉任何测试框架特定的细节。通过使用 Spring 的 TestContext 框架，你不再需要担心特定测试框架的细节。这使得从一个测试策略切换到另一个测试策略变得特别容易。但更重要的是，TestContext
    框架旨在简化测试细节，使其不仅更容易编写有效的单元测试和集成测试，而且更容易集成 Spring 依赖项，并对持久化层做出有用的断言。


    Spring 测试结合了 XML 和注解来影响测试类中依赖项的注入方式。XML 配置的工作方式与你之前在本节中看到的示例类似。在定义集成测试时，你可以使用与应用程序中相同（或多或少）的
    XML 代码。然而，通常希望在保持应用程序 DAO 和服务对象的相同连接和实现细节的同时，覆盖某些 bean，例如数据源。这种策略使你能够验证整个持久化层的行为，同时利用专门的测试数据库。


    有相当多的 Spring 特定注解可用于将存储在应用程序和测试 XML 中的测试配置加载到正在运行的 JUnit 测试中。`@RunWith`注解允许你指定要使用的测试框架。如前所述，使用
    Spring 的 TestContext 框架的主要好处之一是，它允许你定义测试类，而无需将代码绑定到特定的测试框架。你可以通过使用`@Test`注解来指定某个类实际上是一个测试。


    然后，为了指示应该使用哪个测试框架来运行测试，你可以使用`@RunWith`，它允许你指定要运行的测试框架。对于本章中的示例，我们将坚持使用 JUnit 4。我们将以下注解放在测试类的顶部：


    `@RunWith(SpringJUnit4ClassRunner.class)`


    如果我们想切换到 TestNG，只需更改此注解的值即可。


    将`@RunWith`注解添加到单元测试类中，将使 Spring 参与到测试运行和必要依赖项的连接中。然而，对于如何指定连接细节，有几种选择。你选择的策略取决于应用程序的独特需求。例如，如果你正在构建一个只有一个数据源的简单应用程序，那么你可以采用按类型自动装配的策略，该策略将隐式注入与添加注解的
    setter 方法中指定的类型相匹配的类。但是，如果你的应用程序使用多个数据源，那么按类型自动装配的方法就不那么简单了。对于这些场景，你应该使用`@Resource`或`@Qualifier`注解，以消除你想要注入的依赖项的歧义。'
  raw: 'In our example, we use the **allowing** invocation rule, which tells jMock
    that we don’t care too much about the invocation count. If we did care, we might
    have used **oneOf**, which implies that we expect the method to be called only
    once. Or we could have used **exactly(5).of()** to require that our method be
    called precisely five times. Similarly, we might have used **atLeast(5).of()**
    to insist that our method be called at least five times. jMock will automatically
    fail the test if the expectations you specify are not met within the unit test.


    So far, our DSL structure looks like the following:


    **Invocation-Count(mockInstance).method(expectedParams);**


    CHAPTER 8 ■ EFFECTIVE TESTING


    In this structure, we specify the expected parameters our mocked method should
    receive. You can actually define more than one rule, each specifying a different
    set of parameters. In fact, you don’t even need to specify concrete parameters
    . You can instead specify *matchers*, which can be used to define more generalized
    conditions for a particular behavioral rule. The role of a matcher is to allow
    for the expression of flexible conditions for the expectations of a mocked method.
    Matchers must be nested within a **with** clause:


    **atLeast(5).of(artworkService).**


    **authenticatePerson(with(any(String.class)), with(any(String.class)));** This
    rule states that **authenticatePerson** must be called at least five times, with
    two parameters that must be of type **String**. In this case, we are using the
    **any** matcher, which allows us to specify the type that the parameter must match.
    There are several other matchers—such as **aNull**, **aNonNull**, **not**, and
    **same**—and you can even define your own matchers.


    So, we’ve defined the basic expectation of a mocked method. But how do we express
    a mock’s behavior? As you’ve probably inferred from our example, jMock allows
    us to define the behavior for a particular “rule” by specifying a **will** call
    after our expectation. We define two possible outcomes for our **authenticatePerson**
    method. The first expectation defines a “good” username and password. We follow
    this expectation with the following:


    **will(returnValue(successfulPerson));**


    This will ensure that a **successfulPerson** instance (defined earlier) will be
    returned whenever **pfisher** and **goodPassword** are provided to the **authenticatePerson**
    method in our unit test.


    Similarly, we define another expectation that assumes an invalid username and
    password. For this variant, we specify this **will** call:


    **will(throwException(new AuthenticationException());**


    This will ensure that an **AuthenticationException** is always thrown in our unit
    test, whenever an invalid username and password is provided to the **authenticatePerson**
    method (as long as the invalid username and password match our very stringent
    conditions, which require that they be **username** and **badpassword**).


    A few other variations can be used with the **will** call, such as **returnIterator**
    and **doAll**, to provide more flexibility in defining the behavior for our mocked
    method given a set of conditions. There are also a few more advanced features
    of jMock that allow you to constrain a set of calls to a particular sequence,
    or to work with a state machine and verify certain assumptions about the state
    as it changes from one call to the next. See the JMock documentation to learn
    more.


    ■ **Note** We encourage you to explore mocking in more detail, as it is a powerful
    tool in the creation of an effective unit-testing strategy. Often, developers
    focus too much on integration testing, simply because unit testing can seem more
    complicated when “faking” the behavior of dependencies becomes necessary. Mocking
    is a pragmatic solution to easily defining behavior and expectations for dependencies,
    encouraging the development of more unit tests.


    CHAPTER 8 ■ EFFECTIVE TESTING


    We’ve presented a cursory overview for unit testing a piece of code in isolation.
    However, an effective testing strategy also needs to take into consideration how
    a particular component works within the context of a running application. This
    is where integration testing comes in, and Spring serves to simplify the development
    of integration tests by helping to bootstrap your test suite, resolving dependencies,
    and handling persistence details, such as transactions.


    Spring Dependency Injection and Testing


    The Spring Framework provides a convenient layer of abstraction that drastically
    simplifies switching between these testing frameworks called the TestContext Framework.
    This framework, which was added as a part of Spring 3, helps to abstract away
    any test framework-specific details. By using Spring’s TestContext Framework,
    you no longer need to worry about the specifics of a particular testing framework.
    This makes it especially easy to jump from one testing strategy to another. But
    more important, the TestContext Framework serves to simplify testing details,
    making it easier to not only write effective unit and integration tests, but also
    to integrate Spring dependencies and make useful assertions related to your persistence
    tier.


    Spring testing includes a combination of XML and annotations to affect the way
    dependencies are injected within a test class. XML configuration works in a similar
    fashion to the examples you’ve seen earlier in this book. When defining integration
    tests, you can use the same XML code (more or less) that you use in your application.
    However, it is often desirable to override certain beans, such as your datasource,
    while maintaining the same wiring and implementation details for your application
    DAOs and service objects. Such a strategy enables you to verify the behavior of
    your entire persistence tier, while leveraging a specialized test database.


    Quite a few Spring-specific annotations are available to get the test configuration
    stored in your application and the test XML into a running JUnit test. The **@RunWith**
    annotation allows you to specify the test framework you would like to use. As
    mentioned earlier, one of the primary benefits of using Spring’s TestContext Framework
    is that it allows you to define a test class without tying your code to a particular
    test framework. You can specify that a particular class is in fact a test by using
    the **@Test** annotation.


    Then, to indicate which test framework should be used to run the test, you can
    use **@RunWith**, which allows you to specify which test framework to run. For
    the examples in this chapter, we’re going to stick with JUnit 4\. We place the
    following annotation at the top of our test class:


    **@RunWith(SpringJUnit4ClassRunner.class)**


    If we wanted to switch to TestNG, we could do that by simply changing the value
    of this annotation.


    Adding the **@RunWith** annotation to your unit test class will bring Spring into
    the picture for running the tests and wiring the necessary dependencies. However,
    there are several options for how the wiring details can be specified. The strategy
    you choose depends on the unique needs of your application. For instance, if you
    are building a simple application with only a single datasource, then you can
    go with an autowiring-by-type strategy, which will implicitly inject the class
    that matches the type specified in the setter method on which the annotation is
    added. However, if your application uses multiple datasources, then an autowiring-by-type
    approach isn’t as trivial. For those scenarios, you should use the **@Resource**
    or **@Qualifier** annotations, in order to disambiguate the dependency you would
    like injected.'
