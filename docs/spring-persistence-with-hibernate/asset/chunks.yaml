- fmt: "# Hibernate N+1 Selects Issue and Solutions\n\nAlthough this code may seem\
    \ innocuous, there is actually a serious performance issue hiding between the\
    \ lines. Since the `artEntities` association is not yet initialized when we first\
    \ retrieve each `Category` instance, we are actually initializing each `artEntities`\
    \ association within each successive iteration of the loop. Because Hibernate\
    \ has no way to infer what we are trying to do, it simply initializes each instance\
    \ as we reference it. The result is a separate SQL query for each item within\
    \ the collection.\n\nSo for the preceding loop, we are actually inadvertently\
    \ making (*number of categories*) + 1 queries!\n\nSuddenly, lazy loading doesn't\
    \ seem like such an optimization technique anymore.\n\nThis disturbingly common\
    \ scenario is known as the *N+1 selects* issue, in that a `select` query is issued\
    \ *N* times (one for each item returned by the original query), plus the original\
    \ query to load the entity containing the collection in the first place.\n\nA\
    \ similar predicament occurs for other associations, such as in the many-to-one\
    \ reference to the `ArtEntity` domain object from the `Comment` class. In this\
    \ scenario, if a list of `Comment` instances were to be loaded, an additional\
    \ `select` query would be initiated each time an attempt was made to access the\
    \ `commentedArt` property. Suppose a JSP page iterated through a long list of\
    \ comments in an attempt to display related information about the comment and\
    \ its associated art. This has the potential of requiring hundreds of additional\
    \ round-trips to the database!\n\nUnderstanding the potential for this problem\
    \ is the first step, but how do we go about preventing the N+1 selects issue?\
    \ Unfortunately, there is no single solution. (If there were, it would probably\
    \ be an implicit part of Hibernate or JPA.) Each situation may require a slightly\
    \ different approach. Fortunately, several strategies can help mitigate this potentially\
    \ damaging scenario. The goal, of course, is to limit the number of SQL queries\
    \ and attempt to load all the necessary data as efficiently as possible.\n\n##\
    \ Less Lazy Mappings\n\nOne solution to the N+1 selects problem is to update your\
    \ mapping configuration for the affected domain classes. The default behavior\
    \ for collections is to be lazy and to initialize the collection via a SQL `SELECT`\
    \ when the association is accessed. This default strategy is known as *select\
    \ fetching*, as a second `SELECT` is issued in order to initialize the lazy association\
    \ or property. The simplest solution is to override this default behavior, preventing\
    \ the property from being lazy in the first place.\n\nLet's refactor the mapping\
    \ configuration affecting the `artEntities` association on our `Category` instance,\
    \ as follows:\n\n```java\n@ManyToMany\n@Fetch(FetchMode.JOIN)\npublic Set<ArtEntity>\
    \ getArtEntities() {\n    return artEntities;\n}\n```\n\nBy adding the `@Fetch`\
    \ annotation, specifying a `FetchMode` of `JOIN`, we request that Hibernate automatically\
    \ initialize our `artEntities` collection by using a left outer join when a particular\
    \ `Category` instance is loaded. Hibernate is affected by this `@Fetch` directive\
    \ when navigating to a particular `Category` instance, loading an instance via\
    \ `get()` or `load()`, or when loading `Category` instances via the Criteria API.\
    \ Alternatively, you can opt to specify `FetchMode.SUBSELECT`, which will instead\
    \ load the `artEntities` collection by including a SQL subselect as part of the\
    \ initial query. In either case, the end result is that the `artEntities` association\
    \ is no longer lazy, and an additional query is not required to initialize each\
    \ `artEntities` association.\n\nSo problem solved, right? Not exactly. Remember\
    \ how we mentioned that lazy loading is actually a pretty important feature, and\
    \ that without it, you risk inadvertently loading too much of your entire database\
    \ into memory? In other words, you may not always need the `artEntities` association,\
    \ and in those circumstances, you are better off keeping the property as lazy.\n\
    \nSo, sometimes it's good to be lazy, like on weekends and on vacation when you're\
    \ catching up on rest. But other times being lazy can get you into trouble (especially\
    \ at work). Hibernate is the same way.\n\nThe best way of solving the N+1 selects\
    \ problem is to keep your associations declared lazy by default, but override\
    \ this behavior when you know the association is needed. For example, using JPQL,\
    \ we could write the following query:\n\n```java\nList categories = entityManager.createQuery(\"\
    SELECT c FROM category c\nLEFT JOIN FETCH c.artEntities\nWHERE c.id = :id\").getResultList();\n\
    ```\n\nAs part of this JPQL query, we issue a `LEFT JOIN FETCH`. This will force\
    \ Hibernate to initialize our `artEntities` association, overriding the default\
    \ lazy behavior in the mapping file.\n\n## Batching for Performance\n\nAnother\
    \ strategy for reducing the number of SQL queries required to load data is to\
    \ use Hibernate's batching feature, which loads multiple entities or collections.\
    \ Batching offers a slightly simpler solution than controlling lazy loading. You\
    \ attempt to grab data in batches to prevent this data from being loaded in many\
    \ more \"single queries\" later on. The advantage of batching is that it can help\
    \ improve performance without requiring significant changes to queries or code.\n\
    \nThe `@BatchSize` annotation can be added to a domain entity or to a particular\
    \ association. Let's update our `artEntities` association in our `Category` class\
    \ again to see how we might be able to use Hibernate's batching feature:\n\n```java\n\
    @ManyToMany\n@BatchSize(size = 10)\npublic Set<ArtEntity> getArtEntities() {\n\
    \    return artEntities;\n}\n```\n\nNow, even though our `artEntities` association\
    \ is still lazy by default, Hibernate will get ahead of us and attempt to initialize\
    \ more than just a single `artEntities` collection at a time. It accomplishes\
    \ this by using a SQL `in` condition, passing in ten identifiers of a `Category`\
    \ instance when loading from the `ArtEntity` table.\n\nIn other words, batching\
    \ works similarly to the default lazy configuration. First a `Category` is loaded,\
    \ then its `artEntities` association is loaded in a separate query (when the `artEntities`\
    \ property is accessed, of course). However, with batching enabled, Hibernate\
    \ will attempt to load more than one `artEntities` association, querying for the\
    \ number of associations specified in the `size` attribute of the `@BatchSize`\
    \ annotation.\n\nKeep in mind that `@BatchSize` doesn't attempt to load multiple\
    \ items within a collection. A collection is normally initialized in entirety\
    \ via a separate `select`. Rather, `@BatchSize` will load multiple associations,\
    \ to preclude initialization of other associations in our other `Category` instances\
    \ (using our example).\n\n## Lazy Initialization Exceptions\n\nAnother common\
    \ issue is the ominous `LazyInitializationException`. You can probably infer what\
    \ this exception means by its name: Hibernate is unable to initialize a lazy property.\
    \ What circumstances account for such a problem?"
