    Configuring Dozer with Spring


    Now that we have defined our DTO classes, let’s create the mapping configuration
    that instructs Dozer how to map one class to another. Dozer provides a **DozerBeanMapperFactoryBean**
    abstraction for Spring, which is a factory bean that will help to create the Dozer
    mapper. The Dozer mapper relies on an XML


    configuration file to learn the rules that define how the properties of one class
    are mapped to the properties of another class.


    First, let’s add the appropriate configuration to our **spring-master.xml** file:


    **<bean class="org.dozer.spring.DozerBeanMapperFactoryBean">**


    **<property name="mappingFiles" value="classpath*:/dozer-mapping.xml"/>**


    **</bean>**


    This bean is actually quite flexible, and supports additional properties for defining
    custom converters, event listeners, and other Dozer extension points. You can
    learn more about the capabilities of the **DozerBeanMapperFactoryBean** on the
    Dozer website.


    In the preceding configuration, we have specified that the Dozer mapping files
    should be located on the classpath, under the name **dozer-mapping.xml**. This
    XML file defines the default behavior for Dozer 164


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    as well as the rules for mapping between one class and another. Let’s take a look
    at our Dozer mapping configuration:


    **<?xml version="1.0" encoding="UTF-8"?>**


    **<mappings**


    ****xsi:schemaLocation="http://dozer.sourceforge.net**


    ****http://dozer.sourceforge.net/schema/beanmapping.xsd">**


    ****<configuration>**


    **<stop-on-errors>true</stop-on-errors>**


    **<date-format>MM/dd/yyyy HH:mm</date-format>**


    **<wildcard>true</wildcard>**


    **</configuration>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.ArtEntity</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.ArtEntityDTO</class-b>**


    **<field>**


    **<a>galleryPicture.url</a>**


    **<b>galleryURL</b>**


    **</field>**


    **<field>**


    **<a>storagePicture.url</a>**


    **<b>storageURL</b>**


    **</field>**


    **<field>**


    **<a>thumbnailPicture.url</a>**


    **<b>thumbnailURL</b>**


    **</field>**


    **</mapping>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.Category</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.CategoryDTO</class-b>**


    **</mapping>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.Comment</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.CommentDTO</class-b>**


    **</mapping>**


    ****<mapping>**


    **<class-a>com.prospringhibernate.gallery.domain.Exhibition</class-a>**


    **<class-b>com.prospringhibernate.gallery.dto.ExhibitionDTO</class-b>**


    **</mapping>**


    ****</mappings>**


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    Let’s step through the important components of this configuration. First is a
    configuration block toward the top of the file. This section specifies the default
    global mapping behavior for Dozer.


    We define a default **date-format** and also set the **wildcard** behavior to
    **true**. The **wildcard** behavior determines whether Dozer will attempt to automatically
    map all obvious properties by default. For instance, if **wildcard** is set to
    **true** and both mapped classes share properties with the same name, Dozer will
    attempt to map these properties automatically. This feature can be overridden
    within specific mapping rules. If **wildcard** is left active, you can still omit
    certain properties from being mapped by using the **field-exclude** element. For
    instance, if we wanted to prevent our **subTitle** property from being mapped,
    we could add the following snippet to the **ArtEntity** mapping configuration:


    **<field-exclude>**


    **<a>subTitle</a>**


    **<b>subTitle</b>**


    **</field-exclude>**


    The mapping configuration for a pair of classes is straightforward. Each mapping
    definition is encapsulated in a mapping XML block. Within each block, we include
    a **class-a** element and a **class-b** element, specifying the respective classes
    to be mapped. Although the configuration is sequential in nature, keep in mind
    that Dozer is bidirectional by default. This means that rules defining how we
    map from an **ArtEntity** class to an **ArtEntityDTO** class can also be applied
    in reverse to map from a DTO class back to a domain class. You can require that
    mapping rules be applied in only a single direction by adding the attribute **type="one-way"**
    to a mapping element.


    In the case of our **ArtEntity** to **ArtEntityDTO** mapping, most of the details
    will be implicit since the property names are fairly consistent between the two
    classes. Although the **comments** collection property on the **ArtEntityDTO**
    contains elements of a different type, Dozer will automatically convert each **Comment**
    element within the **ArtEntity.comments** collection to an instance of **CommentDTO**
    by applying the mapping rules specified.'
