- fmt: "# Handling Associations in Grails\n\nWe have described how associations can\
    \ be defined by using the `hasMany` and `belongsTo` conventions. These constructs\
    \ are effective for indicating how our domain entities relate to each other. Once\
    \ our domain model is defined, we need to manipulate it.\n\nRecall that in the\
    \ Hibernate world, it is important to write code to ensure that bidirectional\
    \ associations are properly managed. For instance, it is common practice to define\
    \ `add*` and `remove*` methods within a Hibernate domain class that ensure both\
    \ ends of an association are properly set or removed. Grails helps to ensure that\
    \ both sides of an association are properly referenced (or dereferenced) by providing\
    \ dynamic `addTo*` and `removeFrom*` methods. For instance, if we want to add\
    \ new `Comment` instances to an `ArtEntity`, we could do so using the following\
    \ code:\n\n```\ndef loadedArtEntity = ArtEntity.findByName(\"Awesome Panorama\"\
    );\ndef loggedInUser = Person.findByUsername(\"Sam\");\n\nComment newComment =\
    \ new Comment(\n    comment: \"Cool pict!\",\n    commentDate: new Date(),\n \
    \   person: loggedInUser);\n\nloadedArtEntity.addToComments(newComment);\n\nif\
    \ (!loadedArtEntity.hasErrors() && loadedArtEntity.save()) {\n    println(\"new\
    \ comment saved\");\n} else {\n    println(\"Error saving new comment\");\n}\n\
    ```\n\nIn our example, we define a new `Comment` and then add it to the `ArtEntity`\
    \ `comments` association using the `addToComments` method. We could also choose\
    \ to remove a particular comment reference using the `removeFromComments` method.\
    \ Notice that we did not invoke `save()` on our new `Comment` instance directly.\
    \ Instead, we saved our `ArtEntity` instance, allowing the save operation to cascade\
    \ to the `comments` association since we have specified that `ArtEntity` is the\
    \ owner of the association. This association ownership is expressed in this line\
    \ within the `Comment` domain class: `static belongsTo = [commentedArt: ArtEntity]`\n\
    \n# Scaffolding and Building Your Grails Application\n\nWith our domain model\
    \ defined, we can rely on Grails’ generation scripts to create scaffolded functionality\
    \ for our gallery application. You can download the full Grails-based gallery\
    \ application from this book’s web site.\n\nTo generate controllers and views\
    \ for a particular domain class, make sure you are at the root of our Grails gallery\
    \ application and then run the following:\n\n```\ngrails generate-all <<domain-class>>\n\
    ```\n\nBe sure to swap `domain-class` for the name of the domain entity for which\
    \ you would like to generate controllers and GSPs. You can also generate just\
    \ the controllers or just the GSPs by calling the following scripts, respectively:\n\
    \n```\ngrails generate-controller <<domain-class>>\ngrails generate-views <<domain-class>>\n\
    ```\n\nWe strongly recommend examining the generated controllers and views to\
    \ get a better sense of how a typical Grails application works. Keep in mind that\
    \ the generated code is based on scaffolding designed to work in a very generic\
    \ way (so that it works for all types of domain models). Therefore, it is also\
    \ useful to examine the sample Grails gallery application for a slightly different\
    \ perspective.\n\n> **Note** For details on Grails development, including building\
    \ controllers and GSPs, see *The Definitive Guide to Grails, Second Edition*,\
    \ by Graeme Rocher (Apress, 2009).\n\nYou can easily start up your Grails application\
    \ using a particular environment, by passing the `grails.env` environment variable\
    \ into the `grails run-app` script:\n\n```\ngrails –Dgrails.env=development run-app\n\
    ```\n\nThis command will automatically start up our application using the `development`\
    \ environment configuration. You wouldn’t normally want to run a production or\
    \ staging application this way, but it is convenient for testing purposes. Internally,\
    \ Grails uses an embedded Jetty server to run your application when you use the\
    \ `run-app` command.\n\nYou can deploy Grails to any application server if you\
    \ create a WAR file using the Grails `war` command. If you want to create an application\
    \ for deploying into your own application server, you would instead run this:\n\
    \n```\ngrails –Dgrails.env=production war\n```\n\nWe recommend explicitly using\
    \ `–Dgrails.env` to specify an environment, as it supports both default and custom\
    \ environments. However, if you are using the default Grails environments, you\
    \ can use this shortcut:\n\n```\ngrails prod war\n```\n\n# Defining a Transactional\
    \ Service Layer in Grails\n\nYou’ve learned about transactional support throughout\
    \ this book. You know how important it is to ensure that operations within a particular\
    \ method all complete (or roll back) as a single, atomic unit of work. Grails\
    \ also encourages the use of the service facade pattern, and makes defining transactional\
    \ requirements extremely easy. However, in the name of flexibility, Grails provides\
    \ a couple of options for ensuring persistent operations occur within a transactional\
    \ context.\n\nIf you don’t want to create a service class, an alternative approach\
    \ for ensuring persistence operations occur within a transactional context is\
    \ to enclose a block of code inside a closure and pass this to the dynamic `withTransaction`\
    \ method, injected to each domain class. For instance, we could ensure an update\
    \ to a category and an `ArtEntity` occurs within a transaction by doing the following:\n\
    \n```\nComment.withTransaction {txStatus ->\n    def comments = Comment.findAllByCommentDateGreaterThan(lastWeek);\n\
    \    comments.each {Comment curComment ->\n        if (Comment.hasSpam(curComment))\
    \ {\n            curComment.delete()\n        }\n    }\n}\n```\n\nHere, we are\
    \ actually defining an anonymous closure block and passing this closure to the\
    \ `Comment` domain object’s dynamic `withTransaction` method. This is a trivial\
    \ example, but it illustrates how simple defining a transaction can be using Grails.\n\
    \n> **Note** The `txStatus` closure parameter is an `org.springframework.transaction.TransactionStatus`\
    \ object, which allows you to get information about the currently executing transaction\
    \ and trigger a rollback programmatically by calling `txStatus.setRollbackOnly()`.\n\
    \nA cleaner approach is to implement a service layer and organize your transactional\
    \ operations within a service method. In Grails, you can create a new service\
    \ method by running the following command:\n\n```\ngrails create-service servicename\n\
    ```\n\nThis will create a new service within the `grails-app/services` directory.\
    \ Grails has a fairly simplistic way of declaring whether a particular service\
    \ class should be transactional. Just add the following to the top of your service\
    \ class:\n\n```\nstatic transactional = true;\n```\n\nIf `transactional` is set\
    \ to `true`, your methods will all run within a transactional context. If the\
    \ static property is `false`, a transaction will not be used.\n\n# Summary\n\n\
    In this chapter, we’ve covered some of the fundamentals for developing a web application\
    \ using Groovy and Grails. Grails provides an interesting contrast to the topics\
    \ covered in the previous chapters.\n\nAlthough based firmly on Spring and Hibernate,\
    \ Grails utilizes Active Record as an alternative to the DAO design pattern. This\
    \ approach is more practical in Grails due to its use of the dynamic language\
    \ Groovy, allowing new behavior and methods to be dynamically defined. Through\
    \ the use of convention-over-configuration, Grails can significantly reduce the\
    \ amount of effort required to get a working application up and running.\n\nDespite\
    \ some of these differences, Spring’s profound influence is clearly present, and\
    \ most of the lessons and patterns utilized with other persistence frameworks\
    \ can still be applied to Grails. You’ve seen how some of the fundamental Spring\
    \ concepts, such as dependency injection, can be further enhanced through Groovy-based\
    \ configuration and implicit, convention-based wiring.\n\n# Spring Roo"
