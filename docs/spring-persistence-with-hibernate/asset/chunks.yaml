- fmt: "# 服务层与 DAO 注解\n\n`@Service`定义了一个服务外观。通常，服务层包装 DAO 层，提供一个连贯的、事务性的服务，该服务通常作为应用程序的业务逻辑。服务层通常被称为*外观*，因为它作为数据访问代码的抽象，隐藏了底层实现细节，并提供了业务特定的\
    \ API。我们将在第 8 章更详细地讨论服务层。\n\n这三个注解逻辑上扩展自`@Component`注解，该注解定义了任何旨在由 Spring 容器管理的\
    \ bean。实际上，在我们的示例中，我们完全可以只使用`@Component`而不是`@Repository`，但这样会失去我们类作为 DAO 的意图。换句话说，我们使用`@Repository`注解来向\
