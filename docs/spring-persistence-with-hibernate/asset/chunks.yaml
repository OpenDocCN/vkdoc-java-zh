    CHAPTER 8 ■ EFFECTIVE TESTING


    So now you have a handle on some of the options for injecting the layers on which
    your test class depends. The question that remains is how to inject. In our gallery
    application, we have defined Spring beans in an XML file named **spring-master.xml**,
    **which in turn imports our **spring-persistence.xml** configuration. We can import
    this configuration by adding the following annotation:**


    ****@ContextConfiguration(locations = {"classpath:/META-INF/spring/spring-master.xml"})**
    The **@ContextConfiguration** annotation defines the locations of your configuration
    files. You can determine, on a test-by-test basis, whether to use the Spring configuration
    file for your full-blown application or to define a more specific unit-testing
    configuration that is tailored for the needs of a particular test.


    Spring configuration via XML is handy, but now you’re probably wondering how you
    can access some beans that are defined in your configuration or those that were
    picked up through component scanning. Do you remember the **@Autowired** annotation
    that Spring managed beans can use? You can use it in your test code to tell the
    Spring JUnit **Runner** that you need some Spring beans.


    Here’s what the **PersonDAO** test code looks like when we put all of this together:
    **package com.prospringhibernate.gallery.test;**


    ****import org.junit.Test;**


