    回到我们的图库应用程序，让我们定义一个简单的单元测试，演示如何保存和加载 **Person** 领域类。由于我们希望展示 Grails 在运行中的应用中的行为，我们需要创建一个集成测试，它实际上会启动一个
    Spring **ApplicationContext**，这样我们就可以测试依赖于 Grails 核心功能（如持久化）的特性。


    Grails 自带一个脚本，可以为我们创建集成测试的脚手架：**grails create-integration-test Person**


    运行此命令后，你会在 **test/integration/grailsGallery/PersonTests.groovy** 下找到一个集成测试存根。在我们的测试中，我们将验证是否可以实例化、保存和加载一个
    **Person** 领域实体：


    第 11 章 ■ GORM 和 GRAILS


    **class PersonTests extends GroovyTestCase {**


    **...**


    **void testSavePerson() {**


    **Person person = new Person(**


    **[firstName: "Sam", lastName: "Smith",**


    **username: "ssmith", password: "1234",** **email: "sam@notarealaddress.com",**


    **roleLevel: Person.ADMIN_ROLE])**


    **assertTrue("Person 实体有效且可保存",** **(person.validate() && person.save()))**


    **assertNotNull ("person id 为空", person.id)**


    **def loadedPerson = Person.get(person.id)**


    **assertTrue(**


    **"Person 已成功加载",**


    **loadedPerson != null &&**


    **loadedPerson.username != null)**


    **}**


    **}**


    这是一个非常直接的测试。请注意，我们使用一个包含 Groovy 类默认属性的 **java.util.Map** 来实例化 **Person** 实体。在
    **Person** 实例被实例化后，我们验证该实例是否验证并成功保存。**validate()** 会验证我们领域模型的 **constraints**
    块中指定的所有要求。如果我们的领域模型验证失败，Grails 会在 **Person** 实例上设置一个 **errors** 属性。**errors**
    属性包含每个验证失败的详细信息，并且是 **org.springframework.validation.Errors** 接口的一个实现。


    这个接口对于跟踪和管理表单提交非常有用，Spring MVC 的用户应该很熟悉。


    如果发生验证错误，我们可以遍历每个错误来找出具体问题：


    **person.errors.allErrors.each {curError ->**


    **log.error("保存 Person 实例时出错: ${curError}");**


    **}**


    我们也可以通过这种方式获取错误计数：


    **person.errors.errorCount()**


    ■ **注意** 一个 **log** 实例变量会自动注入到所有控制器和服务类中，让你能够轻松地输出日志消息。这是 log4j 的 **Logger** 类的一个实例，并在本章前面描述的
    **Config.groovy** 文件中进行配置。


    第 11 章 ■ GORM 和 GRAILS


    Grails 自带一个标签库，有助于在典型的表单提交中渲染错误。


    此外，默认的 Grails 模板会创建 GSP 视图，这些视图在发生任何验证或保存失败时会自动渲染清晰的错误消息。当然，可以通过更新 **messages.properties**
    文件轻松覆盖默认的错误消息。


    至此，你应该对如何保存和加载领域实体有了扎实的理解。不幸的是，这还远远不够。你还需要能够查询数据库。


    为了演示如何查询，我们首先需要向数据库中添加一些数据。


    让我们回到 **PersonTests.groovy** 文件，定义一个 **setup()** 方法，该方法将在每次测试运行之前执行，并允许我们用一些示例数据填充数据库：**void
    setUp() {**


    **def baseNames = [**


    **"Sam", "Bob", "Heather",**


    **"Steve", "Sofia"]**


    **baseNames.each {curName ->**


    **def person = new Person(**


    **[firstName: curName,**


    **lastName: curName,**


    **username: curName,**


    **password: "1234",**


    **email: "${curName}@apress.com",**


    **roleLevel: Person.USER_ROLE])**


    **assertTrue (**


    **"Person 实体有效且可保存",**


    **(person.validate() && person.save()))**


    **assertFalse(**


    **"保存的实体不应有错误",**


    **person.hasErrors())**


    **}**


    **}**


    这个方法有点过时，因为我们只是遍历一个 **java.util.List** 的名字，并使用这些名字作为每个字段的种子数据来创建新的 **Person**
    实体。还要注意，我们添加了一个新的断言来验证 **person.hasErrors()** 是否为 false。在 **save** 操作之后，调用 **hasErrors()**
    是一个有用的惯用方法，用于确认没有错误阻止实体被持久化到数据库。


    你会在默认的 Grails 控制器中频繁看到这种方法。


    现在我们有了用一些示例数据填充数据库的方法，让我们看看 Grails 如何使数据库查询变得非常直观。


    **void testFinders() {**


    ****def foundPeople = Person.findAllByUsername("Sam");**


    ****/* foundPeople 应引用一个包含一个 Person 实体的 List */**


    **assertEquals("找到一个 Person", 1, foundPeople.size())**


    ****/* singlePerson 应引用单个 Person 实体，且 lastName 属性应等于 Sam */**


    **def singlePerson = Person.findByUsername("Sam")**


    第 11 章 ■ GORM 和 GRAILS


    ****assertEquals(**


    **"姓氏是 Sam", "Sam", singlePerson.lastName)**


    ****def allPeopleSorted =**


    **Person.list(max: 3, order: "asc",**


    **sort: "username", offset: 0);**


    ****assertTrue(**


    **"返回了三个 Person", allPeopleSorted.size())**


    ****assertEquals(**


    **"列表中的第一个 Person 是 Sam", "Sam",**


    **allPeopleSorted[0].username)**


    ****}**


    这个新方法有助于说明使用 Grails 的动态查找器概念查询数据的巨大灵活性。请注意，每个方法名称的格式决定了最终在数据库上生成的查询。


    在我们的第一个示例中，我们运行了 **Person.findAllByUsername("Sam")**。这种结构返回与字段 **username** 匹配的*所有*数据。请注意，我们使用了驼峰命名法。这种格式可以通过以下结构更好地表达：


    ***DOMAIN*****.findAllBy< *PROPERTYNAME*>** 如果你查看断言，你会注意到这种类型的方法总是返回一个对象集合。相反，我们的下一个断言使用了以下格式：


    ***DOMAIN*****.findBy< *PROPERTYNAME*>**


    **这个方法的工作方式类似，但只返回单个对象。我们的断言验证了这一说法，因为我们演示了返回值是一个单独的 **Person** 实例，而不是一个集合。


    **findAllBy** 和 **findBy** 这两种动态方法也可以扩展，以便在属性名称上指定修饰符或提供进一步的约束。例如，如果我们想查找所有名字和姓氏以字母
    *p* 开头的用户，可以通过以下方法表达：


    **Person.findAllByFirstNameIlikeAndLastNameIlike("P%", "P%");** 在这个例子中，我们首先指定了一个条件属性
    **firstName**，然后使用 **Ilike** 修改条件。**Ilike** 修饰符类似于 **like** 修饰符，但不区分大小写。接下来，我们在方法名后追加
    **And**，以通过额外的属性条件进一步约束查询。


    类似的方法也可以用于查找数据库中匹配指定条件集的行数，通过使用 **countBy*** 动态查找器方法。基于这个例子，我们可以定义一个方法命名结构，来描述动态查找器方法的格式：


    **countBy/findBy/findAllBy<PROPERTYNAME><MODIFIER>AND/OR<PROPERTYNAME><MODIFIER>**
    208


    第 11 章 ■ GORM 和 GRAILS


    以下是一些可以使用的修饰符：


    • **Between**


    • **GreaterThan**


    • **GreaterThanEquals**


    • **LessThan**


    • **LessThanEquals**


    • **Like**


    • **Ilike**


    • **Not**


    • **Equal**

