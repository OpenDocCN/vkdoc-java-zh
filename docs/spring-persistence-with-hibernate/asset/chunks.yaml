    3\. Brian, still in his same T2 transaction, **UPDATE**s a record in the **ArtEntity**
    table, correcting a typo.


    4\. Paul, still in his same T1 transaction, **SELECT**s all pieces of art in the
    **ArtEntity** table a second time.'
