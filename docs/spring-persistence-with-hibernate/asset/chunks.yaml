- fmt: "To wrap our persistence code within a transaction, we call the `execute` method\
    \ on our `transactionTemplate` property, passing in an anonymous implementation\
    \ of `TransactionCallback` as a parameter. In the example, our service method\
    \ does not return a value, so we implement the method `doInTransactionWithoutResult`.\
    \ However, if we needed to return a value from our transaction, we would instead\
    \ use `doInTransaction`.\n\nWithin the scope of the `TransactionCallback`, we\
    \ are calling the same persistence code that we used in our annotation-based example.\
    \ We delegate to our `artEntityDao` to do the heavy lifting. Notice, however,\
    \ that we catch the `ImageErrorException`, and should the exception get thrown,\
    \ we use the `TransactionStatus` parameter to rollback the transaction.\n\nClearly,\
    \ this approach is not as clear or as elegant as using declarative transactions\
    \ in Spring.\n\nNevertheless, it is helpful to see how the various components\
    \ fit together without relying on AOP to inject this behavior implicitly.\n\n\
    ## Transactional Examples\n\nNow that we’ve covered the main transactional concepts,\
    \ let’s go through a couple of real-world scenarios. We’ll look at a batch application\
    \ and transactions involving two datasources.\n\n### Creating a Batch Application\n\
    \nBatch applications can be a bit of a drag, especially with ORM frameworks. Both\
    \ the database and the ORM framework need to reserve valuable resources for each\
    \ operation performed in a transaction. The database needs to keep locks on the\
    \ tables that you’ve changed. The ORM, for a variety of reasons, needs to cache\
    \ the objects that you’ve persisted and read from the database. The more operations\
    \ a transaction executes, the more resources the ORM and database need to dedicate\
    \ to it.\n\nLet’s start out with the following example, which updates a whole\
    \ bunch of records:\n\n```\n@Transactional(readOnly = false, propagation = Propagation.SUPPORTS)\n\
    public void batchProcessAll() {\n    int count = dao.getCount();\n    // do your\
    \ ACID business in a big for loop\n}\n```\n\nHere, we’re attempting to update\
    \ all of the data in a single transaction. Depending on the amount of data and\
    \ system resources, this may not be possible, or it may lead to degraded performance\
    \ for our application. Instead, we may be able to find a way to define smaller\
    \ units that can be committed, which will free up some of the resources utilized\
    \ by the database and ORM framework. However, the process of committing the transaction\
    \ consumes resources as well. If we commit too often, we’ll probably decrease\
    \ performance. There’s a balance between committing too often and too little—for\
    \ example, committing after a certain number of items have been processed.\n\n\
    We can create a method that processes *x* number of units and commits after it\
    \ completes. It’s actually quite simple to set this up. We’ll choose 100 as an\
    \ arbitrary number of *units of work*.\n\n```\n// no transaction on this method\
    \ anymore\npublic void batchProcessAll() {\n    int count = dao.getCount();\n\
    \    for(int i=0; i<count; i+= 100) {\n        doMyUnit(i, i+100);\n    }\n}\n\
    \n@Transactional(readOnly = false, propagation = Propagation.REQUIRES_NEW)\npublic\
    \ void doMyUnit(int start, int finish) {\n    // do your ACID business from the\
    \ unit's\n    // start to finish\n    dao.flush();\n}\n```\n\nNote the use of\
    \ `Propagation.REQUIRES_NEW`. It tells Spring that a new transaction begins when\
    \ the method gets invoked and commits when the method completes. It’s just that\
    \ simple to create and commit a transaction. There are many variables, ranging\
    \ from server capacity to application load, to be able to prescribe an ideal batch\
    \ size, so determining the best size for your application will likely require\
    \ some trial and error.\n\n### Using Two Datasources\n\nAssume you have two databases,\
    \ and you want to apply the right transactions to the right beans. You need to\
    \ create two different `transactionManager`s that must be applied to the appropriate\
    \ subsets of Spring beans. You can do that with some fancy AOP work.\n\nAssume\
    \ that you have already configured `transactionManager1` and `transactionManager2`\
    \ beans.\n\nYou’ll need to start with the following XML:\n\n```\n<tx:advice id=\"\
    txAdvice1\" transaction-manager=\"transaction-manager1\" >\n    <tx:attributes>\n\
    \        <tx:method name=\"save*\" propagation=\"REQUIRED\"/>\n        <tx:method\
    \ name=\"update*\" propagation=\"REQUIRED\"/>\n        <tx:method name=\"delete*\"\
    \ propagation=\"REQUIRED\"/>\n        <tx:method name=\"*\" propagation=\"SUPPORTS\"\
    \ read-only=\"true\"/>\n    </tx:attributes>\n</tx:advice>\n\n<tx:advice id=\"\
    txAdvice2\" transaction-manager=\"transaction-manager2\" >\n    <tx:attributes>\n\
    \        <tx:method name=\"save*\" propagation=\"REQUIRED\"/>\n        <tx:method\
    \ name=\"update*\" propagation=\"REQUIRED\"/>\n        <tx:method name=\"delete*\"\
    \ propagation=\"REQUIRED\"/>\n        <tx:method name=\"*\" propagation=\"SUPPORTS\"\
    \ read-only=\"true\"/>\n    </tx:attributes>\n</tx:advice>\n\n<aop:config>\n \
    \   <aop:advisor advice-ref=\"txAdvice1\" pointcut-ref=\"allDatabaseOneBeans\"\
    />\n    <aop:advisor advice-ref=\"txAdvice2\" pointcut-ref=\"allDatabaseTwoBeans\"\
    />\n    <!-- Add pointcuts here -->\n</aop:config>\n```\n\nThe `tx:advice` element\
    \ tells Spring what needs to be done, and the `aop:config` element tells Spring\
    \ where it needs to be done.\n\nThe question now is what beans should have which\
    \ advice? Some beans need `txAdvice1`; others need `txAdvice2`; and others may\
    \ need both. Thankfully, Spring AOP provides several mapping options.\n\nYou might\
    \ chose to organize your classes into packages that differentiate between the\
    \ two datasources to which they relate and apply an expression pointcut, or you\
    \ can devise logical bean names that clearly infer which advice to apply. You\
    \ can also create our own annotations, `@Transaction1` and `@Transaction2` for\
    \ example, and use the `expression=\"@target(...)\"` approach.\n\nLet’s go through\
    \ a quick bean name example. Imagine we have two datasources: `datasource1` and\
    \ `datasource2`. Let’s say that all of the `datasource1` beans have `ds1` as part\
    \ of their bean name. For example, if `PersonDao` is intended to interface with\
    \ `datasource1`, it would be called `ds1.personDao`. If `PersonService` depends\
    \ on `personDao` as well as a DAO from `datasource2`, it should be called `ds1.ds2.personService`.\n\
    \nOur pointcuts will look like the following:\n\n```\n<aop:pointcut id=\"allDatabaseOneBeans\"\
    \ expression =\"bean(*ds1*)\"/>\n<aop:pointcut id=\"allDatabaseTwoBeans\" expression\
    \ =\"bean(*ds2*)\"/>\n```\n\nWe’ve defined two pointcut expressions that utilize\
    \ a bean-naming convention to properly infer which datasource and `transactionManager`\
    \ to utilize for a given transaction.\n\n## Summary\n\nIn this chapter, you’ve\
    \ learned both the fundamentals and low-level details for managing database transactions\
    \ with Spring. We’ve explored two different avenues for applying transactions\
    \ declaratively with Spring: via annotation and through XML-based Spring configuration.\
    \ It’s also possible to utilize Spring’s transaction management programmatically,\
    \ through the use of the `TransactionTemplate`. However this approach couples\
    \ transactional behavior with the application’s business logic.\n\nUnderstanding\
    \ how transactions work, along with the available configuration options, is critical\
    \ for developing and debugging multiuser applications. We’ve discussed both simple\
    \ and complex scenarios in this chapter, and we hope they give you a taste of\
    \ what’s possible when using Spring for transaction management."
  raw: 'To wrap our persistence code within a transaction, we call the **execute**
    method on our **transactionTemplate** property, passing in an anonymous implementation
    of **TransactionCallback** as a parameter. In the example, our service method
    does not return a value, so we implement the method **doInTransactionWithoutResult**.
    However, if we needed to return a value from our transaction, we would instead
    use **doInTransaction**.


    Within the scope of the **TransactionCallback**, we are calling the same persistence
    code that we used in our annotation-based example. We delegate to our **artEntityDao**
    to do the heavy lifting. Notice, however, that we catch the **ImageErrorException**,
    and should the exception get thrown, we use the **TransactionStatus** parameter
    to rollback the transaction.


    Clearly, this approach is not as clear or as elegant as using declarative transactions
    in Spring.


    Nevertheless, it is helpful to see how the various components fit together without
    relying on AOP to inject this behavior implicitly.


    Transactional Examples


    Now that we’ve covered the main transactional concepts, let’s go through a couple
    of real-world scenarios. We’ll look at a batch application and transactions involving
    two datasources.


    Creating a Batch Application


    Batch applications can be a bit of a drag, especially with ORM frameworks. Both
    the database and the ORM framework need to reserve valuable resources for each
    operation performed in a transaction. The database needs to keep locks on the
    tables that you’ve changed. The ORM, for a variety of reasons, needs to cache
    the objects that you’ve persisted and read from the database. The more operations
    a transaction executes, the more resources the ORM and database need to dedicate
    to it.


    Let’s start out with the following example, which updates a whole bunch of records:
    121


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    **@Transactional(readOnly = false, propagation = Propagation.SUPPORTS)** **public
    void batchProcessAll() {**


    **int count = dao.getCount();**


    **// do your ACID business in a big for loop**


    **}**


    Here, we’re attempting to update all of the data in a single transaction. Depending
    on the amount of data and system resources, this may not be possible, or it may
    lead to degraded performance for our application. Instead, we may be able to find
    a way to define smaller units that can be committed, which will free up some of
    the resources utilized by the database and ORM framework. However, the process
    of committing the transaction consumes resources as well. If we commit too often,
    we’ll probably decrease performance. There’s a balance between committing too
    often and too little—for example, committing after a certain number of items have
    been processed.


    We can create a method that processes *x* number of units and commits after it
    completes. It’s actually quite simple to set this up. We’ll choose 100 as an arbitrary
    number of *units of work*.


    **// no transaction on this method anymore**


    **public void batchProcessAll() {**


    **int count = dao.getCount();**


    **for(int i=0; i<count; i+= 100) {**


    **doMyUnit(i, i+100);**


    **}**


    **}**


    ****@Transactional(readOnly = false, propagation = Propagation.REQUIRES_NEW)**
    **public void doMyUnit(int start, int finish) {**


    **// do your ACID business from the unit''s**


    **// start to finish**


    **dao.flush();**


    **}**


    Note the use of **Propagation.REQUIRES_NEW**. It tells Spring that a new transaction
    begins when the method gets invoked and commits when the method completes. It’s
    just that simple to create and commit a transaction. There are many variables,
    ranging from server capacity to application load, to be able to prescribe an ideal
    batch size, so determining the best size for your application will likely require
    some trial and error.


    Using Two Datasources


    Assume you have two databases, and you want to apply the right transactions to
    the right beans. You need to create two different **transactionManager**s that
    must be applied to the appropriate subsets of Spring beans. You can do that with
    some fancy AOP work.


    Assume that you have already configured **transactionManager1** and **transactionManager2**
    beans.


    You’ll need to start with the following XML:


    **<tx:advice id="txAdvice1" transaction-manager="transaction-manager1" >**


    **<tx:attributes>**


    **<tx:method name="save*" propagation="REQUIRED"/>**


    **<tx:method name="update*" propagation="REQUIRED"/>**


    **<tx:method name="delete*" propagation="REQUIRED"/>** 122


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    **<tx:method name="*" propagation="SUPPORTS" read-only="true"/>**


    **</tx:attributes>**


    **</tx:advice>**


    ****<tx:advice id="txAdvice2" transaction-manager="transaction-manager2" >**


    **<tx:attributes>**


    **<tx:method name="save*" propagation="REQUIRED"/>**


    **<tx:method name="update*" propagation="REQUIRED"/>**


    **<tx:method name="delete*" propagation="REQUIRED"/>**


    **<tx:method name="*" propagation="SUPPORTS" read-only="true"/>**


    **</tx:attributes>**


    **</tx:advice>**


    ****<aop:config>**


    **<aop:advisor advice-ref="txAdvice1" pointcut-ref="allDatabaseOneBeans"/>**


    **<aop:advisor advice-ref="txAdvice2" pointcut-ref="allDatabaseTwoBeans"/>**


    **<!-- Add pointcuts here -->**


    **</aop:config>**


    The **tx:advice** element tells Spring what needs to be done, and the **aop:config**
    element tells Spring where it needs to be done.


    The question now is what beans should have which advice? Some beans need **txAdvice1**;
    others need **txAdvice2**; and others may need both. Thankfully, Spring AOP provides
    several mapping options.


    You might chose to organize your classes into packages that differentiate between
    the two datasources to which they relate and apply an expression pointcut, or
    you can devise logical bean names that clearly infer which advice to apply. You
    can also create our own annotations, **@Transaction1** and **@Transaction2**


    for example, and use the **expression="@target(...)"** approach.


    Let’s go through a quick bean name example. Imagine we have two datasources: **datasource1**
    and **datasource2**. Let’s say that all of the **datasource1** beans have **ds1**
    as part of their bean name. For example, if **PersonDao** is intended to interface
    with **datasource1**, it would be called **ds1.personDao**. If **PersonService**
    depends on **personDao** as well as a DAO from **datasource2**, it should be called
    **ds1.ds2.personService**.


    Our pointcuts will look like the following:


    **<aop:pointcut id="allDatabaseOneBeans" expression ="bean(*ds1*)"/>**


    **<aop:pointcut id="allDatabaseTwoBeans" expression ="bean(*ds2*)"/>** We’ve defined
    two pointcut expressions that utilize a bean-naming convention to properly infer
    which datasource and **transactionManager** to utilize for a given transaction.


    Summary


    In this chapter, you’ve learned both the fundamentals and low-level details for
    managing database transactions with Spring. We’ve explored two different avenues
    for applying transactions declaratively with Spring: via annotation and through
    XML-based Spring configuration. It’s also possible to utilize Spring’s transaction
    management programmatically, through the use of the **TransactionTemplate**.


    However this approach couples transactional behavior with the application’s business
    logic.


    Understanding how transactions work, along with the available configuration options,
    is critical for developing and debugging multiuser applications. We’ve discussed
    both simple and complex scenarios 123


