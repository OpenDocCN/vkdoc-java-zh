    **xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**


    **xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd">**


    ****<bean id="userBean" class="com.prospringhibernate.gallery.User">**


    **<property name="authHandler" ref="authService" />**


    **</bean>**


    ****<bean id="authService" class="com.prospringhibernate.gallery.AuthService"/>**


    ****</beans>**


    CHAPTER 2 ■ SPRING BASICS


    And here’s the corresponding code for the updated **User** bean:


    **package com.prospringhibernate.gallery;**


    ****public class User implements Serializable {**


    ****private AuthenticationService authHandler;**


    ****public User() {**


    **}**


    ****public AuthenticationService getAuthHandler() {**


    **return this.authHandler;**


    **}**


    ****public void setAuthHandler(AuthenticationService authHandler) {**


    **this.authHandler = authHandler;**


    **}**


    ****}**


    Simple, isn’t it? We just wired up critical parts of our application with a few
    configuration lines. It’s easy to imagine defining code for an alternate authentication
    service and then simply modifying the bean reference in your Spring configuration
    to manipulate the behavior of your application.


    Coding to Interfaces


    Earlier, we mentioned that Spring has the tendency to lead developers to write
    better, cleaner, and more loosely coupled code. You might be starting to pick
    up on why this is the case. Not only are your classes free of application wiring
    code, but you’ll also find that applications based on Spring are usually more
    interface-based, meaning that your code is dependent on interfaces rather than
    specific implementations. This strategy is often called *coding to interfaces*,
    and it allows you to easily swap out one implementation for another, simply by
    altering the class attribute within a Spring bean. As long as your code is written
    to rely on an interface, and the interface isn’t changing, no changes to your
    class files will be necessary.


    For instance, notice that in the preceding example, the **User** bean depends
    on an **AuthenticationService** bean. In your code, a good practice is to define
    an **AuthenticationService** interface that specifies core methods related to
    user access and security. Your code would then reference the **AuthenticationService**
    interface, and your Spring configuration would map the concrete implementation
    class to your **User** object.


    As an oversimplified example, our **AuthenticationService** interface might look
    like the following: **package com.prospringhibernate.gallery;**


    ****public interface AuthenticationService {**


    **public User authenticateUser(String username, String password)** **throws AuthenticationException;**


    **}**


    CHAPTER 2 ■ SPRING BASICS


    And our concrete implementation would be something like this:


    **package com.prospringhibernate.gallery;**


    ****public class AuthenticationServiceImpl implements AuthenticationService {**


    ****public User authenticateUser(String username, String password)** **throws
    AuthenticationException {**


    **// authentication logic goes here**


    **}**


    ****}**


    Finally, bringing everything together in our Spring configuration, the **userBean**
    then points to a particular implementation of the **AuthenticationService** interface
    by using the **ref** property.


    **<?xml version="1.0" encoding="UTF-8"?>**


    **<beans xmlns=http://www.springframework.org/schema/beans**


    **xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**


    **xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd">**


    ****<bean id="userBean" class="com.prospringhibernate.gallery.User">**


    **<property name="authHandler" ref="authService" />**


    **</bean>**


    ****<bean id="authService" class="com.prospringhibernate.gallery.AuthServiceImpl"/>**


    ****</beans>**


    The key point here is that the **User** class does not depend directly on the
    **AuthenticationServiceImpl** implementation, but rather on the **AuthenticationService**
    interface. Although the difference may appear subtle, expressing dependencies
    on interfaces is an effective means of ensuring your application is loosely coupled.
    If your code doesn’t express any direct coupling to a particular implementation,
    you will gain the flexibility of defining these details in the Spring configuration,
    and only in that configuration. In this way, you can easily swap implementations
    without needing to refactor your code.'
  trans: '

    从上述示例中，你可以学到几点。首先，我们使用了极其不安全的密码。但这确实演示了如何通过 XML 配置一个简单的 Spring Bean。


    要在 Java 端实现这一点，我们需要一个有效的 JavaBean 类，如下所示：


    **package com.prospringhibernate.gallery;**


    ****public class User implements Serializable {**


    ****private String username;**


    **private String password;**


    ****public User() {**


    **}**


    ****public String getUsername() {**


    **return this.username;**


    **}**


    ****public void setUsername(String name) {**


    **this.username = name;**


    **}**


    ****public String getPassword() {**


    **return this.password;**


    **}**


    ****public void setPassword(password) {**


    **this.password = password;**


    **}**


    ****}**


    请注意，对于 Spring XML 配置中的每个属性实体，我们在 Java 类中都定义了相应的 getter 和 setter 方法。在 Spring 术语中，这被称为*设值注入*，因为属性值是通过调用
    JavaBean 的 setter 方法来配置的。


    基于构造函数的依赖注入


    另一种方法是使用*构造函数注入*，它允许通过类的构造函数注入属性值。要使用构造函数注入，我们需要按如下方式重构代码和 Spring 配置：


    **<?xml version="1.0" encoding="UTF-8"?>**


    **<beans xmlns=http://www.springframework.org/schema/beans**


    **xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**


    **xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd">**


    ****<bean id="userBean" class="com.prospringhibernate.gallery.User">**


    **<constructor-arg index="0" value="admin" />**


    **<constructor-arg index="1" value="password" />**


    **</bean>**


    ****</beans>**


    以下是更新后的 **User** Bean 对应的代码：


    **package com.prospringhibernate.gallery;**


    ****public class User implements Serializable {**


    ****private String username;**


    **private String password;**


    ****public User(String username, String password) {**


    **this.username = username;**


    **this.password = password;**


    **}**


    ****public String getUsername() {**


    **return this.username;**


    **}**


    ****public String getPassword() {**


    **return this.password;**


    **}**


    ****}**


    尽管两种方法都有效，但我们推荐基于设值的方法，因为它更符合 JavaBean 的约定，并且使你的代码在后续测试中更容易。


    实例协作


    在前面的示例中，我们注入了两个字符串值，这些值直接在配置文件中指定。这是一个有用的快捷方式，可以将基本的配置细节从代码中抽象出来，放到一个更易于修改的文件中。然而，同样的概念可以更进一步，用于满足应用程序中协作实例之间的依赖关系。


    例如，假设身份验证是在一个单独的类中实现的。在我们的 Spring 配置文件中，可能会有如下内容：


    **<?xml version="1.0" encoding="UTF-8"?>**


    **<beans xmlns=http://www.springframework.org/schema/beans**


    **xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**


    **xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd">**


    ****<bean id="userBean" class="com.prospringhibernate.gallery.User">**


    **<property name="authHandler" ref="authService" />**


    **</bean>**


    ****<bean id="authService" class="com.prospringhibernate.gallery.AuthService"/>**


    ****</beans>**


    以下是更新后的 **User** Bean 对应的代码：


    **package com.prospringhibernate.gallery;**


    ****public class User implements Serializable {**


    ****private AuthenticationService authHandler;**


    ****public User() {**


    **}**


    ****public AuthenticationService getAuthHandler() {**


    **return this.authHandler;**


    **}**


    ****public void setAuthHandler(AuthenticationService authHandler) {**


    **this.authHandler = authHandler;**


    **}**


    ****}**


    很简单，不是吗？我们仅用几行配置就连接起了应用程序的关键部分。很容易想象，我们可以为另一个身份验证服务定义代码，然后只需修改 Spring 配置中的 Bean
    引用，就能操纵应用程序的行为。


    面向接口编程


    之前，我们提到 Spring 倾向于引导开发者编写更好、更清晰、耦合度更低的代码。你可能开始明白为什么会这样了。你的类不仅摆脱了应用程序装配代码，而且你会发现基于
    Spring 的应用程序通常更加面向接口，这意味着你的代码依赖于接口而非具体的实现。这种策略通常被称为*面向接口编程*，它允许你轻松地将一个实现替换为另一个，只需修改
    Spring Bean 中的 class 属性即可。只要你的代码是依赖于接口编写的，并且接口没有变化，就无需修改你的类文件。


    例如，请注意在前面的示例中，**User** Bean 依赖于一个 **AuthenticationService** Bean。在你的代码中，一个好的实践是定义一个
    **AuthenticationService** 接口，该接口指定与用户访问和安全相关的核心方法。然后，你的代码将引用 **AuthenticationService**
    接口，而你的 Spring 配置会将具体的实现类映射到你的 **User** 对象。


    作为一个过度简化的例子，我们的 **AuthenticationService** 接口可能如下所示：


    **package com.prospringhibernate.gallery;**


    ****public interface AuthenticationService {**


    **public User authenticateUser(String username, String password)** **throws AuthenticationException;**


    **}**


    而我们的具体实现可能是这样的：


    **package com.prospringhibernate.gallery;**


    ****public class AuthenticationServiceImpl implements AuthenticationService {**


    ****public User authenticateUser(String username, String password)** **throws
    AuthenticationException {**


    **// 身份验证逻辑写在这里**


    **}**


    ****}**


    最后，在我们的 Spring 配置中将所有内容整合在一起，**userBean** 通过使用 **ref** 属性指向 **AuthenticationService**
    接口的特定实现。


    **<?xml version="1.0" encoding="UTF-8"?>**


    **<beans xmlns=http://www.springframework.org/schema/beans**


    **xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance**


    **xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd">**


    ****<bean id="userBean" class="com.prospringhibernate.gallery.User">**


    **<property name="authHandler" ref="authService" />**


    **</bean>**


    ****<bean id="authService" class="com.prospringhibernate.gallery.AuthServiceImpl"/>**


    ****</beans>**


    这里的关键点是，**User** 类并不直接依赖于 **AuthenticationServiceImpl** 实现，而是依赖于 **AuthenticationService**
    接口。虽然这种差异可能看起来细微，但将依赖关系表达为接口是确保应用程序松散耦合的有效方法。如果你的代码没有与特定实现直接耦合，你将获得在 Spring 配置中（且仅在该配置中）定义这些细节的灵活性。通过这种方式，你可以轻松地替换实现，而无需重构代码。

