    ****import com.prospringhibernate.gallery.dao.PersonDao;**


    ****@RunWith(SpringJUnit4ClassRunner.class)**


    **@ContextConfiguration(locations = {"classpath:spring-master.xml"})** **public
    class** PersonDaoTest **{**


    ****@Autowired**


    **PersonDao personDao;**


    ****@Test**


    **public void testPerson() {**


    **// insert test logic here**


    **}**


    ****}**


    Let’s explore what’s happening here. **@RunWith** tells JUnit that the test needs
    some extra logic in order to be set up properly. That extra logic comes in the
    form of an instance of a class that implements JUnit’s **Runner** interface. In
    our case, we have a Spring **Runner** called **SpringJUnit4ClassRunner** that
    knows how to set up our application context and inject our test with all of the
    plumbing that it needs using the standard Spring dependency-injection annotations,
    such as **@Autowired**. **SpringJUnit4ClassRunner** also looks for some other
    annotations, including **@ContextConfiguration** and **@Transactional**.


    As you saw in the example, **@ContextConfiguration** tells **SpringJUnit4ClassRunner**
    which configuration files you need to set up your testing environment. Behind
    the scenes, **SpringJUnit4ClassRunner** sets up and manages a Spring application
    context for your unit tests based on 133


    CHAPTER 8 ■ EFFECTIVE TESTING


    the locations you specified in the **@ContextConfiguration**. The **TestContext**
    Framework is responsible for actually performing the **@Autowired** injection.
    The **TestContext** Framework also keeps track of the results of the status of
    the current test, such as which method and class were run and which exception
    was thrown as part of the test. **@RunWith** and **@ContextConfiguration** are
    the essential core components of Spring JUnit4 testing.


    ■ **Note** The TestContext Framework has some performance optimizations to make
    sure that the framework will load that configuration only once for all of the
    tests if you run multiple test classes that use the same application context configuration.
    There are quite a few additional advanced features relating to the TestContext
    Framework that are worth exploring if you need more advanced testing.


