    **<listener-class>**


    **org.springframework.web.context.request.RequestContextListener**


    **</listener-class>**


    **</listener>**


    These lines will ensure that Spring is loaded when your application first starts
    up and will parse the configuration file located at **WEB-INF/applicationcontext.xml**.


    If you’re not building a web application, it’s just as easy to load the Spring
    container. In this case, we recommend going with the **ClassPathXmlApplicationContext**
    implementation, which is designed to load the Spring configuration files from
    the classpath. It is invoked in the following way: **ApplicationContext context
    =**


    **new ClassPathXmlApplicationContext(new String[]{"configfile1.xml", "configfile2.xml"});**
    You can see just how easy it is to get a Spring container instantiated. Once you
    have a reference to the **ApplicationContext**, you can use it however you wish.
    The reference that is returned to you is the loaded **ApplicationContext**, with
    all the beans that you defined instantiated and dependencies resolved.


    If you felt so inclined, you could access a bean by name, simply by invoking the
    following: **UsefulClass usefulClass = (UsefulClass) context.getBean("myBeanName");**
    Assuming that your bean is defined somewhere in your Spring configuration files
    (referenced by the ID or name attribute), Spring will hand you your class instance,
    ready to go (meaning all of its dependencies will have been injected). However,
    we strongly recommend that you try to avoid issuing calls to **getBean()** *.*


    The whole point of Spring is automatic dependency injection, which means not looking
    up your beans when you need them. That’s dependency lookup, which is so 1995\.
    While this approach does decouple and defer your class dependencies, it still
    requires an explicit lookup step. As a rule of thumb, if you need a reference
    to a particular dependency, specify these details in the configuration, not in
    your code.


    Some developers will rely on **getBean()** only in circumstances in which they
    *always* need a new instance of their class (each time they make the call). A
    better solution to this problem is using the **lookup-method** property in your
