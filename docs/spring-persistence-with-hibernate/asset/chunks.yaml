    **</context:component-scan>**


    ****<import resource="spring-datasource.xml"/>**


    ****</beans>**


    Let’s break down the contents of this **spring-master.xml** file in more detail.


    Namespace Support


    Spring introduced extensive namespace support as of version 2.0 of the framework.
    Everything is just a bean in the IoC container, but over time, your configuration
    can become incredibly verbose. The introduction of namespaces is intended to simplify
    the XML configuration when dealing with integration points like transactions.
    You can even define your own namespaces if that’s required.


    Two namespaces are used in our **spring-master.xml** configuration file, marked
    by the **xmlns** declarations:


    • The **beans** namespace is required for defining all basic bean definitions
    for your application (such as DAOs, service layer beans, and so on).


    • The **context** namespace is provided as a convenience for configuring some
    of the core plumbing of Spring.


    Externalizing Property Configurations


    This configuration defines a **PropertyPlaceholderConfigurer**, which allows you
    to externalize some of your settings to a properties file outside the Spring configuration.


    **<context:property-placeholder**


    **location="classpath*:META-INF/spring/*.properties"/>** The **property-placeholder**
    will automatically locate and parse any property files you have in your classpath
    under the **META-INF/spring** directory. Any property you want replaced should
    be indicated in your Spring configuration like so: **${propertyKey}**. You’ll
    see a full example later in this chapter when we configure a datasource for the
    gallery application.


    Component Scanning


    The next important piece of configuration is component scanning, which was introduced
    in Spring 2.5


    as a mechanism for further simplifying the way you go about configuring Spring
    applications.


    **<context:component-scan base-package="com.prospringhibernate">** This declaration
    will cause Spring to locate every **@Component**, **@Repository**, and **@Service**
    in your application. In practical terms, this allows you to write a POJO, and
    then simply annotate the new POJO


    CHAPTER 3 ■ BASIC APPLICATION SETUP


    as a **@Service**. Spring will then automatically detect, instantiate, and dependency
    inject your service at startup time.


    Additionally, component scanning turns on other notable Spring annotations like
    **@Inject**, **@Named**, and **@PostConstruct** support. These annotations allow
    you to use common Spring and Java EE


    annotations in your classes without needing to do any special configuration. The
    most commonly used annotation is **@Inject**, which instructs Spring to dependency-inject
    an object into your class. You can then also have your new service injected into
    any other class that requires it, simply by declaring a field for your service
    inside the relying class.


    ■ **Note** **@Inject** and **@Named** are just two of the annotations defined
    as a part of JSR-330\. JSR-330 defines a standard set of annotations to be used
    in Java EE applications. **@Inject** and **@Named** are wholesale replacements
    for the **@Autowired** and **@Qualifier** annotations in Spring that you may already
    be familiar with. This makes your application more portable in the event that
    you should decide to change your dependency-injection implementation to something
    like Google Guice.


    The matching rules used by the component scanner can also be customized with filters
    for including or excluding components. You can control this matching based on
    type, annotation, AspectJ


    expression, or regular expressions for name patterns. The default stereotypes
    can even be disabled. In our configuration, we declared the following exclusion:


    **<context:exclude-filter type="annotation"**'
