    请注意，**dataSource** 属性在文件顶部以及 **environments** 块内均有指定。全局细节（如数据库连接池设置和 JDBC 驱动程序）通过将这些细节放在顶层的
    **dataSource** 块中进行全局配置。特定于环境的细节（如 **development**、**test** 和 **production** 环境的数据库
    URL）则在各自环境的 **dataSource** 块中进行配置。如果你需要为生产环境使用不同的 JDBC 驱动程序，可以将这些细节移至相应的环境块中，或者直接在相应环境中覆盖全局配置的细节。同样，你可以配置的环境类型不受限制：**development**、**test**
    和 **production** 只是 Grails 模板创建的默认环境。


    映射 URL


    我们需要介绍的 **grails-app/conf** 目录中的最后一个文件是 **UrlMappings.groovy**。该文件提供了一种极其灵活的构造，用于将
    URL 模式与特定的控制器和操作关联起来。例如，下面展示了如何将漂亮的 URL /**category/panoramas** 与 **CategoryController**
    关联起来，并指定显示 **panaromas** 类别：


    **class UrlMappings {**


    **static mappings = {**


    **"/$controller/$action?/$id?"{**


    **constraints {**


    **}**


    **}**


    ****"/category/$categoryName"(controller: CategoryController, action: "displayCategory")**


    ****"/"(view:"/index")**


    ****"500"(view:''/error'')**


    **}**


    **}**


    我们描述的映射实际上是此示例中的第二个块。映射的第一个组成部分是引号内的部分。我们本质上是在定义一个以 **/category/** 开头的正则表达式。**$categoryName**
    定义了一个参数名称，该参数将使用 URL 中参数名称所在的部分自动传递给您的控制器。在我们的示例中，**/category/** 之后的 URL 部分将被提取出来，然后存储在名为
    **categoryName** 的参数中。


    如果你查看示例中的第一个块，你会注意到默认的 **URLMapping**。在这种情况下，我们定义了 **$controller** 和 **$action**
    参数。这些是特殊的关键字；它们不是表示特定的参数，而是定义了匹配请求应定向到的控制器以及相应的操作。在我们的类别列表页面示例中，我们没有在映射表达式中定义
    **$controller**，因此我们显式地指定了它，如下所示：**(controller: CategoryController,action: " displayCategory")**
    现在我们已经了解了 Grails 应用程序的目录结构，接下来让我们定义 Grails 领域模型。


    定义 Grails 领域模型


    默认情况下，Grails 会生成三个核心层，它们类似于本书前面讨论过的层级：领域层、控制器层和服务层。为了提供一致性并更好地执行约定，Grails 强制执行一个目录结构来帮助组织和隔离来自各个层的类。领域模型通常是
    Grails 应用程序的基础，因此它通常是第一个要定义的层。


    正如你可能已经猜到的，领域模型类都放在 **grails-app/domain** 目录中。默认情况下，所有领域类都将位于默认的 Grails 包中。但是，你可以自由定义自己的包结构，对于较大的应用程序，建议这样做。此外，如果你需要从
    Java 访问任何 Grails 代码，则必须将 Grails 类放在一个包内，否则将很难在 Grails/Groovy 世界之外访问它们。你也可以让你的
    Groovy 类实现一个 Java 可访问的接口，作为更好地将 Grails 代码与 Java 集成的一种方式。


    让我们通过定义 **Person** 领域实体来开始我们的基于 Grails 的图库应用程序。Grails 提供了脚本来帮助创建大多数核心 Grails 原型，每个原型对应一个特定的模板。如果你想更改默认视图或领域类和服务类的创建方式，可以编辑这些模板。为此，你需要运行
    **grails install-templates**。然后，你将能够从 **src/templates** 目录中访问（和修改）这些模板。对于大多数 Grails
    开发来说，默认模板就足够了。


    要创建我们的 **Person** 领域类，请运行以下命令：


    **grails create-domain-class Person**


    此脚本完成后，你将在 **grails-app/domain** 目录中找到 **Person.groovy** 类。Grails 在后台使用 Hibernate
    将 **Person** 实例持久化到数据库，并从数据库中检索它们。与 Hibernate 不同，Grails 不需要任何映射文件或注解，因为约定有助于 Grails
    推断出处理领域模型持久化所需的大部分信息。


    现在我们已经为 **Person** 领域实体创建了存根，让我们定义其余属性：


    **class Person {**


    ****String firstName;**


    **String lastName;**


    **String username;**


    **String password;**


    **String email;**


    ****Integer roleLevel;**


    ****public static final USER_ROLE = 1;**


    **public static final ADMIN_ROLE = 2;**


    **public static final SUPERUSER_ROLE = 4;**


    **public static final CONTACT_USER = 16;**


    **public static final COMMENT_USER = 64;**


    ****static constrants = {**


    **firstName(maxSize:255, unique: false, blank: false)**


    **lastName(maxSize:255, unique: false, blank: false)**


    **username(maxSize:255, unique: true, blank: false)**


    **password(maxSize:25, unique: false, blank: false)**


    **email(email:true, blank: false, unique: false)**


    **roleLevel()**


    **}**


    ****static mapping = {**


    **cache true**


    **}**


    ****}**


    你可能会注意到的第一件事是这个类代码非常简洁。大多数属性应该是不言自明的。由于我们使用的是 Groovy，因此无需定义 getter 或 setter（这些在
    Groovy 中是隐式的）。还要注意，没有为 **id** 或 **version** 指定属性；这些字段由 Grails 自动创建。


    添加约束和验证


    现在让我们看看 **constraints** 块。约束允许你更好地定义领域模型中的每个字段，为 Grails 提供关于如何建模数据库模式的线索和要求。有许多约束选项可用，但以下是一些最有用的：


    • **blank**


    • **minSize**


    • **maxSize**


    • **range**


    • **unique**


    • **size**


    • **range**


    • **inList**


    • **email**


    • **creditCard**


    • **matches**


    • **nullable**


    其中一些约束非常强大。例如，**matches** 约束允许你指定一个正则表达式，该表达式将用于验证指定字段中的值，确保其与指定的正则表达式匹配。


    特定于领域的约束，如 **email** 和 **creditCard**，将分别帮助确保字段符合有效的电子邮件地址或信用卡号。


    如果你需要自定义约束，Groovy 包含一个允许你定义自己的约束的构造。你指定属性，后跟约束类型及其对应值的映射。以下是一个示例：


    **username(blank: false, maxSize: 255, unique: true)**


    这将确保 **username** 值不能留空，并且数据库字段的最大长度为 255 个字符。此外，**unique** 约束也将被添加到 **username**
    数据库字段中。


    当你尝试将领域实体保存到数据库时，约束就会发挥作用。如果某个特定字段未通过验证，则会将一个错误附加到领域实例的动态 **errors** 属性上。

