- fmt: "However, it is hard to argue the fact that using Hibernate’s new annotation\
    \ support is easier and far less verbose. But using annotations isn’t your only\
    \ (nor necessarily best) option.\n\n## Building the Domain Model\n\nWe’ve already\
    \ described a few of our sample application’s core entities, along with their\
    \ corresponding associations. Now that we’ve considered how these entities will\
    \ be represented in the database, let’s start building our Java classes. Let’s\
    \ first define the `Comment` class:\n\n```java\n@Entity\npublic class Comment\
    \ implements Serializable {\n\n    private Long id;\n    private String comment;\n\
    \    private ArtEntity commentedArt;\n    private Date commentDate;\n    private\
