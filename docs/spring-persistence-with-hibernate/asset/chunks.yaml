- fmt: '# ACID 事务管理


    *Atomicity*（原子性）指定单个事务中的所有操作必须全部完成或全部不完成。换句话说，事务允许将多个数据库操作作为一个整体应用。如果发生错误，整个操作集将被回滚。


    *Consistency*（一致性）要求事务必须将数据库从一个一致状态转换到另一个一致状态。成功的事务不能使数据库处于违反数据库或模式完整性约束的状态。换句话说，在事务提交之前，每次插入、更新或删除操作都必须符合数据库约束和参照完整性规则。


    *Isolation*（隔离性）定义了正在运行的事务如何影响或与其他并发运行的事务交互的规则。事务使用的隔离策略非常重要。如果选择的隔离级别过于宽松，可能会引入难以发现的错误，从而对数据完整性产生不利影响。然而，如果隔离级别过高，则可能面临应用程序变慢或数据库死锁的风险。此设置既依赖于应用服务器，也依赖于数据库服务器。虽然技术上有八种隔离级别，但通常您只需要关注
    ANSI/ISO SQL 标准定义的四种。您还应注意，不同数据库管理系统（DBMS）供应商之间的默认隔离级别差异很大。


    *Durability*（持久性）确保一旦事务提交，更改不会丢失，并且能够在数据库故障后幸存。


    在本章中，我们将介绍 ACID 事务的基础知识，以及如何使用 Spring 声明式地应用事务。这些概念无疑对任何类型的应用程序开发都很有用，并且在您下次求职面试时也可能派上用场！（不过我们建议等待这些话题在面试中自然出现——我们不建议一开始就表白您对
    ACID 的热爱。）


    ACID 可能看起来有点复杂，但它能确保数据安全，并在处理持久化时保持您的理智。


    那么，为什么您应该关心 ACID？理解数据库可用的规则和行为选项非常重要，这样您才能在应用程序的上下文中有效利用这些特性。


    ## 第 7 章 ■ 事务管理


    这些细节对于控制一组操作如何应用于数据库，或者并发数据库修改如何相互影响至关重要。不当的事务管理还会对企业应用程序的性能产生不利影响。


    ## 理解隔离级别


    在实践中您会遇到四种隔离级别，按从最宽松到最严格的顺序列出：`Read Uncommitted`、`Read Committed`、`Repeatable
    Read` 和 `Serializable`。这些隔离级别也会影响并发性。最宽松的隔离级别允许最高数量的并发数据库操作，而最严格的隔离级别几乎肯定会降低系统速度。图
    7-1 突出了每种隔离级别的后果，包括隔离级别与并发性之间相关性的演示。


    *图 7-1. 隔离级别在一致性与并发性之间进行权衡*


    为了解释图 7-1 中概述的副作用，请考虑我们艺术画廊应用程序中的以下场景：


    1. Paul 打开一个数据库事务 `T1`，并从 `ArtEntity` 表中执行 `SELECT` 操作，查询所有记录。

    2. Brian 启动一个单独的事务 `T2`，从 `ArtEntity` 表中执行 `DELETE` 操作，删除一件艺术品。

    3. Brian 仍在同一个 `T2` 事务中，对 `ArtEntity` 表中的一条记录执行 `UPDATE` 操作，更正一个拼写错误。

    4. Paul 仍在同一个 `T1` 事务中，第二次从 `ArtEntity` 表中执行 `SELECT` 操作，查询所有艺术品。'
  raw: '*Atomicity* specifies that all operations within a single transaction must
    complete together or not at all. In other words, a transaction allows multiple
    database operations to be applied together. In the event of an error, the entire
    set of operations is rolled back.


    *Consistency* refers to the requirement that transactions must transition a database
    from one consistent state to another consistent state. A successful transaction
    cannot leave the database in a state that violates the integrity constraints of
    the database or the schema. In other words, transactions must comply with database
    constraints and referential integrity rules during every insert, update or delete
    before a transaction may be committed.


    *Isolation* defines the rules about how one running transaction affects or interacts
    with other concurrently running transactions. The isolation strategy used on a
    transaction is very important. If the chosen isolation level is too loose, hard-to-find
    bugs can be introduced, which may adversely impact the integrity of your data.
    If your isolation level is too high, however, you run the risk of slowing down
    your application or deadlocking your database. This setting is both application
    server and database server dependent. While there are technically eight isolation
    levels, generally you will only need to concern yourself with the four that are
    defined by the ANSI/ISO SQL standard. You should also note that the default isolation
    level varies quite a bit amongst DBMS vendors.


    *Durability* ensures that once a transaction is committed, the changes will not
    be lost and should survive database failures.


    In this chapter, we will cover the fundamentals of ACID transactions, as well
    as how to declaratively apply transactions using Spring. These concepts will undoubtedly
    prove useful for any type of application development, and might also come in handy
    during your next job interview! (Although we recommend waiting for these topics
    to come up themselves in the context of a job interview—we do not recommend starting
    out by confessing your love for ACID.)


    ACID can be perceived as a bit trippy, but it has a way of keeping your data safe
    and will definitely maintain your sanity when dealing with persistence.


    So why should you care about ACID? It’s important to understand the available
    rules and options of database behavior so that you can effectively leverage these
    features in the context of your application.


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    These details are critical for controlling how a group of operations are applied
    to a database or how concurrent database modifications can affect each other.
    Improper transaction management can also adversely affect performance in an enterprise
    application.


    Understanding Isolation Levels


    The four isolation levels that you’ll encounter in practice, listed from least
    isolated to most isolated, are Read Uncommitted, R


    Read Committed, R


    Repeatable Read, and SSerializable. These isolation levels also


    have an impact on concurrency. The least stringent isolation level allows for
    the highest number of concurrent database operations, while the most stringent
    are all but guaranteed to slow down your systems. Figure 7-1 highlights the ramifications
    of each isolation level including a demonstration of the correlation between isolation
    level and concurrency.


    *Figure 7-1\. Isolation levels mandate tradeoffs between consistency and concurrency*
    In order to explain the side effects outlined in Figure 7-1, consider the following
    scenario in our art gallery application:


    1\. Paul opens a database transaction, T1, and **SELECT**s everything from the
    **ArtEntity** table.


    2\. Brian initiates a separate transaction, T2, to **DELETE** a piece of art from
    the **ArtEntity** table.


