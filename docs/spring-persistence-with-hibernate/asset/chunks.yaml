- fmt: "# Spring 事务管理\n\nSpring 提供了一种基于注解的出色事务管理方法。另一种选择是使用基于 Spring 配置的 XML 驱动策略。我们将讨论这两种方法，首先从基于注解的事务管理开始，因为你在前面的章节中已经看到过相关示例。\n\
    \n## 事务注解\n\n使用`@Transactional`注解，你可以设置一些事务行为和属性。\n\n### 传播行为\n\n`Propagation`定义了指定方法的事务行为。此设置决定是否应始终创建新事务、是否应创建嵌套事务，或者是否根本不应创建事务。以下是可以在\
    \ Spring 中使用的`Propagation`值：\n\n- `REQUIRED`：如果存在事务，则支持它；否则，创建一个新事务。\n- `SUPPORTS`：如果存在事务，则支持它，但这不是必需的。\n\
    - `MANDATORY`：必须存在事务；否则，抛出异常。\n- `REQUIRES_NEW`：创建一个新事务，如果当前事务存在则挂起它。\n- `NOT_SUPPORTED`：在“事务化”方法内以非事务方式执行代码，并挂起当前事务。\n\
    - `NEVER`：如果存在事务则抛出异常。\n- `NESTED`：如果存在事务则执行嵌套事务；否则，创建一个新事务。嵌套事务提供了一种更细粒度的事务行为方式，允许执行一组内部事务。例如，当某些嵌套事务可能回滚但不会中止整个操作时，这可能很有用。\n\
    \n### 隔离级别\n\n`Isolation`是 ACID 中的“I”，它定义了正在运行的事务如何影响（以及受）应用程序中发生的其他数据库进程的影响。控制给定事务隔离行为的设置如下：\n\
    \n- `DEFAULT`：让数据存储定义隔离级别。\n- `READ_UNCOMMITTED`：此隔离级别允许活动事务读取其他正在运行的事务所做的更改，即使这些其他事务尚未提交。换句话说，此设置启用了脏读。\n\
    - `READ_COMMITTED`：不允许脏读和不可重复读，但允许幻读。只有成功提交的事务所做的更改才是可见的。\n- `REPEATABLE_READ`：表示防止脏读和不可重复读，但可能发生幻读。\n\
    - `SERIALIZABLE`：表示防止脏读、不可重复读和幻读。\n\n### 事务属性\n\nSpring 还提供了一种指定事务基本属性的方法。例如，你可以使用`readOnly`属性来指示事务是否为只读（相对于执行插入或更新的事务）。`readOnly`值为`true`确保该方法仅执行读取操作。\n\
    \n`timeout`属性定义了事务在不提交或回滚的情况下可以存活的时间。如果正在运行的事务在未完成的情况下超时，Spring 将自动回滚该事务。\n\n\
    Spring 的事务支持提供了一种指定在抛出异常时事务应如何行为的方法。例如，我们可以指定每当从`ArtEntityService`中的方法抛出`InvalidImageException`时，当前运行的事务应回滚。\n\
    \nSpring 提供了`rollbackFor`和`rollbackForClassName`属性来实现此行为。此设置允许你指定一个异常类或类名数组（取决于使用的设置），当抛出这些异常时，将触发当前执行的事务自动回滚。\n\
    \n类似地，你可以通过使用`noRollbackForClass`和`noRollbackForClassName`属性来指定相反的行为（哪些异常不应触发回滚）。这些选项的工作方式与`rollbackFor`和`rollbackForClassName`相同，但如果在执行此事务时抛出了指定的异常类之一，则阻止事务回滚。\n\
    \n## 配置事务服务\n\n在更清楚地了解了 Spring 事务的一些配置选项后，让我们看看如何为服务类指定事务语义。为简单起见，我们将检查`ArtEntityService`类的简化版本。\n\
    \n```\nclass ArtEntityServiceImpl implements ArtEntityService {\n\n    @Transactional(rollbackFor=InvalidImageException.class,\n\
    \                   readOnly=false,\n                   timeout=30,\n        \
    \           propagation=Propagation.SUPPORTS,\n                   isolation=Isolation.DEFAULT)\n\
    \    public void saveArtEntity(ArtEntity artEntity) throws InvalidImageException\
    \ {\n        this.getArtEntityDao().saveArtEntity(artEntity);\n    }\n\n}\n```\n\
    \n这里，我们定义了一个事务性服务方法，指定了 30 秒的超时时间，并且如果抛出`InvalidImageException`将自动回滚。请注意，我们还配置了事务为可写（`readOnly`设置为`false`）。\n\
    \n## 配置事务管理器\n\n现在我们已经配置了事务的细节，需要设置事务管理器。如前所述，Spring 提供了`PlatformTransactionManager`接口，以及一组用于不同持久化策略的实现。对于跨多个数据源的全局事务，我们需要使用\
    \ Spring 的 JTA 支持。在我们的示例中，我们将使用 Spring 的`JpaTransactionManager`。我们的`spring-jpa.xml`应更新为以下内容（事务支持的重要部分已加粗）：\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>\n<beans\n\
    \    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n      \
    \                  http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\n\
    \                        http://www.springframework.org/schema/context\n     \
    \                   http://www.springframework.org/schema/context/spring-context-3.0.xsd\n\
    \                        http://www.springframework.org/schema/tx\n          \
    \              http://www.springframework.org/schema/tx/spring-tx-3.0.xsd\">\n\
    \n    <!-- JPA Entity Manager Factory -->\n    <bean id=\"entityManagerFactory\"\
    \n          class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
    \n          p:dataSource-ref=\"galleryDataSource\"/>\n\n    <bean class=\"org.springframework.orm.jpa.support.PersistenceAnnotationBeanPostProcessor\"\
    \ />\n\n    <!-- Database LOB Handling -->\n    <bean id=\"defaultLobHandler\"\
    \n          class=\"org.springframework.jdbc.support.lob.DefaultLobHandler\" />\n\
    \n    <!-- Read in DAOs from the JPA package -->\n    <context:component-scan\
    \ base-package=\"com.prospringhibernate.gallery.dao.jpa\" />\n\n    <!-- Transaction\
    \ Config -->\n    <bean id=\"transactionManager\"\n          class=\"org.springframework.orm.jpa.JpaTransactionManager\"\
    \n          p:entityManagerFactory-ref=\"entityManagerFactory\"/>\n\n    <tx:annotation-driven\
    \ mode=\"aspectj\" transaction-manager=\"transactionManager\"/>\n\n</beans>\n\
    ```\n\n此示例中的 XML 配置指定了我们的`artEntityService` bean 以及`PlatformTransactionManager`。我们使用的是\
    \ Spring 的`JpaTransactionManager`，但如果我们决定创建 JDBC 实现，或者甚至需要通过 JTA 进行全局事务，我们声明式配置事务的方式也不会有所不同。Spring\
    \ 允许我们使用一致的事务指定策略，无论底层实现细节如何。\n\n另请注意 Spring 在其`tx`命名空间中包含的`tx:annotation-driven`\
    \ bean。"
  raw: 'Spring has a fantastic annotation-driven approach for transaction management.
    An alternative is to use an XML-driven strategy based on Spring configuration.
    We will discuss both of these approaches, beginning with annotation-based transaction
    management, since you have seen examples of this in earlier chapters.


    Transactional Annotations


    Using the **@Transactional** annotation, you can set some transactional behavior
    and attributes.


    **Propagation** defines the transactional behavior for the specified method. This
    setting determines whether a new transaction should always be created, whether
    a nested transaction should be created, or even if no transaction should be created
    at all. Here are the **Propagation** values you can use in Spring:


    • **REQUIRED**: If there’s a transaction, support it; otherwise, create a new
    one.


    • **SUPPORTS**: If there’s a transaction, it will be supported, but this is not
    a requirement.


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    • **MANDATORY**: There must be a transaction; otherwise, throw an exception.


    • **REQUIRES_NEW**: Create a new transaction and suspend the current one if it
    exists.


    • **NOT_SUPPORTED**: Execute the code within the “transactionalized” method non-transactionally
    and suspend the current transaction.


    • **NEVER**: Throw an exception if a transaction exists.


    • **NESTED**: Perform a nested transaction if a transaction exists; otherwise,
    create a new transaction. Nested transactions offer a way to provide more granular
    transactional behavior, allowing a group of inner transactions to be executed.
    This can be useful, for example, for cases in which some nested transactions may
    get rolled back, but without aborting the entire operation.


    **Isolation** is the “I” in ACID, and defines how a running transaction affects
    (and is affected by) other database processes occurring within the application.
    The settings to control isolation behavior for a given transaction are:


    • **DEFAULT**: Let the datastore define the isolation level.


    • **READ_UNCOMMITTED**: This isolation level allows changes made by other running
    transactions to be read by the actively running transaction, even when the other
    transactions have not committed. In other words, this setting enables dirty reads.


    • **READ_COMMITTED**: Dirty and nonrepeatable reads are not allowed, but phantom
    reads are. Only changes applied by successfully committed transactions are visible.


    • **REPEATABLE_READ**: Indicates that dirty reads and nonrepeatable reads are
    prevented but phantom reads may occur.


    • **SERIALIZABLE**: Indicates that dirty reads, nonrepeatable reads and phantom
    reads are prevented.


    Spring also provides a way to specify some of the fundamental attributes of a
    transaction. For instance, you can use the **readOnly** attribute to indicate
    whether a transaction is read-only (as opposed to a transaction in which inserts
    or updates are performed). A **readOnly** value of **true** ensures that the method
    performs only read operations.


    The **timeout** attribute defines how long a transaction can live without committing
    or rolling back. If the timeout for a running transaction elapses without the
    transaction completing, Spring will automatically roll back the transaction.


    Spring’s transactional support provides a means to specify how a transaction should
    behave if an exception is thrown. For example, we could specify that whenever
    an **InvalidImageException** is thrown from a method within our **ArtEntityService**,
    the currently running transaction should be rolled back.


    Spring provides the attributes **rollbackFor** and **rollbackForClassName** to
    enable this behavior. This setting allows you to specify an array of either classes
    or class names (depending on the setting used) of exceptions that, when thrown,
    will trigger the currently executing transaction to be automatically rolled back.


    Similarly, you may specify the inverse of this behavior (which exceptions should
    not trigger a rollback) through the use of the **noRollbackForClass** and **noRollbackForClassName**
    attributes. These options work the same way as **rollbackFor** and **rollbackForClassName**,
    but prevent a transaction from being rolled back if one of the specified exception
    classes is thrown while this transaction is being executed.


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    Armed with a clearer understanding of some of the configuration options for Spring
    transactions, let’s take a look at how we can specify the transactional semantics
    for our service class. To keep things simple, we will examine a scaled-back version
    of our **ArtEntityService** class.


    **class ArtEntityServiceImpl implements ArtEntityService {**


    ****@Transactional(rollbackFor=InvalidImageExeption.class,**


    **readOnly=false,**


    **timeout=30,**


    **propagation=Propagation.SUPPORTS,**


    **isolation=Isolation.DEFAULT)**


    **public void saveArtEntity(ArtEntity artEntity) throws InvalidImageException
    {**


    **this.getArtEntityDao().saveArtEntity(artEntity);**


    **}**


    ****}**


    Here, we define a transactional service method that specifies a timeout of 30
    seconds, and will automatically roll back if an **InvalidImageException** is thrown.
    Notice that we have also configured the transaction to be writable (**readOnly**
    is set to **false**).


    Now that we’ve configured the details of our transaction, we need to set up our
    transaction manager. As noted earlier, Spring provides a **PlatformTransactionManager**
    interface, along with a set of implementations for use with different persistence
    strategies. For global transactions that span multiple datasources, we would need
    to use Spring’s JTA support. For our example, we will use Spring’s **JpaTransactionManager**.
    Our **spring-jpa.xml** should be updated to reflect the following (the important
    bits for transaction support have been bolded):


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<beans**


    **********xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**
    **http://www.springframework.org/schema/context**


    **http://www.springframework.org/schema/context/spring-context-3.0.xsd** http://www.springframework.org/schema/tx


    **http://www.springframework.org/schema/tx/spring-tx-3.0.xsd**">****


    ******<!-- JPA Entity Manager Factory -->**


    **<bean id="entityManagerFactory"**


    **class="org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean"**


    **p:dataSource-ref="galleryDataSource"/>**


    ****<bean**


    **class="org.springframework.orm.jpa.support.PersistenceAnnotationBeanPostProcessor"
    />**


    ****117


    CHAPTER 7 ■ TRANSACTION MANAGEMENT


    **<!-- Database LOB Handling -->**


    **<bean id="defaultLobHandler"**


    **class="org.springframework.jdbc.support.lob.DefaultLobHandler" />**


    ****<!-- Read in DAOs from the JPA package -->**


    **<context:component-scan base-package="com.prospringhibernate.gallery.dao.jpa"
    />**


    **<!-- Transaction Config -->


    <bean id="transactionManager"


    class="org.springframework.orm.jpa.JpaTransactionManager"


    p:entityManagerFactory-ref="entityManagerFactory"/>


    **<tx:annotation-driven mode="aspectj" transaction-manager="transactionManager"/>


    ****</beans>**


    The XML configuration in this example specifies our **artEntityService** bean,
    along with our **PlatformTransactionManager**. We are using Spring’s **JpaTransactionManager**,
    but the way in which we are able to declaratively configure transactions would
    not be different if we decide to create a JDBC


    implementation, or even if we required global transactions via JTA. Spring allows
    us to use a consistent strategy for specifying transactions, regardless of the
    underlying implementation details.


    Also notice the **tx:annotation-driven** bean that Spring includes in its **tx**
    namespace. This XML'
