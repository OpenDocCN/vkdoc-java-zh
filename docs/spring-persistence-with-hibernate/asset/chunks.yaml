    **事务管理**


    数据库事务帮助您将一组操作分组为一个工作单元。所有操作要么全部成功，要么全部失败。


    Spring 强大而灵活的事务支持是其框架成功和流行的另一个因素。在 Spring 之前，复杂或声明式的事务特性通常要求组织使用 EJB 以及重量级的 JEE
    容器。通过使用面向切面编程（AOP）技术，Spring 帮助普及了企业级事务支持，使开发人员能够干净地将事务规则应用于其代码，无论他们使用的是完整的 JEE
    应用服务器、轻量级的 Web 容器，甚至是独立的单元测试。


    Spring 不仅帮助消除了对重量级容器的需求，而且还为事务管理提供了通用的抽象。无论您使用的是 Hibernate 事务、本地数据库事务，还是允许跨多个数据源进行分布式事务的
    Java 事务 API（JTA），这都不再重要。就像 Spring 提供通用的**DataAccessException**层次结构一样，Spring 对事务管理和划分的抽象有助于简化和解耦事务细节与应用程序代码及业务逻辑。


    EJB 的流行很大程度上源于其事务支持。EJB 提供了一种通过配置指定事务规则的方法，防止这些细节给数据访问代码增加过多复杂性。通过利用其 AOP 特性，Spring
    能够提供类似的灵活性，但无需重量级 EJB 容器的开销，也无需添加组织不需要的复杂性或功能。


    使用 Spring，事务规则可以整合到配置中，这样代码就不会被这些类型的问题所困扰。在使用 JTA 数据源的 JEE 应用服务器和使用本地数据源的简单单元测试之间切换，只需修改
    Spring 配置——无需更改任何代码。当使用 JTA 事务管理器时，Spring 可以利用 JTA 提供的一些高级特性。然而，关键的好处在于，Spring
    提供了一致的事务编程模型——无论您需要事务跨多个数据源（JTA 提供的特性）还是单个数据源，您定义这些事务问题的方式始终相同。


    在极少数情况下，如果您确实希望以编程方式为应用程序定义事务规则，Spring 也提供了实现此目的的方法。您可以仅依赖 Hibernate 的事务编程模型，但通过利用
    Spring 的抽象，您可以通过基于通用 API 编写持久化代码来减少对 Hibernate 的耦合。如果您将来决定放弃 Hibernate，或者（更可能的是）您的持久化层同时使用
    Hibernate 和 JDBC，这可能会派上用场。


    第 7 章 ■ 事务管理


    Spring 允许您控制在每个方法级别上如何执行事务。事务管理可以通过 XML 配置或使用注解来应用。在本章中，我们将演示这两种方法。但是，我们建议使用注解，因为这种策略最直观，并且允许将事务元数据直接嵌入到服务层类或接口中。


    ACID 的乐趣


    在我们开始使用 Spring 向应用程序添加事务之前，让我们讨论一些基本的理论概念。关于事务有很多需要了解的内容，但最重要的细节都包含在首字母缩写词 ACID
    中，它定义了事务的四个核心要求：

