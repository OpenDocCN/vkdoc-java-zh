  raw: 'This concept of sensible defaults, or *convention over configuration*, really
    reduces the amount of coding required to get a domain model up and running. And
    Hibernate’s annotation support provides ample flexibility to override any of the
    default behavior, should you be so inclined. For instance, if we wanted to define
    a table name for our **Comment** class that is different from the Java class name,
    we could accomplish this feat by using the **@Table** annotation:


    **@Table(name = "HOGWASH")**


    **class Comment {**


    **. . . (Methods Omitted)**


    **}**


    Similarly, we can require that the **comment** property maps to the column **commentText**
    by using the


    **@Column** annotation:


    **@Column(name = "commentText")**


    **public String getComment() {**


    **return this.commentText;**


    **}**


    This level of customization is very useful, but most of the time is unnecessary
    and redundant (unless you are mapping your domain model to a legacy database).


    ■ **Note** You should have a very good reason before you override any of Hibernate’s
    default behavior. If you feel the need to map a Java property to a column of a
    different name, you may want to reconsider your naming conventions. Now, it’s
    not wrong to have discrepancies between column names and Java property names,
    but simplicity of configuration is very important, and we encourage you to limit
    the overriding of default behavior whenever possible. After all, less code equals
    less maintenance.


    Managing Entity Identifiers


    Hibernate annotation support does require that you define a primary key and all
    of your JavaBean’s associations. In our **Comment** class, we have added the **@Id**
    annotation above the **getId()** method. This annotation tells Hibernate that
    the **id** property of our **Comment** class is the identifier (or primary key)
    for our **Comment** entity.


    Below the **@Id** annotation is the **@GeneratedValue** annotation, which specifies
    the way in which a given instance’s identifier will be created. The default is
    **AUTO**, and in our example, this is the identifier-75


    CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS


    generation strategy Hibernate will use (since we haven’t defined a strategy at
    all). **AUTO** will look at the underlying database to make the decision as to
    how identifiers should be created. The options are to use a sequence, an identity
    column, or to use a special table for generating new IDs. If you wanted to override
    the default behavior and use a sequence, your **@GeneratedValue** annotation might
    look like this:


    **@GeneratedValue(strategy=GenerationType.SEQUENCE, generator="COMMENT_ID_SEQ")**
    This would create a sequence named **COMMENT_ID_SEQ** to be used for generating
    new IDs for our **Comment** table. Hibernate offers many more options for a domain
    class’s identifier, including UUID-based generation, or simply allowing your application
    to assign identifiers directly.


    ■ **Note** When using the **AUTO** mode for ID generation, Hibernate will pick
    the ideal strategy based on the database you are using. However, for many databases,
    Hibernate will end up creating a single sequence to use across all your tables.
    This can get a bit messy, and we have often found that creating explicit sequences
    for each table is a little cleaner. If your domain model has some complexity to
    it, we recommend specifying a different sequence for each table or class.


    Using Cascading Options to Establish Data Relationships


    Associations within a domain model represent how different domain entities relate
    to one another.


    Often, these relationships can be expressed in layman’s terms as *parent-child
    relationships*, meaning that one entity owns or encapsulates a collection of another
    entity. Within the database, associations are represented through table joins,
    but there is no clear analogue for representing the more hierarchical relationships
    we have within Java. This is where Hibernate comes in. Cascading options help
    to establish parent-child relationships, or more precisely, the rules for how
    operations such as save and delete that are applied to one entity should *cascade*
    to associated entities. This concept is often referred to as *transitive persistence*.


    For example, within our gallery application, we would assert that **ArtEntity**
    owns a collection of **Comment** instances. This is logical since a **Comment**
    is *attached* to a particular **ArtEntity** instance. An end user can post a comment
    about a particular image, and this comment is typically relevant only to the image
    about which it was posted. Furthermore, if an **ArtEntity** instance is deleted,
    it doesn’t make sense to keep its related **Comment** instances around anymore.
