    处理 Grails 中的关联关系


    我们已经描述了如何通过使用 **hasMany** 和 **belongsTo** 约定来定义关联关系。


    这些结构能有效指示领域实体之间的相互关系。一旦领域模型定义完毕，我们就需要对其进行操作。


    回想一下，在 Hibernate 的世界里，编写代码以确保正确管理双向关联非常重要。例如，常见的做法是在 Hibernate 领域类中定义 **add***
    和 **remove*** 方法，以确保关联的两端都能被正确设置或移除。Grails 通过提供动态的 **addTo*** 和 **removeFrom***
    方法，帮助确保关联的两端都能被正确引用（或解除引用）。例如，如果我们想向一个 **ArtEntity** 添加新的 **Comment** 实例，可以使用以下代码：**def
    loadedArtEntity = ArtEntity.findByName("Awesome Panorama");** **def loggedInUser
    = Person.findByUsername("Sam");**


    **Comment newComment = new Comment(**


    **comment: "Cool pict!",**


    **commentDate: new Date(),**


    **person: loggedInUser);**


    **loadedArtEntity.addToComments(newComment);**


    **if (!loadedArtEntity.hasErrors() && loadedArtEntity.save()) {**


    **println("new comment saved");**


    **} else {**


    **println("Error saving new comment");**


    **}**


    在我们的示例中，我们定义了一个新的 **Comment**，然后使用 **addToComments** 方法将其添加到 **ArtEntity** 的 **comments**
    关联中。我们也可以选择使用 **removeFromComments** 方法来移除特定的评论引用。请注意，我们没有直接对新创建的 **Comment**
    实例调用 **save()** 方法。


    相反，我们保存了 **ArtEntity** 实例，从而允许保存操作级联到 **comments** 关联，因为我们已指定 **ArtEntity** 是该关联的所有者。这种关联所有权在
    **Comment** 领域类的以下代码行中体现：**static belongsTo = [commentedArt: ArtEntity]**


    第 11 章 ■ GORM 和 GRAILS


    搭建脚手架并构建你的 Grails 应用程序


    领域模型定义好后，我们可以依赖 Grails 的生成脚本来为我们的画廊应用程序创建脚手架功能。你可以从本书的网站下载完整的基于 Grails 的画廊应用程序。


    要为特定的领域类生成控制器和视图，请确保你位于 Grails 画廊应用程序的根目录，然后运行以下命令：


    **grails generate-all << *domain-class*>>**


    请务必将 ***domain-class*** 替换为你想要为其生成控制器和 GSP 的领域实体名称。你也可以通过分别调用以下脚本来仅生成控制器或仅生成 GSP：


    **grails generate-controller <<domain-class>**


    **grails generate-views <<domain-class>>**


    我们强烈建议检查生成的控制器和视图，以便更好地了解典型的 Grails 应用程序是如何工作的。请记住，生成的代码基于旨在以非常通用的方式工作的脚手架（以便它适用于所有类型的领域模型）。因此，检查示例
    Grails 画廊应用程序以获得略有不同的视角也很有用。


    ■ **注意** 有关 Grails 开发的详细信息，包括构建控制器和 GSP，请参阅 Graeme Rocher 所著的 *The Definitive
    Guide to Grails, Second Edition* (Apress, 2009)。


    你可以通过将 **grails.env** 环境变量传递给 **grails run-app** 脚本，轻松地在特定环境下启动你的 Grails 应用程序：**grails
    –Dgrails.env=development run-app**


    此命令将使用 **development** 环境配置自动启动我们的应用程序。通常你不会想以这种方式运行生产或预发布环境，但这对于测试目的来说很方便。在内部，当你使用
    **run-app** 命令时，Grails 会使用一个嵌入式的 Jetty 服务器来运行你的应用程序。


    如果你使用 Grails 的 **war** 命令创建一个 WAR 文件，你可以将 Grails 部署到任何应用服务器上。如果你想创建一个部署到你自己的应用服务器中的应用程序，你应该运行以下命令：


    **grails –Dgrails.env=production war**


    我们建议显式使用 **–Dgrails.env** 来指定环境，因为它同时支持默认环境和自定义环境。但是，如果你使用的是默认的 Grails 环境，你可以使用这个快捷方式：


    **grails prod war**


    第 11 章 ■ GORM 和 GRAILS


    在 Grails 中定义事务性服务层


    你在本书中已经了解了事务支持。你知道确保特定方法内的操作全部完成（或回滚）作为一个单一的原子工作单元是多么重要。Grails 也鼓励使用服务外观模式，并使定义事务需求变得极其容易。然而，为了灵活性，Grails
    提供了几种选项来确保持久化操作在事务上下文中发生。


    如果你不想创建服务类，另一种确保持久化操作在事务上下文中发生的方法是将一段代码封装在一个闭包内，并将其传递给注入到每个领域类中的动态 **withTransaction**
    方法。例如，我们可以通过以下方式确保对类别和 **ArtEntity** 的更新在一个事务内发生：**Comment.withTransaction {txStatus
    ->**


    **def comments = Comment.findAllByCommentDateGreaterThan(lastWeek);** **comments.each
    {Comment curComment ->**


    **if (Comment.hasSpam(curComment)) {**


    **curComment.delete()**


    **}**


    **}**


    **}**


    在这里，我们实际上定义了一个匿名闭包块，并将这个闭包传递给 **Comment** 领域对象的动态 **withTransaction** 方法。这是一个简单的例子，但它说明了使用
    Grails 定义事务是多么简单。


    ■ **注意** **txStatus** 闭包参数是一个 **org.springframework.transaction.TransactionStatus**
    对象，它允许你获取当前正在执行的事务的信息，并通过调用 **txStatus.setRollbackOnly()** 以编程方式触发回滚。


    一个更清晰的方法是实现一个服务层，并将你的事务操作组织在服务方法中。在 Grails 中，你可以通过运行以下命令来创建一个新的服务方法：


    **grails create-service *servicename***


    **这将在 **grails-app/services** 目录下创建一个新的服务。Grails 有一种相当简单的方式来声明一个特定的服务类是否应该是事务性的。只需在你的服务类顶部添加以下内容：


    **static transactional = true;**


    如果 **transactional** 设置为 **true**，你的所有方法都将在事务上下文中运行。如果这个静态属性是 **false**，则不会使用事务。


    第 11 章 ■ GORM 和 GRAILS


    总结


    在本章中，我们介绍了使用 Groovy 和 Grails 开发 Web 应用程序的一些基础知识。Grails 与前面章节涵盖的主题形成了有趣的对比。


    尽管 Grails 牢固地基于 Spring 和 Hibernate，但它利用 Active Record 作为 DAO 设计模式的替代方案。这种方法在 Grails
    中更实用，因为它使用了动态语言 Groovy，允许动态定义新的行为和方法。通过使用约定优于配置，Grails 可以显著减少启动并运行一个可用应用程序所需的工作量。


    尽管存在这些差异，但 Spring 的深远影响依然清晰可见，并且与其他持久化框架一起使用的大部分经验和模式仍然可以应用于 Grails。你已经看到了一些基本的
    Spring 概念（例如依赖注入）如何通过基于 Groovy 的配置和隐式的、基于约定的装配得到进一步增强。


    **第 12 章**


    ■ ■ ■


    **Spring Roo**

