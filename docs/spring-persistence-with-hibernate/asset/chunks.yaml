    notifications from the application container whenever the servlet context is initialized
    or destroyed. It’s a convenience mechanism to simplify your application configuration
    and ease system maintenance. Spring’s **ContextLoaderListener** fires upon receiving
    such a notification when the servlet context is created during application startup.
    It expects to find a **contextConfigLocation** parameter defined in the servlet
    context, and then uses this parameter to retrieve the bean definitions and instantiates
    them. The beans outlined by the **contextConfigLocation** compose what is commonly
    referred to as the *root application context*.


    Servlet Definition


    The **web.xml** file is also where you configure any implementations of the **Servlet**
    interface that your application requires. Servlets are configured, along with
    any initialization parameters the servlet class expects, and then associated with
    the URL pattern to which you want the servlet to be applied.


    For a Spring application, you would take advantage of the framework’s **DispatcherServlet**
    class.


    **DispatcherServlet** is a flexible implementation of the **Servlet** interface
    that serves as a central routing mechanism for HTTP requests. With the help of
    adapter classes offered by Spring, you can specify how each instance of **DispatcherServlet**
    handles everything from view resolution to exception handling in a nice, pluggable
    way.'
  trans: '

    JNDI 常被描述为 Spring IoC 的对立面。JNDI 并非将依赖自动注入到应用程序中，而是允许从集中管理的目录中查找依赖。这两种方法各有优势。例如，在使用
    JNDI 的情况下，开发者可以在应用程序配置中为数据库资源定义逻辑名称，同时允许系统管理员在 Web 应用程序容器配置中管理该逻辑名称到正确数据库连接池的映射，从而有效地将数据库连接细节的指定推迟到运行时。当需要进行数据库迁移时，JNDI
    可以简化部分管理任务，因为无需修改应用程序配置。


    无论你决定采用哪种方法，Spring 都能让你轻松地将数据源集成到应用程序中。关键在于 Spring 的持久化模板从不要求特定类型的数据源实现。相反，它们依赖于更通用的
    **javax.sql.Datasource** 接口。


    无论你打算使用数据库连接池还是通过 JNDI 检索的数据源，最终的配置都应始终生成一个标准的 **javax.sql.Datasource** 引用。


    这引出了 Spring 中的一个关键概念：***FactoryBean** 接口。**FactoryBean** 是 Spring 对广为人知的工厂设计模式的实现。其核心概念在于，通过将具体实现的选择或实例化延迟到运行时，从而消除对特定实现的直接依赖。你定义一个工厂，由工厂负责在运行时选择正确的实现并实例化（或查找）该特定类。


    *Spring 的 **FactoryBean** 概念与此非常相似。通常，在 Spring 中，当你定义一个 bean 时，由 **classname**
    属性指定的类就是将被实例化并注入到其他引用了该 bean ID 的 bean 中的类。但对于 **FactoryBean** 来说情况并非如此。当你使用 **FactoryBean**
    时，你实际上是在实例化一个工厂类，然后由该工厂类负责创建用于解析 Spring 中依赖关系的具体实现。因此，本质上，此处的 **classname** 属性仅定义了一个工厂实现，其职责是创建你实际需要的目标实现。*


    这一概念使我们能够使用多种策略来访问数据源，而无需将自己局限于某个特定方案。如果你使用 JNDI **FactoryBean**，你最终仍会得到一个数据源引用；如果你选择使用池化数据源实现，结果也是如此。


    在 Spring 中使用 **FactoryBean** 还有其他原因。例如，**MapFactoryBean** 可用于完全在配置文件中创建一个 Java
    **Map**（这在某些情况下非常方便）。


    Spring 的 **FactoryBean** 实现了 **FactoryBean** 接口，该接口定义了三个方法，分别用于实例化目标对象（即工厂旨在创建的实例）、获取目标对象的类型，以及判断目标对象是单例还是原型。针对我们的场景，我们可以按以下方式配置
    JNDI 数据源：


    **<bean id="galleryDatasource" class="org.springframework.jndi.JndiObjectFactoryBean">**


    **<property name="jndiName" value="java:comp/env/jdbc/gallery"/>**


    **</bean>**


    尽管上述示例相当简洁，但在某些情况下，通过导入一个旨在处理特定类型配置的命名空间，可以使配置更易读、更简洁。例如，通过导入 **jee** 命名空间，我们可以进一步简化上述
    JNDI 查找：


    **<jee:jndi-lookup id="galleryDatasource"**


    **jndi-name="java:comp/env/jdbc/gallery"/>**


    我们不仅将配置缩减为一行，而且使配置的意图更加清晰。


    第 3 章 ■ 基本应用程序设置


    Web 应用程序配置


    Java Web 应用程序以 WAR 文件形式部署。WAR 文件是一种特殊的 JAR 文件，包含诸如 Servlet、JSP、标签库和静态 HTML 资源等内容。


    WAR 的关键配置文件是 **web.xml**，它根据 Java EE 规范概述了应用程序的结构。以下配置遵循 Servlet 2.5 规范，可被所有主流应用服务器容器（包括
    Tomcat、Resin、Jetty、WebSphere、WebLogic、GlassFish 等）解析。**web.xml** 文件应放置在 **WEB-INF**
    目录下。对于 Maven 项目，**WEB-INF** 目录位于 **src/main/webapp** 下。以下是一个基本的 **src/main/webapp/WEB-INF/web.xml**
    文件，用于启动我们的艺术画廊应用程序。


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<web-app**


    ****xsi:schemaLocation="http://java.sun.com/xml/ns/javaee** **http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd"**


    **version="2.5">**


    **<!-- 用于创建所有 Servlet 和 Filter 共享的 Spring 容器的监听器 -->**


    **<context-param>**


    **<param-name>contextConfigLocation</param-name>**


    **<param-value>**


    **classpath*:META-INF/spring/spring-master.xml**


    **</param-value>**


    **</context-param>**


    **<listener>**


    **<listener-class>**


    **org.springframework.web.context.ContextLoaderListener**


    **</listener-class>**


    **</listener>**


    **<!-- 用于处理 HTTP 请求的 Spring DispatcherServlet -->**


    **<servlet>**


    **<servlet-name>galleryDispatcher</servlet-name>**


    **<servlet-class>**


    **org.springframework.web.servlet.DispatcherServlet**


    **</servlet-class>**


    **<init-param>**


    **<param-name>contextConfigLocation</param-name>**


    **<param-value>**


    **WEB-INF/spring/spring-master-web.xml**


    **</param-value>**


    **</init-param>**


    **<load-on-startup>1</load-on-startup>**


    **</servlet>**


    **<servlet-mapping>**


    **<servlet-name>galleryDispatcher</servlet-name>**


    **<url-pattern>*.art</url-pattern>**


    **</servlet-mapping>**


    **</web-app>**


    第 3 章 ■ 基本应用程序设置


    如前所述，对于基于 Web 的 Spring 应用程序，你最终会得到包含所有 Spring Bean 的多个应用程序上下文。有一个单一的根应用程序上下文，以及可能多个子应用程序上下文。


    **ContextLoaderListener** 实现了 **javax.servlet.ServletContextListener** 接口。实现了
    **ServletContextListener** 接口的监听器会在 Servlet 上下文初始化或销毁时从应用程序容器接收通知。这是一种便捷机制，用于简化应用程序配置并方便系统维护。Spring
    的 **ContextLoaderListener** 在应用程序启动期间创建 Servlet 上下文时收到此类通知后触发。它期望在 Servlet 上下文中找到定义的
    **contextConfigLocation** 参数，然后使用该参数检索 Bean 定义并实例化它们。由 **contextConfigLocation**
    定义的 Bean 组成了通常所说的*根应用程序上下文*。


    Servlet 定义


    **web.xml** 文件也是配置应用程序所需的任何 **Servlet** 接口实现的地方。Servlet 与其期望的初始化参数一起配置，然后关联到你希望该
    Servlet 应用的 URL 模式。


    对于 Spring 应用程序，你可以利用框架的 **DispatcherServlet** 类。**DispatcherServlet** 是 **Servlet**
    接口的一个灵活实现，充当 HTTP 请求的中央路由机制。借助 Spring 提供的适配器类，你可以以一种良好的、可插拔的方式指定每个 **DispatcherServlet**
    实例如何处理从视图解析到异常处理的所有事务。

