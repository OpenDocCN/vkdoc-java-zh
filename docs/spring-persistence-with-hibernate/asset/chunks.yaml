    添加服务层和 DAO


    为了追求简洁，Roo 只会生成*严格必要*的类。在构建真正简单的应用程序时，你可以将业务逻辑放在控制器或领域类中。


    对于非平凡的应用程序，我们强烈倾向于创建服务层。这样，你的控制器可以严格围绕 HTTP 语义管理和视图解析展开。你的 231


    第 12 章 ■ SPRING ROO


    业务逻辑则保留在领域模型中，并通过一个恰当的服务层外观进行封装。当建模需要在同一事务中操作多个实体的代码时，这一点尤其重要。

