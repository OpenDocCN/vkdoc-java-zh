    index. While this setup may work, what would happen if the domain class update
    was made within the context of a transaction, and suddenly the transaction was
    rolled back? Most likely, the database and the Lucene index would fall out of
    sync.


    Hibernate Search attempts to solve these sort of problems, offering an implementation
    that integrates Lucene into the Hibernate life cycle and that respects the transactional
    boundaries to ensure the respective resources stay in sync.


