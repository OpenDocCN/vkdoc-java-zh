    \ converter. However, Dozer supports nested mapping behavior, so if you define\
    \ the mapping behavior between two classes, these rules will be applied at any\
    \ level of conversion. In other words, even if you are attempting to map two different\
    \ top-level classes, Dozer will apply the mapping rules for any other defined\
    \ classes as necessary. This holds true even for nested properties and collections.\
    \ When Dozer is confronted with a mappable scenario, it will apply these rules\
