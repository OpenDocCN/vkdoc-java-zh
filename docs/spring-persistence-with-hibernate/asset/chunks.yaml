    为了节省篇幅，我们省略了一些冗余的 getter 和 setter 方法。但你会立刻意识到，我们本质上是在定义一个 JavaBean 或 POJO。其中没有对
    Hibernate 依赖的引用，也没有需要继承的父类。


    我们定义了需要持久化到数据库中的属性及其各自的 getter 和 setter 方法。除了适当的 getter 和 setter 之外，我们还添加了一个 **addCommentToArt(Comment
    comment)** 方法。这是用于双向关联的便捷方法，因为在关联的两端都设置引用非常重要。在 **addCommentToArt(Comment comment)**
    方法中，我们确保指定的 **comment** 参数被添加到 **ArtEntity** 的评论集合中，并且 **comment** 的 **commentedArt**
    属性正确地引用了 **ArtEntity** 实例。我们强烈建议在关系的一端创建这种“关联管理”方法，以确保双向关系的两端都被正确设置。


