    The Hibernate Search annotations are fairly intuitive, given the Lucene concepts
    introduced earlier.


    Let’s examine the additions to this class, one at a time.


    First, we need to annotate a class with the **@Indexed** annotation in order for
    it to be considered for indexing. Next, Hibernate Search requires that the identifier
    of a domain class be annotated with


    **@DocumentId**. The document ID is used by Hibernate Search to bridge the Lucene
    and Hibernate worlds.


    In each index, Lucene stores a Hibernate entity’s full class name as well as its
    identifier. Together, they form the basis for querying in Hibernate Search, and
    allow a list of documents returned by a Lucene query to be exchanged for a list
    of active Hibernate entities.


    Unless a domain class property is annotated with the **@Field** annotation, it
    will not be indexed. The


    **@Field** annotation specifies that a particular domain class property be included
    in the Lucene index. The annotation takes a few parameters, including the ability
    to override the name of the field. Of most importance, however, are the **index**
    and **store** attributes. These parameters tell Lucene how to configure the field.


    As noted earlier, a field can be tokenized, which will extract the contents of
    a particular property into a stream of tokens, leveraging a particular analyzer
    to filter out superfluous words, perform stemming, insert synonyms, and possibly
    perform a range of other options, depending on the analyzer used. A field can
    also be stored, which means that the original content will be inserted into the
    Lucene index. Storing a field can increase the size of the index, so it is rarely
    a good idea for large blocks of text.


    However, fields containing data that may need to be displayed by the application—such
    as a title, file name, or a business identifier—should be marked as stored. Let’s
    look at a few examples:


    • In our **ArtEntity** domain class, we have specified that the **title** property
    be stored and tokenized:


    **@Field(index = Index.TOKENIZED, store=Store.YES)**


    **@Boost(2.0f)**


    **public String getTitle() {**


    **return title;**


    **}**


    • We have specified that the **width** property be left untokenized, but still
    stored:


    **@Field(index = Index.UN_TOKENIZED, store=Store.YES)**


    **public Integer getWidth() {**


    **return width;**


    **}**


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    • We have set the **description** property to be tokenized but not stored:


    **@Field(index = Index.TOKENIZED, store=Store.NO)**


    **public String getDescription() {**


    **return description;**


    **}**


    You probably also noticed the use of the **@DateBridge** annotation. Since Lucene
    typically only manages text within its index, Hibernate Search includes a bridge
    strategy as way to convert nontext data into a **String** (and possibly back again).
    Hibernate Search will use the appropriate built-in bridges for mapping fields
    such as integers and longs, but for more complex data types, you can leverage
    a custom bridge or use one of the bridges provided by the framework. For example,
    we can map our **uploadedDate** property in the following way:


    **@Field(index = Index.UN_TOKENIZED, store=Store.YES)**


    **@DateBridge(resolution = Resolution.MINUTE)**


    **public Date getUploadedDate() {**


    **return uploadedDate;**


    **}**


    This mapping parameterizes the **@DateBridge** so that the date value is converted
    to text that can be lexicographically sorted. The date is stored within the Lucene
    index has a resolution of a minute. For performance reasons, you generally want
    to use the largest resolution setting your application can support (for instance,
    prefer a resolution of **Minute** over **Second**, or better yet, **Day** rather
    than **Minute** or **Hour**).


    The **@Boost** annotation can be used to boost the weighting of a particular field
    within the Lucene index. For instance, to have the **title** field be twice as
    relevant as the **description** field, we can specify a boost factor of **2.0**:


    **@Field(index = Index.TOKENIZED, store=Store.YES)**


    **@Boost(2.0f)**


    **public String getTitle() {**


    **return title;**


    **}**


    It is also possible to specify boost factors within a query, but in cases where
    you want a consistent boost weighting, the **@Boost** annotation can come in handy.'
