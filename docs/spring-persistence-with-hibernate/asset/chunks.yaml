    \ add this `BeanPostProcessor` by adding the following to your Spring configuration:\n\
    \n```xml\n<bean class=\"org.springframework.orm.jpa.support.PersistenceAnnotationBeanPostProcessor\"\
    \ />\n```\n\nThroughout this book, we will include examples that use the Hibernate\
    \ APIs, Core JPA and `HibernateTemplate` or `JPATemplate` to demonstrate a broader\
    \ range of implementations.\n\n## Querying in Hibernate\n\nNow that we’ve examined\
