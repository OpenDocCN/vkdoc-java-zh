    这种“合理默认值”的概念，即*约定优于配置*，确实大大减少了构建和运行领域模型所需的编码量。而 Hibernate 的注解支持提供了充足的灵活性，以便在你需要时覆盖任何默认行为。例如，如果我们想为
    **Comment** 类定义一个与 Java 类名不同的表名，可以通过使用 **@Table** 注解来实现：


    **@Table(name = "HOGWASH")**


    **class Comment {**


    **. . . (方法已省略)**


    **}**


    类似地，我们可以通过使用 **@Column** 注解，要求 **comment** 属性映射到 **commentText** 列：


    **@Column(name = "commentText")**


    **public String getComment() {**


    **return this.commentText;**


    **}**


    这种级别的定制非常有用，但在大多数情况下是不必要且多余的（除非你将领域模型映射到遗留数据库）。


    ■ **注意** 在覆盖 Hibernate 的任何默认行为之前，你应该有非常充分的理由。如果你觉得需要将 Java 属性映射到不同名称的列，你可能需要重新考虑你的命名约定。现在，列名和
    Java 属性名之间存在差异并非错误，但配置的简洁性非常重要，我们鼓励你尽可能限制对默认行为的覆盖。毕竟，更少的代码意味着更少的维护。


    管理实体标识符


    Hibernate 的注解支持确实要求你定义主键以及所有 JavaBean 的关联。在我们的 **Comment** 类中，我们在 **getId()**
    方法上方添加了 **@Id** 注解。这个注解告诉 Hibernate，**Comment** 类的 **id** 属性是 **Comment** 实体的标识符（或主键）。


    在 **@Id** 注解下方是 **@GeneratedValue** 注解，它指定了如何生成给定实例的标识符。默认值是 **AUTO**，在我们的示例中，这就是
    Hibernate 将使用的标识符生成策略（因为我们根本没有定义策略）。**AUTO** 会查看底层数据库来决定如何创建标识符。选项包括使用序列、标识列或使用特殊表来生成新
    ID。如果你想覆盖默认行为并使用序列，你的 **@GeneratedValue** 注解可能如下所示：


    **@GeneratedValue(strategy=GenerationType.SEQUENCE, generator="COMMENT_ID_SEQ")**
    这将创建一个名为 **COMMENT_ID_SEQ** 的序列，用于为我们的 **Comment** 表生成新 ID。Hibernate 为领域类的标识符提供了更多选项，包括基于
    UUID 的生成，或者直接允许你的应用程序自行分配标识符。


    ■ **注意** 当使用 **AUTO** 模式进行 ID 生成时，Hibernate 会根据你使用的数据库选择理想的策略。然而，对于许多数据库，Hibernate
    最终会创建一个单一的序列，用于所有表。这可能会变得有点混乱，我们经常发现为每个表创建显式序列会更清晰一些。如果你的领域模型具有一定复杂性，我们建议为每个表或类指定不同的序列。


    使用级联选项建立数据关系


    领域模型中的关联表示不同领域实体如何相互关联。通常，这些关系可以用通俗的术语表示为*父子关系*，这意味着一个实体拥有或封装了另一个实体的集合。在数据库中，关联通过表连接来表示，但没有明确的类比来表示我们在
    Java 中拥有的更层次化的关系。这就是 Hibernate 发挥作用的地方。级联选项有助于建立父子关系，或者更准确地说，是建立规则，规定应用于一个实体的操作（如保存和删除）应如何*级联*到关联的实体。这个概念通常被称为*传递持久性*。


    例如，在我们的画廊应用程序中，我们会断言 **ArtEntity** 拥有一个 **Comment** 实例的集合。这是合乎逻辑的，因为一个 **Comment**
    是*附加*到特定的 **ArtEntity** 实例上的。最终用户可以对特定图片发表评论，而这条评论通常只与它所发布的图片相关。此外，如果一个 **ArtEntity**
    实例被删除，那么保留其相关的 **Comment** 实例也就没有意义了。本质上，评论是 **ArtEntity** 的子项。


    由于评论可以被视为 **ArtEntity** 的子项，我们可以断言，对 **ArtEntity** 调用的保存操作也应该级联到与该 **ArtEntity**
    实例关联的任何新增或更新的 **Comment** 实例。此外，如果 **ArtEntity** 被删除，我们希望删除操作也级联到任何关联的 **Comment**
    实例。我们可以使用以下注解来表示这些级联规则：


    **@OneToMany(orphanRemoval = true, cascade = { javax.persistence.CascadeType.*ALL***
    **})** **public Set<Comment> getComments() {**


    **return comments;**


    **}**


    在这种情况下，我们将 **orphanRemoval** 设置为 **true**，这还将确保任何被解除引用的评论也会被删除。我们还指定了 **CascadeType**
    为 **SAVE_UPDATE**，这将确保对 **ArtEntity** 实例调用的保存和更新操作也会传递给子 **Comment** 实例。


    添加二级缓存


    Hibernate 允许实体以及关联集合（一组评论）被隐式缓存。启用缓存后，Hibernate 会首先尝试在缓存中查找实体或集合，然后再尝试查询数据库。由于从缓存加载数据的成本远低于执行数据库操作，因此缓存是提高应用程序性能的另一种有效策略。


    Hibernate 集成了多个缓存框架，例如 Ehcache，并且如果你想要添加自己的缓存解决方案，它还提供了一个 **CacheManager** 接口。一旦集成，缓存就会隐式发生，除了为每个实体和集合指定缓存规则外，不需要任何额外的编码。


    为了在我们的领域模型上启用基本缓存，我们可以将以下注解添加到每个领域实体及其对应的集合上，以确保它们被适当地缓存：


    **@Entity**


    **@Cache(usage = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)**


    **public class ArtEntity implements Serializable {**


    ****. . . 方法已省略 . . .**


    ****@OneToMany(orphanRemoval = true, cascade = { javax.persistence.CascadeType.*ALL***
    **})**


    **@Cache(usage = CacheConcurrencyStrategy.*NONSTRICT_READ_WRITE*)** **public Set<Comment>
    getComments() {**


    **return comments;**


    **}**


    ****public void setComments(Set<Comment> comments) {**


    **this.comments = comments;**


    **}**


    ****. . . 方法已省略 . . .**


    ****}**


    指定读写缓存策略可确保 Hibernate 在特定领域实例被更新时使缓存失效。这可以防止缓存中存储过时数据。

