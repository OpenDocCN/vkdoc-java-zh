  raw: 'There are three types of caching options for Hibernate: domain, collection,
    and query. Domain and collection caching are demonstrated in the preceding example,
    as we have specified the **@Cache** annotation for the top-level domain entity
    as well as for the comments association.


    Caching details should be adjusted using the configuration file appropriate for
    the caching implementation you have selected. In the case of Ehcache, you can
    configure specifics, such as the time-to-live and cache size on a domain-by-domain
    basis within the **ehcache.xml** file.


    We will cover caching strategies in more detail in Chapter 9.


    CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS


    Using Polymorphism with Hibernate


    For our gallery application, we require a few more classes to help provide the
    persistence details for all of the gallery’s functionality. As a quick recap,
    here is an overview of our domain model, as it currently stands:


    • **Person**: Represents an administrative user or a registered user of our gallery
    application.


    • **Exhibition**: Organizes collections of images into logical groups.


    • **ArtEntity**: Represents an image in the application and contains metadata
    about the image, as well as its location.


    • **Comment**: Represents an individual comment that relates to a particular **ArtEntity**
    instance.


    Our **ArtEntity** class represents basic metadata about an image, but what if
    we need to store an image in different resolutions, such as thumbnails, medium-resolution
    versions, and high-resolution versions? We could certainly insert additional fields
    into our **ArtEntity** class, but Hibernate provides a cleaner solution.


    ORM solutions like Hibernate go far beyond mapping database fields to domain model
    instances.


    Object-oriented concepts, such as polymorphism, are also enabled by Hibernate
    and are an effective means for establishing a hierarchy of domain objects that
    share a set of core properties and functionality.


    Rather than store an image path directly within our **ArtEntity** class, let’s
    instead refactor this data into a separate base class called **ArtData**. We will
    then create three subclasses that each extend the **ArtData** class (and therefore
    share its properties) but are tailored to represent a particular type of image.


    We will define the following four new domain classes:


    • **ArtData**: The bulk of the properties will be stored here, since it is the
    base class.


    **• **ArtData_Gallery**: This class will be used to represent the standard view
    of an image within the gallery listing pages.


    **• **ArtData_Thumbnail**: This class will be used to represent thumbnails.


    **• **ArtData_Storage**: **This class will persist a high-resolution version of
    the image, suitable for archival purposes or for zoomed-in views.**


    ****■ **Note** We won’t include the entire source code for our domain model here.
    You can download the example code for this chapter if you would like to follow
    along.


    Hibernate provides four different options for implementing polymorphism: *Implicit
    polymorphism*: This option uses the Java inheritance structure without requiring
    these structural details to affect the database schema. In other words, using
    implicit polymorphism, you will be able to query a parent class, and Hibernate
    will issue select queries for all tables within the specified Java class 78


    CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS


    hierarchy. While this strategy allows you to leverage the polymorphic structure
    inherent in your Java classes without affecting the database, these types of queries
    can be a bit inefficient, as Hibernate must do a lot more heavy lifting to translate
    distinct tables into a coherent class hierarchy, without being able to effectively
    leverage the database. The other polymorphic strategies rely on the database to
    some degree to delineate the associations between classes in the Java hierarchy.


    *Table-per-hierarchy*: This option combines all the properties of a class hierarchy
    into a single table, using a *discriminator field* to help determine which Java
    type is represented by each row in the database. A discriminator is simply a table
    column, the value of which is used to specify to which class that particular row
    should be associated. The advantage of this approach is that all the necessary
    fields for any class within the hierarchy are included in a single table, without
    requiring the overhead of a database join. The disadvantage is that the design
    is not very normalized, and for any given type, there will likely be fields that
    will not be utilized. This can impose limitations on your database schema, such
    as preventing you from being able to specify not-null constraints.


    Since field requirements will differ between classes in the hierarchy and they
    are all shared within a single table, you must simplify the schema down to the
    lowest common denominator.


    *Table-per-subclass*: Using this option, each Java class in the hierarchy is represented
    by a different table. Properties related to the parent class are persisted to
    a single table. The specific properties unique to each subclass are stored within
    their own database tables. A particular subclass in the hierarchy is then represented
    through a join between the parent table and the subclass table. The advantage
    of this approach is that the design is clean and normalized, since shared properties
    are stored in a single parent table and only subclass-specific attributes are
    sequestered into their own subclass tables.


    However, although cleaner from a relational database modeling perspective, you
    should consider the performance hit incurred by the necessity of joining tables
    together.


    *Table-per-concrete-class*: This option requires that every Java class that is
    not declared as abstract be represented by its own table. Subclasses are not implemented
    as joins between multiple tables. Instead, all the properties of each class—including
    those properties inherited from a parent class—are persisted to their own table.
    This obviously requires a bit of redundancy, as the same fields across a class
    hierarchy will be present in each mapped table.


    However, Hibernate can implement polymorphic queries more efficiently by leveraging
    SQL unions across all tables mapped to a particular class hierarchy.


    The downside is the increased verbosity and redundancy in your database schema.
    Furthermore, Hibernate imposes limitations on the ID-generation strategy used
    by tables mapped with this polymorphic approach.


    Which option to use really depends on your domain model. If there isn’t too much
    disparity across classes within your class hierarchy, then the table-per-hierarchy
    option probably makes the most sense.


    In our case, this is the strategy we will employ.


    Let’s take a look at the base **ArtData** entity:


