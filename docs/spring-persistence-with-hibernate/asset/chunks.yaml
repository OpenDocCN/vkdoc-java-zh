- fmt: "# Spring Roo 文档排版\n\nRoo 不能合理地期望能够足够好地预测您应用程序的意图，从而为您生成服务层类。幸运的是，因为 Roo 应用程序只是普通的\
    \ Spring 项目，您可以创建一个服务层类，用`@Service`构造型注解对其进行注解，您的 Roo 应用程序将自动检测它并将其合并到您的应用程序上下文中。\n\
    \n与服务层一样，Roo 没有任何东西会阻止您将 DAO 连接到您的应用程序中。最大的缺点是 Roo 插件基础设施不支持它们，因此您无法享受我们在此展示的一些好处，例如自动集成测试。\n\
    \n## 为什么不用 DAO？\n\nRoo 团队完全有理由坚持默认不生成 DAO 的立场。Roo 团队成员不遗余力地在他们出色的文档中解释他们的决定。以下内容引自\
    \ *The Spring Roo - Reference Documentation*，第 3 章，应用程序架构，第 3.6 节，再见 DAO（`http://static.springsource.org/spring-roo/reference/html/architecture.html`）。\n\
    \n如果我们稍加思考 DAO 的主要动机，就很容易理解为什么这些在 Roo 应用程序中不适用：\n\n- **测试**：在普通应用程序中，DAO 提供了一个可以作为单元测试一部分轻松存根的接口。关于测试的有趣之处在于，在现代应用程序中，大多数人使用模拟而不是存根，这使得简单地模拟测试实际需要的一两个持久化方法（而不是存根整个\
    \ DAO 接口的粗糙做法）变得有吸引力。在基于 Roo 的应用程序中，您只需模拟已引入实体的持久化相关方法。\n\n  您可以对 Roo 实体上的实例方法使用普通的模拟方法，并对静态查找器方法使用\
    \ Spring Aspect 的`@MockStaticEntityMethods`支持。\n\n- **关注点分离**：拥有 DAO 层的一个原因是它允许追求更高内聚性的面向对象设计。高内聚性等同于关注点分离，这降低了实现系统的概念负担。在基于\
    \ Roo 的应用程序中，关注点分离是通过单独的 ITD 实现的。概念负担也降低了，因为 Roo 处理持久化方法，而不是强迫程序员处理它们。\n\n  因此，在\
    \ Roo 应用程序中，即使没有 DAO 层，关注点分离仍然存在。\n\n- **可插拔实现**：DAO 的另一个好处是它们简化了从一个持久化库切换到另一个的过程。在现代应用程序中，这种\
    \ API 抽象级别是通过 JPA 提供的。由于 Roo 在其生成的方法中使用 JPA，尽管没有正式的 DAO 层，插入替代实现的能力已经得到完全支持。您可以通过执行`persistence\
    \ setup`命令并指定替代实现来亲自验证这一点。\n\n- **非 JPA 持久化**：某些实体可能使用没有 JPA 提供程序的技术进行存储。在这种情况下，Roo\
    \ 1.0.0 不直接支持这些实体。然而，如果只有少数实体受到此考虑的影响，没有理由不能由用户提供一个或多个手写的 ITD，以保持与 Roo 应用程序其余部分（可能确实使用了一些\
    \ JPA）的概念对等。如果大量实体受到影响，该项目可能会受益于用户编写一个 Roo 插件，该插件将像 Roo 对 JPA 所做的那样自动管理 ITD。\n\
    \n- **架构原因**：人们常常因为一直这样做而表达对 DAO 的偏好。虽然保持经过验证的现有方法通常是可取的，但在应用程序中采用 Roo 会大大降低 DAO\
    \ 层的价值，以至于几乎没有（如果有的话）与工程相关的理由来保留它。\n\n同样值得注意的是，大多数现代 RAD 框架都避免使用 DAO 层，并将持久化方法直接添加到实体中。如果您回顾与\
    \ Roo 类似的技术，您会发现这种对 DAO 层的规避是常见的、主流的，并且不会引起问题。\n\n## 现在你看到我，现在你消失了——移除 Roo\n\n\
    我们最喜欢 Roo 的一个方面是它很容易从项目中移除。由于您可以在现有的遗留项目上使用 Roo，并且很容易从源代码中移除 Roo 的任何痕迹，因此几乎没有理由不去尝试它。如果您从团队或组织那里遇到任何阻力，您可以在几分钟内移除它，因此涉及的风险非常小。\n\
    \n移除 Roo 最好在理解 AspectJ 的 IDE（如 Eclipse 或 STS）中完成。以下是在安装了 AspectJ 开发工具（AJDT）的 Eclipse\
    \ 中的步骤：\n\n1. 停止任何可能正在运行的 Roo shell。\n2. 在 Eclipse 中，在 Java Browsing 透视图下，右键单击您的项目并选择\
    \ Refactor ` Push In`。\n3. 您将看到一个列出所有 ITD 的对话框。选择 OK 以将所有代码从您的`.aj`源文件推入到相应的`.java`源文件中。\n\
    4. 对项目中的文件执行递归查找和替换，将正则表达式`\\n.*Roo.*\\n`替换为`\\n`。这将移除所有 Roo 注解及其导入声明。\n5. 从您的\
    \ Maven `pom.xml`文件中移除任何 Roo 依赖项。\n\n就是这样。因为没有运行时依赖项，并且因为 Roo 构建在标准 Java 技术之上，所以很容易离开该框架而不会丢失您所做的任何工作。\n\
    \n## 总结\n\n正如您在本章中所看到的，尽管 Roo 还没有神奇到让程序员失业，但它在原始开发速度方面确实给了您巨大的推动力。它通过自动将样板代码生成到\
    \ AspectJ ITD 中，并在项目增长时修改您的 Spring 应用程序上下文配置，帮助消除了与企业 Java 应用程序开发相关的大量繁琐工作。\n\n\
    Roo 拥有基于 OSGi 和插件的强大架构。在 SpringSource 的支持下，随着 Roo 团队努力提供更多最佳实践解决方案以简化全球开发人员的生活，它很可能会以疯狂的速度发展。\n\
    \n在 JVM 上采用大多数 RAD 框架的最大障碍之一是，只有在编写新应用程序或在极少数情况下需要完全重写应用程序时，使用它们才是可行的选择。但是 Roo\
    \ 可以引入到现有应用程序中，而无需强制更改其他团队成员编写代码的方式。随着该框架在您的环境中得到验证，生产力提升应该是无可辩驳的，您的开发团队很可能会接受这种积极的变化。我们强烈建议您尝试使用它在您现有的基于\
    \ Spring 和 Hibernate 的应用程序上实现一个新功能。\n\n---\n\n## 索引\n\nSpring 配置, 37–40\n\n- **A**\n\
    \  web 应用程序配置, 43–46\n  抽象层, 3\n  `ApplicationContext`接口, 18–20, 23, 37, 44–45\n\
    \  `AbstractPlatformTransactionManager`类, 114\n  `applicationContext.xml`文件, 220\n\
    \  `Accept`头, 157\n  `ApplicationContextAware`接口, 19\n  ACID, 110–121\n  架构, 1–15\n\
