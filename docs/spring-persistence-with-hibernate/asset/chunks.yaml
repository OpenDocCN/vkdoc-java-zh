    类似，**@Controller** 有助于表明该类的用途，并且可以通过 Spring 的组件扫描功能自动进行管理。


    你还会注意到，我们自动装配了 **ArtworkFacade** 实现和 Dozer 映射器。真正的魔法发生在定义的两个方法中。这两个方法都使用了 **@RequestMapping**
