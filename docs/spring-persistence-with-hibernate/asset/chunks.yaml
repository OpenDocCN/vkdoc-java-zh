    Spring 的 **@Repository** 注解在此示例中有三个主要用途：


    • 它告诉 Spring 此类可以通过类路径扫描导入。

    • 它是一个标记，让 Spring 知道此类需要 DAO 特定的 **RuntimeException** 处理。

    • 我们指定在 Spring 上下文中用于表示此类的名称。通过指定 DAO 应被识别为 **personDao**（使用 **@Repository("personDao")**），我们可以在
    Spring 配置的其他地方简单地将其引用为 **personDao**，而不是 **personDaoJpa**。这使我们能够以更小的阻力将底层 DAO
    实现更改为其他实现。


    使用 **@Repository** 注解允许我们通过 IDE 搜索快速分组所有 DAO，并且还能让阅读者一眼看出此类是一个 DAO。


    由于我们使用了泛型，**PersonDaoJpa** 实现中剩余的代码简洁明了，并且仅与 **Person** 领域类相关。开发者常常对泛型感到畏惧，但它们可以帮助你避免大量机械重复且毫无价值的工作。


    第 4 章 ■ 使用 Hibernate 进行持久化


    JPA 实体的生命周期


    让我们更仔细地看看 JPA 实际上是如何在内部处理我们的 **Person** 实体的。图 4-4 突出了实体可能处于的各种状态、涉及的一些关键方法，以及一些用于拦截调用以通过横切方面修改行为的有用注解。


    *图 4-4. JPA 实体的生命周期*


    第 4 章 ■ 使用 Hibernate 进行持久化


    有五种关键状态：不存在、新建、托管、已删除和游离。此外，还有七个生命周期回调注解。当在你的实体类中实现时，这些回调注解被称为*内部回调方法*。或者，它们可以在给定的实体类外部定义为监听器类。这些被称为*外部回调方法*。你可以实现回调方法的任意子集，或者一个都不实现。你只能将特定的生命周期回调应用于单个方法。你可以通过应用所有适用的注解，在同一个方法上使用多个回调。你也可以在单个实体上同时使用内部回调和外部回调。


    外部回调先触发，然后执行内部回调。利用这些回调有很多选择。


    ■ **注意** 回调方法不应与其他实体对象交互，或调用 **EntityManager** 或 **Query** 方法，以避免与仍在进行中的原始数据库操作发生冲突。


    让我们通过这五种关键状态，走一遍一个人的虚构生命周期：


    • *不存在*：我们从这里开始。

    • *新建*：通过 **Person person = new Person()** 实例化一个新的 person 对象。在此阶段，**person** 对象处于新建状态。它不与任何
    **EntityManager** 关联，并且在数据库中没有对应记录。此外，因为我们为主键使用了自动生成策略，该对象存在于内存中，但没有关联的 ID。再次强调，在集合中管理对象时需要注意这一点，因为如果一个实体的相等性基于其标识符，并且该属性在通过
    Hibernate 持久化时突然从 null 变为一个实际值，那么该实体有可能破坏 **equals()** 和 **hashCode()** 契约。我们将在第
    5 章更详细地讨论这个问题。

    • *托管*：我们通过调用 **EntityManager.persist()** 来持久化 **person** 实体。如果我们有一个用 **@PrePersist**
    注解的方法，该方法会先执行，然后执行数据库插入操作，之后可选地执行我们已用 **@PostPersist** 注解的任何自定义方法。现在我们的 **person**
    实体处于托管状态。在此状态下，我们的 **person** 实体可能会发生很多事情。例如，我们可以调用 **EntityManager.refresh()**，这将丢弃内存中的对象并从数据库中检索一份新的副本，并可选择利用
    **@PostLoad** 回调。或者，我们可以通过 **EntityManager.remove()** 删除该实体，这将导致调用 **@PreRemove**。

    • *已删除*：一旦记录从数据库中删除，该实体就处于已删除状态，等待执行用 **@PostRemove** 注解的方法，然后返回到不存在状态。

