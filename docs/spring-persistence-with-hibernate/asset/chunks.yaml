    首次发布。十五年后，其生态系统已经非常庞大！


    Java 已被用于编程从手机到厨房电器，再到需要亚毫秒级响应时间的极其复杂的全球交易系统等各种应用。它经常作为计算机科学课程的一部分被教授，并且有大量工程师在企业环境中拥有丰富的
    Java 使用经验。这确保了可以轻松接触到各个经验水平的有才华的工程师。此外，还有许多框架和库可供选择，无论是开源的还是商业的，这样你就不必在每次遇到常见问题时重新发明轮子，这些问题的设计模式和最佳实践已经得到了充分的研究和理解。开发团队可以通过重用或扩展现有软件来节省大量时间和成本。这种系统脚手架使你能够专注于编写真正使你的组织与众不同的代码。所有这些原因使得选择
    Java 作为驱动业务的平台非常有吸引力。


    尽管 Java 在企业领域前景广阔，但对单个 Java 程序员来说并非一切顺利。随着 Web 开发（尤其是开源软件）在过去十年中的蓬勃发展，我们看到了大量新编程语言和
    Web 框架的涌入（有趣的是，我们也看到一些旧语言找到了新的定位）。如果你花时间探索过其中一些替代技术，Java 的生产力缺陷就会变得显而易见。在 Java
    环境中编程时，有许多技术障碍会拖慢开发者的速度。其中包括编译步骤、需要重启应用服务器才能看到更改效果，以及许多人提到的 Java 的“高仪式性”方面，工程师们因此浪费宝贵的时间来编写和维护大量的样板代码。


    在 Java 社区中，我们看到采用更新脚本语言的框架出现，旨在经过实战检验的 JVM 之上提供更快的开发模型。Grails 就是这样一个框架，用 Groovy
    语言编写，在 Graeme Rocher 的领导下声名鹊起，后来被 SpringSource 收购。


    正如你在第 11 章中学到的，Grails 通过称为约定优于配置（有时称为按约定编码）的软件设计范式来提高生产力。应用这种范式的框架通常被认为是“非常固执己见的”。它们致力于减少开发者在构建应用时必须做出的决策数量，同时仍然提供足够的钩子，让你可以在应用偏离约定的地方指定或覆盖行为。例如，在我们的艺术画廊应用中，一个使用约定优于配置的框架会确保
    **Person** 领域类默认映射到名为 **person** 的相应数据库表。如果我们知道数据库表实际上名为 **user** 而不是 **person**，该框架也会提供覆盖此类行为的方法。


    Groovy 作为一种动态类型脚本语言的本质，消除了编译步骤的需要，并且在许多情况下，甚至消除了应用服务器重启的需要。Grails 通过大量使用反射和 Groovy
    的元编程模型在运行时动态生成代码，进一步减轻了开发者的负担，并解决了前面提到的障碍，从而减少了典型 Web 应用所需的大量样板代码。


    相反，在 Ben Alex 的指导下，Spring Roo 让工程师能够利用纯 Java，配备他们熟悉和喜爱的所有工具，同时通过广泛的代码生成来加速开发生命周期。


    使用 Roo 创建领域模型

