    \ well as a `constraints` block. One addition is the `belongsTo` field, which\
    \ provides clues to Grails about the relationship between two entities. In this\
    \ example, we are defining a parent-child relationship between a `Comment` and\
    \ an `ArtEntity`. We are also defining a property called `commentedArt` and declaring\
    \ that this property is of type `ArtEntity`. We could specify additional `belongsTo`\
