    \ JPQL 子句，内容为：“`from ArtEntity`”。换句话说，我们表达了查询`ArtEntity`类型的意图。此方法调用返回一个`Root`实例，该实例被泛型类型化为我们的`ArtEntity`实例。现在，`Root`实例可以用作引用`ArtEntity`类上我们希望在查询中用作条件的属性的手段。\n\
