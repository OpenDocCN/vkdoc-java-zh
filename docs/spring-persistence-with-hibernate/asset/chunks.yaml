  raw: 'Getting back to our gallery application, let’s define a simple unit test that
    illustrates saving and loading our **Person** domain class. Since we want to demonstrate
    how Grails behaves within a running application, we need to create an integration
    test, which actually bootstraps a Spring **ApplicationContext**, so we can test
    functionality that relies on core Grails features such as persistence.


    Grails ships with a script that creates the integration test scaffolding for us:
    **grails create-integration-test Person**


    After running this command, you will find an integration test stub under **test/integration/grailsGallery/PersonTests.groovy**.
    In our test, we are going to verify that we can instantiate, save, and load a
    **Person** domain entity:


    CHAPTER 11 ■ GORM AND GRAILS


    **class PersonTests extends GroovyTestCase {**


    **...**


    **void testSavePerson() {**


    **Person person = new Person(**


    **[firstName: "Sam", lastName: "Smith",**


    **username: "ssmith", password: "1234",** **email: "sam@notarealaddress.com",**


    **roleLevel: Person.ADMIN_ROLE])**


    **assertTrue("Person entity is valid and can be saved",** **(person.validate()
    && person.save()))**


    **assertNotNull ("person id is null", person.id)**


    **def loadedPerson = Person.get(person.id)**


    **assertTrue(**


    **"Person was successfully loaded",**


    **loadedPerson != null &&**


    **loadedPerson.username != null)**


    **}**


    **}**


    This is a very straightforward test. Notice that we instantiate our **Person**
    entity using a **java.util.Map** containing default properties for our Groovy
    class. After our **Person** instance is instantiated, we verify that the instance
    validates and saves successfully. **validate()** verifies all the requirements
    specified within our domain model’s **constraints** block. If our domain model
    does not validate successfully, Grails will set an **errors** property on our
    **Person** instance. The **errors** property contains details on each validation
    failure and is an implementation of the **org.springframework.validation.Errors**
    interface.


    This interface is quite useful for tracking and managing form submissions, and
    should be familiar to users of Spring MVC.


    In the event of a validation error, we can iterate through each error to find
    out exactly what went wrong:


    **person.errors.allErrors.each {curError ->**


    **log.error("Error saving Person instance: ${curError}");**


    **}**


    We can also get an error count this way:


    **person.errors.errorCount()**


    ■ **Note** A **log** instance variable is automatically injected in all controller
    and service classes, allowing you to easily emit logging messages. This is an
    instance of log4j’s **Logger** class, and is configured in the **Config.groovy**
    file described earlier in this chapter.


    CHAPTER 11 ■ GORM AND GRAILS


    Grails ships with a tag library that helps to render errors within a typical form
    submission.


    Additionally, the default Grails templates will create GSP views that will automatically
    render clear error messages in the event of any validation or save failures. Of
    course, default error messages can be easily overridden by updating the **messages.properties**
    file.


    At this point, you should have a solid understanding of how to go about saving
    and loading a domain entity. Unfortunately, that won’t get you very far. You’ll
    want to be able to query the database.


    To demonstrate how that works, we first need to add some data to our database.


    Let’s return to the **PersonTests.groovy** file and define a **setup()** method
    that will be executed before each of our tests are run and allow us to populate
    the database with some sample data: **void setUp() {**


    **def baseNames = [**


    **"Sam", "Bob", "Heather",**


    **"Steve", "Sofia"]**


    **baseNames.each {curName ->**


    **def person = new Person(**


    **[firstName: curName,**


    **lastName: curName,**


    **username: curName,**


    **password: "1234",**


    **email: "${curName}@apress.com",**


    **roleLevel: Person.USER_ROLE])**


    **assertTrue (**


    **"Person entity is valid and can be saved",**


    **(person.validate() && person.save()))**


    **assertFalse(**


    **"There should be no errors on the saved entity",**


    **person.hasErrors())**


    **}**


    **}**


    This method is a little archaic, as we simply iterate through a **java.util.List**
    of names and create new **Person** entities using these names as seed data for
    each field. Also notice that we’ve added a new assertion to verify that **person.hasErrors()**
    is false. After a **save** operation, calling **hasErrors()** is a useful idiom
    to ascertain that there were no errors preventing the entity from being persisted
    to the database.


    You will see this approach used frequently within the default Grails controllers.


    Now that we have a way to seed our database with some sample data, let’s see how
    Grails makes querying the database very intuitive.


    **void testFinders() {**


    ****def foundPeople = Person.findAllByUsername("Sam");**


    ****/* foundPeople should reference a List**


    **containing one Person entity */**


    **assertEquals("One person found", 1, foundPeople.size())**


    ****/* singlePerson should refer to a single Person**


    **entity, and the lastName property**


    **should be equal to Sam*/**


    **def singlePerson = Person.findByUsername("Sam")**


    CHAPTER 11 ■ GORM AND GRAILS


    ****assertEquals(**


    **"Lastname is Sam", "Sam", singlePerson.lastName)**


    ****def allPeopleSorted =**


    **Person.list(max: 3, order: "asc",**


    **sort: "username", offset: 0);**


    ****assertTrue(**


    **"Three people returned", allPeopleSorted.size())**


    ****assertEquals(**


    **"First person in list is Sam", "Sam",**


    **allPeopleSorted[0].username)**


    ****}**


    This new method helps to illustrate a lot of the flexibility for querying data
    using Grails’ dynamic finder concept. Notice that the way each method name is
    formatted determines the query that eventually is generated on the database.


    In our first example, we run **Person.findAllByUsername("Sam")**. This type of
    structure returns *all* data that matches the field **username**. Notice that
    we use camel casing. The format might be better expressed using the following
    structure:


    ***DOMAIN*****.findAllBy< *PROPERTYNAME*>** If you look at the assertions, you
    will notice that this type of method will always return a collection of objects.
    Conversely, our next assertion uses the format:


    ***DOMAIN*****.findBy< *PROPERTYNAME*>**


    **This method works in a similar fashion but will return only a single object.
    This claim is validated on our assertion, as we demonstrate that the returned
    value is a single **Person** instance, instead of a collection.


    Both the **findAllBy** and **findBy** dynamic methods can also be expanded, in
    order to specify modifiers on the property name or provide further constraints.
    For example, if we wanted to find all users that have first and last names that
    start with the letter *p*, this could be expressed in the following method:


    **Person.findAllByFirstNameIlikeAndLastNameIlike("P%", "P%");** In this example,
    we first specify a conditional property of **firstName** and then modify the condition
    using **Ilike**. The **Ilike** modifier is similar to the **like** modifier but
    is case-insensitive. Next, we append **And** to the method name to further constrain
    the query with an additional property condition.


    A similar approach may be taken to find out the number of rows in the database
    that match a specified set of conditions by using the **countBy*** dynamic finder
    method. Based on this example, we can define a method-naming structure that delineates
    the way in which a dynamic-finder method is formatted:


    **countBy/findBy/findAllBy<PROPERTYNAME><MODIFIER>AND/OR<PROPERTYNAME><MODIFIER>**
    208


    CHAPTER 11 ■ GORM AND GRAILS


    The following are some of the modifiers that can be used:


    • **Between**


    • **GreaterThan**


    • **GreaterThanEquals**


    • **LessThan**


    • **LessThanEquals**


    • **Like**


    • **Ilike**


    • **Not**


