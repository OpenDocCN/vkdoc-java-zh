    总结


    在本章中，我们介绍了使用 Hibernate 定义域模型的基础知识。您了解了映射过程，以及如何使用注解为 Hibernate 提供适当的线索，以有效地将面向对象的域类映射到关系数据库。


    我们还研究了关联映射，区分了 Hibernate 提供的各种基数选项。这些细节——例如是使用多对多还是一对多关联——对您的域模型设计以及最终的数据库模式都有重大影响。此外，仔细考虑关联应该是单向的还是双向的也很重要。虽然双向关联通常是简化引用遍历和访问所必需的，但此选项可能会在循环依赖方面产生后果，从而可能使编组实现复杂化。


    Hibernate 提供了一个称为级联的强大功能，它允许您将对一个实体应用的操作与其子实体关联起来，以便这些操作可以级联。此功能对于确保子实体与其父实体的状态和生命周期保持同步非常有用。


    **第 6 章**


    ■ ■ ■


    **DAO 与查询**


    如果说域模型是持久化层的基础，那么 DAO 层就可以被视为引擎。正如您在之前章节中学到的，DAO 模式旨在抽象底层的持久化功能，包括创建、读取、更新和删除实体。但
    DAO 通常提供的不仅仅是基本的 CRUD 功能。


    反映应用程序核心实体访问能力的专用查询通常被嵌入到 DAO 层中。例如，由于我们的画廊应用程序要求最终用户能够查看特定类别中的一系列图像，因此 DAO 类应提供按指定
    **Category** 查询和加载相关 **ArtEntity** 域对象的能力。换句话说，您可以将应用程序的 DAO 类视为服务层用来为应用程序提供必要持久化相关功能的构建块。我们将在下一章讨论服务层，但请记住，服务层通常封装了应用程序的业务逻辑，并依赖
    DAO 层来完成持久化的“脏活累活”。


    DAO 模式被认为是最佳实践的原因之一是它有助于将持久化实现细节（和技术）从 DAO 接口中抽象出来。这允许应用程序开发人员确定特定 DAO 的方法和特性，并将这些细节提取到接口中。然后，DAO
    接口成为实际持久化实现和服务层之间的集成枢纽——即底层持久化功能的联系人。这是 Spring 可以帮助解耦这些组件的另一个领域。


    在本章中，我们将为我们的艺术画廊应用程序构建一些 DAO 类，并了解如何使用 Hibernate 和 JPA 提供给我们的各种查询机制，例如 Hibernate
    查询语言（HQL）、Java 持久化查询语言（JPQL）和 Criteria API。


    一个基本的 Hibernate DAO 实现


    要开始我们的第一个 DAO 实现，我们将转向 Spring 的 **HibernateTemplate**。这个支持类利用了模板设计模式，该模式在整个框架中被多次使用。


    ■ **注意** 尽管这是更常用的技术之一，但基于 **HibernateTemplate** 构建 DAO 类并不是唯一的方法。我们将在本章后面研究一些替代方案。由于
    **HibernateTemplate** 已经存在多年，即使您选择替代策略，也一定会遇到一些使用它的遗留代码。


    第 6 章 ■ DAO 与查询

