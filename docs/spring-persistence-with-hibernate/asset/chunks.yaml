- fmt: "# Spring Framework 模块概述\n\n常言道，一图胜千言。图2-1描绘了Spring组件的结构。\n\n三个主要分组是核心模块、Web模块和数据访问模块。\n\
    \n*图2-1. Spring Framework 模块*\n\n本书将涉及其中许多模块。本章将带你了解核心容器和AOP。\n\n## 应用上下文（Application\
    \ Context）\n\nSpring的工作是解析你的配置文件，然后实例化受管理的类，并解决它们之间的相互依赖关系。Spring通常被称为*容器*，因为它旨在创建和管理应用程序中的所有依赖关系，作为基础上下文，通过它也可以查找Bean。这个核心引擎由一个名为`BeanFactory`的基础接口表示。\n\
    \n`BeanFactory`接口定义了Spring的核心引擎，它聚合你的Bean并将协作依赖关系连接在一起。但Spring容器的能力远不止依赖注入。它还可以用于发布事件、提供AOP功能、支持资源加载抽象、促进国际化等。对于许多这些高级功能，你需要使用`ApplicationContext`实例。\n\
    \n`ApplicationContext`扩展了`BeanFactory`接口，提供了一组更强大的功能。\n\n如果你正在构建一个非常轻量级的应用程序，并且不需要某些高级功能，这种分离会很有用。但对于大多数应用程序（尤其是服务器端软件），你会希望使用`ApplicationContext`实现。对于Web应用程序，你将使用`WebApplicationContext`。Spring附带了一个监听器，你可以将其放入`web.xml`文件中，以自动启动Spring的`ApplicationContext`并加载配置文件。只需在`web.xml`中添加以下几行即可：\n\
    \n```xml\n<listener>\n    <listener-class>\n        org.springframework.web.context.request.RequestContextListener\n\
    \    </listener-class>\n</listener>\n```\n\n这些行将确保Spring在应用程序首次启动时加载，并解析位于`WEB-INF/applicationcontext.xml`的配置文件。\n\
    \n如果你不是在构建Web应用程序，加载Spring容器也同样简单。在这种情况下，我们建议使用`ClassPathXmlApplicationContext`实现，它旨在从类路径加载Spring配置文件。调用方式如下：\n\
    \n```java\nApplicationContext context = \n    new ClassPathXmlApplicationContext(new\
    \ String[]{\"configfile1.xml\", \"configfile2.xml\"});\n```\n\n你可以看到实例化Spring容器是多么容易。一旦获得对`ApplicationContext`的引用，你就可以随意使用它。返回给你的引用是已加载的`ApplicationContext`，其中你定义的所有Bean都已实例化，依赖关系也已解决。\n\
    \n如果你愿意，可以通过调用以下代码按名称访问Bean：\n\n```java\nUsefulClass usefulClass = (UsefulClass)\
    \ context.getBean(\"myBeanName\");\n```\n\n假设你的Bean在Spring配置文件中定义（通过ID或name属性引用），Spring将为你提供准备好的类实例（意味着其所有依赖关系都已注入）。然而，我们强烈建议你尽量避免调用`getBean()`。\n\
    \nSpring的核心理念是自动依赖注入，这意味着不需要在需要时查找Bean。那是依赖查找，已经是1995年的做法了。虽然这种方法确实解耦并延迟了类依赖关系，但它仍然需要一个显式的查找步骤。作为经验法则，如果你需要引用特定的依赖关系，请在配置中指定这些细节，而不是在代码中。\n\
    \n一些开发者仅在*总是*需要类的新实例（每次调用时）的情况下依赖`getBean()`。解决此问题的更好方法是使用XML配置中的`lookup-method`属性。此属性强制Spring用始终返回指定Bean新实例的代码覆盖或实现指定方法。\n\
    \n从`ApplicationContext`访问Bean的另一种策略是实现`ApplicationContextAware`接口。该接口有以下方法：\n\n\
    ```java\nvoid setApplicationContext(ApplicationContext context);\n```\n\n通过访问Spring的`ApplicationContext`，你的类可以灵活地按名称或类型查找Bean，而无需编写直接从类路径获取`ApplicationContext`的代码。\n\
    \n在实践中，很少有需要将Spring的API如此深度集成到代码中的情况。更常见的方法是让Spring通过依赖注入动态管理Bean之间的关系。\n\n##\
    \ Bean，Bean，神奇的果实\n\nSpring Framework的一大秘诀是使用Plain Old Java Objects（POJO）。\n\n\
    Martin Fowler、Rebecca Persons和Josh MacKenzie在2000年首次提出了POJO这个术语。POJO是没有强加任何契约的对象；也就是说，它们不实现接口或扩展特定类。\n\
    \n关于JavaBean和POJO之间的区别，常常存在很多混淆。这两个术语往往可以互换使用，但这并不总是准确的。JavaBean最好被描述为一种特殊的POJO。简单来说，JavaBean是遵循三个简单约定的POJO：\n\
    \n- 它是可序列化的。\n- 它有一个公共的、默认的无参构造函数。\n- 它为每个要读取或写入的属性分别包含公共的getter和setter（通过仅定义getter而不定义setter，可以隐藏写入权限）。\n\
