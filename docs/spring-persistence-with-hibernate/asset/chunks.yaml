    the controller to which the matching request should be directed, as well as the
    corresponding action. In our category listing page example, we haven’t defined
    a **$controller** within our mapping expression, so we instead specify this explicitly,
    as follows: **(controller: CategoryController,action: " displayCategory")** Now
    that we’ve looked at the Grails application directory structure, let’s move on
    to defining our Grails domain model.


    CHAPTER 11 ■ GORM AND GRAILS


    Defining the Grails Domain Model


    By default, Grails generates three core layers, which resemble the tiers we’ve
    discussed earlier in this book: domain, controller, and service. To provide consistency
    and better enforce convention, Grails enforces a directory structure to help organize
    and sequester classes from each respective layer. The domain model typically serves
    as the foundation for a Grails application, so it is usually the first layer to
    be defined.


    As you probably already guessed, the domain model classes all go into the **grails-app/domain**
    directory. By default, all domain classes will live in the default Grails package.
    However, you are free to define your own package structure, and for larger applications,
    this is recommended. Additionally, if you will need to access any of your Grails
    code from Java, you must keep your Grails classes within a package, or it will
    be difficult to access them outside the Grails/Groovy world. You can also have
    your Groovy classes implement an interface that is accessible to Java, as a means
    to better integrate your Grails code with Java.


    Let’s begin our Grails-based gallery application by defining our **Person** domain
    entity. Grails provides scripts to help create most of the core Grails archetypes,
    each corresponding to a particular template. You can edit these templates if you
    want to change the way your default views or domain and service classes are created.
    To do this, you will need to run **grails install-templates**. You will then be
    able to access (and modify) the templates from within the **src/templates** directory.
    For most Grails development, the default templates are just fine.


    To create our **Person** domain class, run the following:


    **grails create-domain-class Person**


    Once this script completes, you will find a **Person.groovy** class within the
    **grails-app/domain** directory. Grails uses Hibernate behind the scenes to persist
    **Person** instances to, and retrieve them from, the database. Unlike Hibernate,
    Grails does not require any mapping files or annotations , since convention helps
    Grails infer most of what it needs to handle persistence for your domain model.


    Now that we’ve created our stub for our **Person** domain entity, let’s define
    the rest of the properties: **class Person {**


    ****String firstName;**


    **String lastName;**


    **String username;**


    **String password;**


    **String email;**


    ****Integer roleLevel;**


    ****public static final USER_ROLE = 1;**


    **public static final ADMIN_ROLE = 2;**


    **public static final SUPERUSER_ROLE = 4;**


    **public static final CONTACT_USER = 16;**


    **public static final COMMENT_USER = 64;**


    ****static constrants = {**


    **firstName(maxSize:255, unique: false, blank: false)**


    CHAPTER 11 ■ GORM AND GRAILS


    **lastName(maxSize:255, unique: false, blank: false)**


    **username(maxSize:255, unique: true, blank: false)**


    **password(maxSize:25, unique: false, blank: false)**


    **email(email:true, blank: false, unique: false)**


    **roleLevel()**


    **}**


    ****static mapping = {**


    **cache true**


    **}**


    ****}**


    The first thing you will probably notice in this class is just how concise this
    code is. Most of the properties should be self-explanatory. Since we are using
    Groovy, there is no need to define getters or setters (these are implicit within
    Groovy). Also notice that there are no properties specified for **id** or **version**;
    these fields are created by Grails automatically.


    Adding Constraints and Validation


    Let’s now look at the **constraints** block. Constraints allow you to better define
    each field within your domain model, providing clues and requirements to Grails
    as to how your database schema should be modeled. A number of constraint options
    are available, but here are some of the most useful:


    • **blank**


    • **minSize**


    • **maxSize**


    • **range**


    • **unique**


    • **size**


    • **range**


    • **inList**


    • **email**


    • **creditCard**


    • **matches**


    • **nullable**


    Some of these constraints can be extremely powerful. For example, the **matches**
    constraint allows you to specify a regular expression that will be used to validate
    the value in the specified field, ensuring it matches the specified regular expression.


    The domain-specific constraints, such as **email** and **creditCard**, will help
    to ensure that a field conforms to a valid e-mail address or credit card number,
    respectively.


    CHAPTER 11 ■ GORM AND GRAILS


    If you need a custom constraint, Groovy includes a construct that allows you to
    define your own.


    You specify the property, followed by a mapping of constraint types and their
    corresponding values.


    Here is an example:


    **username(blank: false, maxSize: 255, unique: true)**


    This will ensure that the **username** value cannot be left blank and that the
    database field has a maximum size of 255 characters. Additionally, a **unique**
    constraint will also be added to the **username** database field.


    Constraints come into play when you attempt to save a domain entity to the database.
    If a particular field is not validated, an error will be attached to a dynamic
    **errors** property on your domain instance.'
