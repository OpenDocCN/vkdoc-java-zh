    外部化属性配置


    此配置定义了一个 **PropertyPlaceholderConfigurer**，它允许你将某些设置外部化到 Spring 配置文件之外的属性文件中。


    **<context:property-placeholder**


    **location="classpath*:META-INF/spring/*.properties"/>** **property-placeholder**
    将自动定位并解析你在类路径下 **META-INF/spring** 目录中的任何属性文件。任何你想要替换的属性都应在 Spring 配置中这样指示：**${propertyKey}**。在本章后面配置图库应用程序的数据源时，你将看到一个完整的示例。


