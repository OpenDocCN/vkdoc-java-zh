    **def catName1 = "autumnPicts"**


    **def catName2 = "summerPicts"**


    **def results = criteria.list {**


    **between(''displayDate'', earlierDate, currentDate)**


    **categories {**


    **or {**


    **equals("name", catName1)**


    **equals("name", catName2)**


    **}**


    **}**


    **}**


    第 11 章 ■ GORM 与 GRAILS


    上述示例使用了 Grails Criteria Builder，使我们能够以一种非常直观的方式表达一组相当复杂的限制条件。如果你还记得标准的 Hibernate
    Criteria API，应该就能推断出示例中大部分操作的含义。Criteria 的析取（disjunction）和合取（conjunction）可以分别通过
    **or** 和 **and** 块来指定。类似地，关联条件可以通过定义一个以关联名称命名的块来表达，这就是我们示例中 **categories** 块的作用。在我们的
    **categories** 块内部，嵌套了一个 **or** 析取块，而该块内部则是我们的 **equals** 限制条件，用于过滤出那些匹配我们指定的任一类别名称的类别。

