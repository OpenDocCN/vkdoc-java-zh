    Import Statements


    After the **property-placeholder** configurer, you’ll notice that we specify an
    **import** statement:


    **<import resource="spring-datasource.xml"/>**


    Imports allow you to specify an external Spring configuration file to be integrated
    into your application context. This is a useful construct, especially in our demonstration
    application, as we can easily externalize the different persistence strategies,
    keeping each version in its own file. These imports can also reference your application
    classpath with the following syntax:


    **<import resource="classpath*:spring-config-name.xml"/>** Imports are invaluable
    when you’re dealing with large application contexts, as they provide a great deal
    of flexibility for organizing your bean definitions. You can partition your application
    in any number 39


    CHAPTER 3 ■ BASIC APPLICATION SETUP


    of ways to make it more approachable by new developers and to help understand
    how the project changes over time.


    Database Integration


    Now that you have a clearer picture of how Spring is bootstrapped within your
    application, let’s get back to integrating your database of choice. You’ve learned
    that Spring’s adherence to interface-based concepts helps to take implementation
    choices out of your code and into configuration. So, whether you choose to use
    a Java Naming and Directory Interface (JNDI) factory bean to pull in a database
    reference from an external JNDI directory or configure a specific database driver
    directly, your code won’t be affected one bit. In the end, you’ll always end up
    with a JDBC **DataSource**, and that’s all your code needs to care about.


    JDBC Support


    In our example, we’ll keep things simple. Let’s start off by defining a Spring
    bean that will create a JDBC


    **DataSource** instance:


    **<bean id="galleryDataSource"**


    **class="org.springframework.jdbc.datasource.DriverManagerDataSource">** **p:driverClassName="${jdbc.driverClassName}"**


    **p:url="${jdbc.url}"**


    **p:username="${jdbc.username}"**


    **p:password="${jdbc.password}"/>**


    **</bean>**


    If we wanted to get a bit fancier, we could instead choose a popular database
    connection pool as our bean implementation. A connection pool is ideal for web
    applications that require multiple concurrent database operations. A connection
    pool can be optimized for different usage scenarios, ensuring a more efficient
    means for handing off new database connections to the application. Again, switching
    to a database connection pool will give your application more efficiency without
    requiring any code changes.


    ■ **Note** Connection pools used to be something that developers had to write
    on their own. Their use is actually a fun gauge to use to see how long engineers
    have been writing web applications in Java. If they’ve written their own connection
    pools, they’ve probably been at it for a long while. As a result of needing to
    roll their own pools, every open source project wound up with a unique implementation
    of a connection pool. Fortunately, all of the projects that are part of the Apache
    Software Foundation came together to create the **commons-dbcp** library (**dbcp**
    is short for database connection pool).


    Notice in the configuration that follows how easily we switch to using a connection
    pool. This is made possible by coding to interfaces, externalizing configuration,
    and leveraging dependency injection. It’s a really rewarding experience to be
    able to make such large changes so quickly and easily.


    CHAPTER 3 ■ BASIC APPLICATION SETUP


    **<bean id="galleryDataSource"**


    **class="org.apache.commons.dbcp.BasicDataSource">** **p:driverClassName="${jdbc.driverClassName}"**


    **p:url="${jdbc.url}"**


    **p:username="${jdbc.username}"**


    **p:password="${jdbc.password}"/>**


    **</bean>**


    You may have noticed that the **id** for our **DataSource** bean is **galleryDataSource**.
    In most enterprise applications, you end up with several datasources. As a result,
    the best approach is to give each one a unique name so you have finer-grained
    control over which portions of your application use which datasource.


    Also notice that we have specified properties for **driverClassName**, **url**,
    **username**, and **password** for our **datasource** bean. These properties determine
    how an application connects to a given database.


    Within the Spring configuration, we can use placeholder references through the
    **${}** notation. These placeholders represent external values stored in our **jdbc.properties**
    file, injected into our configuration file, courtesy of our **PropertyPlaceholderConfigurer**.
    This detail isn’t necessary, but it makes our configuration more portable. It
    allows us to easily define different database configurations for different machines
    and platforms without needing to change our Spring configuration. For instance,
    here is a snippet of our **src/main/resources/META-INF/spring/jdbc.properties**
    file: **jdbc.url=jdbc\:h2\:mem\:prosh;DB_CLOSE_DELAY\=-1**


    **jdbc.driverClassName=org.h2.Driver**


    **jdbc.username=sa**


    **jdbc.password=**


    The syntax is intuitive. Each line contains a simple expression, in which the
    left side represents the property name and the right side (after the **=**) represents
    the configured value. This externalization makes it easy to swap different database
    configurations for different environments and better externalizes these details
    from application-specific configuration.


    Different databases will require different JDBC URLs. In this example, we use
    the popular H2


    database. H2 is a Java-based database and is therefore easy to integrate into
    any Java-based application (it doesn’t require a separate database process). You
    could just as easily use PostgreSQL, MySQL, or any database for which a JDBC driver
    is available. Just make sure your database is up, running, and configured to listen
    on the URL specified in the bean’s configuration.


    It is also critical that you include the appropriate JDBC driver on your classpath
    when the application is first started. Because H2 is Java-based, simply including
    the H2 JAR file on your classpath is all that is required to get rolling.


    Integration with JNDI


    Hibernate almost always implies a relational database, so starting there makes
    the most sense. Java has evolved into a platform for building enterprise-level
    applications, so there are many options for connecting it to a standard relational
    database.


    At the simplest level, you can instantiate the database driver for your database
    of choice, but most applications require more than that. Many application servers
    offer their own optimized database connection pools to improve performance when
    multiple clients are using the application concurrently.


    To simplify administration and integration, many application servers use JNDI
    to interface with a database.


