- fmt: "# One of the really interesting details here is that even though we are invoking\
    \ a Lucene query, we are working with entities at the JPA level. This means that\
    \ we don’t need to worry about correlating the results of a Lucene query to load\
    \ a series of JPA entities. `Hibernate Search` takes care of these details for\
    \ us, providing a very powerful abstraction over Lucene to simulate a completely\
    \ Hibernate or JPA-centric world.\n\n## Summary\n\nIn this chapter, we’ve demonstrated\
    \ how to integrate and extend Hibernate in order to implement more advanced application\
    \ features. We discussed some of the challenges with exposing RESTful web services\
    \ on Hibernate-powered applications, and how to simplify a serialization or marshaling\
    \ strategy. We examined Spring 3’s new MVC capabilities, as well as its OXM abstraction\
    \ for providing object-to-XML marshaling.\n\nWe also discussed the DTO pattern,\
    \ and how this strategy can reduce the complexities of serializing your domain\
    \ model. However, translating a domain class to a DTO class (and back again) can\
    \ be a source of defects and maintenance problems. One solution is to use a framework\
    \ like `Dozer`. `Dozer` handles the mapping between two different classes, using\
    \ convention over configuration and mapping configuration files. By abstracting\
    \ these translation details to a specialized framework, the complexities inherent\
    \ in a DTO mapping layer are significantly reduced.\n\nProviding full-text search\
    \ capability is a very important and common requirement for many applications.\
    \ `Lucene` is an open source Java framework that offers powerful indexing and\
    \ search capability, but can be difficult to integrate into an application without\
    \ requiring significant glue code to sync changes to the domain model with the\
    \ Lucene index. `Hibernate Search` is a framework that bridges the gap between\
    \ these two excellent frameworks, enhancing key Hibernate framework classes to\
    \ offer Lucene querying and indexing capabilities. `Hibernate Search` allows developers\
    \ to execute Lucene queries within the realm of Hibernate, so that search results\
    \ return standard Hibernate entities.\n\n## CHAPTER 10 ■ INTEGRATION FRAMEWORKS\n\
    \nSpring and Hibernate are amazing open source frameworks. However, building upon\
    \ the foundations of these tools is the key to successful application development.\
    \ Learning best practices for integrating your persistence tier with other frameworks\
    \ is as important as learning the persistence framework itself.\n\n## CHAPTER\
    \ 11 ■ GORM and Grails\n\nGORM is the end result of the synergistic combination\
    \ of Spring, Hibernate, and Groovy. Built as one of the core components of Grails—a\
    \ rapid development web framework influenced by Ruby on Rails—GORM is a different\
    \ kind of ORM layer that leverages the dynamic capabilities of the Groovy language\
    \ to simplify querying and persisting an application’s domain model.\n\nAt the\
    \ foundation of GORM lies the same strategy responsible for Ruby on Rails’ success:\
    \ *convention over configuration*. GORM drastically simplifies the amount of coding\
    \ and effort required to define your application’s persistence logic. With GORM\
    \ and Grails, there is no need to define a DAO layer. Instead, the *Active Record*\
    \ design pattern is employed, consolidating persistence functionality into the\
    \ domain class itself without requiring up-front development to add these features.\
    \ This may seem a bit like magic, but this chapter will help you understand how\
    \ GORM works under the hood, by tapping into the dynamic features of Groovy.\n\
    \nAlthough GORM is the core persistence component within the Grails web framework,\
    \ it can also be used outside Grails. By embedding GORM within a Spring application,\
    \ you can benefit from the efficiency and terseness of Grails within a more standard\
    \ architecture.\n\n> **Note** Some may argue that Grails does not quite fit into\
    \ a book about Spring and Hibernate. However, the Grails framework and GORM rely\
    \ heavily on both Spring and Hibernate for much of the flexibility and persistence\
    \ they afford. The benefits of this partnership are the longevity, enterprise\
    \ strength, efficiency, and flexibility offered by Spring and Hibernate. Furthermore,\
    \ SpringSource, the company behind the Spring Framework, recently acquired G2One,\
    \ the company behind much of the Grails and Groovy development, demonstrating\
    \ a clear alignment and dedication to Spring and Grails.\n\n### A Crash Course\
    \ in Groovy\n\nGrails and GORM came onto the scene as a result of the attention\
    \ brought about by the success of the Ruby on Rails framework. Ruby on Rails took\
    \ the mantras of “convention over configuration” and “don’t repeat yourself (DRY)”\
    \ to a new level, significantly simplifying the effort required to create a new\
