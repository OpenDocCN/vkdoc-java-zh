    xiv


    **前言**


    自诞生以来，Spring 框架逐渐改变了 Java 社区中应用程序开发的规则。本书是开发者的理想指南和教学伴侣，适合那些有兴趣学习 Spring 框架，以及如何利用它结合当今最流行的
    Java 持久化框架之一 Hibernate 来构建持久化驱动应用程序的开发者。《*Spring 与 Hibernate 持久化*》将带你入门 Spring
    的基本概念，以及将持久化集成到应用程序中的成熟设计模式。

