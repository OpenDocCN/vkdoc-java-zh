    some content related to this book), you could issue an HTTP **PUT** request targeting
    the URL **http://api.apress.com/book/978-1430226323**, passing in the updated
    state of the resource.


    Here, we’ll focus on the features provided by Spring that simplify developing
    RESTful APIs. Before we can tackle our Spring implementation though, we need to
    settle on a serialization strategy. In order to transmit a rich domain model over
    the wire, we need to be able to flatten our object graph so that it can be serialized
    and represented as XML or JSON.


    Serializing the Object Graph


    Despite the simplicity inherent in RESTful architectures, a challenge remains
    in the way in which your domain model is serialized into whatever format your
    web service chooses to provide. For instance, if you choose to represent your
    data as XML, there are numerous frameworks and techniques for converting an object-oriented
    domain model into XML. No matter which you choose to marshal your domain object,
    you will likely run into the problem of serializing too much of your object graph.
    This is a side effect of another type of impedance mismatch between the object-oriented
    Java realm and the flat, text-based realm of XML and JSON.


    In Chapter 9, you learned about the benefits and drawbacks of lazy loading. When
    it comes to marshaling your data, lazy loading can flare up again, if you’re not
    careful and attempt to marshal your domain entities after your **EntityManager**
    has already been closed. However, even if the **EntityManager** 157


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    remains open, you are bound to initialize your object graph as the marshaling
    process attempts to serialize your data to the specified payload format.


    Unfortunately, this is a difficult problem to solve. One solution is to plug in
    a specialized framework, designed to prevent the **LazyInitializationException**
    from popping up or too much data being inadvertently marshaled. One such solution
    is a framework called Gilead. Gilead attempts to clone your domain entities into
    a new instance in which Hibernate proxies have been filtered out. This prevents
    the potential for **LazyInitializationException** occurrences, as well as the
    likelihood of loading your entire object graph, which causes serious database
    overhead and performance implications.


    The problem with “nulling out” all of an entity’s associations so that it can
    be serialized into a more compact and efficient format is that if this data is
    read back into the application and reattached to an **EntityManager**, these nulled-out
    associations will cause Hibernate to remove important data, such as dropping collections
    on a particular entity. Gilead provides several strategies for what it calls the
    *merging process*, in which data returned to the Hibernate application is reassembled
    back into the original structure. One solution attempts to keep these details
    in the **HttpSession**, which requires the least intrusion into your application
    code, but can also come with performance and scalability penalties.


    Another strategy requires that your domain model extend from a base class provided
    by Gilead. Gilead then uses this base class as a means to stash the information
    required to merge the lightweight marshaled data back into the Hibernate application.
    You can learn more about Gilead at **http://noon.gilead.free.fr/gilead/**.


    Using the Dreaded DTO Pattern


    The Data Transfer Object (DTO) pattern is considered by many to be a “bad idea.”
    This is because it has the potential to add significant code redundancy and complexity,
    leading to a higher potential for bugs and maintenance overhead down the road.
    However, there are times when the DTO pattern can serve as a viable solution,
    and dealing with marshaling your domain model is arguably one of those times.


    The DTO pattern typically requires the creation of specialized classes intended
    solely for transferring your domain objects’ data. Usually, you will create a
    separate package structure to help avoid confusion. Your DTO classes will likely
    be smaller and more compact than your domain objects, often replacing object references
    with a simple identifier, and possibly removing associations altogether.


    Obviously, the specifics of your DTO layer depend on your application’s unique
    requirements. However, because your DTO classes have no dependency on Hibernate,
    are more compact, and have far less potential for circular references, they can
    help simplify the effort required by a marshaling strategy.


    The primary concern raised when using DTOs is that you need to write a lot of
    custom code to translate from one class hierarchy to another (from your domain
    model to your DTOs and back). Not only does this translation effort require a
    lot of up-front development time, but it can also lead to bugs, especially if
    your domain classes are changed but your DTO translation code isn’t updated accordingly.


    One solution to this problem is Dozer. Dozer is a different type of mapping framework.
    Unlike Hibernate, Dozer doesn’t attempt to map Java classes to a relational database.
    Dozer maps Java classes to other Java classes, and it is designed especially for
    the domain model-to-DTO translation requirements.


    The chief advantage of a framework like Dozer is that it offloads the complex
    implementation details of converting one class to another. Dozer is able to make
    some intelligent determinations regarding how two classes relate. For instance,
    if two classes that are intended to be mapped to one another share properties
    with the same name, Dozer will attempt to automatically map these properties,
    unless it is told otherwise. Dozer is also able to handle conversion between types,
    so even if mapped properties are not of the same type, Dozer will attempt to convert
    from one type to another using one of its built-in converters. It is also possible
    to create your own converters, if you can’t find an applicable converter. However,
    Dozer supports nested mapping behavior, so if you define the mapping behavior
    between two classes, these rules will be applied at any level of conversion. In
    other words, even if you are 158


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    attempting to map two different top-level classes, Dozer will apply the mapping
    rules for any other defined classes as necessary. This holds true even for nested
    properties and collections. When Dozer is confronted with a mappable scenario,
    it will apply these rules automatically. These details are much clearer when examining
    a few examples, so let’s begin integrating Dozer into our art gallery application.


    Bootstrapping Dozer


    To begin using Dozer, we first need to add the necessary dependencies to our Maven
    **pom.xml** file:


    **<!--Dozer -->**


    **<dependency>**


    **<groupId>net.sf.dozer</groupId>**


    **<artifactId>dozer</artifactId>**


    **<version>5.2.2</version>**


    **</dependency>**


    This will provide all the necessary JARs required for Dozer integration. Once
    this snippet is added to your **pom.xml**, you will likely need to run **mvn install**
    in order to download the necessary dependencies into your local Maven repository.


    Building the DTO Layer


    Before we can go any further, we need to define our DTO classes. Typically, DTOs
    are similar to their corresponding domain classes, but are simpler in nature.
    By removing bidirectional associations, circular references, and unnecessary properties,
    a DTO class can reduce the complexity in a marshaling strategy or a remoting implementation.


    Let’s define our **ArtEntityDTO** class:


    **package com.prospringhibernate.gallery.dto;**


    ****import java.net.URL;**


    **import java.util.Date;**


    **import java.util.HashSet;**


    **import java.util.Set;**


    **import javax.xml.bind.annotation.XmlElement;**


    **import javax.xml.bind.annotation.XmlRootElement;**


    ****@XmlRootElement(name = "artEntity")**'
