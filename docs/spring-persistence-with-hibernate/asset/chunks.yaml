    Next, let’s define a **saveArtEntity** method that takes an **ArtEntity** parameter,
    which encapsuates information about our image as well as the image data itself.
    (Again, keep in mind that this is a simplification of our actual **ArtEntityDao**
    interface and domain entity.) Our **saveArtEntity** method might look like the
    following:


    **public void saveArtEntity(ArtEntity artEntity) throws DataAccessException {**


    **this.getHibernateTemplate().saveOrUpdate(artEntity);**


    **}**


    Understanding the Benefits of the Criteria API


    Although HQL and JPQL are effective and concise strategies for expressing a query,
    they both suffer from a few limitations. First, because these query languages
    are articulated as plain text, they are prone to errors which are unable to be
    caught or verified by the compiler. Methods containing significant errors in the
    HQL or JPQL queries will compile perfectly, only to throw exceptions at runtime
    — or perform in unexpected ways.


    HQL and JPQL are also not conducive to expressing dynamic queries, in which the
    attributes of the query are not fully known until runtime. For instance, if we
    would like our users to be able to search for images by specifying any number
    of tags, it would be difficult to represent this sort of query using HQL


    or JPQL. To accomplish this, we might try dynamically generating a JPQL query
    string by concatenating the conditions of each tag parameter. Clearly, this is
    a fragile and awkward solution to this problem.


    To address these limitations, Hibernate offers the Criteria API. Until recently,
    JPA did not include a Criteria API, forcing developers that needed this type of
    functionality to go outside of the JPA standard.


    However, with the release of JPA 2.0, a standards-based Criteria API is now available.


    CHAPTER 6 ■ DAOS AND QUERYING


    Using the JPA 2.0 Criteria API


    We’ve focused more on Hibernate-specific querying, so let’s examine the new JPA
    2.0 Criteria API. To illustrate the Criteria API, we will define a new DAO method
    for our **CategoryDao** interface: **public List<ArtEntity> getArtEntitiesByTitle(String
    title);**


    This method will return all those **ArtEntity** instances that match the specified
    title. Obviously, we could express this query using JPQL, however the Criteria
    API offers some advantages. One of the primary benefits is that we can leverage
    compile-time checking to ensure that our query is valid and fits within the constraints
    of our domain model. Later in this section, we will also examine some other advantages
    of the Criteria API, such as applying dynamic constraints on our query, including
    pagination, filtering, and ordering details.


    First, let’s take a look at our query:


    **public List<ArtEntity> getArtEntitiesByTitle(String title) {**


    **CriteriaBuilder criteriaBuilder = entityManager.getCriteriaBuilder();** **CriteriaQuery<ArtEntity>
    criteriaQuery =**


    **criteriaBuilder.createQuery(ArtEntity.class);**


    **Root<ArtEntity> root = criteriaQuery.from(ArtEntity.class);** **Path<String>
    path = root.<String>get("title");** **criteriaQuery.where(criteriaBuilder.equal(path,
    title));**


    **return entityManager.createQuery(criteriaQuery).getResultList();**


    **}**


    If you consider the structure of a JPQL query, then you should be able to infer
    what the above method is doing. The first line gets a reference to a **CriteriaBuilder**.
    The **CriteriaBuilder** class is necessary for generating important aspects of
    our Criteria query, as we will see shortly. The next line then uses our **CriteriaBuilder**
    reference to create a **CriteriaQuery** instance. Notice that we pass **ArtEntity.class**
    as the single parameter to the **createQuery** method. We are essentially requesting
    that we would like a generically typed **CriteriaQuery** instance, using our **ArtEntity**
    type. Our intention in doing this is to specify that we want our query to return
    results of type **ArtEntity**. This doesn’t necessarily imply that we are querying
    against an **ArtEntity** instance. In fact, we could specify a type of **Long.class**
    to the **createQuery** method, to indicate that our query should return a **Long**,
    which is typical when performing projection or aggregate queries.


    Now that we have our **CriteriaQuery** instance, we need to declare what type
    we intend to query against. We call the **from** method on our **CriteriaQuery**
    instance, specifying a parameter of **ArtEntity**.


    This line of code in our example is similar to a JPQL clause that reads: **“from
    ArtEntity”** . In other words, we are expressing our intention to query against
    the **ArtEntity type**. We are returned a **Root** instance as a result of this
    method call, which is generically typed to our **ArtEntity** instance. The **Root**
    instance can now be used as a means for referencing properties on the **ArtEntity**
    class that we wish to use as conditions in our query.


    The next line in our method uses our **Root** instance to access the title field
    on our **ArtEntity** domain class, by calling the **get** method on the **Root**
    instance and specifying the string **“title”** (which is the appropriate property
    name on the **ArtEntity** class). This returns a **Path** instance, which we can
    use to represent the title property, in order to express a condition in our query.
    To express this condition, we call the **where** method on our **CriteriaQuery**
    instance. Notice that as a parameter to the **where** method, we have used a nested
    method call of **criteriaBuilder.equal(path, title)**. We use the **criteriaBuilder**
    as a factory to construct the **equal** condition, which returns a **Predicate**
    instance. Predicates represent encapsulated logic that will return either true
    or false, and are used as building blocks in the Criteria API 99


    CHAPTER 6 ■ DAOS AND QUERYING


    to form complex queries. In our case, we have created a **Predicate** to represent
    the comparison logic between the **Path** instance (which represents our **ArtEntity.title**
    field) and the **String** title parameter, that was passed in to this method.


    Now that we’ve articulated the requirements and conditions for our **CriteriaQuery**,
    we need to actually execute our query so that we can access the results. This
    part of the method works in a similar fashion to executing a JPQL query. We invoke
    **createQuery** on our **EntityManager** reference, passing in our **CriteriaQuery**
    instance. The **createQuery** method will actually return a **TypedQuery** instance
    that is generically typed to our **ArtEntity** domain class. However, to keep
    our method streamlined, we call **getResultList()** on the method chain to directly
    return a **List** of **ArtEntity** instances that match our query’s conditions.


    You’re probably thinking that the above example required quite a bit of work to
    define a query that might be defined in JPQL as:


    **public List<ArtEntity> getArtEntitiesByTitle(String title) {**


    **Query query = this.entityManager.createQuery(**


    **"select art from ArtEntity where art.title = :title "**


    **);**


    **query.setParameter("title", title);**


    **return query.getResultList();**


    **}**'
