    popular for implementing web services. REST is best described as an architectural
    style, rather than a standard or protocol. REST leverages HTTP to provide a consistent,
    resource-oriented approach for representing data. As opposed to a remote procedure
    call (RPC) style of communication, in which the metaphor is more akin to a method
    call, REST focuses on the representation of a particular resource, which is typically
    embodied as a URL. RESTful APIs leverage many of the built-in features of the
    Web, such as caching, proxying, and HTTP-based authentication strategies.


