    乍一看，**ArtEntityDTO** 与 **ArtEntity** 领域类非常相似。然而，仔细检查后，你会发现我们移除了一些引用。我们不再依赖于 **ArtData**
    层级结构中的任何类。相反，我们将对特定 **ArtData** 子类的引用替换为一个 **String**，该字符串将包含相关图片的 URL（而不是一个包含图片元数据和二进制图片数据本身的包装类）。


    **ArtEntityDTO** 还省略了与 **Category** 领域类的多对多关联。这意味着我们将无法直接访问特定 **ArtEntity** 实例的关联类别。在我们的应用中，这并非关键需求。我们可以通过直接访问
    **Category** 实例并导航到其子 **ArtEntity** 实例，来访问与特定 **Category** 关联的 **ArtEntity** 实例。

