    现在你已经了解了如何接入 Spring 中的创建和销毁生命周期事件，在构建企业级应用时，Bean 管理的另一个关键方面是：Bean 作用域。


    理解 Bean 作用域


    默认情况下，Spring 中定义的 Bean 都是单例作用域。*单例* 是一个保证在 JVM 中只有一个实例的类。单例非常适合存储应用程序状态，或者在任何你希望确保应用程序中只有一个引用的场景下使用。通常，你需要编写代码来实现这种保证。


    典型的单例满足以下条件：


    • 有一个静态方法用于返回该类的唯一实例（作为类内部的静态引用存储）


    • 有一个私有构造函数，确保只有单例本身才能创建新实例（这可以保证你不会仅仅通过调用 **new Singleton()** 而意外创建多个实例）


    应用程序中的单例可能如下所示：


    **public class Singleton {**


    **private static final Singleton INSTANCE = new Singleton();**


    **private Singleton() {**


    **}**


    **public static Singleton getInstance() {**


    **return INSTANCE;**


    **}**


    **}**


    第 2 章 ■ Spring 基础


    尽管上面的示例展示了一种有用的设计模式，但 Spring 消除了编写这些样板代码的需要，再次允许你将这些细节移到配置中。默认情况下，所有 Spring Bean
    都是单例的。如果这不是你的意图，你需要为你的 Bean 指定一个不同的作用域。


    在 Spring 1.*x* 中，Bean 要么是原型 Bean，要么是单例 Bean。*原型* 意味着每次调用 **getBean()** 都会返回一个全新的
    Bean 实例。单例 Bean 保证在整个 Spring **ApplicationContext** 中，你的类只能有一个实例。Spring 2.*x*
    引入了几个新的标准作用域，以及定义自定义作用域的能力。Spring 3.*x* 添加了一个线程作用域，尽管默认情况下未注册。表 2-1 列出了 Spring
    开箱即用提供的 Bean 作用域。


    *表 2-1. Spring Bean 作用域*


    **作用域 描述**


    Singleton（单例）


    将单个 Bean 定义限定为每个 Spring IoC 容器对应一个对象实例。这是默认作用域。


    Prototype（原型）


    将单个 Bean 定义限定为任意数量的对象实例。


    Request（请求）


    将单个 Bean 定义限定为单个 HTTP 请求的生命周期；也就是说，每个 HTTP 请求都拥有基于单个 Bean 定义创建的自己的 Bean 实例。此作用域仅在支持
    Web 的 Spring **ApplicationContext** 上下文中有效。


    Session（会话）


    将单个 Bean 定义限定为 HTTP 会话的生命周期。此作用域仅在支持 Web 的 Spring **ApplicationContext** 上下文中有效。


    Global session（全局会话）


    将单个 Bean 定义限定为全局 HTTP 会话的生命周期。此作用域仅在支持 Web 的 Spring **ApplicationContext** 上下文中有效，并且通常仅在
    Portlet 上下文中有效。


    Simple thread（简单线程）


    如果由于某种原因，请求、会话或全局会话作用域不能满足你的需求，你可以启用简单线程作用域，将 Bean 定义绑定到 **ThreadLocal** 实例。


    现在你已经知道如何在 Spring **ApplicationContext** 中创建 Bean 并管理它们的作用域和生命周期。下一个关键问题是如何在你的应用程序中从
    Spring 容器中检索这些 Bean。


    第 2 章 ■ Spring 基础


    依赖注入与控制反转


    企业级应用程序由许多提供行为以模拟业务流程的对象组成。为了管理面向对象应用程序中对象之间的关系，出现了两种非常重要的设计模式：


    *依赖注入 (DI)*：采用依赖注入的类通过构造函数参数、工厂方法参数或公共修改器（也称为 *setter*）来指定它们与之交互的对象。对于像 Spring
    这样的依赖注入容器或框架，将简单的类属性外部化仅仅是个开始。开发人员可以创建复杂的依赖关系树，将如何创建和设置（也称为 *注入* 或 *装配*）每个依赖关系的工作留给
    Spring 轻量级容器。


    *控制反转 (IoC)*：当对象定位或实例化不再是给定 Bean 的责任，而是留给框架时，控制权就被*反转*了。这种控制反转是一个非常强大的概念，代表了 Spring
    框架的基础。


    依赖注入和控制反转引导你走向一条通往体现高内聚和低耦合的清晰代码的道路。


    基于 Setter 的依赖注入


    尽管简单得令人难以置信，但 Spring 使用 POJO 作为配置和集成手段的方式非常强大。考虑一个虚构的 **User** Bean 示例，它可以在应用程序中用于指定用户凭证信息：


