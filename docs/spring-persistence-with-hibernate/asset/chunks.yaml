    每个 **DispatcherServlet** 实例都拥有自己的命名空间，通常被称为*子应用上下文*。这意味着每个 **DispatcherServlet**
    都有其自己的 **ApplicationContext**，但它们都共享根应用上下文。简而言之，这意味着在一个 **DispatcherServlet**
    的 **ApplicationContext** 中定义的 Spring Bean 可以引用根 **ApplicationContext** 中的 Bean，但反之则不行。这也意味着不同的
    **DispatcherServlet** 实例不能共享它们的 Bean 定义。


    ■ **注意** 每个 **DispatcherServlet** 所使用的 **ApplicationContext** 在技术上是 Spring 的 **WebApplicationContext**
    接口的一个实现。**WebApplicationContext** 在通用的 **ApplicationContext** 接口上增加了一个 **getServletContext**
    方法。它还定义了一个众所周知的应用程序属性名称，根上下文必须在引导过程中绑定到该名称上。


    让我们再看一下我们的 **galleryDispatcher** Servlet 定义。就像我们的数据源一样，我们为每个配置的 **DispatcherServlet**
    赋予一个唯一的名称，因为我们预计最终会有多个这样的 Servlet。


    **<servlet>**


    **<servlet-name>galleryDispatcher</servlet-name>**


    **<servlet-class>**


    **org.springframework.web.servlet.DispatcherServlet**


    **</servlet-class>**


    **<init-param>**


    **<param-name>contextConfigLocation</param-name>** 44


    第 3 章 ■ 基本应用程序设置


    **<param-value>**


    **WEB-INF/spring/spring-master-web.xml**


    **</param-value>**


    **</init-param>**


    **<load-on-startup>1</load-on-startup>**


    **</servlet>**


    该 Servlet 定义了一个名为 **contextConfigLocation** 的 **init-param**，它为 Servlet 提供了获取和实例化其
    Spring Bean 配置所需的所有信息。并且，**spring-master-web.xml** 中的 Bean 可以安全地引用在 **spring-master.xml**
    及其后续导入中定义的 **ApplicationContext** 中的 Bean。


    然而，这个 **ApplicationContext** 层次结构有一个很大的例外：**BeanFactoryPostProcessor** 接口及其兄弟接口
    **BeanPostProcessor** 的实现仅适用于定义它们的 **BeanFactory**。本章前面描述的 **PropertyPlaceholderConfigurer**
    类就是这样一个例子。这意味着，除了已经在 **spring-master.xml** 根应用上下文中定义的一个属性占位符之外，你还需要为每个 **DispatcherServlet**
    再定义一个属性占位符。


    最后，我们指示应用程序容器将所有以 **/art/** 开头的请求映射到这个 **galleryDispatcher**：


    **<servlet-mapping>**


    **<servlet-name>galleryDispatcher</servlet-name>**


    **<url-pattern>/art/*</url-pattern>**


    **</servlet-mapping>**


    有了这个配置，一个对 **/art/foo** 的模拟请求将被映射到 **galleryDispatcher**，然后该 Servlet 会将请求路由到适当的
    Spring MVC 控制器。


    Spring MVC


    从 Spring 3.0 开始，引导 Spring MVC 变得异常简单。以下是 **src/main/webapp/WEB-INF/spring/spring-master-web.xml**
    的内容，它是 **galleryDispatcher** Servlet 背后的配置文件。


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<beans**


    ********xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**
    **http://www.springframework.org/schema/context**


    **http://www.springframework.org/schema/context/spring-context-3.0.xsd** **http://www.springframework.org/schema/mvc**


    **http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd">**


    ****<context:component-scan base-package="com.prospringhibernate"**


    **use-defaultfilters="false">**


    **<context:include-filter type="annotation"**


    **expression="org.springframework.stereotype.Controller"/>**


    **</context:component-scan>**


    第 3 章 ■ 基本应用程序设置


    ****<mvc:annotation-driven/>**


    ****<!-- 选择一个静态视图进行渲染，无需显式控制器 -->**


    **<mvc:view-controller path="/index.jsp"/>**


    ****</beans>**


    我们在这个 **WebApplicationContext** 中再次使用了 Spring 的组件扫描。这次，我们指定了一个 **include-filter**，将我们实例化的
    Bean 限制为仅那些带有 **@Controller** 原型注解的 POJO。


    接下来，我们使用 **mvc-namespace** 声明来启用对将请求映射到 Spring MVC **@Controller** 方法的支持。


    **<mvc:annotation-driven/>**


    这个便捷的配置语法还会注册默认的 Spring 格式化器和 Spring 验证器，以便在所有控制器中使用。这允许我们编写如下所示的控制器代码：


    **@Controller**


    **@RequestMapping("**/people")**


    **public class PersonController {**


    ****@RequestMapping(value = "/{id}", method = RequestMethod.GET)** **public String
    show(@PathVariable("id") Long id, ModelMap modelMap) {**


    **// 检索 Person 实体的业务逻辑**


    **return "person";**


    **}**


    ****@RequestMapping(value = "/{id}", method = RequestMethod.DELETE)** **public
    String delete(@PathVariable("id") Long id) {**


    **// 删除 Person 实体并返回适当视图的业务逻辑在此处**


    **}**


    ****}**


    这段简略的代码被注解为一个控制器。它还通过 Spring MVC 的 **@RequestMapping** 注解映射到了 **/people**。我们在方法级别再次使用
    **@RequestMapping** 注解，以指定任何对 **/people/{id}** 的 HTTP **GET** 请求都应触发 **show**
    方法。**@PathVariable** 注解将获取那个 **{id}** 参数，并将其设置为 **Long id**，以便在 **show** 方法内部使用。类似地，当对
    URL **/art/people/{id}** 发出 HTTP **DELETE** 请求时，该请求将通过 **galleryDispatcher** 路由到
    **PersonController** 的 **delete** 方法。短时间内要消化这么多内容确实不少，但可以说，Spring 的 MVC 注解极大地减少了构建一个完整的企业级
    Web 应用程序所需的代码量。


    最后，我们演示了 Spring 用于静态视图解析的机制：


    **<mvc:view-controller path="/index.jsp"/>**


    通常，你希望简单地将请求路由到一个视图，而无需在控制器中包含任何逻辑。这就是 **mvc:view-controller** 的用武之地。


    第 3 章 ■ 基本应用程序设置


    总结


    在本章中，你已经了解了使用核心 Spring、Maven、数据库和 Spring MVC 设置 Web 应用程序所涉及的内容。


    Maven 是一个很棒的工具，开发团队可以使用它来简化日常开发。你可以管理依赖关系，确保可重复的构建过程，并为团队中的开发人员提供一个一致的接口来与你的项目进行交互。


    你还了解了 Spring 的一些特性，包括组件扫描、**BeanFactoryPostProcessors**（如 **PropertyPlaceholderConfigurer**）、Spring
    的命名空间支持，以及使用 **import** 声明进行更高级的 XML 配置管理。组件扫描很可能是这些特性中最重要的，因为它允许 Spring 在指定的包结构中定位类，以便管理这些组件并适当地解析依赖关系。


    组件扫描功能允许开发人员使用注解作为 Spring 的提示。它简化了将依赖关系连接在一起所需的工作，甚至减少了所需的 XML 配置量。例如，**@Repository**
    注解应用于指示构成 DAO 层的那些类，**@Service** 注解可用于指定属于应用程序服务外观的那些类，而 **@Controller** 注解则表示存在一个应用于
    Spring MVC 交互的 POJO。这些注解简化了各层的定义，为层类赋予了有助于描述其用途的元数据。

