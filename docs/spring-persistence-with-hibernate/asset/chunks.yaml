- fmt: "# When to Use Pessimistic Locking\n\nWhen the potential for simultaneous modifications\
    \ are more likely, you may want to consider leveraging Pessimistic Locking instead.\
    \ Pessimistic Locking uses database locks, and therefore poses greater risk for\
    \ scalability and database deadlock. The chief advantage of Pessimistic Locking\
    \ is that it limits concurrent access or modification of domain entities, which\
    \ can help maintain data consistency without complicating application code. Keep\
    \ in mind, however, that the longer a pessimistic lock is held, the greater the\
    \ impact to scalability.\n\nLocking an entity is relatively simple in JPA 2.0.\
    \ You can acquire a pessimistic lock when loading a particular entity. You can\
    \ also explicitly lock an entity after it has already been loaded, by calling\
    \ `lock` or `refresh` on the `entityManager` instance.\n\nFor example, to acquire\
    \ a pessimistic write lock (which is an exclusive lock) while loading a particular\
    \ `ArtEntity` instance, we could do the following:\n\n```\nArtEntity artEntity\
    \ = entityManager.find(ArtEntity.class, 7, LockModeType.PESSIMISTIC_WRITE)\n```\n\
    \nIf we had previously loaded an `ArtEntity` instance, and now wanted to acquire\
    \ a pessimistic read lock (which represents a shared lock), we could use the following\
    \ approach:\n\n```\nentityManager.lock(artEntity, LockModeType.PESSIMISTIC_READ)\n\
    ```\n\nWhile it is possible to obtain multiple, concurrent read locks, there can\
    \ only be a single pessimistic write lock.\n\n# Free-Text Search\n\nAs amazing\
    \ as it may sound, there are some solutions that aren’t in Hibernate’s repertoire.\
    \ It’s important to recognize those situations in which a requirement might be\
    \ better solved by using a different strategy altogether. These scenarios aren’t\
    \ always that obvious, so having a solid understanding of what other options are\
    \ available can be useful.\n\nConsider providing search-like functionality in\
    \ an application. A relational database is able to handle this functionality,\
    \ but only to a point. If your application is required to provide search functionality\
    \ that extends far beyond what a simple “SQL-like query” will accommodate, it\
    \ is time to consider an alternate solution.\n\nUsers expect search features to\
    \ be intelligent. For example, if you were attempting to search for “Spring Framework”\
    \ and you inadvertently typed “Sprong Framework,” you would probably expect the\
    \ application to work around your error and return your intended results anyway.\
    \ This type of feature is often referred to as *fuzzy search*, as it reduces the\
    \ strictness of the match, allowing similarly spelled terms to be included. This\
    \ concept can also be extended to allow for synonyms. For example, a search for\
    \ “car” can also match entries containing “automobile.”\n\nRelational databases\
    \ don’t typically excel at finding groups of words within blocks of text, a feature\
    \ often referred to as *free-text search*. Providing this kind of search functionality\
    \ within a relational database would likely incur significant performance overhead\
    \ as well as additional development time.\n\nFinding text content that begins\
    \ or ends with a particular word can be implemented using a `like` condition,\
    \ such as the following:\n\n```\nList<ArtEntity> blueEntities = entityManager.createQuery(\n\
    \    \"select artEntities from ArtEntity artEntities where artEntities.description\
    \ like 'blue%'\"\n).list();\n```\n\nObviously, this query is a bit contrived,\
    \ as we wouldn’t likely have a hard-coded query, specifically one that filters\
    \ items with a `description` field that starts with “blue,” but it serves for\
    \ demonstration purposes. While this query might be reasonably performant (since\
    \ we can rely on the database index to quickly find a description that starts\
    \ with an exact match of a particular word), we will begin to incur more significant\
    \ performance penalties if we attempt to find those `ArtEntities` with a description\
    \ containing a particular word or phrase. This sort of search operation will typically\
    \ require an index scan or table scan, which can be taxing on the database.\n\n\
    Furthermore, we still don’t have a strategy for determining the relevance of a\
    \ particular match. If five `description` fields contain the word *blue*, how\
    \ do we determine which match is more relevant? We could make the assumption that\
    \ the more times the word *blue* appears within a particular description, the\
    \ more relevant it is. However, implementing this solution with Hibernate alone\
    \ will likely require a lot of extra coding, and we still have barely met the\
    \ base expectations for a user’s search requirements.\n\nWhat if we wanted to\
    \ support fuzzy matching or handle synonyms?\n\nThe fundamental problem with using\
    \ Hibernate alone to tackle search requirements is that a relational database\
    \ is not designed to provide this type of functionality. However, this is exactly\
    \ the sort of thing Apache Lucene—a powerful open source Java search framework—was\
    \ intended to do.\n\n## Introducing Lucene\n\nLucene is a performant and full-featured\
    \ information retrieval (IR) library, providing a comprehensive API for indexing\
    \ and searching operations. Indexing is a strategy used by both search engines\
    \ and databases to allow content to be found as efficiently as possible. A Lucene\
    \ index is not all that different from the index for this book. It provides a\
    \ logical and systematic way to locate and access a particular piece of data.\n\
    \n### Indexing with Lucene\n\nAt the center of Lucene’s indexing API is the `Document`\
    \ class. Similar to the concept of a database table, a `Document` is composed\
    \ of `Field`s, each of which contains text data extracted from the original content\
    \ intended to be indexed. Unlike a database, Lucene documents are denormalized.\
    \ There is no concept of joining, as data relationships are not indicative of\
    \ IR. Instead, you can think of documents as containers—a means for organizing\
    \ content so that it can be effectively searched against later.\n\nEach `Field`\
    \ in a Lucene `Document` typically represents a particular component of the content\
    \ you wish to search. For example, if you wanted to index your personal music\
    \ library, you would likely define a document with fields for an audio track,\
    \ the track’s album, the track’s artist, the file name for the track, your notes\
    \ about the track, the album’s release date, and so on. To assist with the indexing\
    \ process, Lucene provides a set of `Analyzers`. An `Analyzer` helps to break\
    \ down and filter the content for each particular field, extracting a stream of\
    \ tokens. For instance, since it’s reasonable that your notes on a particular\
    \ album could contain several paragraphs of text, you would need to break down\
    \ this content into words. You might then want to break down these words into\
    \ their roots, allowing you to be able to find notes by using the word *listen*,\
    \ even if a particular note actually contained the word *listens* or *listening*.\
    \ This process is called *stemming*, and helps to break down words into their\
    \ root forms. An analyzer might also filter out superfluous content, such as removing\
    \ *stop words*, such as *the* and *a*.\n\nThe individual tokens that an analyzer\
    \ extracts are known as *terms*. Terms are the foundational elements that comprise\
    \ an `Index`, and therefore are also the primary component of a search query.\n\
    \nLucene uses an inverted index to optimize the manner in which content is found.\
    \ An inverted index uses the tokens extracted in the analyzer step of the indexing\
    \ process as the lookup keys for a particular piece of content. This sort of approach\
    \ is more conducive to searching, as the emphasis for lookup is placed on the\
    \ individual terms or words a user might want to search for, rather than the content\
    \ itself."
