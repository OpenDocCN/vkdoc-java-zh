    \ by default. Table 2-1 lists the bean scopes that are provided by Spring out\
    \ of the box.\n\n*Table 2-1. Spring Bean Scopes*\n\n| Scope | Description |\n\
    | --- | --- |\n| Singleton | Scopes a single bean definition to a single object\
