    该指令将确保 Spring 加载并管理我们应用程序中的所有 DAO 类。在此过程中，Spring 会将正确的 **EntityManager** 实例注入到相应的
    DAO 中，正如 **@PersistenceContext** 注解所表达的那样。


    以下设置允许我们的环境执行 JPA 事务。我们的 JPA 应用程序要能够更新数据，就需要这个非常基础的配置。


    第 4 章 ■ 使用 Hibernate 进行持久化


    **<bean id="transactionManager"**


    **class="org.springframework.orm.jpa.JpaTransactionManager"**


    **p:entityManagerFactory-ref="entityManagerFactory"/>**


    ****<tx:annotation-driven mode="aspectj" transaction-manager="transactionManager"/>**
    如你所见，JPA 配置涉及的内容相当多，但考虑到它所带来的强大功能，这些努力绝对是值得的！


    总结


    像 Spring 和 Hibernate 这样的框架提供了一种解决复杂企业级挑战的方法。


    EJB 2.0 与 Spring 和 Hibernate 这类框架之间的关键区别在于，这种复杂性是一种你可以选择是否使用的选项，而不是你被迫接受的框架架构中不可或缺的组成部分。


    在本章中，我们回顾了历史，了解了持久化在 Java 生态系统中的演变过程，现在你对相关术语以及规范与实现之间的区别有了更清晰的理解。你已经了解到，可以构建一个使用多种规范与实现组合的应用程序。例如，你可以构建一个单一的应用程序，它使用
    EJB 3.0 作为基于分布式组件的架构，使用 JPA 进行持久化，并以 Hibernate 作为 JPA 的实现。你还对我们艺术画廊示例应用程序所依赖的领域模型和
    DAO 结构有了初步了解。最后，你学到了很多关于在 Spring 环境中设置 JPA 应用程序的知识。现在，你已经掌握了足够的信息来让一个 JPA 应用程序运行起来。


    在下一章中，我们将继续为我们的艺术画廊应用程序构建领域模型。


    **第 5 章**


    ■ ■ ■


    **领域模型基础**


    领域模型是构建持久化层的基础。每个领域类定义了要持久化到数据库的属性，以及一个类与另一个类之间的关系。这种丰富的面向对象结构并不容易转换为关系型的数据库世界。


    Hibernate 提供了必要的机制来帮助解决这两个领域之间的阻抗不匹配问题。


    映射是一个过程，通过这个过程，你向 Hibernate 提供提示，说明你的领域类中的属性和引用如何转换为数据库中的表、字段和关联。


    当 Hibernate 首次出现时，开发者使用 XML（称为 **.hbm.xml** 文件）来指定领域模型的映射规则。随着 JPA 规范的发布，出现了一系列可以应用于领域类的注解，它们提供了与
    XML 映射文件类似的提示。


    Hibernate 的优势在于开发者可以轻松地开始构建持久化层。第一步通常是使用简单的 JavaBean（或 POJO）来定义你的领域模型。在上一章中，我们介绍了构成我们应用程序领域模型基础的几个核心类。在本章中，我们将以此为基础，引入一些额外的类。


    理解关联


    在第 4 章中，我们介绍了我们的艺术画廊领域模型，并创建了 **Person** 实体。我们提到 **ArtEntity** 类将代表我们画廊应用程序中的艺术品、图像和照片。我们还提到，我们的领域模型将包含一个
    **Comment** 类，它将代表关于特定 **ArtEntity** 的单个评论。


    一个 **ArtEntity** 自然包含多个评论，以允许无限数量的网站访问者对他们正在观看的特定艺术品添加自己的评论。尽管一个 **ArtEntity**
    可能包含许多 **Comment** 实例，但一个给定的 **Comment** 只能引用一个 **ArtEntity**，因为通常一条评论旨在关联画廊应用程序中的特定内容。


    **ArtEntity** 与其 **Comment** 实例之间的关联最好描述为 *一对多* 关系。反过来，**Comment** 与其关联的 **ArtEntity**
    之间的关系被称为 *多对一* 关联。由于每个实体都能够引用另一个实体，因此这种关联被认为是 *双向的*。如果一个实体能够引用另一个实体，但反过来不成立，则这被认为是
    *单向的* 关联。


    你应该使用单向关联还是双向关联取决于你的应用程序。


    然而，如果你没有使用双向关联的特定需求，坚持使用单向方法会更简单，因为双向关联可能需要循环引用，并最终使编组或序列化实现复杂化。


    第 5 章 ■ 领域模型基础


    即使 ORM 抽象通常为我们处理这些细节，但考虑领域模型及其关系将如何转换为数据库模式始终很重要。**ArtEntity** 和 **Comment** 关联需要两个表：一个
    **Art_Entity** 表和一个 **Comment** 表。然后，一个 **ArtEntity** 实例将通过 **Comment** 表中指向 **Art_Entity**
    的外键引用与一个 **Comment** 关联，如图 5-1 所示。


    *图 5-1\. ArtEntity 表与 Comment 表之间的关系* 我们的画廊应用程序还需要一个 **Category** 类来表示一个类别，特定的
    **ArtEntity** 可以被放入其中（以帮助将艺术品和照片组织成逻辑组）。每个 **Category** 可能包含多个 **ArtEntity** 实例。同样，每个
    **ArtEntity** 可以被放入多个 **Category** 实体中。这种类型的关联通常被称为 *多对多*。多对多关联比一对多关系稍微复杂一些。在数据库中建模这种关系的最佳方式是使用
    *连接表*。连接表仅包含来自两个相关表的外键，允许两个表中的行相互关联。


    图 5-2 说明了这种关系。


    *图 5-2\. ArtEntity 表与 Category 表之间的关系* 70


    第 5 章 ■ 领域模型基础


    虽然清楚了解领域模型的表结构很重要，但 Hibernate 可以为你处理这些特定于数据库的细节。相反，你需要专注于类的定义以及它们从面向对象的角度相互关联的方式。


    对于定义 Hibernate 领域模型的最佳方式，开发者们有不同的理念。一些开发者认为最好先定义数据库模式，然后创建与数据库结构匹配的类。显然，只要你的应用程序能可靠地工作，这个过程就没有错误的方式。然而，根据我们的经验，我们通过先定义
    Hibernate 映射取得了最佳效果，这使我们能够同时考虑 Java 类和数据库表结构。


    随着 JDK 1.5 和 Hibernate 3 的推出，不再需要以 XML 形式定义 Hibernate 映射文件。当然，你仍然可以继续使用这种更冗长的方法，并且对于许多开发者来说，将数据库映射的细节外部化确实是一件好事。

