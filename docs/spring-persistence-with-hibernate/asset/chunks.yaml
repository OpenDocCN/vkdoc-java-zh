    **jpaQuery.setMaxResults(maxResults);**


    **}**


    **List<ArtEntity> artEntities = jpaQuery.getResultList();**


    ****return artEntities;**


    ****}**


    为了跨 **ArtEntity** 的 **title**、**subtitle**、**media**、**description** 和 **caption**
    字段进行搜索，我们使用了一个名为 **MultiFieldQueryParser** 的特殊 Lucene 查询解析器。此查询解析器接收一个字段名称数组，以便用户指定的所有搜索词可以同等地应用于每个字段。换句话说，以这种方式使用
    **MultiFieldQueryParser** 等同于以下 Lucene 查询，假设用户搜索了“test”：


    **title: test OR subtitle: test OR media: test OR description:test OR caption:test**
