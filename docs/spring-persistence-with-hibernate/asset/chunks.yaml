    API so deeply into your code. The more common approach is to let Spring manage
    the relationships between beans dynamically through dependency injection.


    Beans, Beans, the Magical Fruit


    A big part of the secret sauce for the Spring Framework is the use of Plain Old
    Java Objects, or POJOs.


    Martin Fowler, Rebecca Persons, and Josh MacKenzie originally coined the term
    POJO in 2000\. POJOs are objects that have no contracts imposed on them; that
    is, they don’t implement interfaces or extend specified classes.


    There is often quite a bit of confusion about the differences between JavaBeans
    and POJOs. The terms tend to be used interchangeably, but that’s not always accurate.
    JavaBeans are best characterized as a special kind of POJO. Put simply, a JavaBean
    is a POJO that follows three simple conventions:


