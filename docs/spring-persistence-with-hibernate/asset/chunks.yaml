- fmt: "For example, say you have a few classes that are designed to store and retrieve\
    \ data to and from a relational database. As part of this implementation, you\
    \ may wish to do some auditing (for example, to track details of each successive\
    \ write operation). Extending from a base auditing class isn’t a viable or proper\
    \ way to accomplish this task. If you extend from any class at all, you probably\
    \ want to inherit behavior that relates more to manipulating your domain model\
    \ and saving data (you don’t want to inherit auditing behavior). In this example,\
    \ we might say that auditing functionality is *orthogonal* to the core persistence\
    \ functionality (that is, completely independent of it). Furthermore, the auditing\
    \ aspects of the code can be applied in a reasonably similar and standard fashion\
    \ across all the application code.\n\nThis is the perfect scenario for AOP. You\
    \ can apply aspects of the unrelated auditing functionality across all of the\
    \ classes that aim to handle image gallery logic.\n\nThe way AOP works in practice\
    \ is fairly simple: a class’s methods can be altered so that new functionality\
    \ can be injected before, after, or around (essentially, before *and* after) a\
    \ method is called.\n\nSo, in the case of an auditing aspect, you could inject\
    \ a block of code that writes a row in a database (constituting a piece of an\
    \ overall auditing trail) each time a method within a category of methods is called.\n\
    \nA similar scenario concerns security. A security check can be inserted into\
    \ your core data-access code to ensure appropriate permissions or roles are verified\
    \ each time certain methods are called. The interesting part of this approach\
    \ is that you can keep the security code entirely separate from your core implementation\
    \ (which no longer needs to worry about the implementation details of security).\
    \ This leads to cleaner code, as your core application need not get bogged down\
    \ with details of your security implementation.\n\nFurthermore, it is often useful\
    \ to have distinct teams manage features that are disparate. AOP makes this feasible,\
    \ as security-related code can be crafted by experts in this domain, while the\
    \ application business logic is developed and maintained by a different team.\
    \ By ensuring these two facets don’t intermingle (from a code standpoint), specialization\
    \ becomes more attainable. These two distinct pieces of functionality can be developed\
    \ and maintained entirely separately, leading to cleaner and more loosely coupled\
    \ code.\n\nThis ability to intercept method calls and introduce, or *inject*,\
    \ new functionality is the secret sauce behind Spring’s support for declarative\
    \ transactions. Using Spring’s declarative transaction support, you can advise\
