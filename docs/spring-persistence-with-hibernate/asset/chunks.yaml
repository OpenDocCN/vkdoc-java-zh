    The Application Context


    Spring’s job is to parse your configuration files and then instantiate your managed
    classes, resolving their interdependencies. Spring is often called a *container*,
    since it is designed to create and manage all the dependencies within your application,
    serving as a foundation and context through which beans may also be looked up.
    This core engine is represented by a base interface called **BeanFactory**.


    The **BeanFactory** interface defines the core Spring engine that conglomerates
    your beans and wires the collaborating dependencies together. But the Spring container
    is capable of much more than just 18


    CHAPTER 2 ■ SPRING BASICS


    dependency injection. It can also be used to publish events, provide AOP functionality,
    support a resource-loading abstraction, facilitate internationalization, and so
    on. For many of these advanced capabilities, you will need to use an **ApplicationContext**
    instance.


    The **ApplicationContext** extends the **BeanFactory** interface, providing a
    set of more robust features.


    The separation can come in handy if you are building a very lightweight application
    and don’t need some of these more advanced features. But for most applications
    (especially server-side software), you will want to use an **ApplicationContext**
    implementation. In the case of web applications, you will use a **WebApplicationContext**.
    Spring ships with a listener that you can throw into your **web.xml** file to
