- fmt: "# Hibernate 缓存与多态性\n\nHibernate 有三种缓存选项：域缓存（domain）、集合缓存（collection）和查询缓存（query）。在前面的示例中，我们演示了域缓存和集合缓存，因为我们在顶级域实体以及\
    \ `comments` 关联上都指定了 `@Cache` 注解。\n\n缓存细节应通过所选缓存实现对应的配置文件进行调整。对于 Ehcache，你可以在\
    \ `ehcache.xml` 文件中按域配置具体参数，例如生存时间（time-to-live）和缓存大小。\n\n我们将在第 9 章更详细地讨论缓存策略。\n\
    \n## 使用 Hibernate 实现多态性\n\n对于我们的画廊应用程序，我们需要再添加几个类来为画廊的所有功能提供持久化细节。快速回顾一下，以下是当前域模型的概览：\n\
    \n- **Person**：表示画廊应用程序的管理员用户或注册用户。\n- **Exhibition**：将图像集合组织成逻辑分组。\n- **ArtEntity**：表示应用程序中的图像，包含图像的元数据及其位置。\n\
    - **Comment**：表示与特定 `ArtEntity` 实例相关的单个评论。\n\n我们的 `ArtEntity` 类表示图像的基本元数据，但如果我们需要以不同分辨率存储图像（例如缩略图、中等分辨率版本和高分辨率版本）该怎么办？我们当然可以在\
    \ `ArtEntity` 类中插入额外的字段，但 Hibernate 提供了更简洁的解决方案。\n\n像 Hibernate 这样的 ORM 解决方案远不止将数据库字段映射到域模型实例。Hibernate\
    \ 还支持面向对象的概念（例如多态性），这是建立共享一组核心属性和功能的域对象层次结构的有效手段。\n\n与其直接在 `ArtEntity` 类中存储图像路径，不如将这些数据重构到一个名为\
    \ `ArtData` 的独立基类中。然后，我们将创建三个子类，每个子类都继承 `ArtData` 类（因此共享其属性），但专门用于表示特定类型的图像。\n\
    \n我们将定义以下四个新的域类：\n\n- **ArtData**：大部分属性将存储在此处，因为它是基类。\n- **ArtData_Gallery**：此类用于表示画廊列表页面中图像的标准视图。\n\
    - **ArtData_Thumbnail**：此类用于表示缩略图。\n- **ArtData_Storage**：此类将持久化图像的高分辨率版本，适用于存档或放大查看。\n\
    \n> **注意**：我们不会在此处包含域模型的完整源代码。如果你想跟着学习，可以下载本章的示例代码。\n\nHibernate 提供了四种不同的多态性实现选项：\n\
    \n- **隐式多态性（Implicit polymorphism）**：此选项使用 Java 继承结构，无需这些结构细节影响数据库模式。换句话说，使用隐式多态性，你可以查询父类，Hibernate\
    \ 将对指定 Java 类层次结构中的所有表发出 `select` 查询。虽然此策略允许你利用 Java 类中固有的多态结构而不影响数据库，但这类查询可能效率较低，因为\
    \ Hibernate 必须做更多繁重的工作来将不同的表转换为连贯的类层次结构，而无法有效利用数据库。其他多态性策略在某种程度上依赖数据库来划分 Java\
    \ 层次结构中类之间的关联。\n\n- **每个类层次结构一张表（Table-per-hierarchy）**：此选项将类层次结构的所有属性合并到单个表中，使用**鉴别器字段（discriminator\
    \ field）** 来确定数据库中的每一行代表哪种 Java 类型。鉴别器只是一个表列，其值用于指定该特定行应关联到哪个类。这种方法的优点是，层次结构中任何类所需的所有字段都包含在单个表中，无需数据库连接的开销。缺点是设计不够规范化，对于任何给定的类型，很可能存在一些字段不会被使用。这可能会对数据库模式施加限制，例如阻止你指定非空约束。由于层次结构中不同类的字段需求不同，并且它们都共享在单个表中，你必须将模式简化为最低公分母。\n\
    \n- **每个子类一张表（Table-per-subclass）**：使用此选项，层次结构中的每个 Java 类都由不同的表表示。与父类相关的属性持久化到单个表中。每个子类特有的特定属性存储在自己的数据库表中。层次结构中的特定子类通过父表与子表之间的连接来表示。这种方法的优点是设计干净且规范化，因为共享属性存储在单个父表中，只有子类特定的属性被隔离到自己的子类表中。然而，尽管从关系数据库建模的角度来看更清晰，但你应该考虑连接表所带来的性能损失。\n\
    \n- **每个具体类一张表（Table-per-concrete-class）**：此选项要求每个未声明为抽象的 Java 类都由自己的表表示。子类不是通过多个表之间的连接来实现的。相反，每个类的所有属性（包括从父类继承的属性）都持久化到自己的表中。这显然需要一定的冗余，因为类层次结构中的相同字段将出现在每个映射表中。然而，Hibernate\
