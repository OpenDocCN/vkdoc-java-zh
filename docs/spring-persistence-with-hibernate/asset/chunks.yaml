- fmt: "# JPA 应用程序中的关键接口\n\n图 4-1 概述了任何 JPA 应用程序中的四个关键接口。`EntityManagerFactory` 表示应用程序中数据库的配置。通常，每个数据存储定义一个\
    \ `EntityManagerFactory`。`EntityManagerFactory` 用于创建多个 `EntityManager` 实例。\n\n\
    *图 4-1\\. JPA 接口*\n\n每个 `EntityManager` 实例类似于一个数据库连接。在多线程 Web 应用程序中，每个线程都有自己的\
    \ `EntityManager`。\n\n> **注意**：默认情况下，所有 Spring 对象都是单例的。`EntityManager` 也不例外，但它仍然是线程安全的，并且了解事务边界。Spring\
    \ 传入一个共享的代理 `EntityManager`，该代理委托给一个线程绑定的 `EntityManager` 实例，该实例了解请求的所有上下文（包括事务边界）。\n\
    \n每个 `EntityManager` 都有一个 `EntityTransaction`，这是持久化更改到底层数据库所必需的。最后，`EntityManager`\
    \ 充当生成 `Query` 类的工厂。实现 `Query` 接口的类用于对数据库执行查询。\n\n`EntityManagerFactory` 仅在启动应用程序时相关，我们将向您展示如何在\
    \ Spring 应用程序中配置它。查询将在第 6 章中更深入地介绍，事务管理将在第 7 章中讨论。正如您将在本章中看到的，`EntityManager`\
    \ 接口是您最常与之交互的接口。\n\n> **注意**：由于 JPA 旨在用于重量级和轻量级容器，因此有许多配置选项。例如，您可以使用 EJB 容器配置\
    \ JPA，然后通过 JNDI 公开容器的 `EntityManager` 供 Spring 访问。或者，您可以使用许多现有的 JPA 实现之一直接在 Spring\
    \ 中配置 JPA。一个显著的区别是需要（或不需要）*加载时织入*，这是 AOP 所需的一种字节码操作。加载时织入需要创建具有事务感知能力的 JPA `EntityManager`\
    \ 和 `Entity` 对象，这些对象可以执行延迟加载。EJB 服务器有自己的加载时织入机制，Spring 也是如此。单个 `EntityManager`\
    \ 只能通过代理提供的间接层支持来处理此类功能。Hibernate JPA 实现是不需要加载时织入的框架之一，因此它允许您尽快在 JPA 环境中启动并运行。\n\
    \n# 艺术画廊领域模型和 DAO 结构\n\n现在，是时候回到构建我们的艺术画廊应用程序了。在艺术画廊应用程序中，我们必须表示的核心内容是艺术品的实体。在图\
    \ 4-2 中，您将看到 `ArtEntity` 类代表艺术品。在我们的画廊中，我们将允许画廊策展人将 `ArtEntity` 实体关联到 `Category`\
    \ 实体，并允许公众应用 `Tag` 和 `Comment` 实体。这些 `ArtEntity` 实体被组织成 `Exhibition` 实体以供公开展示，并且我们以称为\
    \ `ArtData` 的多态表示形式捕获给定艺术品的所有元数据。我们还定义了一个 `Person` 类型来表示应用程序的所有用户。这些 `Person`\
    \ 实体通过一个 `enum` 进行限定，该枚举表示它们可能承担的系统角色。\n\n*图 4-2\\. 艺术画廊领域模型*\n\nJPA 允许我们通过注解指定如何将\
    \ Java 类映射到数据库。最重要的注解是 `@Entity` 注解。\n\n# 带有 `@Entity` 注解的 POJO\n\n向 POJO 添加 JPA\
    \ `@Entity` 注解使其成为可持久化对象！嗯，不完全是——您仍然需要在某处添加 `@Id`，理想情况下还需要添加 `@Version` 字段，但就是这么简单。\n\
    \n```java\npackage com.prospringhibernate.gallery.domain;\n\nimport javax.persistence.Id;\n\
    import javax.persistence.Entity;\nimport javax.persistence.Version;\nimport javax.persistence.GeneratedValue;\n\
    \n@Entity\npublic class Person implements Serializable, DomainObject {\n\n   \
    \ private Long id;\n    private Integer version;\n\n    @Id\n    @GeneratedValue\n\
    \    public final Long getId() {\n        return id;\n    }\n\n    public void\
    \ setId(Long id) {\n        this.id = id;\n    }\n\n    @Version\n    public Integer\
    \ getVersion() {\n        return version;\n    }\n\n    public void setVersion(Integer\
    \ version) {\n        this.version = version;\n    }\n\n    // getters, setters\
    \ and fields omitted\n}\n```\n\n> **注意**：我们在此处的代码清单中包含了所有必需的 `import` 语句，以帮助您查看各种注解的来源。注解非常适合消除\
    \ XML，但随着给定类或方法上的注解数量增加，它们有时会变得有点难以阅读。`javax.persistence` 包中的任何内容都由 JPA 显式提供。\n\
    \n除非另有说明，否则 JPA 实现将采用约定优于配置，并将此 bean 映射到 `Person` 表。`@GeneratedValue` JPA 注解告诉\
    \ Hibernate 使用自动生成的 `id` 列。Hibernate 将为您使用的特定数据库选择最佳的 ID 生成策略。\n\nHibernate 也足够智能，可以根据每个成员变量使用的\
    \ Java 原始类型或枚举来确定每个数据库列的正确数据类型。您可以通过使用 `@Basic`、`@Enumerated`、`@Temporal` 和 `@Lob`\
    \ 注解进一步自定义这些字段映射。除非成员是 `static` 或使用 `@Transient` 注解，否则实体的每个成员都被假定为持久的。我们将在第 5\
    \ 章中更多地讨论约定优于配置的概念和 Hibernate 注解。\n\n就 JPA 规范而言，您在 `Person` 类中看到的 `implements\
    \ Serializable` 并不是严格必需的。但是，如果您要使用缓存或 EJB 远程处理，则需要它，这两者都要求对象是 `Serializable` 的。缓存是在任何\
    \ JPA 应用程序中实现最佳性能的关键组件，正如您将在第 9 章中学到的那样，因此实现 `Serializable` 接口是一个值得养成的好习惯。\n\n\
    从 POJO 方面来看，这就是您需要做的全部，但带有 `@Entity` 注解的 POJO 本身不会做任何事情。我们至少需要提供基本 CRUD 操作的代码。现在，我们将采用\
    \ DAO 模式。当我们分别在第 11 章和第 12 章中介绍 Grails 和 Roo 时，我们将探索使用 Active Record 模式以更以领域为中心的样式进行编码。\n\
    \n# 使用泛型的简化 DAO 模式\n\n让我们创建一个保存和查找 `Person` 实体的 DAO。我们将使用泛型使我们的类层次结构变得复杂，以便我们可以抽象出样板\
    \ CRUD 操作，否则这些操作将在我们的应用程序中的每个 DAO 中一遍又一遍地重复。\n\n在图 4-3 的伪 UML 中，请注意我们的 `Person`\
    \ 领域对象实现了一个名为 `DomainObject` 的接口。该 `DomainObject` 接口是一个空接口，由我们的 `GenericDao` 接口以及我们的\
    \ `GenericDaoJpa` 具体类使用，以通用方式绑定我们的领域对象。这种结构使我们能够将通用方法推送到 `GenericDaoJpa` 类中，这反过来又使我们能够保持\
    \ Hibernate DAO 的简洁。\n\n*图 4-3\\. 艺术画廊领域和 DAO 类层次结构*"
  raw: 'Figure 4-1 outlines the four key interfaces in any JPA application. The **EntityManagerFactory**
    represents the configuration for a database in your application. You would typically
    define one **EntityManagerFactory** per datastore. The **EntityManagerFactory**
    is used to create multiple **EntityManager** instances.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    *Figure 4-1\. JPA interfaces*


    Each **EntityManager** instance is analogous to a database connection. In a multithreaded
    web application, each thread will have its own **EntityManager**.


    ■ **Note** By default, all Spring objects are singletons. **EntityManager** is
    no different, but it is still thread-safe and knows about transactional boundaries.
    Spring passes in a shared proxy **EntityManager**, which delegates to a thread-bound
    instance of the **EntityManager** that knows all about the context of the request
    (including transaction boundaries).


    Each **EntityManager** has a single **EntityTransaction**, which is required for
    persisting changes to the underlying database. Finally, the **EntityManager**
    serves as a factory for generating **Query** classes. Classes that implement the
    **Query** interface are needed for executing queries against the database.


    The **EntityManagerFactory** is relevant only when starting up an application,
    and we’ll show you how that is configured in a Spring application. Querying will
    be covered in more depth in Chapter 6, and transaction management will be discussed
    in Chapter 7\. As you’ll see in this chapter, the **EntityManager** interface
    is the interface that you tend to interact with the most.


    ■ **Note** Since JPA is intended to be used in both heavyweight and lightweight
    containers, there are many configuration options. For example, you can use an
    EJB container to configure JPA, and then expose the container’s **EntityManager**
    for Spring to access via JNDI. Alternatively, you can configure JPA directly within
    Spring using one of the many existing JPA implementations. One significant difference
    is the need (or lack thereof) of *load-time weaving*, which is the type of bytecode
    manipulation required for AOP. Load-time weaving is needed for creating transactionally
    aware JPA **EntityManager** and **Entity** objects that can perform lazy-loading.
    EJB


    servers have their own load-time weaving mechanism, and so does Spring. A single
    **EntityManager** can handle this type of functionality only through the support
    of the level of indirection that a proxy can provide. The Hibernate JPA implementation
    is one of the frameworks that doesn’t require load-time weaving, so it allows
    you to get up and running in a JPA environment as quickly as possible.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    The Art Gallery Domain Model and DAO Structure


    Now it’s time to get back to building our art gallery application. The core thing
    that we must represent in an art gallery application is an entity for the works
    of art. In the Figure 4-2, you’ll see that an **ArtEntity** class represents the
    artwork. In our gallery, we will allow gallery curators to associate **ArtEntity**
    entities to **Category** entities and allow the general public to apply **Tag**
    and **Comment** entities. These **ArtEntity** entities are organized into **Exhibition**
    entities for public display, and we’re capturing all of the metadata for a given
    work of art in a polymorphic representation called **ArtData**. We also define
    a **Person** type to represent all users of the application. These **Person**
    entities are qualified by an **enum** representing the possible system roles they
    may take on.


    *Figure 4-2\. The art gallery domain model*


    JPA allows us to specify how a Java class is mapped to the database via annotations.
    The most important annotation is the **@Entity** annotation.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    An @Entity-Annotated POJO


    Adding a JPA **@Entity** annotation to a POJO makes it a persistable object! Well
    not quite—you still need to add an **@Id** somewhere and, ideally, a **@Version**
    field, but it’s just that simple.


    **package com.prospringhibernate.gallery.domain;**


    ****import javax.persistence.Id;**


    **import javax.persistence.Entity;**


    **import javax.persistence.Version;**


    **import javax.persistence.GeneratedValue;**


    ****@Entity**


    **public class Person implements Serializable, DomainObject {**


    ****private Long id;**


    **private Integer version;**


    ****@Id**


    **@GeneratedValue**


    **public final Long getId() {**


    **return id;**


    **}**


    ****public void setId(Long id) {**


    **this.id = id;**


    **}**


    ****@Version**


    **public Integer getVersion() {**


    **return version;**


    **}**


    ****public void setVersion(Integer version) {**


    **this.version = version;**


    **}**


    ****// getters, setters and fields omitted**


    **}**


    ■ **Note** We’ve included all of the requisite **import** statements in the code
    listings here to help you see where the various annotations are coming from. Annotations
    are great for eliminating XML, but as the number of annotations on a given class
    or method grows, they can become a bit hard to read at times. Anything in the
    **javax.persistence** package is explicitly provided by JPA.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    Unless told otherwise, the JPA implementation will employ convention over configuration
    and map this bean to a **Person** table. The **@GeneratedValue** JPA annotation
    tells Hibernate to use an autogenerated **id** column. Hibernate will choose the
    best ID-generation strategy for the specific database you’re using.


    Hibernate is also smart enough to determine the right data type for each database
    column based on the Java primitive type or enumeration used for each member variable.
    You can customize these field mappings further through the use of the **@Basic**,
    **@Enumerated**, **@Temporal**, and **@Lob** annotations. Every member of the
    entity is assumed to be persistent unless it is **static** or annotated as **@Transient**.
    We’ll talk more about the convention over configuration concept and Hibernate
    annotations in Chapter 5.


    The **implements Serializable** that you see in the **Person** class isn’t strictly
    necessary as far as the JPA specification is concerned. However, it is needed
    if you’re going to use caching or EJB remoting, both of which require objects
    to be **Serializable**. Caching is a key component in achieving optimal performance
    in any JPA application, as you’ll learn in Chapter 9, so implementing the **Serializable**
    interface is a good habit to adopt.


    That’s all you need to do from the POJO side, but an **@Entity**-annotated POJO
    doesn’t do anything on its own. We need to, at the very least, provide code for
    basic CRUD operations. For now, we’re going to embrace the DAO pattern. We’ll
    explore coding in a more domain-centric style with the Active Record pattern when
    we cover Grails and Roo in Chapters 11 and 12, respectively.


    Simplified DAO Pattern with Generics


    Let’s create a DAO that saves and finds a **Person** entity. We’re going to get
    fancy with our class hierarchy using generics so that we can abstract away the
    boilerplate CRUD operations that would otherwise be repeated over and over again
    by each DAO in our application.


    In the pseudo-UML in Figure 4-3, notice that our **Person** domain object implements
    an interface called **DomainObject**. That **DomainObject** interface is an empty
    interface that is used by our **GenericDao** interface as well as our **GenericDaoJpa**
    concrete class to bind our domain objects in a generic way. This structure enables
    us to push common methods into the **GenericDaoJpa** class, which in turn, allows
    us to keep our Hibernate DAOs succinct.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    *Figure 4-3\. Art gallery domain and DAO class hierarchy*'
