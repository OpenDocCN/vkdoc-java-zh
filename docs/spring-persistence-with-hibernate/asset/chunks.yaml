    ****LEFT JOIN FETCH c.artEntities**


    ****WHERE c.id = :id").getResultList();**


    As part of this JPQL query. we issue a **LEFT JOIN FETCH** . This will force Hibernate
    to initialize our **artEntities** association, overriding the default lazy behavior
    in the mapping file.


    Batching for Performance


    Another strategy for reducing the number of SQL queries required to load data
    is to use Hibernate’s batching feature, which loads multiple entities or collections.
    Batching offers a slightly simpler solution than controlling lazy loading. You
    attempt to grab data in batches to prevent this data from being loaded in many
    more “single queries” later on. The advantage of batching is that it can help
    improve performance without requiring significant changes to queries or code.


    The **@BatchSize** annotation can be added to a domain entity or to a particular
    association. Let’s update our **artEntities** association in our **Category**
    class again to see how we might be able to use Hibernate’s batching feature:


    **@ManyToMany**


    **@BatchSize(size = 10)**


    **public Set<ArtEntity> getArtEntities() {**


    **return artEntities;**


    **}**


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    Now, even though our **artEntities** association is still lazy by default, Hibernate
    will get ahead of us and attempt to initialize more than just a single **artEntities**
    collection at a time. It accomplishes this by using a SQL **in** condition, passing
    in ten identifiers of a **Category** instance when loading from the **ArtEntity**
    table.


    In other words, batching works similarly to the default lazy configuration. First
    a **Category** is loaded, then its **artEntities** association is loaded in a
    separate query (when the **artEntities** property is accessed, of course). However,
    with batching enabled, Hibernate will attempt to load more than one **artEntities**
    association, querying for the number of associations specified in the **size**
    attribute of the


    **@BatchSize** annotation.


    Keep in mind that **@BatchSize** doesn’t attempt to load multiple items within
    a collection. A collection is normally initialized in entirety via a separate
    **select**. Rather, **@BatchSize** will load multiple associations, to preclude
    initialization of other associations in our other **Category** instances (using
    our example).


    Lazy Initialization Exceptions


    Another common issue is the ominous **LazyInitializationException**. You can probably
    infer what this exception means by its name: Hibernate is unable to initialize
    a lazy property. What circumstances account for such a problem?'
  trans: '

    尽管这段代码看似无害，但实际上在代码行间隐藏着一个严重的性能问题。由于我们在首次获取每个 **Category** 实例时，**artEntities**
    关联尚未初始化，因此实际上我们在循环的每次迭代中都在初始化每个 **artEntities** 关联。由于 Hibernate 无法推断我们试图做什么，它只是在我们引用每个实例时将其初始化。结果就是为集合中的每个条目都执行了一次独立的
    SQL 查询。


    因此，对于上述循环，我们实际上无意中执行了（*类别数量*）+ 1 次查询！


    突然间，懒加载似乎不再像是一种优化技术了。


    这种令人不安的常见场景被称为 *N+1 查询* 问题，即执行了 *N* 次 **select** 查询（原始查询返回的每个条目各一次），再加上最初加载包含该集合的实体时执行的那次原始查询。


    其他关联也会出现类似的问题，例如从 **Comment** 类到 **ArtEntity** 领域对象的多对一引用。在这种情况下，如果加载了一个 **Comment**
    实例列表，那么每次尝试访问 **commentedArt** 属性时，都会发起一次额外的 **select** 查询。假设一个 JSP 页面遍历一长串评论，试图显示评论及其关联艺术品的相关信息。这可能会导致需要数百次额外的数据库往返！


    理解这个问题的可能性是第一步，但我们如何着手防止 N+1 查询问题呢？不幸的是，没有单一的解决方案。（如果有，它很可能已经成为 Hibernate 或 JPA
    的隐式部分了。）每种情况可能需要略微不同的方法。幸运的是，有几种策略可以帮助缓解这种潜在的有害场景。当然，目标是限制 SQL 查询的数量，并尽可能高效地加载所有必要的数据。


    **减少懒加载映射**


    解决 N+1 查询问题的一个方法是更新受影响领域类的映射配置。集合的默认行为是懒加载，并在访问关联时通过 SQL **SELECT** 来初始化集合。这种默认策略被称为
    *select 抓取*，因为会发出第二个 **SELECT** 来初始化懒加载的关联或属性。最简单的解决方案是覆盖此默认行为，从一开始就阻止该属性被懒加载。


    让我们重构影响 **Category** 实例上 **artEntities** 关联的映射配置，如下所示：


    **@ManyToMany**

    **@Fetch(FetchMode.JOIN)**

    **public Set<ArtEntity> getArtEntities() {**

    **    return artEntities;**

    **}**


    通过添加 **@Fetch** 注解并指定 **FetchMode** 为 **JOIN**，我们请求 Hibernate 在加载特定 **Category**
    实例时，使用左外连接自动初始化我们的 **artEntities** 集合。当导航到特定 **Category** 实例、通过 **get()** 或 **load()**
    加载实例，或通过 Criteria API 加载 **Category** 实例时，Hibernate 都会受到此 **@Fetch** 指令的影响。或者，您可以选择指定
    **FetchMode.SUBSELECT**，这将在初始查询中包含一个 SQL 子查询来加载 **artEntities** 集合。无论哪种情况，最终结果都是
    **artEntities** 关联不再懒加载，并且不需要额外的查询来初始化每个 **artEntities** 关联。


    那么问题解决了，对吧？并不完全是这样。还记得我们提到懒加载实际上是一个非常重要的特性，没有它，您可能会无意中将整个数据库的过多内容加载到内存中吗？换句话说，您可能并不总是需要
    **artEntities** 关联，在这些情况下，最好保持该属性为懒加载。


    所以，有时候懒一点是好的，比如周末和假期休息的时候。但其他时候，懒惰可能会给您带来麻烦（尤其是在工作中）。Hibernate 也是如此。


    解决 N+1 查询问题的最佳方法是保持关联默认声明为懒加载，但在知道需要该关联时覆盖此行为。例如，使用 JPQL，我们可以编写以下查询：


    **List categories = entityManager.createQuery("SELECT c FROM category c**

    **LEFT JOIN FETCH c.artEntities**

    **WHERE c.id = :id").getResultList();**


    作为此 JPQL 查询的一部分，我们发出了一个 **LEFT JOIN FETCH**。这将强制 Hibernate 初始化我们的 **artEntities**
    关联，覆盖映射文件中的默认懒加载行为。


    **批量处理以提高性能**


    另一种减少加载数据所需 SQL 查询数量的策略是使用 Hibernate 的批量处理功能，该功能可以加载多个实体或集合。批量处理提供了一种比控制懒加载更简单的解决方案。您尝试批量获取数据，以防止这些数据稍后在更多“单个查询”中被加载。批量处理的优点是它有助于提高性能，而无需对查询或代码进行重大更改。


    **@BatchSize** 注解可以添加到领域实体或特定关联上。让我们再次更新 **Category** 类中的 **artEntities** 关联，看看如何使用
    Hibernate 的批量处理功能：


    **@ManyToMany**

    **@BatchSize(size = 10)**

    **public Set<ArtEntity> getArtEntities() {**

    **    return artEntities;**

    **}**


    现在，即使我们的 **artEntities** 关联默认仍然是懒加载的，Hibernate 也会提前行动，尝试一次初始化不止一个 **artEntities**
    集合。它通过使用 SQL **in** 条件来实现这一点，在从 **ArtEntity** 表加载时传入十个 **Category** 实例的标识符。


    换句话说，批量处理的工作方式类似于默认的懒加载配置。首先加载一个 **Category**，然后在一个单独的查询中加载其 **artEntities** 关联（当然，是在访问
    **artEntities** 属性时）。但是，启用了批量处理后，Hibernate 将尝试加载多个 **artEntities** 关联，查询数量由 **@BatchSize**
    注解的 **size** 属性指定。


    请记住，**@BatchSize** 不会尝试加载集合中的多个条目。一个集合通常通过一个单独的 **select** 完全初始化。相反，**@BatchSize**
    会加载多个关联，以防止我们其他 **Category** 实例中的其他关联被初始化（以我们的示例为例）。


    **懒加载初始化异常**


    另一个常见问题是令人生畏的 **LazyInitializationException**。您可能从名称就能推断出此异常的含义：Hibernate 无法初始化一个懒加载属性。什么情况会导致这样的问题呢？

