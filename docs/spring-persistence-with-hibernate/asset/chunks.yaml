    in **spring-master.xml**, which means that we’re using our H2 database configuration.
    With the **@Before** and **@After** annotations, we’re ensuring that the state
    of the **Person** class is correct for each test method invocation. Finally, in
    nice discrete units, we test the behavior of our **PersonDao** when making a successful
    call to **getAll()** **Person** entities, a successful call to authenticate against
    the database, and lastly, a failed attempt to authenticate against the user data
    that we have scaffolded in with the **preMethodSetup()** method.


    Notice also that we have set **defaultRollback =** **true**, which will ensure
    that this method is automatically rolled back after completion. Automatically
    rolling back your transactions within an integration test is an effective strategy
    for ensuring that each test method returns the database to its original, pristine
    state. When defining an integration test that talks to a database, it is important
    to reduce the potential for database “side-effects” and to ensure that each test
    stands alone, without being affected by or relying upon previously run methods.


    Summary


    This chapter introduced some testing strategies for Spring applications. Of course,
    you can do a lot more to test with both JUnit and Spring, not to mention the really
    powerful testing constructs that are made possible by the mocking frameworks we
    mentioned. Also, topics such as performance testing and load testing are extremely
    relevant to persistence.


    For more advanced integration testing with databases, we recommend you check out
    the DbUnit JUnit extension. DbUnit provides excellent facilities for ensuring
    that your database is in a known state in between tests, as well as tooling to
    aid in assembling fixture data that can be used across an entire suite of tests.


    **C H A P T E R 9**


    ■ ■ ■


    **Best Practices and Advanced**


    **Techniques**


    Throughout this book, you’ve learned a lot about the workings of the Spring and
    Hibernate frameworks.


    In this chapter, you will learn the techniques necessary for building a performant,
    production-ready application. Although Hibernate and Spring are relatively easy
    to bootstrap, their default settings are appropriate only for simple applications.
    If you are building an application with significant load or performance requirements,
    you will likely need to do some fine-tuning in order to attain peak performance.
    In most scenarios, you can circumvent performance issues simply by leveraging
    the appropriate optimization or architectural strategies.


    Lazy Loading Issues


    Lazy loading has long been regarded as one of Hibernate’s most valuable features,
    especially with respect to improving performance. By declaring a domain object’s
    association or property to be lazy, an application can avoid undue overhead on
    the underlying database, which can often lead to faster response times and smaller
    datasets—both favorable qualities.


    Without lazy loading, a simple query may be executed over and over again unnecessarily,
    or worse yet, a query for a single domain entity might force the loading of an
    entire object graph, as Hibernate attempts to traverse from one association to
    the next.


    The problem is that lazy loading is a double-edged sword. It is vital for maintaining
    decent loading performance, but is also a significant risk for major performance
    problems. While lazy loading reduces the amount of data (as well as the potential
    for table joins) loaded from the database, this laziness can be very problematic
    for data that might need to be loaded from the database anyway.


    This is not to imply that lazy loading is a bad feature or that it should be disabled.
    It is a misunderstood problem that is very dependent on the context.


    Let’s begin by looking at one of the most common and significant issues related
    to lazy loading that affects persistence-based applications.


    The N+1 Selects Problem


    Let’s examine the way in which lazy loading works in a typical use case. In our
    sample application, our **Category** domain object contains a one-to-many association
    to the **ArtEntity** domain object. In other words, a **Category** contains a
    collection of **ArtEntity** instances: 137


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    **@Entity**


    **public class Category implements DomainObject {**


    ****private Long id;**


    **private String categoryName;**


    **private String categoryDescription;**


    **private Set<ArtEntity> artEntities = new HashSet<ArtEntity>();**


    ****. . .**


    ****@ManyToMany**


    **public Set<ArtEntity> getArtEntities() {**


    **return artEntities;**


    **}**


    ****public void setArtEntities(Set<ArtEntity> artEntities){**


    **this.artEntities = artEntities;**


    **}**


    ****. . .**


    ****}**


    By default, the **java.util.Set** of **ArtEntity** entities is declared lazy.
    Let’s consider what happens under the hood when we attempt to load all the **artEntities**
    for a series of **categories**.


    **entityManager.createQuery("SELECT c FROM Category c").getResultList();** Assuming
    there is at least one row in the **Category** table, the preceding statements
    will return a list of **Category** instances. However, because our **artEntities**
    association (within the **Category** class) is declared to be lazy, Hibernate
    will not perform a SQL join in an attempt to load data from both the **Category**
    table and the related rows from the **ArtEntity** table. Instead of loading these
    **ArtEntity** rows from the database, Hibernate populates the **artEntities**
    property for each of the returned **Category** instances with a proxy object.


    For collections, Hibernate provides persistent collection implementations that
    serve as proxies for the collection associations in our domain model. For instance,
    our **artEntities** property is declared as a **java.util.Set**. Hibernate will
    set this property to an instance of **org.hibernate.collection.PersistentSet**,
    a special class designed to intercept attempts to access the referenced collection
    so that a lazy collection can be initialized.


    Hibernate will generate proxies for each domain object within an application,
    and will use these proxies for single-ended associations that are marked as lazy.
    For example, we can define our many-to-one association of **commentedArt** in
    the **Comment** domain object to be lazy using the following annotation:


    **@ManyToOne(fetch=FetchType.LAZY)**


    **public ArtEntity getCommentedArt() {**


    **return commentedArt;**


    **}**


    This snippet will prevent a **Comment**’s reference to the associated **ArtEntity**
    from being loaded from the database until the property is accessed.


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    The goal of these proxies is to serve as placeholders of sorts. For data that
    is not loaded from the database, Hibernate can’t simply ignore these properties.
    Instead, a proxy can be used to defer loading behavior. If no attempt is made
    to access an uninitialized, lazy property, then nothing will happen.


    However, if an attempt is made to access one of these proxies, then the proxy
    will intercept this request and trigger a callback into the database. The end
    result is that the lazy property is initialized with the relevant data from the
    database.


    All of this sounds pretty ideal. But let’s consider what happens if we have multiple
    **ArtEntity** instances associated with each **Category**. When a given **Category**
    instance is first loaded, the **artEntities** association is set to an instance
    of **org.hibernate.collection.PersistentSet**. Now imagine that we want to iterate
    through all the **ArtEntities** for all of the **Category** instances returned
    in our original query.


    **for (Category category: categories) {**


    **for (ArtEntity artEntity: category.getArtEntities()) {**


    **// implicitly initialize another collection here**


    **System.out.println("art:" + artEntity.getTitle());**


    **}**


    **}**'
