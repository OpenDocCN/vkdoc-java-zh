- fmt: "# Hibernate Caching\n\nHibernate provides several different caching layers.\
    \ The first-level cache is scoped at the `EntityManager`, but rarely requires\
    \ much tuning. The second-level cache provides the ability to cache domain objects,\
    \ collections, and queries. Each of these cache types is managed and cached separately.\n\
    \nDomain objects are keyed by their identifier, and the values of all an object’s\
    \ properties are persisted to the cache. Associations and queries, however, persist\
    \ only collections of identifiers. These identifiers are cross-referenced against\
    \ the entity cache to load the actual domain object data.\n\nSome cache implementations,\
    \ such as Ehcache, are clusterable, allowing updates to the cache to be persisted\
    \ to other nodes in the cluster. However, without a way to keep the caches of\
    \ other nodes within the cluster in sync, there is the potential for significant\
    \ problems, caused by version conflicts or stale data. For instance, it is possible\
    \ for an important update applied to the database to be inadvertently rolled back.\
    \ This can happen when a node’s cache is not notified of the initial update to\
    \ the database.\n\nThen, when a different user attempts to perform a write operation\
    \ on the same entity, the user is applying his updates against stale data, which\
    \ effectively rolls back the initial update once the second (stale) process is\
    \ applied.\n\nWhen deploying a clustered application, it is important to use a\
    \ clusterable cache or a centralized cache server that all the nodes in the cluster\
    \ can share. Ehcache provides a stand-alone server product called Cache Server.\
    \ Additionally, Ehcache offers several configurable options for tuning its clusterable\
    \ features. It is important to experiment with various settings to determine the\
    \ options most suitable for your application’s requirements.\n\nIn the next chapter,\
    \ we will continue to investigate advanced strategies for providing specialized\
    \ features for your persistence tier, improving performance, and utilizing best\
    \ practices.\n\n# Integration Frameworks\n\nRare will be the case in which an\
    \ application will require Spring and Hibernate alone. Depending on your situation,\
    \ you will likely need to integrate with multiple frameworks in order to meet\
    \ your application’s requirements. Sometimes these integration details will be\
    \ a trivial matter. Other times, integration with another framework can present\
    \ its own unique set of challenges.\n\nTwo very common requirements faced by engineers\
    \ today are implementing free-text search and exposing web-based APIs. In this\
    \ chapter, we’ll show you how you can leverage several frameworks to attain these\
    \ goals. To expose an API for our art gallery application, we’ll take advantage\
    \ of the RESTful web service enhancements added to Spring 3.0, as well as Dozer,\
    \ Spring’s Object/XML Mapping support, and the Data Transfer Object pattern for\
    \ data marshaling. To implement free-text search, we’ll leverage Hibernate Search,\
    \ a subproject of Hibernate that provides a seamless way to integrate Lucene into\
    \ a Hibernate-based application.\n\n## RESTful Web Services with Spring\n\nThese\
    \ days, the requirements for web applications have become increasingly complex.\
    \ As processing power and bandwidth increase, users’ expectations follow along,\
    \ leading to more complex architectures and more interactive and responsive features.\
    \ Template-driven HTML web pages powered by controllers and JSPs are rarely adequate\
    \ anymore. Instead, today’s typical applications require asynchronous messaging\
    \ between the client and the server—often leveraging Ajax or Flash. This shift\
    \ away from pure server-side processing means that rendering the user interface\
    \ is only part of the battle.\n\nA large proportion of the work in many of today’s\
    \ rich Internet applications (RIAs) often revolves around communicating with a\
    \ web service or serializing data as part of a remoting strategy.\n\nREST, which\
    \ stands for Representational State Transfer, has become increasingly popular\
    \ for implementing web services. REST is best described as an architectural style,\
    \ rather than a standard or protocol. REST leverages HTTP to provide a consistent,\
    \ resource-oriented approach for representing data. As opposed to a remote procedure\
    \ call (RPC) style of communication, in which the metaphor is more akin to a method\
    \ call, REST focuses on the representation of a particular resource, which is\
    \ typically embodied as a URL. RESTful APIs leverage many of the built-in features\
    \ of the Web, such as caching, proxying, and HTTP-based authentication strategies.\n\
    \n![Image 8](index-171_1.jpg)\n\n> **Note** Roy Fielding originally coined the\
    \ term REST in 2000 as a part of his doctoral dissertation. Fielding was one of\
    \ the primary authors of the HTTP specification, and REST was defined in parallel\
    \ with the HTTP 1.1 specification.\n\n### Nouns, Verbs, and Content-Types\n\n\
    RESTful APIs are usually expressed in terms of nouns, verbs and content-types:\n\
    \n- *Nouns* are the names of resources. These names are normally expressed as\
    \ URLs.\n- *Verbs* are the operations that can be performed on a resource. The\
    \ verbs are the common HTTP verbs: `GET`, `POST`, `PUT`, and `DELETE`.\n- *Content-type\
    \ representations* refer to the data format used to enable machine-to-machine\
    \ communication. Popular representations are XML, JSON, HTML, binary data such\
    \ as images, or even RDF ontologies.\n\nNouns, verbs, and representations can\
    \ be visualized as depicted in Figure 10-1.\n\n*Figure 10-1. A RESTafarian’s view\
    \ of nouns, verbs, and content-type representations*\n\nTo further illustrate\
    \ the relationship between nouns, verbs, and content-type representations, let’s\
    \ assume that Apress has an API that is used for managing its books. To create\
    \ the book you’re reading, we might issue an HTTP `POST` on a URL like `http://api.apress.com/book/`.\
    \ The body of that `POST`, as well as the format for the data returned, is completely\
    \ up to the API designer. REST doesn’t prescribe a particular data format, so\
    \ API designers must make the right choice for their situation. The API might\
    \ accept XML, JSON, or any number of data formats that can be transmitted over\
    \ HTTP. The Apress API might even support multiple representations of the data,\
    \ allowing consumers of the API to issue requests to a single resource URL as\
    \ either XML or JSON. You would typically handle this *content negotiation* by\
    \ specifying a `content-type` header (for example, `json/text`).\n\nA well-designed\
    \ API may also allow you to indicate which data representation you expect to receive\
    \ in return by supplying an `Accept` header. Adhering to the semantics of HTTP,\
    \ the successful addition of our book would return HTTP status code 201, created.\
    \ The API would likely also provide a link to the resource representing the newly\
    \ created entity by its name, `http://api.apress.com/book/prospringhibernate`,\
    \ or perhaps better yet, via the ISBN-13 number, `http://api.apress.com/book/978-1430226323`.\n\
    \nWith a resource defined, a RESTful web service can use the verbs provided by\
    \ HTTP to access or manipulate the data these resources represent. For example,\
    \ if you wanted to retrieve the current representation of our book, you would\
    \ issue an HTTP `GET` on the resource `http://api.apress.com/book/978-1430226323`,\
    \ specifying a `content-type` header as `json/text`. The JSON response might look\
    \ like this:\n\n```json\n{\n  \"book\" : {\n    \"ISBN-13\" : \"978-1430226321\"\
    ,\n    \"title\" : \"Code Generation in Action\",\n    \"authors\" : {\n     \
    \ \"author\" : [ {\n        \"first\" : \"Paul\", \"last\" : \"Fisher\"\n    \
    \  }, {\n        \"first\" : \"Brian\", \"last\" : \"Murphy\"\n      } ]\n   \
    \ },\n    \"publisher\" : \"Apress\"\n  }\n}\n```"
