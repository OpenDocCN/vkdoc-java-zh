- fmt: '# Persistence with Hibernate


    You also saw what’s required to integrate a database into a Spring application
    using the Apache `commons-dbcp` library for connection pools or via JNDI if you
    want to use the datasource offerings from your application container.


    In the next chapters, we’ll build out our domain model and integrate Hibernate
    into our art gallery application.


    ## Persistence with Hibernate


    Much like Spring, Hibernate changed the software development landscape when it
    first appeared on the scene. The timing was ideal. Developers were frustrated
    by the complexity of J2EE and the overhead associated with using EJB for persistence
    in particular. Hibernate solves the persistence problem through simplicity and
    clean, thoughtful design.


    Also like Spring, Hibernate relies heavily on POJOs. Other ORM frameworks force
    developers to muddy their domain model with restrictive and rigid requirements,
    such as alternate and parent classes, as well as Data Transfer Objects (DTOs).
    Hibernate enables persistence with little reliance or coupling to Hibernate. Spring
    helps to decouple Hibernate further through several classes of its own, which
    serve to simplify and standardize integration and persistence operations. Additionally,
    Spring provides a framework-agnostic solution for implementing transactional behavior
    in a standardized, declarative fashion, without requiring Hibernate-specific code.


    Looking back, it is easy to see how Spring and Hibernate were instrumental to
    each other’s success.


    With philosophies that stressed lightweight methodologies, simplicity, and code
    cleanliness, the Hibernate-Spring duo ushered in a new age for enterprise Java
    applications and persistence. This mutual success had a dramatic impact on the
    Java community, and was the catalyst to numerous changes that embraced a lighter-weight
    approach to application development.


    There is often a great deal of confusion about the various persistence options
    in the Java ecosystem.


    What’s the difference between EJB 3, JPA, JDO, and Hibernate anyway? We’ll attempt
    to demystify these things in this chapter by going over a bit of history and defining
    some terms. With that out of the way, we’ll demonstrate how to integrate Hibernate
    into a Spring application.


    ### The Evolution of Database Persistence in Java


    JDBC was included by Sun Microsystems as part of JDK 1.1 in 1997. JDBC is a low-level
    API oriented toward relational databases. It provides methods for querying and
    updating a database. JDBC provides a great set of tools, but all of the heavy
    lifting is left entirely to the developer, who must write SQL, map query results
    to domain objects, manage connections and transactions, and so on. Most other
    persistence frameworks are built as abstractions on top of JDBC to ease this developer
    burden.


    Beginning in 2000, version 3.0 of the JDBC specification was managed as a part
    of the Java Community Process (JCP). The JCP was created in 1998 as a mechanism
    for interested parties to participate in shaping the future directions of the
    Java platform. The JCP revolves around Java Specification Requests (JSRs), which
    are formal documents outlining proposed additions or changes to the Java platform.
    Each JSR has one or more individuals playing the role of specification lead and
    a team of members referred to as the expert group, who collaborate to hammer out
    the specification. A final JSR also includes a reference implementation.


    This distinction between a *specification* and an *implementation* is one of the
    primary sources of confusion among developers when discussing the various persistence
    options available. For example, JPA is a *specification*, and Hibernate is just
    one of many projects that provide an *implementation* of the JPA specification.
    Other implementations of the JPA specification include OpenJPA, DataNucleus, and
    the reference implementation, EclipseLink. But we’re getting ahead of ourselves.
    Let’s walk through the origins of some of these specifications and implementations.


    ### EJB, JDO, and JPA


    In the late 1990s and early 2000s, the leading technology for developing large-scale
    applications in Java was EJB. Originally conceived by IBM in 1997, the EJB 1.0
    and 1.1 specifications were adopted by Sun in 1999. From there, EJB was enhanced
    through the JCP. JSR 19 served as the incubator for EJB 2.0, which was finalized
    in 2001. The EJB 2.0 specification became a major component in Sun’s Java 2 Platform,
    Enterprise Edition (a.k.a J2EE) reference implementation.


    There’s no question that the problems that EJB set out to solve, including enabling
    transactional integrity over distributed applications, remote procedure calls
    (RPC), and ORM, are complex, but EJB quickly earned a reputation for being more
    trouble than it was worth. The EJB 1.0, 1.1, and 2.0 specifications were marred
    by the complexities of checked exceptions, required interfaces, and heavy use
    of abstract classes. Most applications just didn’t require the heft associated
    with EJB 1 and 2. Against that backdrop, there was a huge opportunity for competition
    and innovation.


    The first official attempt to create a lightweight abstraction layer on top of
    JDBC by the JCP was JSR 12: Java Data Objects (JDO). The expert group behind JDO
    set out in 1999 to define a standard way to store Java objects persistently in
    transactional datastores. In addition, it defined a means for translating data
    from a relational database into Java objects and a standard way to define the
    transactional semantics associated with those objects. By the time the specification
    was finalized in 2002, JDO had evolved into a POJO-based API that was datastore-agnostic.
    This meant that you could use JDO with many different datastores, ranging from
    a relational database management system (RDBMS) to a file system, or even with
    an object-oriented database (OODB). Interestingly, the major application server
    vendors did not embrace JDO 1.0, so it never took off.


    Between JDO and EJB, there were now two competing standards for managing persistence,
    neither of which were able to break through and win over developers. That left
    the door open for commercial players and open source frameworks. Hibernate is
    usually the ORM framework that people think of as replacing EJB 2.0, but another
    major player actually came first.


    An ORM by the name of TopLink was originally developed by The Object People for
    the Smalltalk programming language. It was ported to Java and added to the company’s
    product line by 1998. TopLink was eventually acquired by Oracle in 2002. TopLink
    was an impressive framework, and its features played a major role in shaping the
    persistence specifications that have since emerged in the Java world.


    As a fringe commercial project, TopLink never saw the level of adoption enjoyed
    by EJB, which was heavily backed by the application server vendors like IBM and
    BEA; nor was it able to really compete with the lightweight open source frameworks
    that emerged, such as Hibernate.'
