    Finally, my sincere appreciation goes to Brian Murphy for joining the project
    and keeping things rolling along. If it hadn’t been for Brian’s tenacity and motivation,
    this book would never have seen the light of day. It’s been an honor and privilege
    working with you again.


    —Paul Tepper Fisher


    We’d like to thank Apress for the opportunity to write this book. Special thanks
    to Steve Anglin for believing in us and letting us stretch the schedule to cover
    advanced topics in depth. We owe Mary Tobin a special debt of gratitude for shepherding
    us through this process and ultimately dragging us across the finish line. Thanks
    to Tom Welsh, Marilyn Smith, and Sia Cyrus, who provided invaluable feedback,
    suggestions and encouragement along the way. This is a much better book as a result
    of their wisdom and patience. Any issues or errors in this text are ours alone.


    I would like to thank my wife, Dania, without whom this book wouldn’t be possible.
    She graciously took on the role of super mom while I devoted nights and weekends
    to writing for far longer than bargained for. I’d like to thank my son Liam for
    being the most terrific little kid. You provide me with more joy and a new appreciation
    for the world than you’ll ever know. I’d also like to acknowledge our second son,
    who is due shortly after this book will be published. I can’t wait to meet you!


    Lastly, I’d like to thank Paul Fisher for sharing this experience with me. This
    book was Paul’s brainchild and I’m glad he invited me along for the ride. Writing
    this book has been both rewarding and challenging. I learned a ton and it’s been
    great to work with you again.


    —Brian D. Murphy


    xiv


    **Preface**


    Since its inception, the Spring Framework has gradually changed the rules of application
    development in the Java community. This book is the ideal guide and teaching companion
    for developers interested in learning about the Spring Framework and how it can
    be leveraged to build persistence-driven applications using Hibernate, one of
    the most popular Java persistence frameworks today. *Spring* *Persistence with
    Hibernate* gets you rolling with fundamental Spring concepts, as well as proven
    design patterns for integrating persistence into your applications.'
