  raw: '• A **LocalEntityManagerFactoryBean** uses JPA’s Java SE bootstrapping.


    **LocalEntityManagerFactoryBean** requires the JPA provider (for example, Hibernate
    or OpenJPA) to set up everything it needs, including database connections and
    a provider-specific load-time weaving setup. The bean would look something like
    this:


    **<bean id="entityManagerFactory"**


    **class="org.springframework.orm.jpa.LocalEntityManagerFactoryBean">**


    **<property name="persistenceUnitName" value="galleryPersistenceUnit"/>**


    **</bean>**


    • If you have a Java EE container and you want to use EJB 3, you can use Spring’s
    built-in JNDI lookup capabilities:


    **<jee:jndi-lookup id="entityManagerFactory" jndi-name="persistence/galleryPersistenceUnit"/>**


    • The Spring JPA **LocalContainerEntityManagerFactoryBean** requires a bit more
    Spring configuration than the other two options. However, it also gives you the
    most Spring capabilities. Setting up a **LocalContainerEntityManagerFactoryBean**
    requires you to configure a datasource and JPA vendor-specific adapters, so that
    the generic Spring JPA configuration can set up some of the extras required for
    each vendor. This is the approach we’ll take in this chapter.


    We’re going to use some of the generic Spring configuration we’ve touched on earlier.
    We’ll also use component scanning to tell Spring to automatically create DAOs
    found in specific packages.


    Let’s create a file called **spring-jpa.xml** under **src/main/resources/META-INF/spring**.
    This file will have the **LocalContainerEntityManagerFactoryBean**, our datasource,
    a JPA transaction manager, and annotation-based transactions. We’ll start the
    **spring-jpa.xml** file with the namespace setup for the Spring file. There are
    a bunch of Spring namespaces that we’ll use to configure JPA.


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<beans**


    ********xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**
    **http://www.springframework.org/schema/tx** **http://www.springframework.org/schema/tx/spring-tx-3.0.xsd">**


    **<!-- The rest of the config is covered below -->**


    **</beans>**


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    This tells the XML parser that we want to use the following schemas as part of
    our configuration:


    • The default Spring **beans** schema


    • The **p** schema, which reduces the verbosity of setting properties


    • The **tx** schema for transaction management


    Because we’re using the **p** namespace, we can configure Spring values more simply.
    For example, using **p:url** has the same effect as using the **<property name="url"
    value="…">** XML fragment. You can also use the **p** namespace to create references.


    Next, let’s set up an in-memory H2 database datasource:


    **<bean id="dataSource"**


    **class="org.apache.commons.dbcp.BasicDataSource"**


    **destroy-method="close"**


    **p:driverClassName="org.h2.Driver"**


    **p:url="jdbc:h2:mem:gallery;DB_CLOSE_DELAY=-1"**


    **p:username="sa"**


