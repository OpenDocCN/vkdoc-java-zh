    我们可以依赖 Spring 将 DAO 依赖注入到服务层类中，确保这种集成以一致的方式进行，并且这两层之间的集成点是通过接口而非具体实现类。正如本章前面所述，这是利用
    Spring 依赖注入的一个基本概念：通过面向接口编程，我们能获得更多价值。我们始终可以依赖 Spring 自动注入所需的依赖，但通过使用接口，我们获得了在运行时更改注入实现的额外好处。如果没有接口，就没有其他选择——我们必须硬编码哪些依赖需要注入到组件中。接口与
    Spring 的依赖注入能力是一对动态组合，能显著提高灵活性。例如，无需更改任何代码，你就可以选择为单元测试注入一组依赖，而为生产部署注入另一组依赖。或者，你可以为每个环境选择使用哪些实现。这些都是遵循最佳实践并利用
    Spring 框架所带来的好处。


    **测试持久层**


    正如你将在后续章节中看到的，这种关注点分离有助于保持代码整洁，并确保一个层的细节不会干扰另一层的代码。当需要重构时，这一优势可能非常显著。或许更重要的是，这些最佳实践对于确保有效的测试策略至关重要。在第
    8 章中，你将学习 Spring 如何极大地简化单元测试和集成测试的创建。在测试方面，直观地理解交换实现如何派上用场是相当容易的。Spring 3 包含一个强大的
    TestContext 框架，它简化了单元测试和集成测试的创建与管理——甚至抽象掉了你碰巧使用的测试框架。集成测试通常可能很棘手，尤其是当你考虑实例化所有测试依赖和组件的细节时。


    例如，集成测试可能需要访问数据库以及测试数据。Spring 可以引导 **ApplicationContext**，然后自动注入任何所需的依赖。在测试持久化相关代码的情况下，你可以选择让数据在事务范围内发生，然后在测试完成时自动回滚事务，以确保测试所做的修改被移除。


    高级特性与性能调优


    本书还将涵盖一些更高级的持久化概念，这些概念在大多数应用中都是不可或缺的，例如加载和管理领域模型中复杂关系与集合的优化技术。我们将讨论性能和优化策略，例如急加载和缓存（在领域层和更高抽象层面）。正如我们之前提到的，Hibernate
    提供了许多可用于提升应用性能的特性。例如，Hibernate 和 JPA 为调优 HQL/JPQL 和 Criteria API 查询提供了极大的灵活性。


    这些特性使开发者能够最大限度地减少与数据库的往返次数，从而允许仅用最少的 SQL 查询就能访问甚至是大数据集。Hibernate 还提供了诸如懒加载和强大的缓存机制等特性，这些机制可以被调优以控制缓存实体的大小和过期时间。理解这些特性如何工作，以及用于控制它们的众多选项，对于最大化性能至关重要。


    缓存是一个经常被忽视的特性，它可能会阻止应用发挥其全部潜力。就缓存而言，要么没有被充分利用，要么没有投入足够的时间和精力进行调优和测试。然而，如果未经调优，缓存可能会显著降低应用性能。在第
    10 章中，你将学习 Hibernate 缓存的工作原理、调优和提升性能的策略，以及如何集成缓存提供者（如 ehcache）。我们还将探讨几个导致性能问题的常见陷阱，例如
    *N+1 查询* 问题，以及如何识别和解决这些问题。


    Hibernate-Search


    有时，你的应用会需要 Hibernate 或 Spring 无法提供的功能。因此，我们将讨论一些扩展 Spring 和 Hibernate 的重要框架，例如
    Hibernate-Search。Hibernate-Search 将流行的开源搜索框架 Lucene 集成到 Hibernate 或 JPA 应用中。对于需要真正搜索功能的需求，关系型数据库无法提供
    Lucene 所能提供的能力。Hibernate-Search 将 Lucene 无缝集成到你的持久层中，允许你在 Hibernate Session 或
    JPA Persistence Context 范围内执行 Lucene 查询。在第 10 章中，你将学习这种集成的工作原理，以及 Lucene 和 Hibernate-Search
    提供的功能范围。


    构建 REST Web 服务


    由于许多应用将 Spring 和 Hibernate 作为 Web 应用的一部分，我们将探讨与构建 Web 应用相关的一些潜在问题和解决方案。我们将开发一个基于
    REST 的 Web 服务，以探索一些在 Java 与 JSON 或 XML 之间编组领域实体的策略。我们将研究诸如 Dozer 之类的框架，这些框架有助于减少与序列化对象图和处理潜在的
    **LazyInitializationException** 相关的一些复杂性。


    其他持久化设计模式


    Spring 基于久经考验的设计模式，这些模式在简化代码和减少维护方面大有裨益。既然我们正在讨论应用的一些核心构建块，让我们来看看 Spring 架构中常用的一些更流行的模式。


    ■ **注意** 你将在本书中看到许多这些模式的实际应用，但了解一下那本推广使用模式来解决面向对象编程中重复问题的开创性著作可能会很有用。


    这本著名的书是《设计模式：可复用面向对象软件的基础》，作者是 Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides（Addison-Wesley，1994
    年）。这四位作者及其相关的模式，常常被戏称为“四人帮”。


    模板模式


    模板模式是 Spring 的 ORM 框架集成包中最常用的惯用法之一。Spring 为每个最流行的持久化框架都提供了模板，使得将代码移植到不同的持久化实现变得容易。Spring
    框架还使用模板模式来更有效地集成 JMS、定义事务行为以及提供外发电子邮件消息能力等。

    '
- fmt: "# Template Pattern\n\nThe Template pattern allows a template to be defined\
    \ in which a series of standard steps are followed, delegating to a subclass for\
    \ those operations that are specific to the business logic. For example, when\
    \ working with Hibernate, it is first necessary to create and initialize a new\
    \ Hibernate session and optionally begin a transaction, before executing any Hibernate\
    \ operations. When the operations are completed, it is necessary to close the\
    \ session, and optionally commit or rollback the transaction. It would be rather\
    \ redundant to repeat these same steps each time it was necessary to interface\
    \ with Hibernate. Instead, we can leverage Spring’s `HibernateTemplate` or `JpaTemplate`\
    \ abstractions, which handle these steps for us. Although using these template\
    \ support classes is an effective approach, we will explore alternative options\
    \ later in this book.\n\nTypically, a template is defined as an abstract class.\
    \ To specify the operations to be wrapped within the templated workflow, we extend\
    \ the template class, providing or extending the implementations for the abstract\
    \ methods defined in the template parent class.\n\nThe Template pattern does exactly\
    \ what its name implies: it extracts boilerplate and redundant tasks into a template,\
    \ delegating to your specific implementation for functionality that can’t be templated.\
    \ In most cases, the code that cannot go in a template is your persistence logic\
    \ itself. Using the Template pattern means you can focus on the database operations,\
    \ without needing to worry about some of these mundane details:\n\n- Opening a\
    \ database connection\n- Beginning a transaction\n- Wrapping your SQL operations\
    \ in try-catch blocks (to handle unexpected exceptions)\n- Committing or rolling\
    \ back a transaction\n- Closing the database connection (and handling any exceptions\
    \ during this process)\n- Catching any exceptions that might occur in the transaction\n\
    \nWithout using Spring, much of your code has little to do with your persistence\
    \ logic, but is the same boilerplate code required by each and every operation.\n\
    \nSpring’s `HibernateTemplate` and `JpaTemplate` offer a series of convenience\
    \ methods to streamline much of the common persistence-related functionality.\
    \ For example, the `HibernateTemplate` provides some useful methods such as:\n\
    \n- `saveOrUpdate(Object entity)`\n- `load(class entityClass, Serializable id)`\n\
    - `find(String hqlQuery)`\n- `findByCriteria(DetachedCritieria criteria)`\n- `delete(Object\
    \ entity)`\n\n`HibernateTemplate` offers quite a few more methods, as well as\
    \ numerous permutations of some of the methods listed above. However, these convenience\
    \ methods aren’t direct examples of the template pattern. Rather, they are more\
    \ like wrapper methods, which delegate to the core template method found in Spring’s\
    \ `HibernateTemplate` abstraction:\n\n```\npublic Object execute(HibernateCallback\
    \ action) throws DataAccessException {\n    return doExecute(action, false, false);\n\
    }\n```\n\nTo execute a series of Hibernate operations, ensuring that they occur\
    \ within the necessary templated steps (such as initializing and closing a Hibernate\
    \ session), we need to create an anonymous implementation of the `HibernateCallback`\
    \ interface, which is the single parameter to the preceding `execute` method.\
    \ For example, to save an entity to the database, we could do the following:\n\
    \n```\npublic void customSavePerson(Person person) {\n    getHibernateTemplate().execute(\n\
    \        new HibernateCallback() {\n            public Object doInHibernate(Session\
    \ session) throws HibernateException {\n                session.saveOrUpdate(person);\n\
    \            }\n        }\n    );\n}\n```\n\nOf course, it would be a lot simpler\
    \ to just use `HibernateTemplate`’s `save(Object entity)` method. Yet in this\
    \ contrived example, we define an implementation of the `HibernateCallback` interface,\
    \ which uses the passed-in `Session` to persist the `Person` entity to the database.\
    \ Typically, this type of lower-level persistence functionality would be part\
    \ of a DAO class, which helps to abstract the Hibernate-specific code from the\
    \ rest of the application.\n\nAlthough the `HibernateTemplate` and `JpaTemplate`\
    \ provide an effective construct for streamlining persistence operations, they\
    \ are no longer as necessary as they once were. Hibernate 3 shipped with a feature\
    \ called Contextual Sessions, which provides greater flexibility around the scope\
    \ of a `Session`. Part of what Spring’s ORM support provides is the facilitation\
    \ of a conversation surrounding persistence behavior, allowing Hibernate and JPA\
    \ operations to be seamlessly integrated into Spring’s transactional support.\
    \ Spring’s transactional features couldn’t be properly utilized if every Hibernate\
    \ operation created a new `Session` and a new database connection. To tie multiple\
    \ lower-level persistence operations into a holistic “conversation,” Spring uses\
    \ the capabilities of `ThreadLocal`, allowing disparate operations to be scoped\
    \ across a continuous thread. Recent versions of Hibernate provide a pluggable\
    \ mechanism for defining how accessing the current Session should work. This new\
    \ capability makes the `HibernateTemplate` and `JpaTemplate` a bit redundant in\
    \ some circumstances. We will discuss the benefits and drawbacks of Spring’s ORM\
    \ templates in the next few chapters.\n\n> **Note** Spring can be used for both\
    \ JTA-managed transactions and local resource transactions. In a JTA environment,\
    \ transactions are managed by the container, and offer additional behavior, such\
    \ as distributed transactions. However, there is additional overhead for leveraging\
    \ JTA transactions, and we recommend going with lighter-weight, local transactions\
    \ if your application doesn’t require the features provided by JTA. One of the\
    \ advantages of using Spring is that switching between locally-managed transactions\
    \ and JTA is just a matter of configuration. In the case of JTA, Spring will simply\
    \ delegate to JTA, rather than manage the contextual state across an application\
    \ thread.\n\n# The Active-Record Pattern\n\nThe DAO pattern isn’t the only strategy\
    \ for performing data operations. Another approach that has started to garner\
    \ more attention recently is the Active-Record pattern. Active-Record is a design\
    \ pattern popularized by frameworks such as Ruby on Rails and Grails, and takes\
    \ a different approach than abstracting persistence functionality into a separate\
    \ layer. Instead, Active-Record attempts to blend a domain object’s behavior directly\
    \ into the domain class itself.\n\nTypically, an instance of a particular domain\
    \ class represents a single row within the respective database table. To save\
    \ changes to the instance (and thereby the appropriate row within the database),\
    \ a `save` instance method is called directly on the instance. To delete an instance,\
    \ we can simply invoke `delete()` on the instance that needs to be deleted. Query\
    \ operations are usually invoked as static methods on the domain class itself.\
    \ For example, in Grails, to find all `Person` entities with a `lastName` property\
    \ of `Fisher`, we could call `Person.findAllByLastName('Fisher')`.\n\nThe benefit\
    \ of Active-Record is that it provides an intuitive and concise approach for performing\
    \ persistence operations, and usually reduces code overhead significantly. Active-Record\
    \ also attempts to combine behavior and properties into a domain object, providing\
    \ a more object-oriented approach. You will learn more about the Active-Record\
    \ pattern in Chapter 11, when we discuss Grails.\n\n# Summary\n\nThroughout this\
    \ book, we will demonstrate how Spring integrates with key persistence frameworks\
    \ and strategies. Along the way, you will learn more about Spring’s features and\
    \ capabilities, and some of the key design patterns it uses to get the job done\
    \ effectively."
  raw: 'The Template pattern allows a template to be defined in which a series of
    standard steps are followed, delegating to a subclass for those operations that
    are specific to the business logic. For example, when working with Hibernate,
    it is first necessary to create and initialize a new Hibernate session and optionally
    begin a transaction, before executing any Hibernate operations. When the operations
    are completed, it is necessary to close the session, and optionally commit or
    rollback the transaction. It would be rather redundant to repeat these same steps
    each time it was necessary to interface with Hibernate. Instead, we can leverage
    Spring’s **HibernateTemplate** or **JpaTemplate** abstractions, which handle these
    steps for us. Although using these template support classes is an effective approach,
    we will explore alternative options later in this book.


    Typically, a template is defined as an abstract class. To specify the operations
    to be wrapped within the templated workflow, we extend the template class, providing
    or extending the implementations for the abstract methods defined in the template
    parent class.


    The Template pattern does exactly what its name implies: it extracts boilerplate
    and redundant tasks into a template, delegating to your specific implementation
    for functionality that can’t be templated. In most cases, the code that cannot
    go in a template is your persistence logic itself. Using the Template pattern
    means you can focus on the database operations, without needing to worry about
    some of these mundane details:


    • Opening a database connection


    • Beginning a transaction


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    • Wrapping your SQL operations in try-catch blocks (to handle unexpected exceptions)


    • Committing or rolling back a transaction


    • Closing the database connection (and handling any exceptions during this process)


    • Catching any exceptions that might occur in the transaction


    Without using Spring, much of your code has little to do with your persistence
    logic, but is the same boilerplate code required by each and every operation.


    Spring’s HibernateTemplate and JpaTemplate offer a series of convenience methods
    to streamline much of the common persistence-related functionality. For example,
    the HibernateTemplate provides some useful methods such as:


    • ***saveOrUpdate(Object entity)***


    • ***load(class entityClass, Serializable id)***


    • ***find(String hqlQuery)***


    • ***findByCriteria(DetachedCritieria criteria)***


    • ***delete(Object entity)***


    HibernateTemplate offers quite a few more methods, as well as numerous permutations
    of some of the methods listed above. However, these convenience methods aren’t
    direct examples of the template pattern. Rather, they are more like wrapper methods,
    which delegate to the core template method found in Spring’s **HibernateTemplate**
    abstraction:


    **public Object execute(HibernateCallback action) throws DataAccessException {**


    **return doExecute(action, false, false);**


    **}**


    **To execute a series of Hibernate operations, ensuring that they occur within
    the necessary templated steps (such as initializing and closing a Hibernate session),
    we need to create an anonymous implementation of the **HibernateCallback** interface,
    which is the single parameter to the preceding


    ***execute*** method. For example, to save an entity to the database, we could
    do the following:


    ****public void customSavePerson(Person person) {**


    **getHibernateTemplate().execute(**


    **new HibernateCallback() {**


    **public Object doInHibernate(Session session) throws HibernateException {**


    **session.saveOrUpdate(person);**


    **}**


    **}**


    **);**


    **}**


    **Of course, it would be a lot simpler to just use **HibernateTemplate**’s **save(Object
    entity)** method.


    Yet in this contrived example, we define an implementation of the **HibernateCallback**
    interface, which uses the passed-in **Session** to persist the **Person** entity
    to the database. Typically, this type of lower-level 13


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    persistence functionality would be part of a DAO class, which helps to abstract
    the Hibernate-specific code from the rest of the application.


    Although the **HibernateTemplate** and **JpaTemplate** provide an effective construct
    for streamlining persistence operations, they are no longer as necessary as they
    once were. Hibernate 3 shipped with a feature called Contextual Sessions, which
    provides greater flexibility around the scope of a **Session**. Part of what Spring’s
    ORM support provides is the facilitation of a conversation surrounding persistence
    behavior, allowing Hibernate and JPA operations to be seamlessly integrated into
    Spring’s transactional support. Spring’s transactional features couldn’t be properly
    utilized if every Hibernate operation created a new **Session** and a new database
    connection. To tie multiple lower-level persistence operations into a holistic
    “conversation,” Spring uses the capabilities of **ThreadLocal**, allowing disparate
    operations to be scoped across a continuous thread. Recent versions of Hibernate
    provide a pluggable mechanism for defining how accessing the current Session should
    work. This new capability makes the **HibernateTemplate** and **JpaTemplate**
    a bit redundant in some circumstances. We will discuss the benefits and drawbacks
    of Spring’s ORM templates in the next few chapters.


    ■ **Note** Spring can be used for both JTA-managed transactions and local resource
    transactions. In a JTA environment, transactions are managed by the container,
    and offer additional behavior, such as distributed transactions. However, there
    is additional overhead for leveraging JTA transactions, and we recommend going
    with lighter-weight, local transactions if your application doesn’t require the
    features provided by JTA. One of the advantages of using Spring is that switching
    between locally-managed transactions and JTA is just a matter of configuration.
    In the case of JTA, Spring will simply delegate to JTA, rather than manage the
    contextual state across an application thread.


    The Active-Record Pattern


    The DAO pattern isn’t the only strategy for performing data operations. Another
    approach that has started to garner more attention recently is the Active-Record
    pattern. Active-Record is a design pattern popularized by frameworks such as Ruby
    on Rails and Grails, and takes a different approach than abstracting persistence
    functionality into a separate layer. Instead, Active-Record attempts to blend
    a domain object’s behavior directly into the domain class itself.


    Typically, an instance of a particular domain class represents a single row within
    the respective database table. To save changes to the instance (and thereby the
    appropriate row within the database), a **save** instance method is called directly
    on the instance. To delete an instance, we can simply invoke **delete()** on the
    instance that needs to be deleted. Query operations are usually invoked as static
    methods on the domain class itself. For example, in Grails, to find all **Person**
    entities with a **lastName** property of **Fisher**, we could call **Person.findAllByLastName(''Fisher'')**.


    The benefit of Active-Record is that it provides an intuitive and concise approach
    for performing persistence operations, and usually reduces code overhead significantly.
    Active-Record also attempts to combine behavior and properties into a domain object,
    providing a more object-oriented approach. You will learn more about the Active-Record
    pattern in Chapter 11, when we discuss Grails.


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    Summary


    Throughout this book, we will demonstrate how Spring integrates with key persistence
    frameworks and strategies. Along the way, you will learn more about Spring’s features
    and capabilities, and some of the key design patterns it uses to get the job done
    effectively.'
  trans: '

    模板模式允许定义一个模板，其中包含一系列标准步骤，并将那些特定于业务逻辑的操作委托给子类。例如，在使用 Hibernate 时，首先需要创建并初始化一个新的
    Hibernate 会话，并可选地开启一个事务，然后才能执行任何 Hibernate 操作。当操作完成后，需要关闭会话，并可选地提交或回滚事务。如果每次与
    Hibernate 交互时都重复这些相同的步骤，将会相当冗余。相反，我们可以利用 Spring 的 **HibernateTemplate** 或 **JpaTemplate**
    抽象，它们为我们处理了这些步骤。虽然使用这些模板支持类是一种有效的方法，但我们将在本书后面探讨其他替代方案。


    通常，模板被定义为一个抽象类。为了指定要封装在模板化工作流中的操作，我们扩展模板类，提供或扩展在模板父类中定义的抽象方法的实现。


    模板模式正如其名：它将样板代码和冗余任务提取到模板中，并将无法模板化的功能委托给你的具体实现。在大多数情况下，无法放入模板的代码正是你的持久化逻辑本身。使用模板模式意味着你可以专注于数据库操作，而无需担心一些琐碎的细节：


    • 打开数据库连接

    • 开始一个事务

    • 将你的 SQL 操作包装在 try-catch 块中（以处理意外异常）

    • 提交或回滚事务

    • 关闭数据库连接（并处理此过程中的任何异常）

    • 捕获事务中可能发生的任何异常


    如果不使用 Spring，你的大部分代码与持久化逻辑关系不大，而是每个操作都需要的相同样板代码。


    Spring 的 HibernateTemplate 和 JpaTemplate 提供了一系列便捷方法来简化许多常见的持久化相关功能。例如，HibernateTemplate
    提供了一些有用的方法，例如：


    • ***saveOrUpdate(Object entity)***

    • ***load(class entityClass, Serializable id)***

    • ***find(String hqlQuery)***

    • ***findByCriteria(DetachedCritieria criteria)***

    • ***delete(Object entity)***


    HibernateTemplate 还提供了更多的方法，以及上述某些方法的众多变体。然而，这些便捷方法并非模板模式的直接示例。相反，它们更像是包装方法，委托给
    Spring 的 **HibernateTemplate** 抽象中的核心模板方法：


    **public Object execute(HibernateCallback action) throws DataAccessException {**

    **return doExecute(action, false, false);**

    **}**


    **要执行一系列 Hibernate 操作，并确保它们在必要的模板化步骤（例如初始化和关闭 Hibernate 会话）内发生，我们需要创建 **HibernateCallback**
    接口的匿名实现，该接口是上述 **execute** 方法的唯一参数。例如，要将一个实体保存到数据库，我们可以这样做：


    **public void customSavePerson(Person person) {**

    **getHibernateTemplate().execute(**

    **new HibernateCallback() {**

    **public Object doInHibernate(Session session) throws HibernateException {**

    **session.saveOrUpdate(person);**

    **}**

    **}**

    **);**

    **}**


    当然，直接使用 **HibernateTemplate** 的 **save(Object entity)** 方法会简单得多。然而，在这个刻意构造的例子中，我们定义了
    **HibernateCallback** 接口的一个实现，它使用传入的 **Session** 将 **Person** 实体持久化到数据库。通常，这种较低级别的持久化功能将是
    DAO 类的一部分，这有助于将 Hibernate 特定的代码与应用程序的其余部分隔离开来。


    尽管 **HibernateTemplate** 和 **JpaTemplate** 为简化持久化操作提供了有效的结构，但它们已不再像过去那样必要。Hibernate
    3 附带了一个称为上下文会话（Contextual Sessions）的功能，它为 **Session** 的作用域提供了更大的灵活性。Spring 的 ORM
    支持所提供的部分功能是促进围绕持久化行为的“会话”，允许 Hibernate 和 JPA 操作无缝集成到 Spring 的事务支持中。如果每个 Hibernate
    操作都创建一个新的 **Session** 和新的数据库连接，那么 Spring 的事务特性就无法得到正确利用。为了将多个较低级别的持久化操作绑定到一个整体的“会话”中，Spring
    使用了 **ThreadLocal** 的能力，允许不同的操作在连续的线程范围内进行作用域划分。较新版本的 Hibernate 提供了一种可插拔机制，用于定义如何访问当前
    Session。这种新能力使得 **HibernateTemplate** 和 **JpaTemplate** 在某些情况下显得有些多余。我们将在接下来的几章中讨论
    Spring ORM 模板的优缺点。


    ■ **注意** Spring 既可以用于 JTA 管理的事务，也可以用于本地资源事务。在 JTA 环境中，事务由容器管理，并提供额外的行为，例如分布式事务。然而，利用
    JTA 事务会有额外的开销，如果你的应用程序不需要 JTA 提供的功能，我们建议使用更轻量级的本地事务。使用 Spring 的优势之一是，在本地管理的事务和
    JTA 之间切换只是一个配置问题。在 JTA 的情况下，Spring 将简单地委托给 JTA，而不是在应用程序线程中管理上下文状态。


    Active-Record 模式


    DAO 模式并非执行数据操作的唯一策略。另一种最近开始获得更多关注的方法是 Active-Record 模式。Active-Record 是一种由 Ruby
    on Rails 和 Grails 等框架推广的设计模式，它采用了与将持久化功能抽象到单独层中不同的方法。相反，Active-Record 试图将领域对象的行为直接融合到领域类本身中。


    通常，特定领域类的一个实例代表相应数据库表中的一行。要保存对该实例的更改（从而保存到数据库中的相应行），可以直接在实例上调用 **save** 实例方法。要删除一个实例，我们可以简单地在需要删除的实例上调用
    **delete()**。查询操作通常作为静态方法在领域类本身上调用。例如，在 Grails 中，要查找所有 **lastName** 属性为 **Fisher**
    的 **Person** 实体，我们可以调用 **Person.findAllByLastName(''Fisher'')**。


    Active-Record 的好处在于它提供了一种直观且简洁的方法来执行持久化操作，并且通常能显著减少代码开销。Active-Record 还试图将行为和属性结合到一个领域对象中，提供一种更面向对象的方法。你将在第
    11 章讨论 Grails 时了解更多关于 Active-Record 模式的内容。


    总结


    在本书中，我们将演示 Spring 如何与关键的持久化框架和策略集成。在此过程中，你将了解更多关于 Spring 的特性和能力，以及它用来有效完成工作的一些关键设计模式。

    '
- fmt: '# 使用 Spring、Hibernate 和模式架构应用程序


    直到几年前，简单的 Java 数据库连接（JDBC）还是实现应用程序持久化层最流行的选择之一。然而，EJB 和开源 ORM 框架（如 Hibernate）显著改变了持久化领域的格局，它们允许开发者专注于基于
    Java 的领域模型，在保持 Java 面向对象语义的同时，仍然能够处理 SQL 数据库的关系型概念。ORM 提供了一种抽象层次，通过将应用程序代码与关系数据库的底层细节解耦，从而提高了灵活性。


    然而，事情并不总是看起来那么简单。ORM 并非没有缺点和后果。首先，正如我们之前提到的，面向对象的 Java 世界与关系型 SQL 世界之间存在阻抗不匹配。ORM
    框架（如 Hibernate）通过提供在 SQL 和 Java 之间进行映射的广泛选项，尽力解决这种不匹配。尽管如此，这两个领域之间的根本差异将始终存在，因此无法完全解决。


    尽管存在这些局限性，ORM 框架通过简化开发者与关系数据库交互的方式，提供了无与伦比的优势。例如，Hibernate 引入了辅助功能，如缓存和懒加载，这些功能可以在几乎不增加编码工作量的情况下显著提升应用程序的性能。Hibernate
    和 JPA 还提供了无缝生成数据库模式甚至使其与基于 Java 的领域模型保持同步的工具。这些特性使得应用程序代码与数据库之间的集成更加无缝——以至于你常常会忘记自己正在使用数据库！


    Spring 以 IoC 容器为核心，通过处理将一个依赖与另一个依赖集成所需的细节，帮助降低应用程序的复杂性以及类之间的耦合度。Spring 还提供了事务行为、AOP
    能力以及用于众多持久化框架（如 Hibernate 和 JPA）的基础设施类。


    Hibernate 是一个 ORM 框架，旨在在关系数据库与面向对象开发领域之间进行转换。Hibernate 提供了查询接口，使用 Hibernate 查询语言（HQL）或
    Hibernate Criteria API。Spring 和 Hibernate 共同构成了一对强大的组合，能够简化依赖协作、降低耦合度，并为持久化操作提供抽象。


    JPA 是 Java 的持久化标准，其设计深受 Hibernate 开发者的影响。Hibernate 可以作为 JPA 的实现提供者，允许你遵循标准并获得框架的可移植性，同时仍然利用优秀的
    Hibernate 实现。然而，有些有用的功能在 JPA 中不可用，仅存在于 Hibernate 实现中。随着 JPA 2.0 的发布，JPA 规范的许多局限性得到了解决，使
    Hibernate 和 JPA 更加对等。例如，JPA 2.0 现在提供了 Criteria API，用于以面向对象的方式进行查询，并支持编译时检查。


    在本章中，我们概述了典型持久化层的基础层次结构，该结构由领域模型、DAO 层和服务外观组成。我们还讨论了一些 Spring 框架利用的集成设计模式，例如模板设计模式。尽管遵循持久化层的典型基础层次结构通常是最佳方法，但一些较新的框架采用了略有不同的策略，例如使用
    Active-Record 模式。


    在下一章中，我们将基于本章介绍的概念和模式，逐步构建一个使用 Spring 和 Hibernate 的 Gallery 应用程序。在本书的后续内容中，我们的目标是阐述经过时间考验且实用的最佳实践，希望您也能在自己的应用程序中使用这些实践。


    ## 第 1 章：使用 Spring、Hibernate 和模式架构应用程序


    在开始编码之前，理解一些核心的 Spring 和 Hibernate 概念非常重要。因此，在下一章中，您将学习 Spring 的架构和能力，例如依赖注入、AOP
    以及与持久化相关的特性。


    # 第 2 章：Spring 基础


    Spring 框架起源于 Rod Johnson 的著作《Expert One-on-One J2EE Design and Development》（Wrox，2002
    年）的配套代码。这本书吸引了大量开发者的追随，他们在 Wrox 论坛上讨论这本书及其对应的代码。其中两位开发者，Juergen Hoeller 和 Yann
    Caroff，说服 Rod 将代码转变为开源项目。这本书将该框架称为 Interface21 框架，因为 Rod 认为它代表了企业级 Java 开发的未来——一个面向二十一世纪的框架。


    然而，在开源项目成立时，他们认为需要一个更能激励社区的名称。Yann 建议使用 Spring，因为它与自然相关，并且 Spring 代表了传统 J2EE 开发“寒冬”之后的新开始。该项目于
    2003 年公开，Spring Framework 1.0 版本于 2004 年发布。


    自那时起，Spring 被广泛采用，因为它兑现了简化开发的承诺，同时解决了一些非常复杂的问题。Spring 声名鹊起的另一个关键因素是其卓越的文档。许多开源项目因缺乏完善的文档而逐渐被遗忘。Spring
    的文档从项目早期就非常成熟。


    尽管有些人可能会声称，Spring 框架目前并非标准。标准技术非常出色，Sun 在推动基于标准的 Java 技术进入主流方面功不可没。标准允许您做诸如在 Tomcat
    上开发 Web 应用程序，然后将其部署到 WebSphere 中，而几乎无需调整（至少在理论上是这样）。但是，尽管 Spring 框架如今非常流行，它并不代表一个真正的标准。


    有些人认为 Spring 是事实上的标准，因为依赖它的应用程序数量庞大。Spring 提供了一种以一致的方式集成应用程序各个组件的方法，并且它被广泛部署在各种应用程序生态系统中。有时，这种标准实现比标准规范更有价值。


    尽管有些反对者对于使用任何不是由大型企业志愿者委员会设计的技术嗤之以鼻，但在您的应用程序中使用 Spring 几乎没有风险。事实上，您越多地利用 Spring
    将组件集成到应用程序中，您的集成策略就会越一致，从而使维护和开发更加容易。没错——依赖 Spring 通常会带来更好、更清晰、更解耦的代码。


    由于 Spring 是一个庞大的框架，并且其文档非常出色，我们无意涵盖所有内容。相反，本章将作为本书后续内容所依赖的最重要概念的快速概述。


    ## 第 2 章：Spring 基础


    ### 探索 Spring 的架构


    Spring 由一系列模块组成。这种设计的美妙之处在于，您可以选择使用所需的组件。没有单一的 JAR 文件。相反，您可以显式地将所需的组件添加到项目依赖中。'
  raw: 'Until several years ago, simple Java Database Connectivity (JDBC) was one
    of the most popular choices for implementing an application’s persistence tier.
    However, EJB and open source ORM


    frameworks such as Hibernate have significantly changed the persistence landscape,
    by allowing developers to focus on a Java-based domain model, maintaining the
    object-oriented semantics of Java while still working with the relational concepts
    of a SQL database. ORM offers a level of abstraction that affords increased flexibility
    by decoupling application code from the lower-level details of a relational database.


    However, things aren’t always as easy as they seem. ORM is not without its drawbacks
    and consequences. First, as we mentioned earlier, there is the impedance mismatch
    between the object-oriented Java world and the relational SQL world. ORM frameworks,
    such as Hibernate, do their best to address this mismatch by offering extensive
    options for mapping between SQL and Java. Nevertheless, fundamental differences
    between these two spheres will always exist, and therefore can’t be fully addressed.


    Despite some of these limitations, ORM frameworks offer unparalleled benefits
    by streamlining the way in which developers work with a relational database. For
    instance, Hibernate introduces ancillary features, such as caching and lazy loading,
    which can improve the performance of an application dramatically with little or
    no additional coding effort. Hibernate and JPA also provide tools to seamlessly
    generate database schemas and even keep them in sync with the Java-based domain
    model. These features make the integration between application code and database
    even more seamless—to the point that it is often possible to forget that you are
    using a database altogether!


    With an IoC container at its core, Spring helps to reduce application complexity,
    as well as coupling between classes, by handling the details necessary to integrate
    one dependency with another. Spring also provides transactional behavior, AOP
    capability, and infrastructural classes for numerous persistence frameworks, such
    as Hibernate and JPA.


    Hibernate is an ORM framework intended to translate between relational databases
    and the realm of object-oriented development. Hibernate provides a querying interface,
    using Hibernate Query Language (HQL) or the Hibernate Criteria API. Together,
    Spring and Hibernate are a dynamic duo, capable of simplifying dependency collaboration,
    reducing coupling, and providing abstractions over persistence operations.


    JPA is a Java standard for persistence, the design of which was significantly
    influenced by the Hibernate developers. Hibernate can be used as an implementation
    provider for JPA, allowing you to adhere to standards and gain framework portability,
    while still utilizing the excellent Hibernate implementation. However, there are
    some useful features that are not available in JPA, but are present only in the
    Hibernate implementation. With the release of JPA 2.0, many of the limitations
    of the JPA spec have been addressed, bringing more parity to Hibernate and JPA.
    For instance, JPA 2.0 now provides a Criteria API for querying in an object-oriented
    manner, and compile-time checking.


    In this chapter, we outlined the foundational layers of a typical persistence
    tier, which is composed of the domain model, the DAO layer, and the service facade.
    We also discussed some integral design patterns leveraged by the Spring Framework,
    such as the Template design pattern. Although adhering to the typical foundational
    layers for your persistence tier is usually the best approach, some newer frameworks
    follow slightly different strategies, such as using the Active-Record pattern.


    In the next chapter, we will build on the concepts and patterns introduced in
    this chapter as we incrementally build a Gallery application using Spring and
    Hibernate. Over the course of this book, it is our aim to illustrate time-tested
    and pragmatic best practices that we hope you will be able to use in your own
    applications as well.


    CHAPTER 1 ■ ARCHITECTING YOUR APPLICATION WITH SPRING, HIBERNATE, AND PATTERNS


    Before we start coding, it’s important to understand some of the core Spring and
    Hibernate concepts. So in the next chapter you will learn about Spring’s architecture
    and capabilities, such as dependency injection, AOP, and persistence-related features.


    **C H A P T E R 2**


    ■ ■ ■


    **Spring Basics**


    The Spring Framework has its origins in the companion code for Rod Johnson’s book,
    *Expert One-on-One J2EE Design and Development* (Wrox, 2002). The book developed
    a strong following of developers, who used the Wrox forums to discuss both the
    book and the corresponding code. Two of those developers, Juergen Hoeller and
    Yann Caroff, persuaded Rod to turn the code into an open source project. The book
    referred to the framework as the Interface21 framework, because Rod felt that
    it represented the future of enterprise Java development—a framework for the twenty-first
    century.


    However, when the open source project was formed, they felt they needed a name
    that could better inspire a community. Yann suggested Spring because of the association
    with nature, as well as the fact that Spring represented a fresh start after the
    “winter” of traditional J2EE development. The project went public in 2003, and
    version 1.0 of the Spring Framework was released in 2004.


    Since then, Spring has been widely adopted because it delivers on the promise
    of simpler development while also tackling some very intricate problems. Another
    key to Spring’s rise to prominence is its exceptional documentation. Many open
    source projects have faded into oblivion because of the lack of sound documentation.
    Spring’s documentation has been very mature since the very early days of the project.


    Despite what some may claim, the Spring Framework is not currently a standard.
    Standard technologies are great, and Sun deserves a lot of credit for pushing
    standards-based Java technologies into the mainstream. Standards allow you to
    do things like develop your web application on Tomcat and then drop it into WebSphere,
    with little adjustment required (at least theoretically). But even though the
    Spring Framework is unbelievably popular today, it does not represent a true standard.


    Some consider Spring a *de facto standard*, due to the sheer volume of applications
    that rely on it.


    Spring provides a means for integrating the various components of your application
    in a consistent way, and it is deployed far and wide across a variety of application
    ecosystems. Sometimes, this type of *standard implementation* is a far more valuable
    proposition than a *standard specification*.


    Despite the naysayers that balk at the idea of using any technology that wasn’t
    designed by a giant committee of corporate volunteers, using Spring in your application
    poses little risk. In fact, the more you utilize Spring for integrating components
    into your application, the more consistent your integration strategy will be,
    making maintenance and development easier. That’s right—reliance on Spring will
    often lead to better, cleaner, decoupled code.


    Because Spring is such a large framework, and because the documentation is so
    good, we have no intention of covering it all. Instead, this chapter will serve
    as a quick overview of the most important concepts that we build on in the rest
    of this book.


    CHAPTER 2 ■ SPRING BASICS


    Exploring Spring’s Architecture


    Spring is composed of a series of modules. The beauty of this design is that you
    can pick and choose the components that you would like to use. There’s no monolithic
    JAR file. Instead, you explicitly add the components that you want to your project
    dependencies.'
  trans: '

    直到几年前，简单的 Java 数据库连接（JDBC）还是实现应用程序持久化层最流行的选择之一。然而，EJB 和诸如 Hibernate 之类的开源 ORM
    框架显著改变了持久化领域的格局，它们允许开发者专注于基于 Java 的领域模型，在保持 Java 面向对象语义的同时，仍然能够处理 SQL 数据库的关系型概念。ORM
    提供了一种抽象层次，通过将应用程序代码与关系型数据库的底层细节解耦，从而带来了更高的灵活性。


    然而，事情并不总是看起来那么简单。ORM 并非没有缺点和后果。首先，正如我们之前提到的，面向对象的 Java 世界与关系型的 SQL 世界之间存在阻抗不匹配。像
    Hibernate 这样的 ORM 框架通过提供在 SQL 和 Java 之间进行映射的广泛选项，尽力解决这种不匹配。尽管如此，这两个领域之间的根本差异将永远存在，因此无法完全解决。


    尽管存在这些局限性，ORM 框架通过简化开发者与关系型数据库交互的方式，提供了无与伦比的优势。例如，Hibernate 引入了辅助功能，如缓存和延迟加载，这些功能可以在几乎不增加编码工作量的情况下显著提升应用程序的性能。Hibernate
    和 JPA 还提供了无缝生成数据库模式，甚至使其与基于 Java 的领域模型保持同步的工具。这些特性使得应用程序代码与数据库之间的集成更加无缝——以至于你常常会忘记自己正在使用数据库！


    Spring 以 IoC 容器为核心，通过处理将一个依赖与另一个依赖集成所需的细节，帮助降低应用程序的复杂性以及类之间的耦合度。Spring 还为众多持久化框架（如
    Hibernate 和 JPA）提供了事务行为、AOP 能力以及基础设施类。


    Hibernate 是一个 ORM 框架，旨在实现关系型数据库与面向对象开发领域之间的转换。Hibernate 使用 Hibernate 查询语言（HQL）或
    Hibernate Criteria API 提供查询接口。Spring 和 Hibernate 共同构成了一对黄金搭档，能够简化依赖协作、降低耦合度，并为持久化操作提供抽象。


    JPA 是 Java 的持久化标准，其设计深受 Hibernate 开发者的影响。Hibernate 可以作为 JPA 的实现提供者，允许你遵循标准并获得框架的可移植性，同时仍然利用优秀的
    Hibernate 实现。然而，JPA 中缺少一些有用的特性，这些特性仅存在于 Hibernate 实现中。随着 JPA 2.0 的发布，JPA 规范的许多局限性得到了解决，使
    Hibernate 和 JPA 更加对等。例如，JPA 2.0 现在提供了一个 Criteria API，用于以面向对象的方式进行查询和编译时检查。


    在本章中，我们概述了典型持久化层的基础层次，该层次由领域模型、DAO 层和服务外观组成。我们还讨论了一些 Spring 框架利用的集成设计模式，例如模板设计模式。尽管遵循持久化层的典型基础层次通常是最佳方法，但一些较新的框架采用了略有不同的策略，例如使用
    Active-Record 模式。


    在下一章中，我们将基于本章介绍的概念和模式，逐步构建一个使用 Spring 和 Hibernate 的 Gallery 应用程序。通过本书，我们的目标是阐述经过时间考验且实用的最佳实践，希望您也能在自己的应用程序中使用它们。


    第 1 章 ■ 使用 Spring、Hibernate 和模式架构您的应用程序


    在我们开始编码之前，理解一些 Spring 和 Hibernate 的核心概念非常重要。因此，在下一章中，您将了解 Spring 的架构和能力，例如依赖注入、AOP
    和持久化相关特性。


    **第 2 章**


    ■ ■ ■


    **Spring 基础**


    Spring 框架起源于 Rod Johnson 的著作《Expert One-on-One J2EE Design and Development》（Wrox，2002
    年）的配套代码。这本书吸引了大量开发者的追随，他们在 Wrox 论坛上讨论这本书及其对应的代码。其中两位开发者，Juergen Hoeller 和 Yann
    Caroff，说服 Rod 将代码转变为开源项目。这本书将该框架称为 Interface21 框架，因为 Rod 认为它代表了企业级 Java 开发的未来——一个面向二十一世纪的框架。


    然而，当开源项目成立时，他们觉得需要一个更能激励社区的名字。Yann 建议使用 Spring，因为它与自然相关，并且 Spring 代表了在传统 J2EE
    开发的“寒冬”之后的新开始。该项目于 2003 年公开，Spring 框架 1.0 版本于 2004 年发布。


    自那时起，Spring 被广泛采用，因为它兑现了简化开发的承诺，同时解决了一些非常复杂的问题。Spring 声名鹊起的另一个关键因素是其卓越的文档。许多开源项目因缺乏完善的文档而逐渐被遗忘。Spring
    的文档从项目早期就非常成熟。


    尽管有些人可能会声称，但 Spring 框架目前并非标准。标准技术很棒，Sun 公司在推动基于标准的 Java 技术成为主流方面功不可没。标准允许你做一些事情，比如在
    Tomcat 上开发 Web 应用程序，然后将其部署到 WebSphere 中，几乎不需要调整（至少在理论上是这样）。但是，尽管 Spring 框架如今非常流行，它并不代表一个真正的标准。


    有些人认为 Spring 是*事实上的标准*，这得益于依赖它的应用程序数量庞大。


    Spring 提供了一种以一致的方式集成应用程序各个组件的方法，并且它被广泛部署在各种应用程序生态系统中。有时，这种*标准实现*比*标准规范*更有价值。


    尽管有些反对者对于使用任何不是由大型企业志愿者委员会设计的技术嗤之以鼻，但在你的应用程序中使用 Spring 几乎没有风险。事实上，你越是利用 Spring
    将组件集成到应用程序中，你的集成策略就越一致，从而使维护和开发更加容易。没错——依赖 Spring 通常会带来更好、更清晰、更解耦的代码。


    由于 Spring 是一个如此庞大的框架，并且其文档非常出色，我们无意涵盖所有内容。相反，本章将快速概述我们在本书其余部分中构建的最重要的概念。


    第 2 章 ■ Spring 基础


    探索 Spring 的架构


    Spring 由一系列模块组成。这种设计的美妙之处在于，你可以挑选并选择你想要使用的组件。没有单一的 JAR 文件。相反，你可以显式地将你想要的组件添加到项目依赖中。

