    At first glance, the **ArtEntityDTO** looks very similar to the **ArtEntity**
    domain class. On closer inspection, however, you will notice that we’ve removed
    a few references. We no longer have a dependency on any of the classes in the
    **ArtData** hierarchy. Instead, we have replaced references to a particular **ArtData**
    subclass with a **String** that will contain a URL to the relevant image (instead
    of a wrapper class that contains image metadata and the binary image data itself).


    The **ArtEntityDTO** also omits the many-to-many association to the **Category**
    domain class. This means we won’t be able to directly access the associated categories
    of a particular **ArtEntity** instance. In our application, this isn’t a critical
    requirement. We will be able to access the **ArtEntity** instances associated
    with a particular **Category** by accessing a **Category** instance directly and
    navigating to its child **ArtEntity** instances.'
