    table, we just call **person.save()** directly on the **person** instance we wish
    to save. If we want to load a particular **Person** record from the database,
    we simply call the static method **Person.get(id)**, passing in the primary key
    for the record we wish to retrieve.


    Contrast this approach with the DAO pattern, in which we need to create a separate
    abstraction layer for all database operations related to a particular domain entity.
    The Active Record pattern dramatically simplifies our effort for retrieving and
    persisting data, since there is no need to define any DAO classes or methods.
    Instead, this functionality is implicit within our domain model through dynamic
    behavior that is injected into each domain class.


    If we don’t need to define a DAO implementation, where do the implementations
    for methods like **Person.get(id)** and **Person.save()** come from? The Active
    Record pattern states that we should simply be able to define a domain model and
    begin calling methods on these classes to achieve the persistence logic we are
    trying to build. The question remains, however: if we can simply call **save()**
    on our **Person** instance, where do we define the behavior for this method? Let’s
    take a look under the hood of GORM to get a better sense of how this works.


    Looking Under the Hood of GORM


    One of the key advantages to languages like Groovy is that they are dynamic, which
    means, among other things, that you are able to define new behavior for your classes
    at any time. In the case of Grails and the Active Record pattern, the framework
    is able to enhance your domain model with new functionality related to persistence.
    This strategy is a key Groovy concept and is enabled through the use of Groovy’s
    **metaClass** construct, as discussed earlier in this chapter.


    Working with Dynamic Finder Methods


    Grails injects new functionality into every domain model class to facilitate the
    Active Record pattern.


    Unlike with the DAO approach, no methods need to be defined up front. Instead,
    Grails uses naming conventions to interpret how to interact with the database.
    Using the name of the method invoked, Grails intuits what type of operation to
    perform. This is best explained through a few examples.'
