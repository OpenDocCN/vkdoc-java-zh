  trans: '

    5. 布莱恩的事务 T2 **提交**。


    6. 玛丽启动一个新事务 T3，并向 **ArtEntity** 表**插入**一件新的艺术品。


    7. 仍在同一事务 T1 中的保罗，第三次**查询** **ArtEntity** 表中的所有艺术品。


    8. 玛丽的 T3 事务**提交**。


    9. 仍在同一事务 T1 中的保罗，第四次**查询** **ArtEntity** 表中的所有艺术品。


    10. 保罗的事务 T1 最终**提交**。


    保罗在第四步应该看到什么？第七步和第九步呢？你的数据库供应商会有默认行为定义，但重要的是，你要知道通过选择你偏好的事务隔离级别，你可以完全控制结果。让我们看看四种隔离级别如何影响这个场景。


    可序列化


    最容易理解的隔离级别是可序列化，它要求完全隔离。如果我们选择可序列化作为隔离级别，那么在保罗开始一个新事务之前，他永远不会看到布莱恩或玛丽的任何更改。从保罗的角度来看，数据库始终保持完全一致，没有任何副作用；保罗的查询四次都会看到相同的结果，因为它们都发生在一个与任何其他修改隔离的单一事务中。这听起来很理想，对吧？那还有什么好讨论的呢？不幸的是，这种设置会带来大量开销。


    使用可序列化会大大减少可能发生的并发操作数量，并可能导致涉及数据库锁的严重性能问题。因此，可序列化隔离级别应谨慎使用，仅在用例确实需要绝对一致性，并且可以接受并发事务可能被迫因错误而中止的风险时使用。


    可重复读


    在我们的场景中，通过使用可重复读隔离级别来稍微放宽隔离性，将允许保罗看到任何已提交的插入，但看不到更新或删除。为了保证同一行的重复读取保持一致，底层数据库通常会实现行级共享读锁或多版本控制。在此隔离级别设置下，保罗在场景中的任何时刻都不会看到布莱恩的更新或删除。然而，在第九步玛丽提交事务后，保罗会看到她的插入。这种副作用——在单个事务（T1）中，之前（第四步和第七步）不可见的新插入并已提交的行，在保罗的查询（第九步）中变得可见——被称为幻读。


    第 7 章 ■ 事务管理


    读已提交


    读已提交是大多数关系数据库管理系统供应商（包括 Oracle 和 PostgreSQL）使用的默认隔离级别。此隔离级别规定，事务只能读取数据库中已提交的数据。选择读已提交时，保罗将看到布莱恩或玛丽在其各自事务完成并提交后所做的任何更改。这提供了一定的数据一致性，同时仍能实现高并发性。与可重复读隔离级别一样，保罗仍然容易受到幻读的影响。与可重复读隔离级别的情况一样，保罗在第九步的查询将返回一个在其事务中之前不可见的新记录。选择读已提交时，保罗还会面临第二种类型的副作用：不可重复读。当在同一事务中重复读取同一行返回不同的数据时，就会发生不可重复读。这在第五步布莱恩的更新和删除被提交后成为可能。与可序列化或可重复读隔离级别下的情况不同，这些行级修改在第七步对保罗变得可见，尽管保罗之前已经读取过这两行，并且他仍然处于其第一个也是唯一一个事务
    T1 的上下文中。


    如有疑问，请选择读已提交。


    读未提交

    '
- fmt: "# Transaction Isolation Levels\n\nOn the polar opposite end of the spectrum\
    \ from serializable is the `read uncommitted` isolation level. If we employ `read\
    \ uncommitted` for our scenario, there will be no transactional isolation whatsoever.\n\
    \nConsequently, Paul’s first three identical queries will all return different\
    \ results. If Mary’s commit in step eight succeeds, Paul’s fourth query will return\
    \ the same results as his third query.\n\nAt step four, Paul sees Brian’s typo\
    \ correction (SQL `UPDATE`) as well as the removal he performed (SQL `DELETE`)\
    \ before Brian’s transaction commits. This third side effect is commonly referred\
    \ to as a dirty read because Paul is reading in tentative data. If Brian’s commit\
    \ fails at step five, forcing his transaction to roll back, the data Paul is looking\
    \ at will be rendered completely inaccurate. Reading in Mary’s insert at step\
    \ seven, prior to her commit, is also representative of a dirty read because that\
    \ too represents tentative data.\n\nChoosing the `read uncommitted` isolation\
    \ level exposes you to all three of the possible side effects.\n\nIntuitively,\
    \ this represents a strategy that is not ideal. However, there is a silver lining\
    \ with the `read uncommitted` isolation level. Because this isolation level offers\
    \ the highest degree of concurrency, one can expect each of Paul, Brian, and Mary’s\
    \ SQL operations to be incredibly fast. You might adopt this isolation level when\
    \ you need to emphasize speed and you’re confident that your application can cope\
    \ with the side effects. As with `serializable`, `read uncommitted` should only\
    \ be considered for fringe use cases.\n\n# Controlling ACID Reflux\n\nTransactions\
    \ define how and when data is committed to a database. They are indispensable\
    \ in grouping persistence logic together, ensuring that all methods complete successfully\
    \ or that the database is rolled back to its previous state. For most operations,\
    \ you also need to be concerned with transactional details, ensuring that transactions\
    \ are started at the beginning of an operation and are either committed or rolled\
    \ back when the operation completes. Spring enables these features through three\
    \ core concepts:\n\n- **Platform transaction management** refers to Spring’s abstraction\
    \ for handling commits and rollbacks. Frameworks like Hibernate and iBatis have\
    \ their own transaction implementations. Furthermore, transactions typically operate\
    \ differently in a testing environment than within an EJB server. Spring’s platform\
    \ transaction management abstraction hides these details, allowing developers\
    \ to specify transactional rules in a consistent manner.\n\n- **Declarative transaction\
    \ management** allows developers to specify the transactional requirements for\
    \ a particular method through metadata or configuration. Obviously, the code to\
    \ set up, commit, and roll back a given transaction is still being executed. However,\
    \ these details may be separated from the code itself and externalized into configuration\
    \ files or annotations.\n\n- **Programmatic transaction management** explicitly\
    \ controls the transaction through code. Spring provides a `TransactionTemplate`\
    \ class that can greatly simplify the code required to apply transactional semantics\
    \ to a given method. However, this approach requires that transactional details\
    \ be blended with business logic and requires your code to directly interact with\
    \ the Spring APIs.\n\nWe’ll look at each of these types of transaction in the\
    \ following sections.\n\n## Platform Transaction Management\n\nSpring offers several\
    \ `TransactionManager` implementations, each of which fills the role of managing\
    \ transactions. `TransactionManager` instances typically extend the `AbstractPlatformTransactionManager`\
    \ class, which in turn implements the `PlatformTransactionManager` interface.\
    \ These classes form the foundation of Spring’s transactional support, and provide\
    \ the know-how to access, initiate, rollback, and commit transactions. The interface\
    \ looks like this:\n\n```\npublic interface PlatformTransactionManager {\n   \
    \ TransactionStatus getTransaction(TransactionDefinition definition) throws TransactionException;\n\
    \    void commit(TransactionStatus status) throws TransactionException;\n    void\
    \ rollback(TransactionStatus status) throws TransactionException;\n}\n```\n\n\
    There are quite a few `TransactionManager` implementations. For example, the `DataSourceTransactionManager`\
    \ is used for JDBC and iBATIS implementations. For our purposes, we are predominantly\
    \ interested in Spring’s ORM-based `TransactionManager` implementations: `HibernateTransactionManager`\
    \ and `JpaTransactionManager`.\n\nYou’ll even find `TransactionManager` implementations\
    \ for JTA used by EJB. JTA is typically used to enable transactions to span across\
    \ multiple databases and even disparate technologies, such as Java Message Service\
    \ (JMS). These include the generic `JtaTransactionManager` and implementations\
    \ for specific EJB servers like `OC4JJtaTransactionManager` for Oracle’s server,\
    \ `WebLogicJtaTransactionManager` for BEA’s server, and `WebSphereUowTransactionManager`\
    \ for IBM’s server.\n\nBy adding the `<tx:jta-transaction-manager/>` XML tag to\
    \ your Spring configuration, you can empower Spring to determine which JTA transaction\
    \ manager to use, based on runtime information, so that you don’t need to explicitly\
    \ reference the platform-specific details in your configuration.\n\nYou might\
    \ have noticed the `TransactionStatus` and `TransactionDefinition` interfaces\
    \ that are part of the `PlatformTransactionManager` interface. You rarely need\
    \ to use these interfaces yourself. They are set up by Spring’s declarative transaction\
    \ management (discussed in the next section), but they are still worth knowing\
    \ about, as these details help to explain how Spring’s transactional features\
    \ work under the hood.\n\n- **`TransactionStatus`**: Encapsulates key information\
    \ related to an actively running transaction, such as whether a new transaction\
    \ has been created and whether the transaction should be rolled back or committed.\
    \ It also allows the transaction to be marked as `Rollback-Only`. Setting a running\
    \ transaction to be `Rollback-Only` tells the transaction system that the transaction\
    \ should be rolled back. For example, in the event of an error condition, you\
    \ might write code to call `setRollbackOnly()` on a `TransactionStatus` instance,\
    \ which will ensure that the actively running transaction is rolled back.\n\n\
    - **`TransactionDefinition`**: Defines the ACID properties we talked about earlier,\
    \ including details such as the isolation rules for the transaction, whether your\
    \ transaction will perform any writes (or is read-only), how long the transaction\
    \ is allowed to run before timing out, and how to handle transaction propagation.\n\
    \nWe will learn more about how these classes are used later in this chapter when\
    \ we discuss programmatic transaction management.\n\n## Declarative Transaction\
    \ Management\n\n*Declarative programming* employs metadata to define the requirements\
    \ for a particular set of application logic, rather than coding the steps that\
    \ define this behavior directly. Typically, you use declarative programming within\
    \ the context of a framework, which is designed to analyze the metadata in order\
    \ to tailor its behavior accordingly. Using declarative transaction management,\
    \ therefore, implies that you define the rules or attributes that compose your\
    \ transactions’ behavior, rather than interspersing this logic directly in your\
    \ code. As you can probably guess, Spring applies these cross-cutting concerns\
    \ to your code by leveraging its excellent AOP support. However, because transactions\
    \ are such a prevalent and critical feature, the AOP details are a bit abstracted\
    \ to provide a clearer and more transaction-specific approach."
