    This directive will ensure that Spring loads and manages all of our application''s
    DAO classes. As part of this process, Spring will inject the correct **EntityManager**
    instance into the respective DAOs, as expressed by the **@PersistenceContext**
    annotation.


    The following settings allow our environment to perform JPA transactions. This
    very basic configuration is required for our JPA application to be able to update
    data.


    CHAPTER 4 ■ PERSISTENCE WITH HIBERNATE


    **<bean id="transactionManager"**


    **class="org.springframework.orm.jpa.JpaTransactionManager"**


    **p:entityManagerFactory-ref="entityManagerFactory"/>**


    ****<tx:annotation-driven mode="aspectj" transaction-manager="transactionManager"/>**
    As you’ve seen, there is a fair amount involved for JPA configuration, but it’s
    definitely worth the effort for the amount of functionality that is delivered!


    Summary


    Frameworks like Spring and Hibernate provided a means to solve some complex enterprise
    challenges.


    The critical difference between EJB 2.0 and frameworks like Spring and Hibernate
    is that this complexity is an option that you can elect to utilize, rather than
    an integral component of the framework architecture that you are forced to embrace.


    In this chapter, you took a stroll down memory lane to see how persistence has
    evolved in the Java ecosystem, and now have a firmer understanding of the terminology
    as well as the distinctions between specifications and implementations. You’ve
    learned that you can have an application that uses many permutations of specifications
    and implementations. For instance, you can build a single application that uses
    EJB 3.0 for a distributed component-based architecture, with JPA for persistence
    powered by Hibernate as the JPA implementation. You also got a feel for the domain
    model and DAO structure that underpins our art gallery example application. Finally,
    you learned quite a lot about setting up a JPA application in a Spring environment.
    You are now armed with enough information to get a JPA application working.


    In the next chapter, we’ll continue building the domain model for our art gallery
    application.


    **C H A P T E R 5**


    ■ ■ ■


    **Domain Model Fundamentals**


    The domain model is the foundation upon which a persistence tier is constructed.
    Each domain class defines the properties to be persisted to the database, as well
    as the relationships between one class and another. This rich object-oriented
    structure is not easily translated to the relational world of databases.


    Hibernate provides the required mechanism to help address this impedance mismatch
    between these two realms.


    Mapping is the process through which you provide hints to Hibernate regarding
    how the properties and references in your domain classes are translated to tables,
    fields, and associations in your database.


    When Hibernate first appeared on the scene, developers used XML (called **.hbm.xml**
    files) to specify a domain model’s mapping rules. With the release of the JPA
    specification came a series of annotations that can be applied to your domain
    classes, providing similar types of hints to the XML mapping files.


    Hibernate’s strength is the ease with which developers can begin building a persistence
    tier. The first step is usually to define your domain model using simple JavaBeans
    (or POJOs). In the previous chapter, we introduced several core classes that compose
    the root of our application’s domain model. In this chapter, we will build on
    this foundation, introducing some additional classes.


    Understanding Associations


    In Chapter 4, we introduced our art gallery domain model and created the **Person**
    entity. We mentioned that the **ArtEntity** class will represent artwork, images,
    and photos in our gallery application. We also said that our domain model will
    include a **Comment** class, which will represent an individual comment about
    a particular **ArtEntity**.


    An **ArtEntity** will naturally contain multiple comments to allow for an unlimited
    number of site visitors to add their own comments about the particular piece of
    art they are viewing. Although an **ArtEntity** may contain many **Comment** instances,
    a given **Comment** can reference only a single **ArtEntity**, as typically a
    comment is intended to relate to a particular piece of content within the gallery
    application.


    The association between an **ArtEntity** and its **Comment** instances is best
    described as a *one-to-many* relationship. Inversely, the relationship between
    a **Comment** and its associated **ArtEntity** is known as a *many-to-one* association.
    Because each entity is able to reference the other, the association is considered
    to be *bidirectional*. If one entity is able to reference another entity, but
    the inverse is not true, this is considered a *unidirectional* association.


    Whether you should use unidirectional or bidirectional associations depends on
    your application.


    However, if you don’t have a specific requirement to use bidirectional associations,
    it can be easier to stick with a unidirectional approach, as bidirectional associations
    can require circular references and may end up complicating marshaling or serialization
    implementations.


    CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS


    It’s always important to consider the way in which the domain model and its relationships
    will be translated into a database schema, even when ORM abstractions often handle
    these details for us. The **ArtEntity** and **Comment** association will require
    two tables: an **Art_Entity** table and a **Comment** table. An **ArtEntity**
    instance will then be associated with a **Comment** through a foreign key reference
    to the **Art_Entity** in the **Comment** table, as illustrated in Figure 5-1.


    *Figure 5-1\. The relationship between the ArtEntity and Comment tables* Our gallery
    application will also require a **Category** class to represent a category into
    which a particular **ArtEntity** may be placed (to help organize artwork and photos
    into logical groups). Each **Category** may contain more than one **ArtEntity**
    instance. Similarly, each **ArtEntity** may be placed into multiple **Category**
    entities. This type of association is normally referred to as *many-to-many*.
    The many-to-many association is a bit more complicated than the one-to-many relationship.
    The best way to model this type of relationship in the database is to use a *join
    table*. A join table simply contains foreign keys from the two related tables,
    allowing rows in the two tables to be associated with each other.


    Figure 5-2 illustrates this relationship.


    *Figure 5-2\. The relationship between the ArtEntity and Category tables* 70


    CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS


    Although it is important to have a clear understanding of your domain model’s
    table structure, Hibernate can take care of creating these database-specific details
    for you. Instead, you need to focus on the definition of the classes and the way
    they relate to each other from an object-oriented standpoint.


    Developers have different philosophies on the best way to go about defining a
    Hibernate domain model. Some developers believe it is best to define a database
    schema first, and then create the classes to match the database structure. Obviously,
    there is no wrong way (provided your application works reliably) to go about this
    process. However, in our experience, we have achieved the best results by defining
    the Hibernate mappings first, allowing us to consider the Java classes and the
    database table structure in tandem.


    With JDK 1.5 and Hibernate 3, the definition of Hibernate mapping files in XML
    is no longer necessary. Of course, you are welcome to continue following this
    more verbose methodology, and for many developers, externalizing the specifics
    of the database mapping is very much a good thing.'
