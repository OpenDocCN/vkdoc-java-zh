- fmt: "# 排版后的文档\n\nAdditionally, Lucene is able to track the frequency of a particular\
    \ token, its position in relation to other tokens, and its offset within the original\
    \ content from which it was extracted. This metadata is extremely valuable for\
    \ a host of search features.\n\n## CHAPTER 10 ■ INTEGRATION FRAMEWORKS\n\nLucene\
    \ provides a series of options to customize how a particular field is indexed.\
    \ For instance, it might be more ideal for some fields to be tokenized, while\
    \ others should have their content preserved in its original form. In the music\
    \ library example, you would probably want to tokenize the `notes` field, since\
    \ you would want to be able to search for a particular word or phrase contained\
    \ in your notes.\n\nHowever, you would not want to tokenize the track’s file name,\
    \ as this data makes sense only as a complete, unmodified unit.\n\nLucene also\
    \ allows you to specify whether the original content for a particular field is\
    \ stored. For instance, while you might not want to tokenize a track’s file name,\
    \ you would definitely want to store this data. Then when a particular document\
    \ is returned as part of a search result list, you could access the file name\
    \ directly so that the application could work with this data (for instance, to\
    \ play the track or locate it on your file system).\n\n## Querying with Lucene\n\
    \nLucene includes a powerful querying API, providing a flexible way to specify\
    \ the fields and terms for which to search, along with the ability to define Boolean\
    \ and grouping expressions.\n\nThe simplest Lucene query might look like the following:\n\
    \n```\ncupcake\n```\n\nThis would search for the term `cupcake` on the default\
    \ field. The default field is typically specified in the `QueryParser`, a Lucene\
    \ class used to parse a user-defined query expression into a `Query` instance.\n\
    \nMore often, a Lucene query will target one or more fields, such as in the following\
    \ example:\n\n```\nnotes:cupcake AND album:Pepper\n```\n\nThis will return all\
    \ documents in which the word `cupcake` is contained in the `notes` field and\
    \ the word `Pepper` is contained in the `album` field. It is also possible to\
    \ define this query as follows:\n\n```\n+notes:cupcake +album:Pepper\n```\n\n\
    As you can see, you can define Boolean `AND` expressions by using the `+` prefix\
    \ or by using the `AND` keyword. In Lucene, a Boolean `OR` is the default, so\
    \ you can simply specify multiple expressions together:\n\n```\nnotes:cupcake\
    \ album:Pepper\n```\n\nOr you can explicitly include the `OR` keyword:\n\n```\n\
    notes:cupcake OR album:Pepper\n```\n\nIf you want to insist that a search should\
    \ not include a particular term, you can prefix it with a minus (`-`) character.\
    \ For example, if you wanted to ensure that your search results did not contain\
    \ any tracks played by the Beatles, you could use the following query:\n\n```\n\
    notes:cupcake AND album:Pepper –artist:\"The Beatles\"\n```\n\nThis query will\
    \ look for a note containing the word `cupcake` and an album containing the word\
    \ `Pepper`, but the track artist can’t be The Beatles. Notice the quotes around\
    \ “The Beatles” to indicate that the `artist` field must match the entire phrase.\
    \ So, if the artist name was specified as just Beatles, you could still end up\
    \ with a Beatles track in your search results. To prevent this scenario, you could\
    \ just use `Beatles`, without the quotation marks.\n\nBut what if you wanted to\
    \ ensure that a misspelled artist attribution on a track in your library wouldn’t\
    \ affect the intention of your searches? To address this problem, you can use\
    \ a tilde (`~`) character, which lets Lucene know that you want to allow a fuzzy\
    \ match:\n\n```\n(track:\"Fixing a Hole\" OR track:\"Hey Jude\") AND artist:Beatles~\n\
    ```\n\nThis query expresses your intention for a fuzzy search on the `artist`\
    \ field. Now, even if the artist attribution in your library is spelled as “Beetles,”\
    \ it will likely be included in your search results. Notice also the use of parentheses\
    \ to group the first part of the query. This grouping specifies that the query\
    \ should return tracks that match either title, provided they both are by the\
    \ artist Beatles.\n\nIf you wanted to ensure that your results contain only tracks\
    \ released within a particular date range, you could take advantage of Lucene’s\
    \ date-range querying capability:\n\n```\nartist:Rol* AND releaseDate:[5/18/1975\
    \ TO 5/18/2010]\n```\n\nThis query will find any track with a release date between\
    \ May 18, 1975, and May 18, 2010, as long as the artist name starts with `Rol`.\
    \ The wildcard modifier (`*`) indicates that you want to match an artist given\
    \ the specified prefix.\n\nThe preceding query examples should give you a sense\
    \ of some of the things possible with Lucene query expressions. You will learn\
    \ shortly how to parse these expressions into a Lucene `Query`. Of course, it’s\
    \ also possible to define queries programmatically, and doing so can often provide\
    \ you with more flexibility. However, defining an expression using some of the\
    \ conventions shown in these examples can give your design more clarity.\n\n##\
    \ Introducing Hibernate Search\n\nHibernate Search is a framework that extends\
    \ Hibernate in order to provide seamless integration with Apache Lucene. It is\
    \ possible for developers to integrate Lucene into their applications directly.\n\
    \nHowever, if your goal is to index the data within your domain classes, then\
    \ it is a nontrivial problem to make this integration work reliably such that\
    \ changes made to your domain model are automatically reflected in your index.\
    \ Additionally, it is important that updates to the Lucene index occur within\
    \ the context of a Hibernate operation.\n\nFor example, imagine if a domain class\
    \ was updated as part of a DAO method, and within this method, a call was made\
    \ to Lucene to trigger an update to the Lucene index. While this setup may work,\
    \ what would happen if the domain class update was made within the context of\
    \ a transaction, and suddenly the transaction was rolled back? Most likely, the\
    \ database and the Lucene index would fall out of sync.\n\nHibernate Search attempts\
    \ to solve these sort of problems, offering an implementation that integrates\
    \ Lucene into the Hibernate life cycle and that respects the transactional boundaries\
    \ to ensure the respective resources stay in sync.\n\n## Integrating Hibernate\
    \ Search\n\nLet’s consider the search requirements of our image gallery application.\
    \ Users will likely want to be able to find images by caption, author, title,\
    \ or description, and possibly filter results by category or tag. We also want\
    \ to display results in terms of relevance, not just sorted alphabetically or\
    \ by date. What constitutes relevance is an important concern for search features,\
    \ as ultimately, the success of search is based on how expediently users are able\
    \ to find what they are looking for.\n\nTo begin integrating Hibernate Search\
    \ into our art gallery application, we must first update our Maven `pom.xml` to\
    \ include the necessary dependencies. This is easily accomplished by adding the\
    \ following snippet to our `pom.xml`:\n\n```xml\n<!--Hibernate Search-->\n<dependency>\n\
    \    <groupId>org.hibernate</groupId>\n    <artifactId>hibernate-search</artifactId>\n\
    \    <version>3.2.1.Final</version>\n</dependency>\n```\n\nHibernate Search expects\
    \ a few key configuration properties in order to define some of the basic defaults,\
    \ such as the location of the Lucene index. These properties can be specified\
    \ within the `persistence.xml` file. The following represents the key properties\
    \ to set in order to bootstrap our Hibernate Search integration. The important\
    \ new attributes are in bold.\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    \ standalone=\"no\"?>\n<persistence\n    xsi:schemaLocation=\"http://java.sun.com/xml/ns/persistence\"\
    \n```"
