    \ 这个 `exclude-filter` 被声明用于避免实例化我们的 `@Controller` 类，因为这些类应由 Web 层应用上下文实例化。是的，你没看错：我们的应用实际上会有多个不同的应用上下文。我们将在本章后面介绍通过\
    \ `web.xml` 进行 Web 应用配置时，再详细讨论这一点。\n\n## 导入语句\n\n在 `property-placeholder` 配置器之后，你会注意到我们指定了一个\
    \ `import` 语句：\n\n```\n<import resource=\"spring-datasource.xml\"/>\n```\n\n`import`\
    \ 允许你指定一个外部的 Spring 配置文件，并将其集成到你的应用上下文中。这是一个非常有用的结构，尤其是在我们的演示应用中，因为我们可以轻松地将不同的持久化策略外部化，将每个版本保存在自己的文件中。这些导入还可以通过以下语法引用你的应用类路径：\n\
    \n```\n<import resource=\"classpath*:spring-config-name.xml\"/>\n```\n\n在处理大型应用上下文时，`import`\
    \ 非常宝贵，因为它为组织 bean 定义提供了极大的灵活性。你可以以任意多种方式对应用进行分区，使其对新开发者更易理解，并帮助理解项目随时间的变化。\n\n\
    ## 数据库集成\n\n现在你已经更清楚地了解了 Spring 如何在你的应用中被引导启动，让我们回到集成你选择的数据库这一话题。你已经了解到，Spring\
    \ 对基于接口概念的坚持有助于将实现选择从代码中移出并放入配置中。因此，无论你是选择使用 Java 命名和目录接口（JNDI）工厂 bean 从外部 JNDI\
    \ 目录中拉取数据库引用，还是直接配置特定的数据库驱动程序，你的代码都不会受到任何影响。最终，你总是会得到一个 JDBC `DataSource`，而这正是你的代码需要关心的全部内容。\n\
    \n### JDBC 支持\n\n在我们的示例中，我们将保持简单。让我们首先定义一个 Spring bean，它将创建一个 JDBC `DataSource`\
    \ 实例：\n\n```\n<bean id=\"galleryDataSource\"\n      class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\"\
    >\n    p:driverClassName=\"${jdbc.driverClassName}\"\n    p:url=\"${jdbc.url}\"\
    \n    p:username=\"${jdbc.username}\"\n    p:password=\"${jdbc.password}\"/>\n\
    </bean>\n```\n\n如果我们想更高级一点，可以选择一个流行的数据库连接池作为我们的 bean 实现。连接池对于需要多个并发数据库操作的 Web\
    \ 应用来说是理想的选择。连接池可以针对不同的使用场景进行优化，确保以更高效的方式将新的数据库连接交给应用。再次强调，切换到数据库连接池将使你的应用更高效，而无需更改任何代码。\n\
    \n> **注意**：连接池曾经是开发人员必须自己编写的东西。实际上，使用连接池是一个有趣的衡量标准，可以用来判断工程师编写 Java Web 应用的时间有多长。如果他们编写过自己的连接池，那么他们可能已经从事这项工作很长时间了。由于需要自己编写连接池，每个开源项目最终都产生了独特的连接池实现。幸运的是，所有属于\
    \ Apache 软件基金会的项目共同创建了 `commons-dbcp` 库（`dbcp` 是数据库连接池的缩写）。\n\n请注意，在下面的配置中，我们如何轻松地切换到使用连接池。这得益于面向接口编程、外部化配置以及利用依赖注入。能够如此快速且轻松地做出如此大的改变，真是一种非常令人满意的体验。\n\
    \n```\n<bean id=\"galleryDataSource\"\n      class=\"org.apache.commons.dbcp.BasicDataSource\"\
    >\n    p:driverClassName=\"${jdbc.driverClassName}\"\n    p:url=\"${jdbc.url}\"\
    \n    p:username=\"${jdbc.username}\"\n    p:password=\"${jdbc.password}\"/>\n\
    </bean>\n```\n\n你可能已经注意到，我们的 `DataSource` bean 的 `id` 是 `galleryDataSource`。在大多数企业应用中，你最终会拥有多个数据源。因此，最好的方法是给每个数据源一个唯一的名称，以便更精细地控制应用的哪些部分使用哪个数据源。\n\
    \n另外请注意，我们为 `datasource` bean 指定了 `driverClassName`、`url`、`username` 和 `password`\
    \ 属性。这些属性决定了应用如何连接到给定的数据库。\n\n在 Spring 配置中，我们可以通过 `${}` 表示法使用占位符引用。这些占位符代表存储在\
    \ `jdbc.properties` 文件中的外部值，这些值通过我们的 `PropertyPlaceholderConfigurer` 注入到配置文件中。这个细节并非必需，但它使我们的配置更具可移植性。它允许我们轻松地为不同的机器和平台定义不同的数据库配置，而无需更改\
    \ Spring 配置。例如，以下是 `src/main/resources/META-INF/spring/jdbc.properties` 文件的一个片段：\n\
    \n```\njdbc.url=jdbc\\:h2\\:mem\\:prosh;DB_CLOSE_DELAY\\=-1\njdbc.driverClassName=org.h2.Driver\n\
    jdbc.username=sa\njdbc.password=\n```\n\n语法很直观。每行包含一个简单的表达式，其中左侧代表属性名称，右侧（`=`\
    \ 之后）代表配置的值。这种外部化使得为不同环境交换不同的数据库配置变得容易，并更好地将这些细节从特定于应用的配置中外部化出来。\n\n不同的数据库需要不同的\
    \ JDBC URL。在这个例子中，我们使用了流行的 H2 数据库。H2 是一个基于 Java 的数据库，因此很容易集成到任何基于 Java 的应用中（它不需要单独的数据库进程）。你也可以轻松地使用\
    \ PostgreSQL、MySQL 或任何有 JDBC 驱动可用的数据库。只需确保你的数据库已启动、运行，并配置为监听 bean 配置中指定的 URL。\n\
    \n同样关键的是，在应用首次启动时，你必须在类路径中包含相应的 JDBC 驱动。由于 H2 是基于 Java 的，只需将 H2 JAR 文件包含在你的类路径中，就可以开始运行了。\n\
    \n## 与 JNDI 集成\n\nHibernate 几乎总是意味着一个关系型数据库，因此从这里开始是最合理的。Java 已经发展成为一个构建企业级应用的平台，因此有很多选项可以将其连接到标准的关系型数据库。\n\
    \n在最简单的层面上，你可以实例化所选数据库的数据库驱动程序，但大多数应用需要的远不止这些。许多应用服务器提供自己优化的数据库连接池，以提高多个客户端同时使用应用时的性能。\n\
    \n为了简化管理和集成，许多应用服务器使用 JNDI 来与数据库交互。"
