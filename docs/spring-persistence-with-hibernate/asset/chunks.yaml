    \ working.\n\nIn the next chapter, we’ll continue building the domain model for\
    \ our art gallery application.\n\n## CHAPTER 5 ■ ■ ■ Domain Model Fundamentals\n\
    \nThe domain model is the foundation upon which a persistence tier is constructed.\
    \ Each domain class defines the properties to be persisted to the database, as\
    \ well as the relationships between one class and another. This rich object-oriented\
    \ structure is not easily translated to the relational world of databases.\n\n\
    Hibernate provides the required mechanism to help address this impedance mismatch\
    \ between these two realms.\n\nMapping is the process through which you provide\
    \ hints to Hibernate regarding how the properties and references in your domain\
    \ classes are translated to tables, fields, and associations in your database.\n\
    \nWhen Hibernate first appeared on the scene, developers used XML (called `.hbm.xml`\
    \ files) to specify a domain model’s mapping rules. With the release of the JPA\
    \ specification came a series of annotations that can be applied to your domain\
    \ classes, providing similar types of hints to the XML mapping files.\n\nHibernate’s\
    \ strength is the ease with which developers can begin building a persistence\
    \ tier. The first step is usually to define your domain model using simple JavaBeans\
    \ (or POJOs). In the previous chapter, we introduced several core classes that\
    \ compose the root of our application’s domain model. In this chapter, we will\
    \ build on this foundation, introducing some additional classes.\n\n### Understanding\
    \ Associations\n\nIn Chapter 4, we introduced our art gallery domain model and\
    \ created the `Person` entity. We mentioned that the `ArtEntity` class will represent\
    \ artwork, images, and photos in our gallery application. We also said that our\
    \ domain model will include a `Comment` class, which will represent an individual\
    \ comment about a particular `ArtEntity`.\n\nAn `ArtEntity` will naturally contain\
    \ multiple comments to allow for an unlimited number of site visitors to add their\
    \ own comments about the particular piece of art they are viewing. Although an\
    \ `ArtEntity` may contain many `Comment` instances, a given `Comment` can reference\
    \ only a single `ArtEntity`, as typically a comment is intended to relate to a\
    \ particular piece of content within the gallery application.\n\nThe association\
    \ between an `ArtEntity` and its `Comment` instances is best described as a *one-to-many*\
    \ relationship. Inversely, the relationship between a `Comment` and its associated\
    \ `ArtEntity` is known as a *many-to-one* association. Because each entity is\
    \ able to reference the other, the association is considered to be *bidirectional*.\
    \ If one entity is able to reference another entity, but the inverse is not true,\
    \ this is considered a *unidirectional* association.\n\nWhether you should use\
    \ unidirectional or bidirectional associations depends on your application.\n\n\
    However, if you don’t have a specific requirement to use bidirectional associations,\
    \ it can be easier to stick with a unidirectional approach, as bidirectional associations\
    \ can require circular references and may end up complicating marshaling or serialization\
    \ implementations.\n\n### CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS\n\nIt’s always\
    \ important to consider the way in which the domain model and its relationships\
    \ will be translated into a database schema, even when ORM abstractions often\
    \ handle these details for us. The `ArtEntity` and `Comment` association will\
    \ require two tables: an `Art_Entity` table and a `Comment` table. An `ArtEntity`\
    \ instance will then be associated with a `Comment` through a foreign key reference\
    \ to the `Art_Entity` in the `Comment` table, as illustrated in Figure 5-1.\n\n\
    *Figure 5-1\\. The relationship between the ArtEntity and Comment tables*\n\n\
    Our gallery application will also require a `Category` class to represent a category\
    \ into which a particular `ArtEntity` may be placed (to help organize artwork\
    \ and photos into logical groups). Each `Category` may contain more than one `ArtEntity`\
    \ instance. Similarly, each `ArtEntity` may be placed into multiple `Category`\
    \ entities. This type of association is normally referred to as *many-to-many*.\
    \ The many-to-many association is a bit more complicated than the one-to-many\
    \ relationship. The best way to model this type of relationship in the database\
    \ is to use a *join table*. A join table simply contains foreign keys from the\
    \ two related tables, allowing rows in the two tables to be associated with each\
    \ other.\n\nFigure 5-2 illustrates this relationship.\n\n*Figure 5-2\\. The relationship\
    \ between the ArtEntity and Category tables*\n\n### CHAPTER 5 ■ DOMAIN MODEL FUNDAMENTALS\n\
    \nAlthough it is important to have a clear understanding of your domain model’s\
    \ table structure, Hibernate can take care of creating these database-specific\
    \ details for you. Instead, you need to focus on the definition of the classes\
    \ and the way they relate to each other from an object-oriented standpoint.\n\n\
    Developers have different philosophies on the best way to go about defining a\
    \ Hibernate domain model. Some developers believe it is best to define a database\
    \ schema first, and then create the classes to match the database structure. Obviously,\
