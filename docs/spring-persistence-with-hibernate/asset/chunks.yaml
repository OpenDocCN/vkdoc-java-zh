    Adding Hibernate Search Annotations


    With the configuration out of the way, we need to design our Lucene index, specifying
    the fields within the Lucene document and defining how these fields map to the
    properties within each of our domain classes. Hibernate Search is flexible in
    this regard, and allows you to fine-tune the requirements for every field. However,
    following convention over configuration, the framework includes sensible defaults,
    so you need to deal with only special requirements.


    By default, each domain class that is indexed will be mapped to its own index.
    Each domain class property will map to a Lucene field of the same name, unless
    you choose to override this default. It is also possible to define more than one
    field for a particular domain class property, which is useful if you need to use
    multiple indexing strategies for the same domain class property. For example,
    you might want to have one field that is not tokenized but stores the content
    in its original form, while another field tokenizes the content.


