    Caching


    So far, we have discussed a few strategies for reducing or optimizing trips to
    the database. Even better than improving the ways in which data is queried is
    to preclude the need for accessing the database at all. Obviously, some database
    access is always needed, but caching can go quite a long way toward minimizing
    database load and improving application performance.


    One of Hibernate’s greatest advantages is that it gives developers many features
    “for free.” And one of these free features is implicit caching. If you were to
    decide to implement a persistence layer using 143


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    plain JDBC, you would need to explicitly integrate caching within your DAO methods
    or at some lower level of abstraction. While caching may seem trivial to implement
    on the surface, you will begin to perceive the complexity when you consider the
    rules for invalidation (the factors that cause a particular item in the cache
    to be expired), preventing conflicts, and handling a cached item’s time to live
    (TTL).


    So if Hibernate provides all these caching features for free, what is the benefit
    of understanding the mechanics of caching? Although Hibernate includes some foundational
    caching features, providing basic optimizations to limit any unnecessary trips
    to the database, tuning its default caching behavior can significantly improve
    your application’s performance.


    To be able to leverage caching for improved application performance, you need
    to understand the different layers of caching within Hibernate and what can actually
    be cached. For all domain objects, Hibernate provides two distinct caching levels:


    • The first-level, or L1, cache is provided by the **EntityManager**, and therefore
    relates only to the limited scope of a particular user or request. The first-level
    cache is designed primarily as an optimization, preventing the requerying of domain
    objects that have already been loaded.


    • The second-level, or L2, cache is scoped to the **EntityManagerFactory**, and
    therefore is longer-lived and can provide caching capabilities across multiple
    users and requests. The second-level cache provides the most utility and flexibility
    for optimization through caching.


    So, the approach is to activate the second-level cache and integrate a cache provider
    to start caching. Now we need to consider what can be cached.


    Hibernate caches domain objects in slightly different ways. Each top-level domain
    object is cached within a different region. A *region* is essentially a different
    section or namespace, intended to partition each entity and prevent the potential
    for clashes. Each domain object is persisted to a cache using its identifier as
    the key. So, given a cache region and an identifier, you are able to access the
    data for a particular domain object. Each domain object is cached by storing the
    values of its respective properties.


    However, a domain object’s references and collections are persisted *separately*
    from a domain object. In other words, the cached representation of a domain object
    will reference only the identifiers of its references. For example, many-to-one
    associations will be persisted as a single ID, while a collection will be persisted
    as a list of identifiers. Domain object collections are actually persisted within
    a separate cache region, intended specifically for that particular collection.
    The key in this case is still the parent domain object’s identifier, but the region
    is specific to the domain object and the collection name. The value, however,
    is a list of identifiers, where each identifier in the list corresponds to the
    ID of each entity referenced in the original collection.


    Hibernate uses this strategy because it is more efficient to just store the IDs
    of each entity within a collection, rather than the data of every entity in its
    entirety. The intention is that having the IDs should be enough, since the full
    data should be cached elsewhere, within the referenced domain object’s own cache
    region. Furthermore, caching references as identifiers decouples the domain objects
    to which they relate, ensuring that changes to the referenced domain objects are
    cached only in a single location. This is obviously far simpler than managing
    a complex dependency tree—especially when you begin to consider the complexity
    of invalidating a particular item when it expires or when an update is made to
    the database.


    Integrating a Caching Implementation


    Hibernate provides a generic abstraction layer for caching functionality, allowing
    numerous caching implementations to be easily plugged in to the Hibernate infrastructure.
    There are a variety of excellent 144


    CHAPTER 9 ■ BEST PRACTICES AND ADVANCED TECHNIQUES


    caching solutions, including Ehcache, SwarmCache, JBoss Infinispan, and many more.
    Each caching implementation differs slightly in the feature set it provides. For
    instance, some implementations offer clustering capability, allowing multiple
    nodes within a cluster to share the same caching data (which can reduce the potential
    for cache conflicts and stale data). Some caching solutions provide specialized
    features, such as transactional behavior.


    ■ **Note** The choice of which cache provider to use depends on your requirements.
    Generally, we recommend Ehcache, a flexible open source caching implementation
    that provides clustering capability. If your application has requirements for
    a transactional cache or other specific needs, you should take a look at some
    of the other cache provider choices.


    Let’s revisit our **persistence.xml** configuration and modify it to incorporate
    Ehcache.


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<persistence**


    ****xsi:schemaLocation="http://java.sun.com/xml/ns/persistence**


    ****http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd"**


    **version="2.0">**


    ****<persistence-unit name="galleryPersistenceUnit" transaction-type="RESOURCE_LOCAL">**


    **<provider>org.hibernate.ejb.HibernatePersistence</provider>**


    **<properties>**


    **<property name="hibernate.dialect" value="org.hibernate.dialect.H2Dialect"/>**


    **<!--**


    **value=''create'' to build a new database on each run;** **value=''update'' to
    modify an existing database;**


    **value=''create-drop'' to create and drop tables on each run;** **value=''validate''
    makes no changes to the database**


    **-->**


    **<property name="hibernate.hbm2ddl.auto" value="create"/>**


    **<property name="hibernate.show_sql" value="true"/>**


    <property name="hibernate.cache.use_second_level_cache" value="true"/>


    <property name="hibernate.cache.provider_class"


    value="net.sf.ehcache.hibernate.SingletonEhCacheProvider"/>


    **<property name="hibernate.ejb.naming_strategy"**


    **value="org.hibernate.cfg.ImprovedNamingStrategy"/>**


    **</properties>**


    **</persistence-unit>**


    ****</persistence>**'
