    \ description) {\n    this.description = description;\n}\n\n@Field(index = Index.TOKENIZED,\
    \ store=Store.NO)\npublic String getCaption() {\n    return caption;\n}\n\npublic\
    \ void setCaption(String caption) {\n    this.caption = caption;\n}\n\npublic\
    \ Boolean getGeneralViewable() {\n    return isGeneralViewable;\n}\n\npublic void\
    \ setGeneralViewable(Boolean generalViewable) {\n    isGeneralViewable = generalViewable;\n\
    }\n\npublic Boolean getPrivilegeViewable() {\n    return isPrivilegeViewable;\n\
    }\n\npublic void setPrivilegeViewable(Boolean privilegeViewable) {\n    isPrivilegeViewable\
    \ = privilegeViewable;\n}\n\n@ContainedIn\n@ManyToMany(mappedBy = \"artEntities\"\
    )\npublic Set<Category> getCategories() {\n    return categories;\n}\n\npublic\
    \ void setCategories(Set<Category> categories) {\n    this.categories = categories;\n\
    }\n\n@ContainedIn\n@OneToMany(orphanRemoval = true, cascade = { javax.persistence.CascadeType.ALL\
    \ })\n@Cache(usage = CacheConcurrencyStrategy.NONSTRICT_READ_WRITE)\n```\n\nCHAPTER\
    \ 10 ■ INTEGRATION FRAMEWORKS\n\n```\npublic Set<Comment> getComments() {\n  \
    \  return comments;\n}\n\npublic void setComments(Set<Comment> comments) {\n \
    \   this.comments = comments;\n}\n\n}\n```\n\nThe Hibernate Search annotations\
    \ are fairly intuitive, given the Lucene concepts introduced earlier. Let’s examine\
    \ the additions to this class, one at a time.\n\nFirst, we need to annotate a\
    \ class with the `@Indexed` annotation in order for it to be considered for indexing.\
    \ Next, Hibernate Search requires that the identifier of a domain class be annotated\
    \ with `@DocumentId`. The document ID is used by Hibernate Search to bridge the\
    \ Lucene and Hibernate worlds. In each index, Lucene stores a Hibernate entity’s\
    \ full class name as well as its identifier. Together, they form the basis for\
    \ querying in Hibernate Search, and allow a list of documents returned by a Lucene\
    \ query to be exchanged for a list of active Hibernate entities.\n\nUnless a domain\
    \ class property is annotated with the `@Field` annotation, it will not be indexed.\
    \ The `@Field` annotation specifies that a particular domain class property be\
    \ included in the Lucene index. The annotation takes a few parameters, including\
    \ the ability to override the name of the field. Of most importance, however,\
    \ are the `index` and `store` attributes. These parameters tell Lucene how to\
    \ configure the field.\n\nAs noted earlier, a field can be tokenized, which will\
    \ extract the contents of a particular property into a stream of tokens, leveraging\
    \ a particular analyzer to filter out superfluous words, perform stemming, insert\
    \ synonyms, and possibly perform a range of other options, depending on the analyzer\
    \ used. A field can also be stored, which means that the original content will\
    \ be inserted into the Lucene index. Storing a field can increase the size of\
    \ the index, so it is rarely a good idea for large blocks of text. However, fields\
    \ containing data that may need to be displayed by the application—such as a title,\
    \ file name, or a business identifier—should be marked as stored. Let’s look at\
    \ a few examples:\n\n- In our `ArtEntity` domain class, we have specified that\
    \ the `title` property be stored and tokenized:\n\n```\n@Field(index = Index.TOKENIZED,\
    \ store=Store.YES)\n@Boost(2.0f)\npublic String getTitle() {\n    return title;\n\
    }\n```\n\n- We have specified that the `width` property be left untokenized, but\
    \ still stored:\n\n```\n@Field(index = Index.UN_TOKENIZED, store=Store.YES)\n\
    public Integer getWidth() {\n    return width;\n}\n```\n\nCHAPTER 10 ■ INTEGRATION\
    \ FRAMEWORKS\n\n- We have set the `description` property to be tokenized but not\
    \ stored:\n\n```\n@Field(index = Index.TOKENIZED, store=Store.NO)\npublic String\
    \ getDescription() {\n    return description;\n}\n```\n\nYou probably also noticed\
    \ the use of the `@DateBridge` annotation. Since Lucene typically only manages\
    \ text within its index, Hibernate Search includes a bridge strategy as way to\
    \ convert nontext data into a `String` (and possibly back again). Hibernate Search\
    \ will use the appropriate built-in bridges for mapping fields such as integers\
    \ and longs, but for more complex data types, you can leverage a custom bridge\
    \ or use one of the bridges provided by the framework. For example, we can map\
    \ our `uploadedDate` property in the following way:\n\n```\n@Field(index = Index.UN_TOKENIZED,\
    \ store=Store.YES)\n@DateBridge(resolution = Resolution.MINUTE)\npublic Date getUploadedDate()\
    \ {\n    return uploadedDate;\n}\n```\n\nThis mapping parameterizes the `@DateBridge`\
    \ so that the date value is converted to text that can be lexicographically sorted.\
    \ The date is stored within the Lucene index has a resolution of a minute. For\
    \ performance reasons, you generally want to use the largest resolution setting\
    \ your application can support (for instance, prefer a resolution of `Minute`\
    \ over `Second`, or better yet, `Day` rather than `Minute` or `Hour`).\n\nThe\
    \ `@Boost` annotation can be used to boost the weighting of a particular field\
    \ within the Lucene index. For instance, to have the `title` field be twice as\
    \ relevant as the `description` field, we can specify a boost factor of `2.0`:\n\
    \n```\n@Field(index = Index.TOKENIZED, store=Store.YES)\n@Boost(2.0f)\npublic\
    \ String getTitle() {\n    return title;\n}\n```\n\nIt is also possible to specify\
    \ boost factors within a query, but in cases where you want a consistent boost\
    \ weighting, the `@Boost` annotation can come in handy."
