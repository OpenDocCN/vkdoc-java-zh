- fmt: '5. Brian’s transaction, `T2`, **COMMIT**s.


    6. Mary initiates a new transaction, `T3`, and **INSERT**s a new piece of art
    to the `ArtEntity` table.


    7. Paul, still in his same `T1` transaction, **SELECT**s all pieces of art in
    the `ArtEntity` table a third time.


    8. Mary’s `T3` transaction **COMMIT**s.


    9. Paul, still in his same `T1` transaction, **SELECT**s all pieces of art in
    the `ArtEntity` table a fourth time.


    10. Paul’s transaction, `T1`, finally **COMMIT**s.


    What should Paul see in step four? What about steps seven and nine? Your database
    vendor will have default behaviors defined, but it’s important to know that you
    have absolute control over the outcome by choosing the isolation level you prefer
    for your transactions. Let’s take a look at how the four isolation levels impact
    this scenario.


    ## Serializable


    The easiest isolation level to understand is `serializable`, which mandates complete
    isolation. If we choose `serializable` as our isolation level, Paul will never
    see any of Brian’s or Mary’s changes until Paul begins a new transaction. From
    Paul’s perspective, the database remains completely consistent and there are no
    side effects; Paul will see the same results for his query all four times because
    they all take place within a single transaction that is insulated from any other
    modifications. That sounds pretty ideal, right? So what more is there to talk
    about? Unfortunately, there is a lot of overhead associated with this setting.


    Using `serializable` vastly reduces the number of concurrent operations that may
    occur and can result in nasty performance problems involving database locks. As
    such, the `serializable` isolation level should be used sparingly, when the use
    case really requires absolute consistency and it’s acceptable to risk the chance
    that concurrent transactions may be forced to abort with an error.


    ## Repeatable Read


    Relaxing isolation a bit by employing the `repeatable read` isolation level in
    our scenario would allow Paul to see any inserts that are committed, but not updates
    or deletes. In order to guarantee that rereads of the same row stay consistent,
    the underlying database will ordinarily implement either row-level, shared read
    locks or multiversioning. Under this isolation level setting, Paul would not see
    Brian’s update or delete at any point in the scenario. However, Paul will see
    Mary’s insert at step nine after she has committed her transaction. This side
    effect—where newly inserted and committed rows are visible to Paul’s query (step
    nine) that weren’t visible earlier (steps four and seven) within a single transaction
    (`T1`)—is known as a phantom read.


    ## Read Committed


    `Read committed` is the default isolation level used by most RDBMS vendors, including
    Oracle and PostgreSQL. This isolation level states that a transaction may read
    only data that has been committed in the database. When choosing `read committed`,
    Paul will see any changes made by Brian or Mary after their respective transactions
    have completed and been committed. This provides some data consistency while still
    delivering high concurrency. As with the `repeatable read` isolation level, Paul
    is still susceptible to phantom reads. As was the case with the `repeatable read`
    isolation level, Paul’s query at step nine will return a new record that wasn’t
    visible earlier in his transaction. When choosing `read committed`, Paul is also
    exposed to a second type of side effect; a nonrepeatable read. A nonrepeatable
    read occurs when rereads of the same row return different data within the same
    transaction. This becomes possible after Brian’s update and delete are committed
    in step five. Unlike what happened under the `serializable` or `repeatable read`
    isolation levels, these row level modifications become visible to Paul in step
    seven, even though Paul read these two rows earlier and he’s still in the context
    of his first and only transaction, `T1`.


    When in doubt, choose the `read committed`.


    ## Read Uncommitted'
