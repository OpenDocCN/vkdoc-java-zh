    **Now that we’ve defined our Grails domain model, let’s move on to persisting
    and retrieving this data.


    Using Active Record As an Alternative to DAOs


    Throughout this book, you’ve learned how Spring simplifies the development of
    a persistence tier by enforcing several key design patterns, most notably the
    DAO, Template, and Facade patterns. Although Grails is built on the foundations
    of Spring and Hibernate, it provides an alternative to the DAO pattern typical
    of most Spring applications. Following the lead of other rapid development frameworks,
    such as Ruby on Rails, Grails utilizes the Active Record design pattern as the
    approach for handling database persistence operations.


    In keeping with the Active Record pattern, a table in the database is represented
    directly by a domain class. For instance, in our gallery example, we have already
    defined a **Person** class that describes a corresponding **Person** table in
    our database, meaning table fields and associations are represented by properties
    within our **Person** class.


