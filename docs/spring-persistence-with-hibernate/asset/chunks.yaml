- fmt: "Each of these instances of `DispatcherServlet` has its own namespace, commonly\
    \ referred to as a *child application context*. That means that each `DispatcherServlet`\
    \ has its own `ApplicationContext`, but they all share the root application context.\
    \ In short, this means that Spring beans defined in the `ApplicationContext` of\
    \ a `DispatcherServlet` may reference the beans from your root `ApplicationContext`\
    \ but not vice versa. It also means that separate `DispatcherServlet` instances\
    \ may not share their bean definitions.\n\n> **Note** The `ApplicationContext`\
    \ used by each `DispatcherServlet` is technically an implementation of Spring’s\
    \ `WebApplicationContext` interface. The `WebApplicationContext` adds a `getServletContext`\
    \ method to the generic `ApplicationContext` interface. It also defines a well-known\
    \ application attribute name that the root context must be bound to in the bootstrap\
    \ process.\n\nLet’s take another look at our `galleryDispatcher` servlet definition.\
    \ Just as with our datasources, we give each configured `DispatcherServlet` a\
    \ unique name, because we expect to end up with several.\n\n```xml\n<servlet>\n\
    \    <servlet-name>galleryDispatcher</servlet-name>\n    <servlet-class>\n   \
    \     org.springframework.web.servlet.DispatcherServlet\n    </servlet-class>\n\
    \    <init-param>\n        <param-name>contextConfigLocation</param-name>\n  \
    \      <param-value>\n            WEB-INF/spring/spring-master-web.xml\n     \
    \   </param-value>\n    </init-param>\n    <load-on-startup>1</load-on-startup>\n\
    </servlet>\n```\n\nThe servlet is defined with an `init-param` named `contextConfigLocation`,\
    \ which provides the servlet with all the information it needs to acquire and\
    \ instantiate its Spring bean configuration. And beans in `spring-master-web.xml`\
    \ may safely reference beans the `ApplicationContext` defined in `spring-master.xml`\
    \ and its subsequent imports.\n\nHowever, there’s one large exception to this\
    \ `ApplicationContext` hierarchy: implementations of the `BeanFactoryPostProcessor`\
    \ interface and its sibling `BeanPostProcessor` just apply to the `BeanFactory`\
    \ that defines them. The `PropertyPlaceholderConfigurer` class described earlier\
    \ in this chapter is one such example. This means that you need to define a property\
    \ placeholder once for each `DispatcherServlet` in addition to the one already\
    \ defined in the `spring-master.xml` root application context.\n\nFinally, we\
    \ instruct our application container to map any requests that start with `/art/`\
    \ to this `galleryDispatcher`:\n\n```xml\n<servlet-mapping>\n    <servlet-name>galleryDispatcher</servlet-name>\n\
    \    <url-pattern>/art/*</url-pattern>\n</servlet-mapping>\n```\n\nWith that configuration\
    \ in place, a fictitious request to `/art/foo` would be mapped to the `galleryDispatcher`,\
    \ which would in turn route the request to a proper Spring MVC controller.\n\n\
    ## Spring MVC\n\nAs of Spring 3.0, bootstrapping Spring MVC is incredibly simple.\
    \ The following are the contents of `src/main/webapp/WEB-INF/spring/spring-master-web.xml`,\
    \ which is the configuration file behind the `galleryDispatcher` servlet.\n\n\
    ```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>\n<beans\n\
    \    xsi:schemaLocation=\"http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\
    \ http://www.springframework.org/schema/context http://www.springframework.org/schema/context/spring-context-3.0.xsd\
    \ http://www.springframework.org/schema/mvc http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd\"\
    >\n\n    <context:component-scan base-package=\"com.prospringhibernate\"\n   \
    \     use-defaultfilters=\"false\">\n        <context:include-filter type=\"annotation\"\
    \n            expression=\"org.springframework.stereotype.Controller\"/>\n   \
    \ </context:component-scan>\n\n    <mvc:annotation-driven/>\n\n    <!-- selects\
    \ a static view for rendering without the need for an explicit controller -->\n\
    \    <mvc:view-controller path=\"/index.jsp\"/>\n\n</beans>\n```\n\nWe’re using\
    \ Spring’s component scanning again in this `WebApplicationContext`. This time\
    \ around, we’re specifying an `include-filter` to restrict the beans we instantiate\
    \ to only those POJOs annotated with the `@Controller` stereotype annotation.\n\
    \nNext, we employ the `mvc-namespace` declaration to turn on support for mapping\
    \ requests to Spring MVC `@Controller` methods.\n\n```xml\n<mvc:annotation-driven/>\n\
    ```\n\nThis convenience configuration syntax also registers default Spring formatters\
    \ and Spring validators for use across all controllers. This allows us to write\
    \ controller code like the following:\n\n```java\n@Controller\n@RequestMapping(\"\
    /people\")\npublic class PersonController {\n\n    @RequestMapping(value = \"\
    /{id}\", method = RequestMethod.GET)\n    public String show(@PathVariable(\"\
    id\") Long id, ModelMap modelMap) {\n        // business logic to retrieve a Person\
    \ entity\n        return \"person\";\n    }\n\n    @RequestMapping(value = \"\
    /{id}\", method = RequestMethod.DELETE)\n    public String delete(@PathVariable(\"\
    id\") Long id) {\n        // business logic to delete a Person entity and\n  \
    \      // return the appropriate view goes here\n    }\n\n}\n```\n\nThis abridged\
    \ code is annotated as a controller. It’s also mapped to `/people` via the Spring\
    \ MVC `@RequestMapping` annotation. We use the `@RequestMapping` annotation again\
    \ at the method level to specify that any HTTP `GET` request to `/people/{id}`\
    \ should trigger the `show` method. The `@PathVariable` annotation will take that\
    \ `{id}` parameter and set it as `Long id` for use within the `show` method. Similarly,\
    \ when an HTTP `DELETE` is issued against the URL `/art/people/{id}`, the request\
    \ will be routed through the `galleryDispatcher` to the `PersonController`’s `delete`\
    \ method. That’s a lot to digest in a short period of time, but suffice it to\
    \ say that Spring’s MVC annotations greatly reduce the amount of code required\
    \ to build out a full-fledged enterprise web application.\n\nFinally, we demonstrate\
    \ Spring’s mechanism for static view resolution:\n\n```xml\n<mvc:view-controller\
    \ path=\"/index.jsp\"/>\n```\n\nOften, you will want to simply route a request\
    \ to a view without any logic in a controller. This is where the `mvc:view-controller`\
    \ comes in.\n\n## Summary\n\nIn this chapter, you have gotten a sense for what\
    \ is involved in setting up a web application using core Spring, Maven, a database,\
    \ and Spring MVC.\n\nMaven is a great tool that development teams can use to simplify\
    \ day-to-day development. You can manage your dependencies, ensuring repeatable\
    \ build processes, and provide a consistent interface for developers on your team\
    \ to use for interacting with your project.\n\nYou’ve also learned about some\
    \ of Spring’s features, including component scanning, `BeanFactoryPostProcessors`\
    \ like the `PropertyPlaceholderConfigurer`, Spring’s namespace support, and more\
    \ advanced XML configuration management with `import` declarations. Component\
    \ scanning is likely the most important of these features, since it allows Spring\
    \ to locate classes within a specified package structure so that it can manage\
    \ these components and resolve dependencies appropriately.\n\nThe component-scanning\
    \ feature allows developers to use annotations as hints for Spring. It simplifies\
    \ the work required to wire dependencies together and even reduces the amount\
    \ of XML configuration required. For instance, the `@Repository` annotation should\
    \ be used to indicate those classes that compose the DAO layer, the `@Service`\
    \ annotation can be used to designate those classes that are part of an application’s\
    \ service façade, and the `@Controller` annotation denotes the presence of a POJO\
    \ that should be used for Spring MVC interactions. These annotations simplify\
    \ the definition of the respective tiers, imbuing layer classes with metadata\
    \ that helps describe their purpose."
  raw: 'Each of these instances of **DispatcherServlet** has its own namespace, commonly
    referred to as a *child application context*. That means that each **DispatcherServlet**
    has its own **ApplicationContext**, but they all share the root application context.
    In short, this means that Spring beans defined in the **ApplicationContext** of
    a **DispatcherServlet** may reference the beans from your root **ApplicationContext**
    but not vice versa. It also means that separate **DispatcherServlet** instances
    may not share their bean definitions.


    ■ **Note** The **ApplicationContext** used by each **DispatcherServlet** is technically
    an implementation of Spring’s **WebApplicationContext** interface. The **WebApplicationContext**
    adds a **getServletContext** method to the generic **ApplicationContext** interface.
    It also defines a well-known application attribute name that the root context
    must be bound to in the bootstrap process.


    Let’s take another look at our **galleryDispatcher** servlet definition. Just
    as with our datasources, we give each configured **DispatcherServlet** a unique
    name, because we expect to end up with several.


    **<servlet>**


    **<servlet-name>galleryDispatcher</servlet-name>**


    **<servlet-class>**


    **org.springframework.web.servlet.DispatcherServlet**


    **</servlet-class>**


    **<init-param>**


    **<param-name>contextConfigLocation</param-name>** 44


    CHAPTER 3 ■ BASIC APPLICATION SETUP


    **<param-value>**


    **WEB-INF/spring/spring-master-web.xml**


    **</param-value>**


    **</init-param>**


    **<load-on-startup>1</load-on-startup>**


    **</servlet>**


    The servlet is defined with an **init-param** named **contextConfigLocation**,
    which provides the servlet with all the information it needs to acquire and instantiate
    its Spring bean configuration. And beans in **spring-master-web.xml** may safely
    reference beans the **ApplicationContext** defined in **spring-master.xml** and
    its subsequent imports.


    However, there’s one large exception to this **ApplicationContext** hierarchy:
    implementations of the **BeanFactoryPostProcessor** interface and its sibling
    **BeanPostProcessor** just apply to the **BeanFactory** that defines them. The
    **PropertyPlaceholderConfigurer** class described earlier in this chapter is one
    such example. This means that you need to define a property placeholder once for
    each **DispatcherServlet** in addition to the one already defined in the **spring-master.xml**
    root application context.


    Finally, we instruct our application container to map any requests that start
    with **/art/** to this **galleryDispatcher**:


    **<servlet-mapping>**


    **<servlet-name>galleryDispatcher</servlet-name>**


    **<url-pattern>/art/*</url-pattern>**


    **</servlet-mapping>**


    With that configuration in place, a fictitious request to **/art/foo** would be
    mapped to the **galleryDispatcher**, which would in turn route the request to
    a proper Spring MVC controller.


    Spring MVC


    As of Spring 3.0, bootstrapping Spring MVC is incredibly simple. The following
    are the contents of **src/main/webapp/WEB-INF/spring/spring-master-web.xml**,
    which is the configuration file behind the **galleryDispatcher** servlet.


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<beans**


    ********xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**
    **http://www.springframework.org/schema/context**


    **http://www.springframework.org/schema/context/spring-context-3.0.xsd** **http://www.springframework.org/schema/mvc**


    **http://www.springframework.org/schema/mvc/spring-mvc-3.0.xsd">**


    ****<context:component-scan base-package="com.prospringhibernate"**


    **use-defaultfilters="false">**


    **<context:include-filter type="annotation"**


    **expression="org.springframework.stereotype.Controller"/>**


    **</context:component-scan>**


    CHAPTER 3 ■ BASIC APPLICATION SETUP


    ****<mvc:annotation-driven/>**


    ****<!-- selects a static view for rendering without the need for an explicit
    controller -->**


    **<mvc:view-controller path="/index.jsp"/>**


    ****</beans>**


    We’re using Spring’s component scanning again in this **WebApplicationContext**.
    This time around, we’re specifying an **include-filter** to restrict the beans
    we instantiate to only those POJOs annotated with the **@Controller** stereotype
    annotation.


    Next, we employ the **mvc-namespace** declaration to turn on support for mapping
    requests to Spring MVC **@Controller** methods.


    **<mvc:annotation-driven/>**


    This convenience configuration syntax also registers default Spring formatters
    and Spring validators for use across all controllers. This allows us to write
    controller code like the following:


    **@Controller**


    **@RequestMapping("**/people")**


    **public class PersonController {**


    ****@RequestMapping(value = "/{id}", method = RequestMethod.GET)** **public String
    show(@PathVariable("id") Long id, ModelMap modelMap) {**


    **// business logic to retrieve a Person entity**


    **return "person";**


    **}**


    ****@RequestMapping(value = "/{id}", method = RequestMethod.DELETE)** **public
    String delete(@PathVariable("id") Long id) {**


    **// business logic to delete a Person entity and**


    **// return the appropriate view goes here**


    **}**


    ****}**


    This abridged code is annotated as a controller. It’s also mapped to ****/people**
    via the Spring MVC


    **@RequestMapping** annotation. We use the **@RequestMapping** annotation again
    at the method level to specify that any HTTP **GET** request to ****/people/{id}**
    should trigger the **show** method. The **@PathVariable** annotation will take
    that **{id}** parameter and set it as **Long id** for use within the **show**
    method. Similarly, when an HTTP **DELETE** is issued against the URL **/art/people/{id}**,
    the request will be routed through the **galleryDispatcher** to the **PersonController**’s
    **delete** method. That’s a lot to digest in a short period of time, but suffice
    it to say that Spring’s MVC annotations greatly reduce the amount of code required
    to build out a full-fledged enterprise web application.


    Finally, we demonstrate Spring’s mechanism for static view resolution:


    **<mvc:view-controller path="/index.jsp"/>**


    Often, you will want to simply route a request to a view without any logic in
    a controller. This is where the **mvc:view-controller** comes in.


    CHAPTER 3 ■ BASIC APPLICATION SETUP


    Summary


    In this chapter, you have gotten a sense for what is involved in setting up a
    web application using core Spring, Maven, a database, and Spring MVC.


    Maven is a great tool that development teams can use to simplify day-to-day development.
    You can manage your dependencies, ensuring repeatable build processes, and provide
    a consistent interface for developers on your team to use for interacting with
    your project.


    You’ve also learned about some of Spring’s features, including component scanning,
    **BeanFactoryPostProcessors** like the **PropertPlaceholderConfigurer**, Spring’s
    namespace support, and more advanced XML configuration management with **import**
    declarations. Component scanning is likely the most important of these features,
    since it allows Spring to locate classes within a specified package structure
    so that it can manage these components and resolve dependencies appropriately.


    The component-scanning feature allows developers to use annotations as hints for
    Spring. It simplifies the work required to wire dependencies together and even
    reduces the amount of XML


    configuration required. For instance, the **@Repository** annotation should be
    used to indicate those classes that compose the DAO layer, the **@Service** annotation
    can be used to designate those classes that are part of an application’s service
    façade, and the **@Controller** annotation denotes the presence of a POJO that
    should be used for Spring MVC interactions. These annotations simplify the definition
    of the respective tiers, imbuing layer classes with metadata that helps describe
    their purpose.'
