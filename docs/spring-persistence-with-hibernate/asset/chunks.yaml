    ## About the Authors


    **Paul Tepper Fisher** first began working in technology at Johns Hopkins University,
    where he spent several years developing a distance-learning application for neuroscience,
    while completing graduate school there. He has founded two technology start-ups:
    SmartPants Media, Inc., a software development company specializing in interactive
    multimedia technology; and dialmercury.com, which develops telephony applications
    using VOIP and Java.


    Paul was also Manager of Technology at Wired.com, where he led the software development
    team for the online publications of Wired.com, webmonkey.com, and howto.wired.com,
    using Spring, Grails, and Java technology.


    Currently, Paul is Director of Engineering for a new Music Service at Lime Wire,
    where he manages several development teams using agile methodologies. Comprised
    of client-side and distributed server-side components, the Music Service is designed
    for horizontal scalability with a goal of supporting millions of end-users and
    terabytes of data.


    You can read Paul’s blog at: `http://paultepperfisher.com`.


    **Brian D. Murphy** is the Chief Architect and Director of Engineering at Condé
    Nast. He was an early adopter of Spring and Hibernate and uses both technologies
    to power all of Condé’s brands online, including wired.com, newyorker.com, epicurious.com,
    and vanityfair.com, drawing tens of millions of unique visitors each month. Brian
    deals with the challenges of building scalable, distributed systems every single
    day. He has a B.S. in Computer Science from Rutgers University. You can follow
    Brian on Twitter at `http://twitter.com/@brimurph` or read his blog at `http://turmoildrivendevelopment.com`.


    **xii**


    ![Image 4](index-13_1.jpg)


    ## About the Technical Reviewer


    **Sia Cyrus’s** experience in computing spans many decades and areas of software
    development. During the 1980s, he specialized in database development in Europe.
    In the 1990s, he moved to the US where he focused on client-server applications.
    Since 2000, he has architected a number of middle-tier business processes incorporating
    Spring and Hibernate. Most recently, he has been specializing in Web 2.0, Ajax,
    GWT, and Android.


    Sia is an independent software consultant who is an expert in Java and development
    of Java enterprise-class applications. He has been responsible for innovative
    and generic software, holding a US Patent in database-driven user interfaces.
    Sia created a very successful configuration-based framework for the telecommunications
    industry, which he later converted to Spring Framework. His passion could be entitled
    “Enterprise Architecture in Open Source”.


    When not experimenting with new technologies, he enjoys playing ice hockey especially
    with his two boys, Jason and Brandon. He can be reached at `sia.cyrus@comcast.net`.


    **xiii**


    ## Acknowledgments


    Writing a book always ends up being more difficult than you initially imagined.
    Although the absurdly late nights and lost weekends prove difficult to the authors,
    it is often the people around them that end up suffering the most. To that end,
    I’d like to thank Melanie Colton for her endless patience and perseverance. She
    deserves more than a medal for putting up with the many 4am nights and my noisy
    typing. This book would not have been possible without her support, understanding,
    and muse.


    I would also like to acknowledge my colleagues at Lime Company, for their continued
    trust and support. It is a rare experience to work with such a talented and committed
    group of people, and I am grateful for the opportunity to be a part of such an
    important adventure.


    I’d also like to thank Solomon Duskis for starting this journey, and for his unwavering
    enthusiasm for technology—especially Java and Spring.


    I would be remiss if I didn’t offer my appreciation and gratitude to my parents,
    who have inspired me through their relentless trust, support, and faith in everything
    I set out to do.


    Finally, my sincere appreciation goes to Brian Murphy for joining the project
    and keeping things rolling along. If it hadn’t been for Brian’s tenacity and motivation,
    this book would never have seen the light of day. It’s been an honor and privilege
    working with you again.


    —Paul Tepper Fisher


    We’d like to thank Apress for the opportunity to write this book. Special thanks
    to Steve Anglin for believing in us and letting us stretch the schedule to cover
    advanced topics in depth. We owe Mary Tobin a special debt of gratitude for shepherding
    us through this process and ultimately dragging us across the finish line. Thanks
    to Tom Welsh, Marilyn Smith, and Sia Cyrus, who provided invaluable feedback,
    suggestions and encouragement along the way. This is a much better book as a result
    of their wisdom and patience. Any issues or errors in this text are ours alone.


    I would like to thank my wife, Dania, without whom this book wouldn’t be possible.
    She graciously took on the role of super mom while I devoted nights and weekends
    to writing for far longer than bargained for. I’d like to thank my son Liam for
    being the most terrific little kid. You provide me with more joy and a new appreciation
    for the world than you’ll ever know. I’d also like to acknowledge our second son,
    who is due shortly after this book will be published. I can’t wait to meet you!


    Lastly, I’d like to thank Paul Fisher for sharing this experience with me. This
    book was Paul’s brainchild and I’m glad he invited me along for the ride. Writing
    this book has been both rewarding and challenging. I learned a ton and it’s been
    great to work with you again.


    —Brian D. Murphy


    **xiv**


    ## Preface


    Since its inception, the Spring Framework has gradually changed the rules of application
    development in the Java community. This book is the ideal guide and teaching companion
    for developers interested in learning about the Spring Framework and how it can
    be leveraged to build persistence-driven applications using Hibernate, one of
    the most popular Java persistence frameworks today. *Spring Persistence with Hibernate*
    gets you rolling with fundamental Spring concepts, as well as proven design patterns
    for integrating persistence into your applications.'
