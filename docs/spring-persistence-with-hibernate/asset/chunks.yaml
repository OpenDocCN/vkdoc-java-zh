- fmt: "# 排版后的内容\n\nIn the diagram in Figure 4-3, solid lines represent inheritance,\
    \ and interface inheritance is depicted with dotted lines. The key usages of Java\
    \ generics are highlighted by the “bind Person” annotations.\n\nGenerics in Java\
    \ allow a type or method to operate on objects of various types while providing\
    \ compile-time type-safety.\n\nLet’s see how this plays out in actual code. The\
    \ first class we’ll tackle is `GenericDao`:\n\n```\npackage com.prospringhibernate.gallery.dao;\n\
    \nimport java.util.List;\n\nimport com.prospringhibernate.gallery.domain.DomainObject;\n\
    \npublic interface GenericDao<T extends DomainObject> {\n\n    public T get(Long\
    \ id);\n\n    public List<T> getAll();\n\n    public void save(T object);\n\n\
    \    public void delete(T object);\n\n}\n```\n\nEach generic type variable is\
    \ represented as `T`. As you can see, we’ve defined four basic methods in this\
    \ interface that are essential when managing persistent objects. The `delete`\
    \ method will remove a given entity from the database. The `save` method allows\
    \ us to insert a new row or update an existing row in the database based on the\
    \ contents of the entity. The two basic getters provide a means for reading in\
    \ any entity `T`, which uses our `DomainObject` interface.\n\nIn the code that\
    \ follows, we implement those methods on our concrete `GenericDaoJpa` class using\
    \ JPA’s `EntityManager`.\n\n```\npackage com.prospringhibernate.gallery.dao.hibernate;\n\
    \nimport java.util.List;\n\nimport javax.persistence.EntityManager;\nimport javax.persistence.PersistenceContext;\n\
    \nimport org.springframework.transaction.annotation.Transactional;\n\nimport com.prospringhibernate.gallery.dao.GenericDao;\n\
    import com.prospringhibernate.gallery.domain.DomainObject;\n\npublic class GenericDaoJpa<T\
    \ extends DomainObject> implements GenericDao<T> {\n\n    private Class<T> type;\n\
    \n    protected EntityManager entityManager;\n\n    @PersistenceContext\n    public\
    \ void setEntityManager(EntityManager entityManager) {\n        this.entityManager\
    \ = entityManager;\n    }\n\n    public GenericDaoJpa(Class<T> type) {\n     \
    \   super();\n        this.type = type;\n    }\n\n    @Transactional(readOnly=true)\n\
    \    public T get(Long id) {\n        if (id == null) {\n            return null;\n\
    \        } else {\n            return entityManager.find(type, id);\n        }\n\
    \    }\n\n    @Transactional(readOnly=true)\n    public List<T> getAll() {\n \
    \       return entityManager.createQuery(\n            \"select o from \" + type.getName()\
    \ + \"o\"\n        ).getResultList();\n    }\n\n    public void save(T object)\
    \ {\n        entityManager.persist(object);\n    }\n\n    public void remove(T\
    \ object) {\n        entityManager.remove(object);\n    }\n\n}\n```\n\nAs we’ve\
    \ discussed, `EntityManager` is the core mechanism for interacting with JPA. It\
    \ performs data-access operations in a transaction-aware manner. With it, the\
    \ `GenericDaoJpa` class can perform basic CRUD tasks: finding single or multiple\
    \ instances of the class, as well as saving, updating, and deleting an instance.\n\
