- fmt: "# JPQL 与 Criteria API 的编译时检查\n\n虽然 JPQL 版本确实更简洁，但我们之前担心查询缺乏编译时检查的问题呢？使用 Criteria\
    \ API 方法，我们可以获得查询语法可验证的保证，而在 JPQL 中，直到运行时才会发现问题。然而，在我们的 Criteria API 示例中，我们实际上有点亏待自己。请记住，为了将`ArtEntity.title`字段表示为`Path`引用，我们使用了以下代码：\n\
    \n`Path<String> path = root.<String>get(\"title\");`\n\n这行代码很直观，但我们仍然存在出错的可能性，因为可能会拼错`title`字段，或者指定一个根本不存在的域类属性。此外，当我们处理更复杂的查询（例如涉及关联的查询）时，可能会丢失正确的字段类型或数量。\n\
    \n为了解决这个问题，JPA 2.0 Criteria API 提供了`MetaModel`，它可以用来描述与域模型相关的元数据。虽然可以手动定义自己的`MetaModel`来镜像每个域类的结构，但更简单的方法是使用\
    \ Java 1.6 的注解处理功能。Hibernate 提供了`hibernate-jpamodelgen` jar，它可以分析域模型类，然后自动生成`MetaModel`的源代码。使其工作的第一步是将`hibernate-jpamodelgen`作为依赖项添加到\
    \ Maven `pom.xml`文件中：\n\n```xml\n<dependency>\n    <groupId>org.hibernate</groupId>\n\
    \    <artifactId>hibernate-jpamodelgen</artifactId>\n    <version>1.0.0.Final</version>\n\
    </dependency>\n```\n\n添加此依赖项后，每当代码编译时，`MetaModel`就会自动生成并更新。虽然可以使这个过程更加隐式，但我们建议安装一个\
