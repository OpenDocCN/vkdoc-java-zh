    基于前面介绍的 Lucene 概念，Hibernate Search 的注解相当直观。


    让我们逐一检查该类中添加的内容。


    首先，我们需要使用 **@Indexed** 注解来标记一个类，以便将其纳入索引考虑范围。接下来，Hibernate Search 要求使用 **@DocumentId**
    注解来标记领域类的标识符。Hibernate Search 使用文档 ID 来桥接 Lucene 和 Hibernate 两个世界。


    在每个索引中，Lucene 都会存储 Hibernate 实体的完整类名及其标识符。它们共同构成了在 Hibernate Search 中进行查询的基础，并允许将
    Lucene 查询返回的文档列表转换为活动 Hibernate 实体的列表。


    除非领域类的属性使用 **@Field** 注解进行标记，否则它不会被索引。**@Field** 注解指定将特定的领域类属性包含在 Lucene 索引中。该注解接受几个参数，包括覆盖字段名称的能力。然而，最重要的是
    **index** 和 **store** 属性。这些参数告诉 Lucene 如何配置该字段。


    如前所述，字段可以被分词，这将把特定属性的内容提取到一个令牌流中，利用特定的分析器来过滤掉多余的词、执行词干提取、插入同义词，并可能根据所使用的分析器执行一系列其他操作。字段也可以被存储，这意味着原始内容将被插入到
    Lucene 索引中。存储字段会增加索引的大小，因此对于大块文本来说，这通常不是一个好主意。


    然而，包含可能需要由应用程序显示的数据的字段——例如标题、文件名或业务标识符——应标记为已存储。让我们看几个例子：


    *   在我们的 **ArtEntity** 领域类中，我们指定了 **title** 属性为已存储且已分词：


    **@Field(index = Index.TOKENIZED, store=Store.YES)**


    **@Boost(2.0f)**


    **public String getTitle() {**


    **return title;**


    **}**


    *   我们指定了 **width** 属性为未分词，但仍被存储：


    **@Field(index = Index.UN_TOKENIZED, store=Store.YES)**


    **public Integer getWidth() {**


    **return width;**


    **}**


    第 10 章 ■ 集成框架


    *   我们将 **description** 属性设置为已分词但不存储：


    **@Field(index = Index.TOKENIZED, store=Store.NO)**


    **public String getDescription() {**


    **return description;**


    **}**


    你可能还注意到了 **@DateBridge** 注解的使用。由于 Lucene 通常只在其索引中管理文本，Hibernate Search 包含了一种桥接策略，作为将非文本数据转换为
    **String**（并可能再转换回来）的方法。Hibernate Search 将使用适当的内置桥接器来映射诸如整数和长整数之类的字段，但对于更复杂的数据类型，你可以利用自定义桥接器或使用框架提供的桥接器之一。例如，我们可以通过以下方式映射
    **uploadedDate** 属性：


    **@Field(index = Index.UN_TOKENIZED, store=Store.YES)**


    **@DateBridge(resolution = Resolution.MINUTE)**


    **public Date getUploadedDate() {**


    **return uploadedDate;**


    **}**


    此映射参数化了 **@DateBridge**，以便将日期值转换为可以进行字典排序的文本。该日期以分钟为分辨率存储在 Lucene 索引中。出于性能原因，你通常希望使用应用程序能够支持的最大分辨率设置（例如，优先选择
    **Minute** 分辨率而非 **Second**，或者更好的是，选择 **Day** 而非 **Minute** 或 **Hour**）。


    **@Boost** 注解可用于提升 Lucene 索引中特定字段的权重。例如，要使 **title** 字段的相关性是 **description** 字段的两倍，我们可以指定一个
    **2.0** 的权重因子：


    **@Field(index = Index.TOKENIZED, store=Store.YES)**


    **@Boost(2.0f)**


    **public String getTitle() {**


    **return title;**


    **}**


    也可以在查询中指定权重因子，但在需要一致权重的情况下，**@Boost** 注解会派上用场。

