    \ | Scopes a single bean definition to the life cycle of a single HTTP request;\
    \ that is, each HTTP request has its own instance of a bean created off the back\
    \ of a single bean definition. This scope is valid only in the context of a web-aware\
    \ Spring `ApplicationContext`. |\n| Session | Scopes a single bean definition\
