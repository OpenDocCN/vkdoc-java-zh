  raw: 'Additionally, the constraints defined for each property, coupled with a consistent
    naming convention, are assembled into error message codes that are automatically
    used within the default Grails Groovy Server Pages (GSP) templates. For example,
    if you attempt to save a **Person** entity without specifying a **username**,
    a validation error will be raised and associated within the instance’s **errors**
    property. Afterward, this error will be properly rendered within the default GSP
    template, using an error code that is defined in the application’s **messages.properties**
    resource bundle.


    When a validation error code is found, Grails will attempt to look for the appropriate
    code within the **messages.properties** file, starting with the most specific
    naming convention and moving toward the more generic conventions until a match
    is found. This ensures that if you don’t bother adding a specific error code in
    your **messages.properties** file, users will still see a sensible error (something
    to the effect that the **blank** constraint for the **username** field has been
    violated). However, you can easily override this default message by specifying
    a **blank** constraint error code that’s specific to the **Person** class.


    Defining Associations and Properties


    The **Person** domain entity is a fairly simplistic example, as it doesn’t really
    contain any associations or customized mappings. Let’s take a look at a more complex
    entity to see how Grails addresses a typical scenario. Update your domain model,
    and then we’ll dive deeper. Use the **grails create-domain-class** script to stub
    out the **ArtEntity**, **Category**, and **Comment** classes, respectively. The
    **Comment** class would then be modified as follows:


    **class Comment {**


    ****String comment;**


    **Date commentDate;**


    **Person person;**


    ****static belongsTo = [commentedArt: ArtEntity]**


    ****static constraints = {**


    **comment(maxSize: 2000, blank: false)**


    **commentDate(nullable: false)**


    **}**


    ****static mapping = {**


    **cache true**


    **}**


    ****}**


    CHAPTER 11 ■ GORM AND GRAILS


    This class is similar to the **Person** entity we defined earlier. We’ve defined
    a few properties, as well as a **constraints** block. One addition is the **belongsTo**
    field, which provides clues to Grails about the relationship between two entities.
    In this example, we are defining a parent-child relationship between a **Comment**
    and an **ArtEntity**. We are also defining a property called **commentedArt**
    and declaring that this property is of type **ArtEntity**. We could specify additional
    **belongsTo** relationships by appending them to this map. In each case, the **key**
    represents the property name, and the **value** represents the type.


    ■ **Note** The **belongsTo** property defines the owning side of an association.
    When a domain class specifies a **belongsTo** property, it is not the owner of
    the association. The association owner is the class referenced by the **belongsTo**
    property.


    The use of **belongsTo** also asserts cascading rules. In the previous example,
    we are declaring that **ArtEntity** is the parent in this relationship, meaning
    save and delete operations (on **ArtEntity**) will cascade appropriately to related
    **Comment** instances. This relationship will become clearer after we examine
    the opposing side, which is the **ArtEntity** domain class.


    **class ArtEntity {**


    ****String title;**


    **String subTitle;**


    **Date uploadedDate;**


    **Date displayDate;**


    **int width;**


    **int height;**


    **String media;**


    **String description;**


    **String caption;**


    **ArtData_Gallery galleryPicture;**


    **ArtData_Storage storagePicture;**


    **ArtData_Thumbnail thumbnailPicture;**


    **boolean isGeneralViewable;**


    **boolean isPrivilegeViewable;**


    ****static hasMany = [categories: Categories, comments: Comment]**


    **static belongsTo = Category**


    ****static constraints = {**


    **title(blank:false, maxSize: 255)**


    **subTitle(blank:true, maxSize: 255)**


    **uploadedDate(nullable: true)**


    **displayDate(nullable: false)**


    **width(nullable: true)**'
