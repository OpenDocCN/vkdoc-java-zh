    本示例使用了我们 Web 应用程序中在 **spring-master.xml** 中定义的 Spring 配置，这意味着我们正在使用 H2 数据库配置。通过
    **@Before** 和 **@After** 注解，我们确保 **Person** 类的状态在每个测试方法调用时都是正确的。最后，在清晰的独立单元中，我们测试了
    **PersonDao** 在成功调用 **getAll()** 获取 **Person** 实体、成功调用数据库进行身份验证，以及最后尝试对我们通过 **preMethodSetup()**
    方法搭建的用户数据进行身份验证失败时的行为。


    另请注意，我们已将 **defaultRollback** 设置为 **true**，这将确保该方法在完成后自动回滚。在集成测试中自动回滚事务是一种有效的策略，可以确保每个测试方法将数据库恢复到其原始、干净的状态。在定义与数据库交互的集成测试时，减少数据库“副作用”的可能性，并确保每个测试独立运行，不受先前运行方法的影响或依赖，这一点非常重要。


    总结


    本章介绍了一些针对 Spring 应用程序的测试策略。当然，你可以使用 JUnit 和 Spring 做更多测试，更不用说我们提到的模拟框架所实现的强大测试结构了。此外，性能测试和负载测试等主题与持久化也极其相关。


    对于更高级的数据库集成测试，我们建议你查看 DbUnit JUnit 扩展。DbUnit 提供了出色的功能，可确保你的数据库在测试之间处于已知状态，并提供工具来帮助组装可在整个测试套件中使用的测试夹具数据。


    **第 9 章**


    ■ ■ ■


    **最佳实践与高级**


    **技术**


    在本书中，你已经学到了很多关于 Spring 和 Hibernate 框架工作原理的知识。


    在本章中，你将学习构建高性能、可用于生产环境的应用程序所需的技术。尽管 Hibernate 和 Spring 相对容易启动，但它们的默认设置仅适用于简单的应用程序。如果你正在构建一个具有显著负载或性能要求的应用程序，则可能需要进行一些微调以达到最佳性能。在大多数情况下，你可以通过利用适当的优化或架构策略来规避性能问题。


    延迟加载问题


    延迟加载长期以来一直被认为是 Hibernate 最有价值的特性之一，尤其是在提高性能方面。通过将领域对象的关联或属性声明为延迟加载，应用程序可以避免对底层数据库造成不必要的开销，这通常可以带来更快的响应时间和更小的数据集——这两者都是有利的特性。


    如果没有延迟加载，一个简单的查询可能会被不必要地重复执行，或者更糟的是，对一个单一领域实体的查询可能会强制加载整个对象图，因为 Hibernate 会尝试从一个关联遍历到下一个关联。


    问题在于，延迟加载是一把双刃剑。它对于维持良好的加载性能至关重要，但同时也是导致重大性能问题的重大风险。虽然延迟加载减少了从数据库加载的数据量（以及表连接的可能性），但这种延迟性对于无论如何都可能需要从数据库加载的数据来说可能非常成问题。


    这并不意味着延迟加载是一个糟糕的特性，或者应该禁用它。这是一个被误解的问题，非常依赖于上下文。


    让我们首先来看一个影响基于持久化应用程序的、与延迟加载相关的最常见且最重要的问题之一。


    N+1 次选择问题


    让我们检查一下延迟加载在典型用例中的工作方式。在我们的示例应用程序中，我们的 **Category** 领域对象包含一个到 **ArtEntity** 领域对象的一对多关联。换句话说，一个
    **Category** 包含一个 **ArtEntity** 实例的集合：137


    第 9 章 ■ 最佳实践与高级技术


    **@Entity**


    **public class Category implements DomainObject {**


    ****private Long id;**


    **private String categoryName;**


    **private String categoryDescription;**


    **private Set<ArtEntity> artEntities = new HashSet<ArtEntity>();**


    ****. . .**


    ****@ManyToMany**


    **public Set<ArtEntity> getArtEntities() {**


    **return artEntities;**


    **}**


    ****public void setArtEntities(Set<ArtEntity> artEntities){**


    **this.artEntities = artEntities;**


    **}**


    ****. . .**


    ****}**


    默认情况下，**ArtEntity** 实体的 **java.util.Set** 被声明为延迟加载。让我们考虑一下当我们尝试为一系列 **categories**
    加载所有 **artEntities** 时，底层会发生什么。


    **entityManager.createQuery("SELECT c FROM Category c").getResultList();** 假设
    **Category** 表中至少有一行，前面的语句将返回一个 **Category** 实例列表。然而，因为我们的 **artEntities** 关联（在
    **Category** 类内部）被声明为延迟加载，Hibernate 不会执行 SQL 连接来尝试从 **Category** 表和 **ArtEntity**
    表中的相关行加载数据。Hibernate 不会从数据库加载这些 **ArtEntity** 行，而是为每个返回的 **Category** 实例的 **artEntities**
    属性填充一个代理对象。


    对于集合，Hibernate 提供了持久化集合实现，这些实现充当了我们领域模型中集合关联的代理。例如，我们的 **artEntities** 属性被声明为
    **java.util.Set**。Hibernate 会将该属性设置为 **org.hibernate.collection.PersistentSet**
    的一个实例，这是一个特殊的类，旨在拦截访问被引用集合的尝试，以便可以初始化一个延迟集合。


    Hibernate 会为应用程序中的每个领域对象生成代理，并将这些代理用于标记为延迟加载的单值关联。例如，我们可以使用以下注解将 **Comment** 领域对象中的
    **commentedArt** 的多对一关联定义为延迟加载：


    **@ManyToOne(fetch=FetchType.LAZY)**


    **public ArtEntity getCommentedArt() {**


    **return commentedArt;**


    **}**


    这段代码片段将阻止 **Comment** 对关联 **ArtEntity** 的引用在访问该属性之前从数据库加载。


    第 9 章 ■ 最佳实践与高级技术


    这些代理的目标是充当某种占位符。对于未从数据库加载的数据，Hibernate 不能简单地忽略这些属性。相反，可以使用代理来延迟加载行为。如果未尝试访问未初始化的延迟属性，则不会发生任何事情。


    然而，如果尝试访问这些代理之一，代理将拦截此请求并触发对数据库的回调。最终结果是，延迟属性使用数据库中的相关数据进行了初始化。


    所有这些听起来都很理想。但让我们考虑一下，如果每个 **Category** 关联了多个 **ArtEntity** 实例，会发生什么。当首次加载一个给定的
    **Category** 实例时，**artEntities** 关联被设置为 **org.hibernate.collection.PersistentSet**
    的一个实例。现在想象一下，我们想要遍历原始查询返回的所有 **Category** 实例的所有 **ArtEntities**。


    **for (Category category: categories) {**


    **for (ArtEntity artEntity: category.getArtEntities()) {**


    **// 在此处隐式初始化另一个集合**


    **System.out.println("art:" + artEntity.getTitle());**


    **}**


    **}**

