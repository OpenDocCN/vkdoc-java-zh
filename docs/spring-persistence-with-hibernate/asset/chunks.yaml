    当并发修改的可能性较高时，您可能需要考虑改用**悲观锁**。悲观锁使用数据库锁，因此对可扩展性和数据库死锁的风险更大。悲观锁的主要优势在于它能限制对领域实体的并发访问或修改，这有助于在不使应用程序代码复杂化的情况下维护数据一致性。但请记住，悲观锁持有时间越长，对可扩展性的影响就越大。


    在 JPA 2.0 中锁定实体相对简单。您可以在加载特定实体时获取悲观锁。您也可以在实体已加载后，通过调用 **entityManager** 实例上的 `lock`
    或 `refresh` 方法来显式锁定该实体。


    例如，要在加载特定 **ArtEntity** 实例时获取悲观写锁（一种排他锁），我们可以这样做：


    **ArtEntity artEntity = entityManager.find(ArtEntity.class, 7, LockModeType.PESSIMISTIC_WRITE)**


    如果我们之前已加载了一个 **ArtEntity** 实例，现在想要获取一个悲观读锁（一种共享锁），我们可以使用以下方法：


    **entityManager.lock(artEntity, LockModeType.PESSIMISTIC_READ)**


    虽然可以同时获取多个读锁，但只能有一个悲观写锁。


    ---


    **自由文本搜索**


    尽管听起来可能令人惊讶，但有些解决方案并不在 Hibernate 的范畴内。认识到那些可能需要采用完全不同的策略来更好地满足需求的情况非常重要。这些场景并不总是那么明显，因此深入了解其他可用选项会很有帮助。


    考虑在应用程序中提供类似搜索的功能。关系型数据库能够处理此功能，但仅限于一定程度。如果您的应用程序需要提供的搜索功能远远超出简单的“类似 SQL 的查询”所能满足的范围，那么是时候考虑替代方案了。


    用户期望搜索功能是智能的。例如，如果您试图搜索“Spring Framework”，但无意中输入了“Sprong Framework”，您可能会期望应用程序能够绕过您的错误，仍然返回您想要的结果。这种功能通常被称为*模糊搜索*，因为它降低了匹配的严格性，允许包含拼写相似的词条。这个概念也可以扩展到支持同义词。例如，搜索“car”也可以匹配包含“automobile”的条目。


    关系型数据库通常不擅长在文本块中查找词组，这种功能通常被称为*自由文本搜索*。在关系型数据库中提供这种搜索功能可能会带来显著的性能开销以及额外的开发时间。


    查找以特定单词开头或结尾的文本内容可以使用 **like** 条件来实现，例如：


    **List<ArtEntity> blueEntities = entityManager.createQuery(**


    **“select artEntities from ArtEntity artEntities where artEntities.description
    like ‘blue%’”**


    **).list();**


    显然，这个查询有点刻意，因为我们不太可能使用硬编码的查询，特别是那种过滤 **description** 字段以“blue”开头的条目的查询，但它仅用于演示目的。虽然这个查询可能具有合理的性能（因为我们可以依赖数据库索引快速找到以特定单词精确匹配开头的描述），但如果我们试图查找
    **description** 中包含特定单词或短语的 **ArtEntities**，我们将开始承受更显著的性能损失。这种搜索操作通常需要索引扫描或表扫描，这会给数据库带来负担。


    此外，我们仍然没有确定特定匹配项相关性的策略。如果五个 **description** 字段都包含单词 *blue*，我们如何确定哪个匹配项更相关？我们可以假设某个特定描述中单词
    *blue* 出现的次数越多，其相关性就越高。然而，仅使用 Hibernate 来实现这个解决方案可能需要大量额外的编码，而且我们仍然勉强满足了用户搜索需求的基本期望。


    如果我们想支持模糊匹配或处理同义词呢？


    仅使用 Hibernate 来解决搜索需求的根本问题在于，关系型数据库并非为提供此类功能而设计。然而，这正是 Apache Lucene——一个强大的开源
    Java 搜索框架——所要解决的问题。


    ---


    **Lucene 简介**


    Lucene 是一个高性能、功能齐全的信息检索（IR）库，提供了用于索引和搜索操作的全面 API。索引是搜索引擎和数据库都使用的一种策略，旨在让内容能够被尽可能高效地找到。Lucene
    索引与本书的索引并无太大区别。它提供了一种逻辑且系统的方式来定位和访问特定数据。


    **使用 Lucene 进行索引**


    Lucene 索引 API 的核心是 **Document** 类。类似于数据库表的概念，一个 **Document** 由多个 **Field** 组成，每个
    **Field** 包含从原始内容中提取的、旨在被索引的文本数据。与数据库不同，Lucene 文档是反规范化的。没有“连接”的概念，因为数据关系并不代表信息检索。相反，您可以将**文档**视为容器——一种组织内容以便日后能有效搜索的手段。


    Lucene **Document** 中的每个 **Field** 通常代表您希望搜索的内容的特定组成部分。例如，如果您想为您的个人音乐库建立索引，您可能会定义一个文档，其中包含音频曲目、曲目所属专辑、曲目艺术家、曲目文件名、您对曲目的注释、专辑发行日期等字段。为了辅助索引过程，Lucene
    提供了一组 **Analyzer**。**Analyzer** 有助于分解和过滤每个特定字段的内容，提取出标记流。例如，由于您对某张专辑的注释可能包含几段文本，因此您需要将这些内容分解成单词。然后，您可能希望将这些单词分解为词根，这样即使某条注释实际包含的是单词
    *listens* 或 *listening*，您也能通过搜索单词 *listen* 来找到该注释。这个过程称为*词干提取*，有助于将单词分解为其根形式。分析器还可能过滤掉多余的内容，例如移除*停用词*，如
    *the* 和 *a*。


    分析器提取的单个标记称为*词项*。词项是构成 **Index** 的基本元素，因此也是搜索查询的主要组成部分。


    Lucene 使用倒排索引来优化内容的查找方式。倒排索引使用索引过程中分析器步骤提取的标记作为特定内容的查找键。这种方法更有利于搜索，因为查找的重点放在了用户可能想要搜索的单个词项或单词上，而不是内容本身。

