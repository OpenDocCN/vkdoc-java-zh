    \ by defining the Hibernate mappings first, allowing us to consider the Java classes\
    \ and the database table structure in tandem.\n\nWith JDK 1.5 and Hibernate 3,\
    \ the definition of Hibernate mapping files in XML is no longer necessary. Of\
    \ course, you are welcome to continue following this more verbose methodology,\
    \ and for many developers, externalizing the specifics of the database mapping\
    \ is very much a good thing."
