  raw: '*Figure 3-1\. A set of dependencies as displayed by Maven and m2eclipse* The
    number of dependencies may seem a bit daunting at first, but when you’re using
    Spring and Hibernate, you are given a lot of granular choice about which JARs
    to include and when, which to exclude, and so on. This results in many smaller
    library dependencies. Through your project’s dependency configuration, Maven is
    aware of which JAR files are required for your project and which JARs have dependencies
    on one another. It knows which libraries are needed only while executing unit
    tests, as well as which libraries should be bundled into your resulting WAR file
    to be deployed on an application container like Apache Tomcat.


    With all of this power comes a good bit of complexity, and for that reason, Maven
    also has its fair share of detractors. The fact remains that at the time of this
    writing, Maven is far and away the most prevalent tool used by shops big and small
    for managing Java applications. Once you get over some of the jargon, Maven is
    quite simple to configure and use. Get started by downloading it from **http://maven.apache.org**,
    and let’s see how you can put it to use.


    CHAPTER 3 ■ BASIC APPLICATION SETUP


    Standard Directory Structure


    Let’s first create the folder structure required for a standard Maven 3 web application.
    Though you can define a custom directory structure and modify your Maven settings
    or graft Maven onto a legacy project with a directory structure that’s already
    defined, your best bet is to stick with the basic folder structure that Maven
    expects. That will ensure proper interoperability with all of the plugins and
    tools that are available.


    Since we’re building a basic art gallery application, start by making a folder
    called **gallery**: **mkdir gallery**


    Within the **gallery** folder, we’ll create the folders that are customary for
    a Java application: **mkdir gallery/src**


    **mkdir gallery/src/main**


    **mkdir gallery/src/main/java**


    **mkdir gallery/src/main/resources**


    **mkdir gallery/src/main/resources/META-INF**


    For web applications, we need a **webapp** and **WEB-INF** folder: **mkdir gallery/src/main/webapp**


    **mkdir gallery/src/main/webapp/WEB-INF**


    We also need to create the folders that are required for unit testing our application:
    **mkdir gallery/src/test**


    **mkdir gallery/src/test/java**


    **mkdir gallery/src/test/resources**


    And finally, we’ll create the two folders where Spring configuration files are
    ordinarily placed: **mkdir gallery/src/main/webapp/WEB-INF/spring**


    **mkdir gallery/src/main/resources/META-INF/spring**


    ■ **Note** You can also have maven automatically generate your project''s structure
    by using Maven''s archetype feature. Maven archetypes are like project templates
    that can be used to streamline the creation of a maven project, including setting
    up your directory structure and a baseline **pom.xml** file.


    POM Deconstruction


    The primary configuration file for Maven is **pom.xml**. With this configuration
    file, you can specify important metadata and build details about your project.
    The **pom.xml** file resides at the root of a given Maven project, so we’ll create
    it within the **gallery** folder. This listing is abridged for the sake of simplicity.
    We recommend you check out the full listing in the source code that accompanies
    the book.


