- fmt: "# Spring MVC 与 REST 服务\n\n## `@Controller` 注解\n\n`@Controller` 是一个原型注解，它扩展自\
    \ `@Component`。与 `@Service` 和 `@Repository` 一样，`@Controller` 有助于表明该类的用途，并且可以通过\
    \ Spring 的组件扫描功能自动管理。\n\n您还会注意到，我们自动注入了 `ArtworkFacade` 实现和 Dozer 映射器。真正的魔法发生在定义的两个方法中。这两个方法都使用\
    \ `@RequestMapping` 注解，该注解告诉 Spring 此控制器方法的 URL 映射规则。在这两个方法中，我们都定义了控制器将关联的 URL。更重要的是，使用了\
    \ `{}` 字符。URL 中嵌入在花括号内的部分可以在方法中使用 `@PathVariable` 注解进行引用。通过这种方式，我们隐式地提取了 URL 的部分内容，并将其注入到方法参数中。\n\
    \n除了 `@PathVariable` 注解，Spring 还提供了其他几种选项来提取传入请求的各个方面，并将这些值映射到方法参数。例如，查询参数和会话属性也可以通过相应的注解映射到参数。请查阅\
    \ Spring 文档以了解更多关于实现 MVC 控制器的信息。\n\n## 使用 Spring OXM 编组数据\n\n我们不能忽略的一个重要细节是如何将\
    \ DTO 渲染为 XML。为了实现这一点，我们利用了 Spring 3 的对象/XML 映射（OXM）支持。Spring 的 OXM 抽象有助于将编组实现细节与应用程序解耦。这使得代码更具可移植性，并简化了多种编组策略的集成。\n\
    \n让我们看一下驱动 REST 服务的 Spring MVC 配置。以下是 `spring-web-gallery.xml` 文件的精简版本。\n\n```xml\n\
    <beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \    http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\n    http://www.springframework.org/schema/context\n\
    \    http://www.springframework.org/schema/context/spring-context-3.0.xsd\n  \
    \  http://www.springframework.org/schema/util\n    http://www.springframework.org/schema/util/spring-util-3.0.xsd\"\
    >\n\n    <bean class=\"org.springframework.web.servlet.view.ContentNegotiatingViewResolver\"\
    >\n        <property name=\"mediaTypes\">\n            <map>\n               \
    \ <entry key=\"xml\" value=\"application/xml\"/>\n                <entry key=\"\
    html\" value=\"text/html\"/>\n            </map>\n        </property>\n      \
    \  <property name=\"viewResolvers\">\n            <list>\n                <bean\
    \ class=\"org.springframework.web.servlet.view.BeanNameViewResolver\"/>\n    \
    \            <bean class=\"org.springframework.web.servlet.view.InternalResourceViewResolver\"\
    >\n                    <property name=\"viewClass\"\n                        \
    \      value=\"org.springframework.web.servlet.view.JstlView\"/>\n           \
    \         <property name=\"prefix\">\n                        <value>/WEB-INF/JSP/</value>\n\
    \                    </property>\n                    <property name=\"suffix\"\
    >\n                        <value>.jsp</value>\n                    </property>\n\
    \                </bean>\n            </list>\n        </property>\n    </bean>\n\
    \n    ...\n    <context:component-scan base-package=\"com.prospringhibernate.gallery.restapi\"\
    />\n\n    <bean class=\"org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping\"\
    />\n    <bean class=\"org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter\"\
    />\n\n    <bean id=\"jaxbView\" class=\"org.springframework.web.servlet.view.xml.MarshallingView\"\
    >\n        <constructor-arg ref=\"jaxbMarshaller\"/>\n    </bean>\n\n    <!--\
    \ JAXB2 marshaller. Automagically turns beans into xml -->\n    <bean id=\"jaxbMarshaller\"\
    \ class=\"org.springframework.oxm.jaxb.Jaxb2Marshaller\">\n        <property name=\"\
    classesToBeBound\">\n            <list>\n                <value>com.prospringhibernate.gallery.dto.ArtEntityDTO</value>\n\
    \                <value>com.prospringhibernate.gallery.dto.CategoryDTO</value>\n\
    \                <value>com.prospringhibernate.gallery.dto.CommentDTO</value>\n\
    \                <value>com.prospringhibernate.gallery.dto.ExhibitionDTO</value>\n\
    \            </list>\n        </property>\n    </bean>\n    ...\n</beans>\n```\n\
    \n让我们逐步了解几个核心组件。首先，我们包含了一个 `ContentNegotiatingViewResolver`。这个 bean 允许我们插入多个 `ViewResolver`（它们驱动特定的渲染策略），并根据请求的\
    \ `content-type` 指定使用哪个 `ViewResolver`。这个 bean 有两个重要属性：`mediaTypes` 和 `viewResolvers`。`mediaTypes`\
    \ 属性配置了 `contentTypes`。`viewResolvers` 属性指定了 `ViewResolver`。各个属性中项目的顺序是关键，因为这是将一个与另一个关联起来的方式。\n\
    \n我们还集成了 `component-scanning`，指定了 REST 控制器的包。此外，我们还包含了通过注解执行请求映射所需的 bean。\n\n\
    最后，我们使用 Spring 的 `org.springframework.web.servlet.view.xml.MarshallingView` 类为\
    \ JAXB 视图指定了一个 bean。这个 bean 需要一个 `marshaller` 作为构造函数参数，我们通过引用接下来定义的 `jaxbMarshaller`\
    \ bean 来注入它。`jaxbMarshaller` bean 还需要一个要绑定的类列表，我们将所有 DTO 类（已使用 JAXB 注解正确注解）传递给它。\n\
    \n就是这样！我们建议您查看源代码，以更清楚地了解 REST 服务和 Spring 的 OXM 支持是如何运作的。\n\n## 处理并发\n\n在开发 REST\
    \ Web 服务时，我们通常会遇到的一个问题是可靠地处理对特定领域实体的并发修改尝试。在我们之前的 REST 示例中，我们研究了 HTTP GET 场景，其中我们的\
    \ Web 服务仅返回数据库中特定实体（或多个实体）的静态表示。当处理 HTTP PUT 操作（通常意味着应更新资源）时，事情就不那么简单了。\n\n正确处理同时尝试更新特定领域实体并不总是直截了当的。根据所使用的方法，可能会在可扩展性风险、数据库死锁可能性以及数据丢失或冲突方面产生后果。\n\
    \n### 乐观锁定\n\n对于两个同时发生的事务冲突的可能性相当小的应用程序，Hibernate 和 JPA 提供了对乐观锁定的支持。乐观锁定不会对访问或写入数据施加任何约束。相反，在提交当前事务之前，会验证相关领域实体的版本字段。如果版本字段的值与数据库中表示该特定领域实体的行的值不匹配，则意味着并发事务已修改了该领域实体。\n\
    \n当向领域类添加版本字段时（通过使用 `@Version` 注解字段），Hibernate 会在更新特定领域实体时自动递增该字段的值。然后，我们可以利用此功能来帮助防止在并发事务中修改的实体的状态被还原。换句话说，典型的更新操作会增强一个\
    \ SQL 条件来检查版本字段，例如更新 `ArtEntity` 领域实体的 `name` 属性将变为：\n\n```sql\nUPDATE artentity\
    \ SET name = 'foo', version = 8 where id = 4 and version = 7;\n```\n\n乐观锁定的好处在于它不会施加任何可能限制可扩展性的重大约束，例如数据库锁。然而，如果检测到版本不匹配，此策略将抛出异常，这意味着应用程序开发人员必须重新尝试事务，同时尝试协调冲突的数据。\n\
    \n### 悲观锁定"
  raw: '**@Controller** is a stereotype annotation that extends from **@Component**.
    Just as with **@Service** and


    **@Repository**, **@Controller** helps to indicate the purpose of this class and
    can be managed by Spring automatically through its component-scanning capability.


    You will also notice that we have autowired our **ArtworkFacade** implementation
    and the Dozer mapper. The real magic happens in each of the two methods defined.
    Both of these methods are annotated with **@RequestMapping**, which tells Spring
    the URL mapping rules for this controller method. In both methods, we have defined
    the URL with which the controller will be associated. More important, 169


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    however, is the use of the **{}** characters. Portions of the URL embedded within
    curly braces can be referenced in the method using the **@PathVariable** annotation.
    In this way, we have implicitly extracted portions of the URL to be injected into
    method parameters.


    In addition to the **@PathVariable** annotation, Spring also offers several other
    options for extracting aspects of the incoming request and mapping these values
    to method parameters. For example, query parameters and session attributes can
    also be mapped to parameters through the appropriate annotation. Check out the
    Spring documentation to learn more about implementing MVC controllers.


    Marshaling Data with Spring OXM


    One important detail that we can’t leave out is how we are rendering our DTOs
    as XML. To make this happen, we are leveraging Spring 3’s Object/XML Mapping (OXM)
    support. Spring’s OXM abstraction helps to decouple the marshaling implementation
    details from your application. This makes your code more portable and also simplifies
    the integration of multiple marshaling strategies.


    Let’s take a look at the Spring MVC configuration powering our REST service. The
    following is an abridged version of our **spring-web-gallery.xml** file.


    **<beans**


    ********xsi:schemaLocation="http://www.springframework.org/schema/beans**


    ****http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**


    ****http://www.springframework.org/schema/context**


    ****http://www.springframework.org/schema/context/spring-context-3.0.xsd**


    ****http://www.springframework.org/schema/util**


    ****http://www.springframework.org/schema/util/spring-util-3.0.xsd">**


    ****<bean class="org.springframework.web.servlet.view.ContentNegotiatingViewResolver">**


    **<property name="mediaTypes">**


    **<map>**


    **<entry key="xml" value="application/xml"/>**


    **<entry key="html" value="text/html"/>**


    **</map>**


    **</property>**


    **<property name="viewResolvers">**


    **<list>**


    **<bean class="org.springframework.web.servlet.view.BeanNameViewResolver"/>**


    **<bean**


    **class="org.springframework.web.servlet.view.InternalResourceViewResolver">**


    **<property name="viewClass"**


    **value="org.springframework.web.servlet.view.JstlView"/>**


    **<property name="prefix">**


    **<value>/WEB-INF/JSP/</value>**


    **</property>**


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    **<property name="suffix">**


    **<value>.jsp</value>**


    **</property>**


    **</bean>**


    **</list>**


    **</property>**


    **</bean>**


    ******. . .**


    ******<context:component-scan base-package="com.prospringhibernate.gallery.restapi"/>**


    ****<bean**


    **class="org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping"/>**


    **<bean**


    **class="org.springframework.web.servlet.mvc.annotation.AnnotationMethodHandlerAdapter"/>**


    ****<bean id="jaxbView" class="org.springframework.web.servlet.view.xml.MarshallingView">**


    **<constructor-arg ref="jaxbMarshaller"/>**


    **</bean>**


    ****<!-- JAXB2 marshaller. Automagically turns beans into xml -->**


    **<bean id="jaxbMarshaller" class="org.springframework.oxm.jaxb.Jaxb2Marshaller">**


    **<property name="classesToBeBound">**


    **<list>**


    **<value>com.prospringhibernate.gallery.dto.ArtEntityDTO</value>**


    **<value>com.prospringhibernate.gallery.dto.CategoryDTO</value>**


    **<value>com.prospringhibernate.gallery.dto.CommentDTO</value>**


    **<value>com.prospringhibernate.gallery.dto.ExhibitionDTO</value>**


    **</list>**


    **</property>**


    **</bean>**


    **. . .**


    ****</beans>**


    Let’s step through a few of the integral components. First, we have included a
    **ContentNegotiatingViewResolver**. This bean allows us to plug in multiple **ViewResolver**s
    (which power a particular rendering strategy), specifying which **ViewResolver**
    to use based on the **content-type** of the request. There are two important properties
    for this bean: **mediaTypes** and **viewResolvers**. The **mediaTypes** property
    configures the **contentTypes**. The **viewResolvers** property specifies the
    **ViewResolver**. The order of the items within the respective properties is key,
    as that is how one is associated with the other.


    We’ve also integrated **component-scanning**, specifying the package of our REST
    controllers.


    Additionally, we have included the necessary beans for performing request mapping
    via annotations.


    CHAPTER 10 ■ INTEGRATION FRAMEWORKS


    Finally, we have specified a bean for our JAXB view, using Spring’s


    **org.springframework.web.servlet.view.xml.MarshallingView** class. This bean
    requires a **marshaller** as a constructor argument, which we inject using a reference
    to the **jaxbMarshaller** bean defined next. The **jaxbMarshaller** bean also
    requires a list of classes to be bound, to which we pass all of our DTO classes
    (which have been properly annotated with JAXB annotations).


    That’s all there is to it! We recommend that you take a look at the source code
    to get a clearer sense of how the REST service and Spring’s OXM support operate.


    Handling Concurrency


    One of the issues we would typically run into when developing a REST web service
    is reliably handling concurrent attempts to modify a particular domain entity.
    In our earlier REST example, we examined an HTTP GET scenario, in which our web
    service only returned static representations of a particular entity (or entities)
    within our database. When dealing with HTTP PUT operations (which typically implies
    that a resource should be updated), things are not as simple.


    Properly handling simultaneous attempts to update a particular domain entity is
    not always straightforward. Depending on the approach used, there can be consequences
    in terms of scalability risks, database deadlock potential, and data loss or conflict.


    Optimistic Locking


    For applications in which the likelihood that two simultaneous transactions should
    conflict is fairly remote, Hibernate and JPA offer support for Optimistic Locking.
    Optimistic Locking does not pose any constraints on accessing or writing data.
    Instead, the version field of the relevant domain entity is verified before the
    current transaction is committed. If the value of the version field does not match
    the value of the row (representing this particular domain entity) in the database,
    this implies that a concurrent transaction has modified the domain entity.


    When a version field is added to a domain class (by annotating a field with **@Version**),
    Hibernate will automatically increment the value of this field on a particular
    domain entity whenever it is updated. We can then leverage this feature to help
    prevent entities that were modified in a concurrent transaction from having their
    state reverted. In other words, a typical update operation is enhanced with a
    SQL


    condition to check the version field, such that updating the name property of
    an **ArtEntity** domain entity would become:


    **UPDATE artentity SET name = ‘foo’, version = 8 where id = 4 and version = 7;**
    Optimistic Locking is beneficial in that it does not pose any significant constraints
    that could limit scalability, such as database locks. However, this strategy will
    throw an exception if a version mismatch is detected, which means that application
    developers must re-attempt the transaction, while trying to reconcile the conflicting
    data.


