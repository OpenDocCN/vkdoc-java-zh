- fmt: "Notice that our `ArtEntityDTO` still includes a `comments` property. This\
    \ property is represented by a `java.util.Set`, but rather than containing `Comment`\
    \ domain class instances, it holds `CommentDTO` instances.\n\nWe haven’t defined\
    \ our `CommentDTO` class yet, but like the `ArtEntityDTO`, this class will serve\
    \ as a simplified representation of a `Comment` entity.\n\nOne additional detail\
    \ we added to the `ArtEntityDTO` is the `@XmlRootElement(name = \"artEntity\"\
    )` annotation. One use case for a DTO class is to simplify the marshaling process\
    \ to XML or JSON.\n\n`@XMLRootElement` is a Java Architecture for XML Binding\
    \ (JAXB) annotation—a standard for object-to-XML marshaling. Later in this chapter,\
    \ we will leverage JAXB for rendering an XML representation of our domain classes,\
    \ as part of a REST web service.\n\nAlthough the differences between the `ArtEntity`\
    \ domain class and the `ArtEntityDTO` are not significant, the discrepancies are\
    \ intricate enough to require a fairly complex mapping strategy. For instance,\
    \ consider what would be required to map a collection of `Comment` instances to\
    \ a collection of `CommentDTO` instances. Luckily, Dozer is able to handle the\
    \ task of mapping and converting between these classes without requiring much\
    \ work.\n\nNext, let’s take a look at the `CommentDTO` class:\n\n```\n@XmlRootElement(name\
    \ = \"comment\")\npublic class CommentDTO {\n\n    private Long id;\n    private\
    \ String comment;\n    private Date commentDate;\n    private String firstName;\n\
    \    private String lastName;\n    private String emailAddress;\n    private String\
    \ telephone;\n\n    public Long getId() {\n        return id;\n    }\n\n    public\
    \ void setId(Long id) {\n        this.id = id;\n    }\n\n    public String getComment()\
    \ {\n        return comment;\n    }\n\n    public void setComment(String comment)\
    \ {\n        this.comment = comment;\n    }\n\n    public Date getCommentDate()\
    \ {\n        return commentDate;\n    }\n\n    public void setCommentDate(Date\
    \ commentDate) {\n        this.commentDate = commentDate;\n    }\n\n    public\
    \ String getFirstName() {\n        return firstName;\n    }\n\n    public void\
    \ setFirstName(String firstName) {\n        this.firstName = firstName;\n    }\n\
    \n    public String getLastName() {\n        return lastName;\n    }\n\n    public\
    \ void setLastName(String lastName) {\n        this.lastName = lastName;\n   \
    \ }\n\n    public String getEmailAddress() {\n        return emailAddress;\n \
    \   }\n\n    public void setEmailAddress(String emailAddress) {\n        this.emailAddress\
    \ = emailAddress;\n    }\n\n    public String getTelephone() {\n        return\
    \ telephone;\n    }\n\n    public void setTelephone(String telephone) {\n    \
    \    this.telephone = telephone;\n    }\n\n}\n```\n\nThe differences between the\
    \ `Comment` domain class and the `CommentDTO` class are fairly trivial. We have\
    \ removed the `commentedArt` property, which would create a circular reference\
    \ between the `ArtEntityDTO` and the `CommentDTO` (provided that we changed the\
    \ property type from `ArtEntity` to `ArtEntityDTO`).\n\n## Configuring Dozer with\
    \ Spring\n\nNow that we have defined our DTO classes, let’s create the mapping\
    \ configuration that instructs Dozer how to map one class to another. Dozer provides\
    \ a `DozerBeanMapperFactoryBean` abstraction for Spring, which is a factory bean\
    \ that will help to create the Dozer mapper. The Dozer mapper relies on an XML\
    \ configuration file to learn the rules that define how the properties of one\
    \ class are mapped to the properties of another class.\n\nFirst, let’s add the\
    \ appropriate configuration to our `spring-master.xml` file:\n\n```\n<bean class=\"\
    org.dozer.spring.DozerBeanMapperFactoryBean\">\n    <property name=\"mappingFiles\"\
    \ value=\"classpath*:/dozer-mapping.xml\"/>\n</bean>\n```\n\nThis bean is actually\
    \ quite flexible, and supports additional properties for defining custom converters,\
    \ event listeners, and other Dozer extension points. You can learn more about\
    \ the capabilities of the `DozerBeanMapperFactoryBean` on the Dozer website.\n\
    \nIn the preceding configuration, we have specified that the Dozer mapping files\
    \ should be located on the classpath, under the name `dozer-mapping.xml`. This\
    \ XML file defines the default behavior for Dozer as well as the rules for mapping\
    \ between one class and another. Let’s take a look at our Dozer mapping configuration:\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<mappings\n    xsi:schemaLocation=\"\
    http://dozer.sourceforge.net\n    http://dozer.sourceforge.net/schema/beanmapping.xsd\"\
    >\n\n    <configuration>\n        <stop-on-errors>true</stop-on-errors>\n    \
    \    <date-format>MM/dd/yyyy HH:mm</date-format>\n        <wildcard>true</wildcard>\n\
    \    </configuration>\n\n    <mapping>\n        <class-a>com.prospringhibernate.gallery.domain.ArtEntity</class-a>\n\
    \        <class-b>com.prospringhibernate.gallery.dto.ArtEntityDTO</class-b>\n\
    \        <field>\n            <a>galleryPicture.url</a>\n            <b>galleryURL</b>\n\
    \        </field>\n        <field>\n            <a>storagePicture.url</a>\n  \
