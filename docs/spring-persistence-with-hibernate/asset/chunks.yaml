- fmt: "虽然通常更倾向于通过配置或注解让 Spring 处理依赖注入，但也可以让你的测试类实现`ApplicationContextAware`或继承`AbstractJUnit4SpringContextTests`，这能让你直接访问`ApplicationContext`，并从中通过\
    \ bean 名称进行查找：\n\n`context.getBean(\"datasource\");`\n\n现在你已经掌握了一些为测试类注入依赖层的选项。剩下的问题是如何进行注入。在我们的画廊应用中，我们在一个名为`spring-master.xml`的\
    \ XML 文件中定义了 Spring bean，该文件又导入了我们的`spring-persistence.xml`配置。我们可以通过添加以下注解来导入此配置：\n\
    \n`@ContextConfiguration(locations = {\"classpath:/META-INF/spring/spring-master.xml\"\
    })`\n\n`@ContextConfiguration`注解定义了配置文件的路径。你可以根据每个测试的具体情况，决定是使用完整应用的 Spring 配置文件，还是定义一个更具体的、为特定测试需求量身定制的单元测试配置。\n\
    \n通过 XML 进行 Spring 配置很方便，但现在你可能想知道如何访问配置中定义的某些 bean，或者那些通过组件扫描获取的 bean。你还记得 Spring\
    \ 管理的 bean 可以使用的`@Autowired`注解吗？你可以在测试代码中使用它，来告诉 Spring JUnit `Runner`你需要一些 Spring\
    \ bean。\n\n以下是整合了所有这些内容的`PersonDAO`测试代码：\n\n```\npackage com.prospringhibernate.gallery.test;\n\
    \nimport org.junit.Test;\nimport org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit4.SpringJUnit4ClassRunner;\n\
    \nimport com.prospringhibernate.gallery.dao.PersonDao;\n\n@RunWith(SpringJUnit4ClassRunner.class)\n\
    @ContextConfiguration(locations = {\"classpath:spring-master.xml\"})\npublic class\
    \ PersonDaoTest {\n\n    @Autowired\n    PersonDao personDao;\n\n    @Test\n \
    \   public void testPerson() {\n        // insert test logic here\n    }\n\n}\n\
    ```\n\n让我们探讨一下这里发生了什么。`@RunWith`告诉 JUnit 测试需要一些额外的逻辑才能正确设置。这些额外的逻辑以一个实现了 JUnit\
    \ 的`Runner`接口的类实例的形式出现。在我们的例子中，我们有一个名为`SpringJUnit4ClassRunner`的 Spring `Runner`，它知道如何设置我们的应用上下文，并使用标准的\
    \ Spring 依赖注入注解（如`@Autowired`）为我们的测试注入所需的所有基础设施。`SpringJUnit4ClassRunner`还会查找其他一些注解，包括`@ContextConfiguration`和`@Transactional`。\n\
    \n正如你在示例中看到的，`@ContextConfiguration`告诉`SpringJUnit4ClassRunner`设置测试环境需要哪些配置文件。在幕后，`SpringJUnit4ClassRunner`根据你在`@ContextConfiguration`中指定的路径，为你的单元测试设置并管理一个\
    \ Spring 应用上下文。`TestContext`框架负责实际执行`@Autowired`注入。`TestContext`框架还会跟踪当前测试的状态结果，例如运行了哪个方法和类，以及测试过程中抛出了哪个异常。`@RunWith`和`@ContextConfiguration`是\
    \ Spring JUnit4 测试的核心组件。\n\n> **注意**：`TestContext`框架有一些性能优化措施，以确保如果你运行多个使用相同应用上下文配置的测试类，该框架只会为所有测试加载该配置一次。如果你需要更高级的测试，`TestContext`框架还有许多值得探索的额外高级功能。\n\
