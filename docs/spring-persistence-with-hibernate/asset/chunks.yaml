- fmt: "# HibernateTemplate 与 DAO 实现\n\n`HibernateTemplate`处理了 Hibernate 所需的大部分样板操作，将重要部分委托给您的代码。在使用\
    \ Hibernate（或任何持久化框架）时，需要相当多的资源管理才能确保一切可靠运行。例如，在执行持久化相关操作之前，需要进行一些设置：您需要打开数据库连接并获取\
    \ Hibernate 会话，还可能需要设置事务要求或检查是否应参与现有事务。最后，操作完成后，需要进行一些清理工作，确保会话关闭且事务正确提交或回滚。\n\
    \n`HibernateTemplate`负责处理这些繁琐的步骤。它还会捕获可能发生的任何异常，并将其转换为 Spring 自身的数据访问异常。这种转换使您能够使用一致的异常层次结构，该层次结构不依赖于特定的持久化框架，因此您可以轻松地在不同的持久化技术之间切换，而无需更改整个代码中的异常处理。\n\
    \n> **注意**：Spring 的异常层次结构不使用受检异常，这意味着您无需捕获这些异常。对于数据库操作而言，非受检异常更为实用。如果尝试写入数据库时出现问题，您的应用程序很可能无法恢复。因此，如果您对此无能为力，处理此异常又有什么意义呢？\n\
    \n## 构建 DAO\n\n我们将从图库应用程序的`CategoryDAO`实现开始。`ArtEntity`领域类可以组织到一个或多个类别中。此功能允许最终用户按类别浏览照片和艺术品。我们定义`CategoryDao`接口如下：\n\
    \n```java\npublic interface CategoryDao {\n\n    public List<Category> getCategories()\
    \ throws DataAccessException;\n\n    public Category getCategory(Long catId) throws\
    \ DataAccessException;\n\n    public List<ArtEntity> getArtworkInCategory(Long\
    \ catId)\n            throws DataAccessException;\n\n    public void saveCategory(Category\
    \ category) throws DataAccessException;\n\n}\n```\n\n> **注意**：尽管我们在本书前面介绍了`GenericDao`方法，但我们将退一步，从头开始研究\
    \ DAO。通常，我们会扩展`GenericDao`实现，并定义`GenericDao`基类未提供的那些额外方法。\n\n通过这些方法，我们可以加载单个类别、查找所有类别以及访问特定类别中的艺术品。`CategoryDao`还使我们能够保存`Category`对象的新实例。当然，我们的应用程序可能还会定义一些额外的与`Category`相关的持久化方法，但此接口足以用于说明目的。\n\
    \n## 使用 Spring 的 Hibernate 支持类\n\nSpring 擅长减少使某些功能正常工作所需的代码量。在构建 Hibernate DAO\
    \ 类时，您有几种选择。一种更常见的解决方案是扩展 Spring 的`HibernateDaoSupport`类。此抽象类要求您通过`setSessionFactory(SessionFactory\
    \ sessionFactory)`setter 方法传入 Hibernate `SessionFactory`。\n\n当然，您应该在 Spring 中配置`SessionFactory`，以便可以通过配置轻松注入。我们将很快演示此过程。\n\
    \n当有效的`SessionFactory`被注入到扩展`HibernateDaoSupport`的类中时，会自动为您创建一个`HibernateTemplate`实例，该实例使用传入的`SessionFactory`引用。`HibernateTemplate`的工作方式与\
    \ Spring 框架的其他模板抽象（例如`JDBCTemplate`和`TransactionTemplate`）类似。遵循模板设计模式，此类处理 Hibernate\
    \ 所需的所有繁重工作，以便您可以专注于持久化逻辑。结果是代码更简洁，通常只反映您正在实现的 Hibernate 持久化操作。\n\n扩展`HibernateDaoSupport`类是减少代码的理想选择，因为它自动为您的\
    \ Hibernate `SessionFactory`定义 setter 并处理`HibernateTemplate`的创建。但是，如果您的 DAO 需要从不同的基类扩展，您将无法同时扩展`HibernateDaoSupport`。当然，灵活性和解耦是\
    \ Spring 的关键理念，因此很少要求您扩展框架类（尽管有时这是首选）。相反，您可以直接创建`HibernateTemplate`：\n\n```java\n\
    @Repository(\"categoryDao\")\npublic class CategoryDaoImpl implements CategoryDao\
    \ {\n\n    private SessionFactory sessionFactory;\n    private HibernateTemplate\
    \ hibernateTemplate;\n\n    @Autowired\n    public void setSessionFactory(SessionFactory\
    \ sessionFactory) {\n        this.sessionFactory = sessionFactory;\n        this.hibernateTemplate\
    \ = new HibernateTemplate(sessionFactory);\n    }\n\n}\n```\n\n这种方法需要更多的管道代码，但您现在可以不受任何框架特定类的约束。请注意，我们在`setSessionFactory(SessionFactory\
    \ sf)`setter 方法中创建了`HibernateTemplate`。这样，当 Spring 注入 Hibernate `SessionFactory`时，`HibernateTemplate`将自动创建。我们应用了`@Repository`注解来帮助\
    \ Spring 通过组件扫描找到我们的 DAO，并使用`@Autowired`注解来注入`SessionFactory`。\n\n在上面的代码片段中，我们使用`@Autowired`注解自动注入一个`DataSource`类型的\
    \ bean。假设我们只有一个`DataSource`类型的 bean，此示例将正常工作。如果您的应用程序需要多个数据源，则需要确保消除任何潜在的歧义。如第\
    \ 2 章所述，您可以使用`@Qualifier`注解为 Spring 提供必要的提示，以便它能够区分您的数据源。\n\n选择哪种配置方法主要取决于您的编码风格。在前面的示例中，我们使用`@Repository`注解，表明我们正在配置一个具有持久化相关功能的类。此注解由\
    \ Spring 的组件扫描工具使用，我们在第 3 章中介绍过。通过组件扫描，Spring 搜索指定的包结构以查找那些被注解为组件的类，以便它们可以由 Spring\
    \ 管理并在依赖注入中发挥作用。\n\nSpring 定义了三个核心原型注解，每个注解代表典型应用程序中的一个层：\n\n- `@Repository`用于描述提供*数据仓库*功能的类。在这种情况下，它是我们的\
    \ DAO 实现，因为它服务于抽象与`Category`领域对象相关的所有数据访问功能的目的。\n- `@Controller`用于描述控制器类，这些类在\
    \ Web 层中用于处理请求。"
  raw: 'The **HibernateTemplate** handles most of the boilerplate operations required
    by Hibernate, delegating to your code for the important parts. When working with
    Hibernate (or any persistence framework), a fair amount of resource management
    is required to get everything working reliably. For instance, before performing
    a persistence-related operation, some setup is required. You need to open a database
    connection and get a Hibernate session. You also may set up transactional requirements
    or check if there is an existing transaction that you should take part in. Finally,
    after an operation completes, some cleanup is required, ensuring that the session
    is closed and transactions are properly committed or rolled back.


    The **HibernateTemplate** takes care of these arduous steps. It also catches any
    exceptions that may occur and translates them into Spring’s own data-access exceptions.
    This conversion allows you to work with a consistent exception hierarchy that
    is not tied to a specific persistence framework, so you can easily switch between
    disparate persistence technologies without needing to change the exception handling
    throughout your code.


    ■ **Note** Spring’s exception hierarchy does not use checked exceptions, meaning
    you aren’t required to catch any of these exceptions. When it comes to database
    operations, unchecked exceptions are far more pragmatic. If something goes awry
    when you are trying to write to the database, chances are there’s nothing your
    application can do to recover. So what is the point of handling this exception
    if you can’t do much about it anyway?


    Building a DAO


    We’ll start with the **CategoryDAO** implementation for our gallery application.
    **ArtEntity** domain classes can be organized into one or more categories. This
    feature allows end-users to browse for photos and artwork by categories. We define
    the **CategoryDao** interface as follows: **public interface CategoryDao {**


    ****public List<Category> getCategories() throws DataAccessException;**


    ****public Category getCategory(Long catId) throws DataAccessException;**


    ****public List<ArtEntity> getArtworkInCategory(Long catId)**


    **throws DataAccessException;**


    ****public void saveCategory(Category category) throws DataAccessException;**


    ****}**


    ■ **Note** Although we introduced our **GenericDao** approach earlier in this
    book, we are going to take a step back and examine rolling a DAO from scratch.
    Typically, we would extend from our **GenericDao** implementation and define those
    additional methods not provided by the **GenericDao** base class.


    CHAPTER 6 ■ DAOS AND QUERYING


    With these methods, we can load an individual category, find all the categories,
    and access artwork within a particular category. The **CategoryDao** enables us
    to save new instances of **Category** objects as well. Of course, our application
    might also define a few additional **Category**-related persistence methods, but
    this interface is sufficient for illustrative purposes.


    Using Spring’s Hibernate Support Classes


    Spring excels at reducing the amount of code you need to write in order to get
    something to work. When it comes to building Hibernate DAO classes, you have several
    options. One of the more common solutions is to extend Spring’s **HibernateDaoSupport**
    class. This abstract class requires that you pass in a Hibernate **SessionFactory**
    via the **setSessionFactory(SessionFactory sessionFactory)** setter method.


    You should, of course, configure your **SessionFactory** in Spring so that it
    can be easily injected via configuration. We will demonstrate this process shortly.


    When a valid **SessionFactory** is injected into a class that extends **HibernateDaoSupport**,
    a **HibernateTemplate** instance is automatically created for you, using the **SessionFactory**
    reference that was passed in. The **HibernateTemplate** works in a similar fashion
    to the Spring Framework’s other template abstractions, such as the **JDBCTemplate**
    and **TransactionTemplate**. Following the Template design pattern, this class
    handles all the heavy lifting required by Hibernate so that you can focus on the
    persistence logic. The result is cleaner code that usually reflects very little
    other than the Hibernate persistence operations you are implementing.


    Extending the **HibernateDaoSupport** class is ideal for reducing code, since
    it automatically defines a setter for your Hibernate **SessionFactory** and handles
    the creation of a **HibernateTemplate**. However, if your DAO needs to extend
    from a different base class, you won’t be able to extend **HibernateDaoSupport**
    as well. Of course, flexibility and decoupling are key Spring philosophies, and
    therefore you are rarely required to extend from framework classes (although this
    is sometimes preferred). Instead, you can simply create your **HibernateTemplate**
    directly:


    **@Repository("categoryDao")**


    **public class CategoryDaoImpl implements CategoryDao {**


    ****private SessionFactory sessionFactory;**


    **private HibernateTemplate hibernateTemplate;**


    ****@Autowired**


    **public void setSessionFactory(SessionFactory sessionFactory) {**


    **this.sessionFactory = sessionFactory;**


    **this.hibernateTemplate = new HibernateTemplate(sessionFactory);**


    **}**


    ****}**


    This approach requires a little more plumbing, but you are now free from extending
    any framework-specific classes. Notice that we created our **HibernateTemplate**
    within our **setSessionFactory(SessionFactory sf)** setter method. This way, when
    Spring injects the Hibernate **SessionFactory**, the **HibernateTemplate** will
    be automatically created. We applied the **@Repository** annotation to help Spring
    find our DAO via component scanning, and used the **@Autowired** annotation to
    inject the **SessionFactory**.


    In the above snippet, we are using the **@Autowired** annotation to automatically
    inject a bean of type **DataSource**. Provided we have only a single bean of type
    **DataSource**, this example will work fine. If your application requires multiple
    datasources, you will need to ensure that you remove any potential for 87


    CHAPTER 6 ■ DAOS AND QUERYING


    ambiguity. As discussed in Chapter 2, you can use the **@Qualifier** annotation
    to provide Spring with the necessary hints so that it is able to distinguish among
    your datasources.


    The choice over which configuration approach to use largely depends on your coding
    style. In the preceding example, we use the **@Repository** annotation, indicating
    that we are configuring a class with persistence-related functionality. This annotation
    is used by Spring’s component-scanning facility, which we introduced in Chapter
    3\. With component scanning, Spring searches a specified package structure to
    find those classes annotated as components so that they can be managed by Spring
    and play a role in dependency injection.


    Spring defines three core stereotype annotations, each representing a layer within
    a typical application:


    • **@Repository** is used to delineate those classes that provide *data repository*
    functionality. In this case, it is our DAO implementation, as it serves the purpose
    of abstracting all data-access functionality that relates to the **Category**
    domain object.


    • **@Controller** is used to delineate controller classes, which are used in the
    web layer to handle requests.'
