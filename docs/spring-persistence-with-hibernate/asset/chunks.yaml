    would typically handle this *content negotiation* by specifying a **content-type**
    header (for example, **json/text**).


    A well-designed API may also allow you to indicate which data representation you
    expect to receive in return by supplying an **Accept** header. Adhering to the
    semantics of HTTP, the successful addition of our book would return HTTP status
    code 201, created. The API would likely also provide a link to the resource representing
    the newly created entity by its name,


    **http://api.apress.com/book/prospringhibernate**, or perhaps better yet, via
    the ISBN-13 number, **http://api.apress.com/book/978-1430226323**.


    With a resource defined, a RESTful web service can use the verbs provided by HTTP
    to access or manipulate the data these resources represent. For example, if you
    wanted to retrieve the current representation of our book, you would issue an
    HTTP **GET** on the resource **http://api.apress.com/book/978-1430226323**, specifying
    a **content-type** header as **json/text**. The JSON


    response might look like this:


    **{**


    **"book" : {**


    **"ISBN-13" : "978-1430226321",**


    **"title" : "Code Generation in Action",**


    **"authors" : {**


    **"author" : [ {**


    **"first" : "Paul", "last" : "Fisher"**


    **}, {**


    **"first" : "Brian", "last" : "Murphy"**


    **}**


    **] },**


    **"publisher" : "Apress"**


    **}**


    **}**'
