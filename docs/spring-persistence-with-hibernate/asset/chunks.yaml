    Hibernate 提供了多个不同的缓存层。一级缓存的作用域是 **EntityManager**，但通常不需要过多调整。二级缓存则提供了缓存领域对象、集合和查询的能力。每种缓存类型都独立管理和缓存。


    领域对象通过其标识符作为键，对象所有属性的值都会被持久化到缓存中。然而，关联和查询仅持久化标识符的集合。这些标识符会与实体缓存进行交叉引用，以加载实际的领域对象数据。


    某些缓存实现（例如 Ehcache）支持集群，允许将缓存更新持久化到集群中的其他节点。但是，如果无法保持集群内其他节点的缓存同步，就可能导致因版本冲突或数据陈旧而引发的严重问题。例如，对数据库进行的重要更新可能会被意外回滚。当某个节点的缓存未收到对数据库初始更新的通知时，就可能发生这种情况。


    第 9 章 ■ 最佳实践与高级技术


    然后，当另一个用户尝试对同一实体执行写操作时，该用户是在陈旧数据的基础上应用其更新，这实际上会在第二个（陈旧的）进程被应用后，回滚最初的更新。


    在部署集群应用时，使用可集群的缓存或集群中所有节点都能共享的集中式缓存服务器非常重要。Ehcache 提供了一个名为 Cache Server 的独立服务器产品。此外，Ehcache
    还提供了多种可配置选项，用于调整其集群特性。尝试各种设置以确定最适合你应用需求的选项至关重要。


    在下一章中，我们将继续研究为持久化层提供专门功能、提升性能以及运用最佳实践的高级策略。


    **第 10 章**


    ■ ■ ■


    **集成框架**


    很少有应用会仅需要 Spring 和 Hibernate。根据你的具体情况，很可能需要集成多个框架以满足应用需求。有时这些集成细节很简单。其他时候，与另一个框架的集成可能会带来一系列独特的挑战。


    当今工程师面临的两个非常常见的需求是实现全文搜索和暴露基于 Web 的 API。在本章中，我们将向你展示如何利用多个框架来实现这些目标。为了给我们的艺术画廊应用暴露一个
    API，我们将利用 Spring 3.0 中新增的 RESTful Web 服务增强功能，以及 Dozer、Spring 的对象/XML 映射支持，以及用于数据编组的
    Data Transfer Object 模式。为了实现全文搜索，我们将利用 Hibernate Search，这是 Hibernate 的一个子项目，它提供了一种将
    Lucene 无缝集成到基于 Hibernate 的应用中的方式。


    使用 Spring 实现 RESTful Web 服务


    如今，Web 应用的需求已变得日益复杂。随着处理能力和带宽的提升，用户的期望也随之提高，导致了更复杂的架构以及更具交互性和响应性的功能。由控制器和 JSP
    驱动的模板驱动型 HTML 网页已很少能满足需求。相反，当今的典型应用需要客户端和服务器之间的异步消息传递——通常利用 Ajax 或 Flash。这种从纯服务器端处理的转变意味着渲染用户界面只是战斗的一部分。


    在当今许多富互联网应用（RIA）中，大量工作通常围绕着与 Web 服务通信或将数据序列化作为远程处理策略的一部分。


    REST，即表述性状态转移，在实现 Web 服务方面已变得越来越流行。REST 最好被描述为一种架构风格，而非标准或协议。REST 利用 HTTP 提供一种一致的、面向资源的方法来表示数据。与远程过程调用（RPC）风格的通信（其隐喻更类似于方法调用）相反，REST
    专注于特定资源的表示，该资源通常体现为一个 URL。RESTful API 利用了 Web 的许多内置特性，例如缓存、代理和基于 HTTP 的身份验证策略。


    ![图片 8](img/index-171_1.jpg)


    第 10 章 ■ 集成框架


    ■ **注意** Roy Fielding 于 2000 年在其博士论文中首次提出了 REST 这一术语。Fielding 是 HTTP 规范的主要作者之一，REST
    是与 HTTP 1.1 规范并行定义的。


    名词、动词和内容类型


    RESTful API 通常用名词、动词和内容类型来表达：


    • *名词*是资源的名称。这些名称通常表示为 URL。


    • *动词*是可以对资源执行的操作。这些动词是常见的 HTTP 动词：**GET**、**POST**、**PUT** 和 **DELETE**。


    • *内容类型表示*指的是用于实现机器间通信的数据格式。常见的表示有 XML、JSON、HTML、二进制数据（如图像），甚至 RDF 本体。


    名词、动词和表示可以如图 10-1 所示进行可视化。


    *图 10-1\. REST 信徒眼中的名词、动词和内容类型表示* 为了进一步说明名词、动词和内容类型表示之间的关系，假设 Apress 有一个用于管理其图书的
    API。要创建你正在阅读的这本书，我们可能会在类似 **http://api.apress.com/book/** 的 URL 上发出一个 HTTP **POST**。该
    **POST** 的正文以及返回数据的格式完全由 API 设计者决定。REST 并未规定特定的数据格式，因此 API 设计者必须根据自身情况做出正确选择。该
    API 可能接受 XML、JSON 或任何可以通过 HTTP 传输的数据格式。Apress API 甚至可能支持数据的多种表示，允许 API 的消费者以 XML
    或 JSON 格式向单个资源 URL 发出请求。通常，你会通过指定一个 **content-type** 头（例如 **json/text**）来处理这种*内容协商*。


    一个设计良好的 API 还可能允许你通过提供 **Accept** 头来指示你期望接收哪种数据表示。遵循 HTTP 的语义，成功添加我们的图书将返回 HTTP
    状态码 201（已创建）。该 API 很可能还会提供一个指向代表新创建实体的资源的链接，通过其名称 **http://api.apress.com/book/prospringhibernate**，或者更好的方式是通过
    ISBN-13 编号 **http://api.apress.com/book/978-1430226323**。


    定义了资源后，RESTful Web 服务就可以使用 HTTP 提供的动词来访问或操作这些资源所代表的数据。例如，如果你想检索我们图书的当前表示，你可以在资源
    **http://api.apress.com/book/978-1430226323** 上发出一个 HTTP **GET**，并指定 **content-type**
    头为 **json/text**。JSON 响应可能如下所示：


    **{**


    **"book" : {**


    **"ISBN-13" : "978-1430226321",**


    **"title" : "Code Generation in Action",**


    **"authors" : {**


    **"author" : [ {**


    **"first" : "Paul", "last" : "Fisher"**


    **}, {**


    **"first" : "Brian", "last" : "Murphy"**


    **}**


    **] },**


    **"publisher" : "Apress"**


    **}**


    **}**

