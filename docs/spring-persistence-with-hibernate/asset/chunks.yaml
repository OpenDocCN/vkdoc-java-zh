    \ List<ArtEntity> getArtEntitiesByTitle(String title) {\n    CriteriaBuilder criteriaBuilder\
    \ = entityManager.getCriteriaBuilder();\n    CriteriaQuery<ArtEntity> criteriaQuery\
    \ =\n        criteriaBuilder.createQuery(ArtEntity.class);\n    Root<ArtEntity>\
    \ root = criteriaQuery.from(ArtEntity.class);\n    Path<String> path = root.<String>get(\"\
    title\");\n    criteriaQuery.where(criteriaBuilder.equal(path, title));\n    return\
    \ entityManager.createQuery(criteriaQuery).getResultList();\n}\n```\n\n如果你考虑 JPQL\
    \ 查询的结构，那么你应该能够推断出上述方法的作用。第一行获取对`CriteriaBuilder`的引用。`CriteriaBuilder`类对于生成 Criteria\
