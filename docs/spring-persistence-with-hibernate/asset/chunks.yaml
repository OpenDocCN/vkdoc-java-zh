    **Integration Frameworks**


    Rare will be the case in which an application will require Spring and Hibernate
    alone. Depending on your situation, you will likely need to integrate with multiple
    frameworks in order to meet your application’s requirements. Sometimes these integration
    details will be a trivial matter. Other times, integration with another framework
    can present its own unique set of challenges.


    Two very common requirements faced by engineers today are implementing free-text
    search and exposing web-based APIs. In this chapter, we’ll show you how you can
    leverage several frameworks to attain these goals. To expose an API for our art
    gallery application, we’ll take advantage of the RESTful web service enhancements
    added to Spring 3.0, as well as Dozer, Spring’s Object/XML Mapping support, and
    the Data Transfer Object pattern for data marshaling. To implement free-text search,
    we’ll leverage Hibernate Search, a subproject of Hibernate that provides a seamless
    way to integrate Lucene into a Hibernate-based application.


