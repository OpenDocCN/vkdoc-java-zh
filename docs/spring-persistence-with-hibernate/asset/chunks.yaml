    There is a lot happening in this POM configuration file. First, you’ll notice
    the XML namespace that’s defined for Maven and its POM schema definition.


    **modelVersion** is used to declare the version of the POM for your project. This
    protects you from compatibility issues when upgrading the version of Maven you
    are using.


    Next up is a series of fields commonly referred to as the *project coordinates*
    because they uniquely identify the project. By convention, the **groupId** uses
    the reverse domain of the organization that created the project. The **artifactId**
    is the unique name within a given **groupId**, and **version** is the specific
    release of a project. No two projects may have the same combination of **groupId:artifactId:version**.


    The **packaging** element is a special attribute in the project coordinates. It’s
    not used as a part of the unique identifier, but it describes the output of a
    given project. The default value is **jar**, to produce a Java archive (JAR file).
    Since, we’re building a web application, we specify **war** to output a web archive
    (WAR file).


    The **properties** section offers a convenient place to define variables that
    you use in the rest of your configuration. In our project, we have ten Spring
    JAR files outlined as dependencies. Managing them all individually is tedious.
    Using the **properties** attributes simplifies the management of upgrading versions
    of Spring.


    Finally, the **build** attribute offers a place for you to define, among other
    things, the plugins you require for your project. For our project, the Tomcat
    Maven plugin provides an excellent mechanism for easily building and running our
    web application on the Apache Tomcat application server.


    With that, we have a very basic application stubbed out. You can execute **mvn
    initialize** from your root **gallery** folder at a command prompt. If you’ve
    done everything correctly, Maven will fetch your dependencies and deliver the
    message **BUILD SUCCESS**.


    Of course, our application doesn’t yet *do* anything. Let’s start laying down
    our Spring configuration so we can change that.


    Spring Configuration


    When building reasonably large Spring applications, you end up with a lot of Spring
    beans configured in the Spring **ApplicationContext**. As you saw in Chapter 2,
    every object that you configure for use in the Spring container is registered
    in the **ApplicationContext**, which is a subinterface of Spring’s **BeanFactory**.


    The **ApplicationContext** provides you with the tools you need to interact with
    your configured beans.


    We recommend creating a root configuration file, and then importing all other
    configuration files, so that the XML files don’t become too large and obtuse.


    The following is an extremely basic Spring configuration file (**gallery/src/main/resources/META-INF/spring/spring-master.xml**).


    **<?xml version="1.0" encoding="UTF-8" standalone="no"?>**


    **<beans**


    ******xsi:schemaLocation="http://www.springframework.org/schema/beans** **http://www.springframework.org/schema/beans/spring-beans-3.0.xsd**
    **http://www.springframework.org/schema/context**


    **http://www.springframework.org/schema/context/spring-context-3.0.xsd">**


    ****<context:property-placeholder location="classpath*:META-INF/spring/*.properties"/>**


