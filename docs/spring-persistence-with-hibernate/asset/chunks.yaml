- fmt: "# 第三章 ■ 基本应用程序设置\n\n## Maven POM 配置\n\n```xml\n<groupId>org.hibernate</groupId>\n\
    <artifactId>hibernate-core</artifactId>\n<version>${hibernate.version}</version>\n\
    </dependency>\n\n<!-- Most dependencies omitted for brevity... -->\n</dependencies>\n\
    \n<build>\n  <plugins>\n    <plugin>\n      <groupId>org.codehaus.mojo</groupId>\n\
    \      <artifactId>tomcat-maven-plugin</artifactId>\n      <version>1.0</version>\n\
    \    </plugin>\n  </plugins>\n  <!-- Other plugins omitted for brevity... -->\n\
    </build>\n\n</project>\n```\n\n这个 POM 配置文件中包含了很多内容。首先，你会注意到为 Maven 及其 POM 模式定义定义的\
    \ XML 命名空间。\n\n`modelVersion` 用于声明项目的 POM 版本。这可以保护你在升级 Maven 版本时免受兼容性问题的影响。\n\n\
    接下来是一系列通常被称为*项目坐标*的字段，因为它们唯一标识了项目。按照惯例，`groupId` 使用创建项目的组织的反向域名。`artifactId` 是给定\
    \ `groupId` 中的唯一名称，而 `version` 是项目的特定发布版本。没有两个项目可以拥有相同的 `groupId:artifactId:version`\
    \ 组合。\n\n`packaging` 元素是项目坐标中的一个特殊属性。它不作为唯一标识符的一部分，但描述了给定项目的输出。默认值是 `jar`，用于生成\
    \ Java 归档（JAR 文件）。由于我们正在构建一个 Web 应用程序，我们指定 `war` 来输出 Web 归档（WAR 文件）。\n\n`properties`\
    \ 部分提供了一个方便的位置来定义在配置其余部分中使用的变量。在我们的项目中，我们有十个 Spring JAR 文件作为依赖项列出。逐个管理它们很繁琐。使用\
    \ `properties` 属性简化了管理 Spring 版本升级的工作。\n\n最后，`build` 属性提供了一个位置，用于定义项目所需的插件等。对于我们的项目，Tomcat\
    \ Maven 插件提供了一种优秀的机制，可以轻松地在 Apache Tomcat 应用服务器上构建和运行我们的 Web 应用程序。\n\n至此，我们有了一个非常基本的应用程序框架。你可以从根目录\
    \ `gallery` 文件夹在命令提示符下执行 `mvn initialize`。如果你一切操作正确，Maven 将获取你的依赖项并显示消息 `BUILD\
    \ SUCCESS`。\n\n当然，我们的应用程序还没有*做*任何事情。让我们开始配置 Spring，以便改变这种情况。\n\n## Spring 配置\n\
    \n在构建规模较大的 Spring 应用程序时，最终会在 Spring `ApplicationContext` 中配置大量 Spring Bean。正如你在第\
    \ 2 章中看到的，每个配置为在 Spring 容器中使用的对象都注册在 `ApplicationContext` 中，它是 Spring `BeanFactory`\
    \ 的子接口。\n\n`ApplicationContext` 为你提供了与配置的 Bean 进行交互所需的工具。\n\n我们建议创建一个根配置文件，然后导入所有其他配置文件，这样\
    \ XML 文件就不会变得过于庞大和难以理解。\n\n以下是一个极其基本的 Spring 配置文件（`gallery/src/main/resources/META-INF/spring/spring-master.xml`）：\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>\n<beans\n\
    \    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans-3.0.xsd\n\
    \    http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context-3.0.xsd\"\
    >\n\n    <context:property-placeholder location=\"classpath*:META-INF/spring/*.properties\"\
    />\n\n    <context:component-scan base-package=\"com.prospringhibernate\">\n \
    \       <context:exclude-filter type=\"annotation\"\n            expression=\"\
    org.springframework.stereotype.Controller\"/>\n    </context:component-scan>\n\
    \n    <import resource=\"spring-datasource.xml\"/>\n</beans>\n```\n\n让我们更详细地分析\
    \ `spring-master.xml` 文件的内容。\n\n### 命名空间支持\n\nSpring 从框架 2.0 版本开始引入了广泛的命名空间支持。在\
    \ IoC 容器中，一切都是 Bean，但随着时间的推移，你的配置可能会变得非常冗长。引入命名空间旨在简化处理事务等集成点时的 XML 配置。如果需要，你甚至可以定义自己的命名空间。\n\
    \n在我们的 `spring-master.xml` 配置文件中使用了两个命名空间，由 `xmlns` 声明标记：\n\n- `beans` 命名空间是定义应用程序所有基本\
    \ Bean 定义所必需的（例如 DAO、服务层 Bean 等）。\n- `context` 命名空间作为配置 Spring 某些核心基础设施的便利工具提供。\n\
    \n### 外部化属性配置\n\n此配置定义了一个 `PropertyPlaceholderConfigurer`，它允许你将某些设置外部化到 Spring\
    \ 配置之外的属性文件中。\n\n```xml\n<context:property-placeholder\n    location=\"classpath*:META-INF/spring/*.properties\"\
    />\n```\n\n`property-placeholder` 将自动定位并解析你在类路径下 `META-INF/spring` 目录中的任何属性文件。任何你想要替换的属性都应在\
    \ Spring 配置中这样表示：`${propertyKey}`。在本章后面配置图库应用程序的数据源时，你将看到一个完整的示例。\n\n### 组件扫描\n\
    \n下一个重要的配置部分是组件扫描，它在 Spring 2.5 中引入，作为进一步简化 Spring 应用程序配置方式的一种机制。\n\n```xml\n\
    <context:component-scan base-package=\"com.prospringhibernate\">\n```\n\n此声明将导致\
    \ Spring 定位应用程序中的每个 `@Component`、`@Repository` 和 `@Service`。实际上，这允许你编写一个 POJO，然后简单地将新的\
    \ POJO 注解为 `@Service`。Spring 将在启动时自动检测、实例化并依赖注入你的服务。\n\n此外，组件扫描还会启用其他值得注意的 Spring\
    \ 注解，如 `@Inject`、`@Named` 和 `@PostConstruct` 支持。这些注解允许你在类中使用常见的 Spring 和 Java\
