    ### 转换行终止符


    不同平台的行终止符各不相同。Windows 使用回车符（CR）和回车换行符（CRLF）作为行终止符。类 UNIX 操作系统使用换行符（LF）作为行终止符。CR
    由 ASCII 十进制数 13、Unicode 转义序列 `\u000D`、八进制转义序列 `\015` 以及转义序列 `\r` 表示。LF 由 ASCII
    十进制数 10、Unicode 转义序列 `\u000A`、八进制转义序列 `\012` 以及转义序列 `\n` 表示。LF 也被称为换行字符。


    考虑以下文本块：


    ```

    """

    Hello

    Terminator

    """

    ```


    这个文本块中有多少个字符——15、17、19 还是其他？仅通过查看这个文本块很难确定确切的字符数。答案取决于编写此文本块所使用的平台。你可以看到 15 个可见字符——`Hello`
    占 5 个，`Terminator` 占 10 个。内容中的两行各有一个行终止符，虽然不可见，但你能看到其效果。回想一下，行终止符可能是一个或两个字符，具体取决于平台。如果你在
    Windows 上编辑此文本块，不可见的行终止符如下所示：


    ```

    """

    HelloCRLF

    TerminatorCRLF

    """

    ```


    如果你在类 UNIX 操作系统上编辑此文本块，不可见的行终止符如下所示：


    ```

    """

    HelloLF

    TerminatorLF

    """

    ```


    将 CR 和 LF 各计为一个字符，该文本块在 Windows 上包含 19 个字符，在类 UNIX 操作系统上包含 17 个字符。两个开发者在不同平台上编写相同的文本块，会得到不同的字符数。你可能会同意，这种差异既非本意，也不可接受。


    文本块内容中的行终止符由编译器进行规范化处理。编译器将 CR 和 CRLF 替换为 LF。此转换确保具有相同视觉内容的文本块在不同平台上包含相同的最终字符串。这就是此阶段发生的全部操作。在此阶段转换后，无论平台或源代码编码如何，文本块的内容如下所示：


    ```

    """

    HelloLF

    TerminatorLF

    """

    ```


    文本块可能包含转义序列，例如作为转义序列 `\r` 和 `\n` 的 CR 和 LF，这些在此阶段保持不变。所有转义序列将在最后阶段进行转换。


    ### 转换无关空白


    在此阶段之前，所有行终止符都已规范化为 LF。在此阶段，我将行终止符简称为行终止符，它始终指代 LF。本节中的所有示例文本块均使用点号来显示其内容中的空格。


    在此阶段，编译器会移除无关的前导和尾随空白。要从内容中所有非空行移除的前导空白数量计算如下：


    *   计算时不考虑带有开始定界符的行。


    *   仅由空白组成的行称为空行，计算时不考虑这些行。空行可能仅包含一个行终止符，或包含带有行终止符的空白。


    *   如果结束定界符单独放在一行（无论是否带有空白），则计算时会考虑该行。请注意，根据空行的定义，当你将结束定界符单独放在一行时，该行是一个空行。然而，就本次计算而言，它是一行重要的行，不会被忽略。


    *   统计每个非空行上前导空白的数量。每个空白计为 1。也就是说，如果一行包含两个空格，另一行包含一个空格和一个制表符，则此步骤将这两行的前导空白都计为
    2。


    *   计算所有非空行的前导空白计数的最小值。假设你有五个非空行，其前导空白计数分别为 15、19、23、19、15 和 13。所有计数的最小值为 13。


    *   从所有非空行中移除上一步计算出的最小空白数量。


    *   从所有行（不仅仅是非空行）中移除所有尾随空白。此步骤将移除非空行中的尾随空白。它还会将空行压缩为仅包含行终止符的空行。


    #### 示例 1


    考虑以下文本块：


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..............""";

    ```


    所有非空行的前导空白计数分别为 14、18、22、18、14 和 14。结束定界符被单独放在一行，并且它被视为非空行，用于计算要从所有行中移除的空白数量。所有行的最小空白计数为
    14。因此，编译器从所有行中移除 14 个空白。编译器还会从四行中移除所有尾随空白。得到的字符串是：


    ```

    ....

    ........Hello, HTML

    ....


    ```


    #### 示例 2


    考虑以下文本块，其中结束定界符被放在行首：


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    """;

    ```


    得到的字符串会是什么？请记住，带有结束定界符的行始终参与最小空白计数的计算。在这种情况下，最后一行的空白计数为 0。因此，所有非空行的前导空白计数分别为 14、18、22、18、14
    和 0。最小空白计数为 0，这将导致编译器不移除任何前导空白。像往常一样，所有尾随空白都将被移除。得到的字符串如下所示：


    ```

    ..............

    ..................

    ......................Hello, HTML

    ..................

    ..............

    ```


    ### 提示


    如果你想保留非空行上的所有前导空白，请将结束行终止符单独放在一行的开头。


    #### 示例 3


    考虑以下文本块：


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ............""";

    ```


    所有非空行的前导空白计数分别为 14、18、22、18、14 和 12。这些计数的最小值为 12，因此将从所有非空行中移除 12 个前导空白。像往常一样移除尾随空白。得到的字符串如下所示：


    ```

    ..

    ....

    ........Hello, HTML

    ....

    ..

    ```


    #### 示例 4


    考虑以下文本块，其中我将结束定界符向右放置了 18 个空格：


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..................""";

    ```


    所有非空行的前导空白计数分别为 14、18、22、18、14 和 18。这些计数的最小值为 14，因此将从所有非空行中移除 14 个前导空白。像往常一样移除尾随空白。得到的字符串如下所示：


    ```

    ....

    ........Hello, HTML

    ....


    ```


    请注意，当结束定界符被单独放在一行，并且它起始于任何非空行上任何非空白字符的右侧时，结束定界符的位置在前导空白移除中不起任何作用。

