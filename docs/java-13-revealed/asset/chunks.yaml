    # 1. 局部变量类型推断


    在本章中，您将学习


    *   什么是类型推断


    *   什么是局部变量类型推断


    *   什么是受限类型名 `var`


    *   使用 `var` 声明局部变量、for-each 循环和 for 循环的索引，以及隐式类型 lambda 表达式的形参的规则


    ## 什么是类型推断？


    假设您想将一个人 ID（例如 10）存储在一个变量中。您可能会这样声明变量：


    ```

    int personId = 10;

    ```


    要存储一个人 ID 列表，您可能会这样声明变量：


    ```

    ArrayList personIdList = new ArrayList();

    ```


    将上述变量声明重写为如下形式如何？


    ```

    var personId = 10;

    var personIdList = new ArrayList();

    ```


    您可能会说这看起来像 JavaScript 代码，而不是 Java 代码。在 Java 10 之前确实如此。现在您可以使用 `var` 来声明*带有初始化器的局部变量*。编译器会负责为您的变量推断出正确的类型——有时也可能是非预期的错误类型。在
    Java 10 及更高版本中，前面的代码片段等同于以下代码：


    ```

    int personId = 10;

    ArrayList personIdList = new ArrayList();

    ```


    这是否意味着在 Java 中不再需要使用显式类型来声明局部变量？这是否意味着 Java 已经像 JavaScript 一样变成了动态类型语言？不，这些都不正确。使用
    `var` 声明局部变量存在限制——有些是技术上的，有些是实践上的。Java 仍然是一种强类型、静态类型的语言。您刚刚看到的示例只是编译器添加的语法糖。编译器会推断变量的类型并生成字节码，这与
    Java 10 之前生成的字节码相同。Java 运行时永远不会看到 `var`！接下来的几节将为您介绍类型推断的一些背景知识，以及关于如何以及在何处使用 `var`
    声明局部变量的所有规则和例外情况。


    Java 中的一切都围绕类型展开。您要么声明类型（如类和接口），要么使用它们。您在程序中使用的每个表达式和值都有类型。例如，值 10 是 `int` 类型，10.67
    是 `double` 类型，`"Hello"` 是 `String` 类型，表达式 `new Person()` 是 `Person` 类型。


    根据变量或表达式的使用上下文推导其类型称为*类型推断*。在引入 `var` 之前，Java 就已经有了类型推断，例如在 lambda 表达式和泛型类型的对象创建表达式中。以下语句使用了类型推断，它通过读取左侧的
    `ArrayList<Integer>` 将右侧的菱形运算符（`<>`）推断为 `<Integer>`：


    ```

    ArrayList personIdList = new ArrayList();

    ```


    以下语句使用了一个隐式类型的 lambda 表达式，其中形参 `n1` 和 `n2` 的类型分别被推断为 `Integer` 和 `Long`：


    ```

    BiFunction avg = (n1, n2) -> (n1 + n2)/2.0;

    ```

