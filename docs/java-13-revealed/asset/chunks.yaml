    method in its superclass or superinterface, you cannot call that method statically.
    That is, you cannot call that method in your source code – the compiler won’t
    compile it. However, using `var` in anonymous class declaration allows you to
    do so, because your inferred variable type is compiler-generated non-denotable
    type of the anonymous class. The following JShell session demonstrates this:


    ```

    jshell> var runnable = new Runnable() {

    ...>     public void run() {

    ...>         System.out.println("Inside run()...");

    ...>     }

    ...>

    ...>     public void test() {

    ...>         System.out.println(

    ...>             "Calling this method is possible because of var...");

    ...>     }

    ...> };

    runnable ==> $0@7823a2f9

    jshell> runnable.run();

    Inside run()...

    jshell> runnable.test();

    Calling this method is possible because of var...

    ```


    Consider the following statement, where the return type of the `getClass()` method
    in the `Object` class is `Class<?>`:


    ```

    // The inferred type of name is String

    var name = "John";

    // The inferred type of cls is Class

    var cls = name.getClass();

    ```


    In this case, the capture variable type in `Class<?>` has been projected upward
    to the supertype of the class of the `name` variable and the inferred type of
    `cls` is `Class<? extends String>` rather than `Class<?>`.


    Here is the last example of the inferred non-denotable types:


    ```

    var list = List.of(10, 20, 45.89);

    ```


    What would be the inferred type of the `list` variable? This is a harder case
    to understand. The arguments to the `List.of()` method are of `Integer` and `Double`
    types. The `Integer` and `Double` classes are declared as follows:


    *   `public final class Integer extends Number implements Comparable<Integer>,
    Constable, ConstantDesc`


    *   `public final class Double extends Number implements Comparable<Double>, Constable,
    ConstantDesc`


    Both `Integer` and `Double` types implement three interfaces: `Comparable`, `Constable`,
    and `ConstantDesc`. The `Constable` and `ConstantDesc` interfaces were added in
    Java 12, and they are in the `java.lang.constant` package. In this case, the compiler
    projects the `Integer` and `Double` to their common supertype `Number` and uses
    an intersection of the `Number` and the three interface types as the inferred
    type.


    The previous variable declaration (`var list = List.of(10, 20, 45.89);`) is equivalent
    to the following. Note that an intersection type is non-denotable, so you cannot
    use the following statement in your source code. I am showing it here just to
    show you the actual type being inferred. You can also use JShell to enter the
    previous statement to see the following as its inferred type:


    ```

    List&java.lang.constant.Constable&java.lang.constant.ConstantDesc>&java.lang.constant.Constable&java.lang.constant.ConstantDesc>
    list = List.of(10, 20, 45.89);

    ```


    Using `var` to declare variables may become complex at the compiler level. Use
    explicit types in such situations to make your intention clear. Remember, clarity
    is more important than brevity. You could rewrite the previous statement as follows:


    ```

    List list = List.of(10, 20, 45.89);

    ```


    ### Not Allowed in Fields and Methods Declarations


    Using `var` to declare fields (instance and static), method’s parameters, and
    method’s return type is not allowed. Public fields and methods define the interface
    for a class. They are referenced in other classes. Making a subtle change in their
    declaration may need other classes to be recompiled. Using `var` in local variables
    has only local effects. This is the reason that fields and methods are not supported
    by `var`. Private fields and methods were considered during the design, but not
    supported, to keep the implementation of `var` simple.


    ## Using final with var


    You can use `var` to declare a `final` variable . The `final` modifier behaves
    the same as it did before the introduction of `var`. The following local variable
    declaration is valid:


    ```

    // The inferred type of personId is int.

    // personId is final. You cannot assign another value to it.

    final var personId = 1001;

    ```'
