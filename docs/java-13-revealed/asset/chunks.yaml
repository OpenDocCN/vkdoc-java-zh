    ### 提示


    你可以使用 `HttpClient.Builder` 接口的 `followRedirects()` 方法来设置 `HttpClient` 的重定向策略。


    清单 3-6 包含一个完整的程序，用于演示重定向策略的使用。程序输出后附有相关讨论。你得到的输出可能有所不同。


    ```

    // FollowRedirection.java

    package com.jdojo.http.client;

    import java.io.IOException;

    import java.net.URI;

    import java.net.URLEncoder;

    import java.net.http.HttpClient;

    import static java.net.http.HttpClient.Redirect.NORMAL;

    import java.net.http.HttpRequest;

    import java.net.http.HttpResponse;

    import java.net.http.HttpResponse.BodyHandlers;

    import static java.nio.charset.StandardCharsets.UTF_8;

    public class FollowRedirection {

    public static void main(String[] args) {

    // 使用默认配置创建一个 HttpClient

    HttpClient client = HttpClient.newHttpClient();

    // 新 URL 的位置

    String location = "http://httpbin.org/ip";

    // 准备一个会将请求重定向到新位置的 URL

    String uriStr = "http://httpbin.org/redirect-to?"

    + "url=" + URLEncoder.encode(location, UTF_8)

    + "&status_code=301";

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create(uriStr))

    .build();

    // 使用默认的 NEVER 重定向策略发送请求。

    // 期望收到状态码为 301 的响应。

    printResponse(client, request);

    System.out.println("-----------------------------------");

    // 创建一个重定向策略为 NORMAL 的 HttpClient

    client = HttpClient.newBuilder()

    .followRedirects(NORMAL)

    .build();

    // 使用 NORMAL 重定向策略发送请求

    // 期望收到状态码为 200 的响应

    printResponse(client, request);

    }

    public static void printResponse(HttpClient client,

    HttpRequest request) {

    try {

    HttpResponse response

    = client.send(request, BodyHandlers.ofString());

    // 获取响应状态码和响应体

    int statusCode = response.statusCode();

    String body = response.body();

    String locationHeader = response.headers()

    .firstValue("Location")

    .orElse("");

    System.out.println("状态码: " + statusCode);

    System.out.println("Location 头: " + locationHeader);

    System.out.println("响应体:\n" + body);

    } catch (IOException | InterruptedException e) {

    e.printStackTrace();

    }

    }

    }

    状态码: 301

    Location 头: http://httpbin.org/ip

    响应体:


    状态码: 200

    Location 头:

    响应体:

    {

    "origin": "23.131.128.26, 23.131.128.26"

    }

    清单 3-6

    通过在 HttpClient 中设置重定向策略来跟随服务器重定向

    ```


    该程序使用了 [`http://httpbin.org/redirect-to`](http://httpbin.org/redirect-to) 这个 URL。该
    URL 会重定向到 `uri` 查询字符串参数中指定的新 URL，并返回 `status_code` 查询字符串参数中指定的响应状态码。你使用了 [`http://httpbin.org/ip`](http://httpbin.org/ip)
    作为重定向 URL，并将状态码设为 301。同一个请求被发送了两次。第一次，你使用 `NEVER` 作为重定向策略发送请求，这是 `HttpClient`
    的默认策略。你收到了预期的响应，状态码为 301，并且 `Location` 头被设置为我们请求中设置的重定向 URL。第二次，你将 `HttpClient`
    的重定向策略设置为 `NORMAL`，这允许 `HttpClient` 跟随重定向。重定向后，你从 [`http://httpbin.org/ip`](http://httpbin.org/ip)
    URL 收到了响应，该响应返回了发起请求的客户端的 IP 地址。


    #### 发起异步请求


    当你使用 `HttpClient` 的 `send()` 方法时，调用会被阻塞，直到收到响应。你可能出于多种原因不希望这样做。HTTP 请求的异步处理能带来很多好处，例如提高性能和响应能力。你的程序可以在等待响应时执行其他操作。你可能需要向多个服务器发送相同的请求，并希望在收到所有或部分服务器的响应后恢复处理。通过
    HTTP 请求的异步处理，可以非常容易地实现这一点。


    使用 `HttpClient` 类的 `sendAsync()` 方法可以向服务器异步发送请求。该方法返回一个 `CompletableFuture<HttpResponse<T>>`，其中
    `T` 是响应体类型。例如，如果你使用一个将响应体处理为 `String` 的 body handler，该方法将返回一个 `CompletableFuture<HttpResponse<String>>`。以下代码片段异步地将响应体打印到标准输出：


    ```

    // 使用默认配置创建一个 HttpClient

    HttpClient client = HttpClient.newHttpClient();

    // 使用 HTTP GET 方法

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .build();

    // 打印响应体

    client.sendAsync(request, BodyHandlers.ofString())

    .thenApply(HttpResponse::body)

    .thenAccept(System.out::println);

    ```


    这段代码片段中，除了对 `thenApply()` 和 `thenAccept()` 方法的调用之外，并无特别之处。有关这些方法的更多详细信息，请参考 `java.util.concurrent.CompletableFuture<T>`
    类的文档。`thenApply()` 方法接受一个 `Function<T,R>` 作为参数，该函数接受类型为 `HttpResponse<String>`
    的响应对象作为参数，并返回一个 `String` 类型的响应体。`thenAccept()` 方法打印响应体，该响应体是从上一个完成阶段传递过来的。`sendAsync()`
    方法使用由 `Executor` 提供的独立线程来处理请求。你也可以通过 `HttpClient.Builder` 接口的 `executor()` 方法配置
    `HttpClient`，从而使用你自己的 `Executor`。


    `sendAsync()` 方法会立即返回，请求和响应稍后在独立的线程中处理。如果你将前面的语句作为 `main()` 方法中的最后一条语句，你的程序可能看不到任何输出。当你的请求被发送、响应在其他守护线程中被处理时，`"main"`
    这个非守护线程已经终止，这反过来会导致你的程序终止。你可以通过调用 `get()` 或 `join()` 方法来解决这个问题，这两个方法会返回最后一个完成阶段的结果。两者的区别在于，`get()`
    方法会抛出受检异常，而 `join()` 方法会抛出非受检异常。以下代码片段解决了程序不输出任何内容的问题：


    ```

    // 打印响应体

    client.sendAsync(request, BodyHandlers.ofString())

    .thenApply(HttpResponse::body)

    .thenAccept(System.out::println)

    .join();

    ```


    清单 3-7 包含一个完整的程序，用于异步处理请求及其响应。你得到的输出可能有所不同。

    '
