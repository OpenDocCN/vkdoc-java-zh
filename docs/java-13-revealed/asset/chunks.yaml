- fmt: "# Using the `Runtime.Version` Class\n\nJDK 9 added a static nested class called\
    \ `Runtime.Version` whose instances represent version strings. The class does\
    \ not have a public constructor. You can obtain an instance of this class in the\
    \ following two ways:\n\n* Using the static `version()` method of the `Runtime`\
    \ class\n* Using the static `parse(String vstr)` method of the `Runtime.Version`\
    \ class\n\nThe static `version()` method of the `Runtime` class returns a `Runtime.Version`,\
    \ which represents the version of the JRE. The following snippet of code prints\
    \ the current version of the JRE, which indicates that my JRE is an early access\
    \ build 29 of the feature release 13:\n\n```\nRuntime.Version version = Runtime.version();\n\
    System.out.println(version);\n13-ea+29\n```\n\nYou can use the `parse()` method\
    \ of the `Runtime.Version` class to parse a version string and obtain a `Runtime.Version`.\
    \ The `parse()` method throws an `IllegalArgumentException` if the specified string\
    \ is not a valid version string:\n\n```\n// Parse a version string \"12.0.1+12\"\
    \nRuntime.Version version = Runtime.Version.parse(\"12.0.1+12\");\nSystem.out.println(version);\n\
    12.0.1+12\n```\n\nThe following methods in the `Runtime.Version` class return\
    \ elements of a version string. Method names are intuitive enough to guess the\
    \ type of element they return:\n\n* `int feature()`\n* `int interim()`\n* `int\
    \ update()`\n* `int patch()`\n* `Optional<String> pre()`\n* `Optional<Integer>\
    \ build()`\n* `Optional<String> optional()`\n\n**Tip** The `major()`, `minor()`,\
    \ and `security()` methods in the `Runtime.Version` class were deprecated in JDK\
    \ 10. Use the `feature()`, `interim()`, and `update()` methods of the class instead.\n\
    \nNotice that for the optional elements, `$pre`, `$build`, and `$opt`, the return\
    \ type is `Optional`. For the optional `$interim`, `$update`, and `$patch` elements,\
    \ the return type is `int`, not `Optional`, which will return zero if they are\
    \ absent in the version string.\n\nThe version number in a version string may\
    \ contain additional information after the fourth element. The `Runtime.Version`\
    \ class does not contain a method to get the additional information directly.\
    \ It contains a `version()` method that returns a `List<Integer>` where the list\
    \ contains all elements of the version number. The first four elements in the\
    \ list are `$feature`, `$interim`, `$update`, and `$patch` in order. The remaining\
    \ elements are the additional version number information. The list contains at\
    \ least one element, which is the feature version number (`$feature`).\n\nThe\
    \ `Runtime.Version` class contains methods to compare two version strings for\
    \ order and equality. You can compare them with or without the optional build\
    \ information (`$opt`). Those comparison methods are as follows:\n\n* `int compareTo(Runtime.Version\
    \ v)`\n* `int compareToIgnoreOptional(Runtime.Version v)`\n* `boolean equals(Object\
    \ v)`\n* `boolean equalsIgnoreOptional(Object v)`\n\nThe expression `v1.compareTo(v2)`\
    \ will return a negative integer, zero, or a positive integer if `v1` is less\
    \ than, equal to, or greater than `v2`. The `compareToIgnoreOptional()` method\
    \ works the same way as the `compareTo()` method, except that it ignores the optional\
    \ build information while comparing. The `equals()` and `equalsIgnoreOptional()`\
    \ methods compare two version strings for equality with and without the optional\
    \ build information.\n\nWhich version string represents the latest build, `10.0.1.1`\
    \ or `10.0.1.1-ea`? The first one does not contain the pre-release element, whereas\
    \ the second one does, so the first one is the latest build. Which version string\
    \ represents the latest build, `10.0.1.1` or `10.0.1.2-ea`? This time, the second\
    \ one represents the latest build because the version number `10.0.1.1` is considered\
    \ less than `10.0.1.2`. When the version number is greater, other elements in\
    \ the version string are not compared. Here are the detailed rules for comparing\
    \ two version strings:\n\n* Comparison occurs in the following sequence: `$vnum`,\
    \ `$pre`, `$build`, and `$opt`.\n* Comparison begins by comparing each element\
    \ of the version number. A zero is assumed if any part in the version number is\
    \ missing. In the string from the feature version number, if any element in first\
    \ version string is greater than the corresponding element in the second version\
    \ string, the first version string is greater. For example, `10.0.1.1` is less\
    \ than `11`.\n* If two version strings are the same based on their version numbers,\
    \ the pre-release elements are compared. A version string with a pre-release element\
    \ is always less than a version string without one. If pre-release elements consist\
    \ only of digits, numerical comparison is made; otherwise, they are compared lexicographically.\
    \ A numeric pre-release element is considered less than a non-numeric one.\n*\
    \ A version without a build number is always less than the one with a build number.\
    \ If both version strings have a build number, they are compared numerically.\n\
    * A version with additional information element (`$opt`) is considered greater\
    \ than the one without a `$opt`. Otherwise, the values of `$opt` are compared\
    \ lexicographically.\n\nPrograms in this chapter are in the `jdojo.version.scheme`\
    \ module as shown in Listing 2-1.\n\n```\n// module-info.java\nmodule jdojo.version.scheme\
    \ {\n    exports com.jdojo.version.scheme;\n}\n```\n\nListing 2-2 contains a complete\
    \ program to show how to extract all parts of version string using the `Runtime.Version`\
    \ class. You may get a different output in the first section where the details\
    \ of the current JRE version are printed."
  raw: '## Using the Runtime.Version Class


    JDK 9 added a static nested class called `Runtime.Version` whose instances represent
    version strings. The class does not have a public constructor. You can obtain
    an instance of this class in the following two ways:


    *   Using the static `version()` method of the `Runtime` class


    *   Using the static `parse(String vstr)` method of the `Runtime.Version` class


    The static `version()` method of the `Runtime` class returns a `Runtime.Version`,
    which represents the version of the JRE. The following snippet of code prints
    the current version of the JRE, which indicates that my JRE is an early access
    build 29 of the feature release 13:


    ```

    Runtime.Version version = Runtime.version();

    System.out.println(version);

    13-ea+29

    ```


    You can use the `parse()` method of the `Runtime.Version` class to parse a version
    string and obtain a `Runtime.Version`. The `parse()` method throws an `IllegalArgumentException`
    if the specified string is not a valid version string:


    ```

    // Parse a version string "12.0.1+12"

    Runtime.Version version = Runtime.Version.parse("12.0.1+12");

    System.out.println(version);

    12.0.1+12

    ```


    The following methods in the `Runtime.Version` class return elements of a version
    string. Method names are intuitive enough to guess the type of element they return:


    *   `int feature()`


    *   `int interim()`


    *   `int update()`


    *   `int patch()`


    *   `Optional<String> pre()`


    *   `Optional<Integer> build()`


    *   `Optional<String> optional()`


    **Tip** The `major()`, `minor()`, and `security()` methods in the `Runtime.Version`
    class were deprecated in JDK 10\. Use the `feature()`, `interim()`, and `update()`
    methods of the class instead.


    Notice that for the optional elements, `$pre`, `$build`, and `$opt`, the return
    type is `Optional`. For the optional `$interim`, `$update`, and `$patch` elements,
    the return type is `int`, not `Optional`, which will return zero if they are absent
    in the version string.


    The version number in a version string may contain additional information after
    the fourth element. The `Runtime.Version` class does not contain a method to get
    the additional information directly. It contains a `version()` method that returns
    a `List<Integer>` where the list contains all elements of the version number.
    The first four elements in the list are `$feature`, `$interim`, `$update`, and
    `$patch` in order. The remaining elements are the additional version number information.
    The list contains at least one element, which is the feature version number (`$feature`).


    The `Runtime.Version` class contains methods to compare two version strings for
    order and equality. You can compare them with or without the optional build information
    (`$opt`). Those comparison methods are as follows:


    *   `int compareTo(Runtime.Version v)`


    *   `int compareToIgnoreOptional(Runtime.Version v)`


    *   `boolean equals(Object v)`


    *   `boolean equalsIgnoreOptional(Object v)`


    The expression `v1.compareTo(v2)` will return a negative integer, zero, or a positive
    integer if `v1` is less than, equal to, or greater than `v2`. The `compareToIgnoreOptional()`
    method works the same way as the `compareTo()` method , except that it ignores
    the optional build information while comparing. The `equals()` and `equalsIgnoreOptional()`
    methods compare two version strings for equality with and without the optional
    build information.


    Which version string represents the latest build, `10.0.1.1` or `10.0.1.1-ea`?
    The first one does not contain the pre-release element, whereas the second one
    does, so the first one is the latest build. Which version string represents the
    latest build, `10.0.1.1` or `10.0.1.2-ea`? This time, the second one represents
    the latest build because the version number `10.0.1.1` is considered less than
    `10.0.1.2`. When the version number is greater, other elements in the version
    string are not compared. Here are the detailed rules for comparing two version
    strings:


    *   Comparison occurs in the following sequence: `$vnum`, `$pre`, `$build`, and
    `$opt`.


    *   Comparison begins by comparing each element of the version number. A zero
    is assumed if any part in the version number is missing. In the string from the
    feature version number, if any element in first version string is greater than
    the corresponding element in the second version string, the first version string
    is greater. For example, 10.0.1.1 is less than 11.


    *   If two version strings are the same based on their version numbers, the pre-release
    elements are compared. A version string with a pre-release element is always less
    than a version string without one. If pre-release elements consist only of digits,
    numerical comparison is made; otherwise, they are compared lexicographically.
    A numeric pre-release element is considered less than a non-numeric one.


    *   A version without a build number is always less than the one with a build
    number. If both version strings have a build number, they are compared numerically.


    *   A version with additional information element (`$opt`) is considered greater
    than the one without a $`opt`. Otherwise, the values of `$opt` are compared lexicographically.


    Programs in this chapter are in the `jdojo.version.scheme` module as shown in
    Listing [2-1](#419466_2_En_2_Chapter.xhtml#PC8).


    ```

    // module-info.java

    module jdojo.version.scheme {

    exports com.jdojo.version.scheme;

    }

    Listing 2-1

    A Module Named jdojo.version.scheme

    ```


    Listing [2-2](#419466_2_En_2_Chapter.xhtml#PC9) contains a complete program to
    show how to extract all parts of version string using the `Runtime.Version` class
    . You may get a different output in the first section where the details of the
    current JRE version are printed.'
  trans: "\n## 使用 Runtime.Version 类\n\nJDK 9 新增了一个名为 `Runtime.Version` 的静态嵌套类，其实例代表版本字符串。该类没有公共构造方法。你可以通过以下两种方式获取该类的实例：\n\
    \n*   使用 `Runtime` 类的静态 `version()` 方法\n*   使用 `Runtime.Version` 类的静态 `parse(String\
    \ vstr)` 方法\n\n`Runtime` 类的静态 `version()` 方法返回一个 `Runtime.Version`，它代表 JRE 的版本。以下代码片段打印了当前\
    \ JRE 的版本，表明我的 JRE 是功能版本 13 的早期访问构建版本 29：\n\n```\nRuntime.Version version = Runtime.version();\n\
    System.out.println(version);\n13-ea+29\n```\n\n你可以使用 `Runtime.Version` 类的 `parse()`\
    \ 方法来解析版本字符串并获取一个 `Runtime.Version`。如果指定的字符串不是有效的版本字符串，`parse()` 方法会抛出 `IllegalArgumentException`：\n\
    \n```\n// 解析版本字符串 \"12.0.1+12\"\nRuntime.Version version = Runtime.Version.parse(\"\
    12.0.1+12\");\nSystem.out.println(version);\n12.0.1+12\n```\n\n`Runtime.Version`\
    \ 类中的以下方法返回版本字符串的元素。方法名称直观，足以猜测它们返回的元素类型：\n\n*   `int feature()`\n*   `int interim()`\n\
    *   `int update()`\n*   `int patch()`\n*   `Optional<String> pre()`\n*   `Optional<Integer>\
    \ build()`\n*   `Optional<String> optional()`\n\n**提示** `Runtime.Version` 类中的\
    \ `major()`、`minor()` 和 `security()` 方法已在 JDK 10 中弃用。请改用该类的 `feature()`、`interim()`\
    \ 和 `update()` 方法。\n\n请注意，对于可选元素 `$pre`、`$build` 和 `$opt`，返回类型是 `Optional`。对于可选的\
    \ `$interim`、`$update` 和 `$patch` 元素，返回类型是 `int`，而不是 `Optional`，如果它们在版本字符串中不存在，则返回零。\n\
    \n版本字符串中的版本号在第四个元素之后可能包含附加信息。`Runtime.Version` 类不包含直接获取附加信息的方法。它包含一个 `version()`\
    \ 方法，该方法返回一个 `List<Integer>`，其中列表包含版本号的所有元素。列表中的前四个元素依次是 `$feature`、`$interim`、`$update`\
    \ 和 `$patch`。其余元素是附加的版本号信息。该列表至少包含一个元素，即功能版本号（`$feature`）。\n\n`Runtime.Version`\
    \ 类包含用于比较两个版本字符串的顺序和相等性的方法。你可以选择是否包含可选的构建信息（`$opt`）进行比较。这些比较方法如下：\n\n*   `int\
    \ compareTo(Runtime.Version v)`\n*   `int compareToIgnoreOptional(Runtime.Version\
    \ v)`\n*   `boolean equals(Object v)`\n*   `boolean equalsIgnoreOptional(Object\
    \ v)`\n\n表达式 `v1.compareTo(v2)` 将返回一个负整数、零或正整数，具体取决于 `v1` 是小于、等于还是大于 `v2`。`compareToIgnoreOptional()`\
    \ 方法的工作方式与 `compareTo()` 方法相同，区别在于它在比较时会忽略可选的构建信息。`equals()` 和 `equalsIgnoreOptional()`\
    \ 方法分别在有和没有可选构建信息的情况下比较两个版本字符串是否相等。\n\n哪个版本字符串代表最新的构建版本，`10.0.1.1` 还是 `10.0.1.1-ea`？第一个不包含预发布元素，而第二个包含，因此第一个是最新的构建版本。哪个版本字符串代表最新的构建版本，`10.0.1.1`\
    \ 还是 `10.0.1.2-ea`？这次，第二个代表最新的构建版本，因为版本号 `10.0.1.1` 被认为小于 `10.0.1.2`。当版本号更大时，版本字符串中的其他元素不再进行比较。以下是比较两个版本字符串的详细规则：\n\
    \n*   比较按以下顺序进行：`$vnum`、`$pre`、`$build` 和 `$opt`。\n*   比较从版本号的每个元素开始。如果版本号中的任何部分缺失，则假定为零。从功能版本号开始，如果第一个版本字符串中的任何元素大于第二个版本字符串中的对应元素，则第一个版本字符串更大。例如，10.0.1.1\
    \ 小于 11。\n*   如果两个版本字符串的版本号相同，则比较预发布元素。带有预发布元素的版本字符串总是小于不带预发布元素的版本字符串。如果预发布元素仅由数字组成，则进行数值比较；否则，按字典顺序进行比较。数字预发布元素被认为小于非数字预发布元素。\n\
    *   没有构建号的版本总是小于有构建号的版本。如果两个版本字符串都有构建号，则按数值进行比较。\n*   带有附加信息元素（`$opt`）的版本被认为大于不带\
    \ `$opt` 的版本。否则，按字典顺序比较 `$opt` 的值。\n\n本章中的程序位于 `jdojo.version.scheme` 模块中，如清单\
    \ 2-1 所示。\n\n```\n// module-info.java\nmodule jdojo.version.scheme {\n    exports\
    \ com.jdojo.version.scheme;\n}\n清单 2-1\n一个名为 jdojo.version.scheme 的模块\n```\n\n\
    清单 2-2 包含一个完整的程序，演示如何使用 `Runtime.Version` 类提取版本字符串的所有部分。在打印当前 JRE 版本详细信息的第一个部分，你可能会得到不同的输出。\n"
- fmt: "```java\n// VersionTest.java\npackage com.jdojo.version.scheme;\nimport java.lang.Runtime.Version;\n\
    import java.util.stream.Collectors;\nimport static java.lang.System.out;\npublic\
    \ class VersionTest {\npublic static void main(String[] args) {\n// Print the\
    \ version string details of the current JRE\nVersion jreVersion = Runtime.version();\n\
    out.println(\"Current JRE Version: \" + jreVersion);\nprintVersionDetails(jreVersion.toString());\n\
    // Have some version strings\nString[] versionStrings = {\n\"10\", \"10.1\", \"\
    10.0.1.2\", \"10.0.2.3.4\", \"10.0.0\",\n\"10.1.2-ea+153\", \"10+132\", \"10-ea+24-2018-01-23\"\
    , \"10+-123\",\n\"10.0.1-ea+132-2018-01-28.10.56.45am\"};\n// Parse each version\
    \ string and display their components\nfor (String vstr : versionStrings) {\n\
    printVersionDetails(vstr);\n}\n}\npublic static void printVersionDetails(String\
    \ vstr) {\ntry {\nVersion version = Version.parse(vstr);\n// Get the additional\
    \ version number elements which starts\n// at the 5th element in the version number\
    \ part\nString vnumAdditionalInfo = version.version()\n.stream()\n.skip(4)\n.map(n\
    \ -> n.toString())\n.collect(Collectors.joining(\".\"));\nout.printf(\"Version\
    \ String=%s%n\", vstr);\nout.printf(\"feature=%d, interim=%d, update=%d, patch=%d,\"\
    \n+ \" additional info=%s,\"\n+ \" pre=%s, build=%s, optional=%s %n%n\",\nversion.feature(),\n\
    version.interim(),\nversion.update(),\nversion.patch(),\nvnumAdditionalInfo,\n\
    version.pre().orElse(\"\"),\nversion.build().isPresent()\n? version.build().get().toString()\n\
    : \"\",\nversion.optional().orElse(\"\"));\n} catch (Exception e) {\nout.printf(\"\
    %s%n%n\", e.getMessage());\n}\n}\n}\nCurrent JRE Version: 13-ea+29\nVersion String=13-ea+29\n\
    feature=13, interim=0, update=0, patch=0, additional info=, pre=ea, build=29,\
    \ optional=\nVersion String=10\nfeature=10, interim=0, update=0, patch=0, additional\
    \ info=, pre=, build=, optional=\nVersion String=10.1\nfeature=10, interim=1,\
    \ update=0, patch=0, additional info=, pre=, build=, optional=\nVersion String=10.0.1.2\n\
    feature=10, interim=0, update=1, patch=2, additional info=, pre=, build=, optional=\n\
    Version String=10.0.2.3.4\nfeature=10, interim=0, update=2, patch=3, additional\
    \ info=4, pre=, build=, optional=\nInvalid version string: '10.0.0'\nVersion String=10.1.2-ea+153\n\
    feature=10, interim=1, update=2, patch=0, additional info=, pre=ea, build=153,\
    \ optional=\nVersion String=10+132\nfeature=10, interim=0, update=0, patch=0,\
    \ additional info=, pre=, build=132, optional=\nVersion String=10-ea+24-2018-01-23\n\
    feature=10, interim=0, update=0, patch=0, additional info=, pre=ea, build=24,\
    \ optional=2018-01-23\nVersion String=10+-123\nfeature=10, interim=0, update=0,\
    \ patch=0, additional info=, pre=, build=, optional=123\nVersion String=10.0.1-ea+132-2018-01-28.10.56.45am\n\
    feature=10, interim=0, update=1, patch=0, additional info=, pre=ea, build=132,\
    \ optional=2018-01-28.10.56.45am\nListing 2-2\nA VersionTest Class That Shows\
    \ How to Use the Runtime.Version Class to Work with Version Strings\n```\n\n##\
    \ Printing Java Version Strings\n\nYou can use one of the options in Table [2-2](#419466_2_En_2_Chapter.xhtml#Tab2)\
    \ with the `java` command to print the Java product version string. The output\
    \ is printed to the standard output or standard error.\n\n**Table 2-2** Options\
    \ for the `java` Command to Print the Product Version\n\n| Option | Description\
    \ |\n| --- | --- |\n| `-version` | Prints the product version to the error stream\
    \ and exits. |\n| `--version` | Prints the product version to the output stream\
    \ and exits. |\n| `-showversion` | Prints the product version to the error stream\
    \ and continues. |\n| `--show-version` | Prints the product version to the output\
    \ stream and continues. |\n| `-fullversion` | Prints the product version to the\
    \ error stream and exits. |\n| `--full-version` | Prints the product version to\
    \ the output stream and exits. |\n\nThese options differ in three ways: the output\
    \ format, the destination of the output, and the post-output behavior. I will\
    \ show their output format shortly. If an option continues, it means it prints\
    \ the output to its destination and continues to execute other parts of the command,\
    \ if any. For example, you can use the `-showversion` and `--show-version` options\
    \ to print the product version and run a class:\n\n```\njava --show-version --module-path\
    \ dist --module test/com.jdojo.Test\n```\n\nThe following is the list of the output\
    \ formats of each of the options where `\\u0020` stands for the Unicode value\
    \ for the space character. In the format specifier,\n\n*   The free-form text\
    \ such as `\"openjdk version\"` will be printed as is for open JDK. When you use\
    \ Oracle JDK, `\"openjdk version\"` is replaced with `\"java version\"`.\n\n*\
    \   `${LTS}` expands to `\"\\u0020LTS\"` if the first three characters in the\
    \ `$opt` part of the version string are `\"LTS\"`.\n\n*   `${JVV}` expands to\
    \ `\"\\u0020${java.vendor.version}\"` if the `java.vendor.version` system property\
    \ is defined.\n\n```\nC:\\> java -version\nopenjdk version \\\"${java.version}\\\
    \" ${java.version.date}${LTS}\n${java.runtime.name}${JVV} (build ${java.runtime.version})\n\
    ${java.vm.name}${JVV} (build ${java.vm.version}, ${java.vm.info})\nC:\\> java\
    \ --version\nopenjdk ${java.version} ${java.version.date}${LTS}\n${java.runtime.name}${JVV}\
    \ (build ${java.runtime.version})\n${java.vm.name}${JVV} (build ${java.vm.version},\
    \ ${java.vm.info})\nC:\\> java -showversion \nopenjdk version \\\"${java.version}\\\
    \" ${java.version.date}${LTS}\n${java.runtime.name}${JVV} (build ${java.runtime.version})\n\
    ${java.vm.name}${JVV} (build ${java.vm.version}, ${java.vm.info})\n[Output of\
