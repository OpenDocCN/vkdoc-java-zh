- fmt: '# Creating File Systems from a Path


    Java has been supporting custom file system for quite some time. Creating a new
    `FileSystem` instance using a file system provider that lets you treat contents
    of a file as a file system such as the Zip File System was cumbersome using the
    existing factory methods in the `java.nio.file.FileSystems` class. You had to
    construct a URI to refer to the file. Java 13 has added the following factory
    methods to the `FileSystems` class, which lets you use a `Path` to refer to the
    file:


    - `FileSystem newFileSystem(Path path) throws IOException`

    - `FileSystem newFileSystem(Path, Map<String, ?> env) throws IOException`

    - `FileSystem newFileSystem(Path, Map<String, ?> env, ClassLoader loader) throws
    IOException`


    Listing [8-10](#419466_2_En_8_Chapter.xhtml#PC35) contains a complete program
    to demonstrate the use of the new methods in the `FileSystems` class. I have used
    a `throws` clause in the `createFile()` and `readFile()` methods to keep the code
    simple. The program creates a new file `zipfstest.zip` file in the current directory,
    overwriting the file if it already exists.


    ```

    // ZipFileSystemTest.java

    package com.jdojo.misc;

    import java.io.IOException;

    import java.nio.file.FileSystem;

    import java.nio.file.FileSystems;

    import java.nio.file.Files;

    import java.nio.file.Path;

    import java.nio.file.Paths;

    import java.util.Map;

    public class ZipFileSystemTest {

    public static void main(String[] args) {

    // Path to the zip file that will be used as a file system

    Path path = Paths.get("zipfstest.zip");

    System.out.println("Using Zip File System: "

    + path.toAbsolutePath());

    // Store the properties of the Zip File System in a Map

    Map env = Map.of("create", "true",

    "encoding", "UTF-8");

    // Create a Zip File system and use it to write and read a file

    try (FileSystem fs = FileSystems.newFileSystem(path, env)) {

    String fileName = "greeting.txt";

    // Create a file with some text, if the file does not exist.

    createFile(fs, fileName);

    // Read the contents of the file in the zip file

    readFile(fs, fileName);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    public static void createFile(FileSystem fs, String fileName)

    throws IOException {

    Path filePath = fs.getPath(fileName);

    if (Files.exists(filePath)) {

    System.out.printf("The %s file exists in %s.%n", filePath, fs);

    return;

    }

    // Create a file and add a greeting to the file

    Files.writeString(filePath, "Hello, ZIP File System!");

    System.out.printf("Created a %s file in %s.%n", filePath, fs);

    }

    public static void readFile(FileSystem fs, String fileName)

    throws IOException {

    Path filePath = fs.getPath(fileName);

    // Read the contents of the file

    String text = Files.readString(filePath);

    System.out.printf("Contents of %s:%n%s%n", fileName, text);

    }

    }

    Listing 8-10

    Using New FileSystems API to Create a Zip File System

    ```


    The `main()` method creates a `Path` from the `zipfstest.zip` file name. It stores
    the properties for the Zip File system, which it creates later, in a `Map`. It
    stores two properties `"create"` and `"encoding"`. The `"create"` property is
    set to `"true"`, meaning that if the zip file does not exist, it will be created.
    The `"encoding"` property sets `"UTF-8"` as the encoding for the file system.


    ```

    Path path = Paths.get("zipfstest.zip");

    // Store the properties of the Zip File System in a Map

    Map env = Map.of("create", "true",

    "encoding", "UTF-8");

    ```


    The program creates a new file system inside a `try-with-resources` block, so
    the file system is closed automatically after its use.


    ```

    try (FileSystem fs = FileSystems.newFileSystem(path, env)) {

    // ...

    } catch (IOException e) {

    e.printStackTrace();

    }

    ```


    The `createFile()` method checks if a `greeting.txt` file exists in the file system.
    If the file exists, it prints a message to this effect. Otherwise, it creates
    this file in the `zipfstest.zip` file and writes one line of greeting to the file.


    The `readFile()` method reads the contents of the `greeting.txt` file in the zip
    file and prints them to the standard output.


    When I run the program for the first time, I get the following output. You may
    get a different output.


    ```

    Using Zip File System: C:\Java13Revealed\zipfstest.zip

    Created a greeting.txt file in zipfstest.zip.

    Contents of greeting.txt:

    Hello, ZIP File System!

    ```


    When I run the program for the second time, I get the following output. You may
    get a different output.


    ```

    Using Zip File System: C:\Java13Revealed\zipfstest.zip

    The greeting.txt file exists in zipfstest.zip.

    Contents of greeting.txt:

    Hello, ZIP File System!

    ```


    ## Other Significant Changes in JDK11


    The following are some of the significant changes in JDK11 that may impact you
    when you migrate your Java applications to use JDK11 or later:


    - No JRE and Server JRE downloads are available from Oracle.

    - No 32-bit Windows download is available.

    - Java Web Start, Java Plugin, and Java Control Panel are not available in JDK.

    - JavaFX is no longer included in the JDK. It is now available as a separate download
    from [`https://openjfx.io/`](https://openjfx.io/).

    - The Java EE and CORBA modules were removed. These modules were deprecated for
    removal in JDK 9. As a result, JAXB and JAX-WS are no longer bundled with JDK11.
    Refer to JEP 320 at [`http://openjdk.java.net/jeps/320`](http://openjdk.java.net/jeps/320)
    for more details.'
