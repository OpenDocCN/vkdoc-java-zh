- fmt: '### Transforming Strings


    Java 12 为`String`类添加了`transform()`方法，通过应用`Function<T,R>`将字符串转换为另一个对象。`Function<T,R>`接受一个`String`并返回任意类型的对象。该方法声明如下：


    ```

    R transform (Function f)

    ```


    此方法的用途并不明显。它是作为 Java 12 中*原始字符串*支持的一部分而添加的。*原始字符串*特性后来从 Java 12 中移除，但`transform()`方法得以保留。


    以下是一个简单示例，使用`transform()`方法将字符串`"Hello"`转换为`"Hello, World"`：


    ```

    String str = "Hello";

    String greeting = str.transform(s -> s + ", World");

    System.out.println(greeting);

    Hello, World

    ```


    Lambda 表达式接受一个字符串作为输入，并通过在其后追加`", World"`返回输入字符串。您会同意，仅仅为了拼接两个字符串而使用`transform()`方法并没有带来任何好处。建议改为编写如下代码：


    ```

    String str = "Hello";

    String greeting = str + ", World";

    System.out.println(greeting);

    Hello, World

    ```


    让我们看另一个简单示例，其中您将方法引用`Integer::parseInt`或`Integer::valueOf`与`transform()`方法一起使用，将字符串转换为`int`：


    ```

    String str = "1969";

    int year = str.transform(Integer::parseInt);

    //int year = str.transform(Integer::valueOf);

    System.out.println(year);

    ```


    您可能会争辩说，前面的代码片段可以改写如下，且不会失去可读性：


    ```

    String str = "1969";

    int year = Integer.parseInt(str);

    System.out.println(year);

    ```


    这两个示例的要点是：如果一个方法接受一个字符串并通过应用某些逻辑返回另一个对象，您总是可以直接调用该方法，而不是使用`transform()`方法并传递该方法的引用。


    那么，对字符串应用多次转换呢？通常，字符串转换方法是类的静态方法，无法链式调用。在这种情况下，使用`transform()`方法可能会使您的代码更具可读性。假设您希望对一个多行字符串应用两次转换：


    *   通过移除空白行来净化它们。

    *   为每一行添加行号。


    假设您创建了一个`Transforms`类，其中包含两个静态方法`sanitizeBlanks(String str)`和`addLineNumber(String
    str)`来执行这些转换。两个方法都返回`String`。您可以编写以下代码来执行此任务：


    ```

    String str = "your original string goes here";

    // Apply two transformations to str

    String newStr = str.transform(Transforms::sanitizeBlanks)

    .transform(Transforms::addLineNumber);

    ```


    您可以将这段调用`Transforms`类静态方法的代码片段重写如下，而不是使用`String`类的`transform()`方法：


    ```

    String str = "your original string goes here";

    // Apply two transformations to str

    String str1 = Transforms.sanitizeBlanks(str);

    String newStr = Transforms.addLineNumber(str1);

    ```


    比较前面两段代码。使用`String`类的`transform()`方法的代码更具可读性。清单 [8-3](#419466_2_En_8_Chapter.xhtml#PC15)
    包含一个完整的程序，演示了我们讨论中的两次转换。


    ```

    // Transforms.java

    package com.jdojo.misc;

    import java.util.concurrent.atomic.AtomicInteger;

    import java.util.function.Predicate;

    import static java.util.stream.Collectors.joining;

    public class Transforms {

    /**

    * Returns the string after removing blank lines, and leading

    * and trailing whitespaces from each line. A line with only whitespaces

    * is considered a blank line.

    * @param str The string to be sanitized

    * @return The string after removing blank lines and leading/trailing

    *         whitespaces from each line.

    */

    public static String sanitizeBlanks(String str) {

    return str.lines()

    .filter(Predicate.not(String::isBlank))

    .map(String::strip)

    .collect(joining("\n"));

    }

    /**

    * Adds a line number to each line in the string.

    * @param str The string to which line numbers are added

    * @return Returns a string by prefixing each line in the string with

    *         the line number.

    */

    public static String addLineNumber(String str) {

    AtomicInteger lineNumber = new AtomicInteger();

    return str.lines()

    .map(s-> lineNumber.incrementAndGet() + ":" + s)

    .collect(joining("\n"));

    }

    public static void main(String[] args) {

    String str = """

    Upon the moon I fixed my eye,

    All over the wide lea;

    With quickening pace my horse drew nigh

    Those paths so dear to me.

    """;

    System.out.println("Original string:\n" + str);

    String newStr = str.transform(Transforms::sanitizeBlanks)

    .transform(Transforms::addLineNumber);

    System.out.println("The string after transformations:\n" + newStr);

    /* Alternative to using the transform() method of the String class

    String str1 = Transforms.sanitizeBlanks(str);

    String str2 = Transforms.addLineNumber(str1);

    System.out.println("\nThe string after transformations:\n" + str2);

    */

    }

    }

    Original string:

    Upon the moon I fixed my eye,

    All over the wide lea;

    With quickening pace my horse drew nigh

    Those paths so dear to me.

    The string after transformations:

    1:Upon the moon I fixed my eye,

    2:All over the wide lea;

    3:With quickening pace my horse drew nigh

    4:Those paths so dear to me.

    Listing 8-3

    Using the transform() Method of the String Class

    ```


    请注意构成原始字符串的行中的空白行和额外的前导空格，这些在应用第一次转换时被移除。第二次转换以“#:”形式为每一行添加行号。原始字符串包含六行，而转换后的字符串只包含四行。代码中包含大量注释来解释逻辑。


    ## Optional 和 Predicate


    以下是添加到`java.util.Optional<T>`类中的两个新方法：


    *   `T orElseThrow()`

    *   `boolean isEmpty()`


    无参的`orElseThrow()`方法是在 Java 10 中添加到`Optional<T>`类的。如果`Optional`包含一个值，该方法返回该值。否则，它会抛出一个`java.util.NoSuchElementException`运行时异常。'
  raw: '### Transforming Strings


    Java 12 added a `transform()` method to the `String` class to transform the string
    into another object by applying a `Function<T,R>`. The `Function<T,R>` accepts
    a `String` and returns an object of any type. The method is declared as follows:


    ```

    R transform (Function f)

    ```


    The use of this method is not obvious. It was added as part of the support for
    *raw strings* in Java 12\. The *raw string* feature was later dropped from Java
    12, but the `transform()` method continued.


    The following is a trivial example in which the string `"Hello"` is transformed
    to `"Hello, World"` using the `transform()` method:


    ```

    String str = "Hello";

    String greeting = str.transform(s -> s + ", World");

    System.out.println(greeting);

    Hello, World

    ```


    The lambda expression accepts a string as an input and returns the input string
    by appending `", World"` to it. You would agree that you did not gain anything
    by using the `transform()` method just to concatenate two strings. It is recommended
    to write the following instead:


    ```

    String str = "Hello";

    String greeting = str + ", World";

    System.out.println(greeting);

    Hello, World

    ```


    Let us have another trivial example in which you use a method reference `Integer::parseInt`
    or `Integer::valueOf` with the `transform()` method to convert a string to an
    `int`:


    ```

    String str = "1969";

    int year = str.transform(Integer::parseInt);

    //int year = str.transform(Integer::valueOf);

    System.out.println(year);


    ```


    You may argue that the previous snippet of code could be written as follows without
    losing readability:


    ```

    String str = "1969";

    int year = Integer.parseInt(str);

    System.out.println(year);


    ```


    The point of these two examples is that if a method accepts a string and returns
    another object by applying some logic to the string, you can always call the method
    directly, rather than using the `transform()` method and pass the method’s reference.


    How about applying multiply transformations to a string? Typically, string transformation
    methods are static methods of a class, which cannot be chained. In this situation,
    your code may be more readable using the `transform()` method . Assume that there
    are two transformations you want to apply to a multiline string:


    *   Sanitize blank lines by removing them.


    *   Prepend a line number to each line.


    Suppose that you create a `Transforms` class with two static methods `sanitizeBlanks(String
    str)` and `addLineNumber(String str)` to perform these transformations. Both methods
    return a `String`. You can write the following code to perform this task:


    ```

    String str = "your original string goes here";

    // Apply two transformations to str

    String newStr = str.transform(Transforms::sanitizeBlanks)

    .transform(Transforms::addLineNumber);

    ```


    You could rewrite this snippet of code that calls static methods of the `Transforms`
    class instead of using the `transform()` metho d of the `String` class as follows:


    ```

    String str = "your original string goes here";

    // Apply two transformations to str

    String str1 = Transforms.sanitizeBlanks(str);

    String newStr = Transforms.addLineNumber(str1);

    ```


    Compare the two previous snippets of code. The one using the `transform()` method
    of the `String` class is more readable. Listing [8-3](#419466_2_En_8_Chapter.xhtml#PC15)
    contains a complete program to demonstrate the two transformations in our discussion.


    ```

    // Transforms.java

    package com.jdojo.misc;

    import java.util.concurrent.atomic.AtomicInteger;

    import java.util.function.Predicate;

    import static java.util.stream.Collectors.joining;

    public class Transforms {

    /**

    * Returns the string after removing blank lines, and leading

    * and trailing whitespaces from each line. A line with only whitespaces

    * is considered a blank line.

    * @param str The string to be sanitized

    * @return The string after removing blank lines and leading/trailing

    *         whitespaces from each line.

    */

    public static String sanitizeBlanks(String str) {

    return str.lines()

    .filter(Predicate.not(String::isBlank))

    .map(String::strip)

    .collect(joining("\n"));

    }

    /**

    * Adds a line number to each line in the string.

    * @param str The string to which line numbers are added

    * @return Returns a string by prefixing each line in the string with

    *         the line number.

    */

    public static String addLineNumber(String str) {

    AtomicInteger lineNumber = new AtomicInteger();

    return str.lines()

    .map(s-> lineNumber.incrementAndGet() + ":" + s)

    .collect(joining("\n"));

    }

    public static void main(String[] args) {

    String str = """

    Upon the moon I fixed my eye,

    All over the wide lea;

    With quickening pace my horse drew nigh

    Those paths so dear to me.

    """;

    System.out.println("Original string:\n" + str);

    String newStr = str.transform(Transforms::sanitizeBlanks)

    .transform(Transforms::addLineNumber);

    System.out.println("The string after transformations:\n" + newStr);

    /* Alternative to using the transform() method of the String class

    String str1 = Transforms.sanitizeBlanks(str);

    String str2 = Transforms.addLineNumber(str1);

    System.out.println("\nThe string after transformations:\n" + str2);

    */

    }

    }

    Original string:

    Upon the moon I fixed my eye,

    All over the wide lea;

    With quickening pace my horse drew nigh

    Those paths so dear to me.

    The string after transformations:

    1:Upon the moon I fixed my eye,

    2:All over the wide lea;

    3:With quickening pace my horse drew nigh

    4:Those paths so dear to me.

    Listing 8-3

    Using the transform() Method of the String Class

    ```


    Notice the blank lines and extra leading spaces in the lines that make up the
    original string, which are removed when you apply the first transformation. The
    second transformation prepends line number in the “#:” form to each line. The
    original string contains six lines, whereas the transformed string contains only
    four lines. The code contains ample comments to explain the logic.


    ## Optional and Predicate


    The following are two new methods that have been added to the `java.util.Optional<T>`
    class:


    *   `T orElseThrow()`


    *   `boolean isEmpty()`


    The no-args `orElseThrow()` method was added to the `Optional<T>` class in Java
    10\. If the `Optional` contains a value, the method returns the value. Otherwise,
    it throws a `java.util.NoSuchElementException` runtime exception.'
