    \ HTML</p>\n......\n..\n```\n\n在这个文本块中，编译器假设开发者希望每行内容左对齐，第一行以两个空格开头，并使用四个空格来嵌套\
    \ HTML 标签。这是编译器在转换过程中所做的假设。\n\n在 Java 程序中，通常会将文本块的内容与程序的其他部分（如变量名、赋值运算符和开始分隔符中的第一个双引号）垂直对齐。这些空白字符会作为每行内容的前导空白出现。一行中也可能出现非预期的尾随空白。前导空白可能用于缩进目的，例如在\
    \ HTML 代码中缩进嵌套标签。\n\n开发者希望转换后保留在内容中的文本块空白字符称为**必要空白**。内容中作为源代码缩进一部分存在，但开发者不希望保留在最终字符串中的空白字符称为**附带空白**。\n\
    \n编译器会从内容中的所有非空行中移除附带空白。结束分隔符的起始位置可用于控制文本块中的附带空白。尾随空白始终被视为附带空白，编译器会将其全部移除。在接下来的几节中，我将解释编译器用于转换文本块的规则。\n\
    \n## 转换规则\n\n编译器分三个阶段转换文本块。每个阶段处理不同类型的字符，并服务于不同的目的。按顺序对以下类型的字符进行转换：\n\n*   行终止符\n\
    *   附带空白\n*   转义序列\n\n让我们深入探讨每种转换类型。这些规则起初可能有些令人不知所措。如果你不理解某些规则，不必担心。在介绍每条规则后，我会提供多个示例，详细解释规则中的每一步，并展示转换前后的字符串。\n"
- fmt: '### Transforming Line Terminators


    Line terminators are different on different platforms. Windows uses a carriage
    return (CR) and a carriage return with a line feed (CRLF) as line terminators.
    UNIX-like OS uses a line feed (LF) as a line terminator. A CR is represented by
    ASCII decimal 13, Unicode escape `\u000D`, octal escape `\015`, and the escape
    sequence `\r`. An LF is represented by ASCII decimal 10, Unicode `\u000A`, octal
    escape `\012`, and the escape sequence `\n`. An LF is also called a newline character.


    Consider the following text block:


    ```

    """

    Hello

    Terminator

    """

    ```


    How many characters are in this text block – 15, 17, 19, or other? It is hard
    to tell the exact number of characters by just looking at this text block. The
    answer depends on the platform used to write this text block. You can see 15 visible
    characters – 5 for `Hello` and 10 for `Terminator`. Each of the two lines in the
    content has a line terminator, which is not visible, but you see the effects.
    Recall that a line terminator could be one or two characters depending on the
    platform. If you edited this text block on Windows, the invisible line terminators
    look as follows:


    ```

    """

    HelloCRLF

    TerminatorCRLF

    """

    ```


    If you edited this text block on a UNIX-like OS, the invisible line terminators
    look as follows:


    ```

    """

    HelloLF

    TerminatorLF

    """

    ```


    Counting CR and LF as one character each, the text block contains 19 characters
    on Windows and 17 characters on UNIX-like OS. Two developers writing the same
    text block on two different platforms will get different number of characters
    in the text block. You may agree that this difference is neither intended nor
    acceptable.


    The line terminators in the content of a text block are normalized by the compiler.
    The compiler replaces a CR and a CRLF with an LF. This transformation ensures
    that a text block with the same visual content contains the same final string
    across platforms. That’s all that happens at this stage. The content of the text
    block after transformation in this stage, irrespective of the platform or the
    source code encoding, looks as follows:


    ```

    """

    HelloLF

    TerminatorLF

    """

    ```


    A text block may contain escape sequences such as CR and LF as escape sequences
    such as `\r` and `\n`, which are left untouched at this stage. All escape sequences
    are transformed in the last stage.


    ### Transforming Incidental Whitespaces


    Before this stage, all line terminators have been normalized to LF. I will refer
    to line terminator as simply line terminators in this stage, which always means
    LF. All example text blocks in this section use dots to show spaces in their content.


    In this stage, the compiler removes the incidental leading and trailing whitespaces.
    The number of leading whitespaces to be removed from all non-blank lines in the
    content is computed as follows:


    - The line with the opening delimiter is not considered for this computation.

    - Lines that consist of only whitespaces are called blank lines and they are not
    considered for this computation. Blank lines may contain only a line terminator
    or whitespaces with a line terminator.

    - If the closing delimiter is placed on a separate line by itself with or without
    whitespaces, this line is considered for this computation. Note that with the
    definition of a blank line, when you place the closing delimiter on a separate
    line by itself, this line is a blank line. However, it is a significant line for
    the purpose of this computation and is not ignored.

    - Count the number of leading whitespaces on each non-blank line. Each whitespace
    is counted as 1. That is, if a line contains two spaces and another contains one
    space and one tab, this step counts two as leading whitespaces on both lines.

    - Compute the minimum of the leading whitespace count for all non-blank lines.
    Suppose you have five non-blank lines with leading whitespace counts as 15, 19,
    23, 19, 15, and 13. The minimum of all counts will be 13.

    - Remove the minimum whitespace count, as computed in the previous step, from
    all non-blank lines.

    - Remove all trailing whitespaces from all lines, not just the non-blank lines.
    This step will remove the trailing whitespaces from the non-blank lines. It will
    collapse blank lines into empty lines – lines with only line terminators.


    #### Example 1


    Consider the follow text block:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..............""";

    ```


    The leading whitespace counts for all non-blank lines are 14, 18, 22, 18, 14,
    and 14. The closing delimiter has been placed on a separate line, and it is treated
    as a non-blank line to compute the number of whitespaces to be removed from all
    lines. The minimum whitespace count for all lines is 14. Therefore, the compiler
    removes 14 whitespaces from all lines. The compiler also removes all trailing
    whitespaces from four lines. The resulting string is


    ```

    ....

    ........Hello, HTML

    ....


    ```


    #### Example 2


    Consider the following text block in which the closing delimiter has been placed
    in the beginning of the line:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    """;

    ```


    What will be the resulting string? Remember that the line with the closing delimiter
    always participates in the minimum whitespace count. In this case, the whitespace
    count for the last line is 0. So, the leading whitespace counts for all non-blank
    lines are 14, 18, 22, 18, 14, and 0. The minimum whitespace count is 0, which
    will result in the compiler removing no leading whitespaces. As usual, all trailing
    whitespaces will be removed. The resulting string will be as follows:


    ```

    ..............

    ..................

    ......................Hello, HTML

    ..................

    ..............

    ```


    ### Tip


    If you want to preserve all leading whitespaces on the non-blank lines, place
    the closing line terminator in the beginning on a separate line.


    #### Example 3


    Consider the following text block:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ............""";

    ```


    The leading whitespace counts for all non-blank lines are 14, 18, 22, 18, 14,
    and 12. The minimum of these counts is 12, so 12 leading whitespaces will be removed
    from all non-blank lines. Trailing whitespaces are removed as usual. The resulting
    string is as follows:


    ```

    ..

    ....

    ........Hello, HTML

    ....

    ..

    ```


    #### Example 4


    Consider the following text block in which I have placed the closing delimiter
    18 spaces to the right:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..................""";

    ```


    The leading whitespace counts for all non-blank lines are 14, 18, 22, 18, 14,
    and 18. The minimum of these counts is 14, so 14 leading whitespaces will be removed
    from all non-blank lines. Trailing whitespaces are removed as usual. The resulting
    string is as follows:


    ```

    ....

    ........Hello, HTML

    ....


    ```


    Notice that when the closing delimiter is placed on a separate line and if it
    starts anywhere to the right of a non-whitespace character on any non-blank lines,
    the placement of the closing delimiter does not play any role in leading whitespace
    removal.'
