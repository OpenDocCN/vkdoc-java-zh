- fmt: '# Version Number


    A version number is a sequence of elements separated by a period. It can be of
    an arbitrary length. Its format is as follows:


    ```

    ^[1-9][0-9]*(((\.0)*\.[1-9][0-9]*)*)*$

    ```


    A version number may consist of one to four elements or more, which are as follows.
    The fifth and subsequent elements do not have any specific meanings; JDK vendors
    can use them to identify vendor-specific patches. The format of a version number
    is as follows:


    ```

    $feature.$interim.$update.$patch(.$addtionalInfo)

    ```


    The `$feature` element was called `$major` in JDK 9. It is a feature release counter,
    which is increased by 1 for every feature release. A feature release represents
    a major version of a JDK release and contains new features. For example, the feature
    release for JDK 10 is 10 and for JDK 11 is 11. When the feature number is incremented,
    all other parts in the version number are removed. For example, if you have a
    version number `10.0.2.1`, the new version number will be `11` when the feature
    counter is incremented from 10 to 11. With a 6-month release model, `$feature`
    will be incremented by 1 in March and September every year, starting from March
    2018. Therefore, the March 2018 release is JDK 10, the September 2018 release
    is JDK 11, the March 2019 release is JDK 12, and so on.


    The `$interim` element was called `$minor` in JDK 9. It represents a non-feature
    release that contains compatible bug fixes and enhancements. An interim release
    will not contain any incompatible changes, feature removals, or any changes to
    standard APIs. The value for `$interim`, if present, is always zero because in
    a 6-month release model there will be no interim releases. In the future, the
    release model may change to start including interim releases and, in that case,
    `$interim` will be used.


    The `$update` element was called `$security` in JDK 9. It is incremented for compatible
    update releases that fix security issues, regressions, and bugs in newer features.


    The `$patch` element represents an emergency patch release containing fixes for
    critical issues.


    The following rules apply to a version number:


    - All elements must be an unsigned integer.

    - Only `$feature` is mandatory.

    - Elements of a version number cannot contain leading zeros. For example, the
    second update version of the JDK 10 is `10.0.2`, not `10.0.02`.

    - Trailing elements cannot be zero. That is, you cannot have a version number
    as `10.0.0.0`. It can be `10`, `10.0.1`, `10.0.0.1`, and so on.

    - When an element is incremented, all subsequent elements are removed. Suppose
    the current JDK version is `10.0.1.4`. If the update counter is incremented from
    1 to 2, the patch counter 4 will be reset to zero and hence removed making the
    version number as `10.0.2`. If the feature counter is incremented to 11, all other
    counters will be removed and the version number will change from `10.0.1.4` to
    `11`.

    - Two version numbers are compared using their respective counters from left to
    right. For example, `10.0.4.1` is greater than `10.0.3.5`, but less than `10.0.4.2`.


    ## Pre-release Information


    The `$pre` element in a version string is a pre-release identifier such as `ea`
    for an early access release, `snapshot` for a pre-release snapshot, and `internal`
    for a developer internal build. It is optional. If it is present, it is prefixed
    with a hyphen (`-`) and it must be alphanumeric matching the regular expression
    `([a-zA-Z0-9]+)`. The version string `10-ea` contains 10 as a version number and
    `ea` as a pre-release identifier.


    ## Build Information


    The `$build` element in a version string is a build number incremented for each
    promoted build. It is optional. It is reset to 1 when any part of the version
    number is incremented. If it is present, it is prefixed with a plus sign (`+`)
    and it must match the regular expression `(0|[1-9][0-9]*)`. The version string
    `10-ea+40` contains 40 as the build number.


    ## Additional Information


    The `$opt` element in a version string contains additional build information such
    as date and time of an internal build. It is optional. It is alphanumeric and
    can contain hyphens and periods. If it is present, it is prefixed with a hyphen
    (`-`) and it must match the regular expression `([-a-zA-Z0-9\.]+)`. If `$build`
    is absent, you need to prefix `$opt` with a plus sign followed by a hyphen (`+-`).
    For example, in `10-ea+40-2018-02-19`, `$build` is 40 and `$opt` is `2018-02-19`;
    in `9+-123`, `$pre` and `$build` are absent and `$opt` is 123. The version string
    `10-ea+40-20180219.07.36am` embeds the date and time of the release in its additional
    information element.


    ## Parsing Old and New Version Strings


    Before JDK 9, JDK releases had either been Limited Update releases that include
    new functionality and non-security fixes or Critical Patch Updates that only include
    fixes for security vulnerabilities. The version string included the version number
    including the update number and the build number. Limited Update releases were
    numbered in multiples of 20. Critical Patch Updates used odd numbers, which were
    calculated by adding multiples of 5 to the prior Limited Update and, when needed,
    adding 1 to keep the resulting number odd. An example is `1.8.0_31-b13`, which
    is update 31 of the major version 8 of the JDK. Its build number is 13. Note that
    prior to JDK 9, the version string always started with 1.


    Your existing code that parses the version string to get the feature version of
    a JDK release may fail in JDK 9 and later, depending on the logic it used. For
    example, if the logic looked for the feature version at the second element by
    skipping the first, which used to be always 1 before JDK 9, the logic will fail.
    For example, if it returned 8 from `1.8.0`, now it will return 0 from `10.0.1.0`
    where you would expect 10.


    ## Changes to System Properties


    In JDK 9, the values returned for the system properties that contain the JDK version
    string have changed. Table 2-1 contains the list of those system properties and
    the format of their values. `$vstr`, `$vnum`, and `$pre` in the table mean version
    string, version number, and pre-release information, respectively.


    **Table 2-1** System Properties and Their Changed Values in JDK 9


    | System Property Name | Value |

    | --- | --- |

    | `java.version` | `$vnum(\-$pre)?` |

    | `java.runtime.version` | `$vstr` |

    | `java.vm.version` | `$vstr` |

    | `java.specification.version` | `$vnum` |

    | `java.vm.specification.version` | `$vnum` |


    JDK 10 added two new system properties:


    - `java.version.date`

    - `java.vendor.version`


    The `java.version.date` system property contains the GA date of the current JDK
    release in ISO-8601 `YYYY-MM-DD` format. For early access releases, this is the
    planned GA date for the release. This system property lets you figure out how
    old your JDK is. Its value is also printed when you print the JDK version using
    `java --version` and other commands.


    The `java.vendor.version` system property is a vendor-specific product version
    string. It is optional and assigned by the JDK vendor. Its value, if set, must
    match the regular expression `\p{Graph}+` which allows one or more alphanumeric
    and punctuation characters. In the open JDK, it is set to the `$year.$month`,
    which indicates the year and month of the JDK release. For example, in JDK 10,
    it is set to `18.3`, which means March 2018 release of the JDK. Its value is also
    printed when you print the JDK version using `java --version` and other commands.'
