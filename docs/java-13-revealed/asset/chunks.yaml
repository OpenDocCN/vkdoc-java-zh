    cities ==> String[3] { null, null, null }

    |  created variable cities : String[]

    jshell> var points3D = new int[3][][];

    points3D ==> int[3][][] { null, null, null }

    |  created variable points3D : int[][][]

    ```


    ### 禁止使用多态表达式作为初始化器


    多态表达式需要一个目标类型来推断其类型。在使用 `var` 声明变量的初始化器中，不允许使用 lambda 表达式和方法引用等多态表达式。数组初始化器也是多态表达式，同样不被允许。你需要对多态表达式使用显式类型。以下
    JShell 会话展示了一些示例，其中我使用 `var` 声明带有初始化器的变量，这会产生错误。我还展示了使用显式类型代替 `var` 不会产生错误的情况。


    ```

    jshell> var increment = x -> x + 1;

