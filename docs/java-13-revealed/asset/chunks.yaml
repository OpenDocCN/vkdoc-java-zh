    和 `Double` 投影到它们的公共超类型 `Number`，并使用 `Number` 与这三个接口类型的交集作为推断类型。


    前面的变量声明（`var list = List.of(10, 20, 45.89);`）等同于以下内容。请注意，交集类型是不可具名的，因此你不能在源代码中使用以下语句。我在此展示它只是为了向你展示实际推断出的类型。你也可以使用
    JShell 输入前面的语句，以查看以下内容作为其推断类型：


    ```

    List&java.lang.constant.Constable&java.lang.constant.ConstantDesc>&java.lang.constant.Constable&java.lang.constant.ConstantDesc>
    list = List.of(10, 20, 45.89);

    ```


    在编译器层面，使用 `var` 声明变量可能会变得复杂。在这种情况下，请使用显式类型来明确你的意图。请记住，清晰性比简洁性更重要。你可以将前面的语句重写如下：


    ```

    List list = List.of(10, 20, 45.89);

    ```


    ### 不允许在字段和方法声明中使用


    不允许使用 `var` 声明字段（实例和静态字段）、方法参数以及方法返回类型。公共字段和方法定义了类的接口。它们会在其他类中被引用。对其声明进行细微更改可能需要重新编译其他类。在局部变量中使用
    `var` 仅具有局部影响。这就是 `var` 不支持字段和方法的原因。在设计过程中曾考虑过私有字段和方法，但为了保持 `var` 实现的简单性，并未支持它们。


    ## 将 final 与 var 结合使用


    你可以使用 `var` 声明一个 `final` 变量。`final` 修饰符的行为与引入 `var` 之前相同。以下局部变量声明是有效的：


    ```

    // personId 的推断类型是 int。

    // personId 是 final 的。你不能为其赋另一个值。

    final var personId = 1001;

    ```

