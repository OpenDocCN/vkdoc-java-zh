    // More code goes here...

    switch(Character.toLowerCase(c)) {

    case ''a'', ''e'', ''i'', ''o'', ''u'': /* Five constants in one case label */

    System.out.println("Vowel");

    break;

    default:

    System.out.println("Consonant");

    }

    ```


    Notice the difference between this and the previous code using traditional `switch`.
    This time, you have collapsed five `case` labels into one. You still need to use
    a `break` statement because the traditional `switch` statement still uses default
    fall-through semantics.


