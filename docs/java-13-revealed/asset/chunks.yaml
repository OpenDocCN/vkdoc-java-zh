    ### 版本号


    版本号是由句点分隔的元素序列。其长度可以是任意的。格式如下：


    ```

    ^[1-9][0-9]*(((\.0)*\.[1-9][0-9]*)*)*$

    ```


    版本号可由一至四个或更多元素组成，具体如下。第五个及后续元素没有特定含义；JDK 供应商可用它们来标识供应商特定的补丁。版本号的格式如下：


    ```

    $feature.$interim.$update.$patch(.$addtionalInfo)

    ```


    `$feature` 元素在 JDK 9 中被称为 `$major`。它是一个功能发布计数器，每发布一个功能版本就增加 1。功能版本代表 JDK 发布的主要版本，并包含新功能。例如，JDK
    10 的功能版本是 10，JDK 11 的功能版本是 11。当功能编号增加时，版本号中的所有其他部分都会被移除。例如，如果你有一个版本号 10.0.2.1，当功能计数器从
    10 增加到 11 时，新的版本号将是 11。采用 6 个月发布模式后，`$feature` 将从 2018 年 3 月开始，每年 3 月和 9 月增加 1。因此，2018
    年 3 月的版本是 JDK 10，2018 年 9 月的版本是 JDK 11，2019 年 3 月的版本是 JDK 12，依此类推。


    `$interim` 元素在 JDK 9 中被称为 `$minor`。它代表一个非功能版本，包含兼容的错误修复和增强。临时版本不会包含任何不兼容的更改、功能移除或对标准
    API 的任何更改。`$interim` 的值（如果存在）始终为零，因为在 6 个月发布模式下不会有临时版本。未来，发布模式可能会改变，开始包含临时版本，届时将使用
    `$interim`。


    `$update` 元素在 JDK 9 中被称为 `$security`。对于修复安全漏洞、回归问题以及较新功能中错误的兼容性更新版本，该值会增加。


    `$patch` 元素代表一个紧急补丁版本，包含针对关键问题的修复。


    以下规则适用于版本号：


    *   所有元素必须是无符号整数。


    *   只有 `$feature` 是必需的。


    *   版本号的元素不能包含前导零。例如，JDK 10 的第二个更新版本是 10.0.2，而不是 10.0.02。


    *   尾部元素不能为零。也就是说，你不能有一个版本号如 10.0.0.0。它可以是 10、10.0.1、10.0.0.1 等。


    *   当一个元素增加时，所有后续元素都会被移除。假设当前 JDK 版本是 10.0.1.4。如果更新计数器从 1 增加到 2，补丁计数器 4 将被重置为零，因此被移除，版本号变为
    10.0.2。如果功能计数器增加到 11，所有其他计数器将被移除，版本号将从 10.0.1.4 变为 11。


    *   两个版本号通过从左到右比较各自的计数器进行比较。例如，10.0.4.1 大于 10.0.3.5，但小于 10.0.4.2。


    ### 预发布信息


    版本字符串中的 `$pre` 元素是一个预发布标识符，例如 `ea` 表示早期访问版本，`snapshot` 表示预发布快照，`internal` 表示开发者内部构建。它是可选的。如果存在，则以连字符（`-`）为前缀，并且必须是字母数字，匹配正则表达式
    `([a-zA-Z0-9]+)`。版本字符串 "10-ea" 包含版本号 10 和预发布标识符 `ea`。


    ### 构建信息


    版本字符串中的 `$build` 元素是一个构建编号，每次推广构建时递增。它是可选的。当版本号的任何部分递增时，它会被重置为 1。如果存在，则以加号（+）为前缀，并且必须匹配正则表达式
    `(0|[1-9][0-9]*)`。版本字符串 "10-ea+40" 包含构建编号 40。


    ### 附加信息


    版本字符串中的 `$opt` 元素包含额外的构建信息，例如内部构建的日期和时间。它是可选的。它是字母数字，可以包含连字符和句点。如果存在，则以连字符（`-`）为前缀，并且必须匹配正则表达式
    `([-a-zA-Z0-9\.]+)`。如果 `$build` 不存在，你需要用加号后跟连字符（`+-`）作为 `$opt` 的前缀。例如，在 "10-ea+40-2018-02-19"
    中，`$build` 是 40，`$opt` 是 "2018-02-19"；在 "9+-123" 中，`$pre` 和 `$build` 不存在，`$opt`
    是 123。版本字符串 "10-ea+40-20180219.07.36am" 在其附加信息元素中嵌入了版本的日期和时间。


    ## 解析新旧版本字符串


    在 JDK 9 之前，JDK 版本要么是包含新功能和非安全修复的有限更新版本，要么是仅包含安全漏洞修复的关键补丁更新。版本字符串包括版本号（包含更新编号和构建编号）。有限更新版本以
    20 的倍数编号。关键补丁更新使用奇数，这些奇数是通过将先前有限更新版本加上 5 的倍数计算得出，并在需要时加 1 以保持结果为奇数。一个例子是 1.8.0_31-b13，这是
    JDK 主版本 8 的更新 31。其构建编号是 13。请注意，在 JDK 9 之前，版本字符串总是以 1 开头。


    你现有的用于解析版本字符串以获取 JDK 版本功能版本的代码，在 JDK 9 及更高版本中可能会失败，具体取决于其使用的逻辑。例如，如果逻辑通过跳过第一个元素（在
    JDK 9 之前始终为 1）来查找第二个元素处的功能版本，则该逻辑将失败。例如，如果它从 1.8.0 返回 8，那么现在它将从 10.0.1.0 返回 0，而你可能期望的是
    10。


    ## 系统属性的变更


    在 JDK 9 中，包含 JDK 版本字符串的系统属性返回的值已更改。表 2-1 列出了这些系统属性及其值的格式。表中的 `$vstr`、`$vnum` 和
    `$pre` 分别表示版本字符串、版本号和预发布信息。


    表 2-1


    JDK 9 中系统属性及其变更后的值


    | 系统属性名称 | 值 |

    | --- | --- |

    | `java.version` | `$vnum(\-$pre)?` |

    | `java.runtime.version` | `$vstr` |

    | `java.vm.version` | `$vstr` |

    | `java.specification.version` | `$vnum` |

    | `java.vm.specification.version` | `$vnum` |


    JDK 10 新增了两个系统属性：


    *   `java.version.date`


    *   `java.vendor.version`


    `java.version.date` 系统属性包含当前 JDK 版本的 GA 日期，格式为 ISO-8601 `YYYY-MM-DD`。对于早期访问版本，这是该版本计划的
    GA 日期。此系统属性可让你了解你的 JDK 有多旧。当你使用 `"java --version"` 和其他命令打印 JDK 版本时，也会打印其值。


    `java.vendor.version` 系统属性是供应商特定的产品版本字符串。它是可选的，由 JDK 供应商分配。如果设置了该值，则必须匹配正则表达式
    `\p{Graph}+`，该表达式允许一个或多个字母数字和标点符号。在开放 JDK 中，它被设置为 `$year.$month`，表示 JDK 版本的年份和月份。例如，在
    JDK 10 中，它被设置为 18.3，表示 2018 年 3 月发布的 JDK。当你使用 `"java --version"` 和其他命令打印 JDK 版本时，也会打印其值。

