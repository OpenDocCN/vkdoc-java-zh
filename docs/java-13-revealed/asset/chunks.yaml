    an `HttpRequest` and an `HttpResponse` for each push promise. You have to provide
    a push promise handler, which will be invoked every time a push promise is received
    by the `HttpClient`.


    Server push involves server pushing the contents and the client consuming them.
    Browsers handle the server push for you. In a Java program, you need to write
    the logic to handle the server push – most importantly, you need to know in advance
    what kind of resources the server will push to your client, so you know what to
    do with them in your code.


    You need to have a server that sends server push to the client. For this example,
    I will work with a web page whose URL is [`www.angular.io`](http://www.angular.io)
    . You can find a list of domain names that uses server push at [`https://http2.netray.io/data.php`](https://http2.netray.io/data.php)
    .


    To process server push, you need to send your request using the `sendAsync()`
    version of the `HttpClient` class that accepts an `HttpResponse.PushPromiseHandler<T>`.
    The method’s declaration is


    ```

    CompletableFuture> sendAsync (HttpRequest request, HttpResponse.BodyHandler responseBodyHandler,
    HttpResponse.PushPromiseHandler pushPromiseHandler)

    ```


    ### Tip


    Server push is the action of the server pushing resources to the client proactively.
    The HTTP Client API uses the term *push promise* for one server push. That is,
    if in response to a request the server pushes five additional resources, you will
    have five push promises.


    The push promise handler is an instance of the `HttpResponse.PushPromiseHandler<T>`
    interface. You need to provide an implementation for the `applyPushPromise()`
    method of this interface. The method is declared as follows:


    ```

    applyPushPromise (HttpRequest initiatingRequest,

    HttpRequest pushPromiseRequest,

    Function, CompletableFuture>> acceptor)

    ```


    The `applyPushPromise()` method of the push promise handler is called once for
    each push promise received from the server. The method accepts three parameters –
    the first one is the initial request that you sent to the server and the second
    one is the synthesized request for the server push received. The third parameter
    is a functi`on<T,R>` called acceptor. If you want to accept the push promise,
    you need to call the `apply()` method on the `acceptor` by passing it a `HttpReponse.BodyHandler<T>`,
    which will be used to process the response body for that push promise. The `apply()`
    method returns a `CompletableFuture<HttpResponse<T>>` and, when it completes,
    makes the push promise available as an `HttpResponse<T>` object.


    Listing [3-9](#419466_2_En_3_Chapter.xhtml#PC43) contains a simple implementation
    of a push promise handler to handle the body of the pushed promise as a `String`.
    You will use this in your next example. When the client receives a push promise,
    its `applyPushPromise()` method will be called. I kept the method very simple,
    which prints the URI of the synthesized request of the push promise. It accepts
    the push promise by calling the `apply()` method of the acceptor function. Note
    that the response in the push promise will be processed some time later. The `CompletableFuture`
    returned from the `apply()` method is complete when the response body is available.
    The code calls the `thenAccept()` method on the `CompletableFuture` to print the
    push promise request URI and the response status code. In a real-world application,
    the code inside the `apply()` method will process the response in a more sophisticated
    manner.


    ```

    // ServerPushPromiseHandler.java

    package com.jdojo.http.client;

    import java.net.http.HttpRequest;

    import java.net.http.HttpResponse;

    import java.util.concurrent.CompletableFuture;

    import java.util.function.Function;

    import static java.lang.System.out;

    public class ServerPushPromiseHandler implements

    HttpResponse.PushPromiseHandler {

    @Override

    public void applyPushPromise(HttpRequest initiatingRequest,

    HttpRequest pushPromiseRequest,

    Function,

    CompletableFuture>> acceptor) {

    // Print URIs of the push promise request and

    // its initiating request

    out.printf("Received push promise request URI: %s%n"

    + "Push promise initiating request URI: %s%n%n",

    pushPromiseRequest.uri(),

    initiatingRequest.uri());

    // Accept the push promise by calling the apply() method

    // on the function passed in to this method

    acceptor.apply(HttpResponse.BodyHandlers.ofString())

    .thenAccept(response -> {

    // Print the push promise response details

    out.printf("%nProcessed push promise request URI: %s%n"

    + "Pushed response status code: %d%n",

    pushPromiseRequest.uri(),

    response.statusCode());

    });

    }

    }

    Listing 3-9

    An Implementation of a PushPromiseHandler

    ```


