- fmt: '### Transforming Escape Sequences


    Escape sequences in a text block are interpreted in the third and the last stage
    of transformation. Text blocks support the same set of escape sequences as `String`
    literals such as `\b`, `\t`, `\n`, `\f`, `\r`, `\"`, `\''`, `\\`, octal escapes
    (`\nnn`), and Unicode escapes (`\uxxxx`). They are interpreted last to give developer
    a chance to format the content of text blocks using escape sequences. Consider
    the following text block that uses the escape sequence `\t` (a tab character)
    to format the nested tags in HTML code:


    ```

    String html = """

    ..............

    ..............\t

    ..............\t\tHello, HTML

    ..............\t

    ..............

    ..............""";

    ```


    All leading spaces shown as dots will be removed as part of the second stage transformation.
    This stage will interpret the tabs in nested lines, and the resulting string will
    be as follows:


    ```


    Hello, HTML


    ```


    Recall that in the second stage all line terminators (CR, CRLF, and LF) are normalized
    as LF. Suppose you want to end all your lines with a CRLF (`\r\n`), not LF (`\n`).
    How will you achieve this? You can achieve this by inserting the escape sequence
    `\r` to the end of each content line in the text block. Here is the text block:


    ```

    String html = """

    ..............\r

    ..................\r

    ......................Hello, HTML\r

    ..................\r

    ..............\r

    ..............""";

    ```


    The resulting string will be as follows. I have shown the transformed line terminator
    (LF) as `\n` in each line of the string to help you visualize the transformed
    string. Spaces are shown as dots as usual.


    ```

    \r\n

    ....\r\n

    ........Hello, HTML\r\n

    ....\r\n

    \r\n

    ```


    How will you add trailing whitespaces to any lines in a text block? The answer
    is using escape sequences. The ASCII decimal value for a space is 32, which can
    be represented as `\040` as an octal escape and `\u0020` as Unicode escape. Let
    us take a simple example of representing `"Hello "` as a text block. Note that
    you have a trailing space in `"Hello "`. The number of characters in this string
    is six – five in `Hello` and one trailing space. Here is our first attempt:


    ```

    String str = """

    Hello """;

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    System.out.printf("str ends with a space: %b%n", str.endsWith(" "));

    str: ''Hello''

    str.length(): 5

    str ends with a space: false

    ```


    The output indicates that the resulting string from the text block does not contain
    a trailing space. This is so because the second stage of transformation removes
    all trailing whitespaces, which removes the space after `Hello`.


    You need to represent the trailing space in this case as an octal escape `\040`.
    Here is the second attempt:


    ```

    String str = """

    Hello\040""";

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    System.out.printf("str ends with a space: %b%n", str.endsWith(" "));

    str: ''Hello ''

    str.length(): 6

    str ends with a space: true

    ```


    Congratulations! The output indicates that you were able to insert a trailing
    space in a line in a text block. The game is not over yet as you might have thought!
    Let us try using the Unicode escape `\u0020` to have a trailing space:


    ```

    String str = """

    Hello\u0020""";

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    System.out.printf("str ends with a space: %b%n", str.endsWith(" "));

    str: ''Hello''

    str.length(): 5

    str ends with a space: false

    ```


    You didn’t get the desired results? Are you surprised? Unicode escapes are interpreted
    at a very early stage during compilation, before any other processing happens.
    The compiler interprets Unicode escapes as it reads the source code. The compiler
    interprets the Unicode escape `\u0020` and converts it into a space while reading
    the source code. When the compiler starts text block transformation, `\u0020`
    was already converted to a space character `'' ''`. The text block transformer
    does not see the Unicode escape at all – it sees a space instead. The transformer
    removes this space when it processes all trailing whitespaces. This is the reason
    why you do not get a trailing space in this example. To prove this point, let
    us have another example.


    Unicode escape for LF is `\u000A`. Consider the following snippet of code with
    a `String` literal, which contains the following sequences of characters: `He`,
    `\u000A`, and `llo`.


    ```

    String str = "He\u000Allo";

    ```


    Does this code compile? No. It does not. The culprit is the usage of the Unicode
    escape. Before the compile processes the `String` literal, the Unicode escape
    `\u000A` has already been interpreted as an LF, making the source code look like


    ```

    String str = "He

    llo";

    ```


    A `String` literal cannot span into multiple lines. This is the reason why this
    code does not compile. The compile-time error is “unclosed string literal”. Let
    us try this example using a text block as shown:


    ```

    String str = """

    He\u000Allo""";

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    str: ''             He

    llo''

    str.length(): 19

    ```


    There are two surprises in the output. First, you did not get any compile-time
    errors. Second, the number of characters is 19. You might have expected the number
    for characters as 6, not 19. Pause for a moment and try to explain the output.


    If you could not explain the output, here is the explanation. Let us represent
    our original text block with spaces shown as dots:


    ```

    String str = """

    .............He\u000Allo""";

    ```


    There are 13 leading spaces on the content line. Before the text block transformation
    occurs, the compiler will interpret `\u000A` as an LF, which will result in the
    following text block:


    ```

    String str = """

    .............He

    llo""";

    ```


    Now you might be able to see the final string and be able to interpret the previous
    output. The content of the text block has been converted from one line to two
    lines. The first line contains 13 leading spaces and the second line none. The
    compiler does not remove any leading spaces because the minimum whitespace count
    for all non-blank lines is zero. The final string is as follows:


    ```

    .............He

    llo

    ```


    The total number of characters is 19 – 13 leading spaces, 2 in `He`, 1 in the
    LF after `He`, and 3 in `llo`.


    ### Tip


    You do not need to use escape sequences `\"` and `\n` to include a double quote
    and newline in a text block. You are recommended to use `"` and a line terminator
    instead. And, beware of using Unicode escapes in text blocks, which are processed
    earlier than the text block transformations are applied.


    Suppose you want to nest a text block in another text block. Consider the first
    unsuccessfully attempt as follows:


    ```

    String str = """

    String test = """

    Text blocks are fun if you understand them!

    """

    """;

    ```


    This text block does not compile. The three double quotes on the second line `"...
    String test = """"` are interpreted as the closing delimiter for the opening delimiter
    on the first line. Now the third, fourth, and fifth lines are not valid Java code.
    If you want to use three consecutive double quotes inside a text block, you must
    escape at least one of the three double quotes to avoid them being interpreted
    as the closing delimiter. You can make the previous text block valid as follows.
    I chose to escape the first double quote.


    ```

    String str = """

    String test = \"""

    Text blocks are fun if you understand them!

    \"""

    """;

    ```'
