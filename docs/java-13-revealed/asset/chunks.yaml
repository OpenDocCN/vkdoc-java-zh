    ## Using WebSockets


    The WebSocket protocol provides a two-way communication between two endpoints –
    a client endpoint and a server endpoint. The term *endpoint* means any of the
    two sides of the connection that use the WebSocket protocol. The client endpoint
    initiates a connection, and the server endpoint accepts the connection. The connection
    is bi-directional, which means the server endpoint can push messages to the client
    endpoint on its own. You will also come across another term in this context, which
    is called *a peer*. A peer is simply the other end of the connection. For example,
    for a client endpoint, the server endpoint is a peer, and, for a server endpoint,
    the client endpoint is a peer. A WebSocket *session* represents a sequence of
    interactions between an endpoint and a single peer.


    The WebSocket protocol can be broken into three parts:


    *   Opening handshake


    *   Data exchanges


    *   Closing handshake


    The client initiates an opening handshake with the server. The handshake occurs
    using HTTP protocol with an upgrade request to the WebSocket protocol. The server
    responds to the opening handshake with an upgrade response. Once the handshake
    is successful, the client and the server exchange messages. The message exchanges
    may be initiated by either the client or the server. In the end, either endpoint
    can send a closing handshake; the peer responds with the closing handshake. Once
    the closing handshake is successful, the WebSocket is closed.


    The HTTP Client API supports creating WebSocket client endpoints. To have a complete
    example of using the WebSocket protocol, you will need to have both a server endpoint
    and a client endpoint. The following sections will explain WebSocket details on
    how to create a client endpoint to interact with a server endpoint. You will use
    an already built server endpoint, which is available online, as described in the
    next section.


    ### WebSocket Server Endpoint


    The HTTP Client API provides support for creating WebSocket clients, not the server.
    It is beyond the scope of this book to show you how to create a WebSocket server
    endpoint. I will use a freely available server endpoint for our examples. The
    WebSocket server endpoint I will use is `ws://demos.kaazing.com/echo`. Visit [`www.websocket.org/echo.html`](http://www.websocket.org/echo.html)
    for more details on this endpoint. You can also test this endpoint using this
    web page. This endpoint acts as an echo server. When you send a message, it echoes
    back the message to you.'
