    ## 使用HTTP基本认证


    服务器可能需要认证才能允许访问请求的资源。HTTP提供了质询-响应类型的认证框架。客户端向服务器请求资源，服务器质询客户端要求特定类型的认证，客户端向服务器提供认证信息，服务器在验证认证信息后允许或拒绝访问请求的资源。认证有多种类型，例如基本认证、Bearer认证、摘要认证等。


    HTTP客户端API为基本认证提供了内置支持。在基本认证中，服务器向客户端响应`401`（未授权）HTTP状态码和一个名为`WWW-Authenticate`的响应头，其中包含至少一个质询。通常，客户端在名为`Authorization`的请求头中响应base64编码的用户名和密码，可能如下所示：


    ```

    Authorization: Basic a2lzaG9yaTpzaGFyYW4=

    ```


    让我们看一个基本认证的示例。你将使用以下URL，该URL会质询客户端进行基本认证：


    ```

    https://httpbin.org/basic-auth/[username]/[password]

    ```


    这里，`[username]`是用户名，`[password]`是认证所需的密码。当服务器质询时，你需要提供相同的用户名和密码才能使认证成功。在示例中，我使用：


    ```

    https://httpbin.org/basic-auth/kishori/sharan

    ```


    如果你在浏览器中输入此URL，系统会提示你输入用户名和密码。你需要输入`kishori`作为用户名，`sharan`作为密码。要使用不同的用户名/密码，请相应更改此URL。


    `java.net.Authenticator`类的实例用于通过用户名/密码提供基本认证。你需要继承`Authenticator`并重写`getPasswordAuthentication()`方法。该方法返回`PasswordAuthentication`类的实例，它只是用户名和密码的持有者。你将使用`HttpClient.Builder`接口的`authenticator()`方法将此认证器实例设置到`HttpClient`对象。当`HttpClient`需要认证请求时，它将调用你的认证器的`getPasswordAuthentication()`方法，并将`PasswordAuthentication`中返回的用户名/密码发送到服务器。


    清单[3-12](#419466_2_En_3_Chapter.xhtml#PC54)包含一个名为`BasicAuthenticator`的类的代码。你通过提供用户名和密码来创建其实例。其`getPasswordAuthentication()`方法在需要认证时打印一条消息，并在`PasswordAuthentication`中返回用户名和密码。通常，在提供用户名/密码之前，你会检查请求的认证信息，例如网站名称。如果用户需要提供此信息，你可能希望用对话框提示用户输入用户名/密码。我保持示例简单，直接返回提供的用户名/密码。


    ```java

    // BasicAuthenticator.java

    package com.jdojo.http.client;

    import java.net.Authenticator;

    import java.net.PasswordAuthentication;

    public class BasicAuthenticator extends Authenticator {

    private final String userName;

    private final char[] password;

    public BasicAuthenticator(String userName, char[] password) {

    this.userName = userName;

    this.password = password;

    }

    @Override

    protected PasswordAuthentication getPasswordAuthentication() {

    System.out.println(this.getRequestingURL()

    + " is asking for authentication: "

    + this.getRequestingPrompt());

    return new PasswordAuthentication(userName, password);

    }

    }

    ```


    **清单3-12** 一个基本HTTP认证器


    清单[3-13](#419466_2_En_3_Chapter.xhtml#PC55)包含一个完整程序，演示了基本认证。你可能会得到不同的输出。程序重要部分的讨论在输出之后。'
