    ### 跟随服务器重定向


    当你向服务器发送请求时，通常会被重定向到另一个URL。重定向在响应状态码中指示。状态码为3xx表示重定向。例如，如果你收到状态码301，意味着URL已永久移动。在这种情况下，响应将包含一个名为`Location`的头，其值包含资源移动到的新的URL。例如，当你请求[`http://google.com`](http://google.com)的页面时，你会收到状态码为301的响应，并且响应头中的`Location`设置为[`www.google.com`](http://www.google.com)。


    一个URL可能会将你重定向到另一个URL，新的URL可能会将你重定向到另一个，依此类推。有时，设计不良的服务器上的URL可能会让你陷入无限的重定向循环。大多数浏览器设置默认限制为20次重定向。


    有时，服务器可能会将你重定向到另一个URL，只是为了强制你使用安全协议。例如，[`www.abc.com`](http://www.abc.com)可能会将你重定向到[`www.abc.com`](https://www.abc.com)。然而，从HTTPS重定向到HTTP并不是常见的做法。


    浏览器会自动为你处理重定向。HTTP Client API默认不跟随重定向。重定向策略在`HttpClient`中设置，并指定为`HttpClient.Redirect`枚举中的以下值之一：


    *   `ALWAYS`

    *   `NEVER`

    *   `NORMAL`


    `ALWAYS`允许在所有情况下进行重定向。`NEVER`（默认的重定向策略）不允许重定向。`NORMAL`的行为与`ALWAYS`相同，但拒绝从HTTPS到HTTP的重定向。'
