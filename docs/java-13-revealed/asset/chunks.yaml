  trans: '

    ### Teeing 收集器


    有时，您希望从流中收集两种不同类型的结果，并最终将这两个结果合并为一个。Java 12 提供了一个内置收集器来实现这一功能。


    Java 12 新增了一个收集器，它使用两个收集器分别收集不同类型的结果，最后通过一个 `BiFunction` 将这两个收集器的结果合并。合并后的结果即为该收集器的最终结果。`java.util.stream.Collectors`
    类中的新 `teeing()` 方法返回了这样一个收集器：


    ```

    Collector teeing (Collector downstream1, Collector downstream2, BiFunction merger)

    ```


    其中，`downstream1` 和 `downstream2` 是两个下游收集器，用于处理流中的元素。`R1` 和 `R2` 分别是第一个和第二个下游收集器的结果类型。`R`
    是最终的结果类型。`merger BiFunction` 接收第一个和第二个下游收集器的结果，其返回值即为该收集器的最终结果。


    清单 8-9 包含一个完整的程序，演示了如何使用这个合并其他两个收集器结果的收集器。


    ```

    // TeeingCollector.java

    package com.jdojo.misc;

    import java.util.List;

    import java.util.Map;

    import static java.util.stream.Collectors.averagingDouble;

    import static java.util.stream.Collectors.counting;

    import static java.util.stream.Collectors.joining;

    import static java.util.stream.Collectors.summingDouble;

    import static java.util.stream.Collectors.teeing;

    public class TeeingCollector {

    public static void main(String[] args) {

    // 将列表中的姓名用逗号连接，并统计最终字符串中的姓名数量

    String displayText = List.of("Buddy", "John", "Lisa")

    .stream()

    .collect(teeing(joining(","),

    counting(),

    (names, count) -> names + "\nTotal:" + count));

    System.out.println(displayText);

    // 计算双精度浮点数的总和与平均值，并将两个结果收集到

    // 一个 Map.Entry 中，其中键为总和，值为平均值

    Map.Entry stat = List.of(10.0, 20.0, 30.0, 40.0)

    .stream()

    .collect(teeing(summingDouble(x -> x.doubleValue()),

    averagingDouble(n -> n),

    Map::entry));

    System.out.printf("sum: %f, average: %f%n",

    stat.getKey(), stat.getValue());

    }

    }

    Buddy,John,Lisa

    Total:3

    sum: 100.000000, average: 25.000000

    清单 8-9

    使用合并其他两个收集器结果的收集器

    ```


    第一个示例使用了一个姓名列表。`teeing()` 方法的第一个参数是一个 `joining` 收集器，用于将姓名用逗号连接。第二个参数是一个 `counting`
    收集器，用于统计姓名的数量。第三个参数是一个 `BiFunction`，它接收连接后的姓名和数量，并返回一个字符串。字符串的第一行包含连接后的姓名，第二行包含字符串
    "Total: `<count>`"，其中 `<count>` 是姓名的数量。


    ```

    String displayText = List.of("Buddy", "John", "Lisa")

    .stream()

    .collect(teeing(joining(","),

    counting(),

    (names, count) -> names + "\nTotal:" + count));

    ```


    第二个示例使用了一个数字列表（`Double` 类型）。传递给 `teeing()` 方法的第一个下游收集器计算所有数字的总和。第二个下游收集器计算所有数字的平均值。第三个参数是一个
    `BiFunction`，它是 `Map` 接口中 `entry()` 方法的方法引用。`entry()` 方法接收一个键和一个值，并返回一个 `Map.Entry`
    对象。在此例中，键将是第一个下游收集器的结果（总和），值将是第二个下游收集器的结果（平均值）。


    ```

    Map.Entry stat = List.of(10.0, 20.0, 30.0, 40.0)

    .stream()

    .collect(teeing(summingDouble(x -> x.doubleValue()),

    averagingDouble(n -> n),

    Map::entry));

    ```


    ## Buffer API


    Java 13 为 `java.nio.Buffer` 类的子类（如 `ByteBuffer`、`CharBuffer`、`IntBuffer` 等）添加了绝对批量
    get 和 put 方法。方法签名根据缓冲区类的不同而有所差异。`ByteBuffer` 类中的新方法如下所示。对于其他缓冲区类型，方法签名在返回类型和目标数组类型上有所不同。


    *   `ByteBuffer get`​`(int index, byte[] dst)`


    *   `ByteBuffer get`​`(int index, byte[] dst, int offset, int length)`


    *   `ByteBuffer put`​`(int index, byte[] src)`


    *   `ByteBuffer put`​`(int index, byte[] src, int offset, int length)`


    这些方法返回 `ByteBuffer` 本身。`get()` 方法允许您将字节从缓冲区复制到指定数组，而无需更改缓冲区的位置。`put()` 方法将字节从指定数组复制到缓冲区，同样不更改缓冲区的位置。


    Java 13 还为 `Buffer` 类添加了一个 `slice()` 方法，允许您指定要切片的绝对范围。其他缓冲区类会重写此方法。`ByteBuffer`
    类中的该方法声明如下：


    ```

    ByteBuffer slice (int index, int length)

    ```


    现有的无参 `slice()` 方法从当前位置开始创建原始缓冲区的切片，而新方法允许您指定起始位置和长度。您可以将新方法视为提供绝对切片能力，而旧方法则提供相对切片能力。


    Java 11 为特定类型的缓冲区类（如 `ByteBuffer`、`CharBuffer`、`IntBuffer` 等）添加了一个 `mismatch()`
    方法。其在 `ByteBuffer` 类中的声明如下：


    ```

    int mismatch (ByteBuffer that)

    ```


    `mismatch()` 方法查找并返回此缓冲区与指定缓冲区之间第一个不匹配元素的相对索引。返回值是相对于每个缓冲区位置的，范围在 0（包含）到每个缓冲区剩余元素中较小的那个值之间。如果没有不匹配，则返回
    –1。


    更多详细信息，请参阅特定缓冲区类的 API 文档。

