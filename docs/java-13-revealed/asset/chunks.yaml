- fmt: '### Tip


    The JVM Constants API is a low-level API meant for libraries and tools that manipulate
    bytecodes. As an application developer, you will not use them directly.


    Both interfaces contain a single method. The `Constable` interface contains the
    following method:


    ```

    Optional describeConstable()

    ```


    The `describeConstable()` method returns an `Optional`, which is empty if a nominal
    descriptor cannot be constructed for this `Constable`.


    The `ConstantDesc` interface contains the following method:


    ```

    Object resolveConstantDesc(MethodHandles.Lookup lookup) throws ReflectiveOperationException;

    ```


    The `resolveConstantDesc()` method returns the resolved constant value using the
    `MethodHandles.Lookup` argument as the resolution and access control context.


    The `String`, `Integer`, `Long`, `Float`, and `Double` classes implement both
    `Constable` and `ConstantDesc` interfaces, and serve as nominal descriptors for
    themselves. Listing [8-2](#419466_2_En_8_Chapter.xhtml#PC5) contains a trivial
    example of using these methods on a `String`.


    ```

    // ConstableTest.java

    package com.jdojo.misc;

    import java.lang.invoke.MethodHandles;

    import java.util.Optional;

    public class ConstableTest {

    public static void main(String[] args) {

    String str1 = "Hello, JVM Constants API";

    // The Optional in desc contains the string itself (str1)

    Optional desc = str1.describeConstable();

    String str2  = desc.get();

    // str3 contains the string itself (str1)

    String str3 = str1.resolveConstantDesc(MethodHandles.lookup());

    System.out.println("str1: " + str1);

    System.out.println("str2: " + str2);

    System.out.println("str3: " + str3);

    System.out.println("str1 == str2: " + (str1 == str2));

    System.out.println("str2 == str3: " + (str2 == str3));

    }

    }

    str1: Hello, JVM Constants API

    str2: Hello, JVM Constants API

    str3: Hello, JVM Constants API

    str1 == str2: true

    str2 == str3: true

    Listing 8-2

    Using the JVM Constants API

    ```


    ## The String Class


    The `String` class has received several new methods in Java 11 through Java 13.
    I have described the new methods in Java 13 and the `indent()` method in Java
    12 in Chapter [6](#419466_2_En_6_Chapter.xhtml). The `describeConstable()` and
    `resolveConstantDesc()` methods exist because the `String` class implements the
    `Constable` and `ConstantDesc` interfaces from the JVM Constants API introduced
    in Java 12. I do not explain these methods in this section. I have listed all
    new methods in the `String` class here for completeness.


    **Methods Added in Java 11**


    *   `String strip()`

    *   `String stripLeading()`

    *   `String stripTrailing()`

    *   `boolean isBlank()`

    *   `Stream<String> lines()`

    *   `String repeat(int count)`


    **Methods Added in Java 12**


    *   `String indent(int n)`

    *   `<R> R transform(Function<? super String, ? extends R> f)`

    *   `Optional<String> describeConstable()`

    *   `String resolveConstantDesc(MethodHandles.Lookup lookup)`


    **Methods Added in Java 13**


    *   `String stripIndent()`

    *   `String translateEscapes()`

    *   `String formatted(Object... args)`


    I will explain these methods with examples in the subsequent sections.


    ### Stripping Whitespaces


    Java 11 added three methods to the `String` class that remove leading/trailing,
    leading, and trailing whitespaces: `strip()`, `stripLeading()`, and `stripTrailing()`.
    The `strip()` method returns the `String` after removing both leading and trailing
    whitespaces. The other two methods return the `String` after removing only leading
    or trailing whitespaces. These methods remove whitespaces. Refer to the `isWhitespace(int
    codepoint)` method of the `Character` class to see the definition of whitespaces
    in Java.


    The `trim()` method of the `String` class returns the `String` after removing
    the leading and trailing spaces where a space is defined as any character whose
    codepoint is equal to or less than Unicode value of 32 (a space character). Compare
    the `strip()` and `trim()` method. The `trim()` method works on ASCII control
    characters (or ASCII whitespaces), whereas the `strip()` method works on Unicode
    whitespaces.


    ### Testing for a Blank String


    You can test whether a string contains only whitespaces using the `isBlank()`
    method of the `String` class. It returns `true` if the string contains only whitespaces.
    Otherwise, it returns `false`.


    ### Obtaining Stream of Lines


    You can use the `lines()` method of the `String` class to obtain a stream of lines
    in a string. A line in a string is defined as a sequence of zero or more characters
    followed by a line terminator, which can be `"\n"`, `"\r"`, or `"\r\n"`. A line
    may not end with a line terminator if it is the end of the string. The following
    snippet of code uses a text block to create a multiline string for a stanza from
    the Lucy poems by William Wordsworth. It prints character count in each line followed
    by the text. It uses the `lines()` method of the `String` class to obtain a stream
    of each line in the text.


    ```

    String text = """

    Upon the moon I fixed my eye,

    All over the wide lea;

    With quickening pace my horse drew nigh

    Those paths so dear to me.

    """;

    text.lines()

    .map(s -> s.length() + ": " + s)

    .forEach(System.out::println);

    29: Upon the moon I fixed my eye,

    22: All over the wide lea;

    39: With quickening pace my horse drew nigh

    26: Those paths so dear to me.

    ```


    ### Repeating a String


    The `repeat(int count)` method of the `String` class returns a string whose content
    is concatenation of the string repeated `count` times. For example, `"hello".repeat(2)`
    returns `"hellohello"`. If it is an empty string or `count` is zero, an empty
    string is returned. If `count` is less than zero, an `IllegalArgumentException`
    is thrown. The method comes in handy for creating indentations. The following
    snippet of code prints five lines of asterisks by indenting them with spaces.
    The first line is composed of four spaces and one asterisk, the second line three
    spaces and two asterisks, and so on.


    ```

    IntStream.rangeClosed(1, 5)

    .mapToObj(n -> " ".repeat(5-n) + "*".repeat(n))

    .forEach(System.out::println);

    *

    **

    ***

    ****

    *****

    ```'
