- fmt: '# Class Loading Mechanism


    All types defined in the source file are loaded by a custom class loader known
    as memory class loader, which delegates to the application class loader. The delegation
    behavior has changed between Java 11 and Java 12. Here is how it worked in Java
    11:


    - The memory class loader delegates to the application class loader. If the application
    class loader is unable to load the class, the memory class loader attempts to
    load the class from the source file. This has two implications. First, the application
    class loader cannot see classes in the source file. Second, the classes on the
    class path, which are loaded by the application class loader, are given precedence
    over the classes in the source file.

    - If the class being run from the source file also exists on the class path, the
    `java` command gives you an error.


    The goal of the `java` command in source-file mode was to provide beginners a
    way to run a source file with fewer surprises. The previous two rules made it
    complicated. Suppose you are learning Java and you want to run a class from source
    file. When you run the file, you get an error "class found on application class
    path." As a beginner, you will have a hard time understanding this error. As another
    example, suppose you have a source file, which contains two classes. The class
    being run uses the second class. When you run the source file, the second class
    being used is not from your source file. Rather it is picked up from the class
    path if the second class also happened to be on the class path. Both scenarios
    were possible in Java 11. As a beginner running a source file, you did not get
    what you intended to get from the code in your source file. Java 12 fixed this
    class loading mechanism to keep it simple. This change was tracked by an enhancement
    request at [`https://bugs.openjdk.java.net/browse/JDK-8210839`](https://bugs.openjdk.java.net/browse/JDK-8210839).


    Here is the simplified class loading behavior of the memory class loader in Java
    12 and later:


    - The memory class loader still delegates to the application class loader as it
    did in Java 11. This implies that the classes on the class path cannot use classes
    in the source file.

    - The memory class loader looks up a class in the source file first before delegating
    to the application class loader. This implies that the classes in the source file
    are given precedence over classes on the class path.

    - If the class being run from a source file also exists on the class path, the
    `java` command does not give you an error. It simply runs the class in the source
    file.


    This new class loading behavior can be thought of as if the classes in the source
    file are prepended to the class path. Java always allowed duplicate classes on
    the class path, and it always used the first class found in the class path. This
    old first-found-on-class-path-used rule still applies from Java 12 when using
    the source-file mode.


    Let us have a few examples to demonstrate the effects of these rules. The `src\sourcecode.apps\examples`
    directory contains two classes named `Fruits` and `FruitsPrinter`. Both are in
    the `com.jdojo.sourcecode.mode` package. I have packaged these classes in the
    `fruits.jar` file and stored the JAR file in the `src\sourcecode.apps` directory.


    Listings [4-8](#419466_2_En_4_Chapter.xhtml#PC17) and [4-9](#419466_2_En_4_Chapter.xhtml#PC18)
    contain the code for the `Fruits` and `FruitsPrinter` classes. Both classes print
    their class loaders inside a static initializer. The `FruitsPrinter` class references
    the `Fruits` class. I have kept the logic simple in both classes, so you can focus
    on the class loading rules. Note that you will be using these classes on the class
    path. They are not meant to be run from source files.


    ```

    // FruitsPrinter.java

    package com.jdojo.sourcecode.mode;

    public class FruitsPrinter {

    static {

    // Print the class loader for this class

    var cl = FruitsPrinter.class.getClassLoader();

    System.out.println("FruitsPrinter class on class path" +

    " was loaded by " + cl);

    }

    public static void print() {

    System.out.println("FruitsPrinter.print() on class path called.");

    Fruits.print();

    }

    }

    Listing 4-9

    A FruitsPrinter Class That References the Fruits Class and Meant to Be Placed
    on the Class Path

    ```


    ```

    // Fruits.java

    package com.jdojo.sourcecode.mode;

    public class Fruits {

    static {

    // Print the class loader for this class

    var cl = Fruits.class.getClassLoader();

    System.out.println("Fruits class on class path" +

    " was loaded by " + cl);

    }

    public static void print() {

    System.out.println("Fruits on class path: "

    + "Oranges, Papayas, Apples");

    }

    }

    Listing 4-8

    A Fruits Class Meant to Be Placed on the Class Path

    ```


    Listing [4-10](#419466_2_En_4_Chapter.xhtml#PC19) contains the code of a `Fruits`
    class. It is saved in the `src\sourcecode.apps` directory in the `Fruits.java`
    file.


    ```

    // Fruits.java

    package com.jdojo.sourcecode.mode;

    public class Fruits {

    static {

    // Print the class loader for this class

    var cl = Fruits.class.getClassLoader();

    System.out.println("Fruits class in source file"

    + " was loaded by " + cl);

    }

    public static void main(String[] args) {

    Fruits.print();

    }

    public static void print() {

    System.out.println("Fruits in source file: Watermelons");

    }

    }

    Listing 4-10

    A Fruits Class Meant to Be Run from the Source File

    ```


    Let us run the `Fruits.java` file using Java 11 – once just the source file and
    once including the `fruits.jar` file on the class path:


    ```

    C:\Java13Revealed\src\sourcecode.apps>SET PATH=C:\java11\bin

    C:\Java13Revealed\src\sourcecode.apps>java Fruits.java

    Fruits class in source file was loaded by com.sun.tools.javac.launcher.Main$MemoryClassLoader@3f197a46

    Fruits in source file: Watermelons

    C:\Java13Revealed\src\sourcecode.apps>java --class-path fruits.jar Fruits.java

    Fruits class on class path was loaded by jdk.internal.loader.ClassLoaders$AppClassLoader@2aae9190

    error: class found on application class path: com.jdojo.sourcecode.mode.Fruits

    ```


    The first time, the `Fruits` class was run successfully. The second time, the
    `Fruits` class was found on the class path as is evident by the class loader being
    used to load it. Recall that in Java 11, if the class being run from a source
    file is also found on the class path, you would receive an error. The output confirms
    this.


    Let us run the same source file using Java 13 – once just the source file and
    once including the `fruits.jar` file on the class path:


    ```

    C:\Java13Revealed\src\sourcecode.apps>SET PATH=C:\java13\bin

    C:\Java13Revealed\src\sourcecode.apps>java Fruits.java

    Fruits class in source file was loaded by com.sun.tools.javac.launcher.Main$MemoryClassLoader@58a90037

    Fruits in source file: Watermelons

    C:\Java13Revealed\src\sourcecode.apps>java --class-path fruits.jar Fruits.java

    Fruits class in source file was loaded by com.sun.tools.javac.launcher.Main$MemoryClassLoader@6c3f5566

    Fruits in source file: Watermelons

    ```


    In Java 13, the output confirms that the `Fruits` class was loaded by the memory
    class loader and the `Fruits` class on the class path was not used.


    Let us consider the code for the `CLTest1` class in Listing [4-11](#419466_2_En_4_Chapter.xhtml#PC22).
    The file is saved as `ClTest1.java`. What do you expect when you run this file?


    ```

    // CLTest1.java

    package com.jdojo.sourcecode.mode;

    public class CLTest1 {

    public static void main(String[] args) {

    Fruits.print();

    }

    }

    Listing 4-11

    Contents of a CLTest1.java File

    ```


    The following command runs the `CLTest1.java` file without any options. You will
    get the same output whether you run it in Java 11 or later.'
