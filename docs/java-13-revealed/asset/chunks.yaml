- fmt: '# A Switch Expression Is a Poly Expression


    A poly expression in Java is an expression whose type depends on the context.
    Therefore, the same poly expression can take on different types in different contexts.
    A `switch` expression is a poly expression. If its target type is known, its type
    is the type of its target type. If its target type is unknown, its type is computed
    by combining the types of each `switch` labels. Consider the following snippet
    of code:


    ```

    int count = 2;

    double value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> 1.5F;

    };

    ```


    This `switch` expression has a target type `double`, which is the type of the
    `value` variable. Therefore, the type of the switch expression is `double`. The
    compiler also checks that the type of the value yielded from each `switch` label
    is assignment compatible to the target type of the `switch` expression. In this
    case, the `switch` labels yield an `int` (10), a `double` (20.4), and a `float`
    (1.5F). All three types, `int`, `double`, and `float`, are assignment compatible
    to the target type `double`.


    Consider the following snippet of code. Will it compile?


    ```

    int count = 2;

    int value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> 1.5F;

    };

    ```


    This snippet of code does not compile. The target type of the `switch` expression
    is `int`, which is the declared type of the `value` variable. The `double` and
    `float` values yielded from the two `switch` labels are not assignment compatible
    to `int`. This is the reason why this code does not compile.


    Consider the following snippet of code. Will it compile?


    ```

    int count = 2;

    var value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> 1.5F;

    };

    ```


    The code compiles fine. Notice the use of `var` to declare the `value` variable.
    This time, the target type of the `switch` expression is unknown. The compiler
    has to compute the type of the `switch` expression by looking at each `switch`
    label. The `switch` labels yield values of `int`, `double`, and `float` type.
    The compiler uses the type-widening rules and computes `double` as the type of
    the `switch` expression. Remember that the compiler has to infer the type of the
    `value` variable because of `var`. The type value will be inferred as `double`,
    which is the same as the computed type of the `switch` expression.


    Consider the following snippet of code. Will it compile?


    ```

    int count = 1;

    var value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> "what";

    };

    ```


    If you guessed that this snippet of code won’t compile, you are wrong. It compiles
    fine. Now you might be curious to know the computed type of the `switch` expression.
    The compiler uses the following steps:


    - There are three types of values yielded from switch labels: `int`, `double`,
    and `String`.

    - The types are mixed – two primitive types and one reference type.

    - The primitive types are promoted to reference types `Integer` and `Double`.

    - The compiler looks at the common types among `Integer`, `Double`, and `String`.
    The compiler computes a type that is the union of all common types of these three
    types. All three types implement four interfaces: `Serializable`, `Comparable`,
    `Constable`, and `ConstantDesc`. The computed type of the `switch` expression
    is a combination of these four interfaces.


    So, what is the type of the `switch` expression in the previous snippet of code?
    Here it is:


    ```

    Serializable&Comparable&Constable&ConstantDesc>&Constable&ConstantDesc

    ```


    This is a non-denotable type. That is, only compiler can use this type in bytecode.
    You cannot use (or denote) this type in your source code. To see this for yourself,
    you can use JShell to run this snippet of code. Make sure to use the `--enable-preview`
    option to start JShell and set the feedback mode to `verbose` as shown:


    ```

    C:\Java13Revealed>jshell --enable-preview

    |  Welcome to JShell -- Version 13

    |  For an introduction type: /help intro

    jshell> /set feedback verbose

    |  Feedback mode: verbose

    jshell> int count = 2;

    count ==> 2

    |  created variable count : int

    jshell> var value = switch (count) {

    ...> case 1-> 10;

    ...> case 2-> 20.4;

    ...> default-> "what";

    ...> };

    value ==> 20.4

    |  created variable value : Serializable&Comparable&java.lang.constant.Constable&java.lang.constant.ConstantDesc>&java.lang.constant.Constable&java.lang.constant.ConstantDesc

    jshell> /exit

    |  Goodbye

    C:\Java13Revealed>

    ```


    ## The yield Statement


    The new `switch` expression has introduced a new statement called the `yield`
    statement. Making `yield` a statement has some implications on the existing code.
    It might break existing code if you had a `yield()` method, which was invoked
    using unqualified syntax. Let us take an example to understand this rule. Consider
    the following `yield` statement:


    ```

    yield(10);

    ```


    Before `yield` being a statement, this was definitely a method call. That is,
    it will call a method named `yield` by passing a value 10.


    After the introduction of the `switch` expressions, this statement will be interpreted
    as a `yield` statement that yields a value 10, and it is only permitted to be
    used in `switch` expressions. Note that using parenthesis around 10 does not make
    this a method call because now `yield` is a statement and (10) is its value. All
    of the following variants will be treated as a `yield` statement – whitespaces
    and parenthesis making no difference:


    ```

    yield 10;

    yield (10);

    yield(10);

    ```


    If you have unqualified `yield()` method calls in your existing code, you will
    need to modify it to make them qualified method calls. That is, if you have `yield(x)`
    in your existing code, you will need to change it to `xxx.yield(x)` where `xxx`
    could be `this`, a class name, or a reference variable name depending on the context.


    With the introduction of the `switch` expressions, `yield` is a *restricted identifier*.
    Its use is restricted in certain contexts. You cannot use `yield` as a type name
    such as a class name or an interface name. However, you can use `yield` as a method
    name and a variable name. Using `yield` as a method is allowed for backward compatibility
    because the `Thread` class in Java contains a `yield` method and, in rare cases,
    you might have named your methods as `yield`.


    Listing [5-8](#419466_2_En_5_Chapter.xhtml#PC51) contains a complete program to
    show how to use yield as method/variable names and how to call such methods. You
    must use the `NoYieldAsTypeName.yield()` syntax to call the `yield()` method.


    ```

    // NoYieldAsTypeName.java

    package com.jdojo.enhancedswitch;

    public class NoYieldAsTypeName {

    public static void main(String[] args) {

    // Must qualify with the class name to call the yield() methods

    NoYieldAsTypeName.yield();

    NoYieldAsTypeName.yield(100);

    // The following unqualified calls generate compile-time error

    //yield();

    //yield(10);

    int yield = 200;

    System.out.println("Variable name yield is okay: " + yield);

    }

    public static void yield() {

    System.out.println("Method name yield is okay.");

    }

    public static void yield(int x) {

    System.out.println("Method name yield is okay: " + x);

    }

    }

    Method name yield is okay.

    Method name yield is okay: 100

    Variable name yield is okay: 200

    Listing 5-8

    Using yield as Method and Variable Names

    ```


    ## Mixing Switch Label Syntax


    You have two syntax to declare `switch` labels – one uses a colon (`:`) and one
    uses an arrow (`->`). In one `switch`, you cannot mix the two syntax. The following
    snippet of code does not compile:


    ```

    int count = 1;

    int value = switch (count) {

    case 1-> 10;

    case 2: yield 20;

    default-> 30;

    };

    error: different case kinds used in the switch

    case 2: yield 20;

    1 error

    ```'
