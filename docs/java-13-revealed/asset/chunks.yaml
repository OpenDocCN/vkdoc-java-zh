  trans: '

    ### 完整示例


    在本节中，我将展示一个完整示例，其中包含对文本块的所有类型转换。首先，我会解释转换中的所有步骤。最后，我会提供一个完整的程序。我们的示例文本块如下：


    ```

    String html = """

    ..............\040CRLF

    ...........CRLF

    .....................CRLF

    ......................Hello, HTML\tCRLF

    CRLF

    ..................CRLF

    .........................CRLF

    ..............CRLF

    ..............""";

    ```


    以下是我在文本块中使用的语法：


    *   我使用点号表示空格，以便向你展示文本块中存在空格。在实际的文本块中，你看到的是空格，而不是点号。


    *   我是在 Windows 系统上编写代码，因此使用 CRLF 来表示行终止符。在实际的文本块中，行终止符是不可见的。


    *   `\040` 是空格的八进制转义序列（ASCII 十进制 32）。


    *   `\t` 是制表符的转义序列。


    *   文本块内容中的其他所有字符均按其原样显示。


    文本块内容共有九行，如下所示：


    ```

    ..............\040CRLF

    ...........CRLF

    .....................CRLF

    ......................Hello, HTML\tCRLF

    CRLF

    ..................CRLF

    .........................CRLF

    ..............CRLF

    ..............

    ```


    让我们开始文本块的转换过程。第一步，将行终止符规范化为 LF，得到以下字符串：


    ```

    ..............\040LF

    ...........LF

    .....................LF

    ......................Hello, HTML\tLF

    LF

    ..................LF

    .........................LF

    ..............LF

    ..............

    ```


    现在，编译器计算必须从每个非空白行开头移除的空白字符数量。第 2、5、7 和 9 行是空白行。第 9 行是包含结束定界符的最后一行，因此在此计算中被视为有效行。所以，编译器忽略第
    2、5 和 7 行，但包含第 9 行。空白字符计数为：第 1 行 14 个，第 3 行 18 个，第 4 行 22 个，第 6 行 18 个，第 8 行 14
    个，第 9 行 14 个。这些行中的最小空白字符数为 14。编译器从所有非空白行（第 1、3、4、6 和 8 行）中移除前导的 14 个空白字符。得到的字符串如下：


    ```

    \040LF

    ...........LF

    .......LF

    ........Hello, HTML\tLF

    LF

    ....LF

    .........................LF

    LF

    ..............

    ```


    现在，从所有行中移除尾随空白字符，得到以下字符串：


    ```

    \040LF

    LF

    ....LF

    ........Hello, HTML\tLF

    LF

    ....LF

    LF

    LF

    ```


    请注意，空白行已变为空行；在结果字符串中，它们仅包含 LF。最后一行原本没有 LF，现在是一个空字符串，它从结果字符串中消失了。


    作为最后的转换，对转义序列进行解释，得到以下字符串：


    ```

    LF

    LF

    ....LF

    ........Hello, HTML  LF

    LF

    ....LF

    LF

    LF

    ```


    清单 6-3 包含一个完整的程序来展示此转换。该程序使用了 `String` 类的 `lines()` 方法，该方法从文本块返回一个行流。`map()` 方法将每行的内容用单引号括起来。我使用单引号括起每行的内容，以便你可以在输出中看到尾随空白字符。`forEach()`
    方法将每行用单引号括起来后打印到标准输出。


    ```

    // TextBlockTransformation.java

    package com.jdojo.textblock;

    public class TextBlockTransformation {

    public static void main(String[] args) {

    String html = """

    \040


    Hello, HTML\t


    """;

    // 让我们通过将每行用单引号括起来进行打印

    html.lines()

    .map(s -> "''" + s + "''")

    .forEach(System.out::println);

    }

    }

    '' ''

    "

    ''    ''

    ''        Hello, HTML    ''

    "

    ''    ''

    "

    ''''

    清单 6-3

    可视化文本块转换

    ```


    ## 连接文本块


    文本块可以用于任何你使用 `String` 字面量的地方。你可以像连接 `String` 字面量一样连接它们。请记住保持代码的可读性，因为连接后的文本块会使代码难以阅读。


    以下代码片段将一个文本块和一个 `String` 字面量连接，得到字符串 `"Hello, Text Block"`：


    ```

    String str = """

    Hello""" + ", Text Block";

    ```


    这段代码的可读性不是很好。让我们将 `String` 字面量替换为文本块：


    ```

    String str = """

    Hello""" + """

    , Text Block""";

    ```


    可读性进一步降低了。你必须注意每个文本块的开始和结束定界符，才能理解发生了什么。


    假设消息中的名称来自一个变量。要得到一个 `"Hello, <name>"` 字符串，其中 `<name>` 来自变量，你可以使用以下文本块。注意使用八进制转义序列
    `\040` 来插入一个空格：


    ```

    String name = "Text Block";

    String str = """

    Hello,\040""" + name;

    ```


    这不是一个最优的解决方案。如果你的文本块中有占位符，其值来自变量，那么使用 `String` 类的 `formatted()` 方法配合字符串格式说明符是更好的选择。你可以将前面的代码片段重写如下：


    ```

    String name = "Text Block";

    String str = """

    Hello, %s""".formatted(name);

    ```


    `formatted()` 方法作为支持文本块的一部分，已在 Java 13 中添加到 `String` 类。它是一个实例方法。它接受一个可变参数，这些参数是文本块中格式说明符的值。如果你想基于模板生成文本，你可以使用带有格式说明符的文本块作为模板，并使用
    `formatted()` 方法将所需文本填入模板。

    '
- fmt: '## Addition to the `String` API


    The following instance methods have been added to the `String` class to support
    text blocks:


    * `String formatted`​`(Object... args)`

    * `String stripIndent()`

    * `String translateEscapes()`


    **Tip** The three methods added to the `String` class to support text blocks are
    deprecated and marked for removal because text block is a preview feature, which
    may be removed or refined in a future release. You are not supposed to use text
    blocks and these methods in production.


    The `formatted()` instance method formats the string using the specified arguments.
    It works the same as the `format(String format, Object...args)` static method
    of the `String` class. Using the `formatted()` method, instead of the `format()`
    method, gives you cleaner code. Otherwise, there is no difference in the result.
    The following snippet of code formats the same text block with both methods:


    ```

    String name = "Text Block";

    // Use the formatted() instance method

    String str = """

    Hello, %s""".formatted(name);

    System.out.println(str);

    // Use the format() static method

    String str2 = String.format("""

    Hello, %s""", name);

    System.out.println(str2);

    Hello, Text Block

    Hello, Text Block

    ```


    The `stripIndent()` method removes the incidental whitespaces from the beginning
    and end of every line in the string. You can use this method when you receive
    strings from files or other sources, which may contain incidental whitespaces.
    You will not need to use this method while working with text blocks because text
    blocks remove the incidental whitespaces automatically. Java 12 had added an `indent(int
    n)` method, which adds `n` spaces to the beginning of each line and normalizes
    the line terminators in each line to use LF. If `n` is less than zero, it removes
    up to `n` number of leading whitespaces from each line. Listing [6-4](#419466_2_En_6_Chapter.xhtml#PC66)
    contains a complete program to show the use of both methods. A discussion on the
    output follows the output.


    ```

    // IndentTest.java

    package com.jdojo.textblock;

    public class IndentTest {

    public static void main(String[] args) {

    String html = " \n"

    + "     \n"

    + "         Hello, HTML\n"

    + "     \n"

    + " ";

    System.out.println("Original:\n" + html);

    // Remove incidental whitespaces

    String html2 = html.stripIndent();

    System.out.println("\nAfter stringIndent():\n" + html2);

    // Indent the string with one space, which will add an LF

    // to the last line in the content

    String html3 = html2.indent(1);

    System.out.println("\nAfter indent():\n" + html3);

    // Print the details

    System.out.println("html.length(): " + html.length());

    System.out.println("html3.length(): " + html3.length());

    System.out.println("html.equals(html3): " + html.equals(html3));

    System.out.println("html.endsWith(\"\\n\"): "

    + html.endsWith("\n"));

    System.out.println("html3.endsWith(\"\\n\"): "

    + html3.endsWith("\n"));

    }

    }

    Original:


    Hello, HTML


    After stringIndent():


    Hello, HTML


    After indent():


    Hello, HTML


    html.length(): 71

    html3.length(): 72

    html.equals(html3): false

    html.endsWith("\n"): false

    html3.endsWith("\n"): true

    Listing 6-4

    Using stripIndent() and indent() method of the String Class

    ```


    The string in the `html` variable contains multiple lines, and there is one incidental
    whitespace in the string. The output shows that the effects of `stripIndent()`
    and `indent()` are not opposite. The `html` variable contains 71 characters, whereas
    `html3` contains 72. Notice that there is no line terminator (`\n`) added to the
    last line after `</html>` in the string stored in the `html` variable. The `indent()`
    method removes the line terminators (CR, CRLF, and LF) from each line and adds
    an LF to the end of each line as a line terminator. If a line in the string does
    not have a line terminator, an LF is appended to that line by the `indent()` method.
    In our case, the last line `"</html>"` in the `html2` variable became `" </html>\n"`
    in `html3`, which explains why you got one character more in `html3` than in `html`.


    You can receive a string that may contain escape sequences as characters, and
    you want to translate those characters as escape sequences. The `translateEscapes()`
    instance method translates the escape sequences such as `\n`, `\r`, `\t`, and
    so on and octal escapes. It does not translate Unicode escapes because they are
    translated by the compiler when the compiler reads the source code.


    Consider the following snippet of code in which I have embedded escape sequences
    by escaping the backslashes, so they are interpreted as a sequence of characters,
    not as escape sequences. `\012` is an octal escape for ASCII decimal 10 (`\n`)
    and `\t` is an escape sequence for a tab. The output shows the string before and
    after translation.


    ```

    String html = "\\012" +

    "\\t\n" +

    "\\t\\tHello, HTML\n" +

    "\\t\n" +

    "" ;

    System.out.println("Original:\n" + html);

    // Translate escape sequences in the string

    String html2 = html.translateEscapes();

    System.out.println("\nAfter html.translateEscapes():\n" + html2);

    Original:

    \012\t

    \t\tHello, HTML

    \t


    After html.translateEscapes():


    Hello, HTML


    ```'
