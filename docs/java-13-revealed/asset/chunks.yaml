- fmt: '### The Teeing Collector


    Sometimes, you want to collect two different types of results from a stream and
    finally merge the two results into one. Java 12 gives a built-in collector to
    do just that.


    Java 12 added a collector, which uses two collectors to collect distinct types
    of results and, in the end, uses a `BiFunction` to merge the results of the two
    collectors. The merged result is the result of the collector. The new `teeing()`
    method in the `java.util.stream.Collectors` class returns such a collector:


    ```

    Collector teeing (Collector downstream1, Collector downstream2, BiFunction merger)

    ```


    Here, `downstream1` and `downstream2` are two downstream collectors that will
    process the elements in the stream. `R1` and `R2` are the result types of the
    first and the second downstream collectors, respectively. `R` is the final result
    type. The `merger BiFunction` is passed the results of the first and second downstream
    collectors and its returned value is the result of the collector.


    Listing [8-9](#419466_2_En_8_Chapter.xhtml#PC30) contains a complete program to
    demonstrate the use of the collector that merges results of two other collectors.


    ```

    // TeeingCollector.java

    package com.jdojo.misc;

    import java.util.List;

    import java.util.Map;

    import static java.util.stream.Collectors.averagingDouble;

    import static java.util.stream.Collectors.counting;

    import static java.util.stream.Collectors.joining;

    import static java.util.stream.Collectors.summingDouble;

    import static java.util.stream.Collectors.teeing;

    public class TeeingCollector {

    public static void main(String[] args) {

    // Concatenate names in the list separating them with a comma and

    // and count the number of names in the final string

    String displayText = List.of("Buddy", "John", "Lisa")

    .stream()

    .collect(teeing(joining(","),

    counting(),

    (names, count) -> names + "\nTotal:" + count));

    System.out.println(displayText);

    // Compute sum and average of doubles and collect the two results

    // into a Map.Entry in which key is the sum and value is the average

    Map.Entry stat = List.of(10.0, 20.0, 30.0, 40.0)

    .stream()

    .collect(teeing(summingDouble(x -> x.doubleValue()),

    averagingDouble(n -> n),

    Map::entry));

    System.out.printf("sum: %f, average: %f%n",

    stat.getKey(), stat.getValue());

    }

    }

    Buddy,John,Lisa

    Total:3

    sum: 100.000000, average: 25.000000

    Listing 8-9

    Using a Collector That Merges Results of Two Other Collectors

    ```


    The first example uses a list of names. The first argument to the `teeing()` method
    is a `joining` collector that joins the names with a comma. The second argument
    is a `counting` collector that counts the number of names. The third argument
    is a `BiFunction` that accepts the concatenated names and the count and returns
    a string. The first line in the string contains the concatenated names and the
    second line contains a string “Total: `<count>`”, where `<count>` is the name
    count.


    ```

    String displayText = List.of("Buddy", "John", "Lisa")

    .stream()

    .collect(teeing(joining(","),

    counting(),

    (names, count) -> names + "\nTotal:" + count));

    ```


    The second example uses a list of numbers (`Double`s). The first downstream collector
    to the `teeing()` method computes the sum of all numbers. The second downstream
    collector computes the average of all numbers. The third argument is a `BiFunction`,
    which is a method reference to the `entry()` method of the `Map` interface. The
    `entry()` method takes a key and a value and returns a `Map.Entry` object. In
    this case, the key will be the result (the sum) of the first downstream collector.
    The value will be the result (average) of the second downstream collector.


    ```

    Map.Entry stat = List.of(10.0, 20.0, 30.0, 40.0)

    .stream()

    .collect(teeing(summingDouble(x -> x.doubleValue()),

    averagingDouble(n -> n),

    Map::entry));

    ```


    ## The Buffer API


    Java 13 has added absolute bulk get and put methods to the subclasses of the `java.nio.Buffer`
    class such as `ByteBuffer`, `CharBuffer`, `IntBuffer`, and so on. The method signatures
    differ based on the buffer class. The new methods in the `ByteBuffer` class look
    as follows. For other buffer types, the method signatures differ in the return
    type and the destination array type.


    *   `ByteBuffer get(int index, byte[] dst)`

    *   `ByteBuffer get(int index, byte[] dst, int offset, int length)`

    *   `ByteBuffer put(int index, byte[] src)`

    *   `ByteBuffer put(int index, byte[] src, int offset, int length)`


    These methods return the `ByteBuffer` itself. The `get()` method lets you copy
    bytes from the buffer to the specified array without changing the position of
    the buffer. The `put()` method copies bytes from the specified array to the buffer
    without changing the position of the buffer.


    Java 13 also added a `slice()` method to the `Buffer` class, which lets you specify
    the absolute range to be sliced. Other buffer classes override this method. The
    method in the `ByteBuffer` class is declared as follows:


    ```

    ByteBuffer slice (int index, int length)

    ```


    The existing no-args `slice()` method creates a slice of the original buffer starting
    at the current position, whereas the new method lets you specify the start position
    and the length. You can think of the new method as providing absolute slicing
    capability, whereas the old one provides a relative slicing capability.


    Java 11 added a `mismatch()` method to the specific type of buffer classes such
    as `ByteBuffer`, `CharBuffer`, `IntBuffer`, and so on. Its declaration in the
    `ByteBuffer` class looks as follows:


    ```

    int mismatch (ByteBuffer that)

    ```


    The `mismatch()` method finds and returns the relative index of the first mismatch
    between this buffer and the specified buffer. The returned value is relative to
    the position of each buffer, which will be between 0 (inclusive) and smaller of
    the remaining elements in each buffer. It returns –1 if there is no mismatch.


    Refer to the API documentation for specific buffer classes for more details.'
