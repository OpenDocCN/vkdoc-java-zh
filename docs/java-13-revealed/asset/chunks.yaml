    #### Following Server Redirects


    When you send a request to a server, it is common to get redirected to another
    URL. Redirection is indicated in the response status code. A status code of 3xx
    indicates redirection. For example, if you receive a status code of 301, it means
    the URL has permanently moved. In this case, the response will contain a header
    named `Location` whose value contains the new URL where the resource has moved.
    For example, when you request the page at [`http://google.com`](http://google.com)
    , you receive response with status code of 301 and the `Location` in the response
    header set to [`www.google.com`](http://www.google.com) .


    A URL may redirect you to another URL, the new URL may redirect you to another,
    and so on. Sometimes, a URL on a badly designed server may put you into infinite
    loop of redirections. Most browsers set a default limit of 20 redirections to
    follow.


    Sometimes, a server may redirect you to another URL just to force you to use secure
    protocol. For example, [`www.abc.com`](http://www.abc.com) may redirect you to
    [`www.abc.com`](https://www.abc.com) . However, redirecting from HTTPS to HTTP
    is not a normal practice.


    Browsers take care of redirection for you automatically. The HTTP Client API does
    not follow redirection by default. The redirection policy is set in the `HttpClient`,
    and it is specified as one of the following values in the `HttpClient.Redirect`
    enum:


    *   `ALWAYS`


    *   `NEVER`


    *   `NORMAL`


    `ALWAYS` allows redirection in all cases. `NEVER`, which is the default redirection
    policy, does not allow redirection. `NORMAL` behaves the same as `ALWAYS`, except
    it denies redirection from HTTPS to HTTP.'
