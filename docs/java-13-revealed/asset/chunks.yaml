- fmt: '### Sending Messages to a Peer


    Once a client endpoint is connected to a peer, both exchange messages. An instance
    of the `WebSocket` interface represents a client endpoint, and the interface contains
    the following methods to send messages to the peer:


    - `CompletableFuture<WebSocket> sendBinary(ByteBuffer data, boolean last)`

    - `CompletableFuture<WebSocket> sendText(CharSequence data, boolean last)`

    - `CompletableFuture<WebSocket> sendPing(ByteBuffer message)`

    - `CompletableFuture<WebSocket> sendPong(ByteBuffer message)`

    - `CompletableFuture<WebSocket> sendClose(int statusCode, String reason)`


    The `sendText()` method is used to send a text message to the peer. If the second
    argument is `false`, it indicates part of the partial message. If the second argument
    is `true`, it indicates the last part of a partial message. If there were no partial
    messages sent before, a `true` in the second argument indicates a whole message.


    The `sendBinary()` method sends a binary message to the peer.


    The `sendPing()` and `sendPong()` methods send a `Ping` and a `Pong` message to
    the peer, respectively.


    The `sendClose()` method sends a `Close` message to the peer. You can send a `Close`
    message as part of a closing handshake initiated by a peer, or you can send it
    to initiate a closing handshake with the peer.


    ### Tip


    If you want to close the WebSocket abruptly, use the `abort()` method of the `WebSocket`
    interface.


    ### Running the WebSocket Program


    It is time to see a WebSocket client and server exchanging messages. Listing [3-15](#419466_2_En_3_Chapter.xhtml#PC63)
    contains a complete program. It creates a WebSocket, sends/receives messages with
    a server at `ws://demos.kaazing.com/echo`, and closes the WebSocket. The output
    shows the interactions. The program contains ample comment to explain the logic.


    ```

    // WebSocketClient.java

    package com.jdojo.http.client;

    import static java.lang.System.out;

    import java.net.URI;

    import java.net.http.HttpClient;

    import java.net.http.WebSocket;

    import static java.net.http.WebSocket.NORMAL_CLOSURE;

    import java.nio.ByteBuffer;

    public class WebSocketClient {

    public static void main(String[] args) throws InterruptedException {

    // Create an HttpClient with default configurations

    HttpClient client = HttpClient.newHttpClient();

    // Create a listener for our WebSocket

    WebSocketEchoListener listener = new WebSocketEchoListener();

    // Create a WebSocket

    WebSocket webSocket = client.newWebSocketBuilder()

    .buildAsync(URI.create("ws://demos.kaazing.com/echo"),

    listener)

    .join();

    // Send a message to the server. The second argument of true

    // in the sendText() indicates that the message is whole.

    String helloMessage = "Hello, there.";

    webSocket.sendText(helloMessage, true)

    .thenRun(() -> out.println("Sent: " + helloMessage))

    .join();

    // Send a Ping message to the server

    String pingMessage = "Just checking...";

    webSocket.sendPing(ByteBuffer.wrap(pingMessage.getBytes()))

    .thenRun(() -> out.println("Sent Ping: " + pingMessage))

    .join();

    // Send a Close message to the server. After this, you cannot

    // send any more messages to the server. The server will send

    // you back a Close message.

    webSocket.sendClose(NORMAL_CLOSURE, "Done")

    .thenRun(() -> out.println("Sent Close"))

    .join();

    // Wait for the WebSocket listener to close. Recall that the

    // CompletableFuture returned from the closeStatus()

    // method completes when the onClose() or onError() method of

    // the listener is called.

    listener.closeStatus()

    .thenAccept(System.out::println)

    .exceptionally(e -> {

    e.printStackTrace();

    return null;

    })

    .join();

    }

    }

