  trans: '

    ## 处理 HTTP 请求


    客户端应用程序通过 HTTP 请求与 Web 服务器通信。它向服务器发送请求，服务器则返回响应。`HttpRequest` 类的实例代表一个请求。以下是处理请求所需执行的步骤：


    *   获取一个 HTTP 请求构建器。


    *   设置请求的参数。


    *   从构建器创建 HTTP 请求。


    *   将 HTTP 请求发送到服务器——同步或异步。


    *   处理来自服务器的响应。


    ### 获取 HTTP 请求构建器


    你需要使用一个构建器对象（即 `HttpRequest.Builder` 接口的实例）来创建 `HttpRequest`。你可以通过 `HttpRequest`
    类的以下 `static` 方法之一来获取 `HttpRequest.Builder`：


    *   `HttpRequest.Builder newBuilder()`


    *   `HttpRequest.Builder newBuilder(URI uri)`


    以下代码片段展示了如何使用这些方法来获取 `HttpRequest.Builder`：


    ```

    // 为 httpbin.org 创建一个 URI

    URI uri = URI.create("http://httpbin.org");

    // 获取一个带有 URI 的构建器

    HttpRequest.Builder builder1 = HttpRequest.newBuilder(uri);

    // 获取一个此时未指定 URI 的构建器

    HttpRequest.Builder builder2 = HttpRequest.newBuilder();

    ```


    ### 设置 HTTP 请求参数


    一旦你有了 HTTP 请求构建器，就可以使用构建器的方法来设置请求的参数，例如请求方法、主体和标头。以下各节将通过示例展示如何在 `HttpRequest`
    中设置不同类型的参数。


    ### 设置请求方法和主体发布器


    HTTP 支持以下类型的方法：GET、POST、PUT、DELETE、PATCH、HEAD、OPTIONS、CONNECT 和 TRACE。`HttpRequest.Builder`
    接口提供了四种方法来直接设置同名的 HTTP 方法：


    *   `HttpRequest.Builder GET()`


    *   `HttpRequest.Builder POST`​`(HttpRequest.BodyPublisher bodyPublisher)`


    *   `HttpRequest.Builder PUT`​`(HttpRequest.BodyPublisher bodyPublisher)`


    *   `HttpRequest.Builder DELETE()`


    某些 HTTP 方法（如 POST 和 PUT）要求你将数据作为请求主体传递。某些 HTTP 方法（如 GET 和 DELETE）不支持请求主体。这反映在前面列表中的方法声明中。


    请求主体表示为 `HttpRequest.BodyPublisher` 接口的一个实例。`BodyPublisher` 接口扩展了 `Flow.Publisher<ByteBuffer>`，其工作是将作为请求主体传递的
    Java 对象转换为适合发送请求主体的字节缓冲区流。无需担心从头开始创建 `BodyPublisher`。对于常见用例，可以通过 `HttpRequest.BodyPublishers`
    静态类提供预定义的主体发布器。


    表 3-1 列出了 `HttpRequest.BodyPublishers` 类中的工厂方法。表中的所有方法都返回一个 `HttpRequest.BodyPublisher`。该类还提供了一个
    `fromPublisher()` 方法，它是 `Flow.Publisher` 和 `HttpRequest.BodyPublisher` 之间的适配器。该方法接受一个
    `Flow.Publisher` 并返回一个 `HttpRequest.BodyPublisher`。当你想要使用现有的 `Flow.Publisher`
    作为 `HttpRequest.BodyPublisher` 时，可以使用此方法。


    表 3-1


    HttpRequest.BodyPublishers 类中返回 HttpRequest.BodyPublisher 实例的工厂方法列表


    | 方法 | 描述 |

    | --- | --- |

    | `noBody()` | 返回一个不发送请求主体的请求主体发布器。当你没有要发送给服务器的请求主体，但用于发送请求的方法要求你指定一个主体发布器时，使用此方法获取主体发布器。
    |

    | `ofByteArray(byte[] buf)` | 返回一个将指定字节数组作为请求主体发送的请求主体发布器。 |

    | `ofByteArray(byte[] buf, int offset, int length)` | 返回一个将指定字节数组中从 `offset` 开始的
    `length` 个字节作为请求主体发送的请求主体发布器。 |

    | `ofByteArrays(Iterable<byte[]> iterable)` | 返回一个将 `Iterable` 中的字节数组作为请求主体发送的请求主体发布器。
    |

    | `ofFile(Path path)` | 返回一个将 `path` 指定文件中的数据作为请求主体发送的请求主体发布器。如果指定的 `path` 不存在，则抛出
    `FileNotFoundException`。 |

    | `ofInputStream` `(Supplier<? extends InputStream> streamSupplier)` | 返回一个通过从
    `InputStream` 读取来发送请求主体的请求主体发布器。注意使用 `Supplier` 作为参数而不是 `InputStream`。使用 supplier
    可以在重新发送请求时重用。如果 `Supplier` 返回 `null`，则请求失败。 |

    | `ofString(String body)` | 返回一个请求主体发布器，其请求主体是使用 UTF8 字符集转换为字节的指定 `String`。 |

    | `ofString(String s, Charset charset)` | 返回一个请求主体发布器，其请求主体是使用指定 `charset` 转换为字节的指定
    `String`。 |


    以下代码片段展示了如何使用 HTTP POST 方法将表单数据发布到服务器：


    ```

    // 将请求主体设置为字符串

    String requestBody = "first_name=Kishori&last_name=Sharan";

    // 创建一个 HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .POST(BodyPublishers.ofString(requestBody))

    .build();

    ```


    该表单包含两个字段——`first_name` 和 `last_name`。我特意为这些字段设置了简单的值（Kishori 和 Sharan），这些值不需要
    URL 编码。否则，你需要使用 `java.net.URLEncoder` 类的 `encode()` 方法在将字段值发送到服务器之前对其进行编码。请注意，如果你要发布表单数据，则必须在请求中将
    `"Content-Type"` 标头设置为 `"application/x-www-form-urlencoded"`。


    `HttpRequest.Builder` 接口提供了一个名为 `method()` 的方法，你可以使用它为请求设置任何类型的 HTTP 方法。其声明如下：


    ```

    HttpRequest.Builder method(String method, HttpRequest.BodyPublisher bodyPublisher)

    ```


    `method` 参数的值与 HTTP 方法名称相同，例如 `"POST"`、`"OPTIONS"`、`"HEAD"` 等。目前，HTTP 客户端 API
    不支持 CONNECT HTTP 方法。以下语句使用 `method()` 方法配合 HTTP OPTIONS 方法来创建一个 `HttpRequest`：


    ```

    // 创建一个 HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .method("OPTIONS", BodyPublishers.noBody())

    .build();

    ```


    通常，你不会使用 OPTIONS 方法发送请求主体。请注意，我们使用 `BodyPublishers.noBody()` 工厂方法来获取一个 `HttpRequest.BodyPublisher`，它不发送任何请求主体。你可以使用
    `method()` 方法重写前面创建 `HttpRequest` 以发布表单数据的示例，如下所示：


    ```

    // 将请求主体设置为字符串

    String requestBody = "first_name=Kishori&last_name=Sharan";

    // 创建一个 HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .method("POST", BodyPublishers.ofString(requestBody))

    .build();

    ```

    '
- fmt: '### Overriding HTTP Version


    An `HttpRequest` is sent to a server using an `HttpClient`. When you are building
    an `HttpRequest`, you can set the HTTP version value through its `HttpRequest.Builder`
    object using the `version()` method that will override the HTTP version set in
    the `HttpClient` when this request is sent. The following snippet of code sets
    the version to HTTP 1.1 for a request, which overrides the default value of HTTP
    2 in the `HttpClient`. Recall that whether HTTP 2 is used depends on the server.
    If the server does not support HTTP 2, the HTTP communication is downgraded to
    use HTTP 1.1.


    ```

    // All requests sent using this HttpClient will use HTTP 2

    // unless overridden by the request

    HttpClient client = HttpClient.newHttpClient();

    // Get an HttpRequest that uses HTTP 1.1

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .version(HTTP_1_1)

    .build();

    // The client object uses HTTP 2 and the request object overrides

    // it with HTTP 1.1\. The following statement will send the request

    // using HTTP 1.1, which is in the request object.

    HttpResponse response =

    client.send(request, BodyHandlers.ofString());

    ```


    ### Setting Up a Timeout


    You can use the `timeout(Duration timeout)` method of the `HttpRequest.Builder`
    instance to specify a timeout for the request. If a response is not received within
    the specified timeout period, an `HttpTimeoutException` is thrown. If you do not
    set a request timeout, the request can block forever. The `httpbin.org/delay/{delay}`
    URL sends a response back after a delay specified in `{delay}` part of the URL.
    The following `HttpRequest` will always fail with an `HttpTimeoutException` because
    the server sends a response after 5 seconds and we have set the request timeout
    for 2 seconds:


    ```

    // An HttpRequest that will fails when sent

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/delay/5"))

    .timeout(Duration.ofSeconds(2))

    .build();

    ```


    ### Setting Expect Continue Header


    An HTTP request may contain a header named `Expect` with its value `"100-Continue"`.
    If this header is set, the client sends only headers (without a body) to the server
    and the server is expected to send back an error response or a `100-Continue`
    response. Upon receiving a `100-Continue` response, the client sends the request
    body to the server. A client uses this technique to check if the server can process
    the request based on the request headers before sending the actual request body.
    Typically, you do this when the request body is big, and you do not want to send
    a big request body only to find out that the request cannot be completed.


    The `Expect` header is not set by default. You need to call the `expectContinue(true)`
    method of the request builder to enable this. The following snippet of code shows
    you how to use this:


    ```

    // Enable the Expect=100-Continue header in the request

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .expectContinue(true)

    .build();

    ```


    When you send this request, internally there will be two exchanges between the
    client and the server. The first request will not send the request body. After
    receiving an HTTP 100 status code in the response, the request body will be sent
    as part of the second exchange. However, you see just one response.


    Calling the `header("Expect", "100-Continue")` method of the request builder does
    not enable this feature. You must use the `expectContinue(true)` method to enable
    it.


    ### Setting Request Headers


    A header in an HTTP request is a name-value pair. You can have multiple headers
    in a request. You can use the `header()`, `headers()`, and `setHeader()` methods
    of the `HttpRequest.Builder` class to add headers to a request. The `header()`
    and `headers()` methods add headers if they are not already present. If headers
    were already added, these methods do nothing. The `setHeader()` method replaces
    the header if it was present; otherwise, it adds a new header.


    The `header()` and `setHeader()` methods let you add/set one header at a time,
    whereas the `headers()` method lets you add multiple headers. The `headers()`
    method takes a var-args argument, which should contain name-value pairs in sequence.
    The following snippet of code shows how to set headers for a request using these
    three methods. All three requests contain the same headers.


    ```

    // Use the header() method

    HttpRequest request1 = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .header("Accept", "text/plain")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .build();

    // Use the headers() method

    HttpRequest request2 = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .headers("Content-Type", "application/x-www-form-urlencoded",

    "Accept", "text/plain")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .build();

    // Use the setHeader() method

    HttpRequest request3 = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .setHeader("Content-Type", "application/x-www-form-urlencoded")

    .setHeader("Accept", "text/plain")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .build();

    ```


    ### Creating HTTP Requests


    In previous sections, you learned how to create an `HttpRequest.Builder` and how
    to use it to set different properties of an HTTP request. Creating an `HttpRequest`
    is simply calling the `build()` method on the `HttpRequest.Builder`. The following
    snippet of code creates an `HttpRequest` that uses the HTTP GET method:


    ```

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .GET()

    .build();

    ```


    Note that creating an `HttpRequest` object does not send the request to the server.
    You will need to call the `send()` or `sendAsync()` method of an `HttpClient`
    to send the request to the server. I will explain how to send requests to a server
    in the next section.


    ## Processing HTTP Responses


    Once you have an `HttpRequest`, you can send the request to a server and receive
    the response synchronously or asynchronously. An instance of the `HttpResponse<T>`
    interface represents a response received from a server, where the type parameter
    `T` indicates the type of the response body such as `String`, `byte[]`, or `Path`.
    You can use one of the following methods of the `HttpClient` class to send an
    HTTP request and receive an HTTP response:


    *   `<T> HttpResponse<T> send`​`(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler) throws IOException, InterruptedException`


    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync`​`(HttpRequest request,
    HttpResponse.BodyHandler<T> responseBodyHandler)`


    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync`​`(HttpRequest request,
    HttpResponse.BodyHandler<T> responseBodyHandler, HttpResponse.PushPromiseHandler<T>
    pushPromiseHandler)`


    The `send()` method is synchronous. That is, it blocks until the response is fully
    received. The `sendAsync()` method processes the response asynchronously. It returns
    immediately with a `CompletableFuture<HttpResponse<T>>`, which completes when
    the response is ready to be processed. You will see examples of both types in
    subsequent sections.'
