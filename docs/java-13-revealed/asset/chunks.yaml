    ## Supporting Shebang Files


    UNIX-like operating systems such as Linux and macOS support shebang files. A shebang
    file is an executable script file with a special first line (a shebang) that specifies
    the interpreter to be used to execute the script. The first line is called "shebang"
    or "hash bang". A shebang starts with a hash sign (`#`) followed with an exclamation
    mark (`!`), which is followed with the full path of the interpreter to be used.
    Consider the following contents on Linux saved in a `hello` file:


    ```

    #!/bin/bash

    echo Hello world!

    ```


    Here, the `hello` file contains a script. You need to give it the execute permission
    (`chmod +x hello`). It is also a shebang file. Its shebang specifies that the
    interpreter to execute the script – in this case, you have only one `echo` command
    in the script – is `/bin/bash`.


    The `java` command in source code mode supports shebang file. The shebang you
    need to use in the source file is


    ```

    #![path-to-java] --source [version]

    ```


    Here, `[path-to-java]` is the full path to the `java` command and `[version]`
    is the source version.


    ### Tip


    Shebang files are supported natively only on UNIX-like operating systems such
    as Linux and macOS. Windows does have support for shebang files.


    Listing [4-16](#419466_2_En_4_Chapter.xhtml#PC38) contains the code for a `pfp`
    file. I installed JDK13 in the `/home/ksharan/java13` directory on my Linux machine,
    so I have specified the following shebang in my `pfp` file:


    ```

    #!/home/ksharan/java13/bin/java --source 13

    package com.jdojo.sourcecode.mode;

    import java.nio.file.Paths;

    public class PrintFullPath {

    public static void main(String[] args) {

    // Print the full path of the current directory

    System.out.println(Paths.get(".")

    .toAbsolutePath()

    .normalize()

    .toString());

    }

    }

    Listing 4-16

    Contents of a pfp Executable File

    ```


    ```

    #!/home/ksharan/java13/bin/java --source 13

    ```


    You will need to modify the shebang in this file to point the path to the `java`
    command on your machine. You can find the path to `java` using the `whereis` command
    on Linux. On my machine, it prints the following:


    ```

    $ whereis java

    java: /usr/bin/java /usr/lib/java /etc/java /usr/share/java /home/ksharan/java9.sh
    /home/ksharan/java10.sh /home/ksharan/java13/bin/java /usr/share/man/man1/java.1.gz

    ```


