    DoubleSummaryStatistics{count=7, sum=26.900000, min=-6.000000, average=3.842857,
    max=9.000000}

    C:\Java13Revealed\src\sourcecode.apps>java Stats.java 6 x 9

    Exception in thread "main" java.lang.NumberFormatException: For input string:
    "x"

    at java.base/jdk.internal.math.FloatingDecimal.readJavaFormatString(FloatingDecimal.java:2054)

    ...

    ```


    ## Passing Options to the Compiler


    In source-file mode, the `java` command needs to compile the source file before
    it can run it. It scans the options specified on the command line that are relevant
    to the compiler and passes them to the compiler. The options, if specified, that
    are passed to the compiler are as follows:


    *   `--class-path`

    *   `--module-path`

    *   `--add-exports`

    *   `--add-modules`

    *   `--limit-modules`

    *   `--patch-module`

    *   `--upgrade-module-path`

    *   `--enable-preview`


    You cannot pass any additional options to the compiler other than those in this
    list. If the list of options is big, you can pass them using command-line argument
    files (`@-files`).


    In source-file mode, annotation processing is disabled during compilation. It
    is as if you used the `-proc:none` option to compile the source code.


    If a version is specified using the `--source` option, the value is used as the
    argument for an implicit `--release` option for the compilation.


    The compiler does not enforce the file name restriction that a type in a named
    package should exist in a file whose name is composed from the type name followed
    by the `.java` extension. You have already seen examples of this kind. For example,
    you had public `Hello` and `Bye` classes in a `HelloBye.java` file. If you compile
    the `HelloBye.java` file yourself, the compiler will refuse to compile it. The
    compiler will insist that the public classes must be declared in two separate
    files named `Hello.java` and `Bye.java`. However, the compiler did not enforce
    this when you used the source-file mode to run the file.


    In source-file mode, the source file is compiled as part of an *unnamed* module.
    Your code has access to all observable modules. It is as if you have compiled
    and run your code using the `--add-modules=ALL-DEFAULT` option. If you want your
    code to have access to other modules, you can do so using additional `--add-modules`
    options.


    Running the `java` command in source-file mode requires the `jdk.compiler` module.
    It is needed to compile the source file in memory.'
