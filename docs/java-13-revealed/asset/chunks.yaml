    The Java compiler is the `javac` tool, and the Java launcher is the `java` tool.
    The `java` tool is the topic of discussion in this chapter. Sometimes, you will
    come across the following phrases to refer to the `java` tool:


    *   The Java launcher or the `java` launcher


    *   The Java application launcher


    *   The `java` command


    They all refer to the same `java` tool found in the `JDK_HOME\bin` or `JRE_HOME\bin`
    directory, which is used to run a Java application. In my books, I refer to this
    as *the java command* and I will continue to do so in this chapter.


    Up to Java 8, you had to compile the source code and then run the compiled code.
    Compiling the source code to run a “HelloWorld” program was just added a bit to
    the learning curve to the beginners. Every time you make a small change to your
    program, you had to compile it before running it again. Java 9 added the JShell
    command-line tool, which lets you run source code by entering directly into the
    `jshell` command line. The JShell tool is an interactive tool. It is not meant
    to run Java program from source files. Rather, it is meant for those who want
    to explore the Java language interactively.


    Until Java 11, if you wanted to run a program, you must compile it before running
    it. In Java 11, the `java` command was modified to support running Java programs
    directly from source code – no need to compile your source code. Starting from
    Java 11, the `java` command can be used in one of the following four modes:


    *   Launching a class file


    *   Launching the main class of a JAR file


    *   Launching the main class of a module (added in JDK9)


    *   Launching a class in a source file (added in JDK11)


    In this chapter, I explain the fourth mode, which is the source-file mode. In
    this mode, you supply a source file to the `java` command , and it compiles the
    source code in memory and runs it. If you have source code in a file named `HelloWorld.java`,
    you would run it using the source-file mode as follows:


    ```

    java HelloWorld.java

    ```


    The `java` command looks at the supplied file extension, which is `.java` and
    uses the source-file mode to run the program. I will explain rules and restrictions
    of the source-file mode later. For now, think that it is as simple as running
    the `java` command with a source file.


    Who should use the source-file mode? It is not intended to be used by everyone.
    It is intended for those


    *   Who are learning Java and trying to run small programs written in a single
    file


    *   Who want to write utility programs/scripts using Java and run them as if they
    were OS-level commands/scripts


    If your Java program does not fall into one of these two categories, the business
    is as usual for you. That is, write your source code, compile them into class
    files, and use the `java` command in one of the other three modes to run your
    application.


    The `java` command runs a class with a method that must have the following declaration:


    ```

    public static void main(String[] args)

    ```


    The source-file mode does not change this requirement.


    ## Setting Up Examples


    The source-file mode for the `java` command works in classpath mode, not module
    mode. That is, you cannot declare your source code in a module. All examples for
    this chapter are in the `src\sourcecode.apps` directory in the supplied source
    code for this book.


    Let us have a quick example. Listing [4-1](#419466_2_En_4_Chapter.xhtml#PC3) contains
    the code for a class named `HelloSourceMode`. The class is in the `com.jdojo.sourcecode.mode`
    package. There is nothing special going on inside this class. It simply prints
    a message to the standard output.


    ```

    // HelloSourceMode.java

    package com.jdojo.sourcecode.mode;

    public class HelloSourceMode {

    public static void main(String[] args) {

    System.out.println("Hello, Java source-file launcher!");

    }

    }

    Listing 4-1

    A HelloSourceMode Class

    ```


    Use the following command to run the `HelloSourceMode` class:


    ```

    C:\Java13Revealed\src\sourcecode.apps>java HelloSourceMode.java

    Hello, Java source-file launcher!

    ```


    The `java` command was run from inside the `src\sourcecode.app` directory where
    the `HelloSourceMode.java` file is stored.


    The `HelloSourceMode` class is in the `com.jdojo.sourcecode.mode` package. The
    source-file mode did not force you to store the source file to conform to the
    class’ package. If you were to run this class using any of the other three modes,
    you were required to store the class file in a `com\jdojo\sourcecode\mode` directory.
    The source-file mode cares only about the existence of the source file. If it
    can find the file, it will run it. If your current directory is `src`, you would
    use the following command to run this file:


    ```

    C:\Java13Revealed\src>java sourcecode.apps\HelloSourceMode.java

    Hello, Java source-file launcher!

    ```'
