- fmt: '# Summary


    Java has adopted a new time-based release model in which it will have a feature
    release every 6 months, an update release every 3 months, and a long-term support
    (LTS) release every 3 years. New feature releases will happen in March and September,
    starting from March 2018 with Java 10. Update releases will happen in January,
    April, July, and October. LTS releases will happen every 3 years starting from
    September 2018.


    The non-intuitive versioning scheme for the JDK was revamped in JDK 9. A JDK version
    string consists of the following four elements in order, of which only the first
    one is mandatory: a version number, pre-release information, build information,
    and additional information. The regular expression “`$vnum(-$pre)?(\+($build)?(-$opt)?)?"`
    defines the format of a version string. In JDK 9, `$vnum` consisted of four parts:
    `$major.$minor.$security(.$additionalInfo)`. From JDK 10, `$vnum` consists of
    five parts: `$feature.$interim.$update.$patch(.$addtionalInfo)`. The `$feature`,
    `$interim`, `$update` elements in `$vnum` in JDK 10 were called `$major`, `$minor`,
    and `$security` in JDK 9.


    A short version string consists of only the first two elements – a version number
    optionally followed by pre-release information. You can have a version string
    as short as “10”, which contains only the major version number, and as big as
    “10.0.1.1-ea+54-20180210.07.36am”, which contains all elements.


    JDK 9 added a static nested class called `Runtime.Version` whose instances represent
    JDK version strings. The class does not have a public constructor. You can get
    the current version of the JRE using the `version()` static method of the `Runtime`
    class. The method returns a `Runtime.Version`. You can use the `parse(String vstr)`
    static method of the `Runtime.Version` class to parse a version string to obtain
    a `Runtime.Version`. The `parse()` method may throw a runtime exception if the
    version string is `null` or invalid. The class contains several methods to get
    different parts of a version string.


    JDK 10 has added two new system properties named `java.version.date` and `java.vendor.version`.
    The `java.version.date` system property contains the general availability (GA)
    date of the current JDK release in ISO-8601 `YYYY-MM-DD` format. The `java.vendor.version`
    system property is a vendor-specific product version string, which is optional
    and assigned by the JDK vendor.


    The `Runtime.Version` class contains several methods to compare and retrieve different
    parts of a version string. For example, you can use the `feature()` method to
    get the `$feature` element for a version string. The `major()`, `minor()`, and
    `security()` methods in the `Runtime.Version` class have been deprecated in JDK
    10; use the `feature()`, `interim()`, and `update()` methods of the class instead.


    # The HTTP Client API


    In this chapter, you will learn:


    - What the HTTP Client API is

    - How to create HTTP clients

    - How to make HTTP requests

    - How to receive and process HTTP responses

    - How to push unsolicited data from server to client using server push

    - How to use HTTP basic authentication to authenticate access to resources on
    the server

    - How to create WebSocket client endpoints


    JDK 9 and 10 delivered the HTTP Client API as an incubator module. JDK 11 included
    it as a standard module named `java.net.http`. The types are in the `java.net.http`
    package.


    ## What Is the HTTP Client API?


    Java has supported HTTP Client API from very early releases. The legacy API supported
    HTTP/1.1, and it consisted of several classes and interfaces in the `java.net`
    package. The `URLConnection` was the base class to represent a communication,
    and the `HttpURLConnection` was the class to represent an HTTP communication.
    The legacy API had the following issues:


    - It was designed to support multiple protocols such as http, ftp, gopher, and
    so on, many of which are not used anymore.

    - It was too abstract and hard to use.

    - It contained many undocumented behaviors.

    - It supported only one mode, blocking mode, which required you to have one thread
    per request/response.

    - It did not support HTTP/2.


    In May 2015, the Internet Engineering Task Force (IETF) published a specification
    for HTTP/2. Refer to the web page at [`https://tools.ietf.org/html/rfc7540`](https://tools.ietf.org/html/rfc7540)
    for the complete text of the HTTP/2 specification. HTTP/2 does not modify the
    application-level semantics. That is, what you know about and have been using
    about the HTTP protocol in your application have not changed. It has a more efficient
    way of preparing the data packets and sending them over to the wire between the
    client and the server. All you knew about HTTP before, such as HTTP headers, methods,
    status codes, URLs, and so on, remain the same. HTTP/2 attempts to solve many
    problems related to performance faced by HTTP/1.1 connections:


    - HTTP/2 supports binary data exchange instead of textual data supported by HTTP/1.1.

    - HTTP/2 supports multiplexing and concurrency, which means that multiple data
    exchanges can occur concurrently in both directions of a TCP connection and responses
    to requests can be received out of order. This eliminates the overhead of having
    multiple connections between peers, which was typically the case while using HTTP/1.1.
    In HTTP/1.1, responses must be received in the same order as the requests were
    sent, which is called *head-of-line* blocking. HTTP/2 has solved the head-of-line
    blocking problem by enabling multiplexing over the same TCP connection.

    - The client can suggest the priority of a request, which may be honored by the
    server in prioritizing responses.

    - HTTP headers are compressed, which reduces the header size significantly, thus
    lowering latency.

    - It allows for unsolicited push of resources from server to clients, which is
    called server push.


    Instead of updating the existing API for HTTP/1.1, the HTTP Client API in JDK
    11 provides a new API that supports both HTTP/1.1 and HTTP/2. It is intended that
    the HTTP Client API will eventually replace the old API provided by the `URLConnection`
    class. The new API also contains classes and interfaces to develop client applications
    using the WebSocket protocol. Refer to the web page at [`https://tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455)
    for the complete WebSocket protocol specification. The new HTTP Client API has
    several benefits over the legacy API:


    - It is simple. It is easy to learn and use for most common cases.

    - It processes request and response bodies using reactive stream using the Flow
    API introduced in Java 9.

    - It supports server push, which allows the server to push resources to the client
    without the client making an explicit request for those resources. It makes setting
    up WebSocket communication with servers simple.

    - It supports HTTP/2 and HTTPS/TLS protocols.

    - It works in both synchronous (blocking) and asynchronous (non-blocking) modes.'
