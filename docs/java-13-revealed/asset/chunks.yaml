- fmt: "# What Is a Preview Feature?\n\nA preview feature of the Java SE Platform\
    \ is a fully specified and fully implemented language or virtual machine feature,\
    \ which is available in a JDK feature release, but is not a permanent feature\
    \ of the JDK yet. A preview feature is provided to solicit developer feedback.\
    \ Developers are expected to experiment with the features in real-world use cases.\
    \ Based on the feedback, a preview feature may become permanent (standard feature)\
    \ in a future release with or without modifications or it may be removed altogether.\
    \ A preview feature is not meant to be used in production. Refer to JEP 12 at\
    \ [`https://openjdk.java.net/jeps/12`](https://openjdk.java.net/jeps/12) for more\
    \ details on preview features.\n\nA preview feature is not backward compatible.\
    \ You cannot run class files that contain preview features from Java 12 using\
    \ Java 13 runtime.\n\nSince a preview feature is not meant to be used in production,\
    \ it is not enabled in the compiler and runtime by default. You must use the `--enable-preview`\
    \ option with the compiler and runtime to use a preview feature. You will need\
    \ to use the `--release` or `-source` option when you use the `--enable-preview`\
    \ option to compile the source code. To compile source code with preview features\
    \ in JDK 13, you would use\n\n```\njavac --enable-preview --release 13 \n```\n\
    \nIf you do not use the `--enable-preview` option to compile the source code with\
    \ preview features, you receive compile-time errors similar to the following:\n\
    \n```\nC:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\com\\jdojo\\enhancedswitch\\\
    Test.java:9: error: switch rules are a preview feature and are disabled by default.\n\
    case 10->str =  \"ten\";\n(use --enable-preview to enable switch rules)\n1 error\n\
    ```\n\nIf you enable preview features at compile time, the compiler prints notes\
    \ suggesting you to compile with a `-Xlint:preview` option, so you can see the\
    \ warnings.\n\n```\nNote: C:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\\
    com\\jdojo\\enhancedswitch\\Test.java uses preview language features.\nNote: Recompile\
    \ with -Xlint:preview for details.\n```\n\nHere is what you get when you use both\
    \ `--enable-preview` and `-Xlint:preview` options with the compiler, which prints\
    \ a warning for each usage of the preview feature.\n\n```\nC:\\Java13Revealed\\\
    src\\jdojo.enhancedswitch\\classes\\com\\jdojo\\enhancedswitch\\Test.java:9: warning:\
    \ [preview] switch rules are a preview feature and may be removed in a future\
    \ release.\ncase 10->str =  \"ten\";\n...\n4 warnings\n```\n\nTo run compiled\
    \ classes with preview features, you specify the `--enable-preview` option with\
    \ the `java` command\n\n```\njava --enable-preview \n```\n\nIf you want to use\
    \ JShell to explore preview features, you need to start it with the `--enable-preview`\
    \ option\n\n```\nC:\\Java13Revealed>jshell --enable-preview\n|  Welcome to JShell\
    \ -- Version 13\n|  For an introduction type: /help intro\njshell>\n```\n\n##\
    \ Example Programs\n\nAll examples in this chapter are in the `jdojo.enhancedswitch`\
    \ module as shown in Listing [5-1](#419466_2_En_5_Chapter.xhtml#PC7).\n\n```\n\
    // module-info.java\nmodule jdojo.enhancedswitch {\nexports com.jdojo.enhancedswitch;\n\
    }\nListing 5-1\nA Module Named jdojo.enhancedswitch\n```\n\n## The Background\n\
    \nThe Java language has the `switch` statement since its inception. It is used\
    \ as a control flow statement. Syntax and semantics for the `switch` statement\
    \ were copied from C/C++, which have the following features that were simply irritating\
    \ to use and were also error-prone:\n\n* The `switch` labels used fall-through\
    \ semantics. In most cases, you want to execute statements associated with only\
    \ the matching label and no other labels. Because of the fall-through semantics,\
    \ you ended up using a `break` statement in each label, which is irritating as\
    \ well as error-prone.\n\n* If you want to execute the same set of statements\
    \ for multiple `switch` labels, you must define multiple case labels using the\
    \ fall-through semantics. In other words, specifying multiple constants in a case\
    \ label was not permitted – one case label must have one and only one constant.\n\
    \n* All switch labels occur in one scope, which means you cannot declare the same\
    \ variables for different labels.\n\n* It was designed to work only as a statement,\
    \ not as an expression. A statement indicates an action, whereas an expression\
    \ evaluates to a value.\n\nThe `switch` statement with these issues has been around\
    \ for 24 years. Why do we need to address them now? Isn’t it too late? The answer\
    \ is yes and no. Developers may live with it until the end of Java life cycle.\
    \ However, there is a much more important feature, called pattern matching, which\
    \ prompted addressing these issues. Pattern matching is not part of Java yet;\
    \ you can track it in JEP 305 at [`https://openjdk.java.net/jeps/305`](https://openjdk.java.net/jeps/305).\
    \ For pattern matching to work, `switch` in Java must be overhauled. With the\
    \ new Java release cycle every 6 months, the enhanced `switch` has been delivered\
    \ as a preview feature in Java 12 and a refined version of it in Java 13, whereas\
    \ the final goal, which is the pattern matching, is still being worked on.\n\n\
    I assume that you know how to use the traditional `switch` statement. In the following\
    \ sections, I walk you through each of these problems one by one with a simple\
    \ snippet of code before I explain the enhanced `switch` features.\n\n### The\
    \ Fall-Through Semantics\n\nThe following snippet of code contains a simple `switch`\
    \ statement:\n\n```\nint count = 2;\n// More code goes here...\nswitch (count)\
    \ {\ncase 1:\nSystem.out.println(\"One\");\nbreak;\ncase 2:\nSystem.out.println(\"\
    Two\");\nbreak;\ncase 3:\nSystem.out.println(\"Three\");\nbreak;\ndefault:\nSystem.out.println(\"\
    Out-of-range\");\n}\n```\n\nYou have an `int` variable named `count`. The `switch`\
    \ statement prints `\"One\"`, `\"Two\"`, or `\"Three\"` when the value of `count`\
    \ is 1, 2, or 3, respectively. Otherwise, it prints `\"Out-of-range\"`. Notice\
    \ the use of the `break` statement for each `case` label. You needed it because,\
    \ by default, the `switch` statement uses fall-through. Without the `break` statements,\
    \ for the `count` value 1, all four switch labels (three `case` labels and one\
    \ `default` label) would have been executed, which you did not intend.\n\n###\
    \ One Constant per Case Label\n\nSuppose that you are given an English letter\
    \ and you have to print whether it is a vowel or consonant. Here is the code that\
    \ does this:\n\n```\nchar c = 'w';\n// More code goes here...\nswitch(Character.toLowerCase(c))\
    \ {\ncase 'a':\ncase 'e':\ncase 'i':\ncase 'o':\ncase 'u':\nSystem.out.println(\"\
    Vowel\");\nbreak;\ndefault:\nSystem.out.println(\"Consonant\");\n}\n```\n\nNotice\
    \ the use of five `case` labels using the fall-through semantics. You have five\
    \ `case` constants for vowels. Because you could use only one constant per `case`\
    \ label, you had to use five separate `case` labels. Wouldn’t it be better if\
    \ you were able to write one `case` label like `\"case 'a', 'e', 'i', 'o', 'u':\"\
    `?"
