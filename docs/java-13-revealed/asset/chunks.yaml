- fmt: '# Formal Parameters in Lambda Expressions


    Java 10 did not support `var` to declare formal parameters of implicitly typed
    lambda expressions. Consider the following statement, which uses an implicitly
    typed lambda expression:


    ```

    BiFunction adder = (x, y) -> (long)(x + y);

    ```


    In this case, the types of both `x` and `y` parameters are inferred as `Integer`.
    In JDK 10, you cannot write like:


    ```

    // A compile-time error in Java 10, but allowed in Java 11 and later

    BiFunction adder = (var x, var y) -> (long)(x + y);

    ```


    The previous statement is possible in Java 11, which introduced support for `var`
    in formal parameters in implicitly typed lambda expressions. Using `var` in formal
    parameters for implicitly typed lambda expressions plays no role in type inference.
    An implicitly typed lambda expression infers the type of its formal parameters
    from the context of its use. Both of the following statements are the same to
    the compiler:


    ```

    BiFunction adder = (x, y) -> (long)(x + y);

    BiFunction adder = (var x, var y) -> (long)(x + y);

    ```


    In both cases, it is inferring the type for `x` and `y` by looking at the variable
    declaration on the left. You might wonder why you would even use `var` in this
    case. There are two simple reasons:


    - For consistency in using the local variable type inference syntax

    - For allowing modifiers and annotations to be used on the formal parameters of
    implicitly typed lambda expressions


    Because `var` was allowed for local variable in other contexts, its designer allowed
    it on the formal parameters of implicitly typed lambda expressions just for the
    sake of consistency in its use. Remember that just using `var` with formal parameters
    in implicitly typed lambda expressions has no actual effect, except for consistency.


    Before Java 11, you could not use modifiers or annotations on the formal parameters
    of an implicitly typed lambda expression. Suppose, in our example, you wanted
    to declare `n1` and `n2` as `final`. You cannot achieve it like so:


    ```

    // A compile-time error

    BiFunction avg = (final n1, final n2) -> (n1 + n2)/2.0;

    ```


    You can see the actual compile-time error in the following JShell session:


    ```

    jshell> BiFunction avg = (final n1, final n2) -> (n1 + n2)/2.0;

    |  Error:

    |   expected

    |  BiFunction avg = (final n1, final n2) -> (n1 + n2)/2.0;

    |                                                 ^

    |  Error:

    |   expected

    |  BiFunction avg = (final n1, final n2) -> (n1 + n2)/2.0;

    |                                                           ^

    ```


    If you wanted to use the `final` modifier on `n1` and `n2` before Java 11, you
    could do so by using an explicitly typed lambda expression:


    ```

    BiFunction avg = (final Integer n1, final Long n2) -> (n1 + n2)/2.0;

    ```


    From Java 11, you can declare the formal parameters of an implicitly typed lambda
    expression `final` by using `var` as follows:


    ```

    BiFunction avg = (final var n1, final var n2) -> (n1 + n2)/2.0;

    ```


    You can also use annotations on formal parameters for implicitly typed lambda
    expressions as follows:


    ```

    BiFunction avg = (@NonNull var n1, @NonNull var n2) -> (n1 + n2)/2.0;

    ```


    There are a few restrictions on using `var` with formal parameters in implicitly
    typed lambda expressions. They are described as follows:


    An implicitly typed lambda expression must use `var` for all its formal parameters
    or for none.


    ```

    // A compile-time error. Uses var only on one parameter n1, and not on both

    BiFunction avg = (var n1, n2) -> (n1 + n2)/2.0;

    ```


    You can use `var` only on the formal parameters for implicitly typed lambda expression,
    not on explicitly typed lambda expressions. That is, you cannot specify the explicit
    type for some formal parameters and use `var` on others.


    ```

    // A compile-time error. Mixes var and explicit type Long

    BiFunction avg = (var n1, Long n2) -> (n1 + n2)/2.0;

    ```


    It might seem counterintuitive not to allow `var` in semi-implicitly typed lambda
    expressions as the previous one. In this case, the compiler has to infer type
    partially – only for the formal parameter `n1`. It is simply not allowed because
    the type inference and overload resolution become very complex in these cases.
    Mixing of `var` with explicit type for formal parameters may be allowed in the
    future.


    For brevity, implicitly typed lambda expressions allow you to drop the parenthesis
    when you have only one formal parameter:


    ```

    Function twice = x -> x * 2;

    ```


    If you use `var` to declare the formal parameter in the previous lambda expression,
    you must use parentheses:


    ```

    Function twice = var x -> x * 2; // A compile-time error

    Function twice = (var x) -> x * 2; // OK

    ```


    ## Backward Compatibility


    If your existing code uses `var` as a class or interface name, your code will
    break in Java 10 and later. Using it as method, package, and variable names is
    fine. It is very unlikely that you have named a class or interface as `var` because
    that would have been against the Java naming convention.


    ## Summary


    Deriving type of a variable or an expression from the context of its use is called
    type inference. Java 10 introduced a restricted type name called `var` that can
    be used to declare local variables with initializers and indexes for `for-each`
    and `for` loops. Java 11 extended the support for `var` in declaring the formal
    parameters of implicitly typed lambda expressions. The type of the variable declared
    using `var` is inferred from the expression in the initializer. `var` is not a
    keyword; rather, it is a restricted type name, which means you cannot have a type
    such as a class or interface named as `var`. If you have a type named `var` in
    your existing code, your code will break when compiled in JDK 10 and later.


    It is not always possible to infer the type of local variables from initializers.
    For example, if the initializer is `null`, it is not possible to infer the type.
    There are few limitations for using `var` to declare variables:


    - Variable declarations without initializers are not supported.

    - The initializer cannot be of the `null` type.

    - Multiple variables in a single declaration are not supported.

    - The initializer cannot reference the variable being declared.

    - Array initializers by themselves are not supported.

    - No array dimensions can be specified while declaring arrays.

    - No poly expressions such as lambda expressions and method references are allowed
    in initializer.

    - Instance and static fields are not supported.

    - Using `var` on some but not on all formal parameters in implicitly typed lambda
    expressions is not allowed.

    - You cannot mix `var` and explicitly typed formal parameters in a lambda expression.

    - If you use `var` to declare a formal parameter for an implicitly typed lambda
    expression, you must enclose the formal parameter declaration in parentheses even
    if there is only one formal parameter.


    # Java Versioning Scheme


    In this chapter, you will learn:


    - About the old and new Java release models

    - What the JDK versioning scheme had been before JDK 9

    - About the new JDK versioning scheme in JDK 9 and its updates in JDK 10

    - How to parse a JDK version string using the `Runtime.Version` class

    - About the formats used to print the Java version string using different options
    with the `java` command'
