  trans: '

    ### 覆盖 HTTP 版本


    `HttpRequest` 通过 `HttpClient` 发送到服务器。在构建 `HttpRequest` 时，你可以通过其 `HttpRequest.Builder`
    对象，使用 `version()` 方法设置 HTTP 版本值，该方法将覆盖发送此请求时 `HttpClient` 中设置的 HTTP 版本。以下代码片段为请求将版本设置为
    HTTP 1.1，覆盖了 `HttpClient` 中 HTTP 2 的默认值。回顾一下，是否使用 HTTP 2 取决于服务器。如果服务器不支持 HTTP
    2，HTTP 通信将降级为使用 HTTP 1.1。


    ```

    // 使用此 HttpClient 发送的所有请求都将使用 HTTP 2

    // 除非被请求覆盖

    HttpClient client = HttpClient.newHttpClient();

    // 获取一个使用 HTTP 1.1 的 HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .version(HTTP_1_1)

    .build();

    // client 对象使用 HTTP 2，而 request 对象将其覆盖为 HTTP 1.1。

    // 以下语句将使用 request 对象中的 HTTP 1.1 发送请求。

    HttpResponse response =

    client.send(request, BodyHandlers.ofString());

    ```


    ### 设置超时


    你可以使用 `HttpRequest.Builder` 实例的 `timeout(Duration timeout)` 方法为请求指定超时时间。如果在指定的超时时间内未收到响应，则会抛出
    `HttpTimeoutException`。如果你没有设置请求超时，请求可能会永远阻塞。`httpbin.org/delay/{delay}` URL 会在延迟
    URL 的 `{delay}` 部分指定的时间后发回响应。以下 `HttpRequest` 将始终因 `HttpTimeoutException` 而失败，因为服务器在
    5 秒后发送响应，而我们将请求超时设置为 2 秒：


    ```

    // 一个发送时会失败的 HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/delay/5"))

    .timeout(Duration.ofSeconds(2))

    .build();

    ```


    ### 设置 Expect Continue 标头


    HTTP 请求可能包含一个名为 `Expect` 且值为 `"100-Continue"` 的标头。如果设置了此标头，客户端仅向服务器发送标头（不带请求体），服务器应发回错误响应或
    `100-Continue` 响应。收到 `100-Continue` 响应后，客户端将请求体发送到服务器。客户端使用此技术在实际发送请求体之前，根据请求标头检查服务器是否可以处理该请求。通常，当请求体很大，并且你不想在发送大量请求体后才发现请求无法完成时，会执行此操作。


    默认情况下不设置 `Expect` 标头。你需要调用请求构建器的 `expectContinue(true)` 方法来启用此功能。以下代码片段向你展示了如何使用它：


    ```

    // 在请求中启用 Expect=100-Continue 标头

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .expectContinue(true)

    .build();

    ```


    当你发送此请求时，客户端和服务器之间内部将进行两次交换。第一次请求不会发送请求体。在响应中收到 HTTP 100 状态码后，请求体将作为第二次交换的一部分发送。但是，你只会看到一个响应。


    调用请求构建器的 `header("Expect", "100-Continue")` 方法不会启用此功能。你必须使用 `expectContinue(true)`
    方法来启用它。


    ### 设置请求标头


    HTTP 请求中的标头是一个名称-值对。一个请求中可以有多个标头。你可以使用 `HttpRequest.Builder` 类的 `header()`、`headers()`
    和 `setHeader()` 方法向请求添加标头。如果标头尚不存在，`header()` 和 `headers()` 方法会添加标头。如果标头已添加，这些方法不执行任何操作。`setHeader()`
    方法会替换已存在的标头；否则，它会添加一个新标头。


    `header()` 和 `setHeader()` 方法允许你一次添加/设置一个标头，而 `headers()` 方法允许你添加多个标头。`headers()`
    方法接受一个可变参数，该参数应按顺序包含名称-值对。以下代码片段展示了如何使用这三种方法为请求设置标头。所有三个请求都包含相同的标头。


    ```

    // 使用 header() 方法

    HttpRequest request1 = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .header("Accept", "text/plain")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .build();

    // 使用 headers() 方法

    HttpRequest request2 = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .headers("Content-Type", "application/x-www-form-urlencoded",

    "Accept", "text/plain")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .build();

    // 使用 setHeader() 方法

    HttpRequest request3 = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .setHeader("Content-Type", "application/x-www-form-urlencoded")

    .setHeader("Accept", "text/plain")

    .POST(BodyPublishers.ofString("name=Kishori"))

    .build();

    ```


    ### 创建 HTTP 请求


    在前面的章节中，你学习了如何创建 `HttpRequest.Builder` 以及如何使用它来设置 HTTP 请求的不同属性。创建 `HttpRequest`
    只需在 `HttpRequest.Builder` 上调用 `build()` 方法。以下代码片段创建了一个使用 HTTP GET 方法的 `HttpRequest`：


    ```

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .GET()

    .build();

    ```


    请注意，创建 `HttpRequest` 对象并不会将请求发送到服务器。你需要调用 `HttpClient` 的 `send()` 或 `sendAsync()`
    方法将请求发送到服务器。我将在下一节中解释如何向服务器发送请求。


    ## 处理 HTTP 响应


    一旦你有了 `HttpRequest`，就可以将请求发送到服务器并同步或异步接收响应。`HttpResponse<T>` 接口的实例表示从服务器接收到的响应，其中类型参数
    `T` 指示响应体的类型，例如 `String`、`byte[]` 或 `Path`。你可以使用 `HttpClient` 类的以下方法之一来发送 HTTP
    请求并接收 HTTP 响应：


    *   `<T> HttpResponse<T> send`​`(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler) throws IOException, InterruptedException`


    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync`​`(HttpRequest request,
    HttpResponse.BodyHandler<T> responseBodyHandler)`


    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync`​`(HttpRequest request,
    HttpResponse.BodyHandler<T> responseBodyHandler, HttpResponse.PushPromiseHandler<T>
    pushPromiseHandler)`


    `send()` 方法是同步的。也就是说，它会阻塞直到完全接收到响应。`sendAsync()` 方法异步处理响应。它会立即返回一个 `CompletableFuture<HttpResponse<T>>`，当响应准备好被处理时，该对象完成。你将在后续章节中看到这两种类型的示例。

    '
- fmt: '### Processing Response Status and Headers


    An `HttpResponse` contains a status code, headers, and a body. Sometimes, an `HttpResponse`
    is made available to you as soon as the status code and headers are received from
    the server, but before the body is received. The availability of the response
    before its body is fully available depends on the body handler that you provide.
    For example, if you provide a `String` body handler, the `HttpResponse` is available
    after the entire response body is received and has been converted to a `String`.
    If you provide a body handler to process the response body as a stream of lines,
    the `HttpResponse` will be available after the status code and headers are received.


    The `statusCode()` method of the `HttpResponse` interface returns the status code
    of the response as an `int`.


    The `headers()` method of the `HttpResponse` interface returns the headers of
    the response as an instance of the `HttpHeaders` class. The `HttpHeaders` class
    contains the following methods to conveniently retrieve header’s values by name
    or all headers as a `Map<String,List<String>>`:


    *   `List<String> allValues(String name)`

    *   `Optional<String> firstValue(String name)`

    *   `OptionalLong firstValueAsLong(String name)`

    *   `Map<String, List<String>> map()`


    Listing [3-3](#419466_2_En_3_Chapter.xhtml#PC20) contains a complete program to
    send a request to the URL `http://httpbin.org` with a `HEAD` request. It prints
    the received response’s status code and headers. You may get different output.


    ```

    // PrintHeaders.java

    package com.jdojo.http.client;

    import java.io.IOException;

    import java.net.URI;

    import java.net.http.HttpClient;

    import java.net.http.HttpRequest;

    import java.net.http.HttpRequest.BodyPublishers;

    import java.net.http.HttpResponse;

    import java.net.http.HttpResponse.BodyHandlers;

    public class PrintHeaders {

    public static void main(String[] args) {

    // Create an HttpClient with default configurations

    HttpClient client = HttpClient.newHttpClient();

    // Create an HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org"))

    .method("HEAD", BodyPublishers.noBody())

    .build();

    try {

    // send the request to the server

    HttpResponse response

    = client.send(request, BodyHandlers.discarding());

    // Print the response status code and headers

    System.out.println("Status Code:" + response.statusCode());

    System.out.println("Response Headers:");

    response.headers()

    .map()

    .entrySet()

    .forEach(System.out::println);

    } catch (IOException | InterruptedException e) {

    e.printStackTrace();

    }

    }

    }

    Status Code:200

    Response Headers:

    access-control-allow-credentials=[true]

    access-control-allow-origin=[*]

    connection=[keep-alive]

    content-length=[9593]

    content-type=[text/html; charset=utf-8]

    date=[Tue, 23 Jul 2019 18:01:12 GMT]

    referrer-policy=[no-referrer-when-downgrade]

    server=[nginx]

    x-content-type-options=[nosniff]

    x-frame-options=[DENY]

    x-xss-protection=[1; mode=block]

    Listing 3-3

    Processing an HTTP Response’s Status Code and Headers

    ```


    Let us look at the important parts of the request and response. The statement
    to create an `HttpRequest` is


    ```

    // Create an HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org"))

    .method("HEAD", BodyPublishers.noBody())

    .build();

    ```


    Notice the use of the `HEAD` HTTP method and the `method()` method. You are interested
    in receiving only the headers in the response, so you used `HEAD` as the HTTP
    method. You are not sending any request body, so you used a body publisher that
    publishes no body as indicated in `BodyPublishers.noBody()`.


    The following statement sends request to the server:


    ```

    HttpResponse response

    = client.send(request, BodyHandlers.discarding());

    ```


    Here, you are using body handler for the response body that is returned from the
    `BodyHandlers.discarding()`. This body handler simply discards the response body,
    which you can see as the type parameter `Void` in the returned value from the
    `send()` method in `HttpResponse<Void>`. The return type for the `body()` method
    for the `response` object is `Void`, and calling `response.body()` will return
    `null`.


    ### Processing the Response Body


    Processing the body of an HTTP response is a two-step process:


    *   You need to specify a response body handler, which is an instance of the `HttpResponse.BodyHandler<T>`
    interface, when you send a request using the `send()` or `sendAsync()` method
    of the `HttpClient` class.

    *   When the response status code and headers are received, the `apply(HttpResponse.ResponseInfo
    responseInfo)` method of the response body handler is called. The `ResponseInfo`
    contains the response status code, headers, and HTTP protocol version. The `apply()`
    method returns an instance of the `HttpResponse.BodySubscriber<T>` interface,
    which reads the response body and converts the read data into the type `T`. The
    `HttpResponse.BodySubscriber<T>` interface extends `Flow.Subscriber<List<ByteBuffer>>`,
    which means a body subscriber is a subscriber in the Flow API whose job is to
    consume response body and make it available to you as a high-level Java object.


    Don’t worry about these details of processing a response body. Several implementations
    of the `HttpResponse.BodyHandler<T>` are provided. You can use one of the following
    `static` factory methods of the `HttpResponse.BodyHandlers` class to get its instance
    for a different type parameter `T`:


    *   `<T> HttpResponse.BodyHandler<T> buffering(HttpResponse.BodyHandler<T> downstreamHandler,
    int bufferSize)`

    *   `HttpResponse.BodyHandler<Void> discarding()`

    *   `HttpResponse.BodyHandler<byte[]> ofByteArray()`

    *   `HttpResponse.BodyHandler<Void> ofByteArrayConsumer(Consumer<Optional<byte[]>>
    consumer)`

    *   `HttpResponse.BodyHandler<Path> ofFile(Path file)`

    *   `HttpResponse.BodyHandler<Path> ofFile(Path file, OpenOption... openOptions)`

    *   `HttpResponse.BodyHandler<Path> ofFileDownload(Path directory, OpenOption...
    openOptions)`

    *   `HttpResponse.BodyHandler<InputStream> ofInputStream()`

    *   `HttpResponse.BodyHandler<Stream<String>> ofLines()`

    *   `HttpResponse.BodyHandler<Flow.Publisher<List<ByteBuffer>>> ofPublisher()`

    *   `HttpResponse.BodyHandler<String> ofString()`

    *   `HttpResponse.BodyHandler<String> ofString(Charset charset)`

    *   `<U> HttpResponse.BodyHandler<U> replacing(U value)`


    These methods’ signatures are intuitive enough to tell you what type of response
    body they handle. For example, if you want to get the response body as a `String`,
    use the `ofString()` method to get a body handler. The `discarding()` method returns
    a body handler, which will discard the response body. The `replacing(U value)`
    method returns a body handler that discards the original response body and returns
    the specified `value` as the body. The `ofLines()` method returns a body handler
    that returns response body as a stream of lines. The `ofFile()` methods return
    a body handler that saves the response body in a specified file represented by
    the specified `Path`.


    The `body()` method of the `HttpResponse<T>` interface returns the response body,
    which is of type `T`.


    ### Tip


    The `HttpResponse.BodyHandlers` class contains `fromSubscriber()` and `fromLineSubscriber()`
    methods. They act as an adapter between `Flow.Subscriber<T>` and `HttpResponse.BodyHandler<T>`.
    They let you convert a `Flow.Subscriber<T>` into an `HttpResponse.BodyHandler<T>`.


    You have already seen examples of handling a response body as a `String`.


    Subsequent sections explore some more options to process a response body such
    as saving a response body to a file, downloading it to a file as an attachment.
    Currently, there is no built-in body handler to process response body as a JSON
    object. You need to use a Java library, for example, Jackson JSON Parser, to process
    JSON response body. Several of our examples return JSON response body. I simply
    process them as a `String`.'
  raw: '### Processing Response Status and Headers


    An `HttpResponse` contains a status code, headers, and a body. Sometimes, an `HttpResponse`
    is made available to you as soon as the status code and headers are received from
    the server, but before the body is received. The availability of the response
    before its body is fully available depends on the body handler that you provide.
    For example, if you provide a `String` body handler, the `HttpResponse` is available
    after the entire response body is received and has been converted to a `String`.
    If you provide a body handler to process the response body as a stream of lines,
    the `HttpResponse` will be available after the status code and headers are received.


    The `statusCode()` method of the `HttpResponse` interface returns the status code
    of the response as an `int`.


    The `headers()` method of the `HttpResponse` interface returns the headers of
    the response as an instance of the `HttpHeaders` class. The `HttpHeaders` class
    contains the following methods to conveniently retrieve header’s values by name
    or all headers as a `Map<String,List<String>>`:


    *   `List<String> allValues`​`(String name)`


    *   `Optional<String> firstValue`​`(String name)`


    *   `OptionalLong firstValueAsLong`​`(String name)`


    *   `Map<String,`​`List<String>> map()`


