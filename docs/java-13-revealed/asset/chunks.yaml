- fmt: '# Dynamic CDS Archives


    Using CDS and AppCDS improves the application’s startup time significantly. It
    also greatly reduces runtime footprint. The default CDS archive introduced in
    JDK12 is made using the CDS archive transparent. However, you still needed to
    perform a three-step process to use AppCDS in JDK12:


    - Create a class list.

    - Dump a shared archive.

    - Run the application with the shared archive.


    The final goal is to make the use of AppCDS transparent in which you do not need
    to take any action to take advantage of shared archives. However, as of JDK13,
    we are not there yet. JDK13 has significantly simplified the way you generate
    a shared archive to use AppCDS making it a simple two-step process:


    - Run your application with the `-XX:ArchiveClassesAtExit=<file-name>`, where
    `<file-name>` is the name of the shared archive file. A shared archive will be
    generated when the application exits. If the application exits abruptly, no shared
    archive will be generated.

    - Run your application with the `-XX:SharedArchiveFile=<file-name>` option to
    use the shared archive for AppCDS.


    Let us create a shared archive for our `HelloCDS` application using the following
    command with JDK13. Refer to the following text for troubleshooting if you get
    an error running this command:


    ```

    C:\Java13Revealed>java -XX:ArchiveClassesAtExit=jdojo.jsa --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    [0.137s][warning][cds] Skipping java/util/stream/FindOps$FindSink$OfRef$$Lambda$6:
    Unsafe anonymous class

    ...

    ```


    In the source code, I have compiled all classes with the `--enable-preview` option.
    If you have not re-created the `dist\jdojo.cds.jar` file by recompiling the source
    code without the `--enable-preview` option, you will get the following error message:


    ```

    Error: Unable to load main class com.jdojo.cds.HelloCDS in module jdojo.cds

    java.lang.UnsupportedClassVersionError: Preview features are not enabled for com/jdojo/cds/HelloCDS
    (class file version 57.65535). Try running with ''--enable-preview''

    ...

    ```


    To fix this error, you need to run the `HelloCDS` class with the `--enable-preview`
    option, like so:


    ```

    C:\Java13Revealed>java --enable-preview -XX:ArchiveClassesAtExit=jdojo.jsa --module-path
    dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    ```


    The dynamic CDS archive (top-layer archive) created by this command is created
    on top of the default CDS archive (base-layer archive), which is packaged with
    the JDK. The top-layer archive depends on the base-layer archive. If the top-layer
    archive cannot be used, it is disabled and only the base-layer archive is used.
    If the base-layer archive cannot be used, the top-layer archive is disabled.


    The top-layer archive (or dynamic CDS archive) contains all loaded application
    classes and library classes that are not present in the default CDS archive (base-layer
    archive).


    ### Tip


    Classes that exist in a JAR file on the class path or module path but are not
    loaded during execution are not dynamically archived. Java heap objects created
    during an application execution are also not dynamically archived.


    Let us run the `HelloCDS` class with the dynamic archive. I use the `-Xlog:class+load=info`
    option, so you can see in the output that the `HelloCDS` class is loaded from
    the dynamic archive. Use the `--enable-preview` option with the following command
    if you are using the `dist\jdojo.cds.jar` file supplied with the source code for
    this book:


    ```

    C:\Java13Revealed>java -XX:SharedArchiveFile=jdojo.jsa --module-path dist\jdojo.cds.jar
    -Xlog:class+load=info --module jdojo.cds/com.jdojo.cds.HelloCDS

    [0.011s][info][class,load] opened: C:\java13\lib\modules

    [0.023s][info][class,load] java.lang.Object source: shared objects file

    [0.023s][info][class,load] java.io.Serializable source: shared objects file

    [0.023s][info][class,load] java.lang.String source: shared objects file

    ...

    [0.145s][info][class,load] com.jdojo.cds.HelloCDS source: shared objects file
    (top)

    ...

    Hello, CDS and AppCDS

    ...

    ```


    Notice the use of `"(top)"` in the location `"shared objects file (top)"` for
    the `HelloCDS` class in the output. It indicates that the `HelloCDS` class is
    loaded from the top-layer shared archive, which is the dynamic CDS archive. System
    classes do not contain the word `"top"` in their location, meaning that they were
    loaded from the base layer, the default CDS archive.


    Stay tuned for more improvements to the dynamic CDS archives in the future JDK
    releases.


    ## Summary


    Class data sharing (CDS), introduced in JDK5, is a JVM featured that allows sharing
    of classes across JVMs, thus reducing the startup time and runtime footprints.
    CDS allows sharing of Java core classes loaded by the bootstrap class loader.


    Application class data sharing (AppCDS) in JDK10 extends the CDS feature to allow
    sharing application classes on the class path across JVMs. From JDK10, all types
    of class loaders (bootstrap, platform, application, and custom) can load classes
    from AppCDS. AppCDS was available in Oracle JDK 8 and 9, which needed commercial
    licenses. In JDK 10, AppCDS is available in the OpenJDK. In JDK10, you could create
    a shared archive for AppCDS only for classes on the class path. JDK11 and later
    allows including classes from module path as well as class path.


    When you use shared archive for AppCDS, the class path used to create the shared
    archive must be the same or a prefix of the class path that is used to launch
    the application with AppCDS enabled. Otherwise, a class path mismatch error occurs,
    and the application fails to start.


    JDK12 added support for default CDS archive for native builds on 64-bit platforms.
    The JDK image contains a default CDS archive. It is named `classes.jsa`. It is
    stored in `JAVA_HOME/lib/server` directory on UNIX-like OS and in the `JAVA_HOME/bin/server`
    directory on Windows. The `JAVA_HOME/lib/classlist` file contains the list of
    system classes in the default CDS archive. To take advantage of the default CDS
    in JDK12 and later, you do not need to take any action.


    JDK13 has significantly simplified the way you generate a shared archive to use
    AppCDS. First run your application with the `-XX:ArchiveClassesAtExit=<file-name>`,
    where `<file-name>` is the name of the shared archive file. A shared archive be
    generated when the application exits. If the application exits abruptly, no shared
    archive will be generated. Second, run your application with the `-XX:SharedArchiveFile=<file-name>`
    option to use the shared archive with AppCDS.


    The dynamic CDS archive (top-layer archive) is created on top of the default CDS
    archive (base-layer archive), which is packaged with the JDK. The top-layer archive
    depends on the base-layer archive. If the top-layer archive cannot be used, it
    is disabled and only the base-layer archive is used. If the base-layer archive
    cannot be used, the top-layer archive is disabled.


    The top-layer archive contains all loaded application classes and library classes
    that are not present in the default CDS archive. Classes that exist in a JAR file
    on the class path or module path but are not loaded during execution are not dynamically
    archived. Java heap objects created during an application execution are also not
    dynamically archived.'
