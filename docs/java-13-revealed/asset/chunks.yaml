    让我们回顾一下清单 3-10 中之前的服务器推送示例。发起请求的 URI 是 [`www.angular.io`](http://www.angular.io)，而推送承诺请求的
    URI 类似于 `https://angular.io/<path>`。这两个请求的端口（http 与 https）和主机（[`www.angular.io`](https://www.angular.io)
    与 `angular.io`）都不匹配。如果你使用由 `HttpResponse.PushPromiseHandler<T>` 接口的静态 `of()` 方法创建的推送承诺处理器，推送承诺将被拒绝。在下一个示例中，你将使用
    [`https://angular.io`](https://angular.io) 作为发起请求的 URI，以避免推送承诺被自动拒绝的问题。


    清单 3-11 包含了完整的代码，演示了如何使用由 `HttpResponse.PushPromiseHandler<T>` 接口的 `static of()`
    方法创建的推送承诺处理器。代码中有大量注释来解释每一步。请注意，在这个示例中，`main()` 方法的末尾没有调用 `Thread.sleep()`！


    ```

    // ImprovedServerPush.java

    package com.jdojo.http.client;

    import java.net.URI;

    import java.net.http.HttpClient;

    import java.net.http.HttpRequest;

    import java.net.http.HttpResponse;

    import java.net.http.HttpResponse.BodyHandlers;

    import java.net.http.HttpResponse.PushPromiseHandler;

    import java.util.concurrent.CompletableFuture;

    import java.util.concurrent.ConcurrentHashMap;

    import java.util.concurrent.ConcurrentMap;

    import static java.lang.System.out;

    public class ImprovedServerPush {

    public static void main(String[] args) throws InterruptedException {

    // 创建一个使用默认配置的 HttpClient

    HttpClient client = HttpClient.newHttpClient();

    // 构建一个请求

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("https://angular.io"))

    .build();

    // 创建一个并发映射来累积所有推送承诺

    ConcurrentMap>>

    pushPromisesMap  = new ConcurrentHashMap();

    // 创建一个推送承诺处理器

    PushPromiseHandler pushPromiseHandler

    = PushPromiseHandler.of(pushPromiseRequest -> {

    out.printf("收到推送承诺请求 URI: %s%n"

    + "推送承诺发起请求 URI: %s%n%n",

    pushPromiseRequest.uri(),

    request.uri());

    return BodyHandlers.ofString();

    }, pushPromisesMap);

    // 异步发送请求，允许服务器推送

    HttpResponse response = client.sendAsync(request,

    BodyHandlers.ofString(),

    pushPromiseHandler

    ).join();

    // 打印响应详情

    out.printf("发起请求 URI: %s%n"

    + "响应的请求 URI: %s%n"

    + "响应状态码: %d%n",

    request.uri(),

    response.request().uri(),

    response.statusCode());

    // 此时所有推送承诺都已存入 pushPromisesMap。

    // 但它们的响应可能尚未可用。

    CompletableFuture[] allPushPromises

    = pushPromisesMap.values()

    .toArray(CompletableFuture[]::new);

    // 等待所有推送承诺的响应体可用

    CompletableFuture.allOf(allPushPromises)

    .join();

    // 打印推送承诺的响应详情

    pushPromisesMap.values()

    .stream()

    .map(CompletableFuture::join)

    .forEach(pushResponse -> {

    out.printf("%n 已处理的推送承诺请求 URI: %s%n"

    + "推送响应状态码: %d%n",

    pushResponse.request().uri(),

    pushResponse.statusCode());

    });

    }

    }

