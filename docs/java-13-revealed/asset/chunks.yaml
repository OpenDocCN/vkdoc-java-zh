- fmt: '# Java Release Models


    Up to Java 9, which was released in September 2017, Java used a feature-driven
    release model with a new feature release every 2 years. In this model, every feature
    release contained one or more major features. Several times, a new feature release,
    for example, Java 8 and Java 9, was delayed by several months – sometimes over
    a year – because the development of the major features was not complete. This
    release model had a major drawback that small features had to wait for a long
    time to be available to developers.


    Java has switched to a new time-based release model in which it will have:


    * A feature release every 6 months

    * An update release every 3 months

    * A long-term support (LTS) release every 3 years


    In the new time-based release model, you will get a new feature release every
    6 months, starting from March 2018, for example, Java 10 in March 2018, Java 11
    in September 2018, Java 12 in March 2019, Java 13 in September 2019, and so on.
    A feature release may contain small and/or big additions to the Java language,
    JVM, or APIs. Development of a new feature is a continuous process, which is not
    linked to any future feature release until the feature is completely developed.
    Once a new feature is completely developed, it is merged to the upcoming feature
    release. This way, a new feature will not delay any upcoming release.


    Starting from April 2018, you will get a new update release every 3 months in
    April, July, October, and January. An update release will contain only security
    fixes and bug fixes for newer releases.


    Starting from September 2018, you will get an LTS feature release, which will
    be supported through updates for at least 3 years.


    ## What Is a Version String?


    Each release of Java is identified by a unique string, which is known as the *version
    string*. For example, the version strings `"1.8"`, `"9"`, and `"10"` identify
    three different Java releases. The Java version string is important for several
    reasons. If you are developing a Java application, you want to use a Java version
    based on features supported by Java, support available in your organization, and
    how long the Java version will be supported by your vendor. Until Java 9, Java
    used version strings, which were like `"1.7"`, `"1.8.0_162"`, and so on. Java
    9 introduced a new version string scheme, and Java 10 extended the version string
    scheme introduced in Java 9. The subsequent sections will give you an overview
    of all the version string schemes and how to print them on command line and use
    them in programs.


    ## Old Version String Scheme


    Before JDK 9, the version string used to be of the following form:


    ```

    $n.$feature.$maintenance_$update-$identifier

    ```


    Here:


    * `$n` is always 1.

    * `$feature` is an integer incremented sequentially starting from 1, and it indicates
    a feature release that contains new functionalities.

    * `$maintenance` is an integer to indicate a maintenance release, which contains
    engineering focused bug fixes. It is always zero for a feature release.

    * `$update` is a two-digit integer with a leading zero if needed. It indicates
    a customer focused bug fixes. `$update` is not numbered sequentially.

    * `$identifier` is used to identify a milestone before general availability (GA)
    of a product such as `"ea"` for early access build, `beta` for beta release, build
    number, and so on. Identifier is not part of the version string for GA releases.


    The following are a few examples of the JDK version strings before JDK 9:


    * `"1.8.0"` is a GA feature release.

    * `"1.8.0_162"` is an update release (with an update number 162) for the feature
    release `"1.8.0"`.

    * `"1.8.0_162-b12"` is an update release (with an update number 162) for the feature
    release `"1.8.0"` with a build identifier of `"b12"`.


    Before JDK 9, the JDK versioning scheme was not intuitive to developer and not
    easy for programs to parse. Looking at two JDK versions, you could not tell the
    subtle differences between them. It was hard to answer a simple question: Which
    release contains the most recent all security fixes `"1.7.0_55"` or `"1.7.0_60"`?
    The answer is not the obvious one, which you would have guessed – `"1.7.0_60"`.
    Both releases contain the same security fixes. What is the difference between
    releases named *JDK 8 Update 66*, `1.8.0_66`, and *JDK 8u66*? They represent the
    same release. It was necessary to understand the versioning scheme in detail before
    you could tell the details contained in a version string. For example, after the
    initial release of JDK 1.5.0, the update release numbers in multiple of 20 meant
    different types of updates than the odd update numbers. The text in this section
    has not given you enough information to understand the JDK version string scheme
    completely. Refer to the following web pages for more details on the JDK version
    string schemes before JDK 9:


    * [`www.oracle.com/technetwork/java/javase/versioning-naming-139433.html`](http://www.oracle.com/technetwork/java/javase/versioning-naming-139433.html)

    * [`www.oracle.com/technetwork/java/javase/overview/jdk-version-number-scheme-1918258.html`](http://www.oracle.com/technetwork/java/javase/overview/jdk-version-number-scheme-1918258.html)


    ## New Version String Scheme


    JDK 9 attempted to standardize the JDK versioning scheme, so it could be easily
    understood by humans, be easily parsed by programs, and follow the industry-standard
    versioning scheme.


    JDK 9 added a static nested class named `Runtime.Version`, which represents a
    version string for an implementation of the Java SE Platform. The class can be
    used to represent, parse, validate, and compare version strings.


    A *version string* consists of the following four elements in order. Only the
    first element is mandatory:


    * Version number (`$vnum`)

    * Pre-release information (`$pre`)

    * Build information (`$build`)

    * Additional information (`$opt`)


    The following regular expression defines the format for a version string:


    ```

    $vnum(-$pre)?(\+($build)?(-$opt)?)?

    ```


    A *short version string* consists of a version number optionally followed by pre-release
    information:


    ```

    $vnum(-$pre)?

    ```


    You can have a version string as short as `"9"` and `"10"`, which contains only
    the feature release number, and as big as `"10.0.1.2-ea+40-20180201.07.36am"`,
    which contains all parts of a version string. I have made this big version string
    up to show you all elements of a version string. Typically, a pre-release (with
    `-ea` in the version string) does not have update and patch releases. The subsequent
    sections explain all parts and their sub-parts of the version string in details.'
