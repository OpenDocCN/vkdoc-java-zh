    #### 示例 5


    考虑以下文本块：


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................""";

    ```


    在此例中，结束定界符的位置并不影响从所有行中移除的前导空格数量。所有非空行的前导空格数分别为 14、18、22、18 和 14。这些数值中的最小值为 14，因此将从所有非空行中移除
    14 个前导空格。尾随空格照常移除。得到的字符串如下：


    ```

    ....

    ........Hello, HTML

    ....


    ```


    将最后一个示例与本部分的其他示例进行比较。当把结束定界符放在单独一行时，最后一个非空行以换行符（LF）作为最后一个字符。当把结束定界符与非空内容放在同一行时，最后一行不包含换行符作为字符。在此示例中，内容的最后一行以
    `"</html>.."` 结尾，而在其他示例中，内容的最后一行以 `"</html>LF"` 结尾。


    #### 示例 6


    如何在文本块中表示空字符串？以下文本块表示空字符串：


    ```

    String empty1 = """

    """;

    String empty2 = """

    ............... """;

    String empty3 = """

    ......................""";

    ```


    这些文本块不包含任何非空行。请记住，包含结束定界符的行始终是有效的。虽然会计算要从非空行中移除的空格数量，但由于没有非空行，因此不会使用该计算结果。在第二个和第三个文本块中，单独一行上的尾随空格会被折叠，从而得到空字符串。


    #### 示例 7


    如何使用文本块表示字符串 `"Hello"`？以下所有文本块都表示字符串 `"Hello"`。内容行的缩进不会影响最终字符串。


    ```

    String str1 = """

    Hello""";

    String str2 = """

    Hello""";

    String str2 =

    """

    Hello""";

    ```


    以下文本块并不表示 `"Hello"`。相反，它表示 `"Hello\n"`，因为内容的第一行不仅仅是 `Hello`。它包含一个行终止符，该终止符会被规范化为换行符（`\n`）。


    ```

    String str = """

    Hello

    """;

    ```


    ### 提示


    文本块可以表示任何可以使用 `String` 字面量表示的字符串。使用 `String` 字面量来表示简单字符串，例如空字符串、作为字符串的换行符或单行字符串（如
    "`Hello, world"`）。使用文本块表示这些字符串至少需要两行，并且可读性也不如 `String` 字面量。


    #### 示例 8


    考虑以下文本块，它不包含可见内容，但有一个空行：


    ```

    String fakeEmpty = """

    ......................

    ....""";

    ```


    此文本块的内容包含两行。第一行包含 22 个空格和一个换行符。第二行包含四个空格。这两行都被视为空行，不会用于移除前导空格。第二行包含结束定界符，其空格数为
    4，这也是最小的空格数，因为只有一行需要考虑。该文本块不包含任何非空行，因此最小前导空格数 4 不会应用于任何行。作为移除尾随空格的一部分，第一行中的所有
    22 个空格都会被移除，使其缩减为仅包含一个字符的空行——即规范化的行终止符（换行符）。得到的字符串将是 `"\n"`。如果计算 `fakeEmpty` 变量中的字符数，结果将为
    1。眼见为实。以下代码片段显示文本块生成的字符串是 `"\n"`：


    ```

    // 定义一个包含一个带空格空行的文本块

    String fakeEmpty = """

    """;

    String LF = "\n";

    System.out.println("fakeEmpty.length(): " + fakeEmpty.length());

    System.out.println("LF.length(): " + LF.length());

    System.out.println("fakeEmpty.equals(LF): " + fakeEmpty.equals(LF));

    System.out.println("fakeEmpty == LF: " + (fakeEmpty == LF));

    fakeEmpty.length(): 1

    LF.length(): 1

    fakeEmpty.equals(LF): true

    fakeEmpty == newline: true

    ```


    输出表明，这两个字符串不仅使用 `equals()` 方法相等，而且使用 `==` 运算符也相等。文本块经过所有编译器转换后得到的最终字符串，会像所有 `String`
    字面量一样被驻留。这就是文本块与 `String` 字面量 “\n” 使用 `==` 运算符也相等的原因。

