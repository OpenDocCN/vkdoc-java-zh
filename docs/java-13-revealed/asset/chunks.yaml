    ### Switch 块的单一作用域


    `switch` 块定义了一个作用域，所有 switch 标签都在该作用域内执行。这意味着你不能在多个 `case` 标签中定义同名变量。请看以下代码片段：


    ```

    char c = ''Z'';

    // 此处有更多代码...

    switch(Character.toLowerCase(c)) {

    case ''a'':

    case ''e'':

    case ''i'':

    case ''o'':

    case ''u'':

    char upperChar = Character.toUpperCase(c);

    System.out.println("Vowel: " + upperChar);

    break;

    default:

    char upperChar = Character.toUpperCase(c); // 编译时错误

    System.out.println("Consonant: " + upperChar);

    }

    ```


    这段代码无法编译。`upperChar` 变量的两次声明都位于同一个作用域内，即 `switch` 块的作用域。编译器会报错，指出 `default` 标签内存在重复的
    `upperChar` 变量声明。有一种方法可以解决这个错误。一对花括号（`{}`）可以定义一个新的作用域。你可以将 `case` 标签和 `default`
    标签的代码用花括号括起来来解决这个问题。以下是修改后的代码，它可以正常编译：


    ```

    char c = ''Z'';

    // 此处有更多代码...

    switch(Character.toLowerCase(c)) {

    case ''a'':

    case ''e'':

    case ''i'':

    case ''o'':

    case ''u'': {

    char upperChar = Character.toUpperCase(c);

    System.out.println("Vowel: " + upperChar);

    break;

    }

    default: {

    char upperChar = Character.toUpperCase(c); // 编译通过

    System.out.println("Consonant: " + upperChar);

    }

    }

    ```


    ### Switch 曾是一种语句


    过去你只能将 `switch` 用作语句。为了模拟 `switch` 作为表达式的行为，你需要在 `switch` 语句外部定义一个变量，然后在每个 `switch`
    标签中为其赋值。示例如下：


    ```

    int count = 2;

    // 此处有更多代码...

    // 在此处声明 desc，稍后在每个 switch 标签中为其赋值

    String desc;

    switch (count) {

    case 1:

    desc = "One";

    break;

    case 2:

    desc = "Two";

    break;

    case 3:

    desc = "Three";

    break;

    default:

    desc = "Out-of-range";

    }

    System.out.println(desc);

    ```


    这种方法虽然可行，但代码冗长且是一种变通方案，并非对表达式的直接支持。如果能像下面这样将 `switch` 用作表达式，那就更好了：


    ```

    int count = 2;

    // 此处有更多代码...

    // 在此处声明 desc，并使用 switch 表达式为其赋值

    String desc = switch (count) {

    case 1: yield "One";

    case 2: yield "Two";

    case 3: yield "Three";

    default: yield "Out-of-range";

    };

    ```


    稍后我将解释使用 `yield` 语句的新语法。


    ## 增强的 Switch


    现在你已经了解了传统 `switch` 的缺点，是时候看看 `switch` 令人兴奋的新特性了，这些特性解决了上述缺点。对 `switch` 的更改分为两类：


    *   对传统 `switch` 的增强


    *   新的 `switch` 语法


    新的 `switch` 语法提供了传统 `switch` 语句的功能，并且还有更多。我将首先解释对传统 `switch` 的增强，然后详细介绍新的 `switch`
    语法和语义。


    ### 对传统 Switch 的增强


    Java 一直保持向后兼容。对语言设计者来说，为传统 `switch` 添加破坏性更改是不可行的。预览特性为你提供了使用传统 `switch` 的新方法，同时不会破坏你的旧代码。以下是对传统
    `switch` 的更改：


    *   你可以在一个 `case` 标签中使用多个常量。


    *   你可以将 `switch` 用作表达式。


    以前，每个常量必须使用一个 `case` 标签。新的 `switch` 语法允许你在一个 `case` 标签中使用逗号分隔的常量列表。以下代码片段重写了之前将字母匹配为元音和辅音的例子：


    ```

    char c = ''w'';

    // 此处有更多代码...

    switch(Character.toLowerCase(c)) {

    case ''a'', ''e'', ''i'', ''o'', ''u'': /* 一个 case 标签中包含五个常量 */

    System.out.println("Vowel");

    break;

    default:

    System.out.println("Consonant");

    }

    ```


    请注意这段代码与之前使用传统 `switch` 的代码之间的区别。这次，你将五个 `case` 标签合并成了一个。你仍然需要使用 `break` 语句，因为传统的
    `switch` 语句仍然使用默认的穿透语义。


    预览特性允许你将传统 `switch` 用作表达式。表达式会计算出一个值（或产生一个值）。现在你可以编写如下代码：


    ```

    String str = switch(selector) {

    case label1: ...

    case label2: ...

    }; /* 必须以分号结尾 */

    ```


    注意 `switch` 表达式末尾使用了分号。`switch` 表达式是 `str` 变量声明的一部分，因此整个变量声明必须以分号结尾。可以将之前的变量声明想象成如下形式：


    ```

    String str = ;

    ```


    传统 `switch` 只允许你在 `switch` 标签中使用语句。预览特性引入了一个新的 `yield` 语句。其语法为：


    ```

    yield expression;

    ```


    `yield` 语句会计算其 `expression`，并将控制权转移给外层的 `switch` 表达式。该 `expression` 的值将成为 `switch`
    表达式的值。

