    ## 集合


    Collection API 有两处更改。Java 10 为 `List`、`Set` 和 `Map` 接口添加了一个静态的 `copyOf()` 工厂方法，允许你从另一个集合创建不可修改的
    `List`、`Set` 和 `Map`。Java 11 为 `Collection<E>` 接口添加了一个名为 `toArray(IntFunction<T[]>
    generator)` 的新默认方法，可用于传入*数组构造函数引用*，将集合的元素复制到特定类型的数组中。我将在接下来的章节中解释这些新增内容。


    ### 创建集合的不可修改副本


    Java 10 为 `List`、`Set` 和 `Map` 接口添加了一个静态的 `copyOf()` 工厂方法。该方法返回一个不可修改的 `List`、`Set`
    或 `Map`。其声明如下：


    *   `<E> List<E> copyOf`​`(Collection<? extends E> coll)`


    *   `<E> Set<E> copyOf`​`(Collection<? extends E> coll)`


    *   `<K,`​ `V> Map<K,`​`V> copyOf`​`(Map<? extends K,`​`? extends V> map)`


    返回 `List` 的 `copyOf()` 方法位于 `List` 接口中，返回 `Set` 的位于 `Set` 接口中，返回 `Map` 的位于 `Map`
    接口中。源集合不能为 `null`，并且不能包含 `null` 元素。对于 `Map`，`Map` 不应包含任何 `null` 键或值。返回的 `List`
    中的元素顺序与指定集合的迭代顺序一致。即使源集合被修改，`copyOf()` 方法返回的集合也不会改变。


    清单 8-7 包含一个完整的程序，演示了 `List` 接口中复制工厂方法的使用。对 `Set` 或 `Map` 使用此方法的方式非常相似。


    ```

    // UnmodifiableListTest.java

    package com.jdojo.misc;

    import java.util.List;

    import java.util.ArrayList;

    import java.util.Comparator;

    public class UnmodifiableListTest {

    public static void main(String[] args) {

    // 创建一个可修改的列表

    List names = new ArrayList();

    names.add("John");

    names.add("Buddy");

    names.add("Vishwa");

    names.add("Amy");

    // 将可修改的列表复制到一个不可修改的列表中

    List namesCopy = List.copyOf(names);

    // 打印两个列表

    System.out.println("\n 复制原始列表后：");

    System.out.println("names: " + names);

    System.out.println("namesCopy: " + namesCopy);

    // 让我们向可修改的列表中添加一个名字

    names.add("Mamta");

    // 打印两个列表

    System.out.println("\n 向原始列表添加一个名字后：");

    System.out.println("names: " + names);

    System.out.println("namesCopy: " + namesCopy);

    // 让我们尝试对不可修改的列表进行排序

    try {

    namesCopy.sort(Comparator.naturalOrder());

    System.out.println("\n 排序后的 namesCopy: " + namesCopy);

    } catch (Exception e) {

    System.out.println("\n 无法对不可修改的列表进行排序");

    }

    }

    }

