- fmt: "# 7. Class Data Sharing\n\nIn this chapter, you will learn\n\n* What class\
    \ data sharing (`CDS`) is\n* What application class data sharing (`AppCDS`) is\n\
    * How to use `CDS` and `AppCDS` in your applications\n* What the default `CDS`\
    \ archive is in JDK12 and how Java applications use it automatically\n* What the\
    \ dynamic `CDS` archives are in JDK13\n* How to generate and use dynamic `CDS`\
    \ archives for your applications\n\nWhen a JVM starts, it typically loads thousands\
    \ of classes from Java core library. Loading so many classes at startup takes\
    \ time. If you start multiple JVMs, each JVM performs the same task – loads the\
    \ same copy of thousands of system classes at the startup. This has two drawbacks:\n\
    \n* JVMs start slower.\n* Each JVM loads a copy of the same system classes into\
    \ memory, thus increasing the runtime footprint.\n\nClass data sharing (`CDS`)\
    \ – introduced in JDK5 – is a HotSpot JVM feature that allows pre-processing of\
    \ system classes and sharing them across JVMs, thus reducing the startup time\
    \ and runtime footprint. `CDS` allowed sharing of Java core classes loaded by\
    \ the bootstrap class loader.\n\nApplication class data sharing (`AppCDS`) – introduced\
    \ in JDK10 – extends the `CDS` feature to allow sharing application classes on\
    \ the class path across JVMs. From JDK10, all types of class loaders (bootstrap,\
    \ platform, application, and custom) can load classes using `AppCDS`. JDK13 has\
    \ introduced dynamic `CDS` archives that makes using `AppCDS` a lot simpler.\n\
    \nI will explain `CDS` and `AppCDS` in detail in the subsequent sections.\n\n\
    ### Tip\n\n`AppCDS` was available in Oracle JDK 8 and 9, which needed commercial\
    \ licenses. In JDK 10, `AppCDS` is available in the OpenJDK.\n\n## Class Data\
    \ Sharing\n\nClass data sharing (`CDS`) was introduced in JDK5. The JRE installer\
    \ loads the commonly used core Java classes into memory and dumps the loaded classes\
    \ into a file called *shared archive*. A shared archive contains classes in a\
    \ pre-processed format to be memory mapped later. The shared archive is a `classes.jsa`\
    \ file in your `JAVA_HOME` directory. On UNIX-like platforms, the shared archive\
    \ is stored in `JAVA_HOME/lib/[arch]/server/classes.jsa`. On Windows platform,\
    \ the shared archive is stored in `JAVA_HOME\\bin\\server\\classes.jsa`. If you\
    \ do not find the shared archive on your machine, you can generate it at any time.\
    \ You sometimes regenerate it after making changes to system classes. I will show\
    \ you how to generate the shared archive shortly.\n\nWhen a JVM is launched, it\
    \ looks for shared archive and memory maps the shared archive. When the JVM needs\
    \ to load a class, it attempts to load the class from the shared archive in memory\
    \ first instead from the disk, thus reducing the class loading time. If another\
    \ JVM is launched, the JVM first checks if the shared archive data is already\
    \ loaded in memory by another JVM and reuses the same classes from the shared\
    \ archive in memory, thus reducing the startup time further for the second JVM\
    \ onward and also significantly reducing the footprint by sharing the same class\
    \ data in same shared archive in memory.\n\n`CDS` is supported with the G1, serial,\
    \ parallel, and parallelOldGC garbage collectors. The shared Java heap object\
    \ feature (part of `CDS`) supports only the G1 garbage collector on 64-bit non-Windows\
    \ platforms.\n\n### Creating a Shared Archive\n\nYou can create a shared archive\
    \ using the `java` command with a `-XShare:dump` option as follows:\n\n```\nC:\\\
    Java13Revealed>java -Xshare:dump\n```\n\nThe command creates a shared archive\
    \ (a `classes.jsa` file) in a sub-directory in the `JAVA_HOME` directory as described\
    \ in the previous section. The command prints informational messages as it creates\
    \ the shared archive.\n\n### Tip\n\nIf you are using JDK12 or later, a default\
    \ `CDS` archive is available to you as part of the JDK and you do not need to\
    \ run this command. Running this command will regenerate the default `CDS` archive.\n\
    \n### Using a Shared Archive\n\nIn this section, I will show you how to use a\
    \ shared archive when you run a Java application. All example programs in this\
    \ chapter are in the `jdojo.cds` module, which is defined in Listing 7-1.\n\n\
    ```\n// module-info.java\nmodule jdojo.cds {\n    exports com.jdojo.cds;\n}\n\
    ```\n\nLet us create a simple Java class that you will run to test `CDS` features.\
    \ Listing 7-2 contains the code for a simple class named `HelloCDS`. It prints\
    \ a message to the standard output.\n\n```\n// HelloCDS.java\npackage com.jdojo.cds;\n\
    public class HelloCDS {\n    public static void main(String[] args) {\n      \
    \  System.out.println(\"Hello, CDS and AppCDS\");\n    }\n}\n```\n\nThe source\
    \ code contains these classes compiled in JDK13 with the `--enable-preview` option\
    \ because the source code uses preview features such as `switch` expressions and\
    \ text blocks. If you want to experiment with other JDKs, you will need to compile\
    \ and package the code for this chapter yourself. The compiled module code is\
    \ saved in the `build\\modules\\jdojo.cds` directory. The module JAR is saved\
    \ in `dist\\jdojo.cds.jar` file. I assume that you are running these commands\
    \ from the directory where you have downloaded the source code and the `JAVA_HOME\\\
    bin` directory is added to the `PATH` environment variable.\n\nUse the following\
    \ command to compile the source code:\n\n```\nC:\\Java13revealed>javac -d build\\\
    modules\\jdojo.cds src\\jdojo.cds\\classes\\module-info.java src\\jdojo.cds\\\
    classes\\com\\jdojo\\cds\\HelloCDS.java\n```\n\nUse the following command to package\
    \ the source code into `jdojo.cds.jar` file. Notice the last character in the\
    \ command, which is a dot (`.`).\n\n```\nC:\\Java13revealed>jar --verbose --create\
    \ --file dist\\jdojo.cds.jar -C build\\modules\\jdojo.cds .\n```\n\nUse one of\
    \ the three options to use the shared archive when you run your application:\n\
    \n* `-Xshare:on`\n* `-Xshare:off`\n* `-Xshare:auto`\n\nThe `-Xshare:on` option\
    \ requires using shared class data. If it is not possible to use the shared class\
    \ data, this option fails the launch of the application. This option exists for\
    \ testing purpose only. It may sometimes fail if the shared archive cannot be\
    \ shared. The failure may occur if the memory mapping is not possible because\
    \ the required address space is not available or the class path does not map.\
    \ Do not use this option in production.\n\nThe `-Xshare:off` option does not attempt\
    \ to use the shared archive.\n\nThe `-Xshare:auto` option uses the shared archive,\
    \ if possible. This option does not fail if it cannot use the shared archive.\
    \ Prefer using the `-Xshare:auto` option."
  raw: '# 7. Class Data Sharing


    In this chapter, you will learn


    *   What class data sharing (CDS) is


    *   What application class data sharing (AppCDS) is


    *   How to use CDS and AppCDS in your applications


    *   What the default CDS archive is in JDK12 and how Java applications use it
    automatically


    *   What the dynamic CDS archives are in JDK13


    *   How to generate and use dynamic CDS archives for your applications


    When a JVM starts, it typically loads thousands of classes from Java core library.
    Loading so many classes at startup takes time. If you start multiple JVMs, each
    JVM performs the same task – loads the same copy of thousands of system classes
    at the startup. This has two drawbacks:


    *   JVMs start slower.


    *   Each JVM loads a copy of the same system classes into memory, thus increasing
    the runtime footprint.


    Class data sharing (CDS) – introduced in JDK5 – is a HotSpot JVM feature that
    allows pre-processing of system classes and sharing them across JVMs, thus reducing
    the startup time and runtime footprint. CDS allowed sharing of Java core classes
    loaded by the bootstrap class loader.


    Application class data sharing (AppCDS) – introduced in JDK10 – extends the CDS
    feature to allow sharing application classes on the class path across JVMs. From
    JDK10, all types of class loaders (bootstrap, platform, application, and custom)
    can load classes using AppCDS. JDK13 has introduced dynamic CDS archives that
    makes using AppCDS a lot simpler.


    I will explain CDS and AppCDS in detail in the subsequent sections.


    ### Tip


    AppCDS was available in Oracle JDK 8 and 9, which needed commercial licenses.
    In JDK 10, AppCDS is available in the OpenJDK.


    ## Class Data Sharing


    Class data sharing (CDS) was introduced in JDK5\. The JRE installer loads the
    commonly used core Java classes into memory and dumps the loaded classes into
    a file called *shared archive*. A shared archive contains classes in a pre-processed
    format to be memory mapped later. The shared archive is a `classes.jsa` file in
    your JAVA_HOME directory. On UNIX-like platforms, the shared archive is stored
    in `JAVA_HOME/lib/[arch]/server/classes.jsa`. On Windows platform, the shared
    archive is stored in `JAVA_HOME\bin\server\classes.jsa`. If you do not find the
    shared archive on your machine, you can generate it at any time. You sometimes
    regenerate it after making changes to system classes. I will show you how to generate
    the shared archive shortly.


    When a JVM is launched, it looks for shared archive and memory maps the shared
    archive. When the JVM needs to load a class, it attempts to load the class from
    the shared archive in memory first instead from the disk, thus reducing the class
    loading time. If another JVM is launched, the JVM first checks if the shared archive
    data is already loaded in memory by another JVM and reuses the same classes from
    the shared archive in memory, thus reducing the startup time further for the second
    JVM onward and also significantly reducing the footprint by sharing the same class
    data in same shared archive in memory.


    CDS is supported with the G1, serial, parallel, and parallelOldGC garbage collectors.
    The shared Java heap object feature (part of CDS) supports only the G1 garbage
    collector on 64-bit non-Windows platforms.


    ### Creating a Shared Archive


    You can create a shared archive using the `java` command with a `-XShare:dump`
    option as follows:


    ```

    C:\Java13Revealed>java -Xshare:dump

    ```


    The command creates a shared archive (a `classes.jsa` file) in a sub-directory
    in the `JAVA_HOME` directory as described in the previous section. The command
    prints informational messages as it creates the shared archive.


    ### Tip


    If you are using JDK12 or later, a default CDS archive is available to you as
    part of the JDK and you do not need to run this command. Running this command
    will regenerate the default CDS archive.


    ### Using a Shared Archive


    In this section, I will show you how to use a shared archive when you run a Java
    application. All example programs in this chapter are in the `jdojo.cds` module,
    which is defined in Listing [7-1](#419466_2_En_7_Chapter.xhtml#PC2).


    ```

    // module-info.java

    module jdojo.cds {

    exports com.jdojo.cds;

    }

    Listing 7-1

    A Module Named jdojo.cds

    ```


    Let us create a simple Java class that you will run to test CDS features. Listing
    [7-2](#419466_2_En_7_Chapter.xhtml#PC3) contains the code for a simple class named
    `HelloCDS`. It prints a message to the standard output.


    ```

    // HelloCDS.java

    package com.jdojo.cds;

    public class HelloCDS {

    public static void main(String[] args) {

    System.out.println("Hello, CDS and AppCDS");

    }

    }

    Listing 7-2

    A HelloCDS Class

    ```


    The source code contains these classes compiled in JDK13 with the --enable-preview
    option because the source code uses preview features such as `switch` expressions
    and text blocks. If you want to experiment with other JDKs, you will need to compile
    and package the code for this chapter yourself. The compiled module code is saved
    in the `build\modules\jdojo.cds` directory. The module JAR is saved in `dist\jdojo.cds.jar`
    file. I assume that you are running these commands from the directory where you
    have downloaded the source code and the `JAVA_HOME\bin` directory is added to
    the PATH environment variable.


    Use the following command to compile the source code:


    ```

    C:\Java13revealed>javac -d build\modules\jdojo.cds src\jdojo.cds\classes\module-info.java
    src\jdojo.cds\classes\com\jdojo\cds\HelloCDS.java

    ```


    Use the following command to package the source code into `jdojo.cds.jar` file.
    Notice the last character in the command, which is a dot (`.`).


    ```

    C:\Java13revealed>jar --verbose --create --file dist\jdojo.cds.jar -C build\modules\jdojo.cds
    .

    ```


    Use one of the three options to use the shared archive when you run your application:


    *   `-Xshare:on`


    *   `-Xshare:off`


    *   `-Xshare:auto`


    The `-Xshare:on` option requires using shared class data. If it is not possible
    to use the shared class data, this option fails the launch of the application.
    This option exists for testing purpose only. It may sometimes fail if the shared
    archive cannot be shared. The failure may occur if the memory mapping is not possible
    because the required address space is not available or the class path does not
    map. Do not use this option in production.


    The `-Xshare:off` option does not attempt to use the shared archive.


    The `-Xshare:auto` option uses the shared archive, if possible. This option does
    not fail if it cannot use the shared archive. Prefer using the `-Xshare:auto`
    option.'
  trans: "\n# 7. 类数据共享\n\n在本章中，你将学习\n\n*   什么是类数据共享（CDS）\n*   什么是应用程序类数据共享（AppCDS）\n\
    *   如何在你的应用程序中使用 CDS 和 AppCDS\n*   JDK12 中的默认 CDS 归档是什么，以及 Java 应用程序如何自动使用它\n\
    *   JDK13 中的动态 CDS 归档是什么\n*   如何为你的应用程序生成和使用动态 CDS 归档\n\n当 JVM 启动时，它通常会从 Java\
    \ 核心库加载数千个类。在启动时加载如此多的类需要时间。如果你启动多个 JVM，每个 JVM 都会执行相同的任务——在启动时加载相同的数千个系统类副本。这有两个缺点：\n\
    \n*   JVM 启动速度变慢。\n*   每个 JVM 都会将相同的系统类副本加载到内存中，从而增加了运行时内存占用。\n\n类数据共享（CDS）——在\
    \ JDK5 中引入——是一项 HotSpot JVM 特性，它允许预处理系统类并在 JVM 之间共享它们，从而减少启动时间和运行时内存占用。CDS 允许共享由引导类加载器加载的\
    \ Java 核心类。\n\n应用程序类数据共享（AppCDS）——在 JDK10 中引入——扩展了 CDS 特性，允许在 JVM 之间共享类路径上的应用程序类。从\
    \ JDK10 开始，所有类型的类加载器（引导类加载器、平台类加载器、应用程序类加载器和自定义类加载器）都可以使用 AppCDS 加载类。JDK13 引入了动态\
    \ CDS 归档，这使得使用 AppCDS 变得更加简单。\n\n我将在后续章节中详细解释 CDS 和 AppCDS。\n\n### 提示\n\nAppCDS\
    \ 在 Oracle JDK 8 和 9 中可用，但需要商业许可。在 JDK 10 中，AppCDS 在 OpenJDK 中可用。\n\n## 类数据共享\n\
    \n类数据共享（CDS）在 JDK5 中引入。JRE 安装程序会加载常用的核心 Java 类到内存中，并将加载的类转储到一个名为*共享归档*的文件中。共享归档包含以预处理格式存储的类，以便后续进行内存映射。共享归档是位于\
    \ `JAVA_HOME` 目录下的 `classes.jsa` 文件。在类 UNIX 平台上，共享归档存储在 `JAVA_HOME/lib/[arch]/server/classes.jsa`。在\
    \ Windows 平台上，共享归档存储在 `JAVA_HOME\\bin\\server\\classes.jsa`。如果你在机器上找不到共享归档，可以随时生成它。有时在对系统类进行更改后，你需要重新生成它。稍后我将向你展示如何生成共享归档。\n\
    \n当 JVM 启动时，它会查找共享归档并对共享归档进行内存映射。当 JVM 需要加载一个类时，它会首先尝试从内存中的共享归档加载该类，而不是从磁盘加载，从而减少了类加载时间。如果另一个\
    \ JVM 启动，该 JVM 会首先检查共享归档数据是否已被另一个 JVM 加载到内存中，并重用内存中共享归档中的相同类，从而进一步减少第二个及后续 JVM\
    \ 的启动时间，并通过在内存中共享同一共享归档中的相同类数据来显著减少内存占用。\n\nCDS 支持 G1、串行、并行和 ParallelOldGC 垃圾回收器。共享\
    \ Java 堆对象特性（CDS 的一部分）仅在 64 位非 Windows 平台上支持 G1 垃圾回收器。\n\n### 创建共享归档\n\n你可以使用带有\
    \ `-XShare:dump` 选项的 `java` 命令来创建共享归档，如下所示：\n\n```\nC:\\Java13Revealed>java -Xshare:dump\n\
    ```\n\n该命令会在 `JAVA_HOME` 目录的子目录中创建一个共享归档（`classes.jsa` 文件），如上一节所述。该命令在创建共享归档时会打印信息性消息。\n\
    \n### 提示\n\n如果你使用的是 JDK12 或更高版本，则默认 CDS 归档已作为 JDK 的一部分提供，你无需运行此命令。运行此命令将重新生成默认\
    \ CDS 归档。\n\n### 使用共享归档\n\n在本节中，我将向你展示在运行 Java 应用程序时如何使用共享归档。本章中的所有示例程序都在 `jdojo.cds`\
    \ 模块中，该模块在清单 7-1 中定义。\n\n```\n// module-info.java\nmodule jdojo.cds {\n    exports\
    \ com.jdojo.cds;\n}\n清单 7-1\n一个名为 jdojo.cds 的模块\n```\n\n让我们创建一个简单的 Java 类，你将运行它来测试\
    \ CDS 特性。清单 7-2 包含一个名为 `HelloCDS` 的简单类的代码。它向标准输出打印一条消息。\n\n```\n// HelloCDS.java\n\
    package com.jdojo.cds;\npublic class HelloCDS {\n    public static void main(String[]\
    \ args) {\n        System.out.println(\"Hello, CDS and AppCDS\");\n    }\n}\n\
    清单 7-2\n一个 HelloCDS 类\n```\n\n源代码中包含这些类，这些类是在 JDK13 中使用 `--enable-preview` 选项编译的，因为源代码使用了预览特性，例如\
    \ `switch` 表达式和文本块。如果你想在其他 JDK 上进行实验，则需要自行编译和打包本章的代码。编译后的模块代码保存在 `build\\modules\\\
    jdojo.cds` 目录中。模块 JAR 保存在 `dist\\jdojo.cds.jar` 文件中。我假设你正在下载源代码的目录中运行这些命令，并且 `JAVA_HOME\\\
    bin` 目录已添加到 PATH 环境变量中。\n\n使用以下命令编译源代码：\n\n```\nC:\\Java13revealed>javac -d build\\\
    modules\\jdojo.cds src\\jdojo.cds\\classes\\module-info.java src\\jdojo.cds\\\
    classes\\com\\jdojo\\cds\\HelloCDS.java\n```\n\n使用以下命令将源代码打包到 `jdojo.cds.jar`\
    \ 文件中。请注意命令中的最后一个字符，它是一个点（`.`）。\n\n```\nC:\\Java13revealed>jar --verbose --create\
    \ --file dist\\jdojo.cds.jar -C build\\modules\\jdojo.cds .\n```\n\n在运行应用程序时，可以使用以下三个选项之一来使用共享归档：\n\
    \n*   `-Xshare:on`\n*   `-Xshare:off`\n*   `-Xshare:auto`\n\n`-Xshare:on` 选项要求使用共享类数据。如果无法使用共享类数据，此选项会导致应用程序启动失败。此选项仅用于测试目的。如果共享归档无法共享，有时可能会失败。如果由于所需地址空间不可用或类路径无法映射而导致内存映射不可能，则可能发生失败。请勿在生产环境中使用此选项。\n\
    \n`-Xshare:off` 选项不会尝试使用共享归档。\n\n`-Xshare:auto` 选项会尽可能使用共享归档。如果无法使用共享归档，此选项不会导致失败。建议使用\
    \ `-Xshare:auto` 选项。\n"
- fmt: '### Tip


    Starting from JDK11, the `-Xshare:auto` option is enabled by default for the server
    VM.


    The following command attempts to run the `HelloCDS` class using JDK10 – once
    with `-Xshare:off` and once with `-Xshare:on`:


    ```

    C:\Java13Revealed>java -Xshare:off --module-path dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    C:\Java13Revealed>java -Xshare:on --module-path dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    An error has occurred while processing the shared archive file.

    Specified shared archive not found.

    Error occurred during initialization of VM

    Unable to use shared archive.

    ```


    When you used `-Xshare:on`, you received an error indicating that it could not
    find the shared archive. In OpenJDK10 and OpenJDK11, you will need to generate
    the shared archive using the `-Xshare:dump` option. From OpenJDK12, a shared archive
    is generated when the JDK image is built. If you had already generated the shared
    archive in the previous section, this command would have run successfully. Here
    is how you can generate the shared archive and rerun the previous command using
    JDK10:


    ```

    C:\Java13Revealed>java -Xshare:dump

    ...

    C:\Java13Revealed>java -Xshare:on --module-path dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    ```


    You did not see any difference in the output when the shared archive was disabled
    and enabled. However, the second time – when the shared archive was enabled –
    the JVM started faster. How do you prove this?


    On UNIX-like OS, the `time` command measures the time to run a process. On Windows,
    you need to use the `Measure-Command` PowerShell command. All commands use JDK10.
    The following are results on Linux:


    ```

    [/home/ksharan/Java13Revealed] $ time java -Xshare:off --module-path dist/jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    real 0m0.215s

    user 0m0.124s

    sys 0m0.034s

    [/home/ksharan/Java13Revealed] $ time java -Xshare:on --module-path dist/jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    real 0m0.108s

    user 0m0.098s

    sys 0m0.023s

    ```


    Here are the results on Windows using PowerShell, not Windows Command Prompt:


    ```

    PS C:\Java13revealed> Measure-Command {java -Xshare:off --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS | Write-Host}

    Hello, CDS and AppCDS

    ...

    TotalMilliseconds : 281.1476

    PS C:\Java13revealed> Measure-Command {java -Xshare:on --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS | Write-Host }

    Hello, CDS and AppCDS

    ...

    TotalMilliseconds : 180.3489

    ```


    Notice the time taken to run the program the second time, which was less compared
    to the first time. On Linux, the application ran approx. 49% faster, and, on Windows,
    it ran approx. 36% faster. You may get slightly different results.


    ### Knowing the Loaded Class Location


    When CDS is enabled, core system classes are loaded from the shared archive. You
    can print the location of the loaded class using the `-Xlog:class+load=info` option.
    The following commands use this option with JDK10 – once when CDS is enabled and
    once when CDS is disabled:


    ```

    C:\Java13Revealed>java -Xshare:off -Xlog:class+load=info --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    [0.011s][info][class,load] opened: C:\java10\lib\modules

    [0.021s][info][class,load] java.lang.Object source: jrt:/java.base

    [0.022s][info][class,load] java.io.Serializable source: jrt:/java.base

    [0.022s][info][class,load] java.lang.String source: jrt:/java.base

    ...

    [0.202s][info][class,load] com.jdojo.cds.HelloCDS source: file:/C:/Java13Revealed/dist/jdojo.cds.jar

    ...

    Hello, CDS and AppCDS

    ...

    C:\Java13Revealed>java -Xshare:on -Xlog:class+load=info --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    [0.012s][info][class,load] opened: C:\java10\lib\modules

    [0.024s][info][class,load] java.lang.Object source: shared objects file

    [0.024s][info][class,load] java.io.Serializable source: shared objects file

    [0.024s][info][class,load] java.lang.String source: shared objects file

    ...

    [0.150s][info][class,load] com.jdojo.cds.HelloCDS source: file:/C:/Java13Revealed/dist/jdojo.cds.jar

    ...

    Hello, CDS and AppCDS

    ...

    ```


    When CDS is disabled, the sources for system classes such as `Object` and `String`
    classes are listed as `jrt:/java.base`. This means that these classes are loaded
    from the disk from `C:\java10\lib\modules` file, which is the JRE runtime image.
    When CDS is enabled, the sources for the same classes are listed as “shared objects
    file”, which means they are loaded from the shared archive. Note that the application
    class `HelloCDS` was loaded from the disk in both cases because CDS allows for
    sharing only system class data. To share application classes, you need to use
    AppCDS, which is explained in the next section.


    ## Application Class Data Sharing (AppCDS)


    Until JDK10, sharing of class data was possible only for core Java classes, which
    were loaded by the bootstrap class loader. JDK10 extends the CDS feature to share
    application classes. In JDK10, platform class loader, application class loader,
    and custom class loaders can also load classes from the shared archive.


    In JDK10, you need to use the `-XX:+UseAppCDS` option with the `java` command
    to use AppCDS. In JDK11 and later, this option is obsolete.


    To share application class data, you need to create your own shared archive that
    will include the application classes as well as core Java classes. When you run
    your application, you will need to specify your shared archive file path using
    the `-XX:SharedArchiveFile` option. Your shared archive will contain all classes
    in the `jdojo.cds.jar` file, which is supplied in the `dist` directory for this
    source code of this book. The supplied source is compiled using JDK13. If you
    are using earlier JDK, you will need to recompile and re-create the `jdojo.cds.jar`
    file.


    ### Tip


    Java 10 supports AppCDS only for classes loaded from the class path, not from
    the module path. The support for module path is available in JDK11 and later.


    Using AppCDS involves three steps:


    *   Creating a class list for the classes to be included in the shared archive

    *   Generating the shared archive

    *   Using the shared archive when running the application


    The following sections walk you through the steps of using AppCDS. I will show
    the same steps using JDK10 and JDK11. You can pick any one JDK you want and follow
    the instructions for that JDK.'
