- fmt: '# Source-File Mode Selection


    Table [4-1](#419466_2_En_4_Chapter.xhtml#Tab1) lists the syntax for the `java`
    command to run a program in all four modes.


    **Table 4-1** Syntax for Running the `java` Command in Four Modes


    | Mode | Syntax |

    | --- | --- |

    | Class-file mode | `java [options] mainclass [args...]` |

    | JAR-file mode | `java [options] -jar jarfile [args...]` |

    | Module mode | `java [options] --module module[/mainclass] [args...]` |

    | Source-file mode | `java [options] source-file [args...]` |


    Compare the syntax for the class-file mode and source-file mode. They are very
    similar. Consider the following command:


    ```

    C:\Java13Revealed\src\sourcecode.apps>java Unexpected.java

    ```


    Will this command run in the class-file mode or source-file mode? In class-file
    mode, it will try to run a class whose fully qualified name is `Unexpected.java`.
    That is, the class is in `java.class` file under the `Unexpected` directory. In
    the source-file mode, it will try to run the class declared in the `Unexpected.java`
    source file. In this case, the source-file mode wins and the `Unexpected.java`
    source file is run. I have included the `Unexpected.java` and `Unexpected\java.class`
    file in the source code for this chapter. You can try this example yourself to
    see the results.


    This discussion brings us to the question “How does the `java` command choose
    the source-file mode?” It uses two criteria in selecting the source-file mode:


    * The first item on the command line that is not an option or part of an option.
    If this item is the name of an existing file with `.java` extension, the source-file
    mode is used.

    * Using the `--source` option on the command line forces the `java` command to
    use the source-file mode. If the source-file name does not contain the `.java`
    extension, you must use the `--source` option to use the source-file mode.


    Let us go back to running the `Unexpected.java` source file. Because our file
    name ends with the `.java` extension, the `java` command uses the source-file
    mode to run the class inside this file.


    In subsequent sections, I will explain how the source file is compiled before
    running it and other rules of the source-file mode.


    ## Must Be a Single Source File


    The source-file mode allows your program to be stored in one and only one source
    file. It compiles only the source file specified on the command line. If the code
    in your source file refers to code in other source files, the source-file mode
    will not run your program.


    Listing [4-2](#419466_2_En_4_Chapter.xhtml#PC7) contains the code for a class
    named `MultiFileTest`. It attempts to create an object of the `HelloSourceMode`
    class, which is stored in `HelloSourceMode.java` file (see Listing [4-1](#419466_2_En_4_Chapter.xhtml#PC3)).


    ```

    // MultiFileTest.java

    package com.jdojo.sourcecode.mode;

    public class MultiFileTest {

    public static void main(String[] args) {

    // Create an object of the HelloSourceMode class

    HelloSourceMode hsm = new HelloSourceMode();

    System.out.println("A HelloSourceMode object created.");

    }

    }

    ```


    **Listing 4-2** A `MultiFileTest` Class That Uses a Class from Another Source
    File


    The following command attempts to run the `MultiFileTest.java` source file:


    ```

    C:\Java13Revealed\src\sourcecode.apps>java MultiFileTest.java

    MultiFileTest.java:7: error: cannot find symbol

    HelloSourceMode hsm = new HelloSourceMode();

    ^

    symbol:   class HelloSourceMode

    location: class MultiFileTest

    MultiFileTest.java:7: error: cannot find symbol

    HelloSourceMode hsm = new HelloSourceMode();

    ^

    symbol:   class HelloSourceMode

    location: class MultiFileTest

    2 errors

    error: compilation failed

    ```


    The source-file mode fails to run the `MultiFileTest.java` file because it does
    not find the `HelloSourceMode` class definition during compilation. In source-file
    mode, it is allowed for a type to refer to other types (classes/interfaces). However,
    the referred types must be present on the application class path or inside the
    source file itself. The referred types cannot be in other source files. You can
    fix the previous error in two ways:


    * You can have a `HelloSourceMode` class in compiled form on the class path.

    * You can include the declaration of the `HelloSourceMode` class in the `MultiFileTest.java`
    file.


    Listing [4-3](#419466_2_En_4_Chapter.xhtml#PC9) contains the code in a source
    file named `Laptop.java`. The file contains two classes named `Laptop` and `Configuration`.


    ```

    // Laptop.java

    package com.jdojo.sourcecode.mode;

    public class Laptop {

    private Configuration config;

    public Laptop(Configuration config) {

    this.config = config;

    }

    public static void main(String[] args) {

    Configuration config = new Configuration();

    Laptop laptop = new Laptop(config);

    System.out.println("Created a laptop...");

    }

    }

    public class Configuration {

    public Configuration() {

    System.out.println("Creating a default configuration...");

    }

    }

    ```


    **Listing 4-3** A Source File with Two Class Declarations – `Laptop` and `Configuration`


    The `Laptop` class refers to the `Configuration` class. The following command
    successfully runs the `Laptop.java` file in source-file mode:


    ```

    C:\Java13Revealed\src\sourcecode.apps>java Laptop.java

    Creating a default configuration...

    Created a laptop...

    ```


    ## The First Top-Level Class Is Run


    In source-file mode, the `java` command scans the specified source file and attempts
    to run the first type definition found. This rule implies that if you want to
    run class `C` in the source file, `C` must be defined as the first top-level class
    in the file. For example, if you have two classes in the file and both have a
    `main()` method, the first class is always run. If you want to run the second
    class, you must move it to the top in the source file. If the first type in the
    source file is not a class or does not have a `main()` method, the source-file
    mode generates an error. Let us have a few examples.'
