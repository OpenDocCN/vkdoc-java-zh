    - Java 11 supports Unicode Standard version 10.0.0.

    - Java 12 supports Unicode standard version 11.0, plus the Japanese Era code point,
    U+32FF, from the first version of the Unicode Standard after 11.0 that assigns
    the code point.

    - Java 13 supports Unicode Standard version 12.1.'
