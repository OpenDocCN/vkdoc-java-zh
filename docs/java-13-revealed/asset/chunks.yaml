    @Override

    public int compareTo(Object o) {

    throw new UnsupportedOperationException("Not supported yet.");

    }

    // 更多代码在此处

    }

    var myTemplate = new Template() {

    // 更多代码在此处

    };

    ```


    变量 `myTemplate` 的推断类型会是什么？如果你为 `myTemplate` 变量指定了显式类型，你会有以下四种选择：


    *   `Template myTemplate = ...`


    *   `Serializable myTemplate = ...`


    *   `Comparable myTemplate = ...`


    *   `Object myTemplate = ...`


    编译器有第五种选择，即匿名类的不可具名类型。在这种情况下，编译器会推断出匿名类的不可具名类型。当你向匿名类添加一个未覆盖其超类或超接口中任何方法的新方法时，你无法静态地调用该方法。也就是说，你无法在源代码中调用该方法——编译器不会编译它。然而，在匿名类声明中使用
    `var` 允许你这样做，因为你推断出的变量类型是编译器生成的匿名类不可具名类型。以下 JShell 会话演示了这一点：


    ```

    jshell> var runnable = new Runnable() {

    ...>     public void run() {

    ...>         System.out.println("Inside run()...");

    ...>     }

    ...>

    ...>     public void test() {

    ...>         System.out.println(

    ...>             "Calling this method is possible because of var...");

    ...>     }

    ...> };

    runnable ==> $0@7823a2f9

    jshell> runnable.run();

    Inside run()...

    jshell> runnable.test();

    Calling this method is possible because of var...

    ```


    考虑以下语句，其中 `Object` 类中 `getClass()` 方法的返回类型是 `Class<?>`：


    ```

    // name 的推断类型是 String

    var name = "John";

    // cls 的推断类型是 Class

    var cls = name.getClass();

    ```


    在这种情况下，`Class<?>` 中的捕获变量类型已被向上投影到 `name` 变量类的超类型，并且 `cls` 的推断类型是 `Class<? extends
    String>` 而不是 `Class<?>`。


    以下是推断不可具名类型的最后一个示例：


    ```

    var list = List.of(10, 20, 45.89);

    ```


    变量 `list` 的推断类型会是什么？这是一个较难理解的情况。`List.of()` 方法的参数是 `Integer` 和 `Double` 类型。`Integer`
