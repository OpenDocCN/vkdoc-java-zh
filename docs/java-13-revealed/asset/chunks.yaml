  raw: '### One Scope for the Switch Block


    The `switch` block defines one scope, and all switch labels are executed in that
    scope. It means that you cannot define a variable with the same name in more than
    one `case` label. Consider the following snippet of code:


    ```

    char c = ''Z'';

    // More code goes here...

    switch(Character.toLowerCase(c)) {

    case ''a'':

    case ''e'':

    case ''i'':

    case ''o'':

    case ''u'':

    char upperChar = Character.toUpperCase(c);

    System.out.println("Vowel: " + upperChar);

    break;

    default:

    char upperChar = Character.toUpperCase(c); // A compile-time error

    System.out.println("Consonant: " + upperChar);

    }

    ```


    This code does not compile. Both declarations of the `upperChar` variable are
    in one scope, which is the scope for the `switch` block . The compiler complains
    about the duplicate declaration of the `upperChar` variable inside the `default`
    label. There is a way to solve this error. A pair of braces (`{}`) defines a new
    scope. You can enclose the code for the `case` label and `default` label in braces
    to solve this. Here is the modified code, which compiles


    ```

    char c = ''Z'';

    // More code goes here...

    switch(Character.toLowerCase(c)) {

    case ''a'':

    case ''e'':

    case ''i'':

    case ''o'':

    case ''u'': {

    char upperChar = Character.toUpperCase(c);

    System.out.println("Vowel: " + upperChar);

    break;

    }

    default: {

    char upperChar = Character.toUpperCase(c); // Compiles fine

    System.out.println("Consonant: " + upperChar);

    }

    }

    ```


    ### A Switch Was a Statement


    You could use `switch` only as a statement. You used to simulate a `switch` to
    be an expression by defining a variable outside the `switch` statement and assigning
    it a value in each `switch` label. Here is an example:


    ```

    int count = 2;

    // More code goes here...

    // Declare desc here and assign it a value in each switch label later

    String desc;

    switch (count) {

    case 1:

    desc = "One";

    break;

    case 2:

    desc = "Two";

    break;

    case 3:

    desc = "Three";

    break;

    default:

    desc = "Out-of-range";

    }

    System.out.println(desc);

    ```


    This approach works, but it is verbose and a workaround, not a direct support
    for expressions. It would have been nicer if you were able to use `switch` as
    an expression like


    ```

    int count = 2;

    // More code goes here...

    // Declare desc here and use a switch expression to assign it a value

    String desc = switch (count) {

    case 1: yield "One";

    case 2: yield "Two";

    case 3: yield "Three";

    default: yield "Out-of-range";

    };

    ```


    I will explain the new syntax using the `yield` statement shortly.


