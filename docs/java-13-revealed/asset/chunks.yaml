    正在创建默认配置...

    已创建一台笔记本电脑...

    ```


    ## 运行第一个顶层类


    在源文件模式下，`java` 命令会扫描指定的源文件，并尝试运行找到的第一个类型定义。这条规则意味着，如果你想运行源文件中的类 `C`，那么 `C` 必须被定义为文件中的第一个顶层类。例如，如果文件中有两个类，并且两者都有
    `main()` 方法，那么总是运行第一个类。如果你想运行第二个类，你必须将其移动到源文件的顶部。如果源文件中的第一个类型不是类，或者没有 `main()`
    方法，源文件模式会生成一个错误。让我们来看几个例子。

