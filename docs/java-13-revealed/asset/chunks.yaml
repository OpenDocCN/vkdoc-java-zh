    ### New Switch Syntax


    The new `switch` retains most of the syntax from the traditional `switch`, except
    the character to separate a `switch` label from its code. It uses an arrow (`->`)
    instead of a colon (`:`). The traditional `"case label:"` becomes `"case label->"`.
    This is the only syntactic difference you have for the new `switch`. There are
    several semantic (how it works) differences that I will explain in this section.


    Often, I need to distinguish which `switch` I am talking about – the new one or
    the old new. I refer to the old `switch` as traditional `switch`, `switch-with-colon`,
    or `switch` with `"case label:"`. I refer to the new one as new `switch`, `switch-with-arrow`,
    or `switch` with `"case label->"`. Java Language Specification refers to the `switch`
    block associated with the traditional `switch` as *switch labeled statement groups*
    and the `switch` block associated with the new `switch` as *switch labeled rules*
    . Whichever name you use to refer to the new `switch`, here is its syntax:


    ```

    switch(selector-expresion) {

    case label1[, label2, label3...] -> [expression|block|throw-statement]

    case label4[, label5, label6...] -> [expression|block|throw-statement]

    ...

    default -> [expression|block|throw-statement]

    }

    ```


    The syntax allows for one or more constants in a `case` label. The code associated
    with a `switch` label is restricted to one of the following: an expression, a
    block statement, and a `throw` statement . I will explain the rationale behind
    this rule shortly.


    Let us look at the rules used to process the new `switch` followed with examples
    of each rule:


    *   The default is no fall-through in the new `switch`. This means, you no longer
    need to use a `break` statement to stop executing the switch labels following
    the matched `switch` label.


    *   Only one “thing” can be executed as part of a matched `switch` label. That
    “thing” can be an expression, a block statement, or a `throw` statement. In traditional
    `switch`, a group of statements was allowed causing the scoping issue where the
    entire `switch` block was executed in one scope. Using these constraints, if you
    have more than one statement to execute, you are forced to use a block statement
    that will have a new scope for the `switch` label. This allows you to have the
    same functionality as the traditional `switch`, but code is less error-prone.


    *   The new `switch` can be used as a statement or as an expression.


    The following snippet of code rewrites the previous example, which used the traditional
    `switch` statement, using the new `switch` statement:


    ```

    int count = 2;

    // More code goes here...

    switch (count) {

    case 1-> System.out.println("One");

    case 2-> System.out.println("Two");

    case 3-> System.out.println("Three");

    default-> System.out.println("Out-of-range");

    }

    ```


    Notice the use of the `System.out.println()` in each switch label. Didn’t I say
    that each `switch` label can have an expression, a block statement, or a `throw`
    statement? I did say that. In Java, a method call (in this case, `System.out.println()`)
    is an expression. When you add a semicolon after the method call, it becomes an
    expression statement. Here are the detailed rules about using an expression in
    a switch label with arrow:


    *   In a `switch` statement, the *expression* must be *an expression statement* –
    an expression, which can be converted to a statement by adding a semicolon to
    it.


    *   In a `switch` expression, the *expression* may be any valid Java expression.


    The following snippet of code rewrites the previous example using a `switch` expression:


    ```

    int count = 2;

    // More code goes here...

    String desc = switch (count) {

    case 1-> "One";

    case 2-> "Two";

    case 3-> "Three";

    default->"Out-of-range";

    };

    System.out.println(desc);

    ```'
