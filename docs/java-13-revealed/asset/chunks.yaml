- fmt: '# Components of the HTTP Client API


    A typical HTTP communication consists of a request and a response. The client
    creates a request, which consists of a URL, headers, and a body. The request is
    sent to a server, which is indicated by the URL. The server responds with a response,
    which consists of a status code, headers, and a body. The HTTP Client API provides
    classes representing HTTP requests and responses.


    The HTTP Client API is small. It consists of fewer than 20 types, four of which
    are the main types. Others are used while you are using one of these four. The
    new API also uses a few types from the legacy HTTP API. The new API is in the
    `java.net.http` package in the `java.net.http` module. If you want to use the
    HTTP Client API in your module, your module needs to read the `java.net.http`
    module.


    The main four types in the HTTP Client API are as follows:


    *   The `HttpClient` class

    *   The `HttpRequest` class

    *   The `HttpResponse<T>` interface

    *   The `WebSocket` interface


    An `HttpClient` acts as a container for storing configurations that can be used
    for multiple HTTP requests instead of setting them separately for each request.


    An `HttpRequest` represents an HTTP request that can be sent to a server. Once
    you create an `HttpRequest`, it is immutable and can be reused to send the same
    request multiple times.


    An `HttpResponse` represents an HTTP response. You do not create an `HttpResponse`;
    rather, you receive it as a response from a server to an `HttpRequest`.


    A `WebSocket` represents a WebSocket client. You can create a WebSocket server
    using the Java EE 7 WebSocket API or using several other programming languages
    such as Python, NodeJS, and so on. This chapter does not show you how to create
    a WebSocket server.


    ### Tip


    An `HttpClient` is immutable. A few of the configurations stored in an `HttpClient`
    may be overridden for HTTP requests when such requests are built. You do not create
    an `HttpResponse`; it is returned to you as part of an HTTP request that you send
    to the server.


    Instances of `HttpClient`, `HttpRequest`, and `WebSocket` are created using builders.
    Each of them contains a nested interface named `Builder` that is used to build
    an instance of that type.


    The HTTP Client API is so simple to use that you can read an HTTP resource in
    just one statement! The following statement reads the contents at the URL `http://httpbin.org/ip`
    as a string using a `GET` HTTP request and prints the response body to the standard
    output:


    ```

    HttpClient.newHttpClient()

    .sendAsync(HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .build(), BodyHandlers.ofString())

    .thenApply(HttpResponse::body)

    .thenAccept(System.out::println)

    .join();

    ```


    Do not worry if this statement looks intimidating. I will explain each of its
    parts after breaking them down into separate statements and then re-assembling
    them into one. At this point, all you need to know is that the new HTTP Client
    API is so simple and easy to use that you can read an HTTP resource by writing
    just one statement.


    ## Setting Up Examples


    Many examples in this chapter involve interacting with a web server. Instead of
    creating a web application for all examples, I use `httpbin.org`, which supports
    many types of HTTP and HTTPS communications for demonstration purposes. If you
    want to try the examples on any other web server, feel free to replace the URIs
    in the examples with yours. Note that `httpbin.org` web site is not mine. It is
    maintained by Kenneth Reitz. I am just using this web site in examples for this
    chapter. There is another web site `http://postman-echo.com` that provides functionalities
    similar to `httpbin.org`.


    The code for examples of all HTTP client programs are in the `jdojo.http.client`
    module whose declaration is shown in Listing 3-1.


    ```

    // module-info.java

    module jdojo.http.client {

    requires java.net.http;

    exports com.jdojo.http.client;

    }

    ```


    Listing 3-1: A Module Named `jdojo.http.client`


    ## A Quick Example


    Let us have a quick, but complete, example in which you will send an HTTP request
    to a web server and print the status code and body of the response. Typical steps
    in an HTTP communication are as follows:


    *   Create an `HttpClient` to store HTTP configuration information.

    *   Create an `HttpRequest` and populate it with information to be sent to the
    server such as URI, header, HTTP method, request body, and so on.

    *   Send the request to the server using the `HttpClient`.

    *   Receive a response from the server as an `HttpResponse<T>`.

    *   Process the HTTP response such as print the status code and body.


    You can create an `HttpClient` with default configurations using the `newHttpClient()`
    static method of the `HttpClient` class:


    ```

    // Create an HttpClient

    HttpClient client = HttpClient.newHttpClient();

    ```


    The `newBuilder()` static method of the `HttpRequest` class returns a builder
    to create an `HttpRequest`. You need to call builder’s methods to set parts of
    the request. Finally, you need to call the `build()` method that returns an `HttpRequest`:


    ```

    // Create an HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .build();

    ```


    The default request HTTP method used by the `HttpRequest.Builder` is GET. You
    can also set it explicitly by calling the `GET()` method on the builder:


    ```

    // Create an HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .GET()

    .build();

    ```


    Call the `send()` method of the `HttpClient` to send the request to the server,
    which sends the request synchronously – it blocks until the response is received.
    While sending a request, you need to specify a body handler to process the response
    body. Several built-in body handlers are available from the factory methods of
    the `HttpResponse.BodyHandlers` class. For example, `BodyHandlers.ofString()`
    static method returns a body handler to process the response body as a `String`.
    The `send()` method returns an `HttpResponse<T>`, where the type parameter `T`
    is the type of the body handler. If the body handler is of type `String`, the
    `send()` method returns `HttpResponse<String>`. The `statusCode()` method of the
    `HttpResponse` returns the HTTP status code as an `int` and its `body()` method
    returns the response body. The `send()` method throws checked exceptions `IOException`
    and `InterruptedException`, so you need to handle the exceptions in your code.
    The following snippet of code shows how to send the request to the server and
    process its body as a `String`:


    ```

    // Send the request to the server handling the response body as a String

    HttpResponse response

    = client.send(request, BodyHandlers.ofString());

    // Get the response status and body

    int statusCode = response.statusCode();

    String body = response.body();

    ```


    Listing 3-2 contains the complete program to send a request to the server and
    process the response. The URL `http://httpbin/ip` returns the IP address of the
    requestor in JSON format. The program reads the JSON data as `String` and prints
    it to the standard output. The response status code of 200 indicates success.
    You may get a different output.'
