    **Listing 3-14** An Implementation of the `WebSocket.Listener` Interface


    Our listener listens for text messages, which can be received in parts. The `textMessages`
    instance variable is used to accumulate partial messages. It is used inside the
    `onText()` method. When the `onText()` method receives the last part of a message,
    it joins all partial messages in the `textMessages` instance variable, prints
    it, and clears the list to accumulate parts of a new message in future.


    The listener declares another instance variable named `closeStatus`:


    ```java

    CompletableFuture closeStatus = new CompletableFuture();

    ```


    When I will create a `WebSocket` client program, I would like to know when this
    listener receives the last message. The last message is received by a listener
    when its `onError()` or `onClose()` method is called. The `onError()` and `onClose()`
    methods complete the `closeStatus CompletableFuture` exceptionally or normally,
    respectively. The `closeStatus()` method simply returns this `CompletableFuture`.
    The intended usage of this is in a client program to wait for the `WebSocket`
    to close:


    ```java

    // Create a listner for our WebSocket

    WebSocketEchoListener listener = new WebSocketEchoListener();

    /* Create a WebSocket with this listener and exchange messages

    with the server here...

    */

    // Wait for the WebSocket to close

    listener.closeStatus()

    .thenAccept(System.out::println)

    .exceptionally(e -> {

    e.printStackTrace();

    return null;

    })

    .join();

    ```


    The `onOpen()` method prints an informational message and requests one more message.
    Note that if you remove the call to `webSocket.request(1)` method, you will not
    be able to receive any messages at all.


    The `onText()` method requests for one more message and accumulates the message.
    If this is the last part of a message, it prints the whole message to the standard
    output and clears the `textMessages` instance variable, which will be used to
    accumulate next text message when the `onText()` method is called in future. It
    returns `null` to indicate that the message processing is complete.


    The `onPong()` method requests one more message to receive, prints the message,
    and returns `null` to indicate that the message processing is complete.


    The `onError()` method completes the `closeStatus CompletableFuture` exceptionally.


    The `onClose()` method completes the `closeStatus CompletableFuture` normally
    with a description containing the status code and reason for closing the connection.
    A status code of 1000 indicates normal closure.


    ## Building a Client Endpoint


    You need to build an instance of the `WebSocket` interface that acts as a client
    endpoint. The instance is used to connect and exchange messages with the server
    endpoint. A `WebSocket` instance is built using a `WebSocket.Builder`. You need
    to use the `newWebSocketBuilder()` method of the `HttpClient` class to get a builder.


    Once you have a builder, you can call one of the following methods of the `WebSocket.Builder`
    to configure and build the `WebSocket`:


    - `WebSocket.Builder connectTimeout(Duration timeout)`

    - `WebSocket.Builder header(String name, String value)`

    - `WebSocket.Builder subprotocols(String mostPreferred, String... lesserPreferred)`

    - `CompletableFuture<WebSocket> buildAsync(URI uri, WebSocket.Listener listener)`


    The `connectTimeout()` method lets you specify a timeout for the opening handshake.
    If the opening handshake does not complete within the specified duration, the
    `CompletableFuture` returned from the `buildAsync()` method of the `WebSocket.Builder`
    completes exceptionally with an `HttpTimeoutException`.


    You can add any custom headers for the opening handshake using the `header()`
    method.


    You can specify a request for given subprotocols during the opening handshake
    using the `subprotocols()` method – only one of them will be selected by the server.
    The subprotocols are defined by the application. The client and the server need
    to agree to work on specific subprotocols and their details.


    Finally, call the `buildAsync()` method of the `WebSocket.Builder` interface to
    build the endpoint. The first argument is the URI of the server endpoint. The
    second argument is a WebSocket listener. It returns a `CompletableFuture<WebSocket>`,
    which completes normally when this endpoint is connected to the server endpoint;
    it completes exceptionally when there was an error.


    The following snippet of code shows how to build and connect a client endpoint.
    Notice that the URI for the server starts with `ws`, which indicates the WebSocket
    protocol.


    ```java

    // Create an HttpClient with default configurations

    HttpClient client = HttpClient.newHttpClient();

    // Create a listener for our WebSocket

    WebSocketEchoListener listener = new WebSocketEchoListener();

    // Create a WebSocket

    WebSocket webSocket = client.newWebSocketBuilder()

    .buildAsync(URI.create("ws://demos.kaazing.com/echo"), listener)

    .join();

    ```'
