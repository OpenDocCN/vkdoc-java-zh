- fmt: '### No Array Initializers by Themselves


    Array initializer such as `{10, 20}` is a poly expression, and its type depends
    on the left-hand side of the assignment. You cannot use an array initializer with
    `var`. You must use an array creation expression with or without an array initializer
    such as `new int[]{10, 20}` or `new int[2]`. In such cases, the compiler infers
    the type of the variable the same as the type used in array creation expression.
    The following JShell session shows a few examples:


    ```

    jshell> var evens = {2, 4, 6};

    |  Error:

    |  cannot infer type for local variable evens

    |    (array initializer needs an explicit target-type)

    |  var evens = {2, 4, 6};

    |  ^--------------------^

    jshell> var evens = new int[]{2, 4, 6};

    evens ==> int[3] { 2, 4, 6 }

    |  created variable evens : int[]

    jshell> var odds = new int[3];

    odds ==> int[3] { 0, 0, 0 }

    |  created variable odds : int[]

    ```


    ### No Array Dimensions


    While using `var` to declare a variable, you cannot use brackets (`[]`) after
    `var` or variable’s name to specify the dimension of the array. The dimension
    of the array is inferred from the initializer.


    ```

    jshell> var[] cities = new String[3];

    |  Error:

    |  ''var'' is not allowed as an element type of an array

    |  var[] cities = new String[3];

    |        ^

    jshell> var cities = new String[3];

    cities ==> String[3] { null, null, null }

    |  created variable cities : String[]

    jshell> var points3D = new int[3][][];

    points3D ==> int[3][][] { null, null, null }

    |  created variable points3D : int[][][]

    ```


    ### No Poly Expressions As Initializers


    Poly expressions need a target type to infer their types. No poly expressions
    such as lambda expression and method references are allowed in initializers for
    variable declaration using `var`. Array initializers are poly expressions, which
    are also not allowed. You need to use explicit types with poly expressions. The
    following JShell session shows a few examples in which I use `var` to declare
    variables with poly expression initializers, which generates errors. I also show
    using explicit types instead of `var` that does not generate errors.


    ```

    jshell> var increment = x -> x + 1;

    |  Error:

    |  cannot infer type for local variable increment

    |    (lambda expression needs an explicit target-type)

    |  var increment = x -> x + 1;

    |  ^-------------------------^

    jshell> Function increment = x -> x + 1;

    increment ==> $Lambda$17/0x0000000800bb2c40@7823a2f9

    |  created variable increment : Function

    jshell> var next = increment.apply(10);

    next ==> 11

    |  created variable next : Integer

    jshell> var intGenerator = new Random()::nextInt;

    |  Error:

    |  cannot infer type for local variable intGenerator

    |    (method reference needs an explicit target-type)

    |  var intGenerator = new Random()::nextInt;

    |  ^---------------------------------------^

    jshell> Supplier intGenerator = new Random()::nextInt;

    intGenerator ==> $Lambda$18/0x0000000800bb3c40@4678c730

    |  created variable intGenerator : Supplier

    jshell> int nextInteger = intGenerator.get();

    nextInteger ==> -1522642581

    |  created variable nextInteger : int

    ```


    ### Inferring Types on Both Sides


    In most cases, you get an error when the compiler cannot infer the type of the
    initializer and the variable. In some cases, `Object` is inferred as the type.
    Consider the following:


    ```

    var list = new ArrayList();

    ```


    The initializer uses a diamond operator, which makes the compiler infer the type
    for `ArrayList<>`, whereas using `var` on the left-hand side makes the compiler
    infer the type in `ArrayList<>`. You might expect an error in this case. However,
    the compiler replaces the previous declaration with the following:


    ```

    ArrayList list = new ArrayList();

    ```


    Consider the following snippet of code, which requires type inference on both
    sides:


    ```

    public class NumberWrapper {

    // More code goes here

    }

    var wrapper = new NumberWrapper();

    ```


    In this case, the inferred type is the upper bound of the type parameter `"E extends
    Number"`, which is `Number`. The compiler will replace the previous variable declaration
    with the following:


    ```

    NumberWrapper wrapper = new NumberWrapper();

    ```'
