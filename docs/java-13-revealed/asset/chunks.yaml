  trans: '

    ## Java 发布模型


    在 2017 年 9 月发布的 Java 9 之前，Java 采用功能驱动的发布模型，每两年发布一个包含新功能的版本。在这种模型中，每个功能版本都包含一个或多个主要特性。有时，新功能版本（例如
    Java 8 和 Java 9）会延迟数月甚至一年以上，因为主要特性的开发尚未完成。这种发布模型有一个主要缺点：小功能必须等待很长时间才能提供给开发者使用。


    Java 已切换到一种新的基于时间的发布模型，该模型将包含：


    *   每 6 个月发布一个功能版本

    *   每 3 个月发布一个更新版本

    *   每 3 年发布一个长期支持（LTS）版本


    在新的基于时间的发布模型中，从 2018 年 3 月开始，你将每 6 个月获得一个新功能版本，例如 2018 年 3 月的 Java 10、2018 年 9
    月的 Java 11、2019 年 3 月的 Java 12、2019 年 9 月的 Java 13，以此类推。一个功能版本可能包含对 Java 语言、JVM
    或 API 的小型和/或大型新增内容。新功能的开发是一个持续的过程，在该功能完全开发完成之前，它不会与任何未来的功能版本绑定。一旦新功能完全开发完成，它就会被合并到即将发布的功能版本中。这样，新功能就不会延迟任何即将发布的版本。


    从 2018 年 4 月开始，你将在 4 月、7 月、10 月和 1 月每 3 个月获得一个新的更新版本。更新版本将仅包含针对较新版本的安全修复和错误修复。


    从 2018 年 9 月开始，你将获得一个 LTS 功能版本，该版本将通过更新获得至少 3 年的支持。


    ## 什么是版本字符串？


    Java 的每个版本都由一个唯一的字符串标识，该字符串被称为*版本字符串*。例如，版本字符串 "1.8"、"9" 和 "10" 标识了三个不同的 Java
    版本。Java 版本字符串之所以重要，有以下几个原因。如果你正在开发一个 Java 应用程序，你会希望根据 Java 支持的功能、你所在组织提供的支持以及你的供应商支持该
    Java 版本的时间长短来选择一个 Java 版本。在 Java 9 之前，Java 使用的版本字符串类似于 "1.7"、"1.8.0_162" 等。Java
    9 引入了一种新的版本字符串方案，而 Java 10 扩展了 Java 9 中引入的版本字符串方案。后续章节将为你概述所有版本字符串方案，以及如何在命令行中打印它们并在程序中使用它们。


    ## 旧版版本字符串方案


    在 JDK 9 之前，版本字符串通常采用以下形式：


    ```

    $n.$feature.$maintenance_$update-$identifier

    ```


    其中：


    *   `$n` 始终为 1。

    *   `$feature` 是一个从 1 开始顺序递增的整数，表示包含新功能的功能版本。

    *   `$maintenance` 是一个表示维护版本的整数，包含以工程为重点的错误修复。对于功能版本，它始终为零。

    *   `$update` 是一个两位数的整数，如果需要，前面会补零。它表示以客户为中心的错误修复。`$update` 不是按顺序编号的。

    *   `$identifier` 用于标识产品正式发布（GA）之前的里程碑，例如 "ea" 表示早期访问构建，beta 表示测试版，构建编号等。对于正式发布版本，标识符不是版本字符串的一部分。


    以下是 JDK 9 之前的一些 JDK 版本字符串示例：


    *   "1.8.0" 是一个正式发布的功能版本。

    *   "1.8.0_162" 是功能版本 "1.8.0" 的一个更新版本（更新编号为 162）。

    *   "1.8.0_162-b12" 是功能版本 "1.8.0" 的一个更新版本（更新编号为 162），构建标识符为 "b12"。


    在 JDK 9 之前，JDK 版本命名方案对开发者来说不够直观，程序也不容易解析。查看两个 JDK 版本，你无法分辨它们之间的细微差别。很难回答一个简单的问题：哪个版本包含最新的所有安全修复，"1.7.0_55"
    还是 "1.7.0_60"？答案并非你猜测的显而易见的那个——"1.7.0_60"。两个版本包含相同的安全修复。名为 *JDK 8 Update 66*、*1.8.0_66*
    和 *JDK 8u66* 的版本之间有什么区别？它们代表同一个版本。在你能够说出版本字符串中包含的详细信息之前，有必要详细了解版本命名方案。例如，在 JDK
    1.5.0 的初始版本之后，更新版本号中 20 的倍数表示与奇数更新号不同类型的更新。本节中的文本并未提供足够的信息让你完全理解 JDK 版本字符串方案。有关
    JDK 9 之前 JDK 版本字符串方案的更多详细信息，请参考以下网页：


    *   [`www.oracle.com/technetwork/java/javase/versioning-naming-139433.html`](http://www.oracle.com/technetwork/java/javase/versioning-naming-139433.html)

    *   [`www.oracle.com/technetwork/java/javase/overview/jdk-version-number-scheme-1918258.html`](http://www.oracle.com/technetwork/java/javase/overview/jdk-version-number-scheme-1918258.html)


    ## 新版版本字符串方案


    JDK 9 试图标准化 JDK 版本命名方案，使其易于人类理解、易于程序解析，并遵循行业标准的版本命名方案。


    JDK 9 添加了一个名为 `Runtime.Version` 的静态嵌套类，它表示 Java SE 平台实现的版本字符串。该类可用于表示、解析、验证和比较版本字符串。


    一个*版本字符串*按顺序包含以下四个元素。只有第一个元素是必需的：


    *   版本号（`$vnum`）

    *   预发布信息（`$pre`）

    *   构建信息（`$build`）

    *   附加信息（`$opt`）


    以下正则表达式定义了版本字符串的格式：


    ```

    $vnum(-$pre)?(\+($build)?(-$opt)?)?

    ```


    一个*短版本字符串*由一个版本号组成，可选地后跟预发布信息：


    ```

    $vnum(-$pre)?

    ```


    你可以拥有像 `"9"` 和 `"10"` 这样仅包含功能版本号的短版本字符串，也可以拥有像 `"10.0.1.2-ea+40-20180201.07.36am"`
    这样包含版本字符串所有部分的长版本字符串。我编造了这个长版本字符串，以向你展示版本字符串的所有元素。通常，预发布版本（版本字符串中包含 -ea）没有更新和补丁版本。后续章节将详细解释版本字符串的所有部分及其子部分。

