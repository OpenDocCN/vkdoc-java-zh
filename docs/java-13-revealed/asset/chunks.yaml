    ### 新的 Switch 语法


    新的 `switch` 保留了传统 `switch` 的大部分语法，除了用于分隔 `switch` 标签及其代码的字符。它使用箭头（`->`）代替冒号（`:`）。传统的
    `"case label:"` 变成了 `"case label->"`。这是新 `switch` 唯一的语法差异。在本节中，我将解释几个语义（工作原理）上的差异。


    通常，我需要区分我谈论的是哪个 `switch`——新的还是旧的。我将旧的 `switch` 称为传统 `switch`、`switch-with-colon`
    或使用 `"case label:"` 的 `switch`。我将新的称为新 `switch`、`switch-with-arrow` 或使用 `"case
    label->"` 的 `switch`。Java 语言规范将与传统 `switch` 关联的 `switch` 块称为 *switch 标记语句组*，将与新
    `switch` 关联的 `switch` 块称为 *switch 标记规则*。无论你使用哪个名称来指代新 `switch`，其语法如下：


    ```

    switch(selector-expresion) {

    case label1[, label2, label3...] -> [expression|block|throw-statement]

    case label4[, label5, label6...] -> [expression|block|throw-statement]

    ...

    default -> [expression|block|throw-statement]

    }

    ```


    该语法允许在 `case` 标签中使用一个或多个常量。与 `switch` 标签关联的代码仅限于以下之一：表达式、块语句和 `throw` 语句。稍后我将解释此规则背后的原理。


    让我们看看用于处理新 `switch` 的规则，并附上每条规则的示例：


    *   新 `switch` 默认没有穿透（fall-through）。这意味着，你不再需要使用 `break` 语句来停止执行匹配的 `switch` 标签之后的
    switch 标签。


    *   作为匹配的 `switch` 标签的一部分，只能执行一个“事物”。这个“事物”可以是表达式、块语句或 `throw` 语句。在传统 `switch`
    中，允许一组语句，这会导致作用域问题，即整个 `switch` 块在一个作用域内执行。使用这些约束，如果你有多个语句要执行，则必须使用块语句，这将为 `switch`
    标签创建一个新的作用域。这允许你拥有与传统 `switch` 相同的功能，但代码更不容易出错。


    *   新的 `switch` 可以用作语句或表达式。


    以下代码片段使用新的 `switch` 语句重写了之前使用传统 `switch` 语句的示例：


    ```

    int count = 2;

    // 此处省略更多代码...

    switch (count) {

    case 1-> System.out.println("One");

    case 2-> System.out.println("Two");

    case 3-> System.out.println("Three");

    default-> System.out.println("Out-of-range");

    }

    ```


    注意每个 switch 标签中使用了 `System.out.println()`。我不是说过每个 `switch` 标签可以有一个表达式、一个块语句或一个
    `throw` 语句吗？我确实说过。在 Java 中，方法调用（本例中为 `System.out.println()`）是一个表达式。当你在方法调用后添加分号时，它就变成了一个表达式语句。以下是关于在带有箭头的
    switch 标签中使用表达式的详细规则：


    *   在 `switch` 语句中，*表达式* 必须是 *表达式语句* —— 一个可以通过添加分号转换为语句的表达式。


    *   在 `switch` 表达式中，*表达式* 可以是任何有效的 Java 表达式。


    以下代码片段使用 `switch` 表达式重写了之前的示例：


    ```

    int count = 2;

    // 此处省略更多代码...

    String desc = switch (count) {

    case 1-> "One";

    case 2-> "Two";

    case 3-> "Three";

    default->"Out-of-range";

    };

    System.out.println(desc);

    ```

