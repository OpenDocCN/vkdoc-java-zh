    LF. All example text blocks in this section use dots to show spaces in their content.


    In this stage, the compiler removes the incidental leading and trailing whitespaces.
    The number of leading whitespaces to be removed from all non-blank lines in the
    content is computed as follows:


    *   The line with the opening delimiter is not considered for this computation.


    *   Lines that consist of only whitespaces are called blank lines and they are
    not considered for this computation. Blank lines may contain only a line terminator
    or whitespaces with a line terminator.


    *   If the closing delimiter is placed on a separate line by itself with or without
    whitespaces, this line is considered for this computation. Note that with the
    definition of a blank line, when you place the closing delimiter on a separate
    line by itself, this line is a blank line. However, it is a significant line for
    the purpose of this computation and is not ignored.


    *   Count the number of leading whitespaces on each non-blank line. Each whitespace
    is counted as 1\. That is, if a line contains two spaces and another contains
    one space and one tab, this step counts two as leading whitespaces on both lines.


    *   Compute the minimum of the leading whitespace count for all non-blank lines.
    Suppose you have five non-blank lines with leading whitespace counts as 15, 19,
    23, 19, 15, and 13\. The minimum of all counts will be 13.


    *   Remove the minimum whitespace count, as computed in the previous step, from
    all non-blank lines.


    *   Remove all trailing whitespaces from all lines, not just the non-blank lines.
    This step will remove the trailing whitespaces from the non-blank lines. It will
    collapse blank lines into empty lines – lines with only line terminators.


    #### Example 1


    Consider the follow text block:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..............""";

    ```


    The leading whitespace counts for all non-blank lines are 14, 18, 22, 18, 14,
    and 14\. The closing delimiter has been placed on a separate line, and it is treated
    as a non-blank line to compute the number of whitespaces to be removed from all
    lines. The minimum whitespace count for all lines is 14\. Therefore, the compiler
    removes 14 whitespaces from all lines. The compiler also removes all trailing
    whitespaces from four lines. The resulting string is


    ```

    ....

    ........Hello, HTML

    ....


    ```


    #### Example 2


    Consider the following text block in which the closing delimiter has been placed
    in the beginning of the line:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    """;

    ```


    What will be the resulting string? Remember that the line with the closing delimiter
    always participates in the minimum whitespace count. In this case, the whitespace
    count for the last line is 0\. So, the leading whitespace counts for all non-blank
    lines are 14, 18, 22, 18, 14, and 0\. The minimum whitespace count is 0, which
    will result in the compiler removing no leading whitespaces. As usual, all trailing
    whitespaces will be removed. The resulting string will be as follows:


    ```

    ..............

    ..................

    ......................Hello, HTML

    ..................

    ..............

    ```


    ### Tip


    If you want to preserve all leading whitespaces on the non-blank lines, place
    the closing line terminator in the beginning on a separate line.


    #### Example 3


    Consider the following text block:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ............""";

    ```


    The leading whitespace counts for all non-blank lines are 14, 18, 22, 18, 14,
    and 12\. The minimum of these counts is 12, so 12 leading whitespaces will be
    removed from all non-blank lines. Trailing whitespaces are removed as usual. The
    resulting string is as follows:


    ```

    ..

    ....

    ........Hello, HTML

    ....

    ..

    ```


    #### Example 4


    Consider the following text block in which I have placed the closing delimiter
    18 spaces to the right:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..................""";

    ```


    The leading whitespace counts for all non-blank lines are 14, 18, 22, 18, 14,
    and 18\. The minimum of these counts is 14, so 14 leading whitespaces will be
    removed from all non-blank lines. Trailing whitespaces are removed as usual. The
    resulting string is as follows:


    ```

    ....

    ........Hello, HTML

    ....


    ```


    Notice that when the closing delimiter is placed on a separate line and if it
    starts anywhere to the right of a non-whitespace character on any non-blank lines,
    the placement of the closing delimiter does not play any role in leading whitespace
    removal.'
