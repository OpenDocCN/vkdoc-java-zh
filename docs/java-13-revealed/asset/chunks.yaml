  trans: "\n## 什么是预览特性？\n\nJava SE 平台的预览特性是一种完全规范且完整实现的语言或虚拟机特性，它在某个 JDK 功能版本中可用，但尚未成为\
    \ JDK 的永久特性。提供预览特性是为了征求开发者的反馈。开发者应在真实用例中尝试这些特性。根据反馈，预览特性可能会在未来的版本中成为永久特性（标准特性），可能经过修改也可能保持不变，或者可能被完全移除。预览特性不应用于生产环境。有关预览特性的更多详细信息，请参阅\
    \ [`https://openjdk.java.net/jeps/12`](https://openjdk.java.net/jeps/12) 上的 JEP\
    \ 12。\n\n预览特性不向后兼容。你无法使用 Java 13 运行时运行包含 Java 12 预览特性的类文件。\n\n由于预览特性不应用于生产环境，因此在编译器和运行时中默认不启用。你必须对编译器和运行时使用\
    \ `--enable-preview` 选项才能使用预览特性。当你使用 `--enable-preview` 选项编译源代码时，还需要使用 `--release`\
    \ 或 `-source` 选项。要在 JDK 13 中编译包含预览特性的源代码，你可以使用：\n\n```\njavac --enable-preview\
    \ --release 13 \n```\n\n如果你在编译包含预览特性的源代码时未使用 `--enable-preview` 选项，则会收到类似如下的编译时错误：\n\
    \n```\nC:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\com\\jdojo\\enhancedswitch\\\
    Test.java:9: 错误: switch 规则是预览特性，默认情况下已禁用。\ncase 10->str =  \"ten\";\n(请使用 --enable-preview\
    \ 来启用 switch 规则)\n1 个错误\n```\n\n如果你在编译时启用了预览特性，编译器会打印提示信息，建议你使用 `-Xlint:preview`\
    \ 选项进行编译，以便查看警告。\n\n```\n注意: C:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\\
    com\\jdojo\\enhancedswitch\\Test.java 使用了预览语言特性。\n注意: 请使用 -Xlint:preview 重新编译以获取详细信息。\n\
    ```\n\n以下是在编译器中同时使用 `--enable-preview` 和 `-Xlint:preview` 选项时得到的结果，它会针对预览特性的每次使用打印一条警告。\n\
    \n```\nC:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\com\\jdojo\\enhancedswitch\\\
    Test.java:9: 警告: [preview] switch 规则是预览特性，可能会在未来的版本中被移除。\ncase 10->str =  \"ten\"\
    ;\n...\n4 个警告\n```\n\n要运行包含预览特性的已编译类，你需要在 `java` 命令中指定 `--enable-preview` 选项：\n\
    \n```\njava --enable-preview \n```\n\n如果你想使用 JShell 探索预览特性，需要使用 `--enable-preview`\
    \ 选项启动它：\n\n```\nC:\\Java13Revealed>jshell --enable-preview\n|  欢迎使用 JShell --\
    \ 版本 13\n|  输入 /help intro 以了解介绍\njshell>\n```\n\n## 示例程序\n\n本章中的所有示例都在 `jdojo.enhancedswitch`\
    \ 模块中，如清单 5-1 所示。\n\n```\n// module-info.java\nmodule jdojo.enhancedswitch {\n\
    exports com.jdojo.enhancedswitch;\n}\n清单 5-1\n名为 jdojo.enhancedswitch 的模块\n```\n\
    \n## 背景\n\nJava 语言自诞生之初就拥有 `switch` 语句。它被用作控制流语句。`switch` 语句的语法和语义是从 C/C++ 复制而来的，它们具有以下令人烦恼且容易出错的特点：\n\
    \n*   `switch` 标签使用贯穿语义。在大多数情况下，你只想执行与匹配标签关联的语句，而不执行其他标签。由于贯穿语义，你最终不得不在每个标签中使用\
    \ `break` 语句，这既令人烦恼又容易出错。\n\n*   如果你想为多个 `switch` 标签执行同一组语句，必须使用贯穿语义定义多个 case\
    \ 标签。换句话说，不允许在 case 标签中指定多个常量——一个 case 标签必须有且只有一个常量。\n\n*   所有 switch 标签都位于同一个作用域中，这意味着你不能为不同的标签声明相同的变量。\n\
    \n*   它被设计为仅作为语句使用，而不能作为表达式。语句表示一个动作，而表达式则计算出一个值。\n\n存在这些问题的 `switch` 语句已经存在了\
    \ 24 年。为什么我们现在需要解决它们？是不是太晚了？答案是既对也不对。开发者或许可以忍受它直到 Java 生命周期的结束。然而，有一个更重要的特性，称为模式匹配，它促使了这些问题的解决。模式匹配目前还不是\
    \ Java 的一部分；你可以在 [`https://openjdk.java.net/jeps/305`](https://openjdk.java.net/jeps/305)\
    \ 上的 JEP 305 中跟踪其进展。为了使模式匹配能够工作，Java 中的 `switch` 必须进行彻底改革。随着新的 Java 每 6 个月发布一个版本，增强的\
    \ `switch` 已在 Java 12 中作为预览特性提供，并在 Java 13 中提供了改进版本，而最终目标——模式匹配——仍在开发中。\n\n我假设你知道如何使用传统的\
    \ `switch` 语句。在接下来的章节中，我将通过简单的代码片段逐一介绍这些问题，然后再解释增强的 `switch` 特性。\n\n### 贯穿语义\n\
    \n以下代码片段包含一个简单的 `switch` 语句：\n\n```\nint count = 2;\n// 更多代码...\nswitch (count)\
    \ {\ncase 1:\nSystem.out.println(\"One\");\nbreak;\ncase 2:\nSystem.out.println(\"\
    Two\");\nbreak;\ncase 3:\nSystem.out.println(\"Three\");\nbreak;\ndefault:\nSystem.out.println(\"\
    Out-of-range\");\n}\n```\n\n你有一个名为 `count` 的 `int` 变量。当 `count` 的值分别为 1、2 或 3\
    \ 时，`switch` 语句会打印 `\"One\"`、`\"Two\"` 或 `\"Three\"`。否则，它会打印 `\"Out-of-range\"\
    `。请注意每个 `case` 标签中 `break` 语句的使用。你需要它是因为默认情况下 `switch` 语句使用贯穿语义。如果没有 `break` 语句，对于\
    \ `count` 值 1，所有四个 switch 标签（三个 `case` 标签和一个 `default` 标签）都将被执行，而这并非你的本意。\n\n\
    ### 每个 Case 标签一个常量\n\n假设给你一个英文字母，你需要打印它是元音还是辅音。以下是实现此功能的代码：\n\n```\nchar c = 'w';\n\
    // 更多代码...\nswitch(Character.toLowerCase(c)) {\ncase 'a':\ncase 'e':\ncase 'i':\n\
    case 'o':\ncase 'u':\nSystem.out.println(\"Vowel\");\nbreak;\ndefault:\nSystem.out.println(\"\
    Consonant\");\n}\n```\n\n请注意使用贯穿语义的五个 `case` 标签。对于元音，你有五个 `case` 常量。因为每个 `case`\
    \ 标签只能使用一个常量，所以你不得不使用五个单独的 `case` 标签。如果能够编写一个像 `\"case 'a', 'e', 'i', 'o', 'u':\"\
    ` 这样的 `case` 标签，岂不是更好？\n"
- fmt: '### One Scope for the `switch` Block


    The `switch` block defines one scope, and all switch labels are executed in that
    scope. It means that you cannot define a variable with the same name in more than
    one `case` label. Consider the following snippet of code:


    ```

    char c = ''Z'';

    // More code goes here...

    switch(Character.toLowerCase(c)) {

    case ''a'':

    case ''e'':

    case ''i'':

    case ''o'':

    case ''u'':

    char upperChar = Character.toUpperCase(c);

    System.out.println("Vowel: " + upperChar);

    break;

    default:

    char upperChar = Character.toUpperCase(c); // A compile-time error

    System.out.println("Consonant: " + upperChar);

    }

    ```


    This code does not compile. Both declarations of the `upperChar` variable are
    in one scope, which is the scope for the `switch` block. The compiler complains
    about the duplicate declaration of the `upperChar` variable inside the `default`
    label. There is a way to solve this error. A pair of braces (`{}`) defines a new
    scope. You can enclose the code for the `case` label and `default` label in braces
    to solve this. Here is the modified code, which compiles:


    ```

    char c = ''Z'';

    // More code goes here...

    switch(Character.toLowerCase(c)) {

    case ''a'':

    case ''e'':

    case ''i'':

    case ''o'':

    case ''u'': {

    char upperChar = Character.toUpperCase(c);

    System.out.println("Vowel: " + upperChar);

    break;

    }

    default: {

    char upperChar = Character.toUpperCase(c); // Compiles fine

    System.out.println("Consonant: " + upperChar);

    }

    }

    ```


    ### A Switch Was a Statement


    You could use `switch` only as a statement. You used to simulate a `switch` to
    be an expression by defining a variable outside the `switch` statement and assigning
    it a value in each `switch` label. Here is an example:


    ```

    int count = 2;

    // More code goes here...

    // Declare desc here and assign it a value in each switch label later

    String desc;

    switch (count) {

    case 1:

    desc = "One";

    break;

    case 2:

    desc = "Two";

    break;

    case 3:

    desc = "Three";

    break;

    default:

    desc = "Out-of-range";

    }

    System.out.println(desc);

    ```


    This approach works, but it is verbose and a workaround, not a direct support
    for expressions. It would have been nicer if you were able to use `switch` as
    an expression like:


    ```

    int count = 2;

    // More code goes here...

    // Declare desc here and use a switch expression to assign it a value

    String desc = switch (count) {

    case 1: yield "One";

    case 2: yield "Two";

    case 3: yield "Three";

    default: yield "Out-of-range";

    };

    ```


    I will explain the new syntax using the `yield` statement shortly.


    ## Enhanced Switch


    Now you know the shortcomings of the traditional `switch`, it is time to see the
    new exciting features of `switch`, which address these shortcomings. There are
    two types of changes to `switch`:


    - Enhancements to the traditional `switch`

    - The new `switch` syntax


    The new `switch` syntax provides features of the traditional `switch` statement
    and many more. I will first explain the enhancements to the traditional `switch`
    followed with the detailed coverage of the new `switch` syntax and semantics.


    ### Enhancements to Traditional Switch


    Java has always been backward compatible. Adding breaking changes to the traditional
    `switch` was not an option to the language designers. The preview feature provides
    you new ways of using the traditional `switch` without breaking your old code.
    Here are the changes to the traditional `switch`:


    - You can have multiple constants in a `case` label.

