- fmt: '## What Is `var`?


    Is `var` a keyword in Java 10? No. It is a *restricted type name* or a *context-sensitive
    keyword*. It is a type name, which means it denotes a type (primitive type or
    reference type) like `int`, `double`, `boolean`, `String`, `List`, and so on.
    Because `var` is a restricted type name, you can still use it as an identifier,
    except to define another type. That is, you can use `var` as variable names, method
    names, and package names. However, you cannot use it as the name of a class or
    an interface.


    Java coding standards recommend that the names of classes and interfaces start
    with an uppercase letter. If you did not follow the coding standards and used
    `var` as a class or interface name, your code will break in Java 10 and later.


    You can use `var` to declare local variables in the following contexts. There
    are many restrictions to this list. I will cover them one by one:


    - Local variables with initializers

    - Index in `for-each` loops

    - Indexes in `for` loops

    - Formal parameters in implicitly typed lambda expressions


    The following are examples of using `var` to declare local variables with initializers:


    ```

    // The type of birthYear is inferred as int

    var birthYear = 1969;

    // The type of promptMsg is inferred as String

    var promptMsg = "Are you sure you want to proceed?";

    // Assuming Person is a class, the type of john is inferred as Person

    var john = new Person();

    ```


    The following lambda expression computes the average of an `Integer` and a `Long`
    and returns a `Double`. The types of `n1` and `n2` are inferred as `Integer` and
    `Long`, respectively. Here, `var` is playing no role in type inference. I will
    explain it later in a separate section.


    ```

    BiFunction avg = (var n1, var n2) -> (n1 + n2)/2.0;

    ```


    The compiler infers the type of the variable declared using `var`. If the compiler
    cannot infer the type, a compile-time error occurs. The compiler uses the type
    of the expression used as the initializer to infer the type of the variable being
    declared. Consider the previous variable declarations. In the first case, the
    compiler sees 1969, which is an integer literal of type `int` and infers type
    of the `birthYear` variable as `int`. When the source is compiled, the class file
    contains the statement


    ```

    int birthYear = 1969;

    ```


    ### Tip


    Type inference using `var` is performed by the compiler. Using `var` has no impact
    on the existing class file and the runtime.


    The same argument goes for the other two statements in which the type of the `promptMsg`
    and `john` variables are inferred as `String` and `Person`, respectively.


    Looking at the previous examples, you may argue that why would you not write these
    statements using explicit types as the following?


    ```

    int birthYear = 1969;

    String promptMsg = "Are you sure you want to proceed?";

    Person john = new Person();

    ```


    You have a point. Except for saving a few key strokes, you really made the job
    of the readers of this code a little harder when you used `var`. When `var` is
    used, the reader must look at the initializer to know the type of the variable
    being declared. In simple expressions like these, it may not be very difficult
    to know the type of the initializer by just looking at it. One of the arguments
    made by the designer of the `var` type name is that using it to declare multiple
    variable at the same place makes the variable names easy to read because they
    all vertically align. Look at the following snippet of code:


    ```

    var birthYear = 1969;

    var promptMsg = "Are you sure you want to proceed?";

    var john = new Person();

    ```


    Compare the two previous snippets of code declaring the same set of variables.
    The latter is definably a little easier to read, but still a little harder to
    understand.


    Let us consider the following variable declaration that uses a method call to
    initialize its value:


    ```

    var personList = persons();

    ```


    In this case, the compiler will infer the type of the `personList` variable based
    on the return type of the `persons()` method. For the readers of this statement,
    there is no way to tell the inferred type unless he looks at the declaration of
    the `persons()` method. I gave the variable a good name, `personList`, to indicate
    its type. However, it is still not clear whether it is a `List<Person>`, a `Person[]`,
    or some other type.


    Consider another example of a variable declaration:


    ```

    Map> personListByBirthMonth = new HashMap>();

    ```


    You can rewrite this statement as follows:


    ```

    var personListByBirthMonth = new HashMap>();

    ```


    This time, the declaration looks much simpler and you may benefit from type inference
    offered by `var`, provided you keep the variable name intuitive enough to give
    a clue about its type.


    You can mix `var` and explicit type names in the same section of the code – methods,
    constructors, static initializers, and instance initializers. Use `var` to declare
    variables whenever the types of the variables are clear to the readers, not just
    clear to you. If the reader of your code cannot figure out the variable types
    easily, use the explicit type names. Always prefer clarity over brevity. It is
    very important that you use intuitive variable names when you use `var`. Consider
    the following variable declaration:


    ```

    var x = 156.50;

    ```


    The variable name `x` is terrible. If your method is a few lines long, using `x`
    as the variable name may be excused. However, if your method is big, the reader
    will have to scroll and look at the variable declaration to find what `x` means
    whenever it appears in the method’s body. So, it is important to keep the variable
    name intuitive. Consider replacing the previous variable declaration as follows:


    ```

    var myWeightInPounds = 156.50;

    ```


    No one reading the code that uses `myWeightInPounds` will have any doubts about
    its type.'
