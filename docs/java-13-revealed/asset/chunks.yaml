- fmt: '### Tip


    The two methods `orElseThrow()` and `isEmpty()` have also been added to the `OptionalInt`,
    `OptionalLong`, and `OptionalDouble` classes.


    The `Optional` class already had another version of the `orElseThrow()` method,
    which is declared as follows:


    ```

    T orElseThrow (Supplier exceptionSupplier) throws X extends Throwable

    ```


    This method accepts a `Supplier<T>`, which supplies the exception to be thrown
    when a value is not present. The exception thrown could be checked or unchecked.
    You could also use a custom message when creating the exception. The no-args `orElseThrow()`
    method throws an unchecked exception with a message `"No value present"`. The
    following snippet of code shows how to use both existing and new `orElseThrow()`
    methods:


    ```

    Optional name = Optional.of("Kishori Sharan");

    // More code goes here...

    // Supply an exception to be thrown when name is empty

    String name1 = name.orElseThrow(

    () -> new NoSuchElementException("No value present"));

    // Let the runtime throw a NoSuchElementException if name is empty

    String name2 = name.orElseThrow();

    ```


    The `Optional<T>` class had a method named `isPresent()` that returned `true`
    if a value was present and `false` otherwise. Java 11 added a new method `isEmpty()`
    that is same as calling `!isPresent()`. The new method makes the code more readable
    if you are using a logic to check for absence of value. Earlier by using `!isPresent()`,
    you had to check for “not presence”, rather than for “absence”. It is also useful
    in lambda expressions to be used as a method reference.


    Listing [8-4](#419466_2_En_8_Chapter.xhtml#PC18) contains a complete program to
    demonstrate the use of these new methods in the `Optional<T>` class.


    ```

    // OptionalTest.java

    package com.jdojo.misc;

    import java.util.List;

    import java.util.NoSuchElementException;

    import java.util.Optional;

    public class OptionalTest {

    public static void main(String[] args) {

    Optional name = Optional.of("Kishori Sharan");

    String fn1 = name.orElseThrow(

    () -> new NoSuchElementException("No value present"));

    String fn2 = name.orElseThrow();

    System.out.println("fn1: " + fn1);

    System.out.println("fn2: " + fn2);

    try {

    Optional phone = Optional.empty();

    String f2 = phone.orElseThrow();

    } catch (NoSuchElementException e) {

    System.out.println("Phone: " + e.getMessage());

    }

    // Have a list of Optional

    List> list = List.of(Optional.empty(),

    Optional.of("Kishori"),

    Optional.empty(),

    Optional.of("Sharan"),

    Optional.empty());

    // Count the empty Optionals in the list

    long emptyCount = list.stream()

    .filter(Optional::isEmpty)

    .count();

