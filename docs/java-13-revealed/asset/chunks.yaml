    头中的 `filename` 参数可能指定一个文件路径而非文件名。出于安全原因，`filename` 参数中指定的文件路径不会被使用。只有文件路径的最后一部分被用作文件名。以下语句创建了一个表示当前目录的
    `Path`：


    ```

    Path dirPath = Paths.get(".");

    ```


    当你创建 body handler 时，需要将选项作为 `OpenOption` 类型的可变参数传递给 `ofFileDownload()` 方法的第二个参数。在此示例中，你指定了
    `CREATE` 和 `WRITE` 作为这些选项。它们将允许 body handler 创建一个文件（如果该文件不存在）来存储下载的内容，并且该文件将以写入模式打开。程序中的以下语句实现了这一点：


    ```

    HttpResponse response = client.send(request,

    BodyHandlers.ofFileDownload(dirPath, CREATE, WRITE));

    ```


    从响应体返回的 `Path` 并未规范化。例如，它包含的文件路径为 `C:\Java13Revealed\.\test.json`。请注意文件路径中的点。该路径是有效的，但未规范化。在打印文件路径之前，程序会获取其绝对路径并进行规范化，以打印出类似
    `C:\Java13Revealed\test.json` 的文件路径。程序中的以下代码片段执行此任务：


    ```

    System.out.println("File downloaded at "

    + filePath.toAbsolutePath().normalize());

    ```


    #### 跟随服务器重定向


    当你向服务器发送请求时，通常会被重定向到另一个 URL。重定向通过响应状态码指示。状态码为 3xx 表示重定向。例如，如果你收到状态码 301，表示该 URL
    已永久移动。在这种情况下，响应将包含一个名为 `Location` 的头，其值包含资源已移动到的新的 URL。例如，当你请求 [`http://google.com`](http://google.com)
    的页面时，你会收到状态码为 301 的响应，并且响应头中的 `Location` 设置为 [`www.google.com`](http://www.google.com)。


    一个 URL 可能会将你重定向到另一个 URL，新的 URL 又可能将你重定向到另一个，依此类推。有时，设计不佳的服务器上的 URL 可能会让你陷入无限的重定向循环。大多数浏览器设置了一个默认限制，即最多跟随
    20 次重定向。


    有时，服务器可能会将你重定向到另一个 URL，仅仅是为了强制你使用安全协议。例如，[`www.abc.com`](http://www.abc.com) 可能会将你重定向到
    [`www.abc.com`](https://www.abc.com)。然而，从 HTTPS 重定向到 HTTP 并非正常做法。


    浏览器会自动为你处理重定向。HTTP Client API 默认不跟随重定向。重定向策略在 `HttpClient` 中设置，并指定为 `HttpClient.Redirect`
    枚举中的以下值之一：


    *   `ALWAYS`


    *   `NEVER`


    *   `NORMAL`


    `ALWAYS` 允许在所有情况下进行重定向。`NEVER` 是默认的重定向策略，不允许重定向。`NORMAL` 的行为与 `ALWAYS` 相同，但拒绝从
    HTTPS 到 HTTP 的重定向。

