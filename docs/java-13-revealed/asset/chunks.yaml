    ## 创建 HTTP 客户端


    发送到服务器的 HTTP 请求需要进行配置，以便服务器知道要使用哪个身份验证器、SSL 配置详情、要使用的 Cookie 管理器、代理信息、如果服务器重定向请求时的重定向策略等。`HttpClient`
    类的实例存储这些特定于请求的配置，并且它们可以重用于多个请求。你可以针对每个请求覆盖其中的一些配置。你需要使用 `HttpClient` 向服务器发送 HTTP
    请求。一个 `HttpClient` 包含以下用于所有 HTTP 请求的信息：身份验证器、连接超时、Cookie 管理器、执行器、重定向策略、请求优先级、代理选择器、SSL
    上下文、SSL 参数和 HTTP 版本。


    *身份验证器*是 `java.net.Authenticator` 类的一个实例。它用于 HTTP 身份验证。默认情况下不使用身份验证器。HTTP 客户端
    API 内置支持 HTTP 基本身份验证。


    如果 `HttpClient` 在指定的连接超时时间内无法建立新连接，其 `send()` 方法会抛出 `HttpConnectTimeoutException`，而
    `sendAsync()` 方法会以 `HttpConnectTimeoutException` 异常完成。如果不需要新连接（例如重用已建立的连接），则连接超时值无效。


    *Cookie 处理器*用于处理 HTTP Cookie。它是 `java.net.CookieHandler` 类的一个实例。默认情况下不使用 Cookie
    处理器。


    *执行器*是 `java.util.concurrent.Executor` 接口的一个实例，用于发送和接收异步 HTTP 请求和响应。如果未指定，则会提供默认执行器。


    *重定向策略*是 `HttpClient.Redirect` 枚举的常量之一，用于指定如何处理服务器发出的重定向。默认值为 `NEVER`，这意味着永远不会跟随服务器发出的重定向。


    *请求优先级*是 HTTP/2 请求的默认优先级，取值范围为 1 到 256（含）。这是给服务器的一个提示，用于优先处理请求。值越高表示优先级越高。


    *代理选择器*是 `java.net.ProxySelector` 类的一个实例，用于选择要使用的代理服务器。默认情况下不使用代理服务器。


    *SSL 上下文*是 `javax.net.ssl.SSLContext` 类的一个实例，它提供了安全套接字协议的实现。提供了一个默认的 `SSLContext`，当你不需要指定协议或不需要客户端身份验证时，它可以正常工作。


    *SSL 参数*是 SSL/TLS/DTLS 连接的参数。它们存储在 `javax.net.ssl.SSLParameters` 类的实例中。


    HTTP 版本是 HTTP 的版本，可以是 1.1 或 2。它被指定为 `HttpClient.Version` 枚举的常量之一：`HTTP_1_1` 和
    `HTTP_2`。它尽可能请求特定的 HTTP 协议版本。默认值为 `HTTP_2`。也就是说，如果你没有在 `HttpClient` 中设置 HTTP 版本，默认情况下它将尝试使用
    HTTP/2。如果服务器不支持 HTTP/2，它将降级到 HTTP/1.1。


    ### 提示


    `HttpClient` 是不可变的。在构建 HTTP 请求时，`HttpClient` 中存储的一些配置可能会被覆盖。


    `HttpClient` 类是抽象的，你不能直接创建它的实例。有两种方法可以创建 `HttpClient` 类的实例：


    *   使用 `HttpClient` 类的 `newHttpClient()` 静态方法

    *   使用 `HttpClient.Builder` 接口的 `build()` 方法


    以下代码片段获取一个包含默认配置的 `HttpClient`：


    ```

    // 获取使用默认配置的 HttpClient

    HttpClient defaultClient = HttpClient.newHttpClient();

    ```


    你也可以使用 `HttpClient.Builder` 接口创建 `HttpClient`。`HttpClient.newBuilder()` 静态方法返回
    `HttpClient.Builder` 接口的一个新实例。`HttpClient.Builder` 接口为每个配置值提供了一个设置方法。配置值作为方法的参数指定，并且该方法返回构建器对象本身的引用，因此你可以链式调用多个方法。最后，调用
    `build()` 方法，该方法返回一个配置好的 `HttpClient` 对象。以下语句创建了一个 `HttpClient`，其重定向策略设置为 `ALWAYS`，HTTP
    版本设置为 1.1，连接超时设置为 2 秒：


    ```

    // 创建使用自定义配置的 HttpClient

    HttpClient client = HttpClient.newBuilder()

    .followRedirects(ALWAYS)

    .version(HTTP_1_1)

    .connectTimeout(Duration.ofSeconds(2))

    .build();

    ```


    `HttpClient` 类包含一个对应于每个配置设置的方法，该方法返回该配置的值：


    *   `Optional<Authenticator> authenticator()`

    *   `Optional<Duration> connectTimeout()`

    *   `Optional<CookieHandler> cookieHandler()`

    *   `Optional<Executor> executor()`

    *   `HttpClient.Redirect followRedirects()`

    *   `Optional<ProxySelector> proxy()`

    *   `SSLContext sslContext()`

    *   `SSLParameters sslParameters()`

    *   `HttpClient.Version version()`


    `HttpClient` 类中没有 setter 方法，因为该类是不可变的。你不能单独使用 `HttpClient`。在使用 `HttpClient` 向服务器发送请求之前，你需要有一个
    `HttpRequest`。我将在下一节中解释 `HttpRequest` 类。`HttpClient` 类包含以下三个向服务器发送请求的方法：


    *   `<T> HttpResponse<T> send(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler)`

    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler)`

    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler, HttpResponse.PushPromiseHandler<T> pushPromiseHandler)`


    `send()` 方法同步发送请求，而 `sendAsync()` 方法异步发送请求。`sendAsync()` 的第二个版本允许你异步发送请求并处理服务器推送响应。我将在后续章节中更详细地介绍这些方法。'
- fmt: '# Processing HTTP Requests


    A client application communicates with a web server using HTTP requests. It sends
    a request to the server and the server sends back a response. An instance of the
    `HttpRequest` class represents a request. The following are the steps you need
    to perform to process a request:


    - Obtain an HTTP request builder.

    - Set the parameters for the request.

    - Create an HTTP request from the builder.

    - Send the HTTP request to a server – synchronously or asynchronously.

    - Process the response from the server.


    ## Obtaining an HTTP Request Builder


    You need to use a builder object, which is an instance of the `HttpRequest.Builder`
    interface, to create an `HttpRequest`. You can get an `HttpRequest.Builder` using
    one of the following `static` methods of the `HttpRequest` class:


    - `HttpRequest.Builder newBuilder()`

    - `HttpRequest.Builder newBuilder(URI uri)`


    The following snippet of code shows you how to use these methods to get an `HttpRequest.Builder`:


    ```

    // Create an URI for httpbin.org

    URI uri = URI.create("http://httpbin.org");

    // Get a builder with an URI

    HttpRequest.Builder builder1 = HttpRequest.newBuilder(uri);

    // Get a builder without specifying a URI at this time

    HttpRequest.Builder builder2 = HttpRequest.newBuilder();

    ```


    ## Setting Up HTTP Request Parameters


    Once you have an HTTP request builder, you can set the parameters for the request
    such as request method, body, and headers using the builder’s methods. The following
    sections show you how to set different types of parameters in an `HttpRequest`
    with examples.


    ### Setting Up Request Method and Body Publisher


    HTTP supports the following types of methods: GET, POST, PUT, DELETE, PATCH, HEAD,
    OPTIONS, CONNECT, and TRACE. The `HttpRequest.Builder` interface provides four
    methods to set the similarly named HTTP methods directly:


    - `HttpRequest.Builder GET()`

    - `HttpRequest.Builder POST(HttpRequest.BodyPublisher bodyPublisher)`

    - `HttpRequest.Builder PUT(HttpRequest.BodyPublisher bodyPublisher)`

    - `HttpRequest.Builder DELETE()`


    Some HTTP methods such as POST and PUT require you to pass data as request body.
    Some HTTP methods such as GET and DELETE do not support request body. This is
    reflected in the method’s declaration in the previous list.


    A request body is represented as an instance of the `HttpRequest.BodyPublisher`
    interface. The `BodyPublisher` interface extends `Flow.Publisher<ByteBuffer>`,
    and its job is to convert Java objects passed as the request body into a flow
    of byte buffers suitable for sending a request body. Do not worry about creating
    a `BodyPublisher` from scratch. For common use cases, predefined body publishers
    are provided through the `HttpRequest.BodyPublishers` static class.


    Table [3-1](#419466_2_En_3_Chapter.xhtml#Tab1) lists the factory methods in the
    `HttpRequest.BodyPublishers` class. All methods in the table return an `HttpRequest.BodyPublisher`.
    The class also provides a `fromPublisher()` method that is an adaptor between
    `Flow.Publisher` and `HttpRequest.BodyPublisher`. The method takes a `Flow.Publisher`
    and returns an `HttpRequest.BodyPublisher`. You can use this method when you want
    to use an existing `Flow.Publisher` as an `HttpRequest.BodyPublisher`.


    **Table 3-1** List of Factory Methods in the `HttpRequest.BodyPublishers` Class
    That Returns an `HttpRequest.BodyPublisher` Instance


    | Method | Description |

    | --- | --- |

    | `noBody()` | Returns a request body publisher that sends no request body. Use
    this method to get a body publisher when you do not have a request body to send
    to the server, but the method you are using to send the request requires you to
    specify a body publisher. |

    | `ofByteArray(byte[] buf)` | Returns a request body publisher that sends the
    specified byte array as the request body. |

    | `ofByteArray(byte[] buf, int offset, int length)` | Returns a request body publisher
    that sends `length` bytes from `offset` in the specified byte array as the request
    body. |

    | `ofByteArrays(Iterable<byte[]> iterable)` | Returns a request body publisher
    that sends byte arrays in an `Iterable` as the request body. |

    | `ofFile(Path path)` | Returns a request body publisher that sends data in a
    file specified by `path` as the request body. A `FileNotFoundException` is thrown
    if the specified `path` does not exist. |

    | `ofInputStream(Supplier<? extends InputStream> streamSupplier)` | Returns a
    request body publisher that sends the request body by reading from an `InputStream`.
    Note the use of a `Supplier` as an argument instead of an `InputStream`. Using
    a supplier allows for reuse if a request is resent. If the `Supplier` returns
    `null`, the request fails. |

    | `ofString(String body)` | Returns a request body publisher whose request body
    is the specified `String` converted to bytes using UTF8 character set. |

    | `ofString(String s, Charset charset)` | Returns a request body publisher whose
    request body is the specified `String` converted to bytes using the specified
    `charset`. |


    The following snippet of code shows how to post form data to a server using the
    HTTP POST method:


    ```

    // Set the request body in a String

    String requestBody = "first_name=Kishori&last_name=Sharan";

    // Create an HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .POST(BodyPublishers.ofString(requestBody))

    .build();

    ```


    The form contains two fields – `first_name` and `last_name`. Intentionally, I
    have set the simple values for these fields (Kishori and Sharan), which do not
    require URL encoding. Otherwise, you would need to use the `encode()` method of
    the `java.net.URLEncoder` class to encode the field’s values before sending them
    to the server. Note that you must set the `"Content-Type"` header in your request
    to `"application/x-www-form-urlencoded"` if you are posting form data.


    The `HttpRequest.Builder` interface provides a method named `method()` that you
    can use to set any type of HTTP method for a request. It is declared as follows:


    ```

    HttpRequest.Builder method(String method, HttpRequest.BodyPublisher bodyPublisher)

    ```


    The value for the `method` argument is the same as the HTTP method names such
    as `"POST"`, `"OPTIONS"`, `"HEAD"`, and so on. Currently, the HTTP Client API
    does not support CONNECT HTTP method. The following statement uses the `method()`
    method with the HTTP OPTIONS method to create an `HttpRequest`:


    ```

    // Create an HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .method("OPTIONS", BodyPublishers.noBody())

    .build();

    ```


    Typically, you do not send a request body with the OPTIONS method. Note that we
    are using `BodyPublishers.noBody()` factory method to get a `HttpRequest.BodyPublisher`,
    which sends no request body. You can rewrite the previous example of creating
    an `HttpRequest` to post form data using the `method()` method as follows:


    ```

    // Set the request body in a String

    String requestBody = "first_name=Kishori&last_name=Sharan";

    // Create an HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/post"))

    .header("Content-Type", "application/x-www-form-urlencoded")

    .method("POST", BodyPublishers.ofString(requestBody))

    .build();

    ```'
