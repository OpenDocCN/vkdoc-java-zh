- fmt: '### Class Path and Module Path Rules


    Let us rerun the `HelloCDS` class with AppCDS enabled and using two different
    class paths with JDK10:


    ```

    C:\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa
    --class-path build\modules;dist\jdojo.cds.jar com.jdojo.cds.HelloCDS

    An error has occurred while processing the shared archive file.

    shared class paths mismatch (hint: enable -Xlog:class+path=info to diagnose the
    failure)

    Error occurred during initialization of VM

    Unable to use shared archive.

    C:\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa
    --class-path dist\jdojo.cds.jar;build\modules com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    ```


    Recall that you had created the `jdojo.jsa` shared archive by specifying the class
    path as `dist\jdojo.cds.jar`. When you specified a class path as `build\modules;dist\jdojo.cds.jar`,
    you received an error stating that there was a mismatch in the shared class path.


    A shared archive makes a note of the class path used at the time it was created.
    When you enable the shared archive to run the application, one of the following
    must be true; otherwise, you get an error:


    - The class path used to launch the JVM is the same as the class path used to
    create the shared archive.

    - The class path used to launch the JVM contains the class path used to create
    the shared archive as a prefix.


    In this example, the shared archive was created with the class path `dist\jdojo.cds.jar`.
    When you use `dist\jdojo.cds.jar` as the only part or as the first part in the
    class path, your application runs fine. In the previous example, when you got
    an error, you had specified `dist\jdojo.cds.jar` as the last part in the class
    path. To see the details of what JVM was looking for when you got the error, run
    the command with a `-Xlog:class+path=info` option as follows:


    ```

    C:\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa
    -Xlog:class+path=info --class-path build\modules;dist\jdojo.cds.jar com.jdojo.cds.HelloCDS

    [0.010s][info][class,path] bootstrap loader class path=D:\jdk-10\lib\modules

    [0.012s][info][class,path] opened: C:\java10\lib\modules

    [0.022s][info][class,path] type=BOOT

