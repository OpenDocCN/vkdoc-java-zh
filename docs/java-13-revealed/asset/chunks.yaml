- fmt: '### A Complete Example


    In this section, I present a complete example, which includes all types of transformations
    to a text block. First, I explain all steps in the transformation. In the end,
    I include a complete program. Our example text block is as follows:


    ```

    String html = """

    ..............\040CRLF

    ...........CRLF

    .....................CRLF

    ......................Hello, HTML\tCRLF

    CRLF

    ..................CRLF

    .........................CRLF

    ..............CRLF

    ..............""";

    ```


    Here are the syntax that I used for the text block:


    - I am using dots for spaces to show you that there are spaces in the text block.
    In actual text block, you would have spaces, not dots.

    - I am writing the code on Windows, so use CRLF to show the line terminators.
    In actual text block, line terminators are not visible.

    - `\040` is the octal escape for a space (ASCII decimal 32).

    - `\t` is an escape sequence for a tab.

    - Everything else in the content of the text block is a character as it appears.


    There are nine lines in the content of the text block as follows:


    ```

    ..............\040CRLF

    ...........CRLF

    .....................CRLF

    ......................Hello, HTML\tCRLF

    CRLF

    ..................CRLF

    .........................CRLF

    ..............CRLF

    ..............

    ```


    Let us start the text block transformation process. In the first step, the line
    terminators are normalized to LF resulting in the following string:


    ```

    ..............\040LF

    ...........LF

    .....................LF

    ......................Hello, HTML\tLF

    LF

    ..................LF

    .........................LF

    ..............LF

    ..............

    ```


    Now the compiler computes the number of whitespaces that it must remove from the
    beginning of each non-blank line. Lines 2, 5, 7, and 9 are blank lines. Line 9
    is the last line that contains the closing delimiter, so it is considered a significant
    line for this computation. So, the compiler ignores lines 2, 5, and 7, but includes
    line 9, for this computation. The whitespace counts are 14 on line 1, 18 on line
    3, 22 on line 4, 18 on line 6, 14 on line 8, and 14 on line 9. The minimum whitespace
    count from these lines is 14. The compiler removes 14 leading whitespaces from
    all non-blank lines 1, 3, 4, 6, and 8. The resulting string is as follows:


    ```

    \040LF

    ...........LF

    .......LF

    ........Hello, HTML\tLF

    LF

    ....LF

    .........................LF

    LF

    ..............

    ```


    Now trailing whitespaces are removed from all lines resulting in the following
    string:


    ```

    \040LF

    LF

    ....LF

    ........Hello, HTML\tLF

    LF

    ....LF

    LF

    LF

    ```


    Note that the blank lines have become empty lines; they contain only LF in the
    resulting string. The last line had no LF and it is an empty string now, which
    just disappears from the resulting string.


    As a final transformation, the escape sequences are interpreted resulting in the
    following string:


    ```

    LF

    LF

    ....LF

    ........Hello, HTML  LF

    LF

    ....LF

    LF

    LF

    ```


    Listing [6-3](#419466_2_En_6_Chapter.xhtml#PC60) contains a complete program to
    show this transformation. The program uses the `lines()` method of the `String`
    class, which returns a stream of lines from the text block. The `map()` method
    encloses the content of each line in single quotes. I used single quotes to enclose
    each line’s content, so you can see the trailing whitespaces in the output. The
    `forEach()` method prints each line enclosed in single quotes to the standard
    output.


    ```

    // TextBlockTransformation.java

    package com.jdojo.textblock;

    public class TextBlockTransformation {

    public static void main(String[] args) {

    String html = """

    \040


    Hello, HTML\t


    """;

    // let us print each line by enclosing it in single quotes

    html.lines()

    .map(s -> "''" + s + "''")

    .forEach(System.out::println);

    }

    }

    '' ''

    "

    ''    ''

    ''        Hello, HTML    ''

    "

    ''    ''

    "

    ''''

    Listing 6-3

    Visualizing Text Block Transformation

    ```


    ## Concatenating Text Blocks


    Text blocks can be used anywhere you have been using `String` literals. You can
    concatenate them as you concatenate `String` literals. Keep the code readability
    in mind because concatenated text blocks make it difficult to read the code.


    The following snippet of code concatenates a text block and a `String` literal
    to get a string `"Hello, Text Block"`:


    ```

    String str = """

    Hello""" + ", Text Block";

    ```


    The code is not very readable. Let us replace the `String` literal with a text
    block:


    ```

    String str = """

    Hello""" + """

    , Text Block""";

    ```


    The readability is further reduced. You must pay attention to the opening and
    closing delimiters of each text block to understand what is going on.


    Suppose the name in the message comes from a variable. To get a `"Hello, <name>"`
    string, where the `<name>` comes from a variable, you can use the following text
    block. Notice the use of the octal escape `\040` to insert a space:


    ```

    String name = "Text Block";

    String str = """

    Hello,\040""" + name;

    ```


    This is not an optimum solution. If you have placeholders in your text block whose
    values come from variables, using string format specifiers with the `formatted()`
    method of the `String` class is a better option. You can rewrite the previous
    snippet of code as follows:


    ```

    String name = "Text Block";

    String str = """

    Hello, %s""".formatted(name);

    ```


    The `formatted()` method has been added to the `String` class in Java 13 as part
    of supporting text blocks. It is an instance method. It accepts a var-args argument,
    which are the values for the format specifiers in the text block. If you want
    to generate text based on a template, you can use a text block with format specifiers
    as the template and use the `formatted()` method to get desired text into the
    template.'
