    for `switch` . It was added as a preview feature in Java 12 and continues as a
    preview feature in Java 13\. This feature lets you use `switch` as statements
    as well as expressions.


    Chapter [6](#419466_2_En_6_Chapter.xhtml) explains text blocks, which are multiline
    string literals with automatic transformations performed by the compiler. This
    is a preview feature added in Java 13\. This chapter also explains methods added
    to the `String` class to support text blocks.


    Chapter [7](#419466_2_En_7_Chapter.xhtml) explains class data sharing (CDS) for
    JDK classes and application classes, which can speed up the launch time for Java
    application and reduce runtime footprint. This chapter covers updates in CDS from
    Java 10 to Java 13.


    Chapter [8](#419466_2_En_8_Chapter.xhtml) explains deprecation and removal of
    tools. It also covers APIs changes from Java 10 to Java 13\. This chapter does
    not cover all tools and APIs – only those that are relevant to the Java application
    developers.


    ## Audience


    This book is designed to be useful for Java developers who have intermediate-level
    understanding of Java SE 9 and want to learn new features added to Java 10 through
    Java 13.


    ## How to Use This Book


    Each chapter covers a new Java feature, except Chapter [8](#419466_2_En_8_Chapter.xhtml)
    , which covers changes to all important tools and APIs. You can read chapters
    in any order.


