    [0.021s][info][class,load] java.lang.Object source: jrt:/java.base

    [0.022s][info][class,load] java.io.Serializable source: jrt:/java.base

    [0.022s][info][class,load] java.lang.String source: jrt:/java.base

    ...

    [0.202s][info][class,load] com.jdojo.cds.HelloCDS source: file:/C:/Java13Revealed/dist/jdojo.cds.jar

    ...

    Hello, CDS and AppCDS

    ...

    C:\Java13Revealed>java -Xshare:on -Xlog:class+load=info --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    [0.012s][info][class,load] opened: C:\java10\lib\modules

    [0.024s][info][class,load] java.lang.Object source: shared objects file

    [0.024s][info][class,load] java.io.Serializable source: shared objects file

    [0.024s][info][class,load] java.lang.String source: shared objects file

    ...

    [0.150s][info][class,load] com.jdojo.cds.HelloCDS source: file:/C:/Java13Revealed/dist/jdojo.cds.jar

    ...

    Hello, CDS and AppCDS

    ...

    ```


    当 CDS 禁用时，诸如 `Object` 和 `String` 类等系统类的来源被列为 `jrt:/java.base`。这意味着这些类是从磁盘上的 `C:\java10\lib\modules`
    文件（即 JRE 运行时镜像）加载的。当 CDS 启用时，相同类的来源被列为“shared objects file”，这意味着它们是从共享归档加载的。请注意，应用程序类
    `HelloCDS` 在两种情况下都是从磁盘加载的，因为 CDS 只允许共享系统类数据。要共享应用程序类，你需要使用 AppCDS，这将在下一节中解释。


    ## 应用程序类数据共享 (AppCDS)


    在 JDK10 之前，类数据的共享仅适用于由引导类加载器加载的核心 Java 类。JDK10 扩展了 CDS 功能以共享应用程序类。在 JDK10 中，平台类加载器、应用程序类加载器和自定义类加载器也可以从共享归档中加载类。


    在 JDK10 中，你需要将 `-XX:+UseAppCDS` 选项与 `java` 命令一起使用才能使用 AppCDS。在 JDK11 及更高版本中，此选项已废弃。


    要共享应用程序类数据，你需要创建自己的共享归档，其中将包含应用程序类以及核心 Java 类。当你运行应用程序时，需要使用 `-XX:SharedArchiveFile`
    选项指定你的共享归档文件路径。你的共享归档将包含 `jdojo.cds.jar` 文件中的所有类，该文件位于本书源代码的 `dist` 目录中。提供的源代码是使用
    JDK13 编译的。如果你使用的是较早的 JDK，则需要重新编译并重新创建 `jdojo.cds.jar` 文件。


    ### 提示


    Java 10 仅支持对从类路径（而非模块路径）加载的类使用 AppCDS。对模块路径的支持在 JDK11 及更高版本中可用。


    使用 AppCDS 涉及三个步骤：


    *   为要包含在共享归档中的类创建类列表


    *   生成共享归档


    *   在运行应用程序时使用共享归档


    以下各节将引导你完成使用 AppCDS 的步骤。我将使用 JDK10 和 JDK11 展示相同的步骤。你可以选择任意一个 JDK，并按照该 JDK 的说明进行操作。

    '
- fmt: '### Creating a Class List


    First, you need to create the list of classes you want to include in your shared
    archive for AppCDS. You can use the `-XX:DumpLoadedClassList` option to dump the
    list of loaded system classes into the JVM to a file. The `-XX:DumpLoadedClassList`
    option includes only the classes loaded by the bootstrap class loader. Make sure
    to use the `-XX:+UseAppCDS` option to include the classes loaded by the application
    and platform class loaders. You need to run the `java` command with the `-Xshare:off`
    option to generate the list of classes.


    The following command creates a `jdojoclasses.lst` file, which contains the list
    of all classes loaded into the JVM. It is a text file. You can open and edit it
    in a text editor of your choice. Here is the command to use with JDK10:


    ```

    C:\Java13Revealed>java -Xshare:off -XX:+UseAppCDS -XX:DumpLoadedClassList=jdojoclasses.lst
    --class-path dist\jdojo.cds.jar com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    ```


    In JDK11 and later, you do not need to include the `-XX:+UseAppCDS` option with
    the `java` command. You can also use module path to generate the list of classes
    using the following command:


    ```

    C:\Java13Revealed>java -Xshare:off -XX:DumpLoadedClassList=jdojoclasses.lst --module-path
    dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    ```


    Open the `jdojoclasses.lst` file to look at the classes. You can find a line with
    the following entry: `com/jdojo/cds/HelloCDS`. This entry indicates that the `HelloCDS`
    class will be part of the shared archive when you use the `jdojoclasses.lst` file
    to create a shared archive. You will use this file in the next section.


    ### Generating a Shared Archive for AppCDS


    Let us use the `-Xshare:dump` and `-XX:SharedArchiveFile` options with the `java`
    command to create a shared archive with the list of classes in the `jdojoclasses.lst`
    file. This step creates a shared archive, which will be a `jdojo.jsa` file on
    your machine. The command prints informational messages to the standard output,
    which is not shown. Here is the command to generate the shared archive for AppCDS
    in JDK10:


    ```

    C:\Java13Revealed>java -Xshare:dump -XX:+UseAppCDS -XX:SharedClassListFile=jdojoclasses.lst
    -XX:SharedArchiveFile=jdojo.jsa --class-path dist\jdojo.cds.jar

    ```


    Here is the command to generate the shared archive for AppCDS in JDK11 and later:


    ```

    C:\Java13Revealed>java -Xshare:dump -XX:SharedClassListFile=jdojoclasses.lst -XX:SharedArchiveFile=jdojo.jsa
    --module-path dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    ```


    You will use the shared archive – the `jdojo.jsa` file – to run the `HelloCDS`
    class in the next section.


    ### Running Application Using AppCDS


    It is time to see your shared archive with AppCDS in action. Now when you run
    the `HelloCDS` class, you will specify the `jdojo.jsa` shared archive to use.
    Here is the command to use with JDK10:


    ```

    C:\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa
    --class-path dist\jdojo.cds.jar com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    ```


    Here is the command to use with JDK11 and later:


    ```

    C:\Java13Revealed>java -Xshare:on -XX:SharedArchiveFile=jdojo.jsa --module-path
    dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    ```


    Since JDK 11, `-Xshare:auto` is the default, so removing the `-Xshare:on` from
    the previous command will also work. Recall that `-Xshare:auto` works the same
    as `-Xshare:on`, except that if the CDS cannot be used, the former disables CDS
    and continues, whereas the latter fails to launch the application.


    Note the use of the following three options in the previous commands. The `-Xshare:on`
    option enables CDS. The `-XX:+UseAppCDS` option enables AppCDS indicating that
    you want to use AppCDS, which is not needed in JDK11 or later. The `-XX:SharedArchiveFile=jdojo.jsa`
    option specifies the shared archive to use. There is nothing extraordinary in
    the output. The startup time was less, and multiple JVMs will also share application
    classes at runtime.


    Use the `-Xlog:class+load=info` option to verify that your application class,
    `HelloCDS`, was loaded from shared archive. Here is the command to use with JDK10:


    ```

    C:\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa
    -Xlog:class+load=info --class-path dist\jdojo.cds.jar com.jdojo.cds.HelloCDS

    [0.011s][info][class,load] opened: C:\java10\lib\modules

    [0.037s][info][class,load] java.lang.Object source: shared objects file

    [0.038s][info][class,load] java.io.Serializable source: shared objects file

    [0.038s][info][class,load] java.lang.String source: shared objects file

    ...

    [0.103s][info][class,load] com.jdojo.cds.HelloCDS source: shared objects file

    ...

    Hello, CDS and AppCDS

    ...

    ```


    Here is the command to use with JDK11 and later:


    ```

    C:\Java13Revealed>java -Xshare:on -XX:SharedArchiveFile=jdojo.jsa --module-path
    dist\jdojo.cds.jar -Xlog:class+load=info --module jdojo.cds/com.jdojo.cds.HelloCDS

    [0.012s][info][class,load] opened: C:\java11\lib\modules

    [0.042s][info][class,load] java.lang.Object source: shared objects file

    [0.042s][info][class,load] java.io.Serializable source: shared objects file

    [0.042s][info][class,load] java.lang.String source: shared objects file

    ...

    [0.141s][info][class,load] com.jdojo.cds.HelloCDS source: shared objects file

    ...

    Hello, CDS and AppCDS

    ...

    ```


    Notice that, in the output, the source for the `com.jdojo.cds.HelloCDS` class
    is “shared objects file”, which indicates that the `HelloCDS` class was loaded
    from the shared archive.'
