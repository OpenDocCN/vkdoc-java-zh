    }

    }

    fn1: Kishori Sharan

    fn2: Kishori Sharan

    Phone: No value present

    Empty name count: 3

    Listing 8-4

    Testing New Methods in the Optional Class

    ```


    Note the use of the `Optional::isEmpty` method reference when counting the empty
    names in the list:


    ```

    long emptyCount = list.stream()

    .filter(Optional::isEmpty)

    .count();

    ```


    Before Java 11, you had to use the `isPresent()` method and your code would have
    been written as follows:


    ```

    long emptyCount = list.stream()

    .filter(n -> !n.isPresent())

    .count();

    ```


    Java 11 has added a new `not()` static method to the `Predicate<T>` interface,
    which returns the negation of the specified predicate. Its declaration is


    ```

    static <T> Predicate<T> not(Predicate<T> target)

    ```


    Using the `not()` static method in the `Predicate<T>` interface, you can rewrite
    the previous statement as follows:


    ```

    long emptyCount = list.stream()

    .filter(Predicate.not(Optional::isPresent))

    .count();

    ```


    The `not()` static method comes in handy when you want to negate a method reference
    as you negated the `Optional::isPresent` method reference in the previous statement.


    ## Compact Number Format


    Java 12 added a `CompactNumberFormat` class to the `java.text` package in the
    `java.base` module. It is a subclass of the `NumberFormat` class. It formats a
    decimal number in its compact form. A compact form of a number is suitable to
    be used where space is limited to display the number. For example, instead of
    displaying one billion as 1000000000, you can display it in a compact form like
    1B or 1 billion. The compact number format is defined by Unicode Locale Data Markup
    Language (LDML) defined at [http://unicode.org/reports/tr35/tr35-numbers.html#Compact_Number_Formats](http://unicode.org/reports/tr35/tr35-numbers.html%2523Compact_Number_Formats).


    Use the `getCompactNumberInstance()` factory method in the `NumberFormat` class
    to obtain an instance of the `CompactNumberFormat` class:


    - `NumberFormat getCompactNumberInstance()`

    - `NumberFormat getCompactNumberInstance(Locale, NumberFormat.Style formatStyle)`


    The no-args `getCompactNumberInstance()` method uses the default locale and the
    short number format.


    Listing [8-5](#419466_2_En_8_Chapter.xhtml#PC23) contains a complete program to
    demonstrate formatting numbers in their compact format. The program formats two
    integers in English-US, German-Germany, and Hindi-Indian locales. Notice the rounding
    of numbers in different locales.


    ```

    // CompactNumbers.java

    package com.jdojo.misc;

    import java.text.NumberFormat;

    import java.util.Locale;

    import static java.text.NumberFormat.Style.LONG;

    import static java.text.NumberFormat.Style.SHORT;

    public class CompactNumbers {

    public static void main(String[] args) {

    printCompact(24000, Locale.US);

    printCompact(1969, Locale.US);

    printCompact(24000, Locale.GERMANY);

    printCompact(1969, Locale.GERMANY);

    Locale hindiIndia = new Locale("hi", "IN");

    printCompact(24000, hindiIndia);

    printCompact(1969, hindiIndia);

    }

    public static void printCompact(int num, Locale locale) {

    NumberFormat shortFormatter

    = NumberFormat.getCompactNumberInstance(locale, SHORT);

    NumberFormat longFormatter

    = NumberFormat.getCompactNumberInstance(locale, LONG);

    String shortStr = shortFormatter.format(num);

    String longStr = longFormatter.format(num);

    System.out.printf("%s: %d, %s, %s%n",

    locale, num, shortStr, longStr);

    }

    }

    en_US: 24000, 24K, 24 thousand

    en_US: 1969, 2K, 2 thousand

    de_DE: 24000, 24.000, 24 Tausend

    de_DE: 1969, 1.969, 2 Tausend

    hi_IN: 24000, 24 हज़ार, 24 हज़ार

    hi_IN: 1969, 2 हज़ार, 2 हज़ार

    Listing 8-5

    Formatting Numbers in Their Compact Forms

    ```


