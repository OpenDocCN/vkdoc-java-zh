    $ ls -l pfp

    -rwxrwxr-x. 1 ksharan ksharan 341 Aug  3 09:20 pfp

    $ ./pfp

    /home/ksharan

    $ pfp

    bash: pfp: 未找到命令...

    $ export PATH=.:$PATH

    $ pfp

    /home/ksharan

    $ pwd

    /home/ksharan

    $

    ```


    请注意，你在 Linux 上的 `pfp` 命令与 Linux 的 `pwd` 命令功能相同。`pwd` 命令打印工作目录，`pfp` 命令也是如此。你能够用
    Java 实现一个 Linux 命令，难道不感到高兴吗？


    对运行 Java 源文件的 shebang 支持附带了一些规则。让我们先看看规则，然后再看几个示例：


    *   你也可以使用 `java` 命令配合 `--source` 选项，以源文件模式运行 shebang 文件。


    *   Shebang 文件不能有 `.java` 扩展名。


    第一条规则指出，你可以使用 `--source` 选项来运行 shebang 文件。考虑以下命令：


    ```

    $ java pfp

    错误：找不到或无法加载主类 pfp

    原因：java.lang.ClassNotFoundException: pfp

    $ java --source 13 pfp

    /home/ksharan

    $

    ```


    第一个命令尝试运行 `pfp` 文件，并生成一条错误信息，提示未找到 `pfp` 类。回想一下，当文件名包含 `.java` 扩展名或你使用了 `--source`
    选项时，`java` 命令会选择源文件模式。此命令两个条件都不满足，因此 `java` 命令选择了类文件模式，并尝试运行一个名为 `pfp` 的类。当前目录中没有任何名为
    `pfp` 的类，导致了此错误。


    第二个命令使用了 `--source` 选项，并且成功运行了 `pfp` 源文件。等等！`pfp` 文件的第一行是一个 shebang，它不是有效的 Java
    代码：


    ```

    #!/home/ksharan/java13/bin/java --source 13

    ```

    '
- fmt: 'Java 编译器是如何编译这个 shebang 行的？当你使用`--source`选项时，`java`命令会检查文件的第一行。如果第一行是 shebang，它会在将源代码传递给编译器之前移除第一行的内容，但保留最后一个字符——换行符。因此，编译器永远不会看到
    shebang；它看到的是所有有效的 Java 代码。现在你可能意识到，编译器并没有做任何修改来支持 Java 源文件中的 shebang。


    还有一个问题需要解答。为什么`java`命令不移除整个 shebang 行？你的 shebang 文件包含 Java 源代码，其中可能包含错误。假设在一个
    shebang 文件中，第六行包含一个错误。当编译器报告这个错误时，如果`java`命令移除了整个 shebang 行，你会看到这个错误被报告在第五行。为了保持错误报告中的行号一致，`java`命令会移除
    shebang 的内容，但保留最后一个换行符，这样源文件的行数保持不变，编译器在报告错误时会报告正确的行号。


    让我们讨论第二条规则。这条规则规定，要么你有一个没有扩展名或扩展名不是`.java`的 shebang 文件，要么你有一个扩展名为`.java`的有效 Java
    源文件。如果你的文件包含`.java`扩展名，文件中的内容将被视为 Java 源文件，不做任何修改。一个带有`.java`扩展名的 shebang 文件会在第一行（指定
    shebang 的行）导致错误。你可以换一种方式理解这条规则。带有`.java`扩展名的源文件是为学习 Java 语言的程序员准备的，而 shebang 文件则是为开发实用程序准备的。给你的实用程序添加扩展名并不是常见的做法。以下命令将`pfp`文件复制到`pfp.java`文件，并使用`java`命令运行`pfp.java`文件：


    ```

    $ cp pfp pfp.java

    $ java pfp.java

    pfp.java:1: error: illegal character: ''#''

    #!/home/ksharan/java13/bin/java --source 13

    ^

    pfp.java:1: error: class, interface, or enum expected

    #!/home/ksharan/java13/bin/java --source 13

    ^

    2 errors

    error: compilation failed

    $

    ```


    错误信息表明编译器试图将 shebang 作为 Java 代码进行编译，并失败了。


    你也可以向 shebang 文件中的`main()`方法传递参数。你可以将清单 [4-7](#419466_2_En_4_Chapter.xhtml#PC15)
    中的程序转换为 shebang 文件作为练习。将此文件保存为`stats`，向文件添加 shebang，并使其可执行。你应该能够像下面这样运行`stats`文件：


    ```

    $ stats 1 2 3 4 5

    DoubleSummaryStatistics{count=5, sum=15.000000, min=1.000000, average=3.000000,
    max=5.000000}

    $

    ```


    ## 总结


    用于运行 Java 应用程序的`java`命令被称为`java`启动器或`java`工具。它可以在以下四种模式下使用：


    *   类文件模式

    *   JAR 文件模式

    *   模块模式

    *   源文件模式


    类文件模式和 JAR 文件模式自 JDK 发布之初就已存在。模块模式是在 JDK 9 中添加的。源文件模式是在 JDK 11 中添加的。在源文件模式下，`java`命令从源文件运行
    Java 程序，无需你编译源文件。在源文件模式下，整个源代码必须包含在一个文件中。代码可以引用类路径上的其他代码。


    `java`命令在选择源文件模式时使用两个标准：


    *   命令行上第一个不是选项或选项一部分的项。如果该项是一个现有文件的名称且带有`.java`扩展名，则使用源文件模式。

    *   在命令行上使用`--source`选项会强制`java`命令使用源文件模式。如果你的源文件不包含`.java`扩展名，你必须使用`--source`选项才能使用源文件模式。


    在源文件模式下，`java`命令在运行代码之前，会使用`jdk.compiler`模块在内存中编译源代码。源文件中的第一个类型必须是一个带有`main()`方法的类。`java`命令会自动选择第一个顶层类来运行。


    在源文件模式下，源文件名之后指定的参数会被传递给所运行类的`main()`方法。


    你可以向`java`命令指定选定数量的编译器选项，这些选项将被传递给编译器以编译源文件。在源文件模式下，注解处理被禁用。编译器不强制执行文件名限制，即命名包中的类型应存在于一个文件名由类型名后跟`.java`扩展名组成的文件中。你可以在一个源文件中拥有任意数量的`public`类。


    `java`命令使用一个名为内存类加载器的自定义类加载器来加载源文件中的类。


    在 Java 11 中，如果从源文件运行的类也存在于类路径中，你会得到一个错误。内存类加载器委托给应用程序类加载器。也就是说，类路径上的类会在源文件中的类之前被加载。


    内存类加载器的行为在 Java 12 中发生了变化。在 Java 12 中，它在委托给应用程序类加载器之前，会先在源文件中搜索类。如果从源文件运行的类也存在于类路径中，那么在
    Java 12 中会运行源文件中的类，而不会像 Java 11 那样报错。


    如果你的源文件没有标准的`.java`文件扩展名，你必须使用`--source`选项配合`java`命令来运行这样的源文件。你也可以在你的源文件中包含一个
    shebang，并利用类 Unix 操作系统对 shebang 文件的支持来运行源文件。`java`命令在将源文件内容传递给编译器之前，会剥离 shebang（最后一个换行符除外）。


    一个带有`.java`扩展名和 shebang 的源文件将无法运行，因为编译器会尝试将 shebang 解释为 Java 源代码并失败。


    # 5. 增强的 Switch


    在本章中，你将学习


    *   什么是预览特性

    *   什么是`switch`语句和`switch`表达式

    *   对传统`switch`的增强

    *   关于`switch`的新语法

    *   关于使用新`switch`的规则

    *   关于`yield`语句'
  raw: 'How did the Java compiler compile this shebang line? When you use the --source
    option, the `java` command examines the first line in the file. If the first line
    is a shebang, it removes the contents on the first line, except the last character –
    the newline character – before passing the source code to the compiler. Therefore,
    the compiler never sees the shebang; it sees all valid Java code. Now you may
    realize that there was no changes to the compiler to support shebang in a Java
    source file.


    There is one more question to be answered. Why did the `java` command not remove
    the entire shebang line? Your shebang file contains Java source code, which may
    contain errors. Suppose in a shebang file the sixth line contains an error. When
    the compiler reports this error, you would have seen this error reported at fifth
    line if the `java` command had removed the entire shebang line. To keep the line
    numbers in error reporting the same, the `java` command removes the contents of
    the shebang, except the last newline character, so the number of lines in the
    source file remains the same and the compiler will report the correct line numbers
    in errors.


    Let us discuss the second rule. This rule states that either you have a shebang
    file with no extension or an extension other than `.java` or you have a valid
    Java source in a file with the `.java` extension. If your file contains the `.java`
    extension, the contents in the file are interpreted as Java source file without
    any modification. A shebang file with a .java extension will result in an error
    on the first line, which specifies the shebang. You can think of this rule another
    way. The source files with the `.java` extension are meant for programmers learning
    Java languages, whereas shebang files are meant for developing utility programs.
    It is not a common practice to give an extension to your utility programs. The
    following command copies the `pfp` file to `pfp.java` file and runs the `pfp.java`
    file using the `java` command:


    ```

    $ cp pfp pfp.java

    $ java pfp.java

    pfp.java:1: error: illegal character: ''#''

    #!/home/ksharan/java13/bin/java --source 13

    ^

    pfp.java:1: error: class, interface, or enum expected

    #!/home/ksharan/java13/bin/java --source 13

    ^

    2 errors

    error: compilation failed

    $

    ```


    The error message indicates that the compiler is trying to compile the shebang
    as Java code and fails.


    You can also pass arguments to the `main()` method in a shebang file. You can
    convert the program in Listing [4-7](#419466_2_En_4_Chapter.xhtml#PC15) to a shebang
    file as an exercise. Save this file as `stats`, add a shebang to the file, and
    make it executable. You should be able to run the `stats` file as follows:


    ```

    $ stats 1 2 3 4 5

    DoubleSummaryStatistics{count=5, sum=15.000000, min=1.000000, average=3.000000,
    max=5.000000}

    $

    ```


    ## Summary


    The `java` command to run a Java application is called the `java` launcher or
    the `java` tool. It can be used in the following four modes:


    *   Class-file mode


    *   JAR-file mode


    *   Module mode


    *   Source-file mode


    The class-file and JAR-file modes existed since the beginning of the JDK release.
    The module mode was added to JDK9\. The source-file mode was added to JDK11\.
    In the source-file mode, the `java` command runs a Java program from a source
    file without requiring you to compile the source file. In source-file mode, the
    entire source code must be contained in a single file. The code may reference
    other code on the class path.


    The `java` command uses two criteria in selecting the source-file mode:


    *   The first item on the command line that is not an option or part of an option.
    If this item is the name of an existing file with `.java` extension, the source-file
    mode is used.


    *   Using the `--source` option on the command line forces the `java` command
    to use the source-file mode. If your source file does not contain the `.java`
    extension, you must use the `--source` option to use the source-file mode.


    In source-file mode, the `java` command compiles the source code in memory using
    the `jdk.compiler` module before it runs the code. The first type in the source
    file must be a class with a `main()` method. The `java` command automatically
    selects the first top-level class to run.


    In source-file mode, arguments specified after the source file name are passed
    to the `main()` method of the class that is run.


    You can specify selected number of compiler options to the `java` command, which
    will be passed to the compiler to compile the source file. Annotation processing
    is disabled in the source-file mode. The compiler does not enforce the file name
    restriction that a type in a named package should exist in a file whose name is
    composed from the type name followed by the `.java` extension. You can have any
    number of `public` classes in a source file.


    The `java` command uses a custom class loader, called memory class loader, to
    load the classes in the source file.


    In Java 11, you get an error if the class being run from the source file also
    exists in the class path. The memory class loader delegates to the application
    class loader. That is, classes on the class path are loaded before classes from
    the source file.


    The behavior of the memory class loader changed in Java 12\. In Java 12, it searches
    the source file for classes before delegating to the application class loader.
    If the class being run from the source file is also present on the class path,
    the class from the source file is run in Java 12 without giving you an error as
    it did in Java 11.


    If your source file does not have the standard `.java` file extension, you must
    use the `--source` option with the `java` command to run such a source file. You
    can also include a shebang in your source file and use the UNIX-like operating
    system’s support for shebang files to run the source file. The `java` command
    strips the shebang, except the last newline character, before passing the source
    file contents to the compiler.


    A source file with the `.java` extension and a shebang will not run because the
    compiler will try to interpret the shebang as Java source code and will fail.


    # 5. Enhanced Switch


    In this chapter, you will learn


    *   What a preview feature is


    *   What a `switch` statement and a `switch` expression are


    *   Enhancements to the traditional `switch`


    *   About the new syntax for `switch`


    *   About the rules of using new `switch`


    *   About the `yield` statement'
