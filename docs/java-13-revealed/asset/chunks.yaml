    Listing [1-2](#419466_2_En_1_Chapter.xhtml#PC18) contains a test class to show
    you how to use the `var` restricted type name to declare local variables. I cover
    many more examples shortly. The comments in the code and the output make it obvious
    as to what is going on during the type inference. I do not explain the code any
    further.


    ```

    // VarTest.java

    package com.jdojo.typeinference;

    import java.util.List;

    import java.util.Arrays;

    import java.util.function.BiFunction;

    public class VarTest {

    public static void main(String[] args) {

    // The inferred type of personId is int

    var personId = 1001;

    System.out.println("personID = " + personId);

    // The inferred type of prompt is String

    var prompt = "Enter a message:";

    System.out.println("prompt = " + prompt);

    // You can use methods of the String class on prompt as you did

    // when you declared it as "String prompt = ..."

    System.out.println("prompt.length() = " + prompt.length());

    System.out.println("prompt.substring(0, 5) = "

    + prompt.substring(0, 5));

    // Use an explicit type name, double

    double salary = 1878.89;

    System.out.println("salary = " + salary);

    // The inferred type of luckyNumbers is List

    var luckyNumbers = List.of(9, 19, 1969);

    System.out.println("luckyNumbers = " + luckyNumbers);

    // The inferred type of cities is String[]

    var cities = new String[]{"Atlanta", "Patna", "Paris", "Gaya"};

    System.out.println("cities = " + Arrays.toString(cities));

    System.out.println("cities.getClass() = " + cities.getClass());

    System.out.println("\nList of cities using a for loop:");

    // The inferred type of the index, i, is int

    for (var i = 0; i  avg

    = (var n1, var n2) -> (n1 + n2) / 2.0;

    System.out.println("\nAverage of 10 and 20 is "

    + avg.apply(10, 20L));

    }

    }

    personID = 1001

    prompt = Enter a message:

    prompt.length() = 16

    prompt.substring(0, 5) = Enter

    salary = 1878.89

    luckyNumbers = [9, 19, 1969]

    cities = [Atlanta, Patna, Paris, Gaya]

    cities.getClass() = class [Ljava.lang.String;

    List of cities using a for loop:

    Atlanta

    Patna

    Paris

    Gaya

    List of cities using a for-each loop:

    Atlanta

    Patna

    Paris

    Gaya

    Average of 10 and 20 is 15.0

    Listing 1-2

    Using the var Restricted Type Name to Declare Local Variables

    ```


    I am sure you have many questions about local variable type inference covering
    different use cases. I attempt to cover most use cases in the next section with
    examples. I found the JShell tool, which is a command-line tool shipped with JDK
    9, invaluable to experiment with `var`. If you are not familiar with the JShell
    tool, refer to Chapter [23](https://doi.org/10.1007/978-1-4842-5407-3_23) of my
    book titled *Beginning Java 9 Fundamentals* (ISBN: 978-1484228432). I use JShell
    many times to show code snippets and results in next sections. Make sure to set
    the feedback mode to the JShell session to verbose, so JShell prints the variable
    declarations with inferred types when you use `var`. The following JShell session
