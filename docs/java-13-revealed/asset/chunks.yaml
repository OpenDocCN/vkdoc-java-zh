    ## 检测不一致的空白字符


    在文本块中对行进行缩进时，可能会无意中混用空格和制表符等空白字符。当文本块移除无关空白字符时，这可能导致不理想的缩进效果。有时，你可能希望保留文本块中某行末尾的空白字符，但文本块会自动将其移除。考虑以下文本块，开发者希望用四个空格缩进行星名称：


    ```

    String planets = """

    Mercury

    Venus

    Earth

    """;

    ```


    此文本块表示的字符串应如下所示：


    ```

    Mercury

    Venus

    Earth

    ```


    当打印此文本块时，输出如下：


    ```

    Mercury

    Venus

    Earth

    ```


    问题在于三行中前导空白字符的使用不一致。我混用了空格和制表符来对齐行星名称，使它们看起来比上一行的行星名称向右缩进了四个空格。制表符在不同编辑器中可能显示不同。有时，一个制表符等于四个空格，有时则等于八个空格。


    当文本块移除无关空白字符时，它会将每个空白字符计为一个，无论该空白字符使用的是哪种字符。例如，两个制表符和八个空格分别计为两个空白字符和八个空白字符，即使它们可能使两行内容在垂直方向上对齐到相同位置。


    你可能需要花些时间来找出混用空白字符进行缩进的文本块中的缩进问题。JDK 13 提供了一个名为 `text-blocks` 的 `lint`，你可以用它来在这种情况下获取警告。编译源代码时，你需要使用
    `-Xlint:text-blocks` 选项。该 lint 会发出两种警告：


    *   针对用于缩进行的前导空白字符使用不一致的警告，这可能导致不理想的缩进。


    *   针对尾部空白字符的警告，以便你知道尾部空白字符将被移除。如果需要保留尾部空白字符，请改用转义序列。


    清单 6-5 包含一个混用了前导空白字符和尾部空白字符的文本块。该程序未打印出预期的输出。根据编辑器的制表符设置，你的输出可能与这里显示的略有不同。


    ```

    // TextBlocksLinting.java

    package com.jdojo.textblock;

    public class TextBlocksLinting {

    public static void main(String[] args) {

    String planets = """

    Mercury

    Venus

    Earth

    """;

    System.out.println("Planets:\n" + planets);

    }

    }

    Planets:

    Mercury

    Venus

    Earth

    清单 6-5

    使用 text-blocks lint 识别文本块中的不一致空白字符

    ```


    编译 `TextBlocksLinting.java` 文件会打印出关于文本块中空白字符使用不一致以及尾部空白字符的警告：


    ```

    C:\Java13Revealed>javac --enable-preview --release 13 -Xlint:preview -Xlint:text-blocks
    -d build\modules\jdojo.textblock src\jdojo.textblock\classes\com\jdojo\textblock\TextBlocksLinting.java

    C:\Java13Revealed\src\jdojo.textblock\classes\com\jdojo\textblock\TextBlocksLinting.java:6:
    warning: [preview] text blocks are a preview feature and may be removed in a future
    release.

    String planets = """

    C:\Java13Revealed\src\jdojo.textblock\classes\com\jdojo\textblock\TextBlocksLinting.java:6:
    warning: [text-blocks] inconsistent white space indentation

    String planets = """

    C:\Java13Revealed\src\jdojo.textblock\classes\com\jdojo\textblock\TextBlocksLinting.java:6:
    warning: [text-blocks] trailing white space will be removed

    String planets = """

    warning: [preview] classfile for C:\Java13Revealed\build\modules\jdojo.textblock\module-info.class
    uses preview features of Java SE 13.

    4 warnings

    ```


    为避免在 NetBeans IDE 中混用空格和制表符进行缩进，你可以设置首选项，将制表符扩展为 `X` 个空格，其中 `X` 是一个数字，例如 4。你可以在
    Apache NetBeans 中通过选择 `工具` ➤ `选项` ➤ `编辑器` ➤ `格式设置` ➤ `将制表符扩展为空格` 来访问此选项。


    ## 总结


    自 Java 1.0 版本起，Java 就支持 `String` 字面量。`String` 字面量有一个很大的局限性：它必须在一行内表示。开发者经常需要在
    `String` 字面量中表示多行文本，这迫使他们使用字符串拼接。将多行文本作为 `String` 字面量使用，一直是 Java 开发者约 24 年来的痛点。Java
    语言设计者知道这个问题，并最终给予了关注。他们曾在 Java 12 中提出（后来撤回）对原始字符串的支持。在 Java 13 中，他们以语言预览特性的形式加入了对文本块的支持。


    文本块是由开始定界符和结束定界符括起来的零个或多个字符的序列。文本块的内容可以跨越多行，并且你不需要使用大多数转义序列。开始定界符以三个双引号字符（`"""`）开头，后面可选地跟零个或多个空格、制表符或换页符，并以行终止符结束。结束定界符由三个双引号字符（`"""`）组成。


    文本块是 `String` 类的一个实例。你可以在任何可以使用 `String` 字面量的地方使用文本块。


    文本块的内容由编译器转换，最终生成一个 `String` 字面量。运行时永远不会看到（或不知道）文本块。运行时只看到转换文本块后生成的 `String` 字面量。


    编译器分三个阶段执行文本块的转换。在第一阶段，它规范化行终止符。它将所有行终止符（CR、CRLF 和 LF）替换为 LF。


    在第二阶段，编译器移除所有非空行中共同的前导空白字符。空行是仅包含 LF 或后跟 LF 的空白字符的行。文本块中结束定界符的位置在计算要移除的前导空白字符数量时起着重要作用。如果你不想移除任何前导空白字符，请将结束定界符放在单独一行的开头。此阶段不解释转义序列。此阶段会移除所有行中的尾部空白字符。


    在转换的第三阶段也是最后阶段，编译器解释转义序列。


    `String` 类新增了三个实例方法来支持文本块：`formatted()`、`stripIndent()` 和 `translateEscapes()`。这些方法已被弃用，因为它们的存在是为了支持作为预览特性的文本块。`formatted()`
    方法用于使用格式说明符格式化文本块。`stripIndent()` 方法用于移除文本块中的无关空白字符。`translateEscapes()` 方法用于解释文本块中的转义序列。


    在源代码中，可能会无意中混用不同类型的空白字符（如空格和制表符）来缩进文本块中的行，这可能导致不理想的缩进。有时，你可能希望保留行尾的空白字符，但这些字符会被编译器自动移除。使用编译器的
    `-Xlint:text-blocks` 选项可以检测此类不一致的空白字符使用。当编译器检测到文本块中存在不一致的前导空白字符或尾部空白字符时，会打印警告。

