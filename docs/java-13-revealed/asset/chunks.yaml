    ## Creating HTTP Clients


    An HTTP request that is sent to a server needs to be configured so that the server
    knows which authenticator to use, the SSL configuration details, the cookie manager
    to be used, proxy information, the redirect policy if the server redirects the
    request, and so on. An instance of the `HttpClient` class stores these request-specific
    configurations, and they can be reused for multiple requests. You can override
    a few of these configurations on a per request basis. You need to use an `HttpClient`
    to send an HTTP request to a server. An `HttpClient` holds the following pieces
    of information that are used for all HTTP requests: an authenticator, a connection
    timeout, a cookie manager, an executor, a redirect policy, a request priority,
    a proxy selector, an SSL context, SSL parameters, and an HTTP version.


    An *authenticator* is an instance of the `java.net.Authenticator` class. It is
    used for HTTP authentication. The default is to use no authenticator. The HTTP
    Client API has built-in support for HTTP basic authentication.


    If the `HttpClient` cannot establish a new connection within the specified connection
    timeout, its `send()` method throws `HttpConnectTimeoutException` and its `sendAsync()`
    method completes exceptionally with `HttpConnectTimeoutException`. If a new connection
    is not needed – in the case of an established connection being reused – the connection
    timeout value has no effect.


    A *cookie handler* is used to handle HTTP cookies. It is an instance of the `java.net.CookieHandler`
    class. The default is to use no cookie handler.


    An *executor* is an instance of the `java.util.concurrent.Executor` interface,
    which is used to send and receive asynchronous HTTP requests and responses. A
    default executor is provided if it is not specified.


    A *redirect policy* is one of the constants of the `HttpClient.Redirect` enum
    that specifies how to handle redirects issued by the server. The default is `NEVER`,
    which means the redirects issued by the server are never followed.


    A *request priority* is the default priority for HTTP/2 requests, which can be
    between 1 and 256 (inclusive). It is a hint for the server to prioritize the request
    processing. A higher value means a higher priority.


    A *proxy selector* is an instance of the `java.net.ProxySelector` class that selects
    the proxy server to use. The default is not to use a proxy server.


    An *SSL context* is an instance of the `javax.net.ssl.SSLContext` class that provides
    an implementation for the secure socket protocol. A default `SSLContext` is provided,
    which works when you do not need to specify protocols or do not need client authentication.


    *SSL parameters* are parameters for SSL/TLS/DTLS connections. They are stored
    in an instance of the `javax.net.ssl.SSLParameters` class.


    An HTTP version is the version of HTTP, which is 1.1 or 2. It is specified as
    one of the constants of the `HttpClient.Version` enum: `HTTP_1_1` and `HTTP_2`.
    It requests a specific HTTP protocol version wherever possible. The default is
    `HTTP_2`. That is, if you do not set the HTTP version in the `HttpClient`, by
    default, it will try using HTTP/2. If the server does not support HTTP/2, it will
    downgrade to HTTP/1.1.


    ### Tip


    An `HttpClient` is immutable. A few of the configurations stored in an `HttpClient`
    may be overridden for HTTP requests when such requests are built.


    The `HttpClient` class is abstract and you cannot create its instances directly.
    There are two ways you can create instances of the `HttpClient` class:


    *   Using the `newHttpClient()` static method of the `HttpClient` class


    *   Using the `build()` method of the `HttpClient.Builder` interface


    The following snippet of code gets an `HttpClient`, which contains default configurations:


    ```java

    // Get an HttpClient with default configurations

    HttpClient defaultClient = HttpClient.newHttpClient();

    ```


    You can also create an `HttpClient` using the `HttpClient.Builder` interface.
    The `HttpClient.newBuilder()` static method returns a new instance of the `HttpClient.Builder`
    interface. The `HttpClient.Builder` interface provides a method for setting each
    configuration value. The value for the configuration is specified as the parameter
    of the method and the method returns the reference of the builder object itself,
    so you can chain multiple methods. In the end, call the `build()` method that
    returns a configured `HttpClient` object. The following statement creates an `HttpClient`
    with the redirect policy set to `ALWAYS`, the HTTP version set to 1.1, and connection
    timeout set to 2 seconds:


    ```java

    // Create an HttpClient with custom configurations

    HttpClient client = HttpClient.newBuilder()

    .followRedirects(ALWAYS)

    .version(HTTP_1_1)

    .connectTimeout(Duration.ofSeconds(2))

    .build();

    ```


    The `HttpClient` class contains a method corresponding to each configuration setting
    that returns the value for that configuration:


    *   `Optional<Authenticator> authenticator()`


    *   `Optional<Duration> connectTimeout()`


    *   `Optional<CookieHandler> cookieHandler()`


    *   `Optional<Executor> executor()`


    *   `HttpClient.Redirect followRedirects()`


    *   `Optional<ProxySelector> proxy()`


    *   `SSLContext sslContext()`


    *   `SSLParameters sslParameters()`


    *   `HttpClient.Version version()`


    There are no setter methods in the `HttpClient` class because the class is immutable.
    You cannot use an `HttpClient` by itself. You need to have an `HttpRequest` before
    you use an `HttpClient` to send a request to a server. I will explain the `HttpRequest`
    class in the next section. The `HttpClient` class contains the following three
    methods to send a request to a server:


    *   `<T> HttpResponse<T> send(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler)`


    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler)`


    *   `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest request, HttpResponse.BodyHandler<T>
    responseBodyHandler, HttpResponse.PushPromiseHandler<T> pushPromiseHandler)`


    The `send()` method sends the request synchronously, whereas the `sendAsync()`
    methods send the request asynchronously. The second version of the `sendAsync()`
    method lets you send a request asynchronously and process server push responses.
    I will cover these methods in more detail in subsequent sections.'
