    ## HTTP 客户端 API 的组成部分


    一次典型的 HTTP 通信包含一个请求和一个响应。客户端创建一个请求，该请求由 URL、标头和正文组成。请求被发送到由 URL 指示的服务器。服务器用一个响应来回应，该响应由状态码、标头和正文组成。HTTP
    客户端 API 提供了表示 HTTP 请求和响应的类。


    HTTP 客户端 API 规模很小。它包含不到 20 种类型，其中四种是主要类型。其他类型在你使用这四种类型之一时会用到。这个新的 API 也使用了旧版 HTTP
    API 中的一些类型。新的 API 位于 `java.net.http` 模块的 `java.net.http` 包中。如果你想在你的模块中使用 HTTP
    客户端 API，你的模块需要读取 `java.net.http` 模块。


    HTTP 客户端 API 中的四种主要类型如下：


    *   `HttpClient` 类

    *   `HttpRequest` 类

    *   `HttpResponse<T>` 接口

    *   `WebSocket` 接口


    `HttpClient` 充当一个容器，用于存储可用于多个 HTTP 请求的配置，而不是为每个请求单独设置它们。


    `HttpRequest` 表示一个可以发送到服务器的 HTTP 请求。一旦你创建了一个 `HttpRequest`，它就是不可变的，并且可以重复使用以多次发送相同的请求。


    `HttpResponse` 表示一个 HTTP 响应。你不需要创建 `HttpResponse`；相反，你将它作为服务器对 `HttpRequest` 的响应来接收。


    `WebSocket` 表示一个 WebSocket 客户端。你可以使用 Java EE 7 WebSocket API 或使用其他几种编程语言（如 Python、NodeJS
    等）来创建 WebSocket 服务器。本章不会向你展示如何创建 WebSocket 服务器。


    ### 提示


    `HttpClient` 是不可变的。存储在 `HttpClient` 中的一些配置在构建 HTTP 请求时可能会被覆盖。你不需要创建 `HttpResponse`；它会作为你发送给服务器的
    HTTP 请求的一部分返回给你。


    `HttpClient`、`HttpRequest` 和 `WebSocket` 的实例是使用构建器创建的。它们每个都包含一个名为 `Builder` 的嵌套接口，用于构建该类型的实例。


    HTTP 客户端 API 使用起来非常简单，你甚至可以用一条语句读取 HTTP 资源！下面的语句使用 `GET` HTTP 请求将 URL [`http://httpbin.org/ip`](http://httpbin.org/ip)
    的内容作为字符串读取，并将响应正文打印到标准输出：


    ```

    HttpClient.newHttpClient()

    .sendAsync(HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .build(), BodyHandlers.ofString())

    .thenApply(HttpResponse::body)

    .thenAccept(System.out::println)

    .join();

    ```


    如果这条语句看起来令人生畏，请不要担心。我会在将其分解为单独的语句，然后再重新组合成一条语句后，解释它的每个部分。在这一点上，你只需要知道新的 HTTP 客户端
    API 非常简单易用，你只需编写一条语句就可以读取 HTTP 资源。


    ## 设置示例


    本章中的许多示例都涉及与 Web 服务器交互。我没有为所有示例创建一个 Web 应用程序，而是使用了 `httpbin.org`，它支持多种类型的 HTTP
    和 HTTPS 通信以用于演示目的。如果你想在任何其他 Web 服务器上尝试这些示例，请随意将示例中的 URI 替换为你自己的。请注意，`httpbin.org`
    网站不是我的。它由 Kenneth Reitz 维护。我只是在本章的示例中使用这个网站。还有另一个网站 [`http://postman-echo.com`](http://postman-echo.com)
    提供了与 `httpbin.org` 类似的功能。


    所有 HTTP 客户端程序示例的代码都在 `jdojo.http.client` 模块中，其声明如清单 3-1 所示。


    ```

    // module-info.java

    module jdojo.http.client {

    requires java.net.http;

    exports com.jdojo.http.client;

    }

    清单 3-1

    一个名为 jdojo.http.client 的模块

    ```


    ## 快速示例


    让我们来看一个快速但完整的示例，你将向 Web 服务器发送一个 HTTP 请求，并打印响应的状态码和正文。HTTP 通信中的典型步骤如下：


    *   创建一个 `HttpClient` 来存储 HTTP 配置信息。

    *   创建一个 `HttpRequest` 并用要发送到服务器的信息填充它，例如 URI、标头、HTTP 方法、请求正文等。

    *   使用 `HttpClient` 将请求发送到服务器。

    *   从服务器接收一个 `HttpResponse<T>` 作为响应。

    *   处理 HTTP 响应，例如打印状态码和正文。


    你可以使用 `HttpClient` 类的 `newHttpClient()` 静态方法创建一个具有默认配置的 `HttpClient`：


    ```

    // 创建一个 HttpClient

    HttpClient client = HttpClient.newHttpClient();

    ```


    `HttpRequest` 类的 `newBuilder()` 静态方法返回一个构建器来创建 `HttpRequest`。你需要调用构建器的方法来设置请求的各个部分。最后，你需要调用
    `build()` 方法，该方法返回一个 `HttpRequest`：


    ```

    // 创建一个 HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .build();

    ```


    `HttpRequest.Builder` 使用的默认请求 HTTP 方法是 GET。你也可以通过在构建器上调用 `GET()` 方法来显式设置它：


    ```

    // 创建一个 HttpRequest

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .GET()

    .build();

    ```


    调用 `HttpClient` 的 `send()` 方法将请求发送到服务器，该方法同步发送请求——它会阻塞直到收到响应。在发送请求时，你需要指定一个正文处理器来处理响应正文。`HttpResponse.BodyHandlers`
    类的工厂方法提供了几个内置的正文处理器。例如，`BodyHandlers.ofString()` 静态方法返回一个正文处理器，用于将响应正文作为 `String`
    处理。`send()` 方法返回一个 `HttpResponse<T>`，其中类型参数 `T` 是正文处理器的类型。如果正文处理器是 `String` 类型，则
    `send()` 方法返回 `HttpResponse<String>`。`HttpResponse` 的 `statusCode()` 方法以 `int`
    形式返回 HTTP 状态码，其 `body()` 方法返回响应正文。`send()` 方法会抛出已检查异常 `IOException` 和 `InterruptedException`，因此你需要在代码中处理这些异常。以下代码片段展示了如何将请求发送到服务器并将其正文作为
    `String` 处理：


    ```

    // 将请求发送到服务器，并将响应正文作为 String 处理

    HttpResponse response

    = client.send(request, BodyHandlers.ofString());

    // 获取响应状态和正文

    int statusCode = response.statusCode();

    String body = response.body();

    ```


    清单 3-2 包含了向服务器发送请求并处理响应的完整程序。URL `http://httpbin/ip` 以 JSON 格式返回请求者的 IP 地址。该程序将
    JSON 数据作为 `String` 读取并打印到标准输出。状态码 200 表示成功。你可能会得到不同的输出。

