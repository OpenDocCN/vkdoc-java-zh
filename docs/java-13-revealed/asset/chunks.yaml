  trans: '

    ## 什么是文本块？


    文本块是由起始定界符和结束定界符括起来的零个或多个字符序列。文本块的内容可以跨越多行，并且你无需使用大多数转义序列。以下是使用文本块的语法：


    该语法允许将结束定界符放在单独的一行，或与文本块内容结束的同一行：


    起始定界符以三个双引号字符（`"""`）开头，后面可选地跟零个或多个空格、制表符或换页符，并以行终止符结束。


    结束定界符由三个双引号字符（`"""`）组成。


    文本块的内容是从起始定界符的行终止符之后立即开始，到结束定界符的第一个双引号之前立即结束的字符序列。


    文本块是 `String` 类的一个实例。在任何你使用过 `String` 字面量的地方，都可以使用文本块。以下是几个文本块的示例。每个示例都会打印文本块，以向你展示生成的字符串：


    ```

    String cities = """

    Panama

    Paris

    Patna""";

    System.out.println(cities);

    Panama

    Paris

    Patna

    ```


    此文本块与 `String` 字面量 `"Panama\nParis\nPatna"` 相同。


    如果你将结束定界符放在单独的一行，则会在文本块内容的末尾附加一个换行符（\n）。以下文本块与 `String` 字面量 `"Panama\nParis\nPatna\n"`
    相同：


    ```

    String cities = """

    Panama

    Paris

    Patna

    """;

    System.out.println(cities);

    Panama

    Paris

    Patna

    ```


    注意输出中的最后一行是一个空行，这是因为你将结束定界符放在了单独的一行。


    考虑以下代码片段：


    ```

    String cities = """

    Panama

    Paris

    Patna

    """;

    System.out.println(cities);

    Panama

    Paris

    Patna

    ```


    你对输出感到惊讶吗？输出中的最后一行是空的，因为你将结束定界符放在了单独的一行。内容中的三行都向左缩进了 16 个空格。这是因为你将结束定界符移到了行首。比较最后两个示例中结束定界符的位置。结束定界符的位置会影响文本块的格式。你需要掌握其背后的规则。我将在后续章节中解释文本块的所有格式规则。


    ### 提示


    文本块不是原始字符串——这意味着你输入的内容并不直接就是最终结果。文本块的内容会由编译器使用一组预定义的规则进行转换。


    让我们看几个在文本块中使用起始定界符的无效示例。回想一下，在起始定界符的三个双引号字符（`"""`）之后，可以包含空格、制表符和换行符。你必须以行终止符结束它。`"""`
    之后允许的字符是不可见字符。你不能为这些不可见字符使用转义序列。你只需在源代码中将其作为不可见字符输入即可。以下是无效的文本块，它们会产生编译时错误：


    ```

    // 起始定界符中缺少行终止符。

    String str = """Hello

    """;

    // 起始定界符中缺少行终止符。你可以在起始定界符中输入制表符，

    // 但不能使用转义序列 \t。

    String str = """\t

    Hello

    """;

    // 起始定界符中缺少行终止符。

    String str = """Hello""";

    ```


    ### 提示


    文本块中的起始定界符必须使用行终止符放在单独的一行，并且文本块的内容必须从下一行开始。


    ## 文本块是一项预览特性


    文本块是 Java 13 中的一项语言预览特性。有关预览特性的更多详细信息，请参阅第 5 章。第 5 章还解释了如何编译和运行使用 Java 预览特性的 Java
    程序。


    ## 文本块会被转换


    让我们从两个问题开始。文本块是原始字符串吗？文本块是多行 `String` 字面量吗？这两个问题的答案既是“是”也是“否”。在某种程度上，文本块既是原始字符串又是多行
    `String` 字面量；在某种程度上，它两者都不是。为了澄清答案，让我们定义一下*原始*字符串和*多行* `String` *字面量*的含义。


    原始字符串意味着字符串不经过任何处理。术语*原始*意味着“不以任何方式改变”。这不是你从文本块中得到的结果。文本块在最终生成字符串之前会经过转换。因此，文本块肯定不是
    100% 的*原始*字符串。


    那么文本块是多行 `String` 字面量呢？同样，术语*字面量*意味着它被原样表示。文本块并非如此，因为它会被转换。


    从另一方面来看，文本块确实保留了原始字符串的大部分（如果不是全部）内容，并允许你将字符串跨越多行。从这个意义上说，它部分是原始的和多行的。


    文本块有时被称为多行 `String` 字面量。即使是定义了文本块特性的 JEP 355，也将其称为多行 `String` 字面量。如果你想将其称为多行 `String`
    字面量，我建议你称其为*带转换的多行* `String` *字面量*，这能让读者真正理解它是什么。


    编译器使用一组预定义的规则来转换文本块的内容。转换后得到的字符串在类文件中被表示为 `String` 字面量。运行时对文本块一无所知。现在你可能明白为什么我称其为*带转换的多行
    String 字面量*了。

    '
- fmt: '### Tip


    You have a way to opt out of some transformations in a text block, and you are,
    by default, opted in for other transformations. Automatic transformations of text
    blocks are designed to work for you as is in most common cases.


    Before I explain the transformation rules for a text block, let us have a quick
    example with complete code. All programs in this chapter are in the `jdojo.textblock`
    module as defined in Listing [6-1](#419466_2_En_6_Chapter.xhtml#PC13).


    ```

    // module-info.java

    module jdojo.textblock {

    exports com.jdojo.textblock;

    }

    Listing 6-1

    The Declaration of a Module Named jdojo.textblock

    ```


    Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14) contains a few text blocks entered
    differently by placing the closing delimiter at different positions. The output
    shows the resulting strings.


    ```

    // TextBlocks.java

    package com.jdojo.textblock;

    public class TextBlocks {

    public static void main(String[] args) {

    String html1 = """


    Hello, HTML


    """;

    System.out.println("html1:\n" + html1);

    String html2 = """


    Hello, HTML


    """;

    System.out.println("html2:\n" + html2);

    // An empty String. Same as ""

    String empty1 = """

    """;

    System.out.println("empty1: " + empty1);

    System.out.println("empty1.length(): " + empty1.length());

    // An empty String. Same as ""

    String empty2 = """

    """;

    System.out.println("empty2: " + empty2);

    System.out.println("empty2.length(): " + empty2.length());

    // Looks like an empty string, but it is not. Same as "\n"

    String empty3 = """

    """;

    System.out.println("empty3: " + empty3);

    System.out.println("empty3.length(): " + empty3.length());

    }

    }

    html1:


    Hello, HTML


    html2:


    Hello, HTML


    empty1:

    empty1.length(): 0

    empty2:

    empty2.length(): 0

    empty3:

    empty3.length(): 1

    Listing 6-2

    A Few Examples of Text Blocks

    ```


    By this time, you should be convinced that placement of the closing delimiter
    in a text block has a significant effect on how the content of the text block
    is transformed. The transformation happens to whitespaces in the content – some
    for consistency across platforms and some for covering common use cases. Let us
    consider the following HTML code:


    ```

    String html = """


    Hello, HTML


    """;

    ```


    This HTML code contains a lot of spaces. Spaces are not visible in the source
    code. To visualize the spaces, I rewrote it to show spaces as dots:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..............""";

    ```


    The first line contains 14 leading spaces and no trailing spaces, the second line
    18 leading spaces and 4 trailing spaces, the third line 22 leading spaces and
    1 trailing space, and so on.


    It is very likely that the author of this code did not want to use the first 14
    leading spaces in any of the lines in the content. These spaces exist as part
    of the indentation to align the content of the code with other part of the code.
    It is very likely that the four spaces before the `<body>` in the second line
    are part of the intended indentation and the developer wants to keep it. Undoubtedly,
    the developer did not want any trailing spaces in any line of the content; they
    exist most likely because they were copied and pasted from another source. If
    you must read the developer’s intent for the string to store in the `html` variable,
    you may guess it as follows, which does not contain 14 leading spaces and does
    not contain any trailing spaces. I show spaces as dots for better visualization:


    ```

    ....

    ........Hello, HTML

    ....


    ```


    Didn’t you get this as the output for the `html1` variable in Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14)?
    Yes. You did. The rules for transformation of a text block cover such common cases
    by default. Let us look at the text block for `html2` variable in Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14)
    using dots for spaces for better visualization:


    ```

    String html2 = """

    ...............

    ...................

    .......................Hello, HTML

    ...................

    ...............

    .............""";

    ```


    The first line of the content contains 15 leading spaces, the second 19, the third
    23, the fourth 19, the fifth 15, and the sixth 13. The content does not include
    any trailing spaces in any lines. The resulting string after transformation is
    the same as you saw in the output for the variable `html2` in Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14).
    The following is the string represented by the text block. I have shown spaces
    as dots for better visualization:


    ```

    ..

    ......

    ..........Hello, HTML

    ......

    ..

    ```


    In this text block, it is assumed that the developer wanted to left-align the
    content on each line starting with two spaces on the first line and using four
    spaces to nest HTML tags. This is the assumption made by the compiler during the
    transformation.


    It is common in Java programs to vertically align the content of a text block
    with other part of the program such as the variable name, assignment operator,
    and the first double quote character in the opening delimiter. These whitespaces
    appear as leading whitespaces in the content on each line. Unintended trailing
    whitespaces may appear on a line. Leading whitespaces may appear in the content
    for indentation purpose such as indenting nested tags in HTML code.


    The whitespaces that are part of the text block that the developer meant to keep
    in the content after transformation are known as *essential whitespaces*. Whitespaces
    in the content that exist as part of the indentation in the source code, but the
    developer does not mean to keep them in the final string, are known as *incidental
    whitespaces.*


    The compiler removes the incidental whitespaces from all non-blank lines in the
    content. The starting position of the closing delimiter can be used to control
    the incidental whitespaces in a text block. Trailing whitespaces are always considered
    incidental, and the compiler always removes them. In the next few sections, I
    will explain the rules applied by the compiler to transfer text blocks.


    ## Transformation Rules


    The compiler transforms a text block in three stages. Each stage processes different
    types of characters, and they serve different purposes. Transformation to the
    following types of characters is applied in order:


    - Line terminators

    - Incidental whitespaces

    - Escape sequences


    Let us dive deep into each type of these transformations. These rules may be a
    little overwhelming at first. Do not worry if you do not understand some rules.
    After I cover a rule, I present several examples explaining each step in the rule
    with the strings before and after transformation.'
  raw: '### Tip


    You have a way to opt out of some transformations in a text block, and you are,
    by default, opted in for other transformations. Automatic transformations of text
    blocks are designed to work for you as is in most common cases.


    Before I explain the transformation rules for a text block, let us have a quick
    example with complete code. All programs in this chapter are in the `jdojo.textblock`
    module as defined in Listing [6-1](#419466_2_En_6_Chapter.xhtml#PC13).


    ```

    // module-info.java

    module jdojo.textblock {

    exports com.jdojo.textblock;

    }

    Listing 6-1

    The Declaration of a Module Named jdojo.textblock

    ```


    Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14) contains a few text blocks entered
    differently by placing the closing delimiter at different positions. The output
    shows the resulting strings.


    ```

    // TextBlocks.java

    package com.jdojo.textblock;

    public class TextBlocks {

    public static void main(String[] args) {

    String html1 = """


    Hello, HTML


    """;

    System.out.println("html1:\n" + html1);

    String html2 = """


    Hello, HTML


    """;

    System.out.println("html2:\n" + html2);

    // An empty String. Same as ""

    String empty1 = """

    """;

    System.out.println("empty1: " + empty1);

    System.out.println("empty1.length(): " + empty1.length());

    // An empty String. Same as ""

    String empty2 = """

    """;

    System.out.println("empty2: " + empty2);

    System.out.println("empty2.length(): " + empty2.length());

    // Looks like an empty string, but it is not. Same as "\n"

    String empty3 = """

    """;

    System.out.println("empty3: " + empty3);

    System.out.println("empty3.length(): " + empty3.length());

    }

    }

    html1:


    Hello, HTML


    html2:


    Hello, HTML


    empty1:

    empty1.length(): 0

    empty2:

    empty2.length(): 0

    empty3:

    empty3.length(): 1

    Listing 6-2

    A Few Examples of Text Blocks

    ```


    By this time, you should be convinced that placement of the closing delimiter
    in a text block has a significant effect on how the content of the text block
    is transformed. The transformation happens to whitespaces in the content – some
    for consistency across platforms and some for covering common use cases. Let us
    consider the following HTML code:


    ```

    String html = """


    Hello, HTML


    """;

    ```


    This HTML code contains a lot of spaces. Spaces are not visible in the source
    code. To visualize the spaces, I rewrote it to show spaces as dots:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................

    ..............""";

    ```


    The first line contains 14 leading spaces and no trailing spaces, the second line
    18 leading spaces and 4 trailing spaces, the third line 22 leading spaces and
    1 trailing space, and so on.


    It is very likely that the author of this code did not want to use the first 14
    leading spaces in any of the lines in the content. These spaces exist as part
    of the indentation to align the content of the code with other part of the code.
    It is very likely that the four spaces before the `<body>` in the second line
    are part of the intended indentation and the developer wants to keep it. Undoubtedly,
    the developer did not want any trailing spaces in any line of the content; they
    exist most likely because they were copied and pasted from another source. If
    you must read the developer’s intent for the string to store in the `html` variable,
    you may guess it as follows, which does not contain 14 leading spaces and does
    not contain any trailing spaces. I show spaces as dots for better visualization:


    ```

    ....

    ........Hello, HTML

    ....


    ```


    Didn’t you get this as the output for the `html1` variable in Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14)?
    Yes. You did. The rules for transformation of a text block cover such common cases
    by default. Let us look at the text block for `html2` variable in Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14)
    using dots for spaces for better visualization:


    ```

    String html2 = """

    ...............

    ...................

    .......................Hello, HTML

    ...................

    ...............

    .............""";

    ```


    The first line of the content contains 15 leading spaces, the second 19, the third
    23, the fourth 19, the fifth 15, and the sixth 13\. The content does not include
    any trailing spaces in any lines. The resulting string after transformation is
    the same as you saw in the output for the variable `html2` in Listing [6-2](#419466_2_En_6_Chapter.xhtml#PC14).
    The following is the string represented by the text block. I have shown spaces
    as dots for better visualization:


