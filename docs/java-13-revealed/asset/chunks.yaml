    ## 摘要


    Java 已采用一种新的基于时间的发布模式，即每 6 个月发布一个特性版本，每 3 个月发布一个更新版本，每 3 年发布一个长期支持（LTS）版本。新的特性版本将于每年
    3 月和 9 月发布，从 2018 年 3 月的 Java 10 开始。更新版本将于每年 1 月、4 月、7 月和 10 月发布。LTS 版本将从 2018
    年 9 月起每 3 年发布一次。


    JDK 9 中改进了 JDK 不直观的版本编号方案。一个 JDK 版本字符串按顺序包含以下四个元素，其中只有第一个是必需的：版本号、预发布信息、构建信息和附加信息。正则表达式“`$vnum(-$pre)?(\+($build)?(-$opt)?)?"`
    定义了版本字符串的格式。在 JDK 9 中，`$vnum` 由四部分组成：`$major.$minor.$security(.$additionalInfo)`。从
    JDK 10 开始，`$vnum` 由五部分组成：`$feature.$interim.$update.$patch(.$addtionalInfo)`。JDK
    10 中 `$vnum` 的 `$feature`、`$interim`、`$update` 元素在 JDK 9 中分别被称为 `$major`、`$minor`
    和 `$security`。


    短版本字符串仅包含前两个元素——一个版本号，可选地后跟预发布信息。你可以拥有像“10”这样仅包含主版本号的短版本字符串，也可以拥有像“10.0.1.1-ea+54-20180210.07.36am”这样包含所有元素的完整版本字符串。


    JDK 9 添加了一个名为 `Runtime.Version` 的静态嵌套类，其实例代表 JDK 版本字符串。该类没有公共构造函数。你可以使用 `Runtime`
    类的 `version()` 静态方法获取 JRE 的当前版本。该方法返回一个 `Runtime.Version`。你可以使用 `Runtime.Version`
    类的 `parse(String vstr)` 静态方法来解析版本字符串，从而获得一个 `Runtime.Version`。如果版本字符串为 `null`
    或无效，`parse()` 方法可能会抛出运行时异常。该类包含多个方法来获取版本字符串的不同部分。


    JDK 10 新增了两个系统属性，名为 `java.version.date` 和 `java.vendor.version`。`java.version.date`
    系统属性包含当前 JDK 版本的通用可用性（GA）日期，格式为 ISO-8601 `YYYY-MM-DD`。`java.vendor.version` 系统属性是供应商特定的产品版本字符串，它是可选的，由
    JDK 供应商分配。


    `Runtime.Version` 类包含多个方法来比较和检索版本字符串的不同部分。例如，你可以使用 `feature()` 方法获取版本字符串的 `$feature`
    元素。`Runtime.Version` 类中的 `major()`、`minor()` 和 `security()` 方法已在 JDK 10 中弃用；请改用该类的
    `feature()`、`interim()` 和 `update()` 方法。


    # 3. HTTP 客户端 API


    在本章中，你将学习


    *   什么是 HTTP 客户端 API


    *   如何创建 HTTP 客户端


    *   如何发起 HTTP 请求


    *   如何接收和处理 HTTP 响应


    *   如何使用服务器推送将未经请求的数据从服务器推送到客户端


    *   如何使用 HTTP 基本认证来验证对服务器上资源的访问


    *   如何创建 WebSocket 客户端端点


    JDK 9 和 10 将 HTTP 客户端 API 作为孵化器模块提供。JDK 11 将其作为名为 `java.net.http` 的标准模块包含在内。其类型位于
    `java.net.http` 包中。


    ## 什么是 HTTP 客户端 API？


    Java 从非常早期的版本就支持 HTTP 客户端 API。旧版 API 支持 HTTP/1.1，它由 `java.net` 包中的几个类和接口组成。`URLConnection`
    是表示通信的基类，而 `HttpURLConnection` 是表示 HTTP 通信的类。旧版 API 存在以下问题：


    *   它被设计为支持多种协议，如 http、ftp、gopher 等，其中许多协议已不再使用。


    *   它过于抽象且难以使用。


    *   它包含许多未记录的行为。


    *   它仅支持一种模式，即阻塞模式，这要求每个请求/响应都有一个线程。


    *   它不支持 HTTP/2。


    2015 年 5 月，互联网工程任务组（IETF）发布了 HTTP/2 的规范。有关 HTTP/2 规范的完整文本，请参阅网页 [`https://tools.ietf.org/html/rfc7540`](https://tools.ietf.org/html/rfc7540)。HTTP/2
    并未修改应用层语义。也就是说，你在应用程序中了解并一直使用的 HTTP 协议内容没有改变。它采用了一种更高效的方式来准备数据包并将其在客户端和服务器之间通过线路发送。你之前了解的关于
    HTTP 的所有内容，例如 HTTP 标头、方法、状态码、URL 等，都保持不变。HTTP/2 试图解决 HTTP/1.1 连接面临的许多与性能相关的问题：


    *   HTTP/2 支持二进制数据交换，而不是 HTTP/1.1 支持的文本数据。


    *   HTTP/2 支持多路复用和并发，这意味着在单个 TCP 连接的两个方向上可以同时进行多个数据交换，并且可以乱序接收对请求的响应。这消除了对等点之间建立多个连接的开销，而这在使用
    HTTP/1.1 时通常是必需的。在 HTTP/1.1 中，必须按照发送请求的顺序接收响应，这被称为*队头*阻塞。HTTP/2 通过在同一 TCP 连接上启用多路复用解决了队头阻塞问题。


    *   客户端可以建议请求的优先级，服务器在确定响应优先级时可能会遵循该建议。


    *   HTTP 标头被压缩，这显著减小了标头大小，从而降低了延迟。


    *   它允许将资源从服务器未经请求地推送到客户端，这称为服务器推送。


    JDK 11 中的 HTTP 客户端 API 没有更新现有的 HTTP/1.1 API，而是提供了一个同时支持 HTTP/1.1 和 HTTP/2 的新 API。其目的是
    HTTP 客户端 API 最终将取代 `URLConnection` 类提供的旧 API。新 API 还包含用于使用 WebSocket 协议开发客户端应用程序的类和接口。有关完整的
    WebSocket 协议规范，请参阅网页 [`https://tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455)。与旧版
    API 相比，新的 HTTP 客户端 API 具有多项优势：


    *   它很简单。对于大多数常见情况，它易于学习和使用。


    *   它使用 Java 9 中引入的 Flow API，通过响应式流处理请求和响应体。


    *   它支持服务器推送，允许服务器将资源推送到客户端，而无需客户端显式请求这些资源。它使得与服务器建立 WebSocket 通信变得简单。


    *   它支持 HTTP/2 和 HTTPS/TLS 协议。


    *   它可以在同步（阻塞）和异步（非阻塞）模式下工作。

