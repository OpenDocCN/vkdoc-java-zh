    ## Switch 表达式是一种多态表达式


    Java 中的多态表达式是一种其类型取决于上下文的表达式。因此，同一个多态表达式在不同上下文中可以呈现不同的类型。`switch` 表达式就是一种多态表达式。如果其目标类型已知，则其类型即为该目标类型。如果其目标类型未知，则其类型通过组合每个
    `switch` 标签的类型来计算得出。请看以下代码片段：


    ```

    int count = 2;

    double value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> 1.5F;

    };

    ```


    这个 `switch` 表达式的目标类型是 `double`，也就是 `value` 变量的类型。因此，该 switch 表达式的类型是 `double`。编译器还会检查每个
    `switch` 标签产生的值类型是否与 `switch` 表达式的目标类型赋值兼容。在此例中，`switch` 标签分别产生了 `int` (10)、`double`
    (20.4) 和 `float` (1.5F) 类型的值。`int`、`double` 和 `float` 这三种类型都与目标类型 `double` 赋值兼容。


    请看以下代码片段。它能编译通过吗？


    ```

    int count = 2;

    int value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> 1.5F;

    };

    ```


    这段代码无法编译通过。`switch` 表达式的目标类型是 `int`，也就是 `value` 变量的声明类型。而两个 `switch` 标签产生的 `double`
    和 `float` 类型的值与 `int` 类型不赋值兼容。这就是这段代码无法编译的原因。


    请看以下代码片段。它能编译通过吗？


    ```

    int count = 2;

    var value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> 1.5F;

    };

    ```


    这段代码可以正常编译。注意这里使用 `var` 来声明 `value` 变量。这次，`switch` 表达式的目标类型是未知的。编译器必须通过查看每个 `switch`
    标签来计算 `switch` 表达式的类型。`switch` 标签产生了 `int`、`double` 和 `float` 类型的值。编译器使用类型拓宽规则，计算出
    `double` 作为 `switch` 表达式的类型。请记住，由于使用了 `var`，编译器必须推断 `value` 变量的类型。该类型将被推断为 `double`，这与计算出的
    `switch` 表达式类型相同。


    请看以下代码片段。它能编译通过吗？


    ```

    int count = 1;

    var value = switch (count) {

    case 1-> 10;

    case 2-> 20.4;

    default-> "what";

    };

    ```


    如果你猜测这段代码无法编译，那你就错了。它可以正常编译。现在你可能好奇这个 `switch` 表达式计算出的类型是什么。编译器使用以下步骤：


    *   switch 标签产生了三种类型的值：`int`、`double` 和 `String`。


    *   这些类型是混合的——两种基本类型和一种引用类型。


    *   基本类型被提升为引用类型 `Integer` 和 `Double`。


    *   编译器查找 `Integer`、`Double` 和 `String` 之间的公共类型。编译器计算出一个类型，该类型是这三种类型所有公共类型的并集。这三种类型都实现了四个接口：`Serializable`、`Comparable`、`Constable`
    和 `ConstantDesc`。计算出的 `switch` 表达式类型是这四个接口的组合。


    那么，前面代码片段中 `switch` 表达式的类型是什么呢？如下所示：


    ```

    Serializable&Comparable&Constable&ConstantDesc>&Constable&ConstantDesc

    ```


    这是一种不可表示类型。也就是说，只有编译器可以在字节码中使用这种类型。你不能在源代码中使用（或表示）这种类型。要亲自验证这一点，你可以使用 JShell 运行这段代码。确保使用
    `--enable-preview` 选项启动 JShell，并将反馈模式设置为 `verbose`，如下所示：


    ```

    C:\Java13Revealed>jshell --enable-preview

    |  Welcome to JShell -- Version 13

    |  For an introduction type: /help intro

    jshell> /set feedback verbose

    |  Feedback mode: verbose

    jshell> int count = 2;

    count ==> 2

    |  created variable count : int

    jshell> var value = switch (count) {

    ...> case 1-> 10;

    ...> case 2-> 20.4;

    ...> default-> "what";

    ...> };

    value ==> 20.4

    |  created variable value : Serializable&Comparable&java.lang.constant.Constable&java.lang.constant.ConstantDesc>&java.lang.constant.Constable&java.lang.constant.ConstantDesc

    jshell> /exit

    |  Goodbye

    C:\Java13Revealed>

    ```


    ## yield 语句


    新的 `switch` 表达式引入了一个名为 `yield` 语句的新语句。将 `yield` 作为语句对现有代码有一些影响。如果你有一个使用非限定语法调用的
    `yield()` 方法，它可能会破坏现有代码。让我们通过一个例子来理解这条规则。考虑以下 `yield` 语句：


    ```

    yield(10);

    ```


    在 `yield` 成为语句之前，这绝对是一个方法调用。也就是说，它会通过传递值 10 来调用一个名为 `yield` 的方法。


    引入 `switch` 表达式之后，该语句将被解释为一个产生值 10 的 `yield` 语句，并且它只允许在 `switch` 表达式中使用。请注意，在
    10 周围使用括号并不会使其成为方法调用，因为现在 `yield` 是一个语句，而 (10) 是其值。以下所有变体都将被视为 `yield` 语句——空格和括号没有区别：


    ```

    yield 10;

    yield (10);

    yield(10);

    ```


    如果你现有的代码中有非限定的 `yield()` 方法调用，你需要修改它们，使其成为限定的方法调用。也就是说，如果你现有的代码中有 `yield(x)`，你需要将其更改为
    `xxx.yield(x)`，其中 `xxx` 可以是 `this`、类名或引用变量名，具体取决于上下文。


    随着 `switch` 表达式的引入，`yield` 成为一个*受限标识符*。它在某些上下文中的使用受到限制。你不能将 `yield` 用作类型名称，例如类名或接口名。但是，你可以将
    `yield` 用作方法名和变量名。为了向后兼容，允许将 `yield` 用作方法，因为 Java 中的 `Thread` 类包含一个 `yield` 方法，并且在极少数情况下，你可能已经将你的方法命名为
    `yield`。


    清单 5-8 包含一个完整的程序，展示了如何将 yield 用作方法/变量名以及如何调用此类方法。你必须使用 `NoYieldAsTypeName.yield()`
    语法来调用 `yield()` 方法。


    ```

    // NoYieldAsTypeName.java

    package com.jdojo.enhancedswitch;

    public class NoYieldAsTypeName {

    public static void main(String[] args) {

    // 必须使用类名限定才能调用 yield() 方法

    NoYieldAsTypeName.yield();

    NoYieldAsTypeName.yield(100);

    // 以下非限定调用会产生编译时错误

    //yield();

    //yield(10);

    int yield = 200;

    System.out.println("变量名 yield 是允许的: " + yield);

    }

    public static void yield() {

    System.out.println("方法名 yield 是允许的。");

    }

    public static void yield(int x) {

    System.out.println("方法名 yield 是允许的: " + x);

    }

    }

    方法名 yield 是允许的。

    方法名 yield 是允许的: 100

    变量名 yield 是允许的: 200

    清单 5-8

    将 yield 用作方法和变量名

    ```


    ## 混合使用 Switch 标签语法


    声明 `switch` 标签有两种语法——一种使用冒号（`:`），一种使用箭头（`->`）。在一个 `switch` 中，你不能混合使用这两种语法。以下代码片段无法编译：


    ```

    int count = 1;

    int value = switch (count) {

    case 1-> 10;

    case 2: yield 20;

    default-> 30;

    };

    错误：switch 中使用了不同的 case 种类

    case 2: yield 20;

    1 个错误

    ```

    '
- fmt: '# Summary


    A preview feature of the Java SE Platform is a fully specified and fully implemented
    language or virtual machine feature, which is available in a JDK feature release,
    but is not a permanent feature of the JDK yet. A preview feature is provided to
    solicit developer feedback. You must use the `--enable-preview` option with the
    compiler and runtime to use a preview feature. You must use the `--release` or
    `-source` option when you use the `--enable-preview` option to compile the source
    code. You must start the JShell with `--enable-preview` option to use any preview
    features in JShell.


    Java 12 added enhanced `switch` as a preview feature. The feature stays as a preview
    feature in Java 13 with one change where the `break` with a value statement in
    Java 12 is replaced with the `yield` statement in Java 13.


    In Java 13, you have two flavors of `switch` – the traditional `switch` and a
    new `switch`. You use an arrow (`->`) to separate a switch label from the label’s
    code in new `switch` as opposed to a colon (`:`) in old switch. You cannot mix
    the two `switch` label syntax in the same `switch`. The enhanced `switch` can
    be used as a statement as well as an expression.


    The new `switch` makes developers’ life a little easier while writing and debugging
    code. It does not have the `default` fall-through – only one `switch` label can
    be executed at a time. The code associated with a `switch` label can be an expression,
    a block statement, or a `throw` statement.


    The enhanced `switch` – both traditional `switch` and new `switch` – allows multiple
    comma-separated case constants in a `case` label.


    To support `switch` expressions, Java 13 added a new statement called the `yield`
    statement. It can be used only in `switch` expressions to yield a value. The value
    yielded by a `yield` statement becomes the value of the `switch` expression. A
    control transfer statement such as `break`, `continue`, and `return` is not allowed
    in a `switch` expression.


    The compile checks that all possible values of the `selector-expression` in a
    `switch` expression are covered by `switch` labels. Otherwise, a compile-time
    error occurs. If a `switch` expression is based on an enum type and all enum constants
    are covered by the `switch` labels and there is no `default` label, the compiler
    adds a `default` label that throws an `IncompatibleClassChangeError`. This implicit
    `default` label helps you debug the code when new constants are added to the enum
    and the switch expression is executed with the new enum constants. The implicit
    `default` label gives you a better error message that helps you identify the issue
    quickly.


    A `switch` expression is a poly expression whose type depends on the context.
    If the `switch` expression has a known target type, the type of the `switch` expression
    is the target type. If the target type is unknown, a stand-alone type is computed
    by combining the types of values yielded from all `switch` labels.


    `yield` is a restricted identifier. You cannot use `yield` as a type name such
    as a class name or an interface name. However, you can use `yield` as a method
    name and a variable name. You cannot use unqualified `yield()` as a method call.
    If your existing code contains unqualified `yield()` method calls, you will need
    to change them to qualified method calls to avoid the compile-time errors.


    # 6. Text Blocks


    In this chapter, you will learn


    *   What text blocks are

    *   How to represent text blocks in your code

    *   The formatting rules for text blocks

    *   Changes to the `String` API to support text blocks

    *   How to detect inconsistent use of whitespaces in text blocks


    ## The Background


    Rarely you write a Java program without dealing with strings. Java supports strings
    as instances of the `String` class since version 1.0. It also supports `String`
    literals, which are sequences of zero or more characters enclosed in double quotes.
    `String` literals are represented in the source code, and they are instances of
    the `String` class. The biggest pain points in using `String` literals are


    *   If a string literal does not fit into a single line, you need to break them
    into smaller strings and use string concatenation operator (`+`) to assemble them
    back into one string.

    *   If you have a string that contains line terminators, you need to embed the
    newlines as escape sequences (`\n`) in the string and use string concatenation
    operator (`+`).

    *   If your string contains double quotes, you need to represent them using the
    escape sequence `\"` in your string.


    These problems in using `String` literals make it cumbersome to write Java code
    with strings and have a huge readability issue. Suppose you want to represent
    a list of three cities – each on a separate line. Here is how you achieve it using
    a `String` literal:


    ```

    String cities = "Panama\nParis\nPatna\n";

    ```


    You may agree that this is not very readable. You lose the visual sense that it
    contains three lines – each containing a city name. Here is another attempt to
    achieve the same:


    ```

    String cities = "Panama\n" +

    "Paris\n" +

    "Patna\n";

    ```


    This time, it has little better readability, but still contains visual clutters
    in the form of escape sequences (`\n`). Can you guess the string represented by
    the following `String` literal?


    ```

    String quote = "\"A fool thinks of himself to be wise. " +

    "But a wise man knows himself to be a fool.\"\n" +

    "–William Shakespeare\n";

    ```


    This `String` literal represents the following quote from William Shakespeare:


    > *A fool thinks of himself to be wise. But a wise man knows himself to be a fool.*

    >

    > —William Shakespeare


    Wouldn’t it be nicer if you were able to represent this quote as follows?


    ```

    String quote = """

    "A fool thinks of himself to be wise. But a wise man knows himself to be a fool."

    –William Shakespeare

    """;

    ```


    Wouldn’t it be nicer if you were able to represent the list of three cities –
    each in a separate line – as follows?


    ```

    String cities = """

    Panama

    Paris

    Patna

    """;

    ```


    Wouldn’t it be neat to write HTML code in a Java program as follows?


    ```

    String html = """


    Hello, HTML


    """;

    ```


    Using `String` literals to represent complex multiline text is not limited to
    strings like a list of three cities and a quote as I showed you. Typically, Java
    programs contain non-Java code such as SQL, JSON, XML, and HTML as `String` literals.
    Representing these types of code in Java has been simply painful. Some developers
    go to the extent of putting these types of code in files, packaging them in a
    JAR, and reading the files into instances of `String` at runtime. This approach
    frees you from the shackles of the `String` literal limitations at the cost of
    extra headaches of handling files!


    Solving the problems faced by Java developers in using `String` literals to represent
    complex, multiline text blocks has been the focus of the Java language designers
    for quite some time. They added support for raw string literals in Java 12 as
    a language preview feature and later withdrew it, so it never made it to Java
    12. You can find details on the proposal for raw string literals in JEP 326 at
    `https://openjdk.java.net/jeps/326`. JEP 326 has been superseded by JEP 355 (`https://openjdk.java.net/jeps/355`),
    which proposes text block support in Java 13 as a language preview feature. You
    have already seen text blocks in previous examples when I used `"""` to start
    and close strings such as to represent HTML code as a `String`. Text blocks are
    the topic of discussion in this chapter.'
