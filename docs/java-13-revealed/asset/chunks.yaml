    ## Using HTTP Basic Authentication


    A server may require authentication to allow access to a requested resource. HTTP
    provides challenge-response type of authentication framework. A client requests
    a resource from a server. The server challenges the client requesting a specific
    type of authentication. The client provides the authentication information to
    the server. The server allows or denies access to the requested resource after
    validating the authentication information. There are several types of authentications
    such as Basic, Bearer, Digest, and so on.


    The HTTP Client API provides built-in support for basic authentication in which
    the server responds to the client with a 401 (Unauthorized) HTTP status code and
    a response header named `WWW-Authenticate`, which contains at least one challenge.
    Typically, the client responds with a base64-encoded username and password in
    the request header named `Authorization`, which may look like


    ```

    Authorization: Basic a2lzaG9yaTpzaGFyYW4=

    ```


    Let us have an example of basic authentication. You will use the following URL
    that challenges the client for basic authentication:


    ```

    https://httpbin.org/basic-auth/[username]/[password]

    ```


    Here, `[username]` is the username and `[password]` is the password required for
    authentication. When challenged by the server, you will need to provide the same
    username and password for the authentication to succeed. In the example, I use


    ```

    https://httpbin.org/basic-auth/kishori/sharan

    ```


    If you enter this URL in a browser, you will be prompted for a username and a
    password. You need to enter `kishori` as the username and `sharan` as the password.
    To use different username/password, change this URL accordingly.


    An instance of the `java.net.Authenticator` class is used to provide basic authentication
    using username/password. You need to subclass `Authenticator` and override the
    `getPasswordAuthentication()` method . The method returns an instance of the `PasswordAuthentication`
    class, which is simply a holder for the username and password. You will set an
    instance of this authenticator to the `HttpClient` object using the `authenticator()`
    method of the `HttpClient.Builder` interface. When the `HttpClient` needs to authenticate
    a request, it will call the `getPasswordAuthentication()` method of your authenticator
    and send the username/password returned in a `PasswordAuthentication` to the server.


    Listing [3-12](#419466_2_En_3_Chapter.xhtml#PC54) contains the code for a class
    named `BasicAuthenticator`. You create its instance by providing a username and
    a password. Its `getPasswordAuthentication()` method prints a message when an
    authentication is required and returns the username and password in a `PasswordAuthentication`.
    Typically, you would inspect the request for authentication such as the web site
    name before providing the username/password. If the user needs to provide this
    information, you may want to prompt the user with a dialog box where username/password
    can be entered. I kept the example simple to return the provided username/password.


    ```

    // BasicAuthenticator.java

    package com.jdojo.http.client;

    import java.net.Authenticator;

    import java.net.PasswordAuthentication;

    public class BasicAuthenticator extends Authenticator {

    private final String userName;

    private final char[] password;

    public BasicAuthenticator(String userName, char[] password) {

    this.userName = userName;

    this.password = password;

    }

    @Override

    protected PasswordAuthentication getPasswordAuthentication() {

    System.out.println(this.getRequestingURL()

    + " is asking for authentication: "

    + this.getRequestingPrompt());

    return new PasswordAuthentication(userName, password);

    }

    }

    Listing 3-12

    A Basic HTTP Authenticator

    ```


