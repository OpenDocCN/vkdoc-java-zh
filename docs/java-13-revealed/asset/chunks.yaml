    # 1. Local Variable Type Inference


    In this chapter, you will learn


    *   What type inference is


    *   What local variable type inference is


    *   What the restricted type name var is


    *   The rules to use var to declare local variables, indexes of for-each loop
    and for loop, and formal parameters for implicitly typed lambda expressions


    ## What Is Type Inference?


    Suppose you want to store a person ID, say, 10, in a variable. You would declare
    the variable like


    ```

    int personId = 10;

    ```


    To store a list of person IDs, you would declare a variable like


    ```

    ArrayList personIdList = new ArrayList();

    ```


    How about rewriting these variable declarations as follows?


    ```

    var personId = 10;

    var personIdList = new ArrayList();

    ```


    You may say that this looks like JavaScript code, not Java code. That was correct
    until Java 10\. Now you can use `var` to declare *local variables with an initializer*.
    The compiler will take care of inferring the correct type – sometimes, unintended
    incorrect type – for your variables. In Java 10 and later, the previous snippet
    of code is the same as follows:


    ```

    int personId = 10;

    ArrayList personIdList = new ArrayList();

    ```


    Does it mean that you do not need to use an explicit type to declare local variables
    in Java anymore? Does it mean that Java has become dynamically typed like JavaScript?
    No. None of these is true. Using `var` to declare local variables has limitations –
    some are technical, and some are practical. Java is still strongly and statically
    typed language. The examples you just saw are syntactic sugar added by the compiler.
    The compiler infers the type of the variables and generates the bytecode, which
    is the same as it used to generate before Java 10\. The Java runtime never sees
    `var`! The next few sections will give you a little background of type inference
    and all the rules and exceptions on how and where to use `var` to declare local
    variables.


    Everything in Java revolves around types. Either you are declaring types like
    classes and interfaces or are using them. Every expression and value you use in
    your program has a type. For example, the value 10 is of `int` type, 10.67 is
    of `double` type, `"Hello"` is of `String` type, and the expression `new Person()`
    is of `Person` type.


    Deriving type of a variable or an expression from the context of its use is called
    *type inference* *.* Java already had type inference long before the introduction
    of `var`, for example, in lambda expressions and in object creation expression
    for a generic type. The following statement uses type inference, which infers
    the diamond operator (`<>`) on the right-hand side as `<Integer>` by reading the
    `ArrayList<Integer>` from the left-hand side:


    ```

    ArrayList personIdList = new ArrayList();

    ```


    The following statement uses an implicitly typed lambda expression in which the
    types of the formal parameters `n1` and `n2` are inferred as `Integer` and `Long`,
    respectively:


    ```

    BiFunction avg = (n1, n2) -> (n1 + n2)/2.0;

    ```'
