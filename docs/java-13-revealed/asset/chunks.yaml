  trans: '

    ### 转义序列的转换


    文本块中的转义序列在转换的第三阶段（即最后一个阶段）被解释。文本块支持与 `String` 字面量相同的转义序列集，例如 `\b`、`\t`、`\n`、`\f`、`\r`、`\"`、`\''`、`\\`、八进制转义（`\nnn`）和
    Unicode 转义（`\uxxxx`）。它们被最后解释，以便开发者有机会使用转义序列来格式化文本块的内容。考虑以下文本块，它使用转义序列 `\t`（制表符）来格式化
    HTML 代码中的嵌套标签：


    ```

    String html = """

    ..............

    ..............\t

    ..............\t\tHello, HTML

    ..............\t

    ..............

    ..............""";

    ```


    所有显示为点号的前导空格将在第二阶段转换中被移除。此阶段将解释嵌套行中的制表符，生成的字符串如下所示：


    ```


    Hello, HTML


    ```


    回顾一下，在第二阶段中，所有行终止符（CR、CRLF 和 LF）都被规范化为 LF。假设你想让所有行都以 CRLF（`\r\n`）结尾，而不是 LF（`\n`）。如何实现这一点？你可以通过在文本块中每行内容的末尾插入转义序列
    `\r` 来实现。以下是该文本块：


    ```

    String html = """

    ..............\r

    ..................\r

    ......................Hello, HTML\r

    ..................\r

    ..............\r

    ..............""";

    ```


    生成的字符串如下所示。为了帮助你直观地理解转换后的字符串，我在字符串的每一行中显示了转换后的行终止符（LF）为 `\n`。空格照常显示为点号。


    ```

    \r\n

    ....\r\n

    ........Hello, HTML\r\n

    ....\r\n

    \r\n

    ```


    如何向文本块中的任何行添加尾部空格？答案是使用转序列。空格的 ASCII 十进制值为 32，可以用八进制转义表示为 `\040`，用 Unicode 转义表示为
    `\u0020`。让我们举一个简单的例子，将 `"Hello "` 表示为文本块。注意，`"Hello "` 中有一个尾部空格。该字符串的字符数是 6——`Hello`
    中的 5 个字符和一个尾部空格。以下是我们的第一次尝试：


    ```

    String str = """

    Hello """;

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    System.out.printf("str ends with a space: %b%n", str.endsWith(" "));

    str: ''Hello''

    str.length(): 5

    str ends with a space: false

    ```


    输出表明，从文本块生成的字符串不包含尾部空格。这是因为转换的第二阶段会移除所有尾部空白，从而删除了 `Hello` 后面的空格。


    在这种情况下，你需要将尾部空格表示为八进制转义 `\040`。以下是第二次尝试：


    ```

    String str = """

    Hello\040""";

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    System.out.printf("str ends with a space: %b%n", str.endsWith(" "));

    str: ''Hello ''

    str.length(): 6

    str ends with a space: true

    ```


    恭喜！输出表明你成功地在文本块的一行中插入了尾部空格。但事情可能并不像你想象的那样就此结束！让我们尝试使用 Unicode 转义 `\u0020` 来添加尾部空格：


    ```

    String str = """

    Hello\u0020""";

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    System.out.printf("str ends with a space: %b%n", str.endsWith(" "));

    str: ''Hello''

    str.length(): 5

    str ends with a space: false

    ```


    没有达到预期效果？感到惊讶吗？Unicode 转义在编译的非常早期阶段就被解释，早于任何其他处理。编译器在读取源代码时就会解释 Unicode 转义。编译器解释
    Unicode 转义 `\u0020` 并将其转换为一个空格字符。当编译器开始文本块转换时，`\u0020` 已经被转换为空格字符 `'' ''`。文本块转换器根本看不到
    Unicode 转义——它看到的是一个空格。转换器在处理所有尾部空白时会移除这个空格。这就是为什么在这个例子中你没有得到尾部空格的原因。为了证明这一点，让我们再看一个例子。


    LF 的 Unicode 转义是 `\u000A`。考虑以下包含 `String` 字面量的代码片段，其中包含以下字符序列：`He`、`\u000A` 和
    `llo`。


    ```

    String str = "He\u000Allo";

    ```


    这段代码能编译吗？不能。罪魁祸首就是 Unicode 转义的使用。在编译器处理 `String` 字面量之前，Unicode 转义 `\u000A` 已经被解释为
    LF，使得源代码看起来像这样：


    ```

    String str = "He

    llo";

    ```


    `String` 字面量不能跨越多行。这就是这段代码无法编译的原因。编译时错误是“未闭合的字符串字面量”。让我们用文本块来尝试这个例子，如下所示：


    ```

    String str = """

    He\u000Allo""";

    System.out.printf("str: ''%s''%n", str);

    System.out.printf("str.length(): %d%n", str.length());

    str: ''             He

    llo''

    str.length(): 19

    ```


    输出中有两个令人惊讶的地方。首先，你没有遇到任何编译时错误。其次，字符数是 19。你可能预期字符数是 6，而不是 19。暂停一下，尝试解释这个输出。


    如果你无法解释这个输出，以下是解释。让我们用点号表示空格，来展示原始文本块：


    ```

    String str = """

    .............He\u000Allo""";

    ```


    在文本块转换发生之前，编译器会将 `\u000A` 解释为 LF，这将导致以下文本块：


    ```

    String str = """

    .............He

    llo""";

    ```


    现在你可能能够看到最终的字符串，并解释之前的输出了。文本块的内容从一行变成了两行。第一行包含 13 个前导空格，第二行没有。编译器不会移除任何前导空格，因为所有非空白行的最小空白计数为零。最终的字符串如下：


    ```

    .............He

    llo

    ```


    总字符数为 19——13 个前导空格，`He` 中的 2 个字符，`He` 后面的 LF 占 1 个字符，以及 `llo` 中的 3 个字符。


    ### 提示


    你不需要使用转义序列 `\"` 和 `\n` 来在文本块中包含双引号和换行符。建议你改用 " 和行终止符。并且，要小心在文本块中使用 Unicode 转义，因为它们会在文本块转换之前被处理。


    假设你想在一个文本块中嵌套另一个文本块。考虑以下第一次不成功的尝试：


    ```

    String str = """

    String test = """

    Text blocks are fun if you understand them!

    """

    """;

    ```


    这个文本块无法编译。第二行中的三个双引号 `"... String test = """"` 被解释为第一行开始定界符的结束定界符。现在第三、第四和第五行不再是有效的
    Java 代码。如果你想在文本块内部使用三个连续的双引号，你必须至少转义这三个双引号中的一个，以避免它们被解释为结束定界符。你可以像下面这样使之前的文本块有效。我选择转义第一个双引号。


    ```

    String str = """

    String test = \"""

    Text blocks are fun if you understand them!

    \"""

    """;

    ```

