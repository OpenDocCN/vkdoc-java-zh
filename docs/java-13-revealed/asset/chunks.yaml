    ### 提示


    JVM 常量 API 是一个底层 API，专为操作字节码的库和工具设计。作为应用程序开发者，你不会直接使用它们。


    这两个接口都包含一个单一方法。`Constable` 接口包含以下方法：


    ```

    Optional describeConstable()

    ```


    `describeConstable()` 方法返回一个 `Optional`，如果无法为此 `Constable` 构造一个名义描述符，则该 `Optional`
    为空。


    `ConstantDesc` 接口包含以下方法：


    ```

    Object resolveConstantDesc(MethodHandles.Lookup lookup) throws ReflectiveOperationException;

    ```


    `resolveConstantDesc()` 方法使用 `MethodHandles.Lookup` 参数作为解析和访问控制上下文，返回解析后的常量值。


    `String`、`Integer`、`Long`、`Float` 和 `Double` 类同时实现了 `Constable` 和 `ConstantDesc`
    接口，并作为自身的名义描述符。清单 8-2 包含一个在 `String` 上使用这些方法的简单示例。


    ```

    // ConstableTest.java

    package com.jdojo.misc;

    import java.lang.invoke.MethodHandles;

    import java.util.Optional;

    public class ConstableTest {

    public static void main(String[] args) {

    String str1 = "Hello, JVM Constants API";

    // desc 中的 Optional 包含字符串本身 (str1)

    Optional desc = str1.describeConstable();

    String str2  = desc.get();

    // str3 包含字符串本身 (str1)

    String str3 = str1.resolveConstantDesc(MethodHandles.lookup());

    System.out.println("str1: " + str1);

    System.out.println("str2: " + str2);

    System.out.println("str3: " + str3);

    System.out.println("str1 == str2: " + (str1 == str2));

    System.out.println("str2 == str3: " + (str2 == str3));

    }

    }

    str1: Hello, JVM Constants API

    str2: Hello, JVM Constants API

    str3: Hello, JVM Constants API

    str1 == str2: true

    str2 == str3: true

    清单 8-2

    使用 JVM 常量 API

    ```


    ## String 类


    `String` 类在 Java 11 到 Java 13 中新增了几个方法。我已在第 6 章中描述了 Java 13 中的新方法以及 Java 12 中的
    `indent()` 方法。`describeConstable()` 和 `resolveConstantDesc()` 方法的存在是因为 `String`
    类实现了 Java 12 中引入的 JVM 常量 API 中的 `Constable` 和 `ConstantDesc` 接口。本节中我不解释这些方法。为了完整性，我在此列出了
    `String` 类中的所有新方法。


    **Java 11 新增的方法**


    *   `String strip()`


    *   `String stripLeading()`


    *   `String stripTrailing()`


    *   `boolean isBlank()`


    *   `Stream<String> lines()`


    *   `String repeat`​`(int count)`


    **Java 12 新增的方法**


    *   `String indent`​`(int n)`


    *   `<R> R transform`​`(Function<? super String,`​`? extends R> f)`


    *   `Optional<String> describeConstable()`


    *   `String resolveConstantDesc`​`(MethodHandles.Lookup lookup)`


    **Java 13 新增的方法**


    *   `String stripIndent()`


    *   `String translateEscapes()`


    *   `String formatted`​`(Object... args)`


    我将在后续章节中通过示例解释这些方法。


    ### 去除空白字符


    Java 11 为 `String` 类添加了三个去除前导/尾部、前导和尾部空白字符的方法：`strip()`、`stripLeading()` 和 `stripTrailing()`。`strip()`
    方法在移除前导和尾部空白字符后返回 `String`。另外两个方法在仅移除前导或尾部空白字符后返回 `String`。这些方法移除空白字符。请参考 `Character`
    类的 `isWhitespace(int codepoint)` 方法以了解 Java 中空白字符的定义。


    `String` 类的 `trim()` 方法在移除前导和尾部空格后返回 `String`，其中空格定义为码点小于或等于 Unicode 值 32（空格字符）的任何字符。比较
    `strip()` 和 `trim()` 方法。`trim()` 方法作用于 ASCII 控制字符（或 ASCII 空白字符），而 `strip()` 方法作用于
    Unicode 空白字符。


    ### 测试空白字符串


    你可以使用 `String` 类的 `isBlank()` 方法测试字符串是否仅包含空白字符。如果字符串仅包含空白字符，则返回 `true`。否则返回 `false`。


    ### 获取行流


    你可以使用 `String` 类的 `lines()` 方法获取字符串中的行流。字符串中的一行定义为零个或多个字符后跟一个行终止符的序列，行终止符可以是 `"\n"`、`"\r"`
    或 `"\r\n"`。如果到达字符串末尾，一行可能不以行终止符结尾。以下代码片段使用文本块为威廉·华兹华斯的露西组诗中的一节创建多行字符串。它打印每行的字符数，后跟文本。它使用
    `String` 类的 `lines()` 方法获取文本中每行的流。


    ```

    String text = """

    Upon the moon I fixed my eye,

    All over the wide lea;

    With quickening pace my horse drew nigh

    Those paths so dear to me.

    """;

    text.lines()

    .map(s -> s.length() + ": " + s)

    .forEach(System.out::println);

    29: Upon the moon I fixed my eye,

    22: All over the wide lea;

    39: With quickening pace my horse drew nigh

    26: Those paths so dear to me.

    ```


    ### 重复字符串


    `String` 类的 `repeat`​`(int count)` 方法返回一个字符串，其内容是将该字符串重复 `count` 次后的拼接结果。例如，`"hello".repeat(2)`
    返回 `"hellohello"`。如果字符串为空或 `count` 为零，则返回空字符串。如果 `count` 小于零，则抛出 `IllegalArgumentException`。该方法在创建缩进时非常有用。以下代码片段打印五行星号，每行用空格缩进。第一行由四个空格和一个星号组成，第二行由三个空格和两个星号组成，依此类推。


    ```

    IntStream.rangeClosed(1, 5)

    .mapToObj(n -> " ".repeat(5-n) + "*".repeat(n))

    .forEach(System.out::println);

    *

