    该程序创建了一个`BasicAuthenticator`类的实例，并向其传递`kishori/sharan`作为用户名/密码。你通过调用`Authenticator`类的`setDefault()`方法设置默认认证器，并通过调用其`getDefault()`方法获取它。你在`HttpClient`实例中设置认证器。程序中使用了此逻辑：


    ```

    // 设置默认认证器

    String username = "kishori";

    char[] password = new char[]{''s'', ''h'', ''a'', ''r'', ''a'', ''n''};

    Authenticator.setDefault(new BasicAuthenticator(username, password));

    // 创建一个带有认证器的 HttpClient

    HttpClient client = HttpClient.newBuilder()

    .authenticator(Authenticator.getDefault())

    .build();

    ```


    输出的第一行表明认证器已被使用。程序打印了响应状态码和正文。在基本认证的情况下，第一个请求会收到一个状态码为 401、无正文且包含`WWW-Authenticate`头的响应。如果完成一个请求涉及多个响应，你可以使用`HttpResponse<T>`接口的`previousResponse()`方法获取前一个响应的引用，该方法返回一个`Optional<HttpResponse<T>>`。输出的最后部分显示服务器曾以
    401 状态码和`WWW-Authenticate`头进行响应。


    你也可以使用 HTTP 客户端 API 进行 Bearer HTTP 认证。如果你收到一个 401 状态码和包含`Bearer`值的`WWW-Authenticate`头，你可以简单地重新发送一个带有承载令牌的`Authorization`头的请求。以下代码片段创建了一个带有`my-secret-token`承载令牌的请求：


    ```

    // 在 Authorization 头中准备一个带有承载令牌的请求

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("https://httpbin.org/bearer"))

    .header("Authorization", "Bearer my-secret-token")

    .build();

    ```


    你可以编写一个程序将此请求发送到服务器并打印响应详细信息，作为练习。


    ## 使用 WebSocket


    WebSocket 协议在两个端点（一个客户端端点和一个服务器端点）之间提供双向通信。术语*端点*指代使用 WebSocket 协议的连接中的任意一方。客户端端点发起连接，服务器端点接受连接。该连接是双向的，这意味着服务器端点可以自行向客户端端点推送消息。在此上下文中，你还会遇到另一个术语，称为*对端*。对端就是连接的另一端。例如，对于客户端端点，服务器端点是对端；对于服务器端点，客户端端点是对端。WebSocket*会话*表示一个端点与单个对端之间的一系列交互。


    WebSocket 协议可以分为三个部分：


    *   打开握手


    *   数据交换


    *   关闭握手


    客户端向服务器发起打开握手。握手过程使用 HTTP 协议，并附带一个升级到 WebSocket 协议的请求。服务器以升级响应来回应打开握手。一旦握手成功，客户端和服务器便开始交换消息。消息交换可以由客户端或服务器中的任一方发起。最后，任一端点都可以发送关闭握手；对端以关闭握手作为响应。一旦关闭握手成功，WebSocket
    即被关闭。


    HTTP 客户端 API 支持创建 WebSocket 客户端端点。要有一个使用 WebSocket 协议的完整示例，你需要同时拥有服务器端点和客户端端点。以下章节将解释如何创建客户端端点以与服务器端点交互的
    WebSocket 细节。你将使用一个已构建好的服务器端点，该端点可在网上获取，如下一节所述。


    ### WebSocket 服务器端点


    HTTP 客户端 API 提供对创建 WebSocket 客户端的支持，但不支持创建服务器。如何创建 WebSocket 服务器端点超出了本书的范围。我将在示例中使用一个免费可用的服务器端点。我将使用的
    WebSocket 服务器端点是`ws://demos.kaazing.com/echo`。有关此端点的更多详细信息，请访问[`www.websocket.org/echo.html`](http://www.websocket.org/echo.html)。你也可以使用此网页测试该端点。此端点充当回显服务器。当你发送一条消息时，它会将消息回显给你。

    '
- fmt: '### Creating a Client Endpoint


    Developing a WebSocket client endpoint involves using the `HttpClient` class and
    the `WebSocket` interface, which are part of the HTTP Client API. The `WebSocket`
    interface contains the following two nested `static` interfaces:


    - `WebSocket.Builder`

    - `WebSocket.Listener`


    An instance of the `WebSocket` interface represents a WebSocket client endpoint.
    A builder, which is an instance of the `WebSocket.Builder` interface, is used
    to create a `WebSocket` instance. The `newWebSocketBuilder()` method of the `HttpClient`
    class returns a `WebSocket.Builder`.


    When events occur on a client endpoint, for example, the completion of the opening
    handshake, a message arrival, closing handshake, and so on, notifications are
    sent to a listener, which is an instance of the `WebSocket.Listener` interface.
    The interface contains a `default` method for each type of notification. You will
    need to create a class that implements this interface providing an implementation
    for only those methods that correspond to the events of which you are interested
    in receiving notifications. You need to specify a listener when you create a `WebSocket`
    instance.


    When you send a close message to a peer, you may specify a close status code.
    The `WebSocket` interface contains a `NORMAL_CLOSURE` constant of type `int`.
    It represents a WebSocket `Close` message status code (1000), which means that
    the connection was closed normally. This means that the purpose for which the
    connection was established was fulfilled.


    Recall that a WebSocket provides a two-way communication between a client and
    a server. The API provides two types of methods – one type to send messages to
    the server and another to receive messages from the server. You use `sendXxx()`
    method of a `WebSocket` instance to send messages to the server. One of the `onXxx()`
    methods of the `WebSocket.Listener` instance is invoked when a message is received
    from the server. The following sections describe all steps in setting up a client
    endpoint in detail.


    #### Creating a Listener


    A listener is an instance of the `WebSocket.Listener` interface. Creating a listener
    involves creating a class that implements this interface. All methods in the interface
    are `default` methods. All methods of the listener are passed the reference of
    the `WebSocket` to which the listener is associated. You can break the methods
    in a listener into the following two categories:


    - Connection opening and error reporting methods

    - Message receiving methods


    The following two methods fall into the first category:


    - `void onOpen(WebSocket webSocket)`

    - `void onError(WebSocket, Throwable error)`


    When a WebSocket is connected, the `onOpen()` method of its listener is called.
    It is the first method of the listener to be called. It is called only once. Typically,
    you print an informational message that a connection has been established and
    request to receive more messages. The default implementation of this message requests
    to receive one more message. A request for messages is made using the `request(long
    n)` method of the `WebSocket` interface.


    ```

    // Allow one more message to be received

    webSocket.request(1);

    ```


    Note that messages can be received in parts. A `request(n)` call on the `WebSocket`
    means that the method that receives messages can be called `n` times. Suppose
    a text message is delivered in three parts. Calling `request(1)` will allow calling
    the `onText()` method only once. Typically, you call `request(1)` in the `onOpen()`
    method and when you receive a message such as in `onBinary()` and `onText()` methods.


    ### Tip


    If the server sends more messages than requested, messages are queued on the TCP
    connection and may eventually force the sender to stop sending more messages through
    TCP flow control. It is important that you call the `request(long n)` method at
    the appropriate time with an appropriate argument value, so your listener keeps
    receiving messages from the server. It is a common mistake to override the `onOpen()`
    method in your listener and not call the `webSocket.request(1)` method, which
    prevents you from receiving messages from the server.


    When an error occurs, the `onError()` method is called. No other methods on the
    listener are called after the `onError()` method is called. The second `error`
    argument contains the error details. If an exception is thrown from this method,
    the behavior is undefined.


    The following methods fall into the second category – message receiving methods.
    They are called when a specific type of message is received from the server:


    - `CompletionStage<?> onBinary(WebSocket webSocket, ByteBuffer data, boolean last)`

    - `CompletionStage<?> onText(WebSocket webSocket, CharSequence data, boolean last)`

    - `CompletionStage<?> onPing(WebSocket webSocket, ByteBuffer message)`

    - `CompletionStage<?> onPong(WebSocket webSocket, ByteBuffer message)`

    - `CompletionStage<?> onClose(WebSocket webSocket, int statusCode, String reason)`


    The `onClose()` method is called when the endpoint receives a close message from
    the peer. It is the last notification to the listener. An exception thrown from
    this method is ignored. The default implementation does not do anything. Typically,
    you need to send a close message to the peer to complete the closing handshake.


    The `onPing()` method is called when this endpoint receives a `Ping` message from
    the peer. A `Ping` message can be sent by both client and server endpoints. The
    default implementation of the `WebSocket` interface sends a `Pong` message to
    the peer in response to a `Ping` message with the same message contents. Therefore,
    when you create a listener, typically, you do not need to provide an implementation
    for the `onPing()` method.


    The `onPong()` method is called when the endpoint receives a `Pong` message from
    the peer. A `Pong` message is typically received as a response to a previously
    sent `Ping` message. An endpoint may also receive an unsolicited `Pong` message.
    The default implementation of the `onPong()` method requests one more message
    on the listener and performs no other actions.


    The `onBinary()` and `onText()` methods are called when a binary message and a
    text message are received from the peer, respectively. Binary and text messages
    can be sent in parts. The third `boolean` argument to these methods indicates
    whether it is the last part of a message. A value of `false` means that it is
    not the last part and more parts of the message will be received later. A value
    of `true` means that it is the last part of the message. Inside these methods,
    you accumulate the message parts when the last argument is `false` and process
    the message when all parts are received as indicated by a value of `true` in the
    `last` argument.


    Note that the methods that are called when a message is received return a `CompletionStage<?>`.
    The completion of the returned `CompletionStage` indicates to the `WebSocket`
    that the message has been processed, and it may reclaim resources tied up in delivering
    the message. Returning `null` from these methods indicates that the message processing
    is complete.


    Let us build a WebSocket listener, which you will use in the subsequent sections
    to create a `WebSocket`. Listing [3-14](#419466_2_En_3_Chapter.xhtml#PC59) contains
    the complete code for our `WebSocket` listener. The descriptions of its components
    follow the code.'
