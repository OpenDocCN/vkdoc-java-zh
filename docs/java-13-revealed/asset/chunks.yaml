- fmt: '# 8. Tools and APIs Changes


    In this chapter, you will learn


    * About the deprecated and removed tools and APIs

    * About the JVM Constants API

    * About the new methods added to the `String` class, the `Optional<T>` class,
    the `Predicate<T>` interface, `Files` class, and `Filesystems` class

    * About changes to the Collection, Buffer, FileSystem, and Stream APIs

    * How to format numbers in compact form

    * The Java platform support for the Unicode standards


    This chapter contains the topics that are not big enough to deserve a chapter
    on their own, but important enough to deserve a mention in this book. All example
    programs in this chapter are in the `jdojo.misc` module as shown in Listing [8-1](#419466_2_En_8_Chapter.xhtml#PC1).


    ```

    // module-info.java

    module jdojo.misc {

    exports com.jdojo.misc;

    }

    Listing 8-1

    A Module Named jdojo.misc

    ```


    ## Deprecated Tools


    In this section, I list and explain the deprecated tools and APIs in JDK 10 through
    JDK 13. I list only important tools that you need to know about as a developer.
    For a comprehensive list of all deprecated tools and APIs, refer to the release
    notes for a specific JDK.


    ### The Nashorn JavaScript Engine


    The Nashorn JavaScript engine, which was added to JDK8, was a complete implementation
    of the ECMAScript-262 5.1 standard. The maintainers of the engine found it difficult
    to keep up with the changes in ECMAScript and finally decided to deprecate it
    for removal. In JDK11, the Nashorn JavaScript script engine and APIs and the `jjs`
    tool were deprecated with the intent to remove them in a future release.


    The `javax.script` API that allows using scripting languages in Java is not affected
    by the Nashorn JavaScript engine deprecation. If you are using other scripting
    engines in Java applications, they will continue to work.


    Oracle has announced support for GraalVM, which can be used to migrate your Nashorn
    applications. You can read more about the Oracle’s announcement at [`https://blogs.oracle.com/developers/announcing-graalvm`](https://blogs.oracle.com/developers/announcing-graalvm).
    You can find more on GraalVM on its official web site [`www.graalvm.org`](https://www.graalvm.org).


    ### The rmic Tool


    JDK13 has deprecated the `rmic` tool for removal in a future release. It creates
    static stubs for Remote Method Invocation (RMI). Since Java 5, stubs can be generated
    dynamically, which is the recommended way to generate stubs. If you are still
    using static stubs for RMI, migrate your code to use dynamic stubs. You can refer
    to my book titled *Java APIs, Extensions and Libraries: With JavaFX, JDBC, Jmod,
    Jlink, Networking, and the Process API* (ISBN-1484235452) for more details on
    how to use dynamic stubs with RMI.


    ### The Pack200 Tools and API


    JDK11 deprecated the `pack200` and `unpack200` tools and the `Pack200` API in
    `java.util.jar` package. They will be removed in a future JDK release. Pack200
    is a compression scheme for JAR file to reduce the disk and bandwidth needs for
    the JDK downloads and Java applications.


    JDK ships with `pack200` and `unpack200` tools, which are used to compress and
    uncompress JAR files in the JDK up to JDK8. The `Pack200` API is used programmatically
    for the same purpose. The high-speed Internet and other technological improvements
    such as removal of applets support in browsers made the Pack200 scheme obsolete.
    JDK9 also introduced new file formats, JMOD and JImage, for packaging the Java
    modules, which is more efficient than the JAR file format and does not use Pack200.


    ### The Swing Motif Look and Feel


    Java 13 has deprecated Swing Motif Look and Feel. It is unsupported on macOS.
    Refer to [`https://bugs.openjdk.java.net/browse/JDK-8177960`](https://bugs.openjdk.java.net/browse/JDK-8177960)
    for more details.


    ## Removed Tools


    In this section, I list the tools that have been removed with their brief description.


    ### The appletviewer Tool


    Java 9 had deprecated the Applet API and the `appletviewer` tool. Java 11 removed
    the `appletviewer` tool, which was used to launch applets locally without using
    a browser.


    ### The javah Tool


    The JDK used to ship a tool named `javah`. The tool was used to generate C/C++
    native header files for all native method declarations in your Java code. The
    tool was deprecated in JDK 9 for future removal. In JDK 10, the tool has been
    removed.


    JDK 8 had added a `-h` option to the Java compiler (`javac`) to generate the C/C++
    header files. The `-h` option accepts the directory name where it will place the
    generated header files. The following command compiles the `HelloJNI.java` file
    and places any C/C++ header files in the `jni_headers` directory:


    ```

    javac -h jni_headers HelloJNI.java

    ```


    When the `-h` option is used, the compiler scans the source files for native method
    declarations and generates the C/C++ header files in the specified directory.


    ## The Runtime Class


    The following two methods in the `java.lang.Runtime` class were deprecated in
    Java 9 for removal in a future release and have been removed in Java 13:


    * `void traceInstructions(boolean on)`

    * `void traceMethodCalls(boolean on)`


    ## The Thread Class


    The `destroy()` and `stop(Throwable)` methods in the `Thread` class have been
    removed in Java 11. The no-args `stop()` method is unaffected.


    ## The JVM Constants API


    JDK12 introduced the JVM Constants API, which is a low-level API to deal with
    how entries in a constant pool of class files are described by libraries and tools,
    which manipulates the bytecodes. As a developer, you will not need to use this
    API in your applications. The API is in the `java.lang.constant` package in the
    `java.base` module. You will often come across two of the following interfaces
    in this API:


    * `Constable`

    * `ConstantDesc`


    A `Constable` represents a constant that can be represented in the constant pool
    of a class file. In other words, a type whose instances represent constant values
    is `Constable`. A few of the types that implement the `Constable` interface are
    `String`, `Integer`, `Long`, `Float`, `Double`, `Class`, `MethodType`, and `MethodHandle`.


    A `Constable` can describe itself nominally as a `ConstantDesc`. In other words,
    a `ConstantDesc` is a nominal descriptor of the constant value represented by
    a `Constable`. It is called a "nominal descriptor" because it is not the value
    itself. Rather, it is a "link" or "recipe" to describe the value or to reconstruct
    the value in a given class loading context. The nominal descriptor can also be
    used to store the value in a constant pool in a symbolic form (or a nominal form).
    There are specialized types of `ConstantDesc` such as `ClassDesc` to serve as
    a nominal descriptor for a `Class` constant.'
