- fmt: '### Converting Collections to an Array


    The `Collection<E>` interface contains an overloaded `toArray()` method to convert
    a collection to an array:


    - `Object[] toArray()`

    - `<T> T[] toArray(T[] a)`

    - `default <T> T[] toArray(IntFunction<T[]> generator)`


    If you do not have an array and can deal with `Object[]`, use the `toArray()`
    method, which creates an `Object[]` that contains the elements of the collection.
    If you want the returned array to be of the same type as the collection, you should
    not use this method.


    If you already have an array and want to reuse the array to copy the elements
    of the collection to the array, use the `toArray(T[] a)` method. The returned
    array type is the same as the passed-in array type. If the passed-in array is
    big enough to hold all elements of the collection, the same array is used to copy
    the collection. If the passed-in array is bigger than the collection, the first
    element in the array after the collection elements is set to `null`. If the collection
    does not contain `null` values, the index of the first `null` in the array will
    give you the size of the collection from which the elements were copied to the
    array. If the size of the passed-in array is smaller than the collection, a new
    array is created.


    Java 11 added the default `toArray(IntFunction<T[]> generator)` method. Use this
    method when you do not have an array. You can use an array constructor reference
    as its argument. The method creates an array, copies the collection, and returns
    the array. The default implementation calls the generator function with zero and
    passes the returned array to the `toArray(T[] a)` method. The following snippet
    uses this version of the `toArray()` method to copy elements of a list to an array:


    ```

    List namesList = List.of("Buddy", "John", "Lisa");

    // Use the toArray(IntFunction generator) method passing a

    // String[] constructor reference to copy the list to an array

    String[] namesArray = namesList.toArray(String[]::new)

    ```


    Listing [8-8](#419466_2_En_8_Chapter.xhtml#PC27) contains a complete program that
    uses all three versions of the `toArray()` method to copy a list to an array.


    ```

    // CollectionToArray.java

    package com.jdojo.misc;

    import java.util.Arrays;

    import java.util.List;

    public class CollectionToArray {

    public static void main(String[] args) {

    // Create a list of strings

    List names = List.of("Buddy", "John", "Lisa");

    System.out.println("List: " + names);

    // Use the toArray() method to copy list to an Object[]

    Object[] names1 =  names.toArray();

    System.out.println("names1: " + Arrays.toString(names1));

    // Pass a String[] of zero length, so the toArray() method

    // creates a new array of the same size as the list

    String[] names2 = names.toArray(new String[0]);

    System.out.println("names2: " + Arrays.toString(names2));

    // Pass a bigger array to toArray(). The first 3 elements in the

    // array will be overwritten by the elements from the list,

    // the 4th will be set to null, and 5th and 6th will be untouched.

    String[] team = new String[] {"Lu", "Xi", "Ho", "Yo", "To", "Mo"};

    System.out.println("team: " + Arrays.toString(team));

    String[] newTeam = names.toArray(team);

    System.out.println("newTeam: " + Arrays.toString(newTeam));

    System.out.println("team == newTeam: " + (team == newTeam));

    // Use the toArray(IntFunction generator) to copy the list

    String[] names3 = names.toArray(String[]::new);

    System.out.println("names3: " + Arrays.toString(names3));

    }

    }

    List: [Buddy, John, Lisa]

    names1: [Buddy, John, Lisa]

    names2: [Buddy, John, Lisa]

    team: [Lu, Xi, Ho, Yo, To, Mo]

    newTeam: [Buddy, John, Lisa, null, To, Mo]

    team == newTeam: true

    names3: [Buddy, John, Lisa]

    Listing 8-8

    Copying the Elements of a Collection to an Array

    ```


    ## New Collectors


    Java 10 and 12 added five new collectors, which you can obtain using the new static
    factory methods added to the `java.util.stream.Collectors` class. I will explain
    those collectors in the subsequent sections.


    ### Unmodifiable Collectors


    Java 10 added four methods to the `java.util.stream.Collectors` class, which return
    a `Collector` that accumulates elements in an unmodifiable `List`, `Set`, and
    `Map`:


    - `<T> Collector<T, ?, List<T>> toUnmodifiableList()`

    - `<T> Collector<T, ?, Set<T>> toUnmodifiableSet()`

    - `<T, K, U> Collector<T, ?, Map<K, U>> toUnmodifiableMap(Function<? super T,
    ? extends K> keyMapper, Function<? super T, ? extends U> valueMapper)`

    - `<T, K, U> Collector<T, ?, Map<K, U>> toUnmodifiableMap(Function<? super T,
    ? extends K> keyMapper, Function<? super T, ? extends U> valueMapper, BinaryOperator<U>
    mergeFunction)`


    The `Collector` returned from these methods works the same way as returned from
    the `toList()`, `toSet()`, and `toMap()` methods, except that new methods return
    unmodifiable `List`, `Set`, and `Map`.


    The following snippet of code shows how to filter and collect elements from a
    modifiable list to an unmodifiable list using the `Collector` returned from the
    `toUnmodifiableList()` method of the `Collectors` class:


    ```

    import java.util.List;

    import java.util.ArrayList;

    import static java.util.stream.Collectors.toUnmodifiableList;

    // More code goes here...

    // Create a modifiable list

    List names = new ArrayList();

    names.add("John");

    names.add("Buddy");

    names.add("Vishwa");

    names.add("Amy");

    // Collect the names, which are less than or equal to four characters

    // into an unmodifiable list

    List shortNames = names.stream()

    .filter(name -> name.length() <= 4)

    .collect(toUnmodifiableList());

    // Print both lists

    System.out.println("names: " + names);

    System.out.println("shortNames: " + shortNames);

    // Will throws an UnsupportedOperationException

    // shortNames.add("Jaya");

    names: [John, Buddy, Vishwa, Amy]

    shortNames: [John, Amy]

    ```'
  raw: '### Converting Collections to an Array


    The `Collection<E>` interface contains an overloaded `toArray()` method to convert
    a collection to an array:


    *   `Object[] toArray()`


    *   `<T> T[] toArray`​`(T[] a)`


    *   `default <T> T[] toArray`​`(IntFunction<T[]> generator)`


    If you do not have an array and can deal with `Object[]`, use the `toArray()`
    method, which creates an `Object[]` that contains the elements of the collection.
    If you want the returned array to be of the same type as the collection, you should
    not use this method.


    If you already have an array and want to reuse the array to copy the elements
    of the collection to the array, use the `toArray(T[] a)` method . The returned
    array type is the same as the passed-in array type. If the passed-in array is
    big enough to hold all elements of the collection, the same array is used to copy
    the collection. If the passed-in array is bigger than the collection, the first
    element in the array after the collection elements is set to `null`. If the collection
    does not contain `null` values, the index of the first `null` in the array will
    give you the size of the collection from which the elements were copied to the
    array. If the size of the passed-in array is smaller than the collection, a new
    array is created.


    Java 11 added the default `toArray(IntFunction<T[]> generator)` method. Use this
    method when you do not have an array. You can use an array constructor reference
    as its argument. The method creates an array, copies the collection, and returns
    the array. The default implementation calls the generator function with zero and
    passes the returned array to the `toArray(T[] a)` method. The following snippet
    uses this version of the `toArray()` method to copy elements of a list to an array:


    ```

    List namesList = List.of("Buddy", "John", "Lisa");

    // Use the toArray(IntFunction generator) method passing a

    // String[] constructor reference to copy the list to an array

    String[] namesArray = namesList.toArray(String[]::new)

    ```


    Listing [8-8](#419466_2_En_8_Chapter.xhtml#PC27) contains a complete program that
    uses all three versions of the `toArray()` method to copy a list to an array.


    ```

    // CollectionToArray.java

    package com.jdojo.misc;

    import java.util.Arrays;

    import java.util.List;

    public class CollectionToArray {

    public static void main(String[] args) {

    // Create a list of strings

    List names = List.of("Buddy", "John", "Lisa");

    System.out.println("List: " + names);

    // Use the toArray() method to copy list to an Object[]

    Object[] names1 =  names.toArray();

    System.out.println("names1: " + Arrays.toString(names1));

    // Pass a String[] of zero length, so the toArray() method

    // creates a new array of the same size as the list

    String[] names2 = names.toArray(new String[0]);

    System.out.println("names2: " + Arrays.toString(names2));

    // Pass a bigger array to toArray(). The first 3 elements in the

    // array will be overwritten by the elements from the list,

    // the 4th will be set to null, and 5th and 6th will be untouched.

    String[] team = new String[] {"Lu", "Xi", "Ho", "Yo", "To", "Mo"};

    System.out.println("team: " + Arrays.toString(team));

    String[] newTeam = names.toArray(team);

    System.out.println("newTeam: " + Arrays.toString(newTeam));

    System.out.println("team == newTeam: " + (team == newTeam));

    // Use the toArray(IntFunction generator) to copy the list

    String[] names3 = names.toArray(String[]::new);

    System.out.println("names3: " + Arrays.toString(names3));

    }

    }

    List: [Buddy, John, Lisa]

    names1: [Buddy, John, Lisa]

    names2: [Buddy, John, Lisa]

    team: [Lu, Xi, Ho, Yo, To, Mo]

    newTeam: [Buddy, John, Lisa, null, To, Mo]

    team == newTeam: true

    names3: [Buddy, John, Lisa]

    Listing 8-8

    Copying the Elements of a Collection to an Array

    ```


    ## New Collectors


    Java 10 and 12 added five new collectors, which you can obtain using the new static
    factory methods added to the `java.util.stream.Collectors` class. I will explain
    those collectors in the subsequent sections.


    ### Unmodifiable Collectors


    Java 10 added four methods to the `java.util.stream.Collectors` class, which return
    a `Collector` that accumulates elements in an unmodifiable `List` , `Set`, and
    `Map`:


    *   `<T> Collector<T,`​`?,`​`List<T>> toUnmodifiableList()`


    *   `<T> Collector<T,`​`?,`​`Set<T>> toUnmodifiableSet()`


    *   `<T,`​ `K,`​ `U> Collector<T,`​`?,`​`Map<K,`​`U>> toUnmodifiableMap`​`(Function<?
    super T,`​`? extends K> keyMapper, Function<? super T,`​`? extends U> valueMapper)`


    *   `<T,`​ `K,`​ `U> Collector<T,`​`?,`​`Map<K,`​`U>> toUnmodifiableMap`​`(Function<?
    super T,`​`? extends K> keyMapper, Function<? super T,`​`? extends U> valueMapper,
    BinaryOperator<U> mergeFunction)`


    The `Collector` returned from these methods works the same way as returned from
    the `toList()`, `toSet()`, and `toMap()` methods, except that new methods return
    unmodifiable `List`, `Set`, and `Map`.


    The following snippet of code shows how to filter and collect elements from a
    modifiable list to an unmodifiable list using the `Collector` returned from the
    `toUnmodifiableList()` method of the `Collectors` class:


    ```

    import java.util.List;

    import java.util.ArrayList;

    import static java.util.stream.Collectors.toUnmodifiableList;

    // More code goes here...

    // Create a modifiable list

    List names = new ArrayList();

    names.add("John");

    names.add("Buddy");

    names.add("Vishwa");

    names.add("Amy");

    // Collect the names, which are less than or equal to four characters

    // into an unmodifiable list

    List shortNames = names.stream()

    .filter(name -> name.length() <= 4)

    .collect(toUnmodifiableList());

    // Print both lists

    System.out.println("names: " + names);

    System.out.println("shortNames: " + shortNames);

    // Will throws an UnsupportedOperationException

    // shortNames.add("Jaya");

    names: [John, Buddy, Vishwa, Amy]

    shortNames: [John, Amy]

    ```'
