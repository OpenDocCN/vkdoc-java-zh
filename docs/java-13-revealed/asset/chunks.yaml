    ## Passing Arguments to the Program


    In source-file mode, all arguments specified after the file name on the command
    line are passed to the `main()` method of the class that is run. Listing [4-7](#419466_2_En_4_Chapter.xhtml#PC15)
    contains the code for a class named `Stats`. It computes and prints statistics
    such as count, sum, min, max, and average of the numbers specified on the command
    line. If you do not specify any arguments, it prints the usage information. If
    you specify any non-numeric arguments, it throws a `NumberFormatException`.


    ```

    // Stats.java

    package com.jdojo.sourcecode.mode;

    import static java.lang.System.out;

    import java.util.Arrays;

    import java.util.DoubleSummaryStatistics;

    import static java.util.stream.Collectors.summarizingDouble;

    public class Stats {

    public static void main(String[] args) {

    if (args.length == 0) {

    out.println("No numbers were specified.");

    out.println("Usage: Prints stats of the specified numbers "

    + "such as sum, average, min, and max.");

    out.println("Syntax: java Stats.java [numbers]");

    out.println("Example: java Stats.java 10 20 25 34");

    return;

    }

    // Compute and print the stats on the agruments

    DoubleSummaryStatistics stats = Arrays.asList(args)

    .stream()

    .map(s -> Double.valueOf(s))

    .collect(summarizingDouble(Double::doubleValue));

    out.println(stats);

    }

    }

