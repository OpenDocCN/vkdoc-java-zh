- fmt: '# Structure of the Book


    This book contains eight chapters, which can be read in any order. If you want
    to just learn a few new Java features, you need to read only chapters covering
    those features.


    Chapter 1 explains the local variable type inference using the restricted type
    name `var`, which was added to Java 10.


    Java has adopted a new time-based release model in which it will have a feature
    release every 6 months, an update release every 3 months, and a long-term support
    (LTS) release every 3 years. Chapter 2 explains the new Java versioning scheme,
    which was introduced in Java 9 and updated in Java 10.


    Chapter 3 explains the HTTP Client API added in Java 11 as a standard feature
    that lets you work with HTTP requests and responses in Java applications. The
    API provides classes and interfaces to develop WebSocket client endpoints with
    authentication.


    Chapter 4 explains the source-file mode for the `java` command, which was added
    in Java 11. The source-file mode lets you run a single Java source file using
    the `java` command without first compiling the source file.


    Chapter 5 explains the new syntax and semantics for `switch`. It was added as
    a preview feature in Java 12 and continues as a preview feature in Java 13. This
    feature lets you use `switch` as statements as well as expressions.


    Chapter 6 explains text blocks, which are multiline string literals with automatic
    transformations performed by the compiler. This is a preview feature added in
    Java 13. This chapter also explains methods added to the `String` class to support
    text blocks.


    Chapter 7 explains class data sharing (CDS) for JDK classes and application classes,
    which can speed up the launch time for Java application and reduce runtime footprint.
    This chapter covers updates in CDS from Java 10 to Java 13.


    Chapter 8 explains deprecation and removal of tools. It also covers APIs changes
    from Java 10 to Java 13. This chapter does not cover all tools and APIs – only
    those that are relevant to the Java application developers.


    ## Audience


    This book is designed to be useful for Java developers who have intermediate-level
    understanding of Java SE 9 and want to learn new features added to Java 10 through
    Java 13.


    ## How to Use This Book


    Each chapter covers a new Java feature, except Chapter 8, which covers changes
    to all important tools and APIs. You can read chapters in any order.


    ### Source Code and Errata


    Source code and errata for this book can be accessed via the **Download Source
    Code** button located at [`www.apress.com/us/book/9781484254066`](http://www.apress.com/us/book/9781484254066).


    The source code contains an Apache NetBeans 11.1 project. The `src` directory
    contains all the source code for examples in this book. You can download Apache
    NetBeans from [`https://netbeans.apache.org/`](https://netbeans.apache.org/).
    If you prefer to use an IDE other than Apache NetBeans, you can create a Java
    project in your IDE and copy the source code files in the `src` directory from
    the supplied source code to the corresponding source code directory of your IDE.
    Many example programs use preview features. You will need to enable the preview
    features in your IDE before you can compile those programs. The preview feature
    is enabled in the Apache NetBeans project supplied with the source code.


    ### Questions and Comments


    Please direct all your questions and comments to the author at `ksharan@jdojo.com`.


    ## Acknowledgments


    My wife Ellen was patient when I spent long hours at my computer working on this
    book. I want to thank her for all of her support.


    I want to thank my family members and friends for their encouragement and support:
    my mother, Pratima Devi; my elder brothers, Janki Sharan and Dr. Sita Sharan;
    my nephews, Babalu, Dablu, Gaurav, and Saurav; my sister, Ratna; my friends, Karthikeya
    Venkatesan, Preethi Vasudev, Rahul Nagpal, Ravi Datla, Vishwa Mohan, and many
    more not mentioned here.


    My sincere thanks are due to the wonderful team at Apress for their support during
    the publication of this book. Thanks to Mark Powers, the Editorial Operations
    Manager, for providing excellent support and for being exceptionally patient with
    me. My special thanks to Manuel Jordan Elera, the technical reviewer, whose thorough
    approach to reviewing the book helped weed out many technical errors.


    Last but not least, my sincere thanks to Steve Anglin, the Lead Editor at Apress,
    for taking the initiative for the publication of this book.


    ### About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Local Variable Type Inference


    In this chapter, you will learn


    - What type inference is

    - What local variable type inference is

    - What the restricted type name `var` is

    - The rules to use `var` to declare local variables, indexes of for-each loop
    and for loop, and formal parameters for implicitly typed lambda expressions


    ## What Is Type Inference?


    Suppose you want to store a person ID, say, 10, in a variable. You would declare
    the variable like


    ```

    int personId = 10;

    ```


    To store a list of person IDs, you would declare a variable like


    ```

    ArrayList personIdList = new ArrayList();

    ```


    How about rewriting these variable declarations as follows?


    ```

    var personId = 10;

    var personIdList = new ArrayList();

    ```


    You may say that this looks like JavaScript code, not Java code. That was correct
    until Java 10. Now you can use `var` to declare local variables with an initializer.
    The compiler will take care of inferring the correct type – sometimes, unintended
    incorrect type – for your variables. In Java 10 and later, the previous snippet
    of code is the same as follows:


    ```

    int personId = 10;

    ArrayList personIdList = new ArrayList();

    ```


    Does it mean that you do not need to use an explicit type to declare local variables
    in Java anymore? Does it mean that Java has become dynamically typed like JavaScript?
    No. None of these is true. Using `var` to declare local variables has limitations
    – some are technical, and some are practical. Java is still strongly and statically
    typed language. The examples you just saw are syntactic sugar added by the compiler.
    The compiler infers the type of the variables and generates the bytecode, which
    is the same as it used to generate before Java 10. The Java runtime never sees
    `var`! The next few sections will give you a little background of type inference
    and all the rules and exceptions on how and where to use `var` to declare local
    variables.


    Everything in Java revolves around types. Either you are declaring types like
    classes and interfaces or are using them. Every expression and value you use in
    your program has a type. For example, the value 10 is of `int` type, 10.67 is
    of `double` type, `"Hello"` is of `String` type, and the expression `new Person()`
    is of `Person` type.


    Deriving type of a variable or an expression from the context of its use is called
    type inference. Java already had type inference long before the introduction of
    `var`, for example, in lambda expressions and in object creation expression for
    a generic type. The following statement uses type inference, which infers the
    diamond operator (`<>`) on the right-hand side as `<Integer>` by reading the `ArrayList<Integer>`
    from the left-hand side:


    ```

    ArrayList personIdList = new ArrayList();

    ```


    The following statement uses an implicitly typed lambda expression in which the
    types of the formal parameters `n1` and `n2` are inferred as `Integer` and `Long`,
    respectively:


    ```

    BiFunction avg = (n1, n2) -> (n1 + n2)/2.0;

    ```'
