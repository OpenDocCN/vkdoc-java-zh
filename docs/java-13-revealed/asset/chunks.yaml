    ## 动态 CDS 归档


    使用 CDS 和 AppCDS 可以显著缩短应用程序的启动时间，同时还能大幅减少运行时内存占用。JDK12 中引入的默认 CDS 归档使得 CDS 归档的使用变得透明。然而，在
    JDK12 中使用 AppCDS 仍需执行三步流程：


    *   创建类列表。

    *   转储共享归档。

    *   使用共享归档运行应用程序。


    最终目标是让 AppCDS 的使用变得完全透明，用户无需任何操作即可利用共享归档。不过，截至 JDK13，我们尚未实现这一目标。JDK13 极大地简化了生成共享归档以使用
    AppCDS 的方式，使其成为一个简单的两步流程：


    *   使用 `-XX:ArchiveClassesAtExit=<文件名>` 参数运行应用程序，其中 `<文件名>` 是共享归档文件的名称。应用程序退出时会生成一个共享归档。如果应用程序异常退出，则不会生成共享归档。

    *   使用 `-XX:SharedArchiveFile=<文件名>` 选项运行应用程序，以使用该共享归档进行 AppCDS。


    让我们使用 JDK13 的以下命令为我们的 `HelloCDS` 应用程序创建一个共享归档。如果运行此命令时遇到错误，请参考以下文本进行故障排除：


    ```

    C:\Java13Revealed>java -XX:ArchiveClassesAtExit=jdojo.jsa --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    [0.137s][warning][cds] Skipping java/util/stream/FindOps$FindSink$OfRef$$Lambda$6:
    Unsafe anonymous class

    ...

    ```


    在源代码中，我使用 `--enable-preview` 选项编译了所有类。如果你没有通过重新编译源代码（不使用 `--enable-preview` 选项）来重新创建
    `dist\jdojo.cds.jar` 文件，你将收到以下错误信息：


    ```

    Error: Unable to load main class com.jdojo.cds.HelloCDS in module jdojo.cds

    java.lang.UnsupportedClassVersionError: Preview features are not enabled for com/jdojo/cds/HelloCDS
    (class file version 57.65535). Try running with ''--enable-preview''

    ...

    ```


    要修复此错误，你需要使用 `--enable-preview` 选项运行 `HelloCDS` 类，如下所示：


    ```

    C:\Java13Revealed>java --enable-preview -XX:ArchiveClassesAtExit=jdojo.jsa --module-path
    dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    ```


    此命令创建的动态 CDS 归档（顶层归档）是基于随 JDK 打包的默认 CDS 归档（基础层归档）创建的。顶层归档依赖于基础层归档。如果无法使用顶层归档，它将被禁用，仅使用基础层归档。如果无法使用基础层归档，则顶层归档也会被禁用。


    顶层归档（或动态 CDS 归档）包含所有已加载的应用程序类和默认 CDS 归档（基础层归档）中不存在的库类。


    ### 提示


    存在于类路径或模块路径上的 JAR 文件中，但在执行期间未被加载的类不会被动态归档。应用程序执行期间创建的 Java 堆对象也不会被动态归档。


    让我们使用动态归档运行 `HelloCDS` 类。我使用了 `-Xlog:class+load=info` 选项，这样你可以在输出中看到 `HelloCDS`
    类是从动态归档加载的。如果你使用的是本书源代码附带的 `dist\jdojo.cds.jar` 文件，请在以下命令中使用 `--enable-preview`
    选项：


    ```

    C:\Java13Revealed>java -XX:SharedArchiveFile=jdojo.jsa --module-path dist\jdojo.cds.jar
    -Xlog:class+load=info --module jdojo.cds/com.jdojo.cds.HelloCDS

    [0.011s][info][class,load] opened: C:\java13\lib\modules

    [0.023s][info][class,load] java.lang.Object source: shared objects file

    [0.023s][info][class,load] java.io.Serializable source: shared objects file

    [0.023s][info][class,load] java.lang.String source: shared objects file

    ...

    [0.145s][info][class,load] com.jdojo.cds.HelloCDS source: shared objects file
    (top)

    ...

    Hello, CDS and AppCDS

    ...

    ```


    请注意输出中 `HelloCDS` 类的位置 `"shared objects file (top)"` 中使用了 `"(top)"`。这表明 `HelloCDS`
    类是从顶层共享归档（即动态 CDS 归档）加载的。系统类的位置中不包含 `"top"` 字样，这意味着它们是从基础层（默认 CDS 归档）加载的。


    敬请期待未来 JDK 版本中对动态 CDS 归档的更多改进。


    ## 总结


    类数据共享（CDS）是 JDK5 中引入的一项 JVM 特性，它允许在 JVM 之间共享类，从而减少启动时间和运行时内存占用。CDS 允许共享由引导类加载器加载的
    Java 核心类。


    JDK10 中的应用程序类数据共享（AppCDS）扩展了 CDS 特性，允许在 JVM 之间共享类路径上的应用程序类。从 JDK10 开始，所有类型的类加载器（引导类加载器、平台类加载器、应用程序类加载器和自定义类加载器）都可以从
    AppCDS 加载类。AppCDS 在 Oracle JDK 8 和 9 中可用，但需要商业许可。在 JDK10 中，AppCDS 在 OpenJDK 中可用。在
    JDK10 中，你只能为类路径上的类创建 AppCDS 共享归档。JDK11 及更高版本允许包含来自模块路径和类路径的类。


    当你为 AppCDS 使用共享归档时，用于创建共享归档的类路径必须与启用 AppCDS 启动应用程序时使用的类路径相同，或者是其前缀。否则，会发生类路径不匹配错误，应用程序将无法启动。


    JDK12 为 64 位平台上的原生构建增加了对默认 CDS 归档的支持。JDK 镜像包含一个默认的 CDS 归档。它被命名为 `classes.jsa`。在类
    Unix 操作系统上，它存储在 `JAVA_HOME/lib/server` 目录中；在 Windows 上，存储在 `JAVA_HOME/bin/server`
    目录中。`JAVA_HOME/lib/classlist` 文件包含默认 CDS 归档中的系统类列表。要在 JDK12 及更高版本中利用默认 CDS，你无需执行任何操作。


    JDK13 极大地简化了生成共享归档以使用 AppCDS 的方式。首先，使用 `-XX:ArchiveClassesAtExit=<文件名>` 参数运行应用程序，其中
    `<文件名>` 是共享归档文件的名称。应用程序退出时会生成一个共享归档。如果应用程序异常退出，则不会生成共享归档。其次，使用 `-XX:SharedArchiveFile=<文件名>`
    选项运行应用程序，以将共享归档与 AppCDS 一起使用。


    动态 CDS 归档（顶层归档）是基于随 JDK 打包的默认 CDS 归档（基础层归档）创建的。顶层归档依赖于基础层归档。如果无法使用顶层归档，它将被禁用，仅使用基础层归档。如果无法使用基础层归档，则顶层归档也会被禁用。


    顶层归档包含所有已加载的应用程序类和默认 CDS 归档中不存在的库类。存在于类路径或模块路径上的 JAR 文件中，但在执行期间未被加载的类不会被动态归档。应用程序执行期间创建的
    Java 堆对象也不会被动态归档。

