    a browser.


    ### The javah Tool


    The JDK used to ship a tool named `javah` . The tool was used to generate C/C++
    native header files for all native method declarations in your Java code. The
    tool was deprecated in JDK 9 for future removal. In JDK 10, the tool has been
    removed.


    JDK 8 had added a `-h` option to the Java compiler (`javac`) to generate the C/C++
    header files. The `-h` option accepts the directory name where it will place the
    generated header files. The following command compiles the `HelloJNI.java` file
    and places any C/C++ header files in the `jni_headers` directory:


    ```

    javac -h jni_headers HelloJNI.java

    ```


    When the `-h` option is used, the compiler scans the source files for native method
    declarations and generates the C/C++ header files in the specified directory.


    ## The Runtime Class


    The following two methods in the `java.lang.Runtime` class were deprecated in
    Java 9 for removal in a future release and have been removed in Java 13:


    *   `void traceInstructions`​`(boolean on)`


    *   `void traceMethodCalls`​`(boolean on)`


    ## The Thread Class


    The `destroy()` and `stop(Throwable)` methods in the `Thread` class have been
    removed in Java 11\. The no-args `stop()` method is unaffected.


    ## The JVM Constants API


    JDK12 introduced the JVM Constants API, which is a low-level API to deal with
    how entries in a constant pool of class files are described by libraries and tools,
    which manipulates the bytecodes. As a developer, you will not need to use this
    API in your applications. The API is in the `java.lang.constant` package in the
    `java.base` module. You will often come across two of the following interfaces
    in this API:


    *   `Constable`


    *   `ConstantDesc`


    A `Constable` represents a constant that can be represented in the constant pool
    of a class file. In other words, a type whose instances represent constant values
    is `Constable`. A few of the types that implement the `Constable` interface are
    `String`, `Integer`, `Long`, `Float`, `Double`, `Class`, `MethodType`, and `MethodHandle`.


    A `Constable` can describe itself nominally as a `ConstantDesc`. In other words,
    a `ConstantDesc` is a nominal descriptor of the constant value represented by
    a `Constable`. It is called a “nominal descriptor” because it is not the value
    itself. Rather, it is a “link” or “recipe” to describe the value or to reconstruct
    the value in a given class loading context. The nominal descriptor can also be
    used to store the value in a constant pool in a symbolic form (or a nominal form).
    There are specialized types of `ConstantDesc` such as `ClassDesc` to serve as
    a nominal descriptor for a `Class` constant.'
