- fmt: '# The Files Class


    The following methods have been added to the `Files` class:


    - `String readString(Path path) throws IOException`

    - `String readString(Path path, Charset cs) throws IOException`

    - `Path writeString(Path path, CharSequence csq, OpenOption... options) throws
    IOException`

    - `Path writeString(Path path, CharSequence csq, Charset cs, OpenOption... options)
    throws IOException`

    - `long mismatch(Path path, Path path2) throws IOException`


    The `readString()` and `writeString()` methods were added in Java 11. The `readString()`
    method reads content of a file as a `String`. The `writeString()` method writes
    a `CharSequence` such as `String` and `StringBuilder` to a file.


    The `mismatch()` method was added in Java 12. It finds a mismatch in the two specified
    files by comparing their contents byte by byte. It returns `-1L` if there is no
    mismatch in their contents. Otherwise it returns the position of the first mismatched
    byte. Two files are considered to match if one of the following conditions is
    true:


    - The two specified paths locate the same file.

    - Two files are of the same size and have the same contents compared byte to byte.


    Listing 8-6 contains a complete program to demonstrate reading and writing string
    to files and testing two files for a mismatch. You may get a different output.


    ```

    // FilesTest.java

    package com.jdojo.misc;

    import java.io.IOException;

    import java.nio.file.Files;

    import java.nio.file.Path;

    import java.nio.file.Paths;

    public class FilesTest {

    public static void main(String[] args) throws IOException {

    // Two files and their contents

    String text1 = "Hello, Text1";

    String text2 = "Hello, Text2";

    Path file1 = Paths.get("greeting1.txt");

    Path file2 = Paths.get("greeting2.txt");

    // Ensure test files exist. If they do not exist, create them.

    createTestFile(file1, text1);

    createTestFile(file2, text2);

    printMismatch(file1, file2);

    printMismatch(file1, file1);

    }

    public static void createTestFile(Path file, String text)

    throws IOException {

    Path absPath = file.toAbsolutePath();

    if (Files.exists(file) && Files.isRegularFile(file)) {

    System.out.printf("Information: %s exists.%n", absPath);

    } else {

    // Write the text to the file

    System.out.printf("Created %s.%n", absPath);

    Files.writeString(file, text);

    }

    // Print the contents of the file

    String str = Files.readString(file);

    System.out.printf("%s contains:%n%s%n", absPath, str);

    }

    public static void printMismatch(Path file1, Path file2)

    throws IOException {

    long pos = Files.mismatch(file1, file2);

    if (pos == -1L) {

    System.out.printf("%s and %s matched.%n",

    file1.toAbsolutePath(), file2.toAbsolutePath());

    } else {

    System.out.printf("%s and %s mismatched at position %d.%n",

    file1.toAbsolutePath(), file2.toAbsolutePath(), pos);

    }

    }

    }

    Created C:\Java13Revealed\greeting1.txt.

    C:\Java13Revealed\greeting1.txt contains:

    Hello, Text1

    Created C:\Java13Revealed\greeting2.txt.

    C:\Java13Revealed\greeting2.txt contains:

    Hello, Text2

    C:\Java13Revealed\greeting1.txt and C:\Java13Revealed\greeting2.txt mismatched
    at position 11.

    C:\Java13Revealed\greeting1.txt and C:\Java13Revealed\greeting1.txt matched.

    Listing 8-6

    Reading and Writing Strings to Files and Testing Two Files for a Mismatch

    ```


    The program creates two text files named `greeting1.txt` and `greeting2.txt` in
    the current directory with their contents as `"Hello, Text1"` and `"Hello, Text2"`,
    respectively. If these files already exist, the program does not create them.
    The program prints the informational message such as files'' path and their contents.
    In the end, it compares files for a mismatch and prints the position where the
    first mismatch is found. The mismatch position is zero-based. That is, if the
    first bytes in files do not match, the `mismatch()` method returns zero. The output
    differs between the first and the subsequent runs.


    # Collections


    There are two changes to the Collection API. Java 10 added a static `copyOf()`
    factory method to `List`, `Set`, and `Map` interfaces, which allows you to create
    an unmodifiable `List`, `Set`, and `Map` from another collection. Java 11 added
    a new default method named `toArray(IntFunction<T[]> generator)` to the `Collection<E>`
    interface, which can be used to pass in an array constructor reference to copy
    elements of a collection to an array of specific type. I will explain these additions
    in next sections.


    ## Creating Unmodifiable Copies of Collections


    Java 10 added a static `copyOf()` factory method to `List`, `Set`, and `Map` interfaces.
    The method returns an unmodifiable `List`, `Set`, or `Map`. It is declared as


    - `<E> List<E> copyOf(Collection<? extends E> coll)`

    - `<E> Set<E> copyOf(Collection<? extends E> coll)`

    - `<K, V> Map<K, V> copyOf(Map<? extends K, ? extends V> map)`


    The `copyOf()` method that returns a `List` is in the `List` interface, the one
    that returns a `Set` is in the `Set` interface, and the one that returns a `Map`
    is in the `Map` interface. The source collection must not be `null`, and it must
    not contain a `null` element. In the case of a `Map`, the `Map` should not contain
    any `null` key or value. The elements in the returned `List` are in the iteration
    order of the specified collection. The returned collection from the `copyOf()`
    method is unchanged even if the source collection is modified.


    Listing 8-7 contains a complete program to demonstrate the use of the copy factory
    method in the `List` interface. Using this method for a `Set` or `Map` would be
    very similar.


    ```

    // UnmodifiableListTest.java

    package com.jdojo.misc;

    import java.util.List;

    import java.util.ArrayList;

    import java.util.Comparator;

    public class UnmodifiableListTest {

    public static void main(String[] args) {

    // Create a modifiable list

    List names = new ArrayList();

    names.add("John");

    names.add("Buddy");

    names.add("Vishwa");

    names.add("Amy");

    // Copy the modifiable list into an unmodifiable list

    List namesCopy = List.copyOf(names);

    // Print both lists

    System.out.println("\nAfter copying the original list:");

    System.out.println("names: " + names);

    System.out.println("namesCopy: " + namesCopy);

    // Let us add a name to the modifiable list

    names.add("Mamta");

    // Print both lists

    System.out.println("\nAfter adding a name to the original list:");

    System.out.println("names: " + names);

    System.out.println("namesCopy: " + namesCopy);

    // Let us try sorting the unmodifiable list

    try {

    namesCopy.sort(Comparator.naturalOrder());

    System.out.println("\nSorted namesCopy: " + namesCopy);

    } catch (Exception e) {

    System.out.println("\nCannot sort an unmodifiable list");

    }

    }

    }

    After copying the original list:

    names: [John, Buddy, Vishwa, Amy]

    namesCopy: [John, Buddy, Vishwa, Amy]

    After adding a name to the original list:

    names: [John, Buddy, Vishwa, Amy, Mamta]

    namesCopy: [John, Buddy, Vishwa, Amy]

