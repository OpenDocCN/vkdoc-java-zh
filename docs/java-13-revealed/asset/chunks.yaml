- fmt: '# Summary


    Several JDK tools and Java APIs have been deprecated and removed in last few versions
    of the JDK. JDK10 has removed the `javah` tool. JDK11 has deprecated the Nashorn
    JavaScript engine and the Pack200 tools. JDK11 has removed the `appletviewer`
    tool. JDK13 has deprecated the `rmic` tool for removal in a future release. Java
    13 has deprecated the Swing Motif Look and Feel and does not support it on macOS.


    The `traceInstructions()` and `traceMethodCalls()` methods in the `java.lang.Runtime`
    class were deprecated in Java 9 for removal in a future release and have been
    removed in Java 13.


    The `destroy()` and `stop(Throwable)` methods in the `Thread` class have been
    removed in Java 11.


    JDK12 introduced the JVM Constants API, which is a low-level API to deal with
    how entries in a constant pool of class files are described by libraries and tools,
    which manipulates the bytecodes. As a developer, you will not need to use this
    API in your applications. The API is in the `java.lang.constant` package in the
    `java.base` module.


    The `String` class has received several new methods in Java 11 through Java 13.
    Many of them deal with multiline strings.


    Java 11 added three methods to the `String` class that removes leading/trailing,
    leading, and trailing whitespaces: `strip()`, `stripLeading()`, and `stripTrailing()`.


    Java 11 also added an `isBlank()` method to the `String` class, which returns
    `true` if the string contains only whitespaces and returns `false` otherwise.


    You can use the `lines()` method of the `String` class to obtain a stream of lines
    in a string. A line in a string is defined as a sequence of zero or more characters
    followed by a line terminator, which can be `"\n"`, `"\r"`, or `"\r\n"`.


    The `repeat(int count)` method in the `String` class returns a string whose content
    is the concatenation of the string repeated `count` times.


    Java 12 added a `transform(Function<? super String, ? extends R> f)` method to
    the `String` class, which transforms the string into another object by applying
    a `Function`. The `Function` accepts a `String` and returns an object of any type.


    The no-args `orElseThrow()` method was added to the `Optional<T>` class in Java
    10. If the `Optional` contains a value, the method returns the value. Otherwise,
    it throws a `java.util.NoSuchElementException` runtime exception. Java 11 added
    an `isEmpty()` method that returns `true` if the `Optional` is empty and `false`
    otherwise.


    Java 11 has added a new `not()` static method to the `Predicate<T>` interface,
    which returns the negation of the specified `Predicate`.


    Java 12 added a `CompactNumberFormat` class to the `java.text` package in the
    `java.base` module. It is a subclass of the `NumberFormat` class. It formats a
    decimal number in its compact form. A compact form of a number is suitable to
    be used where space is limited to display the number. For example, instead of
    displaying one billion as 1000000000, you can display it in a compact form like
    1B or 1 billion. Use the `getCompactNumberInstance()` factory method in the `NumberFormat`
    class to obtain an instance of the `CompactNumberFormat` class.


    Java 10 supports Unicode Standard version 8.0.0. Java 11 supports Unicode Standard
    version 10.0.0. Java 12 supports Unicode standard version 11.0, plus the Japanese
    Era code point, U+32FF, from the first version of the Unicode Standard after 11.0
    that assigns the code point. Java 13 supports Unicode Standard version 12.1.


    The `readString()` and `writeString()` methods were added to the `Files` class
    in Java 11. The `readString()` method reads the content of a file as a `String`.
    The `writeString()` method writes a `CharSequence` such as `String` and `StringBuilder`
    to a file.


    The `mismatch()` method was added to the `Files` class in Java 12. It finds a
    mismatch in the two specified files by comparing their contents byte by byte.
    It returns -1L if there is no mismatch in their contents. Otherwise it returns
    the position of the first mismatched byte.


    There are two changes to the Collection API. Java 10 added a static `copyOf()`
    factory method to `List`, `Set`, and `Map` interfaces to create an unmodifiable
    `List`, `Set`, and `Map` from another collection. Java 11 added a new default
    method `toArray(IntFunction<T[]> generator)` to the `Collection` interface, which
    can be used to pass in an array constructor reference to copy elements of a collection
    to an array of specific type.


    Java 10 added three methods to the `Collectors` class, which return a `Collector`
    that accumulates elements in an unmodifiable `List`, `Set`, and `Map`: `toUnmodifiableList()`,
    `toUnmodifiableSet()`, and `toUnmodifiableMap()`. Java 12 added another type of
    collector, which uses two collectors to collect distinct types of results and
    finally uses a `BiFunction` to merge the results of the two collectors. The merged
    result is the result of the collector. The new `teeing()` method in the `Collectors`
    class returns such a collector.


    Java 13 has added the absolute bulk get and put methods to the subclasses of the
    `java.nio.Buffer` class such as `ByteBuffer`, `CharBuffer`, `IntBuffer`, and so
    on. These methods allow reading from and writing to a buffer in bulk without affecting
    the current position of the buffer. Java 13 also added a new `slice()` method
    in the `Buffer` class, which lets you specify the absolute range to be sliced.


    Java 13 added three factory methods in the `FileSystems` class that allows to
    use a `Path` to create a `FileSystem` using a file system provider that lets you
    treat contents of a file as a file system such as the Zip File System. Before
    Java 13, you had to use a URI to refer to the file representing the file system
    and other factory methods in the `FileSystems` class that accepted a `URI`.


