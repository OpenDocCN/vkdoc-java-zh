    ## 摘要


    Java SE 平台的一项预览特性是指一个完整定义且完整实现的语言或虚拟机特性，该特性在某个 JDK 功能发布版中可用，但尚未成为 JDK 的永久特性。提供预览特性是为了征求开发者的反馈。你必须在使用编译器和运行时环境时使用
    `--enable-preview` 选项才能使用预览特性。当你使用 `--enable-preview` 选项编译源代码时，还必须使用 `--release`
    或 `-source` 选项。你必须在启动 JShell 时使用 `--enable-preview` 选项，才能在 JShell 中使用任何预览特性。


    Java 12 将增强型 `switch` 作为一项预览特性引入。该特性在 Java 13 中仍作为预览特性，但有一处更改：Java 12 中带值的 `break`
    语句被 Java 13 中的 `yield` 语句所取代。


    在 Java 13 中，你有两种 `switch` 风格：传统的 `switch` 和新的 `switch`。在新的 `switch` 中，你使用箭头（`->`）来分隔
    switch 标签及其代码，而在旧的 switch 中则使用冒号（`:`）。你不能在同一个 `switch` 中混合使用这两种 switch 标签语法。增强型
    `switch` 既可以作为语句使用，也可以作为表达式使用。


    新的 `switch` 在编写和调试代码时让开发者的工作稍微轻松了一些。它没有 `default` 穿透——一次只能执行一个 `switch` 标签。与 `switch`
    标签关联的代码可以是一个表达式、一个块语句或一个 `throw` 语句。


    增强型 `switch`——无论是传统的 `switch` 还是新的 `switch`——都允许在 `case` 标签中使用多个以逗号分隔的 case 常量。


    为了支持 `switch` 表达式，Java 13 添加了一个名为 `yield` 语句的新语句。它只能在 `switch` 表达式中使用，以产生一个值。`yield`
    语句产生的值将成为 `switch` 表达式的值。在 `switch` 表达式中不允许使用诸如 `break`、`continue` 和 `return`
    之类的控制转移语句。


    编译器会检查 `switch` 表达式中 `selector-expression` 的所有可能值是否都被 `switch` 标签覆盖。否则，将发生编译时错误。如果
    `switch` 表达式基于枚举类型，并且所有枚举常量都被 `switch` 标签覆盖且没有 `default` 标签，则编译器会添加一个抛出 `IncompatibleClassChangeError`
    的 `default` 标签。当向枚举中添加新常量，并且使用新的枚举常量执行 switch 表达式时，这个隐式的 `default` 标签有助于你调试代码。隐式的
    `default` 标签会提供更好的错误消息，帮助你快速定位问题。


    `switch` 表达式是一个多态表达式，其类型取决于上下文。如果 `switch` 表达式有已知的目标类型，则 `switch` 表达式的类型就是该目标类型。如果目标类型未知，则会通过组合所有
    `switch` 标签产生的值的类型来计算出一个独立类型。


    `yield` 是一个*受限标识符*。你不能将 `yield` 用作类型名称，例如类名或接口名。但是，你可以将 `yield` 用作方法名和变量名。你不能将未限定的
    `yield()` 作为方法调用。如果你现有的代码包含未限定的 `yield()` 方法调用，则需要将它们更改为限定的方法调用，以避免编译时错误。


    # 6. 文本块


    在本章中，你将学习


    *   什么是文本块

    *   如何在代码中表示文本块

    *   文本块的格式化规则

    *   对 `String` API 的更改以支持文本块

    *   如何检测文本块中空格的不一致使用


    ## 背景


    你编写 Java 程序时很少有不处理字符串的情况。自 1.0 版本以来，Java 就支持将字符串作为 `String` 类的实例。它还支持 `String`
    字面量，这些字面量是用双引号括起来的零个或多个字符的序列。`String` 字面量在源代码中表示，并且是 `String` 类的实例。使用 `String`
    字面量最大的痛点在于：


    *   如果一个字符串字面量无法放入一行，你需要将其拆分成更小的字符串，并使用字符串连接运算符（`+`）将它们重新组合成一个字符串。

    *   如果你有一个包含行终止符的字符串，你需要在字符串中将换行符嵌入为转义序列（`\n`），并使用字符串连接运算符（`+`）。

    *   如果你的字符串包含双引号，你需要在字符串中使用转义序列 `\"` 来表示它们。


    使用 `String` 字面量的这些问题使得用字符串编写 Java 代码变得繁琐，并且存在巨大的可读性问题。假设你想表示一个包含三个城市的列表——每个城市占一行。以下是使用
    `String` 字面量实现的方法：


    ```

    String cities = "Panama\nParis\nPatna\n";

    ```


    你可能同意这不太可读。你失去了它包含三行——每行包含一个城市名称——的视觉感。以下是实现相同目标的另一种尝试：


    ```

    String cities = "Panama\n" +

    "Paris\n" +

    "Patna\n";

    ```


    这一次，可读性稍好一些，但仍然包含转义序列（`\n`）形式的视觉杂乱。你能猜出以下 `String` 字面量表示的字符串吗？


    ```

    String quote = "\"A fool thinks of himself to be wise. " +

    "But a wise man knows himself to be a fool.\"\n" +

    "–William Shakespeare\n";

    ```


    这个 `String` 字面量表示以下威廉·莎士比亚的名言：


    > *愚者自以为智，智者自知其愚。*


    > ——威廉·莎士比亚


    如果你能够像下面这样表示这句名言，岂不是更好？


    ```

    String quote = """

    "A fool thinks of himself to be wise. But a wise man knows himself to be a fool."

    –William Shakespeare

    """;

    ```


    如果你能够像下面这样表示三个城市的列表——每个城市占一行——岂不是更好？


    ```

    String cities = """

    Panama

    Paris

    Patna

    """;

    ```


    在 Java 程序中像下面这样编写 HTML 代码，岂不是更简洁？


    ```

    String html = """


    Hello, HTML


    """;

    ```


    使用 `String` 字面量来表示复杂的多行文本并不仅限于像三个城市的列表和一句名言这样的字符串。通常，Java 程序包含非 Java 代码，例如 SQL、JSON、XML
    和 HTML，这些代码以 `String` 字面量的形式存在。在 Java 中表示这些类型的代码一直很痛苦。一些开发者甚至将这些类型的代码放入文件中，打包到
    JAR 中，并在运行时将文件读入 `String` 实例。这种方法让你摆脱了 `String` 字面量限制的束缚，但代价是增加了处理文件的额外麻烦！


    解决 Java 开发者在用 `String` 字面量表示复杂的多行文本块时遇到的问题，一直是 Java 语言设计者相当长一段时间内的关注焦点。他们在 Java
    12 中作为语言预览特性添加了对原始字符串字面量的支持，但后来撤回了，因此它从未进入 Java 12。你可以在 JEP 326 的 [`https://openjdk.java.net/jeps/326`](https://openjdk.java.net/jeps/326)
    找到关于原始字符串字面量提案的详细信息。JEP 326 已被 JEP 355（[`https://openjdk.java.net/jeps/355`](https://openjdk.java.net/jeps/355)）取代，后者提议在
    Java 13 中将文本块支持作为语言预览特性。在前面的示例中，当你使用 `"""` 来开始和结束字符串（例如将 HTML 代码表示为 `String`）时，你已经看到了文本块。文本块是本章讨论的主题。

    '
- fmt: '## What Is a Text Block?


    A text block is a sequence of zero or more characters enclosed by an opening delimiter
    and a closing delimiter. The content of a text block can span multiple lines,
    and you do not need to use most escape sequences. Here is the syntax to use a
    text block:


    The syntax allows to place the closing delimiter on a separate line or on the
    same line where the content of the text block ends:


    The opening delimiter starts with a sequence of three double quote characters
    (`"""`), optionally followed with zero or more space, tab, or form feed characters,
    and ends with a line terminator.


    The closing delimiter consists of a sequence of three double quote characters
    (`"""`).


    The content of a text block is the sequence of characters that starts immediately
    after the line terminator of the opening delimiter and ends immediately before
    the first double quote of the closing delimiter.


    A text block is an instance of the `String` class. Anywhere you have been using
    `String` literals, you can use text blocks. Here are a few examples of text blocks.
    Each example prints the text block to show you the resulting string:


    ```

    String cities = """

    Panama

    Paris

    Patna""";

    System.out.println(cities);

    Panama

    Paris

    Patna

    ```


    This text block is the same as the `String` literal `"Panama\nParis\nPatna"`.


    If you put the closing delimiter on its own line, a newline (`\n`) is appended
    to the content of the text block. The following text block is same as the `String`
    literal `"Panama\nParis\nPatna\n"`:


    ```

    String cities = """

    Panama

    Paris

    Patna

    """;

    System.out.println(cities);

    Panama

    Paris

    Patna

    ```


    Notice the last line in the output, which is an empty line, because you placed
    the closing delimiter on a separate line.


    Consider the following snippet of code:


    ```

    String cities = """

    Panama

    Paris

    Patna

    """;

    System.out.println(cities);

    Panama

    Paris

    Patna

    ```


    Are you surprised by the output? The last line in the output is empty because
    you placed the closing delimiter on a separate line. The three lines in the content
    have been indented with 16 spaces to the left. This happened because you have
    moved the closing delimiter to the beginning of the line. Compare the placement
    of the closing delimiter in the last two examples. Placement of the close delimiter
    makes a difference in formatting the text block. You need to master the rules
    behind it. I will explain all formatting rules for text blocks in subsequent sections.


    ### Tip


    A text block is not a raw string – meaning you do not get what you type. The content
    of a text block is transformed by the compiler using a predefined set of rules.


    Let us have a few invalid examples of using the opening delimiter in text blocks.
    Recall that after the three double quote characters (`"""`) in the opening delimiter,
    you can have spaces, tabs, and line feeds. You must end it with a line terminator.
    The allowed characters that may follow `"""` are invisible characters. You cannot
    use escape sequences for these invisible characters. You simply type them as invisible
    characters in your source code. The following are invalid text blocks, which generate
    compile-time errors:


    ```

    // Missing line terminator in the opening delimiter.

    String str = """Hello

    """;

    // Missing line terminator in the opening delimiter. You can enter a tab

    // character in the opening delimiter, but not as an escape sequence \t.

    String str = """\t

    Hello

    """;

    // Missing line terminator in the opening delimiter.

    String str = """Hello""";

    ```


    ### Tip


    The opening delimiter in a text block must be placed on a separate line using
    a line terminator, and the content of the text block must start on the next line.


    ## Text Blocks Are a Preview Feature


    Text blocks are a language preview feature in Java 13. Refer to Chapter [5](#419466_2_En_5_Chapter.xhtml)
    for more details on what a preview feature is. Chapter [5](#419466_2_En_5_Chapter.xhtml)
    also explains how to compile and run Java programs that use Java preview features.


    ## Text Blocks Are Transformed


    Let us start with two questions. Is a text block a raw string? Is a text block
    a multiline `String` literal? The answers to both questions are yes and no. To
    some extent, a text block is a raw string and a multiline `String` literal; to
    some extent, it is neither. To clarify the answer, let us define what a *raw*
    string and a *multiline* `String` *literal* mean.


    A raw string means no processing occurs to the string. The term *raw* means “not
    changed in any way.” This is not what you get from a text block. A text block
    is transformed before you get a final string from it. Therefore, a text block
    is not certainly a 100% *raw* string.


    How about a text block being a multiline `String` literal? Again, the term *literal*
    means it is represented unchanged. This is not the case with a text block because
    it is transformed.


    On the other side of the argument, a text block does preserve most, if not all,
    part of the original string and allows you to span the string in multiple lines.
    In that sense, it is partly raw and multiline.


    A text block is sometimes referred to as a multiline `String` literal. Even JEP
    355, which defines the text block features, refers to it as a multiline `String`
    literal. If you want to refer to it as a multiline `String` literal, I would suggest
    you call it *a multiline* `String` *literal with transformation*, which gives
    the reader the true sense of what it is.


    The compiler uses a set of predefined rules to transform the content of a text
    block. The resulting string, after the transformation, is represented as a `String`
    literal in class files. The runtime does not know anything about a text block.
    Now you may see the reason why I call it *a multiline String literal with transformation*.'
