    ### 提示


    从 JDK11 开始，服务器端 VM 默认启用 `-Xshare:auto` 选项。


    以下命令尝试使用 JDK10 运行 `HelloCDS` 类——一次使用 `-Xshare:off`，一次使用 `-Xshare:on`：


    ```

    C:\Java13Revealed>java -Xshare:off --module-path dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    C:\Java13Revealed>java -Xshare:on --module-path dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    An error has occurred while processing the shared archive file.

    Specified shared archive not found.

    Error occurred during initialization of VM

    Unable to use shared archive.

    ```


    当你使用 `-Xshare:on` 时，收到一个错误，提示找不到共享归档。在 OpenJDK10 和 OpenJDK11 中，你需要使用 `-Xshare:dump`
    选项来生成共享归档。从 OpenJDK12 开始，构建 JDK 镜像时会自动生成共享归档。如果你在前一节中已经生成了共享归档，那么这条命令本应成功运行。以下是使用
    JDK10 生成共享归档并重新运行之前命令的方法：


    ```

    C:\Java13Revealed>java -Xshare:dump

    ...

    C:\Java13Revealed>java -Xshare:on --module-path dist\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    ```


    当共享归档被禁用和启用时，你在输出中看不到任何区别。然而，第二次——当共享归档启用时——JVM 启动得更快。如何证明这一点？


    在类 UNIX 操作系统上，`time` 命令用于测量进程运行时间。在 Windows 上，你需要使用 `Measure-Command` PowerShell
    命令。所有命令均使用 JDK10。以下是在 Linux 上的结果：


    ```

    [/home/ksharan/Java13Revealed] $ time java -Xshare:off --module-path dist/jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    real 0m0.215s

    user 0m0.124s

    sys 0m0.034s

    [/home/ksharan/Java13Revealed] $ time java -Xshare:on --module-path dist/jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

    Hello, CDS and AppCDS

    real 0m0.108s

    user 0m0.098s

    sys 0m0.023s

    ```


    以下是在 Windows 上使用 PowerShell（而非 Windows 命令提示符）的结果：


    ```

    PS C:\Java13revealed> Measure-Command {java -Xshare:off --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cd

    s.HelloCDS | Write-Host}

    Hello, CDS and AppCDS

    ...

    TotalMilliseconds : 281.1476

    PS C:\Java13revealed> Measure-Command {java -Xshare:on --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds

    .HelloCDS | Write-Host }

    Hello, CDS and AppCDS

    ...

    TotalMilliseconds : 180.3489

    ```


    注意第二次运行程序所花费的时间，比第一次要少。在 Linux 上，应用程序运行速度大约快了 49%，而在 Windows 上，大约快了 36%。你得到的结果可能略有不同。


    ### 了解已加载类的来源


    当 CDS 启用时，核心系统类从共享归档中加载。你可以使用 `-Xlog:class+load=info` 选项打印已加载类的来源。以下命令在 JDK10
    上使用此选项——一次在 CDS 启用时，一次在 CDS 禁用时：


    ```

    C:\Java13Revealed>java -Xshare:off -Xlog:class+load=info --module-path dist\jdojo.cds.jar
    --module jdojo.cds/com.jdojo.cds.HelloCDS

