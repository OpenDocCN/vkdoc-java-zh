  trans: "\n这次，`\"One\"`、`\"Two\"`等是表达式。你不能通过添加分号将它们转换为表达式语句。当`switch`表达式（`count`）匹配某个`case`标签时，对应的表达式（`\"\
    One\"`、`\"Two\"`等）就成为`switch`表达式的值。\n\n如果必须使用某些逻辑来计算`switch`标签中的值，则需要使用`yield`语句将值作为`switch`表达式的值返回。请考虑以下使用`switch`表达式计算值的代码片段：\n\
    \n```\nchar c = 'W';\n// 此处省略更多代码\nString desc = switch(Character.toLowerCase(c))\
    \ {\ncase 'a', 'e', 'i', 'o', 'u'-> \"Vowel\";\ndefault-> {\nif (Character.isLetter(c))\
    \ {\nyield \"Consonant\";\n} else {\nyield \"Not-a-Letter\";\n}\n}\n};\nSystem.out.println(desc);\n\
    ```\n\n当字符是元音时，`case`标签使用简单表达式`\"Vowel\"`。`default`标签使用块语句，通过逻辑判断它是辅音还是非字母。注意`if`和`else`块中`yield`语句的使用。`default`标签并未使用非常复杂的逻辑。你可以将其替换为如下表达式：\n\
    \n```\nString desc = switch(Character.toLowerCase(c)) {\ncase 'a', 'e', 'i', 'o',\
    \ 'u'-> \"Vowel\";\ndefault-> Character.isLetter(c)?\"Consonant\":\"Not-a-Letter\"\
    ;\n};\n```\n\n请注意，之前的`switch`表达式没有使用任何`yield`语句。请考虑以下使用新`switch`语句的代码片段：\n\n```\n\
    char c = 'W';\n// 此处省略更多代码\nswitch(Character.toLowerCase(c)) {\ncase 'a', 'e',\
    \ 'i', 'o', 'u'-> {\nchar upperChar = Character.toUpperCase(c);\nSystem.out.println(\"\
    Vowel: \" + upperChar);\n}\ndefault-> {\nif (Character.isLetter(c)) {\nchar upperChar\
    \ = Character.toUpperCase(c);\nSystem.out.println(\"Consonant: \" + upperChar);\n\
    } else {\nSystem.out.println(\"Not-a-Letter: \" + c);\n}\n}\n}\n```\n\n这段代码使用了一个`case`标签和一个`default`标签。两者都包含多条语句，因此你必须在每个标签中使用块语句（`{}`）。注意，你在两个标签的代码中都使用了相同的局部变量名`upperChar`。在传统的`switch`中，像这样在`switch`块中声明重复变量也是可行的，但你必须记得使用块语句；而新的`switch`强制你使用块语句。\n\
    \n清单 5-3 包含一个完整的程序，用于演示新`switch`及其语法。我使用新`switch`重写了清单 5-2 中的程序，该程序原本使用传统`switch`。\n\
    \n```\n// NewSwitch.java\npackage com.jdojo.enhancedswitch;\npublic class NewSwitch\
    \ {\npublic static void main(String[] args) {\nwhatLetter('a');\nwhatLetter('W');\n\
    whatLetter('5');\nfor(int i = 1; i \nSystem.out.println(\"Vowel: \" + c);\ndefault->\
    \ {\nif (Character.isLetter(c)) {\nSystem.out.println(\"Consonant: \" + c);\n\
    } else {\nSystem.out.println(\"Not-a-Letter: \" + c);\n}\n}\n}\n}\npublic static\
    \ String getDesc(int count) {\n// 将新 switch 用作表达式\nreturn switch (count) {\ncase\
    \ 1-> \"One\";\ncase 2-> \"Two\";\ncase 3-> \"Three\";\ndefault-> \"Out-of-range\"\
    ;\n};\n}\n}\nVowel: a\nConsonant: W\nNot-a-Letter: 5\n1:One\n2:Two\n3:Three\n\
    4:Out-of-range\n清单 5-3\n演示新 Switch 语法的程序\n```\n\n## 新 Switch 会取代旧 Switch 吗\n\n\
    一旦新`switch`成为 Java SE 的标准特性（可能在 Java SE 14 中），当它满足你的需求时，建议你使用它来替代传统`switch`。然而，它并不能完全取代传统的`switch`语句。请记住，传统的`switch`默认提供穿透（fall-through）行为，并且你有办法（使用`break`语句）覆盖默认行为。请考虑以下利用传统`switch`语句穿透特性的简单示例：\n\
    \n```\nint count = 2;\n// 此处省略更多代码...\nswitch (count) {\ncase 1:\nSystem.out.print(\"\
    One \");\ncase 2:\nSystem.out.print(\"Two \");\ncase 3:\nSystem.out.println(\"\
    Three.\");\nbreak;\ndefault: System.out.println(\"Over-My-Head\");\n}\n```\n\n\
    如果`count`的值为 1，它会打印`\"One Two Three\"`；为 2 时，打印`\"Two Three\"`；为 3 时，打印`\"Three\"\
    `；对于其他任何值，打印`\"Over-My-Head\"`。由于传统`switch`语句的穿透特性，实现此逻辑非常简单。使用新`switch`语法没有直接的方法来实现此逻辑，因为新`switch`不提供穿透特性。你明白了——尽可能使用新语法，在需要穿透时使用传统`switch`。\n\
    \n我很好奇，想更深入地了解新`switch`特性以及编译器如何处理它们。因此，我尝试反编译本章中所有使用新`switch`语法编写的示例。你可以使用[`www.javadecompilers.com`](http://www.javadecompilers.com)反编译你的\
    \ Java 代码。当我反编译我的代码时，我没有看到任何新`switch`语法。我发现，在所有情况下，使用新`switch`语法的代码都被转换成了传统`switch`。尽管新`switch`在幕后使用了旧`switch`，但作为开发者，使用新语法能获得很多好处。你可以得到更简洁、更不易出错的代码，以及一个重要的新特性——将`switch`用作表达式！\n"
- fmt: '# Exhaustiveness of Case Labels


    The switch labels for a switch expression, not a switch statement, must be exhaustive.
    That is, you must have a `switch` label for each possible value for the `selector-expression`
    in a `switch` expression. Consider the following snippet of code:


    ```

    int count = 2;

    String desc = switch(count) {

    case 1-> "One";

    case 2-> "Two";

    case 3-> "Three";

    };

    ```


    This snippet of code generates the following compile-time error:


    ```

    error: the switch expression does not cover all possible input values

    String desc = switch(count) {

    1 error

    ```


    The reason for this error is that the three `case` labels cover only three possible
    values for `count`. Here, `count` is an `int` and the possible values for an `int`
    is in millions. Typically, you would cover other values for `count` using a `default`
    label – just to make the compiler happy:


    ```

    int count = 2;

    String desc = switch(count) {

    case 1-> "One";

    case 2-> "Two";

    case 3-> "Three";

    default-> "Out-of-range";

    };

    ```


    Suppose your `switch` expression is based on an enum and the `case` labels cover
    all enum constants. Later, you add a new enum constant to your enum and compile
    only the enum definition, not the code that uses the enum in the `switch` expression.
    What would happen if the `switch` expression is executed with the newly added
    value of the enum constant? Remember that this discussion is for `switch` expressions,
    not `switch` statements. If you had used this enum in a `switch` statement, using
    the new enum constant in the switch statement will silently do nothing because
    the new enum constant is not covered by any of the `switch` labels. However, using
    a `switch` expression is different. Typically, you want to compute a value for
    each enum constant in a `switch` expression. Because you do not know all enum
    constants that may be added in future, you may add a `default` label to your `switch`
    expression, which typically would throw an exception or yield a default value.


    The compiler assists you when you use `switch` as an expression – new `switch`
    as well as old `switch`. When a `switch` expression is based on an enum and all
    enum constants are covered by case labels, the compiler adds a `default` label
    with the following code:


    ```

    default-> throw new IncompatibleClassChangeError();

    ```


    Let us walk through an example. Listing [5-4](#419466_2_En_5_Chapter.xhtml#PC35)
    contains the declaration for an enum called `TrafficLight`. It contains two constants
    `GREEN` and `RED`.


    ```

    // TrafficLight.java

    package com.jdojo.enhancedswitch;

    public enum TrafficLight {GREEN, RED}

    Listing 5-4

    A TrafficLight Enum with Two Constants GREEN and RED

    ```


    Listing [5-5](#419466_2_En_5_Chapter.xhtml#PC36) contains the code for a `Drive`
    class. Its `changeLight()` method uses a `switch` expression covering both constants
    of the `TrafficLight` enum. The `main()` method calls the `changeLight()` method
    – once for each enum constant in the `TrafficLight` enum. The output shows the
    expected results.


    ```

    // Drive.java

    package com.jdojo.enhancedswitch;

    public class Drive {

    public static void main(String[] args) {

    for (TrafficLight light : TrafficLight.values()) {

    changeLight(light);

    }

    }

    public static void changeLight(TrafficLight light) {

    String decision = switch (light) {

    case GREEN-> "GO";

    case RED-> "STOP";

    };

    System.out.println(light + ": " + decision);

    }

    }

    GREEN: GO

    RED: STOP

    Listing 5-5

    A Drive Class That Uses the TrafficLight Enum Constants in a switch Expression

    ```


    The compiler silently added a safeguard to your `switch` expression. It changed
    your `switch` expression to the following:


    ```

    String decision = switch (light) {

    case GREEN-> "GO";

    case RED-> "STOP";

    default-> throw new IncompatibleClassChangeError();

    };

    ```


    The purpose of this hidden `default` label that was added by the compiler will
    be clear shortly. Let us add a new constant `AMBER` to the `TrafficLight` enum.
    Listing [5-6](#419466_2_En_5_Chapter.xhtml#PC38) contains the modified enum declaration.


    ```

    // TrafficLight.java

    package com.jdojo.enhancedswitch;

    public enum TrafficLight {GREEN, RED, AMBER}

    Listing 5-6

    A TrafficLight Enum with Three Constants GREEN, RED, and AMBER

    ```


    Recompile the `TrafficLight` enum, but not the `Drive` class. Now, rerun the `Drive`
    class, which produces the following output:


    ```

    GREEN: GO

    RED: STOP

    Exception in thread "main" java.lang.IncompatibleClassChangeError

    at jdojo.enhancedswitch/com.jdojo.enhancedswitch.Drive.changeLight(Drive.java:12)

    at jdojo.enhancedswitch/com.jdojo.enhancedswitch.Drive.main(Drive.java:7)

    ```


    The error message in the output makes it clear that the enum definition changed
    between compile time and runtime. The developer needs to handle the new enum constant
    `AMBER` in the switch expression in the `changeLight()` method in the `Drive`
    class. If you add a `default` label to an enum-based `switch` expression, the
    compiler does not add a `default` label for you.


    If you recompile the `Drive` class without adding a `default` label, you get the
    following compile-time error:


    ```

    C:\Java13Revealed\src\jdojo.enhancedswitch\classes\com\jdojo\enhancedswitch\Drive.java:12:
    error: the switch expression does not cover all possible input values

    String decision = switch (light) {

    1 error

    ```


    You need to handle the new enum constant `AMBER` in the `switch` expression in
    the `changeLight()` method of the `Drive` class to get rid of this error.


    In Java, an expression must evaluate to a value or throw an exception. This rule
    is also enforced for `switch` expressions for which the compiler checks that each
    `switch` label yields a value or throws an exception. If a `switch` label may
    not yield a value, a compile-time error occurs. Consider the code in Listing [5-7](#419466_2_En_5_Chapter.xhtml#PC41).
    Can you spot the compile-time errors in the `SwitchExpressionCompletion` class?


    ```

    // SwitchExpressionCompletion.java

    package com.jdojo.enhancedswitch;

    import java.time.LocalDate;

    public class SwitchExpressionCompletion {

    public static void main(String[] args) {

    int count = 2;

    String desc = switch(count) {

    case 1-> "One";

    case 2-> throw new IllegalArgumentException("Don''t like two!");

    case 3-> {

    if (LocalDate.now().getYear() == 2019) {

    yield "Three";

    }

    // A compile-time error

    }

    default-> {

    System.out.println("What are you talking about!");

    // A compile-time error

    }

    };

    }

    }

    Listing 5-7

    A SwitchExpressionCompletion Class

    ```


    Compiling the `SwitchExpressionCompletion` class generates the following errors:


    ```

    C:\Java13Revealed\src\jdojo.enhancedswitch\classes\com\jdojo\enhancedswitch\SwitchExpressionCompletion.java:18:
    error: switch rule completes without providing a value

    }

    (switch rules in switch expressions must either provide a value or throw)

    C:\Java13Revealed\src\jdojo.enhancedswitch\classes\com\jdojo\enhancedswitch\SwitchExpressionCompletion.java:22:
    error: switch rule completes without providing a value

    }

    (switch rules in switch expressions must either provide a value or throw)

    ```


    The errors are pointing to the end of the `"case 3->"` and `"default->"` labels.
    The compiler concludes that these two labels do not yield a value or throw an
    exception from all possible execution paths. `"case 3->"` does not yield a value
    or throws an exception when the current year is other than 2019. `"default->"`
    does not yield a value or throws an exception. The compiler is here to help you
    when you have these logical mistakes in your `switch` expressions.


    This implies that you cannot use control transfer statements such as `break`,
    `continue`, and `return` in `switch` expressions. You can use the `break` statement
    to break out of `switch` statements. Remember the following two rules:


    * Switch statements only use the `break` statement and never the `yield` statement.


    * Switch expressions only use the `yield` statement and never the `break` statement.'
