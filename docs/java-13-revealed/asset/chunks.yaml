    which sends the request synchronously – it blocks until the response is received.
    While sending a request, you need to specify a body handler to process the response
    body. Several built-in body handlers are available from the factory methods of
    the `HttpResponse.BodyHandlers` class. For example, `BodyHandlers.ofString() static`
    method returns a body handler to process the response body as a `String`. The
    `send()` method returns an `HttpResponse<T>`, where the type parameter `T` is
    the type of the body handler. If the body handler if of type `String`, the `send()`
    method returns `HttpResponse<String>`. The `statusCode()` method of the `HttpResponse`
    returns the HTTP status code as an `int` and its `body()` method returns the response
    body. The `send()` method throws checked exceptions `IOException` and `InterruptedExceptionIOException`,
    so you need to handle the exceptions in your code. The following snippet of code
    shows how to send the request to the server and process its body as a `String`:


    ```

    // Send the request to the server handling the response body as a String

    HttpResponse response

    = client.send(request, BodyHandlers.ofString());

    // Get the response status and body

    int statusCode = response.statusCode();

    String body = response.body();

    ```


