    ## 使用 HTTP 基本认证


    服务器可能需要认证才能允许访问请求的资源。HTTP 提供了一种质询-响应类型的认证框架。客户端向服务器请求一个资源。服务器向客户端发出质询，要求提供特定类型的认证。客户端向服务器提供认证信息。服务器在验证认证信息后，允许或拒绝对请求资源的访问。认证有多种类型，例如基本认证、Bearer
    认证、摘要认证等。


    HTTP 客户端 API 为基本认证提供了内置支持。在这种认证方式中，服务器向客户端响应一个 401（未授权）HTTP 状态码和一个名为 `WWW-Authenticate`
    的响应头，其中包含至少一个质询。通常，客户端会在名为 `Authorization` 的请求头中响应一个 base64 编码的用户名和密码，其形式可能如下：


    ```

    Authorization: Basic a2lzaG9yaTpzaGFyYW4=

    ```


    让我们看一个基本认证的示例。你将使用以下 URL，该 URL 会向客户端发出基本认证的质询：


    ```

    https://httpbin.org/basic-auth/[username]/[password]

    ```


    这里，`[username]` 是用户名，`[password]` 是认证所需的密码。当服务器发出质询时，你需要提供相同的用户名和密码才能使认证成功。在示例中，我使用了：


    ```

    https://httpbin.org/basic-auth/kishori/sharan

    ```


    如果你在浏览器中输入此 URL，系统会提示你输入用户名和密码。你需要输入 `kishori` 作为用户名，`sharan` 作为密码。要使用不同的用户名/密码，请相应地更改此
    URL。


    `java.net.Authenticator` 类的实例用于通过用户名/密码提供基本认证。你需要继承 `Authenticator` 并重写 `getPasswordAuthentication()`
    方法。该方法返回一个 `PasswordAuthentication` 类的实例，该类只是用户名和密码的持有者。你将使用 `HttpClient.Builder`
    接口的 `authenticator()` 方法将此认证器的实例设置到 `HttpClient` 对象中。当 `HttpClient` 需要对请求进行认证时，它将调用你的认证器的
    `getPasswordAuthentication()` 方法，并将 `PasswordAuthentication` 中返回的用户名/密码发送给服务器。


    清单 3-12 包含了一个名为 `BasicAuthenticator` 的类的代码。你通过提供用户名和密码来创建其实例。当需要认证时，其 `getPasswordAuthentication()`
    方法会打印一条消息，并在 `PasswordAuthentication` 中返回用户名和密码。通常，在提供用户名/密码之前，你会检查请求的认证信息，例如网站名称。如果用户需要提供此信息，你可能希望用一个对话框提示用户输入用户名/密码。我让这个示例保持简单，直接返回提供的用户名/密码。


    ```

    // BasicAuthenticator.java

    package com.jdojo.http.client;

    import java.net.Authenticator;

    import java.net.PasswordAuthentication;

    public class BasicAuthenticator extends Authenticator {

    private final String userName;

    private final char[] password;

    public BasicAuthenticator(String userName, char[] password) {

    this.userName = userName;

    this.password = password;

    }

    @Override

    protected PasswordAuthentication getPasswordAuthentication() {

    System.out.println(this.getRequestingURL()

    + " 正在请求认证: "

    + this.getRequestingPrompt());

    return new PasswordAuthentication(userName, password);

    }

    }

