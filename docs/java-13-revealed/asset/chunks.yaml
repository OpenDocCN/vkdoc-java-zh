    namesCopy: [John, Buddy, Vishwa, Amy]

    向原始列表添加一个名字后：

    names: [John, Buddy, Vishwa, Amy, Mamta]

    namesCopy: [John, Buddy, Vishwa, Amy]

    无法对不可修改的列表进行排序

