    ## 向编译器传递选项


    在源文件模式下，`java` 命令在运行源文件之前需要先编译它。它会扫描命令行中与编译器相关的选项，并将它们传递给编译器。如果指定了，传递给编译器的选项如下：


    *   `--class-path`


    *   `--module-path`


    *   `--add-exports`


    *   `--add-modules`


    *   `--limit-modules`


    *   `--patch-module`


    *   `--upgrade-module-path`


    *   `--enable-preview`


    除了此列表中的选项外，你不能向编译器传递任何其他选项。如果选项列表很大，你可以使用命令行参数文件（@-files）来传递它们。


    在源文件模式下，编译期间会禁用注解处理。这就像你使用了 `-proc:none` 选项来编译源代码一样。


    如果使用 `--source` 选项指定了版本，则该值将用作编译时隐式 `--release` 选项的参数。


    编译器不会强制执行文件名限制，即命名包中的类型应存在于一个文件名由类型名后跟 `.java` 扩展名组成的文件中。你已经见过这类例子。例如，你在 `HelloBye.java`
    文件中包含了公共的 `Hello` 和 `Bye` 类。如果你自己编译 `HelloBye.java` 文件，编译器会拒绝编译。编译器会坚持要求公共类必须声明在两个分别名为
    `Hello.java` 和 `Bye.java` 的单独文件中。但是，当你使用源文件模式运行该文件时，编译器并未强制执行此限制。


    在源文件模式下，源文件作为*未命名*模块的一部分进行编译。你的代码可以访问所有可观察模块。这就像你使用 `--add-modules=ALL-DEFAULT`
    选项编译并运行了代码一样。如果你希望代码能够访问其他模块，可以使用额外的 `--add-modules` 选项来实现。


    在源文件模式下运行 `java` 命令需要 `jdk.compiler` 模块。它用于在内存中编译源文件。

