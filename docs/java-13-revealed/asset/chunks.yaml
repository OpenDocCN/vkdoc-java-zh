  trans: '

    ## 摘要


    在最近几个 JDK 版本中，若干 JDK 工具和 Java API 已被弃用或移除。JDK10 移除了 `javah` 工具。JDK11 弃用了 Nashorn
    JavaScript 引擎和 Pack200 工具。JDK11 移除了 `appletviewer` 工具。JDK13 弃用了 `rmic` 工具，并计划在未来版本中移除。Java
    13 弃用了 Swing Motif 外观，并且在 macOS 上不再支持该外观。


    `java.lang.Runtime` 类中的 `traceInstructions()` 和 `traceMethodCalls()` 方法在 Java
    9 中被弃用，计划在未来版本中移除，并在 Java 13 中已被移除。


    `Thread` 类中的 `destroy()` 和 `stop(Throwable)` 方法已在 Java 11 中被移除。


    JDK12 引入了 JVM 常量 API，这是一个底层 API，用于处理库和工具如何描述类文件常量池中的条目，这些库和工具会操作字节码。作为开发者，你不需要在应用程序中使用此
    API。该 API 位于 `java.base` 模块的 `java.lang.constant` 包中。


    从 Java 11 到 Java 13，`String` 类新增了几个方法。其中许多方法用于处理多行字符串。


    Java 11 为 `String` 类添加了三个用于去除前导/尾随、前导和尾随空白字符的方法：`strip()`、`stripLeading()` 和 `stripTrailing()`。


    Java 11 还为 `String` 类添加了一个 `isBlank()` 方法，如果字符串仅包含空白字符，则返回 `true`，否则返回 `false`。


    你可以使用 `String` 类的 `lines()` 方法来获取字符串中的行流。字符串中的一行定义为零个或多个字符后跟一个行终止符的序列，行终止符可以是
    `"\n"`、`"\r"` 或 `"\r\n"`。


    `String` 类中的 `repeat(int count)` 方法返回一个字符串，其内容是将原字符串重复 `count` 次后拼接而成。


    Java 12 为 `String` 类添加了一个 `transform(Function<? super String, ? extends R> f)`
    方法，该方法通过应用一个 `Function` 将字符串转换为另一个对象。该 `Function` 接受一个 `String` 并返回任意类型的对象。


    无参的 `orElseThrow()` 方法在 Java 10 中被添加到 `Optional<T>` 类中。如果 `Optional` 包含值，则该方法返回该值。否则，它会抛出一个
    `java.util.NoSuchElementException` 运行时异常。Java 11 添加了一个 `isEmpty()` 方法，如果 `Optional`
    为空则返回 `true`，否则返回 `false`。


    Java 11 为 `Predicate<T>` 接口添加了一个新的 `not()` 静态方法，该方法返回指定 `Predicate` 的否定。


    Java 12 在 `java.base` 模块的 `java.text` 包中添加了一个 `CompactNumberFormat` 类。它是 `NumberFormat`
    类的子类。它用于将十进制数字格式化为其紧凑形式。数字的紧凑形式适用于显示空间有限的情况。例如，与其将十亿显示为 1000000000，不如将其显示为紧凑形式，如
    1B 或 1 billion。使用 `NumberFormat` 类中的 `getCompactNumberInstance()` 工厂方法来获取 `CompactNumberFormat`
    类的实例。


    Java 10 支持 Unicode 标准 8.0.0 版本。Java 11 支持 Unicode 标准 10.0.0 版本。Java 12 支持 Unicode
    标准 11.0 版本，以及来自 Unicode 标准 11.0 之后第一个分配该码点的版本的日本年号码点 U+32FF。Java 13 支持 Unicode
    标准 12.1 版本。


    `readString()` 和 `writeString()` 方法在 Java 11 中被添加到 `Files` 类中。`readString()` 方法将文件内容读取为
    `String`。`writeString()` 方法将 `CharSequence`（例如 `String` 和 `StringBuilder`）写入文件。


    `mismatch()` 方法在 Java 12 中被添加到 `Files` 类中。它通过逐字节比较两个指定文件的内容来查找它们之间的不匹配。如果内容完全匹配，则返回
    -1L。否则，返回第一个不匹配字节的位置。


    集合 API 有两项更改。Java 10 为 `List`、`Set` 和 `Map` 接口添加了一个静态的 `copyOf()` 工厂方法，用于从另一个集合创建不可修改的
    `List`、`Set` 和 `Map`。Java 11 为 `Collection` 接口添加了一个新的默认方法 `toArray(IntFunction<T[]>
    generator)`，可用于传入数组构造函数引用，将集合的元素复制到特定类型的数组中。


    Java 10 为 `Collectors` 类添加了三个方法，它们返回一个 `Collector`，用于将元素累积到不可修改的 `List`、`Set`
    和 `Map` 中：`toUnmodifiableList()`、`toUnmodifiableSet()` 和 `toUnmodifiableMap()`。Java
    12 添加了另一种类型的收集器，它使用两个收集器来收集不同类型的结果，最后使用一个 `BiFunction` 合并这两个收集器的结果。合并后的结果就是该收集器的结果。`Collectors`
    类中新增的 `teeing()` 方法返回这样一个收集器。


    Java 13 为 `java.nio.Buffer` 类的子类（如 `ByteBuffer`、`CharBuffer`、`IntBuffer` 等）添加了绝对批量
    get 和 put 方法。这些方法允许在不影响缓冲区当前位置的情况下批量读取和写入缓冲区。Java 13 还在 `Buffer` 类中添加了一个新的 `slice()`
    方法，允许你指定要切片的绝对范围。


    Java 13 在 `FileSystems` 类中添加了三个工厂方法，允许使用 `Path` 通过文件系统提供程序创建 `FileSystem`，该提供程序允许你将文件的内容视为文件系统，例如
    Zip 文件系统。在 Java 13 之前，你必须使用 URI 来引用代表文件系统的文件，并使用 `FileSystems` 类中接受 `URI` 的其他工厂方法。


