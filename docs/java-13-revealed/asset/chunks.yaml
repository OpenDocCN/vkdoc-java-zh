    引言


    ## 第一版引言


    Java 社区对模块系统和 Java Shell 最终在 JDK 9 中添加到 Java 平台感到兴奋，我也一样。毕竟，我们等了超过 10 年才看到这个模块系统付诸实践。之前的几个
    JDK 版本都出现过模块系统的原型，但后来都被放弃了。JDK 9 中模块系统的引入也经历了一段坎坷的历程。它经历了多次提案和原型的迭代。我从 2016 年初开始撰写本书。我必须承认，这是一本很难写的书。我不得不与
    JDK 的发布日期以及 Java 团队对模块系统所做的更改赛跑。我写了一个主题，几个月后发现 JDK 9 的最终发布日期已经改变，而我写的内容也不再有效。今天是
    2016 年 2 月的最后一天，似乎尘埃终于落定——Java 团队和 Java 社区对模块系统感到满意——你将得到这本现在呈现给你的书。JDK 9 计划于
    2017 年 7 月下旬发布。在撰写本文时，JDK 9 的功能已经完备。你不太可能看到本书涵盖的内容有很多无法工作的情况。然而，就软件发布而言，五个月是一段很长的时间，所以当你阅读本书时，如果某段代码无法工作，你需要稍微调整一下才能使其工作，请不要感到惊讶。


    起初，这本书计划是 140 页。随着我的写作进展，我认为写一本如此短的书来涵盖 Java 平台最大的新增功能之一，是对读者的不负责任。我感谢我的出版商，从未抱怨我增加了数百页的篇幅。我用了九章（第
    2 章到第 [10](https://doi.org/10.1007/978-1-4842-5407-3_10) 章）专门描述新的模块系统。第 [11](https://doi.org/10.1007/978-1-4842-5407-3_11)
    章以无与伦比的细节介绍了 Java Shell (JShell)。


    我花了无数时间研究这个主题。我写的是正在开发中的主题。我在互联网或书籍中找不到任何可以学习这些主题的资料。最大的挑战之一是开发阶段快速变化的 JDK 实现。我的主要研究来源是
    Java 源代码、Java 增强提案 (JEP) 和 Java 规范请求 (JSR)。我还花了不少时间阅读 Java 源代码，以了解更多关于 JDK 9 中一些新主题的信息。摆弄
    Java 程序总是很有趣，有时一玩就是几个小时，然后把它们添加到书中。有时，看到代码一周前还能工作，现在却不行了，这很令人沮丧。订阅所有 JDK 9 项目的邮件列表帮助我与
    JDK 开发团队保持同步。有几次，我不得不仔细检查某个 JDK 主题的所有错误，以确认存在一个尚未修复的错误。


    结局好，一切都好。最后，我很高兴我能够包含所有对有兴趣学习 Java SE 9 的读者来说重要的内容。我希望你喜欢阅读这本书并从中受益。


    ## 第二版引言


    我很高兴地呈现这本名为 *Java 13 揭秘* 的第二版。距离本书第一版 *Java 9 揭秘* 出版已经大约两年半了。Java 10、11 和 12 三个版本已经发布；Java
    13 计划在大约两周后，即 2019 年 9 月 17 日发布。本书的这一版涵盖了从 Java 10 到 13 中与 Java 开发者相关的所有新主题。如果你只对学习
    JDK 9 特定的主题感兴趣，我建议你阅读我的 *Java 9 揭秘* 一书（ISBN: 978-1484225912），该书仅包含 JDK 9 特定的主题。


    我真诚地希望本书的这一版能帮助你学习 Java 10 到 13 版本中新增的功能。


