    #### Downloading a Response Body As an Attachment


    In this section, I will show you how to download a response body as an attachment
    and save it in a file. To download a file as an attachment, the response needs
    to contain a header named `Content-Disposition` with two values – the first being
    `attachment` and the second `filename` with the name of a file. The header looks
    like:


    ```

    Content-Disposition: attachment; filename="myimage.jpeg"

    ```


    The `HttpResponse.BodyHandlers.ofFileDownload()` method returns a body handler
    that reads the `Content-Disposition` response header. If `attachment` and `filename`
    are present in the header’s value, the body handler downloads the response body
    and saves the contents in a file specified in the `filename` parameter. You specify
    the directory where the downloaded file is saved. If the response does not contain
    a `Content-Disposition` header with the values as mentioned, the body handler
    returned from `ofFileDownload()` method will not work.


    I did not find a URL on Internet for this example that will return `Content-Disposition`
    as a response header with a file to download. You will use the [`http://httpbin.org/response-headers`](http://httpbin.org/response-headers)
    URL, which returns response headers specified in this URL as a query string. For
    this example, you will need to specify `Content-Disposition` with the expected
    values in a query string with this URL. The server will return a response with
    a JSON document and a `Content-Disposition` response header as you specify in
    the query string of the request URL. The query string needs to be URL encoded.
    Without URL encoding, the URL looks like:


    ```

    http://httpbin.org/response-headers?Content-Disposition=attachment; filename=test.json

    ```


    After encoding the value for the `Content-Disposition` query string parameter,
    the URL looks like:


    ```

    http://httpbin.org/response-headers?Content-Disposition=attachment%3B+filename%3Dtest.json

    ```


