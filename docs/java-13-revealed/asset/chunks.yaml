    # Rules of Using var


    The previous sections covered the basic rules of using `var`. In this section,
    I cover more detailed rules with examples. While reading these rules, keep in
    mind that there was only one objective in introducing `var` in Java 10 – making
    developers'' life easier by keeping the rules of using `var` simple. I use JShell
    sessions in examples. I explain the following rules of using `var` to declare
    local variables:


    * Variable declarations without initializers are not supported.

    * The initializer cannot be of the `null` type.

    * Multiple variables in a single declaration are not supported.

    * The initializer cannot reference the variable being declared.

    * Array initializers by themselves are not supported.

    * No array dimensions can be specified while declaring arrays.

    * No poly expressions such as lambda expressions and method references are allowed
    as initializers.

    * Instance and static fields are not supported.

    * `var` is not supported as the return type of a method. You cannot use it to
    declare method''s arguments either.


    If you need to declare a variable that needs to use features not allowed according
    to these rules, use an explicit type instead of `var`.


    ## No Uninitialized Variables


    You cannot use `var` to declare uninitialized variables. In such cases, the compiler
    has no expression to use to infer the type of the variable.


    ```

    jshell> var personId;

    |  Error:

    |  cannot infer type for local variable personId

    |    (cannot use ''var'' on variable without initializer)

    |  var personId;

    |  ^-----------^

    ```


    This rule makes using `var` simple in your code and easy to diagnose errors. Assume
    that declaring uninitialized variables using `var` is allowed. You can declare
    a variable and assign it a value for the first time several lines later in your
    program, which would make the compiler infer the variable''s type. If you get
    a compile-time error in another part, which tells you that you have assigned a
    value to your variable wrong type, you will need to look at the first assignment
    to the variable that decided the variable''s type. This is called "action at a
    distance" inference error in which an action at one point may cause an error in
    another part later – making the developer''s job harder to locate the error.


    ## No null Type Initializers


    You can assign `null` to any reference type variable. The compiler cannot infer
    the type of the variable if `null` is used as the initializer with `var`.


    ```

    jshell> var personId = null;

    |  Error:

    |  cannot infer type for local variable personId

    |    (variable initializer is ''null'')

    |  var personId = null;

    |  ^------------------^

    ```


    ## No Multiple Variable Declarations


    You cannot declare multiple variables in a single declaration using `var`.


    ```

    jshell> var personId = 1001, days = 9;

    |  Error:

    |  ''var'' is not allowed in a compound declaration

    |  var personId = 1001, days = 9;

    |      ^

    ```


    ## Cannot Reference the Variable in the Initializer


    When you use `var`, you cannot reference the variable being declared in the initializer.
    For example, the following declaration is invalid:


    ```

    jshell> var x = (x = 1001);

    |  Error:

    |  cannot infer type for local variable x

    |    (cannot use ''var'' on self-referencing variable)

    |  var x = (x = 1001);

    |      ^

    ```


    However, the following declaration is valid when you use an explicit type:


    ```

    // Declares x as an int and initializes it with 1001

    int x = (x = 1001);

    ```'
