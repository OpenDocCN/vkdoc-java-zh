  trans: '

    ## 分支标签的穷尽性


    switch 表达式（而非 switch 语句）的 switch 标签必须穷尽。也就是说，你必须在 switch 表达式中为 `selector-expression`
    的每个可能值提供一个 `switch` 标签。请看以下代码片段：


    ```

    int count = 2;

    String desc = switch(count) {

    case 1-> "One";

    case 2-> "Two";

    case 3-> "Three";

    };

    ```


    这段代码会产生以下编译时错误：


    ```

    error: the switch expression does not cover all possible input values

    String desc = switch(count) {

    1 error

    ```


    出现此错误的原因是，三个 `case` 标签只覆盖了 `count` 的三个可能值。而这里的 `count` 是 `int` 类型，其可能值有数百万个。通常，你会使用一个
    `default` 标签来覆盖 `count` 的其他值——仅仅是为了让编译器满意：


    ```

    int count = 2;

    String desc = switch(count) {

    case 1-> "One";

    case 2-> "Two";

    case 3-> "Three";

    default-> "Out-of-range";

    };

    ```


    假设你的 switch 表达式基于一个枚举，并且 `case` 标签覆盖了所有枚举常量。之后，你向枚举中添加了一个新的枚举常量，并且只编译了枚举定义，而没有编译在
    switch 表达式中使用该枚举的代码。如果 switch 表达式使用新添加的枚举常量值执行，会发生什么？请记住，这里的讨论针对的是 switch 表达式，而非
    switch 语句。如果你在 switch 语句中使用了这个枚举，那么使用新的枚举常量时，switch 语句会静默地不做任何操作，因为新的枚举常量没有被任何
    switch 标签覆盖。然而，使用 switch 表达式则不同。通常，你希望在 switch 表达式中为每个枚举常量计算一个值。由于你不知道未来可能添加哪些枚举常量，你可以在
    switch 表达式中添加一个 `default` 标签，该标签通常会抛出一个异常或返回一个默认值。


    当你将 `switch` 用作表达式时（无论是新的 `switch` 还是旧的 `switch`），编译器会为你提供帮助。当一个 switch 表达式基于枚举，并且所有枚举常量都被
    case 标签覆盖时，编译器会添加一个包含以下代码的 `default` 标签：


    ```

    default-> throw new IncompatibleClassChangeError();

    ```


    让我们通过一个示例来理解。清单 5-4 包含一个名为 `TrafficLight` 的枚举声明。它包含两个常量 `GREEN` 和 `RED`。


    ```

    // TrafficLight.java

    package com.jdojo.enhancedswitch;

