    ### Tip


    The push promise handler is called to accept or reject a push promise until the
    response body of the request, which initiated the server push, has been fully
    received. Any push promise received from the server after the response body is
    fully received is rejected.


    Let us improve the previous server push example. I do not like using `Thread.sleep()`
    method to allow push promises to complete. We had to resort to this because we
    did not save the `CompletableFuture` returned from the `apply()` method inside
    the `applyPushPromise()` method of our push promise handler in Listing 3-9. The
    flaw was in the way we implemented our push promise handler. There is a good news!
    The `HttpResponse.PushPromiseHandler<T>` interface contains a `static of()` method
    that lets you create a push promise handler, which will store all push promise
    requests and `CompletableFuture` for the push promise responses in a concurrent
    map. It is declared as follows:


    ```java

    HttpResponse.PushPromiseHandler of (Function> pushPromiseHandler,

    ConcurrentMap>> pushPromisesMap)

    ```


    Do not be intimidated by the big declaration of this method. It is very simple
    to use. The first argument is a function, which accepts the push promise request
    and returns a response body handler. This function will be called once for each
    push promise received.


    The second argument is a concurrent map, which is used to accumulate all push
    promises. Its keys are the push promise requests and values the `CompletableFuture`
    representing the push promise responses. Once you receive the response body of
    the initiating request, you can wait for all values in this concurrent map to
    complete and, after that, you can be assured that you have fully received the
    response body of all push promises. The following snippet of code creates a concurrent
    map:


    ```java

    // Create a concurrent map to accumulate all push promises

    ConcurrentMap>>

    pushPromisesMap = new ConcurrentHashMap();

    ```


    The following snippet of code creates a push promise handler:


    ```java

    // Create a push promise handler

    PushPromiseHandler pushPromiseHandler

    = PushPromiseHandler.of(pushPromiseRequest -> {

    out.printf("Received push promise request URI: %s%n"

    + "Push promise initiating request URI: %s%n%n",

    pushPromiseRequest.uri(),

    request.uri());

    return BodyHandlers.ofString();

    }, pushPromisesMap);

    ```


    The first argument to the `of()` method is a function that prints the push promise
    details and returns a response body handler of `String` type. The second argument
    is the concurrent map in which you want to accumulate all push promises.


    You do not have control over accepting and rejecting push promises when you create
    a push promise handler this way. The push promise handler will use the following
    rules to accept and reject push promises:


    -  A push request is rejected/cancelled if there is already an entry in the concurrent
    map whose key is equal to the received push promise request.

    -  A push request is rejected/cancelled if it does not have the same origin as
    its initiating request.

    -  Otherwise, a push request is accepted.


    The second rule needs little explanation. If your initiating request URI is `http://host/path`,
    the push request must be from `http://host`. The push promise handler compares
    the host and port of the initiating request and the push request. If both do not
    match, the push promise is rejected.'
