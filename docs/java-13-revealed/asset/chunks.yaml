- fmt: '#### Example 5


    Consider the following text block:


    ```

    String html = """

    ..............

    ......................

    ......................Hello, HTML.

    .....................

    ................""";

    ```


    In this case, the placement of the closing delimiter is not playing a role in
    determining how many leading whitespaces will be removed from all lines. The leading
    whitespace counts for all non-blank lines are 14, 18, 22, 18, and 14. The minimum
    of these counts is 14, so 14 leading whitespaces will be removed from all non-blank
    lines. Trailing whitespaces are removed as usual. The resulting string is as follows:


    ```

    ....

    ........Hello, HTML

    ....


    ```


    Compare the last example with other examples in this section. When you place the
    closing delimiter on a separate line, the last non-blank line contains an LF as
    the last character. When you place the closing delimiter on the same line as the
    non-blank content, the last line does not contain an LF as a character. In this
    example, the last line in the content ends as `"</html>.."`, whereas in other
    examples the last line in the content ends as `"</html>LF"`.


    #### Example 6


    How do you represent an empty string in a text block? The following text blocks
    represent an empty string:


    ```

    String empty1 = """

    """;

    String empty2 = """

    ............... """;

    String empty3 = """

    ......................""";

    ```


    These text blocks contain no non-blank lines. Remember that the line with the
    closing delimiter is always significant. The number of whitespaces to be removed
    from non-blank lines is computed, but it is not used because there are no non-blank
    lines. In the second and third text blocks, the trailing spaces on the lone line
    are collapsed, resulting in an empty string.


    #### Example 7


    How will you use a text block to represent a string `"Hello"`? All of the following
    text blocks represent the string `"Hello"`. The indentation of the content line
    does not affect the final string.


    ```

    String str1 = """

    Hello""";

    String str2 = """

    Hello""";

    String str2 =

    """

    Hello""";

    ```


    The following text block does not represent `"Hello"`. Rather, it represents `"Hello\n"`
    because the first line of the content is not just `Hello`. It has a line terminator
    that is normalized to an LF (`\n`).


    ```

    String str = """

    Hello

    """;

    ```


    ### Tip


    A text block can represent any string that can be represented using a `String`
    literal. Use `String` literals to represent simple strings such as empty string,
    a newline as a string, or a one-line string such as `"Hello, world"`. Using a
    text block for these strings takes at least two lines and is also not as readable
    as `String` literals.


    #### Example 8


    Consider the following text block, which contains no visible content, but has
    a blank line:


    ```

    String fakeEmpty = """

    ......................

    ....""";

    ```


    This text block contains two lines in its content. The first line contains 22
    spaces and an LF. The second line contains four spaces. Both lines are considered
    blank lines and will not be used to remove the leading whitespaces. The second
    line contains the closing delimiter with whitespace count as 4, which is also
    the minimum whitespace count because you have only one line to consider. The text
    block does not contain any non-blank line, so the minimum leading whitespace count
    of 4 is not applied to any lines. As part of removing the trailing whitespaces,
    all 22 spaces are removed from the first line reducing it to an empty line with
    only one character – the normalized line terminator (LF). The resulting string
    will be `"\n"`. If you count the number of characters in the `fakeEmpty` variable,
    it will be 1. Seeing is believing. The following snippet of code shows that the
    resulting string from the text block is `"\n"`:


    ```

    // Define a text block with one empty line with whitespaces

    String fakeEmpty = """

    """;

    String LF = "\n";

    System.out.println("fakeEmpty.length(): " + fakeEmpty.length());

    System.out.println("LF.length(): " + LF.length());

    System.out.println("fakeEmpty.equals(LF): " + fakeEmpty.equals(LF));

    System.out.println("fakeEmpty == LF: " + (fakeEmpty == LF));

    fakeEmpty.length(): 1

    LF.length(): 1

    fakeEmpty.equals(LF): true

    fakeEmpty == newline: true

    ```


    The output indicates that the two strings are not only equal using the `equals()`
    method, they are also equal using the `==` operator. The final string from a text
    block, after all compiler transformations have been applied, is interned as all
    `String` literals are. This is the reason why the text block and the `String`
    literal `"\n"` are also equals using the `==` operator.'
