- fmt: '### Tip


    You can set the redirection policy of an `HttpClient` using the `followRedirects()`
    method of the `HttpClient.Builder` interface.


    Listing [3-6](#419466_2_En_3_Chapter.xhtml#PC32) contains a complete program to
    demonstrate the use of the redirection policy. A discussion follows the program’s
    output. You may get a different output.


    ```

    // FollowRedirection.java

    package com.jdojo.http.client;

    import java.io.IOException;

    import java.net.URI;

    import java.net.URLEncoder;

    import java.net.http.HttpClient;

    import static java.net.http.HttpClient.Redirect.NORMAL;

    import java.net.http.HttpRequest;

    import java.net.http.HttpResponse;

    import java.net.http.HttpResponse.BodyHandlers;

    import static java.nio.charset.StandardCharsets.UTF_8;

    public class FollowRedirection {

    public static void main(String[] args) {

    // Create an HttpClient with default configurations

    HttpClient client = HttpClient.newHttpClient();

    // Location of the new URL

    String location = "http://httpbin.org/ip";

    // Prepare the URL that will redirect the request to a new location

    String uriStr = "http://httpbin.org/redirect-to?"

    + "url=" + URLEncoder.encode(location, UTF_8)

    + "&status_code=301";

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create(uriStr))

    .build();

    // Send the request with the default redirection policy of NEVER.

    // Expecting a response with a status code 301.

    printResponse(client, request);

    System.out.println("-----------------------------------");

    // Create an HTTPClient with a redirection policy of NORMAL

    client = HttpClient.newBuilder()

    .followRedirects(NORMAL)

    .build();

    // Send the request with the redirection policy of NORMAL

    // Expecting a response with a status code 200

    printResponse(client, request);

    }

    public static void printResponse(HttpClient client,

    HttpRequest request) {

    try {

    HttpResponse response

    = client.send(request, BodyHandlers.ofString());

    // Get the response status and body

    int statusCode = response.statusCode();

    String body = response.body();

    String locationHeader = response.headers()

    .firstValue("Location")

    .orElse("");

    System.out.println("Statuc code: " + statusCode);

    System.out.println("Location Header: " + locationHeader);

    System.out.println("Response body:\n" + body);

    } catch (IOException | InterruptedException e) {

    e.printStackTrace();

    }

    }

    }

    Status code: 301

    Location Header: http://httpbin.org/ip

    Response body:


    Status code: 200

    Location Header:

    Response body:

    {

    "origin": "23.131.128.26, 23.131.128.26"

    }

    Listing 3-6

    Following Server Redirects by Setting Redirection Policy in HttpClient

    ```


    The program uses the `http://httpbin.org/redirect-to` URL. The URL redirects to
    a new URL as specified in the `uri` query string parameter. It returns a response
    status code as specified in the `status_code` query string parameter. You used
    `http://httpbin.org/ip` as the redirect URL and 301 as the status code. The same
    request is sent twice. First time, you send the request with `NEVER` as the redirect
    policy, which is the default for an `HttpClient`. You receive an expected response
    with status code of 301 and with a `Location` header set to the redirect URL we
    set in the request. Second time, you set the redirect policy for the `HttpClient`
    to `NORMAL`, which allows the `HttpClient` to follow the redirects. After the
    redirect, you receive a response from the `http://httpbin.org/ip` URL, which sends
    back the IP address of the client making the request.


    ### Making Asynchronous Requests


    When you use the `send()` method of the `HttpClient`, the call is blocked until
    a response is received. There could be several reasons you do not want to do this.
    Asynchronous process of HTTP requests gives you a lot of benefits such as improved
    performance and responsiveness. Your program can do something else while it is
    waiting for a response. You might send the same request to many servers and want
    to resume processing when you get a response from all or some servers. This is
    possible very easily using asynchronous processing of HTTP requests.


    Use the `sendAsync()` method of the `HttpClient` class to send a request to a
    server asynchronously. The method returns a `CompletableFuture<HttpResponse<T>>`
    where `T` is the response body type. For example, if you use a body handler to
    process the response body as a `String`, the method returns a `CompletableFuture<HttpResponse<String>>`.
    The following snippet of code prints the response body to the standard output
    asynchronously:


    ```

    // Create an HttpClient with default configurations

    HttpClient client = HttpClient.newHttpClient();

    // Use the HTTP GET method

    HttpRequest request = HttpRequest.newBuilder()

    .uri(URI.create("http://httpbin.org/ip"))

    .build();

    // Print the response body

    client.sendAsync(request, BodyHandlers.ofString())

    .thenApply(HttpResponse::body)

    .thenAccept(System.out::println);

    ```


    There is nothing extraordinary in this snippet of code, except calls to `thenApply()`
    and `thenAccept()` methods. Refer to the documentation of `java.util.concurrent.CompletableFuture<T>`
    class for more details on these methods. The `thenApply()` method takes a `Function<T,R>`
    as a parameter, which accepts the response object of type `HttpResponse<String>`
    as a parameter and returns the response body as a `String`. The `thenAccept()`
    method prints the response body, which was passed to this from the previous completion
    stage. The `sendAsync()` method uses separate threads provided by an `Executor`
    to process the request. You can also use your own `Executor` by configuring the
    `HttpClient` using the `executor()` method of the `HttpClient.Builder` interface.


    The `sendAsync()` method returns immediately, and the request and response are
    processed later in separate threads. If you have the previous statement as the
    last statement in your `main()` method, your program may not see any output. By
    the time your request is sent and a response processed in other daemon threads,
    the `"main"` non-daemon thread terminates, which in turn terminates your program.
    You can fix it by calling the `get()` or `join()` method, which returns the result
    of the last completion stage. The difference between the two is that the `get()`
    method throws checked exceptions, whereas the `join()` method throws unchecked
    exception. The following snippet of code fixes the issue of the program printing
    no outputs:


    ```

    // Print the response body

    client.sendAsync(request, BodyHandlers.ofString())

    .thenApply(HttpResponse::body)

    .thenAccept(System.out::println)

    .join();

    ```


    Listing [3-7](#419466_2_En_3_Chapter.xhtml#PC35) contains a complete program to
    process a request and its response asynchronously. You may get a different output.'
