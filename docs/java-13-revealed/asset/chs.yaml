  #### 发起异步请求


  当你使用 `HttpClient` 的 `send()` 方法时，调用会被阻塞，直到收到响应。你可能出于多种原因不希望这样做。HTTP 请求的异步处理能带来很多好处，例如提高性能和响应能力。你的程序可以在等待响应时执行其他操作。你可能需要向多个服务器发送相同的请求，并希望在收到所有或部分服务器的响应后恢复处理。通过
  HTTP 请求的异步处理，可以非常容易地实现这一点。


  使用 `HttpClient` 类的 `sendAsync()` 方法可以向服务器异步发送请求。该方法返回一个 `CompletableFuture<HttpResponse<T>>`，其中
  `T` 是响应体类型。例如，如果你使用一个将响应体处理为 `String` 的 body handler，该方法将返回一个 `CompletableFuture<HttpResponse<String>>`。以下代码片段异步地将响应体打印到标准输出：


  ```

  // 使用默认配置创建一个 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  // 使用 HTTP GET 方法

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/ip"))

  .build();

  // 打印响应体

  client.sendAsync(request, BodyHandlers.ofString())

  .thenApply(HttpResponse::body)

  .thenAccept(System.out::println);

  ```


  这段代码片段中，除了对 `thenApply()` 和 `thenAccept()` 方法的调用之外，并无特别之处。有关这些方法的更多详细信息，请参考 `java.util.concurrent.CompletableFuture<T>`
  类的文档。`thenApply()` 方法接受一个 `Function<T,R>` 作为参数，该函数接受类型为 `HttpResponse<String>` 的响应对象作为参数，并返回一个
  `String` 类型的响应体。`thenAccept()` 方法打印响应体，该响应体是从上一个完成阶段传递过来的。`sendAsync()` 方法使用由 `Executor`
  提供的独立线程来处理请求。你也可以通过 `HttpClient.Builder` 接口的 `executor()` 方法配置 `HttpClient`，从而使用你自己的
  `Executor`。


  `sendAsync()` 方法会立即返回，请求和响应稍后在独立的线程中处理。如果你将前面的语句作为 `main()` 方法中的最后一条语句，你的程序可能看不到任何输出。当你的请求被发送、响应在其他守护线程中被处理时，`"main"`
  这个非守护线程已经终止，这反过来会导致你的程序终止。你可以通过调用 `get()` 或 `join()` 方法来解决这个问题，这两个方法会返回最后一个完成阶段的结果。两者的区别在于，`get()`
  方法会抛出受检异常，而 `join()` 方法会抛出非受检异常。以下代码片段解决了程序不输出任何内容的问题：


  ```

  // 打印响应体

  client.sendAsync(request, BodyHandlers.ofString())

  .thenApply(HttpResponse::body)

  .thenAccept(System.out::println)

  .join();

  ```


