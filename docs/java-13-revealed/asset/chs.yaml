  清单 5-3\n演示新 Switch 语法的程序\n```\n\n## 新 Switch 会取代旧 Switch 吗\n\n一旦新`switch`成为 Java\
  \ SE 的标准特性（可能在 Java SE 14 中），当它满足你的需求时，建议你使用它来替代传统`switch`。然而，它并不能完全取代传统的`switch`语句。请记住，传统的`switch`默认提供穿透（fall-through）行为，并且你有办法（使用`break`语句）覆盖默认行为。请考虑以下利用传统`switch`语句穿透特性的简单示例：\n\
  \n```\nint count = 2;\n// 此处省略更多代码...\nswitch (count) {\ncase 1:\nSystem.out.print(\"\
  One \");\ncase 2:\nSystem.out.print(\"Two \");\ncase 3:\nSystem.out.println(\"Three.\"\
  );\nbreak;\ndefault: System.out.println(\"Over-My-Head\");\n}\n```\n\n如果`count`的值为\
  \ 1，它会打印`\"One Two Three\"`；为 2 时，打印`\"Two Three\"`；为 3 时，打印`\"Three\"`；对于其他任何值，打印`\"\
  Over-My-Head\"`。由于传统`switch`语句的穿透特性，实现此逻辑非常简单。使用新`switch`语法没有直接的方法来实现此逻辑，因为新`switch`不提供穿透特性。你明白了——尽可能使用新语法，在需要穿透时使用传统`switch`。\n\
  \n我很好奇，想更深入地了解新`switch`特性以及编译器如何处理它们。因此，我尝试反编译本章中所有使用新`switch`语法编写的示例。你可以使用[`www.javadecompilers.com`](http://www.javadecompilers.com)反编译你的\
  \ Java 代码。当我反编译我的代码时，我没有看到任何新`switch`语法。我发现，在所有情况下，使用新`switch`语法的代码都被转换成了传统`switch`。尽管新`switch`在幕后使用了旧`switch`，但作为开发者，使用新语法能获得很多好处。你可以得到更简洁、更不易出错的代码，以及一个重要的新特性——将`switch`用作表达式！\n\
  \n\n\n## 分支标签的穷尽性\n\nswitch 表达式（而非 switch 语句）的 switch 标签必须穷尽。也就是说，你必须在 switch 表达式中为\
  \ `selector-expression` 的每个可能值提供一个 `switch` 标签。请看以下代码片段：\n\n```\nint count = 2;\n\
  String desc = switch(count) {\ncase 1-> \"One\";\ncase 2-> \"Two\";\ncase 3-> \"\
  Three\";\n};\n```\n\n这段代码会产生以下编译时错误：\n\n```\nerror: the switch expression does not\
  \ cover all possible input values\nString desc = switch(count) {\n1 error\n```\n\
  \n出现此错误的原因是，三个 `case` 标签只覆盖了 `count` 的三个可能值。而这里的 `count` 是 `int` 类型，其可能值有数百万个。通常，你会使用一个\
  \ `default` 标签来覆盖 `count` 的其他值——仅仅是为了让编译器满意：\n\n```\nint count = 2;\nString desc\
  \ = switch(count) {\ncase 1-> \"One\";\ncase 2-> \"Two\";\ncase 3-> \"Three\";\n\
  default-> \"Out-of-range\";\n};\n```\n\n假设你的 switch 表达式基于一个枚举，并且 `case` 标签覆盖了所有枚举常量。之后，你向枚举中添加了一个新的枚举常量，并且只编译了枚举定义，而没有编译在\
  \ switch 表达式中使用该枚举的代码。如果 switch 表达式使用新添加的枚举常量值执行，会发生什么？请记住，这里的讨论针对的是 switch 表达式，而非\
  \ switch 语句。如果你在 switch 语句中使用了这个枚举，那么使用新的枚举常量时，switch 语句会静默地不做任何操作，因为新的枚举常量没有被任何\
  \ switch 标签覆盖。然而，使用 switch 表达式则不同。通常，你希望在 switch 表达式中为每个枚举常量计算一个值。由于你不知道未来可能添加哪些枚举常量，你可以在\
  \ switch 表达式中添加一个 `default` 标签，该标签通常会抛出一个异常或返回一个默认值。\n\n当你将 `switch` 用作表达式时（无论是新的\
  \ `switch` 还是旧的 `switch`），编译器会为你提供帮助。当一个 switch 表达式基于枚举，并且所有枚举常量都被 case 标签覆盖时，编译器会添加一个包含以下代码的\
  \ `default` 标签：\n\n```\ndefault-> throw new IncompatibleClassChangeError();\n```\n\
  \n让我们通过一个示例来理解。清单 5-4 包含一个名为 `TrafficLight` 的枚举声明。它包含两个常量 `GREEN` 和 `RED`。\n\n```\n\
  // TrafficLight.java\npackage com.jdojo.enhancedswitch;\npublic enum TrafficLight\
  \ {GREEN, RED}\n清单 5-4\n一个包含两个常量 GREEN 和 RED 的 TrafficLight 枚举\n```\n\n清单 5-5 包含\
  \ `Drive` 类的代码。其 `changeLight()` 方法使用了一个 switch 表达式，覆盖了 `TrafficLight` 枚举的两个常量。`main()`\
  \ 方法调用了 `changeLight()` 方法——对 `TrafficLight` 枚举中的每个枚举常量各调用一次。输出显示了预期的结果。\n\n```\n\
  // Drive.java\npackage com.jdojo.enhancedswitch;\npublic class Drive {\npublic static\
  \ void main(String[] args) {\nfor (TrafficLight light : TrafficLight.values()) {\n\
  changeLight(light);\n}\n}\npublic static void changeLight(TrafficLight light) {\n\
  String decision = switch (light) {\ncase GREEN-> \"GO\";\ncase RED-> \"STOP\";\n\
  };\nSystem.out.println(light + \": \" + decision);\n}\n}\nGREEN: GO\nRED: STOP\n\
  清单 5-5\n一个在 switch 表达式中使用 TrafficLight 枚举常量的 Drive 类\n```\n\n编译器静默地为你的 switch 表达式添加了一个安全防护。它将你的\
  \ switch 表达式修改为以下形式：\n\n```\nString decision = switch (light) {\ncase GREEN-> \"\
  GO\";\ncase RED-> \"STOP\";\ndefault-> throw new IncompatibleClassChangeError();\n\
