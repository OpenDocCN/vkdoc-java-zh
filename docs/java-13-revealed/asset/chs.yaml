  \ shared objects file\n...\nHello, CDS and AppCDS\n...\n```\n\n注意，在输出中，`com.jdojo.cds.HelloCDS`\
  \ 类的来源是“shared objects file”，这表明 `HelloCDS` 类是从共享归档中加载的。\n\n\n\n### 类路径与模块路径规则\n\
  \n让我们在启用 AppCDS 并使用 JDK10 的两个不同类路径下，重新运行 `HelloCDS` 类：\n\n```\nC:\\Java13Revealed>java\
  \ -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa --class-path build\\\
  modules;dist\\jdojo.cds.jar com.jdojo.cds.HelloCDS\n处理共享归档文件时发生错误。\n共享类路径不匹配（提示：启用\
  \ -Xlog:class+path=info 诊断失败原因）\n初始化虚拟机时发生错误\n无法使用共享归档。\nC:\\Java13Revealed>java\
  \ -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa --class-path dist\\\
  jdojo.cds.jar;build\\modules com.jdojo.cds.HelloCDS\nHello, CDS and AppCDS\n```\n\
  \n回想一下，您之前通过指定类路径为 `dist\\jdojo.cds.jar` 创建了 `jdojo.jsa` 共享归档。当您将类路径指定为 `build\\\
  modules;dist\\jdojo.cds.jar` 时，收到了一个错误，提示共享类路径不匹配。\n\n共享归档会记录其创建时使用的类路径。当您启用共享归档来运行应用程序时，必须满足以下条件之一，否则会报错：\n\
  \n*   启动 JVM 时使用的类路径与创建共享归档时使用的类路径相同。\n\n*   启动 JVM 时使用的类路径包含创建共享归档时使用的类路径，并且后者作为前缀。\n\
  \n在此示例中，共享归档是使用类路径 `dist\\jdojo.cds.jar` 创建的。当您将 `dist\\jdojo.cds.jar` 作为类路径的唯一部分或第一部分使用时，应用程序可以正常运行。在前面的示例中，当您遇到错误时，您将\
  \ `dist\\jdojo.cds.jar` 指定为了类路径的最后一部分。要查看出错时 JVM 正在查找的详细信息，请使用 `-Xlog:class+path=info`\
  \ 选项运行命令，如下所示：\n\n```\nC:\\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa\
  \ -Xlog:class+path=info --class-path build\\modules;dist\\jdojo.cds.jar com.jdojo.cds.HelloCDS\n\
  [0.010s][info][class,path] 引导加载器类路径=D:\\jdk-10\\lib\\modules\n[0.012s][info][class,path]\
  \ 已打开: C:\\java10\\lib\\modules\n[0.022s][info][class,path] 类型=BOOT\n[0.023s][info][class,path]\
  \ 期望的 BOOT 路径=C:\\java10\\lib\\modules\n[0.024s][info][class,path] 正常\n[0.025s][info][class,path]\
  \ 类型=APP\n[0.026s][info][class,path] 期望的 -Djava.class.path=dist\\jdojo.cds.jar\n\
  [0.027s][info][class,path]\n[0.027s][info][class,path] [APP 类路径不匹配，实际: -Djava.class.path=build\\\
  modules;dist\\jdojo.cds.jar\n处理共享归档文件时发生错误。\n共享类路径不匹配（提示：启用 -Xlog:class+path=info\
  \ 诊断失败原因）\n初始化虚拟机时发生错误\n无法使用共享归档。\n```\n\nJDK11 为 AppCDS 共享归档增加了以下支持：\n\n*   支持类路径和模块路径的任何有效组合。\n\
  \n*   模块路径中的非空目录会导致致命错误。换句话说，您只能在模块路径中包含模块化 JAR。\n\n*   与类路径不同，没有要求转储时的模块路径必须等于或作为运行时模块路径的前缀。\n\
  \n*   如果在归档生成后更新了模块路径中的现有 JAR，则归档将失效。\n\n*   从模块路径中移除 JAR 不会使共享归档失效。已移除 JAR 中的归档类在运行时不会被使用。\n\
  \n## 默认 CDS 归档\n\nJDK12 为 64 位平台上的原生构建增加了对默认 CDS 归档的支持。JDK 映像包含一个默认的 CDS 归档。它被命名为\
  \ `classes.jsa`。在类 Unix 操作系统上，它保存在 `JAVA_HOME/lib/server` 目录中；在 Windows 上，保存在 `JAVA_HOME/bin/server`\
  \ 目录中。`JAVA_HOME/lib/classlist` 文件包含了默认 CDS 归档中的系统类列表。您可以在文本编辑器中打开 `classlist` 文件，查看默认共享归档中包含哪些类。\n\
  \n要在 JDK12 及更高版本中利用默认 CDS，您无需执行任何额外操作。也就是说，您无需运行 `-Xshare:dump`，也无需使用 `-Xshare:auto`\
  \ 或 `-Xshare:on` 来运行您的应用程序。`-Xshare:dump` 的工作在构建 JDK 映像时就已经完成了。当您运行应用程序时，CDS 归档会被自动使用，因为在\
  \ JDK 11 及更高版本中，`-Xshare:auto` 是服务器 VM 的默认设置。\n\n让我们使用 `-Xlog:class+load=info` 选项在\
  \ JDK12 下运行 `HelloCDS` 类，这样输出可以显示每个类是从哪里加载的：\n\n```\nC:\\Java13Revealed>java --module-path\
  \ dist\\jdojo.cds.jar -Xlog:class+load=info --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  [0.012s][info][class,load] 已打开: C:\\java12\\lib\\modules\n[0.023s][info][class,load]\
  \ java.lang.Object 来源: 共享对象文件\n[0.023s][info][class,load] java.io.Serializable 来源:\
  \ 共享对象文件\n[0.023s][info][class,load] java.lang.String 来源: 共享对象文件\n...\n[0.131s][info][class,load]\
  \ com.jdojo.cds.HelloCDS 来源: file:/C:/Java13Revealed/dist/jdojo.cds.jar\n...\nHello,\
  \ CDS and AppCDS\n...\n```\n\n输出显示，在您未指定任何额外选项的情况下，默认的 CDS 归档已被使用。系统类是从“共享对象文件”加载的，即默认的\
  \ CDS 归档。请注意 `HelloCDS` 类的位置，它是从 `jdojo.cds.jar` 文件加载的，而不是从共享归档加载的。这是因为默认 CDS 仅适用于系统类，不适用于应用程序类。如果您想从共享归档加载应用程序类，则需要使用上一节中描述的\
  \ AppCDS。JDK13 引入了一种使用动态 CDS 归档来使用 AppCDS 的新方法，我将在下一节中进行解释。\n\n\n\n## 动态 CDS 归档\n\
  \n使用 CDS 和 AppCDS 可以显著缩短应用程序的启动时间，同时还能大幅减少运行时内存占用。JDK12 中引入的默认 CDS 归档使得 CDS 归档的使用变得透明。然而，在\
  \ JDK12 中使用 AppCDS 仍需执行三步流程：\n\n*   创建类列表。\n*   转储共享归档。\n*   使用共享归档运行应用程序。\n\n最终目标是让\
  \ AppCDS 的使用变得完全透明，用户无需任何操作即可利用共享归档。不过，截至 JDK13，我们尚未实现这一目标。JDK13 极大地简化了生成共享归档以使用\
  \ AppCDS 的方式，使其成为一个简单的两步流程：\n\n*   使用 `-XX:ArchiveClassesAtExit=<文件名>` 参数运行应用程序，其中\
  \ `<文件名>` 是共享归档文件的名称。应用程序退出时会生成一个共享归档。如果应用程序异常退出，则不会生成共享归档。\n*   使用 `-XX:SharedArchiveFile=<文件名>`\
  \ 选项运行应用程序，以使用该共享归档进行 AppCDS。\n\n让我们使用 JDK13 的以下命令为我们的 `HelloCDS` 应用程序创建一个共享归档。如果运行此命令时遇到错误，请参考以下文本进行故障排除：\n\
  \n```\nC:\\Java13Revealed>java -XX:ArchiveClassesAtExit=jdojo.jsa --module-path\
  \ dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\nHello, CDS and\
  \ AppCDS\n[0.137s][warning][cds] Skipping java/util/stream/FindOps$FindSink$OfRef$$Lambda$6:\
  \ Unsafe anonymous class\n...\n```\n\n在源代码中，我使用 `--enable-preview` 选项编译了所有类。如果你没有通过重新编译源代码（不使用\
  \ `--enable-preview` 选项）来重新创建 `dist\\jdojo.cds.jar` 文件，你将收到以下错误信息：\n\n```\nError:\
  \ Unable to load main class com.jdojo.cds.HelloCDS in module jdojo.cds\njava.lang.UnsupportedClassVersionError:\
  \ Preview features are not enabled for com/jdojo/cds/HelloCDS (class file version\
  \ 57.65535). Try running with '--enable-preview'\n...\n```\n\n要修复此错误，你需要使用 `--enable-preview`\
  \ 选项运行 `HelloCDS` 类，如下所示：\n\n```\nC:\\Java13Revealed>java --enable-preview -XX:ArchiveClassesAtExit=jdojo.jsa\
  \ --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  ```\n\n此命令创建的动态 CDS 归档（顶层归档）是基于随 JDK 打包的默认 CDS 归档（基础层归档）创建的。顶层归档依赖于基础层归档。如果无法使用顶层归档，它将被禁用，仅使用基础层归档。如果无法使用基础层归档，则顶层归档也会被禁用。\n\
  \n顶层归档（或动态 CDS 归档）包含所有已加载的应用程序类和默认 CDS 归档（基础层归档）中不存在的库类。\n\n### 提示\n\n存在于类路径或模块路径上的\
  \ JAR 文件中，但在执行期间未被加载的类不会被动态归档。应用程序执行期间创建的 Java 堆对象也不会被动态归档。\n\n让我们使用动态归档运行 `HelloCDS`\
  \ 类。我使用了 `-Xlog:class+load=info` 选项，这样你可以在输出中看到 `HelloCDS` 类是从动态归档加载的。如果你使用的是本书源代码附带的\
  \ `dist\\jdojo.cds.jar` 文件，请在以下命令中使用 `--enable-preview` 选项：\n\n```\nC:\\Java13Revealed>java\
  \ -XX:SharedArchiveFile=jdojo.jsa --module-path dist\\jdojo.cds.jar -Xlog:class+load=info\
  \ --module jdojo.cds/com.jdojo.cds.HelloCDS\n[0.011s][info][class,load] opened:\
  \ C:\\java13\\lib\\modules\n[0.023s][info][class,load] java.lang.Object source:\
  \ shared objects file\n[0.023s][info][class,load] java.io.Serializable source: shared\
  \ objects file\n[0.023s][info][class,load] java.lang.String source: shared objects\
  \ file\n...\n[0.145s][info][class,load] com.jdojo.cds.HelloCDS source: shared objects\
  \ file (top)\n...\nHello, CDS and AppCDS\n...\n```\n\n请注意输出中 `HelloCDS` 类的位置 `\"\
  shared objects file (top)\"` 中使用了 `\"(top)\"`。这表明 `HelloCDS` 类是从顶层共享归档（即动态 CDS 归档）加载的。系统类的位置中不包含\
  \ `\"top\"` 字样，这意味着它们是从基础层（默认 CDS 归档）加载的。\n\n敬请期待未来 JDK 版本中对动态 CDS 归档的更多改进。\n\n\
  ## 总结\n\n类数据共享（CDS）是 JDK5 中引入的一项 JVM 特性，它允许在 JVM 之间共享类，从而减少启动时间和运行时内存占用。CDS 允许共享由引导类加载器加载的\
  \ Java 核心类。\n\nJDK10 中的应用程序类数据共享（AppCDS）扩展了 CDS 特性，允许在 JVM 之间共享类路径上的应用程序类。从 JDK10\
  \ 开始，所有类型的类加载器（引导类加载器、平台类加载器、应用程序类加载器和自定义类加载器）都可以从 AppCDS 加载类。AppCDS 在 Oracle JDK\
  \ 8 和 9 中可用，但需要商业许可。在 JDK10 中，AppCDS 在 OpenJDK 中可用。在 JDK10 中，你只能为类路径上的类创建 AppCDS\
  \ 共享归档。JDK11 及更高版本允许包含来自模块路径和类路径的类。\n\n当你为 AppCDS 使用共享归档时，用于创建共享归档的类路径必须与启用 AppCDS\
  \ 启动应用程序时使用的类路径相同，或者是其前缀。否则，会发生类路径不匹配错误，应用程序将无法启动。\n\nJDK12 为 64 位平台上的原生构建增加了对默认\
  \ CDS 归档的支持。JDK 镜像包含一个默认的 CDS 归档。它被命名为 `classes.jsa`。在类 Unix 操作系统上，它存储在 `JAVA_HOME/lib/server`\
  \ 目录中；在 Windows 上，存储在 `JAVA_HOME/bin/server` 目录中。`JAVA_HOME/lib/classlist` 文件包含默认\
  \ CDS 归档中的系统类列表。要在 JDK12 及更高版本中利用默认 CDS，你无需执行任何操作。\n\nJDK13 极大地简化了生成共享归档以使用 AppCDS\
  \ 的方式。首先，使用 `-XX:ArchiveClassesAtExit=<文件名>` 参数运行应用程序，其中 `<文件名>` 是共享归档文件的名称。应用程序退出时会生成一个共享归档。如果应用程序异常退出，则不会生成共享归档。其次，使用\
  \ `-XX:SharedArchiveFile=<文件名>` 选项运行应用程序，以将共享归档与 AppCDS 一起使用。\n\n动态 CDS 归档（顶层归档）是基于随\
  \ JDK 打包的默认 CDS 归档（基础层归档）创建的。顶层归档依赖于基础层归档。如果无法使用顶层归档，它将被禁用，仅使用基础层归档。如果无法使用基础层归档，则顶层归档也会被禁用。\n\
  \n顶层归档包含所有已加载的应用程序类和默认 CDS 归档中不存在的库类。存在于类路径或模块路径上的 JAR 文件中，但在执行期间未被加载的类不会被动态归档。应用程序执行期间创建的\
  \ Java 堆对象也不会被动态归档。\n\n\n\n"
- '# 8. 工具与 API 变更


  在本章中，你将学习


  *   关于已弃用和已移除的工具与 API


