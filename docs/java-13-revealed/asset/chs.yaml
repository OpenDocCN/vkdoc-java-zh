  #### 服务器推送


  服务器推送是 HTTP/2 支持的一项功能，服务器通过该功能主动向客户端发送额外的资源。客户端发送一个请求。服务器通过检查客户端的初始请求，判断出客户端除了初始请求的响应外，还需要额外的资源。服务器会响应初始请求，并同时发送额外的响应。服务器推送的典型用例是在浏览器中显示网页。一个网页由多个资源组成，例如样式表、JavaScript
  代码、图片、嵌入式字体等。如果你请求一个网页，支持 HTTP/2 的服务器可能会向你发送该网页的 HTML 页面以及该网页所需的所有其他资源。这样，你只需发出一个请求就能获得多个资源。如果没有服务器推送，浏览器通常需要多次往返才能获取一个网页的所有资源。在
  HTTP/2 之前，有几种变通方法用来避免这些往返。


  Java 中的 HTTP Client API 支持服务器推送。当你使用 `HttpClient` 发出请求时，服务器可能会以推送承诺的形式向你发送额外的响应。你可以选择接受或拒绝推送承诺。服务器会为每个推送承诺合成一个
  `HttpRequest` 和一个 `HttpResponse`。你必须提供一个推送承诺处理器，每当 `HttpClient` 收到推送承诺时，该处理器就会被调用。


  服务器推送涉及服务器推送内容以及客户端消费这些内容。浏览器会为你处理服务器推送。在 Java 程序中，你需要编写逻辑来处理服务器推送——最重要的是，你需要提前知道服务器将向你的客户端推送何种资源，这样你才能在代码中知道如何处理它们。


  你需要有一个向客户端发送服务器推送的服务器。在本例中，我将使用一个 URL 为 [`www.angular.io`](http://www.angular.io)
  的网页。你可以在 [`https://http2.netray.io/data.php`](https://http2.netray.io/data.php)
  找到使用服务器推送的域名列表。


  要处理服务器推送，你需要使用 `HttpClient` 类中接受 `HttpResponse.PushPromiseHandler<T>` 的 `sendAsync()`
  版本来发送请求。该方法的声明如下：


  ```

  CompletableFuture> sendAsync (HttpRequest request, HttpResponse.BodyHandler responseBodyHandler,
  HttpResponse.PushPromiseHandler pushPromiseHandler)

  ```


  ### 提示


  服务器推送是服务器主动向客户端推送资源的操作。HTTP Client API 将一次服务器推送称为*推送承诺*。也就是说，如果响应一个请求，服务器推送了五个额外的资源，那么你将收到五个推送承诺。


  推送承诺处理器是 `HttpResponse.PushPromiseHandler<T>` 接口的一个实例。你需要为该接口的 `applyPushPromise()`
  方法提供实现。该方法声明如下：


  ```

  applyPushPromise (HttpRequest initiatingRequest,

  HttpRequest pushPromiseRequest,

  Function, CompletableFuture>> acceptor)

  ```


  推送承诺处理器的 `applyPushPromise()` 方法会为从服务器接收到的每个推送承诺调用一次。该方法接受三个参数——第一个是你发送给服务器的初始请求，第二个是接收到的服务器推送的合成请求。第三个参数是一个名为
  acceptor 的函数`<T,R>`。如果你想接受推送承诺，你需要调用 `acceptor` 上的 `apply()` 方法，并向其传递一个 `HttpReponse.BodyHandler<T>`，该处理器将用于处理该推送承诺的响应体。`apply()`
  方法返回一个 `CompletableFuture<HttpResponse<T>>`，当它完成时，会将推送承诺作为一个 `HttpResponse<T>` 对象提供。


  清单 3-9 包含一个推送承诺处理器的简单实现，用于将推送承诺的响应体作为 `String` 处理。你将在下一个示例中使用它。当客户端收到推送承诺时，其 `applyPushPromise()`
  方法将被调用。我让这个方法非常简单，它打印推送承诺的合成请求的 URI。它通过调用 acceptor 函数的 `apply()` 方法来接受推送承诺。请注意，推送承诺中的响应将在稍后处理。当响应体可用时，从
  `apply()` 方法返回的 `CompletableFuture` 就完成了。代码调用 `CompletableFuture` 上的 `thenAccept()`
  方法来打印推送承诺请求 URI 和响应状态码。在实际应用中，`apply()` 方法内的代码将以更复杂的方式处理响应。


  ```

  // ServerPushPromiseHandler.java

  package com.jdojo.http.client;

  import java.net.http.HttpRequest;

  import java.net.http.HttpResponse;

  import java.util.concurrent.CompletableFuture;

  import java.util.function.Function;

  import static java.lang.System.out;

  public class ServerPushPromiseHandler implements

  HttpResponse.PushPromiseHandler {

  @Override

  public void applyPushPromise(HttpRequest initiatingRequest,

  HttpRequest pushPromiseRequest,

  Function,

  CompletableFuture>> acceptor) {

  // 打印推送承诺请求及其初始请求的 URI

  out.printf("收到推送承诺请求 URI: %s%n"

  + "推送承诺初始请求 URI: %s%n%n",

  pushPromiseRequest.uri(),

  initiatingRequest.uri());

  // 通过调用传入此方法的函数上的 apply() 方法来接受推送承诺

  acceptor.apply(HttpResponse.BodyHandlers.ofString())

  .thenAccept(response -> {

  // 打印推送承诺响应详情

  out.printf("%n 已处理推送承诺请求 URI: %s%n"

  + "推送响应状态码: %d%n",

  pushPromiseRequest.uri(),

  response.statusCode());

  });

  }

  }

