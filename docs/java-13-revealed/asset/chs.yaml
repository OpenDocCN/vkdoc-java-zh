  ## 向编译器传递选项


  在源文件模式下，`java` 命令在运行源文件之前需要先编译它。它会扫描命令行中与编译器相关的选项，并将它们传递给编译器。如果指定了，传递给编译器的选项如下：


  *   `--class-path`


  *   `--module-path`


  *   `--add-exports`


  *   `--add-modules`


  *   `--limit-modules`


  *   `--patch-module`


  *   `--upgrade-module-path`


  *   `--enable-preview`


  除了此列表中的选项外，你不能向编译器传递任何其他选项。如果选项列表很大，你可以使用命令行参数文件（@-files）来传递它们。


  在源文件模式下，编译期间会禁用注解处理。这就像你使用了 `-proc:none` 选项来编译源代码一样。


  如果使用 `--source` 选项指定了版本，则该值将用作编译时隐式 `--release` 选项的参数。


  编译器不会强制执行文件名限制，即命名包中的类型应存在于一个文件名由类型名后跟 `.java` 扩展名组成的文件中。你已经见过这类例子。例如，你在 `HelloBye.java`
  文件中包含了公共的 `Hello` 和 `Bye` 类。如果你自己编译 `HelloBye.java` 文件，编译器会拒绝编译。编译器会坚持要求公共类必须声明在两个分别名为
  `Hello.java` 和 `Bye.java` 的单独文件中。但是，当你使用源文件模式运行该文件时，编译器并未强制执行此限制。


  在源文件模式下，源文件作为*未命名*模块的一部分进行编译。你的代码可以访问所有可观察模块。这就像你使用 `--add-modules=ALL-DEFAULT`
  选项编译并运行了代码一样。如果你希望代码能够访问其他模块，可以使用额外的 `--add-modules` 选项来实现。


  在源文件模式下运行 `java` 命令需要 `jdk.compiler` 模块。它用于在内存中编译源文件。




  ## 类加载机制


  源文件中定义的所有类型均由一个名为内存类加载器的自定义类加载器加载，该加载器会委托给应用程序类加载器。这种委托行为在 Java 11 和 Java 12 之间发生了变化。以下是它在
  Java 11 中的工作方式：


  *   内存类加载器委托给应用程序类加载器。如果应用程序类加载器无法加载该类，则内存类加载器会尝试从源文件中加载该类。这有两个含义。首先，应用程序类加载器无法看到源文件中的类。其次，由应用程序类加载器加载的类路径上的类，优先级高于源文件中的类。


  *   如果从源文件运行的类也存在于类路径上，`java` 命令会报错。


  源文件模式下 `java` 命令的目标是为初学者提供一种运行源文件且更少意外的方式。上述两条规则使其变得复杂。假设你正在学习 Java，并且想从源文件运行一个类。当你运行该文件时，会收到错误“在应用程序类路径上找到类”。作为初学者，你将很难理解这个错误。再举一个例子，假设你有一个包含两个类的源文件。正在运行的类使用了第二个类。当你运行源文件时，所使用的第二个类并非来自你的源文件。相反，如果第二个类恰好也在类路径上，它就会从类路径中被选取。这两种情况在
  Java 11 中都是可能发生的。作为运行源文件的初学者，你无法从源文件中的代码得到你想要的结果。Java 12 修复了这种类加载机制，使其保持简单。此更改由增强请求
  [`https://bugs.openjdk.java.net/browse/JDK-8210839`](https://bugs.openjdk.java.net/browse/JDK-8210839)
  跟踪。


  以下是 Java 12 及更高版本中内存类加载器的简化类加载行为：


  *   内存类加载器仍然像在 Java 11 中那样委托给应用程序类加载器。这意味着类路径上的类不能使用源文件中的类。


  *   内存类加载器在委托给应用程序类加载器之前，会先在源文件中查找类。这意味着源文件中的类优先级高于类路径上的类。


  *   如果从源文件运行的类也存在于类路径上，`java` 命令不会报错。它只会运行源文件中的类。


  这种新的类加载行为可以理解为，源文件中的类被预置到了类路径之前。Java 一直允许类路径上存在重复的类，并且始终使用在类路径中找到的第一个类。从 Java 12
  开始，在使用源文件模式时，这种旧的“先找到类路径上的类即使用”的规则仍然适用。


  让我们通过几个示例来演示这些规则的效果。`src\sourcecode.apps\examples` 目录包含两个名为 `Fruits` 和 `FruitsPrinter`
  的类。它们都在 `com.jdojo.sourcecode.mode` 包中。我已将这些类打包到 `fruits.jar` 文件中，并将该 JAR 文件存储在
  `src\sourcecode.apps` 目录中。


  清单 4-8 和 4-9 包含了 `Fruits` 和 `FruitsPrinter` 类的代码。这两个类都在静态初始化器中打印了它们的类加载器。`FruitsPrinter`
  类引用了 `Fruits` 类。我在这两个类中保持了逻辑简单，以便你可以专注于类加载规则。请注意，你将在类路径上使用这些类。它们并非设计为从源文件运行。


  ```

  // FruitsPrinter.java

  package com.jdojo.sourcecode.mode;

  public class FruitsPrinter {

  static {

  // 打印此类的类加载器

  var cl = FruitsPrinter.class.getClassLoader();

  System.out.println("类路径上的 FruitsPrinter 类" +

  " 由 " + cl + " 加载");

  }

  public static void print() {

  System.out.println("调用了类路径上的 FruitsPrinter.print()");

  Fruits.print();

  }

  }

