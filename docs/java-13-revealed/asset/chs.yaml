  #### 将响应体作为附件下载


  在本节中，我将演示如何将响应体作为附件下载并保存到文件中。要将文件作为附件下载，响应需要包含一个名为 `Content-Disposition` 的标头，该标头包含两个值——第一个是
  `attachment`，第二个是 `filename` 及其文件名。该标头格式如下：


  ```

  Content-Disposition: attachment; filename="myimage.jpeg"

  ```


  `HttpResponse.BodyHandlers.ofFileDownload()` 方法返回一个处理器，用于读取 `Content-Disposition`
  响应标头。如果标头值中包含 `attachment` 和 `filename`，该处理器会下载响应体，并将内容保存到 `filename` 参数指定的文件中。你需要指定下载文件保存的目录。如果响应不包含具有上述值的
  `Content-Disposition` 标头，则 `ofFileDownload()` 方法返回的处理器将无法正常工作。


  对于此示例，我在互联网上未找到能返回包含待下载文件的 `Content-Disposition` 响应标头的 URL。你将使用 [`http://httpbin.org/response-headers`](http://httpbin.org/response-headers)
  这个 URL，它会返回该 URL 查询字符串中指定的响应标头。对于此示例，你需要在 URL 的查询字符串中指定包含预期值的 `Content-Disposition`。服务器将返回一个包含
  JSON 文档和 `Content-Disposition` 响应标头的响应，该标头与你请求 URL 的查询字符串中指定的一致。查询字符串需要进行 URL 编码。未进行
  URL 编码时，URL 如下所示：


  ```

  http://httpbin.org/response-headers?Content-Disposition=attachment; filename=test.json

  ```


  对 `Content-Disposition` 查询字符串参数的值进行编码后，URL 如下所示：


  ```

  http://httpbin.org/response-headers?Content-Disposition=attachment%3B+filename%3Dtest.json

  ```


  清单 3-5 包含了一个完整的程序，用于演示如何下载文件。程序重要部分的讨论位于输出之后。你可能会得到不同的输出。




  ```

  // DownloadFile.java

  package com.jdojo.http.client;

  import java.io.IOException;

  import java.net.URI;

  import java.net.URLEncoder;

  import java.net.http.HttpClient;

  import java.net.http.HttpRequest;

  import java.net.http.HttpResponse;

  import java.net.http.HttpResponse.BodyHandlers;

  import static java.nio.charset.StandardCharsets.UTF_8;

  import java.nio.file.Path;

  import java.nio.file.Paths;

  import static java.nio.file.StandardOpenOption.CREATE;

  import static java.nio.file.StandardOpenOption.WRITE;

  public class DownloadFile {

  public static void main(String[] args) {

  // 使用默认配置创建一个 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  try {

  // 通过编码参数值准备查询字符串

  String paramName = "Content-Disposition";

  String paramValue = "attachment; filename=test.json";

  String encodedParamValue

  = URLEncoder.encode(paramValue, UTF_8);

  // 准备带有查询字符串的 URI

  String uriStr = "http://httpbin.org/response-headers"

  + "?" + paramName + "=" + encodedParamValue;

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create(uriStr))

  .header("Accept", "application/json")

  .build();

  // 为下载目录创建一个 Path，此处为当前目录

  Path dirPath = Paths.get(".");

  // 向服务器发送请求

  HttpResponse response = client.send(request,

  BodyHandlers.ofFileDownload(dirPath, CREATE, WRITE));

  // 获取响应状态和响应体。

  // 响应体是已下载文件的 Path。

  int statusCode = response.statusCode();

  Path filePath = response.body();

  // 打印响应状态和响应体

  System.out.println("Response Status: " + statusCode);

  System.out.println("File downloaded at "

  + filePath.toAbsolutePath().normalize());

  } catch (IOException | InterruptedException e) {

  e.printStackTrace();

  }

  }

  }

  Response Status: 200

  File downloaded at D:\Java13Revealed\test.json

  Listing 3-5

  Downloading an Attachment in a Response Body

  ```


  `ofFileDownload()` 方法接受两个参数——第一个参数是一个 `Path`，指向文件将被下载到的目录。`Content-Disposition`
  头中的 `filename` 参数可能指定一个文件路径而非文件名。出于安全原因，`filename` 参数中指定的文件路径不会被使用。只有文件路径的最后一部分被用作文件名。以下语句创建了一个表示当前目录的
  `Path`：


  ```

  Path dirPath = Paths.get(".");

  ```


  当你创建 body handler 时，需要将选项作为 `OpenOption` 类型的可变参数传递给 `ofFileDownload()` 方法的第二个参数。在此示例中，你指定了
  `CREATE` 和 `WRITE` 作为这些选项。它们将允许 body handler 创建一个文件（如果该文件不存在）来存储下载的内容，并且该文件将以写入模式打开。程序中的以下语句实现了这一点：


  ```

  HttpResponse response = client.send(request,

  BodyHandlers.ofFileDownload(dirPath, CREATE, WRITE));

  ```


  从响应体返回的 `Path` 并未规范化。例如，它包含的文件路径为 `C:\Java13Revealed\.\test.json`。请注意文件路径中的点。该路径是有效的，但未规范化。在打印文件路径之前，程序会获取其绝对路径并进行规范化，以打印出类似
  `C:\Java13Revealed\test.json` 的文件路径。程序中的以下代码片段执行此任务：


  ```

  System.out.println("File downloaded at "

  + filePath.toAbsolutePath().normalize());

  ```


  #### 跟随服务器重定向


  当你向服务器发送请求时，通常会被重定向到另一个 URL。重定向通过响应状态码指示。状态码为 3xx 表示重定向。例如，如果你收到状态码 301，表示该 URL
  已永久移动。在这种情况下，响应将包含一个名为 `Location` 的头，其值包含资源已移动到的新的 URL。例如，当你请求 [`http://google.com`](http://google.com)
  的页面时，你会收到状态码为 301 的响应，并且响应头中的 `Location` 设置为 [`www.google.com`](http://www.google.com)。


  一个 URL 可能会将你重定向到另一个 URL，新的 URL 又可能将你重定向到另一个，依此类推。有时，设计不佳的服务器上的 URL 可能会让你陷入无限的重定向循环。大多数浏览器设置了一个默认限制，即最多跟随
  20 次重定向。


  有时，服务器可能会将你重定向到另一个 URL，仅仅是为了强制你使用安全协议。例如，[`www.abc.com`](http://www.abc.com) 可能会将你重定向到
  [`www.abc.com`](https://www.abc.com)。然而，从 HTTPS 重定向到 HTTP 并非正常做法。


  浏览器会自动为你处理重定向。HTTP Client API 默认不跟随重定向。重定向策略在 `HttpClient` 中设置，并指定为 `HttpClient.Redirect`
  枚举中的以下值之一：


  *   `ALWAYS`


  *   `NEVER`


  *   `NORMAL`


  `ALWAYS` 允许在所有情况下进行重定向。`NEVER` 是默认的重定向策略，不允许重定向。`NORMAL` 的行为与 `ALWAYS` 相同，但拒绝从 HTTPS
  到 HTTP 的重定向。




  ### 提示


  你可以使用 `HttpClient.Builder` 接口的 `followRedirects()` 方法来设置 `HttpClient` 的重定向策略。


  清单 3-6 包含一个完整的程序，用于演示重定向策略的使用。程序输出后附有相关讨论。你得到的输出可能有所不同。


  ```

  // FollowRedirection.java

  package com.jdojo.http.client;

  import java.io.IOException;

  import java.net.URI;

  import java.net.URLEncoder;

  import java.net.http.HttpClient;

  import static java.net.http.HttpClient.Redirect.NORMAL;

  import java.net.http.HttpRequest;

  import java.net.http.HttpResponse;

  import java.net.http.HttpResponse.BodyHandlers;

  import static java.nio.charset.StandardCharsets.UTF_8;

  public class FollowRedirection {

  public static void main(String[] args) {

  // 使用默认配置创建一个 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  // 新 URL 的位置

  String location = "http://httpbin.org/ip";

  // 准备一个会将请求重定向到新位置的 URL

  String uriStr = "http://httpbin.org/redirect-to?"

  + "url=" + URLEncoder.encode(location, UTF_8)

  + "&status_code=301";

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create(uriStr))

  .build();

  // 使用默认的 NEVER 重定向策略发送请求。

  // 期望收到状态码为 301 的响应。

  printResponse(client, request);

  System.out.println("-----------------------------------");

  // 创建一个重定向策略为 NORMAL 的 HttpClient

  client = HttpClient.newBuilder()

  .followRedirects(NORMAL)

  .build();

  // 使用 NORMAL 重定向策略发送请求

  // 期望收到状态码为 200 的响应

  printResponse(client, request);

  }

  public static void printResponse(HttpClient client,

  HttpRequest request) {

  try {

  HttpResponse response

  = client.send(request, BodyHandlers.ofString());

  // 获取响应状态码和响应体

  int statusCode = response.statusCode();

  String body = response.body();

  String locationHeader = response.headers()

  .firstValue("Location")

  .orElse("");

  System.out.println("状态码: " + statusCode);

  System.out.println("Location 头: " + locationHeader);

  System.out.println("响应体:\n" + body);

  } catch (IOException | InterruptedException e) {

  e.printStackTrace();

  }

  }

  }

