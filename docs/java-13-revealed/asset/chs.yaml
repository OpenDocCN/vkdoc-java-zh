  \n```\nC:\\>java --version\nopenjdk 13-ea 2019-09-17\nOpenJDK Runtime Environment\
  \ (build 13-ea+29)\nOpenJDK 64-Bit Server VM (build 13-ea+29, mixed mode, sharing)\n\
  ```\n\n\n\n## 摘要\n\nJava 已采用一种新的基于时间的发布模式，即每 6 个月发布一个特性版本，每 3 个月发布一个更新版本，每 3 年发布一个长期支持（LTS）版本。新的特性版本将于每年\
  \ 3 月和 9 月发布，从 2018 年 3 月的 Java 10 开始。更新版本将于每年 1 月、4 月、7 月和 10 月发布。LTS 版本将从 2018\
  \ 年 9 月起每 3 年发布一次。\n\nJDK 9 中改进了 JDK 不直观的版本编号方案。一个 JDK 版本字符串按顺序包含以下四个元素，其中只有第一个是必需的：版本号、预发布信息、构建信息和附加信息。正则表达式“`$vnum(-$pre)?(\\\
  +($build)?(-$opt)?)?\"` 定义了版本字符串的格式。在 JDK 9 中，`$vnum` 由四部分组成：`$major.$minor.$security(.$additionalInfo)`。从\
  \ JDK 10 开始，`$vnum` 由五部分组成：`$feature.$interim.$update.$patch(.$addtionalInfo)`。JDK\
  \ 10 中 `$vnum` 的 `$feature`、`$interim`、`$update` 元素在 JDK 9 中分别被称为 `$major`、`$minor`\
  \ 和 `$security`。\n\n短版本字符串仅包含前两个元素——一个版本号，可选地后跟预发布信息。你可以拥有像“10”这样仅包含主版本号的短版本字符串，也可以拥有像“10.0.1.1-ea+54-20180210.07.36am”这样包含所有元素的完整版本字符串。\n\
  \nJDK 9 添加了一个名为 `Runtime.Version` 的静态嵌套类，其实例代表 JDK 版本字符串。该类没有公共构造函数。你可以使用 `Runtime`\
  \ 类的 `version()` 静态方法获取 JRE 的当前版本。该方法返回一个 `Runtime.Version`。你可以使用 `Runtime.Version`\
  \ 类的 `parse(String vstr)` 静态方法来解析版本字符串，从而获得一个 `Runtime.Version`。如果版本字符串为 `null`\
  \ 或无效，`parse()` 方法可能会抛出运行时异常。该类包含多个方法来获取版本字符串的不同部分。\n\nJDK 10 新增了两个系统属性，名为 `java.version.date`\
  \ 和 `java.vendor.version`。`java.version.date` 系统属性包含当前 JDK 版本的通用可用性（GA）日期，格式为 ISO-8601\
  \ `YYYY-MM-DD`。`java.vendor.version` 系统属性是供应商特定的产品版本字符串，它是可选的，由 JDK 供应商分配。\n\n`Runtime.Version`\
  \ 类包含多个方法来比较和检索版本字符串的不同部分。例如，你可以使用 `feature()` 方法获取版本字符串的 `$feature` 元素。`Runtime.Version`\
  \ 类中的 `major()`、`minor()` 和 `security()` 方法已在 JDK 10 中弃用；请改用该类的 `feature()`、`interim()`\
  \ 和 `update()` 方法。\n\n"
- '# 3. HTTP 客户端 API


  在本章中，你将学习


  *   什么是 HTTP 客户端 API


  *   如何创建 HTTP 客户端


  *   如何发起 HTTP 请求


  *   如何接收和处理 HTTP 响应


  *   如何使用服务器推送将未经请求的数据从服务器推送到客户端


  *   如何使用 HTTP 基本认证来验证对服务器上资源的访问


  *   如何创建 WebSocket 客户端端点


  JDK 9 和 10 将 HTTP 客户端 API 作为孵化器模块提供。JDK 11 将其作为名为 `java.net.http` 的标准模块包含在内。其类型位于
  `java.net.http` 包中。


  ## 什么是 HTTP 客户端 API？


  Java 从非常早期的版本就支持 HTTP 客户端 API。旧版 API 支持 HTTP/1.1，它由 `java.net` 包中的几个类和接口组成。`URLConnection`
  是表示通信的基类，而 `HttpURLConnection` 是表示 HTTP 通信的类。旧版 API 存在以下问题：


  *   它被设计为支持多种协议，如 http、ftp、gopher 等，其中许多协议已不再使用。


  *   它过于抽象且难以使用。


  *   它包含许多未记录的行为。


  *   它仅支持一种模式，即阻塞模式，这要求每个请求/响应都有一个线程。


  *   它不支持 HTTP/2。


  2015 年 5 月，互联网工程任务组（IETF）发布了 HTTP/2 的规范。有关 HTTP/2 规范的完整文本，请参阅网页 [`https://tools.ietf.org/html/rfc7540`](https://tools.ietf.org/html/rfc7540)。HTTP/2
  并未修改应用层语义。也就是说，你在应用程序中了解并一直使用的 HTTP 协议内容没有改变。它采用了一种更高效的方式来准备数据包并将其在客户端和服务器之间通过线路发送。你之前了解的关于
  HTTP 的所有内容，例如 HTTP 标头、方法、状态码、URL 等，都保持不变。HTTP/2 试图解决 HTTP/1.1 连接面临的许多与性能相关的问题：


  *   HTTP/2 支持二进制数据交换，而不是 HTTP/1.1 支持的文本数据。


  *   HTTP/2 支持多路复用和并发，这意味着在单个 TCP 连接的两个方向上可以同时进行多个数据交换，并且可以乱序接收对请求的响应。这消除了对等点之间建立多个连接的开销，而这在使用
  HTTP/1.1 时通常是必需的。在 HTTP/1.1 中，必须按照发送请求的顺序接收响应，这被称为*队头*阻塞。HTTP/2 通过在同一 TCP 连接上启用多路复用解决了队头阻塞问题。


  *   客户端可以建议请求的优先级，服务器在确定响应优先级时可能会遵循该建议。


  *   HTTP 标头被压缩，这显著减小了标头大小，从而降低了延迟。


  *   它允许将资源从服务器未经请求地推送到客户端，这称为服务器推送。


  JDK 11 中的 HTTP 客户端 API 没有更新现有的 HTTP/1.1 API，而是提供了一个同时支持 HTTP/1.1 和 HTTP/2 的新 API。其目的是
  HTTP 客户端 API 最终将取代 `URLConnection` 类提供的旧 API。新 API 还包含用于使用 WebSocket 协议开发客户端应用程序的类和接口。有关完整的
  WebSocket 协议规范，请参阅网页 [`https://tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455)。与旧版
  API 相比，新的 HTTP 客户端 API 具有多项优势：


  *   它很简单。对于大多数常见情况，它易于学习和使用。


  *   它使用 Java 9 中引入的 Flow API，通过响应式流处理请求和响应体。


  *   它支持服务器推送，允许服务器将资源推送到客户端，而无需客户端显式请求这些资源。它使得与服务器建立 WebSocket 通信变得简单。


  *   它支持 HTTP/2 和 HTTPS/TLS 协议。


  *   它可以在同步（阻塞）和异步（非阻塞）模式下工作。




  ## HTTP 客户端 API 的组成部分


  一次典型的 HTTP 通信包含一个请求和一个响应。客户端创建一个请求，该请求由 URL、标头和正文组成。请求被发送到由 URL 指示的服务器。服务器用一个响应来回应，该响应由状态码、标头和正文组成。HTTP
  客户端 API 提供了表示 HTTP 请求和响应的类。


  HTTP 客户端 API 规模很小。它包含不到 20 种类型，其中四种是主要类型。其他类型在你使用这四种类型之一时会用到。这个新的 API 也使用了旧版 HTTP
  API 中的一些类型。新的 API 位于 `java.net.http` 模块的 `java.net.http` 包中。如果你想在你的模块中使用 HTTP 客户端
  API，你的模块需要读取 `java.net.http` 模块。


  HTTP 客户端 API 中的四种主要类型如下：


  *   `HttpClient` 类

  *   `HttpRequest` 类

  *   `HttpResponse<T>` 接口

  *   `WebSocket` 接口


  `HttpClient` 充当一个容器，用于存储可用于多个 HTTP 请求的配置，而不是为每个请求单独设置它们。


  `HttpRequest` 表示一个可以发送到服务器的 HTTP 请求。一旦你创建了一个 `HttpRequest`，它就是不可变的，并且可以重复使用以多次发送相同的请求。


  `HttpResponse` 表示一个 HTTP 响应。你不需要创建 `HttpResponse`；相反，你将它作为服务器对 `HttpRequest` 的响应来接收。


  `WebSocket` 表示一个 WebSocket 客户端。你可以使用 Java EE 7 WebSocket API 或使用其他几种编程语言（如 Python、NodeJS
  等）来创建 WebSocket 服务器。本章不会向你展示如何创建 WebSocket 服务器。


  ### 提示


  `HttpClient` 是不可变的。存储在 `HttpClient` 中的一些配置在构建 HTTP 请求时可能会被覆盖。你不需要创建 `HttpResponse`；它会作为你发送给服务器的
  HTTP 请求的一部分返回给你。


  `HttpClient`、`HttpRequest` 和 `WebSocket` 的实例是使用构建器创建的。它们每个都包含一个名为 `Builder` 的嵌套接口，用于构建该类型的实例。


  HTTP 客户端 API 使用起来非常简单，你甚至可以用一条语句读取 HTTP 资源！下面的语句使用 `GET` HTTP 请求将 URL [`http://httpbin.org/ip`](http://httpbin.org/ip)
  的内容作为字符串读取，并将响应正文打印到标准输出：


  ```

  HttpClient.newHttpClient()

  .sendAsync(HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/ip"))

  .build(), BodyHandlers.ofString())

  .thenApply(HttpResponse::body)

  .thenAccept(System.out::println)

  .join();

  ```


  如果这条语句看起来令人生畏，请不要担心。我会在将其分解为单独的语句，然后再重新组合成一条语句后，解释它的每个部分。在这一点上，你只需要知道新的 HTTP 客户端
  API 非常简单易用，你只需编写一条语句就可以读取 HTTP 资源。


  ## 设置示例


  本章中的许多示例都涉及与 Web 服务器交互。我没有为所有示例创建一个 Web 应用程序，而是使用了 `httpbin.org`，它支持多种类型的 HTTP 和
  HTTPS 通信以用于演示目的。如果你想在任何其他 Web 服务器上尝试这些示例，请随意将示例中的 URI 替换为你自己的。请注意，`httpbin.org`
  网站不是我的。它由 Kenneth Reitz 维护。我只是在本章的示例中使用这个网站。还有另一个网站 [`http://postman-echo.com`](http://postman-echo.com)
  提供了与 `httpbin.org` 类似的功能。


  所有 HTTP 客户端程序示例的代码都在 `jdojo.http.client` 模块中，其声明如清单 3-1 所示。


  ```

  // module-info.java

  module jdojo.http.client {

  requires java.net.http;

  exports com.jdojo.http.client;

  }

  清单 3-1

  一个名为 jdojo.http.client 的模块

  ```


  ## 快速示例


  让我们来看一个快速但完整的示例，你将向 Web 服务器发送一个 HTTP 请求，并打印响应的状态码和正文。HTTP 通信中的典型步骤如下：


  *   创建一个 `HttpClient` 来存储 HTTP 配置信息。

  *   创建一个 `HttpRequest` 并用要发送到服务器的信息填充它，例如 URI、标头、HTTP 方法、请求正文等。

  *   使用 `HttpClient` 将请求发送到服务器。

  *   从服务器接收一个 `HttpResponse<T>` 作为响应。

  *   处理 HTTP 响应，例如打印状态码和正文。


  你可以使用 `HttpClient` 类的 `newHttpClient()` 静态方法创建一个具有默认配置的 `HttpClient`：


  ```

  // 创建一个 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  ```


  `HttpRequest` 类的 `newBuilder()` 静态方法返回一个构建器来创建 `HttpRequest`。你需要调用构建器的方法来设置请求的各个部分。最后，你需要调用
  `build()` 方法，该方法返回一个 `HttpRequest`：


  ```

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/ip"))

  .build();

  ```


  `HttpRequest.Builder` 使用的默认请求 HTTP 方法是 GET。你也可以通过在构建器上调用 `GET()` 方法来显式设置它：


  ```

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/ip"))

  .GET()

  .build();

  ```


  调用 `HttpClient` 的 `send()` 方法将请求发送到服务器，该方法同步发送请求——它会阻塞直到收到响应。在发送请求时，你需要指定一个正文处理器来处理响应正文。`HttpResponse.BodyHandlers`
  类的工厂方法提供了几个内置的正文处理器。例如，`BodyHandlers.ofString()` 静态方法返回一个正文处理器，用于将响应正文作为 `String`
  处理。`send()` 方法返回一个 `HttpResponse<T>`，其中类型参数 `T` 是正文处理器的类型。如果正文处理器是 `String` 类型，则
  `send()` 方法返回 `HttpResponse<String>`。`HttpResponse` 的 `statusCode()` 方法以 `int` 形式返回
  HTTP 状态码，其 `body()` 方法返回响应正文。`send()` 方法会抛出已检查异常 `IOException` 和 `InterruptedException`，因此你需要在代码中处理这些异常。以下代码片段展示了如何将请求发送到服务器并将其正文作为
  `String` 处理：


  ```

  // 将请求发送到服务器，并将响应正文作为 String 处理

  HttpResponse response

  = client.send(request, BodyHandlers.ofString());

  // 获取响应状态和正文

  int statusCode = response.statusCode();

  String body = response.body();

  ```


  清单 3-2 包含了向服务器发送请求并处理响应的完整程序。URL `http://httpbin/ip` 以 JSON 格式返回请求者的 IP 地址。该程序将
  JSON 数据作为 `String` 读取并打印到标准输出。状态码 200 表示成功。你可能会得到不同的输出。



  ```java

  // PrintMyIP.java

  package com.jdojo.http.client;

  import java.io.IOException;

  import java.net.URI;

  import java.net.http.HttpClient;

  import java.net.http.HttpRequest;

  import java.net.http.HttpResponse;

  import java.net.http.HttpResponse.BodyHandlers;

  public class PrintMyIP {

  public static void main(String[] args) {

  // 创建使用默认配置的 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  // 创建 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/ip"))

  .build();

  try {

  // 向服务器发送请求

  HttpResponse response

  = client.send(request, BodyHandlers.ofString());

  // 获取响应状态码和响应体

  int statusCode = response.statusCode();

  String body = response.body();

  // 打印响应状态码和响应体

  System.out.println("响应状态码: " + statusCode);

  System.out.println("响应体:\n" + body);

  } catch (IOException | InterruptedException e) {

  e.printStackTrace();

  }

  }

  }

  响应状态码: 200

  响应体:

  {

  "origin": "75.76.172.37, 75.76.172.37"

  }

  清单 3-2

  向服务器发送 HTTP 请求并处理响应

  ```


  ## 创建 HTTP 客户端


  发送到服务器的 HTTP 请求需要进行配置，以便服务器知道要使用哪个身份验证器、SSL 配置详情、要使用的 Cookie 管理器、代理信息、如果服务器重定向请求时的重定向策略等。`HttpClient`
  类的实例存储这些特定于请求的配置，并且它们可以重用于多个请求。你可以针对每个请求覆盖其中的一些配置。你需要使用 `HttpClient` 向服务器发送 HTTP
  请求。一个 `HttpClient` 包含以下用于所有 HTTP 请求的信息：身份验证器、连接超时、Cookie 管理器、执行器、重定向策略、请求优先级、代理选择器、SSL
  上下文、SSL 参数和 HTTP 版本。


  *身份验证器*是 `java.net.Authenticator` 类的一个实例。它用于 HTTP 身份验证。默认情况下不使用身份验证器。HTTP 客户端 API
  内置支持 HTTP 基本身份验证。


  如果 `HttpClient` 在指定的连接超时时间内无法建立新连接，其 `send()` 方法会抛出 `HttpConnectTimeoutException`，而
  `sendAsync()` 方法会以 `HttpConnectTimeoutException` 异常完成。如果不需要新连接（例如重用已建立的连接），则连接超时值无效。


  *Cookie 处理器*用于处理 HTTP Cookie。它是 `java.net.CookieHandler` 类的一个实例。默认情况下不使用 Cookie
  处理器。


  *执行器*是 `java.util.concurrent.Executor` 接口的一个实例，用于发送和接收异步 HTTP 请求和响应。如果未指定，则会提供默认执行器。


  *重定向策略*是 `HttpClient.Redirect` 枚举的常量之一，用于指定如何处理服务器发出的重定向。默认值为 `NEVER`，这意味着永远不会跟随服务器发出的重定向。


  *请求优先级*是 HTTP/2 请求的默认优先级，取值范围为 1 到 256（含）。这是给服务器的一个提示，用于优先处理请求。值越高表示优先级越高。


  *代理选择器*是 `java.net.ProxySelector` 类的一个实例，用于选择要使用的代理服务器。默认情况下不使用代理服务器。


  *SSL 上下文*是 `javax.net.ssl.SSLContext` 类的一个实例，它提供了安全套接字协议的实现。提供了一个默认的 `SSLContext`，当你不需要指定协议或不需要客户端身份验证时，它可以正常工作。


  *SSL 参数*是 SSL/TLS/DTLS 连接的参数。它们存储在 `javax.net.ssl.SSLParameters` 类的实例中。


  HTTP 版本是 HTTP 的版本，可以是 1.1 或 2。它被指定为 `HttpClient.Version` 枚举的常量之一：`HTTP_1_1` 和 `HTTP_2`。它尽可能请求特定的
  HTTP 协议版本。默认值为 `HTTP_2`。也就是说，如果你没有在 `HttpClient` 中设置 HTTP 版本，默认情况下它将尝试使用 HTTP/2。如果服务器不支持
  HTTP/2，它将降级到 HTTP/1.1。


  ### 提示


  `HttpClient` 是不可变的。在构建 HTTP 请求时，`HttpClient` 中存储的一些配置可能会被覆盖。


  `HttpClient` 类是抽象的，你不能直接创建它的实例。有两种方法可以创建 `HttpClient` 类的实例：


  *   使用 `HttpClient` 类的 `newHttpClient()` 静态方法

  *   使用 `HttpClient.Builder` 接口的 `build()` 方法


  以下代码片段获取一个包含默认配置的 `HttpClient`：


  ```

  // 获取使用默认配置的 HttpClient

  HttpClient defaultClient = HttpClient.newHttpClient();

  ```


  你也可以使用 `HttpClient.Builder` 接口创建 `HttpClient`。`HttpClient.newBuilder()` 静态方法返回 `HttpClient.Builder`
  接口的一个新实例。`HttpClient.Builder` 接口为每个配置值提供了一个设置方法。配置值作为方法的参数指定，并且该方法返回构建器对象本身的引用，因此你可以链式调用多个方法。最后，调用
  `build()` 方法，该方法返回一个配置好的 `HttpClient` 对象。以下语句创建了一个 `HttpClient`，其重定向策略设置为 `ALWAYS`，HTTP
  版本设置为 1.1，连接超时设置为 2 秒：


  ```

  // 创建使用自定义配置的 HttpClient

  HttpClient client = HttpClient.newBuilder()

  .followRedirects(ALWAYS)

  .version(HTTP_1_1)

  .connectTimeout(Duration.ofSeconds(2))

  .build();

  ```


  `HttpClient` 类包含一个对应于每个配置设置的方法，该方法返回该配置的值：


  *   `Optional<Authenticator> authenticator()`

  *   `Optional<Duration> connectTimeout()`

  *   `Optional<CookieHandler> cookieHandler()`

  *   `Optional<Executor> executor()`

  *   `HttpClient.Redirect followRedirects()`

  *   `Optional<ProxySelector> proxy()`

  *   `SSLContext sslContext()`

  *   `SSLParameters sslParameters()`

  *   `HttpClient.Version version()`


  `HttpClient` 类中没有 setter 方法，因为该类是不可变的。你不能单独使用 `HttpClient`。在使用 `HttpClient` 向服务器发送请求之前，你需要有一个
  `HttpRequest`。我将在下一节中解释 `HttpRequest` 类。`HttpClient` 类包含以下三个向服务器发送请求的方法：


  *   `<T> HttpResponse<T> send(HttpRequest request, HttpResponse.BodyHandler<T> responseBodyHandler)`

  *   `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest request, HttpResponse.BodyHandler<T>
  responseBodyHandler)`

  *   `<T> CompletableFuture<HttpResponse<T>> sendAsync(HttpRequest request, HttpResponse.BodyHandler<T>
  responseBodyHandler, HttpResponse.PushPromiseHandler<T> pushPromiseHandler)`


  `send()` 方法同步发送请求，而 `sendAsync()` 方法异步发送请求。`sendAsync()` 的第二个版本允许你异步发送请求并处理服务器推送响应。我将在后续章节中更详细地介绍这些方法。



  ## 处理 HTTP 请求


  客户端应用程序通过 HTTP 请求与 Web 服务器通信。它向服务器发送请求，服务器则返回响应。`HttpRequest` 类的实例代表一个请求。以下是处理请求所需执行的步骤：


  *   获取一个 HTTP 请求构建器。


  *   设置请求的参数。


  *   从构建器创建 HTTP 请求。


  *   将 HTTP 请求发送到服务器——同步或异步。


  *   处理来自服务器的响应。


  ### 获取 HTTP 请求构建器


  你需要使用一个构建器对象（即 `HttpRequest.Builder` 接口的实例）来创建 `HttpRequest`。你可以通过 `HttpRequest`
  类的以下 `static` 方法之一来获取 `HttpRequest.Builder`：


  *   `HttpRequest.Builder newBuilder()`


  *   `HttpRequest.Builder newBuilder(URI uri)`


  以下代码片段展示了如何使用这些方法来获取 `HttpRequest.Builder`：


  ```

  // 为 httpbin.org 创建一个 URI

  URI uri = URI.create("http://httpbin.org");

  // 获取一个带有 URI 的构建器

  HttpRequest.Builder builder1 = HttpRequest.newBuilder(uri);

  // 获取一个此时未指定 URI 的构建器

  HttpRequest.Builder builder2 = HttpRequest.newBuilder();

  ```


  ### 设置 HTTP 请求参数


  一旦你有了 HTTP 请求构建器，就可以使用构建器的方法来设置请求的参数，例如请求方法、主体和标头。以下各节将通过示例展示如何在 `HttpRequest` 中设置不同类型的参数。


  ### 设置请求方法和主体发布器


  HTTP 支持以下类型的方法：GET、POST、PUT、DELETE、PATCH、HEAD、OPTIONS、CONNECT 和 TRACE。`HttpRequest.Builder`
  接口提供了四种方法来直接设置同名的 HTTP 方法：


  *   `HttpRequest.Builder GET()`


  *   `HttpRequest.Builder POST`​`(HttpRequest.BodyPublisher bodyPublisher)`


  *   `HttpRequest.Builder PUT`​`(HttpRequest.BodyPublisher bodyPublisher)`


  *   `HttpRequest.Builder DELETE()`


  某些 HTTP 方法（如 POST 和 PUT）要求你将数据作为请求主体传递。某些 HTTP 方法（如 GET 和 DELETE）不支持请求主体。这反映在前面列表中的方法声明中。


  请求主体表示为 `HttpRequest.BodyPublisher` 接口的一个实例。`BodyPublisher` 接口扩展了 `Flow.Publisher<ByteBuffer>`，其工作是将作为请求主体传递的
  Java 对象转换为适合发送请求主体的字节缓冲区流。无需担心从头开始创建 `BodyPublisher`。对于常见用例，可以通过 `HttpRequest.BodyPublishers`
  静态类提供预定义的主体发布器。


  表 3-1 列出了 `HttpRequest.BodyPublishers` 类中的工厂方法。表中的所有方法都返回一个 `HttpRequest.BodyPublisher`。该类还提供了一个
  `fromPublisher()` 方法，它是 `Flow.Publisher` 和 `HttpRequest.BodyPublisher` 之间的适配器。该方法接受一个
  `Flow.Publisher` 并返回一个 `HttpRequest.BodyPublisher`。当你想要使用现有的 `Flow.Publisher` 作为
  `HttpRequest.BodyPublisher` 时，可以使用此方法。


  表 3-1


  HttpRequest.BodyPublishers 类中返回 HttpRequest.BodyPublisher 实例的工厂方法列表


  | 方法 | 描述 |

  | --- | --- |

  | `noBody()` | 返回一个不发送请求主体的请求主体发布器。当你没有要发送给服务器的请求主体，但用于发送请求的方法要求你指定一个主体发布器时，使用此方法获取主体发布器。
  |

  | `ofByteArray(byte[] buf)` | 返回一个将指定字节数组作为请求主体发送的请求主体发布器。 |

  | `ofByteArray(byte[] buf, int offset, int length)` | 返回一个将指定字节数组中从 `offset` 开始的
  `length` 个字节作为请求主体发送的请求主体发布器。 |

  | `ofByteArrays(Iterable<byte[]> iterable)` | 返回一个将 `Iterable` 中的字节数组作为请求主体发送的请求主体发布器。
  |

  | `ofFile(Path path)` | 返回一个将 `path` 指定文件中的数据作为请求主体发送的请求主体发布器。如果指定的 `path` 不存在，则抛出
  `FileNotFoundException`。 |

  | `ofInputStream` `(Supplier<? extends InputStream> streamSupplier)` | 返回一个通过从 `InputStream`
  读取来发送请求主体的请求主体发布器。注意使用 `Supplier` 作为参数而不是 `InputStream`。使用 supplier 可以在重新发送请求时重用。如果
  `Supplier` 返回 `null`，则请求失败。 |

  | `ofString(String body)` | 返回一个请求主体发布器，其请求主体是使用 UTF8 字符集转换为字节的指定 `String`。 |

  | `ofString(String s, Charset charset)` | 返回一个请求主体发布器，其请求主体是使用指定 `charset` 转换为字节的指定
  `String`。 |


  以下代码片段展示了如何使用 HTTP POST 方法将表单数据发布到服务器：


  ```

  // 将请求主体设置为字符串

  String requestBody = "first_name=Kishori&last_name=Sharan";

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/post"))

  .header("Content-Type", "application/x-www-form-urlencoded")

  .POST(BodyPublishers.ofString(requestBody))

  .build();

  ```


  该表单包含两个字段——`first_name` 和 `last_name`。我特意为这些字段设置了简单的值（Kishori 和 Sharan），这些值不需要 URL
  编码。否则，你需要使用 `java.net.URLEncoder` 类的 `encode()` 方法在将字段值发送到服务器之前对其进行编码。请注意，如果你要发布表单数据，则必须在请求中将
  `"Content-Type"` 标头设置为 `"application/x-www-form-urlencoded"`。


  `HttpRequest.Builder` 接口提供了一个名为 `method()` 的方法，你可以使用它为请求设置任何类型的 HTTP 方法。其声明如下：


  ```

  HttpRequest.Builder method(String method, HttpRequest.BodyPublisher bodyPublisher)

  ```


  `method` 参数的值与 HTTP 方法名称相同，例如 `"POST"`、`"OPTIONS"`、`"HEAD"` 等。目前，HTTP 客户端 API 不支持
  CONNECT HTTP 方法。以下语句使用 `method()` 方法配合 HTTP OPTIONS 方法来创建一个 `HttpRequest`：


  ```

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/post"))

  .method("OPTIONS", BodyPublishers.noBody())

  .build();

  ```


  通常，你不会使用 OPTIONS 方法发送请求主体。请注意，我们使用 `BodyPublishers.noBody()` 工厂方法来获取一个 `HttpRequest.BodyPublisher`，它不发送任何请求主体。你可以使用
  `method()` 方法重写前面创建 `HttpRequest` 以发布表单数据的示例，如下所示：


  ```

  // 将请求主体设置为字符串

  String requestBody = "first_name=Kishori&last_name=Sharan";

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/post"))

  .header("Content-Type", "application/x-www-form-urlencoded")

  .method("POST", BodyPublishers.ofString(requestBody))

  .build();

  ```




  ### 覆盖 HTTP 版本


  `HttpRequest` 通过 `HttpClient` 发送到服务器。在构建 `HttpRequest` 时，你可以通过其 `HttpRequest.Builder`
  对象，使用 `version()` 方法设置 HTTP 版本值，该方法将覆盖发送此请求时 `HttpClient` 中设置的 HTTP 版本。以下代码片段为请求将版本设置为
  HTTP 1.1，覆盖了 `HttpClient` 中 HTTP 2 的默认值。回顾一下，是否使用 HTTP 2 取决于服务器。如果服务器不支持 HTTP 2，HTTP
  通信将降级为使用 HTTP 1.1。


  ```

  // 使用此 HttpClient 发送的所有请求都将使用 HTTP 2

  // 除非被请求覆盖

  HttpClient client = HttpClient.newHttpClient();

  // 获取一个使用 HTTP 1.1 的 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/ip"))

  .version(HTTP_1_1)

  .build();

  // client 对象使用 HTTP 2，而 request 对象将其覆盖为 HTTP 1.1。

  // 以下语句将使用 request 对象中的 HTTP 1.1 发送请求。

  HttpResponse response =

  client.send(request, BodyHandlers.ofString());

  ```


  ### 设置超时


  你可以使用 `HttpRequest.Builder` 实例的 `timeout(Duration timeout)` 方法为请求指定超时时间。如果在指定的超时时间内未收到响应，则会抛出
  `HttpTimeoutException`。如果你没有设置请求超时，请求可能会永远阻塞。`httpbin.org/delay/{delay}` URL 会在延迟
  URL 的 `{delay}` 部分指定的时间后发回响应。以下 `HttpRequest` 将始终因 `HttpTimeoutException` 而失败，因为服务器在
  5 秒后发送响应，而我们将请求超时设置为 2 秒：


  ```

  // 一个发送时会失败的 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/delay/5"))

  .timeout(Duration.ofSeconds(2))

  .build();

  ```


  ### 设置 Expect Continue 标头


  HTTP 请求可能包含一个名为 `Expect` 且值为 `"100-Continue"` 的标头。如果设置了此标头，客户端仅向服务器发送标头（不带请求体），服务器应发回错误响应或
  `100-Continue` 响应。收到 `100-Continue` 响应后，客户端将请求体发送到服务器。客户端使用此技术在实际发送请求体之前，根据请求标头检查服务器是否可以处理该请求。通常，当请求体很大，并且你不想在发送大量请求体后才发现请求无法完成时，会执行此操作。


  默认情况下不设置 `Expect` 标头。你需要调用请求构建器的 `expectContinue(true)` 方法来启用此功能。以下代码片段向你展示了如何使用它：


  ```

  // 在请求中启用 Expect=100-Continue 标头

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/post"))

  .header("Content-Type", "application/x-www-form-urlencoded")

  .POST(BodyPublishers.ofString("name=Kishori"))

  .expectContinue(true)

  .build();

  ```


  当你发送此请求时，客户端和服务器之间内部将进行两次交换。第一次请求不会发送请求体。在响应中收到 HTTP 100 状态码后，请求体将作为第二次交换的一部分发送。但是，你只会看到一个响应。


  调用请求构建器的 `header("Expect", "100-Continue")` 方法不会启用此功能。你必须使用 `expectContinue(true)`
  方法来启用它。


  ### 设置请求标头


  HTTP 请求中的标头是一个名称-值对。一个请求中可以有多个标头。你可以使用 `HttpRequest.Builder` 类的 `header()`、`headers()`
  和 `setHeader()` 方法向请求添加标头。如果标头尚不存在，`header()` 和 `headers()` 方法会添加标头。如果标头已添加，这些方法不执行任何操作。`setHeader()`
  方法会替换已存在的标头；否则，它会添加一个新标头。


  `header()` 和 `setHeader()` 方法允许你一次添加/设置一个标头，而 `headers()` 方法允许你添加多个标头。`headers()`
  方法接受一个可变参数，该参数应按顺序包含名称-值对。以下代码片段展示了如何使用这三种方法为请求设置标头。所有三个请求都包含相同的标头。


  ```

  // 使用 header() 方法

  HttpRequest request1 = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/post"))

  .header("Content-Type", "application/x-www-form-urlencoded")

  .header("Accept", "text/plain")

  .POST(BodyPublishers.ofString("name=Kishori"))

  .build();

  // 使用 headers() 方法

  HttpRequest request2 = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/post"))

  .headers("Content-Type", "application/x-www-form-urlencoded",

  "Accept", "text/plain")

  .POST(BodyPublishers.ofString("name=Kishori"))

  .build();

  // 使用 setHeader() 方法

  HttpRequest request3 = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/post"))

  .setHeader("Content-Type", "application/x-www-form-urlencoded")

  .setHeader("Accept", "text/plain")

  .POST(BodyPublishers.ofString("name=Kishori"))

  .build();

  ```


  ### 创建 HTTP 请求


  在前面的章节中，你学习了如何创建 `HttpRequest.Builder` 以及如何使用它来设置 HTTP 请求的不同属性。创建 `HttpRequest`
  只需在 `HttpRequest.Builder` 上调用 `build()` 方法。以下代码片段创建了一个使用 HTTP GET 方法的 `HttpRequest`：


  ```

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/ip"))

  .GET()

  .build();

  ```


  请注意，创建 `HttpRequest` 对象并不会将请求发送到服务器。你需要调用 `HttpClient` 的 `send()` 或 `sendAsync()`
  方法将请求发送到服务器。我将在下一节中解释如何向服务器发送请求。


  ## 处理 HTTP 响应


  一旦你有了 `HttpRequest`，就可以将请求发送到服务器并同步或异步接收响应。`HttpResponse<T>` 接口的实例表示从服务器接收到的响应，其中类型参数
  `T` 指示响应体的类型，例如 `String`、`byte[]` 或 `Path`。你可以使用 `HttpClient` 类的以下方法之一来发送 HTTP 请求并接收
  HTTP 响应：


  *   `<T> HttpResponse<T> send`​`(HttpRequest request, HttpResponse.BodyHandler<T>
  responseBodyHandler) throws IOException, InterruptedException`


  *   `<T> CompletableFuture<HttpResponse<T>> sendAsync`​`(HttpRequest request, HttpResponse.BodyHandler<T>
  responseBodyHandler)`


  *   `<T> CompletableFuture<HttpResponse<T>> sendAsync`​`(HttpRequest request, HttpResponse.BodyHandler<T>
  responseBodyHandler, HttpResponse.PushPromiseHandler<T> pushPromiseHandler)`


  `send()` 方法是同步的。也就是说，它会阻塞直到完全接收到响应。`sendAsync()` 方法异步处理响应。它会立即返回一个 `CompletableFuture<HttpResponse<T>>`，当响应准备好被处理时，该对象完成。你将在后续章节中看到这两种类型的示例。




  ### 处理响应状态码和标头


  `HttpResponse` 包含状态码、标头和响应体。有时，在从服务器接收到状态码和标头后，但在接收到响应体之前，`HttpResponse` 就已经可用。响应在其主体完全可用之前的可用性取决于您提供的响应体处理器。例如，如果您提供一个
  `String` 响应体处理器，则 `HttpResponse` 会在整个响应体被接收并转换为 `String` 后可用。如果您提供一个将响应体作为行流处理的响应体处理器，则
  `HttpResponse` 将在接收到状态码和标头后可用。


  `HttpResponse` 接口的 `statusCode()` 方法以 `int` 形式返回响应的状态码。


  `HttpResponse` 接口的 `headers()` 方法以 `HttpHeaders` 类的实例形式返回响应的标头。`HttpHeaders` 类包含以下方法，可以方便地按名称检索标头值，或将所有标头作为
  `Map<String,List<String>>` 检索：


  *   `List<String> allValues`​`(String name)`


  *   `Optional<String> firstValue`​`(String name)`


  *   `OptionalLong firstValueAsLong`​`(String name)`


  *   `Map<String,`​`List<String>> map()`


  清单 3-3 包含一个完整的程序，用于向 URL [`http://httpbin.org`](http://httpbin.org) 发送 `HEAD` 请求。它会打印接收到的响应的状态码和标头。您可能会得到不同的输出。


  ```

  // PrintHeaders.java

  package com.jdojo.http.client;

  import java.io.IOException;

  import java.net.URI;

  import java.net.http.HttpClient;

  import java.net.http.HttpRequest;

  import java.net.http.HttpRequest.BodyPublishers;

  import java.net.http.HttpResponse;

  import java.net.http.HttpResponse.BodyHandlers;

  public class PrintHeaders {

  public static void main(String[] args) {

  // 使用默认配置创建一个 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org"))

  .method("HEAD", BodyPublishers.noBody())

  .build();

  try {

  // 向服务器发送请求

  HttpResponse response

  = client.send(request, BodyHandlers.discarding());

  // 打印响应状态码和标头

  System.out.println("Status Code:" + response.statusCode());

  System.out.println("Response Headers:");

  response.headers()

  .map()

  .entrySet()

  .forEach(System.out::println);

  } catch (IOException | InterruptedException e) {

  e.printStackTrace();

  }

  }

  }

  Status Code:200

  Response Headers:

  access-control-allow-credentials=[true]

  access-control-allow-origin=[*]

  connection=[keep-alive]

  content-length=[9593]

  content-type=[text/html; charset=utf-8]

  date=[Tue, 23 Jul 2019 18:01:12 GMT]

  referrer-policy=[no-referrer-when-downgrade]

  server=[nginx]

  x-content-type-options=[nosniff]

  x-frame-options=[DENY]

  x-xss-protection=[1; mode=block]

  清单 3-3

  处理 HTTP 响应的状态码和标头

  ```


  让我们看看请求和响应中的重要部分。创建 `HttpRequest` 的语句是：


  ```

  // 创建一个 HttpRequest

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org"))

  .method("HEAD", BodyPublishers.noBody())

  .build();

  ```


  注意使用了 HEAD HTTP 方法和 `method()` 方法。您只对接收响应中的标头感兴趣，因此使用了 HEAD 作为 HTTP 方法。您没有发送任何请求体，因此使用了
  `BodyPublishers.noBody()` 指示的不发布任何主体的发布器。


  以下语句将请求发送到服务器：


  ```

  HttpResponse response

  = client.send(request, BodyHandlers.discarding());

  ```


  这里，您为响应体使用了从 `BodyHandlers.discarding()` 返回的响应体处理器。此响应体处理器简单地丢弃响应体，您可以在 `HttpResponse<Void>`
  中 `send()` 方法返回值的类型参数 `Void` 中看到这一点。`response` 对象的 `body()` 方法的返回类型是 `Void`，调用 `response.body()`
  将返回 `null`。


  ### 处理响应体


  处理 HTTP 响应的主体是一个两步过程：


  *   当您使用 `HttpClient` 类的 `send()` 或 `sendAsync()` 方法发送请求时，您需要指定一个响应体处理器，它是 `HttpResponse.BodyHandler<T>`
  接口的一个实例。


  *   当接收到响应状态码和标头时，会调用响应体处理器的 `apply(HttpResponse.ResponseInfo responseInfo)` 方法。`ResponseInfo`
  包含响应状态码、标头和 HTTP 协议版本。`apply()` 方法返回一个 `HttpResponse.BodySubscriber<T>` 接口的实例，该实例读取响应体并将读取的数据转换为类型
  `T`。`HttpResponse.BodySubscriber<T>` 接口扩展了 `Flow.Subscriber<List<ByteBuffer>>`，这意味着主体订阅者是
  Flow API 中的一个订阅者，其工作是消费响应体并将其作为高级 Java 对象提供给您。


  不必担心处理响应体的这些细节。`HttpResponse.BodyHandler<T>` 提供了多种实现。您可以使用 `HttpResponse.BodyHandlers`
  类的以下 `static` 工厂方法之一，为不同的类型参数 `T` 获取其实例：


  *   `<T> HttpResponse.BodyHandler<T> buffering`​`(HttpResponse.BodyHandler<T> downstreamHandler,
  int bufferSize)`


  *   `HttpResponse.BodyHandler<Void> discarding()`


  *   `HttpResponse.BodyHandler<byte[]> ofByteArray()`


  *   `HttpResponse.BodyHandler<Void> ofByteArrayConsumer`​`(Consumer<Optional<byte[]>>
  consumer`


  *   `HttpResponse.BodyHandler<Path> ofFile`​`(Path file)`


  *   `HttpResponse.BodyHandler<Path> ofFile`​`(Path file, OpenOption... openOptions)`


  *   `HttpResponse.BodyHandler<Path> ofFileDownload`​`(Path directory, OpenOption...
  openOptions)`


  *   `HttpResponse.BodyHandler<InputStream> ofInputStream()`


  *   `HttpResponse.BodyHandler<Stream<String>> ofLines()`


  *   `HttpResponse.BodyHandler<Flow.Publisher<List<ByteBuffer>>> ofPublisher()`


  *   `HttpResponse.BodyHandler<String> ofString()`


  *   `HttpResponse.BodyHandler<String> ofString`​`(Charset charset)`


  *   `<U> HttpResponse.BodyHandler<U> replacing`​`(U value)`


  这些方法的签名足够直观，可以告诉您它们处理哪种类型的响应体。例如，如果您想将响应体作为 `String` 获取，请使用 `ofString()` 方法来获取主体处理器。`discarding()`
  方法返回一个主体处理器，它将丢弃响应体。`replacing(U value)` 方法返回一个主体处理器，它丢弃原始响应体并返回指定的 `value` 作为主体。`ofLines()`
  方法返回一个主体处理器，它将响应体作为行流返回。`ofFile()` 方法返回一个主体处理器，它将响应体保存到由指定 `Path` 表示的指定文件中。


  `HttpResponse<T>` 接口的 `body()` 方法返回类型为 `T` 的响应体。


  ### 提示


  `HttpResponse.BodyHandlers` 类包含 `fromSubscriber()` 和 `fromLineSubscriber()` 方法。它们充当
  `Flow.Subscriber<T>` 和 `HttpResponse.BodyHandler<T>` 之间的适配器。它们允许您将 `Flow.Subscriber<T>`
  转换为 `HttpResponse.BodyHandler<T>`。


  您已经看到了将响应体作为 `String` 处理的示例。


  后续章节将探讨处理响应体的更多选项，例如将响应体保存到文件、将其作为附件下载到文件。目前，没有内置的主体处理器可以将响应体作为 JSON 对象处理。您需要使用
  Java 库，例如 Jackson JSON Parser，来处理 JSON 响应体。我们的几个示例返回 JSON 响应体。我只是将它们作为 `String`
  处理。




  #### 将响应体保存到文件


  在本节中，我将演示如何将响应体保存到文件中。你将使用 [`http://httpbin.org/image/jpeg`](http://httpbin.org/image/jpeg)
  这个地址，它会返回一个内容类型为 `image/jpeg` 的图片。假设你想将图片内容（位于响应体中）保存到当前目录下名为 `myimage.jpeg` 的文件中。你可以通过使用
  `HttpResponse.BodyHandlers` 类的 `ofFile()` 方法返回的处理器来实现。响应体将是一个指向已保存文件的 `Path` 对象。以下代码片段展示了这部分逻辑：


  ```

  // 创建一个 Path 对象，用于将图片保存到当前目录下名为 myimage.jpeg 的文件中

  Path filePath = Paths.get("myimage.jpeg");

  // 向服务器发送请求

  HttpResponse response

  = client.send(request, BodyHandlers.ofFile(filePath));

  // 获取响应状态码和响应体。此处，响应体是保存了响应内容的文件路径

  int statusCode = response.statusCode();

  Path savedFilePath = response.body();

  ```


  清单 3-4 包含了一个完整的程序，用于将响应体保存到文件中。你可能会得到不同的输出，因为它会打印已保存文件的路径，而该路径取决于当前目录。


  ```

  // SaveInFile.java

  package com.jdojo.http.client;

  import java.io.IOException;

  import java.net.URI;

  import java.net.http.HttpClient;

  import java.net.http.HttpRequest;

  import java.net.http.HttpResponse;

  import java.net.http.HttpResponse.BodyHandlers;

  import java.nio.file.Path;

  import java.nio.file.Paths;

  public class SaveInFile {

  public static void main(String[] args) {

  // 使用默认配置创建 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  // 使用 GET HTTP 方法

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("http://httpbin.org/image/jpeg"))

  .build();

  try {

  // 创建一个 Path 对象，用于将图片保存到当前目录下名为 myimage.jpeg 的文件中

  Path filePath = Paths.get("myimage.jpeg");

  // 向服务器发送请求

  HttpResponse response

  = client.send(request, BodyHandlers.ofFile(filePath));

  // 获取响应状态码和响应体

  int statusCode = response.statusCode();

  Path savedFilePath = response.body();

  // 打印响应状态码和响应体

  System.out.println("响应状态码: " + statusCode);

  System.out.println("响应体已保存至 "

  + savedFilePath.toAbsolutePath());

  } catch (IOException | InterruptedException e) {

  e.printStackTrace();

  }

  }

  }

  响应状态码: 200

  响应体已保存至 C:\Java13Revealed\myimage.jpeg

