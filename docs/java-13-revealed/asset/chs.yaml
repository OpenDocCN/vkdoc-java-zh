  401 状态码和`WWW-Authenticate`头进行响应。


  你也可以使用 HTTP 客户端 API 进行 Bearer HTTP 认证。如果你收到一个 401 状态码和包含`Bearer`值的`WWW-Authenticate`头，你可以简单地重新发送一个带有承载令牌的`Authorization`头的请求。以下代码片段创建了一个带有`my-secret-token`承载令牌的请求：


  ```

  // 在 Authorization 头中准备一个带有承载令牌的请求

  HttpRequest request = HttpRequest.newBuilder()

  .uri(URI.create("https://httpbin.org/bearer"))

  .header("Authorization", "Bearer my-secret-token")

  .build();

  ```


  你可以编写一个程序将此请求发送到服务器并打印响应详细信息，作为练习。


  ## 使用 WebSocket


  WebSocket 协议在两个端点（一个客户端端点和一个服务器端点）之间提供双向通信。术语*端点*指代使用 WebSocket 协议的连接中的任意一方。客户端端点发起连接，服务器端点接受连接。该连接是双向的，这意味着服务器端点可以自行向客户端端点推送消息。在此上下文中，你还会遇到另一个术语，称为*对端*。对端就是连接的另一端。例如，对于客户端端点，服务器端点是对端；对于服务器端点，客户端端点是对端。WebSocket*会话*表示一个端点与单个对端之间的一系列交互。


  WebSocket 协议可以分为三个部分：


  *   打开握手


  *   数据交换


  *   关闭握手


  客户端向服务器发起打开握手。握手过程使用 HTTP 协议，并附带一个升级到 WebSocket 协议的请求。服务器以升级响应来回应打开握手。一旦握手成功，客户端和服务器便开始交换消息。消息交换可以由客户端或服务器中的任一方发起。最后，任一端点都可以发送关闭握手；对端以关闭握手作为响应。一旦关闭握手成功，WebSocket
  即被关闭。


  HTTP 客户端 API 支持创建 WebSocket 客户端端点。要有一个使用 WebSocket 协议的完整示例，你需要同时拥有服务器端点和客户端端点。以下章节将解释如何创建客户端端点以与服务器端点交互的
  WebSocket 细节。你将使用一个已构建好的服务器端点，该端点可在网上获取，如下一节所述。


  ### WebSocket 服务器端点


  HTTP 客户端 API 提供对创建 WebSocket 客户端的支持，但不支持创建服务器。如何创建 WebSocket 服务器端点超出了本书的范围。我将在示例中使用一个免费可用的服务器端点。我将使用的
  WebSocket 服务器端点是`ws://demos.kaazing.com/echo`。有关此端点的更多详细信息，请访问[`www.websocket.org/echo.html`](http://www.websocket.org/echo.html)。你也可以使用此网页测试该端点。此端点充当回显服务器。当你发送一条消息时，它会将消息回显给你。




  ### 创建客户端端点


  开发 WebSocket 客户端端点涉及使用 `HttpClient` 类和 `WebSocket` 接口，它们都属于 HTTP 客户端 API。`WebSocket`
  接口包含以下两个嵌套的 `static` 接口：


  *   `WebSocket.Builder`


  *   `WebSocket.Listener`


  `WebSocket` 接口的实例代表一个 WebSocket 客户端端点。构建器（`WebSocket.Builder` 接口的实例）用于创建 `WebSocket`
  实例。`HttpClient` 类的 `newWebSocketBuilder()` 方法返回一个 `WebSocket.Builder`。


  当客户端端点发生事件时，例如，打开握手完成、消息到达、关闭握手等，通知会被发送到监听器（`WebSocket.Listener` 接口的实例）。该接口为每种通知类型都包含一个
  `default` 方法。你需要创建一个实现此接口的类，并仅为那些你感兴趣接收通知的事件对应的方法提供实现。在创建 `WebSocket` 实例时，你需要指定一个监听器。


  当你向对等端发送关闭消息时，可以指定一个关闭状态码。`WebSocket` 接口包含一个 `int` 类型的 `NORMAL_CLOSURE` 常量。它代表 WebSocket
  `Close` 消息的状态码 (1000)，表示连接已正常关闭。这意味着建立连接的目的已经达成。


  回顾一下，WebSocket 提供了客户端和服务器之间的双向通信。该 API 提供了两种类型的方法——一种用于向服务器发送消息，另一种用于从服务器接收消息。你可以使用
  `WebSocket` 实例的 `sendXxx()` 方法向服务器发送消息。当从服务器接收到消息时，会调用 `WebSocket.Listener` 实例的某个
  `onXxx()` 方法。以下各节将详细描述设置客户端端点的所有步骤。


  #### 创建监听器


  监听器是 `WebSocket.Listener` 接口的一个实例。创建监听器涉及创建一个实现此接口的类。该接口中的所有方法都是 `default` 方法。监听器的所有方法都会传入与之关联的
  `WebSocket` 的引用。你可以将监听器中的方法分为以下两类：


  *   连接打开和错误报告方法


  *   消息接收方法


  以下两个方法属于第一类：


  *   `void onOpen`​`(WebSocket webSocket)`


  *   `void onError`​`(WebSocket, Throwable error)`


  当 WebSocket 连接建立时，会调用其监听器的 `onOpen()` 方法。这是监听器中被调用的第一个方法，且仅被调用一次。通常，你会打印一条连接已建立的信息性消息，并请求接收更多消息。该方法的默认实现会请求再接收一条消息。使用
  `WebSocket` 接口的 `request(long n)` 方法来请求消息。


  ```

  // 允许再接收一条消息

  webSocket.request(1);

  ```


  请注意，消息可以分部分接收。对 `WebSocket` 调用 `request(n)` 意味着接收消息的方法可以被调用 `n` 次。假设一条文本消息分三部分传递。调用
  `request(1)` 将只允许调用 `onText()` 方法一次。通常，你会在 `onOpen()` 方法中以及当你接收到消息时（例如在 `onBinary()`
  和 `onText()` 方法中）调用 `request(1)`。


  ### 提示


  如果服务器发送的消息数量超过请求的数量，消息会在 TCP 连接上排队，并可能最终通过 TCP 流量控制强制发送方停止发送更多消息。在适当的时间使用适当的参数值调用
  `request(long n)` 方法非常重要，这样你的监听器才能持续接收来自服务器的消息。一个常见的错误是在监听器中重写 `onOpen()` 方法，却没有调用
  `webSocket.request(1)` 方法，这会阻止你接收来自服务器的消息。


  当发生错误时，会调用 `onError()` 方法。在调用 `onError()` 方法之后，监听器上的其他方法都不会再被调用。第二个 `error` 参数包含错误详情。如果此方法抛出异常，其行为是未定义的。


  以下方法属于第二类——消息接收方法。当从服务器接收到特定类型的消息时，会调用这些方法：


  *   `CompletionStage<?> onBinary`​`(WebSocket webSocket, ByteBuffer data, boolean
  last)`


  *   `CompletionStage<?> onText`​`(WebSocket webSocket, CharSequence data, boolean
  last)`


  *   `CompletionStage<?> onPing`​`(WebSocket webSocket, ByteBuffer message)`


  *   `CompletionStage<?> onPong`​`(WebSocket webSocket, ByteBuffer message)`


  *   `CompletionStage<?> onClose`​`(WebSocket webSocket, int statusCode, String reason)`


  当端点从对等端接收到关闭消息时，会调用 `onClose()` 方法。这是对监听器的最后一次通知。从此方法抛出的异常会被忽略。默认实现不执行任何操作。通常，你需要向对等端发送一条关闭消息以完成关闭握手。


  当此端点从对等端接收到 `Ping` 消息时，会调用 `onPing()` 方法。客户端和服务器端点都可以发送 `Ping` 消息。`WebSocket` 接口的默认实现会向对等端发送一条
  `Pong` 消息作为对 `Ping` 消息的响应，且内容相同。因此，当你创建监听器时，通常不需要为 `onPing()` 方法提供实现。


  当端点从对等端接收到 `Pong` 消息时，会调用 `onPong()` 方法。`Pong` 消息通常作为对先前发送的 `Ping` 消息的响应而接收。端点也可能接收到未经请求的
  `Pong` 消息。`onPong()` 方法的默认实现会在监听器上再请求一条消息，并且不执行其他操作。


  当从对等端分别接收到二进制消息和文本消息时，会调用 `onBinary()` 和 `onText()` 方法。二进制和文本消息可以分部分发送。这些方法的第三个
  `boolean` 参数指示它是否是消息的最后一部分。值为 `false` 表示它不是最后一部分，稍后将接收到消息的更多部分。值为 `true` 表示它是消息的最后一部分。在这些方法内部，当最后一个参数为
  `false` 时，你累积消息部分；当所有部分都接收到（由 `last` 参数的 `true` 值指示）时，处理消息。


  请注意，当接收到消息时调用的方法会返回一个 `CompletionStage<?>`。返回的 `CompletionStage` 的完成向 `WebSocket`
  指示消息已被处理，并且它可以回收用于传递消息的资源。从这些方法返回 `null` 表示消息处理已完成。


  让我们构建一个 WebSocket 监听器，你将在后续章节中使用它来创建一个 `WebSocket`。清单 3-14 包含了我们 `WebSocket` 监听器的完整代码。其组件的描述紧随代码之后。




  ```

  // WebSocketEchoListener.java

  package com.jdojo.http.client;

  import java.net.http.WebSocket;

  import java.nio.ByteBuffer;

  import java.util.ArrayList;

  import java.util.List;

  import java.util.concurrent.CompletableFuture;

  import java.util.concurrent.CompletionStage;

  import static java.util.stream.Collectors.joining;

  public final class WebSocketEchoListener implements WebSocket.Listener {

  // 部分文本消息将累积在此列表中

  private final List textMessages = new ArrayList();

  // 当发生错误或 WebSocket 关闭时，此 CompletableFuture 将完成。参见 onError() 和 onClose() 方法。

  CompletableFuture closeStatus = new CompletableFuture();

  @Override

  public void onOpen(WebSocket webSocket) {

  System.out.println("已连接...");

  // 请求接收下一条消息

  webSocket.request(1);

  }

  @Override

  public CompletionStage onText(WebSocket webSocket,

  CharSequence data, boolean last) {

  // 请求接收下一条消息

  webSocket.request(1);

  // 累积消息

  textMessages.add(data.toString());

  if (last) {

  // 收到消息的最后一部分。让我们打印它。

  String wholeMessage = textMessages.stream()

  .collect(joining(""));

  System.out.println("收到: " + wholeMessage);

  // 清空累积的消息，以便将来累积接收到的部分消息

  textMessages.clear();

  }

  // 返回 null 表示消息处理完成

  return null;

  }

  @Override

  public CompletionStage onPong (WebSocket webSocket,

  ByteBuffer message) {

  // 请求接收下一条消息

  webSocket.request(1);

  // 解码消息并打印

  String data = new String(message.array());

  System.out.println("收到一个 Pong: " + data);

  // 返回 null 表示消息处理完成

  return null;

  }

  @Override

  public void onError(WebSocket webSocket, Throwable error) {

  // 异常地完成 CompletableFuture，以指示 WebSocket 连接因错误而关闭

  closeStatus.completeExceptionally(error);

  }

  @Override

  public CompletionStage onClose(WebSocket webSocket,

  int statusCode, String reason) {

  // 准备关闭描述

  String closeDescription = "以状态码 " + statusCode

  + " 关闭，原因: " + reason;

  // 正常完成 CompletableFuture，以指示 WebSocket 连接已关闭。

  closeStatus.complete(closeDescription);

  return null;

  }

  public CompletableFuture closeStatus() {

  return this.closeStatus;

  }

  }

  清单 3-14

  WebSocket.Listener 接口的一个实现

  ```


  我们的监听器监听文本消息，这些消息可以分部分接收。`textMessages` 实例变量用于累积部分消息。它在 `onText()` 方法内部使用。当 `onText()`
  方法接收到消息的最后一部分时，它会将 `textMessages` 实例变量中的所有部分消息拼接起来，打印出来，并清空列表，以便将来累积新消息的部分内容。


  该监听器声明了另一个名为 `closeStatus` 的实例变量：


  ```

  CompletableFuture closeStatus = new CompletableFuture();

  ```


  当我创建一个 `WebSocket` 客户端程序时，我希望知道这个监听器何时收到最后一条消息。当监听器的 `onError()` 或 `onClose()` 方法被调用时，即表示收到了最后一条消息。`onError()`
  和 `onClose()` 方法分别异常地或正常地完成 `closeStatus CompletableFuture`。`closeStatus()` 方法简单地返回这个
  `CompletableFuture`。其预期用途是在客户端程序中等待 `WebSocket` 关闭：


  ```

  // 为我们的 WebSocket 创建一个监听器

  WebSocketEchoListener listener = new WebSocketEchoListener();

  /* 使用此监听器创建一个 WebSocket，并在此处与服务器交换消息

  */

  // 等待 WebSocket 关闭

  listener.closeStatus()

  .thenAccept(System.out::println)

  .exceptionally(e -> {

  e.printStackTrace();

  return null;

  })

  .join();

  ```


  `onOpen()` 方法打印一条信息性消息并请求接收下一条消息。请注意，如果移除对 `webSocket.request(1)` 方法的调用，你将完全无法接收任何消息。


  `onText()` 方法请求接收下一条消息并累积该消息。如果这是消息的最后一部分，它会将完整消息打印到标准输出，并清空 `textMessages` 实例变量，该变量将在将来
  `onText()` 方法被调用时用于累积下一条文本消息。它返回 `null` 以表示消息处理完成。


  `onPong()` 方法请求接收下一条消息，打印该消息，并返回 `null` 以表示消息处理完成。


  `onError()` 方法异常地完成 `closeStatus CompletableFuture`。


  `onClose()` 方法正常地完成 `closeStatus CompletableFuture`，并附带一个包含状态码和关闭连接原因的描述。状态码 1000
  表示正常关闭。


  #### 构建客户端端点


  你需要构建一个充当客户端端点的 `WebSocket` 接口实例。该实例用于连接服务器端点并与之交换消息。`WebSocket` 实例是使用 `WebSocket.Builder`
  构建的。你需要使用 `HttpClient` 类的 `newWebSocketBuilder()` 方法来获取一个构建器。


  一旦你有了构建器，就可以调用 `WebSocket.Builder` 的以下方法来配置和构建 `WebSocket`：


  *   `WebSocket.Builder connectTimeout`​`(Duration timeout)`


  *   `WebSocket.Builder header`​`(String name, String value)`


  *   `WebSocket.Builder subprotocols`​`(String mostPreferred, String... lesserPreferred)`


  *   `CompletableFuture<WebSocket> buildAsync`​`(URI uri, WebSocket.Listener listener)`


  `connectTimeout()` 方法允许你为打开握手指定超时时间。如果在指定时间内打开握手未完成，则 `WebSocket.Builder` 的 `buildAsync()`
  方法返回的 `CompletableFuture` 将异常完成，并抛出 `HttpTimeoutException`。


  你可以使用 `header()` 方法为打开握手添加任何自定义头。


  你可以使用 `subprotocols()` 方法在打开握手期间请求给定的子协议——服务器将只选择其中一个。子协议由应用程序定义。客户端和服务器需要就特定的子协议及其细节达成一致。


  最后，调用 `WebSocket.Builder` 接口的 `buildAsync()` 方法来构建端点。第一个参数是服务器端点的 URI。第二个参数是一个 WebSocket
  监听器。它返回一个 `CompletableFuture<WebSocket>`，当此端点连接到服务器端点时正常完成；当发生错误时异常完成。


  以下代码片段展示了如何构建和连接客户端端点。请注意，服务器的 URI 以 `ws` 开头，这表示 WebSocket 协议。


  ```

  // 使用默认配置创建一个 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  // 为我们的 WebSocket 创建一个监听器

  WebSocketEchoListener listener = new WebSocketEchoListener();

  // 创建一个 WebSocket

  WebSocket webSocket = client.newWebSocketBuilder()

  .buildAsync(URI.create("ws://demos.kaazing.com/echo"), listener)

  .join();

  ```




  #### 向对等端发送消息


  一旦客户端端点连接到对等端，双方即可交换消息。`WebSocket` 接口的实例代表一个客户端端点，该接口包含以下用于向对等端发送消息的方法：


  *   `CompletableFuture<WebSocket> sendBinary`​`(ByteBuffer data, boolean last)`


  *   `CompletableFuture<WebSocket> sendText`​`(CharSequence data, boolean last)`


  *   `CompletableFuture<WebSocket> sendPing`​`(ByteBuffer message)`


  *   `CompletableFuture<WebSocket> sendPong`​`(ByteBuffer message)`


  *   `CompletableFuture<WebSocket> sendClose`​`(int statusCode, String reason)`


  `sendText()` 方法用于向对等端发送文本消息。如果第二个参数为 `false`，则表示这是一条部分消息的一部分。如果第二个参数为 `true`，则表示部分消息的最后一部分。如果之前没有发送过部分消息，则第二个参数为
  `true` 表示这是一条完整消息。


  `sendBinary()` 方法向对等端发送二进制消息。


  `sendPing()` 和 `sendPong()` 方法分别向对等端发送 `Ping` 和 `Pong` 消息。


  `sendClose()` 方法向对等端发送 `Close` 消息。你可以发送 `Close` 消息作为对等端发起的关闭握手的一部分，也可以发送它来发起与对等端的关闭握手。


  ### 提示


  如果你想突然关闭 WebSocket，请使用 `WebSocket` 接口的 `abort()` 方法。


  ### 运行 WebSocket 程序


  现在是时候看看 WebSocket 客户端和服务器交换消息了。清单 3-15 包含一个完整的程序。它创建一个 WebSocket，与位于 `ws://demos.kaazing.com/echo`
  的服务器发送/接收消息，然后关闭 WebSocket。输出显示了交互过程。该程序包含大量注释来解释逻辑。


  ```

  // WebSocketClient.java

  package com.jdojo.http.client;

  import static java.lang.System.out;

  import java.net.URI;

  import java.net.http.HttpClient;

  import java.net.http.WebSocket;

  import static java.net.http.WebSocket.NORMAL_CLOSURE;

  import java.nio.ByteBuffer;

  public class WebSocketClient {

  public static void main(String[] args) throws InterruptedException {

  // 使用默认配置创建 HttpClient

  HttpClient client = HttpClient.newHttpClient();

  // 为我们的 WebSocket 创建一个监听器

  WebSocketEchoListener listener = new WebSocketEchoListener();

  // 创建一个 WebSocket

  WebSocket webSocket = client.newWebSocketBuilder()

  .buildAsync(URI.create("ws://demos.kaazing.com/echo"),

  listener)

  .join();

  // 向服务器发送一条消息。sendText() 中的第二个参数为 true

  // 表示该消息是完整的。

  String helloMessage = "Hello, there.";

  webSocket.sendText(helloMessage, true)

  .thenRun(() -> out.println("Sent: " + helloMessage))

  .join();

  // 向服务器发送一条 Ping 消息

  String pingMessage = "Just checking...";

  webSocket.sendPing(ByteBuffer.wrap(pingMessage.getBytes()))

  .thenRun(() -> out.println("Sent Ping: " + pingMessage))

  .join();

  // 向服务器发送一条 Close 消息。在此之后，你无法再

  // 向服务器发送任何消息。服务器会向你发送一条 Close 消息作为回应。

  webSocket.sendClose(NORMAL_CLOSURE, "Done")

  .thenRun(() -> out.println("Sent Close"))

  .join();

  // 等待 WebSocket 监听器关闭。回想一下，当监听器的

  // onClose() 或 onError() 方法被调用时，closeStatus()

  // 方法返回的 CompletableFuture 就会完成。

  listener.closeStatus()

  .thenAccept(System.out::println)

  .exceptionally(e -> {

  e.printStackTrace();

  return null;

  })

  .join();

  }

  }

  Connected...

  Sent: Hello, there.

  Sent Ping: Just checking...

  Sent Close

  Received: Hello, there.

  Received a Pong: Just checking...

  Closed with status 1000 and reason: Done

  清单 3-15

  演示 WebSocket 客户端/服务器交互的程序

  ```


  清单 3-15 中的程序使用以下代码片段向服务器发送了一条文本消息：


  ```

  // 向服务器发送一条消息。sendText() 中的第二个参数为 true

  // 表示该消息是完整的。

  String helloMessage = "Hello, there.";

  webSocket.sendText(helloMessage, true)

  .thenRun(() -> out.println("Sent: " + helloMessage))

  .join();

  ```


  我希望你修改代码，将 `false` 作为第二个参数传递给 `sendText()` 方法。修改后的代码看起来像这样：


  ```

  String helloMessage = "Hello, there.";

  webSocket.sendText(helloMessage, false)

  .thenRun(() -> out.println("Sent: " + helloMessage))

  .join();

  ```


  现在再次运行清单 3-15 中的程序。你观察到了什么？你应该会发现问候消息已发送到服务器，但你看不到任何关于收到相同消息回显的输出。你的输出应该看起来像这样：


  ```

  Connected...

  Sent: Hello, there.

  Sent Ping: Just checking...

  Sent Close

  Received a Pong: Just checking...

  Closed with status 1000 and reason: Done

  ```


  我们的服务器是一个回显服务器。无论你向服务器发送什么，你都会收到相同的消息回显。`sendText()` 方法的第二个参数为 `false` 意味着这是一条部分消息。因此，服务器也以部分消息的形式将此消息发送回来。我们的
  WebSocket 监听器的 `onText()` 方法被调用时，第三个参数被设置为 `false`。回想一下，我们的 `onText()` 方法（参考清单 3-14）仅在第三个参数设置为
  `true`（表示这是消息的最后一部分）时才打印消息。问候消息被监听器接收到了，但从未被打印出来，因为它被标记为部分消息。除非你向服务器发送另一条文本消息并将其标记为消息的最后一部分，否则你不会在输出中看到问候消息。你可以通过从监听器的
  `onText()` 方法打印一条消息来验证消息已被接收。你可以通过在发送问候消息作为部分消息后添加以下语句来解决此问题：


  ```

  // 发送一个空字符串，将其标记为消息的最后一部分

  webSocket.sendText("", true)

  .join();

  ```


  或者，你可以分两部分发送问候消息——第一部分是部分消息，第二部分是最终消息，如下所示：


  ```

  webSocket.sendText("Hello, ", false)

  .join();

  webSocket.sendText("there.", true)

  .thenRun(() -> out.println("Sent: Hello, there."))

  .join();

  ```




  ## 摘要


  Java 11 将 HTTP 客户端 API 作为标准特性引入，使您能够在 Java 应用程序中处理 HTTP 请求和响应。该 API 提供了用于开发带身份验证的
  WebSocket 客户端端点的类和接口。该 API 位于 `java.net.http` 包中，该包属于 `java.net.http` 模块。


  `HttpClient` 和 `HttpRequest` 类以及 `HttpResponse<T>` 和 `WebSocket` 接口是 HTTP 客户端 API
  的核心。这些类型的实例通过构建器创建。`HttpClient` 类是不可变的。`HttpClient` 类的实例存储可重用于多个 HTTP 请求的 HTTP 连接配置。`HttpRequest`
  类的实例表示一个 HTTP 请求。`HttpResponse` 接口的实例表示从服务器接收到的 HTTP 响应。您可以同步或异步地发送和接收 HTTP 请求和响应。


  `WebSocket` 接口的实例表示一个 WebSocket 客户端端点。与 WebSocket 服务器端点的通信是异步完成的。WebSocket API 是基于事件的。您需要为
  WebSocket 客户端端点指定一个监听器，该监听器是 `WebSocket.Listener` 静态接口的实例。当端点上发生事件时，监听器会通过调用其相应方法得到通知，例如，当与对等方的打开握手成功完成时，会通过调用监听器的
  `onOpen()` 方法来通知监听器。该 API 支持与对等方交换文本和二进制消息。消息可以分部分交换。


