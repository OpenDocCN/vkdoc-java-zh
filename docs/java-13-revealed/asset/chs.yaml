- "# 5. 增强的 Switch\n\n在本章中，你将学习\n\n*   什么是预览特性\n\n*   什么是 `switch` 语句和 `switch` 表达式\n\
  \n*   对传统 `switch` 的增强\n\n*   关于 `switch` 的新语法\n\n*   关于使用新 `switch` 的规则\n\n*  \
  \ 关于 `yield` 语句\n\n\n\n## 什么是预览特性？\n\nJava SE 平台的预览特性是一种完全规范且完整实现的语言或虚拟机特性，它在某个\
  \ JDK 功能版本中可用，但尚未成为 JDK 的永久特性。提供预览特性是为了征求开发者的反馈。开发者应在真实用例中尝试这些特性。根据反馈，预览特性可能会在未来的版本中成为永久特性（标准特性），可能经过修改也可能保持不变，或者可能被完全移除。预览特性不应用于生产环境。有关预览特性的更多详细信息，请参阅\
  \ [`https://openjdk.java.net/jeps/12`](https://openjdk.java.net/jeps/12) 上的 JEP\
  \ 12。\n\n预览特性不向后兼容。你无法使用 Java 13 运行时运行包含 Java 12 预览特性的类文件。\n\n由于预览特性不应用于生产环境，因此在编译器和运行时中默认不启用。你必须对编译器和运行时使用\
  \ `--enable-preview` 选项才能使用预览特性。当你使用 `--enable-preview` 选项编译源代码时，还需要使用 `--release`\
  \ 或 `-source` 选项。要在 JDK 13 中编译包含预览特性的源代码，你可以使用：\n\n```\njavac --enable-preview --release\
  \ 13 \n```\n\n如果你在编译包含预览特性的源代码时未使用 `--enable-preview` 选项，则会收到类似如下的编译时错误：\n\n```\n\
  C:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\com\\jdojo\\enhancedswitch\\\
  Test.java:9: 错误: switch 规则是预览特性，默认情况下已禁用。\ncase 10->str =  \"ten\";\n(请使用 --enable-preview\
  \ 来启用 switch 规则)\n1 个错误\n```\n\n如果你在编译时启用了预览特性，编译器会打印提示信息，建议你使用 `-Xlint:preview`\
  \ 选项进行编译，以便查看警告。\n\n```\n注意: C:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\\
  com\\jdojo\\enhancedswitch\\Test.java 使用了预览语言特性。\n注意: 请使用 -Xlint:preview 重新编译以获取详细信息。\n\
  ```\n\n以下是在编译器中同时使用 `--enable-preview` 和 `-Xlint:preview` 选项时得到的结果，它会针对预览特性的每次使用打印一条警告。\n\
  \n```\nC:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\com\\jdojo\\enhancedswitch\\\
  Test.java:9: 警告: [preview] switch 规则是预览特性，可能会在未来的版本中被移除。\ncase 10->str =  \"ten\"\
  ;\n...\n4 个警告\n```\n\n要运行包含预览特性的已编译类，你需要在 `java` 命令中指定 `--enable-preview` 选项：\n\n\
  ```\njava --enable-preview \n```\n\n如果你想使用 JShell 探索预览特性，需要使用 `--enable-preview`\
  \ 选项启动它：\n\n```\nC:\\Java13Revealed>jshell --enable-preview\n|  欢迎使用 JShell -- 版本\
  \ 13\n|  输入 /help intro 以了解介绍\njshell>\n```\n\n## 示例程序\n\n本章中的所有示例都在 `jdojo.enhancedswitch`\
  \ 模块中，如清单 5-1 所示。\n\n```\n// module-info.java\nmodule jdojo.enhancedswitch {\nexports\
  \ com.jdojo.enhancedswitch;\n}\n清单 5-1\n名为 jdojo.enhancedswitch 的模块\n```\n\n## 背景\n\
  \nJava 语言自诞生之初就拥有 `switch` 语句。它被用作控制流语句。`switch` 语句的语法和语义是从 C/C++ 复制而来的，它们具有以下令人烦恼且容易出错的特点：\n\
  \n*   `switch` 标签使用贯穿语义。在大多数情况下，你只想执行与匹配标签关联的语句，而不执行其他标签。由于贯穿语义，你最终不得不在每个标签中使用 `break`\
  \ 语句，这既令人烦恼又容易出错。\n\n*   如果你想为多个 `switch` 标签执行同一组语句，必须使用贯穿语义定义多个 case 标签。换句话说，不允许在\
  \ case 标签中指定多个常量——一个 case 标签必须有且只有一个常量。\n\n*   所有 switch 标签都位于同一个作用域中，这意味着你不能为不同的标签声明相同的变量。\n\
  \n*   它被设计为仅作为语句使用，而不能作为表达式。语句表示一个动作，而表达式则计算出一个值。\n\n存在这些问题的 `switch` 语句已经存在了 24\
  \ 年。为什么我们现在需要解决它们？是不是太晚了？答案是既对也不对。开发者或许可以忍受它直到 Java 生命周期的结束。然而，有一个更重要的特性，称为模式匹配，它促使了这些问题的解决。模式匹配目前还不是\
  \ Java 的一部分；你可以在 [`https://openjdk.java.net/jeps/305`](https://openjdk.java.net/jeps/305)\
  \ 上的 JEP 305 中跟踪其进展。为了使模式匹配能够工作，Java 中的 `switch` 必须进行彻底改革。随着新的 Java 每 6 个月发布一个版本，增强的\
  \ `switch` 已在 Java 12 中作为预览特性提供，并在 Java 13 中提供了改进版本，而最终目标——模式匹配——仍在开发中。\n\n我假设你知道如何使用传统的\
  \ `switch` 语句。在接下来的章节中，我将通过简单的代码片段逐一介绍这些问题，然后再解释增强的 `switch` 特性。\n\n### 贯穿语义\n\n\
  以下代码片段包含一个简单的 `switch` 语句：\n\n```\nint count = 2;\n// 更多代码...\nswitch (count) {\n\
  case 1:\nSystem.out.println(\"One\");\nbreak;\ncase 2:\nSystem.out.println(\"Two\"\
  );\nbreak;\ncase 3:\nSystem.out.println(\"Three\");\nbreak;\ndefault:\nSystem.out.println(\"\
  Out-of-range\");\n}\n```\n\n你有一个名为 `count` 的 `int` 变量。当 `count` 的值分别为 1、2 或 3 时，`switch`\
  \ 语句会打印 `\"One\"`、`\"Two\"` 或 `\"Three\"`。否则，它会打印 `\"Out-of-range\"`。请注意每个 `case`\
  \ 标签中 `break` 语句的使用。你需要它是因为默认情况下 `switch` 语句使用贯穿语义。如果没有 `break` 语句，对于 `count` 值\
  \ 1，所有四个 switch 标签（三个 `case` 标签和一个 `default` 标签）都将被执行，而这并非你的本意。\n\n### 每个 Case 标签一个常量\n\
  \n假设给你一个英文字母，你需要打印它是元音还是辅音。以下是实现此功能的代码：\n\n```\nchar c = 'w';\n// 更多代码...\nswitch(Character.toLowerCase(c))\
  \ {\ncase 'a':\ncase 'e':\ncase 'i':\ncase 'o':\ncase 'u':\nSystem.out.println(\"\
  Vowel\");\nbreak;\ndefault:\nSystem.out.println(\"Consonant\");\n}\n```\n\n请注意使用贯穿语义的五个\
  \ `case` 标签。对于元音，你有五个 `case` 常量。因为每个 `case` 标签只能使用一个常量，所以你不得不使用五个单独的 `case` 标签。如果能够编写一个像\
  \ `\"case 'a', 'e', 'i', 'o', 'u':\"` 这样的 `case` 标签，岂不是更好？\n\n\n\n### Switch 块的单一作用域\n\
  \n`switch` 块定义了一个作用域，所有 switch 标签都在该作用域内执行。这意味着你不能在多个 `case` 标签中定义同名变量。请看以下代码片段：\n\
  \n```\nchar c = 'Z';\n// 此处有更多代码...\nswitch(Character.toLowerCase(c)) {\ncase 'a':\n\
  case 'e':\ncase 'i':\ncase 'o':\ncase 'u':\nchar upperChar = Character.toUpperCase(c);\n\
  System.out.println(\"Vowel: \" + upperChar);\nbreak;\ndefault:\nchar upperChar =\
  \ Character.toUpperCase(c); // 编译时错误\nSystem.out.println(\"Consonant: \" + upperChar);\n\
  }\n```\n\n这段代码无法编译。`upperChar` 变量的两次声明都位于同一个作用域内，即 `switch` 块的作用域。编译器会报错，指出 `default`\
  \ 标签内存在重复的 `upperChar` 变量声明。有一种方法可以解决这个错误。一对花括号（`{}`）可以定义一个新的作用域。你可以将 `case` 标签和\
  \ `default` 标签的代码用花括号括起来来解决这个问题。以下是修改后的代码，它可以正常编译：\n\n```\nchar c = 'Z';\n// 此处有更多代码...\n\
  switch(Character.toLowerCase(c)) {\ncase 'a':\ncase 'e':\ncase 'i':\ncase 'o':\n\
  case 'u': {\nchar upperChar = Character.toUpperCase(c);\nSystem.out.println(\"Vowel:\
  \ \" + upperChar);\nbreak;\n}\ndefault: {\nchar upperChar = Character.toUpperCase(c);\
  \ // 编译通过\nSystem.out.println(\"Consonant: \" + upperChar);\n}\n}\n```\n\n### Switch\
  \ 曾是一种语句\n\n过去你只能将 `switch` 用作语句。为了模拟 `switch` 作为表达式的行为，你需要在 `switch` 语句外部定义一个变量，然后在每个\
  \ `switch` 标签中为其赋值。示例如下：\n\n```\nint count = 2;\n// 此处有更多代码...\n// 在此处声明 desc，稍后在每个\
  \ switch 标签中为其赋值\nString desc;\nswitch (count) {\ncase 1:\ndesc = \"One\";\nbreak;\n\
  case 2:\ndesc = \"Two\";\nbreak;\ncase 3:\ndesc = \"Three\";\nbreak;\ndefault:\n\
  desc = \"Out-of-range\";\n}\nSystem.out.println(desc);\n```\n\n这种方法虽然可行，但代码冗长且是一种变通方案，并非对表达式的直接支持。如果能像下面这样将\
  \ `switch` 用作表达式，那就更好了：\n\n```\nint count = 2;\n// 此处有更多代码...\n// 在此处声明 desc，并使用\
  \ switch 表达式为其赋值\nString desc = switch (count) {\ncase 1: yield \"One\";\ncase 2:\
  \ yield \"Two\";\ncase 3: yield \"Three\";\ndefault: yield \"Out-of-range\";\n};\n\
  ```\n\n稍后我将解释使用 `yield` 语句的新语法。\n\n## 增强的 Switch\n\n现在你已经了解了传统 `switch` 的缺点，是时候看看\
  \ `switch` 令人兴奋的新特性了，这些特性解决了上述缺点。对 `switch` 的更改分为两类：\n\n*   对传统 `switch` 的增强\n\n\
  *   新的 `switch` 语法\n\n新的 `switch` 语法提供了传统 `switch` 语句的功能，并且还有更多。我将首先解释对传统 `switch`\
  \ 的增强，然后详细介绍新的 `switch` 语法和语义。\n\n### 对传统 Switch 的增强\n\nJava 一直保持向后兼容。对语言设计者来说，为传统\
  \ `switch` 添加破坏性更改是不可行的。预览特性为你提供了使用传统 `switch` 的新方法，同时不会破坏你的旧代码。以下是对传统 `switch`\
  \ 的更改：\n\n*   你可以在一个 `case` 标签中使用多个常量。\n\n*   你可以将 `switch` 用作表达式。\n\n以前，每个常量必须使用一个\
  \ `case` 标签。新的 `switch` 语法允许你在一个 `case` 标签中使用逗号分隔的常量列表。以下代码片段重写了之前将字母匹配为元音和辅音的例子：\n\
  \n```\nchar c = 'w';\n// 此处有更多代码...\nswitch(Character.toLowerCase(c)) {\ncase 'a',\
  \ 'e', 'i', 'o', 'u': /* 一个 case 标签中包含五个常量 */\nSystem.out.println(\"Vowel\");\n\
  break;\ndefault:\nSystem.out.println(\"Consonant\");\n}\n```\n\n请注意这段代码与之前使用传统 `switch`\
  \ 的代码之间的区别。这次，你将五个 `case` 标签合并成了一个。你仍然需要使用 `break` 语句，因为传统的 `switch` 语句仍然使用默认的穿透语义。\n\
  \n预览特性允许你将传统 `switch` 用作表达式。表达式会计算出一个值（或产生一个值）。现在你可以编写如下代码：\n\n```\nString str =\
  \ switch(selector) {\ncase label1: ...\ncase label2: ...\n}; /* 必须以分号结尾 */\n```\n\
  \n注意 `switch` 表达式末尾使用了分号。`switch` 表达式是 `str` 变量声明的一部分，因此整个变量声明必须以分号结尾。可以将之前的变量声明想象成如下形式：\n\
  \n```\nString str = ;\n```\n\n传统 `switch` 只允许你在 `switch` 标签中使用语句。预览特性引入了一个新的 `yield`\
  \ 语句。其语法为：\n\n```\nyield expression;\n```\n\n`yield` 语句会计算其 `expression`，并将控制权转移给外层的\
  \ `switch` 表达式。该 `expression` 的值将成为 `switch` 表达式的值。\n\n\n\n### 提示\n\n`yield` 语句只能在\
  \ `switch` 表达式内部使用。你不能在 `switch` 表达式内部使用 `break` 语句。\n\n你可以将之前根据整数计算描述的示例重写如下——这次使用\
  \ `switch` 表达式：\n\n```\nint count = 2;\n// 此处省略更多代码...\n// 在此处声明 desc 并使用 switch\
  \ 表达式为其赋值\nString desc = switch (count) {\ncase 1: yield \"One\";\ncase 2: yield\
  \ \"Two\";\ncase 3: yield \"Three\";\ndefault: yield \"Out-of-range\";\n};\n```\n\
  \n这是一个简单的示例，每个 `switch` 标签只包含一个 `yield` 语句。你可以在一个 switch 标签中包含多个语句。但是，每个 `switch`\
  \ 标签必须包含一个 `yield` 语句，该语句将通过正常的执行路径来表示 `switch` 表达式的值。通常，你不会从表达式中打印内容。这里我们仅出于演示目的，展示在\
  \ `switch` 表达式的 `switch` 标签中可以包含多个语句。以下代码片段在执行 `\"case 1:\"` 时会打印一条消息：\n\n```\n\
  String desc = switch (count) {\ncase 1:\nSystem.out.println(\"Executing case 1:\"\
  );\nyield \"One\";\ncase 2: yield \"Two\";\ncase 3: yield \"Three\";\ndefault: yield\
  \ \"Out-of-range\";\n};\n```\n\n请记住，你不能在 `switch` 表达式内部使用 `break` 语句。`yield` 语句会结束一个\
  \ `switch` 表达式。在这个语句中，当 `count` 为 1 时，会打印一条消息，然后 `yield` 语句通过生成 `\"One\"` 来结束 `switch`\
  \ 表达式，并且 `\"case 1:\"` 下方的其他 `case` 标签不会被执行。\n\n这里有一个挑战给你。让我将前面代码片段中的两个语句交换如下。现在，`yield`\
  \ 语句在前，`System.out.println()` 在后。以下代码片段能编译通过吗？\n\n```\nint count = 2;\n// 此处省略更多代码...\n\
  String desc = switch (count) {\ncase 1:\nyield \"One\";\nSystem.out.println(\"Executing\
  \ case 1:\");\ncase 2: yield \"Two\";\ncase 3: yield \"Three\";\ndefault: yield\
  \ \"Out-of-range\";\n};\n```\n\n如果你的答案是不能，那么你是正确的。`yield` 语句结束了 `switch` 表达式，使得\
  \ `System.out.println()` 语句不可达。Java 不允许存在不可达语句。此代码片段会产生以下编译时错误：\n\n```\nerror: unreachable\
  \ statement\nSystem.out.println(\"Executing case 1:\");\n1 error\n```\n\n清单 5-2\
  \ 包含一个完整的程序，用于演示增强型传统 `switch` 的用法。\n\n```\n// TraditionalSwitch.java\npackage com.jdojo.enhancedswitch;\n\
  public class TraditionalSwitch {\npublic static void main(String[] args) {\nwhatLetter('a');\n\
  whatLetter('W');\nwhatLetter('5');\nfor(int i = 1; i <= 4; i++) {\nString desc =\
  \ getDesc(i);\nSystem.out.printf(\"%d:%s%n\", i, desc);\n}\n}\npublic static void\
  \ whatLetter(char c) {\n// 使用传统 switch，一个 case 中包含多个常量\nswitch(Character.toLowerCase(c))\
  \ {\ncase 'a', 'e', 'i', 'o', 'u':\nSystem.out.println(\"Vowel: \" + c);\nbreak;\n\
  default:\nif (Character.isLetter(c)) {\nSystem.out.println(\"Consonant: \" + c);\n\
  } else {\nSystem.out.println(\"Not-a-Letter: \" + c);\n}\n}\n}\npublic static String\
  \ getDesc(int count) {\n// 将传统 switch 用作表达式\nreturn switch (count) {\ncase 1: yield\
  \ \"One\";\ncase 2: yield \"Two\";\ncase 3: yield \"Three\";\ndefault: yield \"\
  Out-of-range\";\n};\n}\n}\nVowel: a\nConsonant: W\nNot-a-Letter: 5\n1:One\n2:Two\n\
  3:Three\n4:Out-of-range\n清单 5-2\n演示传统 Switch 增强功能的程序\n```\n\n### 新的 Switch 语法\n\n\
  新的 `switch` 保留了传统 `switch` 的大部分语法，除了用于分隔 `switch` 标签及其代码的字符。它使用箭头（`->`）代替冒号（`:`）。传统的\
  \ `\"case label:\"` 变成了 `\"case label->\"`。这是新 `switch` 唯一的语法差异。在本节中，我将解释几个语义（工作原理）上的差异。\n\
  \n通常，我需要区分我谈论的是哪个 `switch`——新的还是旧的。我将旧的 `switch` 称为传统 `switch`、`switch-with-colon`\
  \ 或使用 `\"case label:\"` 的 `switch`。我将新的称为新 `switch`、`switch-with-arrow` 或使用 `\"\
  case label->\"` 的 `switch`。Java 语言规范将与传统 `switch` 关联的 `switch` 块称为 *switch 标记语句组*，将与新\
  \ `switch` 关联的 `switch` 块称为 *switch 标记规则*。无论你使用哪个名称来指代新 `switch`，其语法如下：\n\n```\n\
  switch(selector-expresion) {\ncase label1[, label2, label3...] -> [expression|block|throw-statement]\n\
  case label4[, label5, label6...] -> [expression|block|throw-statement]\n...\ndefault\
  \ -> [expression|block|throw-statement]\n}\n```\n\n该语法允许在 `case` 标签中使用一个或多个常量。与\
  \ `switch` 标签关联的代码仅限于以下之一：表达式、块语句和 `throw` 语句。稍后我将解释此规则背后的原理。\n\n让我们看看用于处理新 `switch`\
  \ 的规则，并附上每条规则的示例：\n\n*   新 `switch` 默认没有穿透（fall-through）。这意味着，你不再需要使用 `break` 语句来停止执行匹配的\
  \ `switch` 标签之后的 switch 标签。\n\n*   作为匹配的 `switch` 标签的一部分，只能执行一个“事物”。这个“事物”可以是表达式、块语句或\
  \ `throw` 语句。在传统 `switch` 中，允许一组语句，这会导致作用域问题，即整个 `switch` 块在一个作用域内执行。使用这些约束，如果你有多个语句要执行，则必须使用块语句，这将为\
  \ `switch` 标签创建一个新的作用域。这允许你拥有与传统 `switch` 相同的功能，但代码更不容易出错。\n\n*   新的 `switch` 可以用作语句或表达式。\n\
  \n以下代码片段使用新的 `switch` 语句重写了之前使用传统 `switch` 语句的示例：\n\n```\nint count = 2;\n// 此处省略更多代码...\n\
  switch (count) {\ncase 1-> System.out.println(\"One\");\ncase 2-> System.out.println(\"\
  Two\");\ncase 3-> System.out.println(\"Three\");\ndefault-> System.out.println(\"\
  Out-of-range\");\n}\n```\n\n注意每个 switch 标签中使用了 `System.out.println()`。我不是说过每个 `switch`\
  \ 标签可以有一个表达式、一个块语句或一个 `throw` 语句吗？我确实说过。在 Java 中，方法调用（本例中为 `System.out.println()`）是一个表达式。当你在方法调用后添加分号时，它就变成了一个表达式语句。以下是关于在带有箭头的\
  \ switch 标签中使用表达式的详细规则：\n\n*   在 `switch` 语句中，*表达式* 必须是 *表达式语句* —— 一个可以通过添加分号转换为语句的表达式。\n\
  \n*   在 `switch` 表达式中，*表达式* 可以是任何有效的 Java 表达式。\n\n以下代码片段使用 `switch` 表达式重写了之前的示例：\n\
  \n```\nint count = 2;\n// 此处省略更多代码...\nString desc = switch (count) {\ncase 1->\
  \ \"One\";\ncase 2-> \"Two\";\ncase 3-> \"Three\";\ndefault->\"Out-of-range\";\n\
  };\nSystem.out.println(desc);\n```\n\n\n\n这次，`\"One\"`、`\"Two\"`等是表达式。你不能通过添加分号将它们转换为表达式语句。当`switch`表达式（`count`）匹配某个`case`标签时，对应的表达式（`\"\
  One\"`、`\"Two\"`等）就成为`switch`表达式的值。\n\n如果必须使用某些逻辑来计算`switch`标签中的值，则需要使用`yield`语句将值作为`switch`表达式的值返回。请考虑以下使用`switch`表达式计算值的代码片段：\n\
  \n```\nchar c = 'W';\n// 此处省略更多代码\nString desc = switch(Character.toLowerCase(c))\
  \ {\ncase 'a', 'e', 'i', 'o', 'u'-> \"Vowel\";\ndefault-> {\nif (Character.isLetter(c))\
  \ {\nyield \"Consonant\";\n} else {\nyield \"Not-a-Letter\";\n}\n}\n};\nSystem.out.println(desc);\n\
  ```\n\n当字符是元音时，`case`标签使用简单表达式`\"Vowel\"`。`default`标签使用块语句，通过逻辑判断它是辅音还是非字母。注意`if`和`else`块中`yield`语句的使用。`default`标签并未使用非常复杂的逻辑。你可以将其替换为如下表达式：\n\
  \n```\nString desc = switch(Character.toLowerCase(c)) {\ncase 'a', 'e', 'i', 'o',\
  \ 'u'-> \"Vowel\";\ndefault-> Character.isLetter(c)?\"Consonant\":\"Not-a-Letter\"\
  ;\n};\n```\n\n请注意，之前的`switch`表达式没有使用任何`yield`语句。请考虑以下使用新`switch`语句的代码片段：\n\n```\n\
  char c = 'W';\n// 此处省略更多代码\nswitch(Character.toLowerCase(c)) {\ncase 'a', 'e', 'i',\
  \ 'o', 'u'-> {\nchar upperChar = Character.toUpperCase(c);\nSystem.out.println(\"\
  Vowel: \" + upperChar);\n}\ndefault-> {\nif (Character.isLetter(c)) {\nchar upperChar\
