  `image.jpeg` 中，`png` 文件将存储在 `image.png` 中，以此类推。


  `allOf()` 方法返回一个 `CompletableFuture<Void>`，当所有提交的任务完成时，该对象也随之完成。代码在其上调用 `thenRun()`
  方法来打印一条消息，表明所有下载已完成。最后，你需要调用 `join()` 方法，以确保在程序退出之前所有响应都已处理完毕。清单 3-8 包含了完整的程序。


