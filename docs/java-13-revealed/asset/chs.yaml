- '# 1. 局部变量类型推断


  在本章中，您将学习


  *   什么是类型推断


  *   什么是局部变量类型推断


  *   什么是受限类型名 `var`


  *   使用 `var` 声明局部变量、for-each 循环和 for 循环的索引，以及隐式类型 lambda 表达式的形参的规则


  ## 什么是类型推断？


  假设您想将一个人 ID（例如 10）存储在一个变量中。您可能会这样声明变量：


  ```

  int personId = 10;

  ```


  要存储一个人 ID 列表，您可能会这样声明变量：


  ```

  ArrayList personIdList = new ArrayList();

  ```


  将上述变量声明重写为如下形式如何？


  ```

  var personId = 10;

  var personIdList = new ArrayList();

  ```


  您可能会说这看起来像 JavaScript 代码，而不是 Java 代码。在 Java 10 之前确实如此。现在您可以使用 `var` 来声明*带有初始化器的局部变量*。编译器会负责为您的变量推断出正确的类型——有时也可能是非预期的错误类型。在
  Java 10 及更高版本中，前面的代码片段等同于以下代码：


  ```

  int personId = 10;

  ArrayList personIdList = new ArrayList();

  ```


  这是否意味着在 Java 中不再需要使用显式类型来声明局部变量？这是否意味着 Java 已经像 JavaScript 一样变成了动态类型语言？不，这些都不正确。使用
  `var` 声明局部变量存在限制——有些是技术上的，有些是实践上的。Java 仍然是一种强类型、静态类型的语言。您刚刚看到的示例只是编译器添加的语法糖。编译器会推断变量的类型并生成字节码，这与
  Java 10 之前生成的字节码相同。Java 运行时永远不会看到 `var`！接下来的几节将为您介绍类型推断的一些背景知识，以及关于如何以及在何处使用 `var`
  声明局部变量的所有规则和例外情况。


  Java 中的一切都围绕类型展开。您要么声明类型（如类和接口），要么使用它们。您在程序中使用的每个表达式和值都有类型。例如，值 10 是 `int` 类型，10.67
  是 `double` 类型，`"Hello"` 是 `String` 类型，表达式 `new Person()` 是 `Person` 类型。


  根据变量或表达式的使用上下文推导其类型称为*类型推断*。在引入 `var` 之前，Java 就已经有了类型推断，例如在 lambda 表达式和泛型类型的对象创建表达式中。以下语句使用了类型推断，它通过读取左侧的
  `ArrayList<Integer>` 将右侧的菱形运算符（`<>`）推断为 `<Integer>`：


  ```

  ArrayList personIdList = new ArrayList();

  ```


  以下语句使用了一个隐式类型的 lambda 表达式，其中形参 `n1` 和 `n2` 的类型分别被推断为 `Integer` 和 `Long`：


  ```

  BiFunction avg = (n1, n2) -> (n1 + n2)/2.0;

  ```




  ## 什么是 var？


  `var` 是 Java 10 中的关键字吗？不是。它是一个*受限类型名*或*上下文敏感关键字*。它是一个类型名，意味着它表示一种类型（基本类型或引用类型），例如
  `int`、`double`、`boolean`、`String`、`List` 等。由于 `var` 是受限类型名，你仍然可以将其用作标识符，但不能用于定义其他类型。也就是说，你可以将
  `var` 用作变量名、方法名和包名，但不能用作类名或接口名。


  Java 编码规范建议类名和接口名以大写字母开头。如果你没有遵循编码规范，将 `var` 用作类名或接口名，你的代码在 Java 10 及更高版本中将会出错。


  你可以在以下上下文中使用 `var` 声明局部变量。此列表有许多限制，我将逐一说明：


  *   带有初始化器的局部变量

  *   `for-each` 循环中的索引

  *   `for` 循环中的索引

  *   隐式类型 lambda 表达式中的形参


  以下是使用 `var` 声明带有初始化器的局部变量的示例：


  ```

  // birthYear 的类型被推断为 int

  var birthYear = 1969;

  // promptMsg 的类型被推断为 String

  var promptMsg = "Are you sure you want to proceed?";

  // 假设 Person 是一个类，john 的类型被推断为 Person

  var john = new Person();

  ```


  以下 lambda 表达式计算一个 `Integer` 和一个 `Long` 的平均值，并返回一个 `Double`。`n1` 和 `n2` 的类型分别被推断为
  `Integer` 和 `Long`。在这里，`var` 在类型推断中不起作用。我将在后面的单独章节中解释这一点。


  ```

  BiFunction avg = (var n1, var n2) -> (n1 + n2)/2.0;

  ```


  编译器会推断使用 `var` 声明的变量的类型。如果编译器无法推断类型，则会发生编译时错误。编译器使用用作初始化器的表达式的类型来推断被声明变量的类型。考虑之前的变量声明。在第一种情况下，编译器看到
  1969，这是一个类型为 `int` 的整数字面量，并将 `birthYear` 变量的类型推断为 `int`。当源代码被编译时，类文件中包含以下语句：


  ```

  int birthYear = 1969;

  ```


  ### 提示


  使用 `var` 进行类型推断是由编译器执行的。使用 `var` 对现有的类文件和运行时没有影响。


  同样的论点也适用于另外两个语句，其中 `promptMsg` 和 `john` 变量的类型分别被推断为 `String` 和 `Person`。


  查看前面的示例，你可能会争辩说，为什么不使用显式类型编写这些语句，如下所示？


  ```

  int birthYear = 1969;

  String promptMsg = "Are you sure you want to proceed?";

  Person john = new Person();

  ```


  你说得有道理。除了节省几次按键之外，当你使用 `var` 时，实际上让这段代码的读者工作变得更困难了一些。当使用 `var` 时，读者必须查看初始化器才能知道被声明变量的类型。在像这样的简单表达式中，仅通过查看初始化器来了解其类型可能并不十分困难。`var`
  类型名的设计者提出的一个论点是，使用它在同一位置声明多个变量可以使变量名更易于阅读，因为它们都垂直对齐。请看以下代码片段：


  ```

  var birthYear = 1969;

  var promptMsg = "Are you sure you want to proceed?";

  var john = new Person();

  ```


  比较前面两个声明相同变量集的代码片段。后者确实更容易阅读一些，但仍然更难理解一些。


  让我们考虑以下使用方法调用来初始化其值的变量声明：


  ```

  var personList = persons();

  ```


  在这种情况下，编译器将根据 `persons()` 方法的返回类型推断 `personList` 变量的类型。对于这条语句的读者来说，除非查看 `persons()`
  方法的声明，否则无法知道推断出的类型。我给变量起了一个好名字 `personList` 来指示其类型。然而，仍然不清楚它是 `List<Person>`、`Person[]`
  还是其他类型。


  考虑另一个变量声明的示例：


  ```

  Map> personListByBirthMonth = new HashMap>();

  ```


  你可以将这条语句重写如下：


  ```

  var personListByBirthMonth = new HashMap>();

  ```


  这次，声明看起来简单得多，并且你可以从 `var` 提供的类型推断中受益，前提是你保持变量名足够直观，以提供关于其类型的线索。


  你可以在同一段代码（方法、构造器、静态初始化器和实例初始化器）中混合使用 `var` 和显式类型名。当变量的类型对读者来说清晰明了时，使用 `var` 声明变量，而不仅仅是对你清晰。如果你代码的读者无法轻易弄清楚变量类型，请使用显式类型名。始终优先考虑清晰性而非简洁性。当你使用
  `var` 时，使用直观的变量名非常重要。考虑以下变量声明：


  ```

  var x = 156.50;

  ```


  变量名 `x` 很糟糕。如果你的方法只有几行长，使用 `x` 作为变量名或许可以原谅。然而，如果你的方法很大，读者将不得不滚动并查看变量声明，以找出 `x` 在方法体中每次出现时的含义。因此，保持变量名直观非常重要。考虑将前面的变量声明替换如下：


  ```

  var myWeightInPounds = 156.50;

  ```


  任何阅读使用 `myWeightInPounds` 的代码的人都不会对其类型有任何疑问。




  ## 快速示例


  本章所有程序均位于 `jdojo.typeinference` 模块中，如代码清单 1-1 所示。


  ```

  // module-info.java

  module jdojo.typeinference {

  exports com.jdojo.typeinference;

  }

  代码清单 1-1

  名为 jdojo.typeinference 的模块声明

  ```


  代码清单 1-2 包含一个测试类，演示如何使用 `var` 受限类型名称声明局部变量。我很快会介绍更多示例。代码中的注释和输出结果清晰地展示了类型推断的过程，因此不再对代码做进一步解释。


  ```

  // VarTest.java

  package com.jdojo.typeinference;

  import java.util.List;

  import java.util.Arrays;

  import java.util.function.BiFunction;

  public class VarTest {

  public static void main(String[] args) {

  // personId 的推断类型为 int

  var personId = 1001;

  System.out.println("personID = " + personId);

  // prompt 的推断类型为 String

  var prompt = "Enter a message:";

  System.out.println("prompt = " + prompt);

  // 你可以像使用 "String prompt = ..." 声明时那样，

  // 在 prompt 上调用 String 类的方法

  System.out.println("prompt.length() = " + prompt.length());

  System.out.println("prompt.substring(0, 5) = "

  + prompt.substring(0, 5));

  // 使用显式类型名称 double

  double salary = 1878.89;

  System.out.println("salary = " + salary);

  // luckyNumbers 的推断类型为 List

  var luckyNumbers = List.of(9, 19, 1969);

  System.out.println("luckyNumbers = " + luckyNumbers);

  // cities 的推断类型为 String[]

  var cities = new String[]{"Atlanta", "Patna", "Paris", "Gaya"};

