- '# 4. 启动单文件源代码程序


  在本章中，您将学习


  *   什么是 Java 启动器


  *   运行 `java` 命令可以使用的不同模式


  *   `java` 命令的源文件模式是什么


  *   如何使用 `java` 命令运行写在单个文件中的源代码


  *   `java` 命令如何在源文件模式下选择要运行的类


  *   关于源文件模式下的类加载机制


  *   如何以及何时将 `--source` 选项与 `java` 命令一起使用


  *   如何在类 UNIX 操作系统上使用 shebang 创建用 Java 编写的实用程序


  ## 什么是 Java 启动器？


  当您开发 Java 应用程序时，您至少需要使用两个工具：Java 编译器和 Java 启动器。Java 编译器将您的源代码编译成类文件，而 Java 启动器从类文件启动（或运行）您的应用程序。当您安装
  JDK 时，这两个工具都会被复制到 `JDK_HOME\bin` 目录中。Java 编译器是 `javac` 工具，Java 启动器是 `java` 工具。`java`
  工具是本章讨论的主题。有时，您会遇到以下短语来指代 `java` 工具：


  *   Java 启动器或 `java` 启动器


  *   Java 应用程序启动器


  *   `java` 命令


  它们都指向位于 `JDK_HOME\bin` 或 `JRE_HOME\bin` 目录中的同一个 `java` 工具，该工具用于运行 Java 应用程序。在我的书中，我将其称为
  *java 命令*，并且在本章中我将继续这样称呼。


  直到 Java 8，您必须先编译源代码，然后才能运行编译后的代码。为了运行一个“HelloWorld”程序而编译源代码，这给初学者增加了一点学习曲线。每次对程序进行小的更改时，您都必须先编译它，然后才能再次运行。Java
  9 添加了 JShell 命令行工具，它允许您通过直接输入到 `jshell` 命令行来运行源代码。JShell 工具是一个交互式工具。它并非旨在从源文件运行
  Java 程序。相反，它适用于那些希望以交互方式探索 Java 语言的人。


  直到 Java 11，如果您想运行一个程序，您必须先编译它才能运行。在 Java 11 中，`java` 命令被修改为支持直接从源代码运行 Java 程序——无需编译您的源代码。从
  Java 11 开始，`java` 命令可以在以下四种模式之一中使用：


  *   启动一个类文件


  *   启动一个 JAR 文件的主类


  *   启动一个模块的主类（在 JDK9 中添加）


  *   启动源文件中的一个类（在 JDK11 中添加）


  在本章中，我将解释第四种模式，即源文件模式。在这种模式下，您向 `java` 命令提供一个源文件，它会在内存中编译源代码并运行它。如果您有一个名为 `HelloWorld.java`
  的文件中的源代码，您将使用源文件模式如下运行它：


  ```

  java HelloWorld.java

  ```


  `java` 命令会查看提供的文件扩展名，即 `.java`，并使用源文件模式来运行该程序。稍后我将解释源文件模式的规则和限制。现在，可以认为它就像使用源文件运行
  `java` 命令一样简单。


  谁应该使用源文件模式？它并非旨在供所有人使用。它适用于以下人群：


  *   正在学习 Java 并尝试运行写在单个文件中的小程序的人


  *   希望使用 Java 编写实用程序/脚本并像运行操作系统级命令/脚本一样运行它们的人


  如果您的 Java 程序不属于这两类中的任何一类，那么您照常操作即可。也就是说，编写您的源代码，将它们编译成类文件，并使用其他三种模式之一的 `java` 命令来运行您的应用程序。


  `java` 命令运行一个类，该类必须具有以下声明的方法：


  ```

  public static void main(String[] args)

  ```


  源文件模式不会改变这一要求。


