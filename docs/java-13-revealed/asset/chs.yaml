  以下代码片段异步发送所有请求，并将下载的文件保存到当前目录：


  ```

  // 异步发送所有请求并等待它们完成

  CompletableFuture.allOf(

  requestList.stream()

  .map(req -> {

  String[] elems = req.uri().getPath().split("/");

  String fileName = "image." + elems[elems.length - 1];

  return client.sendAsync(req,

  BodyHandlers.ofFile(Paths.get(fileName)));

  }).toArray(CompletableFuture[]::new)

  ).thenRun(() -> System.out.println("所有下载已完成。"))

  .join();

  ```


  这虽然是一条语句，但初看可能令人望而生畏。让我们将其分解为逻辑部分。`CompletableFuture<T>` 类的 `allOf()` 方法接受 `CompletableFuture<?>`
  类型的可变参数，并返回一个 `CompletableFuture<Void>`。当所有给定的 `CompletableFuture` 完成时，返回的 `CompletableFuture<Void>`
  也随之完成。你的首要目标是创建一个 `CompletableFuture<HttpResponse<Path>>` 数组，其中包含发送到服务器的所有异步请求。前面代码片段中的以下部分实现了这一点：


  ```

  requestList.stream()

  .map(req -> {

  String[] elems = req.uri().getPath().split("/");

  String fileName = "image." + elems[elems.length - 1];

  return client.sendAsync(req,

  BodyHandlers.ofFile(Paths.get(fileName)));

  }).toArray(CompletableFuture[]::new)

