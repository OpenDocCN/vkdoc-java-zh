  ## 支持 Shebang 文件


  类 Unix 操作系统（如 Linux 和 macOS）支持 shebang 文件。Shebang 文件是一种可执行脚本文件，其特殊的第一行（shebang）指定了用于执行该脚本的解释器。第一行被称为“shebang”或“hash
  bang”。Shebang 以井号（#）开头，后跟感叹号（!），再后面是所用解释器的完整路径。考虑以下保存在 Linux 上名为 `hello` 的文件中的内容：


  ```

  #!/bin/bash

  echo Hello world!

  ```


  这里，`hello` 文件包含一个脚本。你需要赋予它执行权限（`chmod +x hello`）。它也是一个 shebang 文件。它的 shebang 指定了执行该脚本的解释器——在本例中，脚本中只有一个
  `echo` 命令——是 `/bin/bash`。


  源文件模式下的 `java` 命令支持 shebang 文件。你需要在源文件中使用的 shebang 是：


  ```

  #![java 路径] --source [版本]

  ```


  这里，`[java 路径]` 是 `java` 命令的完整路径，`[版本]` 是源版本。


  ### 提示


  Shebang 文件仅在类 Unix 操作系统（如 Linux 和 macOS）上原生支持。Windows 不支持 shebang 文件。


  清单 4-16 包含一个 `pfp` 文件的代码。我将 JDK13 安装在我的 Linux 机器的 `/home/ksharan/java13` 目录下，因此我在
  `pfp` 文件中指定了以下 shebang：


  ```

  #!/home/ksharan/java13/bin/java --source 13

  package com.jdojo.sourcecode.mode;

  import java.nio.file.Paths;

  public class PrintFullPath {

  public static void main(String[] args) {

  // 打印当前目录的完整路径

  System.out.println(Paths.get(".")

  .toAbsolutePath()

  .normalize()

  .toString());

  }

  }

  清单 4-16

  pfp 可执行文件的内容

  ```


  ```

  #!/home/ksharan/java13/bin/java --source 13

  ```


  你需要修改此文件中的 shebang，使其指向你机器上 `java` 命令的路径。你可以使用 Linux 上的 `whereis` 命令找到 `java` 的路径。在我的机器上，它打印出以下内容：


  ```

  $ whereis java

  java: /usr/bin/java /usr/lib/java /etc/java /usr/share/java /home/ksharan/java9.sh
  /home/ksharan/java10.sh /home/ksharan/java13/bin/java /usr/share/man/man1/java.1.gz

  ```


  在执行 `pfp` 文件之前，你需要使用 `chmod` 命令使其可执行。你可以使用完整路径、相对路径或仅使用文件名来执行 `pfp` 文件。Java 在你使用何种路径方面不起任何作用。这完全取决于你的操作系统。如果你将存储
  `pfp` 的目录包含在 PATH 环境变量中，你可以仅使用文件名来执行它。我将 `pfp` 文件存储在我的机器上的 `/home/ksharan` 目录中，这也是我的当前目录。以下命令序列展示了我是如何以不同方式执行此文件的：


  ```

  $ ls -l pfp

  -rw-rw-r--. 1 ksharan ksharan 341 Aug  3 09:20 pfp

  $ ./pfp

  bash: ./pfp: 权限不够

  $ chmod +x ./pfp

  $ ls -l pfp

  -rwxrwxr-x. 1 ksharan ksharan 341 Aug  3 09:20 pfp

  $ ./pfp

  /home/ksharan

  $ pfp

  bash: pfp: 未找到命令...

  $ export PATH=.:$PATH

  $ pfp

  /home/ksharan

  $ pwd

  /home/ksharan

  $

  ```


  请注意，你在 Linux 上的 `pfp` 命令与 Linux 的 `pwd` 命令功能相同。`pwd` 命令打印工作目录，`pfp` 命令也是如此。你能够用
  Java 实现一个 Linux 命令，难道不感到高兴吗？


  对运行 Java 源文件的 shebang 支持附带了一些规则。让我们先看看规则，然后再看几个示例：


  *   你也可以使用 `java` 命令配合 `--source` 选项，以源文件模式运行 shebang 文件。


  *   Shebang 文件不能有 `.java` 扩展名。


  第一条规则指出，你可以使用 `--source` 选项来运行 shebang 文件。考虑以下命令：


  ```

  $ java pfp

  错误：找不到或无法加载主类 pfp

  原因：java.lang.ClassNotFoundException: pfp

  $ java --source 13 pfp

  /home/ksharan

  $

  ```


  第一个命令尝试运行 `pfp` 文件，并生成一条错误信息，提示未找到 `pfp` 类。回想一下，当文件名包含 `.java` 扩展名或你使用了 `--source`
  选项时，`java` 命令会选择源文件模式。此命令两个条件都不满足，因此 `java` 命令选择了类文件模式，并尝试运行一个名为 `pfp` 的类。当前目录中没有任何名为
  `pfp` 的类，导致了此错误。


  第二个命令使用了 `--source` 选项，并且成功运行了 `pfp` 源文件。等等！`pfp` 文件的第一行是一个 shebang，它不是有效的 Java
  代码：


  ```

  #!/home/ksharan/java13/bin/java --source 13

  ```




  Java 编译器是如何编译这个 shebang 行的？当你使用 `--source` 选项时，`java` 命令会检查文件的第一行。如果第一行是 shebang，它会在将源代码传递给编译器之前，移除第一行的内容，但保留最后一个字符——换行符。因此，编译器永远不会看到
  shebang；它看到的全是有效的 Java 代码。现在你可能意识到，编译器并没有做任何改动来支持 Java 源文件中的 shebang。


  还有一个问题需要解答。为什么 `java` 命令不直接移除整个 shebang 行？你的 shebang 文件包含 Java 源代码，其中可能包含错误。假设在一个
  shebang 文件中，第六行包含一个错误。当编译器报告这个错误时，如果 `java` 命令移除了整个 shebang 行，你将会看到错误被报告在第五行。为了保持错误报告中的行号一致，`java`
  命令会移除 shebang 的内容，但保留最后一个换行符，这样源文件的行数保持不变，编译器就能报告正确的错误行号。


  让我们讨论第二条规则。这条规则规定，要么你有一个没有扩展名或扩展名不是 `.java` 的 shebang 文件，要么你有一个扩展名为 `.java` 的有效
  Java 源文件。如果你的文件包含 `.java` 扩展名，文件内容将被视为 Java 源文件，不做任何修改。一个带有 `.java` 扩展名的 shebang
  文件会在第一行（即指定 shebang 的那一行）导致错误。你可以换一种方式来理解这条规则。带有 `.java` 扩展名的源文件是为学习 Java 语言的程序员准备的，而
  shebang 文件则是为开发实用程序准备的。给实用程序添加扩展名并不是常见的做法。以下命令将 `pfp` 文件复制为 `pfp.java` 文件，并使用 `java`
  命令运行 `pfp.java` 文件：


  ```

  $ cp pfp pfp.java

  $ java pfp.java

  pfp.java:1: 错误: 非法字符: ''#''

  #!/home/ksharan/java13/bin/java --source 13

  ^

  pfp.java:1: 错误: 需要 class, interface 或 enum

  #!/home/ksharan/java13/bin/java --source 13

  ^

  2 个错误

  错误: 编译失败

  $

  ```


  错误信息表明编译器试图将 shebang 作为 Java 代码进行编译，并因此失败。


  你也可以向 shebang 文件中的 `main()` 方法传递参数。你可以将清单 4-7 中的程序转换为 shebang 文件作为练习。将此文件保存为 `stats`，向文件添加
  shebang，并使其可执行。你应该能够像下面这样运行 `stats` 文件：


  ```

  $ stats 1 2 3 4 5

  DoubleSummaryStatistics{count=5, sum=15.000000, min=1.000000, average=3.000000,
  max=5.000000}

  $

  ```


  ## 总结


  用于运行 Java 应用程序的 `java` 命令被称为 `java` 启动器或 `java` 工具。它可以在以下四种模式下使用：


  *   类文件模式


  *   JAR 文件模式


  *   模块模式


  *   源文件模式


  类文件模式和 JAR 文件模式自 JDK 发布之初就已存在。模块模式是在 JDK 9 中添加的。源文件模式是在 JDK 11 中添加的。在源文件模式下，`java`
  命令可以直接从源文件运行 Java 程序，无需你事先编译源文件。在源文件模式下，整个源代码必须包含在单个文件中。代码可以引用类路径上的其他代码。


  `java` 命令使用两个标准来选择源文件模式：


  *   命令行上第一个不是选项或选项一部分的条目。如果该条目是一个扩展名为 `.java` 的现有文件的名称，则使用源文件模式。


  *   在命令行上使用 `--source` 选项会强制 `java` 命令使用源文件模式。如果你的源文件不包含 `.java` 扩展名，则必须使用 `--source`
  选项才能使用源文件模式。


  在源文件模式下，`java` 命令在运行代码之前，会使用 `jdk.compiler` 模块在内存中编译源代码。源文件中的第一个类型必须是一个包含 `main()`
  方法的类。`java` 命令会自动选择第一个顶层类来运行。


  在源文件模式下，源文件名之后指定的参数会被传递给所运行类的 `main()` 方法。


  你可以向 `java` 命令指定选定的编译器选项，这些选项将被传递给编译器以编译源文件。在源文件模式下，注解处理被禁用。编译器不会强制执行文件名限制，即命名包中的类型应存在于一个文件名由类型名后跟
  `.java` 扩展名组成的文件中。你可以在一个源文件中拥有任意数量的 `public` 类。


  `java` 命令使用一个名为内存类加载器的自定义类加载器来加载源文件中的类。


  在 Java 11 中，如果从源文件运行的类也存在于类路径中，你会得到一个错误。内存类加载器会委托给应用程序类加载器。也就是说，类路径上的类会优先于源文件中的类被加载。


  内存类加载器的行为在 Java 12 中发生了变化。在 Java 12 中，它会在委托给应用程序类加载器之前，先在源文件中搜索类。如果从源文件运行的类也存在于类路径中，那么在
  Java 12 中会运行源文件中的类，而不会像 Java 11 那样报错。


  如果你的源文件没有标准的 `.java` 文件扩展名，你必须将 `--source` 选项与 `java` 命令一起使用才能运行此类源文件。你也可以在源文件中包含一个
  shebang，并利用类 Unix 操作系统对 shebang 文件的支持来运行源文件。`java` 命令在将源文件内容传递给编译器之前，会剥离 shebang，但保留最后一个换行符。


  一个带有 `.java` 扩展名和 shebang 的源文件将无法运行，因为编译器会尝试将 shebang 解释为 Java 源代码并失败。


