  \n输出中的错误信息清楚地表明，枚举定义在编译时和运行时之间发生了变化。开发者需要在 `Drive` 类的 `changeLight()` 方法中的 switch\
  \ 表达式里处理新的枚举常量 `AMBER`。如果你在基于枚举的 switch 表达式中添加了 `default` 标签，编译器就不会再为你添加 `default`\
  \ 标签。\n\n如果你在没有添加 `default` 标签的情况下重新编译 `Drive` 类，你会得到以下编译时错误：\n\n```\nC:\\Java13Revealed\\\
