- "# 2. Java 版本命名方案\n\n在本章中，你将学习\n\n*   关于新旧 Java 发布模型\n*   JDK 9 之前的 JDK 版本命名方案是什么\n\
  *   JDK 9 中的新 JDK 版本命名方案及其在 JDK 10 中的更新\n*   如何使用 `Runtime.Version` 类解析 JDK 版本字符串\n\
  *   使用 `java` 命令的不同选项打印 Java 版本字符串时使用的格式\n\n\n\n## Java 发布模型\n\n在 2017 年 9 月发布的\
  \ Java 9 之前，Java 采用功能驱动的发布模型，每两年发布一个包含新功能的版本。在这种模型中，每个功能版本都包含一个或多个主要特性。有时，新功能版本（例如\
  \ Java 8 和 Java 9）会延迟数月甚至一年以上，因为主要特性的开发尚未完成。这种发布模型有一个主要缺点：小功能必须等待很长时间才能提供给开发者使用。\n\
  \nJava 已切换到一种新的基于时间的发布模型，该模型将包含：\n\n*   每 6 个月发布一个功能版本\n*   每 3 个月发布一个更新版本\n*  \
  \ 每 3 年发布一个长期支持（LTS）版本\n\n在新的基于时间的发布模型中，从 2018 年 3 月开始，你将每 6 个月获得一个新功能版本，例如 2018\
  \ 年 3 月的 Java 10、2018 年 9 月的 Java 11、2019 年 3 月的 Java 12、2019 年 9 月的 Java 13，以此类推。一个功能版本可能包含对\
  \ Java 语言、JVM 或 API 的小型和/或大型新增内容。新功能的开发是一个持续的过程，在该功能完全开发完成之前，它不会与任何未来的功能版本绑定。一旦新功能完全开发完成，它就会被合并到即将发布的功能版本中。这样，新功能就不会延迟任何即将发布的版本。\n\
  \n从 2018 年 4 月开始，你将在 4 月、7 月、10 月和 1 月每 3 个月获得一个新的更新版本。更新版本将仅包含针对较新版本的安全修复和错误修复。\n\
  \n从 2018 年 9 月开始，你将获得一个 LTS 功能版本，该版本将通过更新获得至少 3 年的支持。\n\n## 什么是版本字符串？\n\nJava 的每个版本都由一个唯一的字符串标识，该字符串被称为*版本字符串*。例如，版本字符串\
  \ \"1.8\"、\"9\" 和 \"10\" 标识了三个不同的 Java 版本。Java 版本字符串之所以重要，有以下几个原因。如果你正在开发一个 Java\
  \ 应用程序，你会希望根据 Java 支持的功能、你所在组织提供的支持以及你的供应商支持该 Java 版本的时间长短来选择一个 Java 版本。在 Java 9\
  \ 之前，Java 使用的版本字符串类似于 \"1.7\"、\"1.8.0_162\" 等。Java 9 引入了一种新的版本字符串方案，而 Java 10 扩展了\
  \ Java 9 中引入的版本字符串方案。后续章节将为你概述所有版本字符串方案，以及如何在命令行中打印它们并在程序中使用它们。\n\n## 旧版版本字符串方案\n\
