  ## 已弃用的工具


  在本节中，我将列出并解释 JDK 10 到 JDK 13 中已弃用的工具和 API。我只列出作为开发者需要了解的重要工具。有关所有已弃用工具和 API 的完整列表，请参阅特定
  JDK 的发行说明。


  ### Nashorn JavaScript 引擎


  Nashorn JavaScript 引擎是在 JDK 8 中引入的，它是 ECMAScript-262 5.1 标准的完整实现。该引擎的维护者发现很难跟上 ECMAScript
  的变化，最终决定将其弃用以备移除。在 JDK 11 中，Nashorn JavaScript 脚本引擎和 API 以及 `jjs` 工具已被弃用，并计划在未来的版本中移除。


  允许在 Java 中使用脚本语言的 `javax.script` API 不受 Nashorn JavaScript 引擎弃用的影响。如果你在 Java 应用程序中使用其他脚本引擎，它们将继续正常工作。


  Oracle 已宣布支持 GraalVM，可用于迁移你的 Nashorn 应用程序。你可以在 [`https://blogs.oracle.com/developers/announcing-graalvm`](https://blogs.oracle.com/developers/announcing-graalvm)
  阅读更多关于 Oracle 公告的信息。你可以在其官方网站 [`www.graalvm.org`](https://www.graalvm.org) 上找到更多关于
  GraalVM 的信息。


  ### rmic 工具


  JDK 13 已弃用 `rmic` 工具，并计划在未来的版本中移除。它用于为远程方法调用（RMI）创建静态存根。自 Java 5 起，存根可以动态生成，这是生成存根的推荐方式。如果你仍在使用
  RMI 的静态存根，请将代码迁移为使用动态存根。你可以参考我的书《Java APIs, Extensions and Libraries: With JavaFX,
  JDBC, Jmod, Jlink, Networking, and the Process API》（ISBN-1484235452），了解有关如何在 RMI
  中使用动态存根的更多详细信息。


  ### Pack200 工具和 API


  JDK 11 弃用了 `pack200` 和 `unpack200` 工具以及 `java.util.jar` 包中的 `Pack200` API。它们将在未来的
  JDK 版本中被移除。Pack200 是一种针对 JAR 文件的压缩方案，旨在减少 JDK 下载和 Java 应用程序的磁盘空间和带宽需求。


  JDK 附带了 `pack200` 和 `unpack200` 工具，用于压缩和解压缩 JDK 8 及更早版本中的 JAR 文件。`Pack200` API 以编程方式用于相同目的。高速互联网以及浏览器中移除
  applet 支持等其他技术进步，使得 Pack200 方案已过时。JDK 9 还引入了新的文件格式 JMOD 和 JImage，用于打包 Java 模块，这比
  JAR 文件格式更高效，并且不使用 Pack200。


  ### Swing Motif 外观


  Java 13 已弃用 Swing Motif 外观。它在 macOS 上不受支持。有关更多详细信息，请参阅 [`https://bugs.openjdk.java.net/browse/JDK-8177960`](https://bugs.openjdk.java.net/browse/JDK-8177960)。


  ## 已移除的工具


  在本节中，我将列出已移除的工具及其简要说明。


  ### appletviewer 工具


  Java 9 已弃用 Applet API 和 `appletviewer` 工具。Java 11 移除了 `appletviewer` 工具，该工具曾用于在本地启动
  applet 而无需使用浏览器。


  ### javah 工具


  JDK 曾附带一个名为 `javah` 的工具。该工具用于为 Java 代码中所有 native 方法声明生成 C/C++ 头文件。该工具在 JDK 9 中被弃用，并计划在未来移除。在
  JDK 10 中，该工具已被移除。


  JDK 8 为 Java 编译器（`javac`）添加了一个 `-h` 选项，用于生成 C/C++ 头文件。`-h` 选项接受一个目录名，编译器会将生成的头文件放置在该目录中。以下命令编译
  `HelloJNI.java` 文件，并将所有 C/C++ 头文件放置在 `jni_headers` 目录中：


  ```

  javac -h jni_headers HelloJNI.java

  ```


  当使用 `-h` 选项时，编译器会扫描源文件中的 native 方法声明，并在指定目录中生成 C/C++ 头文件。


  ## Runtime 类


  `java.lang.Runtime` 类中的以下两个方法在 Java 9 中被弃用，并计划在未来的版本中移除，现已在 Java 13 中被移除：


  *   `void traceInstructions`​`(boolean on)`


  *   `void traceMethodCalls`​`(boolean on)`


  ## Thread 类


  `Thread` 类中的 `destroy()` 和 `stop(Throwable)` 方法已在 Java 11 中被移除。无参的 `stop()` 方法不受影响。


  ## JVM 常量 API


  JDK 12 引入了 JVM 常量 API，这是一个底层 API，用于处理库和工具如何描述类文件常量池中的条目，这些库和工具会操作字节码。作为开发者，你通常不需要在应用程序中使用此
  API。该 API 位于 `java.base` 模块的 `java.lang.constant` 包中。你经常会遇到此 API 中的以下两个接口：


  *   `Constable`


  *   `ConstantDesc`


  `Constable` 表示一个可以在类文件常量池中表示的常量。换句话说，其实例代表常量值的类型就是 `Constable`。实现 `Constable` 接口的一些类型包括
  `String`、`Integer`、`Long`、`Float`、`Double`、`Class`、`MethodType` 和 `MethodHandle`。


  一个 `Constable` 可以将其自身名义上描述为一个 `ConstantDesc`。换句话说，`ConstantDesc` 是 `Constable` 所代表的常量值的名义描述符。之所以称为“名义描述符”，是因为它本身不是值，而是描述该值或在给定的类加载上下文中重建该值的“链接”或“配方”。名义描述符也可以用于以符号形式（或名义形式）将值存储在常量池中。存在专门的
  `ConstantDesc` 类型，例如 `ClassDesc`，用作 `Class` 常量的名义描述符。




  ### 提示


  JVM 常量 API 是一个底层 API，专为操作字节码的库和工具设计。作为应用程序开发者，你不会直接使用它们。


  这两个接口都包含一个单一方法。`Constable` 接口包含以下方法：


  ```

  Optional describeConstable()

  ```


  `describeConstable()` 方法返回一个 `Optional`，如果无法为此 `Constable` 构造一个名义描述符，则该 `Optional`
  为空。


  `ConstantDesc` 接口包含以下方法：


  ```

  Object resolveConstantDesc(MethodHandles.Lookup lookup) throws ReflectiveOperationException;

  ```


  `resolveConstantDesc()` 方法使用 `MethodHandles.Lookup` 参数作为解析和访问控制上下文，返回解析后的常量值。


  `String`、`Integer`、`Long`、`Float` 和 `Double` 类同时实现了 `Constable` 和 `ConstantDesc`
  接口，并作为自身的名义描述符。清单 8-2 包含一个在 `String` 上使用这些方法的简单示例。


  ```

  // ConstableTest.java

  package com.jdojo.misc;

  import java.lang.invoke.MethodHandles;

  import java.util.Optional;

  public class ConstableTest {

  public static void main(String[] args) {

  String str1 = "Hello, JVM Constants API";

  // desc 中的 Optional 包含字符串本身 (str1)

  Optional desc = str1.describeConstable();

  String str2  = desc.get();

  // str3 包含字符串本身 (str1)

  String str3 = str1.resolveConstantDesc(MethodHandles.lookup());

  System.out.println("str1: " + str1);

  System.out.println("str2: " + str2);

  System.out.println("str3: " + str3);

  System.out.println("str1 == str2: " + (str1 == str2));

  System.out.println("str2 == str3: " + (str2 == str3));

  }

  }

  str1: Hello, JVM Constants API

  str2: Hello, JVM Constants API

  str3: Hello, JVM Constants API

  str1 == str2: true

  str2 == str3: true

  清单 8-2

  使用 JVM 常量 API

  ```


  ## String 类


  `String` 类在 Java 11 到 Java 13 中新增了几个方法。我已在第 6 章中描述了 Java 13 中的新方法以及 Java 12 中的 `indent()`
  方法。`describeConstable()` 和 `resolveConstantDesc()` 方法的存在是因为 `String` 类实现了 Java 12
  中引入的 JVM 常量 API 中的 `Constable` 和 `ConstantDesc` 接口。本节中我不解释这些方法。为了完整性，我在此列出了 `String`
  类中的所有新方法。


  **Java 11 新增的方法**


  *   `String strip()`


  *   `String stripLeading()`


  *   `String stripTrailing()`


  *   `boolean isBlank()`


  *   `Stream<String> lines()`


  *   `String repeat`​`(int count)`


  **Java 12 新增的方法**


  *   `String indent`​`(int n)`


  *   `<R> R transform`​`(Function<? super String,`​`? extends R> f)`


  *   `Optional<String> describeConstable()`


  *   `String resolveConstantDesc`​`(MethodHandles.Lookup lookup)`


  **Java 13 新增的方法**


  *   `String stripIndent()`


  *   `String translateEscapes()`


  *   `String formatted`​`(Object... args)`


  我将在后续章节中通过示例解释这些方法。


  ### 去除空白字符


  Java 11 为 `String` 类添加了三个去除前导/尾部、前导和尾部空白字符的方法：`strip()`、`stripLeading()` 和 `stripTrailing()`。`strip()`
  方法在移除前导和尾部空白字符后返回 `String`。另外两个方法在仅移除前导或尾部空白字符后返回 `String`。这些方法移除空白字符。请参考 `Character`
  类的 `isWhitespace(int codepoint)` 方法以了解 Java 中空白字符的定义。


  `String` 类的 `trim()` 方法在移除前导和尾部空格后返回 `String`，其中空格定义为码点小于或等于 Unicode 值 32（空格字符）的任何字符。比较
  `strip()` 和 `trim()` 方法。`trim()` 方法作用于 ASCII 控制字符（或 ASCII 空白字符），而 `strip()` 方法作用于
  Unicode 空白字符。


  ### 测试空白字符串


  你可以使用 `String` 类的 `isBlank()` 方法测试字符串是否仅包含空白字符。如果字符串仅包含空白字符，则返回 `true`。否则返回 `false`。


  ### 获取行流


  你可以使用 `String` 类的 `lines()` 方法获取字符串中的行流。字符串中的一行定义为零个或多个字符后跟一个行终止符的序列，行终止符可以是 `"\n"`、`"\r"`
  或 `"\r\n"`。如果到达字符串末尾，一行可能不以行终止符结尾。以下代码片段使用文本块为威廉·华兹华斯的露西组诗中的一节创建多行字符串。它打印每行的字符数，后跟文本。它使用
  `String` 类的 `lines()` 方法获取文本中每行的流。


  ```

  String text = """

  Upon the moon I fixed my eye,

  All over the wide lea;

  With quickening pace my horse drew nigh

  Those paths so dear to me.

  """;

  text.lines()

  .map(s -> s.length() + ": " + s)

  .forEach(System.out::println);

  29: Upon the moon I fixed my eye,

  22: All over the wide lea;

  39: With quickening pace my horse drew nigh

  26: Those paths so dear to me.

  ```


  ### 重复字符串


  `String` 类的 `repeat`​`(int count)` 方法返回一个字符串，其内容是将该字符串重复 `count` 次后的拼接结果。例如，`"hello".repeat(2)`
  返回 `"hellohello"`。如果字符串为空或 `count` 为零，则返回空字符串。如果 `count` 小于零，则抛出 `IllegalArgumentException`。该方法在创建缩进时非常有用。以下代码片段打印五行星号，每行用空格缩进。第一行由四个空格和一个星号组成，第二行由三个空格和两个星号组成，依此类推。


  ```

  IntStream.rangeClosed(1, 5)

  .mapToObj(n -> " ".repeat(5-n) + "*".repeat(n))

  .forEach(System.out::println);

  *

  **

  ***

  ****

  *****

  ```




  ### 转换字符串


  Java 12 为 `String` 类新增了一个 `transform()` 方法，通过应用 `Function<T,R>` 将字符串转换为另一个对象。`Function<T,R>`
  接受一个 `String` 并返回任意类型的对象。该方法的声明如下：


  ```

  R transform (Function f)

  ```


  此方法的用途并不明显。它最初是作为 Java 12 中*原始字符串*支持的一部分而添加的。*原始字符串*特性后来从 Java 12 中移除，但 `transform()`
  方法得以保留。


  以下是一个简单示例，演示如何使用 `transform()` 方法将字符串 `"Hello"` 转换为 `"Hello, World"`：


  ```

  String str = "Hello";

  String greeting = str.transform(s -> s + ", World");

  System.out.println(greeting);

  Hello, World

  ```


  Lambda 表达式接受一个字符串作为输入，并通过在其后追加 `", World"` 返回输入字符串。你会同意，仅仅为了拼接两个字符串而使用 `transform()`
  方法并没有带来任何好处。建议改为编写如下代码：


  ```

  String str = "Hello";

  String greeting = str + ", World";

  System.out.println(greeting);

  Hello, World

  ```


  让我们再看另一个简单示例，其中你使用方法引用 `Integer::parseInt` 或 `Integer::valueOf` 与 `transform()`
  方法将字符串转换为 `int`：


  ```

  String str = "1969";

  int year = str.transform(Integer::parseInt);

  //int year = str.transform(Integer::valueOf);

  System.out.println(year);


  ```


  你可能会争辩说，前面的代码片段可以改写如下，且不会丧失可读性：


  ```

  String str = "1969";

  int year = Integer.parseInt(str);

  System.out.println(year);


  ```


  这两个示例的关键点在于：如果一个方法接受一个字符串并通过应用某些逻辑返回另一个对象，你总是可以直接调用该方法，而不是使用 `transform()` 方法并传递该方法的引用。


  那么，对字符串应用多次转换呢？通常，字符串转换方法是某个类的静态方法，无法进行链式调用。在这种情况下，使用 `transform()` 方法可能会使你的代码更具可读性。假设你想对一个多行字符串应用两个转换：


  *   通过移除空白行来净化它们。


  *   为每一行添加行号。


  假设你创建了一个 `Transforms` 类，其中包含两个静态方法 `sanitizeBlanks(String str)` 和 `addLineNumber(String
  str)` 来执行这些转换。这两个方法都返回一个 `String`。你可以编写以下代码来执行此任务：


  ```

  String str = "your original string goes here";

  // 对 str 应用两个转换

  String newStr = str.transform(Transforms::sanitizeBlanks)

  .transform(Transforms::addLineNumber);

  ```


  你可以重写这段代码，改为调用 `Transforms` 类的静态方法，而不是使用 `String` 类的 `transform()` 方法，如下所示：


  ```

  String str = "your original string goes here";

  // 对 str 应用两个转换

  String str1 = Transforms.sanitizeBlanks(str);

  String newStr = Transforms.addLineNumber(str1);

  ```


  比较前面两段代码。使用 `String` 类的 `transform()` 方法的代码更具可读性。清单 8-3 包含一个完整的程序，用于演示我们讨论中的两个转换。


  ```

  // Transforms.java

  package com.jdojo.misc;

  import java.util.concurrent.atomic.AtomicInteger;

  import java.util.function.Predicate;

  import static java.util.stream.Collectors.joining;

  public class Transforms {

  /**

  * 返回移除空白行以及每行前导和尾随空白后的字符串。

  * 仅包含空白字符的行被视为空白行。

  * @param str 要净化的字符串

  * @return 移除空白行以及每行前导/尾随空白后的字符串。

  */

  public static String sanitizeBlanks(String str) {

  return str.lines()

  .filter(Predicate.not(String::isBlank))

  .map(String::strip)

  .collect(joining("\n"));

  }

  /**

  * 为字符串中的每一行添加行号。

  * @param str 要添加行号的字符串

  * @return 通过在字符串中每行前添加行号后返回的字符串。

  */

  public static String addLineNumber(String str) {

  AtomicInteger lineNumber = new AtomicInteger();

  return str.lines()

  .map(s-> lineNumber.incrementAndGet() + ":" + s)

  .collect(joining("\n"));

  }

  public static void main(String[] args) {

  String str = """

  Upon the moon I fixed my eye,

  All over the wide lea;

  With quickening pace my horse drew nigh

  Those paths so dear to me.

  """;

  System.out.println("原始字符串:\n" + str);

  String newStr = str.transform(Transforms::sanitizeBlanks)

  .transform(Transforms::addLineNumber);

  System.out.println("转换后的字符串:\n" + newStr);

  /* 使用 String 类的 transform() 方法的替代方案

  String str1 = Transforms.sanitizeBlanks(str);

  String str2 = Transforms.addLineNumber(str1);

  System.out.println("\n 转换后的字符串:\n" + str2);

  */

  }

  }

  原始字符串:

  Upon the moon I fixed my eye,

  All over the wide lea;

  With quickening pace my horse drew nigh

  Those paths so dear to me.

  转换后的字符串:

  1:Upon the moon I fixed my eye,

  2:All over the wide lea;

  3:With quickening pace my horse drew nigh

  4:Those paths so dear to me.

  清单 8-3

  使用 String 类的 transform() 方法

  ```


  请注意构成原始字符串的各行中的空白行和额外的前导空格，在应用第一个转换时它们会被移除。第二个转换以“#:”的形式为每一行添加行号。原始字符串包含六行，而转换后的字符串只包含四行。代码中包含充分的注释来解释逻辑。


  ## Optional 和 Predicate


  以下是添加到 `java.util.Optional<T>` 类中的两个新方法：


  *   `T orElseThrow()`


  *   `boolean isEmpty()`


  无参的 `orElseThrow()` 方法是在 Java 10 中添加到 `Optional<T>` 类的。如果 `Optional` 包含一个值，该方法返回该值。否则，它会抛出一个
  `java.util.NoSuchElementException` 运行时异常。




  ### 提示


  `orElseThrow()` 和 `isEmpty()` 这两个方法也已添加到 `OptionalInt`、`OptionalLong` 和 `OptionalDouble`
  类中。


  `Optional` 类原本已有另一个版本的 `orElseThrow()` 方法，其声明如下：


  ```

  T orElseThrow (Supplier exceptionSupplier) throws X extends Throwable

  ```


  该方法接受一个 `Supplier<T>`，当值不存在时，由该供应商提供要抛出的异常。抛出的异常可以是受检异常或非受检异常。你还可以在创建异常时使用自定义消息。无参的
  `orElseThrow()` 方法会抛出一个非受检异常，并附带消息 `"No value present"`。以下代码片段展示了如何使用现有和新增的 `orElseThrow()`
  方法：


  ```

  Optional name = Optional.of("Kishori Sharan");

  // 此处省略更多代码...

  // 当 name 为空时，提供要抛出的异常

  String name1 = name.orElseThrow(

  () -> new NoSuchElementException("No value present"));

  // 如果 name 为空，让运行时抛出 NoSuchElementException

  String name2 = name.orElseThrow();

  ```


  `Optional<T>` 类原本有一个名为 `isPresent()` 的方法，如果值存在则返回 `true`，否则返回 `false`。Java 11 新增了一个
  `isEmpty()` 方法，其效果等同于调用 `!isPresent()`。如果你使用逻辑来检查值是否缺失，这个新方法能使代码更具可读性。以前使用 `!isPresent()`
  时，你必须检查“非存在”，而不是检查“缺失”。它在用作方法引用的 lambda 表达式中也很有用。


  清单 8-4 包含一个完整的程序，用于演示 `Optional<T>` 类中这些新方法的使用。


  ```

  // OptionalTest.java

  package com.jdojo.misc;

  import java.util.List;

  import java.util.NoSuchElementException;

  import java.util.Optional;

  public class OptionalTest {

  public static void main(String[] args) {

  Optional name = Optional.of("Kishori Sharan");

  String fn1 = name.orElseThrow(

  () -> new NoSuchElementException("No value present"));

  String fn2 = name.orElseThrow();

  System.out.println("fn1: " + fn1);

  System.out.println("fn2: " + fn2);

  try {

  Optional phone = Optional.empty();

  String f2 = phone.orElseThrow();

  } catch (NoSuchElementException e) {

  System.out.println("Phone: " + e.getMessage());

  }

  // 有一个 Optional 列表

  List> list = List.of(Optional.empty(),

  Optional.of("Kishori"),

  Optional.empty(),

  Optional.of("Sharan"),

  Optional.empty());

  // 统计列表中空的 Optional 数量

  long emptyCount = list.stream()

  .filter(Optional::isEmpty)

  .count();

  System.out.println("Empty name count: " + emptyCount);

  }

  }

  fn1: Kishori Sharan

  fn2: Kishori Sharan

  Phone: No value present

  Empty name count: 3

  清单 8-4

  测试 Optional 类中的新方法

  ```


  请注意，在统计列表中空名称时使用了 `Optional::isEmpty` 方法引用：


  ```

  long emptyCount = list.stream()

  .filter(Optional::isEmpty)

  .count();

  ```


  在 Java 11 之前，你必须使用 `isPresent()` 方法，代码编写如下：


  ```

  long emptyCount = list.stream()

  .filter(n -> !n.isPresent())

  .count();

  ```


  Java 11 在 `Predicate<T>` 接口中新增了一个 `not()` 静态方法，该方法返回指定谓词的否定形式。其声明为：


  ```

  static  Predicate not(Predicate target)

  ```


  使用 `Predicate<T>` 接口中的 `not()` 静态方法，你可以将之前的语句重写如下：


  ```

  long emptyCount = list.stream()

  .filter(Predicate.not(Optional::isPresent))

  .count();

  ```


  当你想要否定一个方法引用时，`not()` 静态方法就派上了用场，就像你在上一条语句中否定 `Optional::isPresent` 方法引用一样。


  ## 紧凑数字格式


  Java 12 在 `java.base` 模块的 `java.text` 包中添加了一个 `CompactNumberFormat` 类。它是 `NumberFormat`
  类的子类。它可以将十进制数字格式化为其紧凑形式。数字的紧凑形式适用于显示空间有限的情况。例如，与其将十亿显示为 1000000000，不如将其显示为 1B 或
  1 billion 这样的紧凑形式。紧凑数字格式由 Unicode 区域设置数据标记语言 (LDML) 定义，详见 [`http://unicode.org/reports/tr35/tr35-numbers.html#Compact_Number_Formats`](http://unicode.org/reports/tr35/tr35-numbers.html%2523Compact_Number_Formats)。


  使用 `NumberFormat` 类中的 `getCompactNumberInstance()` 工厂方法来获取 `CompactNumberFormat`
  类的实例：


  *   `NumberFormat getCompactNumberInstance()`


  *   `NumberFormat getCompactNumberInstance`​`(Locale, NumberFormat.Style formatStyle)`


  无参的 `getCompactNumberInstance()` 方法使用默认区域设置和短数字格式。


  清单 8-5 包含一个完整的程序，用于演示数字的紧凑格式格式化。该程序在英语-美国、德语-德国和印地语-印度区域设置中格式化两个整数。请注意不同区域设置中数字的舍入情况。


  ```

  // CompactNumbers.java

  package com.jdojo.misc;

  import java.text.NumberFormat;

  import java.util.Locale;

  import static java.text.NumberFormat.Style.LONG;

  import static java.text.NumberFormat.Style.SHORT;

  public class CompactNumbers {

  public static void main(String[] args) {

  printCompact(24000, Locale.US);

  printCompact(1969, Locale.US);

  printCompact(24000, Locale.GERMANY);

  printCompact(1969, Locale.GERMANY);

  Locale hindiIndia = new Locale("hi", "IN");

  printCompact(24000, hindiIndia);

  printCompact(1969, hindiIndia);

  }

  public static void printCompact(int num, Locale locale) {

  NumberFormat shortFormatter

  = NumberFormat.getCompactNumberInstance(locale, SHORT);

  NumberFormat longFormatter

  = NumberFormat.getCompactNumberInstance(locale, LONG);

  String shortStr = shortFormatter.format(num);

  String longStr = longFormatter.format(num);

  System.out.printf("%s: %d, %s, %s%n",

  locale, num, shortStr, longStr);

  }

  }

  en_US: 24000, 24K, 24 thousand

  en_US: 1969, 2K, 2 thousand

  de_DE: 24000, 24.000, 24 Tausend

  de_DE: 1969, 1.969, 2 Tausend

  hi_IN: 24000, 24 हज़ार, 24 हज़ार

  hi_IN: 1969, 2 हज़ार, 2 हज़ार

