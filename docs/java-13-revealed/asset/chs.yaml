  \ Update 66*、*1.8.0_66* 和 *JDK 8u66* 的版本之间有什么区别？它们代表同一个版本。在你能够说出版本字符串中包含的详细信息之前，有必要详细了解版本命名方案。例如，在\
  \ JDK 1.5.0 的初始版本之后，更新版本号中 20 的倍数表示与奇数更新号不同类型的更新。本节中的文本并未提供足够的信息让你完全理解 JDK 版本字符串方案。有关\
  \ JDK 9 之前 JDK 版本字符串方案的更多详细信息，请参考以下网页：\n\n*   [`www.oracle.com/technetwork/java/javase/versioning-naming-139433.html`](http://www.oracle.com/technetwork/java/javase/versioning-naming-139433.html)\n\
  *   [`www.oracle.com/technetwork/java/javase/overview/jdk-version-number-scheme-1918258.html`](http://www.oracle.com/technetwork/java/javase/overview/jdk-version-number-scheme-1918258.html)\n\
  \n## 新版版本字符串方案\n\nJDK 9 试图标准化 JDK 版本命名方案，使其易于人类理解、易于程序解析，并遵循行业标准的版本命名方案。\n\nJDK\
  \ 9 添加了一个名为 `Runtime.Version` 的静态嵌套类，它表示 Java SE 平台实现的版本字符串。该类可用于表示、解析、验证和比较版本字符串。\n\
  \n一个*版本字符串*按顺序包含以下四个元素。只有第一个元素是必需的：\n\n*   版本号（`$vnum`）\n*   预发布信息（`$pre`）\n*  \
  \ 构建信息（`$build`）\n*   附加信息（`$opt`）\n\n以下正则表达式定义了版本字符串的格式：\n\n```\n$vnum(-$pre)?(\\\
  +($build)?(-$opt)?)?\n```\n\n一个*短版本字符串*由一个版本号组成，可选地后跟预发布信息：\n\n```\n$vnum(-$pre)?\n\
  ```\n\n你可以拥有像 `\"9\"` 和 `\"10\"` 这样仅包含功能版本号的短版本字符串，也可以拥有像 `\"10.0.1.2-ea+40-20180201.07.36am\"\
  ` 这样包含版本字符串所有部分的长版本字符串。我编造了这个长版本字符串，以向你展示版本字符串的所有元素。通常，预发布版本（版本字符串中包含 -ea）没有更新和补丁版本。后续章节将详细解释版本字符串的所有部分及其子部分。\n\
  \n\n\n### 版本号\n\n版本号是由句点分隔的元素序列。其长度可以是任意的。格式如下：\n\n```\n^[1-9][0-9]*(((\\.0)*\\\
  .[1-9][0-9]*)*)*$\n```\n\n版本号可由一至四个或更多元素组成，具体如下。第五个及后续元素没有特定含义；JDK 供应商可用它们来标识供应商特定的补丁。版本号的格式如下：\n\
  \n```\n$feature.$interim.$update.$patch(.$addtionalInfo)\n```\n\n`$feature` 元素在\
  \ JDK 9 中被称为 `$major`。它是一个功能发布计数器，每发布一个功能版本就增加 1。功能版本代表 JDK 发布的主要版本，并包含新功能。例如，JDK\
  \ 10 的功能版本是 10，JDK 11 的功能版本是 11。当功能编号增加时，版本号中的所有其他部分都会被移除。例如，如果你有一个版本号 10.0.2.1，当功能计数器从\
  \ 10 增加到 11 时，新的版本号将是 11。采用 6 个月发布模式后，`$feature` 将从 2018 年 3 月开始，每年 3 月和 9 月增加 1。因此，2018\
  \ 年 3 月的版本是 JDK 10，2018 年 9 月的版本是 JDK 11，2019 年 3 月的版本是 JDK 12，依此类推。\n\n`$interim`\
  \ 元素在 JDK 9 中被称为 `$minor`。它代表一个非功能版本，包含兼容的错误修复和增强。临时版本不会包含任何不兼容的更改、功能移除或对标准 API\
  \ 的任何更改。`$interim` 的值（如果存在）始终为零，因为在 6 个月发布模式下不会有临时版本。未来，发布模式可能会改变，开始包含临时版本，届时将使用\
  \ `$interim`。\n\n`$update` 元素在 JDK 9 中被称为 `$security`。对于修复安全漏洞、回归问题以及较新功能中错误的兼容性更新版本，该值会增加。\n\
  \n`$patch` 元素代表一个紧急补丁版本，包含针对关键问题的修复。\n\n以下规则适用于版本号：\n\n*   所有元素必须是无符号整数。\n\n*  \
  \ 只有 `$feature` 是必需的。\n\n*   版本号的元素不能包含前导零。例如，JDK 10 的第二个更新版本是 10.0.2，而不是 10.0.02。\n\
  \n*   尾部元素不能为零。也就是说，你不能有一个版本号如 10.0.0.0。它可以是 10、10.0.1、10.0.0.1 等。\n\n*   当一个元素增加时，所有后续元素都会被移除。假设当前\
  \ JDK 版本是 10.0.1.4。如果更新计数器从 1 增加到 2，补丁计数器 4 将被重置为零，因此被移除，版本号变为 10.0.2。如果功能计数器增加到\
  \ 11，所有其他计数器将被移除，版本号将从 10.0.1.4 变为 11。\n\n*   两个版本号通过从左到右比较各自的计数器进行比较。例如，10.0.4.1\
  \ 大于 10.0.3.5，但小于 10.0.4.2。\n\n### 预发布信息\n\n版本字符串中的 `$pre` 元素是一个预发布标识符，例如 `ea` 表示早期访问版本，`snapshot`\
  \ 表示预发布快照，`internal` 表示开发者内部构建。它是可选的。如果存在，则以连字符（`-`）为前缀，并且必须是字母数字，匹配正则表达式 `([a-zA-Z0-9]+)`。版本字符串\
  \ \"10-ea\" 包含版本号 10 和预发布标识符 `ea`。\n\n### 构建信息\n\n版本字符串中的 `$build` 元素是一个构建编号，每次推广构建时递增。它是可选的。当版本号的任何部分递增时，它会被重置为\
  \ 1。如果存在，则以加号（+）为前缀，并且必须匹配正则表达式 `(0|[1-9][0-9]*)`。版本字符串 \"10-ea+40\" 包含构建编号 40。\n\
  \n### 附加信息\n\n版本字符串中的 `$opt` 元素包含额外的构建信息，例如内部构建的日期和时间。它是可选的。它是字母数字，可以包含连字符和句点。如果存在，则以连字符（`-`）为前缀，并且必须匹配正则表达式\
  \ `([-a-zA-Z0-9\\.]+)`。如果 `$build` 不存在，你需要用加号后跟连字符（`+-`）作为 `$opt` 的前缀。例如，在 \"10-ea+40-2018-02-19\"\
  \ 中，`$build` 是 40，`$opt` 是 \"2018-02-19\"；在 \"9+-123\" 中，`$pre` 和 `$build` 不存在，`$opt`\
  \ 是 123。版本字符串 \"10-ea+40-20180219.07.36am\" 在其附加信息元素中嵌入了版本的日期和时间。\n\n## 解析新旧版本字符串\n\
  \n在 JDK 9 之前，JDK 版本要么是包含新功能和非安全修复的有限更新版本，要么是仅包含安全漏洞修复的关键补丁更新。版本字符串包括版本号（包含更新编号和构建编号）。有限更新版本以\
  \ 20 的倍数编号。关键补丁更新使用奇数，这些奇数是通过将先前有限更新版本加上 5 的倍数计算得出，并在需要时加 1 以保持结果为奇数。一个例子是 1.8.0_31-b13，这是\
  \ JDK 主版本 8 的更新 31。其构建编号是 13。请注意，在 JDK 9 之前，版本字符串总是以 1 开头。\n\n你现有的用于解析版本字符串以获取 JDK\
  \ 版本功能版本的代码，在 JDK 9 及更高版本中可能会失败，具体取决于其使用的逻辑。例如，如果逻辑通过跳过第一个元素（在 JDK 9 之前始终为 1）来查找第二个元素处的功能版本，则该逻辑将失败。例如，如果它从\
  \ 1.8.0 返回 8，那么现在它将从 10.0.1.0 返回 0，而你可能期望的是 10。\n\n## 系统属性的变更\n\n在 JDK 9 中，包含 JDK\
  \ 版本字符串的系统属性返回的值已更改。表 2-1 列出了这些系统属性及其值的格式。表中的 `$vstr`、`$vnum` 和 `$pre` 分别表示版本字符串、版本号和预发布信息。\n\
  \n表 2-1\n\nJDK 9 中系统属性及其变更后的值\n\n| 系统属性名称 | 值 |\n| --- | --- |\n| `java.version`\
  \ | `$vnum(\\-$pre)?` |\n| `java.runtime.version` | `$vstr` |\n| `java.vm.version`\
  \ | `$vstr` |\n| `java.specification.version` | `$vnum` |\n| `java.vm.specification.version`\
  \ | `$vnum` |\n\nJDK 10 新增了两个系统属性：\n\n*   `java.version.date`\n\n*   `java.vendor.version`\n\
  \n`java.version.date` 系统属性包含当前 JDK 版本的 GA 日期，格式为 ISO-8601 `YYYY-MM-DD`。对于早期访问版本，这是该版本计划的\
  \ GA 日期。此系统属性可让你了解你的 JDK 有多旧。当你使用 `\"java --version\"` 和其他命令打印 JDK 版本时，也会打印其值。\n\
  \n`java.vendor.version` 系统属性是供应商特定的产品版本字符串。它是可选的，由 JDK 供应商分配。如果设置了该值，则必须匹配正则表达式\
  \ `\\p{Graph}+`，该表达式允许一个或多个字母数字和标点符号。在开放 JDK 中，它被设置为 `$year.$month`，表示 JDK 版本的年份和月份。例如，在\
  \ JDK 10 中，它被设置为 18.3，表示 2018 年 3 月发布的 JDK。当你使用 `\"java --version\"` 和其他命令打印 JDK\
  \ 版本时，也会打印其值。\n\n\n\n## 使用 Runtime.Version 类\n\nJDK 9 新增了一个名为 `Runtime.Version`\
  \ 的静态嵌套类，其实例代表版本字符串。该类没有公共构造方法。你可以通过以下两种方式获取该类的实例：\n\n*   使用 `Runtime` 类的静态 `version()`\
  \ 方法\n*   使用 `Runtime.Version` 类的静态 `parse(String vstr)` 方法\n\n`Runtime` 类的静态 `version()`\
  \ 方法返回一个 `Runtime.Version`，它代表 JRE 的版本。以下代码片段打印了当前 JRE 的版本，表明我的 JRE 是功能版本 13 的早期访问构建版本\
  \ 29：\n\n```\nRuntime.Version version = Runtime.version();\nSystem.out.println(version);\n\
  13-ea+29\n```\n\n你可以使用 `Runtime.Version` 类的 `parse()` 方法来解析版本字符串并获取一个 `Runtime.Version`。如果指定的字符串不是有效的版本字符串，`parse()`\
  \ 方法会抛出 `IllegalArgumentException`：\n\n```\n// 解析版本字符串 \"12.0.1+12\"\nRuntime.Version\
  \ version = Runtime.Version.parse(\"12.0.1+12\");\nSystem.out.println(version);\n\
  12.0.1+12\n```\n\n`Runtime.Version` 类中的以下方法返回版本字符串的元素。方法名称直观，足以猜测它们返回的元素类型：\n\n\
  *   `int feature()`\n*   `int interim()`\n*   `int update()`\n*   `int patch()`\n\
  *   `Optional<String> pre()`\n*   `Optional<Integer> build()`\n*   `Optional<String>\
  \ optional()`\n\n**提示** `Runtime.Version` 类中的 `major()`、`minor()` 和 `security()`\
  \ 方法已在 JDK 10 中弃用。请改用该类的 `feature()`、`interim()` 和 `update()` 方法。\n\n请注意，对于可选元素\
  \ `$pre`、`$build` 和 `$opt`，返回类型是 `Optional`。对于可选的 `$interim`、`$update` 和 `$patch`\
  \ 元素，返回类型是 `int`，而不是 `Optional`，如果它们在版本字符串中不存在，则返回零。\n\n版本字符串中的版本号在第四个元素之后可能包含附加信息。`Runtime.Version`\
  \ 类不包含直接获取附加信息的方法。它包含一个 `version()` 方法，该方法返回一个 `List<Integer>`，其中列表包含版本号的所有元素。列表中的前四个元素依次是\
  \ `$feature`、`$interim`、`$update` 和 `$patch`。其余元素是附加的版本号信息。该列表至少包含一个元素，即功能版本号（`$feature`）。\n\
  \n`Runtime.Version` 类包含用于比较两个版本字符串的顺序和相等性的方法。你可以选择是否包含可选的构建信息（`$opt`）进行比较。这些比较方法如下：\n\
  \n*   `int compareTo(Runtime.Version v)`\n*   `int compareToIgnoreOptional(Runtime.Version\
  \ v)`\n*   `boolean equals(Object v)`\n*   `boolean equalsIgnoreOptional(Object\
  \ v)`\n\n表达式 `v1.compareTo(v2)` 将返回一个负整数、零或正整数，具体取决于 `v1` 是小于、等于还是大于 `v2`。`compareToIgnoreOptional()`\
  \ 方法的工作方式与 `compareTo()` 方法相同，区别在于它在比较时会忽略可选的构建信息。`equals()` 和 `equalsIgnoreOptional()`\
  \ 方法分别在有和没有可选构建信息的情况下比较两个版本字符串是否相等。\n\n哪个版本字符串代表最新的构建版本，`10.0.1.1` 还是 `10.0.1.1-ea`？第一个不包含预发布元素，而第二个包含，因此第一个是最新的构建版本。哪个版本字符串代表最新的构建版本，`10.0.1.1`\
  \ 还是 `10.0.1.2-ea`？这次，第二个代表最新的构建版本，因为版本号 `10.0.1.1` 被认为小于 `10.0.1.2`。当版本号更大时，版本字符串中的其他元素不再进行比较。以下是比较两个版本字符串的详细规则：\n\
  \n*   比较按以下顺序进行：`$vnum`、`$pre`、`$build` 和 `$opt`。\n*   比较从版本号的每个元素开始。如果版本号中的任何部分缺失，则假定为零。从功能版本号开始，如果第一个版本字符串中的任何元素大于第二个版本字符串中的对应元素，则第一个版本字符串更大。例如，10.0.1.1\
  \ 小于 11。\n*   如果两个版本字符串的版本号相同，则比较预发布元素。带有预发布元素的版本字符串总是小于不带预发布元素的版本字符串。如果预发布元素仅由数字组成，则进行数值比较；否则，按字典顺序进行比较。数字预发布元素被认为小于非数字预发布元素。\n\
  *   没有构建号的版本总是小于有构建号的版本。如果两个版本字符串都有构建号，则按数值进行比较。\n*   带有附加信息元素（`$opt`）的版本被认为大于不带\
  \ `$opt` 的版本。否则，按字典顺序比较 `$opt` 的值。\n\n本章中的程序位于 `jdojo.version.scheme` 模块中，如清单 2-1\
  \ 所示。\n\n```\n// module-info.java\nmodule jdojo.version.scheme {\n    exports com.jdojo.version.scheme;\n\
  }\n清单 2-1\n一个名为 jdojo.version.scheme 的模块\n```\n\n清单 2-2 包含一个完整的程序，演示如何使用 `Runtime.Version`\
