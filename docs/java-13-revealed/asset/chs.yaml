  \ 表达式里处理新的枚举常量 `AMBER`，才能消除这个错误。\n\n在 Java 中，表达式必须求值为一个值或抛出一个异常。这条规则同样适用于 switch\
  \ 表达式，编译器会检查每个 switch 标签是否产生一个值或抛出一个异常。如果某个 switch 标签可能不产生值，就会发生编译时错误。请考虑清单 5-7\
  \ 中的代码。你能找出 `SwitchExpressionCompletion` 类中的编译时错误吗？\n\n```\n// SwitchExpressionCompletion.java\n\
  package com.jdojo.enhancedswitch;\nimport java.time.LocalDate;\npublic class SwitchExpressionCompletion\
