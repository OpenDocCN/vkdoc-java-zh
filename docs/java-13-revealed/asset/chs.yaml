  }\n}\n清单 5-7\n一个 SwitchExpressionCompletion 类\n```\n\n编译 `SwitchExpressionCompletion`\
  \ 类会产生以下错误：\n\n```\nC:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\com\\\
  jdojo\\enhancedswitch\\SwitchExpressionCompletion.java:18: error: switch rule completes\
  \ without providing a value\n}\n(switch rules in switch expressions must either\
  \ provide a value or throw)\nC:\\Java13Revealed\\src\\jdojo.enhancedswitch\\classes\\\
  com\\jdojo\\enhancedswitch\\SwitchExpressionCompletion.java:22: error: switch rule\
  \ completes without providing a value\n}\n(switch rules in switch expressions must\
  \ either provide a value or throw)\n```\n\n错误指向了 `\"case 3->\"` 和 `\"default->\"\
  ` 标签的结尾。编译器断定这两个标签在所有可能的执行路径中都没有产生值或抛出异常。当当前年份不是 2019 年时，`\"case 3->\"` 不会产生值或抛出异常。`\"\
  default->\"` 不会产生值或抛出异常。当你的 switch 表达式中存在这些逻辑错误时，编译器会帮助你。\n\n这意味着你不能在 switch 表达式中使用控制转移语句，例如\
  \ `break`、`continue` 和 `return`。你可以使用 `break` 语句跳出 switch 语句。请记住以下两条规则：\n\n*   switch\
  \ 语句只使用 `break` 语句，从不使用 `yield` 语句。\n\n*   switch 表达式只使用 `yield` 语句，从不使用 `break`\
  \ 语句。\n\n\n\n## Switch 表达式是一种多态表达式\n\nJava 中的多态表达式是一种其类型取决于上下文的表达式。因此，同一个多态表达式在不同上下文中可以呈现不同的类型。`switch`\
  \ 表达式就是一种多态表达式。如果其目标类型已知，则其类型即为该目标类型。如果其目标类型未知，则其类型通过组合每个 `switch` 标签的类型来计算得出。请看以下代码片段：\n\
  \n```\nint count = 2;\ndouble value = switch (count) {\ncase 1-> 10;\ncase 2-> 20.4;\n\
  default-> 1.5F;\n};\n```\n\n这个 `switch` 表达式的目标类型是 `double`，也就是 `value` 变量的类型。因此，该\
  \ switch 表达式的类型是 `double`。编译器还会检查每个 `switch` 标签产生的值类型是否与 `switch` 表达式的目标类型赋值兼容。在此例中，`switch`\
  \ 标签分别产生了 `int` (10)、`double` (20.4) 和 `float` (1.5F) 类型的值。`int`、`double` 和 `float`\
  \ 这三种类型都与目标类型 `double` 赋值兼容。\n\n请看以下代码片段。它能编译通过吗？\n\n```\nint count = 2;\nint value\
  \ = switch (count) {\ncase 1-> 10;\ncase 2-> 20.4;\ndefault-> 1.5F;\n};\n```\n\n\
  这段代码无法编译通过。`switch` 表达式的目标类型是 `int`，也就是 `value` 变量的声明类型。而两个 `switch` 标签产生的 `double`\
  \ 和 `float` 类型的值与 `int` 类型不赋值兼容。这就是这段代码无法编译的原因。\n\n请看以下代码片段。它能编译通过吗？\n\n```\nint\
  \ count = 2;\nvar value = switch (count) {\ncase 1-> 10;\ncase 2-> 20.4;\ndefault->\
  \ 1.5F;\n};\n```\n\n这段代码可以正常编译。注意这里使用 `var` 来声明 `value` 变量。这次，`switch` 表达式的目标类型是未知的。编译器必须通过查看每个\
  \ `switch` 标签来计算 `switch` 表达式的类型。`switch` 标签产生了 `int`、`double` 和 `float` 类型的值。编译器使用类型拓宽规则，计算出\
  \ `double` 作为 `switch` 表达式的类型。请记住，由于使用了 `var`，编译器必须推断 `value` 变量的类型。该类型将被推断为 `double`，这与计算出的\
  \ `switch` 表达式类型相同。\n\n请看以下代码片段。它能编译通过吗？\n\n```\nint count = 1;\nvar value = switch\
  \ (count) {\ncase 1-> 10;\ncase 2-> 20.4;\ndefault-> \"what\";\n};\n```\n\n如果你猜测这段代码无法编译，那你就错了。它可以正常编译。现在你可能好奇这个\
  \ `switch` 表达式计算出的类型是什么。编译器使用以下步骤：\n\n*   switch 标签产生了三种类型的值：`int`、`double` 和 `String`。\n\
  \n*   这些类型是混合的——两种基本类型和一种引用类型。\n\n*   基本类型被提升为引用类型 `Integer` 和 `Double`。\n\n*  \
  \ 编译器查找 `Integer`、`Double` 和 `String` 之间的公共类型。编译器计算出一个类型，该类型是这三种类型所有公共类型的并集。这三种类型都实现了四个接口：`Serializable`、`Comparable`、`Constable`\
  \ 和 `ConstantDesc`。计算出的 `switch` 表达式类型是这四个接口的组合。\n\n那么，前面代码片段中 `switch` 表达式的类型是什么呢？如下所示：\n\
  \n```\nSerializable&Comparable&Constable&ConstantDesc>&Constable&ConstantDesc\n\
  ```\n\n这是一种不可表示类型。也就是说，只有编译器可以在字节码中使用这种类型。你不能在源代码中使用（或表示）这种类型。要亲自验证这一点，你可以使用 JShell\
  \ 运行这段代码。确保使用 `--enable-preview` 选项启动 JShell，并将反馈模式设置为 `verbose`，如下所示：\n\n```\n\
  C:\\Java13Revealed>jshell --enable-preview\n|  Welcome to JShell -- Version 13\n\
  |  For an introduction type: /help intro\njshell> /set feedback verbose\n|  Feedback\
  \ mode: verbose\njshell> int count = 2;\ncount ==> 2\n|  created variable count\
  \ : int\njshell> var value = switch (count) {\n...> case 1-> 10;\n...> case 2->\
  \ 20.4;\n...> default-> \"what\";\n...> };\nvalue ==> 20.4\n|  created variable\
  \ value : Serializable&Comparable&java.lang.constant.Constable&java.lang.constant.ConstantDesc>&java.lang.constant.Constable&java.lang.constant.ConstantDesc\n\
  jshell> /exit\n|  Goodbye\nC:\\Java13Revealed>\n```\n\n## yield 语句\n\n新的 `switch`\
  \ 表达式引入了一个名为 `yield` 语句的新语句。将 `yield` 作为语句对现有代码有一些影响。如果你有一个使用非限定语法调用的 `yield()`\
  \ 方法，它可能会破坏现有代码。让我们通过一个例子来理解这条规则。考虑以下 `yield` 语句：\n\n```\nyield(10);\n```\n\n在 `yield`\
  \ 成为语句之前，这绝对是一个方法调用。也就是说，它会通过传递值 10 来调用一个名为 `yield` 的方法。\n\n引入 `switch` 表达式之后，该语句将被解释为一个产生值\
  \ 10 的 `yield` 语句，并且它只允许在 `switch` 表达式中使用。请注意，在 10 周围使用括号并不会使其成为方法调用，因为现在 `yield`\
  \ 是一个语句，而 (10) 是其值。以下所有变体都将被视为 `yield` 语句——空格和括号没有区别：\n\n```\nyield 10;\nyield (10);\n\
  yield(10);\n```\n\n如果你现有的代码中有非限定的 `yield()` 方法调用，你需要修改它们，使其成为限定的方法调用。也就是说，如果你现有的代码中有\
  \ `yield(x)`，你需要将其更改为 `xxx.yield(x)`，其中 `xxx` 可以是 `this`、类名或引用变量名，具体取决于上下文。\n\n\
  随着 `switch` 表达式的引入，`yield` 成为一个*受限标识符*。它在某些上下文中的使用受到限制。你不能将 `yield` 用作类型名称，例如类名或接口名。但是，你可以将\
  \ `yield` 用作方法名和变量名。为了向后兼容，允许将 `yield` 用作方法，因为 Java 中的 `Thread` 类包含一个 `yield` 方法，并且在极少数情况下，你可能已经将你的方法命名为\
  \ `yield`。\n\n清单 5-8 包含一个完整的程序，展示了如何将 yield 用作方法/变量名以及如何调用此类方法。你必须使用 `NoYieldAsTypeName.yield()`\
  \ 语法来调用 `yield()` 方法。\n\n```\n// NoYieldAsTypeName.java\npackage com.jdojo.enhancedswitch;\n\
  public class NoYieldAsTypeName {\npublic static void main(String[] args) {\n// 必须使用类名限定才能调用\
  \ yield() 方法\nNoYieldAsTypeName.yield();\nNoYieldAsTypeName.yield(100);\n// 以下非限定调用会产生编译时错误\n\
  //yield();\n//yield(10);\nint yield = 200;\nSystem.out.println(\"变量名 yield 是允许的:\
  \ \" + yield);\n}\npublic static void yield() {\nSystem.out.println(\"方法名 yield\
  \ 是允许的。\");\n}\npublic static void yield(int x) {\nSystem.out.println(\"方法名 yield\
  \ 是允许的: \" + x);\n}\n}\n方法名 yield 是允许的。\n方法名 yield 是允许的: 100\n变量名 yield 是允许的: 200\n\
  清单 5-8\n将 yield 用作方法和变量名\n```\n\n## 混合使用 Switch 标签语法\n\n声明 `switch` 标签有两种语法——一种使用冒号（`:`），一种使用箭头（`->`）。在一个\
  \ `switch` 中，你不能混合使用这两种语法。以下代码片段无法编译：\n\n```\nint count = 1;\nint value = switch\
  \ (count) {\ncase 1-> 10;\ncase 2: yield 20;\ndefault-> 30;\n};\n错误：switch 中使用了不同的\
  \ case 种类\ncase 2: yield 20;\n1 个错误\n```\n\n\n\n## 摘要\n\nJava SE 平台的一项预览特性是指一个完整定义且完整实现的语言或虚拟机特性，该特性在某个\
  \ JDK 功能发布版中可用，但尚未成为 JDK 的永久特性。提供预览特性是为了征求开发者的反馈。你必须在使用编译器和运行时环境时使用 `--enable-preview`\
  \ 选项才能使用预览特性。当你使用 `--enable-preview` 选项编译源代码时，还必须使用 `--release` 或 `-source` 选项。你必须在启动\
  \ JShell 时使用 `--enable-preview` 选项，才能在 JShell 中使用任何预览特性。\n\nJava 12 将增强型 `switch`\
  \ 作为一项预览特性引入。该特性在 Java 13 中仍作为预览特性，但有一处更改：Java 12 中带值的 `break` 语句被 Java 13 中的 `yield`\
  \ 语句所取代。\n\n在 Java 13 中，你有两种 `switch` 风格：传统的 `switch` 和新的 `switch`。在新的 `switch`\
  \ 中，你使用箭头（`->`）来分隔 switch 标签及其代码，而在旧的 switch 中则使用冒号（`:`）。你不能在同一个 `switch` 中混合使用这两种\
  \ switch 标签语法。增强型 `switch` 既可以作为语句使用，也可以作为表达式使用。\n\n新的 `switch` 在编写和调试代码时让开发者的工作稍微轻松了一些。它没有\
  \ `default` 穿透——一次只能执行一个 `switch` 标签。与 `switch` 标签关联的代码可以是一个表达式、一个块语句或一个 `throw`\
  \ 语句。\n\n增强型 `switch`——无论是传统的 `switch` 还是新的 `switch`——都允许在 `case` 标签中使用多个以逗号分隔的\
  \ case 常量。\n\n为了支持 `switch` 表达式，Java 13 添加了一个名为 `yield` 语句的新语句。它只能在 `switch` 表达式中使用，以产生一个值。`yield`\
  \ 语句产生的值将成为 `switch` 表达式的值。在 `switch` 表达式中不允许使用诸如 `break`、`continue` 和 `return`\
  \ 之类的控制转移语句。\n\n编译器会检查 `switch` 表达式中 `selector-expression` 的所有可能值是否都被 `switch` 标签覆盖。否则，将发生编译时错误。如果\
  \ `switch` 表达式基于枚举类型，并且所有枚举常量都被 `switch` 标签覆盖且没有 `default` 标签，则编译器会添加一个抛出 `IncompatibleClassChangeError`\
  \ 的 `default` 标签。当向枚举中添加新常量，并且使用新的枚举常量执行 switch 表达式时，这个隐式的 `default` 标签有助于你调试代码。隐式的\
  \ `default` 标签会提供更好的错误消息，帮助你快速定位问题。\n\n`switch` 表达式是一个多态表达式，其类型取决于上下文。如果 `switch`\
  \ 表达式有已知的目标类型，则 `switch` 表达式的类型就是该目标类型。如果目标类型未知，则会通过组合所有 `switch` 标签产生的值的类型来计算出一个独立类型。\n\
  \n`yield` 是一个*受限标识符*。你不能将 `yield` 用作类型名称，例如类名或接口名。但是，你可以将 `yield` 用作方法名和变量名。你不能将未限定的\
  \ `yield()` 作为方法调用。如果你现有的代码包含未限定的 `yield()` 方法调用，则需要将它们更改为限定的方法调用，以避免编译时错误。\n\n"
- "# 6. 文本块\n\n在本章中，你将学习\n\n*   什么是文本块\n*   如何在代码中表示文本块\n*   文本块的格式化规则\n*   对 `String`\
  \ API 的更改以支持文本块\n*   如何检测文本块中空格的不一致使用\n\n## 背景\n\n你编写 Java 程序时很少有不处理字符串的情况。自 1.0\
  \ 版本以来，Java 就支持将字符串作为 `String` 类的实例。它还支持 `String` 字面量，这些字面量是用双引号括起来的零个或多个字符的序列。`String`\
  \ 字面量在源代码中表示，并且是 `String` 类的实例。使用 `String` 字面量最大的痛点在于：\n\n*   如果一个字符串字面量无法放入一行，你需要将其拆分成更小的字符串，并使用字符串连接运算符（`+`）将它们重新组合成一个字符串。\n\
  *   如果你有一个包含行终止符的字符串，你需要在字符串中将换行符嵌入为转义序列（`\\n`），并使用字符串连接运算符（`+`）。\n*   如果你的字符串包含双引号，你需要在字符串中使用转义序列\
  \ `\\\"` 来表示它们。\n\n使用 `String` 字面量的这些问题使得用字符串编写 Java 代码变得繁琐，并且存在巨大的可读性问题。假设你想表示一个包含三个城市的列表——每个城市占一行。以下是使用\
  \ `String` 字面量实现的方法：\n\n```\nString cities = \"Panama\\nParis\\nPatna\\n\";\n```\n\
  \n你可能同意这不太可读。你失去了它包含三行——每行包含一个城市名称——的视觉感。以下是实现相同目标的另一种尝试：\n\n```\nString cities\
  \ = \"Panama\\n\" +\n\"Paris\\n\" +\n\"Patna\\n\";\n```\n\n这一次，可读性稍好一些，但仍然包含转义序列（`\\\
  n`）形式的视觉杂乱。你能猜出以下 `String` 字面量表示的字符串吗？\n\n```\nString quote = \"\\\"A fool thinks\
  \ of himself to be wise. \" +\n\"But a wise man knows himself to be a fool.\\\"\\\
  n\" +\n\"–William Shakespeare\\n\";\n```\n\n这个 `String` 字面量表示以下威廉·莎士比亚的名言：\n\n>\
  \ *愚者自以为智，智者自知其愚。*\n\n> ——威廉·莎士比亚\n\n如果你能够像下面这样表示这句名言，岂不是更好？\n\n```\nString quote\
  \ = \"\"\"\n\"A fool thinks of himself to be wise. But a wise man knows himself\
  \ to be a fool.\"\n–William Shakespeare\n\"\"\";\n```\n\n如果你能够像下面这样表示三个城市的列表——每个城市占一行——岂不是更好？\n\
  \n```\nString cities = \"\"\"\nPanama\nParis\nPatna\n\"\"\";\n```\n\n在 Java 程序中像下面这样编写\
  \ HTML 代码，岂不是更简洁？\n\n```\nString html = \"\"\"\n\nHello, HTML\n\n\"\"\";\n```\n\n\
  使用 `String` 字面量来表示复杂的多行文本并不仅限于像三个城市的列表和一句名言这样的字符串。通常，Java 程序包含非 Java 代码，例如 SQL、JSON、XML\
  \ 和 HTML，这些代码以 `String` 字面量的形式存在。在 Java 中表示这些类型的代码一直很痛苦。一些开发者甚至将这些类型的代码放入文件中，打包到\
  \ JAR 中，并在运行时将文件读入 `String` 实例。这种方法让你摆脱了 `String` 字面量限制的束缚，但代价是增加了处理文件的额外麻烦！\n\n\
  解决 Java 开发者在用 `String` 字面量表示复杂的多行文本块时遇到的问题，一直是 Java 语言设计者相当长一段时间内的关注焦点。他们在 Java\
  \ 12 中作为语言预览特性添加了对原始字符串字面量的支持，但后来撤回了，因此它从未进入 Java 12。你可以在 JEP 326 的 [`https://openjdk.java.net/jeps/326`](https://openjdk.java.net/jeps/326)\
  \ 找到关于原始字符串字面量提案的详细信息。JEP 326 已被 JEP 355（[`https://openjdk.java.net/jeps/355`](https://openjdk.java.net/jeps/355)）取代，后者提议在\
  \ Java 13 中将文本块支持作为语言预览特性。在前面的示例中，当你使用 `\"\"\"` 来开始和结束字符串（例如将 HTML 代码表示为 `String`）时，你已经看到了文本块。文本块是本章讨论的主题。\n\
  \n\n\n## 什么是文本块？\n\n文本块是由起始定界符和结束定界符括起来的零个或多个字符序列。文本块的内容可以跨越多行，并且你无需使用大多数转义序列。以下是使用文本块的语法：\n\
  \n该语法允许将结束定界符放在单独的一行，或与文本块内容结束的同一行：\n\n起始定界符以三个双引号字符（`\"\"\"`）开头，后面可选地跟零个或多个空格、制表符或换页符，并以行终止符结束。\n\
  \n结束定界符由三个双引号字符（`\"\"\"`）组成。\n\n文本块的内容是从起始定界符的行终止符之后立即开始，到结束定界符的第一个双引号之前立即结束的字符序列。\n\
  \n文本块是 `String` 类的一个实例。在任何你使用过 `String` 字面量的地方，都可以使用文本块。以下是几个文本块的示例。每个示例都会打印文本块，以向你展示生成的字符串：\n\
  \n```\nString cities = \"\"\"\nPanama\nParis\nPatna\"\"\";\nSystem.out.println(cities);\n\
  Panama\nParis\nPatna\n```\n\n此文本块与 `String` 字面量 `\"Panama\\nParis\\nPatna\"` 相同。\n\
  \n如果你将结束定界符放在单独的一行，则会在文本块内容的末尾附加一个换行符（\\n）。以下文本块与 `String` 字面量 `\"Panama\\nParis\\\
  nPatna\\n\"` 相同：\n\n```\nString cities = \"\"\"\nPanama\nParis\nPatna\n\"\"\";\n\
  System.out.println(cities);\nPanama\nParis\nPatna\n```\n\n注意输出中的最后一行是一个空行，这是因为你将结束定界符放在了单独的一行。\n\
  \n考虑以下代码片段：\n\n```\nString cities = \"\"\"\nPanama\nParis\nPatna\n\"\"\";\nSystem.out.println(cities);\n\
  Panama\nParis\nPatna\n```\n\n你对输出感到惊讶吗？输出中的最后一行是空的，因为你将结束定界符放在了单独的一行。内容中的三行都向左缩进了\
  \ 16 个空格。这是因为你将结束定界符移到了行首。比较最后两个示例中结束定界符的位置。结束定界符的位置会影响文本块的格式。你需要掌握其背后的规则。我将在后续章节中解释文本块的所有格式规则。\n\
  \n### 提示\n\n文本块不是原始字符串——这意味着你输入的内容并不直接就是最终结果。文本块的内容会由编译器使用一组预定义的规则进行转换。\n\n让我们看几个在文本块中使用起始定界符的无效示例。回想一下，在起始定界符的三个双引号字符（`\"\
  \"\"`）之后，可以包含空格、制表符和换行符。你必须以行终止符结束它。`\"\"\"` 之后允许的字符是不可见字符。你不能为这些不可见字符使用转义序列。你只需在源代码中将其作为不可见字符输入即可。以下是无效的文本块，它们会产生编译时错误：\n\
  \n```\n// 起始定界符中缺少行终止符。\nString str = \"\"\"Hello\n\"\"\";\n// 起始定界符中缺少行终止符。你可以在起始定界符中输入制表符，\n\
  // 但不能使用转义序列 \\t。\nString str = \"\"\"\\t\nHello\n\"\"\";\n// 起始定界符中缺少行终止符。\nString\
  \ str = \"\"\"Hello\"\"\";\n```\n\n### 提示\n\n文本块中的起始定界符必须使用行终止符放在单独的一行，并且文本块的内容必须从下一行开始。\n\
  \n## 文本块是一项预览特性\n\n文本块是 Java 13 中的一项语言预览特性。有关预览特性的更多详细信息，请参阅第 5 章。第 5 章还解释了如何编译和运行使用\
  \ Java 预览特性的 Java 程序。\n\n## 文本块会被转换\n\n让我们从两个问题开始。文本块是原始字符串吗？文本块是多行 `String` 字面量吗？这两个问题的答案既是“是”也是“否”。在某种程度上，文本块既是原始字符串又是多行\
  \ `String` 字面量；在某种程度上，它两者都不是。为了澄清答案，让我们定义一下*原始*字符串和*多行* `String` *字面量*的含义。\n\n原始字符串意味着字符串不经过任何处理。术语*原始*意味着“不以任何方式改变”。这不是你从文本块中得到的结果。文本块在最终生成字符串之前会经过转换。因此，文本块肯定不是\
  \ 100% 的*原始*字符串。\n\n那么文本块是多行 `String` 字面量呢？同样，术语*字面量*意味着它被原样表示。文本块并非如此，因为它会被转换。\n\
  \n从另一方面来看，文本块确实保留了原始字符串的大部分（如果不是全部）内容，并允许你将字符串跨越多行。从这个意义上说，它部分是原始的和多行的。\n\n文本块有时被称为多行\
  \ `String` 字面量。即使是定义了文本块特性的 JEP 355，也将其称为多行 `String` 字面量。如果你想将其称为多行 `String` 字面量，我建议你称其为*带转换的多行*\
  \ `String` *字面量*，这能让读者真正理解它是什么。\n\n编译器使用一组预定义的规则来转换文本块的内容。转换后得到的字符串在类文件中被表示为 `String`\
  \ 字面量。运行时对文本块一无所知。现在你可能明白为什么我称其为*带转换的多行 String 字面量*了。\n\n\n\n### 提示\n\n在文本块中，你可以选择退出某些转换，而默认情况下，其他转换是自动启用的。文本块的自动转换旨在满足大多数常见场景的需求。\n\
  \n在解释文本块的转换规则之前，我们先通过一个完整的代码示例快速了解。本章中的所有程序都位于 `jdojo.textblock` 模块中，如代码清单 6-1 所示。\n\
  \n```\n// module-info.java\nmodule jdojo.textblock {\n    exports com.jdojo.textblock;\n\
  }\n代码清单 6-1\n名为 jdojo.textblock 的模块声明\n```\n\n代码清单 6-2 包含几个通过将结束分隔符放置在不同位置而输入的文本块。输出结果展示了生成的字符串。\n\
  \n```\n// TextBlocks.java\npackage com.jdojo.textblock;\npublic class TextBlocks\
  \ {\n    public static void main(String[] args) {\n        String html1 = \"\"\"\
  \n\n                <html>\n                    <body>\n                       \
  \ <p>Hello, HTML</p>\n                    </body>\n                </html>\n   \
  \             \"\"\";\n        System.out.println(\"html1:\\n\" + html1);\n    \
  \    String html2 = \"\"\"\n\n                <html>\n                    <body>\n\
  \                        <p>Hello, HTML</p>\n                    </body>\n     \
  \           </html>\n        \"\"\";\n        System.out.println(\"html2:\\n\" +\
  \ html2);\n        // 空字符串。等同于 \"\"\n        String empty1 = \"\"\"\n\"\"\";\n \
  \       System.out.println(\"empty1: \" + empty1);\n        System.out.println(\"\
  empty1.length(): \" + empty1.length());\n        // 空字符串。等同于 \"\"\n        String\
  \ empty2 = \"\"\"\n\"\"\";\n        System.out.println(\"empty2: \" + empty2);\n\
  \        System.out.println(\"empty2.length(): \" + empty2.length());\n        //\
  \ 看似空字符串，实则不然。等同于 \"\\n\"\n        String empty3 = \"\"\"\n\"\"\";\n        System.out.println(\"\
  empty3: \" + empty3);\n        System.out.println(\"empty3.length(): \" + empty3.length());\n\
  \    }\n}\nhtml1:\n\n<html>\n    <body>\n        <p>Hello, HTML</p>\n    </body>\n\
  </html>\n\nhtml2:\n\n<html>\n    <body>\n        <p>Hello, HTML</p>\n    </body>\n\
  </html>\n\nempty1:\nempty1.length(): 0\nempty2:\nempty2.length(): 0\nempty3:\nempty3.length():\
  \ 1\n代码清单 6-2\n文本块示例\n```\n\n至此，你应该已经确信，文本块中结束分隔符的位置对文本块内容的转换方式有显著影响。转换作用于内容中的空白字符——部分是为了跨平台的一致性，部分是为了覆盖常见用例。我们来看以下\
  \ HTML 代码：\n\n```\nString html = \"\"\"\n\n        <html>\n            <body>\n\
  \                <p>Hello, HTML</p>\n            </body>\n        </html>\n    \
  \    \"\"\";\n```\n\n这段 HTML 代码包含大量空格。在源代码中，空格是不可见的。为了直观显示空格，我将其重写，用点号表示空格：\n\n\
  ```\nString html = \"\"\"\n..............\n......................\n......................<p>Hello,\
  \ HTML.</p>\n.....................\n................\n..............\"\"\";\n```\n\
  \n第一行包含 14 个前导空格且无尾随空格，第二行包含 18 个前导空格和 4 个尾随空格，第三行包含 22 个前导空格和 1 个尾随空格，以此类推。\n\n\
  这段代码的作者很可能并不希望内容中的任何一行使用前 14 个前导空格。这些空格是缩进的一部分，用于使代码内容与其他代码部分对齐。第二行 `<body>` 前的四个空格很可能是预期缩进的一部分，开发者希望保留它们。毫无疑问，开发者不希望内容中的任何一行有尾随空格；它们的存在很可能是因为从其他来源复制粘贴所致。如果你必须揣测开发者希望存储在\
  \ `html` 变量中的字符串意图，你可能会猜测如下结果，其中不包含 14 个前导空格，也不包含任何尾随空格。为了更直观地展示，我用点号表示空格：\n\n```\n\
  ....\n........<p>Hello, HTML</p>\n....\n```\n\n你在代码清单 6-2 中 `html1` 变量的输出结果不正是这样吗？是的，确实如此。文本块的转换规则默认覆盖了这类常见情况。我们来看代码清单\
  \ 6-2 中 `html2` 变量的文本块，同样用点号表示空格以便更直观地展示：\n\n```\nString html2 = \"\"\"\n...............\n\
  ...................\n.......................<p>Hello, HTML</p>\n...................\n\
  ...............\n.............\"\"\";\n```\n\n内容的第一行包含 15 个前导空格，第二行 19 个，第三行 23\
  \ 个，第四行 19 个，第五行 15 个，第六行 13 个。内容中任何一行都不包含尾随空格。转换后的结果字符串与你之前在代码清单 6-2 中 `html2`\
  \ 变量的输出结果相同。以下是文本块所表示的字符串。为了更直观地展示，我用点号表示空格：\n\n```\n..\n......\n..........<p>Hello,\
  \ HTML</p>\n......\n..\n```\n\n在这个文本块中，编译器假设开发者希望每行内容左对齐，第一行以两个空格开头，并使用四个空格来嵌套 HTML\
  \ 标签。这是编译器在转换过程中所做的假设。\n\n在 Java 程序中，通常会将文本块的内容与程序的其他部分（如变量名、赋值运算符和开始分隔符中的第一个双引号）垂直对齐。这些空白字符会作为每行内容的前导空白出现。一行中也可能出现非预期的尾随空白。前导空白可能用于缩进目的，例如在\
  \ HTML 代码中缩进嵌套标签。\n\n开发者希望转换后保留在内容中的文本块空白字符称为**必要空白**。内容中作为源代码缩进一部分存在，但开发者不希望保留在最终字符串中的空白字符称为**附带空白**。\n\
  \n编译器会从内容中的所有非空行中移除附带空白。结束分隔符的起始位置可用于控制文本块中的附带空白。尾随空白始终被视为附带空白，编译器会将其全部移除。在接下来的几节中，我将解释编译器用于转换文本块的规则。\n\
  \n## 转换规则\n\n编译器分三个阶段转换文本块。每个阶段处理不同类型的字符，并服务于不同的目的。按顺序对以下类型的字符进行转换：\n\n*   行终止符\n\
  *   附带空白\n*   转义序列\n\n让我们深入探讨每种转换类型。这些规则起初可能有些令人不知所措。如果你不理解某些规则，不必担心。在介绍每条规则后，我会提供多个示例，详细解释规则中的每一步，并展示转换前后的字符串。\n\
  \n\n\n### 转换行终止符\n\n不同平台的行终止符各不相同。Windows 使用回车符（CR）和回车换行符（CRLF）作为行终止符。类 UNIX 操作系统使用换行符（LF）作为行终止符。CR\
  \ 由 ASCII 十进制数 13、Unicode 转义序列 `\\u000D`、八进制转义序列 `\\015` 以及转义序列 `\\r` 表示。LF 由 ASCII\
  \ 十进制数 10、Unicode 转义序列 `\\u000A`、八进制转义序列 `\\012` 以及转义序列 `\\n` 表示。LF 也被称为换行字符。\n\n\
  考虑以下文本块：\n\n```\n\"\"\"\nHello\nTerminator\n\"\"\"\n```\n\n这个文本块中有多少个字符——15、17、19\
  \ 还是其他？仅通过查看这个文本块很难确定确切的字符数。答案取决于编写此文本块所使用的平台。你可以看到 15 个可见字符——`Hello` 占 5 个，`Terminator`\
  \ 占 10 个。内容中的两行各有一个行终止符，虽然不可见，但你能看到其效果。回想一下，行终止符可能是一个或两个字符，具体取决于平台。如果你在 Windows\
  \ 上编辑此文本块，不可见的行终止符如下所示：\n\n```\n\"\"\"\nHelloCRLF\nTerminatorCRLF\n\"\"\"\n```\n\
  \n如果你在类 UNIX 操作系统上编辑此文本块，不可见的行终止符如下所示：\n\n```\n\"\"\"\nHelloLF\nTerminatorLF\n\"\
  \"\"\n```\n\n将 CR 和 LF 各计为一个字符，该文本块在 Windows 上包含 19 个字符，在类 UNIX 操作系统上包含 17 个字符。两个开发者在不同平台上编写相同的文本块，会得到不同的字符数。你可能会同意，这种差异既非本意，也不可接受。\n\
  \n文本块内容中的行终止符由编译器进行规范化处理。编译器将 CR 和 CRLF 替换为 LF。此转换确保具有相同视觉内容的文本块在不同平台上包含相同的最终字符串。这就是此阶段发生的全部操作。在此阶段转换后，无论平台或源代码编码如何，文本块的内容如下所示：\n\
  \n```\n\"\"\"\nHelloLF\nTerminatorLF\n\"\"\"\n```\n\n文本块可能包含转义序列，例如作为转义序列 `\\r`\
  \ 和 `\\n` 的 CR 和 LF，这些在此阶段保持不变。所有转义序列将在最后阶段进行转换。\n\n### 转换无关空白\n\n在此阶段之前，所有行终止符都已规范化为\
  \ LF。在此阶段，我将行终止符简称为行终止符，它始终指代 LF。本节中的所有示例文本块均使用点号来显示其内容中的空格。\n\n在此阶段，编译器会移除无关的前导和尾随空白。要从内容中所有非空行移除的前导空白数量计算如下：\n\
  \n*   计算时不考虑带有开始定界符的行。\n\n*   仅由空白组成的行称为空行，计算时不考虑这些行。空行可能仅包含一个行终止符，或包含带有行终止符的空白。\n\
  \n*   如果结束定界符单独放在一行（无论是否带有空白），则计算时会考虑该行。请注意，根据空行的定义，当你将结束定界符单独放在一行时，该行是一个空行。然而，就本次计算而言，它是一行重要的行，不会被忽略。\n\
  \n*   统计每个非空行上前导空白的数量。每个空白计为 1。也就是说，如果一行包含两个空格，另一行包含一个空格和一个制表符，则此步骤将这两行的前导空白都计为\
  \ 2。\n\n*   计算所有非空行的前导空白计数的最小值。假设你有五个非空行，其前导空白计数分别为 15、19、23、19、15 和 13。所有计数的最小值为\
  \ 13。\n\n*   从所有非空行中移除上一步计算出的最小空白数量。\n\n*   从所有行（不仅仅是非空行）中移除所有尾随空白。此步骤将移除非空行中的尾随空白。它还会将空行压缩为仅包含行终止符的空行。\n\
  \n#### 示例 1\n\n考虑以下文本块：\n\n```\nString html = \"\"\"\n..............\n......................\n\
  ......................Hello, HTML.\n.....................\n................\n..............\"\
  \"\";\n```\n\n所有非空行的前导空白计数分别为 14、18、22、18、14 和 14。结束定界符被单独放在一行，并且它被视为非空行，用于计算要从所有行中移除的空白数量。所有行的最小空白计数为\
  \ 14。因此，编译器从所有行中移除 14 个空白。编译器还会从四行中移除所有尾随空白。得到的字符串是：\n\n```\n....\n........Hello,\
  \ HTML\n....\n\n```\n\n#### 示例 2\n\n考虑以下文本块，其中结束定界符被放在行首：\n\n```\nString html =\
  \ \"\"\"\n..............\n......................\n......................Hello, HTML.\n\
  .....................\n................\n\"\"\";\n```\n\n得到的字符串会是什么？请记住，带有结束定界符的行始终参与最小空白计数的计算。在这种情况下，最后一行的空白计数为\
  \ 0。因此，所有非空行的前导空白计数分别为 14、18、22、18、14 和 0。最小空白计数为 0，这将导致编译器不移除任何前导空白。像往常一样，所有尾随空白都将被移除。得到的字符串如下所示：\n\
  \n```\n..............\n..................\n......................Hello, HTML\n..................\n\
  ..............\n```\n\n### 提示\n\n如果你想保留非空行上的所有前导空白，请将结束行终止符单独放在一行的开头。\n\n#### 示例\
  \ 3\n\n考虑以下文本块：\n\n```\nString html = \"\"\"\n..............\n......................\n\
  ......................Hello, HTML.\n.....................\n................\n............\"\
  \"\";\n```\n\n所有非空行的前导空白计数分别为 14、18、22、18、14 和 12。这些计数的最小值为 12，因此将从所有非空行中移除 12 个前导空白。像往常一样移除尾随空白。得到的字符串如下所示：\n\
  \n```\n..\n....\n........Hello, HTML\n....\n..\n```\n\n#### 示例 4\n\n考虑以下文本块，其中我将结束定界符向右放置了\
  \ 18 个空格：\n\n```\nString html = \"\"\"\n..............\n......................\n\
  ......................Hello, HTML.\n.....................\n................\n..................\"\
  \"\";\n```\n\n所有非空行的前导空白计数分别为 14、18、22、18、14 和 18。这些计数的最小值为 14，因此将从所有非空行中移除 14 个前导空白。像往常一样移除尾随空白。得到的字符串如下所示：\n\
  \n```\n....\n........Hello, HTML\n....\n\n```\n\n请注意，当结束定界符被单独放在一行，并且它起始于任何非空行上任何非空白字符的右侧时，结束定界符的位置在前导空白移除中不起任何作用。\n\
  \n\n\n#### 示例 5\n\n考虑以下文本块：\n\n```\nString html = \"\"\"\n..............\n......................\n\
  ......................Hello, HTML.\n.....................\n................\"\"\"\
  ;\n```\n\n在此例中，结束定界符的位置并不影响从所有行中移除的前导空格数量。所有非空行的前导空格数分别为 14、18、22、18 和 14。这些数值中的最小值为\
  \ 14，因此将从所有非空行中移除 14 个前导空格。尾随空格照常移除。得到的字符串如下：\n\n```\n....\n........Hello, HTML\n\
  ....\n\n```\n\n将最后一个示例与本部分的其他示例进行比较。当把结束定界符放在单独一行时，最后一个非空行以换行符（LF）作为最后一个字符。当把结束定界符与非空内容放在同一行时，最后一行不包含换行符作为字符。在此示例中，内容的最后一行以\
  \ `\"</html>..\"` 结尾，而在其他示例中，内容的最后一行以 `\"</html>LF\"` 结尾。\n\n#### 示例 6\n\n如何在文本块中表示空字符串？以下文本块表示空字符串：\n\
  \n```\nString empty1 = \"\"\"\n\"\"\";\nString empty2 = \"\"\"\n...............\
  \ \"\"\";\nString empty3 = \"\"\"\n......................\"\"\";\n```\n\n这些文本块不包含任何非空行。请记住，包含结束定界符的行始终是有效的。虽然会计算要从非空行中移除的空格数量，但由于没有非空行，因此不会使用该计算结果。在第二个和第三个文本块中，单独一行上的尾随空格会被折叠，从而得到空字符串。\n\
  \n#### 示例 7\n\n如何使用文本块表示字符串 `\"Hello\"`？以下所有文本块都表示字符串 `\"Hello\"`。内容行的缩进不会影响最终字符串。\n\
  \n```\nString str1 = \"\"\"\nHello\"\"\";\nString str2 = \"\"\"\nHello\"\"\";\n\
  String str2 =\n\"\"\"\nHello\"\"\";\n```\n\n以下文本块并不表示 `\"Hello\"`。相反，它表示 `\"Hello\\\
  n\"`，因为内容的第一行不仅仅是 `Hello`。它包含一个行终止符，该终止符会被规范化为换行符（`\\n`）。\n\n```\nString str = \"\
  \"\"\nHello\n\"\"\";\n```\n\n### 提示\n\n文本块可以表示任何可以使用 `String` 字面量表示的字符串。使用 `String`\
  \ 字面量来表示简单字符串，例如空字符串、作为字符串的换行符或单行字符串（如 \"`Hello, world\"`）。使用文本块表示这些字符串至少需要两行，并且可读性也不如\
  \ `String` 字面量。\n\n#### 示例 8\n\n考虑以下文本块，它不包含可见内容，但有一个空行：\n\n```\nString fakeEmpty\
  \ = \"\"\"\n......................\n....\"\"\";\n```\n\n此文本块的内容包含两行。第一行包含 22 个空格和一个换行符。第二行包含四个空格。这两行都被视为空行，不会用于移除前导空格。第二行包含结束定界符，其空格数为\
  \ 4，这也是最小的空格数，因为只有一行需要考虑。该文本块不包含任何非空行，因此最小前导空格数 4 不会应用于任何行。作为移除尾随空格的一部分，第一行中的所有\
  \ 22 个空格都会被移除，使其缩减为仅包含一个字符的空行——即规范化的行终止符（换行符）。得到的字符串将是 `\"\\n\"`。如果计算 `fakeEmpty`\
  \ 变量中的字符数，结果将为 1。眼见为实。以下代码片段显示文本块生成的字符串是 `\"\\n\"`：\n\n```\n// 定义一个包含一个带空格空行的文本块\n\
  String fakeEmpty = \"\"\"\n\"\"\";\nString LF = \"\\n\";\nSystem.out.println(\"\
  fakeEmpty.length(): \" + fakeEmpty.length());\nSystem.out.println(\"LF.length():\
  \ \" + LF.length());\nSystem.out.println(\"fakeEmpty.equals(LF): \" + fakeEmpty.equals(LF));\n\
  System.out.println(\"fakeEmpty == LF: \" + (fakeEmpty == LF));\nfakeEmpty.length():\
  \ 1\nLF.length(): 1\nfakeEmpty.equals(LF): true\nfakeEmpty == newline: true\n```\n\
  \n输出表明，这两个字符串不仅使用 `equals()` 方法相等，而且使用 `==` 运算符也相等。文本块经过所有编译器转换后得到的最终字符串，会像所有 `String`\
  \ 字面量一样被驻留。这就是文本块与 `String` 字面量 “\\n” 使用 `==` 运算符也相等的原因。\n\n\n\n### 转义序列的转换\n\n\
  文本块中的转义序列在转换的第三阶段（即最后一个阶段）被解释。文本块支持与 `String` 字面量相同的转义序列集，例如 `\\b`、`\\t`、`\\n`、`\\\
  f`、`\\r`、`\\\"`、`\\'`、`\\\\`、八进制转义（`\\nnn`）和 Unicode 转义（`\\uxxxx`）。它们被最后解释，以便开发者有机会使用转义序列来格式化文本块的内容。考虑以下文本块，它使用转义序列\
  \ `\\t`（制表符）来格式化 HTML 代码中的嵌套标签：\n\n```\nString html = \"\"\"\n..............\n..............\\\
  t\n..............\\t\\tHello, HTML\n..............\\t\n..............\n..............\"\
  \"\";\n```\n\n所有显示为点号的前导空格将在第二阶段转换中被移除。此阶段将解释嵌套行中的制表符，生成的字符串如下所示：\n\n```\n\nHello,\
  \ HTML\n\n```\n\n回顾一下，在第二阶段中，所有行终止符（CR、CRLF 和 LF）都被规范化为 LF。假设你想让所有行都以 CRLF（`\\r\\\
  n`）结尾，而不是 LF（`\\n`）。如何实现这一点？你可以通过在文本块中每行内容的末尾插入转义序列 `\\r` 来实现。以下是该文本块：\n\n```\n\
  String html = \"\"\"\n..............\\r\n..................\\r\n......................Hello,\
  \ HTML\\r\n..................\\r\n..............\\r\n..............\"\"\";\n```\n\
  \n生成的字符串如下所示。为了帮助你直观地理解转换后的字符串，我在字符串的每一行中显示了转换后的行终止符（LF）为 `\\n`。空格照常显示为点号。\n\n```\n\
  \\r\\n\n....\\r\\n\n........Hello, HTML\\r\\n\n....\\r\\n\n\\r\\n\n```\n\n如何向文本块中的任何行添加尾部空格？答案是使用转序列。空格的\
  \ ASCII 十进制值为 32，可以用八进制转义表示为 `\\040`，用 Unicode 转义表示为 `\\u0020`。让我们举一个简单的例子，将 `\"\
  Hello \"` 表示为文本块。注意，`\"Hello \"` 中有一个尾部空格。该字符串的字符数是 6——`Hello` 中的 5 个字符和一个尾部空格。以下是我们的第一次尝试：\n\
  \n```\nString str = \"\"\"\nHello \"\"\";\nSystem.out.printf(\"str: '%s'%n\", str);\n\
  System.out.printf(\"str.length(): %d%n\", str.length());\nSystem.out.printf(\"str\
  \ ends with a space: %b%n\", str.endsWith(\" \"));\nstr: 'Hello'\nstr.length():\
  \ 5\nstr ends with a space: false\n```\n\n输出表明，从文本块生成的字符串不包含尾部空格。这是因为转换的第二阶段会移除所有尾部空白，从而删除了\
  \ `Hello` 后面的空格。\n\n在这种情况下，你需要将尾部空格表示为八进制转义 `\\040`。以下是第二次尝试：\n\n```\nString str\
  \ = \"\"\"\nHello\\040\"\"\";\nSystem.out.printf(\"str: '%s'%n\", str);\nSystem.out.printf(\"\
  str.length(): %d%n\", str.length());\nSystem.out.printf(\"str ends with a space:\
  \ %b%n\", str.endsWith(\" \"));\nstr: 'Hello '\nstr.length(): 6\nstr ends with a\
  \ space: true\n```\n\n恭喜！输出表明你成功地在文本块的一行中插入了尾部空格。但事情可能并不像你想象的那样就此结束！让我们尝试使用 Unicode\
  \ 转义 `\\u0020` 来添加尾部空格：\n\n```\nString str = \"\"\"\nHello\\u0020\"\"\";\nSystem.out.printf(\"\
  str: '%s'%n\", str);\nSystem.out.printf(\"str.length(): %d%n\", str.length());\n\
  System.out.printf(\"str ends with a space: %b%n\", str.endsWith(\" \"));\nstr: 'Hello'\n\
  str.length(): 5\nstr ends with a space: false\n```\n\n没有达到预期效果？感到惊讶吗？Unicode 转义在编译的非常早期阶段就被解释，早于任何其他处理。编译器在读取源代码时就会解释\
  \ Unicode 转义。编译器解释 Unicode 转义 `\\u0020` 并将其转换为一个空格字符。当编译器开始文本块转换时，`\\u0020` 已经被转换为空格字符\
  \ `' '`。文本块转换器根本看不到 Unicode 转义——它看到的是一个空格。转换器在处理所有尾部空白时会移除这个空格。这就是为什么在这个例子中你没有得到尾部空格的原因。为了证明这一点，让我们再看一个例子。\n\
  \nLF 的 Unicode 转义是 `\\u000A`。考虑以下包含 `String` 字面量的代码片段，其中包含以下字符序列：`He`、`\\u000A`\
  \ 和 `llo`。\n\n```\nString str = \"He\\u000Allo\";\n```\n\n这段代码能编译吗？不能。罪魁祸首就是 Unicode\
  \ 转义的使用。在编译器处理 `String` 字面量之前，Unicode 转义 `\\u000A` 已经被解释为 LF，使得源代码看起来像这样：\n\n```\n\
  String str = \"He\nllo\";\n```\n\n`String` 字面量不能跨越多行。这就是这段代码无法编译的原因。编译时错误是“未闭合的字符串字面量”。让我们用文本块来尝试这个例子，如下所示：\n\
  \n```\nString str = \"\"\"\nHe\\u000Allo\"\"\";\nSystem.out.printf(\"str: '%s'%n\"\
  , str);\nSystem.out.printf(\"str.length(): %d%n\", str.length());\nstr: '      \
  \       He\nllo'\nstr.length(): 19\n```\n\n输出中有两个令人惊讶的地方。首先，你没有遇到任何编译时错误。其次，字符数是\
  \ 19。你可能预期字符数是 6，而不是 19。暂停一下，尝试解释这个输出。\n\n如果你无法解释这个输出，以下是解释。让我们用点号表示空格，来展示原始文本块：\n\
  \n```\nString str = \"\"\"\n.............He\\u000Allo\"\"\";\n```\n\n在文本块转换发生之前，编译器会将\
  \ `\\u000A` 解释为 LF，这将导致以下文本块：\n\n```\nString str = \"\"\"\n.............He\nllo\"\
  \"\";\n```\n\n现在你可能能够看到最终的字符串，并解释之前的输出了。文本块的内容从一行变成了两行。第一行包含 13 个前导空格，第二行没有。编译器不会移除任何前导空格，因为所有非空白行的最小空白计数为零。最终的字符串如下：\n\
  \n```\n.............He\nllo\n```\n\n总字符数为 19——13 个前导空格，`He` 中的 2 个字符，`He` 后面的 LF\
  \ 占 1 个字符，以及 `llo` 中的 3 个字符。\n\n### 提示\n\n你不需要使用转义序列 `\\\"` 和 `\\n` 来在文本块中包含双引号和换行符。建议你改用\
  \ \" 和行终止符。并且，要小心在文本块中使用 Unicode 转义，因为它们会在文本块转换之前被处理。\n\n假设你想在一个文本块中嵌套另一个文本块。考虑以下第一次不成功的尝试：\n\
  \n```\nString str = \"\"\"\nString test = \"\"\"\nText blocks are fun if you understand\
  \ them!\n\"\"\"\n\"\"\";\n```\n\n这个文本块无法编译。第二行中的三个双引号 `\"... String test = \"\"\"\
  \"` 被解释为第一行开始定界符的结束定界符。现在第三、第四和第五行不再是有效的 Java 代码。如果你想在文本块内部使用三个连续的双引号，你必须至少转义这三个双引号中的一个，以避免它们被解释为结束定界符。你可以像下面这样使之前的文本块有效。我选择转义第一个双引号。\n\
  \n```\nString str = \"\"\"\nString test = \\\"\"\"\nText blocks are fun if you understand\
  \ them!\n\\\"\"\"\n\"\"\";\n```\n\n\n\n### 完整示例\n\n在本节中，我将展示一个完整示例，其中包含对文本块的所有类型转换。首先，我会解释转换中的所有步骤。最后，我会提供一个完整的程序。我们的示例文本块如下：\n\
  \n```\nString html = \"\"\"\n..............\\040CRLF\n...........CRLF\n.....................CRLF\n\
  ......................Hello, HTML\\tCRLF\nCRLF\n..................CRLF\n.........................CRLF\n\
  ..............CRLF\n..............\"\"\";\n```\n\n以下是我在文本块中使用的语法：\n\n*   我使用点号表示空格，以便向你展示文本块中存在空格。在实际的文本块中，你看到的是空格，而不是点号。\n\
  \n*   我是在 Windows 系统上编写代码，因此使用 CRLF 来表示行终止符。在实际的文本块中，行终止符是不可见的。\n\n*   `\\040` 是空格的八进制转义序列（ASCII\
  \ 十进制 32）。\n\n*   `\\t` 是制表符的转义序列。\n\n*   文本块内容中的其他所有字符均按其原样显示。\n\n文本块内容共有九行，如下所示：\n\
  \n```\n..............\\040CRLF\n...........CRLF\n.....................CRLF\n......................Hello,\
  \ HTML\\tCRLF\nCRLF\n..................CRLF\n.........................CRLF\n..............CRLF\n\
  ..............\n```\n\n让我们开始文本块的转换过程。第一步，将行终止符规范化为 LF，得到以下字符串：\n\n```\n..............\\\
  040LF\n...........LF\n.....................LF\n......................Hello, HTML\\\
  tLF\nLF\n..................LF\n.........................LF\n..............LF\n..............\n\
  ```\n\n现在，编译器计算必须从每个非空白行开头移除的空白字符数量。第 2、5、7 和 9 行是空白行。第 9 行是包含结束定界符的最后一行，因此在此计算中被视为有效行。所以，编译器忽略第\
  \ 2、5 和 7 行，但包含第 9 行。空白字符计数为：第 1 行 14 个，第 3 行 18 个，第 4 行 22 个，第 6 行 18 个，第 8 行 14\
  \ 个，第 9 行 14 个。这些行中的最小空白字符数为 14。编译器从所有非空白行（第 1、3、4、6 和 8 行）中移除前导的 14 个空白字符。得到的字符串如下：\n\
  \n```\n\\040LF\n...........LF\n.......LF\n........Hello, HTML\\tLF\nLF\n....LF\n\
  .........................LF\nLF\n..............\n```\n\n现在，从所有行中移除尾随空白字符，得到以下字符串：\n\
  \n```\n\\040LF\nLF\n....LF\n........Hello, HTML\\tLF\nLF\n....LF\nLF\nLF\n```\n\n\
  请注意，空白行已变为空行；在结果字符串中，它们仅包含 LF。最后一行原本没有 LF，现在是一个空字符串，它从结果字符串中消失了。\n\n作为最后的转换，对转义序列进行解释，得到以下字符串：\n\
  \n```\nLF\nLF\n....LF\n........Hello, HTML  LF\nLF\n....LF\nLF\nLF\n```\n\n清单 6-3\
  \ 包含一个完整的程序来展示此转换。该程序使用了 `String` 类的 `lines()` 方法，该方法从文本块返回一个行流。`map()` 方法将每行的内容用单引号括起来。我使用单引号括起每行的内容，以便你可以在输出中看到尾随空白字符。`forEach()`\
  \ 方法将每行用单引号括起来后打印到标准输出。\n\n```\n// TextBlockTransformation.java\npackage com.jdojo.textblock;\n\
  public class TextBlockTransformation {\npublic static void main(String[] args) {\n\
  String html = \"\"\"\n\\040\n\nHello, HTML\\t\n\n\"\"\";\n// 让我们通过将每行用单引号括起来进行打印\n\
  html.lines()\n.map(s -> \"'\" + s + \"'\")\n.forEach(System.out::println);\n}\n\
  }\n' '\n\"\n'    '\n'        Hello, HTML    '\n\"\n'    '\n\"\n''\n清单 6-3\n可视化文本块转换\n\
  ```\n\n## 连接文本块\n\n文本块可以用于任何你使用 `String` 字面量的地方。你可以像连接 `String` 字面量一样连接它们。请记住保持代码的可读性，因为连接后的文本块会使代码难以阅读。\n\
  \n以下代码片段将一个文本块和一个 `String` 字面量连接，得到字符串 `\"Hello, Text Block\"`：\n\n```\nString str\
  \ = \"\"\"\nHello\"\"\" + \", Text Block\";\n```\n\n这段代码的可读性不是很好。让我们将 `String` 字面量替换为文本块：\n\
  \n```\nString str = \"\"\"\nHello\"\"\" + \"\"\"\n, Text Block\"\"\";\n```\n\n可读性进一步降低了。你必须注意每个文本块的开始和结束定界符，才能理解发生了什么。\n\
  \n假设消息中的名称来自一个变量。要得到一个 `\"Hello, <name>\"` 字符串，其中 `<name>` 来自变量，你可以使用以下文本块。注意使用八进制转义序列\
  \ `\\040` 来插入一个空格：\n\n```\nString name = \"Text Block\";\nString str = \"\"\"\n\
  Hello,\\040\"\"\" + name;\n```\n\n这不是一个最优的解决方案。如果你的文本块中有占位符，其值来自变量，那么使用 `String`\
  \ 类的 `formatted()` 方法配合字符串格式说明符是更好的选择。你可以将前面的代码片段重写如下：\n\n```\nString name = \"\
  Text Block\";\nString str = \"\"\"\nHello, %s\"\"\".formatted(name);\n```\n\n`formatted()`\
  \ 方法作为支持文本块的一部分，已在 Java 13 中添加到 `String` 类。它是一个实例方法。它接受一个可变参数，这些参数是文本块中格式说明符的值。如果你想基于模板生成文本，你可以使用带有格式说明符的文本块作为模板，并使用\
  \ `formatted()` 方法将所需文本填入模板。\n\n\n\n## String API 的补充\n\n以下实例方法已添加到 `String` 类中以支持文本块：\n\
  \n*   `String formatted`​`(Object... args)`\n\n*   `String stripIndent()`\n\n* \
  \  `String translateEscapes()`\n\n**提示** 添加到 `String` 类中以支持文本块的这三个方法已被弃用并标记为待移除，因为文本块是一项预览特性，可能会在未来的版本中被移除或改进。你不应在生产环境中使用文本块及这些方法。\n\
  \n`formatted()` 实例方法使用指定的参数格式化字符串。其工作方式与 `String` 类的 `format(String format, Object...args)`\
  \ 静态方法相同。使用 `formatted()` 方法而非 `format()` 方法可以使代码更简洁。除此之外，结果上没有区别。以下代码片段使用两种方法格式化同一个文本块：\n\
  \n```\nString name = \"Text Block\";\n// 使用 formatted() 实例方法\nString str = \"\"\"\
  \nHello, %s\"\"\".formatted(name);\nSystem.out.println(str);\n// 使用 format() 静态方法\n\
  String str2 = String.format(\"\"\"\nHello, %s\"\"\", name);\nSystem.out.println(str2);\n\
  Hello, Text Block\nHello, Text Block\n```\n\n`stripIndent()` 方法会移除字符串中每一行开头和结尾的附带空白。当你从文件或其他来源接收可能包含附带空白的字符串时，可以使用此方法。在处理文本块时，你不需要使用此方法，因为文本块会自动移除附带空白。Java\
  \ 12 添加了一个 `indent(int n)` 方法，该方法会在每行开头添加 `n` 个空格，并将每行的行终止符规范化为 LF。如果 n 小于零，则会从每行移除最多\
  \ n 个前导空白。清单 6-4 包含一个完整的程序，展示了这两个方法的使用。输出之后是对输出的讨论。\n\n```\n// IndentTest.java\n\
  package com.jdojo.textblock;\npublic class IndentTest {\npublic static void main(String[]\
  \ args) {\nString html = \" \\n\"\n+ \"     \\n\"\n+ \"         Hello, HTML\\n\"\
  \n+ \"     \\n\"\n+ \" \";\nSystem.out.println(\"Original:\\n\" + html);\n// 移除附带空白\n\
  String html2 = html.stripIndent();\nSystem.out.println(\"\\nAfter stringIndent():\\\
  n\" + html2);\n// 为字符串缩进一个空格，这会在内容的最后一行添加一个 LF\nString html3 = html2.indent(1);\n\
  System.out.println(\"\\nAfter indent():\\n\" + html3);\n// 打印详细信息\nSystem.out.println(\"\
  html.length(): \" + html.length());\nSystem.out.println(\"html3.length(): \" + html3.length());\n\
  System.out.println(\"html.equals(html3): \" + html.equals(html3));\nSystem.out.println(\"\
  html.endsWith(\\\"\\\\n\\\"): \"\n+ html.endsWith(\"\\n\"));\nSystem.out.println(\"\
  html3.endsWith(\\\"\\\\n\\\"): \"\n+ html3.endsWith(\"\\n\"));\n}\n}\nOriginal:\n\
  \nHello, HTML\n\nAfter stringIndent():\n\nHello, HTML\n\nAfter indent():\n\nHello,\
  \ HTML\n\nhtml.length(): 71\nhtml3.length(): 72\nhtml.equals(html3): false\nhtml.endsWith(\"\
  \\n\"): false\nhtml3.endsWith(\"\\n\"): true\n清单 6-4\n使用 String 类的 stripIndent()\
  \ 和 indent() 方法\n```\n\n`html` 变量中的字符串包含多行，并且字符串中有一个附带空白。输出显示 `stripIndent()` 和\
  \ `indent()` 的效果并非相反。`html` 变量包含 71 个字符，而 `html3` 包含 72 个。请注意，在 `html` 变量存储的字符串中，`</html>`\
  \ 之后最后一行没有添加行终止符（`\\n`）。`indent()` 方法会移除每行的行终止符（CR、CRLF 和 LF），并在每行末尾添加一个 LF 作为行终止符。如果字符串中的某行没有行终止符，`indent()`\
  \ 方法会为该行追加一个 LF。在我们的例子中，`html2` 变量中的最后一行 `\"</html>\"` 在 `html3` 中变成了 `\" </html>\\\
  n\"`，这解释了为什么 `html3` 比 `html` 多了一个字符。\n\n你可能会收到一个字符串，其中包含作为字符存在的转义序列，并且你希望将这些字符转换为转义序列。`translateEscapes()`\
  \ 实例方法会转换诸如 `\\n`、`\\r`、`\\t` 等转义序列以及八进制转义。它不会转换 Unicode 转义，因为编译器在读取源代码时已经对它们进行了转换。\n\
  \n考虑以下代码片段，我通过转义反斜杠来嵌入转义序列，因此它们被解释为字符序列，而不是转义序列。`\\012` 是 ASCII 十进制 10（`\\n`）的八进制转义，`\\\
  t` 是制表符的转义序列。输出显示了转换前后的字符串。\n\n```\nString html = \"\\\\012\" +\n\"\\\\t\\n\" +\n\
  \"\\\\t\\\\tHello, HTML\\n\" +\n\"\\\\t\\n\" +\n\"\" ;\nSystem.out.println(\"Original:\\\
  n\" + html);\n// 转换字符串中的转义序列\nString html2 = html.translateEscapes();\nSystem.out.println(\"\
  \\nAfter html.translateEscapes():\\n\" + html2);\nOriginal:\n\\012\\t\n\\t\\tHello,\
  \ HTML\n\\t\n\nAfter html.translateEscapes():\n\nHello, HTML\n\n```\n\n\n\n## 检测不一致的空白字符\n\
  \n在文本块中对行进行缩进时，可能会无意中混用空格和制表符等空白字符。当文本块移除无关空白字符时，这可能导致不理想的缩进效果。有时，你可能希望保留文本块中某行末尾的空白字符，但文本块会自动将其移除。考虑以下文本块，开发者希望用四个空格缩进行星名称：\n\
  \n```\nString planets = \"\"\"\nMercury\nVenus\nEarth\n\"\"\";\n```\n\n此文本块表示的字符串应如下所示：\n\
  \n```\nMercury\nVenus\nEarth\n```\n\n当打印此文本块时，输出如下：\n\n```\nMercury\nVenus\nEarth\n\
  ```\n\n问题在于三行中前导空白字符的使用不一致。我混用了空格和制表符来对齐行星名称，使它们看起来比上一行的行星名称向右缩进了四个空格。制表符在不同编辑器中可能显示不同。有时，一个制表符等于四个空格，有时则等于八个空格。\n\
  \n当文本块移除无关空白字符时，它会将每个空白字符计为一个，无论该空白字符使用的是哪种字符。例如，两个制表符和八个空格分别计为两个空白字符和八个空白字符，即使它们可能使两行内容在垂直方向上对齐到相同位置。\n\
  \n你可能需要花些时间来找出混用空白字符进行缩进的文本块中的缩进问题。JDK 13 提供了一个名为 `text-blocks` 的 `lint`，你可以用它来在这种情况下获取警告。编译源代码时，你需要使用\
  \ `-Xlint:text-blocks` 选项。该 lint 会发出两种警告：\n\n*   针对用于缩进行的前导空白字符使用不一致的警告，这可能导致不理想的缩进。\n\
  \n*   针对尾部空白字符的警告，以便你知道尾部空白字符将被移除。如果需要保留尾部空白字符，请改用转义序列。\n\n清单 6-5 包含一个混用了前导空白字符和尾部空白字符的文本块。该程序未打印出预期的输出。根据编辑器的制表符设置，你的输出可能与这里显示的略有不同。\n\
  \n```\n// TextBlocksLinting.java\npackage com.jdojo.textblock;\npublic class TextBlocksLinting\
  \ {\npublic static void main(String[] args) {\nString planets = \"\"\"\nMercury\n\
  Venus\nEarth\n\"\"\";\nSystem.out.println(\"Planets:\\n\" + planets);\n}\n}\nPlanets:\n\
  Mercury\nVenus\nEarth\n清单 6-5\n使用 text-blocks lint 识别文本块中的不一致空白字符\n```\n\n编译 `TextBlocksLinting.java`\
  \ 文件会打印出关于文本块中空白字符使用不一致以及尾部空白字符的警告：\n\n```\nC:\\Java13Revealed>javac --enable-preview\
  \ --release 13 -Xlint:preview -Xlint:text-blocks -d build\\modules\\jdojo.textblock\
  \ src\\jdojo.textblock\\classes\\com\\jdojo\\textblock\\TextBlocksLinting.java\n\
  C:\\Java13Revealed\\src\\jdojo.textblock\\classes\\com\\jdojo\\textblock\\TextBlocksLinting.java:6:\
  \ warning: [preview] text blocks are a preview feature and may be removed in a future\
  \ release.\nString planets = \"\"\"\nC:\\Java13Revealed\\src\\jdojo.textblock\\\
  classes\\com\\jdojo\\textblock\\TextBlocksLinting.java:6: warning: [text-blocks]\
  \ inconsistent white space indentation\nString planets = \"\"\"\nC:\\Java13Revealed\\\
  src\\jdojo.textblock\\classes\\com\\jdojo\\textblock\\TextBlocksLinting.java:6:\
  \ warning: [text-blocks] trailing white space will be removed\nString planets =\
  \ \"\"\"\nwarning: [preview] classfile for C:\\Java13Revealed\\build\\modules\\\
  jdojo.textblock\\module-info.class uses preview features of Java SE 13.\n4 warnings\n\
  ```\n\n为避免在 NetBeans IDE 中混用空格和制表符进行缩进，你可以设置首选项，将制表符扩展为 `X` 个空格，其中 `X` 是一个数字，例如\
  \ 4。你可以在 Apache NetBeans 中通过选择 `工具` ➤ `选项` ➤ `编辑器` ➤ `格式设置` ➤ `将制表符扩展为空格` 来访问此选项。\n\
  \n## 总结\n\n自 Java 1.0 版本起，Java 就支持 `String` 字面量。`String` 字面量有一个很大的局限性：它必须在一行内表示。开发者经常需要在\
  \ `String` 字面量中表示多行文本，这迫使他们使用字符串拼接。将多行文本作为 `String` 字面量使用，一直是 Java 开发者约 24 年来的痛点。Java\
  \ 语言设计者知道这个问题，并最终给予了关注。他们曾在 Java 12 中提出（后来撤回）对原始字符串的支持。在 Java 13 中，他们以语言预览特性的形式加入了对文本块的支持。\n\
  \n文本块是由开始定界符和结束定界符括起来的零个或多个字符的序列。文本块的内容可以跨越多行，并且你不需要使用大多数转义序列。开始定界符以三个双引号字符（`\"\"\
  \"`）开头，后面可选地跟零个或多个空格、制表符或换页符，并以行终止符结束。结束定界符由三个双引号字符（`\"\"\"`）组成。\n\n文本块是 `String`\
  \ 类的一个实例。你可以在任何可以使用 `String` 字面量的地方使用文本块。\n\n文本块的内容由编译器转换，最终生成一个 `String` 字面量。运行时永远不会看到（或不知道）文本块。运行时只看到转换文本块后生成的\
  \ `String` 字面量。\n\n编译器分三个阶段执行文本块的转换。在第一阶段，它规范化行终止符。它将所有行终止符（CR、CRLF 和 LF）替换为 LF。\n\
  \n在第二阶段，编译器移除所有非空行中共同的前导空白字符。空行是仅包含 LF 或后跟 LF 的空白字符的行。文本块中结束定界符的位置在计算要移除的前导空白字符数量时起着重要作用。如果你不想移除任何前导空白字符，请将结束定界符放在单独一行的开头。此阶段不解释转义序列。此阶段会移除所有行中的尾部空白字符。\n\
  \n在转换的第三阶段也是最后阶段，编译器解释转义序列。\n\n`String` 类新增了三个实例方法来支持文本块：`formatted()`、`stripIndent()`\
  \ 和 `translateEscapes()`。这些方法已被弃用，因为它们的存在是为了支持作为预览特性的文本块。`formatted()` 方法用于使用格式说明符格式化文本块。`stripIndent()`\
  \ 方法用于移除文本块中的无关空白字符。`translateEscapes()` 方法用于解释文本块中的转义序列。\n\n在源代码中，可能会无意中混用不同类型的空白字符（如空格和制表符）来缩进文本块中的行，这可能导致不理想的缩进。有时，你可能希望保留行尾的空白字符，但这些字符会被编译器自动移除。使用编译器的\
  \ `-Xlint:text-blocks` 选项可以检测此类不一致的空白字符使用。当编译器检测到文本块中存在不一致的前导空白字符或尾部空白字符时，会打印警告。\n\
  \n\n\n"
- "# 7. 类数据共享\n\n在本章中，你将学习\n\n*   什么是类数据共享（CDS）\n*   什么是应用程序类数据共享（AppCDS）\n*   如何在你的应用程序中使用\
  \ CDS 和 AppCDS\n*   JDK12 中的默认 CDS 归档是什么，以及 Java 应用程序如何自动使用它\n*   JDK13 中的动态 CDS\
  \ 归档是什么\n*   如何为你的应用程序生成和使用动态 CDS 归档\n\n当 JVM 启动时，它通常会从 Java 核心库加载数千个类。在启动时加载如此多的类需要时间。如果你启动多个\
  \ JVM，每个 JVM 都会执行相同的任务——在启动时加载相同的数千个系统类副本。这有两个缺点：\n\n*   JVM 启动速度变慢。\n*   每个 JVM\
  \ 都会将相同的系统类副本加载到内存中，从而增加了运行时内存占用。\n\n类数据共享（CDS）——在 JDK5 中引入——是一项 HotSpot JVM 特性，它允许预处理系统类并在\
  \ JVM 之间共享它们，从而减少启动时间和运行时内存占用。CDS 允许共享由引导类加载器加载的 Java 核心类。\n\n应用程序类数据共享（AppCDS）——在\
  \ JDK10 中引入——扩展了 CDS 特性，允许在 JVM 之间共享类路径上的应用程序类。从 JDK10 开始，所有类型的类加载器（引导类加载器、平台类加载器、应用程序类加载器和自定义类加载器）都可以使用\
  \ AppCDS 加载类。JDK13 引入了动态 CDS 归档，这使得使用 AppCDS 变得更加简单。\n\n我将在后续章节中详细解释 CDS 和 AppCDS。\n\
  \n### 提示\n\nAppCDS 在 Oracle JDK 8 和 9 中可用，但需要商业许可。在 JDK 10 中，AppCDS 在 OpenJDK 中可用。\n\
  \n## 类数据共享\n\n类数据共享（CDS）在 JDK5 中引入。JRE 安装程序会加载常用的核心 Java 类到内存中，并将加载的类转储到一个名为*共享归档*的文件中。共享归档包含以预处理格式存储的类，以便后续进行内存映射。共享归档是位于\
  \ `JAVA_HOME` 目录下的 `classes.jsa` 文件。在类 UNIX 平台上，共享归档存储在 `JAVA_HOME/lib/[arch]/server/classes.jsa`。在\
  \ Windows 平台上，共享归档存储在 `JAVA_HOME\\bin\\server\\classes.jsa`。如果你在机器上找不到共享归档，可以随时生成它。有时在对系统类进行更改后，你需要重新生成它。稍后我将向你展示如何生成共享归档。\n\
  \n当 JVM 启动时，它会查找共享归档并对共享归档进行内存映射。当 JVM 需要加载一个类时，它会首先尝试从内存中的共享归档加载该类，而不是从磁盘加载，从而减少了类加载时间。如果另一个\
  \ JVM 启动，该 JVM 会首先检查共享归档数据是否已被另一个 JVM 加载到内存中，并重用内存中共享归档中的相同类，从而进一步减少第二个及后续 JVM 的启动时间，并通过在内存中共享同一共享归档中的相同类数据来显著减少内存占用。\n\
  \nCDS 支持 G1、串行、并行和 ParallelOldGC 垃圾回收器。共享 Java 堆对象特性（CDS 的一部分）仅在 64 位非 Windows 平台上支持\
  \ G1 垃圾回收器。\n\n### 创建共享归档\n\n你可以使用带有 `-XShare:dump` 选项的 `java` 命令来创建共享归档，如下所示：\n\
  \n```\nC:\\Java13Revealed>java -Xshare:dump\n```\n\n该命令会在 `JAVA_HOME` 目录的子目录中创建一个共享归档（`classes.jsa`\
  \ 文件），如上一节所述。该命令在创建共享归档时会打印信息性消息。\n\n### 提示\n\n如果你使用的是 JDK12 或更高版本，则默认 CDS 归档已作为\
  \ JDK 的一部分提供，你无需运行此命令。运行此命令将重新生成默认 CDS 归档。\n\n### 使用共享归档\n\n在本节中，我将向你展示在运行 Java\
  \ 应用程序时如何使用共享归档。本章中的所有示例程序都在 `jdojo.cds` 模块中，该模块在清单 7-1 中定义。\n\n```\n// module-info.java\n\
  module jdojo.cds {\n    exports com.jdojo.cds;\n}\n清单 7-1\n一个名为 jdojo.cds 的模块\n\
  ```\n\n让我们创建一个简单的 Java 类，你将运行它来测试 CDS 特性。清单 7-2 包含一个名为 `HelloCDS` 的简单类的代码。它向标准输出打印一条消息。\n\
  \n```\n// HelloCDS.java\npackage com.jdojo.cds;\npublic class HelloCDS {\n    public\
  \ static void main(String[] args) {\n        System.out.println(\"Hello, CDS and\
  \ AppCDS\");\n    }\n}\n清单 7-2\n一个 HelloCDS 类\n```\n\n源代码中包含这些类，这些类是在 JDK13 中使用\
  \ `--enable-preview` 选项编译的，因为源代码使用了预览特性，例如 `switch` 表达式和文本块。如果你想在其他 JDK 上进行实验，则需要自行编译和打包本章的代码。编译后的模块代码保存在\
  \ `build\\modules\\jdojo.cds` 目录中。模块 JAR 保存在 `dist\\jdojo.cds.jar` 文件中。我假设你正在下载源代码的目录中运行这些命令，并且\
  \ `JAVA_HOME\\bin` 目录已添加到 PATH 环境变量中。\n\n使用以下命令编译源代码：\n\n```\nC:\\Java13revealed>javac\
  \ -d build\\modules\\jdojo.cds src\\jdojo.cds\\classes\\module-info.java src\\jdojo.cds\\\
  classes\\com\\jdojo\\cds\\HelloCDS.java\n```\n\n使用以下命令将源代码打包到 `jdojo.cds.jar` 文件中。请注意命令中的最后一个字符，它是一个点（`.`）。\n\
  \n```\nC:\\Java13revealed>jar --verbose --create --file dist\\jdojo.cds.jar -C build\\\
  modules\\jdojo.cds .\n```\n\n在运行应用程序时，可以使用以下三个选项之一来使用共享归档：\n\n*   `-Xshare:on`\n\
  *   `-Xshare:off`\n*   `-Xshare:auto`\n\n`-Xshare:on` 选项要求使用共享类数据。如果无法使用共享类数据，此选项会导致应用程序启动失败。此选项仅用于测试目的。如果共享归档无法共享，有时可能会失败。如果由于所需地址空间不可用或类路径无法映射而导致内存映射不可能，则可能发生失败。请勿在生产环境中使用此选项。\n\
  \n`-Xshare:off` 选项不会尝试使用共享归档。\n\n`-Xshare:auto` 选项会尽可能使用共享归档。如果无法使用共享归档，此选项不会导致失败。建议使用\
  \ `-Xshare:auto` 选项。\n\n\n\n### 提示\n\n从 JDK11 开始，服务器端 VM 默认启用 `-Xshare:auto` 选项。\n\
  \n以下命令尝试使用 JDK10 运行 `HelloCDS` 类——一次使用 `-Xshare:off`，一次使用 `-Xshare:on`：\n\n```\n\
  C:\\Java13Revealed>java -Xshare:off --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  Hello, CDS and AppCDS\nC:\\Java13Revealed>java -Xshare:on --module-path dist\\jdojo.cds.jar\
  \ --module jdojo.cds/com.jdojo.cds.HelloCDS\nAn error has occurred while processing\
  \ the shared archive file.\nSpecified shared archive not found.\nError occurred\
  \ during initialization of VM\nUnable to use shared archive.\n```\n\n当你使用 `-Xshare:on`\
  \ 时，收到一个错误，提示找不到共享归档。在 OpenJDK10 和 OpenJDK11 中，你需要使用 `-Xshare:dump` 选项来生成共享归档。从\
  \ OpenJDK12 开始，构建 JDK 镜像时会自动生成共享归档。如果你在前一节中已经生成了共享归档，那么这条命令本应成功运行。以下是使用 JDK10 生成共享归档并重新运行之前命令的方法：\n\
  \n```\nC:\\Java13Revealed>java -Xshare:dump\n...\nC:\\Java13Revealed>java -Xshare:on\
  \ --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  Hello, CDS and AppCDS\n```\n\n当共享归档被禁用和启用时，你在输出中看不到任何区别。然而，第二次——当共享归档启用时——JVM 启动得更快。如何证明这一点？\n\
  \n在类 UNIX 操作系统上，`time` 命令用于测量进程运行时间。在 Windows 上，你需要使用 `Measure-Command` PowerShell\
  \ 命令。所有命令均使用 JDK10。以下是在 Linux 上的结果：\n\n```\n[/home/ksharan/Java13Revealed] $ time\
  \ java -Xshare:off --module-path dist/jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  Hello, CDS and AppCDS\nreal 0m0.215s\nuser 0m0.124s\nsys 0m0.034s\n[/home/ksharan/Java13Revealed]\
  \ $ time java -Xshare:on --module-path dist/jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  Hello, CDS and AppCDS\nreal 0m0.108s\nuser 0m0.098s\nsys 0m0.023s\n```\n\n以下是在 Windows\
  \ 上使用 PowerShell（而非 Windows 命令提示符）的结果：\n\n```\nPS C:\\Java13revealed> Measure-Command\
  \ {java -Xshare:off --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cd\n\
  s.HelloCDS | Write-Host}\nHello, CDS and AppCDS\n...\nTotalMilliseconds : 281.1476\n\
  PS C:\\Java13revealed> Measure-Command {java -Xshare:on --module-path dist\\jdojo.cds.jar\
  \ --module jdojo.cds/com.jdojo.cds\n.HelloCDS | Write-Host }\nHello, CDS and AppCDS\n\
  ...\nTotalMilliseconds : 180.3489\n```\n\n注意第二次运行程序所花费的时间，比第一次要少。在 Linux 上，应用程序运行速度大约快了\
  \ 49%，而在 Windows 上，大约快了 36%。你得到的结果可能略有不同。\n\n### 了解已加载类的来源\n\n当 CDS 启用时，核心系统类从共享归档中加载。你可以使用\
  \ `-Xlog:class+load=info` 选项打印已加载类的来源。以下命令在 JDK10 上使用此选项——一次在 CDS 启用时，一次在 CDS 禁用时：\n\
  \n```\nC:\\Java13Revealed>java -Xshare:off -Xlog:class+load=info --module-path dist\\\
  jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n[0.011s][info][class,load]\
  \ opened: C:\\java10\\lib\\modules\n[0.021s][info][class,load] java.lang.Object\
  \ source: jrt:/java.base\n[0.022s][info][class,load] java.io.Serializable source:\
  \ jrt:/java.base\n[0.022s][info][class,load] java.lang.String source: jrt:/java.base\n\
  ...\n[0.202s][info][class,load] com.jdojo.cds.HelloCDS source: file:/C:/Java13Revealed/dist/jdojo.cds.jar\n\
  ...\nHello, CDS and AppCDS\n...\nC:\\Java13Revealed>java -Xshare:on -Xlog:class+load=info\
  \ --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  [0.012s][info][class,load] opened: C:\\java10\\lib\\modules\n[0.024s][info][class,load]\
  \ java.lang.Object source: shared objects file\n[0.024s][info][class,load] java.io.Serializable\
  \ source: shared objects file\n[0.024s][info][class,load] java.lang.String source:\
  \ shared objects file\n...\n[0.150s][info][class,load] com.jdojo.cds.HelloCDS source:\
  \ file:/C:/Java13Revealed/dist/jdojo.cds.jar\n...\nHello, CDS and AppCDS\n...\n\
  ```\n\n当 CDS 禁用时，诸如 `Object` 和 `String` 类等系统类的来源被列为 `jrt:/java.base`。这意味着这些类是从磁盘上的\
  \ `C:\\java10\\lib\\modules` 文件（即 JRE 运行时镜像）加载的。当 CDS 启用时，相同类的来源被列为“shared objects\
  \ file”，这意味着它们是从共享归档加载的。请注意，应用程序类 `HelloCDS` 在两种情况下都是从磁盘加载的，因为 CDS 只允许共享系统类数据。要共享应用程序类，你需要使用\
  \ AppCDS，这将在下一节中解释。\n\n## 应用程序类数据共享 (AppCDS)\n\n在 JDK10 之前，类数据的共享仅适用于由引导类加载器加载的核心\
  \ Java 类。JDK10 扩展了 CDS 功能以共享应用程序类。在 JDK10 中，平台类加载器、应用程序类加载器和自定义类加载器也可以从共享归档中加载类。\n\
  \n在 JDK10 中，你需要将 `-XX:+UseAppCDS` 选项与 `java` 命令一起使用才能使用 AppCDS。在 JDK11 及更高版本中，此选项已废弃。\n\
  \n要共享应用程序类数据，你需要创建自己的共享归档，其中将包含应用程序类以及核心 Java 类。当你运行应用程序时，需要使用 `-XX:SharedArchiveFile`\
  \ 选项指定你的共享归档文件路径。你的共享归档将包含 `jdojo.cds.jar` 文件中的所有类，该文件位于本书源代码的 `dist` 目录中。提供的源代码是使用\
  \ JDK13 编译的。如果你使用的是较早的 JDK，则需要重新编译并重新创建 `jdojo.cds.jar` 文件。\n\n### 提示\n\nJava 10\
  \ 仅支持对从类路径（而非模块路径）加载的类使用 AppCDS。对模块路径的支持在 JDK11 及更高版本中可用。\n\n使用 AppCDS 涉及三个步骤：\n\
  \n*   为要包含在共享归档中的类创建类列表\n\n*   生成共享归档\n\n*   在运行应用程序时使用共享归档\n\n以下各节将引导你完成使用 AppCDS\
  \ 的步骤。我将使用 JDK10 和 JDK11 展示相同的步骤。你可以选择任意一个 JDK，并按照该 JDK 的说明进行操作。\n\n\n\n### 创建类列表\n\
  \n首先，你需要创建一个类列表，其中包含你想要纳入 AppCDS 共享归档的类。你可以使用 `-XX:DumpLoadedClassList` 选项将 JVM\
  \ 加载的系统类列表转储到一个文件中。`-XX:DumpLoadedClassList` 选项仅包含由引导类加载器加载的类。请确保使用 `-XX:+UseAppCDS`\
  \ 选项来包含由应用程序和平台类加载器加载的类。你需要使用 `-Xshare:off` 选项运行 `java` 命令来生成类列表。\n\n以下命令会创建一个 `jdojoclasses.lst`\
  \ 文件，其中包含加载到 JVM 中的所有类的列表。这是一个文本文件。你可以在你选择的文本编辑器中打开并编辑它。以下是用于 JDK10 的命令：\n\n```\n\
  C:\\Java13Revealed>java -Xshare:off -XX:+UseAppCDS -XX:DumpLoadedClassList=jdojoclasses.lst\
  \ --class-path dist\\jdojo.cds.jar com.jdojo.cds.HelloCDS\nHello, CDS and AppCDS\n\
  ```\n\n在 JDK11 及更高版本中，你无需在 `java` 命令中包含 `-XX:+UseAppCDS` 选项。你也可以使用模块路径通过以下命令生成类列表：\n\
  \n```\nC:\\Java13Revealed>java -Xshare:off -XX:DumpLoadedClassList=jdojoclasses.lst\
  \ --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  Hello, CDS and AppCDS\n```\n\n打开 `jdojoclasses.lst` 文件查看其中的类。你可以找到一行包含以下条目：`com/jdojo/cds/HelloCDS`。该条目表明，当你使用\
  \ `jdojoclasses.lst` 文件创建共享归档时，`HelloCDS` 类将成为共享归档的一部分。你将在下一节中使用此文件。\n\n### 为 AppCDS\
  \ 生成共享归档\n\n让我们在 `java` 命令中使用 `-Xshare:dump` 和 `-XX:SharedArchiveFile` 选项，根据 `jdojoclasses.lst`\
  \ 文件中的类列表创建一个共享归档。此步骤会创建一个共享归档，在你的机器上它将是一个 `jdojo.jsa` 文件。该命令会将信息性消息打印到标准输出（此处未显示）。以下是在\
  \ JDK10 中为 AppCDS 生成共享归档的命令：\n\n```\nC:\\Java13Revealed>java -Xshare:dump -XX:+UseAppCDS\
  \ -XX:SharedClassListFile=jdojoclasses.lst -XX:SharedArchiveFile=jdojo.jsa --class-path\
  \ dist\\jdojo.cds.jar\n```\n\n以下是在 JDK11 及更高版本中为 AppCDS 生成共享归档的命令：\n\n```\nC:\\\
  Java13Revealed>java -Xshare:dump -XX:SharedClassListFile=jdojoclasses.lst -XX:SharedArchiveFile=jdojo.jsa\
  \ --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  ```\n\n你将在下一节中使用这个共享归档（即 `jdojo.jsa` 文件）来运行 `HelloCDS` 类。\n\n### 使用 AppCDS 运行应用程序\n\
  \n是时候看看你的 AppCDS 共享归档实际运行的效果了。现在当你运行 `HelloCDS` 类时，你需要指定要使用的 `jdojo.jsa` 共享归档。以下是用于\
  \ JDK10 的命令：\n\n```\nC:\\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa\
  \ --class-path dist\\jdojo.cds.jar com.jdojo.cds.HelloCDS\nHello, CDS and AppCDS\n\
  ```\n\n以下是用于 JDK11 及更高版本的命令：\n\n```\nC:\\Java13Revealed>java -Xshare:on -XX:SharedArchiveFile=jdojo.jsa\
  \ --module-path dist\\jdojo.cds.jar --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  Hello, CDS and AppCDS\n```\n\n自 JDK 11 起，`-Xshare:auto` 是默认选项，因此从上述命令中移除 `-Xshare:on`\
  \ 也能正常工作。回想一下，`-Xshare:auto` 与 `-Xshare:on` 的工作方式相同，区别在于如果 CDS 无法使用，前者会禁用 CDS 并继续运行，而后者会导致应用程序启动失败。\n\
  \n注意上述命令中使用了以下三个选项。`-Xshare:on` 选项启用 CDS。`-XX:+UseAppCDS` 选项启用 AppCDS，表明你想要使用 AppCDS，这在\
  \ JDK11 或更高版本中是不需要的。`-XX:SharedArchiveFile=jdojo.jsa` 选项指定要使用的共享归档。输出中没有什么特别之处。启动时间更短，并且多个\
  \ JVM 在运行时也会共享应用程序类。\n\n使用 `-Xlog:class+load=info` 选项来验证你的应用程序类 `HelloCDS` 是否从共享归档中加载。以下是用于\
  \ JDK10 的命令：\n\n```\nC:\\Java13Revealed>java -Xshare:on -XX:+UseAppCDS -XX:SharedArchiveFile=jdojo.jsa\
  \ -Xlog:class+load=info --class-path dist\\jdojo.cds.jar com.jdojo.cds.HelloCDS\n\
  [0.011s][info][class,load] opened: C:\\java10\\lib\\modules\n[0.037s][info][class,load]\
  \ java.lang.Object source: shared objects file\n[0.038s][info][class,load] java.io.Serializable\
  \ source: shared objects file\n[0.038s][info][class,load] java.lang.String source:\
  \ shared objects file\n...\n[0.103s][info][class,load] com.jdojo.cds.HelloCDS source:\
  \ shared objects file\n...\nHello, CDS and AppCDS\n...\n```\n\n以下是用于 JDK11 及更高版本的命令：\n\
  \n```\nC:\\Java13Revealed>java -Xshare:on -XX:SharedArchiveFile=jdojo.jsa --module-path\
  \ dist\\jdojo.cds.jar -Xlog:class+load=info --module jdojo.cds/com.jdojo.cds.HelloCDS\n\
  [0.012s][info][class,load] opened: C:\\java11\\lib\\modules\n[0.042s][info][class,load]\
  \ java.lang.Object source: shared objects file\n[0.042s][info][class,load] java.io.Serializable\
