  ## 运行第一个顶层类


  在源文件模式下，`java` 命令会扫描指定的源文件，并尝试运行找到的第一个类型定义。这条规则意味着，如果你想运行源文件中的类 `C`，那么 `C` 必须被定义为文件中的第一个顶层类。例如，如果文件中有两个类，并且两者都有
  `main()` 方法，那么总是运行第一个类。如果你想运行第二个类，你必须将其移动到源文件的顶部。如果源文件中的第一个类型不是类，或者没有 `main()` 方法，源文件模式会生成一个错误。让我们来看几个例子。




  ### 提示


  在引入源文件模式之前，你需要指定要运行的类名。源文件模式直接使用文件名，它会自动运行文件中声明的第一个类。此外，源文件名与源文件内部声明的要运行的类名不必保持一致。


  清单 4-4、4-5 和 4-6 分别包含了名为 `HelloBye.java`、`ByeHello.java` 和 `EmptyHello.java` 的文件内容。每个文件都包含两个类。文件名指明了其中包含的类名。`HelloBye.java`
  文件包含 `Hello` 和 `Bye` 类。`ByeHello.java` 文件包含 `Bye` 和 `Hello` 类。`EmptyHello.java`
  文件包含 `Empty` 和 `Hello` 类。`Hello` 和 `Bye` 类包含一个 `main()` 方法。`Empty` 类不包含 `main()`
  方法。


  ```

  // EmptyHello.java

  package com.jdojo.sourcecode.mode;

  public class Empty {

  }

  public class Hello {

  public static void main(String[] args) {

  System.out.println("Hello");

  }

  }

