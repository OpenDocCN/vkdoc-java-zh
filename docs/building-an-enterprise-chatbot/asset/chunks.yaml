    关于将自定义技能托管为 Web 服务的详细信息，请参阅 [`https://developer.amazon.com/docs/custom-skills/host-a-custom-skill-as-a-web-service.html`](https://developer.amazon.com/docs/custom-skills/host-a-custom-skill-as-a-web-service.html)
    。


    ## 持续改进框架


    在实际案例中，用户的表述很可能由于多种原因而未被我们的意图引擎分类或理解，例如该表述属于意图引擎范围之外的外部意图，或者由于意图匹配分数过低导致引擎信心不足。在生产环境中，我们观察到有相当数量的用户表述被引擎误解或完全无法理解。我们提出了一个框架，可以帮助
    IRIS 变得更智能、更聪明，从而模拟自然的对话。


    在自学习模块中，我们提出了三个改进组件，如图 9-20 所示：


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig20_HTML.jpg](img/478492_1_En_9_Fig20_HTML.jpg)


    图 9-20


    用于持续改进的 IRIS 功能组件


    *   意图确认（二次核对）


    *   下一意图预测


    *   人工介入


    ### 意图确认（二次核对）


    我们以用户表述“人寿保险”为例，该表述可能匹配到某个可能的意图场景；参见图 9-21。


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig21_HTML.jpg](img/478492_1_En_9_Fig21_HTML.jpg)


    图 9-21


    意图匹配及对应分数


    当我们将用户表述与图 9-21 中列出的可能意图进行匹配时，会得到一系列意图及其各自的匹配分数。IRIS 的意图引擎模块仅在匹配分数高于 0.75 时才会返回意图匹配结果。我们也将此称为最低阈值分数，低于该分数的意图匹配将不会在响应中被考虑。在“人寿保险”这个例子中，意图引擎返回了
    `LIFE_INSURANCE_QUOTE_INTENT` 作为响应。


    对此实现的一种优化是引入一个低于阈值分数但足够相关以供进一步处理的最低匹配分数。我们之前提到，最低阈值分数是指低于该分数的意图匹配不会从意图分类引擎的响应中返回。而最低匹配分数是指，如果一个意图未达到最低阈值分数，但分数高于此值，则会被考虑进行进一步处理。


    让我们通过另一个用户表述的例子来理解：“人寿保险费用”，其匹配分数如图 9-22 所示。


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig22_HTML.jpg](img/478492_1_En_9_Fig22_HTML.jpg)


    图 9-22


    另一个示例，展示不同的意图匹配及对应分数


    在这个例子中，分数低于最低阈值分数，在当前实现中，由于意图分类引擎未返回明确的意图，用户表述将默认执行搜索。如果我们考虑将最低匹配分数设为 0.5，那么意图
    `LIFE_INSURANCE_QUOTE_INTENT` 就可以被考虑进行进一步确认。


    这些分数（0.75 作为最低阈值分数，0.5 作为最低匹配分数）应基于训练和测试数据集得出，并且后续也可能根据实际用户表述数据和意图分类引擎的性能进行调整。


    因此，我们可以对 IRIS 进行修改，当表述的分类分数在 0.5 到 0.75 之间时，提示用户进行确认。


    通过上述实现，典型的对话流程可以如下进行：


    ```

    用户：你好

    IRIS：你好

    用户：人寿保险费用

    IRIS：我未能准确理解您的查询。您是否需要人寿保险报价？

    用户：是的

    IRIS：好的，我可以帮您处理。请问您的年龄是？

    ```


    ### 预测下一意图


    此功能使 IRIS 能够利用日志来理解和预测用户可能的下一个最佳意图。图 9-23 展示了用户日志。


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig23_HTML.jpg](img/478492_1_En_9_Fig23_HTML.jpg)


    图 9-23


    包含意图和序列的用户日志


    在对 INTENT-A 的简单汇总中，如图 9-24 所示，我们发现 INTENT-B 是整体上最常见的下一个意图。


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig24_HTML.jpg](img/478492_1_En_9_Fig24_HTML.jpg)


    图 9-24


    用于预测下一意图序列的日志汇总


    我们还可以使用路径预测、关联规则和频繁项集等技术来获取最可预测的用户下一个意图。


    在没有预测意图功能的情况下，与 IRIS 的典型对话可能如下进行：


    ```

    用户：嗨

    IRIS：你好

    用户：我想要一个人寿保险报价

    IRIS：好的，我来帮您处理。请问您的年龄是？

    用户：我 24 岁

    IRIS：您在过去 12 个月内是否吸烟？

    用户：没有

    IRIS：您的身高是多少？

    用户：我身高 181 厘米

    IRIS：您的体重是多少？

    用户：163 磅

    IRIS：好消息！您有资格获得加速核保决定。

    用户：谢谢。我想购买人寿保险单。

    IRIS：好的。您能提供您的电子邮件地址以便我开始申请流程吗？

    用户：user@gmail.com

    ....

    ```


    借助预测下一意图功能，对话将如下进行：


    ```

    用户：嗨

    IRIS：你好

    用户：我想要一个人寿保险报价

    IRIS：好的，我来帮您处理。请问您的年龄是？

    用户：我 24 岁

    IRIS：您在过去 12 个月内是否吸烟？

    用户：没有

    IRIS：您的身高是多少？

    用户：我身高 181 厘米

    IRIS：您的体重是多少？

    用户：163 磅

    IRIS：好消息！您有资格获得加速核保决定。请问您的电子邮件地址是什么，以便我开始申请流程？

    用户：user@gmail.com

    ....

    ```'
- fmt: '### A Human in the Loop


    The third improvement to the framework we introduced in this chapter was a human
    in the loop. Figure [9-20](#478492_1_En_9_Chapter.xhtml#Fig20) shows various functional
    components for continuous improvement. Regardless of the techniques we use in
    making `IRIS` understand intent in a better way, there will always be some conversation
    that `IRIS` will not be able to understand. This is for the simple reason that
    `IRIS` does not have all the information of the universe and will always be designed
    to fulfill only a known set of functionalities.


    We know that `IRIS` is designed to perform certain operations like calculating
    insurance eligibility, providing account balance, claim status, etc. Let’s assume
    that a certain percentage of users are asking `IRIS` for a change of address of
    their insurance policy. This is not supported by `IRIS` today, and it is challenging
    for machines to interpret this kind of new information.


    Let’s assume some of the user utterances are as shown in Figure [9-25](#478492_1_En_9_Chapter.xhtml#Fig25).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig25_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig25_HTML.jpg)


    Figure 9-25


    Utterances and counts


    With a human in the loop, these utterances can be analyzed further. In Figure
    [9-26](#478492_1_En_9_Chapter.xhtml#Fig26), the first two utterances can be classified
    into one intent. Since this intent is 66% of the total logs, `IRIS` can be enhanced
    to support `ADDRESS_CHANGE` depending on the product decision. In some cases,
    an utterance can be mapped to an existing intent such as the last utterance. This
    will help the intent classification engine to further classify intents better
    due to the availability of more dataset.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig26_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig26_HTML.jpg)


    Figure 9-26


    Utterances, intents, and counts


    Utterances such as questions around non-related things such as users asking about
    cricket match scores or details on Brexit or train timings will also happen. They
    are logs that do not need further processing and will be ignored by subject matter
    experts enhancing the `IRIS` feedback loop.


    ## Summary


    In this concluding chapter, we discussed the various ways to deploy a chatbot
    into the cloud, we demonstrated a 5-minute introduction to integrating `IRIS`
    with Alexa, and we discussed the continuous improvement of `IRIS` through feedback
    loops via log files and humans in the loop.


    In this book, we have kept a fine balance with three pillars: business context,
    theoretical foundations on machines’ handling of natural languages, and real-world
    development of a chatbot from scratch. We believe these three pillars will help
    build a truly enterprise-grade chatbot, with a well-defined ROI. Additionally,
    we also focused on ethical concerns in using personal data and how countries in
    European Union have agreed upon the GDPR regulations to safeguard people’s privacy.


