    got him at age 3, I''m so glad that now I can buy his food from Amazon")

    #此语法规则：当可选的限定词（DT）后跟任意数量的形容词（JJ）和一个名词（NN）时，查找 NP 语块

    grammar = "NP: {<DT>?<JJ>*<NN>}"

    #使用上述语法的正则表达式解析器

