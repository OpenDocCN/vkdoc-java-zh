- fmt: '### Pattern-Based Search


    spaCy also provides a pattern or rule-based search. We can define our pattern
    on top of a function like `LOWER`. For example, in the following code, we define
    a search span as "Walmart" in lowercase followed by a punctuation mark. This pattern
    could be written like:


    ```

    pattern = [{"LOWER": "walmart"}, {"IS_PUNCT": True}]

    ```


    In the search span, if we want to find the word "Walmart," we define this using
    the `matcher.add` method and pass `pattern` as the argument to the method.


    This syntax is more user-friendly than a cumbersome regular expression, which
    is hard to understand. The result of the search reveals that the word "Walmart"
    is found at the seventh position in the string and ends at the ninth position.
    The output also shows the span text as "Walmart &," which we defined in the pattern.


    ```

    # Spacy - Rule-based matching

    import spacy

    from spacy.matcher import Matcher

    nlp = spacy.load("en_core_web_sm")

    matcher = Matcher(nlp.vocab)

    #Search for Walmart after converting the text in lower case and

    pattern = [{"LOWER": "walmart"}, {"IS_PUNCT": True}]

    matcher.add("Walmart", None, pattern)

    doc = nlp(u"I found these crisps at our local WalMart & figured I would give them
    a try. They were so yummy I may never go back to regular chips, not that I was
    a big chip fan anyway. The only problem is I can eat the entire bag in one sitting.
    I give these crisps a big thumbs up!")

    matches = matcher(doc)

    for match_id, start, end in matches:

    string_id = nlp.vocab.strings[match_id]  # Get string representation

    span = doc[start:end]  # The matched span

    print(match_id, string_id, start, end, span.text)

    16399848736434528297 Walmart 7 9 WalMart &

    ```


    ### Searching for Entity


    Using the `matcher` method, we can also search for a type of entity in a given
    text. In the following code, we search for the entity `ORG` (defined by `label`)
    named "walmart."


    ```

    from spacy.lang.en import English

    from spacy.pipeline import EntityRuler

    nlp = English()

    ruler = EntityRuler(nlp)

    patterns = [{"label": "ORG","pattern":[{"lower":"walmart"}]}]

    ruler.add_patterns(patterns)

    nlp.add_pipe(ruler)

    doc = nlp(u"I found these crisps at our local WalMart & figured I would give them
    a try. They were so yummy I may never go back to regular chips, not that I was
    a big chip fan anyway. The only problem is I can eat the entire bag in one sitting.
    I give these crisps a big thumbs up!")

    print([(ent.text, ent.label_) for ent in doc.ents])

    [(''WalMart'', ''ORG'')]

    ```


    ### Training a Custom NLP Model


    In many real-world datasets, the entities are not detected as per the expectations.
    The models in spaCy or NLTK are not trained on those words or tokens. In such
    cases, we can train a custom model using a private dataset. We have to create
    training data in a particular format. In the following code, we pick two sentences
    and tag an entity `PRODUCT` with its start and end position in the text. The syntax
    looks like this:


    ```

    (

    u"As soon as I tasted one and it tasted like a corn chip I checked the ingredients.
    ",

    {

    "entities": [(45, 49, "PRODUCT")]

    }

    )

    ```


    We tag the food product "corn" in the two sentences. Here we take just two sentences,
    and spaCy trains the model well with just them. If you don''t get the right entity
    with a smaller dataset, you might need to add a few more examples before the model
    will pick the right entity.


    ```

    import spacy

    import random

    train_data = [

    (u"As soon as I tasted one and it tasted like a corn chip I checked the ingredients.
    ", {"entities": [(45, 49, "PRODUCT")]}),

    (u"I found these crisps at our local WalMart & figured I would give them a try",
    {"entities": [(14, 20, "PRODUCT")]})

    ]

    other_pipes = [pipe for pipe in nlp.pipe_names if pipe != "ner"]

    with nlp.disable_pipes(*other_pipes):

    optimizer = nlp.begin_training()

    for i in range(10):

    random.shuffle(train_data)

    for text, annotations in train_data:

    nlp.update([text], [annotations], sgd=optimizer)

    nlp.to_disk("model/food_model")

    ```


    We saved the trained model to disk and named it `food_model`. In the following
    code, we load the `food_model` from disk and try to predict the entity on a test
    sentence. We see it does a good job here in identifying corn as a `PRODUCT` entity.


    ```

    import spacy

    nlp = spacy.load("model/food_model")

    text = nlp("I consume about a jar every two weeks of this, either adding it to
    fajitas or using it as a corn chip dip")

    for entity in text.ents:

    print(entity.text, entity.label_)

    corn PRODUCT

    ```


    ## CoreNLP


    CoreNLP is another popular toolkit for linguistic analysis such as POS tagging,
    dependency tree, named entity recognition, sentiment analysis, and many others.
    We are going to use the CoreNLP features from Python through a third-party wrapper
    called Stanford-corenlp. It can be installed using `pip install` in the command
    line or cloned from GitHub here: [`https://github.com/Lynten/stanford-corenlp`](https://github.com/Lynten/stanford-corenlp).


    Once you install or download the code, you need to specify the path to the Stanford-corenlp
    code from where it picks up the necessary model for the various NLP tasks.


    ### Tokenizing


    As with NLTK and spaCy, you can extract words or tokens. The model provides a
    method named `word_tokenize` for performing the tokenization:


    ```

    # Simple usage

    from stanfordcorenlp import StanfordCoreNLP

    nlp = StanfordCoreNLP()

    sentence = ''I consume about a jar every two weeks of this, either adding it to
    fajitas or using it as a corn chip dip''

    print(''Tokenize:'', nlp.word_tokenize(sentence))

    Tokenize: [''I'', ''consume'', ''about'', ''a'', ''jar'', ''every'', ''two'',
    ''weeks'', ''of'', ''this'', '','', ''either'', ''adding'', ''it'', ''to'', ''fajitas'',
    ''or'', ''using'', ''it'', ''as'', ''a'', ''corn'', ''chip'', ''dip'']

    ```


    ### Part-of-Speech Tagging


    POS can be extracted using the method `pos_tag` in the stanford-corenlp:


    ```

    print(''Part of Speech:'', nlp.pos_tag(sentence))

    Part of Speech: [(''I'', ''PRP''), (''consume'', ''VBP''), (''about'', ''IN''),
    (''a'', ''DT''), (''jar'', ''NN''), (''every'', ''DT''), (''two'', ''CD''), (''weeks'',
    ''NNS''), (''of'', ''IN''), (''this'', ''DT''), ('','', '',''), (''either'', ''CC''),
    (''adding'', ''VBG''), (''it'', ''PRP''), (''to'', ''TO''), (''fajitas'', ''NNS''),
    (''or'', ''CC''), (''using'', ''VBG''), (''it'', ''PRP''), (''as'', ''IN''), (''a'',
    ''DT''), (''corn'', ''NN''), (''chip'', ''NN''), (''dip'', ''NN'')]

    ```


    ### Named Entity Recognition


    Stanford-corenlp provides the method `ner` to extract the named entities. Observe
    that the output by default is in the IOB (Inside, Outside, and Begin) format.


    ```

    print(''Named Entities:'', nlp.ner(sentence))

    Named Entities: [(''I'', ''O''), (''consume'', ''O''), (''about'', ''O''), (''a'',
    ''O''), (''jar'', ''O''), (''every'', ''SET''), (''two'', ''SET''), (''weeks'',
    ''SET''), (''of'', ''O''), (''this'', ''O''), ('','', ''O''), (''either'', ''O''),
    (''adding'', ''O''), (''it'', ''O''), (''to'', ''O''), (''fajitas'', ''O''), (''or'',
