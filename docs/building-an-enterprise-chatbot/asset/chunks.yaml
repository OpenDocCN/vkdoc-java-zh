    ##### 分类意图


    现在我们可以使用该模型了。在以下代码中，我们尝试了几个意图，如 `GetWeather`、`BookRestaurant`、`RateBook` 和 `SearchScreeningEvent`。


    ```

    print(model(["will it rain in Edgbaston, Birmingham today?"]))

    [[''GetWeather'']]

    print(model(["book one table at a good restaurant?"]))

    [[''BookRestaurant'']]

    print(model(["Give Da Vinci Code a 5 star on my amazon purchase"]))

    [[''RateBook'']]

    print(model(["what are the show times for The Lion King"]))

    [[''SearchScreeningEvent'']]

    ```


    你可以训练一个自定义模型来为特定用例分类意图。有关训练自定义模型的更多详细信息，请参见 [`http://docs.deeppavlov.ai/en/latest/components/classifiers.html#how-to-train-on-other-datasets`](http://docs.deeppavlov.ai/en/latest/components/classifiers.html%2523how-to-train-on-other-datasets)
    。训练自定义模型是一个资源密集型过程。因此，如果你正在尝试构建一个通用聊天机器人，我们建议你在决定构建自己的模型之前，先探索此处展示的所有预训练模型：[`http://docs.deeppavlov.ai/en/latest/components/classifiers.html#pre-trained-models`](http://docs.deeppavlov.ai/en/latest/components/classifiers.html%2523pre-trained-models)
    。


    #### 问答


    聊天机器人通常需要理解对话的上下文才能回答用户的特定查询。`deeppavlov` 库提供了一个在斯坦福问答数据集（SQuAD）上训练的预训练模型，该数据集是一个阅读理解数据集，包含基于一组维基百科文章的众包问题。有关该数据集的更多详细信息，请参见
    [`https://rajpurkar.github.io/SQuAD-explorer/`](https://rajpurkar.github.io/SQuAD-explorer/)
    。


    在 SQuAD 数据集上训练的模型的主要任务是识别给定的上下文，并在该上下文中回答问题。


    ##### 构建模型


    与意图分类类似，我们使用带有 SQuAD 预训练模型配置的 `build_model` 方法。运行以下代码一次，并将 `download = True` 设置为获取所有必需的模型。同时，运行以下命令安装
    `squad_bert` 预训练模型：


    ```

    python -m deeppavlov install squad_bert

    from deeppavlov import build_model, configs

    #model = build_model(configs.squad.squad, download=True)

    model = build_model(configs.squad.squad)

    ```

