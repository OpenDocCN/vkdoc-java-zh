- fmt: '#### Neural Network Architecture


    The input vector to the neural network is a one-hot vector representing the input
    word "chatbot," by storing `1` in the `i`th position of the vector and `0` in
    all other positions, where 0 ≤ `i` ≤ `n` and `n` is the size of the vocabulary
    (set of all the unique words).


    In the hidden layer, each word vector of size `n` is multiplied with a feature
    vector of size, let''s say `1000`. When the training starts, the feature vector
    of size `1000` are all assigned a random value. The result of the multiplication
    will select the corresponding row in the `n x 1000 matrix` where the one-hot vector
    has a value of `1`.


    Finally, in the output layer, an activation function like softmax is applied to
    shrink the output value to be between 0 and 1. The following equation represents
    the softmax function, where `K` is the size of the input vector:


    ![$$ \sigma {(z)}_i=\frac{e^{z_i}}{\sum \limits_{j=1}^K{e}^{z_j}}, $$](images/478492_1_En_5_Chapter/478492_1_En_5_Chapter_TeX_Equa.png)


    ![$$ for\ i=1,\dots, K\ and\ z=\left({z}_1,\dots, {z}_k\right)\in {\mathbb{R}}^K
    $$](images/478492_1_En_5_Chapter/478492_1_En_5_Chapter_TeX_Equb.png)


    So, if the input vector representing "chatbot" is multiplied with the output vector
    represented by "enterprise," the softmax function will be close to 1 because in
    our vocabulary, both the words appeared together very frequently.


    Neural networks train the network and update the edge weights over many iterations
    of training. The final set of weights represents learnings. Figure [5-15](#478492_1_En_5_Chapter.xhtml#Fig15)
    shows the neural network architecture to train a Word2Vec model.


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig15_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig15_HTML.jpg)


    Figure 5-15: Neural network architecture to train a Word2Vec model


    #### Using the Word2Vec Pretrained Model


    In the following code, we use the pretrained Word2Vec model from a favorite Python
    library called `gensim`. Word2Vec models provide a vector representation of words
    that make various natural language tasks possible, such as identifying similar
    words, finding synonyms, word arithmetic, and many more. The most popular Word2Vec
    models are GloVe, CBOW, and skip-gram. In this section, we will use all three
    models to perform various tasks of NLU.


    In the demo, we use the model to perform many syntactic/semantic NLU word tasks.


    **Step 1:** Load the required libraries:


    ```

    from gensim.test.utils import get_tmpfile

    from gensim.models import Word2Vec

    import gensim.models

    ```


    **Step 2:** Pick some words from the Amazon Food Review and make a list:


    ```

    review_texts = [[''chips'', ''WalMart'', ''fajitas''],

    [''ingredients'', ''tasted'', ''crisps'', ''Chilling'', ''fridge'', ''nachos''],

    [''tastebuds'', ''tortilla'', ''Mexican'', ''baking''],

    [''toppings'', ''goodness'', ''product, ''fantastic'']]

    ```


    **Step 3:** Train the Word2Vec model and save the model to a temporary path. The
    function `Word2Vec` trains the neural network on the input vocabulary supplied
    to it. The following are what the arguments mean:


    - `review_texts`: Input vocabulary to the neural network (NN).

    - `size`: The size of NN layer corresponding to the degree of freedom the algorithm
    has. Usually, a bigger network is more accurate, provided there is a sizeable
    dataset to train on. The suggested range is somewhere between ten to thousands.

    - `min_count`: This argument helps in pruning the less essential words from the
    vocabulary, such as words that appeared once or twice in the corpus of millions
    of words.

    - `workers`: The function `Word2Vec` offers for training parallelization, which
    speeds up the training process considerably. As per the official docs on `gensim`,
    you need to install Cython in order to run in parallelization mode.


    ```

    path = get_tmpfile("word2vec.model")

    model = Word2Vec(review_texts, size=100, window=5, min_count=1, workers=4)

    model.save("word2vec.model")

    ```


    ### Note


    After installing Cython, you can run the following code to check if you have the
    `FAST_VERSION` of `word2vec` installed.


    ```

    from gensim.models.word2vec import FAST_VERSION

    FAST_VERSION

    ```


    **Step 4:** Load the model and get the output word vector using the attribute
    `wv` from the word vector model. The word "tortilla" was one of the words in the
    vocabulary. You can check the length of the vector which, based on the parameter
    `size` set during training, is 100; the type of vector is a numpy array.


    ```

    model = Word2Vec.load("word2vec.model")

    vector = model.wv[''tortilla'']

    vector

