  trans: '

    # 5. 自然语言处理、理解与生成


    人脑是处理、理解和生成（P-U-G）自然语言方面最先进的机器之一。人脑的能力远不止于对一种语言、方言、口音和对话语气进行 P-U-G 操作。迄今为止，还没有任何机器能达到人类无缝完成这三项任务的潜力。然而，机器学习算法和计算能力的进步，正使创造类人机器人的遥远梦想成为可能。


    在本章中，我们将结合用例和示例，探讨自然语言的 P-U-G 及其细微差别。表 5-1 快速总结了自然语言处理（NLP）、自然语言理解（NLU）和自然语言生成（NLG）及其一些功能和实际应用。我们将在各自的章节中更详细地介绍自然语言处理、理解和生成。


    表 5-1


    NLP、NLU 和 NLG


    | 类型 | NLP | NLU | NLG |

    | --- | --- | --- | --- |

    | **简介** | 通过分解、理解其含义并确定适当操作来处理和分析书面或口头文本。它涉及解析、断句和词干提取。 | NLP 的一种特定类型，有助于处理阅读理解，包括从语篇内容中理解含义并识别段落主旨的能力。
    | NLG 是 NLP 的任务之一，用于从知识库的结构化数据生成自然语言文本。换句话说，它将数据转换为书面叙述。 |

    | **功能** | 词性识别、文本分类、命名实体识别、翻译、语音识别 | 自动摘要、语义解析、问答、情感分析 | 内容确定、文档结构组织、交互式对话中的文本生成
    |

    | **实际应用** | 数字新闻聚合公司的文章分类 | 构建问答聊天机器人，利用 Twitter 和 Facebook 数据进行品牌情感分析 | 为电子商务网站生成产品描述或金融投资组合摘要
    |


    ## 聊天机器人架构


    在构建企业级聊天机器人时，到目前为止，您已经了解了如何识别数据源、设计聊天机器人架构、列出业务用例以及许多其他有助于企业高效处理、减少人工劳动和降低运营成本的概念。在本章中，我们将重点讨论聊天机器人的核心部分：处理文本数据并参与类人对话的能力。图
    5-1 展示了一个利用 NLP、NLU 和 NLG 技术构建企业级聊天机器人的架构。


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig1_HTML.jpg](img/478492_1_En_5_Fig1_HTML.jpg)


    图 5-1


    聊天机器人架构图


    假设一家航空公司构建了一个聊天机器人，用于通过其网站或社交媒体页面预订航班。以下是按照图 5-1 所示架构的步骤：


    1.  客户通过航空公司的 Facebook 页面说：“帮我预订一张明天从伦敦到纽约的机票。”在这种情况下，Facebook 成为表示层。一个功能完备的聊天机器人可以集成到公司的网站、社交网络页面以及
    Skype 和 Slack 等即时通讯应用中。


    2.  接下来，消息被传送到消息后端，纯文本在此处通过 NLP/NLU 引擎，文本被分解为标记，消息被转换为机器可理解的命令。我们将在本章中更详细地重新讨论这一点。


    3.  然后，决策引擎将命令与预配置的工作流进行匹配。例如，要预订航班，系统需要出发地和目的地。这就是 NLG 发挥作用的地方。聊天机器人会问：*“好的，我将帮助您预订从伦敦到纽约的航班。请告诉我您更喜欢从希思罗机场还是盖特威克机场出发？”*
    聊天机器人获取出发地和目的地，并自动生成一个后续问题，询问客户偏好哪个机场。


    4.  聊天机器人现在访问数据层，并从预置的数据源（通常可以连接到实时预订系统）获取航班信息。数据源根据设计提供航班可用性、价格和许多其他服务。


    有些聊天机器人侧重于生成式回复，而另一些则用于检索信息并将其嵌入预设计的对话流程中。例如，在航班预订用例中，我们几乎知道客户可能用来预订航班的所有方式；而如果以一家远程医疗公司的聊天机器人为例，我们则不确定患者可能提出的所有问题。因此，在远程医疗公司的聊天机器人中，我们需要借助使用
    NLG 技术构建的生成模型，而在航班预订聊天机器人中，一个结合了 NLP 和 NLP 引擎的、良好的基于检索的系统应该就能工作。


    由于本书是关于构建企业级聊天机器人的，我们将更多地关注 P-U-G 在自然语言中的应用，而不是深入探讨该学科的基础知识。在下一节中，我们将使用一些最流行的
    Python 工具展示 NLP 和 NLU 的各种技术。还有其他基于 Java 和 C#的库；然而，Python 库提供了更强大的社区支持和更快的开发速度。


    此外，为了区分 NLP 和 NLU，图 5-2 中的维恩图展示了 NLP 和 NLU 的一些应用。它显示 NLU 是 NLP 的一个子集。这种区分仅在于任务，而非范围。总体目标是处理和理解自然语言文本，使机器像人类一样思考。


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig2_HTML.jpg](img/478492_1_En_5_Fig2_HTML.jpg)


    图 5-2


    NLP 和 NLU 的应用


    ## 流行的开源 NLP 和 NLU 工具


    在本节中，我们将简要探讨可用于执行自然语言处理、理解和生成的各种开源工具。虽然这些工具中的每一个都不区分自然语言的 P-U-G，但我们将在相应的三个独立标题下展示这些工具的能力。


    ### NLTK


    自然语言工具包（NLTK）是一个用于处理英语词汇的 Python 库。它采用 Apache 2.0 开源许可证。NLTK 使用 Python 编程语言编写。以下是
    NLTK 可以执行的一些任务：


    *   **文本分类**：将文本分类到不同类别，以便更好地组织和过滤内容

    *   **句子分词**：将句子分解为单词，用于符号化和统计自然语言处理

    *   **词干提取**：将单词还原为词基或词根形式

    *   **词性标注**：将单词标注为词性，从而将单词归类到具有相似语法属性的类别中

    *   **文本解析**：基于底层语法确定文本的句法结构

    *   **语义推理**：理解单词含义以创建表示的能力


    NLTK 是教授 NLP 的首选工具。它也被广泛用作原型设计和研究的平台。

    '
- fmt: '### spaCy


    Most organizations that build a product involving natural language data are adapting
    `spaCy`. It stands out with its offering of a production-grade NLP engine that
    is accurate and fast. With the extensive documentation, the adaption rate further
    increases. It is developed in Python and Cython. All the language models in `spaCy`
    are trained using deep learning, which provides high accuracy for all NLP tasks.


    Currently, the following are some high-level capabilities of `spaCy`:


    - **Covers NLTK features:** Provides all the features of NLTK-like tokenization,
    POS tagging, dependency trees, named entity recognition, and many more.

    - **Deep learning workflow:** `spaCy` supports deep learning workflows, which
    can connect to models trained on popular frameworks like Tensorflow, Keras, Scikit-learn,
    and PyTorch. This makes `spaCy` the most potent library when it comes to building
    and deploying sophisticated language models for real-world applications.

    - **Multi-language support:** Provides support for more than 50 languages including
    French, Spanish, and Greek.

    - **Processing pipeline:** Offers an easy-to-use and very intuitive processing
    pipeline for performing a series of NLP tasks in an organized manner. For example,
    a pipeline for performing POS tagging, parsing the sentence, and named the entity
    extraction could be defined in a list like this: `pipeline = ["tagger", "parse",
    "ner"]`. This makes the code easy to read and quick to debug.

    - **Visualizers:** Using `displaCy`, it becomes easy to draw a dependency tree
    and entity recognizer. We can add our colors to make the visualization aesthetically
    pleasing and beautiful. It quickly renders in a Jupyter notebook as well.


    ### CoreNLP


    Stanford `CoreNLP` is one of the oldest and most robust tools for all natural
    language tasks. Its suite of functions offers many linguistic analysis capabilities,
    including the already discussed POS tagging, dependency tree, named entity recognition,
    sentiment analysis, and others. Unlike `spaCy` and `NLTK`, `CoreNLP` is written
    in Java. It also provides Java APIs to use from the command line and third-party
    APIs for working with modern programming languages. The following are the core
    features of using `CoreNLP`:


    - **Fast and robust:** Since it is written in Java, which is a time-tested and
    robust programming language, `CoreNLP` is a favorite for many developers.

    - **A broad range of grammatical analysis:** Like `NLTK` and `spaCy`, `CoreNLP`
    also provides a good number of analytical capabilities to process and understand
    natural language.

    - **API integration:** `CoreNLP` has excellent API support for running it from
    the command line and programming languages like Python via a third-party API or
    web service.

    - **Support multiple Operating Systems (OSs):** `CoreNLP` works in Windows, Linux,
    and MacOS.

    - **Language support:** Like `spaCy`, `CoreNLP` provides useful language support,
    which includes Arabic, Chinese, and many more.


    ### gensim


    `gensim` is a popular library written in Python and Cython. It is robust and production-ready,
    which makes it another popular choice for NLP and NLU. It can help analyze the
    semantic structure of plain-text documents and come out with important topics.
    The following are some core features of `gensim`:


    - **Topic modeling:** It automatically extracts semantic topics from documents.
    It provides various statistical models, including latent Dirichlet analysis (LDA)
    for topic modeling.

    - **Pretrained models:** It has many pretrained models that provide out-of-the-box
    capabilities to develop general-purpose functionalities quickly.

    - **Similarity retrieval:** `gensim`’s capability to extract semantic structures
    from any document makes it an ideal library for similarity queries on numerous
    topics.


    Table [5-2](#478492_1_En_5_Chapter.xhtml#Tab2) from the `spaCy` website summarizes
    if a given NLP feature is available in `NLTK`, `spaCy`, and `CoreNLP`.


    **Table 5-2** Features available in `spaCy`, `NLTK`, and `CoreNLP`


    | S.No. | Feature | spaCy | NLTK | CoreNLP |

    | --- | --- | --- | --- | --- |

    | **1** | Programming language | Python | Python | Java/Python |

    | **2** | Neural network models | Yes | No | Yes |

    | **3** | Integrated word vectors | Yes | No | No |

    | **4** | Multi-language support | Yes | Yes | Yes |

    | **5** | Tokenization | Yes | Yes | Yes |

    | **6** | Part-of-speech tagging | Yes | Yes | Yes |

    | **7** | Sentence segmentation | Yes | Yes | Yes |

    | **8** | Dependency parsing | Yes | No | Yes |

    | **9** | Entity recognition | Yes | Yes | Yes |

    | **10** | Entity linking | No | No | No |

    | **11** | Coreference resolution | No | No | Yes |


    ### TextBlob


    `TextBlob` is a relatively less popular but easy-to-use Python library that provides
    various NLP capabilities like the libraries discussed above. It extends the features
    provided by `NLTK` but in a much-simplified form. The following are some of the
    features of `TextBlob`:


    - **Sentiment analysis:** It provides an easy-to-use method for computing polarity
    and subjectivity kinds of scores that measures the sentiment of a given text.

    - **Language translations:** Its language translation is powered by Google Translate,
    which provides support for more than 100 languages.

    - **Spelling corrections:** It uses a simple spelling correction method demonstrated
    by Peter Norvig on his blog at [`http://norvig.com/spell-correct.html`](http://norvig.com/spell-correct.html).
    Currently the Engineering Director at Google, his approach is 70% accurate.


    ### fastText


    `fastText` is a specialized library for learning word embeddings and text classification.
    It was developed by researchers in Facebook’s FAI Research (FAIR) lab. It is written
    in C++ and Python, making it very efficient and fast in processing even a large
    chunk of data. The following are some of the features of `fastText`:


    - **Word embedding learnings:** Provides many word embedding models using skipgram
    and Continous Bag of Words (CBOW) by unsupervised training.

    - **Word vectors for out-of-vocabulary words:** It provides the capability to
    obtain word vectors even if the word is not present in the training vocabulary.

    - **Text classification:** `fastText` provides a fast text classifier, which in
    their paper titled “Bag of Tricks for Efficient Text Classification” claims to
    be often at par with many deep learning classifiers’ accuracy and training time.


    In the next few sections, you will see how to apply these tools to perform various
    tasks in NLP, NLU, and NLG.


    ## Natural Language Processing


    Language skills are considered the most sophisticated tasks that a human can perform.
    Natural language processing deals with understanding and manicuring natural language
    text or speech to perform specific useful desired tasks. NLP combines ideas and
    concepts from computer science, linguistics, mathematics, artificial intelligence,
    machine learning, and psychology.


    Mining information from unstructured textual data is not as straightforward as
    performing a database query using SQL. Categorizing documents based on keywords,
    identifying a mention of a brand in a social media post, and tracking the popularity
    of a leader on Twitter are all possible if we can identify entities like a person,
    organization, and other useful information.


    The primary tasks in NLP are processing and analyzing written or spoken text by
    breaking it down, comprehending its meaning, and determining appropriate action.
    It involves parsing, sentence breaking, stemming, dependency tree, entity extraction,
    and text categorization.


    We will see how words in a language are broken into smaller tokens and how various
    transformations work (transforming textual data into a structured and numeric
    value). We will also explore popular libraries like `NLTK`, `TextBlob`, `spaCy`,
    `CoreNLP`, and `fastText`.'
  raw: '### spaCy


    Most organizations that build a product involving natural language data are adapting
    spaCy. It stands out with its offering of a production-grade NLP engine that is
    accurate and fast. With the extensive documentation, the adaption rate further
    increases. It is developed in Python and Cython. All the language models in spaCy
    are trained using deep learning, which provides high accuracy for all NLP tasks.


    Currently, the following are some high-level capabilities of spaCy:


    *   **Covers NLTK features:** Provides all the features of NLTK-like tokenization,
    POS tagging, dependency trees, named entity recognition, and many more.


    *   **Deep learning workflow:** spaCy supports deep learning workflows, which
    can connect to models trained on popular frameworks like Tensorflow, Keras, Scikit-learn,
    and PyTorch. This makes spaCy the most potent library when it comes to building
    and deploying sophisticated language models for real-world applications.


    *   **Multi-language support:** Provides support for more than 50 languages including
    French, Spanish, and Greek.


    *   **Processing pipeline:** Offers an easy-to-use and very intuitive processing
    pipeline for performing a series of NLP tasks in an organized manner. For example,
    a pipeline for performing POS tagging, parsing the sentence, and named the entity
    extraction could be defined in a list like this: `pipeline = ["tagger," "parse,"
    "ner"]`. This makes the code easy to read and quick to debug.


    *   **Visualizers:** Using displaCy, it becomes easy to draw a dependency tree
    and entity recognizer. We can add our colors to make the visualization aesthetically
    pleasing and beautiful. It quickly renders in a Jupyter notebook as well.


    ### CoreNLP


    Stanford CoreNLP is one of the oldest and most robust tools for all natural language
    tasks. Its suite of functions offers many linguistic analysis capabilities, including
    the already discussed POS tagging, dependency tree, named entity recognition,
    sentiment analysis, and others. Unlike spaCy and NLTK, CoreNLP is written in Java.
    It also provides Java APIs to use from the command line and third-party APIs for
    working with modern programming languages. The following are the core features
    of using CoreNLP:


    *   **Fast and robust:** Since it is written in Java, which is a time-tested and
    robust programming language, CoreNLP is a favorite for many developers.


    *   **A broad range of grammatical analysis:** Like NLTK and spaCy, CoreNLP also
    provides a good number of analytical capabilities to process and understand natural
    language.


    *   **API integration:** CoreNLP has excellent API support for running it from
    the command line and programming languages like Python via a third-party API or
    web service.


    *   **Support multiple Operating Systems (OSs):** CoreNLP works in Windows, Linux,
    and MacOS.


    *   **Language support:** Like spaCy, CoreNLP provides useful language support,
    which includes Arabic, Chinese, and many more.


    ### gensim


    gensim is a popular library written in Python and Cython. It is robust and production-ready,
    which makes it another popular choice for NLP and NLU. It can help analyze the
    semantic structure of plain-text documents and come out with important topics.
    The following are some core features of gensim:


    *   **Topic modeling*****:*** It automatically extracts semantic topics from documents.
    It provides various statistical models, including latent Dirichlet analysis (LDA)
    for topic modeling.


    *   **Pretrained models:** It has many pretrained models that provide out-of-the-box
    capabilities to develop general-purpose functionalities quickly.


    *   **Similarity retrieval:** gensim’s capability to extract semantic structures
    from any document makes it an ideal library for similarity queries on numerous
    topics.


    Table [5-2](#478492_1_En_5_Chapter.xhtml#Tab2) from the spaCy website summarizes
    if a given NLP feature is available in NLTK, spaCy, and CoreNLP.


    Table 5-2


    Features available in spaCy, NLTK, and CoreNLP


    | S.No. | Feature | spaCy | NLTK | CoreNLP |

    | --- | --- | --- | --- | --- |

    | **1** | Programming language | Python | Python | Java/Python |

    | **2** | Neural network models | **Yes** | **No** | **Yes** |

    | **3** | Integrated word vectors | **Yes** | **No** | **No** |

    | **4** | Multi-language support | **Yes** | **Yes** | **Yes** |

    | **5** | Tokenization | **Yes** | **Yes** | **Yes** |

    | **6** | Part-of-speech tagging | **Yes** | **Yes** | **Yes** |

    | **7** | Sentence segmentation | **Yes** | **Yes** | **Yes** |

    | **8** | Dependency parsing | **Yes** | **No** | **Yes** |

    | **9** | Entity recognition | **Yes** | **Yes** | **Yes** |

    | **10** | Entity linking | **No** | **No** | **No** |

    | **11** | Coreference resolution | **No** | **No** | **Yes** |


    ### TextBlob


    TextBlob is a relatively less popular but easy-to-use Python library that provides
    various NLP capabilities like the libraries discussed above. It extends the features
    provided by NLTK but in a much-simplified form. The following are some of the
    features of TextBlob:


    *   **Sentiment analysis:** It provides an easy-to-use method for computing polarity
    and subjectivity kinds of scores that measures the sentiment of a given text.


    *   **Language translations:** Its language translation is powered by Google Translate,
    which provides support for more than 100 languages.


    *   **Spelling corrections:** It uses a simple spelling correction method demonstrated
    by Peter Norvig on his blog at [`http://norvig.com/spell-correct.html`](http://norvig.com/spell-correct.html)
    . Currently the Engineering Director at Google, his approach is 70% accurate.


    ### fastText


    fasText is a specialized library for learning word embeddings and text classification.
    It was developed by researchers in Facebook’s FAI Research (FAIR) lab. It is written
    in C++ and Python, making it very efficient and fast in processing even a large
    chunk of data. The following are some of the features of fastText:


    *   **Word embedding learnings:** Provides many word embedding models using skipgram
    and Continous Bag of Words (CBOW) by unsupervised training.


    *   **Word vectors for out-of-vocabulary words:** It provides the capability to
    obtain word vectors even if the word is not present in the training vocabulary.


    *   **Text classification:** fastText provides a fast text classifier, which in
    their paper titled “Bag of Tricks for Efficient Text Classification” claims to
    be often at par with many deep learning classifiers’ accuracy and training time.


    In the next few sections, you will see how to apply these tools to perform various
    tasks in NLP, NLU, and NLG.


    ## Natural Language Processing


    Language skills are considered the most sophisticated tasks that a human can perform.
    Natural language processing deals with understanding and manicuring natural language
    text or speech to perform specific useful desired tasks. NLP combines ideas and
    concepts from computer science, linguistics, mathematics, artificial intelligence,
    machine learning, and psychology.


    Mining information from unstructured textual data is not as straightforward as
    performing a database query using SQL. Categorizing documents based on keywords,
    identifying a mention of a brand in a social media post, and tracking the popularity
    of a leader on Twitter are all possible if we can identify entities like a person,
    organization, and other useful information.


    The primary tasks in NLP are processing and analyzing written or spoken text by
    breaking it down, comprehending its meaning, and determining appropriate action.
    It involves parsing, sentence breaking, stemming, dependency tree, entity extraction,
    and text categorization.


    We will see how words in a language are broken into smaller tokens and how various
    transformations work (transforming textual data into a structured and numeric
    value). We will also explore popular libraries like NLTK, TextBlob, spaCy, CoreNLP,
    and fastText.'
  trans: '

    ### spaCy


    大多数构建涉及自然语言数据产品的组织都在采用 spaCy。它凭借提供准确且快速的生产级 NLP 引擎而脱颖而出。加上详尽的文档，其采用率进一步提高。该库使用
    Python 和 Cython 开发。spaCy 中的所有语言模型均使用深度学习进行训练，这为所有 NLP 任务提供了高精度。


    目前，spaCy 具备以下一些高级功能：


    *   **涵盖 NLTK 功能：** 提供 NLTK 的所有功能，如分词、词性标注、依存句法树、命名实体识别等。


    *   **深度学习工作流：** spaCy 支持深度学习工作流，可以连接在 TensorFlow、Keras、Scikit-learn 和 PyTorch
    等流行框架上训练的模型。这使得 spaCy 成为构建和部署用于实际应用的复杂语言模型时最强大的库。


    *   **多语言支持：** 支持超过 50 种语言，包括法语、西班牙语和希腊语。


    *   **处理流水线：** 提供一个易于使用且非常直观的处理流水线，用于以有序的方式执行一系列 NLP 任务。例如，用于执行词性标注、句子解析和命名实体提取的流水线可以像这样定义在一个列表中：`pipeline
    = ["tagger", "parser", "ner"]`。这使得代码易于阅读且便于调试。


    *   **可视化工具：** 使用 displaCy，可以轻松绘制依存句法树和实体识别器。我们可以添加自己的颜色，使可视化效果更美观悦目。它也能在 Jupyter
    notebook 中快速渲染。


    ### CoreNLP


    Stanford CoreNLP 是所有自然语言任务中最古老、最强大的工具之一。其功能套件提供了许多语言分析能力，包括已讨论过的词性标注、依存句法树、命名实体识别、情感分析等。与
    spaCy 和 NLTK 不同，CoreNLP 是用 Java 编写的。它还提供了从命令行使用的 Java API，以及用于与现代编程语言协作的第三方 API。以下是使用
    CoreNLP 的核心功能：


    *   **快速且稳健：** 由于它使用久经考验且稳健的 Java 编程语言编写，CoreNLP 是许多开发者的最爱。


    *   **广泛的语法分析：** 与 NLTK 和 spaCy 一样，CoreNLP 也提供了大量分析能力来处理和理解自然语言。


    *   **API 集成：** CoreNLP 拥有出色的 API 支持，可以通过第三方 API 或 Web 服务从命令行以及 Python 等编程语言运行它。


    *   **支持多种操作系统：** CoreNLP 可在 Windows、Linux 和 MacOS 上运行。


    *   **语言支持：** 与 spaCy 类似，CoreNLP 提供了有用的语言支持，包括阿拉伯语、中文等。


    ### gensim


    gensim 是一个用 Python 和 Cython 编写的流行库。它稳健且可用于生产环境，这使其成为 NLP 和 NLU 领域的另一个热门选择。它可以帮助分析纯文本文档的语义结构，并提炼出重要主题。以下是
    gensim 的一些核心功能：


    *   **主题建模：** 它自动从文档中提取语义主题。它提供了多种统计模型，包括用于主题建模的潜在狄利克雷分析（LDA）。


    *   **预训练模型：** 它拥有许多预训练模型，这些模型提供了开箱即用的能力，可以快速开发通用功能。


    *   **相似性检索：** gensim 从任何文档中提取语义结构的能力，使其成为对众多主题进行相似性查询的理想库。


    spaCy 网站上的表 5-2 总结了 NLTK、spaCy 和 CoreNLP 中是否提供某个给定的 NLP 功能。


    表 5-2


    spaCy、NLTK 和 CoreNLP 中可用的功能


    | 序号 | 功能 | spaCy | NLTK | CoreNLP |

    | --- | --- | --- | --- | --- |

    | **1** | 编程语言 | Python | Python | Java/Python |

    | **2** | 神经网络模型 | **是** | **否** | **是** |

    | **3** | 集成词向量 | **是** | **否** | **否** |

    | **4** | 多语言支持 | **是** | **是** | **是** |

    | **5** | 分词 | **是** | **是** | **是** |

    | **6** | 词性标注 | **是** | **是** | **是** |

    | **7** | 句子分割 | **是** | **是** | **是** |

    | **8** | 依存句法分析 | **是** | **否** | **是** |

    | **9** | 实体识别 | **是** | **是** | **是** |

    | **10** | 实体链接 | **否** | **否** | **否** |

    | **11** | 共指消解 | **否** | **否** | **是** |


    ### TextBlob


    TextBlob 是一个相对不那么流行但易于使用的 Python 库，它提供了与上述库类似的各种 NLP 能力。它扩展了 NLTK 提供的功能，但形式更为简化。以下是
    TextBlob 的一些功能：


    *   **情感分析：** 它提供了一种易于使用的方法来计算极性和主观性分数，用于衡量给定文本的情感。


    *   **语言翻译：** 其语言翻译由 Google 翻译提供支持，支持超过 100 种语言。


    *   **拼写纠正：** 它使用了 Peter Norvig 在其博客 [`http://norvig.com/spell-correct.html`](http://norvig.com/spell-correct.html)
    上演示的一种简单的拼写纠正方法。作为现任 Google 工程总监，他的方法准确率可达 70%。


    ### fastText


    fastText 是一个专门用于学习词嵌入和文本分类的库。它由 Facebook 的 FAIR 实验室的研究人员开发。该库使用 C++ 和 Python 编写，使其在处理大量数据时非常高效和快速。以下是
    fastText 的一些功能：


    *   **词嵌入学习：** 通过无监督训练，使用 skipgram 和连续词袋（CBOW）模型提供多种词嵌入模型。


    *   **词汇外单词的词向量：** 即使单词不在训练词汇表中，它也提供获取词向量的能力。


    *   **文本分类：** fastText 提供了一个快速的文本分类器，在其题为“Bag of Tricks for Efficient Text Classification”的论文中声称，该分类器在准确率和训练时间上通常能与许多深度学习分类器相媲美。


    在接下来的几个部分中，你将看到如何应用这些工具来执行 NLP、NLU 和 NLG 中的各种任务。


    ## 自然语言处理


    语言技能被认为是人类能够执行的最复杂的任务。自然语言处理涉及理解和处理自然语言文本或语音，以执行特定的、有用的、期望的任务。NLP 融合了计算机科学、语言学、数学、人工智能、机器学习和心理学中的思想和概念。


    从非结构化的文本数据中挖掘信息并不像使用 SQL 执行数据库查询那样直接。如果我们能够识别出人物、组织和其他有用信息等实体，那么基于关键词对文档进行分类、识别社交媒体帖子中提到的品牌、以及追踪
    Twitter 上某位领导人的受欢迎程度，都是可以实现的。


    NLP 的主要任务是通过分解书面或口头文本、理解其含义并确定适当的行动来处理和分析它们。这涉及解析、断句、词干提取、依存句法树、实体提取和文本分类。


    我们将看到语言中的单词如何被分解成更小的词元，以及各种转换（将文本数据转换为结构化的数值）是如何工作的。我们还将探索 NLTK、TextBlob、spaCy、CoreNLP
    和 fastText 等流行库。

