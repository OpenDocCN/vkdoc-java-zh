    \ 请求消息包含文本、发送者 ID、序列号和时间戳。\n    var params = {\n    message: message.text,\n \
    \   sender: message.sender.id,\n    seq: message.seq,\n    timestamp: message.\
    \ timestamp\n    };\n    var esc = encodeURIComponent;\n    var query = Object.keys(params)\n\
    \    .map(k => esc(k) + '=' + esc(params[k]))\n    .join('&');\n    /* fetch 发起\
    \ HTTP GET 调用，接收响应并将 'message' 传回 Facebook。\n    */\n    fetch(url +query)\n \
    \   .then(response => {\n    response.json().then(json => {\n    bot.reply(message,\
    \ json.message);\n    });\n    })\n    .catch(error => {\n    bot.reply(message,\
    \ \"\");\n    });\n    });\n    }\n    module.exports = webhooks;\n    ```\n\n\
    3.  添加 Webhook 验证。有关 botkit-facebook 集成的更多详细信息，请参阅 [`www.botkit.ai/docs/readme-facebook.html`](http://www.botkit.ai/docs/readme-facebook.html)\
    \ 。\n\n```\nvar Botkit = require('botkit');\nvar commandLineArgs = require('command-line-args');\n\
    var localtunnel = require('localtunnel');\n// 读取静态文件\nvar server = require(__dirname\
    \ + '/server.js');\nvar conf = require(__dirname + '/conf.js');\nvar webhook =\
    \ require(__dirname + '/webhooks.js');\n// 命令行参数，用于在本地模式或服务器模式下运行；在本地模式下，我们需要使用\
    \ localtunnel 连接到 Facebook Messenger webhook，因为它需要一个 HTTPS 端点。\nconst ops = commandLineArgs([\n\
    {name: 'lt', alias: 'l', args: 1, description: '使用 localtunnel.me 使你的机器人可在网络上访问。',\n\
    type: Boolean, defaultValue: false},\n{name: 'ltsubdomain', alias: 's', args:\
    \ 1,\ndescription: 'localtunnel.me URL 的自定义子域名。此选项只能与 --lt 一起使用。',\ntype: String,\
    \ defaultValue: null},\n]);\n// 创建 Botkit 控制器，它控制机器人的所有实例。\nvar controller = Botkit.facebookbot({\n\
    debug: true,\nlog: true,\naccess_token: conf.access_token,\nverify_token: conf.verify_token,\n\
    app_secret: conf.app_secret,\nvalidate_requests: true\n});\n// 创建服务器\nvar app\
    \ = server(ops);\n// 从 FB 接收 POST 数据；这将是你收到的消息。\napp.post('/facebook/receive',\
    \ function(req, res) {\nif (req.query && req.query['hub.mode'] == 'subscribe')\
    \ {\nif (req.query['hub.verify_token'] == controller.config.verify_token) {\n\
    res.send(req.query['hub.challenge']);\n} else {\nres.send('OK');\n}\n}\n// 向 Facebook\
    \ 响应，表示已收到 webhook。\nres.status(200);\nres.send('ok');\nvar bot = controller.spawn({});\n\
    // 现在，将 webhook 传递给处理程序。\ncontroller.handleWebhookPayload(req, res, bot);\n});\n\
    // 使用你的验证令牌执行 FB webhook 验证握手。验证令牌存储在 conf.js 文件中。\napp.get('/facebook/receive',\
    \ function(req, res) {\nif (req.query['hub.mode'] == 'subscribe') {\nif (req.query['hub.verify_token']\
    \ == controller.config.verify_token) {\nres.send(req.query['hub.challenge']);\n\
    } else {\nres.send('OK');\n}\n}else{\nres.send('NOT-OK');\n}\n});\n// Ping URL\n\
    app.get('/ping', function(req, res) {\nres.send('{\"status\":\"ok\"}');\n});\n\
    webhook(controller);\n```\n\n完成上述所有步骤并测试端点后，我们就可以开始在 Facebook Messenger 上与 IRIS\
    \ 进行交互了。\n\n## 在 Facebook Messenger 中演示 AskIris 聊天机器人\n\n让我们看一些交互示例。我们可以通过简单的问候开始与\
    \ IRIS 交互，IRIS 会回复关于她自己的详细信息。参见图 8-8。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig8_HTML.jpg](img/478492_1_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8\n\n与 IRIS 交互\n\n### 账户余额\n\n当用户向 IRIS 询问账户余额时，它会回复一条消息，要求提供机密的 IPIN 以继续操作。如前所述，不应将演示实现作为设置\
    \ PIN 的实践。应遵循更复杂和标准的安全认证机制。在成功输入 IPIN（在示例用例中为硬编码值）后，IRIS 将检索用户所询问账户类型的余额。参见图 8-9。\n\
    \n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig9_HTML.jpg](img/478492_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9\n\n询问账户余额详情\n\n### 索赔状态\n\n索赔示例演示了\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig10_HTML.jpg](img/478492_1_En_8_Fig10_HTML.jpg)\n\
    \n图 8-10\n\n请求索赔状态\n\n*   在一次表述中识别意图以及实现意图所需的槽位。在下面的示例 1 中，意图（CLAIM_STATUS）和索赔\
    \ ID（gi123）是同时获取的。\n\n*   这展示了自然语言处理分析用户自然表述（包括拼写错误）的潜力。\n\n*   此外，它还展示了处理用户询问相同信息时不同变体的能力。在示例\
    \ 1 中，我们基于自然语言推断意图和槽位。在示例 2 中，由于未获取到槽位，IRIS 会像其他典型对话一样提示用户提供此信息。参见图 8-10。\n\n\
    ### 今日天气\n\n天气示例演示了如何构建一个实时集成第三方服务的聊天机器人。诸如以下用户表述会返回 API 提供的实时温度信息（参见图 8-11）：\n\
    \n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig11_HTML.jpg](img/478492_1_En_8_Fig11_HTML.jpg)\n\
    \n图 8-11\n\n来自 IRIS 的实时天气信息\n\n*   今天莱特肯尼的天气怎么样\n\n*   都柏林今天的天气\n\n*   兰契现在的天气\n\
    \n### 常见问题解答\n\n首先，你可以看到对常见问题的正确回答。然后，当用户表述（401k）既不匹配任何明确意图，也不匹配知识库中的任何文档时，IRIS\
    \ 会执行搜索。参见图 8-12。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig12_HTML.jpg](img/478492_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12\n\n常见问题解答示例\n\n### 上下文切换示例\n\n在图 8-13 中，用户首先询问人寿保险报价。IRIS 提示输入年龄、吸烟者信息、身高和体重。用户按预期提供了除体重外的所有其他信息。用户没有提供体重，而是询问股票价格。IRIS\
    \ 没有回复用户输入体重不正确或无法识别体重，而是理解了上下文的切换，从而理解了意图的切换，并无缝地提供了所请求的详细信息。随后，当用户再次询问人寿保险时，请注意，已经回答过的问题不会再次询问。这是因为短期记忆中存储了这些详细信息。\n\
    \n当用户提供了之前未回答的问题的答案时，意图得以实现，并获得了响应。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig13_HTML.jpg](img/478492_1_En_8_Fig13_HTML.jpg)\n\
    \n图 8-13\n\n说明上下文切换的人寿保险示例\n"
- fmt: '# Summary


    In this chapter, we showed how to extend the functionalities of `IRIS` to support
    integration with various third-party services. Connecting with an enterprise database
    to fetch user data was also explained. We discussed the integration module through
    which `IRIS` is exposed to the outside world. We implemented integration of `IRIS`
    with Facebook Messenger and followed the step-by-step process required for a successful
    integration.


    Finally, we illustrated what interaction with Facebook Messenger and `IRIS` looks
    like. We showed a few use cases via examples and explained behind the scenes what
    was discussed in previous chapters.


    In the next chapter, we will discuss deploying this in-house framework to the
    cloud. We will explore various ways in which we can deploy our services to AWS.
    We will also discuss how `IRIS` can be integrated with Alexa in less than 5 minutes
    by going through a step-by-step process. We will conclude by discussing how this
    framework can be improved and the scope for further enhancements such as the implementation
    of a feedback loop.


    # 9. Deployment and a Continuous Improvement Framework


    In the previous chapters, we designed a basic chatbot framework from scratch and
    explored integration options with third-party services and other backend systems.
    We also explained how to expose the `IRIS` chatbot framework as a Spring Boot
    REST API.


    In this chapter, we will discuss different ways in which `IRIS` can be deployed
    on a remote server. We will also discuss how to integrate `IRIS` with Alexa in
    less than 5 minutes. At the end of the chapter, we will discuss how `IRIS` can
    be extended to be part of a continuous improvement framework by implementing a
    self-learning module and bringing a human into the loop.


    ## Deployment to the Cloud


    The `IRIS` framework exposed via RESTful APIs can be deployed to a remote server
    in multiple ways. In this section, we will discuss three different ways.


    ### As a Stand-Alone Spring Boot JAR on AWS EC2


    This is the most basic installation and deployment of a Spring Boot JAR. We follow
    a few steps for the JAR to run on the EC2 machine on port 8080.


    We log into the AWS account and select EC2 from the list of services seen in Figure
    9-1. EC2 stands for elastic compute cloud servers provided by AWS. More details
    on EC2 can be found at `https://aws.amazon.com/ec2/`.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig1_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig1_HTML.jpg)


    Figure 9-1: Different AWS services


    We launch an EC2 instance from the EC2 dashboard as shown in Figure 9-2.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig2_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig2_HTML.jpg)


    Figure 9-2: Launching an EC2 instance wizard on AWS


    Launching an EC2 instance requires seven steps:


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig3_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig3_HTML.jpg)


    Figure 9-3: EC2 security group inbound rules configuration


    1. We choose an AMI (Amazon Machine Image). We use Amazon Linux 2 AMI (HVM), SSD
    Volume Type 64 bit x86.


    2. We choose the instance type. We select `t2.micro` (also free tier eligible
    if you are using this service of AWS for the first time). The `t2.micro` instance
    has one vCPUs and 1 GB of memory, which is enough for the APIs to run.


    3. The next step requires configuring instance details. We can use a checklist
    to protect against accidental termination. This step is optional.


    4. We add storage details in the next step. By default, we get 8GB of SSD, and
    the volume is attached to the instance. However, we can add more volumes or increase
    the storage of the default volume if we want. This step is also optional, and
    8GB of storage is enough for deployment for the demo.


    5. We add tags to instances and storage volume for better management of EC2 resources.
    This is also optional.


    6. This step, as shown in Figure 9-3, requires configuring a security group. A
    security group is a set of firewall rules that control the traffic for an instance.
    We want to expose port 80 to be accessed from everywhere and port 22, which is
    a secure shell port, to be accessed only from our local machine.


    7. We review the configuration and launch the instance. Each EC2 instance requires
    a key-pair PEM file that we need to log into the instance securely. We will be
    asked to generate a new file, or we can use an existing one.


    Now once the instance is launched, it will have a public DNS name or IPv4 Public
    IP that we can use to log in.


    8. The login command to log in from any Unix machine:


    ```

    ssh -i chatbot-iris.pem ec2-user@ec2-instance-ip.compute-1.amazonaws.com

    ```


    9. Once we log in, we can then copy our Spring Boot JAR from local using the `SCP`
    command:


    ```

    scp -i chatbot-iris.pem /path/to/iris.jar ec2-user@ec2-instance-ip.compute-1.amazonaws.com:/path/to/your/jarfile

    ```


    10. Once the JAR is copied, we can run the JAR by issuing the command:


    ```

    java -jar path/to/your/jarfile.jar fully.qualified.package.Application

    ```


    11. By default, the server starts on port 8080. However, if we want to change
    the port details, we can set the `server.port` as a system property using command
    line options such as `-DServer.port=8090` or add `application.properties` in `src/main/resources/`
    with `server.port=8090`.


    If we used maven to build our code, we could also use:


    ```

    mvn spring-boot:run

    ```'
