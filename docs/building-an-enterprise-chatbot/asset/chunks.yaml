    ## Topic Modeling Using Latent Dirichlet Allocation


    Topic modeling is one of the typical applications of understanding natural language.
    Given a collection of documents, we can draw an “abstract topic” that represents
    all the docs in the collection. Latent Dirichlet allocation (LDA) is a favorite
    statistical model used for topic modeling. It helps in discovering the semantic
    structures in a given text.


    In this section, for a demonstration, we will use three example reviews from the
    Amazon Fine Food review dataset to train an LDA model. We will see one other example
    of topic modeling using additional tools like spaCy, NLTK, and gensim in the “Applications”
    sections.


    ### Collection of Documents


    Three reviews from the dataset are assigned to a variable named `documents`. We
    expect the topics to have words like “chips,” “fajitas,” and “crisps” as these
    three reviews seem to be talking about “corn chips.” We are not much concerned
    about the sentiment in the review.


    ```

    documents = ["I consume about a jar every two weeks of this, either adding it
    to fajitas or using it as a corn chip dip,"

    "As soon as I tasted one and it tasted like a corn chip I checked the ingredients",

    "I found these crisps at our local WalMart & figured I would give them a try"

    ]

    ```


    ### Loading Libraries and Defining Stopwords


    As a first preprocessing step, we remove all the stopwords from the given text.
    For a simple implementation, we have only defined a few stopwords in a list:


    ```

    # Import pretty printer

    from pprint import pprint

    from collections import defaultdict

    stoplist = set(''for a of the and to in''.split())

    ```'
