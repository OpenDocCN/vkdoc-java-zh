- fmt: '### Managing State


    We now need a helper layer that holds this configuration and seamlessly performs
    intent matching and then passes this information to trigger state machine actions.
    This helper layer is `StateMachineManager`:


    ```

    public class StateMachineManager {

    /** The intent matcher service for IRIS bot. */

    protected IntentMatcherService intentMatcherService;

    /** The state machine */

    protected StateMachine stateMachine;

    /**

    * Constructs the bot by passing a configuration class that sets up the intent
    matcher service and state machine.

    *

    */

    public StateMachineManager(IrisConfiguration configuration) {

    intentMatcherService = configuration.getIntentMatcherService();

    stateMachine = configuration.getStateMachine();

    }

    public String respond(Session session, String utterance) throws Exception {

    try {

    /*

    * Invokes the intentMatcherService.match method that returns matched intent.

    * This method sends the user utterance and session as an input and obtains matched
    intent from the intent classification service.

    */

    MatchedIntent matchedIntent = intentMatcherService.match(utterance, session);

    /*

    * This method sends the matched intent as an input along with session and gets
    the response back from the state machine.

    */

    String response = stateMachine.trigger(matchedIntent, session);

    // The response is returned.

    return response;

    } catch (IllegalStateException e) {

    throw new Exception("Hit illegal state", e);

    }

    }

    }

    ```


    At this point, we have IRIS ready for the insurance industry. However, to make
    it functional, we expose it as a REST service. We need to create a `ConversationRequest`,
    a `ConversationResponse`, a `ConversationService`, and a `ConversationController`.


    ### Exposing a REST Service


    IRIS is exposed as a REST service and accepts HTTP GET requests. The following
    is an example of the service running on localhost on port 8080 to accept HTTP
    GET requests:


    ```

    http://localhost:8080/respond?sender=sender-id&message=user-message

    ```


    This is a JSON representation:


    ```

    {"message":"response-message-from-service"}

    ```


    #### ConversationRequest


    We create a sample `ConversationRequest` class in the `com.iris.bot.request` package
    that a front-end client can use to send a request to the IRIS bot engine back
    end via an integration module. In the example client, we integrate with Facebook
    Messenger. Facebook Messenger provides a sender id, which is a unique user id.
    This single user identifier helps in creating and maintaining sessions for the
    user and storing long-term and short-term attributes in memory.


    ```

    public class ConversationRequest {

    /**

    * Sender id as per Facebook.

    */

    private String sender;

    /**

    * Actual text message.

    */

    private String message;

    /**

    * Timestamp sent by Facebook.

    */

    private Long timestamp;

    /**

    * Sequence number of the message.

    */

    private Long seq;

    }

    ```


    #### ConversationResponse


    `ConversationResponse` is created in the `com.iris.bot.response` package. The
    response from the IRIS bot is sent to the integration module through an object
    of this class.


    ```

    public class ConversationResponse {

    /**

    * Actual reply from the bot

    */

    private String message;

    }

    ```


    #### ConversationService


    `ConversationService` creates a static instance of the state machine manager,
    which is passed to `IrisConfiguration` in constructor arguments. It further creates
    a static instance of the `SessionStorage` class. These classes are created as
    static because only one instance of this class should be instantiated. Further,
    the singleton design pattern could also be used to design these single instances.
    `ConversationService` calls a `respond` method of `StateMachineManager` and returns
    a response to the controller. The controller calls a `getResponse` method of `ConversationService`
    by passing the `ConversationRequest`.


    ```

    public class ConversationService {

    private static StateMachineManager irisStateMachineManager = new StateMachineManager(new
    IrisConfiguration());

    private static SessionStorage userSessionStorage = new SessionStorage();

    public ConversationResponse getResponse(ConversationRequest req) {

    // Default response to be sent if there is a server side exception.

    String response = "Umm...I apologise. Either I am not yet trained to answer that
    or I think I have had a lot of Guinness today. "

    + "I am unable to answer that at the moment. " + "Could you try asking something
    else Please !";

    // If the request message is a salutation like hi or hello, then instead of passing
    this information to statemachine manager, a hard-coded response to salutation
    can be returned from the service layer.

    if (req.getMessage().equalsIgnoreCase("hi") || req.getMessage().equalsIgnoreCase("hey
    iris")) {

    response = "Hi There! My name is IRIS (isn''t it nice! My creators gave me this
    name). I am here to help you answer your queries, get you the status of your claims,"

    + " tell you about stock prices, find you a financial advisor, inform you about
    current market trends, help you check your life insurance eligibility "

    + "or provide you your account balance information.\n"

    + "Hey, you know what, I can also tell you about current weather in your city.
    Try asking me out ! ";

    }

    // Gets the session object for the sender of the request.

    Session session = userSessionStorage.getOrCreateSession(req.getSender());

    // Creates a response object.

    ConversationResponse conversationResponse = new ConversationResponse();

    try {

    // Calls the respond method of state manager by passing session and message (user
    utterance).

    response = irisStateMachineManager.respond(session, req.getMessage());

    // Response is set to the the conversationResponse and returned to the controller.

    conversationResponse.setMessage(response);

    } catch (Exception e) {

    conversationResponse.setMessage(response);

    }

    return conversationResponse;

    }

    }

    ```


    #### ConversationController


    Finally, there’s the controller that exposes `ConversationService` as a REST API
    by creating an endpoint `/respond`. The implementation is straightforward: the
    controller receives a GET request, it passes to the service, and the service responds
    with the response message.


    ### Adding a Service Endpoint


    Let’s create REST service endpoint using Spring Boot. In Spring’s approach to
    building RESTful web services, HTTP requests are handled by a controller. These
    components are easily identified by the `@RestController` annotation. The `@RequestMapping`
    annotation ensures that HTTP requests to `/respond` are mapped to the `getKeywordresults()`
    method.


    More on how to build a RESTful web service using Java and Spring can be found
    at [`https://spring.io/guides/gs/rest-service/`](https://spring.io/guides/gs/rest-service/).


    ```

    @RestController

    public class ConversationController {

    @Autowired

    ConversationService conversationService;

    @RequestMapping(value = "/respond", method = RequestMethod.GET, produces = MediaType.APPLICATION_JSON_VALUE)

    @ResponseBody

    public  ConversationResponse getKeywordresults(@ModelAttribute ConversationRequest
    request) {

    return conversationService.getResponse(request);

    }

    }

    ```


    If we run this on localhost, a sample GET request will be


    ```

    http://localhost:8080/respond?sender=SENDER_ID&message=USER_MESSAGE&timestamp=TIMESTAMP&seq=MESSAGE_SEQUENCE

    ```


    We create attributes of `ConversationRequest` based on attributes that are sent
    by Facebook. Hence in the request structure we have `timestamp` and `seq`. However,
    we do not make use of these two attributes in the demo implementation for intent
    classification or state transition. Note that these attributes of Messenger webhook
    events may change with new versions of the Facebook API and can be used in your
    code depending on your requirements.'
