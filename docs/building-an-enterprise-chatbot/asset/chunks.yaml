    if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "age", null)
    == null) {

    // Age is set in session to be the last question asked in askQuote at this point.

    session.setAttribute("askQuoteLastQuestion", "age");

    /*

    * To differentiate between whether we are asking this question for the first time
    or we asked before and the user didn''t answer, we use "getageprompt." If the
    "getageprompt" value is null, we have not asked this question to the user before
    in that particular session. It helps to differentiate the reply message.

    */

    if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "getageprompt",
    null) == null)

    reply = "Sure, I will help you with that. May I know your age?";

    else

    /*

    * Let''s say we are expecting that the user will enter his age and that is the
    current question in conversation. However, instead of replying age, the user changes
    the intent by asking about the weather. IRIS is designed to handle intent switches
    from one context to another. But, next time, if the user desires to get a quote
    again, we will not ask questions already answered and even the ask message will
    be different, just like how its mentioned in the if-else reply message here.

    */

    reply = "I am not sure if I got your age right last time. Please type again";

