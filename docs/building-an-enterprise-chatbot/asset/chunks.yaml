    ### spaCy


    While spaCy offers all the features of NLTK, it is regarded as one of the best
    production grade tools for an NLP task. In this section, we will see how to use
    the various methods provided by the spaCy library in Python.


    spaCy provides three core models: en_core_web_sm (10MB), en_core_web_md (91MB),
    and en_core_web_lg (788MB). The larger model is trained on bigger vocabulary and
    hence will give higher accuracy. So depending on your use case, choose wisely
    the model that fits your requirements.


    #### POS Tagging


    After loading the model using `spaCy.load()`, you can pass any string to the model,
    and it provides all the methods in one go. To extract POS, the `pos_method` is
    used. In the following code, after tokenizing, we print the following:


    *   `text`: The original text


    *   `lemma`: Token after stemming, which is the base form of the word


    *   `pos`: Part of speech


    *   `tag`: POS with details


    *   `dep`: The relationship between the tokens. Also called syntactical dependency.


    *   `shape`: The shape of the word (i.e., capitalization, punctuation, digits)


    *   `is_alpha`: Returns True if the token is an alphanumeric character


    *   `is.stop`: Returns True if the token is a stopword like “at,” “so,” etc.


