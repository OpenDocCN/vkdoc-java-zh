    ### 股票价格


    用户可以与 IRIS 交互并询问股票价格信息。话语可能包括：


    *   微软的当前股价是多少


    *   Pru 股票价格


    *   Infy 今日股票


    *   hdfc 的股价


    当 IRIS Core 接收到话语时，它会将话语传递给意图分类引擎，该引擎知道用户正在查找 `''STOCK_PRICE''`。基于此意图和当前状态，会转换到
    `StockPriceState`。然后，此状态的 execute 方法会调用第三方 API。


