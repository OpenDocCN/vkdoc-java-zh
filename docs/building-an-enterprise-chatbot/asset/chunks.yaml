    So far we showed how to create intent and slot classes and the matchers, and we
    discussed IRIS long-term and short-term memory. We will now discuss an essential
    concept for chatbot: conversation management. In the next section, we will explain
    how conversations can be modeled as finite state machines and used in IRIS.


    ## Dialogues as Finite State Machines


    Typically, a simple Q&A-based chatbot or a FAQ-based chatbot is not capable of
    having a conversation. A conversational chatbot should support complex dialog
    flow between the user and the bot, and we aim to build a chatbot that can mimic
    human conversation as much as possible. Usually, chatbots are limited to a request-response
    based flow and are not driven as dialog or conversations.


    Building a chatbot by conversational state management helps in transitioning from
    one state to another. As shown in Figure [6-2](#478492_1_En_6_Chapter.xhtml#Fig2),
    a state machine reads a series of inputs and switches to another state once it
    receives an input required to perform that transition.


    ![../images/478492_1_En_6_Chapter/478492_1_En_6_Fig2_HTML.jpg](images/478492_1_En_6_Chapter/478492_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Showing a finite state machine with states and transitions between states


    We’ll explain this with a simple example. In Figure [6-3](#478492_1_En_6_Chapter.xhtml#Fig3),
    we have a finite state representation of switching off and on a light bulb. There
    are two states: OFF and ON.


    As in a finite state graph, you can only be in one state at a time. In the example
    of a light bulb, as shown in Figure [6-3](#478492_1_En_6_Chapter.xhtml#Fig3),
    either it can be OFF or ON but not both at the same time. Also, to move from one
    state to another, a transition must take place. If the bulb is in the OFF state
    and we need to transition to ON state, we need to flip the switch up, which is
    an action/condition/prerequisite to transition to the ON state.


    ![../images/478492_1_En_6_Chapter/478492_1_En_6_Fig3_HTML.jpg](images/478492_1_En_6_Chapter/478492_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    State machine for a switch ON and OFF


    A state machine has the following components:


    *   **States**: Different states a bot can be in and transition to.


    *   **Initial State**: This is the start state when the user first interacts with
    IRIS.


    *   **Transitions**: The action(s) that should trigger a possible state change.


    *   **Shields**: A prerequisite or condition to transition to a target state.


    A state machine can be designed in multiple ways. It can be modeled as a graph,
    the conversation could be modeled as a script, or it could be implemented using
    a very naive approach like HashMaps and some classes we will discuss next.


    We need to create a new package in our project called `com.iris.bot.state` to
    contain the base classes for the state machine.


