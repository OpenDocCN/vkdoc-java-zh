    "canRotate": false,

    "canResize": false

    }

    ],

    "shape": "RECTANGLE",

    "pixelWidth": 1024,

    "pixelHeight": 600,

    "dpi": 160,

    "currentPixelWidth": 1024,

    "currentPixelHeight": 600,

    "touch": [

    "SINGLE"

    ]

    }

    },

    "request": {

    "type": "IntentRequest",

    "requestId": "amzn1.echo-api.request.XXXXXXXXXXX",

    "timestamp": "2019-04-21T11:22:56Z",

    "locale": "en-US",

    "intent": {

    "name": "irisAllIntent",

    "confirmationStatus": "NONE",

    "slots": {

    "utteranceSlot": {

    "name": "utteranceSlot",

    "value": "weather in Dublin",

    "resolutions": {

    "resolutionsPerAuthority": [

    {

    "authority": "amzn1.er-authority.echo-sdk.amzn1.ask.skill.XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXX.IrisCustomSlotType",

    "status": {

    "code": "ER_SUCCESS_NO_MATCH"

    }

    }

    ]

    },

    "confirmationStatus": "NONE",

    "source": "USER"

    }

    }

    }

    }

    }

    ```


    Response from IRIS:


    ```

    {

    "body": {

    "version": "string",

    "response": {

    "outputSpeech": {

    "type": "PlainText",

    "text": "It seems to be clear sky at the moment in dublin. The temperature is
    19.13 degrees. Humidity is close to 48.\n I wish I were human to feel it. Anyways,
    what else do you want to know from me? "

    },

    "type": "_DEFAULT_RESPONSE"

    },

    "sessionAttributes": {}

    }

    }

    ```


