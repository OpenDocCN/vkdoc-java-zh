- fmt: '# Integration Module


    The integration module is the piece that connects the core of IRIS with different
    messaging platforms such as Facebook Messenger, Twitter, the Web, mobile apps,
    Alexa, etc. Each of these platforms has their own integration mechanism, and building
    a customized integration layer for each of the channels is very difficult and
    not the core objective in this book. The integration module is a middle-layer
    service exposed to the outside world, acting as a gateway for IRIS, as shown in
    Figure [8-3](#478492_1_En_8_Chapter.xhtml#Fig3).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig3_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    IRIS channel integration module


    Many open source tools provide simple customized integrations with various channels
    without us having to write a lot of code, and they take care of a lot of complexity
    required for the integrations. In this illustration, we focus on `bootkit`, a
    leading development tool providing customized combinations with multiple messaging
    platforms:


    [`https://github.com/howdyai/botkit`](https://github.com/howdyai/botkit)


    In this chapter, we will discuss integration of IRIS with Facebook Messenger.
    Before we get into the integration code, we need to ensure we have the following
    in order to be able to put IRIS on a Facebook Messenger page:


    * **A Facebook page**: A Facebook page is used as the identity of your bot. When
    people chat with your app, they see the page name and profile picture.

    * **A Facebook developer account**: Your developer account is required to create
    new apps, which are the core of any Facebook integration. You can create a new
    developer account by going to Facebook for Developers and clicking the Get Started
    button.

    * **Facebook App for Web**: The Facebook app contains the settings for your Messenger
    bot, including access tokens.

    * **A webhook URL**: Actions that take place in conversations with your bot, such
    as new messages, are sent as events to your webhook. This is the URL of our integration
    module, which we cover next.


    The setup process requires adding the Messenger platform to your Facebook app,
    configuring the webhook of the app, and subscribing your app to the Facebook page.
    The details on setting up the Facebook app can be found at [`https://developers.facebook.com/docs/messenger-platform/getting-started/app-setup/`](https://developers.facebook.com/docs/messenger-platform/getting-started/app-setup/).


    A step-by-step guide to configuring the `botkit` and Facebook Messenger is available
    at [`www.botkit.ai/docs/provisioning/facebook_messenger.html`](https://www.botkit.ai/docs/provisioning/facebook_messenger.html).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig5_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Showing the page access token screen


    1. Create the app and select the Messenger platform. See Figure [8-4](#478492_1_En_8_Chapter.xhtml#Fig4).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig4_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Creation of new app ID on Facebook


    2. We created a Facebook page called `AskIris` and generated a page access token
    for the app. See Figure [8-5](#478492_1_En_8_Chapter.xhtml#Fig5).


    The callback URL is `https://YOURURL/facebook/receive`. See Figure [8-6](#478492_1_En_8_Chapter.xhtml#Fig6).
    This URL must be publically available and SSL-secured. We provide a `localtunnel`
    callback URL; in our case, it’s the NodeJs server URL tunneled to localhost. We
    will discuss how to create this endpoint and use of `localtunnel` in the next
    section.


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig6_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Showing page subscription details along with our callback URL


    The `AskIris` page should be connected to the newly created app, and the settings
    should show the app details. See Figure [8-7](#478492_1_En_8_Chapter.xhtml#Fig7).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig7_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    The `AskIris` page settings


    As described above, setting up the webhook requires an HTTPS callback URL. This
    URL is the API endpoint of our integration module, which will receive messages
    from Messenger. We create a NodeJS application for this purpose because it is
    the requirement for setting up the webhook.


    More details on setting up are described in Facebook developer page at [`https://developers.facebook.com/docs/messenger-platform/getting-started/webhook-setup`](https://developers.facebook.com/docs/messenger-platform/getting-started/webhook-setup).


    Here are the steps to create a simple NodeJS application:


    1. Create an HTTP Server (`server.js`):


    ```

    // Import modules required in server.js

    var express = require(''express'');

    var bodyParser = require(''body-parser'');

    var https = require(''https'');

    var http = require(''http'');

    var fs = require(''fs'');

    var localtunnel = require(''localtunnel'');

    // Custom JavaScripts

    var conf = require(__dirname + ''/conf.js'');

    function server(ops) {

    // Create App

    /* Express is a popular Node web framework and provides a mechanism to write handlers.

    */

    var app = express();

    /* body-parser is Node.js middleware that parses incoming request bodies in a
    middleware before handlers.

    */

    // parse JSON

    app.use(bodyParser.json());

    //Returns middleware that only parses urlencoded bodies

    app.use(bodyParser.urlencoded({

    //This object will contain key-value pairs, where the value can be a string or
    array (when extended is false), or any type (when extended is true).

    extended: true

    }));

    // Path to static files

    app.use(express.static(__dirname + conf.static_dir));

    /* Declare option and create a HTTPS server by reading SSL key and SSL cert path
    from config file .

    */

    var options = {

    port : conf.securePort,

    key : fs.readFileSync(conf.sslKeyPath),

    cert : fs.readFileSync(conf.sslCertPath),

    requestCert : false,

    rejectUnauthorized : false

    };

    https.createServer( options, app)

    .listen(conf.securePort,  conf.hostname, function() {

    console.log(''** Starting secure webserver on port '' + conf.securePort);

    });

    http.createServer(app)

    .listen(conf.port, conf.hostname, function() {

    console.log(''** Starting webserver on port '' + conf.port);

    });

    /*

    localtunnel exposes localhost to the world for easy testing and sharing. It will
    connect to the tunnel server, set up the tunnel, and tell you what URL to use
    for your testing. We used localtunnel to get an https endpoint on http://localhost:9080/respond
    to test with Facebook Messenger .

    */

    if(ops.lt) {

    var tunnel = localtunnel(conf.port, {subdomain: ''askiris''}, function(err, tunnel)
    {

    if (err) {

    console.log(err);

    process.exit();

    }

    console.log("Your bot is available on the web at the following URL: " + tunnel.url
    + ''/facebook/receive'');

    });

    tunnel.on(''close'', function() {

    console.log("Your bot is no longer available on the web at the local tunnel.me
    URL.");

    process.exit();

    });

    }

    return app;

    }

    /* module.exports is an object that the current module returns when it is "required"
    in another program or module

    */

    module.exports = server;

    ```


