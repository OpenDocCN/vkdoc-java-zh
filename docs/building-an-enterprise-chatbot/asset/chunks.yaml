    ### 市场趋势


    网上有许多免费和付费的 API 可以提供这些详细信息。我们探索了 [`www.alphavantage.co`](http://www.alphavantage.co)
    ，它提供免费的 API 来获取实时和历史股票市场数据。Alpha Vantage API 分为四类：


    *   股票时间序列数据


    *   实物与数字/加密货币（例如比特币）


    *   技术指标


    *   行业表现


    所有 API 均为实时：最新数据点来自当前交易日。


    只需提供三个必要信息，即用户类型、机构/组织名称和电子邮件地址，我们就能获得一个 API 密钥，并且根据网站说明，该密钥终身免费。可以通过在 [`www.alphavantage.co/support/#api-key`](http://www.alphavantage.co/support/%2523api-key)
    提供详细信息来获取免费的 API 密钥。


    一旦我们拥有 API 密钥，Alpha Vantage 的各种 API 就会分组到多个 API 套件下，如图 8-2 所示。


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig2_HTML.jpg](img/478492_1_En_8_Fig2_HTML.jpg)


