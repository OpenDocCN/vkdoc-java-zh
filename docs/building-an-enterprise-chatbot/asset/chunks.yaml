    ''nausea'', '','', ''diarrhea'', ''&'', ''headaches'', ''also'', ''experienced'',
    ''i'', ''learned'', ''my'', ''lesson'', ''hard'', ''way'', ''years'', ''ago'',
    ''when'', ''fell'', ''love'', ''with'', ''free'', ''chocolates'', ''suzanne'',
    ''sommers'', ''used'', ''to'', ''sell'', ''thought'', "''", ''d'', ''found'',
    ''chocolate'', ''nirvana'', ''at'', ''first'', ''taste'', ''but'', ''bliss'',
    ''was'',..]

    ```


    #### 检查高频词是否存在


    我们定义了一个名为 `document_features()` 的方法，该方法检查之前读取的负面和正面评论文本文件中是否存在某个高频词。如果找到，打印语句将输出该词。


    ```

    #Check whether most frequent word is present in the doc or not

    def document_features(document):

    document_words = set(document)

    features = {}

    for word in word_features:

    features[''contains({})''.format(word)] = (word in document_words)

    return features

    print(document_features(review_corpus.words(''1_pos.txt'')))

    {''contains(warning)'': False, ''contains(!)'': False, ''contains(-)'': False,
    ''contains(alcohol)'': False, ''contains(sugars)'': False, ''contains(!,")'':
    False, ''contains(buyer)'': False,...}

    print(document_features(review_corpus.words(''1_neg.txt'')))

