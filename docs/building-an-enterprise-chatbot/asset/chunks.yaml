    ''NNS''), (''of'', ''IN''), (''this'', ''DT''), ('','', '',''), (''either'', ''CC''),
    (''adding'', ''VBG''), (''it'', ''PRP''), (''to'', ''TO''), (''fajitas'', ''NNS''),
