  trans: "\n## 集成模块\n\n集成模块是连接 IRIS 核心与不同消息平台（如 Facebook Messenger、Twitter、Web、移动应用、Alexa\
    \ 等）的组件。每个平台都有各自的集成机制，为每个渠道构建定制化的集成层非常困难，且并非本书的核心目标。集成模块是一个对外暴露的中间层服务，充当 IRIS\
    \ 的网关，如图 8-3 所示。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig3_HTML.jpg](img/478492_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3\n\nIRIS 渠道集成模块\n\n许多开源工具无需我们编写大量代码，就能提供与各种渠道的简单定制化集成，并处理集成所需的大量复杂工作。在本示例中，我们重点介绍\
    \ **botkit**，这是一款领先的开发工具，可提供与多个消息平台的定制化组合：\n\n[`https://github.com/howdyai/botkit`](https://github.com/howdyai/botkit)\
