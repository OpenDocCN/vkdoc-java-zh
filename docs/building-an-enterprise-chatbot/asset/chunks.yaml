    Load the required libraries from Keras, an open source neural network library
    built in Python. It’s a popular library used for building deep learning models
    in standalone mode or on top of frameworks like TensorFlow, CNTK, and Theano.
    It provides fast experimentation with deep learning models with user-friendly,
    modular, and extensible syntax and structure.


    ```

