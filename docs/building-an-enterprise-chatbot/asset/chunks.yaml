- fmt: '# Personal Data in Chatbots


    When we try to emulate human-like conversations with chatbots, we allow the humans
    to reveal information about themselves to the chatbot machine. This information
    then becomes risk for unauthorized access and may violate privacy laws and terms.
    This concern is of the utmost importance when you deal with customer queries that
    connect them to internal databases and required customer-specific information
    to process requests.


    The customer can reveal the personal data both intentionally and unintentionally:


    - **Intentionally**: To get an account balance, you need to provide an account
    number and PIN.

    - **Unintentionally**: To know the claim process, you may end up revealing your
    policy number.


    In both cases, the data is being captured by the chatbot, and the chatbot engine
    tries to process that data. Even if the chatbot can’t process the data, it still
    creates a copy of a conversation that contains private and personal data of customers.


    Another area where we expose personal data to our chatbots is at the time of training
    the chatbot. Internal data of customers might have personal, financial, and demographic
    information without the developer’s full knowledge. For example, an email conversation
    regarding a claim settlement will contain a lot more details than just the customer-agnostic
    settlement process.


    In deployment and training, personal data is captured and is vulnerable for law
    infringement and hacking, but this data is important for developing custom-centric
    chatbots. If we do not capture the data, we will not be able to design a chatbot
    that can take actions and provide information from internal databases.


    We require more information than a normal conversation to be able to develop a
    chatbot that can access customer data and provide real-time information, securely
    and privately. The personal information helps in developing:


    - Authentication and access

    - Compliance to company policies

    - A customer information retrieval system

    - A third-party API retrieval system


    There are other related services and databases that require personal information
    to allow access to customer information in the private data zone.


    As we just explained, we need personal data and other private data from customers
    to make the 24x7 AI assistant function with relevant data. This requires us to
    be very sure of both the customer agreements and local/international data regulations.
    Complying with regulations becomes of the utmost importance for banks and insurance
    companies to build specific conversation chatbots.


    This is a challenge for companies because it limits the companies from using well
    developed, third-party chatbot services like `Alexa`, `Dialogflow`, and `Watson`.
    These services require the data to be sent to their server and stored for chatbot
    conversations. The limitations have created a vacuum to be filled by frameworks
    that can develop state-of-art chatbots internal to the companies.


    It is essential to get awareness about what data privacy regulations require of
    companies when dealing with customer data. The General Data Protection Regulation
    (GDPR) is the leading regulation from the EU region and it’s also relevant to
    other parts of the world. In the next section, we give a high-level overview of
    its requirements, which are essential to consider when developing a chatbot.


    ## Introduction to the General Data Protection Regulation (GDPR)


    The GDPR is the successor to the 1995 Data Protection Directive, which was a regulation,
    not a directive. While the directive was left to member states to be transposed
    into national laws by legislation, the GDPR regulation is immediately enforceable
    as law in all member states simultaneously. It is a regulation on data protection
    for European Union citizens. It also applies to the transfer of personal data
    outside of the EU area. The GDPR gives users control over their personal information
    and whether they want to share or keep their data private.


    It was adopted by all EU states and came into force on May 25, 2018. The regulation
    enforces hefty fines against non-compliant organizations (fees up to 4% of annual
    revenues or 20M €, whichever is greater).


    ### Data Protected Under the GDPR


    The GDPR in its definition of data is very broad and covers a multiverse of data
    generated and captured by companies. As per the GDPR, the protected data includes:


    *Necessary identity information (name and surname; date of birth; phone number;
    a home address; an email address; ID card number and Social Security number etс.);
    web data (location, IP address, cookie data); health and genetic data; biometric
    data (data that identifies a person); racial and ethnic origin; religious beliefs;
    political opinions.*


    This includes data that chatbots deal with in the course of conversations.


    ### Data Protection Stakeholders


    As per the regulation, any company that collects and processes EU citizens’ personal
    information or that stores personal data of EU residents must comply with the
    GDPR, regardless of whether the company is present in EU territory or not. This
    scope means that most global businesses need to be GDPR-compliant.


    The regulation defines three stakeholders to the GDPR:


    - **Data subject**: A person whose data is being processed by a controller or
    processor.

    - **Data controller**: An individual or company that determines the purpose and
    conditions of collecting and processing personal data from users.

    - **Data processor**: An individual or company that processes personal data for
    data controllers.


    The definition of stakeholders directly impacts how we design our chatbots and
    ensure the rights of our customers who interact with chatbots. For example, a
    customer interacting with a chatbot is a data subject, and the bank or insurer
    or company becomes the data controller. The CRM or database system authorized
    personal also becomes the data controller. If your chatbot uses `Dialogflow` for
    processing the data, then it becomes the data processor.


    The details of the law can be read from the source here: [`https://eur-lex.europa.eu/eli/reg/2016/679/oj`](https://eur-lex.europa.eu/eli/reg/2016/679/oj).


    ### Customer Rights Under the GDPR


    It is essential for the chatbot developer team and leadership to understand what
    rights are enshrined in the GDPR for the customers. The chatbot functionality
    must abide by them.


    The rights under GDPR are stated below for your reference:


    | # | Right | Data Controller Responsibilities |

    | --- | --- | --- |

    | 1 | **Right to be Informed** | Be transparent in how much you collect and process
    personal information and the purpose you intend to use it for. Inform your customer
    of their rights and how to carry them out. |

    | 2 | **Right of Access** | Your customers have the right to access their data.
    You need to enable this either through the business process or technical process.
    |

    | 3 | **Right to Rectification** | Your customer has the right to correct information
    that they believe is inaccurate. |

    | 4 | **Right to Erasure** | You must provide your customer with the right to
    be forgotten, provided that your legitimate interest to hold such information
    does not override theirs. |

    | 5 | **Right to Restriction of Processing** | Your customer has the right to
    request that you stop processing their data. |

    | 6 | **Right to Data Portability** | You need to enable the machine and human
    readable export of your customers’ personal information. |

    | 7 | **Right to Object** | Your customer has the right to object to you using
    their data. |

    | 8 | **Right Regarding Automated Decision Making** | You customer has the right
    not to be subject to a decision based solely on automated processing, including
    profiling. |'
