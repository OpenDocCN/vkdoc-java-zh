    As you can see, SimpleNLG offers an easy-to-use syntax to generate grammatically
    correct sentences in English programmatically. Next, let’s dive into a deep learning
    model to generate the next words given a piece of text. Unlike SimpleNLG, we are
    not sure if we’ll get a grammatically correct sentence in such a deep learning
    model.


    ### Deep Learning Model for Text Generation


    Text generation using deep learning is built for language models and applications
    like speech-to-text, conversational chatbots, and text summarizations. Such language
    models predict the occurrences of a word based on the previous sequence of words.
    Many deep learning network architectures such as recurrent neural networks are
    available for language modeling.


    RNNs are deployed in a variety of applications like speech recognition, language
    modeling, translation, image captioning, and many more. Figure [5-17](#478492_1_En_5_Chapter.xhtml#Fig17)
    shows how the hidden layers in RNNS are stacked up in a sequence of the chain.
    The rolled and unrolled versions help in understanding how internal processing
    happens.


    In the demonstration code, we use a deep learning model called the long short-term
    memory model (LSTM). LSTMs are a particular type of RNN, capable of learning long
    term dependency, which RNNs are not very good at leaning. One significant difference
    in the capability between RNNs and LSTM is the ability to understand the context
    of a word, which might not come from its immediate predecessor but instead could
    come from a couple of words ahead. For example, if we are trying to predict the
    next word based on the previous ones, in “I grew up in France... I speak fluent
    French,” the context for French is present further back in the sentence than just
    the previous word. Figure [5-17](#478492_1_En_5_Chapter.xhtml#Fig17) shows the
    RNN network after unrolling. Observe that each of the neural network chunks labelled
    N are exactly the same.


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig17_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    RNN architecture in rolled and unrolled forms


    Although RNNs are capable of picking up such long-term dependency in sentences,
    they requires a careful selection of parameters, which is often difficult in many
    practical problems. This is where LSTMs come to the rescue.


    Figure [5-18](#478492_1_En_5_Chapter.xhtml#Fig18) shows the architecture of the
    LSTM network.


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig18_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Architecture of an LSTM


    There are four major parts in LSTMs networks:


    *   **Cell state**: The line that runs through from the top with few direct interactions
    like pairwise multiplication and addition, which could add or remove any information
    from the cell state.

    *   **Forget gate layer**: Gates are a mechanism by which the LSTMs control how
    much of the information should be passed through the cell state. Here a sigmoid
    function is used, which has an output value between 0 to 1. If the value is 1,
    it means let everything pass; 0 means do not let anything pass.

    *   **Input gate layer**: The sigmoid layer called an input gate layer decides
    which values we will update.

    *   **Tanh layer**: The tanh activation function layer creates a vector of new
    candidate values given the input and hidden state values from the previous time
    step.


