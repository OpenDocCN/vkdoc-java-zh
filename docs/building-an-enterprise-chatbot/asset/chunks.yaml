    #### Chunking


    spaCy provides an easy-to-use retrieval of chunk information such as VERB and
    NOUN from a given text. The `noun_chunks` method provides noun phrases, and from
    pos, we can search for VERB. The following code extracts noun phrases and verbs
    from the chunks:


    ```

    # pip install spacy

    # python -m spacy download en_core_web_sm

    import spacy

    # Load English tokenizer, tagger, parser, NER, and word vectors

    nlp = spacy.load("en_core_web_sm")

    # Process whole documents

    text = ("My English Bulldog Larry had skin allergies the summer we got him at
    age 3, I''m so glad that now I can buy his food from Amazon")

    doc = nlp(text)

    # Analyze syntax

    print("Noun phrases:", [chunk.text for chunk in doc.noun_chunks])

    print("Verbs:", [token.lemma_ for token in doc if token.pos_ == "VERB"])

