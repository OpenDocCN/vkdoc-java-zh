    '
- fmt: '# Performing Out-of-the-Box Tasks Using a Pretrained Model


    One of the useful features of `gensim` is that it offers several pretrained word
    vectors from `gensim-data`. Apart from `Word2Vec`, it also provides `GloVe`, another
    robust unsupervised learning algorithm for finding word vectors. The following
    code downloads a `glove-wiki-gigaword-100` word vector from `gensim-data` and
    performs some out-of-the-box tasks.


    **Step 1:** Download one of the pretrained `GloVe` word vectors using the `gensim.downloader`
    module:


    ```python

    import gensim.downloader as api

    word_vectors = api.load("glove-wiki-gigaword-100")

    ```


    **Step 2:** Compute the nearest neighbors. As you have seen, word vectors contain
    an array of numbers representing a word. Now it becomes possible to perform mathematical
    computations on the vectors. For example, we can compute Euclidean or cosine similarities
    between any two-word vectors. There are some interesting results that we obtain
    as a result. The following code shows some of the outcomes.


    Figure [5-14](#478492_1_En_5_Chapter.xhtml#Fig14) shows an example of how the
    input data for training the neural network was created by shifting the window
    of a size 2. In the following example, you will see that "apple" on the Internet
    is no longer fruit; it has become synonymous with the Apple Corporation and shows
    many companies like it when we compute a word similar to "apple." The reason for
    such similarity is because of the vocabulary used for training, which in this
    case is a Wikipedia dump of close to 6 billion uncased tokens. More such pretrained
    models are available at [`https://github.com/RaRe-Technologies/gensim-data`](https://github.com/RaRe-Technologies/gensim-data).


    In the second example, when we find similar words to "orange," we obtain words
    corresponding to colors like red, blue, purple, and fruits like lemon, which is
    a citrus fruit like an orange. Such relations are easy for humans to understand.
    However, it is exciting how the `Word2Vec` model can crack it.


    ```python

    result = word_vectors.most_similar(''apple'')

    print(result)

    [(''microsoft'', 0.7449405789375305), (''ibm'', 0.6821643114089966), (''intel'',
    0.6778088212013245), (''software'', 0.6775422096252441), (''dell'', 0.6741442680358887),
    (''pc'', 0.6678153276443481), (''macintosh'', 0.66175377368927), (''iphone'',
    0.6595611572265625), (''ipod'', 0.6534676551818848), (''hewlett'', 0.6516579389572144)]

    result = word_vectors.most_similar(''orange'')

    print(result)

    [(''yellow'', 0.7358633279800415), (''red'', 0.7140780687332153), (''blue'', 0.7118035554885864),
    (''green'', 0.7111418843269348), (''pink'', 0.6775072813034058), (''purple'',
    0.6774232387542725), (''black'', 0.6709616184234619), (''colored'', 0.665260910987854),
    (''lemon'', 0.6251963376998901), (''peach'', 0.616862416267395)]

    ```


    **Step 3:** Identify linear substructures. The relatedness of two words is easy
    to compute using the similarity or distance measure, whereas to capture the nuances
    in a word pair or sentences in a more qualitative way, we need operations. Let''s
    see the methods that the `gensim` package offers to accomplish this task.


    ### Word Pair Similarity


    In the following example, we find a similarity between a word pair. For example,
    the word pair `[''sushi'', ''shop'']` is more similar to the word pair `[''japanese'',
    ''restaurant'']` than to `[''Indian'', ''restaurant'']`.


    ```python

    sim = word_vectors.n_similarity([''sushi'', ''shop''], [''indian'', ''restaurant''])

    print("{:.4f}".format(sim))

    0.6438

    sim = word_vectors.n_similarity([''sushi'', ''shop''], [''japanese'', ''restaurant''])

    print("{:.4f}".format(sim))

    0.7067

    ```


    ### Sentence Similarity


    We can also find distance or similarity between two sentences. `gensim` offers
    a distance measure called Word Mover''s distance, which has proved quite a useful
    tool in finding out the similarity between two documents that contain many sentences.
    The lower the distance, the more similar the two documents. Word Mover''s distance
    underneath uses the word embeddings generated by the `Word2Vec` model to first
    understand the concept of the query sentence (or document) and then find all the
    similar sentences or documents. For example, when we compute the Mover''s distance
    between two unrelated sentences, the distance is high compared to when we compare
    two sentences that are contextually related.


    In the first example, `sentence_one` talks about diversity in Indian culinary
    art, and `sentence_two` specifically talks about the food in Delhi. In the second
    example, `sentence_one` and `sentence_two` are unrelated, so we get a higher Movers
    distance than the first example.


    ```python

    sentence_one = ''India is a diverse country with many culinary art''.lower().split()

    sentence_two = ''Delhi offers many authentic food''.lower().split()

    similarity = word_vectors.wmdistance(sentence_one, sentence_two)

    print("{:.4f}".format(similarity))

    4.8563

    sentence_one = ''India is a diverse country with many culinary art''.lower().split()

    sentence_two = ''The all-new Apple TV app, which brings together all the ways
    to watch TV into one app''.lower().split()

    similarity = word_vectors.wmdistance(sentence_one, sentence_two)

    print("{:.4f}".format(similarity))

    5.2379

    ```


    ### Arithmetic Operations


    Even more impressive is the ability to perform arithmetic operations like addition
    and subtraction on the word vector to obtain some form of linear substructure
    because of the operation. In the first example, we compute `woman + king - man`,
    and the most similar word to this operation is `queen`. The underlying concept
    is that man and woman are genders, which may be equivalently specified by other
    words like queen and king. Hence, when we take out the man from the addition of
    woman and king, the word we obtain is queen. `GloVE` word representation provides
    few examples here: [`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/).


    Similarly, the model is good at picking up concepts like language and country.
    For example, when we add French and Italian, it gives Spanish, which is a language
    spoken in a nearby country, Spain.


    ```python

    result = word_vectors.most_similar(positive=[''woman'', ''king''], negative=[''man''])

    print("{}: {:.4f}".format(*result[0]))

    queen: 0.7699

    result = word_vectors.most_similar(positive=[''french'', ''italian''])

    print("{}: {:.4f}".format(*result[0]))

    spanish: 0.8312

    result = word_vectors.most_similar(positive=[''france'', ''italy''])

    print("{}: {:.4f}".format(*result[0]))

    spain: 0.8260

    ```


    ### Odd Word Out


    The model adapts to find words that are out of context in a given sequence of
    words. The way it works is the method `doesnt_match` computes the center point
    by taking the mean of all the word vectors in a given list of words and finding
    the cosine distance from the center point. The word with the highest cosine distance
    is returned as an odd word that does not fit in the list.


    In the following two examples, the model was able to pick the food pizza as an
    odd word out from the list of countries. Similarly, in the second example, the
    model picked up the Indian Prime Minister Modi from the list of all US Presidents.


    ```python

    print(word_vectors.doesnt_match("india spain italy pizza".split()))

    pizza

    print(word_vectors.doesnt_match("obama trump bush modi".split()))

    modi

    ```


    Language models like `Word2Vec` and `GloVe` are compelling in generating meaningful
    relationships between words, which comes naturally to a human because of our understanding
    of languages. It is an excellent accomplishment for machines to be able to perform
    at this level of intelligence in understanding the use of words in various syntactic
    and semantic forms.'
