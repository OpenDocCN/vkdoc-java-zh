    The functionality of the QnA Maker service is essentially a relevant search engine
    in the back end that indexes content data and uses a text-based scoring logic
    to rank best matching content. However, this service is not conversational and
    does not perform language understanding to identify user intents before taking
    an action. Microsoft provides another cognitive service called LUIS that is created
    for this purpose.


    ### Introduction to LUIS


    Language Understanding Intelligent Service (LUIS) is a cloud-based API service
    and a component of cognitive services, as shown in Figure [7-1](#478492_1_En_7_Chapter.xhtml#Fig1).
    It takes user input and applies machine learning techniques to predict user intent.
    It also uses its Named Entity Recognition (NER) matching techniques to identify
    named entities in the user utterance to provide a meaningful response. This is
    illustrated in Figure [7-11](#478492_1_En_7_Chapter.xhtml#Fig11). In a nutshell,
    LUIS is an intent classification engine that provides the best matching (top scoring)
    intent based on the user utterance.


    The first step in the process is to create a LUIS app consisting of a domain-specific
    language model. At the time of creation of the app, we can select a prebuilt domain
    model, build our own natural language model, or leverage the prebuilt domain with
    our own customization.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig11_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig11_HTML.jpg)


    **Figure 7-11** LUIS intent classification illustration


    * **Prebuilt model**: LUIS provides many prebuilt domain models including predefined
    intents of common usage with various utterances and prebuilt entities of various
    domains. These prebuilt entities can also be leveraged without having to use intents
    and utterances of the prebuilt model. Depending on whether the prebuilt model
    is suitable for your use case, prebuilt models can be a good, quick starter.


    * **Custom entities**: LUIS provides several ways in which we can define our custom
    intents along with sample utterances. We can also define our domain-centric custom
    entities leveraging NER matching capabilities.


    The creation of a LUIS app is simple and similar to what we will discuss when
    we create an Alexa app (for integration with IRIS) in Chapter [9](#478492_1_En_9_Chapter.xhtml),
    so we will skip the explanation of the same in this chapter.


    Once the intents, utterances, and domain-related entities are defined using the
    custom or prebuilt model, the LUIS app is then published. Publishing an app means
    making it available for use. Once published, a client application can send utterances
    to a LUIS service endpoint, as illustrated in Figure [7-12](#478492_1_En_7_Chapter.xhtml#Fig12).
    LUIS responds with a JSON response.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig12_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig12_HTML.jpg)


    **Figure 7-12** Example LUIS bot flow'
