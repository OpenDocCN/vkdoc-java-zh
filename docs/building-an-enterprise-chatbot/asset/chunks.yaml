  trans: "\n### 第三方渠道\n\n银行及其他金融机构深知为用户开辟金融服务新渠道的重要性。虽然这为用户带来了便利，但也伴随着一定风险。技术的发展速度远超我们现有的风险框架。当普通用户能够摸索出使用聊天机器人的风险或最佳实践时，他们可能已经遭遇了安全漏洞。\n\
    \n最大的安全风险源于聊天机器人的通信渠道，因为这些渠道不受银行安全控制的管辖。例如，通过 Facebook Messenger 与银行系统交互的客户，实际上是借助\
    \ Facebook 平台进行操作，而该平台可能存在漏洞，且其设计初衷并非用于银行业务，仅适用于普通人际聊天。\n\nSynopsys 在 2018 年进行的一项调查显示，36%\
    \ 的受访者认为面向客户的 Web 应用仍是亚太地区企业面临的首要安全风险。2018 年 9 月，Facebook 承认其安全漏洞影响了超过 5000 万个账户，这及时提醒我们，即便是科技巨头也无法幸免。（来源：`finews.asia`）。\n\
    \n这些案例要求金融机构限制通过公共渠道使用聊天机器人信使的功能。开发端到端的聊天机器人体验也能降低此类风险，但其普及仍面临挑战。\n\n### 身份冒充\n\
    \n另一个非常突出的风险源于**身份冒充**。身份冒充可能表现为外观相似的聊天机器人，或利用虚假窗口进行对话、入侵社交媒体及其他冒充手段。由于欺诈者的犯罪手段层出不穷，银行已经面临大量欺诈行为，并每年投入数百万资金用于防范网络钓鱼、语音钓鱼及其他冒充攻击的教育。\n\
    \n双因素认证是减少身份冒充攻击的一种可行方法，它通过两个不同来源进行两步验证。在大多数情况下，黑客无法同时破解两个认证因素，因此成功进行欺诈交易的可能性较低。\n\
    \n### 个人信息\n\n通过聊天机器人渠道泄露个人信息是银行管理上面临的一项挑战。控制那些可能为了获取服务而无意中输入个人信息的用户，是一项艰巨的任务。由于聊天机器人由自然语言驱动，泄露个人详细信息的可能性很高。\n\
    \n聊天机器人需要确保尽可能少地使用信息。最好创建一个具有适当访问控制的 PIN 码，这样用户就无需透露个人信息，只需使用 PIN 码即可。教育用户是确保用户对任何欺诈行为保持警惕和警觉的关键步骤。\n\
    \n### 确认核查\n\n确认是最有效、有时也是最后的手段，用以确保通过聊天机器人进行的交易是合法的。使用聊天机器人可能发生欺诈性或错误交易。当新技术投入用户服务时，用户需要时间来理解服务的正确使用方法，在此过程中，他们也可能进行一些非法交易。\n\
    \n对于任何看似异常或意外的交易，最好在处理前致电客户并要求确认。这一核查措施能保护用户和银行免受欺诈。\n\n## 私有聊天机器人的通用解决方案架构\n\n\
    > *解决方案架构是一种实践，用于定义和描述在特定解决方案背景下交付的系统的架构，因此它可能涵盖对整个系统或其特定部分的描述。解决方案架构的定义通常由解决方案架构师主导。*\n\
    > \n> 来源：维基百科\n\n在本节中，我们将介绍一个参考解决方案架构，您可以稍作修改后应用于迄今为止提出的各种理念（图 4-1）。\n\n![../images/478492_1_En_4_Chapter/478492_1_En_4_Fig1_HTML.jpg](img/478492_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1\n\n24x7 保险代理的解决方案架构\n\n该架构从高层次上描述了解决方案将如何运作。这与技术架构不同，技术架构解释了使解决方案运作的具体组件及其配置。精确的技术架构是根据需求构建的，不在本书的讨论范围之内。以下小节将通过其他重要信息来扩展和解释该解决方案架构。\n"
- fmt: "### Workflow Description\n\nHere is the workflow:\n\n1. **Conversation interface**:\
    \ We will develop the interface from scratch; it does not depend upon third-party\
    \ interfaces (e.g., Skype, Telegram, etc.). This will help us create customized\
    \ interfaces for the organization’s need and extend other features as required.\
    \ The interface can be an entirely new mobile app for the iOS, Android, and Windows\
    \ platforms.\n\n2. **MFA and Active Directory**: The authentication system will\
    \ be built at the back end to authenticate devices (`MS Intune`), users (`Active\
    \ Directory`), and applications (by PIN). We will make it on a node environment\
    \ to allow integration to other identity management services as well. In the natural\
    \ form, we will only have PIN verification to access the application.\n\n3. **NLP\
    \ engine**: The NLP engine will be built to accept text inputs from a queue and\
    \ extract intent and apply context to the incoming query. Once the question is\
    \ broken into the required components, it’s sent to the bot logic.\n\n4. **Bot\
    \ logic**: This is the core handler of the incoming request. It will have two\
    \ core inputs before processing the request. The bot logic does not call information\
    \ services until it has satisfied the process set as per the below two methods.\
    \ If there isn’t enough information for the bot logic to reply, it’ll ask the\
    \ user for more information.\n   1. **Policy interaction flows**: These flows\
    \ are bank expert-designed workflows for the incoming request (e.g., if someone\
    \ asks for an update of address, what are the essential steps for a reply?). The\
    \ steps will make sure the user complies with the steps to get an answer. This\
    \ ensures that all policies, statutory or internal, are followed by the bot, just\
    \ like an informal HR. Also, policies and FAQ can be defined here.\n\n   2. **Machine\
    \ learning**: The request that requires a machine learning algorithms to improvise\
    \ the output is requested from here (e.g., can I request a statement from March\
    \ 15 to March 18?). This needs a machine to apply appropriate logic to extract\
    \ dates, an employee id, and an existing account balance to create the right query\
    \ to the information system. Further, sophisticated features like the mood of\
    \ the employee, the urgency of the request, and the sentiment of the question\
    \ will be built here.\n\n5. **Information service**: This is the place where real-time\
    \ information is fetched for the employee request. This service handles all appeals\
    \ and prepares responses AND can also send a request for actions as well. The\
    \ information service will talk to three core data services:\n   1. **Data lake/databases**:\
    \ If some data needs to be fetched from some database or data lake of corporate.\n\
    \n   2. **Third-party APIs/ODBCs**: Interacts with HR systems via ODBC/APIs or\
    \ some other method that exposes itself with REST APIs.\n\n   3. **Human HR**:\
    \ If there’s a low score of confidence in the reply, it will transfer the request\
    \ to HR for a response through the chat interface.\n\n6. **Actions**: The information\
    \ service will also route the requests asking for some work to the actions item\
    \ management queue (e.g., a request for leave for tomorrow). This request requires\
    \ an update in `PeopleSoft` or the HR system. All such change requests will be\
    \ routed to an HR approval (can be direct as well); once approved, either by real\
    \ HR or by a policy-based rule, it will be sent to an action queue. HR can support\
    \ broadcast here, and they can be delivered by an actions workflow.\n\n7. **Updates\
    \ in real systems**: For authorized and approved requests, we update them directly\
    \ in the HR system and trigger a notification to the chatbot user and also trigger\
    \ emails and other built-in process flows of the banking system.\n\n### Key Features\n\
    \nBelow are the key features:\n\n* **Built for you**: We will make the bot for\
    \ specific needs, not fitting those needs to existing bot frameworks.\n\n* **Data\
    \ privacy by design**: The bot is developed with data privacy by design. It will\
    \ be fully compliant with local laws and internal laws.\n\n* **Developed with\
    \ a microservices architecture**: The entire application will be based on principles\
    \ of microservices and hence will allow future-proof design and also advanced\
    \ application development on top of the framework.\n\n* **Options for deployment**:\
    \ We can choose which components we want to deploy on-premise or on the public\
    \ cloud. Based on needs, we can create a deployment plan.\n\n* **Extensible**:\
    \ We can integrate as many APIs or AI/ML features as deemed fit for use. All the\
    \ new future changes can be consumed as APIs in the framework.\n\n### Technology\
    \ Stack\n\nNow the technology stack:\n\n* **Core engine**: Java and JavaScript\n\
    \n* **Backend server**: NodeJS and other JavaScript\n\n* **Front-end server**:\
    \ Mobile apps based on native frameworks\n\n* **Log management**: Cloud store\
    \ of a small Hadoop cluster. Also, these stored conversational logs provide data\
    \ for AI/ML model training.\n\n* **Visualization**: Can be custom created using\
    \ `D3`; if self-service is required, then `Tableau`/`PowerBI` integration with\
    \ the logs.\n\n* **Search**: Elastic Search to search the conversation logs.\n\
    \n### Maintenance\n\nThere are two critical streams in terms of maintenance scope:\n\
    \n* **The technology**: Application uptime will be maintained with the help of\
    \ on-premise engineers and an on-call channel for all queries.\n\n* **The AI/ML\
    \ brain**: This will be done offsite by a team of data scientists and updates\
    \ will be pushed to the systems when ready.\n\n## Summary\n\nThe chapter described\
    \ the business considerations for a chatbot solution and listed the benefits of\
    \ the chatbot. The market growth of messengers is a good sign, indicating that\
    \ users are adapting to messengers, so a service chatbot can add to their experience\
    \ and reduce the cost for the company. Third-party studies show the impact chatbots\
    \ are creating in businesses and how they are bringing digital channels close\
    \ to natural language. The next section talked about the success metrics that\
    \ must be defined to manager and improve the chatbot. The essential metrics include\
    \ the Customer Satisfaction Index (CSI) and Conversion Index (CI).\n\nFurther,\
    \ the chapter also discussed the potential risks of chatbots and how to manage\
    \ them. The most prominent risks are impersonation and hacking of credentials.\
    \ Both of these risks require education and secure authentication systems. In\
    \ the end, we show a reference solution to develop a chatbot. The architecture,\
    \ workflow, technology stack, and maintenance notes provide enough information\
    \ to build your chatbot solution as per certain needs. In the following chapters,\
    \ you will learn about critical areas of natural language sciences, including\
    \ understanding (NLU), processing (NLP), and generation (NLG). And then we will\
    \ discuss the implementation of features using open source technology and in-house-developed\
    \ frameworks."
