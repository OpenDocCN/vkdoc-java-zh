    引言


    市面上有众多框架和专有现成的聊天机器人产品，但大多数并未清晰规划出组织对数据这一迫切需求的控制权。通常，专有产品会获取组织的私有数据在云端进行训练，并将结果作为模型提供。在本书中，我们将重点关注数据隐私以及对开发过程的控制。你将学习如何完全在内部使用开源的
    JAVA 框架和 Python 的 NLP 库来开发聊天机器人。


    本书的开篇将帮助你理解银行业中的流程，并深入探讨如何识别从客户查询中挖掘意图的数据源。第二部分重点介绍自然语言处理、理解和生成，这些内容将使用 Python
    进行演示。这三个概念是聊天机器人的核心组成部分。在最后一部分，你将着手使用 JAVA 编写的开源框架开发一个名为 IRIS 的聊天机器人。


    以下是本书提供的关键主题：


    *   识别行业中可应用聊天机器人的业务流程，并恰当地指导解决方案架构的设计

    *   专注于为一个行业和一个用例构建聊天机器人，而不是构建一个通用型的聊天机器人

    *   自然语言理解、处理与生成

    *   学习如何使用 RASA 和 Botpress 等开源技术栈部署一个完全内部构建的聊天机器人（此类聊天机器人避免与任何第三方工具共享任何个人身份信息）

    *   通过定制现有的开源聊天机器人框架，从头开始开发一个名为 IRIS 的聊天机器人

    *   使用 API 将聊天机器人与内部数据源集成

    *   通过表征学习实现部署和持续改进框架


    我们希望你喜欢这段旅程。


    致谢


