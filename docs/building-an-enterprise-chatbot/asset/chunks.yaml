- fmt: '# Natural Language Understanding


    In recent times, both industry and academia have shown tremendous interest in
    natural language understanding. This has resulted in an explosion of literature
    and tools. Some of the major applications of NLU include:


    - Question answering

    - Natural language search

    - Web-scale relation extraction

    - Sentiment analysis

    - Text summarization

    - Legal discovery


    The above applications can be majorly grouped into four topics:


    - **Relation extraction**: Finding the relationship between instances and database
    tuples. The outputs are discrete values.

    - **Semantic parsing**: Parse sentences to create logical forms of text understanding,
    which humans are good at performing. Again, the output here is a discrete value.

    - **Sentiment analysis**: Analyze sentences to give a score in a continuous range
    of values. A low value means a slightly negative sentiment, and a high score means
    a positive sentiment.

    - **Vector space model**: Create a representation of words as a vector, which
    then can help in finding similar words and contextual meaning.


    We will explore some of the above applications in this section.


    ## Sentiment Analysis


    `TextBlob` provides an easy-to-use implementation of sentiment analysis. The method
    `sentiment` takes a sentence as an input and provides polarity and subjectivity
    as two outputs.


    ### Polarity


    A float value within the range [-1.0, 1.0]. This scoring uses a corpus of positive,
    negative, and neutral words (which is called polarity) and detects the presence
    of a word in any of the three categories. In a simple example, the presence of
    a positive word is given a score of 1, -1 for negative, and 0 for neutral. We
    define polarity of a sentence as the average score, i.e., the sum of the scores
    of each word divided by the total number of words in the sentence.


    If the value is less than 0, the sentiment of the sentence is negative and if
    it is greater than 0, it is positive; otherwise, it’s neutral.


    ### Subjectivity


    A float value within the range [0.0, 1.0]. A perfect score of 1 means “very subjective.”
    Unlike polarity, which reveals the sentiment of the sentence, subjectivity does
    not express any sentiment. The score tends to 1 if the sentence contains some
    personal views or beliefs. The final score of the entire sentence is calculated
    by assigning each word a subjectivity score and applying the averaging; the same
    way as polarity.


    The `TextBlob` library internally calls the `pattern` library to calculate the
    polarity and subjectivity of a sentence. The `pattern` library uses [SentiWordNet](http://sentiwordnet.isti.cnr.it/),
    which is a lexical resource for opinion mining, with polarity and subjectivity
    scores for all WordNet synsets. Here is the link to the SentiWordNet: [`https://github.com/aesuli/sentiwordnet`](https://github.com/aesuli/sentiwordnet).


    In the following example, the polarity of the sentence is 0.5, which means it’s
    “more positive” and the subjectivity of 0.4375 means it is “very subjective.”


    ```

    s_text = TextBlob("Building Enterprise Chatbot that can converse like humans.
    The future for chatbot looks great!")

    s_text.sentiment

    Sentiment(polarity=0.5, subjectivity=0.4375)

    ```


    ## Language Models


    The first task of any NLP modeling is to break a given piece of text into tokens
    (or words), the fundamental unit of a sentence in any language. Once we have the
    words, we want to find the best numeric representation of the words because machines
    do not understand words; they need numeric values to perform computation. We will
    discuss two: `Word2Vec` (Word to a Vector) and `GloVe` (Global Vectors for Word
    Representation). For `Word2Vec`, a detailed explanation is provided in the next
    section.


    ### Word2Vec


    `Word2Vec` is a machine learning model (trained with a vast vocabulary of words
    using the neural network) that produces word embeddings, which are vector representations
    of words in the vocabulary. `Word2Vec` models are trained to construct the linguistic
    context of words. We will see some examples in Python using the `gensim` library
    to understand what linguistic context means. Figure [5-14](#478492_1_En_5_Chapter.xhtml#Fig14)
    shows the neural network architecture for training the `Word2Vec` model.


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig14_HTML.png](images/478492_1_En_5_Chapter/478492_1_En_5_Fig14_HTML.png)


    Figure 5-14: Generating training sample for the neural network using a window
    size of 2


    A skip-gram neural network model for `Word2Vec` computes the probability for every
    word in the vocabulary of being the “nearby word” that we select. Proximity or
    nearness of words can be defined by a parameter called window size. Figure [5-14](#478492_1_En_5_Chapter.xhtml#Fig14)
    shows the possible pair of words for training a neural network with window size
    of 2.


    Any one of the tools can be used to generate such n-grams. In the following code,
    we use the `TextBlob` library in Python to generate the n-grams with a window
    size of 2.


    ```

    #n-grams

    #The TextBlob.ngrams() method returns a list of tuples of n successive words.

    #First, the import

    from textblob import TextBlob

    blob = TextBlob("Building an enterprise chatbot that can converse like humans")

    blob.ngrams(n=2)

    [WordList([''Building'', ''an'']),

    WordList([''an'', ''enterprise'']),

    WordList([''enterprise'', ''chatbot'']),

    WordList([''chatbot'', ''that'']),

    WordList([''that'', ''can'']),

    WordList([''can'', ''converse'']),

    WordList([''converse'', ''like'']),

    WordList([''like'', ''humans''])]

    ```


    In the input sentence, “Building an enterprise chatbot that can converse like
    humans” is broken into words and with a window size of 2, we take two words each
    from left and right of the input word. So, if the input word is “chatbot,” the
    output probability of the word “enterprise” will be high because of its proximity
    to the word “chatbot” in the window size of 2. This is only one example sentence.
    In a given vocabulary, we will have thousands of such sentences; the neural network
    will learn statistics from the number of times each pairing shows up. So, if we
    feed many more training samples like the one shown in Figure [5-14](#478492_1_En_5_Chapter.xhtml#Fig14),
    it will figure out how likely the words “chatbot” and “enterprise” are going to
    appear together.'
  raw: '## Natural Language Understanding


    In recent times, both industry and academia have shown tremendous interest in
    natural language understanding. This has resulted in an explosion of literature
    and tools. Some of the major applications of NLU include


    *   Question answering


    *   Natural language search


    *   Web-scale relation extraction


    *   Sentiment analysis


    *   Text summarization


    *   Legal discovery


    The above applications can be majorly grouped into four topics:


    *   **Relation extraction**: Finding the relationship between instances and database
    tuples. The outputs are discrete values.


    *   **Semantic parsing**: Parse sentences to create logical forms of text understanding,
    which humans are good at performing. Again, the output here is a discrete value.


    *   **Sentiment analysis**: Analyze sentences to give a score in a continuous
    range of values. A low value means a slightly negative sentiment, and a high score
    means a positive sentiment.


    *   **Vector space model**: Create a representation of words as a vector, which
    then can help in finding similar words and contextual meaning.


    We will explore some of the above applications in this section.


    ### Sentiment Analysis


    TextBlob provides an easy-to-use implementation of sentiment analysis. The method
    `sentiment` takes a sentence as an input and provides polarity and subjectivity
    as two outputs.


    #### Polarity


    A float value within the range [-1.0, 1.0]. This scoring uses a corpus of positive,
    negative, and neutral words (which is called polarity) and detects the presence
    of a word in any of the three categories. In a simple example, the presence of
    a positive word is given a score of 1, -1 for negative, and 0 for neutral. We
    define polarity of a sentance as the average score, i.e., the sum of the scores
    of each word divided by the total number of words in the sentance.


    If the value is less than 0, the sentiment of the sentence is negative and if
    it is greater than 0, it is positive; otherwise, it’s neutral.


    #### Subjectivity


    A float value within the range [0.0, 1.0]. A perfect score of 1 means “very subjective.”
    Unlike polarity, which reveals the sentiment of the sentence, subjectivity does
    not express any sentiment. The score tends to 1 if the sentence contains some
    personal views or beliefs. The final score of the entire sentence is calculated
    by assigning each word on subjectivity score and applying the averaging; the same
    way as polarity.


    The TextBlob library internally calls the pattern library to calculate the polarity
    and subjectivity of a sentence. The pattern library uses [SentiWordNet](http://sentiwordnet.isti.cnr.it/),
    which is a lexical resource for opinion mining, with polarity and subjectivity
    scores for all WordNet synsets. Here is the link to the SentiWordNet: [`https://github.com/aesuli/sentiwordnet`](https://github.com/aesuli/sentiwordnet)
    .


    In the following example, the polarity of the sentence is 0.5, which means it’s
    “more positive” and the subjectivity of 0.4375 means it is “very subjective.”


    ```

    s_text = TextBlob("Building Enterprise Chatbot that can converse like humans.
    The future for chatbot looks great!")

    s_text.sentiment

    Sentiment(polarity=0.5, subjectivity=0.4375)

    ```


    ### Language Models


    The first task of any NLP modeling is to break a given piece of text into tokens
    (or words), the fundamental unit of a sentence in any language. Once we have the
    words, we want to find the best numeric representation of the words because machines
    do not understand words; they need numeric values to perform computation. We will
    discuss two: Word2Vec (Word to a Vector) and GloVe (Global Vectors for Word Representation).
    For Word2Vec, a detailed explanation is provided in the next section.


    #### Word2Vec


    Word2Vec is a machine learning model (trained with a vast vocabulary of words
    using the neural network) that produces word embeddings, which are vector representations
    of words in the vocabulary. Word2vec models are trained to construct the linguistic
    context of words. We will see some examples in Python using the gensim library
    to understand what linguistic context means. Figure [5-14](#478492_1_En_5_Chapter.xhtml#Fig14)
    shows the neural network architecture for training the Word2Vec model.


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig14_HTML.png](images/478492_1_En_5_Chapter/478492_1_En_5_Fig14_HTML.png)


    Figure 5-14


    Generating training sample for the neural network using a window size of 2


    A skip-gram neural network model for Word2Vec computes the probability for every
    word in the vocabulary of being the “nearby word” that we select. Proximity or
    nearness of words can be defined by a parameter called window size. Figure [5-14](#478492_1_En_5_Chapter.xhtml#Fig14)
    shows the possible pair of words for training a neural network with window size
    of 2.


    Any one of the tools can be used to generate such n-grams. In the following code,
    we use the TextBlob library in Python to generate the n-grams with a window size
    of 2.


    ```

    #n-grams

    #The TextBlob.ngrams() method returns a list of tuples of n successive words.

    #First, the import

    from textblob import TextBlob

    blob = TextBlob("Building an enterprise chatbot that can converse like humans")

    blob.ngrams(n=2)

    [WordList([''Building'', ''an'']),

    WordList([''an'', ''enterprise'']),

    WordList([''enterprise'', ''chatbot'']),

    WordList([''chatbot'', ''that'']),

    WordList([''that'', ''can'']),

    WordList([''can'', ''converse'']),

    WordList([''converse'', ''like'']),

    WordList([''like'', ''humans''])]

    ```


    In the input sentence, “Building an enterprise chatbot that can converse like
    humans” is broken into words and with a window size of 2, we take two words each
    from left and right of the input word. So, if the input word is “chatbot,” the
    output probability of the word “enterprise” will be high because of its proximity
    to the word “chatbot” in the window size of 2\. This is only one example sentence.
    In a given vocabulary, we will have thousands of such sentences; the neural network
    will learn statistics from the number of times each pairing shows up. So, if we
    feed many more training samples like the one shown in Figure [5-14](#478492_1_En_5_Chapter.xhtml#Fig14),
    it will figure out how likely the words “chatbot” and “enterprise” are going to
    appear together.'
  trans: '

    ## 自然语言理解


    近年来，工业界和学术界都对自然语言理解表现出了极大的兴趣。这导致了大量文献和工具的出现。NLU 的一些主要应用包括：


    *   问答系统

    *   自然语言搜索

    *   网络级关系抽取

    *   情感分析

    *   文本摘要

    *   法律发现


    上述应用主要可以归纳为四个主题：


    *   **关系抽取**：寻找实例与数据库元组之间的关系。输出结果为离散值。

    *   **语义解析**：解析句子以生成文本理解的逻辑形式，这是人类所擅长的。同样，此处的输出也是离散值。

    *   **情感分析**：分析句子，在连续值范围内给出一个分数。低分表示轻微负面情绪，高分表示正面情绪。

    *   **向量空间模型**：将单词表示为向量，这有助于寻找相似单词和上下文含义。


    在本节中，我们将探讨上述部分应用。


    ### 情感分析


    TextBlob 提供了一个易于使用的情感分析实现。`sentiment` 方法将句子作为输入，并输出两个结果：极性（polarity）和主观性（subjectivity）。


    #### 极性


    一个在 [-1.0, 1.0] 范围内的浮点值。该评分使用一个包含正面、负面和中性词汇的语料库（称为极性），并检测单词是否属于这三个类别中的任何一个。在一个简单的例子中，正面词汇得分为
    1，负面词汇得分为 -1，中性词汇得分为 0。我们将句子的极性定义为平均得分，即每个单词得分之和除以句子中的总单词数。


    如果该值小于 0，则句子情感为负面；如果大于 0，则为正面；否则为中性。


    #### 主观性


    一个在 [0.0, 1.0] 范围内的浮点值。完美得分 1 表示“非常主观”。与揭示句子情感的极性不同，主观性不表达任何情感。如果句子包含个人观点或信念，得分趋向于
    1。整个句子的最终得分是通过为每个单词分配主观性得分并计算平均值得到的，方法与极性相同。


    TextBlob 库内部调用 pattern 库来计算句子的极性和主观性。pattern 库使用 [SentiWordNet](http://sentiwordnet.isti.cnr.it/)，这是一个用于意见挖掘的词汇资源，包含了所有
    WordNet 同义词集的极性和主观性得分。以下是 SentiWordNet 的链接：[`https://github.com/aesuli/sentiwordnet`](https://github.com/aesuli/sentiwordnet)
    。


    在下面的例子中，句子的极性为 0.5，表示“更正面”，主观性为 0.4375，表示“非常主观”。


    ```

    s_text = TextBlob("Building Enterprise Chatbot that can converse like humans.
    The future for chatbot looks great!")

    s_text.sentiment

    Sentiment(polarity=0.5, subjectivity=0.4375)

    ```


    ### 语言模型


    任何 NLP 建模的首要任务是将给定的文本片段分解为标记（或单词），这是任何语言中句子的基本单位。有了单词之后，我们希望找到单词的最佳数值表示，因为机器不理解单词，它们需要数值来进行计算。我们将讨论两种模型：Word2Vec（词到向量）和
    GloVe（用于词表示的全局向量）。关于 Word2Vec，将在下一节中提供详细解释。


    #### Word2Vec


    Word2Vec 是一种机器学习模型（使用神经网络在大量词汇上进行训练），它生成词嵌入，即词汇表中单词的向量表示。Word2Vec 模型被训练用于构建单词的语言上下文。我们将使用
    Python 中的 gensim 库来看一些例子，以理解语言上下文的含义。图 5-14 展示了用于训练 Word2Vec 模型的神经网络架构。


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig14_HTML.png](img/478492_1_En_5_Fig14_HTML.png)


    图 5-14


    使用窗口大小为 2 为神经网络生成训练样本


    用于 Word2Vec 的 skip-gram 神经网络模型会计算词汇表中每个单词成为我们选择的“附近单词”的概率。单词的邻近程度可以通过一个称为窗口大小的参数来定义。图
    5-14 展示了使用窗口大小为 2 训练神经网络时可能的单词对。


    可以使用任何一种工具来生成这样的 n-gram。在下面的代码中，我们使用 Python 中的 TextBlob 库来生成窗口大小为 2 的 n-gram。


    ```

    #n-grams

    #TextBlob.ngrams() 方法返回一个由 n 个连续单词组成的元组列表。

    #首先，导入

    from textblob import TextBlob

    blob = TextBlob("Building an enterprise chatbot that can converse like humans")

    blob.ngrams(n=2)

    [WordList([''Building'', ''an'']),

    WordList([''an'', ''enterprise'']),

    WordList([''enterprise'', ''chatbot'']),

    WordList([''chatbot'', ''that'']),

    WordList([''that'', ''can'']),

    WordList([''can'', ''converse'']),

    WordList([''converse'', ''like'']),

    WordList([''like'', ''humans''])]

    ```


    在输入句子“Building an enterprise chatbot that can converse like humans”中，它被分解成单词，并且使用窗口大小为
    2，我们从输入单词的左右两侧各取两个单词。因此，如果输入单词是“chatbot”，那么单词“enterprise”的输出概率会很高，因为它在窗口大小为 2
    的范围内与单词“chatbot”邻近。这只是一个示例句子。在给定的词汇表中，我们会有成千上万个这样的句子；神经网络将从每个配对出现的次数中学习统计规律。因此，如果我们提供更多像图
    5-14 中所示的训练样本，它将能够计算出单词“chatbot”和“enterprise”同时出现的可能性有多大。

