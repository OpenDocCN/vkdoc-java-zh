- fmt: "### Third-Party Channels\n\nBanks and other financial institutions are very\
    \ much aware about opening a new channel for users to access financial services.\
    \ While it adds convenience to the customers, it brings some risks as well. Technology\
    \ is growing way faster than the risk frameworks we have. By the time a general\
    \ user is able to figure out the risk with usage or best practices for using chatbots,\
    \ they may already face a security breach.\n\nTop security risks arise from the\
    \ communication channels for chatbots because they are external to the bank’s\
    \ security control. For example, a customer interacting through Facebook Messenger\
    \ is interacting with the bank systems using the Facebook platform, which may\
    \ have vulnerabilities and is not designed for banking operations, just generic\
    \ chats among people.\n\nIn a 2018 survey undertaken by Synopsys, 36% of respondents\
    \ indicated that customer-facing web applications remain the top security risk\
    \ to businesses in the Asia-Pacific. September 2018’s admission by Facebook that\
    \ a security breach had affected more than 50 million accounts came as a timely\
    \ reminder that even tech giants aren’t spared. (Source: `finews.asia`).\n\nThese\
    \ cases require financial institutions to limit functionalities through public\
    \ channels for chatbot messengers. Developing an end-to-end chatbot experience\
    \ can reduce this risk as well, but adoption remains a challenge.\n\n### Impersonation\n\
    \nAnother very prominent risk arises from impersonation. Impersonation can result\
    \ in similar looking chatbots, or humans having conversations using fake windows,\
    \ hacking social media, and other sources of impersonation. The banks already\
    \ face a lot of fraud due to criminal ingenuity from fraudsters and spend millions\
    \ in education for phishing, vishing, and other impersonation attacks.\n\nTwo-factor\
    \ authentications are one possible way to reduce the impersonation attacks by\
    \ having two-step verification from two different sources. In most cases, hackers\
    \ are not able to crack both factors of authentication and are less likely to\
    \ be successful in fraudulent transactions.\n\n### Personal Information\n\nPersonal\
    \ information revealed through the chatbot channels is a challenge for banks to\
    \ manage. It is challenging to control users who may accidentally enter their\
    \ personal information to get access to a service. As the chatbots are driven\
    \ by natural language, the chances of revealing personal details are high.\n\n\
    The chatbots need to make sure that they use as little information as possible.\
    \ It’s better to create a PIN with adequate access control so that the user never\
    \ needs to disclose personal information; they can just use the PIN. Educating\
    \ the users is an essential step to make sure the user is aware and alert for\
    \ any fraud.\n\n### Confirmation Check\n\nConfirmation is the most impactful and\
    \ sometimes last resort to make sure transactions done via chatbots are legitimate.\
    \ Fraudulent or mistaken transactions are possible using chatbots. As new technology\
    \ comes into user service, it takes time for the users to understand the right\
    \ use of the service, and in this process, they might do some illegal transactions\
    \ as well.\n\nFor any transaction that seems to be an anomaly or unexpected, it’s\
    \ always good to call up the customer and ask for confirmation before processing\
    \ it. This check saves the user and bank from fraud.\n\n## Generic Solution Architecture\
    \ for Private Chatbots\n\n> *Solution architecture is a practice of defining and\
    \ describing an architecture of a system delivered in context of a specific solution\
    \ and as such it may encompass a description of an entire system or only its specific\
    \ parts. Definition of a solution architecture is typically led by a solution\
    \ architect.*\n> \n> Source: Wikipedia\n\nIn this section, we present a reference\
    \ solution architecture you can apply, with minor modification, to the ideas presented\
    \ so far (Figure [4-1](#478492_1_En_4_Chapter.xhtml#Fig1)).\n\n![../images/478492_1_En_4_Chapter/478492_1_En_4_Fig1_HTML.jpg](images/478492_1_En_4_Chapter/478492_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\n\nSolution architecture of the 24x7 Insurance Agent\n\nThe architecture\
    \ captures at a high level how the solution will work. This is not the same as\
    \ technical architecture, which explains the specific components and their configurations\
    \ to make the solution work. The precise technical architecture is built as per\
    \ requirements and is out of scope for the book to cover. The following subsections\
    \ expand the solution architecture with other vital information to explain it."
