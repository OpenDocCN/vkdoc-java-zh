- fmt: '## A Customer-Centric Approach in Financial Services


    Customer behavior and interactions have evolved to a personalized approach over
    the last two decades. Competition and greater reliance on technology for delivery
    of services are keys to this change in customer behavior. The importance of a
    customer-centric approach in products and services is far greater than ever before.
    The customer-centric approach involves many direct and indirect interventions
    through multiple channels (see Figure [1-5](#478492_1_En_1_Chapter.xhtml#Fig5)).


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig5_HTML.png](images/478492_1_En_1_Chapter/478492_1_En_1_Fig5_HTML.png)


    Figure 1-5


    Customer centricity in financial services


    The core element of customer centricity is a focused customer leadership. If the
    leadership aligns the strategy to become a customer-centric organization, the
    whole outlook and communications become customer-centric. Amazon has proved this
    and is now seen as the benchmark for a customer-centric approach. Understanding
    the customer and designing experiments to validate the hypothesis form the next
    steps in a customer-centric approach. Once we set up a successful connection with
    customers, we need to empower the front line, track essential metrics, and keep
    the feedback cycle. These are some indicative steps to achieve a customer-centric
    approach.


    In financial services, primarily referring to retail products/services, the interaction
    points are many, and all touchpoints are critical to being customer focused. Banks
    and insurance companies deal with many individuals customers daily via multiple
    channels.


    Digital interventions are redefining the ways customer engagement happens. There
    are some critical trends among customers accessing banking and insurance services.


    * **More natural interactions**: The user experience is of the utmost importance.
    The customers are looking for easier access to products, an appealing experience,
    and easy action in a few clicks.

    * **More touchpoints and flexibility**: The customer does not want fixed 9 am
    to 5 pm branch visits or no access on weekends. Customers want to be able to access
    and buy products anytime and via multiple channels. It may be a mobile app or
    a web app or phone banking, but they want more flexibility in how they interact.

    * **Responsive service**: Customers expect that the bank/insurer knows about them
    and is responsive to their needs. They want individual attention and appreciate
    responsive customer service.

    * **Clear product information**: With so many players and products, customers
    want concise and relevant information to be delivered to them. Additional details
    they can seek with follow-ups. The customer does not want a pile of information
    or to get confused.

    * **Great value from the products**: The product features are numerous and many
    times the customer is unaware of how to make the best use of them. Customers expect
    the bank/insurer to keep reminding them to draw the best value out of a product
    and if possible, offer new products that might be useful.


    The growing digital presence of financial institutions also requires multiple
    changes in the technology landscape. Traditional database systems and applications
    are now becoming obsolete. Powerful endpoint computing (i.e., smartphones), excellent
    internet connectivity (i.e., 4G/5G), and cloud platforms are the magic trinity
    for a digital revolution in the financial sector.


    In this book, we will explore the evolution and working of chatbots in many endpoint
    interactions with customers. While conversational agents have existed for a long
    time (remember the IVRS systems?), new technology developments have made them
    driven by natural language, offering customer-centric delivery of information.
    Chatbots are designed to carry out specific and structured interactions; the complex
    service interactions are still better served by an experienced customer service
    representative. In coming chapters, we will cover different aspects of building
    a chatbot for an insurance agent.


    ## Benefits from Chatbots for a Business


    According to the Grand View Research 2018 report,^([¹](#fn1)) the global chatbot
    market is expected to reach $1.25 billion by 2025, with a CAGR of 24.3% (average
    annual growth rate). The chatbot market will grow significantly across the financial
    services sectors, as they are among the largest customer-facing businesses (in
    our context, the insurance business). The immediate value creation for institutions
    happens by significantly reducing the operating cost and bringing customer satisfaction.


    Technically speaking, chatbots are a combination of technology, artificial intelligence
    (AI), and business process designs.


    * The technology provides the carrier for exchanging messages between chatbots
    and customers, and chatbots and internal systems, delivering information in real
    time over mobile phone or the Web.

    * The AI builds the core brain of the chatbot, which understands the natural language
    decoded from machine instructions. They also make decisions during conversations.

    * The most critical piece is the business process design, which identifies the
    standard process to access information, what information can be shared with whom,
    and convenient ways to buy/sell/inquire about current products.


    While chatbots offer immense monetary value for the company regarding reducing
    the cost of customer service and as a new channel for revenue by sales of products
    and services, they also add immense value to the customer’s experience.


    * **24x7 availability**: Chatbots are available 24x7 through phones or the Web.
    This gives the customer options of when to interact with the services.

    * **Zero human touch experience**: Chatbots allow customers to have a zero human
    touch experience for their basic requirements. This way of getting the necessary
    information without going through the manual route is entirely new.

    * **Simplicity**: Chatbots simplify the process for customers by decoding the
    process into clear steps. The information delivered by chatbots is also very concise
    and to the point, as per the customer query.


    Daily, the ever-changing chatbot market is coming up with disruptive ideas and
    delivering value across the spectrum.'
