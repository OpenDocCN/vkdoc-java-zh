- fmt: '### Context and Question


    Now that the model is built, here are some examples of a given context and a question.
    Then we will see how well the model does. In the first example, we give a context
    about a chatbot called IRIS, and then ask the model “What is IRIS?” It correctly
    picks up the most relevant part from the context and gives us the output, starting
    from the eighth character.


    ```

    model([''IRIS is an enterprise chatbot completely built in-house and uses private
    data''], [''What is IRIS?''])

    [[''an enterprise chatbot completely built in-house''], [8], [832987.875]]

    ```


    In the next example, we give one of the reviews from the Amazon Food Review dataset
    as a context and then ask, “How many cakes were made?” The model is able to give
    the correct answer as 20.


    ```

    model([''Great morning cake!,We must have made about 20 of these cakes last fall
    They are so good. Also very easy to make.  This was great with bacon and eggs
    in the morning. It was also great for dessert (as I believe it was intended ;).
    We didnt put the icing on as suggested as the cake was great without it.  Now
    that its getting a little chilly out we are excited to start making our favorite
    fall cake again''], [''how many cakes were made?''])

    [[''20''], [44], [42414.3046875]]

    ```


    In the following example, we test whether the model is able to identify a phrase
    in the given context which might tell “Is the customer happy about the purchase?”
    The model picks up the right phrase, which talks about a particular sentiment:
    “disappointed.” It tells us the customer was happy about the purchase. In this
    question we haven’t used any words from the context, but the model still was able
    to extract the most appropriate phrase.


    ```

    model([''I used these rainbow jimmies for a rainbow cupcake topper and added them
    to rice krispie treats for my daughters 6th birthday.  Obviously, it was a rainbow
    party.  The package didnt look like the picture, but I was not disappointed in
    the product.  I would buy from this company again.''], [''is the customer happy
    about the purchase?''])

    [[''I was not disappointed''], [209], [2021.420166015625]]

    ```


    ### Serving the DeepPavlov Model


    In DeepPavlov terminology, each skill or component can be made available as a
    REST API. Once a skill or component is hosted as a skill, any application or service
    can call the API to get a response. In the following example, if we host the `intents_snips`
    component using the following command line argument


    ```

    (deeppavlov) C:\Users\Karthik\ Code>python -m deeppavlov riseapi "C:\ProgramData\Anaconda3\Lib\site-packages\deeppavlov\configs\classifiers\intents_snips.json"

    ```


    by the end of the above command, we should see the following output, where a Flask
    app is created and the API is running on the local host. You can specify your
    own port and URL for hosting the API. More on this can be found at [`http://docs.deeppavlov.ai/en/latest/devguides/rest_api.html`](http://docs.deeppavlov.ai/en/latest/devguides/rest_api.html).


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Figa_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Figa_HTML.jpg)


    Now, a POST request like the following should return a JSON response with the
    intent class `[[''SearchScreeningEvent'']]:`


    ```

    {"context":[" what are the show times for The Lion King"]}

    ```


    In the next chapter, we will introduce our enterprise chatbot named IRIS, where
    we can directly call the above REST API for intent classification. Note that you
    still have to train your own model on the private enterprise data in order to
    integrate it with the chatbot. Even though we will build IRIS using a Java framework,
    the REST API we have created above is easily called from within the Java application.
    We can create many applications using the powerful libraries of Python for NLP,
    NLU, and NLG tasks and simply host all of it as a REST API, which is language
    and platform agnostic.


    ## Summary


    We started by identifying the differences between natural language processing,
    understanding, and generation, and then discussed various open source tools available
    to process and understand natural languages.


    Then we delved into NLP, where we showed how to use tools like `NLTK`, `spaCy`,
    `CoreNLP`, `genism`, and `TextBlob` for various task such as processing textual
    data, normalizing text, part-of-speech tagging, dependency parsing, spelling correction,
    machine translation, and named entity recognition.


    In the NLU section, we showed language models like `Word2Vec` and `GloVe` for
    performing out-of-the-box tasks such as word and sentence similarity, finding
    linear substructures between words, and performing arithmetic operations on word
    embedding vectors to find meaningful semantic relationships between words. As
    an important part of NLG, we explored the relationship extraction from a given
    sentence using the `OpenIE` tool and built a topic modelling tool using latent
    Dirichlet allocation (LDA).


    We then moved into NLG, where we explored use cases like a random headline generator
    using the `markovify` library in Python. And then we explored `SimpleNLG`, an
    English grammar-based natural language generation utility. It offers grammatical
    structures such as generating the past tense, negation, complements, and prepositional
    phrases. In the NLG section, we built a deep learning-based model for predicting
    the next word in a given phrase or a sentence. The model used a popular deep learning
    architecture called long short-term memory.


    In the final part, we covered applications of NLP and NLU: topic modelling, gender,
    document classification, intent classification, and question answering. In the
    topic modeling, we utilized all of the available open source tools from the previous
    sections of the chapter.


    Overall, in this chapter we explored extensively the P-U-G of natural languages.
    The availability of many open source tools from Python and Java facilitated a
    great number of demonstrations to understand and model natural languages. We covered
    a varied level of topics starting from parsing text data to building generative
    models using a deep learning model. Our aim with this chapter was to provide an
    exhaustive collection of methods and tools to empower you to build chatbots with
    basic and advanced levels of natural language processing, understanding, and generation
    capabilities.


    Next, we will build and deploy a fully functional in-house enterprise chatbot
    on private datasets. Since there are many chatbot frameworks with support for
    NLP and NLU, the methods discussed in this chapter at first might seem not so
    readily usable; however, under the hood, many frameworks like `RASA` and `LUIS`
    internally uses the techniques discussed in this chapter. Also, many ideas from
    NLG are still not available in any standard chatbot framework, so they are often
    built from scratch. We believe the ideas taught in this chapter will come handy
    when you build an enterprise chatbot.


