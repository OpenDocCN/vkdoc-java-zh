- fmt: '# Introduction to RASA


    RASA is an open source stack of machine learning libraries for developers to create
    contextual chatbots. RASA also provides a paid enterprise-grade platform. Client
    services can connect with various APIs in the RASA platform. More details on the
    RASA platform can be found at [`https://rasa.com/products/rasa-platform/`](https://rasa.com/products/rasa-platform/).


    The RASA stack has two main components:


    - **Core**: A chatbot framework similar to Mutters, with machine learning-based
    dialog management

    - **NLU**: An intent classification module providing intent classification and
    entity extraction.


    As shown in Figure [7-13](#478492_1_En_7_Chapter.xhtml#Fig13), both `Core` and
    `NLU` modules provide various functionalities that can be customized, trained,
    and integrated on a custom dataset for contextual AI-based virtual assistants.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig13_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Functionalities of Core and NLU modules


    - **Turn natural language into structured data**: This functionality is similar
    to what we discussed in the QnA Maker example, in which structured, semi-structured,
    and unstructured data was parsed in some meaningful form in the knowledge base
    for querying.

    - **ML-based dialogue**: RASA provides its own dialogue management module that
    can be customized and modelled via a series of simple steps. We discussed an implementation
    of conversation management in IRIS in Chapter [6](#478492_1_En_6_Chapter.xhtml)
    with finite state machines.

    - **Custom word vectors**: RASA provides customization to train word vectors for
    our domain. Several word embeddings are generated in the process, which helps
    the engine in better intent classification. `Word2vec` is a popular neural network
    model that generates word embeddings from user text.

    - **Entity extraction**: By using the built-in or custom-built entity recognition
    models, RASA can identify entities in user utterances.

    - **Match messages to multiple intents**: A user utterance can be matched to multiple
    intents, and different match scores along with the best matching intent are returned
    in response.

    - **Interactive learning**: We discussed in the last chapter how to enhance IRIS
    by extending the design to support a continuous improvement framework through
    interactive learning. RASA also provides simple ways to enable interactive learning
    that teaches the bot new skills.


    The RASA framework for chatbots makes use of the two models to effectively flow
    the conversation, as shown in Figure [7-14](#478492_1_En_7_Chapter.xhtml#Fig14).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig14_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Flow of conversation using the Core and NLU modules of RASA


    The message is basically handled at two stages: one at the `Core` module, which
    manages the conversation, and one at the `NLU` module, which provides the essential
    language services. The external API calls or CRM connections are dealt with by
    the RASA platform with the help of RASA core trackers. The next section discusses
    some more details on how the two modules work.


    ## RASA Core


    `RASA Core` refers to the main component, which receives and responds to the requests.
    The module is robust and has a flow-based approach to handle all requests, as
    shown in Figure [7-15](#478492_1_En_7_Chapter.xhtml#Fig15).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig15_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Working on the RASA framework


    The RASA framework has a six-step flow to handle all incoming messaging requests
    and respond to them. The steps are described below; however, more details can
    be found at [`http://rasa.com/docs/#rasa_core.agent.Agent`](http://rasa.com/docs/%2523rasa_core.agent.Agent).


    The interpreter receives the message and converts it into a dictionary including
    the original text, the intent, and any entities that were found. The tracker keeps
    track of the conversations and passes on the state with new message to policy.
    The policy module prepares the response for the request. Once the response is
    ready in the policy module, it is passed to the tracker and action. The tracker
    updates the state of conversation and the action sends the response back to the
    user.


    The above implementation helps all the conversations to flow through RASA and
    at the same time keeps track of conversations to maintain states of conversations.


    ## RASA NLU


    RASA Natural Language Understanding (NLU) module is a tool that does the intent
    classification and entity extraction for all the messages incoming from the user.
    It is a fully open source tool developed for the core purpose of being used in
    chatbot development.


    The RASA NLU can be hosted as a service for your chatbot to use. The RASA NLU
    also allows you to train different types of models using your own data. From the
    perspective of chatbot developers, the RASA NLU module has two parts:


    - **Training**: This module allows you to train models on your own data. Having
    your own data to train allows you to develop a NLU that is business specific.

    - **Server**: This module serves as the training model to the chatbot. It can
    be hosted as an API service and runs at the back end.


    The key benefit of using the open source NLU module is that you don’t need to
    send your data outside to Google or Amazon to train on intents and entities. And,
    being open source, you can tweak the models or develop your own models as per
    your needs. The architecture for the RASA NLU also allows it to run from everywhere
    as a service. You may not need to make network calls if your architecture demands
    that.


    Refer to the extensive documentation of RASA at [`https://rasa.com/docs/`](https://rasa.com/docs/).'
