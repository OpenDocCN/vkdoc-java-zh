    if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "getageprompt",
    null) == null)

    reply = "当然，我很乐意帮您。请问您的年龄是？";

    else

    /*

    * 假设我们期望用户输入他的年龄，并且这是对话中的当前问题。然而，用户没有回答年龄，而是通过询问天气改变了意图。IRIS 被设计为处理从一个上下文到另一个上下文的意图切换。但是，下次如果用户想要再次获取报价，我们将不会询问已经回答过的问题，并且询问消息也会不同，就像此处
    if-else 回复消息中提到的那样。

    */

    reply = "我不确定上次是否正确获取了您的年龄。请重新输入";

    // 在会话中设置 getageprompt，以记录年龄之前已被询问过。

    session.setAttribute("getageprompt", "flag1");

    // 同样的逻辑适用于用户是否回答了他的吸烟状况。

    } else if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "smoked",
    null) == null) {

    session.setAttribute("askQuoteLastQuestion", "smoked");

    if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "getsmokedprompt",
    null) == null)

    reply = "您在过去 12 个月内吸过烟吗？";

    else

    reply = "上次您没有告诉我您在过去 12 个月内是否吸过烟，您吸过吗？";

    session.setAttribute("getsmokedprompt", "flag1");

    // 同样的逻辑适用于身高。

    } else if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "height",
    null) == null) {

    session.setAttribute("askQuoteLastQuestion", "height");

    if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "getheightprompt",
    null) == null)

    reply = "您的身高是多少（厘米）？";

    else

    reply = "您的身高是多少（厘米）？请再告诉我一遍好吗？";

    session.setAttribute("getheightprompt", "flag1");

    // 最后，同样的逻辑适用于体重。

    } else if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "weight",
    null) == null) {

    session.setAttribute("askQuoteLastQuestion", "weight");

    if (SessionStorage.getStringFromSlotOrSession(matchedIntent, session, "getweightprompt",
    null) == null)

    reply = "您的体重是多少（磅）？";

    else

    reply = "请再次告诉我您的体重（磅）。我上次没听清楚";

    session.setAttribute("getweightprompt", "flag1");

    }

    return reply;

    }

