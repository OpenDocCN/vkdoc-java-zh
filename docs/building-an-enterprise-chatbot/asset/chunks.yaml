  trans: "\n## 金融服务中的以客户为中心的方法\n\n过去二十年间，客户行为与互动方式已演变为个性化模式。竞争加剧以及对技术交付服务的更高依赖，是推动这一客户行为变化的关键因素。如今，产品与服务中贯彻以客户为中心的方法，其重要性远超以往。这种方法通过多种渠道（见图\
    \ 1-5）实施直接与间接的干预措施。\n\n![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig5_HTML.png](img/478492_1_En_1_Fig5_HTML.png)\n\
    \n图 1-5  \n金融服务中的客户中心性\n\n客户中心性的核心要素是聚焦客户的领导力。如果领导层将战略调整为打造以客户为中心的组织，那么整体视野与沟通方式都将变得以客户为中心。亚马逊已证明了这一点，如今被视为以客户为中心方法的标杆。理解客户并设计实验来验证假设，是以客户为中心方法的后续步骤。一旦与客户成功建立联系，我们需要赋能一线团队、追踪关键指标并保持反馈循环。这些是实现以客户为中心方法的部分指导性步骤。\n\
    \n在金融服务领域（主要指零售产品/服务），互动触点众多，所有接触点对于保持客户聚焦都至关重要。银行和保险公司每天通过多种渠道与大量个人客户打交道。\n\n\
    数字化干预正在重新定义客户互动的方式。在客户获取银行和保险服务的过程中，存在一些关键趋势。\n\n*   **更自然的互动**：用户体验至关重要。客户希望更便捷地获取产品、获得吸引人的体验，并能通过几次点击轻松完成操作。\n\
    \n*   **更多触点与灵活性**：客户不希望只能在固定时间（如上午 9 点到下午 5 点）前往网点，或周末无法办理业务。他们希望随时通过多种渠道访问和购买产品。无论是移动应用、网页应用还是电话银行，他们都希望在互动方式上拥有更多灵活性。\n\
    \n*   **响应式服务**：客户期望银行/保险公司了解他们，并能响应其需求。他们希望获得个性化关注，并欣赏及时响应的客户服务。\n\n*   **清晰的产品信息**：面对众多参与者和产品，客户希望获得简洁且相关的信息。其他细节可通过后续跟进获取。客户不希望被大量信息淹没或感到困惑。\n\
    \n*   **产品带来的巨大价值**：产品功能繁多，很多时候客户并不清楚如何充分利用它们。客户期望银行/保险公司不断提醒他们如何从产品中获取最大价值，并在可能的情况下提供可能有用的新产品。\n\
    \n金融机构日益增长的数字化存在也要求技术格局进行多重变革。传统的数据库系统和应用正逐渐过时。强大的终端计算设备（如智能手机）、卓越的互联网连接（如 4G/5G）以及云平台，构成了金融领域数字革命的“神奇三位一体”。\n\
    \n在本书中，我们将探讨聊天机器人在与客户的多种终端互动中的演变与运作。虽然对话代理已存在很长时间（还记得 IVRS 系统吗？），但新技术的发展使其由自然语言驱动，能够提供以客户为中心的信息传递。聊天机器人旨在执行特定且结构化的互动；而复杂的服务互动仍由经验丰富的客户服务代表处理更为合适。在接下来的章节中，我们将涵盖为保险代理人构建聊天机器人的不同方面。\n\
    \n## 聊天机器人为企业带来的益处\n\n根据 Grand View Research 2018 年的报告^(¹)，全球聊天机器人市场预计到 2025 年将达到\
    \ 12.5 亿美元，复合年增长率为 24.3%（平均年增长率）。聊天机器人市场将在金融服务领域显著增长，因为该领域是最大的面向客户的企业之一（在我们的语境中，即保险业务）。为机构创造的直接价值在于大幅降低运营成本并提升客户满意度。\n\
    \n从技术角度讲，聊天机器人是技术、人工智能（AI）和业务流程设计的结合。\n\n*   技术提供了聊天机器人与客户之间、以及聊天机器人与内部系统之间交换信息的载体，通过手机或网络实时传递信息。\n\
    \n*   AI 构建了聊天机器人的核心大脑，它能够理解从机器指令中解码出的自然语言，并在对话过程中做出决策。\n\n*   最关键的部分是业务流程设计，它识别出访问信息的标准流程、哪些信息可以与谁共享，以及购买/销售/查询现有产品的便捷方式。\n\
    \n虽然聊天机器人在降低客户服务成本以及作为销售产品和服务的新收入渠道方面，为公司带来了巨大的货币价值，但它们也为客户体验增添了巨大价值。\n\n*   **全天候可用性**：聊天机器人通过手机或网络提供\
    \ 7x24 小时服务。这为客户提供了选择何时与服务互动的灵活性。\n\n*   **零人工接触体验**：聊天机器人允许客户在满足基本需求时获得零人工接触的体验。这种无需通过人工途径即可获取必要信息的方式是全新的。\n\
    \n*   **简洁性**：聊天机器人通过将流程分解为清晰的步骤，简化了客户的操作。根据客户的查询，聊天机器人传递的信息也非常简洁且切中要点。\n\n日新月异的聊天机器人市场不断涌现颠覆性创意，并在各个领域创造价值。\n"
- fmt: '# Chatbots in the Insurance Industry


    Gone are the days of waiting for the next available operator or taking the effort
    to get the information. The customer-centric approach is one of the critical differentiators
    for a company today. Chatbots are helping augment customer engagement and brand
    presence, and they are proving to be very useful in most industries including
    the insurance industry. The emergence of mobile and social media has not only
    provided new channels of communication between people but has also made people
    feel closer to businesses. Companies are investing heavily in creating and maintaining
    a robust digital presence and implementing new solutions so they can have a better
    customer reach.


    Traditionally, the insurance industry has been slow to change. Due to the complexity
    of insurance, covering a diverse set of risks, the operating model has been cumbersome,
    with a lot of paperwork, background checks, and approvals. With the new era of
    digital business and increasing competition, the insurance industry is also addressing
    the needs of the always-on, always-connected digital world.


    Roughly 70% of calls to a call center of an insurance company are queries that
    can be addressed without a human interface, such as customers requesting details
    on their claim status, policy renewal, or information on financial advisors. According
    to World Wide Call Centers,^([²](#fn2)) in a shared call center, an inbound call
    rate ranges from $.35-$.45/minute at low-cost international agencies to $.75-$.90/minute
    in the U.S./Canada and from $8-$15 internationally to $22-$28 in the U.S./Canada.
    A typical large insurance company gets more than 10 million calls every year.
    Considering a call rate of $5 per call, even if a chatbot can address half of
    these queries, that’s a potential savings of $25 million per year.


    Where live agents can handle only two to three conversations at a time, a chatbot
    can operate without any such limit and reduce the human resources required to
    handle such queries. It can also automate repetitive work. These calls to call
    centers have an average wait time of 3 minutes until they are assigned to an agent,
    and customers who browse the website typically spend around 5 to 10 minutes to
    find the information they require. Virtual agents such as chatbots provide this
    information in real time, which is significant use of technology to make the interaction
    faster and more efficient. The services can be accessed 24x7 through multiple
    digital interaction platforms such as mobile apps, Facebook Messenger, Twitter,
    SMS, Skype, Alexa, and web UI chat, providing omnichannel support to customers.


    Figure [1-6](#478492_1_En_1_Chapter.xhtml#Fig6) shows the ways in which chatbots
    are transforming the insurance industry.


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig6_HTML.png](images/478492_1_En_1_Chapter/478492_1_En_1_Fig6_HTML.png)


    Figure 1-6


    Chatbots in the insurance industry


    Some of the most common applications of a chatbot in the life insurance industry
    are in the following sectors.


    ### Automated Underwriting


    With a wealth of information available about individuals online, machine learning
    techniques are being used to assess the risk index of an individual accurately.
    Companies are using virtual digital agents (chatbots) to provide a simplified
    way of buying life insurance and getting an instant decision.


    ### Instant Quotations


    Customers can get insurance eligibility and quotation details on the platform
    of their choice instantly.


    ### AI-Based Personalized Experience


    Since chatbots are designed to simulate human interaction, they can leverage AI
    to understand context and user needs in order to provide a better customer satisfaction
    experience.


    ### Simplification of the Insurance Buying Process


    The general public has an aversion to insurance-related paperwork due to long
    forms that are difficult to understand. Chatbots can ask the customer simple questions
    in a conversational language and use the answers to auto-populate some of the
    fields on the online form, speeding up the application process.


    ### Registering a Claim


    Since chatbots are virtual agents, they are available 24×7. Hence, they can help
    customers with the claim process regardless of the time of the incident. Time-to-settle-claim
    is an important metric that plays a critical role in improving the efficiency
    of an insurance business, and chatbots are playing an essential role in reducing
    the overall time to settle.


    ### Finding an Advisor


    Some companies use insurance agents or advisors. The natural language-based interaction
    model of the chatbots makes them convenient for customers to quickly inquire about
    insurance agents or financial advisors based on location or insurance type.


    ### Answering General Queries


    As many as 30% of the queries to the call center are general queries asking about
    policy cash value, policy premium due date, interest rates, FAQs, company and
    product information, account-related issues such as password reset, updating the
    beneficiary, and details around the application process. These queries can be
    addressed by a chatbot in real time in a customer-centric way.


    ### Policy Status


    The customer can check policy status and statuses of claims or other complaints
    or requests by interacting with a chatbot anywhere anytime.


    ### Instant Notifications


    Chatbots can remind customers about the policy premium due date, next billing
    cycle, and so forth.


    ### New Policy or Plan Suggestions


    Chatbots not only perform the role of service agents but also provide new marketing
    opportunities. User interaction and social media behavior on digital platforms
    such Facebook can be tailored to suggest content, products, or services as per
    their needs.'
