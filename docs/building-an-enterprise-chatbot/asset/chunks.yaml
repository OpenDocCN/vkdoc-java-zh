- fmt: "### Matched Intent Class\n\nThe last thing that we need to include in the\
    \ `com.iris.bot.intent` package is a `MatchedIntent` class. It holds the intent\
    \ that was matched, a map of slots that were matched against the defined slots\
    \ for the intent, and the utterance against which they were matched.\n\n```java\n\
    public class MatchedIntent {\n    /** The intent that was matched. */\n    private\
    \ Intent intent;\n    /** Map of slots that were matched. */\n    private HashMap\
    \ slotMatches;\n    /** The utterance that was matched against. */\n    private\
    \ String utterance;\n\n    /**\n     * Constructor.\n     *\n     * @param intent\n\
    \     *            The intent that was matched.\n     * @param slotMatches\n \
    \    *            The slots that were matched.\n     * @param utterance\n    \
    \ *            The utterance that was matched against.\n     */\n    public MatchedIntent(Intent\
    \ intent, HashMap slotMatches, String utterance) {\n        this.intent = intent;\n\
    \        this.slotMatches = slotMatches;\n        this.utterance = utterance;\n\
    \    }\n\n    /**\n     * Returns the Intent that was matched.\n     */\n    public\
    \ Intent getIntent() {\n        return intent;\n    }\n\n    /**\n     * Returns\
    \ the slots that were matched.\n     */\n    public Map getSlotMatches() {\n \
    \       return Collections.unmodifiableMap(slotMatches);\n    }\n\n    /**\n \
    \    * Returns the specified slot match if the slot was matched.\n     *\n   \
    \  * @param slotName\n     *            The name of the slot to return.\n    \
    \ * @return The slot match or null if the slot was not matched.\n     */\n   \
    \ public MatchedSlot getSlotMatch(String slotName) {\n        for (MatchedSlot\
    \ match : slotMatches.values()) {\n            if (match.getSlot().getName().equalsIgnoreCase(slotName))\
    \ {\n                return match;\n            }\n        }\n        return null;\n\
    \    }\n\n    /**\n     * Returns the utterance that was matched against.\n  \
    \   *\n     * @return The utterance that was matched against.\n     */\n    public\
    \ String getUtterance() {\n        return utterance;\n    }\n}\n```\n\n### Slot\
    \ Class\n\nWe covered intent, intent matcher service, and matched intents so far.\
    \ Designing classes of slots is similar to intents. We define slot-related classes\
    \ in the `com.iris.bot.slot` package:\n\n```java\n/*\n * Slot is defined as an\
    \ abstract class. The concrete class of Slot implements a match method that contain\
    \ the entity recognition logic.\n * getName returns the slot name that is described\
    \ in concrete slot classes.\n */\npublic abstract class Slot {\n    public abstract\
    \ MatchedSlot match(String utteranceToken);\n    public abstract String getName();\n\
    }\n```\n\nWith `Slot` defined, we create slots for the intent. `Slots` is an attribute\
    \ specified in the `Intent` class and slot details are provided in the IRIS configuration.\n\
    \n```java\n/** The slots for the intent.\n * There could be 0 or more slots defined\
    \ for each intent.\n * Slots contain a list of Slot and methods to add and get\
    \ Slot  */\npublic class Slots {\n    /** The map of slots. */\n    private HashMap\
    \ slots = new HashMap();\n\n    /**\n     * Adds a slot to the map.\n     */\n\
    \    public void add(Slot slot) {\n        slots.put(slot.getName().toLowerCase(),\
    \ slot);\n    }\n\n    /**\n     * Gets the specified slot from the map.\n   \
    \  */\n    public Slot getSlot(String name) {\n        return slots.get(name.toLowerCase());\n\
    \    }\n\n    /**\n     * Returns the slots in the map.\n     */\n    public Collection\
    \ getSlots() {\n        return Collections.unmodifiableCollection(slots.values());\n\
    \    }\n}\n```\n\nSimilarly to `MatchedIntent` class, we create the `MatchedSlot`\
    \ class to hold the details of the slots that were matched:\n\n```java\n/*\n *\
    \ MatchedSlot contains slot-related information such as the slot that was matched,\
    \ the original value that was used to match on, and the value that was matched.\n\
    \ */\npublic class MatchedSlot {\n    /** The slot that was matched. */\n    private\
    \ Slot slot;\n    /** The original value that was used to match on. */\n    private\
    \ String originalValue;\n    /** The value that was matched. */\n    private Object\
    \ matchedValue;\n\n    public MatchedSlot(Slot slot, String originalValue, Object\
    \ value) {\n        this.slot = slot;\n        this.originalValue = originalValue;\n\
    \        this.setMatchedValue(value);\n    }\n\n    /**\n     * Returns the slot\
    \ that was matched.\n     */\n    public Slot getSlot() {\n        return slot;\n\
    \    }\n\n    /** Returns the original value.\n     */\n    public String getOriginalValue()\
    \ {\n        return originalValue;\n    }\n\n    /*\n     * Returns the matched\
    \ value.\n     */\n    public Object getMatchedValue() {\n        return matchedValue;\n\
    \    }\n\n    /*\n     * Sets the matched value in the constructor. The method\
    \ is declared as private as the value is only set in constructor.\n     */\n \
    \   private void setMatchedValue(Object matchedValue) {\n        this.matchedValue\
    \ = matchedValue;\n    }\n}\n```\n\nWe defined `Slot`, `Slots`, and `MatchedSlot`\
    \ so far under the `com.iris.bot.slot` package. Now let’s see how a custom slot\
    \ matcher is defined. `CustomSlotMatcher` is invoked in `IntentMatcherService`\
    \ to get the slot match information once an intent is obtained from the intent\
    \ classification service:\n\n```java\n/*\n * The CustomSlotMatcher class is used\
    \ to iterate on all the slots for the matched intent and execute a match method\
    \ of each of those slots to return all the matched slots. This class can be further\
    \ customized and designed to have multiple types of slot matcher implementation.\n\
    \ */\npublic class CustomSlotMatcher {\n    /*\n     * The match method takes\
    \ session, intent, and user utterance as an input and returns a map of Slot and\
    \ MatchedSlot details.\n     * This method can further contain business logic\
    \ depending upon the implementation.\n     */\n    public HashMap match(Session\
    \ session, Intent intent, String utterance) {\n        HashMap matchedSlots =\
    \ new HashMap();\n        // Iterate intent to get all slots defined for this\
    \ matched intent.\n        for (Slot slot : intent.getSlots()) {\n           \
    \ /*\n             * Use case-specific business logic handling. askQuoteLastQuestion\
    \ is a session variable, and its logic will be explained when we discuss state\
    \ machines and conversation flow management.\n             */\n            String\
    \ slotCheck = String.valueOf(session.getAttribute(\"askQuoteLastQuestion\"));\n\
    \            if (slot.getName().equalsIgnoreCase(slotCheck) || slotCheck.equalsIgnoreCase(\"\
    null\")) {\n                // The match method defined in each slot is executed,\
    \ and MatchedSlot is returned.\n                MatchedSlot match = slot.match(utterance);\n\
    \                if (match != null && match.getMatchedValue() != \"null\") {\n\
    \                    matchedSlots.put(slot, match);\n                }\n     \
    \       }\n        }\n        return matchedSlots;\n    }\n}\n```\n\nWe have so\
    \ far covered how intent- and slot-related classes can be defined for IRIS. We\
    \ briefly discussed how IRIS memory is managed by session attributes. Let’s go\
    \ through this in some more detail.\n\n## IRIS Memory\n\nA conversational chatbot\
    \ needs to hold certain information to be able to closely mimic human-like responses.\
    \ IRIS is designed to hold information in memory through sessions.\n\n### Long-\
    \ and Short-Term Sessions\n\n`Session` contains two types of attributes:\n\n*\
    \   Long-term attributes\n*   Short-term attributes\n\n#### Long-Term Attributes\n\
    \nCertain entities such as name, date of birth, and gender of the user are information\
    \ that does not change over time. Also, in the real world, we don’t expect our\
    \ advisors and agents to ask these details every time we interact with them. In\
    \ the current design of IRIS, what we have demonstrated is that not all attributes\
    \ are reset after the user session. The long-term attributes that span sessions\
    \ are supposed to be held in a fast, reliable, and persistent storage databases\
    \ such as Redis. Redis is an in-memory database. In the code snippet that follows,\
    \ we show this using a `HashMap`. Information in `HashMap`s are stored in JVM\
    \ when the application is running and get cleared when the application goes down.\
    \ Hence, even though they are long-term attributes, unless we persist them in\
    \ a permanent storage like SQL databases, we can’t retrieve them again.\n\n####\
    \ Short-Term Attributes\n\nUnlike name and gender, certain attributes are limited\
    \ to the scope of the user session. In most cases, the expectation is that the\
    \ values will vary in each session. An example is a user providing a ZIP code\
    \ when asking for an insurance agent nearby or providing a face amount for a life\
    \ insurance eligibility quotation. Moreover, to manage the conversation flow,\
    \ certain values such as current intent, state, and last question asked are stored\
    \ as short-term attributes. Short-term attributes reset with each new session\
    \ or if a session expires."
  raw: '### Matched Intent Class


    The last thing that we need to include in the `com.iris.bot.intent` package is
    a `MatchedIntent` class . It holds the intent that was matched, a map of slots
    that were matched against the defined slots for the intent, and the utterance
    against which they were matched.


    ```

    public class MatchedIntent {

    /** The intent that was matched. */

    private Intent intent;

    /** Map of slots that were matched. */

    private HashMap slotMatches;

    /** The utterance that was matched against. */

    private String utterance;

    /**

    * Constructor.

    *

    * @param intent

    *            The intent that was matched.

    * @param slotMatches

    *            The slots that were matched.

    * @param utterance

    *            The utterance that was matched against.

    */

    public MatchedIntent(Intent intent, HashMap slotMatches, String utterance) {

    this.intent = intent;

    this.slotMatches = slotMatches;

    this.utterance = utterance;

    }

    /**

    * Returns the Intent that was matched.

    */

    public Intent getIntent() {

    return intent;

    }

    /**

    * Returns the slots that were matched.

    */

    public Map getSlotMatches() {

    return Collections.unmodifiableMap(slotMatches);

    }

    /**

    * Returns the specified slot match if the slot was matched.

    *

    * @param slotName

    *            The name of the slot to return.

    * @return The slot match or null if the slot was not matched.

    */

    public MatchedSlot getSlotMatch(String slotName) {

    for (MatchedSlot match : slotMatches.values()) {

    if (match.getSlot().getName().equalsIgnoreCase(slotName)) {

    return match;

    }

    }

    return null;

    }

    /**

    * Returns the utterance that was matched against.

    *

    * @return The utterance that was matched against.

    */

    public String getUtterance() {

    return utterance;

    }

    }

    ```


    ### Slot Class


    We covered intent, intent matcher service, and matched intents so far. Designing
    classes of slots is similar to intents. We define slot-related classes in the
    `com.iris.bot.slot` package:


    ```

    /*

    * Slot is defined as an abstract class. The concrete class of Slot implements
    a match method that contain the entity recognition logic.

    getName returns the slot name that is described in concrete slot classes.

    */

    public abstract class Slot {

    public abstract MatchedSlot match(String utteranceToken);

    public abstract String getName();

    }

    ```


    With `Slot` defined, we create slots for the intent. `Slots` is an attribute specified
    in the `Intent` class and slot details are provided in the IRIS configuration.


    ```

    /** The slots for the intent.

    * There could be 0 or more slots defined for each intent.

    * Slots contain a list of Slot and methods to add and get Slot  */

    public class Slots {

    /** The map of slots. */

    private HashMap slots = new HashMap();

    /**

    * Adds a slot to the map.

    */

    public void add(Slot slot) {

    slots.put(slot.getName().toLowerCase(), slot);

    }

    /**

    * Gets the specified slot from the map.

    */

    public Slot getSlot(String name) {

    return slots.get(name.toLowerCase());

    }

    /**

    * Returns the slots in the map.

    */

    public Collection getSlots() {

    return Collections.unmodifiableCollection(slots.values());

    }

    }

    ```


    Similarly to `MatchedIntent` class, we create the `MatchedSlot` class to hold
    the details of the slots that were matched:


    ```

    /*

    * MatchedSlot contains slot-related information such as the slot that was matched,
    the original value that was was used to match on, and the value that was matched.

    */

    public class MatchedSlot {

    /** The slot that was matched. */

    private Slot slot;

    /** The original value that was used to match on. */

    private String originalValue;

    /** The value that was matched. */

    private Object matched value;

    public MatchedSlot(Slot slot, String originalValue, Object value) {

    this.slot = slot;

    this.originalValue = originalValue;

    this.setMatchedValue(value);

    }

    /**

    * Returns the slot that was matched.

    */

    public Slot getSlot() {

    return slot;

    }

    /** Returns the original value.

    */

    public String getOriginalValue() {

    return originalValue;

    }

    /*

    * Returns the matched value.

    */

    public Object getMatchedValue() {

    return matched value;

    }

    /*

    * Sets the matched value in the constructor. The method is declared as private
    as the value is only set in constructor.

    */

    private void setMatchedValue(Object matchedValue) {

    this.matchedValue = matchedValue;

    }

    }

    ```


    We defined `Slot`, `Slots`, and `MatchedSlot` so far under the `com.iris.bot.slot`
    package. Now let’s see how a custom slot matcher is defined. `CustomSlotMatcher`
    is invoked in `IntentMatcherService` to get the slot match information once an
    intent is obtained from the intent classification service:


    ```

    /*

    * The CustomSlotMatcher class is used to iterate on all the slots for the matched
    intent and execute a match method of each of those slots to return all the matched
    slots. This class can be further customized and designed to have multiple types
    of slot matcher implementation.

    */

    public class CustomSlotMatcher {

    /*

    * The match method takes session, intent, and user utterance as an input and returns
    a map of Slot and MatchedSlot details.

    * This method can further contain business logic depending upon the implementation.

    */

    public HashMap match(Session session, Intent intent, String utterance) {

    HashMap matchedSlots = new HashMap();

    // Iterate intent to get all slots defined for this matched intent.

    for (Slot slot : intent.getSlots()) {

    /*

    * Use case-specific business logic handling. askQuoteLastQuestion is a session
    variable, and its logic will be explained when we discuss state machines and conversation
    flow management.

    */

    String slotCheck = String.valueOf(session.getAttribute("askQuoteLastQuestion"));

    if (slot.getName().equalsIgnoreCase(slotCheck) || slotCheck.equalsIgnoreCase("null"))
    {

    // The match method defined in each slot is executed, and MatchedSlot is returned.

    MatchedSlot match = slot.match(utterance);

    if (match != null && match.getMatchedValue() != "null") {

    matchedSlots.put(slot, match);

    }

    }

    }

    return matchedSlots;

    }

    }

    ```


    We have so far covered how intent- and slot-related classes can be defined for
    IRIS. We briefly discussed how IRIS memory is managed by session attributes. Let’s
    go through this in some more detail.


    ## IRIS Memory


    A conversational chatbot needs to hold certain information to be able to closely
    mimic human-like responses. IRIS is designed to hold information in memory through
    sessions.


    ### Long- and Short-Term Sessions


    `Session` contains two types of attributes:


    *   Long-term attributes


    *   Short-term attributes


    #### Long-Term Attributes


    Certain entities such as name, date of birth, and gender of the user are information
    that does not change over time. Also, in the real world, we don’t expect our advisors
    and agents to ask these details every time we interact with them. In the current
    design of IRIS, what we have demonstrated is that not all attributes are reset
    after the user session. The long-term attributes that span sessions are supposed
    to be held in a fast, reliable, and persistent storage databases such as Redis.
    Redis is an in-memory database. In the code snippet that follows, we show this
    using a HashMap. Information in HashMaps are stored in JVM when the application
    is running and get cleared when the application goes down. Hence, even though
    they are long-term attributes, unless we persist them in a permanent storage like
    SQL databases, we can’t retrieve them again.


    #### Short-Term Attributes


    Unlike name and gender, certain attributes are limited to the scope of the user
    session. In most cases, the expectation is that the values will vary in each session.
    An example is a user providing a ZIP code when asking for an insurance agent nearby
    or providing a face amount for a life insurance eligibility quotation. Moreover,
    to manage the conversation flow, certain values such as current intent, state,
    and last question asked are stored as short-term attributes. Short-term attributes
    reset with each new session or if a session expires.'
