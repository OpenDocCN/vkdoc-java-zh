- fmt: '### Adding State Transitions


    In the `getStateMachine` method of the `IrisConfiguration` class, we define the
    transitions from one state to another. For example, we can transition to any state
    from a start state, as explained in the following snippet. The first argument
    of the `addTransition` method is the intent name, the second argument is the current
    state, the third argument is the target state, and the fourth argument is an optional
    shield.


    In this example, since we are defining transitions from `startState` and `fromState`,
    all transitions will be `startState`.


    ```

    /*

    * This transition says that if we are in the start state, and a generalQueryIntent
    is obtained,

    * we remain in the generalQueryState (and trigger execute method of this state).

    */

    stateMachine.addTransition("generalQueryIntent", startState, generalQueryState);

    /*

    * This transition says that if we are in the start state, and an askForQuoteIntent
    intent is obtained,

    * we change to the target state which is getQuoteState if the shield conditions
    are validated.

    * Else we check the next transition condition.

    */

    stateMachine.addTransition("askForQuoteIntent", startState, getQuoteState, haveQuoteDetailShield);

    /*

    * If the shield conditions are not validated for the askForQuoteIntent, it means
    that we do not have all the information

    * for switching to getQuoteState, which provides quote details. Hence, in that
    case, we switch to askforQuoteState without the need

    * of a shield.

    */

    stateMachine.addTransition("askForQuoteIntent", startState, askforQuoteState);

    stateMachine.addTransition("findAdvisorIntent", startState, findAdvisorState);

    stateMachine.addTransition("stockPriceIntent", startState, stockPriceState);

    stateMachine.addTransition("marketTrendIntent", startState, marketTrendState);

    /*

    * If we are in the start state and the user intends to get an account balance,
    we validate with a shield if we have an account type

    * and ipin details to switch to getAccountBalanceState and trigger its execute
    method.

    */

    stateMachine.addTransition("accountBalanceIntent", startState, getAccountBalanceState,
    haveAccTypeShield);

    /*

    * Otherwise, if shield does not validate, it means we do not have all the details
    and hence we switch to getAccTypeState

    * to get all the details.

    */

    stateMachine.addTransition("accountBalanceIntent", startState, getAccTypeState);

    stateMachine.addTransition("weatherIntent", startState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", startState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", startState, getClaimIdState);

    ```


    Similarly, we can define state transitions from the `findAdvisor` state:


    ```

    stateMachine.addTransition("exitIntent", findAdvisorState, exitState);

    stateMachine.addTransition("marketTrendIntent", findAdvisorState, marketTrendState);

    stateMachine.addTransition("findAdvisorIntent", findAdvisorState, findAdvisorState);

    stateMachine.addTransition("askForQuoteIntent", findAdvisorState, askforQuoteState);

    stateMachine.addTransition("generalQueryIntent", findAdvisorState, generalQueryState);

    stateMachine.addTransition("weatherIntent", findAdvisorState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", findAdvisorState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", findAdvisorState, getClaimIdState);

    stateMachine.addTransition("accountBalanceIntent", findAdvisorState, getAccountBalanceState,
    haveAccTypeShield);

    stateMachine.addTransition("accountBalanceIntent", findAdvisorState, getAccTypeState);

    stateMachine.addTransition("stockPriceIntent", findAdvisorState, stockPriceState);

    ```


    Let’s see what the state transitions from `GetAccountBalance` state are:


    ```

    stateMachine.addTransition("accountBalanceIntent", getAccountBalanceState, getAccountBalanceState,
    haveAccTypeShield);

    stateMachine.addTransition("accountBalanceIntent", getAccountBalanceState, getAccTypeState);

    stateMachine.addTransition("askForQuoteIntent", getAccountBalanceState, askforQuoteState);

    stateMachine.addTransition("marketTrendIntent", getAccountBalanceState, marketTrendState);

    stateMachine.addTransition("findAdvisorIntent", getAccountBalanceState, findAdvisorState);

    stateMachine.addTransition("stockPriceIntent", getAccountBalanceState, stockPriceState);

    stateMachine.addTransition("weatherIntent", getAccountBalanceState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", getAccountBalanceState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", getAccountBalanceState, getClaimIdState);

    ```


    Similarly, we can create transitions for other states.


    However, note that there is a difference in state transitions defined by `GetAccountBalanceState`
    and `FindAdvisorState`. You can go to `GeneralQueryState` from `FindAdvisorState`
    but not from `GetAccountBalanceState`. This is where we define which transitions
    are possible from each state. In the example here, we don’t want users to be asking
    general questions after they ask for account balance details.


    A better explanation of this is when the user wants to know his account balance.
    IRIS will prompt the user on whether he/she wants to know the retirement account
    balance or annuities account balance and should be expecting a response like one
    of the following:


    - I am looking for a retirement account balance

    - Retirement

    - 401k balance

    - Annuities balance

    - Want to know 401k account balance

    - 401k

    - annuities


    Now, in responses to “annuities” or “401k,” it is difficult to understand whether
    the intent is to respond to the question asked or if the user switched the context
    and is asking something very general that can be searched by IRIS in its knowledge
    base. For example, a user can also respond with something like:


    - What’s the weather in Dublin

    - My claim ID is abc123 can you tell the claim status

    - Insurance

    - 401k

    - Retirement funds


    Now, contextually, it is difficult to differentiate between a general query search
    vs. a response to an account type. Here, we can decide that we will not allow
    a transition to `GeneralQueryState`.


    Another question is how to understand if it is a general query ask. A general
    query is never an intent. If no other intent, such as asking for weather details,
    stock price, market trend, claim status, etc., is applicable and the intent classification
    engine is not able to classify the user utterance into any of these intent categories
    with high probability, we by default switch it to a general query.


    At this stage, we are done with implementing the `IrisConfiguration` class, and
    we have defined intents, matchers, slot, slot types, states, different state transitions,
    and shields in this class.'
  raw: '#### Adding State Transitions


    In the `getStateMachine` method of the `IrisConfiguration` class, we define the
    transitions from one state to another. For example, we can transition to any state
    from a start state, as explained in the following snippet. The first argument
    of the `addTransition` method is the intent name, the second argument is the current
    state, the third argument is the target state, and the fourth argument is an optional
    shield.


    In this example, since we are defining transitions from `startState` and `fromState`,
    all transitions will be `startState`.


    ```

    /*

    * This transition says that if we are in the start state, and a generalQueryIntent
    is obtained,

    * we remain in the generalQueryState (and trigger execute method of this state).

    */

    stateMachine.addTransition("generalQueryIntent", startState, generalQueryState);

    /*

    * This transition says that if we are in the start state, and an askForQuoteIntent
    intent is obtained,

    * we change to the target state which is getQuoteState if the shield conditions
    are validated.

    * Else we check the next transition condition.

    */

    stateMachine.addTransition("askForQuoteIntent", startState, getQuoteState, haveQuoteDetailShield);

    /*

    * If the shield conditions are not validated for the askForQuoteIntent, it means
    that we do not have all the information

    * for switching to getQuoteState, which provides quote details. Hence, in that
    case, we switch to askforQuoteState without the need

    * of a shield.

    */

    stateMachine.addTransition("askForQuoteIntent", startState, askforQuoteState);

    stateMachine.addTransition("findAdvisorIntent", startState, findAdvisorState);

    stateMachine.addTransition("stockPriceIntent", startState, stockPriceState);

    stateMachine.addTransition("marketTrendIntent", startState, marketTrendState);

    /*

    * If we are in the start state and the user intends to get an account balance,
    we validate with a shield if we have an account type

    * and ipin details to switch to getAccountBalanceState and trigger its execute
    method.

    */

    stateMachine.addTransition("accountBalanceIntent", startState, getAccountBalanceState,
    haveAccTypeShield);

    /*

    * Otherwise, if shield does not validate, it means we do not have all the details
    and hence we switch to getAccTypeState

    * to get all the details.

    */

    stateMachine.addTransition("accountBalanceIntent", startState, getAccTypeState);

    stateMachine.addTransition("weatherIntent", startState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", startState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", startState, getClaimIdState);

    ```


    Similarly, we can define state transitions from the `findAdvisor` state :


    ```

    stateMachine.addTransition("exitIntent", findAdvisorState, exitState);

    stateMachine.addTransition("marketTrendIntent", findAdvisorState, marketTrendState);

    stateMachine.addTransition("findAdvisorIntent", findAdvisorState, findAdvisorState);

    stateMachine.addTransition("askForQuoteIntent", findAdvisorState, askforQuoteState);

    stateMachine.addTransition("generalQueryIntent", findAdvisorState, generalQueryState);

    stateMachine.addTransition("weatherIntent", findAdvisorState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", findAdvisorState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", findAdvisorState, getClaimIdState);

    stateMachine.addTransition("accountBalanceIntent", findAdvisorState, getAccountBalanceState,
    haveAccTypeShield);

    stateMachine.addTransition("accountBalanceIntent", findAdvisorState, getAccTypeState);

    stateMachine.addTransition("stockPriceIntent", findAdvisorState, stockPriceState);

    ```


    Let’s see what the state transitions from `GetAccountBalance` state are:


    ```

    stateMachine.addTransition("accountBalanceIntent", getAccountBalanceState, getAccountBalanceState,
    haveAccTypeShield);

    stateMachine.addTransition("accountBalanceIntent", getAccountBalanceState, getAccTypeState);

    stateMachine.addTransition("askForQuoteIntent", getAccountBalanceState, askforQuoteState);

    stateMachine.addTransition("marketTrendIntent", getAccountBalanceState, marketTrendState);

    stateMachine.addTransition("findAdvisorIntent", getAccountBalanceState, findAdvisorState);

    stateMachine.addTransition("stockPriceIntent", getAccountBalanceState, stockPriceState);

    stateMachine.addTransition("weatherIntent", getAccountBalanceState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", getAccountBalanceState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", getAccountBalanceState, getClaimIdState);

    ```


    Similarly, we can create transitions for other states.


    However, note that there is a difference in state transitions defined by `GetAccountBalanceState`
    and `FindAdvisorState`*.* You can go to `GeneralQueryState` from `FindAdvisorState`
    but not from `GetAccountBalanceState`*.* This is where we define which transitions
    are possible from each state. In the example here, we don’t want users to be asking
    general questions after they ask for account balance details.


    A better explanation of this is when the user wants to know his account balance.
    IRIS will prompt the user on whether he/she wants to know the retirement account
    balance or annuities account balance and should be expecting a response like one
    of the following:


    *   *I am looking for a retirement account balance*


    *   *Retirement*


    *   *401k balance*


    *   *Annuities balance*


    *   *Want to know 401k account balance*


    *   *401k*


    *   *annuities*


    Now, in responses to “annuities” or “401k,” it is difficult to understand whether
    the intent is to respond to the question asked or if the user switched the context
    and is asking something very general that can be searched by IRIS in its knowledge
    base. For example, a user can also respond with something like


    *   *What’s the weather in Dublin*


    *   *My claim ID is abc123 can you tell the claim status*


    *   *Insurance*


    *   *401k*


    *   *Retirement funds*


    Now, contextually, it is difficult to differentiate between a general query search
    vs. a response to an account type. Here, we can decide that we will not allow
    a transition to `GeneralQueryState`.


    Another question is how to understand if it is a general query ask. A general
    query is never an intent. If no other intent, such as asking for weather details,
    stock price, market trend, claim status, etc., is applicable and the intent classification
    engine is not able to classify the user utterance into any of these intent categories
    with high probability, we by default switch it to a general query.


    At this stage, we are done with implementing the `IrisConfiguration` class, and
    we have defined intents, matchers, slot, slot types, states, different state transitions,
    and shields in this class.'
  trans: '

    #### 添加状态转换


    在 `IrisConfiguration` 类的 `getStateMachine` 方法中，我们定义了从一个状态到另一个状态的转换。例如，我们可以从起始状态转换到任何状态，如下面的代码片段所示。`addTransition`
    方法的第一个参数是意图名称，第二个参数是当前状态，第三个参数是目标状态，第四个参数是一个可选的防护条件。


    在这个例子中，由于我们正在定义从 `startState` 和 `fromState` 开始的转换，所有转换都将以 `startState` 为起点。


    ```

    /*

    * 此转换表示：如果我们处于起始状态，并且获取到了 generalQueryIntent，

    * 我们将保持在 generalQueryState（并触发该状态的 execute 方法）。

    */

    stateMachine.addTransition("generalQueryIntent", startState, generalQueryState);

    /*

    * 此转换表示：如果我们处于起始状态，并且获取到了 askForQuoteIntent，

    * 如果防护条件验证通过，我们将转换到目标状态 getQuoteState。

    * 否则，我们将检查下一个转换条件。

    */

    stateMachine.addTransition("askForQuoteIntent", startState, getQuoteState, haveQuoteDetailShield);

    /*

    * 如果 askForQuoteIntent 的防护条件未验证通过，这意味着我们尚未拥有

    * 切换到 getQuoteState（提供报价详情）所需的全部信息。因此，在这种情况下，

    * 我们无需防护条件即可切换到 askforQuoteState。

    */

    stateMachine.addTransition("askForQuoteIntent", startState, askforQuoteState);

    stateMachine.addTransition("findAdvisorIntent", startState, findAdvisorState);

    stateMachine.addTransition("stockPriceIntent", startState, stockPriceState);

    stateMachine.addTransition("marketTrendIntent", startState, marketTrendState);

    /*

    * 如果我们处于起始状态，并且用户意图获取账户余额，我们将使用防护条件验证

    * 是否拥有账户类型和 IPIN 详细信息，以切换到 getAccountBalanceState 并触发其 execute 方法。

    */

    stateMachine.addTransition("accountBalanceIntent", startState, getAccountBalanceState,
    haveAccTypeShield);

    /*

    * 否则，如果防护条件未验证通过，意味着我们没有所有详细信息，因此我们切换到 getAccTypeState

    * 以获取所有详细信息。

    */

    stateMachine.addTransition("accountBalanceIntent", startState, getAccTypeState);

    stateMachine.addTransition("weatherIntent", startState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", startState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", startState, getClaimIdState);

    ```


    类似地，我们可以定义从 `findAdvisor` 状态出发的状态转换：


    ```

    stateMachine.addTransition("exitIntent", findAdvisorState, exitState);

    stateMachine.addTransition("marketTrendIntent", findAdvisorState, marketTrendState);

    stateMachine.addTransition("findAdvisorIntent", findAdvisorState, findAdvisorState);

    stateMachine.addTransition("askForQuoteIntent", findAdvisorState, askforQuoteState);

    stateMachine.addTransition("generalQueryIntent", findAdvisorState, generalQueryState);

    stateMachine.addTransition("weatherIntent", findAdvisorState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", findAdvisorState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", findAdvisorState, getClaimIdState);

    stateMachine.addTransition("accountBalanceIntent", findAdvisorState, getAccountBalanceState,
    haveAccTypeShield);

    stateMachine.addTransition("accountBalanceIntent", findAdvisorState, getAccTypeState);

    stateMachine.addTransition("stockPriceIntent", findAdvisorState, stockPriceState);

    ```


    让我们看看从 `GetAccountBalance` 状态出发的状态转换是怎样的：


    ```

    stateMachine.addTransition("accountBalanceIntent", getAccountBalanceState, getAccountBalanceState,
    haveAccTypeShield);

    stateMachine.addTransition("accountBalanceIntent", getAccountBalanceState, getAccTypeState);

    stateMachine.addTransition("askForQuoteIntent", getAccountBalanceState, askforQuoteState);

    stateMachine.addTransition("marketTrendIntent", getAccountBalanceState, marketTrendState);

    stateMachine.addTransition("findAdvisorIntent", getAccountBalanceState, findAdvisorState);

    stateMachine.addTransition("stockPriceIntent", getAccountBalanceState, stockPriceState);

    stateMachine.addTransition("weatherIntent", getAccountBalanceState, getWeatherState);

    stateMachine.addTransition("claimStatusIntent", getAccountBalanceState, getClaimStatusState,
    haveClaimIdShield);

    stateMachine.addTransition("claimStatusIntent", getAccountBalanceState, getClaimIdState);

    ```


    类似地，我们可以为其他状态创建转换。


    但是，请注意 `GetAccountBalanceState` 和 `FindAdvisorState` 定义的状态转换存在差异。你可以从 `FindAdvisorState`
    进入 `GeneralQueryState`，但不能从 `GetAccountBalanceState` 进入。这就是我们定义每个状态允许哪些转换的地方。在此示例中，我们不希望用户在询问账户余额详情后提出一般性问题。


    对此更好的解释是：当用户想知道其账户余额时，IRIS 会提示用户是想了解退休账户余额还是年金账户余额，并且应该期望得到如下之一的回复：


    *   *我正在查找退休账户余额*

    *   *退休*

    *   *401k 余额*

    *   *年金余额*

    *   *想知道 401k 账户余额*

    *   *401k*

    *   *年金*


    现在，对于“年金”或“401k”的回复，很难理解用户的意图是回答所问的问题，还是用户切换了上下文，正在询问一些非常通用、可以由 IRIS 在其知识库中搜索的问题。例如，用户也可能回复如下内容：


    *   *都柏林的天气怎么样*

    *   *我的索赔 ID 是 abc123，你能告诉我索赔状态吗*

    *   *保险*

    *   *401k*

    *   *退休基金*


    现在，从上下文来看，很难区分一般性查询搜索与对账户类型的回复。在这里，我们可以决定不允许转换到 `GeneralQueryState`。


    另一个问题是如何理解这是否是一般性查询。一般性查询从来不是一个意图。如果没有其他意图（例如询问天气详情、股票价格、市场趋势、索赔状态等）适用，并且意图分类引擎无法以高概率将用户话语分类到这些意图类别中，我们默认将其切换为一般性查询。


    至此，我们已经完成了 `IrisConfiguration` 类的实现，并在该类中定义了意图、匹配器、槽位、槽位类型、状态、不同的状态转换以及防护条件。

