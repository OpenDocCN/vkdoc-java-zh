    ## Information Extraction Using OpenIE


    The Open Information Extractor (OpenIE) annotator extracts open-domain relation
    triples representing subject, predicate, and object, often called a triplet. OpenIE
    can be a useful tool when there is minimal training data available.


    There is no stable implementation of OpenIE in Python. In order to use OpenIE
    provided by CoreNLP library, download CoreNLP and from the command line, type
    `cd` into the CoreNLP directory. Then run the following command. Note that this
    process requires the right amount of RAM. In the following code, we set 2GB RAM
    for running this process. Otherwise, the JVM might throw an out of memory error.


    ```

    java -mx2g -cp "*" edu.stanford.nlp.naturalli.OpenIE

    ```


    Once the above command runs, it takes one sentence as input. Provide a sentence
    of your choice. To reproduce the same result as shown in Table [5-3](#478492_1_En_5_Chapter.xhtml#Tab3),
    use the following example sentence:


    ```

    Narendra Modi is an Indian politician serving as the 14th and current Prime Minister
    of India since 2014

    ```


    Table [5-4](#478492_1_En_5_Chapter.xhtml#Tab4) shows the possible triplets from
    the given sentence. At first, many triplets may look the same. On careful examination,
    you can see that all the objects are all unique using the subject “Narendra Modi”
    or “Modi” and predicate or the relation “is.”


