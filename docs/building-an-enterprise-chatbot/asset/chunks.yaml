    \ helps to navigate the dependency tree. It also provides the capability to detect\
    \ sentence boundaries and iterate through the noun phrase or chunks. In the following\
    \ example, the `noun_chunks` method in the model is iteratable with the following\
    \ methods:\n\n- `text`: Original noun chunk\n- `root.text`: Original word connecting\
    \ the noun chunk to the rest of the noun chunk parse\n- `root.dep`: Dependency\
    \ relation connecting the root to its head\n- `root.head`: Root token’s head\n\
    \nFrom the example, “My English Bulldog” is a noun phrase, where “Bulldog” is\
    \ root text with “nsubj” relation and “had” as its root head.\n\n```\n# Dependency\
