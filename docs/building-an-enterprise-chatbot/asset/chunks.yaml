    #### 使用预训练模型执行开箱即用任务


    gensim 的实用特性之一，是它通过 gensim-data 提供了多个预训练的词向量。除了 Word2Vec，它还提供了 GloVe，这是另一种用于寻找词向量的强大无监督学习算法。以下代码从
    gensim-data 下载一个 `glove-wiki-gigaword-100` 词向量，并执行一些开箱即用的任务。


    **步骤 1：** 使用 `gensim.downloader` 模块下载一个预训练的 GloVe 词向量：


    ```

    import gensim.downloader as api

    word_vectors = api.load("glove-wiki-gigaword-100")

    ```


    **步骤 2：** 计算最近邻。如你所见，词向量包含一组代表单词的数字数组。现在，对向量进行数学计算成为可能。例如，我们可以计算任意两个词向量之间的欧几里得距离或余弦相似度。由此我们得到了一些有趣的结果。以下代码展示了部分结果。


    图 5-14 展示了一个示例，说明了如何通过移动大小为 2 的窗口来创建用于训练神经网络的数据。在下面的例子中，你会看到互联网上的“apple”不再是水果；它已成为苹果公司的代名词，并且当我们计算与“apple”相似的词时，会显示出许多类似的公司。产生这种相似性的原因在于训练所用的词汇表，本例中是一个包含近
    60 亿个未大小写标记的维基百科转储文件。更多此类预训练模型可在 [`https://github.com/RaRe-Technologies/gensim-data`](https://github.com/RaRe-Technologies/gensim-data)
    获取。


    在第二个例子中，当我们寻找与“orange”相似的词时，得到了对应颜色的词，如红色、蓝色、紫色，以及像柠檬这样的水果，它是一种像橙子一样的柑橘类水果。这种关系对人类来说很容易理解。然而，Word2Vec
    模型能够破解它，这令人兴奋。


    ```

    result = word_vectors.most_similar(''apple'')

    print(result)

    [(''microsoft'', 0.7449405789375305), (''ibm'', 0.6821643114089966), (''intel'',
    0.6778088212013245), (''software'', 0.6775422096252441), (''dell'', 0.6741442680358887),
    (''pc'', 0.6678153276443481), (''macintosh'', 0.66175377368927), (''iphone'',
    0.6595611572265625), (''ipod'', 0.6534676551818848), (''hewlett'', 0.6516579389572144)]

    result = word_vectors.most_similar(''orange'')

    print(result)

    [(''yellow'', 0.7358633279800415), (''red'', 0.7140780687332153), (''blue'', 0.7118035554885864),
    (''green'', 0.7111418843269348), (''pink'', 0.6775072813034058), (''purple'',
    0.6774232387542725), (''black'', 0.6709616184234619), (''colored'', 0.665260910987854),
    (''lemon'', 0.6251963376998901), (''peach'', 0.616862416267395)]

    ```


    **步骤 3：** 识别线性子结构。使用相似度或距离度量很容易计算两个词的相关性，而要以更定性的方式捕捉词对或句子中的细微差别，我们需要进行操作。让我们看看
    gensim 包为实现此任务提供的方法。


    ##### 词对相似度


    在下面的例子中，我们计算一个词对之间的相似度。例如，词对 [‘sushi’, ‘shop’] 与词对 [‘japanese’, ‘restaurant’]
    的相似度高于与 [‘Indian’, ‘restaurant’] 的相似度。


    ```

    sim = word_vectors.n_similarity([''sushi'', ''shop''], [''indian'', ''restaurant''])

    print("{:.4f}".format(sim))

    0.6438

    sim = word_vectors.n_similarity([''sushi'', ''shop''], [''japanese'', ''restaurant''])

    print("{:.4f}".format(sim))

    0.7067

    ```


    ##### 句子相似度


    我们还可以计算两个句子之间的距离或相似度。gensim 提供了一种称为词移距离（Word Mover’s distance）的距离度量，它已被证明是找出包含多个句子的两个文档之间相似度的有用工具。距离越小，两个文档越相似。词移距离在底层使用
    Word2Vec 模型生成的词嵌入，首先理解查询句子（或文档）的概念，然后找出所有相似的句子或文档。例如，当我们计算两个不相关句子之间的词移距离时，与比较两个上下文相关的句子相比，距离会更高。


    在第一个例子中，sentence_one 谈论的是印度烹饪艺术的多样性，而 sentence_two 具体谈论的是德里的食物。在第二个例子中，sentence_one
    和 sentence_two 不相关，因此我们得到的词移距离比第一个例子更高。


    ```

    sentence_one = ''India is a diverse country with many culinary art''.lower().split()

    sentence_two = ''Delhi offers many authentic food''.lower().split()

    similarity = word_vectors.wmdistance(sentence_one, sentence_two)

    print("{:.4f}".format(similarity))

    4.8563

    sentence_one = ''India is a diverse country with many culinary art''.lower().split()

    sentence_two = ''The all-new Apple TV app, which brings together all the ways
    to watch TV into one app''.lower().split()

    similarity = word_vectors.wmdistance(sentence_one, sentence_two)

    print("{:.4f}".format(similarity))

    5.2379

    ```


    ##### 算术运算


    更令人印象深刻的是，能够对词向量执行加法和减法等算术运算，从而通过运算获得某种形式的线性子结构。在第一个例子中，我们计算 *woman + king – man*，与该运算最相似的词是
    *queen*。其基本概念是，man 和 woman 是性别，这可以由其他词如 queen 和 king 等价地指定。因此，当我们从 woman 和 king
    的加法中减去 man 时，得到的词是 queen。GloVe 词表示在 [`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/)
    提供了一些示例。


    类似地，该模型擅长捕捉语言和国家等概念。例如，当我们把 French 和 Italian 相加时，得到 Spanish，这是一种在邻近国家西班牙使用的语言。


    ```

    result = word_vectors.most_similar(positive=[''woman'', ''king''], negative=[''man''])

    print("{}: {:.4f}".format(*result[0]))

    queen: 0.7699

    result = word_vectors.most_similar(positive=[''french'', ''italian''])

    print("{}: {:.4f}".format(*result[0]))

    spanish: 0.8312

    result = word_vectors.most_similar(positive=[''france'', ''italy''])

    print("{}: {:.4f}".format(*result[0]))

    spain: 0.8260

    ```


    ##### 找出异常词


    该模型能够适应在给定的单词序列中找出不符合语境的词。其工作方式是，`doesnt_match` 方法通过计算给定单词列表中所有词向量的均值来确定中心点，然后找出与中心点的余弦距离。余弦距离最大的词被返回为不适合该列表的异常词。


    在以下两个例子中，模型能够从国家列表中找出食物 pizza 作为异常词。类似地，在第二个例子中，模型从所有美国总统的列表中找出了印度总理莫迪。


    ```

    print(word_vectors.doesnt_match("india spain italy pizza".split()))

    pizza

    print(word_vectors.doesnt_match("obama trump bush modi".split()))

    modi

    ```


    像 Word2Vec 和 GloVe 这样的语言模型在生成词与词之间有意义的关联方面非常强大，这对人类来说很自然，因为我们理解语言。对于机器来说，能够以这种智能水平理解单词在各种句法和语义形式中的使用，是一项了不起的成就。

