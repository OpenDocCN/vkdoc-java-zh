    \ of a verb phrase, which is a noun phrase, like (`got`, `him`) and (`had`, `allergies`)\
    \ and object of a preposition (`pobj`) like (`at`, `age`). A detailed explanation\
    \ of the relationships in a dependency tree can be found here: [`https://nlp.stanford.edu/software/dependencies_manual.pdf`](https://nlp.stanford.edu/software/dependencies_manual.pdf).\n\
    \n### Chunking\n\nspaCy provides an easy-to-use retrieval of chunk information\
    \ such as `VERB` and `NOUN` from a given text. The `noun_chunks` method provides\
    \ noun phrases, and from `pos`, we can search for `VERB`. The following code extracts\
    \ noun phrases and verbs from the chunks:\n\n```\n# pip install spacy\n# python\
    \ -m spacy download en_core_web_sm\nimport spacy\n# Load English tokenizer, tagger,\
    \ parser, NER, and word vectors\nnlp = spacy.load(\"en_core_web_sm\")\n# Process\
    \ whole documents\ntext = (\"My English Bulldog Larry had skin allergies the summer\
    \ we got him at age 3, I'm so glad that now I can buy his food from Amazon\")\n\
    doc = nlp(text)\n# Analyze syntax\nprint(\"Noun phrases:\", [chunk.text for chunk\
    \ in doc.noun_chunks])\nprint(\"Verbs:\", [token.lemma_ for token in doc if token.pos_\
    \ == \"VERB\"])\n```\n\n### Named Entity Recognition\n\nspaCy has an accuracy\
    \ of 85.85% in named entity recognition (NER) tasks. The `en_core_web_sm` model\
    \ provides the function `ents`, which provides the entities. The model is trained\
    \ on the OntoNotes dataset, which can be found at [`https://catalog.ldc.upenn.edu/LDC2013T19`](https://catalog.ldc.upenn.edu/LDC2013T19).\n\
    \nThe default models in spaCy provide the entities shown in Table [5-3](#478492_1_En_5_Chapter.xhtml#Tab3).\n\
    \n**Table 5-3** Types\n\n| TYPE | DESCRIPTION |\n| --- | --- |\n| `PERSON` | Names\
    \ of people including fictional characters |\n| `NORP` | Nationalities or religious\
    \ or political groups |\n| `FAC` | Civil engineering structures or infrastructures\
    \ like buildings, airports, highways, bridges, etc. |\n| `ORG` | Organization\
    \ names like companies, agencies, institutions, etc. |\n| `GPE` | A geopolitical\
    \ entity like countries, cities, states |\n| `LOC` | Non-GPE locations like mountain\
    \ ranges, water bodies |\n| `PRODUCT` | Objects, vehicles, foods, etc. (not services)\
    \ |\n| `EVENT` | Named hurricanes, battles, wars, sports events, etc. |\n| `WORK_OF_ART`\
    \ | Titles of books, songs, etc. |\n| `LAW` | Named documents made into laws |\n\
    | `LANGUAGE` | Any named language |\n| `DATE` | Absolute or relative dates or\
    \ periods |\n| `TIME` | Times smaller than a day |\n| `PERCENT` | Percentage,\
    \ including % |\n| `MONEY` | Monetary values, including unit |\n| `QUANTITY` |\
    \ Measurements, as of weight or distance |\n| `ORDINAL` | “first,” “second,” etc.\
    \ |\n| `CARDINAL` | Numerals that do not fall under another type |\n\nThe following\
    \ code extracts the English Bulldog Larry as a `PERSON` entity and Amazon as entity\
    \ `ORG`. Unlike NLTK, where it identified Amazon as `GPE`, spaCy correctly identifies\
    \ the context of the sentence to figure out that Amazon is an organization in\
    \ the given sentence.\n\n```\nimport spacy\n# Load English tokenizer, tagger,\
    \ parser, NER, and word vectors\nnlp = spacy.load(\"en_core_web_sm\")\n# Process\
