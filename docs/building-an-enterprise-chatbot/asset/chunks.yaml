    ### About the Technical Reviewer


    # 1. Processes in the Banking and Insurance Industries


    According to Darwin’s *On the Origin of Species*, it is not the most intellectual
    of the species that survives; it is not the strongest that survives; the species
    that survives is the one that is best able to adapt and adjust to the changing
    environment in which it finds itself. The same analogy can apply to enterprises
    and their survival opportunities in the 21st century. In this digital era, it
    is of utmost importance for enterprises to adapt to the latest trends and technology
    advancements. With this book, we intend to prepare you with an emerging skill
    of building chatbots in the financial services domain, with a specific use case
    of an insurance agent (replicable to a bank assistant as well).'
