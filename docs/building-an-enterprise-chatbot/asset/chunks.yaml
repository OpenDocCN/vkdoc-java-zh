    ''him'', ''age'', ''I'', ''I'', ''his food'', ''Amazon'']

    Verbs: [''have'', ''get'', ''be'', ''can'', ''buy'']

    ```


    #### Named Entity Recognition


    spaCy has an accuracy of 85.85% in named entity recognition (NER) tasks. The en_core_web_sm
    model provides the function *ents**,*** which provides the entities. The model
    is trained on the OntoNotes dataset, which can be found at [`https://catalog.ldc.upenn.edu/LDC2013T19`](https://catalog.ldc.upenn.edu/LDC2013T19)
    .


    The default models in spaCy provide the entities shown in Table [5-3](#478492_1_En_5_Chapter.xhtml#Tab3).


    Table 5-3


    Types


    | TYPE | DESCRIPTION |

    | --- | --- |

    | PERSON | Names of people including fictional characters |

    | NORP | Nationalities or religious or political groups |

    | FAC | Civil engineering structures or infrastructures like buildings, airports,
    highways, bridges, etc. |

    | ORG | Organization names like companies, agencies, institutions, etc. |

    | GPE | A geopolitical entity like countries, cities, states |

    | LOC | Non-GPE locations like mountain ranges, water bodies |

    | PRODUCT | Objects, vehicles, foods, etc. (not services) |

    | EVENT | Named hurricanes, battles, wars, sports events, etc. |

    | WORK_OF_ART | Titles of books, songs, etc. |

    | LAW | Named documents made into laws |

    | LANGUAGE | Any named language |

    | DATE | Absolute or relative dates or periods |

    | TIME | Times smaller than a day |

    | PERCENT | Percentage, including % |

    | MONEY | Monetary values, including unit |

    | QUANTITY | Measurements, as of weight or distance |

    | ORDINAL | “first,” “second,” etc. |

    | CARDINAL | Numerals that do not fall under another type |


    The following code extracts the English Bulldog Larry as a PERSON entity and Amazon
    as entity ORG. Unlike NLTK, where it identified Amazon as GPE, spaCy correctly
    identifies the context of the sentence to figure out that Amazon is an organization
    in the given sentence.


    ```

    import spacy

    # Load English tokenizer, tagger, parser, NER, and word vectors

    nlp = spacy.load("en_core_web_sm")

    # Process whole documents

    text = ("My English Bulldog Larry had skin allergies the summer we got him at
    age 3, I''m so glad that now I can buy his food from Amazon")

    doc = nlp(text)

    # Find named entities

    for entity in doc.ents:

    print(entity.text, entity.label_)

    English Bulldog Larry PERSON

    Amazon ORG

    ```


