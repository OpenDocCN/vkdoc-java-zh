- fmt: '### Processing Textual Data


    We will use the Amazon Fine Food Review dataset throughout this chapter for all
    demonstrations using various open-source tools. The dataset can be downloaded
    from [`www.kaggle.com/snap/amazon-fine-food-reviews`](http://www.kaggle.com/snap/amazon-fine-food-reviews),
    which is made available with a CC0: Public Domain license.


    #### Reading the CSV File


    Using a `read_csv` function from the pandas library, we read the `Reviews.csv`
    file into a `food_review` data frame and print the top rows (Figure [5-3](#478492_1_En_5_Chapter.xhtml#Fig3)):


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig3_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    A CSV file


    ```

    import pandas as pd

    food_review = pd.read_csv("Reviews.csv")

    food_review.head()

    ```


    As can be seen, the CSV contains columns like `ProductID`, `UserID`, `Product
    Rating`, `Time`, `Summary`, and `Text` of the review. The file contains almost
    500K reviews for various products. Let’s sample some reviews to process.


    #### Sampling


    Using the `sample` function from the pandas data frame, let’s randomly pick the
    text of 1000 reviews and print the top rows (see Figure [5-4](#478492_1_En_5_Chapter.xhtml#Fig4)):


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig4_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Samples


    ```

    food_review_text = pd.DataFrame(food_review["Text"])

    food_review_text_1k = food_review_text.sample(n= 1000,random_state = 123)

    food_review_text_1k.head()

    ```


    #### Tokenization Using NLTK


    As discussed, NLTK offers many features for processing textual data. The first
    step in processing text data is to separate a sentence into individual words.
    This process is called tokenization. We will use the NLTK’s `word_tokenize` function
    to create a column in the `food_review_text_1k` data frame we created above and
    print the top six rows to see the output of tokenize (Figure [5-5](#478492_1_En_5_Chapter.xhtml#Fig5)):


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig5_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Top rows


    ```

    food_review_text_1k[''tokenized_reviews''] = food_review_text_1k[''Text''].apply(nltk.word_tokenize)

    food_review_text_1k.head()

    ```


    ### Word Search Using Regex


    Now that we have the tokenized text for each review, let’s take the first row
    in the data frame and search for the presence of the word using a regular expression
    (regex). The regex searches for any word that contains `c` as its first character
    and `i` as the third character. We can write various regex searches for a pattern
    of interest. We use the `re.search()` function to perform this search:


    ```

    #Search: All 5-letter words with c as its first letter and i as its third letter

    search_word = set([w for w in food_review_text_1k[''tokenized_reviews''].iloc[0]
    if re.search(''^c.i..$'', w)])

    print(search_word)

    {''chips''}

    ```


    ### Word Search Using the Exact Word


    Another way of searching for a word is to use the exact word. This can be achieved
    using the `str.contains()` function in pandas. In the following example, we search
    for the word “great” in all of the reviews. The rows of the reviews containing
    the word will be retrieved. They can be considered a positive review. See Figure
    [5-6](#478492_1_En_5_Chapter.xhtml#Fig6).


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig6_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Samples with a specific word


    ```

    #Search for the word "great" in reviews

    food_review_text_1k[food_review_text_1k[''Text''].str.contains(''great'')]

    ```


    ### NLTK


    In this section, we will use many of the features from NLTK for NLP, such as normalization,
    noun phrase chunking, named entity recognition, and document classifier.


    #### Normalization Using NLTK


    In many natural language tasks, we often deal with the root form of the words.
    For example, for the words “baking” and “baked,” the root word is “bake.” This
    process of extracting the root word is called stemming or normalization. NLTK
    provides two functions implementing the stemming algorithm. The first is the Porter
    Stemming algorithm, and the second is the Lancaster stemmer.


    There are slight differences in the quality of output from both algorithms. For
    example, in the following example, the Porter stemmer converts the word “sustenance”
    into “sustain” while the Lancaster stemmer outputs “sust.”


    ```

    words = set(food_review_text_1k[''tokenized_reviews''].iloc[0])

    print(words)

    porter = nltk.PorterStemmer()

    print([porter.stem(w) for w in words])

    Before

    {''when'', ''always'', ''great'', ''vending'', ''for'', ''make'', "''m", ''just'',
    ''I'', ''.'', ''love'', ''a'', ''They'', ''with'', ''healthy'', ''these'', ''snack'',
    ''the'', ''at'', ''work'', ''chips'', ''machine'', ''stuck'', ''sustenance'',
    ''!''}

    After

    [''when'', ''alway'', ''great'', ''vend'', ''for'', ''make'', "''m", ''just'',
    ''I'', ''.'', ''love'', ''a'', ''they'', ''with'', ''healthi'', ''these'', ''snack'',
    ''the'', ''at'', ''work'', ''chip'', ''machin'', ''stuck'', ''susten'', ''!'']

    lancaster = nltk.LancasterStemmer()

    print([lancaster.stem(w) for w in words])

    [''when'', ''alway'', ''gre'', ''vend'', ''for'', ''mak'', "''m", ''just'', ''i'',
    ''.'', ''lov'', ''a'', ''they'', ''with'', ''healthy'', ''thes'', ''snack'', ''the'',
    ''at'', ''work'', ''chip'', ''machin'', ''stuck'', ''sust'', ''!'']

    ```'
