    food_review_text_1k[food_review_text_1k[''Text''].str.contains(''great'')]

    ```


    ### NLTK


    In this section, we will use many of the features from NLTK for NLP, such as normalization,
    noun phrase chunking, named entity recognition, and document classifier.


    #### Normalization Using NLTK


    In many natural language tasks, we often deal with the root form of the words.
    For example, for the words “baking” and “baked,” the root word is “bake.” This
    process of extracting the root word is called stemming or normalization. NLTK
    provides two functions implementing the stemming algorithm. The first is the Porter
    Stemming algorithm, and the second is the Lancaster stemmer.


    There are slight differences in the quality of output from both algorithms. For
    example, in the following example, the Porter stemmer converts the word “sustenance”
    into “sustain” while the Lancaster stemmer outputs “sust.”


    ```

    words = set(food_review_text_1k[''tokenized_reviews''].iloc[0])

    print(words)

    porter = nltk.PorterStemmer()

    print([porter.stem(w) for w in words])

