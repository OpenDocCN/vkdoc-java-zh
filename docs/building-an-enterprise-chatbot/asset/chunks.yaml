    ### State Machine


    所有这些部分在`StateMachine`中整合在一起。`StateMachine`是 IRIS 中状态管理的核心，它知道起始状态、已定义的状态列表、IRIS
    配置中定义的所有状态转换，并提供了添加状态、添加转换的方法，最重要的是，在成功转换后触发`execute`方法的执行：


    ```

    /*

    * StateMachine is the backbone class for IRIS state management. It contains start
    state, a map of states,

    * and a map of state transitions, all of which are defined in the Iris Configuration.

    */

    public class StateMachine {

    /*

    * In start state, there will always be a predefined start state which will be
    the initial conversation state.

    * Start state is initialized in Iris configuration class.

    */

    private State startState;

    // A map of all the defined states.

    private HashMap<String, State> states = new HashMap<String, State>();

    // A map of transition key and a list of possible transitions.

    private HashMap<String, List<Transition>> stateTransitions = new HashMap<String,
    List<Transition>>();

    public void setStartState(State state) {

    this.startState = state;

    }

    // Method to add states in the state map.

    private void addState(State state) {

    states.put(state.getName(), state);

    if (startState == null) {

    startState = state;

    }

    }

    /*

    *  The addTransition method is used to add a transition from one state to another.
    It requires intent name, from state, and to state to define the transition.

    */

    public void addTransition(String intentName, State fromState, State toState) {

    // When no Shield is passed, it is passed as null.

    addTransition(intentName, fromState, toState, null);

    }

    /*

    * Overloaded addTransition method that is similar to above but Shield is to be
    validated for this transition.

    */

    public void addTransition(String intentName, State fromState, State toState, Shield
    shield) {

    if (!states.containsKey(fromState.getName())) {

    addState(fromState);

    }

    if (!states.containsKey(toState.getName())) {

    addState(toState);

    }

    String key = makeTransitionKey(intentName, fromState);

    List<Transition> transitionList = stateTransitions.get(key);

    if (transitionList == null) {

    transitionList = new ArrayList<Transition>();

    stateTransitions.put(key, transitionList);

    }

    transitionList.add(new Transition(toState, shield));

    }

    /*

    * This method is the heart of the state machine. It receives the matched intent
    as an input along with session to know the current state. It then does a series
    of things: obtains the current state from a session or initializes the start state
    if no current state, then gets the matched intent, generates a transition key
    to look up in the transition map, and finally triggers the execute method of the
    target state and updates the state in session.

    */

    public String trigger(final MatchedIntent matchedIntent, final Session session)
    {

    State currentState = startState;

    // Gets the current state from the session. If it is a new session, this will
    be null.

    String currentStateName = (String) session.getAttribute("currentStateName");

    if (currentStateName != null) {

    currentState = states.get(currentStateName);

    // At this point, the current state should not be null, and hence an exception
    is thrown as the handling of this condition is unknown.

    if (currentState == null) {

    throw new IllegalStateException("Illegal current state in session:" + currentStateName);

    }

    }

    Intent intent = matchedIntent.getIntent();

    String intentName = (intent != null) ? intent.getName() : null;

    // intent should not null here as it is expected that the matched intent will
    be an intent from the defined intent list.

    if (intentName == null) {

    throw new IllegalArgumentException("Request missing intent." + matchedIntent.toString());

    }

    // Generate transition key by using the pattern "intentname-statename".

    String key = makeTransitionKey(intentName, currentState);

    // Get the target state transition list from the state transitions map.

    List<Transition> transitionToStateList = stateTransitions.get(key);

    /*

    * If there is a condition where the intent is valid and the current state is valid
    but there is no transaction defined, and if there is no definition of where to
    go, it is an illegal state condition and cannot be handled.

    */

    if (transitionToStateList == null) {

    throw new IllegalStateException("Could not find state to transition to. Intent:
    " + intentName

    + " Current State: " + currentState);

    }

    State transitionToState = null;

    // Find first matching to-state and check shield conditions. This method iterates
    one by one to find a successful transition target state.

    for (Transition transition : transitionToStateList) {

    if (transition.getShield() == null) {

    // If there is no shield condition and there is a valid transition, assign the
    transitionToState as that target state.

    transitionToState = transition.getToState();

    break;

    } else {

    // If there is a shield condition, it will be validated and upon successful validation,
    the target state will be assigned as transitionToState.

    if (transition.getShield().validate(matchedIntent, session)) {

    transitionToState = transition.getToState();

    break;

    }

    }

    }

    // If state machine didn''t find any matching states, it is an illegal state as
    it is not defined.

    if (transitionToState == null) {

    throw new IllegalStateException("Could not find state to transition to. Failed
    all guards. Intent: "

    + intentName + " Current State: " + currentState);

    }

    // Action to be performed upon successful transition and response returned.

    String response = transitionToState.execute(matchedIntent, session);

    // Current state is now updated in the session.

    session.setAttribute("currentStateName", transitionToState.getName());

    return response;

    }

    /*

    * Transition key is defined to store transition key and a list of transitions.

    */

    private String makeTransitionKey(String intentName, State state) {

    return intentName + ''-'' + state.getName();

    }

    }

    ```


