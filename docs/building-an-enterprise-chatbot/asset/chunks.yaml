    },

    "user": {

    "userId": "amzn1.ask.account.XXXXXX"

    },

    "device": {

    "deviceId": "amzn1.ask.device.XXXXX",

    "supportedInterfaces": {

    "AudioPlayer": {}

    }

    },

    "apiEndpoint": "https://api.eu.amazonalexa.com",

    "apiAccessToken": "XXXXXXXX"

    },

    "Viewport": {

    "experiences": [

    {

