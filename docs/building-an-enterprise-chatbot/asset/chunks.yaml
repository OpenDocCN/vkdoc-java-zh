    #### 从属从句


    我们可以通过像“because”这样的**标句词**在从句中引入连词，并将句子置于过去时态。我们称这种从句为从属从句。


    ```

    def subordinate_clause():

    p = Clause(''Harry'', ''like'', ''amazon'')

    q = Clause(''product'', ''is'', ''good'')

    q[''COMPLEMENTISER''] = ''because''

    q[''TENSE''] = ''PAST''

    p.complements += q

    print(realise(p))

    Harry likes amazon because product was good.

    ```


    #### 主方法


