    #### `AccTypeSlot`


    `AccTypeSlot` is implemented to understand the account type. If no slot match
    happens, the state engine will reprompt as the system could not identify the account
    type:


    ```

    /*

    * For intent where we want to understand what type of account balance the user
    is looking for, a straightforward method is to apply a

    * string match of possible account types. Since we are only looking for whether
    the utterance contains any of those keywords,

    * all of the below possibilities are covered:

    * i am looking for annuities account balance

    * annuities

    * annuities balance

    * tell 401k balance

    * want my retirement balance etc.

    */

    @Override

    public MatchedSlot match(String utterance) {

