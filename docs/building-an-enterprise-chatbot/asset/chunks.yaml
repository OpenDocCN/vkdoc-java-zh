    \ and [5-11](#478492_1_En_5_Chapter.xhtml#Fig11)).\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig11_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig11_HTML.jpg)\n\
