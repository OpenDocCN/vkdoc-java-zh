    ### 人在回路中


    我们在本章中引入的框架的第三项改进是人在回路中。图 9-20 展示了用于持续改进的各种功能组件。无论我们使用何种技术来让 IRIS 更好地理解意图，总会有一些对话是
    IRIS 无法理解的。原因很简单：IRIS 并不拥有宇宙中的所有信息，并且它始终被设计为仅执行一组已知的功能。


    我们知道 IRIS 被设计用于执行某些操作，例如计算保险资格、提供账户余额、理赔状态等。假设有一定比例的用户正在向 IRIS 请求更改其保险单的地址。IRIS
    目前不支持此功能，并且机器解释这类新信息具有挑战性。


    假设部分用户话语如图 9-25 所示。


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig25_HTML.jpg](img/478492_1_En_9_Fig25_HTML.jpg)


    图 9-25


    话语及计数


    通过人在回路中，可以进一步分析这些话语。在图 9-26 中，前两个话语可以归类为一个意图。由于此意图占总日志的 66%，因此可以根据产品决策增强 IRIS
    以支持 `ADDRESS_CHANGE`。在某些情况下，一个话语可以映射到现有意图，例如最后一个话语。这将有助于意图分类引擎由于更多数据集的可用性而更好地对意图进行分类。


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig26_HTML.jpg](img/478492_1_En_9_Fig26_HTML.jpg)


    图 9-26


    话语、意图及计数


    也会出现诸如用户询问板球比赛比分、英国脱欧细节或火车时刻表等无关问题的话语。这些日志无需进一步处理，将被增强 IRIS 反馈循环的领域专家忽略。


    ## 总结


    在本结论章中，我们讨论了将聊天机器人部署到云端的各种方法，演示了将 IRIS 与 Alexa 集成的 5 分钟入门介绍，并讨论了通过日志文件和人在回路中的反馈循环对
    IRIS 进行持续改进。


    在本书中，我们在三个支柱之间保持了良好的平衡：业务背景、机器处理自然语言的理论基础，以及从头开始开发真实世界聊天机器人的实践。我们相信这三个支柱将有助于构建一个真正企业级的聊天机器人，并具有明确的投资回报率。此外，我们还关注了使用个人数据时的伦理问题，以及欧盟国家如何同意
    GDPR 法规来保护人们的隐私。


