  raw: '# 6. A Novel In-House Implementation of a Chatbot Framework


    In previous chapters, we explained intents and different ways of classifying intents
    using natural language techniques. We also discussed the various data sources
    that are available in designing an enterprise chatbot. There are many chatbot
    builder platforms and frameworks available in the market that can be used to build
    chatbots. These frameworks abstract much complex functionality and provide components
    that are reusable, extendable, and scalable.


    Designing an enterprise chatbot without using a framework has the following benefits:


    *   Provides better security and control


    *   Data protection from third-party vendors


    *   Minimizes operational cost


    *   In-depth analytics


    *   Flexible design of architecture


    *   Change control management


    *   Interoperability


    *   Easy and quick integration with enterprise-wide available services and frameworks


    *   Integration with messenger platforms


    *   Integration with custom machine learning models


    *   Flexibility to customize with changes in the organization


    In this chapter, we will discuss and implement a custom-built chatbot called IRIS
    (Intent Recognition and Information Service) . We will explain the implementation
    concepts of the understanding developed in previous chapters. We will talk about
    designing and implementing state machines, transitions from one state to another
    in a conversational chatbot, and how they are critical to maintaining the context
    of user utterances as well as how to make a chatbot mimic human conversation with
    short-term memory and long-term memory.


    In IRIS, the backbone engine of the chatbot is written in Java, and an integration
    module connects IRIS with different messenger platforms such as Facebook Messenger.
    The integration module is written in NodeJS, which is discussed in the next chapter.


    ## Introduction to IRIS


    We developed IRIS as an open source chatbot framework to provide a novice level
    of understanding and implementation of a chatbot from scratch. IRIS provides the
    ability to use our templates of machine learning-based extraction of information
    from users’ utterances, such as by using named-entity recognition (NER). It provides
    customized enhancements such as custom intent matching implementation and conversational
    state management and many other features.


    The design is inspired by our collective experience and exploration of how other
    popular frameworks such as Amazon’s Echo natural language understanding model,
    Alexa Skills, RASA, Mutters, Dialogflow, and Microsoft Bot Builder are designed
    and implemented. IRIS derives many methods and implmentation from Mutters, an
    open source Java-based framework for building bot brains, and reuses some of its
    design and code concepts to create a simple and modified backend code base. Platforms
    like Mutters provide a lot of out-of-box features, support, and easy integration.
    Apart from our custom chatbot framework, we will discuss widely popular platforms
    and frameworks, and how they work, in the next chapter.


    ## Intents, Slots, and Matchers


    In the previous chapter, we showed that intents are an outcome of the behavior
    and focus of the user’s utterance. In this chapter, we will describe various components
    of an intent and discuss the implementation approach of creating and classifying
    intents. The following components define an intent:


    *   A name


    *   Sample utterances


    *   Slots (entities)


    *   A slot matcher


    Each intent can have zero or more slots, which are used to extract entities from
    user utterances. For example, if a chatbot helps us discover restaurants nearby,
    one of the intents could be defined as the following:


    | Intent name | Restaurant search |

    | --- | --- |

    | Sample utterances | Looking for restaurants around meRestaurants nearbyBest
    restaurants near meGood continental restaurants nearbyBest Chinese restaurants
    |

    | Slots/Entity | Cuisine |

    | Slot matcher | Custom Entity Match Model |


    Figure [6-1](#478492_1_En_6_Chapter.xhtml#Fig1) explains the meaning of intent,
    slot, and utterance.


    ![../images/478492_1_En_6_Chapter/478492_1_En_6_Fig1_HTML.jpg](images/478492_1_En_6_Chapter/478492_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    The meanings of intent, slot, and utterance


    Now, we’ll procedurally go through all the steps involved in creating intent,
    slot, and matcher classes in Java.


    In our new Java project, we will create a package called `com.iris.bot.intent`
    in which we will define classes required for intent creation and classification.


    ### Intent Class


    We define a Java class called `Intent` with a `name` variable to store the intent
    name. `Intent` has slots that contain a list of 0 or more slots defined for this
    particular intent. We have getters and setters of the name and slots.


    ```

    public class Intent {

    /** The name of the intent. */

    protected String name;

    /** The slots for the intent.

    * There could be 0 or more slots defined for each intent.

    * Slots contain a list of Slot and methods to add and get Slot  */

    protected Slots slots = new Slots();

    /**

    Constructor with the name as a parameter.

    It sets the Intent name at the time of intent creation.

    */

    public Intent(String name) {

    this.name = name;

    }

    /**

    * Returns the name of the intent.

    */

    public String getName() {

    return name;

    }

    /**

    * Adds a slot to the intent.

    */

    public void addSlot(Slot slot) {

    slots.add(slot);

    }

    /**

    * Returns the slots for the intent.

    */

    public Collection getSlots() {

    return Collections.unmodifiableCollection(slots.getSlots());

    }

    }

    ```


    Now that we have defined `Intent`, we need to define the `IntentMatcherService`
    class.'
  trans: '

    # 6. 一种新颖的自研聊天机器人框架实现


    在前几章中，我们解释了意图以及使用自然语言技术对意图进行分类的不同方法。我们还讨论了设计企业级聊天机器人时可用的各种数据源。市面上有许多可用于构建聊天机器人的平台和框架。这些框架抽象了许多复杂功能，并提供了可复用、可扩展且可伸缩的组件。


    在不使用框架的情况下设计企业级聊天机器人具有以下优势：


    *   提供更好的安全性和控制力

    *   防止第三方供应商泄露数据

    *   降低运营成本

    *   深度分析能力

    *   灵活的架构设计

    *   变更控制管理

    *   互操作性

    *   与企业级现有服务和框架的轻松快速集成

    *   与即时通讯平台集成

    *   与自定义机器学习模型集成

    *   根据组织变化灵活定制


    在本章中，我们将讨论并实现一个名为 IRIS（意图识别与信息服务）的自定义聊天机器人。我们将解释前几章所阐述概念的具体实现。我们将讨论对话式聊天机器人中状态机的设计与实现、状态间的转换，以及它们对于维护用户话语上下文的关键作用，同时探讨如何让聊天机器人通过短期记忆和长期记忆模拟人类对话。


    在 IRIS 中，聊天机器人的核心引擎使用 Java 编写，而集成模块则负责将 IRIS 与 Facebook Messenger 等不同即时通讯平台连接。该集成模块使用
    NodeJS 编写，将在下一章中讨论。


    ## IRIS 简介


    我们开发 IRIS 作为一个开源聊天机器人框架，旨在提供从零开始理解和实现聊天机器人的入门级指导。IRIS 支持使用我们的模板，通过机器学习从用户话语中提取信息，例如使用命名实体识别（NER）。它还提供了自定义增强功能，如自定义意图匹配实现、对话状态管理以及许多其他特性。


    其设计灵感来源于我们集体经验的积累，以及对亚马逊 Echo 自然语言理解模型、Alexa Skills、RASA、Mutters、Dialogflow 和
    Microsoft Bot Builder 等其他流行框架设计与实现方式的探索。IRIS 借鉴了 Mutters（一个基于 Java 的开源机器人大脑构建框架）的许多方法和实现，并复用了其部分设计和代码概念，以创建一个简单且经过修改的后端代码库。像
    Mutters 这样的平台提供了大量开箱即用的功能、支持以及便捷的集成。除了我们自定义的聊天机器人框架，我们将在下一章讨论广泛流行的平台和框架及其工作原理。


    ## 意图、槽位与匹配器


    在上一章中，我们指出意图是用户话语行为和焦点的结果。在本章中，我们将描述意图的各个组成部分，并讨论创建和分类意图的实现方法。意图由以下组件定义：


    *   名称

    *   示例话语

    *   槽位（实体）

    *   槽位匹配器


    每个意图可以有零个或多个槽位，用于从用户话语中提取实体。例如，如果一个聊天机器人帮助我们查找附近的餐厅，其中一个意图可以定义如下：


    | 意图名称 | 餐厅搜索 |

    | --- | --- |

    | 示例话语 | 查找我周围的餐厅<br>附近的餐厅<br>我附近最好的餐厅<br>附近不错的欧陆餐厅<br>最好的中餐馆 |

    | 槽位/实体 | 菜系 |

    | 槽位匹配器 | 自定义实体匹配模型 |


    图 6-1 解释了意图、槽位和话语的含义。


    ![../images/478492_1_En_6_Chapter/478492_1_En_6_Fig1_HTML.jpg](img/478492_1_En_6_Fig1_HTML.jpg)


    图 6-1


    意图、槽位和话语的含义


    现在，我们将逐步介绍在 Java 中创建意图、槽位和匹配器类的所有步骤。


    在我们的新 Java 项目中，我们将创建一个名为 `com.iris.bot.intent` 的包，并在其中定义意图创建和分类所需的类。


    ### 意图类


    我们定义一个名为 `Intent` 的 Java 类，其中包含一个 `name` 变量用于存储意图名称。`Intent` 包含槽位，这些槽位包含为此特定意图定义的零个或多个槽位列表。我们为名称和槽位提供了
    getter 和 setter 方法。


    ```

    public class Intent {

    /** 意图的名称。 */

    protected String name;

    /** 意图的槽位。

    * 每个意图可以定义零个或多个槽位。

    * 槽位包含一个 Slot 列表以及添加和获取 Slot 的方法  */

    protected Slots slots = new Slots();

    /**

    * 以名称作为参数的构造函数。

    * 在意图创建时设置意图名称。

    */

    public Intent(String name) {

    this.name = name;

    }

    /**

    * 返回意图的名称。

    */

    public String getName() {

    return name;

    }

    /**

    * 向意图添加一个槽位。

    */

    public void addSlot(Slot slot) {

    slots.add(slot);

    }

    /**

    * 返回意图的槽位。

    */

    public Collection getSlots() {

    return Collections.unmodifiableCollection(slots.getSlots());

    }

    }

    ```


    现在我们已经定义了 `Intent`，接下来需要定义 `IntentMatcherService` 类。

    '
- fmt: '### `IntentMatcherService` Class


    This service takes user utterances and responds with the matched intent. As explained
    in the previous chapter, there are multiple ways to classify intents. In this
    example, we have a separate intent classification service that classifies user
    utterances into one of the user-defined intents with a certain probability or
    score (refer to Chapter [5](#478492_1_En_5_Chapter.xhtml) for more details on
    intent classification).


    ```

    public class IntentMatcherService {

    /** A map of possible intent names and intents that are defined in the Iris Configuration
    */

    private HashMap intents = new HashMap();

    /** The slot matcher method to use for named entity recognition. */

    private CustomSlotMatcher slotMatcher;

    /** Intent Matcher Service constructor that sets slot matcher */

    public IntentMatcherService(CustomSlotMatcher slotMatcher) {

    this.slotMatcher = slotMatcher;

    }

    /*

    * RestTemplate is a synchronous Java client to perform HTTP requests, exposing
    a simple template method API over underlying HTTP client libraries. The RestTemplate
    offers templates for common scenarios by HTTP method, in addition to the generalized
    exchange and execute methods that support less frequent cases.

    */

    protected RestTemplate restTemplate = new RestTemplate();

    /** This method takes a user utterance and session as an input, obtains matched
    intent from an intent classification service, performs named entity recognition
    on slots defined for the matched intent, and sets the matched intent into the
    user session. The session is a server-side storage mechanism that stores a user''s
    interaction and resets the information or persists based on the interaction duration
    and the type of information.

    */

    public MatchedIntent match(String utterance, Session session) {

    // getIntent method returns the matched intent.

    Intent matchedIntent = getIntent(utterance);

    /*

    * We define slots associated with each Intent in the Iris Configuration class.
    Each of these slots has a matching method defined to describe how entities are
    to be matched. Depending on the entity and implementation, various NER models
    can be used to recognize entities. This method returns a map of the slot and matched
    slot object. The slot contains a slot name and a matching method, and MatchedSlot
    contains slot that was matched, the value that was used to match on, and the value
    that was matched.

    */

    HashMap matchedSlots = slotMatcher.match(session, matchedIntent, utterance);

    /*

    * Once we get the matched intent, we set the value of the intent in session. We
    will discuss session under the IRIS Memory topic.

    */

    session.setAttribute("currentIntentName", matchedIntent.getName());

    /*

    * Finally, an object with matched intent, matched slots, and the utterance against
    which the intents and slots were matched and returned.

    */

    return new MatchedIntent(matchedIntent, matchedSlots, utterance);

    }

    }

    ```


    In the code snippet above, `Intent matchedIntent = getIntent(utterance)` is the
    method that provides intent classification.


    ### The `getIntent` Method of the `IntentMatcherService` class


    As discussed, there are many ways in which this method can be implemented. It
    takes a user utterance as an input and returns an `Intent` that is classified
    with maximum probability by the intent engine. For now, let’s see how to define
    this method in a simple way:


    ```

    /*

    * getIntent method takes a user utterance and returns an object of type Intent.
    This is then used by the match method to match slots for that intent.

    */

    public Intent getIntent(String utterance) {

    /*

    * Intent Response is a plain Java object with three attributes - utterance, intent
    name, and probability returned by the intent service.

    */

    IntentResponse matchedIntent = new IntentResponse();

    /*

    * If the intent classification engine is not able to classify the utterance into
    some intent with some threshold or if the engine is unable to return a valid response,
    we fallback it to be a general query intent to be on the safe side.

    */

    String defaultIntentName = "generalQueryIntent";

    String matchedIntentName = null;

    /*

    * ObjectMapper provides functionality for reading and writing JSON, either to
    and from basic POJOs (Plain Old Java Objects), or to and from a general-purpose
    JSON Tree Model (JsonNode), as well as related functionality for performing conversions.
    ObjectMapper is a part of the com.fasterxml.jackson.databind package, which is
    a high-performance JSON processor for Java.

    */

    ObjectMapper mapper = new ObjectMapper();

    /*

    * There is specific enumeration that defines simple on/off features to set for
    ObjectMapper. ACCEPT_CASE_INSENSITIVE_PROPERTIES is a feature that allows for
    more forgiving deserialization of incoming JSON.

    FAIL_ON_UNKNOWN_PROPERTIES is a feature that determines whether encountering of
    unknown properties (ones that do not map to a property, and no "any setter" or
    handler can handle it) should fail (by throwing a JsonMappingException) or not.

    */

    mapper.configure(MapperFeature.ACCEPT_CASE_INSENSITIVE_PROPERTIES, true)

    .configure(DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES, false);

    try {

    matchedIntent = restTemplate.getForObject("http://localhost:8080" + "/intent/"
    + utterance, IntentResponse.class);

    if(matchedIntent != null && matchedIntent.getIntent()!=null){

    matchedIntentName = matchedIntent.getIntent();

    }

    else

    // If matched intent is null, we consider the default intent to be the matched
    intent.

    matchedIntentName = defaultIntentName;

    } catch (Exception e) {

    // In case of an exception too, we consider default.

    matchedIntentName = defaultIntentName;

    }

    // Finally, we return the intent object with the matched intent name back to the
    match method of Intent Matcher Service.

    return intents.get(matchedIntentName);

    }

    ```


    There are two essential things to be discussed in the `getIntent` method, and
    we cover them in the next sections.


    #### Intent Classification Service


    We are assuming here that there is an intent classification service running on
    localhost on port 8080 that accepts HTTP GET requests and returns a JSON response:


    ```

    http://localhost:8080/intent/user-utterance

    ```


    Here’s the JSON representation of a response:


    ```

    {

    "utterance": "i want a life insurance quote",

    "intent": "QUOTE",

    "probability": 89.5,

    }

    ```


    #### General Query Intent


    Most chatbots today are based on general queries and look like an automated Q&A
    system. The reason for this is that most developers are unsure how to model the
    chatbot to be conversational. Also, they find it difficult to make the bot interactive.


    A general query is never an explicit intent in a chatbot that is conversational
    and that mimics human conversation modeled as dialogs. Hence, when no intent is
    matched by the classification engine or if the match probability is not good enough
    for that utterance, we tend to classify it as general intent. We have seen that
    this approach is very efficient in practical situations. In another way, if the
    intent engine is not able to classify the utterance, the utterance could be a
    generic ask and not aimed for a specific action. We will show later how to use
    this intent for first looking for an answer in a FAQ repository and then later
    as a fallback, performing a general search to return a relevant response if possible.'
  raw: '### IntentMatcherService Class


    This service takes user utterances and responds with the matched intent. As explained
    in the previous chapter, there are multiple ways to classify intents. In this
    example, we have a separate intent classification service that classifies user
    utterances into one of the user-defined intents with a certain probability or
    score (refer to Chapter [5](#478492_1_En_5_Chapter.xhtml) for more details on
    intent classification).


    ```

    public class IntentMatcherService {

    /** A map of possible intent names and intents that are defined in the Iris Configuration
    */

    private HashMap intents = new HashMap();

    /** The slot matcher method to use for named entity recognition. */

    private CustomSlotMatcher slotMatcher;

    /** Intent Matcher Service constructor that sets slot matcher */

    public IntentMatcherService(CustomSlotMatcher slotMatcher) {

    this.slotMatcher = slotMatcher;

    }

    /*

    * RestTemplate is a synchronous Java client to perform HTTP requests, exposing
    a simple template method API over underlying HTTP client libraries. The RestTemplate
    offers templates for common scenarios by HTTP method, in addition to the generalized
    exchange and execute methods that support less frequent cases.

    */

    protected RestTemplate restTemplate = new RestTemplate();

    /** This method takes a user utterance and session as an input, obtains matched
    intent from an intent classification service, performs named entity recognition
    on slots defined for the matched intent, and sets the matched intent into the
    user session. The session is a server-side storage mechanism that stores a user''s
    interaction and resets the information or persists based on the interaction duration
    and the type of information.

    */

    public MatchedIntent match(String utterance, Session session) {

    // getIntent method returns the matched intent.

    Intent matchedIntent = getIntent(utterance);

    /*

    * We define slots associated with each Intent in the Iris Configuration class.
    Each of these slots has a matching method defined to describe how entities are
    to be matched. Depending on the entity and implementation, various NER models
    can be used to recognize entities. This method returns a map of the slot and matched
    slot object. The slot contains a slot name and a matching method, and MatchedSlot
    contains slot that was matched, the value that was used to match on, and the value
    that was matched.

    */

    HashMap matchedSlots = slotMatcher.match(session, matchedIntent, utterance);

    /*

    * Once we get the matched intent, we set the value of the intent in session. We
    will discuss session under the IRIS Memory topic.

    */

    session.setAttribute("currentIntentName", matchedIntent.getName());

    /*

    * Finally, an object with matched intent, matched slots, and the utterance against
    which the intents and slots were matched and returned.

    */

    return new MatchedIntent(matchedIntent, matchedSlots, utterance);

    }

    }

    ```


    In the code snippet above, `Intent matchedIntent = getIntent(utterance)` is the
    method that provides intent classification.


    ### The getIntent Method of the IntentMatcherService class


    As discussed, there are many ways in which this method can be implemented. It
    takes a user utterance as an input and returns an `Intent` that is classified
    with maximum probability by the intent engine. For now, let’s see how to define
    this method in a simple way:


    ```

    /*

    * getIntent method takes a user utterance and returns an object of type Intent.
    This is then used by the match method to match slots for that intent.

    */

    public Intent getIntent(String utterance) {

    /*

    * Intent Response is a plain Java object with three attributes - utterance, intent
    name, and probability returned by the intent service.

    */

    IntentResponse matchedIntent = new IntentResponse();

    /*

    * If the intent classification engine is not able to classify the utterance into
    some intent with some threshold or if the engine is unable to return a valid response,
    we fallback it to be a general query intent to be on the safe side.

    */

    String defaultIntentName = "generalQueryIntent";

    String matchedIntentName = null;

    /*

    * ObjectMapper provides functionality for reading and writing JSON, either to
    and from basic POJOs (Plain Old Java Objects), or to and from a general-purpose
    JSON Tree Model (JsonNode), as well as related functionality for performing conversions.
    ObjectMapper is a part of the com.fasterxml.jackson.databind package, which is
    a high-performance JSON processor for Java.

    */

    ObjectMapper mapper = new ObjectMapper();

    /*

    * There is specific enumeration that defines simple on/off features to set for
    ObjectMapper. ACCEPT_CASE_INSENSITIVE_PROPERTIES is a feature that allows for
    more forgiving deserialization of incoming JSON.

    FAIL_ON_UNKNOWN_PROPERTIES is a feature that determines whether encountering of
    unknown properties (ones that do not map to a property, and no "any setter" or
    handler can handle it) should fail (by throwing a JsonMappingException) or not.

    */

    mapper.configure(MapperFeature.ACCEPT_CASE_INSENSITIVE_PROPERTIES, true)

    .configure(DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES, false);

    try {

    matchedIntent = restTemplate.getForObject("http://localhost:8080" + "/intent/"
    + utterance, IntentResponse.class);

    if(matchedIntent != null && matchedIntent.getIntent()!=null){

    matchedIntentName = matchedIntent.getIntent();

    }

    else

    // If matched intent is null, we consider the default intent to be the matched
    intent.

    matchedIntentName = defaultIntentName;

    } catch (Exception e) {

    // In case of an exception too, we consider default.

    matchedIntentName = defaultIntentName;

    }

    // Finally, we return the intent object with the matched intent name back to the
    match method of Intent Matcher Service.

    return intents.get(matchedIntentName);

    }

    ```


