    ```

    #搜索：所有以 c 为首字母、i 为第三字母的五字母单词

    search_word = set([w for w in food_review_text_1k[''tokenized_reviews''].iloc[0]
    if re.search(''^c.i..$'', w)])

    print(search_word)

