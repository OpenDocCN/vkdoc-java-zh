    #### `IPinSlot`


    In an actual implementation, this type of slot may not be defined but to highlight
    how a basic authentication can be implemented, we use this entity. We have considered
    in the example that users will have their own ipin generated in some way and stored
    in the back end and that it will be a six-digit number. In a real world, a much
    more complex number and a set of authentication mechanisms will exist such as
    username, password, and ZIP code.


    In the method snippet below, if the value is `123456`, only then will the account
    balance be displayed. Any other number will result in a wrong ipin provided by
    the user.


    ### Warning


    Never implement such a weak authentication system. It will compromise your enterprise
    security. The purpose here is to only complete the flow of discussion. In no way
    do we endorse such weak authentication.


    ```

    @Override

    public MatchedSlot match(String token) {

    if (token.matches("[0-9]+") && token.length() == 6 && token.equalsIgnoreCase("123456"))
    {

    return new MatchedSlot(this, token, token);

    }

    return null;

    }

    ```


    #### `AlphaNumericSlot`


    As the name suggests, the entity is supposed to be alphanumeric, and if there
    is a word that is alphanumeric, `MatchedSlot` is returned. In the example, `AlphaNumericSlot`
    is used for processing claims that are alphanumeric.


    ```

    @Override

    public MatchedSlot match(String utterance) {

    /*

    * User utterance is split into utterance tokens. We need to see if there is any
    alphanumeric word in the utterance

    * This implementation is useful for scenarios mentioned below:

    * my claim id is gi123 can you tell the claim status

    * claim the status of abc123

    */

    ArrayList utteranceTokens = new ArrayList(Arrays.asList(utterance.split("\\s+")));

    String claimId = null;

    for (String token : utteranceTokens) {

    if (!token.matches("[a-zA-Z]+")) {

    token = token.replace(".", "");

    token = token.trim();

    claimId = token;

    return new MatchedSlot(this, claimId, claimId);

    }

    }

    return null;

    }

    ```


