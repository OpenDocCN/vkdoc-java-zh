    如果我们向这个正面和负面评论的语料库中添加更多评论，准确率将会开始提升。


    ### 意图分类与问答


    一个聊天机器人应良好执行的两个最重要的 NLU 任务是：对给定用户查询的意图进行分类，以及通过理解上下文来回答问题。虽然围绕这两个任务有许多专有框架，但它们无法提供幕后情况的可见性。在本节中，我们将使用一个名为
    `deeppavlov` 的 Python 库。这是一个用于端到端对话系统和聊天机器人的开源深度学习库。该库提供了许多预训练的深度学习模型作为其产品的一部分。


    #### 意图分类


    我们需要将给定的查询（用户输入）分类到一个意图类别中。一旦识别出意图类别，聊天机器人就可以触发相应的逻辑来响应用户查询。例如，如果查询是“今天天气怎么样”，意图分类应触发聊天机器人内部的天气服务
    API 并获取结果。


    `deeppavlov` 库提供了许多内置的意图分类模型。在下面的演示中，我们将使用一个名为 SNIPS 的预训练 NLU 基准数据集。它针对以下七种意图进行了训练：


    *   GetWeather


    *   BookRestaurant


    *   PlayMusic


    *   AddToPlaylist


    *   RateBook


    *   SearchScreeningEvent


    *   SearchCreativeWork


    ##### 设置 tensorflow 作为后端


    为了在 Windows 平台上使用 `KerasClassificationModel`，我们需要将 `KERAS_BACKEND` 设置为 “tensorflow”。以下代码用于实现此目的：


    ```

    import os

    os.environ["KERAS_BACKEND"] = "tensorflow"

    ```


    ##### 构建模型


    我们在 virtualenv 或 conda 环境中安装 `deeppavlov`。在下面的命令行示例中，我们创建了一个名为 `deeppavlov` 的
    conda 环境，然后安装并下载了使用 SNIPS 意图所需的库和模型文件：


    ```

    (deeppavlov) C:\Users\Karthik\ Code>python -m deeppavlov install "C:\ProgramData\Anaconda3\Lib\site-packages\deeppavlov\configs\classifiers\intents_snips.json"

    (deeppavlov) C:\Users\Karthik\ Code>python -m deeppavlov download "C:\ProgramData\Anaconda3\Lib\site-packages\deeppavlov\configs\classifiers\intents_snips.json"

    ```


    安装和下载成功后，以下代码使用 `build_model` 方法构建模型。请注意，首次运行此代码时，需要设置 `download = True` 以下载所有必需的预训练模型。下载大小约为
    3GB。


    ```

    from deeppavlov import build_model, configs

    CONFIG_PATH = configs.classifiers.intents_snips  # 也可以是配置字典、字符串路径或 `pathlib.Path`
    实例

    #model = build_model(CONFIG_PATH, download=True)  # 运行一次

    model = build_model(CONFIG_PATH, download=False)  # 否则

    2019-07-02 19:48:10.74 INFO in ''deeppavlov.models.embedders.fasttext_embedder''[''fasttext_embedder'']
    at line 67: [loading fastText embeddings from `C:\Users\Karthik\.deeppavlov\downloads\embeddings\dstc2_fastText_model.bin`]

    Using TensorFlow backend.

    2019-07-02 19:51:04.703 INFO in ''deeppavlov.models.classifiers.keras_classification_model''[''keras_classification_model'']
    at line 273: [initializing `KerasClassificationModel` from saved]

    2019-07-02 19:51:05.866 INFO in ''deeppavlov.models.classifiers.keras_classification_model''[''keras_classification_model'']
    at line 283: [loading weights from model.h5]

    2019-07-02 19:51:07.653 INFO in ''deeppavlov.models.classifiers.keras_classification_model''[''keras_classification_model'']
