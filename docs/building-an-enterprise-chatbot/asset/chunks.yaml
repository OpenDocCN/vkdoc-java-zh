- fmt: '```javascript

    const fetch = require("node-fetch");

    // This is the IRIS API URL endpoint

    const url = "http://localhost:9080/respond";

    function webhooks(controller){

    /* This is the initial message a user sees before interacting with Iris for THE
    first time .

    */

    controller.api.messenger_profile.greeting(''Hi, my name is IRIS. I am continuously
    training to become your Digital Virtual Assistant\''s.'');

    // All messages will be sent to the API.

    controller.hears([''.*''], ''message_received,facebook_postback'', function(bot,
    message) {

    // Facebook request message contains text, senderID, seq, and timestamp.

    var params = {

    message: message.text,

    sender: message.sender.id,

    seq: message.seq,

    timestamp: message. timestamp

    };

    var esc = encodeURIComponent;

    var query = Object.keys(params)

    .map(k => esc(k) + ''='' + esc(params[k]))

    .join(''&'');

    /* fetch makes a HTTP GET call and receives a response and passes the ''message''
    back to Facebook .

    */

    fetch(url +query)

    .then(response => {

    response.json().then(json => {

    bot.reply(message, json.message);

    });

    })

    .catch(error => {

    bot.reply(message, "");

    });

    });

    }

    module.exports = webhooks;

    ```


    3. Add webhook verification. More details on specific of botkit-facebook integration
    are explained in detail at [`www.botkit.ai/docs/readme-facebook.html`](http://www.botkit.ai/docs/readme-facebook.html).


    ```javascript

    var Botkit = require(''botkit'');

    var commandLineArgs = require(''command-line-args'');

    var localtunnel = require(''localtunnel'');

    // Reading static files

    var server = require(__dirname + ''/server.js'');

    var conf = require(__dirname + ''/conf.js'');

    var webhook = require(__dirname + ''/webhooks.js'');

    // Command line arguments to run in local mode vs server; we need to use localtunnel
    to connect to Facebook Messenger webhook in local mode as it requires an HTTPS
    endpoint .

    const ops = commandLineArgs([

    {name: ''lt'', alias: ''l'', args: 1, description: ''Use localtunnel.me to make
    your bot available on the web.'',

    type: Boolean, defaultValue: false},

    {name: ''ltsubdomain'', alias: ''s'', args: 1,

    description: ''Custom subdomain for the localtunnel.me URL. This option can only
    be used together with --lt.'',

    type: String, defaultValue: null},

    ]);

    // Create the Botkit controller, which controls all instances of the bot.

    var controller = Botkit.facebookbot({

    debug: true,

    log: true,

    access_token: conf.access_token,

    verify_token: conf.verify_token,

    app_secret: conf.app_secret,

    validate_requests: true

    });

    // Create server

    var app = server(ops);

    // Receive post data from FB; this will be the messages you receive.

    app.post(''/facebook/receive'', function(req, res) {

    if (req.query && req.query[''hub.mode''] == ''subscribe'') {

    if (req.query[''hub.verify_token''] == controller.config.verify_token) {

    res.send(req.query[''hub.challenge'']);

    } else {

    res.send(''OK'');

    }

    }

    // Respond to Facebook that the webhook has been received.

    res.status(200);

    res.send(''ok'');

    var bot = controller.spawn({});

    // Now, pass the webhook to be processed.

    controller.handleWebhookPayload(req, res, bot);

    });

    // Perform the FB webhook verification handshake with your verify token. The verification
    token is stored in the conf.js file.

    app.get(''/facebook/receive'', function(req, res) {

    if (req.query[''hub.mode''] == ''subscribe'') {

    if (req.query[''hub.verify_token''] == controller.config.verify_token) {

    res.send(req.query[''hub.challenge'']);

    } else {

    res.send(''OK'');

    }

    }else{

    res.send(''NOT-OK'');

    }

    });

    // Ping URL

    app.get(''/ping'', function(req, res) {

    res.send(''{"status":"ok"}'');

    });

    webhook(controller);

    ```


    Once we are all done with the above and have tested the endpoints, we are all
    set to start interacting with IRIS on Facebook Messenger.


    ## Demonstration of AskIris Chatbot in Facebook Messenger


    Let’s go through some example interactions. We can begin interacting with IRIS
    with a simple salutation to which IRIS replies with details about herself. See
    Figure [8-8](#478492_1_En_8_Chapter.xhtml#Fig8).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig8_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Interaction with IRIS


    ### Account Balance


    When the user asks IRIS for an account balance, it responds with a message asking
    for the confidential IPIN in order to proceed forward. As stated previously, demo
    implementation should not be adopted as a practice for setting a PIN. More complex
    and standard security authentication mechanism are available and should be followed.
    Upon a successful IPIN (which is a hard-coded value in the example use case),
    IRIS will retrieve the account balance for the account type the user asked for.
    See Figure [8-9](#478492_1_En_8_Chapter.xhtml#Fig9).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig9_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Asking for account balance details


    ### Claim Status


    The claim example demonstrates


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig10_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Requesting claim status


    * Identification of intent as well as slot required for intent fulfilment in one
    utterance. In example 1 below, intent (`CLAIM_STATUS`) and claim ID (`gi123`)
    are obtained at the same time.

    * This demonstrates the potential of natural language processing to analyze natural
    user utterances, including spelling mistakes.

    * Also, it shows the handling of variations in which the user asks for the same
    information. In example 1, we have natural language-based inference of intent
    and slot. In example 2, since the slot is not obtained, IRIS prompts for this
    information just like any other typical conversation. See Figure [8-10](#478492_1_En_8_Chapter.xhtml#Fig10).


    ### Weather Today


    The weather example is a demonstration of how we can build a chatbot to integrate
    with third-party services in real time. User utterances such as the following
    return the live temperature information as available from the API (see Figure
    [8-11](#478492_1_En_8_Chapter.xhtml#Fig11)):


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig11_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Real time weather info from IRIS


    * What’s the weather in Letterkenny today

    * Dublin weather today

    * Weather in Ranchi now


    ### Frequently Asked Questions


    First, you can see the correct response to an FAQ. Then, when a user utterance
    (`401k`) neither matches any explicit intent nor any document in the knowledge
    repository, IRIS performs a search. See Figure [8-12](#478492_1_En_8_Chapter.xhtml#Fig12).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig12_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    FAQ example


    ### Context Switch Example


    In Figure [8-13](#478492_1_En_8_Chapter.xhtml#Fig13), the user starts by asking
    for a life insurance quote. IRIS prompts for age, smoker info, height, and weight.
    The user provides all other information as expected except for weight. Instead
    of providing weight, user asks for a stock price. Instead of replying to the user
    that they have not entered the weight correctly or that their weight was not recognized,
    IRIS understands the switch in context and hence the switch in intent and seamlessly
    provides the requested detail. Later, when the user asks for life insurance again,
    notice that the already answered questions are not asked again. This is done because
    of short term memory in which these details were stored.


    When the user provides the answer to the question that they didn’t answer earlier,
    the intent is fulfilled and the response is obtained.


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig13_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Life insurance example illustrating context switch'
