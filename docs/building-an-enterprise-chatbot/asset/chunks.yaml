  raw: '## Building a Custom Chatbot for an Insurance Use Case


    We discussed in Chapter [1](#478492_1_En_1_Chapter.xhtml) some of the most common
    applications of a chatbot in the life insurance industry. Now that we have some
    idea of the IRIS core, let’s dive into building an insurance-focused chatbot using
    the IRIS framework.


    At the end of this exercise, our chatbot should be capable of providing


    *   Account balance


    *   Life insurance quotation


    *   Claim status


    *   An advisor


    *   Answers to general enquiries


    *   Market trends


    *   Stock prices


    *   Weather details


    The high-level functional architecture is described in Figure [6-4](#478492_1_En_6_Chapter.xhtml#Fig4).
    There are communication client channels such as Facebook Messenger, web chat,
    and Alexa, via which the users can connect to IRIS. In Figure [6-4](#478492_1_En_6_Chapter.xhtml#Fig4),
    a *channel integration module* acts as a gateway module. It integrates with services
    such as Facebook Messenger, receives the request, and delegates the request for
    IRIS to respond. The response is sent back to Messenger by this module.


    Then there is the IRIS Engine Core that handles all the domain-specific business
    logic that controls the behavior of the chatbot platform as well as defines and
    manages the transition from one state to another. Core connects with the *intent
    classification engine* that predicts the intent from a user’s utterance. The capabilities
    of IRIS that we discussed require an information retrieval module that can query
    its semantic knowledge base, a quotation service that provides life insurance
    quotations based on user inputs, a website search service, a user module that
    connects to a user database to get account balance information, a claims module
    to fetch claim details, and other third-party services to get market trends, stock
    prices, and weather information.


    ![../images/478492_1_En_6_Chapter/478492_1_En_6_Fig4_HTML.jpg](images/478492_1_En_6_Chapter/478492_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    High-level function architecture


    We require the following intents to be defined for our example use case:


    *   `AccountBalanceIntent`


    *   `AskForQuoteIntent`


    *   `ClaimStatusIntent`


    *   `ExitIntent`


    *   `FindAdvisorIntent`


    *   `GeneralQueryIntent`


    *   `GetAccTypeIntent`


    *   `GetClaimIdIntent`


    *   `MarketTrendIntent`


    *   `StockPriceIntent`


    *   `WeatherIntent`


    ### Creating the Intents


    Let’s create a User Intent class named `AccountBalanceIntent`:


    ```

    public class AccountBalanceIntent extends Intent {

    public AccountBalanceIntent() {

    super("accountBalanceIntent");

    }}

    ```


    All the other intent classes are created in the same way with their intent names.
    Some of these intents will have one or more slots defined as well.


    `AskForQuoteIntent` requires four slots to provide a life insurance quote in our
    example:


    *   Age (`CustomNumericSlot` type)


    *   Height (`CustomNumericSlot` type)


    *   Smoker (`BooleanLiteralSlot` type)


    *   Weight (`CustomNumericSlot` type)


    `AccountBalanceIntent` requires two slots: account type for which the account
    balance is required and a user PIN to authenticate the user. ipin is just a way
    of demonstrating how a very basic authentication can be performed. In an actual
    implementation, more complex forms of authentication should be used.


    *   Account Type (`AccTypeSlot` type)


    *   ipin (`IPinSlot` type)


    `ClaimStatusIntent` and `GetClaimIdIntent` intents require claimId (`AlphaNumericSlot`
    type)


    #### CustomNumericSlot


    Next, let’s see the code showing how the above mentioned slot types are implemented
    for providing a simple approach to fulfill our requirements:


    ```

    /*

    * Custom numeric slot

    */

    public class CustomNumericSlot extends Slot {

    private String name;

    public CustomNumericSlot(String name) {

    super();

    this.name = name;

    }

    /*

    * match CustomNumericSlot takes user utterance and returns MatchedSlot if there
    is a slot match.

    * In this method we use regex and hard-coded words to number logic to identify
    if there is a number.

    * example - 18, eighteen

    */

    public MatchedSlot match(String utterance) {

    String token = utterance.replaceAll("[^0-9]+", "");

    if (token.isEmpty()) {

    token = String.valueOf(wordStringToNumber(utterance));

    }

    return new MatchedSlot(this, token, token.toLowerCase());

    }

    /*

    * This method converts words to numbers. The logic is derived from https://stackoverflow.com/questions/26948858/converting-words-to-numbers-in-java.

    */

    public Number wordStringToNumber(String wordString) {

    if (wordString == null || wordString.length() < 1) {

    return null;

    }

