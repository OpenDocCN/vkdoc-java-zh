    ## Continuous Improvement Framework


    In practical cases, it is very possible that a user’s utterances are not classified
    or understood by our intent engine due to several reasons such as the utterance
    being an external intent not part of the intent engine or the intent engine not
    confident due to the low intent match score. In a production environment, it is
    observed that there are a decent number of user utterances that are either misunderstood
    or not understood by the engine at all. We propose a framework that can help IRIS
    to become smarter and more intelligent towards mimicking a natural human conversation.


    In the self-learning module, we propose three improvement components, shown in
    Figure [9-20](#478492_1_En_9_Chapter.xhtml#Fig20):


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig20_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig20_HTML.jpg)


    Figure 9-20


    IRIS functional components for continuous improvement


    *   Intent confirmation (double-check)

    *   Next intent prediction

    *   A human in the loop


    ### Intent Confirmation (Double-Check)


    Let’s take an example of a user’s utterance of “life insurance,” which may match
    with one of the possible intent scenarios; see Figure [9-21](#478492_1_En_9_Chapter.xhtml#Fig21).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig21_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig21_HTML.jpg)


    Figure 9-21


    Intent matches and corresponding scores


    When we match the user utterance against the list of possible intents shown in
    Figure [9-21](#478492_1_En_9_Chapter.xhtml#Fig21), we get a list of intents and
    respective match scores. The intent engine module of IRIS returns with an intent
    match only when the match score is above 0.75. We also call this as the minimum
    threshold score below which an intent match is not considered in response. In
    the example of “life insurance,” `LIFE_INSURANCE_QUOTE_INTENT` is returned in
    response from the intent engine.


    An optimization to this implementation could be to introduce a minimum match score
    that is below the threshold score but relevant enough for further processing.
    We previously stated that the minimum threshold score is the score below which
    an intent match is not returned in response from the intent classification engine.
    A minimum match score is the score above which an intent is considered for further
    processing if it does not match the minimum threshold score.


    Let’s understand with another example of a user utterance: “life insurance cost,”
    for which the match score is shown in Figure [9-22](#478492_1_En_9_Chapter.xhtml#Fig22).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig22_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig22_HTML.jpg)


    Figure 9-22


    Another example showing different intent matches and corresponding scores


    In this example, the scores are below the minimum threshold score and in the current
    implementation the user utterance will default to search since no explicit intent
    was returned by the intent classification engine. If we consider a minimum match
    score of 0.5, intent `LIFE_INSURANCE_QUOTE_INTENT` could be considered for further
    confirmation.


    These scores of 0.75 (minimum threshold score) and 0.5 (minimum match score) should
    be derived from training and test datasets, and could also change later on based
    on actual user utterance data and performance of intent classification engine.


    Hence, we could make changes in IRIS to prompt for confirmation if the utterance
    was classified between 0.5 to 0.75.


    With the above implementation, a typical conversation can then flow in the following
    ways:


    ```

    User: Hello

    IRIS: Hello

    User: life insurance cost

    IRIS: I could not understand your query correctly.  Do you want a life insurance
    quote?

    User: Yes

    IRIS: Sure, I can help you with that. May I know your age?

    ```


    ### Predict Next Intent


    This functionality enables IRIS to use logs to understand and predict the possible
    next best intent of the user. Figure [9-23](#478492_1_En_9_Chapter.xhtml#Fig23)
    shows user logs.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig23_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig23_HTML.jpg)


    Figure 9-23


    User logs with intent and sequence


    In a simple summarization of INTENT-A, shown in Figure [9-24](#478492_1_En_9_Chapter.xhtml#Fig24),
    we find that INTENT-B is the most frequent next intent overall.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig24_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig24_HTML.jpg)


    Figure 9-24


    Log summarization to predict next intent sequence


    We can also use techniques of path prediction, association rules, and frequent
    itemsets to obtain the most predictable next user intent.


    A typical conversation with IRIS without the predicted intent may happen as follows:


    ```

    User: Hi

    IRIS: Hello

    User: I want a life insurance quote

    IRIS: Sure, I will help you with that. May I know your age?

    User: My age is 24

    IRIS: Have you smoked in the last 12 months?

    User: no

    IRIS: What''s your height?

    User: my height is 181 cms

    IRIS: What''s your weight?

    User: 163 pounds

    IRIS: Great news! You are eligible for an accelerated UW decision.

    User: Thanks. I would like to buy life insurance policy.

    IRIS: Sure. Can you provide me your email ID so that I start with the application
    process?

    User: user@gmail.com

    ....

    ```


    With predicted next intent capability, this conversation would happen like:


    ```

    User: Hi

    IRIS: Hello

    User: I want a life insurance quote

    IRIS: Sure, I will help you with that. May I know your age?

    User: My age is 24

    IRIS: Have you smoked in the last 12 months?

    User: no

    IRIS: What''s your height?

    User: my height is 181 cms

    IRIS: What''s your weight?

    User: 163 pounds

    IRIS: Great news! You are eligible for an accelerated UW decision. May I know
    your email ID so that I can start with the application process?

    User: user@gmail.com

    ....

    ```'
