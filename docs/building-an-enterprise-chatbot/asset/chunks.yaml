    using the method `doc2bow`. The BOW can then be serialized using MmCorpus and
    stored as `review.mm`. Another popular approach is to represent the words in an
    n-gram, where the text is ordered rather than unordered in case BOW. N-grams helps
    to find the cooccurrence among words.


    ```

    corpus = [dictionary.doc2bow(text) for text in texts]

    corpora.MmCorpus.serialize(''review.mm'', corpus)

    ```


    #### Training the Model Using LDA


    Finally, using the bag-of-words dictionary of words, we train the latent Dirichlet
    allocation model. LDA is a generative statistical model where, given an input
    variable X and target variable Y, the model based on joint probability is *X* ∗ *Y*, *P*(*X*,
    *Y*). LDA is a favorite machine learning model widely used in topic modeling.
    Each document (in our example, each review) is a mixture of various topics, where
    each document is assigned a set of topics by LDA.


    For example, the LDA model may assign a topic for a review (documents), something
    like “corn chips” related. This topic has probabilities of generating various
    words like “crispy,” “tasty,” and so on.


    ```

    from gensim import models

    tfidf = models.TfidfModel(corpus)

    corpus_tfidf = tfidf[corpus]

    lsi = models.LsiModel(corpus_tfidf, id2word=dictionary, num_topics=2)

    corpus_lsi = lsi[corpus_tfidf]

    lsi.print_topics(2)

    [(0,

    ''0.556*"it" + 0.542*"tasted" + 0.428*"as" + 0.328*"chip" + 0.328*"corn" + 0.000*"i"''),

    (1,

    ''-0.804*"tasted" + 0.528*"it" + 0.190*"corn" + 0.190*"chip" + 0.041*"as" + 0.000*"i"'')]

    ```


    The gensim library provides a method called `LsiModel()` , which trains an LDA
    model. Latent semantic indexing (LSI) is used in the context of LDA’s application
    in information retrieval.


    In the model above, we set `num_topics = 2`, asking the model to generate two
    topics. The following two topics give weight to “corn” and “chip,” which seems
    to be the topic from the three reviews we used for training.


    1.  **Topic 1:** 0.556∗“it” + 0.542∗“tasted” + 0.428∗“as” + ***0.328*“chip” +
    0.328*“corn”*** + 0.000∗“i”


    2.  **Topic 2:** -0.804∗“tasted” + 0.528∗“it” + ***0.190*“corn” + 0.190*“chip”***
    + 0.041∗“as” + 0.000∗“i”


    Note that a more accurate model would need plenty of data for training and perhaps
    many more interesting topics might evolve.


    ## Natural Language Generation


    Natural language generation is a subfield of NLP and computational linguistics
    that can produce understandable human text in various languages. The ability to
    use the language representation and knowledge of the domain to produce documents,
    explanations, help messages, reports, and even poems makes NLG the most researched
    area just now.^([⁷](#fn7)) In the future, NLG will play a vital role in human-computer
    interfaces.


    The significant differences between NLU and NLG are that NLP maps sentences into
    internal semantic representations (called parsing in NLU systems), whereas NLG
    maps the semantic representation into surface sentences (called realization in
    NLG systems). Both of these types of mapping are achieved through bidirectional
    grammar, which uses a declarative representation of a language’s grammar.


    We will demonstrate NLG applications using Python- and Java-based libraries like
    markovify and simpleNLG. We will also use a deep learning model for text generation.
    Such deep learning models are behind the popular use cases where machines are
    writing poems or generating musical notes given a sizeable corpus of data.


    Some popular applications of NLG are


    *   Automating the documentation of code and procedures


    *   Generating reports from financial data or annual reports


    *   Summarizing graphical reports and numbers from tabular data


    *   Generating discharge summaries and pathology reports


    *   Helping meteorologists compose weather forecasts


    There are many more use cases that are evolving quickly, especially with the emerging
    sophistication of deep learning algorithms and increasing computation power of
    machines.


    ### Markov Chain-Based Headline Generator


    The Markov chain model is a stochastic model describing the sequence of possible
    events in which the probability of each event depends only on the state achieved
    in the previous state. Markov chains statistically model random processes. Markov
    chains are defined by transition probabilities and states, where a process moves
    from one state to another based on a preset probability value.


    Markov chain models are mathematically robust methods that give superior results
    if modeled correctly. Unlike many machine learning algorithms, which work in a
    brute-force approach, Markov chains need a diligent design to model a stochastic
    process.


    The following are some applications of Markov chains:


    *   Computer simulation of numerous real-world phenomena such as weather modeling,
    stock market fluctuations, and water flow in a dam


    *   Biological modeling like population processes


    *   Algorithmic music composition


    *   Model boards game like Snakes and Ladders or Hi Ho! Cherry-O


    *   Population genetics to describe changes in gene frequencies in small populations
    affected by genetic drift


    Let’s use the markovify library from Python to generate some headlines.


