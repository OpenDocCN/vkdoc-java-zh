  trans: "\n## 总结\n\n在本章中，我们展示了如何扩展 IRIS 的功能以支持与各种第三方服务的集成。同时，也解释了如何连接企业数据库以获取用户数据。我们讨论了\
    \ IRIS 对外暴露的集成模块，并实现了 IRIS 与 Facebook Messenger 的集成，遵循了成功集成所需的逐步流程。\n\n最后，我们演示了与\
    \ Facebook Messenger 和 IRIS 交互的实际效果，通过示例展示了几种用例，并解释了前几章讨论内容在后台的实现原理。\n\n在下一章中，我们将讨论如何将这个内部框架部署到云端。我们将探索将服务部署到\
    \ AWS 的多种方式，并逐步介绍如何在 5 分钟内将 IRIS 与 Alexa 集成。最后，我们将讨论如何改进该框架，以及进一步优化的空间，例如实现反馈循环。\n\
    \n# 9. 部署与持续改进框架\n\n在前几章中，我们从零开始设计了一个基础聊天机器人框架，并探索了与第三方服务及其他后端系统的集成选项。同时，我们也解释了如何将\
    \ IRIS 聊天机器人框架以 Spring Boot REST API 的形式对外暴露。\n\n在本章中，我们将讨论将 IRIS 部署到远程服务器的不同方式，并介绍如何在\
    \ 5 分钟内将 IRIS 与 Alexa 集成。在本章末尾，我们将讨论如何通过实现自学习模块并将人工介入纳入循环，将 IRIS 扩展为持续改进框架的一部分。\n\
    \n## 部署到云端\n\n通过 RESTful API 暴露的 IRIS 框架可以通过多种方式部署到远程服务器。在本节中，我们将讨论三种不同的方式。\n\n\
    ### 在 AWS EC2 上作为独立的 Spring Boot JAR 运行\n\n这是 Spring Boot JAR 最基本的安装和部署方式。我们只需几个步骤即可让\
    \ JAR 在 EC2 机器的 8080 端口上运行。\n\n我们登录 AWS 账户，从图 9-1 所示的服务列表中选择 EC2。EC2 代表 AWS 提供的弹性计算云服务器。更多关于\
    \ EC2 的详细信息，请访问 [`https://aws.amazon.com/ec2/`](https://aws.amazon.com/ec2/)。\n\
    \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig1_HTML.jpg](img/478492_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1\n\n不同的 AWS 服务\n\n我们从 EC2 控制台启动一个 EC2 实例，如图 9-2 所示。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig2_HTML.jpg](img/478492_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2\n\n在 AWS 上启动 EC2 实例向导\n\n启动 EC2 实例需要七个步骤：\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig3_HTML.jpg](img/478492_1_En_9_Fig3_HTML.jpg)\n\
    \n图 9-3\n\nEC2 安全组入站规则配置\n\n1.  我们选择一个 AMI（Amazon 机器镜像）。我们使用 Amazon Linux 2 AMI\
    \ (HVM)，SSD 卷类型，64 位 x86。\n\n2.  我们选择实例类型。我们选择 **t2.micro**（如果您是首次使用 AWS 服务，该类型也符合免费套餐资格）。t2.micro\
    \ 实例具有一个 vCPU 和 1 GB 内存，足以运行 API。\n\n3.  下一步需要配置实例详细信息。我们可以使用检查清单来防止意外终止。此步骤为可选。\n\
    \n4.  下一步我们添加存储详细信息。默认情况下，我们获得 8GB 的 SSD，并且该卷已挂载到实例。但是，如果需要，我们可以添加更多卷或增加默认卷的存储空间。此步骤也是可选的，对于演示部署来说，8GB\
    \ 的存储空间已足够。\n\n5.  我们为实例和存储卷添加标签，以便更好地管理 EC2 资源。这也是可选的。\n\n6.  如图 9-3 所示，此步骤需要配置安全组。安全组是一组防火墙规则，用于控制实例的流量。\n\
    \n我们希望将端口 80 暴露给所有来源访问，而端口 22（安全 Shell 端口）仅允许从我们的本地机器访问。\n\n1.  我们审查配置并启动实例。每个\
    \ EC2 实例都需要一个密钥对 PEM 文件，以便我们安全地登录实例。系统会要求我们生成一个新文件，或者我们可以使用现有文件。\n\n    现在，一旦实例启动，它将拥有一个公共\
    \ DNS 名称或 IPv4 公共 IP，我们可以使用它来登录。\n\n2.  从任何 Unix 机器登录的命令：\n\n    ```\n    ssh\
    \ -i chatbot-iris.pem ec2-user@ec2-instance-ip.compute-1.amazonaws.com\n    ```\n\
    \n3.  登录后，我们可以使用 SCP 命令从本地复制 Spring Boot JAR：\n\n    ```\n    scp -i chatbot-iris.pem\
    \ /path/to/iris.jar ec2-user@ec2-instance-ip.compute-1.amazonaws.com:/path/to/your/jarfile\n\
    \    ```\n\n4.  复制 JAR 后，我们可以通过执行以下命令来运行它：\n\n    ```\n    java -jar path/to/your/jarfile.jar\
    \ fully.qualified.package.Application\n    ```\n\n5.  默认情况下，服务器在端口 8080 上启动。但是，如果我们想更改端口设置，可以使用命令行选项（例如\
    \ `-DServer.port=8090`）将 `server.port` 设置为系统属性，或者在 `src/main/resources/` 中添加包含\
    \ `server.port=8090` 的 `application.properties` 文件。\n\n如果我们使用 Maven 构建代码，也可以使用：\n\
    \n```\nmvn spring-boot:run\n```\n"
- fmt: "### As a Docker Container on AWS EC2\n\nDocker performs operating-system-level\
    \ virtualization. Docker is used to run software packages called containers. Docker\
    \ makes it easier from an operations perspective because it packages the code,\
    \ libraries, and runtime components together as Docker images that can be deployed\
    \ with a lot of ease. For more details on Docker, visit [`www.docker.com/`](https://www.docker.com/).\n\
    \nWe perform the following steps to run an application on Docker on EC2:\n\n1.\
    \ We update the installed packages and package cache on the instance:\n\n    ```\n\
    \    sudo yum update -y\n    ```\n\n2. We install the most recent Docker Community\
    \ Edition package:\n\n    ```\n    sudo amazon-linux-extras install docker\n \
    \   ```\n\n3. We start the Docker service:\n\n    ```\n    sudo service docker\
    \ start\n    ```\n\n4. We add the `ec2-user` to the Docker group in order to execute\
    \ Docker commands without using `sudo`:\n\n    ```\n    sudo usermod -a -G docker\
    \ ec2-user\n    ```\n\n5. We log out and log back in again to pick up the new\
    \ Docker group permissions. To do so, we close the current SSH terminal window\
    \ and reconnect to an instance in a new one. The new SSH session will have the\
    \ appropriate Docker group permissions.\n\n6. We verify that the `ec2-user` can\
    \ run Docker commands without `sudo`.\n\n7. We create a `Dockerfile` in the root\
    \ directory of the code base. A `Dockerfile` is a manifest that describes the\
    \ base image to use for the Docker image and whatever is installed and running\
    \ on it. This `Dockerfile` uses the `openjdk:8-jdk-alpine` image because we are\
    \ building an image of a Java application. The `VOLUME` instruction creates a\
    \ mount point with the specified name and marks it as holding externally mounted\
    \ volumes from native host or other containers. The `ARG` instruction defines\
    \ a variable that users can pass at build-time to the builder. The JAR is named\
    \ as `app.jar`, and an `ENTRYPOINT` allows us to configure a container that will\
    \ run as an executable. It contains the command to run the JAR:\n\n    ```\n \
    \   FROM openjdk:8-jdk-alpine\n    VOLUME /tmp\n    ARG JAR_FILE\n    ADD ${JAR_FILE}\
    \ app.jar\n    ENTRYPOINT [\"java\",\"-Djava.security.egd=file:/dev/./urandom\"\
    ,\"-jar\",\"/app.jar\"]\n    ```\n\n8. We build a Docker image by issuing the\
    \ following command:\n\n    ```\n    docker build -t iris --build-arg JAR_FILE=\"\
    JAR_NAME\".\n    ```\n\n    The following is the output from the build command\
    \ executed on a machine:\n\n    ```\n    Sending build context to Docker daemon\
    \   21.9MB\n    Step 1/5 : FROM openjdk:8-jdk-alpine\n    8-jdk-alpine: Pulling\
    \ from library/openjdk\n    bdf0201b3a05: Pull complete\n    9e12771959ad: Pull\
    \ complete\n    c4efe34cda6e: Pull complete\n    Digest: sha256:2a52fedf1d4ab53323e16a032cadca89aac47024a8228dea7f862dbccf169e1e\n\
    \    Status: Downloaded newer image for openjdk:8-jdk-alpine\n    ---> 3675b9f543c5\n\
    \    Step 2/5 : VOLUME /tmp\n    ---> Running in dc2934059ab8\n    Removing intermediate\
    \ container dc2934059ab8\n    ---> 0c3b61b6f027\n    Step 3/5 : ARG JAR_FILE\n\
    \    ---> Running in 36701bf0a68e\n    Removing intermediate container 36701bf0a68e\n\
    \    ---> da1c1f51c29d\n    Step 4/5 : ADD ${JAR_FILE} app.jar\n    ---> 0aacdba5baf0\n\
    \    Step 5/5 : ENTRYPOINT [\"java\",\"-Djava.security.egd=file:/dev/./urandom\"\
    ,\"-jar\",\"/app.jar\"]\n    ---> Running in f40f7a276e18\n    Removing intermediate\
    \ container f40f7a276e18\n    ---> 493abfce6e8c\n    Successfully built 493abfce6e8c\n\
    \    Successfully tagged iris:latest\n    ```\n\n9. We run the newly created Docker\
    \ image via the following command:\n\n    ```\n    docker run -t -i -p 80:80 iris\n\
    \    ```\n\n### As an ECS Service\n\nIn the previous two methods, you saw that\
    \ you could deploy and run the Spring Boot JAR as a standalone service or by installing\
    \ Docker and using it to run the API in the Docker container. This method discusses\
    \ a service of AWS called ECS (Elastic Container Service). See Figure [9-4](#478492_1_En_9_Chapter.xhtml#Fig4).\n\
    \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig4_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\n\nDiagram of ECS objects and how they relate\n\nAmazon ECS makes\
    \ it easy to deploy, manage, and scale Docker containers running applications,\
    \ services, and batch processes. Amazon ECS places containers across your cluster\
    \ based on your resource needs and is integrated with familiar features like elastic\
    \ load balancing, EC2 security groups, EBS volumes, and IAM roles. More details\
    \ on ECS can be found at [`https://aws.amazon.com/ecs/`](https://aws.amazon.com/ecs/).\n\
    \nThere are various steps required in running Docker images on ECS. Here’s a walkthrough\
    \ of the deployment process via the AWS management console:\n\n1. When discussing\
    \ how to deploy a JAR as a Docker container on AWS EC2, we created a Docker image.\
    \ We need to add this previously created Docker image to ECR. Amazon Elastic Container\
    \ Registry (ECR) is a fully-managed container registry that makes it easy for\
    \ developers to store, manage, and deploy container images.\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig5_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5\n\nCreating an ECR repository in AWS\n\nOnce the repository is created\
    \ as shown in Figure [9-5](#478492_1_En_9_Chapter.xhtml#Fig5), the next step is\
    \ to tag the Docker image so we can push the image to this repository:\n\n```\n\
    docker tag iris:latest aws_account_id.dkr.ecr.us-east-1.amazonaws.com/iris:latest\n\
    ```\n\nThen we run the following command to push this image to ECR repository:\n\
    \n```\ndocker push aws_account_id.dkr.ecr.us-east-1.amazonaws.com/iris:latest\n\
    ```\n\nMore details on pushing Docker images to ECR can be found at [`https://docs.aws.amazon.com/AmazonECR/latest/userguide/docker-push-ecr-image.html`](https://docs.aws.amazon.com/AmazonECR/latest/userguide/docker-push-ecr-image.html).\n\
    \n2. Then we need to define the container definition. In the ECS service in the\
    \ AWS management console, under Get Started, we can choose a container definition\
    \ to use. We need to provide the ECR repository URL and Docker image name and\
    \ tag, as shown in Figure [9-6](#478492_1_En_9_Chapter.xhtml#Fig6).\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig6_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6\n\nContainer definition configuration\n\n3. We define the task definition.\
    \ A task definition is a blueprint for an application and describes one or more\
    \ containers through attributes. Some attributes are configured at the task level,\
    \ but the majority of attributes are configured per container. In Figure [9-7](#478492_1_En_9_Chapter.xhtml#Fig7),\
    \ we create a task definition for IRIS.\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig7_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7\n\nTask definition\n\n4. Define a service. A service allows us to\
    \ run and maintain a specified number (the desired count) of simultaneous instances\
    \ of a task definition in an ECS cluster. See Figure [9-8](#478492_1_En_9_Chapter.xhtml#Fig8).\n\
    \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig8_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8\n\nService definition details\n\n5. We configure a cluster. The infrastructure\
    \ in a Fargate cluster is fully managed by AWS. Our containers run without us\
    \ managing and configuring individual Amazon EC2 instances. See Figure [9-9](#478492_1_En_9_Chapter.xhtml#Fig9).\n\
    \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig9_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig9_HTML.jpg)\n\
    \nFigure 9-9\n\nCluster configuration details"
