    ### TextBlob


    TextBlob is a simple library for beginners in NLP. Although it offers few advanced
    features like machine translation, it is through a Google API. It is for simply
    getting to know NLP use cases and on generic datasets. For more sophisticated
    applications, consider using spaCy or CoreNLP.


    #### POS Tags and Noun Phrase


    Similar to the other libraries, TextBlob provides method `tags` to extract the
    POS from a given sentence. It also provides the `noun_phrase` method.


    ```

    #First, the import

    from textblob import TextBlob

    #create our first TextBlob

    s_text = TextBlob("Building Enterprise Chatbot that can converse like humans")

    #Part-of-speech tags can be accessed through the tags property.

    s_text.tags

    [(''Building'', ''VBG''),

    (''Enterprise'', ''NNP''),

    (''Chatbot'', ''NNP''),

    (''that'', ''WDT''),

    (''can'', ''MD''),

    (''converse'', ''VB''),

    (''like'', ''IN''),

    (''humans'', ''NNS'')]

    #Similarly, noun phrases are accessed through the noun_phrases property

    s_text.noun_phrases

    WordList([''enterprise chatbot''])

    ```


    #### Spelling Correction


    Spelling correction is an exciting feature of TextBlob, which is not provided
    in the other libraries described in this chapter. The implementation is based
    on a simple technique provide by Peter Norvig, which is only 70% accurate. The
    method `correct` in TextBlob provides this implementation.


    In the following code, the word “converse” is misspelled as “converce,” which
    the `correct` method was able to identify correctly. However, it made a mistake
    in changing the word “Chatbot” to “Whatnot.”


    ```

    # Spelling correction

    # Use the correct() method to attempt spelling correction.

    # Spelling correction is based on Peter Norvig''s "How to Write a Spelling Corrector"
    as implemented in the pattern library. It is about 70% accurate

    b = TextBlob("Building Enterprise Chatbot that can converce like humans. The future
    for chatbot looks great!")

    print(b.correct())

    Building Enterprise Whatnot that can converse like humans. The future for charcot
    looks excellent!

    ```


    #### Machine Translation


    The following code shows a simple example of text translated from English to French.
    The method `translates` calls a Google Translate API, which takes an input “to”
    where we specify the target language to translate. There is nothing novel in this
    implementation; it is a simple API call.


    ```

    #Translation and language detection

    # Google Translate API powers language translation and detection.

    en_blob = TextBlob(u''Building Enterprise Chatbot that can converse like humans.
    The future for chatbot looks great!'')

    en_blob.translate(to=''fr'')

    TextBlob("Construire un chatbot d''entreprise capable de converser comme un humain.
    L''avenir de chatbot est magnifique!")

    ```


    ### Multilingual Text Processing


    In this section, we will explore the various libraries and capabilities in handling
    languages other than English. We find the library spaCy is one of the best in
    terms of number of languages it supports, which currently stands at more than
    50. We will try to perform language translation, POS tagging, entity extraction,
    and dependency parsing on text taken from the popular French news website [`www.lemonde.fr/`](http://www.lemonde.fr/).


    #### TextBlob for Translation


    As shown in the example above, we use TextBlob for machine translation so non-French
    readers can understand the text we process.


    The English translation of the text shows that the news is about a match to be
    played on Friday between two French tennis players, Paire and Mahut, in Roland-Garros.


    ```

    from textblob import TextBlob

    #A News brief from the French news website: https://www.lemonde.fr/

    fr_blob = TextBlob(u"Des nouveaux matchs de Paire et Mahut au retour du service
    à la cuillère, tout ce qu''il ne faut pas rater à Roland-Garros, sur les courts
    ou en dehors, ce vendredi.")

    fr_blob.translate(to=''en'')

    TextBlob("New matches of Paire and Mahut after the return of the service with
    the spoon, all that one should not miss Roland-Garros, on the courts or outside,
    this Friday.")

    ```


