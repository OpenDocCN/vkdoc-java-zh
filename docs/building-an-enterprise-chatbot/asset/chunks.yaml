    session.removeAttribute("age");

    session.removeAttribute("smoked");

    session.removeAttribute("weight");

    return answer;

    }

    ```


    ### `Start` State


    This state is the starting state and the “current” state by default when the user
    interacts in a new session. A start state is never executed due to the result
    of any behavior.


    ```

    public String execute(MatchedIntent matchedIntent, Session session) {

    throw new IllegalStateException("You shouldn''t be executing this state!");

    }

    ```


    ### `GeneralQuery` State


    We mentioned that in a chatbot where there are multiple intents such as a user
    looking for account balance, claim status, weather details, life insurance quote,
    etc., the general query is not an explicit intent. We classify an utterance into
    a general query if no other intent matches explicitly.


    In the general query state, we perform two steps:


    1.  Match if a user utterance is a question that has an answer in our knowledge
    repository. The knowledge repository is where the most frequently asked questions
    and their answers are stored. A knowledge repository could also have general user
    information parsed and stored in a way that can be queried to find a meaningful
    answer. A knowledge repository could be represented in the form of a graph, RDF
    semantic web, or implemented using a simple search engine.


    2.  If there is no matching answer in our knowledge repository, we perform a search
    on our portal to find any matching result that could be replied to the user. If
    there is no response from the search service as well, we reply to the user saying
    we cannot help on this ask because we don’t have much information about it now.


    ```

    public String execute(MatchedIntent matchedIntent, Session session) {

    String answer = "I am so Sorry, I do not have any information related to your
    query. Can I help you with something else?";

    String uri = "https://www.dummy-knowledge-base-service-url?inputString=";

    uri = uri + matchedIntent.getUtterance();

    RestTemplate restTemplate = new RestTemplate();

    String result = restTemplate.getForObject(uri, String.class);

    ObjectMapper mapper = new ObjectMapper();

    try {

    if(result!=null){

    /*

    * If the result is not null and contains a response (answer), we parse that information
    and assign it to the answer variable answer = "PARSED-INFORMATION from result"
    + "\nAnything else that you would like to ask?";

    */

    }

    else{

    /*

    * If no answer was obtained from the knowledge repository, then to back fill with
    some valid response, we call the enterprise search API and pass the utterance
    as a search string.

    */

    uri = "https://www.my-enterprise-website.com/searchservice/fullsearch?&inputSearchString=";

    /*

    *  The utterance is added to the HTTP GET request. Depending on the implementation
    it could be GET or POST and the service may have different parameters.

    */

    uri = uri + matchedIntent.getUtterance();

    result = restTemplate.getForObject(uri, String.class);

    mapper = new ObjectMapper();

    try {

    /*

    * Here we try to parse the JSON response and if there is a result with a decent
    score returned from the search engine, we read the title and description of the
    result and add it before sending the response back.

    */

    answer = "Sorry I do not have an exact answer to this right now. "

    + "You may get some details on the page - " + "TITLE OF THE PAGE OBTAINED FROM
    RESPONSE"

    + ". Click here -> " + "URL LINK" + " for more info."

    + "\nAnything else that you would like to ask?";

    } catch (Exception e) {

    answer = "I am so Sorry, I do not have any information related to your query.
    Can I help you with something else?";

    }

    }

    } catch (Exception e) {

    e.printStackTrace();

    answer = "I am so Sorry, I do not have any information related to your query.
    Can I help you with something else?";

    }

    return answer;

    }

    ```


    Market trends, stock prices, weather state, and claim status state require integration
    with third-party data sources or connecting to a database. We will discuss this
    in the next chapter in detail.'
