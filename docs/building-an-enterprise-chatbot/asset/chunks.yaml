- fmt: '# Summary


    Let’s summarize what we discussed in this chapter. We started with the idea of
    building a basic chatbot framework and why a custom designed chatbot is needed
    for the enterprise. Then we discussed the core components of the framework.


    First, we discussed intents, utterances, and slots, and defined a custom intent
    and slot matcher. We also created the `MatchedSlot` and `MatchedIntent` classes.


    Then we discussed IRIS memory and how the session can be used to store attributes
    for the long term and the short term. We discussed the `Session` and `SessionStorage`
    classes.


    We then discussed how a conversation can be modeled as a state machine problem.
    We discussed the different components of a state machine such as states, transitions,
    shields, and the `StateMachine` backbone class.


    Then we discussed an insurance-focused use case capable of performing certain
    actions based on different intents and states. We defined various intents, slots,
    and slot types for the use case. We added these definitions to the configuration
    class.


    We then discussed all the possible states for the use case and explained the execution
    part of all of these states. As some of the states require a validator before
    transition, we discussed shields that are required for our example use case. We
    briefly talked about the general query state and how to leverage an enterprise
    search in case the utterance is not classified into any of the explicit intents
    and does not match any document in the knowledge repository.


    We then described possible transitions from one state to another depending on
    the user intent.


    We then discussed `StateMachineManager`, which uses the configuration and performs
    intent matching before triggering state actions.


    Lastly, we discussed how to make IRIS functional. We briefly explained how to
    expose IRIS as a REST service by the creation of service and controller layers.


    In the next chapter, we will discuss the other chatbot frameworks available in
    the marketplace such as RASA, Google Dialogflow, and Microsoft Bot Framework.
    These frameworks, unlike our build-from-scratch approach, provide many plug-and-play
    features and make development faster. However, we recommend that you understand
    the requirements of your enterprise thoroughly before making a choice between
    the available frameworks.


    # 7. Introduction to Microsoft Bot, RASA, and Google Dialogflow


    In the previous chapter, we discussed how to build an in-house chatbot framework
    with natural language and conversation capabilities. Building a solution from
    scratch has advantages that we discussed previously. However, there are use cases
    and scope where it could be easier, quicker, and cheaper to use readily available
    online intent classification and conversation management frameworks to build your
    chatbot client.


    In this chapter, we will introduce some of the popular online chatbot frameworks
    and how to use them.


    ## Microsoft Bot Framework


    Microsoft Bot Framework is a comprehensive framework for building enterprise-grade
    conversational AI experiences. It offers a set of cognitive services through its
    cloud hosting service called Azure. Azure Cognitive Services enable us to build
    intelligent enterprise-grade bots. We can use its QnA Maker service to build a
    quick FAQ bot or use LUIS (Language Understanding Intelligent Service) to build
    a sophisticated virtual assistant. Figure 7-1 shows the various cognitive services
    of the bot framework and other components required for an end-to-end conversational
    AI experience.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig1_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig1_HTML.jpg)


    Figure 7-1 Components of a bot framework


    ### Introduction to QnA Maker


    Microsoft’s QnA Maker provides a quick way of building a bot on FAQ URLs, structured
    documents, manuals, and soon. Its powerful crawler and parser engine extracts
    all possible questions and answers from the content and makes them available via
    bot. It is a cognitive service tool that builds and trains a simple QnA bot.


    QnA Maker is a free service that responds to a user’s utterances or asks in a
    natural conversational way. It is able to provide helpful answers to semi-structured
    data with its question/answer mechanism based on its language processing techniques.


    A common challenge for most informational bot scenarios is to separate out the
    content management from the bot design and development, since content owners are
    usually domain experts who may not be technical. QnA Maker addresses this by enabling
    a no-code QnA management experience.


    QnA Maker allows you to edit, remove, or add QnA pairs with an easy-to-use interface
    and then publish your knowledge base as an API endpoint for a bot service. It’s
    simple to train the bot using a familiar chat interface, and the active learning
    feature automatically learns question variations from users over time and adds
    them to the knowledge base. Use the QnA Maker endpoint to seamlessly integrate
    with other APIs like a language understanding service and speech APIs to interpret
    and answer user questions in different ways.


    We discussed previously that having a knowledge base is essential to answer users’
    queries. It is the underlying information repository that provides answers to
    users’ queries. A knowledge base is a logical term for various types of structured,
    semi-structured, and unstructured information that can be stored in an underlying
    database with test processing capabilities. QnA Maker exposes its knowledge base/database
    through API services.


    Once we create an account and log in to `www.qnamaker.ai`, it will ask us to create
    a new knowledge base.


    The first step is to create a new Azure QnA service for our knowledge base, which
    requires creation of the following in Azure:


    1. **Creation of a resource group**: Some of the services of QnA Maker are not
    available in all regions at this point, so we used the (US) west US region for
    creating and deploying all the components for the demo, as seen in Figure 7-2.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig2_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig2_HTML.jpg)


    Figure 7-2 Resource group creation step


    2. **Creation of a QnA Maker resource**: As seen in Figure 7-3, we need to provide
    a name and other details for the resource creation. Please note that we used the
    Azure Free Tier subscription for the demo. Pricing tiers and subscriptions may
    vary based on your account.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig3_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig3_HTML.jpg)


    Figure 7-3 QnA Maker creation


    Once the QnA Maker resource is created, different resource components will be
    visible in the Azure All Resources dashboard, as shown in Figure 7-4.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig4_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig4_HTML.jpg)


    Figure 7-4 The All Resources dashboard


    Now, we log into `www.qnamaker.ai/Create` and follow the five steps required to
    create a knowledge base:


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig7_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig7_HTML.jpg)


    Figure 7-7 Extraction of question/answer pairs by the QnA service


    1. Create a QnA service in Microsoft Azure (which we just did).

    2. Connect the QnA service to the knowledge base.


    As shown in Figure 7-5, you can select the previously created Azure QnA service
    upon refreshing this page.'
