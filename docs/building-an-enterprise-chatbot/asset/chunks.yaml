    port macquarie waterfront land row

    ```


    ### SimpleNLG


    Unlike Makov chains, which generate random text based on state transition probabilities,
    SimpleNLG offers a utility to generate sentences in English that are grammatically
    correct. It''s written in Java for NLG. To generate the sentences, we specify
    the content of the sentence and encode this information in SimpleNLG syntax, which
    in turn generates the grammatically correct sentences based on the grammar specifications.
    Significant tasks that SimpleNLG perform are


    *   **Orthography**: This refers to the conventions for writing languages. It
    includes capitalization, whitespaces in sentences, and paragraphs, punctuation,
    emphasis, and hyphenation.


    *   **Morphology**: The study of words, their formation, and relationship with
    other words in the same language. It analyzes the structure of words and parts
    of words, such as stems, root words, prefixes, and suffixes.


    *   **Simple grammar**: Ensures grammatical correctness like noun-verb agreement
    and creating well-formed verb groups (e.g. “does not play”).


    In the terminology of NLG, SimpleNLG is a realizer for simple grammar. It can
    be useful for creating documentations and reports that need to use grammatically
    correct sentences. The demonstration in this section uses nglib, which is a Python
    library that is mainly a wrapper around SimpleNLG.


    #### Loading the Library


    Load the SimpleNLG realizer from the nlglib library. Set the host parameter in
    the `Realiser()` class as `nlg.kutlak.info`. Next, we define methods for the various
    tasks SimpleNLG is capable of doing.


    ```

    import logging

    from nlglib.realisation.simplenlg.realisation import Realiser

    from nlglib.microplanning import *

    realise = Realiser(host=''nlg.kutlak.info'')

    ```


    #### Tense


    The method named `tense()` defines a clause and the tense we would like to convert
    it to. In the following code, the clause declares “Subject,” “Predicate” (or relationship),
    and “Object,” and then we set the attribute TENSE in the clause object to PAST
    and FUTURE separately.


    ```

    def tense():

    c = Clause(''Harry'', ''bought'', ''these off amazon'')

    c[''TENSE''] = ''PAST''

    print(realise(c))

    c[''TENSE''] = ''FUTURE''

    print(realise(c))

    Harry bought these off amazon.

    Harry will buy these off amazon.

    ```


    #### Negation


    Similar to the method `tense()`, we define the method `negation()` , which again
    takes a triplet and creates a negation of the sentence.


    ```

    def negation():

    c = Clause(''Harry'', ''bought'', ''these off amazon'')

    c[''NEGATED''] = ''true''

    print(realise(c))

    Harry does not buy these off amazon.

    ```


    #### Interrogative


    We can also generate sentences with YES or NO kinds of interrogative sentences
    or questions like WHO. The following code shows two examples. Note that WHO doesn’t
    go well with “Harry” in the example.


    ```

    def interrogative():

    c = Clause(''Harry'', ''bought'', ''these off amazon'')

    c[''INTERROGATIVE_TYPE''] = ''YES_NO''

    print(realise(c))

    c[''INTERROGATIVE_TYPE''] = ''WHO_OBJECT''

    print(realise(c))

    Does Harry buy these off amazon?

    Who does Harry buy?

    ```


    #### Complements


    In a given clause, certain complement phrases can also be added. In the following
    code, we show two complement phrases added to the main clause. The good part of
    SimpleNLP is that it can form grammatically correct sentences given the clause
    and complements.


    ```

    def complements():

    c = Clause(''Harry'', ''bought'', ''these off amazon'',

    complements=[''on first day of sales'', ''despite high price''])

    print(realise(c))

    Harry buys these off amazon on first day of sales despite high price.

    ```


    #### Modifiers


    In the following code, we first add the adjective to the subject or the noun and
    then we add an adverb to the verb. In the example, the adjective “impulsive” is
    added to the noun “Harry” and the adverb “quickly” is added to the verb “buys.”
    Both the adjective and adverb are called modifiers. Observe that the grammar of
    the sentence is still intact.


    ```

    def modifiers():

    subject = NP(''Harry'')

    verb = VP(''bought'')

    objekt = NP(''these'', ''off'',''amazon'')

    subject += Adjective(''Impulsive'')

    c = Clause()

    c.subject = subject

    c.predicate = verb

    c.object = objekt

    print(realise(c))

    verb += Adverb(''quickly'')

    c = Clause(subject, verb, objekt)

    print(realise(c))

    Impulsive Harry buys this off amazon.

    Impulsive Harry quickly buys this off amazon.

    ```


    #### Prepositional Phrases


    Prepositional phrases using “at,” “on,” “in,” and “by” are easy to add to the
    clause using SimpeNLP. In a prepositional phrase, you can also define the noun
    term separately and it structures it appropriately based on the grammar.


    ```

    def prepositional_phrase():

    c = Clause(''Harry'', ''bought'', ''these off amazon'')

    c.complements += PP(''by'', ''surprise'')

    print(realise(c))

    c = Clause(''Harry'', ''bought'', ''these off amazon'')

    c.complements += PP(''for'', NP(''Eva''))

    print(realise(c))

    Harry buys these off amazon by surprise.

    Harry buys these off amazon for Eva.

    ```


    #### Coordinated Clauses


    In a coordinated clause, two or more sentences (clauses) can be combined to make
    one sentence. In the following code, two clauses are combined using a conjunction.
    And each clause can have its own structure. For example, in one clause, “He likes
    jeans,” we use the PRESENT tense and in the second clause, “He will return t-shirt,”
    we use the FUTURE tense.


    ```

    def coordinated_clause():

    s1 = Clause(''Harry'', ''buy'', ''these off amazon'', features={''TENSE'': ''PAST''})

    s2 = Clause(''he'', ''like'',''jeans'', features={''TENSE'': ''PRESENT''})

    s3 = Clause(''he'', ''return'', ''t-shirt'', features={''TENSE'': ''FUTURE''})

    c = s1 + s2 + s3

    c = CC(s1, s2, s3)

    print(realise(s1))

    print(realise(s2))

    print(realise(s3))

    print(realise(s1 + s2))

    print(realise(c))

    Harry bought these off amazon.

    He likes jeans.

    He will return t-shirt.

    Harry bought these off amazon and he likes jeans

    Harry bought these off amazon and he likes jeans and he will return t-shirt

    ```'
