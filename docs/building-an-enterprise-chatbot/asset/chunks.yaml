    /*

    * match method of BooleanLiteralSlot. We need to recognize if the user meant no
    or yes in any which way. One of the simplest ways to implement this is to verify
    by string matching the most commonly used words.

    */

    @Override

    public MatchedSlot match(String utterance) {

    if (utterance.toLowerCase().contains("yes") || utterance.toLowerCase().contains("yeah")

