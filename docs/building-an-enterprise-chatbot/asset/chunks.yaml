  trans: "\n### 工作流描述\n\n以下是工作流程：\n\n1.  **对话界面**：我们将从头开始开发界面；它不依赖于第三方界面（例如 Skype、Telegram\
    \ 等）。这将有助于我们根据组织需求创建定制化界面，并根据需要扩展其他功能。该界面可以是一个全新的、适用于 iOS、Android 和 Windows 平台的移动应用。\n\
    \n2.  **MFA 与 Active Directory**：后端将构建认证系统，用于对设备（MS Intune）、用户（Active Directory）和应用程序（通过\
    \ PIN 码）进行身份验证。我们将在 Node 环境下构建该系统，以便也能集成到其他身份管理服务中。在基本形式下，我们仅通过 PIN 码验证来访问应用程序。\n\
    \n3.  **NLP 引擎**：将构建 NLP 引擎，用于从队列中接收文本输入，提取意图，并为传入的查询添加上下文。一旦问题被分解为所需的组成部分，它就会被发送到机器人逻辑模块。\n\
    \n4.  **机器人逻辑**：这是处理传入请求的核心处理器。在处理请求之前，它有两个核心输入。机器人逻辑在满足以下两种方法设定的流程之前，不会调用信息服务。如果机器人逻辑没有足够的信息进行回复，它会向用户询问更多信息。\n\
    \    1.  **策略交互流程**：这些流程是银行专家为传入请求设计的工作流（例如，如果有人请求更新地址，回复的关键步骤是什么？）。这些步骤将确保用户遵循步骤来获得答案。这确保了机器人遵循所有政策（无论是法定的还是内部的），就像一位非正式的人力资源专员一样。此外，政策和常见问题解答也可以在此处定义。\n\
    \n    2.  **机器学习**：需要机器学习算法来改进输出的请求会在此处发起（例如，我可以申请获取 3 月 15 日到 3 月 18 日的对账单吗？）。这需要机器应用适当的逻辑来提取日期、员工\
    \ ID 和现有账户余额，以便向信息系统创建正确的查询。此外，更复杂的功能，如员工的情绪、请求的紧急程度以及问题的情感倾向，也将在此处构建。\n\n5. \
    \ **信息服务**：这是为员工请求获取实时信息的地方。该服务处理所有请求并准备回复，同时也可以发送操作请求。信息服务将与三个核心数据服务进行交互：\n \
    \   1.  **数据湖/数据库**：如果需要从公司的某个数据库或数据湖中获取某些数据。\n\n    2.  **第三方 API/ODBC**：通过 ODBC/API\
    \ 或其他通过 REST API 暴露自身的方法与人力资源系统进行交互。\n\n    3.  **人力资源人员**：如果回复的可信度评分较低，它将通过聊天界面将请求转交给人力资源人员处理。\n\
    \n6.  **操作**：信息服务还会将请求某些工作的请求路由到操作项管理队列（例如，明天请假的请求）。此请求需要在 PeopleSoft 或人力资源系统中进行更新。所有此类变更请求将被路由到人力资源审批（也可以是直接审批）；一旦获得批准（无论是通过真实的人力资源人员还是基于策略的规则），它将被发送到操作队列。人力资源可以在此处支持广播，并且可以通过操作工作流进行投递。\n\
    \n7.  **实时系统更新**：对于已授权和批准的请求，我们直接在人力资源系统中进行更新，并向聊天机器人用户触发通知，同时触发电子邮件以及银行系统的其他内置流程。\n\
    \n### 关键特性\n\n以下是关键特性：\n\n*   **为您量身打造**：我们将根据特定需求制作机器人，而不是让这些需求去适应现有的机器人框架。\n\
    \n*   **设计即隐私**：机器人的开发遵循设计即隐私原则。它将完全符合当地法律和内部法规。\n\n*   **采用微服务架构开发**：整个应用程序将基于微服务原则，因此将支持面向未来的设计，并允许在此框架之上进行高级应用程序开发。\n\
    \n*   **部署选项**：我们可以选择哪些组件部署在本地或公有云上。根据需求，我们可以制定部署计划。\n\n*   **可扩展**：我们可以根据需要集成任意数量的\
    \ API 或 AI/ML 功能。所有未来的新变更都可以作为 API 在框架中使用。\n\n### 技术栈\n\n以下是技术栈：\n\n*   **核心引擎**：Java\
    \ 和 JavaScript\n\n*   **后端服务器**：NodeJS 和其他 JavaScript\n\n*   **前端服务器**：基于原生框架的移动应用\n\
    \n*   **日志管理**：小型 Hadoop 集群的云存储。此外，这些存储的对话日志为 AI/ML 模型训练提供数据。\n\n*   **可视化**：可以使用\
    \ D3 自定义创建；如果需要自助服务，则可以将 Tableau/PowerBI 与日志集成。\n\n*   **搜索**：使用 Elastic Search\
    \ 搜索对话日志。\n\n### 维护\n\n在维护范围方面，有两个关键流：\n\n*   **技术方面**：应用程序的正常运行时间将借助本地工程师和针对所有查询的待命渠道来维护。\n\
    \n*   **AI/ML 大脑**：这将由数据科学家团队在异地完成，更新将在准备就绪后推送到系统。\n\n## 总结\n\n本章描述了聊天机器人解决方案的业务考量，并列出了聊天机器人的优势。消息应用的市场增长是一个良好信号，表明用户正在适应消息应用，因此服务型聊天机器人可以增强他们的体验并降低公司成本。第三方研究显示了聊天机器人在企业中产生的影响，以及它们如何使数字渠道接近自然语言。下一部分讨论了必须定义的成功指标，以管理和改进聊天机器人。关键指标包括客户满意度指数（CSI）和转化指数（CI）。\n\
    \n此外，本章还讨论了聊天机器人的潜在风险以及如何管理这些风险。最突出的风险是身份冒充和凭证被黑客攻击。这两种风险都需要进行教育并建立安全的认证系统。最后，我们展示了一个开发聊天机器人的参考解决方案。架构、工作流、技术栈和维护说明提供了足够的信息，可以根据特定需求构建您的聊天机器人解决方案。在接下来的章节中，您将了解自然语言科学的关键领域，包括理解（NLU）、处理（NLP）和生成（NLG）。然后，我们将讨论如何使用开源技术和内部开发的框架来实现这些功能。\n"
- fmt: '# 5. Natural Language Processing, Understanding, and Generation


    The human brain is one of the most advanced machines when it comes to processing,
    understanding, and generating (P-U-G) natural language. The capabilities of the
    human brain stretch far beyond just being able to perform P-U-G on one language,
    dialect, accent, and conversational undertone. No machine has so far reached the
    human potential of performing all three tasks seamlessly. However, the advances
    in machine learning algorithms and computing power are making the distant dream
    of creating human-like bots a possibility.


    In this chapter, we will explore the P-U-G of natural languages and their nuances
    with references to use cases and examples. Table [5-1](#478492_1_En_5_Chapter.xhtml#Tab1)
    provides a quick summary of natural language processing (NLP), natural language
    understanding (NLU), and natural language generation (NLG) with a few functions
    and real-world applications. We will get into more details on natural language
    processing, understanding, and generation in their respective sections.


    **Table 5-1** NLP, NLU, and NLG


    | Type | NLP | NLU | NLG |

    | --- | --- | --- | --- |

    | **Brief** | Process and analyze written or spoken text by breaking it down,
    comprehending its meaning, and determining the appropriate action. It involves
    parsing, sentence breaking, and stemming. | A specific type of NLP that helps
    to deal with reading comprehension, which includes the ability to understand meaning
    from its discourse content and identify the main thought of a passage. | NLG is
    one of the tasks of NLP to generate natural language text from structured data
    from a knowledge base. In other words, it transforms data into a written narrative.
    |

    | **Functions** | Identify part of speech, text categorizing, named entity recognition,
    translation, speech recognition | Automatic summarization, semantic parsing, question
    answering, sentiment analysis | Content determination, document structuring, generating
    text in interactive conversation |

    | **Real-World Application** | Article classification for digital news aggregation
    company | Building a Q&A chatbot, brand sentiment using Twitter and Facebook data
    | Generating a product description for an e-commerce website or a financial portfolio
    summary |


    ## Chatbot Architecture


    When it comes to building an enterprise chatbot, you have so far seen how to identify
    data sources, design the chatbot architecture, list business use cases, and many
    other concepts that help an enterprise to process efficiently, reduce manual labor,
    and reduce the cost of operations. In this chapter, we will focus on the core
    part of a chatbot: the ability to process textual data and take part in a human-like
    conversation. Figure [5-1](#478492_1_En_5_Chapter.xhtml#Fig1) shows an architecture
    that utilizes the techniques from NLP, NLU, and NLG to build an enterprise chatbot.


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig1_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig1_HTML.jpg)


    **Figure 5-1** Architecture diagram for chatbots


    Let’s say an airline company has built a chatbot to book a flight via their website
    or social media pages. The following are the steps as per the architecture shown
    in Figure [5-1](#478492_1_En_5_Chapter.xhtml#Fig1):


    1. Customer says, “Help me book a flight for tomorrow from London to New York”
    through the airline’s Facebook page. In this case, Facebook becomes the presentation
    layer. A fully functional chatbot could be integrated into a company’s website,
    social network page, and messaging apps like Skype and Slack.


    2. Next, the message is carried to the messaging backend where the plain text
    passes through an NLP/NLU engine, where the text is broken into tokens, and the
    message is converted into a machine-understandable command. We will revisit this
    in greater detail throughout this chapter.


    3. The decision engine then matches the command with preconfigured workflows.
    So, for example, to book a flight, the system needs a source and a destination.
    This is where NLG helps. The chatbot will ask, *“Sure, I will help in you booking
    your flight from London to New York. Could you please let me know if you prefer
    your flight from Heathrow or Gatwick Airport?”* The chatbot picks up the source
    and destination and automatically generates a follow-up question asking which
    airport the customer prefers.


    4. The chatbot now hits the data layer and fetches the flight information from
    prefed data sources, which could typically be connected to live booking systems.
    The data source provides flight availability, price, and many other services as
    per the design.


    Some chatbots are heavy on generative responses, and others are built for retrieving
    information and fitting it in a predesigned conversational flow. For example,
    in the flight booking use case, we almost know all the possible ways the customer
    could ask to book a flight, whereas if we take an example of a chatbot for a telemedicine
    company, we are not sure about all the possible questions a patient could ask.
    So, in the telemedicine company chatbot, we need the help of generative models
    built using NLG techniques, whereas in the flight booking chatbot, a good retrieval-based
    system with NLP and an NLP engine should work.


    Since this book is about building an enterprise chatbot, we will focus more on
    the applications of P-U-G in natural languages rather than going deep into the
    foundations of the subject. In the next section, we’ll show various techniques
    for NLP and NLU using some of the most popular tools in Python. There are other
    Java and C# bases libraries; however, Python libraries provide more significant
    community support and faster development.


    Further, to differentiate between NLP and NLU, the Venn diagram in Figure [5-2](#478492_1_En_5_Chapter.xhtml#Fig2)
    shows a few applications of NLP and NLU. It shows NLU as a subset of NLP. The
    segregation is only in the tasks, not in the scope. The overall objective is to
    process and understand the natural language text to make machines think like humans.


    ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig2_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2** Applications of NLP and NLU


    ## Popular Open Source NLP and NLU Tools


    In this section, we will briefly explore various open source tools available to
    perform natural language processing, understanding, and generation. While each
    of these tools does not differentiate between the P-U-G of natural language, we
    will demonstrate the capabilities of tools under the corresponding three separate
    headings.


    ### NLTK


    The Natural Language Toolkit (NLTK) is a Python library for processing English
    vocabulary. It has an Apache 2.0 open source license. NLTK is written in the Python
    programming language. The following are some of the tasks NLTK can perform:


    - **Classification of text**: Classifying text into a different category for better
    organization and content filtering

    - **Tokenization of sentences**: Breaking sentences into words for symbolic and
    statistical natural language processing

    - **Stemming words**: Reducing words into base or root form

    - **Part-of-speech (POS) tagging**: Tagging the words into POS, which categorizes
    the words into similar grammatical properties

    - **Parsing text**: Determining the syntactic structure of text based on the underlying
    grammar

    - **Semantic reasoning**: Ability to understand the meaning of the word to create
    representations


    NLTK is the first choice of a tool for teaching NLP. It is also widely used as
    a platform for prototyping and research.'
