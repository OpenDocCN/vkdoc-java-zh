    typically the insurance products can be divided into two categories: life insurance
    and general insurance.


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig2_HTML.png](images/478492_1_En_1_Chapter/478492_1_En_1_Fig2_HTML.png)


    Figure 1-2


    Insurance product categorization


    Life insurance provides coverage to the risk of mortality. The insured beneficiary
    receives a face amount in case of death during the coverage period. In this manner,
    this insurance product safeguards against financial losses arising from the death
    of a critical member of the family. The risk covered is called mortality risk.
    The actuarial science is the study of mortality behavior and used in study of
    fair pricing of premiums for the given subject for life insurance.


    Insurance is not just limited to insuring against the risk of death. The insurance
    concept has been extended to other forms of risk as well. The other bucket of
    coverage is known as general insurance; this includes health insurance covering
    the financial risk of ill health, vehicle insurance for accidents, travel insurance
    for flight delays, and so on. The established insurance companies offer multiple
    products to customers and institutions as per their needs. Some of these products
    have standard features, where some insurance companies can create custom deals
    as per client needs, for instance covering the risk of severe weather during a
    significant event. The key differentiator between a good and bad insurer is how
    diligently and accurately it can measure the risk involved in the underlying events.


    Banking services, on the other hand, do not cover uncertain risk, but they work
    in economic activities of a financial nature. Banking has also evolved to be of
    many types, serving different purposes for different commercial entities. However,
    the basic premise of banking remains as a broker between lenders and borrowers.
    The spread between lending and borrowing rates is also called a spread, and the
    bank manages to create economic activities in the system.


    Figure [1-3](#478492_1_En_1_Chapter.xhtml#Fig3) depicts a fundamental framework
    of a bank or a banking company.


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig3_HTML.jpg](images/478492_1_En_1_Chapter/478492_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Theoretical framework of banking


    Lenders have access to capital, such as institutional members having excess cash
    or a small retail customer who has some savings. The borrower is short of capital,
    but they have some economic activities which can bring returns on their investment.
    The bank comes into the play to solve this gap in the financial system and creates
    an opportunity for the lender to earn interest on deposits and lets the borrower
    get the required capital for an interest rate. In the example in Figure [1-3](#478492_1_En_1_Chapter.xhtml#Fig3),
    a lender deposits $10,000 into the bank and receives 2% interest (i.e., $200),
    while the bank lends $10,000 to the borrower at 9% interest (i.e., gaining $900
    in the transaction). The spread of 7% (i.e., 900-200=700) is the income for bank,
    which it can use to run operations and create new products.


    Like insurance, banks have also evolved to provide various services for different
    types of customers and entities. Figure [1-4](#478492_1_En_1_Chapter.xhtml#Fig4)
    is basic classification of types of banks. It is a not an exhaustive list of the
    types of banks and banking services. However, they are the primary type of banks.


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig4_HTML.jpg](images/478492_1_En_1_Chapter/478492_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Common types of banks


    Within the scope of this book, we will point out the typical process for an end
    customer for accessing financial service. The customer for a retail bank and life
    insurance company are the same, except for a few cases. This makes it easier to
    illustrate how insurance company touchpoints with customers are similar to those
    for banking customers. Once we set up the generic nature of these touchpoints,
    we will move ahead with the chatbot build process.


    In retail banking, an end customer, usually an entity or individual, deposits
    savings in a bank, and other entities or individuals borrow that money for other
    purposes. Apart from that, banks also facilitate online transactions, paying billers,
    transferring money to other entities, timed deposits, and many other services
    for retail customers.'
  trans: '

    ## 银行业与保险业


    银行和保险公司历史悠久，为我们的经济活动提供便利。银行业和保险业对一个国家和社会的经济增长起着至关重要的作用。这两类机构都提供商业交易和风险保障等基本服务。


    保险服务源于针对不确定性事件进行风险管理的实践。风险被定义为正常过程中结果的不确定性。风险以货币形式量化，并伴随着对过程不利的后果。保险的功能是通过提供一种针对付款的安全网来管理风险。从金融角度来看，保险通过支付保费的方式，将不利事件的风险转移给保险公司。


    如图 1-1 所示，保险公司的主要职能是管理由被保险人支付的保费所形成的基金。保险公司的关键职能是衡量来自风险池的损失风险，以决定保费，并在发生事故/不利结果时，向保单持有人支付损失金额。随着人口增加，不利结果的数量减少，可以征收更低的保费，同时向面临不利结果的被保险人支付更高的赔付。


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig1_HTML.jpg](img/478492_1_En_1_Fig1_HTML.jpg)


    图 1-1


    保险的理论框架


    保险业由历经数百年演变的金融服务和产品构成。随着技术的发展，保险业见证了大型保险公司数量的激增以及新产品渗透率的加深。集中化经营能为被保险人带来更优惠的保费，并允许公司覆盖更广泛的风险。如图
    1-2 所示，保险产品通常可分为两类：人寿保险和一般保险。


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig2_HTML.png](img/478492_1_En_1_Fig2_HTML.png)


    图 1-2


    保险产品分类


    人寿保险为死亡风险提供保障。如果被保险人在保险期间内死亡，指定的受益人将获得保险金额。通过这种方式，该保险产品可以防范因家庭关键成员死亡而造成的经济损失。所覆盖的风险称为死亡风险。精算学是对死亡行为的研究，用于研究人寿保险中针对特定对象公平定价保费的问题。


    保险并不仅限于防范死亡风险。保险的概念也已扩展到其他形式的风险。另一类保障被称为一般保险；这包括覆盖健康不佳财务风险的医疗保险、针对事故的车辆保险、针对航班延误的旅行保险等等。成熟的保险公司根据客户和机构的需求提供多种产品。其中一些产品具有标准特征，而另一些保险公司则可以根据客户需求创建定制方案，例如为重大活动期间的恶劣天气风险提供保障。优秀保险公司与糟糕保险公司之间的关键区别在于，其衡量基础事件所涉风险的勤勉程度和准确程度。


    另一方面，银行服务并不覆盖不确定的风险，但它们从事金融性质的经济活动。银行业也已演变成多种类型，为不同的商业实体服务。然而，银行的基本前提仍然是作为贷款人和借款人之间的中介。贷款利率和存款利率之间的差额也称为利差，银行通过管理利差在金融体系中创造经济活动。


    图 1-3 描绘了银行或银行公司的基本框架。


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig3_HTML.jpg](img/478492_1_En_1_Fig3_HTML.jpg)


    图 1-3


    银行的理论框架


    贷款人拥有资本，例如拥有多余现金的机构成员或有一些储蓄的小型零售客户。借款人缺乏资本，但他们有一些能够带来投资回报的经济活动。银行介入以解决金融体系中的这一缺口，为贷款人创造赚取存款利息的机会，并让借款人能够以一定的利率获得所需资本。在图
    1-3 的示例中，贷款人将 10,000 美元存入银行并获得 2% 的利息（即 200 美元），而银行以 9% 的利率将 10,000 美元贷给借款人（即在此交易中获得
    900 美元）。7% 的利差（即 900-200=700）是银行的收入，银行可以用它来运营业务和创造新产品。


    与保险业类似，银行业也已发展出为不同类型的客户和实体提供各种服务的能力。图 1-4 是银行类型的基本分类。这并不是银行类型和银行服务的详尽列表，但它们是主要的银行类型。


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig4_HTML.jpg](img/478492_1_En_1_Fig4_HTML.jpg)


    图 1-4


    常见的银行类型


    在本节的范围内，我们将指出终端客户获取金融服务的典型流程。零售银行和人寿保险公司的客户是相同的，除了少数情况。这使得说明保险公司与客户的接触点如何与银行客户的接触点相似变得更加容易。一旦我们确立了这些接触点的通用性质，我们将继续进行聊天机器人的构建过程。


    在零售银行业务中，终端客户（通常是一个实体或个人）将储蓄存入银行，而其他实体或个人则将这些资金借出用于其他目的。除此之外，银行还为零售客户提供在线交易、支付账单、向其他实体转账、定期存款以及许多其他服务。

