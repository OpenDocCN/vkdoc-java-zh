- fmt: '### Chatbot Compliance to GDPR


    In the above sections, we discussed that the chatbots are no longer the subject
    of business communication only; chatbot makers must consider them in a data controlling
    and processing manner. This requires the chatbots to face the strict scrutiny
    of the GDPR.


    Some of the generic and minimum steps that the chatbots makers need to take to
    be ready for GDPR compliance are listed below. The list is not comprehensive;
    it is just an indicative list for internal assessment. Please consider a full
    audit of a chatbot before making it public for general use.


    - The chatbots, before starting a conversion, must clearly state what data will
    be collected in the conversation and must be able to access what data is being
    collected.

    - The chatbot user must be allowed to access, review, download, and erase the
    data collected by the chatbot.

    - The chatbot logs must be securely stored and made accessible to users. Also,
    you must have the explicit permission of the user before processing the log to
    train your chatbots.

    - A clearly stated privacy policy and contact information for a Data Officer for
    any concerns.

    - The option of talking to a real operator rather than a machine chatbot.


    These items are an indicative list of the steps that the chatbot owner needs to
    take. A full audit may reflect more areas to make sure the chatbot is fully compliant.


    ## Summary


    In this chapter, we classified conversations into generic and specific areas.
    While developing a chatbot for general nature requires a multiverse of data, the
    specific conversation chatbots require only the corpus of data to have those conversations.
    We introduced different data sources captured from a developer’s understanding
    of the functionality, data generated from customer interactions across all channels,
    and also, we discussed the significance of open data. Crowdsourcing of data for
    generic chatbots was also discussed. The significance and challenges of personal
    data were discussed with examples, and their impact of the design of chatbot was
    also explained. The most crucial part of a chatbot’s implementation is the impact
    of regulations when chatbots deal with personal data. We introduced the General
    Data Protection Regulation (GDPR) which protects the data of EU citizens, not
    only within the EU but outside as well. A short checklist of customers’ rights
    was provided along with some standard steps to be taken for chatbots to be GDRP
    compliant. In the next chapter, we will discuss how to design the chatbot and
    create conversation flows for a 24x7 insurance assistant.


    # 3. Chatbot Development Essentials


    Chatbots need to have features that enable human-like conversations. The goal
    is to make a chatbot conversation more human and thus better than the menu-driven
    approach of modern apps. In the previous chapters, we discussed types of chatbots
    and the regulatory constraints to consider for an in-house-developed chatbot.
    In this chapter, we will discuss the simplified approach to building the integral
    components of chatbots. Later sections will introduce conversation flow for a
    sample request to facilitate the context build-up in a chatbot conversation. The
    chapter will end with the introduction to the “24x7 Insurance Agent” chatbot,
    which will be the use case discussed throughout the rest of the book.


    ## Customer Service-Centric Chatbots


    The customer service process involves the exchange of private customer information
    and accessing data sources to fetch current information. The information exchange
    through the chatbot requires accuracy and the enforcement of strict security and
    privacy policies. There are three critical considerations in chatbot development
    to achieve the intended use case from a chatbot:


    - Business context

    - Policy compliance

    - Security, authentication, and authorization


    The accuracy of a system in resolving input queries is another consideration for
    the NLP module.


    ### Business Context


    Business context refers to the peculiarities of the business the chatbot is developed
    for. In general conversations, we can infer meanings to unsaid things or implicit
    things in a conversation.


    The concept of live chat is still relevant in many large companies. The core purpose
    of live chat was to reduce call center costs and provide another layer of conversation,
    but it also created another conversation silo and, in many cases, lousy customer
    experience crept in.


    In live chats, the business context was maintained by the chat executive and the
    customer needed to spell out the context every time. The modern chatbot system
    needs to identify and sustain settings to construct a minimal conversation flow.
    Usually, the conversations done through chatbots depend on what is explicitly
    passed to a chatbot for processing (conversation history), what channel is used
    to converse (channel), and the medium of the message (text, image, voice, emoji,
    etc.). The unsaid thing is the context, which needs to be maintained by a successful
    chatbot.


    For example, below is a conversation showing how context is important.


    | **Case 1**: No Context Maintained | **Case 2**: Context of Chat Maintained |

    | --- | --- |

    | **User**: Why refund not processed for my food order? **Chatbot**: Please provide
    your OrderID **User**: 2345 **Chatbot**: Your refund is processed and will be
    updated in your account in 2 days. | **User**: Why refund not processed for my
    food order? **Chatbot**: Your refund is processed and will be updated in your
    account in 2 days. |


    - **Conversation context**: User chatting about the food order (2345) he canceled
    last night.


    In Case 1, the context is not maintained, so every conversation needs all the
    information to be supplied to the chatbot. In Case 2, the chatbot keeps the context
    of the conversation from where it started and also tries to identify the query
    to the same meaning.


    Building on this generic example, the chatbot needs to be trained in specific
    business language, terminologies and operating dialect. If you are developing
    a chatbot for a bank, you need to understand that “time deposit account,” “checking
    account,” and “roll over” refer to specific features at a bank. This is very important,
    since your user won’t want to explain what they are talking about to the chatbot
    time and again.


    The business context is built at the Natural Language Processing (NLP) layer,
    and the conversation framework manages functionality. This specific training for
    global business context and language requires looking into past conversations
    with customers.


    ### Note


    Every conversation may have a global context and a dialogue-specific context.
    For example, talking about life insurance is the global context, and within that,
    talking about a particular policy is the conversation context.'
