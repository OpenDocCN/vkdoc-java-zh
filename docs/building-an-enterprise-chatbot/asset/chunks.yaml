    ## 总结


    让我们总结一下本章讨论的内容。我们从构建基本聊天机器人框架的想法以及企业为何需要定制设计的聊天机器人开始。然后，我们讨论了该框架的核心组件。


    首先，我们讨论了意图、话语和槽位，并定义了一个自定义的意图和槽位匹配器。我们还创建了 `MatchedSlot` 和 `MatchedIntent` 类。


    接着，我们讨论了 IRIS 内存，以及如何利用会话来长期和短期存储属性。我们讨论了 `Session` 和 `SessionStorage` 类。


    然后，我们讨论了如何将对话建模为一个状态机问题。我们讨论了状态机的不同组件，例如状态、转换、防护条件以及 `StateMachine` 骨干类。


    之后，我们讨论了一个以保险为中心的用例，该用例能够根据不同的意图和状态执行特定操作。我们为该用例定义了各种意图、槽位和槽位类型。我们将这些定义添加到了配置类中。


    接着，我们讨论了该用例所有可能的状态，并解释了所有这些状态的执行部分。由于某些状态在转换前需要验证器，我们讨论了示例用例所需的防护条件。我们简要介绍了通用查询状态，以及如何在话语未被归类到任何明确意图且与知识库中的任何文档都不匹配时，利用企业搜索。


    然后，我们描述了根据用户意图从一个状态到另一个状态的可能转换。


    接着，我们讨论了 `StateMachineManager`，它使用配置并在触发状态动作之前执行意图匹配。


    最后，我们讨论了如何使 IRIS 具备功能性。我们简要解释了如何通过创建服务层和控制器层，将 IRIS 作为 REST 服务暴露出来。


    在下一章中，我们将讨论市场上其他可用的聊天机器人框架，例如 RASA、Google Dialogflow 和 Microsoft Bot Framework。与我们从头构建的方法不同，这些框架提供了许多即插即用的功能，并能加快开发速度。然而，我们建议您在现有框架中做出选择之前，彻底了解您企业的需求。


    # 7. Microsoft Bot、RASA 和 Google Dialogflow 简介


    在上一章中，我们讨论了如何构建一个具有自然语言和对话能力的内部聊天机器人框架。我们之前讨论了从头构建解决方案的优势。然而，在某些用例和范围内，使用现成的在线意图分类和对话管理框架来构建您的聊天机器人客户端可能更简单、更快捷、成本也更低。


    在本章中，我们将介绍一些流行的在线聊天机器人框架以及如何使用它们。


    ## Microsoft Bot Framework


    Microsoft Bot Framework 是一个用于构建企业级对话式 AI 体验的综合框架。它通过其名为 Azure 的云托管服务提供了一套认知服务。Azure
    认知服务使我们能够构建智能的企业级机器人。我们可以使用其 QnA Maker 服务来构建一个快速的常见问题解答机器人，或者使用 LUIS（语言理解智能服务）来构建一个复杂的虚拟助手。图
    7-1 展示了机器人框架的各种认知服务以及实现端到端对话式 AI 体验所需的其他组件。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig1_HTML.jpg](img/478492_1_En_7_Fig1_HTML.jpg)


    图 7-1


    机器人框架的组件


    ### QnA Maker 简介


    Microsoft 的 QnA Maker 提供了一种快速构建基于常见问题解答 URL、结构化文档、手册等内容的机器人的方法。其强大的爬虫和解析引擎从内容中提取所有可能的问题和答案，并通过机器人提供这些内容。它是一种认知服务工具，用于构建和训练一个简单的
    QnA 机器人。


    QnA Maker 是一项免费服务，能够以自然的对话方式回应用户的话语或提问。它能够利用其基于语言处理技术的问题/答案机制，为半结构化数据提供有用的答案。


    大多数信息型机器人场景的一个常见挑战是将内容管理与机器人设计和开发分开，因为内容所有者通常是可能不具备技术背景的领域专家。QnA Maker 通过提供无代码的
    QnA 管理体验来解决这个问题。


    QnA Maker 允许您使用易于使用的界面编辑、删除或添加 QnA 对，然后将您的知识库作为机器人服务的 API 端点发布。使用熟悉的聊天界面训练机器人非常简单，主动学习功能会随着时间的推移自动从用户那里学习问题变体，并将其添加到知识库中。使用
    QnA Maker 端点可以无缝集成其他 API，例如语言理解服务和语音 API，以不同的方式解释和回答用户的问题。


    我们之前讨论过，拥有知识库对于回答用户的查询至关重要。它是提供用户查询答案的基础信息存储库。知识库是一个逻辑术语，指代各种类型的结构化、半结构化和非结构化信息，这些信息可以存储在具有文本处理能力的底层数据库中。QnA
    Maker 通过 API 服务暴露其知识库/数据库。


