- fmt: "# Noun Phrase Chunking Using Regular Expressions\n\nAbove you saw the tokens\
    \ as a fundamental unit in any NLP processing. Since in natural language, a group\
    \ of tokens combined often reveals the meaning or represents a concept, we create\
    \ chunks. Multi-token sequences are created by segmenting using a process called\
    \ chunking. In Figure [5-7](#478492_1_En_5_Chapter.xhtml#Fig7), the smaller boxes\
    \ show word-level tokenization and the larger boxes shows multi-token sequences,\
    \ also called higher-level chunks. Such chunks are created using regular expressions\
    \ or by using the n-gram (more on this in later sections) method. Chunking is\
    \ essential for entity recognition, which we will shortly explore.\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig7_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig7_HTML.jpg)\n\
    \n**Figure 5-7** Tokens and chunks\n\nLet’s consider a single review as shown\
    \ in the following code. The grammar finds a noun using a rule that says, *find\
    \ noun chunk where zero or one (?) determiner (DT) is followed by any number (*)\
    \ of adjectives (JJ) and a noun (NN)*. In the POS tree shown in the output of\
    \ the following code, all the chunks marked as NP are the noun phrases:\n\n```\n\
    import nltk\nfrom nltk.tokenize import word_tokenize\n#Noun phrase chunking\n\
    text = word_tokenize(\"My English Bulldog Larry had skin allergies the summer\
    \ we got him at age 3, I'm so glad that now I can buy his food from Amazon\")\n\
    #This grammar rule: Find NP chunk when an optional determiner (DT) is followed\
    \ by any number of adjectives (JJ) and then a noun (NN)\ngrammar = \"NP: {<DT>?<JJ>*<NN>}\"\
    \n#Regular expression parser using the above grammar\ncp = nltk.RegexpParser(grammar)\n\
    #Parsed text with pos tag\nreview_chunking_out = cp.parse(nltk.pos_tag(text))\n\
    #Print the parsed text\nprint(review_chunking_out)\n(S\n  My/PRP$\n  English/JJ\n\
    \  Bulldog/NNP\n  Larry/NNP\n  had/VBD\n  skin/VBN\n  allergies/NNS\n  (NP the/DT\
    \ summer/NN)\n  we/PRP\n  got/VBD\n  him/PRP\n  at/IN\n  (NP age/NN)\n  3/CD\n\
    \  ,/,\n  I/PRP\n  'm/VBP\n  so/RB\n  glad/JJ\n  that/IN\n  now/RB\n  I/PRP\n\
    \  can/MD\n  buy/VB\n  his/PRP$\n  (NP food/NN)\n  from/IN\n  Amazon/NNP)\n```\n\
    \nYou can see many NPs such as “the summer” and “age” where “the summer” is not\
    \ a single word token. Above you see that the POS is in a tree representation.\
    \ Another way of representing the chunk structures is by using tags. The IOB tag\
    \ representation is a general standard. In this scheme, each token is represented\
    \ as I (Inside), O (Outside), and B (Begin). Chunk tag B represents the beginning\
    \ of a chunk. Subsequent tokens within a chunk are tagged I and all other tokens\
    \ are tagged O. Figure [5-8](#478492_1_En_5_Chapter.xhtml#Fig8) provides one example\
    \ of an IOB tag representation.\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig8_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig8_HTML.jpg)\n\
    \n**Figure 5-8** IOB tag representation of chunk structures\n\nThe following code\
    \ uses the CoNLL 2000 Corpus to convert the tree to tags using the function `tree2conlltags()`.\
    \ CoNLL is *Wall Street Journal* text that has been tagged and chunked using IOB\
    \ notation.\n\n```\nfrom nltk.chunk import conlltags2tree, tree2conlltags\nfrom\
    \ pprint import pprint\n#Print IOB tags\nreview_chunking_out_IOB = tree2conlltags(review_chunking_out)\n\
    pprint(review_chunking_out_IOB)\n[('My', 'PRP$', 'O'),\n ('English', 'JJ', 'O'),\n\
    \ ('Bulldog', 'NNP', 'O'),\n ('Larry', 'NNP', 'O'),\n ('had', 'VBD', 'O'),\n ('skin',\
    \ 'VBN', 'O'),\n ('allergies', 'NNS', 'O'),\n ('the', 'DT', 'B-NP'),\n ('summer',\
    \ 'NN', 'I-NP'),\n ('we', 'PRP', 'O'),\n ('got', 'VBD', 'O'),\n ('him', 'PRP',\
    \ 'O'),\n ('at', 'IN', 'O'),\n ('age', 'NN', 'B-NP'),\n ('3', 'CD', 'O'),\n (',',\
    \ ',', 'O'),\n ('I', 'PRP', 'O'),\n (\"'m\", 'VBP', 'O'),\n ('so', 'RB', 'O'),\n\
    \ ('glad', 'JJ', 'O'),\n ('that', 'IN', 'O'),\n ('now', 'RB', 'O'),\n ('I', 'PRP',\
    \ 'O'),\n ('can', 'MD', 'O'),\n ('buy', 'VB', 'O'),\n ('his', 'PRP$', 'O'),\n\
    \ ('food', 'NN', 'B-NP'),\n ('from', 'IN', 'O'),\n ('Amazon', 'NNP', 'O')]\n```\n\
    \n# Named Entity Recognition\n\nOnce we have the POS of the text, we can extract\
    \ the named entities. Named entities are definite noun phrases that refer to specific\
    \ individuals such as ORGANIZATION and PERSON. Some other entities are LOCATION,\
    \ DATE, TIME, MONEY, PERCENT, FACILITY, and GPE. The facility is any human-made\
    \ artifact in the architecture and civil engineering domain, such as Taj Mahal\
    \ or Empire State Building. GPE means geopolitical entities such as city, state,\
    \ and country. We can extract all these entities using the `ne_chunk()` method\
    \ in the nltk library.\n\nThe following code uses the POS tagged sentence and\
    \ applies the `ne_chunk()` method to it. It identifies *Amazon* as GPE and *Bulldog\
    \ Larry* as a PERSON. In this case, this is both true and false. Amazon is identified\
    \ as ORGANIZATION, which we expect here. Later in the chapter, we will train our\
    \ own named entity recognizer to improve the performance.\n\n```\ntagged_review_sent\
    \ = nltk.pos_tag(text)\nprint(nltk.ne_chunk(tagged_review_sent))\n(S\n  My/PRP$\n\
    \  English/JJ\n  (PERSON Bulldog/NNP Larry/NNP)\n  had/VBD\n  skin/VBN\n  allergies/NNS\n\
    \  the/DT\n  summer/NN\n  we/PRP\n  got/VBD\n  him/PRP\n  at/IN\n  age/NN\n  3/CD\n\
    \  ,/,\n  I/PRP\n  'm/VBP\n  so/RB\n  glad/JJ\n  that/IN\n  now/RB\n  I/PRP\n\
    \  can/MD\n  buy/VB\n  his/PRP$\n  food/NN\n  from/IN\n  (GPE Amazon/NNP))\n```\n\
    \n# spaCy\n\nWhile spaCy offers all the features of NLTK, it is regarded as one\
    \ of the best production grade tools for an NLP task. In this section, we will\
    \ see how to use the various methods provided by the spaCy library in Python.\n\
    \nspaCy provides three core models: `en_core_web_sm` (10MB), `en_core_web_md`\
    \ (91MB), and `en_core_web_lg` (788MB). The larger model is trained on bigger\
    \ vocabulary and hence will give higher accuracy. So depending on your use case,\
    \ choose wisely the model that fits your requirements.\n\n## POS Tagging\n\nAfter\
    \ loading the model using `spaCy.load()`, you can pass any string to the model,\
    \ and it provides all the methods in one go. To extract POS, the `pos_method`\
    \ is used. In the following code, after tokenizing, we print the following:\n\n\
    *   `text`: The original text\n*   `lemma`: Token after stemming, which is the\
    \ base form of the word\n*   `pos`: Part of speech\n*   `tag`: POS with details\n\
    *   `dep`: The relationship between the tokens. Also called syntactical dependency.\n\
    *   `shape`: The shape of the word (i.e., capitalization, punctuation, digits)\n\
    *   `is_alpha`: Returns True if the token is an alphanumeric character\n*   `is_stop`:\
    \ Returns True if the token is a stopword like “at,” “so,” etc.\n\n```\n# POS\
    \ tagging\nimport spacy\nnlp = spacy.load('en_core_web_sm')\ndoc = nlp(u\"My English\
