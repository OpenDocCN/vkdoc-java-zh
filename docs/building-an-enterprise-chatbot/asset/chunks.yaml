- fmt: '### Intent


    The intent is the intention of the user identified from the utterance captured
    by the chatbot. Identifying intent is the essential function of a chatbot. In
    menu-driven chatbots, the menus help the user to pinpoint the intent, while in
    AI-based chatbots, identifying intent is a task done by the NLP engine.


    The successful matching of intent decides the flow of conversation and delivers
    the correct response to the user. In domain-specific chatbots, the intents could
    be different from general intents, and hence domain-specific training is required.


    For example, for the utterance of “Show me the stock price of Apple,” the intent
    is to find the stock price. Let’s call this intent as `showStockPrice`. `showStockPrice`
    is the main intent of the user, while the term “Apple” is the entity, also called
    a slot.


    ### Entity


    Entity gives meaning to the intent by providing additional value to the utterance.
    An entity can be defined as subordinate to the intent, which tells us the intent
    is related to which subclass. In this example, “Apple” is the entity of `@company_name`
    for the intent `#showStockPrice`.


    Entities, or slots, when maintained in sessions, help retain the context of the
    conversation. In this example, after this first utterance we replied with the
    price. Just after that, the next utterance could be “and for Microsoft.” In this
    case, the chatbot has already captured the intent as `showStockPrice`, so the
    slot changes to Microsoft and the chatbot can fetch a stock price of Microsoft.


    ### Channel


    The channel is the medium used by the chatbot to connect with the user and fulfill
    their request. Nowadays, all social media messengers allow chatbots for conversations
    (e.g., Facebook Messenger, Slack, Skype, etc.).


    However, for an application like our 24x7 Insurance Agent, we want to have our
    developed channel remain compliant with privacy laws and provide an added layer
    of security when we access the private information of users.


    ### Human Takeover


    The human takeover is a term used to denote human fallback during a conversation.
    Modern chatbots come with the feature of fallback to human assistance when the
    chatbot fails to understand intents and extract entities, or the confidence is
    NLP output is low.


    Human takeovers can be of two types:


    *   **A human takeover by choice**: At any moment the user can choose to talk
    to a human, maybe because they are more comfortable with humans or the chatbot
    isn’t solving their issues.

    *   **A human takeover by confidence**: A confidence filter may decide if we can
    fulfill the request with high confidence; if not, the request is automatically
    transferred to a human without a choice for the user. This provides a seamless
    experience for the user.


    ## Use Case: 24x7 Insurance Agent


    The chatbot that will be discussed throughout the book is based on the use case
    of an insurance agent. AI-driven chatbots will be discussed using the multiple
    aspects of security, natural language ML techniques, deployment, and business
    purposes. Each chapter will discuss some component of developing this chatbot.


    Now you know the essential conditions for planning the 24x7 Insurance Agent, including
    setting the business context, type of development policies, and other considerations.
    In this section, we will define the aspects for 24x7 Insurance Agent, due to scope
    all features will not be explicitly implemented.


    *   **Business context**: The 24x7 Insurance Agent will be able to have necessary
    conversations in the insurance domain. People may ask about their policies, premiums,
    etc.

    *   **Policy compliance**: The policies can be taken from the standard procedure
    followed at the customer care center.

    *   **Security, authentication, and authorization**: We can create a PIN-based
    authorization, while an IDS-based authentication can also be used if the users
    already have a product.

    *   **Accuracy of user input translation to systems**: To ensure this, we can
    create a confidence filter-based human takeover mechanism.

    *   **The AI-based approach or menu-based approach**: Both should be fine as per
    need and balance between flexibility and accuracy.

    *   **Conversational flows**: The flows must be created by sitting with the business
    and exploring its policies.

    *   The NLP training will require data of old conversations, intent list, most
    frequent entities, etc.


    These decisions will help the developer to select the right structure and architecture
    for the chatbot solution.


    ## Summary


    Chatbots offer opportunities and challenges. The opportunities outweigh the challenges
    faced while developing one. In this chapter, we discussed important considerations
    as you embark on the journey of developing a chatbot, including defining business
    context, understanding policies to access data, adopting best practices for security
    of conversations and systems, and ensuring the accuracy of responses. Then we
    introduced the types of development approaches and their advantages and disadvantages:
    menu-based and AI-based. The concept of designing conversational flows was covered,
    which helps create scope and deterministic structure to respond to users. Critical
    terms used frequently in chatbot development were explained: utterances, intent,
    entity, channel, and human takeover. In the end, we outlined how to structure
    the solution for the 24x7 Insurance Agent. The next chapter will introduce the
    solution architecture and how enterprises can build a successful chatbot in-house.


    # 4. Building a Chatbot Solution


    Chatbots are complete solutions and are created as an independent layer in any
    solution. The senior management also looks at chatbot functionalities and ROI
    as an independent entity. The focus on conversational technologies further demands
    a holistic view on chatbots from solution and business returns perspectives. In
    previous chapters, we demystified the essentials of developing a chatbot for a
    closed domain. In this chapter, we will focus on how to build solutions using
    the best available resources for a closed domain use case. The chapter will also
    cover a thought process on how to measure success for a chatbot implementation
    and managing the risks associated with chatbots.


    ## Business Considerations


    Any business will ask the question, “What business value does a chatbot add?”
    This question is to be answered with objectivity and time targets. Technological
    advancements may allow us to implement advanced chatbots and other solutions,
    but how they add value to the business is a very subjective call. The business
    needs to evaluate all factors to ascertain how a chatbot is good for their business.


    ### Chatbots vs. Apps


    From technological point of view, the business must tackle an important question,
    specifically relevant to closed domain chatbots: whether to go for an app or a
    chatbot. In terms of functional features, both can provide the same information
    for a given feature set. The key differential happens to be chatbots being conversational
    in nature, while apps are self-service applications.


    The key considerations of chatbots vs. apps as mentioned by 2018 State of Chatbot
    Report ( `www.drift.com/wp-content/uploads/2018/01/2018-state-of-chatbots-report.pdf`
    ) are


    *   Chatbots are preferred to get quick answers for questions and 24-hour access.

    *   Apps are preferred for ease of use and convenience.


    A survey in the report lists some factors that a business must check with their
    current needs:


    *   Quick answers to simple questions

    *   Getting 24-hour service

    *   Convenience

    *   Quick answers to complex questions

    *   Ease of communication

    *   Ability to easily register a complaint

    *   Getting detailed/expert answers

    *   A good customer experience

    *   Friendliness and approachability

    *   Having a complaint resolved quickly'
  raw: '### Intent


    The intent is the intention of the user identified from the utterance captured
    by the chatbot. Identifying intent is the essential function of a chatbot. In
    menu-driven chatbots, the menus help the user to pinpoint the intent, while in
    AI-based chatbots, identifying intent is a task done by the NLP engine.


    The successful matching of intent decides the flow of conversation and delivers
    the correct response to the user. In domain-specific chatbots, the intents could
    be different from general intents, and hence domain-specific training is required.


    For example, for the utterance of “Show me the stock price of Apple,” the intent
    is to find the stock price. Let’s call this intent as showStockPrice. showStockPrice
    is the main intent of the user, while the term “Apple” is the entity, also called
    a slot.


    ### Entity


    Entity gives meaning to the intent by providing additional value to the utterance.
    An entity can be defined as subordinate to the intent, which tells us the intent
    is related to which subclass. In this example, “Apple” is the entity of @company_name
    for the intent #showStockPrice.


    Entities, or slots, when maintained in sessions, help retain the context of the
    conversation. In this example, after this first utterance we replied with the
    price. Just after that, the next utterance could be “and for Microsoft.” In this
    case, the chatbot has already captured the intent as showStockPrice, so the slot
    changes to Microsoft and the chatbot can fetch a stock price of Microsoft.


    ### Channel


    The channel is the medium used by the chatbot to connect with the user and fulfill
    their request. Nowadays, all social media messengers allow chatbots for conversations
    (e.g., Facebook Messenger, Slack, Skype, etc.).


    However, for an application like our 24x7 Insurance Agent, we want to have our
    developed channel remain compliant with privacy laws and provide an added layer
    of security when we access the private information of users.


    ### Human Takeover


    The human takeover is a term used to denote human fallback during a conversation.
    Modern chatbots come with the feature of fallback to human assistance when the
    chatbot fails to understand intents and extract entities, or the confidence is
    NLP output is low.


    Human takeovers can be of two types:


    *   **A human takeover by choice**: At any moment the user can choose to talk
    to a human, maybe because they are more comfortable with humans or the chatbot
    isn’t solving their issues.


    *   **A human takeover by confidence**: A confidence filter may decide if we can
    fulfill the request with high confidence; if not, the request is automatically
    transferred to a human without a choice for the user. This provides a seamless
    experience for the user.


    ## Use Case: 24x7 Insurance Agent


    The chatbot that will be discussed throughout the book is based on the use case
    of an insurance agent. AI-driven chatbots will be discussed using the multiple
    aspects of security, natural language ML techniques, deployment, and business
    purposes. Each chapter will discuss some component of developing this chatbot.


    Now you know the essential conditions for planning the 24x7 Insurance Agent, including
    setting the business context, type of development policies, and other considerations.
    In this section, we will define the aspects for 24x7 Insurance Agent, due to scope
    all features will not be explicitly implemented.


    *   **Business context**: The 24x7 Insurance Agent will be able to have necessary
    conversations in the insurance domain. People may ask about their policies, premiums,
    etc.


    *   **Policy compliance**: The policies can be taken from the standard procedure
    followed at the customer care center.


    *   **Security, authentication, and authorization**: We can create a PIN-based
    authorization, while an IDS-based authentication can also be used if the users
    already have a product.


    *   **Accuracy of user input translation to systems**: To ensure this, we can
    create a confidence filter-based human takeover mechanism.


    *   **The AI-based approach or menu-based approach**: Both should be fine as per
    need and balance between flexibility and accuracy.


    *   **Conversational flows**: The flows must be created by sitting with the business
    and exploring its policies.


    *   The NLP training will require data of old conversations, intent list, most
    frequent entities, etc.


    These decisions will help the developer to select the right structure and architecture
    for the chatbot solution.


    ## Summary


    Chatbots offer opportunities and challenges. The opportunities outweigh the challenges
    faced while developing one. In this chapter, we discussed important considerations
    as you embark on the journey of developing a chatbot, including defining business
    context, understanding policies to access data, adopting best practices for security
    of conversations and systems, and ensuring the accuracy of responses. Then we
    introduced the types of development approaches and their advantages and disadvantages:
    menu-based and AI-based. The concept of designing conversational flows was covered,
    which helps create scope and deterministic structure to respond to users. Critical
    terms used frequently in chatbot development were explained: utterances, intent,
    entity, channel, and human takeover. In the end, we outlined how to structure
    the solution for the 24x7 Insurance Agent. The next chapter will introduce the
    solution architecture and how enterprises can build a successful chatbot in-house.


    # 4. Building a Chatbot Solution


    Chatbots are complete solutions and are created as an independent layer in any
    solution. The senior management also looks at chatbot functionalities and ROI
    as an independent entity. The focus on conversational technologies further demands
    a holistic view on chatbots from solution and business returns perspectives. In
    previous chapters, we demystified the essentials of developing a chatbot for a
    closed domain. In this chapter, we will focus on how to build solutions using
    the best available resources for a closed domain use case. The chapter will also
    cover a thought process on how to measure success for a chatbot implementation
    and managing the risks associated with chatbots.


    ## Business Considerations


    Any business will ask the question, “What business value does a chatbot add?”
    This question is to be answered with objectivity and time targets. Technological
    advancements may allow us to implement advanced chatbots and other solutions,
    but how they add value to the business is a very subjective call. The business
    needs to evaluate all factors to ascertain how a chatbot is good for their business.


    ### Chatbots vs. Apps


    From technological point of view, the business must tackle an important question,
    specifically relevant to closed domain chatbots: whether to go for an app or a
    chatbot. In terms of functional features, both can provide the same information
    for a given feature set. The key differential happens to be chatbots being conversational
    in nature, while apps are self-service applications.


    The key considerations of chatbots vs. apps as mentioned by 2018 State of Chatbot
    Report ( [`www.drift.com/wp-content/uploads/2018/01/2018-state-of-chatbots-report.pdf`](https://www.drift.com/wp-content/uploads/2018/01/2018-state-of-chatbots-report.pdf)
    ) are


    *   Chatbots are preferred to get quick answers for questions and 24-hour access.


    *   Apps are preferred for ease of use and convenience.


    A survey in the report lists some factors that a business must check with their
    current needs:


    *   Quick answers to simple questions


    *   Getting 24-hour service


    *   Convenience


    *   Quick answers to complex questions


    *   Ease of communication


    *   Ability to easily register a complaint


    *   Getting detailed/expert answers


    *   A good customer experience


    *   Friendliness and approachability


    *   Having a complaint resolved quickly'
  trans: '

    ### 意图


    意图是指从聊天机器人捕获的用户话语中识别出的用户目的。识别意图是聊天机器人的核心功能。在菜单驱动的聊天机器人中，菜单帮助用户明确意图；而在基于 AI 的聊天机器人中，识别意图是
    NLP 引擎的任务。


    意图的成功匹配决定了对话的流程，并向用户提供正确的响应。在特定领域的聊天机器人中，意图可能与通用意图不同，因此需要进行特定领域的训练。


    例如，对于“显示苹果公司的股票价格”这句话，其意图是查找股票价格。我们可将此意图命名为 showStockPrice。showStockPrice 是用户的主要意图，而“苹果”一词则是实体，也称为槽位。


    ### 实体


    实体通过为话语提供附加价值来赋予意图具体含义。实体可以被定义为从属于意图，它告诉我们意图与哪个子类相关。在此示例中，“苹果”是意图#showStockPrice
    的@company_name 实体。


    实体（或槽位）在会话中得以维护时，有助于保留对话的上下文。在此示例中，在第一次话语之后我们回复了价格。紧接着，下一句话可能是“还有微软的”。在这种情况下，聊天机器人已经捕获了意图为
    showStockPrice，因此槽位变为微软，聊天机器人便可以获取微软的股票价格。


    ### 渠道


    渠道是聊天机器人用于连接用户并满足其请求的媒介。如今，所有社交媒体即时通讯工具都允许聊天机器人进行对话（例如，Facebook Messenger、Slack、Skype
    等）。


    然而，对于像我们的“全天候保险代理”这样的应用，我们希望拥有自己开发的渠道，以符合隐私法律，并在访问用户私人信息时提供额外的安全层。


    ### 人工接管


    人工接管是一个术语，用于表示在对话过程中回退到人工服务。现代聊天机器人具备在无法理解意图、提取实体或 NLP 输出置信度较低时，回退到人工协助的功能。


    人工接管可分为两种类型：


    *   **选择性人工接管**：用户可以在任何时刻选择与人工对话，可能是因为他们更习惯与人交流，或者聊天机器人无法解决他们的问题。


    *   **置信度触发的人工接管**：置信度过滤器可以决定我们是否能以高置信度完成请求；如果不能，请求将自动转接给人工，用户没有选择余地。这为用户提供了无缝的体验。


    ## 用例：全天候保险代理


    本书将讨论的聊天机器人基于一个保险代理的用例。我们将从安全、自然语言机器学习技术、部署和业务目的等多个方面来探讨 AI 驱动的聊天机器人。每一章都会讨论开发此聊天机器人的某个组成部分。


    现在您已经了解了规划“全天候保险代理”的基本条件，包括设定业务背景、开发策略类型以及其他考量因素。在本节中，我们将定义“全天候保险代理”的各个方面，由于范围限制，并非所有功能都会被明确实现。


    *   **业务背景**：“全天候保险代理”将能够在保险领域进行必要的对话。人们可以询问他们的保单、保费等信息。

    *   **政策合规性**：政策可以遵循客户服务中心的标准流程。

    *   **安全、认证与授权**：我们可以创建基于 PIN 码的授权，如果用户已有产品，也可以使用基于 IDS 的身份验证。

    *   **用户输入到系统转换的准确性**：为确保这一点，我们可以创建基于置信度过滤器的人工接管机制。

    *   **基于 AI 的方法还是基于菜单的方法**：根据需求，在灵活性和准确性之间取得平衡，两种方法都可以。

    *   **对话流程**：流程必须通过与业务部门沟通并探索其政策来创建。

    *   NLP 训练需要历史对话数据、意图列表、最频繁出现的实体等。


    这些决策将帮助开发者为聊天机器人解决方案选择正确的结构和架构。


    ## 总结


    聊天机器人既带来机遇也带来挑战。机遇大于开发过程中遇到的挑战。在本章中，我们讨论了在开始开发聊天机器人旅程时的重要考量，包括定义业务背景、理解访问数据的策略、采用对话和系统安全的最佳实践，以及确保响应的准确性。接着，我们介绍了两种开发方法及其优缺点：基于菜单的方法和基于
    AI 的方法。我们还涵盖了设计对话流程的概念，这有助于创建响应用户的范围和确定性结构。我们解释了聊天机器人开发中常用的关键术语：话语、意图、实体、渠道和人工接管。最后，我们概述了如何为“全天候保险代理”构建解决方案。下一章将介绍解决方案架构以及企业如何内部构建成功的聊天机器人。


    # 4. 构建聊天机器人解决方案


    聊天机器人是完整的解决方案，并在任何解决方案中作为一个独立的层存在。高级管理层也将聊天机器人的功能和投资回报率视为一个独立实体。对对话技术的关注进一步要求从解决方案和业务回报的角度对聊天机器人有全面的看法。在前几章中，我们揭开了为封闭领域开发聊天机器人的基本要素。在本章中，我们将重点介绍如何利用最佳可用资源为封闭领域用例构建解决方案。本章还将涵盖如何衡量聊天机器人实施成功与否的思考过程，以及管理与聊天机器人相关的风险。


    ## 业务考量


    任何企业都会问：“聊天机器人能增加什么业务价值？”这个问题需要客观地并设定时间目标来回答。技术进步可能允许我们实现先进的聊天机器人和其他解决方案，但它们如何为企业增加价值是一个非常主观的判断。企业需要评估所有因素，以确定聊天机器人如何对其业务有利。


    ### 聊天机器人 vs. 应用程序


    从技术角度来看，企业必须解决一个重要问题，特别是与封闭领域聊天机器人相关的问题：是选择开发应用程序还是聊天机器人。就功能特性而言，两者都可以为给定的功能集提供相同的信息。关键区别在于聊天机器人本质上是对话式的，而应用程序是自助服务应用。


    根据《2018 年聊天机器人现状报告》（[`www.drift.com/wp-content/uploads/2018/01/2018-state-of-chatbots-report.pdf`](https://www.drift.com/wp-content/uploads/2018/01/2018-state-of-chatbots-report.pdf)）中提到的聊天机器人
    vs. 应用程序的关键考量是：


    *   聊天机器人更受青睐，用于快速获取问题答案和提供 24 小时服务。

    *   应用程序更受青睐，因其易用性和便利性。


    该报告中的一项调查列出了一些企业必须根据其当前需求进行核实的因素：


    *   快速回答简单问题

    *   获得 24 小时服务

    *   便利性

    *   快速回答复杂问题

    *   沟通的便捷性

    *   能够轻松投诉

    *   获得详细/专家级答案

    *   良好的客户体验

    *   友好性和亲和力

    *   快速解决投诉

