    #### Named Entity Recognition


    Once we have the POS of the text, we can extract the named entities. Named entities
    are definite noun phrases that refer to specific individuals such as ORGANIZATION
    and PERSON. Some other entities are LOCATION, DATE, TIME, MONEY, PERCENT, FACILITY,
    and GPE. The facility is any human-made artifact in the architecture and civil
    engineering domain, such as Taj Mahal or Empire State Building. GPE means geopolitical
    entities such as city, state, and country. We can extract all these entities using
    the `ne_chunk()` method in the nltk library.


    The following code uses the POS tagged sentence and applies the `ne_chunk()` method
    to it. It identifies *Amazon* as GPE and *Bulldog Larry* as a PERSON. In this
    case, this is both true and false. Amazon is identified as ORGANIZATION, which
    we expect here. Later in the chapter, we will train our own named entity recognizer
    to improve the performance.


    ```

    tagged_review_sent = nltk.pos_tag(text)

    print(nltk.ne_chunk(tagged_review_sent))

