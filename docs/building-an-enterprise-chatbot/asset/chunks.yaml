  trans: "\n### 在 AWS EC2 上作为 Docker 容器运行\n\nDocker 实现了操作系统级别的虚拟化。它用于运行被称为容器的软件包。从运维角度来看，Docker\
    \ 使工作更加简便，因为它将代码、库和运行时组件打包成 Docker 镜像，从而可以轻松部署。有关 Docker 的更多详细信息，请访问 [`www.docker.com/`](https://www.docker.com/)\
    \ 。\n\n我们执行以下步骤，在 EC2 上的 Docker 中运行应用程序：\n\n1.  更新实例上已安装的软件包和软件包缓存：\n\n    ```\n\
    \    sudo yum update -y\n    ```\n\n2.  安装最新的 Docker 社区版软件包：\n\n    ```\n    sudo\
    \ amazon-linux-extras install docker\n    ```\n\n3.  启动 Docker 服务：\n\n    ```\n\
    \    sudo service docker start\n    ```\n\n4.  将 `ec2-user` 添加到 Docker 组，以便无需使用\
    \ `sudo` 即可执行 Docker 命令：\n\n    ```\n    sudo usermod -a -G docker ec2-user\n\
    \    ```\n\n5.  注销并重新登录，以获取新的 Docker 组权限。为此，请关闭当前的 SSH 终端窗口，并在新窗口中重新连接到实例。新的 SSH\
    \ 会话将拥有适当的 Docker 组权限。\n\n6.  验证 `ec2-user` 是否可以在不使用 sudo 的情况下运行 Docker 命令。\n\n\
    7.  在代码库的根目录中创建一个 Dockerfile。Dockerfile 是一个清单文件，描述了 Docker 镜像要使用的基础镜像，以及其上安装和运行的内容。此\
    \ Dockerfile 使用 `openjdk:8-jdk-alpine` 镜像，因为我们正在构建一个 Java 应用程序的镜像。`VOLUME` 指令创建一个具有指定名称的挂载点，并将其标记为保存来自本地主机或其他容器的外部挂载卷。`ARG`\
    \ 指令定义一个变量，用户可以在构建时将其传递给构建器。JAR 文件被命名为 `app.jar`，`ENTRYPOINT` 允许我们配置一个将作为可执行文件运行的容器。它包含运行\
    \ JAR 的命令：\n\n    ```\n    FROM openjdk:8-jdk-alpine\n    VOLUME /tmp\n    ARG\
    \ JAR_FILE\n    ADD ${JAR_FILE} app.jar\n    ENTRYPOINT [\"java\",\"-Djava.security.egd=file:/dev/./urandom\"\
    ,\"-jar\",\"/app.jar\"]\n    ```\n\n8.  通过执行以下命令构建 Docker 镜像：\n\n    ```\n   \
    \ docker build -t iris --build-arg JAR_FILE=”JAR_NAME”.\n    ```\n\n    以下是在机器上执行构建命令的输出：\n\
    \n    ```\n    Sending build context to Docker daemon   21.9MB\n    Step 1/5 :\
    \ FROM openjdk:8-jdk-alpine\n    8-jdk-alpine: Pulling from library/openjdk\n\
    \    bdf0201b3a05: Pull complete\n    9e12771959ad: Pull complete\n    c4efe34cda6e:\
    \ Pull complete\n    Digest: sha256:2a52fedf1d4ab53323e16a032cadca89aac47024a8228dea7f862dbccf169e1e\n\
    \    Status: Downloaded newer image for openjdk:8-jdk-alpine\n    ---> 3675b9f543c5\n\
    \    Step 2/5 : VOLUME /tmp\n    ---> Running in dc2934059ab8\n    Removing intermediate\
    \ container dc2934059ab8\n    ---> 0c3b61b6f027\n    Step 3/5 : ARG JAR_FILE\n\
    \    ---> Running in 36701bf0a68e\n    Removing intermediate container 36701bf0a68e\n\
    \    ---> da1c1f51c29d\n    Step 4/5 : ADD ${JAR_FILE} app.jar\n    ---> 0aacdba5baf0\n\
    \    Step 5/5 : ENTRYPOINT [\"java\",\"-Djava.security.egd=file:/dev/./urandom\"\
    ,\"-jar\",\"/app.jar\"]\n    ---> Running in f40f7a276e18\n    Removing intermediate\
    \ container f40f7a276e18\n    ---> 493abfce6e8c\n    Successfully built 493abfce6e8c\n\
    \    Successfully tagged iris:latest\n    ```\n\n9.  通过以下命令运行新创建的 Docker 镜像：\n\
    \n    ```\n    docker run -t -i -p 80:80 iris\n    ```\n\n### 作为 ECS 服务运行\n\n\
    在前两种方法中，您已经了解了如何将 Spring Boot JAR 作为独立服务部署和运行，或者通过安装 Docker 并在 Docker 容器中运行 API。本方法将讨论\
    \ AWS 的一项名为 ECS（弹性容器服务）的服务。请参见图 9-4。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig4_HTML.jpg](img/478492_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4\n\nECS 对象及其关系图\n\nAmazon ECS 使得部署、管理和扩展运行应用程序、服务和批处理任务的 Docker 容器变得简单。Amazon\
    \ ECS 会根据您的资源需求将容器放置到集群中，并与弹性负载均衡、EC2 安全组、EBS 卷和 IAM 角色等熟悉的功能集成。有关 ECS 的更多详细信息，请访问\
    \ [`https://aws.amazon.com/ecs/`](https://aws.amazon.com/ecs/) 。\n\n在 ECS 上运行\
    \ Docker 镜像需要多个步骤。以下是通过 AWS 管理控制台进行部署的逐步说明：\n\n1.  在讨论如何将 JAR 作为 Docker 容器部署在\
    \ AWS EC2 上时，我们创建了一个 Docker 镜像。我们需要将这个先前创建的 Docker 镜像添加到 ECR。Amazon Elastic Container\
    \ Registry (ECR) 是一个完全托管的容器注册表，使开发人员能够轻松地存储、管理和部署容器镜像。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig5_HTML.jpg](img/478492_1_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5\n\n在 AWS 中创建 ECR 仓库\n\n如图 9-5 所示创建仓库后，下一步是标记 Docker 镜像，以便我们可以将镜像推送到此仓库：\n\
    \n```\ndocker tag iris:latest aws_account_id.dkr.ecr.us-east-1.amazonaws.com/iris:latest\n\
    ```\n\n然后，我们运行以下命令将此镜像推送到 ECR 仓库：\n\n```\ndocker push aws_account_id.dkr.ecr.us-east-1.amazonaws.com/iris:latest\n\
    ```\n\n有关将 Docker 镜像推送到 ECR 的更多详细信息，请访问 [`https://docs.aws.amazon.com/AmazonECR/latest/userguide/docker-push-ecr-image.html`](https://docs.aws.amazon.com/AmazonECR/latest/userguide/docker-push-ecr-image.html)\
    \ 。\n\n1.  然后，我们需要定义容器定义。在 AWS 管理控制台的 ECS 服务中，在“入门”下，我们可以选择要使用的容器定义。我们需要提供 ECR\
    \ 仓库 URL 以及 Docker 镜像名称和标签，如图 9-6 所示。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig6_HTML.jpg](img/478492_1_En_9_Fig6_HTML.jpg)\n\
    \n图 9-6\n\n容器定义配置\n\n2.  我们定义任务定义。任务定义是应用程序的蓝图，通过属性描述一个或多个容器。某些属性在任务级别配置，但大多数属性是按容器配置的。在图\
    \ 9-7 中，我们为 IRIS 创建了一个任务定义。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig7_HTML.jpg](img/478492_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7\n\n任务定义\n\n3.  定义一个服务。服务允许我们在 ECS 集群中运行并维护指定数量（期望计数）的任务定义并发实例。请参见图 9-8。\n\
    \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig8_HTML.jpg](img/478492_1_En_9_Fig8_HTML.jpg)\n\
    \n图 9-8\n\n服务定义详情\n\n4.  我们配置一个集群。Fargate 集群中的基础设施完全由 AWS 管理。我们的容器在运行，无需我们管理和配置单个\
    \ Amazon EC2 实例。请参见图 9-9。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig9_HTML.jpg](img/478492_1_En_9_Fig9_HTML.jpg)\n\
    \n图 9-9\n\n集群配置详情\n"
- fmt: '5. Once we review and click `Create`, we should see the progress of the creation
    of ECS. Once the cluster is set up and task definitions are complete, the Spring
    Boot service should be up and running.


    Figure [9-10](#478492_1_En_9_Chapter.xhtml#Fig10) is an example of a basic ECS
    cluster creation using the task definition outlined above.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig10_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    The ECS Launch Status screen


    ## Smart IRIS Alexa Skill Creation in Less Than 5 Minutes


    We will explore how IRIS can be integrated with Amazon Alexa in a few easy steps.
    In order to do so, the first step is to log into Alexa Developer Console at [`https://developer.amazon.com/alexa`](https://developer.amazon.com/alexa)
    and create a skill. Creating a skill requires providing a skill name and the default
    language. We will choose a custom model to add to the skill. See Figure [9-11](#478492_1_En_9_Chapter.xhtml#Fig11).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig11_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Creating the Alexa skill name


    The custom model has a few checklists to be provided for the skill to work:


    * Invocation name

    * Intents, sample, and slots

    * Building an interaction model

    * Setting up a web service endpoint


    In our example use case of IRIS, since we already have custom defined different
    possible intents, intent slots, and dialogs modeled as a state machine, we aim
    to redirect the user’s utterance on Alexa to the IRIS backend API so that it can
    process the utterance and respond.


    We use the invocation name as `Iris`. This will enable users to invoke this skill
    by asking Alexa to “ask” Iris. See Figure [9-12](#478492_1_En_9_Chapter.xhtml#Fig12).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig12_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig12_HTML.jpg)


    Figure 9-12


    Adding the skill invocation name


    Next, we define a custom intent and a custom slot type so that all of the user’s
    utterances are matched to this intent and slot type. The aim is to redirect the
    utterance to IRIS and not do any intent classification-related processing on the
    Alexa layer.


    We first create a custom slot type called `IrisCustomSlotType`; see Figure [9-13](#478492_1_En_9_Chapter.xhtml#Fig13).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig13_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig13_HTML.jpg)


    Figure 9-13


    A custom slot type


    Now, we define a custom intent named as `IrisAllIntent`. This intent has a slot
    called `utteranceSlot`. The most important thing is `{utteranceSlot}`. We intend
    to fit all user utterances into this slot, as shown in Figure [9-14](#478492_1_En_9_Chapter.xhtml#Fig14).
    It is a regex, which means the entire utterance value is under the `utteranceSlot`
    slot. This will be used later while reading the user utterance when Alexa requests
    the IRIS HTTPS endpoint.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig14_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig14_HTML.jpg)


    Figure 9-14


    The `utteranceSlot` in `IrisAllIntent`


    The `utteranceSlot` is defined to be of slot type `IrisCustomSlotType`, as shown
    in Figure [9-15](#478492_1_En_9_Chapter.xhtml#Fig15).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig15_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig15_HTML.jpg)


    Figure 9-15


    Custom slot and its type created for IRIS integration


    At this stage, we should have the intents, slots, and slot types created in the
    interaction model of our Alexa skill, as shown in Figure [9-16](#478492_1_En_9_Chapter.xhtml#Fig16).
    In the figure, you can see that there are other built-in intents as well what
    is present for a standard interaction with Alexa devices such as stop or cancel.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig16_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig16_HTML.jpg)


    Figure 9-16


    Interaction model screen


    Once we have defined all of the required attributes for our custom interaction
    model, we can build the model. Building the model requires us to click the `Build
    Model` button, which saves the skill manifest and builds the model. See Figure
    [9-17](#478492_1_En_9_Chapter.xhtml#Fig17).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig17_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig17_HTML.jpg)


    Figure 9-17


    The progress of the build process of the IRIS custom interaction model


    The last thing to complete the setup is to provide an HTTPS endpoint of IRIS to
    host all the intent classifications and response generation logic, and receive
    a POST request from Alexa. See Figure [9-18](#478492_1_En_9_Chapter.xhtml#Fig18).


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig18_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig18_HTML.jpg)


    Figure 9-18


    The skill’s service endpoint configuration


    Let’s now test the setup by using the simulator available on the developer console,
    as shown in Figure [9-19](#478492_1_En_9_Chapter.xhtml#Fig19). We ask Alexa to
    ask Iris for “weather in Dublin.” The response from Iris is as follows, which
    can be heard in the voice of Alexa.


    ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig19_HTML.jpg](images/478492_1_En_9_Chapter/478492_1_En_9_Fig19_HTML.jpg)


    Figure 9-19


    The simulator available on the Alexa developer console


    The request details sent from Alexa to the IRIS API are


    ```

    {

    "version": "1.0",

    "session": {

    "new": true,

    "sessionId": "amzn1.echo-api.session.XXXXXXX-2b66-XXXX-XXX-XXXXXXXXX",

    "application": {

    "applicationId": "amzn1.ask.skill.XXXXXX-e624-XXXXXX-XXX-XXXXXXX"

    },

    "user": {

    "userId": "amzn1.ask.account.XXXXXXXX"

    }

    },

    "context": {

    "AudioPlayer": {

    "playerActivity": "IDLE"

    },

    "System": {

    "application": {

