    ''DT''), (''corn'', ''NN''), (''chip'', ''NN''), (''dip'', ''NN'')]

    ```


    #### Named Entity Recognition


    Stanford-corenlp provides the method `ner` to extract the named entities. Observe
    that the output by default is in the IOB (Inside, Outside, and Begin) format.


    ```

    print(''Named Entities:'', nlp.ner(sentence))

    Named Entities: [(''I'', ''O''), (''consume'', ''O''), (''about'', ''O''), (''a'',
    ''O''), (''jar'', ''O''), (''every'', ''SET''), (''two'', ''SET''), (''weeks'',
