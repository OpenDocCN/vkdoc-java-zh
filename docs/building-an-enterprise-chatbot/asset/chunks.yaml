    ## 为保险用例构建自定义聊天机器人


    我们在第 1 章中讨论了聊天机器人在人寿保险行业中的一些最常见应用。现在，既然我们对 IRIS 核心有了一定了解，就让我们深入探讨如何使用 IRIS 框架构建一个专注于保险领域的聊天机器人。


    在本练习结束时，我们的聊天机器人应能够提供以下信息：


    *   账户余额

    *   人寿保险报价

    *   理赔状态

    *   顾问推荐

    *   一般咨询解答

    *   市场趋势

    *   股票价格

    *   天气详情


    高层功能架构如图 6-4 所示。存在诸如 Facebook Messenger、网页聊天和 Alexa 等通信客户端渠道，用户可通过这些渠道连接到 IRIS。在图
    6-4 中，一个*渠道集成模块*充当网关模块。它与 Facebook Messenger 等服务集成，接收请求，并将请求委托给 IRIS 进行响应。该模块再将响应发送回
    Messenger。


    然后是 IRIS 引擎核心，它处理所有特定领域的业务逻辑，这些逻辑控制着聊天机器人平台的行为，并定义和管理从一个状态到另一个状态的转换。核心与*意图分类引擎*连接，该引擎从用户的表述中预测意图。我们讨论过的
    IRIS 功能需要一个信息检索模块，该模块可以查询其语义知识库；一个报价服务，根据用户输入提供人寿保险报价；一个网站搜索服务；一个连接到用户数据库以获取账户余额信息的用户模块；一个用于获取理赔详情的理赔模块；以及其他用于获取市场趋势、股票价格和天气信息的第三方服务。


