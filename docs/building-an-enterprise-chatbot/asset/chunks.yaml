    \ entity.label_)\n```\n\nWe can also visualize the entities using the `displacy`\
    \ method (shown in Figure [5-12](#478492_1_En_5_Chapter.xhtml#Fig12)):\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig12_HTML.jpg](images/478492_1_En_5_Chapter/478492_1_En_5_Fig12_HTML.jpg)\n\
