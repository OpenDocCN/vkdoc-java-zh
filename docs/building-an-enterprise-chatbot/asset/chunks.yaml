  trans: '

    ## RASA 简介


    RASA 是一个开源的机器学习库栈，供开发者创建上下文聊天机器人。RASA 也提供付费的企业级平台。客户端服务可以连接 RASA 平台中的各种 API。有关
    RASA 平台的更多详细信息，请参见 [`https://rasa.com/products/rasa-platform/`](https://rasa.com/products/rasa-platform/)
    `.`


    RASA 栈包含两个主要组件：


    *   **Core**：一个类似于 Mutters 的聊天机器人框架，具有基于机器学习的对话管理功能

    *   **NLU**：一个意图分类模块，提供意图分类和实体提取功能。


    如图 7-13 所示，Core 和 NLU 模块都提供了各种功能，这些功能可以在自定义数据集上进行定制、训练和集成，用于构建基于上下文的 AI 虚拟助手。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig13_HTML.jpg](img/478492_1_En_7_Fig13_HTML.jpg)


    图 7-13


    Core 和 NLU 模块的功能


    *   **将自然语言转化为结构化数据**：此功能类似于我们在 QnA Maker 示例中讨论的内容，在该示例中，结构化、半结构化和非结构化数据被解析为知识库中某种有意义的形式以供查询。

    *   **基于机器学习的对话**：RASA 提供了自己的对话管理模块，可以通过一系列简单的步骤进行定制和建模。我们在第 6 章中讨论了使用有限状态机在 IRIS
    中实现对话管理。

    *   **自定义词向量**：RASA 提供了为我们的领域训练词向量的定制功能。在此过程中会生成多个词嵌入，这有助于引擎更好地进行意图分类。Word2vec
    是一个流行的神经网络模型，它从用户文本中生成词嵌入。

    *   **实体提取**：通过使用内置或自定义构建的实体识别模型，RASA 可以识别用户话语中的实体。

    *   **将消息匹配到多个意图**：一条用户话语可以匹配到多个意图，并且会返回不同的匹配分数以及最佳匹配意图作为响应。

    *   **交互式学习**：我们在上一章讨论了如何通过扩展设计来增强 IRIS，以支持通过交互式学习实现持续改进框架。RASA 也提供了简单的方法来启用交互式学习，从而教会机器人新技能。


    用于聊天机器人的 RASA 框架利用这两个模型来有效地引导对话流程，如图 7-14 所示。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig14_HTML.jpg](img/478492_1_En_7_Fig14_HTML.jpg)


    图 7-14


    使用 RASA 的 Core 和 NLU 模块的对话流程


    消息基本上在两个阶段进行处理：一个在管理对话的 Core 模块，另一个在提供基本语言服务的 NLU 模块。外部 API 调用或 CRM 连接由 RASA 平台借助
    RASA Core 跟踪器处理。下一节将更详细地讨论这两个模块的工作方式。


    ### RASA Core


    RASA Core 指的是主要组件，它接收并响应请求。该模块非常健壮，并采用基于流程的方法来处理所有请求，如图 7-15 所示。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig15_HTML.jpg](img/478492_1_En_7_Fig15_HTML.jpg)


    图 7-15


    RASA 框架的工作方式


    RASA 框架有一个六步流程来处理所有传入的消息请求并对其进行响应。步骤如下所述；然而，更多详细信息可以在 [`http://rasa.com/docs/#rasa_core.agent.Agent`](http://rasa.com/docs/%2523rasa_core.agent.Agent)
    找到。


    解释器接收消息并将其转换为一个字典，其中包含原始文本、意图以及找到的任何实体。跟踪器跟踪对话，并将新消息的状态传递给策略。策略模块为请求准备响应。一旦策略模块中准备好响应，它就会被传递给跟踪器和动作。跟踪器更新对话状态，动作将响应发送回用户。


    上述实现有助于所有对话通过 RASA 进行，同时跟踪对话以维护对话状态。


    ### RASA NLU


    RASA 自然语言理解（NLU）模块是一个工具，用于对来自用户的所有消息进行意图分类和实体提取。它是一个完全开源的工具，其核心目的是用于聊天机器人开发。


    RASA NLU 可以作为服务托管给你的聊天机器人使用。RASA NLU 还允许你使用自己的数据训练不同类型的模型。从聊天机器人开发者的角度来看，RASA
    NLU 模块包含两部分：


    *   **训练**：此模块允许你在自己的数据上训练模型。拥有自己的数据进行训练可以让你开发出特定于业务的 NLU。

    *   **服务器**：此模块作为训练模型服务于聊天机器人。它可以作为 API 服务托管并在后端运行。


    使用开源 NLU 模块的主要好处是，你无需将数据发送到 Google 或 Amazon 等外部平台来训练意图和实体。而且，由于是开源的，你可以根据需要调整模型或开发自己的模型。RASA
    NLU 的架构也使其可以作为服务在任何地方运行。如果你的架构要求如此，你可能不需要进行网络调用。


    请参阅 RASA 的详尽文档，网址为 [`https://rasa.com/docs/`](https://rasa.com/docs/) `.`

    '
- fmt: '# Introduction to Dialogflow


    Dialogflow is an offering of Google for developing human-computer interactions.
    It was formerly known as `API.ai` as a platform for managing APIs for chatbots.
    Google bought the company in September 2016 and renamed it Dialogflow in 2017.
    It is now a core offering on Google for voice-based application development for
    all of its platforms including Google Home, Google Assistant, and other voice-enabled
    services. The capability of Dialogflow to integrate with virtually all platforms
    including wearables, home applications, speakers, smart devices, etc. makes it
    one of the most popular platforms for developing chatbots.


    Google Dialogflow functioning is similar to the previous discussed chatbots, with
    some variations in naming technology and technical architecture on how it implements
    the flow. A typical conversation with a chatbot in Dialogflow looks like Figure
    [7-16](#478492_1_En_7_Chapter.xhtml#Fig16).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig16_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Dialogflow-based chatbot


    The user responses are allowed in both written format and in voice/speech. The
    responses are captured by the Google Assistance module and then converted into
    text to allow the chatbot to be voice enabled. Google Assistance can be replaced
    by other integration options as well.


    The key steps to building a chatbot with Dialogflow are discussed below. You are
    encouraged to go through the official documentation for Dialogflow at [`https://dialogflow.com/`](https://dialogflow.com/).


    - The first step is to create a Dialogflow account and then create a Dialogflow
    agent, which lets you define a natural language understanding model.

    - The second step is to define how information is extracted from user utterances.
    This is done by defining extract parameters for entities. This is helpful to understand
    important attributes in user utterances, providing better matches based on extracted
    entities.

    - In order for a chatbot to be conversational, we need to define and manage states
    with contexts in the next step.

    - Finally, the Dialogflow agent can be integrated with Google Assistant, which
    lets us deploy the agent. This allows users to invoke actions through the assistant
    to interact.


    The above tutorial details can be found at [`https://dialogflow.com/docs`](https://dialogflow.com/docs).
    Below we present selected steps in the process to build a chatbot using Dialogflow.


    Creating an agent means creating an NLU model that will understand the chats happening
    with that agent. So, if you want to create a chatbot for two different domains,
    you may need to create two different agents and train them accordingly. See Figure
    [7-17](#478492_1_En_7_Chapter.xhtml#Fig17).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig17_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig17_HTML.jpg)


    Figure 7-17


    Creation of an agent in Dialogflow


    The next step is to create intents using the Dialogflow console. The intent can
    be defined along with the utterances using the rich UI of Dialogflow. The console
    window looks similar to Figure [7-18](#478492_1_En_7_Chapter.xhtml#Fig18).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig18_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig18_HTML.jpg)


    Figure 7-18


    Intent creation in Dialogflow


    The Dialogflow console also provides a simulator at the right side of the window
    to test the trained intents in a simulated environment. This helps you to test
    your model before deploying it to production. The simulation window looks similar
    to Figure [7-19](#478492_1_En_7_Chapter.xhtml#Fig19).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig19_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig19_HTML.jpg)


    Figure 7-19


    Dialogflow simulation window


    Actions and parameters are extracted from the entity extraction module of Dialogflow.
    The parameters extracted then can be used for fulfilment and generating the responses.
    The Entity extraction mechanism is driven by powerful Google ML models. A basic
    training phase and entity extraction in Dialogflow is shown in Figure [7-20](#478492_1_En_7_Chapter.xhtml#Fig20).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig20_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Entity extraction in Dialogflow


    The contexts can be managed by the console as well, and your bot can be trained
    on missed intents that the chatbot was not able to understand. Every time you
    simulate the model, it gets trained on the latest data provide to its intent engine.


    Dialogflow connects with outside services and CRMs using its fulfilment service.
    The fulfillment service allows you to create custom API endpoints and expose them
    to your chatbot. The fulfillment service in Dialogflow is called Web Hooks.


    One of the great features is the capability to integrate the chatbot with multiple
    platforms with just few clicks. Figure [7-21](#478492_1_En_7_Chapter.xhtml#Fig21)
    shows the integration options available with Dialogflow. The ecosystem of Dialogflow
    is very strong, and it offers good integration models in Nodejs for developers
    to build chatbots and features as per their requirements.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig21_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Integration options in Dialogflow


    ## Summary


    We discussed different chatbot frameworks and how they are useful to build a simple
    chatbot client. However, these frameworks have advantages and disadvantages.


    **Microsoft Bot Framework** is open source and available on GitHub but some of
    its services such as Lex or Azure come at an additional cost. It''s designed to
    be easy to use as a set of services.


    **RASA** is also open source and provides enterprise platform support. It requires
    development and programming knowledge since it is designed for developers. It
    does not provide out-of-the-box integration to other messaging clients. It can
    be hosted on-premise, but it does not provide direct user info management support.


    **Dialogflow** provides out-of-the-box integration with some popular messaging
    platforms such as Facebook Messenger, Skype, and Google Assistant and provides
    the complete toolkit required for building bots. However, it cannot be operated
    on-premise.


    The chapter also discussed the key features of various platforms and presented
    essential information required for developers to start working on these platforms.
    The chapter concluded with an introduction to an enterprise-level paid platform.


    In the next chapter, we will discuss how the custom chatbot designed in previous
    chapters can be extended to integrate with various third-party services and enterprise
    databases to provide responses to the client.


    # Chatbot Integration Mechanism


    In Chapter [6](#478492_1_En_6_Chapter.xhtml), we designed a simple chatbot framework
    in Java which we called the IRIS (Intent Recognition and Information Service)
    framework. We discussed the core components of IRIS, such as how to define intents
    and how state machine can be implemented for defining state and transitions for
    building a conversational chatbot. An example use case focused on the insurance
    domain. In the example, we outlined specific capabilities that IRIS is supposed
    to perform such as providing market trend details, stock price information, weather
    details, and claim status.


    In this chapter, we will focus on the integration modules of IRIS, which shows
    how we can connect with external data sources and third-party APIs for information
    retrieval.'
  raw: '## Introduction to Dialogflow


    Dialogflow is an offering of Google for developing human-computer interactions.
    It was formerly known as API.ai as a platform for managing APIs for chatbots.
    Google bought the company in September 2016 and renamed it Dialogflow in 2017\.
    It is now a core offering on Google for voice-based application development for
    all of its platforms including Google Home, Google Assistant, and other voice-enabled
    services. The capability of Dialogflow to integrate with virtually all platforms
    including wearables, home applications, speakers, smart devices, etc. makes it
    one of the most popular platforms for developing chatbots.


    Google Dialogflow functioning is similar to the previous discussed chatbots, with
    some variations in naming technology and technical architecture on how it implements
    the flow. A typical conversation with a chatbot in Dialogflow looks like Figure
    [7-16](#478492_1_En_7_Chapter.xhtml#Fig16).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig16_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Dialogflow-based chatbot


    The user responses are allowed in both written format and in voice/speech. The
    responses are captured by the Google Assistance module and then converted into
    text to allow the chatbot to be voice enabled. Google Assistance can be replaced
    by other integration options as well.


    The key steps to building a chatbot with Dialogflow are discussed below. You are
    encouraged to go through the official documentation for Dialogflow at [`https://dialogflow.com/`](https://dialogflow.com/)
    .


    *   The first step is to create a Dialogflow account and then create a Dialogflow
    agent, which lets you define a natural language understanding model.


    *   The second step is to define how information is extracted from user utterances.
    This is done by defining extract parameters for entities. This is helpful to understand
    important attributes in user utterances, providing better matches based on extracted
    entities.


    *   In order for a chatbot to be conversational, we need to define and manage
    states with contexts in the next step.


    *   Finally, the Dialogflow agent can be integrated with Google Assistant, which
    lets us deploy the agent. This allows users to invoke actions through the assistant
    to interact.


    The above tutorial details can be found at [`https://dialogflow.com/docs`](https://dialogflow.com/docs)
    . Below we present selected steps in the process to build a chatbot using Dialogflow.


    Creating an agent means creating an NLU model that will understand the chats happening
    with that agent. So, if you want to create a chatbot for two different domains,
    you may need to create two different agents and train them accordingly. See Figure
    [7-17](#478492_1_En_7_Chapter.xhtml#Fig17).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig17_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig17_HTML.jpg)


    Figure 7-17


    Creation of an agent in Dialogflow


    The next step is to create intents using the Dialogflow console. The intent can
    be defined along with the utterances using the rich UI of Dialogflow. The console
    window looks similar to Figure [7-18](#478492_1_En_7_Chapter.xhtml#Fig18).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig18_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig18_HTML.jpg)


    Figure 7-18


    Intent creation in Dialogflow


    The Dialogflow console also provides a simulator at the right side of the window
    to test the trained intents in a simulated environment. This helps you to test
    your model before deploying it to production. The simulation window looks similar
    to Figure [7-19](#478492_1_En_7_Chapter.xhtml#Fig19).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig19_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig19_HTML.jpg)


    Figure 7-19


    Dialogflow simulation window


    Actions and parameters are extracted from the entity extraction module of Dialogflow.
    The parameters extracted then can be used for fulfilment and generating the responses.
    The Entity extraction mechanism is driven by powerful Google ML models. A basic
    training phase and entity extraction in Dialogflow is shown in Figure [7-20](#478492_1_En_7_Chapter.xhtml#Fig20).


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig20_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Entity extraction in Dialogflow


    The contexts can be managed by the console as well, and your bot can be trained
    on missed intents that the chatbot was not able to understand. Every time you
    simulate the model, it gets trained on the latest data provide to its intent engine.


    Dialogflow connects with outside services and CRMs using its fulfilment service.
    The fulfillment service allows you to create custom API endpoints and expose them
    to your chatbot. The fulfillment service in Dialogflow is called Web Hooks.


    One of the great features is the capability to integrate the chatbot with multiple
    platforms with just few clicks. Figure [7-21](#478492_1_En_7_Chapter.xhtml#Fig21)
    shows the integration options available with Dialogflow. The ecosystem of Dialogflow
    is very strong, and it offers good integration models in Nodejs for developers
    to build chatbots and features as per their requirements.


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig21_HTML.jpg](images/478492_1_En_7_Chapter/478492_1_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Integration options in Dialogflow


    ## Summary


    We discussed different chatbot frameworks and how they are useful to build a simple
    chatbot client. However, these frameworks have advantages and disadvantages.


    **Microsoft Bot Framework** is open source and available on GitHub but some of
    its services such as Lex or Azure come at an additional cost. It’s designed to
    be easy to use as a set of services.


    **RASA** is also open source and provides enterprise platform support. It requires
    development and programming knowledge since it is designed for developers. It
    does not provide out-of-the-box integration to other messaging clients. It can
    be hosted on-premise, but it does not provide direct user info management support.


    **Dialogflow** provides out-of-the-box integration with some popular messaging
    platforms such as Facebook Messenger, Skype, and Google Assistant and provides
    the complete toolkit required for building bots. However, it cannot be operated
    on-premise.


    The chapter also discussed the key features of various platforms and presented
    essential information required for developers to start working on these platforms.
    The chapter concluded with an introduction to an enterprise-level paid platform.


    In the next chapter, we will discuss how the custom chatbot designed in previous
    chapters can be extended to integrate with various third-party services and enterprise
    databases to provide responses to the client.


    # 8. Chatbot Integration Mechanism


    In Chapter [6](#478492_1_En_6_Chapter.xhtml), we designed a simple chatbot framework
    in Java which we called the IRIS (Intent Recognition and Information Service)
    framework. We discussed the core components of IRIS, such as how to define intents
    and how state machine can be implemented for defining state and transitions for
    building a conversational chatbot. An example use case focused on the insurance
    domain. In the example, we outlined specific capabilities that IRIS is supposed
    to perform such as providing market trend details, stock price information, weather
    details, and claim status.


    In this chapter, we will focus on the integration modules of IRIS, which shows
    how we can connect with external data sources and third-party APIs for information
    retrieval.'
  trans: '

    ## Dialogflow 简介


    Dialogflow 是 Google 提供的一项用于开发人机交互的产品。它最初名为 API.ai，是一个用于管理聊天机器人 API 的平台。Google
    于 2016 年 9 月收购了该公司，并于 2017 年将其更名为 Dialogflow。如今，它是 Google 在其所有平台（包括 Google Home、Google
    Assistant 和其他支持语音的服务）上进行语音应用开发的核心产品。Dialogflow 能够与几乎所有平台（包括可穿戴设备、家庭应用、音箱、智能设备等）集成，这使其成为最流行的聊天机器人开发平台之一。


    Google Dialogflow 的工作原理与之前讨论过的聊天机器人类似，但在命名技术以及实现流程的技术架构上存在一些差异。在 Dialogflow 中与聊天机器人进行典型对话的界面如图
    7-16 所示。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig16_HTML.jpg](img/478492_1_En_7_Fig16_HTML.jpg)


    图 7-16


    基于 Dialogflow 的聊天机器人


    用户响应既支持书面形式，也支持语音/讲话形式。这些响应由 Google Assistance 模块捕获，然后转换为文本，从而使聊天机器人具备语音功能。Google
    Assistance 也可以被其他集成选项替代。


    下面讨论使用 Dialogflow 构建聊天机器人的关键步骤。建议您查阅 Dialogflow 的官方文档，网址为 [`https://dialogflow.com/`](https://dialogflow.com/)
    。


    *   第一步是创建一个 Dialogflow 账户，然后创建一个 Dialogflow Agent，它允许您定义一个自然语言理解模型。


    *   第二步是定义如何从用户话语中提取信息。这是通过为实体定义提取参数来完成的。这有助于理解用户话语中的重要属性，并根据提取的实体提供更好的匹配。


    *   为了使聊天机器人具备对话能力，我们需要在下一步中使用上下文来定义和管理状态。


    *   最后，可以将 Dialogflow Agent 与 Google Assistant 集成，从而部署该 Agent。这允许用户通过助手调用操作进行交互。


    上述教程详情可在 [`https://dialogflow.com/docs`](https://dialogflow.com/docs) 找到。下面我们介绍使用
    Dialogflow 构建聊天机器人过程中的部分步骤。


    创建一个 Agent 意味着创建一个 NLU 模型，该模型将理解与该 Agent 进行的聊天内容。因此，如果您想为两个不同的领域创建聊天机器人，您可能需要创建两个不同的
    Agent 并分别进行训练。见图 7-17。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig17_HTML.jpg](img/478492_1_En_7_Fig17_HTML.jpg)


    图 7-17


    在 Dialogflow 中创建 Agent


    下一步是使用 Dialogflow 控制台创建意图。可以使用 Dialogflow 丰富的用户界面，连同话语一起定义意图。控制台窗口类似于图 7-18。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig18_HTML.jpg](img/478492_1_En_7_Fig18_HTML.jpg)


    图 7-18


    在 Dialogflow 中创建意图


    Dialogflow 控制台还在窗口右侧提供了一个模拟器，用于在模拟环境中测试训练好的意图。这有助于您在将模型部署到生产环境之前对其进行测试。模拟窗口类似于图
    7-19。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig19_HTML.jpg](img/478492_1_En_7_Fig19_HTML.jpg)


    图 7-19


    Dialogflow 模拟窗口


    操作和参数是从 Dialogflow 的实体提取模块中提取的。提取出的参数随后可用于实现响应和生成回复。实体提取机制由强大的 Google ML 模型驱动。Dialogflow
    中的基本训练阶段和实体提取如图 7-20 所示。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig20_HTML.jpg](img/478492_1_En_7_Fig20_HTML.jpg)


    图 7-20


    Dialogflow 中的实体提取


    上下文也可以通过控制台进行管理，并且您的机器人可以针对聊天机器人无法理解的未命中意图进行训练。每次您模拟模型时，它都会根据提供给其意图引擎的最新数据进行训练。


    Dialogflow 使用其实现服务与外部服务和 CRM 连接。实现服务允许您创建自定义 API 端点并将其暴露给您的聊天机器人。Dialogflow 中的实现服务称为
    Web Hooks。


    其一大特色是能够通过几次点击就将聊天机器人与多个平台集成。图 7-21 显示了 Dialogflow 可用的集成选项。Dialogflow 的生态系统非常强大，它为开发者提供了良好的
    Nodejs 集成模型，以便根据需求构建聊天机器人和功能。


    ![../images/478492_1_En_7_Chapter/478492_1_En_7_Fig21_HTML.jpg](img/478492_1_En_7_Fig21_HTML.jpg)


    图 7-21


    Dialogflow 中的集成选项


    ## 总结


    我们讨论了不同的聊天机器人框架，以及它们如何用于构建简单的聊天机器人客户端。然而，这些框架各有优缺点。


    **Microsoft Bot Framework** 是开源的，可在 GitHub 上获取，但其某些服务（如 Lex 或 Azure）需要额外付费。它被设计为一组易于使用的服务。


    **RASA** 也是开源的，并提供企业级平台支持。它需要开发和编程知识，因为它是为开发者设计的。它不提供与其他消息客户端的开箱即用集成。它可以本地部署，但不提供直接的用户信息管理支持。


    **Dialogflow** 提供与一些流行消息平台（如 Facebook Messenger、Skype 和 Google Assistant）的开箱即用集成，并提供构建机器人所需的完整工具包。但是，它无法在本地运行。


    本章还讨论了各个平台的关键特性，并提供了开发者开始使用这些平台所需的基本信息。本章最后介绍了一个企业级的付费平台。


    在下一章中，我们将讨论如何扩展前几章设计的自定义聊天机器人，使其能够与各种第三方服务和企业数据库集成，从而为客户提供响应。


    # 8. 聊天机器人集成机制


    在第 6 章中，我们设计了一个简单的 Java 聊天机器人框架，我们称之为 IRIS（意图识别与信息服务）框架。我们讨论了 IRIS 的核心组件，例如如何定义意图，以及如何实现状态机来定义构建对话式聊天机器人的状态和转换。一个示例用例聚焦于保险领域。在该示例中，我们概述了
    IRIS 应执行的特定功能，例如提供市场趋势详情、股票价格信息、天气详情和理赔状态。


    在本章中，我们将重点介绍 IRIS 的集成模块，展示如何连接外部数据源和第三方 API 以进行信息检索。

    '
- fmt: '# Integration with Third-Party APIs


    In our example, the three functionalities of IRIS require integration with third-party
    APIs (Figure [8-1](#478492_1_En_8_Chapter.xhtml#Fig1)):


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig1_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    IRIS integration with third-party APIs


    - Market trends

    - Stock prices

    - Weather information


    ## Market Trends


    There are plenty of free and paid APIs available online that can provide these
    details. We explored [`www.alphavantage.co`](http://www.alphavantage.co), which
    provides free APIs to get real-time and historical stock market data. Alpha Vantage
    APIs are grouped into four categories:


    - Stock time series data

    - Physical and digital/crypto currencies (e.g., Bitcoin)

    - Technical indicators

    - Sector performances


    All APIs are in real time: the latest data points are derived from the current
    trading day.


    Upon providing just three necessary details, which are the type of user, institution/organization
    name, and an email address, we get an API key, and it is free for a lifetime as
    per the website. The free API key can be obtained by providing details at [`www.alphavantage.co/support/#api-key`](http://www.alphavantage.co/support/%2523api-key).


    Once we have the API key, there are various APIs of Alpha Vantage grouped under
    multiple API suites, as shown in Figure [8-2](#478492_1_En_8_Chapter.xhtml#Fig2).


    ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig2_HTML.jpg](images/478492_1_En_8_Chapter/478492_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Alpha Vantage''s multiple API suites


    - Stock time series

    - Forex

    - Technical indicators

    - Cryptocurrencies

    - Sector performances


    More details on each of these APIs can be found at [`www.alphavantage.co/documentation/`](http://www.alphavantage.co/documentation/).


    For our example use case, we want to know how to get the current market trend
    and stock price of a particular stock. For the current market trend, we leverage
    the Sector Performances API, details of which are available at [`www.alphavantage.co/documentation/#sector-information`](http://www.alphavantage.co/documentation/%2523sector%25c2%25adinformation).


    A sample HTTP GET request to obtain real-time, sector-wise performance details
    is at [`www.alphavantage.co/query?function=SECTOR&apikey=demo`](http://www.alphavantage.co/query%253Ffunction%253DSECTOR%2526apikey%253Ddemo).


    The JSON response received from the API is


    ```

    {

    Meta Data:

    {

    Information: "US Sector Performance (realtime & historical)",

    Last Refreshed: "03:44 PM ET 03/04/2019"

    },

    Rank A: Real-Time Performance:

    {

    Real Estate: "0.47%",

    Materials: "0.39%",

    Utilities: "0.11%",

    Energy: "-0.10%",

    Communication Services: "-0.10%",

    Consumer Staples: "-0.22%",

    Consumer Discretionary: "-0.23%",

    Industrials: "-0.33%",

    Information Technology: "-0.50%",

    Financials: "-0.65%",

    Health Care: "-1.49%"

    },

    Rank B: 1 Day Performance:

    {

    Energy: "1.81%",

    Health Care: "1.41%",

    Consumer Discretionary: "0.92%",

    Communication Services: "0.78%",

    Information Technology: "0.71%",

    Financials: "0.54%",

    Utilities: "0.19%",

    Industrials: "0.09%",

    Real Estate: "-0.13%",

    Materials: "-0.16%",

    Consumer Staples: "-0.17%"

    },

    Rank C: 5 Day Performance:

    {},

    Rank D: 1 Month Performance:

    {},

    Rank E: 3 Month Performance:

    {},

    Rank F: Year-to-Date (YTD) Performance:

    {},

    Rank G: 1 Year Performance:

    {},

    Rank H: 3 Year Performance:

    {},

    Rank I: 5 Year Performance:

    {},

    Rank J: 10 Year Performance:

    {}

    }

    ```


    In this response, some data points are available such as real-time performance,
    one day, five days, and one-month performance. The `Real-Time Performance` key
    in the JSON response describes the different sectors of the market along with
    their percentage change in real time. We use this information to provide current
    market trend information in the `MarketTrendState`:


    ```

    public String execute(MatchedIntent matchedIntent, Session session) {

    // Third-party API that provides us the current market trend

    String uri = "https://www.alphavantage.co/query?function=SECTOR&apikey=YOUR_KEY";

    // Java client that performs HTTP request and gets a response by performing a
    GET call to the URL

    RestTemplate restTemplate = new RestTemplate();

    /*

    * Response is mapped to a string object below. However, in actual development,
    we should create a Java Bean (POJO) that will be used to map the response into
    a Java response object by using the getForObject method.

    */

    String result = restTemplate.getForObject(uri, String.class);

    String answer = "";

    /*

    * ObjectMapper provides functionality for reading and writing JSON, either to
    and from basic POJO. It is part of Jackson, a standard Java library for parsing
    JSON.

    */

    ObjectMapper mapper = new ObjectMapper();

    try {

    /*

    * JsonNode is used to parse response in a JSON tree model representation by Jackson.
    JsonNode is a base class for all JSON nodes, which form the basis of JSON Tree
    Model that Jackson implements. One way to think of these nodes is to consider
    them similar to DOM nodes in XML DOM trees

    */

    JsonNode actualObj = mapper.readTree(result);

    JsonNode jsonNode1 = actualObj.get("Rank A: Real-Time Performance");

    answer = "Energy Sector is " + jsonNode1.get("Energy").textValue() + ". Utilities
    at "

    + jsonNode1.get("Utilities").textValue() + ". Real Estate at "

    + jsonNode1.get("Real Estate").textValue() + ". Consumer Staples at "

    + jsonNode1.get("Consumer Staples").textValue() + ". Health Care at "

    + jsonNode1.get("Health Care").textValue() + ". Materials at "

    + jsonNode1.get("Materials").textValue() + ". Telecommunication Services at "

    + jsonNode1.get("Telecommunication Services").textValue() + ". Industrials at
    "

    + jsonNode1.get("Industrials").textValue() + ". Information Technology at "

    + jsonNode1.get("Information Technology").textValue() + ". Consumer Discretionary
    at "

    + jsonNode1.get("Consumer Discretionary").textValue() + ". Financials at "

    + jsonNode1.get("Financials").textValue() + "\nWhat else do you want to know?";

    } catch (Exception e) {

    e.printStackTrace();

    Result = "I am unable to retrieve this information right now. There is some problem
    at my end.\nTry asking something else!";

    }

    return answer;

    }

    ```


    ## Stock Prices


    A user may interact with IRIS and may ask for stock price information. The utterance(s)
    could be


    - What is the current stock price of microsoft

    - Pru stock price

    - Infy stock today

    - Share price of hdfc


    When the utterance is received by IRIS Core, it passes the utterance to the intent
    classification engine, which knows that the user is looking for `''STOCK_PRICE''`.
    Based on this intent and current state, a transition to `StockPriceState` happens.
    The `execute` method of this state then makes a call to the third-party API.


    To retrieve the stock price details, we use a `TIME_SERIES_DAILY` API from the
    Stock time series API suite of Alpha Vantage.


    A sample HTTP GET request:


    [`www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=MSFT&apikey=demo`](http://www.alphavantage.co/query%253Ffunction%253DTIME_SERIES_DAILY%2526symbol%253DMSFT%2526apikey%253Ddemo)


    A sample API response:


    ```

    {

    Meta Data:

    {

    1. Information: "Daily Prices (open, high, low, close) and Volumes",

    2. Symbol: "MSFT",

    3. Last Refreshed: "2019-03-04 16:00:01",

    4. Output Size: "Compact",

    5. Time Zone: "US/Eastern"

    },

    Time Series (Daily):

    {

    2019-03-04:

    {

    1. open: "113.0200",

    2. high: "113.2000",

    3. low: "110.8000",

    4. close: "112.2600",

    5. volume: "25684300"

    },

    2019-03-01:

    {

    1. open: "112.8900",

    2. high: "113.0200",

    3. low: "111.6650",

    4. close: "112.5300",

    5. volume: "23501169"

    },

