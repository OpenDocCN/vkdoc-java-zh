    ### 性别识别


    在此应用中，我们使用一个包含男性和女性名字的语料库来构建一个模型，用于根据给定姓名预测性别。这是一个简单的模型，唯一的特征是名字的最后一个字母。其核心思想是，女性和男性的名字通常表现出某些独特的特征。例如，大多数女性名字以
    a、e 和 i 结尾。我们使用 NLTK 库来构建此模型。


    #### 加载 NLTK 库并下载名字语料库


    从 NLTK 库下载男性和女性名字语料库。该语料库主要由英语名字组成。该模型是通用的，也适用于非英语名字。但是，请注意，我们提取的特征可能不适用于所有名字。


    ```

