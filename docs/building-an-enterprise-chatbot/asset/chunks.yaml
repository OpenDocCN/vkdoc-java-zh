    Putting all the above preprocessing into a single method, we get the following
    code:


    ```

    #Tokenization to extract terms or words from a corpus

    review_tokenizer = Tokenizer()

    def dataset_preparation(review_data):

    corpus = review_data.lower().split("\n")

    review_tokenizer.fit_on_texts(corpus)

    total_words = len(review_tokenizer.word_index) + 1

    #Convert the corpus into a flat dataset

    input_review_sequences = []

    for line in corpus:

    token_list = review_tokenizer.texts_to_sequences([line])[0]

    for i in range(1, len(token_list)):

    n_gram_sequence = token_list[:i+1]

    input_review_sequences.append(n_gram_sequence)

    #Pad the sequences

    max_sequence_len = max([len(x) for x in input_review_sequences])

    input_review_sequences = np.array(pad_sequences(input_review_sequences, maxlen=max_sequence_len,
    padding="pre"))

    #Predictor and label data

    predictors, label = input_review_sequences[:,:-1],input_review_sequences[:,-1]

    label = ku.to_categorical(label, num_classes=total_words)

    return predictors, label, max_sequence_len, total_words

    ```


    #### Creating an RNN Architecture Using a LSTM Network


    As discussed in the introduction, using the predictors and labels generated in
    the dataset preprocessing step above, we create a model using the following layers:


    1.  **Embedding**: It is a dense vector representation for each word index. The
    fixed integers of the predictor are converted into randomly selected dense vectors.
    For example, `[3,4]` could be converted into `[[0.26, 0.14], [0.2, -0.4]]`. The
    dimension of the dense vector is provided by the second argument, `output_dim`,
    to the `embedding` method in Keras. The first argument to the method is `input_dim,`
    which is the total number of words in the review. The argument `input_length`
    is set equal to the max sequence length minus 1.


    2.  **LSTM**: The long short-term memory layer takes `units` as the dimensionality
    of the output space. The activation function by default is tanh, and the recurrent
    activation function is a hard sigmoid function by default. Other available activation
    functions are softmax, Rectified Linear Unit (ReLU), and others. With LSTMs it
    is recommended to use tanh and sigmoid.


    3.  **Dropout**: RNN networks have a tendency to overfit the data. In the `dropout`
    method in Keras, it randomly sets a fraction of input units to 0 based on the
    value in the argument `rate`. In the example, the rate is set to 0.1, which means
    randomly drop 10% of the input units.


    4.  **Dense**: The `dense` method creates a regular densely connected neural network***.***
    This holds the output layer where a `softmax` activation function is applied to
    give values between 0 and 1\. The word with a value close to 1 is highly probable
    to be the next word in the sequence based on the input predictor.


    Finally, using the `fit` method , we train the model. In the `fit` function, we
    give predictors, labels, and epochs as the input arguments. Epochs decide the
    number of iterations for training. After the predefined epochs, the training stops.
    The `compile()` method sets the `loss` function to `categorical_crossentropy`
    and the `adam` optimizer is chosen as a learning algorithm, which is based on
    the stochastic descent approach. The metric accuracy is set to observe the improvement
    in the training accuracy as the epochs increase.


    ```

    #RNN model

    def create_model(predictors, label, max_sequence_len, total_words):

    input_len = max_sequence_len - 1

    model = Sequential()

    model.add(Embedding(input_dim = total_words, output_dim = 10, input_length=input_len))

    model.add(LSTM(150))

    model.add(Dropout(0.1))

    model.add(Dense(total_words, activation="softmax"))

    model.compile(loss=''categorical_crossentropy'', optimizer="adam")

    model.fit(predictors, label, epochs=100, verbose=1)

    return model

    ```


    #### Defining the Generate Text Method


    The following method, using the trained model, predicts the most probable next
    word. The word with the highest probability is given as an output of the model.
    Since the input to the model is the sequence of integers from the word indexes,
    a final mapping to the corresponding word is performed in the for loop in the
    following code. A sample seed text is used in the prediction to generate the text.
    We can control the number of words we would like to generate.


    ```

    def generate_text(seed_text, next_words, max_sequence_len, model):

    for j in range(next_words):

    token_list = review_tokenizer.texts_to_sequences([seed_text])[0]

    token_list = pad_sequences([token_list], maxlen=

    max_sequence_len-1, padding="pre")

    predicted = model.predict_classes(token_list, verbose=0)

    output_word = ""

    for word, index in review_tokenizer.word_index.items():

    if index == predicted:

    output_word = word

    break

    seed_text += " " + output_word

    return seed_text

