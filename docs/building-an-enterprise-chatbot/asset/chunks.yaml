    ### Gender Identification


    In this application, we use a corpus of male and female names to build a model
    for predicting gender from a given name. It is a simple model with the only feature
    as the last letter of the name. The core idea is that female and male names generally
    show certain distinctive features. For example, most female names end with a,
    e, and i. We use the NLTK library to build this model.


    #### Loading the NLTK Library and Downloading the Names Corpus


    Download the male and female name corpus from the NLTK library. The corpus mostly
    consists of English names. The model is generic and is applicable to non-English
    names. However, note that the feature we derive might not be applicable for all
    names.


    ```

    import nltk

    nltk.download(''names'')

    [nltk_data] Downloading package names to

    [nltk_data]     C:\Users\KARTHIK\AppData\Roaming\nltk_data...

    [nltk_data]   Unzipping corpora\names.zip.

    ```


    #### Loading the Male and Female Names


    After downloading, we create a list of male and female separately to process it
    further.


    ```

    names = nltk.corpus.names

    names.fileids()

    male_names = names.words(''male.txt'')

    female_names = names.words(''female.txt'')

    ```


    #### Common Names


    We can print a few common names that are in both the male and female corpus, such
    as Abbie, Andy, and Barrie.


    ```

    #Common names

    print([w for w in male_names if w in female_names])

    [''Abbey'', ''Abbie'', ''Abby'', ''Addie'', ''Adrian'', ''Adrien'', ''Ajay'',
    ''Alex'', ''Alexis'', ''Alfie'', ''Barrie'', ''Ariel'', ''Allie'', ''Angel'',
    ''Angie'', ''Andrea'', ''Andy'', ''Allyn'', ''Andie'', ''Alix'', ''Ashley'', ''Aubrey'',
    ''Augustine'', ''Austin'', ''Averil'', ''Ali'', ''Barry'', ''Beau'', ''Bennie'',
    ''Benny'',...]

    ```


    #### Extract Features


    As a feature to our model, we extract the last letter of each name. Generally,
    the last name is a good indicator of a person’s gender. We will further see in
    the output of the model how the last letter of the person name plays an important
    role in the gender prediction model.


    ```

    def gender_features(word):

    return {''last_letter'': word[-1]}

    gender_features(''Shrek'')

    {''last_letter'': ''k''}

    ```


    #### Randomly Splitting into Train and Test


    Now we train the model. We split the male and female corpus of names into training
    and testing sets. The split is chosen after shuffling the names randomly using
    the library random in Python. From the resulting corpus, we assign the first 500
    names into training and the next 500 into testing.


    ```

