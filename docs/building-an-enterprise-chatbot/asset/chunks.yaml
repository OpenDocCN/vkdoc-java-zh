    现在，利用模型，我们可以根据给定的种子文本预测下一个单词。在下面的示例中，种子文本是“signing like”，我们要求预测接下来的三个单词。结果接近我们的预期。不过，模型预测的是“jackson”，而不是“janet”。请注意，我们只用了少量数据样本来训练模型。更多的数据将进一步提升性能。正如我们在训练过程中观察到的，100
    个 epoch 结束时的训练准确率保持在 29%，这个数值并不算高。


