    #### Question Answering


    Chatbots often need to understand the context of the conversation to answer a
    particular query from a user. The `deeppavlov` library provides a pretrained model
    trained on Stanford Question Answering Dataset (SQuAD) dataset, a reading comprehension
    dataset consisting of crowdsourced questions on a set of Wikipedia articles. More
    details on the dataset can be found at [`https://rajpurkar.github.io/SQuAD-explorer/`](https://rajpurkar.github.io/SQuAD-explorer/).


    The main task the model trained on SQuAD dataset performs is to identify a given
    context and answer a question within the given context.


