    ### Intent Classification and Question Answering


    The two most important NLU tasks a chatbot should perform well are to classify
    the intent of a given user query and answer questions by understanding the context.
    While there are many propriety frameworks around these two tasks, they don''t
    provide the visibility of what happens behind the scene. In this section, we will
    use a Python library called `deeppavlov`. It''s an open-source deep learning library
    for end-to-end dialog systems and chatbots. The library provides many pretrained
    deep learning models as part of its offering.


    #### Intent Classification


    We need to classify a given query (input from the user) into an intent class.
    Once an intent class is identified, a chatbot can trigger the respective logic
    as a response to a user query. For example, if the query is "how is the weather
    today," the intent classification should trigger the weather services API from
    within the chatbot and fetch the result.


    The `deeppovlav` library provides many built-in intent classification models.
    In the following demo, we will use a pretrained NLU benchmark dataset called `SNIPS`.
    It is trained for the following seven intents:


    *   `GetWeather`

    *   `BookRestaurant`

    *   `PlayMusic`

    *   `AddToPlaylist`

    *   `RateBook`

    *   `SearchScreeningEvent`

    *   `SearchCreativeWork`


    ##### Setting tensorflow as the Back End


    In order to use the `KerasClassificationModel` in the Windows platform, we need
    to set the `KERAS_BACKEND` to `tensorflow`. The following code is used for the
    same:


    ```

    import os

    os.environ["KERAS_BACKEND"] = "tensorflow"

    ```


    ##### Building the Model


    We install `deeppavlov` in either the `virtualenv` or `conda` environments. In
    the following command line example, we create a `conda` environment named `deeppavlov`
    and then install and download the required libraries and model files for using
    `SNIPS` intents:


    ```

