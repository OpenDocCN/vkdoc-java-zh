    #### 使用正则表达式进行名词短语分块


    在上述内容中，你将词元视为任何自然语言处理中的基本单元。由于在自然语言中，一组词元的组合往往能揭示含义或代表一个概念，因此我们创建了语块。通过一种称为分块的过程进行分割，从而生成多词元序列。在图
    5-7 中，较小的方框表示单词级词元化，较大的方框表示多词元序列，也称为高级语块。此类语块是使用正则表达式或 n-gram 方法（后续章节将详细介绍）创建的。分块对于实体识别至关重要，我们稍后将探讨这一点。


