  raw: '## Conversational Chatbot Landscape


    In this internet era, every time a person requires a service or information, the
    person must find an appropriate website. In the mobile era, native apps took center
    stage with the same purpose as a website. Every business nowadays has one website
    and one mobile app at the bare minimum. Now, in the AI era, a customer is flooded
    with information on the website and the mobile app, and there aren’t as many employees
    to help the many customers who are seeking the service or information. Moreover,
    even if a company finds many employees, the cost is very high. Conversational
    bots or chatbots are playing a pivotal role in the AI era by addressing the critical
    problem of information deluge at an affordable cost.


    The organization is going through a digital transformational journey where chatbots
    are being discussed in roadmaps. The primary objective is to improve customer
    experience through simplified touchpoints and faster service time. This objective
    often results in higher conversion for newer products and services and reduced
    cost of operations.


    A massive growth of bot frameworks (technology) and advancements in the natural
    language understanding (AI) has led to the adaption of chatbots in many industries.
    Companies are building chatbots across the lifecycle of their customers, namely


    *   Acquisition


    *   Engagement


    *   Servicing


    *   Feedback


    Acquisition and engagement help companies build a strong top line for the business
    while servicing helps in reducing cost and feedback increases customer retention.


    Figure [1-7](#478492_1_En_1_Chapter.xhtml#Fig7) shows an industry-wide adaption
    of chatbots and various use-cases.


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig7_HTML.png](images/478492_1_En_1_Chapter/478492_1_En_1_Fig7_HTML.png)


    Figure 1-7


    Conversational chatbot landscape


    In terms of benefits, insurance companies are now able to process their claims
    24% faster,^([³](#fn3)) and telcos are achieving as much as 90%^([⁴](#fn4)) reduction
    in their customer service calls, in which 75% is reduced by self-service guides
    and automatic tips and an additional 15% of calls with the help of an artificial
    intelligence agent. This leaves only 10% to the costly phone call operator. By
    answering up to 80% of routine questions in a service center, the customer service
    cost is reduced by 30%^([⁵](#fn5)) and companies like Autodesk saw 99%^([⁶](#fn6))
    improvement in response time for their level 1 queries. The benefits are continually
    increasing with more adaption and improvements.


    In the upcoming chapters, we will delve into the details of NLU and various technologies
    to build a fully functional enterprise-grade chatbot. In the next chapter, we
    will discuss how to identify the customer interactions points, the data collection
    strategy, the importance of being compliant with privacy laws and understanding
    the data flow for each interaction with the client.


    ## Summary


    This chapter focused on processes in the banking and insurance industry where
    chatbots are bringing a new wave of innovation. Tasks that were earlier thought
    to be possible only by humans are now getting automated. Such innovation brings
    the cost down and helps in achieving scale. We also discussed chatbots in various
    other industries including healthcare and travel. Various industry reports were
    highlighted to prove the benefits of using AI-driven chatbots in an industry.
    In the coming chapters, we will build a conversational chatbot from scratch, keeping
    the focus on banking and insurance.


    Footnotes [1](#478492_1_En_1_Chapter.xhtml#Fn1_source)   [2](#478492_1_En_1_Chapter.xhtml#Fn2_source)
      [3](#478492_1_En_1_Chapter.xhtml#Fn3_source)   [4](#478492_1_En_1_Chapter.xhtml#Fn4_source)
      [5](#478492_1_En_1_Chapter.xhtml#Fn5_source)   [6](#478492_1_En_1_Chapter.xhtml#Fn6_source)


    # 2. Identifying the Sources of Data


    Chatbots are one more channel of providing conversational flows to customers.
    In the previous chapter, we discussed how the banking and insurance industries
    are structured and what kinds of interactions happen with the customers in those
    industries. There are many types of touchpoints a bank or insurer provides to
    customers in the day-to-day operations, starting from selling a new policy to
    settling escalations of claims. All these touchpoints are sources of data for
    building an AI Assistant, i.e., chatbot. In this chapter, we will start by introducing
    chatbot types and sources of data for training chatbots and then we will introduce
    the General Data Protection Regulation (GDPR) in context of the chatbot for personal
    data.


    ## Chatbot Conversations


    The chatbot tries to mimic the conversation of a real human. In the context of
    interacting with a business, the conversations can be of a broad, generic subject
    or particular to the product or service. Based on the scope of conversation, we
    can divide the conversation into two types: general conversations and specific
    conversations. The type of conversation decides the scope of questions and knowledge
    the chatbot or human assistant needs in order to interact with a customer.


    ### General Conversations


    A general conversation is a typical conversation that happens when a customer
    and assistant are not confined to a specific topic or concern. The conversations
    can start from any point and can transverse to any direction based on the knowledge
    level of an assistant.


    An example of such a conversation is


    *   A user walks into the bank and wants to talk to the manager. Before the start
    of the conversation, we don’t know who this person is and why he is visiting the
    manager. The conversation can be about a sponsorship event, a loan account or
    utility payment, or something else.


    To deal with such conversations, the chatbot needs to be built with many types
    of contexts and appropriate replies. The replies for such general conversations
    are also not heuristic in nature; they involve human natural intelligence and
    information/experience that is not available for the chatbot to build a conversation.


    Many advances are happening in AI; we try to mimic complete human behavior by
    training with massive datasets and scenarios. However, we are still far away in
    terms of having complete general-conversation-based chatbots for industrial use
    cases.


    ### Specific Conversations


    Specific conversations are limited to some predesigned outcomes. These types of
    conversations have higher clarity of the scope of the talk and clear instructions
    to fall back on or cross-references to other sources. Any deviations from the
    set conversations are generally directed to predefined outcomes. All other cases
    are redirected to appropriate channels, or the conversations ends.


    An example of such a conversation is


    *   A customer walks into a store and goes to the refund desk. In this case, the
    refund desk has some specific conditions to process a refund and maybe some other
    particular functions. The customer cannot expect any other query than a refund
    to be offered at the refund desk. If he asks a question regarding discounts, he
    is directed by the refund desk to another counter.


    Specific conversations are more predictable and can be handled with higher accuracy.
    The chatbots designed for specific tasks can communicate with information. The
    conversations are outcome-oriented and end once the outcome is achieved.'
  trans: '

    ## 对话式聊天机器人概览


    在这个互联网时代，每当人们需要某项服务或信息时，都必须找到合适的网站。而在移动时代，原生应用占据了中心地位，其目的与网站相同。如今，每家企业至少拥有一个网站和一个移动应用。现在，在人工智能时代，客户被网站和移动应用上的信息淹没，而能够帮助众多寻求服务或信息的客户的员工却不多。此外，即使公司能找到大量员工，成本也极其高昂。对话机器人或聊天机器人正通过以可承受的成本解决信息过载这一关键问题，在人工智能时代发挥着关键作用。


    组织正在经历数字化转型之旅，聊天机器人已成为路线图中的讨论议题。其主要目标是通过简化的接触点和更快的服务时间来改善客户体验。这一目标通常能带来新产品和服务的更高转化率，并降低运营成本。


    机器人框架（技术）的迅猛发展以及自然语言理解（人工智能）的进步，促使聊天机器人在众多行业中得到应用。公司正在其客户的整个生命周期内构建聊天机器人，即：


    *   获取

    *   互动

    *   服务

    *   反馈


    获取和互动有助于公司建立强大的业务收入来源，而服务则有助于降低成本，反馈则能提高客户留存率。


    图 1-7 展示了整个行业对聊天机器人的应用情况以及各种用例。


    ![../images/478492_1_En_1_Chapter/478492_1_En_1_Fig7_HTML.png](img/478492_1_En_1_Fig7_HTML.png)


    图 1-7


    对话式聊天机器人概览


    在收益方面，保险公司现在处理索赔的速度提高了 24%^(³)，电信公司的客服电话量减少了高达 90%^(⁴)，其中 75% 的减少归功于自助服务指南和自动提示，另外
    15% 的电话减少得益于人工智能代理的帮助。这使得只有 10% 的电话需要昂贵的人工话务员处理。通过回答服务中心多达 80% 的常规问题，客户服务成本降低了
    30%^(⁵)，而像 Autodesk 这样的公司，其一级查询的响应时间改善了 99%^(⁶)。随着应用的增加和技术的改进，这些收益还在持续增长。


    在接下来的章节中，我们将深入探讨 NLU 的细节以及构建一个功能完善的企业级聊天机器人的各种技术。在下一章中，我们将讨论如何识别客户交互点、数据收集策略、遵守隐私法的重要性，以及理解与客户每次交互的数据流。


    ## 总结


    本章重点介绍了银行业和保险业中聊天机器人正在带来新一轮创新的流程。那些过去被认为只有人类才能完成的任务现在正在实现自动化。这种创新降低了成本，并有助于实现规模化。我们还讨论了聊天机器人在其他各个行业（包括医疗和旅游）中的应用。文中引用了各种行业报告来证明在行业中使用人工智能驱动的聊天机器人的益处。在接下来的章节中，我们将从零开始构建一个对话式聊天机器人，并重点关注银行业和保险业。


    脚注 1   2   3   4   5   6


    # 2. 识别数据来源


    聊天机器人是为客户提供对话流程的又一个渠道。在上一章中，我们讨论了银行业和保险业的结构，以及这些行业中与客户发生的交互类型。银行或保险公司在日常运营中为客户提供多种类型的接触点，从销售新保单到处理索赔升级。所有这些接触点都是构建人工智能助手（即聊天机器人）的数据来源。在本章中，我们将首先介绍聊天机器人的类型和用于训练聊天机器人的数据来源，然后我们将介绍在聊天机器人处理个人数据的背景下，通用数据保护条例（GDPR）。


    ## 聊天机器人对话


    聊天机器人试图模仿真实人类的对话。在与企业互动的背景下，对话可以是广泛、通用的主题，也可以是特定于产品或服务的主题。根据对话的范围，我们可以将对话分为两种类型：通用对话和特定对话。对话类型决定了聊天机器人或人工助手为了与客户互动所需掌握的问题范围和知识。


    ### 通用对话


    通用对话是指客户和助手不局限于特定主题或问题的典型对话。对话可以从任何点开始，并根据助手的知识水平向任何方向发展。


    此类对话的一个例子是：


    *   一位用户走进银行，想和经理谈谈。在对话开始前，我们不知道这个人是谁，也不知道他为何拜访经理。对话内容可能涉及赞助活动、贷款账户、公用事业缴费或其他事宜。


    为了处理此类对话，聊天机器人需要构建多种类型的上下文和适当的回复。此类通用对话的回复本质上也不是启发式的；它们涉及人类的自然智能以及聊天机器人无法获取的信息/经验来构建对话。


    人工智能领域正在取得许多进展；我们试图通过使用海量数据集和场景进行训练来模仿完整的人类行为。然而，在拥有完全基于通用对话的聊天机器人用于工业用例方面，我们仍然相距甚远。


    ### 特定对话


    特定对话局限于一些预先设计好的结果。这类对话对谈话范围有更高的清晰度，并有明确的指令用于回退或交叉引用到其他来源。任何偏离设定对话的情况通常都会被引导至预定义的结果。所有其他情况则被重定向到适当的渠道，或者对话结束。


    此类对话的一个例子是：


    *   一位顾客走进商店，来到退款柜台。在这种情况下，退款柜台有一些处理退款的具体条件，可能还有一些其他特定功能。顾客不能期望在退款柜台得到除退款以外的任何其他服务。如果顾客询问有关折扣的问题，退款柜台会将其引导至另一个柜台。


    特定对话更具可预测性，并且可以以更高的准确度进行处理。为特定任务设计的聊天机器人可以利用信息进行交流。这些对话以结果为导向，一旦达成结果，对话即告结束。

    '
- fmt: '# Training Chatbots for Conversations


    Chatbots need to be taught how to have a conversation. The training of chatbots
    involves exposing chatbots to both rules and natural conversations. For general
    conversation chatbots, the amount of training data required is enormous, and so
    far we have not succeeded in creating an accurate general conversation chatbot.
    `Alexa`, `Siri`, and `Google Home` are few examples in this direction.


    Creating chatbots also requires a set of rules documented or tacit to proceed
    with conversations. For example, if a chatbot asks for a customer’s name, it must
    expect a first name and a last name. If the last name is not captured, it must
    go back and confirm the name. This is important to make sure the conversation
    is specific to the correct customer.


    To train a chatbot for conversations, we need to have a corpus of training data.
    The training data can be accessed from multiple sources based on the use case.
    In the following sections, we discuss some datasets for use in training chatbots.


    ## Self-Generated Data


    Chatbot developers need to start with some data to make the chatbot come alive.
    Usually, that data is generated by developers for some necessary flow themselves.
    This way they get some high-level flow defined by themselves so that they can
    keep developing the chatbot with assumptions.


    In many cases, developers create multiple inputs and self-annotate them for training
    basic flows; being generated by developers for testing the flows, they are not
    the complete set for training. These inputs help developers get the chatbot ready
    for a beta release and collect data from real users. Self-generated data is only
    a way to start development; it’s not for general public use.


    The data generated by developers is used to establish the data pipelines and system
    integration testing. Once the beta is deployed, the internal users can be exposed
    to the chatbot and more data is collected to keep training the natural language
    module.


    ### Note


    Do not confuse self-generated data with natural language generative (NLG) models.
    You will learn more about natural language generation from the small dataset in
    Chapter [5](#478492_1_En_5_Chapter.xhtml).


    ## Customer Interactions


    Customer interaction is the best source for training the chatbots. These conversations
    are the best to mimic for mainly two reasons:


    - Typical queries can be captured, and chatbot training can be prioritized for
    specific conversations.

    - The conversations capture real solutions provided in the past by experienced
    customer representatives.


    Customer interactions happen through multiple channels, and these channels produce
    data for training chatbots as a new channel for customer interactions. Figure
    [2-1](#478492_1_En_2_Chapter.xhtml#Fig1) shows the six main types of customer
    interaction channels for any modern business, applicable to our case of an insurance
    and bank as well.


    ![../images/478492_1_En_2_Chapter/478492_1_En_2_Fig1_HTML.jpg](images/478492_1_En_2_Chapter/478492_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Customer interaction/service channels


    ### Phone


    Phone calls are attended by experienced call center representatives and mostly
    accessed when the customer requires an immediate resolution to their queries.
    In modern days, this mode is recommended as the last step since it is costly for
    companies to maintain.


    From the call center, we can get call transcripts, call recordings, core issues,
    and their resolutions. Core issues identified during calls and their resolution
    can help our chatbot learn to identify issues and provide solutions.


    ### Emails


    Email conversations are usually detailed and have a chronology of events explained
    and a clear statement of what the customer wants. These emails can be a good source
    to capture issues that need more than one-dimensional data to solve them.


    Customer email records can be accessed in plain text format, with original emails
    and the response trail to developed conversations.


    ### Chat


    Many financial institutions use online web chat with customer service representatives
    to make sure they can serve multiple clients at the same time and reduce dropout
    of incoming queries at the call center.


    This data set is very close to what a chatbot needs to mimic a conversation. Past
    chatlogs can be accessed as plain text files.


    ### Social Media


    Social media become popular when social media companies allowed business accounts
    to be created on their platforms. The interaction of social media tends to be
    generic and difficult to track with the actual customer of the general population.


    Some platforms allow business accounts to download their data while some allow
    extracting data from API endpoints.


    ### Customer Self-Service


    Some necessary troubleshooting processes are created as self-service portals for
    customers. They may be as trivial as changing the PIN or offering FAQs for more
    information. Successful self-service cases are good for creating processes to
    train the chatbot to help people who ignore or can’t use self-service.


    This data is usually structured as a tree of conversations leading to the solution
    of specific problems.


    ### Mobile


    Mobile here is considered the interactions that happen via mobile apps and mobile
    browsing history by customers. The data captured from these mobile applications
    is captured as activity logs of customers.


    ## Customer Service Experts


    Customer service experts play a significant role in identifying typical customer
    queries and how they handle them in real situations. Their inputs are also helpful
    in creating default replies and designing fall-over options. The years of experience
    dealing with customers can be used to train as well as test the initial chatbot
    release.


    Experts need to be part of the process of developing chatbots for quality assessment
    of the chatbots’ experience and accuracy.


    ## Open Source Data


    Open source data is instrumental when you want to create general conversation
    chatbots and want to include some general flavor for specific talk. There are
    plenty of data sources available for training chatbots in natural language conversations.


    A few of the open data sources are listed below; you can have more datasets as
    per your need.


    - Yahoo Language Data, created from Yahoo Answers ( [`www.cs.cmu.edu/~ark/QA-data/`](http://www.cs.cmu.edu/%257Eark/QA-data/)
    )

    - WikiQA corpus, created from bing queries that redirect to wiki pages with a
    solution ( [`http://research.microsoft.com/apps/mobile/download.aspx?p=4495da01-db8c-4041-a7f6-7984a4f6a905`](http://research.microsoft.com/apps/mobile/download.aspx%253Fp%253D4495da01-db8c-4041-a7f6-7984a4f6a905)
    )

    - Ubuntu Dialogue corpus, created from Ubuntu technical support ( [`www.kaggle.com/rtatman/ubuntu-dialogue-corpus`](http://www.kaggle.com/rtatman/ubuntu-dialogue%25c2%25adcorpus)
    )

    - Twitter data on Kaggle, created from customer support at Twitter ( [`www.kaggle.com/thoughtvector/customer-support-on-twitter`](http://www.kaggle.com/thoughtvector/customer-support-on-twitter)
    )


    ## Crowdsourcing


    The most critical training data comes from REAL people interacting with your chatbot
    in real time. This not only helps in building the corpus for training but also
    help developers see darker zones where the chatbots fail.


    In best practice cases, all chatbots released at beta version are exposed to real
    conversations with selected customers and internal employees. The data is collected,
    and NLP models are retrained for each real instance. Another outcome of crowdsourcing
    is laying down the guidelines and scope of the chatbot.


    Customer service experts also use the crowdsourcing inputs to build response languages
    and intensity for different conversations.


    If you are building a chatbot in a regional language, you need to rely on crowdsourcing
    of training data. Some companies can provide you access to people who will interact
    with your chatbot to build the training corpus.'
