    session, "weight", null));

    int height = Integer.parseInt(SessionStorage.getStringFromSlotOrSession(matchedIntent,
    session, "height", null));

    /*

    * Checking business logic and calculating BMI (body mass index).

    * In the example, eligibility is defined based on whether BMI is less than or
    greater than 33.

    */

    if (age > 60 || age  33)

    eligible = false;

    if (eligible) {

    answer = "Great News! You are eligible for an accelerated UW Decision.\nPlease
    proceed with your application "

    + "at this link: https://www.dummylink.com \n"

    + "Anything else that I could help you with?";

    } else {

    answer = "Unfortunately, You are not eligible for an Accelerated UW Decision.\nPlease
    register at https://www.dummylink.com "

    + "and our representatives will contact with you shortly to further process your
    application\n"

    + "Anything else that I could help you with?";

    }

    /*

    * Remove attributes stored in the session. All of these four attributes are treated
    as short term in the example. We used the session also to store details of which
    slots to prompt for and which not to based on whether user answered them .

    */

    session.removeAttribute("getageprompt");

    session.removeAttribute("getsmokedprompt");

    session.removeAttribute("getheightprompt");

    session.removeAttribute("getweightprompt");

    session.removeAttribute("askquotelastquestion");

