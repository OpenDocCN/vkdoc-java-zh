    # Document Classification


    A common task in NLP is when we tag a document (could also be a collection of
    sentences) into a specific category. An example is a news aggregator classifying
    articles into political, sports, and business. Such classification is useful when
    there is an enormous amount of unstructured textual data, and no manual labor
    is available for tagging them. The automatic document classifier could speed-track
    the process of tagging. Another domain where it’s useful is in classifying movie
    and product reviews into positive and negative sentiments.


