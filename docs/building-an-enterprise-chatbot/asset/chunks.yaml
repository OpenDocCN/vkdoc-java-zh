    ```


    In `getStateMachine` method, we define the state classes and `Shields`.


    ### Shields


    As discussed, `Shields` provide a Boolean condition for transition from one state
    to another. If all the information required for transitioning to another state
    is available, `Shields` returns `true`.


    We implement five shields in our example in the `getStateMachine` method, each
    implementing the `validate` method.


    #### DontHaveAccTypeShield


    We need `accType` and a valid `ipin` in order to transition to `GetAccountBalanceState`.
    This shield returns `true` if either of them is not provided.


    ```

    public boolean validate(MatchedIntent match, Session session) {

    // save slots to session

    SessionStorage.saveSlotsToSession(match, session);

    // Get all validation entities from session.

    String accType = SessionStorage.getStringFromSlotOrSession(match, session, "accType",
    null);

    String ipin = SessionStorage.getStringFromSlotOrSession(match, session, "ipin",
    null);

    // Returns true if accType or ipin is null.

    return (accType == null || ipin == null);

    }

    ```


    #### DontHaveQuoteDetailsShield


    We need age, smoker info, height, and weight to provide insurance quotation eligibility.
    This shield returns `true` if we do not have information on any of them. The state
    remains in `AskForQuoteState` until we have answers for all questions and then
    transitions to `GetQuoteState`.


    ```

    Public boolean  validate(MatchedIntent match, Session session) {

    // Save slots into session.

    SessionStorage.saveSlotsToSession(match, session);

    String age = SessionStorage.getStringFromSlotOrSession(match, session, "age",
    null);

    String smoked = SessionStorage.getStringFromSlotOrSession(match, session, "smoked",
    null);

    String height = SessionStorage.getStringFromSlotOrSession(match, session, "height",
    null);

    String weight = SessionStorage.getStringFromSlotOrSession(match, session, "weight",
    null);

    /*

    * If we don''t have all the slots fulfilled, we need to return true so that askForQuote
    state is executed again. As there are multiple questions asked in the askForQuote
    state, unless all questions are answered and all values populated, the state remains
    the same, unless the intent of the user changes.

    */

    return (age == null || smoked == null || height == null || weight == null);

    }

    ```


    #### HaveAccTypeShield


    This shield returns `true` if both `accType` and `ipin` are available from the
    user and allows a transition to the `GetAccountBalanceState`:


    ```

    Public boolean validate(MatchedIntent match, Session session) {

    SessionStorage.saveSlotsToSession(match, session);

    String accType = SessionStorage.getStringFromSlotOrSession(match, session, "accType",
    null);

    String ipin = SessionStorage.getStringFromSlotOrSession(match, session, "ipin",
    null);

    // Returns true only if both accType and ipin are available.

    return (accType != null && ipin != null);

    }

    ```


    #### HaveClaimIdShield


    This shield returns `true` if `claimId` is not null and hence allows a transition
    to the `GetClaimStatus` state:


    ```

    public boolean validate(MatchedIntent request, Session session) {

    SessionStorage.saveSlotsToSession(request, session);

    String claimId = SessionStorage.getStringFromSlotOrSession(request, session, "claimId",
    null);

    // Returns true only if claimId is not null.

    return (claimId != null);

    }

    ```


    #### HaveQuoteDetailShield


    This shield returns `true` if all the values required to transition to `GetQuoteState`
    are present:


    ```

    public boolean validate(MatchedIntent match, Session session) {

    // Saves slots to session.

    SessionStorage.saveSlotsToSession(match, session);

    // Gets all validation entities from session.

    String age = SessionStorage.getStringFromSlotOrSession(match, session, "age",
    null);

    String smoked = SessionStorage.getStringFromSlotOrSession(match, session, "smoked",
    null);

    String height = SessionStorage.getStringFromSlotOrSession(match, session, "height",
    null);

    String weight = SessionStorage.getStringFromSlotOrSession(match, session, "weight",
    null);

    //Returns true if all values exist, else return false.

    return (age != null && smoked != null && height != null && weight != null);

    }

    ```


    We have two more things yet to be discussed to complete `IrisConfiguration` related
    concepts:


    - The execute method of each state

    - State transitions


    ### Adding Execute Methods


    Let’s start by implementing the execute method of each state described in the
    example.


    #### Exit State


    The execute method of `ExitState` responds with a simple reply. In an actual implementation,
    it could also support saving the session and context to a persistent storage before
    resetting them.


    ```

    public class ExitState extends State {

    public ExitState() {

    super("exitState");

    }

    /*

    * When this state is reached, the execute method is invoked. As a result, a reply
    is sent back.

    */

    @Override

    public String execute(MatchedIntent matchedIntent, Session session) {

    String reply = "Anything else that I may help you with?";

    return reply;

    }

    }

    ```


    #### FindAdvisorState


    The execute method of `FindAdvisorState` would typically call a search API with
    required parameters such as advisor name, ZIP code, etc. to return relevant advisors
    to the user. We demonstrate how to reach here but we skip the implementation.


    ```

    public String execute(MatchedIntent matchedIntent, Session session) {

    String reply = "You know what, I dont have the data about financial advisors with
    me."

    + "\nBut I hope you do get the point that I could have surely provided it to you
    if I was connected to a database.\n"

    + "I will let my boss know that you were asking for it. Next time you wont be
    disappointed, I promise.\n Here, ask me anything else for now please!";

    return reply;

    }

