  trans: '

    ### 策略合规性


    每一次对话都可能引发聊天机器人需要处理的多种请求。关键问题随之而来：为了满足用户请求，处理这些信息的合规方式是什么？政策和政府法规决定了哪些行为被允许、哪些不被允许，如果允许，又该如何访问这些信息。


    例如，假设用户想要更新其保险单上的家庭住址。从技术角度来看，这可以简单到（在身份验证后）将以下信息传递给聊天机器人：


    *   **用户**：将我的家庭住址更新为印度第八区 XYZ 地址

    *   **聊天机器人**：地址已更新为印度第八区 XYZ 地址


    但随之而来的是新的问题。客户是否仅凭提供此命令就能更改地址？在真实的银行网点，这一流程是如何进行的？管理地址变更的流程和策略是什么？


    一份策略与法规指南对于引导聊天机器人进行对话至关重要。业务流程以及法定合规要求，必须在所有渠道上得到遵循，任何请求才能被持久化到系统中。例如，即使请求已被确认，也不应直接执行地址更新。在更新地址之前，可能需要要求提供地址证明、说明原因、等待三天，或执行其他流程。


    为客服创建的聊天机器人需要被仔细教导必须遵守的规则或步骤，以完成请求。这些规则可能因聊天机器人的业务和目的而异。这些步骤需要在聊天机器人逻辑中作为严格的“与”条件来实现。


    ### 安全性、身份验证与授权


    聊天机器人可以被允许访问私人信息，或者停留在另一个渠道上以对话方式分发公共信息。身份验证和授权是保障对话安全的两大关键层。一个安全的通信渠道至关重要，以确保用户与聊天机器人之间交换的数据经过加密，并通过非常安全的媒介进行传输。


    可以通过使用 HTTPS 协议进行对话、设置防火墙以及其他行业最佳实践来实施安全策略。安全层必须由网络技术和技术架构来负责，以保护所有对话的安全。在大多数情况下，安全功能可以从现有的业务框架中继承，无需单独设计。


    如图 3-1 所示，用户首先需要通过身份验证流程来确立身份。身份验证流程通常涉及提供用户名和密码，而在多因素身份验证中，还需要提供诸如一次性密码或 PIN
    码之类的额外信息。成功的身份验证会根据系统记录确立用户身份。接下来的流程是确定用户在系统中的权限。在业务术语中，授权也被称为角色管理，因此，在部署聊天机器人之前，业务方需要为每个经过身份验证的用户分配角色/权限。


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig1_HTML.jpg](img/478492_1_En_3_Fig1_HTML.jpg)


    图 3-1


    参考问责框架


    聊天机器人需要对其用户进行身份验证，以确定他们是否有权访问聊天机器人功能，如果允许，还要确定哪些功能对哪些用户开放。当你的聊天机器人连接到后端系统以访问人力资源管理系统、客户关系管理系统等信息时，这一点变得更加重要。在许多情况下，可以使用像
    Active Directory 这样的身份管理系统来为聊天机器人创建身份验证和访问控制机制。典型的身份验证可以是多因素登录系统，或为授权用户提供访问 PIN
    码。


    授权是问责框架中的另一个关键层，它允许企业控制对资源的访问。这也控制了访问控制层，系统在此检查经过身份验证的用户被允许访问哪些区域或功能。这一点非常重要，因为多个用户可能希望在多个独立的对话中使用相同的信息源，我们需要保护数据，并仅根据用户的角色和策略提供其有权访问的内容。


    图 3-2 展示了应用程序的典型访问授权方式；这也同样适用于聊天机器人。我们可以创建一套完整的自定义身份验证和授权服务，或者使用像 AuthO、Active
    Directory 等第三方工具。在所示的方法中，应用程序要求用户提供其凭证，并将其发送到身份验证服务。一旦身份验证成功，它会返回一个包含授权详情的令牌，聊天机器人可以使用该令牌与用户进行交互。


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig2_HTML.jpg](img/478492_1_En_3_Fig2_HTML.jpg)


    图 3-2


    身份验证与授权服务


    ### 用户输入到系统转换的准确性


    聊天机器人逻辑在用户自然语言输入和用于检索信息的机器可执行输入之间创建了一个接口。这个接口需要确保在将输出传递给用户之前，转换是准确的。这是当今基于自然语言处理的聊天机器人面临的最大挑战，因此也是重要的研究领域之一。让我们通过一个例子来说明：


    | 输入 | 聊天机器人逻辑生成的查询 | 系统输出 |

    | --- | --- | --- |

    | 用户：告诉我 2019 年 4 月的工资状态 | 从 payroll_table 中选择状态，其中 empID=UserID 且 month=“April”
    且 year=“2019” | 您的工资状态为“<查询响应>” |

    | 用户：我什么时候能拿到上个月的工资？ | 从 payroll_table 中选择状态，其中 empID=UserID 且 month=?? 且 year=??
    | 您的工资状态为“<查询响应>” |


    在这个例子中，输入 1 和输入 2 需要从系统中获得相同的结果。聊天机器人逻辑需要先解析这两个输入，然后才能为用户获取正确的信息。以下是确保查询能为系统响应获取准确数据的挑战和要求。如果聊天机器人逻辑无法构建正确的问题，结果将不正确，甚至可能导致未经授权的信息无意中泄露给用户。


    ## 聊天机器人开发方法


    聊天机器人开发方法指的是如何构建聊天机器人逻辑。选择方法时的关键考量是在自然语言能力和结果准确性之间取得平衡。如你所知，自然语言处理面临着理解自然对话并将其转换为机器操作的挑战；必须保持平衡。


    如图 3-3 所示，根据聊天机器人的能力及其内置人工智能的程度，存在一个通用的分类。我们对聊天机器人进行分类的关键轴是对话范围和机器响应。


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig3_HTML.png](img/478492_1_En_3_Fig3_HTML.png)


    图 3-3


    基于对话类型和响应类型的聊天机器人分类


    本书及我们讨论的重点是封闭域对话，在此范围内，我们可以采用基于规则的方法，或者使用基于人工智能的方法来创建智能机器。在本节中，我们将介绍两种流行的开发方法。

    '
- fmt: '### Rules-Based Approach


    The rules-based approach, also called the menu-driven approach, works as an extension
    of self-help portals with a better experience. The critical difference is with
    the navigation to solutions. In a self-help portal, you need to navigate to the
    right options manually, while in menu-based chatbots, the navigation can be done
    using natural language and then actions are performed using menus. See Figure
    [3-4](#478492_1_En_3_Chapter.xhtml#Fig4).


    These kinds of chatbots are prevalent and usually high in usage across industry
    use cases that are integrated with CRM and other data systems.


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig4_HTML.jpg](images/478492_1_En_3_Chapter/478492_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Menu-driven chatbot interface


    As shown in Figure [3-4](#478492_1_En_3_Chapter.xhtml#Fig4), a chatbot attempts
    to understand the user question and then presents a menu to choose the next action.
    The list makes sure the backend knows what exact operation needs to be done to
    fulfill the request.


    #### Advantages of the Menu-Based Approach


    There are some advantages to the menu-based approach:


    - The accuracy of the response is confirmed by the design.

    - It’s based on heuristics rather than complicated NLP, and is easy to understand
    and implement.

    - It’s easy to extend to new menu items without retraining the core.


    #### Disadvantages of the Menu-Based Approach


    With the advantage of excellent accuracy and easy implementation, there come some
    limitations:


    - The functionality is strictly limited to the templates’ code.

    - The fulfillment is of two steps: understand the context and bring the menu up.
    After the menu click, fulfill the request.

    - It offers limited natural language conversations since the chatbot do not understand
    beyond the coded situations.


    Even with these limitations, the menu-driven approach is very successful when
    accuracy is more important than the experience of a natural conversation.


    ### AI-Based Approach


    The AI-based approach is based on an advanced NLP engine to support natural language
    and fulfill the request based on ML algorithms and system integration for dynamic
    information retrieval. The accuracy of the chatbot is lower at the start and increases
    over time.


    The critical difference between the menu-based and AI-based approach is the NLP
    engine. An NLP engine is responsible for extracting the information present in
    the user input. Moreover, based on the extracted information, the chatbot needs
    to decide the next steps.


    As shown in Figure [3-5](#478492_1_En_3_Chapter.xhtml#Fig5), the critical role
    of the NLP engine is to extract information from the natural language input. The
    accuracy of the information extraction is critical because it will decide the
    outcome of the conversation and be persisted in the system. The NLP engine needs
    to extract the information required to instruct the system to act. In the menu-driven
    approach, the user must engage with menus to select exact details before the system
    can act.


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig5_HTML.jpg](images/478492_1_En_3_Chapter/478492_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The NLP engine extracts exact information based on ML techniques


    #### Advantages of the AI-Based Approach


    The AI-based approach comes with many advantages and customer-centric benefits:


    - Advanced conversations can happen without the user going into multiple steps
    for actions.

    - The NLP engine can deal with unseen scenarios and numerous texts.

    - The chatbot can learn to create custom responses from scratch (natural language
    generation).


    #### Disadvantages of the AI-Based Approach


    The problems of the AI-based approach are mostly due to the complexity involved:


    - The NLP engine is complex to train, maintain, and improve.

    - The accuracy of responses suffers since the NLP output is not 100% correct.

    - It requires a vast amount of data for a working chatbot NLP engine.


    ## Conversational Flow


    Chatbots for closed-domain applications are built with a defined purpose and functionalities
    that the chatbot will provide as features to the user. To be able to cover the
    possible cases of conversation or the user inputs, we must define the scope and
    all of the flows possible. The flow definitions are essential since we must follow
    policies to be able to provide access to the required data.


    Conversation flow is a decision tree that describes the possible list of events,
    decisions, and outcomes of a conversation at any point in the conversation. This
    type of flow secures higher relevance when the context needs to be maintained
    and the response from the system is not a single step. An example of a conversation
    flow is shown in Figure [3-6](#478492_1_En_3_Chapter.xhtml#Fig6).


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig6_HTML.png](images/478492_1_En_3_Chapter/478492_1_En_3_Fig6_HTML.png)


    Figure 3-6


    Sample conversation flow


    The flow starts with a welcome message and either provides a menu (if it’s a rule-based
    chatbot) or the user asks a sentence (entirely AI-driven chatbot). Once the chatbot
    NLP logic identifies which functionality the user requires, there is a decision
    point to take the user to that conversation path. If the user wants to check the
    status of an order, his next conversational decision point is to enter the order
    number. Once the chatbot receives a valid order id, the backend calls for action
    to retrieve information for that order and take it back to the user. This flow
    maintains the context as well, so if he needs to track another order, he need
    not start from the root but can just enter another order id and the chatbot will
    know to track the order status.


    In more advanced chatbots, you can pass multi-intents in one line, but technically
    the chatbot will process the request in the same flow. So "Track my order number
    465" is a single input from the user, which should fetch the same result. The
    multi-intent chatbots are difficult to build, and chances of error are high.


    Creating a chatbot flow is essential since this defines the scope of features
    and improves the accuracy of the chatbot for the user. It is imperative to make
    it clear to the user what the chatbot is meant to do for them and maybe define
    the features beforehand. The exception cases can always be transferred to default
    responses or a human executive.


    ## Key Terms in Chatbots


    The development of chatbots has become a full-bodied development process, which
    means it is essential for you to understand the terminology of chatbots before
    you attempt to develop one. The key terms used in chatbot development also have
    multiple variants as professed by leading chatbot platform providers like Amazon,
    Google, etc.


    In this section, we will discuss some key terms frequently used in chatbot development.
    In further chapters, we will use these concepts and terminologies to show how
    to develop the chatbot from scratch.


    ### Utterance


    `Utterance` refers to anything that user inputs to the chatbot. The full end-to-end
    input makes an utterance, such as "Get me status of my order id 345," "What is
    the temperature today?," "Hello," "Good Morning," etc.


    `Utterances` are used to develop a classifier for intents in development. The
    chatbot stores as many possible utterances in the database, which are the questions
    asked by the user, and clusters them in different intents, which represent what
    the user wanted to say.


    For developing a chatbot for insurance, we will need to capture actual questions
    asked by users from different channels, such as chats, emails, office visits,
    customer value center, etc. We will use all this historical data to train the
    chatbot to know the actual requirement of the user and which conversational flow
    to use.'
  raw: '### Rules-Based Approach


    The rules-based approach, also called the menu-driven approach, works as an extension
    of self-help portals with a better experience. The critical difference is with
    the navigation to solutions. In a self-help portal, you need to navigate to the
    right options manually, while in menu-based chatbots, the navigation can be done
    using natural language and then actions are performed using menus. See Figure
    [3-4](#478492_1_En_3_Chapter.xhtml#Fig4).


    These kinds of chatbots are prevalent and usually high in usage across industry
    use cases that are integrated with CRM and other data systems.


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig4_HTML.jpg](images/478492_1_En_3_Chapter/478492_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Menu-driven chatbot interface


    As shown in Figure [3-4](#478492_1_En_3_Chapter.xhtml#Fig4), a chatbot attempts
    to understand the user question and then presents a menu to choose the next action.
    The list makes sure the backend knows what exact operation needs to be done to
    fulfill the request.


    #### Advantages of the Menu-Based Approach


    There are some advantages to the menu-based approach:


    *   The accuracy of the response is confirmed by the design.


    *   It’s based on heuristics rather than complicated NLP, and is easy to understand
    and implement.


    *   It’s easy to extend to new menu items without retraining the core.


    #### Disadvantages of the Menu-Based Approach


    With the advantage of excellent accuracy and easy implementation, there come some
    limitations:


    *   The functionality is strictly limited to the templates’ code.


    *   The fulfillment is of two steps: understand the context and bring the menu
    up. After the menu click, fulfill the request.


    *   It offers limited natural language conversations since the chatbot do not
    understand beyond the coded situations.


    Even with these limitations, the menu-driven approach is very successful when
    accuracy is more important than the experience of a natural conversation.


    ### AI-Based Approach


    The AI-based approach is based on an advanced NLP engine to support natural language
    and fulfill the request based on ML algorithms and system integration for dynamic
    information retrieval. The accuracy of the chatbot is lower at the start and increases
    over time.


    The critical difference between the menu-based and AI-based approach is the NLP
    engine. An NLP engine is responsible for extracting the information present in
    the user input. Moreover, based on the extracted information, the chatbot needs
    to decide the next steps.


    As shown in Figure [3-5](#478492_1_En_3_Chapter.xhtml#Fig5), the critical role
    of the NLP engine is to extract information from the natural language input. The
    accuracy of the information extraction is critical because it will decide the
    outcome of the conversation and be persisted in the system. The NLP engine needs
    to extract the information required to instruct the system to act. In the menu-driven
    approach, the user must engage with menus to select exact details before the system
    can act.


