- fmt: '# Policy Compliance


    Every conversation can lead to many types of requests to be fulfilled by the chatbot.
    The crucial questions then becomes, to fulfill a user request, what is the compliant
    way to dispose of that information? The policies and government regulations decide
    what is allowed and what is not allowed, and if allowed, how to access that information.


    For example, suppose a user wants to update his home address for his insurance.
    This, from a technology perspective, can be as simple as passing the following
    information to the chatbot (after authentication):


    - **User**: Update my home address to XYZ, sector-8, India

    - **Chatbot**: Address updated to XYZ, sector-8, India


    But there are new questions. Is customer allowed to change his address by just
    providing this command? How would this happen at an actual bank branch? What are
    the processes and policies that govern an address change?


    A policy and regulation guide is essential to drive the conversation through the
    chatbot. The business process, as well as statutory compliance, needs to be followed
    across channels for any request to be persisted in the system. For example, updating
    the address should not be performed even if the request has been confirmed. It
    may require asking for address proof, reason, waiting three days, or some other
    process before updating the address.


    The chatbots created for customer service need to be carefully taught the must-follow
    rules or steps to fulfill a request. These rules can differ based on the business
    and purpose of the chatbot. These steps need to be implemented as strict “AND”
    conditions in chatbot logic.


    # Security, Authentication, and Authorization


    Chatbots can be allowed to access private information or remain on another channel
    to distribute public information conversationally. Authenticating and authorization
    are two essential layers for securing a conversation. A secure communication channel
    is vital to make sure the data exchanged between the user and the chatbot is encrypted
    and transferred over a very secure medium.


    Security policies can be enforced by having conversations over the `HTTPS` protocol,
    having a firewall, and other industry best practices. The security layer must
    be taken care of by the network technology and technical architecture to secure
    all the conversations. The security features can be inherited from the existing
    framework of the business and need not be designed separately, in most cases.


    As seen in Figure [3-1](#478492_1_En_3_Chapter.xhtml#Fig1), the user first needs
    to establish the identity via the authentication process. The authentication process
    generally involves providing a username and password, and in multi-factor authentication,
    additional information like an `OTP` or `PIN`. The successful authentication establishes
    the user identity as per system records. The next process is to establish the
    permissions the user has in the system. Authorization is also called role management
    in business terminology, and hence the business needs to assign roles/permissions
    for each authenticated user before deployment of the chatbot.


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig1_HTML.jpg](images/478492_1_En_3_Chapter/478492_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Reference accountability framework


    The chatbot needs to authenticate its users to ascertain if they are allowed to
    access chatbot features, and if allowed, which features are allowed for which
    user. This becomes more important when your chatbot connects to the backend system
    for accessing information like `HRM`, `CRM`, and other methods. In many cases,
    an Identity Management System (`IMS`) like `Active Directory` can be used to create
    authentication and access the control mechanism for the chatbot as well. A typical
    authentication can be a multi-factor login system or an access `PIN` for authorized
    users.


    Authorization is another essential layer in the accountability framework and it
    allows the enterprise to control access to the resources. This also controls the
    access control layer where the systems check what areas or functionality the authenticated
    user is allowed to access. This is very important because multiple users will
    want to use the same source of information in multiple independent conversations,
    and we want to protect the data and deliver only what the user is authorized to
    access as per their role and policies.


    Figure [3-2](#478492_1_En_3_Chapter.xhtml#Fig2) shows how typical access is granted
    for an application; it’s valid for chatbots as well. We can create a full, custom
    authentication and authorization service or use third-party tools like `AuthO`,
    `Active Directory`, etc. In the shown approach, the application asks the user
    for their credentials and sends them to the auth service. Once authenticated,
    it returns a token with authorization details, which can be used by the chatbot
    to interact with the user.


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig2_HTML.jpg](images/478492_1_En_3_Chapter/478492_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Authentication and authorization service


    # Accuracy of User Input Translation to Systems


    The chatbot logic creates an interface between the user inputs in natural language
    and machine actionable inputs for retrieving information. This interface needs
    to make sure that the translation is accurate before the output is delivered to
    the user. This is the biggest challenge `NLP`-based chatbots face today, and hence
    one of the substantial research areas. Let’s explain this with an example:


    | Input | Chatbot Logic Generated Query | System Output |

    | --- | --- | --- |

    | User: Tell me the status of my salary for April 2019 | `Select status from payroll_table
    where empID=UserID and month="April" and year="2019"` | Your salary status is
    “<RESPONSE FROM QUERY>” |

    | User: When I will get my last month’s salary? | `Select status from payroll_table
    where empID=UserID and month= ?? and year= ??` | Your salary status is “<RESPONSE
    FROM QUERY>” |


    In this example, Input 1 and Input 2 need to get the same result from the system.
    The chatbot logic needs to resolve for the two inputs before it can fetch the
    correct information for the user. Here are the challenges and requirements of
    making sure the query gets accurate data for the system to respond. If the chatbot
    logic is unable to create the right question, the results will not be correct
    and may even cause unauthorized information to be shared with users unintentionally.


    # Chatbot Development Approaches


    The chatbot development approach refers to how to build the chatbot logic. The
    critical consideration in selecting the approach is the balance between natural
    language abilities and accuracy of results. As you know, `NLP` comes with a challenge
    of understanding the natural conversations and translating them to machine actions;
    a balance must be maintained.


    As shown in Figure [3-3](#478492_1_En_3_Chapter.xhtml#Fig3), there is a general
    classification of chatbots based on their abilities and the extent of AI built
    within them. The critical axis over which we classify chatbots is conversation
    scope and machine responses.


    ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig3_HTML.png](images/478492_1_En_3_Chapter/478492_1_En_3_Fig3_HTML.png)


    Figure 3-3


    Chatbot classification based on conversation types and response types


    The focus of this book and our discussion is on closed domain conversations, where
    we can have either a rule-based approach or create smart machines using an AI-based
    approach. In this section, we describe the two popular types of development approaches.'
