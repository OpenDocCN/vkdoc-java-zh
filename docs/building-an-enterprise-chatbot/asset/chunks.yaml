    From the dependency trees, you can see that there are two compound word pairs,
    “English Bulldog” and “skin allergies,” and NUM **“3”** is the modifier of **“age.”**
    You can also see “summer” as the noun phrase as an adverbial modifier (npadvmod)
    to the token “had.” You can also observe many direct objects (dobj) of a verb
    phrase, which is a noun phrase, like (got, him) and (had, allergies) and object
    of a preposition (pobj) like (at, age). A detailed explanation of the relationships
    in a dependency tree can be found here: [`https://nlp.stanford.edu/software/dependencies_manual.pdf`](https://nlp.stanford.edu/software/dependencies_manual.pdf)
