    ## Applications


    In this section, using the knowledge gained so far, we will build the following
    four applications of NLP:


    - **Topic modeling using the spaCy, NLTK, and gensim libraries:** This is an extension
    of the topic modeling we performed using LDA earlier in the chapter. In this demonstration,
    we will use the combined knowledge of spaCy, NLTK, and gensim to perform various
    tasks in topic modeling.

    - **Classify between male and female gender by using the person name:** Using
    features like the last letter of a name and a corpus of male and female names,
    we will classify between a male and female name. This might help in filtering
    through the reviews and identifying any gender-based distinctions in the reviews
    for a product.

    - **Given a document, classifying it into a different category:** Classify a review
    into positive and negative. We will use the NLTK library to perform the preprocessing
    and classification using the Naïve Bayes classifier.

    - **Intent classification and question answering:** In this application, we will
    build an intent classifier and context-based question-answering utility which
    could be integrated with any chatbot application. We will use pretrained deep
    learning models using the DeepPavLov library in Python.


    ### Topic Modeling Using spaCy, NLTK, and gensim Libraries


    In the demonstration, we will use spaCy for tokenizing the review text, NLTK for
    the lemmatization and preprocessing the text, and the LDA model from gensim for
    training the model.


    #### Tokenizing and Cleaning the Text


    Using the `en_core_web_md` language model in spaCy (which is a slightly bigger
    pretrained model than `sm`, meaning it''s trained on the larger vocabulary of
    words), we will do the following in the cleaning process for each token:


    1. Detect URLs and screen names, and append them separately into the `lda_review_tokens`
    list. This is to ensure the URLs and screen names are not processed further.

    2. Convert the rest of the tokens into lowercase.


    ```

    # Clean

    import spacy

    spacy.load(''en_core_web_md'')

    from spacy.lang.en import English

    parser = English()

    def tokenize_review_text(text):

    lda_review_tokens = []

    review_tokens = parser(text)

    for token in review_tokens:

    if token.orth_.isspace():

    continue

    elif token.like_url:

    lda_review_tokens.append(''URL'')

    elif token.orth_.startswith(''@''):

    lda_review_tokens.append(''SCREEN_NAME'')

    else:

    lda_review_tokens.append(token.lower_)

    return lda_review_tokens

    ```


    #### Lemmatization


    Using the `wordnet` method, return the lemma for each word. Lemmatization keeps
    only the root of the word, not its different forms.


    ```

    import nltk

    nltk.download(''wordnet'')

    from nltk.corpus import wordnet as wordNet

    def get_lemma(word):

    lemma = wordNet.morphy(word)

    if lemma is None:

    return word

    else:

    return lemma

    ```'
