    让我们考虑如下代码所示的一条评论。该语法使用一条规则来查找名词，该规则规定：*查找名词语块，其中零个或一个（?）限定词（DT）后跟任意数量（*）的形容词（JJ）和一个名词（NN）*。在以下代码输出中显示的词性标注树中，所有标记为
    NP 的语块都是名词短语：


