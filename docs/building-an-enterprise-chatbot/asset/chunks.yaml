    benefits, the cost needs to justify all the efforts and resources used for chatbot
    development and maintenance.


    A BI Intelligence study ( [`www.businessinsider.com/intelligence/research-store?&vertical=mobile#!/The-Messaging-Apps-Report/p/56901061`](https://www.businessinsider.com/intelligence/research-store%253F%2526vertical%253Dmobile%2523%2521/The-Messaging-Apps-Report/p/56901061)
    ) shows potential annual savings on salaries by augmenting the chatbots across
    various business functions. The highest expenditure area for salaries is the customer
    service representatives, where the savings are also highest. The cost reduction
    is clearly visible and attributable to the use of chatbots across the functions
    in insurance sales, reporting, sales, and customer service.


    ### Customer Experience


    Customer experience is the second most impactful factor for introducing chatbots
    to a business. The customer experience brings a multitude of values to the business,
    not just limited to direct sales or savings. The benefits of good customer experience
    include


    *   High brand value and recall


    *   High lifetime values (improved engagement)


    *   Brand differentiator from competitors


    There are many other derived factors due to a happy customer experience. A loyal
    customer base is a recipe for long-term success.


    The *Chatbots Magazine* summary points out features that contribute to a good
    and unique customer experience derived from chatbots. The key points are listed
    below for reference:


    *   24-hour service


    *   Getting an instant response


    *   Answers to simple questions


    *   Easy communication


    *   Complaints resolved quickly


    *   A good customer experience


    *   Detailed/expert answers


    *   Answers to complex questions


    *   Friendliness and approachability


    The variety of new features attracts customers and creates unique value for companies.


    ## Success Metrics


    Success metrics are important to define at the start of any chatbot development.
    The metrics work as a compass to direct the solution and the intended benefits
    of the chatbot. While there are success metrics related to the accuracy of the
    NLP engine, the intent classifiers, and other technical aspects, in this section
    we will only talk about success metrics from a business perspective.


    The success metrics need to be manageable and measurable with a simple explanation
    to the business. We will discuss a few metrics that can be used to track and manage
    the success of chatbots. The metrics focus on success when you compare a chatbot
    interaction with a human interaction.


    ### Customer Satisfaction Index


    The Customer Satisfaction Index (CSI) measures a customer service representative’s
    quality of interaction by following up with the customer with a small survey and
    capturing their experience of the interaction. CSI is one of the most impactful
    metrics to monitor because it provides not only the satisfaction scale but also
    the areas of improvement.


    ### Completion Rate


    The Completion Rate (CR) is defined as the proportion of interactions with a chatbot
    that ended as the solution resolved for the customer. This metric tells us how
    many times the chatbot can complete a conversation and deliver the required responses
    to the user. A higher completion rate indicates a more efficient chatbot service.


    ### Bounce Rate


    Bounce rate (BR) can be defined as how many users move away from chat after typing
    in one or two inputs to the chatbot. A high bounce rate means the chatbot is not
    successful in engaging the user and this must reflect in some of the customer
    feedback.


    Along with bounce rate, we also measure the reuse rate (RR), which refers to how
    many customers come back and use the chatbot again. BR is a perfect metric to
    identify those people who more tend to use chatbots and target similar customer
    segments.


    ## Managing Risks in Chatbots Service


    New technology channels do bring risks. Customers and companies need to understand
    the risks involved with using chatbots for any transaction or information exchanged
    through chatbots. The risk is to be understood, communicated, and mitigated before
    general customers are allowed to use the chatbot services.'
  trans: '

    ### 即时通讯应用的兴起


    推动聊天机器人需求的另一个因素是即时通讯应用使用量的增长，以及企业采取以移动端为核心策略的稳定增长趋势。如今，客户通过手机 24 小时连接互联网，并希望通过易于使用的界面访问服务。


    2011 年初，即时通讯应用开始兴起，并随着移动设备、互联网连接和云计算的同步发展而获得了良好的采用率（[`www.businessinsider.com/the-messaging-app-report-2015-11`](http://www.businessinsider.com/the-messaging-app-report-2015-11)）。大约在
    2015 年初，即时通讯应用，特别是 WhatsApp 和 Facebook Messenger，达到了惊人的采用率，其活跃度与社交网络持平。正如趋势所示，人们在即时通讯应用上的活跃度高于社交媒体网络。


    这一趋势指出了消费者行为的转变，即聊天成为一种首选的沟通方式。这意味着企业也需要通过聊天机器人或人工聊天，来启用与客户的这种沟通渠道。


    ### 直接联系 vs. 聊天


    即时通讯应用使用量的增长，改变了客户与企业互动的方式。在即时通讯应用的早期，研究显示客户越来越倾向于通过聊天进行联系。


    *聊天机器人杂志* 总结的 BI Intelligence 调查（[`https://chatbotsmagazine.com/chatbot-report-2018-global-trends-and-analysis-4d8bbe4d924b`](https://chatbotsmagazine.com/chatbot-report-2018-global-trends-and-analysis-4d8bbe4d924b)）显示，早在
    2016 年，成熟市场的客户就非常迅速地接受了聊天方式。消费者认为，通过聊天解决问题比致电客服代表更快。他们也觉得聊天更舒适，因为可以保留聊天记录以便后续跟进，这与电话交谈不同。


    ## 聊天机器人的商业优势


    考虑关键的业务方面，可以让公司决定是继续构建聊天机器人，还是改进现有的应用/渠道。如果公司决定采用聊天机器人解决方案，就需要了解聊天机器人创造的关键价值。目前，不同行业的用户对聊天机器人的接受程度不同，采用率也各不相同。


    在上述 *聊天机器人杂志* 的调查问卷中，当被问及“对于由基于 AI 的聊天机器人协助进行商业沟通，你的接受程度如何？”时，受访者表示，他们最愿意在在线零售、一般医疗咨询和电信领域进行此类对话。


    此外，在《2018 年聊天机器人现状报告》中，用户不偏好聊天机器人的主要原因包括：需要真人协助、对聊天机器人认知不足，以及因渠道可访问性受限（例如没有 Facebook
    账户或无法使用智能手机）而可能产生的障碍。


    研究表明，如果聊天机器人能为公司带来高收益，并且你的客户乐于接受基于 AI 的聊天机器人的协助，那么增加这一渠道是有价值的。以下章节将讨论聊天机器人创造的两个最重要的价值。


    ### 成本节约


    毫无疑问，对公司来说最重要的好处是客户服务方面的成本节约。成本节约为将聊天机器人引入公司的服务交付渠道提供了最有力的理由。虽然还有许多其他的战略和增长收益，但成本必须证明用于聊天机器人开发和维护的所有努力和资源是合理的。


    一项 BI Intelligence 研究（[`www.businessinsider.com/intelligence/research-store?&vertical=mobile#!/The-Messaging-Apps-Report/p/56901061`](https://www.businessinsider.com/intelligence/research-store%253F%2526vertical%253Dmobile%2523%2521/The-Messaging-Apps-Report/p/56901061)）显示，通过在各个业务职能中引入聊天机器人，每年可节省大量薪资开支。薪资支出最高的领域是客户服务代表，而该领域的节省也最大。成本降低显而易见，这归功于在保险销售、报告、销售和客户服务等职能中使用聊天机器人。


    ### 客户体验


    客户体验是将聊天机器人引入业务的第二大影响因素。客户体验为企业带来多重价值，不仅限于直接销售或成本节约。良好的客户体验带来的好处包括：


    *   高品牌价值和品牌回忆度

    *   高生命周期价值（提升用户参与度）

    *   与竞争对手的品牌差异化


    由于愉悦的客户体验，还会衍生出许多其他因素。忠诚的客户群是长期成功的秘诀。


    *聊天机器人杂志* 的总结指出了聊天机器人带来的良好且独特的客户体验所具备的特征。关键点如下，供参考：


    *   24 小时服务

    *   获得即时响应

    *   回答简单问题

    *   便捷的沟通

    *   快速解决投诉

    *   良好的客户体验

    *   详细/专业的解答

    *   回答复杂问题

    *   友好且平易近人


    这些多样化的新功能吸引了客户，并为公司创造了独特的价值。


    ## 成功指标


    在任何聊天机器人开发之初，定义成功指标都至关重要。这些指标如同指南针，指引着解决方案的方向以及聊天机器人预期带来的收益。虽然存在与 NLP 引擎准确性、意图分类器及其他技术方面相关的成功指标，但本节我们仅从业务角度讨论成功指标。


    成功指标需要易于管理和衡量，并能向业务部门进行简单解释。我们将讨论几个可用于跟踪和管理聊天机器人成功与否的指标。这些指标侧重于比较聊天机器人交互与人工交互时的成功程度。


    ### 客户满意度指数


    客户满意度指数（CSI）通过向客户发送简短调查，跟进并收集他们对交互体验的反馈，来衡量客户服务代表的交互质量。CSI 是最具影响力的监控指标之一，因为它不仅提供了满意度量表，还指出了需要改进的领域。


    ### 完成率


    完成率（CR）定义为聊天机器人交互中，以客户问题得到解决而告终的比例。该指标告诉我们，聊天机器人有多少次能够完成对话并向用户提供所需的响应。更高的完成率意味着更高效的聊天机器人服务。


    ### 跳出率


    跳出率（BR）可以定义为用户在向聊天机器人输入一两次信息后便离开聊天的比例。高跳出率意味着聊天机器人未能成功吸引用户，这必然会在一些客户反馈中有所体现。


    除了跳出率，我们还会衡量重复使用率（RR），它指的是有多少客户会再次回来使用聊天机器人。BR 是识别那些更倾向于使用聊天机器人的人群，并定位类似客户群体的完美指标。


    ## 管理聊天机器人服务中的风险


    新技术渠道确实会带来风险。客户和公司需要了解，通过聊天机器人进行任何交易或信息交换所涉及的风险。在允许普通客户使用聊天机器人服务之前，必须理解、沟通并缓解这些风险。

