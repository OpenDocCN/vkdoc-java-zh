  \ (YTD) Performance:\n{},\nRank G: 1 Year Performance:\n{},\nRank H: 3 Year Performance:\n\
  {},\nRank I: 5 Year Performance:\n{},\nRank J: 10 Year Performance:\n{}\n}\n```\n\
  \n在此响应中，提供了一些数据点，例如实时表现、一天、五天和一个月的表现。JSON 响应中的 **Real-Time Performance** 键描述了市场的不同行业及其实时百分比变化。我们使用此信息在\
  \ `MarketTrendState` 中提供当前市场趋势信息：\n\n```\npublic String execute(MatchedIntent matchedIntent,\
  \ Session session) {\n// 提供当前市场趋势的第三方 API\nString uri = \"https://www.alphavantage.co/query?function=SECTOR&apikey=YOUR_KEY\"\
  ;\n// 执行 HTTP 请求并通过向 URL 执行 GET 调用来获取响应的 Java 客户端\nRestTemplate restTemplate = new\
  \ RestTemplate();\n/*\n* 下面将响应映射到字符串对象。然而，在实际开发中，我们应该创建一个 Java Bean (POJO)，通过使用\
  \ getForObject 方法将响应映射到 Java 响应对象。\n*/\nString result = restTemplate.getForObject(uri,\
  \ String.class);\nString answer = \"\";\n/*\n* ObjectMapper 提供读写 JSON 的功能，可以读写基本\
  \ POJO。它是 Jackson 的一部分，Jackson 是用于解析 JSON 的标准 Java 库。\n*/\nObjectMapper mapper =\
  \ new ObjectMapper();\ntry {\n/*\n* JsonNode 用于通过 Jackson 将响应解析为 JSON 树模型表示。JsonNode\
  \ 是所有 JSON 节点的基类，这些节点构成了 Jackson 实现的 JSON 树模型的基础。可以将这些节点视为类似于 XML DOM 树中的 DOM 节点。\n\
  */\nJsonNode actualObj = mapper.readTree(result);\nJsonNode jsonNode1 = actualObj.get(\"\
  Rank A: Real-Time Performance\");\nanswer = \"能源板块为 \" + jsonNode1.get(\"Energy\"\
  ).textValue() + \"。公用事业为 \"\n+ jsonNode1.get(\"Utilities\").textValue() + \"。房地产为\
  \ \"\n+ jsonNode1.get(\"Real Estate\").textValue() + \"。必需消费品为 \"\n+ jsonNode1.get(\"\
  Consumer Staples\").textValue() + \"。医疗保健为 \"\n+ jsonNode1.get(\"Health Care\").textValue()\
  \ + \"。原材料为 \"\n+ jsonNode1.get(\"Materials\").textValue() + \"。电信服务为 \"\n+ jsonNode1.get(\"\
  Telecommunication Services\").textValue() + \"。工业为 \"\n+ jsonNode1.get(\"Industrials\"\
  ).textValue() + \"。信息技术为 \"\n+ jsonNode1.get(\"Information Technology\").textValue()\
  \ + \"。非必需消费品为 \"\n+ jsonNode1.get(\"Consumer Discretionary\").textValue() + \"\
  。金融为 \"\n+ jsonNode1.get(\"Financials\").textValue() + \"\\n 您还想了解什么？\";\n} catch\
  \ (Exception e) {\ne.printStackTrace();\nResult = \"我现在无法检索此信息。我这边出现了一些问题。\\n 请尝试询问其他内容！\"\
  ;\n}\nreturn answer;\n}\n```\n\n### 股票价格\n\n用户可以与 IRIS 交互并询问股票价格信息。话语可能包括：\n\n*\
  \   微软的当前股价是多少\n\n*   Pru 股票价格\n\n*   Infy 今日股票\n\n*   hdfc 的股价\n\n当 IRIS Core 接收到话语时，它会将话语传递给意图分类引擎，该引擎知道用户正在查找\
  \ `'STOCK_PRICE'`。基于此意图和当前状态，会转换到 `StockPriceState`。然后，此状态的 execute 方法会调用第三方 API。\n\
  \n为了检索股票价格详细信息，我们使用 Alpha Vantage 股票时间序列 API 套件中的 `TIME_SERIES_DAILY` API。\n\n示例\
  \ HTTP GET 请求：\n\n[`www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=MSFT&apikey=demo`](http://www.alphavantage.co/query%253Ffunction%253DTIME_SERIES_DAILY%2526symbol%253DMSFT%2526apikey%253Ddemo)\n\
  \n示例 API 响应：\n\n```\n{\nMeta Data:\n{\n1\\. Information: \"Daily Prices (open, high,\
  \ low, close) and Volumes\",\n2\\. Symbol: \"MSFT\",\n3\\. Last Refreshed: \"2019-03-04\
  \ 16:00:01\",\n4\\. Output Size: \"Compact\",\n5\\. Time Zone: \"US/Eastern\"\n\
  },\nTime Series (Daily):\n{\n2019-03-04:\n{\n1\\. open: \"113.0200\",\n2\\. high:\
  \ \"113.2000\",\n3\\. low: \"110.8000\",\n4\\. close: \"112.2600\",\n5\\. volume:\
  \ \"25684300\"\n},\n2019-03-01:\n{\n1\\. open: \"112.8900\",\n2\\. high: \"113.0200\"\
  ,\n3\\. low: \"111.6650\",\n4\\. close: \"112.5300\",\n5\\. volume: \"23501169\"\
  \n},\n2019-02-28:\n{\n1\\. open: \"112.0400\",\n2\\. high: \"112.8800\",\n3\\. low:\
  \ \"111.7300\",\n4\\. close: \"112.0300\",\n5\\. volume: \"29083934\"\n},\n2019-02-27:\n\
  {},\n2019-02-26:\n{}\n}\n}\n```\n\n`StockPriceState` 的示例 `execute` 方法可能如下所示：\n\n\
  \n\n```\npublic String execute(MatchedIntent matchedIntent, Session session) {\n\
  /*\n* 在下面的 URL 中，我们硬编码了 symbol=MSFT。MSFT 是微软的股票代码。在实际实现中，我们应该从用户话语中提取公司名称，找到其股票代码，然后将其传入下面的\
  \ GET 请求中。从公司名称转换为股票代码有多种方法，例如调用公开可用的服务或维护一个映射表。\n*/\nString uri = \"https://www.alphavantage.co/query?apikey=YOUR_KEY&function=TIME_SERIES_DAILY&outputsize=compact&symbol=MSFT\"\
  ;\nRestTemplate restTemplate = new RestTemplate();\nString result = restTemplate.getForObject(uri,\
  \ String.class);\n// 当第三方 API 无响应或出现任何网络相关问题时使用的默认回答\nString answer = \"我现在暂时无法获取股票价格详情。但我可以帮您处理其他查询。\"\
  ;\nObjectMapper mapper = new ObjectMapper();\ntry {\n/*\n* 众所周知，股票市场在周末和某些节假日不交易。IRIS\
  \ 需要提供实时的股票表现数据。在正常工作日，我们解析当天的表现详情；但对于节假日、股市休市或当天无交易的情况，我们则获取前一日的表现详情。\n*/\nDate\
  \ date = new Date();\nString today = new SimpleDateFormat(\"yyyy-MM-dd\").format(date);\n\
  String yday = new SimpleDateFormat(\"yyyy-MM-dd\").format(yesterday(1));\nString\
  \ dayBeforeYday = new SimpleDateFormat(\"yyyy-MM-dd\").format(yesterday(2));\nJsonNode\
  \ actualObj = mapper.readTree(result);\nJsonNode jsonNode1 = actualObj.get(\"Time\
  \ Series (Daily)\");\nJsonNode jsonNode2 = jsonNode1.get(today);\nJsonNode jsonNode3\
  \ = jsonNode1.get(yday);\nJsonNode jsonNode4 = jsonNode1.get(dayBeforeYday);\nif\
  \ (jsonNode2 != null) {\nanswer = \"今日微软股票开盘价为 \" + jsonNode2.get(\"1\\. open\"\
  ).textValue() + \"，收盘价为 \"\n+ jsonNode2.get(\"4\\. close\").textValue();\nanswer\
  \ = answer + \" 日内最高价达到 \" + jsonNode2.get(\"2\\. high\").textValue()\n+ \"，日内最低价为\
  \ \" + jsonNode2.get(\"3\\. low\").textValue();\nanswer = answer + \"。总成交量为 \" +\
  \ jsonNode2.get(\"5\\. volume\").textValue() + \"\\n\"\n+ \"还有什么我可以帮您的吗？\";\n} else\
  \ if (jsonNode3 != null) {\nanswer = \"我目前没有今天的交易信息，但昨日保诚股票开盘价为 \"\n+ jsonNode3.get(\"\
  1\\. open\").textValue() + \"，收盘价为 \"\n+ jsonNode3.get(\"4\\. close\").textValue();\n\
  answer = answer + \" 日内最高价达到 \" + jsonNode3.get(\"2\\. high\").textValue()\n+ \"\
  ，日内最低价为 \" + jsonNode3.get(\"3\\. low\").textValue();\nanswer = answer + \"。总成交量为\
  \ \" + jsonNode3.get(\"5\\. volume\").textValue() + \"\\n\"\n+ \"还有什么我可以帮您的吗？\"\
  ;\n} else if (jsonNode4 != null) {\nanswer = \"在周末前的周五，保诚股票开盘价为 \" + jsonNode4.get(\"\
  1\\. open\").textValue()\n+ \"，收盘价为 \" + jsonNode4.get(\"4\\. close\").textValue();\n\
  answer = answer + \" 日内最高价达到 \" + jsonNode4.get(\"2\\. high\").textValue()\n+ \"\
  ，日内最低价为 \" + jsonNode4.get(\"3\\. low\").textValue();\nanswer = answer + \"。总成交量为\
  \ \" + jsonNode4.get(\"5\\. volume\").textValue() + \"\\n\"\n+ \"还有什么我可以帮您的吗？\"\
  ;\n}\n} catch (Exception e) {\ne.printStackTrace();\n}\nreturn answer;\n}\n/*\n\
  *  一个返回当前日期前'days'天日期的方法。如果'days'值为 1，则返回昨天的日期。\n*  如果值为 2，则返回前天的日期，以此类推。\n*/\n\
  private Date yesterday(int days) {\nfinal Calendar cal = Calendar.getInstance();\n\
  cal.add(Calendar.DATE, -days);\nreturn cal.getTime();\n}\n```\n\n### 天气信息\n\n市面上有许多提供天气详情的数字机器人。人们经常向\
  \ Siri、谷歌语音助手和 Alexa 询问天气详情。让我们看看如何使用第三方 API 将天气信息集成到 IRIS 中。\n\n为了获取天气报告，我们利用了[`http://openweathermap.org`](http://openweathermap.org)，该网站提供了获取所请求城市天气详情的\
  \ API。它提供多个数据点，例如当前天气数据、5 天预报、16 天预报以及其他关于该城市的历史信息。目前它涵盖了全球超过 20 万个城市的天气详情。当前天气数据基于全球模型和来自超过\
  \ 4 万个气象站的数据进行频繁更新。OpenWeather 还提供了用于救援地图、管理个人气象站、批量下载、天气预警、紫外线指数和空气污染的 API。\n\n\
  在我们的示例中，我们需要获取指定城市的当前天气。我们需要获取一个 API 密钥。OpenWeather 提供多种 API 计划，详情可在[`https://openweathermap.org/price`](https://openweathermap.org/price)找到。\n\
  \n有一个免费计划，允许每分钟最多 60 次调用，这对于演示来说绰绰有余。我们使用当前天气数据 API，该 API 可以通过多种方式调用以获取天气详情，例如：\n\
  \n*   调用单个位置的当前天气数据：\n    *   按城市名称\n\n    *   按城市 ID\n\n    *   按地理坐标\n\n    *\
  \   按邮政编码\n\n*   调用多个城市的当前天气数据：\n    *   矩形区域内的城市\n\n    *   循环中的城市\n\n    *   按多个城市\
  \ ID 调用\n\n按城市名称（通过 q 参数传递）查询时的 HTTP GET 请求示例：[`http://api.openweathermap.org/data/2.5/weather?appid=YOUR_APP_ID&q=dublin`](http://api.openweathermap.org/data/2.5/weather%253Fappid%253DYOUR_APP_ID%2526q%253Ddublin)\n\
  \nJSON 响应：\n\n```\n{\ncoord:\n{},\nweather:\n[\n{\nid: 501,\nmain: \"Rain\",\ndescription:\
  \ \"moderate rain\",\nicon: \"10n\"\n}\n],\nbase: \"stations\",\nmain:\n{\ntemp:\
  \ 277.07,\npressure: 993,\nhumidity: 100,\ntemp_min: 275.93,\ntemp_max: 278.15\n\
  },\nvisibility: 10000,\nwind:\n{\nspeed: 6.2,\ndeg: 230\n},\nrain:\n{\n1h: 1.14\n\
  },\nclouds:\n{\nall: 75\n},\ndt: 1551735821,\nsys:\n{\ntype: 1,\nid: 1565,\nmessage:\
  \ 0.0045,\ncountry: \"IE\",\nsunrise: 1551683064,\nsunset: 1551722984\n},\nid: 2964574,\n\
  name: \"Dublin\",\ncod: 200\n}\n```\n\n`GetWeatherState`的`execute`方法示例可能包含以下代码片段：\n\
  \n```\npublic String execute(MatchedIntent matchedIntent, Session session) {\n/*\n\
  * 当出现网络问题、第三方 API 响应超时或其他异常时的默认响应\n*/\nString answer = \"我现在无法获取天气报告。但我希望今天对你来说是美好而迷人的一天\
  \ :) \";\n/*\n* 提供天气详情的 GET API\n*/\nString uri = \"http://api.openweathermap.org/data/2.5/weather?appid=YOUR_API_KEY&q=\"\
  ;\nString cityName = \"dublin\";\ntry {\nRestTemplate restTemplate = new RestTemplate();\n\
  String result = restTemplate.getForObject(uri, String.class);\nObjectMapper mapper\
  \ = new ObjectMapper();\nJsonNode actualObj = mapper.readTree(result);\nArrayNode\
  \ jsonNode1 = (ArrayNode) actualObj.get(\"weather\");\nJsonNode jsonNode2 = actualObj.get(\"\
  main\");\nString description = jsonNode1.get(0).get(\"description\").textValue();\n\
  String temperature = jsonNode2.get(\"temp\").toString();\nDouble tempInCelsius =\
  \ Double.parseDouble(temperature) - 273.15;\ndouble roundOff = Math.round(tempInCelsius\
  \ * 100.0) / 100.0;\nString humidity = jsonNode2.get(\"humidity\").toString();\n\
  answer = \"目前\" + cityName + \"的天气似乎是\" + description + \"。温度为 \"\n+ roundOff +\
  \ \" 摄氏度。湿度接近 \" + humidity\n+ \"。\\n 真希望我是人类，能亲身感受一下。总之，您还想从我这里了解什么？ \";\n} catch\
  \ (Exception e) {\n}\nreturn answer;\n}\n```\n\n\n\n## 连接到企业数据存储\n\n在我们的示例中，我们使用\
  \ `GetClaimStatus` 来演示如何连接到数据库并查询索赔信息。\n\n请注意，尽管我们在此演示了直接查询数据库的能力，但业界现代设计方法并不推荐这样做。任何数据库都应仅通过在其上层创建的服务进行查询。原因有多方面，例如安全性与访问控制、数据库负载与连接处理、封装性以及可移植性。\n\
  \n```\npublic class GetClaimStatus extends State {\n/*\n*  Java 数据库连接（JDBC）是一种用于\
  \ Java 编程语言的应用程序编程接口（API），它定义了客户端如何访问数据库。它是一种基于 Java 的数据访问技术，用于 Java 数据库连接。它是 Oracle\
  \ 公司 Java 标准版平台的一部分。\n*  DB_URL 是数据库连接 URL。\n*  所使用的 URL 取决于特定的数据库和 JDBC 驱动程序。它总是以\"\
  JDBC:\"协议开头，但其余部分由具体供应商决定。在我们的示例中，我们使用 MySQL 数据库。\n*/\nstatic final String JDBC_DRIVER\
  \ = \"com.mysql.jdbc.Driver\";\n// 数据库名称为 test\nstatic final String DB_URL = \"\
  jdbc:mysql://localhost/test\";\n/*\n*  数据库访问凭证\n*/\nstatic final String USERNAME\
  \ = \"ClaimsReadOnlyUser\";\nstatic final String PASSWORD = \"**********\";\npublic\
  \ GetClaimStatus() {\nsuper(\"getClaimStatus\");\n}\n@Override\npublic String execute(MatchedIntent\
  \ matchedIntent, Session session) {\nConnection conn = null;\nStatement stmt = null;\n\
  String status = null;\n/*\n* 从匹配意图的会话或槽位中检索索赔 ID。如果此状态被执行，意味着我们已拥有索赔 ID；否则 Shield\
  \ 不会验证转换到此状态。\n*/\nString claimId = SessionStorage.getStringFromSlotOrSession(matchedIntent,\
  \ session, \"claimId\", null);\n// 默认回答\nString answer = \"我们系统中没有与 \" + claimId\
  \ + \" 相关的任何信息。\\n\"\n+ \"请于周一至周五上午 8:30 至下午 5:30 拨打 1800 333 0333 联系我们的客服代表进行进一步查询。\\\
  n\"\n+ \"如果您从海外或通过公用电话拨号，请拨打+65 633 30333。\\n 还有其他问题我可以帮您吗？\";\ntry {\n//注册 JDBC\
  \ 驱动程序\nClass.forName(\"com.mysql.jdbc.Driver\");\n// 打开连接（正在连接数据库...）\nconn = DriverManager.getConnection(DB_URL,\
  \ USERNAME, PASSWORD);\n// 执行查询\nstmt = conn.createStatement();\n/*\n* SQL 查询，用于从\
  \ test 数据库和 claims 表中查询行。此查询的含义是——从 claims 表中返回索赔 ID 为给定索赔 ID 的行的状态。\n*/\nString\
  \ sql = \"SELECT status FROM claims where claimId='\" + claimId + \"'\";\n//执行 SQL\n\
  ResultSet rs = stmt.executeQuery(sql);\n//从结果集中提取数据\nwhile (rs.next()) {\n//记录已获取\n\
  status = rs.getString(\"status\");\n}\n//清理环境并关闭活动连接。\nrs.close();\nstmt.close();\n\
  conn.close();\n} catch (Exception e) {\ne.printStackTrace();\n} finally {\n/*\n\
  * 在 try-catch 中，即使发生异常，finally 块也始终会被执行。如果上述代码因任何原因出现异常，语句和连接将不会关闭。因此我们在 finally\
  \ 块中额外检查并关闭它们。\n*/\ntry {\nif (stmt != null)\nstmt.close();\n} catch (SQLException\
  \ se2) {\n}\ntry {\nif (conn != null)\nconn.close();\n} catch (SQLException se)\
  \ {\nse.printStackTrace();\n}\n}\n// 如果我们从数据库中收到了该索赔的状态，则用实际状态详情覆盖默认回答。\nif (status\
  \ != null) {\nanswer = \"您的索赔 ID \" + claimId + \" 的状态是 - \" + status\n+ \"。\\n\
  \ 如果您想了解更多信息，请在周一至周五上午 8:30 至下午 5:30 期间拨打 HELPLINE-NUMBER 联系我们的代表。现在还有其他您想了解的吗？\"\
  ;\n}\n// 从会话中移除与索赔 ID 相关的属性\nsession.removeAttribute(\"getclaimidprompt\");\nsession.removeAttribute(\"\
  claimid\");\nreturn answer;\n}\n}\n```\n\n\n\n## 集成模块\n\n集成模块是连接 IRIS 核心与不同消息平台（如\
  \ Facebook Messenger、Twitter、Web、移动应用、Alexa 等）的组件。每个平台都有各自的集成机制，为每个渠道构建定制化的集成层非常困难，且并非本书的核心目标。集成模块是一个对外暴露的中间层服务，充当\
  \ IRIS 的网关，如图 8-3 所示。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig3_HTML.jpg](img/478492_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\nIRIS 渠道集成模块\n\n许多开源工具无需我们编写大量代码，就能提供与各种渠道的简单定制化集成，并处理集成所需的大量复杂工作。在本示例中，我们重点介绍\
  \ **botkit**，这是一款领先的开发工具，可提供与多个消息平台的定制化组合：\n\n[`https://github.com/howdyai/botkit`](https://github.com/howdyai/botkit)\
  \ 。\n\n在本章中，我们将讨论 IRIS 与 Facebook Messenger 的集成。在深入集成代码之前，我们需要确保具备以下条件，以便能够将 IRIS\
  \ 部署到 Facebook Messenger 页面：\n\n*   **一个 Facebook 页面**：Facebook 页面用作机器人的身份标识。当用户与您的应用聊天时，他们会看到页面名称和个人资料图片。\n\
  \n*   **一个 Facebook 开发者账户**：您需要开发者账户来创建新应用，这是任何 Facebook 集成的核心。您可以前往 Facebook for\
  \ Developers 并点击“开始使用”按钮来创建新的开发者账户。\n\n*   **用于 Web 的 Facebook 应用**：Facebook 应用包含\
  \ Messenger 机器人的设置，包括访问令牌。\n\n*   **一个 webhook URL**：与机器人对话中发生的操作（例如新消息）会作为事件发送到您的\
  \ webhook。这是我们集成模块的 URL，我们将在下一节介绍。\n\n设置过程需要将 Messenger 平台添加到您的 Facebook 应用中，配置应用的\
  \ webhook，并将您的应用订阅到 Facebook 页面。有关设置 Facebook 应用的详细信息，请访问 [`https://developers.facebook.com/docs/messenger-platform/getting-started/app-setup/`](https://developers.facebook.com/docs/messenger-platform/getting-started/app-setup/)\
  \ 。\n\n有关配置 botkit 和 Facebook Messenger 的分步指南，请访问 [`www.botkit.ai/docs/provisioning/facebook_messenger.html`](https://www.botkit.ai/docs/provisioning/facebook_messenger.html)\
  \ 。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig5_HTML.jpg](img/478492_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n\n显示页面访问令牌屏幕\n\n1.  创建应用并选择 Messenger 平台。参见图 8-4。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig4_HTML.jpg](img/478492_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n在 Facebook 上创建新的应用 ID\n\n2.  我们创建了一个名为 AskIris 的 Facebook 页面，并为该应用生成了一个页面访问令牌。参见图\
  \ 8-5。\n\n回调 URL 是 `https://YOURURL/facebook/receive`。参见图 8-6。此 URL 必须可公开访问且受 SSL\
  \ 保护。我们提供了一个 `localtunnel` 回调 URL；在我们的案例中，它是隧道连接到 localhost 的 NodeJs 服务器 URL。我们将在下一节讨论如何创建此端点以及如何使用\
  \ `localtunnel`。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig6_HTML.jpg](img/478492_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\n\n显示页面订阅详情以及我们的回调 URL\n\nAskIris 页面应连接到新创建的应用，并且设置应显示应用详情。参见图 8-7。\n\n\
  ![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig7_HTML.jpg](img/478492_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\nAskIris 页面设置\n\n如上所述，设置 webhook 需要一个 HTTPS 回调 URL。此 URL 是我们集成模块的 API\
  \ 端点，它将接收来自 Messenger 的消息。为此，我们创建了一个 NodeJS 应用程序，因为这是设置 webhook 的要求。\n\n更多设置细节请参见\
  \ Facebook 开发者页面：\n\n[`https://developers.facebook.com/docs/messenger-platform/getting-started/webhook-setup`](https://developers.facebook.com/docs/messenger-platform/getting-started/webhook-setup)\
  \ 。\n\n以下是创建一个简单 NodeJS 应用程序的步骤：\n\n1.  创建一个 HTTP 服务器（`server.js`）：\n\n```\n   \
  \ // 导入 server.js 所需的模块\n    var express = require('express');\n    var bodyParser\
  \ = require('body-parser');\n    var https = require('https');\n    var http = require('http');\n\
  \    var fs = require('fs');\n    var localtunnel = require('localtunnel');\n  \
  \  // 自定义 JavaScript\n    var conf = require(__dirname + '/conf.js');\n    function\
  \ server(ops) {\n    // 创建应用\n    /* Express 是一个流行的 Node Web 框架，提供了一种编写处理程序的机制。\n\
  \    */\n    var app = express();\n    /* body-parser 是 Node.js 中间件，在处理程序之前解析传入的请求体。\n\
  \    */\n    // 解析 JSON\n    app.use(bodyParser.json());\n    // 返回仅解析 urlencoded\
  \ 主体的中间件\n    app.use(bodyParser.urlencoded({\n    // 此对象将包含键值对，当 extended 为 false\
  \ 时，值可以是字符串或数组；当 extended 为 true 时，值可以是任何类型。\n    extended: true\n    }));\n   \
  \ // 静态文件路径\n    app.use(express.static(__dirname + conf.static_dir));\n    /* 声明选项并通过从配置文件中读取\
  \ SSL 密钥和 SSL 证书路径来创建 HTTPS 服务器。\n    */\n    var options = {\n    port : conf.securePort,\n\
  \    key : fs.readFileSync(conf.sslKeyPath),\n    cert : fs.readFileSync(conf.sslCertPath),\n\
  \    requestCert : false,\n    rejectUnauthorized : false\n    };\n    https.createServer(\
  \ options, app)\n    .listen(conf.securePort,  conf.hostname, function() {\n   \
  \ console.log('** 在端口 ' + conf.securePort + ' 上启动安全 Web 服务器');\n    });\n    http.createServer(app)\n\
  \    .listen(conf.port, conf.hostname, function() {\n    console.log('** 在端口 ' +\
  \ conf.port + ' 上启动 Web 服务器');\n    });\n    /*\n    localtunnel 将 localhost 暴露给外部世界，以便于测试和共享。它将连接到隧道服务器，设置隧道，并告诉您用于测试的\
  \ URL。我们使用 localtunnel 在 http://localhost:9080/respond 上获取一个 https 端点，以便与 Facebook\
  \ Messenger 进行测试。\n    */\n    if(ops.lt) {\n    var tunnel = localtunnel(conf.port,\
  \ {subdomain: 'askiris'}, function(err, tunnel) {\n    if (err) {\n    console.log(err);\n\
  \    process.exit();\n    }\n    console.log(\"您的机器人可通过以下 URL 在 Web 上访问: \" + tunnel.url\
  \ + '/facebook/receive');\n    });\n    tunnel.on('close', function() {\n    console.log(\"\
  您的机器人不再可通过 localtunnel.me URL 在 Web 上访问。\");\n    process.exit();\n    });\n   \
  \ }\n    return app;\n    }\n    /* module.exports 是当前模块在被另一个程序或模块 \"require\" 时返回的对象\n\
  \    */\n    module.exports = server;\n    ```\n\n2.  添加 Facebook webhook 端点（`Webhooks.js`）：\n\
  \n\n\n```\n    const fetch = require(\"node-fetch\");\n    // 这是 IRIS API 的 URL\
  \ 端点\n    const url = \"http://localhost:9080/respond\";\n    function webhooks(controller){\n\
  \    /* 这是用户首次与 Iris 交互前看到的初始消息。\n    */\n    controller.api.messenger_profile.greeting('你好，我叫\
  \ IRIS。我正在持续训练，以成为你的数字虚拟助手。');\n    // 所有消息都将发送到 API。\n    controller.hears(['.*'],\
  \ 'message_received,facebook_postback', function(bot, message) {\n    // Facebook\
  \ 请求消息包含文本、发送者 ID、序列号和时间戳。\n    var params = {\n    message: message.text,\n   \
  \ sender: message.sender.id,\n    seq: message.seq,\n    timestamp: message. timestamp\n\
  \    };\n    var esc = encodeURIComponent;\n    var query = Object.keys(params)\n\
  \    .map(k => esc(k) + '=' + esc(params[k]))\n    .join('&');\n    /* fetch 发起\
  \ HTTP GET 调用，接收响应并将 'message' 传回 Facebook。\n    */\n    fetch(url +query)\n   \
  \ .then(response => {\n    response.json().then(json => {\n    bot.reply(message,\
  \ json.message);\n    });\n    })\n    .catch(error => {\n    bot.reply(message,\
  \ \"\");\n    });\n    });\n    }\n    module.exports = webhooks;\n    ```\n\n3.\
  \  添加 Webhook 验证。有关 botkit-facebook 集成的更多详细信息，请参阅 [`www.botkit.ai/docs/readme-facebook.html`](http://www.botkit.ai/docs/readme-facebook.html)\
  \ 。\n\n```\nvar Botkit = require('botkit');\nvar commandLineArgs = require('command-line-args');\n\
  var localtunnel = require('localtunnel');\n// 读取静态文件\nvar server = require(__dirname\
  \ + '/server.js');\nvar conf = require(__dirname + '/conf.js');\nvar webhook = require(__dirname\
  \ + '/webhooks.js');\n// 命令行参数，用于在本地模式或服务器模式下运行；在本地模式下，我们需要使用 localtunnel 连接到 Facebook\
  \ Messenger webhook，因为它需要一个 HTTPS 端点。\nconst ops = commandLineArgs([\n{name: 'lt',\
  \ alias: 'l', args: 1, description: '使用 localtunnel.me 使你的机器人可在网络上访问。',\ntype: Boolean,\
  \ defaultValue: false},\n{name: 'ltsubdomain', alias: 's', args: 1,\ndescription:\
  \ 'localtunnel.me URL 的自定义子域名。此选项只能与 --lt 一起使用。',\ntype: String, defaultValue: null},\n\
  ]);\n// 创建 Botkit 控制器，它控制机器人的所有实例。\nvar controller = Botkit.facebookbot({\ndebug:\
  \ true,\nlog: true,\naccess_token: conf.access_token,\nverify_token: conf.verify_token,\n\
  app_secret: conf.app_secret,\nvalidate_requests: true\n});\n// 创建服务器\nvar app =\
  \ server(ops);\n// 从 FB 接收 POST 数据；这将是你收到的消息。\napp.post('/facebook/receive', function(req,\
  \ res) {\nif (req.query && req.query['hub.mode'] == 'subscribe') {\nif (req.query['hub.verify_token']\
  \ == controller.config.verify_token) {\nres.send(req.query['hub.challenge']);\n\
  } else {\nres.send('OK');\n}\n}\n// 向 Facebook 响应，表示已收到 webhook。\nres.status(200);\n\
  res.send('ok');\nvar bot = controller.spawn({});\n// 现在，将 webhook 传递给处理程序。\ncontroller.handleWebhookPayload(req,\
  \ res, bot);\n});\n// 使用你的验证令牌执行 FB webhook 验证握手。验证令牌存储在 conf.js 文件中。\napp.get('/facebook/receive',\
  \ function(req, res) {\nif (req.query['hub.mode'] == 'subscribe') {\nif (req.query['hub.verify_token']\
  \ == controller.config.verify_token) {\nres.send(req.query['hub.challenge']);\n\
  } else {\nres.send('OK');\n}\n}else{\nres.send('NOT-OK');\n}\n});\n// Ping URL\n\
  app.get('/ping', function(req, res) {\nres.send('{\"status\":\"ok\"}');\n});\nwebhook(controller);\n\
  ```\n\n完成上述所有步骤并测试端点后，我们就可以开始在 Facebook Messenger 上与 IRIS 进行交互了。\n\n## 在 Facebook\
  \ Messenger 中演示 AskIris 聊天机器人\n\n让我们看一些交互示例。我们可以通过简单的问候开始与 IRIS 交互，IRIS 会回复关于她自己的详细信息。参见图\
  \ 8-8。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig8_HTML.jpg](img/478492_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n\n与 IRIS 交互\n\n### 账户余额\n\n当用户向 IRIS 询问账户余额时，它会回复一条消息，要求提供机密的 IPIN 以继续操作。如前所述，不应将演示实现作为设置\
  \ PIN 的实践。应遵循更复杂和标准的安全认证机制。在成功输入 IPIN（在示例用例中为硬编码值）后，IRIS 将检索用户所询问账户类型的余额。参见图 8-9。\n\
  \n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig9_HTML.jpg](img/478492_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n\n询问账户余额详情\n\n### 索赔状态\n\n索赔示例演示了\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig10_HTML.jpg](img/478492_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10\n\n请求索赔状态\n\n*   在一次表述中识别意图以及实现意图所需的槽位。在下面的示例 1 中，意图（CLAIM_STATUS）和索赔 ID（gi123）是同时获取的。\n\
  \n*   这展示了自然语言处理分析用户自然表述（包括拼写错误）的潜力。\n\n*   此外，它还展示了处理用户询问相同信息时不同变体的能力。在示例 1 中，我们基于自然语言推断意图和槽位。在示例\
  \ 2 中，由于未获取到槽位，IRIS 会像其他典型对话一样提示用户提供此信息。参见图 8-10。\n\n### 今日天气\n\n天气示例演示了如何构建一个实时集成第三方服务的聊天机器人。诸如以下用户表述会返回\
  \ API 提供的实时温度信息（参见图 8-11）：\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig11_HTML.jpg](img/478492_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11\n\n来自 IRIS 的实时天气信息\n\n*   今天莱特肯尼的天气怎么样\n\n*   都柏林今天的天气\n\n*   兰契现在的天气\n\
  \n### 常见问题解答\n\n首先，你可以看到对常见问题的正确回答。然后，当用户表述（401k）既不匹配任何明确意图，也不匹配知识库中的任何文档时，IRIS\
  \ 会执行搜索。参见图 8-12。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig12_HTML.jpg](img/478492_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12\n\n常见问题解答示例\n\n### 上下文切换示例\n\n在图 8-13 中，用户首先询问人寿保险报价。IRIS 提示输入年龄、吸烟者信息、身高和体重。用户按预期提供了除体重外的所有其他信息。用户没有提供体重，而是询问股票价格。IRIS\
  \ 没有回复用户输入体重不正确或无法识别体重，而是理解了上下文的切换，从而理解了意图的切换，并无缝地提供了所请求的详细信息。随后，当用户再次询问人寿保险时，请注意，已经回答过的问题不会再次询问。这是因为短期记忆中存储了这些详细信息。\n\
  \n当用户提供了之前未回答的问题的答案时，意图得以实现，并获得了响应。\n\n![../images/478492_1_En_8_Chapter/478492_1_En_8_Fig13_HTML.jpg](img/478492_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13\n\n说明上下文切换的人寿保险示例\n\n\n\n## 总结\n\n在本章中，我们展示了如何扩展 IRIS 的功能以支持与各种第三方服务的集成。同时，也解释了如何连接企业数据库以获取用户数据。我们讨论了\
  \ IRIS 对外暴露的集成模块，并实现了 IRIS 与 Facebook Messenger 的集成，遵循了成功集成所需的逐步流程。\n\n最后，我们演示了与\
  \ Facebook Messenger 和 IRIS 交互的实际效果，通过示例展示了几种用例，并解释了前几章讨论内容在后台的实现原理。\n\n在下一章中，我们将讨论如何将这个内部框架部署到云端。我们将探索将服务部署到\
  \ AWS 的多种方式，并逐步介绍如何在 5 分钟内将 IRIS 与 Alexa 集成。最后，我们将讨论如何改进该框架，以及进一步优化的空间，例如实现反馈循环。\n\
  \n"
- "# 9. 部署与持续改进框架\n\n在前几章中，我们从零开始设计了一个基础聊天机器人框架，并探索了与第三方服务及其他后端系统的集成选项。同时，我们也解释了如何将\
  \ IRIS 聊天机器人框架以 Spring Boot REST API 的形式对外暴露。\n\n在本章中，我们将讨论将 IRIS 部署到远程服务器的不同方式，并介绍如何在\
  \ 5 分钟内将 IRIS 与 Alexa 集成。在本章末尾，我们将讨论如何通过实现自学习模块并将人工介入纳入循环，将 IRIS 扩展为持续改进框架的一部分。\n\
  \n## 部署到云端\n\n通过 RESTful API 暴露的 IRIS 框架可以通过多种方式部署到远程服务器。在本节中，我们将讨论三种不同的方式。\n\n\
  ### 在 AWS EC2 上作为独立的 Spring Boot JAR 运行\n\n这是 Spring Boot JAR 最基本的安装和部署方式。我们只需几个步骤即可让\
  \ JAR 在 EC2 机器的 8080 端口上运行。\n\n我们登录 AWS 账户，从图 9-1 所示的服务列表中选择 EC2。EC2 代表 AWS 提供的弹性计算云服务器。更多关于\
  \ EC2 的详细信息，请访问 [`https://aws.amazon.com/ec2/`](https://aws.amazon.com/ec2/)。\n\n\
  ![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig1_HTML.jpg](img/478492_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n不同的 AWS 服务\n\n我们从 EC2 控制台启动一个 EC2 实例，如图 9-2 所示。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig2_HTML.jpg](img/478492_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n在 AWS 上启动 EC2 实例向导\n\n启动 EC2 实例需要七个步骤：\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig3_HTML.jpg](img/478492_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\nEC2 安全组入站规则配置\n\n1.  我们选择一个 AMI（Amazon 机器镜像）。我们使用 Amazon Linux 2 AMI\
  \ (HVM)，SSD 卷类型，64 位 x86。\n\n2.  我们选择实例类型。我们选择 **t2.micro**（如果您是首次使用 AWS 服务，该类型也符合免费套餐资格）。t2.micro\
  \ 实例具有一个 vCPU 和 1 GB 内存，足以运行 API。\n\n3.  下一步需要配置实例详细信息。我们可以使用检查清单来防止意外终止。此步骤为可选。\n\
  \n4.  下一步我们添加存储详细信息。默认情况下，我们获得 8GB 的 SSD，并且该卷已挂载到实例。但是，如果需要，我们可以添加更多卷或增加默认卷的存储空间。此步骤也是可选的，对于演示部署来说，8GB\
  \ 的存储空间已足够。\n\n5.  我们为实例和存储卷添加标签，以便更好地管理 EC2 资源。这也是可选的。\n\n6.  如图 9-3 所示，此步骤需要配置安全组。安全组是一组防火墙规则，用于控制实例的流量。\n\
  \n我们希望将端口 80 暴露给所有来源访问，而端口 22（安全 Shell 端口）仅允许从我们的本地机器访问。\n\n1.  我们审查配置并启动实例。每个 EC2\
  \ 实例都需要一个密钥对 PEM 文件，以便我们安全地登录实例。系统会要求我们生成一个新文件，或者我们可以使用现有文件。\n\n    现在，一旦实例启动，它将拥有一个公共\
  \ DNS 名称或 IPv4 公共 IP，我们可以使用它来登录。\n\n2.  从任何 Unix 机器登录的命令：\n\n    ```\n    ssh -i\
  \ chatbot-iris.pem ec2-user@ec2-instance-ip.compute-1.amazonaws.com\n    ```\n\n\
  3.  登录后，我们可以使用 SCP 命令从本地复制 Spring Boot JAR：\n\n    ```\n    scp -i chatbot-iris.pem\
  \ /path/to/iris.jar ec2-user@ec2-instance-ip.compute-1.amazonaws.com:/path/to/your/jarfile\n\
  \    ```\n\n4.  复制 JAR 后，我们可以通过执行以下命令来运行它：\n\n    ```\n    java -jar path/to/your/jarfile.jar\
  \ fully.qualified.package.Application\n    ```\n\n5.  默认情况下，服务器在端口 8080 上启动。但是，如果我们想更改端口设置，可以使用命令行选项（例如\
  \ `-DServer.port=8090`）将 `server.port` 设置为系统属性，或者在 `src/main/resources/` 中添加包含 `server.port=8090`\
  \ 的 `application.properties` 文件。\n\n如果我们使用 Maven 构建代码，也可以使用：\n\n```\nmvn spring-boot:run\n\
  ```\n\n\n\n### 在 AWS EC2 上作为 Docker 容器运行\n\nDocker 实现了操作系统级别的虚拟化。它用于运行被称为容器的软件包。从运维角度来看，Docker\
  \ 使工作更加简便，因为它将代码、库和运行时组件打包成 Docker 镜像，从而可以轻松部署。有关 Docker 的更多详细信息，请访问 [`www.docker.com/`](https://www.docker.com/)\
  \ 。\n\n我们执行以下步骤，在 EC2 上的 Docker 中运行应用程序：\n\n1.  更新实例上已安装的软件包和软件包缓存：\n\n    ```\n\
  \    sudo yum update -y\n    ```\n\n2.  安装最新的 Docker 社区版软件包：\n\n    ```\n    sudo\
  \ amazon-linux-extras install docker\n    ```\n\n3.  启动 Docker 服务：\n\n    ```\n\
  \    sudo service docker start\n    ```\n\n4.  将 `ec2-user` 添加到 Docker 组，以便无需使用\
  \ `sudo` 即可执行 Docker 命令：\n\n    ```\n    sudo usermod -a -G docker ec2-user\n  \
  \  ```\n\n5.  注销并重新登录，以获取新的 Docker 组权限。为此，请关闭当前的 SSH 终端窗口，并在新窗口中重新连接到实例。新的 SSH 会话将拥有适当的\
  \ Docker 组权限。\n\n6.  验证 `ec2-user` 是否可以在不使用 sudo 的情况下运行 Docker 命令。\n\n7.  在代码库的根目录中创建一个\
  \ Dockerfile。Dockerfile 是一个清单文件，描述了 Docker 镜像要使用的基础镜像，以及其上安装和运行的内容。此 Dockerfile\
  \ 使用 `openjdk:8-jdk-alpine` 镜像，因为我们正在构建一个 Java 应用程序的镜像。`VOLUME` 指令创建一个具有指定名称的挂载点，并将其标记为保存来自本地主机或其他容器的外部挂载卷。`ARG`\
  \ 指令定义一个变量，用户可以在构建时将其传递给构建器。JAR 文件被命名为 `app.jar`，`ENTRYPOINT` 允许我们配置一个将作为可执行文件运行的容器。它包含运行\
  \ JAR 的命令：\n\n    ```\n    FROM openjdk:8-jdk-alpine\n    VOLUME /tmp\n    ARG JAR_FILE\n\
  \    ADD ${JAR_FILE} app.jar\n    ENTRYPOINT [\"java\",\"-Djava.security.egd=file:/dev/./urandom\"\
  ,\"-jar\",\"/app.jar\"]\n    ```\n\n8.  通过执行以下命令构建 Docker 镜像：\n\n    ```\n    docker\
  \ build -t iris --build-arg JAR_FILE=”JAR_NAME”.\n    ```\n\n    以下是在机器上执行构建命令的输出：\n\
  \n    ```\n    Sending build context to Docker daemon   21.9MB\n    Step 1/5 : FROM\
