  \    ```\n    docker run -t -i -p 80:80 iris\n    ```\n\n### 作为 ECS 服务运行\n\n在前两种方法中，您已经了解了如何将\
  \ Spring Boot JAR 作为独立服务部署和运行，或者通过安装 Docker 并在 Docker 容器中运行 API。本方法将讨论 AWS 的一项名为\
  \ ECS（弹性容器服务）的服务。请参见图 9-4。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig4_HTML.jpg](img/478492_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\nECS 对象及其关系图\n\nAmazon ECS 使得部署、管理和扩展运行应用程序、服务和批处理任务的 Docker 容器变得简单。Amazon\
  \ ECS 会根据您的资源需求将容器放置到集群中，并与弹性负载均衡、EC2 安全组、EBS 卷和 IAM 角色等熟悉的功能集成。有关 ECS 的更多详细信息，请访问\
  \ [`https://aws.amazon.com/ecs/`](https://aws.amazon.com/ecs/) 。\n\n在 ECS 上运行 Docker\
  \ 镜像需要多个步骤。以下是通过 AWS 管理控制台进行部署的逐步说明：\n\n1.  在讨论如何将 JAR 作为 Docker 容器部署在 AWS EC2 上时，我们创建了一个\
  \ Docker 镜像。我们需要将这个先前创建的 Docker 镜像添加到 ECR。Amazon Elastic Container Registry (ECR)\
  \ 是一个完全托管的容器注册表，使开发人员能够轻松地存储、管理和部署容器镜像。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig5_HTML.jpg](img/478492_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n\n在 AWS 中创建 ECR 仓库\n\n如图 9-5 所示创建仓库后，下一步是标记 Docker 镜像，以便我们可以将镜像推送到此仓库：\n\
  \n```\ndocker tag iris:latest aws_account_id.dkr.ecr.us-east-1.amazonaws.com/iris:latest\n\
  ```\n\n然后，我们运行以下命令将此镜像推送到 ECR 仓库：\n\n```\ndocker push aws_account_id.dkr.ecr.us-east-1.amazonaws.com/iris:latest\n\
  ```\n\n有关将 Docker 镜像推送到 ECR 的更多详细信息，请访问 [`https://docs.aws.amazon.com/AmazonECR/latest/userguide/docker-push-ecr-image.html`](https://docs.aws.amazon.com/AmazonECR/latest/userguide/docker-push-ecr-image.html)\
  \ 。\n\n1.  然后，我们需要定义容器定义。在 AWS 管理控制台的 ECS 服务中，在“入门”下，我们可以选择要使用的容器定义。我们需要提供 ECR 仓库\
  \ URL 以及 Docker 镜像名称和标签，如图 9-6 所示。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig6_HTML.jpg](img/478492_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\n容器定义配置\n\n2.  我们定义任务定义。任务定义是应用程序的蓝图，通过属性描述一个或多个容器。某些属性在任务级别配置，但大多数属性是按容器配置的。在图\
  \ 9-7 中，我们为 IRIS 创建了一个任务定义。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig7_HTML.jpg](img/478492_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\n任务定义\n\n3.  定义一个服务。服务允许我们在 ECS 集群中运行并维护指定数量（期望计数）的任务定义并发实例。请参见图 9-8。\n\
  \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig8_HTML.jpg](img/478492_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\n服务定义详情\n\n4.  我们配置一个集群。Fargate 集群中的基础设施完全由 AWS 管理。我们的容器在运行，无需我们管理和配置单个\
  \ Amazon EC2 实例。请参见图 9-9。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig9_HTML.jpg](img/478492_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\n集群配置详情\n\n\n\n5.  当我们审核并点击“创建”后，应该能看到 ECS 的创建进度。一旦集群设置完成且任务定义就绪，Spring\
  \ Boot 服务就会启动并运行。\n\n图 9-10 是一个使用上述任务定义创建基本 ECS 集群的示例。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig10_HTML.jpg](img/478492_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\nECS 启动状态界面\n\n## 在 5 分钟内创建 Smart IRIS Alexa 技能\n\n我们将探讨如何通过几个简单步骤将 IRIS\
  \ 与 Amazon Alexa 集成。为此，第一步是登录 Alexa 开发者控制台 [`https://developer.amazon.com/alexa`](https://developer.amazon.com/alexa)\
  \ 并创建一个技能。创建技能需要提供技能名称和默认语言。我们将选择一个自定义模型添加到技能中。见图 9-11。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig11_HTML.jpg](img/478492_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n创建 Alexa 技能名称\n\n自定义模型需要提供一些清单项才能使技能正常工作：\n\n*   调用名称\n*   意图、示例和槽位\n\
  *   构建交互模型\n*   设置 Web 服务端点\n\n在我们的 IRIS 用例示例中，由于我们已经自定义了不同的可能意图、意图槽位和以状态机形式建模的对话，我们的目标是将用户在\
  \ Alexa 上的话语重定向到 IRIS 后端 API，以便其处理话语并做出响应。\n\n我们将调用名称设置为 Iris。这将使用户能够通过要求 Alexa\
  \ *“询问”* Iris 来调用此技能。见图 9-12。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig12_HTML.jpg](img/478492_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\n添加技能调用名称\n\n接下来，我们定义一个自定义意图和一个自定义槽位类型，以便所有用户的话语都能匹配到这个意图和槽位类型。目标是将话语重定向到\
  \ IRIS，而不在 Alexa 层进行任何意图分类相关的处理。\n\n我们首先创建一个名为 `IrisCustomSlotType` 的自定义槽位类型；见图\
  \ 9-13。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig13_HTML.jpg](img/478492_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\n自定义槽位类型\n\n现在，我们定义一个名为 `IrisAllIntent` 的自定义意图。该意图有一个名为 `utteranceSlot`\
  \ 的槽位。最重要的是 `{utteranceSlot}`。我们打算将所有用户话语都放入这个槽位中，如图 9-14 所示。它是一个正则表达式，意味着整个话语值都在\
  \ `utteranceSlot` 槽位下。稍后在 Alexa 请求 IRIS HTTPS 端点时，读取用户话语时会用到它。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig14_HTML.jpg](img/478492_1_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14\n\nIrisAllIntent 中的 utteranceSlot\n\n`utteranceSlot` 被定义为槽位类型 `IrisCustomSlotType`，如图\
  \ 9-15 所示。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig15_HTML.jpg](img/478492_1_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15\n\n为 IRIS 集成创建的自定义槽位及其类型\n\n此时，我们应该已经在 Alexa 技能的交互模型中创建了意图、槽位和槽位类型，如图 9-16\
  \ 所示。在图中，您可以看到除了用于与 Alexa 设备进行标准交互（如停止或取消）的内置意图外，还有其他内置意图。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig16_HTML.jpg](img/478492_1_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16\n\n交互模型界面\n\n一旦我们为自定义交互模型定义了所有必需的属性，就可以构建模型了。构建模型需要我们点击“构建模型”按钮，该按钮会保存技能清单并构建模型。见图\
  \ 9-17。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig17_HTML.jpg](img/478492_1_En_9_Fig17_HTML.jpg)\n\
  \n图 9-17\n\nIRIS 自定义交互模型的构建过程进度\n\n完成设置的最后一步是提供 IRIS 的 HTTPS 端点，以托管所有意图分类和响应生成逻辑，并接收来自\
  \ Alexa 的 POST 请求。见图 9-18。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig18_HTML.jpg](img/478492_1_En_9_Fig18_HTML.jpg)\n\
  \n图 9-18\n\n技能的服务端点配置\n\n现在，让我们使用开发者控制台上可用的模拟器来测试设置，如图 9-19 所示。我们让 Alexa 询问 Iris“都柏林的天气”。Iris\
  \ 的响应如下，可以通过 Alexa 的声音听到。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig19_HTML.jpg](img/478492_1_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19\n\nAlexa 开发者控制台上的模拟器\n\n从 Alexa 发送到 IRIS API 的请求详情如下：\n\n```\n{\n\"version\"\
  : \"1.0\",\n\"session\": {\n\"new\": true,\n\"sessionId\": \"amzn1.echo-api.session.XXXXXXX-2b66-XXXX-XXX-XXXXXXXXX\"\
  ,\n\"application\": {\n\"applicationId\": \"amzn1.ask.skill.XXXXXX-e624-XXXXXX-XXX-XXXXXXX\"\
  \n},\n\"user\": {\n\"userId\": \"amzn1.ask.account.XXXXXXXX\"\n}\n},\n\"context\"\
  : {\n\"AudioPlayer\": {\n\"playerActivity\": \"IDLE\"\n},\n\"System\": {\n\"application\"\
  : {\n\"applicationId\": \"amzn1.ask.skill.XXXXXXX-XXX-XXXXX-XXXX-XXXXXXXXX\"\n},\n\
  \"user\": {\n\"userId\": \"amzn1.ask.account.XXXXXX\"\n},\n\"device\": {\n\"deviceId\"\
  : \"amzn1.ask.device.XXXXX\",\n\"supportedInterfaces\": {\n\"AudioPlayer\": {}\n\
  }\n},\n\"apiEndpoint\": \"https://api.eu.amazonalexa.com\",\n\"apiAccessToken\"\
  : \"XXXXXXXX\"\n},\n\"Viewport\": {\n\"experiences\": [\n{\n\"arcMinuteWidth\":\
  \ 246,\n\"arcMinuteHeight\": 144,\n\"canRotate\": false,\n\"canResize\": false\n\
  }\n],\n\"shape\": \"RECTANGLE\",\n\"pixelWidth\": 1024,\n\"pixelHeight\": 600,\n\
  \"dpi\": 160,\n\"currentPixelWidth\": 1024,\n\"currentPixelHeight\": 600,\n\"touch\"\
  : [\n\"SINGLE\"\n]\n}\n},\n\"request\": {\n\"type\": \"IntentRequest\",\n\"requestId\"\
  : \"amzn1.echo-api.request.XXXXXXXXXXX\",\n\"timestamp\": \"2019-04-21T11:22:56Z\"\
  ,\n\"locale\": \"en-US\",\n\"intent\": {\n\"name\": \"irisAllIntent\",\n\"confirmationStatus\"\
  : \"NONE\",\n\"slots\": {\n\"utteranceSlot\": {\n\"name\": \"utteranceSlot\",\n\"\
  value\": \"weather in Dublin\",\n\"resolutions\": {\n\"resolutionsPerAuthority\"\
  : [\n{\n\"authority\": \"amzn1.er-authority.echo-sdk.amzn1.ask.skill.XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXX.IrisCustomSlotType\"\
  ,\n\"status\": {\n\"code\": \"ER_SUCCESS_NO_MATCH\"\n}\n}\n]\n},\n\"confirmationStatus\"\
  : \"NONE\",\n\"source\": \"USER\"\n}\n}\n}\n}\n}\n```\n\n来自 IRIS 的响应：\n\n```\n{\n\
  \"body\": {\n\"version\": \"string\",\n\"response\": {\n\"outputSpeech\": {\n\"\
  type\": \"PlainText\",\n\"text\": \"It seems to be clear sky at the moment in dublin.\
  \ The temperature is 19.13 degrees. Humidity is close to 48.\\n I wish I were human\
  \ to feel it. Anyways, what else do you want to know from me? \"\n},\n\"type\":\
  \ \"_DEFAULT_RESPONSE\"\n},\n\"sessionAttributes\": {}\n}\n}\n```\n\n在第 6 章中，我们创建了一个\
  \ NodeJS 应用程序，为 Facebook Messenger 提供了一个外部 API 端点。为了与 Alexa 集成，我们需要添加如下所述的 Alexa\
  \ 端点：\n\n\n```javascript\n// 新的 API 端点 'alexa'，用于处理 POST 请求\napp.post('/alexa',\
  \ function(req, res) {\n// 通过从 JSON 中读取 utteranceSlot 值来获取用户的表述\nvar text = req.body.request.intent.slots.utteranceSlot.value;\n\
  var session = req.body.session.user.userId;\nvar timestamp = req.body.request.timestamp;\n\
  /* 向 IRIS 后端服务发送 GET 请求参数。'Message' 参数包含用户表述\n*/\nvar params = {\nmessage: text,\n\
  sender: session,\nseq: 100,\ntimestamp: 1524326401\n};\nvar esc = encodeURIComponent;\n\
  var query = Object.keys(params)\n.map(k => esc(k) + '=' + esc(params[k]))\n.join('&');\n\
  //url 是 IRIS API 的 URL\nfetch(url + query).then(response => {\nresponse.json().then(json\
  \ => {\nvar alexaResp = {\n\"version\": \"string\",\n\"sessionAttributes\": {},\n\
  \"response\": {\n\"outputSpeech\": {\n\"type\": \"PlainText\",\n\"text\": json.message,\n\
  \"ssml\": \"<speak>\" + json.message + \"</speak>\"\n}\n}\n}\nres.json(alexaResp);\n\
  });\n})\n.catch(error => {\nvar alexaResp = {\n\"version\": \"string\",\n\"sessionAttributes\"\
  : {},\n\"response\": {\n\"outputSpeech\": {\n\"type\": \"PlainText\",\n\"text\"\
  : \"抱歉，我的团队今天状态不佳，无法为您获取此信息。请稍后再试。\",\n\"ssml\": \"<speak>抱歉，我的团队今天状态不佳，无法为您获取此信息。请稍后再试。</speak>\"\
  \n}\n}\n}\nres.json(alexaResp);\n});\n});\n```\n\n关于将自定义技能托管为 Web 服务的详细信息，请参阅 [`https://developer.amazon.com/docs/custom-skills/host-a-custom-skill-as-a-web-service.html`](https://developer.amazon.com/docs/custom-skills/host-a-custom-skill-as-a-web-service.html)\
  \ 。\n\n## 持续改进框架\n\n在实际案例中，用户的表述很可能由于多种原因而未被我们的意图引擎分类或理解，例如该表述属于意图引擎范围之外的外部意图，或者由于意图匹配分数过低导致引擎信心不足。在生产环境中，我们观察到有相当数量的用户表述被引擎误解或完全无法理解。我们提出了一个框架，可以帮助\
  \ IRIS 变得更智能、更聪明，从而模拟自然的对话。\n\n在自学习模块中，我们提出了三个改进组件，如图 9-20 所示：\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig20_HTML.jpg](img/478492_1_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20\n\n用于持续改进的 IRIS 功能组件\n\n*   意图确认（二次核对）\n\n*   下一意图预测\n\n*   人工介入\n\n###\
  \ 意图确认（二次核对）\n\n我们以用户表述“人寿保险”为例，该表述可能匹配到某个可能的意图场景；参见图 9-21。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig21_HTML.jpg](img/478492_1_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21\n\n意图匹配及对应分数\n\n当我们将用户表述与图 9-21 中列出的可能意图进行匹配时，会得到一系列意图及其各自的匹配分数。IRIS 的意图引擎模块仅在匹配分数高于\
  \ 0.75 时才会返回意图匹配结果。我们也将此称为最低阈值分数，低于该分数的意图匹配将不会在响应中被考虑。在“人寿保险”这个例子中，意图引擎返回了 `LIFE_INSURANCE_QUOTE_INTENT`\
  \ 作为响应。\n\n对此实现的一种优化是引入一个低于阈值分数但足够相关以供进一步处理的最低匹配分数。我们之前提到，最低阈值分数是指低于该分数的意图匹配不会从意图分类引擎的响应中返回。而最低匹配分数是指，如果一个意图未达到最低阈值分数，但分数高于此值，则会被考虑进行进一步处理。\n\
  \n让我们通过另一个用户表述的例子来理解：“人寿保险费用”，其匹配分数如图 9-22 所示。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig22_HTML.jpg](img/478492_1_En_9_Fig22_HTML.jpg)\n\
  \n图 9-22\n\n另一个示例，展示不同的意图匹配及对应分数\n\n在这个例子中，分数低于最低阈值分数，在当前实现中，由于意图分类引擎未返回明确的意图，用户表述将默认执行搜索。如果我们考虑将最低匹配分数设为\
  \ 0.5，那么意图 `LIFE_INSURANCE_QUOTE_INTENT` 就可以被考虑进行进一步确认。\n\n这些分数（0.75 作为最低阈值分数，0.5\
  \ 作为最低匹配分数）应基于训练和测试数据集得出，并且后续也可能根据实际用户表述数据和意图分类引擎的性能进行调整。\n\n因此，我们可以对 IRIS 进行修改，当表述的分类分数在\
  \ 0.5 到 0.75 之间时，提示用户进行确认。\n\n通过上述实现，典型的对话流程可以如下进行：\n\n```\n用户：你好\nIRIS：你好\n用户：人寿保险费用\n\
  IRIS：我未能准确理解您的查询。您是否需要人寿保险报价？\n用户：是的\nIRIS：好的，我可以帮您处理。请问您的年龄是？\n```\n\n### 预测下一意图\n\
  \n此功能使 IRIS 能够利用日志来理解和预测用户可能的下一个最佳意图。图 9-23 展示了用户日志。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig23_HTML.jpg](img/478492_1_En_9_Fig23_HTML.jpg)\n\
  \n图 9-23\n\n包含意图和序列的用户日志\n\n在对 INTENT-A 的简单汇总中，如图 9-24 所示，我们发现 INTENT-B 是整体上最常见的下一个意图。\n\
  \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig24_HTML.jpg](img/478492_1_En_9_Fig24_HTML.jpg)\n\
  \n图 9-24\n\n用于预测下一意图序列的日志汇总\n\n我们还可以使用路径预测、关联规则和频繁项集等技术来获取最可预测的用户下一个意图。\n\n在没有预测意图功能的情况下，与\
  \ IRIS 的典型对话可能如下进行：\n\n```\n用户：嗨\nIRIS：你好\n用户：我想要一个人寿保险报价\nIRIS：好的，我来帮您处理。请问您的年龄是？\n\
  用户：我 24 岁\nIRIS：您在过去 12 个月内是否吸烟？\n用户：没有\nIRIS：您的身高是多少？\n用户：我身高 181 厘米\nIRIS：您的体重是多少？\n\
  用户：163 磅\nIRIS：好消息！您有资格获得加速核保决定。\n用户：谢谢。我想购买人寿保险单。\nIRIS：好的。您能提供您的电子邮件地址以便我开始申请流程吗？\n\
  用户：user@gmail.com\n....\n```\n\n借助预测下一意图功能，对话将如下进行：\n\n```\n用户：嗨\nIRIS：你好\n用户：我想要一个人寿保险报价\n\
  IRIS：好的，我来帮您处理。请问您的年龄是？\n用户：我 24 岁\nIRIS：您在过去 12 个月内是否吸烟？\n用户：没有\nIRIS：您的身高是多少？\n\
  用户：我身高 181 厘米\nIRIS：您的体重是多少？\n用户：163 磅\nIRIS：好消息！您有资格获得加速核保决定。请问您的电子邮件地址是什么，以便我开始申请流程？\n\
  用户：user@gmail.com\n....\n```\n\n\n### 人在回路中\n\n我们在本章中引入的框架的第三项改进是人在回路中。图 9-20 展示了用于持续改进的各种功能组件。无论我们使用何种技术来让\
  \ IRIS 更好地理解意图，总会有一些对话是 IRIS 无法理解的。原因很简单：IRIS 并不拥有宇宙中的所有信息，并且它始终被设计为仅执行一组已知的功能。\n\
  \n我们知道 IRIS 被设计用于执行某些操作，例如计算保险资格、提供账户余额、理赔状态等。假设有一定比例的用户正在向 IRIS 请求更改其保险单的地址。IRIS\
  \ 目前不支持此功能，并且机器解释这类新信息具有挑战性。\n\n假设部分用户话语如图 9-25 所示。\n\n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig25_HTML.jpg](img/478492_1_En_9_Fig25_HTML.jpg)\n\
  \n图 9-25\n\n话语及计数\n\n通过人在回路中，可以进一步分析这些话语。在图 9-26 中，前两个话语可以归类为一个意图。由于此意图占总日志的 66%，因此可以根据产品决策增强\
  \ IRIS 以支持 `ADDRESS_CHANGE`。在某些情况下，一个话语可以映射到现有意图，例如最后一个话语。这将有助于意图分类引擎由于更多数据集的可用性而更好地对意图进行分类。\n\
  \n![../images/478492_1_En_9_Chapter/478492_1_En_9_Fig26_HTML.jpg](img/478492_1_En_9_Fig26_HTML.jpg)\n\
  \n图 9-26\n\n话语、意图及计数\n\n也会出现诸如用户询问板球比赛比分、英国脱欧细节或火车时刻表等无关问题的话语。这些日志无需进一步处理，将被增强 IRIS\
  \ 反馈循环的领域专家忽略。\n\n## 总结\n\n在本结论章中，我们讨论了将聊天机器人部署到云端的各种方法，演示了将 IRIS 与 Alexa 集成的 5\
  \ 分钟入门介绍，并讨论了通过日志文件和人在回路中的反馈循环对 IRIS 进行持续改进。\n\n在本书中，我们在三个支柱之间保持了良好的平衡：业务背景、机器处理自然语言的理论基础，以及从头开始开发真实世界聊天机器人的实践。我们相信这三个支柱将有助于构建一个真正企业级的聊天机器人，并具有明确的投资回报率。此外，我们还关注了使用个人数据时的伦理问题，以及欧盟国家如何同意\
