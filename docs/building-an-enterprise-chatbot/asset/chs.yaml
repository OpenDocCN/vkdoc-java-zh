  * 在此示例中，资格是根据 BMI 是否小于或大于 33 来定义的。

  */

  if (age > 60 || age  33)

  eligible = false;

  if (eligible) {

  answer = "好消息！您有资格获得加速核保决定。\n 请通过此链接继续您的申请：https://www.dummylink.com \n"

  + "还有其他我能帮您的吗？";

  } else {

