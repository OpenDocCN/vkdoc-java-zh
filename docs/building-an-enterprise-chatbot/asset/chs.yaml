  \ Word2Vec，它还提供了 GloVe，这是另一种用于寻找词向量的强大无监督学习算法。以下代码从 gensim-data 下载一个 `glove-wiki-gigaword-100`\
  \ 词向量，并执行一些开箱即用的任务。\n\n**步骤 1：** 使用 `gensim.downloader` 模块下载一个预训练的 GloVe 词向量：\n\n\
  ```\nimport gensim.downloader as api\nword_vectors = api.load(\"glove-wiki-gigaword-100\"\
  )\n```\n\n**步骤 2：** 计算最近邻。如你所见，词向量包含一组代表单词的数字数组。现在，对向量进行数学计算成为可能。例如，我们可以计算任意两个词向量之间的欧几里得距离或余弦相似度。由此我们得到了一些有趣的结果。以下代码展示了部分结果。\n\
  \n图 5-14 展示了一个示例，说明了如何通过移动大小为 2 的窗口来创建用于训练神经网络的数据。在下面的例子中，你会看到互联网上的“apple”不再是水果；它已成为苹果公司的代名词，并且当我们计算与“apple”相似的词时，会显示出许多类似的公司。产生这种相似性的原因在于训练所用的词汇表，本例中是一个包含近\
  \ 60 亿个未大小写标记的维基百科转储文件。更多此类预训练模型可在 [`https://github.com/RaRe-Technologies/gensim-data`](https://github.com/RaRe-Technologies/gensim-data)\
  \ 获取。\n\n在第二个例子中，当我们寻找与“orange”相似的词时，得到了对应颜色的词，如红色、蓝色、紫色，以及像柠檬这样的水果，它是一种像橙子一样的柑橘类水果。这种关系对人类来说很容易理解。然而，Word2Vec\
  \ 模型能够破解它，这令人兴奋。\n\n```\nresult = word_vectors.most_similar('apple')\nprint(result)\n\
  [('microsoft', 0.7449405789375305), ('ibm', 0.6821643114089966), ('intel', 0.6778088212013245),\
  \ ('software', 0.6775422096252441), ('dell', 0.6741442680358887), ('pc', 0.6678153276443481),\
  \ ('macintosh', 0.66175377368927), ('iphone', 0.6595611572265625), ('ipod', 0.6534676551818848),\
  \ ('hewlett', 0.6516579389572144)]\nresult = word_vectors.most_similar('orange')\n\
  print(result)\n[('yellow', 0.7358633279800415), ('red', 0.7140780687332153), ('blue',\
