  \ ('lemon', 0.6251963376998901), ('peach', 0.616862416267395)]\n```\n\n**步骤 3：**\
  \ 识别线性子结构。使用相似度或距离度量很容易计算两个词的相关性，而要以更定性的方式捕捉词对或句子中的细微差别，我们需要进行操作。让我们看看 gensim 包为实现此任务提供的方法。\n\
  \n##### 词对相似度\n\n在下面的例子中，我们计算一个词对之间的相似度。例如，词对 [‘sushi’, ‘shop’] 与词对 [‘japanese’,\
  \ ‘restaurant’] 的相似度高于与 [‘Indian’, ‘restaurant’] 的相似度。\n\n```\nsim = word_vectors.n_similarity(['sushi',\
  \ 'shop'], ['indian', 'restaurant'])\nprint(\"{:.4f}\".format(sim))\n0.6438\nsim\
  \ = word_vectors.n_similarity(['sushi', 'shop'], ['japanese', 'restaurant'])\nprint(\"\
  {:.4f}\".format(sim))\n0.7067\n```\n\n##### 句子相似度\n\n我们还可以计算两个句子之间的距离或相似度。gensim\
  \ 提供了一种称为词移距离（Word Mover’s distance）的距离度量，它已被证明是找出包含多个句子的两个文档之间相似度的有用工具。距离越小，两个文档越相似。词移距离在底层使用\
  \ Word2Vec 模型生成的词嵌入，首先理解查询句子（或文档）的概念，然后找出所有相似的句子或文档。例如，当我们计算两个不相关句子之间的词移距离时，与比较两个上下文相关的句子相比，距离会更高。\n\
  \n在第一个例子中，sentence_one 谈论的是印度烹饪艺术的多样性，而 sentence_two 具体谈论的是德里的食物。在第二个例子中，sentence_one\
  \ 和 sentence_two 不相关，因此我们得到的词移距离比第一个例子更高。\n\n```\nsentence_one = 'India is a diverse\
  \ country with many culinary art'.lower().split()\nsentence_two = 'Delhi offers\
  \ many authentic food'.lower().split()\nsimilarity = word_vectors.wmdistance(sentence_one,\
  \ sentence_two)\nprint(\"{:.4f}\".format(similarity))\n4.8563\nsentence_one = 'India\
  \ is a diverse country with many culinary art'.lower().split()\nsentence_two = 'The\
  \ all-new Apple TV app, which brings together all the ways to watch TV into one\
  \ app'.lower().split()\nsimilarity = word_vectors.wmdistance(sentence_one, sentence_two)\n\
  print(\"{:.4f}\".format(similarity))\n5.2379\n```\n\n##### 算术运算\n\n更令人印象深刻的是，能够对词向量执行加法和减法等算术运算，从而通过运算获得某种形式的线性子结构。在第一个例子中，我们计算\
  \ *woman + king – man*，与该运算最相似的词是 *queen*。其基本概念是，man 和 woman 是性别，这可以由其他词如 queen\
  \ 和 king 等价地指定。因此，当我们从 woman 和 king 的加法中减去 man 时，得到的词是 queen。GloVe 词表示在 [`https://nlp.stanford.edu/projects/glove/`](https://nlp.stanford.edu/projects/glove/)\
  \ 提供了一些示例。\n\n类似地，该模型擅长捕捉语言和国家等概念。例如，当我们把 French 和 Italian 相加时，得到 Spanish，这是一种在邻近国家西班牙使用的语言。\n\
  \n```\nresult = word_vectors.most_similar(positive=['woman', 'king'], negative=['man'])\n\
  print(\"{}: {:.4f}\".format(*result[0]))\nqueen: 0.7699\nresult = word_vectors.most_similar(positive=['french',\
  \ 'italian'])\nprint(\"{}: {:.4f}\".format(*result[0]))\nspanish: 0.8312\nresult\
  \ = word_vectors.most_similar(positive=['france', 'italy'])\nprint(\"{}: {:.4f}\"\
  .format(*result[0]))\nspain: 0.8260\n```\n\n##### 找出异常词\n\n该模型能够适应在给定的单词序列中找出不符合语境的词。其工作方式是，`doesnt_match`\
  \ 方法通过计算给定单词列表中所有词向量的均值来确定中心点，然后找出与中心点的余弦距离。余弦距离最大的词被返回为不适合该列表的异常词。\n\n在以下两个例子中，模型能够从国家列表中找出食物\
  \ pizza 作为异常词。类似地，在第二个例子中，模型从所有美国总统的列表中找出了印度总理莫迪。\n\n```\nprint(word_vectors.doesnt_match(\"\
  india spain italy pizza\".split()))\npizza\nprint(word_vectors.doesnt_match(\"obama\
  \ trump bush modi\".split()))\nmodi\n```\n\n像 Word2Vec 和 GloVe 这样的语言模型在生成词与词之间有意义的关联方面非常强大，这对人类来说很自然，因为我们理解语言。对于机器来说，能够以这种智能水平理解单词在各种句法和语义形式中的使用，是一项了不起的成就。\n\
  \n\n\n#### fastText 词表示模型\n\n与 gensim 类似，fastText 也提供了许多预训练的词嵌入模型。其快速高效的处理能力使其成为文本分类和词表示相关任务（如查找相似文本）中非常流行的库。fastText\
