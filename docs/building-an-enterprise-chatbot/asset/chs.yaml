  ##### GetQuote 状态


  该状态的 `execute` 方法根据年龄、吸烟信息、身高和体重提供报价资格。该方法实现了一个简单的业务逻辑来判断用户是否符合资格。然而，在真实场景中，存在更复杂的业务逻辑，所有这些信息将被传递给另一个
  API，由该 API 提供资格信息。


