  ```\n\n### 使用 OpenIE 进行信息抽取\n\n开放信息抽取器（OpenIE）标注器用于抽取开放领域的、表示主语、谓语和宾语的关系三元组，通常称为三元组。当可用的训练数据很少时，OpenIE\
