  ### 用户输入到系统转换的准确性


  聊天机器人逻辑在用户自然语言输入和用于检索信息的机器可执行输入之间创建了一个接口。这个接口需要确保在将输出传递给用户之前，转换是准确的。这是当今基于自然语言处理的聊天机器人面临的最大挑战，因此也是重要的研究领域之一。让我们通过一个例子来说明：


  | 输入 | 聊天机器人逻辑生成的查询 | 系统输出 |

  | --- | --- | --- |

  | 用户：告诉我 2019 年 4 月的工资状态 | 从 payroll_table 中选择状态，其中 empID=UserID 且 month=“April”
  且 year=“2019” | 您的工资状态为“<查询响应>” |

  | 用户：我什么时候能拿到上个月的工资？ | 从 payroll_table 中选择状态，其中 empID=UserID 且 month=?? 且 year=??
  | 您的工资状态为“<查询响应>” |


  在这个例子中，输入 1 和输入 2 需要从系统中获得相同的结果。聊天机器人逻辑需要先解析这两个输入，然后才能为用户获取正确的信息。以下是确保查询能为系统响应获取准确数据的挑战和要求。如果聊天机器人逻辑无法构建正确的问题，结果将不正确，甚至可能导致未经授权的信息无意中泄露给用户。


  ## 聊天机器人开发方法


  聊天机器人开发方法指的是如何构建聊天机器人逻辑。选择方法时的关键考量是在自然语言能力和结果准确性之间取得平衡。如你所知，自然语言处理面临着理解自然对话并将其转换为机器操作的挑战；必须保持平衡。


  如图 3-3 所示，根据聊天机器人的能力及其内置人工智能的程度，存在一个通用的分类。我们对聊天机器人进行分类的关键轴是对话范围和机器响应。


  ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig3_HTML.png](img/478492_1_En_3_Fig3_HTML.png)


  图 3-3


  基于对话类型和响应类型的聊天机器人分类


  本书及我们讨论的重点是封闭域对话，在此范围内，我们可以采用基于规则的方法，或者使用基于人工智能的方法来创建智能机器。在本节中，我们将介绍两种流行的开发方法。




  ### 基于规则的方法


  基于规则的方法，也称为菜单驱动方法，是自助门户的扩展，提供了更好的体验。其关键区别在于解决方案的导航方式。在自助门户中，你需要手动导航到正确的选项，而在基于菜单的聊天机器人中，可以使用自然语言进行导航，然后通过菜单执行操作。参见图
  3-4。


  这类聊天机器人非常普遍，并且在集成客户关系管理（CRM）和其他数据系统的行业用例中，使用率通常很高。


  ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig4_HTML.jpg](img/478492_1_En_3_Fig4_HTML.jpg)


  **图 3-4**


  菜单驱动型聊天机器人界面


  如图 3-4 所示，聊天机器人尝试理解用户问题，然后呈现一个菜单供用户选择下一步操作。该列表确保后端知道需要执行何种具体操作来满足请求。


  #### 基于菜单的方法的优势


  基于菜单的方法具有一些优势：


  *   响应的准确性由设计保证。

  *   它基于启发式规则而非复杂的自然语言处理（NLP），易于理解和实现。

  *   无需重新训练核心模型即可轻松扩展新的菜单项。


  #### 基于菜单的方法的劣势


  在拥有出色准确性和易于实现优势的同时，也存在一些局限性：


  *   功能严格局限于模板代码。

  *   实现分为两步：理解上下文并弹出菜单。点击菜单后，再执行请求。

  *   提供的自然语言对话能力有限，因为聊天机器人无法理解编码情境之外的内容。


  即使存在这些局限性，当准确性比自然对话体验更重要时，菜单驱动方法仍然非常成功。


  ### 基于人工智能的方法


  基于人工智能的方法基于先进的自然语言处理（NLP）引擎，以支持自然语言，并基于机器学习算法和系统集成进行动态信息检索来满足请求。聊天机器人的准确性在开始时较低，并随时间推移而提高。


  基于菜单的方法和基于人工智能的方法之间的关键区别在于 NLP 引擎。NLP 引擎负责提取用户输入中存在的信息。此外，基于提取的信息，聊天机器人需要决定后续步骤。


  如图 3-5 所示，NLP 引擎的关键作用是从自然语言输入中提取信息。信息提取的准确性至关重要，因为它将决定对话的结果并持久化到系统中。NLP 引擎需要提取指示系统执行操作所需的信息。在菜单驱动方法中，用户必须先与菜单交互以选择具体细节，系统才能执行操作。


  ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig5_HTML.jpg](img/478492_1_En_3_Fig5_HTML.jpg)


  **图 3-5**


  NLP 引擎基于机器学习技术提取精确信息


  #### 基于人工智能的方法的优势


  基于人工智能的方法具有许多优势和以客户为中心的益处：


  *   无需用户执行多个步骤即可进行高级对话。

  *   NLP 引擎可以处理未见过的场景和大量文本。

  *   聊天机器人可以学习从头开始创建自定义回复（自然语言生成）。


  #### 基于人工智能的方法的劣势


  基于人工智能方法的问题主要源于其复杂性：


  *   NLP 引擎的训练、维护和改进都很复杂。

  *   由于 NLP 输出并非 100% 正确，响应的准确性会受到影响。

  *   构建可用的聊天机器人 NLP 引擎需要海量数据。


  ## 对话流程


  为封闭领域应用构建的聊天机器人具有明确的目的和功能，这些功能将作为特性提供给用户。为了覆盖可能的对话情况或用户输入，我们必须定义范围以及所有可能的流程。流程定义至关重要，因为我们必须遵循策略才能提供对所需数据的访问。


  对话流程是一个决策树，描述了对话中任何时间点可能发生的事件、决策和结果列表。当需要维护上下文且系统的响应不是单一步骤时，这种流程能确保更高的相关性。图 3-6
  展示了一个对话流程示例。


  ![../images/478492_1_En_3_Chapter/478492_1_En_3_Fig6_HTML.png](img/478492_1_En_3_Fig6_HTML.png)


  **图 3-6**


  示例对话流程


  流程以欢迎消息开始，然后要么提供一个菜单（如果是基于规则的聊天机器人），要么用户输入一个句子（完全由 AI 驱动的聊天机器人）。一旦聊天机器人的 NLP 逻辑识别出用户需要哪个功能，就会有一个决策点将用户引导至该对话路径。如果用户想查看订单状态，他的下一个对话决策点就是输入订单号。一旦聊天机器人收到有效的订单
  ID，后端就会调用操作来检索该订单的信息并将其返回给用户。此流程也维护了上下文，因此如果用户需要追踪另一个订单，他无需从头开始，只需输入另一个订单 ID，聊天机器人就会知道要追踪订单状态。


  在更高级的聊天机器人中，你可以在一行中传递多个意图，但从技术上讲，聊天机器人会以相同的流程处理请求。因此，“追踪我的订单号 465”是用户的单个输入，它应该获取相同的结果。多意图聊天机器人构建起来很困难，并且出错的可能性很高。


  创建聊天机器人流程至关重要，因为它定义了功能范围，并提高了聊天机器人为用户服务的准确性。务必向用户明确说明聊天机器人能为他们做什么，并可能事先定义好功能。异常情况始终可以转移到默认回复或人工客服处理。


  ## 聊天机器人关键术语


  聊天机器人的开发已经成为一个成熟的开发过程，这意味着在尝试开发聊天机器人之前，理解其术语至关重要。聊天机器人开发中使用的关键术语也有多种变体，正如亚马逊、谷歌等领先的聊天机器人平台提供商所宣称的那样。


  在本节中，我们将讨论聊天机器人开发中经常使用的一些关键术语。在后续章节中，我们将使用这些概念和术语来展示如何从头开始开发聊天机器人。


  ### 话语


  话语指的是用户输入给聊天机器人的任何内容。完整的端到端输入构成一个话语，例如“获取我订单号 345 的状态”、“今天气温多少？”、“你好”、“早上好”等。


  话语用于在开发中为意图构建分类器。聊天机器人将尽可能多的话语存储在数据库中，这些话语是用户提出的问题，并将它们聚类到不同的意图中，这些意图代表了用户想表达的内容。


  为了开发保险行业的聊天机器人，我们需要从不同渠道（如聊天、电子邮件、到访、客户价值中心等）捕获用户提出的实际问题。我们将使用所有这些历史数据来训练聊天机器人，使其了解用户的真实需求以及应该使用哪个对话流程。




  ### 意图


  意图是指从聊天机器人捕获的用户话语中识别出的用户目的。识别意图是聊天机器人的核心功能。在菜单驱动的聊天机器人中，菜单帮助用户明确意图；而在基于 AI 的聊天机器人中，识别意图是
  NLP 引擎的任务。


  意图的成功匹配决定了对话的流程，并向用户提供正确的响应。在特定领域的聊天机器人中，意图可能与通用意图不同，因此需要进行特定领域的训练。


  例如，对于“显示苹果公司的股票价格”这句话，其意图是查找股票价格。我们可将此意图命名为 showStockPrice。showStockPrice 是用户的主要意图，而“苹果”一词则是实体，也称为槽位。


  ### 实体


  实体通过为话语提供附加价值来赋予意图具体含义。实体可以被定义为从属于意图，它告诉我们意图与哪个子类相关。在此示例中，“苹果”是意图#showStockPrice
  的@company_name 实体。


  实体（或槽位）在会话中得以维护时，有助于保留对话的上下文。在此示例中，在第一次话语之后我们回复了价格。紧接着，下一句话可能是“还有微软的”。在这种情况下，聊天机器人已经捕获了意图为
  showStockPrice，因此槽位变为微软，聊天机器人便可以获取微软的股票价格。


  ### 渠道


  渠道是聊天机器人用于连接用户并满足其请求的媒介。如今，所有社交媒体即时通讯工具都允许聊天机器人进行对话（例如，Facebook Messenger、Slack、Skype
  等）。


  然而，对于像我们的“全天候保险代理”这样的应用，我们希望拥有自己开发的渠道，以符合隐私法律，并在访问用户私人信息时提供额外的安全层。


  ### 人工接管


  人工接管是一个术语，用于表示在对话过程中回退到人工服务。现代聊天机器人具备在无法理解意图、提取实体或 NLP 输出置信度较低时，回退到人工协助的功能。


  人工接管可分为两种类型：


  *   **选择性人工接管**：用户可以在任何时刻选择与人工对话，可能是因为他们更习惯与人交流，或者聊天机器人无法解决他们的问题。


  *   **置信度触发的人工接管**：置信度过滤器可以决定我们是否能以高置信度完成请求；如果不能，请求将自动转接给人工，用户没有选择余地。这为用户提供了无缝的体验。


  ## 用例：全天候保险代理


  本书将讨论的聊天机器人基于一个保险代理的用例。我们将从安全、自然语言机器学习技术、部署和业务目的等多个方面来探讨 AI 驱动的聊天机器人。每一章都会讨论开发此聊天机器人的某个组成部分。


  现在您已经了解了规划“全天候保险代理”的基本条件，包括设定业务背景、开发策略类型以及其他考量因素。在本节中，我们将定义“全天候保险代理”的各个方面，由于范围限制，并非所有功能都会被明确实现。


  *   **业务背景**：“全天候保险代理”将能够在保险领域进行必要的对话。人们可以询问他们的保单、保费等信息。

  *   **政策合规性**：政策可以遵循客户服务中心的标准流程。

  *   **安全、认证与授权**：我们可以创建基于 PIN 码的授权，如果用户已有产品，也可以使用基于 IDS 的身份验证。

  *   **用户输入到系统转换的准确性**：为确保这一点，我们可以创建基于置信度过滤器的人工接管机制。

  *   **基于 AI 的方法还是基于菜单的方法**：根据需求，在灵活性和准确性之间取得平衡，两种方法都可以。

  *   **对话流程**：流程必须通过与业务部门沟通并探索其政策来创建。

  *   NLP 训练需要历史对话数据、意图列表、最频繁出现的实体等。


  这些决策将帮助开发者为聊天机器人解决方案选择正确的结构和架构。


  ## 总结


  聊天机器人既带来机遇也带来挑战。机遇大于开发过程中遇到的挑战。在本章中，我们讨论了在开始开发聊天机器人旅程时的重要考量，包括定义业务背景、理解访问数据的策略、采用对话和系统安全的最佳实践，以及确保响应的准确性。接着，我们介绍了两种开发方法及其优缺点：基于菜单的方法和基于
  AI 的方法。我们还涵盖了设计对话流程的概念，这有助于创建响应用户的范围和确定性结构。我们解释了聊天机器人开发中常用的关键术语：话语、意图、实体、渠道和人工接管。最后，我们概述了如何为“全天候保险代理”构建解决方案。下一章将介绍解决方案架构以及企业如何内部构建成功的聊天机器人。


  '
- "# 4. 构建聊天机器人解决方案\n\n聊天机器人是完整的解决方案，并在任何解决方案中作为一个独立的层存在。高级管理层也将聊天机器人的功能和投资回报率视为一个独立实体。对对话技术的关注进一步要求从解决方案和业务回报的角度对聊天机器人有全面的看法。在前几章中，我们揭开了为封闭领域开发聊天机器人的基本要素。在本章中，我们将重点介绍如何利用最佳可用资源为封闭领域用例构建解决方案。本章还将涵盖如何衡量聊天机器人实施成功与否的思考过程，以及管理与聊天机器人相关的风险。\n\
  \n## 业务考量\n\n任何企业都会问：“聊天机器人能增加什么业务价值？”这个问题需要客观地并设定时间目标来回答。技术进步可能允许我们实现先进的聊天机器人和其他解决方案，但它们如何为企业增加价值是一个非常主观的判断。企业需要评估所有因素，以确定聊天机器人如何对其业务有利。\n\
  \n### 聊天机器人 vs. 应用程序\n\n从技术角度来看，企业必须解决一个重要问题，特别是与封闭领域聊天机器人相关的问题：是选择开发应用程序还是聊天机器人。就功能特性而言，两者都可以为给定的功能集提供相同的信息。关键区别在于聊天机器人本质上是对话式的，而应用程序是自助服务应用。\n\
  \n根据《2018 年聊天机器人现状报告》（[`www.drift.com/wp-content/uploads/2018/01/2018-state-of-chatbots-report.pdf`](https://www.drift.com/wp-content/uploads/2018/01/2018-state-of-chatbots-report.pdf)）中提到的聊天机器人\
  \ vs. 应用程序的关键考量是：\n\n*   聊天机器人更受青睐，用于快速获取问题答案和提供 24 小时服务。\n*   应用程序更受青睐，因其易用性和便利性。\n\
  \n该报告中的一项调查列出了一些企业必须根据其当前需求进行核实的因素：\n\n*   快速回答简单问题\n*   获得 24 小时服务\n*   便利性\n*\
  \   快速回答复杂问题\n*   沟通的便捷性\n*   能够轻松投诉\n*   获得详细/专家级答案\n*   良好的客户体验\n*   友好性和亲和力\n\
  *   快速解决投诉\n\n\n\n### 即时通讯应用的兴起\n\n推动聊天机器人需求的另一个因素是即时通讯应用使用量的增长，以及企业采取以移动端为核心策略的稳定增长趋势。如今，客户通过手机\
  \ 24 小时连接互联网，并希望通过易于使用的界面访问服务。\n\n2011 年初，即时通讯应用开始兴起，并随着移动设备、互联网连接和云计算的同步发展而获得了良好的采用率（[`www.businessinsider.com/the-messaging-app-report-2015-11`](http://www.businessinsider.com/the-messaging-app-report-2015-11)）。大约在\
  \ 2015 年初，即时通讯应用，特别是 WhatsApp 和 Facebook Messenger，达到了惊人的采用率，其活跃度与社交网络持平。正如趋势所示，人们在即时通讯应用上的活跃度高于社交媒体网络。\n\
  \n这一趋势指出了消费者行为的转变，即聊天成为一种首选的沟通方式。这意味着企业也需要通过聊天机器人或人工聊天，来启用与客户的这种沟通渠道。\n\n### 直接联系\
  \ vs. 聊天\n\n即时通讯应用使用量的增长，改变了客户与企业互动的方式。在即时通讯应用的早期，研究显示客户越来越倾向于通过聊天进行联系。\n\n*聊天机器人杂志*\
  \ 总结的 BI Intelligence 调查（[`https://chatbotsmagazine.com/chatbot-report-2018-global-trends-and-analysis-4d8bbe4d924b`](https://chatbotsmagazine.com/chatbot-report-2018-global-trends-and-analysis-4d8bbe4d924b)）显示，早在\
  \ 2016 年，成熟市场的客户就非常迅速地接受了聊天方式。消费者认为，通过聊天解决问题比致电客服代表更快。他们也觉得聊天更舒适，因为可以保留聊天记录以便后续跟进，这与电话交谈不同。\n\
  \n## 聊天机器人的商业优势\n\n考虑关键的业务方面，可以让公司决定是继续构建聊天机器人，还是改进现有的应用/渠道。如果公司决定采用聊天机器人解决方案，就需要了解聊天机器人创造的关键价值。目前，不同行业的用户对聊天机器人的接受程度不同，采用率也各不相同。\n\
  \n在上述 *聊天机器人杂志* 的调查问卷中，当被问及“对于由基于 AI 的聊天机器人协助进行商业沟通，你的接受程度如何？”时，受访者表示，他们最愿意在在线零售、一般医疗咨询和电信领域进行此类对话。\n\
  \n此外，在《2018 年聊天机器人现状报告》中，用户不偏好聊天机器人的主要原因包括：需要真人协助、对聊天机器人认知不足，以及因渠道可访问性受限（例如没有 Facebook\
  \ 账户或无法使用智能手机）而可能产生的障碍。\n\n研究表明，如果聊天机器人能为公司带来高收益，并且你的客户乐于接受基于 AI 的聊天机器人的协助，那么增加这一渠道是有价值的。以下章节将讨论聊天机器人创造的两个最重要的价值。\n\
  \n### 成本节约\n\n毫无疑问，对公司来说最重要的好处是客户服务方面的成本节约。成本节约为将聊天机器人引入公司的服务交付渠道提供了最有力的理由。虽然还有许多其他的战略和增长收益，但成本必须证明用于聊天机器人开发和维护的所有努力和资源是合理的。\n\
  \n一项 BI Intelligence 研究（[`www.businessinsider.com/intelligence/research-store?&vertical=mobile#!/The-Messaging-Apps-Report/p/56901061`](https://www.businessinsider.com/intelligence/research-store%253F%2526vertical%253Dmobile%2523%2521/The-Messaging-Apps-Report/p/56901061)）显示，通过在各个业务职能中引入聊天机器人，每年可节省大量薪资开支。薪资支出最高的领域是客户服务代表，而该领域的节省也最大。成本降低显而易见，这归功于在保险销售、报告、销售和客户服务等职能中使用聊天机器人。\n\
  \n### 客户体验\n\n客户体验是将聊天机器人引入业务的第二大影响因素。客户体验为企业带来多重价值，不仅限于直接销售或成本节约。良好的客户体验带来的好处包括：\n\
  \n*   高品牌价值和品牌回忆度\n*   高生命周期价值（提升用户参与度）\n*   与竞争对手的品牌差异化\n\n由于愉悦的客户体验，还会衍生出许多其他因素。忠诚的客户群是长期成功的秘诀。\n\
  \n*聊天机器人杂志* 的总结指出了聊天机器人带来的良好且独特的客户体验所具备的特征。关键点如下，供参考：\n\n*   24 小时服务\n*   获得即时响应\n\
  *   回答简单问题\n*   便捷的沟通\n*   快速解决投诉\n*   良好的客户体验\n*   详细/专业的解答\n*   回答复杂问题\n*   友好且平易近人\n\
  \n这些多样化的新功能吸引了客户，并为公司创造了独特的价值。\n\n## 成功指标\n\n在任何聊天机器人开发之初，定义成功指标都至关重要。这些指标如同指南针，指引着解决方案的方向以及聊天机器人预期带来的收益。虽然存在与\
  \ NLP 引擎准确性、意图分类器及其他技术方面相关的成功指标，但本节我们仅从业务角度讨论成功指标。\n\n成功指标需要易于管理和衡量，并能向业务部门进行简单解释。我们将讨论几个可用于跟踪和管理聊天机器人成功与否的指标。这些指标侧重于比较聊天机器人交互与人工交互时的成功程度。\n\
  \n### 客户满意度指数\n\n客户满意度指数（CSI）通过向客户发送简短调查，跟进并收集他们对交互体验的反馈，来衡量客户服务代表的交互质量。CSI 是最具影响力的监控指标之一，因为它不仅提供了满意度量表，还指出了需要改进的领域。\n\
  \n### 完成率\n\n完成率（CR）定义为聊天机器人交互中，以客户问题得到解决而告终的比例。该指标告诉我们，聊天机器人有多少次能够完成对话并向用户提供所需的响应。更高的完成率意味着更高效的聊天机器人服务。\n\
  \n### 跳出率\n\n跳出率（BR）可以定义为用户在向聊天机器人输入一两次信息后便离开聊天的比例。高跳出率意味着聊天机器人未能成功吸引用户，这必然会在一些客户反馈中有所体现。\n\
  \n除了跳出率，我们还会衡量重复使用率（RR），它指的是有多少客户会再次回来使用聊天机器人。BR 是识别那些更倾向于使用聊天机器人的人群，并定位类似客户群体的完美指标。\n\
  \n## 管理聊天机器人服务中的风险\n\n新技术渠道确实会带来风险。客户和公司需要了解，通过聊天机器人进行任何交易或信息交换所涉及的风险。在允许普通客户使用聊天机器人服务之前，必须理解、沟通并缓解这些风险。\n\
  \n\n\n### 第三方渠道\n\n银行及其他金融机构深知为用户开辟金融服务新渠道的重要性。虽然这为用户带来了便利，但也伴随着一定风险。技术的发展速度远超我们现有的风险框架。当普通用户能够摸索出使用聊天机器人的风险或最佳实践时，他们可能已经遭遇了安全漏洞。\n\
  \n最大的安全风险源于聊天机器人的通信渠道，因为这些渠道不受银行安全控制的管辖。例如，通过 Facebook Messenger 与银行系统交互的客户，实际上是借助\
  \ Facebook 平台进行操作，而该平台可能存在漏洞，且其设计初衷并非用于银行业务，仅适用于普通人际聊天。\n\nSynopsys 在 2018 年进行的一项调查显示，36%\
  \ 的受访者认为面向客户的 Web 应用仍是亚太地区企业面临的首要安全风险。2018 年 9 月，Facebook 承认其安全漏洞影响了超过 5000 万个账户，这及时提醒我们，即便是科技巨头也无法幸免。（来源：`finews.asia`）。\n\
  \n这些案例要求金融机构限制通过公共渠道使用聊天机器人信使的功能。开发端到端的聊天机器人体验也能降低此类风险，但其普及仍面临挑战。\n\n### 身份冒充\n\n\
  另一个非常突出的风险源于**身份冒充**。身份冒充可能表现为外观相似的聊天机器人，或利用虚假窗口进行对话、入侵社交媒体及其他冒充手段。由于欺诈者的犯罪手段层出不穷，银行已经面临大量欺诈行为，并每年投入数百万资金用于防范网络钓鱼、语音钓鱼及其他冒充攻击的教育。\n\
  \n双因素认证是减少身份冒充攻击的一种可行方法，它通过两个不同来源进行两步验证。在大多数情况下，黑客无法同时破解两个认证因素，因此成功进行欺诈交易的可能性较低。\n\
  \n### 个人信息\n\n通过聊天机器人渠道泄露个人信息是银行管理上面临的一项挑战。控制那些可能为了获取服务而无意中输入个人信息的用户，是一项艰巨的任务。由于聊天机器人由自然语言驱动，泄露个人详细信息的可能性很高。\n\
  \n聊天机器人需要确保尽可能少地使用信息。最好创建一个具有适当访问控制的 PIN 码，这样用户就无需透露个人信息，只需使用 PIN 码即可。教育用户是确保用户对任何欺诈行为保持警惕和警觉的关键步骤。\n\
  \n### 确认核查\n\n确认是最有效、有时也是最后的手段，用以确保通过聊天机器人进行的交易是合法的。使用聊天机器人可能发生欺诈性或错误交易。当新技术投入用户服务时，用户需要时间来理解服务的正确使用方法，在此过程中，他们也可能进行一些非法交易。\n\
  \n对于任何看似异常或意外的交易，最好在处理前致电客户并要求确认。这一核查措施能保护用户和银行免受欺诈。\n\n## 私有聊天机器人的通用解决方案架构\n\n\
  > *解决方案架构是一种实践，用于定义和描述在特定解决方案背景下交付的系统的架构，因此它可能涵盖对整个系统或其特定部分的描述。解决方案架构的定义通常由解决方案架构师主导。*\n\
  > \n> 来源：维基百科\n\n在本节中，我们将介绍一个参考解决方案架构，您可以稍作修改后应用于迄今为止提出的各种理念（图 4-1）。\n\n![../images/478492_1_En_4_Chapter/478492_1_En_4_Fig1_HTML.jpg](img/478492_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n24x7 保险代理的解决方案架构\n\n该架构从高层次上描述了解决方案将如何运作。这与技术架构不同，技术架构解释了使解决方案运作的具体组件及其配置。精确的技术架构是根据需求构建的，不在本书的讨论范围之内。以下小节将通过其他重要信息来扩展和解释该解决方案架构。\n\
  \n\n\n### 工作流描述\n\n以下是工作流程：\n\n1.  **对话界面**：我们将从头开始开发界面；它不依赖于第三方界面（例如 Skype、Telegram\
  \ 等）。这将有助于我们根据组织需求创建定制化界面，并根据需要扩展其他功能。该界面可以是一个全新的、适用于 iOS、Android 和 Windows 平台的移动应用。\n\
  \n2.  **MFA 与 Active Directory**：后端将构建认证系统，用于对设备（MS Intune）、用户（Active Directory）和应用程序（通过\
  \ PIN 码）进行身份验证。我们将在 Node 环境下构建该系统，以便也能集成到其他身份管理服务中。在基本形式下，我们仅通过 PIN 码验证来访问应用程序。\n\
  \n3.  **NLP 引擎**：将构建 NLP 引擎，用于从队列中接收文本输入，提取意图，并为传入的查询添加上下文。一旦问题被分解为所需的组成部分，它就会被发送到机器人逻辑模块。\n\
  \n4.  **机器人逻辑**：这是处理传入请求的核心处理器。在处理请求之前，它有两个核心输入。机器人逻辑在满足以下两种方法设定的流程之前，不会调用信息服务。如果机器人逻辑没有足够的信息进行回复，它会向用户询问更多信息。\n\
  \    1.  **策略交互流程**：这些流程是银行专家为传入请求设计的工作流（例如，如果有人请求更新地址，回复的关键步骤是什么？）。这些步骤将确保用户遵循步骤来获得答案。这确保了机器人遵循所有政策（无论是法定的还是内部的），就像一位非正式的人力资源专员一样。此外，政策和常见问题解答也可以在此处定义。\n\
  \n    2.  **机器学习**：需要机器学习算法来改进输出的请求会在此处发起（例如，我可以申请获取 3 月 15 日到 3 月 18 日的对账单吗？）。这需要机器应用适当的逻辑来提取日期、员工\
  \ ID 和现有账户余额，以便向信息系统创建正确的查询。此外，更复杂的功能，如员工的情绪、请求的紧急程度以及问题的情感倾向，也将在此处构建。\n\n5.  **信息服务**：这是为员工请求获取实时信息的地方。该服务处理所有请求并准备回复，同时也可以发送操作请求。信息服务将与三个核心数据服务进行交互：\n\
  \    1.  **数据湖/数据库**：如果需要从公司的某个数据库或数据湖中获取某些数据。\n\n    2.  **第三方 API/ODBC**：通过 ODBC/API\
  \ 或其他通过 REST API 暴露自身的方法与人力资源系统进行交互。\n\n    3.  **人力资源人员**：如果回复的可信度评分较低，它将通过聊天界面将请求转交给人力资源人员处理。\n\
  \n6.  **操作**：信息服务还会将请求某些工作的请求路由到操作项管理队列（例如，明天请假的请求）。此请求需要在 PeopleSoft 或人力资源系统中进行更新。所有此类变更请求将被路由到人力资源审批（也可以是直接审批）；一旦获得批准（无论是通过真实的人力资源人员还是基于策略的规则），它将被发送到操作队列。人力资源可以在此处支持广播，并且可以通过操作工作流进行投递。\n\
  \n7.  **实时系统更新**：对于已授权和批准的请求，我们直接在人力资源系统中进行更新，并向聊天机器人用户触发通知，同时触发电子邮件以及银行系统的其他内置流程。\n\
  \n### 关键特性\n\n以下是关键特性：\n\n*   **为您量身打造**：我们将根据特定需求制作机器人，而不是让这些需求去适应现有的机器人框架。\n\n\
  *   **设计即隐私**：机器人的开发遵循设计即隐私原则。它将完全符合当地法律和内部法规。\n\n*   **采用微服务架构开发**：整个应用程序将基于微服务原则，因此将支持面向未来的设计，并允许在此框架之上进行高级应用程序开发。\n\
  \n*   **部署选项**：我们可以选择哪些组件部署在本地或公有云上。根据需求，我们可以制定部署计划。\n\n*   **可扩展**：我们可以根据需要集成任意数量的\
  \ API 或 AI/ML 功能。所有未来的新变更都可以作为 API 在框架中使用。\n\n### 技术栈\n\n以下是技术栈：\n\n*   **核心引擎**：Java\
  \ 和 JavaScript\n\n*   **后端服务器**：NodeJS 和其他 JavaScript\n\n*   **前端服务器**：基于原生框架的移动应用\n\
  \n*   **日志管理**：小型 Hadoop 集群的云存储。此外，这些存储的对话日志为 AI/ML 模型训练提供数据。\n\n*   **可视化**：可以使用\
  \ D3 自定义创建；如果需要自助服务，则可以将 Tableau/PowerBI 与日志集成。\n\n*   **搜索**：使用 Elastic Search\
  \ 搜索对话日志。\n\n### 维护\n\n在维护范围方面，有两个关键流：\n\n*   **技术方面**：应用程序的正常运行时间将借助本地工程师和针对所有查询的待命渠道来维护。\n\
  \n*   **AI/ML 大脑**：这将由数据科学家团队在异地完成，更新将在准备就绪后推送到系统。\n\n## 总结\n\n本章描述了聊天机器人解决方案的业务考量，并列出了聊天机器人的优势。消息应用的市场增长是一个良好信号，表明用户正在适应消息应用，因此服务型聊天机器人可以增强他们的体验并降低公司成本。第三方研究显示了聊天机器人在企业中产生的影响，以及它们如何使数字渠道接近自然语言。下一部分讨论了必须定义的成功指标，以管理和改进聊天机器人。关键指标包括客户满意度指数（CSI）和转化指数（CI）。\n\
  \n此外，本章还讨论了聊天机器人的潜在风险以及如何管理这些风险。最突出的风险是身份冒充和凭证被黑客攻击。这两种风险都需要进行教育并建立安全的认证系统。最后，我们展示了一个开发聊天机器人的参考解决方案。架构、工作流、技术栈和维护说明提供了足够的信息，可以根据特定需求构建您的聊天机器人解决方案。在接下来的章节中，您将了解自然语言科学的关键领域，包括理解（NLU）、处理（NLP）和生成（NLG）。然后，我们将讨论如何使用开源技术和内部开发的框架来实现这些功能。\n\
  \n\n\n"
- "# 5. 自然语言处理、理解与生成\n\n人脑是处理、理解和生成（P-U-G）自然语言方面最先进的机器之一。人脑的能力远不止于对一种语言、方言、口音和对话语气进行\
  \ P-U-G 操作。迄今为止，还没有任何机器能达到人类无缝完成这三项任务的潜力。然而，机器学习算法和计算能力的进步，正使创造类人机器人的遥远梦想成为可能。\n\
  \n在本章中，我们将结合用例和示例，探讨自然语言的 P-U-G 及其细微差别。表 5-1 快速总结了自然语言处理（NLP）、自然语言理解（NLU）和自然语言生成（NLG）及其一些功能和实际应用。我们将在各自的章节中更详细地介绍自然语言处理、理解和生成。\n\
  \n表 5-1\n\nNLP、NLU 和 NLG\n\n| 类型 | NLP | NLU | NLG |\n| --- | --- | --- | --- |\n\
  | **简介** | 通过分解、理解其含义并确定适当操作来处理和分析书面或口头文本。它涉及解析、断句和词干提取。 | NLP 的一种特定类型，有助于处理阅读理解，包括从语篇内容中理解含义并识别段落主旨的能力。\
  \ | NLG 是 NLP 的任务之一，用于从知识库的结构化数据生成自然语言文本。换句话说，它将数据转换为书面叙述。 |\n| **功能** | 词性识别、文本分类、命名实体识别、翻译、语音识别\
  \ | 自动摘要、语义解析、问答、情感分析 | 内容确定、文档结构组织、交互式对话中的文本生成 |\n| **实际应用** | 数字新闻聚合公司的文章分类 |\
  \ 构建问答聊天机器人，利用 Twitter 和 Facebook 数据进行品牌情感分析 | 为电子商务网站生成产品描述或金融投资组合摘要 |\n\n## 聊天机器人架构\n\
  \n在构建企业级聊天机器人时，到目前为止，您已经了解了如何识别数据源、设计聊天机器人架构、列出业务用例以及许多其他有助于企业高效处理、减少人工劳动和降低运营成本的概念。在本章中，我们将重点讨论聊天机器人的核心部分：处理文本数据并参与类人对话的能力。图\
  \ 5-1 展示了一个利用 NLP、NLU 和 NLG 技术构建企业级聊天机器人的架构。\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig1_HTML.jpg](img/478492_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\n聊天机器人架构图\n\n假设一家航空公司构建了一个聊天机器人，用于通过其网站或社交媒体页面预订航班。以下是按照图 5-1 所示架构的步骤：\n\
  \n1.  客户通过航空公司的 Facebook 页面说：“帮我预订一张明天从伦敦到纽约的机票。”在这种情况下，Facebook 成为表示层。一个功能完备的聊天机器人可以集成到公司的网站、社交网络页面以及\
  \ Skype 和 Slack 等即时通讯应用中。\n\n2.  接下来，消息被传送到消息后端，纯文本在此处通过 NLP/NLU 引擎，文本被分解为标记，消息被转换为机器可理解的命令。我们将在本章中更详细地重新讨论这一点。\n\
  \n3.  然后，决策引擎将命令与预配置的工作流进行匹配。例如，要预订航班，系统需要出发地和目的地。这就是 NLG 发挥作用的地方。聊天机器人会问：*“好的，我将帮助您预订从伦敦到纽约的航班。请告诉我您更喜欢从希思罗机场还是盖特威克机场出发？”*\
  \ 聊天机器人获取出发地和目的地，并自动生成一个后续问题，询问客户偏好哪个机场。\n\n4.  聊天机器人现在访问数据层，并从预置的数据源（通常可以连接到实时预订系统）获取航班信息。数据源根据设计提供航班可用性、价格和许多其他服务。\n\
  \n有些聊天机器人侧重于生成式回复，而另一些则用于检索信息并将其嵌入预设计的对话流程中。例如，在航班预订用例中，我们几乎知道客户可能用来预订航班的所有方式；而如果以一家远程医疗公司的聊天机器人为例，我们则不确定患者可能提出的所有问题。因此，在远程医疗公司的聊天机器人中，我们需要借助使用\
  \ NLG 技术构建的生成模型，而在航班预订聊天机器人中，一个结合了 NLP 和 NLP 引擎的、良好的基于检索的系统应该就能工作。\n\n由于本书是关于构建企业级聊天机器人的，我们将更多地关注\
  \ P-U-G 在自然语言中的应用，而不是深入探讨该学科的基础知识。在下一节中，我们将使用一些最流行的 Python 工具展示 NLP 和 NLU 的各种技术。还有其他基于\
  \ Java 和 C#的库；然而，Python 库提供了更强大的社区支持和更快的开发速度。\n\n此外，为了区分 NLP 和 NLU，图 5-2 中的维恩图展示了\
  \ NLP 和 NLU 的一些应用。它显示 NLU 是 NLP 的一个子集。这种区分仅在于任务，而非范围。总体目标是处理和理解自然语言文本，使机器像人类一样思考。\n\
  \n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig2_HTML.jpg](img/478492_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n\nNLP 和 NLU 的应用\n\n## 流行的开源 NLP 和 NLU 工具\n\n在本节中，我们将简要探讨可用于执行自然语言处理、理解和生成的各种开源工具。虽然这些工具中的每一个都不区分自然语言的\
  \ P-U-G，但我们将在相应的三个独立标题下展示这些工具的能力。\n\n### NLTK\n\n自然语言工具包（NLTK）是一个用于处理英语词汇的 Python\
  \ 库。它采用 Apache 2.0 开源许可证。NLTK 使用 Python 编程语言编写。以下是 NLTK 可以执行的一些任务：\n\n*   **文本分类**：将文本分类到不同类别，以便更好地组织和过滤内容\n\
  *   **句子分词**：将句子分解为单词，用于符号化和统计自然语言处理\n*   **词干提取**：将单词还原为词基或词根形式\n*   **词性标注**：将单词标注为词性，从而将单词归类到具有相似语法属性的类别中\n\
  *   **文本解析**：基于底层语法确定文本的句法结构\n*   **语义推理**：理解单词含义以创建表示的能力\n\nNLTK 是教授 NLP 的首选工具。它也被广泛用作原型设计和研究的平台。\n\
  \n\n\n### spaCy\n\n大多数构建涉及自然语言数据产品的组织都在采用 spaCy。它凭借提供准确且快速的生产级 NLP 引擎而脱颖而出。加上详尽的文档，其采用率进一步提高。该库使用\
  \ Python 和 Cython 开发。spaCy 中的所有语言模型均使用深度学习进行训练，这为所有 NLP 任务提供了高精度。\n\n目前，spaCy 具备以下一些高级功能：\n\
  \n*   **涵盖 NLTK 功能：** 提供 NLTK 的所有功能，如分词、词性标注、依存句法树、命名实体识别等。\n\n*   **深度学习工作流：**\
  \ spaCy 支持深度学习工作流，可以连接在 TensorFlow、Keras、Scikit-learn 和 PyTorch 等流行框架上训练的模型。这使得\
  \ spaCy 成为构建和部署用于实际应用的复杂语言模型时最强大的库。\n\n*   **多语言支持：** 支持超过 50 种语言，包括法语、西班牙语和希腊语。\n\
  \n*   **处理流水线：** 提供一个易于使用且非常直观的处理流水线，用于以有序的方式执行一系列 NLP 任务。例如，用于执行词性标注、句子解析和命名实体提取的流水线可以像这样定义在一个列表中：`pipeline\
  \ = [\"tagger\", \"parser\", \"ner\"]`。这使得代码易于阅读且便于调试。\n\n*   **可视化工具：** 使用 displaCy，可以轻松绘制依存句法树和实体识别器。我们可以添加自己的颜色，使可视化效果更美观悦目。它也能在\
  \ Jupyter notebook 中快速渲染。\n\n### CoreNLP\n\nStanford CoreNLP 是所有自然语言任务中最古老、最强大的工具之一。其功能套件提供了许多语言分析能力，包括已讨论过的词性标注、依存句法树、命名实体识别、情感分析等。与\
  \ spaCy 和 NLTK 不同，CoreNLP 是用 Java 编写的。它还提供了从命令行使用的 Java API，以及用于与现代编程语言协作的第三方 API。以下是使用\
  \ CoreNLP 的核心功能：\n\n*   **快速且稳健：** 由于它使用久经考验且稳健的 Java 编程语言编写，CoreNLP 是许多开发者的最爱。\n\
  \n*   **广泛的语法分析：** 与 NLTK 和 spaCy 一样，CoreNLP 也提供了大量分析能力来处理和理解自然语言。\n\n*   **API\
  \ 集成：** CoreNLP 拥有出色的 API 支持，可以通过第三方 API 或 Web 服务从命令行以及 Python 等编程语言运行它。\n\n*  \
  \ **支持多种操作系统：** CoreNLP 可在 Windows、Linux 和 MacOS 上运行。\n\n*   **语言支持：** 与 spaCy 类似，CoreNLP\
  \ 提供了有用的语言支持，包括阿拉伯语、中文等。\n\n### gensim\n\ngensim 是一个用 Python 和 Cython 编写的流行库。它稳健且可用于生产环境，这使其成为\
  \ NLP 和 NLU 领域的另一个热门选择。它可以帮助分析纯文本文档的语义结构，并提炼出重要主题。以下是 gensim 的一些核心功能：\n\n*   **主题建模：**\
  \ 它自动从文档中提取语义主题。它提供了多种统计模型，包括用于主题建模的潜在狄利克雷分析（LDA）。\n\n*   **预训练模型：** 它拥有许多预训练模型，这些模型提供了开箱即用的能力，可以快速开发通用功能。\n\
  \n*   **相似性检索：** gensim 从任何文档中提取语义结构的能力，使其成为对众多主题进行相似性查询的理想库。\n\nspaCy 网站上的表 5-2\
  \ 总结了 NLTK、spaCy 和 CoreNLP 中是否提供某个给定的 NLP 功能。\n\n表 5-2\n\nspaCy、NLTK 和 CoreNLP 中可用的功能\n\
  \n| 序号 | 功能 | spaCy | NLTK | CoreNLP |\n| --- | --- | --- | --- | --- |\n| **1**\
  \ | 编程语言 | Python | Python | Java/Python |\n| **2** | 神经网络模型 | **是** | **否** | **是**\
  \ |\n| **3** | 集成词向量 | **是** | **否** | **否** |\n| **4** | 多语言支持 | **是** | **是**\
  \ | **是** |\n| **5** | 分词 | **是** | **是** | **是** |\n| **6** | 词性标注 | **是** | **是**\
  \ | **是** |\n| **7** | 句子分割 | **是** | **是** | **是** |\n| **8** | 依存句法分析 | **是**\
  \ | **否** | **是** |\n| **9** | 实体识别 | **是** | **是** | **是** |\n| **10** | 实体链接 |\
  \ **否** | **否** | **否** |\n| **11** | 共指消解 | **否** | **否** | **是** |\n\n### TextBlob\n\
  \nTextBlob 是一个相对不那么流行但易于使用的 Python 库，它提供了与上述库类似的各种 NLP 能力。它扩展了 NLTK 提供的功能，但形式更为简化。以下是\
  \ TextBlob 的一些功能：\n\n*   **情感分析：** 它提供了一种易于使用的方法来计算极性和主观性分数，用于衡量给定文本的情感。\n\n*  \
  \ **语言翻译：** 其语言翻译由 Google 翻译提供支持，支持超过 100 种语言。\n\n*   **拼写纠正：** 它使用了 Peter Norvig\
  \ 在其博客 [`http://norvig.com/spell-correct.html`](http://norvig.com/spell-correct.html)\
  \ 上演示的一种简单的拼写纠正方法。作为现任 Google 工程总监，他的方法准确率可达 70%。\n\n### fastText\n\nfastText 是一个专门用于学习词嵌入和文本分类的库。它由\
  \ Facebook 的 FAIR 实验室的研究人员开发。该库使用 C++ 和 Python 编写，使其在处理大量数据时非常高效和快速。以下是 fastText\
  \ 的一些功能：\n\n*   **词嵌入学习：** 通过无监督训练，使用 skipgram 和连续词袋（CBOW）模型提供多种词嵌入模型。\n\n*   **词汇外单词的词向量：**\
  \ 即使单词不在训练词汇表中，它也提供获取词向量的能力。\n\n*   **文本分类：** fastText 提供了一个快速的文本分类器，在其题为“Bag of\
  \ Tricks for Efficient Text Classification”的论文中声称，该分类器在准确率和训练时间上通常能与许多深度学习分类器相媲美。\n\
  \n在接下来的几个部分中，你将看到如何应用这些工具来执行 NLP、NLU 和 NLG 中的各种任务。\n\n## 自然语言处理\n\n语言技能被认为是人类能够执行的最复杂的任务。自然语言处理涉及理解和处理自然语言文本或语音，以执行特定的、有用的、期望的任务。NLP\
  \ 融合了计算机科学、语言学、数学、人工智能、机器学习和心理学中的思想和概念。\n\n从非结构化的文本数据中挖掘信息并不像使用 SQL 执行数据库查询那样直接。如果我们能够识别出人物、组织和其他有用信息等实体，那么基于关键词对文档进行分类、识别社交媒体帖子中提到的品牌、以及追踪\
  \ Twitter 上某位领导人的受欢迎程度，都是可以实现的。\n\nNLP 的主要任务是通过分解书面或口头文本、理解其含义并确定适当的行动来处理和分析它们。这涉及解析、断句、词干提取、依存句法树、实体提取和文本分类。\n\
  \n我们将看到语言中的单词如何被分解成更小的词元，以及各种转换（将文本数据转换为结构化的数值）是如何工作的。我们还将探索 NLTK、TextBlob、spaCy、CoreNLP\
  \ 和 fastText 等流行库。\n\n\n\n### 处理文本数据\n\n本章将使用亚马逊美食评论数据集，通过多种开源工具进行演示。该数据集可从[`www.kaggle.com/snap/amazon-fine-food-reviews`](http://www.kaggle.com/snap/amazon-fine-food-reviews)下载，采用\
  \ CC0：公共领域许可协议发布。\n\n#### 读取 CSV 文件\n\n使用 pandas 库中的`read_csv`函数，我们将`Reviews.csv`文件读入`food_review`数据框，并打印前几行（图\
  \ 5-3）：\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig3_HTML.jpg](img/478492_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n一个 CSV 文件\n\n```\nimport pandas as pd\nfood_review = pd.read_csv(\"Reviews.csv\"\
  )\nfood_review.head()\n```\n\n可以看出，CSV 包含 ProductID、UserID、产品评分、时间、摘要和评论文本等列。该文件包含近\
  \ 50 万条针对各种产品的评论。让我们抽取一些评论进行处理。\n\n#### 抽样\n\n使用 pandas 数据框中的`sample`函数，我们随机选取 1000\
  \ 条评论的文本，并打印前几行（见图 5-4）：\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig4_HTML.jpg](img/478492_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n\n样本\n\n```\nfood_review_text = pd.DataFrame(food_review[\"Text\"])\nfood_review_text_1k\
  \ = food_review_text.sample(n= 1000,random_state = 123)\nfood_review_text_1k.head()\n\
  ```\n\n#### 使用 NLTK 进行分词\n\n如前所述，NLTK 提供了许多处理文本数据的功能。处理文本数据的第一步是将句子分割成单个单词。这个过程称为分词。我们将使用\
  \ NLTK 的`word_tokenize`函数，在我们上面创建的`food_review_text_1k`数据框中创建一个新列，并打印前六行以查看分词结果（图\
  \ 5-5）：\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig5_HTML.jpg](img/478492_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n\n前几行\n\n```\nfood_review_text_1k['tokenized_reviews'] = food_review_text_1k['Text'].apply(nltk.word_tokenize)\n\
  food_review_text_1k.head()\n```\n\n### 使用正则表达式搜索单词\n\n现在我们已经获得了每条评论的分词文本，让我们取数据框中的第一行，并使用正则表达式搜索特定单词。该正则表达式搜索任何以**c**为首字符、以**i**为第三字符的单词。我们可以针对感兴趣的模式编写各种正则表达式搜索。这里使用`re.search()`函数执行搜索：\n\
  \n```\n#搜索：所有以 c 为首字母、i 为第三字母的五字母单词\nsearch_word = set([w for w in food_review_text_1k['tokenized_reviews'].iloc[0]\
  \ if re.search('^c.i..$', w)])\nprint(search_word)\n{'chips'}\n```\n\n### 使用精确单词搜索\n\
  \n另一种搜索单词的方法是使用精确匹配。这可以通过 pandas 中的`str.contains()`函数实现。在以下示例中，我们在所有评论中搜索单词“great”。包含该单词的评论行将被检索出来。这些评论可以被视为正面评价。见图\
  \ 5-6。\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig6_HTML.jpg](img/478492_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n\n包含特定单词的样本\n\n```\n#在评论中搜索单词\"great\"\nfood_review_text_1k[food_review_text_1k['Text'].str.contains('great')]\n\
  ```\n\n### NLTK\n\n在本节中，我们将使用 NLTK 的许多功能进行自然语言处理，例如规范化、名词短语分块、命名实体识别和文档分类器。\n\n\
  #### 使用 NLTK 进行规范化\n\n在许多自然语言任务中，我们经常处理单词的词根形式。例如，对于单词“baking”和“baked”，其词根是“bake”。这种提取词根的过程称为词干提取或规范化。NLTK\
  \ 提供了两个实现词干提取算法的函数。第一个是 Porter 词干提取算法，第二个是 Lancaster 词干提取器。\n\n两种算法输出的质量略有差异。例如，在以下示例中，Porter\
  \ 词干提取器将单词“sustenance”转换为“sustain”，而 Lancaster 词干提取器输出“sust”。\n\n```\nwords = set(food_review_text_1k['tokenized_reviews'].iloc[0])\n\
  print(words)\nporter = nltk.PorterStemmer()\nprint([porter.stem(w) for w in words])\n\
  处理前\n{'when', 'always', 'great', 'vending', 'for', 'make', \"'m\", 'just', 'I',\
  \ '.', 'love', 'a', 'They', 'with', 'healthy', 'these', 'snack', 'the', 'at', 'work',\
  \ 'chips', 'machine', 'stuck', 'sustenance', '!'}\n处理后\n['when', 'alway', 'great',\
  \ 'vend', 'for', 'make', \"'m\", 'just', 'I', '.', 'love', 'a', 'they', 'with',\
  \ 'healthi', 'these', 'snack', 'the', 'at', 'work', 'chip', 'machin', 'stuck', 'susten',\
  \ '!']\nlancaster = nltk.LancasterStemmer()\nprint([lancaster.stem(w) for w in words])\n\
  ['when', 'alway', 'gre', 'vend', 'for', 'mak', \"'m\", 'just', 'i', '.', 'lov',\
  \ 'a', 'they', 'with', 'healthy', 'thes', 'snack', 'the', 'at', 'work', 'chip',\
  \ 'machin', 'stuck', 'sust', '!']\n```\n\n\n\n#### 使用正则表达式进行名词短语分块\n\n在上述内容中，你将词元视为任何自然语言处理中的基本单元。由于在自然语言中，一组词元的组合往往能揭示含义或代表一个概念，因此我们创建了语块。通过一种称为分块的过程进行分割，从而生成多词元序列。在图\
  \ 5-7 中，较小的方框表示单词级词元化，较大的方框表示多词元序列，也称为高级语块。此类语块是使用正则表达式或 n-gram 方法（后续章节将详细介绍）创建的。分块对于实体识别至关重要，我们稍后将探讨这一点。\n\
  \n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig7_HTML.jpg](img/478492_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n\n词元与语块\n\n让我们考虑如下代码所示的一条评论。该语法使用一条规则来查找名词，该规则规定：*查找名词语块，其中零个或一个（?）限定词（DT）后跟任意数量（*）的形容词（JJ）和一个名词（NN）*。在以下代码输出中显示的词性标注树中，所有标记为\
  \ NP 的语块都是名词短语：\n\n```\nimport nltk\nfrom nltk.tokenize import word_tokenize\n#名词短语分块\n\
  text = word_tokenize(\"My English Bulldog Larry had skin allergies the summer we\
  \ got him at age 3, I'm so glad that now I can buy his food from Amazon\")\n#此语法规则：当可选的限定词（DT）后跟任意数量的形容词（JJ）和一个名词（NN）时，查找\
  \ NP 语块\ngrammar = \"NP: {<DT>?<JJ>*<NN>}\"\n#使用上述语法的正则表达式解析器\ncp = nltk.RegexpParser(grammar)\n\
  #带有词性标注的解析文本\nreview_chunking_out = cp.parse(nltk.pos_tag(text))\n#打印解析后的文本\nprint(review_chunking_out)\n\
  (S\nMy/PRP$\nEnglish/JJ\nBulldog/NNP\nLarry/NNP\nhad/VBD\nskin/VBN\nallergies/NNS\n\
  (NP the/DT summer/NN)\nwe/PRP\ngot/VBD\nhim/PRP\nat/IN\n(NP age/NN)\n3/CD\n,/,\n\
  I/PRP\n'm/VBP\nso/RB\nglad/JJ\nthat/IN\nnow/RB\nI/PRP\ncan/MD\nbuy/VB\nhis/PRP$\n\
  (NP food/NN)\nfrom/IN\nAmazon/NNP)\n```\n\n你可以看到许多 NP，例如“the summer”和“age”，其中“the\
  \ summer”不是一个单词词元。上面你看到词性标注是以树形结构呈现的。另一种表示语块结构的方法是使用标签。IOB 标签表示法是一种通用标准。在这种方案中，每个词元被表示为\
  \ I（内部）、O（外部）和 B（开始）。语块标签 B 表示一个语块的开始。语块内的后续词元被标记为 I，所有其他词元被标记为 O。图 5-8 提供了一个 IOB\
  \ 标签表示法的示例。\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig8_HTML.jpg](img/478492_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8\n\n语块结构的 IOB 标签表示法\n\n以下代码使用 CoNLL 2000 语料库，通过函数 `tree2conlltags()` 将树转换为标签。CoNLL\
  \ 是使用 IOB 符号进行标注和分块的*华尔街日报*文本。\n\n```\nfrom nltk.chunk import conlltags2tree, tree2conlltags\n\
  from pprint import pprint\n#打印 IOB 标签\nreview_chunking_out_IOB = tree2conlltags(review_chunking_out)\n\
  pprint(review_chunking_out_IOB)\n[('My', 'PRP$', 'O'),\n('English', 'JJ', 'O'),\n\
  ('Bulldog', 'NNP', 'O'),\n('Larry', 'NNP', 'O'),\n('had', 'VBD', 'O'),\n('skin',\
  \ 'VBN', 'O'),\n('allergies', 'NNS', 'O'),\n('the', 'DT', 'B-NP'),\n('summer', 'NN',\
  \ 'I-NP'),\n('we', 'PRP', 'O'),\n('got', 'VBD', 'O'),\n('him', 'PRP', 'O'),\n('at',\
  \ 'IN', 'O'),\n('age', 'NN', 'B-NP'),\n('3', 'CD', 'O'),\n(',', ',', 'O'),\n('I',\
  \ 'PRP', 'O'),\n(\"'m\", 'VBP', 'O'),\n('so', 'RB', 'O'),\n('glad', 'JJ', 'O'),\n\
  ('that', 'IN', 'O'),\n('now', 'RB', 'O'),\n('I', 'PRP', 'O'),\n('can', 'MD', 'O'),\n\
  ('buy', 'VB', 'O'),\n('his', 'PRP$', 'O'),\n('food', 'NN', 'B-NP'),\n('from', 'IN',\
  \ 'O'),\n('Amazon', 'NNP', 'O')]\n```\n\n#### 命名实体识别\n\n一旦我们获得了文本的词性标注，就可以提取命名实体。命名实体是指特定个体的明确名词短语，例如\
  \ ORGANIZATION 和 PERSON。其他一些实体包括 LOCATION、DATE、TIME、MONEY、PERCENT、FACILITY 和 GPE。设施是指建筑和土木工程领域中任何人造物品，例如泰姬陵或帝国大厦。GPE\
  \ 指地缘政治实体，例如城市、州和国家。我们可以使用 nltk 库中的 `ne_chunk()` 方法提取所有这些实体。\n\n以下代码使用经过词性标注的句子，并对其应用\
  \ `ne_chunk()` 方法。它将 *Amazon* 识别为 GPE，将 *Bulldog Larry* 识别为 PERSON。在这种情况下，结果既有正确也有错误。Amazon\
  \ 被识别为 ORGANIZATION，这是我们在此处期望的。在本章后面，我们将训练自己的命名实体识别器以提高性能。\n\n```\ntagged_review_sent\
  \ = nltk.pos_tag(text)\nprint(nltk.ne_chunk(tagged_review_sent))\n(S\nMy/PRP$\n\
  English/JJ\n(PERSON Bulldog/NNP Larry/NNP)\nhad/VBD\nskin/VBN\nallergies/NNS\nthe/DT\n\
  summer/NN\nwe/PRP\ngot/VBD\nhim/PRP\nat/IN\nage/NN\n3/CD\n,/,\nI/PRP\n'm/VBP\nso/RB\n\
  glad/JJ\nthat/IN\nnow/RB\nI/PRP\ncan/MD\nbuy/VB\nhis/PRP$\nfood/NN\nfrom/IN\n(GPE\
  \ Amazon/NNP))\n```\n\n### spaCy\n\n虽然 spaCy 提供了 NLTK 的所有功能，但它被认为是 NLP 任务中最好的生产级工具之一。在本节中，我们将了解如何使用\
  \ spaCy 库在 Python 中提供的各种方法。\n\nspaCy 提供了三个核心模型：en_core_web_sm（10MB）、en_core_web_md（91MB）和\
  \ en_core_web_lg（788MB）。较大的模型在更大的词汇表上训练，因此会提供更高的准确性。因此，根据你的用例，明智地选择适合你需求的模型。\n\n\
  #### 词性标注\n\n使用 `spaCy.load()` 加载模型后，你可以将任何字符串传递给该模型，它会一次性提供所有方法。为了提取词性，使用了 `pos_method`。在以下代码中，分词后，我们打印以下内容：\n\
  \n*   `text`：原始文本\n*   `lemma`：词干提取后的词元，即单词的基本形式\n*   `pos`：词性\n*   `tag`：带有详细信息的词性标注\n\
  *   `dep`：词元之间的关系。也称为句法依赖关系。\n*   `shape`：单词的形状（即大小写、标点、数字）\n*   `is_alpha`：如果词元是字母数字字符，则返回\
  \ True\n*   `is.stop`：如果词元是停用词（如“at”、“so”等），则返回 True\n\n```\n# 词性标注\nimport spacy\n\
  nlp = spacy.load('en_core_web_sm')\ndoc = nlp(u\"My English Bulldog Larry had skin\
  \ allergies the summer we got him at age 3, I'm so glad that now I can buy his food\
  \ from Amazon\")\nfor token in doc:\nprint(token.text, token.lemma_, token.pos_,\
  \ token.tag_, token.dep_, token.shape_, token.is_alpha, token.is_stop)\nMy -PRON-\
  \ DET PRP$ poss Xx True True\nEnglish English PROPN NNP compound Xxxxx True False\n\
  Bulldog Bulldog PROPN NNP nsubj Xxxxx True False\nLarry Larry PROPN NNP nsubj Xxxxx\
  \ True False\nhad have VERB VBD ccomp xxx True True\nskin skin NOUN NN compound\
  \ xxxx True False\nallergies allergy NOUN NNS dobj xxxx True False\nthe the DET\
  \ DT det xxx True True\nsummer summer NOUN NN npadvmod xxxx True False\nwe -PRON-\
  \ PRON PRP nsubj xx True True\ngot get VERB VBD relcl xxx True False\nhim -PRON-\
  \ PRON PRP dobj xxx True True\nat at ADP IN prep xx True True\nage age NOUN NN pobj\
  \ xxx True False\n3 3 NUM CD nummod d False False\n, , PUNCT, punct, False False\n\
  I -PRON- PRON PRP nsubj X True True\n'm be VERB VBP ROOT 'x False True\nso so ADV\
  \ RB advmod xx True True\nglad glad ADJ JJ acomp xxxx True False\nthat that ADP\
  \ IN mark xxxx True True\nnow now ADV RB advmod xxx True True\nI -PRON- PRON PRP\
  \ nsubj X True True\ncan can VERB MD aux xxx True True\nbuy buy VERB VB ccomp xxx\
  \ True False\nhis -PRON- DET PRP$ poss xxx True True\nfood food NOUN NN dobj xxxx\
  \ True False\nfrom from ADP IN prep xxxx True True\nAmazon Amazon PROPN NNP pobj\
  \ Xxxxx True False\n```\n\n\n\n#### 依存句法分析\n\nspaCy 的依存句法分析器拥有丰富的 API，有助于在依存句法树中导航。它还提供了检测句子边界以及遍历名词短语或语块的功能。在下面的示例中，模型中的\
  \ `noun_chunks` 方法是可迭代的，并支持以下方法：\n\n*   `text`：原始名词语块\n*   `root.text`：将名词语块与解析中其余部分连接起来的原始单词\n\
  *   `root.dep`：将根节点与其中心词连接起来的依存关系\n*   `root.head`：根词元的中心词\n\n从示例中可以看出，**“My English\
  \ Bulldog”** 是一个名词短语，其中 “**Bulldog**” 是根文本，具有 **“nsubj”** 关系，并且 **“had”** 是其根中心词。\n\
  \n```\n#Dependency parse\nimport spacy\nnlp = spacy.load(\"en_core_web_sm\")\ndoc\
  \ = nlp(u\"My English Bulldog Larry had skin allergies the summer we got him at\
  \ age 3, I'm so glad that now I can buy his food from Amazon\")\nfor chunk in doc.noun_chunks:\n\
  print(chunk.text, chunk.root.text, chunk.root.dep_,\nchunk.root.head.text)\nMy English\
  \ Bulldog Bulldog nsubj had\nLarry Larry nsubj had\nskin allergies allergies dobj\
  \ had\nwe we nsubj got\nhim him dobj got\nage age pobj at\nI I nsubj 'm\nI I nsubj\
  \ buy\nhis food food dobj buy\nAmazon Amazon pobj from\n```\n\n#### 依存句法树\n\nspaCy\
  \ 提供了一个名为 `displayCy` 的可视化方法。我们可以使用 displaCy 绘制给定句子的依存句法树（见图 5-9、5-10 和 5-11）。\n\
  \n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig11_HTML.jpg](img/478492_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\n\n依存句法树，第 3 部分\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig10_HTML.jpg](img/478492_1_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10\n\n依存句法树，第 2 部分\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig9_HTML.jpg](img/478492_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9\n\n依存句法树，第 1 部分\n\n```\nimport spacy\nfrom spacy import displacy\nnlp =\
  \ spacy.load(\"en_core_web_sm\")\ndoc = nlp(u\"My English Bulldog Larry had skin\
  \ allergies the summer we got him at age 3\")\ndisplacy.render(doc, style=\"dep\"\
  )\n```\n\n从依存句法树中，你可以看到有两对复合词：“English Bulldog” 和 “skin allergies”，以及 NUM **“3”**\
  \ 是 **“age”** 的修饰语。你还可以看到名词短语 “summer” 作为词元 “had” 的状语修饰语 (npadvmod)。你还可以观察到动词短语的许多直接宾语\
  \ (dobj)，它们都是名词短语，例如 (got, him) 和 (had, allergies)，以及介词的宾语 (pobj)，例如 (at, age)。关于依存句法树中关系的详细解释，可以在这里找到：[`https://nlp.stanford.edu/software/dependencies_manual.pdf`](https://nlp.stanford.edu/software/dependencies_manual.pdf)。\n\
  \n#### 组块分析\n\nspaCy 提供了一种易于使用的方法，可以从给定文本中检索组块信息，例如 VERB 和 NOUN。`noun_chunks` 方法提供名词短语，通过词性\
  \ (pos)，我们可以搜索 VERB。以下代码从组块中提取名词短语和动词：\n\n```\n# pip install spacy\n# python -m\
  \ spacy download en_core_web_sm\nimport spacy\n# 加载英文分词器、词性标注器、句法分析器、命名实体识别和词向量\n\
  nlp = spacy.load(\"en_core_web_sm\")\n# 处理整个文档\ntext = (\"My English Bulldog Larry\
  \ had skin allergies the summer we got him at age 3, I'm so glad that now I can\
  \ buy his food from Amazon\")\ndoc = nlp(text)\n# 分析句法\nprint(\"名词短语:\", [chunk.text\
  \ for chunk in doc.noun_chunks])\nprint(\"动词:\", [token.lemma_ for token in doc\
  \ if token.pos_ == \"VERB\"])\n名词短语: ['My English Bulldog', 'Larry', 'skin allergies',\
  \ 'we', 'him', 'age', 'I', 'I', 'his food', 'Amazon']\n动词: ['have', 'get', 'be',\
  \ 'can', 'buy']\n```\n\n#### 命名实体识别\n\nspaCy 在命名实体识别 (NER) 任务中的准确率达到 85.85%。`en_core_web_sm`\
  \ 模型提供了 *ents*** 函数，该函数可以获取实体。该模型在 OntoNotes 数据集上训练，该数据集可以在 [`https://catalog.ldc.upenn.edu/LDC2013T19`](https://catalog.ldc.upenn.edu/LDC2013T19)\
  \ 找到。\n\nspaCy 中的默认模型提供了表 5-3 中所示的实体。\n\n表 5-3\n\n类型\n\n| 类型 | 描述 |\n| --- | ---\
  \ |\n| PERSON | 人名，包括虚构角色 |\n| NORP | 国籍或宗教、政治团体 |\n| FAC | 土木工程结构或基础设施，如建筑物、机场、高速公路、桥梁等\
  \ |\n| ORG | 组织名称，如公司、机构、研究所等 |\n| GPE | 地缘政治实体，如国家、城市、州 |\n| LOC | 非 GPE 的地点，如山脉、水域\
  \ |\n| PRODUCT | 物体、车辆、食物等（非服务） |\n| EVENT | 命名的飓风、战役、战争、体育赛事等 |\n| WORK_OF_ART\
  \ | 书籍、歌曲等的标题 |\n| LAW | 已制定为法律的命名文件 |\n| LANGUAGE | 任何命名的语言 |\n| DATE | 绝对或相对日期或时间段\
  \ |\n| TIME | 小于一天的时间 |\n| PERCENT | 百分比，包括 % |\n| MONEY | 货币价值，包括单位 |\n| QUANTITY\
  \ | 度量，如重量或距离 |\n| ORDINAL | “第一”、“第二”等 |\n| CARDINAL | 不属于其他类型的数字 |\n\n以下代码将 “English\
  \ Bulldog Larry” 提取为 PERSON 实体，将 “Amazon” 提取为 ORG 实体。与 NLTK 将 Amazon 识别为 GPE 不同，spaCy\
  \ 能正确理解句子的上下文，从而判断出 Amazon 在给定句子中是一个组织。\n\n```\nimport spacy\n# 加载英文分词器、词性标注器、句法分析器、命名实体识别和词向量\n\
  nlp = spacy.load(\"en_core_web_sm\")\n# 处理整个文档\ntext = (\"My English Bulldog Larry\
  \ had skin allergies the summer we got him at age 3, I'm so glad that now I can\
  \ buy his food from Amazon\")\ndoc = nlp(text)\n# 查找命名实体\nfor entity in doc.ents:\n\
  print(entity.text, entity.label_)\nEnglish Bulldog Larry PERSON\nAmazon ORG\n```\n\
  \n我们还可以使用 `displacy` 方法可视化实体（如图 5-12 所示）：\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig12_HTML.jpg](img/478492_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\n\n结果\n\n```\nimport spacy\nfrom spacy import displacy\nfrom pathlib import\
  \ Path\ntext = \"I found these crisps at our local WalMart & figured I would give\
  \ them a try. They were so yummy I may never go back to regular chips, not that\
  \ I was a big chip fan anyway. The only problem is I can eat the entire bag in one\
  \ sitting. I give these crisps a big thumbs up!\"\nnlp = spacy.load(\"en_core_web_sm\"\
  )\ndoc = nlp(text)\nsvg = displacy.serve(doc, style=\"ent\")\noutput_path = Path(\"\
  images/sentence_ne.svg\")\noutput_path.open(\"w\", encoding=\"utf-8\").write(svg)\n\
  ```\n\n\n\n#### 基于模式的搜索\n\nspaCy 也提供基于模式或规则的搜索。我们可以在 `LOWER` 等函数的基础上定义模式。例如，在下面的代码中，我们定义了一个搜索范围，即小写的“Walmart”后跟一个标点符号。这个模式可以写成：\n\
  \n```\npattern = [{\"LOWER\": \"walmart\"}, {\"IS_PUNCT\": True}]\n```\n\n在搜索范围内，如果我们想找到单词“Walmart”，我们使用\
  \ `matcher.add` 方法来定义，并将 `pattern` 作为参数传递给该方法。\n\n这种语法比难以理解的繁琐正则表达式更友好。搜索结果显示了单词“Walmart”在字符串中的第七个位置开始，并在第九个位置结束。输出还显示了我们在模式中定义的跨度文本为“Walmart\
  \ &”。\n\n```\n# Spacy - 基于规则的匹配\nimport spacy\nfrom spacy.matcher import Matcher\n\
  nlp = spacy.load(\"en_core_web_sm\")\nmatcher = Matcher(nlp.vocab)\n# 将文本转换为小写后搜索\
  \ Walmart\npattern = [{\"LOWER\": \"walmart\"}, {\"IS_PUNCT\": True}]\nmatcher.add(\"\
  Walmart\", None, pattern)\ndoc = nlp(u\"I found these crisps at our local WalMart\
  \ & figured I would give them a try. They were so yummy I may never go back to regular\
  \ chips, not that I was a big chip fan anyway. The only problem is I can eat the\
  \ entire bag in one sitting. I give these crisps a big thumbs up!\")\nmatches =\
  \ matcher(doc)\nfor match_id, start, end in matches:\nstring_id = nlp.vocab.strings[match_id]\
  \  # 获取字符串表示\nspan = doc[start:end]  # 匹配的跨度\nprint(match_id, string_id, start,\
  \ end, span.text)\n16399848736434528297 Walmart 7 9 WalMart &\n```\n\n#### 搜索实体\n\
  \n使用匹配器方法，我们还可以在给定文本中搜索特定类型的实体。在下面的代码中，我们搜索名为“walmart”的实体 ORG（由“label”定义）。\n\n```\n\
  from spacy.lang.en import English\nfrom spacy.pipeline import EntityRuler\nnlp =\
  \ English()\nruler = EntityRuler(nlp)\npatterns = [{\"label\": \"ORG\",\"pattern\"\
  :[{\"lower\":\"walmart\"}]}]\nruler.add_patterns(patterns)\nnlp.add_pipe(ruler)\n\
  doc = nlp(u\"I found these crisps at our local WalMart & figured I would give them\
  \ a try. They were so yummy I may never go back to regular chips, not that I was\
  \ a big chip fan anyway. The only problem is I can eat the entire bag in one sitting.\
  \ I give these crisps a big thumbs up!\")\nprint([(ent.text, ent.label_) for ent\
  \ in doc.ents])\n[('WalMart', 'ORG')]\n```\n\n#### 训练自定义 NLP 模型\n\n在许多现实世界的数据集中，实体检测并不符合预期。spaCy\
  \ 或 NLTK 中的模型并未针对这些单词或标记进行训练。在这种情况下，我们可以使用私有数据集训练自定义模型。我们必须以特定格式创建训练数据。在下面的代码中，我们选取两个句子，并在文本中标记一个实体\
  \ PRODUCT 及其起始和结束位置。语法如下所示：\n\n```\n(\nu\"As soon as I tasted one and it tasted\
  \ like a corn chip I checked the ingredients. \",\n{\n\"entities\": [(45, 49, \"\
  PRODUCT\")]\n}\n)\n```\n\n我们在两个句子中标记了食品“corn”。这里我们只用了两个句子，spaCy 就能很好地训练模型。如果使用较小的数据集没有得到正确的实体，你可能需要添加更多示例，直到模型能够识别正确的实体。\n\
  \n```\nimport spacy\nimport random\ntrain_data = [\n(u\"As soon as I tasted one\
  \ and it tasted like a corn chip I checked the ingredients. \", {\"entities\": [(45,\
  \ 49, \"PRODUCT\")]}),\n(u\"I found these crisps at our local WalMart & figured\
  \ I would give them a try\", {\"entities\": [(14, 20, \"PRODUCT\")]})\n]\nother_pipes\
  \ = [pipe for pipe in nlp.pipe_names if pipe != \"ner\"]\nwith nlp.disable_pipes(*other_pipes):\n\
  optimizer = nlp.begin_training()\nfor i in range(10):\nrandom.shuffle(train_data)\n\
  for text, annotations in train_data:\nnlp.update([text], [annotations], sgd=optimizer)\n\
  nlp.to_disk(\"model/food_model\")\n```\n\n我们将训练好的模型保存到磁盘，并将其命名为 `food_model`。在下面的代码中，我们从磁盘加载\
  \ `food_model`，并尝试在测试句子上预测实体。我们看到它在将“corn”识别为 PRODUCT 实体方面做得很好。\n\n```\nimport spacy\n\
  nlp = spacy.load(\"model/food_model\")\ntext = nlp(\"I consume about a jar every\
  \ two weeks of this, either adding it to fajitas or using it as a corn chip dip\"\
  )\nfor entity in text.ents:\nprint(entity.text, entity.label_)\ncorn PRODUCT\n```\n\
  \n### CoreNLP\n\nCoreNLP 是另一个流行的语言分析工具包，用于词性标注、依存句法树、命名实体识别、情感分析等。我们将通过一个名为 Stanford-corenlp\
  \ 的第三方封装器从 Python 中使用 CoreNLP 功能。它可以通过命令行使用 `pip install` 安装，或者从 GitHub 克隆：[`https://github.com/Lynten/stanford-corenlp`](https://github.com/Lynten/stanford-corenlp)。\n\
  \n安装或下载代码后，你需要指定 Stanford-corenlp 代码的路径，以便它为各种 NLP 任务获取必要的模型。\n\n#### 分词\n\n与 NLTK\
  \ 和 spaCy 一样，你可以提取单词或标记。该模型提供了一个名为 `word_tokenize` 的方法来执行分词：\n\n```\n# 简单用法\nfrom\
  \ stanfordcorenlp import StanfordCoreNLP\nnlp = StanfordCoreNLP()\nsentence = 'I\
  \ consume about a jar every two weeks of this, either adding it to fajitas or using\
  \ it as a corn chip dip'\nprint('Tokenize:', nlp.word_tokenize(sentence))\nTokenize:\
  \ ['I', 'consume', 'about', 'a', 'jar', 'every', 'two', 'weeks', 'of', 'this', ',',\
  \ 'either', 'adding', 'it', 'to', 'fajitas', 'or', 'using', 'it', 'as', 'a', 'corn',\
  \ 'chip', 'dip']\n```\n\n#### 词性标注\n\n可以使用 stanford-corenlp 中的 `pos_tag` 方法提取词性：\n\
  \n```\nprint('Part of Speech:', nlp.pos_tag(sentence))\nPart of Speech: [('I', 'PRP'),\
  \ ('consume', 'VBP'), ('about', 'IN'), ('a', 'DT'), ('jar', 'NN'), ('every', 'DT'),\
  \ ('two', 'CD'), ('weeks', 'NNS'), ('of', 'IN'), ('this', 'DT'), (',', ','), ('either',\
  \ 'CC'), ('adding', 'VBG'), ('it', 'PRP'), ('to', 'TO'), ('fajitas', 'NNS'), ('or',\
  \ 'CC'), ('using', 'VBG'), ('it', 'PRP'), ('as', 'IN'), ('a', 'DT'), ('corn', 'NN'),\
  \ ('chip', 'NN'), ('dip', 'NN')]\n```\n\n#### 命名实体识别\n\nStanford-corenlp 提供了 `ner`\
  \ 方法来提取命名实体。注意，默认输出是 IOB（内部、外部和开始）格式。\n\n```\nprint('Named Entities:', nlp.ner(sentence))\n\
  Named Entities: [('I', 'O'), ('consume', 'O'), ('about', 'O'), ('a', 'O'), ('jar',\
  \ 'O'), ('every', 'SET'), ('two', 'SET'), ('weeks', 'SET'), ('of', 'O'), ('this',\
  \ 'O'), (',', 'O'), ('either', 'O'), ('adding', 'O'), ('it', 'O'), ('to', 'O'),\
  \ ('fajitas', 'O'), ('or', 'O'), ('using', 'O'), ('it', 'O'), ('as', 'O'), ('a',\
  \ 'O'), ('corn', 'O'), ('chip', 'O'), ('dip', 'O')]\n```\n\n#### 成分句法分析\n\n成分句法分析从给定句子中提取基于成分的句法树，该树根据短语结构语法表示句法结构。参见图\
  \ 5-13 的简单示例。\n\n```\nprint('Constituency Parsing:', nlp.parse(sentence))\nConstituency\
  \ Parsing: (ROOT\n(S\n(NP (PRP I))\n(VP (VBP consume)\n(PP (IN about)\n(NP (DT a)\
  \ (NN jar)))\n(NP\n(NP (DT every) (CD two) (NNS weeks))\n(PP (IN of)\n(NP (DT this))))\n\
  (, ,)\n(S\n(VP (CC either)\n(VP (VBG adding)\n(NP (PRP it))\n(PP (TO to)\n(NP (NNS\
  \ fajitas))))\n(CC or)\n(VP (VBG using)\n(NP (PRP it))\n(PP (IN as)\n(NP (DT a)\
  \ (NN corn) (NN chip) (NN dip)))))))))\n```\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig13_HTML.jpg](img/478492_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13\n\n成分句法分析的一个简单示例\n\n\n\n#### 依存句法分析\n\n依存句法分析旨在提取句子的句法结构。它展示了给定句子中词语之间存在的有向二元语法关系集合。在\
  \ spaCy 的依存树中，我们展示了其可视化表示。\n\n```\nprint('Dependency Parsing:', nlp.dependency_parse(sentence))\n\
  Dependency Parsing: [('ROOT', 0, 2), ('nsubj', 2, 1), ('case', 5, 3), ('det', 5,\
  \ 4), ('nmod', 2, 5), ('det', 8, 6), ('nummod', 8, 7), ('nmod:tmod', 2, 8), ('case',\
  \ 10, 9), ('nmod', 8, 10), ('punct', 2, 11), ('cc:preconj', 13, 12), ('dep', 2,\
  \ 13), ('dobj', 13, 14), ('case', 16, 15), ('nmod', 13, 16), ('cc', 13, 17), ('conj',\
  \ 13, 18), ('dobj', 18, 19), ('case', 24, 20), ('det', 24, 21), ('compound', 24,\
  \ 22), ('compound', 24, 23), ('nmod', 18, 24)]\n```\n\n由于 Stanford-corenlp 是一个基于\
  \ Java 实现的 Python 封装库，你应在处理完成后关闭服务器。否则，Java 虚拟内存（JVM）堆将被持续占用，从而影响你机器上的其他进程。\n\n\
  ```\nnlp.close() # 关闭服务器，否则会消耗大量内存。\n```\n\n### TextBlob\n\nTextBlob 是一个适合 NLP 初学者的简单库。尽管它提供了一些高级功能（如机器翻译），但这些功能是通过\
  \ Google API 实现的。它主要用于初步了解 NLP 的用例以及在通用数据集上的应用。对于更复杂的应用，请考虑使用 spaCy 或 CoreNLP。\n\
  \n#### 词性标注与名词短语\n\n与其他库类似，TextBlob 提供了 `tags` 方法来提取给定句子中的词性。它还提供了 `noun_phrase`\
  \ 方法。\n\n```\n#首先，导入\nfrom textblob import TextBlob\n#创建我们的第一个 TextBlob\ns_text\
  \ = TextBlob(\"Building Enterprise Chatbot that can converse like humans\")\n#可以通过\
  \ tags 属性访问词性标注\ns_text.tags\n[('Building', 'VBG'),\n('Enterprise', 'NNP'),\n('Chatbot',\
  \ 'NNP'),\n('that', 'WDT'),\n('can', 'MD'),\n('converse', 'VB'),\n('like', 'IN'),\n\
  ('humans', 'NNS')]\n#类似地，可以通过 noun_phrases 属性访问名词短语\ns_text.noun_phrases\nWordList(['enterprise\
  \ chatbot'])\n```\n\n#### 拼写纠正\n\n拼写纠正是 TextBlob 的一个令人兴奋的特性，本章描述的其他库并未提供此功能。其实现基于\
  \ Peter Norvig 提供的一种简单技术，准确率仅为 70%。TextBlob 中的 `correct` 方法提供了此实现。\n\n在以下代码中，单词\
  \ “converse” 被错误拼写为 “converce”，`correct` 方法能够正确识别。然而，它在将单词 “Chatbot” 改为 “Whatnot”\
  \ 时犯了错误。\n\n```\n# 拼写纠正\n# 使用 correct() 方法尝试拼写纠正。\n# 拼写纠正基于 Peter Norvig 的《如何编写拼写纠正器》，该算法在\
  \ pattern 库中实现，准确率约为 70%。\nb = TextBlob(\"Building Enterprise Chatbot that can converce\
  \ like humans. The future for chatbot looks great!\")\nprint(b.correct())\nBuilding\
  \ Enterprise Whatnot that can converse like humans. The future for charcot looks\
  \ excellent!\n```\n\n#### 机器翻译\n\n以下代码展示了一个将文本从英语翻译成法语的简单示例。`translates` 方法调用了 Google\
  \ 翻译 API，该方法接收一个参数 “to”，用于指定目标翻译语言。此实现并无新奇之处，只是一个简单的 API 调用。\n\n```\n#翻译与语言检测\n\
  # Google 翻译 API 为语言翻译和检测提供支持。\nen_blob = TextBlob(u'Building Enterprise Chatbot\
  \ that can converse like humans. The future for chatbot looks great!')\nen_blob.translate(to='fr')\n\
  TextBlob(\"Construire un chatbot d'entreprise capable de converser comme un humain.\
  \ L'avenir de chatbot est magnifique!\")\n```\n\n### 多语言文本处理\n\n在本节中，我们将探讨处理英语以外其他语言的各种库及其能力。我们发现\
  \ spaCy 库在支持的语言数量方面表现最佳，目前支持超过 50 种语言。我们将尝试对来自法国知名新闻网站 [`www.lemonde.fr/`](http://www.lemonde.fr/)\
  \ 的文本进行语言翻译、词性标注、实体提取和依存句法分析。\n\n#### 用于翻译的 TextBlob\n\n如上例所示，我们使用 TextBlob 进行机器翻译，以便非法语读者能够理解我们处理的文本。\n\
  \n文本的英文翻译显示，这条新闻是关于周五在罗兰·加洛斯举行的两位法国网球选手帕尔和马胡之间的比赛。\n\n```\nfrom textblob import\
  \ TextBlob\n#来自法国新闻网站的一条新闻简报：https://www.lemonde.fr/\nfr_blob = TextBlob(u\"Des\
  \ nouveaux matchs de Paire et Mahut au retour du service à la cuillère, tout ce\
  \ qu'il ne faut pas rater à Roland-Garros, sur les courts ou en dehors, ce vendredi.\"\
  )\nfr_blob.translate(to='en')\nTextBlob(\"New matches of Paire and Mahut after the\
  \ return of the service with the spoon, all that one should not miss Roland-Garros,\
  \ on the courts or outside, this Friday.\")\n```\n\n#### 词性标注与依存关系\n\n我们使用 spaCy\
  \ 的 `fr_core_news_sm` 模型来提取给定文本的词性标注和依存关系。要下载该模型，请在命令行中输入：\n\n```\npython -m spacy\
  \ download fr_core_news_sm\n```\n\n```\nimport spacy\n#下载：python -m spacy download\
  \ fr_core_news_sm\nnlp = spacy.load('fr_core_news_sm')\nfrench_text = nlp(\"Des\
  \ nouveaux matchs de Paire et Mahut au retour du service à la cuillère, tout ce\
  \ qu'il ne faut pas rater à Roland-Garros, sur les courts ou en dehors, ce vendredi.\"\
  )\nfor token in french_text:\nprint(token.text, token.pos_, token.dep_)\nDes DET\
  \ det\nnouveaux ADJ amod\nmatchs ADJ nsubj\nde ADP case\nPaire ADJ nmod\net CCONJ\
  \ cc\nMahut PROPN conj\nau CCONJ punct\nretour NOUN ROOT\ndu DET det\nservice NOUN\
  \ obj\nà ADP case\nla DET det\ncuillère NOUN obl\n, PUNCT punct\ntout ADJ advmod\n\
  ce PRON fixed\nqu' PRON mark\nil PRON nsubj\nne ADV advmod\nfaut VERB advcl\npas\
  \ ADV advmod\nrater VERB xcomp\nà ADP case\nRoland PROPN obl\n- PUNCT punct\nGarros\
  \ PROPN conj\n, PUNCT punct\nsur ADP case\nles DET det\ncourts NOUN obl\nou CCONJ\
  \ cc\nen ADP case\ndehors ADP conj\n, PUNCT punct\nce DET det\nvendredi NOUN obl\n\
  . PUNCT punct\n```\n\n它在法语词性标注和依存关系方面的表现非常准确。它能够识别几乎所有动词、名词、形容词、专有名词以及许多其他标签。接下来，让我们看看它在实体识别任务上的表现。\n\
  \n#### 命名实体识别\n\n检索命名实体识别的语法保持不变。我们在此看到，模型将 Paire、Mahur、Roland 和 Garros 识别为人物实体。我们期望模型给出事件实体，因为罗兰·加洛斯是一项网球锦标赛，属于体育赛事。或许你可以考虑训练一个自定义模型来提取这个实体。\n\
  \n```\n# 查找命名实体、短语和概念\nfor entity in french_text.ents:\nprint(entity.text, entity.label_)\n\
  Paire PER\nMahut PER\nRoland PER\nGarros PER\n```\n\n#### 名词短语\n\n可以使用 spaCy 库中法语模型提供的\
  \ `noun_chunks` 方法提取名词块：\n\n```\nfor fr_chunk in french_text.noun_chunks:\nprint(fr_chunk.text,\
  \ fr_chunk.root.text, fr_chunk.root.dep_,\nfr_chunk.root.head.text)\net Mahut Mahut\
  \ conj matchs\ndu service service obj retour\nil il nsubj faut\n```\n\n\n\n## 自然语言理解\n\
  \n近年来，工业界和学术界都对自然语言理解表现出了极大的兴趣。这导致了大量文献和工具的出现。NLU 的一些主要应用包括：\n\n*   问答系统\n*   自然语言搜索\n\
  *   网络级关系抽取\n*   情感分析\n*   文本摘要\n*   法律发现\n\n上述应用主要可以归纳为四个主题：\n\n*   **关系抽取**：寻找实例与数据库元组之间的关系。输出结果为离散值。\n\
  *   **语义解析**：解析句子以生成文本理解的逻辑形式，这是人类所擅长的。同样，此处的输出也是离散值。\n*   **情感分析**：分析句子，在连续值范围内给出一个分数。低分表示轻微负面情绪，高分表示正面情绪。\n\
  *   **向量空间模型**：将单词表示为向量，这有助于寻找相似单词和上下文含义。\n\n在本节中，我们将探讨上述部分应用。\n\n### 情感分析\n\nTextBlob\
  \ 提供了一个易于使用的情感分析实现。`sentiment` 方法将句子作为输入，并输出两个结果：极性（polarity）和主观性（subjectivity）。\n\
  \n#### 极性\n\n一个在 [-1.0, 1.0] 范围内的浮点值。该评分使用一个包含正面、负面和中性词汇的语料库（称为极性），并检测单词是否属于这三个类别中的任何一个。在一个简单的例子中，正面词汇得分为\
  \ 1，负面词汇得分为 -1，中性词汇得分为 0。我们将句子的极性定义为平均得分，即每个单词得分之和除以句子中的总单词数。\n\n如果该值小于 0，则句子情感为负面；如果大于\
  \ 0，则为正面；否则为中性。\n\n#### 主观性\n\n一个在 [0.0, 1.0] 范围内的浮点值。完美得分 1 表示“非常主观”。与揭示句子情感的极性不同，主观性不表达任何情感。如果句子包含个人观点或信念，得分趋向于\
  \ 1。整个句子的最终得分是通过为每个单词分配主观性得分并计算平均值得到的，方法与极性相同。\n\nTextBlob 库内部调用 pattern 库来计算句子的极性和主观性。pattern\
  \ 库使用 [SentiWordNet](http://sentiwordnet.isti.cnr.it/)，这是一个用于意见挖掘的词汇资源，包含了所有 WordNet\
  \ 同义词集的极性和主观性得分。以下是 SentiWordNet 的链接：[`https://github.com/aesuli/sentiwordnet`](https://github.com/aesuli/sentiwordnet)\
  \ 。\n\n在下面的例子中，句子的极性为 0.5，表示“更正面”，主观性为 0.4375，表示“非常主观”。\n\n```\ns_text = TextBlob(\"\
  Building Enterprise Chatbot that can converse like humans. The future for chatbot\
  \ looks great!\")\ns_text.sentiment\nSentiment(polarity=0.5, subjectivity=0.4375)\n\
  ```\n\n### 语言模型\n\n任何 NLP 建模的首要任务是将给定的文本片段分解为标记（或单词），这是任何语言中句子的基本单位。有了单词之后，我们希望找到单词的最佳数值表示，因为机器不理解单词，它们需要数值来进行计算。我们将讨论两种模型：Word2Vec（词到向量）和\
  \ GloVe（用于词表示的全局向量）。关于 Word2Vec，将在下一节中提供详细解释。\n\n#### Word2Vec\n\nWord2Vec 是一种机器学习模型（使用神经网络在大量词汇上进行训练），它生成词嵌入，即词汇表中单词的向量表示。Word2Vec\
  \ 模型被训练用于构建单词的语言上下文。我们将使用 Python 中的 gensim 库来看一些例子，以理解语言上下文的含义。图 5-14 展示了用于训练 Word2Vec\
  \ 模型的神经网络架构。\n\n![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig14_HTML.png](img/478492_1_En_5_Fig14_HTML.png)\n\
  \n图 5-14\n\n使用窗口大小为 2 为神经网络生成训练样本\n\n用于 Word2Vec 的 skip-gram 神经网络模型会计算词汇表中每个单词成为我们选择的“附近单词”的概率。单词的邻近程度可以通过一个称为窗口大小的参数来定义。图\
  \ 5-14 展示了使用窗口大小为 2 训练神经网络时可能的单词对。\n\n可以使用任何一种工具来生成这样的 n-gram。在下面的代码中，我们使用 Python\
  \ 中的 TextBlob 库来生成窗口大小为 2 的 n-gram。\n\n```\n#n-grams\n#TextBlob.ngrams() 方法返回一个由\
  \ n 个连续单词组成的元组列表。\n#首先，导入\nfrom textblob import TextBlob\nblob = TextBlob(\"Building\
  \ an enterprise chatbot that can converse like humans\")\nblob.ngrams(n=2)\n[WordList(['Building',\
  \ 'an']),\nWordList(['an', 'enterprise']),\nWordList(['enterprise', 'chatbot']),\n\
  WordList(['chatbot', 'that']),\nWordList(['that', 'can']),\nWordList(['can', 'converse']),\n\
  WordList(['converse', 'like']),\nWordList(['like', 'humans'])]\n```\n\n在输入句子“Building\
  \ an enterprise chatbot that can converse like humans”中，它被分解成单词，并且使用窗口大小为 2，我们从输入单词的左右两侧各取两个单词。因此，如果输入单词是“chatbot”，那么单词“enterprise”的输出概率会很高，因为它在窗口大小为\
  \ 2 的范围内与单词“chatbot”邻近。这只是一个示例句子。在给定的词汇表中，我们会有成千上万个这样的句子；神经网络将从每个配对出现的次数中学习统计规律。因此，如果我们提供更多像图\
  \ 5-14 中所示的训练样本，它将能够计算出单词“chatbot”和“enterprise”同时出现的可能性有多大。\n\n\n\n#### 神经网络架构\n\
  \n神经网络的输入向量是一个独热向量，用于表示输入词“chatbot”，方法是在向量的第 i 个位置存储 **1**，在所有其他位置存储 **0**，其中 0\
  \ ≤ *i* ≤ *n*，n 是词汇表（所有唯一词的集合）的大小。\n\n在隐藏层中，每个大小为 **n** 的词向量会与一个特征向量相乘，假设该特征向量的大小为\
  \ **1000**。训练开始时，大小为 **1000** 的特征向量中的所有值都会被随机赋值。相乘的结果将选择 **n x 1000 矩阵**中与独热向量值为\
  \ 1 的位置相对应的那一行。\n\n最后，在输出层，会应用像 softmax 这样的激活函数，将输出值压缩到 0 到 1 之间。以下公式表示了 softmax\
  \ 函数，其中 K 是输入向量的大小：\n\n![$$ \\sigma {(z)}_i=\\frac{e^{z_i}}{\\sum \\limits_{j=1}^K{e}^{z_j}},\
  \ $$](img/478492_1_En_5_Chapter_TeX_Equa.png)\n\n![$$ for\\ i=1,\\dots, K\\ and\\\
  \ z=\\left({z}_1,\\dots, {z}_k\\right)\\in {\\mathbb{R}}^K $$](img/478492_1_En_5_Chapter_TeX_Equb.png)\n\
  \n因此，如果表示“chatbot”的输入向量与表示“enterprise”的输出向量相乘，softmax 函数的结果将接近 1，因为在我们的词汇表中，这两个词经常同时出现。\n\
  \n神经网络通过多次迭代训练来训练网络并更新边的权重。最终的权重集合代表了学习成果。图 5-15 展示了用于训练 Word2Vec 模型的神经网络架构。\n\n\
  ![../images/478492_1_En_5_Chapter/478492_1_En_5_Fig15_HTML.jpg](img/478492_1_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15\n\n用于训练 Word2Vec 模型的神经网络架构\n\n#### 使用预训练的 Word2Vec 模型\n\n在以下代码中，我们使用来自一个名为\
  \ gensim 的常用 Python 库的预训练 Word2Vec 模型。Word2Vec 模型提供了词的向量表示，使得各种自然语言任务成为可能，例如识别相似词、查找同义词、词向量运算等等。最流行的\
  \ Word2Vec 模型包括 GloVe、CBOW 和 skip-gram。在本节中，我们将使用所有这三个模型来执行 NLU 的各种任务。\n\n在演示中，我们使用该模型来执行许多句法/语义层面的\
  \ NLU 词汇任务。\n\n**步骤 1：** 加载所需的库：\n\n```\nfrom gensim.test.utils import get_tmpfile\n\
  from gensim.models import Word2Vec\nimport gensim.models\n```\n\n**步骤 2：** 从亚马逊食品评论中挑选一些词并创建一个列表：\n\
  \n```\nreview_texts = [['chips', 'WalMart', 'fajitas'],\n['ingredients', 'tasted',\
  \ 'crisps', 'Chilling', 'fridge', 'nachos'],\n['tastebuds', 'tortilla', 'Mexican',\
  \ 'baking'],\n['toppings', 'goodness', 'product, 'fantastic']]\n```\n\n**步骤 3：**\
  \ 训练 Word2Vec 模型并将模型保存到临时路径。函数 `Word2Vec` 在提供给它的输入词汇表上训练神经网络。以下是各个参数的含义：\n\n*  \
  \ `review_texts`：输入给神经网络（NN）的词汇表。\n\n*   `size`：神经网络层的大小，对应于算法拥有的自由度。通常，网络越大越准确，前提是有足够大的数据集进行训练。建议的范围在十到数千之间。\n\
  \n*   `min_count`：此参数有助于从词汇表中修剪掉不太重要的词，例如在数百万词的语料库中只出现一两次的词。\n\n*   `workers`：函数\
  \ `Word2Vec` 提供了训练并行化的功能，这可以显著加快训练过程。根据 gensim 的官方文档，你需要安装 Cython 才能以并行化模式运行。\n\n\
  ```\npath = get_tmpfile(\"word2vec.model\")\nmodel = Word2Vec(review_texts, size=100,\
  \ window=5, min_count=1, workers=4)\nmodel.save(\"word2vec.model\")\n```\n\n###\
