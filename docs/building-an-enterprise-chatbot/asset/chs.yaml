  ```\n\n#### 生成文本\n\n现在，利用模型，我们可以根据给定的种子文本预测下一个单词。在下面的示例中，种子文本是“signing like”，我们要求预测接下来的三个单词。结果接近我们的预期。不过，模型预测的是“jackson”，而不是“janet”。请注意，我们只用了少量数据样本来训练模型。更多的数据将进一步提升性能。正如我们在训练过程中观察到的，100\
  \ 个 epoch 结束时的训练准确率保持在 29%，这个数值并不算高。\n\n```\ntext = generate_text(\"singing like\"\
  , 3, max_len, model)\nprint(text)\nsinging like jackson jackson the\n```\n\n## 应用\n\
  \n在本节中，我们将利用目前已掌握的知识，构建以下四个 NLP 应用：\n\n*   **使用 spaCy、NLTK 和 gensim 库进行主题建模：** 这是本章前面使用\
  \ LDA 进行主题建模的扩展。在此演示中，我们将结合使用 spaCy、NLTK 和 gensim 的知识，在主题建模中执行各种任务。\n\n*   **通过人名区分男性和女性性别：**\
  \ 利用名字的最后一个字母等特征，以及男性和女性名字的语料库，我们将对男性和女性名字进行分类。这可能有助于筛选评论，并识别产品评论中任何基于性别的差异。\n\n\
  *   **给定文档，将其分类到不同类别：** 将评论分为正面和负面。我们将使用 NLTK 库，通过朴素贝叶斯分类器执行预处理和分类。\n\n*   **意图分类与问答：**\
  \ 在此应用中，我们将构建一个意图分类器和基于上下文的问答工具，该工具可与任何聊天机器人应用集成。我们将使用 Python 中的 DeepPavLov 库提供的预训练深度学习模型。\n\
  \n### 使用 spaCy、NLTK 和 gensim 库进行主题建模\n\n在演示中，我们将使用 spaCy 对评论文本进行分词，使用 NLTK 进行词形还原和文本预处理，并使用\
  \ gensim 中的 LDA 模型来训练模型。\n\n#### 分词与文本清洗\n\n使用 spaCy 中的 `en_core_web_md` 语言模型（这是一个比\
  \ `sm` 稍大的预训练模型，意味着它在更大的词汇量上进行了训练），我们将在清洗过程中对每个词元执行以下操作：\n\n1.  检测 URL 和屏幕名称，并将它们分别追加到\
  \ `lda_review_tokens` 列表中。这是为了确保 URL 和屏幕名称不会被进一步处理。\n\n2.  将其余词元转换为小写。\n\n```\n\
  # Clean\nimport spacy\nspacy.load('en_core_web_md')\nfrom spacy.lang.en import English\n\
  parser = English()\ndef tokenize_review_text(text):\nlda_review_tokens = []\nreview_tokens\
  \ = parser(text)\nfor token in review_tokens:\nif token.orth_.isspace():\ncontinue\n\
  elif token.like_url:\nlda_review_tokens.append('URL')\nelif token.orth_.startswith('@'):\n\
  lda_review_tokens.append('SCREEN_NAME')\nelse:\nlda_review_tokens.append(token.lower_)\n\
  return lda_review_tokens\n```\n\n#### 词形还原\n\n使用 `wordnet` 方法，返回每个单词的词元。词形还原只保留单词的词根，而不是其不同形式。\n\
  \n```\nimport nltk\nnltk.download('wordnet')\nfrom nltk.corpus import wordnet as\
  \ wordNet\ndef get_lemma(word):\nlemma = wordNet.morphy(word)\nif lemma is None:\n\
  return word\nelse:\nreturn lemma\n```\n\n\n\n#### LDA 文本预处理方法\n\n在预处理步骤中，我们执行以下功能：\n\
  \n1.  移除英语词汇中的所有停用词。我们需要先下载名为 `stopwords` 的数据集，才能检查词元中是否包含它们。\n\n2.  移除停用词后，提取每个词元的词元（lemma）。\n\
  \n以下代码展示了样本文本的预处理结果：\n\n```\nfrom nltk.stem.wordnet import WordNetLemmatizer\ndef\
  \ get_lemma2(word):\nreturn WordNetLemmatizer().lemmatize(word)\n# 移除英语停用词\nnltk.download('stopwords')\n\
  en_stop = set(nltk.corpus.stopwords.words('english'))\ndef preprocess_text_for_lda(input_review_text):\n\
  tokens = tokenize_review_text(input_review_text)\ntokens = [token for token in tokens\
  \ if len(token) > 4]\ntokens = [token for token in tokens if token not in en_stop]\n\
  tokens = [get_lemma(token) for token in tokens]\nreturn tokens\npreprocess_text_for_lda(\"\
  I consume about a jar every two weeks of this, either adding it to fajitas or using\
  \ it as a corn chip dip\")\n['consume', 'every', 'week', 'either', 'add', 'fajitas',\
  \ 'using']\n```\n\n#### 读取训练数据\n\n我们读取名为 `corn_review.txt` 的评论文件，该文件包含亚马逊美食评论数据集中与“玉米”相关产品的一些样本评论。以下代码打印了从文件中预处理评论后的前几条评论：\n\
  \n```\nreview_text_data = []\nwith open('data/corn_review.txt') as f:\nfor line\
  \ in f:\ntokens = preprocess_text_for_lda(line)\nprint(tokens)\nreview_text_data.append(tokens)\n\
  ['consume', 'every', 'week', 'either', 'add', 'fajitas', 'using']\n['taste', 'taste',\
  \ 'check', 'ingredient']\n['found', 'crisp', 'local', 'walmart', 'figure', 'would']\n\
  ...\n```\n\n#### 词袋模型\n\n现在，我们使用 gensim 库，将上一步处理后的评论文本转换为词袋语料库，并将其作为 pickle 文件存储在磁盘上。之后，我们加载该文件并训练\
  \ LDA 模型。同时，我们保存使用 `corpora.Dictionary` 创建的词典。\n\n```\n#LDA gensim\nfrom gensim\
  \ import corpora\ncorn_review_dict = corpora.Dictionary(review_text_data)\ncorn_review_corpus\
  \ = [corn_review_dict.doc2bow(text) for text in review_text_data]\nimport pickle\n\
  pickle.dump(corpus, open('corn_review_corpus.pkl', 'wb'))\ndictionary.save('corn_review_dict.gensim')\n\
  ```\n\n#### 训练并保存模型\n\n最后，我们使用 gensim 中的 `ldamodel` 训练模型，生成五个主题，并将模型保存到磁盘以供后续使用。请注意，模型通过词语及其在决定主题时的权重来呈现主题表示。\n\
  \n```\nimport gensim\nnumber_of_topics = 5\ncorn_review_ldamodel = gensim.models.ldamodel.LdaModel(corn_review_corpus,\
  \ num_topics = number_of_topics, id2word=corn_review_dict, passes=15)\ncorn_review_ldamodel.save('corn_review_ldamodel.gensim')\n\
  topics = corn_review_ldamodel.print_topics(num_words=4)\nfor topic in topics:\n\
  print(topic)\n(0, '0.020*\"ginger\" + 0.018*\"flavor\" + 0.015*\"recipe\" + 0.015*\"\
  syrup\"')\n(1, '0.021*\"chips\" + 0.014*\"tortilla\" + 0.014*\"flavor\" + 0.014*\"\
  rather\"')\n(2, '0.016*\"using\" + 0.016*\"add\" + 0.016*\"fajitas\" + 0.016*\"\
  consume\"')\n(3, '0.003*\"ginger\" + 0.003*\"vernor\" + 0.003*\"taste\" + 0.003*\"\
  sugar\"')\n(4, '0.034*\"taste\" + 0.019*\"check\" + 0.019*\"ingredient\" + 0.003*\"\
  product\"')\n```\n\n从上面的输出来看，主题 0 和主题 3 似乎与“姜味玉米糖浆”有关，而主题 2 和主题 4 所传达的含义则不太明确。此外，主题\
  \ 1 提到了“玉米片”。\n\n#### 预测\n\n现在，我们使用上述模型，看看它在处理新文本时的表现如何。为了预测主题，我们需要先对语料库进行预处理，并将其转换为词袋表示。从预测结果来看，第一个示例与主题\
  \ 0 更相关，其概率最高。此外，第二个示例提到了“玉米片”，这由上面的主题 1 表示。\n\n```\n#预测\nnew_doc = 'Corn is typically\
  \ yellow but comes in a variety of other colors, such as red, orange, purple, blue,\
  \ white, and black.'\nnew_doc = preprocess_text_for_lda(new_doc)\nnew_doc_bow =\
  \ corn_review_dict.doc2bow(new_doc)\nprint(new_doc_bow)\nprint(corn_review_ldamodel.get_document_topics(new_doc_bow))\n\
  [(100, 1), (219, 1)]\n[(0, 0.73304677), (1, 0.066701755), (2, 0.0667417), (3, 0.066757984),\
  \ (4, 0.066751845)]\nnew_doc = 'corn tortilla or just tortilla is a type of thin,\
  \ unleavened flatbread'\nnew_doc = preprocess_text_for_lda(new_doc)\nnew_doc_bow\
  \ = corn_review_dict.doc2bow(new_doc)\nprint(new_doc_bow)\nprint(corn_review_ldamodel.get_document_topics(new_doc_bow))\n\
  [(230, 2)]\n[(0, 0.06699851), (1, 0.73296124), (2, 0.066678636), (3, 0.06668124),\
  \ (4, 0.06668032)]\n```\n\n### 性别识别\n\n在此应用中，我们使用一个包含男性和女性名字的语料库来构建一个模型，用于根据给定姓名预测性别。这是一个简单的模型，唯一的特征是名字的最后一个字母。其核心思想是，女性和男性的名字通常表现出某些独特的特征。例如，大多数女性名字以\
  \ a、e 和 i 结尾。我们使用 NLTK 库来构建此模型。\n\n#### 加载 NLTK 库并下载名字语料库\n\n从 NLTK 库下载男性和女性名字语料库。该语料库主要由英语名字组成。该模型是通用的，也适用于非英语名字。但是，请注意，我们提取的特征可能不适用于所有名字。\n\
  \n```\nimport nltk\nnltk.download('names')\n[nltk_data] Downloading package names\
  \ to\n[nltk_data]     C:\\Users\\KARTHIK\\AppData\\Roaming\\nltk_data...\n[nltk_data]\
  \   Unzipping corpora\\names.zip.\n```\n\n#### 加载男性和女性名字\n\n下载完成后，我们分别创建男性和女性名字的列表，以便进一步处理。\n\
  \n```\nnames = nltk.corpus.names\nnames.fileids()\nmale_names = names.words('male.txt')\n\
  female_names = names.words('female.txt')\n```\n\n#### 常见名字\n\n我们可以打印一些在男性和女性语料库中都存在的常见名字，例如\
  \ Abbie、Andy 和 Barrie。\n\n```\n#常见名字\nprint([w for w in male_names if w in female_names])\n\
  ['Abbey', 'Abbie', 'Abby', 'Addie', 'Adrian', 'Adrien', 'Ajay', 'Alex', 'Alexis',\
  \ 'Alfie', 'Barrie', 'Ariel', 'Allie', 'Angel', 'Angie', 'Andrea', 'Andy', 'Allyn',\
  \ 'Andie', 'Alix', 'Ashley', 'Aubrey', 'Augustine', 'Austin', 'Averil', 'Ali', 'Barry',\
  \ 'Beau', 'Bennie', 'Benny',...]\n```\n\n#### 提取特征\n\n作为模型的一个特征，我们提取每个名字的最后一个字母。通常，名字的最后一个字母是判断一个人性别的一个良好指标。我们将在模型的输出中进一步看到，名字的最后一个字母在性别预测模型中如何发挥重要作用。\n\
  \n```\ndef gender_features(word):\nreturn {'last_letter': word[-1]}\ngender_features('Shrek')\n\
  {'last_letter': 'k'}\n```\n\n#### 随机拆分为训练集和测试集\n\n现在我们训练模型。我们将男性和女性名字语料库拆分为训练集和测试集。拆分是在使用\
  \ Python 的 `random` 库随机打乱名字后进行的。从生成的语料库中，我们将前 500 个名字分配给训练集，接下来的 500 个名字分配给测试集。\n\
  \n```\nfrom nltk.corpus import names\nlabeled_names = ([(name, 'male') for name\
  \ in names.words('male.txt')] + [(name, 'female') for name in names.words('female.txt')])\n\
  import random\nrandom.shuffle(labeled_names)\nfeaturesets = [(gender_features(n),\
  \ gender) for (n, gender) in labeled_names]\ntrain_set, test_set = featuresets[500:],\
  \ featuresets[:500]\n```\n\n\n\n#### 训练模型\n\n我们使用朴素贝叶斯（NB）分类器在训练数据集上训练模型。NB 基于贝叶斯定理，根据给定名字是男性还是女性来计算先验概率和后验概率。关于\
  \ NB 的讨论超出了本书的范围。感兴趣的读者可以参考以下链接中的 NLTK 文档，其中解释了实现方法：[`www.nltk.org/_modules/nltk/classify/naivebayes.html`](http://www.nltk.org/_modules/nltk/classify/naivebayes.html)。\n\
  \n```\nclassifier = nltk.NaiveBayesClassifier.train(train_set)\n```\n\n#### 模型预测\n\
  \n使用上面构建的模型，我们预测一些名字（如 John 和 Sascha）的性别。此外，我们尝试一些常见的名字，看看模型预测它们属于哪个类别。\n\n```\n\
  classifier.classify(gender_features('John'))\n'male'\nclassifier.classify(gender_features('Sascha'))\n\
  'female'\n```\n\n#### 模型准确率\n\n该模型的准确率似乎达到了 81.6%，这是一个相当不错的模型。如果我们希望预测更精确，需要加入更多特征。\n\
  \n```\nprint(nltk.classify.accuracy(classifier, test_set))\n0.816\n```\n\n#### 最具信息量的特征\n\
  \n使用模型中的 `show_most_informative_features()` 方法，我们可以看出名字的哪些最后一个字母对于区分男性和女性名字至关重要。\n\
  \n观察以下输出，以 **a** 作为最后一个字母的名字是女性的可能性几乎是男性的 36 倍，而以 **k** 作为最后一个字母的名字是男性的可能性是女性的 32\
  \ 倍。该模型的准确率超过 80%。\n\n```\nclassifier.show_most_informative_features(5)\nMost Informative\
  \ Features\nlast_letter = 'a'          female : male =     35.7 : 1.0\nlast_letter\
  \ = 'k'          male : female =     32.0 : 1.0\nlast_letter = 'p'          male\
  \ : female =     19.7 : 1.0\nlast_letter = 'f'          male : female =     15.8\
  \ : 1.0\nlast_letter = 'v'          male : female =      9.8 : 1.0\n```\n\n### 文档分类\n\
  \nNLP 中的一个常见任务是将文档（也可以是句子集合）标记到特定类别。例如，新闻聚合器将文章分类为政治、体育和商业。当存在大量非结构化的文本数据，且没有人工进行标记时，这种分类非常有用。自动文档分类器可以加速标记过程。另一个应用领域是将电影和产品评论分类为正面和负面情感。\n\
  \n#### 加载库\n\n我们将使用 NLTK 库中的 `CategorizedPlaintextCorpusReader` 方法来创建一个包含类别信息的评论语料库。\n\
  \n```\nimport os\nimport random\nfrom nltk.corpus.reader.plaintext import CategorizedPlaintextCorpusReader\n\
  ```\n\n#### 将数据集读入分类语料库\n\n我们创建了两组评论：负面和正面。每条正面和负面评论都存储在单独的文本文件中，文件名如 `1_neg.txt`\
  \ 和 `1_pos.txt`，并放入一个公共文件夹中。以下代码读取每个文件，并将评论分类为“pos”（正面）或“neg”（负面）。每个类别有 10 个文本文件。这些数据存储为\
  \ `CategorizedPlaintextCorpusReader`。\n\n```\n# Directory of the corpus\ncorpusdir\
  \ = 'corpus/'\nreview_corpus = CategorizedPlaintextCorpusReader(corpusdir, r'.*\\\
  .txt', cat_pattern=r'\\d+_(\\w+)\\.txt')\n# list of documents(fileid) and category\
  \ (pos/neg)\ndocuments = [(list(review_corpus.words(fileid)), category)\nfor category\
  \ in review_corpus.categories()\nfor fileid in review_corpus.fileids(category)]\n\
  random.shuffle(documents)\nfor category in review_corpus.categories():\nprint(category)\n\
  output:\nneg\npos\ntype(review_corpus)\nnltk.corpus.reader.plaintext.CategorizedPlaintextCorpusReader\n\
  len(documents)\n\n```\n\n#### 计算词频\n\n现在我们使用 NLTK 的 `FreqDist()` 方法统计给定语料库中每个单词出现的频率。以下代码按出现频率降序打印前\
  \ 200 个单词：\n\n```\nimport nltk\nall_words = nltk.FreqDist(w.lower() for w in review_corpus.words())\n\
  word_features = list(all_words)[:200]\nprint(word_features)\n['warning', '!', '-',\
  \ 'alcohol', 'sugars', '!,\"', 'buyer', 'beware', 'please', 'this', 'sweetener',\
  \ 'is', 'not', 'for', 'everybody', '.', 'maltitol', 'an', 'sugar', 'and', 'can',\
  \ 'be', 'undigestible', 'in', 'the', 'body', 'you', 'will', 'know', 'a', 'short',\
  \ 'time', 'after', 'consuming', 'it', 'if', 'are', 'one', 'of', 'unsuspecting',\
  \ 'many', 'who', 'cannot', 'digest', 'by', 'extreme', 'intestinal', 'bloating',\
  \ 'cramping', 'massive', 'amounts', 'gas', 'person', 'experience', 'nausea', ',',\
  \ 'diarrhea', '&', 'headaches', 'also', 'experienced', 'i', 'learned', 'my', 'lesson',\
  \ 'hard', 'way', 'years', 'ago', 'when', 'fell', 'love', 'with', 'free', 'chocolates',\
  \ 'suzanne', 'sommers', 'used', 'to', 'sell', 'thought', \"'\", 'd', 'found', 'chocolate',\
  \ 'nirvana', 'at', 'first', 'taste', 'but', 'bliss', 'was',..]\n```\n\n#### 检查高频词是否存在\n\
  \n我们定义了一个名为 `document_features()` 的方法，该方法检查之前读取的负面和正面评论文本文件中是否存在某个高频词。如果找到，打印语句将输出该词。\n\
  \n```\n#Check whether most frequent word is present in the doc or not\ndef document_features(document):\n\
  document_words = set(document)\nfeatures = {}\nfor word in word_features:\nfeatures['contains({})'.format(word)]\
  \ = (word in document_words)\nreturn features\nprint(document_features(review_corpus.words('1_pos.txt')))\n\
  {'contains(warning)': False, 'contains(!)': False, 'contains(-)': False, 'contains(alcohol)':\
  \ False, 'contains(sugars)': False, 'contains(!,\")': False, 'contains(buyer)':\
  \ False,...}\nprint(document_features(review_corpus.words('1_neg.txt')))\n{'contains(warning)':\
  \ False, 'contains(!)': False, 'contains(-)': False, 'contains(alcohol)': False,\
  \ 'contains(sugars)': False, 'contains(!,\")': False,...}\n```\n\n#### 训练模型\n\n\
  我们随机选取 15 个文档用于训练，5 个用于测试。然后使用朴素贝叶斯分类器进行分类。我们还打印了测试数据和训练数据的准确率。测试准确率似乎很低，只有 20%，训练准确率为\
  \ 67%。增加训练数据量可以提高准确率。\n\n```\nfeaturesets = [(document_features(d), c) for (d,c)\
  \ in documents]\ntrain_set, test_set = featuresets[5:], featuresets[:5]\nclassifier\
  \ = nltk.NaiveBayesClassifier.train(train_set)\nprint(nltk.classify.accuracy(classifier,\
  \ test_set))\n0.2\nprint(nltk.classify.accuracy(classifier, train_set))\n0.6666666666666666\n\
  ```\n\n\n\n#### 最具信息量的特征\n\n同样，使用模型中的 `show_most_informative_features` 方法，我们可以检查哪些词语更有可能决定一条评论是负面还是正面。这为评论被分类为负面或正面提供了解释。\n\
  \n```\nclassifier.show_most_informative_features(5)\nMost Informative Features\n\
  contains(not) = True            neg : pos    =      5.2 : 1.0\ncontains(this) =\
  \ False           neg : pos    =      5.2 : 1.0\ncontains(like) = True         \
  \   neg : pos    =      4.3 : 1.0\ncontains(not) = False           pos : neg   \
  \ =      4.0 : 1.0\ncontains(this) = True            pos : neg    =      4.0 : 1.0\n\
  contains(so) = True            neg : pos    =      3.3 : 1.0\ncontains(me) = True\
  \            neg : pos    =      3.3 : 1.0\ncontains(good) = True            neg\
  \ : pos    =      2.6 : 1.0\ncontains(have) = True            neg : pos    =   \
  \   2.6 : 1.0\ncontains(much) = True            neg : pos    =      2.4 : 1.0\n\
  ```\n\n在这个语料库中，提到 **“not”** 的评论是负面的可能性几乎是正面的五倍，而提到 **“good”** 的评论是负面的可能性仅为正面的三倍左右。也许“good”这个词的负面倾向源于那些评论内容为“产品不错，但是……”的客户，他们可能有一两个抱怨。\n\
  \n如果我们向这个正面和负面评论的语料库中添加更多评论，准确率将会开始提升。\n\n### 意图分类与问答\n\n一个聊天机器人应良好执行的两个最重要的 NLU\
  \ 任务是：对给定用户查询的意图进行分类，以及通过理解上下文来回答问题。虽然围绕这两个任务有许多专有框架，但它们无法提供幕后情况的可见性。在本节中，我们将使用一个名为\
  \ `deeppavlov` 的 Python 库。这是一个用于端到端对话系统和聊天机器人的开源深度学习库。该库提供了许多预训练的深度学习模型作为其产品的一部分。\n\
