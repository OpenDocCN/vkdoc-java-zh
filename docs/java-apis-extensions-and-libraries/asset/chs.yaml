  \ {\nreturn \"JKScript\";\n}\n@Override\npublic String getLanguageVersion() {\n\
  return \"1.0\";\n}\n@Override\npublic Object getParameter(String key) {\nswitch\
  \ (key) {\ncase ScriptEngine.ENGINE:\nreturn getEngineName();\ncase ScriptEngine.ENGINE_VERSION:\n\
  return getEngineVersion();\ncase ScriptEngine.NAME:\nreturn getEngineName();\ncase\
  \ ScriptEngine.LANGUAGE:\nreturn getLanguageName();\ncase ScriptEngine.LANGUAGE_VERSION:\n\
  return getLanguageVersion();\ncase \"THREADING\":\nreturn \"MULTITHREADED\";\ndefault:\n\
  return null;\n}\n}\n@Override\npublic String getMethodCallSyntax(String obj, String\
  \ m, String[] p) {\nreturn \"Not implemented\";\n}\n@Override\npublic String getOutputStatement(String\
  \ toDisplay) {\nreturn \"Not implemented\";\n}\n@Override\npublic String getProgram(String[]\
  \ statements) {\nreturn \"Not implemented\";\n}\n@Override\npublic ScriptEngine\
  \ getScriptEngine() {\nreturn new JKScriptEngine(this);\n}\n}\n清单 9-27.\nJKScript\
  \ 脚本引擎的 ScriptEngineFactory 实现\n```\n\n### 打包 JKScript 文件\n\n要让其他人使用你的 JKScript\
  \ 引擎，你只需提供 `jdojo.jkscript` 模块的模块化 JAR 文件即可。该模块化 JAR 文件包含在本书的源代码中，位于 `Java9APIsAndModules\\\
  dist\\jdojo.jkscript.jar`。\n\n### 使用 JKScript 脚本引擎\n\n现在是时候测试你的 JKScript 脚本引擎了。第一步也是最重要的一步，是将你在上一节创建的\
  \ `jdojo.jkscript.jar` 添加到应用程序的模块路径中。之后，使用 JKScript 脚本引擎与使用任何其他脚本引擎并无区别。\n\n以下代码片段使用\
  \ `JKScript` 作为名称创建了 JKScript 脚本引擎的一个实例。你也可以使用它的其他名称：`jks` 和 `jkscript`。\n\n```\n\
  // 创建 JKScript 引擎\nScriptEngineManager manager = new ScriptEngineManager();\nScriptEngine\
  \ engine = manager.getEngineByName(\"JKScript\");\nif (engine == null) {\nSystem.out.println(\"\
  JKScript 引擎不可用。\");\nSystem.out.println(\"请将 jkscript.jar 添加到 CLASSPATH。\");\n}\
  \ else {\n// 评估你的 JKScript\n}\n```\n\n清单 9-28 包含一个程序，该程序使用 JKScript 脚本引擎来评估不同类型的表达式。存储在\
  \ `String` 对象和文件中的表达式都会被执。一些表达式使用数字字面量，另一些则使用绑定变量，这些变量的值通过引擎默认 `ScriptContext` 的引擎作用域和全局作用域中的绑定传递。请注意，此程序期望在当前目录下存在一个名为\
  \ `jkscript.txt` 的文件，该文件包含一个 `JKScript` 脚本引擎能够理解的算术表达式。如果该脚本文件不存在，程序会在标准输出上打印一条消息，其中包含期望的脚本文件路径。最后一行输出可能有所不同。\n\
  \n\n\n```\n// JKScriptTest.java\npackage com.jdojo.script;\nimport java.io.FileNotFoundException;\n\
  import java.io.IOException;\nimport java.io.Reader;\nimport java.nio.file.Files;\n\
