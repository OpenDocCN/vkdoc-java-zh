  \ `JFrame` 的标题栏。当您展开 `JFrame` 时，您会看到如图 1-44 所示的屏幕。请注意，您的两个按钮都在 `JFrame` 中。但是，它们重叠了。最简单的\
  \ `SpringLayout` 示例可能是编码最简单的；然而，看到结果却并不那么简单。\n\n![A323071_2_En_1_Fig44_HTML.jpg](img/A323071_2_En_1_Fig44_HTML.jpg)\n\
  \n图 1-44.\n\n运行 SimplestSpringLayout 类并展开 JFrame 后\n\n那么，您最简单的 `SpringLayout` 示例出了什么问题？我之前提到过\
  \ `SpringLayout` 很难手动编码，现在您看到了！您在框架上使用了 `pack()` 方法来为其提供最佳大小。但是您的框架显示时没有显示区域。当您使用\
  \ `SpringLayout` 时，您必须为所有组件和容器指定 x、y、宽度和高度。这对开发人员来说工作量太大，这就是为什么我说这个布局管理器是为 GUI 构建器设计的，而不是用于手动编码。\n\
  \n让我们再次检查图 1-43 和图 1-44 中显示的屏幕。您会看到容器获得了位置（x 和 y），按钮获得了大小（宽度和高度）。默认情况下，`JFrame`\
  \ 显示在 (0, 0) 位置，这就是您看到容器位置的方式（实际上，您的容器是内容面板）。按钮获得其默认的最小、首选和最大大小（全部设置为相同的值），这就是您在展开屏幕后看到按钮的方式。默认情况下，`SpringLayout`\
  \ 将所有组件定位在容器内的 (0, 0) 处。在这种情况下，两个按钮都定位在 (0, 0)。要解决此问题，请指定两个按钮和内容面板的 x、y、宽度和高度。\n\
  \n`SpringLayout` 使用约束来排列组件。`Constraints` 类的对象（它是 `SpringLayout` 类的静态内部类）表示组件和容器的约束。`Constraints`\
  \ 对象允许您使用其方法指定组件的 x、y、宽度和高度。所有四个属性都必须使用 `Spring` 对象来指定。当您指定这些属性时，您需要使用 `SpringLayout`\
  \ 类中定义的常量之一来指定它们，这些常量列在表 1-5 中。\n\n表 1-5.\n\nSpringLayout 类中定义的常量\n\n| 常量名 | 描述\
  \ |\n| --- | --- |\n| `NORTH` | 与 `y` 同义。它是组件的顶部边缘。 |\n| `WEST` | 与 `x` 同义。它是组件的左侧边缘。\
  \ |\n| `SOUTH` | 它是组件的底部边缘。其值与 `NORTH + HEIGHT` 相同。 |\n| `EAST` | 它是组件的右侧边缘。与 `WEST\
  \ + WIDTH` 相同。 |\n| `WIDTH` | 组件的宽度。 |\n| `HEIGHT` | 组件的高度。 |\n| `HORIZONTAL_CENTER`\
  \ | 它是组件的水平中心。与 `WEST + WIDTH/2` 相同。 |\n| `VERTICAL_CENTER` | 它是组件的垂直中心。与 `NORTH\
  \ + HEIGHT/2` 相同。 |\n| `BASELINE` | 它是组件的基线。 |\n\n您可以相对于容器或另一个组件设置组件的 x 和 y 约束。`Constraints`\
  \ 类的对象指定组件的约束。您需要创建一个 `SpringLayout.Constraints` 类的对象，并使用其方法来设置约束值。当您将组件添加到容器时，将此约束对象传递给\
  \ `add()` 方法。清单 1-18 设置了两个按钮的 x 和 y 约束。请注意，值 (10, 20) 和 (150, 20) 是使用 `Spring` 对象指定的，并且是从内容面板的边缘测量的。图\
  \ 1-45 显示了运行程序并展开 `JFrame` 后的屏幕。\n\n![A323071_2_En_1_Fig45_HTML.jpg](img/A323071_2_En_1_Fig45_HTML.jpg)\n\
  \n图 1-45.\n\n为两个按钮设置 (x, y) 后展开 JFrame\n\n```java\n// SpringLayout2.java\npackage\
  \ com.jdojo.swing.intro;\nimport javax.swing.SpringLayout;\nimport java.awt.Container;\n\
  import javax.swing.JFrame;\nimport javax.swing.JButton;\nimport javax.swing.Spring;\n\
  public class SpringLayout2 {\npublic static void main(String[] args) {\nJFrame frame\
  \ = new JFrame(\"SpringLayout2\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\n// 将内容面板的布局设置为 SpringLayout\nSpringLayout\
  \ springLayout = new SpringLayout();\ncontentPane.setLayout(springLayout);\n// 向内容面板添加两个\
  \ JButton\nJButton b1 = new JButton(\"Button 1\");\nJButton b2 = new JButton(\"\
  Little Bigger Button 2\");\n// 为 b1 和 b2 创建 Constraints 对象\nSpringLayout.Constraints\
  \ b1c = new SpringLayout.Constraints();\nSpringLayout.Constraints b2c = new SpringLayout.Constraints();\n\
  // 为 b1 和 b2 的 y 值创建一个 Spring 对象\nSpring yPadding = Spring.constant(20);\n// 为 b1\
  \ 设置 (10, 20) 作为 (x, y)\nb1c.setX(Spring.constant(10));\nb1c.setY(yPadding);\n//\
  \ 为 b2 设置 (150, 20) 作为 (x, y)\nb2c.setX(Spring.constant(150));\nb2c.setY(yPadding);\n\
  // 在添加 b1 和 b2 时使用 Constraints 对象\ncontentPane.add(b1, b1c);\ncontentPane.add(b2,\
  \ b2c);\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-18.\n为组件设置 x 和 y 约束\n\
  ```\n\n\n你尚未固定 `JFrame` 的大小。运行程序时，`JFrame` 仍会显示，但没有显示区域。至少这次两个按钮没有重叠。你为 `b2` 的 `x`\
  \ 值随意选取了 150 像素。也就是说，`b2` 的左边缘距离内容面板的左边缘 150 像素。有一种方法可以指定 `b2` 的左边缘应位于距离 `b1` 右边缘指定距离的位置。要实现这一点，你需要先将\
  \ `b1` 添加到容器中。当你向容器添加组件时，`SpringLayout` 会为该组件关联一个 `Constraints` 对象，无论你是否向容器的 `add()`\
  \ 方法传递了约束对象。你可以使用 `SpringLayout` 类的 `getConstraint(String edge, Component c)` 方法获取组件任意边缘的约束。以下代码片段实现了相同的功能。它将\
  \ `b1` 的 (x, y) 设置为 (10, 20)，并将 `b2` 的 (x, y) 设置为 (`b1` 的右边缘 + 5, 20)。如果你将清单 1-18\
  \ 中添加两个按钮的代码替换为以下代码片段，`b2` 将出现在 `b1` 右侧 10 像素的位置：\n\n```\n// 为 b1 和 b2 的 y 值创建一个\
  \ Spring 对象\nSpring yPadding = Spring.constant(20);\n// 为 b1 设置 (x, y) 为 (10, 20)\n\
  b1c.setX(Spring.constant(10));\nb1c.setY(yPadding);\n// 先将 b1 添加到内容面板\ncontentPane.add(b1,\
  \ b1c);\n// 查询布局管理器中 b1 的 EAST 约束，即 b1 的右边缘\nSpring b1Right = springLayout.getConstraint(SpringLayout.EAST,\
  \ b1);\n// 在 b1 的右边缘添加一个 5 像素的支柱，以定义 b2 的左边缘，并使用 b2c 的 setX() 方法进行设置\nSpring b2Left\
  \ = Spring.sum(b1Right, Spring.constant(5));\nb2c.setX(b2Left);\nb2c.setY(yPadding);\n\
  // 现在将 b2 添加到内容面板\ncontentPane.add(b2, b2c);\n```\n\n有一种更简单、更直观的方法来设置 `SpringLayout`\
  \ 中组件的约束。首先，将所有组件添加到容器中，无需担心它们的约束，然后使用 `SpringLayout` 类的 `putConstraint()` 方法定义约束。以下是\
  \ `putConstraint()` 方法的两个版本：\n\n*   `void putConstraint(String targetEdge, Component\
  \ targetComponent, int padding, String sourceEdge,Component sourceComponent)`\n\
  *   `void putConstraint(String targetEdge, Component targetComponent, Spring padding,\
  \ String sourceEdge, Component sourceComponent)`\n\n第一个版本使用一个支柱。第三个参数（`int padding`）定义了一个固定弹簧，它将在两个组件的边缘之间充当支柱（固定距离）。第二个版本则使用弹簧代替。你可以将方法描述理解为：“`targetComponent`\
  \ 的 `targetEdge` 距离 `sourceComponent` 的 `sourceEdge` 为 `padding` 距离。”例如，如果你希望 `b2`\
  \ 的左边缘距离 `b1` 的右边缘 5 像素，可以调用此方法：\n\n```\n// 将 b2 的左边缘设置为距离 b1 的右边缘 5 像素\nspringLayout.putConstraint(SpringLayout.WEST,\
  \ b2, 5,\nSpringLayout.EAST, b1);\n```\n\n要将 `b1` 的左边缘（左边缘定义了 x 值）设置为距离内容面板左边缘 10\
  \ 像素，你可以使用：\n\n```\nspringLayout.putConstraint(SpringLayout.WEST, b1, 5,\nSpringLayout.WEST,\
  \ contentPane);\n```\n\n让我们回到调用 `pack()` 方法时 `JFrame` 的大小问题。你需要为内容面板的底部和右边缘设置位置，以便\
  \ `pack()` 方法能正确调整其大小。将其底部边缘设置为距离 `b1`（或 `b2`，以最接近其底部边缘的为准）底部边缘 10 像素。在此示例中，两者距离内容面板底部边缘的距离相同。将其右边缘设置为距离\
  \ `b2` 右边缘 10 像素，`b2` 是内容面板中最右侧的 `JButton`。以下代码片段实现了这一点：\n\n```\n// 设置内容面板的底部边缘\n\
  springLayout.putConstraint(SpringLayout.SOUTH, contentPane, 10,\nSpringLayout.SOUTH,\
  \ b1);\n// 设置内容面板的右边缘\nspringLayout.putConstraint(SpringLayout.EAST, contentPane,\
  \ 10,\nSpringLayout.EAST, b2);\n```\n\n清单 1-19 包含了完整的程序，图 1-46 显示了运行程序时的 `JFrame`。\n\
  \n![A323071_2_En_1_Fig46_HTML.jpg](img/A323071_2_En_1_Fig46_HTML.jpg)\n\n图 1-46.\n\
  \n使用 SpringLayout 自动调整 JFrame 大小\n\n```\n// NiceSpringLayout.java\npackage com.jdojo.swing.intro;\n\
  import javax.swing.JFrame;\nimport java.awt.Container;\nimport javax.swing.SpringLayout;\n\
  import javax.swing.JButton;\npublic class NiceSpringLayout {\npublic static void\
  \ main(String[] args) {\nJFrame frame = new JFrame(\"SpringLayout2\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\n// 将内容面板的布局设置为 SpringLayout\nSpringLayout\
  \ springLayout = new SpringLayout();\ncontentPane.setLayout(springLayout);\n// 创建两个\
  \ JButton\nJButton b1 = new JButton(\"按钮 1\");\nJButton b2 = new JButton(\"稍大一点的按钮\
  \ 2\");\n// 添加两个 JButton，不使用任何约束\ncontentPane.add(b1);\ncontentPane.add(b2);\n//\
  \ 现在为两个 JButton 添加约束\n// 将 b1 的 x 设置为 10\nspringLayout.putConstraint(SpringLayout.WEST,\
  \ b1, 10,\nSpringLayout.WEST, contentPane);\n// 将 b1 的 y 设置为 20\nspringLayout.putConstraint(SpringLayout.NORTH,\
  \ b1, 20,\nSpringLayout.NORTH, contentPane);\n// 将 b2 的 x 设置为距离 b1 右边缘 10\nspringLayout.putConstraint(SpringLayout.WEST,\
  \ b2, 10,\nSpringLayout.EAST, b1);\n// 将 b1 的 y 设置为 20\nspringLayout.putConstraint(SpringLayout.NORTH,\
  \ b2, 20,\nSpringLayout.NORTH, contentPane);\n/* 现在将内容面板的高度和宽度设置为 b1 底部边缘 + 10 和\
  \ b2 右边缘 + 10。\n注意，内容面板高度的源是 b1，宽度的源是 b2\n*/\n// 设置内容面板的底部边缘\nspringLayout.putConstraint(SpringLayout.SOUTH,\
  \ contentPane, 10,\nSpringLayout.SOUTH, b1);\n// 设置内容面板的右边缘\nspringLayout.putConstraint(SpringLayout.EAST,\
  \ contentPane, 10,\nSpringLayout.EAST, b2);\nframe.pack();\nframe.setVisible(true);\n\
  }\n}\n清单 1-19.\n使用 SpringLayout 类的 putConstraint() 方法\n```\n\n`SpringLayout` 是一个非常强大的布局，可以模拟许多复杂的布局。以下代码片段包含更多示例。注释解释了其预期功能。\n\
  \n```\n// 将 JButton b1 水平居中放置在内容面板顶部，你可以按如下方式设置其约束。\n// 将 HORIZONTAL_CENTER 替换为\n\
  // VERTICAL_CENTER 可垂直居中 JButton\nspringLayout.putConstraint(SpringLayout.HORIZONTAL_CENTER,\
  \ north, 0,\nSpringLayout.HORIZONTAL_CENTER,                                   contentPane);\n\
  // 你可以通过将最大宽度分配给两个 JButton（b1 和 b2）来使它们宽度相同。\n// 假设你已经将 b1 和 b2 JButton 添加到容器中\n\
  SpringLayout.Constraints b1c = springLayout.getConstraints(b1);\nSpringLayout.Constraints\
  \ b2c = springLayout.getConstraints(b2);\n// 获取一个表示 b1 和 b2 宽度最大值的弹簧，并将该弹簧设置为 b1\
  \ 和 b2 的宽度\nSpring maxWidth = Spring.max(b1c.getWidth(), b2c.getWidth());\nb1c.setWidth(maxWidth);\n\
  b2c.setWidth(maxWidth);\n```\n\n\n\n### GroupLayout\n\n`GroupLayout` 位于 `javax.swing`\
  \ 包中。它专为 GUI 构建器设计，但也足够简单，可以手动编写代码。\n\n`GroupLayout` 使用了“组”的概念。一个组由若干元素组成。组中的元素可以是组件、间隙或另一个组。你可以将间隙视为两个组件之间的不可见区域。在使用\
  \ `GroupLayout` 之前，你必须理解“组”的概念。共有两种类型的组：\n\n*   顺序组\n*   并行组\n\n当组中的元素按顺序一个接一个地放置时，称为顺序组。当组中的元素并行放置时，称为并行组。并行组会以四种方式之一对齐其元素：基线、居中、前导和尾随。在\
  \ `GroupLayout` 中，你需要为每个组件定义两次布局——一次沿水平轴，一次沿垂直轴。也就是说，你需要分别指定所有组件在水平方向和垂直方向上如何形成组。让我们看一些组的示例。图\
  \ 1-47 展示了一个包含两个组件的组。\n\n![A323071_2_En_1_Fig47_HTML.gif](img/A323071_2_En_1_Fig47_HTML.gif)\n\
  \n图 1-47.\n\n两个组件 C1 和 C2 沿水平轴形成顺序组，沿垂直轴形成并行组\n\n在图 1-47 中，两个轴仅用于讨论目的，并非布局的一部分。组件一个接一个地放置（从左到右），沿水平轴形成顺序组。它们沿垂直轴形成并行组。在垂直轴上，并行组中的两个组件沿其顶部边缘对齐。如果你在想象水平和垂直轴上的顺序组和并行组时遇到困难，可以将图\
  \ 1-47 重绘为图 1-48。水平方向（从左到右）的两个虚线箭头代表 C1 和 C2，当你想象它们在水平方向上的分组时。你可以看到这两个箭头是串联的，因此\
  \ C1 和 C2 沿水平轴形成顺序组。垂直方向（从上到下，位于组件 C1 左侧）的两个虚线箭头代表 C1 和 C2，当你沿垂直轴想象它们时。你可以看到这两个箭头不是串联的，而是并行的。因此，C1\
  \ 和 C2 沿垂直轴形成并行组。你需要确定并行组的对齐方式。在此例中，C1 和 C2 沿其顶部边缘对齐，这在 `GroupLayout` 术语中称为前导对齐。\n\
  \n![A323071_2_En_1_Fig48_HTML.gif](img/A323071_2_En_1_Fig48_HTML.gif)\n\n图 1-48.\n\
  \n组件 C1 和 C2 的分组\n\nC1 和 C2 还有哪些其他可能的对齐方式？并行组中有四种可能的对齐方式：基线、居中、前导和尾随。如果并行组沿垂直轴出现，则四种对齐方式均有可能。如果并行组沿水平轴出现，则只有三种对齐方式（居中、前导和尾随）是可能的。沿垂直轴，前导等同于顶部边缘，尾随等同于底部边缘。沿水平轴，如果组件方向为\
  \ `LEFT_TO_RIGHT`，则前导是左边缘；如果组件方向为 `RIGHT_TO_LEFT`，则前导是右边缘。图 1-49 和图 1-50 展示了沿垂直轴和水平轴的可能对齐方式。对齐方式由虚线表示。请注意，沿垂直轴，对齐线是水平的；沿水平轴，对齐线是垂直的。`GroupLayout.Alignment`\
  \ 枚举中的四个常量 `LEADING`、`TRAILING`、`CENTER` 和 `BASELINE` 用于表示这四种对齐类型。\n\n\n\n![A323071_2_En_1_Fig50_HTML.gif](img/A323071_2_En_1_Fig50_HTML.gif)\n\
  \n图 1-50.\n\n在组件方向为 LEFT_TO_RIGHT 的平行组中，沿水平轴的三种可能对齐方式。对于 RIGHT_TO_LEFT 方向，LEADING\
  \ 和 TRAILING 会交换边缘。\n\n![A323071_2_En_1_Fig49_HTML.gif](img/A323071_2_En_1_Fig49_HTML.gif)\n\
  \n图 1-49.\n\n在平行组中沿垂直轴的四种可能对齐方式\n\n如何为 `GroupLayout` 创建顺序组和平行组？`GroupLayout` 类包含三个内部类：`Group`、`SequentialGroup`\
  \ 和 `ParallelGroup`。`Group` 是一个抽象类，另外两个类继承自 `Group` 类。你无需直接创建这些类的对象，而是使用 `GroupLayout`\
  \ 类的工厂方法来创建它们的对象。\n\n`GroupLayout` 类提供了两个独立的方法来创建组：`createSequentialGroup()` 和 `createParallelGroup()`。从这些方法的名称可以明显看出它们创建的组类型。请注意，你需要为平行组指定对齐方式。`createParallelGroup()`\
  \ 方法已被重载。无参数版本默认对齐方式为 `LEADING`。另一个版本允许你指定对齐方式。一旦有了组对象，你可以分别使用其 `addComponent()`、`addGap()`\
  \ 和 `addGroup()` 方法向其中添加组件、间隙和子组。\n\n如何使用 `GroupLayout` 管理器？以下是使用 `GroupLayout`\
  \ 需要遵循的步骤。假设你需要在 `JFrame` 中放置两个按钮，如图 1-51 所示。\n\n![A323071_2_En_1_Fig51_HTML.jpg](img/A323071_2_En_1_Fig51_HTML.jpg)\n\
  \n图 1-51.\n\n最简单的 GroupLayout，两个按钮并排放置\n\n假设 `JFrame` 名为 `frame`，两个 `JButtons` 分别名为\
  \ `b1` 和 `b2`。首先，你需要创建一个 `GroupLayout` 类的对象。它只有一个构造函数，该构造函数将容器引用作为参数。这意味着在创建 `GroupLayout`\
  \ 类的对象之前，你需要获取要为其创建 `GroupLayout` 的容器的引用。\n\n```\n// 获取容器的引用\nContainer contentPane\
  \ = frame.getContentPane();\n// 创建一个 GroupLayout 对象\nGroupLayout groupLayout = new\
  \ GroupLayout(contentPane);\n// 为容器设置布局管理器\ncontentPane.setLayout(groupLayout);\n\
  ```\n\n其次，你需要沿水平轴创建组件组（称为水平组），并使用 `setHorizontalGroup()` 方法将该组设置为 `GroupLayout`。请注意，一个组可以沿任何轴（水平和垂直）是顺序组或平行组。在你的例子中，两个按钮\
  \ `b1` 和 `b2` 沿水平轴形成一个顺序组。\n\n```\n// 创建一个顺序组\nGroupLayout.SequentialGroup sGroup\
  \ = groupLayout.createSequentialGroup();\n// 向组中添加两个按钮\nsGroup.addComponent(b1);\n\
  sGroup.addComponent(b2);\n// 为 GroupLayout 设置水平组\ngroupLayout.setHorizontalGroup(sGroup);\n\
  ```\n\n你可以将所有步骤合并为一步，如下所示：\n\n```\ngroupLayout.setHorizontalGroup(groupLayout.createSequentialGroup()\n\
  .addComponent(b1)\n.addComponent(b2));\n```\n\n最后，沿垂直轴创建组件组（称为垂直组），并使用 `setVerticalGroup()`\
  \ 方法将该组设置为 `GroupLayout`。两个按钮沿垂直轴形成一个平行组。你可以按如下方式完成此操作：\n\n```\ngroupLayout.setVerticalGroup(\n\
  groupLayout.createParallelGroup(GroupLayout.Alignment.BASELINE)\n.addComponent(b1)\n\
  .addComponent(b2));\n```\n\n提示\n\n在 `GroupLayout` 中，不要使用容器的 `add()` 方法向容器添加组件。相反，你应该沿水平和垂直轴将组件添加到组中，然后使用\
  \ `setHorizontalGroup()` 和 `setVerticalGroup()` 方法将该组添加到 `GroupLayout`。\n\n清单 1-20\
  \ 演示了如何使用 `GroupLayout` 在 `JFrame` 中并排显示两个按钮。运行程序时，`JFrame` 将如图 1-51 所示显示。稍后我将讨论更复杂的示例。\n\
  \n```\n// SimplestGroupLayout.java\npackage com.jdojo.swing.intro;\nimport java.awt.Container;\n\
  import javax.swing.JFrame;\nimport javax.swing.JButton;\nimport javax.swing.GroupLayout;\n\
  public class SimplestGroupLayout {\npublic static void main(String[] args) {\nJFrame\
  \ frame = new JFrame(\"最简单的 GroupLayout\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\n// 为 contentPane 创建一个 GroupLayout\
  \ 类的对象\nGroupLayout groupLayout = new GroupLayout(contentPane);\n// 将内容面板的布局设置为\
  \ GroupLayout\ncontentPane.setLayout(groupLayout);\n// 向内容面板添加两个 JButton\nJButton\
  \ b1 = new JButton(\"按钮 1\");\nJButton b2 = new JButton(\"稍大一点的按钮 2\");\ngroupLayout.setHorizontalGroup(\n\
  groupLayout.createSequentialGroup()\n.addComponent(b1)\n.addComponent(b2));\ngroupLayout.setVerticalGroup(\n\
  groupLayout.createParallelGroup(GroupLayout.Alignment.BASELINE)\n.addComponent(b1)\n\
  .addComponent(b2));\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-20.\n最简单的\
  \ GroupLayout\n```\n\n`GroupLayout` 还有两个值得讨论的特性：\n\n*   它允许你在两个组件之间添加间隙。\n*   它允许你指定组件、间隙和组的调整大小行为。\n\
  \n你可以将间隙视为一个不可见的组件。有两种类型的间隙：两个组件之间的间隙，以及组件与容器之间的间隙。你可以使用 `Group` 类的 `addGap()` 方法在两个组件之间添加间隙。你可以添加刚性间隙，也可以添加弹性间隙（类似于弹簧）。刚性间隙的大小是固定的。弹性间隙具有最小、首选和最大尺寸，并且在容器调整大小时像弹簧一样工作。要在前面的示例中在\
  \ `b1` 和 `b2` 之间添加 10 像素的刚性间隙，你可以像这样设置水平组：\n\n```\ngroupLayout.setHorizontalGroup(groupLayout.createSequentialGroup()\n\
  .addComponent(b1)\n.addGap(10)\n.addComponent(b2));\n```\n\n有两种方法可以在两个组件之间添加间隙。它们基于间隙大小及其调整大小的能力。三种间隙类型是：\n\
  \n*   刚性间隙\n*   弹性间隙\n*   首选间隙\n\n你可以使用 `addGap(int gapSize)` 在两个组件之间添加刚性间隙。\n\n\
  你可以使用 `addGap(int min, int pref, int max)` 方法在两个组件之间添加具有最小、首选和最大尺寸的弹性（类似弹簧）间隙。要添加一个最小、首选和最大尺寸分别为\
  \ 5、10 和 50 的弹性间隙，你可以像这样设置水平组：\n\n```\ngroupLayout.setHorizontalGroup(groupLayout.createSequentialGroup()\n\
  .addComponent(b1)\n.addGap(5, 10, 50)\n.addComponent(b2));\n```\n\n\n\n您可以在两个组件之间添加首选间距。在这种情况下，您可以选择指定间距的大小，或者让布局管理器为您计算。但是，您必须指定这两个组件在间距方面的关联方式。此类间距共有三种：`RELATED`、`UNRELATED`\
  \ 和 `INDENT`。如果您在标签及其对应字段之间添加首选间距，则应在它们之间添加 `RELATED` 间距。例如，如果您有一个登录表单，并且想在“用户 ID：”和用于输入用户\
  \ ID 的文本字段之间添加首选间距，则应在它们之间添加 `RELATED` 间距。当两个组件属于不同组时，您可以使用 `UNRELATED` 间距。当您添加间距只是为了缩进一个组件时，您应添加\
  \ `INDENT` 间距。这三种间距由 `LayoutStyle.ComponentPlacement` 枚举中定义的三个常量 `RELATED`、`UNRELATED`\
  \ 和 `INDENT` 表示。使用 `addPreferredGap()` 方法添加首选间距。以下代码片段在 `b1` 和 `b2` 之间添加了一个 `RELATED`\
  \ 首选间距：\n\n```\ngroupLayout.setHorizontalGroup(\ngroupLayout.createSequentialGroup()\n\
  .addComponent(b1)\n.addPreferredGap(LayoutStyle.ComponentPlacement.RELATED)\n.addComponent(b2));\n\
  ```\n\n您需要使用 `GroupLayout.SequentialGroup` 类的 `addContainerGap()` 方法来添加组件边缘与容器之间的间距。该方法已被重载。它还允许您指定间距的首选大小和最大大小。\n\
  \n当您在不同平台上运行应用程序时，设置硬编码的间距可能会产生问题。这就是 `GroupLayout` 提供两个方法的原因，这两个方法允许您指定希望 `GroupLayout`\
  \ 根据应用程序运行所在的平台来计算首选间距。要让 `GroupLayout` 计算并设置两个组件之间的间距，您需要调用其 `setAutoCreateGaps(true)`\
  \ 方法。要让它计算并设置组件与容器边缘之间的间距，您需要调用其 `setAutoCreateContainerGaps(true)` 方法。默认情况下，间距的自动计算是禁用的。将清单\
  \ 1-20 中的语句\n\n```\n// 创建 GroupLayout 类的对象\nGroupLayout groupLayout = new GroupLayout(contentPane);\n\
  ```\n\n替换为以下语句\n\n```\n// 创建 GroupLayout 类的对象并设置间距\nGroupLayout groupLayout = new\
  \ GroupLayout(contentPane);\ngroupLayout.setAutoCreateGaps(true);\ngroupLayout.setAutoCreateContainerGaps(true);\n\
  ```\n\n现在，`JFrame` 将如图 1-52 所示。您可以看到布局管理器为您添加了必要的间距。\n\n![A323071_2_En_1_Fig52_HTML.jpg](img/A323071_2_En_1_Fig52_HTML.jpg)\n\
  \n图 1-52.\n\n启用了自动间距的最简单 GroupLayout\n\n`GroupLayout` 会遵循组件的最小、首选和最大尺寸。当容器调整大小时，布局管理器会向组件询问其尺寸并相应地调整它们的大小。但是，您可以通过使用\
  \ `addComponent(Component c, int min, int pref, int max)` 方法来覆盖此行为，该方法允许您指定组件的最小、首选和最大尺寸。您需要理解\
  \ `GroupLayout` 类中定义的两个常量的含义。它们是 `DEFAULT_SIZE` 和 `PREFERRED_SIZE`。它们可以在 `addComponent()`\
  \ 方法中用作 `min`、`pref` 和 `max` 参数。`DEFAULT_SIZE` 意味着布局管理器应向组件询问此尺寸类型并使用它。`PREFERRED_SIZE`\
  \ 意味着管理器应使用组件的首选尺寸。例如，如果您希望前面示例中的 `JButton b2` 能够扩展（默认情况下，`JButton` 具有相同的 `min`、`pref`\
  \ 和 `max` 尺寸），您可以像这样将其添加到水平组中：\n\n```\ngroupLayout.setHorizontalGroup(groupLayout.createSequentialGroup()\n\
  .addComponent(b1)\n.addComponent(b2,\nGroupLayout.PREFERRED_SIZE,\nGroupLayout.PREFERRED_SIZE,\n\
  Integer.MAX_VALUE));\n```\n\n通过将 `PREFERRED_SIZE` 指定为最小尺寸和首选尺寸，您是在告诉布局管理器 `b2` 不应被缩短到低于其首选尺寸。将其最大尺寸指定为\
  \ `Integer.MAX_VALUE` 则是告诉布局管理器它可以无限扩展该按钮。要使组件不可调整大小，您可以将其所有三个尺寸都设置为与 `GroupLayout.PREFERRED_SIZE`\
  \ 相同。\n\n您可以在 `GroupLayout` 中嵌套组。让我们看一下四个按钮（命名为 `b1`、`b2`、`b3` 和 `b4`）的布局，如图 1-53\
  \ 所示。\n\n![A323071_2_En_1_Fig53_HTML.jpg](img/A323071_2_En_1_Fig53_HTML.jpg)\n\n\
  图 1-53.\n\nGroupLayout 中的嵌套组\n\n让我们看一下沿水平轴的组件布局。您可以看到两个并行组 (`b1`, `b3`) 和 (`b2`,\
  \ `b4`)，并且这两个组是顺序放置的。让我们在伪代码中使用 `PG` 和 `SG` 分别表示并行组和顺序组。请注意，在 `PG`(`b1`, `b3`) 中，组件沿\
  \ `LEADING` 边缘（此处为左边缘）对齐，而在 `PG`(`b2`, `b4`) 中，它们沿 `TRAILING` 边缘（此处为右边缘）对齐。让我们将对齐方式插入到您的伪代码中，组将如下所示：`PGLEADING`\
  \ 和 `PGTRAILING`。为了讨论这个示例，我编造了这种语法。您很快就会看到 Java 代码。如果您在想象这种排列时遇到困难，可以参考图 1-54，其中每个按钮都用一个沿水平轴的箭头表示。\n\
  \n![A323071_2_En_1_Fig54_HTML.gif](img/A323071_2_En_1_Fig54_HTML.gif)\n\n图 1-54.\n\
  \n四个按钮由沿水平轴的四个箭头表示\n\n箭头的对齐方式与按钮相同。您可以观察到 `b1` 和 `b3` 的箭头是平行的，`b2` 和 `b4` 的箭头也是平行的。如果您想象这两个并行组，您可以观察到这两个组沿水平轴构成了一个顺序组。为了帮助您想象最终的排列，图\
  \ 1-55 对箭头排列进行了细化。\n\n![A323071_2_En_1_Fig55_HTML.gif](img/A323071_2_En_1_Fig55_HTML.gif)\n\
  \n图 1-55.\n\n四个按钮由沿水平轴的四个箭头表示\n\n每个并行组都显示在一个虚线矩形内。从虚线矩形中出来的箭头表示这些组沿水平轴是顺序的。理解组件沿某个轴的这些并行和顺序排列可能需要一些时间。一旦您理解了，在复杂场景中使用\
  \ `GroupLayout` 就会变得非常容易。大多数情况下，您会使用 GUI 构建器工具来排列组件，并且您不必关心组的复杂性。然而，理解布局背后的概念总是有帮助的。\n\
  \n为了结束沿水平轴的讨论，伪代码如下所示：\n\n```\n水平组 = SG(PGLEADING, PGTRAILING)\n```\n\n类似地，您可以想象沿垂直轴的分组排列。如果您在想象这一点时遇到困难，您可以将所有四个按钮绘制为从上到下的箭头，并观察它们如何沿垂直轴形成组。以下是垂直分组排列：\n\
  \n```\n垂直组 = SG(PGBASELINE, PGBASELINE)\n```\n\n现在，将伪代码转换为 Java 代码就很容易了，如清单 1-21\
  \ 所示。\n\n\n\n```\n// NestedGroupLayout.java\npackage com.jdojo.swing.intro;\nimport\
  \ java.awt.Container;\nimport javax.swing.JFrame;\nimport javax.swing.JButton;\n\
  import javax.swing.GroupLayout;\nimport static javax.swing.GroupLayout.Alignment.*;\n\
  public class NestedGroupLayout {\npublic static void main(String[] args) {\nJFrame\
  \ frame = new JFrame(\"GroupLayout 中的嵌套组\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\n// 将内容面板的布局设置为 GroupLayout\nGroupLayout\
  \ groupLayout = new GroupLayout(contentPane);\ngroupLayout.setAutoCreateGaps(true);\n\
  groupLayout.setAutoCreateContainerGaps(true);\ncontentPane.setLayout(groupLayout);\n\
  // 向内容面板添加四个 JButton\nJButton b1 = new JButton(\"按钮 1\");\nJButton b2 = new JButton(\"\
  稍大一点的按钮 2\");\nJButton b3 = new JButton(\"3\");\nJButton b4 = new JButton(\"按钮 4\"\
  );\ngroupLayout.setHorizontalGroup(\ngroupLayout.createSequentialGroup()\n.addGroup(groupLayout.createParallelGroup(LEADING)\n\
  .addComponent(b1)\n.addComponent(b3))\n.addGroup(groupLayout.createParallelGroup(TRAILING)\n\
  .addComponent(b2)\n.addComponent(b4))\n);\ngroupLayout.setVerticalGroup(\ngroupLayout.createSequentialGroup()\n\
  .addGroup(groupLayout.createParallelGroup(BASELINE)\n.addComponent(b1)\n.addComponent(b2))\n\
  .addGroup(groupLayout.createParallelGroup(BASELINE)\n.addComponent(b3)\n.addComponent(b4))\n\
  );\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-21.\nGroupLayout 中的嵌套组\n\
  ```\n\n如何让两个组件的大小相同？让我们尝试让 `b1` 和 `b3` 具有相同的大小。在使组件可调整大小时，需要考虑两件事。首先，需要考虑组的可调整大小行为。其次，需要考虑组内组件的可调整大小行为。并行组的大小等于最大元素的大小。如果考虑\
  \ `PG{LEADING](b1, b3)`，则该组的宽度将是 `b1` 的大小，因为 `b1` 是该组中最大的组件。默认情况下，`JButton` 具有固定大小。要使\
  \ `b3` 拉伸到组的大小（即 `b1` 的大小），必须将其添加到组中，并指定它可以扩展，例如 `addComponent(b3, GroupLayout.DEFAULT_SIZE,\
  \ GroupLayout.DEFAULT_SIZE, Integer.MAX_VALUE)`。这将强制 `b3` 拉伸到与其组相同的大小，而该组的大小又与 `b1`\
  \ 的宽度相同。如果两个组件不在同一个并行组中，要使它们大小相同，可以使用 `GroupLayout` 类的 `linkSize()` 方法。当使用 `linkSize()`\
  \ 方法使组件大小相同时，无论其最小、首选和最大大小如何，这些组件都将变为不可调整大小。\n\n```\n// 使 b1、b2、b3 和 b4 大小相同\ngroupLayout.linkSize(b1,\
  \ b2, b3, b4);\n// 使 b1 和 b3 在水平方向上大小相同\ngroupLayout.linkSize(SwingConstants.HORIZONTAL,\
  \ new Component[]{b1, b3});\n```\n\n在使用 `createParallelGroup(GroupLayout.Alignment\
  \ a, boolean resizable)` 方法创建并行组时，也可以使组可调整大小。如果将可调整大小的组件放置在一个可调整大小的组中，那么当调整容器大小时，该组将调整大小，进而使组件也调整大小。\n\
  \n### 空布局管理器\n\n到目前为止，您可能已经意识到布局管理器负责处理容器内组件的定位和调整大小。如果容器被调整大小，布局管理器将负责重新定位和调整其中组件的大小。如果您不想使用布局管理器，就会失去这一优势，并且需要自行负责容器内所有组件的定位和调整大小。告诉容器您不需要布局管理器很简单。只需将布局管理器设置为\
  \ `null`，如下所示：\n\n```\n// 不为 myContainer 使用布局管理器\nmyContainer.setLayout(null);\n\
  ```\n\n您可以将 `JFrame` 内容面板的布局管理器设置为 `null`，如下所示：\n\n```\nJFrame frame = new JFrame(\"\
  无布局管理器窗口\");\nContainer contentPane = frame.getContentPane();\ncontentPane.setLayout(null);\n\
  ```\n\n“空布局管理器”这个说法仅仅意味着没有布局管理器。它也被称为绝对定位。请注意，您的程序可能在不同的平台上运行。组件在不同平台上显示时，其大小可能会有所不同，而您的\
  \ `null` 布局管理器无法处理这种不一致性。当您使用 `null` 布局管理器时，请确保组件的大小足够大，以便在所有平台上都能正确显示。\n\n清单 1-22\
  \ 为 `JFrame` 的内容面板使用了 `null` 布局管理器。它向其中添加了两个按钮。它还使用 `setBounds()` 方法设置了按钮和 `JFrame`\
  \ 的位置和大小。图 1-56 显示了生成的 `JFrame`。\n\n![A323071_2_En_1_Fig56_HTML.jpg](img/A323071_2_En_1_Fig56_HTML.jpg)\n\
  \n图 1-56.\n\n使用空布局管理器的 JFrame\n\n```\n// NullLayout.java\npackage com.jdojo.swing.intro;\n\
  import javax.swing.JFrame;\nimport java.awt.Container;\nimport javax.swing.JButton;\n\
  public class NullLayout  {\npublic static void main(String[] args) {\nJFrame frame\
  \ = new JFrame(\"空布局管理器\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\ncontentPane.setLayout(null);\n\
  JButton b1 = new JButton(\"小按钮 1\");\nJButton b2 = new JButton(\"大大大按钮 2...\");\n\
  contentPane.add(b1);\ncontentPane.add(b2);\n// 必须设置组件的 (x, y) 和 (width, height)\n\
  b1.setBounds(10, 10, 100, 20);\nb2.setBounds(120, 10, 150, 20);\n// 必须设置 JFrame\
  \ 的大小，因为它使用了空布局。\n// 现在，您不能使用 pack() 方法来计算其大小。\nframe.setBounds(0, 0, 350, 100);\n\
  frame.setVisible(true);\n}\n}\n清单 1-22.\n使用空布局管理器\n```\n\n请注意，按钮的标签并未完全显示。这是使用 `null`\
  \ 布局管理器时会遇到的问题之一。如果您尝试在运行时调整 `JFrame` 的大小，您会注意到按钮不会像使用布局管理器时那样自动调整大小。布局管理器会根据平台、文本和字体计算\
  \ `JButton` 的大小，而使用 `null` 布局管理器时，您需要自行计算（大多数情况下，您只是猜测）按钮的大小，同时考虑所有这些因素。在 Java 中使用\
  \ `null` 布局管理器并不是一个好习惯，除非您是在进行原型设计或学习 `null` 布局管理器。\n\n\n\n## 创建可复用的 JFrame\n\n\
  在前面的章节中，你通过实例化 `JFrame` 类来创建 `JFrame`，并使用该类的 `main()` 方法编写构建 GUI 的代码。这些示例中的 `JFrame`\
  \ 是不可复用的。到目前为止，这没有问题，因为 Swing 程序很简单，其唯一目的就是在 `JFrame` 中显示一些组件。当你开始编写更复杂的 Swing 程序时，这种编程方式将不再适用。例如，假设你想在\
  \ `JFrame` 显示后，使其中的某个 `JButton` 不可见或禁用。由于你一直将所有 `JButton` 声明为 `main()` 方法内的局部变量，一旦\
  \ `main()` 方法执行完毕，你将无法访问它们的引用。为了使你的 `JFrame` 可复用，并方便地保留添加到 `JFrame` 中的组件的引用，以便日后引用它们，你需要改变创建\
  \ `JFrame` 的方式。以下是创建 `JFrame` 的新方法。你创建自己的类，并让它继承自 `JFrame` 类，如下所示：\n\n```\npublic\
  \ class CustomFrame extends JFrame {\n// CustomFrame 的代码写在这里\n}\n```\n\n你所有的组件都在自定义类中声明为实例变量，如下所示：\n\
  \n```\npublic class CustomFrame extends JFrame {\n// 声明 JFrame 中的所有组件为实例变量\nJButton\
  \ okButton = new JButton(\"确定\");\nJButton cancelButton = new JButton(\"取消\");\n\
  }\n```\n\n你有一个 `initFrame()` 方法，用于将组件添加到 `JFrame` 的内容面板中。你在自定义 `JFrame` 的构造函数中调用此方法。Java\
  \ 并不要求必须有 `initFrame()` 方法。这只是你为 Swing 应用程序编写代码时采用的一种约定。要显示你的 `JFrame`，你实例化你的类并使其可见。这种方法代码相似，但排列方式不同，因此你可以编写一些更正式的\
  \ Swing 程序。清单 1-23 实现了与清单 1-20 中代码相同的功能。\n\n```\n// CustomFrame.java\npackage com.jdojo.swing.intro;\n\
  import javax.swing.JFrame;\nimport javax.swing.GroupLayout.Alignment;\nimport javax.swing.JButton;\n\
  import java.awt.Container;\nimport javax.swing.GroupLayout;\npublic class CustomFrame\
  \ extends JFrame {\n// 将所有组件声明为实例变量\nJButton b1 = new JButton(\"按钮 1\");\nJButton\
  \ b2 = new JButton(\"稍大一点的按钮 2\");\npublic CustomFrame(String title) {\nsuper(title);\n\
  initFrame();\n}\n// 初始化框架并将组件添加到其中\nprivate void initFrame() {\nthis.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = this.getContentPane();\nGroupLayout groupLayout = new GroupLayout(contentPane);\n\
  contentPane.setLayout(groupLayout);\ngroupLayout.setHorizontalGroup(\ngroupLayout.createSequentialGroup()\n\
  .addComponent(b1)\n.addComponent(b2)\n);\ngroupLayout.setVerticalGroup(\ngroupLayout.createParallelGroup(Alignment.BASELINE)\n\
  .addComponent(b1)\n.addComponent(b2)\n);\n}\n// 显示 CustomFrame\npublic static void\
  \ main(String[] args) {\nCustomFrame frame = new CustomFrame(\"自定义框架\");\nframe.pack();\n\
  frame.setVisible(true);\n}\n}\n清单 1-23.\n创建自定义 JFrame\n```\n\n## 事件处理\n\n什么是事件？事件的字面含义如下：\n\
  \n> “在特定时间点发生的某件事。”\n\n事件在 Swing 应用程序中的含义类似。Swing 中的事件是用户在特定时间点执行的操作。例如，按下按钮、在键盘上按下/释放按键、以及将鼠标移动到组件上，都是\
  \ Swing 应用程序中的事件。有时，Swing（或任何基于 GUI 的应用程序）中事件的发生也被称为“触发事件”或“激发事件”。当你说按钮上发生了点击事件时，意味着该按钮已通过鼠标、空格键或应用程序允许你按下按钮的任何其他方式被按下。有时你可以使用短语“按钮上的点击事件已被触发或激发”来表示相同的意思，即按钮已被按下。\n\
  \n当事件发生时，你需要对该事件做出响应。在程序中采取行动无非就是执行一段代码。响应事件的发生而采取行动称为事件处理。事件发生时执行的代码段称为事件处理器。有时事件处理器也被称为事件监听器。\n\
  \n如何编写事件处理器取决于事件的类型以及生成事件的组件。有时事件处理器内置于 Swing 组件中，有时你需要自己编写事件处理器。例如，当你按下 `JButton`\
  \ 时，你需要自己编写事件处理器。然而，当焦点在文本字段中时，你在键盘上按下一个字母键，相应的字母就会输入到文本字段中，因为按键按下事件有一个由 Swing 提供的默认事件处理器。\n\
  \n事件中有三个参与者：\n\n*   事件源\n*   事件\n*   事件处理器（或事件监听器）\n\n事件源是生成事件的组件。例如，当你按下 `JButton`\
  \ 时，点击事件发生在该 `JButton` 上。在这种情况下，`JButton` 就是点击事件的事件源。\n\n事件表示在源组件上发生的操作。Swing 中的事件由一个对象表示，该对象封装了事件的详细信息，例如事件源、事件发生的时间、发生的事件类型等。表示事件的对象属于哪个类？这取决于发生的事件的类型。每种类型的事件都有一个对应的类。例如，`java.awt.event`\
  \ 包中 `ActionEvent` 类的对象表示 `JButton` 的点击事件。\n\n本章不讨论所有类型的事件。在第二章讨论组件时，我会列出组件的重要事件。在本节中，我将解释如何在\
  \ Swing 应用程序中处理任何类型的事件。\n\n事件处理器是事件发生时执行的代码段。与事件类似，事件处理器也由一个对象表示，该对象封装了事件处理代码。表示事件处理器的对象属于哪个类？这取决于事件处理器应该处理的事件类型。事件处理器也被称为事件监听器，因为它监听源组件中事件的发生。在本章中，我将互换使用“事件处理器”和“事件监听器”这两个术语。通常，事件监听器是一个实现了特定接口的对象。事件监听器必须实现的特定接口取决于它将监听的事件类型。例如，如果你有兴趣监听\
  \ `JButton` 的点击事件（换句话说，如果你有兴趣处理 `JButton` 的点击事件），你需要一个实现了 `ActionListener` 接口的类的对象，该接口位于\
  \ `java.awt.event` 包中。\n\n\n\n查看事件处理三个参与者的描述，你可能会觉得处理一个事件需要编写大量代码。其实不然，事件处理比看起来要简单。我将列出处理事件的步骤，并附上一个处理`JButton`点击事件的示例。以下是处理事件的步骤，这些步骤适用于处理任何\
  \ Swing 组件上的任何类型事件。\n\n*   确定你想要处理事件的组件。假设你已经将该组件命名为`sourceComponent`。那么你的事件源就是`sourceComponent`。\n\
  *   确定你想要为源组件处理的事件。假设你感兴趣的是处理`Xxx`事件。这里的`Xxx`是一个事件名称，你需要将其替换为源组件实际存在的事件名称。回想一下，事件是由一个对象表示的。Java\
  \ 的事件类命名约定可以帮助你识别出哪个类的对象代表`Xxx`事件。代表`Xxx`事件的类名为`XxxEvent`。通常，事件类位于`java.awt.event`和`javax.swing.event`包中。\n\
  *   现在该为`Xxx`事件编写一个事件监听器了。回想一下，事件监听器不过是一个实现了特定接口的类的对象。你如何知道需要在事件监听器类中实现哪个特定接口呢？这里再次用到\
  \ Java 的命名约定。对于`Xxx`事件，存在一个`XxxListener`接口，你需要在事件监听器类中实现它。通常，事件监听器接口位于`java.awt.event`和`javax.swing.event`包中。`XxxListener`接口会有一个或多个方法。`XxxListener`的所有方法都接受一个`XxxEvent`类型的参数，因为这些方法旨在处理`XxxEvent`。例如，假设你有一个`XxxListener`接口，其中包含一个名为`aMethod()`的方法，如下所示：\n\
  \n```\n    public interface XxxListener {\n    void aMethod(XxxEvent event);\n \
  \   }\n    ```\n\n你的事件监听器类将如下所示。请注意，你将创建这个类。\n\n```\n    public class MyXxxEventListener\
  \ implements XxxListener {\n    public void aMethod(XxxEvent event) {\n    // 你的事件处理代码写在这里\n\
  \    }\n    }\n    ```\n\n*   你几乎已经完成了。你已经确定了事件源、你感兴趣的事件以及事件监听器。只差一件事了。你需要让事件源知道，你的事件监听器有兴趣监听它的`Xxx`事件。这也称为向事件源注册事件监听器。你将事件监听器类的对象注册到事件源。在你的例子中，你将创建`MyXxxEventListener`类的一个对象。\n\
  \n```\n    MyXxxEventListener myXxxListener = new MyXxxEventListener();\n    ```\n\
  \n如何向事件源注册事件监听器呢？这里再次用到 Java 的命名约定。如果一个组件（事件源）支持`Xxx`事件，它将有两个方法：`addXxxListener(XxxListener\
  \ listener)`和`removeXxxListener(XxxListener listener)`。当你对监听组件的`Xxx`事件感兴趣时，你调用`addXxxListener()`方法，并将一个事件监听器作为参数传入。当你不再想监听组件的`Xxx`事件时，你调用它的`removeXxxListener()`方法。要将你的`myXxxListener`对象添加为`sourceComponent`的`Xxx`事件监听器，你可以这样写：\n\
  \n```\n    sourceComponent.addXxxListener(myXxxListener);\n    ```\n\n这就是处理`Xxx`事件所需做的全部工作。看起来你可能需要执行很多步骤来处理一个事件，但事实并非如此。你总是可以通过使用实现了`XxxListener`接口的匿名内部类，来避免编写一个新的事件监听器类。例如，你可以将之前的代码写成两条语句，如下所示：\n\
  \n```\n// 使用匿名内部类创建一个事件监听器对象\nXxxListener myXxxListener = new XxxListener() {\n\
  public void aMethod(XxxEvent event) {\n// 你的事件处理代码写在这里\n}\n};\n// 将事件监听器添加到事件源组件\n\
  sourceComponent.addXxxListener(myXxxListener);\n```\n\n如果监听器接口是一个函数式接口，你可以使用 lambda\
  \ 表达式来创建它的实例。你的`XxxListener`是一个函数式接口，因为它只包含一个抽象方法。你可以避免创建冗长的匿名类，并将之前的代码重写如下：\n\n\
  ```\n// 使用 lambda 表达式添加事件监听器\nsourceComponent.addXxxListener((XxxEvent event) ->\
  \ {\n// 你的事件处理代码写在这里\n});\n```\n\n我已经讨论了足够多关于事件处理的理论。现在来看一个示例。向一个`JButton`添加事件监听器，然后将一个文本为`Close`的`JButton`添加到一个`JFrame`中。当`JButton`被按下时，`JFrame`关闭并且应用程序退出。`JButton`在被按下时会生成一个`Action`事件。一旦你知道了事件的名称（本例中是`Action`），你只需将前面通用示例中的`Xxx`替换为单词`Action`即可。你将知道处理`JButton`的`Action`事件需要使用的类和方法的名称。表\
  \ 1-6 将用于处理`JButton`的`Action`事件的类/接口/方法名称与我讨论中使用的通用名称进行了比较。\n\n表 1-6.\n\n通用事件处理器与\
  \ JButton 的 Action 事件处理器对比\n\n| 通用事件 Xxx | JButton 的 Action 事件 | 说明 |\n| --- | ---\
  \ | --- |\n| `XxxEvent` | `ActionEvent` | `java.awt.event`包中`ActionEvent`类的对象代表`JButton`的`Action`事件。\
  \ |\n| `XxxListener` | `ActionListener` | 实现了`ActionListener`接口的类的对象代表`JButton`的`Action`事件处理器。\
  \ |\n| `addXxxListener` `(XxxListener listener)` | `addActionListener` `(ActionListener\
  \ listener)` | `JButton`的`addActionListener()`方法用于向其`Action`事件添加监听器。 |\n| `removeXxxListener`\
  \ `(XxxListener listener)` | `removeActionListener` `(ActionListener listener)`\
  \ | `JButton`的`removeActionListener()`方法用于从其`Action`事件移除监听器。 |\n\n`ActionListener`接口很简单。它有一个名为`actionPerformed()`的方法。接口声明如下：\n\
  \n```\npublic interface ActionListener extends EventListener {\nvoid actionPerformed(ActionEvent\
  \ event);\n}\n```\n\n所有事件监听器接口都继承自`java.util`包中的`EventListener`接口。`EventListener`接口是一个标记接口，它没有任何方法。它只是所有事件监听器接口的祖先。当`JButton`被按下时，其所有已注册的`Action`监听器的`actionPerformed()`方法都会被调用。\n\
  \n使用 lambda 表达式，以下是如何向`JButton`添加`Action`监听器：\n\n```\n// 向 closeButton 添加 ActionListener\n\
  closeButton.addActionListener(e -> System.exit(0));\n```\n\n清单 1-24 显示了一个包含`JButton`的`JFrame`。它向`JButton`添加了一个`Action`监听器。该`Action`监听器只是退出应用程序。点击`JFrame`中的关闭按钮将关闭应用程序。\n\
  \n\n\n```\n// SimplestEventHandlingFrame.java\npackage com.jdojo.swing.intro;\n\
  import java.awt.FlowLayout;\nimport javax.swing.JFrame;\nimport javax.swing.JButton;\n\
  public class SimplestEventHandlingFrame extends JFrame {\nJButton closeButton =\
  \ new JButton(\"关闭\");\npublic SimplestEventHandlingFrame() {\nsuper(\"最简单的事件处理\
  \ JFrame\");\nthis.initFrame();\n}\nprivate void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n\
  // 为内容面板设置 FlowLayout\nthis.setLayout(new FlowLayout());\n// 将“关闭”JButton 添加到内容面板\n\
  this.getContentPane().add(closeButton);\n// 为 closeButton 添加 ActionListener\ncloseButton.addActionListener(e\
  \ -> System.exit(0));\n}\npublic static void main(String[] args) {\nSimplestEventHandlingFrame\
  \ frame = new SimplestEventHandlingFrame();\nframe.pack();\nframe.setVisible(true);\n\
  }\n}\n清单 1-24.\n一个带有“关闭”JButton 和 Action 的 JFrame\n```\n\n我们再来看一个为 `JButton` 添加\
  \ `Action` 监听器的例子。这次，我们向一个 `JFrame` 中添加两个按钮：一个“关闭”按钮，另一个用于显示其被点击的次数。每次点击第二个按钮时，其文本都会更新以显示已被点击的次数。你需要使用一个实例变量来维护点击计数。清单\
  \ 1-25 包含了完整的代码。图 1-57 展示了 `JFrame` 在初始显示时以及计数器按钮被点击三次后的状态。\n\n![A323071_2_En_1_Fig57_HTML.jpg](img/A323071_2_En_1_Fig57_HTML.jpg)\n\
  \n图 1-57.\n\n一个 JFrame 在初始显示时以及计数器 JButton 被点击三次后的状态\n\n```\n// JButtonClickedCounter.java\n\
  package com.jdojo.swing.intro;\nimport javax.swing.JFrame;\nimport java.awt.FlowLayout;\n\
  import java.awt.event.ActionEvent;\nimport javax.swing.JButton;\nimport java.awt.event.ActionListener;\n\
  public class JButtonClickedCounter extends JFrame {\nint counter;\nJButton counterButton\
  \ = new JButton(\"已点击 #0\");\nJButton closeButton = new JButton(\"关闭\");\npublic\
  \ JButtonClickedCounter() {\nsuper(\"JButton 点击计数器\");\nthis.initFrame();\n}\nprivate\
  \ void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n// 为内容面板设置\
  \ FlowLayout\nthis.setLayout(new FlowLayout());\n// 将两个 JButton 添加到内容面板\nthis.getContentPane().add(counterButton);\n\
  this.getContentPane().add(closeButton);\n// 为计数器 JButton 添加 ActionListener\ncounterButton.addActionListener(e\
  \ -> counterButton.setText(\"已点击 #\" + ++counter));\n// 为 closeButton JButton 添加\
  \ ActionListener\ncloseButton.addActionListener(e -> System.exit(0));\n}\npublic\
  \ static void main(String[] args) {\nJButtonClickedCounter frame = new JButtonClickedCounter();\n\
  frame.pack();\nframe.setVisible(true);\n}\n}\n清单 1-25.\n一个带有两个按钮和 Action 的 JFrame\n\
  ```\n\n图 1-58 展示了处理 `Action` 事件所涉及的类和接口的类图。\n\n![A323071_2_En_1_Fig58_HTML.jpg](img/A323071_2_En_1_Fig58_HTML.jpg)\n\
  \n图 1-58.\n\n与 Action 事件相关的类和接口的类图\n\n请注意，你不需要创建 `ActionEvent` 类的对象。当 `JButton`\
  \ 被按下时，它会创建一个 `ActionEvent` 类的对象，并将其传递给事件处理程序对象的 `actionPerformed()` 方法。默认情况下，`ActionEvent`\
  \ 的 `getActionCommand()` 方法返回 `JButton` 的文本。你可以使用 `JButton` 的 `setActionCommand()`\
  \ 方法显式设置其动作命令文本。`getModifiers()` 方法返回在动作事件期间按下的修饰键（如 Shift、Ctrl 和 Alt）的状态。修饰键是键盘上的一个键，只有与其他键组合使用时才有意义。`paramString()`\
  \ 方法返回一个描述该动作事件的字符串，通常用于调试目的。\n\n`getActionCommand()` 方法的一个用途是根据 `JButton` 上显示的文本执行某些操作。例如，你可能有一个用于在屏幕上显示或隐藏某些细节的\
  \ `JButton`。假设你想将 `JButton` 的文本显示为“显示”或“隐藏”。你可以像下面这样编写其 `Action` 监听器：\n\n```\nJButton\
  \ showHideButton = new JButton(\"隐藏\");\nshowHideButton.addActionListener(e -> {\n\
  if (e.getActionCommand().equals(\"显示\")) {\n// 在此处显示细节...\nshowHideButton.setText(\"\
  隐藏\");\n} else {\n// 在此处隐藏细节...\nshowHideButton.setText(\"显示\");\n}});\n```\n\n\
  在本节中，你学习了如何为组件添加事件处理程序。这些例子都很简单，它们为 `JButton` 添加了动作事件处理程序。`ActionListener` 接口是一个函数式接口，你利用\
  \ lambda 表达式编写了动作事件监听器。Swing 是在 lambda 表达式出现之前很久就开发出来的。并非所有事件监听器接口都是函数式接口，因此你不能使用\
  \ lambda 表达式来创建它们的对象。在这些情况下，你可以使用匿名类、成员内部类，或者在你的主类中实现监听器接口。\n\n\n\n## 处理鼠标事件\n\n\
  你可以在组件上处理鼠标活动（点击、进入、退出、按下和释放）。你将使用 `JButton` 来实验鼠标事件。`MouseEvent` 类的对象代表组件上的鼠标事件。现在，你可以猜到，要处理鼠标事件，你需要使用\
  \ `MouseListener` 接口。该接口的声明如下：\n\n```\npublic interface MouseListener extends EventListener\
  \ {\npublic void mouseClicked(MouseEvent e);\npublic void mousePressed(MouseEvent\
  \ e);\npublic void mouseReleased(MouseEvent e);\npublic void mouseEntered(MouseEvent\
  \ e);\npublic void mouseExited(MouseEvent e);\n}\n```\n\n`MouseListener` 接口有五个方法。你不能使用\
  \ lambda 表达式来创建鼠标事件处理器。当特定的鼠标事件发生时，会调用 `MouseListener` 接口的其中一个方法。例如，当鼠标指针进入组件的边界时，组件上会发生鼠标进入事件，并调用鼠标监听器对象的\
  \ `mouseEntered()` 方法。当鼠标指针离开组件的边界时，会发生鼠标退出事件，并调用 `mouseExited()` 方法。其他方法的名称不言自明。\n\
  \n`MouseEvent` 类有许多方法，用于提供鼠标事件的详细信息：\n\n*   `getClickCount()` 方法返回鼠标点击的次数。\n*  \
  \ `getX()` 和 `getY()` 方法返回事件发生时鼠标相对于组件的 x 和 y 位置。\n*   `getXOnScreen()` 和 `getYOnScreen()`\
  \ 方法返回事件发生时鼠标的绝对 x 和 y 位置。\n\n假设你只对处理 `JButton` 的两种鼠标事件感兴趣：鼠标进入和鼠标退出事件。`JButton`\
  \ 的文本会改变以描述该事件。鼠标事件处理代码如下：\n\n```\nmouseButton.addMouseListener(new MouseListener()\
  \ {\n@Override\npublic void mouseClicked(MouseEvent e) {\n// 无需处理\n}\n@Override\n\
  public void mousePressed(MouseEvent e) {\n// 无需处理\n}\n@Override\npublic void mouseReleased(MouseEvent\
  \ e) {\n// 无需处理\n}\n@Override\npublic void mouseEntered(MouseEvent e) {\nmouseButton.setText(\"\
  鼠标已进入！\");\n}\n@Override\npublic void mouseExited(MouseEvent e) {\nmouseButton.setText(\"\
  鼠标已退出！\");\n}\n});\n```\n\n在这段代码中，尽管你只对处理两种鼠标事件感兴趣，但你为 `MouseListener` 接口的所有五个方法都提供了实现。你将三个方法的主体留空了。清单\
  \ 1-26 演示了 `JButton` 的鼠标进入和退出事件。当 `JFrame` 显示时，尝试将鼠标移入和移出 `JButton` 的边界，以更改其文本，指示相应的鼠标事件。\n\
  \n```\n// HandlingMouseEvent.java\npackage com.jdojo.swing.intro;\nimport java.awt.FlowLayout;\n\
  import javax.swing.JFrame;\nimport javax.swing.JButton;\nimport java.awt.event.MouseListener;\n\
  import java.awt.event.MouseEvent;\npublic class HandlingMouseEvent extends JFrame\
  \ {\nJButton mouseButton = new JButton(\"尚未有鼠标移动！\");\npublic HandlingMouseEvent()\
  \ {\nsuper(\"处理鼠标事件\");\nthis.initFrame();\n}\nprivate void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n\
  this.setLayout(new FlowLayout());\nthis.getContentPane().add(mouseButton);\n// 为\
  \ JButton 添加一个 MouseListener\nmouseButton.addMouseListener(new MouseListener() {\n\
  @Override\npublic void mouseClicked(MouseEvent e) {\n}\n@Override\npublic void mousePressed(MouseEvent\
  \ e) {\n}\n@Override\npublic void mouseReleased(MouseEvent e) {\n}\n@Override\n\
  public void mouseEntered(MouseEvent e) {\nmouseButton.setText(\"鼠标已进入！\");\n}\n\
  @Override\npublic void mouseExited(MouseEvent e) {\nmouseButton.setText(\"鼠标已退出！\"\
  );\n}\n});\n}\npublic static void main(String[] args) {\nHandlingMouseEvent frame\
  \ = new HandlingMouseEvent();\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单\
  \ 1-26.\n处理鼠标事件\n```\n\n你是否总是必须为事件监听器接口的所有事件处理方法提供实现，即使你对它们并不全都感兴趣？不，不需要。Swing 设计者考虑到了这种不便，并设计了一种方法来避免它。Swing\
  \ 为某些 `XxxListener` 接口包含了一个便捷类。该类名为 `XxxAdapter`。我将它们称为适配器类。`XxxAdapter` 类被声明为抽象类，并实现了\
  \ `XxxListener` 接口。`XxxAdapter` 类为 `XxxListener` 接口中的所有方法提供了空实现。以下代码片段展示了具有两个方法\
  \ `m1()` 和 `m2()` 的 `XxxListener` 接口与其对应的 `XxxAdapter` 类之间的关系。\n\n```\npublic interface\
  \ XxxListener {\npublic void m1();\npublic void m2();\n}\npublic abstract class\
  \ XxxAdapter implements XxxListener {\n@Override\npublic void m1() {\n// 此处未提供实现\n\
  }\n@Override\npublic void m2() {\n// 此处未提供实现\n}\n}\n```\n\n并非所有事件监听器接口都有对应的适配器类。声明了多个方法的事件监听器接口，才有对应的适配器类。例如，`MouseListener`\
  \ 接口有一个名为 `MouseAdapter` 的适配器类。`MouseAdapter` 能为你带来什么好处？它可以为你节省几行不必要的代码。如果你只想处理少数鼠标事件，你可以创建一个继承自适配器类的匿名内部类（或常规内部类），并仅覆盖你感兴趣的方法。以下代码片段使用\
  \ `MouseAdapter` 类重写了清单 1-26 中使用的事件处理器：\n\n```\nmouseButton.addMouseListener(new\
  \ MouseAdapter() {\n@Override\npublic void mouseEntered(MouseEvent e) {\nmouseButton.setText(\"\
  鼠标已进入！\");\n}\n@Override\npublic void mouseExited(MouseEvent e) {\nmouseButton.setText(\"\
  鼠标已退出！\");\n}\n});\n```\n\n你可能会注意到，你无需担心 `MouseListener` 接口的其他三个方法，因为 `MouseAdapter`\
  \ 类已经为你提供了空实现。\n\n`ActionListener` 接口没有名为 `ActionAdapter` 的适配器类。你能猜到为什么没有 `ActionAdapter`\
  \ 类吗？由于 `ActionListener` 接口只有一个方法，提供一个适配器类并不会为你节省任何按键操作。\n\n\n\n## 摘要\n\nSwing 是一个用于开发带图形用户界面（GUI）的\
  \ Java 应用程序的控件工具包。开发 Swing 应用程序时使用的大多数类都位于 `javax.swing` 包中。一个 GUI 由多个部分组成；每个部分代表一个向用户显示信息并允许他们与应用程序交互的图形。在基于\
  \ Swing 的 GUI 应用程序中，每个部分都称为一个组件，它是一个 Java 对象。可以包含其他组件的组件称为容器。容器和组件按层次结构排列，形成父子关系。组件包含在容器内，而该容器本身又可以包含在另一个容器中。存在两种类型的容器：顶层容器和非顶层容器。顶层容器不包含在其他容器中，可以直接显示在桌面上。例如，`JFrame`\
  \ 类的一个实例代表一个顶层容器，它是一个可以拥有标题栏、菜单栏、边框和其他组件的窗口。`JButton` 类的一个实例代表一个组件。\n\n一个顶层容器由多个层组成，例如根窗格、分层窗格、玻璃窗格和内容窗格。组件被添加到内容窗格中。\n\
  \nSwing 提供了布局管理器，负责在容器中布置组件。布局管理器是一个对象，负责确定容器中要显示的组件的位置和大小。每个容器都有一个默认的布局管理器。例如，`BorderLayout`\
  \ 是 `JFrame` 的默认布局管理器。你可以使用容器的 `setLayout()` 方法来设置不同的布局管理器。如果某个组件的布局管理器设置为 `null`，则不使用任何布局管理器，你需要自己负责在容器中布置组件。\n\
  \n`FlowLayout` 是所有布局管理器中最简单的一种，它先水平布置组件，然后垂直布置。`BorderLayout` 将容器的空间划分为五个区域（北、南、东、西、中），可用于布置组件。`CardLayout`\
  \ 将容器中的组件像一叠卡片一样布置，一次只显示一个组件。`BoxLayout` 将容器中的组件水平排列成一行或垂直排列成一列。`GridLayout` 将组件排列在大小相等的单元格矩形网格中，每个组件恰好占据一个单元格。`GridBagLayout`\
  \ 将组件布置在由行和列组成的矩形单元格网格中，每个组件可以占据一个或多个单元格。`SpringLayout` 通过定义组件边缘之间的约束来布置组件；这些约束以弹簧（spring）的形式定义。`GroupLayout`\
  \ 通过形成组件的顺序组和并行组来布置组件。\n\n事件表示用户的操作，例如，用户点击按钮。用户通过事件与 Swing 组件交互。程序响应事件而执行操作称为事件处理。一个事件涉及三个参与者：事件源、事件和事件处理程序。事件源是生成事件的组件。事件由一个对象表示，该对象封装了导致事件发生的用户操作的详细信息。事件处理程序是特定接口的一个实例，它在事件发生时被执行。允许你处理事件的组件包含添加和移除事件处理程序的方法。事件处理中使用的类、接口和方法遵循一种命名约定，使得名称易于记忆。\n\
  \n问题与练习\n\n1.  什么是 Swing？\n2.  在 Swing 应用程序中，以下类的作用是什么：`Point`、`Dimension`、`Insets`\
  \ 和 `Rectangle`？\n3.  在 `JFrame` 中，你应该将组件添加到哪个位置：内容窗格还是玻璃窗格？\n4.  补全以下代码片段中缺失的代码，该代码用于获取\
  \ `JFrame` 内容窗格的引用：\n\n```\n    JFrame frame = new JFrame(\"My Frame\");\n    Container\
  \ contentPane = frame./* 在此处填写你的代码 */;\n    ```\n\n5.  `JFrame` 的 `pack()` 方法有什么作用？\n\
  6.  什么是布局管理器？为什么在 Swing 应用程序中使用布局管理器很重要？\n7.  `JFrame` 内容窗格的默认布局管理器是什么？\n8.  什么是\
  \ `BorderLayout`？它如何组织其组件？\n9.  说出一种布局管理器的名称，该管理器将其所有组件显示在大小相等的单元格网格中。\n10. 假设你向一个使用\
  \ `CardLayout` 的容器中添加了五个组件。在任何时候，该容器中会有多少个组件可见？\n11. 创建一个包含 `JFrame` 和两个按钮的 Swing\
  \ 应用程序。两个按钮分别标记为 `\"Top\"` 和 `\"Bottom\"`。Top 按钮应放置在 Bottom 按钮下方。当你将 `JFrame` 调高时，Top\
  \ 按钮应保持在 `JFrame` 的顶部，Bottom 按钮应保持在底部，从而在两个按钮之间形成一个垂直间隙。使用 `BoxLayout` 来实现此布局。\n\
  12. 在使用 `GridBagLayout` 布局管理器时，`GridBagConstraints` 类的作用是什么？\n13. 使用 `GridBagLayout`\
  \ 在 `JFrame` 中显示三个按钮。第一个按钮的右下角应接触第二个按钮的左上角，第二个按钮的右下角应接触第三个按钮的右上角。\n14. 在容器中布置 Swing\
  \ 组件时，什么是绝对定位？如何实现它？\n15. 什么是事件？当你对捕获 `JButton` 的点击事件感兴趣时，需要处理的事件类名称是什么？\n16. 创建一个包含\
  \ `JButton` 的 `JFrame`。将 `JButton` 标记为 `Exit`。当 `JButton` 被按下时，向标准输出打印一条 `\"Bye\"\
  ` 消息并退出应用程序。\n\n# 2. Swing 组件\n\n在本章中，你将学习：\n\n*   什么是 Swing 组件\n*   不同类型的 Swing\
  \ 组件\n*   如何在文本组件中验证输入\n*   如何使用菜单和工具栏\n*   如何使用 `JTable` 和 `JTree` 组件编辑表格和层次数据\n\
  *   如何使用自定义和标准对话框\n*   如何自定义组件的属性，例如颜色、边框、字体等\n*   如何绘制组件和图形\n*   如何使用即时绘制和双缓冲\n\
  \n本章中的所有示例程序都是 `jdojo.swing.component` 模块的成员，如清单 2-1 所示。\n\n```\n// module-info.java\n\
  module jdojo.swing.component {\nrequires java.desktop;\nexports com.jdojo.swing.component;\n\
  }\n清单 2-1.\njdojo.swing.component 模块的声明\n```\n\nSwing 和 AWT API 定义在 `java.desktop`\
  \ 模块中。你使用 Swing 的模块需要读取 `java.desktop` 模块，就像 `jdojo.swing.component` 模块所做的那样。\n\n\
  \n\n## 什么是 Swing 组件？\n\nSwing 提供了大量用于构建图形用户界面的组件。Swing 组件是 `JComponent` 类的一个实例。`JComponent`\
  \ 类位于 `javax.swing` 包中，它是所有 Swing 组件的基类。其类层次结构如图 2-1 所示。\n\n![A323071_2_En_2_Fig1_HTML.jpg](img/A323071_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1.\n\nJComponent 类的类层次结构\n\n`JComponent` 类继承自 `java.awt.Container` 类，而 `Container`\
  \ 类又继承自 `java.awt.Component` 类。`JComponent` 是一个抽象类，你不能直接实例化它。你必须使用它的某个子类，例如 `JButton`、`JTextField`\
  \ 等。\n\n由于 `JComponent` 类继承自 `Container` 类，每个 `JComponent` 也都可以充当容器。例如，一个 `JButton`\
  \ 可以充当另一个 `JButton` 或其他 `JComponent` 的容器。除非 Swing 库提供了像 `JPanel` 这样的 `JComponent`\
  \ 用作容器，否则你不会（也不需要）将 `JComponent` 用作容器。然而，这种层次结构允许你编写如下代码：\n\n```\nJButton btn =\
  \ new JButton(\"容器 JButton\");\nbtn.setLayout(new FlowLayout());\nbtn.add(new JButton(\"\
  一个容器 JButton。请勿使用。\"));\n```\n\n作为所有 Swing 组件的基类，`JComponent` 类提供了以下所有 Swing 组件都继承的基本功能。我将在本章后面详细讨论这些特性。\n\
  \n*   它提供了对工具提示的支持。工具提示是一段简短的文本，当鼠标指针在组件上停留一段时间时显示。\n*   它提供了对可插拔外观的支持。组件与外观（绘制和布局）和感觉（响应用户与组件的交互，如事件处理）相关的所有方面都由一个\
  \ UI 委托对象处理。与 `JComponent` 类类似，`javax.swing.plaf` 包中的 `ComponentUI` 是用作 UI 委托对象的基类。`JComponent`\
  \ 的每个子类都使用一种不同的 UI 委托对象，这些对象派生自 `ComponentUI` 类。例如，`JButton` 使用 `ButtonUI`，`JLabel`\
  \ 使用 `LabelUI`，`JToolTip` 使用 `ToolTipUI` 作为 UI 委托。\n*   它提供了在 Swing 组件周围添加边框的支持。边框可以是任何预定义类型（`Line`、`Bevel`、`Titled`、`Etched`\
  \ 等）或自定义边框类型。\n*   它提供了对无障碍访问的支持。应用程序的无障碍访问程度是指其能被不同能力（包括残障人士）的用户使用的程度。例如，它具有可以为视力受损用户以更大字体显示文本的功能。本书不涉及\
  \ Java 无障碍访问 API。\n*   它提供了对双缓冲的支持，这有助于实现平滑的屏幕绘制。当组件在屏幕上被擦除和绘制时，可能会出现闪烁。为了避免闪烁，它提供了一个屏幕外缓冲区。擦除和重绘（更新组件）在屏幕外缓冲区中完成，然后将屏幕外缓冲区复制到屏幕上。\n\
  *   它提供了将键盘上的按键绑定到 Swing 组件的功能。你可以将键盘上的任何按键与一个 `ActionListener` 对象绑定到一个组件上。当按下该键时，关联的\
  \ `ActionListener` 的 `actionPerformed()` 方法将被执行。\n*   它提供了在使用布局管理器时布局组件的支持。它包含获取和设置组件最小、首选和最大尺寸的方法。`JComponent`\
  \ 的这三种不同尺寸设置可作为布局管理器决定 `JComponent` 尺寸的提示。\n*   它允许将多个任意属性（`键-值` 对）关联到 Swing 组件并检索这些属性。`JComponent`\
  \ 的 `putClientProperty()` 和 `getClientProperty()` 方法允许你处理组件属性。\n\n表 2-1 列出了 `JComponent`\
  \ 类中一些所有 Swing 组件都可用的常用方法。\n\n表 2-1.\n\nJComponent 类的常用方法及其描述\n\n\n\n| 方法名称 | 描述\
  \ |\n| --- | --- |\n| `Border getBorder()` | 返回组件的边框，如果组件没有边框则返回 `null`。 |\n| `void\
  \ setBorder(Border border)` | 为组件设置边框。 |\n| `Object getClientProperty(Object key)`\
  \ | 返回与指定键关联的值。该值必须已通过 `putClientProperty (Object key, Object value)` 方法设置。 |\n\
  | `void putClientProperty(Object key, Object value)` | 向组件添加一个任意的键值对。 |\n| `Graphics\
  \ getGraphics()` | 返回组件的图形上下文对象，可用于在组件上绘制。 |\n| `Dimension getMaximumSize()` `Dimension\
  \ getMinimumSize()` `Dimension getPreferredSize ()` `Dimension getSize(Dimension\
  \ d)` `void setMaximumSize(Dimension d)` `void setMinimumSize(Dimension d)` `void\
  \ setPreferredSize(Dimension d)` `void setSize(Dimension d)` `void setSize(int width,\
  \ int height)` | 获取/设置组件的最大、最小、首选和实际尺寸。调用 `getSize()` 方法时，可以传入一个 `Dimension` 对象，尺寸将被存储在该对象中并返回同一个对象。这样，该方法可以避免创建新的\
  \ `Dimension` 对象。如果传入 `null`，则会创建一个 `Dimension` 对象，将实际尺寸存储其中，并返回该对象。 |\n| `String\
  \ getToolTipText()` | 返回此组件的工具提示文本。 |\n| `void setToolTipText(String text)` | 设置工具提示文本，当鼠标指针在组件上停留指定时间后显示。\
  \ |\n| `boolean isDoubleBuffered()` | 如果组件使用双缓冲，则返回 `true`，否则返回 `false`。 |\n| `void\
  \ setDoubleBuffered(boolean db)` | 决定组件是否应使用双缓冲进行绘制。 |\n| `boolean isFocusable()`\
  \ | 如果组件可以获得焦点，则返回 `true`，否则返回 `false`。 |\n| `void setFocusable(boolean focusable)`\
  \ | 决定组件是否可以获得焦点。 |\n| `boolean isVisible()` | 如果组件可见，则返回 `true`，否则返回 `false`。 |\n\
  | `void setVisible(boolean v)` | 设置组件可见或不可见。 |\n| `boolean isEnabled()` | 如果组件已启用，则返回\
  \ `true`，否则返回 `false`。 |\n| `void setEnabled(boolean e)` | 启用或禁用组件。组件默认是启用的。启用的组件会响应用户输入并生成事件。\
  \ |\n| `boolean requestFocus(boolean temporary)` `boolean requestFocusInWindow()`\
  \ `boolean requestFocusInWindow(boolean temporary)` | `requestFocus()` 和 `requestFocusInWindow()`\
  \ 方法请求组件获得输入焦点。应优先使用 `requestFocusInWindow()` 方法而非 `requestFocus()` 方法，因为其行为在所有平台上保持一致。布尔参数指示请求是否为临时性的。如果请求注定失败，这些方法返回\
  \ `false`；如果请求将成功（除非被否决），则返回 `true`。 |\n| `boolean isOpaque()` | 如果 `JComponent`\
  \ 是不透明的，则返回 `true`，否则返回 `false`。 |\n| `void setOpaque(boolean opaque)` | 设置 `JComponent`\
  \ 的不透明度。如果 `JComponent` 是不透明的，它将绘制其边界内的每个像素。如果它是非不透明的，它可能只绘制其边界内的部分像素或不绘制任何像素，从而让后面的像素透显出来。默认情况下，`JComponent`\
  \ 类将此值设置为 `false`，使其透明。然而，其子类的不透明度默认值取决于外观和具体组件。 |\n| `ComponentUI getUI()` | 返回负责渲染此组件的外观委托对象。此方法是在\
  \ JDK 9 中添加到 `JComponent` 类的。 |\n\n表 2-2 列出了一些所有 Swing 组件都可用的常用事件。每个 Swing 组件也支持一些特定事件。在讨论这些组件时，我会解释这些特定事件。请注意，除非另有说明，表\
  \ 2-2 中列出的所有事件都遵循 `XxxEvent` 类、`XxxListener` 接口、`XxxAdapter` 抽象类和 `addXxxListener()`\
  \ 方法的命名约定。也就是说，要处理组件的 `Xxx` 事件，你需要调用其 `addXxxListener(XxxListener l)` 方法，并传入一个实现了\
  \ `XxxListener` 接口的类的对象。`XxxListener` 接口中的所有方法都接受一个 `XxxEvent` 类型的参数。如果 `XxxListener`\
  \ 中有多个方法，则存在一个对应的 `XxxAdapter` 抽象类，它实现了 `XxxListener` 接口，并为 `XxxListener` 的方法提供了空实现。\n\
  \n表 2-2.\n\n所有 Swing 组件可用的部分常用事件\n\n| 事件类名 | 事件监听器接口 | 描述 |\n| --- | --- | --- |\n\
  | `ComponentEvent` | `ComponentListener` 方法：`componentShown()` `componentHidden()`\
  \ `componentResized()` `componentMoved()` | 当组件的可见性、大小或位置发生改变时触发该事件。 |\n| `FocusEvent`\
  \ | `FocusListener` 方法：`focusGained()` `focusLost()` | 当组件获得或失去焦点时触发该事件。 |\n| `KeyEvent`\
  \ | `KeyListener` 方法：`keyPressed()` `keyReleased()` `keyTyped()` | 当组件拥有焦点且键盘上的按键被按下、释放或键入时触发该事件。按下和释放按键事件在按下或释放键盘上的任意键时触发。键入事件仅在键入\
  \ Unicode 字符时触发。例如，在键盘上键入字符“a”时，会依次触发按键按下、按键键入和按键释放事件。 |\n| `MouseEvent` | `MouseListener`\
  \ 方法：`mousePressed()` `mouseReleased()` `mouseClicked()` `mouseEntered()` `mouseExited()`\
  \ | 当鼠标在组件上按下、释放和点击时，会触发鼠标按下、释放和点击事件。当鼠标进入组件的边界时，触发鼠标进入事件。当鼠标离开组件的边界时，触发鼠标离开事件。请注意，`MouseAdapter`\
  \ 类实现了三个接口：`MouseListener`、`MouseMotionListener` 和 `MouseWheelListener`（参见此表中的另外两个鼠标事件）。\
  \ |\n| `MouseEvent` | `MouseMotionListener` 方法：`mouseDragged()` `mouseMoved()` 注意：它在事件方法中使用\
  \ `MouseEvent` 对象作为参数。没有对应的 `MouseMotionEvent` 类。 | 当你在组件上按住鼠标按钮拖动鼠标时，触发鼠标拖动事件。即使鼠标离开组件，鼠标拖动事件也会持续触发，直到松开鼠标按钮。当你在组件上移动鼠标但未按下任何鼠标按钮时，触发鼠标移动事件。你可以使用\
  \ `MouseAdapter` 或 `MouseMotionAdapter` 抽象类为此事件编写监听器对象。 |\n| `MouseWheelEvent` |\
  \ `MouseWheelListener` 方法：`mouseWheelMoved()` | 当组件获得焦点且鼠标滚轮被转动时，触发鼠标滚轮移动事件。如果鼠标没有滚轮，则不会触发此事件。\
  \ |\n\n最初，Java 提供了 AWT（抽象窗口工具包）用于构建 GUI。所有 AWT 组件都位于 `java.awt` 包中，它们使用对等体来处理其工作方式。如果你使用\
  \ AWT 创建一个按钮，操作系统会创建一个对应的按钮，称为对等体，来处理 AWT 按钮的大部分工作方式。由于每个 AWT 组件都有一个对等体，因此 AWT 组件被称为重量级组件。\n\
  \n\n\nSwing 在 JDK 1.2 中作为 AWT 的替代方案成为 Java 类库的一部分。大多数 Swing 组件不使用对等体，因此它们被称为轻量级组件。对于每一个\
  \ AWT 组件，你都能找到对应的 Swing 组件。Swing 还提供了一些 AWT 中没有的额外组件，例如 `JTabbedPane`。Swing 组件的名称都以\
  \ `J` 作为前缀。例如，要使用按钮组件，AWT 提供了 `Button` 类，而 Swing 提供了 `JButton` 类。要显示一个带装饰的窗口，AWT\
  \ 提供了 `Frame` 类，而 Swing 提供了 `JFrame` 类。Swing 中的某些组件仍然是重量级组件。毕竟，基本的 GUI 功能始终由操作系统提供。Swing\
  \ 中的所有顶层容器（`JFrame`、`JDialog`、`JWindow` 和 `JApplet`）都是重量级组件，它们拥有对等体。除顶层容器外的 Swing\
  \ 组件都是轻量级组件。Swing 的轻量级组件使用其重量级容器的区域进行绘制。Swing 的轻量级组件是用 Java 编写的。\n\nAWT 的主要缺点在于，GUI\
  \ 在不同操作系统上可能看起来不同。AWT 支持所有平台上都可用的功能。由于依赖于操作系统的对等体，AWT 只能提供矩形组件。这些限制在 Swing 轻量级组件中都不存在。在\
  \ Swing 中，你可以拥有任意形状的组件，因为 Swing 使用 Java 代码绘制轻量级组件。Swing 提供了可插拔的外观和感觉，因此你不必局限于操作系统绘制\
  \ GUI 组件的方式。尽管允许，但不建议在同一应用程序中混合使用 Swing 和 AWT 组件。混合使用它们可能会导致难以调试的问题。本书仅涵盖 Swing。\n\
  \n在接下来的几节中，我将详细讨论几个 Swing 组件。\n\n## JButton\n\n`JButton` 也称为下压按钮或命令按钮。用户按下或点击 `JButton`\
  \ 来执行一个操作。通常，它会显示描述其被点击时所执行操作的文本。该文本也称为标签。`JButton` 还支持显示图标。你可以使用表 2-3 中列出的构造函数之一来创建\
  \ `JButton` 的实例。\n\n表 2-3.\n\nJButton 类的构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n|\
  \ `JButton()` | 创建一个没有标签或图标的 `JButton`。 |\n| `JButton(String text)` | 创建一个 `JButton`\
  \ 并将指定的文本设置为其标签。 |\n| `JButton(Icon icon)` | 创建一个带有图标且没有标签的 `JButton`。 |\n| `JButton(String\
  \ text, Icon icon)` | 创建一个带有指定标签和图标的 `JButton`。 |\n| `JButton(Action action)` |\
  \ 使用一个 `Action` 对象创建 `JButton`。稍后在本节中，你将看到一个为 `JButton` 使用 `Action` 对象的示例。 |\n\n\
  你可以创建一个文本为 `Close` 的 `JButton`，如下所示：\n\n```\nJButton closeButton = new JButton(\"\
  Close\");\n```\n\n要创建一个带图标的 `JButton`，你需要有一个图像文件。图标是一个固定大小的图像。实现了 `javax.swing.Icon`\
  \ 接口的类的对象代表一个图标。Swing 提供了一个非常有用的 `ImageIcon` 类，它实现了 `Icon` 接口。`ImageIcon` 类允许你在程序中从图像文件或包含\
  \ GIF、JPEG 或 PNG 图像的 URL 创建图标。以下代码片段展示了如何创建带图标的按钮：\n\n```\n// 创建图标\nIcon previousIcon\
  \ = new ImageIcon(\"C:/images/previous.gif\");\nIcon nextIcon = new ImageIcon(\"\
  C:/images/next.gif\");\n// 创建带图标的按钮\nJButton previousButton = new JButton(\"Previous\"\
  , previousIcon);\nJButton nextButton = new JButton(\"Next\", nextIcon);\n```\n\n\
  在 `ImageIcon` 类的构造函数中，你应该在文件路径中使用正斜杠（`/`）。你指定的文件路径会被转换为 URL，并且正斜杠在所有平台上都有效。此文件路径示例（`C:/images/next.gif`）适用于\
  \ Windows 平台。图 2-2 显示了一个包含三个按钮的 `JFrame`。两个按钮带有图标，一个只有文本。\n\n![A323071_2_En_2_Fig2_HTML.jpg](img/A323071_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2.\n\n带有图标和文本的按钮，以及只有文本的按钮\n\n在 Java 程序中，你大部分时间会使用的 `JButton` 事件只有一个。它被称为\
  \ `ActionEvent`。当你点击 `JButton` 时，它会被触发。`ActionListener` 接口是一个函数式接口，它只包含一个名为 `actionPerformed(ActionEvent\
  \ e)` 的方法。你可以使用 lambda 表达式来表示一个 `ActionListener`。以下是你如何使用 lambda 表达式为 `closeButton`\
  \ 的 `ActionEvent` 添加代码：\n\n```\ncloseButton.addActionListener(() ->  {\n// 处理动作事件的代码写在这里\n\
  });\n```\n\n`JButton` 支持键盘助记符，也称为键盘快捷键或键盘指示器。它是一个按键，当按下时，如果焦点位于包含该 `JButton` 的窗口中，则会激活该\
  \ `JButton`。助记键通常与修饰键（如 Alt 键）组合使用。修饰键取决于平台；但通常是 Alt 键。例如，假设你将 C 键设置为 `Close JButton`\
  \ 的助记键。当你按下 Alt+C 时，Close `JButton` 就会被点击。如果在 `JButton` 文本中找到了助记键所代表的字符，则该字符的首次出现会被加下划线。以下代码片段将\
  \ C 设置为 Close `JButton` 的助记键：\n\n```\n// 将 'C' 键设置为 closeButton 的助记键\ncloseButton.setMnemonic('C');\n\
  // 你也可以使用以下代码来设置助记键。\n// KeyEvent 类位于 java.awt.event 包中。\ncloseButton.setMnemonic(KeyEvent.VK_C);\n\
  ```\n\n\n\n代码展示了两种设置助记键的方法。当你不想使用字符键作为助记键时，可以采用第二种方法。例如，若要将`F3`键设置为助记键，可以使用第二种方法中的`KeyEvent.VK_F3`常量。图\
  \ 2-3 展示了一个“关闭”`JButton`，其文本的第一个字符带有下划线。当你按下 Alt+C 时，“关闭”`JButton`会被激活（效果等同于用鼠标点击它）。\n\
  \n![A323071_2_En_2_Fig3_HTML.jpg](img/A323071_2_En_2_Fig3_HTML.jpg)\n\n图 2-3.\n\n\
  一个以 C 作为键盘助记键的关闭按钮\n\n表 2-4 展示了`JButton`类中常用的方法。\n\n表 2-4.\n\nJButton 类的常用方法\n\n\
  | 方法 | 描述 |\n| --- | --- |\n| `Action getAction()` | 返回与`JButton`关联的`Action`对象。\
  \ |\n| `void setAction(Action a)` | 为`JButton`设置一个`Action`对象。调用此方法时，`JButton`的所有属性都会从指定的`Action`对象刷新。如果已设置了一个`Action`对象，新对象将替换旧对象。新的`Action`对象会被注册为`ActionListener`。任何通过`addActionListener()`方法注册到`JButton`的其他`ActionListener`仍保持注册状态。\
  \ |\n| `Icon getIcon()` | 返回与`JButton`关联的`Icon`对象。 |\n| `void setIcon(Icon icon)`\
  \ | 为`JButton`设置一个图标。 |\n| `int getMnemonic()` | 返回此`JButton`的键盘助记键。 |\n| `void\
  \ setMnemonic(int n)` `void setMnemonic(char c)` | 为`JButton`设置键盘助记键。 |\n| `String\
  \ getText()` | 返回`JButton`的文本。 |\n| `void setText()` | 设置`JButton`的文本。 |\n\n接下来，我们使用一个`Action`对象来创建`JButton`。到目前为止，你已经看到`JButton`只有四个常用属性：文本、图标、助记键和动作监听器。使用这些属性非常简单直接。那么，使用`Action`对象如何帮助你处理`JButton`呢？我们来看一个例子：假设你有一个按钮（比如“关闭”），它被放置在窗口的不同区域（比如不同的标签页）。如果这个按钮在窗口中被放置了四次，并且它们的外观和行为都必须一致，那么一个`Action`对象就能帮助你只编写一次“关闭”按钮的代码，并在多处重复使用。\n\
  \n`Action`封装了按钮的状态和行为。你可以在一个`Action`中设置文本、图标、助记键、工具提示文本、其他属性以及`ActionListener`，然后使用同一个`Action`来创建所有`JButton`实例。这样做的一个明显好处是，如果你想启用/禁用所有四个`JButton`，无需分别对它们进行启用/禁用操作。相反，你只需在`Action`中设置`enabled`属性，它就会启用/禁用所有`JButton`。让我们将这个用法扩展到菜单项和工具栏。在窗口中，通常需要提供一个菜单项、一个工具栏项和一个按钮来执行相同的操作。在这种情况下，你可以使用同一个`Action`来创建这三个组件（菜单项、工具栏项和按钮），以保持它们的状态同步。现在你可以体会到`Action`的好处在于代码复用以及保持多个组件状态同步。\n\
  \n`Action`是一个接口。`AbstractAction`类为`Action`接口提供了默认实现。`AbstractAction`是一个抽象类。你需要让你的类继承它。清单\
  \ 2-2 定义了一个`CloseAction`内部类，它继承自`AbstractAction`类。\n\n```\n// ActionJButtonTest.java\n\
  package com.jdojo.swing.component;\nimport java.awt.FlowLayout;\nimport javax.swing.JFrame;\n\
  import javax.swing.JButton;\nimport java.awt.event.ActionEvent;\nimport javax.swing.AbstractAction;\n\
  import javax.swing.Action;\nimport java.awt.Container;\npublic class ActionJButtonTest\
  \ extends JFrame {\n// 内部类从这里开始\npublic class CloseAction extends AbstractAction\
  \ {\npublic CloseAction() {\nsuper(\"Close\");\n}\n@Override\npublic void actionPerformed(ActionEvent\
  \ event) {\nSystem.exit(0);\n}\n} // 内部类在这里结束\nJButton closeButton1;\nJButton closeButton2;\n\
  Action closeAction = new CloseAction(); // 参见上面的内部类\npublic ActionJButtonTest()\
  \ {\nsuper(\"Using Action object with JButton\");\nthis.initFrame();\n}\nprivate\
  \ void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\nthis.setLayout(new\
  \ FlowLayout());\nContainer contentPane = this.getContentPane();\n// 使用同一个 closeAction\
  \ 对象创建两个关闭按钮\ncloseButton1 = new JButton(closeAction);\ncloseButton2 = new JButton(closeAction);\n\
  contentPane.add(closeButton1);\ncontentPane.add(closeButton2);\n}\npublic static\
  \ void main(String[] args) {\nActionJButtonTest frame = new ActionJButtonTest();\n\
  frame.pack();\nframe.setVisible(true);\n}\n}\n清单 2-2.\n使用 Action 对象创建和配置 JButton\n\
  ```\n\n`ActionJButtonTest`类创建了一个类型为`CloseAction`的`Action`对象，并使用它创建了两个按钮：`closeButton1`和`closeButton2`。`CloseAction`类将文本设置为`Close`，并在其`actionPerformed()`方法中直接退出应用程序。图\
  \ 2-4 展示了运行程序时得到的`JFrame`。它显示了两个`Close`按钮。点击其中任何一个都会调用`Action`对象的`actionPerformed()`方法，从而退出应用程序。\n\
  \n![A323071_2_En_2_Fig4_HTML.jpg](img/A323071_2_En_2_Fig4_HTML.jpg)\n\n图 2-4.\n\n\
  使用同一个 Action 实例创建的两个关闭按钮\n\n如果在使用`Action`对象时想为`JButton`设置任何属性，可以通过`Action`接口的`putValue(String\
  \ key, Object value)`方法来实现。例如，以下代码片段为`closeAction`对象设置了工具提示文本和助记键：\n\n```\n// 为\
  \ Action 对象设置工具提示文本\ncloseAction.putValue(Action.SHORT_DESCRIPTION, \"Closes the\
  \ application\");\n// 为 Action 对象设置助记键\ncloseAction.putValue(Action.MNEMONIC_KEY,\
  \ KeyEvent.VK_C);\n```\n\n如果你使用`Action`对象配置了`JButton`，之后又直接更改了`JButton`的属性，那么更改后的属性将生效，直到你再次更改`Action`对象中的该属性。假设你使用一个`CloseAction`对象创建了两个关闭按钮。如果你调用`closeButton1.setText(\"\
  Exit\")`，第一个按钮将显示文本`Exit`。如果你调用`closeAction.putValue(Action.NAME, \"Close/Exit\"\
  )`，两个按钮都将显示文本`Close/Exit`。\n\n\n\n## JPanel\n\n`JPanel` 是一个可容纳其他组件的容器。您可以设置其布局管理器、边框和背景颜色。通常，您使用\
  \ `JPanel` 来对相关组件进行分组，并将其添加到另一个容器中，例如添加到 `JFrame` 的内容窗格。请注意，`JPanel` 是一个容器，但不是顶级容器，而\
  \ `JFrame` 是顶级容器。因此，在 Swing 应用程序中，您不能单独显示一个 `JPanel`，除非您将其添加到顶级容器中。有时，`JPanel` 会被插入到两个组件之间以创建间隙。您也可以将\
  \ `JPanel` 用作绘图画布，例如用于绘制线条、矩形、圆形等。\n\n`JPanel` 的默认布局管理器是 `FlowLayout`。您可以选择在 `JPanel`\
  \ 类的构造函数中指定其布局管理器。您也可以在创建它之后，通过使用其 `setLayout()` 方法来更改其布局管理器。表 2-5 列出了 `JPanel`\
  \ 类的构造函数。\n\n表 2-5.\n\nJPanel 类的构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n| `JPanel()`\
  \ | 创建一个具有 `FlowLayout` 和双缓冲的 `JPanel`。 |\n| `JPanel(boolean isDoubleBuffered)`\
  \ | 创建一个具有 `FlowLayout` 和指定双缓冲标志的 `JPanel`。 |\n| `JPanel(LayoutManager layout)`\
  \ | 创建一个具有指定布局管理器和双缓冲的 `JPanel`。 |\n| `JPanel(LayoutManager layout, boolean isDoubleBuffered)`\
  \ | 创建一个具有指定布局管理器和双缓冲标志的 `JPanel`。 |\n\n以下代码片段展示了如何使用 `BorderLayout` 创建一个 `JPanel`\
  \ 并向其添加四个按钮。请注意，这些按钮被添加到 `JPanel`，而该 `JPanel` 又被添加到 `JFrame` 的内容窗格。您也可以将一个 `JPanel`\
  \ 添加到另一个 `JPanel` 中，以创建嵌套的、复杂的组件布局。\n\n```\n// 创建一个 JPanel 和四个按钮\nJPanel buttonPanel\
  \ = new JPanel(new BorderLayout());\nJButton northButton = new JButton(\"North\"\
  );\nJButton southButton = new JButton(\"South\");\nJButton eastButton = new JButton(\"\
  East\");\nJButton westButton = new JButton(\"west\");\n// 将按钮添加到 JPanel\nbuttonPanel.add(northButton,\
  \ BorderLayout.NORTH);\nbuttonPanel.add(southButton, BorderLayout.SOUTH);\nbuttonPanel.add(eastButton,\
  \ BorderLayout.EAST);\nbuttonPanel.add(westButton, BorderLayout.WEST);\n// 将 buttonPanel\
  \ 添加到 JFrame 的内容窗格，假设内容窗格的布局设置为 BorderLayout\ncontentPane.add(buttonPanel, BorderLayout.SOUTH);\n\
  ```\n\n## JLabel\n\n顾名思义，`JLabel` 是一个标签，用于在屏幕上标识或描述另一个组件。它可以显示文本、图标，或同时显示两者。通常，`JLabel`\
  \ 放置在其所描述组件的旁边（右侧或左侧）或顶部。图 2-5 显示了一个文本设置为 `Name:` 的 `JLabel`，它向用户指示他们应在旁边的字段中输入姓名。\n\
  \n![A323071_2_En_2_Fig5_HTML.gif](img/A323071_2_En_2_Fig5_HTML.gif)\n\n图 2-5.\n\n\
  一个文本为 Name: 且助记符设置为 N 的 JLabel 组件\n\n`JLabel` 的另一个常见用途是显示图像。Swing 不包含像 `JImage`\
  \ 这样的组件来显示图像。您需要使用带有 `Icon` 的 `JLabel` 来显示图像。表 2-6 列出了 `JLabel` 类的构造函数。\n\n表 2-6.\n\
  \nJLabel 类的构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n| `JLabel()` | 创建一个文本为空字符串且没有图标的\
  \ `JLabel`。 |\n| `JLabel(Icon icon)` | 创建一个带有图标且文本为空字符串的 `JLabel`。 |\n| `JLabel(Icon\
  \ icon, int horizontalAlignment)` | 创建一个带有图标和指定水平对齐方式的 `JLabel`。`JLabel` 在其显示区域内垂直居中对齐。您可以在其显示区域内指定其水平对齐方式，作为\
  \ `SwingConstants` 类中定义的以下常量之一：`LEFT`、`CENTER`、`RIGHT`、`LEADING` 或 `TRAILING`。 |\n\
  | `JLabel(String text)` | 创建一个带有指定 `text` 的 `JLabel`。这是最常用的构造函数。它在其显示区域内垂直居中，水平方向与起始边缘对齐。起始边缘由组件的方向决定。\
  \ |\n| `JLabel(String text, Icon icon, int horizontalAlignment)` | 创建一个带有指定 `text`、`icon`\
  \ 和水平对齐方式的 `JLabel`。 |\n| `JLabel(String text, int horizontalAlignment)` | 创建一个带有指定\
  \ `text` 和水平对齐方式的 `JLabel`。 |\n\n以下代码片段展示了一些如何创建 `JLabel` 的示例：\n\n```\n// 创建一个文本为\
  \ Name: 的 JLabel\nJLabel nameLabel = new JLabel(\"Name:\");\n// 在一个 JLabel 中显示来自名为\
  \ warning.gif 文件的图像\nJLabel warningImage = new JLabel(new Icon(\"C:/images/warning.gif\"\
  ));\n```\n\n`JLabel` 不会生成任何有趣的事件。但是，它有一些有用的方法可以用来自定义它。您将非常频繁地使用以下方法：\n\n*   `void\
  \ setText(String text)`\n*   `void setDisplayedMnemonic(char aChar)`\n*   `void\
  \ setDisplayedMnemonic(int key)`\n*   `void setLabelFor(Component c)`\n\n`setText()`\
  \ 方法用于设置 `JLabel` 的文本。`setDisplayedMnemonic()` 方法用于为 `JLabel` 设置键盘助记符。如果键盘助记符是 `JLabel`\
  \ 文本中出现的一个字符，则该字符会被加下划线，以给用户提示。`setLabelFor()` 方法接受对另一个组件的引用，并指示此 `JLabel` 描述该组件。`setDisplayedMnemonic()`\
  \ 和 `setLabelFor()` 这两个方法协同工作。当按下 `JLabel` 的助记键时，焦点将设置到 `setLabelFor()` 方法中使用的组件。图\
  \ 2-5 中显示的 `JLabel` 将其助记符设置为字符 `N`，您可以看到其文本中的字符 `N` 带有下划线。当用户按下 Alt+N 时，焦点将设置到显示在\
  \ `JLabel` 右侧的 `JTextField`。以下代码片段展示了如何创建图 2-5 中所示的组件排列：\n\n```\n// 创建一个用户可以在其中输入姓名的\
  \ JTextField\nJTextField nameTextField = new JTextField(\"Please enter your name...\"\
  );\n// 创建一个 JLabel，其助记符为 N，标签关联组件为 nameTextField\nJLabel nameLabel = new JLabel(\"\
  Name:\");\nnameLabel.setDisplayedMnemonic('N');\nnameLabel.setLabelFor(nameTextField);\n\
  // 将名称标签和字段添加到容器中，例如 contentPane\ncontentPane.add(nameLabel);\ncontentPane.add(nameTextField);\n\
  ```\n\n`JLabel` 类中还定义了其他方法，允许您设置/获取其在显示区域内的对齐方式以及其边界内的文本。如果您查看 `JLabel` 组件的特性，您会发现它存在的唯一目的就是描述另一个组件——一个真正利他的组件！\n\
  \n\n\n## 文本组件\n\n简单来说，你可以将文本定义为一个字符序列。Swing 提供了丰富的功能来处理文本。图 2-6 展示了 Swing 中表示文本组件的类图。\n\
  \n![A323071_2_En_2_Fig6_HTML.jpg](img/A323071_2_En_2_Fig6_HTML.jpg)\n\n图 2-6.\n\n\
  Swing 中与文本相关组件的类图\n\nSwing 提供了大量与文本相关的功能，以至于它有一个独立的包 `javax.swing.text`，其中包含了所有与文本相关的类。`JTextComponent`\
  \ 类位于 `javax.swing.text` 包中。其余类则位于 `javax.swing` 包中。\n\nSwing 提供了不同的组件来处理不同类型的文本。我们可以根据两个标准对文本组件进行分类：文本的行数和它们能处理的文本类型。根据文本组件能处理的文本行数，可以进一步分类如下：\n\
  \n*   单行文本组件\n*   多行文本组件\n\n单行文本组件设计用于处理一行文本，例如，用户名、密码、出生日期等。`JTextField`、`JPasswordField`\
  \ 和 `JFormattedTextField` 类的实例代表单行文本组件。\n\n多行文本组件设计用于处理多行文本，例如，评论、商店中商品的描述、文档等。`JTextArea`、`JEditorPane`\
  \ 和 `JTextPane` 类的实例代表多行文本组件。\n\n根据文本组件能处理的文本类型，可以将文本组件分类如下：\n\n*   纯文本组件\n*   样式文本组件\n\
  \n文本（或部分文本）的样式是指文本的显示方式，例如粗体、斜体、下划线等，以及字体和颜色。在文本组件的上下文中，纯文本意味着文本组件中包含的所有文本仅使用一种样式显示。`JTextField`、`JPasswordField`、`JFormattedTextField`\
  \ 和 `JTextArea` 是纯文本组件的例子。也就是说，你不能在 `JTextArea` 中显示多行文本，其中部分文本是粗体而其他部分不是。你只能在 `JTextArea`\
  \ 中以粗体字体显示全部文本，或以常规字体显示全部文本。请注意，纯文本并不意味着文本不能有样式。它意味着只有一种样式适用于整个文本（构成文本的所有字符）。\n\n\
  在样式文本中，你可以对文本的不同部分应用不同的样式。在样式文本中，文本的某些部分可以是粗体（或斜体、更大的字号、下划线等），而某些部分不是粗体。`JEditorPane`\
  \ 和 `JTextPane` 是样式组件的例子。\n\n所有 Swing 组件，包括 Swing 文本组件，都基于模型-视图-控制器（MVC）模式。MVC 模式使用三个组件：模型、视图和控制器。模型负责存储内容（文本）。视图负责显示内容。控制器负责响应用户操作。Swing\
  \ 将视图和控制器合并为一个称为 UI 的对象，该对象负责显示内容和响应用户操作。它将模型分开，并由 `Document` 接口的一个实例表示，该接口位于 `javax.swing.text`\
  \ 包中。文本组件的模型有时也被称为其文档。图 2-7 描绘了 Swing 文本组件的不同部分。\n\n![A323071_2_En_2_Fig7_HTML.gif](img/A323071_2_En_2_Fig7_HTML.gif)\n\
  \n图 2-7.\n\nSwing 文本组件的模型-视图-控制器模式的组成部分\n\n请注意，视图可能并不总是显示文本组件的全部内容。在图 2-7 中，模型包含了威廉·华兹华斯一首诗的四行内容，而视图只显示了第一行中的几个单词。\n\
  \nSwing 提供了 `Document` 接口的默认实现，这使得开发人员可以轻松处理常用的文本类型。当你使用文本组件时，它会为你创建一个合适的模型（在讨论中我有时将其称为文档），该模型适合存储文本组件的内容。图\
  \ 2-8 展示了 `Document` 接口以及相关类和接口的类图。图中显示的所有类和接口都位于 `javax.swing.text` 包中。\n\n![A323071_2_En_2_Fig8_HTML.jpg](img/A323071_2_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8.\n\n文档接口及相关接口和类的类图\n\n你可以使用 `setDocument(Document doc)` 方法为文本组件设置模型。`getDocument()`\
  \ 方法返回文本组件的模型。\n\n默认情况下，`JTextField`、`JPasswordField`、`JFormattedTextField` 和 `JTextArea`\
  \ 使用 `PlainDocument` 类的实例作为其模型。如果你想自定义这些文本组件的模型，你需要创建一个继承自 `PlainDocument` 类的类，并重写其中的一些方法。\n\
  \n`JEditorPane` 和 `JTextPane` 的模型取决于正在编辑和/或显示的内容类型。文本组件中字符的位置使用从零开始的索引。也就是说，文本中的第一个字符位于索引\
  \ 0。\n\n### JTextComponent\n\n`JTextComponent` 是一个抽象类。它是所有 Swing 文本组件的祖先。它包含了所有文本组件通用的功能。表\
  \ 2-7 列出了 `JTextComponent` 类中包含的一些常用文本组件方法。\n\n表 2-7.\n\nJTextComponent 类中的常用方法\n\
  \n\n\n| 方法 | 描述 |\n| --- | --- |\n| `Keymap addKeymap(String name, Keymap parentKeymap)`\
  \ | 向组件的键位映射层级结构中添加一个新的键位映射。 |\n| `void copy()` | 将选中的文本复制到系统剪贴板。 |\n| `void cut()`\
  \ | 将选中的文本移动到系统剪贴板。 |\n| `Action[] getActions()` | 返回文本编辑器的命令列表。 |\n| `Document\
  \ getDocument()` | 返回文本组件的模型。 |\n| `Keymap getKeymap()` | 返回文本组件当前激活的键位映射。 |\n|\
  \ `static Keymap getKeymap (String keymapName)` | 返回与此文档关联的、名称为 `keymapName` 的键位映射。\
  \ |\n| `String getSelectedText()` | 返回组件中选中的文本。如果没有选中文本或文档为空，则返回 `null`。 |\n| `int\
  \ getSelectionEnd()` | 返回选中文本的结束位置。 |\n| `int getSelectionStart()` | 返回选中文本的起始位置。\
  \ |\n| `String getText()` | 返回此文本组件中包含的文本。它返回的是组件模型中包含的文本，而非视图所显示的内容。 |\n| `String\
  \ getText(int offset, int length) throws BadLocationException` | 返回文本组件中包含的一部分文本，从\
  \ `offset` 位置开始，字符数等于 `length`。如果 `offset` 或 `length` 无效，则抛出 `BadLocationException`。例如，如果一个文本组件包含文本\
  \ `Hello`，那么 `getText(1, 3)` 将返回 `ell`。 |\n| `TextUI getUI()` | 返回文本组件的用户界面工厂。 |\n\
  | `boolean isEditable()` | 如果文本组件可编辑，则返回 `true`。否则，返回 `false`。 |\n| `void paste()`\
  \ | 将系统剪贴板的内容传输到文本组件模型中。如果组件中有选中的文本，则替换该选中文本。如果没有选中内容，则在当前位置之前插入内容。如果系统剪贴板为空，则不执行任何操作。\
  \ |\n| `void print()` | 显示一个打印对话框，允许您打印文本组件的内容，不包含页眉和页脚。此方法已被重载。该方法的其他版本提供了更多功能来打印文本组件的内容。\
  \ |\n| `void read(Reader source, Object description) throws IOException` | 从 `source`\
  \ 流中读取内容到文本组件，并丢弃组件原有的内容。`description` 是一个描述 `source` 流的对象。例如，要将文件 `test.txt` 的文本读入名为\
  \ `ta` 的 `JTextArea`，您可以编写 `FileReader fr = new FileReader(\"test.txt\");` `ta.read(fr,\
  \ \"Hello\");` `fr.close();` |\n| `void replaceSelection(String newContent)` | 用\
  \ `newContent` 替换选中的内容。如果没有选中的内容，则插入 `newContent`。如果 `newContent` 为 `null` 或空字符串，则移除选中的内容。\
  \ |\n| `void select(int start, int end)` | 选中 `start` 和 `end` 位置之间的文本。 |\n| `void\
  \ selectAll()` | 选中文本组件中的所有文本。 |\n| `void setDocument(Document doc)` | 为文本组件设置文档（即模型）。\
  \ |\n| `void setEditable(boolean editable)` | 如果 `editable` 为 `true`，则将文本组件设置为可编辑。如果\
  \ `editable` 为 `false`，则将文本组件设置为不可编辑。 |\n| `void setKeymap(Keymap keymap)` | 为文本组件设置键位映射。\
  \ |\n| `void setSelectionEnd(int end)` | 设置选区的结束位置。 |\n| `void setSelectionStart(int\
  \ start)` | 设置选区的起始位置。 |\n| `void setText(String newText)` | 设置文本组件的文本。 |\n| `void\
  \ setUI(TextUI newUI)` | 为文本组件设置新的 UI。 |\n| `void updateUI()` | 重新加载文本组件的可插拔 UI。\
  \ |\n| `void write(Writer output)` | 将文本组件的内容写入由 `output` 定义的流中。例如，要将名为 `ta` 的 `JTextArea`\
  \ 的文本写入名为 `test.txt` 的文件，您可以编写 `FileWriter wr = new FileWriter(\"test.txt\");` `ta.write(wr);`\
  \ `wr.close();` |\n\n文本组件最常用的方法是 `getText()` 和 `setText(String text)`。`getText()`\
  \ 方法以 `String` 形式返回文本组件的内容，而 `setText(String text)` 方法则设置参数中指定的文本组件的内容。\n\n\n\n\
  ### JTextField\n\n`JTextField` 可以处理（显示和/或编辑）一行纯文本。你可以通过多种方式使用其构造器来创建 `JTextField`。其构造器接受以下参数的组合：\n\
  \n*   一个字符串\n*   列数\n*   一个 `Document` 对象\n\n字符串指定初始文本。列数指定宽度。`Document` 对象指定模型。初始文本的默认值为\
  \ `null`，列数为零，文档（或模型）是 `PlainDocument` 类的一个实例。\n\n如果你不指定列数，其宽度将由初始文本决定。其首选宽度将足以显示整个文本。如果你指定了列数，其首选宽度将足以显示与指定列数相同数量的\
  \ `m` 字符（使用 `JTextField` 的当前字体）。表 2-8 列出了 `JTextField` 类的构造器。\n\n表 2-8.\n\nJTextField\
  \ 类的构造器\n\n| 构造器 | 描述 |\n| --- | --- |\n| `JTextField()` | 创建一个 `JTextField`，其初始文本、列数和文档均使用默认值。\
  \ |\n| `JTextField(Document document, String text, int columns)` | 创建一个 `JTextField`，使用指定的\
  \ `document` 作为其模型，`text` 作为其初始文本，`columns` 作为其列数。 |\n| `JTextField(int columns)`\
  \ | 创建一个 `JTextField`，使用指定的 `columns` 作为其列数。 |\n| `JTextField(String text)` | 创建一个\
  \ `JTextField`，使用指定的 `text` 作为其初始文本。 |\n| `JTextField(String text, int columns)`\
  \ | 创建一个 `JTextField`，使用指定的 `text` 作为其初始文本，`columns` 作为其列数。 |\n\n以下代码片段使用不同的构造器创建了多个\
  \ `JTextField` 实例：\n\n```\n// 创建一个空的 JTextField\nJTextField emptyTextField = new\
  \ JTextField();\n// 创建一个初始文本为 Hello 的 JTextField\nJTextField helloTextField = new\
  \ JTextField(\"Hello\");\n// 创建一个列数为 20 的 JTextField\nJTextField nameTextField =\
  \ new JTextField(20);\n```\n\n你可以在一个 `JTextField` 中输入多少个字符？在 `JTextField` 中可以输入的字符数没有限制。如果你想限制\
  \ `JTextField` 中的字符数，你需要自定义其模型。请注意，`JTextField` 的模型存储其内容。在查看自定义模型的实际应用之前，让我们先看看在\
  \ Swing 中为文本组件分离模型和视图的强大之处。\n\n让我们创建两个名为 `name` 和 `mirroredName` 的 `JTextField`\
  \ 实例。你将把 `mirroredName` 的模型设置为与 `name` 的模型相同。你正在做一件非常简单的事情。你对两个文本字段使用相同的模型。这使得两个字段互为镜像字段。如果你在其中之一输入文本，相同的文本会自动显示在另一个中。这是如何发生的？当你在\
  \ `JTextField` 中输入文本时，其模型会被更新。模型中的更新会向其视图（在这种情况下，两个组件充当视图）发送通知以更新自身。由于两个文本字段是具有相同模型的两个视图，因此模型中的更新（通过任一文本字段）将向两个文本字段发送通知，两者都会更新其视图以显示相同的文本。\n\
  \n清单 2-3 演示了如何在两个文本字段之间共享模型。运行此程序并在任一文本字段中输入一些文本。你将看到另一个文本字段会同时更新为相同的文本。\n\n```\n\
  // MirroredTextField.java\npackage com.jdojo.swing.component;\nimport javax.swing.JFrame;\n\
  import javax.swing.JTextField;\nimport javax.swing.JLabel;\nimport java.awt.GridLayout;\n\
  import java.awt.Container;\nimport javax.swing.text.Document;\npublic class MirroredTextField\
  \ extends JFrame {\nJLabel nameLabel = new JLabel(\"Name:\") ;\nJLabel mirroredNameLabel\
  \ = new JLabel(\"Mirrored Name:\") ;\nJTextField name = new JTextField(20);\nJTextField\
  \ mirroredName = new JTextField(20);\npublic MirroredTextField() {\nsuper(\"Mirrored\
  \ JTextField\");\nthis.initFrame();\n}\nprivate void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n\
  this.setLayout(new GridLayout(2, 0));\nContainer contentPane = this.getContentPane();\n\
  contentPane.add(nameLabel);\ncontentPane.add(name);\ncontentPane.add(mirroredNameLabel);\n\
  contentPane.add(mirroredName);\n// 将 mirroredName 的模型设置为与 name 的模型相同，\n// 这样它们就共享了内容的存储。\n\
  Document nameModel = name.getDocument();\nmirroredName.setDocument(nameModel);\n\
  }\npublic static void main(String[] args) {\nMirroredTextField frame = new MirroredTextField();\n\
  frame.pack();\nframe.setVisible(true);\n}\n}\n清单 2-3.\n通过共享模型实现 JTextField 的镜像\n\
  ```\n\n要为 `JTextField` 拥有自己的模型，你需要创建一个新类。新类可以实现 `Document` 接口，或者继承自 `PlainDocument`\
  \ 类。后一种方法更简单且最常用。清单 2-4 包含了 `LimitedCharDocument` 类的代码，该类继承自 `PlainDocument` 类。当你想要限制\
  \ `JTextField` 中的字符数时，你可以使用此类作为 `JTextField` 的模型。默认情况下，它允许用户输入无限数量的字符。你可以在其构造器中设置允许的字符数。\n\
  \n```\n// LimitedCharDocument.java\npackage com.jdojo.swing.component;\nimport javax.swing.text.PlainDocument;\n\
  import javax.swing.text.BadLocationException;\nimport javax.swing.text.AttributeSet;\n\
  public class LimitedCharDocument extends PlainDocument {\nprivate int limit = -1;\
  \ // 无限制\npublic LimitedCharDocument(int limit) {\nsuper();\nthis.limit = limit;\n\
  }\npublic void insertString(int offset, String str, AttributeSet a)\nthrows BadLocationException\
  \ {\nif (limit >= 0 && str != null) {\n// 检查限制\nint currentLength = this.getLength();\n\
  int newTextLength = str.length();\nif (currentLength + newTextLength > limit) {\n\
  newString = str.substring(0, limit - currentLength);\n}\n}\nsuper.insertString(offset,\
  \ newString, a);\n}\n}\n清单 2-4.\n一个表示具有有限字符数的纯文档的类\n```\n\n`LimitedCharDocument`\
  \ 类中的 `insertString()` 方法值得关注。`Document` 接口声明了一个 `insertString()` 方法。`PlainDocument`\
  \ 类提供了此方法的默认实现。`LimitedCharDocument` 类覆盖了默认实现，并检查插入的字符串是否会超过允许的字符数。如果插入的字符串超过了允许的最大字符数，它会截断多余的字符。如果你将限制设置为负数，则允许无限数量的字符。最后，该方法简单地调用其在\
  \ `PlainDocument` 类中的实现来执行实际的操作。\n\n每当文本被插入到 `JTextField` 中时，模型的 `insertString()`\
  \ 方法就会被调用。此方法接收以下三个参数：\n\n*   `int offset`：这是字符串在 `JTextField` 中插入的位置。第一个字符在偏移量\
  \ 0 处插入，第二个在偏移量 1 处插入，依此类推。\n*   `String str`：这是插入到 `JTextField` 中的字符串。当你在 `JTextField`\
  \ 中输入文本时，每输入一个字符就会调用一次 `insertString()` 方法，并且此参数将只包含一个字符。但是，当你将文本粘贴到 `JTextField`\
  \ 中或使用其 `setText()` 方法时，此参数可能包含多个字符。\n*   `AttributeSet a`：必须与插入文本关联的属性。\n\n你可以如下使用\
  \ `LimitedCharDocument`：\n\n\n\n```\n// 创建一个 JTextField，仅允许输入 10 个字符\nDocument tenCharDoc\
  \ = new LimitedCharDocument(10);\nJTextField t1 = new JTextField(tenCharDoc, \"\
  your name\", 10);\n```\n\n还有另一种为 `JTextField` 设置文档的方法。你需要创建一个继承自 `JTextField` 的新类，并重写其\
  \ `createDefaultModel()` 方法。该方法在 `JTextField` 类中被声明为 `protected`，默认返回一个 `PlainDocument`。你可以在此方法中返回自定义文档类的实例。自定义\
  \ `JTextField` 的代码如下所示：\n\n```\npublic class TenCharTextField extends JTextField\
  \ {\n@Override\nprotected Document createDefaultModel() {\n// 返回一个最多允许 10 个字符的文档对象\n\
  return new LimitedCharDocument(10);\n}\n// 其他代码写在这里\n}\n```\n\n当你需要一个容量为十个字符的 `JTextField`\
  \ 时，可以使用 `TenCharTextField` 类的实例。\n\n`createDefaultModel()` 方法是在 `JTextField` 类的构造函数中被调用的。因此，你不应该向自定义的\
  \ `JTextField` 传递参数，并在类的 `createDefaultModel()` 方法中使用该参数的值来构建模型。例如，以下代码片段不会产生预期的结果：\n\
  \n```\nstatic class LimitedCharTextField extends JTextField {\nprivate int maxChars\
  \ = -1;\npublic LimitedCharTextField(int maxChars) {\nthis.maxChars = maxChars;\n\
  }\nprotected Document createDefaultModel() {\n/* 错误地使用了 maxChars！！！当此方法被调用时，\nmaxChars\
  \ 将具有其默认值零。此方法将在\nJTextField 类的构造函数中被调用，而此时\n此类的构造函数尚未开始执行。\n*/\nreturn new LimitedCharDocument(maxChars);\n\
  }\n}\n```\n\n有时，你可能希望强制用户以特定格式在文本字段中输入文本，例如以 `mm/dd/yyyy` 格式输入日期，或仅输入数字。这可以通过为 `JTextField`\
  \ 组件使用自定义模型来实现。Swing 包含另一个名为 `JFormattedTextField` 的文本组件，它允许你为文本字段设置格式。如果你需要一个允许用户以特定格式添加文本的组件，`JFormattedTextField`\
  \ 会让工作变得容易得多。我稍后会讨论 `JFormattedTextField`。\n\n### JPasswordField\n\n`JPasswordField`\
  \ 是一种 `JTextField`，不同之处在于它允许隐藏字段中实际显示的字符。例如，当你使用登录表单输入密码时，你不希望别人从你背后看到屏幕上的密码。默认情况下，`JPasswordField`\
  \ 会为字段中的每个实际字符显示一个星号（`*`）字符。这被称为回显字符。默认的回显字符也取决于应用程序所使用的界面外观。你可以通过使用其 `setEchoChar(char\
  \ newEchoChar)` 方法来设置自己的回显字符。\n\n`JPasswordField` 类拥有与 `JTextField` 类相同的构造函数集合。你可以结合使用初始文本、列数以及一个\
  \ `Document` 对象来创建一个 `JPasswordField` 对象。\n\n```\n// 创建一个宽度为 10 个字符的密码字段\nJPasswordField\
  \ passwordField = new JPasswordField(10);\n```\n\n出于安全原因，`JPasswordField` 的 `getText()`\
  \ 方法已被弃用。你应该改用其 `getPassword()` 方法，该方法返回一个 `char[]`。在使用完 `char[]` 后，应将其所有元素重置为零值。以下代码片段展示了如何验证在\
  \ `JPasswordField` 中输入的密码：\n\n```\n// 获取在字段中输入的密码\nchar c[] = passwordField.getPassword();\n\
  // 假设你有一个字符串形式的正确密码。\n// 通常，你会从文件或数据库中获取它\nString correctPass = \"Hello\";\n// 不要将\
  \ c[] 中的密码转换为字符串。相反，将 correctPass\n// 转换为 char[]。或者，最好一开始就将 correctPass 作为 char[]\
  \ 存储。\nchar[] cp = correctPass.toCharArray();\n// 使用 java.util.Arrays 类的 equals()\
  \ 方法来比较 c 和 cp 是否相等\nif (Arrays.equals(c, cp)) {\n// 密码正确\n} else {\n// 密码错误\n}\n\
  // 将字符数组中的密码置空\nArrays.fill(c, (char)0);\nArrays.fill(cp, (char)0);\n```\n\n你可以使用\
  \ `setEchoChar()` 方法设置你选择的回显字符，如下所示：\n\n```\n// 将 # 设置为回显字符\npassword.setEchoChar('#');\n\
  ```\n\n你可以通过将回显字符设置为零来将 `JPasswordField` 用作 `JTextField`，如下所示：\n\n```\n// 将回显字符设置为\
  \ 0，这样实际的密码字符就可见了\npasswordField.setEchoChar((char)0);\n```\n\n提示\n\n你需要将 `JPasswordField`\
  \ 的回显字符设置为 ASCII 值为零的字符，这样 `JPasswordField` 才会显示实际字符。如果你将回显字符设置为 `'0'`（ASCII 值为\
  \ 48），则不会显示实际密码。相反，每个实际字符都会回显一个 `'0'` 字符。\n\n\n\n### JFormattedTextField\n\n`JFormattedTextField`\
  \ 是一种 `JTextField`，它额外具备以下两种能力：\n\n*   它允许你指定文本的编辑和/或显示格式。\n*   它还允许你指定当字段中的值为 `null`\
  \ 时的格式。\n\n除了用于获取和设置字段中文本的 `getText()` 和 `setText()` 方法之外，`JFormattedTextField`\
  \ 还提供了两个新方法，名为 `getValue()` 和 `setValue()`，它们允许你处理任何类型的数据，而不仅仅是文本。\n\n`JFormattedTextField`\
  \ 预配置为可处理三种数据类型：数字、日期和字符串。但是，你可以格式化任何对象以在此字段中显示。你可以通过使用其不同的构造函数（列于表 2-9 中）以多种方式设置\
  \ `JFormattedTextField` 的格式。\n\n表 2-9.\n\nJFormattedTextField 类的构造函数\n\n| 构造函数 |\
  \ 描述 |\n| --- | --- |\n| `JFormattedTextField()` | 创建一个没有格式化器的 `JFormattedTextField`。你需要使用其\
  \ `setFormatterFactory()` 或 `setValue()` 方法来设置格式化器。 |\n| `JFormattedTextField(Format\
  \ format)` | 创建一个 `JFormattedTextField`，它将使用指定的 `format` 来格式化字段中的文本。 |\n| `JFormattedTextField(`\
  \ `JFormattedTextField.AbstractFormatter formatter)` | 使用指定的格式化器创建一个 `JFormattedTextField`。\
  \ |\n| `JFormattedTextField(JFormattedTextField.AbstractFormatterFactory` `factory)`\
  \ | 使用指定的工厂创建一个 `JFormattedTextField`。 |\n| `JFormattedTextField(` `JFormattedTextField.AbstractFormatterFactory`\
  \ `factory, Object initialValue)` | 使用指定的工厂和指定的初始值创建一个 `JFormattedTextField`。 |\n\
  | `JFormattedTextField(Object value)` | 使用指定的值创建一个 `JFormattedTextField`。该字段将根据值的类自行配置以格式化该值。如果传递\
  \ `null` 作为值，则该字段无法知道需要格式化哪种类型的值，并且根本不会尝试格式化该值。 |\n\n理解格式（format）、格式化器（formatter）和格式化器工厂（formatter\
  \ factory）之间的区别是必要的。一个 `java.text.Format` 对象定义了对象以字符串形式呈现的格式。也就是说，它定义了一个对象作为字符串的样子；例如，一个日期对象以\
  \ `mm/dd/yyyy` 格式呈现时看起来像 `07/09/2008`。\n\n格式化器由一个 `JFormattedTextField.AbstractFormatter`\
  \ 对象表示，它使用一个 `java.text.Format` 对象来格式化一个对象。它的工作是将对象转换为字符串，并将字符串转换回对象。\n\n格式化器工厂是格式化器的集合。`JFormattedTextField`\
  \ 使用格式化器工厂来获取特定类型的格式化器。格式化器工厂由 `JFormattedTextField.AbstractFormatterFactory` 类的一个实例表示。\n\
  \n以下代码片段将 `dobField` 配置为以当前区域设置格式将其中的文本格式化为日期：\n\n```\nJFormattedTextField dobField\
  \ = new JFormattedTextField();\ndobField.setValue(new Date());\n```\n\n以下代码片段将 `salaryField`\
  \ 配置为以当前区域设置格式显示数字：\n\n```\nJFormattedTextField salaryField = new JFormattedTextField();\n\
  salaryField.setValue(new Double(11233.98));\n```\n\n你也可以使用格式化器创建一个 `JFormattedTextField`。你需要分别使用\
  \ `DateFormatter`、`NumberFormatter` 和 `MaskFormatter` 类来格式化日期、数字和字符串。这些类位于 `javax.swing.text`\
  \ 包中。\n\n```\n// 创建一个字段，以 mm/dd/yyyy 格式格式化日期\nDateFormat dateFormat = new SimpleDateFormat(\"\
  mm/dd/yyyy\");\nDateFormatter dateFormatter = new DateFormatter(dateFormat);\ndobField\
  \ = new JFormattedTextField(dateFormatter);\n// 创建一个字段，以 $#0,000.00 格式格式化数字\nNumberFormat\
  \ numFormat = new DecimalFormat(\"$#0,000.00\");\nNumberFormatter numFormatter =\
  \ new NumberFormatter(numFormat);\nsalaryField = new JFormattedTextField(numFormatter);\n\
  ```\n\n你需要使用掩码格式化器来格式化字符串。掩码格式化器使用表 2-10 中列出的特殊字符来指定掩码。\n\n表 2-10.\n\n用于指定掩码的特殊字符\n\
  \n| 字符 | 描述 |\n| --- | --- |\n| `#` | 一个数字。 |\n| `?` | 一个字母。 |\n| `A` | 一个字母或数字。\
  \ |\n| `*` | 任何字符。 |\n| `U` | 一个字母，小写字符映射为其对应的大写字符。 |\n| `L` | 一个字母，大写字符映射为其对应的小写字符。\
  \ |\n| `H` | 一个十六进制数字（A-F, a-f, 0-9）。 |\n| `'` | 单引号。这是一个转义字符，用于转义任何特殊格式化字符。 |\n\
  \n为了让用户以 `###-##-####` 格式输入社会安全号码，你可以按如下方式创建一个 `JFormattedTextField`。请注意，构造函数 `MaskFormatter(String\
  \ mask)` 会抛出 `ParseException`。\n\n```\nMaskFormatter ssnFormatter = null;\nJFormattedTextField\
  \ ssnField = null;\ntry {\nssnFormatter = new MaskFormatter(\"###-##-####\");\n\
  ssnField = new JFormattedTextField(ssnFormatter);\n} catch (ParseException e) {\n\
  e.printStackTrace();\n}\n```\n\n当你使用掩码格式化器时，你只能使用在掩码中指定的那么多字符。所有非特殊字符（特殊字符列表见表 2-10）都会按其在掩码中出现的样子显示。对于掩码中的每个特殊字符，会显示一个占位符（默认为空格）。例如，如果你将掩码指定为\
  \ `\"###-##-####\"`，`JFormattedTextField` 会显示 `\" - - \"` 作为占位符。你也可以使用 `MaskFormatter`\
  \ 类的 `setPlaceHolderCharacter(char placeholder)` 方法为特殊字符指定一个占位符字符。要在 SSN 字段中显示 `000-00-0000`，你需要使用\
  \ `‘0’` 作为掩码格式化器的占位符字符，如下所示：\n\n```\nssnFormatter = new MaskFormatter(\"###-##-####\"\
  );\nssnFormatter.setPlaceholderCharacter('0');\n```\n\n你可以在创建组件后使用 `JFormattedTextField`\
  \ 的 `setFormatterFactory()` 方法来更改格式化器。例如，要在创建名为 `dobField` 的 `JFormattedTextField`\
  \ 后为其设置日期格式，你可以编写：\n\n```\nDateFormatter df = new DateFormatter(new SimpleDateFormat(\"\
  mm/dd/yyyy\"));\nDefaultFormatterFactory dff = new DefaultFormatterFactory(df, df,\
  \ df, df); dobField.setFormatterFactory(dff);\n```\n\n`JFormattedTextField` 允许你指定四种类型的格式化器：\n\
  \n*   **空值格式化器**：当字段中的值为 `null` 时使用。\n*   **编辑格式化器**：当字段获得焦点时使用。\n*   **显示格式化器**：当字段未获得焦点且具有非\
  \ null 值时使用。\n*   **默认格式化器**：在缺少其他三种格式化器中的任何一种时使用。\n\n你可以通过在 `JFormattedTextField`\
  \ 类的构造函数中使用格式化器工厂或调用其 `setFormatterFactory()` 方法来指定所有四种格式化器。`JFormattedTextField.AbstractFormatterFactory`\
  \ 抽象类的一个实例代表一个格式化器工厂。`javax.swing.text.DefaultFormatterFactory` 类是 `JFormattedTextField.AbstractFormatterFactory`\
  \ 类的一个实现。当你指定一个格式化器时，同一个格式化器会替代四种格式化器使用。当你指定一个格式化器工厂时，你可以在四种不同情况下指定不同的格式化器。\n\n\n\
  \n假设你有一个名为 `dobField` 的 `JFormattedTextField` 用于显示日期。当此字段获得焦点时，你希望允许用户以 `mm/dd/yyyy`\
  \ 格式（例如 `07/07/2008`）编辑日期。当它失去焦点时，你希望以 `mmmm dd, yyyy` 格式（例如 `July 07, 2008`）显示日期。以下代码片段可实现此功能：\n\
  \n```\nDateFormatter df = new DateFormatter(new SimpleDateFormat(\"mmmm dd, yyyy\"\
  ));\nDateFormatter edf = new DateFormatter(new SimpleDateFormat(\"mm/dd/yyyy\"));\n\
  DefaultFormatterFactory ddf = new DefaultFormatterFactory(df, df, edf, df);\ndobField.setFormatterFactory(ddf);\n\
  ```\n\n如果你已将 `JFormattedTextField` 配置为格式化日期，则可以使用其 `getValue()` 方法获取一个 `Date` 对象。`getValue()`\
  \ 方法的返回类型是 `Object`，你需要将返回值强制转换为 `Date` 类型。你可以将光标置于字段中日期值的月、日、年、时、分、秒部分，并使用上/下箭头键更改该特定部分。如果你想在输入时覆盖字段中的值，则需要通过使用\
  \ `setOverwriteMode(true)` 方法将格式化程序设置为覆盖模式。\n\n使用 `JFormattedTextField` 的另一个优势是可以限制字段中可输入的字符数。回想一下，在上一节中，你是通过为\
  \ `JTextField` 使用自定义文档来实现这一点的。你可以通过设置掩码格式化程序来实现相同的效果。假设你希望允许用户在字段中最多输入两个字符。你可以按如下方式实现：\n\
  \n```\nJFormattedTextField twoCharField = new JFormattedTextField(new MaskFormatter(\"\
  **\"));\n```\n\n### JTextArea\n\n`JTextArea` 可以处理多行纯文本。大多数情况下，当你在 `JTextArea` 中有多行文本时，你将需要滚动功能。`JTextArea`\
  \ 本身不提供滚动功能。相反，当你需要在任何 Swing 组件中具有滚动功能时，你需要从另一个名为 `JScrollPane` 的 Swing 组件获得帮助。\n\
  \n你可以为 `JTextArea` 指定行数和列数，这些行数和列数用于确定其首选大小。行数用于确定其首选高度。如果你将行数设置为 `N`，这意味着其首选高度将被设置为在当前字体设置下显示\
  \ `N` 行文本。列数用于确定其首选宽度。如果你将列数设置为 `M`，这意味着其首选宽度被设置为 `M` 乘以当前字体设置下字符 `m`（小写 M）的宽度。\n\
  \n`JTextArea` 提供了多个构造函数，用于使用初始文本、模型、行数和列数的组合作为参数来创建 `JTextArea` 组件，如表 2-11 所示。\n\
  \n表 2-11.\n\nJTextArea 类的构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n| `JTextArea()` |\
  \ 使用默认模型、初始字符串为 `null`、行/列数为零创建一个 `JTextArea`。 |\n| `JTextArea(Document doc)` |\
  \ 使用指定的 `doc` 作为其模型创建一个 `JTextArea`。其初始字符串设置为 `null`，行/列数设置为零。 |\n| `JTextArea(Document\
  \ doc, String text, int rows, int columns)` | 使用其参数中指定的所有属性（模型、初始文本、行和列）创建一个 `JTextArea`。\
  \ |\n| `JTextArea(int rows, int columns)` | 使用默认模型、初始字符串为 `null` 以及指定的行/列数创建一个 `JTextArea`。\
  \ |\n| `JTextArea(String text)` | 使用指定的初始文本创建一个 `JTextArea`。设置默认模型，行/列数设置为零。 |\n\
  | `JTextArea(String text, int rows, int columns)` | 使用指定的文本、行和列创建一个 `JTextArea`。使用默认模型。\
  \ |\n\n以下代码片段使用不同的初始值创建了多个 `JTextArea` 实例：\n\n```\n// 创建一个空白的 JTextArea\nJTextArea\
  \ emptyTextArea = new JTextArea();\n// 创建一个 10 行 50 列的 JTextArea\nJTextArea commentsTextArea\
  \ = new JTextArea(10, 50);\n// 创建一个 10 行 50 列且初始文本为 \"Enter resume here\" 的 JTextArea\n\
  JTextArea resumeTextArea = new JTextArea(\"Enter resume here\", 10, 50);\n```\n\n\
  非常重要的一点是，请记住，当你使用 `JTextArea` 时，大多数情况下你的文本大小会大于其在屏幕上的大小，因此你将需要滚动功能。要为 `JTextArea`\
  \ 添加滚动功能，你需要将其添加到 `JScrollPane` 中，然后将 `JScrollPane` 添加到容器中，而不是 `JTextArea`。以下代码片段演示了这一概念。假设你有一个名为\
  \ `myFrame` 的 `JFrame`，其内容面板的布局设置为 `BorderLayout`，并且你希望在中心区域添加一个可滚动的 `JTextArea`。\n\
  \n```\n// 创建 JTextArea\nJTextArea resumeTextArea = new JTextArea(\"Enter resume\
  \ here\", 10, 50);\n// 将 JTextArea 添加到 JScrollPane\nJScrollPane sp = new JScrollPane(resumeTextArea);\n\
  // 获取 JFrame 内容面板的引用\nContainer contentPane = myFrame.getContentPane();\n// 将 JScrollPane\
  \ (sp) 添加到内容面板，而不是 JTextArea\ncontentPane.add(sp, BorderLayout.CENTER);\n```\n\n\
  表 2-12 包含了一些 `JTextArea` 的常用方法。大多数情况下，你将使用其 `setText()`、`getText()` 和 `append()`\
  \ 方法。\n\n表 2-12.\n\nJTextArea 的常用方法\n\n\n\n| 方法 | 描述 |\n| --- | --- |\n| `void append(String\
  \ text)` | 将指定的 `text` 追加到 `JTextArea` 的末尾。 |\n| `int getLineCount()` | 返回 `JTextArea`\
  \ 中的行数。 |\n| `int getLineStartOffset(int line) throws BadLocationException` `int\
  \ getLineEndOffset(int line) throws BadLocationException` | 返回指定 `line` 编号的起始和结束偏移量（也称为位置，从零开始）。如果\
  \ `line` 编号超出范围，则抛出异常。此方法在与 `getLineCount()` 方法结合使用时非常有用。你可以在循环中使用这三个方法逐行解析 `JTextArea`\
  \ 中包含的文本。 |\n| `int getLineOfOffset(int offset) throws BadLocationException` | 返回指定\
  \ `offset` 所在的行号。 |\n| `boolean getLineWrap()` | 如果已设置自动换行，则返回 `true`。否则，返回 `false`。\
  \ |\n| `int getTabSize()` | 返回一个制表符所使用的字符数。默认情况下，返回 8。 |\n| `boolean getWrapStyleWord()`\
  \ | 如果单词换行已设置为 `true`，则返回 `true`。否则，返回 `false`。 |\n| `void insert(String text, int\
  \ offset)` | 在指定的 `offset` 处插入指定的 `text`。如果模型为 `null` 或指定的 `text` 为空或 `null`，则调用此方法无效。\
  \ |\n| `void replaceRange(String text, int start, int end)` | 用指定的 `text` 替换 `start`\
  \ 和 `end` 位置之间的文本。 |\n| `void setLineWrap(boolean wrap)` | 设置 `JTextArea` 的自动换行策略。如果自动换行设置为\
  \ `true`，则当一行超出 `JTextArea` 的宽度时，该行将被换行。如果设置为 `false`，即使行比 `JTextArea` 的宽度长，也不会换行。默认情况下，它被设置为\
  \ `false`。 |\n| `void setTabSize(int size)` | 设置一个制表符将扩展到的字符数。 |\n| `void setWrapStyleWord(boolean\
  \ word)` | 当自动换行设置为 `true` 时，设置单词换行样式。当设置为 `true` 时，行在单词边界处换行。否则，行在字符边界处换行。默认情况下，它被设置为\
  \ `false`。 |\n\n`JTextArea` 在其可显示区域内使用可配置的策略进行换行和单词换行。如果自动换行设置为 `true` 并且一行比组件的宽度长，则该行将被换行。默认情况下，自动换行设置为\
  \ `false`。自动换行通过 `setLineWrap(boolean lineWrap)` 方法设置。\n\n一行可以在单词边界或字符边界处换行，这由单词换行策略决定。单词换行策略通过\
  \ `setWrapStyleWord(boolean wordWrap)` 方法设置。仅当调用了 `setLineWrap(true)` 时，调用此方法才生效。也就是说，单词换行策略定义了自动换行策略的细节。图\
  \ 2-9 显示了在 `JFrame` 中显示的三个 `JTextArea` 组件。\n\n![A323071_2_En_2_Fig9_HTML.jpg](img/A323071_2_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9.\n\nJTextArea 中自动换行和单词换行的效果\n\n对于图中的三个 `JTextArea` 组件（从左到右），自动换行和单词换行的设置分别为\
  \ (`true`, `true`)、(`true`, `false`) 和 (`false`, `true`)。第一个在单词边界处换行。第二个在字符边界处换行。第三个根本没有换行，你无法在其宽度内查看整个文本。请注意，这三个\
  \ `JTextArea` 组件都是直接添加到 `JFrame` 中的，而没有将其添加到 `JScrollPane` 中。\n\n### JEditorPane\n\
  \n`JEditorPane` 是一个文本组件，旨在处理不同类型的文本。默认情况下，它知道如何处理纯文本、HTML 和富文本格式 (RTF)。尽管它旨在编辑和显示多种类型的内容，但它主要用于显示仅包含基本\
  \ HTML 元素的 HTML 文档。对 RTF 内容的支持非常基础。\n\n`JEditorPane` 使用特定的 `EditorKit` 对象来处理特定类型的内容。如果你想在此组件中处理新类型的内容，则需要创建一个自定义的\
  \ `EditorKit` 类，该类是 `javax.swing.text.EditorKit` 类的子类。如果你仅使用此组件来显示 HTML 内容，则无需担心\
  \ `EditorKit`；该组件会为你处理与 `EditorKit` 相关的功能。使用 `JEditorPane` 显示 HTML 页面只需一行代码，如下所示：\n\
  \n```\n// 创建一个 JEditorPane 来显示 yahoo.com 网页\nJEditorPane htmlPane = new JEditorPane(\"\
  http://www.yahoo.com\");\n```\n\n请注意，`JEditorPane` 类的某些构造函数会抛出 `IOException`。当你指定\
  \ URL 时，必须使用 URL 的完整形式，并以协议开头。你可以通过以下三种不同方式让 `JEditorPane` 知道它需要安装哪种类型的 `EditorKit`\
  \ 来处理其内容：\n\n*   通过调用 `setContentType(String contentType)` 方法\n*   通过调用 `setPage(URL\
  \ url)` 或 `setPage(String url)` 方法\n*   通过调用 `read(InputStream in, Object description)`\
  \ 方法\n\n`JEditorPane` 预配置为理解三种类型的内容：text/plain、text/html 和 text/rtf。你可以使用以下代码来显示文本\
  \ `Hello`，并使用 HTML 中的 `<h1>` 标签：\n\n```\nhtmlPane.setContentType(\"text/html\");\n\
  htmlPane.setText(\"Hello\");\n```\n\n当你调用其 `setPage()` 方法时，它会使用适当的 `EditorKit` 来处理\
  \ URL 提供的内容。在以下代码片段中，`JEditorPane` 根据内容类型使用 `EditorKit`：\n\n```\n// 处理一个 HTML 页面\n\
  editorPane.setPage(\"http://www.yahoo.com\");\n// 处理一个 RTF 文件。当你使用文件协议时，可以使用三个斜杠代替一个\n\
  editorPane.setPage(\"file:///C:/test.rtf\");\n```\n\n`JEditorPane` 将流中的内容读取到编辑器窗格中。如果其编辑器工具包已设置为处理\
  \ HTML 内容，并且指定的描述是 `javax.swing.text.html.HTMLDocument` 类型，则内容将作为 HTML 读取。否则，内容将作为纯文本读取。\n\
  \n当你处理 HTML 文档时，你可能希望在单击超链接时导航到不同的页面。为了使用超链接，你需要向 `JEditorPane` 添加一个超链接监听器，并在事件监听器的\
  \ `hyperlinkUpdate()` 方法中，使用 `setPage()` 方法导航到新页面。超链接上的三种操作类型之一：`ENTERED`、`EXITED`\
  \ 和 `ACTIVATED`，会触发 `hyperlinkUpdate()` 方法。当鼠标进入超链接区域时发生 `ENTERED` 事件，当鼠标离开超链接区域时发生\
  \ `EXITED` 事件，当单击超链接时发生 `ACTIVATED` 事件。当你想要使用超链接导航到另一个页面时，请确保在你的超链接监听器的 `hyperlinkUpdate()`\
  \ 方法中检查 `ACTIVATED` 事件。以下代码片段使用 lambda 表达式向 `JEditorPane` 添加一个 `HyperlinkListener`：\n\
  \n```\neditorPane.addHyperlinkListener((HyperlinkEvent event) -> {\nif (event.getEventType()\
  \ == HyperlinkEvent.EventType.ACTIVATED) {\ntry {\neditorPane.setPage(event.getURL());\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}\n});\n```\n\n\n\n如果你想知道 `JEditorPane`\
  \ 中何时加载了新页面，你需要添加一个属性变更监听器来监听其属性变更事件，并检查名为 `page` 的属性是否发生了变化。清单 2-5 包含了使用 `JEditorPane`\
  \ 作为浏览器查看网页的完整代码。运行程序时，你可以在 URL 字段中输入网页地址，然后按 Enter 键（或点击 Go 按钮），浏览器就会显示新 URL 的内容。你也可以点击内容中的超链接来导航到另一个网页。代码简洁明了，并包含了足够的注释来帮助你理解程序逻辑。\n\
  \n```\n// HTMLBrowser.java\npackage com.jdojo.swing.component;\nimport javax.swing.JFrame;\n\
  import java.awt.Container;\nimport javax.swing.JLabel;\nimport javax.swing.JScrollPane;\n\
  import javax.swing.Box;\nimport javax.swing.JEditorPane;\nimport javax.swing.JTextField;\n\
  import javax.swing.JButton;\nimport java.awt.BorderLayout;\nimport java.net.URL;\n\
  import javax.swing.event.HyperlinkEvent;\nimport java.beans.PropertyChangeEvent;\n\
  import java.net.MalformedURLException;\nimport java.io.IOException;\npublic class\
  \ HTMLBrowser extends JFrame {\nJLabel urlLabel = new JLabel(\"URL:\");\nJTextField\
  \ urlTextField = new JTextField(40);\nJButton urlGoButton = new JButton(\"Go\");\n\
  JEditorPane editorPane = new JEditorPane();\nJLabel statusLabel = new JLabel(\"\
  Ready\");\npublic HTMLBrowser(String title) {\nsuper(title);\ninitFrame();\n}\n\
  // 初始化 JFrame 并向其中添加组件\nprivate void initFrame() {\nthis.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = this.getContentPane();\nBox urlBox = this.getURLBox();\n\
  Box editorPaneBox = this.getEditPaneBox();\ncontentPane.add(urlBox, BorderLayout.NORTH);\n\
  contentPane.add(editorPaneBox, BorderLayout.CENTER);\ncontentPane.add(statusLabel,\
  \ BorderLayout.SOUTH);\n}\nprivate Box getURLBox() {\n// URL 框包含一个 JLabel、一个 JTextField\
  \ 和一个 JButton\nBox urlBox = Box.createHorizontalBox();\nurlBox.add(urlLabel);\n\
  urlBox.add(urlTextField);\nurlBox.add(urlGoButton);\n// 为 urlTextField 添加动作监听器，以便当用户\n\
  // 输入 url 并按下回车键时，应用程序\n// 导航到新的 URL。\nurlTextField.addActionListener(e -> {\nString\
  \ urlString = urlTextField.getText();\ngo(urlString);\n});\n// 为 Go 按钮添加动作监听器\n\
  urlGoButton.addActionListener(e -> go());\nreturn urlBox;\n}\nprivate Box getEditPaneBox()\
  \ {\n// 要显示 HTML，必须将编辑器窗格设置为不可编辑。\n// 否则，你会看到一个可编辑的 HTML 页面，看起来不太美观。\neditorPane.setEditable(false);\n\
  // URL 框包含一个 JLabel、一个 JTextField 和一个 JButton\nBox editorBox = Box.createHorizontalBox();\n\
  // 将 JEditorPane 放入 JScrollPane 中以提供滚动功能\neditorBox.add(new JScrollPane(editorPane));\n\
  // 为编辑器窗格添加超链接监听器，以便当用户点击超链接时，\n// 它能够导航到新页面。\neditorPane.addHyperlinkListener((HyperlinkEvent\
  \ event) -> {\nif (event.getEventType() == HyperlinkEvent.EventType.ACTIVATED) {\n\
  go(event.getURL());\n} else if (event.getEventType() == HyperlinkEvent.EventType.ENTERED)\
  \ {\nstatusLabel.setText(\"请点击此链接访问页面\");\n} else if (event.getEventType()\n== HyperlinkEvent.EventType.EXITED)\
  \ {\nstatusLabel.setText(\"就绪\");\n}\n});\n// 添加属性变更监听器，以便我们可以\n// 用新页面的 url 更新\
  \ URL 文本字段\neditorPane.addPropertyChangeListener((PropertyChangeEvent e) -> {\n\
  String propertyName = e.getPropertyName();\nif (propertyName.equalsIgnoreCase(\"\
  page\")) {\nURL url = editorPane.getPage();\nurlTextField.setText(url.toExternalForm());\n\
  }\n});\nreturn editorBox;\n}\n// 导航到 URL JTextField 中输入的 url\npublic void go() {\n\
  try {\nURL url = new URL(urlTextField.getText());\nthis.go(url);\n} catch (MalformedURLException\
  \ e) {\nsetStatus(e.getMessage());\n}\n}\n// 导航到指定的 URL\npublic void go(URL url)\
  \ {\ntry {\neditorPane.setPage(url);\nurlTextField.setText(url.toExternalForm());\n\
  setStatus(\"就绪\");\n} catch (IOException e) {\nsetStatus(e.getMessage());\n}\n}\n\
  // 导航到以字符串形式指定的 URL\npublic void go(String urlString) {\ntry {\nURL url = new URL(urlString);\n\
  go(url);\n} catch (IOException e) {\nsetStatus(e.getMessage());\n}\n}\nprivate void\
  \ setStatus(String status) {\nstatusLabel.setText(status);\n}\npublic static void\
  \ main(String[] args) {\nHTMLBrowser browser = new HTMLBrowser(\"HTML 浏览器\");\n\
  browser.setSize(700, 500);\nbrowser.setVisible(true);\n// 让我们访问 yahoo.com\nbrowser.go(\"\
  http://www.yahoo.com\");\n}\n}\n清单 2-5.\n使用 JEditorPane 组件的 HTML 浏览器\n```\n\n以下是程序的重要部分：\n\
  \n*   `getURLBox()` 方法将一个 `JLabel`、一个 `JTextField` 和一个 `JButton` 打包到一个水平框中，并将其添加到框架的北部区域。它为\
  \ `JTextField` 和 `JButton` 添加了动作监听器，以便当用户在输入新 URL 后按下 Enter 键或点击 Go 按钮时，浏览器能够导航到新的\
  \ URL。\n*   `getEditPaneBox()` 方法将一个 `JEditorPane` 打包到 `JScrollPane` 中，并将其添加到框架的中心区域。它还为\
  \ `JEditorPane` 添加了一个超链接监听器和一个属性变更监听器。超链接监听器用于在用户点击超链接时导航到某个 URL。当鼠标进入和离开超链接区域时，它还会在状态栏中显示适当的帮助信息。\n\
  *   使用一个 `JLabel` 在框架的南部区域显示一条简短消息。\n*   `go()` 方法已被重载，其主要工作是通过 `setPage()` 方法导航到新页面。\n\
  *   `main()` 方法用于测试。它在浏览器中显示雅虎的主页。\n\n作为练习，你可以为浏览器添加“后退”和“前进”按钮，让用户能够在已访问的网页之间前后导航。\n\
  \n提示\n\n为了以良好的格式显示 HTML 页面，你需要通过调用 `JEditorPane` 的 `setEditable(false)` 方法将其设置为不可编辑。你不应该使用\
  \ `JEditorPane` 来显示所有类型的 HTML 页面，因为它无法处理 HTML 页面中可能嵌入的各种不同元素。相反，你应该只使用它来显示包含基本 HTML\
  \ 内容的页面，例如应用程序的 HTML 帮助文件。\n\n\n\n### JTextPane\n\n`JTextPane` 类是 `JEditorPane`\
  \ 类的子类。它是一个专门用于处理包含嵌入图像和组件的样式化文档的组件。你可以为字符和段落设置属性。如果你想显示 HTML、RTF 或纯文本文档，`JEditorPane`\
  \ 是最佳选择。然而，如果你需要文字处理器提供的丰富功能来编辑/显示样式化文本，则需要使用 `JTextPane`。它是一个迷你文字处理器。它始终与样式化文档配合使用，即使其内容是纯文本。本节无法讨论其所有功能；它本身就值得写一本小书。我仅简要介绍其功能，例如设置样式化文本、嵌入图像和组件。\n\
  \n`JTextPane` 使用样式化文档，该文档是 `StyledDocument` 接口的一个实例。`StyledDocument` 接口继承自 `Document`\
  \ 接口。`DefaultStyledDocument` 是 `StyledDocument` 接口的一个实现类。`JTextPane` 使用 `DefaultStyledDocument`\
  \ 作为其默认模型。Swing 文本组件中的文档由按树状结构组织的元素组成。顶层元素称为根元素。文档中的元素是 `javax.swing.text.Element`\
  \ 接口的一个实例。\n\n纯文本文档有一个根元素。根元素可以有多个子元素。每个子元素由一行文本组成。请注意，在纯文本文档中，文档中的所有字符都具有相同的属性（或格式样式）。\n\
  \n样式化文档有一个根元素，也称为节（section）。根元素具有分支元素，也称为段落（paragraph）。段落包含字符运行（character run）。字符运行是一组共享相同属性的连续字符。例如，“Hello\
  \ world”字符串定义了一个字符运行。然而，“Hello **world**”字符串定义了两个字符运行。请注意，单词“world”是粗体字体，而“Hello”不是。这就是它们定义两个不同字符运行的原因。在样式化文档中，段落以换行符结尾，除非是最后一个段落，它不需要以换行符结尾。你可以在段落级别定义属性，例如缩进、行间距、文本对齐等。你可以在字符运行级别定义属性，例如字号、字体系列、粗体、斜体等。图\
  \ 2-10 和图 2-11 分别展示了纯文本文档和样式化文档的结构。\n\n![A323071_2_En_2_Fig11_HTML.gif](img/A323071_2_En_2_Fig11_HTML.gif)\n\
  \n图 2-11.\n样式化文档的结构\n\n![A323071_2_En_2_Fig10_HTML.gif](img/A323071_2_En_2_Fig10_HTML.gif)\n\
  \n图 2-10.\n纯文本文档的结构\n\n清单 2-6 中的程序使用 `JTextPane` 开发了一个基本的文字处理器。它允许你编辑文本，并对文本应用粗体、斜体、颜色和对齐等样式。\n\
  \n```\n// WordProcessor.java\npackage com.jdojo.swing.component;\nimport javax.swing.JFrame;\n\
  import java.awt.Container;\nimport javax.swing.JTextPane;\nimport javax.swing.JButton;\n\
  import java.awt.BorderLayout;\nimport javax.swing.JPanel;\nimport javax.swing.text.StyledDocument;\n\
  import javax.swing.text.BadLocationException;\nimport javax.swing.text.Style;\n\
  import javax.swing.text.StyleContext;\nimport javax.swing.text.StyleConstants;\n\
  import java.awt.Color;\npublic class WordProcessor extends JFrame {\nJTextPane textPane\
  \ = new JTextPane();\nJButton normalBtn = new JButton(\"Normal\");\nJButton boldBtn\
  \ = new JButton(\"Bold\");\nJButton italicBtn = new JButton(\"Italic\");\nJButton\
  \ underlineBtn = new JButton(\"Underline\");\nJButton superscriptBtn = new JButton(\"\
  Superscript\");\nJButton blueBtn = new JButton(\"Blue\");\nJButton leftBtn = new\
  \ JButton(\"Left Align\");\nJButton rightBtn = new JButton(\"Right Align\");\npublic\
  \ WordProcessor(String title) {\nsuper(title);\ninitFrame();\n}\nprivate void initFrame()\
  \ {\nthis.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer contentPane\
  \ = this.getContentPane();\nJPanel buttonPanel = this.getButtonPanel();\ncontentPane.add(buttonPanel,\
  \ BorderLayout.NORTH);\ncontentPane.add(textPane, BorderLayout.CENTER);\nthis.addStyles();\
  \ // 向文本窗格添加样式以供后续使用\ninsertTestStrings(); // 向文本窗格插入一些测试文本\n}\nprivate JPanel getButtonPanel()\
  \ {\nJPanel buttonPanel = new JPanel();\nbuttonPanel.add(normalBtn);\nbuttonPanel.add(boldBtn);\n\
  buttonPanel.add(italicBtn);\nbuttonPanel.add(underlineBtn);\nbuttonPanel.add(superscriptBtn);\n\
  buttonPanel.add(blueBtn);\nbuttonPanel.add(leftBtn);\nbuttonPanel.add(rightBtn);\n\
  // 为按钮添加动作事件监听器\nnormalBtn.addActionListener(e -> setNewStyle(\"normal\", true));\n\
  boldBtn.addActionListener(e -> setNewStyle(\"bold\", true));\nitalicBtn.addActionListener(e\
  \ -> setNewStyle(\"italic\", true));\nunderlineBtn.addActionListener(e -> setNewStyle(\"\
  underline\", true));\nsuperscriptBtn.addActionListener(e -> setNewStyle(\"superscript\"\
  , true));\nblueBtn.addActionListener(e -> setNewStyle(\"blue\", true));\nleftBtn.addActionListener(e\
  \ -> setNewStyle(\"left\", false));\nrightBtn.addActionListener(e -> setNewStyle(\"\
  right\", false));\nreturn buttonPanel;\n}\nprivate void addStyles() {\n// 获取默认样式\n\
  StyleContext sc = StyleContext.getDefaultStyleContext();\nStyle defaultContextStyle\
  \ = sc.getStyle(StyleContext.DEFAULT_STYLE);\n// 向文档添加一些样式，以便后续检索和使用\nStyledDocument\
  \ document = textPane.getStyledDocument();\nStyle normalStyle = document.addStyle(\"\
  normal\", defaultContextStyle);\n// 创建粗体样式\nStyle boldStyle = document.addStyle(\"\
  bold\", normalStyle);\nStyleConstants.setBold(boldStyle, true);\n// 创建斜体样式\nStyle\
  \ italicStyle = document.addStyle(\"italic\", normalStyle);\nStyleConstants.setItalic(italicStyle,\
  \ true);\n// 创建下划线样式\nStyle underlineStyle = document.addStyle(\"underline\", normalStyle);\n\
  StyleConstants.setUnderline(underlineStyle, true);\n// 创建上标样式\nStyle superscriptStyle\
  \ = document.addStyle(\"superscript\", normalStyle);\nStyleConstants.setSuperscript(superscriptStyle,\
  \ true);\n// 创建蓝色样式\nStyle blueColorStyle = document.addStyle(\"blue\", normalStyle);\n\
  StyleConstants.setForeground(blueColorStyle, Color.BLUE);\n// 创建左对齐段落样式\nStyle leftStyle\
  \ = document.addStyle(\"left\", normalStyle);\nStyleConstants.setAlignment(leftStyle,\
  \ StyleConstants.ALIGN_LEFT);\n// 创建右对齐段落样式\nStyle rightStyle = document.addStyle(\"\
  right\", normalStyle);\nStyleConstants.setAlignment(rightStyle, StyleConstants.ALIGN_RIGHT);\n\
  }\nprivate void setNewStyle(String styleName, boolean isCharacterStyle) {\nStyledDocument\
  \ document = textPane.getStyledDocument();\nStyle newStyle = document.getStyle(styleName);\n\
  int start = textPane.getSelectionStart();\nint end = textPane.getSelectionEnd();\n\
  if (isCharacterStyle) {\nboolean replaceOld = styleName.equals(\"normal\");\ndocument.setCharacterAttributes(start,\
  \ end - start,\nnewStyle, replaceOld);\n} else {\ndocument.setParagraphAttributes(start,\
  \ end - start, newStyle, false);\n}\n}\nprivate void insertTestStrings() {\nStyledDocument\
  \ document = textPane.getStyledDocument();\ntry {\ndocument.insertString(0, \"Hello\
  \ JTextPane\\n\", null);\n} catch (BadLocationException e) {\ne.printStackTrace();\n\
  }\n}\npublic static void main(String[] args) {\nWordProcessor frame = new WordProcessor(\"\
  Word Processor\");\nframe.setSize(700, 500);\nframe.setVisible(true);\n}\n}\n清单\
  \ 2-6.\n使用 JTextPane 和 JButton 的简单文字处理器\n```\n\n\n\n这个文字处理程序虽然有些冗长，但它只执行简单且重复的操作。为了便于理解，我将程序的逻辑分解成了更小的部分。该程序的目的是展示一个`JTextPane`，用户可以在其中编辑文本，并使用一些按钮对文本应用样式。\n\
  \n共有八个按钮。其中五个用于格式化文本：普通、粗体、斜体、下划线和上标。蓝色按钮用于将文本颜色设置为蓝色。最后两个按钮——左对齐和右对齐——用于将段落对齐方式设置为左对齐和右对齐。\n\
  \n什么是样式？如何为文本和段落设置样式？简单来说，样式就是一组属性（名称-值对）。设置样式本身很简单；但你需要编写几行代码来创建样式本身。你需要将样式添加到`JTextPane`的文档以及`JTextPane`本身。你需要使用`StyledDocument`类的`addStyle(String\
  \ styleName, Style parent)`方法。该方法返回一个`Style`对象。`parent`参数可以为`null`。如果不为`null`，则未指定的属性会在`parent`样式中解析。一旦你有了样式对象，就可以使用`StyleConstants`类的`setXxx()`方法在该样式中设置相应的属性。如果你感到困惑，这里有一个总结。\n\
  \n将样式想象成一个包含两列的表格：`name`和`value`。`StyledDocument`类的`addStyle()`方法返回一个空样式（即一个空表格）。通过使用`StyleConstants`的`setXxx()`方法，你就是在向样式（即表格）中添加新行。一旦表格中至少有一行（即至少定义了一个样式属性），你就可以根据样式的类型将该样式应用于字符或段落。请注意，你可以拥有一个空样式。空样式可用于移除某个字符范围或段落中的所有当前样式。以下代码片段创建了两个样式：第一个是`bold`，第二个是`bold\
  \ + italic`。如果你将第一个样式应用于文本，它会将文本格式化为粗体字体。如果你将第二个样式应用于文本，它会将文本格式化为粗体和斜体字体。请注意，这里将`parent`样式设置为`null`。\n\
  \n```\n// 从文本窗格获取样式化文档\nStyledDocument document = textPane.getStyledDocument();\n\
  // 向文档添加一个名为\"bold\"的空样式\nStyle bold = document.addStyle(\"bold\", null);\n// 向此样式添加粗体属性\n\
  StyleConstants.setBold(bold, true);\n// 从此刻起，你可以使用粗体样式\n// 让我们创建一个名为 boldItalic\
  \ 的粗体+斜体样式。\n// 向文档添加一个名为 boldItalic 的空样式\nStyle boldItalic = document.addStyle(\"\
  boldItalic\", null);\n// 向 boldItalic 样式添加粗体和斜体属性\nStyleConstants.setBold(boldItalic,\
  \ true);\nStyleConstants.setItalic(boldItalic, true);\n// 从此刻起，你可以使用 boldItalic\
  \ 样式\n```\n\n将样式添加到`StyledDocument`后，你可能需要该样式对象的引用。你可以通过使用`getStyle(String styleName)`方法检索同一样式对象的引用。\n\
  \n```\n// 从文档中获取粗体样式\nStyle myBoldStyle = document.getStyle(\"bold\");\n```\n\n\
  一旦你有了`Style`对象，就可以使用`StyledDocument`类的`setCharacterAttributes(int offset, int length,\
  \ AttributeSet s, boolean replace)`和`setParagraphAttributes(int offset, int length,\
  \ AttributeSet s, boolean replace)`方法将样式设置到字符范围或段落。如果`replace`参数指定为`true`，则该范围的任何旧样式都将被新样式替换。否则，新样式将与旧样式合并。\n\
  \n```\n// 假设文本窗格中有超过五个字符。\n// 使前三个字符变为粗体\ndocument.setCharacterAttributes(0, 3,\
  \ bold, false);\n```\n\n`StyleContext`对象定义了一个样式池，以便高效使用。你可以按如下方式获取默认样式集合：\n\n```\n\
  StyleContext sc = StyleContext.getDefaultStyleContext();\nStyle defaultContextStyle\
  \ = sc.getStyle(StyleContext.DEFAULT_STYLE);\n// 让我们添加一个默认上下文样式作为普通样式的父样式。\n// 我们不为普通样式添加任何额外属性\n\
  StyledDocument document = textPane.getStyledDocument();\nStyle normal = document.addStyle(\"\
  normal\", defaultContextStyle);\n```\n\n表 2-13 包含一系列重要方法及其描述，这可能有助于你理解清单 2-6 中的代码。图\
  \ 2-12 展示了在输入 E = mc² 后，这个简单文字处理程序的外观。\n\n![A323071_2_En_2_Fig12_HTML.jpg](img/A323071_2_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12.\n\n一个使用 JTextPane 和 JButtons 的简单文字处理程序\n\n表 2-13.\n\nWordProcessor 类的方法及其描述\n\
  \n| 方法 | 描述 |\n| --- | --- |\n| `initFrame()` | 通过向框架添加组件并设置`JFrame`的默认行为来初始化框架。\
  \ |\n| `getButtonPanel()` | 返回一个`JPanel`，其中包含所有用于格式化的`JButton`。它还为所有`JButton`添加了动作监听器。\
  \ |\n| `addStyles()` | 向文档添加样式。默认上下文样式被命名为“normal”，并用作所有其他样式的父样式。粗体、斜体等样式是字符级样式，而左对齐和右对齐是段落级样式。这些样式从文档中检索，以便在`setNewStyle()`方法中使用。\
  \ |\n| `setNewStyle()` | 根据其`isCharacterStyle`参数指示，将样式设置到字符范围或段落范围。请注意，如果你设置了“normal”样式，你将用此样式替换整个样式。否则，你将合并样式。此逻辑由以下语句确定：`boolean\
  \ replaceOld = styleName.equals(\"normal\");` |\n| `insertTestStrings()` | 使用`insertString()`方法向`JTextPane`的文档中插入一个字符串。\
  \ |\n| `main()` | 创建并显示文字处理程序框架。 |\n\n该文字处理程序没有保存功能。在实际应用中，你会提示用户输入保存位置和文件名。以下代码片段将`JTextPane`的内容保存到当前工作目录下名为`test.rtf`的文件中：\n\
  \n```\n// 将 textPane 的内容保存到文件\nFileWriter fw = new java.io.FileWriter(\"test.rtf\"\
  );\ntextPane.write(fw);\nfw.close();\n```\n\n`JTextPane`的`write()`方法将其文档中包含的文本作为纯文本写入。如果你想保存格式化文本，你需要使用`RTFEditorKit`对象作为其编辑器套件，并使用该编辑器套件的`write()`方法写入文件。以下代码片段展示了如何使用`RTFEditorKit`对象保存`JTextPane`中的格式化文本。请注意，`RTFEditorKit`包含一个`read()`方法，用于将格式化文本读回`JTextPane`。\n\
  \n```\n// 在创建 JTextPane 后立即为其设置一个 RTFEditorKit\nJTextPane textPane = new JTextPane();\n\
  textPane.setEditorKit(new RTFEditorKit());\n// 其他代码在此处\n// 将 JTextPane 中的格式化文本保存到文件\n\
  String fileName = \"test.rtf\";\nFileOutputStream fos = new FileOutputStream(fileName);\n\
  RTFEditorKit kit = (RTFEditorKit)textPane.getEditorKit();\nStyledDocument doc =\
  \ textPane.getStyledDocument();\nint len = doc.getLength();\nkit.write(fos, doc,\
  \ 0, len);\nfos.close();\n```\n\n提示\n\n如果你想保存添加到`JTextPane`中的图标和组件，你需要将`JTextPane`的文档对象序列化到文件，然后重新加载它以显示相同的内容。\n\
  \n\n\n你可以将任何 Swing 组件和图标添加到 `JTextPane` 中。只需将组件或图标包装到样式中，然后在 `insertString()` 方法中使用该样式即可。以下代码片段展示了如何向\
  \ `JTextPane` 添加 `JButton` 和图标：\n\n```\n// 向文档中添加一个关闭按钮\nJButton closeButton = new\
  \ JButton(\"关闭\");\ncloseButton.addActionListener(e -> System.exit(0));\nStyle cs\
  \ = doc.addStyle(\"componentStyle\", null);\nStyleConstants.setComponent(cs, closeButton);\n\
  // 在文本末尾插入该组件\ntry {\ndocument.insertString(doc.getLength(), \"关闭按钮位于\", cs);\n\
  } catch (BadLocationException e) {\ne.printStackTrace();\n}\n```\n\n向 `JTextPane`\
  \ 添加图标与添加组件类似，区别在于你需要使用 `StyleConstants` 类的 `setIcon()` 方法而非 `setComponent()` 方法，并且使用\
  \ `ImageIcon` 对象而非组件，如下所示：\n\n```\n// 向 JTextPane 添加一个图标\nStyleConstants.setIcon(myIconStyle,\
  \ new ImageIcon(\"myImageFile\"));\n```\n\n提示\n\n你也可以使用 `JTextPane` 的 `insertComponent(Component\
  \ c)` 和 `insertIcon(Icon g)` 方法分别向其中插入组件和图标。\n\n你可以通过 `AbstractDocument` 类的 `dump(PrintStream\
  \ p)` 方法来查看 `JTextPane` 文档的元素结构。以下代码片段在标准输出上显示该结构：\n\n```\n// 在标准输出上显示文档结构\nDefaultStyledDocument\
  \ doc = (DefaultStyledDocument)textPane.getStyledDocument();\ndoc.dump(System.out);\n\
  ```\n\n以下是包含文本的 `JTextPane` 文档的结构转储，如图 2-12 所示。它让你了解样式化文档的结构。\n\n```\n\n[0,16][Hello\
  \ JTextPane\n]\n\n[16,17][\n]\n\n[17,21][E=mc]\n\n[21,22][2]\n\n[22,23][\n]\n\n\
  [0,23][Hello JTextPane\nE=mc2\n]\n```\n\n## 验证文本输入\n\n你已经看到了在文本组件中验证文本输入的示例：使用自定义模型和使用\
  \ `JFormattedTextField`。你可以将输入验证器对象附加到任何 `JComponent`（包括文本组件）上。输入验证器对象只是一个类的实例，该类继承自名为\
  \ `InputVerifier` 的抽象类。该类的声明如下所示：\n\n```\npublic abstract class InputVerifier {\n\
  public abstract boolean verify(JComponent input);\npublic boolean shouldYieldFocus(JComponent\
  \ input) {\nreturn verify(input);\n}\n}\n```\n\n你需要重写 `InputVerifier` 类的 `verify()`\
  \ 方法。`verify()` 方法包含验证文本字段中输入内容的逻辑。如果文本字段中的值有效，则此方法返回 `true`，否则返回 `false`。当文本字段即将失去焦点时，会调用其输入验证器的\
  \ `verify()` 方法。只有当输入验证器的 `verify()` 方法返回 `true` 时，文本字段才会失去焦点。文本组件的 `setInputVerifier()`\
  \ 方法用于附加输入验证器。以下代码片段为区号字段设置了一个输入验证器。它将焦点保持在此字段中，直到用户输入一个三位数的数字区号。如果该字段为空，则允许用户导航到其他字段。\n\
  \n```\n// 创建一个区号 JTextField\nJTextField areaCodeField = new JTextField(3);\n// 为区号字段设置输入验证器\n\
  areaCodeField.setInputVerifier(new InputVerifier() {\n@Override\npublic boolean\
  \ verify(JComponent input) {\nString areaCode = areaCodeField.getText();\nif (areaCode.length()\
  \ == 0) {\nreturn true;\n} else if (areaCode.length() != 3) {\nreturn false;\n}\n\
  try {\nInteger.parseInt(areaCode);\nreturn true;\n} catch(NumberFormatException\
  \ e) {\nreturn false;\n}\n}\n});\n```\n\n你可以使用 `setInputVerifier()` 方法为任何 `JComponent`\
  \ 设置输入验证器。通常，它仅用于文本字段。作为良好的 GUI 设计实践，你应该添加一些关于有效输入值的视觉提示，以便用户了解该字段期望输入何种类型的值。例如，你可以为区号字段添加一个标签，文本为“区号（三位数字）：”，或者在用户输入无效值时显示错误消息。如果对于带有输入验证器的字段，没有关于有效值的视觉提示，用户将被困在该字段中，而不知道应该输入什么类型的值。\n\
  \n\n\n## 做出选择\n\nSwing 提供了以下组件，让您可以从选项列表中进行选择：\n\n*   `JToggleButton`\n*   `JCheckBox`\n\
  *   `JRadioButton`\n*   `JComboBox`\n*   `JList`\n\n可从列表中选择的选项数量范围从 2 到 N，其中 N 是大于\
  \ 2 的数字。从选项列表中进行选择有多种方式：\n\n*   选择可能是互斥的。也就是说，用户只能从选项列表中选择一项。在互斥选择中，如果用户更改了当前选择，则之前的选择会自动取消。例如，包含`Male`、`Female`和`Unknown`三个选项的性别选择列表就是互斥的。用户必须且只能选择这三个选项中的一个，而不能同时选择两个或更多。\n\
  *   有一种特殊情况，即选项数量 N 为 2。在这种情况下，选项类型为`boolean`：`true`或`false`。有时它们也被称为`Yes`/`No`选择，或`On`/`Off`选择。\n\
  *   有时用户可以从选项列表中进行多项选择。例如，您可以向用户提供一个爱好列表，用户可以从该列表中选择多个爱好。\n\nSwing 组件使您能够向用户呈现不同类型的选项，并允许用户选择零个、一个或多个选项。图\
  \ 2-13 展示了包含四个季节名称的 Swing 组件：`Spring`、`Summer`、`Fall`和`Winter`。该图展示了可用于从列表中选择选项的五种不同类型\
  \ Swing 组件的外观。图中显示的一些组件可能并非展示其选项的合适方式。例如，虽然可以使用一组复选框来显示互斥的选项列表，但这并非良好的 GUI 实践。当选项互斥时，一组单选按钮被认为比一组复选框更合适。\n\
  \n![A323071_2_En_2_Fig13_HTML.jpg](img/A323071_2_En_2_Fig13_HTML.jpg)\n\n图 2-13.\n\
  \n用于从选项列表中进行选择的 Swing 组件\n\n`JToggleButton` 是一个双状态按钮。这两个状态是选中和未选中。当您按下切换按钮时，它会在按下和未按下状态之间切换。按下是其选中状态，未按下是其未选中状态。请注意，`JButton`\
  \ 与 `JToggleButton` 在工作方式和使用上有所不同。`JButton` 仅在鼠标按下时被按下，而 `JToggleButton` 则在按下和未按下状态之间切换。`JButton`\
  \ 用于启动一个动作，而 `JToggleButton` 用于从可能的选项列表中选择一个选项。通常，一组 `JToggleButton` 用于让用户从互斥的选项列表中选择一个选项。当用户有一个`boolean`选择，需要指示`true`或`false`（或\
  \ Yes 或 No）时，则使用单个 `JToggleButton`。按下状态表示选择了`true`，未按下状态表示选择了`false`。\n\n`JCheckBox`\
  \ 也有两个状态：选中和未选中。当用户可以从两个或更多选项的列表中选择零个或多个选项时，使用一组 `JCheckBox`。当用户有一个`boolean`选择来指示`true`或`false`时，则使用单个\
  \ `JCheckBox`。\n\n`JRadioButton` 也有两个状态：选中和未选中。当存在两个或更多互斥选项的列表，并且用户必须选择一个选项时，使用一组\
  \ `JRadioButton`。`JRadioButton` 从不作为独立组件用于从`true`和`false`这两个`boolean`选项中进行选择。它总是用于两个或更多选项的组中。当您需要让用户在`true`或`false`这两个布尔选项之间进行选择时，应使用\
  \ `JCheckBox`（而不是 `JRadioButton`）。\n\n`JToggleButton`、`JCheckBox` 和 `JRadioButton`\
  \ 的构造函数允许您使用不同参数的组合来创建它们。您可以使用 `Action` 对象、字符串标签、图标和`boolean`标志（用于指示是否默认选中）的组合来创建它们。默认情况下，`JToggleButton`、`JCheckBox`\
  \ 和 `JRadioButton` 是未选中的。以下代码片段展示了创建它们的一些方法：\n\n```\n// 创建时不带标签和图像\nJToggleButton\
  \ tb1 = new JToggleButton();\nJCheckBox cb1 = new JCheckBox();\nJRadioButton rb1\
  \ = new JRadioButton();\n// 创建时文本为 \"Multi-Lingual\"\nJToggleButton tb2 = new JToggleButton(\"\
  Multi-Lingual\");\nJCheckBox cb2 = new JCheckBox(\"Multi-Lingual\");\nJRadioButton\
  \ rb2 = new JRadioButton(\"Multi-Lingual\");\n// 创建时文本为 \"Multi-Lingual\" 并默认选中\n\
  JToggleButton tb3 = new JToggleButton(\"Multi-Lingual\", true);\nJCheckBox cb3 =\
  \ new JCheckBox(\"Multi-Lingual\", true);\nJRadioButton rb3 = new JRadioButton(\"\
  Multi-Lingual\", true);\n```\n\n要选中/取消选中 `JToggleButton`、`JCheckBox` 和 `JRadioButton`，您需要调用它们的\
  \ `setSelected()` 方法。要检查它们是否被选中，请使用它们的 `isSelected()` 方法。以下代码片段展示了如何使用这些方法：\n\n\
  ```\ntb3.setSelected(true);         // 选中 tb3\nboolean b1 = tb3.isSelected(); //\
  \ 将在 b1 中存储 true\ntb3.setSelected(false);        // 取消选中 tb3\nboolean b2 = tb3.isSelected();\
  \ // 将在 b2 中存储 false\n```\n\n如果选择是互斥的，则必须将所有选项分组到一个按钮组中。在互斥的选项组中，如果您选择了一个选项，则所有其他选项都会被取消选中。通常，您会为一组互斥的\
  \ `JRadioButton` 或 `JToggleButton` 创建一个按钮组。理论上，您也可以为 `JCheckBox` 创建一个按钮组以实现互斥选择。但是，不建议在\
  \ GUI 中使用一组互斥的 `JCheckBox`。\n\n`ButtonGroup` 类的实例代表一个按钮组。您可以通过分别使用其 `add()` 和 `remove()`\
  \ 方法，将 `JRadioButton` 或 `JToggleButton` 添加到按钮组或从中移除。最初，按钮组中的所有成员都是未选中的。要形成一个按钮组，您需要将所有互斥的选择组件添加到\
  \ `ButtonGroup` 类的对象中。您不能（实际上也无法）将 `ButtonGroup` 对象添加到容器中。您必须将所有选择组件添加到容器中。清单 2-7\
  \ 包含了展示一组三个互斥 `JRadioButton` 的完整代码。\n\n\n\n```\n// ButtonGroupFrame.java\npackage\
  \ com.jdojo.swing.component;\nimport java.awt.BorderLayout;\nimport java.awt.Container;\n\
  import javax.swing.Box;\nimport javax.swing.ButtonGroup;\nimport javax.swing.JFrame;\n\
  import javax.swing.JRadioButton;\npublic class ButtonGroupFrame extends JFrame {\n\
  ButtonGroup genderGroup = new ButtonGroup();\nJRadioButton genderMale = new JRadioButton(\"\
  Male\");\nJRadioButton genderFemale = new JRadioButton(\"Female\");\nJRadioButton\
  \ genderUnknown = new JRadioButton(\"Unknown\");\npublic ButtonGroupFrame() {\n\
  this.initFrame();\n}\nprivate void initFrame() {\nthis.setTitle(\"Mutually Exclusive\
  \ JRadioButtons Group\");\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n// Add\
  \ three gender JRadioButtons to a ButtonGroup,\n// so they become mutually exclusive\
  \ choices\ngenderGroup.add(genderMale);\ngenderGroup.add(genderFemale);\ngenderGroup.add(genderUnknown);\n\
  // Add gender radio button to a vertical Box\nBox b1 = Box.createVerticalBox();\n\
  b1.add(genderMale);\nb1.add(genderFemale);\nb1.add(genderUnknown);\n// Add the vertical\
  \ box to the center of the frame\nContainer contentPane = this.getContentPane();\n\
  contentPane.add(b1, BorderLayout.CENTER);\n}\npublic static void main(String[] args)\
  \ {\nButtonGroupFrame bf = new ButtonGroupFrame();\nbf.pack();\nbf.setVisible(true);\n\
  }\n}\n清单 2-7.\n由三个 JRadioButton 表示的互斥三选项组\n```\n\n`JComboBox<E>` 是另一种 Swing 组件，允许你从选项列表中进行单项选择。它还可以包含一个可编辑字段，让你输入新的选项值。类型参数\
  \ `E` 是其所包含元素的类型。当屏幕空间有限时，你可以使用 `JComboBox` 来代替一组 `JToggleButton`、`JCheckBox` 或\
  \ `JRadioButton`。使用 `JComboBox` 可以节省屏幕空间。但是，用户需要进行两次点击才能做出选择。首先，用户必须点击箭头按钮以在下拉列表中显示选项列表，然后他必须从列表中选择一个选项。用户还可以使用键盘上的上/下箭头键在选项列表中滚动，并在组件获得焦点时选择一个选项。你可以通过在其某个构造函数中传递选项列表来创建\
  \ `JComboBox`，如下所示：\n\n```\n// 使用字符串数组作为选项列表\nString[] sList = new String[]{\"Spring\"\
  , \"Summer\", \"Fall\", \"Winter\"};\nJComboBox seasons = new JComboBox(sList);\n\
  // 使用字符串向量作为选项列表\nVector sList2 = new Vector(4);\nsList2.add(\"Spring\");\nsList2.add(\"\
  Summer\");\nsList2.add(\"Fall\");\nsList2.add(\"Winter\");\nJComboBox seasons2 =\
  \ new JComboBox(sList2);\n```\n\n你可以创建一个没有选项的 `JComboBox`，然后使用其方法之一向其中添加选项。它还包含从列表中移除选项以及获取所选选项值的方法。表\
  \ 2-14 列出了 `JComboBox` 类的常用方法。\n\n表 2-14.\n\nJComboBox 类的常用方法\n\n| 方法 | 描述 |\n|\
  \ --- | --- |\n| `void addItem(E item)` | 将一个项目作为选项添加到列表中。会调用所添加对象的 `toString()`\
  \ 方法，并将返回的字符串显示为一个选项。 |\n| `E getItemAt(int index)` | 从选项列表中返回指定 `index` 处的项目。索引从零开始，到列表大小减一结束。如果指定的\
  \ `index` 超出范围，则返回 `null`。 |\n| `int getItemCount()` | 返回选项列表中项目的数量。 |\n| `int getSelectedIndex()`\
  \ | 返回所选项目的索引。如果所选项目不在列表中，则返回 –1。请注意，对于可编辑的 `JComboBox`，你可以在字段中输入一个新值，该值可能不在选项列表中。在这种情况下，此方法将返回\
  \ –1。如果没有选择，它也返回 –1。 |\n| `Object getSelectedItem()` | 返回当前选中的项目。如果没有选择，则返回 `null`。\
  \ |\n| `void insertItemAt(E item, int index)` | 在列表中的指定 `index` 处插入指定的 `item`。 |\n\
  | `boolean isEditable()` | 如果 `JComboBox` 是可编辑的，则返回 `true`。否则返回 `false`。默认情况下，`JComboBox`\
  \ 是不可编辑的。 |\n| `void removeAllItems()` | 从列表中移除所有项目。 |\n| `void removeItem(Object\
  \ item)` | 从列表中移除指定的 `item`。 |\n| `void removeItemAt(int index)` | 移除指定 `index`\
  \ 处的项目。 |\n| `void setEditable(boolean editable)` | 如果指定的 `editable` 参数为 `true`，则\
  \ `JComboBox` 是可编辑的。否则，它是不可编辑的。用户可以在可编辑的 `JComboBox` 中输入一个不在选项列表中的值。请注意，新输入的值不会添加到选项列表中。\
  \ |\n| `void setSelectedIndex(int index)` | 选择列表中指定 `index` 处的项目。如果指定的 `index` 为\
  \ –1，则清除选择。如果指定的 `index` 小于 –1 或大于列表大小减一，则抛出 `IllegalArgumentException`。 |\n| `void\
  \ setSelectedItem(Object item)` | 选择字段中的项目。如果指定的 `item` 存在于列表中，则始终选择它。如果指定的项目不在列表中，则仅当\
  \ `JComboBox` 可编辑时，才会在字段中选择它。 |\n\n如果你想在 `JComboBox` 中选中或取消选中某个项目时收到通知，可以为其添加一个项目监听器。每当选中或取消选中某个项目时，都会通知项目监听器。请注意，当你在\
  \ `JComboBox` 中更改选择时，它会先触发取消选中项目事件，然后触发选中事件。以下代码片段展示了如何向 `JComboBox` 添加项目监听器。你可以使用\
  \ `ItemEvent` 类的 `getItem()` 方法来找出哪个项目被选中或取消选中。\n\n```\nString[] sList = new String[]{\"\
  Spring\", \"Summer\", \"Fall\", \"Winter\"};\nJComboBox seasons = new JComboBox(sList);\n\
  // 向组合框添加项目监听器\nseasons.addItemListener((ItemEvent e) -> {\nObject item = e.getItem();\n\
  if (e.getStateChange() == ItemEvent.SELECTED) {\n// 项目已被选中\nSystem.out.println(item\
  \ + \" 已被选中\");\n} else if (e.getStateChange() == ItemEvent.DESELECTED) {\n// 项目已被取消选中\n\
  System.out.println(item + \" 已被取消选中\");\n}\n});\n```\n\n`JList<T>` 是另一种 Swing 组件，它显示一个选项列表，并允许你从该列表中选择一个或多个选项。类型参数\
  \ `T` 是其所包含元素的类型。`JList` 与 `JComboBox` 的主要区别在于选项列表的显示方式。`JList` 可以在屏幕上显示多个选项，而 `JComboBox`\
  \ 则在你点击其箭头按钮时才显示选项列表。从这个意义上说，`JList` 是 `JComboBox` 的扩展版本。`JList` 可以在一列或多列中显示选项列表。你可以像创建\
  \ `JComboBox` 一样创建 `JList`，如下所示：\n\n\n\n```\n// 使用数组创建 JList\nString[] items = new\
  \ String[]{\"Spring\", \"Summer\", \"Fall\", \"Winter\"};\nJList list = new JList(items);\n\
  // 使用 Vector 创建 JList\nVector items2 = new Vector(4);\nitems2.add(\"Spring\");\n\
  items2.add(\"Summer\");\nitems2.add(\"Fall\");\nitems2.add(\"Winter\");\nJList list2\
  \ = new JList(items2);\n```\n\n`JList` 本身不具备滚动功能。你必须将其添加到 `JScrollPane` 中，再将 `JScrollPane`\
  \ 添加到容器中，才能获得滚动功能，示例如下：\n\n```\nmyContainer.add(new JScrollPane(myJList));\n```\n\
  \n你可以配置 `JList` 的布局方向，以三种方式排列选项列表：\n\n*   垂直\n*   水平换行\n*   垂直换行\n\n在默认的垂直排列中，`JList`\
  \ 中的所有项目都使用单列多行显示。\n\n在水平换行中，所有项目按一行多列排列。但是，如果一行无法容纳所有项目，则会根据需要添加新行来显示它们。请注意，项目可以水平从左到右或从右到左流动，具体取决于组件的方向。\n\
  \n在垂直换行中，所有项目按一列多行排列。但是，如果一列无法容纳所有项目，则会根据需要添加新列来显示它们。\n\n你可以使用 `JList` 类的 `setVisibleRowCount(int\
  \ visibleRows)` 方法来设置你希望在列表中无需滚动即可看到的可见行数。当你将可见行数设置为零或更少时，`JList` 将根据字段的宽度/高度及其布局方向来决定可见行数。你可以使用其\
  \ `setLayoutOrientation(int orientation)` 方法设置其布局方向，其中方向值可以是 `JList` 类中定义的三个常量之一：`JList.VERTICAL`、`JList.HORIZONTAL_WRAP`\
  \ 和 `JList.VERTICAL_WRAP`。\n\n你可以使用 `setSelectionMode(int mode)` 方法配置 `JList` 的选择模式。模式值可以是以下三个值之一。这些模式值在\
  \ `ListSelectionModel` 接口中定义为常量。\n\n*   `SINGLE_SELECTION`\n*   `SINGLE_INTERVAL_SELECTION`\n\
  *   `MUTIPLE_INTERVAL_SELECTION`\n\n在单选模式下，你一次只能选择一个项目。如果你更改选择，之前选中的项目将被取消选中。\n\n\
  在单间隔选择模式下，你可以选择多个项目。但是，所选项目必须始终是连续的。假设一个 `JList` 中有十个项目，并且你选择了第七个项目。现在你可以选择列表中的第六个或第八个项目，但不能选择其他任何项目。你可以继续选择更多连续的项目。你可以使用\
  \ Ctrl 或 Shift 键与鼠标的组合来进行连续选择。\n\n在多间隔选择模式下，你可以不受任何限制地选择多个项目。你可以使用 Ctrl 或 Shift\
  \ 键与鼠标的组合来进行选择。\n\n你可以向 `JList` 添加列表选择监听器，当选择发生变化时，它会通知你。当选择发生变化时，会调用 `ListSelectionListener`\
  \ 的 `valueChanged()` 方法。在一次选择更改过程中，此方法也可能被多次调用。你需要使用 `ListSelectionEvent` 对象的 `getValueIsAdjusting()`\
  \ 方法来确保选择更改已完成，如下面的代码片段所示：\n\n```\nmyJList.addListSelectionListener((ListSelectionEvent\
  \ e) -> {\n// 确保选择更改已完成\nif (!e.getValueIsAdjusting()) {\n// 选择更改的逻辑写在这里\n}\n});\n\
  ```\n\n表 2-15 列出了 `JList` 类的常用方法。请注意，`JList` 没有直接提供获取列表大小（`JList` 中选项的数量）的方法。正如每个\
  \ Swing 组件都使用模型一样，`JList` 也是如此。它的模型是 `JListModel` 接口的一个实例。要了解 `JList` 选项列表的大小，你需要调用其模型的\
  \ `getSize()` 方法，如下所示：\n\n表 2-15.\n\nJList 类的常用方法\n\n| 方法 | 描述 |\n| --- | --- |\n\
  | `void clearSelection()` | 清除在 `JList` 中所做的选择。 |\n| `void ensureIndexIsVisible(int\
  \ index)` | 确保指定 `index` 处的项目可见。请注意，要使不可见的项目可见，必须将 `JList` 添加到 `JScrollPane` 中。\
  \ |\n| `int getFirstVisibleIndex()` | 返回最小的可见索引。如果没有可见项目或列表为空，则返回 –1。 |\n| `int\
  \ getLastVisibleIndex()` | 返回最大的可见索引。如果没有可见项目或列表为空，则返回 –1。 |\n| `int getMaxSelectionIndex()`\
  \ | 返回最大的选中索引。如果没有选择，则返回 –1。 |\n| `int getMinSelectionIndex()` | 返回最小的选中索引。如果没有选择，则返回\
  \ –1。 |\n| `int getSelectedIndex()` | 返回最小的选中索引。如果 `JList` 选择模式是单选，则返回选中的索引。如果没有选择，则返回\
  \ –1。 |\n| `int[] getSelectedIndices()` | 以 `int` 数组的形式返回所有选中项目的索引。如果没有选择，数组将包含零个元素。\
  \ |\n| `E getSelectedValue()` | 返回第一个选中的项目。如果 `JList` 是单选模式，则为选中项目的值。如果 `JList`\
  \ 中没有选择，则返回 `null`。 |\n| `List<E> getSelectedValuesList()` | 返回所有选中项目的列表，按它们在列表中的索引升序排列。如果没有选中的项目，则返回一个空列表。\
  \ |\n| `boolean isSelectedIndex(int index)` | 如果指定的 `index` 被选中，则返回 `true`。否则，返回\
  \ `false`。 |\n| `boolean isSelectionEmpty()` | 如果 `JList` 中没有选择，则返回 `true`。否则，返回\
  \ `false`。 |\n| `void setListData(E[] listData)` `void setListData(Vector<?> listData)`\
  \ | 在 `JList` 中设置新的选项列表。 |\n| `void setSelectedIndex(int index)` | 选择指定 `index`\
  \ 处的项目。 |\n| `void setSelectedIndices(int[] indices)` | 选择指定数组中索引处的项目。 |\n| `void\
  \ setSelectedValue(Object item, boolean shouldScroll)` | 如果列表中存在指定的项目，则选择它。如果第二个参数为\
  \ `true`，则滚动到该项目使其可见。 |\n\n```\nint size = myJList.getModel().getSize();\n```\n\n\
  \n\n## JSpinner\n\n`JSpinner` 组件结合了 `JFormattedTextField` 和可编辑 `JComboBox` 的优点。它允许你在\
  \ `JComboBox` 中设置一个选项列表，同时还可以对显示的值应用格式。它每次只从选项列表中显示一个值，并允许你输入新值。“微调器”这个名称源于它允许你通过上下箭头按钮在选项列表中向上或向下滚动。`JSpinner`\
  \ 选项列表的一个特殊之处在于它必须是一个有序列表。图 2-14 展示了三个用于选择数字、日期和季节值的 JSpinner。\n\n![A323071_2_En_2_Fig14_HTML.jpg](img/A323071_2_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14.\n\n运行中的 JSpinner 组件\n\n由于 `JSpinner` 为各种选项列表提供了滚动功能，因此它的创建高度依赖于其模型。实际上，除非你只需要一个仅包含整数列表的简单\
  \ `JSpinner`，否则必须在构造函数中为 `JSpinner` 提供一个模型。它支持三种不同类型的有序选项列表：数字列表、日期列表以及任何其他对象的列表。它提供了三个类来创建这三种不同类型列表的模型：\n\
  \n*   `SpinnerNumberModel`\n*   `SpinnerDateModel`\n*   `SpinnerListModel`\n\n微调器模型是\
  \ `SpinnerModel` 接口的一个实例。它定义了 `getValue()`、`setValue()`、`getPreviousValue()` 和 `getNextValue()`\
  \ 方法来处理 `JSpinner` 中的值。所有这些方法都处理 `Object` 类的对象。\n\n`SpinnerNumberModel` 类为 `JSpinner`\
  \ 提供了一个模型，允许你滚动浏览一个有序的数字列表。你需要指定列表中的最小值、最大值和当前值。你还可以指定步长值，当使用 `JSpinner` 的上/下按钮时，该值用于在数字列表中逐步移动。以下代码片段创建了一个包含\
  \ 1 到 10 数字列表的 `JSpinner`。它允许你以步长 1 在列表中滚动。字段的当前值设置为 5。`SpinnerNumberModel` 类还提供了一些方法，允许你在创建后获取/设置微调器模型的不同值。\n\
  \n```\nint minValue = 1;\nint maxValue = 10;\nint currentValue = 5;\nint steps =\
  \ 1;\nSpinnerNumberModel nModel = new SpinnerNumberModel(currentValue, minValue,\
  \ maxValue, steps);\nJSpinner numberSpinner = new JSpinner(nModel);\n```\n\n`SpinnerDateModel`\
  \ 类为 `JSpinner` 提供了一个模型，允许你滚动浏览一个有序的日期列表。你需要指定开始日期、结束日期、当前值和步长。以下代码片段创建了一个 `JSpinner`，用于滚动浏览从\
  \ 1950 年 1 月 1 日到 2050 年 12 月 31 日的日期列表，步长为一天。当前系统日期被设置为该字段的当前值。\n\n```\nCalendar\
  \ calendar = Calendar.getInstance();\ncalendar.set(1950, 1, 1);\nDate minValue =\
  \ calendar.getTime();\ncalendar.set(2050, 12, 31);\nDate maxValue = calendar.getTime();\n\
  Date currentValue = new Date();\nint steps = Calendar.DAY_OF_MONTH; // 必须是 Calendar\
  \ 字段\nSpinnerDateModel dModel = new SpinnerDateModel(currentValue, minValue, maxValue,\
  \ steps);\nJSpinner dateSpinner = new JSpinner(dModel);\n```\n\n请注意，日期值将以默认区域设置格式显示。当你在模型上使用\
  \ `getNextValue()` 方法时，会用到步长值。一个包含日期列表的 `JSpinner` 允许你通过高亮日期字段的一部分并使用上/下按钮来滚动浏览任何显示的日期字段。假设你的\
  \ `JSpinner` 使用的日期格式是 `mm/dd/yyyy`。你可以将光标放在字段的年份部分 (`yyyy`)，然后使用上/下按钮根据年份在列表中逐步移动。\n\
  \n`SpinnerListModel` 类为 `JSpinner` 提供了一个模型，允许你滚动浏览一个有序的对象列表。你只需指定一个对象数组或一个 `List`\
  \ 对象，`JSpinner` 就会让你按照数组或 `List` 中出现的顺序滚动浏览列表。列表中对象的 `toString()` 方法返回的 `String`\
  \ 将作为 `JSpinner` 中的值显示。以下代码片段创建了一个 `JSpinner` 来显示四个季节的列表：\n\n```\nString[] seasons\
  \ = new String[] {\"Spring\", \"Summer\", \"Fall\", \"Winter\"};\nSpinnerListModel\
  \ sModel = new SpinnerListModel(seasons);\nJSpinner listSpinner = new JSpinner(sModel);\n\
  ```\n\n`JSpinner` 使用一个编辑器对象来显示当前值。它有以下三个 `static` 内部类来显示三种不同类型的有序列表：\n\n*   `JSpinner.NumberEditor`\n\
  *   `JSpinner.DateEditor`\n*   `JSpinner.ListEditor`\n\n如果你想以特定格式显示数字或日期，则需要为 `JSpinner`\
  \ 设置一个新的编辑器。数字和日期编辑器的编辑器类允许你指定格式。以下代码片段将数字格式设置为“00”，因此数字 1 到 10 显示为 `01, 02, 03...10`。它将日期格式设置为\
  \ `mm/dd/yyyy`。\n\n```\n// 将数字格式设置为 \"00\"\nJSpinner.NumberEditor nEditor = new\
  \ JSpinner.NumberEditor(numberSpinner, \"00\");\nnumberSpinner.setEditor(nEditor);\n\
  // 将日期格式设置为 mm/dd/yyyy\nJSpinner.DateEditor dEditor = new JSpinner.DateEditor(dateSpinner,\
  \ \"mm/dd/yyyy\");\ndateSpinner.setEditor(dEditor);\n```\n\n提示\n\n你可以使用 `JSpinner`\
  \ 或 `SpinnerModel` 中定义的 `getValue()` 方法来获取 `JSpinner` 中的当前值，返回值为对象。`SpinnerNumberModel`\
  \ 和 `SpinnerDateModel` 分别定义了 `getNumber()` 和 `getDate()` 方法，它们返回 `Number` 和 `Date`\
  \ 对象。\n\n\n\n## JScrollBar\n\n当您想要查看一个比可用空间更大的组件时，您需要使用 `JScrollBar` 或 `JScrollPane`\
  \ 组件。我将在下一节讨论 `JScrollPane`。`JScrollBar` 有一个方向属性，用于确定它是水平显示还是垂直显示。图 2-15 描绘了一个水平\
  \ `JScrollBar`。\n\n![A323071_2_En_2_Fig15_HTML.jpg](img/A323071_2_En_2_Fig15_HTML.jpg)\n\
  \n图 2-15.\n\n一个水平 JScrollBar\n\n一个 `JScrollBar` 由四部分组成：两个箭头按钮（两端各一个）、一个滑块（也称为拇指块）和一个滑道。当点击箭头按钮时，滑块会在滑道上向该箭头按钮移动。您可以通过鼠标将滑块拖向任意一端。您也可以通过点击滑道来移动滑块。\n\
  \n您可以通过在构造函数中传递值，或者在创建 `JScrollBar` 后设置其属性，来自定义它的各种属性。表 2-16 列出了一些常用属性及其操作方法。\n\n\
  表 2-16.\n\nJScrollBar 的常用属性及获取/设置这些属性的方法\n\n| 属性 | 方法 | 描述 |\n| --- | --- | ---\
  \ |\n| `方向` | `getOrientation()` `setOrientation()` | 确定 `JScrollBar` 是水平还是垂直。其值可以是\
  \ `JScrollBar` 类中定义的两个常量之一：`HORIZONTAL` 或 `VERTICAL`。 |\n| `值` | `getValue()` `setValue()`\
  \ | 滑块的位置即为它的值。初始值设置为零。 |\n| `可见范围` | `getVisibleAmount()` `setVisibleAmount()`\
  \ | 滑块的大小。它以与滑道大小的比例来表示。例如，如果滑道大小代表 150，而您将可见范围设置为 25，则滑块大小将是滑道大小的六分之一。其默认值为 10。\
  \ |\n| `最小值` | `getMinimum()` `setMinimum()` | 它代表的最小值。默认值为零。 |\n| `最大值` | `getMaximum()`\
  \ `setMaximum()` | 它代表的最大值。默认值为 100。 |\n\n以下代码片段演示了如何创建具有不同属性的 `JScrollBar`：\n\n\
  ```\n// 创建一个具有所有默认属性的 JScrollBar。其方向\n// 为垂直，当前值为 0，可见范围为 10，最小值为 0，最大值为 100\nJScrollBar\
  \ sb1 = new JScrollBar();\n// 创建一个具有默认值的水平 JScrollBar\nJScrollBar sb2 = new JScrollBar(JScrollBar.HORIZONTAL);\n\
  // 创建一个水平 JScrollBar，当前值为 50，\n// 可见范围为 15，最小值为 1，最大值为 150\nJScrollBar sb3 = new\
  \ JScrollBar(JScrollBar.HORIZONTAL, 50, 15, 1, 150);\n```\n\n`JScrollBar` 的当前值只能设置在其最小值与（最大值\
  \ – 可见范围）值之间。`JScrollBar` 本身不会为 GUI 增加任何价值。它只拥有一些属性。您可以向 `JScrollBar` 添加一个 `AdjustmentListener`，当它的值发生变化时，该监听器会收到通知。\n\
  \n```\n// 向名为 myScrollBar 的 JScrollBar 添加一个 AdjustmentListener\nmyScrollBar.addAdjustmentListener((AdjustmentEvent\
  \ e) -> {\nif (!e.getValueIsAdjusting()) {\n// 值改变时的逻辑写在这里\n}\n});\n```\n\n使用 `JScrollBar`\
  \ 来滚动浏览一个比其显示区域更大的组件并不简单。如果您想单独使用 `JScrollBar`，则需要编写大量代码才能实现该任务。`JScrollPane` 使这项任务变得更容易。它无需编写任何额外代码即可处理滚动。\n\
  \n## JScrollPane\n\n`JScrollPane` 是一个容器，可以容纳并显示最多九个组件，如图 2-16 所示。它使用自己的布局管理器，该管理器是\
  \ `JScrollPaneLayout` 类的一个对象。\n\n![A323071_2_En_2_Fig16_HTML.gif](img/A323071_2_En_2_Fig16_HTML.gif)\n\
  \n图 2-16.\n\nJScrollPane 的组件\n\n`JScrollPane` 管理的九个组件是两个 `JScrollBar`、一个视口、一个行头、一个列头和四个角。\n\
  \n*   **两个 JScrollBar**：在图中，两个滚动条分别命名为 HSB 和 VSB。它们是 `JScrollBar` 类的两个实例：一个水平，一个垂直。`JScrollPane`\
  \ 会为您创建并管理这两个 `JScrollBar`。您无需为此编写任何代码。您唯一需要指明的是是否需要它们，以及希望它们何时出现。\n*   **一个视口**：视口是\
  \ `JScrollPane` 显示可滚动组件（例如 `JTextArea`）的区域。您可以将视口想象成一个窥视孔，通过它，您可以使用滚动条上下/左右滚动来查看组件。视口是一个\
  \ Swing 组件。`JViewport` 类的对象代表一个视口组件。`JViewport` 只是 Swing 组件的一个包装器，用于实现该组件的可滚动视图。`JScrollPane`\
  \ 会为您的组件创建一个 `JViewport` 对象并在内部使用它。\n*   **行头和列头**：在图中，行头缩写为 RH。行/列头是您可以在 `JScrollPane`\
  \ 中使用的两个可选视口。当您使用水平滚动条时，列头会随之水平滚动。当您使用垂直滚动条时，行头会随之垂直滚动。行/列头的一个良好用途是在视口中为图片或绘图显示水平和垂直标尺。通常，您不会使用行/列头。\n\
  *   **四个角**：`JScrollPane` 中可以存在四个角。当两个组件垂直相交时，就会形成一个角。在图中，四个角分别命名为 C1、C2、C3 和 C4。这些并非\
  \ `JScrollPane` 赋予角的名称。我为了讨论方便而给它们命名。如果您添加了行头和列头，则存在角 C1。如果您添加了列头并且垂直滚动条可见，则存在角\
  \ C2。如果您添加了行头并且水平滚动条可见，则存在角 C3。如果水平和垂直滚动条都可见，则存在角 C4。您可以将任何 Swing 组件添加为角组件。唯一的限制是您不能将同一个组件添加到多个角中。请注意，添加角组件并不能保证它可见。只有当根据所讨论的规则该角存在时，角组件才会在该角可见。例如，如果您为\
  \ C4 角添加了一个角组件，那么只有当水平和垂直滚动条都可见时，它才会可见。如果其中一个或两个滚动条都不可见，则角 C4 不存在，您为该角添加的组件将不可见。\n\
  \n当组件尺寸大于 `JScrollPane` 尺寸时，需要某个方向（水平或垂直）的滚动条才能在视口中查看该组件。`JScrollPane` 允许您为垂直和水平滚动条设置滚动条策略。滚动条策略是控制滚动条何时出现的规则。您可以设置以下三种滚动条策略之一：\n\
  \n\n\n*   **按需显示**：这意味着 `JScrollPane` 应在需要时显示滚动条。当视口内的组件在水平或垂直方向上的尺寸大于其显示区域时，就需要滚动条。由\
  \ `JScrollPane` 决定何时需要滚动条，如果需要，它将使滚动条可见，否则将使其不可见。\n*   **始终显示**：这意味着 `JScrollPane`\
  \ 应始终显示滚动条。\n*   **从不显示**：这意味着 `JScrollPane` 应从不显示滚动条。\n\n滚动条策略由 `ScrollPaneConstants`\
  \ 接口中的六个常量定义。其中三个常量用于垂直滚动条，另外三个用于水平滚动条。`JScrollPane` 类实现了 `ScrollPaneConstants`\
  \ 接口，因此你也可以通过 `JScrollPane` 类来访问这些常量。定义滚动条策略的常量是 `XXX_SCROLLBAR_AS_NEEDED`、`XXX_SCROLLBAR_ALWAYS`\
  \ 和 `XXX_SCROLLBAR_NEVER`，你需要根据所引用的滚动条将 `XXX` 替换为 `VERTICAL` 或 `HORIZONTAL`。垂直和水平滚动条的默认策略都是“按需显示”。以下代码片段演示了如何使用不同选项创建\
  \ `JScrollPane`：\n\n```\n// 创建一个 JScrollPane，其视口不包含组件，\n// 滚动条策略默认为“按需显示”\nJScrollPane\
  \ sp1 = new JScrollPane();\n// 创建一个 JScrollPane，其视口包含一个 JTextArea，\n// 滚动条策略默认为“按需显示”\n\
  JTextArea description = new JTextArea(10, 60);\nJScrollPane sp2 = new JScrollPane(description);\n\
  // 创建一个 JScrollPane，其视口包含一个 JTextArea，\n// 并将两个滚动条策略都设置为“始终显示”\nJTextArea comments\
  \ = new JTextArea(10, 60);\nJScrollPane sp3 = new JScrollPane(comments,\nJScrollPane.VERTICAL_SCROLLBAR_ALWAYS,\
  \                                  JScrollPane.HORIZONTAL_SCROLLBAR_ALWAYS);\n```\n\
  \n如前所述，当你向 `JScrollPane` 添加组件时，你是将 `JScrollPane` 添加到容器中，而不是组件本身。`JScrollPane` 的视口会保留你添加到其中的组件的引用。你可以通过查询其视口来获取\
  \ `JScrollPane` 中组件的引用，如下所示：\n\n```\n// 获取 JScrollPane sp3 的视口引用\nJViewport vp =\
  \ sp3.getViewport();\n// 使用视口引用获取添加到 JScrollPane sp3 中的 comments JTextArea 的引用\n\
  JTextArea comments1 = (JTextArea)vp.getView();\n```\n\n如果你在创建 `JScrollPane` 时没有为其视口指定组件，之后可以使用其\
  \ `setViewportView()` 方法向视口添加组件，如下所示：\n\n```\n// 为 sp3 设置一个 JTextPane 作为视口组件\nsp3.setViewportView(new\
  \ JTextPane());\n```\n\n## JProgressBar\n\n`JProgressBar` 用于显示任务的进度。它具有方向性，可以是水平或垂直的。它关联了三个值：当前值、最小值和最大值。你可以像下面这样创建一个进度条：\n\
  \n```\n// 创建一个水平进度条，其当前值、最小值和最大值分别设置为 0、0 和 100。\nJProgressBar hpBar1 = new JProgressBar();\n\
  // 创建一个水平进度条，其当前值、最小值和最大值分别设置为 20、20 和 200。\nJProgressBar hpbar2 = new JProgressBar(SwingConstants.HORIZONTAL,\
  \ 20, 200);\n// 创建一个垂直进度条，其当前值、最小值和最大值分别设置为 5、5 和 50。\nJProgressBar vpBar1 = new\
  \ JProgressBar(SwingConstants.VERTICAL, 5, 50);\n```\n\n随着任务的进行，你需要使用进度条的 `setValue(int\
  \ value)` 方法来设置当前值以指示进度。组件会自动更新其视觉显示以反映新值。进度的显示方式因应用程序的外观和感觉而异。有时使用实心条来显示进度，有时则使用实心矩形。你可以使用\
  \ `getValue()` 方法来获取当前值。\n\n你还可以使用 `setStringPainted()` 方法来显示描述进度条当前值的字符串。向此方法传递\
  \ `true` 会显示字符串值，传递 `false` 则不显示。要绘制的字符串通过调用 `setString(String s)` 方法来指定。\n\n有时任务的当前进度值是未知或不确定的。在这种情况下，你无法为进度条设置当前值。相反，你可以向用户指示任务正在执行中。你可以使用进度条的\
  \ `setIndeterminate()` 方法将其设置为不确定模式。向此方法传递 `true` 会将进度条置于不确定模式，传递 `false` 则将其置于确定模式。`JProgressBar`\
  \ 组件会显示动画以指示其不确定状态。\n\n图 2-17 显示了一个包含两个 `JProgressBar` 的 `JFrame`。水平 `JProgressBar`\
  \ 处于确定模式，并显示一个字符串来描述进度。垂直 `JProgressBar` 被设置为不确定模式；请注意中间以动画形式显示的实心矩形条。\n\n![A323071_2_En_2_Fig17_HTML.jpg](img/A323071_2_En_2_Fig17_HTML.jpg)\n\
  \n图 2-17.\n\nJProgressBar 的实际应用\n\n\n\n## JSlider\n\n`JSlider` 允许您通过沿轨道滑动旋钮，以图形方式从两个整数之间的一组值中选择一个值。它具有四个重要属性：方向、最小值、最大值和当前值。方向决定了它是水平显示还是垂直显示。您可以使用\
  \ `SwingConstants.VERTICAL` 和 `SwingConstants.HORIZONTAL` 作为其方向的有效值。以下代码片段创建了一个水平\
  \ `JSlider`，其最小值为 0，最大值为 10，当前值设置为 5：\n\n```\nJSlider points = new JSlider(0, 10,\
  \ 5);\n```\n\n您可以使用 `JSlider` 的 `getValue()` 方法获取其当前值。通常，用户通过将旋钮向右/左滑动（对于水平 `JSlider`）或向上/下滑动（对于垂直\
  \ `JSlider`）来设置 `JSlider` 的当前值。您也可以使用其 `setValue(int value)` 方法以编程方式设置其值。\n\n您可以在\
  \ `JSlider` 上显示次要刻度和主要刻度。您需要设置这些刻度显示的间隔，并调用其方法启用刻度绘制，如下所示：\n\n```\npoints.setMinorTickSpacing(1);\n\
  points.setMajorTickSpacing(2);\npoints.setPaintTicks(true);\n```\n\n您还可以在 `JSlider`\
  \ 中显示沿轨道的值标签。您可以显示标准标签或自定义标签。标准标签将沿轨道显示整数值。您可以调用其 `setPaintLabels(true)` 方法以主要刻度间距显示整数值。图\
  \ 2-18 显示了一个带有刻度和标准标签的 `JSlider`。\n\n![A323071_2_En_2_Fig18_HTML.jpg](img/A323071_2_En_2_Fig18_HTML.jpg)\n\
  \n图 2-18.\n\n一个 JSlider 组件，其最小值 = 0，最大值 = 10，当前值 = 5，次要刻度间距 = 1，主要刻度间距 = 2，刻度绘制已启用，并显示标准标签\n\
  \n`JSlider` 也允许您设置自定义标签。`JSlider` 上的标签使用 `JLabel` 组件显示。您需要创建一个包含 `值-标签` 对的 `Hashtable`，并使用其\
  \ `setLabelTable()` 方法来设置标签。一个 `值-标签` 对由一个 `Integer-JLabel` 对组成。以下代码片段为值 `0` 设置标签\
  \ `Poor`，为值 `5` 设置标签 `Average`，为值 `10` 设置标签 `Excellent`。设置标签表并不会显示标签。您必须调用 `setPaintLabels(true)`\
  \ 方法来显示它们。图 2-19 显示了一个由以下代码片段生成的自定义标签的 `JSlider`：\n\n![A323071_2_En_2_Fig19_HTML.jpg](img/A323071_2_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19.\n\n一个带有自定义标签的 JSlider\n\n```\n// 在 Hashtable 中创建值-标签对\nHashtable labelTable\
  \ = new Hashtable();\nlabelTable.put(new Integer(0), new JLabel(\"Poor\"));\nlabelTable.put(new\
  \ Integer(5), new JLabel(\"Average\"));\nlabelTable.put(new Integer(10), new JLabel(\"\
  Excellent\"));\n// 为 JSlider 设置标签并使其可见\npoints.setLabelTable(labelTable);\npoints.setPaintLabels(true);\n\
  ```\n\n## JSeparator\n\n当您想在两个组件或两组组件之间添加分隔符时，`JSeparator` 是一个方便使用的组件。通常，`JSeparator`\
  \ 在菜单中用于分隔相关的菜单项组。您可以通过指定其方向来创建水平或垂直的 `JSeparator`。您可以在任何使用 Swing 组件的地方使用它。\n\n\
  ```\n// 创建一个水平分隔符\nJSeparator hs = new JSeparator(); // 默认情况下，类型为水平\n// 创建一个垂直分隔符\n\
  JSeparator vs = new JSeparator(SwingConstants.VERTICAL);\n```\n\n`JSeparator` 会自行扩展以填充布局管理器提供的大小。您可以使用\
  \ `setOrientation()` 和 `getOrientation()` 方法来设置和获取 `JSeparator` 的方向。\n\n## 菜单\n\n\
  菜单组件用于以紧凑的形式向用户提供一系列操作。您也可以使用一组 `JButton` 来提供一系列操作，其中每个 `JButton` 代表一个操作。使用菜单还是一组\
  \ `JButton` 来呈现操作列表是个人偏好问题。然而，使用菜单有一个明显的优势：与一组 `JButton` 相比，它在屏幕上占用的空间要少得多。菜单通过将一个选项组折叠（或嵌套）在另一个选项下来节省空间。例如，如果您使用过文件编辑器，诸如\
  \ `New`、`Open`、`Save` 和 `Print` 等选项会嵌套在一个顶层的 `File` 菜单选项下。用户需要点击 `File` 菜单才能看到其下可用的选项列表。通常，对于一组\
  \ `JButton`，所有 `JButton` 始终对用户可见，用户很容易知道有哪些可用操作。因此，当您决定使用菜单还是 `JButton` 时，需要在空间占用和易用性之间进行一些权衡。\n\
  \n还有另一种菜单，称为弹出菜单。它完全不占用屏幕上的任何空间。通常，当用户点击鼠标右键时才会显示。一旦用户做出选择或在显示的弹出菜单区域外点击鼠标，它就会消失。它是一种超级紧凑的菜单组件。然而，它使用户难以知道有任何可用选项。有时，屏幕上会显示一条文本消息，提示用户需要右键单击以查看可用选项列表。`JPopupMenu`\
  \ 类的对象在 Swing 中代表一个弹出菜单。现在让我们看看菜单的实际应用。\n\n创建菜单并将其添加到 `JFrame` 是一个多步骤的过程。以下步骤详细描述了该过程。\n\
  \n创建一个 `JMenuBar` 类的对象，并使用其 `setJMenuBar()` 方法将其添加到 `JFrame`。`JMenuBar` 是一个空容器，用于容纳一个菜单选项列表，而\
  \ `JMenuBar` 中的每个选项代表一个选项列表。\n\n```\n// 创建一个 JMenuBar 并将其设置到 JFrame\nJMenuBar menuBar\
  \ = new JMenuBar();\nmyFrame.setJMenuBar(menuBar);\n```\n\n此时，您有一个与 `JFrame` 关联的空\
  \ `JMenuBar`。现在，您需要将选项列表（也称为顶层菜单选项）添加到 `JMenuBar`。`JMenu` 类的对象代表一个选项列表。`JMenu` 也是一个空容器，可以容纳代表选项的菜单项。您需要将菜单选项添加到\
  \ `JMenu`。`JMenu` 并不总是显示添加到其中的选项。相反，它会在用户选择该 `JMenu` 时显示它们。这就是使用菜单时获得紧凑性的地方。当您选择一个\
  \ `JMenu` 时，它会弹出一个窗口，显示其中包含的选项。一旦您从弹出窗口中选择了一个选项，或者在 `JMenu` 之外的某处点击，弹出窗口就会消失。\n\n\
  ```\n// 创建两个 JMenu（或两个顶层菜单选项）：\n// File 和 Help，并将它们添加到 JMenuBar\nJMenu fileMenu\
  \ = new JMenu(\"File\");\nJMenu helpMenu = new JMenu(\"Help\");\nmenuBar.add(fileMenu);\n\
  menuBar.add(helpMenu);\n```\n\n此时，您的 `JFrame` 将在其顶部区域显示一个菜单栏，其中包含两个选项：File 和 Help，如图\
  \ 2-20 所示。如果您选择或点击 File 或 Help，此时不会发生任何事情。\n\n![A323071_2_En_2_Fig20_HTML.jpg](img/A323071_2_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20.\n\n一个带有两个 JMenu 选项的 JMenuBar\n\n让我们向您的 `JMenu` 添加一些选项。您希望在 File 下显示三个菜单选项：New、Open\
  \ 和 Exit。您希望在 Open 和 Exit 选项之间添加一个分隔符（一条水平线作为分隔线）。`JMenuItem` 类的对象代表 `JMenu` 内部的一个选项。\n\
  \n\n\n```\n// 创建菜单项\nJMenuItem newMenuItem = new JMenuItem(\"新建\");\nJMenuItem openMenuItem\
  \ = new JMenuItem(\"打开\");\nJMenuItem exitMenuItem = new JMenuItem(\"退出\");\n//\
  \ 向菜单添加菜单项和分隔符\nfileMenu.add(newMenuItem);\nfileMenu.add(openMenuItem);\nfileMenu.addSeparator();\n\
  fileMenu.add(exitMenuItem);\n```\n\n至此，您已向“文件”菜单添加了三个 `JMenuItem`。当您点击“文件”菜单时，它将显示如图\
  \ 2-21 所示的选项。您可以通过键盘上的向下/向上箭头键滚动查看“文件”菜单下的选项，或使用鼠标选择其中一个。当您选择“文件”菜单下的任一选项时，不会发生任何操作，因为您尚未为其添加任何动作。\n\
  \n![A323071_2_En_2_Fig21_HTML.jpg](img/A323071_2_En_2_Fig21_HTML.jpg)\n\n图 2-21.\n\
  \n一个包含三个选项的 JMenu 文件菜单\n\n您可能希望在一个菜单项（例如“新建”选项）下拥有两个子选项。也就是说，用户可以创建两种不同的内容：保单和理赔，并且您希望这两个选项都位于“新建”选项下。您并不是要在选项内嵌套选项。“文件”菜单是\
  \ `JMenu` 类的一个实例，它代表一个选项列表，而您希望添加一个同样能显示选项列表的“新建”菜单。这很容易实现。您唯一需要理解的是，`JMenu` 代表一个选项列表，而\
  \ `JMenuItem` 仅代表单个选项。您可以将 `JMenuItem` 或 `JMenu` 添加到 `JMenu` 中。为此，您需要对前面显示的代码片段稍作修改。现在，“新建”菜单将是\
  \ `JMenu` 类的一个实例，而不是 `JMenuItem` 类。您将向“新建”菜单添加两个 `JMenuItem`。以下代码片段即可实现此功能：\n\n\
  ```\n// New 是一个 JMenu – 一个选项列表\nJMenu newMenu = new JMenu(\"新建\");\nJMenuItem policyMenuItem\
  \ = new JMenuItem(\"保单\");\nJMenuItem claimMenuItem = new JMenuItem(\"理赔\");\nnewMenu.add(policyMenuItem);\n\
  newMenu.add(claimMenuItem);\nJMenuItem openMenuItem = new JMenuItem(\"打开\");\nJMenuItem\
  \ exitMenuItem = new JMenuItem(\"退出\");\nfileMenu.add(newMenu);\nfileMenu.add(openMenuItem);\n\
  fileMenu.addSeparator();\nfileMenu.add(exitMenuItem);\n```\n\n现在，菜单显示如图 2-22 所示。当您选择“文件”菜单时，“新建”菜单旁边会显示一个箭头，表示它包含子菜单。当您选择“新建”菜单时，它会显示两个分别标记为“保单”和“理赔”的子菜单。\n\
  \n![A323071_2_En_2_Fig22_HTML.jpg](img/A323071_2_En_2_Fig22_HTML.jpg)\n\n图 2-22.\n\
  \n嵌套菜单\n\n菜单的嵌套层级没有限制。然而，超过两层的嵌套通常不被认为是良好的 GUI 实践，因为用户需要深入多层才能找到可用选项。\n\n使菜单生效的最后一步是为菜单项添加动作。您可以为\
  \ `JMenuItem` 添加动作监听器。当用户选择该 `JMenuItem` 时，关联的动作监听器会收到通知。以下代码片段为“退出”菜单项添加了一个动作监听器，该监听器将退出应用程序：\n\
  \n```\n// 为退出菜单项添加动作监听器\nexitMenuItem.addActionListener(e -> System.exit(0));\n\
  ```\n\n现在您已经为“退出”菜单项添加了动作。如果您选择它，应用程序将退出。类似地，您可以为其他菜单项添加动作监听器，以便在选择它们时执行相应操作。\n\n\
  您可以使用 `setEnabled()` 方法来启用/禁用菜单。虽然可以使菜单可见/不可见，但这并非良好实践。这会让用户难以学习应用程序。如果您始终保持所有菜单选项可用（无论是启用还是禁用状态），用户将能够通过了解菜单选项的位置来更快地使用应用程序。如果您使菜单选项可见/不可见，菜单选项的位置会不断变化，用户每次使用时都必须更加关注菜单选项的位置。\n\
  \n您还可以为菜单选项分配快捷键。您可以使用 `setMnemonic()` 方法，通过指定快捷键来为菜单项添加快捷键。您可以通过按下 Alt 键和快捷键的组合来调用该菜单项所代表的动作。请注意，菜单项必须可见，其助记符才能生效。例如，如果您为“新建”菜单选项设置了助记符（N\
  \ 键），则必须选择“文件”菜单以使“新建”菜单选项可见，然后按 Alt+N 来调用“新建”菜单项所代表的动作。\n\n如果您希望无论菜单项是否可见都能调用其关联动作，则需要使用\
  \ `setAccelerator()` 方法设置其加速键。以下代码片段将 E 键设置为“退出”菜单选项的助记符，并将 Ctrl+E 设置为其加速键：\n\n\
  ```\n// 将 E 设置为退出菜单的助记符，Ctrl+E 为其加速键\nexitMenuItem.setMnemonic(KeyEvent.VK_E);\n\
  KeyStroke cntrlEKey = KeyStroke.getKeyStroke(KeyEvent.VK_E, ActionEvent.CTRL_MASK);\n\
  exitMenuItem.setAccelerator(cntrlEKey);\n```\n\n现在，您可以通过两种方式调用“退出”菜单选项：当它可见时，您可以按\
  \ Alt+E 组合键；或者您可以随时按 Ctrl+E 组合键。\n\n您可以使用弹出菜单，它按需显示。创建弹出菜单类似于创建 `JMenu`。您需要创建 `JPopupMenu`\
  \ 类的一个实例，它代表一个空的弹出菜单容器，然后向其中添加 `JMenuItem` 的实例。您也可以在弹出菜单中嵌套菜单，就像在 `JMenu` 中一样。\n\
  \n```\n// 创建一个弹出菜单\nJPopupMenu popupMenu = new JPopupMenu();\n// 为我们的弹出菜单创建三个菜单项\n\
  JMenuItem popup1 = new JMenuItem(\"弹出项 1\");\nJMenuItem popup2 = new JMenuItem(\"\
  弹出项 2\");\nJMenuItem popup3 = new JMenuItem(\"弹出项 3\");\n// 将菜单项添加到弹出菜单\npopupMenu.add(popup1);\n\
  popupMenu.add(popup2);\npopupMenu.add(popup3);\n```\n\n由于弹出菜单没有固定位置，并且是按需显示的，您需要知道在何处以及何时显示它。您需要使用其\
  \ `show()` 方法在某个位置显示它。`show()` 方法接受三个参数：调用者组件（将使用其空间来显示弹出菜单），以及弹出菜单在调用者组件上显示的 x\
  \ 和 y 坐标。\n\n```\n// 显示弹出菜单\npopupMenu.show(myComponent, xPos, yPos);\n```\n\n通常，当用户点击鼠标右键时显示弹出菜单。不同的外观和感觉选项使用不同的按键事件来显示弹出菜单。例如，一种外观和感觉方案在释放鼠标右键时显示它，而另一种则在按下鼠标右键时显示它。Swing\
  \ 通过在 `MouseEvent` 类中提供 `isPopupTrigger()` 方法，使您能够轻松显示弹出菜单。在鼠标按下或释放事件中，您需要调用此方法。如果此方法返回\
  \ `true`，则显示弹出菜单。以下代码片段将鼠标监听器关联到一个组件，并显示弹出菜单：\n\n\n\n```\n// 创建一个鼠标监听器\nMouseListener\
  \ ml = new MouseAdapter() {\n@Override\npublic void mousePressed(MouseEvent e) {\n\
  if (e.isPopupTrigger()) {\npopupMenu.show(e.getComponent(), e.getX(), e.getY());\n\
  }\n}\n@Override\npublic void mouseReleased(MouseEvent e) {\nif (e.isPopupTrigger())\
  \ {\npopupMenu.show(e.getComponent(), e.getX(), e.getY());\n}\n}\n};\n// 为 myComponent\
  \ 添加鼠标监听器\nmyComponent.addMouseListener(ml);\n```\n\n每当用户在 `myComponent` 上右键单击时，都会弹出一个弹出菜单。请注意，你需要在\
  \ `mousePressed()` 和 `mouseReleased()` 方法中都添加相同的代码。具体由哪个事件触发弹出菜单的显示，取决于当前的外观和风格。\n\
  \n清单 2-8 包含一个完整的程序，演示了如何使用菜单。该程序较长，它重复执行了创建和添加菜单项以及为其添加动作监听器的工作。\n\n```\n// JMenuFrame.java\n\
  package com.jdojo.swing.component;\nimport javax.swing.JFrame;\nimport java.awt.Container;\n\
  import javax.swing.JMenuBar;\nimport javax.swing.JMenu;\nimport javax.swing.JMenuItem;\n\
