  import java.nio.channels.AsynchronousSocketChannel;\nimport java.nio.channels.AsynchronousServerSocketChannel;\n\
  public class AsyncEchoServerSocket {\nprivate static class Attachment {\nAsynchronousServerSocketChannel\
  \ server;\nAsynchronousSocketChannel client;\nByteBuffer buffer;\nSocketAddress\
  \ clientAddr;\nboolean isRead;\n}\nprivate static class ConnectionHandler implements\n\
  CompletionHandler {\n@Override\npublic void completed(AsynchronousSocketChannel\
  \ client, Attachment attach) {\ntry {\n// 获取客户端地址\nSocketAddress clientAddr = client.getRemoteAddress();\n\
  System.out.format(\"接受来自 %s 的连接%n\", clientAddr);\n// 接受另一个连接\nattach.server.accept(attach,\
  \ this);\n// 通过异步读取处理客户端连接\nReadWriteHandler rwHandler = new ReadWriteHandler();\n\
  Attachment newAttach = new Attachment();\nnewAttach.server = attach.server;\nnewAttach.client\
  \ = client;\nnewAttach.buffer = ByteBuffer.allocate(2048);\nnewAttach.isRead = true;\n\
