  ## 事务中的保存点\n\n数据库事务由一个或多个更改组成，这些更改作为一个工作单元。事务中的保存点就像一个标记，用于标记事务中的某个点，以便在需要时可以将事务回滚（或撤销）到该点。让我们以在\
  \ `person` 表中插入五条记录为例，如下所示：\n\n```\nConnection conn = JDBCUtil.getConnection();\n\
  Statement stmt = conn.createStatement();\nstmt.execute(\"insert into person...\"\
  ); // 插入 1\nstmt.execute(\"insert into person...\"); // 插入 2\nstmt.execute(\"insert\
  \ into person...\"); // 插入 3\nstmt.execute(\"insert into person...\"); // 插入 4\n\
  stmt.execute(\"insert into person...\"); // 插入 5\n```\n\n此时，你只有两个选择：要么提交事务，这将把所有五条记录插入到\
  \ `person` 表中；要么回滚事务，这样五条记录都不会被插入。你可以执行提交或回滚，如下所示：\n\n```\nconn.commit(); // 保存所有五条记录\n\
  ```\n\n或者\n\n```\nconn.rollback(); // 不保存任何一条记录\n```\n\n保存点允许你在任意两个 `INSERT` 语句之间设置一个标记。`Savepoint`\
  \ 接口的对象表示事务中的一个保存点。要在事务中标记一个保存点，你只需调用 `Connection` 的 `setSavepoint()` 方法。`setSavepoint()`\
  \ 方法已被重载。一个版本不接受任何参数，另一个版本接受一个字符串，该字符串是保存点的名称。`setSavepoint()` 方法返回一个 `Savepoint`\
  \ 对象，这就是你的标记，你必须保留它以备将来使用。让我们使用在每个 `INSERT` 语句之后设置保存点的方式重写之前的逻辑。\n\n```\nConnection\
  \ conn = JDBCUtil.getConnection();\nStatement stmt = conn.createStatement();\nstmt.execute(\"\
  insert into person...\");     // 插入 1\nSavepoint sp1 = conn.setSavepoint();    \
  \   // 保存点 1\nstmt.execute(\"insert into person...\");     // 插入 2\nSavepoint sp2\
  \ = conn.setSavepoint();       // 保存点 2\nstmt.execute(\"insert into person...\"\
  );     // 插入 3\nSavepoint sp3 = conn.setSavepoint();       // 保存点 3\nstmt.execute(\"\
  insert into person...\");     // 插入 4\nSavepoint sp4 = conn.setSavepoint();    \
  \   // 保存点 4\nstmt.execute(\"insert into person...\");     // 插入 5\n```\n\n此时，如果你想撤销对\
  \ `person` 表的这五次插入中的任何一次，你就可以对事务进行更精细的控制。现在你可以使用 `Connection` 的另一个版本的 `rollback()`\
  \ 方法，该方法接受一个 `Savepoint` 对象。如果你想撤销保存点 4 之后所做的所有更改，可以按如下方式操作：\n\n```\n// 仅回滚插入 5\n\
  conn.rollback(sp4);\n```\n\n如果你想撤销保存点 2 之后所做的所有更改，可以按如下方式操作：\n\n```\n// 回滚插入 3、4\
  \ 和 5\nconn.rollback(sp2);\n```\n\n如果你回滚到保存点 1，则事务中只会保留第一次插入。在回滚到某个保存点之后，你能改变主意吗？假设，在你调用\
  \ `conn.rollback(sp2)` 之后，你意识到自己犯了一个错误，你只想回滚插入 4 和 5，而不是插入 3。调用 `conn.rollback(sp2)`\
  \ 将回滚三次插入：3、4 和 5。在回滚到保存点 2 之后，你还有办法只回滚到保存点 3 吗？不行。在这种情况下，你没有其他选择。一旦你回滚到某个保存点（例如\
  \ `spx`），在该保存点 `spx` 之后创建的所有保存点都会被释放，并且你不能再引用它们。如果你引用一个已释放的保存点，JDBC 驱动程序将抛出 `SQLException`。以下代码片段将抛出\
  \ `SQLException`：\n\n```\nconn.rollback(sp2); // 将释放 sp3 和 sp4\nconn.rollback(sp3);\
  \ // 将抛出异常。sp3 已被释放。\n```\n\n请注意，当你将事务回滚到某个保存点时，该保存点本身不会被释放。当你调用 `conn.rollback(sp2)`\
  \ 时，保存点 `sp2` 仍然有效。之后你可以添加更多保存点，并再次回滚到保存点 `sp2`。\n\n你还可以通过调用 `Connection` 的 `releaseSavepoint(Savepoint\
  \ sp)` 方法来显式释放一个保存点。释放一个保存点也会释放该保存点之后创建的所有后续保存点。例如，调用 `conn.releaseSavepoint(sp2)`\
  \ 将释放保存点 `sp2`、`sp3` 和 `sp4`。当事务被提交或完全回滚时，事务中的所有保存点都会被释放。如果你使用已通过上述任何方式释放的保存点，JDBC\
  \ 驱动程序将抛出 `SQLException`。清单 5-35 展示了如何在事务中使用保存点。\n\n提示\n\n你可以通过使用 `DatabaseMetaData`\
  \ 对象的 `supportsSavepoints()` 方法来检查 JDBC 驱动程序是否支持保存点。\n\n```\n// SavePointTest.java\n\
  package com.jdojo.jdbc;\nimport java.sql.Connection;\nimport java.sql.SQLException;\n\
  import java.sql.PreparedStatement;\nimport java.sql.Savepoint;\npublic class SavePointTest\
  \ {\npublic static void main(String[] args) {\nConnection conn = null;\ntry {\n\
  // 连接到数据库\nconn = JDBCUtil.getConnection();\nconn.setAutoCommit(false);\n// SQL\
  \ 语句\nString SQL = \"update person \"\n+ \"set income = ? \"\n+ \"where person_id\
  \ = ?\";\nPreparedStatement pstmt = conn.prepareStatement(SQL);\npstmt.setDouble(1,\
  \ 20000);\npstmt.setInt(2, 101);\npstmt.execute();\n// 设置一个保存点\nSavepoint sp1 =\
  \ conn.setSavepoint();\n// 将收入改为 25000 并再次执行 SQL\npstmt.setDouble(1, 25000);\npstmt.execute();\n\
  // 设置一个保存点\nSavepoint sp2 = conn.setSavepoint();\n// 在此处执行更多数据库更改。将事务回滚到保存点 sp1，\n\
  // 以便 person_id 为 101 的收入将保持设置为\n// 20000，而不是 25000\nconn.rollback(sp1);\n// 提交事务\n\
  JDBCUtil.commit(conn);\n} catch (SQLException e) {\nSystem.out.println(e.getMessage());\n\
  JDBCUtil.rollback(conn);\n} finally {\nJDBCUtil.closeConnection(conn);\n}\n}\n}\n\
  清单 5-35.\n在事务中使用保存点\n```\n\n\n\n## 使用 DataSource\n\n你需要一个 `Connection` 来与数据库通信。到目前为止，你一直使用\
  \ `DriverManager` 类来获取 `Connection`。你需要向 `DriverManager` 注册数据库驱动程序，并指定数据库连接属性的详细信息。所有这些操作都必须在位于主应用程序逻辑中的\
  \ Java 代码中完成。如果任何与数据库连接相关的内容发生变化，你就必须修改处理建立数据库连接的代码。\n\nJDBC API 提供了另一种在 Java 应用程序中获取\
  \ `Connection` 的方法。你可以使用 `javax.sql.DataSource` 接口来获取数据库连接。在这种处理数据库连接的替代方式中，事情被分为两个逻辑模块：连接管理和连接消费。\n\
  \n*   一个模块负责在服务器上配置和部署 `DataSource` 对象，该服务器允许使用 Java 命名和目录接口（JNDI）服务进行查找。配置涉及设置\
  \ `DataSource` 对象的属性，这些属性将用于建立与数据库的连接，例如服务器名称、端口号、网络协议等。部署涉及将配置好的 `DataSource` 对象通过赋予其一个逻辑名称存储在\
  \ JNDI 服务器上。部署也称为绑定，因为一个 `DataSource` 对象被绑定到一个逻辑名称。通常，系统管理员执行此步骤。赋予 `DataSource`\
  \ 对象的逻辑名称会告知需要查找该 `DataSource` 对象的开发人员。通常，你在使用 J2EE 技术的应用服务器中使用 `DataSource`。应用服务器会为你提供一个\
  \ GUI 工具来配置和部署 `DataSource` 对象。\n*   需要 `Connection` 的 Java 应用程序使用 `DataSource`\
  \ 的逻辑名称，通过 JNDI API 执行查找。查找操作返回一个 `DataSource` 接口的实例。你可以使用其 `getConnection()` 方法从\
  \ `DataSource` 对象获取 `Connection` 对象。`getConnection()` 方法被重载了。一个版本不接受参数，另一个版本接受 `userId`\
  \ 和 `password` 作为参数。`getConnection()` 方法的工作方式类似于 `DriverManager` 类的 `getConnection()`\
  \ 方法。开发人员执行此步骤。\n\n通常，你在服务器上配置和部署一个 `DataSource`，该服务器可通过 JNDI 服务使用。以下是一个示例代码片段，你可以使用它以编程方式配置和部署\
  \ `DataSource`。它创建了一个由 MYSQL JDBC 驱动程序提供的 `DataSource`。\n\n```\nimport com.mySQL.jdbc.jdbc2.optional.MySQLDataSource;\n\
  import javax.naming.InitialContext;\nimport javax.naming.Context;\n...\n// 创建一个\
  \ DataSource 对象\nMySQLDataSource mds = new MySQLDataSource();\nmds.setServerName(\"\
  localhost\");\nmds.setPortNumber(3306);\nmds.setUser(\"app\");\nmds.setPassword(\"\
  app\");\n// 获取初始上下文\nContext ctx = new InitialContext();\n// 将 DataSource 对象绑定（或注册）到逻辑名称\
  \ \"jdbc/mydb\" 下\nctx.bind(\"jdbc.mydb\", mds);\n```\n\n需要数据库连接的 Java 应用程序将使用绑定时所赋予\
  \ `DataSource` 的逻辑名称执行查找。以下是当你需要 `Connection` 对象时需要编写的典型 Java 代码片段：\n\n```\nimport\
  \ javax.sql.DataSource;\nimport java.sql.Connection;\nimport javax.naming.InitialContext;\n\
  import javax.naming.Context;\n...\n// 获取初始上下文\nContext ctx = new InitialContext();\n\
  // 使用逻辑名称 \"jdbc/mydb\" 查找 DataSource\nDataSource ds = (DataSource)ctx.lookup(\"\
  jdbc/mydb\");\n// 从 DataSource 对象获取 Connection 对象\nConnection conn = ds.getConnection();\n\
  // 执行其他与数据库相关的任务...\n// 关闭连接\nconn.close()\n```\n\nJDBC API 还提供了另外两种类型的数据源接口：\n\n\
  *   `javax.sql.ConnectionPoolDataSource`\n*   `javax.sql.XADataSource`\n\n`ConnectionPoolDataSource`\
  \ 接口包含一个 `getPooledConnection()` 方法，该方法返回一个 `PooledConnection` 接口的实例。`XADataSource`\
  \ 接口包含一个 `getXAConnection()` 方法，该方法返回一个 `XAConnection` 接口的实例。\n\n`ConnectionPoolDataSource`\
  \ 接口的实现提供了连接池功能，以提高应用程序的性能。基本的 `DataSource` 实现在从中获取 `Connection` 对象时建立连接，并在 `Connection`\
  \ 对象关闭时断开与数据库的连接。`ConnectionPoolDataSource` 实现维护了一个数据库连接池。当需要数据库连接时，它会从池中提供一个连接。当数据库连接关闭时，它并不会物理上断开\
  \ `Connection` 对象与数据库的连接。相反，它会将连接对象返回到池中以供重用。建立数据库连接是一个耗时的过程。通过在应用程序中使用 `ConnectionPoolDataSource`\
  \ 来使用连接池，可以极大地提高应用程序的性能。当你可以与数据库建立的连接数量有限时，连接池机制也很有用。在这种情况下，你可以维护一个有限数量连接的池，用户将轮流使用这些连接。\n\
  \n`XADataSource` 接口的实现提供了对分布式事务的支持，这些事务涉及多个数据库。事务管理器与 `XADataSource` 对象一起用于管理分布式事务。通常，`XADataSource`\
  \ 也支持连接池。\n\nJDK 9 为现有接口添加了几个接口和方法，以支持连接构建器、分片键等，这些都被添加到 JDBC API 中。JDBC 驱动程序的供应商需要一些时间来提供对这些新功能的支持。JDK\
  \ 9 新功能的总结如下：\n\n*   一个新的 `ConnectionBuilder` 接口允许你构建一个 `Connection`。`ConnectionBuilder`\
  \ 是从 `DataSource` 对象创建的。\n*   新的 `ShardingKey` 和 `ShardingKeyBuilder` 接口允许你处理分片数据库。将数据集水平分区到多个独立数据库称为分片。每个这样的数据库称为一个分片。所有分片共同构成一个逻辑数据库，称为分片数据库（SDB）。分片键是一个分区键。`ShardingKey`\
  \ 接口的实例表示一个分片键。你可以使用 `ShardingKeyBuilder` 创建一个 `ShardingKey`。`ShardingKeyBuilder`\
  \ 是通过 `DataSource` 的 `createShardingKeyBuilder()` 方法从 `DataSource` 获取的。\n*   你可以使用\
  \ `Connection` 接口的 `setShardingKey()` 方法为 `Connection` 设置一个 `ShardingKey`。`Connection`\
  \ 上的分片键决定了执行数据库操作的分片。\n*   你可以使用 `DatabaseMetaData` 接口的 `supportsSharding()` 方法来检查你的数据库是否支持分片。如果你的数据库支持分片，该方法返回\
  \ `true`；否则返回 `false`。\n*   `Connection` 接口新增了两个名为 `beginRequest()` 和 `endRequest()`\
  \ 的默认方法。这些方法旨在供连接池管理器使用，而非开发人员。这些方法是对 JDBC 驱动程序的提示，用于指示一个独立工作单元的开始和结束。\n\n\n\n##\
  \ 检索 SQL 警告\n\n有时，数据库管理系统（DBMS）会发出 SQL 警告，而不是抛出异常。SQL 警告表示数据库交互已完成，但并非一切正常。JDBC\
  \ API 允许你使用 `java.sql.SQLWarning` 对象检索 DBMS 发出的 SQL 警告。`SQLWarning` 类继承自 `SQLException`\
  \ 类。`SQLWarning` 存储了 SQL 警告链。SQL 警告可能针对 `Connection`、`Statement`（包括 `PreparedStatement`\
  \ 和 `CallableStatement`）或 `ResultSet` 发出。你可以使用这些对象的 `getWarnings()` 方法检索与它们关联的第一个警告对象。如果某个对象上没有报告任何警告，该方法将返回\
  \ `null`。一旦你在这些对象上调用 `getWarnings()` 方法，它们的警告就会被清除。你也可以通过调用它们的 `clearWarnings()`\
  \ 方法来清除警告。请注意，这些对象必须处于打开状态才能访问其上报告的警告。一旦你执行或重新执行 `Statement`，其警告将被重置。以下代码片段可用于打印任何对象（`Connection`、`Statement`\
  \ 或 `ResultSet`）上报告的警告详情：\n\n```\n// 检查警告。\n// 这里的 xxx 是 Connection、Statement 或\
  \ ResultSet 对象\nSQLWarning warning = xxx.getWarnings();\nwhile(warning != null)\
  \ {\nint errorCode = warning.getErrorCode();\nString sqlState = warning.getSQLState();\n\
  String warningMsg = warning.getMessage();\n// 打印详情\nSystem.out.println(\"警告: \"\
  \ + warningMsg +\n\"SQL 状态: \" + sqlState +\n\"错误代码:\" + errorCode);\n// 获取下一个警告\n\
  warning = warning.getNextWarning();\n}\n```\n\n## 启用 JDBC 跟踪\n\n你可以启用 JDBC 跟踪，将\
  \ JDBC 活动记录到 `PrintWriter` 中。如果你使用 `DriverManager` 连接数据库，可以使用 `DriverManager` 的\
  \ `setLogWriter(PrintWriter out)` 静态方法来设置日志写入器。如果你使用 `DataSource`，则可以使用其 `setLogWriter(PrintWriter\
  \ out)` 方法来设置日志写入器。将日志写入器设置为 `null` 会禁用 JDBC 跟踪。以下代码片段在 Windows 上设置了一个日志写入器，写入到\
  \ `C:\\jdbc.log` 文件：\n\n```\n// 将日志写入器设置为文件 c:\\jdbc.log\nPrintWriter pw = new PrintWriter(\"\
  C:\\\\jdbc.log\");\nDriverManager.setLogWriter(pw);\n```\n\n当你在启用 Java 安全性的情况下调用\
  \ `DriverManager` 类的 `setLogWriter()` 方法时，Java 会检查 `java.sql.SQLPermission`。你可以在安全策略文件中授予执行代码此权限。以下是安全策略文件中一个条目的示例，该条目授予在\
  \ `DriverManager` 上执行 `setLogWriter()` 方法的权限：\n\n```\ngrant {\npermission java.sql.SQLPermission\
  \ \"setLog\";\n};\n```\n\n## 总结\n\nJDBC API 提供了一个标准的、与数据库无关的接口，用于与任何表格数据源交互，包括关系数据库管理系统（RDBMS），例如\
  \ Oracle、SQL Server、DB2、Apache Derby、MySQL 等。JDBC 驱动程序有助于在 Java 程序中连接数据库。JDK/JRE\
  \ 不包含任何 JDBC 驱动程序。JDBC 驱动程序由 DBMS 供应商提供。JDBC API 中的类和接口位于 `java.sql` 和 `java.sql.rowset`\
  \ 模块中。\n\n`DriverManager` 类有助于注册 JDBC 驱动程序以连接到不同类型的数据库。当传入数据库连接属性（如服务器位置、协议、数据库名称、用户\
  \ ID、密码等）时，`DriverManager` 使用已注册的 JDBC 驱动程序连接到数据库，并返回一个 `Connection` 接口的实例，该实例表示与数据库的连接。\n\
  \n你可以使用 `Connection` 的 `getMetaData()` 方法获取 `DatabaseMetaData`。`DatabaseMetaData`\
  \ 包含有关数据库的信息，例如数据库支持的功能、数据库中的所有表等。\n\nJDBC API 提供了 SQL 类型和 Java 类型之间的映射。JDBC 驱动程序执行这两种类型之间的转换。这隐藏了不同数据库中数据类型名称及其内部表示的差异。例如，无论你使用哪种\
  \ DBMS，都可以在 Java 程序中使用 `java.sql.Date` 对象来表示 SQL 日期值。JDBC 驱动程序将负责将 `java.sql.Date`\
  \ 中的值转换为特定于 DBMS 的日期值，反之亦然。\n\n`Statement` 用于从 Java 程序执行字符串形式的 SQL 语句。SQL 语句返回的结果集在\
  \ Java 程序中作为 `ResultSet` 接口的实例提供。\n\n`PreparedStatement` 用于执行带参数的 SQL 语句。SQL 语句被预编译，以便在重复使用相同\
  \ SQL 语句但使用不同参数时提供更快的执行速度。在 SQL 语句中使用输入参数作为占位符还可以防止黑客使用 SQL 注入进行攻击。\n\n`CallableStatement`\
  \ 用于调用数据库中的 SQL 存储过程或函数。不同的 DBMS 使用不同的语法来调用存储过程和函数。JDBC API 提供了一种与 DBMS 无关的语法，用于使用\
  \ `CallableStatement` 调用存储过程和函数。\n\n`ResultSet` 表示按行和列定义的表格数据。通常，你通过执行从数据库返回结果集的\
  \ SQL 语句来获取 `ResultSet`。`ResultSet` 可以仅向前滚动，也可以向前和向后滚动。所有 JDBC 驱动程序至少支持仅向前滚动的 `ResultSet`。`ResultSet`\
  \ 也可用于更新数据库中的数据。\n\n`RowSet` 是 `ResultSet` 的包装器。`RowSet` 隐藏了使用 `ResultSet` 所涉及的复杂性。`JdbcRowSet`（也称为连接行集）始终保持数据库连接。`CachedRowSet`（也称为断开连接的行集）仅在需要时使用数据库连接。`WebRowSet`\
  \ 是一种 `CachedRowSet`，支持从 XML 文档导入数据并将其数据导出到 XML 文档。`FilteredRowSet` 是一种 `WebRowSet`，在客户端提供过滤功能。`JoinRowSet`\
  \ 是一种 `WebRowSet`，提供将两个或多个断开连接的行集合并（或连接）到一个行集中的能力。\n\nJDBC 支持处理数据库大对象，通常称为 Blob、Clob\
  \ 和 NClob。\n\n\n\n为了获得更佳性能，你可以使用 JDBC API 的批量更新功能，一次性向数据库发送多条 SQL 命令。`Statement`、`PreparedStatement`\
  \ 和 `CallableStatement` 接口均支持批量更新。`Statement` 的 `addBatch()` 方法用于向批处理中添加一条 SQL 命令。`executeBatch()`\
  \ 方法会将批处理中的所有 SQL 命令发送到数据库执行。\n\n一个数据库事务由一个或多个作为工作单元的更改组成。事务中的保存点是一个标记，用于标记事务中的某个点，以便在需要时可以将事务回滚到该标记点。`Savepoint`\
  \ 接口的实例代表一个保存点。你可以使用 `Connection` 的 `setSavepoint()` 方法在事务中创建一个保存点。你可以在 `Connection`\
  \ 的 `rollback()` 方法中指定一个保存点，以将事务回滚到指定的保存点。\n\nJDK9 为现有接口添加了几个新接口和新方法，以支持 JDBC API\
  \ 的连接构建器和分片键。新的 `ShardingKey` 和 `ShardingKeyBuilder` 接口让你能够处理分片数据库。将数据集水平分区到多个独立数据库称为分片。每个这样的数据库称为一个分片。所有分片共同构成一个逻辑数据库，称为分片数据库（SDB）。分片键是一个分区键。`ShardingKey`\
  \ 接口的实例代表一个分片键。你可以使用 `ShardingKeyBuilder` 创建一个 `ShardingKey`。`ShardingKeyBuilder`\
  \ 是通过 `DataSource` 的 `createShardingKeyBuilder()` 方法获得的。你可以使用 `Connection` 的 `setShardingKey()`\
  \ 方法为其设置一个 `ShardingKey`。`Connection` 上的分片键决定了执行数据库操作的分片。你可以使用 `DatabaseMetaData`\
  \ 接口的 `supportsSharding()` 方法来检查你的数据库是否支持分片。如果你的数据库支持分片，该方法返回 `true`；否则，返回 `false`。\n\
  \nDBMS 可能会发出 SQL 警告，而不是抛出异常。`SQLWarning` 类的实例代表一组 SQL 警告。SQL 警告嵌套在一个 `SQLWarning`\
  \ 对象中。使用 `Connection`、`Statement` 和 `ResultSet` 的 `getWarnings()` 方法获取与它们关联的 SQL\
  \ 警告。使用 `SQLWarning` 类的 `getNextWarning()` 方法从集合中检索下一个 SQL 警告。\n\n你可以启用 JDBC 跟踪，将\
  \ JDBC 活动记录到 `PrintWriter` 对象中。你可以使用 `DriverManager` 的 `setLogWriter(PrintWriter\
  \ out)` 静态方法来设置日志写入器。\n\n问题与练习\n\n1.  什么是 JDBC API？\n2.  什么是 JDBC 驱动程序？\n3.  `DriverManager`\
  \ 在 JDBC 应用程序中的作用是什么？如何加载 JDBC 驱动程序？\n4.  `Connection` 接口的实例代表什么？列举 `Connection`\
  \ 在 Java 应用程序中的几种用途。\n5.  描述用于建立 JDBC 连接的连接 URL 的语法。\n6.  什么是 `Connection` 的自动提交模式？如何禁用\
  \ `Connection` 的自动提交模式？\n7.  何时使用 `DatabaseMetaData` 接口？\n8.  编写一段代码片段，检查数据库是否支持使用\
  \ JDBC 语法调用存储过程。假设 `conn` 是一个包含数据库连接引用的变量。\n9.  假设你在 Java 程序中以字符串形式获得了一条 SQL 语句。你会使用哪个对象——`Statement`、`PreparedStatement`\
  \ 还是 `CallableStatement`——来执行该 SQL 语句？\n10. 列举在 Java 程序中使用 `Statement` 执行 SQL 语句的至少两个缺点。\n\
  11. 何时使用 `PreparedStatement`？列举使用 `PreparedStatement` 的几个优点。\n12. 何时使用 `CallableStatement`？列举使用\
  \ `CallableStatement` 的几个优点。\n13. 编写两段代码片段——一次使用 `Statement`，一次使用 `PreparedStatement`——用于更新\
  \ `person` 表中 `person_id` 列值为 101 的行的 `dob` 列。`dob` 列的数据类型是 date。`dob` 列应设置为 1968\
  \ 年 1 月 12 日。你的代码应适用于所有支持 date 列的数据库，无论它们使用何种格式存储日期值。\n14. 为什么使用 `CallableStatement`？\n\
  15. 什么是 `ResultSet`？简要描述 `ResultSet` 的可滚动性、并发性和可保持性。\n16. `ResultSet` 的 `getRow()`\
  \ 方法返回什么？\n17. `ResultSet` 的 `next()` 方法的返回值是什么？如何解释该返回值？\n18. 如何确定 `ResultSet`\
  \ 中返回的某列值为 `null`？\n19. 描述使用 `ResultSet` 向表中插入记录所需执行的典型步骤顺序。\n20. 如何使用 `ResultSet`\
  \ 从表中删除一条记录？\n21. `ResultSetMetaData` 的用途是什么？\n22. 什么是行集？简要描述以下行集：`JdbcRowSet`、`CachedRowSet`、`WebRowSet`、`FilteredRowSet`\
  \ 和 `JoinRowSet`。\n23. 假设你想在 Java 程序中读取存储在数据库中的图片。你将使用哪种 Java 类型来读取图片数据？\n24. 在数据库术语中，什么是保存点、回滚和提交？如何在\
  \ Java 程序中使用 JDBC 执行这些操作？\n25. 如何在 JDBC 应用程序中启用 SQL 跟踪？\n\n# 6. Java 远程方法调用\n\n\
  在本章中，你将学习：\n\n*   什么是 Java 远程方法调用（RMI）以及 RMI 架构\n*   如何开发和打包 RMI 服务器和客户端应用程序\n*\
  \   如何启动 `rmiregistry`、RMI 服务器和客户端应用程序\n*   如何对 RMI 应用程序进行故障排除和调试\n*   RMI 应用程序中的动态类下载\n\
  *   RMI 应用程序中远程对象的垃圾回收\n\n一个 RMI 应用程序包含属于以下三个部分的类和接口：\n\n*   服务器部分\n*   客户端部分\n\
  *   公共部分，该部分同时存在于客户端和服务器中\n\n在本章中，你将把示例应用程序的三个部分打包成三个模块，分别命名为 `jdojo.rmi.common`、`jdojo.rmi.server`\
  \ 和 `jdojo.rmi.common`。这些模块的声明如清单 6-1、清单 6-2 和清单 6-3 所示。\n\n```\n// module-info.java\n\
  module jdojo.rmi.common {\nrequires java.rmi;\nexports com.jdojo.rmi.common;\n}\n\
  清单 6-1.\njdojo.rmi.common 模块的声明\n```\n\n```\n// module-info.java\nmodule jdojo.rmi.server\
  \ {\nrequires java.rmi;\nrequires jdojo.rmi.common;\nexports com.jdojo.rmi.server;\n\
  }\n清单 6-2.\njdojo.rmi.server 模块的声明\n```\n\n```\n// module-info.java\nmodule jdojo.rmi.client\
  \ {\nrequires java.rmi;\nrequires jdojo.rmi.common;\nexports com.jdojo.rmi.client;\n\
  }\n清单 6-3.\njdojo.rmi.client 模块的声明\n```\n\nRMI 相关的类和接口位于 `java.rmi` 模块中。包含 RMI 程序的模块需要读取\
  \ `java.rmi` 模块。`jdojo.rmi.common` 模块包含服务器和客户端应用程序将使用的类型，这就是 `jdojo.rmi.server`\
  \ 和 `jdojo.rmi.client` 模块读取 `jdojo.rmi.common` 模块的原因。\n\n\n\n## 什么是 Java 远程方法调用？\n\
  \nJava 支持多种应用程序架构，这些架构决定了应用程序代码的部署和执行方式及位置。在最简单的应用程序架构中，所有 Java 代码都位于单台机器上，由一个 JVM\
  \ 管理所有 Java 对象及其交互。这是一个独立应用程序的示例，其所需的一切就是一台能够启动 JVM 的机器。Java 还支持分布式应用程序架构，其中应用程序的代码和执行可以分布在多台机器上。\n\
  \nJava 支持小程序（applets），其中 Java 类部署在 Web 服务器上。Applet API 已在 JDK9 中弃用，大多数浏览器也已停止支持运行小程序所需的\
  \ Java 插件。小程序类由 Web 浏览器下载到客户端机器，并在客户端机器上运行的 JVM 内执行。在小程序的情况下，Java 代码仍然在单个 JVM 内执行。在第\
  \ 4 章中，你学习了 Java 网络编程，其中涉及至少两个在不同机器上运行的 JVM，它们分别执行客户端和服务器套接字的 Java 代码。通常，套接字用于在两个应用程序之间传输数据。在套接字编程中，客户端程序可以向服务器程序发送消息。服务器程序创建一个\
  \ Java 对象，调用该对象上的方法，并将方法调用的结果返回给客户端程序。最后，客户端程序使用套接字读取结果。在这种情况下，客户端能够调用位于不同 JVM 中的\
  \ Java 对象上的方法。这种可能性为新的应用程序架构（称为分布式编程）打开了大门，在这种架构中，应用程序可以利用多台机器、运行多个 JVM 来处理业务逻辑。虽然使用套接字编程可以调用位于不同\
  \ JVM（也可能在不同机器上）的对象上的方法，但编码并不容易。为了实现这一点，Java 提供了一种称为 Java 远程方法调用（Java RMI）的独立机制。\n\
  \nJava RMI 使 Java 应用程序能够调用远程 JVM 中 Java 对象上的方法。我使用术语“远程对象”来指代由某个 JVM 创建和管理的 Java\
  \ 对象，该 JVM 不同于管理调用该“远程对象”方法的 Java 代码的 JVM。通常，远程对象还意味着它由运行在不同于访问它的机器上的 JVM 管理。然而，一个\
  \ Java 对象要成为远程对象，并不要求它必须存在于不同机器的 JVM 中。出于学习目的，你将使用一台机器在一个 JVM 中部署远程对象，并在另一个 JVM\
  \ 中启动另一个应用程序来访问该远程对象。RMI 让你能够像对待本地对象一样对待远程对象。在内部，它使用套接字来处理对远程对象的访问并调用其方法。\n\n一个\
  \ RMI 应用程序由两个程序组成：一个客户端和一个服务器，它们运行在两个不同的 JVM 中。服务器程序创建 Java 对象，并使远程客户端程序能够访问这些对象以调用其上的方法。客户端程序需要知道服务器上远程对象的位置，以便能够调用它们的方法。服务器程序创建一个远程对象，并将其引用注册（或绑定）到\
  \ RMI 注册表。RMI 注册表是一种名称服务，用于将远程对象引用绑定到一个名称，这样客户端就可以通过在注册表中进行基于名称的查找来获取远程对象的引用。RMI\
  \ 注册表在与服务器程序分离的进程中运行。它作为一个名为 `rmiregistry` 的工具提供。当你在机器上安装 JDK/JRE 时，它会被复制到 JDK/JRE\
  \ 安装目录下的 `bin` 子目录中。\n\n在客户端程序获取远程对象的远程引用后，它使用该引用调用方法，就像它是本地对象的引用一样。RMI 技术负责处理在另一台机器上不同\
  \ JVM 中运行的服务器程序中，对远程引用调用方法的细节。在 RMI 应用程序中，Java 代码是围绕接口编写的。服务器程序包含接口的实现。客户端程序使用接口以及远程对象引用来调用存在于服务器\
  \ JVM 中的远程对象上的方法。所有支持 Java RMI 的 Java 库类都位于 `java.rmi` 包及其子包中。\n\n\n\n## RMI 架构\n\
  \n图 6-1 以简化形式展示了 RMI 架构。图中的矩形框代表 RMI 应用程序中的一个组件。箭头线表示消息从一个组件沿箭头方向发送到另一个组件。标有数字 1\
  \ 到 11 的椭圆代表典型 RMI 应用程序中发生的步骤序列。本节将详细解释这些步骤。\n\n![A323071_2_En_6_Fig1_HTML.gif](img/A323071_2_En_6_Fig1_HTML.gif)\n\
  \n图 6-1.\n\nRMI 架构\n\n假设你已经开发了 RMI 应用程序所需的所有 Java 类和接口。在本节中，我将带你了解运行 RMI 应用程序时涉及的所有步骤。你将在接下来的几节中开发每个步骤所需的\
  \ Java 代码。\n\nRMI 应用程序的第一步是在服务器中创建一个 Java 对象。该对象将用作远程对象。还需要执行一个额外的步骤，将普通的 Java 对象转换为远程对象。这一步称为导出远程对象。当普通\
  \ Java 对象被导出为远程对象时，它就准备好接收/处理来自远程客户端的调用。导出过程会产生一个远程对象引用（也称为存根）。远程引用了解导出对象的详细信息，例如其位置以及可远程调用的方法。此步骤在图中未标注。它发生在服务器程序内部。当此步骤完成时，远程对象已在服务器中创建，并准备好接收远程方法调用。\n\
  \n下一步由服务器执行，将远程引用注册（或绑定）到 RMI 注册表。服务器为其注册到 RMI 注册表的每个远程引用选择一个唯一名称。远程客户端需要使用相同的名称在\
  \ RMI 注册表中查找远程引用。这在图中标记为 #1。当此步骤完成时，RMI 注册表已注册了远程对象引用，并且有兴趣在远程对象上调用方法的客户端可以向 RMI\
  \ 注册表请求其引用。\n\n提示\n\n出于安全原因，RMI 注册表和服务器必须运行在同一台机器上，以便服务器可以将远程引用注册到 RMI 注册表。如果不施加此限制，黑客可能会从其自己的机器上将有害的\
  \ Java 对象注册到你的 RMI 注册表中。\n\n此步骤涉及客户端与 RMI 注册表之间的交互。通常，客户端和 RMI 注册表运行在两台不同的机器上。客户端向\
  \ RMI 注册表发送查找远程引用的请求。客户端使用名称在 RMI 注册表中查找远程引用。该名称与服务器在步骤 #1 中用于将远程引用绑定到 RMI 注册表的名称相同。查找步骤在图中标记为\
  \ #2。RMI 注册表将远程引用（或存根）返回给客户端，在图中标记为步骤 #3。如果 RMI 注册表中没有使用客户端在查找请求中使用的名称绑定远程引用，则 RMI\
  \ 注册表会抛出 `NotBoundException`。如果此步骤成功完成，客户端已收到远程对象的远程引用（或存根）。\n\n在此步骤中，客户端在存根上调用一个方法。如图中步骤\
  \ #4 所示。此时，存根连接到服务器并传输在远程对象上调用方法所需的信息，例如方法名称、方法参数等。存根了解服务器位置以及如何在服务器上联系远程对象的详细信息。此步骤在图中标记为步骤\
  \ #5。网络级别的许多不同层参与将信息从存根传输到服务器。\n\n骨架是客户端存根在服务器端的对应物。它的工作是接收存根发送的数据。如图中步骤 #6 所示。骨架接收到数据后，将数据重新组装成更有意义的格式，并在远程对象上调用方法，如图中步骤\
  \ #7 所示。一旦服务器上的远程方法调用结束，骨架接收方法调用的结果（步骤 #8），并通过网络层将信息传回存根（步骤 #9）。存根接收远程方法调用的结果（步骤\
  \ #10），重新组装结果，并将结果传递给客户端程序（步骤 #11）。\n\n步骤 #4 到 #11 可以重复执行，以在同一个远程对象上调用相同或不同的方法。如果客户端想要在不同的远程对象上调用方法，则必须先执行步骤\
  \ #2 和 #3，然后才能发起远程方法调用。\n\n在 RMI 应用程序中，典型的做法是客户端首先联系 RMI 注册表以获取远程对象的存根。如果客户端需要服务器中运行的另一个远程对象的存根，它可以通过调用其已有的存根上的方法来获取。请注意，远程对象的方法也可以将存根返回给远程客户端。这样，远程客户端可能只在启动时在\
  \ RMI 注册表中执行一次查找。你为 RMI 应用程序编写的 Java 代码与非 RMI 应用程序的代码没有区别，除了在 RMI 注册表中查找远程对象引用之外。\n\
  \n## 开发 RMI 应用程序\n\n本节将引导你完成编写 Java 代码以开发 RMI 应用程序的步骤。你将开发一个远程工具 RMI 应用程序，该应用程序允许你执行三件事：从服务器回显消息、从服务器获取当前日期和时间，以及将两个整数相加。编写\
  \ RMI 应用程序涉及以下步骤：\n\n*   编写远程接口。\n*   在类中实现远程接口。此类的对象充当远程对象。\n*   编写服务器程序。它创建实现远程接口的类的对象，并将其注册到\
  \ RMI 注册表。\n*   编写访问服务器上远程对象的客户端程序。\n\n\n\n### 编写远程接口\n\n远程接口与任何其他 Java 接口类似，其方法旨在供运行在不同\
  \ JVM 中的远程客户端调用。它有以下四个特殊要求：\n\n*   必须扩展标记接口 `Remote`。\n*   远程接口中的所有方法都必须抛出 `RemoteException`\
  \ 或其超类异常，例如 `IOException` 或 `Exception`。`RemoteException` 是一个受检异常。远程方法也可以抛出任意数量的其他特定于应用程序的异常。\n\
  *   远程方法可以接受远程对象的引用作为参数。它也可以返回远程对象的引用作为其返回值。如果远程接口中的方法接受或返回远程对象引用，则参数或返回类型必须声明为\
  \ `Remote` 类型，而不是实现 `Remote` 接口的类的类型。\n*   远程接口在其方法的参数或返回值中只能使用三种数据类型。它可以是原始类型、远程对象或可序列化的非远程对象。远程对象通过引用传递，而非远程的可序列化对象则通过副本传递。如果对象的类实现了\
  \ `java.io.Serializable` 接口，则该对象是可序列化的。\n\n你将把远程接口命名为 `RemoteUtility`。清单 6-4 包含了\
  \ `RemoteUtility` 远程接口的代码，该接口是 `jdojo.rmi.common` 模块的成员。它包含三个方法：`echo()`、`getServerTime()`\
  \ 和 `add()`，它们提供了你预期的三种功能。\n\n```\n// RemoteUtility.java\npackage com.jdojo.rmi.common;\n\
  import java.rmi.Remote;\nimport java.rmi.RemoteException;\nimport java.time.ZonedDateTime;\n\
  public interface RemoteUtility extends Remote {\n// 将字符串消息回显给客户端\nString echo(String\
  \ msg) throws RemoteException;\n// 向客户端返回当前日期和时间\nZonedDateTime getServerTime()\
  \ throws RemoteException;\n// 将两个整数相加并将结果返回给客户端\nint add(int n1, int n2) throws\
  \ RemoteException;\n}\n清单 6-4.\nRemoteUtility 接口\n```\n\n### 实现远程接口\n\n此步骤涉及创建一个实现远程接口的类。你将把该类命名为\
  \ `RemoteUtilityImpl`。它将实现 `RemoteUtility` 远程接口，并为三个方法提供实现：`echo()`、`getServerTime()`\
  \ 和 `add()`。你可以在此类中拥有任意数量的其他方法。唯一必须做的是为 `RemoteUtility` 远程接口中定义的所有方法提供实现。远程客户端将只能调用此类的远程方法。如果你在此类中定义了远程接口中定义的方法之外的方法，则这些方法不可用于远程方法调用。但是，你可以使用这些额外的方法来实现远程方法。清单\
  \ 6-5 包含了 `RemoteUtilityImpl` 类的代码，该类是 `jdojo.rmi.server` 模块的成员。\n\n```\n// RemoteUtilityImpl.java\n\
  package com.jdojo.rmi.server;\nimport com.jdojo.rmi.common.RemoteUtility;\nimport\
  \ java.time.ZonedDateTime;\npublic class RemoteUtilityImpl implements RemoteUtility\
  \ {\npublic RemoteUtilityImpl() {\n}\n@Override\npublic String echo(String msg)\
  \ {\nreturn msg;\n}\n@Override\npublic ZonedDateTime getServerTime() {\nreturn ZonedDateTime.now();\n\
  }\n@Override\npublic int add(int n1, int n2) {\nreturn n1 + n2;\n}\n}\n清单 6-5.\n\
  RemoteUtility 远程接口的实现类\n```\n\n远程对象实现类非常简单。它实现了 `RemoteUtility` 接口，并为该接口的三个方法提供了实现。请注意，`RemoteUtilityImpl`\
  \ 类中的这些方法并未声明抛出 `RemoteException`。要求所有远程方法声明抛出 `RemoteException` 是针对远程接口的，而不是针对实现远程接口的类。\n\
  \n编写远程接口的实现类有两种方式。一种方式是继承自 `java.rmi.server.UnicastRemoteObject` 类。另一种方式是不继承任何类，或继承自\
  \ `UnicastRemoteObject` 类以外的任何类。清单 6-5 采用了后一种方式。它没有让 `RemoteUtilityImpl` 类继承自任何类。\n\
  \n如果远程接口的实现类继承自 `UnicastRemoteObject` 类或其他类，会有什么不同？远程接口的实现类用于创建远程对象，这些对象的方法会被远程调用。此类的对象必须经过导出过程，使其适用于远程方法调用。`UnicastRemoteObject`\
  \ 类的构造器会自动为你导出对象。因此，如果你的实现类继承自 `UnicastRemoteObject` 类，它将在后续整个过程中为你省去一个步骤。有时你的实现类必须继承自另一个类，这将迫使你不能继承自\
  \ `UnicastRemoteObject` 类。需要注意的一点是，`UnicastRemoteObject` 类的构造器会抛出 `RemoteException`。如果你让远程对象实现类继承自\
  \ `UnicastRemoteObject` 类，则实现类的构造器必须在其声明中抛出 `RemoteException`。\n\n清单 6-6 通过继承自 `UnicastRemoteObject`\
  \ 类重写了 `RemoteUtilityImpl` 类。此实现中有两处新内容——它在类声明中使用了 `extends` 子句，并在构造器声明中使用了 `throws`\
  \ 子句。其他所有内容保持不变。我将在本章后面编写服务器程序时讨论使用清单 6-5 和清单 6-6 中所示的 `RemoteUtilityImpl` 类实现的区别。\n\
  \n```\n// RemoteUtilityImpl.java\npackage com.jdojo.rmi.server;\nimport com.jdojo.rmi.common.RemoteUtility;\n\
  import java.rmi.RemoteException;\nimport java.rmi.server.UnicastRemoteObject;\n\
  import java.time.ZonedDateTime;\npublic class RemoteUtilityImpl extends UnicastRemoteObject\
  \ implements RemoteUtility {\n// 必须抛出 RemoteException\npublic RemoteUtilityImpl()\
  \ throws RemoteException {\n}\n@Override\npublic String echo(String msg) {\nreturn\
  \ msg;\n}\n@Override\npublic ZonedDateTime getServerTime() {\nreturn ZonedDateTime.now();\n\
  }\n@Override\npublic int add(int n1, int n2) {\nreturn n1 + n2;\n}\n}\n清单 6-6.\n\
  通过继承 UnicastRemoteObject 类重写 RemoteUtilityImpl 类\n```\n\n### 编写 RMI 服务器程序\n\n服务器程序的职责是创建远程对象并使其可供远程客户端访问。服务器程序执行以下操作：\n\
  \n*   安装安全管理器。\n*   创建并导出远程对象。\n*   向 RMI 注册表应用程序注册远程对象。\n\n后续章节将详细讨论这些步骤。\n\n\n\
  \n#### 安装安全管理器\n\n你需要确保服务器代码在安全管理器下运行。如果未在安全管理器下运行，RMI 程序将无法从远程位置下载 Java 类。没有安全管理器，它只能使用本地\
  \ Java 类。在 RMI 服务器和 RMI 客户端中，程序都可能需要从远程位置下载类文件。稍后你将看到从远程位置下载 Java 类的示例。当你在安全管理器下运行\
  \ Java 程序时，还必须通过 Java 策略文件控制对特权资源的访问。以下代码片段展示了如何在尚未安装安全管理器时进行安装。你可以使用 `java.lang.SecurityManager`\
  \ 类或 `java.rmi.RMISecurityManager` 类的对象来安装安全管理器。\n\n```\nSecurityManager secManager\
  \ = System.getSecurityManager();\nif (secManager == null) {\nSystem.setSecurityManager(new\
  \ SecurityManager());\n}\n```\n\n安全管理器通过策略文件控制对特权资源的访问。你需要设置适当的权限才能访问 Java RMI 应用程序中使用的资源。在本示例中，你将授予所有代码所有权限。但是，在生产环境中，你应该使用适当控制的策略文件。需要在策略文件中添加以下条目以授予所有权限：\n\
  \n```\ngrant {\npermission java.security.AllPermission;\n};\n```\n\n通常，Java 策略文件位于计算机上用户的主目录中，文件名为\
  \ `.java.policy`。请注意，文件名以点开头。\n\n#### 创建并导出远程对象\n\nRMI 服务器程序执行的下一步是创建实现远程接口的类的对象，该对象将作为远程对象。在你的案例中，你将创建一个\
  \ `RemoteUtilityImpl` 类的对象：\n\n```\nRemoteUtilityImpl remoteUtility = new RemoteUtilityImpl();\n\
  ```\n\n你需要导出远程对象，以便远程客户端可以调用其远程方法。如果你的远程对象类（本例中为 `RemoteUtility` 类）继承自 `UnicastRemoteObject`\
  \ 类，则无需导出它。创建它时会自动导出。如果你的远程对象类未继承自 `UnicastRemoteObject` 类，则需要使用 `UnicastRemoteObject`\
  \ 类的 `exportObject()` 静态方法之一显式导出它。导出远程对象时，你可以指定它监听远程方法调用的端口号。默认情况下，它监听端口 0，这是一个匿名端口。以下语句导出一个远程对象：\n\
  \n```\nint port = 0;\nRemoteUtility remoteUtilityStub =\n(RemoteUtility) UnicastRemoteObject.exportObject(remoteUtility,\
  \ port);\n```\n\n`exportObject()` 方法返回导出的远程对象的引用，也称为存根或远程引用。你需要保留存根的引用，以便将其注册到 RMI\
  \ 注册表中。\n\n#### 注册远程对象\n\n服务器程序执行的最后一步是使用名称将远程对象引用注册（或绑定）到 RMI 注册表。RMI 注册表是一个提供名称服务的独立应用程序。要将远程引用注册到\
  \ RMI 注册表，必须首先定位它。RMI 注册表在特定端口的机器上运行。默认情况下，它在端口 1099 上运行。定位注册表后，需要调用其 `bind()` 方法来绑定远程引用。你也可以使用其\
  \ `rebind()` 方法，如果指定名称已存在旧绑定，该方法将替换它。使用的名称是一个 `String`。你将使用名称 `MyRemoteUtility`\
  \ 作为远程引用的名称。最好遵循命名约定来绑定 RMI 注册表中的引用对象，以避免名称冲突。\n\n```\nRegistry registry = LocateRegistry.getRegistry(\"\
  localhost\", 1099);\nString name = \"MyRemoteUtility\";\nregistry.rebind(name, remoteUtilityStub);\n\
  ```\n\n编写服务器程序所需的就是这些。清单 6-7 包含了 RMI 服务器的完整代码，它是 `jdojo.rmi.server` 模块的成员。它假设 `RemoteUtilityImpl`\
  \ 类未继承自 `UnicastRemoteObject` 类，如清单 6-5 所示。\n\n```\n// RemoteServer.java\npackage\
  \ com.jdojo.rmi.server;\nimport com.jdojo.rmi.common.RemoteUtility;\nimport java.rmi.RemoteException;\n\
  import java.rmi.registry.LocateRegistry;\nimport java.rmi.registry.Registry;\nimport\
  \ java.rmi.server.UnicastRemoteObject;\npublic class RemoteServer {\npublic static\
  \ void main(String[] args) {\nSecurityManager secManager = System.getSecurityManager();\n\
  if (secManager == null) {\nSystem.setSecurityManager(new SecurityManager());\n}\n\
  try {\nRemoteUtilityImpl remoteUtility = new RemoteUtilityImpl();\n// 将对象导出为远程对象\n\
  int port = 0; // 匿名端口\nRemoteUtility remoteUtilityStub\n= (RemoteUtility) UnicastRemoteObject.exportObject(remoteUtility,\
  \ port);\n// 定位注册表\nRegistry registry = LocateRegistry.getRegistry(\"localhost\"\
  , 1099);\n// 将导出的远程引用绑定到注册表\nString name = \"MyRemoteUtility\";\nregistry.rebind(name,\
  \ remoteUtilityStub);\nSystem.out.println(\"远程服务器已就绪...\");\n} catch (RemoteException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 6-7.\n一个 RMI 远程服务器程序\n```\n\n如果你使用清单 6-6\
  \ 中列出的 `RemoteUtilityImpl` 类实现，则需要修改清单 6-7 中的代码。`try-catch` 块中的代码将更改为如下代码。所有其他代码保持不变。\n\
  \n```\nRemoteUtilityImpl remoteUtility = new RemoteUtilityImpl();\n// 无需导出对象\n//\
  \ 定位注册表\nRegistry registry = LocateRegistry.getRegistry(\"localhost\", 1099);\n\
  // 将导出的远程引用绑定到注册表\nString name = \"MyRemoteUtility\";\nregistry.rebind(name, remoteUtility);\n\
  System.out.println(\"远程服务器已就绪...\");\n```\n\n你尚未准备好启动服务器程序。我将在后续部分讨论如何启动 RMI 应用程序。\n\
  \n出于安全原因，你只能从与 RMI 注册表运行在同一台机器上的 RMI 服务器程序将远程引用绑定到 RMI 注册表。否则，黑客可能能够将任意且可能有害的远程引用绑定到你的\
  \ RMI 注册表。默认情况下，`LocateRegistry` 类的 `getRegistry()` 静态方法返回一个存根，用于在同一台机器的端口 1099\
  \ 上运行的注册表。你可以使用以下代码在服务器程序中定位注册表。\n\n```\n// 获取本地机器端口 1099 上的注册表存根\nRegistry registry\
  \ = LocateRegistry.getRegistry();\n```\n\n请注意，调用 `LocateRegistry.getRegistry()`\
  \ 方法不会尝试连接到注册表应用程序。它只是返回注册表的存根。后续对此存根的调用，如 `bind()`、`rebind()` 或任何其他方法调用，才会尝试连接到注册表应用程序。\n\
  \n\n\n### 编写 RMI 客户端程序\n\nRMI 客户端程序调用远程服务器上存在的远程对象的方法。客户端程序必须做的第一件事是知道远程对象的位置。创建并知道远程对象位置的是\
  \ RMI 服务器程序。服务器程序负责发布远程对象的位置细节，以便客户端能够定位并使用它。服务器程序通过将远程对象绑定到 RMI 注册表并为其命名（在您的案例中名为\
  \ `MyRemoteUtility`）来发布其位置细节。客户端程序联系 RMI 注册表并执行基于名称的查找以获取远程引用。获取远程引用后，客户端程序调用远程引用上的方法，这些方法在服务器上执行。通常，RMI\
  \ 客户端程序执行以下操作：\n\n*   确保它在安全管理器下运行。`SecurityManager secManager = System.getSecurityManager();`\
  \ `if (secManager == null) {` `System.setSecurityManager(new SecurityManager());`\
  \ `}`\n*   定位服务器绑定远程引用的注册表。您必须知道运行 RMI 注册表的机器名称或 IP 地址以及端口号。在真实的 RMI 程序中，您不会在客户端程序中使用\
  \ `localhost` 来定位注册表。相反，RMI 注册表将运行在另一台机器上。在本示例中，您将在同一台机器上运行所有三个程序——RMI 注册表、服务器和客户端。`//\
  \ 定位注册表` `Registry registry = LocateRegistry.getRegistry(\"localhost\", 1099);`\n\
  *   它使用 `Registry` 接口的 `lookup()` 方法在注册表中执行查找。它将绑定的远程引用的名称传递给 `lookup()` 方法，并获取远程引用（或存根）。请注意，`lookup()`\
  \ 方法必须使用与服务器绑定/重新绑定远程引用时相同的名称。`lookup()` 方法返回一个 `Remote` 对象。您必须将其强制转换为远程接口的类型。以下代码片段将从\
  \ `lookup()` 方法返回的远程引用强制转换为 `RemoteUtility` 接口类型：`String name = \"MyRemoteUtility\"\
  ;` `RemoteUtility remoteUtilStub = (RemoteUtility) registry.lookup(name);`\n*  \
  \ 它调用远程引用（或存根）上的方法。客户端程序将 `remoteUtilStub` 引用视为对本地对象的引用。对其进行的任何方法调用都会发送到服务器执行。所有远程方法都会抛出\
  \ `RemoteException`。在调用任何远程方法时，您必须处理 `RemoteException`。`// 调用 echo() 方法` `String\
  \ reply = remoteUtilStub.echo(\"来自 RMI 客户端的问候。\");`\n\n清单 6-8 包含了客户端程序的完整代码，该程序是\
  \ `jdojo.rmi.client` 模块的成员。现在不要运行此程序。您将在接下来的几个小节中逐步运行您的 RMI 应用程序。您可能会注意到编写 RMI 代码并不复杂。复杂的是\
  \ RMI 中不同组件的连接。\n\n```\n// RemoteClient.java\npackage com.jdojo.rmi;\n清单 6-8.\n\
  一个 RMI 远程客户端程序\n```\n\n## 分离服务器和客户端代码\n\n在 RMI 应用程序中，将服务器和客户端程序的代码分开非常重要。服务器程序需要包含以下三个组件：\n\
  \n*   远程接口\n*   远程接口的实现类\n*   服务器程序\n\n客户端程序需要包含以下两个组件：\n\n*   远程接口\n*   客户端程序\n\
  \n从本章一开始，您就已经为这种客户端-服务器代码分离做好了准备。为了实现这一点，您将把 `jdojo.rmi.server` 和 `jdojo.rmi.common`\
  \ 模块部署到服务器机器上，并将 `jdojo.rmi.client` 和 `jdojo.rmi.common` 模块部署到客户端机器上。在后续运行 RMI 应用程序的部分中，我将这些模块化\
  \ JAR 分别称为 `jdojo.rmi.server.jar`、`jdojo.rmi.client.jar` 和 `jdojo.rmi.common.jar`。\n\
  \n## 生成存根和骨架\n\n当使用 `UnicastRemoteObject` 类导出远程对象时，RMI 需要一个存根类。您可以执行以下两种操作之一：\n\n\
  *   您可以使用 `UnicastRemoteObject` 类来继承您的远程接口实现类，这将自动导出您的远程对象。\n*   您可以使用 `UnicastRemoteObject`\
  \ 类的 `exportObject()` 方法显式导出远程对象。\n\n无论哪种情况，当导出远程对象时，RMI 都需要一个存根类。在 Java 5 之前，您需要执行一个额外的步骤来为您的远程接口实现类生成存根类。这是通过使用\
  \ JDK 安装目录的 `bin` 子目录中包含的 `rmic` 命令来完成的。运行此命令时，需要传递远程接口实现类的完全限定名称，如下所示：\n\n```\n\
  rmic com.jdojo.rmi.server.RemoteUtilityImpl\n```\n\n您可能需要适当设置 `CLASSPATH` 环境变量，以便\
  \ `rmic` 能够找到您指定为其参数的那个类。上述命令将在 `RemoteUtilityImpl.class` 文件所在的同一文件夹中生成以下两个类文件：\n\
  \n*   `RemoteUtilityImpl_Stub.class`\n*   `RemoteUtilityImpl_Skel.class`\n\n您需要将这两个类文件包含在\
  \ `jdojo.rmi.server.jar` 文件中。请注意，仅当您使用的 Java 版本低于 Java 5 时才需要此步骤。如果您的客户端程序运行在低于\
  \ Java 5 的版本上，而您的服务器运行在 Java 5 或更高版本上，您也需要执行此步骤。如果您有兴趣查看为这两个类文件生成的 Java 源代码，可以在\
  \ `rmic` 命令中使用 `–keep`（或 `-keepgenerated`）选项，这将为这些类生成 Java 源文件。以下命令将生成四个文件——两个 `.class`\
  \ 文件和两个 `.java` 文件。\n\n```\nrmic –keep com.jdojo.rmi.server.RemoteUtilityImpl\n\
  ```\n\n## 运行 RMI 应用程序\n\n您需要按照以下特定顺序启动 RMI 应用程序中涉及的所有程序：\n\n*   运行 RMI 注册表。\n* \
  \  运行 RMI 服务器程序。\n*   运行 RMI 客户端程序。\n\n如果在运行任何程序时遇到问题，请参考本章后面的“RMI 应用程序故障排除”部分。\n\
  \n您的服务器和客户端程序使用了安全管理器。在成功运行 RMI 应用程序之前，您必须正确配置 Java 策略文件。出于学习目的，您可以授予 RMI 应用程序所有安全权限。您可以通过创建一个名为\
  \ `rmi.policy` 的文本文件（您可以使用任何其他文件名）并输入以下内容来实现，该内容授予所有代码所有权限：\n\n```\ngrant {\npermission\
  \ java.security.AllPermission;\n};\n```\n\n当您运行 RMI 客户端或服务器程序时，需要使用 `java.security.policy`\
  \ JVM 选项将 `rmi.policy` 文件设置为您的 Java 安全策略文件。假设您已将 `rmi.policy` 文件保存在 Windows 的 `C:\\\
  mypolicy` 文件夹中。\n\n```\njava -Djava.security.policy=file:///C:/mypolicy/rmi.policy\
  \ \n```\n\n这种设置 Java 策略文件的方法具有临时效果。它仅应用于学习目的。在生产环境中，您需要设置细粒度的安全性。\n\n\n\n### 运行\
  \ RMI 注册表\n\nRMI 注册表应用程序随 JDK/JRE 安装包一同提供。它被复制到相应安装主文件夹的 `bin` 子文件夹中。在 Windows 平台上，它是\
  \ `rmiregistry.exe` 可执行文件。你可以通过使用命令提示符启动 `rmiregistry` 应用程序来运行 RMI 注册表。它接受一个端口号作为运行参数。默认情况下，它在\
  \ 1099 端口上运行。以下命令在 Windows 上使用命令提示符在 1099 端口启动它：\n\n```\nC:\\java9\\bin> rmiregistry\n\
  ```\n\n以下命令在 8967 端口启动 RMI 注册表：\n\n```\nC:\\java9\\bin> rmiregistry 8967\n```\n\n\
  `rmiregistry` 应用程序不会在提示符上打印任何启动消息。通常，它作为后台进程启动。\n\n很可能，该命令在你的机器上无法正常工作。使用此命令，你将能够成功启动\
  \ `rmiregistry`。但是，当你在下一节运行 RMI 服务器应用程序时，你会遇到 `ClassNotFoundException`。`rmiregistry`\
  \ 应用程序需要访问 RMI 服务器应用程序中使用的一些类（已注册的类）。有三种方法可以使这些类对 `rmiregistry` 可用：\n\n*   适当设置\
  \ `CLASSPATH`。\n*   将 `java.rmi.server.codebase` JVM 属性设置为包含 `rmiregistry` 所需类的\
  \ URL。\n*   将名为 `java.rmi.server.useCodebaseOnly` 的 JVM 属性设置为 `false`。从 JDK 7u21（以及\
  \ JDK 6u45 和 JDK 5u45）开始，此属性默认设置为 `true`。早期版本默认设置为 `false`。如果此属性设置为 `false`，`rmiregistry`\
  \ 可以从服务器下载所需的类文件。\n\n以下命令在启动 `rmiregistry` 之前，将包含服务器类和公共接口的 JAR 包添加到 `CLASSPATH`：\n\
  \n```\nC:\\java9\\bin> SET CLASSPATH= C:\\Java9APIsAndModules\\dist\\jdojo.rmi.common.jar;C:\\\
  Java9APIsAndModules\\dist\\jdojo.rmi.server.jar\nC:\\java9\\bin> rmiregistry\n```\n\
  \n除了设置 `CLASSPATH` 来使类对 `rmiregistry` 可用之外，你还可以设置 `java.rmi.server.codebase` JVM\
  \ 属性，该属性是一个以空格分隔的 URL 列表，如下所示：\n\n```\nC:\\java9\\bin> rmiregistry -J-Djava.rmi.server.codebase=file:///C:/Java9APIsAndModules/dist/jdojo.rmi.common.jar\
  \ file:///C:/Java9APIsAndModules/dist/jdojo.rmi.server.jar\n```\n\n以下命令重置 `CLASSPATH`\
  \ 并将 JVM 的 `java.rmi.server.useCodebaseOnly` 属性设置为 `false`，以便 `rmiregistry` 将从 RMI\
  \ 服务器下载任何所需的类文件。使用此命令，你的示例将正常工作：\n\n```\nC:\\java9\\bin> SET CLASSPATH=\nC:\\java9\\\
  bin> rmiregistry -J-Djava.rmi.server.useCodebaseOnly=false\n```\n\n### 运行 RMI 服务器\n\
  \n在运行 RMI 服务器之前，必须确保 RMI 注册表正在运行。回想一下，服务器在安全管理器下运行，该管理器要求你在 Java 策略文件中授予执行某些操作的权限。确保你已在策略文件中输入了所需的授权。你可以使用以下命令来运行服务器程序。命令文本应在一行内输入；此处为了清晰起见，分多行显示。命令文本中的每个部分应由空格分隔，而不是换行符。在命令中，你需要更改\
  \ JAR 和策略文件的路径，以反映它们在你机器上的路径。\n\n```\nC:\\Java9APIsAndModules>java\n--module-path\
  \ dist\\jdojo.rmi.common.jar;dist\\jdojo.rmi.server.jar\n-Djava.security.policy=file:///C:/mypolicy/rmi.policy\n\
  -Djava.rmi.server.codebase=file:///C:/Java9APIsAndModules/dist/jdojo.rmi.common.jar\n\
  --module jdojo.rmi.server/com.jdojo.rmi.server.RemoteServer\nRemote server is ready...\n\
  ```\n\n你需要设置 `java.rmi.server.codebase` 属性。RMI 注册表和客户端程序在需要下载它们没有的类文件时会使用此属性。此属性的值是一个\
  \ URL，它可以指向本地文件系统、Web 服务器、FTP 服务器或任何其他资源。该 URL 可以指向一个 JAR 文件（就像本例中那样），也可以指向一个目录。如果指向目录，URL\
  \ 必须以正斜杠结尾。以下命令使用一个文件夹作为其代码库。如果 RMI 注册表和客户端需要任何类文件，它们将尝试从 URL `file:///C:/myrmi/classes/`\
  \ 下载类文件。\n\n```\njava -Djava.rmi.server.codebase=file:///C:/myrmi/classes/ \n```\n\
  \n你也可以将 `java.rmi.server.codebase` 属性设置为指向一个 Web 服务器，你可以在那里存储必要的类文件，如下所示：\n\n```\n\
  java -Djava.rmi.server.codebase=http://www.jdojo.com/rmi/classes/ \n```\n\n如果你将类文件存储在多个位置，你可以用空格分隔所有位置，如下所示：\n\
  \n```\njava -Djava.rmi.server.codebase=\"http://www.jdojo.com/rmi/classes/\nftp://www.jdojo.com/rmi/some/classes/c.jar\"\
  \ \n```\n\n它指定了一个位置作为目录，另一个位置作为 JAR 文件。一个使用 `http` 协议，另一个使用 `ftp` 协议。这两个值由空格分隔，并且它们应在一行内，而不是像显示的那样在两行。当你运行服务器或客户端程序时，可能会发生\
  \ `ClassNotFoundException`，这很可能是由 `java.rmi.server.codebase` 属性设置不正确，或者根本没有设置此属性引起的。\n\
  \n### 运行 RMI 客户端程序\n\n在 RMI 注册表和服务器应用程序成功启动后，就可以启动 RMI 客户端应用程序了。你可以使用以下命令来运行客户端程序：\n\
  \n```\nC:\\Java9APIsAndModules>java\n--module-path dist\\jdojo.rmi.common.jar;dist\\\
  jdojo.rmi.client.jar\n-Djava.rmi.server.codebase=file:///C:/Java9APIsAndModules/dist/jdojo.rmi.common.jar\n\
  -Djava.security.policy=file:///C:/mypolicy/rmi.policy\n--module jdojo.rmi.client/com.jdojo.rmi.client.RemoteClient\n\
  Echo Message: Hello, Echo reply: Hello\nServer Time: 2018-01-05T07:55:59.922783500-06:00[America/Chicago]\n\
  101 + 207 = 308\n```\n\n对于此示例，你在运行上述命令时不必包含 `java.rmi.server.codebase` 选项。但是，如果你的客户端程序在远程方法中使用参数，并且这些参数类型的类文件在服务器上不可用，那么你将需要包含此选项。在这种情况下，服务器将从指定的\
  \ `java.rmi.server.codebase` 选项下载这些类文件。\n\n当客户端程序成功运行时，你应该能够在控制台上看到输出。当你运行程序时，你可能会得到不同的输出，因为它会打印运行服务器应用程序的服务器机器的当前日期和时间以及时区信息。\n\
  \n## RMI 应用程序故障排除\n\n在你第一次能够成功运行 RMI 应用程序之前，很可能会遇到许多错误。本节列出了一些你可能遇到的错误。它还将列出这些错误的一些可能原因以及一些可能的解决方案。不可能列出你在尝试运行\
  \ RMI 应用程序时可能遇到的所有错误。你应该能够通过查看错误的堆栈打印信息来找出大部分错误。\n\n\n\n### java.rmi.StubNotFoundException\n\
  \n当你尝试运行服务器程序时，可能会遇到 `StubNotFoundException`。异常堆栈跟踪信息类似于以下内容：\n\n```\njava.rmi.StubNotFoundException:\
  \ Stub class not found: com.jdojo.rmi.RemoteUtilityImpl_Stub; nested exception is:\
  \ java.lang.ClassNotFoundException: com.jdojo.rmi.RemoteUtilityImpl_Stub\nat sun.rmi.server.Util.createStub(Util.java:292)...\n\
  ```\n\n此异常可能由多种原因引起。以下是一些你可以查找并修复的原因：\n\n*   你可能正在使用 Java 5 之前的 Java 版本运行服务器程序。你必须使用\
  \ `rmic` 命令创建存根和骨架，并在运行服务器程序时使其对 JVM 可访问。有关更多详细信息，请参阅“生成存根和骨架”部分。\n*   当你导出远程对象且未传递端口号时，可能会遇到此错误：`RemoteUtility\
  \ remoteUtilityStub =` `(RemoteUtility)UnicastRemoteObject.exportObject(remoteUtility);`\
  \ 如果你未向 `UnicastRemoteObject` 类的 `exportObject()` 方法传递端口号来导出远程对象，则必须首先使用 `rmic`\
  \ 命令生成存根和骨架。有关更多详细信息，请参阅“生成存根和骨架”部分。另一种解决方法是向 `exportObject()` 方法传递一个端口号。端口号 0（零）表示匿名端口。`RemoteUtility\
  \ remoteUtilityStub =` `(RemoteUtility)UnicastRemoteObject.exportObject(remoteUtility,0);`\n\
  \n### java.rmi.server.ExportException\n\n当你尝试运行 `rmiregistry` 应用程序或服务器应用程序时，可能会遇到\
  \ `ExportException`。如果你在尝试运行 `rmiregistry` 应用程序时遇到此异常，其堆栈跟踪信息类似于以下所示：\n\n```\njava.rmi.server.ExportException:Port\
  \ already in use: 1099; nested exception is:\njava.net.BindException: Address already\
  \ in use: JVM_Bind...\n```\n\n它表明端口号 1099（在你的情况下可能是一个不同的数字）已被占用。也许你已经启动了在端口 1099\
  \ 上运行的 `rmiregistry` 应用程序（这是 `rmiregistry` 应用程序的默认端口号），或者有其他应用程序正在使用端口 1099。你可以通过以下两种方法之一来解决此问题：\n\
  \n*   停止使用端口 1099 的应用程序，然后在端口 1009 上启动 `rmiregistry` 应用程序。\n*   在 1099 以外的端口上启动\
  \ `rmiregistry` 应用程序。\n\n如果你在运行服务器程序时遇到 `ExportException`，则是由远程对象的导出过程失败引起的。导出过程失败的原因有很多。以下异常堆栈跟踪（显示部分跟踪信息）是由两次导出同一个远程对象引起的：\n\
  \n```\njava.rmi.server.ExportException: object already exported\nat sun.rmi.transport.ObjectTable.putTarget(ObjectTable.java:189)\n\
  at sun.rmi.transport.Transport.exportObject(Transport.java:92)...\n```\n\n检查你的服务器程序，确保只导出远程对象一次。一个常见的错误是让远程对象实现类继承自\
  \ `UnicastRemoteObject` 类，同时又使用 `UnicastRemoteObject` 类的 `exportObject()` 方法来导出远程对象。当你让远程对象的实现类继承自\
  \ `UnicastRemoteObject` 类时，你创建的远程对象会被自动导出。如果你尝试使用 `exportObject()` 方法再次导出它，就会遇到此异常。在讨论远程接口实现类时，我已经强调过这一点几次了。在开发\
  \ RMI 应用程序时，请记住这句话：“犯错是程序员，惩罚是 Java。”即使是 RMI 程序设置中的一个小错误，也可能需要花费数小时来检测和修复。\n\n###\
  \ java.security.AccessControlException\n\n当你的 Java 策略文件没有运行 RMI 应用程序所必需的 `grant`\
  \ 条目时，你会遇到此异常。以下是异常的局部堆栈跟踪信息，该异常在你尝试运行服务器程序，并且它尝试将远程对象绑定到 RMI 注册表时发生：\n\n```\njava.security.AccessControlException:\
  \ access denied (java.net.SocketPermission 127.0.0.1:1099 connect,resolve)...\n\
  ```\n\n注册表、服务器和客户端之间的通信是通过套接字进行的。出于安全考虑，你必须在 Java 策略文件中授予适当的套接字权限，以便 RMI 应用程序的三个组件能够相互通信。大多数与安全相关的异常都可以通过在\
  \ Java 策略文件中授予适当的权限来解决。\n\n\n\n### java.lang.ClassNotFoundException\n\n当 Java 运行时找不到所需的类文件时，就会抛出\
  \ `ClassNotFoundException` 异常。到目前为止，你一定多次遇到过这个异常。大多数情况下，当 `CLASSPATH` 设置不当时，就会收到此异常。在\
  \ RMI 应用程序中，此异常可能是另一个异常的原因。以下堆栈跟踪显示抛出了 `java.rmi.ServerException` 异常，其根本原因在于 `ClassNotFoundException`\
  \ 异常：\n\n```\njava.rmi.ServerException: RemoteException occurred in server thread;\
  \ nested exception is:\njava.rmi.UnmarshalException: error unmarshalling arguments;\
  \ nested exception is:\njava.lang.ClassNotFoundException: com.jdojo.rmi.RemoteUtility\n\
  ...\nCaused by: java.lang.ClassNotFoundException: com.jdojo.rmi.RemoteUtility\n\
  at java.net.URLClassLoader$1.run(URLClassLoader.java:220)\nat java.net.URLClassLoader$1.run(URLClassLoader.java:209)\n\
  ```\n\n当运行服务器或客户端应用程序时，如果 `java.rmi.server.codebase` 选项设置不当或根本未设置，就会抛出此类异常。\n\n\
  当服务器程序启动时未使用 `java.rmi.server.codebase` 选项，并且 `rmiregistry` 应用程序运行时未设置 `CLASSPATH`，就会抛出此异常。当你尝试使用\
  \ `rmiregistry` 应用程序绑定/重新绑定远程引用时，服务器应用程序会将远程引用发送给 `rmiregistry` 应用程序。`rmiregistry`\
  \ 应用程序必须先加载该类，然后才能在其 JVM 中将该远程引用表示为 Java 对象。此时，`rmiregistry` 将尝试从服务器启动时使用 `java.rmi.server.codebase`\
  \ 属性指定的位置下载所需的类文件。\n\n如果在运行客户端程序时遇到此异常，请确保在运行客户端程序时设置了 `java.rmi.server.codebase`\
  \ 属性。\n\n请在运行服务器和客户端程序时检查 `CLASSPATH` 和 `java.rmi.server.codebase` 属性，以避免此异常。\n\n\
  当运行客户端程序时，如果服务器无法找到在服务器端解组客户端调用所需的某些类定义，就会抛出 `ClassNotFoundException`。以下是该异常的示例部分堆栈跟踪：\n\
  \n```\njava.rmi.ServerException: RemoteException occurred in server thread; nested\
  \ exception is: java.rmi.UnmarshalException: error unmarshalling arguments; nested\
  \ exception is: java.lang.ClassNotFoundException: com.jdojo.rmi.client.Square\n\
  at sun.rmi.server.UnicastServerRef.dispatch(UnicastServerRef.java:336)\nat sun.rmi.transport.Transport$1.run(Transport.java:159)...\n\
  ```\n\n远程接口中定义的远程方法可能接受一个参数，该参数可能是接口或类类型。客户端可能传递一个实现了该接口的类的对象，或者传递一个属于远程接口方法签名中定义类型的子类的对象。如果服务器上不存在该类定义，服务器将尝试使用客户端应用程序中设置的\
  \ `java.rmi.server.codebase` 属性来下载该类。你需要确保导致此错误的类（异常堆栈跟踪显示类名为 `com.jdojo.rmi.client.Square`）要么位于服务器\
  \ JVM 的 `CLASSPATH` 中，要么在运行远程客户端时设置了 `java.rmi.server.codebase` 属性，以便服务器可以下载此类。\n\
  \n## 调试 RMI 应用程序\n\n你可以通过将名为 `java.rmi.server.logCalls` 的 JVM 属性设置为 `true` 来为 RMI\
  \ 服务器应用程序启用 RMI 日志记录。默认情况下，它被设置为 `false`。以下命令启动你的 `RemoteServer` 应用程序，并将 `java.rmi.server.logCalls`\
  \ 属性设置为 `true`：\n\n```\nC:\\Java9APIsAndModules>java\n--module-path dist\\jdojo.rmi.common.jar;dist\\\
  jdojo.rmi.server.jar\n-Djava.rmi.server.logCalls=true\n-Djava.security.policy=file:///C:/mypolicy/rmi.policy\n\
  -Djava.rmi.server.codebase=file:///C:/Java9APIsAndModules/dist/jdojo.rmi.common.jar\n\
  --module jdojo.rmi.server/com.jdojo.rmi.server.RemoteServer\n```\n\n当服务器 JVM 的 `java.rmi.server.logCalls`\
  \ 属性设置为 `true` 时，所有对服务器的传入调用以及执行传入调用期间抛出的任何异常的堆栈跟踪都会被记录到标准错误输出中。\n\nRMI 运行时还允许你将服务器应用程序中的传入调用记录到文件中，无论服务器\
  \ JVM 的 `java.rmi.server.logCalls` 属性设置为何值。你可以使用 `java.rmi.server.RemoteServer`\
  \ 类的 `setLog(OutputStream out)` 静态方法将所有传入调用详细信息记录到文件中。通常，你会在服务器程序代码的开头设置用于日志记录的文件输出流，例如在\
  \ `com.jdojo.rmi.server.RemoteServer` 类的 `main()` 方法中的第一条语句。以下代码片段启用了远程服务器应用程序中到\
  \ `C:\\rmilogs\\rmi.log` 文件的调用日志记录。你可以通过在 `setLog()` 方法中使用 `null` 作为 `OutputStream`\
  \ 来禁用调用日志记录。\n\n```\ntry {\njava.io.OutputStream os = new java.io.FileOutputStream(\"\
  C:\\\\rmilogs\\\\rmi.log\");\njava.rmi.server.RemoteServer.setLog(os);\n} catch\
  \ (FileNotFoundException e) {\nSystem.err.println(\"Could not enable incoming calls\
  \ logging.\");\ne.printStackTrace();\n}\n```\n\n当服务器上安装了安全管理器时，启用文件日志记录的运行代码必须具有\
  \ `java.util.logging.LoggingPermission`，且权限目标为 `\"control\"`。Java 策略文件中的以下授权条目将授予此权限。你还需要在\
  \ Java 策略文件中授予对日志文件（本例中为 `C:\\\\rmilogs\\\\rmi.log`）的 `\"write\"` 权限。\n\n```\ngrant\
  \ {\npermission java.io.FilePermission \"c:\\\\rmilogs\\\\rmi.log\", \"write\";\n\
  permission java.util.logging.LoggingPermission \"control\";\n};\n```\n\n如果你想获取有关\
  \ RMI 客户端应用程序的调试信息，请在启动 RMI 客户端应用程序时将非标准的 `sun.rmi.client.logCalls` 属性设置为 `true`。它将在标准错误输出上显示调试信息。由于此属性不属于公共规范的一部分，它可能会在未来的版本中被移除。有关调试选项的更多详细信息，请参考\
  \ RMI 规范。你可以在 [`https://docs.oracle.com/javase/8/docs/technotes/guides/rmi/faq.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/rmi/faq.html)\
  \ 找到 RMI 规范。\n\n如果你在编译和运行 RMI 应用程序时仍然遇到问题，可以参考网页 [`https://docs.oracle.com/javase/8/docs/technotes/guides/rmi/faq.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/rmi/faq.html)\
  \ 。该网页提供了处理 RMI 应用程序时常见问题的解答。\n\n\n\n## 动态类下载\n\nJVM 在创建类的对象之前会加载该类的定义。它使用类加载器在运行时加载类。类加载器是\
  \ `java.lang.ClassLoader` 类的一个实例。类加载器必须定位到类的字节码，然后才能将其定义加载到 JVM 中。Java 类加载器能够从任何位置（例如本地文件系统和网络）加载类的字节码。一个\
  \ JVM 中可能存在多个类加载器，它们可以是系统定义的，也可以是自定义的。\n\nJVM 在启动时会创建一个类加载器，称为引导类加载器。引导类加载器负责加载\
  \ JVM 基本功能所需的初始类。类加载器基于父子关系组织成树状结构。引导类加载器没有父加载器。所有其他类加载器都以引导类加载器作为其直接或间接的父加载器。在典型的类加载过程中，当要求某个类加载器加载类的字节码时，它会请求其父加载器来加载该类，父加载器再请求其自身的父加载器，依此类推，直到引导类加载器收到加载该类的请求。如果所有父类加载器都无法加载该类，那么最初收到加载请求的类加载器将尝试加载该类。\n\
  \nRMI 运行时使用一个特殊的 RMI 类加载器，负责加载 RMI 应用程序中的类。当对象在 RMI 应用程序中从一个 JVM 传递到另一个 JVM 时，发送方\
  \ JVM 必须序列化并编排该对象，而接收方 JVM 必须反序列化并解编该对象。发送方 JVM 会将 `java.rmi.server.codebase` 属性的值添加到对象的序列化流中。当对象流在另一端被接收时，接收方\
  \ JVM 必须使用类加载器加载该对象的类定义，然后才能将对象流转换为 Java 对象。JVM 指示 RMI 类加载器加载它以流形式接收到的对象的类定义。该类加载器会尝试从其\
  \ JVM 的 `CLASSPATH` 中加载类定义。如果使用 `CLASSPATH` 未找到该类定义，类加载器会使用对象流中的 `java.rmi.server.codebase`\
  \ 属性值来加载类定义。\n\n请注意，`java.rmi.server.codebase` 属性在一个 JVM 中设置，并用于在另一个 JVM 中下载类定义。此属性可以在运行\
  \ RMI 服务器或客户端程序时设置。当一方（服务器或客户端）将对象传输给另一方，而另一方没有表示所接收对象类定义的字节码时，发送方必须在发送对象时设置 `java.rmi.server.codebase`\
  \ 属性，以便接收端可以使用此属性下载类字节码。`java.rmi.server.codebase` 属性的值是一个以空格分隔的 URL 列表。\n\n从安全角度来看，从\
  \ RMI 服务器下载代码到客户端可能是可以的。但有时，从客户端下载代码到服务器可能被认为不安全。默认情况下，从远程 JVM 下载类是禁用的。RMI 允许您通过使用\
  \ `java.rmi.server.useCodebaseOnly` 属性来启用/禁用此功能。默认情况下，它被设置为 `true`。如果设置为 `true`，JVM\
  \ 的类加载器将仅从本地 `CLASSPATH` 或本地设置的 `java.rmi.server.codebase` 属性加载类。也就是说，如果设置为 `true`，类加载器将不会从接收到的对象流中读取\
  \ `java.rmi.server.codebase` 的值来下载类定义。相反，它会在其 JVM 的 `CLASSPATH` 中查找类定义，并使用设置为其自身\
  \ JVM 的 `java.rmi.server.codebase` 属性值的 URL。也就是说，当 `java.rmi.server.useCodebaseOnly`\
  \ 属性设置为 `true` 时，RMI 类加载器会忽略从发送方 JVM 在对象流中发送的 `codebase` 值。属性名 `useCodebaseOnly`\
  \ 似乎用词不当。如果将其命名为 `useLocallySetCodebaseOnly`，可能会更好地传达其含义。以下是在运行 RMI 服务器时设置此属性的方法：\n\
  \n```\njava –Djava.rmi.server.codebase=\"http://www.myurl.com/rmiclasses\"\n-Djava.rmi.server.useCodebaseOnly=true\n\
  \ncom.jdojo.rmi.RemoteServer\n```\n\n提示\n\n从 JDK 7u21（以及 JDK 6u45 和 JDK 5u45）开始，`java.rmi.server.codebase`\
  \ 属性的默认值被设置为 `true`。其默认值以前是 `false`。这意味着，默认情况下，应用程序不允许从其他 JVM 下载类。\n\n将 `java.rmi.server.useCodebaseOnly`\
  \ 属性设置为 `true` 有两个含义：\n\n*   如果服务器需要某个类作为来自客户端的远程调用的一部分，它将始终在其 `CLASSPATH` 中查找，或者使用您为服务器程序设置的\
  \ `java.rmi.server.codebase` 的值。在前面的示例中，服务器中的所有类必须在其 `CLASSPATH` 中或位于 URL [`http://www.myurl.com/rmiclasses`](http://www.myurl.com/rmiclasses)\
  \ 处找到。\n*   如果客户端需要在远程方法调用中使用新的类类型，则服务器必须预先知道该新类类型，因为服务器永远不会使用客户端关于从何处下载所需新类的指令（通过在客户端设置\
  \ `java.rmi.server.codebase` 属性）。这意味着您必须使远程客户端将使用的新类在服务器的 `CLASSPATH` 中可用，或者在指定为服务器\
  \ `java.rmi.server.codebase` 属性的 URL 处可用。当远程方法接受一个接口类型，并且客户端发送了一个实现该接口的类的对象时，可能会出现这种情况。在这种情况下，服务器可能没有与客户端相同的该接口新实现的定义。\n\
  \n如果您为运行 RMI 客户端应用程序的 JVM 将 `java.rmi.server.useCodebaseOnly` 属性设置为 `true`，则前面的论点同样适用于运行\
  \ RMI 客户端应用程序。如果此属性为客户端应用程序设置为 `true`，则必须使所有必需的类对客户端可用，方法是将它们放在其 `CLASSPATH` 中，或者将它们放在\
  \ URL 处并在客户端将 URL 设置为 `java.rmi.server.codebase` 属性的值。\n\n\n\n## 远程对象的垃圾回收\n\n在\
  \ RMI 应用程序中，远程对象在服务器端的 JVM 中创建。RMI 注册表和远程客户端会持有远程对象的引用。远程对象是否会被垃圾回收？如果会，它何时以及如何被回收？本地对象的垃圾回收很简单。本地对象在同一\
  \ JVM 中创建和引用。垃圾回收器很容易判断出本地对象在 JVM 中不再被引用。\n\n在 RMI 应用程序中，你需要一个能够追踪远程 JVM 中远程对象引用的垃圾回收器。假设一个\
  \ RMI 服务器创建了一个`RemoteUtilityImpl`类的远程对象，并且有五个客户端获取了它的远程引用。RMI 注册表也是一个客户端，它会在绑定/重新绑定过程中获取远程引用。服务器何时以及如何回收这个被五个客户端引用的`RemoteUtilityImpl`类的唯一对象？\n\
  \n拥有远程对象的服务器 JVM，以及五个不同客户端的 JVM 必须进行交互，这样当服务器 JVM 中的远程对象不再被任何远程客户端使用时，它才能被垃圾回收。为了便于讨论，我们暂且忽略服务器\
  \ JVM 中对该远程对象的本地引用。远程客户端与 RMI 服务器之间的交互依赖于许多不可靠的因素。例如，网络可能中断，导致远程客户端无法与服务器通信。第二个考虑因素是，谁发起远程客户端与服务器之间的交互？是服务器不断询问远程客户端是否持有有效的远程引用？还是远程客户端不断告知服务器它仍持有有效的远程引用？客户端与服务器之间的交互责任由双方共同承担。远程客户端需要向服务器更新其远程引用的存活状态。如果服务器在特定时间段内未收到任何客户端的消息，它会单方面决定将该远程对象作为未来垃圾回收的候选对象。\n\
  \nRMI 垃圾回收器基于引用计数。每个引用计数都有一个关联的租约。租约有一个有效的时间段。当远程客户端（包括 RMI 注册表）获取到远程对象的引用时，它会向服务器上的\
  \ RMI 运行时发送一条消息，请求为该远程对象引用获取租约。服务器会为该客户端授予一个指定时间段的租约。服务器将该远程对象的引用计数加一，并将租约发回给客户端。默认情况下，RMI\
  \ 服务器为远程对象授予 10 分钟的租约。现在，可能出现以下几种情况：\n\n*   客户端可能在获取租约的时间段内就完成了对远程对象引用的使用。\n*  \
  \ 客户端可能希望将租约续期一段更长的时间。\n*   客户端崩溃。服务器未收到客户端的任何消息，并且客户端获取的远程引用租约到期。\n\n我们来看看每种情况。客户端在三种不同情况下会向服务器发送消息。第一次是在它首次获取远程引用时。它告知服务器它持有了该远程对象的引用。第二次是当它想要续期远程引用的租约时。第三次是当它完成对远程引用的使用时。实际上，当客户端应用程序中的远程引用被垃圾回收时，它会向服务器发送一条消息，告知它已完成对该远程对象的使用。在内部，远程客户端向服务器发送的消息只有两种类型：dirty（脏）和\
  \ clean（清理）。发送 dirty 消息是为了获取租约，发送 clean 消息是为了移除/取消租约。远程客户端通过`java.rmi.dgc.DGC`接口的`dirty()`和`clean()`方法向服务器发送这两类消息。作为开发者，除了可以自定义租约时间段外，你无法控制这些消息的发送或接收。租约时间段控制着这些消息发送到服务器的频率。\n\
  \n当客户端完成对远程对象引用的使用时，它会向服务器发送一条消息告知已完成。该消息在客户端 JVM 中的远程引用被垃圾回收时发送。因此，在客户端程序代码中，一旦使用完远程引用，就立即将其设置为`null`非常重要。否则，即使远程客户端不再使用该远程对象，服务器也会一直持有它。你无法控制这条从远程客户端发送到服务器的消息的时机。你能做的加快此消息发送的唯一方法，就是将客户端代码中的远程对象引用设置为`null`，这样垃圾回收器会尝试回收它，并向服务器发送一条\
  \ clean 消息。\n\nRMI 运行时负责追踪远程客户端 JVM 中远程引用的租约。当租约过期时间过半时，远程客户端会向服务器发送租约续期请求，并获取续期后的租约。当远程客户端的某个远程引用租约被续期后，服务器会追踪租约的过期时间，并且不会垃圾回收该远程对象。理解设置远程引用租约时间段的重要性至关重要。如果设置得太短，频繁续约将消耗大量网络带宽。如果设置得太长，当客户端已完成对远程引用的使用但未通知服务器取消租约时，服务器会长时间保持该远程对象存活。稍后我将讨论如何在\
  \ RMI 应用程序中设置租约时间段值。\n\n如果服务器在租约到期后，未收到远程客户端关于其已获取的远程引用租约的任何消息，它就会简单地取消该租约，并将该远程对象的引用计数减一。服务器做出的这一单方面决定，对于处理行为异常的远程客户端（未告知服务器已完成对远程引用的使用）或任何可能阻止远程客户端与服务器通信的网络/系统故障情况至关重要。\n\
  \n当所有客户端都完成对某个远程对象引用的使用时，其在服务器上的引用计数将降为零。当远程客户端的租约到期或已向服务器发送 clean 消息时，即视为该客户端已完成对该远程引用的使用。在这种情况下，RMI\
  \ 运行时将使用弱引用来引用该远程对象，因此，如果该远程对象没有本地引用，它就可能被垃圾回收。\n\n\n\n默认情况下，租期设置为 10 分钟。你可以在启动\
  \ RMI 服务器时，使用`java.rmi.dgc.leaseValue`属性来设置租期。租期的值以毫秒为单位指定。以下命令以 5 分钟（300000 毫秒）的租期启动服务器程序。命令文本应写在一行上，两部分之间用空格分隔，而不是像所示那样换行；为了清晰起见，我使用换行符分隔了命令的两部分。\n\
  \n```\njava -Djava.rmi.dgc.leaseValue=300000 \n```\n\n除了设置租期时间外，其他一切均由 RMI 运行时处理。RMI\
  \ 运行时还会为你提供一条关于远程对象垃圾收集的信息。它可以告诉你远程对象的引用计数何时降为零。如果远程对象持有某些资源，并且你希望在没有任何远程客户端引用它时释放这些资源，那么收到此通知非常重要。要获取此通知，你需要在远程对象实现类中实现`java.rmi.server.Unreferenced`接口。其声明如下：\n\
  \n```\npublic interface Unreferenced {\nvoid unreferenced()\n|\n```\n\n当远程对象的远程引用计数变为零时，会调用`unreferenced()`方法。如果你希望在示例中为`RemoteUtility`远程对象获取通知，则需要修改`RemoteUtilityImpl`类的声明，如清单\
  \ 6-9 所示。\n\n```\n// RemoteUtilityImpl.java\npackage com.jdojo.rmi.server;\nimport\
  \ com.jdojo.rmi.common.RemoteUtility;\nimport java.rmi.server.Unreferenced;\nimport\
  \ java.time.ZonedDateTime;\npublic class RemoteUtilityImpl implements RemoteUtility,\
  \ Unreferenced {\npublic RemoteUtilityImpl() {\n}\n@Override\npublic String echo(String\
  \ msg) {\nreturn msg;\n}\n@Override\npublic ZonedDateTime getServerTime() {\nreturn\
  \ ZonedDateTime.now();\n}\n@Override\npublic int add(int n1, int n2) {\nreturn n1\
  \ + n2;\n}\n@Override\npublic void unreferenced() {\nSystem.out.println(\"RemoteUtility\
  \ unreferenced at: \" + ZonedDateTime.now());\n}\n}\n清单 6-9.\n实现了 Unreferenced 接口的\
  \ RemoteUtilityImpl 类的修改版本\n```\n\n你可能会注意到，这次`RemoteUtilityImpl`类实现了`Unreferenced`接口，并提供了`unreferenced()`方法的实现，该方法会在其引用计数变为零时向标准输出打印一条包含时间的消息。`unreferenced()`方法将由\
  \ RMI 运行时调用。要测试`unreferenced()`方法是否被调用，你可以先启动 RMI 注册表应用程序，然后启动 RMI 服务器应用程序。RMI 注册表会不断续订远程对象的租期。只要\
  \ RMI 注册表在运行，你就永远不会看到`unreferenced()`方法被调用。你需要关闭 RMI 注册表应用程序，并等待远程对象引用的租期到期，或者在你关闭\
  \ RMI 注册表时由其取消租期。RMI 注册表关闭后，你将在服务器程序的标准输出上看到由`unreferenced()`方法打印的消息。\n\nRMI 注册表应仅用作启动远程客户端的引导手段。之后，远程客户端可以通过对另一个远程对象的方法调用来接收远程对象的引用。如果远程客户端通过对远程对象的远程方法调用接收到了远程对象引用，则该远程对象的引用无需在\
  \ RMI 注册表中注册。在这种情况下，当最后一个远程客户端使用完远程引用后，服务器将垃圾回收该远程对象，而不是在它绑定到 RMI 注册表时将其保留在内存中。\n\
  \n## 总结\n\nJava 远程方法调用（RMI）允许在一个 JVM 中运行的程序调用在另一个 JVM 中运行的 Java 对象上的方法。RMI 提供了一套\
  \ API，用于使用 Java 编程语言开发分布式应用程序。\n\n一个 RMI 应用程序涉及在三个 JVM 中运行的三个应用程序：`rmiregistry`应用程序、一个服务器应用程序和一个客户端应用程序。`rmiregistry`应用程序随\
  \ JDK 一起提供。你需要负责开发服务器和客户端应用程序。服务器应用程序创建称为远程对象的 Java 对象，并将它们注册到`rmiregistry`中，以便客户端后续进行名称查找。客户端应用程序使用逻辑名称在`rmiregistry`中查找远程对象，并获取远程对象的引用。客户端应用程序在远程对象引用上调用方法，该方法被发送到服务器应用程序，以便在远程对象上执行该方法。方法调用的结果从服务器应用程序发送回客户端应用程序。\n\
  \n一个 RMI 应用程序必须遵循一些规则来开发远程通信中涉及的类和接口。你需要创建一个接口（称为远程接口），该接口必须继承自`Remote`接口。接口中的所有方法都必须包含一个`throws`子句，该子句至少抛出`RemoteException`。远程对象的类必须实现远程接口。服务器应用程序创建实现远程接口的类的对象，导出该对象以赋予其真实远程对象的状态，并将其注册到`rmiregistry`中。客户端应用程序只需要远程接口。\n\
  \n如果这三个应用程序中的任何一个需要本地不可用的类，它们可以在运行时动态下载这些类。要使 JVM 能够动态下载类，必须将`java.rmi.server.useCodebaseOnly`属性设置为`false`。默认情况下，它被设置为`true`，这会禁用\
  \ JVM 中类的动态下载。除了远程对象引用之外，JVM 还会收到一个名为`java.rmi.server.codebase`的属性的值，该属性是一个 URL\
  \ 列表，JVM 可以从这些 URL 下载（如果其自身的`java.rmi.server.useCodebaseOnly`属性设置允许的话）处理远程对象引用所需的类。\n\
  \nRMI 应用程序中有多个组件协同工作，这使得调试变得困难。你可以通过将 JVM 属性`java.rmi.server.logCalls`设置为`true`来运行\
  \ RMI 服务器，从而记录对 RMI 服务器的所有调用。对服务器的所有调用都将记录到标准错误中。你也可以将 RMI 服务器调用记录到文件中。\n\nRMI 为在\
  \ RMI 服务器中运行的远程对象提供自动垃圾收集。远程对象的垃圾收集基于引用计数和租期。当客户端应用程序获取远程对象的引用时，它也会从服务器应用程序获得该远程对象的租期。租期在一段时间内有效。只要客户端应用程序持有远程对象引用，它就会定期续订租期。服务器应用程序会跟踪远程对象的引用计数和租期。当客户端应用程序使用完远程引用后，它会向服务器应用程序发送一条消息，服务器应用程序将远程对象的引用计数减\
  \ 1。当服务器应用程序中远程对象的引用计数减少到零时，该远程对象将被垃圾回收。\n\n问题与练习\n\n\n\n1.  什么是 Java 远程方法调用（RMI）？\n\
  2.  每个远程接口必须扩展的接口的完全限定名称是什么？\n3.  在 RMI 服务器程序中，创建远程对象后，需要执行哪些步骤才能使客户端能够使用该远程对象？\n\
  4.  什么是 RMI 注册表，它位于何处？\n5.  在 RMI 应用程序中，RMI 注册表和 RMI 服务器可以部署到两台不同的机器上吗？如果答案是否定的，请说明原因。\n\
  6.  描述 RMI 客户端程序调用远程对象上的方法所需执行的典型步骤序列。\n7.  RMI 应用程序涉及三个应用层：客户端、RMI 注册表和服务器。这些应用程序必须按什么顺序运行？\n\
  8.  `rmic` 工具有什么用途？是否需要为你开发的所有 RMI 应用程序使用此工具？\n9.  描述在运行 RMI 客户端和服务器应用程序时，使用 `java.rmi.server.codebase`\
  \ 命令行选项的作用。\n10. 在运行 RMI 服务器程序时，使用 `java.rmi.server.logCalls=true` 命令行选项会产生什么效果？\n\
  11. 如何将 RMI 服务器应用程序中的远程调用记录到文件中？\n12. 在运行 RMI 应用程序时，使用 `java.rmi.server.useCodebaseOnly=true`\
  \ 命令行选项会产生什么效果？\n13. 简要解释远程对象是如何被垃圾回收的。\n14. 描述当远程对象不再被引用时，如何获得通知的步骤。\n\n# 7. Java\
  \ 本地接口\n\n在本章中，你将学习：\n\n*   什么是 Java 本地接口（JNI）\n*   如何编写使用本地方法的 Java 程序\n*   如何编写\
  \ C++ 程序来实现本地方法\n*   如何在 Windows 和 Linux 上为 Java 中使用的本地方法实现创建共享库\n*   Java 类型与 JNI\
  \ 类型之间的数据类型映射\n*   如何在本地代码中处理 Java 字符串和数组\n*   如何在本地代码中创建 Java 对象、访问这些对象的字段和方法\n\
  *   本地代码中的异常处理\n*   如何将 JVM 嵌入到本地代码中\n*   如何使用 JNI 在本地代码中处理线程同步\n\n本章中的所有示例程序都是\
  \ `jdojo.jni` 模块的成员，如清单 7-1 所示。\n\n```\n// module-info.java\nmodule jdojo.jni {\n\
  \    exports com.jdojo.jni;\n}\n清单 7-1.\njdojo.jni 模块的声明\n```\n\n## 什么是 Java 本地接口？\n\
  \nJava 本地接口（JNI）是一种编程接口，用于促进 Java 代码与用本地语言（如 C、C++、FORTRAN 等）编写的代码之间的交互。JNI 支持直接从\
  \ Java 调用 C 和 C++ 函数。如果你需要使用任何其他语言（如 FORTRAN）编写的本地代码，可以使用 C/C++ 包装函数从 Java 调用它。交互可以是双向的。Java\
  \ 代码可以调用本地代码，反之亦然，如图 7-1 所示。你可以访问 [`https://docs.oracle.com/javase/9/docs/specs/jni/`](https://docs.oracle.com/javase/9/docs/specs/jni/)\
  \ 获取 JNI 规范。\n\n![A323071_2_En_7_Fig1_HTML.gif](img/A323071_2_En_7_Fig1_HTML.gif)\n\
  \n图 7-1.\nJNI 架构\n\nJava 使用本地方法调用本地代码。Java 上下文中的本地方法是在 Java 中声明并在本地语言（如 C/C++）中实现的方法。本地方法实现被编译成共享库，由\
  \ JVM 加载。共享库在 Windows 上称为动态链接库（DLL），在 UNIX 上称为共享对象（SO）。Java 方法和本地方法在 Java 程序中的调用方式相同。Java\
  \ 程序被编译成一种称为字节码的独立于平台的格式。本地代码被编译成依赖于平台的格式。因此，如果 Java 应用程序使用本地代码，它将无法移植到其他平台，除非你在所有平台上开发相同的共享库。有时你可能会在本地代码中访问特定于平台的功能，这些功能从\
  \ Java 应用程序中使用；在这种情况下，你应该意识到你的 Java 应用程序无法在其他平台上运行。\n\n当 Java 通过其类库提供了丰富的功能集时，为什么有人会使用\
  \ JNI？可能有必要使用 JNI 在 Java 中访问本地代码，原因如下：\n\n*   如果 Java 应用程序需要实现一些无法使用 Java API 实现的特定于平台的功能。\n\
  *   你可能已经有用本地语言编写的遗留代码，并且希望在 Java 应用程序中重用它们。\n*   你正在开发一个时间关键的 Java 应用程序，其中 Java\
  \ 代码的性能不如预期。你可以将 Java 代码中时间关键的部分移到本地代码中。\n\n你应该将使用 JNI 视为 Java 应用程序的最后手段。你必须探索使用\
  \ Java API 实现所需功能的所有可能性。使用 JNI 还会改变开发应用程序所需的技能组合。要么让从事 Java 应用程序的开发人员接受本地语言（C/C++）培训，要么将了解本地语言的新开发人员引入团队。在\
  \ Java 应用程序中使用本地代码会使应用程序稳定性降低，并容易受到安全风险的影响，因为本地代码在 JVM 外部运行。\n\n我在本章中使用 C++ 来实现本地方法。你也可以使用\
  \ C 语言。本章中列出的所有 C++ 代码示例只需稍作修改即可移植到 C 语言。每当需要在 C++ 代码中进行修改以将其转换为 C 时，我都会指出 C++ 代码和\
  \ C 代码之间的差异。\n\n## 系统要求\n\n你需要一个可以创建共享库的 C 或 C++ 编译器。你还需要在计算机上安装 JDK 以生成 C/C++ 头文件。本章中引用的本地代码是使用\
  \ `g++` 编译器作为 Windows 平台上的 C++ 编译器开发的。使用 JDK9 来编译和运行 Java 代码。但是，使用 `g++` 作为 C++\
  \ 编译器并不是运行任何示例的必要条件。你可以使用任何其他 C/C++ 编译器在你的平台上创建共享库。\n\n## JNI 入门\n\n使用 JNI 开发 Java\
  \ 应用程序涉及以下步骤：\n\n*   编写 Java 程序\n*   编译 Java 程序\n*   创建 C/C++ 头文件\n*   编写 C/C++\
  \ 程序\n*   创建共享库\n*   运行 Java 程序\n\n后续章节将详细讨论每个步骤。\n\n\n\n### 编写 Java 程序\n\n使用 JNI\
  \ 的 Java 程序与纯 Java 程序仅在两个方面有所不同：\n\n*   加载共享库\n*   声明原生方法\n\n在 Java 调用原生方法之前，必须加载包含原生方法实现的共享库。共享库通过\
  \ `java.lang.System` 类的 `loadLibrary(String libraryNameWithoutExtension)` 静态方法加载，如下所示：\n\
  \n```\n// 加载名为 beginningjava 的共享库\nSystem.loadLibrary(\"beginningjava\");\n```\n\
  \n你也可以使用 `java.lang.Runtime` 类的 `loadLibrary()` 方法来加载共享库。在内部，`System` 类的 `loadLibrary()`\
  \ 方法会调用 `Runtime` 类的 `loadLibrary()` 方法。上述代码可以重写如下：\n\n```\n// 加载共享库\nRuntime.getRuntime().loadLibrary(\"\
  beginningjava\");\n```\n\n请注意，你需要向 `loadLibrary()` 方法传递一个不带任何平台特定前缀和文件扩展名的共享库名称。例如，如果你的共享库文件名在\
  \ Windows 上是 `beginningjava.dll`，在 UNIX 上是 `libbeginningjava.so`，或者在 Mac 上是 `libbeginningjava.dylib`，你需要使用\
  \ `beginningjava` 作为共享库名称。`loadLibrary()` 方法会根据平台为你的共享库名称添加前缀和后缀。这样，如果你打算在不同平台上运行相同的\
  \ Java 代码，就无需更改加载共享库的 Java 代码。\n\n`System` 类的 `mapLibraryName(String libName)` 静态方法接受库名称，并返回该平台上映射后的共享库名称。有时，你的共享库一切正确，但\
  \ `System` 类的 `loadLibrary()` 方法却找不到该库。这通常发生在你为共享库指定了错误名称时。当 Java 运行时为共享库名称添加前缀和后缀时，它会生成一个与你为共享库指定的名称不同的名称。当你遇到如下所示的\
  \ `UnsatisfiedLinkError` 时，请运行清单 7-2 中的程序，以了解 Java 运行时期望的正确共享库名称。该程序的输出在不同平台上会有所不同。\n\
  \n```\njava.lang.UnsatisfiedLinkError: no beginningjava in java.library.path\nat\
  \ java.base/java.lang.ClassLoader.loadLibrary(ClassLoader.java:2541)\nat java.base/java.lang.Runtime.loadLibrary0(Runtime.java:873)\n\
  at java.base/java.lang.System.loadLibrary(System.java:1857)\n...\n```\n\n```\n//\
  \ MappedSharedLibraryName.java\npackage com.jdojo.jni;\npublic class LibraryNameMapper\
  \ {\npublic static void main(String[] args) {\nString libName = \"beginningjava\"\
  ;\nString mappedName = System.mapLibraryName(libName);\nSystem.out.println(\"共享库名称:\
  \ \" + libName);\nSystem.out.println(\"映射后的共享库名称: \" + mappedName);\n}\n}\n清单 7-2.\n\
  了解平台上的映射共享库名称\n```\n\n你也可以使用 `System` 或 `Runtime` 类的 `load()` 方法来加载共享库。`load()`\
  \ 方法接受带有文件扩展名的共享库绝对路径。如果 Windows 平台上的 `beginningjava.dll` 文件位于 `C:\\Java9APIsAndModules\\\
  jni` 目录中，则调用 `load()` 方法如下所示：\n\n```\n// 加载共享库\nSystem.load(\"C:\\\\Java9APIsAndModules\\\
  \\jni\\\\beginningjava.dll\");\n```\n\n请注意，使用 `load()` 方法会强制你使用共享库的绝对路径和文件扩展名，这会使你的\
  \ Java 代码无法移植到其他平台。在本章的示例中，你将使用 `System` 类的 `loadLibrary()` 方法来加载共享库。如果无法加载特定库，`load()`\
  \ 和 `loadLibrary()` 方法会抛出 `java.lang.UnsatisfiedLinkError`。\n\n`loadLibrary()` 方法仅通过库名称如何找到文件系统中的共享库文件？你有两种方法可以让\
  \ JVM 知道共享库的位置：\n\n*   将包含共享库的目录添加到 Windows 的 `PATH` 环境变量或 UNIX 的 `LD_LIBRARY_PATH`\
  \ 环境变量中。\n*   使用 `java.library.path` JVM 属性作为命令行选项，指定包含共享库的目录（或多个目录，在 Windows 上用分号分隔，在\
  \ UNIX 上用冒号分隔）。以下命令假设 `beginningjava` 共享库位于 `C:\\Java9APIsAndModules\\jni\\lib`\
  \ 目录中：\n\n```\n    java -Djava.library.path=C:\\Java9APIsAndModules\\jni\\lib \n\
  \    ```\n\nJava 中使用的原生方法没有用 Java 编写的方法体，因为其实现存在于原生代码中。但是，在使用原生方法之前，你需要在 Java 中声明它。它使用\
  \ `native` 关键字进行声明。Java 代码中的原生方法声明以分号结尾。以下代码片段声明了一个名为 `hello()` 的原生方法，该方法不接受参数并返回\
  \ `void`。\n\n```\npublic class Test {\n// 声明一个名为 hello() 的原生方法\npublic native void\
  \ hello();\n}\n```\n\n在 Java 代码中调用原生方法与调用任何其他 Java 方法相同：\n\n```\nTest test = new\
  \ Test();\ntest.hello();\n```\n\n你可以将原生方法声明为 `public`、`private`、`protected` 或包级访问权限。原生方法可以声明为静态或非静态。你可以在一个\
  \ Java 类中拥有任意数量的原生方法。\n\n你不能将原生方法声明为抽象。接口中也不允许使用原生方法。抽象方法意味着该方法缺少实现，并且将在 Java 中实现，而原生方法意味着该方法缺少实现，并且在原生代码中实现。同时将方法声明为\
  \ `native` 和 `abstract` 会使得不清楚该方法的实现应该在哪里寻找——是在 Java 代码中还是在原生代码中。这就是方法声明不能同时使用 `abstract`\
  \ 和 `native` 这两个修饰符的原因。\n\n`native` 关键字只能用于声明方法。你不能将字段声明为 `native`。以下代码片段声明了两个名为\
  \ `WillCompile` 和 `WontCompile` 的类。`WillCompile` 类包含 `native` 关键字的有效用法，而 `WontCompile`\
  \ 类演示了 `native` 关键字的无效用法。\n\n```\npublic class WillCompile {\npublic native void\
  \ m1();\nprivate native void m2();\nprotected native void m3();\nnative void m4();\n\
  public static native void m5();\npublic native int m6(String str);\n// 一个非原生方法（纯\
  \ Java 方法）\npublic int add(int a, int b) {\nreturn a + b;\n}\n}\n// Java 类中 native\
  \ 关键字非法使用的示例\npublic class WontCompile {\n// 字段不能是 native\nprivate native String\
  \ name;\n// 方法不能同时是 abstract 和 native\npublic abstract native String getName();\n\
  }\n```\n\n现在你已经准备好编写 Java 代码来调用你的第一个原生方法了。你将原生方法命名为 `hello()`。它不接受任何参数，也不返回任何值。稍后你将用\
  \ C++ 实现它，它将向标准输出打印一条消息 `Hello JNI`。清单 7-3 包含了 `HelloJNI` 类的完整代码。\n\n```\n// HelloJNI.java\n\
  package com.jdojo.jni;\npublic class HelloJNI {\nstatic {\n// 仅使用名称加载共享库\nSystem.loadLibrary(\"\
  beginningjava\");\n}\n// 声明原生方法\npublic native void hello();\npublic static void\
  \ main(String[] args) {\n// 创建一个 HelloJNI 对象\nHelloJNI helloJNI = new HelloJNI();\n\
  // 调用原生方法\nhelloJNI.hello();\n}\n}\n清单 7-3.\n一个使用名为 hello() 的原生方法的 HelloJNI 类\n\
  ```\n\n`HelloJNI` 类执行了三项操作：\n\n\n\n*   它在静态初始化器中加载一个名为 `beginningjava` 的共享库（在 Windows\
  \ 上是 `beginningjava.dll`，在类 UNIX 操作系统上是 `libbeginningjava.so`）。请注意，在编写和编译 `HelloJNI`\
  \ 类时，你不需要拥有 `beginningjava` 共享库。该共享库在运行 `HelloJNI` 类时才需要。\n\n```\n    static {\n\
  \    System.loadLibrary(\"beginningjava \");\n    }\n    ```\n\n*   它声明了一个名为 `hello()`\
  \ 的本地方法，该方法稍后将用 C++ 实现。\n\n```\n    public native void hello();\n    ```\n\nJava\
  \ 编译器将编译包含 `hello()` 本地方法声明的 `HelloJNI` 类，而无需实现该方法的本地代码。该方法的实现将在运行时被调用时才需要。\n* \
  \  它在 `main()` 方法中创建了一个 `HelloJNI` 类的对象，并调用了该对象的 `hello()` 方法。\n\n```\n    HelloJNI\
  \ helloJNI = new HelloJNI();\n    helloJNI.hello();\n    ```\n\n`HelloJNI` 类的代码很简单。在\
  \ Java 代码中使用本地方法时，你无需做任何特殊处理。不过，你现在还不能运行这个类，因为当你运行它时，它会寻找一个包含 `hello()` 方法本地代码的\
  \ `beginningjava` 共享库，而你尚未编写该库。如果你现在尝试运行这个类，将会得到以下错误：\n\n```\njava.lang.UnsatisfiedLinkError:\
  \ no beginningjava in java.library.path\nat java.base/java.lang.ClassLoader.loadLibrary(ClassLoader.java:2541)\n\
  at java.base/java.lang.Runtime.loadLibrary0(Runtime.java:873)\nat java.base/java.lang.System.loadLibrary(System.java:1857)\n\
  at jdojo.jni/com.jdojo.jni.HelloJNI.(HelloJNI.java:7)\n```\n\n### 编译 Java 程序\n\n\
  编译使用本地方法的 Java 程序与编译其他任何 Java 程序相同。编译 `HelloJNI` 类时无需任何特殊设置。你可以像这样使用 `javac` 命令进行编译：\n\
  \n```\njavac HelloJNI.java\n```\n\n此命令将生成一个 `HelloJNI.class` 文件，其中包含 `HelloJNI`\
  \ 类的类定义，其完全限定名为 `com.jdojo.jni.HelloJNI`。请确保你拥有 `HelloJNI.class` 文件，因为执行下一步需要它。\n\
  \n### 创建 C/C++ 头文件\n\n在开始用 C/C++ 编写本地方法的代码之前，你需要生成一个头文件，该文件将包含你的方法在 C/C++ 中的声明。在编写\
  \ C/C++ 代码来实现你的 `hello()` 本地方法时，你将使用这个头文件。`hello()` 方法在 Java 和 C/C++ 中的方法签名差异很大。你无需担心如何用\
  \ C/C++ 编写方法签名的细节，Java 运行时会用到这些签名。Java 编译器会为你生成 C/C++ 签名。\n\nJDK 包含一个名为 `javah`\
  \ 的特殊工具，其唯一目的是为 Java 本地方法创建 C/C++ 头文件。JDK8 为 Java 编译器（`javac` 命令行工具）添加了一个 `-h` 选项，用于生成头文件。JDK9\
  \ 已弃用 `javah` 工具，并计划在未来的版本中移除。我将向你展示如何使用 `javac` 编译器的 `-h` 选项生成头文件。\n\n当你编译 Java\
  \ 源代码时，可以使用 `-h` 选项为正在编译的类中的所有本地方法生成 C/C++ 头文件。你需要使用 `-h` 选项指定一个目录路径，生成的头文件将存储在该目录中。以下命令编译\
  \ `HelloJNI` 类，并为该类中的 `hello()` 方法生成一个 C/C++ 头文件。该头文件将被放置在 `jni\\headers\\jdojo.jni`\
  \ 目录中：\n\n```\nC:\\Java9APIsAndModules>javac -h jni\\headers\\jdojo.jni -d build\\\
  modules\\jdojo.jni src\\jdojo.jni\\classes\\com\\jdojo\\jni\\HelloJNI.java\n```\n\
  \n此命令生成一个名为 `com_jdojo_jni_HelloJNI.h` 的头文件。默认情况下，生成的文件名基于类的完全限定名。类名中的点被替换为下划线。`com_jdojo_jni_HelloJNI.h`\
  \ 文件的内容如清单 7-4 所示。\n\n```\n/* DO NOT EDIT THIS FILE - it is machine generated */\n\
  #include \n/* Header for class com_jdojo_jni_HelloJNI */\n#ifndef _Included_com_jdojo_jni_HelloJNI\n\
  #define _Included_com_jdojo_jni_HelloJNI\n#ifdef __cplusplus\nextern \"C\" {\n#endif\n\
  /*\n* Class:     com_jdojo_jni_HelloJNI\n* Method:    hello\n* Signature: ()V\n\
  */\nJNIEXPORT void JNICALL Java_com_jdojo_jni_HelloJNI_hello\n(JNIEnv *, jobject);\n\
  #ifdef __cplusplus\n}\n#endif\n#endif\n清单 7-4.\ncom_jdojo_jni_HelloJNI.h 文件的内容\n\
  ```\n\n你无需担心头文件中的细节。你只需要为你的本地 `hello()` 方法生成的方法签名。Java 代码中的方法签名 `void hello()` 已被转换为以下\
  \ C/C++ 代码的方法签名：\n\n```\nJNIEXPORT void JNICALL Java_com_jdojo_jni_HelloJNI_hello\
  \ (JNIEnv *, jobject);\n```\n\n`JNIEXPORT` 和 `JNICALL` 是两个宏。关键字 `void` 表示该 `native`\
  \ 方法不返回任何值。`javac` 命令使用一条规则来生成头文件中本地方法的名称。在本例中，方法名是 `Java_com_jdojo_jni_HelloJNI_hello`。我稍后会讨论命名规则的细节。尽管\
  \ Java 代码中 `hello()` 方法的声明不接受任何参数，但头文件中的本地方法声明接受两个参数。请将其视为一条规则：本地语言中的所有本地方法声明将比\
  \ Java 代码中声明的参数数量多接受两个额外参数。这些额外参数作为该方法的第一个和第二个参数添加到本地语言中。第一个参数是一个指向 `JNIEnv` 类型对象的指针，该对象是一个函数指针表，用于促进本地环境与\
  \ Java 环境之间的交互。第二个参数的类型是 `jobject` 或 `jclass`。如果本地方法在 Java 代码中被声明为非静态，则第二个参数的类型为\
  \ `jobject`，它是对调用该本地方法的 Java 对象的引用。\n\n这类似于 Java 中每个非静态方法内部可用的 `this` 引用。由于 Java\
  \ 中的本地 `hello()` 方法被声明为非静态，因此第二个参数类型为 `jobject`。如果本地方法在 Java 中被声明为静态，则第二个参数的类型将为\
  \ `jclass`，并且它是对 JVM 中调用该本地方法的类对象的引用。\n\n在此步骤结束时，你应该拥有一个名为 `com_jdojo_jni_HelloJNI.h`\
  \ 的头文件，其内容如清单 7-4 所示。\n\n\n\n### 编写 C/C++ 程序\n\n清单 7-5 包含了你需要为 `hello()` 原生方法编写的\
  \ C/C++ 代码。C++ 的源代码文件名为 `hellojni.cpp`。在本例中，如果你选择使用 C 语言，代码将是相同的。请注意，`hello` 是你在\
  \ Java 代码中为原生方法起的名称，而在 C/C++ 中，它被命名为 `Java_com_jdojo_jni_HelloJNI_hello`。\n\n```\n\
  // hellojni.cpp\n#include \n#include \n#include \"com_jdojo_jni_HelloJNI.h\"\nJNIEXPORT\
  \ void JNICALL Java_com_jdojo_jni_HelloJNI_hello(JNIEnv *env, jobject obj) {\nprintf(\"\
  Hello JNI\\n\");\nreturn;\n}\n清单 7-5.\nhello() 原生方法的 C/C++ 实现\n```\n\n该程序使用了三个 C/C++\
  \ 编译器预处理 `include` 指令来包含三个头文件：`stdio.h`、`jni.h` 和 `com_jdojo_jni_HelloJNI.h`。包含\
  \ `stdio.h` 是为了使用标准输入/输出功能，`jni.h` 是为了使用与 JNI 相关的功能，而 `com_jdojo_jni_HelloJNI.h`\
  \ 则是为了包含与你的 `hello()` 原生方法相关的功能。\n\n当你安装 JDK 时，`jni.h` 文件会被复制到 `JDK_HOME\\include`\
  \ 目录。例如，如果你将 JDK 安装在 `C:\\java9`，那么 `jni.h` 文件将位于 `C:\\java9\\include` 目录下。在 `JDK_HOME\\\
  include` 目录下会创建一个子目录。该子目录的名称取决于平台。在 Windows 上名为 `win32`，在 Linux 上名为 `linux`，等等。在\
  \ Windows 上编译 `hellojni.cpp` 文件时，你需要将以下两个目录作为包含路径选项。请根据你的平台使用列表中第二个路径对应的特定目录：\n\n\
  *   `C:\\java9\\include`\n*   `C:\\java9\\include\\win32`\n\n你可以将 `com_jdojo_jni_HelloJNI.h`\
  \ 文件放在你机器上的任何目录中。在编译 `hellojni.cpp` 文件时，你需要将包含此文件的目录添加到 `include` 路径选项中。\n\n函数签名是从\
  \ `com_jdojo_jni_HelloJNI.h` 头文件中复制过来的。我将两个参数命名为 `env` 和 `obj`。你在代码中为这些参数使用什么名称并不重要。\n\
  \n```\nJNIEXPORT void JNICALL Java_com_jdojo_jni_HelloJNI_hello (JNIEnv *env, jobject\
  \ obj)\n```\n\n你通过添加两条语句来提供原生方法的实现。第一条语句使用 `printf()` 函数在标准输出上打印一条消息 `Hello JNI`，第二条语句从函数返回，如下所示：\n\
  \n```\nprintf(\"Hello JNI\\n\");\nreturn;\n```\n\n### 创建共享库\n\n在本节中，你将把 `hellojni.cpp`\
  \ 文件编译成一个名为 `beginningjava` 的共享库。该共享库在 Windows 上是一个名为 `beginningjava.dll` 的文件，在类\
  \ UNIX 操作系统上是一个名为 `beginningjava.so` 的文件。你的操作系统可能对共享库使用不同的文件扩展名。有许多编译器可用于从 C/C++\
  \ 代码创建共享库。本节将解释如何在以下平台上创建共享库：\n\n*   在 Windows 上，使用名为 `g++` 的 GNU C++ 编译器，也称为 MinGW\
  \ 编译器（Minimalist GNU for Windows）\n*   在 Fedora Linux 上，使用名为 `g++` 的 GNU C++ 编译器\n\
  \n要创建共享库，你可以在命令提示符下使用 C/C++ 编译器，或者使用集成开发环境（IDE），例如 Windows 上的 Microsoft Visual Studio\
  \ 或 Windows 和 Linux 上的 NetBeans。请注意，NetBeans 不自带 C/C++ 编译器。你需要下载一个编译器，例如 MinGW 或\
  \ Cygwin，才能使用 NetBeans IDE 创建共享库。\n\n#### 在 Windows 上创建共享库\n\n以下部分描述了如何在 Windows\
  \ 上安装名为 `g++` 的 MinGW C++ 编译器，以及如何通过命令提示符使用它来创建名为 `beginningjava.dll` 的共享库。\n\n\
  ##### 安装 MinGW C/C++ 编译器\n\n按照以下步骤安装 MinGW 编译器：\n\n1.  32 位和 64 位的 MinGW 编译器分别可在\
  \ [`https://sourceforge.net/projects/mingw/`](https://sourceforge.net/projects/mingw/)\
  \ 和 [`https://sourceforge.net/projects/mingw-w64/`](https://sourceforge.net/projects/mingw-w64/)\
  \ 获取。请根据你的机器安装其中一个编译器。当你安装 64 位编译器时，请确保在初始安装对话框中选择架构为 x86_64。  \n2.  假设你已经将 MinGW\
  \ 安装在 `C:\\MinGW` 目录下。如果你将 MinGW 安装在其他目录，请在本文后续讨论中将此目录路径替换为你的安装目录路径。  \n3.  将 `C:\\\
  MinGW\\bin` 目录添加到系统 `PATH` 环境变量中。如果你没有设置系统 `PATH` 环境变量，你也可以通过在命令提示符下设置 `PATH` 环境变量来使用\
  \ MinGW。  \n4.  确认你的机器上存在 `C:\\MinGW\\bin\\g++.exe` 文件。`g++` 是 MinGW 使用的 C++ 编译器，`gcc`\
  \ 是 C 编译器。本章将使用 C++ 代码和 g++ 编译器来编译 C++ 代码。\n\n\n\n##### 使用 g++ 命令\n\n你需要使用 `g++`\
  \ 命令来创建共享库。创建共享库需要以下几种类型的文件：\n\n*   包含 C++ 代码的 C++ 源文件。在本例中，该文件名为 `hellojin.cpp`，如清单\
  \ 7-5 所示。\n*   清单 7-4 中所示的 `com_jdojo_jni_HelloJNI.h` 头文件。\n*   位于 `JDK_HOME\\include`\
  \ 和 `JDK_HOME\\include\\win32` 目录中的 JNI 相关头文件，其中 `JDK_HOME` 是你安装 JDK 的目录。\n\n你可以向\
  \ `g++` 编译器传递多个选项。以下命令展示了创建共享库所需的最少选项：\n\n```\ng++ -Wl,--kill-at -shared –I -o \
  \ \n```\n\n其中，\n\n*   `-Wl,<option>` 用于向链接器传递选项。`<option>` 是一个以逗号分隔的链接器选项列表。在此命令中，你向链接器传递了\
  \ `--kill-at` 选项，用于在符号导出前去除符号中的 `stdcall` 后缀（`@nn`）。如果你未指定此选项，在运行使用该共享库的 Java 程序时，将会遇到\
  \ `java.lang.UnsatisfiedLinkError` 错误。\n*   `–shared` 选项表示你想要创建一个共享库。\n*   `–I<include-dir>`\
  \ 选项用于指定包含头文件（`.h` 文件）的目录。你可以为每个目录重复使用此选项一次。\n*   `–o <output-file>` 选项指定输出文件名。在本例中，你将使用名为\
  \ `beginningjava.dll` 的输出文件。\n*   `<source-files>` 是一个以空格分隔的 C++ 源文件列表。\n\n为了简化生成共享库的命令语法，我假设你的机器上存在以下目录和文件：\n\
  \n*   `C:\\Java9APIsAndModules\\jni\\src\\hellojni.cpp`\n*   `C:\\Java9APIsAndModules\\\
  jni\\headers\\jdojo.jni\\com_jdojo_jni_HelloJNI.h`\n*   `C:\\java9\\include`\n*\
