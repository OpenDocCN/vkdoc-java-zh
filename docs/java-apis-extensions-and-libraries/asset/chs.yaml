  ## 本书的缘起


  我第一次接触 Java 编程语言是在 1997 年参加的一次为期一周的 Java 培训课程中。直到 1999 年，我才有机会在项目中使用 Java。我读了两本
  Java 书籍，并参加了 Java 2 程序员认证考试。我考得很好，得了 95 分。考试中答错的三道题让我意识到，我读过的那些书并没有充分涵盖所有必要主题的细节。于是我下定决心要写一本关于
  Java 编程语言的书。因此，我制定了一个计划，旨在涵盖 Java 开发者在项目中有效使用 Java 编程语言以及获得认证所需的大部分主题。我最初计划用 700
  到 800 页的篇幅涵盖 Java 中所有基本主题。


  随着写作的深入，我意识到，一本详细涵盖大部分 Java 主题的书不可能在 700 到 800 页内完成。仅涵盖数据类型、运算符和语句的一章就长达 90 页。当时我面临一个问题：“我应该缩短书的内容，还是包含我认为
  Java 开发者需要的所有细节？”我选择了在书中包含所有细节，而不是为了控制页数而缩减内容。我从未打算通过这本书赚很多钱。我也从不急于完成这本书，因为仓促可能会损害质量和覆盖面。简而言之，我写这本书是为了帮助
  Java 社区理解和有效使用 Java 编程语言，而无需阅读多本同类书籍。我写这本书的计划是，为所有想要学习和掌握 Java 编程语言 intricacies
  的人提供一本全面的一站式参考书。


  我的一位高中老师曾告诉我们，如果想了解一栋建筑，就必须先了解构成这栋建筑的砖块、钢筋和砂浆。同样的逻辑也适用于我们生活中想要理解的大多数事物。它当然也适用于理解
  Java 编程语言。如果你想精通 Java 编程语言，你必须从理解其基本构建块开始。我在整本书中都采用了这种方法，努力通过先描述基础知识来构建每个主题。在这本书中，你很少会发现一个主题在没有先了解其背景的情况下被描述。只要可能，我都试图将编程实践与我们日常生活中的活动联系起来。大多数关于
  Java 编程语言的书籍要么根本不包含任何图片，要么只有很少几张。我相信这句格言：“一图胜千言。”对读者来说，一张图片能让一个主题更容易理解和记忆。我在书中加入了大量插图，以帮助读者理解和可视化内容。编程经验很少或没有经验的开发者很难将各个部分组合成一个完整的程序。考虑到这一点，本书包含了超过
  200 个完整的 Java 程序，这些程序已准备好编译和运行。


  我花了无数个小时为写这本书做研究。我的主要研究来源是 Java 语言规范、关于 Java 主题的白皮书和文章，以及 Java 规范请求（JSR）。我还花了不少时间阅读
  Java 源代码，以更深入地了解某些 Java 主题。有时，研究一个主题需要花费几个月的时间，然后我才能写出关于该主题的第一句话。最后，摆弄 Java 程序总是很有趣，有时一玩就是几个小时，只为将它们添加到书中。



  ## 第二版简介


  我很高兴为大家带来《Java API、扩展与库》一书的第二版。这是三卷系列丛书中的第三本。由于无法在一卷中涵盖所有 JDK 9 的变更，我已在三卷（包括本卷）的适当位置加入了
  JDK 9 特有的变更。如果你只对学习 JDK 9 特有的主题感兴趣，我建议你阅读我的《Java 9 揭秘》一书（[`www.apress.com/9781484225912`](http://www.apress.com/9781484225912)），该书仅包含
  JDK 9 特有的主题。本版有若干变更，具体如下。


  我删除了第一版中关于小程序的章节。JDK 9 中的 Applet API 已被弃用，所有现代浏览器要么已经停止，要么即将停止对运行小程序所需的 Java 插件的支持。我认为对于任何新的开发工作，Applet
  API 已经过时。这就是我在本版中删除它的原因。


  我在本版中新增了以下三章：进程 API（第 10 章）、打包模块（第 11 章）和自定义运行时映像（第 11 章）。


  我觉得本书缺少一章关于进程 API 的内容。JDK 9 对进程 API 进行了多项增强。我认为增加一章关于进程 API 的内容对本书来说是一个很好的补充。我新增了第
  10 章来介绍进程 API，包括 JDK 9 中对进程 API 的增强。


  在 JDK 9 之前，Java 应用程序被打包成 JAR 文件。JDK 9 对 JAR 格式进行了多项增强。JDK 9 新增了一种称为多版本 JAR 的 JAR
  类型，它可以为一个库的多个 JDK 版本打包代码。你还可以将模块打包成 JMOD 格式，这种格式可以在编译时和链接时使用。第 11 章涵盖了 JAR 格式的增强以及新的
  JMOD 格式。本章还介绍了如何使用 `jmod` 工具来处理 JMOD 文件。


  JDK 9 在编译时和运行时之间新增了一个阶段，称为链接阶段（或链接时）。你可以使用 JDK 9 中引入的 `jlink` 工具，将应用程序模块和 JDK 模块与其依赖项链接起来，以创建自定义运行时映像。自定义运行时映像将仅包含应用程序所需的那些模块，而不是整个
  Java 运行时模块——从而减小了运行时映像的大小。第 12 章介绍了如何使用 `jlink` 工具创建自定义运行时映像。


  除了这些变更之外，我还更新了第一版中的所有章节。我编辑了内容使其更流畅，更改或添加了新的示例，并更新了内容以包含 JDK 9 特有的功能。


  我衷心希望本书的这一版能帮助你更好地学习 Java。


  ## 本书结构


  这是《Java 入门系列》三卷丛书中的第三本。本书包含 12 章。


  这些章节涵盖了 Java 库和扩展，例如 Swing、JavaFX、Nashorn、Java 原生接口、网络编程、JDBC、jmod 和 jlink 工具等。如果你具备中级
  Java 经验，可以按任意顺序学习各章——但前三章除外，它们应按顺序阅读。Java 9 的新特性已融入各章中。第 11 章和第 12 章专门介绍 JDK 9 特有的功能。


  ## 目标读者


  本书旨在对任何想学习 Java 编程语言的人都有用。如果你是初学者，几乎没有或完全没有 Java 编程背景，建议你在阅读本书之前，先阅读配套书籍《Java 9
  基础入门（第二版）》和《Java 语言特性（第二版）》。本书包含各种复杂程度的主题。作为初学者，如果你在阅读某章某节时感到吃力，可以跳到下一节或下一章，等积累更多经验后再回头阅读。


  如果你是一位具有中级或高级经验的 Java 开发者，可以直接跳到某一章或某一节。如果你阅读本书是为了获得 Java 编程语言的认证，你需要阅读几乎所有章节，并注意所有详细的描述和规则。大多数认证考试测试的是你对语言的基础知识，而非高级知识。你只需阅读那些属于认证考试范围的主题。编译并运行超过
  200 个完整的 Java 程序将有助于你为认证考试做准备。


  如果你是一名正在上 Java 编程语言课程的学生，你应该有选择地阅读本书的章节。你只需阅读课程大纲中涵盖的那些章节。我相信，作为一名 Java 学生，你不需要逐页阅读整本书。


  ## 如何使用本书


  本书是掌握 Java 编程语言知识的起点，而非终点。如果你正在阅读本书，意味着你正朝着学习 Java 编程语言的正确方向前进，这将使你在学术和职业生涯中脱颖而出。然而，总有更高的目标等待你去实现，你必须不断努力才能达成。以下来自一些伟大思想家的名言或许能帮助你理解努力工作和始终保持求知欲的重要性。


  > 我们所拥有的学习和知识，最多也不过是我们所无知的事物中的一小部分。——柏拉图

  > 真正的知识存在于知道自己一无所知。而知道自己一无所知，这让你成为最聪明的人。——苏格拉底


  建议读者在使用本书时，尽可能多地查阅 Java 编程语言的 API 文档。Java API 文档中列出了 Java 类库中所有可用内容的完整列表。你可以从甲骨文公司的官方网站
  [`www.oracle.com`](http://www.oracle.com) 下载（或查看）Java API 文档。在阅读本书时，你需要自己动手编写 Java
  程序进行练习。你也可以通过修改书中提供的程序来练习。如果你只是阅读本书而不通过编写自己的程序来练习，这对你的学习过程帮助不大。请记住“熟能生巧”，这在学习如何用
  Java 编程时也同样适用。


