  \n### 加入多播组\n\n现在是时候使用 `join()` 方法加入多播组了，如下所示。请注意，您必须为组使用一个多播 IP 地址。\n\n```\nString\
  \ MULTICAST_IP = \"239.1.1.1\";\n// 在 interf 接口上加入多播组\nInetAddress group = InetAddress.getByName(MULTICAST_IP);\n\
  MembershipKey key = client.join(group, interf);\n```\n\n`join()` 方法返回一个 `MembershipKey`\
  \ 类的对象，该对象表示数据报通道与多播组的成员关系。如果数据报通道不再有兴趣接收多播数据报，它可以使用 `key` 的 `drop()` 方法从多播组中删除其成员关系。\n\
  \n提示\n\n数据报通道可能决定只从选定的源接收多播数据报。您可以使用 `MembershipKey` 类的 `block(InetAddress source)`\
  \ 方法来阻止来自指定 `source` 地址的多播数据报。其 `unblock(InetAddress source)` 方法允许您解除对先前被阻止的源地址的阻止。\n\
  \n### 接收消息\n\n此时，接收发往多播组的数据报只需在通道上调用 `receive()` 方法，如下所示：\n\n```\n// 准备一个缓冲区来接收来自多播组的消息\n\
  ByteBuffer buffer = ByteBuffer.allocate(1048);\n// 等待从多播组接收消息\nclient.receive(buffer);\n\
  ```\n\n当您完成通道操作后，可以按如下方式从组中删除其成员关系：\n\n```\n// 我们不再有兴趣从该组接收多播消息。\n// 因此，我们需要删除通道在该组中的成员关系\n\
  key.drop();\n```\n\n### 关闭通道\n\n最后，您需要使用其 `close()` 方法关闭通道，如下所示：\n\n```\n// 关闭通道\n\
  client.close();\n```\n\n要向多播组发送消息，您不需要是该多播组的成员。您可以使用 `DatagramChannel` 类的 `send()`\
  \ 方法向多播组发送数据报。\n\n清单 4-21 包含一个类，该类包含三个常量，这些常量将在后续的两个类中用于构建多播应用程序。这些常量包含多播 IP 地址、多播端口号以及将在后续示例中使用的多播网络接口名称。请确保\
  \ `MULTICAST_INTERFACE_NAME` 常量的值 `eth1` 是您机器上支持多播且已启用的网络接口名称。您可以通过运行清单 4-20 中的程序来获取机器上所有网络接口的列表。\n\
  \n```\n// DGCMulticastUtil.java\npackage com.jdojo.net;\npublic class DGCMulticastUtil\
  \ {\npublic static final String MULTICAST_IP = \"239.1.1.1\";\npublic static final\
  \ int MULTICAST_PORT = 8989;\n/* 您需要将以下网络接口名称 \"eth2\" 更改为\n您机器上支持多播且已启用的网络接口名称。\n\
  请运行 ListNetworkInterfaces 类以\n获取您机器上所有可用网络接口的列表。\n*/\npublic static final String\
  \ MULTICAST_INTERFACE_NAME = \"eth2\";\n}\n清单 4-21.\n基于 DatagramChannel 的多播客户端程序\n\
  ```\n\n清单 4-22 包含一个程序，该程序作为成员加入一个多播组。它等待来自多播组的消息到达，打印该消息，然后退出。清单 4-23 包含一个向多播组发送消息的程序。您可以运行\
  \ `DGCMulticastClient` 类的多个实例，然后运行 `DGCMulticastServer` 类。所有客户端实例都应在标准输出上接收并打印相同的消息。\n\
  \n\n\n```\n// DGCMulticastClient.java\npackage com.jdojo.net;\nimport java.io.IOException;\n\
  import java.net.InetAddress;\nimport java.net.InetSocketAddress;\nimport java.net.NetworkInterface;\n\
  import java.net.StandardProtocolFamily;\nimport java.net.StandardSocketOptions;\n\
  import java.nio.ByteBuffer;\nimport java.nio.channels.DatagramChannel;\nimport java.nio.channels.MembershipKey;\n\
  public class DGCMulticastClient {\npublic static void main(String[] args) {\nMembershipKey\
  \ key = null;\n// 创建、配置并绑定客户端数据报通道\ntry (DatagramChannel client = DatagramChannel.open(StandardProtocolFamily.INET))\
  \ {\n// 获取网络接口的引用\nNetworkInterface interf\n= NetworkInterface.getByName(DGCMulticastUtil.MULTICAST_INTERFACE_NAME);\n\
  client.setOption(StandardSocketOptions.SO_REUSEADDR, true);\nclient.bind(new InetSocketAddress(DGCMulticastUtil.MULTICAST_PORT));\n\
  client.setOption(StandardSocketOptions.IP_MULTICAST_IF, interf);\n// 在指定接口上加入多播组\n\
  InetAddress group = InetAddress.getByName(DGCMulticastUtil.MULTICAST_IP);\nkey =\
  \ client.join(group, interf);\n// 向用户打印一些有用的信息\nSystem.out.println(\"已加入多播组:\" +\
  \ key);\nSystem.out.println(\"正在等待来自多播组的消息....\");\n// 准备一个数据缓冲区，用于接收来自多播组的消息\n\
  ByteBuffer buffer = ByteBuffer.allocate(1048);\n// 等待接收来自多播组的消息\nclient.receive(buffer);\n\
  // 将 ByteBuffer 中的消息转换为字符串\nbuffer.flip();\nint limits = buffer.limit();\nbyte bytes[]\
  \ = new byte[limits];\nbuffer.get(bytes, 0, limits);\nString msg = new String(bytes);\n\
  System.out.format(\"多播消息:%s%n\", msg);\n} catch (IOException e) {\ne.printStackTrace();\n\
  } finally {\n// 从多播组中退出\nif (key != null) {\nkey.drop();\n}\n}\n}\n}\n已加入多播组:\n\
  正在等待来自多播组的消息....\n多播消息:Hello from multicast!\n清单 4-22.\n基于 DatagramChannel 的多播客户端程序\n\
  ```\n\n```\n// DGCMulticastServer.java\npackage com.jdojo.net;\nimport java.io.IOException;\n\
  import java.net.InetSocketAddress;\nimport java.net.NetworkInterface;\nimport java.net.StandardSocketOptions;\n\
  import java.nio.ByteBuffer;\nimport java.nio.channels.DatagramChannel;\npublic class\
  \ DGCMulticastServer {\npublic static void main(String[] args) {\n// 获取一个数据报通道对象作为服务器\n\
  try (DatagramChannel server = DatagramChannel.open()) {\n// 将服务器绑定到任意可用的本地地址\nserver.bind(null);\n\
  // 设置用于发送多播数据的网络接口\nNetworkInterface interf\n= NetworkInterface.getByName(DGCMulticastUtil.MULTICAST_INTERFACE_NAME);\n\
  server.setOption(StandardSocketOptions.IP_MULTICAST_IF, interf);\n// 准备一条要发送到多播组的消息\n\
  String msg = \"Hello from multicast!\";\nByteBuffer buffer = ByteBuffer.wrap(msg.getBytes());\n\
  // 获取要发送数据的目标多播组引用\nInetSocketAddress group = new InetSocketAddress(DGCMulticastUtil.MULTICAST_IP,\n\
  DGCMulticastUtil.MULTICAST_PORT);\n// 将消息发送到多播组\nserver.send(buffer, group);\nSystem.out.println(\"\
  已发送多播消息: \" + msg);\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n\
  已发送多播消息: Hello from multicast!\n清单 4-23.\n基于 DatagramChannel 的多播程序，用于向多播组发送消息\n\
  ```\n\n## 延伸阅读\n\nJava 中的网络编程是一个庞大的主题。已有几本专门针对此主题的书籍。本章仅涵盖 Java 中可用的网络编程支持的基础知识。Java\
  \ 还支持使用安全套接字层（SSL）协议的安全套接字通信。用于安全套接字通信编程的类位于 `javax.net.ssl` 包中。本章不涉及 SSL 套接字。我也没有涵盖你可以在\
  \ Java 程序中使用的许多套接字选项。如果你想在 Java 中进行高级网络编程，建议你在完成本章后，阅读一本专门介绍 Java 网络编程的书籍。\n\n\n\
  ## 摘要\n\n网络是由两台或更多计算机或其他类型的电子设备（如打印机）组成的群体，它们连接在一起，目的是共享信息。连接到网络的每个设备都称为节点。连接到网络的计算机称为主机。Java\
  \ 中的网络编程涉及编写 Java 程序，以促进网络上不同计算机上运行的进程之间的信息交换。\n\n两个远程主机之间的通信是通过一个称为互联网参考模型或 TCP/IP\
  \ 分层模型的分层协议套件来执行的。该协议套件由五层组成，分别称为应用层、传输层、互联网层、网络接口层和物理层。用户应用程序（如 Java 程序）使用应用层与远程应用程序通信。传输层协议处理消息从一台计算机上的一个应用程序传输到远程计算机上的另一个应用程序的方式。互联网层从传输层接收消息，并准备一个适合通过互联网发送的数据包。它包含互联网协议（IP）。由\
  \ IP 准备的数据包也称为 IP 数据报，它由一个头部和一个数据区域以及其他信息片段组成。网络接口层准备一个要在网络上传输的数据包。该数据包称为帧。网络接口层位于物理层之上，物理层涉及硬件。物理层由硬件组成。它负责将信息位转换为信号，并通过线路传输信号。\n\
  \nIP 地址唯一标识计算机与路由器之间的连接。互联网协议有两个版本——IPv4（或简称为 IP）和 IPv6，其中 v4 和 v6 代表版本 4 和版本 6。IPv6\
  \ 也称为下一代互联网协议（IPng）。在 Java 程序中，`InetAddress` 类的对象表示一个 IP 地址。`InetAddress` 类有两个子类，`Inet4Address`\
  \ 和 `Inet6Address`，它们分别表示 IPv4 和 IPv6 地址。\n\n端口号是一个 16 位无符号整数，范围从 0 到 65535，用于唯一标识特定协议的一个进程。\n\
  \n`InetSocketAddress` 类的对象表示一个套接字地址，它结合了一个 IP 地址和一个端口号。\n\n`ServerSocket` 类的对象表示一个用于接受来自远程主机连接的\
  \ TCP 服务器套接字。`Socket` 类的对象表示一个服务器/客户端套接字。客户端和服务器应用程序使用 `Socket` 类的对象交换信息。`Socket`\
  \ 类提供了 `getInputStream()` 和 `getOutputStream()` 方法，分别用于获取套接字的输入流和输出流。套接字的输入流用于从套接字读取数据，套接字的输出流用于向套接字写入数据。\n\
  \n`DatagramPacket` 类的对象表示一个 UDP 数据报，它是通过 UDP 套接字进行数据传输的单位。`DatagramSocket` 类的对象表示一个\
  \ UDP 服务器/客户端套接字。\n\n统一资源标识符（URI）是一个标识资源的字符序列。使用位置来标识资源的 URI 称为统一资源定位符（URL）。使用名称来标识资源的\
  \ URI 称为统一资源名称（URN）。URL 和 URN 是 URI 的子集。在 Java 中，`java.net.URI` 类的对象表示一个 URI。在 Java\
  \ 中，`java.net.URL` 类的对象表示一个 URL。Java 提供了用于访问由 URL 标识的内容的类。\n\nJava 使用 `java.nio.channels`\
  \ 包中的 `ServerSocketChannel`、`SocketChannel`、`Selector` 和 `SelectionKey` 类支持非阻塞套接字通道。\n\
  \nJava 还通过 `java.nio.channels` 包中的 `AsynchronousServerSocketChannel` 和 `AsynchronousSocketChannel`\
  \ 类支持异步套接字通道。\n\nJava 通过 `DatagramChannel` 类支持面向数据报的套接字通道。数据报通道也支持 IP 多播。\n\n问题与练习\n\
  \n1.  Java 中的网络编程是什么？  \n2.  网络类型有哪些：LAN、CAN、MAN 和 WAN？  \n3.  什么是网络协议？  \n4.  什么是\
  \ IP 地址？一台计算机可以有多个 IP 地址吗？  \n5.  在 IPv4 和 IPv6 中，分别使用多少字节来表示一个 IP 地址？描述以 IPv4 和\
  \ IPv6 格式表示 IP 地址的文本格式。  \n6.  你有一个 `0.0.0.0` 的 IP 地址，它是 IPv4 格式。你将如何将此 IP 地址重写为\
  \ IPv6 格式？  \n7.  描述以下地址类型的用途：环回 IP 地址、单播 IP 地址、多播 IP 地址、任播 IP 地址、广播 IP 地址和未指定 IP\
  \ 地址。  \n8.  什么是端口号，为什么使用它？  \n9.  什么是套接字？面向连接的套接字和无连接套接字有什么区别？给出一个支持这些类型套接字的协议示例。\
  \  \n10. `InetAddress` 类的实例表示什么？编写一个程序，打印运行该程序的计算机的计算机名称和 IP 地址。  \n11. `InetSocketAddress`\
  \ 类的实例表示什么？  \n12. `ServerSocket` 和 `Socket` 类的实例表示什么？  \n13. `DatagramSocket` 和\
  \ `DatagramPacket` 类的实例表示什么？  \n14. UDP 套接字不像 TCP 套接字那样支持端到端连接。表示 UDP 套接字的 `DatagramSocket`\
  \ 类包含一个 `connect()` 方法。这个 `connect()` 方法的目的是什么？  \n15. `MulticastSocket` 类的实例表示什么？套接字是否必须是多播组的成员才能向多播地址发送数据报包？\
  \  \n16. 什么是 URI、URL 和 URN？如何在 Java 程序中表示它们？\n\n\n\n# 5. JDBC API\n\n在本章中，您将学习：\n\
  \n*   什么是 JDBC API\n*   JDBC 驱动程序的类型\n*   Apache Derby 数据库简介\n*   如何使用 JDBC 驱动程序连接数据库\n\
  *   什么是事务隔离级别\n*   JDBC 数据类型到 Java 数据类型的映射\n*   如何在 Java 程序中执行 SQL 语句并处理结果\n*  \
  \ 如何使用行集、批量更新和大对象（LOB）\n*   如何检索 SQL 警告并启用 JDBC 跟踪\n\n本章中的所有示例程序都是 `jdojo.jdbc`\
  \ 模块的成员，如清单 5-1 所示。\n\n```\n// module-info.java\nmodule jdojo.jdbc {\nrequires java.sql.rowset;\n\
  exports com.jdojo.jdbc;\n}\n清单 5-1.\njdojo.jdbc 模块的声明\n```\n\nJDBC API 相关的 Java\
  \ 类和接口位于 `java.sql` 和 `java.sql.rowset` 模块中。它们中的大多数位于 `java.sql` 模块中。`javax.sql.RowSet`\
  \ 接口位于 `java.sql` 模块中。定义特定类型 `RowSet`（例如 `JdbcRowSet`、`CachedRowSet` 等）的其他接口位于 `java.sql.rowset`\
  \ 模块中。`java.sql.rowset` 模块传递性地读取 `java.sql` 模块。因此，如果您的模块需要使用 `java.sql` 和 `java.sql.rowset`\
  \ 模块中的类型，您的模块只需读取 `java.sql.rowset` 模块即可。在示例中，我使用了两个模块中的类型，因此 `jdojo.jdbc` 模块仅读取\
  \ `java.sql.rowset` 模块。如果您的模块仅使用 `java.sql` 模块中的类型，则您的模块应仅读取 `java.sql` 模块。\n\n\
  从 JDK9 开始，您无需在代码中引用 JDBC 驱动程序类。JDBC 驱动程序作为服务提供者自动加载。要使用 JDBC 驱动程序，您只需在运行时将驱动程序的模块化\
  \ JAR 或 JAR 放置在模块路径上即可。JDK9 中的服务提供者机制将自动为您加载和注册 JDBC 驱动程序。\n\n我在示例中使用 Apache Derby\
  \ 数据库。您需要将 Apache Derby 或您的数据库（例如 Oracle）的 JDBC 驱动程序放置在模块路径上。我使用了 `derby.jar`，它包含\
  \ Apache Derby 数据库的 JDBC 驱动程序，通过将其放置在模块路径上作为自动模块使用。`derby.jar` 文件随本书源代码一起提供，位于 `Java9APIsAndModules\\\
  jdbc_driver` 目录中。\n\n## 什么是 JDBC API？\n\nJDBC API 提供了一个标准的、与数据库无关的接口，用于与任何表格数据源进行交互。大多数情况下，它用于与关系数据库管理系统（RDBMS）进行交互。然而，使用\
  \ JDBC API，也可以与任何表格数据源（例如 Excel 电子表格、平面文件等）进行交互。通常，您使用 JDBC API 来连接数据库、查询数据和更新数据。它还允许您使用与数据库无关的语法在数据库中执行\
  \ SQL 存储过程。\n\n使用数据库的主要目的是管理业务数据。每个数据库都为开发人员提供以下三项内容来管理数据：\n\n*   标准 SQL 语法\n* \
  \  标准 SQL 语法的扩展，称为专有 SQL 语法\n*   专有编程语言\n\n例如，Oracle 数据库使用 PL/SQL 作为编程语言，您可以使用它来编写存储过程、函数和触发器。Microsoft\
  \ SQL Server 使用 Transact-SQL (T-SQL) 作为编程语言来编写存储过程、函数和触发器。如果您想要处理数据库中的一组行，您需要了解使用特定数据库相关语言处理游标的语法和逻辑。使用\
  \ JDBC API 可以减轻您学习不同语法以在不同数据库中处理游标的痛苦。它要求您使用标准 SQL 语法编写查询（`SELECT` 语句）。它提供了 Java\
  \ API，以与数据库无关的方式处理该查询的结果集。\n\n使用 JDBC API 访问数据库中的数据，隐藏了不同类型数据库之间存在的实现差异。它通过使用接口定义其大部分\
  \ API，并让数据库供应商（或任何第三方供应商）提供这些接口的实现来实现数据库透明性。供应商提供的用于与特定数据库交互的实现类集合称为 JDBC 驱动程序。存在针对不同数据库（或同一数据库）的不同类型的\
  \ JDBC 驱动程序。它们的实现方式不同。一些 JDBC 驱动程序是用纯 Java 编写的。对于纯 Java 实现的 JDBC 驱动程序，您只需将供应商提供的类包含在应用程序模块路径或\
  \ `CLASSPATH` 中即可。一些 JDBC 驱动程序需要在客户端机器上安装专有软件才能与数据库交互。下一节将讨论 JDBC 驱动程序类型。\n\n##\
  \ 系统要求\n\n本章全部关于使用 Java 程序与数据库交互。您必须能够访问数据库，例如 Oracle 数据库、Microsoft SQL Server、Sybase\
  \ 数据库、DB2、MySQL、Apache Derby 等。您还需要为您的数据库准备一个 JDBC 驱动程序。一些 JDBC 驱动程序不需要特殊安装。相反，您可以通过将提供的\
  \ JDBC 驱动程序文件（通常是一个 JAR 文件）放置在应用程序的模块路径或 `CLASSPATH` 中来使用它们。如果您无法访问数据库和所需的 JDBC\
  \ 驱动程序，您将无法运行本章列出的示例。所有主要数据库供应商都从其官方网站免费提供 JDBC 驱动程序下载。必要时，本章将提供在少数 DBMS（MySQL、Apache\
  \ Derby、Oracle 数据库、DB2、Microsoft SQL Server 和 Sybase Adaptive Server Anywhere）中创建数据库对象和例程的语法和脚本。如果您使用此处未列出的\
  \ DBMS 来运行本章中的 JDBC 程序，则需要参考您的 DBMS 文档以了解创建数据库对象的语法。\n\n## JDBC 驱动程序的类型\n\n您可以在\
  \ Java 程序中使用三种类型的 JDBC 驱动程序。图 5-1 显示了这些 JDBC 驱动程序的架构。本节将简要描述这些类型的 JDBC 驱动程序。\n\n\
  ![A323071_2_En_5_Fig1_HTML.gif](img/A323071_2_En_5_Fig1_HTML.gif)\n\n图 5-1.\n\n\
  JDBC 驱动程序的架构 注意\n\n在 Java 8 之前，JDBC API 还提供了一种称为 JDBC-ODBC 桥接器的 JDBC 驱动程序。该驱动程序在\
  \ Java 8 中被移除。\n\n### JDBC 本地 API 驱动程序\n\nJDBC 本地 API 驱动程序使用特定于 DBMS 的本地库来执行所有数据库操作。它将\
  \ JDBC 调用转换为特定于 DBMS 的调用，并且 DBMS 本地库与数据库通信。您必须安装特定于 DBMS 的客户端软件才能使用此类型的驱动程序。此类型的驱动程序依赖于平台。\n\
  \n### JDBC-Net 驱动程序\n\nJDBC-Net 驱动程序是用纯 Java 编写的。它需要一个服务器来与数据库一起工作。该驱动程序将 JDBC 调用转换为网络协议，并将调用传递给服务器。服务器将网络调用转换为特定于\
  \ DBMS 的调用。在客户端机器上运行的 JDBC 驱动程序不知道服务器将使用何种技术（或 DBMS 驱动程序类型）来执行数据库活动。服务器可以使用不同类型的数据库驱动程序连接到不同的数据库，这对客户端来说是透明的。它是一个与平台无关的驱动程序。客户端机器只需要包含使用该驱动程序所需的\
  \ Java 类。客户端机器上无需额外安装。\n\n\n\n### JDBC 驱动程序\n\nJDBC 驱动程序也被称为直接连接数据库的纯 Java 驱动程序。它完全由\
  \ Java 语言编写，能够将 JDBC 调用转换为特定于 DBMS 的调用，并直接发送到数据库。这是应用程序中最易于使用的驱动程序类型。你只需将驱动程序 JAR\
  \ 或模块化 JAR 文件与应用程序一同包含即可。所有主流 DBMS 供应商都提供此类 JDBC 驱动程序。\n\n在撰写本文时，我尚未发现任何已转换为 Java\
  \ 9 模块的 JDBC 驱动程序。你可以将 JDBC 驱动程序 JAR 作为自动模块使用，并让你的模块读取该自动模块。你需要将 JDBC JAR 放置在模块路径上。\n\
  \n## Apache Derby 简要概述\n\n你需要访问一个关系型数据库才能运行本章中的示例。如果你没有数据库可用，可以使用 Apache Derby（简称\
  \ Derby），它是一个开源的关系型数据库。后续章节将说明如何下载、安装和使用 Derby。\n\n提示\n\nJDK7 和 JDK8 曾附带一份名为 Java\
  \ DB 的 Derby 数据库副本。Derby 文件被复制到 `JDK_HOME\\db` 目录下。JDK9 已停止附带 Java DB。如果你已安装 JDK9\
  \ 并希望使用 Derby，则需要自行下载并安装 Derby 数据库。\n\nDerby 是一个基于 Java 编程语言和 SQL 的关系型数据库管理系统。在接下来的章节中，我将讨论让你快速上手\
  \ Derby 所需的最基本信息，例如如何启动、停止以及运行 SQL 命令。\n\n### 下载 Derby\n\n你可以从 [`https://db.apache.org/derby/derby_downloads.html`](https://db.apache.org/derby/derby_downloads.html)\
  \ 下载 Derby。请下载 10.14.1.0 或更高版本。有四种类型的发行版可供下载：`bin`、`lib`、`lib-debug` 和 `src`。请下载包含文档的\
  \ `bin` 发行版。下载文件以 ZIP 或 TAR 格式提供。请根据你的操作系统选择文件类型进行下载，例如，Windows 选择 ZIP 文件，类 UNIX\
  \ 操作系统选择 TAR 文件。\n\n### 安装 Derby\n\n安装 Derby 非常简单，只需将下载的文件解压到你选择的目录中即可。我在 Windows\
  \ 上将其解压到了 `C:\\` 目录下。我创建了一个名为 `C:\\apache\\derby` 的目录，用于存放所有 Derby 数据库文件，并在后续讨论中将此目录称为\
  \ `DERBY_HOME`。\n\n### Derby 安装文件\n\nDerby 安装目录主要组织如下：\n\n```\nC:\\apache\\derby\
  \ (DERBY_HOME)\n-bin\n-doc\n-javadoc\n-lib\n```\n\n`bin` 子目录包含许多用于操作 Derby 数据库的命令文件。例如，`startNetworkServer.bat`\
  \ 文件用于在 Windows 上启动网络 Derby 数据库服务器，`startNetworkServer` 用于在 UNIX 上启动网络 Derby 数据库服务器；你可以在\
  \ Windows 上使用 `ij.bat` 命令，在 UNIX 上使用 `ij` 命令来启动 `ij` 工具，这是一个用于操作 Derby 数据库的交互式 SQL\
  \ 命令行工具。\n\n`doc` 目录包含 HTML 和 PDF 格式的数据库文档。例如，你可以使用 `docs\\pdf\\getstart\\getstartderby.pdf`\
  \ 文件来学习 Derby 的基础知识。`javadoc` 目录包含 JDBC 驱动程序和数据库工具类的 Javadoc。\n\n`lib` 子目录包含所有用于操作\
  \ Derby 数据库的 JAR 文件。\n\n### 配置 Derby\n\n通常，你不需要配置 Derby。如果在启动数据库或从命令行运行 SQL 命令时遇到任何错误，你需要设置以下环境变量：\n\
  \n*   将 `DERBY_HOME` 环境变量设置为 Derby 数据库文件复制到的目录。\n*   将 `JAVA_HOME` 环境变量设置为 `JDK_HOME`\
  \ 目录。\n*   将 `JDK_HOME\\bin` 目录包含在 `PATH` 环境变量中。\n\n当你使用 Derby 服务器和客户端应用程序时，需要将一些\
  \ Derby 库包含在模块路径中。所有库都是位于 `DERBY_HOME\\lib` 目录下的 JAR 文件。表 5-1 列出了这些库。\n\n表 5-1.\n\
  \nDerby 服务器和客户端应用程序中使用的库\n\n| 库名称 | 描述 |\n| --- | --- |\n| `derby.jar` | 包含 Derby\
  \ 数据库引擎代码。用于 Derby 以嵌入式模式运行。对于以服务器模式运行的 Derby，服务器端需要此文件。 |\n| `derbytools.jar` |\
  \ 运行所有 Derby 工具（如 `ij` 和 `dblook`）所需。 |\n| `derbyrun.jar` | 用于启动 Derby 工具的可执行 JAR\
  \ 文件。在 `CLASSPATH` 中包含此文件，也会将 `derby.jar`、`derbyclient.jar`、`derbytools.jar`、`derbynet.jar`\
  \ 文件包含在 `CLASSPATH` 中。 |\n| `derbynet.jar` | 包含 Derby 网络服务器代码。启动 Derby 网络服务器所需。\
  \ |\n| `derbyclient.jar` | 包含 Derby 网络客户端 JDBC 驱动程序。Java 应用程序通过网络连接到 Derby 服务器时需要此文件。\
  \ |\n\n### 运行 Derby 服务器\n\nDerby 可以以两种模式运行：\n\n*   嵌入式模式\n*   服务器模式\n\n在嵌入式模式下，Derby\
  \ 在运行 Java 应用程序的同一个 JVM 内为单个用户 Java 应用程序启动。Java 应用程序负责启动和停止 Derby 数据库。这是使用 JDBC\
  \ API 学习数据库编程最合适的模式。你无需进行任何设置即可在此模式下使用 Derby。我将在后面详细说明如何使用此模式。除非另有说明，本章中的所有示例均使用在此模式下运行的\
  \ Derby。\n\n在服务器模式下，Derby 可以通过网络被多个用户同时使用。Derby 在单独的 JVM 中运行。在单独 JVM 中运行的应用程序可以连接到以此模式运行的\
  \ Derby。\n\n你可以使用命令提示符或 NetBeans IDE 进行 Derby 管理。以下部分将对两者进行说明。\n\n\n\n#### 使用命令提示符\n\
  \n使用以下命令以服务器模式启动 Derby：\n\n```\nC:\\apache\\derby\\bin>startNetworkServer\nSat Jan\
  \ 06 13:31:44 CST 2018 : Security manager installed using the Basic server security\
  \ policy.\nSat Jan 06 13:31:44 CST 2018 : Apache Derby Network Server - 10.14.1.0\
  \ - (1808820) started and ready to accept connections on port 1527\n```\n\n启动服务器时，您可能会遇到\
  \ `AccessControlException` 错误。错误信息可能如下所示：\n\n```\njava.security.AccessControlException:\
  \ access denied (\"java.net.SocketPermission\" \"localhost:1527\" \"listen,resolve\"\
  )\n```\n\n要解决 `AccessControlException` 错误，您可以使用 `-noSecurityManager` 选项启动服务器，从而不安装安全管理器，具体如下：\n\
  \n```\nC:\\apache\\derby\\bin>startNetworkServer -noSecurityManager\nSat Jan 06\
  \ 13:32:40 CST 2018 : Apache Derby Network Server - 10.14.1.0 - (1808820) started\
  \ and ready to accept connections on port 1527\n```\n\n您也可以通过授予服务器启动的主机和端口的 `listen`\
  \ 和 `resolve` 权限来解决 `AccessControlException` 错误，具体操作是在 `JRE_HOME\\lib\\security\\\
  java.policy` 文件中进行配置。`java.policy` 文件中的以下条目授予了所需的权限：\n\n```\ngrant {\npermission\
  \ java.net.SocketPermission \"localhost:1527\", \"listen\";\n};\n```\n\n默认情况下，在服务器模式下，Derby\
  \ 在 localhost（或回环 IP 地址）和端口 `1527` 上启动。如果您希望从其他计算机访问 Derby，则需要在命令行或属性文件中配置一些属性。配置\
  \ Derby 属性最简单的方法是在命令行中设置它们。以下命令启动 Derby 服务器，使其监听 `myhost` 的 `1537` 端口：\n\n```\n\
  c:\\apache\\derby\\bin>startNetworkServer -h myhost -p 1537\n```\n\n您也可以使用 `java`\
  \ 命令来启动 Derby 服务器。以下命令启动 Derby 服务器，并额外设置了 `CLASSPATH` 和 `derby.system.home` 属性：\n\
  \n```\nC:\\apache\\derby\\bin>java --class-path C:\\apache\\derby\\lib\\derbynet.jar\n\
  -Dderby.system.home=C:\\Java9APIsAndModules org.apache.derby.drda.NetworkServerControl\n\
  start -h localhost\n```\n\n您可以在一个名为 `derby.properties` 的文本文件中设置 Derby 属性，该文件应位于由\
  \ `derby.system.home` 属性指定的目录中。您可以在启动 Derby 服务器时指定 `derby.system.home` 属性。如果未指定\
  \ `derby.system.home` 属性，则默认为当前工作目录。当您创建新的 Derby 数据库时，该数据库将在 `derby.system.home`\
  \ 目录中指定的目录下创建。如果您想使用数据库名称连接到现有数据库，则该数据库需要作为 `derby.system.home` 内的一个子目录存在。Derby\
  \ 也允许您使用平台相关的完整文件路径来指定要连接的数据库。\n\n如果您已将本书的源代码解压到 `C:\\Java9APIsAndModules` 目录中，则可以将\
  \ `derby.system.home` 设置为 `C:\\Java9APIsAndModules` 目录，本书示例的 Derby 数据库文件将存储在此处。我在源代码的\
  \ `Java9APIsAndModules` 目录中包含了一个名为 `beginningJavaDB` 的 Derby 数据库。如果您选择在不同的目录中使用\
  \ Derby 数据库，只需为 `derby.system.home` 属性指定一个不同的值即可。\n\n将 `derby.drda.host` 属性设置为您希望以服务器模式启动\
  \ Derby 的主机名或 IP 地址。如果将此属性设置为 `0.0.0.0`，Derby 将监听所有网络接口。将 `derby.drda.portNumber`\
  \ 属性设置为监听不同于默认端口 1527 的端口。清单 5-2 显示了设置自定义主机和端口号的 `derby.properties` 文件的内容。\n\n```\n"
- '# Contents of the derby.properties file

  '
- '# Set the IP address 192.168.1.1 as the host

  derby.drda.host=192.168.1.1

  '
- "# Set 1528 as the port number\nderby.drda.portNumber=1528\nListing 5-2.\nThe Contents\
  \ of a Sample derby.properties File\n```\n\n使用以下命令停止以服务器模式运行的 Apache Derby。请注意，您需要使用一个单独的命令提示符来运行此命令。\n\
  \n```\nc:\\apache\\derby\\bin> stopNetworkServer\nSat Jan 06 13:52:28 CST 2018 :\
  \ Apache Derby Network Server - 10.14.1.0 - (1808820) shutdown\n```\n\n提示\n\nDerby\
  \ 数据库服务器可以包含多个数据库。Derby 中的数据库是可移植的。每个数据库的文件都存储在一个单独的目录中。移动 Derby 数据库就像移动该数据库的目录一样简单。该目录的名称与数据库名称相同。默认情况下，所有数据库目录都存储在\
  \ `derby.system.home` 属性指定的目录中。\n\n启动 Derby 服务器后，您可以使用 `ij` 命令行工具连接到它并执行 SQL 命令。`ij`\
  \ 工具位于 `DERBY_HOME\\bin` 目录中。假设 Derby 服务器在 localhost 的 1527 端口上运行，以下命令启动 `ij` 工具，连接到名为\
  \ `beginningJavaDB` 的 Derby 数据库，然后退出 `ij` 工具。数据库的用户 ID 和密码将是 `app` 和 `app`。\n\n\
  ```\nC:\\Java9APIsAndModules>C:\\apache\\derby\\bin\\ij\nij version 10.14\nij> connect\
  \ 'jdbc:derby://localhost:1527/beginningJavaDB;create=true;user=app;password=app;\n\
  ij> exit;\nC:\\Java9APIsAndModules>\n```\n\n您需要指定一个连接 URL 来连接到数据库。URL 中的 `create=true`\
  \ 属性指定，如果名为 `beginningJavaDB` 的数据库尚不存在，Derby 需要创建一个。Derby 会在哪里查找名为 `beginningJavaDB`\
  \ 的数据库？Derby 会在您启动 Derby 服务器时由 `derby.system.home` 属性指定的目录下查找名为 `beginningJavaDB`\
  \ 的子目录。您之前已将 `C:\\Java9APIsAndModules` 指定为 `derby.system.home` 属性。因此，Derby 将查找名为\
  \ `C:\\Java9APIsAndModules\\beginningJavaDB` 的目录，该目录存储了 `beginningJavaDB` 数据库的文件。如果名为\
  \ `beginningJavaDB` 的数据库在 `C:\\Java9APIsAndModules` 中不存在，Derby 将为您创建一个新数据库。如果您未指定\
  \ `derby.system.home` 属性，则当前目录是 `derby.system.home` 属性的默认值。在前面的连接 URL 中，您也可以按如下方式指定数据库的完整路径：\n\
  \n```\nC:\\Java9APIsAndModules> C:\\apache\\derby\\bin\\ij\nij version 10.14\nij>\
  \ connect 'jdbc:derby://localhost:1527/C:/Java9APIsAndModules/db/beginningJavaDB;create=true;user=app;password=app';\n\
  ij> exit;\nC:\\Java9APIsAndModules>\n```\n\n如果您想以嵌入式模式使用 Derby 数据库，则无需启动 Derby 服务器。以下命令设置\
  \ `derby.system.home` 属性并启动 `ij` 工具。请注意，该命令是在一行内输入的。启动 `ij` 工具后，我以嵌入式模式连接到了 `beginningJavaDB`\
  \ 数据库。在运行以下命令之前，请确保停止 Derby 数据库（如果它正在运行）：\n\n```\nC:\\apache\\derby\\bin>java --class-path\
  \ c:\\apache\\derby\\lib\\derbyrun.jar -Dderby.system.home=C:\\Java9APIsAndModules\
  \ org.apache.derby.tools.ij\nij version 10.14\nij> connect 'jdbc:derby:beginningJavaDB';\n\
  ij> exit;\nC:\\apache\\derby\\bin>\n```\n\n您也可以在不设置 `derby.system.home` 属性的情况下，使用\
  \ `ij` 命令以嵌入式模式连接到您的 Derby 数据库。在这种情况下，当前目录将作为 `derby.system.home`。上述命令序列可以按如下方式重新运行。请注意，我将当前目录从\
  \ `C:\\apache\\derby` 更改为了 `C:\\Java9APISAndMoudles`，我的 Derby 数据库就存储在那里。\n\n\n\n\
  ```\nC:\\Java9APIsAndModules>C:\\apache\\derby\\bin\\ij\nij 版本 10.14\nij> connect\
  \ 'jdbc:derby:beginningJavaDB;create=true;user=app;password=app';\nij> exit;\nC:\\\
  Java9APIsAndModules>\n```\n\n现在你已经知道如何创建并连接到 Derby 数据库。如果要在 Derby 数据库中运行任何 SQL 语句，你需要在\
  \ `ij` 工具上执行这些 SQL。\n\n## 创建数据库表\n\n使用 JDBC API 的主要目的是操作数据库中表所包含的数据。你可以使用 SQL 语句\
  \ `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 来操作表中的数据，这些语句会直接引用表名。有时你可能不会在 JDBC 调用中直接引用表名，而是通过\
  \ JDBC API 执行存储过程，由存储过程来使用表名。无论如何，在使用 JDBC 时最终都会用到表。在本章的大部分内容中，你将主要使用一个表，并将其命名为\
  \ `person`。当需要使用 JDBC 处理特定类型的数据库操作时，你可能会沿途创建更多的表。假设你已经在所选数据库中创建了一个名为 `person` 的表。该表的描述如表\
  \ 5-2 所示。\n\n表 5-2.\n\n名为 Person 的数据库表的通用描述\n\n| 列名 | 数据类型 | 长度 | 是否允许空值 | 备注 |\n\
  | --- | --- | --- | --- | --- |\n| `person_id` | `integer` |   | `否` | `主键` |\n\
  | `first_name` | `string` | `20` | `否` |   |\n| `last_name` | `string` | `20` |\
  \ `否` |   |\n| `gender` | `string` | `1` | `否` |   |\n| `dob` | `date` |   | `是`\
  \ |   |\n| `income` | `double` |   | `是` |   |\n\n此表中显示的列数据类型是通用的。你需要使用特定于你的 DBMS\
  \ 的数据类型。例如，对于 `first_name` 列，你可以在 Oracle 数据库中使用 `varchar2(20)` 数据类型，在 SQL Server\
  \ 数据库中使用 `varchar(20)` 数据类型。类似地，对于 `person_id` 列，你可以在 Oracle 数据库中使用 `number(8, 0)`\
  \ 数据类型，在 SQL Server 数据库中使用 `int` 数据类型。\n\n每个 DBMS 都提供一个工具（基于字符、图形或两者兼具），让你能够操作数据库对象，如表、存储过程、函数等。例如，你可以使用\
  \ Oracle 的 Oracle SQL*PLUS 工具、Microsoft 的 SQL Server Management Studio 工具、Sybase\
  \ 的 Adaptive Server Anywhere (ASA) 交互式 SQL 工具等。\n\n以下各节展示了在不同数据库中创建 `person` 表的数据库脚本。你需要查阅数据库文档，了解如何运行脚本来创建\
  \ `person` 表。\n\n注意\n\n所有数据库脚本（例如用于创建表和存储过程的脚本）均位于本书源代码的 `dbscripts\\<DBMS-Name>`\
  \ 目录下，其中 `<DBMS-Name>` 是 DBMS 的名称，例如 Oracle、DB2 等。\n\n### Oracle 数据库\n\n```\ncreate\
  \ table person (\nperson_id number(8,0) not null,\nfirst_name varchar2(20) not null,\n\
  last_name varchar2(20) not null,\ngender char(1) not null,\ndob date,\nincome number(10,2),\n\
  constraint pk_person primary key(person_id)\n);\n```\n\n### Adaptive Server Anywhere\
  \ 数据库\n\n```\ncreate table person (\nperson_id integer not null default null,\n\
  first_name varchar(20) not null default null,\nlast_name varchar(20) not null default\
  \ null,\ngender char(1) not null default null,\ndob date null default null,\nincome\
  \ double null default null,\nprimary key (person_id)\n);\n```\n\n### SQL Server\
  \ 数据库\n\n```\ncreate table person (\nperson_id int NOT NULL,\nfirst_name varchar(20)\
  \ NOT NULL,\nlast_name varchar(20) NOT NULL,\ngender char(1) NOT NULL,\ndob datetime\
  \ NULL,\nincome decimal(10,2) NULL,\nconstraint pk_person primary key (person_id)\n\
  );\n```\n\n### DB2 数据库\n\n```\ncreate table person (\nperson_id integer not null,\n\
  first_name varchar(20) not null,\nlast_name varchar(20) not null,\ngender character\
  \ (1)  not null,\ndob date,\nincome double,\nconstraint pk_person_id primary key\
  \ (person_id)\n);\n```\n\n### MySQL 数据库\n\n```\ncreate table person (\nperson_id\
  \ integer not null primary key,\nfirst_name varchar(20) not null,\nlast_name varchar(20)\
  \ not null,\ngender char(1) not null,\ndob datetime null,\nincome double null\n\
  );\n```\n\n### Apache Derby 数据库\n\n```\ncreate table person (\nperson_id integer\
  \ not null,\nfirst_name varchar(20) not null,\nlast_name varchar(20) not null,\n\
  gender char(1) not null,\ndob date,\nincome double,\nprimary key(person_id)\n);\n\
  ```\n\n你可以运行稍后清单 5-6 中显示的程序，在 Apache Derby 中创建 `person` 表。要在其他数据库中创建 `person` 表，你可能需要修改程序中的\
  \ `CREATE TABLE` 语法。\n\n## 连接数据库\n\n以下是在 Java 程序中连接数据库需要遵循的步骤。\n\n*   获取 JDBC 驱动程序，并在运行\
  \ Java 程序时将其添加到模块路径中。\n*   在 JDK8 或更早版本中，向 `DriverManager` 注册 JDBC 驱动程序。从 JDK9 开始，你无需执行此步骤。如果你将\
  \ JDBC 驱动程序的模块化 JAR 或 JAR 放置在模块路径上，JDK9 中的服务提供者机制将自动为你加载并注册 JDBC 驱动程序。\n*   构造连接\
  \ URL。\n*   使用 `DriverManager` 的 `getConnection()` 静态方法建立连接。\n\n以下各节将详细描述这些步骤。\n\
  \n### 获取 JDBC 驱动程序\n\n在使用 JDBC 连接数据库之前，你需要拥有该数据库的 JDBC 驱动程序。你可以从数据库供应商处获取 JDBC 驱动程序。例如，如果你使用的是\
  \ Oracle DBMS，可以从其官方网站 [`www.oracle.com`](http://www.oracle.com) 下载 JDBC 驱动程序。所有支持\
  \ JDBC 的数据库供应商都会允许你从其官方网站免费下载其 DBMS 的 JDBC 驱动程序。通常，JDBC 驱动程序被打包在一个或多个 JAR/ZIP 文件中。\n\
  \n如果你使用的是 Apache Derby，则在安装 Derby 时，JDBC 驱动程序已复制到你的机器上。使用 Derby 数据库无需下载任何额外的 JDBC\
  \ 驱动程序。Derby 的 JDBC 驱动程序 JAR 文件可以在 `DERBY_HOME\\lib` 目录中找到。有关使用 Derby 需要哪个 JAR 文件的更多详细信息，请参考表\
  \ 5-1。\n\n### 设置模块路径\n\n如果你使用 JDBC 驱动程序，则在运行 Java 程序时，需要将 JDBC 驱动程序的 JAR 文件放置在模块路径中。如果你在代码中使用了供应商特定的\
  \ JDBC 类，则在编译时也需要将 JDBC 驱动程序的 JAR 文件放置在模块路径上。\n\n如果你使用 Derby，请参考表 5-1 了解在你的情况下需要使用的\
  \ JAR 文件。要运行本章中所有以嵌入式模式使用 Derby 的示例，你需要在模块路径中包含 `derby.jar` 文件。`derby.jar` 文件是以嵌入式模式使用\
  \ Derby 所需的 JDBC 驱动程序。如果你通过网络连接到 Derby，则需要在模块路径中包含 `derbyclient.jar` 文件。\n\n\n\n\
  ### 注册 JDBC 驱动程序\n\n此步骤在 JDK8 及更早版本中是必需的。如果你在模块模式下使用 JDK9，则无需执行此步骤。如果你在传统模式下使用 JDK9——即将所有应用程序\
  \ JAR 放在 `CLASSPATH` 上——则需要执行此步骤。\n\n你需要注册要用于连接数据库的 JDBC 驱动程序。JDBC 驱动程序通过 `java.sql.DriverManager`\
  \ 类进行注册。\n\n什么是 JDBC 驱动程序？从技术上讲，JDBC 驱动程序是一个实现了 `java.sql.Driver` 接口的类。DBMS 供应商会提供\
  \ JDBC 驱动程序类以及该驱动程序可能使用的任何其他类。在向 `DriverManager` 注册 JDBC 驱动程序之前，你必须知道该 JDBC 驱动程序类的名称。如果你不知道驱动程序类的名称，请参阅你的\
  \ DBMS 的 JDBC 驱动程序文档。\n\n在下一节中，我将列出一些 DBMS 的驱动程序类名称。该名称可能因 DBMS 版本或驱动程序类供应商而异。有时，不同的供应商会为同一个\
  \ DBMS 提供驱动程序。不同的供应商将使用不同的驱动程序类名称和不同的连接 URL 格式来连接到同一个 DBMS。\n\n为什么需要向 `DriverManager`\
  \ 注册 JDBC 驱动程序？Java 不知道如何连接到数据库。它依赖 JDBC 驱动程序来连接数据库。可以将 JDBC 驱动程序视为一个 Java 类，`DriverManager`\
  \ 将使用该类的对象来连接数据库。问题是，“`DriverManager` 如何知道你想要使用哪个 JDBC 驱动程序来连接数据库？”当然，它本身无法知道 JDBC\
  \ 驱动程序。因此，向 `DriverManager` 注册驱动程序就是告诉 `DriverManager` 你的 JDBC 驱动程序类名称。通过注册 JDBC\
  \ 驱动程序，你是在告诉 `DriverManager`，如果你要求它建立与数据库的连接，它需要尝试使用此驱动程序。你可以向 `DriverManager` 注册多个\
  \ JDBC 驱动程序吗？可以。你可以注册多个 JDBC 驱动程序。当你需要建立与数据库的连接时，必须向 `DriverManager` 传递一个连接 URL。`DriverManager`\
  \ 将连接 URL 逐一传递给所有已注册的驱动程序，并要求它们使用你在连接 URL 中提供的信息连接到数据库。如果某个驱动程序识别出该连接 URL，它就会连接到数据库并将连接返回给\
  \ `DriverManager`。`java.sql.Connection` 接口的实例在 Java 程序中表示一个数据库连接。如果没有已注册的驱动程序识别出连接\
  \ URL，`DriverManager` 将抛出一个 `SQLException`，说明找不到合适的驱动程序。\n\n有三种方法可以向 `DriverManager`\
  \ 注册 JDBC 驱动程序：\n\n*   通过设置 `jdbc.drivers` 系统属性\n*   通过将驱动程序类加载到 JVM 中\n*   通过使用\
  \ `DriverManager` 类的 `registerDriver()` 方法\n\n#### 设置 jdbc.drivers 系统属性\n\n你可以使用\
  \ `jdbc.drivers` 系统属性注册 JDBC 驱动程序类名称。你可以在计算机上全局设置此属性；你可以在运行应用程序时在命令行上传递此属性，或者你可以在应用程序中使用\
  \ `System.setProperty()` 方法设置此属性。每个要注册的驱动程序之间用冒号分隔。以下是一些示例：\n\n```\n// 在 Java 代码中注册\
  \ Sybase 和 Oracle 驱动程序\nString drivers = \"com.sybase.jdbc2.jdbc.SybDriver:oracle.jdbc.driver.OracleDriver\"\
  ;\nSystem.setProperty(\"jdbc.drivers\", drivers);\n// 将要注册的驱动程序名称作为命令行参数传递。\n//\
  \ 以下命令在一行中输入。\njava -Djdbc.drivers=com.sybase.jdbc2.jdbc.SybDriver:oracle.jdbc.driver.OracleDriver\
  \  com.jdojo.jdbc.Test\n```\n\n#### 加载驱动程序类\n\n你可以创建驱动程序类的对象。当驱动程序类被加载到 JVM 中时，它会向\
  \ `DriverManager` 注册自身。要加载一个类，你可以使用 `Class.forName(\"driver class name\")` 方法，或者按如下方式创建该类的对象：\n\
  \n```\n// 注册 Oracle JDBC 驱动程序\nnew oracle.jdbc.driver.OracleDriver();\n// 使用 Class.forName()\
  \ 方法注册 Oracle JDBC 驱动程序。\n// 异常处理已被省略。\nClass.forName(\"oracle.jdbc.driver.OracleDriver\"\
  )\n// 注册 Apache Derby 嵌入式驱动程序\nnew org.apache.derby.jdbc.EmbeddedDriver();\n// 注册\
  \ Apache Derby 网络客户端驱动程序\nnew org.apache.derby.jdbc.ClientDriver();\n```\n\n你不需要保留驱动程序对象的引用，因为目标是将驱动程序类加载到\
  \ JVM 中。当驱动程序类被加载到 JVM 中时，驱动程序类的静态初始化器会被执行，在该初始化器中，驱动程序类会向 `DriverManager` 注册自身。\n\
  \n#### 使用 registerDriver() 方法\n\n你可以使用 JDBC 驱动程序类的对象调用 `DriverManager` 类的 `registerDriver(java.sql.Driver\
  \ driver)` 静态方法来注册 JDBC 驱动程序。\n\n```\n// 向 DriverManager 注册 Oracle JDBC 驱动程序\nDriverManager.registerDriver(new\
  \ oracle.jdbc.driver.OracleDriver());\n// 注册 Apache Derby 嵌入式驱动程序\nDriverManager.registerDriver(new\
  \ org.apache.derby.jdbc.EmbeddedDriver());\n// 注册 Apache Derby 网络客户端驱动程序\nDriverManager.registerDriver(new\
  \ org.apache.derby.jdbc.ClientDriver());\n```\n\n你可以遵循这三种方法之一来注册 JDBC 驱动程序。第一种方法提供了更大的灵活性。它允许你在不更改\
  \ Java 代码的情况下更改 JDBC 驱动程序。你还可以使用系统属性或命令行参数指定连接 URL（将在下一节讨论）。这样，你不仅可以更换 JDBC 驱动程序，还可以在不修改\
  \ Java 代码的情况下更换不同的 DBMS。\n\n\n\n### 构建连接 URL\n\n数据库连接通过连接 URL 建立。连接 URL 的格式取决于数据库管理系统（DBMS）和\
  \ JDBC 驱动程序。连接 URL 由三部分组成，各部分之间用冒号分隔。定义连接 URL 的语法如下：\n\n```\n<协议>:<子协议>:<数据源详情>\n\
  ```\n\n`<协议>` 部分始终设置为 `jdbc`。`<子协议>` 部分由供应商指定。`<数据源详情>` 部分特定于 DBMS，用于定位数据库。在某些情况下，你也可以在\
  \ URL 的最后一部分指定一些连接属性。以下是使用 Oracle 的瘦 JDBC 驱动程序连接到 Oracle DBMS 的连接 URL 示例：\n\n```\n\
  jdbc:oracle:thin:@localhost:1521:chanda\n```\n\n与往常一样，协议部分是 `jdbc`。子协议部分是 `oracle:thin`，它标识供应商为\
  \ Oracle 公司，以及它将使用的驱动程序类型为 `thin`。数据源详情部分是 `@localhost:1521:chanda`。它包含三个子部分。`@localhost`\
  \ 标识服务器名称，此处为 `localhost`。你可以改用 Oracle 数据库服务器的 IP 地址或机器名。接着，它包含 Oracle 传输网络子层（TNS）监听器运行的端口号。最后一部分是\
  \ Oracle 的实例名称，本例中为 `chanda`。以下是另一个连接 URL 示例，用于标识 Derby 服务器中的数据库：\n\n```\njdbc:derby://192.168.1.3:1527/beginningJavaDB;create=true\n\
  ```\n\n与往常一样，协议部分是 `jdbc`。子协议部分是 `derby`，标识 Derby DBMS。`192.168.1.3:1527` 部分是 Derby\
  \ 服务器运行的机器 IP 地址和端口号。数据库名称是 `beginningJavaDB`。最后一部分 `create=true` 是连接属性，表示如果名为 `beginningJavaDB`\
  \ 的数据库不存在，则创建一个以此名称命名的新数据库。\n\n以下各节描述了一些 DBMS 的连接 URL 格式。你需要访问供应商的官方网站下载特定的 JDBC\
  \ 驱动程序。你也可以在供应商的网站上获取有关使用 JDBC 驱动程序的详细信息。\n\n#### Oracle 数据库\n\n```\nDBMS: Oracle\
  \ 10g\n供应商: Oracle 公司\n网站: http://www.oracle.com\n驱动程序类型: JDBC 驱动程序（thin - 纯 Java）\n\
  URL 格式: jdbc:oracle:thin:@<主机>:<端口>:<实例>\nURL 示例: jdbc:oracle:thin:@localhost:1521:chanda\n\
  驱动程序类: oracle.jdbc.driver.OracleDriver\n```\n\n它 100% 用 Java 实现。如果你使用 Oracle 瘦驱动程序，则无需安装任何\
  \ Oracle 特定的配置软件。如果你在 applet 中使用 JDBC 连接到 Oracle 数据库，则应使用此驱动程序：\n\n```\nDBMS: Oracle\
  \ 10g\n供应商: Oracle 公司\n网站: http://www.oracle.com\n驱动程序类型: JDBC 本地驱动程序（OCI - Oracle\
  \ 调用接口）\nURL 格式: jdbc:oracle:oci:@<TNS 别名>\nURL 示例: jdbc:oracle:oci:@orcl\n驱动程序类:\
  \ oracle.jdbc.driver.OracleDriver\n```\n\n你需要安装 Oracle 客户端软件才能使用 OCI 驱动程序。JDBC 驱动程序将标准\
  \ JDBC 调用转换为 OCI 调用，然后发送到数据库。URL 的 `<TNS 别名>` 部分来自 `tnsnames.ora` 文件中的条目。`tnsnames.ora`\
  \ 文件中典型的 TNS 别名条目如下所示：\n\n```\nORCL =\n(DESCRIPTION =\n(ADDRESS = (PROTOCOL = TCP)(HOST\
  \ = HYE6754)(PORT = 1521))\n(CONNECT_DATA =\n(SERVER = DEDICATED)\n(SERVICE_NAME\
  \ = orcl)\n)\n)\n```\n\nOracle JDBC 驱动程序还允许你将 TNS 别名的完整文本指定为 JDBC 连接 URL 的一部分，如下所示：\n\
  \n```\nString dbURL=\"jdbc:oracle:oci:@(DESCRIPTION =\" +\n\"(ADDRESS = (PROTOCOL\
  \ = TCP)(HOST = HYE6754)(PORT = 1521))\" +\n\"(CONNECT_DATA =(SERVER = DEDICATED)(SERVICE_NAME\
  \ = orcl)))\";\n```\n\n#### Adaptive Server Anywhere 数据库\n\n```\nDBMS: Adaptive\
  \ Server Anywhere 9.0\n驱动程序类型: JDBC 驱动程序（纯 Java）\n供应商: Sybase 公司\n网站: http://www.sybase.com\n\
  URL 格式: jdbc:sybase:Tds:<主机>:<端口>\nURL 示例: jdbc:sybase:Tds:localhost:2638\n驱动程序类:\
  \ com.sybase.jdbc2.jdbc.SybDriver\n```\n\n#### SQL Server 数据库\n\n你可以使用以下两个 JDBC\
  \ 驱动程序中的任意一个连接到 SQL Server 数据库：\n\n```\n// 驱动程序 #1\nDBMS: SQL Server\n供应商: 微软公司\n\
  网站: http://www.microsoft.com\n驱动程序类型: JDBC 驱动程序（纯 Java）\nURL 格式: jdbc:SQLserver://<主机>:<端口>;Database=<数据库>\n\
  URL 示例: jdbc:SQLserver://HYE6754:1433;Database=chanda\n驱动程序类: com.microsoft.SQLserver.jdbc.SQLServerDriver\n\
  // 驱动程序 #2\nDBMS: SQL Server\n供应商: SourceForge 公司\n网站: http://www.sourceforge.net\n\
  驱动程序类型: JDBC 驱动程序（纯 Java）\nURL 格式: jdbc:jtds:<服务器类型>://<主机>:<端口>/<数据库>;<属性>\nURL\
  \ 示例: jdbc:jtds:sqlserver://HYE6754:1433/chanda\n驱动程序类: net.sourceforge.jtds.jdbc.Driver\n\
  ```\n\n当你使用驱动程序 #2 时，可以指定 `sqlserver` 或 `sybase` 作为 `<服务器类型>`，以分别连接到 SQL Server\
  \ 或 Sybase DBMS。`<属性>` 是一个以逗号分隔的 `属性=值` 对列表，其中 `属性` 是数据库属性的名称，`值` 是其值。例如，如果你想在 URL\
  \ 中指定用户和密码，可以使用 `<属性>` 为 `user=myuserid;password=mysecretpassword`。\n\nURL 的 `<端口>`、`<数据库>`\
  \ 和 `<属性>` 部分是可选的。如果你不指定它们，将使用它们的默认值。`<端口>` 的默认值对于 SQL Server 是 1433，对于 Sybase 是\
  \ 7100。\n\n#### MySQL 数据库\n\n```\nDBMS: MySQL Server 5.0\n供应商: Oracle 公司\n网站: http://www.oracle.com\n\
  驱动程序类型: JDBC 驱动程序（纯 Java）\nURL 格式: jdbc:mySQL://<主机>:<端口>/<数据库>?<属性>\nURL 示例: jdbc:mySQL://HYE6754:3306/chanda\n\
  驱动程序类: com.mySQL.jdbc.Driver\n```\n\n对于 MySQL 数据库，连接 URL 中的大部分部分是可选的。例如，你可以将 MySQL\
  \ 的最短连接 URL 用作 `jdbc:mySQL://`，所有其他部分将采用其默认值。`<服务器>` 和 `<端口>` 的默认值分别是 `localhost`\
  \ 和 `3306`。你可以提供以逗号分隔的 `<服务器>:<端口>` 值列表，用作故障转移服务器。如果你不提供 `<数据库>` 的值，可以在建立连接后调用 `Connection`\
  \ 对象上的 `setCatalog(\"catalog name\")` 方法，或者在所有查询中提供目录名称。在示例 URL 中，你已将 `chanda` 指定为你的数据库。`<属性>`\
  \ 是一个以 & 符号分隔的 `名称=值` 对列表。例如，你可以通过连接 URL 传递用户 ID 和密码，如下所示。它使用 `app` 作为用户 ID，`app`\
  \ 作为密码。\n\n```\njdbc:mySQL://localhost:3306/chanda?user=app&password=app.\n```\n\
  \n#### DB2 数据库\n\n```\nDBMS: DB2\n供应商: IBM\n网站: http://www.ibm.com\n驱动程序类型: JDBC\
  \ 驱动程序（纯 Java）\nURL 格式: jdbc:db2://<主机>:<端口>/<数据库>:<属性>\nURL 示例: jdbc:db2://localhost:50000/chandaDB\n\
  驱动程序类: com.ibm.db2.jcc.DB2Driver\n```\n\n你可以使用 `jdbc:db2:` 或 `jdbc:db2j:net:` 作为\
  \ URL 的起始部分。如果 URL 以 `jdbc:db2:` 开头，表示连接的是 DB2 UDB 系列中的服务器。如果 URL 以 `jdbc:db2j:net:`\
  \ 开头，表示连接的是远程 IBM^((R)) Cloudscape^((TM)) 服务器。URL 中的 `<属性>` 部分是一个以逗号分隔的 `名称=值` 对列表，用于数据库连接的属性。例如，以下\
  \ URL 分别将 `user` 和 `password` 属性指定为 `admin` 和 `secret`：\n\n```\njdbc:db2://localhost:5021/chandaDB:user=admin;password=secret;\n\
  ```\n\n有关可以在 JDBC 连接 URL 中设置的属性的更多详细信息，请访问 IBM 的官方网站。\n\n\n\n#### Apache Derby 数据库\n\
  \n```\nDBMS: Apache Derby\nWeb Site: http://db.apache.org/derby/\nDriver Type: JDBC\
  \ Driver (Pure Java)\nURL Format: jdbc:derby://<host>:<port>/<database>;\nURL Example:\
  \ jdbc:derby://localhost:1527/beginningJavaDB;create=true\nDriver Class: org.apache.derby.jdbc.ClientDriver\n\
  ```\n\n默认用户名和密码分别为 `app` 和 `app`。指定属性 `create=true` 可在数据库不存在时创建一个空数据库。Apache Derby\
  \ 还有其他类型的 JDBC 驱动程序。当 Apache Derby 作为服务器运行，且你的应用程序作为客户端访问它时，客户端驱动程序允许你连接到它。你也可以在应用程序运行的同一个\
  \ JVM 中启动 Apache Derby，这样你的应用程序和 Apache Derby 将在同一进程中运行。当 Apache Derby 与你的应用程序在同一进程中运行时，你可以使用嵌入式\
  \ JDBC 驱动程序访问数据库。\n\n加载嵌入式 Apache Derby 的 JDBC 驱动程序会启动 Apache Derby 数据库。以下是以嵌入式模式启动\
  \ Apache Derby 并连接到名为 `beginningJavaDB` 的数据库的连接 URL 示例：\n\n```\njdbc:derby:beginningJavaDB\n\
  ```\n\n回想一下，Apache Derby 数据库有一个与数据库名称同名的目录。JDBC 驱动程序如何通过此连接 URL 找到 `beginningJavaDB`\
  \ 目录？它将使用 `derby.system.home` 属性指定的目录。如果未指定该属性，它将使用当前目录。以下 Java 命令通过指定 `derby.system.home`\
  \ 属性来启动 Java 应用程序：\n\n```\njava -Dderby.system.home=C:\\myDatabases com.jdojo.jdbc.MyApp\n\
  ```\n\n如果在 `MyApp` 类中使用数据库名称，则会在 `C:\\myDatabases` 目录中搜索该数据库。\n\n你也可以在连接 URL 中指定数据库目录的完整路径。以下连接\
  \ URL 在 Windows 上指定了数据库的完整路径：\n\n```\njdbc:derby:C:/myDatabases/beginningJavaDB\n\
  ```\n\n在数据库完整路径中，你可以在 Windows 和 UNIX 上使用正斜杠作为路径分隔符。\n\n如果你的数据库目录位于 `CLASSPATH` 中，你可以使用\
  \ `classpath` 子协议构建连接 URL，如下所示：\n\n```\njdbc:derby:classpath:beginningJavaDB\n```\n\
  \n该连接 URL 将在 `CLASSPATH` 中查找 `beginningJavaDB` 目录。如果你的数据库位于 `CLASSPATH` 中某个目录下的\
  \ `test` 目录中，你可以按如下方式构建连接 URL：\n\n```\njdbc:derby:classpath:test/beginningJavaDB\n\
  ```\n\nApache Derby 在指定连接 URL 方面非常灵活。它还允许你从 JAR/ZIP 文件访问只读数据库。以下连接 URL 在 `C:\\myDatabases.jar`\
  \ 文件的 test 目录下查找 `beginningJavaDB` 数据库：\n\n```\njdbc:derby:jar:(C:/myDatabases.jar)test/beginningJavaDB\n\
  ```\n\n### 建立数据库连接\n\n现在是时候连接到数据库了。你需要使用 `DriverManager` 类的 `getConnection()` 静态方法来建立与数据库的连接。它返回一个\
  \ `java.sql.Connection` 接口的实例，该实例代表数据库连接。`getConnection()` 方法接受连接 URL、用户 ID、密码以及使用\
  \ `java.util.Properties` 对象传递的任意数量的名称-值对。`getConnection()` 方法已被重载：\n\n*   `Connection\
  \ getConnection(String url) throws SQLException`\n*   `Connection getConnection(String\
  \ url, Properties info) throws SQLException`\n*   `Connection getConnection(String\
  \ url, String user, String password) throws SQLException`\n\n你会发现，对于使用 JDBC 驱动程序对数据库进行的几乎每个操作，都需要处理\
  \ `java.sql.SQLException` 异常，这很烦人。它是一个受检异常，编译器会强制你通过将代码放在 `try-catch` 块中或使用 `throws`\
  \ 子句来处理它。即使你只编写一行代码，最终也需要使用 `try-catch` 块。你将创建一个包含一些静态方法的工具类，用于处理这些异常的一行代码。每当你需要使用该一行代码的功能时，你将使用工具类方法，而不是直接使用\
  \ JDBC 方法。这种方法将避免本章示例中出现臃肿的代码。\n\n以下代码片段建立了与 Derby 嵌入式模式下运行的名为 `beginningJavaDB`\
  \ 的数据库的连接：\n\n```\n// 注册 JDBC 驱动程序 - 在 JDK9 模块模式下不需要\nDriver derbyEmbeddedDriver\
  \ = new org.apache.derby.jdbc.EmbeddedDriver();\nDriverManager.registerDriver(derbyEmbeddedDriver);\n\
  // 准备连接 URL\nString dbURL = \"jdbc:derby:beginningJavaDB;create=true;user=app;password=app\"\
  ;\nConnection conn = null;\ntry {\nconn = DriverManager.getConnection(dbURL, \"\
  app\", \"app\");\nSystem.out.println(\"成功连接到数据库\");\n// 在此处执行数据库活动...\n} catch(SQLException\
  \ e) {\ne.printStackTrace();\n} finally {\nif (conn != null) {\ntry {\n// 关闭连接\n\
  conn.close();\n} catch (SQLException e) {\ne.printStackTrace();\n}\n}\n}\n```\n\n\
  `Connection` 接口继承自 `java.lang.AutoCloseable` 接口。这意味着你也可以使用 `try-with-resource` 块来获取\
  \ `Connection`，当控制权退出 `try` 块时，该连接将自动关闭。你可以使用 `try-with-resources` 块重写之前的代码片段，如下所示：\n\
  \n```\n// 注册 JDBC 驱动程序 - 在 JDK9 模块模式下不需要\nDriver derbyEmbeddedDriver = new org.apache.derby.jdbc.EmbeddedDriver();\n\
  DriverManager.registerDriver(derbyEmbeddedDriver);\n// 准备连接 URL\nString dbURL =\
  \ \"jdbc:derby:beginningJavaDB;create=true\";\ntry (Connection conn = DriverManager.getConnection(dbURL,\
  \ \"app\", \"app\")) {\nSystem.out.println(\"成功连接到数据库\");\n// 在此处执行数据库活动...\n} catch\
  \ (SQLException e) {\ne.printStackTrace();\n}\n```\n\n如果你需要连接到任何其他数据库，你需要更改两件事：你注册的\
  \ JDBC 驱动程序和连接 URL。驱动程序和连接 URL 都是特定于 DBMS 的。注意代码中使用了 `try-catch-finally` 块。当你完成数据库连接后，需要使用\
  \ `Connection` 对象的 `close()` 方法关闭它。`Connection` 对象的 `close()` 方法会抛出 `SQLException`，这迫使你使用另一个\
  \ `try-catch` 块。在典型的 Java 程序中，你不会在连接到数据库后立即关闭连接。你将使用 `Connection` 对象执行一些数据库活动，然后关闭连接。\n\
  \n\n\n清单 5-3 包含了一个`JDBCUtil`类的代码，你将在本章中使用该类来处理数据库连接。它的所有方法都是静态的，用于建立和关闭数据库连接、关闭`Statement`、关闭`ResultSet`、提交事务、回滚事务等。我将在本章后面讨论`Statement`和`ResultSet`对象。请注意，`JDBCUtil`类使用`app`和`app`作为用户\
  \ ID 和密码来连接嵌入式 Derby 数据库。如果你想使用不同的用户 ID 和密码进行连接，你需要在`getConnection()`方法中修改它们。\n\n\
  ```\n// JDBCUtil.java\npackage com.jdojo.jdbc;\nimport java.sql.Connection;\nimport\
  \ java.sql.DriverManager;\nimport java.sql.ResultSet;\nimport java.sql.SQLException;\n\
  import java.sql.Statement;\npublic class JDBCUtil {\npublic static Connection getConnection()\
  \ throws SQLException {\n// 该 URL 特定于 JDBC 驱动程序和你要连接的数据库\nString dbURL = \"jdbc:derby:beginningJavaDB;create=true\"\
  ;\n// 设置用户 ID 和密码\nString userId = \"app\";\nString password = \"app\";\n// 获取连接\n\
  Connection conn = DriverManager.getConnection(dbURL, userId, password);\n// 关闭自动提交\n\
  conn.setAutoCommit(false);\nreturn conn;\n}\npublic static void closeConnection(Connection\
  \ conn) {\ntry {\nif (conn != null) {\nconn.close();\n}\n} catch (SQLException e)\
  \ {\ne.printStackTrace();\n}\n}\npublic static void closeStatement(Statement stmt)\
  \ {\ntry {\nif (stmt != null) {\nstmt.close();\n}\n} catch (SQLException e) {\n\
  e.printStackTrace();\n}\n}\npublic static void closeResultSet(ResultSet rs) {\n\
  try {\nif (rs != null) {\nrs.close();\n}\n} catch (SQLException e) {\ne.printStackTrace();\n\
  }\n}\npublic static void commit(Connection conn) {\ntry {\nif (conn != null) {\n\
  conn.commit();\n}\n} catch (SQLException e) {\ne.printStackTrace();\n}\n}\npublic\
  \ static void rollback(Connection conn) {\ntry {\nif (conn != null) {\nconn.rollback();\n\
  }\n} catch (SQLException e) {\ne.printStackTrace();\n}\n}\npublic static void main(String[]\
  \ args) {\nConnection conn = null;\ntry {\nconn = JDBCUtil.getConnection();\nSystem.out.println(\"\
  已连接到数据库。\");\n} catch (SQLException e) {\ne.printStackTrace();\n} finally {\nJDBCUtil.closeConnection(conn);\n\
  }\n}\n}\n已连接到数据库。\n清单 5-3.\n一个用于处理数据库的工具类\n```\n\n要连接数据库，你将使用`JDBCUtil.getConnection()`方法。要关闭连接，你将使用`JDBCUtil.closeConnection()`方法。`getConnection()`方法使用了\
  \ Apache Derby 特定的 JDBC 驱动类和连接 URL 格式。你必须修改`getConnection()`方法中的代码，使其与你想要连接的数据库管理系统（DBMS）相匹配。在运行本章其他示例之前，你能够成功运行`JDBCUtil`类并确保能够连接到\
  \ DBMS，这一点非常重要。\n\n初学者最常见的错误之一是没有将 JDBC 驱动的 Java 类（通常是一个 JAR/ZIP 文件）包含在模块路径中。请确保你的\
  \ JDBC 驱动相关的 JAR 文件已包含在模块路径中，并在模块声明中使用`requires`语句声明对 JDBC 驱动模块的依赖，该模块将作为自动模块使用。例如，将`derby.jar`文件包含在模块路径中，以使用\
  \ Apache Derby 嵌入式 JDBC 驱动。以下命令用于运行`JDBCUtil`类。该命令假设你已将本书的源代码解压到`C:\\Java9APIsAndModules`目录，该目录也是你的当前目录。该命令应在一行内输入。为了便于阅读，我将其分多行显示。\n\
  \n```\nC:\\Java9APIsAndModules>java --module-path dist\\jdojo.jdbc.jar;jdbc_driver\\\
  derby.jar\n--module jdojo.jdbc/com.jdojo.jdbc.JDBCUtil\n已连接到数据库。\n```\n\n如果你连接的是\
  \ Derby 以外的数据库，上述命令中`--module-path`选项的值将使用你数据库的 JDBC JAR 文件路径，而不是`derby.jar`文件。\n\
  \n建立数据库连接对初学者来说可能非常令人沮丧。清单 5-4 中的程序打印了在 JDK9 中以模块模式自动加载的所有 JDBC 驱动的详细信息。JDK9 在`DriverManager`类中添加了一个静态的`drivers()`方法，该方法返回当前加载的`Stream<Driver>`。我在运行`PrintJDBCDrivers`类时已将`derby.jar`放在模块路径上。运行时将`derby.jar`\
  \ JAR 作为自动模块使用，你可以在输出中看到`derby`作为派生的模块名称。如果你在输出中没有看到你的 JDBC 驱动，请尝试将驱动的 JAR 放在模块路径上并重新运行此类。\n\
  \n```\n// PrintJDBCDrivers.java\npackage com.jdojo.jdbc;\nimport java.sql.Driver;\n\
  import java.sql.DriverManager;\npublic class PrintJDBCDrivers {\npublic static void\
  \ main(String[] args) {\nSystem.out.println(\"已加载的 JDBC 驱动列表：\");\nDriverManager.drivers()\n\
  .forEach(PrintJDBCDrivers::print);\n}\npublic static void print(Driver driver) {\n\
  String className = driver.getClass().getName();\nString moduleName = driver.getClass().getModule().getName();\n\
  int majorVersion = driver.getMajorVersion();\nint minorVersion = driver.getMinorVersion();\n\
  boolean jdbcCompliant = driver.jdbcCompliant();\nSystem.out.println(\"驱动类名：\" +\
  \ className);\nSystem.out.println(\"驱动模块名：\" + moduleName);\nSystem.out.println(\"\
  驱动主版本号：\" + majorVersion);\nSystem.out.println(\"驱动次版本号：\" + minorVersion);\nSystem.out.println(\"\
  驱动 jdbcCompliant：\" + jdbcCompliant);\nSystem.out.println(\"----------------------------------------\"\
  );\n}\n}\n已加载的 JDBC 驱动列表：\n驱动类名：org.apache.derby.jdbc.AutoloadedDriver\n驱动模块名：derby\n\
  驱动主版本号：10\n驱动次版本号：14\n驱动 jdbcCompliant：true\n\n清单 5-4.\n已加载的 JDBC 驱动的详细信息\n```\n\
  \n## 设置自动提交模式\n\n当你连接数据库时，`Connection`对象的自动提交属性默认设置为`true`。如果连接处于自动提交模式，SQL 语句在成功执行后会自动提交。如果连接不处于自动提交模式，你必须调用`Connection`对象的`commit()`或`rollback()`方法来提交或回滚事务。通常，在\
  \ JDBC 应用程序中，你会禁用连接的自动提交模式，这样应用程序中的逻辑就能控制事务的最终结果。要禁用自动提交模式，你需要在建立连接后调用`Connection`对象的`setAutoCommit(false)`方法。如果连接\
  \ URL 允许你设置自动提交模式，你也可以将其作为连接 URL 的一部分进行指定。在`JDBCUtil.getConnection()`方法中，你在获取`Connection`对象后将连接的自动提交模式设置为`false`。\n\
  \n```\n// 获取连接\nConnection conn = DriverManager.getConnection(dbURL, userId, password);\n\
  // 关闭自动提交\nconn.setAutoCommit(false);\n```\n\n如果你为连接启用了自动提交模式，则不能使用其`commit()`和`rollback()`方法。在已启用自动提交模式的`Connection`对象上调用`commit()`和`rollback()`方法会抛出`SQLException`。JDBC\
  \ 还允许你在事务中使用保存点，以便对事务进行部分回滚。我将在本章后面提供一个使用保存点的示例。\n\n如果在事务中间调用`setAutoCommit()`方法来更改连接的自动提交模式，则事务会在此时被提交。通常，你会在连接到数据库后立即设置连接的自动提交模式。\n\
  \n\n\n## 提交与回滚事务\n\n如果禁用了连接的自动提交模式，可以使用 `commit()` 或 `rollback()` 方法来提交或回滚事务。执行数据库事务的\
  \ JDBC 应用程序中的典型伪代码如下所示：\n\n```\nConnection conn  = 获取连接;\n// 禁用自动提交模式\nconn.setAutoCommit(false);\n\
  // 在此处执行数据库事务活动\nIF 事务成功 THEN\n// 提交事务\nconn.commit();\nELSE\n// 回滚事务\nconn.rollback();\n\
  END IF\nconn.close(); // 关闭连接\n```\n\n错误处理代码未显示。通常，`try-catch` 或 `try-catch-finally`\
  \ 块会替代 `IF` 语句。\n\n## 事务隔离级别\n\n在多用户数据库中，您经常会遇到以下两个术语：\n\n*   数据并发性\n*   数据一致性\n\
  \n数据并发性是指多个用户同时使用相同数据的能力。数据一致性是指当多个用户同时操作数据时所维护的数据准确性。随着数据并发性的增加（即更多用户处理相同数据），必须注意维护所需的数据一致性级别。数据库通过使用锁以及将一个事务与另一个事务隔离来维护数据一致性。一个事务与另一个事务的隔离程度取决于所需的数据一致性级别。让我们来看三种现象，在支持多个并发事务的多用户环境中，数据一致性可能会受到损害。\n\
  \n### 脏读\n\n在脏读中，一个事务读取了另一个事务未提交的数据。考虑以下步骤序列，由于脏读导致数据不一致：\n\n*   事务 A 在表中插入一个新行，但尚未提交。\n\
  *   事务 B 读取了事务 A 插入的未提交行。\n*   事务 A 回滚了更改。\n*   此时，事务 B 中留下了不存在的行的数据。\n\n### 不可重复读\n\
  \n在不可重复读中，当事务重新读取数据时，发现数据已被另一个已提交的事务修改。考虑以下步骤序列，由于不可重复读导致数据不一致：\n\n*   事务 A 读取一行。\n\
  *   事务 B 修改或删除同一行并提交更改。\n*   事务 A 重新读取同一行，发现该行已被修改或删除。\n\n### 幻读\n\n在幻读中，当事务重新执行相同的查询时，发现更多满足查询条件的数据。考虑以下步骤序列，由于幻读导致数据不一致：\n\
  \n*   事务 A 执行一个查询（假设为 Q），发现 X 行匹配该查询。\n*   事务 B 插入一些满足查询 Q 条件的行并提交。\n*   事务 A 重新执行相同的查询（Q），发现\
  \ Y 行（Y > X）匹配该查询。\n\n请注意，不可重复读和幻读之间的区别在于：前者发现行在两次读取之间发生了变化，而后者发现匹配相同查询的行数变多了。\n\
  \nANSI SQL-92 标准根据前面描述的三种数据一致性情况定义了四种事务隔离级别。每种隔离级别定义了允许或不允许哪些类型的数据不一致。四种事务隔离级别如下：\n\
  \n*   读未提交\n*   读已提交\n*   可重复读\n*   可序列化\n\n表 5-3 显示了四种隔离级别和三种允许的情况。由 DBMS 决定如何实现这些隔离级别。DBMS\
  \ 可能提供额外的隔离级别。不同的 DBMS 实现相同隔离级别的方式可能略有不同。请查阅您的 DBMS 文档，以了解您的 DBMS 支持的隔离级别的更多详细信息。\n\
  \n表 5-3.\n\nANSI SQL-92 定义的四种隔离级别\n\n| 隔离级别 | 脏读 | 不可重复读 | 幻读 |\n| --- | --- | ---\
  \ | --- |\n| 读未提交 | 允许 | 允许 | 允许 |\n| 读已提交 | 不允许 | 允许 | 允许 |\n| 可重复读 | 不允许 | 不允许\
  \ | 允许 |\n| 可序列化 | 不允许 | 不允许 | 不允许 |\n\nJava 在 `Connection` 接口中定义了以下四个常量，对应于 ANSI\
  \ SQL-92 标准定义的四种隔离级别：\n\n*   `TRANSACTION_READ_UNCOMMITTED`\n*   `TRANSACTION_READ_COMMITTED`\n\
  *   `TRANSACTION_REPEATABLE_READ`\n*   `TRANSACTION_SERIALIZABLE`\n\n您可以使用 `Connection`\
  \ 接口的 `setTransactionIsolation(int level)` 方法为数据库连接设置事务的隔离级别。\n\n```\n// 获取一个 Connection\
  \ 对象\nConnection conn = 获取一个连接对象...;\n// 将事务隔离级别设置为读已提交\nconn.setTransactionIsolation(Connection.TRANSACTION_READ_COMMITTED);\n\
  ```\n\n您可以使用 `Connection` 接口的 `getTransactionIsolation()` 方法获取该连接当前的事务隔离级别设置。默认事务隔离级别取决于\
  \ JDBC 驱动程序。您还可以使用 `DatabaseMetaData` 接口的以下三个方法来更深入地了解 DBMS 支持的事务隔离级别。方法名称不言自明。\n\
  \n*   `int getDefaultTransactionIsolation() throws SQLException`\n*   `boolean supportsTransactions()\
  \ throws SQLException`\n*   `boolean supportsTransactionIsolationLevel(int level)\
  \ throws SQLException`\n\n`Connection` 接口定义了一个 `TRANSACTION_NONE` 常量，用于指示 JDBC 驱动程序不支持事务，并且它不是符合\
  \ JDBC 规范的驱动程序。此常量不与 `setTransactionIsolation()` 方法一起使用。`getTransactionIsolation()`\
  \ 方法可能返回此常量。您可以随时更改 `Connection` 对象的事务隔离级别。但是，如果在事务正在进行时更改连接的事务隔离级别，其效果取决于 JDBC\
  \ 驱动程序。\n\n\n\n## JDBC 类型到 Java 类型的映射\n\nJDBC API 允许你在 Java 环境中访问和操作数据，而这些数据最终存储在数据库中。数据库使用其自身的数据类型，而\
  \ Java 也使用其自身的数据类型。表 5-4 列出了 JDBC 数据类型与 Java 数据类型之间的映射关系。\n\n表 5-4.\n\nJDBC 与 Java\
  \ 之间的数据类型映射\n\n| JDBC 类型 | Java 类型 |\n| --- | --- |\n| `ARRAY` | `java.sql.Array`\
  \ |\n| `BIGINT` | `long` |\n| `BINARY` | `byte[]` |\n| `BIT` | `boolean` |\n| `BLOB`\
  \ | `java.sql.Blob` |\n| `BOOLEAN` | `boolean` |\n| `CHAR` | `String` |\n| `CLOB`\
  \ | `java.sql.Clob` |\n| `DATALINK` | `java.net.URL` |\n| `DATE` | `java.sql.Date`\
  \ |\n| `DATE` | `java.time.LocalDate` |\n| `DECIMAL` | `java.math.BigDecimal` |\n\
  | `DISTINCT` | `底层类型的映射` |\n| `DOUBLE` | `double` |\n| `FLOAT` | `double` |\n| `INTEGER`\
  \ | `int` |\n| `JAVA_OBJECT` | `底层 Java 类` |\n| `LONGNVARCHAR` | `String` |\n| `LONGVARBINARY`\
  \ | `byte[]` |\n| `LONGVARCHAR` | `String` |\n| `NCHAR` | `String` |\n| `NCLOB`\
  \ | `java.sql.NClob` |\n| `NUMERIC` | `java.math.BigDecimal` |\n| `NVARCHAR` | `String`\
  \ |\n| `NULL` | `NULL` SQL 值 |\n| `REAL` | `float` |\n| `REF` | `java.sql.Ref` |\n\
  | `REF_CURSOR` | `Java.sql.ResultSet` |\n| `ROWID` | `java.sql.RowId` |\n| `SMALLINT`\
  \ | `short` |\n| `SQLXML` | `java.sql.SQLXML` |\n| `STRUCT` | `java.sql.Struct`\
  \ |\n| `TIME` | `java.sql.Time` |\n| `TIME` | `java.time.LocalTime` |\n| `TIME_WITH_TIMEZONE`\
  \ | `java.time.OffsetTime` |\n| `TIMESTAMP` | `java.sql.Timestamp` |\n| `TIMESTAMP_WITH_TIMEZONE`\
  \ | `java.time.OffsetDateTime` |\n| `TINYINT` | `byte` |\n| `VARBINARY` | `byte[]`\
  \ |\n| `VARCHAR` | `String` |\n\nJava 8 新增了名为 `REF_CURSOR`、`TIME_WITH_TIMEZONE`\
  \ 和 `TIMESTAMP_WITH_TIMEZONE` 的 JDBC 类型。在 Java 8 之前，你可以使用 `java.sql` 包中的 `Date`、`Time`\
  \ 和 `Timestamp` 类来处理日期、时间和时间戳 JDBC 类型。在 Java 8 中，与日期和时间相关的 JDBC 类型也已映射到 `java.time`\
  \ 包中新的日期和时间类。例如，你可以使用 `java.sql.Date` 或 `java.time.LocalDate` 对象来表示 `DATE` JDBC\
  \ 类型。如果你对 JDBC `DATE` 类型使用来自 `java.time` 包的日期和时间相关对象，则需要将它们作为对象使用，并使用 `getObject()`\
  \ 和 `setObject()` 等方法来获取和设置它们的值。`java.sql` 包中的 `Date`、`Time` 和 `Timestamp` 类已添加了几个方法，以方便\
  \ SQL 日期/时间与 `java.time` 包中的新日期/时间之间的转换。\n\n表中 `JDBC 类型` 列中列出的所有值都定义为 `Types` 类中的常量。Java\
  \ 8 新增了一个名为 `JDBCType` 的枚举类型，它包含与 `Types` 类中常量同名的常量。`JDBCType` 枚举继承自同样在 Java 8 中添加的\
  \ `SQLType` 接口。当方法的参数中需要数据类型时，在旧方法中你会看到参数类型为 `int`，并且你需要传递 `Type` 类中的一个常量。Java 8\
  \ 已重载了其中一些方法，改为使用 `JDBCType` 枚举。只要可能，请使用 `JDBCType` 枚举中的常量来表示数据类型，以保证类型安全。\n\n如果你必须在\
  \ Java 代码中引用 JDBC 类型，则需要使用 `Types` 类中相应的常量。例如，假设你需要为 `PreparedStatement` 中的参数设置一个\
  \ `null` 值。该参数类型为 `int` 类型。`PreparedStatement` 接口提供了一个 `setNull()` 方法，如下所示：\n\n\
  ```\nvoid setNull(int parameterIndex, int sqlType) throws SQLException\n```\n\n\
  `setNull()` 方法的第二个参数接受 `sqlType`，它是 JDBC 数据类型，由 `java.sql.Types` 类中的常量定义。假设 `PreparedStatement`\
  \ 中该参数的索引为 2。你将按如下所示调用 `setNull()` 方法：\n\n```\nmyPreparedStmt.setNull(2, java.sql.Types.INTEGER);\n\
  ```\n\n该表还告诉你需要使用的 Java 变量类型，以便从数据库读取数据。假设数据库表中的一列被声明为 `varchar(20)`。表 5-4 将 JDBC\
  \ `VARCHAR` 数据类型映射到 Java `String` 类型。这意味着你需要在 Java 程序中使用 `String` 引用类型变量来保存数据库中\
  \ `VARCHAR` 类型的值。假设你正在使用 `ResultSet` 从数据库表中读取 `first_name` 列的值，该列被声明为 `varchar(20)`。你的代码将类似于以下内容：\n\
  \n```\nString firstName = myResultSet.getString(\"first_name\");\n```\n\n本章在获取、设置或更新跨越\
  \ `JDBC-JAVA` 边界的数据时，将全程使用此表中显示的映射。在 JDBC 程序中处理数据时，你将使用三组方法：`getXxx()`、`setXxx()`\
  \ 和 `updateXxx()`，其中 `Xxx` 表示一种数据类型，例如 `int`、`String`、`Date` 等。这些方法存在于本章使用的许多接口中，例如\
  \ `PreparedStatement`、`ResultSet` 等。\n\n`getXxx()` 方法用于将数据从 JDBC 环境读取到 Java 程序。`setXxx()`\
  \ 方法用于在 Java 程序中设置一个值，该值最终将被传递到 JDBC 环境。`updateXxx()` 方法用于更新从 JDBC 环境检索到的数据元素，更新后的值将再次传递到\
  \ JDBC 环境。例如，你使用 `getInt()`、`setInt()` 和 `updateInt()` 来读取、设置和更新数据库中类型为 `INTEGER`\
  \ 的值，该值在 Java 代码中表示为 `int` 数据类型的值。你可以使用 `getObject()`、`setObject()` 和 `updateObject()`\
  \ 方法来处理所有数据类型，前提是提供给这些方法的参数与实际数据类型赋值兼容。只要可能，JDBC API 会在内部执行隐式数据类型转换。例如，如果 JDBC 类型映射到\
  \ Java 中的 short 类型，你可以使用 `getShort()` 方法来读取其值。如果你使用 `getInt()` 方法来读取 short 值，则该\
  \ short 值会被隐式转换为 `int`。另一个例子是使用 `getString()` 方法读取 JDBC `INTEGER` 值。假设你想从结果集中读取一个\
  \ `INTEGER` 类型列 `person_id` 的值。你可以使用以下两个语句中的任何一个。在第二个语句中，JDBC 驱动程序将执行从 `int` 到 `String`\
  \ 的隐式转换。\n\n```\nint personIdInt = myResultSet.getInt(\"person_id\");\nString personIdStr\
  \ = myResultSet.getString(\"person_id\");\n```\n\n\n\n## 了解数据库\n\n不同数据库管理系统（DBMS）对同一数据库功能的支持方式可能不同，甚至完全不支持。有时，JDBC\
  \ 驱动程序可能会对底层 DBMS 支持的功能进行封装。`DatabaseMetaData` 接口的实例能为你提供关于 DBMS 通过 JDBC 驱动程序所支持功能的详细信息。JDBC\
  \ 驱动程序的供应商会提供 `DatabaseMetaData` 接口的实现类。你可以使用 `Connection` 对象的 `getMetaData()` 方法获取\
  \ `DatabaseMetaData` 实例，如下所示：\n\n```\n// 获取一个 Connection 对象\nConnection conn = JDBCUtil.getConnection();\n\
  // 获取一个 DatabaseMetaData 实例\nDatabaseMetaData dbmd = conn.getMetaData();\n```\n\n\
  清单 5-5 包含了完整的代码，用于打印你所连接数据库的一些信息。输出结果显示了关于 Derby 数据库的信息、支持的功能以及 JDBC 驱动程序。你可能会得到不同的输出结果。\n\
  \n```\n// DatabaseMetaDataTest.java\npackage com.jdojo.jdbc;\nimport java.sql.Connection;\n\
  import java.sql.SQLException;\nimport java.sql.DatabaseMetaData;\npublic class DatabaseMetaDataTest\
  \ {\npublic static void main(String[] args) {\nConnection conn = null;\ntry {\n\
  conn = JDBCUtil.getConnection();\n// 获取 DatabaseMetaData 对象\nDatabaseMetaData dbmd\
  \ = conn.getMetaData();\nSystem.out.println(\"关于数据库...\");\nString dbName = dbmd.getDatabaseProductName();\n\
  String dbVersion = dbmd.getDatabaseProductVersion();\nString dbURL = dbmd.getURL();\n\
  System.out.println(\"数据库名称: \" + dbName);\nSystem.out.println(\"数据库版本: \" + dbVersion);\n\
  System.out.println(\"数据库 URL: \" + dbURL);\nSystem.out.printf(\"%n 关于 JDBC 驱动程序...%n\"\
  );\nString driverName = dbmd.getDriverName();\nString driverVersion = dbmd.getDriverVersion();\n\
  System.out.println(\"驱动程序名称: \" + driverName);\nSystem.out.println(\"驱动程序版本: \"\
  \ + driverVersion);\nSystem.out.printf(\"%n 关于 JDBC 驱动程序支持的功能...%n\");\nboolean\
  \ ansi92BiEntry = dbmd.supportsANSI92EntryLevelSQL();\nboolean ansi92Intermediate\
  \ = dbmd.supportsANSI92IntermediateSQL();\nboolean ansi92Full = dbmd.supportsANSI92FullSQL();\n\
  boolean supportsBatchUpdates = dbmd.supportsBatchUpdates();\nSystem.out.println(\"\
  支持入门级 ANSI92 SQL: \" + ansi92BiEntry);\nSystem.out.println(\"支持中级 ANSI92 SQL: \"\
  \ + ansi92Intermediate);\nSystem.out.println(\"支持完全级 ANSI92 SQL: \"  + ansi92Full);\n\
  System.out.println(\"支持批量更新: \" + supportsBatchUpdates);\n} catch (SQLException\
  \ e) {\ne.printStackTrace();\n} finally {\nJDBCUtil.closeConnection(conn);\n}\n\
  }\n}\n关于数据库...\n数据库名称: Apache Derby\n数据库版本: 10.14.1.0 - (1808820)\n数据库 URL: jdbc:derby:db/beginningJavaDB\n\
  关于 JDBC 驱动程序...\n驱动程序名称: Apache Derby Embedded JDBC Driver\n驱动程序版本: 10.14.1.0 -\
  \ (1808820)\n关于 JDBC 驱动程序支持的功能...\n支持入门级 ANSI92 SQL: true\n支持中级 ANSI92 SQL: false\n\
  支持完全级 ANSI92 SQL: false\n支持批量更新: true\n清单 5-5.\n使用 DatabaseMetaData 对象了解 DBMS\n\
  ```\n\n`DatabaseMetaData` 接口有许多方法用于获取数据库信息。更多详细信息请参考该接口的 API 文档。通常，工具会使用此接口向用户展示\
  \ DBMS 支持的功能。如果你正在开发一个可能使用不同 DBMS 和 JDBC 驱动程序的 JDBC 项目，你将需要使用 `DatabaseMetaData`\
  \ 实例，以便在运行时告知用户你的应用程序基于他们使用的 JDBC 驱动程序和 DBMS 所支持的功能。\n\n## 执行 SQL 语句\n\n你可以使用 JDBC\
  \ 驱动程序执行不同类型的 SQL 语句。根据 SQL 语句在 DBMS 中执行的工作类型，可以将其分类如下：\n\n*   **数据定义语言（DDL）语句**：DDL\
  \ 语句的示例包括 `CREATE TABLE`、`ALTER TABLE` 等。\n*   **数据操作语言（DML）语句**：DML 语句的示例包括 `SELECT`、`INSERT`、`UPDATE`、`DELETE`\
  \ 等。\n*   **数据控制语言（DCL）语句**：DCL 语句的示例包括 `GRANT` 和 `REVOKE`。\n*   **事务控制语言（TCL）语句**：TCL\
  \ 语句的示例包括 `COMMIT`、`ROLLBACK`、`SAVEPOINT` 等。\n\n你可以使用不同类型的 JDBC 语句对象来执行 DDL、DML\
  \ 和 DCL 语句。`Statement` 接口的实例在 Java 程序中代表一条 SQL 语句。你可以使用 `Connection` 对象的方法来执行 TCL\
  \ 语句。Java 使用三种不同的接口来表示不同格式的 SQL 语句：\n\n*   `Statement`\n*   `PreparedStatement`\n\
  *   `CallableStatement`\n\n`PreparedStatement` 接口继承自 `Statement` 接口，`CallableStatement`\
  \ 接口继承自 `PreparedStatement` 接口。你完全无需担心这些接口的实现细节。JDBC 驱动程序的供应商会提供这些接口的实现类。你只需要知道在\
  \ `Connection` 对象上调用哪个方法来获取特定类型的 `Statement` 对象即可。\n\n如果你有一个字符串形式的 SQL 语句，可以使用 `Statement`\
  \ 对象来执行它。该 SQL 语句可能返回结果集，也可能不返回。通常，`SELECT` 语句会返回一个包含零条或多条记录的结果集。字符串格式的 SQL 语句每次执行时都会被编译。\n\
  \n如果你希望预编译一条 SQL 语句一次并多次执行，可以使用 `PreparedStatement`。它允许你指定一个使用占位符的字符串形式的 SQL 语句。在执行语句之前，你需要提供占位符的值。使用\
  \ `PreparedStatement` 优于使用 `Statement`，原因有以下三点：\n\n*   字符串形式的 SQL 语句可能容易受到使用 SQL\
  \ 注入技术的黑客攻击。考虑一个简单的 SQL 注入示例，如下面的 `getSQL()` 方法代码所示：\n\n```\n    public String getSQL(String\
  \ personID) {\n    String SQL = \"select * from person where person_id = \" + personId;\n\
  \    return SQL;\n    }\n    ```\n\n该方法接受一个 `personId` 并返回一个 `SELECT` 语句。如果此方法被调用为\
  \ `getSQL(\"101\")`，则没有任何问题。你将得到如下所示的 SQL 语句：\n\n```\n    select * from person where\
  \ person_id = 101\n    ```\n\n假设 `person_id` 是 `person` 表的主键，此查询最多从数据库返回一条记录。然而，如果此方法被调用为\
  \ `getSQL(\"101 or 1 = 1\")`，它将返回如下 `SELECT` 语句：\n\n```\n    select * from person\
  \ where person_id = 101 or 1 = 1\n    ```\n\n在生产数据库中执行此语句是危险的。它会将 `person` 表中的所有记录返回给客户端，这可能带来安全风险。它还可能导致数据库服务器和/或应用服务器性能下降，从而可能导致其他用户的服务被拒绝。`PreparedStatement`\
  \ 使用占位符以字符串格式构建 SQL。上述 `SELECT` 语句将编写如下：\n\n```\n    String pSQL = \"select * from\
  \ person where person_id = ?\";\n    ```\n\n\n\n请注意语句中问号的使用。问号被用作占位符，其值稍后通过`PreparedStatement`的方法提供。使用`PreparedStatement`可以消除\
  \ SQL 注入的威胁。\n*   `PreparedStatement`通过一次编译语句并多次执行，提高了 JDBC 应用程序的性能。\n*   `PreparedStatement`允许你使用\
  \ Java 数据类型在 SQL 语句中提供值，而不是使用字符串。例如，假设你想编写一个查询，获取出生日期晚于 1970 年 1 月 1 日的人员记录。你可以编写如下查询：\n\
  \n```\n    select * from person where dob > '1970-01-01'\n    ```\n\n然而，此查询并非在所有数据库中都能正确执行。它假设日期字面量可以按`yyyy-mm-dd`格式指定。不同的数据库对日期字符串字面量使用不同的格式。如果你使用`PreparedStatement`，可以按如下方式重写此查询：\n\
  \n```\n    select * from person where dob > ?\n    ```\n\n你可以使用`java.sql.Date`对象为`dob`条件指定值，JDBC\
  \ 驱动程序将负责将其转换为数据库管理系统特定的日期数据类型值。\n\n你可以使用`CallableStatement`对象来执行数据库中的存储过程或函数。存储过程可能会返回结果集。\n\
  \n接下来，我们将在后续章节中逐一介绍这三种类型的`Statement`对象。\n\n### 执行 SQL 语句的结果\n\n当你执行 SQL 语句时，数据库管理系统可能返回零个或多个结果。结果可能包括更新计数（即数据库中受影响的记录数）或结果集（一组记录）。\n\
  \n当你执行`SELECT`语句时，它会返回一个结果集。当你执行`UPDATE`或`DELETE`语句时，它会返回一个更新计数，即该 SQL 语句在数据库中影响的记录数。\n\
  \n当你执行存储过程时，它可能返回多个更新计数以及多个结果集。当 SQL 执行可能返回更新计数和结果集的混合结果时，处理结果就变得比较棘手。JDBC 驱动程序允许你按照结果从数据库返回的顺序获取它们。有关如何处理多个结果集和更新计数的完整讨论和示例，请参阅本章后面的“处理来自语句的多个结果”部分。\n\
  \n### 使用 Statement 接口\n\n你可以使用`Statement`来执行任何类型的 SQL 语句，前提是该 SQL 语句受 JDBC 驱动程序和数据库管理系统支持。通常，你使用其三个方法之一：`execute()`、`executeUpdate()`和`executeQuery()`来执行\
  \ SQL 语句。这些方法已被重载。以下是它们接受 SQL 字符串作为参数的版本列表：\n\n*   `boolean execute(String SQL)\
  \ throws SQLException`\n*   `int executeUpdate(String SQL) throws SQLException`\n\
  *   `ResultSet executeQuery(String SQL) throws SQLException`\n\n在我讨论在代码中应该使用`Statement`对象的这三个方法中的哪一个之前，以下是使用`Statement`对象执行\
  \ SQL 语句的步骤：\n\n*   获取一个`Connection`对象。\n\n```\n    Connection conn = JDBCUtil.getConnection();\n\
  \    ```\n\n*   使用`Connection`对象的`createStatement()`方法创建一个`Statement`对象。\n\n```\n\
  \    Statement stmt = conn.createStatement();\n    ```\n\n*   通过调用`Statement`对象的三个方法之一来执行一条或多条\
  \ SQL 语句。\n\n```\n    // 将每个人的收入增加 10%\n    String sql = \"update person set income\
  \ = income * 1.1\";\n    int rowsUpdated = stmt.executeUpdate(sql);\n    // 使用 stmt\
  \ 执行其他 SQL 语句\n    ```\n\n*   关闭`Statement`对象以释放资源。\n\n```\n    stmt.close();\n\
  \    ```\n\n*   提交事务。\n\n```\n    conn.commit();\n    ```\n\n`Statement`接口中的`execute()`方法是一个通用方法，可用于执行任何类型的\
  \ SQL 语句。通常，它用于执行不返回结果集的 SQL 语句，例如`CREATE TABLE`这样的 DDL 语句。`execute()`方法的返回值指示返回结果集的状态。如果第一个结果是`ResultSet`对象，则返回`true`。如果第一个结果是更新计数，或者数据库管理系统没有返回任何结果，则返回`false`。\n\
  \n`executeUpdate()`方法用于执行更新数据库中数据的 SQL 语句，例如`INSERT`、`UPDATE`和`DELETE`语句。它返回语句执行后在数据库中影响的行数。你也可以使用此方法执行其他类型的\
  \ SQL 语句，例如不返回任何内容的`CREATE TABLE`语句。当 SQL 语句不返回任何内容时，该方法返回零。你不应使用此方法执行`SELECT`语句。\n\
  \n提示\n\nJava 8 新增了`executeLargeUpdate()`方法，其工作方式与`executeUpdate()`方法相同，只是它返回`long`而不是`int`。当你预计更新计数会超过`Integer.MAX_VALUE`时，请使用此方法。\n\
  \n`executeQuery()`方法专为执行仅生成一个结果集的 SQL 语句而设计。它最适合执行`SELECT`语句。虽然你可以使用`Statement`接口的此方法执行产生结果集的存储过程，但你应该改用专门设计的`CallableStatement`接口的`execute()`方法来执行存储过程。\n\
  \n`Statement`对象执行存储在字符串中的 SQL 语句。数据库有自己的数据类型。如何以字符串格式传递所有内容？有时你可能需要在 SQL 语句中使用一些无法以字符串格式表示的对象，例如二进制大对象。你可以使用`PreparedStatement`来更好地控制准备\
  \ SQL 语句，这些语句无法以字符串格式表示。\n\n最常见的是，你会在以字符串格式表示日期、时间和时间戳值时遇到问题。假设你想将所有出生日期大于 1970\
  \ 年 1 月 25 日的人员的收入增加 20%。你的`update`语句可能如下所示：\n\n```\nString sql = \"update person\
  \ \" +\n\"set income = income * 1.2 \" +\n\"where dob > '1970-01-25'\";\n```\n\n\
  \n\n并非所有数据库管理系统（DBMS）都能将 `'1970-01-25'` 识别为日期。JDBC 为日期、时间和时间戳数据类型定义了转义序列。其形式如下：\n\
  \n```\n{ ''}\n```\n\n表 5-5 列出了你需要在 SQL 字符串中使用的日期、时间和时间戳转义序列的格式及示例。\n\n表 5-5.\n\n\
  日期、时间和时间戳数据类型的 JDBC 转义序列\n\n| 数据类型 | <type> | <value> 格式 | 示例 |\n| --- | --- | ---\
  \ | --- |\n| `Date` | `d` | `yyyy-mm-dd` | `{d '1970-01-25'}` |\n| `Time` | `t`\
  \ | `hh:mm:ss` | `{t '01:09:50'}` |\n| `Timestamp` | `ts` | `yyyy-mm-dd hh:mm:ss.f...`\
  \ | `{ts '1970-01-25 01:09:50'}` |\n| 时间戳格式中的 (`.f...`) 部分表示秒的小数部分，这是可选的。`yyyy`\
  \ – 四位数的年份 `mm` - 两位数的月份 `dd` – 两位数的日期 `hh` – 小时 `mm` – 分钟 `ss` – 秒 `f` – 秒的小数部分\
  \ |\n\nJDBC 驱动程序会将 SQL 语句中的转义序列转换为数据库所需的正确格式。你可以使用日期转义序列重写之前的 `update` 语句，如下所示：\n\
  \n```\nString sql = \"update person \" +\n\"set income = income * 1.2 \" +\n\"where\
  \ dob > {d '1970-01-25'}\";\n```\n\n本章中的大多数示例都使用了数据库中的 `person` 表。假设你已经在所使用的数据库中创建了\
  \ `person` 表。`person` 表的通用定义如表 5-2 所示。如果你尚未创建该表，可以运行清单 5-6 中的程序。该程序使用了适用于 Derby\
  \ 数据库的 `CREATE TABLE` 语法。如果你使用的不是 Derby 数据库，请在运行程序前修改语法。当 `person` 表成功创建时，程序会打印以下消息：\n\
  \n```\nPerson table created.\n```\n\n如果 `person` 表已存在，对于 Apache Derby，程序会打印以下错误消息：\n\
  \n```\nTable/View 'PERSON' already exists in Schema 'APP'.\n```\n\n对于非 Derby 的 DBMS，错误消息可能有所不同，但含义相同，即\
  \ `person` 表已存在于数据库中。\n\n```\n// CreatePersonTable.java\npackage com.jdojo.jdbc;\n\
  import java.sql.Connection;\nimport java.sql.SQLException;\nimport java.sql.Statement;\n\
  public class CreatePersonTable {\npublic static void main(String[] args) {\nConnection\
  \ conn = null;\ntry {\nconn = JDBCUtil.getConnection();\n// 创建 SQL 字符串\nString SQL\
  \ = \"create table person ( \"\n+ \"person_id integer not null, \"\n+ \"first_name\
  \ varchar(20) not null, \"\n+ \"last_name varchar(20) not null, \"\n+ \"gender char(1)\
  \ not null, \"\n+ \"dob date, \"\n+ \"income double,\"\n+ \"primary key(person_id))\"\
  ;\nStatement stmt = null;\ntry {\nstmt = conn.createStatement();\nstmt.executeUpdate(SQL);\n\
  } finally {\nJDBCUtil.closeStatement(stmt);\n}\n// 提交事务\nJDBCUtil.commit(conn);\n\
  System.out.println(\"Person table created.\");\n} catch (SQLException e) {\nSystem.out.println(e.getMessage());\n\
  JDBCUtil.rollback(conn);\n} finally {\nJDBCUtil.closeConnection(conn);\n}\n}\n}\n\
  清单 5-6.\n在数据库中创建 Person 表\n```\n\n清单 5-7 包含了在 `person` 表中插入三条记录的完整代码。请注意，它使用了 `JDBCUtil`\
