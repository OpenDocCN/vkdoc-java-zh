  JMenu helpMenu = getHelpMenu();\n// 将“文件”和“帮助”菜单添加到菜单栏\nmenuBar.add(fileMenu);\n\
  menuBar.add(helpMenu);\nreturn menuBar;\n}\nprivate JMenu getFileMenu() {\nJMenu\
  \ fileMenu = new JMenu(\"文件\");\n// 设置 Alt-F 作为“文件”菜单的助记符\nfileMenu.setMnemonic(KeyEvent.VK_F);\n\
  // 准备一个“新建”菜单项。它将包含子菜单\nJMenu newMenu = getNewMenu();\nfileMenu.add(newMenu);\n\
  JMenuItem openMenuItem = new JMenuItem(\"打开\", KeyEvent.VK_O);\nJMenuItem exitMenuItem\
  \ = new JMenuItem(\"退出\", KeyEvent.VK_E);\nfileMenu.add(openMenuItem);\n// 你可以添加一个\
  \ JSeparator，或者直接调用 fileMenu 上的便捷方法 addSeparator()\n// 你可以用下面的语句替换：fileMenu.add(new\
  \ JSeparator());\nfileMenu.addSeparator();\nfileMenu.add(exitMenuItem);\n// 为“退出”菜单项添加动作监听器\n\
  exitMenuItem.addActionListener(e -> System.exit(0));\nreturn fileMenu;\n}\nprivate\
  \ JMenu getNewMenu() {\n// “新建”菜单将包含两个子菜单 - “保单”和“索赔”\nJMenu newMenu = new JMenu(\"\
  新建\");\n// 向“新建”菜单添加子菜单\nJMenuItem policyMenuItem = new JMenuItem(\"保单\", KeyEvent.VK_P);\n\
  JMenuItem claimMenuItem = new JMenuItem(\"索赔\", KeyEvent.VK_C);\nnewMenu.add(policyMenuItem);\n\
  newMenu.add(claimMenuItem);\nreturn newMenu;\n}\nprivate JMenu getHelpMenu() {\n\
  JMenu helpMenu = new JMenu(\"帮助\");\nhelpMenu.setMnemonic(KeyEvent.VK_H);\nJMenuItem\
  \ indexMenuItem = new JMenuItem(\"索引\", KeyEvent.VK_I);\nJMenuItem aboutMenuItem\
  \ = new JMenuItem(\"关于\", KeyEvent.VK_A);\n// 设置 F1 作为“索引”菜单项的加速键\nKeyStroke f1Key\
  \ = KeyStroke.getKeyStroke(KeyEvent.VK_F1, 0);\nindexMenuItem.setAccelerator(f1Key);\n\
  helpMenu.add(indexMenuItem);\nhelpMenu.addSeparator();\nhelpMenu.add(aboutMenuItem);\n\
  // 为“索引”菜单项添加动作监听器\nindexMenuItem.addActionListener(e ->\nmsgText.append(\"你已选择\
  \ 帮助 >> 索引 菜单项。\\n\"));\nreturn helpMenu;\n}\nprivate void createPopupMenu() {\n\
  // 创建一个弹出菜单，并为框架添加鼠标监听器，\n// 以便当用户单击鼠标右键时显示弹出菜单\nJMenuItem popup1 = new JMenuItem(\"\
  弹出项 1\");\nJMenuItem popup2 = new JMenuItem(\"弹出项 2\");\nJMenuItem popup3 = new\
  \ JMenuItem(\"弹出项 3\");\n// 创建一个动作监听器\nActionListener al =  e -> {\nJMenuItem menuItem\
