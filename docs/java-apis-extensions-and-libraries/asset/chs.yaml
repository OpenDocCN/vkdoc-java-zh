  \ 语句\n```\n\n### 使用 PreparedStatement 接口\n\n`PreparedStatement` 接口继承自 `Statement`\
  \ 接口。在执行 SQL 语句时，`PreparedStatement` 比 `Statement` 更受推荐。前者会预编译 SQL 语句（前提是 DBMS 支持\
  \ SQL 语句预编译）。如果同一语句被执行多次，它会重用预编译后的 SQL 语句。它允许你准备一条 SQL 语句（以字符串形式），并使用占位符来表示输入参数。\n\
  \nSQL 字符串中的问号是输入参数的占位符，其值将在语句执行前提供。假设你想使用 `PreparedStatement` 在 `person` 表中插入一条记录。你的\
  \ SQL 字符串格式如下：\n\n```\nString sql = \"insert into person \" +\n\"(person_id, first_name,\
  \ last_name, gender, dob, income) \" +\n\"values \" +\n\"(?, ?, ?, ?, ?, ?)\";\n\
  ```\n\n在这个例子中，六个问号各自是一个值的占位符。第一个问号是 `person_id` 的占位符，第二个是 `first_name` 的占位符，以此类推。每个占位符都有一个索引。SQL\
  \ 字符串中的第一个占位符索引为 1，第二个占位符索引为 2，依此类推。请注意，占位符的索引从 1 开始，而不是 0。\n\n你可以使用 `Connection`\
  \ 对象的 `prepareStatement()` 方法来创建 `PreparedStatement`。`prepareStatement()` 方法已被重载。其最简单的形式是接受一个\
  \ SQL 字符串，如下所示：\n\n```\nString sql = \"你的 SQL 语句写在这里\";\nConnection conn = JDBCUtil.getConnection();\n\
  // 为 sql 获取一个 PreparedStatement\nPreparedStatement pstmt = conn.prepareStatement(sql);\n\
  ```\n\n下一步是使用 `PreparedStatement` 接口的 `setXxx()` 方法逐个为占位符提供值，其中 `Xxx` 是占位符的数据类型。`setXxx()`\
  \ 方法接受两个参数：第一个是占位符的索引，第二个是占位符的值。`setXxx()` 方法的第二个参数必须与 `Xxx`（即占位符的数据类型）兼容。如果你想为\
  \ `INSERT` 语句的六个占位符设置值，以便在 `person` 表中插入一条记录，可以按如下方式操作：\n\n```\npstmt.setInt(1,\
  \ 301);        // person_id\npstmt.setString(2, \"Tom\");   // 名字\npstmt.setString(3,\
  \ \"Baker\"); // 姓氏\npstmt.setString(4, \"M\");     // 性别\n/* 将 dob 设置为 1970 年 1\
  \ 月 25 日。这次，你对数据类型有更多的控制权。\n你需要使用 java.sql.Date 数据类型来设置 dob。\n你可以使用 valueOf() 静态方法从字符串格式的日期获取\
  \ java.sql.Date 对象\n*/\njava.sql.Date dob = java.sql.Date.valueOf(\"1970-01-25\"\
  );\npstmt.setDate(5, dob);     // dob\npstmt.setDouble(6, 45900); // income\n```\n\
  \n现在是时候将带有占位符值的 SQL 语句发送到数据库了。你可以使用 `PreparedStatement` 的 `execute()`、`executeUpdate()`\
  \ 和 `executeQuery()` 方法之一来执行其中的 SQL 语句。这些方法不接受任何参数。回想一下，`Statement` 接口有相同的方法，但它们接受\
  \ SQL 字符串作为参数。`PreparedStatement` 接口添加了三个同名但不接受参数的方法，因为它在创建时就已经获取了 SQL 字符串。\n\n\
  ```\n// 执行 pstmt 中的 INSERT 语句\npstmt.executeUpdate();\n```\n\n\n\n如何重用 `PreparedStatement`？只需重新填充占位符的值，并再次调用其\
  \ `execute()` 方法之一即可。当你再次对 `PreparedStatement` 调用 `setXxx()` 方法时，之前为指定占位符设置的值会被新值覆盖。`PreparedStatement`\
  \ 在执行后仍会保留为其占位符设置的值。因此，如果要在多次执行中为某个占位符设置相同的值，只需为该占位符设置一次值即可。如果要清除所有占位符的值，可以使用 `PreparedStatement`\
  \ 的 `clearParameters()` 方法。以下代码片段为所有六个占位符重新设置了值，并执行了该语句：\n\n```\n// 为占位符设置新值\npstmt.setInt(1,\
  \ 401);        // person_id\npstmt.setString(2, \"Pam\");   // 名\npstmt.setString(3,\
  \ \"Baker\"); // 姓\npstmt.setString(4, \"F\");     // 性别\npstmt.setDate(5, java.sql.Date.valueOf(\"\
  1970-01-25\")); // 出生日期\npstmt.setDouble(6, 25900);   // 收入\n// 执行 pstmt 中的 INSERT\
  \ 语句以插入另一行\npstmt.executeUpdate();\n```\n\n当你在 `PreparedStatement` 对象中完成语句执行后，需要使用其\
  \ `close()` 方法将其关闭。\n\n```\n// 关闭 PreparedStatement\npstmt.close();\n```\n\n清单 5-10\
  \ 演示了如何使用 `PreparedStatement` 对象执行 `INSERT` SQL 语句。请注意，此示例重用了 `PreparedStatement`\
  \ 来向 `person` 表中插入两条记录。\n\n```\n// PreparedStatementTest.java\npackage com.jdojo.jdbc;\n\
  import java.sql.Connection;\nimport java.sql.Date;\nimport java.sql.PreparedStatement;\n\
  import java.sql.SQLException;\nimport java.sql.Types;\npublic class PreparedStatementTest\
  \ {\npublic static void main(String[] args) {\nConnection conn = null;\nPreparedStatement\
  \ pstmt = null;\ntry {\nconn = JDBCUtil.getConnection();\npstmt = getInsertSQL(conn);\n\
  // 需要以 java.sql.Date 对象获取出生日期\nDate dob = Date.valueOf(\"1970-01-01\");\n// 插入两条人员记录\n\
  insertPerson(pstmt, 401, \"Sara\", \"Jain\", \"F\", dob, 0.0);\ninsertPerson(pstmt,\
  \ 501, \"Su\", \"Chi\", \"F\", null, 10000.0);\n// 提交事务\nJDBCUtil.commit(conn);\n\
  System.out.println(\"成功更新人员记录。\");\n} catch (SQLException e) {\nSystem.out.println(e.getMessage());\n\
  JDBCUtil.rollback(conn);\n} finally {\nJDBCUtil.closeStatement(pstmt);\nJDBCUtil.closeConnection(conn);\n\
  }\n}\npublic static void insertPerson(PreparedStatement pstmt,\nint personId, String\
  \ firstName, String lastName,\nString gender, Date dob, double income) throws SQLException\
  \ {\n// 设置所有输入参数\npstmt.setInt(1, personId);\npstmt.setString(2, firstName);\npstmt.setString(3,\
  \ lastName);\npstmt.setString(4, gender);\n// 如果出生日期为空，则正确设置其值\nif (dob == null)\
  \ {\npstmt.setNull(5, Types.DATE);\n} else {\npstmt.setDate(5, dob);\n}\npstmt.setDouble(6,\
  \ income);\n// 执行语句\npstmt.executeUpdate();\n}\npublic static PreparedStatement\
  \ getInsertSQL(Connection conn) throws SQLException {\nString SQL = \"insert into\
  \ person \"\n+ \"(person_id, first_name, last_name, gender, dob, income) \"\n+ \"\
  values \"\n+ \"(?, ?, ?, ?, ?, ?)\";\nPreparedStatement pstmt = conn.prepareStatement(SQL);\n\
  return pstmt;\n}\n}\n清单 5-10.\n使用 PreparedStatement 对象执行 INSERT 语句\n```\n\n提示\n\n\
  在将字符串值发送到数据库之前，你无需将其用单引号括起来，也无需将单引号替换为两个单引号。`PreparedStatement` 的 `setXxx()` 方法会为你处理这些。回想一下，在使用\
  \ `Statement` 处理字符串时，你必须执行这些操作。\n\n### CallableStatement 接口\n\n`CallableStatement`\
  \ 接口继承自 `PreparedStatement` 接口。`CallableStatement` 用于调用数据库中的 SQL 存储过程或函数。你也可以使用\
  \ `Statement` 对象调用存储过程或函数。然而，使用 `CallableStatement` 是更推荐的方式。\n\nJDBC API 使得使用标准语法调用\
  \ SQL 存储过程和函数成为可能。不同的 DBMS 可能使用不同的语法来执行存储过程。如果你使用 JDBC API 调用存储过程，只需学习一种在所有 DBMS\
  \ 中执行存储过程的标准方法即可。JDBC 规范为存储过程/函数定义了一种转义序列，以便在数据库中执行它们。\n\n要查明你的 DBMS 是否支持存储过程，可以调用\
  \ `DatabaseMetaData` 对象的 `supportsStoredProcedures()` 方法。如果 DBMS 支持存储过程，则返回 `true`；否则返回\
  \ `false`。JDBC 驱动程序可能允许你使用相同的语法调用 DBMS 函数。要了解是否可以使用相同的语法调用 DBMS 函数，请使用 `DatabaseMetaData`\
  \ 对象的 `supportsStoredFunctionsUsingCallSyntax()` 方法。如果返回 `true`，则可以使用相同的语法调用数据库函数。从现在开始，我使用术语“存储过程”来指代数据库存储过程和函数。\n\
  \n调用存储过程的一般语法如下：\n\n```\n{? = call <procedure_name>(<param1>, <param2>, <param3>,\
  \ ...)}\n```\n\n对存储过程的调用放在大括号（`{}`）内。第一个问号是存储过程返回值的占位符。返回值的占位符后跟 `= call`。如果存储过程不返回值，则省略\
  \ `? =` 部分。`<procedure_name>` 是存储过程的名称。如果存储过程接受参数，则参数列表放在过程名称后的括号内。如果存储过程不接受任何参数，则省略\
  \ `<procedure_name>` 后的左括号、参数列表和右括号。表 5-6 列出了一些使用调用存储过程的一般语法的示例。\n\n表 5-6.\n\n使用存储过程转义语法调用数据库存储过程的示例\n\
  \n| 存储过程描述 | 调用存储过程的语法 |\n| --- | --- |\n| 不接受参数。不返回值。 | `{call <procedure_name>}`\
  \ |\n| 接受两个 `IN` 参数。不返回值。 | `{call <procedure_name>(?, ?)}` |\n| 接受两个 `IN` 和一个 `OUT`\
  \ 参数。不返回值。 | `{call <procedure_name>(?, ?, ?)}` |\n| 不接受参数。返回一个值。 | `{? = call <procedure_name>}`\
  \ |\n| 接受两个 `IN` 参数。返回一个值。 | `{? = call <procedure_name>(?, ?)}` |\n| 接受两个 `IN`\
  \ 和一个 `OUT` 参数。返回一个值。 | `{? = call <procedure_name>(?, ?, ?)}` |\n\n每个问号（作为返回值或参数的占位符）都有一个索引。从左数第一个问号的索引为\
  \ 1，从左数第二个问号的索引为 2，依此类推。存储过程可能接受不同类型的参数：`IN`、`OUT` 和 `INOUT`。你可以对所有类型的参数使用占位符（问号）。仅通过查看使用占位符的\
  \ SQL 字符串，你无法区分参数的类型。你需要知道哪个占位符是 `IN`、`OUT` 或 `INOUT` 参数类型，并相应地处理它们。接下来的三节将描述如何在\
  \ `CallableStatement` 中处理 `IN`、`OUT` 和 `INOUT` 参数类型。\n\n\n\n#### 使用 IN 参数\n\n`IN`\
  \ 参数类型意味着调用者在调用存储过程时必须为该参数传递一个值。在执行 `CallableStatement` 之前，你必须调用某个 `setXxx()` 方法来为所有\
  \ `IN` 类型参数设置值。否则，当你尝试执行一个包含未设置值的 `IN` 参数的 `CallableStatement` 时，将会收到错误。\n\n假设一条\
  \ SQL 语句中有两个 `IN` 参数，它们的占位符分别位于索引 1 和索引 2。索引 1 处的 `IN` 参数是 `int` 类型，索引 2 处的是 `double`\
  \ 类型。你的代码逻辑将类似于下面所示的代码：\n\n```\nCallableStatement cstmt = prepare the call...;\n\
  // 设置索引 1 处 IN 参数的值\ncstmt.setInt(1, 101);\n// 设置索引 2 处 IN 参数的值\ncstmt.setDouble(2,\
  \ 22.56);\n// 在此处执行语句\n```\n\n#### 使用 OUT 参数\n\n`OUT` 参数类型意味着调用者必须为该参数向存储过程传递一个占位符，存储过程将设置该值，调用者可以在存储过程执行完毕后读取该值。在执行\
  \ `CallableStatement` 之前，你必须通过调用 `CallableStatement` 的 `registerOutParameter(int\
  \ placeholderIndex, int sqlType)` 或 `registerOutParameter(int parameterIndex, java.sql.SQLType\
  \ sqlType)` 方法来注册一个 `OUT` 参数。执行存储过程后，你需要使用某个 `getXxx()` 方法来读取 `OUT` 参数的值。\n\n假设一条\
  \ SQL 语句中有一个位于索引 2 且类型为 `double` 的 `OUT` 参数。以下是注册并读取其值的方法：\n\n```\nCallableStatement\
  \ cstmt = prepare the call...;\n// 注册索引 2 处的 OUT 参数\ncstmt.registerOutParameter(2,\
  \ java.sql.Types.DOUBLE);\n// 在此处执行语句\n// 读取 OUT 参数的值\ndouble outParamValue = cstmt.getDouble(2);\n\
  ```\n\n#### 使用 INOUT 参数\n\n`INOUT` 参数的作用相当于 `IN` 和 `OUT` 参数类型的组合。调用者可以使用 `INOUT`\
  \ 参数类型向存储过程传递一个值。存储过程在执行期间会更改 `INOUT` 参数的值，调用者可以在存储过程执行完毕后读取由存储过程设置的值。在执行存储过程之前，你必须使用\
  \ `CallableStatement` 接口的 `registerOutParameter(int placeholderIndex, int sqlType)`\
  \ 或 `registerOutParameter(int parameterIndex, java.sql.SQLType sqlType)` 方法来注册 `INOUT`\
  \ 参数。你需要使用 `CallableStatement` 的某个 `setXxx()` 方法来为 `INOUT` 参数设置值。存储过程执行后，你需要使用 `CallableStatement`\
  \ 的某个 `getXxx()` 方法来读取从存储过程传回的值。\n\n假设一条 SQL 语句中有一个位于索引 1 且类型为 `double` 的 `INOUT`\
  \ 参数。以下是注册它、向其传递值并读取其值的方法：\n\n```\nCallableStatement cstmt = prepare the call...;\n\
  // 注册索引 1 处的 INOUT 参数\ncstmt.registerOutParameter(1, java.sql.Types.DOUBLE);\n//\
  \ 为 INOUT 参数设置值 55.78\ncstmt.setDouble(1, 55.78);\n// 在此处执行语句\n// 读取 INOUT 参数的值\n\
  double inOutParamValue = cstmt.getDouble(1);\n```\n\n#### 返回参数是 OUT 参数类型\n\n如果存储过程返回一个值，并且你想要捕获该返回值，则必须使用\
  \ `CallableStatement` 接口的 `registerOutParameter()` 方法将其占位符（第一个问号）注册为 `OUT` 参数。如果调用语法中存在返回值占位符，它始终是第一个\
  \ `OUT` 参数，并且在 `registerOutParameter()` 和 `getXxx()` 方法中你需要使用 1 作为其索引。\n\n#### 执行\
  \ CallableStatement\n\n在执行存储过程之前，你需要通过调用 `Connection` 对象的 `prepareCall()` 方法来准备一个\
  \ `CallableStatement`。`prepareCall()` 方法接受一个 SQL 字符串作为参数。以下代码片段展示了如何准备一个 `CallableStatement`：\n\
  \n```\nConnection conn = JDBCUtil.getConnection();\nString SQL = \"{call myProcedure}\"\
  ;\nCallableStatement cstmt = conn.prepareCall(SQL);\n```\n\n`CallableStatement`\
  \ 接口没有添加任何执行 SQL 语句的新方法。要执行 SQL 语句，你需要调用以下三个不带参数的方法之一。这三个方法都继承自 `PreparedStatement`\
  \ 接口。\n\n*   `execute()`\n*   `executeUpdate()`\n*   `executeQuery()`\n\n在 `CallableStatement`\
  \ 对象中执行 SQL 语句所需使用的方法，取决于存储过程执行后返回的内容。\n\n*   如果它返回混合结果（结果集和更新计数），请使用 `execute()`\
  \ 方法。\n*   如果它返回更新计数，请使用 `executeUpdate()` 方法。\n*   如果它返回一个 `ResultSet`，请使用 `executeQuery()`\
  \ 方法。\n\n让我们看一些调用具有不同类型参数以及有/无返回值的存储过程的示例。\n\n##### 示例 #1\n\n存储过程：`process_salary`\n\
  \n说明：它不接受任何参数，也不返回任何值。\n\n```\nConnection conn = JDBCUtil.getConnection();\nString\
  \ sql = \"{call process_salary}\";\nCallableStatement cstmt = conn.prepareCall(sql);\n\
  cstmt.execute();\n```\n\n##### 示例 #2\n\n存储过程：`give_raise(integer person_id IN, double\
  \ raise IN)`\n\n说明：它接受两个 `IN` 参数，不返回任何值。\n\n```\nConnection conn = JDBCUtil.getConnection();\n\
  String sql = \"{call give_raise(?, ?)}\";\nCallableStatement cstmt = conn.prepareCall(sql);\n\
  // 为索引 1 处的 person_id 参数设置值\ncstmt.setInt(1, 101);\n// 为索引 2 处的 raise 参数设置值\ncstmt.setDouble(2,\
  \ 4.5);\n// 执行存储过程\ncstmt.execute();\n```\n\n##### 示例 #3\n\n存储过程：`get_employee_count(integer\
  \ dept_id IN) RETURNS integer`\n\n说明：它接受一个 `IN` 参数，并返回一个整数值。\n\n```\nConnection\
  \ conn = JDBCUtil.getConnection();\nString sql = \"{? = call get_employee_count(?)}\"\
  ;\nCallableStatement cstmt = conn.prepareCall(sql);\n// 将第一个占位符（返回值）注册为 OUT 参数\n\
  cstmt.registerOutParameter(1, java.sql.Types.INTEGER);\n// 为索引 2 处的 dept_id 参数设置值\n\
  cstmt.setInt(2, 1001);\n// 执行存储过程\ncstmt.execute();\n// 读取返回值——我们的第一个 OUT 参数索引为\
  \ 1\nint employeeCount = cstmt.getInt(1);\nSystem.out.println(\"员工数量是 \" + employeeCount);\n\
  ```\n\n\n\n##### 示例 #4\n\n存储过程：`give_raise(person_id int IN, raise double IN, old_income\
  \ double OUT, new_income double OUT)`\n\n注释：它接受两个`IN`参数和两个`OUT`参数。\n\n```\nConnection\
  \ conn = JDBCUtil.getConnection();\nString sql = \"{call give_raise(?, ?, ?, ?)}\"\
  ;\nCallableStatement cstmt = conn.prepareCall(sql);\n// 注册 OUT 参数：old_income（索引\
  \ 3），new_income（索引 4）\ncstmt.registerOutParameter(3, Types.DOUBLE);\ncstmt.registerOutParameter(4,\
  \ Types.DOUBLE);\n// 为索引 1 的 person_id 和索引 2 的 raise 设置值\ncstmt.setInt(1, 1001);\n\
  cstmt.setDouble(2, 4.5);\n// 执行存储过程\ncstmt.execute();\n// 读取 OUT 参数 old_income（索引\
  \ 3）和 new_income（索引 4）的值\ndouble oldIncome = cstmt.getDouble(3);\ndouble newIncome\
  \ = cstmt.getDouble(4);\nSystem.out.println(\"旧收入:\" + oldIncome);\nSystem.out.println(\"\
  新收入:\" + newIncome);\n```\n\n提示\n\n你可以使用字面值或占位符为`IN`参数传递值。如果为`IN`参数使用占位符，则需要在执行存储过程之前使用`setXxx()`方法设置其值。建议为`IN`参数使用占位符，并使用`setXxx()`方法设置其值。例如，假设有一个存储过程`process_person(integer\
  \ person_id IN)`接受一个`IN`类型参数。你可以将调用语法准备为`\"{call process_person(1001)}\"`或`\"{call\
  \ process_person(?)}\"`。对于后一种情况，你需要使用`setInt(1, 1001)`方法为`person_id`参数设置值。\n\n让我们讨论一个示例，其中你在数据库中创建一个存储过程，并在\
  \ Java 程序中使用`CallableStatement`调用它。你创建一个名为`give_raise`的存储过程。它接受两个名为`person_id`和`raise`的`IN`参数。它接受两个`OUT`参数，用于传回某个`person_id`的旧收入和新收入值。如果该人的收入为`null`，则将其收入设置为`20000`。如果未找到该人，则在两个`OUT`参数中都传回`null`。\n\
  \n以下是针对某些 DBMS 的`give_raise`过程的 SQL 脚本。你需要为你的 DBMS 运行该脚本，然后才能运行清单 5-12 中的程序。如果你没有找到所用\
  \ DBMS 的脚本，可以通过查看以下任何语法与你熟悉的 DBMS 的代码，轻松地为你的 DBMS 编写代码。本章稍后你将看到一个生成结果集的存储过程示例。\n\
  \n#### Adaptive Server Anywhere 数据库\n\n```\ncreate procedure give_raise(IN @person_id\
  \ integer, IN @raise double,\nOUT @old_income double, OUT @new_income double)\n\
  begin\nselect @old_income = null, @new_income = null;\nif exists(select null from\
  \ person where person_id = @person_id) then\nselect income into @old_income\nfrom\
  \ person\nwhere person_id = @person_id;\nif @old_income is null then\nselect 20000.00\
  \ into @new_income;\nelse\nselect @old_income * (1 + @raise/100) into @new_income;\n\
  end if;\nupdate person\nset income = @new_income\nwhere person_id = @person_id;\n\
  end if;\nend;\n```\n\n#### MySQL 数据库\n\n```\nDELIMITER $$\nDROP PROCEDURE IF EXISTS\
  \ give_raise $$\nCREATE PROCEDURE give_raise(in person_id_param int, in raise double,\n\
  out old_income double, out new_income double)\nBEGIN\nset old_income = null, new_income\
  \ = null;\nif exists(select null from person where person_id=person_id_param) then\n\
  select income into old_income\nfrom person\nwhere person_id = person_id_param;\n\
  if old_income is null then\nselect 20000.00 into new_income;\nelse\nselect old_income\
  \ * (1 + raise/100) into new_income;\nend if;\nupdate person\nset income = new_income\n\
  where person_id = person_id_param;\nend if;\nEND $$\nDELIMITER ;\n```\n\n#### Oracle\
  \ 数据库\n\n```\ncreate or replace procedure give_raise(person_id_param number,\nraise_param\
  \ number,\nold_income out number,\nnew_income out number)\nis\nperson_count number;\n\
  begin\nold_income := null;\nnew_income := null;\nselect count(*)\ninto person_count\n\
  from person\nwhere person_id = person_id_param;\nif person_count = 1 then\nselect\
  \ income into old_income\nfrom person\nwhere person_id = person_id_param;\nif old_income\
  \ is null then\nnew_income := 20000.00;\nelse\nnew_income := old_income * (1 + raise_param/100)\
  \ ;\nend if;\nupdate person\nset income = new_income\nwhere person_id = person_id_param;\n\
  end if;\nend give_raise;\n```\n\n#### SQL Server 数据库\n\n```\n-- 如果存储过程已存在则删除\nIF\
  \ EXISTS (\nSELECT *\nFROM INFORMATION_SCHEMA.ROUTINES\nWHERE SPECIFIC_SCHEMA =\
  \ N'dbo'\nAND SPECIFIC_NAME = N'give_raise'\n)\nDROP PROCEDURE dbo.give_raise\n\
  GO\nCREATE PROCEDURE dbo.give_raise\n@person_id int,\n@raise decimal(5, 2),\n@old_income\
  \ decimal(10, 2) OUTPUT,\n@new_income decimal(10, 2) OUTPUT\nAS\nBEGIN\nSET NOCOUNT\
  \ OFF\nSELECT @old_income = null,  @new_income = null;\nIF EXISTS (SELECT null FROM\
  \ person WHERE person_id = @person_id)\nBEGIN\nSELECT @old_income = income\nFROM\
  \ person\nWHERE person_id = @person_id;\nIF @old_income is null\nSELECT @new_income\
  \ = 20000.00;\nELSE\nSELECT @new_income = @old_income * (1 + @raise/100);\nupdate\
  \ person\nset income = @new_income\nWHERE person_id = @person_id;\nEND;\nEND;\n\
  GO\n```\n\n#### DB2 数据库\n\n```\ncreate procedure give_raise(IN person_id_param int,\n\
  IN raise_param double,\nOUT old_income double,\nOUT new_income double)\nlanguage\
