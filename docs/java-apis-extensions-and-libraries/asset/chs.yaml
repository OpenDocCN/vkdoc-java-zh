  \ = null;\n// 构建中心区域的内容节点\nVBox center = getCenter();\n// 创建右侧子节点\nButton okBtn\
  \ = new Button(\"确定\");\nButton cancelBtn = new Button(\"取消\");\n// 使确定和取消按钮大小相同\n\
  okBtn.setMaxWidth(Double.MAX_VALUE);\nVBox right = new VBox(okBtn, cancelBtn);\n\
  right.setStyle(\"-fx-padding: 10;\");\n// 创建底部子节点\nLabel statusLbl = new Label(\"\
  状态: 就绪\");\nHBox bottom = new HBox(statusLbl);\nBorderPane.setMargin(bottom, new\
  \ Insets(10, 0, 0, 0));\nbottom.setStyle(\"-fx-background-color: lavender;\"\n+\
  \ \"-fx-font-size: 7pt;\"\n+ \"-fx-padding: 10 0 0 0;\");\nBorderPane root = new\
  \ BorderPane(center, top, right, bottom, left);\nroot.setStyle(\"-fx-background-color:\
