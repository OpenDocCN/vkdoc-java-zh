  frame.setVisible(true);\n}\n}\n清单 2-8.\n使用菜单和弹出菜单\n```\n\n你也可以在菜单中使用 `JRadioButtonMenuItem`\
  \ 和 `JCheckBoxMenuItem` 作为菜单项。顾名思义，它们以单选按钮和复选框的形式显示，其工作方式与单选按钮和复选框相同。你可以将任何 Swing\
  \ 组件添加到 `JMenu` 中。要使用单选按钮类型的菜单项，你需要将多个 `JRadioButtonMenuItem` 组件分组到一个按钮组中，以便它们表示互斥的选择。要处理单选按钮选择的更改，你可以向\
  \ `JRadioButtonMenuItem` 添加一个 `ActionListener` 或 `ItemListener`。要处理 `JCheckBoxMenuItem`\
  \ 的状态更改，你需要使用 `ItemListener`。\n\n提示\n\n最后，我将揭示 Swing 中菜单的秘密。Swing 中的菜单项实际上是一个按钮。啊哈！你一直在和按钮打交道，却称它们为菜单。是的，没错。`JMenuBar`\
  \ 和 `JPopupMenu` 只是带有 `BoxLayout` 布局的容器。请继续尝试这些容器，设置它们的属性并向其中添加不同的 Swing 组件。`JMenuItem`\
  \ 是一个简单的按钮。`JMenu` 是一个按钮，它有一个关联的容器，当你选中它时，该容器会显示出来。\n\n\n\n## JToolBar\n\n工具栏是一组按钮，用于在\
  \ `JFrame` 中向用户提供常用操作。通常，你会将工具栏与菜单一起提供。工具栏包含带有小图标的小按钮。通常，它只包含菜单中可用选项的一个子集。\n\n`JToolBar`\
  \ 类的对象代表一个工具栏。它充当工具栏按钮的容器。它是一个比 `JPanel` 等其他容器更智能的容器。它可以在运行时移动。它可以是可浮动的。如果它是可浮动的，它会显示一个手柄，你可以用它来移动它。你也可以使用该手柄将其弹出到单独的窗口中。以下代码片段创建了一些工具栏组件：\n\
  \n```\n// 创建一个水平的 JToolBar\nJToolBar toolBar = new JToolBar();\n// 创建一个带标题的水平 JToolBar。当它在单独窗口中浮动时，\n\
  // 该标题会显示为窗口标题。\nJToolBar toolBarWithTitle = new JToolBar(\"我的工具栏标题\");\n// 创建一个垂直工具栏\n\
  JToolBar vToolBar = new JToolBar(JToolBar.VERTICAL);\n```\n\n让我们向工具栏添加一些按钮。工具栏中的按钮需要比普通按钮尺寸更小。你可以通过将边距设置为零来使\
  \ `JButton` 的尺寸变小。你还应该为每个工具栏按钮添加工具提示，以便向用户快速提示其用法。\n\n```\n// 为工具栏创建一个按钮\nJButton\
  \ newButton = new JButton(\"新建\");\n// 将边距设置为 0 以使按钮更小\nnewButton.setMargin(new\
  \ Insets(0, 0, 0, 0));\n// 为按钮设置工具提示\nnewButton.setToolTipText(\"添加新策略\");\n// 将“新建”按钮添加到工具栏\n\
  toolBar.add(newButton);\n```\n\n通常，你只在工具栏按钮中显示小图标。你可以使用 `JButton` 的另一个构造函数，该构造函数仅接受一个\
  \ `Icon` 对象作为参数。最后，你需要向按钮添加动作监听器，就像你向其他 `JButton` 添加的那样。当用户单击工具栏中的按钮时，动作监听器会收到通知，并执行指定的动作。\n\
  \n你可以使用其 `setFloatable(boolean floatable)` 方法将工具栏设置为可浮动/不可浮动。默认情况下，工具栏是可浮动的。其 `setRollover(boolean\
  \ rollOver)` 方法允许你指定是否仅在鼠标悬停在工具栏按钮上时才绘制其边框。\n\n应将工具栏添加到 `BorderLayout` 的北、南、东或西区域，以便在不同区域中移动工具栏时效果更好。清单\
  \ 2-9 在 `JFrame` 中显示了一个 `JToolBar`。图 2-23 显示了一个在其北部区域带有工具栏的 `JFrame`。图 2-24 显示了同一个\
  \ `JFrame`，其工具栏浮动在单独的窗口中。\n\n![A323071_2_En_2_Fig24_HTML.jpg](img/A323071_2_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24.\n\n浮动在单独窗口中的 JToolBar\n\n![A323071_2_En_2_Fig23_HTML.jpg](img/A323071_2_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23.\n\n一个在 JFrame 北部区域放置了三个 JButton 的 JToolBar\n\n```\n// JToolBarFrame.java\n\
  package com.jdojo.swing.component;\nimport java.awt.Container;\nimport javax.swing.JFrame;\n\
  import javax.swing.JToolBar;\nimport javax.swing.JButton;\nimport java.awt.Insets;\n\
  import java.awt.BorderLayout;\nimport javax.swing.JTextArea;\nimport javax.swing.JScrollPane;\n\
  public class JToolBarFrame extends JFrame {\nJToolBar toolBar = new JToolBar(\"\
  我的 JToolBar\");\nJTextArea msgText = new JTextArea(3, 45);\npublic JToolBarFrame(String\
  \ title) {\nsuper(title);\ninitFrame();\n}\n// 初始化 JFrame 并向其添加组件\nprivate void\
  \ initFrame() {\nthis.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer\
  \ contentPane = this.getContentPane();\nprepareToolBar();\n// 将工具栏添加到北部，将 JTextArea\
