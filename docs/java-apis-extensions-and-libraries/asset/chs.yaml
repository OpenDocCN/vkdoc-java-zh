  \ jdojo.prime.client\n--launcher runprimechecker=jdojo.prime.client/com.jdojo.prime.client.Main\n\
  --bind-services\n--output image\\primecheckerservice\n```\n\n将此命令与上一节中使用的命令进行比较。这次，你只使用\
  \ `--add-modules` 选项指定了一个模块。也就是说，你无需指定服务提供者模块的名称。你使用了 `--bind-services` 选项，因此添加的模块中引用的所有服务提供者都会自动添加到运行时镜像中。你指定了一个名为\
  \ `image\\primecheckerservice` 的新输出目录。以下命令运行新创建的运行时镜像：\n\n```\nC:\\Java9APIsAndModules>image\\\
  primecheckerservice\\bin\\runprimechecker\n```\n\n```\nUsing default service provider:\n\
  3 is a prime.\n4 is not a prime.\n121 is not a prime.\n977 is a prime.\nUsing faster\
