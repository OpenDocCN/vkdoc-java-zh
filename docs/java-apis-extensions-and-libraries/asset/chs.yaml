  \n## jrunscript 命令行 Shell\n\nJDK 包含一个名为 `jrunscript` 的命令行脚本 Shell。它与脚本引擎无关，可用于评估任何脚本，包括您的\
  \ JKScript。您可以在 `JAVA_HOME\\bin` 目录中找到此 Shell，其中 `JAVA_HOME` 是您安装 JDK 的目录。在本节中，我将讨论如何使用\
  \ `jrunscript` Shell 通过不同的脚本引擎来评估脚本。\n\n### 语法\n\n使用 `jrunscript` Shell 的语法如下：\n\
  \n```\njrunscript [选项] [参数]\n```\n\n`[选项]` 和 `[参数]` 都是可选的。但是，如果同时指定两者，`[选项]` 必须位于\
  \ `[参数]` 之前。表 9-3 列出了 `jrunscript` Shell 的所有可用选项。\n\n表 9-3.\njrunscript Shell 的选项\n\
  \n| 选项 | 描述 |\n| --- | --- |\n| `-classpath <路径>` | 用于指定 `CLASSPATH`。 |\n| `-cp\
  \ <路径>` | 与选项 `-classpath` 相同。 |\n| `-D<名称>=<值>` | 为 Java 运行时设置系统属性。 |\n| `-J<标志>`\
  \ | 将指定的 `<标志>` 传递给运行 `jrunscript` 的 JVM。您可以使用此选项指定任何 JVM 选项，例如 `--module-path`\
  \ 和 `-Dnashorn.args=--language=es6`。 |\n| `-l <语言>` | 允许您指定要使用的脚本语言。默认情况下，JDK6 和\
  \ JDK7 使用 Rhino JavaScript。在 JDK8 中，Nashorn 是默认引擎。如果您想使用 JavaScript 以外的语言，例如 JKScript，则需要使用\
  \ `-cp` 或 `-classpath` 选项来包含包含脚本引擎的 JAR 文件。 |\n| `-e <脚本>` | 执行指定的脚本。通常用于执行单行脚本。\
  \ |\n| `-encoding <编码>` | 指定读取脚本文件时使用的字符编码。 |\n| `-f <脚本文件>` | 以批处理模式评估指定的 `<脚本文件>`。\
  \ |\n| `-f -` | 允许您以交互模式评估脚本。它从标准输入读取脚本并执行。 |\n| `-help, -?` | 输出帮助信息并退出。 |\n| `-q`\
  \ | 列出所有可用的脚本引擎并退出。仅当您使用 `-cp` 或 `-classpath` 选项包含其 JAR 文件时，JavaScript 以外的脚本引擎才可用。\
  \ |\n\n命令的 `[参数]` 部分是一个参数列表，其解释取决于是否使用了 `-e` 或 `-f` 选项。传递给脚本的参数在脚本内部以名为 `arguments`\
  \ 的数组形式提供。表 9-4 列出了参数与 `-e` 或 `-f` 选项一起使用时的解释。\n\n表 9-4.\n[参数] 与 -e 或 -f 选项组合时的解释\n\
  \n| -e 或 -f 选项 | 参数 | 解释 |\n| --- | --- | --- |\n| `是` | `是` | 如果指定了 `-e` 或 `-f`\
  \ 选项，所有参数都将作为脚本参数传递给脚本。 |\n| `否` | `是` | 如果指定了参数但没有 `-e` 或 `-f` 选项，则第一个参数被视为要运行的脚本文件。其余参数（如果有）将作为脚本参数传递给脚本。\
  \ |\n| `否` | `否` | 如果缺少参数和 `-e` 或 `-f` 选项，Shell 将以交互模式工作，在该模式下，Shell 交互式地执行在标准输入中输入的脚本。\
  \ |\n\n### Shell 的执行模式\n\n您可以在以下三种模式下使用 `jrunscript` Shell：\n\n*   单行模式\n*   批处理模式\n\
  *   交互模式\n\n#### 单行模式\n\n`-e` 选项允许您以单行模式使用 Shell。它执行一行脚本。以下命令使用 Nashorn 引擎在标准输出上打印一条消息：\n\
  \n```\nC:\\Java9APIsAndModules>jrunscript -e \"print('Hello Nashorn!')\"\n```\n\n\
  ```\nHello Nashorn!\n```\n\n在单行模式下，整个脚本必须在一行内输入。但是，单行脚本可以包含多个语句。\n\n#### 批处理模式\n\
  \n`-f` 选项允许您以批处理模式使用 Shell。它执行一个脚本文件。考虑一个名为 `nashorntest.js` 的脚本文件，如清单 9-29 所示。\n\
  \n```\n// 打印一条消息\nprint(\"Hello Nashorn!\");\n// 添加两个整数并打印值\nvar x = 10;\nvar y\
  \ = 20;\nvar z = x + y;\nprint(x + \" + \" + y + \" = \" + z);\n清单 9-29.\n用 Nashorn\
  \ JavaScript 编写的 nashorntest.js 脚本文件\n```\n\n以下命令以批处理模式运行 `nashorntest.js` 文件中的脚本。如果\
  \ `nashorntest.js` 文件不在当前目录中，您可能需要指定其完整路径。\n\n```\nC:\\Java9APIsAndModules>jrunscript\
  \ -f nashorntest.js\nHello Nashorn!\n10 + 20 = 30\n```\n\n\n\n#### 交互模式\n\n在交互模式下，Shell\
  \ 会读取并评估在标准输入中输入的脚本。有两种方式可以在交互模式下使用 Shell：\n\n*   不使用 `-e` 或 `-f` 选项且不带参数\n*   使用\
  \ `-f -` 选项\n\n以下命令不使用任何选项和参数即可进入交互模式。按下回车键会让 Shell 评估输入的脚本。\n\n```\nc:\\Java9APIsAndModules>jrunscript\n\
  nashorn> print(\"Hello Interactive mode!\");\nHello Interactive mode!\nnashorn>\
  \ var num = 190;\nnashorn> print(\"num is \" + num);\nnum is 190\nnashorn> exit();\n\
  ```\n\n以下命令序列展示了如何在交互模式下运行 `jrunscript` 时启用 ES6 的有限特性。该脚本使用了 `const` 关键字（Nashorn\
  \ 中实现的 ES6 特性之一）来声明一个常量。\n\n```\nC:\\Java9APIsAndModules>jrunscript -J-Dnashorn.args=--language=es6\n\
  nashorn> const PI = 3.14;\nnashorn> print(\"PI = \" + PI);\nPI = 3.14\nnashorn>\
  \ exit();\n```\n\n### 列出可用的脚本引擎\n\n`jrunscript` Shell 是一个与脚本语言无关的 Shell。你可以用它来运行任何脚本语言的脚本，只要该脚本引擎的\
  \ JAR 文件可用。默认情况下，Nashorn JavaScript 引擎是可用的。要列出所有可用的脚本引擎，可以使用 `-q` 选项，如下所示：\n\n```\n\
  C:\\Java9APIsAndModules>jrunscript -q\n```\n\n```\nLanguage ECMAScript ECMA - 262\
  \ Edition 5.1 implementation \"Oracle Nashorn\" 9.0.1\n```\n\n关于如何向 Shell 添加脚本引擎，请参考下一节。\n\
  \n### 向 Shell 添加脚本引擎\n\n如何让除 Nashorn JavaScript 引擎之外的其他脚本引擎对 Shell 可用？要让某个脚本引擎对\
  \ Shell 可用，你需要使用 `-classpath` 或 `-cp` 选项提供该脚本引擎的 JAR 文件列表。如果你有一个模块化 JAR，可以使用 `-J--module-path`\
  \ 来指定模块化 JAR 所在的模块路径。以下命令通过在 `-J--module-path` 选项中指定 `jdojo.jkscript.jar` 的路径，使\
  \ `JKScript` 可用。请注意，Nashorn 引擎默认始终可用。该命令使用 `-q` 选项列出所有可用的脚本引擎。\n\n```\nC:\\Java9APIsAndModules>jrunscript\
  \ -J--module-path=dist\\jdojo.jkscript.jar -q\n```\n\n```\nLanguage ECMAScript ECMA\
  \ - 262 Edition 5.1 implementation \"Oracle Nashorn\" 9.0.1\nLanguage JKScript 1.0\
  \ implementation \"JKScript Engine\" 1.0\n```\n\n### 使用其他脚本引擎\n\n你可以通过 `-l` 选项指定脚本引擎名称来使用其他脚本引擎。你必须使用\
  \ `-cp` 或 `-classpath` 选项，或者 `-J--module-path` 选项来指定脚本引擎的模块化 JAR 或 JAR 文件，这样 Shell\
  \ 才能访问该引擎。以下命令在交互模式下使用 `JKScript` 引擎：\n\n```\nC:\\Java9APIsAndModules>jrunscript\
  \ -J--module-path=dist\\jdojo.jkscript.jar -l JKScript\njks> 10 + 30\n40.0\njks>\
  \ +89.7 + -9.7\n80.0\njks>\n```\n\n### 向脚本传递参数\n\n`jrunscript` Shell 允许向脚本传递参数。这些参数通过一个名为\
  \ `arguments` 的数组提供给脚本。你可以在脚本中以特定语言的方式访问 `arguments` 数组。以下命令传递了三个参数 `10`、`20` 和\
  \ `30`，并打印第一个参数的值。\n\n```\nC:\\Java9APIsAndModules>jrunscript -e \"print('First\
  \ argument is ' + arguments[0])\" 10 20 30\n```\n\n```\nFirst argument is 10\n```\n\
  \n考虑清单 9-30 中所示的 Nashorn JavaScript 文件 `nashornargstest.js`，它会打印传递给脚本的参数数量及其值。\n\
  \n```\n// nashornargstest.js\nprint(\"Number of arguments:\" + arguments.length);\n\
  print(\"Arguments are \") ;\nfor(var i = 0; i < arguments.length; i++) {\nprint(arguments[i]);\n\
  }\nListing 9-30.\n一个用 Nashorn JavaScript 编写的 nashornargstest.js 文件，用于打印命令行参数\n```\n\
  \n以下命令使用 `jrunscript` Shell 运行 `nashornargstest.js` 文件。\n\n```\nC:\\Java9APIsAndModules>jrunscript\
  \ scripts/nashornargstest.js\n```\n\n```\nNumber of arguments:0\nArguments are\n\
  ```\n\n```\nC:\\Java9APIsAndModules>jrunscript scripts/nashornargstest.js 10 20\
  \ 30\n```\n\n```\nNumber of arguments:3\nArguments are\n\n```\n\n如果你想从 Java 应用程序运行\
  \ `nashornargstest.js` 文件，你需要向引擎传递一个名为 `arguments` 的参数。名为 `arguments` 的参数是由 Shell\
  \ 自动传递给脚本的，而不是由 Java 应用程序传递的。\n\n\n\n## jjs 命令行工具\n\n为了使用 Nashorn 脚本引擎，JDK8 引入了一个名为\
  \ `jjs` 的新命令行工具。该命令位于 `JDK_HOME\\bin` 目录中。该命令可用于运行文件中的脚本，或在交互模式下运行在命令行输入的脚本。它也可用于执行\
  \ shell 脚本。调用该命令的语法如下：\n\n```\njjs   \n```\n\n其中，\n\n*   `<options>` 是 `jjs` 命令的选项。选项之间用空格分隔。\n\
  *   `<script-files>` 是由 Nashorn 引擎解释的脚本文件列表。\n*   `<-- arguments>` 是传递给脚本或交互式 shell\
  \ 的参数列表。参数在双连字符后指定，并可通过 `arguments` 属性访问。\n\n表 9-5 列出了 `jjs` 工具的一些常用选项。要打印所有选项的列表，请使用\
  \ `–xhelp` 选项运行该工具，如下所示：\n\n表 9-5.\n\njjs 命令行工具的选项\n\n| 选项 | 描述 |\n| --- | --- |\n\
  | `-classpath <path> 或 -cp <path>` | 指定 `CLASSPATH`。 |\n| `--add-modules <modules>`\
  \ | 指定要解析的根模块。 |\n| `--module-path <path>` | 指定模块路径。 |\n| `--language=[es5&#124;es6]`\
  \ | 指定要使用的 ECMAScript 语言版本。默认版本是 ES5。 |\n| `-D<name>=<value>` | 为 Java 运行时设置系统属性。可重复此选项以设置多个运行时属性值。\
  \ |\n| `-J<flag>` | 将指定的 `<flag>` 传递给 JVM。 |\n| `-scripting` | 启用 shell 脚本功能。 |\n\
  | `-strict` | 启用 `strict` 模式，在该模式下脚本使用 ECMAScript 5.1 标准执行。 |\n| `-fx` | 将脚本作为 JavaFX\
  \ 应用程序启动。 |\n| `-doe 或 –dump-on-error` | 指定此选项时，将打印错误的完整堆栈跟踪。默认情况下，会打印简短的错误消息。 |\n\
  | `-v 或 –version` | 打印 Nashorn 引擎的版本。 |\n| `-fv 或 –fullversion` | 打印 Nashorn 引擎的完整版本。\
  \ |\n| `-t=<timezone> 或 –timezone=<timezone>` | 设置脚本执行的时区。默认时区是 Chicago/America（中部时区）。\
  \ |\n| `-help, -h` | 输出帮助信息并退出。 |\n| `-xhelp` | 打印扩展帮助。 |\n\n```\njjs –xhelp\n```\n\
  \n如果你在未指定任何选项或脚本文件的情况下运行 `jjs`，它将以交互模式运行。脚本会在你输入时被解释。Nashorn 中的字符串可以用单引号或双引号括起来。以下是在交互模式下使用\
  \ `jjs` 工具的一些示例。你可以执行 `quit()` 或 `exit()` 函数退出 `jjs` 工具。\n\n```\nC:\\Java9APIsAndModules>jjs\n\
  jjs> \"Hello jjs\";\nHello jjs\njjs> \"Hello\".toLowerCase();\nhello\njjs> var list\
  \ = [1, 2, 3, 4, 5];\njjs> var sum = 0;\njjs> for each(x in list) { sum = sum +\
  \ x };\n\njjs> quit();\nC:\\Java9APIsAndModules>\n```\n\n在 JDK9 中，`jjs` 工具使用 `jline2`，这是一个用于处理控制台输入的\
  \ Java 库。在 `jjs` shell 中，你可以使用：\n\n*   上下箭头键浏览输入历史\n*   向前和向后删除输入\n*   左右箭头键在输入中移动\n\
  *   Ctrl+K 删除行尾内容，Ctrl+Y 恢复该行\n*   Tab 键补全\n\n以下是将参数传递给 `jjs` 工具的示例。前五个自然数作为参数传递给\
  \ `jjs` 工具，随后通过 `arguments` 属性访问它们。请注意，必须在双连字符和第一个参数之间添加一个空格。\n\n```\nC:\\Java9APIsAndModules>jjs\
  \ -- 1 2 3 4 5\njjs> for each (x in arguments) print(x);\n\njjs> quit();\nC:\\Java9APIsAndModules>\n\
  ```\n\n考虑清单 9-31 中的脚本。该脚本已保存在名为 `stream.js` 的文件中。该脚本处理一个整数列表。该列表可以作为命令行参数传递给脚本。如果未传递参数，则使用前五个自然数作为列表。它计算列表中奇数的平方和。它会打印列表和总和。\n\
  \n```\n// stream.js\nvar list;\nif (arguments.length == 0) {\nlist = [1, 2, 3, 4,\
  \ 5];\n} else {\nlist = arguments;\n}\nprint(\"List of numbers: \" + list);\nvar\
  \ sumOfSquaredOdds = list.filter(function(n) {return n % 2 == 1;})\n.map(function(n)\
  \ {return n * n;})\n.reduce(function(sum, n) {return sum + n;}, 0);\nprint(\"Sum\
  \ of the squares of odd numbers: \" + sumOfSquaredOdds);\nListing 9-31.\nA Script\
  \ to Compute the Sum of the Squares of Odd Integers in a List\n```\n\n使用 `jjs` 工具，你可以按如下方式运行\
  \ `stream.js` 文件中的脚本。假设 `stream.js` 文件位于当前目录的 `scripts` 目录中。否则，你需要指定文件的完整路径。\n\n\
  ```\nC:\\Java9APIsAndModules>jjs scripts/stream.js\nList of numbers: 1,2,3,4,5\n\
  Sum of the squares of odd numbers: 35\nC:\\Java9APIsAndModules>jjs scripts/stream.js\
  \ -- 10 11 12 13 14 15\nList of numbers: 10,11,12,13,14,15\nSum of the squares of\
  \ odd numbers: 515\nC:\\Java9APIsAndModules>\n```\n\n`jjs` 工具可以在脚本模式下调用，该模式允许你运行\
  \ shell 命令。你可以使用 `–scripting` 选项以脚本模式启动 `jjs` 工具。shell 命令用反引号括起来。以下是在脚本模式下使用 `jjs`\
  \ 工具运行 `date` 和 `ls` shell 命令的示例。当我在 Windows 10 命令提示符下运行以下命令时，我必须使用管理员身份运行命令提示符才能看到诸如\
  \ `date` 和 `ls` 等命令的输出。\n\n```\nC:\\Java9APIsAndModules>jjs -scripting\njjs> `date`\n\
  Sat Jan 20 22:42:26 CDT 2018\njjs> `ls`\nstream.js\ntest.js\njjs> quit()\nC:\\Java9APIsAndModules\
  \ >\n```\n\n你可以将 shell 命令的输出捕获到一个变量中。脚本模式允许在双引号括起来的字符串中进行表达式替换。请注意，表达式替换功能在单引号括起来的字符串中不可用。表达式用\
  \ `${expression}` 括起来。以下命令将 `date` shell 命令的值捕获到一个变量中，并使用表达式替换将日期值嵌入到字符串中。请注意，在示例中，当字符串用单引号括起来时，表达式替换不起作用：\n\
  \n```\nc:\\>jjs -scripting\njjs> var today = `date`\njjs> \"Today is ${today}\"\n\
  Sat Jan 20 22:42:26 CDT 2018\njjs> 'Today is ${today}'\nToday is ${today}\njjs>\
  \ quit()\nc:\\>\n```\n\n你也可以使用脚本模式执行存储在文件中的 shell 脚本，如下所示：\n\n```\nC:\\> jjs –scripting\
  \ myscript.js\n```\n\n`jjs` 工具支持在脚本文件中使用 heredoc，这些文件可以在脚本模式下运行。heredoc 也称为 here\
  \ document、here-string 或 here-script。它是一个多行字符串，其中保留空白字符。heredoc 以双尖括号（`<<`）和一个分隔标识符开始。通常，`EOF`\
  \ 或 `END` 用作分隔标识符。但是，你可以使用任何其他未在脚本中其他地方用作标识符的标识符。多行字符串从结束行开始。字符串以相同的分隔标识符结束。以下是在\
  \ Nashorn 中使用 heredoc 的示例：\n\n```\nvar str = <<EOF\nThis is a multi-line string\
  \ using the heredoc syntax.\nBye Heredoc!\nEOF\n```\n\n清单 9-32 包含在 Nashorn 中使用 heredoc\
  \ 的脚本。`$ARG` 属性仅在脚本模式下定义，其值是使用 `jjs` 工具传递给脚本的参数。\n\n\n\n```\n// heredoc.js\nvar\
  \ str = <<EOF\nThis is a multiline string.\nNumber of arguments passed to this\n\
  script is ${$ARG.length}\nArguments are ${$ARG}\nBye Heredoc!\nEOF\nprint(str);\n\
  清单 9-32. 使用 Heredoc 格式化多行字符串的 heredoc.js 文件内容\n```\n\n你可以按如下方式执行 `heredoc.js` 脚本文件：\n\
  \n```\nC:\\Java9APIsAndModules>jjs -scripting scripts/heredoc.js\nThis is a multiline\
  \ string.\nNumber of arguments passed to this\nscript is 0\nArguments are\nBye Heredoc!\n\
  C:\\Java9APIsAndModules>jjs -scripting scripts/heredoc.js -- Kishori Sharan\nThis\
  \ is a multiline string.\nNumber of arguments passed to this\nscript is 2\nArguments\
  \ are Kishori,Sharan\nBye Heredoc!\nC:\\Java9APIsAndModules>\n```\n\n有关 Nashorn\
  \ 中 shell 脚本的更多信息，请参阅 [`https://docs.oracle.com/javase/9/nashorn/nashorn-and-shell-scripting.htm`](https://docs.oracle.com/javase/9/nashorn/nashorn-and-shell-scripting.htm)\
  \ 。\n\n## Nashorn 中的 JavaFX\n\nNashorn 的 `jjs` 命令行工具允许你从脚本中使用 JavaFX。你需要在 JavaScript\
  \ 中创建一个 `start()` 函数，就像在 Java 中启动 JavaFX 应用程序一样。其余部分由 Nashorn 处理。你也可以为 JavaFX 应用程序声明\
  \ `init()` 和 `stop()` 函数。你可以使用 JavaFX 类的完全限定名，或者使用 `Java.type()` 函数导入它们。以下代码片段展示了在\
  \ JavaFX 中创建 `Label` 的两种方法：\n\n```\n// 使用 Label 类的完全限定名\nvar msg = new javafx.scene.control.Label(\"\
  Hello JavaFX!\");\n// 使用 Java.type() 函数\nvar Label = Java.type(\"javafx.scene.control.Label\"\
  );\nvar msg = new Label(\"Hello JavaFX!\");\n```\n\n为所有 JavaFX 类键入完全限定名可能很繁琐。脚本难道不应该比\
  \ Java 代码更简短吗？Nashorn 提供了一种简化 JavaFX 脚本的方法。它包含几个脚本文件，这些文件以简单名称导入 JavaFX 类型。你需要使用\
  \ `load()` 方法加载这些脚本文件，以便在脚本中使用 JavaFX 类的简单名称。Nashorn 包含一个 `fx:controls.js` 脚本文件，该文件将所有\
  \ JavaFX 控件类以其简单类名导入。表 9-6 列出了脚本文件及其导入的类/包。\n\n表 9-6.\n\nNashorn 脚本文件及其导入的类/包\n\n\
  | Nashorn 脚本文件 | 导入的类/包 |\n| --- | --- |\n| `fx:base.js` | `javafx.stage.Stage`\
  \ `javafx.scene.Scene` `javafx.scene.Group` `javafx/beans` `javafx/collections`\
  \ `javafx/events` `javafx/util` |\n| `fx:graphics.js` | `javafx/animation` `javafx/application`\
  \ `javafx/concurrent` `javafx/css` `javafx/geometry` `javafx/print` `javafx/scene`\
  \ `javafx/stage` |\n| `fx:controls.js` | `javafx/scene/chart` `javafx/scene/control`\
  \ |\n| `fx:fxml.js` | `javafx/fxml` |\n| `fx:web.js` | `javafx/scene/web` |\n| `fx:media.js`\
  \ | `javafx/scene/` `media` |\n| `fx:swing.js` | `javafx/embed/swing` |\n| `fx:swt.js`\
  \ | `javafx/embed/swt` |\n\n以下代码片段展示了如何加载此脚本文件并使用 `javafx.scene.control.Label` 类的简单名称：\n\
  \n```\n// 导入所有 JavaFX 控件类名\nload(\"fx:controls.js\")\n// 使用 Label 控件的简单名称\nvar msg\
  \ = new Label(\"Hello JavaFX!\");\n```\n\n清单 9-33 包含一个 JavaFX 应用程序的代码。将代码保存在名为 `hellojavafx.js`\
  \ 的文件中。\n\n```\n// hellojavafx.js\n// 加载 Nashorn 预定义脚本以导入 JavaFX 特定类和包\nload(\"\
  fx:base.js\")\nload(\"fx:controls.js\")\nload(\"fx:graphics.js\")\n// 定义 JavaFX\
  \ 应用程序类的 start() 方法\nfunction start(stage) {\nvar nameLbl = new Label(\"Enter your\
  \ name:\");\nvar nameFld = new TextField();\nvar msg = new Label();\nmsg.setStyle(\"\
  -fx-text-fill: blue;\");\n// 创建按钮\nvar sayHelloBtn = new Button(\"Say Hello\");\n\
  var exitBtn = new Button(\"Exit\");\n// 为 Say Hello 按钮添加事件处理器\nsayHelloBtn.onAction\
  \ = function() {\nvar name = nameFld.getText();\nif (name.trim().length() > 0) {\n\
  msg.text = \"Hello \" + name;\n} else {\nmsg.text = \"Hello there\";\n}\n};\n//\
  \ 为 Exit 按钮添加事件处理器\nexitBtn.onAction = function() {\nPlatform.exit();\n};\n// 创建根节点\n\
  var root = new VBox();\n// 设置子节点之间的垂直间距为 5px\nroot.spacing = 5;\n// 向根节点添加子节点\n\
  root.children.addAll(nameLbl, nameFld, msg, sayHelloBtn, exitBtn);\n// 设置舞台的场景和标题\n\
  stage.scene = new Scene(root, 350, 150);\nstage.title = \"Hello JavaFX from Nashorn\"\
  ;\n// 显示舞台\nstage.show();\n}\n清单 9-33.\n使用 Nashorn 脚本的 JavaFX 应用程序\n```\n\n这是第 8\
  \ 章中定义为 `ImprovedHelloFXApp` Java 类的 JavaFX 应用程序的 Nashorn 脚本等价物。Nashorn 版本的代码编写起来更简单。在脚本中，你可以使用\
  \ Java 类的属性来调用其方法。例如，在 Java 中编写：\n\n```\nroot.setSpacing(5);\n```\n\n在 Nashorn JavaScript\
  \ 中，你可以这样写：\n\n```\nroot.spacing = 5;\n```\n\n为按钮添加事件处理器也更简单。你可以将匿名函数设置为按钮的事件处理器。请注意，你可以使用\
  \ `onAction` 属性来设置事件处理器，而不是调用 `Button` 类的 `setOnAction()` 方法。以下代码片段展示了如何为按钮设置 `ActionEvent`\
  \ 处理器：\n\n```\n// 为 Say Hello 按钮添加事件处理器\nsayHelloBtn.onAction = function() {\n//\
  \ 处理 ActionEvent 的脚本代码写在这里\n};\n```\n\n要运行 JavaFX 应用程序，你需要使用 `–fx` 选项启动 `jjs` 工具。以下命令启动\
  \ JavaFX 应用程序，该应用程序显示一个窗口，如图 9-7 所示。输入一个名称并单击 Say Hello 按钮以查看消息。单击 Exit 按钮退出应用程序。\n\
