  }\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n清单 4-16.\n使用异步服务器套接字通道的服务器应用程序\n\
  ```\n\n```\n\n\n### 设置异步客户端套接字通道\n\n在客户端应用程序中，`AsynchronousSocketChannel` 类的实例被用作异步客户端套接字通道。`AsynchronousSocketChannel`\
  \ 类的静态 `open()` 方法会返回一个已打开的 `AsynchronousSocketChannel` 类型通道，该通道尚未连接到服务器套接字通道。通道的\
  \ `connect()` 方法用于连接到服务器套接字通道。以下代码片段展示了如何创建异步客户端套接字通道并将其连接到服务器套接字通道。它使用一个 `Future`\
  \ 对象来处理与服务器连接的完成。\n\n```\n// 创建一个异步套接字通道\nAsynchronousSocketChannel channel = AsynchronousSocketChannel.open();\n\
  // 将通道连接到服务器\nString serverName = \"localhost\";\nint serverPort = 8989;\nSocketAddress\
  \ serverAddr = new InetSocketAddress(serverName, serverPort);\nFuture result = channel.connect(serverAddr);\n\
  System.out.println(\"正在连接到服务器...\");\n// 等待连接完成\nresult.get();\n// 现在已连接到服务器\nSystem.out.println(\"\
  已连接到服务器...\");\n```\n\n一旦客户端套接字通道连接到服务器，你就可以开始使用通道的 `read()` 和 `write()` 方法异步地从服务器读取数据以及向服务器写入数据。这两种方法都允许你使用\
  \ `Future` 对象或 `CompletionHandler` 对象来处理操作的完成。你将使用如下所示的 `Attachment` 类将上下文传递给完成处理器：\n\
  \n```\nclass Attachment {\nAsynchronousSocketChannel channel;\nByteBuffer buffer;\n\
  Thread mainThread;\nboolean isRead;\n}\n```\n\n在 `Attachment` 类中，`channel` 实例变量保存了对客户端通道的引用。`buffer`\
  \ 实例变量保存了对数据缓冲区的引用。你将使用同一个数据缓冲区进行读取和写入操作。`mainThread` 实例变量保存了对应用程序主线程的引用。当客户端通道完成操作时，你可以中断等待中的主线程，从而使客户端应用程序终止。`isRead`\
  \ 实例变量指示操作是读取还是写入。如果为 `true`，则表示是读取操作。否则，就是写入操作。\n\n清单 4-17 包含了异步客户端套接字通道的完整代码。它使用了两个内部类，分别名为\
  \ `Attachment` 和 `ReadWriteHandler`。`Attachment` 类的实例被用作 `read()` 和 `write()` 异步操作的附件。`ReadWriteHandler`\
  \ 类的实例被用作 `read()` 和 `write()` 操作的完成处理器。其 `getTextFromUser()` 方法会提示用户在标准输入中输入一条消息，并返回用户输入的消息。完成处理器的\
  \ `completed()` 方法会检查操作是读取还是写入。如果是读取操作，它会在标准输出上打印从服务器读取到的文本。然后提示用户输入另一条消息。如果用户输入\
  \ `Bye`，它会通过中断等待中的主线程来终止应用程序。请注意，当程序退出 `try` 块时，通道会自动关闭，因为它是在 `main()` 方法中的 `try-with-resources`\
  \ 块内打开的。\n\n```\n// AsyncEchoClientSocket.java\npackage com.jdojo.net;\nimport java.io.BufferedReader;\n\
  import java.io.IOException;\nimport java.io.InputStreamReader;\nimport java.net.InetSocketAddress;\n\
  import java.net.SocketAddress;\nimport java.nio.ByteBuffer;\nimport java.nio.charset.Charset;\n\
  import java.util.concurrent.Future;\nimport java.nio.channels.CompletionHandler;\n\
  import java.util.concurrent.ExecutionException;\nimport java.nio.channels.AsynchronousSocketChannel;\n\
  public class AsyncEchoClientSocket {\nprivate static class Attachment {\nAsynchronousSocketChannel\
  \ channel;\nByteBuffer buffer;\nThread mainThread;\nboolean isRead;\n}\nprivate\
  \ static class ReadWriteHandler implements CompletionHandler {\n@Override\npublic\
  \ void completed(Integer result, Attachment attach) {\nif (attach.isRead) {\nattach.buffer.flip();\n\
  // 获取从服务器读取的文本\nCharset cs = Charset.forName(\"UTF-8\");\nint limits = attach.buffer.limit();\n\
  byte bytes[] = new byte[limits];\nattach.buffer.get(bytes, 0, limits);\nString msg\
  \ = new String(bytes, cs);\n// 从服务器读取完成\nSystem.out.format(\"服务器响应: %s%n\", msg);\n\
  // 提示用户输入另一条消息\nmsg = this.getTextFromUser();\nif (msg.equalsIgnoreCase(\"bye\"\
  )) {\n// 中断主线程，以便程序终止\nattach.mainThread.interrupt();\nreturn;\n}\n// 准备缓冲区以便再次填充\n\
  attach.buffer.clear();\nbyte[] data = msg.getBytes(cs);\nattach.buffer.put(data);\n\
  // 准备缓冲区以便读取\nattach.buffer.flip();\nattach.isRead = false; // 这是一个写入操作\n// 向服务器写入\n\
  attach.channel.write(attach.buffer, attach, this);\n} else {\n// 向服务器写入完成。执行另一次从服务器的读取操作\n\
  attach.isRead = true;\n// 准备缓冲区以便填充\nattach.buffer.clear();\n// 从服务器读取\nattach.channel.read(attach.buffer,\
  \ attach, this);\n}\n}\n@Override\npublic void failed(Throwable e, Attachment attach)\
  \ {\ne.printStackTrace();\n}\nprivate String getTextFromUser() {\nSystem.out.print(\"\
  请输入一条消息 (输入 Bye 退出):\");\nString msg = null;\nBufferedReader consoleReader\n= new\
  \ BufferedReader(new InputStreamReader(System.in));\ntry {\nmsg = consoleReader.readLine();\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\nreturn msg;\n}\n}\npublic static\
  \ void main(String[] args) {\n// 使用 try-with-resources 打开一个通道\ntry (AsynchronousSocketChannel\
  \ channel = AsynchronousSocketChannel.open()) {\n// 将客户端连接到服务器\nString serverName\
  \ = \"localhost\";\nint serverPort = 8989;\nSocketAddress serverAddr = new InetSocketAddress(serverName,\
  \ serverPort);\nFuture result = channel.connect(serverAddr);\nSystem.out.println(\"\
  正在连接到服务器...\");\n// 等待连接完成\nresult.get();\n// 现在已连接到服务器\nSystem.out.println(\"已连接到服务器...\"\
  );\n// 开始从服务器读取和向服务器写入\nAttachment attach = new Attachment();\nattach.channel =\
  \ channel;\nattach.buffer = ByteBuffer.allocate(2048);\nattach.isRead = false;\n\
  attach.mainThread = Thread.currentThread();\n// 将 \"Hello\" 消息放入缓冲区\nCharset cs\
  \ = Charset.forName(\"UTF-8\");\nString msg = \"Hello\";\nbyte[] data = msg.getBytes(cs);\n\
  attach.buffer.put(data);\nattach.buffer.flip();\n// 向服务器写入\nReadWriteHandler readWriteHandler\
  \ = new ReadWriteHandler();\nchannel.write(attach.buffer, attach, readWriteHandler);\n\
  // 让此线程永远等待自身终止，直到被中断\nattach.mainThread.join();\n} catch (ExecutionException |\
  \ IOException e) {\ne.printStackTrace();\n} catch (InterruptedException e) {\nSystem.out.println(\"\
  已与服务器断开连接。\");\n}\n}\n}\n清单 4-17.\n一个异步客户端套接字通道\n```\n\n### 将服务器和客户端整合在一起\n\n至此，你的异步服务器和客户端程序已经准备就绪。你需要按照以下步骤来运行服务器和客户端。\n\
  \n\n\n#### 运行服务器应用程序\n\n运行清单 4-16 中列出的 `AsyncEchoServerSocket` 类。您应该在标准输出上看到如下消息：\n\
  \n```\nServer is listening at localhost/127.0.0.1:8989\n```\n\n如果看到此消息，请继续执行下一步。如果未看到此消息，很可能是端口\
  \ 8989 正被其他进程占用。在这种情况下，您应该会看到以下错误消息：\n\n```\njava.net.BindException: Address already\
  \ in use: bind\n```\n\n如果您收到 `\"Address already in use\"` 错误消息，则需要将 `AsyncEchoServerSocket`\
  \ 类中的端口值从 8989 更改为其他值，然后重新尝试运行 `AsyncEchoServerSocket` 类。如果您更改了服务器程序中的端口号，则还必须更改客户端程序中的端口号，以匹配服务器端口号。服务器套接字通道在一个端口上监听，客户端必须连接到服务器正在监听的同一端口。\n\
  \n#### 运行客户端应用程序\n\n在执行此步骤之前，请确保您已成功完成上一步。运行一个或多个清单 4-17 中列出的 `AsyncEchoClientSocket`\
  \ 类的实例。如果客户端应用程序能够成功连接到服务器，您应该在标准输出上看到以下消息：\n\n```\nConnecting to the server...\n\
  Connected to the server...\nServer Responded: Hello\nPlease enter a message (Bye\
  \ to quit):\n```\n\n当您尝试运行 `AsyncEchoClientSocket` 类时，可能会收到以下错误消息：\n\n```\nConnecting\
  \ to the server...\njava.util.concurrent.ExecutionException: java.io.IOException:\
  \ The remote system refused the network connection.\n```\n\n通常，此错误消息表示以下问题之一：\n\n\
  *   服务器未运行。如果是这种情况，请确保服务器正在运行。\n*   客户端尝试连接到与服务器监听的主机和端口不同的主机和端口。如果是这种情况，请确保服务器和客户端使用相同的主机名（或\
  \ IP 地址）和端口号。\n\n您需要手动停止服务器程序，例如在 Windows 的命令提示符下按 Ctrl+C 键。\n\n## 面向数据报的套接字通道\n\
  \n`java.nio.channels.DatagramChannel` 类的实例表示一个数据报通道。默认情况下，它是阻塞的。您可以使用 `configureBlocking(false)`\
  \ 方法将其配置为非阻塞。\n\n要创建 `DatagramChannel`，您需要调用其 `open()` 静态方法之一。如果要将其用于 IP 多播，则需要将多播组的地址类型（或协议族）作为参数传递给其\
  \ `open()` 方法。`open()` 方法创建一个未连接的 `DatagramChannel`。如果您希望数据报通道仅向特定远程主机发送和接收数据报，则需要使用其\
  \ `connect()` 方法将通道连接到该特定主机。未连接的数据报通道可以向任何远程主机发送数据报，并从任何远程主机接收数据报。以下各节概述了使用数据报通道发送/接收数据报通常所需的步骤。\n\
  \n### 创建数据报通道\n\n您可以使用 `DatagramChannel` 类的 `open()` 方法创建数据报通道。以下代码片段显示了创建数据报通道的三种不同方式：\n\
  \n```\n// 创建一个新的数据报通道以发送/接收数据报\nDatagramChannel channel = DatagramChannel.open();\n\
  // 创建一个数据报通道以从使用 IPv4 地址类型的多播组接收数据报\nDatagramChannel ipv4MulticastChannel = DatagramChannel.open(StandardProtocolFamily.INET);\n\
  // 创建一个数据报通道以从使用 IPv6 地址类型的多播组接收数据报\nDatagramChannel iPv6MulticastChannel = DatagramChannel.open(StandardProtocolFamily.INET6);\n\
  ```\n\n### 设置通道选项\n\n您可以使用 `DatagramChannel` 类的 `setOption()` 方法设置通道选项。某些选项必须在将通道绑定到特定地址之前设置，而某些选项可以在绑定之后设置。`setOption()`\
  \ 方法是在 Java 7 中添加到 `DatagramChannel` 类的。如果您使用的是较早的 Java 版本，则需要使用 `socket()` 方法获取\
  \ `DatagramSocket` 引用，并使用 `DatagramSocket` 类的方法之一来设置通道选项。以下代码片段显示了如何设置通道选项。套接字选项在\
  \ `StandardSocketOptions` 类中定义为常量。有关所有类型套接字都支持的套接字选项的完整列表，请参阅 `StandardSocketOptions`\
  \ 类的 Javadoc。表 4-10 包含了 `DatagramChannel` 支持的套接字选项及其说明的列表。\n\n提示\n\nJDK9 为 `Socket`、`ServerSocket`\
  \ 和 `DatagramSocket` 类添加了三个方法：`setOption()`、`getOption()` 和 `supportedOptions()`。这些方法允许您设置套接字选项、查询套接字选项的值以及获取套接字支持的一组套接字选项。有关如何使用这些方法的更多详细信息，请参阅这些类的\
  \ Javadoc。\n\n要将多个套接字绑定到同一个套接字地址，您需要为套接字设置 `SO_REUSEADDR` 选项，如下所示：\n\n表 4-10.\n\n\
  标准套接字选项\n\n| 套接字选项名称 | 描述 |\n| --- | --- |\n| `SO_SNDBUF` | 套接字发送缓冲区的大小（以字节为单位）。其值为\
  \ `Integer` 类型。 |\n| `SO_RCVBUF` | 套接字接收缓冲区的大小（以字节为单位）。其值为 `Integer` 类型。 |\n| `SO_REUSEADDR`\
  \ | 对于数据报套接字，它允许多个程序绑定到同一地址。其值为 `Boolean` 类型。使用数据报通道进行 IP 多播时应启用此选项。 |\n| `SO_BROADCAST`\
  \ | 允许传输广播数据报。其值为 `Boolean` 类型。 |\n| `IP_TOS` | 互联网协议（IP）头中的服务类型（ToS）八位组。其值为 `Integer`\
  \ 类型。 |\n| `IP_MULTICAST_IF` | 用于互联网协议（IP）多播数据报的网络接口。其值为 `NetworkInterface` 类型的引用。\
  \ |\n| `IP_MULTICAST_TTL` | 互联网协议（IP）多播数据报的生存时间。其值为 `Integer` 类型，范围为 0 到 255。 |\n\
  | `IP_MULTICAST_LOOP` | 互联网协议（IP）多播数据报的回环。其值为 `Boolean` 类型。 |\n\n```\n// Java 7\
  \ 及更高版本\nchannel.setOption(StandardSocketOptions.SO_REUSEADDR, true)\n// Java 7\
  \ 之前\nDatagramSocket socket = channel.socket();\nsocket.setReuseAddress(true);\n\
  ```\n\n#### 绑定数据报通道\n\n使用 `DatagramChannel` 类的 `bind()` 方法将数据报通道绑定到特定的本地地址和端口。如果您使用\
  \ `null` 作为绑定地址，此方法将自动将套接字绑定到可用的地址。`bind()` 方法是在 Java 7 中添加到 `DatagramChannel` 类的。如果您使用的是较早的\
  \ Java 版本，则可以使用其底层套接字来绑定数据报通道。以下代码片段显示了如何绑定数据报通道：\n\n```\n/* Java 7 及更高版本 */\n//\
  \ 自动将通道绑定到任何可用地址\nchannel.bind(null);\n// 将通道绑定到 \"localhost\" 和端口 8989\nInetSocketAddress\
  \ sAddr = new InetSocketAddress(\"localhost\", 8989);\nchannel.bind(sAddr);\n/*\
  \ Java 7 之前 */\n// 获取套接字引用\nDatagramSocket socket = channel.socket();\n// 自动将通道绑定到任何可用地址\n\
  socket.bind(null);\n// 将通道绑定到 \"localhost\" 和端口 8989\nInetSocketAddress sAddr =\
  \ new InetSocketAddress(\"localhost\", 8989);\nsocket.bind(sAddr);\n```\n\n\n\n\
  ### 发送数据报\n\n要向远程主机发送数据报，请使用 `DatagramChannel` 类的 `send()` 方法。该方法接受一个 `ByteBuffer`\
  \ 和一个远程 `SocketAddress`。如果你在未绑定的数据报通道上调用 `send()` 方法，`send()` 方法会自动将该通道绑定到一个可用的地址。\n\
  \n```\n// 准备要发送的消息\nString msg = \"Hello\";\nByteBuffer buffer = ByteBuffer.wrap(msg.getBytes());\n\
  // 将远程地址和端口打包成一个对象\nInetSocketAddress serverAddress = new InetSocketAddress(\"localhost\"\
  , 8989);\n// 向远程主机发送消息\nchannel.send(buffer, serverAddress);\n```\n\n`DatagramChannel`\
  \ 类的 `receive()` 方法允许数据报通道从远程主机接收数据报。此方法要求你提供一个 `ByteBuffer` 来接收数据。接收到的数据会被复制到指定的\
  \ `ByteBuffer` 的当前位置。如果 `ByteBuffer` 的可用空间小于接收到的数据，多余的数据会被静默丢弃。`receive()` 方法返回远程主机的地址。如果数据报通道处于非阻塞模式，`receive()`\
  \ 方法会立即返回 `null`。否则，它会一直等待，直到接收到一个数据报。\n\n```\n// 准备一个 ByteBuffer 来接收数据\nByteBuffer\
  \ buffer = ByteBuffer.allocate(1024);\n// 等待从远程主机接收数据\nSocketAddress remoteAddress\
  \ = channel.receive(buffer);\n```\n\n#### 关闭通道\n\n最后，使用其 `close()` 方法关闭数据报通道。\n\n\
  ```\n// 关闭通道\nchannel.close();\n```\n\n清单 4-18 包含一个充当回显服务器的程序。清单 4-19 包含一个充当客户端的程序。回显服务器等待来自远程客户端的消息。它会将接收到的来自远程客户端的消息原样返回。你需要在启动客户端程序之前启动回显服务器程序。你可以同时运行多个客户端程序。下面展示了客户端和服务器程序的示例输出。\n\
  \n```\n// DGCEchoServer.java\npackage com.jdojo.net;\nimport java.io.IOException;\n\
  import java.net.InetSocketAddress;\nimport java.net.SocketAddress;\nimport java.nio.ByteBuffer;\n\
  import java.nio.channels.DatagramChannel;\npublic class DGCEchoServer {\npublic\
  \ static void main(String[] args) {\n// 创建一个数据报通道并将其绑定到本地主机的 8989 端口\ntry (DatagramChannel\
  \ server = DatagramChannel.open()) {\nInetSocketAddress sAddr = new InetSocketAddress(\"\
  localhost\", 8989);\nserver.bind(sAddr);\nByteBuffer buffer = ByteBuffer.allocate(1024);\n\
  // 无限循环等待客户端发送数据\nwhile (true) {\nSystem.out.println(\"Waiting for a message from\"\
  \n+ \" a remote host at \" + sAddr);\n// 等待客户端发送消息\nSocketAddress remoteAddr = server.receive(buffer);\n\
  // 准备缓冲区以读取消息\nbuffer.flip();\n// 将缓冲区数据转换为字符串\nint limits = buffer.limit();\nbyte\
  \ bytes[] = new byte[limits];\nbuffer.get(bytes, 0, limits);\nString msg = new String(bytes);\n\
  System.out.println(\"Client at \" + remoteAddr + \" says: \" + msg);\n// 重用缓冲区以将消息回显给客户端\n\
  buffer.rewind();\n// 将消息发送回客户端\nserver.send(buffer, remoteAddr);\n// 准备缓冲区以接收下一条消息\n\
  buffer.clear();\n}\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\nWaiting\
  \ for a message from a remote host at localhost/127.0.0.1:8989\nClient at /127.0.0.1:62644\
  \ says: Hello\nWaiting for a message from a remote host at localhost/127.0.0.1:8989\n\
  清单 4-18.\n基于数据报通道的回显服务器\n```\n\n```\n// DGCEchoClient.java\npackage com.jdojo.net;\n\
  import java.io.IOException;\nimport java.net.InetSocketAddress;\nimport java.nio.ByteBuffer;\n\
  import java.nio.channels.DatagramChannel;\npublic class DGCEchoClient {\npublic\
  \ static void main(String[] args) {\n// 创建一个新的数据报通道\ntry (DatagramChannel client\
  \ = DatagramChannel.open()) {\n// 将客户端绑定到任何可用的本地地址和端口\nclient.bind(null);\n// 为服务器准备一条消息\n\
  String msg = \"Hello\";\nByteBuffer buffer = ByteBuffer.wrap(msg.getBytes());\n\
  InetSocketAddress serverAddress = new InetSocketAddress(\"localhost\", 8989);\n\
  // 向服务器发送消息\nclient.send(buffer, serverAddress);\n// 重用缓冲区以接收服务器的响应\nbuffer.clear();\n\
  // 等待服务器响应\nclient.receive(buffer);\n// 准备缓冲区以读取消息\nbuffer.flip();\n// 将缓冲区转换为字符串\n\
  int limits = buffer.limit();\nbyte bytes[] = new byte[limits];\nbuffer.get(bytes,\
  \ 0, limits);\nString response = new String(bytes);\n// 在标准输出上打印服务器消息\nSystem.out.println(\"\
  Server responded: \" + response);\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n}\nServer responded: Hello\n清单 4-19.\n基于数据报通道的客户端程序\n```\n\n## 使用数据报通道进行多播\n\
  \nJava 7 为数据报通道增加了对 IP 多播的支持。对接收多播数据报感兴趣的数据报通道会加入一个多播组。发送到多播组的数据报会被传递给其所有成员。以下各节概述了设置一个对接收多播数据报感兴趣的客户端应用程序通常所需的步骤。\n\
  \n### 创建数据报通道\n\n按如下方式创建一个数据报通道以使用特定的多播地址类型。在你的应用程序中，你将使用 IPv4 或 IPv6，而不是两者都使用。\n\
  \n```\n// 对于 IPv4 寻址方案，需要使用 INET 协议族\nDatagramChannel client = DatagramChannel.open(StandardProtocolFamily.INET);\n\
  // 对于 IPv6 寻址方案，需要使用 INET6 协议族\nDatagramChannel client = DatagramChannel.open(StandardProtocolFamily.INET6);\n\
  ```\n\n### 设置通道选项\n\n使用 `setOption()` 方法设置客户端通道的选项，如下所示：\n\n```\n// 允许其他套接字重用相同的地址\n\
  client.setOption(StandardSocketOptions.SO_REUSEADDR, true);\n```\n\n### 绑定通道\n\n\
  按如下所示将客户端通道绑定到本地地址和端口：\n\n```\nint MULTICAST_PORT = 8989;\nclient.bind(new InetSocketAddress(MULTICAST_PORT));\n\
  ```\n\n\n\n### 设置多播网络接口\n\n设置套接字选项 `IP_MULTICAST_IF`，该选项指定客户端通道将加入多播组时所使用的网络接口。\n\
  \n```\n// 获取名为 \"eth1\" 的网络接口的引用\nNetworkInterface interf = NetworkInterface.getByName(\"\
  eth1\");\n// 设置 IP_MULTICAST_IF 选项\nclient.setOption(StandardSocketOptions.IP_MULTICAST_IF,\
  \ interf);\n```\n\n清单 4-20 包含一个完整的程序，用于打印您机器上所有可用网络接口的名称。它还会打印每个网络接口是否支持多播以及是否已启用。当您在机器上运行此代码时，可能会得到不同的输出。您需要使用一个支持多播且已启用的可用网络接口的名称。例如，如输出所示，名为\
  \ `eth2` 的网络接口在我的机器上已启用并支持多播，因此我使用 `eth2` 作为处理多播消息的网络接口。\n\n```\n// ListNetworkInterfaces.java\n\
