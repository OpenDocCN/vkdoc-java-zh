  \ 和 `jjs` 工具是什么？  \n17. 如何启动 `jjs` 工具以便执行 shell 脚本？  \n18. 如何退出 `jjs` 工具？\n\n# 10.\
  \ 进程 API\n\n在本章中，你将学习：\n\n*   什么是进程 API\n*   如何与运行 Java 应用程序的当前进程交互\n*   如何创建原生进程\n\
  *   如何获取有关新进程的信息\n*   如何获取有关当前进程的信息\n*   如何获取有关所有系统进程的信息\n*   如何设置创建、查询和管理原生进程的权限\n\
  \n本章中的所有示例程序都是 `jdojo.process` 模块的成员，如清单 10-1 所示。\n\n```\n// module-info.java\n\
  module jdojo.process {\n    exports com.jdojo.process;\n}\n清单 10-1.\njdojo.process\
  \ 模块的声明\n```\n\n\n\n## 什么是进程 API？\n\n进程 API 由一系列类和接口组成，让你能够在 Java 程序中操作原生进程。使用该\
  \ API，你可以：\n\n*   从 Java 代码创建新的原生进程。\n*   获取原生进程的进程句柄，无论这些进程是由 Java 代码还是其他方式创建的。\n\
  *   销毁正在运行的原生进程。\n*   查询进程的活动状态及其他属性。\n*   获取进程的子进程列表及其父进程。\n*   获取原生进程的进程 ID（PID）。\n\
  *   获取新创建进程的输入、输出和错误流。\n*   等待进程终止。\n*   在进程终止时执行任务。\n\n进程 API 规模较小，由表 10-1 中列出的类和接口组成。我将在后续章节中通过示例详细解释这些类和接口。\n\
  \n表 10-1.\n\n为 JKScript 脚本引擎开发的类\n\n| 类/接口 | 描述 |\n| --- | --- |\n| `Runtime` |\
  \ 这是一个单例类，其唯一实例代表 Java 应用程序的运行时环境。 |\n| `ProcessBuilder` | `ProcessBuilder` 类的实例保存了一组进程属性。调用其\
  \ `start()` 方法会启动一个原生进程，并返回一个代表该原生进程的 `Process` 类实例。你可以多次调用其 `start()` 方法；每次调用都会使用\
  \ `ProcessBuilder` 实例中保存的属性启动一个新进程。 |\n| `ProcessBuilder.Redirect` | 这是一个静态嵌套类，代表进程输入的来源或进程输出的目标。它是在\
  \ JDK9 中新增的。 |\n| `Process` | 这是一个抽象类，其实例代表由当前 Java 程序通过 `ProcessBuilder` 的 `start()`\
  \ 方法或 `Runtime` 的 `exec()` 方法启动的原生进程。 |\n| `ProcessHandle` | 这是一个接口，其实例代表原生进程的句柄，无论这些进程是由当前\
  \ Java 程序还是其他方式启动的。你可以使用此句柄控制并查询原生进程的状态。它是在 JDK9 中新增的。 |\n| `ProcessHandle.Info`\
  \ | `ProcessHandle.Info` 接口的实例代表进程属性的快照。它是在 JDK9 中新增的。 |\n\n在 Java 9 之前，进程 API 仍然缺乏对操作原生进程的基本支持，例如获取进程的\
  \ PID 和所有者、进程的启动时间、进程已使用的 CPU 时间、当前正在运行的原生进程数量等。请注意，在 Java 9 之前，你可以启动原生进程并处理其输入、输出和错误流。但是，你无法操作并非由你启动的原生进程，也无法查询进程的详细信息。为了更深入地操作原生进程，Java\
  \ 开发人员不得不使用 Java 原生接口（JNI）编写原生代码。Java 9 提供了这些操作原生进程所急需的功能。\n\nJava 9 在进程 API 中新增了一个名为\
  \ `ProcessHandle` 的接口。`ProcessHandle` 接口的实例标识一个原生进程；它允许你查询进程状态并管理进程。\n\n比较一下 `Process`\
  \ 类和 `ProcessHandle` 接口。`Process` 类的实例代表由当前 Java 程序启动的原生进程，而 `ProcessHandle` 接口的实例则代表一个原生进程，无论它是由当前\
  \ Java 程序还是其他方式启动的。在 Java 9 中，`Process` 类新增了几个方法，这些方法在新的 `ProcessHandle` 接口中同样可用。`Process`\
  \ 类包含一个 `toHandle()` 方法，该方法返回一个 `ProcessHandle`。\n\n`ProcessHandle.Info` 接口的实例代表进程属性的快照。请注意，不同操作系统对进程的实现方式不同，因此它们的属性也各不相同。进程的状态可能随时发生变化，例如，每当进程获得更多\
  \ CPU 时间时，其使用的 CPU 时间就会增加。要获取进程的最新信息，你需要在需要时使用 `ProcessHandle` 接口的 `info()` 方法，该方法将返回一个新的\
  \ `ProcessHandle.Info` 接口实例。\n\n本章中的所有示例均在 Windows 10 上运行。如果你在自己的机器上使用 Windows 10\
  \ 或其他操作系统运行这些程序，可能会得到不同的输出。\n\n\n\n## 了解运行时环境\n\n每个 Java 应用程序都有一个 `Runtime` 类的实例，它允许你查询当前\
  \ Java 应用程序所运行的运行时环境并与之交互。`Runtime` 类是一个单例类。你可以通过该类的 `getRuntime()` 静态方法获取其唯一实例：\n\
  \n```\n// 获取 Runtime 实例\nRuntime runtime = Runtime.getRuntime();\n```\n\n使用 `Runtime`，你可以了解当前\
  \ JVM 可使用的最大内存、JVM 中当前已分配的内存以及 JVM 中的空闲内存。以下是三个允许你以字节为单位查询 JVM 内存的方法：\n\n*   `long\
  \ maxMemory()`\n*   `long totalMemory()`\n*   `long freeMemory()`\n\nJVM 会惰性地分配内存。`maxMemory()`\
  \ 方法返回 JVM 可以分配的最大内存量。如果没有最大内存限制，该方法返回 `Long.MAX_VALUE`。\n\n`totalMemory()` 方法返回\
  \ JVM 在其可分配的最大内存中当前已分配的内存。当 JVM 需要更多内存时，它会分配更多内存，而 `totalMemory()` 方法将返回当前已分配的内存。JVM\
  \ 最多可以分配 `maxMemory()` 方法返回的内存大小。\n\n`freeMemory()` 方法返回 JVM 当前已分配内存中未使用的部分。如何了解\
  \ JVM 已使用的内存？以下公式将给出 JVM 在特定时间点使用的内存：\n\n```\n已用内存 = 总内存 - 空闲内存\n```\n\n使用 `availableProcessors()`\
  \ 方法获取 JVM 可用的处理器数量。\n\n使用 `version()` 方法获取一个 `Runtime.Version` 对象，该对象表示 Java 运行时环境的版本。`version()`\
  \ 方法是在 JDK9 中添加到 `Runtime` 类的。有关 JDK9 中新的 JDK/JRE 版本控制方案的更多详细信息，请参阅 `Runtime.Version`\
  \ 类的 Javadoc。清单 10-2 展示了 `Runtime` 类在查询 Java 运行时环境方面的一些应用。你可能会得到不同的输出。\n\n```\n\
  // QueryingRuntime.java\npackage com.jdojo.process;\npublic class QueryingRuntime\
  \ {\npublic static void main(String[] args) {\n// 获取 Runtime 实例\nRuntime rt = Runtime.getRuntime();\n\
  // 获取 JVM 内存\nlong maxMemory = rt.maxMemory();\nlong totalMemory = rt.totalMemory();\n\
  long freeMemory = rt.freeMemory();\nlong usedMemory = totalMemory - freeMemory;\n\
  System.out.format(\"最大内存 = %d, 总内存 = %d,\"\n+ \"空闲内存 = %d, 已用内存 = %d.%n\",\nmaxMemory,\
  \ totalMemory, freeMemory, usedMemory);\n// 打印 JVM 可用的处理器数量\nint processors = rt.availableProcessors();\n\
  System.out.format(\"处理器数量 = %d%n\", processors);\n// 打印 Java 运行时的版本\nRuntime.Version\
  \ version = rt.version();\nSystem.out.format(\"处理器数量 = %s%n\", version);\n}\n}\n\
  清单 10-2.\n查询 Java 运行时环境\n```\n\n```\n最大内存 = 2113929216, 总内存 = 132120576,空闲内存 = 125994760,\
  \ 已用内存 = 6125816.\n处理器数量 = 4\n处理器数量 = 9.0.1+11\n```\n\n你可以使用 `Runtime` 类的 `gc()`\
  \ 方法调用垃圾回收。`System.gc()` 静态方法是 `Runtime.getRuntime().gc()` 的便捷方法。\n\n你可以使用 `Runtime`\
  \ 类的 `exit(int status)` 方法终止 JVM。`System.exit()` 静态方法是 `Runtime.getRuntime().exit()`\
  \ 的便捷方法。按照惯例，`status` 的非零值表示 JVM 异常终止。你可以使用 `Runtime` 类的 `halt()` 方法强制终止 JVM。\n\n\
  你可以使用 `Runtime` 类的 `addShutdownHook(Thread hook)` 和 `removeShutdownHook(Thread hook)`\
  \ 方法向 JVM 添加和移除关闭钩子。关闭钩子是一个已初始化但未启动的线程。当 JVM 终止时，它会启动注册为关闭钩子的线程。\n\n使用其重载的 `exec()`\
  \ 方法之一来启动一个原生进程。你应该使用 `ProcessBuilder` 类来启动原生进程。`Runtime` 类的 `exec()` 方法内部使用 `ProcessBuilder`\
  \ 类。\n\n## 当前进程\n\n`ProcessHandle` 接口的 `current()` 静态方法返回当前进程的句柄。请注意，此方法返回的当前进程始终是正在执行代码的\
  \ Java 进程。\n\n```\n// 获取当前进程的句柄\nProcessHandle current = ProcessHandle.current();\n\
  ```\n\n一旦获取了当前进程的句柄，你就可以使用 `ProcessHandle` 接口的方法来获取有关该进程的详细信息。有关如何获取当前进程信息的示例，请参阅下一节。\n\
  \n提示\n\n你不能杀死当前进程。尝试使用 `ProcessHandle` 接口的 `destroy()` 或 `destroyForcibly()` 方法杀死当前进程会导致\
  \ `IllegalStateException`。\n\n\n\n## 查询进程状态\n\n你可以使用 `ProcessHandle` 接口中的方法来查询进程的状态。表\
  \ 10-2 列出了该接口中常用的方法及其简要说明。请注意，其中许多方法返回的是进程在快照创建时的状态快照。由于进程是异步创建、运行和销毁的，因此无法保证稍后使用其属性时，进程仍处于相同状态。\n\
  \n表 10-2.\n\nProcessHandle 接口中的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `static Stream<ProcessHandle>\
  \ allProcesses()` | 返回操作系统中当前进程可见的所有进程的快照。 |\n| `Stream<ProcessHandle> children()`\
  \ | 返回当前进程的直接子进程的快照。使用 `descendants()` 方法可以获取所有层级的子进程列表，例如，子进程、孙进程、曾孙进程等。 |\n| `static\
  \ ProcessHandle current()` | 返回当前进程的 `ProcessHandle`，即执行此方法调用的 Java 进程。 |\n| `Stream<ProcessHandle>\
  \ descendants()` | 返回进程的后代进程的快照。与仅返回进程直接后代的 `children()` 方法进行比较。 |\n| `boolean destroy()`\
  \ | 请求终止进程。如果成功请求终止进程，则返回 `true`，否则返回 `false`。能否终止进程取决于操作系统的访问控制。 |\n| `boolean\
  \ destroyForcibly()` | 请求强制终止进程。如果成功请求终止进程，则返回 `true`，否则返回 `false`。强制终止会立即结束进程，而正常终止则允许进程进行清理后关闭。能否终止进程取决于操作系统的访问控制。\
  \ |\n| `ProcessHandle.Info info()` | 返回进程信息的快照。 |\n| `boolean isAlive()` | 如果此 `ProcessHandle`\
  \ 所代表的进程尚未终止，则返回 `true`，否则返回 `false`。请注意，在成功请求终止进程后的一段时间内，此方法可能仍返回 `true`，因为进程是异步终止的。\
  \ |\n| `static Optional<ProcessHandle> of(long pid)` | 返回一个现有本地进程的 `Optional<ProcessHandle>`。如果具有指定\
  \ `pid` 的进程不存在，则返回空的 `Optional`。 |\n| `CompletableFuture <ProcessHandle> onExit()`\
  \ | 返回一个用于进程终止的 `CompletableFuture <ProcessHandle>`。你可以使用返回的对象添加一个任务，该任务将在进程终止时执行。对当前进程调用此方法会抛出\
  \ `IllegalStateException`。 |\n| `Optional<ProcessHandle> parent()` | 返回父进程的 `Optional<ProcessHandle>`。\
  \ |\n| `long pid()` | 返回进程的本地进程 ID（PID），该 ID 由操作系统分配。请注意，操作系统可能会重用 PID，因此具有相同 PID\
  \ 的两个进程句柄可能不代表同一个进程。 |\n| `boolean supportsNormalTermination()` | 如果 `destroy()`\
  \ 的实现能够正常终止进程，则返回 `true`。 |\n\n表 10-3 列出了 `ProcessHandle.Info` 嵌套接口的方法和描述。该接口的实例包含进程的快照信息。你可以使用\
  \ `ProcessHandle` 接口或 `Process` 类的 `info()` 方法获取 `ProcessHandle.Info`。该接口中的所有方法都返回一个\
  \ `Optional`。\n\n表 10-3.\n\nProcessHandle.Info 接口中的方法\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| `Optional<String[]> arguments()` | 返回进程的参数。进程在启动后可能会更改传递给它的原始参数。在这种情况下，此方法返回更改后的参数。\
  \ |\n| `Optional<String> command()` | 返回进程的可执行文件路径名。 |\n| `Optional<String> commandLine()`\
  \ | 这是一个便捷方法，用于组合进程的命令和参数。如果 `command()` 和 `arguments()` 方法都返回非空的 `Optional`，则通过组合这两个方法返回的值来返回进程的命令行。\
  \ |\n| `Optional<Instant> startInstant()` | 返回进程的启动时间。如果操作系统不返回启动时间，则返回空的 `Optional`。\
  \ |\n| `Optional<Duration> totalCpuDuration()` | 返回进程使用的总 CPU 时间。请注意，进程可能运行很长时间，但使用的\
  \ CPU 时间却很少。 |\n| `Optional<String> user()` | 返回进程的用户。 |\n\n现在是时候看看 `ProcessHandle`\
  \ 和 `ProcessHandle.Info` 接口的实际应用了。清单 10-3 包含一个名为 `CurrentProcessInfo` 的类的代码。其 `printInfo()`\
  \ 方法接受一个 `ProcessHandle` 作为参数，并打印该进程的详细信息。我们也会在其他示例中使用此方法来打印进程的详细信息。`main()` 方法获取当前运行进程（即一个\
  \ Java 进程）的句柄，并打印其详细信息。你得到的输出可能不同。以下输出是在 Windows 10 上运行该程序时生成的。\n\n```\n// CurrentProcessInfo.java\n\
  package com.jdojo.process;\nimport java.time.Duration;\nimport java.time.Instant;\n\
  import java.time.ZoneId;\nimport java.time.ZonedDateTime;\nimport java.util.Arrays;\n\
  public class CurrentProcessInfo {\npublic static void main(String[] args) {\n//\
  \ 获取当前进程的句柄\nProcessHandle current = ProcessHandle.current();\n// 打印进程详细信息\nprintInfo(current);\n\
  }\npublic static void printInfo(ProcessHandle handle) {\n// 获取进程 ID\nlong pid =\
  \ handle.pid();\n// 进程是否仍在运行\nboolean isAlive = handle.isAlive();\n// 获取其他进程信息\n\
  ProcessHandle.Info info = handle.info();\nString command = info.command().orElse(\"\
  \");\nString[] args = info.arguments()\n.orElse(new String[]{});\nString commandLine\
  \ = info.commandLine().orElse(\"\");\nZonedDateTime startTime = info.startInstant()\n\
  .orElse(Instant.now())\n.atZone(ZoneId.systemDefault());\nDuration duration = info.totalCpuDuration()\n\
  .orElse(Duration.ZERO);\nString owner = info.user().orElse(\"Unknown\");\nlong childrenCount\
  \ = handle.children().count();\n// 打印进程详细信息\nSystem.out.printf(\"PID: %d%n\", pid);\n\
  System.out.printf(\"IsAlive: %b%n\", isAlive);\nSystem.out.printf(\"Command: %s%n\"\
  , command);\nSystem.out.printf(\"Arguments: %s%n\", Arrays.toString(args));\nSystem.out.printf(\"\
  CommandLine: %s%n\", commandLine);\nSystem.out.printf(\"Start Time: %s%n\", startTime);\n\
  System.out.printf(\"CPU Time: %s%n\", duration);\nSystem.out.printf(\"Owner: %s%n\"\
  , owner);\nSystem.out.printf(\"Children Count: %d%n\", childrenCount);\n}\n}\n清单\
  \ 10-3.\n一个打印当前进程详细信息的 CurrentProcessInfo 类\n```\n\n```\nPID: 13420\nIsAlive: true\n\
  Command: C:\\java9\\bin\\java.exe\nArguments: []\nCommandLine:\nStart Time: 2018-01-21T12:48:14.406-06:00[America/Chicago]\n\
  CPU Time: PT0.625S\nOwner: kishori\\ksharan\nChildren Count: 1\n```\n\n\n\n## 比较进程\n\
  \n比较两个进程是否相等或排序是件棘手的事。你不能依赖 PID 来判断进程是否相等。操作系统会在进程终止后重用 PID。你可以同时检查进程的启动时间和 PID；如果两者都相同，那么这两个进程可能是同一个。`ProcessHandle`\
  \ 接口默认实现的 `equals()` 方法会检查以下三项信息来判断两个进程是否相等：\n\n*   两个进程的 `ProcessHandle` 接口的实现类必须相同。\n\
  *   进程必须具有相同的 PID。\n*   进程必须是在同一时间启动的。\n\n提示\n\n使用 `ProcessHandle` 接口中 `compareTo()`\
  \ 方法的默认实现来进行排序并不是很有用。它比较的是两个进程的 PID。\n\n## 创建进程\n\n你需要使用 `ProcessBuilder` 类的实例来启动一个新的原生进程。`ProcessBuilder`\
  \ 管理着一组原生进程的属性。一旦你为进程设置了所有属性，就可以调用其 `start()` 方法来启动一个新的原生进程。存储在 `ProcessBuilder`\
  \ 中的属性将用于启动新进程。你可以多次调用 `start()` 方法，使用存储在 `ProcessBuilder` 中的属性来启动新进程。`start()`\
  \ 方法返回一个代表新原生进程的 `Process` 类实例。你可以使用以下构造函数之一来创建 `ProcessBuilder` 类的实例：\n\n*   `ProcessBuilder(String...\
  \ command)`\n*   `ProcessBuilder(List<String> command)`\n\n这些构造函数允许你指定操作系统程序和参数。假设你想在\
  \ Windows 上运行位于 `C:\\java9\\bin` 目录下的 `java.exe` 程序，命令如下：\n\n```\nC:\\java9\\bin\\\
  java.exe --version\n```\n\n你可以像这样创建一个 `ProcessBuilder` 来表示此命令：\n\n```\nProcessBuilder\
  \ pb = new ProcessBuilder(\"C:\\\\java9\\\\bin\\\\java.exe\", \"--version\");\n\
  ```\n\n使用 `ProcessBuilder` 类的方法，你可以管理进程的以下属性：\n\n*   命令\n*   环境\n*   工作目录\n*   标准\
  \ I/O（`stdin`、`stdout` 和 `stderr`）\n*   标准错误流的重定向属性\n\n命令就是一个字符串列表，代表外部程序及其参数。你可以在\
  \ `ProcessBuilder` 类的构造函数中设置命令。以下方法允许你检索命令字符串并设置更多命令字符串。\n\n*   `List<String> command()`\n\
  *   `ProcessBuilder command(String... command)`\n\n不带任何参数的 `command()` 方法返回已在 `ProcessBuilder`\
  \ 中设置的命令字符串。带有可变参数 `varargs` 的 `command()` 方法允许你添加更多命令字符串。以下代码片段创建了一个 `ProcessBuilder`\
  \ 用于在 Windows 上启动 JVM。它使用 `command()` 方法来设置命令属性。\n\n```\nProcessBuilder pb = new\
  \ ProcessBuilder()\n.command(\"C:\\\\java9\\\\bin\\\\java.exe\",\n\"--module-path\"\
  ,\n\"myModulePath\",\n\"--module\",\n\"myModule/className\");\n```\n\n环境是一组依赖于系统的键值对。它被初始化为从\
  \ `System.getEnv()` 静态方法返回的 `Map<String,String>` 的一个副本。你需要使用 `ProcessBuilder` 类的\
  \ `environment()` 方法来获取 `Map<String,String>`，并向该映射中添加键值对。以下代码片段展示了如何为 `ProcessBuilder`\
  \ 设置环境属性：\n\n```\nProcessBuilder pb = new ProcessBuilder(\"mycommand\");\nMap env\
  \ = pb.environment();\nenv.put(\"arg1\", \"value1\");\nenv.put(\"arg2\", \"value2\"\
  );\n```\n\n默认情况下，新进程的工作目录将是当前 Java 进程的工作目录，该目录通常由系统属性 `user.dir` 命名。`ProcessBuilder`\
  \ 类中的以下方法允许你获取和设置工作目录：\n\n*   `File directory()`\n*   `ProcessBuilder directory(File\
  \ directory)`\n\n以下代码片段展示了如何在 Windows 上将工作目录设置为 `C:\\mydir`：\n\n```\nProcessBuilder\
  \ pb = new ProcessBuilder(\"myCommand\")\n.directory(new File(\"C:\\\\mydir\"));\n\
  ```\n\n\n\n`ProcessBuilder`的`start()`方法创建的新进程是当前进程的子进程，当前进程即运行该代码的 Java 进程。换言之，当前\
  \ Java 进程是新创建进程的父进程。新进程没有用于标准 I/O（`stdin`、`stdout`和`stderr`）的终端或控制台。默认情况下，新进程的 I/O\
  \ 通过管道连接到父进程。你可以通过调用`ProcessBuilder`的`inheritIO()`方法，选择将新进程的标准 I/O 设置为其父进程的相同 I/O。`ProcessBuilder`类中有多个`redirectXxx()`方法，用于自定义新进程的标准\
  \ I/O，例如，将标准错误流设置到文件，以便将所有错误记录到文件中。\n\n配置完进程的所有属性后，可以调用`start()`来启动进程：\n\n```\n\
  // 启动一个新进程\nProcess newProcess = pb.start();\n```\n\n你可以多次调用`ProcessBuilder`类的`start()`方法，以使用先前存储的相同属性启动多个进程。这样做的好处是性能更优，你可以创建一个`ProcessBuilder`实例并重复使用它来多次启动同一个进程。\n\
  \n你可以使用`Process`类的`toHandle()`方法获取进程的进程句柄：\n\n```\n// 获取进程句柄\nProcessHandle handle\
  \ = newProcess.toHandle();\n```\n\n你可以使用进程句柄来销毁进程、等待进程结束，或查询进程的状态和属性，例如其子进程、后代、父进程、使用的\
  \ CPU 时间等。你获取到的进程信息以及对进程的控制能力，取决于操作系统的访问控制。\n\n要编写能在所有操作系统上运行的创建进程的示例，需要一些技巧。如果你能运行本书中的其他示例，说明你的机器上已安装了\
  \ JDK9。你可以使用机器上的`java`程序来启动示例中的其他进程。你可以使用当前进程（即当前正在运行的`java`程序）的命令属性来获取机器上 Java\
  \ 程序的路径，这样示例就能在所有平台上运行。\n\n让我们来看几个使用 Java 程序创建原生进程的示例。你可以分别使用`--version`和`-version`选项，将\
  \ Java 产品版本信息打印到标准输出和标准错误，如下所示：\n\n```\njava --version\n```\n\n```\njava 9.0.1\n\
  Java(TM) SE Runtime Environment (build 9.0.1+11)\nJava HotSpot(TM) 64-Bit Server\
  \ VM (build 9.0.1+11, mixed mode)\n```\n\n```\njava -version\n```\n\n```\njava version\
  \ \"9.0.1\"\nJava(TM) SE Runtime Environment (build 9.0.1+11)\nJava HotSpot(TM)\
  \ 64-Bit Server VM (build 9.0.1+11, mixed mode)\n```\n\n在前面的输出中，你看不到输出打印位置有任何区别。两个输出都打印到同一个控制台，因为默认情况下，标准输出和标准错误都映射到控制台。然而，当你尝试在程序中捕获这两个命令的输出时，就会看到区别。\n\
  \n清单 10-4 展示了一个程序，它运行`java --version`命令，将 Java 产品信息打印到标准输出。\n\n```\n// PipedIO.java\n\
  package com.jdojo.process;\nimport java.io.IOException;\npublic class PipedIO {\n\
  public static void main(String[] args) {\n// 获取启动此程序的 java 程序的路径\nString javaPath\
  \ = ProcessHandle.current()\n.info()\n.command().orElse(null);\nif(javaPath == null)\
  \ {\nSystem.out.println(\"无法获取 java 命令的路径。\");\nreturn;\n}\n// 配置 ProcessBuilder\n\
  ProcessBuilder pb = new ProcessBuilder(javaPath,  \"--version\");\ntry {\n// 启动一个新的\
  \ java 进程\nProcess p = pb.start();\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 10-4.\n捕获原生进程的输出\n```\n\n\n\n当你运行 `ProcessIO` 类程序时，它不会打印任何内容。输出去了哪里？该程序创建了一个新进程，并且该进程的标准输出通过管道连接到了父进程。如果你想访问输出，你需要从相应的管道中读取。当新进程的标准\
  \ I/O 通过管道连接到父进程时，你可以使用 `Process` 类的以下方法来获取新进程的 I/O 流：\n\n*   `OutputStream getOutputStream()`\n\
  *   `InputStream getInputStream()`\n*   `InputStream getErrorStream():`\n\n`getOutputStream()`\
  \ 方法返回的 `OutputStream` 连接到新进程的标准输入流。向此输出流写入数据将通过管道传输到新进程的标准输入。\n\n`getInputStream()`\
  \ 方法返回的 `InputStream` 连接到新进程的标准输出。如果你想捕获新进程的标准输出，你需要从这个输入流中读取。\n\n`getErrorStream()`\
  \ 方法返回的 `InputStream` 连接到新进程的标准错误。如果你想捕获新进程的标准错误，你需要从这个输入流中读取。有时，你可能希望将标准输出和标准错误的输出合并到一个目标。这样可以提供输出和错误的精确顺序，便于排查问题。你可以调用\
  \ `ProcessBuilder` 的 `redirectErrorStream(true)` 方法，将写入标准错误的数据发送到标准输出。稍后我会展示此类示例。\n\
  \n提示\n\n你可以选择将新进程的标准 I/O 重定向到其他目标，例如文件，在这种情况下，`getOutputStream()`、`getInputStream()`\
  \ 和 `getErrorStream()` 方法将返回 `null`。\n\n清单 10-5 中的程序修复了 `PipedIO` 类中无法获取任何输出的问题。它读取并打印通过管道写入标准输出流的数据。\n\
  \n```\n// CapturePipedIO.java\npackage com.jdojo.process;\nimport java.io.BufferedReader;\n\
  import java.io.IOException;\nimport java.io.InputStreamReader;\npublic class CapturePipedIO\
  \ {\npublic static void main(String[] args) {\n// 获取启动此程序的 java 命令的路径\nString javaPath\
  \ = ProcessHandle.current()\n.info()\n.command().orElse(null);\nif (javaPath ==\
  \ null) {\nSystem.out.println(\"无法获取 java 命令的路径。\");\nreturn;\n}\n// 配置 ProcessBuilder\n\
  ProcessBuilder pb = new ProcessBuilder(javaPath, \"--version\");\ntry {\n// 启动一个新的\
  \ java 进程\nProcess p = pb.start();\n// 读取并打印进程的标准输出流\ntry (BufferedReader input\
  \ =\nnew BufferedReader(new InputStreamReader(p.getInputStream()))) {\nString line;\n\
  while ((line = input.readLine()) != null) {\nSystem.out.println(line);\n}\n}\n}\
  \ catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n清单 10-5.\n捕获原生进程的输出\n\
  ```\n\n```\njava 9.0.1\nJava(TM) SE Runtime Environment (build 9.0.1+11)\nJava HotSpot(TM)\
  \ 64-Bit Server VM (build 9.0.1+11, mixed mode)\n```\n\n如果你使用 `-version` 选项运行 `java`\
  \ 命令，输出会写入标准错误。如果你将清单 10-5 中的选项从 `--version` 改为 `-version`，你将再次无法获得任何输出，因为输出将通过管道传输到标准错误流。你有两种方法来解决这个问题：\n\
  \n*   在程序中，从 `Process` 的 `getErrorStream()` 方法返回的 `InputStream` 中读取，而不是从 `getInputStream()`\
  \ 方法返回的 `InputStream` 中读取。\n*   将错误流重定向到标准输出流，并继续从标准输出中读取。\n\n以下代码片段使用 `java -version`\
  \ 命令创建了一个 `ProcessBuilder`，并将错误流重定向到标准输出：\n\n```\n// 配置 ProcessBuilder\nProcessBuilder\
  \ pb = new ProcessBuilder(javaPath, \"-version\")\n.redirectErrorStream(true);\n\
  ```\n\n如果你将清单 10-5 中创建 `ProcessBuilder` 的语句替换为此语句，你的程序将正常工作。\n\n新进程也可以继承父进程的标准 I/O。如果你想将新进程的所有\
  \ I/O 目标设置为与当前进程相同，请使用 `ProcessBuilder` 的 `inheritIO()` 方法，如下所示：\n\n```\n// 配置 ProcessBuilder\
  \ 以继承父进程的 I/O\nProcessBuilder pb = new ProcessBuilder(javaPath,  \"--version\")\n\
  .inheritIO();\n```\n\n如果你将清单 10-4 中的代码修改为与上述代码片段一致，你将看到输出。\n\n`ProcessBuilder.Redirect`\
  \ 嵌套类表示由 `ProcessBuilder` 创建的新进程的输入源和输出目标。该类定义了以下三个 `ProcessBuilder.Redirect` 类型的常量：\n\
  \n*   `ProcessBuilder.Redirect DISCARD`：丢弃新进程的输出。此常量在 JDK9 中添加。\n*   `ProcessBuilder.Redirect.INHERIT`：表示新进程的输入源或输出目标将与当前进程相同。\n\
  *   `ProcessBuilder.Redirect.PIPE`：表示新进程将通过管道连接到当前进程，这是默认设置。\n\n你还可以使用 `Process.Redirect`\
  \ 类的以下方法将新进程的输入和输出重定向到文件：\n\n*   `ProcessBuilder.Redirect appendTo(File file)`\n\
