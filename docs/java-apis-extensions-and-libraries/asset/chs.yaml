  \ 服务之外的任何服务。你可以通过使用 `--limit-modules` 选项将可观察模块的范围限制为以下五个模块来实现这一点：\n\n*   `java.base`\n\
  *   `jdojo.prime`\n*   `jdojo.prime.faster`\n*   `jdojo.prime.probable`\n*   `jdojo.prime.client`\n\
  \n以下命令是上一个命令的修订版。此命令使用了 `--limit-modules`。请注意，你没有将 `jdojo.prime.client` 模块包含在 `--limit-modules`\
  \ 中，因为该模块已经在 `--add-modules` 中了。将其包含在 `--limit-modules` 的模块列表中不会产生任何区别。这次，你的运行时镜像将是\
  \ 36MB，与第一次一样。\n\n```\nC:\\Java9APIsAndModules>jlink --module-path jmods;C:\\java9\\\
  jmods\n--add-modules jdojo.prime.client --compress 2\n--strip-debug\n--launcher\
  \ runprimechecker=jdojo.prime.client/com.jdojo.prime.client.Main\n--bind-services\n\
  --limit-modules java.base,jdojo.prime,jdojo.prime.faster,jdojo.prime.probable\n\
  --output image\\image\\primecheckercompactservice\n```\n\n\n\n## 使用 jlink 工具的插件\n\
  \n`jlink` 工具采用插件架构来创建运行时镜像。它会将所有类、本地库和配置文件收集到一组资源中，并构建一个转换器管道，这些转换器是通过命令行选项指定的插件。资源被送入管道，管道中的每个转换器都会对资源进行某种转换，转换后的资源再传递给下一个转换器。最后，`jlink`\
  \ 将转换后的资源送入镜像构建器。\n\nJDK9 随 `jlink` 工具附带了几个插件。这些插件定义了命令行选项。要使用某个插件，你需要使用其对应的命令行选项。你可以使用\
  \ `--list-plugins` 选项运行 `jlink` 工具，以打印所有可用插件及其描述和命令行选项的列表：\n\n```\nC:\\Java9APIsAndModules>jlink\
  \ --list-plugins\n```\n\n```\n可用插件列表：\n插件名称：class-for-name\n选项：--class-for-name\n\
  描述：类优化：将 Class.forName 调用转换为常量加载。\n插件名称：compress\n选项：--compress=[:filter=]\n描述：压缩输出镜像中的所有资源。\n\
  级别 0：无压缩\n级别 1：常量字符串共享\n级别 2：ZIP。\n可以指定一个可选的过滤器来列出要包含的文件模式。\n插件名称：dedup-legal-notices\n\
  选项：--dedup-legal-notices=[error-if-not-same-content]\n描述：对所有法律声明进行去重。如果指定了 error-if-not-same-content，\n\
  则当两个同名文件内容不同时会报错。\n插件名称：exclude-files\n选项：--exclude-files= 要排除的文件\n描述：指定要排除的文件。例如：**.java,glob:/java.base/lib/client/**\n\
  插件名称：exclude-jmod-section\n选项：--exclude-jmod-section=\n其中  是 \"man\" 或 \"headers\"\
  。\n描述：指定要排除的 JMOD 部分。\n插件名称：exclude-resources\n选项：--exclude-resources= 要排除的资源\n\
  描述：指定要排除的资源。例如：**.jcov,glob:**/META-INF/**\n插件名称：generate-jli-classes\n选项：--generate-jli-classes=@filename[:ignore-version=]\n\
  描述：指定一个文件，列出要预生成的 java.lang.invoke 类。\n默认情况下，此插件可能使用内置的类列表进行预生成。\n如果此插件在不同于所创建镜像的运行时版本上运行，则默认会禁用代码生成以保证正确性——添加\
  \ ignore-version=true 可覆盖此行为。\n插件名称：include-locales\n选项：--include-locales=[,]*\n\
  描述：BCP 47 语言标签，以逗号分隔，允许 RFC 4647 中定义的区域匹配。\n例如：en,ja,*-IN\n插件名称：order-resources\n\
  选项：--order-resources= 按优先级顺序排列的路径。如果指定了 @file，\n则每一行应为要排序路径的精确匹配。\n描述：对资源进行排序。例如：**/module-info.class,@classlist,/java.base/java/lang/**\n\
  插件名称：release-info\n选项：--release-info=|add:=:=:...|del:\n描述： 选项是从提供的文件加载发布属性。\nadd:\
  \ 是向发布文件添加属性。\n可以传递任意数量的 = 对。\ndel: 是删除发布文件中的键列表。\n插件名称：strip-debug\n选项：--strip-debug\n\
  描述：从输出镜像中剥离调试信息。\n插件名称：strip-native-commands\n选项：--strip-native-commands\n描述：从镜像中排除本地命令（例如\
  \ java/java.exe）。\n插件名称：system-modules\n选项：--system-modules=retainModuleTarget\n\
  描述：模块描述符的快速加载（始终启用）。\n插件名称：vm\n选项：--vm=\n描述：选择输出镜像中的 HotSpot VM。默认为 all。\n对于需要 \
  \ 的选项，该值将是一个逗号分隔的元素列表，每个元素使用以下形式之一：\n\nglob:\nregex:\n@ 其中 filename 是包含要使用的模式的文件名，每行一个模式。\n\
  ```\n\n以下命令使用了 `compress` 和 `strip-debug` 插件。`compress` 插件会压缩镜像，从而减小镜像大小。我使用了压缩级别\
  \ 2 以获得最大压缩率。`strip-debug` 插件会从 Java 代码中移除调试信息，从而进一步减小镜像大小。\n\n```\nC:\\Java9APIsAndModules>jlink\
  \ --module-path jmods;C:\\java9\\jmods\n--add-modules jdojo.prime.client,jdojo.prime.faster,jdojo.prime.probable\n\
  --compress 2\n--strip-debug\n--launcher runprimechecker=jdojo.prime.client/com.jdojo.prime.client.Main\n\
  --output image\\primecheckercompact\n```\n\n输出被复制到了 `image\\primecheckercompact`\
  \ 目录。新镜像的大小为 33MB，而之前在 `image\\primechecker` 目录中创建的镜像大小为 36MB。由于你使用了这两个插件，镜像大约紧凑了\
  \ 39%。\n\n提示\n\n在撰写本文时，插件 API 仍严格处于实验阶段，且插件的执行顺序尚未定义。在其早期实现中，`jlink` 工具也支持自定义插件，但后来被移除了。\n\
  \n\n\n## jimage 工具\n\nJava 运行时将 JDK 运行时映像存储在 JIMAGE 文件中。该文件名为 `modules`，位于 `JAVA_HOME\\\
  lib` 目录下，其中 `JAVA_HOME` 可以是你的 `JDK_HOME` 或 `JRE_HOME`。JDK9 还附带了一个 `jimage` 工具，用于探索\
  \ JIMAGE 文件的内容。该工具可以：\n\n*   从 JIMAGE 文件中提取条目\n*   打印存储在 JIMAGE 文件中的内容摘要\n*   打印条目列表，例如它们的名称、大小、偏移量等\n\
  *   验证类文件\n\n`jimage` 工具存储在 `JDK_HOME\\bin` 目录中。该命令的一般格式如下：\n\n```\njimage <子命令>\
  \ <选项> <jimage-文件列表>\n```\n\n其中，`<子命令>` 是表 12-3 中列出的子命令之一。`<选项>` 是表 12-4 中列出的一个或多个选项；`<jimage-文件列表>`\
  \ 是一个以空格分隔的 JIMAGE 文件列表，用于指定要探索的文件。\n\n表 12-4.\n\n与 jimage 工具一起使用的选项列表\n\n| 选项 |\
  \ 描述 |\n| --- | --- |\n| `--dir <目录名>` | 为 `extract` 子命令指定目标目录，JIMAGE 文件中的条目将被提取到该目录。\
  \ |\n| `-h`, `--help` | 打印 `jimage` 工具的使用信息。 |\n| `--include <模式列表>` | 指定用于过滤条目的模式列表。模式列表的值是一个逗号分隔的元素列表，每个元素使用以下形式之一：\
  \ • `<glob-模式>` • `glob:<glob-模式>` • `regex:<正则表达式模式>` |\n| `--verbose` | 与 `list`\
  \ 子命令一起使用时，打印条目详细信息，如大小、偏移量和压缩级别。 |\n| `--version` | 打印 `jimage` 工具的版本信息。 |\n\n\
  表 12-3.\n\n与 jimage 工具一起使用的子命令列表\n\n| 子命令 | 描述 |\n| --- | --- |\n| `extract` | 将指定\
  \ JIMAGE 文件中的所有条目提取到当前目录。使用 `--dir` 选项为提取的条目指定另一个目录。 |\n| `info` | 打印指定 JIMAGE 文件头部中包含的详细信息。\
  \ |\n| `list` | 打印指定 JIMAGE 文件中所有模块及其条目的列表。使用 `--verbose` 选项可以包含条目的详细信息，例如其大小、偏移量以及条目是否被压缩。\
  \ |\n| `verify` | 打印指定 JIMAGE 文件中未通过类验证的 `.class` 条目列表。 |\n\n我将展示几个使用 `jimage` 命令的示例。示例使用存储在我电脑上\
  \ `C:\\java9\\lib\\modules` 的 JDK9 运行时映像。当你运行这些示例时，需要将此映像位置替换为你自己的。你也可以在这些示例中使用由\
  \ `jlink` 工具创建的任何自定义运行时映像。\n\n以下命令从运行时映像中提取所有条目，并将它们复制到 `extracted_jdk` 目录。该命令需要几秒钟才能完成。\n\
  \n```\nC:\\Java9APIsAndModules>jimage extract --dir extracted_jdk C:\\java9\\lib\\\
  modules\n```\n\n以下命令将 JDK 运行时映像中所有扩展名为 `.png` 的映像条目提取到 `extracted_images` 目录中：\n\
  \n```\nC:\\Java9APIsAndModules>jimage extract --include regex:.+\\.png\n--dir extracted_images\
  \ C:\\java9\\lib\\modules\n```\n\n以下命令列出运行时映像中的所有条目。显示部分输出：\n\n```\nC:\\Java9APIsAndModules>jimage\
  \ list C:\\java9\\lib\\modules\n```\n\n```\njimage: C:\\java9\\lib\\modules\nModule:\
  \ java.activation\nMETA-INF/mailcap.default\nMETA-INF/mimetypes.default\n...\nModule:\
  \ java.annotations.common\njavax/annotation/Generated.class\n...\n```\n\n以下命令列出运行时映像中的所有条目以及条目的详细信息。注意使用了\
  \ `--verbose` 选项。显示部分输出。\n\n```\nC:\\Java9APIsAndModules>jimage list --verbose C:\\\
  java9\\lib\\modules\n```\n\n```\njimage: C:\\java9\\lib\\modules\nModule: java.activation\n\
  Offset     Size   Compressed Entry\n34214466    292            0 META-INF/mailcap.default\n\
  34214758    562            0 META-INF/mimetypes.default\n...\nModule: java.annotations.common\n\
  Offset     Size   Compressed Entry\n34296622    678            0 javax/annotation/Generated.class\n\
  ...\n```\n\n以下命令打印无效的类文件列表。你可能想知道如何使类文件无效。通常，你不会拥有无效的类文件——但黑客会！然而，为了运行这个示例，我需要有一个无效的类文件。我使用了一个简单的想法——获取一个有效的类文件，在文本编辑器中打开它，然后部分随机地删除其内容，使其成为无效的类文件。我将一个已编译类文件的内容复制到\
  \ `Main2.class` 文件中，并删除了其中的一些内容，使其成为无效的类。我将 `Main2.class` 文件添加到 `jdojo.prime.client`\
  \ 模块中，与 `Main.class` 位于同一目录。我为此示例使用之前的命令为素数检查应用程序重新创建了运行时映像。如果你使用 JDK 自带的 Java 运行时映像，你将看不到任何输出，因为\
  \ JDK 运行时映像中的所有类文件都是有效的。\n\n```\nC:\\Java9APIsAndModules>jimage verify image\\primechecker\\\
  lib\\modules\n```\n\n```\njimage: primechecker\\lib\\modules\nError(s) in Class:\
  \ /jdojo.prime.client/com/jdojo/prime/client/Main2.class\n```\n\n## 总结\n\n在 JDK9\
  \ 中，运行时映像以一种称为 JIMAGE 的特殊格式存储，该格式针对空间和速度进行了优化。JIMAGE 格式仅在运行时支持。它是一种用于在 JDK 中存储和索引模块、类及资源的容器格式。从\
  \ JIMAGE 文件中搜索和加载类比从 JAR 和 JMOD 文件中快得多。JIMAGE 格式是 JDK 内部的，开发者很少需要直接与 JIMAGE 文件交互。\n\
  \nJDK9 附带了一个名为 `jlink` 的工具，它允许你为应用程序创建 JIMAGE 格式的运行时映像，该映像将包含应用程序模块以及应用程序使用的那些平台模块。`jlink`\
  \ 工具可以从存储在模块 JAR、展开目录和 JMOD 文件中的模块创建运行时映像。JDK9 附带了一个名为 `jimage` 的工具，可用于探索 JIMAGE\
  \ 文件的内容。\n\n问题与练习\n\n1.  什么是自定义 Java 运行时映像？  \n2.  什么是 JIMAGE 格式？  \n3.  什么是 `jlink`\
