  \ `Circle`。\n11. 编写一个程序，使用 JavaFX 可观察列表，将列表中所有整数的总和打印到标准输出。当列表的元素发生变化时，打印新的总和。\n\
  12. 什么是事件捕获和事件冒泡阶段？如果您想禁用一个节点及其所有子节点上的特定类型事件，您将编写哪种处理器：事件过滤器还是事件处理器？\n13. 修改本章源代码中的\
  \ `EventHandling` 类。添加另一个带有标签“禁用鼠标点击”的 `CheckBox`。当选中此 `CheckBox` 时，整个舞台的鼠标点击事件被禁用。您无法使用鼠标点击两个\
  \ `CheckBox` 节点或任何其他节点。当您取消选中 `CheckBox` 时，鼠标点击事件应像示例程序中那样工作。（提示：尝试同时禁用鼠标按下事件以禁用\
  \ `CheckBox` 节点的选择。）\n14. 标准按钮（例如“是”、“否”和“取消”）在不同操作系统上以不同的顺序显示。您必须将两个按钮（“是”和“否”）打包到一个水平栏中，其中按钮的顺序取决于操作系统。说出您将用来实现此目的的控件名称。\n\
  15. `Group` 节点的用途是什么？说出两个充当容器的面板名称。\n16. 命名并定义五个 UI 控件。\n17. JavaFX 支持哪些类型的形状——仅\
  \ 2D、仅 3D，还是两者都支持？\n18. JavaFX 中 `Canvas` 的用途是什么？\n19. JavaFX 中的效果、变换和动画是什么？\n20.\
  \ 什么是 FXML？\n21. 编写一个程序，打印默认打印机名称。如果没有安装默认打印机，则应打印消息 `\"未找到打印机\"`。\n\n# 9. Java\
  \ 中的脚本编写\n\n在本章中，您将学习：\n\n*   什么是 Java 中的脚本编写\n*   如何从 Java 执行脚本以及如何向脚本传递参数\n* \
  \  `ScriptContext` 如何在执行脚本时使用\n*   如何在脚本中使用 Java 编程语言\n*   如何实现脚本引擎\n*   如何使用 `jrunscript`\
  \ 和 `jjs` 命令行工具执行脚本\n\n除非另有说明，本章中的所有示例程序都是 `jdojo.script` 模块的成员，如清单 9-1 中所声明。\n\n\
  ```\n// module-info.java\nmodule jdojo.script {\n    requires java.scripting;\n\
  \    exports com.jdojo.script;\n}\n清单 9-1.\njdojo.script 模块的声明\n```\n\nJDK 中的脚本支持位于\
  \ `java.scripting` 模块中。使用 Java 脚本 API 的模块需要像 `jdojo.script` 模块那样读取 `java.scripting`\
  \ 模块。\n\n\n\n## Java 中的脚本是什么？\n\n有些人认为 Java 虚拟机（JVM）只能执行用 Java 编程语言编写的程序，但事实并非如此。JVM\
  \ 执行的是与语言无关的字节码。只要程序能被编译成 Java 字节码，JVM 就能执行用任何编程语言编写的程序。\n\n脚本语言是一种编程语言，它提供了编写脚本的能力，这些脚本由称为脚本引擎（或解释器）的运行时环境进行求值（或解释）。脚本是一系列字符，使用脚本语言的语法编写，并作为由解释器执行的程序的源代码。解释器解析脚本，生成中间代码（即程序的内部表示），并执行中间代码。解释器将脚本中使用的变量存储在称为符号表的数据结构中。\n\
  \n通常，与编译型编程语言不同，脚本语言中的源代码（称为脚本）不会被编译，而是在运行时被解释。然而，用某些脚本语言编写的脚本可能会被编译成可由 JVM 运行的\
  \ Java 字节码。\n\nJava 6 为 Java 平台增加了脚本支持，允许 Java 应用程序执行用 Rhino JavaScript、Groovy、Jython、JRuby、Nashorn\
  \ JavaScript 等脚本语言编写的脚本。它支持双向通信，还允许脚本访问宿主应用程序创建的 Java 对象。Java 运行时和脚本语言运行时可以相互通信并利用彼此的特性。\n\
  \nJava 中的脚本语言支持是通过 Java 脚本 API 实现的。Java 脚本 API 中的所有类和接口都位于 `javax.script` 包中，该包属于\
  \ `java.scripting` 模块。\n\n在 Java 应用程序中使用脚本语言有几个优点：\n\n*   大多数脚本语言是动态类型的，这使得编写程序更简单。\n\
  *   它们提供了一种更快速开发和测试小型应用程序的方式。\n*   最终用户可以进行定制。\n*   脚本语言可能提供 Java 中没有的领域特定功能。\n\n\
  脚本语言也有一些缺点。例如，动态类型有利于编写更简单的代码；然而，当类型被错误解释，导致你必须花费大量时间调试时，它就变成了一个缺点。\n\nJava 中的脚本支持让你能够两全其美：它允许你使用\
  \ Java 编程语言开发应用程序中静态类型、可扩展且高性能的部分，同时使用适合其他部分领域特定需求的脚本语言。\n\n我在本章中频繁使用“脚本引擎”这个术语。脚本引擎是一个执行用脚本语言编写的程序的软件组件。通常（但不一定），脚本引擎是脚本语言解释器的一种实现。几种脚本语言的解释器已经用\
  \ Java 实现。它们暴露了编程接口，以便 Java 程序可以与它们交互。\n\nJDK7 附带了一个名为 Rhino JavaScript 的脚本引擎。JDK8\
  \ 将 Rhino JavaScript 引擎替换为一个更轻量、更快的脚本引擎，名为 Nashorn JavaScript。本章讨论的是 Nashorn JavaScript，而不是\
  \ Rhino JavaScript。\n\nECMAScript（ES）是由欧洲计算机制造商协会（ECMA）为脚本语言制定的语言规范。ES 有多种实现，例如\
  \ JavaScript、JScript 和 Nashorn JavaScript。你可以在 [`http://www.ecma-international.org/publications/standards/Ecma-262.htm`](http://www.ecma-international.org/publications/standards/Ecma-262.htm)\
  \ 获取 ECMAScript 的最新信息。ECMAScript 的最新版本是 ECMAScript 8（ES8）或 ECMAScript 2017。JDK 8u40\
  \ 中的 Nashorn JavaScript 增加了对三个 ES6 特性的支持：`let`、`const` 和块作用域。在 JDK9 中，Nashorn JavaScript\
  \ 部分支持 ECMAScript 6（ES6）或 ECMAScript 2015。JDK9 中支持的 ES6 特性如下：\n\n*   模板字符串\n*  \
  \ `let`、`const` 和块作用域\n*   迭代器和 `for..of` 循环\n*   `Map`、`Set`、`WeakMap` 和 `WeakSet`\n\
  *   `Symbol`\n*   二进制和八进制字面量\n\n提示\n\nNashorn 中的 ES6 支持默认未启用。你需要向 Nashorn 引擎传递 `--language=es6`\
  \ 参数以启用 ES6 支持。以下命令展示了如何从命令行启用 Nashorn 中的 ES6 支持：\n\n```\njava -Dnashorn.args=--language=es6\
  \ \n```\n\nJava 包含一个名为 `jrunscript` 的命令行 shell，可用于以交互模式或批处理模式运行脚本。`jrunscript` shell\
  \ 是与脚本语言无关的；默认语言是 Nashorn。我将在本章后面详细讨论 `jrunscript` shell。JDK8 包含了另一个名为 `jjs` 的命令行工具，它调用\
  \ Nashorn 引擎并提供 Nashorn 特定的命令行选项。如果你正在使用 Nashorn，你应该优先使用 `jjs` 命令行工具而不是 `jrunscript`。我将在本章后面讨论\
  \ `jjs` 命令行工具。\n\nJava 可以执行任何提供了脚本引擎实现的脚本语言编写的脚本。例如，Java 可以执行用 Nashorn JavaScript、Rhino\
  \ JavaScript、Groovy、Jython、JRuby 等编写的脚本。本章中的示例使用 Nashorn JavaScript 语言。\n\n在本章中，“Nashorn”、“Nashorn\
  \ 引擎”、“Nashorn JavaScript”、“Nashorn JavaScript 引擎”、“Nashorn 脚本语言”和“JavaScript”这些术语被同义使用。\n\
  \n\n\n## 执行你的第一个脚本\n\n在本节中，你将使用 Nashorn 在标准输出上打印一条消息。使用其他脚本语言打印消息的步骤相同，但有一个区别：你需要使用特定脚本语言的代码来打印消息。要在\
  \ Java 中运行脚本，你需要执行以下三个步骤：\n\n*   创建一个脚本引擎管理器。\n*   从脚本引擎管理器中获取一个脚本引擎实例。\n*   调用脚本引擎的\
  \ `eval()` 方法来执行脚本。\n\n脚本引擎管理器是 `ScriptEngineManager` 类的一个实例。\n\n```\n// 创建一个脚本引擎管理器\n\
  ScriptEngineManager manager = new ScriptEngineManager();\n```\n\n`ScriptEngine`\
  \ 接口的一个实例代表 Java 程序中的一个脚本引擎。`ScriptEngineManager` 的 `getEngineByName(String engineShortName)`\
  \ 方法返回一个脚本引擎实例。要获取 Nashorn 引擎的实例，请使用 `JavaScript` 作为引擎的简称，如下所示：\n\n```\n// 获取 Nashorn\
  \ 引擎的引用\nScriptEngine engine = manager.getEngineByName(\"JavaScript\");\n```\n\n\
  提示\n\n脚本引擎的简称是区分大小写的。有时一个脚本引擎有多个简称。Nashorn 引擎有以下简称：`nashorn`、`Nashorn`、`js`、`JS`、`JavaScript`、`javascript`、`ECMAScript`\
  \ 和 `ecmascript`。你可以使用这些引擎简称中的任何一个，通过 `ScriptEngineManager` 类的 `getEngineByName()`\
  \ 方法来获取其实例。\n\n在 Nashorn 中，`print()` 函数在标准输出上打印一条消息。Nashorn 中的字符串字面量是用单引号或双引号括起来的字符序列。以下代码片段将一个\
  \ Nashorn 脚本存储在一个 Java `String` 对象中，该脚本向标准输出打印 `Hello Scripting!`：\n\n```\n// 将\
  \ Nashorn 脚本存储在 String 中\nString script = \"print('Hello Scripting!')\";\n```\n\n\
  如果你想在 Nashorn 中使用双引号来括起字符串字面量，语句将如下所示：\n\n```\n// 将 Nashorn 脚本存储在 String 中\nString\
  \ script = \"print(\\\"Hello Scripting!\\\")\";\n```\n\n要执行脚本，你需要将脚本传递给脚本引擎的 `eval()`\
  \ 方法。脚本引擎在运行脚本时可能会抛出 `ScriptException`。因此，在调用 `ScriptEngine` 的 `eval()` 方法时，你需要处理此异常。以下代码片段执行存储在\
  \ `script` 变量中的脚本：\n\n```\ntry {\nengine.eval(script);\n} catch (ScriptException\
  \ e) {\ne.printStackTrace();\n}\n```\n\n清单 9-2 包含了在标准输出上打印消息的完整程序代码。\n\n```\n//\
  \ HelloScripting.java\npackage com.jdojo.script;\nimport javax.script.ScriptEngine;\n\
  import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
  public class HelloScripting {\npublic static void main(String[] args) {\n// 创建一个脚本引擎管理器\n\
  ScriptEngineManager manager = new ScriptEngineManager();\n// 从管理器获取一个 Nashorn 脚本引擎\n\
  ScriptEngine engine = manager.getEngineByName(\"JavaScript\");\n// 将 Nashorn 脚本存储在\
  \ String 中\nString script = \"print('Hello Scripting!')\";\ntry {\n// 执行脚本\nengine.eval(script);\n\
  } catch (ScriptException e) {\ne.printStackTrace();\n}\n}\n}\n清单 9-2.\n使用 Nashorn\
  \ 在标准输出上打印消息\n```\n\n```\nHello Scripting!\n```\n\n## 使用其他脚本语言\n\n在 Java 程序中使用除\
  \ Nashorn 之外的脚本语言非常简单。在使用脚本引擎之前，你只需要完成一项任务：将特定脚本引擎的 JAR 文件包含在你的应用程序模块路径中。脚本引擎的实现者会提供这些\
  \ JAR 文件。\n\nJDK9 服务提供者机制将列出所有其模块化 JAR 或 JAR 文件已包含在应用程序模块路径中的脚本引擎。`ScriptEngineFactory`\
  \ 接口的实例用于创建和描述脚本引擎。脚本引擎的提供者为 `ScriptEngineFactory` 接口提供实现。`ScriptEngineManager`\
  \ 的 `getEngineFactories()` 方法返回所有可用脚本引擎工厂的 `List<ScriptEngineFactory>`。`ScriptEngineFactory`\
  \ 的 `getScriptEngine()` 方法返回 `ScriptEngine` 的一个实例。工厂的其他几个方法返回关于引擎的元数据。\n\n清单 9-3\
  \ 展示了如何打印所有可用脚本引擎的详细信息。输出显示 JRuby 的脚本引擎是可用的。它之所以可用，是因为我已经将包含 JRuby 脚本引擎的 `jruby.jar`\
  \ 文件添加到了我机器上的模块路径中。你可以从 [`http://www.jruby.org/`](http://www.jruby.org/) 下载 JRuby\
  \ 脚本引擎。当你已将脚本引擎的 JAR 文件包含在模块路径中，并且想知道脚本引擎的简称时，此程序会很有帮助。运行程序时，你可能会得到不同的输出。如果你只对使用\
  \ Nashorn 感兴趣，则无需在机器上安装任何东西。Nashorn 脚本引擎随 JDK9 一起提供。\n\n```\n// ListingAllEngines.java\n\
  package com.jdojo.script;\nimport java.util.List;\nimport javax.script.ScriptEngineFactory;\n\
  import javax.script.ScriptEngineManager;\npublic class ListingAllEngines {\npublic\
  \ static void main(String[] args) {\nScriptEngineManager manager = new ScriptEngineManager();\n\
  // 获取所有可用引擎的列表\nList list = manager.getEngineFactories();\n// 打印每个引擎的详细信息\nfor (ScriptEngineFactory\
  \ f : list) {\nSystem.out.println(\"引擎名称:\" + f.getEngineName());\nSystem.out.println(\"\
  引擎版本:\" + f.getEngineVersion());\nSystem.out.println(\"语言名称:\" + f.getLanguageName());\n\
  System.out.println(\"语言版本:\" + f.getLanguageVersion());\nSystem.out.println(\"引擎简称:\"\
  \ + f.getNames());\nSystem.out.println(\"MIME 类型:\" + f.getMimeTypes());\nSystem.out.println(\"\
  ----------------------------\");\n}\n}\n}\n清单 9-3.\n列出所有可用的脚本引擎\n```\n\n```\n引擎名称:JSR\
  \ 223 JRuby Engine\n引擎版本:9.1.15.0\n语言名称:ruby\n语言版本:jruby 9.1.15.0\n引擎简称:[ruby, jruby]\n\
  MIME 类型:[application/x-ruby]\n\n引擎名称:Oracle Nashorn\n引擎版本:9.0.1\n语言名称:ECMAScript\n\
  语言版本:ECMA - 262 Edition 5.1\n引擎简称:[nashorn, Nashorn, js, JS, JavaScript, javascript,\
  \ ECMAScript, ecmascript]\nMIME 类型:[application/javascript, application/ecmascript,\
  \ text/javascript, text/ecmascript]\n\n```\n\n清单 9-4 展示了如何使用 JavaScript、Groovy、Jython\
  \ 和 JRuby 在标准输出上打印消息。如果某个脚本引擎不可用，程序会打印一条相应的消息。你可能会得到不同的输出。\n\n\n\n```\n// HelloEngines.java\n\
  package com.jdojo.script;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
  import javax.script.ScriptException;\npublic class HelloEngines {\npublic static\
  \ void main(String[] args) {\n// 获取脚本引擎管理器\nScriptEngineManager manager = new ScriptEngineManager();\n\
  // 尝试在 Nashorn、Groovy、Jython 和 JRuby 中执行脚本\nexecute(manager, \"JavaScript\", \"\
  print('Hello JavaScript')\");\nexecute(manager, \"Groovy\", \"println('Hello Groovy')\"\
  );\nexecute(manager, \"jython\", \"print 'Hello Jython'\");\nexecute(manager, \"\
  jruby\", \"puts('Hello JRuby')\");\n}\npublic static void execute(ScriptEngineManager\
  \ manager, String engineName, String script) {\n// 尝试获取引擎\nScriptEngine engine =\
  \ manager.getEngineByName(engineName);\nif (engine == null) {\nSystem.out.println(engineName\
  \ + \" 不可用。\");\nreturn;\n}\n// 如果执行到这里，说明引擎已安装。因此，运行脚本\ntry {\nengine.eval(script);\n\
  } catch (ScriptException e) {\ne.printStackTrace();\n}\n}\n}\n清单 9-4.\n使用不同脚本语言在标准输出上打印消息\n\
  ```\n\n```\nHello JavaScript\nGroovy is not available.\njython is not available.\n\
  Hello JRuby\n```\n\n有时你可能想玩玩脚本语言，但不知道在标准输出上打印消息的语法。`ScriptEngineFactory` 类包含一个名为\
  \ `getOutputStatement(String toDisplay)` 的方法，你可以用它来查找在标准输出上打印文本的语法。以下代码片段展示了如何获取\
  \ Nashorn 的语法：\n\n```\n// 获取 Nashorn 的脚本引擎工厂\nScriptEngineManager manager = new\
  \ ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"JavaScript\"\
  );\nScriptEngineFactory factory = engine.getFactory();\n// 获取脚本\nString script =\
  \ factory.getOutputStatement(\"\\\"Hello JavaScript\\\"\");\nSystem.out.println(\"\
  语法: \" + script);\n// 评估脚本\nengine.eval(script);\n```\n\n```\n语法: print(\"Hello\
  \ JavaScript\")\nHello JavaScript\n```\n\n对于其他脚本语言，请使用它们的引擎工厂来获取语法。\n\n## 探索 javax.script\
  \ 包\n\nJava 中的 Java 脚本 API 由少量类和接口组成。它们位于 `java.scripting` 模块的 `javax.script` 包中。本节简要描述此包中的类和接口。我将在后续章节中讨论它们的用法。\n\
  \n### ScriptEngine 和 ScriptEngineFactory 接口\n\n`ScriptEngine` 接口是 Java 脚本 API 中的主要接口，其实例有助于执行以特定脚本语言编写的脚本。\n\
  \n`ScriptEngine` 接口的实现者也会提供 `ScriptEngineFactory` 接口的实现。`ScriptEngineFactory` 执行两项任务：\n\
  \n*   创建脚本引擎的实例。\n*   提供有关脚本引擎的信息，例如引擎名称、版本、语言等。\n\n### AbstractScriptEngine 类\n\
  \n`AbstractScriptEngine` 是一个抽象类。它为 `ScriptEngine` 接口提供了部分实现。除非你正在实现一个脚本引擎，否则不会直接使用此类。\n\
  \n### ScriptEngineManager 类\n\n`ScriptEngineManager` 类为脚本引擎提供了发现和实例化机制。它还维护一个键值对映射，作为\
  \ `Bindings` 接口的实例，存储由其创建的所有脚本引擎共享的状态。\n\n### Compilable 接口和 CompiledScript 类\n\n\
  `Compilable` 接口可以由脚本引擎选择性地实现，该接口允许编译脚本以便重复执行而无需重新编译。\n\n`CompiledScript` 类被声明为抽象类。它由脚本引擎的提供者扩展。它以编译形式存储脚本，可以重复执行而无需重新编译。请注意，使用\
  \ `ScriptEngine` 重复执行脚本会导致每次重新编译脚本，从而降低性能。脚本引擎不需要支持脚本编译。如果支持脚本编译，它必须实现 `Compilable`\
  \ 接口。\n\n### Invocable 接口\n\n`Invocable` 接口可以由脚本引擎选择性地实现，该接口允许调用先前已编译脚本中的过程、函数和方法。\n\
  \n### Bindings 接口和 SimpleBindings 类\n\n实现 `Bindings` 接口的类的实例是一个键值对映射，其限制是键必须是非空、非空的\
  \ `String`。它扩展了 `java.util.Map` 接口。`SimpleBindings` 类是 `Bindings` 接口的一个实现。\n\n###\
  \ ScriptContext 接口和 SimpleScriptContext 类\n\n`ScriptContext` 接口的实例充当 Java 主机应用程序和脚本引擎之间的桥梁。它用于将\
  \ Java 主机应用程序的执行上下文传递给脚本引擎。脚本引擎在执行脚本时可能会使用上下文信息。脚本引擎可以将其状态存储在实现 `ScriptContext`\
  \ 接口的类的实例中，该实例可能对 Java 主机应用程序可访问。\n\n`SimpleScriptContext` 类是 `ScriptContext` 接口的一个实现。\n\
  \n### ScriptException 类\n\n`ScriptException` 类是一个异常类。如果在执行、编译或调用脚本期间发生错误，脚本引擎会抛出\
  \ `ScriptException`。该类包含三个有用的方法：`getLineNumber()`、`getColumnNumber()` 和 `getFileName()`。这些方法报告发生错误的脚本的行号、列号和文件名。`ScriptException`\
  \ 类重写了 `Throwable` 类的 `getMessage()` 方法，并在其返回的消息中包含行号、列号和文件名。\n\n\n\n### 发现与实例化脚本引擎\n\
  \n你可以使用 `ScriptEngineFactory` 或 `ScriptEngineManager` 来创建脚本引擎。那么，究竟是谁负责创建脚本引擎：`ScriptEngineFactory`、`ScriptEngineManager`，还是两者都负责？简单来说，`ScriptEngineFactory`\
  \ 始终负责创建脚本引擎的实例。接下来的问题是：“`ScriptEngineManager` 的作用是什么？”\n\n`ScriptEngineManager`\
  \ 使用服务提供者机制来定位所有可用的脚本引擎工厂。服务提供者机制已在本书三卷系列的第二卷的[第 14 章](https://doi.org/10.1007/978-1-4842-3546-1_14)中介绍过。\n\
  \n`ScriptEngineManager` 会定位并实例化所有可用的 `ScriptEngineFactory` 类。你可以使用 `ScriptEngineManager`\
  \ 类的 `getEngineFactories()` 方法获取所有工厂类实例的列表。当你调用管理器的某个方法（例如通过名称获取引擎的 `getEngineByName(String\
  \ shortName)` 方法）来根据条件获取脚本引擎时，管理器会搜索所有工厂以匹配该条件，并返回匹配的脚本引擎引用。如果没有工厂能提供匹配的引擎，管理器将返回\
  \ `null`。有关列出所有可用工厂并描述它们能创建的脚本引擎的更多详细信息，请参阅清单 9-3。\n\n现在你知道了，`ScriptEngineManager`\
  \ 并不创建脚本引擎的实例。相反，它会查询所有可用的工厂，并将由工厂创建的脚本引擎的引用返回给调用者。\n\n为了使讨论更完整，我们为脚本引擎的创建方式增加一点变化。你可以通过三种方式创建脚本引擎的实例：\n\
  \n*   直接实例化脚本引擎类。\n*   直接实例化脚本引擎工厂类，并调用其 `getScriptEngine()` 方法。\n*   使用 `ScriptEngineManager`\
  \ 类的某个 `getEngineByXxx()` 方法。\n\n建议使用 `ScriptEngineManager` 类来获取脚本引擎的实例。这种方法允许由同一管理器创建的所有引擎共享一个状态，该状态是一组以\
  \ `Bindings` 接口实例形式存储的键值对。`ScriptEngineManager` 实例存储此状态。使用这种方法还能让你的代码无需了解实际的脚本引擎/工厂实现类。\n\
  \n提示\n\n一个应用程序中可能存在多个 `ScriptEngineManager` 类的实例。在这种情况下，每个 `ScriptEngineManager`\
  \ 实例都会维护一个其创建的所有引擎所共有的状态。也就是说，如果两个引擎是由 `ScriptEngineManager` 类的两个不同实例获取的，那么除非你通过编程方式实现，否则这些引擎将不会共享其管理器所维护的公共状态。\n\
  \n## 执行脚本\n\n`ScriptEngine` 可以执行 `String` 和 `Reader` 中的脚本。使用 `Reader`，你可以执行存储在网络上或文件中的脚本。使用\
  \ `ScriptEngine` 的 `eval()` 方法的以下某个版本来执行脚本：\n\n*   `Object eval(String script)`\n\
  *   `Object eval(Reader reader)`\n*   `Object eval(String script, Bindings bindings)`\n\
  *   `Object eval(Reader reader, Bindings bindings)`\n*   `Object eval(String script,\
  \ ScriptContext context)`\n*   `Object eval(Reader reader, ScriptContext context)`\n\
  \n`eval()` 方法的第一个参数是脚本的来源。第二个参数允许你将主机应用程序的信息传递给脚本引擎，这些信息可以在脚本执行期间使用。\n\n在清单 9-2\
  \ 中，你看到了如何使用 `String` 通过 `eval()` 方法的第一个版本来执行脚本。在本节中，你将把脚本存储在文件中，并使用 `Reader` 对象作为脚本的来源，这将使用\
  \ `eval()` 方法的第二个版本。下一节将讨论 `eval()` 方法的其他四个版本。通常，脚本文件的扩展名为 `.js`。\n\n清单 9-5 显示了名为\
  \ `helloscript.js` 的文件内容。它只包含一条 Nashorn 语句，用于在标准输出上打印一条消息。\n\n```\n// 打印一条消息\nprint('Hello\
  \ from JavaScript!');\n清单 9-5.\nhelloscript.js 文件的内容\n```\n\n清单 9-6 中的 Java 程序执行存储在\
  \ `helloscript.js` 文件中的脚本，该文件应存储在当前目录的 `scripts` 子目录中。如果找不到脚本文件，程序将打印期望的 `helloscript.js`\
  \ 文件的完整路径。如果在执行脚本文件时遇到问题，请尝试在 `main()` 方法中使用绝对路径，例如在 Windows 上使用 `C:\\scripts\\\
  helloscript.js`，假设 `helloscript.js` 文件保存在 `C:\\scripts` 目录中。本章示例中使用的所有脚本都位于源代码的\
  \ `Java9APIsAndModules\\scripts` 目录下。\n\n```\n// ReaderAsSource.java\npackage com.jdojo.script;\n\
  import java.io.IOException;\nimport java.io.Reader;\nimport java.nio.file.Files;\n\
  import java.nio.file.Path;\nimport java.nio.file.Paths;\nimport javax.script.ScriptEngine;\n\
  import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
  public class ReaderAsSource {\npublic static void main(String[] args) {\n// 构造脚本文件路径\n\
  String scriptFileName = \"scripts/helloscript.js\";\nPath scriptPath = Paths.get(scriptFileName);\n\
  // 确保脚本文件存在。如果不存在，则打印脚本文件的完整路径并终止程序。\nif (!Files.exists(scriptPath)) {\nSystem.out.println(scriptPath.toAbsolutePath()\
  \ + \" 不存在。\");\nreturn;\n}\n// 获取 Nashorn 脚本引擎\nScriptEngineManager manager = new\
  \ ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"JavaScript\"\
  );\ntry {\n// 为脚本文件获取一个 Reader\nReader scriptReader = Files.newBufferedReader(scriptPath);\n\
  // 执行文件中的脚本\nengine.eval(scriptReader);\n} catch (IOException | ScriptException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 9-6.\n执行存储在文件中的脚本\n```\n\n```\nHello from\
  \ JavaScript!\n```\n\n在实际应用程序中，你应该将所有脚本存储在文件中，这样可以在不修改和重新编译 Java 代码的情况下修改脚本。在本章的大多数示例中，你不会遵循此规则；你会将脚本存储在\
  \ `String` 对象中，以保持代码简短明了。\n\n## 传递参数\n\nJava 脚本 API 允许你将参数从主机环境（Java 应用程序）传递到脚本引擎，反之亦然。在本节中，你将了解主机应用程序与脚本引擎之间参数传递机制的技术细节。\n\
  \n\n\n### 从 Java 代码向脚本传递参数\n\nJava 程序可以向脚本传递参数。Java 程序也可以在脚本执行后访问脚本中声明的全局变量。我们来讨论一个简单的示例，展示\
  \ Java 程序如何向脚本传递参数。请参考清单 9-7 中的程序，该程序向脚本传递了一个参数。\n\n```\n// PassingParam.java\n\
  package com.jdojo.script;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
  import javax.script.ScriptException;\npublic class PassingParam {\npublic static\
  \ void main(String[] args) {\n// 获取 Nashorn 引擎\nScriptEngineManager manager = new\
  \ ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"JavaScript\"\
  );\n// 将脚本存储在一个字符串中。这里，msg 是一个变量\n// 我们并未在脚本中声明它\nString script = \"print(msg)\"\
  ;\ntry {\n// 在引擎中存储一个名为 msg 的参数\nengine.put(\"msg\", \"Hello from the Java program\"\
  );\n// 执行脚本\nengine.eval(script);\n} catch (ScriptException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 9-7.\n从 Java 程序向脚本传递参数\n```\n\n```\nHello from the Java program\n```\n\
  \n该程序将脚本存储在一个 `String` 中，如下所示：\n\n```\n// 将脚本存储在一个字符串中\nString script = \"print(msg)\"\
  ;\n```\n\n在该语句中，脚本为：\n\n```\nprint(msg)\n```\n\n请注意，`msg` 是 `print()` 函数调用中使用的一个变量。脚本并未声明\
  \ `msg` 变量或为其赋值。如果你尝试在不告知引擎 `msg` 变量是什么的情况下执行此脚本，引擎将抛出一个异常，指出它不理解名为 `msg` 的变量的含义。这正是从\
  \ Java 程序向脚本引擎传递参数这一概念发挥作用的地方。\n\n你可以通过多种方式向脚本引擎传递参数。最简单的方法是使用脚本引擎的 `put(String\
  \ paramName, Object paramValue)` 方法，该方法接受两个参数：\n\n*   第一个参数是参数的名称，需要与脚本中的变量名匹配。\n\
  *   第二个参数是参数的值。\n\n在你的例子中，你想向脚本引擎传递一个名为 `msg` 的参数，其值是一个 `String`。调用 `put()` 方法的代码如下：\n\
  \n```\n// 在引擎中存储 msg 参数的值\nengine.put(\"msg\", \"Hello from Java program\");\n```\n\
  \n请注意，你必须在调用 `eval()` 方法之前调用引擎的 `put()` 方法。在你的例子中，当引擎尝试执行 `print(msg)` 时，它将使用你传递给引擎的\
  \ `msg` 参数的值。\n\n大多数脚本引擎允许你将传递给它的参数名称用作脚本中的变量名。你在清单 9-7 中传递名为 `msg` 的参数值并将其用作脚本中的变量名时，就看到了这种示例。脚本引擎可能对脚本中变量的声明有要求，例如，在\
  \ PHP 中变量名必须以 `$` 前缀开头，在 JRuby 中全局变量名包含 `$` 前缀。如果你想向 JRuby 脚本传递一个名为 `msg` 的参数，你的代码将如下所示：\n\
  \n```\n// 获取 JRuby 脚本引擎\nScriptEngineManager manager = new ScriptEngineManager();\n\
  ScriptEngine engine = manager.getEngineByName(\"jruby\");\n// 在 JRuby 脚本中必须使用 $\
  \ 前缀\nString script = \"puts($msg)\";\n// 向 JRuby 引擎传递 msg 参数时未使用 $ 前缀\nengine.put(\"\
  msg\", \"Hello from Java\");\n// 执行脚本\nengine.eval(script);\n```\n\n传递给脚本的 Java\
  \ 对象的属性和方法可以在脚本中访问，就像在 Java 代码中访问它们一样。不同的脚本语言使用不同的语法来访问脚本中的 Java 对象。例如，你可以在清单 9-7\
  \ 所示的示例中使用表达式 `msg.toString()`，输出结果将相同。在这种情况下，你正在调用变量 `msg` 的 `toString()` 方法。将清单\
  \ 9-7 中为 `script` 变量赋值的语句更改为以下内容并运行程序，将产生相同的输出：\n\n```\nString script = \"println(msg.toString())\"\
  ;\n```\n\n### 从脚本向 Java 代码传递参数\n\n脚本引擎可以使其全局作用域中的变量对 Java 代码可用。`ScriptEngine` 的\
  \ `get(String variableName)` 方法用于在 Java 代码中访问这些变量。它返回一个 Java `Object`。全局变量的声明方式取决于脚本语言。以下代码片段在\
  \ JavaScript 中声明了一个全局变量并为其赋值：\n\n```\n// 在 Nashorn 中声明一个名为 year 的变量\nvar year =\
  \ 1969;\n```\n\n清单 9-8 包含一个程序，展示了如何从 Java 代码访问 Nashorn 中的全局变量。\n\n```\n// AccessingScriptVariable.java\n\
  package com.jdojo.script;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
  import javax.script.ScriptException;\npublic class AccessingScriptVariable {\npublic\
  \ static void main(String[] args) {\n// 获取 Nashorn 引擎\nScriptEngineManager manager\
  \ = new ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"\
  JavaScript\");\n// 编写一个脚本，声明一个名为 year 的全局变量并\n// 为其赋值 1969。\nString script = \"\
  var year = 1969\";\ntry {\n// 执行脚本\nengine.eval(script);\n// 从引擎中获取 year 全局变量\n\
  Object year = engine.get(\"year\");\n// 打印变量 year 的类名和值\nSystem.out.println(\"year's\
  \ class: \"  + year.getClass().getName());\nSystem.out.println(\"year's value: \"\
  \ + year);\n} catch (ScriptException e) {\ne.printStackTrace();\n}\n}\n}\n清单 9-8.\n\
  在 Java 代码中访问脚本全局变量\n```\n\n```\nyear's class: java.lang.Integer\nyear's value: 1969\n\
  ```\n\n该程序在脚本中声明了一个全局变量 `year` 并为其赋值 `1969`，如下所示：\n\n```\nString script = \"var\
  \ num = 1969\";\n```\n\n当脚本执行时，引擎将 `year` 变量添加到其状态中。在 Java 代码中，使用引擎的 `get()` 方法来检索\
  \ `year` 变量的值，如下所示：\n\n```\nObject year = engine.get(\"year\");\n```\n\n当在脚本中声明\
  \ `year` 变量时，你并未指定其数据类型。脚本变量值到适当 Java 对象的转换会自动执行。在此例中，值 `1969` 被评估为 `Integer`。\n\
  \n## 高级参数传递技术\n\n要理解参数传递机制的细节，必须清楚理解三个术语：绑定（bindings）、作用域（scope）和上下文（context）。这些术语起初可能会令人困惑。本节通过以下步骤解释参数传递机制：\n\
  \n*   首先，定义这些术语。\n*   其次，定义这些术语之间的关系。\n*   第三，解释如何在 Java 代码中使用它们。\n\n\n\n### 绑定\n\
  \n`Bindings` 是一组键值对，其中所有键必须是非空、非 null 的字符串。在 Java 代码中，`Bindings` 是 `Bindings` 接口的一个实例。`SimpleBindings`\
  \ 类是 `Bindings` 接口的一个实现。脚本引擎可以提供自己的 `Bindings` 接口实现。\n\n提示\n\n如果你熟悉 `java.util.Map`\
  \ 接口，就很容易理解 `Bindings`。`Bindings` 接口继承自 `Map<String,Object>` 接口。因此，`Bindings` 本质上就是一个\
  \ `Map`，只是其键必须是非空、非 null 的字符串。\n\n清单 9-9 展示了如何使用 `Bindings`。它创建了一个 `SimpleBindings`\
  \ 实例，向其中添加一些键值对，检索键的值，删除一个键值对等操作。`Bindings` 接口的 `get()` 方法在键不存在或键存在但其值为 `null` 时返回\
  \ `null`。如果要测试键是否存在，需要调用其 `contains()` 方法。\n\n```\n// BindingsTest.java\npackage\
  \ com.jdojo.script;\nimport javax.script.Bindings;\nimport javax.script.SimpleBindings;\n\
  public class BindingsTest {\npublic static void main(String[] args) {\n// 创建一个 Bindings\
  \ 实例\nBindings params = new SimpleBindings();\n// 添加一些键值对\nparams.put(\"msg\", \"\
  Hello\");\nparams.put(\"year\", 1969);\n// 获取值\nObject msg = params.get(\"msg\"\
  );\nObject year = params.get(\"year\");\nSystem.out.println(\"msg = \" + msg);\n\
  System.out.println(\"year = \" + year);\n// 从 Bindings 中移除 year\nparams.remove(\"\
  year\");\nyear = params.get(\"year\");\nboolean containsYear = params.containsKey(\"\
  year\");\nSystem.out.println(\"year = \" + year);\nSystem.out.println(\"params contains\
  \ year = \" + containsYear);\n}\n}\n清单 9-9.\n使用 Bindings 对象\n```\n\n```\nmsg = Hello\n\
  year = 1969\nyear = null\nparams contains year = false\n```\n\n你不会单独使用 `Bindings`。通常，你会用它来将参数从\
  \ Java 代码传递给脚本引擎。`ScriptEngine` 接口包含一个 `createBindings()` 方法，该方法返回一个 `Bindings`\
  \ 接口的实例。这个方法让脚本引擎有机会返回其专用 `Bindings` 接口实现的实例。你可以像下面这样使用这个方法：\n\n```\n// 获取 Nashorn\
  \ 引擎\nScriptEngineManager manager = new ScriptEngineManager();\nScriptEngine engine\
  \ = manager.getEngineByName(\"JavaScript\");\n// 不要直接实例化 SimpleBindings 类。\n// 使用引擎的\
  \ createBindings() 方法来创建 Bindings。\nBindings params = engine.createBindings();\n\
  // 像往常一样使用 params\n```\n\n### 作用域\n\n接下来我们讨论下一个术语：作用域。作用域用于 `Bindings`。`Bindings`\
  \ 的作用域决定了其键值对的可见性。你可以有多个 `Bindings` 分布在多个作用域中。然而，一个 `Bindings` 只能出现在一个作用域中。如何为 `Bindings`\
  \ 指定作用域呢？我稍后会介绍。\n\n使用 `Bindings` 的作用域可以让你按层次顺序为脚本引擎定义参数变量。如果在引擎状态中搜索一个变量名，会先搜索优先级较高的\
  \ `Bindings`，然后再搜索优先级较低的 `Bindings`。返回的是该变量第一个找到的值。Java 脚本 API 定义了两个作用域。它们在 `ScriptContext`\
  \ 接口中被定义为两个 `int` 常量。它们是：\n\n*   `ScriptContext.ENGINE_SCOPE`\n*   `ScriptContext.GLOBAL_SCOPE`\n\
  \n引擎作用域的优先级高于全局作用域。如果你向两个 `Bindings`（一个在引擎作用域，一个在全局作用域）中添加了具有相同键的键值对，那么每当需要解析与键同名的变量时，将使用引擎作用域中的键值对。\n\
  \n理解 `Bindings` 作用域的角色非常重要，因此我再用一个类比来解释它。想象一个 Java 类有两组变量：一组包含类中的所有实例变量，另一组包含方法中的所有局部变量。这两组变量及其值就是两个\
  \ `Bindings`。这些 `Bindings` 中的变量类型定义了作用域。仅为了讨论方便，我定义两个作用域：实例作用域和局部作用域。当执行一个方法时，会先在局部作用域的\
  \ `Bindings` 中查找变量名，因为局部变量的优先级高于实例变量。如果在局部作用域的 `Bindings` 中找不到变量名，则会在实例作用域的 `Bindings`\
  \ 中查找。当执行脚本时，`Bindings` 及其作用域扮演着类似的角色。\n\n\n\n### 定义脚本上下文\n\n脚本引擎在上下文中执行脚本。你可以将上下文视为脚本执行的环境。Java\
  \ 宿主应用程序向脚本引擎提供两样东西：脚本以及脚本需要执行的上下文。`ScriptContext` 接口的实例代表脚本的上下文。`SimpleScriptContext`\
  \ 类是 `ScriptContext` 接口的一个实现。脚本上下文由四个组件组成：\n\n*   一组 `Bindings`，其中每个 `Bindings`\
  \ 都与一个不同的作用域相关联\n*   一个供脚本引擎读取输入的 `Reader`\n*   一个供脚本引擎写入输出的 `Writer`\n*   一个供脚本引擎写入错误输出的错误\
  \ `Writer`\n\n上下文中的 `Bindings` 集合用于向脚本传递参数。上下文中的读取器和写入器分别控制脚本的输入源和输出目标。例如，通过将文件写入器设置为写入器，你可以将脚本的所有输出发送到文件。\n\
  \n每个脚本引擎都维护一个默认的脚本上下文，并使用它来执行脚本。到目前为止，你已经在没有提供脚本上下文的情况下执行了几个脚本。在这些情况下，脚本引擎使用的是它们的默认脚本上下文来执行脚本。在本节中，我将介绍如何单独使用\
  \ `ScriptContext`。在下一节中，我将介绍如何在脚本执行期间将 `ScriptContext` 传递给 `ScriptEngine`。\n\n你可以使用\
  \ `SimpleScriptContext` 类创建 `ScriptContext` 接口的实例：\n\n```\n// 创建一个脚本上下文\nScriptContext\
  \ ctx = new SimpleScriptContext();\n```\n\n`SimpleScriptContext` 类的实例维护两个 `Bindings`\
  \ 实例：一个用于引擎作用域，一个用于全局作用域。当你创建 `SimpleScriptContext` 实例时，引擎作用域中的 `Bindings` 会被创建。要使用全局作用域的\
  \ `Bindings`，你需要创建一个 `Bindings` 接口的实例。\n\n默认情况下，`SimpleScriptContext` 类将上下文的输入读取器、输出写入器和错误写入器分别初始化为标准输入\
  \ `System.in`、标准输出 `System.out` 和标准错误输出 `System.err`。你可以使用 `ScriptContext` 接口的 `getReader()`、`getWriter()`\
  \ 和 `getErrorWriter()` 方法分别从 `ScriptContext` 获取读取器、写入器和错误写入器的引用。还提供了设置方法来设置读取器和写入器。以下代码片段展示了如何获取读取器和写入器。它还展示了如何将写入器设置为\
  \ `FileWriter`，以便将脚本输出写入文件。\n\n```\n// 从脚本上下文获取读取器和写入器\nReader inputReader = ctx.getReader();\n\
  Writer outputWriter = ctx.getWriter();\nWriter errWriter = ctx.getErrorWriter();\n\
  // 将所有脚本输出写入 out.txt 文件\nWriter fileWriter = new FileWriter(\"out.txt\");\nctx.setWriter(fileWriter);\n\
  ```\n\n创建 `SimpleScriptContext` 后，你可以开始将键值对存储到引擎作用域的 `Bindings` 中，因为当你创建 `SimpleScriptContext`\
  \ 对象时，引擎作用域中会创建一个空的 `Bindings`。`setAttribute()` 方法用于向 `Bindings` 添加键值对。你必须提供键名、值以及\
  \ `Bindings` 的作用域。以下代码片段添加了三个键值对。\n\n```\n// 向引擎作用域绑定添加三个键值对\nctx.setAttribute(\"\
  year\", 1969, ScriptContext.ENGINE_SCOPE);\nctx.setAttribute(\"month\", 9, ScriptContext.ENGINE_SCOPE);\n\
  ctx.setAttribute(\"day\", 19, ScriptContext.ENGINE_SCOPE);\n```\n\n如果你想向全局作用域的 `Bindings`\
  \ 添加键值对，你需要先创建并设置 `Bindings`，如下所示：\n\n```\n// 向上下文添加一个全局作用域的 Bindings\nBindings\
  \ globalBindings = new SimpleBindings();\nctx.setBindings(globalBindings, ScriptContext.GLOBAL_SCOPE);\n\
  ```\n\n\n\n现在，你可以使用 `setAttribute()` 方法向全局作用域的 `Bindings` 中添加键值对，如下所示：\n\n```\n\
  // 向全局作用域绑定中添加两个键值对\nctx.setAttribute(\"year\", 1982, ScriptContext.GLOBAL_SCOPE);\n\
  ctx.setAttribute(\"name\", \"Boni\", ScriptContext.GLOBAL_SCOPE);\n```\n\n此时，你可以直观地看到\
  \ `ScriptContext` 实例的状态，如图 9-1 所示。\n\n![A323071_2_En_9_Fig1_HTML.gif](img/A323071_2_En_9_Fig1_HTML.gif)\n\
  \n图 9-1.\n\nSimpleScriptContext 类实例的示意图\n\n你可以对 `ScriptContext` 执行多种操作。可以使用 `setAttribute(String\
  \ name, Object value, int scope)` 方法为已存储的键设置不同的值。可以使用 `removeAttribute(String name,\
  \ int scope)` 方法移除指定键和作用域的键值对。可以使用 `getAttribute(String name, int scope)` 方法获取指定作用域中键的值。\n\
  \n`ScriptContext` 最有趣的功能是，你可以使用其 `getAttribute(String name)` 方法在不指定作用域的情况下检索键值对。`ScriptContext`\
  \ 会首先在引擎作用域的 `Bindings` 中搜索该键。如果在引擎作用域中未找到，则会搜索全局作用域的 `Bindings`。如果在这些作用域中找到了该键，则返回最先找到该键的作用域中的对应值。如果两个作用域中都不包含该键，则返回\
  \ `null`。\n\n在你的示例中，你将名为 `year` 的键同时存储在了引擎作用域和全局作用域中。以下代码片段会从引擎作用域中返回键 `year` 对应的值\
  \ `1969`，因为引擎作用域会被优先搜索。`getAttribute()` 方法的返回类型是 `Object`。\n\n```\n// 在不指定作用域的情况下获取键\
  \ year 的值。\n// 它会从引擎作用域的 Bindings 中返回 1969。\nint yearValue = (Integer) ctx.getAttribute(\"\
  year\");\n```\n\n你将名为 `name` 的键仅存储在了全局作用域中。如果你尝试检索其值，会先搜索引擎作用域，但不会找到匹配项。随后，会搜索全局作用域并返回值\
  \ `\"Boni\"`，如下所示：\n\n```\n// 在不指定作用域的情况下获取名为 name 的键的值。\n// 它会从全局作用域的 Bindings\
  \ 中返回 \"Boni\"。\nString nameValue = (String) ctx.getAttribute(\"name\");\n```\n\n\
  你也可以检索特定作用域中键的值。以下代码片段从引擎作用域和全局作用域中检索键“`year`”的值：\n\n```\n// 将 1969 赋值给 engineScopeYear，将\
  \ 1982 赋值给 globalScopeYear\nint engineScopeYear = (Integer) ctx.getAttribute(\"\
  year\", ScriptContext.ENGINE_SCOPE);\nint globalScopeYear = (Integer) ctx.getAttribute(\"\
  year\", ScriptContext.GLOBAL_SCOPE);\n```\n\n提示\n\nJava Scripting API 仅定义了两个作用域：引擎作用域和全局作用域。`ScriptContext`\
  \ 接口的子接口可以定义额外的作用域。`ScriptContext` 接口的 `getScopes()` 方法会以 `List<Integer>` 的形式返回支持的作用域列表。请注意，作用域是用整数表示的。`ScriptContext`\
  \ 接口中的两个常量——`ENGINE_SCOPE` 和 `GLOBAL_SCOPE`——分别被赋值为 100 和 200。当在多个作用域的多个 `Bindings`\
  \ 中搜索一个键时，会优先搜索整数值较小的作用域。由于引擎作用域的值 100 小于全局作用域的值 200，因此当你未指定作用域时，会首先在引擎作用域中搜索该键。\n\
  \n清单 9-10 展示了如何使用实现了 `ScriptContext` 接口的类的实例。请注意，在你的应用程序中，你不会单独使用 `ScriptContext`。它是在脚本执行期间由脚本引擎使用的。大多数情况下，你通过\
  \ `ScriptEngine` 和 `ScriptEngineManager` 间接操作 `ScriptContext`，这些内容将在下一节详细讨论。\n\n\
  ```\n// ScriptContextTest.java\npackage com.jdojo.script;\nimport java.util.List;\n\
  import javax.script.Bindings;\nimport javax.script.ScriptContext;\nimport javax.script.SimpleBindings;\n\
  import javax.script.SimpleScriptContext;\nimport static javax.script.ScriptContext.ENGINE_SCOPE;\n\
  import static javax.script.ScriptContext.GLOBAL_SCOPE;\npublic class ScriptContextTest\
  \ {\npublic static void main(String[] args) {\n// 创建一个脚本上下文\nScriptContext ctx =\
  \ new SimpleScriptContext();\n// 获取脚本上下文支持的作用域列表\nList scopes = ctx.getScopes();\n\
  System.out.println(\"支持的作用域: \" + scopes);\n// 向引擎作用域绑定中添加三个键值对\nctx.setAttribute(\"\
  year\", 1969, ENGINE_SCOPE);\nctx.setAttribute(\"month\", 9, ENGINE_SCOPE);\nctx.setAttribute(\"\
  day\", 19, ENGINE_SCOPE);\n// 向上下文中添加一个全局作用域的 Bindings\nBindings globalBindings\
  \ = new SimpleBindings();\nctx.setBindings(globalBindings, GLOBAL_SCOPE);\n// 向全局作用域绑定中添加两个键值对\n\
  ctx.setAttribute(\"year\", 1982, GLOBAL_SCOPE);\nctx.setAttribute(\"name\", \"Boni\"\
  , GLOBAL_SCOPE);\n// 在不指定作用域的情况下获取 year 的值\nint yearValue = (Integer) ctx.getAttribute(\"\
  year\");\nSystem.out.println(\"yearValue = \" + yearValue);\n// 获取 name 的值\nString\
  \ nameValue = (String) ctx.getAttribute(\"name\");\nSystem.out.println(\"nameValue\
  \ = \" + nameValue);\n// 从引擎作用域和全局作用域获取 year 的值\nint engineScopeYear = (Integer)\
  \ ctx.getAttribute(\"year\", ENGINE_SCOPE);\nint globalScopeYear = (Integer) ctx.getAttribute(\"\
  year\", GLOBAL_SCOPE);\nSystem.out.println(\"engineScopeYear = \" + engineScopeYear);\n\
  System.out.println(\"globalScopeYear = \" + globalScopeYear);\n}\n}\n清单 9-10.\n\
  使用 ScriptContext 接口的实例\n```\n\n```\n支持的作用域: [100, 200]\nyearValue = 1969\nnameValue\
  \ = Boni\nengineScopeYear = 1969\nglobalScopeYear = 1982\n```\n\n\n\n### 整合运用\n\n\
  在本节中，我将向你展示 `Bindings` 及其作用域、`ScriptContext`、`ScriptEngine`、`ScriptEngineManager`\
  \ 以及宿主应用如何协同工作。重点在于如何使用 `ScriptEngine` 和 `ScriptEngineManager` 来操作存储在不同作用域 `Bindings`\
  \ 中的键值对。\n\n`ScriptEngineManager` 在其 `Bindings` 中维护一组键值对。它允许你通过以下方法操作这些键值对：\n\n\
  *   `void put(String key, Object value)`\n*   `Object get(String key)`\n*   `void\
  \ setBindings(Bindings bindings)`\n*   `Bindings getBindings()`\n\n`put()` 方法向 `Bindings`\
  \ 中添加一个键值对。`get()` 方法返回指定键的值；如果未找到该键，则返回 `null`。可以使用 `setBindings()` 方法替换引擎管理器的\
  \ `Bindings`。`getBindings()` 方法返回 `ScriptEngineManager` 的 `Bindings` 引用。\n\n默认情况下，每个\
  \ `ScriptEngine` 都有一个 `ScriptContext`，称为其默认上下文。回想一下，除了读取器和写入器之外，`ScriptContext`\
  \ 还有两个 `Bindings`：一个在引擎作用域，一个在全局作用域。当创建 `ScriptEngine` 时，其引擎作用域的 `Bindings` 为空，而其全局作用域的\
  \ `Bindings` 引用的是创建它的 `ScriptEngineManager` 的 `Bindings`。\n\n默认情况下，由同一个 `ScriptEngineManager`\
  \ 创建的所有 `ScriptEngine` 实例共享该 `ScriptEngineManager` 的 `Bindings`。在同一个 Java 应用程序中可以存在多个\
  \ `ScriptEngineManager` 实例。在这种情况下，由同一个 `ScriptEngineManager` 创建的所有 `ScriptEngine`\
  \ 实例，在其默认上下文中，都将该 `ScriptEngineManager` 的 `Bindings` 作为其全局作用域的 `Bindings` 进行共享。\n\
  \n以下代码片段创建了一个 `ScriptEngineManager`，并用它创建了三个 `ScriptEngine` 实例：\n\n```\n// 创建一个\
  \ ScriptEngineManager\nScriptEngineManager manager = new ScriptEngineManager();\n\
  // 使用同一个 ScriptEngineManager 创建三个 ScriptEngine\nScriptEngine engine1 = manager.getEngineByName(\"\
  JavaScript\");\nScriptEngine engine2 = manager.getEngineByName(\"JavaScript\");\n\
  ScriptEngine engine3 = manager.getEngineByName(\"JavaScript\");\n```\n\n现在，让我们向\
  \ `ScriptEngineManager` 的 `Bindings` 中添加三个键值对，并向每个 `ScriptEngine` 的引擎作用域 `Bindings`\
  \ 中添加两个键值对。\n\n```\n// 向管理器的 Bindings 中添加三个键值对\nmanager.put(\"K1\", \"V1\");\nmanager.put(\"\
  K2\", \"V2\");\nmanager.put(\"K3\", \"V3\");\n// 向每个引擎添加两个键值对\nengine1.put(\"KE11\"\
  , \"VE11\");\nengine1.put(\"KE12\", \"VE12\");\nengine2.put(\"KE21\", \"VE21\");\n\
  engine2.put(\"KE22\", \"VE22\");\nengine3.put(\"KE31\", \"VE31\");\nengine3.put(\"\
  KE32\", \"VE32\");\n```\n\n图 9-2 展示了执行上述代码片段后 `ScriptEngineManager` 和三个 `ScriptEngine`\
  \ 的状态示意图。从图中可以明显看出，所有 `ScriptEngine` 的默认上下文都将 `ScriptEngineManager` 的 `Bindings`\
  \ 作为其全局作用域的 `Bindings` 进行共享。\n\n![A323071_2_En_9_Fig2_HTML.gif](img/A323071_2_En_9_Fig2_HTML.gif)\n\
  \n图 9-2.\n\n由同一个 ScriptEngineManager 创建的三个 ScriptEngine 的示意图\n\n可以通过以下方式修改 `ScriptEngineManager`\
  \ 中的 `Bindings`：\n\n*   使用 `ScriptEngineManager` 的 `put()` 方法\n*   通过 `ScriptEngineManager`\
  \ 的 `getBindings()` 方法获取 `Bindings` 的引用，然后对该 `Bindings` 使用 `put()` 和 `remove()`\
  \ 方法\n*   通过 `ScriptEngine` 的 `getBindings()` 方法获取其默认上下文中全局作用域 `Bindings` 的引用，然后对该\
  \ `Bindings` 使用 `put()` 和 `remove()` 方法\n\n当修改 `ScriptEngineManager` 中的 `Bindings`\
  \ 时，由该 `ScriptEngineManager` 创建的所有 `ScriptEngine` 的默认上下文中的全局作用域 `Bindings` 也会被修改，因为它们共享同一个\
  \ `Bindings`。\n\n每个 `ScriptEngine` 的默认上下文都单独维护一个引擎作用域的 `Bindings`。要向 `ScriptEngine`\
  \ 的引擎作用域 `Bindings` 中添加键值对，请使用其 `put()` 方法，如下所示：\n\n```\nScriptEngine engine1 =\
  \ null; // 获取一个引擎\n// 向 engine1 默认上下文的引擎作用域 Bindings 中添加一个键为 \"engineName\"、值为 \"\
  Engine-1\" 的键值对\nengine1.put(\"engineName\", \"Engine-1\");\n```\n\n`ScriptEngine`\
  \ 的 `get(String key)` 方法从其引擎作用域的 `Bindings` 中返回指定 `key` 的值。以下语句返回 `\"Engine-1\"\
  `，即 `engineName` 键对应的值。\n\n```\nString eName = (String) engine1.get(\"engineName\"\
  );\n```\n\n要获取 `ScriptEngine` 默认上下文中全局作用域 `Bindings` 的键值对，需要两步操作。首先，你需要使用其 `getBindings()`\
  \ 方法获取全局作用域 `Bindings` 的引用，如下所示：\n\n```\nBindings e1Global = engine1.getBindings(ScriptContext.GLOBAL_SCOPE);\n\
  ```\n\n现在，你可以使用 `e1Global` 引用来修改引擎的全局作用域 `Bindings`。以下语句向 `e1Global Bindings` 中添加了一个键值对：\n\
  \n```\ne1Global.put(\"id\", 89999);\n```\n\n由于所有 `ScriptEngine` 共享全局作用域的 `Bindings`，这段代码会将键\
  \ `\"id\"` 及其值添加到由创建 `engine1` 的同一个 `ScriptEngineManager` 创建的所有 `ScriptEngine` 的默认上下文的全局作用域\
  \ `Bindings` 中。不建议使用上述代码修改 `ScriptEngineManager` 中的 `Bindings`。你应该使用 `ScriptEngineManager`\
  \ 引用来修改 `Bindings`，这会使代码的读者更清晰地理解逻辑。清单 9-11 演示了本节讨论的概念。\n\n```\n// GlobalBindings.java\n\
  package com.jdojo.script;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
  import javax.script.ScriptException;\npublic class GlobalBindings {\npublic static\
  \ void main(String[] args) {\nScriptEngineManager manager = new ScriptEngineManager();\n\
  // 向管理器的 Bindings 中添加两个数字 - 由其所有引擎共享\nmanager.put(\"n1\", 100);\nmanager.put(\"\
  n2\", 200);\n// 创建两个 JavaScript 引擎，并在引擎默认上下文的引擎作用域中添加引擎名称\nScriptEngine engine1\
  \ = manager.getEngineByName(\"JavaScript\");\nengine1.put(\"engineName\", \"Engine-1\"\
  );\nScriptEngine engine2 = manager.getEngineByName(\"JavaScript\");\nengine2.put(\"\
  engineName\", \"Engine-2\");\n// 执行一个脚本，该脚本将两个数字相加并打印结果\nString script = \"var sum\
  \ = n1 + n2; print(engineName + ' - Sum = ' + sum)\";\ntry {\n// 在两个引擎中执行脚本\nengine1.eval(script);\n\
  engine2.eval(script);\n// 现在为每个引擎设置不同的 n2 值\nengine1.put(\"n2\", 1000);\nengine2.put(\"\
  n2\", 2000);\n// 再次在两个引擎中执行脚本\nengine1.eval(script);\nengine2.eval(script);\n} catch\
  \ (ScriptException e) {\ne.printStackTrace();\n}\n}\n}\n清单 9-11.\n使用由同一个 ScriptEngineManager\
  \ 创建的引擎的全局和引擎作用域 Bindings\n```\n\n```\nEngine-1 - Sum = 300\nEngine-2 - Sum = 300\n\
  Engine-1 - Sum = 1100\nEngine-2 - Sum = 2100\n```\n\n\n\n一个 `ScriptEngineManager`\
  \ 向其 `Bindings` 中添加了两个键值对，键分别为 `n1` 和 `n2`。随后创建了两个 `ScriptEngine`；它们各自向自己的引擎作用域\
  \ `Bindings` 中添加了一个名为 `engineName` 的键。执行脚本时，脚本中 `engineName` 变量的值取自 `ScriptEngine`\
  \ 的引擎作用域。脚本中变量 `n1` 和 `n2` 的值则从 `ScriptEngine` 的全局作用域 `Bindings` 中获取。首次执行脚本后，每个\
  \ `ScriptEngine` 都向自己的引擎作用域 `Bindings` 中添加了一个键为 `n2` 但值不同的键值对。当第二次执行脚本时，变量 `n1`\
  \ 的值从引擎的全局作用域 `Bindings` 中获取，而变量 `n2` 的值则从引擎作用域 `Bindings` 中获取，如输出所示。\n\n关于由 `ScriptEngineManager`\
  \ 创建的所有 `ScriptEngine` 所共享的全局作用域 `Bindings` 的故事尚未结束。它可能变得极其复杂和令人困惑！现在，我们将重点关注使用\
  \ `ScriptEngineManager` 类的 `setBindings()` 方法和 `ScriptEngine` 接口的效果。请考虑以下代码片段：\n\
  \n```\n// 创建一个 ScriptEngineManager 和两个 ScriptEngine\nScriptEngineManager manager\
  \ = new ScriptEngineManager();\nScriptEngine engine1 = manager.getEngineByName(\"\
  JavaScript\");\nScriptEngine engine2 = manager.getEngineByName(\"JavaScript\");\n\
  // 向 manager 添加两个键值对\nmanager.put(\"n1\", 100);\nmanager.put(\"n2\", 200);\n```\n\
  \n图 9-3 显示了执行此脚本后引擎管理器及其引擎的状态。此时，`ScriptEngineManager` 中只存储了一个 `Bindings`，两个 `ScriptEngine`\
  \ 都将其引用为各自的全局作用域 `Bindings`。\n\n![A323071_2_En_9_Fig3_HTML.gif](img/A323071_2_En_9_Fig3_HTML.gif)\n\
  \n图 9-3.\n\nScriptEngineManager 和两个 ScriptEngine 的初始状态\n\n现在，让我们创建一个新的 `Bindings`，并使用\
  \ `ScriptEngineManager` 的 `setBindings()` 方法将其设置为该管理器的 `Bindings`，如下所示：\n\n```\n\
  // 创建一个 Bindings，向其添加两个键值对，并将其设置为 manager 的新 Bindings\nBindings newGlobal = new\
  \ SimpleBindings();\nnewGlobal.put(\"n3\", 300);\nnewGlobal.put(\"n4\", 400);\n\
  manager.setBindings(newGlobal);\n```\n\n图 9-4 显示了执行上述代码片段后 `ScriptEngineManager`\
  \ 和两个 `ScriptEngine` 的状态。请注意，`ScriptEngineManager` 有了一个新的 `Bindings`，而两个 `ScriptEngine`\
  \ 仍然引用旧的 `Bindings` 作为它们的全局作用域 `Bindings`。\n\n![A323071_2_En_9_Fig4_HTML.gif](img/A323071_2_En_9_Fig4_HTML.gif)\n\
  \n图 9-4.\n\n为 ScriptEngineManager 设置新的 Bindings 后，ScriptEngineManager 和两个 ScriptEngine\
  \ 的状态\n\n此时，对 `ScriptEngineManager` 的 `Bindings` 所做的任何更改都不会反映到两个 `ScriptEngine`\
  \ 的全局作用域 `Bindings` 中。你仍然可以对两个 `ScriptEngine` 共享的 `Bindings` 进行更改，并且这两个 `ScriptEngine`\
  \ 都能看到彼此所做的更改。\n\n现在，创建一个新的 `ScriptEngine`，如下所示：\n\n```\n// 创建一个新的 ScriptEngine\n\
  ScriptEngine engine3 = manager.getEngineByName(\"JavaScript\");\n```\n\n回想一下，`ScriptEngine`\
  \ 在创建时会获得一个全局作用域 `Bindings`，并且该 `Bindings` 与 `ScriptEngineManager` 的 `Bindings`\
  \ 相同。执行上述语句后，`ScriptEngineManager` 和三个 `ScriptEngine` 的状态如图 9-5 所示。\n\n![A323071_2_En_9_Fig5_HTML.gif](img/A323071_2_En_9_Fig5_HTML.gif)\n\
  \n图 9-5.\n\n创建第三个 ScriptEngine 后，ScriptEngineManager 和三个 ScriptEngine 的状态\n\n关于\
  \ `ScriptEngine` 全局作用域所谓的“全局性”，还有另一个转折点。这次，你将使用 `ScriptEngine` 的 `setBindings()`\
  \ 方法来设置其全局作用域 `Bindings`。\n\n```\n// 为 engine1 的全局作用域设置一个新的 Bindings\nBindings newGlobalEngine1\
  \ = new SimpleBindings();\nnewGlobalEngine1.put(\"n5\", 500);\nnewGlobalEngine1.put(\"\
  n6\", 600);\nengine1.setBindings(newGlobalEngine1, ScriptContext.GLOBAL_SCOPE);\n\
  ```\n\n图 9-6 显示了执行以下代码片段后 `ScriptEngineManager` 和三个 ScriptEngine 的状态。\n\n![A323071_2_En_9_Fig6_HTML.gif](img/A323071_2_En_9_Fig6_HTML.gif)\n\
  \n图 9-6.\n\n为 engine1 设置新的全局作用域绑定后，ScriptEngineManager 和三个 ScriptEngine 的状态\n\n\
  提示\n\n默认情况下，`ScriptEngineManager` 创建的所有 `ScriptEngine` 都共享其 `Bindings` 作为它们的全局作用域\
  \ `Bindings`。如果你使用 `ScriptEngine` 的 `setBindings()` 方法来设置其全局作用域 `Bindings`，或者使用\
  \ `ScriptEngineManager` 的 `setBindings()` 方法来设置其 `Bindings`，就会打破本节讨论的“全局性”链条。为了保持“全局性”链条的完整性，你应该始终使用\
  \ `ScriptEngineManager` 的 `put()` 方法向其 `Bindings` 中添加键值对。要从 `ScriptEngineManager`\
  \ 创建的所有 `ScriptEngine` 的全局作用域中移除一个键值对，你需要使用 `ScriptEngineManager` 的 `getBindings()`\
  \ 方法获取 `Bindings` 的引用，然后对该 `Bindings` 使用 `remove()` 方法。\n\n\n\n## 使用自定义 ScriptContext\n\
  \n在上一节中，您看到每个 `ScriptEngine` 都有一个默认脚本上下文。`ScriptEngine` 的 `get()`、`put()`、`getBindings()`\
  \ 和 `setBindings()` 方法操作的是其默认的 `ScriptContext`。当 `ScriptEngine` 的 `eval()` 方法未指定\
  \ `ScriptContext` 时，将使用引擎的默认上下文。`ScriptEngine` 的 `eval()` 方法的以下两个版本使用其默认上下文来执行脚本：\n\
  \n*   `Object eval(String script)`\n*   `Object eval(Reader reader)`\n\n您可以将一个 `Bindings`\
  \ 传递给 `eval()` 方法的以下两个版本：\n\n*   `Object eval(String script, Bindings bindings)`\n\
  *   `Object eval(Reader reader, Bindings bindings)`\n\n这些版本的 `eval()` 方法不使用 `ScriptEngine`\
  \ 的默认上下文。它们使用一个新的 `ScriptContext`，其引擎作用域的 `Bindings` 是传递给这些方法的那个，而全局作用域的 `Bindings`\
  \ 与引擎默认上下文的相同。请注意，这两个版本的 `eval()` 方法不会改动 `ScriptEngine` 的默认上下文。\n\n您可以将一个 `ScriptContext`\
  \ 传递给 `eval()` 方法的以下两个版本：\n\n*   `Object eval(String script, ScriptContext context)`\n\
  *   `Object eval(Reader reader, ScriptContext context)`\n\n这些版本的 `eval()` 方法使用指定的上下文来执行脚本。它们不会改动\
  \ `ScriptEngine` 的默认上下文。\n\n这三组 `eval()` 方法允许您使用不同的隔离级别来执行脚本：\n\n*   第一组允许所有脚本共享默认上下文。\n\
  *   第二组允许脚本使用不同的引擎作用域 `Bindings`，并共享全局作用域 `Bindings`。\n*   第三组允许脚本在隔离的 `ScriptContext`\
  \ 中执行。\n\n清单 9-12 展示了如何使用不同版本的 `eval()` 方法在不同的隔离级别下执行脚本。\n\n```\n// CustomContext.java\n\
  package com.jdojo.script;\nimport javax.script.Bindings;\nimport javax.script.ScriptContext;\n\
  import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\nimport\
  \ javax.script.ScriptException;\nimport javax.script.SimpleScriptContext;\nimport\
  \ static javax.script.SimpleScriptContext.ENGINE_SCOPE;\nimport static javax.script.SimpleScriptContext.GLOBAL_SCOPE;\n\
  public class CustomContext {\npublic static void main(String[] args) throws ScriptException\
  \ {\nScriptEngineManager manager = new ScriptEngineManager();\nScriptEngine engine\
  \ = manager.getEngineByName(\"JavaScript\");\n// 将 n1 添加到 manager 的 Bindings 中，该\
  \ Bindings 将作为所有引擎的全局作用域 Bindings 被共享\nmanager.put(\"n1\", 100);\n// 准备脚本\nString\
  \ script = \"var sum = n1 + n2;\"\n+ \"print(msg + \"\n+ \"' n1=' + n1 + ', n2='\
  \ + n2 + \"\n+ \"', sum=' + sum);\";\n// 将 n2 添加到引擎默认上下文的引擎作用域中\nengine.put(\"n2\"\
  , 200);\nengine.put(\"msg\", \"使用默认上下文：\");\nengine.eval(script);\n// 使用 Bindings\
  \ 执行脚本\nBindings bindings = engine.createBindings();\nbindings.put(\"n2\", 300);\n\
  bindings.put(\"msg\", \"使用 Bindings：\");\nengine.eval(script, bindings);\n// 使用\
  \ ScriptContext 执行脚本\nScriptContext ctx = new SimpleScriptContext();\nBindings ctxGlobalBindings\
  \ = engine.createBindings();\nctx.setBindings(ctxGlobalBindings, GLOBAL_SCOPE);\n\
  ctx.setAttribute(\"n1\", 400, GLOBAL_SCOPE);\nctx.setAttribute(\"n2\", 500, ENGINE_SCOPE);\n\
  ctx.setAttribute(\"msg\", \"使用 ScriptContext：\", ENGINE_SCOPE);\nengine.eval(script,\
  \ ctx);\n// 再次使用默认上下文执行脚本，以证明默认上下文未受影响\nengine.eval(script);\n}\n}\n清单 9-12.\n使用不同的隔离级别执行脚本\n\
  ```\n\n```\n使用默认上下文： n1=100, n2=200, sum=300\n使用 Bindings： n1=100, n2=300, sum=400\n\
  使用 ScriptContext： n1=400, n2=500, sum=900\n使用默认上下文： n1=100, n2=200, sum=300\n```\n\
  \n该程序使用了三个名为 `msg`、`n1` 和 `n2` 的变量。它显示存储在 `msg` 变量中的值。`n1` 和 `n2` 的值相加，并显示总和。脚本会打印出计算总和时使用的\
  \ `n1` 和 `n2` 的值。`n1` 的值存储在 `ScriptEngineManager` 的 `Bindings` 中，该 `Bindings` 被所有\
  \ `ScriptEngine` 的默认上下文共享。`n2` 的值存储在默认上下文和自定义上下文的引擎作用域中。脚本使用引擎的默认上下文执行了两次，一次在开头，一次在结尾，以证明在\
  \ `eval()` 方法中使用自定义的 `Bindings` 或 `ScriptContext` 不会影响 `ScriptEngine` 默认上下文中的 `Bindings`。该程序在其\
  \ `main()` 方法中声明了一个 `throws` 子句，以使代码更简洁。\n\n## eval() 方法的返回值\n\n`ScriptEngine` 的\
  \ `eval()` 方法返回一个 `Object`，它是脚本中的最后一个值。如果脚本中没有最后一个值，则返回 `null`。依赖脚本中的最后一个值既容易出错，又令人困惑。以下代码片段展示了在\
  \ Nashorn 中使用 `eval()` 方法返回值的一些示例。代码中的注释指出了 `eval()` 方法返回的值。\n\n```\nObject result\
  \ = null;\n// 将 3 赋值给 result\nresult = engine.eval(\"1 + 2;\");\n// 将 7 赋值给 result\n\
  result = engine.eval(\"1 + 2; 3 + 4;\");\n// 将 6 赋值给 result\nresult = engine.eval(\"\
  1 + 2; 3 + 4; var v = 5; v = 6;\");\n// 将 7 赋值给 result\nresult = engine.eval(\"\
  1 + 2; 3 + 4; var v = 5;\");\n// 将 null 赋值给 result\nresult = engine.eval(\"print(1\
  \ + 2)\");\n```\n\n最好不要依赖 `eval()` 方法的返回值。您应该将一个 Java 对象作为参数传递给脚本，并让脚本将脚本的返回值存储在该对象中。执行\
  \ `eval()` 方法后，您可以查询该 Java 对象以获取返回值。\n\n清单 9-13 包含一个包装整数的 `Result` 类的代码。您将把一个 `Result`\
  \ 类的对象传递给脚本，脚本会将返回值存储在其中。脚本执行完毕后，您可以在 Java 代码中读取存储在 `Result` 对象中的整数值。`Result` 需要声明为\
  \ public，以便脚本引擎可以访问它。\n\n```\n// Result.java\npackage com.jdojo.script;\npublic\
  \ class Result {\nprivate int val = -1;\npublic void setValue(int x) {\nval = x;\n\
  }\npublic int getValue() {\nreturn val;\n}\n}\n清单 9-13.\n一个包装整数的 Result 类\n```\n\
  \n清单 9-14 中的程序展示了如何将一个 `Result` 对象传递给脚本，该脚本会用值填充 `Result` 对象。该程序在 `main()` 方法的声明中包含一个\
  \ `throws` 子句，以使代码保持简洁。\n\n```\n// ResultBearingScript.java\npackage com.jdojo.script;\n\
  import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\nimport\
  \ javax.script.ScriptException;\npublic class ResultBearingScript {\npublic static\
  \ void main(String[] args) throws ScriptException {\n// 获取 Nashorn 引擎\nScriptEngineManager\
  \ manager = new ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"\
  JavaScript\");\n// 将一个 Result 对象传递给脚本。脚本会将脚本的结果存储在该 result 对象中\nResult result =\
  \ new Result();\nengine.put(\"result\", result);\n// 将脚本存储在一个字符串中\nString script\
  \ = \"3 + 4; result.setValue(101);\";\n// 执行脚本，该脚本使用传入的 Result 对象来返回值\nengine.eval(script);\n\
  // 使用 result 对象从脚本中获取返回值\nint returnedValue = result.getValue(); // 将会是 101\nSystem.out.println(\"\
  返回的值是 \" + returnedValue);\n}\n}\n清单 9-14.\n在 Result 对象中收集脚本的返回值\n```\n\n```\n返回的值是\
  \ 101\n```\n\n\n\n## 引擎作用域绑定的保留键\n\n通常，引擎作用域 `Bindings` 中的键代表脚本变量。部分键是保留的，具有特殊含义。它们的值可能由引擎的实现传递给引擎。实现可以定义额外的保留键。\n\
  \n表 9-1 包含了所有保留键的列表。这些键也在 `ScriptEngine` 接口中被声明为常量。脚本引擎的实现不需要将所有此类键都传递给引擎作用域绑定中的引擎。作为开发者，你不应该使用这些键将参数从\
  \ Java 应用程序传递给脚本引擎。\n\n表 9-1.\n\n引擎作用域绑定的保留键\n\n| 键 | ScriptEngine 接口中的常量 | 键值的含义\
  \ |\n| --- | --- | --- |\n| `\"javax.script.argv\"` | `ScriptEngine.ARGV` | 用于传递一个\
  \ `Object` 数组，以传递一组位置参数。 |\n| `\"javax.script.engine\"` | `ScriptEngine.ENGINE`\
  \ | 脚本引擎的名称。 |\n| `\"javax.script.engine_version\"` | `ScriptEngine.ENGINE_VERSION`\
  \ | 脚本引擎的版本。 |\n| `\"javax.script.filename\"` | `ScriptEngine.FILENAME` | 用于传递作为脚本来源的文件或资源的名称。\
  \ |\n| `\"javax.script.language\"` | `ScriptEngine.LANGUAGE` | 脚本引擎所支持的语言的名称。 |\n\
  | `\"javax.script.language_version\"` | `ScriptEngine.LANGUAGE_VERSION` | 引擎所支持的脚本语言的版本。\
  \ |\n| `\"javax.script.name\"` | `ScriptEngine.NAME` | 脚本语言的简短名称。 |\n\n## 更改默认的\
  \ ScriptContext\n\n你可以分别使用 `ScriptEngine` 的 `getContext()` 和 `setContext()` 方法来获取和设置其默认上下文，如下所示：\n\
  \n```\nScriptEngineManager manager = new ScriptEngineManager();\nScriptEngine engine\
  \ = manager.getEngineByName(\"JavaScript\");\n// 获取 ScriptEngine 的默认上下文\nScriptContext\
  \ defaultCtx = engine.getContext();\n// 在此处使用 defaultCtx\n// 创建一个新的上下文\nScriptContext\
  \ ctx = new SimpleScriptContext();\n// 在此处配置 ctx\n// 将 ctx 设置为引擎的新默认上下文\nengine.setContext(ctx);\n\
  ```\n\n请注意，为 `ScriptEngine` 设置新的默认上下文不会使用 `ScriptEngineManager` 的 `Bindings` 作为其全局作用域\
  \ `Bindings`。如果你希望新的默认上下文使用 `ScriptEngineManager` 的 `Bindings`，则需要显式设置，如下所示：\n\n\
  ```\n// 创建一个新的上下文\nScriptContext ctx = new SimpleScriptContext();\n// 将 ctx 的全局作用域\
  \ Bindings 设置为与 manager 的 Bindings 相同\nctx.setBindings(manager.getBindings(), ScriptContext.GLOBAL_SCOPE);\n\
  // 将 ctx 设置为引擎的新默认上下文\nengine.setContext(ctx);\n```\n\n## 将脚本输出发送到文件\n\n你可以自定义脚本执行的输入源、输出目标和错误输出目标。你需要为用于执行脚本的\
  \ `ScriptContext` 设置适当的读取器和写入器。以下代码片段会将脚本输出写入当前目录下名为 `jsoutput.txt` 的文件中：\n\n```\n\
  // 创建一个 FileWriter\nFileWriter writer = new FileWriter(\"jsoutput.txt\");\n// 获取引擎的默认上下文\n\
  ScriptContext defaultCtx = engine.getContext();\n// 为引擎的默认上下文设置输出写入器\ndefaultCtx.setWriter(writer);\n\
  ```\n\n该代码为 `ScriptEngine` 的默认上下文设置了一个自定义输出写入器，该写入器将在使用默认上下文的脚本执行期间被使用。如果你希望为特定的脚本执行使用自定义输出写入器，则需要使用自定义的\
  \ `ScriptContext` 并设置其写入器。\n\n提示\n\n为 `ScriptContext` 设置自定义输出写入器不会影响 Java 应用程序标准输出的目标。要重定向\
  \ Java 应用程序的标准输出，你需要使用 `System.setOut()` 方法。\n\n清单 9-15 展示了如何将脚本执行的输出写入名为 `jsoutput.txt`\
  \ 的文件。该程序会在标准输出上打印输出文件的完整路径。当你运行该程序时，可能会得到不同的输出。你需要在文本编辑器中打开输出文件以查看脚本的输出。\n\n```\n\
  // CustomScriptOutput.java\npackage com.jdojo.script;\nimport java.io.File;\nimport\
  \ java.io.FileWriter;\nimport java.io.IOException;\nimport javax.script.ScriptContext;\n\
  import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\nimport\
  \ javax.script.ScriptException;\npublic class CustomScriptOutput {\npublic static\
  \ void main(String[] args) {\n// 获取 Nashorn 引擎\nScriptEngineManager manager = new\
  \ ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"JavaScript\"\
  );\n// 打印输出文件的绝对路径\nFile outputFile = new File(\"jsoutput.txt\");\nSystem.out.println(\"\
  脚本输出将被写入 \"\n+ outputFile.getAbsolutePath());\ntry (FileWriter writer = new FileWriter(outputFile))\
  \ {\n// 为引擎设置自定义输出写入器\nScriptContext defaultCtx = engine.getContext();\ndefaultCtx.setWriter(writer);\n\
  // 执行一个脚本\nString script = \"print('Hello custom output writer')\";\nengine.eval(script);\n\
  } catch (IOException | ScriptException e) {\ne.printStackTrace();\n}\n}\n}\n清单 9-15.\n\
  将脚本输出写入文件\n```\n\n```\n脚本输出将被写入 C:\\Java9APIsAndMdoules\\jsoutput.txt\n```\n\n\n\
  \n## 在脚本中调用过程\n\n脚本语言通常允许创建过程、函数和方法。Java 脚本 API 让您能够从 Java 应用程序中调用这些过程、函数和方法。在本节中，我使用术语“过程”来统指过程、函数和方法。当讨论的上下文需要时，我会使用具体的术语。\n\
  \n并非所有脚本引擎都必须支持过程调用。Nashorn JavaScript 引擎支持过程调用。如果某个脚本引擎支持此功能，则该脚本引擎类的实现必须实现 `Invocable`\
  \ 接口。在调用过程之前，开发者有责任检查脚本引擎是否实现了 `Invocable` 接口。调用过程分为四个步骤：\n\n*   检查脚本引擎是否支持过程调用。\n\
  *   将引擎引用强制转换为 `Invocable` 类型。\n*   评估包含过程源代码的脚本。\n*   使用 `Invocable` 接口的 `invokeFunction()`\
  \ 方法来调用过程和函数。使用 `invokeMethod()` 方法来调用在脚本语言中创建的对象的成员方法。\n\n以下代码片段执行检查，确认脚本引擎实现类是否实现了\
  \ `Invocable` 接口：\n\n```\n// 获取 Nashorn 引擎\nScriptEngineManager manager = new ScriptEngineManager();\n\
  ScriptEngine engine = manager.getEngineByName(\"JavaScript\");\n// 确保脚本引擎实现了 Invocable\
  \ 接口\nif (engine instanceof Invocable) {\nSystem.out.println(\"支持调用过程。\");\n} else\
  \ {\nSystem.out.println(\"不支持调用过程。\");\n}\n```\n\n第二步是将引擎引用强制转换为 `Invocable` 接口类型。\n\
  \n```\nInvocable inv = (Invocable)engine;\n```\n\n第三步是评估脚本，以便脚本引擎编译并存储过程的编译形式，供后续调用。以下代码片段执行此步骤：\n\
  \n```\n// 声明一个名为 add 的函数，用于相加两个数字\nString script = \"function add(n1, n2) { return\
  \ n1 + n2; }\";\n// 评估该函数。调用 eval() 并不会调用该函数，只是编译它。\nengine.eval(script);\n```\n\
  \n最后一步是调用过程或函数。\n\n```\n// 调用 add 函数，并传入 30 和 40 作为函数参数。\n// 这就像在脚本中调用了 add(30,\
  \ 40) 一样。\nObject result = inv.invokeFunction(\"add\", 30, 40);\n```\n\n`invokeFunction()`\
  \ 的第一个参数是过程或函数的名称。第二个参数是一个可变参数，用于指定传递给过程或函数的参数。`invokeFunction()` 方法返回过程或函数返回的值。\n\
  \n清单 9-16 展示了如何调用一个函数。它调用了一个用 Nashorn JavaScript 编写的函数。\n\n```\n// InvokeFunction.java\n\
  package com.jdojo.script;\nimport javax.script.Invocable;\nimport javax.script.ScriptEngine;\n\
  import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
  public class InvokeFunction {\npublic static void main(String[] args) {\nScriptEngineManager\
  \ manager = new ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"\
  JavaScript\");\n// 确保脚本引擎实现了 Invocable 接口\nif (!(engine instanceof Invocable)) {\n\
  System.out.println(\"不支持调用过程。\");\nreturn;\n}\n// 将引擎引用强制转换为 Invocable 类型\nInvocable\
  \ inv = (Invocable) engine;\ntry {\nString script = \"function add(n1, n2) { return\
  \ n1 + n2; }\";\n// 首先评估脚本\nengine.eval(script);\n// 调用 add 函数两次\nObject result1\
  \ = inv.invokeFunction(\"add\", 30, 40);\nSystem.out.println(\"结果 1 = \" + result1);\n\
  Object result2 = inv.invokeFunction(\"add\", 10, 20);\nSystem.out.println(\"结果 2\
  \ = \" + result2);\n} catch (ScriptException | NoSuchMethodException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 9-16.\n调用用 Nashorn JavaScript 编写的函数\n```\n\n```\n结果 1 = 70\n结果 2 = 30\n\
  ```\n\n面向对象或基于对象的脚本语言可能允许您定义对象及其方法。您可以使用 `Invocable` 接口的 `invokeMethod()` 方法来调用此类对象的方法，该方法声明如下：\n\
  \n```\nObject invokeMethod(Object objectRef, String name, Object... args)\n```\n\
  \n第一个参数是对象的引用，第二个参数是您想要在该对象上调用的方法名称，第三个参数是一个可变参数，用于向被调用的方法传递参数。\n\n清单 9-17 演示了如何在\
  \ Nashorn JavaScript 中创建的对象上调用方法。请注意，该对象是在 Nashorn 脚本内部创建的。要从 Java 调用该对象的方法，您需要通过脚本引擎获取该对象的引用。程序评估一个脚本，该脚本创建了一个带有\
  \ `add()` 方法的对象，并将其引用存储在一个名为 `calculator` 的变量中。`engine.get(\"calculator\")` 方法将\
  \ `calculator` 对象的引用返回给 Java 代码。\n\n```\n// InvokeMethod.java\npackage com.jdojo.script;\n\
  import javax.script.Invocable;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
  import javax.script.ScriptException;\npublic class InvokeMethod {\npublic static\
  \ void main(String[] args) {\n// 获取 Nashorn 引擎\nScriptEngineManager manager = new\
  \ ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"JavaScript\"\
  );\n// 确保脚本引擎实现了 Invocable 接口\nif (!(engine instanceof Invocable)) {\nSystem.out.println(\"\
  不支持调用方法。\");\nreturn;\n}\n// 将引擎引用强制转换为 Invocable 类型\nInvocable inv = (Invocable)\
  \ engine;\ntry {\n// 声明一个带有 add() 方法的全局对象\nString script = \"var calculator = new\
  \ Object();\"\n+ \"calculator.add = function add(n1, n2){return n1 + n2;}\";\n//\
  \ 首先评估脚本\nengine.eval(script);\n// 获取在脚本中创建的 calculator 对象引用\nObject calculator\
  \ = engine.get(\"calculator\");\n// 在 calculator 对象上调用 add() 方法\nObject result =\
  \ inv.invokeMethod(calculator, \"add\", 30, 40);\nSystem.out.println(\"结果 = \" +\
  \ result);\n} catch (ScriptException | NoSuchMethodException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 9-17.\n在 Nashorn JavaScript 中创建的对象上调用方法\n```\n\n```\n结果 = 70\n```\n\n\
  提示\n\n使用 `Invocable` 接口可以重复执行过程、函数和方法。评估包含过程、函数和方法的脚本时，引擎会存储中间代码，这有助于在重复执行时提升性能。\n\
  \n\n\n## 在脚本中实现 Java 接口\n\nJava 脚本 API 允许你在脚本语言中实现 Java 接口。Java 接口的方法可以在脚本中使用顶层过程或对象的实例方法来实现。在脚本语言中实现\
  \ Java 接口的好处是，你可以在 Java 代码中使用该接口的实例，就像该接口是用 Java 实现的一样。你可以将接口的实例作为参数传递给 Java 方法。`Invocable`\
  \ 接口的 `getInterface()` 方法用于获取在脚本中实现的 Java 接口的实例。该方法有两个版本：\n\n*   `<T> T getInterface(Class<T>\
  \ cls)`\n*   `<T> T getInterface(Object obj, Class<T> cls)`\n\n第一个版本用于获取一个 Java\
  \ 接口的实例，该接口的方法在脚本中作为顶层过程实现。接口类型作为参数传递给此方法。假设你有一个 `Calculator` 接口，如清单 9-18 所示，它有两个方法：`add()`\
  \ 和 `subtract()`。\n\n```\n// Calculator.java\npackage com.jdojo.script;\npublic\
  \ interface Calculator {\nint add (int n1, int n2);\nint subtract (int n1, int n2);\n\
  }\n清单 9-18.\n一个 Calculator 接口\n```\n\n考虑以下用 JavaScript 编写的两个顶层函数：\n\n```\nfunction\
  \ add(n1, n2) {\nreturn n1 + n2;\n}\nfunction subtract(n1, n2) {\nreturn n1 - n2;\n\
  }\n```\n\n这两个函数为 `Calculator` 接口的两个方法提供了实现。在这些函数被 JavaScript 引擎编译后，你可以按如下方式获取 `Calculator`\
  \ 接口的实例：\n\n```\n// 将引擎引用转换为 Invocable 类型\nInvocable inv = (Invocable) engine;\n\
  // 获取 Calculator 接口的引用\nCalculator calc = inv.getInterface(Calculator.class);\n\
  if (calc == null) {\nSystem.err.println(\"未找到 Calculator 接口实现。\");\n} else {\n//\
  \ 使用 calc 调用 add() 和 subtract() 方法\n}\n```\n\n你可以按如下方式对两个数字进行加法运算：\n\n```\nint sum\
  \ = calc.add(15, 10);\n```\n\n清单 9-19 展示了如何在 Nashorn 中使用顶层过程实现 Java 接口。请查阅脚本语言的文档，了解它如何支持此功能。\n\
  \n```\n// UsingInterfaces.java\npackage com.jdojo.script;\nimport javax.script.Invocable;\n\
  import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\nimport\
  \ javax.script.ScriptException;\npublic class UsingInterfaces {\npublic static void\
  \ main(String[] args) {\n// 获取 Nashorn 引擎\nScriptEngineManager manager = new ScriptEngineManager();\n\
  ScriptEngine engine = manager.getEngineByName(\"JavaScript\");\n// 确保脚本引擎实现了 Invocable\
  \ 接口\nif (!(engine instanceof Invocable)) {\nSystem.out.println(\"脚本中的接口实现不受支持。\"\
  );\nreturn;\n}\n// 将引擎引用转换为 Invocable 类型\nInvocable inv = (Invocable) engine;\n\
  // 创建 add() 和 subtract() 函数的脚本\nString script = \"function add(n1, n2) { return\
  \ n1 + n2; } \"\n+ \"function subtract(n1, n2) { return n1 - n2; }\";\ntry {\n//\
  \ 编译脚本，该脚本将存储在引擎中\nengine.eval(script);\n// 获取接口实现\nCalculator calc = inv.getInterface(Calculator.class);\n\
  if (calc == null) {\nSystem.err.println(\"未找到 Calculator 接口实现。\");\nreturn;\n}\n\
  int result1 = calc.add(15, 10);\nSystem.out.println(\"add(15, 10) = \" + result1);\n\
  int result2 = calc.subtract(15, 10);\nSystem.out.println(\"subtract(15, 10) = \"\
  \ + result2);\n} catch (ScriptException e) {\ne.printStackTrace();\n}\n}\n}\n清单\
  \ 9-19.\n在脚本中使用顶层函数实现 Java 接口\n```\n\n```\nadd(15, 10) = 25\nsubtract(15, 10) =\
  \ 5\n```\n\n`getInterface()` 方法的第二个版本用于获取一个 Java 接口的实例，该接口的方法作为对象的实例方法实现。它的第一个参数是在脚本语言中创建的对象的引用。该对象的实例方法实现了作为第二个参数传入的接口类型。以下\
  \ Nashorn 代码创建了一个对象，其实例方法实现了 `Calculator` 接口：\n\n```\n// 创建一个对象\nvar calc = new\
  \ Object();\n// 向 calc 对象添加 add() 和 subtract() 方法\ncalc.add = function add(n1, n2)\
  \ {\nreturn n1 + n2;\n};\ncalc.subtract = function subtract(n1, n2) {\nreturn n1\
  \ - n2;\n};\n```\n\n当脚本对象的实例方法实现了 Java 接口的方法时，你需要执行一个额外的步骤。在获取接口实例之前，你需要先获取脚本对象的引用，如下所示：\n\
  \n```\n// 获取全局脚本对象 calc 的引用\nObject calc = engine.get(\"calc\");\n// 获取 Calculator\
  \ 接口的实现\nCalculator calculator = inv.getInterface(calc, Calculator.class);\n```\n\
  \n清单 9-20 展示了如何使用 Nashorn 将 Java 接口的方法作为对象的实例方法来实现。\n\n```\n// ScriptObjectImplInterface.java\n\
  package com.jdojo.script;\nimport javax.script.Invocable;\nimport javax.script.ScriptEngine;\n\
  import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
  public class ScriptObjectImplInterface {\npublic static void main(String[] args)\
  \ {\n// 获取 Nashorn 引擎\nScriptEngineManager manager = new ScriptEngineManager();\n\
  ScriptEngine engine = manager.getEngineByName(\"JavaScript\");\n// 确保引擎实现了 Invocable\
  \ 接口\nif (!(engine instanceof Invocable)) {\nSystem.out.println(\"脚本中的接口实现不受支持。\"\
  );\nreturn;\n}\n// 将引擎引用转换为 Invocable 类型\nInvocable inv = (Invocable) engine;\n\
  String script = \"var calc = new Object(); \"\n+ \"calc.add = function add(n1, n2)\
  \ {return n1 + n2; }; \"\n+ \"calc.subtract = function subtract(n1, n2) {return\
  \ n1 - n2;};\";\ntry {\n// 编译并将脚本存储在引擎中\nengine.eval(script);\n// 获取全局脚本对象 calc\
  \ 的引用\nObject calc = engine.get(\"calc\");\n// 获取 Calculator 接口的实现\nCalculator calculator\
  \ = inv.getInterface(calc, Calculator.class);\nif (calculator == null) {\nSystem.err.println(\"\
  未找到 Calculator 接口实现。\");\nreturn;\n}\nint result1 = calculator.add(15, 10);\nSystem.out.println(\"\
  add(15, 10) = \" + result1);\nint result2 = calculator.subtract(15, 10);\nSystem.out.println(\"\
  subtract(15, 10) = \" + result2);\n} catch (ScriptException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 9-20.\n在脚本中将 Java 接口的方法作为对象的实例方法实现\n```\n\n```\nadd(15, 10) = 25\nsubtract(15,\
  \ 10) = 5\n```\n\n\n\n## 使用编译后的脚本\n\n脚本引擎可能允许编译脚本并重复执行。执行编译后的脚本可以提高应用程序的性能。脚本引擎可以以\
  \ Java 类、Java 类文件或特定于语言的形式编译和存储脚本。\n\n并非所有脚本引擎都需要支持脚本编译。支持脚本编译的脚本引擎必须实现 `Compilable`\
  \ 接口。Nashorn 引擎支持脚本编译。以下代码片段检查脚本引擎是否实现了 `Compilable` 接口：\n\n```\n// 获取脚本引擎引用\nScriptEngineManager\
  \ manager = new ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"\
  YOUR_ENGINE_NAME\");\nif (engine instanceof Compilable) {\nSystem.out.println(\"\
  支持脚本编译。\");\n} else {\nSystem.out.println(\"不支持脚本编译。\");\n}\n```\n\n一旦知道脚本引擎实现了\
  \ `Compilable` 接口，就可以将其引用转换为 `Compilable` 类型，如下所示：\n\n```\n// 将引擎引用转换为 Compilable\
  \ 类型\nCompilable comp = (Compilable) engine;\n```\n\n`Compilable` 接口包含两个方法：\n\n\
  *   `CompiledScript compile(String script) throws ScriptException`\n*   `CompiledScript\
  \ compile(Reader script) throws ScriptException`\n\n这两个版本的方法仅在脚本来源的类型上有所不同。第一个版本接受脚本作为\
  \ `String`，第二个版本接受脚本作为 `Reader`。\n\n`compile()` 方法返回一个 `CompiledScript` 类的对象。`CompiledScript`\
  \ 是一个抽象类。脚本引擎的提供者提供此类的具体实现。`CompiledScript` 与创建它的 `ScriptEngine` 相关联。`CompiledScript`\
  \ 类的 `getEngine()` 方法返回与之关联的 `ScriptEngine` 的引用。\n\n要执行编译后的脚本，需要调用 `CompiledScript`\
  \ 类的以下 `eval()` 方法之一：\n\n*   `Object eval() throws ScriptException`\n*   `Object\
  \ eval(Bindings bindings) throws ScriptException`\n*   `Object eval(ScriptContext\
  \ context) throws ScriptException`\n\n不带任何参数的 `eval()` 方法使用脚本引擎的默认脚本上下文来执行编译后的脚本。另外两个版本的工作方式与\
  \ `ScriptEngine` 接口的 `eval()` 方法在向其传递 `Bindings` 或 `ScriptContext` 时相同。\n\n清单 9-21\
  \ 展示了如何编译脚本并执行它。它使用不同的参数两次执行相同的编译脚本。\n\n```\n// CompilableTest .java\npackage com.jdojo.script;\n\
  import javax.script.Bindings;\nimport javax.script.Compilable;\nimport javax.script.CompiledScript;\n\
  import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\nimport\
  \ javax.script.ScriptException;\npublic class CompilableTest {\npublic static void\
  \ main(String[] args) {\n// 获取 Nashorn 引擎\nScriptEngineManager manager = new ScriptEngineManager();\n\
  ScriptEngine engine = manager.getEngineByName(\"JavaScript\");\nif (!(engine instanceof\
  \ Compilable)) {\nSystem.out.println(\"不支持脚本编译。\");\nreturn;\n}\n// 将引擎引用转换为 Compilable\
  \ 类型\nCompilable comp = (Compilable) engine;\ntry {\n// 编译脚本\nString script = \"\
  print(n1 + n2)\";\nCompiledScript cScript = comp.compile(script);\n// 将 n1 和 n2\
  \ 脚本变量存储在 Bindings 中\nBindings scriptParams = engine.createBindings();\nscriptParams.put(\"\
  n1\", 2);\nscriptParams.put(\"n2\", 3);\ncScript.eval(scriptParams);\n// 使用不同的 n1\
  \ 和 n2 值再次执行脚本\nscriptParams.put(\"n1\", 9);\nscriptParams.put(\"n2\", 7);\ncScript.eval(scriptParams);\n\
  } catch (ScriptException e) {\ne.printStackTrace();\n}\n}\n}\n清单 9-21.\n使用编译后的脚本\n\
  ```\n\n```\n\n```\n\n## 在脚本语言中使用 Java\n\n脚本语言允许在脚本中使用 Java 类库。每种脚本语言都有自己使用 Java\
  \ 类的语法。讨论所有脚本语言的语法是不可能的，也超出了本书的范围。在本节中，我将讨论在 Nashorn 中使用某些 Java 构造的语法。有关 Nashorn\
  \ 的完整介绍，请参考网站 [`https://docs.oracle.com/javase/9/nashorn/`](https://docs.oracle.com/javase/9/nashorn/)\
  \ 。\n\n### 声明变量\n\n在脚本语言中声明变量与 Java 无关。通常，脚本语言允许你为变量赋值而无需声明它们。变量的类型根据它们存储的值的类型在运行时确定。\n\
  \n在 Nashorn 中，关键字 `var` 用于声明变量。如果愿意，可以在变量声明中省略关键字 `var`。以下代码片段声明了两个变量并为其赋值：\n\n\
  ```\n// 使用 var 关键字声明一个名为 msg 的变量\nvar msg = \"Hello\";\n// 不使用关键字 var 声明一个名为 greeting\
  \ 的变量\ngreeting = \"Hello\";\n```\n\n你可以在 Nashorn 中使用 `const` 和 `let` 关键字来声明常量和作用域变量：\n\
  \n```\n// 将 PI 声明为常量\nconst PI = 3.14;\nprint(\"PI = \" + PI);\nlet x = 100;\n{\n\
  let x = 200;\nprint(\"Inner: x = \" + x); // 此处 x 为 200\n}\nprint(\"Outer: x = \"\
  \ + x); // 此处 x 为 100\n```\n\n你必须在 Nashorn 中启用 ES6 才能成功执行上述代码片段，因为 `const` 和 `let`\
  \ 是 ES6 特性。你需要向 Nashorn 引擎传递 `--language=es6` 以启用 ES6 特性。以下命令展示了如何在命令行中执行此操作：\n\n\
  ```\nC:\\Java9APIsAndModules>java --module-path dist -Dnashorn.args=--language=es6\n\
  --module jdojo.script/com.jdojo.script.Test\n```\n\n### 导入 Java 类\n\n在 Nashorn 中有四种方法可以在脚本中导入\
  \ Java 类：\n\n*   使用 `Packages` 全局对象\n*   使用 Java 全局对象的 `type()` 函数\n*   使用 `importPackage()`\
  \ 和 `importClass()` 函数\n*   在 `with` 子句中使用 `JavaImporter` 对象\n\n以下各节详细描述了在脚本中导入\
  \ Java 类的四种方法。\n\n#### 使用 Packages 全局对象\n\nNashorn 将所有 Java 包定义为名为 `Packages` 的全局变量的属性。例如，`java.lang`\
  \ 和 `javax.swing` 包可以分别引用为 `Packages.java.lang` 和 `Packages.javax.swing`。以下代码片段在\
  \ Nashorn 中使用了 `java.util.List` 和 `javax.swing.JFrame`：\n\n```\n// 创建一个 List\nvar\
  \ list1 = new Packages.java.util.ArrayList();\n// 创建一个 JFrame\nvar frame1 = new\
  \ Packages.javax.swing.JFrame(\"Test\");\n```\n\nNashorn 将 `java`、`javax`、`org`、`com`、`edu`\
  \ 和 `net` 声明为全局变量，它们分别是 `Packages.java`、`Packages.javax`、`Packages.org`、`Packages.com`、`Packages.edu`\
  \ 和 `Packages.net` 的别名。本书示例中的类名以前缀 `com` 开头，例如 `com.jdojo.script.Test`。要在 JavaScript\
  \ 代码中使用此类名，你可以使用 `Packages.com.jdojo.script.Test` 或 `com.jdojo.script.Test`。但是，如果类名不是以这些预定义前缀之一开头，则必须使用\
  \ `Packages` 全局变量来访问它；例如，如果你的类名是 `p1.Test`，则需要在 JavaScript 代码中使用 `Packages.p1.Test`\
  \ 来访问它。以下代码片段使用了 `java` 和 `javax` 作为 `Packages.java` 和 `Packages.javax` 的别名：\n\n\
  ```\n// 创建一个 List\nvar list2 = new java.util.ArrayList();\n// 创建一个 JFrame\nvar frame2\
  \ = new javax.swing.JFrame(\"Test\");\n```\n\n\n\n#### 使用 Java 全局对象\n\n在 Java 7\
  \ 的 Rhino JavaScript 中，也支持将包作为 `Packages` 对象的属性进行访问。使用 `Packages` 对象速度较慢且容易出错。Nashorn\
  \ 定义了一个名为 `Java` 的新全局对象，其中包含许多用于处理 Java 包和类的实用函数。如果你使用的是 Java 8 或更高版本，则应使用 `Java`\
  \ 对象而非 `Packages` 对象。`Java` 对象的 `type()` 函数可将 Java 类型导入脚本。你需要传入要导入的 Java 类型的完全限定名。在\
  \ Nashorn 中，以下代码片段导入了 `java.util.ArrayList` 类并创建了其对象：\n\n```\n// 导入 java.util.ArrayList\
  \ 类型，并将其称为 ArrayList\nvar ArrayList = Java.type(\"java.util.ArrayList\");\n// 创建一个\
  \ ArrayList 类型的对象\nvar list = new ArrayList();\n```\n\n在代码中，你将 `Java.type()` 函数返回的导入类型称为\
  \ `ArrayList`，这也是所导入类的名称。这样做是为了让下一条语句读起来就像是用 Java 编写的一样。第二条语句的读者会知道你在创建一个 `ArrayList`\
  \ 类的对象。不过，你可以为导入的类型指定任何你想要的名称。以下代码片段导入了 `java.util.ArrayList` 并将其称为 `MyList`：\n\n\
  ```\n// 导入 java.util.ArrayList 类型，并将其称为 MyList\nvar MyList = Java.type(\"java.util.ArrayList\"\
  );\n// 创建一个 MyList 类型的对象\nvar list2 = new MyList();\n```\n\n#### 使用 importPackage()\
  \ 和 importClass() 函数\n\nRhino JavaScript 允许在脚本中使用 Java 类型的简单名称。Rhino JavaScript\
  \ 有两个内置函数，分别名为 `importPackage()` 和 `importClass()`，用于导入一个包中的所有类以及一个包中的某个类。出于兼容性考虑，Nashorn\
  \ 保留了这些函数。要在 Nashorn 中使用这些函数，你需要使用 `load()` 函数从 `mozilla_compat.js` 文件中加载兼容性模块。以下代码片段使用这些函数重写了之前的逻辑：\n\
  \n```\n// 加载兼容性模块。这在 Nashorn 中是必需的，在 Rhino 中则不需要。\nload(\"nashorn:mozilla_compat.js\"\
  );\n// 从 java.util 包中导入 ArrayList 类\nimportClass(java.util.ArrayList);\n// 从 javax.swing\
  \ 包中导入所有类\nimportPackage(javax.swing);\n// 使用类的简单名称\nvar list1 = new ArrayList();\n\
  var frame1 = new JFrame(\"Test\");\n```\n\nJavaScript 不会自动导入 `java.lang` 包中的所有类，因为\
  \ JavaScript 中同名的类（例如 `String`、`Object`、`Number` 等）会与 `java.lang` 包中的类名冲突。要使用 `java.lang`\
  \ 包中的某个类，你可以导入它，或者使用 `Packages` 或 `Java` 变量来使用其完全限定名。你不能导入 `java.lang` 包中的所有类。以下代码片段会生成一个错误，因为\
  \ `String` 类名已在 JavaScript 中定义：\n\n```\n// 加载兼容性模块。这在 Nashorn 中是必需的，在 Rhino 中则不需要。\n\
  load(\"nashorn:mozilla_compat.js\");\nimportClass(java.lang.String); // 错误\n```\n\
  \n如果你想使用 `java.lang.String` 类，你需要使用其完全限定名。以下代码片段使用了内置的 JavaScript `String` 类和 `java.lang.String`\
  \ 类：\n\n```\nvar javaStr = new java.lang.String(\"Hello\"); // Java String 类\nvar\
  \ jsStr = new String(\"Hello\");             // JavaScript String 类\n```\n\n如果 `java.lang`\
  \ 包中的类名与 JavaScript 顶层类名不冲突，你可以使用 `importClass()` 函数导入该 Java 类。例如，你可以使用以下代码片段来使用\
  \ `java.lang.System` 类：\n\n```\n// 加载兼容性模块。这在 Nashorn 中是必需的，在 Rhino 中则不需要。\nload(\"\
  nashorn:mozilla_compat.js\");\nimportClass(java.lang.System);\nvar jsStr = new String(\"\
  Hello\");\nSystem.out.println(jsStr);\n```\n\n在此代码片段中，`jsStr` 是一个 JavaScript `String`，它被传递给了接受\
  \ `java.lang.String` 类型的 `System.out.println()` Java 方法。在这种情况下，JavaScript 会自动处理从\
  \ JavaScript 类型到 Java 类型的转换。\n\n#### 使用 JavaImporter 对象\n\n在 JavaScript 中，你可以在 `with`\
  \ 子句中使用 `JavaImporter` 对象引用来使用类的简单名称。`JavaImporter` 类的构造函数接受一个 Java 包和类的列表。你可以像这样创建一个\
  \ `JavaImporter` 对象：\n\n```\n// 从 java.lang 包中导入所有类\nvar langPkg = new JavaImporter(Packages.java.lang);\n\
  // 从 java.lang 和 java.util 包中导入所有类，以及从 javax.swing 包中导入 JFrame 类\nvar pkg2 = JavaImporter(java.lang,\
  \ java.util, javax.swing.JFrame);\n```\n\n注意第一条语句中使用了 `new` 运算符。第二条语句没有使用 `new`\
  \ 运算符。这两条语句在 JavaScript 中都是有效的。\n\n以下代码片段创建了一个 `JavaImporter` 对象并在 `with` 子句中使用了它：\n\
  \n```\n// 为 java.lang 和 java.util 包创建一个 Java 导入器\nvar javaLangAndUtilPkg = JavaImporter(java.lang,\
  \ java.util);\n// 在 with 子句中使用导入的类型\nwith (javaLangAndUtilPkg) {\nvar list = new\
  \ ArrayList();\nlist.add(\"one\");\nlist.add(\"two\");\nSystem.out.println(\"Hello\"\
  );\nSystem.out.println(\"List is \" + list);\n}\n```\n\n```\nHello\nList is [one,\
  \ two]\n```\n\n### 创建和使用 Java 对象\n\n在脚本中使用 `new` 运算符和构造函数来创建新的 Java 对象。以下代码片段在 Nashorn\
  \ 中创建了一个 `String` 对象：\n\n```\n// 创建一个 Java String 对象\nvar javaString = new java.lang.String(\"\
  A Java string\");\n```\n\n在大多数脚本语言中，访问 Java 对象的方法和属性是类似的。某些脚本语言允许你使用属性名来调用对象上的 getter\
  \ 和 setter 方法。以下 Nashorn 代码片段创建了一个 `java.util.Date` 对象，并使用属性名和方法名访问了该对象的方法：\n\n\
  ```\nvar dt = new java.util.Date();\nvar year = dt.year + 1900;\nvar month = dt.month\
  \ + 1;\nvar date = dt.getDate();\nprint(\"Date:\" + dt);\nprint(\"Year:\" + year\
  \ + \", Month:\" + month + \", Day:\" + date);\n```\n\n```\nDate:Fri Jan 19 20:50:32\
  \ CST 2018\nYear:2018, Month:1, Day:19\n```\n\n在使用 JavaScript 时，理解不同类型的 `String`\
  \ 对象非常重要。一个 `String` 对象可能是 JavaScript `String` 对象或 Java `java.lang.String` 对象。JavaScript\
  \ 为其 `String` 类定义了一个 `length` 属性，而 Java 为其 `java.lang.String` 类定义了一个 `length()`\
  \ 方法。以下代码片段展示了创建和访问 JavaScript `String` 与 Java `java.lang.String` 对象长度的区别：\n\n```\n\
  // JavaScript String\nvar jsStr = new String(\"Hello JavaScript String\");\nprint(\"\
  JavaScript String: \" + jsStr);\nprint(\"JavaScript String Length: \" + jsStr.length);\n\
  // Java String\nvar javaStr = new java.lang.String(\"Hello Java String\");\nprint(\"\
  Java String: \" + javaStr);\nprint(\"Java String Length: \" + javaStr.length());\n\
  ```\n\n```\nJavaScript String: Hello JavaScript String\nJavaScript String Length:\
  \ 23\nJava String: Hello Java String\nJava String Length: 17\n```\n\n\n\n### 使用重载的\
  \ Java 方法\n\nJava 在编译时解析重载方法调用。也就是说，Java 编译器会确定代码运行时将要调用的方法签名。考虑清单 9-22 中所示的 `PrintTest`\
  \ 类代码。第二行可能会得到不同的输出。\n\n```\n// PrintTest.java\npackage com.jdojo.script;\npublic\
  \ class PrintTest {\npublic void print(String str) {\nSystem.out.println(\"print(String):\
  \ \" + str);\n}\npublic void print(Object obj) {\nSystem.out.println(\"print(Object):\
  \ \" + obj);\n}\npublic void print(Double num) {\nSystem.out.println(\"print(Double):\
  \ \" + num);\n}\npublic static void main(String[] args) {\nPrintTest pt = new PrintTest();\n\
  Object[] list = new Object[]{\"Hello\", new Object(), 10.5};\nfor (Object arg :\
  \ list) {\npt.print(arg);\n}\n}\n}\n清单 9-22.\n在 Java 中使用重载方法\n```\n\n```\nprint(Object):\
  \ Hello\nprint(Object): java.lang.Object@affc70\nprint(Object): 10.5\n```\n\n当运行\
  \ `PrintTest` 类时，对 `print()` 方法的三次调用都调用了 `PrintTest` 类的同一个版本 `print(Object)`。在编译代码时，Java\
  \ 编译器将调用 `pt.print(arg)` 视为对 `print()` 方法的调用，其参数类型为 `Object`（即 `arg` 的类型），因此将此调用绑定到\
  \ `print(Object)` 方法。\n\n在脚本语言中，变量的类型在运行时确定，而非编译时。脚本语言的解释器会根据方法调用中参数的运行时类型，适当地解析重载方法调用。以下\
  \ JavaScript 代码的输出显示，对 `PrintTest` 类的 `print()` 方法的调用是在运行时根据参数类型解析的：\n\n```\n//\
  \ 在 JavaScript 中\nvar pt = new com.jdojo.script.PrintTest();\nvar list = [\"Hello\"\
  , new Object(), 10.5];\nfor (var i = 0; i < list.length; ++i) {\npt.print(list[i]);\n\
  }\n```\n\n```\nprint(String): Hello\nprint(Object): [object Object]\nprint(Double):\
  \ 10.5\n```\n\nJavaScript 允许你显式选择重载方法的特定版本。你可以通过对象引用传递要调用的重载方法的签名。以下代码片段选择了 `print(Object)`\
  \ 版本：\n\n```\n// 在 JavaScript 中\nvar pt = new com.jdojo.script.PrintTest();\npt\"\
  print(java.lang.Object)\"; // 调用 print(Object)\npt\"print(java.lang.Double)\"; //\
  \ 调用 print(Double)\n```\n\n```\nprint(Object): 10.5\nprint(Double): 10.5\n```\n\n\
  ### 使用 Java 数组\n\n在 Rhino 和 Nashorn 中，在 JavaScript 中创建 Java 数组的方式有所不同。在 Rhino 中，你需要使用\
  \ `java.lang.reflect.Array` 类的 `newInstance()` 静态方法来创建 Java 数组。Nashorn 也支持这种语法。以下代码片段展示了如何使用\
  \ Rhino 语法创建和访问 Java 数组：\n\n```\n// 创建一个包含 2 个元素的 java.lang.String 数组，填充它，并打印元素。\n\
  // 在 Rhino 中，你可以将 java.lang.String 作为第一个参数，但在 Nashorn 中，\n// 你需要改用 java.lang.String.class。\n\
  var strArray = java.lang.reflect.Array.newInstance(java.lang.String.class, 2);\n\
  strArray[0] = \"Hello\";\nstrArray[1] = \"Array\";\nfor(var i = 0; i < strArray.length;\
  \ i++) {\nprint(strArray[i]);\n}\n```\n\n```\nHello\nArray\n```\n\n要创建基本类型数组，你需要使用其对应包装类的\
  \ `TYPE` 常量，如下所示：\n\n```\n// 创建一个包含 2 个元素的 int 数组，填充它，并打印元素\nvar intArray = java.lang.reflect.Array.newInstance(java.lang.Integer.TYPE,\
  \ 2);\nintArray[0] = 100;\nintArray[1] = 200;\nfor(var i = 0; i < intArray.length;\
  \ i++) {\nprint(intArray[i]);\n}\n```\n\n```\n\n```\n\nNashorn 支持一种创建 Java 数组的新语法。首先，使用\
  \ `Java.type()` 方法创建适当的 Java 数组类型，然后使用熟悉的 `new` 运算符创建数组。以下代码片段展示了如何在 Nashorn 中创建一个包含两个元素的\
  \ `String[]`：\n\n```\n// 获取 java.lang.String[] 类型\nvar StringArray = Java.type(\"\
  java.lang.String[]\");\n// 创建一个包含 2 个元素的 String[] 数组\nvar strArray = new StringArray(2);\n\
  strArray[0] = \"Hello\";\nstrArray[1] = \"Array\";\nfor(var i = 0; i < strArray.length;\
  \ i++) {\nprint(strArray[i]);\n}\n```\n\n```\nHello\nArray\n```\n\nNashorn 支持以相同方式创建基本类型数组。以下代码片段在\
  \ Nashorn 中创建了一个包含两个元素的 `int[]`：\n\n```\n// 获取 int[] 类型\nvar IntArray = Java.type(\"\
  int[]\");\n// 创建一个包含 2 个元素的 int[] 数组\nvar intArray = new IntArray(2);\nintArray[0]\
  \ = 100;\nintArray[1] = 200;\nfor(var i = 0; i < intArray.length; i++) {\nprint(intArray[i]);\n\
  }\n```\n\n```\n\n```\n\n当期望使用 Java 数组时，你可以使用 JavaScript 数组。JavaScript 会执行从 JavaScript\
  \ 数组到 Java 数组的必要转换。假设你有一个 `PrintArray` 类，如清单 9-23 所示，其中包含一个接受 `String` 数组作为参数的 `print()`\
  \ 方法。\n\n```\n// PrintArray.java\npackage com.jdojo.script;\npublic class PrintArray\
  \ {\npublic void print(String[] list) {\nSystem.out.println(\"Inside print(String[]\
  \ list):\");\nfor(String s : list) {\nSystem.out.println(s);\n}\n}\n}\n清单 9-23.\n\
  一个 PrintArray 类\n```\n\n以下 JavaScript 代码片段将一个 JavaScript 数组传递给 `PrintArray.print(String[])`\
  \ 方法。JavaScript 负责将原生数组转换为 `String` 数组，如输出所示。\n\n```\n// 创建一个 JavaScript 数组并用三个字符串填充\n\
  var names = new Array();\nnames[0] = \"Rhino\";\nnames[1] = \"Nashorn\";\nnames[2]\
  \ = \"JRuby\";\n// 创建 PrintArray 类的对象\nvar pa = new com.jdojo.script.PrintArray();\n\
  // 将 JavaScript 数组传递给 PrintArray.print(String[] list) 方法\npa.print(names);\n```\n\
  \n```\nInside print(String[] list):\nRhino\nNashorn\nJRuby\n```\n\nNashorn 支持使用\
  \ `Java.to()` 和 `Java.from()` 函数在 Java 和 JavaScript 数组之间进行数组类型转换。`Java.to()` 函数将\
  \ JavaScript 数组类型转换为 Java 数组类型。该函数将数组对象作为第一个参数，目标 Java 数组类型作为第二个参数。目标数组类型可以指定为字符串或类型对象。以下代码片段将\
  \ JavaScript 数组转换为 Java `String[]`：\n\n\n\n```\n// 创建一个 JavaScript 数组，并用三个整数填充\n\
  var personIds = [100, 200, 300];\n// 将 JavaScript 整数数组转换为 Java String[]\nvar JavaStringArray\
  \ = Java.to(personIds, \"java.lang.String[]\")\n```\n\n如果省略 `Java.to()` 函数中的第二个参数，JavaScript\
  \ 数组将被转换为 Java `Object[]`。\n\n`Java.from()` 函数将 Java 数组类型转换为 JavaScript 数组。该函数以\
  \ Java 数组作为参数。以下代码片段展示了如何将 Java `int[]` 转换为 JavaScript 数组：\n\n```\n// 创建一个 Java\
  \ int[]\nvar IntArray = Java.type(\"int[]\");\nvar personIds = new IntArray(3);\n\
  personIds[0] = 100;\npersonIds[1] = 200;\npersonIds[2] = 300;\n// 将 Java int[] 数组转换为\
  \ JavaScript 数组\nvar jsArray = Java.from(personIds);\n// 打印 JavaScript 数组中的元素\n\
  for(var i = 0; i < jsArray.length; i++) {\nprint(jsArray[i]);\n}\n```\n\n```\n\n\
  ```\n\n看起来 Nashorn 无法将 Java `String[]` 转换为 JavaScript 数组。在以下脚本中尝试这样做会导致如下所示的错误：\n\
  \n```\n// 创建一个 Java String 对象\nvar str = new java.lang.String(\"Rhino,Nashorn,JRuby\"\
  );\nvar strDelimiter = new java.lang.String(\",\");\nvar strArray = str.split(strDelimiter);\n\
  // 将 Java String[] 数组转换为 JavaScript 数组\nvar jsArray = Java.from(strArray); // Nashorn\
  \ 在此处抛出 ScriptException\n// 打印 JavaScript 数组中的元素\nfor(var i = 0; i < jsArray.length;\
  \ i++) {\nprint(jsArray[i]);\n}\n```\n\n```\njavax.script.ScriptException: TypeError:\
  \ Can only convert Java arrays and lists to JavaScript arrays. Cant convert object\
  \ of type {0}. in  at line number 8...\n```\n\n提示\n\n可以从 JavaScript 函数向 Java 代码返回\
  \ JavaScript 数组。你需要在 Java 代码中提取原生数组的元素，因此需要在 Java 中使用 JavaScript 特定的类。不建议采用这种方法。你应该将\
  \ JavaScript 数组转换为 Java 数组，并从 JavaScript 函数返回 Java 数组，这样 Java 代码就只处理 Java 类。\n\n\
  ### 扩展 Java 类与实现接口\n\nJavaScript 允许你在 JavaScript 中扩展 Java 类并实现 Java 接口。以下各节描述了实现这一目标的不同方法。\n\
  \n#### 使用脚本对象\n\n你需要创建一个脚本对象，其中包含接口方法的实现，并使用 `new` 运算符将其传递给 Java 接口的构造函数。在 Java\
  \ 中，接口没有构造函数，不能与 `new` 运算符一起使用。然而，JavaScript 允许你这样做。\n\n让我们实现清单 9-18 中所示的 `Calculator`\
  \ 接口。以下语句创建了一个脚本对象，该对象实现了 `add()` 和 `subtract()` 方法。请注意，这两个方法的实现之间用逗号分隔。方法名称与其实现之间用冒号分隔。\n\
  \n```\nvar calFuncObj =  {\nadd: function (n1, n2) {\nreturn n1 + n2;\n},\nsubtract:\
  \ function (n1, n2) {\nreturn n1 - n2;\n}\n};\n```\n\n以下语句创建了 `Calculator` 接口的一个实现：\n\
  \n```\nvar calc = new com.jdojo.script.Calculator(calFuncObj);\n```\n\n现在你可以像使用\
  \ `Calculator` 接口的实现一样使用 `calc` 对象，如下所示：\n\n```\nvar n1 = 15;\nvar n2 = 10;\nvar\
  \ result1 = calc.add(n1, n2);\nvar result2 = calc.subtract(n1, n2);\nprint(n1 +\
  \ \" + \" + n2 + \" = \" + result1);\nprint(n1 + \" - \" + n2 + \" = \" + result2);\n\
  ```\n\n```\n15 + 10 = 25\n15 - 10 = 5\n```\n\n#### 使用类似匿名类的语法\n\n此方法使用的语法与在 Java\
  \ 中创建匿名类的语法非常相似。以下语句实现了 Java `Calculator` 接口并创建了该实现的一个实例：\n\n```\nvar calc = new\
  \ com.jdojo.script.Calculator() {\nadd: function (n1, n2) {\nreturn n1 + n2;\n},\n\
  subtract: function (n1, n2) {\nreturn n1 - n2;\n}\n};\n```\n\n现在你可以像之前一样使用 `calc`\
  \ 对象。\n\n#### 使用 JavaAdapter 对象和 Java.extend() 函数\n\nJavaScript 允许你使用 `JavaAdapter`\
  \ 类实现多个接口并扩展一个类。然而，JDK 捆绑的 Rhino JavaScript 实现覆盖了 `JavaAdapter` 的实现，这仅允许你实现一个接口；它不允许你扩展一个类。`JavaAdapter`\
  \ 构造函数的第一个参数是要实现的接口，第二个参数是实现方法的脚本对象。要在 Nashorn 中使用 `JavaAdapter` 对象，你需要加载 Rhino\
  \ 兼容性模块。以下代码片段使用 `JavaAdapter` 实现了 `Calculator` 接口：\n\n```\n// 需要在 Nashorn 中加载兼容性模块。\n\
  // 在 Rhino 中不需要以下 load() 调用。\nload(\"nashorn:mozilla_compat.js\");\nvar calFuncObj\
  \ =  {\nadd: function (n1, n2) {\nreturn n1 + n2;\n},\nsubtract: function (n1, n2)\
  \ {\nreturn n1 - n2;\n}\n};\nvar calc = new JavaAdapter(com.jdojo.script.Calculator,\
  \ calFuncObj);\n```\n\n现在你可以像之前一样使用 `calc` 对象。\n\nNashorn 提供了一种更好的方式，允许你使用 `Java.extend()`\
  \ 函数扩展一个类并实现多个接口。在 `extend()` 函数中，你最多可以传递一个类类型和多个接口类型。它返回一个组合了所有传入类型的类型。你需要使用前面讨论的类似匿名类的语法来为新类型的抽象方法提供实现，或覆盖被扩展类型的现有方法。以下代码片段使用\
  \ `Java.extend()` 方法实现了 `Calculator` 接口：\n\n```\n// 获取 Calculator 接口类型\nvar CalculatorType\
  \ = Java.type(\"com.jdojo.script.Calculator\");\n// 获取一个扩展了 Calculator 类型的类型\nvar\
  \ CalculatorExtender = Java.extend(CalculatorType);\n// 使用类似匿名类的语法实现 CalculatorExtender\
  \ 中的抽象方法\nvar calc = new CalculatorExtender() {\nadd: function (n1, n2) {\nreturn\
  \ n1 + n2;\n},\nsubtract: function (n1, n2) {\nreturn n1 - n2;\n}\n};\nvar n1 =\
  \ 15;\nvar n2 = 10;\nvar result1 = calc.add(n1, n2);\nvar result2 = calc.subtract(n1,\
  \ n2);\nprint(n1 + \" + \" + n2 + \" = \" + result1);\nprint(n1 + \" - \" + n2 +\
  \ \" = \" + result2);\n```\n\n```\n15 + 10 = 25\n15 - 10 = 5\n```\n\n#### 使用 JavaScript\
  \ 函数\n\n有时 Java 接口只有一个方法。在这些情况下，你可以传递一个 JavaScript 函数对象来代替接口的实现。Java 中的 `Runnable`\
  \ 接口只有一个方法 `run()`。当你在 JavaScript 中需要使用 `Runnable` 接口的实例时，可以传递一个 JavaScript 函数对象。\n\
  \n以下代码片段展示了如何创建 `Thread` 对象并启动它。在 `Thread` 类的构造函数中，传递了一个 JavaScript 函数对象 `myRunFunc`，而不是\
  \ `Runnable` 接口的实例。\n\n```\nfunction myRunFunc() {\nprint(\"A thread is running.\"\
  );\n}\n// 调用 Thread(Runnable) 构造函数，并传递 myRunFunc 函数对象，该对象将作为 Runnable 接口 run() 方法的实现。\n\
  var thread = new java.lang.Thread(myRunFunc);\nthread.start();\n```\n\n```\nA thread\
  \ is running.\n```\n\n在 ES6 箭头函数中（JDK9 中的 Nashorn 支持该特性），你可以将前面的代码片段重写如下。该语法类似于\
  \ Java 中 lambda 表达式的语法。运行以下代码时，请确保在 Nashorn 中启用 ES6。\n\n```\n// 使用箭头函数创建 Runnable\
  \ 接口的实例\nvar thread = new java.lang.Thread(() => print(\"A thread is running.\"\
  ));\nthread.start();\n```\n\n```\nA thread is running.\n```\n\n\n\n### 使用 Lambda\
  \ 表达式\n\nJavaScript 支持可用作 lambda 表达式的匿名函数。以下是一个匿名函数，它接受一个数字作为参数并返回其平方：\n\n```\n\
  function (n) {\nreturn n * n;\n}\n```\n\n以下是一个在 JavaScript 中使用匿名函数作为 lambda 表达式创建\
  \ `Runnable` 对象的示例。该 `Runnable` 对象用于 `Thread` 类的构造函数中。\n\n```\nvar Thread = Java.type(\"\
  java.lang.Thread\");\n// 使用 Runnable 对象创建一个 Thread。该 Runnable\n// 对象是通过匿名函数作为 lambda\
  \ 表达式创建的。\nvar thread = new Thread(function() {\nprint(\"Hello Thread\");\n});\n\
  // 启动线程\nthread.start();\n```\n\n使用 lambda 表达式的 JavaScript 代码对应的 Java 代码如下：\n\n\
  ```\n// 使用 Runnable 对象创建一个 Thread。该 Runnable 对象是\n// 通过 lambda 表达式创建的。\nThread thread\
  \ = new Thread(() -> {\nSystem.out.println(\"Hello Thread\");\n});\n// 启动线程\nthread.start();\n\
  ```\n\n## 实现脚本引擎\n\n实现一个功能完备的脚本引擎并非易事，这超出了本书的讨论范围。本节旨在为你提供一个简要但完整的概述，说明实现脚本引擎所需的设置。在本节中，你将实现一个名为\
  \ `JKScript` 引擎的简单脚本引擎。它将按照以下规则计算算术表达式：\n\n*   它将计算由两个操作数和一个运算符组成的算术表达式。\n*   表达式可以有两个数字字面量、两个变量，或者一个数字字面量和一个变量作为操作数。数字字面量必须采用十进制格式。不支持十六进制、八进制和二进制数字字面量。\n\
  *   表达式中的算术运算仅限于加、减、乘、除。\n*   它将识别 `+`、`-`、`*` 和 `/` 作为算术运算符。\n*   引擎将返回一个 `Double`\
  \ 对象作为表达式的结果。\n*   表达式中的操作数可以通过引擎的全局作用域或引擎作用域绑定传递给引擎。\n*   它应允许从 `String` 对象和 `java.io.Reader`\
  \ 对象执行脚本。但是，`Reader` 的内容应仅包含一个表达式。\n*   它不会实现 `Invocable` 和 `Compilable` 接口。\n\n\
  根据这些规则，你的脚本引擎的一些有效表达式如下：\n\n*   `10 + 90`\n*   `10.7 + 89.0`\n*   `+10 + +90`\n\
  *   `num1 + num2`\n*   `num1 * num2`\n*   `78.0 / 7.5`\n\n脚本 API 使用服务提供者机制来发现脚本引擎。服务类型是\
  \ `javax.script.ScriptEngineFactory` 接口。你的脚本引擎必须为此服务类型提供实现。你将把脚本引擎打包到一个名为 `jdojo.jkscript`\
  \ 的独立模块中，如清单 9-24 所示。\n\n```\n// module-info.java\nmodule jdojo.jkscript {\nrequires\
  \ java.scripting;\nprovides javax.script.ScriptEngineFactory with com.jdojo.jkscript.JKScriptEngineFactory;\n\
  }\n清单 9-24.\njdojo.jkscript 模块的声明\n```\n\n该模块读取 `java.scripting` 模块，因为它需要使用该模块中的类型。该模块提供了\
  \ `javax.script.ScriptEngineFactory` 服务接口的实现，即 `com.jdojo.jkscript.JKScriptEngineFactory`\
  \ 类。你不需要导出模块的任何包，因为其他模块不应直接访问此模块中的任何类型。\n\n作为 `JKScript` 脚本引擎实现的一部分，你将开发表 9-2 中列出的三个类。在后续章节中，你将开发这些类。\n\
  \n表 9-2.\n为 JKScript 脚本引擎开发的类\n\n| 类 | 描述 |\n| --- | --- |\n| `Expression` | `Expression`\
  \ 类是脚本引擎的核心。它负责解析和计算算术表达式。它在 `JKScriptEngine` 类的 `eval()` 方法内部使用。 |\n| `JKScriptEngine`\
  \ | `ScriptEngine` 接口的实现。它扩展了实现 `ScriptEngine` 接口的 `AbstractScriptEngine` 类。`AbstractScriptEngine`\
  \ 类为 `ScriptEngine` 接口的多个版本的 `eval()` 方法提供了标准实现。你需要实现以下两个版本的 `eval()` 方法：`Object\
  \ eval(String, ScriptContext)` `Object eval(Reader, ScriptContext)` |\n| `JKScriptEngineFactory`\
  \ | `ScriptEngineFactory` 接口的实现。这是 `javax.script.ScriptEngineFactory` 服务接口的服务提供者。\
  \ |\n\n\n\n### 表达式类\n\n`Expression` 类包含了解析和计算算术表达式的主要逻辑。清单 9-25 包含了 `Expression`\
  \ 类的完整代码。\n\n```\n// Expression.java\npackage com.jdojo.jkscript;\nimport java.util.regex.Matcher;\n\
  import java.util.regex.Pattern;\nimport javax.script.ScriptContext;\npublic class\
  \ Expression {\nprivate String exp;\nprivate ScriptContext context;\nprivate String\
  \ op1;\nprivate char op1Sign = '+';\nprivate String op2;\nprivate char op2Sign =\
  \ '+';\nprivate char operation;\nprivate boolean parsed;\npublic Expression(String\
  \ exp, ScriptContext context) {\nif (exp == null || exp.trim().equals(\"\")) {\n\
  throw new IllegalArgumentException(this.getErrorString());\n}\nthis.exp = exp.trim();\n\
  if (context == null) {\nthrow new IllegalArgumentException(\"ScriptContext cannot\
  \ be null.\");\n}\nthis.context = context;\n}\npublic String getExpression() {\n\
  return exp;\n}\npublic ScriptContext getScriptContext() {\nreturn context;\n}\n\
  public Double eval() {\n// 解析表达式\nif (!parsed) {\nthis.parse();\nthis.parsed = true;\n\
  }\n// 提取操作数的值\ndouble op1Value = getOperandValue(op1Sign, op1);\ndouble op2Value\
  \ = getOperandValue(op2Sign, op2);\n// 计算表达式\nDouble result = null;\nswitch (operation)\
  \ {\ncase '+':\nresult = op1Value + op2Value;\nbreak;\ncase '-':\nresult = op1Value\
  \ - op2Value;\nbreak;\ncase '*':\nresult = op1Value * op2Value;\nbreak;\ncase '/':\n\
  result = op1Value / op2Value;\nbreak;\ndefault:\nthrow new RuntimeException(\"Invalid\
  \ operation:\" + operation);\n}\nreturn result;\n}\nprivate double getOperandValue(char\
  \ sign, String operand) {\n// 检查操作数是否为 double 类型\ndouble value;\ntry {\nvalue =\
  \ Double.parseDouble(operand);\nreturn sign == '-' ? -value : value;\n} catch (NumberFormatException\
  \ e) {\n// 忽略此异常。操作数格式无法转换为 double 值。\n}\n// 检查操作数是否为绑定变量\nObject bindValue = context.getAttribute(operand);\n\
  if (bindValue == null) {\nthrow new RuntimeException(operand + \" is not found in\
  \ the script context.\");\n}\nif (bindValue instanceof Number) {\nvalue = ((Number)\
  \ bindValue).doubleValue();\nreturn sign == '-' ? -value : value;\n} else {\nthrow\
  \ new RuntimeException(operand + \" must be bound to a number.\");\n}\n}\npublic\
  \ void parse() {\n// 支持的表达式形式为 v1 op v2，其中 v1 和 v2\n// 是变量名或数字，op 可以是 +、-、* 或 /\n\
  // 为预期的表达式准备模式\nString operandSignPattern = \"([+-]?)\";\nString operandPattern\
  \ = \"([\\\\p{Alnum}\\\\p{Sc}_.]+)\";\nString whileSpacePattern = \"([\\\\s]*)\"\
  ;\nString operationPattern = \"([+*/-])\";\nString pattern = \"^\" + operandSignPattern\
  \ + operandPattern\n+ whileSpacePattern + operationPattern + whileSpacePattern\n\
  + operandSignPattern + operandPattern + \"$\";\nPattern p = Pattern.compile(pattern);\n\
  Matcher m = p.matcher(exp);\nif (!m.matches()) {\n// 表达式格式不符合预期\nthrow new IllegalArgumentException(this.getErrorString());\n\
  }\n// 获取操作数-1\nString temp = m.group(1);\nif (temp != null && !temp.equals(\"\"\
  )) {\nthis.op1Sign = temp.charAt(0);\n}\nthis.op1 = m.group(2);\n// 获取操作符\ntemp\
  \ = m.group(4);\nif (temp != null && !temp.equals(\"\")) {\nthis.operation = temp.charAt(0);\n\
  }\n// 获取操作数-2\ntemp = m.group(6);\nif (temp != null && !temp.equals(\"\")) {\nthis.op2Sign\
  \ = temp.charAt(0);\n}\nthis.op2 = m.group(7);\n}\nprivate String getErrorString()\
  \ {\nreturn \"Invalid expression[\" + exp + \"]\"\n+ \"\\nSupported expression syntax\
  \ is: op1 operation op2\"\n+ \"\\n where op1 and op2 can be a number or a bind variable\"\
  \n+ \" , and operation can be +, -, *, and /.\";\n}\n@Override\npublic String toString()\
  \ {\nreturn \"Expression: \" + this.exp + \", op1 Sign = \"\n+ op1Sign + \", op1\
  \ = \" + op1 + \", op2 Sign = \"\n+ op2Sign + \", op2 = \" + op2 + \", operation\
  \ = \" + operation;\n}\n}\n清单 9-25.\n解析并计算算术表达式的表达式类\n```\n\n`Expression` 类被设计用于解析和计算如下形式的算术表达式：\n\
  \n```\nop1 operation op2\n```\n\n其中，`op1` 和 `op2` 是两个操作数，可以是十进制格式的数字或变量，而 `operation`\
  \ 可以是 `+`、`-`、`*` 或 `/`。\n\n`Expression` 类的建议用法如下：\n\n```\nExpression exp = new\
  \ Expression(expression, scriptContext);\nDouble value = exp.eval();\n```\n\n接下来，让我们详细讨论\
  \ `Expression` 类的重要组件。\n\n#### 实例变量\n\n实例变量 `exp` 和 `context` 分别表示表达式和用于计算该表达式的\
  \ `ScriptContext`。它们通过该类的构造器传入。\n\n实例变量 `op1` 和 `op2` 分别表示表达式中的第一个和第二个操作数。实例变量 `op1Sign`\
  \ 和 `op2Sign` 分别表示第一个和第二个操作数的符号，可以是 `+` 或 `-`。操作数及其符号在使用 `parse()` 方法解析表达式时被填充。\n\
  \n实例变量 `operation` 表示要对操作数执行的算术运算（+、-、* 或 /）。\n\n实例变量 `parsed` 用于跟踪表达式是否已被解析。`parse()`\
  \ 方法会将其设置为 `true`。\n\n#### 构造器\n\n构造器接受一个表达式和一个 `ScriptContext`，确保它们不为 `null`，并将它们存储在实例变量中。在将表达式存储到实例变量\
  \ `exp` 之前，它会去除表达式首尾的空白字符。\n\n#### parse() 方法\n\n`parse()` 方法将表达式解析为操作数和运算符。它使用正则表达式来解析表达式文本。该正则表达式期望表达式文本采用以下形式：\n\
  \n*   第一个操作数的可选符号 `+` 或 `-`\n*   第一个操作数，可由字母数字字符、货币符号、下划线和十进制小数点的组合构成\n*   任意数量的空白字符\n\
  *   一个运算符符号，可以是 `+`、`-`、`*` 或 `/`\n*   第二个操作数的可选符号 `+` 或 `-`\n*   第二个操作数，可由字母数字字符、货币符号、下划线和十进制小数点的组合构成\n\
  \n正则表达式 `([+-]?)` 将匹配操作数的可选符号。正则表达式 `([\\\\p{Alnum}\\\\p{Sc}_.]+)` 将匹配一个操作数，该操作数可以是十进制数字或名称。正则表达式\
  \ `([\\\\s]*)` 将匹配任意数量的空白字符。正则表达式 `([+*/-])` 将匹配一个运算符符号。所有正则表达式都用括号括起来以形成组，这样你就可以捕获表达式中匹配的部分。\n\
  \n如果表达式与正则表达式匹配，`parse()` 方法会将匹配结果存储到相应的实例变量中。\n\n请注意，用于匹配操作数的正则表达式并不完美。它会允许一些无效情况，例如操作数包含多个小数点等。不过，对于此演示目的，它已经足够了。\n\
  \n#### getOperandValue() 方法\n\n此方法在表达式解析后的求值过程中使用。如果操作数是一个 `double` 数字，它会应用操作数的符号并返回该值。否则，它会在\
  \ `ScriptContext` 中查找操作数的名称。如果在 `ScriptContext` 中未找到操作数的名称，它会抛出一个 `RuntimeException`。如果在\
  \ `ScriptContext` 中找到了操作数的名称，它会检查该值是否为数字。如果该值是数字，它会应用符号后返回该值；否则，它会抛出一个 `RuntimeException`。\n\
  \n`getOperandValue()` 方法不支持十六进制、八进制和二进制格式的操作数。例如，像 “0x2A + 0b1011” 这样的表达式不会被当作包含两个\
  \ `int` 字面量操作数的表达式处理。留给读者自行增强此方法，以支持十六进制、八进制和二进制格式的数字字面量。\n\n\n\n#### eval() 方法\n\
  \n`eval()` 方法会对表达式进行求值，并返回一个 `double` 类型的值。首先，如果表达式尚未被解析，它会先进行解析。请注意，多次调用 `eval()`\
  \ 方法只会解析表达式一次。它会获取两个操作数的值，执行运算，然后返回表达式的值。\n\n### JKScriptEngine 类\n\n清单 9-26 包含了\
  \ `JKScript` 脚本引擎的实现。其 `eval(String, ScriptContext)` 方法包含了主要逻辑：\n\n```\nExpression\
  \ exp = new Expression(script, context);\nObject result = exp.eval();\n```\n\n它创建了一个\
  \ `Expression` 类的对象。然后调用 `Expression` 对象的 `eval()` 方法，该方法对表达式进行求值并返回结果。\n\n`eval(Reader`,\
  \ `ScriptContext)` 方法从 `Reader` 中读取所有行，将它们拼接起来，并将得到的 `String` 传递给 `eval(String,\
  \ ScriptContext)` 方法以对表达式进行求值。请注意，`Reader` 中只能包含一个表达式。一个表达式可以跨越多行。`Reader` 中的空白字符将被忽略。\n\
  \n```\n// JKScriptEngine.java\npackage com.jdojo.jkscript;\nimport java.io.BufferedReader;\n\
  import java.io.IOException;\nimport java.io.Reader;\nimport javax.script.AbstractScriptEngine;\n\
  import javax.script.Bindings;\nimport javax.script.ScriptContext;\nimport javax.script.ScriptEngineFactory;\n\
  import javax.script.ScriptException;\nimport javax.script.SimpleBindings;\npublic\
  \ class JKScriptEngine extends AbstractScriptEngine {\nprivate final ScriptEngineFactory\
  \ factory;\npublic JKScriptEngine(ScriptEngineFactory factory) {\nthis.factory =\
  \ factory;\n}\n@Override\npublic Object eval(String script, ScriptContext context)\
  \ throws ScriptException {\ntry {\nExpression exp = new Expression(script, context);\n\
  Object result = exp.eval();\nreturn result;\n} catch (Exception e) {\nthrow new\
  \ ScriptException(e.getMessage());\n}\n}\n@Override\npublic Object eval(Reader reader,\
  \ ScriptContext context) throws ScriptException {\n// 从 Reader 中读取所有行\nBufferedReader\
  \ br = new BufferedReader(reader);\nString script = \"\";\ntry {\nString str;\n\
  while ((str = br.readLine()) != null) {\nscript = script + str;\n}\n} catch (IOException\
  \ e) {\nthrow new ScriptException(e);\n}\n// 使用 eval() 的 String 版本\nreturn eval(script,\
  \ context);\n}\n@Override\npublic Bindings createBindings() {\nreturn new SimpleBindings();\n\
  }\n@Override\npublic ScriptEngineFactory getFactory() {\nreturn factory;\n}\n}\n\
  清单 9-26.\nJKScript 脚本引擎的实现\n```\n\n### JKScriptEngineFactory 类\n\n清单 9-27 包含了 `JKScript`\
  \ 引擎的 `ScriptEngineFactory` 接口的实现。其部分方法返回 `\"Not Implemented\"` 字符串，因为你不支持这些方法所暴露的功能。`JKScriptEngineFactory`\
  \ 类中的代码是不言自明的。可以通过 `ScriptEngineManager` 使用 `jks`、`JKScript` 或 `jkscript` 名称（如 `getNames()`\
  \ 方法中所编码的）来获取 `JKScript` 引擎的实例。\n\n```\n// JKScriptEngineFactory.java\npackage com.jdojo.jkscript;\n\
