  \ file)`\n\n在前面的代码片段中，你看到了如何使用 `ProcessBuilder` 类的 `inheritIO()` 方法让新进程拥有与当前进程相同的标准\
  \ I/O。你可以将那段代码重写如下：\n\n```\n// 配置 ProcessBuilder 以继承父进程的 I/O\nProcessBuilder pb\
