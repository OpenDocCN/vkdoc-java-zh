  你已看到使用 `Statement`、`PreparedStatement` 和 `CallableStatement` 接口的示例，这些接口允许你一次向数据库发送一个\
  \ SQL 命令（或存储过程调用）。JDBC API 包含一个批量更新功能，允许你以批处理（即一次打包）方式向数据库发送多个更新命令以执行。批量更新能显著提升性能。可在批量更新中使用的更新命令包括\
  \ SQL `INSERT`、`UPDATE`、`DELETE` 以及存储过程。批处理中的命令不应产生结果集，否则 JDBC 驱动程序将抛出 `SQLException`。命令应生成一个更新计数，用于指示该命令执行后数据库中受影响的行数。\n\
  \n如果你使用 `Statement` 来执行一批命令，则同一批中可以包含异构命令。例如，一个命令可以是 SQL `INSERT` 语句，另一个命令可以是 SQL\
  \ `UPDATE` 语句。\n\n如果你使用 `PreparedStatement` 或 `CallableStatement` 来执行一批命令，则你将使用多组输入参数来执行同一个命令。用于批量更新的\
  \ `CallableStatement` 必须返回更新计数，且不应产生结果集，否则 JDBC 驱动程序将抛出 `SQLException`。\n\n提示\n\n\
  批量更新是一个可选功能，可能由 JDBC 驱动程序提供。如果 JDBC 驱动程序支持批量更新，则 `DatabaseMetaData` 对象的 `supportsBatchUpdates()`\
  \ 方法将返回 `true`。你可以通过 `Connection` 对象的 `getMetaData()` 方法获取 `DatabaseMetaData` 对象。执行批量更新时应关闭自动提交模式，这样你就能提交或回滚整个批处理。如果自动提交模式处于开启状态，当批处理中某个命令执行出错时，提交行为将取决于\
  \ JDBC 驱动程序的实现。\n\n如何批量执行多个命令？这是一个多步骤的过程。\n\n*   通过 `Connection` 的适当方法创建 `Statement`、`PreparedStatement`\
  \ 或 `CallableStatement`。此时，执行单个命令与使用批量命令并无区别。\n*   使用 `addBatch()` 方法向批处理中添加命令。每种语句对象内部都维护着一个批处理命令列表。`addBatch()`\
  \ 方法会将一个命令添加到该内部批处理命令列表中。对于你想要打包在一起执行的批处理中的每个命令，都需要调用一次 `addBatch()` 方法。\n*   如果你想清空批处理命令列表而不执行它们，可以调用\
  \ `Statement` 的 `clearBatch()` 方法来实现。\n*   使用 `executeBatch()` 方法将批处理命令一次性发送到数据库执行。\n\
  \n理解 `Statement` 接口的 `executeBatch()` 方法的行为非常重要。如果批处理中的所有命令都成功执行，它将返回一个 `int[]`。该数组包含的元素数量与批处理中的命令数量相同。数组中的每个元素包含从该命令返回的更新计数。数组中元素的顺序与批处理中命令的顺序相同。有时，批处理中的某个命令可能执行成功，但\
  \ JDBC 驱动程序无法获取更新计数值。在这种情况下，数组中会返回 `Statement.SUCCESS_NO_INFO` 值。\n\nJava 8 为 `Statement`\
  \ 接口新增了 `executeLargeBatch()` 方法，其工作方式与 `executeBatch` 方法相同，区别在于它返回的是 `long[]` 而非\
  \ `int[]`。当你预期批处理中任何命令的更新计数可能超过 `Integer.MAX_VALUE` 时，应使用此方法。\n\n如果批处理中的某个命令执行失败，JDBC\
  \ 驱动程序会抛出 `BatchUpdateException`。驱动程序可以选择在失败后继续执行批处理中的后续命令，也可以在首次失败时停止批处理执行。如何知道批处理中哪个命令失败了？当抛出\
  \ `BatchUpdateException` 时，你可以使用其 `getUpdateCounts()` 方法，该方法返回一个 `int[]`。该更新计数数组包含批处理中已执行命令的更新计数。如果\
  \ JDBC 驱动程序不顾失败而执行了批处理中的所有命令，则返回的数组将包含与批处理中命令数量相同的元素。如果某个命令失败，其在数组中对应的值将为 `Statement.EXECUTE_FAILED`。如果\
  \ `BatchUpdateException` 对象的 `getUpdateCounts()` 方法返回的元素数量少于批处理中的命令数量，则意味着 JDBC\
  \ 驱动程序在首次失败后停止了后续命令的处理。\n\n以下代码片段展示了如何使用 `Statement` 执行批量更新：\n\n```\nConnection\
  \ conn = JDBCUtil.getConnection();\nStatement stmt = conn.createStatement();\n//\
  \ 添加批量更新命令\nstmt.addBatch(\"insert into t1...\");\nstmt.addBatch(\"insert into t2...\"\
  );\nstmt.addBatch(\"update t3 set...\");\nstmt.addBatch(\"delete from t4...\");\n\
  // 执行批量更新\nint[] updateCount = null;\ntry {\n    updateCount = stmt.executeBatch();\n\
  \    System.out.println(\"批处理执行成功。\");\n} catch (BatchUpdateException e) {\n   \
  \ System.out.println(\"批处理失败。\");\n}\n```\n\n以下代码片段展示了如何使用 `PreparedStatement` 执行批量更新。如果使用\
  \ `CallableStatement`，逻辑相同，只是 SQL 字符串的构造方式不同。`PreparedStatement` 接口中的 `addBatch()`\
  \ 方法不接受任何参数。\n\n```\nString sql = \"delete from person where person_id = ?\";\n\
  Connection conn = JDBCUtil.getConnection();\nPreparedStatement pstmt = conn.prepareStatement(sql);\n\
  /* 向批处理中添加两个命令 */\n// 命令 #1：设置输入参数并将其添加到批处理中。\npstmt.setInt(1, 201);\npstmt.addBatch();\n\
  // 命令 #2：设置输入参数并将其添加到批处理中。\npstmt.setInt(1, 301);\npstmt.addBatch();\n// 执行批量更新\n\
  int[] updateCount = null;\ntry {\n    updateCount = pstmt.executeBatch();\n    System.out.println(\"\
  批处理执行成功。\");\n} catch (BatchUpdateException e) {\n    System.out.println(\"批处理失败。\"\
  );\n}\n```\n\n清单 5-34 包含完整代码，演示了如何使用批量更新。它还展示了如何处理从 `executeUpdate()` 方法和 `BatchUpdateException`\
