  }\n}\n清单 5-12.\n使用 CallableStatement 调用存储过程\n```\n\n## 处理结果集\n\n通过执行数据库中的 SQL `SELECT`\
  \ 语句获得的一组行称为结果集。JDBC 允许你在数据库中执行 `SELECT` 语句，并在 Java 程序中使用 `ResultSet` 接口的实例处理返回的结果集。以下各节将讨论使用\
  \ JDBC API 处理结果集的不同方法。\n\n\n\n### 什么是 ResultSet？\n\n当你在数据库中执行查询（一条 `SELECT` 语句）时，它会以结果集的形式返回匹配的记录。你可以将结果集视为按行和列排列的数据。`SELECT`\
  \ 语句决定了结果集中包含的行数和列数。一个 `Statement`（或 `PreparedStatement`、`CallableStatement`）会将查询结果作为\
  \ `ResultSet` 对象返回。这里我使用了两个短语：“结果集”和“`ResultSet`”。“结果集”指的是以行和列形式呈现的数据，而“`ResultSet`”指的是实现了\
  \ `ResultSet` 接口的类的实例，它允许你访问和操作这些数据。`ResultSet` 还包含结果集中列属性的信息，例如列的数据类型、列名等。\n\n\
  `ResultSet` 维护一个游标，该游标指向结果集中的一行。它的工作方式类似于数据库程序中的游标。你可以将游标滚动到结果集中的特定行，以访问或操作该行的列值。游标一次只能指向一行。它在某一时刻指向的行称为当前行。有多种方法可以将\
  \ `ResultSet` 的游标移动到结果集中的某一行。我稍后会讨论移动游标的所有不同方式。\n\n在查看示例之前，需要讨论 `ResultSet` 的以下三个属性：\n\
  \n*   `Scrollability`（可滚动性）\n*   `Concurrency`（并发性）\n*   `Holdability`（可保持性）\n\n\
  `Scrollability` 决定了 `ResultSet` 在行间滚动的能力。默认情况下，`ResultSet` 只能向前滚动。当你拥有一个仅向前滚动的 `ResultSet`\
  \ 时，你可以将游标从第一行移动到最后一行。一旦移动到最后一行，你就无法重用该 `ResultSet`，因为你无法在仅向前滚动的 `ResultSet` 中向后滚动。你也可以创建一个既能向前又能向后滚动的\
  \ `ResultSet`。我将这种 `ResultSet` 称为双向可滚动 `ResultSet`。双向可滚动 `ResultSet` 还有另一个属性，称为更新敏感性。它决定了当你在行间滚动时，底层数据库的更改是否会反映在结果集中。滚动敏感的\
  \ `ResultSet` 会向你显示数据库中所做的更改，而滚动不敏感的 `ResultSet` 则不会显示在你打开 `ResultSet` 之后数据库中所做的更改。`ResultSet`\
  \ 接口中的以下三个常量用于指定 `ResultSet` 的可滚动性：\n\n*   `TYPE_FORWARD_ONLY`：允许 `ResultSet` 仅向前滚动。\n\
  *   `TYPE_SCROLL_SENSITIVE`：允许 `ResultSet` 向前和向后滚动。它使底层数据库中由其他事务或同一事务中的其他语句所做的更改对\
  \ `ResultSet` 可见。这种类型的 `ResultSet` 能够感知通过其他方式对其数据所做的更改。\n*   `TYPE_SCROLL_INSENSITIVE`：允许\
  \ `ResultSet` 向前和向后滚动。在滚动时，它不会使底层数据库中由其他事务或同一事务中的其他语句所做的更改对 `ResultSet` 可见。这种类型的\
  \ `ResultSet` 在打开时确定其数据集，并且除非通过该 `ResultSet` 本身，否则通过任何其他方式更新该数据集都不会改变它。如果你想获取最新的数据，必须重新执行查询。\n\
  \n`Concurrency` 指的是 `ResultSet` 更新数据的能力。默认情况下，`ResultSet` 是只读的，不允许你更新其数据。如果你想通过\
  \ `ResultSet` 更新数据库中的数据，你需要向 JDBC 驱动程序请求一个可更新的结果集。`ResultSet` 接口中的以下两个常量用于指定 `ResultSet`\
  \ 的并发性：\n\n*   `CONCUR_READ_ONLY`：使结果集为只读。\n*   `CONCUR_UPDATABLE`：使结果集可更新。\n\n\
  `Holdability` 指的是在与其关联的事务提交后，`ResultSet` 的状态。当事务提交时，`ResultSet` 可能会被关闭或保持打开状态。`ResultSet`\
  \ 的 `holdability` 默认值取决于 JDBC 驱动程序。它使用 `ResultSet` 接口中定义的以下两个常量之一来指定：\n\n*   `HOLD_CURSORS_OVER_COMMIT`：在事务提交后保持\
  \ `ResultSet` 打开。\n*   `CLOSE_CURSORS_AT_COMMIT`：在事务提交后关闭 `ResultSet`。\n\n在使用这些属性之前，你需要查阅\
  \ JDBC 驱动程序的文档以确认其支持情况。你可以使用 `DatabaseMetaData` 接口的以下三种方法来获取 JDBC 驱动程序对 `ResultSet`\
  \ 所支持属性的信息。回想一下，你可以使用 `Connection` 对象的 `getMetaData()` 方法获取 `DatabaseMetaData` 对象。\n\
  \n*   `supportsResultSetType()`\n*   `supportsResultSetConcurrency()`\n*   `supportsResultSetHoldability()`\n\
  \n清单 5-13 演示了如何使用这些方法来检查这些 `ResultSet` 属性。对这些方法的调用被放置在 `try-catch` 块中以捕获 `Throwable`，因为某些\
  \ JDBC 驱动程序在不支持某个功能时会抛出运行时异常。输出结果针对的是 Derby DBMS。当你连接到不同的 DBMS 时，可能会得到不同的输出。\n\n\
  \n```java\n// SupportedResultSetProperties.java\npackage com.jdojo.jdbc;\nimport\
  \ java.sql.Connection;\nimport java.sql.DatabaseMetaData;\nimport static java.sql.ResultSet.CLOSE_CURSORS_AT_COMMIT;\n\
  import static java.sql.ResultSet.CONCUR_READ_ONLY;\nimport static java.sql.ResultSet.CONCUR_UPDATABLE;\n\
  import static java.sql.ResultSet.HOLD_CURSORS_OVER_COMMIT;\nimport static java.sql.ResultSet.TYPE_FORWARD_ONLY;\n\
  import static java.sql.ResultSet.TYPE_SCROLL_INSENSITIVE;\nimport static java.sql.ResultSet.TYPE_SCROLL_SENSITIVE;\n\
  import java.sql.SQLException;\npublic class SupportedResultSetProperties {\npublic\
  \ static void main(String[] args) {\nConnection conn = null;\ntry {\nconn = JDBCUtil.getConnection();\n\
  DatabaseMetaData dbmd = conn.getMetaData();\nSystem.out.println(\"支持的结果集滚动性。\");\n\
  printScrollabilityInfo(dbmd);\nSystem.out.println();\nSystem.out.println(\"支持的结果集并发性。\"\
  );\nprintConcurrencyInfo(dbmd);\nSystem.out.println();\nSystem.out.println(\"支持的结果集保持性。\"\
  );\nprintHoldabilityInfo(dbmd);\n} catch (SQLException e) {\ne.printStackTrace();\n\
  } finally {\nJDBCUtil.closeConnection(conn);\n}\n}\npublic static void printScrollabilityInfo(DatabaseMetaData\
  \ dbmd) {\ntry {\nboolean forwardOnly = dbmd.supportsResultSetType(TYPE_FORWARD_ONLY);\n\
  boolean scrollSensitive = dbmd.supportsResultSetType(TYPE_SCROLL_SENSITIVE);\nboolean\
  \ scrollInsensitive = dbmd.supportsResultSetType(TYPE_SCROLL_INSENSITIVE);\nSystem.out.println(\"\
  仅向前: \" + forwardOnly);\nSystem.out.println(\"滚动敏感: \" + scrollSensitive);\nSystem.out.println(\"\
  滚动不敏感: \" + scrollInsensitive);\n} catch (SQLException e) {\nSystem.out.println(\"\
  无法获取滚动性信息。\");\nSystem.out.println(\"错误信息:\" + e.getMessage());\n}\n}\npublic static\
  \ void printConcurrencyInfo(DatabaseMetaData dbmd) {\ntry {\nboolean forwardOnlyReadOnly\n\
  = dbmd.supportsResultSetConcurrency(TYPE_FORWARD_ONLY,\nCONCUR_READ_ONLY);\nboolean\
  \ forwardOnlyUpdatable\n= dbmd.supportsResultSetConcurrency(TYPE_FORWARD_ONLY,\n\
  CONCUR_UPDATABLE);\nboolean scrollSensitiveReadOnly\n= dbmd.supportsResultSetConcurrency(\n\
  TYPE_SCROLL_SENSITIVE,\nCONCUR_READ_ONLY);\nboolean scrollSensitiveUpdatable\n=\
  \ dbmd.supportsResultSetConcurrency(\nTYPE_SCROLL_SENSITIVE,\nCONCUR_UPDATABLE);\n\
  boolean scrollInsensitiveReadOnly\n= dbmd.supportsResultSetConcurrency(TYPE_SCROLL_INSENSITIVE,\n\
  CONCUR_READ_ONLY);\nboolean scrollInsensitiveUpdatable\n= dbmd.supportsResultSetConcurrency(TYPE_SCROLL_INSENSITIVE,\n\
  CONCUR_UPDATABLE);\nSystem.out.println(\"滚动仅向前且并发只读: \"\n+ forwardOnlyReadOnly);\n\
  System.out.println(\"滚动仅向前且并发可更新: \"\n+ forwardOnlyUpdatable);\nSystem.out.println(\"\
  滚动敏感且并发只读: \"\n+ scrollSensitiveReadOnly);\nSystem.out.println(\"滚动敏感且并发可更新: \"\n\
  + scrollSensitiveUpdatable);\nSystem.out.println(\"滚动不敏感且并发只读: \"\n+ scrollInsensitiveReadOnly);\n\
  System.out.println(\"滚动不敏感且\"\n+ \"并发可更新: \"\n+ scrollInsensitiveUpdatable);\n}\
  \ catch (SQLException e) {\nSystem.out.println(\"无法获取并发性信息。\");\nSystem.out.println(\"\
  错误信息:\" + e.getMessage());\n}\n}\npublic static void printHoldabilityInfo(DatabaseMetaData\
  \ dbmd) {\ntry {\nboolean holdOverCommit\n= dbmd.supportsResultSetHoldability(HOLD_CURSORS_OVER_COMMIT);\n\
  boolean closeAtCommit\n= dbmd.supportsResultSetHoldability(CLOSE_CURSORS_AT_COMMIT);\n\
  System.out.println(\"提交后保持: \" + holdOverCommit);\nSystem.out.println(\"提交时关闭: \"\
  \ + closeAtCommit);\n} catch (SQLException e) {\nSystem.out.println(\"无法获取并发性信息。\"\
  );\nSystem.out.println(\"错误信息:\" + e.getMessage());\n}\n}\n}\n支持的结果集滚动性。\n仅向前: true\n\
  滚动敏感: false\n滚动不敏感: true\n支持的结果集并发性。\n滚动仅向前且并发只读: true\n滚动仅向前且并发可更新: true\n滚动敏感且并发只读:\
  \ false\n滚动敏感且并发可更新: false\n滚动不敏感且并发只读: true\n滚动不敏感且并发可更新: true\n支持的结果集保持性。\n提交后保持:\
  \ true\n提交时关闭: true\n清单 5-13.\n检查 JDBC 驱动程序支持的 ResultSet 属性\n```\n\n\n### 获取 ResultSet\n\
  \n你可以使用 `Statement`、`PreparedStatement` 或 `CallableStatement` 从数据库中获取结果集。在简单情况下，你可以调用\
  \ `Statement` 或 `PreparedStatement` 对象的 `executeQuery()` 方法，并传入一个返回 `ResultSet`\
  \ 的 `SELECT` 语句。以下是获取一个仅向前可滚动结果集的典型方式：\n\n```\nConnection conn = JDBCUtil.getConnection();\n\
  Statement stmt = conn.createStatement();\nString sql = \"select person_id, first_name,\
  \ last_name, dob, income from person\";\n// 执行查询以获取结果集\nResultSet rs = stmt.executeQuery(sql);\n\
  /* 使用 rs 变量处理结果集... */\n```\n\n从 `executeQuery()` 方法返回的 `ResultSet` 已经处于打开状态，并且可以立即循环遍历以获取相关数据。最初，游标指向结果集中第一行之前的位置。你必须将游标移动到一个有效行，才能访问该行的列值。`ResultSet`\
  \ 的 `next()` 方法用于将游标移动到下一行。当第一次调用 `next()` 方法时，它会将游标移动到结果集中的第一行。\n\n考虑 `next()`\
  \ 方法的返回值非常重要。它返回一个 `boolean` 值。如果游标定位到一个有效行，则返回 `true`。否则，返回 `false`。如果你在空的 `ResultSet`\
  \ 上第一次调用 `next()` 方法，它将返回 `false`，因为没有可以移动到的有效行。如果当前行是结果集中的最后一行，调用 `next()` 方法会将游标定位到最后一行之后，并且\
  \ `next()` 方法将返回 `false`。处理仅向前可滚动 `ResultSet` 对象的典型代码片段如下：\n\n```\nResultSet rs\
  \ = 获取一个结果集对象;\n// 通过调用 next() 方法将游标移动到下一行\nwhile(rs.next()) {\n// 在此处处理 rs 中的当前行\n\
  }\n// 完成对 ResultSet 的操作\n```\n\n当游标位于仅向前可滚动 `ResultSet` 的最后一行之后时，除了使用其 `close()`\
  \ 方法关闭它之外，你无法对该 `ResultSet` 进行任何操作。仅向前可滚动对象就像一个“创建-使用-丢弃”的条目。你也不能重新打开一个 `ResultSet`。要再次遍历结果集数据，你必须重新执行查询并获取一个新的\
  \ `ResultSet`。然而，对于双向可滚动的 `ResultSet` 来说情况有所不同，它允许你根据需要多次遍历行。稍后你将了解双向可滚动 `ResultSet`\
  \ 对象。\n\n程序退出 `while` 循环后，游标指向结果集中最后一行之后的行。最后一行之后的行和第一行之前的行是什么？它们只是两个虚构的行。它们在现实中并不存在。`ResultSet`\
  \ 游标的这两个位置让你在想要多次循环遍历结果集，或者在你的方法中接收到一个 `ResultSet` 对象作为参数时，能够做出决策。当你没有创建 `ResultSet`\
  \ 时，你必须正确了解游标位置，以便按特定顺序处理行。`ResultSet` 接口的以下四个方法可以让你知道游标是在第一行之前、在第一行上、在最后一行上，还是在最后一行之后。\n\
  \n*   `boolean isBeforeFirst() throws SQLException`\n*   `boolean isFirst() throws\
  \ SQLException`\n*   `boolean isLast() throws SQLException`\n*   `boolean isAfterLast()\
  \ throws SQLException`\n\n这些方法名不言自明。对于仅向前可滚动的 `ResultSet`，对这些方法的支持是可选的。通常，你不需要为仅向前可滚动的\
  \ `ResultSet` 使用这些方法。\n\n`ResultSet` 对象允许你使用其 `getXxx()` 方法之一从其当前行读取列的值，其中 `Xxx`\
  \ 是该列的数据类型。JDBC 支持的每种 `Xxx` 数据类型都有一个对应的 `getXxx()` 方法。例如，要从列中读取 `int`、`double`、`String`、`Object`\
  \ 和 `Blob` 值，你可以分别使用 `ResultSet` 接口的 `getInt()`、`getDouble()`、`getString()`、`getObject()`\
  \ 和 `getBlob()` 方法。你必须在 `getXxx()` 方法中指定要读取其值的列的索引或名称。`getXxx()` 方法是被重载的。一个版本接受一个\
  \ `int` 参数，允许你使用列索引；另一个版本接受一个 `String` 参数，允许你使用列标签。如果查询中没有指定列标签，你可以指定列名。结果集中的第一列索引为\
  \ 1。假设你有以下查询的 `ResultSet`：\n\n```\nselect person_id as \"Person ID\", first_name,\
  \ last_name from person\n```\n\n在 `ResultSet` 中，`person_id` 列的列索引为 1，`first_name`\
  \ 列的列索引为 2，`last_name` 列的列索引为 3。你为 `person_id` 列指定了 `Person ID` 作为列标签。你没有为 `first_name`\
  \ 和 `last_name` 列指定列标签。要获取 `person_id` 列的值，你需要使用 `getInt(1)` 或 `getInt(\"PERSON\
  \ ID\")`。要获取 `first_name` 列的值，你需要使用 `getString(2)` 或 `getString(\"first_name\")`。\n\
  \n提示\n\n在 `getXxx()` 方法中使用列标签或名称时不区分大小写。也就是说，你可以使用 `getInt(\"person id\")` 或 `getInt(\"\
  PERSON ID\")` 来获取 `person_id` 列的值。在本章中，我使用术语“列名”来指代列标签或名称。\n\n以下代码片段展示了如何读取结果集中当前行的列值：\n\
  \n```\nConnection conn = JDBCUtil.getConnection();\nStatement stmt = conn.createStatement();\n\
  String sql = \"select person_id, first_name, last_name, dob, income from person\"\
  ;\nResultSet rs = stmt.executeQuery(sql);\n// 逐个将游标移动到下一行\nwhile(rs.next()) {\n\
  // 处理 rs 中的当前行\nint personId = rs.getInt(\"person_id\");\nString firstName = rs.getString(\"\
  first_name\");\nString lastName = rs.getString(\"last_name\");\njava.sql.Date dob\
  \ = rs.getDate(\"dob\");\ndouble income = rs.getDouble(\"income\");\n// 对列值进行一些操作\n\
  }\n```\n\n你可以使用列索引重写 `while` 循环内的代码如下：\n\n```\nwhile(rs.next()) {\n// 处理 rs 中的当前行\n\
  int personId = rs.getInt(1);\nString firstName = rs.getString(2);\nString lastName\
  \ = rs.getString(3);\njava.sql.Date dob = rs.getDate(4);\ndouble income = rs.getDouble(5);\n\
  // 对列值进行一些操作\n}\n```\n\n在 `ResultSet` 的 `getXxx()` 方法中使用列索引还是列名是个人偏好问题。有时你可能无法预先知道列的名称，例如当用户向你传递一个要执行的查询时，你必须使用结果集中的数据。当你不知道列名时，应该使用列索引。你可以使用\
  \ `ResultSetMetaData` 对象获取 `ResultSet` 中的列名。更多详细信息，请参阅“ResultSetMetaData”部分。\n\n\
  \n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n在 `ResultSet` 中，当某一列的值为\
  \ `null` 时，`getXxx()` 方法会返回 `Xxx` 数据类型的默认值。例如，对于数值数据类型（`int`、`double`、`byte` 等），当列的值为\
  \ `null` 时，`getXxx()` 方法会返回零。返回数据类型的默认值而不是返回 `null` 的原因是，在 Java 中，基本数据类型不能为 `null`。当列的值为\
  \ `null` 时，`getXxx()` 方法对于 `boolean` 数据类型会返回 `false`。如果 `Xxx` 是引用类型，则 `getXxx()`\
  \ 返回 `null`。如果你想了解通过 `getXxx()` 方法读取的列值是否为 `null`，你需要在调用 `getXxx()` 方法后立即调用 `wasNull()`\
  \ 方法。如果 `wasNull()` 方法返回 `true`，则表示结果集中该列的值为 `null`。如果 `wasNull()` 方法返回 `false`，则表示结果集中该列的值不为\
  \ `null`。请注意，`wasNull()` 方法不接受任何参数，它返回的是最后一次使用 `getXxx()` 方法读取的列的 `null` 值状态。以下是一个演示检查列\
  \ `null` 值的代码片段：\n\n```\nResultSet rs = get a result set object;\njava.sql.Date\
  \ dob = rs.getDate(\"dob\");\nif (rs.wasNull()) {\nSystem.out.println(\"DOB is null\"\
  );\n} else {\nSystem.out.println(\"DOB is \" + dob);\n}\n```\n\n`ResultSet` 对象的\
  \ `getDate()` 方法返回一个 `java.sql.Date` 对象。`java.sql.Date` 类的 `toString()` 方法返回一个 `yyyy-mm-dd`\
  \ 格式的字符串。如果你需要将日期值转换为任何其他格式，你需要使用 `java.text.SimpleDateFormat` 类的对象来格式化你的日期值。`ResultSet`\
  \ 的 `getTime()` 和 `getTimestamp()` 方法分别返回一个 `java.sql.Time` 对象和一个 `java.sql.Timestamp`\
  \ 对象。`java.sql.Time` 类的 `toString()` 方法返回一个 `hh:mm:ss` 格式的字符串。`java.sql.Timestamp`\
  \ 类的 `toString()` 方法返回一个 `yyyy-mm-dd hh:mm:ss.fffffffff` 格式的字符串。\n\n让我们看一个使用 `Statement`\
  \ 和 `PreparedStatement` 对象处理 `ResultSet` 的完整示例。清单 5-14 演示了如何在数据库中执行查询并处理结果。\n\n\
  ```\n// QueryPersonTest.java\npackage com.jdojo.jdbc;\nimport java.sql.Connection;\n\
  import java.sql.PreparedStatement;\nimport java.util.Date;\nimport java.sql.ResultSet;\n\
  import java.sql.SQLException;\nimport java.sql.Statement;\nimport java.text.SimpleDateFormat;\n\
  import static java.sql.ResultSet.TYPE_SCROLL_SENSITIVE;\nimport static java.sql.ResultSet.CONCUR_UPDATABLE;\n\
  public class QueryPersonTest {\n// Will be used to format dates\nprivate static\
  \ final SimpleDateFormat sdf = new SimpleDateFormat(\"MM/dd/yyyy\");\npublic static\
  \ void main(String[] args) {\nConnection conn = null;\ntry {\nconn = JDBCUtil.getConnection();\n\
  System.out.println(\"Using Statement Object...\");\nuseStatement(conn, 101);\nuseStatement(conn,\
  \ 102);\nSystem.out.println(\"Using PreparedStatement Object...\");\nusePreparedStatement(conn,\
  \ 101);\nusePreparedStatement(conn, 102);\n// Commit the transaction\nJDBCUtil.commit(conn);\n\
  } catch (SQLException e) {\nSystem.out.println(e.getMessage());\nJDBCUtil.rollback(conn);\n\
  } finally {\nJDBCUtil.closeConnection(conn);\n}\n}\npublic static void useStatement(Connection\
  \ conn,int personId) throws SQLException {\nString SQL = \"select person_id, first_name,\
  \ last_name, \"\n+ \" gender, dob, income from person \"\n+ \" where person_id =\
  \ \" + personId;\nStatement stmt = null;\nResultSet rs = null;\ntry {\nstmt = conn.createStatement(TYPE_SCROLL_SENSITIVE,\
  \ CONCUR_UPDATABLE);\nrs = stmt.executeQuery(SQL);\nprintResultSet(rs);\n} finally\
  \ {\n// Closing the Statement closes the associated ResultSet\nJDBCUtil.closeStatement(stmt);\n\
  }\n}\npublic static void usePreparedStatement(Connection conn, int personId) throws\
  \ SQLException {\nString SQL = \"select person_id, first_name, last_name, \"\n+\
  \ \" gender, dob, income from person \"\n+ \" where person_id = ?\";\nPreparedStatement\
  \ pstmt = null;\nResultSet rs = null;\ntry {\npstmt = conn.prepareStatement(SQL);\n\
  // Set the IN parameter for person_id\npstmt.setInt(1, personId);\n// Execute the\
  \ query\nrs = pstmt.executeQuery();\nprintResultSet(rs);\n} finally {\n// Closing\
  \ the Statement closes the ResultSet\nJDBCUtil.closeStatement(pstmt);\n}\n}\npublic\
  \ static void printResultSet(ResultSet rs) throws SQLException {\nwhile (rs.next())\
  \ {\nint personId = rs.getInt(\"person_id\");\nString firstName = rs.getString(\"\
  first_name\");\nString lastName = rs.getString(\"last_name\");\nString gender =\
  \ rs.getString(\"gender\");\nDate dob = rs.getDate(\"dob\");\nboolean isDobNull\
  \ = rs.wasNull();\ndouble income = rs.getDouble(\"income\");\nboolean isIncomeNull\
  \ = rs.wasNull();\n// Format the dob in MM/dd/YYYY format\nString formattedDob =\
  \ null;\nif (!isDobNull) {\nformattedDob = formatDate(dob);\n}\nSystem.out.print(\"\
  Person ID:\" + personId);\nSystem.out.print(\", First Name:\" + firstName);\nSystem.out.print(\"\
  , Last Name:\" + lastName);\nSystem.out.print(\", Gender:\" + gender);\nif (isDobNull)\
  \ {\nSystem.out.print(\", DOB:null\");\n} else {\nSystem.out.print(\", DOB:\" +\
  \ formattedDob);\n}\nif (isIncomeNull) {\nSystem.out.println(\", Income:null\");\n\
  } else {\nSystem.out.println(\", Income:\" + income);\n}\n}\n}\npublic static String\
  \ formatDate(Date dt) {\nif (dt == null) {\nreturn \"\";\n}\nString formattedDate\
  \ = sdf.format(dt);\nreturn formattedDate;\n}\n}\n清单 5-14.\n使用 Statement 和 PreparedStatement\
  \ 获取并处理 ResultSet\n```\n\n`useStatement()` 方法接受一个 `Connection` 对象和一个人员 ID 作为参数。它使用\
  \ `Statement` 将人员详细信息检索到 `ResultSet` 中。它调用 `printResultSet()` 方法来打印 `ResultSet`\
  \ 中的所有行。你的 `ResultSet` 最多只有一行，因为 `person_id` 是 `person` 表中的主键，并且你在查询的 `WHERE` 子句中使用了它。请注意\
  \ `printResultSet()` 方法中，游标如何在 `while` 循环中移动，以及如何使用适当的 `getXxx()` 方法读取每一列的值。`dob`\
  \ 列的值在打印之前会被格式化为 `mm/dd/yyyy` 格式。\n\n`usePreparedStatement()` 方法使用 `PreparedStatement`\
  \ 对象来执行查询。请注意，你必须在 `PreparedStatement` 上使用 `setXxx()` 方法来设置查询的输入参数。代码使用 `pstmt.setInt(1,\
  \ personId)` 来设置查询 `WHERE` 子句中的人员 ID 值。\n\n`main()` 方法调用这两个方法来打印同一个人员 ID 的详细信息。在这个例子中，你并没有从\
  \ `PreparedStatement` 的预编译中受益，因为你为每个人员 ID 分别调用了这个方法。如果你想多次使用不同的输入执行同一个 `PreparedStatement`，你可以在程序中存储\
  \ `PreparedStatement` 的引用并重用它。这个例子的目的是向你展示如何使用 `PreparedStatement` 来处理查询，我尽量使程序逻辑尽可能简单。\n\
  \n### 获取 ResultSet 中的行数\n\n你如何知道 `ResultSet` 中的行数？简单的答案是，`ResultSet` 并不知道它包含多少行。`ResultSet`\
  \ 接口中没有返回结果集中行数的方法。\n\n`ResultSet` 接口包含一个 `getRow()` 方法，该方法返回 `ResultSet` 中的当前行号。如果没有当前行（例如，游标在第一行之前或最后一行之后），则返回零。在仅向前滚动的\
  \ `ResultSet` 中，对 `getRow()` 方法的支持是可选的。可以说，`getRow()` 方法对于确定 `ResultSet` 对象中的行数没有帮助。你需要应用一些自定义逻辑来获取结果集中的行数。以下是一些可以用来获取结果集中行数的方法。它们都有各自的缺点。\n\
  \n\n\n#### 遍历所有行\n\n该方法在获取 `ResultSet` 后，使用 `next()` 方法循环遍历所有行。它维护一个计数器变量，每次循环迭代时该变量递增\
  \ 1。退出循环后，计数器变量中即包含 `ResultSet` 中的行数。以下代码片段展示了这一逻辑：\n\n```\nResultSet rs = get a\
  \ result set object;\n// 将 rowCount 初始化为 0\nint rowCount = 0;\nwhile(rs.next())\
  \ {\n// 将 rowCount 递增 1\nrowCount++;\n// 处理当前行的结果集数据\n}\n// 现在，rowCount 变量包含了 rs\
  \ 中的行数\nSystem.out.println(\"Row Count: \" + rowCount);\n```\n\n如果你在处理结果集的行之前就需要知道其中的行数，这种逻辑会迫使你获取两次结果集：一次用于获取行数，一次用于处理行。在获取第一个结果集和第二个结果集之间，数据库中的数据可能发生变化，这会导致第一次执行得到的行数失效。只有当你需要在遍历完所有行之后才获取结果集中的行数时，这种方法才是万无一失的。\n\
  \n#### 执行单独的查询\n\n该方法通过执行一个单独的查询来获取结果集中的行数。假设你想知道执行如下查询所返回的结果集中的行数：\n\n```\nselect\
  \ person_id, first_name, last_name, gender, dob, income\nfrom person\nwhere dob\
  \ > {d '1970-01-25'}\n```\n\n要获取此查询返回的行数，你可以执行如下查询：\n\n```\nselect count(*)\nfrom\
  \ person\nwhere dob > {d '1970-01-25'}\n```\n\n结果集中第一行第一列的值将给出主查询返回的行数。然而，这种方法存在同样的缺陷：在两个查询执行之间，数据库中的行可能会发生变化。\n\
  \n#### 使用双向可滚动 ResultSet\n\n在这种方法中，你需要创建一个可以向前和向后两个方向滚动的 `ResultSet` 对象。你可以在创建 `Statement`\
  \ 对象时指定 `ResultSet` 的可滚动属性。有关创建可双向滚动的 `ResultSet` 对象的更多详细信息，请参阅下一节。请确保你的 JDBC 驱动程序支持可双向滚动的\
  \ `ResultSet`。获取 `ResultSet` 后，调用其 `last()` 方法将游标移动到结果集中的最后一行。当游标位于最后一行时，调用 `getRow()`\
  \ 方法。`getRow()` 方法将返回最后一行的行号，该行号即为结果集中的行数。如果你在获取行数后还想处理结果集，可以调用其 `beforeFirst()`\
  \ 方法将游标滚动到第一行之前，然后启动一个 `while` 循环再次处理结果集中的行。\n\nJDBC 驱动程序可能不支持可双向滚动的 `ResultSet`。在这种情况下，它可能返回一个仅向前滚动的\
  \ `ResultSet`。在获取 `ResultSet` 后，在对其调用 `last()` 方法之前，检查它是否支持双向滚动非常重要。如果对仅向前滚动的 `ResultSet`\
  \ 调用 `last()` 方法，它将抛出 `SQLException`。你可以通过调用 `ResultSet` 对象的 `getType()` 方法来获取其可滚动属性。清单\
  \ 5-15 演示了这种获取结果集中行数的方法。\n\n```\n// ResultSetRowCountTest.java\npackage com.jdojo.jdbc;\n\
  import java.sql.Connection;\nimport java.sql.ResultSet;\nimport java.sql.SQLException;\n\
  import java.sql.Statement;\nimport static java.sql.ResultSet.CONCUR_READ_ONLY;\n\
  import static java.sql.ResultSet.TYPE_SCROLL_INSENSITIVE;\npublic class ResultSetRowCountTest\
  \ {\npublic static void main(String[] args) {\nConnection conn = null;\nStatement\
  \ stmt = null;\ntry {\n// 获取一个连接\nconn = JDBCUtil.getConnection();\n// 请求一个双向可滚动的\
  \ ResultSet\nstmt = conn.createStatement(TYPE_SCROLL_INSENSITIVE,\nCONCUR_READ_ONLY);\n\
  String SQL = \"select person_id, first_name, last_name, dob, \"\n+ \"income from\
  \ person\";\n// 执行查询\nResultSet rs = stmt.executeQuery(SQL);\n// 确保你得到了一个双向的 ResultSet\n\
  int cursorType = rs.getType();\nif (cursorType == ResultSet.TYPE_FORWARD_ONLY) {\n\
  System.out.println(\"JDBC 驱动程序返回了一个仅向前滚动的游标。\");\n} else {\n// 将游标移动到最后一行\nrs.last();\n\
  // 获取最后一行的行号，即行数\nint rowCount = rs.getRow();\nSystem.out.println(\"行数: \" + rowCount);\n\
  // 将游标置于第一行之前，以便\n// 再次处理所有行\nrs.beforeFirst();\n}\n// 处理结果集\nwhile (rs.next())\
  \ {\nSystem.out.println(\"人员 ID: \" + rs.getInt(1));\n}\n} catch (SQLException e)\
  \ {\ne.printStackTrace();\n} finally {\nJDBCUtil.closeStatement(stmt);\nJDBCUtil.commit(conn);\n\
  JDBCUtil.closeConnection(conn);\n}\n}\n}\n清单 5-15.\n获取双向可滚动 ResultSet 中的行数\n```\n\
  \n\n\n### 双向可滚动结果集\n\n你可以通过使用 `Connection` 的不同方法创建 `Statement`、准备 `PreparedStatement`\
  \ 或准备 `CallableStatement` 时指定滚动性属性，来请求一个支持双向可滚动 `ResultSet` 的 JDBC 驱动程序。以下是 `Connection`\
  \ 接口中那些允许你隐式或显式指定 `ResultSet` 对象滚动性属性的方法列表。方法声明中的 `throws` 子句已被省略。它们都会抛出 `SQLException`。\n\
  \n*   `Statement createStatement()`\n*   `Statement createStatement(int scrollability,\
  \ int concurrency)`\n*   `Statement createStatement(int scrollability, int concurrency,\
  \ int holdability)`\n*   `PreparedStatement prepareStatement(String SQL)`\n*   `PreparedStatement\
  \ prepareStatement(String SQL, int scrollability, int concurrency)`\n*   `PreparedStatement\
  \ prepareStatement(String SQL, int scrollability, int concurrency, int holdability)`\n\
  *   `CallableStatement prepareCall(String SQL)`\n*   `CallableStatement prepareCall(String\
  \ SQL, int scrollability, int concurrency)`\n*   `CallableStatement prepareCall(String\
  \ SQL, int scrollability, int concurrency, int holdability)`\n\n并非所有 JDBC 驱动程序都支持结果集的全部三种滚动性类型。不过，所有驱动程序至少都支持仅向前结果集。`ResultSet`\
  \ 滚动性的默认值是 `TYPE_FORWARD_ONLY`。当你通过这些方法之一指定结果集的滚动性时，如果 JDBC 驱动程序不支持该滚动性类型，驱动程序不会生成错误。相反，它会返回一个滚动性类型与所请求类型最接近的结果集。如果你为\
  \ `ResultSet` 指定的滚动性不是仅向前，那么最好使用 `getType()` 方法检查返回的 `ResultSet` 的滚动性类型。以下代码片段展示了如何测试\
  \ `ResultSet` 的滚动性属性：\n\n```\nConnection conn = JDBCUtil.getConnection();\n// 请求一个双向、不敏感于更改的\
  \ ResultSet\nStatement stmt = conn.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE,\n\
  ResultSet.CONCUR_READ_ONLY);\nString SQL = \"your select statement goes here\";\n\
  // 获取一个结果集\nResultSet rs = stmt.executeQuery(SQL);\n// 让我们看看 JDBC 驱动程序返回了什么类型的结果集\n\
  int cursorType = rs.getType();\nif (cursorType == ResultSet.TYPE_FORWARD_ONLY) {\n\
  System.out.println(\"ResultSet is TYPE_FORWARD_ONLY\");\n} else if (cursorType ==\
  \ ResultSet.TYPE_SCROLL_SENSITIVE) {\nSystem.out.println(\"ResultSet is TYPE_SCROLL_SENSITIVE\"\
  );\n} else if (cursorType == ResultSet.TYPE_SCROLL_INSENSITIVE) {\nSystem.out.println(\"\
  ResultSet is TYPE_SCROLL_INSENSITIVE\");\n}\n```\n\n`ResultSet` 并发性的默认值是只读，由常量 `ResultSet.CONCUR_READ_ONLY`\
  \ 表示。你只能从具有只读并发性的 `ResultSet` 中读取数据。如果你想使用 `ResultSet` 更新数据，例如更改列的值、插入新行或删除现有行，你必须拥有一个并发性为\
  \ `ResultSet.CONCUR_UPDATABLE` 的 `ResultSet`。并非所有 JDBC 驱动程序都支持可更新并发性。你可以请求一个你希望具有可更新并发性的\
  \ `ResultSet` 的 JDBC 驱动程序。如果 JDBC 驱动程序不支持，它将返回一个只读的 `ResultSet`。你可以按如下方式检查 `ResultSet`\
  \ 对象的并发性：\n\n```\nConnection conn = JDBCUtil.getConnection();\n// 请求一个双向、不敏感于更改且并发性为\
  \ CONCUR_UPDATABLE 的 ResultSet\nStatement stmt = conn.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE,\n\
  ResultSet.CONCUR_UPDATABLE);\nString SQL = \"your select statement goes here\";\n\
  // 获取一个结果集\nResultSet rs = stmt.executeQuery(SQL);\n// 让我们看看 JDBC 驱动程序返回了什么类型的并发性\n\
  int concurrency = rs.getConcurrency();\nif (concurrency == ResultSet.CONCUR_READ_ONLY)\
  \ {\nSystem.out.println(\"ResultSet is CONCUR_READ_ONLY\");\n} else if (concurrency\
  \ == ResultSet.CONCUR_UPDATABLE) {\nSystem.out.println(\"ResultSet is CONCUR_UPDATABLE\"\
  );\n}\n```\n\nJDBC 驱动程序决定了 `ResultSet` 保持性的默认值。不同的 JDBC 驱动程序对此属性有不同的默认值。你可以使用 `ResultSet`\
  \ 的 `getHoldability()` 方法检查 `ResultSet` 的保持性。你也可以使用 `Connection` 的 `getHoldability()`\
  \ 方法来获取 `ResultSet` 对象的此属性。以下是检查 `ResultSet` 保持性的方法：\n\n```\nConnection conn = JDBCUtil.getConnection();\n\
  // 请求一个双向、不敏感于更改、并发性为 CONCUR_UPDATABLE\n// 且保持性为 HOLD_CURSORS_OVER_COMMIT 的 ResultSet\n\
  Statement stmt = conn.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE,\nResultSet.CONCUR_UPDATABLE,\n\
  ResultSet.HOLD_CURSORS_OVER_COMMIT);\nString SQL = \"your select statement goes\
  \ here\";\n// 获取一个结果集\nResultSet rs = stmt.executeQuery(SQL);\n// 让我们看看 JDBC 驱动程序返回了什么类型的保持性\n\
  int holdability = conn.getHoldability(); // Java 1.4 及更高版本\n//int holdability =\
  \ rs.getHoldability(); // Java 6 及更高版本\nif (holdability == ResultSet.HOLD_CURSORS_OVER_COMMIT)\
  \ {\nSystem.out.println(\"ResultSet is HOLD_CURSORS_OVER_COMMIT\");\n} else if (holdability\
  \ == ResultSet.CLOSE_CURSORS_AT_COMMIT) {\nSystem.out.println(\"ResultSet is CLOSE_CURSORS_AT_COMMIT\"\
  );\n}\n```\n\n提示\n\n`getType()`、`getConcurrency()` 和 `getHoldability()` 方法会抛出 `SQLException`，你需要在代码中处理该异常。\n\
  \n\n\n### 滚动遍历 ResultSet 的行\n\n`ResultSet` 接口中有许多方法可以让你将游标位置移动到结果集中的某一行。游标可能指向两组行。一组行由两个虚拟行组成——一个在第一行之前，一个在最后一行之后。另一组行由与查询匹配的行组成。表\
  \ 5-7 展示了 `ResultSet` 的行和列结构。当 `ResultSet` 被创建时，其游标位于第一行之前，如表中 `>` 所示。\n\n表 5-7.\n\
  \nResultSet 的行和列结构\n\n|   | 列 1 | 列 2 | 列 3 | 列 4 | 列 5 | 列 6 |\n| --- | --- | ---\
  \ | --- | --- | --- | --- |\n| 第一行之前 > | 一个虚拟行 |\n| --- | --- |\n| 第 1 行 | `101`\
  \ | `John` | `Jacobs` | `M` | `01/01/1970` | `45000.00` |\n| 第 2 行 | `102` | `Donna`\
  \ | `Duncan` | `F` | `01/01/1960` | `35000.00` |\n| 第 3 行 | `102` | `Buddy` | `Rice`\
  \ | `M` | `01/01/1965` | `25000.00` |\n| 最后一行之后 | 一个虚拟行 |\n\n该表显示了结果集中与查询条件匹配的三行数据。请注意，`ResultSet`\
  \ 不会一次性检索查询的所有行。`ResultSet` 从数据库检索的行数取决于 JDBC 驱动程序。它可能选择每次从数据库中检索一行。你可以使用 `ResultSet`\
  \ 的 `setFetchSize(int fetchSize)` 方法向 JDBC 驱动程序提供一个提示，以便在需要更多行时从数据库中获取指定数量的行。`ResultSet`\
  \ 何时需要从数据库获取更多行？如果你将游标定位到其缓存中不存在的行，`ResultSet` 就需要获取更多行。例如，调用 `ResultSet` 的 `next()`\
  \ 方法可能会触发从数据库获取数据。假设一个 `ResultSet` 每次获取 10 条记录。如果你第一次调用 `next()` 方法，它将获取并缓存 10 条记录，在后续九次调用其\
  \ `next()` 方法时，它将从缓存中提供行。`ResultSet` 获取和缓存行取决于 JDBC 驱动程序和底层 DBMS。\n\n你可以使用 `ResultSet`\
  \ 的 `getRow()` 方法来获取游标当前所在行的行号。如果游标位于第一行之前或最后一行之后，`getRow()` 方法将返回零。\n\n如果你有一个可滚动性设置为仅向前（forward-only）的\
  \ `ResultSet` 对象，你只能使用其 `next()` 方法来移动游标，该方法将游标向前移动一行。一旦游标位于最后一行之后，调用 `next()` 方法将无效。如果\
  \ `next()` 方法定位到从查询返回的行，则返回 `true`。否则，返回 `false`。\n\n如果 `ResultSet` 具有双向可滚动性，你有很多方法可以改变其游标位置。`next()`\
  \ 方法也可以用于这种类型的 `ResultSet`，将游标从当前位置向前移动一行。所有游标移动方法可以分为两类：\n\n*   相对游标移动方法\n*   绝对游标移动方法\n\
  \n相对游标移动方法相对于游标的当前位置向前或向后移动游标。此类方法有两种类型：一种是从当前位置向前或向后移动一行，另一种是向前或向后移动指定数量的行。此类游标移动的一个示例是从当前位置移动到下一行/上一行。表\
  \ 5-8 列出了相对游标移动方法，其类别显示为 `Relative`。\n\n绝对游标移动方法将游标移动到特定行，与当前游标位置无关。此类方法有两种类型：一种是接受行号以将游标移动到该行（例如行号\
  \ 8），另一种是将游标移动到已知位置，例如最后一行。此类游标移动的示例包括将游标移动到第八行、第一行、最后一行、第一行之前或最后一行之后等。表 5-8 列出了绝对游标移动方法，其类别显示为\
  \ `Absolute`。表中的所有方法都会抛出 `SQLException`。\n\n提示\n\n你只能在仅向前可滚动的 `ResultSet` 中使用 `next()`\
  \ 方法来移动游标。在仅向前可滚动的 `ResultSet` 上使用任何其他方法都会抛出异常。所有游标移动方法都可以与双向可滚动的 `ResultSet` 一起使用。请谨慎使用\
  \ `last()` 方法。此方法调用将强制 JDBC 驱动程序从数据库检索所有行。如果 DBMS 不支持双向可滚动游标，JDBC 驱动程序将不得不在客户端缓存所有行。对于非常大的结果集，这可能会对应用程序的性能产生不利影响。\n\
  \n表 5-8.\n\nResultSet 接口的游标移动方法\n\n\n\n| 方法 | 类别 | 描述 |\n| --- | --- | --- |\n|\
  \ `boolean next()` | `相对` | 将光标从当前位置向前移动一行。如果光标定位到结果集中的有效行，则返回 `true`。如果光标位于最后一行之后，则返回\
  \ `false`。如果在光标已位于最后一行之后时调用此方法，可能会抛出异常或返回 `false`。此行为取决于 JDBC 驱动程序。 |\n| `boolean\
  \ previous()` | `相对` | 这是 `next()` 方法的对应方法。它将光标从当前位置向后移动一行。如果光标定位到结果集中的有效行，则返回 `true`。如果光标位于第一行之前，则返回\
  \ `false`。 |\n| `boolean relative(int rows)` | `相对` | 将光标从当前位置向前或向后移动指定的 `rows`\
  \ 行数。`rows` 为正值（例如 `relative(5)`）则向前移动光标。`rows` 为负值（例如 `relative(-5)`）则向后移动光标。调用\
  \ `relative(0)` 无效果。调用 `relative(1)` 和 `relative(-1)` 的效果分别等同于调用 `next()` 和 `previous()`。如果指定的移动行数超出了行的范围（包括第一行之前和最后一行之后），光标将根据移动方向定位到第一行之前或最后一行之后。如果光标定位到有效行，则返回\
  \ `true`，否则返回 `false`。某些 JDBC 驱动程序在调用此方法且光标未定位到有效行时（例如位于第一行之前或最后一行之后）会抛出 `SQLException`，而另一些驱动程序则直接返回\
  \ `false`。 |\n| `boolean first()` | `绝对` | 将光标移动到结果集中的第一行。如果光标定位到第一行，则返回 `true`。如果结果集为空，则返回\
  \ `false`。 |\n| `boolean last()` | `绝对` | 将光标移动到结果集中的最后一行。如果光标定位到最后一行，则返回 `true`。如果结果集为空，则返回\
  \ `false`。 |\n| `void beforeFirst()` | `绝对` | 将光标定位到第一行之前。对空结果集调用此方法无效果。 |\n| `void\
  \ afterLast()` | `绝对` | 将光标定位到最后一行之后。对空结果集调用此方法无效果。 |\n| `boolean absolute(int row)`\
  \ | `绝对` | 将光标移动到指定的 `row` 行号。该方法接受正数和负数行号。如果指定正数行号，则从开头开始计数。如果指定负数行号，则从末尾开始计数。假设结果集中有\
  \ 10 行。调用 `absolute(1)` 会将光标定位到第一行。调用 `absolute(2)` 会将光标定位到第二行。调用 `absolute(-1)`\
  \ 会将光标定位到从末尾数起的第一行，即最后一行。调用 `absolute(-2)` 会将光标定位到倒数第二行。在包含 10 行的结果集中，调用 `absolute(8)`\
  \ 和 `absolute(-3)` 的效果相同，都将光标定位到第八行。调用 `absolute(0)` 会将光标定位到第一行之前。如果光标定位到有效行，则返回\
  \ `true`，否则返回 `false`。任何尝试将光标移动到有效行范围之外的操作，都会根据移动方向将光标定位到第一行之前或最后一行之后。调用 `absolute(1)`\
  \ 等同于调用 `first()`。调用 `absolute(-1)` 等同于调用 `last()`。 |\n\n### 了解 ResultSet 中的光标位置\n\
  \n`ResultSet` 中的五个方法可以让你了解光标当前所在的位置。如果光标位于特定位置，其中四个方法会返回布尔值 `true`。这些方法是 `isBeforeFirst()`、`isFirst()`、`isLast()`\
  \ 和 `isAfterLast()`。这些方法名不言自明。如果在空结果集上调用它们，则返回 `false`。第五个方法名为 `getRow()`，它以 `int`\
  \ 类型返回当前行号。如果光标位于第一行之前、最后一行之后或结果集为空，则返回 0。\n\n### 关闭 ResultSet\n\n你可以通过调用 `ResultSet`\
  \ 的 `close()` 方法来关闭它。对已关闭的 `ResultSet` 调用 `close()` 方法无效果。\n\n```\nResultSet rs\
  \ = 获取一个结果集对象;\n// 处理 rs 对象...\n// 关闭结果集\nrs.close();\n```\n\n关闭 `ResultSet` 会释放与其关联的资源。在以下情况下，`ResultSet`\
  \ 也会被隐式关闭：\n\n*   当生成 `ResultSet` 的 `Statement` 被关闭时，`ResultSet` 会自动关闭。\n*   当 `Statement`\
  \ 被重新执行时，其先前打开的 `ResultSet` 会被关闭。\n*   如果 `Statement` 生成多个结果集，检索下一个结果集会关闭先前检索到的\
  \ `ResultSet`。\n*   如果是仅向前滚动的 `ResultSet`，JDBC 驱动程序可能会在其 `next()` 方法返回 `false` 时选择将其关闭，作为优化的一部分。一旦仅向前滚动的\
  \ `ResultSet` 的 `next()` 方法返回 `false`，你就无法再对该 `ResultSet` 执行任何操作。\n\n你不能对已关闭的 `ResultSet`\
  \ 执行任何操作，除了调用其 `close()` 或 `isClosed()` 方法。调用任何其他方法都会抛出 `SQLException`。然而，当 `ResultSet`\
  \ 对象关闭时，并非一切都丢失了。你仍然可以获取已关闭 `ResultSet` 的以下信息：\n\n*   如果在结果集打开时从中访问了 `Blob`、`Clob`、`NClob`\
  \ 或 `SQLXML` 对象，这些对象在 `ResultSet` 关闭后仍然有效。它们至少在事务持续期间有效。\n*   如果在结果集打开时从中获取了 `ResultSetMetaData`\
  \ 对象，你仍然可以使用它来获取关于结果集的元数据信息。以下代码片段展示了正确和错误的语句顺序：\n\n    ```\n    ResultSet rs =\
  \ 获取一个结果集对象;\n    ResultSetMetaData rsmd = rs.getMetaData();\n    rs.close(); //\
  \ rs 已关闭\n    // 你仍然可以使用 rsmd 对象获取关于 rs 的信息\n    System.out.println(\"列数:\" + rsmd.getColumnCount());\n\
  \    // 由于 rs 已关闭，只能对其使用 isClosed() 和 close() 方法。\n    ResultSetMetaData rsmd =\
  \ rs.getMetaData(); // 错误\n    ```\n\n## 对 ResultSet 进行修改\n\n你可以使用 `ResultSet` 对数据库表执行插入、更新和删除操作。为了对\
  \ `ResultSet` 执行更新，`ResultSet` 对象的并发模式必须为 `ResultSet.CONCUR_UPDATABLE`。在 `ResultSet`\
  \ 中插入新行和更新现有行是一个两步过程，而删除行则是一个一步过程。在两步过程中，你需要先在 `ResultSet` 中进行更改，然后调用其方法之一将更改发送到数据库。在一步过程中，对\
  \ `ResultSet` 的更改会自动传播到数据库。\n\n\n\n### 使用 ResultSet 插入一行\n\n到目前为止，你只知道结果集中有两个虚拟行：第一行之前和最后一行之后的行。然而，`ResultSet`\
  \ 中还存在另一个虚拟行，称为**插入行**。你可以将此行视为一个空的新行，它充当你要插入的新行的暂存区域。你可以使用 `ResultSet` 的 `moveToInsertRow()`\
  \ 方法将光标定位到插入行。当光标移动到插入行时，它会记住之前的位置。你可以调用 `moveToCurrentRow()` 方法将光标从插入行移回之前当前的行。因此，插入新行的第一步是将光标移动到插入行。\n\
  \n```\n// 将光标移动到插入行以添加新行\nrs.moveToInsertRow();\n```\n\n此时，暂存区域中已插入一个新行，并且所有列的值都未定义。此时调用\
  \ `getXxx()` 方法读取列值可能会抛出异常。一旦光标定位到插入行，你需要使用 `ResultSet` 的某个 `updateXxx()` 方法为所有列（至少为非空列）设置值，其中\
  \ `Xxx` 是列的数据类型。`updateXxx()` 方法的第一个参数是列索引或列名，第二个参数是列值。如果你想使用 `ResultSet` 在 `person`\
  \ 表中插入新行，你的 `updateXxx()` 方法调用将如下所示：\n\n```\n// 不设置 dob 和 income 以使用它们的 null 值\n\
  rs.updateInt(\"person_id\", 501);\nrs.updateString(\"first_name\", \"Richard\");\n\
  rs.updateString(\"last_name\", \"Castillo\");\nrs.updateString(\"gender\", \"M\"\
  );\n```\n\n一旦你更新了某列的值，就可以使用 `getXxx()` 方法从 `ResultSet` 中检索新值。\n\n新行的操作尚未完成。你必须将更改发送到数据库，新行才能成为\
  \ `ResultSet` 的一部分。你可以通过调用 `ResultSet` 接口的 `insertRow()` 方法将新插入的行发送到数据库，如下所示：\n\n\
  ```\n// 将更改发送到数据库\nrs.insertRow();\n```\n\n调用 `insertRow()` 方法可能会也可能不会使插入的行成为数据库中的永久行。如果\
  \ `Connection` 启用了自动提交模式，则 `insertRow()` 调用也会提交你的事务。在这种情况下，新行将永久成为数据库的一部分。如果 `Connection`\
  \ 禁用了自动提交模式，你可以通过提交事务使插入永久生效，或通过回滚事务取消插入。请注意，提交或回滚事务将提交或回滚所有待处理的活动，而不仅仅是新插入的行。\n\
  \n将插入的行发送到数据库后，你可以通过调用 `moveToCurrentRow()` 方法移动到之前当前的行。在调用 `moveToInsertRow()`\
  \ 方法之后、调用 `insertRow()` 方法之前移动到另一行，会丢弃新行。\n\n清单 5-16 演示了如何使用 `ResultSet` 插入新行。在\
  \ `addRow()` 方法中获取 `ResultSet` 后，它会检查该结果集是否可更新。如果 `ResultSet` 不可更新，它会打印一条消息表明这一点，并且不执行任何操作。最后，它会打印结果集中的所有行。打印的记录也包括新行。请注意，你没有更新新行的\
  \ `dob` 和 `income` 列的值，当 JDBC 驱动程序在 `person` 表中插入新行时，会为它们使用 `null` 值。如果在同一数据库中多次运行该程序，则会打印一条错误消息，因为程序将尝试插入具有相同\
  \ `person_id` 的人员记录，从而导致表中出现重复行。\n\n```\n// ResultSetInsert.java\npackage com.jdojo.jdbc;\n\
  import java.sql.Connection;\nimport java.sql.ResultSet;\nimport java.sql.SQLException;\n\
  import java.sql.Statement;\nimport static java.sql.ResultSet.CONCUR_UPDATABLE;\n\
  import static java.sql.ResultSet.TYPE_FORWARD_ONLY;\npublic class ResultSetInsert\
  \ {\npublic static void main(String[] args) {\nConnection conn = null;\ntry {\n\
  conn = JDBCUtil.getConnection();\n// 添加新行\naddRow(conn);\n// 提交事务\nJDBCUtil.commit(conn);\n\
  } catch (SQLException e) {\nSystem.out.println(e.getMessage());\nJDBCUtil.rollback(conn);\n\
  } finally {\nJDBCUtil.closeConnection(conn);\n}\n}\npublic static void addRow(Connection\
  \ conn) throws SQLException {\nString SQL = \"select person_id, first_name, \"\n\
  + \"last_name, gender, dob, income  \"\n+ \"from person\";\nStatement stmt = null;\n\
  try {\nstmt = conn.createStatement(TYPE_FORWARD_ONLY,\nCONCUR_UPDATABLE);\n// 获取结果集\n\
  ResultSet rs = stmt.executeQuery(SQL);\n// 确保你的结果集是可更新的\nint concurrency = rs.getConcurrency();\n\
  if (concurrency != ResultSet.CONCUR_UPDATABLE) {\nSystem.out.println(\"JDBC 驱动程序不支持\"\
  \n+ \"可更新的结果集。\");\nreturn;\n}\n// 首先向 ResultSet 插入新行\nrs.moveToInsertRow();\nrs.updateInt(\"\
  person_id\", 501);\nrs.updateString(\"first_name\", \"Richard\");\nrs.updateString(\"\
  last_name\", \"Castillo\");\nrs.updateString(\"gender\", \"M\");\n// 将新行发送到数据库\n\
  rs.insertRow();\n// 移回当前行\nrs.moveToCurrentRow();\n// 打印结果集中的所有行\nwhile (rs.next())\
  \ {\nSystem.out.print(\"人员 ID: \" + rs.getInt(\"person_id\")\n+ \", 名字: \" + rs.getString(\"\
  first_name\")\n+ \", 姓氏: \" + rs.getString(\"last_name\"));\nSystem.out.println();\n\
  }\n} finally {\nJDBCUtil.closeStatement(stmt);\n}\n}\n}\n清单 5-16.\n使用 ResultSet\
  \ 插入新行\n```\n\n\n\n### 使用 ResultSet 更新行\n\n以下是更新 `ResultSet` 中现有行的步骤。\n\n*   将光标移动到结果集中的有效行。请注意，你只能更新现有行的数据。显然，如果你想更新某行中的数据，光标不应位于第一行之前或最后一行之后。\n\
  *   调用列的 `updateXxx()` 方法来更新该列的值。\n*   如果你不想继续使用 `updateXxx()` 方法调用所做的更改，则需要调用 `ResultSet`\
  \ 的 `cancelRowUpdates()` 方法来取消这些更改。\n*   当你完成更新当前行的所有列值后，调用 `updateRow()` 方法将更改发送到数据库。如果\
  \ `Connection` 启用了自动提交模式，更改将被提交。否则，你需要手动将更改提交到数据库。\n*   如果在调用 `updateRow()` 之前将光标移动到另一行，则使用\
  \ `updateXxx()` 方法调用所做的所有更改都将被丢弃。\n*   还有另一种方式会丢失对行中列的更新。如果在调用 `updateXxx()` 之后、调用\
  \ `updateRow()` 之前调用了 `refreshRow()` 方法，你的更改将会丢失，因为 JDBC 驱动程序会从数据库刷新该行的数据。\n\n清单\
  \ 5-17 演示了如何使用 `ResultSet` 更新一行。它将每个收入非空的人的收入提高 10%。如果一个人的收入为 `null`，则将其收入更新为 10000.00。\n\
  \n```\n// ResultSetUpdate.java\npackage com.jdojo.jdbc;\nimport java.sql.Connection;\n\
  import java.sql.ResultSet;\nimport static java.sql.ResultSet.CONCUR_UPDATABLE;\n\
  import static java.sql.ResultSet.TYPE_FORWARD_ONLY;\nimport java.sql.SQLException;\n\
  import java.sql.Statement;\npublic class ResultSetUpdate {\npublic static void main(String[]\
  \ args) {\nConnection conn = null;\ntry {\nconn = JDBCUtil.getConnection();\n//\
  \ 给每个人加薪 10%\ngiveRaise(conn, 10.0);\n// 提交事务\nJDBCUtil.commit(conn);\n} catch (SQLException\
  \ e) {\nSystem.out.println(e.getMessage());\nJDBCUtil.rollback(conn);\ne.printStackTrace();\n\
  } finally {\nJDBCUtil.closeConnection(conn);\n}\n}\npublic static void giveRaise(Connection\
  \ conn, double raise) throws SQLException {\nString SQL = \"select person_id, first_name,\
  \ last_name, \"\n+ \"income from person\";\nStatement stmt = null;\ntry {\nstmt\
  \ = conn.createStatement(TYPE_FORWARD_ONLY, CONCUR_UPDATABLE);\n// 获取结果集\nResultSet\
  \ rs = stmt.executeQuery(SQL);\n// 确保我们的结果集是可更新的\nint concurrency = rs.getConcurrency();\n\
  if (concurrency != CONCUR_UPDATABLE) {\nSystem.out.println(\"JDBC 驱动程序不支持可更新的结果集。\"\
  );\nreturn;\n}\n// 给每个人加薪\nwhile (rs.next()) {\ndouble oldIncome = rs.getDouble(\"\
  income\");\ndouble newIncome = 0.0;\nboolean incomeWasNull = rs.wasNull();\nif (incomeWasNull)\
  \ {\n// 空收入从 10000.00 开始\nnewIncome = 10000.00;\n} else {\n// 增加收入\nnewIncome =\
  \ oldIncome + oldIncome * (raise / 100.0);\n}\n// 用新值更新收入列\nrs.updateDouble(\"income\"\
  , newIncome);\n// 打印更改的详细信息\nint personId = rs.getInt(\"person_id\");\nString firstName\
  \ = rs.getString(\"first_name\");\nString lastName = rs.getString(\"last_name\"\
  );\nSystem.out.println(firstName + \" \" + lastName\n+ \" (person id=\" + personId\n\
  + \") income changed from \"\n+ (incomeWasNull? \"null\" : String.valueOf(oldIncome))\n\
  + \" to \" + newIncome);\n// 将更改发送到数据库\nrs.updateRow();\n}\n} finally {\nJDBCUtil.closeStatement(stmt);\n\
  }\n}\n}\n清单 5-17.\n使用 ResultSet 更新数据\n```\n\n### 使用 ResultSet 删除行\n\n从 `ResultSet`\
  \ 中删除行比更新和插入行更简单。以下是删除行的步骤。\n\n*   将光标定位到有效行。\n*   调用 `ResultSet` 的 `deleteRow()`\
  \ 方法来删除当前行。\n\n`deleteRow()` 方法会从 `ResultSet` 中删除该行，同时也会从数据库中删除该行。除了回滚事务之外，没有其他方法可以取消删除操作。如果\
  \ `Connection` 启用了自动提交模式，`deleteRow()` 将永久地从数据库中删除该行。从 `ResultSet` 对象中删除一行的典型代码如下：\n\
  \n```\nResultSet rs = 获取一个可更新的结果集对象;\n// 滚动到要删除的行，例如第一行\nrs.next();\n// 删除当前行\n\
  rs.delete(); // 该行从结果集和数据库中删除\n// 根据你的处理逻辑提交或回滚更改\n```\n\n\n\n## 处理语句返回的多个结果\n\n\
  有时执行一条 SQL 语句可能会返回多个结果。通常，执行存储过程会得到多个结果。这些结果包括更新计数和结果集。例如，如果你执行一个更新了一些记录并返回一个结果集的存储过程，你会得到两个结果：第一个是更新计数，第二个是结果集。某些数据库管理系统允许你禁止返回更新计数。例如，你可以在\
  \ SQL Server 数据库管理系统的存储过程中使用 `SET NOCOUNT ON` 和 `SET NOCOUNT OFF` 选项来禁用或启用更新计数结果。请查阅你的数据库管理系统文档，了解可用于禁止返回更新计数的选项。\n\
  \n如果一条语句可能返回多个结果，请使用 `Statement` 的 `execute()` 方法。你需要处理四件事来应对多个结果。你可能知道也可能不知道结果返回的顺序。首先需要考虑的是\
  \ `execute()` 方法的返回值。你需要使用 `Statement` 的以下三个方法来访问所有结果：\n\n*   `getMoreResults()`\n\
  *   `getUpdateCount()`\n*   `getResultSet()`\n\n`execute()` 方法可能生成多个结果，也可能不生成任何结果。你必须一次读取一个结果。在读取结果之前，必须先滚动到该结果。`execute()`\
  \ 方法会滚动到第一个结果（如果存在）。如果第一个结果是 `ResultSet`，则 `execute()` 方法返回 `true`。如果第一个结果是更新计数或没有结果，则返回\
  \ `false`。你可以通过调用 `Statement` 的 `getResultSet()` 方法来检索 `ResultSet` 结果。你可以通过调用 `Statement`\
  \ 的 `getUpdateCount()` 方法来检索更新计数。\n\n你可以通过调用 `Statement` 的 `getMoreResults()` 方法滚动到下一个结果。如果滚动到\
  \ `ResultSet` 结果，`getMoreResults()` 方法返回 `true`。如果滚动到更新计数结果或没有更多结果，则返回 `false`。\n\
  \n处理多个结果的规则是不是很令人困惑？那么，如何判断是否还有更多结果需要处理呢？这有点棘手。你需要编写几行代码来处理执行语句返回的多个结果。以下代码片段整合了相关逻辑。它使用了\
  \ `CallableStatement`。你也可以使用 `Statement` 或 `PreparedStatement`。以下逻辑不依赖于多个结果的顺序或数量：\n\
  \n```\nCallable cstmt = 获取一个可调用语句对象;\nboolean hasResultSet = cstmt.execute();\n\
  int updateCount = cstmt.getUpdateCount();\nwhile (hasResultSet || updateCount !=\
  \ -1) {\nif (hasResultSet) {\n// 游标指向一个 ResultSet\nResultSet rs = cstmt.getResultSet();\n\
  // 在此处处理结果集\nSystem.out.println(\"获取到一个结果集\");\n} else {\nSystem.out.println(\"\
  获取到一个更新计数: \" + updateCount);\n}\n// 将游标移动到下一个结果\nhasResultSet = cstmt.getMoreResults();\n\
  // 获取新的更新计数\nupdateCount = cstmt.getUpdateCount();\n}\n// 当执行到此处时，所有结果都已处理完毕。\n\
  ```\n\n提示\n\n当你调用 `getMoreResults()` 方法时，先前通过 `getResultSet()` 方法获取的结果集将被关闭。如果你想保留先前访问的结果集，可以使用另一个版本的\
  \ `getMoreResults()` 方法，该方法接受一个参数，允许你指定如何处理打开的 `ResultSet` 对象。关闭语句将关闭所有结果集。\n\n\
  ## 从存储过程获取结果集\n\n我已经详细介绍了如何处理执行 `SELECT` 语句生成的结果集（参见清单 5-14）。存储过程也可以生成结果集。在大多数数据库中，在存储过程中生成结果集很容易，只需在存储过程中编写一条\
  \ `SELECT` 语句即可。以下是在 Adaptive Server Anywhere 数据库管理系统中创建一个返回结果集的存储过程的示例。该存储过程名为\
  \ `get_person_details`。它接受一个整数类型的参数，该参数是 `person_id` 的值。为了返回结果集，它简单地根据传入的 `person_id`\
  \ 从 `person` 表中选择列。\n\n```\n-- Adaptive Server Anywhere 9.0\ncreate procedure get_person_details(@person_id\
  \ integer)\nas\nbegin\nselect person_id, first_name, last_name, gender, dob, income\n\
  from person\nwhere person_id = @person_id\nend\n```\n\n在 Oracle 数据库中，在存储过程内部生成结果集略有不同。你需要在\
  \ Oracle 数据库中使用 `REF CURSOR` 类型来生成结果集。首先，我们来看一个处理由非 Oracle 数据库管理系统的存储过程生成的结果集的示例。请查阅你的数据库管理系统及其\
  \ JDBC 文档，了解它如何支持在存储过程内部生成结果集。在本节末尾，你将看到一个使用 Oracle 数据库管理系统在存储过程中生成结果集的示例。\n\n本节包含用于在某些数据库管理系统中创建\
  \ `get_person_details` 存储过程的数据库脚本。如果你正在使用这些数据库管理系统之一，则需要在运行本节中的示例之前，为你的数据库管理系统运行该脚本。如果你的数据库管理系统未列出，你可以复制该逻辑并在你的数据库管理系统中创建一个生成结果集的\
  \ `get_person_details` 存储过程。\n\n如果你的存储过程只生成一个结果集，那么处理该结果集就很简单。以下是处理来自存储过程的一个结果集的步骤：\n\
  \n*   使用 JDBC 标准语法以字符串格式构建存储过程调用。\n\n    ```\n    String sql = \"{call get_person_details(?)}\"\
  ;\n    ```\n\n*   使用上一步创建的 SQL 语法准备一个 `CallableStatement`。\n\n    ```\n    CallableStatement\
  \ cstmt = conn.prepareCall(sql);\n    ```\n\n*   设置需要传递给存储过程的任何 `IN` 参数。在你的例子中，你将向存储过程传递一个\
  \ `person_id`，并且需要将 `person_id` 设置为 `IN` 参数。\n\n    ```\n    cstmt.setInt(1, 101);\n\
  \    ```\n\n*   调用 `CallableStatement` 对象的 `executeQuery()` 方法，该方法将返回存储过程生成的结果集作为\
  \ `ResultSet`。\n\n    ```\n    ResultSet rs = cstmt.executeQuery();\n    ```\n\n\
  *   像往常一样处理 `ResultSet` 对象，遍历其行并使用 `getXxx()` 方法读取列值。\n\n提示\n\n如果你的存储过程返回多个结果集，则需要使用\
  \ `CallableStatement` 接口的 `execute()` 方法，而不是 `executeQuery()` 方法。有关如何处理存储过程生成的多个结果集的更多详细信息，请参阅“处理语句返回的多个结果”部分。\n\
  \n以下是在不同数据库管理系统中创建 `get_person_details` 存储过程的数据库脚本。\n\n### MySQL 数据库\n\n```\nDELIMITER\
  \ $$\nDROP PROCEDURE IF EXISTS get_person_details $$\nCREATE PROCEDURE get_person_details(in\
  \ person_id_param int)\nBEGIN\nselect person_id, first_name, last_name, gender,\
  \ dob, income\nfrom person\nwhere person_id = person_id_param;\nEND $$\nDELIMITER\
  \ ;\n```\n\n### Adaptive Server Anywhere 数据库\n\n```\ncreate procedure get_person_details(@person_id\
  \ integer)\nas\nbegin\nselect person_id, first_name, last_name, gender, dob, income\n\
  from person\nwhere person_id = @person_id\nend\n```\n\n\n\n### Oracle 数据库\n\n```\n\
  CREATE OR REPLACE\nPACKAGE JDBC_TEST_PKG\nAS\ntype person_cursor_type is ref cursor;\n\
  END JDBC_TEST_PKG;\ncreate or replace PROCEDURE GET_PERSON_DETAILS\n( person_id_param\
  \ IN NUMBER,\nperson_cursor OUT jdbc_test_pkg.person_cursor_type\n)\nAS\nBEGIN\n\
  open person_cursor for\nselect person_id, first_name, last_name, gender, dob, income\n\
  from person\nwhere person_id = person_id_param;\nEND GET_PERSON_DETAILS;\n```\n\n\
  ### SQL Server 数据库\n\n```\n-- 如果存储过程已存在，则删除\nIF EXISTS (\nSELECT *\nFROM INFORMATION_SCHEMA.ROUTINES\n\
  WHERE SPECIFIC_SCHEMA = N'dbo'\nAND SPECIFIC_NAME = N'get_person_details'\n)\nDROP\
  \ PROCEDURE dbo.get_person_details\nGO\nCREATE PROCEDURE dbo.get_person_details\n\
  @person_id int\nAS\nBEGIN\nSELECT person_id, first_name, last_name, gender, dob,\
  \ income\nFROM person\nWHERE person_id = @person_id;\nEND;\nGO\n```\n\n### DB2 数据库\n\
  \n```\ncreate procedure get_person_details(in person_id_param int)\nresult sets\
  \ 1\nlanguage sql\nbegin\ndeclare c1 cursor with return for\nselect person_id, first_name,\
  \ last_name, gender, dob, income\nfrom person\nwhere person_id = person_id_param;\n\
  open c1;\nend\n@\n```\n\n在此语法中，`@` 符号用作语句终止符。\n\n### Apache Derby 数据库\n\n对于 Apache\
  \ Derby 数据库，你需要将存储过程编写为 Java 类中的一个方法，如清单 5-18 所示。\n\n```\n// JavaDBGetPersonDetailsSp.java\n\
  package com.jdojo.jdbc;\nimport java.sql.Connection;\nimport java.sql.DriverManager;\n\
  import java.sql.PreparedStatement;\nimport java.sql.ResultSet;\nimport java.sql.SQLException;\n\
  public class JavaDBGetPersonDetailsSp {\npublic static void getPersonDetails(int\
  \ personId, ResultSet[] personDetailRs)\nthrows SQLException {\n// 必须使用以下 URL 来获取调用此方法的\
  \ Connection 对象的引用。\nString dbURL = \"jdbc:default:connection\";\nConnection conn\
  \ = DriverManager.getConnection(dbURL);\nString sql = \"select person_id, first_name,\
  \ \"\n+ \"last_name, gender, dob, income \"\n+ \"from person \"\n+ \"where person_id\
  \ = ?\";\nPreparedStatement pstmt = conn.prepareStatement(sql);\npstmt.setInt(1,\
  \ personId);\nResultSet rs = pstmt.executeQuery();\npersonDetailRs[0] = rs;\n/*\
  \ 不要在此处关闭 pstmt 或 rs。它们应由此存储过程的调用者处理和关闭。\n*/\n}\n}\n清单 5-18.\nApache Derby 中 get_person_details\
  \ 存储过程的 Java 代码\n```\n\n在 Derby 数据库中创建 `get_person_details` 存储过程的命令如下。有关在 Derby\
  \ 中使用存储过程的更多详细信息，请参考清单 5-11 以及包含该清单的章节中的相关步骤。\n\n```\n-- 创建存储过程的命令\nCREATE PROCEDURE\
  \ get_person_details(IN person_id integer)\nPARAMETER STYLE JAVA\nLANGUAGE JAVA\n\
  READS SQL DATA\nDYNAMIC RESULT SETS 1\nEXTERNAL NAME 'com.jdojo.jdbc.JavaDBGetPersonDetailsSp.getPersonDetails';\n\
  ```\n\n以下是在 Derby 中创建 `get_person_details` 存储过程的命令序列：\n\n```\nC:\\Java9APIsAndModules>ij\n\
  ij version 10.14\nij> connect 'jdbc:derby:beginningJavaDB;user=app;password=app';\n\
  ij> CREATE PROCEDURE get_person_details(IN person_id integer)\nPARAMETER STYLE JAVA\n\
  LANGUAGE JAVA\nREADS SQL DATA\nDYNAMIC RESULT SETS 1\nEXTERNAL NAME 'com.jdojo.jdbc.JavaDBGetPersonDetailsSp.getPersonDetails';\n\
  ij> exit;\nC:\\Java9APIsAndModules>\n```\n\n清单 5-19 包含了执行存储过程并处理其生成的结果集的完整代码。它使用\
  \ `QueryPersonTest` 类（参见清单 5-14）的 `printResultSet()` 静态方法来打印人员详细信息。此程序适用于在服务器端原生支持结果集的数据库。请参考本节后面的示例，了解如何处理\
  \ Oracle 数据库中存储过程生成的结果集。\n\n```\n// StoredProcedureResultSetTest.java\npackage com.jdojo.jdbc;\n\
  import java.sql.CallableStatement;\nimport java.sql.Connection;\nimport java.sql.ResultSet;\n\
  import java.sql.SQLException;\npublic class StoredProcedureResultSetTest {\npublic\
  \ static void main(String[] args) {\nConnection conn = null;\ntry {\nconn = JDBCUtil.getConnection();\n\
  // 打印 person_id 为 101 的详细信息\nprintPersonDetails(conn, 101);\nJDBCUtil.commit(conn);\n\
  } catch (SQLException e) {\nSystem.out.println(e.getMessage());\nJDBCUtil.rollback(conn);\n\
  } finally {\nJDBCUtil.closeConnection(conn);\n}\n}\npublic static void printPersonDetails(Connection\
  \ conn, int personId)\nthrows SQLException {\nString SQL = \"{ call get_person_details(?)\
  \ }\";\nCallableStatement cstmt = null;\ntry {\ncstmt = conn.prepareCall(SQL);\n\
  // 设置 IN 参数\ncstmt.setInt(1, personId);\nResultSet rs = cstmt.executeQuery();\n\
  // 处理结果集\nQueryPersonTest.printResultSet(rs);\n} finally {\nJDBCUtil.closeStatement(cstmt);\n\
  }\n}\n}\n清单 5-19.\n处理存储过程生成的结果集\n```\n\n现在，我们仅针对 Oracle 数据库进行操作。以下是处理 Oracle 数据库中存储过程生成的结果集所需的步骤。\n\
  \n*   使用 JDBC 标准语法以字符串格式构建存储过程调用。对于 Oracle 存储过程，你将有一个额外的 `OUT` 参数。在 Oracle 数据库中，存储过程将通过该\
  \ `OUT` 参数传回一个 `REF CURSOR` 类型的引用。在你的场景中，第一个参数是 `IN` 类型，用于传递 `person_id`。第二个参数是\
  \ `OUT` 参数，类型为 `oracle.jdbc.OracleTypes.CURSOR`。请注意，你必须在 `CLASSPATH` 中包含 Oracle\
  \ JDBC 驱动程序的 JAR 文件，才能使用 `oracle.jdbc.OracleTypes.CURSOR` 接口。\n\n```\n    String\
  \ sql = \"{call get_person_details(?, ?)}\";\n    ```\n\n*   使用上一步创建的 SQL 语法准备一个\
  \ `CallableStatement`。\n\n```\n    CallableStatement cstmt = conn.prepareCall(sql);\n\
  \    ```\n\n*   设置需要传递给存储过程的任何 `IN` 参数。在你的场景中，你将向存储过程传递一个 `person_id`，并且需要将该 `person_id`\
  \ 设置为 `IN` 参数。将 `OUT` 参数注册为 `oracle.jdbc.OracleTypes.CURSOR` 类型。\n\n```\n    cstmt.setInt(1,\
  \ 101);\n    cstmt.registerOutParameter(2, oracle.jdbc.OracleTypes.CURSOR);\n  \
  \  ```\n\n*   调用 `CallableStatement` 对象的 `execute()` 方法。\n\n```\n    cstmt.execute();\n\
  \    ```\n\n*   使用 `getObject()` 方法获取通过第二个 `OUT` 参数传回的 `ResultSet`，并将其强制转换为 `ResultSet`。\n\
  \n```\n    ResultSet rs = (ResultSet)cstmt.getObject(2);\n    ```\n\n*   像往常一样处理\
  \ `ResultSet`，遍历其行并使用其 `getXxx()` 方法读取列值。\n\n清单 5-20 包含了在 Oracle 数据库中执行 `get_person_details`\
  \ 存储过程并处理其生成的结果集的完整代码。请确保你拥有 `JDBCUtil.getConnection()` 方法（参见清单 5-3），该方法返回一个到 Oracle\
  \ 数据库的连接。在运行清单 5-20 中的程序之前，你还必须按照本节中针对 Oracle 的说明，在 Oracle 数据库中编译必要的包和过程。请注意，你需要取消注释\
  \ `printPersonDetails()` 方法中的以下语句：\n\n```\n//cstmt.registerOutParameter(2, oracle.jdbc.OracleTypes.CURSOR);\n\
  ```\n\n我将其注释掉是为了让整个类能够编译。你需要将 Oracle JDBC 驱动程序 JAR 文件添加到模块路径中，并修改 `jdojo.jdbc` 模块的声明，使其能够读取\
  \ Oracle JDBC JAR 定义的自动模块。否则，在取消注释此语句后，代码将无法编译。\n\n\n\n```\n// OracleStoredProcedureResultSetTest.java\n\
  package com.jdojo.jdbc;\nimport java.sql.CallableStatement;\nimport java.sql.Connection;\n\
  import java.sql.ResultSet;\nimport java.sql.SQLException;\npublic class OracleStoredProcedureResultSetTest\
  \ {\npublic static void main(String[] args) {\nConnection conn = null;\ntry {\n\
  conn = JDBCUtil.getConnection();\n// 打印 person_id 为 101 的详细信息\nprintPersonDetails(conn,\
  \ 101);\nJDBCUtil.commit(conn);\n} catch (SQLException e) {\nSystem.out.println(e.getMessage());\n\
  JDBCUtil.rollback(conn);\n} finally {\nJDBCUtil.closeConnection(conn);\n}\n}\npublic\
  \ static void printPersonDetails(Connection conn, int personId)\nthrows SQLException\
  \ {\nString sql = \"{ call get_person_details(?, ?) }\";\nCallableStatement cstmt\
  \ = null;\ntry {\ncstmt = conn.prepareCall(sql);\n// 设置 IN 参数\ncstmt.setInt(1, personId);\n\
  /* 在将 Oracle JDBC 驱动程序添加到模块路径后，\n取消注释以下语句。\n将第二个参数注册为 OUT 参数，\n该参数将返回 REF CURSOR（即\
  \ ResultSet）\n*/\n//cstmt.registerOutParameter(2, oracle.jdbc.OracleTypes.CURSOR);\n\
  // 执行存储过程\ncstmt.execute();\n// 从 OUT 参数获取结果集\nResultSet rs = (ResultSet) cstmt.getObject(2);\n\
  // 处理结果集\nQueryPersonTest.printResultSet(rs);\n} finally {\nJDBCUtil.closeStatement(cstmt);\n\
  }\n}\n}\n清单 5-20.\n在 Oracle 数据库中处理来自存储过程的 ResultSet\n```\n\n许多数据库支持 `REF CURSOR`\
  \ 类型。Java 8 在 JDBC API 中通过添加 `JDBCType.REF_CURSOR` 枚举常量（该常量在 Java 中表示 `REF CURSOR`\
  \ 数据类型）直接支持了 `REF CURSOR` 数据类型。使用此 JDBC 类型，您将能够在 Java 程序中处理 `REF CURSOR` 类型，而无需使用专有的\
  \ JDBC 类。例如，您可以在 `printPersonDetails()` 方法中按如下方式注册 `REF CURSOR` 数据库类型的 `OUT` 参数：\n\
  \n```\ncstmt.registerOutParameter(2, JDBCType.REF_CURSOR);\n```\n\n注意\n\n在撰写本文时，`JDBCType.REF_CURSOR`\
  \ 类型尚未在 Oracle JDBC 驱动程序中实现。如果您使用此类型注册 `REF CURSOR` 数据库类型，将会收到一个运行时错误，错误消息提示此数据类型尚未实现。请使用\
  \ `DatabaseMetaData` 接口的 `supportsRefCursors()` 方法（该方法在 Java 8 中添加）来了解数据库是否支持 `REF\
  \ CURSOR`。\n\n## ResultSetMetaData\n\n`ResultSet` 包含执行查询返回的数据行以及关于列的详细信息。其中包含的关于结果集中列的信息称为结果集元数据。`ResultSetMetaData`\
  \ 接口的实例表示结果集元数据。您可以通过调用 `ResultSet` 的 `getMetaData()` 方法来获取 `ResultSetMetaData`。\n\
  \n```\nResultSet rs = 获取结果集对象;\nResultSetMetaData rsmd = rs.getMetaData();\n```\n\
  \n`ResultSetMetaData` 包含关于结果集中所有列的大量信息。`ResultSetMetaData` 中除 `getColumnCount()`\
  \ 之外的所有方法都接受结果集中的列索引作为参数。它包含列的表名、名称、标签、数据库数据类型、Java 中的类名、是否可为空、精度等信息。它还包含结果集中的列数。其\
  \ `getTableName()` 方法返回列的表名；`getColumnName()` 方法返回列的名称；`getColumnLabel()` 方法返回列的标签；`getColumnTypeName()`\
  \ 方法返回数据库中的列类型；`getColumnClassName()` 方法返回用于表示该列数据的 Java 类。其 `getColumnCount()`\
  \ 方法返回结果集中的列数。\n\n列标签是一种适合打印的文本，在查询中位于列名之后。以下查询将 `\"Person ID\"` 用作 `person_id`\
  \ 列的列标签。`first_name` 列没有指定标签。\n\n```\nselect person_id as \"Person ID\", first_name\
  \ from person\n```\n\n如果此查询用于结果集，则调用 `getColumnLabel(1)` 方法将返回 `\"Person ID\"`，而\
  \ `getColumnName(1)` 将返回 `person_id`。如果查询中未指定列标签，则 `getColumnLabel()` 方法返回列名。\n\n\
  清单 5-21 演示了如何使用 `ResultSetMetaData` 对象来了解更多关于结果集的信息。输出结果针对 Derby 数据库。当您使用不同的 JDBC\
  \ 驱动程序时，可能会得到不同的输出，因为数据库列类型到 JDBC 列类型的映射取决于 JDBC 驱动程序。\n\n```\n// ResultSetMetaDataTest.java\n\
  package com.jdojo.jdbc;\nimport java.sql.Connection;\nimport java.sql.ResultSet;\n\
  import java.sql.ResultSetMetaData;\nimport java.sql.SQLException;\nimport java.sql.Statement;\n\
  public class ResultSetMetaDataTest {\npublic static void main(String[] args) {\n\
  Connection conn = null;\ntry {\nconn = JDBCUtil.getConnection();\nString sql = \"\
  select person_id as \\\"Person ID\\\", \"\n+ \"first_name as \\\"First Name\\\"\
  , \"\n+ \"gender as Gender, \"\n+ \"dob as \\\"Birth Date\\\", \"\n+ \"income as\
  \ Income \"\n+ \"from person\";\n// 打印结果集元数据\nprintMetaData(conn, sql);\nJDBCUtil.commit(conn);\n\
  } catch (SQLException e) {\nSystem.out.println(e.getMessage());\nJDBCUtil.rollback(conn);\n\
  } finally {\nJDBCUtil.closeConnection(conn);\n}\n}\npublic static void printMetaData(Connection\
  \ conn, String SQL)\nthrows SQLException {\nStatement stmt = conn.createStatement();\n\
  try {\nResultSet rs = stmt.executeQuery(SQL);\nResultSetMetaData rsmd = rs.getMetaData();\n\
  int columnCount = rsmd.getColumnCount();\nSystem.out.println(\"列数:\" + columnCount);\n\
  for (int i = 1; i <= columnCount; i++) {\nSystem.out.println(\"索引:\" + i\n+ \",\
  \ 名称:\" + rsmd.getColumnName(i)\n+ \", 标签:\" + rsmd.getColumnLabel(i)\n+ \", 类型名称:\"\
  \ + rsmd.getColumnTypeName(i)\n+ \", 类名:\" + rsmd.getColumnClassName(i));\n}\n}\
  \ finally {\nJDBCUtil.closeStatement(stmt);\n}\n}\n}\n列数:5\n索引:1, 名称:Person ID,\
  \ 标签:Person ID, 类型名称:INTEGER, 类名:java.lang.Integer\n索引:2, 名称:First Name, 标签:First\
  \ Name, 类型名称:VARCHAR, 类名:java.lang.String\n索引:3, 名称:GENDER, 标签:GENDER, 类型名称:CHAR,\
  \ 类名:java.lang.String\n索引:4, 名称:Birth Date, 标签:Birth Date, 类型名称:DATE, 类名:java.sql.Date\n\
  索引:5, 名称:INCOME, 标签:INCOME, 类型名称:DOUBLE, 类名:java.lang.Double\n清单 5-21.\n使用 ResultSetMetaData\
  \ 对象获取关于 ResultSet 的信息\n```\n\n如果您需要编写通用代码来处理任何或未知的结果集，您会发现 `ResultSetMetaData`\
  \ 不可或缺。例如，假设您想开发一个 Swing 应用程序，允许用户输入查询，然后在 `JTable` 中显示查询数据。要构建 `JTable`，您必须知道结果集中的列数。您可以使用\
  \ `ResultSetMetaData` 的 `getColumnCount()` 方法来了解结果集中的列数。您还可以使用此对象中提供的许多其他方法来构建合适的\
  \ `JTable`。\n\n\n\n## 使用 RowSet\n\n`RowSet` 接口的实例是结果集的包装器。`RowSet` 接口继承自 `ResultSet`\
  \ 接口。简单来说，`RowSet` 是一个 Java 对象，它包含来自表格数据源的一组行。表格数据源可以是数据库、平面文件、电子表格等。`RowSet` 接口位于\
  \ `javax.sql` 包中。以下是 `RowSet` 相对于 `ResultSet` 的优势：\n\n*   `RowSet` 使 JDBC 编程更简单。使用\
  \ `ResultSet` 时，必须同时处理 `Connection` 和 `Statement`。`RowSet` 向开发者隐藏了使用 `Connection`\
  \ 和 `Statement` 的复杂性。您只需处理一个对象，即 `RowSet`。\n*   `ResultSet` 不可序列化（`Serializable`），因此无法通过网络发送或保存到磁盘以供日后使用。`RowSet`\
  \ 是可序列化的（`Serializable`）。\n*   `ResultSet` 始终与数据源保持连接。`RowSet` 无需始终与其数据源保持连接。它可以在需要时（例如检索/更新数据源中的数据）连接到数据库。\n\
  *   `RowSet` 默认是可滚动的和可更新的。\n*   `RowSet` 的两个特性——可序列化和无连接性——使其在瘦客户端环境（如移动设备或 Web\
  \ 应用程序）中非常有用。瘦客户端不需要拥有 JDBC 驱动程序。它可以从中间层获取断开连接的 `RowSet` 中的数据。它可以修改数据并将修改后的 `RowSet`\
  \ 发送回中间层，中间层可以连接到数据源并更新数据。还有一种用于 Web 的 `RowSet` 类型，可与 XML 数据一起使用。\n*   `ResultSet`\
  \ 使用数据库作为其数据源。使用 `RowSet` 时，您不限于仅使用数据库作为数据源。您可以实现一个 `RowSet` 来使用任何表格数据源。\n*   `RowSet`\
  \ 遵循 JavaBeans 模型进行属性设置和事件通知，这使得可以使用支持 JavaBeans 开发的视觉工具来开发 `RowSet`。\n*   `RowSet`\
  \ 还支持在检索数据后对数据进行过滤。在 `ResultSet` 中无法进行数据过滤。如果使用 `ResultSet`，则必须在查询中使用 `WHERE` 子句来在数据库本身中过滤数据。\n\
  *   `RowSet` 使得在从数据源检索数据后，可以根据列的值连接两个或多个数据集。一个数据集可以从数据库检索，另一个可以从平面文件检索。使用 `ResultSet`\
  \ 时，这根本不可能实现。使用 `ResultSet` 时，可以通过填充 `ResultSet` 的查询中的 SQL 连接来连接多个数据集。\n\n您还需要了解使用\
  \ `RowSet` 的一些缺点：\n\n*   特定的 `RowSet` 实现可能会在内存中缓存数据。使用此类 `RowSet` 时需要小心。不应使用这些 `RowSet`\
  \ 获取大量数据。否则，可能会降低应用程序的速度。\n*   当对数据源应用更改时，由于 `RowSet` 中缓存了数据，`RowSet` 中的数据与数据源中的数据之间出现数据不一致的可能性更大。\n\
  \n`javax.sql.rowset` 包中的以下接口定义了五种类型的行集：\n\n*   `JdbcRowSet`\n*   `CachedRowSet`\n\
  *   `WebRowSet`\n*   `FilteredRowSet`\n*   `JoinRowSet`\n\n注意\n\n`javax.sql.RowSet`\
  \ 接口位于 `java.sql` 模块中。定义特定类型 `RowSet` 的其他接口（例如 `JdbcRowSet`、`CachedRowSet` 等）位于\
  \ `java.sql.rowset` 模块中。`java.sql.rowset` 模块传递性地读取 `java.sql` 模块。因此，如果您的模块需要使用 `java.sql`\
  \ 和 `java.sql.rowset` 模块中的类型，您的模块只需读取 `java.sql.rowset` 模块即可。\n\n每种类型的行集都具有适合特定需求的功能。所有这些行集接口都直接或间接继承自\
  \ `RowSet` 接口。`RowSet` 接口继承自 `ResultSet` 接口。因此，`ResultSet` 接口中的所有方法在所有类型的行集中也都可用。图\
  \ 5-2 描绘了行集接口的类图。\n\n![A323071_2_En_5_Fig2_HTML.jpg](img/A323071_2_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2.\n\n定义行集的接口的类图\n\n谁提供行集接口的实现类？通常，数据库供应商应提供实现类。他们可以将其作为 JDBC 驱动程序的一部分或作为单独的捆绑包提供。第三方也可以提供行集实现类。作为开发者，您也可以提供行集实现以满足特定需求。\n\
  \n### 创建 RowSet\n\n`RowSetFactory` 接口的实例允许您创建不同类型的 `RowSet`，而无需关心行集实现类。要获取 `RowSetFactory`，您需要使用\
  \ `RowSetProvider` 类的 `newFactory()` 静态方法。`RowSetFactory` 接口有五个方法来创建五种类型的行集。这些方法命名为\
  \ `createXxxRowSet()`，其中 `Xxx` 可以是 `Cached`、`Filtered`、`Jdbc`、`Join` 和 `Web`。例如，您将使用\
  \ `RowSetFactory` 的 `createJdbcRowSet()` 方法来创建 `JdbcRowSet`。以下代码片段展示了如何创建 `JdbcRowSet`：\n\
  \n```\nimport java.sql.SQLException;\nimport javax.sql.rowset.JdbcRowSet;\nimport\
  \ javax.sql.rowset.RowSetFactory;\nimport javax.sql.rowset.RowSetProvider;\n...\n\
  JdbcRowSet jdbcRs = null;\ntry {\n// 获取 RowSetFactory 实现\nRowSetFactory rsFactory\
  \ = RowSetProvider.newFactory();\n// 创建一个 JdbcRowSet 对象\njdbcRs = rsFactory.createJdbcRowSet();\n\
  // 在此处使用 jdbcRs\n} catch (SQLException e) {\ne.printStackTrace();\n} finally {\n\
  if (jdbcRs != null) {\ntry {\n// 关闭 RowSet\njdbcRs.close();\n} catch (SQLException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n```\n\n`RowSetProvider` 类的 `newFactory()`\
  \ 方法按如下方式搜索 `RowSetFactory` 接口的实现类：\n\n*   它查找 `javax.sql.rowset.RowSetFactory`\
  \ 系统属性的值。您可以在命令行中指定此属性值。以下命令在运行 `com.jdojo.jdbc.Test` 类时将此属性值设置为 `com.jdojo.MyRowSetFactoryImpl`\
  \ 类：\n\n    ```\n    java -Djavax.sql.rowset.RowSetFactory=com.jdojo.MyRowSetFactoryImpl\n\
  \    --module-path dist --module jdojo.jdbc/com.jdojo.jdbc.Test\n    ```\n\n*  \
  \ 服务提供者 API 在运行时所有可用的 JAR 中查找 `META-INF/services/javax.sql.rowset.RowSetFactory`\
  \ 下的类名。\n*   它查找 `RowSetFactory` 接口的平台默认实现。\n\n`RowSetProvider` 类还有另一个名为 `newFactory(String\
  \ factoryClassName, ClassLoader cl)` 的静态方法，它允许您指定要使用的 `RowSetFactory` 实现的类名。当运行时存在多个\
  \ `RowSetFactory` 提供者并且您想使用特定的一个时，此方法很有用。假设您创建了一个名为 `com.jdojo.jdbc.MyRowSetFactory`\
  \ 的类，该类实现了 `RowSetFactory` 接口。以下代码片段展示了如何使用此版本的 `newFactory()` 方法来使用您自己的 `RowSetFactory`\
  \ 类实现：\n\n```\nString factoryClassName = \"com.jdojo.jdbc.MyRowSetFactory\";\n//\
  \ 使用 null 作为第二个参数以使用当前线程的上下文类加载器\nRowSetFactory factory = RowSetProvider.newFactory(factoryClassName,\
  \ null);\n// 创建一个 JdbcRowSet\nJdbcRowSet jdbcRs = factory.createJdbcRowSet();\n\
  ```\n\n\n\n#### 设置 RowSet 连接属性\n\n`RowSet` 是一个 JavaBeans 组件。你可以在设计时使用可视化开发工具设置其属性，也可以在运行时设置其属性。通常，`RowSet`\
  \ 需要连接到数据源以检索和更新数据。你可以通过 JDBC URL 或数据源名称来设置 `RowSet` 的数据库连接属性。当你使用 JDBC URL 时，`RowSet`\
  \ 将使用 JDBC 驱动程序连接到向 `DriverManager` 类注册的数据库。你可以按如下方式设置 `RowSet` 对象的 JDBC 连接属性：\n\
  \n```\n// 在此处向 DriverManager 注册 JDBC 驱动程序...\n// 创建一个 RowSet\nRowSet rs = 创建一个 RowSet;\n\
  // 设置 RowSet 的连接属性\nrs.setUrl(\"jdbc:derby:beginningJavaDB\");\nrs.setUsername(\"\
  app\");\nrs.setPassword(\"app\");\n```\n\n你不需要自行建立数据库连接。`RowSet` 会在需要时负责建立连接。\n\n\
  或者，你也可以为 `RowSet` 设置一个数据源名称。它将使用 JNDI 服务查找该数据源名称，以获取用于连接数据库的 `DataSource` 对象。\n\n\
  ```\nRowSet rs = 创建一个 RowSet;\nrs.setDataSourceName(\"jdbc/myTestDB\");\n```\n\n\
  你需要设置数据源名称或 JDBC URL 其中之一。如果两者都设置了，将使用最后设置的非空值来连接数据库。\n\n并非所有 `RowSet` 都需要连接数据库。例如，如果你使用\
  \ `RowSet` 通过网络发送数据，则无需设置其连接属性。但是，如果 `RowSet` 需要与数据库交互，则必须在调用该 `RowSet` 任何需要数据库连接的方法之前设置这些属性。\n\
  \n#### 为 RowSet 设置命令\n\n你在上一节中了解到，使用 `RowSet` 时无需担心 `Connection`。使用 `RowSet` 的好处不止于此。当你使用\
  \ `RowSet` 时，也无需担心 `Statement`、`PreparedStatement` 和 `CallableStatement`。但是，你必须指定一个命令，该命令将为\
  \ `RowSet` 生成结果集。该命令将以 SQL `SELECT` 语句或存储过程调用的字符串形式提供。你可以使用问号作为占位符，表示希望在运行时传递给命令的任何参数。要在运行时设置参数值，你需要使用\
  \ `RowSet` 接口的 `setXxx(int paramIndex, Xxx paramValue)` 方法之一。在 `RowSet` 的命令中使用参数与在\
  \ `PreparedStatement` 中使用参数相同。以下代码片段包含了一些为 `RowSet` 对象设置命令的示例：\n\n```\nRowSet rs\
  \ = 创建一个 RowSet;\n/* 示例 1 */\n// 从 person 表中选择所有行的命令\nString sqlCommand = \"select\
  \ person_id, first_name, last_name from person\";\n// 将命令设置到 RowSet 对象\nrs.setCommand(sqlCommand);\n\
  /* 示例 2 */\n// 从 person 表中选择行的命令，带有两个参数，用于指定收入范围\nString sqlCommand = \"select person_id,\
  \ first_name, last_name, income \" +\n\"from person \" +\n\"where income between\
  \ ? and ?\";\n// 将命令设置到 RowSet 对象\nrs.setCommand(sqlCommand);\n// 设置收入范围在 20000.0\
  \ 和 30000.0 之间\nrs.setDouble(1, 20000.0);\nrs.setDouble(2, 30000.0);\n/* 示例 3 */\n\
  // 执行一个接受两个参数（收入范围）的存储过程的命令。\n// getPersons() 存储过程会产生一个结果集。\nString sqlCommand =\
  \ \"{call getPersons(?, ?)}\";\n// 将命令设置到 RowSet 对象\nrs.setCommand(sqlCommand);\n\
  // 设置收入范围在 20000.0 和 30000.0 之间\nrs.setDouble(1, 20000.0);\nrs.setDouble(2, 30000.0);\n\
  ```\n\n#### 用数据填充 RowSet\n\n可以通过多种方式用数据填充 `RowSet`：\n\n*   执行命令，例如 SQL `SELECT`\
  \ 或存储过程\n*   向其提供一个 `ResultSet`，它将从提供的 `ResultSet` 中读取所有数据\n*   将 XML 数据读入其中\n*\
  \   使用任何其他自定义方法\n\n如果你想通过执行命令来用数据填充 `RowSet`，则需要调用其 `execute()` 方法，如下所示：\n\n```\n\
  // 执行其命令以填充 RowSet\nrs.execute();\n```\n\n执行 `execute()` 方法后，`RowSet` 中就包含了数据，你需要滚动到某一行来读取/更新其列的值。其他填充\
  \ `RowSet` 的方法取决于 `RowSet` 的类型。我将在描述特定类型 `RowSet` 的章节中简要讨论每种类型的一个示例。\n\n#### 滚动遍历\
  \ RowSet 的行\n\n简单来说，`RowSet` 是 `ResultSet` 的一个包装器。它继承了 `ResultSet` 接口中的所有游标移动方法。默认情况下，所有\
  \ `RowSet` 都是双向可滚动和可更新的。但是，请检查你的 `RowSet` 的实现文档，以了解它是否对可滚动性或可更新性施加了任何限制。以下代码片段展示了一个典型的\
  \ `while` 循环，用于滚动遍历所有行并从行中读取某些列的值。这与你一直用来滚动遍历 `ResultSet` 对象的方法相同。\n\n```\nRowSet\
  \ rs = 创建一个 RowSet;\n...\nwhile(rs.next()) {\n// 从当前行读取 person_id 和 first_name 的值\n\
  int personID = rs.getInt(\"person_id\");\nString firstName = rs.getString(\"first_name\"\
  );\n// 在此处执行其他处理\n}\n```\n\n#### 更新 RowSet 中的数据\n\n更新 `RowSet` 中的数据类似于更新 `ResultSet`\
  \ 中的数据。要更新列的值，你需要将游标移动到某一行，使用 `updateXxx()` 方法之一为列设置新值，然后调用 `RowSet` 的 `updateRow()`\
  \ 方法使更改在 `RowSet` 中永久生效。\n\n要插入新行，你需要通过调用 `RowSet` 的 `moveToInsertRow()` 方法将游标移动到插入行。你需要使用\
  \ `updateXxx()` 方法之一为插入行中的列设置值。最后，调用 `RowSet` 的 `insertRow()` 方法。\n\n要删除行，你需要将游标移动到要删除的行，然后调用\
  \ `RowSet` 的 `deleteRow()` 方法。\n\n对 `RowSet` 对象所做的更改如何以及何时传播到数据库，取决于 `RowSet` 的类型。我将在接下来的几节中讨论更新不同类型的\
  \ `RowSet`。\n\n提示\n\n你可以通过调用 `RowSet` 的 `setReadOnly(true)` 方法将其设置为只读。\n\n\n\n####\
  \ RowSetUtil 类\n\n在使用行集（rowset）的示例中，你需要重复使用一些代码，例如提供数据库连接属性、获取 `RowSetFactory` 实例以及打印\
  \ `RowSet` 的行。清单 5-22 包含了本节将使用的 `RowSetUtil` 类的完整代码。其 `setConnectionParameters()`\
  \ 方法为 Derby JDBC 驱动程序设置连接参数。`getRowSetFactory()` 方法返回一个 `RowSetFactory` 实例。`printPersonRecord()`\
  \ 方法用于打印 `RowSet` 中的记录，前提是该 `RowSet` 至少包含 `person` 表中的 `person_id`、`first_name`\
  \ 和 `last_name` 列。\n\n```\n// RowSetUtil.java\npackage com.jdojo.jdbc;\nimport java.sql.SQLException;\n\
  import javax.sql.RowSet;\nimport javax.sql.rowset.RowSetFactory;\nimport javax.sql.rowset.RowSetProvider;\n\
  public class RowSetUtil {\npublic static void setConnectionParameters(RowSet rs)\
  \ throws SQLException {\n// 设置行集的数据库连接属性\nString dbURL = \"jdbc:derby:beginningJavaDB;create=true;\"\
  ;\nString userId = \"app\";\nString password = \"app\";\nrs.setUrl(dbURL);\nrs.setUsername(userId);\n\
  rs.setPassword(password);\n}\npublic static RowSetFactory getRowSetFactory() {\n\
  try {\nRowSetFactory factory = RowSetProvider.newFactory();\nreturn factory;\n}\
  \ catch (SQLException e) {\nthrow new RuntimeException(e);\n}\n}\n// 打印每条人员记录的 ID\
  \ 和姓名\npublic static void printPersonRecord(RowSet rs) throws SQLException {\nwhile\
  \ (rs.next()) {\nint personId = rs.getInt(\"person_id\");\nString firstName = rs.getString(\"\
  first_name\");\nString lastName = rs.getString(\"last_name\");\nSystem.out.println(\"\
  行 #\" + rs.getRow() + \":\"\n+ \" 人员 ID:\" + personId\n+ \", 名:\" + firstName\n\
  + \", 姓:\" + lastName);\n}\nSystem.out.println();\n}\n}\n清单 5-22.\n一个用于辅助处理 RowSet\
  \ 的工具类\n```\n\n#### JdbcRowSet\n\n`JdbcRowSet` 也被称为连接行集，因为它始终保持一个数据库连接。你可以将 `JdbcRowSet`\
  \ 视为 `ResultSet` 的一个轻量级包装器。正如 `ResultSet` 始终维护一个数据库连接一样，`JdbcRowSet` 也是如此。它增加了一些方法，让你可以配置连接行为。你可以使用其\
  \ `setAutoCommit()` 方法来启用或禁用连接的自动提交模式。你可以使用其 `commit()` 和 `rollback()` 方法来提交或回滚对其数据所做的更改。\n\
  \nJDBC 驱动程序或底层数据库可能不支持双向可滚动和可更新的结果集。在这种情况下，`JdbcRowSet` 实现可能会提供此类功能。清单 5-23 使用 `JdbcRowSet`\
  \ 从 `person` 表中读取指定范围内所有 `person_id` 的记录。请注意，代码尝试使用 `RowSet` 的 `last()` 方法来打印检索到的行数。最后，它使用\
  \ `RowSetUtil` 类的 `printPersonRecord()` 方法来打印行集中的记录。\n\n```\n// JdbcRowSetTest.java\n\
  package com.jdojo.jdbc;\nimport java.sql.SQLException;\nimport javax.sql.rowset.JdbcRowSet;\n\
  import javax.sql.rowset.RowSetFactory;\npublic class JdbcRowSetTest {\npublic static\
  \ void main(String[] args) {\nRowSetFactory factory = RowSetUtil.getRowSetFactory();\n\
  // 使用 try-with-resources 块\ntry (JdbcRowSet jdbcRs = factory.createJdbcRowSet())\
  \ {\n// 设置连接参数\nRowSetUtil.setConnectionParameters(jdbcRs);\n// 设置命令和输入参数\nString\
  \ sqlCommand = \"select person_id, first_name, \"\n+ \"last_name from person \"\n\
  + \"where person_id between ? and ?\";\njdbcRs.setCommand(sqlCommand);\njdbcRs.setInt(1,\
  \ 101);\njdbcRs.setInt(2, 301);\n// 检索数据\njdbcRs.execute();\n// 滚动到最后一行以获取行数。如果底层\
  \ JdbcRowSet 实现\n// 不支持双向滚动结果集，则可能抛出异常。\ntry {\njdbcRs.last();\nSystem.out.println(\"\
  行数: \" + jdbcRs.getRow());\n// 将游标定位到第一行之前\njdbcRs.beforeFirst();\n} catch (SQLException\
  \ e) {\nSystem.out.println(\"JdbcRowSet 实现\"\n+ \"仅支持单向滚动\");\n}\n// 打印行集中的记录\n\
  RowSetUtil.printPersonRecord(jdbcRs);\n} catch (SQLException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 5-23.\n使用 JdbcRowSet 从表中读取记录\n```\n\n使用 `JdbcRowSet` 更新数据与使用 `ResultSet`\
  \ 更新数据类似。确保你已适当设置了行集的自动提交模式。对于 `JdbcRowSet`，所有方法都将在 `JdbcRowSet` 对象上使用，而不是在 `ResultSet`\
  \ 上。\n\n清单 5-24 包含了检索一条人员记录并将其收入更新为 65000.00 的完整代码。请注意，你必须在更新列的值之后、滚动到另一行之前调用 `JdbcRowSet`\
  \ 的 `updateRow()` 方法。否则，你的更改将会丢失，就像在 `ResultSet` 中更新数据时丢失一样。对于 `JdbcRowSet`，你无法直接访问\
  \ `Connection` 对象。你需要使用 `JdbcRowSet` 对象的 `commit()` 和 `rollback()` 方法来提交和回滚对数据库的更改。\n\
  \n```\n// JdbcRowSetUpdateTest.java\npackage com.jdojo.jdbc;\nimport java.sql.SQLException;\n\
  import javax.sql.rowset.JdbcRowSet;\nimport javax.sql.rowset.RowSetFactory;\npublic\
  \ class JdbcRowSetUpdateTest {\npublic static void main(String[] args) {\nRowSetFactory\
  \ factory = RowSetUtil.getRowSetFactory();\n// 使用 try-with-resources 块\ntry (JdbcRowSet\
  \ jdbcRs = factory.createJdbcRowSet()) {\n// 设置连接参数\nRowSetUtil.setConnectionParameters(jdbcRs);\n\
  // 将自动提交模式设置为 false\njdbcRs.setAutoCommit(false);\n// 设置命令和输入参数\nString sqlCommand\
  \ = \"select person_id, first_name, \"\n+ \"last_name, income from person \"\n+\
  \ \"where person_id = ?\";\njdbcRs.setCommand(sqlCommand);\njdbcRs.setInt(1, 101);\n\
  // 检索数据\njdbcRs.execute();\n// 如果检索到一行，则将第一行的 income 列更新为 65000.00\nif (jdbcRs.next())\
  \ {\nint personId = jdbcRs.getInt(\"person_id\");\njdbcRs.updateDouble(\"income\"\
  , 65000.00);\njdbcRs.updateRow();\n// 提交更改\njdbcRs.commit();\nSystem.out.println(\"\
  人员 ID=\" + personId + \" 的收入已设置为 \"\n+ \"65000.00\");\n} else {\nSystem.out.println(\"\
  未找到人员记录。\");\n}\n} catch (SQLException e) {\ne.printStackTrace();\n}\n}\n}\n清单 5-24.\n\
  在 JdbcRowSet 中更新数据\n```\n\n\n\n#### CachedRowSet\n\n`CachedRowSet` 也被称为离线行集，因为它在不需要数据库连接时会与数据库断开连接。它仅在需要与数据库交互期间保持数据库连接，一旦操作完成，便会断开连接。例如，它会在需要检索或更新数据时连接到数据库。\n\
  \n它会检索命令生成的所有数据，并将数据缓存在内存中。需要注意不要在 `CachedRowSet` 中检索大量数据，否则可能会降低应用程序的性能。它提供了一项名为分页的新功能，允许你分块处理大量数据。你将在本节中看到一个分页示例。\n\
  \n`CachedRowSet` 始终是可序列化、可滚动和可更新的。你可以将其保存到磁盘或通过网络发送。并非所有 `CachedRowSet` 都需要连接到数据源。例如，你可以在\
  \ `CachedRowSet` 中检索数据，并将其副本发送到另一个应用程序，该应用程序无需数据库连接即可读取/更新 `CachedRowSet` 中的数据。当另一个应用程序完成对\
  \ `CachedRowSet` 的操作后，它可以将更新后的行集发送回服务器。`CachedRowSet` 在另一个应用程序中使用时无需保持数据库连接。你可以使用以下四种方法之一来填充\
  \ `CachedRowSet` 对象中的数据：\n\n*   `void execute() throws SQLException`\n*   `void\
  \ execute(Connection conn) throws SQLException`\n*   `void populate(ResultSet data)\
  \ throws SQLException`\n*   `void populate(ResultSet rs, int startRow) throws SQLException`\n\
  \n如果你已经为 `CachedRowSet` 设置了数据库连接属性，则可以使用 `execute()` 方法。它将使用已设置的连接属性连接到数据库，并执行命令以填充行集数据。`execute()`\
  \ 方法的另一个版本接受一个 `Connection` 对象，该连接将用于填充 `CachedRowSet` 的数据。使用 `populate()` 方法可以用\
  \ `ResultSet` 中的数据填充 `CachedRowSet`。`populate()` 方法的另一个版本接受一个起始行号，从该行开始将 `ResultSet`\
  \ 中的行读取到 `CachedRowSet` 中。\n\n在使用 `CachedRowSet` 的 `populate()` 方法时，需要注意一些限制。此方法使用提供数据的\
  \ `ResultSet`。在将 `ResultSet` 传递给此方法之前，你可能已将游标移动到了特定行。例如，假设在将 `ResultSet` 传递给 `populate()`\
  \ 方法时，游标位于第十行。那么当你调用第一个版本的 `populate()` 方法时会发生什么？它会尝试读取 `ResultSet` 对象中的所有行，还是会从第十一行开始读取数据？当你调用第二个版本的\
  \ `populate()` 方法，并指定从第 5 行开始，而当前行是第 10 行时，又会发生什么？`CachedRowSet` 接口中这些方法的 Java 文档并未提供这些情况下的任何信息。具体细节由实现类决定。但是，如果你只是检索\
  \ `ResultSet` 对象并将其传递给任一版本的 `populate()` 方法，其行为将符合预期。\n\n你可以使用 `size()` 方法获取 `CachedRowSet`\
  \ 中的行数。请注意，对于 `JdbcRowSet`，你需要将游标移动到最后一行，并调用其 `getRow()` 方法来获取其中的行数。由于 `CachedRowSet`\
  \ 将所有行缓存在内存中，因此它可以随时提供所有行的计数。请注意，`size()` 方法不适用于 `JdbcRowSet`。\n\n```\n// 获取 CachedRowSet\
  \ 中的行数\nint rowCount = myCachedRowSet.size();\n```\n\n清单 5-25 演示了如何使用 `CachedRowSet`\
  \ 从数据库检索行。这类似于使用 `JdbcRowSet`，不同之处在于你可以使用其 `size()` 方法来获取检索到的行数。`CachedRowSet` 始终是双向可滚动的。\n\
  \n```\n// CachedRowSetTest.java\npackage com.jdojo.jdbc;\nimport java.sql.SQLException;\n\
  import javax.sql.rowset.CachedRowSet;\nimport javax.sql.rowset.RowSetFactory;\n\
  public class CachedRowSetTest {\npublic static void main(String[] args) {\nRowSetFactory\
  \ factory = RowSetUtil.getRowSetFactory();\n// 使用 try-with-resources 块\ntry (CachedRowSet\
  \ cachedRs = factory.createCachedRowSet()) {\n// 设置连接参数\nRowSetUtil.setConnectionParameters(cachedRs);\n\
  String sqlCommand = \"select person_id, first_name, last_name \"\n+ \"from person\
  \ \"\n+ \"where person_id between 101 and 501\";\ncachedRs.setCommand(sqlCommand);\n\
  cachedRs.execute();\n// 打印缓存行集中的记录\nSystem.out.println(\"行数: \" + cachedRs.size());\n\
  RowSetUtil.printPersonRecord(cachedRs);\n} catch (SQLException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 5-25.\n使用 CachedRowSet 检索数据\n```\n\n`CachedRowSet` 提供了一项名为分页的附加功能，允许你分块检索命令生成的行。一次检索到的行块称为一页。你可以将一页视为一组行，由你决定该组中的行数。一页中的最大行数称为页面大小。`CachedRowSet`\
  \ 允许你通过调用其 `setPageSize(int size)` 方法来设置页面大小。假设 `CachedRowSet` 的命令生成了 500 行。通过调用其\
  \ `setPageSize(90)`，它一次最多将检索 90 行。当你调用其 `execute()` 方法时，它将检索前 90 行。要检索接下来的 90 行，你需要调用其\
  \ `nextPage()` 方法。当它检索完五页（450 行）后，调用 `nextPage()` 将检索剩余的 50 行。它还提供了一个 `previousPage()`\
  \ 方法来检索上一页。你可以使用 `CachedRowSet` 的 `nextPage()` 和 `previousPage()` 方法来分块检索和处理大型结果集。如果还有更多页需要检索，这两个方法都返回\
  \ `true`。否则，它们返回 `false`。通常，在使用分页功能时，你会使用 `do-while` 循环和 `while` 循环。外层的 `do-while`\
  \ 循环用于翻页，内层的 `while` 循环用于遍历当前页中的行。以下代码片段展示了使用分页功能的 `CachedRowSet` 的典型处理逻辑：\n\n```\n\
  CachedRowSet cachedRs = 在此处创建并设置缓存行集的属性;\n// 将页面大小设置为 90\ncachedRs.setPagesize(90);\n\
  // 检索第一页\ncachedRs.execute();\ndo {\n// 处理页面中的每一行\nwhile(cachedRs.next()) {\n//\
  \ 在此处处理一行...\n}\n// 检索下一页的行\n} while (cachedRs.nextPage());\n```\n\n清单 5-26 包含了演示\
  \ `CachedRowSet` 分页功能的完整代码。它使用页面大小 2 一次一页地检索 `person` 表中的所有记录。通常，你不会在程序中检索表中的所有行。`person`\
  \ 表只有几行。我这样做仅出于演示目的，以保持代码更简单和更短。\n\n\n\n```\n// CachedRowSetPagingTest.java\npackage\
  \ com.jdojo.jdbc;\nimport java.sql.SQLException;\nimport javax.sql.rowset.CachedRowSet;\n\
  import javax.sql.rowset.RowSetFactory;\npublic class CachedRowSetPagingTest {\n\
  public static void main(String[] args) {\nRowSetFactory factory = RowSetUtil.getRowSetFactory();\n\
  // 使用 try-with-resources 块\ntry (CachedRowSet cachedRs = factory.createCachedRowSet())\
  \ {\n// 设置连接参数\nRowSetUtil.setConnectionParameters(cachedRs);\n// 设置命令和页面大小\nString\
  \ sqlCommand = \"select person_id, first_name, last_name \"\n+ \"from person\";\n\
  cachedRs.setCommand(sqlCommand);\ncachedRs.setPageSize(2); // 页面大小为 2\n// 执行命令\n\
  cachedRs.execute();\nint pageCounter = 1;\n// 逐页检索并打印人员记录\ndo {\nSystem.out.println(\"\
  第 #\" + pageCounter\n+ \" 页 (行数=\" + cachedRs.size() + \")\");\n// 打印当前页中的记录\nRowSetUtil.printPersonRecord(cachedRs);\n\
  // 页面计数加 1\npageCounter++;\n} while (cachedRs.nextPage());\n} catch (SQLException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 5-26.\n使用 CachedRowSet 的分页功能\n```\n\n\
  您可以更新 `CachedRowSet` 中的数据，并将更改保存回数据库。对于 `CachedRowSet`，将更改保存到数据库的过程与 `JdbcRowSet`\
  \ 不同。有两个主要原因使得 `CachedRowSet` 的保存过程略有不同。首先，它与数据库断开连接，您不希望频繁连接数据库。其次，更新后的数据可能与数据库中存储的数据发生冲突。\n\
  \n在 `CachedRowSet` 中插入、更新和删除行的过程与 `JdbcRowSet` 相同。更改当前行的值后，您需要调用 `updateRow()` 方法。与\
  \ `JdbcRowSet` 不同，当您调用 `updateRow()` 方法时，`CachedRowSet` 不会将更改发送到数据库。您使用 `insertRow()`\
  \ 和 `deleteRow()` 方法的方式与使用 `ResultSet` 或 `JdbcRowSet` 时相同。当与 `CachedRowSet` 一起使用时，这些方法不会将更改发送到数据库。\n\
  \n在对 `CachedRowSet` 进行更改后，您可以通过调用其 `acceptChanges()` 方法将更改发送到数据库。如果您已将 `commit-on-accept-change`\
  \ 值设置为 `true`，则此方法可能会提交更改。您需要参考 `CachedRowSet` 的实现细节，了解如何设置 `commit-on-accept-change`\
  \ 值。如果设置为 `false`，则需要使用 `CachedRowSet` 的 `commit()` 或 `rollback()` 方法来提交或回滚更改。\n\
  \n`CachedRowSet` 必须处理其自身数据与数据库数据之间可能存在的冲突。例如，您可能从数据库中检索了一行，更改了数据，并将更改长时间保留在 `CachedRowSet`\
  \ 中。当您准备保存更改时，另一个用户可能已在您之前更改了同一行的值。`CachedRowSet` 使用同步提供程序对象来与数据库同步更改。它使用另一个对象（同步解析器）来解决在同步过程中检测到的任何冲突。当在\
  \ `acceptChanges()` 方法调用期间检测到冲突时，它会抛出 `SyncProviderException`。您可以使用 `SyncProviderException`\
  \ 对象的 `getSyncResolver()` 方法获取同步解析器对象，该对象是 `SyncResolver` 接口的实例。`SyncResolver` 对象允许您浏览所有冲突，并将存在冲突的行中的值更改为新的已解析值。当检测到冲突时，您需要使用\
  \ `SyncResolver` 对象的 `setResolvedValue()` 方法来设置已解析的值。\n\n清单 5-27 演示了如何更新 `CachedRowSet`。当检测到冲突时，它不会为数据元素设置已解析的值，而只是打印有关冲突的详细信息。\n\
  \n```\n// CachedRowSetUpdateTest.java\npackage com.jdojo.jdbc;\nimport java.sql.SQLException;\n\
  import javax.sql.rowset.CachedRowSet;\nimport javax.sql.rowset.RowSetFactory;\n\
  import javax.sql.rowset.spi.SyncProviderException;\nimport javax.sql.rowset.spi.SyncResolver;\n\
  import static javax.sql.rowset.spi.SyncResolver.DELETE_ROW_CONFLICT;\nimport static\
  \ javax.sql.rowset.spi.SyncResolver.INSERT_ROW_CONFLICT;\nimport static javax.sql.rowset.spi.SyncResolver.UPDATE_ROW_CONFLICT;\n\
  public class CachedRowSetUpdateTest {\npublic static void main(String[] args) throws\
  \ SQLException {\nRowSetFactory factory = RowSetUtil.getRowSetFactory();\nCachedRowSet\
  \ cachedRs = factory.createCachedRowSet();\ntry {\n// 为 CachedRowSet 设置连接参数\nRowSetUtil.setConnectionParameters(cachedRs);\n\
  String sqlCommand = \"select person_id, first_name, last_name, \"\n+ \"gender, dob,\
  \ income \"\n+ \"from person \"\n+ \"where person_id between 101 and 301\";\ncachedRs.setKeyColumns(new\
  \ int[]{1});\ncachedRs.setCommand(sqlCommand);\ncachedRs.execute();\n// 打印缓存行集中的记录\n\
  System.out.println(\"更新前\");\nSystem.out.println(\"行数: \" + cachedRs.size());\n\
  RowSetUtil.printPersonRecord(cachedRs);\n// 将第一行的收入更新为 23000.00\nif (cachedRs.size()\
  \ > 0) {\nupdateRow(cachedRs, 1, 23000.00);\n}\n// 插入新行\ninsertNewRow(cachedRs);\n\
  // 将更改发送到数据库\ncachedRs.acceptChanges();\nSystem.out.println(\"更新后\");\nSystem.out.println(\"\
  行数: \" + cachedRs.size());\ncachedRs.beforeFirst();\nRowSetUtil.printPersonRecord(cachedRs);\n\
  } catch (SyncProviderException spe) {\n// 当 acceptChanges() 检测到冲突时\nSyncResolver\
  \ resolver = spe.getSyncResolver();\n// 打印冲突的详细信息\nprintConflicts(resolver, cachedRs);\n\
  } catch (SQLException e) {\ne.printStackTrace();\n} finally {\nif (cachedRs != null)\
  \ {\ntry {\ncachedRs.close();\n} catch (SQLException e) {\ne.printStackTrace();\n\
  }\n}\n}\n}\npublic static void insertNewRow(CachedRowSet cachedRs) throws SQLException\
  \ {\n// 将光标移动到插入行\ncachedRs.moveToInsertRow();\n// 设置新行中各列的值\ncachedRs.updateInt(\"\
  person_id\", 751);\ncachedRs.updateString(\"first_name\", \"Mason\");\ncachedRs.updateString(\"\
  last_name\", \"Baker\");\ncachedRs.updateString(\"gender\", \"M\");\ncachedRs.updateDate(\"\
  dob\", java.sql.Date.valueOf(\"2006-01-02\"));\ncachedRs.updateDouble(\"income\"\
  , 0.00);\n// 在行集中插入新行。在调用 acceptChanges() 方法之前，\n// 它不会被发送到数据库\ncachedRs.insertRow();\n\
  // 必须移回当前行\ncachedRs.moveToCurrentRow();\n}\npublic static void updateRow(CachedRowSet\
  \ cachedRs, int row, double newIncome)\nthrows SQLException {\n// 设置新行中各列的值\ncachedRs.absolute(row);\n\
  cachedRs.updateDouble(\"income\", newIncome);\ncachedRs.updateRow();\n}\npublic\
  \ static void printConflicts(SyncResolver resolver, CachedRowSet cachedRs) {\ntry\
  \ {\nwhile (resolver.nextConflict()) {\nint status = resolver.getStatus();\nString\
  \ operation = \"无\";\nif (status == INSERT_ROW_CONFLICT) {\noperation = \"插入\";\n\
  } else if (status == UPDATE_ROW_CONFLICT) {\noperation = \"更新\";\n} else if (status\
  \ == DELETE_ROW_CONFLICT) {\noperation = \"删除\";\n}\n// 从数据库获取 person_id\nObject\
  \ oldPersonId = resolver.getConflictValue(\"person_id\");\n// 从缓存行集中获取 person ID\n\
  int row = resolver.getRow();\ncachedRs.absolute(row);\nObject newPersonId = cachedRs.getObject(\"\
  person_id\");\n// 使用 setResolvedValue() 方法为列设置已解析的值\n// resolver.setResolvedValue(columnName,resolvedValue);\n\
  System.out.println(\"在第 #\" + row\n+ \" 行检测到冲突，发生在 \" + operation + \" 操作期间。\"\n\
  + \" 数据库中的 person_id 是 \" + oldPersonId\n+ \"，行集中的 person_id 是 \" + newPersonId);\n\
  }\n} catch (SQLException e) {\ne.printStackTrace();\n}\n}\n}\n清单 5-27.\n更新 CachedRowSet\
  \ 并检测冲突\n```\n\n\n\n#### WebRowSet\n\n`WebRowSet`接口继承自`CachedRowSet`接口。它在`CachedRowSet`的基础上增加了两个功能：\n\
  \n*   从 XML 文档中读取数据和元数据\n*   将数据和元数据导出到 XML 文档\n\n它新增的两个用于提供 XML 支持的方法是`readXML()`和`writeXML()`。这两个方法都有重载形式。它们接受基于流或基于字符的源/目标。使用`readXML()`方法从源（`java.io.InputStream`或`java.io.Reader`）读取\
  \ XML 数据、属性和元数据到`WebRowSet`中，使用`writeXML()`方法将`WebRowSet`对象中的数据、属性和元数据写入目标，该目标可以是`java.io.OutputStream`或`java.io.Writer`。以下代码片段展示了如何将`WebRowSet`的内容和属性导出为字符串：\n\
  \n```\nWebRowSet webRs = get a web rowset with data...;\n// 创建一个 StringWriter 对象来保存导出的\
  \ XML\nStringWriter sw = new StringWriter();\n// 将 webRs 的 XML 表示写入 sw\nwebRs.writeXml(sw);\n\
  // 从 sw 获取 String 对象\nString webRsXML = sw.toString();\n```\n\n此时，`webRsXML`包含了`webRs`对象的\
  \ XML 表示。你可以将其传递给应用程序的另一个模块，在那里你可以重新创建具有相同数据、属性和元数据的`WebRowSet`。以下代码片段展示了如何将 XML\
  \ 文档导入到`WebRowSet`中：\n\n```\n// 从 XML 字符串创建一个 StringReader 对象\nStringReader sr =\
  \ new StringReader(webRsXML);\n// 创建一个空的 WebRowSet 对象\nRowSetFactory factory = RowSetUtil.getRowSetFactory();\n\
  WebRowSet newWebRs = factory.createWebRowSet();\n// 将 XML 内容导入（或读取）到新的空 WebRowSet\
  \ 中\nnewWebRs.readXml(sr);\n```\n\n此时，`webRs`和`newWebRs`处于相同状态。`WebRowSet`可以轻松地将其内容导出为\
  \ XML，并将 XML 文档导入其中。你可以使用这些过程来获取 XML 文档并将其发送到另一个应用程序，该应用程序不需要与数据库建立 JDBC 连接。当另一个应用程序完成对`WebRowSet`的修改后，它可以将其导出为\
  \ XML 文档，并传递给另一个具有 JDBC 连接的应用程序，以便将更改与数据库同步。\n\n从`WebRowSet`导出的 XML 包含三组信息：属性、元数据和数据。属性指的是为行集设置的属性。元数据包含有关行集中列的信息，例如列数、列名、列数据类型等。XML\
  \ 中的数据部分包含行集中的原始数据和更改后的数据。\n\n清单 5-28 演示了如何将`WebRowSet`对象导出为 XML。你将在该清单的输出中找到三个元素：`<properties>`、`<metadata>`和`<data>`。该程序更改了行集中检索到的第一行的姓氏。你可能会注意到，行集会跟踪其数据中所做的更改，如第一行存在`<updateRow>`元素所示。由于输出内容较大，此处省略。\n\
  \n```\n// WebRowSetXMLTest.java\npackage com.jdojo.jdbc;\nimport java.io.StringWriter;\n\
  import java.sql.SQLException;\nimport javax.sql.rowset.RowSetFactory;\nimport javax.sql.rowset.WebRowSet;\n\
  public class WebRowSetXMLTest {\npublic static void main(String[] args) {\nRowSetFactory\
  \ factory = RowSetUtil.getRowSetFactory();\n// 使用 try-with-resources 块\ntry (WebRowSet\
  \ webRs = factory.createWebRowSet()) {\n// 设置 WebRowSet 的连接参数\nRowSetUtil.setConnectionParameters(webRs);\n\
  String sqlCommand = \"select person_id, first_name, last_name \"\n+ \"from person\
  \ \"\n+ \"where person_id between ? and ?\";\nwebRs.setCommand(sqlCommand);\nwebRs.setInt(1,\
  \ 101);\nwebRs.setInt(2, 102);\nwebRs.execute();\n// 更改第一条记录的姓氏\nif (webRs.first())\
  \ {\nwebRs.updateString(\"last_name\", \"Who knows?\");\n}\n// 获取 WebRowSet 的 XML\
  \ 表示\nStringWriter sw = new StringWriter();\nwebRs.writeXml(sw);\nString webRsXML\
  \ = sw.toString();\n// 打印从 WebRowSet 导出的 XML\nSystem.out.println(webRsXML);\n} catch\
  \ (SQLException e) {\ne.printStackTrace();\n}\n}\n}\n清单 5-28.\n将 WebRowSet 的状态导出为\
  \ XML 文档\n```\n\n谁来决定`WebRowSet`实现应理解的 XML 格式？如果所有`WebRowSet`实现都使用不同的 XML 格式，那么使用一种实现从`WebRowSet`导出的\
  \ XML 将无法导入到使用另一种实现的`WebRowSet`对象中。为了避免这种可移植性问题，Oracle 为标准`WebRowSet` XML 的格式提供了一个\
  \ XML 模式。该模式可在[`http://java.sun.com/xml/ns/jdbc/webrowset.xsd`](http://java.sun.com/xml/ns/jdbc/webrowset.xsd)获取。标准的`WebRowSet`实现应使用此模式来导出和导入`WebRowSet`实现，以确保与其他实现的可移植性。\n\
  \n\n\n#### FilteredRowSet\n\n`FilteredRowSet` 接口继承自 `WebRowSet` 接口。它在客户端为行集提供过滤功能。你可以通过在\
  \ SQL 命令中使用 `WHERE` 子句（该命令在数据库中执行）来对行集应用过滤器。`FilteredRowSet` 允许你在从数据库检索数据后，对行集中的行进行过滤。你可以将\
  \ `FilteredRowSet` 视为一个行集，它允许你根据一组条件（称为过滤器）来查看其中的行。为行集设置过滤器并不会从行集中删除行，而是只允许你访问那些满足过滤条件的行。该过滤器同样适用于对行集中的行进行插入、更新和删除操作。你只能读取、插入、更新和删除满足过滤条件的行。你可以随时重置过滤器，以查看行集中的所有行。过滤器是实现\
  \ `javax.sql.rowset.Predicate` 接口的类的对象。该接口包含以下方法：\n\n*   `boolean evaluate(RowSet\
  \ rs)`\n*   `boolean evaluate(Object value, int colIndex) throws SQLException`\n\
  *   `boolean evaluate(Object value, String colName) throws SQLException`\n\n如果某行的\
  \ `evaluate()` 方法返回 `true`，则该行可见。否则，它将被过滤掉，你无法访问它。所有三个版本的 `evaluate()` 方法都在内部被调用。Oracle\
  \ 提供的行集参考实现并未提供 `Predicate` 接口的实现。我将在本节中讨论 `Predicate` 接口的一种实现。\n\n`FilteredRowSet`\
  \ 接口新增了两个方法，一个用于设置过滤器，一个用于获取过滤器：\n\n*   `Predicate getFilter()`\n*   `void setFilter(Predicate\
  \ filter) throws SQLException`\n\n`setFilter()` 方法为行集设置一个过滤器。将 `null` 设置为过滤器会重置（或移除）`FilteredRowSet`\
  \ 上的过滤器，并使所有行都可访问。你可以按如下方式为 `FilteredRowSet` 设置过滤器：\n\n```\n// 创建一个 FilteredRowSet\n\
  FilteredRowSet filteredRs = 创建一个过滤后的行集;\n// 设置属性并检索行集中的数据\n// 创建一个过滤器\nPredicate\
  \ filter = 创建一个过滤器对象;\n// 设置过滤器\nfilteredRs.setFilter(filter);\n// 在此处处理过滤后的行集\n\
  // 移除过滤器\nfilteredRs.setFilter(null);\n```\n\n清单 5-29 包含实现范围过滤器的代码。它基于一个数值列的范围。\n\
  \n```\n// RangeFilter.java\npackage com.jdojo.jdbc;\nimport java.sql.SQLException;\n\
  import javax.sql.RowSet;\nimport javax.sql.rowset.Predicate;\npublic class RangeFilter\
  \ implements Predicate {\nprivate final int columnIndex;\nprivate final String columnName;\n\
  private final double min;\nprivate final double max;\npublic RangeFilter(int columnIndex,\
  \ String columnName, double min, double max) {\nthis.columnIndex = columnIndex;\n\
  this.columnName = columnName;\nthis.min = min;\nthis.max = max;\n}\n@Override\n\
  public boolean evaluate(RowSet rs) {\n// 确保有有效的行号进行评估\ntry {\nif (rs.getRow() =\
  \ min && num = min && num = min && num <= max);\n}\nreturn showRow;\n}\n}\n清单 5-29.\n\
  Predicate 接口的一种实现\n```\n\n假设 `person_id` 是你的行集中的第一列，并且你只想查看 `person_id` 在 101 到\
  \ 501 之间的行。你可以使用 `RangeFilter` 类的对象为行集设置过滤器，如下所示：\n\n```\nFilteredRowSet filteredRs\
  \ = 获取一个过滤后的行集...;\nPredicate filter = new RangeFilter(1, \"person_id\", 101, 501);\n\
  filteredRs.setFilter(filter);\n```\n\n`RangeFilter` 类是 `Predicate` 接口的一个简单实现。你需要一个更复杂的实现，以便在生产环境中使用。例如，你可能允许基于多个列的过滤条件。\n\
  \n清单 5-30 演示了如何使用 `FilteredRowSet`。该程序的输出将取决于 `person` 表中的数据。`FilteredRowSet` 并不能替代在\
  \ SQL `SELECT` 中使用过滤器（使用 `WHERE` 子句）。你不应该在 `FilteredRowSet` 中检索大量行然后设置过滤器，这可能会降低应用程序性能。你应该在程序中获得一个断开连接（或缓存）的行集，并且无法控制其检索过程时使用它。如果你的\
  \ `FilteredRowSet` 不表示数据库表中的行（例如，你正在从平面文件检索数据），它也非常有用。\n\n```\n// FilteredRowSetTest.java\n\
  package com.jdojo.jdbc;\nimport java.sql.SQLException;\nimport javax.sql.rowset.Predicate;\n\
  import javax.sql.rowset.FilteredRowSet;\nimport javax.sql.rowset.RowSetFactory;\n\
  public class FilteredRowSetTest {\npublic static void main(String[] args) {\nRowSetFactory\
  \ factory = RowSetUtil.getRowSetFactory();\n// 使用 try-with-resources 块\ntry (FilteredRowSet\
  \ filteredRs = factory.createFilteredRowSet()) {\n// 设置连接参数\nRowSetUtil.setConnectionParameters(filteredRs);\n\
  // 准备、设置并执行命令\nString sqlCommand = \"select person_id, first_name, last_name from\
  \ person\";\nfilteredRs.setCommand(sqlCommand);\nfilteredRs.execute();\n// 打印检索到的记录\n\
  System.out.println(\"过滤前 - 行数: \" + filteredRs.size());\nRowSetUtil.printPersonRecord(filteredRs);\n\
  // 设置一个过滤器\nPredicate filter = new RangeFilter(1, \"person_id\", 101, 102);\nfilteredRs.setFilter(filter);\n\
  // 打印检索到的记录\nSystem.out.println(\"过滤后 - 行数: \" + filteredRs.size());\nfilteredRs.beforeFirst();\n\
  RowSetUtil.printPersonRecord(filteredRs);\n} catch (SQLException e) {\ne.printStackTrace();\n\
  }\n}\n}\n清单 5-30.\n使用 FilteredRowSet\n```\n\n\n\n#### JoinRowSet\n\n`JoinRowSet`\
  \ 接口继承自 `WebRowSet` 接口。它提供了将两个或多个断开连接的行集合并（或连接）成一个行集的能力。在查询中，使用 SQL `JOIN` 将两个或多个表中的行连接起来。`JoinRowSet`\
  \ 允许你在两个或多个行集之间实现 SQL `JOIN`，而无需在查询中使用 SQL `JOIN`。\n\n使用 `JoinRowSet` 很简单。你可以在多个行集中检索数据：`CachedRowSet`、`WebRowSet`\
  \ 或 `FilteredRowSet`。创建一个空的 `JoinRowSet`，并通过调用其 `addRowSet()` 方法将所有行集添加到其中。添加到 `JoinRowSet`\
  \ 的第一个行集将成为建立连接时的参考行集。你可以在行集中单独指定 `JOIN` 列，也可以在将行集添加到 `JoinRowSet` 时指定。\n\nSQL `JOIN`\
  \ 有五种标准类型：\n\n*   `INNER_JOIN`\n*   `LEFT_OUTER_JOIN`\n*   `RIGHT_OUTER_JOIN`\n\
  *   `FULL_JOIN`\n*   `CROSS_JOIN`\n\n`JoinRowSet` 允许你在行集之间建立上述所有 SQL `JOIN`。除了 `CROSS_JOIN`（它返回行集中行的笛卡尔积）之外，所有其他连接都基于连接行集中的匹配列。有两种指定匹配列的方法：\n\
  \n*   如果参与 `JOIN` 的行集实现了 `Joinable` 接口，你可以使用其 `setMatchColumn()` 方法之一来指定 `JOIN`\
  \ 列。`Joinable` 接口定义了多个版本的 `setMatchColumn()` 方法以及其他用于处理 `JOIN` 列的方法。\n*   你可以在将行集添加到\
  \ `JoinRowSet` 时，使用其 `addRowSet()` 方法之一来设置 `JOIN` 列。\n\n`JoinRowSet` 接口的实现可能不支持所有五种\
  \ `JOIN` 类型。你可以使用 `JoinRowSet` 接口的以下五种方法来检查某个实现是否支持特定的 SQL `JOIN` 类型：\n\n*   `boolean\
  \ supportsInnerJoin()`\n*   `boolean supportsLeftOuterJoin()`\n*   `boolean supportsRightOuterJoin()`\n\
  *   `boolean supportsFullJoin()`\n*   `boolean supportsCrossJoin()`\n\n你可以使用 `JoinRowSet`\
  \ 的 `setJoinType()` 方法指定 `JOIN` 类型，该方法接受五个 `JOIN` 常量之一：`INNER_JOIN`、`LEFT_OUTER_JOIN`、`RIGHT_OUTER_JOIN`、`FULL_JOIN`\
  \ 和 `CROSS_JOIN`。默认情况下，它使用 `INNER_JOIN`，该类型基于匹配列的相等性。\n\n你至少需要两个行集才能使用 `JoinRowSet`。让一个\
  \ `JoinRowSet` 只保存来自一个行集的行是没有意义的。它的名称 `\"Join\"` 本身就暗示它代表了至少两个行集之间的 `JOIN`。连接行集中列的名称或索引不必相同。连接列的数据类型也不必相同。但是，数据类型必须使得它们的值可以进行比较。\n\
  \n在前面的示例中，你只使用了 `person` 表。你仍然可以只使用一个表，基于 `person_id` 列形成 SQL `JOIN`。你的第一个行集将从 `person`\
  \ 表中选择 `person_id` 和 `first_name`。第二个行集将从 `person` 表中选择 `person_id` 和 `last_name`。你将使用\
  \ `INNER_JOIN`（这是 `JoinRowSet` 的默认连接类型）基于 `person_id` 连接这两个行集。清单 5-31 展示了如何使用 `JoinRowSet`\
  \ 实现这一点。\n\n```\n// JoinRowSetTest.java\npackage com.jdojo.jdbc;\nimport java.sql.SQLException;\n\
  import javax.sql.rowset.CachedRowSet;\nimport javax.sql.rowset.JoinRowSet;\nimport\
  \ javax.sql.rowset.RowSetFactory;\npublic class JoinRowSetTest {\npublic static\
  \ void main(String[] args) {\nRowSetFactory factory = RowSetUtil.getRowSetFactory();\n\
  // 使用 try-with-resources 块\ntry (CachedRowSet cachedRs1 = factory.createCachedRowSet();\n\
  CachedRowSet cachedRs2 = factory.createCachedRowSet();\nJoinRowSet joinRs = factory.createJoinRowSet())\
  \ {\n// 设置连接参数\nRowSetUtil.setConnectionParameters(cachedRs1);\nRowSetUtil.setConnectionParameters(cachedRs2);\n\
  String sqlCommand1 = \"select person_id, first_name \"\n+ \"from person \"\n+ \"\
  where person_id in (101, 102)\";\nString sqlCommand2 = \"select person_id, last_name\
  \ \"\n+ \"from person \"\n+ \"where person_id in (101, 102, 103)\";\ncachedRs1.setCommand(sqlCommand1);\n\
  cachedRs2.setCommand(sqlCommand2);\ncachedRs1.execute();\ncachedRs2.execute();\n\
  // 为 cachedRs1 和 cachedRs2 创建一个 JoinRowSet\n// 基于 person_id 列连接它们\njoinRs.addRowSet(cachedRs1,\
  \ \"person_id\");\njoinRs.addRowSet(cachedRs2, \"person_id\");\nSystem.out.println(\"\
  行数: \" + joinRs.size());\nRowSetUtil.printPersonRecord(joinRs);\n} catch (SQLException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n清单 5-31.\n使用 JoinRowSet 建立 SQL JOIN\n```\n\
  \n你只能将非空行集添加到 `JoinRowSet`。向 `JoinRowSet` 添加空行集会抛出 `SQLException`。`JoinRowSet` 可以基于多个列实现\
  \ SQL `JOIN`。添加到 `JoinRowSet` 的行集数量没有限制。但是，应注意不要向 `JoinRowSet` 添加太多包含大量行的行集。这可能会因为需要对大量行执行\
  \ `JOIN` 操作而降低应用程序的速度。\n\n`JoinRowSet` 的 `toCachedRowSet()` 方法返回一个 `CachedRowSet`，该对象表示基于\
  \ `JoinRowSet` 中建立的 `JOIN` 的行。返回的 `CachedRowSet` 不包含通过 `JoinRowSet` 对数据所做的任何更改。你可以像使用\
  \ `CachedRowSet` 一样，对 `JoinRowSet` 中的数据进行修改，并将更改应用回数据库。在调用 `acceptChanges()` 方法之前，请确保为\
  \ `JoinRowSet` 设置了必需的属性。例如，你需要设置其数据库连接属性、命令等，以便它拥有将更改应用到数据库所需的信息。\n\n\n\n## 处理大对象\
  \ (LOB)\n\nJDBC API 支持处理存储在数据库中的大对象。大对象的类型可以是以下之一。\n\n*   二进制大对象 (Blob)\n*   字符大对象\
  \ (Clob)\n*   国家字符大对象 (NClob)\n\nLOB 列的数据通常不直接存储在数据库表中。数据库会将 LOB 的数据存储在别处，而在表中仅存储一个指向该数据位置的引用（或指针）。存储在表中的\
  \ LOB 引用也称为定位器。LOB 列的数据是与表一起存储还是存储在别处，由 DBMS 根据某些标准决定。例如，DBMS 可能决定：如果 LOB 的大小小于\
  \ 10KB，则将其存储在表中；如果它变得更大，则将其存储在别处，而表中仅存储一个定位器。当你检索 LOB 类型列的数据时，JDBC 驱动程序通常只检索该 LOB\
  \ 的定位器。当你需要实际数据时，需要对定位器执行更多操作来获取数据。通常，LOB 的定位器包含比单纯指向实际数据的指针更多的信息，例如它知道数据的长度。\n\n\
  `Blob` 用于存储二进制数据。`Clob` 用于存储字符数据。`NClob` 用于存储 Unicode 字符数据。请查阅你的 DBMS 文档，了解其用于 `Blob`、`Clob`\
  \ 和 `NClob` 类型 LOB 的数据类型名称。Oracle DBMS 使用与 `Blob`、`Clob` 和 `NClob` 相同的名称作为可用于定义表列的数据类型。JDBC\
  \ API 允许你分别使用 `java.sql.Blob`、`java.sql.Clob` 和 `java.sql.NClob` 接口来处理 `Blob`、`Clob`\
  \ 和 `NClob` 数据类型。\n\n你将通过一个使用 `Blob` 和 `Clob` 数据类型的示例来学习。该示例将使用 Derby 数据库。Derby\
  \ 分别通过其 Blob 和 Clob 数据库数据类型支持 LOB 的 Blob 和 NClob 类型。\n\n让我们创建一个名为 `person_detail`\
  \ 的表，该表用于将个人的图片存储为 Blob，并将其纯文本简历存储在 Clob 列中。以下是在 Derby 中创建该表的脚本：\n\n```\ncreate\
  \ table person_detail (\nperson_detail_id integer not null,\nperson_id integer not\
  \ null,\npicture blob,\nresume clob,\nprimary key (person_detail_id),\nforeign key\
  \ (person_id) references person(person_id)\n);\n```\n\n假设 `JDBCUtil.getConnection()`\
  \ 方法已配置为返回一个连接到 Derby 数据库的 `Connection` 对象，你可以运行清单 5-32 中的程序来在 Derby 中创建 `person_detail`\
  \ 表。如果你使用的不是 Derby 数据库，请修改清单 5-32 中程序的 `CREATE TABLE` 脚本，以匹配你数据库的语法。\n\n```\n//\
  \ CreatePersonDetailTable.java\npackage com.jdojo.jdbc;\nimport java.sql.Connection;\n\
  import java.sql.SQLException;\nimport java.sql.Statement;\npublic class CreatePersonDetailTable\
  \ {\npublic static void main(String[] args) {\nConnection conn = null;\ntry {\n\
  conn = JDBCUtil.getConnection();\n// 创建 SQL 字符串\nString SQL = \"create table person_detail(\
  \ \"\n+ \"person_detail_id integer not null, \"\n+ \"person_id integer not null,\
  \ \"\n+ \"picture blob, \"\n+ \"resume clob, \"\n+ \"primary key (person_detail_id),\
  \ \"\n+ \"foreign key (person_id) references person(person_id))\";\nStatement stmt\
  \ = null;\ntry {\nstmt = conn.createStatement();\nstmt.executeUpdate(SQL);\n} finally\
  \ {\nJDBCUtil.closeStatement(stmt);\n}\n// 提交事务\nJDBCUtil.commit(conn);\nSystem.out.println(\"\
  person_detail 表创建成功。\");\n} catch (SQLException e) {\nSystem.out.println(e.getMessage());\n\
  JDBCUtil.rollback(conn);\n} finally {\nJDBCUtil.closeConnection(conn);\n}\n}\n}\n\
  清单 5-32.\n在 Apache Derby 中创建 person_detail 表\n```\n\n### 检索 LOB 数据\n\n你可以分别使用 `ResultSet`\
  \ 接口的 `getBlob()`、`getClob()` 和 `getNClob()` 方法从结果集中检索 Blob、Clob 和 NClob 列的数据。这些方法分别返回\
  \ `java.sql.Blob`、`java.sql.Clob` 和 `java.sql.NClob` 接口的对象。这些接口包含许多方法，允许你查询 LOB\
  \ 对象并操作它们所代表的数据。以下代码片段从 `person_detail` 表中读取 `person_detail_id` 等于 1001 的行：\n\n\
  ```\nConnection conn = JDBCUtil.getConnection();\nString SQL = \"select person_id,\
  \ picture, resume \" +\n\"from person_detail \" +\n\"where person_detail_id = ?\"\
  ;\nPreparedStatement pstmt = null;\npstmt = conn.prepareStatement(SQL);\npstmt.setInt(1,\
  \ 1001);\nResultSet rs = pstmt.executeQuery();\nwhile(rs.next()) {\nint personId\
  \ = rs.getInt(\"person_id\");\nBlob pictureBlob = rs.getBlob(\"picture\");\nClob\
  \ resumeClob = rs.getClob(\"resume\");\n}\n```\n\n从 `ResultSet` 获取 `Blob` 或 `Clob`\
  \ 对象后，你需要读取数据。`Blob` 和 `Clob` 接口包含一个 `length()` 方法，该方法返回 `Blob` 对象中的字节数以及 `Clob`\
  \ 对象中的字符数。`NClob` 接口继承自 `Clob` 接口。关于 `Clob` 接口的讨论也适用于 `NClob` 接口。如果你想将 `Blob` 的数据读入字节数组，并将\
  \ `Clob` 的数据读入 `String` 对象，可以按以下方式操作。请注意，`Blob` 和 `Clob` 接口的 `length()` 方法返回一个 `long`\
  \ 值。\n\n```\n// 将图片读入字节数组\nint pictureLength = (int) pictureBlob.length();\nbyte[]\
  \ pictureData = pictureBlob.getBytes(1, pictureLength);\n// 将简历读入字符串\nint resumeLength\
  \ = (int) resumeClob.length();\nString resume = resumeClob.getSubString(1, resumeLength);\n\
  ```\n\n在 `Blob` 接口的 `getBytes(int start, int length)` 方法中，第一个参数是你想要开始读取的 `Blob`\
  \ 中字节的起始位置，第二个参数是你想要读取的字节数。`Blob` 中第一个字节的位置是 1，而不是 0。类似地，`Clob` 接口的 `getSubString(int\
  \ start, int length)` 方法接受 `Clob` 中字符的起始位置和要返回的字符数。`Clob` 中第一个字符的位置是 1，而不是 0。\n\n\
  提示\n\n在 JDBC 程序中，任何上下文中使用起始位置时都要小心。在 JDBC API 中，索引从 1 开始；而在 Java 的其他部分（如数组）中，索引从\
  \ 0 开始。\n\n大多数情况下，你不会将 `Blob` 和 `Clob` 的数据读入数组或 `String` 对象。它们可能包含大量数据。`Blob` 和\
  \ `Clob` 接口允许你分别使用 `InputStream` 和 `Reader` 分块读取它们的数据。通常，你会从 `Blob` 和 `Clob` 对象中读取数据，并将其存储到磁盘上的文件中。操作方式如下。`Blob`\
  \ 接口包含一个 `getBinaryStream()` 方法，该方法返回一个 `InputStream`。你可以使用该 `InputStream` 读取 `Blob`\
  \ 中包含的数据。类似地，`Clob` 接口包含一个 `getCharacterStream()` 方法，该方法返回一个 `Reader`。你可以使用该 `Reader`\
  \ 读取 `Clob` 中包含的字符。\n\n```\n// 读取图片数据并保存到文件\nString pictureFilePath = \"c:\\\\mypicture.bmp\"\
  ;\nFileOutputStream fos = new FileOutputStream(pictureFilePath);\nInputStream in\
  \ = pictureBlob.getBinaryStream();\nint b = -1;\nwhile((b = in.read()) != -1) {\n\
  fos.write((byte)b);\n}\nfos.close();\n// 读取简历数据并保存到文件\nString resumeFilePath = \"\
  c:\\\\myresume.txt\";\nFileWriter fw = new FileWriter(resumeFilePath);\nReader reader\
  \ = resumeClob.getCharacterStream();\nint b = -1;\nwhile((b = reader.read()) !=\
  \ -1) {\nfw.write((char)b);\n}\nfw.close();\n```\n\n\n\n### 创建 LOB 数据\n\n在上一节中，你学习了如何将数据库中的\
  \ LOB 数据读取到 Java 程序中。在本节中，你将学习如何在 Java 程序中创建 LOB，并将 LOB 数据发送到数据库，以将其存储在表的列中。`Connection`\
  \ 接口包含三个用于创建 LOB 的方法：\n\n*   `Blob createBlob() throws SQLException`\n*   `Clob\
  \ createClob() throws SQLException`\n*   `NClob createNClob() throws SQLException`\n\
  \n你可以使用其中一个方法来创建特定类型的空 LOB。例如，要在数据库中存储图片和简历，你可以按如下方式创建 `Blob` 和 `Clob`：\n\n```\n\
  Connection conn = JDBCUtil.getConnection();\nBlob pictureBlob = conn.createBlob();\n\
  Clob resumeClob = conn.createClob();\n```\n\n一旦你获得了 `Blob` 和 `Clob`，有两种方式可以向它们写入数据。你可以使用\
  \ `Blob` 的 `setBytes()` 方法向其写入数据，该方法接受你希望写入的 `Blob` 中的位置，以及字节数组形式的数据。你也可以使用 `OutputStream`\
  \ 向 `Blob` 写入数据。你需要调用其 `setBinaryStream()` 方法，该方法接受写入数据的起始位置，并返回一个 `OutputStream`。你需要使用该\
  \ `OutputStream` 向 `Blob` 写入数据。以下是这两个方法的签名：\n\n*   `int setBytes(long pos, byte[]\
  \ bytes) throws SQLException`\n*   `OutputStream setBinaryStream(long pos) throws\
  \ SQLException`\n\n以下代码片段展示了如何向 `Blob` 写入数据。它从一个存储图片的文件中读取数据，并将所有字节写入一个 `Blob`。`while`\
  \ 循环每次从文件中读取一个字节，以使代码简单易读。在实际程序中，你会一次读取和写入更大的数据块。\n\n```\n// 获取 Blob 对象的输出流，用于将图片数据写入其中。\n\
  int startPosition = 1; // 从开头开始写入\nOutputStream out = pictureBlob.setBinaryStream(startPosition);\n\
  // 准备从文件读取\nString picturePath = \"picture.jpg\";\nFileInputStream fis = new FileInputStream(picturePath);\n\
  // 从文件读取并写入 Blob 对象\nint b = -1;\nwhile ((b = fis.read()) != -1) {\nout.write(b);\n\
  }\nfis.close();\nout.close();\n```\n\n`Clob` 接口提供了以下三种向 `Clob` 对象写入数据的方法：\n\n* \
  \  `int setString(long pos, String str) throws SQLException`\n*   `int setString(long\
  \ pos, String str, int offset, int len) throws SQLException`\n*   `Writer setCharacterStream(long\
  \ pos) throws SQLException`\n\n`setString()` 方法允许你在指定位置向其中写入一个 `String`。`setString()`\
  \ 方法的第二个版本允许你指定源字符串中开始读取的偏移量，以及要从源字符串中读取的字符数。`setCharacterStream()` 方法返回一个 `Writer`，你可以使用它以\
  \ Unicode 字符向 `Clob` 写入数据。`Clob` 接口还包含一个 `setAsciiStream()` 方法，该方法返回一个 `OutputStream`，你可以使用它来写入\
  \ ASCII 编码的字符。\n\n以下代码片段展示了如何向 `Clob` 写入数据。它从一个存储文本格式简历的文件中读取数据，并将所有字符写入一个 `Clob`。`while`\
  \ 循环每次从文件中读取一个字符，以使代码简单易读。在实际程序中，你会一次读取和写入更大的字符块。\n\n```\n// 获取 Clob 对象的字符输出流，用于将简历数据写入其中。\n\
  int startPosition = 1; // 从开头开始写入\nWriter writer = resumeClob.setCharacterStream(startPosition);\n\
  // 准备从文件读取\nString resumePath = \"resume.txt\";\nFileReader fr = new FileReader(resumePath);\n\
  // 从文件读取并写入 Clob 对象\nint b = -1;\nwhile ((b = fr.read()) != -1) {\nwriter.write(b);\n\
  }\nfr.close();\nwriter.close();\n```\n\n最后，是将 LOB 数据写入数据库的时候了。你可以使用 `PreparedStatement`\
  \ 接口的 `setBlob()` 和 `setClob()` 方法来设置 `Blob` 和 `Clob` 数据，如下所示：\n\n```\nConnection\
  \ conn = JDBCUtil.getConnection();\nString sql = \"insert into person_detail \"\
  \ +\n\"(person_detail_id, person_id, picture, resume) \" +\n\"values \" +\n\"(?,\
  \ ?, ?, ?)\";\nPreparedStatement pstmt = conn.prepareStatement(sql);\npstmt.setInt(1,\
  \ 1);   // 设置 person_detail_id\npstmt.setInt(2, 101); // 设置 person_id\nBlob pictureBlob\
  \ = conn.createBlob();\n// 在此处向 pictureBlob 对象写入数据\npstmt.setBlob(3, pictureBlob);\n\
  Clob resumeClob = conn.createClob();\n// 在此处向 resumeClob 对象写入数据\npstmt.setClob(4,\
  \ resumeClob);\n// 将记录插入数据库\npstmt.executeUpdate();\n```\n\n`ResultSet` 接口也包含 `updateBlob()`\
  \ 和 `updateClob()` 方法，你可以使用它们通过 `ResultSet` 更新 `Blob` 和 `Clob` 对象。`Blob` 和 `Clob`\
  \ 对象可能需要大量资源。使用完它们后，你需要通过调用它们的 `free()` 方法来释放它们所持有的资源。\n\n提示\n\n在 `PreparedStatement`\
  \ 中设置 `Blob` 对象数据的另一种方法是使用其 `setBinaryStream()` 和 `setObject()` 方法。在 `PreparedStatement`\
  \ 中设置 `Clob` 对象数据的另一种方法是使用其 `setAsciiStream()`、`setCharacterStream()` 或 `setObject()`\
  \ 方法。\n\n清单 5-33 包含了完整的代码，展示了如何在包含 `Blob` 和 `Clob` 列的表中插入一条记录。该代码已在 Derby 中测试通过。它从名为\
