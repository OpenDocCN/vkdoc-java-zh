  \        System.out.println(\"增量后的数字数组: \" + Arrays.toString(incrementedNum));\n\
  \    }\n}\n清单 7-10.\n在原生代码中访问和操作数组的示例\n```\n\n`sum()` 原生方法接受一个 `int` 数组，并返回其所有元素的总和（类型为\
