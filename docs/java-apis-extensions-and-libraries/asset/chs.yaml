  \n图 9-8.\n\n使用 Nashorn 脚本的最简单 JavaFX 应用程序\n\n```\nC:\\Java9APIsAndModules>jjs -fx\
  \ scripts/simplestfxapp.js\n```\n\n\n\n## 摘要\n\n脚本语言是一种编程语言，它使你能够编写由称为脚本引擎（或解释器）的运行时环境评估（或解释）的脚本。脚本是使用脚本语言的语法编写的一系列字符，并作为由解释器执行的程序的源代码。Java\
  \ 脚本 API 允许你从 Java 应用程序执行用任何可编译为 Java 字节码的脚本语言编写的脚本。JDK6 和 JDK7 附带了一个名为 Rhino JavaScript\
  \ 引擎的脚本引擎。在 JDK8 中，Rhino JavaScript 引擎已被名为 Nashorn 的脚本引擎取代。\n\n脚本使用脚本引擎执行，该引擎是 `ScriptEngine`\
  \ 接口的一个实例。`ScriptEngine` 接口的实现者还提供了 `ScriptEngineFactory` 接口的实现，其工作是创建脚本引擎的实例并提供有关脚本引擎的详细信息。`ScriptEngineManager`\
  \ 类为脚本引擎提供了一种发现和实例化机制。`ScriptManager` 维护一个键值对映射，作为 `Bindings` 接口的一个实例，该映射由其创建的所有脚本引擎共享。\n\
  \n你可以执行包含在 `String` 或 `Reader` 中的脚本。`ScriptEngine` 的 `eval()` 方法用于执行脚本。你可以使用 `ScriptContext`\
  \ 将参数传递给脚本。传递的参数可以是脚本引擎本地的、脚本执行本地的，或者是由 `ScriptManager` 创建的所有脚本引擎全局共享的。使用 Java 脚本\
  \ API，你还可以执行用脚本语言编写的过程和函数。如果脚本引擎支持，你还可以预编译脚本，并从 Java 重复执行脚本以获得更好的性能。\n\n你可以使用 Java\
  \ 脚本 API 实现自己的脚本引擎。你需要为 `ScriptEngine` 和 `ScriptEngineFactory` 接口提供实现。你需要以特定方式打包你的脚本引擎代码，以便\
  \ `ScriptManager` 在运行时可以发现该引擎。\n\nJava 8 附带两个名为 `jrunscript` 和 `jjs` 的命令行工具。它们位于\
  \ `JDK_HOME\\bin` 目录中。它们用于在命令行上运行脚本。`jrunscript` 工具是脚本语言中立的；它可以用于执行任何脚本语言（如 Nashorn、JRuby、groovy\
  \ 等）编写的脚本。`jjs` 工具用于运行 Nashorn 脚本及其扩展；你可以使用 `jjs` 工具运行 shell 命令、脚本和 Java 应用程序。\n\
