  使用 Nashorn 脚本创建的 JavaFX 窗口\n\n```\nC:\\Java9APIsAndModules>jjs -fx scripts/hellojavafx.js\n\
  ```\n\n`jjs` 命令行工具使得处理 JavaFX 应用程序变得非常容易。你只需一行代码即可在 JavaFX 窗口中显示消息。Nashorn 创建了一个名为\
  \ `$STAGE` 的全局变量，它是 JavaFX 应用程序主舞台的引用。请注意，仅当你使用带有 `–fx` 选项的 `jjs` 工具时，`$STAGE` 全局变量才在脚本中可用。清单\
  \ 9-34 展示了最简单的 JavaFX 应用程序的代码，该应用程序在 JavaFX 窗口中显示一个带有消息的 `Label`。将其保存在名为 `simplestfxapp.js`\
