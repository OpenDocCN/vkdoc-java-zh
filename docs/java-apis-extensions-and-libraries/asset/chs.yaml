  \ {\nSystem.out.println(\"JKScript 引擎不可用。\");\nSystem.out.println(\"请将 jkscript.jar\
  \ 添加到 CLASSPATH。\");\nreturn;\n}\n// 以字符串形式测试脚本\ntestString(manager, engine);\n\
  // 以 Reader 形式测试脚本\ntestReader(manager, engine);\n}\npublic static void testString(ScriptEngineManager\
  \ manager, ScriptEngine engine) {\ntry {\n// 使用带数字字面量的简单表达式\nString script = \"\
  12.8 + 15.2\";\nObject result = engine.eval(script);\nSystem.out.println(script\
  \ + \" = \" + result);\nscript = \"-90.0 - -10.5\";\nresult = engine.eval(script);\n\
  System.out.println(script + \" = \" + result);\nscript = \"5 * 12\";\nresult = engine.eval(script);\n\
  System.out.println(script + \" = \" + result);\nscript = \"56.0 / -7.0\";\nresult\
  \ = engine.eval(script);\nSystem.out.println(script + \" = \" + result);\n// 使用全局作用域绑定变量\n\
  manager.put(\"num1\", 10.0);\nmanager.put(\"num2\", 20.0);\nscript = \"num1 + num2\"\
  ;\nresult = engine.eval(script);\nSystem.out.println(script + \" = \" + result);\n\
  // 使用全局和引擎作用域绑定。将使用引擎作用域中的 num1\n// 和全局作用域中的 num2。\nengine.put(\"num1\", 70.0);\n\
  script = \"num1 + num2\";\nresult = engine.eval(script);\nSystem.out.println(script\
  \ + \" = \" + result);\n// 尝试混合数字字面量和绑定。将使用引擎作用域绑定中的 num1\nscript = \"10 + num1\"\
