  // 为框架设置菜单栏\nJMenuBar menuBar = getCustomMenuBar();\nthis.setJMenuBar(menuBar);\n\
  // 创建弹出菜单并添加鼠标监听器以显示它\ncreatePopupMenu();\n}\nprivate JMenuBar getCustomMenuBar()\
