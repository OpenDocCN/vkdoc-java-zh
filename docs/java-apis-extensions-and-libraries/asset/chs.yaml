  清单 5-7.\n使用 Statement 对象执行 SQL INSERT 语句\n```\n\n所有数据库字符串都用单引号括起来。在清单 5-7 中，你在 `insertPerson()`\
  \ 方法内将所有字符串（如名字和姓氏）都用单引号括了起来。我特意为人员使用了简单的名字和姓氏，例如 `John`、`Donna` 和 `Jacobs`。尝试插入一个像\
