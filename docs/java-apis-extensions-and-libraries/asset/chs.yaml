  总和：15\n拼接后的字符串：OneTwoThreeFourFive\n增量值：5\n递增后的数字数组：[6, 7, 8, 9, 10]\n```\n\n##\
  \ 在原生代码中访问 Java 对象\n\n你可以通过多种方式在原生代码中使用 Java 对象。你可以：\n\n*   在原生代码中创建 Java 对象。\n\
  *   从原生代码访问 JVM 中已有的 Java 对象和类。\n*   在原生代码中访问/修改 Java 对象的字段。\n*   从原生代码调用 Java 对象的实例方法和静态方法。\n\
  \n以下各节描述了在原生代码中使用 Java 对象所需的步骤。\n\n### 获取类引用\n\n`jclass` 类型的实例在原生代码中代表一个类对象。如果你调用一个在\
  \ Java 类中声明为 `static` 和 `native` 的原生函数，你的原生函数总是将类对象的引用作为第二个参数获取。有时你可能有一个 `jobject`\
  \ 类型的 Java 对象引用，并希望获取其类对象引用。你需要使用 `GetObjectClass()` JNI 函数来获取 Java 对象的类对象引用，如下所示：\n\
  \n```\njobject obj = /* 获取 Java 对象的引用... */;\njclass cls = env->GetObjectClass(obj);\n\
  ```\n\n使用 `FindClass(JNIEnv *env, const char *className)` JNI 函数，通过类名获取类对象的引用。你需要在\
  \ `FindClass()` 方法中使用类的完全限定名，并将包名中的点替换为正斜杠。如果你试图获取数组的类对象引用，则需要使用数组类签名。要获取 `java.lang.String`\
  \ 类的类对象引用，你需要使用 `java/lang/String` 作为类名。要获取 `int[]` 的类对象引用，你需要使用 `[I` 作为类名。要了解数组类型类的正确签名，你可以在该数组类型的类中声明一个字段，并使用带有\
  \ `–s` 和 `–private` 选项的 `javap` 命令。以下代码片段演示了如何获取一些 Java 引用类型的类对象引用：\n\n```\njclass\
  \ cls;\n// 获取 java.lang.String 类对象的引用\ncls = env->FindClass(\"java/lang/String\"\
  );\n// 获取 int[] 数组类对象的引用\ncls = env->FindClass(\"[I\");\n// 获取 int[][] 数组类对象的引用\n\
  cls = env->FindClass(\"[[I\");\n// 获取 String[] 数组类对象的引用。注意签名中的分号\ncls = env->FindClass(\"\
  [Ljava/lang/String;\");\n```\n\n从 JDK9 开始，类是模块的成员。你可以使用 `GetModule()` JNI 函数获取类的\
  \ `java.lang.Module` 对象的引用。该函数签名如下：\n\n```\nobject GetModule(JNIEnv *env, jclass\
  \ cls);\n```\n\n该函数返回该类所属模块的 `java.lang.Module` 对象。如果该类不在命名模块中，则返回该类类加载器的未命名模块。如果该类代表数组类型，则此函数返回元素类型的\
  \ `Module` 对象。如果该类代表原始类型或 `void`，则返回 `java.base` 模块的 `Module` 对象。\n\n\n\n### 访问\
  \ Java 对象/类的字段和方法\n\n在原生代码中访问 Java 对象/类的字段之前，必须先获取字段 ID。你需要使用 `GetFieldID()` JNI\
  \ 函数来获取实例字段的字段 ID，并使用 `GetStaticFieldID()` JNI 函数来获取静态字段的字段 ID。这些方法的签名如下：\n\n* \
  \  `jfieldID GetFieldID(jclass cls, const char *name, const char *sig)`\n*   `jfieldID\
  \ GetStaticFieldID(jclass cls, const char *name, const char *sig)`\n\n`cls` 参数是定义该实例/静态字段的类对象的引用。`name`\
  \ 参数是字段的名称。`sig` 参数是字段的签名。你需要使用带有 `–s` 和 `–private` 选项的 `javap` 命令来获取类中定义的字段的签名。\n\
  \n你需要使用 `Get<Xxx>Field()` JNI 函数来获取实例字段的值，并使用 `GetStatic<Xxx>Field()` JNI 函数来获取静态字段的值，其中\
  \ `<Xxx>` 是字段的类型，其值可以是 `Boolean`、`Byte`、`Char`、`Double`、`Float`、`Int`、`Long`、`Short`\
  \ 或 `Object`。`Set<Xxx>Field()` 和 `SetStatic<Xxx>Field()` JNI 函数分别用于设置实例字段和静态字段的值。这些方法的声明如下，其中\
  \ `<RRR>` 是原生数据类型，例如，如果 `<Xxx>` 是 `int`，则 `<RRR>` 是 `jint`：\n\n*   `<RRR> Get<Xxx>Field(jobject\
  \ obj, jfieldID fieldID)`\n*   `<RRR> GetStatic<Xxx>Field(jclass clazz, jfieldID\
  \ fieldID)`\n*   `void Set<Xxx>Field(jobject obj, jfieldID fieldID, <RRR> value)`\n\
  *   `void SetStatic<Xxx>Field(jclass clazz, jfieldID fieldID, <RRR> value)`\n\n\
  假设 `obj` 是 `jobject` 的一个实例（即一个 Java 对象引用），而 `cls` 是其类引用。在 `cls` 所代表的类中，有两个 `int`\
  \ 类型的字段：`num` 和 `count`。`num` 字段是实例字段，`count` 字段是静态字段。以下代码片段展示了如何在原生代码中访问这两个字段并将其值加\
  \ 1：\n\n```\n// 获取 num 和 count 字段的字段 ID\njfieldID numFieldId = env->GetFieldID(cls,\
  \ \"num\", \"I\");\njfieldID countFieldId = env->GetStaticFieldID(cls, \"count\"\
  , \"I\");\n// 获取字段值\njint numValue = env->GetIntField(obj, numFieldId);\njint countValue\
  \ = env->GetStaticIntField(cls, countFieldId);\n// 将值加 1 并设置回字段\nnumValue = numValue\
  \ + 1;\ncountValue = countValue + 1;\nenv->SetIntField(obj, numFieldId, numValue);\n\
  env->SetStaticIntField(cls, countFieldId, countValue);\n```\n\n在原生代码中使用 Java 对象/类的方法的步骤与使用其字段类似。在访问方法之前，你需要获取方法的\
  \ ID。你可以分别使用 `GetMethodID()` 和 `GetStaticMethodID()` JNI 函数来获取实例方法和静态方法的 ID。它们的声明如下：\n\
  \n*   `jmethodID GetMethodID(jclass clazz, const char *name, const char *sig)`\n\
  *   `jmethodID GetStaticMethodID(jclass clazz, const char *name, const char *sig)`\n\
  \n方法的 `name` 是其简单名称，其签名可以使用带有 `–s` 和 `–private` 选项的 `javap` 命令获取。以下代码片段展示了如何从 Java\
  \ 类的几个方法中获取方法 ID，假设 `cls` 代表类对象引用：\n\n```\njmethodID methodID\n// 方法为 \"void objectCallBack()\"\
  \nmethodID = env->GetMethodID(cls, \"objectCallBack\", \"()V\");\n// 方法为 \"static\
  \ void classCallBack()\"\nmethodID = env->GetStaticMethodID(cls, \"classCallBack\"\
  , \"()V\");\n// 方法为 \"int getLength(String str)\"\nmethodID = env->GetMethodID(cls,\
  \ \"getLength\", \"(Ljava/lang/String;)I\");\n// 方法为 \"int[] increment(int[], int)\"\
  \nmethodID = env->GetMethodID(cls, \"increment\", \"([II)[I\");\n```\n\n调用实例方法或静态方法很简单。你需要使用一个对象/类、方法\
  \ ID 以及方法参数（如果有的话）来调用方法。你可以使用以下任一方法来调用对象的实例方法：\n\n*   `<RRR> Call<Xxx>Method(jobject\
  \ obj, jmethodID methodID, arg1, arg2...)`\n*   `<RRR> Call<Xxx>MethodA(jobject\
  \ obj, jmethodID methodID, const jvalue *args)`\n*   `<RRR> Call<Xxx>MethodV(jobject\
  \ obj, jmethodID methodID, va_list args)`\n\n这里，方法名中的 `<Xxx>` 是方法的返回类型，它可以是 `Boolean`、`Byte`、`Char`、`Double`、`Float`、`Int`、`Long`、`Short`、`Object`\
  \ 或 `Void`。`<RRR>` 是方法的返回类型，根据对应的 `<Xxx>` 值，它可以是 `jboolean`、`jbyte`、`jchar`、`jdouble`、`jfloat`、`jint`、`jlong`、`jshort`、`jobject`\
  \ 或 `void`。`Call<Xxx>Method()`、`Call<Xxx>MethodA()` 和 `Call<Xxx>MethodV()` 之间的区别在于你向方法传递参数的方式。`Call<Xxx>Method()`\
  \ 方法允许你以逗号分隔的列表形式向方法传递参数。`Call<Xxx>MethodA()` 方法允许你以 `jvalue` 类型数组的形式向方法传递参数。`Call<Xxx>MethodV()`\
  \ 方法允许你以 `va_list` 的形式向方法传递参数。以下代码片段展示了如何调用实例方法，假设 `obj` 是 `jobject` 类型的引用，且方法 ID\
  \ 为 `methodID`：\n\n```\n// 方法为 \"void m1()\"\nenv->CallVoidMethod(obj, methodID);\n\
  // 方法为 \"void m2(int a)\"\nenv->CallVoidMethod(obj, methodID, 109);\n// 方法为 \"int\
  \ m2(double a)\"\njint value = env->CallIntMethod(obj, methodID, 109.23);\n```\n\
  \n调用静态方法与调用实例方法类似。你需要使用类对象引用来调用静态方法。你需要使用以下 JNI 函数之一来调用静态方法。请注意，用于调用 `static` 方法的\
  \ JNI 函数名称中包含单词 `Static`。\n\n*   `<RRR> CallStatic<Xxx>Method(jclass cls, jmethodID\
  \ methodID, arg1, arg2...)`\n*   `<RRR> CallStatic<Xxx>MethodA(jclass cls, jmethodID\
  \ methodID, jvalue *args)`\n*   `<RRR> CallStatic<Xxx>MethodV(jclass cls, jmethodID\
  \ methodID, va_list args)`\n\nJNI 允许你在其类层次结构中的任何类上调用对象的实例方法。当你使用 `Call<Xxx>Method()`\
  \ 函数时，它会使用对象的类来调用该方法。考虑以下类层次结构：\n\n```\n// A.java\npackage com.jdojo.jni;\npublic\
  \ class A {\npublic int m1() {\nreturn 1;\n}\n}\n// B.java\npackage com.jdojo.jni;\n\
  public class B extends A {\n@Override\npublic int m1() {\nreturn 3;\n}\n}\n// C.java\n\
  package com.jdojo.jni;\npublic class C extends B {\n@Override\npublic int m1() {\n\
  return 3;\n}\n}\n```\n\n类 `B` 和 `C` 重写了 `m1()` 方法。如果你使用 `CallIntMethod()` 来调用类 `C`\
  \ 对象的 `m1()` 方法，它将调用类 `C` 中的 `m1()` 方法并返回 3。JNI 允许你使用类 `C` 的对象来调用类 `A` 或类 `B` 中的\
  \ `m1()` 方法。要从其超类中调用对象上的方法，你需要使用以下 JNI 方法之一：\n\n*   `<RRR> CallNonvirtual<Xxx>Method(jobject\
  \ obj, jclass cls, jmethodID methodID, arg1, arg2...)`\n*   `<RRR> CallNonvirtual<Xxx>MethodA(jobject\
  \ obj, jclass cls, jmethodID methodID, const jvalue *args)`\n*   `<RRR> CallNonvirtual<Xxx>MethodV(jobject\
  \ obj, jclass cls, jmethodID methodID, va_list args)`\n\n在这些方法版本中，你需要使用对象及其类的引用。`methodID`\
  \ 必须使用需要调用该方法的类来获取。例如，以下代码片段在类 `C` 的对象上调用了类 `B` 中的 `m1()` 方法。该代码还创建了一个类 `C` 的对象。\n\
  \n\n\n```\n// 获取类 B 和类 C 的引用\njclass bCls = env->FindClass(\"com/jdojo/jni/B\");\n\
  jclass cCls = env->FindClass(\"com/jdojo/jni/C\");\n// 获取类 C 构造器的方法 ID\njmethodID\
  \ cConstrctorID = env->GetMethodID(cCls, \"\", \"()V\");\n// 创建类 C 的对象\njobject\
  \ cObject = env->NewObject(cCls, cConstrctorID);\n// 获取类 B 中 m1() 方法的方法 ID\njmethodID\
  \ bMethodID = env->GetMethodID(bCls, \"m1\", \"()I\");\n// 使用类 C 的对象调用类 B 中的 m1()\
  \ 方法\njint h = env->CallNonvirtualIntMethod(cObject, bCls, bMethodID);\n// 将打印 2，这是类\
  \ B 中 m1() 方法返回的值\nprintf(\"%i\\n\", h);\n```\n\n让我们来看一个在原生代码中访问 Java 对象字段和方法的完整示例。清单\
  \ 7-12 包含 Java 代码，其中名为 `JNIJavaObjectAccessTest` 的类包含两个字段 `num` 和 `count`。它还包含两个名为\
  \ `objectCallBack()` 和 `classCallBack()` 的方法。你将在原生代码中访问这些字段和方法。该类有一个名为 `callBack()`\
  \ 的原生方法。`callBack()` 原生方法将 `num` 和 `count` 字段加 1，并调用 `objectCallBack()` 和 `classCallBack()`\
  \ 方法。在运行 `JNIJavaObjectAccessTest` 类之前，你需要生成 `com_jdojo_jni_JNIJavaObjectAccessTest.h`\
  \ C++ 头文件以及包含 `jnijavaobjectaccesstest.cpp` 文件内容的共享库，如清单 7-13 所示。\n\n```\n// JNIJavaObjectAccessTest.java\n\
  package com.jdojo.jni;\npublic class JNIJavaObjectAccessTest {\nstatic {\nSystem.loadLibrary(\"\
  beginningjava\");\n}\nprivate int num = 10;\nprivate static int count = 1001;\n\
  public void objectCallBack() {\nSystem.out.println(\"Inside objectCallBack() method.\"\
  );\n}\npublic static void classCallBack() {\nSystem.out.println(\"Inside classCallBack()\
  \ method.\");\n}\npublic native void callBack();\n@Override\npublic int hashCode()\
  \ {\nreturn -9999;\n}\npublic static void main(String[] args) {\nJNIJavaObjectAccessTest\
  \ test = new JNIJavaObjectAccessTest();\nSystem.out.println(\"Before calling native\
  \ method...\");\nSystem.out.println(\"num = \" + test.num);\nSystem.out.println(\"\
  count = \" + count);\n// Call native method\ntest.callBack();\nSystem.out.println(\"\
  After calling native method...\");\nSystem.out.println(\"num = \" + test.num);\n\
  System.out.println(\"count = \" + count);\n}\n}\n清单 7-12.\n从原生代码访问 Java 对象/类的字段和方法\n\
  ```\n\n```\nBefore calling native method...\nnum = 10\ncount = 1001\nInside objectCallBack()\
  \ method.\nInside classCallBack() method.\nAfter calling native method...\nnum =\
  \ 11\ncount = 1002\n```\n\n```\n// jnijavaobjectaccesstest.cpp\n#include \n#include\
  \ \n#include \"com_jdojo_jni_JNIJavaObjectAccessTest.h\"\nJNIEXPORT void JNICALL\
  \ Java_com_jdojo_jni_JNIJavaObjectAccessTest_callBack\n(JNIEnv *env, jobject obj)\
  \ {\njclass cls;\n// 获取对象的类引用\ncls = env->GetObjectClass(obj);\nif (cls == NULL)\
  \ {\nreturn;\n}\n// 访问字段\njfieldID numFieldId = env->GetFieldID(cls, \"num\", \"\
  I\");\njfieldID countFieldId = env->GetStaticFieldID(cls, \"count\", \"I\");\njint\
  \ numValue = env->GetIntField(obj, numFieldId);\njint countValue = env->GetStaticIntField(cls,\
  \ countFieldId);\nnumValue = numValue + 1;\ncountValue = countValue + 1;\nenv->SetIntField(obj,\
  \ numFieldId, numValue);\nenv->SetStaticIntField(cls, countFieldId, countValue);\n\
  // 调用实例方法\njmethodID instanceMethodID = env->GetMethodID(cls, \"objectCallBack\"\
  , \"()V\");\nif (instanceMethodID != 0) {\nenv->CallVoidMethod(obj, instanceMethodID);\n\
  }\n// 调用静态方法\njmethodID staticMethodID = env->GetStaticMethodID(cls, \"classCallBack\"\
  , \"()V\");\nif (staticMethodID != 0) {\nenv->CallStaticVoidMethod(cls, staticMethodID);\n\
  }\nreturn;\n}\n清单 7-13.\njnijavaobjectsaccesstest.cpp 文件的内容，其中包含在 JNIJavaObjectAccessTest\
  \ 类中声明的 callBack() 原生方法的 C++ 实现\n```\n\n### 创建 Java 对象\n\nJNI 允许你在原生代码中创建 Java 对象，可以不调用任何构造器，也可以通过调用特定的构造器。你需要使用\
  \ `AllocObject()` JNI 函数为 Java 对象分配内存，而不调用其任何构造器。请注意，所有实例字段将根据其数据类型具有默认值。当你使用 `AllocObject()`\
  \ JNI 函数时，实例字段不会被初始化，也不会调用任何实例初始化器。以下是为 Java 中的类对象分配内存的代码片段：\n\n```\njclass cls\
  \ = 获取类引用;\njobject obj = env->AllocObject(cls);\nif (obj == NULL) {\n// 对象无法创建。处理错误情况。\n\
  }\n```\n\n你可以通过调用 Java 类的特定构造器来创建 Java 对象，使用以下 JNI 函数之一。这些函数的区别仅在于如何传递构造器的参数。\n\n\
  *   `jobject NewObject(jclass clazz, jmethodID methodID, arg1, arg2...)`\n*   `jobject\
  \ NewObjectA(jclass clazz, jmethodID methodID, const jvalue *args)`\n*   `jobject\
  \ NewObjectV(jclass clazz, jmethodID methodID, va_list args)`\n\n`methodID` 参数是你要调用的构造器的方法\
  \ ID。当你想要获取类构造器的方法 ID 时，有一个特殊的字符串用作方法名。你需要使用 `<init>` 或 `$init$` 作为构造器的方法名。考虑名为\
  \ `IntWrapper` 的类的代码，如清单 7-14 所示。\n\n```\n// IntWrapper.java\npackage com.jdojo.jni;\n\
  public class IntWrapper {\nprivate int value = -1;\npublic IntWrapper() {\n}\npublic\
  \ IntWrapper(int value) {\nthis.value = value;\n}\npublic int getValue() {\nreturn\
  \ value;\n}\n}\n清单 7-14.\n用于演示在原生代码中创建 Java 对象的示例类\n```\n\n你可以在原生 C++ 代码中获取 `IntWrapper`\
  \ 类的引用，如下所示：\n\n```\njclass wrapperCls = env->FindClass(\"com/jdojo/jni/IntWrapper\"\
  );\n```\n\n以下 C++ 代码在不调用构造器的情况下为 `IntWrapper` 对象分配内存：\n\n```\njobject wrapperObject\
  \ = env->AllocObject(wrapperCls);\n```\n\n此时，`wrapperObject` 存在于内存中，其实例字段 `value`\
  \ 仍然具有默认值 0。如果你此时对 `wrapperObject` 调用 `getValue()` 方法，它将返回 `0`，而不是你可能期望的 `–1`。\n\
  \n如果你想通过调用 Java 类的某个构造器来创建对象，则需要使用 `NewObject()` JNI 函数。以下代码片段通过调用 `IntWrapper`\
  \ 类的无参构造器来创建该类的对象。构造器的签名取决于它接受的参数数量和类型。对于无参构造器，签名是 `()V`。如果构造器接受一个 `int` 参数，其签名将是\
  \ `(I)V`。你可以通过使用带有 `–s` 选项的 `javap` 命令来获取类构造器的签名。如果你还想包含 `private` 成员的签名，请使用 `–private`\
  \ 选项与 `javap` 一起使用。\n\n```\n// 获取类 IntWrapper 默认构造器的方法 ID\njmethodID mid = env->GetMethodID(wrapperCls,\
  \ \"\", \"()V\");\n// 使用默认构造器创建类 IntWrapper 的对象\njobject wrapperObject = env->NewObject(wrapperCls,\
  \ mid);\n```\n\n此时，如果你对 `wrapperObject` 调用 `getValue()` 方法，它将返回 -1，这是 `value` 实例字段的初始值。当调用构造器时，所有实例字段都会被初始化。\n\
  \n以下代码片段调用了 `IntWrapper` 类的第二个版本的构造器，该构造器接受一个 `int` 参数。它将 `999` 作为参数值传递给构造器 `IntWrapper(int\
  \ value)`。\n\n\n\n```\n// 获取类 IntWrapper 的构造器方法 ID\njmethodID wrapperConstrctorID\
  \ = env->GetMethodID(wrapperCls, \"\",\"(I)V\");\n// 创建 IntWrapper 类的对象，并将 999 传递给构造器\n\
  jobject wrapperObject = env->NewObject(wrapperCls, wrapperConstrctorID, 999);\n\
  ```\n\n此时，如果你对 `wrapperObject` 调用 `getValue()` 方法，它将返回 `999`，该值是在其创建时通过构造器设置的。\n\
  \n提示\n\nJNI 函数 `AllocObject()` 和 `NewObject()` 只能用于创建非数组引用类型的对象。你需要使用 JNI 函数 `NewObjectArray()`\
  \ 来创建特定类型的数组。\n\n## 异常处理\n\nJNI 允许你在原生代码中处理异常。原生代码可以检测并处理因调用 JNI 函数而在 JVM 中抛出的异常。原生代码也可以抛出异常，该异常可以传播到\
  \ Java 代码。原生代码中的异常处理机制与 Java 代码不同。当在 Java 代码中抛出异常时，控制权会立即转移到能够处理该异常的最近的 `catch`\
  \ 块。当在原生代码执行期间抛出异常时，原生代码会继续执行，并且该异常会保持待处理状态，直到控制权返回到 Java 代码。一旦有异常待处理，除了释放原生资源的函数外，你不应执行任何其他\
  \ JNI 函数。有两种方法可以检测原生代码中 JNI 函数调用是否导致了异常：\n\n*   通过检查函数的特殊返回值\n*   通过检查函数返回后是否发生了异常\n\
  \n如果发生异常，某些 JNI 函数会返回一个特殊值。例如，如果你调用 `FindClass()` JNI 函数但未找到该类，则可能会抛出以下四种异常之一：`ClassFormatError`、`ClassCircularityError`、`NoClassDefFoundError`\
  \ 或 `OutOfMemoryError`。如果抛出这四种异常中的任何一种，`FindClass()` JNI 函数会返回 `NULL` 作为特殊值。你应该在调用\
  \ `FindClass()` JNI 函数后立即检查返回值是否为 `NULL`，并编写代码来处理异常。通常，你将控制权返回给调用者，以便调用者可以处理异常，如下所示：\n\
  \n```\njclass cls = env->FindClass(\"abc/xyz/NonExistentClass\");\nif (cls == NULL)\
  \ {\n/*\n* 在此处释放你持有的任何资源并返回。此时异常处于待处理状态。\n* 当控制权返回到 Java 代码时，该异常将被抛出。\n*/\nreturn;\n\
  }\n```\n\n在某些情况下，无法从 JNI 函数返回特殊值来指示发生了异常。假设你在原生代码中访问一个 Java 数组，并且超出了数组的边界。在这种情况下，JVM\
  \ 会抛出 `ArrayIndexOutOfBoundsException` 类型的异常。你可能会调用一个 Java 对象的方法，而该方法中发生了异常。在这种情况下，你需要在此类\
  \ JNI 函数调用之后立即使用 `ExceptionOccurred()` 或 `ExceptionCheck()` JNI 函数来检查是否发生了异常。这些函数具有以下签名：\n\
  \n*   `jthrowable ExceptionOccurred()`\n*   `jboolean ExceptionCheck()`\n\n如果在函数调用期间发生了异常，`ExceptionOccurred()`\
  \ 函数会返回该异常对象的引用。否则，它返回 `NULL`。如果在函数调用期间发生了异常，`ExceptionCheck()` 函数返回 `JNI_TRUE`。否则，它返回\
  \ `JNI_FALSE`。以下代码片段演示了如何使用这些函数。你只需要使用这两个函数中的一个，无需同时使用。\n\n```\n// 使用 ExceptionOccurred()\
  \ 方法\n// 调用一个可能抛出异常的 JNI 函数\njthrowable e = env->ExceptionOccurred();\nif (e !=\
  \ NULL) {\n/*\n* 释放你持有的任何资源并返回。此时异常处于待处理状态。\n* 当控制权返回到 Java 代码时，该异常将被抛出。\n*/\nreturn;\n\
  }\n// 使用 ExceptionCheck() 方法\n// 调用一个可能抛出异常的 JNI 函数\njboolean gotException = env->ExceptionCheck();\n\
  if (gotException) {\n/*\n* 释放你持有的任何资源并返回。此时异常处于待处理状态。\n* 当控制权返回到 Java 代码时，该异常将被抛出。\n\
  */\nreturn;\n}\n```\n\n一旦检测到原生代码中发生了异常，你有三个选择：\n\n*   清除异常并在原生代码中处理它。\n*   将控制权返回给\
  \ Java 代码，让 Java 代码处理异常。\n*   清除异常，在原生代码中处理它，然后从原生代码抛出一个新的异常，供 Java 代码处理。\n\n以下各节将解释处理异常的三种方法。\n\
  \n### 在原生代码中处理异常\n\n你可以清除异常并在原生代码中处理异常情况。使用 `ExceptionClear()` JNI 函数来清除待处理的异常，如下所示：\n\
  \n```\n// 调用一个可能抛出异常的 JNI 函数\njboolean gotException = env->ExceptionCheck();\nif\
  \ (gotException) {\n// 清除异常\nenv->ExceptionClear();\n// 编写一些代码来处理异常情况\n}\n```\n\n\
  一旦你清除了异常，该异常就不再处于待处理状态。\n\n### 在 Java 代码中处理异常\n\n你可以使用 `return` 语句将控制权返回给调用者，让调用者处理异常，如下所示：\n\
  \n```\n// 调用一个可能抛出异常的 JNI 函数\njboolean gotException = env->ExceptionCheck();\nif\
  \ (gotException) {\n/*\n* 释放你持有的任何资源并返回。此时异常处于待处理状态。\n* 当控制权返回到调用者时，该异常将被抛出。\n*/\n\
  return;\n}\n```\n\n### 从原生代码抛出新的异常\n\n你可以在原生代码中处理异常，清除异常，然后抛出一个新的异常。请注意，从原生代码抛出异常并不会将控制权转移回\
  \ Java 代码。你必须编写诸如 `return` 语句之类的代码来将控制权转移回 Java 代码，这样你抛出的异常才能在 Java 中被处理。你可以使用以下两个\
  \ JNI 函数之一在原生代码中抛出异常。这两个函数在成功时返回零，在失败时返回负整数。\n\n*   `jint Throw(jthrowable obj)`\n\
  *   `jint ThrowNew(jclass clazz, const char *message)`\n\n`Throw()` 函数接受一个 `jthrowable`\
  \ 对象。`ThrowNew()` 函数接受异常类的引用和一条消息。以下代码片段展示了如何使用 `ThrowNew()` 函数抛出一个 `java.lang.Exception`：\n\
  \n```\nif (someErrorConditionIsTrue) {\njclass cls = env->FindClass(\"java/lang/Exception\"\
  );\n// 在此处检查异常（省略）\nenv->ThrowNew(cls, \"你的错误信息放在这里\");\nreturn;\n}\n```\n\n提示\n\
  \n如果你想在原生代码中打印异常的堆栈跟踪，可以使用 `ExceptionDescribe()` JNI 函数。它会在标准错误输出上打印异常堆栈跟踪。如果你想从原生代码引发致命错误，可以使用\
  \ `FatalError(const char *msg)` JNI 函数。`FatalError()` 函数不会返回，JVM 也无法从该错误中恢复。在 Java\
  \ 代码中声明的原生方法也可以像 Java 非原生方法一样使用 `throws` 子句。以下是 Java 类内部有效的原生方法声明：\n\n```\npublic\
  \ native int myMethod() throws Exception;\n```\n\n\n\n## 创建 JVM 实例\n\n到目前为止，你已经了解了使用原生代码的\
  \ Java 应用程序。现在，你将看到相反的情况，即一个使用 Java 代码的原生应用程序。为什么要在原生应用程序中使用 Java 代码？你可能出于以下原因希望在原生应用程序中使用\
  \ Java 代码：\n\n*   你可能已经有一个用 Java 编写的应用程序，并希望使用现有的代码。\n*   Java 提供了丰富的类库。你可能希望在原生应用程序中利用\
  \ Java 类库的优势。\n\nJNI API 中允许你在原生代码中创建和加载 JVM 的部分被称为**调用 API**。JNI 允许你将 JVM 嵌入到原生应用程序中。也就是说，你可以从原生应用程序中创建一个\
  \ JVM，并像在 Java 应用程序中一样使用 Java 类。在原生代码中创建 JVM 只需几行代码。你需要做的就是准备好要传递给 JVM 的初始参数，然后调用\
  \ `JNI_CreateJavaVM()` 调用 API 函数来创建 JVM。\n\n传递给 JVM 的初始参数是一个 `JavaVMInitArgs` 结构体，其定义如下：\n\
  \n```\ntypedef struct JavaVMInitArgs {\njint version;\njint nOptions;\nJavaVMOption\
  \ *options;\njboolean ignoreUnrecognized;\n} JavaVMInitArgs;\n```\n\n`version` 字段指示\
  \ JNI 版本，必须至少设置为 `JNI_VERSION_1_2`。随 JDK9 发布的 JNI 版本是 `JNI_VERSION_9`。`nOptions`\
  \ 字段设置为要传递给 JVM 的选项数量。`options` 字段是一个 `JavaVMOption` 结构体数组，其定义如下：\n\n```\ntypedef\
  \ struct JavaVMOption {\nchar *optionString;\nvoid *extraInfo;\n} JavaVMOption;\n\
  ```\n\n如果 `ignoreUnrecognized` 设置为 `JNI_TRUE`，则 `JNI_CreateJavaVM()` 函数将忽略无法识别的选项。如果设置为\
  \ `JNI_FALSE`，则 `JNI_CreateJavaVM()` 函数在遇到无法识别的选项时会立即返回 `JNI_ERR`。\n\n`JavaVMOption`\
  \ 结构体中的 `optionString` 字段是一个字符串，表示以默认平台编码传递给 JVM 的选项值。\n\n`extraInfo` 字段用于特殊类型的\
  \ JVM 参数。它表示用于重定向 JVM 消息、JVM 退出钩子或 JVM 中止钩子的函数钩子。`extraInfo` 字段表示的钩子类型取决于 `optionString`\
  \ 字段的值。如果 `optionString` 字段的值为 `vfprintf`、`exit` 或 `abort`，则 `extraInfo` 字段分别表示\
  \ JVM 消息重定向钩子、JVM 退出钩子或 JVM 中止钩子。请注意，`vfprintf` 钩子仅将 JVM 消息重定向到该钩子。它不会将 `System.out`\
  \ 和 `System.err` 消息重定向到该钩子。如果你在原生代码中设置了 `vsprintf` 钩子，并在 Java 代码中使用了 `System.out/System.err`\
  \ 的 `print()/println()` 方法，这些消息将不会被重定向到你的 `vfprintf` 钩子。你需要使用 `System` 类的 `setOut()`\
  \ 和 `setErr()` 方法来重定向 `System.out` 和 `System.err` 消息。JVM 的退出钩子在 JVM 正常终止时被调用，例如通过在\
  \ Java 代码中调用 `System.exit(int exitCode)` 方法。JVM 的中止钩子在 JVM 异常终止时被调用。\n\n以下代码片段展示了如何使用不同的\
  \ VM 钩子填充 `extraInfo` 字段。首先，定义了三个函数，它们将作为三种类型的钩子。请注意，这些函数必须具有与以下代码片段中所示相同的签名：\n\n\
  ```\njint JNICALL jvmMsgRedirection_hook(FILE *stream, const char *format, va_list\
  \ args) {\n// 你可以在此处记录 VM 消息。将 VM 消息打印到标准输出。\nreturn vfprintf(stdout, format, args);\n\
  }\nvoid JNICALL jvmExit_hook(jint code) {\n// 你可以在此处进行一些清理工作\nprintf(\"VM exited\
  \ with exit code %i\\n\", code);\n}\nvoid JNICALL jvmAbort_hook() {\nprintf(\"VM\
  \ was aborted\\n\");\n}\nJavaVMOption jvmOption[3];\n// 添加 JVM 钩子\noptions[0].optionString\
  \ = \"vfprintf\";\noptions[0].extraInfo = jvmMsgRedirection_hook;\noptions[1].optionString\
  \ = \"exit\";\noptions[1].extraInfo = jvmExit_hook;\noptions[2].optionString = \"\
  abort\";\noptions[2].extraInfo = jvmAbort_hook;\n```\n\n以下代码片段展示了如何使用 JVM 的初始参数填充\
  \ `JavaVMInitArgs` 结构体。它只设置了两个参数：`java.class.path` 和 `java.library.path`。如果需要，你可以设置更多\
  \ JVM 参数。\n\n```\n// 在 JavaVMOption 结构体中填充 JVM 选项\nconst jint MAX_OPTIONS = 2; //\
  \ 将向 JVM 传递两个参数\nJavaVMOption options[MAX_OPTIONS];\n// 我们的第一个参数是 java.class.path（JVM\
  \ 的 CLASSPATH）\noptions[0].optionString = \"-Djava.class.path=.;c:\\\\myjni\\\\\
  classes\";\n// 我们的第二个参数是 java.library.path（查找共享库的 PATH）\noptions[1].optionString\
  \ = \"-Djava.library.path=c:\\\\myjni\\\\libs\";\n// 使用选项详细信息填充 JavaVMInitArgs 结构体\n\
  JavaVMInitArgs vm_args;\nvm_args.version  = JNI_VERSION_9;\nvm_args.nOptions = MAX_OPTIONS;\n\
  vm_args.options  = options;\nvm_args.ignoreUnrecognized = true;\n```\n\n一旦你在 `JavaVMInitArgs`\
  \ 结构体中准备好了 JVM 参数，只需调用一个 JNI 函数即可在原生代码中创建 JVM。`JNI_CreateJavaVM()` JNI 函数接受三个参数。第一个参数是指向代表\
  \ JVM 的 `JavaVM` 结构体的指针。第二个参数是指向 `JNIEnv` 结构体的指针，即 JNI 接口。第三个参数是传递给 JVM 的初始参数。以下代码片段展示了如何在原生代码中创建\
  \ JVM。你需要检查 `JNI_CreateJavaVM()` 函数可能返回的任何错误。如果无法创建 JVM，它将返回 `JNI_ERR`。\n\n```\n\
  JNIEnv *env;\nJavaVM *jvm;\nlong status;\nstatus = JNI_CreateJavaVM(&jvm, (void**)&env,\
  \ &vm_args);\nif (status == JNI_ERR) {\nprintf(\"Could not create VM. Exiting application...\\\
  n\");\nreturn 1;\n}\n```\n\n一旦你获得了 `JNIEnv` 结构体，就可以使用它来查找类、创建该类的对象以及在该对象上执行任何方法。事实上，它允许你使用\
  \ JNI 访问整个 JVM。使用完 JVM 后，你需要销毁它。\n\n```\n// 销毁 JVM\njvm->DestroyJavaVM();\n```\n\
  \n清单 7-15 包含一个 `EmbeddedJVMJNI` 类的代码，该类带有一个 `printMsg()` 静态方法，用于将消息打印到标准输出。稍后，你将在原生代码中创建一个\
  \ JVM 并调用 `printMsg()` 方法。\n\n```\n// EmbeddedJVMJNI.java\npackage com.jdojo.jni;\n\
  public class EmbeddedJVMJNI {\npublic static void printMsg(String msg) {\nSystem.out.println(msg);\n\
  }\n}\n清单 7-15.\n一个 EmbeddedJVMJNI Java 类\n```\n\n清单 7-16 中列出的 C++ 控制台应用程序创建了一个 JVM\
  \ 并调用了 `EmbeddedJVMJNI` 类的 `printMsg()` 方法。本书的源代码包含 `createjvm.cpp` 文件中的 C++ 代码。该程序允许你将\
  \ `CLASSPATH` 指定为命令行参数。如果你没有指定 `CLASSPATH`，它将使用当前目录作为 `CLASSPATH`。\n\n\n\n```\n\
  // createjvm.cpp\n#include \n#include \n#include \nint main(int argc, char **argv)\
  \ {\nstd::string classpath(\"\");\nif (argc FindClass(className);\nif (cls == NULL)\
  \ {\n// 打印异常堆栈并销毁 JVM\nenv->ExceptionDescribe();\njvm->DestroyJavaVM();\nreturn\
  \ 1;\n}\nif (cls != NULL) {\njmethodID mid = env->GetStaticMethodID(cls, \"printMsg\"\
  ,\n\"(Ljava/lang/String;)V\");\nif (mid != NULL) {\njstring m = env->NewStringUTF(\"\
  Hello from C++...\\n\");\nenv->CallStaticVoidMethod(cls, mid, m);\nif (env->ExceptionCheck())\
  \ {\nenv->ExceptionDescribe();\nenv->ExceptionClear();\n}\n}\n}\n// 销毁 JVM\njvm->DestroyJavaVM();\n\
  return 0;\n}\n清单 7-16.\n在原生应用中创建 JVM 的 createjvm.cpp 文件内容\n```\n\n你需要将 `createjvm.cpp`\
  \ 文件编译成可执行文件。编译此程序时，需要提供 `jvm.lib` 文件的路径，该文件在 Windows 上位于 `JAVA_HOME\\lib` 目录中。假设你已在\
  \ Windows 上将 JDK 安装在 `C:\\java9`，则可以使用以下命令创建 `createjvm.exe` 文件：\n\n```\nC:\\Java9APIsAndModules\\\
  cplusplus\\src> g++ -IC:/java9/include -IC:/java9/include/win32\n-o createjvm\n\
  createjvm.cpp\nC:/java9/lib/jvm.lib\n```\n\n该命令应在一行内输入，此处为便于阅读而分多行显示。命令的前两行与之前创建共享库时相同。`–o`\
  \ 选项用于指定可执行输出文件的名称，此处为 `createjvm`。最后一个选项是需要静态链接的库 `jvm.lib` 的路径。\n\n以下命令将在 Linux\
  \ 上创建 `createjvm` 可执行文件，假设你已将 JDK 安装在 `/home/ksharan/java9` 目录中：\n\n```\n[/home/ksharan/Java9APIsAndModules/cplusplus/src]\
  \ $ g++ -I/home/ksharan/java9/include\n-I/home/ksharan/java9/include/linux\n-o createjvm\n\
  createjvm.cpp\n/home/ksharan/java9/lib/server/libjvm.so\n```\n\n在 Windows 上，运行 `createjvm.exe`\
  \ 应用程序时，它会查找 `jvm.dll` 共享库，该库位于 `JRE_HOME\\bin\\server` 目录中。你需要将包含 `jvm.dll` 文件的目录添加到\
  \ `PATH` 环境变量中。\n\n```\nC:\\Java9APIsAndModules\\cplusplus\\src> SET PATH=C:\\java9\\\
  bin\\server;%PATH%\nC:\\Java9APIsAndModules\\cplusplus\\src> createjvm C:\\Java9APIsAndModules\\\
  dist\\jdojo.jni.jar\n```\n\n```\nHello from C++...\n```\n\n运行 `createjvm.exe` 文件时，你可能会遇到以下错误：\n\
  \n```\nException in thread \"main\" java.lang.NoClassDefFoundError: com/jdojo/jni/EmbeddedJVMJNI\n\
  Caused by: java.lang.ClassNotFoundException: com.jdojo.jni.EmbeddedJVMJNI\n...\n\
  ```\n\n该错误表明 `CLASSPATH` 未正确设置，JVM 无法找到 `EmbeddedJVMJNI` 类。使用上述命令，会在 `C:\\Java9APIsAndModules\\\
  dist\\jdojo.jni.jar` 文件中搜索该类。要修复此错误，请使用正确的 `CLASSPATH` 参数运行 `createjvm` 应用程序。\n\n\
  在 Linux 上，你需要设置 `LD_LIBRARY_PATH`，以便在运行 `createjvm` 应用程序时能够找到 `libjvm.so` 文件。可以按如下方式设置：\n\
  \n```\n[/home/ksharan/Java9APIsAndModules/cplusplus/src] $ export LD_LIBRARY_PATH=/home/ksharan/java9/lib/server\n\
  ```\n\n现在，你可以按如下方式运行 `createjvm` 应用程序：\n\n```\n[/home/ksharan/Java9APIsAndModules/cplusplus/src]\
  \ $ ./createjvm /home/ksharan/Java9APIsAndModules/dist/jdojo.jni.jar\n```\n\n```\n\
  Hello from C++...\n```\n\n该命令将在 `/home/ksharan/Java9APIsAndModules/dist/jdojo.jni.jar`\
  \ 文件中搜索 `com/jdojo/jni/EmbeddedJVMJNI.class`。\n\n## 原生代码中的同步\n\nJNI 提供了两个函数 `MonitorEnter()`\
  \ 和 `MonitorExit()`，用于在多线程环境中同步对原生代码的访问。这两个函数成对使用，其作用等同于在 Java 代码中使用 `synchronized`\
  \ 关键字。这些函数的声明如下：\n\n*   `jint MonitorEnter(jobject obj)`\n*   `jint MonitorExit(jobject\
  \ obj)`\n\n两个函数在成功时返回 0（`jni.h` 头文件中将 `JNI_OK` 定义为 0），失败时返回负数。你必须检查它们的返回值以正确处理代码同步。以下是使用同步的示例\
  \ Java 代码：\n\n```\nObject someObject = 获取一个 Java 对象的引用;\n// 其他逻辑在此处\nsynchronized(someObject)\
  \ {\n// 同步代码在此处\n}\n```\n\n等效的原生代码如下：\n\n```\njobject someObject = 获取一个 Java 对象的引用;\n\
  // 其他逻辑在此处\njint enterStatus = env->MonitorEnter(someObject);\nif (enterStatus !=\
  \ JNI_OK) {\n// 在此处处理错误情况\n}\n// 同步代码在此处\njint exitStatus = env->MonitorExit(someObject);\n\
  if (exitStatus != JNI_OK ) {\n// 在此处处理错误情况\n}\n```\n\nJNI 没有提供与 Java 的 `wait()`\
  \ 和 `notify()` 等效的函数来辅助线程同步。但是，你始终可以从原生代码中调用这两个 Java 方法。\n\n\n\n## 摘要\n\nJava 本地接口（JNI）是一种编程接口，用于促进\
  \ Java 程序与用 C、C++、FORTRAN 等本地语言编写的程序之间的交互。JNI 使得在 Java 代码中使用方法并在 C 或 C++ 等本地语言中实现该方法成为可能。JNI\
  \ 还允许将 JVM 嵌入到可以访问 Java 类库的本地应用程序中。\n\n在 Java 中使用但用本地语言实现的方法称为本地方法，它使用关键字 `native`\
  \ 声明。Java 中的 `native` 方法没有方法体，其方法体由分号表示。`native` 方法的实现是用本地语言编写并编译成共享库。共享库通过 `java.library.path`\
  \ JVM 选项提供给 Java 运行时，或者位于 `PATH` 环境变量中。\n\n`javah` 命令用于生成本地语言所需的头文件。它接受包含本地方法的类的完全限定类名作为参数。\n\
  \nJNI 定义了 Java 和本地代码中使用的数据类型之间的映射。例如，`jboolean`、`jchar`、`jint` 等是 Java 中 `boolean`、`char`、`int`\
  \ 等基本数据类型的本地等价类型。本地代码中的 `jclass`、`jobject` 和 `jstring` 类型映射到 Java 中的 `Class`、`Object`\
  \ 和 `String` 类。\n\nJNI 提供了促进字符串在 Java 和本地表示之间转换的函数。它还提供了特殊函数来访问 Java 数组的长度和数组元素。\n\
  \nJNI 还允许你在本地代码中创建 Java 对象。你也可以在本地代码中访问 Java 对象的字段和方法。\n\nJava 中的 `Throwable` 类型映射到本地代码中的\
  \ `jthrowable` 类型。JNI 允许你在本地代码中处理异常。本地代码可以检测并处理因调用 JNI 函数而在 JVM 中抛出的异常。本地代码也可以抛出异常，该异常可以传播到\
  \ Java 代码。当本地代码执行期间抛出异常时，本地代码会继续执行，并且异常保持待处理状态，直到控制权返回到 Java 代码。\n\nJNI 允许你将 JVM\
  \ 嵌入到本地应用程序中，从而使其能够完全访问丰富的 Java 类库。JNI API 中允许你在本地代码中创建和加载 JVM 的部分称为调用 API。JVM 是使用调用\
  \ API 提供的 `JNI_CreateJavaVM()` 方法在本地代码中创建的。\n\n在多线程环境中，可以通过使用两个名为 `MonitorEnter()`\
  \ 和 `MonitorExit()` 的 JNI 函数来同步对本地代码中临界区的访问。这两个函数配合使用，其作用等同于在 Java 代码中使用 `synchronized`\
  \ 关键字。\n\n问题与练习\n\n1.  什么是 JNI？\n2.  使用 `System` 类的 `load()` 和 `loadLibrary()` 方法加载共享库有什么区别？\n\
  3.  Java 基本类型的 JNI 等价数据类型是什么？\n4.  用于表示 `java.lang.String`、`java.lang.Class`、`java.lang.Throwable`\
  \ 类以及任何 Java 类的对象的 JNI 等价数据类型是什么？\n5.  假设你在 C++ 本地代码中有一个名为 `myObject` 的变量，它包含一个对象的引用。如何使用\
  \ JNI 函数获取该对象的类的引用？\n6.  你使用哪个 JNI 函数通过类名获取 Java 类的引用？\n7.  你使用哪个 JNI 函数获取 Java\
  \ 类的 `Module` 对象的引用？\n8.  使用 `AllocObject()` 和 `NewObject()` JNI 函数创建 Java 类的对象有什么区别？\n\
  9.  什么是调用 API？\n10. 描述 JNI 中的异常处理。\n11. 列出支持本地代码中线程同步的 JNI 函数。\n\n# 8. JavaFX 简介\n\
  \n在本章中，你将学习：\n\n*   什么是 JavaFX\n*   如何编写简单的 JavaFX 程序\n*   JavaFX 中的属性、绑定和可观察集合\n\
  *   事件处理\n*   使用布局面板、控件、2D 形状以及在画布上绘图\n*   应用效果、变换和动画\n*   使用 FXML 在 JavaFX 应用程序中构建\
  \ UI\n*   在 JavaFX 中打印节点\n\nJavaFX 是一个庞大的主题，它本身值得用一本书来阐述。本章是一个入门章节，旨在向你展示 JavaFX\
  \ 提供的功能。这些主题均未全面涵盖。本章中的所有示例程序都是 `jdojo.javafx` 模块的成员，如代码清单 8-1 所示。\n\n```\n// module-info.java\n\
  module jdojo.javafx {\nrequires javafx.controls;\nrequires javafx.fxml;\nexports\
  \ com.jdojo.javafx;\n}\n代码清单 8-1.\njdojo.javafx 模块的声明\n```\n\n\n\n## 什么是 JavaFX？\n\
  \nJavaFX 是一个基于 Java 的开源 GUI 框架，用于开发富客户端应用程序。它与市场上的其他框架（如 Apache Flex 和 Microsoft\
  \ Silverlight）类似。在 Java 平台的 GUI 开发技术领域，JavaFX 也是 Swing 的继任者。JavaFX 库作为公共 Java API\
  \ 提供。JavaFX 包含多项特性，使其成为开发富客户端应用程序的首选：\n\n*   JavaFX 使用 Java 编写，使您能够利用 Java 的所有特性，例如多线程、泛型、Lambda\
  \ 表达式等。您可以使用任何您喜欢的 Java 编辑器（如 NetBeans）来编写、编译、运行、调试和打包您的 JavaFX 应用程序。\n*   JavaFX\
  \ 通过其库支持数据绑定。\n*   JavaFX 代码可以使用任何支持 JVM 的脚本语言编写，例如 Visage、Groovy、Scala、Nashorn\
  \ 等。\n*   JavaFX 提供了两种构建用户界面的方式：使用 Java 代码和使用 FXML。FXML 是一种基于 XML 的可编写脚本的标记语言，用于声明式地定义用户界面。您可以从\
  \ [`http://gluonhq.com/products/scene-builder`](http://gluonhq.com/products/scene-builder)\
  \ 下载适用于 Java 9 的 Scene Builder 工具。\n*   JavaFX 提供丰富的多媒体支持，例如播放音频和视频。它利用了平台上可用的编解码器。\n\
  *   JavaFX 允许您在应用程序中嵌入 Web 内容。\n*   JavaFX 为应用效果和动画提供了开箱即用的支持，这对于开发游戏应用程序非常重要。在\
  \ JavaFX 中，您只需编写几行代码即可实现复杂的动画。\n\nJavaFX 平台由以下组件组成，以利用 Java 原生库以及平台上可用的硬件和软件。这些组件的排列如图\
  \ 8-1 所示。\n\n![A323071_2_En_8_Fig1_HTML.gif](img/A323071_2_En_8_Fig1_HTML.gif)\n\
  \n图 8-1.\n\n构成 JavaFX 平台的组件\n\n*   JavaFX 公共 API\n*   Quantum 工具包\n*   Prism\n*\
  \   Glass 窗口工具包\n*   媒体引擎\n*   Web 引擎\n\nJavaFX 中的 GUI 是作为场景图构建的。场景图是一组称为节点的可视化元素，它们以树状层次结构排列。场景图是使用公共\
  \ JavaFX API 构建的。场景图中的节点可以处理用户输入和手势。它们可以具有效果、变换和状态。场景图中的节点类型包括简单的用户界面控件，例如按钮、文本字段、2D\
  \ 和 3D 形状、图像、媒体（音频和视频）、Web 内容、图表等。\n\nPrism 是一个硬件加速的图形管线，用于渲染场景图。如果平台上没有硬件加速渲染可用，则使用\
  \ Java 2D 作为回退渲染机制。例如，在使用 Java 2D 进行渲染之前，JavaFX 会尝试在 Windows 上使用 DirectX，在 Mac、Linux\
  \ 和嵌入式平台上使用 OpenGL。\n\nGlass 窗口工具包使用原生操作系统提供图形和窗口服务，例如窗口和计时器。该工具包还负责管理事件队列。在 JavaFX\
  \ 中，事件队列由一个称为 JavaFX 应用程序线程的单一操作系统级别线程管理。所有用户输入事件都在 JavaFX 应用程序线程上分发。JavaFX 要求活动场景图只能在\
  \ JavaFX 应用程序线程上修改。\n\nPrism 使用一个独立于 JavaFX 应用程序线程的单独线程进行渲染。它通过在处理下一帧的同时渲染当前帧来加速渲染过程。当场景图被修改时（例如，在文本字段中输入文本），Prism\
  \ 需要重新渲染场景图。场景图与 Prism 的同步是通过一个称为脉冲事件的事件来完成的。当场景图被修改并且需要重新渲染时，一个脉冲事件会被排入 JavaFX\
  \ 应用程序线程的队列。脉冲事件表明场景图与 Prism 中的渲染层不同步，并且应该渲染 Prism 层的最新帧。脉冲事件被限制在每秒最多 60 帧。\n\n\
  媒体引擎负责在 JavaFX 中提供媒体支持，例如播放音频和视频。它利用了平台上可用的编解码器。媒体引擎使用一个单独的线程来处理媒体帧，并使用 JavaFX 应用程序线程将这些帧与场景图同步。媒体引擎基于\
  \ GStreamer，这是一个开源的多媒体框架。\n\nWeb 引擎负责处理嵌入在场景图中的 Web 内容（HTML）。Prism 负责渲染 Web 内容。Web\
  \ 引擎基于 Webkit，这是一个开源的 Web 浏览器引擎。它支持 HTML5、层叠样式表、JavaScript 和文档对象模型。\n\nQuantum 工具包是对低级组件（如\
  \ Prism、Glass、媒体引擎和 Web 引擎）的抽象。它还促进了低级组件之间的协调。\n\n## JavaFX 的历史\n\nJavaFX 最初由 Seebeyond\
  \ 公司的 Chris Oliver 开发，当时称为 F3（Form Follows Function）。F3 是一种用于轻松开发 GUI 应用程序的 Java\
  \ 脚本语言。它提供了声明式语法、静态类型、类型推断、数据绑定、动画、2D 图形、Swing 组件等特性。Seebeyond 被 Sun Microsystems\
  \ 收购，F3 于 2007 年更名为 JavaFX。Oracle 于 2010 年收购了 Sun Microsystems。Oracle 于 2013 年将\
  \ JavaFX 开源。\n\nJavaFX 的第一个版本于 2008 年第四季度发布。JavaFX 的当前版本是 9.0。JavaFX 的版本号从 2.2 跳到了\
  \ 8.0。从 Java 8 开始，Java SE 和 JavaFX 的版本号相同。未来，Java SE 和 JavaFX 的主要版本将同时发布，并且它们的版本将保持同步。例如，JavaFX\
  \ 9 与 Java SE 9 一起发布，JavaFX 10 将与 Java SE 10 一起发布，依此类推。\n\n表 8-1 列出了 JavaFX 的发布版本。从\
  \ Java SE 8 的发布开始，JavaFX 成为 Java SE 运行时的一部分，您无需进行任何额外设置即可编译和运行您的 JavaFX 程序。\n\n\
  表 8-1.\n\nJavaFX 发布版本\n\n| 发布日期 | 版本 | 备注 |\n| --- | --- | --- |\n| 2008 年第四季度 |\
  \ JavaFX 1.0 | 这是 JavaFX 的初始版本。它使用一种称为 JavaFX Script 的声明式语言来编写 JavaFX 代码。 |\n| 2009\
  \ 年第一季度 | JavaFX 1.1 | 引入了对 JavaFX Mobile 的支持。 |\n| 2009 年第二季度 | JavaFX 1.2 |  \
  \ |\n| 2010 年第二季度 | JavaFX 1.3 |   |\n| 2010 年第三季度 | JavaFX 1.3.1 |   |\n| 2011\
  \ 年第四季度 | JavaFX 2.0 | 放弃了对 JavaFX Script 和 JavaFX Mobile 的支持。它使用 Java 编程语言来编写 JavaFX\
  \ 代码。 |\n| 2012 年第二季度 | JavaFX 2.1 | 引入了对仅限桌面的 MacOS 的支持。 |\n| 2012 年第三季度 | JavaFX\
  \ 2.2 |   |\n| 2014 年第一季度 | JavaFX 8.0 | JavaFX 版本从 2.2 跳到了 8.0。从 Java 8 开始，JavaFX\
  \ 和 Java SE 的版本将保持一致。 |\n| 2017 年第三季度 | JavaFX 9.0 | 与 Java SE 9 一同发布。 |\n\n## 系统要求\n\
  \n要使用本章中的示例，您需要安装 JDK9。编译和运行本章中的程序不需要 NetBeans IDE。但是，NetBeans IDE 具有用于创建、运行和打包\
  \ JavaFX 应用程序的特殊功能，这使得使用 NetBeans 开发 JavaFX 应用程序更加容易。您可以使用任何其他 IDE，例如 Eclipse、JDeveloper、IntelliJ\
  \ IDEA 等，或者仅使用命令提示符来编译和运行 JavaFX 程序。\n\n\n\n## JavaFX 模块\n\n随着 JDK9 的发布，JavaFX API\
  \ 也实现了模块化。表 8-2 列出了所有 JavaFX 模块及其简要说明。你需要在模块中读取的 JavaFX 模块，取决于你在应用程序中需要使用的 JavaFX\
  \ 功能。\n\n表 8-2.\n\nJavaFX 模块\n\n| 模块名称 | 描述 |\n| --- | --- |\n| `javafx.base` |\
  \ 定义了 JavaFX UI 工具包的基础 API，包括用于绑定、属性、集合和事件的 API。 |\n| `javafx.controls` | 定义了 JavaFX\
  \ UI 工具包可用的 UI 控件、图表和皮肤。 |\n| `javafx.fxml` | 定义了 JavaFX UI 工具包的 FXML API。 |\n|\
  \ `javafx.graphics` | 定义了 JavaFX UI 工具包的核心场景图 API，例如布局容器、应用程序生命周期、形状、变换、画布、输入、绘制、图像处理和效果。它还定义了用于动画、CSS、并发、几何、打印和窗口的\
  \ API。 |\n| `javafx. media` | 定义了用于播放媒体和音频内容的 API。 |\n| `javafx.swing` | 定义了用于 JavaFX/Swing\
  \ 互操作的 API，允许在同一应用程序中混合使用 Swing 和 JavaFX 组件。 |\n| `javafx.web` | 定义了用于加载和显示 Web\
  \ 内容的 API。 |\n\n## JavaFX 源代码\n\n经验丰富的开发者有时会倾向于查看 JavaFX 库的源代码，以了解其内部实现机制。Oracle\
  \ 提供了 JavaFX 源代码。JDK9 将源代码复制到了 `JDK_HOME\\lib` 目录下。文件名为 `src.zip`。将文件解压到一个目录中，然后使用你喜欢的\
  \ Java 编辑器打开源代码。该文件包含了 JDK 和 JavaFX 的源代码。\n\n## JavaFX API 文档\n\n从 JDK9 开始，JavaFX\
  \ API 文档已包含在 JDK 的 API 文档中。你可以通过 [`https://docs.oracle.com/javase/9/docs/api/overview-summary.html`](https://docs.oracle.com/javase/9/docs/api/overview-summary.html)\
  \ 访问 JDK9 的在线 API 文档。\n\n## 你的第一个 JavaFX 应用程序\n\n你的第一个 JavaFX 应用程序将在窗口中显示文本 `Hello\
  \ JavaFX`。你将采用逐步递增的方法来开发你的第一个 JavaFX 应用程序，即尽可能少地添加代码行，并了解代码的作用及其必要性。接下来的几节将引导你完成这些步骤。\n\
  \n### 创建 HelloJavaFX 类\n\n一个 JavaFX 应用程序是一个必须继承自 `Application` 类的类。`Application`\
  \ 类位于 `javafx.application` 包中，该包又位于 `javafx.graphics` 模块中。因此，你的模块必须直接或通过传递依赖间接读取\
  \ `javafx.graphics` 模块。你将把类命名为 `HelloFXApp`，并将其存储在 `com.jdojo.javafx` 包中，该包位于 `jdojo.``javafx`\
  \ 模块内。请注意，清单 8-1 包含了 `jdojo.javafx` 模块的声明。\n\n```\n// HelloFXApp.java\npackage com.jdojo.javafx;\n\
  import javafx.application.Application;\npublic class HelloFXApp extends Application\
  \ {\n// 应用程序逻辑写在这里\n}\n```\n\n该程序包含一个包声明、一个 `import` 语句和一个类声明。代码中没有任何类似 JavaFX 的内容。它看起来和其他任何\
  \ Java 代码一样。然而，通过让 `HelloFXApp` 类继承自 `Application` 类，你已经满足了 JavaFX 应用程序的一个要求。此时，`HelloFXApp`\
  \ 类还无法编译。\n\n### 重写 start() 方法\n\n如果你尝试编译 `HelloFXApp class`，将会出现以下编译时错误：\n\n```\n\
  HelloFXApp 不是抽象的，并且没有覆盖 Application 中的抽象方法 start(Stage)\n```\n\n错误信息表明 `Application`\
  \ 类包含一个抽象方法 `start(Stage stage)`，而 `HelloFXApp` 类尚未覆盖该方法。作为一名 Java 开发者，你知道接下来该怎么做：要么将\
  \ `HelloFXApp` 类声明为抽象类，要么为 `start()` 方法提供实现。你需要在这个类中为 `start()` 方法提供实现。`Application`\
  \ 类中的 `start()` 方法声明如下：\n\n```\npublic abstract void start(Stage stage) throws java.lang.Exception\n\
  ```\n\n以下是你的应用程序的修订代码：\n\n```\n// HelloFXApp.java\npackage com.jdojo.javafx;\nimport\
  \ javafx.application.Application;\nimport javafx.stage.Stage;\npublic class HelloFXApp\
  \ extends Application {\n@Override\npublic void start(Stage stage) {\n// 启动应用程序的逻辑写在这里\n\
  }\n}\n```\n\n在修订后的代码中，你做了两件事：\n\n*   添加了一个 `import` 语句，用于从 `javafx.stage` 包中导入 `Stage`\
  \ 类。\n*   实现了 `start()` 方法。该方法的 `throws` 子句被省略了，根据 Java 中方法重写的规则，这是允许的。\n\n`start()`\
  \ 方法是 JavaFX 应用程序的入口点。它由 JavaFX 应用程序启动器调用。请注意，`start()` 方法接收一个 `Stage` 类的实例，该实例被称为应用程序的主舞台。你可以根据需要创建更多的舞台。然而，主舞台始终由\
  \ JavaFX 运行时为你创建。\n\n提示\n\n每个 JavaFX 应用程序类都必须继承自 `Application` 类，并为 `start(String\
  \ stage)` 方法提供实现。\n\n### 显示舞台\n\n与现实世界中的舞台类似，JavaFX 舞台用于显示一个场景。场景包含视觉元素——例如文本、形状、图像、控件、动画、效果等——用户可以与这些元素进行交互，这与所有基于\
  \ GUI 的应用程序一样。\n\n在 JavaFX 中，主舞台是场景的容器。舞台的外观和感觉会根据应用程序运行的环境而有所不同。你无需根据环境采取任何操作，因为\
  \ JavaFX 运行时为你处理了所有细节。\n\n由应用程序启动器创建的主舞台没有场景。你将在下一节中为你的舞台创建一个场景。\n\n你必须显示舞台才能看到其场景中包含的视觉元素。使用\
  \ `show()` 方法来显示舞台。你也可以使用 `setTitle()` 方法为舞台设置标题。`HelloFXApp` 类的修订代码如下：\n\n```\n\
  // HelloFXApp.java\npackage com.jdojo.javafx;\nimport javafx.application.Application;\n\
  import javafx.stage.Stage;\npublic class HelloFXApp extends Application {\n@Override\n\
  public void start(Stage stage) {\n// 为舞台设置标题\nstage.setTitle(\"Hello JavaFX Application\"\
  );\n// 显示舞台\nstage.show();\n}\n}\n```\n\n\n\n### 启动应用程序\n\n现在可以运行你的第一个 JavaFX 应用程序了。你可以使用以下两种选项之一来运行\
  \ JavaFX 应用程序：\n\n*   启动 JavaFX 应用程序时，类中不必包含 `main()` 方法。当你运行一个继承自 `Application`\
  \ 类的 Java 类时，如果被运行的类不包含 `main()` 方法，`java` 命令将启动 JavaFX 应用程序。\n*   在 JavaFX 应用程序类中包含一个\
  \ `main()` 方法。在 `main()` 方法内部，调用 `Application` 类的 `launch()` 静态方法来启动 JavaFX 应用程序。`launch()`\
  \ 方法接受一个 `String` 数组作为参数，该数组是传递给 JavaFX 应用程序的参数。\n\n如果你使用第一个选项，则无需为 `HelloFXApp`\
  \ 类编写任何额外代码。如果你使用第二个选项，则包含 `main()` 方法的 `HelloFXApp` 类的修改后代码将如清单 8-2 所示。\n\n```\n\
  // HelloFXApp.java\npackage com.jdojo.javafx;\nimport javafx.application.Application;\n\
  import javafx.stage.Stage;\npublic class HelloFXApp extends Application {\npublic\
  \ static void main(String[] args) {\n// 启动 JavaFX 应用程序\nApplication.launch(args);\n\
  }\n@Override\npublic void start(Stage stage) {\nstage.setTitle(\"Hello JavaFX Application\"\
  );\nstage.show();\n}\n}\n清单 8-2.\n一个没有场景的 JavaFX 应用程序\n```\n\n`main()` 方法调用 `launch()`\
  \ 方法，该方法将执行一些设置工作，然后调用 `HelloFXApp` 类的 `start()` 方法。你的 `start()` 方法会设置主舞台的标题并显示该舞台。\n\
  \n在准备运行第一个 JavaFX 应用程序之前，你还需要执行一个步骤。为了启动你的应用程序，JavaFX 需要访问并实例化 `HelloFXApp` 类的对象，这发生在\
  \ `javafx.graphics` 模块内部。你必须将包含 JavaFX 应用程序启动类的包至少导出到 `javafx.graphics` 模块。`HelloFXApp`\
  \ 类位于 `com.jdojo.javafx` 包中。你的模块（`jdojo.javafx`）必须将 `com.jdojo.javafx` 包至少导出到 `javafx.graphics`\
  \ 包。\n\n假设 `jdojo.javafx` 模块的声明如下，该声明并未将 `com.jdojo.javafx` 包导出到 `javafx.graphics`\
  \ 模块：\n\n```\nmodule jdojo.javafx {\nrequires javafx.graphics;\n}\n```\n\n让我们尝试使用以下命令运行\
  \ `HelloFXApp` 类，这将导致一个错误：\n\n```\nC:\\Java9APIsAndModules>java --module-path dist\
  \ --module jdojo.javafx/com.jdojo.javafx.HelloFXApp\nException in Application constructor\n\
  ...\nCaused by: java.lang.RuntimeException: Unable to construct Application instance:\
  \ class com.jdojo.javafx.HelloFXApp\n...\nCaused by: java.lang.IllegalAccessException:\
  \ class com.sun.javafx.application.LauncherImpl (in module javafx.graphics) cannot\
  \ access class com.jdojo.javafx.HelloFXApp (in module jdojo.javafx) because module\
  \ jdojo.javafx does not export com.jdojo.javafx to module javafx.graphics\n...\n\
  ```\n\n你需要仔细阅读错误信息以了解原因。它指出 `javafx.graphics` 模块无法访问 `HelloFXApp` 类，因为 `jdojo.javafx`\
  \ 模块没有导出 `com.jdojo.javafx` 包。要修复此错误，你需要在 `jdojo.javafx` 模块的声明中添加以下语句之一：\n\n```\n\
  // 将 com.jdojo.javafx 包导出到 javafx.graphics 模块\nexports com.jdojo.javafx to javafx.graphics;\n\
  // 将 com.jdojo.javafx 包导出到所有其他模块\nexports com.jdojo.javafx;\n```\n\n`jdojo.javafx`\
  \ 模块将 `com.jdojo.javafx` 包导出到所有其他模块，如清单 8-1 所示。当你运行 `HelloFXApp` 类时，将显示一个带有标题栏的窗口，如图\
  \ 8-2 所示。\n\n![A323071_2_En_8_Fig2_HTML.jpg](img/A323071_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2.\n\n一个没有场景的 JavaFX 舞台\n\n窗口的主区域是空的。这是舞台显示其场景的内容区域。由于你的舞台还没有场景，你会看到一个空白区域。标题栏显示你在\
  \ `start()` 方法中设置的标题。\n\n你可以使用窗口标题栏中的“关闭”菜单选项来关闭应用程序。在 Windows 上使用 Alt+F4 关闭窗口。你也可以使用平台提供的任何其他选项来关闭窗口。\n\
  \n提示\n\n`Application` 类的 `launch()` 方法在所有窗口关闭或应用程序通过 `Platform.exit()` 方法退出之前不会返回。`Platform`\
  \ 类位于 `javafx.application` 包中。\n\n到目前为止，你还没有看到 JavaFX 中任何令人兴奋的东西。你需要等到下一节创建场景时才能看到。\n\
  \n### 添加 main() 方法\n\n如前一节所述，Java 启动器（`java` 命令）不需要 `main()` 方法来启动 JavaFX 应用程序。如果你要运行的类继承自\
  \ `Application` 类，`java` 命令会自动为你调用 `Application.launch()` 方法来启动 JavaFX 应用程序。\n\n\
  如果你使用 NetBeans IDE 创建 JavaFX 项目，并且通过运行 JavaFX 项目来运行应用程序，则无需 `main()` 方法来启动 JavaFX\
  \ 应用程序。但是，当你将 JavaFX 应用程序类作为文件运行时，例如，选择 `HelloFXApp` 文件，右键单击它，然后从菜单中选择“运行文件”选项，NetBeans\
  \ IDE 要求你具有 `main()` 方法。某些 IDE 仍然需要 `main()` 方法来启动 JavaFX 应用程序。本章中的所有示例都包含将启动 JavaFX\
  \ 应用程序的 `main()` 方法。\n\n\n\n### 向舞台添加场景\n\n`Scene` 类的实例（位于 `javafx.scene` 包中）代表一个场景。一个舞台包含一个场景。一个场景包含可视化内容。\n\
  \n场景的内容以树状层次结构排列。层次结构的顶部是根节点。根节点可以包含子节点，子节点又可以包含它们自己的子节点，依此类推。创建场景必须有一个根节点。你将使用\
  \ `VBox` 作为根节点。`VBox` 代表垂直布局框，它会垂直排列其子节点。\n\n```\nVBox root = new VBox();\n```\n\
  \n提示\n\n任何继承自 `javafx.scene.Parent` 类的节点都可以用作场景的根节点。有几种节点，称为布局面板或容器——例如 `VBox`、`HBox`、`Pane`、`FlowPane`、`GridPane`、`TilePane`\
  \ 等——可以用作根节点。`Group` 是一个特殊的容器，用于将子节点组合在一起。\n\n一个可以拥有子节点的节点会提供一个 `getChildren()`\
  \ 方法，该方法返回其子节点的 `ObservableList`。要向节点添加子节点，只需将子节点添加到 `ObservableList` 中。以下代码片段将一个\
  \ `Text` 节点添加到 `VBox`：\n\n```\n// 创建一个 VBox 节点\nVBox root = new VBox();\n// 创建一个\
  \ Text 节点\nText msg = new Text(\"Hello JavaFX\");\n// 将 Text 节点作为子节点添加到 VBox\nroot.getChildren().add(msg);\n\
  ```\n\n`Scene` 类包含多个构造器。你将使用允许指定根节点和场景大小的那个构造器。以下语句创建了一个场景，以 `VBox` 为根节点，宽度为 300\
  \ 像素，高度为 50 像素：\n\n```\n// 创建一个场景\nScene scene = new Scene(root, 300, 50);\n```\n\
  \n你需要通过调用 `Stage` 类的 `setScene()` 方法将场景设置到舞台。\n\n```\n// 将场景设置到舞台\nstage.setScene(scene);\n\
  ```\n\n就是这样。你已经完成了第一个包含场景的 JavaFX 程序。清单 8-3 包含了完整的程序。该程序显示一个窗口，如图 8-3 所示。\n\n![A323071_2_En_8_Fig3_HTML.jpg](img/A323071_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3.\n\n一个包含带有 Text 节点的场景的 JavaFX 应用程序\n\n```\n// HelloFXApp.java\npackage com.jdojo.javafx;\n\
  import javafx.application.Application;\nimport javafx.scene.Scene;\nimport javafx.scene.layout.VBox;\n\
  import javafx.scene.text.Text;\nimport javafx.stage.Stage;\npublic class HelloFXApp\
  \ extends Application {\npublic static void main(String[] args) {\nApplication.launch(args);\n\
  }\n@Override\npublic void start(Stage stage) {\nText msg = new Text(\"Hello JavaFX\"\
  );\nVBox root = new VBox();\nroot.getChildren().add(msg);\nScene scene = new Scene(root,\
  \ 300, 50);\nstage.setScene(scene);\nstage.setTitle(\"Hello JavaFX Application\"\
  );\nstage.show();\n}\n}\n清单 8-3.\n一个包含带有 Text 节点的场景的 JavaFX 应用程序\n```\n\n## 改进你的第一个\
  \ JavaFX 应用程序\n\nJavaFX 的能力远不止你目前所见。让我们增强第一个应用程序，添加一些更多的用户界面元素，例如按钮和文本字段。这一次，用户将能够与应用程序交互。使用\
  \ `Button` 类的实例来创建一个按钮，如下所示：\n\n```\n// 创建一个带有 \"Exit\" 文本的按钮\nButton exitBtn =\
  \ new Button(\"Exit\");\n```\n\nJavaFX 控件的类位于 `javafx.controls` 模块中。`javafx.controls`\
  \ 模块传递性地读取 `javafx.graphics` 模块，而 `javafx.graphics` 模块又传递性地读取 `java.base` 模块。如果你的模块（在本章中为\
  \ `jdojo.javafx` 模块）读取了 `javafx.controls` 模块，则你的模块无需显式读取 `javafx.graphics` 和 `javafx.base`\
  \ 模块。\n\n当按钮被点击时，会触发一个 `ActionEvent`。你可以添加一个 `ActionEvent` 处理器来处理该事件。使用 `setOnAction()`\
  \ 方法为按钮设置一个 `ActionEvent` 处理器。以下语句为按钮设置了一个 `ActionEvent` 处理器。该处理器会终止应用程序。你可以使用 lambda\
  \ 表达式或匿名类来设置 `ActionEvent` 处理器。以下代码片段展示了两种方法：\n\n```\n// 使用 lambda 表达式\nexitBtn.setOnAction(e\
  \ -> Platform.exit());\n// 使用匿名类\nimport javafx.event.ActionEvent;\nimport javafx.event.EventHandler;\n\
  ...\nexitBtn.setOnAction(new EventHandler() {\n@Override\npublic void handle(ActionEvent\
  \ e) {\nPlatform.exit();\n}\n});\n```\n\n清单 8-4 中的程序展示了如何向场景添加更多节点。该程序使用 `Label`\
  \ 类的 `setStyle()` 方法将 `Label` 的填充颜色设置为蓝色。我稍后会简要讨论在 JavaFX 中使用 CSS。\n\n```\n// ImprovedHelloFXApp.java\n\
  package com.jdojo.javafx;\nimport javafx.application.Application;\nimport javafx.application.Platform;\n\
  import javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.control.Label;\n\
  import javafx.scene.control.TextField;\nimport javafx.scene.layout.VBox;\nimport\
  \ javafx.stage.Stage;\npublic class ImprovedHelloFXApp extends Application {\npublic\
  \ static void main(String[] args) {\nApplication.launch(args);\n}\n@Override\npublic\
  \ void start(Stage stage) {\nLabel nameLbl = new Label(\"Enter your name:\");\n\
  TextField nameFld = new TextField();\nLabel msg = new Label();\nmsg.setStyle(\"\
  -fx-text-fill: blue;\");\n// 创建按钮\nButton sayHelloBtn = new Button(\"Say Hello\"\
  );\nButton exitBtn = new Button(\"Exit\");\n// 为 Say Hello 按钮添加事件处理器\nsayHelloBtn.setOnAction(e\
  \ -> {\nString name = nameFld.getText();\nif (name.trim().length() > 0) {\nmsg.setText(\"\
  Hello \" + name);\n} else {\nmsg.setText(\"Hello there\");\n}\n});\n// 为 Exit 按钮添加事件处理器\n\
  exitBtn.setOnAction(e -> Platform.exit());\n// 创建根节点\nVBox root = new VBox();\n\
  // 设置子节点之间的垂直间距为 5 像素\nroot.setSpacing(5);\n// 向根节点添加子节点\nroot.getChildren().addAll(nameLbl,\
  \ nameFld, msg, sayHelloBtn, exitBtn);\nScene scene = new Scene(root, 350, 150);\n\
  stage.setScene(scene);\nstage.setTitle(\"Improved Hello JavaFX Application\");\n\
  stage.show();\n}\n}\n清单 8-4.\n在 JavaFX 应用程序中与用户交互\n```\n\n改进后的 HelloFX 应用程序显示一个窗口，如图\
  \ 8-4 所示。该窗口包含两个标签、一个文本字段和两个按钮。使用 `VBox` 作为场景的根节点。在文本字段中输入一个名字，然后点击 Say Hello 按钮查看问候消息。不输入名字直接点击\
  \ Say Hello 按钮会显示消息 `Hello there`。应用程序在 `Label` 控件中显示消息。点击 Exit 按钮退出应用程序。\n\n![A323071_2_En_8_Fig4_HTML.jpg](img/A323071_2_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4.\n\n一个包含两个标签、一个文本字段和两个按钮的 JavaFX 应用程序\n\n\n\n## JavaFX 应用程序的生命周期\n\nJavaFX\
  \ 运行时创建了多个线程，用于在应用程序的不同阶段执行不同的任务。本节仅关注那些在应用程序生命周期中用于调用 `Application` 类方法的线程。JavaFX\
  \ 运行时创建了（除其他线程外）两个名为：\n\n*   JavaFX-Launcher\n*   JavaFX Application Thread\n\n\
  的线程。\n\n`Application` 类的 `launch()` 静态方法会创建这些线程。在 JavaFX 应用程序的生命周期内，JavaFX 运行时按顺序调用\
  \ JavaFX 应用程序类的以下方法：\n\n*   无参构造器\n*   `init()` 方法\n*   `start()` 方法\n*   `stop()`\
  \ 方法\n\nJavaFX 运行时在 JavaFX Application Thread 上创建指定应用程序类的实例。\n\nJavaFX-Launcher\
  \ 线程调用应用程序类的 `init()` 方法。`Application` 类中 `init()` 方法的实现是空的。你可以在你的应用程序类中重写此方法。不允许在\
  \ JavaFX-Launcher 线程上创建 `Stage` 或 `Scene`。它们必须在 JavaFX Application Thread 上创建。因此，你不能在\
  \ `init()` 方法内部创建 `Stage` 或 `Scene`。尝试这样做会抛出运行时异常。在 `init()` 方法中创建 UI 控件（例如按钮、形状等）是允许的。\n\
  \nJavaFX Application Thread 调用应用程序类的 `start(Stage stage)` 方法。请注意，`Application` 类中的\
  \ `start()` 方法被声明为 `abstract`，你必须在你的应用程序类中重写此方法。\n\n此时，`launch()` 方法会等待 JavaFX 应用程序结束。\n\
  \n当应用程序结束时，JavaFX Application Thread 会调用应用程序类的 `stop()` 方法。`Application` 类中 `stop()`\
  \ 方法的默认实现是空的。你需要在你的应用程序类中重写此方法，以便在应用程序停止时执行你的逻辑。\n\n清单 8-5 中的程序演示了 JavaFX 应用程序的生命周期。它显示了一个带有“退出”按钮的舞台。当舞台显示时，你将看到输出的前三行。你需要通过单击“退出”按钮关闭舞台，才能看到输出的最后一行。\n\
  \n```\n// FXLifeCycleApp.java\npackage com.jdojo.javafx;\nimport javafx.application.Application;\n\
  import javafx.application.Platform;\nimport javafx.scene.Group;\nimport javafx.scene.Scene;\n\
  import javafx.scene.control.Button;\nimport javafx.stage.Stage;\npublic class FXLifeCycleApp\
  \ extends Application {\npublic FXLifeCycleApp() {\nString name = Thread.currentThread().getName();\n\
  System.out.println(\"FXLifeCycleApp() constructor: \" + name);\n}\npublic static\
  \ void main(String[] args) {\nApplication.launch(args);\n}\n@Override\npublic void\
  \ init() {\nString name = Thread.currentThread().getName();\nSystem.out.println(\"\
  init() method: \" + name);\n}\n@Override\npublic void start(Stage stage) {\nString\
  \ name = Thread.currentThread().getName();\nSystem.out.println(\"start() method:\
  \ \" + name);\n// 向场景中添加一个退出按钮\nButton exitBtn = new Button(\"Exit\");\nexitBtn.setOnAction(e\
  \ -> Platform.exit());\nScene scene = new Scene(new Group(exitBtn), 300, 100);\n\
  stage.setScene(scene);\nstage.setTitle(\"JavaFX Application Lifecycle\");\nstage.show();\n\
  }\n@Override\npublic void stop() {\nString name = Thread.currentThread().getName();\n\
  System.out.println(\"stop() method: \" + name);\n}\n}\nFXLifeCycleApp() constructor:\
  \ JavaFX Application Thread\ninit() method: JavaFX-Launcher\nstart() method: JavaFX\
  \ Application Thread\nstop() method: JavaFX Application Thread\n清单 8-5.\nJavaFX\
  \ 应用程序的生命周期\n```\n\n## 终止 JavaFX 应用程序\n\nJavaFX 应用程序可以被显式或隐式地终止。你可以通过调用 `Platform`\
  \ 类的 `exit()` 静态方法来显式终止 JavaFX 应用程序。当在 `start()` 方法之后或之内调用此方法时，会调用 `Application`\
  \ 类的 `stop()` 方法，然后 JavaFX Application Thread 被终止。此时，如果只有守护线程在运行，JVM 将退出。如果 `Platform.exit()`\
  \ 方法是从 `Application` 类的构造器或 `init()` 方法中调用的，则可能不会调用 `Application` 类的 `stop()` 方法。\n\
  \n当最后一个窗口关闭时，JavaFX 应用程序可能会被隐式终止。可以使用 `Platform` 类的静态方法 `setImplicitExit(boolean\
  \ implicitExit)` 来开启或关闭此行为。向此方法传递 `true` 会开启此行为。传递 `false` 会关闭此行为。默认情况下，此行为是开启的。这就是到目前为止大多数示例中，当你关闭窗口时应用程序会终止的原因。当此行为开启时，在终止\
  \ JavaFX Application Thread 之前会调用 `Application` 类的 `stop()` 方法。终止 JavaFX Application\
  \ Thread 并不总是会终止 JVM。只有当所有正在运行的非守护线程都终止时，JVM 才会终止。如果 JavaFX 应用程序的隐式终止行为被关闭，你必须调用\
  \ `Platform` 类的 `exit()` 方法来终止应用程序。\n\n\n\n## 什么是属性和绑定？\n\n属性是类的一个公开可访问的属性，它会影响类的状态、行为或两者兼有。尽管属性是公开可访问的，但其使用（读取/写入）会调用隐藏了实际实现的方法来访问数据。属性是可观察的，因此当它的值发生变化时，相关方会收到通知。属性可以是只读、只写或读写。只读属性有\
  \ getter 但没有 setter。只写属性有 setter 但没有 getter。读写属性既有 getter 也有 setter。\n\n与 C# 等其他编程语言不同，Java\
  \ 在语言层面并不支持属性。Java 对属性的支持是通过 JavaBeans API 和设计模式来实现的。有关 Java 中属性的更多详细信息，请参考 JavaBeans\
  \ 规范，该规范可从 [`www.oracle.com/technetwork/java/javase/documentation/spec-136004.html`](http://www.oracle.com/technetwork/java/javase/documentation/spec-136004.html)\
  \ 下载。\n\n在编程中，“绑定”一词有多种使用场景。在这里，我将在数据绑定的上下文中对其进行定义。数据绑定定义了程序中数据元素（通常是变量）之间的关系，以保持它们同步。在\
  \ GUI 应用程序中，数据绑定经常用于将数据模型中的元素与相应的 UI 元素同步。考虑以下语句，假设 `x`、`y` 和 `z` 是数值变量：\n\n```\n\
  x = y + z;\n```\n\n该语句定义了 `x`、`y` 和 `z` 之间的绑定。当该语句执行时，`x` 的值与 `y` 和 `z` 的值之和同步。绑定还具有时间因素。在此语句中，`x`\
  \ 的值绑定到 `y` 和 `z` 的和，并且仅在语句执行时有效。在语句执行前后，`x` 的值可能不等于 `y` 和 `z` 的和。有时，我们希望绑定在一段时间内保持有效。考虑以下使用\
  \ `listPrice`、`discounts` 和 `taxes` 定义绑定的语句：\n\n```\nsoldPrice = listPrice - discounts\
  \ + taxes;\n```\n\n对于这种情况，我们希望绑定永远有效，这样每当 `listPrice`、`discounts` 或 `taxes` 发生变化时，售价都能被正确计算。在此绑定中，`listPrice`、`discounts`\
  \ 和 `taxes` 被称为依赖项，并且可以说 `soldPrice` 绑定到了 `listPrice`、`discounts` 和 `taxes`。\n\n\
  为了使绑定正常工作，必须在依赖项发生变化时通知它。支持绑定的编程语言提供了一种机制，可以向依赖项注册监听器。当依赖项失效或发生变化时，所有监听器都会收到通知。绑定在收到此类通知时，可能会与它的依赖项同步自身。\n\
  \n绑定可以是急切绑定或惰性绑定。在急切绑定中，当依赖项发生变化时，绑定变量会立即重新计算。在惰性绑定中，当依赖项发生变化时，绑定变量不会重新计算；它会在下次读取其值时重新计算。与急切绑定相比，惰性绑定性能更好。\n\
  \n绑定可以是单向的或双向的。单向绑定仅在一个方向上起作用：依赖项的变化会传播到绑定变量。双向绑定在两个方向上都起作用，其中绑定变量和依赖项彼此保持值同步。通常，双向绑定仅在两个变量之间定义。例如，双向绑定\
  \ `x = y` 和 `y = x` 声明 `x` 和 `y` 的值始终相同。\n\n从数学上讲，无法在多个变量之间唯一地定义双向绑定。在前面的例子中，售价绑定是一个单向绑定。如果你想将其变为双向绑定，当售价发生变化时，无法唯一地计算出标价、折扣和税费的值。在另一个方向上存在无限多种可能性。\n\
  \n具有 GUI 的应用程序为用户提供 UI 控件，例如文本字段、复选框、按钮等，以操作数据。UI 控件中显示的数据必须与底层数据模型同步，反之亦然。在这种情况下，需要双向绑定来保持\
  \ UI 和数据模型同步。\n\n\n\n## JavaFX 中的属性与绑定\n\nJavaFX 通过属性与绑定 API 支持属性、事件和绑定。JavaFX 对属性的支持相比\
  \ JavaBeans 属性是一次巨大的飞跃。JavaFX 中的所有属性都是可观察的，可以观察其失效和值的变化。你可以拥有读写属性或只读属性。所有读写属性都支持绑定。JavaFX\
  \ 中的属性可以表示一个值或一组值的集合。\n\n在 JavaFX 中，属性是对象。每种类型的属性都有一个属性类层次结构。例如，`IntegerProperty`、`DoubleProperty`\
  \ 和 `StringProperty` 类分别表示 `int`、`double` 和 `String` 类型的属性。这些类是 `abstract`（抽象）的。它们有两种实现类：一种用于表示读写属性，另一种用于表示只读属性的包装器。例如，`SimpleDoubleProperty`\
  \ 和 `ReadOnlyDoubleWrapper` 类是具体类，其对象分别用作 `double` 类型的读写属性和只读属性。以下是一个创建初始值为 100\
  \ 的 `IntegerProperty` 的示例：\n\n```\nIntegerProperty counter = new SimpleIntegerProperty(100);\n\
  ```\n\n属性类提供两对 getter 和 setter 方法：\n\n*   `get()` 和 `set()` 方法\n*   `getValue()`\
  \ 和 `setValue()` 方法\n\n`get()` 和 `set()` 方法分别用于获取和设置属性的值。对于原始类型属性，它们处理原始类型值。例如，对于\
  \ `IntegerProperty`，`get()` 方法的返回类型和 `set()` 方法的参数类型是 `int`。`getValue()` 和 `setValue()`\
  \ 方法处理对象类型；例如，对于 `IntegerProperty`，它们的返回类型和参数类型是 `Integer`。\n\n对于引用类型属性，例如 `StringProperty`\
  \ 和 `ObjectProperty<T>`，两对 getter 和 setter 都处理对象类型。也就是说，`StringProperty` 的 `get()`\
  \ 和 `getValue()` 方法都返回一个 `String`，而 `set()` 和 `setValue()` 方法都接受一个 `String` 参数。由于原始类型的自动装箱，使用哪个版本的\
  \ getter 和 setter 并不重要。`getValue()` 和 `setValue()` 方法的存在是为了帮助你以对象类型编写通用代码。\n\n以下代码片段使用了\
  \ `IntegerProperty` 及其 `get()` 和 `set()` 方法。`counter` 属性是一个读写属性，因为它是 `SimpleIntegerProperty`\
  \ 类的对象。\n\n```\nIntegerProperty counter = new SimpleIntegerProperty(1);\nint counterValue\
  \ = counter.get();\nSystem.out.println(\"Counter:\" + counterValue);\ncounter.set(2);\n\
  counterValue = counter.get();\nSystem.out.println(\"Counter:\" + counterValue);\n\
  Counter:1\nCounter:2\n```\n\n处理只读属性有点棘手。`ReadOnlyXxxWrapper` 类包装了 `Xxx` 类型的两个属性：一个只读属性和一个读写属性。这两个属性是同步的。它的\
  \ `getReadOnlyProperty()` 方法返回一个 `ReadOnlyXxxProperty` 对象。以下代码片段展示了如何创建一个只读的 `Integer`\
  \ 属性：\n\n```\n// 创建一个只读包装器属性\nReadOnlyIntegerWrapper idWrapper = new ReadOnlyIntegerWrapper(100);\n\
  // 获取只读包装器属性对象的只读版本\nReadOnlyIntegerProperty id = idWrapper.getReadOnlyProperty();\n\
  System.out.println(\"idWrapper:\" + idWrapper.get());\nSystem.out.println(\"id:\"\
  \ + id.get());\n// 更改值\nidWrapper.set(101);\nSystem.out.println(\"idWrapper:\" +\
  \ idWrapper.get());\nSystem.out.println(\"id:\" + id.get());\nidWrapper:100\nid:100\n\
  idWrapper:101\nid:101\n```\n\n`idWrapper` 属性是读写的，而 `id` 属性是只读的。当 `idWrapper` 中的值改变时，`id`\
  \ 中的值会自动改变。要在类中定义一个只读属性，你可以将 `idWrapper` 声明为私有实例变量。如果需要在类外部使用其值，则返回 `id`，这样外部世界可以读取该值但无法更改它。\n\
  \n你可以使用七种表示单个值的属性类型。这些属性的基类命名为 `XxxProperty`，只读基类命名为 `ReadOnlyXxxProperty`，包装器类命名为\
  \ `ReadOnlyXxxWrapper`。每种类型的 `Xxx` 值列于表 8-3 中。\n\n表 8-3.\n\n包装单个值的属性类\n\n| 类型 |\
  \ Xxx 值 |\n| --- | --- |\n| `int` | `Integer` |\n| `long` | `Long` |\n| `float`\
  \ | `Float` |\n| `double` | `Double` |\n| `boolean` | `Boolean` |\n| `String` |\
  \ `String` |\n| `Object` | `Object` |\n\n一个属性对象包装了三部分信息：\n\n*   包含它的 bean 的引用\n\
  *   一个名称\n*   一个值\n\n当你创建属性对象时，可以提供这三部分信息中的全部或都不提供。具体属性类（命名为 `SimpleXxxProperty`\
  \ 和 `ReadOnlyXxxWrapper`）提供了四个构造函数，允许你提供这些信息的组合。以下是 `SimpleIntegerProperty` 类的构造函数：\n\
  \n*   `SimpleIntegerProperty()`\n*   `SimpleIntegerProperty(int initialValue)`\n\
  *   `SimpleIntegerProperty(Object bean, String name)`\n*   `SimpleIntegerProperty(Object\
  \ bean, String name, int initialValue)`\n\n初始值的默认值取决于属性的类型。对于数值类型为零，对于 `boolean`\
  \ 类型为 `false`，对于引用类型为 `null`。\n\n属性对象可以是 bean 的一部分，也可以是独立对象。指定的 `bean` 是包含该属性的 bean\
  \ 对象的引用。对于独立属性对象，它可以是 `null`。其默认值为 `null`。\n\n属性的名称就是它的名字。如果未提供，则默认为空字符串。\n\n以下代码片段创建了一个作为\
  \ bean 一部分的属性对象，并设置了所有三个值：\n\n```\npublic class Person {\nprivate StringProperty\
  \ name = new SimpleStringProperty(this, \"name\", \"Li\");\n// 此处添加 Person 类的更多代码\n\
  }\n```\n\n`SimpleStringProperty` 类构造函数的第一个参数是 `this`，即 `Person` bean 的引用；第二个参数 `\"\
  name\"` 是属性的名称；第三个参数 `\"Li\"` 是属性的值。\n\n每个属性类都包含 `getBean()` 和 `getName()` 方法，分别返回\
  \ bean 引用和属性名称。\n\n\n\n### 在 JavaFX Bean 中使用属性\n\n在上一节中，你了解了将 JavaFX 属性作为独立对象使用。在本节中，你将在类中使用它们来定义属性。让我们创建一个包含三个属性（`ISBN`、`title`\
  \ 和 `price`）的 `Book` 类。\n\n在 JavaFX 中，你不会将类的属性声明为原始类型之一。相反，你会使用 JavaFX 属性类之一。`Book`\
  \ 类的 `title` 属性将按如下方式声明。它像往常一样被声明为 `private`。\n\n```\npublic class Book {\nprivate\
  \ StringProperty title = new SimpleStringProperty(this, \"title\", \"Unknown\");\n\
  }\n```\n\n你需要为属性声明一个 `public` 的 getter，按照惯例，它被命名为 `XxxProperty`，其中 `Xxx` 是属性的名称。该\
  \ getter 返回属性的引用。对于你的 `title` 属性，getter 将被命名为 `titleProperty`，如下所示：\n\n```\npublic\
  \ class Book {\nprivate StringProperty title = new SimpleStringProperty(this, \"\
  title\", \"Unknown\");\npublic final StringProperty titleProperty() {\nreturn title;\n\
  }\n}\n```\n\n`Book` 类的声明可以很好地处理 `title` 属性，如下面的代码片段所示，该代码片段设置并获取一本书的标题：\n\n```\n\
  Book beginningJava8 = new Book();\nbeginningJava9.titleProperty().set(\"Beginning\
  \ Java 9\");\nString title = beginningJava9.titleProperty().get();\n```\n\n根据 JavaFX\
  \ 设计模式（并非出于任何技术要求），JavaFX 属性具有与 JavaBean 中的 getter 和 setter 类似的 getter 和 setter。getter\
  \ 的返回类型和 setter 的参数类型与属性值的类型相同。`title` 属性的 `getTitle()` 和 `setTitle()` 方法声明如下：\n\
  \n```\npublic class Book {\nprivate StringProperty title = new SimpleStringProperty(this,\
  \ \"title\", \"Unknown\");\npublic final StringProperty titleProperty() {\nreturn\
  \ title;\n}\npublic final String getTitle() {\nreturn title.get();\n}\npublic final\
  \ void setTitle(String title) {\nthis.title.set(title);\n}\n}\n```\n\n请注意，`getTitle()`\
  \ 和 `setTitle()` 方法在内部使用 `title` 属性对象来获取和设置标题值。\n\n提示\n\n在 JavaFX 中，按照惯例，类属性的 getter\
  \ 和 setter 被声明为 `final`。添加了使用 JavaBeans 命名约定的额外 getter 和 setter，以使该类与使用旧 JavaBeans\
  \ 命名约定来识别类属性的旧工具和框架互操作。\n\n以下代码片段显示了为 `Book` 类声明只读 `ISBN` 属性的方式：\n\n```\npublic\
  \ class Book {\nprivate ReadOnlyStringWrapper ISBN = new ReadOnlyStringWrapper(this,\
  \ \"ISBN\", \"Unknown\");\npublic final String getISBN() {\nreturn ISBN.get();\n\
  }\npublic final ReadOnlyStringProperty ISBNProperty() {\nreturn ISBN.getReadOnlyProperty();\n\
  }\n// 此处为 Book 类的更多代码...\n}\n```\n\n请注意关于只读 `ISBN` 属性声明的以下几点：\n\n*   它使用 `ReadOnlyStringWrapper`\
  \ 类而不是 `SimpleStringProperty` 类。\n*   没有用于属性值的 setter。你可以声明一个；但是，它必须是 `private`\
  \ 的。\n*   属性值的 getter 的工作方式与读写属性相同。\n*   `ISBNProperty()` 方法使用 `ReadOnlyStringProperty`\
  \ 作为返回类型，而不是 `ReadOnlyStringWrapper`。它从包装器对象获取属性对象的只读版本并返回该版本。\n\n对于 `Book` 类的用户来说，其\
  \ `ISBN` 属性是只读的。但是，它可以在内部更改，并且更改将自动反映在属性对象的只读版本中。清单 8-6 显示了 `Book` 类的完整代码。\n\n```\n\
  // Book.java\npackage com.jdojo.javafx;\nimport javafx.beans.property.DoubleProperty;\n\
  import javafx.beans.property.ReadOnlyStringProperty;\nimport javafx.beans.property.ReadOnlyStringWrapper;\n\
  import javafx.beans.property.SimpleDoubleProperty;\nimport javafx.beans.property.SimpleStringProperty;\n\
  import javafx.beans.property.StringProperty;\npublic class Book {\nprivate StringProperty\
  \ title = new SimpleStringProperty(this, \"title\", \"Unknown\");\nprivate DoubleProperty\
  \ price = new SimpleDoubleProperty(this, \"price\", 0.0);\nprivate ReadOnlyStringWrapper\
  \ ISBN = new ReadOnlyStringWrapper(this, \"ISBN\", \"Unknown\");\npublic Book()\
  \ {\n}\npublic Book(String title, double price, String ISBN) {\nthis.title.set(title);\n\
  this.price.set(price);\nthis.ISBN.set(ISBN);\n}\npublic final String getTitle()\
  \ {\nreturn title.get();\n}\npublic final void setTitle(String title) {\nthis.title.set(title);\n\
  }\npublic final StringProperty titleProperty() {\nreturn title;\n}\npublic final\
  \ double getprice() {\nreturn price.get();\n}\npublic final void setPrice(double\
  \ price) {\nthis.price.set(price);\n}\npublic final DoubleProperty priceProperty()\
  \ {\nreturn price;\n}\npublic final String getISBN() {\nreturn ISBN.get();\n}\n\
  public final ReadOnlyStringProperty ISBNProperty() {\nreturn ISBN.getReadOnlyProperty();\n\
  }\n}\n清单 8-6.\n一个包含一个只读属性和两个读写属性的 Book 类\n```\n\n清单 8-7 测试了 `Book` 类的属性。它创建一个 `Book`\
  \ 对象，打印详细信息，更改一些属性，然后再次打印详细信息。请注意 `printDetails()` 方法中 `ReadOnlyProperty` 参数类型的使用。所有属性类都直接或间接地实现了\
  \ `ReadOnlyProperty` 接口。属性实现类的 `toString()` 方法返回一个格式良好的字符串，其中包含属性的所有相关信息。我没有使用属性对象的\
  \ `toString()` 方法，因为我想向你展示 JavaFX 属性的不同方法的使用。\n\n```\n// BookPropertyTest.java\n\
  package com.jdojo.javafx;\nimport javafx.beans.property.ReadOnlyProperty;\npublic\
  \ class BookPropertyTest {\npublic static void main(String[] args) {\nBook book\
  \ = new Book(\"Beginning Java 9\", 49.99, \"148422843X\");\nSystem.out.println(\"\
  创建 Book 对象后...\");\n// 打印属性详细信息\nprintDetails(book.titleProperty());\nprintDetails(book.priceProperty());\n\
  printDetails(book.ISBNProperty());\n// 更改书的属性\nbook.setTitle(\"Learn JavaFX 8\"\
  );\nbook.setPrice(59.99);\nSystem.out.println(\"\\n 更改 Book 属性后...\");\n// 打印属性详细信息\n\
  printDetails(book.titleProperty());\nprintDetails(book.priceProperty());\nprintDetails(book.ISBNProperty());\n\
  }\npublic static void printDetails(ReadOnlyProperty p) {\nString name = p.getName();\n\
  Object value = p.getValue();\nObject bean = p.getBean();\nString beanClassName =\
  \ (bean == null) ? \"null\" : bean.getClass().getSimpleName();\nString propClassName\
  \ = p.getClass().getSimpleName();\nSystem.out.print(propClassName);\nSystem.out.print(\"\
  [Name:\" + name);\nSystem.out.print(\", Bean Class:\" + beanClassName);\nSystem.out.println(\"\
  , Value:\" + value + \"]\");\n}\n}\n创建 Book 对象后...\nSimpleStringProperty[Name:title,\
  \ Bean Class:Book, Value:Beginning Java 9]\nSimpleDoubleProperty[Name:price, Bean\
  \ Class:Book, Value:49.99]\nReadOnlyPropertyImpl[Name:ISBN, Bean Class:Book, Value:148422843X]\n\
  更改 Book 属性后...\nSimpleStringProperty[Name:title, Bean Class:Book, Value:Learn JavaFX\
  \ 8]\nSimpleDoubleProperty[Name:price, Bean Class:Book, Value:59.99]\nReadOnlyPropertyImpl[Name:ISBN,\
  \ Bean Class:Book, Value:148422843X]\n清单 8-7.\n一个用于测试 Book 类属性的 BookPropertyTest\
  \ 类\n```\n\n\n\n### 处理属性失效事件\n\n当属性的值首次从有效状态变为无效状态时，该属性会生成一个失效事件。JavaFX 中的属性采用惰性求值机制。如果某个已失效的属性因其值再次变化而再次失效，则不会生成失效事件。当失效属性被重新计算（例如通过调用其\
  \ `get()` 或 `getValue()` 方法）时，它会变为有效状态。\n\n清单 8-8 是一个演示属性何时生成失效事件的程序。该程序包含足够的注释，可帮助您理解其逻辑。\n\
  \n```\n// InvalidationTest.java\npackage com.jdojo.javafx;\nimport javafx.beans.Observable;\n\
  import javafx.beans.property.IntegerProperty;\nimport javafx.beans.property.SimpleIntegerProperty;\n\
  public class InvalidationTest {\npublic static void main(String[] args) {\n// 创建一个属性\n\
  IntegerProperty counter = new SimpleIntegerProperty(100);\n// 使用方法引用为 counter 属性添加一个失效监听器。\n\
  // 当 counter 属性变为无效时，将调用此类的 invalidated() 方法。\ncounter.addListener(InvalidationTest::invalidated);\n\
  System.out.println(\"更改 counter 值之前-1\");\ncounter.set(101);\nSystem.out.println(\"\
  更改 counter 值之后-1\");\n/*\n* 此时 counter 属性已失效，对其值的进一步更改将不会生成任何失效事件。\n*/\nSystem.out.println(\"\
  \\n 更改 counter 值之前-2\");\ncounter.set(102);\nSystem.out.println(\"更改 counter 值之后-2\"\
  );\n// 通过调用 get() 方法使 counter 属性重新生效\nint value = counter.get();\nSystem.out.println(\"\
  Counter 值 = \" + value);\n/*\n* 此时 counter 属性已生效，对其值的进一步更改将生成失效事件。\n*/\n// 尝试设置相同的值\n\
  System.out.println(\"\\n 更改 counter 值之前-3\");\ncounter.set(102);\nSystem.out.println(\"\
  更改 counter 值之后-3\");\n// 尝试设置不同的值\nSystem.out.println(\"\\n 更改 counter 值之前-4\");\n\
  counter.set(103);\nSystem.out.println(\"更改 counter 值之后-4\");\n}\npublic static void\
  \ invalidated(Observable prop) {\nSystem.out.println(\"Counter 已失效。\");\n}\n}\n\
  更改 counter 值之前-1\nCounter 已失效。\n更改 counter 值之后-1\n更改 counter 值之前-2\n更改 counter 值之后-2\n\
  Counter 值 = 102\n更改 counter 值之前-3\n更改 counter 值之后-3\n更改 counter 值之前-4\nCounter 已失效。\n\
  更改 counter 值之后-4\n清单 8-8.\n测试 JavaFX 属性的失效事件\n```\n\n程序开始时，创建了一个名为 `counter` 的 `IntegerProperty`，并为其添加了一个失效监听器。\n\
  \n```\n// 创建 counter 属性\nIntegerProperty counter = new SimpleIntegerProperty(100);\n\
  // 为 counter 属性添加一个失效监听器\ncounter.addListener(InvalidationTest::invalidated);\n\
  ```\n\n当您创建一个属性对象时，它是有效的。当您将 `counter` 属性更改为 101 时，它会触发一个失效事件。此时，`counter` 属性变为无效。当您将其值更改为\
  \ 102 时，它不会触发失效事件，因为它已经处于无效状态。您使用 `get()` 方法读取 `counter` 的值，这使其重新变为有效。现在，您将 `counter`\
  \ 设置为相同的值 102，这不会触发失效事件，因为其值实际上并未改变；其值已经是 102。`counter` 属性仍然有效。最后，您将其值更改为一个不同的值，果然，一个失效事件被触发了。\n\
  \n提示\n\n您不限于只为属性添加一个失效监听器。您可以根据需要添加任意数量的失效监听器。如果您不再需要某个失效监听器，请务必通过调用属性的 `removeListener()`\
  \ 方法将其移除；否则，可能会导致内存泄漏。\n\n\n\n### 处理属性变更事件\n\n您可以注册一个 `ChangeListener` 来接收关于属性变更事件的通知。每当属性值发生变化时，都会触发一个属性变更事件。`ChangeListener`\
  \ 的 `changed()` 方法接收三个值：\n\n*   属性对象的引用\n*   属性的旧值\n*   属性的新值\n\n您将运行一个与上一节中测试失效事件类似的测试用例，用于测试属性变更事件。清单\
  \ 8-9 包含演示为属性生成的变更事件的程序。\n\n```\n// ChangeTest.java\npackage com.jdojo.javafx;\n\
  import javafx.beans.property.IntegerProperty;\nimport javafx.beans.property.SimpleIntegerProperty;\n\
  import javafx.beans.value.ObservableValue;\npublic class ChangeTest {\npublic static\
  \ void main(String[] args) {\n// 创建一个计数器属性\nIntegerProperty counter = new SimpleIntegerProperty(100);\n\
  // 为计数器属性添加一个变更监听器\ncounter.addListener(ChangeTest::changed);\nSystem.out.println(\"\
  更改计数器值-1 之前\");\ncounter.set(101);\nSystem.out.println(\"更改计数器值-1 之后\");\nSystem.out.println(\"\
  \\n 更改计数器值-2 之前\");\ncounter.set(102);\nSystem.out.println(\"更改计数器值-2 之后\");\n//\
  \ 尝试设置相同的值\nSystem.out.println(\"\\n 更改计数器值-3 之前\");\ncounter.set(102); // 不会触发变更事件。\n\
  System.out.println(\"更改计数器值-3 之后\");\n// 尝试设置不同的值\nSystem.out.println(\"\\n 更改计数器值-4\
  \ 之前\");\ncounter.set(103);\nSystem.out.println(\"更改计数器值-4 之后\");\n}\npublic static\
  \ void changed(ObservableValue prop,\nNumber oldValue,\nNumber newValue) {\nSystem.out.print(\"\
  计数器已变更: \");\nSystem.out.println(\"旧值 = \" + oldValue + \", 新值 = \" + newValue);\n\
  }\n}\n更改计数器值-1 之前\n计数器已变更: 旧值 = 100, 新值 = 101\n更改计数器值-1 之后\n更改计数器值-2 之前\n计数器已变更:\
  \ 旧值 = 101, 新值 = 102\n更改计数器值-2 之后\n更改计数器值-3 之前\n更改计数器值-3 之后\n更改计数器值-4 之前\n计数器已变更:\
  \ 旧值 = 102, 新值 = 103\n更改计数器值-4 之后\n清单 8-9.\n测试 JavaFX 属性的变更事件\n```\n\n程序开始时创建了一个名为\
  \ `counter` 的 `IntegerProperty`。\n\n```\n// 创建一个计数器属性\nIntegerProperty counter =\
  \ new SimpleIntegerProperty(100);\n```\n\n添加 `ChangeListener` 有点技巧。`IntegerPropertyBase`\
  \ 类中的 `addListener()` 方法声明如下：\n\n```\nvoid addListener(ChangeListener listener)\n\
  ```\n\n如果您使用泛型，那么 `IntegerProperty` 的 `ChangeListener` 必须根据 `Number` 类或 `Number`\
  \ 类的超类来编写。为 `counter` 属性添加 `ChangeListener` 的三种方法如下。代码使用了匿名类，我最后将其转换为 lambda 表达式。\n\
  \n```\n// 方法-1：使用泛型和 Number 类\ncounter.addListener(new ChangeListener() {\n@Override\n\
  public void changed(ObservableValue prop,\nNumber oldValue,\nNumber newValue) {\n\
  System.out.print(\"计数器已变更: \");\nSystem.out.println(\"旧值 = \" + oldValue + \", 新值\
  \ = \" + newValue);\n}});\n// 方法-2：使用泛型和 Object 类\ncounter.addListener(new ChangeListener()\
  \ {\n@Override\npublic void changed(ObservableValue prop,\nObject oldValue,\nObject\
  \ newValue) {\nSystem.out.print(\"计数器已变更: \");\nSystem.out.println(\"旧值 = \" + oldValue\
  \ + \", 新值 = \" + newValue);\n}});\n// 方法-3：不使用泛型。可能会产生编译时警告。\ncounter.addListener(new\
  \ ChangeListener() {\n@Override\npublic void changed(ObservableValue prop,\nObject\
  \ oldValue,\nObject newValue) {\nSystem.out.print(\"计数器已变更: \");\nSystem.out.println(\"\
  旧值 = \" + oldValue + \", 新值 = \" + newValue);\n}});\n```\n\n清单 8-9 使用了第一种使用泛型的方法；如您所见，`ChangeTest`\
  \ 类中 `changed()` 方法的签名与方法-1 中的 `changed()` 方法签名匹配。您使用了带有方法引用的 lambda 表达式来添加 `ChangeListener`，如下所示：\n\
  \n```\n// 使用方法引用添加变更监听器\ncounter.addListener(ChangeTest::changed);\n```\n\n输出显示，当属性值发生更改时，会触发属性变更事件。使用相同的值调用\
  \ `set()` 方法不会触发属性变更事件。\n\n与生成失效事件不同，属性对其值采用急切求值来生成变更事件，因为它必须将新值传递给属性变更监听器。\n\n\n\
  \n### JavaFX 中的属性绑定\n\n在 JavaFX 中，绑定是一个求值为某个值的表达式。该绑定由一个或多个可观察值（称为其依赖项）组成。绑定会观察其依赖项的变化，并在需要时自动重新计算其值。JavaFX\
  \ 对所有绑定都采用惰性求值。当绑定被初始定义或其依赖项发生变化时，其值会被标记为无效。无效绑定的值会在下次请求时计算，通常使用其 `get()` 或 `getValue()`\
  \ 方法。JavaFX 中的所有属性类都内置了对绑定的支持。\n\n让我们讨论一个 JavaFX 中绑定的简单示例。考虑以下表示两个整数 `x` 和 `y` 之和的表达式：\n\
  \n```\nx + y\n```\n\n表达式 `x + y` 表示一个绑定，它有两个依赖项：`x` 和 `y`。你可以给它起个名字叫 `sum`，如下所示：\n\
  \n```\nsum = x + y\n```\n\n要在 JavaFX 中实现此逻辑，你需要创建两个 `IntegerProperty` 变量：`x` 和 `y`：\n\
  \n```\nIntegerProperty x = new SimpleIntegerProperty(100);\nIntegerProperty y =\
  \ new SimpleIntegerProperty(200);\n```\n\n以下语句创建了一个名为 `sum` 的绑定，它表示 `x` 和 `y` 的和：\n\
  \n```\nNumberBinding sum = x.add(y);\n```\n\n绑定有一个 `isValid()` 方法，如果绑定有效则返回 `true`，否则返回\
  \ `false`。你可以使用 `intValue()`、`longValue()`、`floatValue()` 和 `doubleValue()` 方法分别以\
  \ `int`、`long`、`float` 和 `double` 类型获取 `NumberBinding` 的值。清单 8-10 中的程序展示了如何创建和使用绑定。\n\
  \n```\n// BindingTest.java\npackage com.jdojo.javafx;\nimport javafx.beans.binding.NumberBinding;\n\
  import javafx.beans.property.IntegerProperty;\nimport javafx.beans.property.SimpleIntegerProperty;\n\
  public class BindingTest {\npublic static void main(String[] args) {\n// 创建两个属性\
  \ x 和 y\nIntegerProperty x = new SimpleIntegerProperty(100);\nIntegerProperty y\
  \ = new SimpleIntegerProperty(200);\n// 创建一个绑定：sum = x + y\nNumberBinding sum =\
  \ x.add(y);\nSystem.out.println(\"创建 sum 后：\");\nSystem.out.println(\"sum.isValid():\
  \ \" + sum.isValid());\n// 让我们获取 sum 的值，这样它会计算其值并变为有效\nint value = sum.intValue();\n\
  System.out.println(\"\\n 请求值后：\");\nSystem.out.println(\"sum.isValid(): \" + sum.isValid());\n\
  System.out.println(\"sum = \" + value);\n// 改变 x 的值\nx.set(250);\nSystem.out.println(\"\
  \\n 改变 x 后：\");\nSystem.out.println(\"sum.isValid(): \" + sum.isValid());\n// 再次获取\
  \ sum 的值\nvalue = sum.intValue();\nSystem.out.println(\"\\n 请求值后：\");\nSystem.out.println(\"\
  sum.isValid(): \" + sum.isValid());\nSystem.out.println(\"sum = \" + value);\n}\n\
  }\n创建 sum 后：\nsum.isValid(): false\n请求值后：\nsum.isValid(): true\nsum = 300\n改变 x\
  \ 后：\nsum.isValid(): false\n请求值后：\nsum.isValid(): true\nsum = 450\n清单 8-10.\n在 JavaFX\
  \ 中使用简单绑定\n```\n\n当创建 `sum` 绑定时，它是无效的，并且不知道自己的值。这从输出中可以明显看出。一旦你使用 `sum.intValue()`\
  \ 方法请求其值，它就会计算自己的值并将自身标记为有效。当你更改其某个依赖项时，它会变为无效，直到你再次请求其值。\n\n提示\n\n绑定会在内部向其所有依赖项添加失效监听器。当任何依赖项变为无效时，绑定会将自己标记为无效。无效绑定并不意味着其值已更改。它只意味着当下次请求该值时，需要重新计算其值。\n\
  \n在 JavaFX 中，你也可以将属性绑定到绑定。回想一下，绑定是一个与其依赖项自动同步的表达式。根据这个定义，绑定属性是其值基于表达式计算的属性，当依赖项发生变化时，该属性会自动同步。假设你有三个属性：x、y\
  \ 和 z，如下所示：\n\n```\nIntegerProperty x = new SimpleIntegerProperty(10);\nIntegerProperty\
  \ y = new SimpleIntegerProperty(20);\nIntegerProperty z = new SimpleIntegerProperty(60);\n\
  ```\n\n你可以使用 `Property` 接口的 `bind()` 方法将属性 `z` 绑定到表达式 `x + y`，如下所示：\n\n```\n// 将\
  \ z 绑定到 x + y\nz.bind(x.add(y));\n```\n\n请注意，你不能编写 `z.bind(x + y)`，因为 `+` 运算符不知道如何将两个\
  \ `IntegerProperty` 对象的值相加。你需要使用绑定 API 来创建绑定表达式。\n\n现在，当 `x`、`y` 或两者都发生变化时，`z` 属性会变为无效。下次你请求\
  \ `z` 的值时，它会重新计算表达式 `x.add(y)` 以获取其值。\n\n你可以使用 `Property` 接口的 `unbind()` 方法来解绑一个绑定属性。对未绑定或从未绑定的属性调用\
  \ `unbind()` 方法没有效果。你可以如下解绑 `z` 属性：\n\n```\n// 解绑 z 属性\nz.unbind();\n```\n\n解绑后，属性会像普通属性一样行为，独立维护其值。换句话说，解绑属性会断开该属性与其依赖项之间的链接。清单\
  \ 8-11 展示了如何将属性绑定到由其他属性组成的表达式。\n\n```\n// BoundProperty.java\npackage com.jdojo.javafx;\n\
  import javafx.beans.property.IntegerProperty;\nimport javafx.beans.property.SimpleIntegerProperty;\n\
  public class BoundProperty {\npublic static void main(String[] args) {\n// 创建三个属性\n\
  IntegerProperty x = new SimpleIntegerProperty(10);\nIntegerProperty y = new SimpleIntegerProperty(20);\n\
  IntegerProperty z = new SimpleIntegerProperty(60);\n// 创建绑定 z = x + y\nz.bind(x.add(y));\n\
  System.out.println(\"绑定 z 后：Bound = \"\n+ z.isBound() + \", z = \" + z.get());\n\
  // 改变 x 和 y\nx.set(15);\ny.set(19);\nSystem.out.println(\"改变 x 和 y 后：Bound = \"\n\
  + z.isBound() + \", z = \" + z.get());\n// 解绑 z\nz.unbind();\n// 不会影响 z 的值，因为 z\
  \ 不再绑定到 x 和 y\nx.set(100);\ny.set(200);\nSystem.out.println(\"解绑 z 后：Bound = \"\n\
  + z.isBound() + \", z = \" + z.get());\n}\n}\n绑定 z 后：Bound = true, z = 30\n改变 x\
  \ 和 y 后：Bound = true, z = 34\n解绑 z 后：Bound = false, z = 34\n清单 8-11.\n将属性绑定到表达式\n\
  ```\n\n绑定具有方向性，即变化传播的方向。JavaFX 支持两种类型的属性绑定：单向绑定和双向绑定。单向绑定仅在一个方向上工作；依赖项的变化会传播到绑定属性，反之则不然。双向绑定在两个方向上工作；依赖项的变化会反映在属性中，反之亦然。\n\
  \n`Property` 接口的 `bind()` 方法在属性和 `ObservableValue`（可能是一个复杂表达式）之间创建单向绑定。`bindBidirectional()`\
  \ 方法在属性与另一个相同类型的属性之间创建双向绑定。\n\n前面示例中的语句 `z.bind(x.add(y))` 创建了一个单向绑定。在单向绑定中，绑定属性不能被更改。其值始终使用其依赖项计算。尝试更改单向绑定属性的值会抛出\
  \ `RuntimeException`。\n\n双向绑定在两个方向上工作。它有一些限制。它只能在相同类型的属性之间创建。也就是说，双向绑定只能是 x = y\
  \ 和 y = x 的类型，其中 x 和 y 是相同类型。\n\n\n\n```\n// 创建两个名为 x 和 y 的属性\nIntegerProperty x\
  \ = new SimpleIntegerProperty(10);\nIntegerProperty y = new SimpleIntegerProperty(20);\n\
  // 在 x 和 y 之间创建双向绑定\nx.bindBidirectional(y);\n// 现在，x 和 y 的值都是 20。当 x 或 y 发生变化时，x\
  \ 和 y 的值始终相同。\n// 移除 x 和 y 之间的双向绑定\nx.unbindBidirectional(y);\n// 现在，x 和 y 各自独立地维护自己的值。\n\
  ```\n\n在 JavaFX 应用程序中，绑定被大量用于将 UI 元素的属性绑定到其他 UI 元素或数据模型的属性上。让我们看一个使用绑定的 JavaFX GUI\
  \ 应用程序示例。你将创建一个屏幕，其中包含一个居中显示的圆形。该圆形的圆周将触及屏幕较近的两侧。如果屏幕的宽度和高度相同，则圆形的圆周将触及屏幕的所有四个侧边。\n\
  \n在不使用绑定的情况下，开发一个带有居中圆形的屏幕是一项繁琐的任务。`javafx.scene.shape` 包中的 `Circle` 类表示一个圆形。它有三个属性：`centerX`、`centerY`\
  \ 和 `radius`，类型均为 `DoubleProperty`。`centerX` 和 `centerY` 属性定义了圆心坐标 (x, y)。`radius`\
  \ 属性定义了圆形的半径。默认情况下，圆形以黑色填充。你可以按如下方式创建一个 `centerX`、`centerY` 和 `radius` 均设置为默认值 0.0\
  \ 的圆形：\n\n```\nCircle c = new Circle();\n```\n\n接下来，将圆形添加到一个组中，并创建一个以该组为根节点的场景，如下所示：\n\
  \n```\nGroup root = new Group(c);\nScene scene = new Scene(root, 150, 150);\n```\n\
  \n以下绑定将根据场景的大小来定位和调整圆形的大小：\n\n```\n// 圆心始终位于场景的中心\nc.centerXProperty().bind(scene.widthProperty().divide(2));\n\
  c.centerYProperty().bind(scene.heightProperty().divide(2));\n// 圆形的半径始终是场景宽度和高度中较小值的一半\n\
  c.radiusProperty().bind(Bindings.min(scene.widthProperty(), scene.heightProperty())\n\
  .divide(2));\n```\n\n前两个绑定分别将圆形的 `centerX` 和 `centerY` 绑定到场景宽度和高度的一半。第三个绑定将圆形的 `radius`\
  \ 绑定到场景宽度和高度中较小值的一半（参见 `divide(2)`）。仅此而已！绑定 API 神奇地实现了在应用程序运行时保持圆形居中。\n\n清单 8-12\
  \ 包含了完整的程序。图 8-5 显示了程序初始运行时的屏幕。尝试调整窗口大小，你会注意到圆心始终位于场景的中间。\n\n![A323071_2_En_8_Fig5_HTML.jpg](img/A323071_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5.\n\n一个在场景中居中的圆形\n\n```\n// CenteredCircle.java\npackage com.jdojo.javafx;\n\
  import javafx.application.Application;\nimport javafx.beans.binding.Bindings;\n\
  import javafx.scene.Group;\nimport javafx.scene.Scene;\nimport javafx.scene.shape.Circle;\n\
  import javafx.stage.Stage;\npublic class CenteredCircle extends Application {\n\
  public static void main(String[] args) {\nApplication.launch(args);\n}\n@Override\n\
  public void start(Stage stage) {\nCircle c = new Circle();\nGroup root = new Group(c);\n\
  Scene scene = new Scene(root, 100, 100);\n// 将圆形的 centerX、centerY 和 radius 绑定到场景的属性\n\
  c.centerXProperty().bind(scene.widthProperty().divide(2));\nc.centerYProperty().bind(scene.heightProperty().divide(2));\n\
  c.radiusProperty().bind(Bindings.min(scene.widthProperty(),\nscene.heightProperty())\n\
  .divide(2));\n// 设置舞台属性并使其可见\nstage.setTitle(\"一个居中的圆形\");\nstage.setScene(scene);\n\
  stage.sizeToScene();\nstage.show();\n}\n}\n清单 8-12.\n使用绑定 API 使圆形在场景中居中\n```\n\n\
  ## 可观察集合\n\nJavaFX 中的可观察集合是 Java 集合框架中集合的扩展。集合框架包含 `List`、`Set` 和 `Map` 接口。JavaFX\
  \ 添加了以下三种类型的可观察集合，可以观察其内容的变化：\n\n*   可观察列表\n*   可观察集\n*   可观察映射\n\nJavaFX 通过以下三个新接口支持可观察集合：\n\
  \n*   `ObservableList<E>`\n*   `ObservableSet<E>`\n*   `ObservableMap<K,V>`\n\n\
  这些 JavaFX 接口继承自 `java.util` 包中的 `List`、`Set` 和 `Map`。除了继承自 Java 集合接口外，JavaFX 集合接口还继承了\
  \ `Observable` 接口。所有 JavaFX 可观察集合接口和类都位于 `javafx.collections` 包中，该包属于 `javafx.base`\
  \ 模块。图 8-6 显示了表示可观察集合的接口的部分类图。\n\n![A323071_2_En_8_Fig6_HTML.jpg](img/A323071_2_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6.\n\nJavaFX 中可观察集合接口的部分类图\n\nJavaFX 中的可观察集合有两个额外的特性：\n\n*   它们支持失效通知，因为它们继承自\
  \ `Observable` 接口。\n*   它们支持更改通知。你可以注册更改监听器，当集合内容发生变化时会收到通知。\n\n`FXCollections`\
  \ 类是一个用于处理 JavaFX 集合的工具类。它由所有静态方法组成。JavaFX 不公开列表、集和映射的实现类。你需要使用 `FXCollections`\
  \ 类中的工厂方法来创建 `ObservableList`、`ObservableSet` 和 `ObservableMap` 接口的对象。以下代码片段展示了如何创建可观察集合：\n\
  \n```\n// 创建一个包含两个元素的可观察列表\nObservableList list = FXCollections.observableArrayList(\"\
  One\", \"Two\");\n// 创建一个包含两个元素的可观察集\nObservableSet set = FXCollections.observableSet(\"\
  one\", \"two\");\n// 创建一个可观察映射并向其添加两个键值对\nObservableMap map = FXCollections.observableHashMap();\n\
  map.put(\"one\", 1);\nmap.put(\"two\", 2);\n```\n\n你可以向可观察集合添加失效监听器和更改监听器。向可观察集合添加\
  \ `InvalidationListener` 与向属性添加 `InvalidationListener` 的方式相同，你已在上一节中看到。每种类型的可观察集合都有其自己的更改监听器类型：\n\
  \n*   `ListChangeListener<E>` 接口的实例表示 `ObservableList<E>` 的更改监听器。\n*   `SetChangeListener<E>`\
  \ 接口的实例表示 `ObservableSet<E>` 的更改监听器。\n*   `MapChangeListener<K,V>` 接口的实例表示 `ObservableMap<K,V>`\
  \ 的更改监听器。\n\n使用可观察集合的 `addListener()` 方法向其添加更改监听器。所有可观察集合的更改监听器接口都声明了一个名为 `Change`\
  \ 的静态内部类，该类封装了相应类型集合中的更改。例如，有一个 `ListChangeListener.Change<E>` 静态内部类用于封装 `ObservableList<E>`\
  \ 中的更改。更改监听器会收到一个 `Change` 类的实例。你需要使用 `Change` 类的 `next()` 方法来遍历所有更改。`Change` 类包含多个方法，用于提供对集合所做更改的详细信息。以下代码片段展示了如何向\
  \ `ObservableList` 和 `ObservableSet` 添加更改监听器：\n\n\n\n```\n// 创建一个包含两个元素的 ObservableList\n\
  ObservableList list = FXCollections.observableArrayList(\"One\", \"Two\");\n// 为列表添加一个变更监听器\n\
  list.addListener((ListChangeListener.Change change) -> {\nSystem.out.println(\"\
  列表已发生变更。\");\n});\n// 创建一个 ObservableSet\nObservableSet set = FXCollections.observableSet(\"\
  one\", \"two\");\n// 为集合添加一个变更监听器\nset.addListener((SetChangeListener.Change change)\
  \ -> {\nSystem.out.println(\"列表已发生变更。\");\n});\n```\n\n让我们看一个详细的示例，了解如何处理 `ObservableList`\
  \ 中的变更。监听 `ObservableList` 的变更有点棘手。列表可能发生多种类型的变更。有些变更是互斥的，而有些则可以与其他变更同时发生。列表中的元素可以被排列、更新、替换、添加和删除。清单\
  \ 8-13 包含一个完整的程序，展示了如何检测 `ObservableList` 中的变更。添加变更监听器后，程序会对列表进行操作，每次操作都会通知监听器，从输出结果中可以明显看出这一点。该程序经过简化，以保持简洁和可读性。`ListChangeListener.Change`\
  \ 对象包含有关列表变更的所有详细信息，例如受影响的区间、添加和删除的大小等。\n\n```\n// ObservableListTest.java\npackage\
  \ com.jdojo.javafx;\nimport javafx.collections.FXCollections;\nimport javafx.collections.ListChangeListener;\n\
  import javafx.collections.ObservableList;\npublic class ObservableListTest {\npublic\
  \ static void main(String[] args) {\n// 创建一个包含一些元素的列表\nObservableList list = FXCollections.observableArrayList(\"\
  one\", \"two\");\nSystem.out.println(\"创建列表后：\" + list);\n// 为列表添加一个 ChangeListener\n\
  list.addListener(ObservableListTest::onChanged);\n// 向列表添加更多元素\nlist.addAll(\"three\"\
  , \"four\");\nSystem.out.println(\"执行 addAll() 后 - 列表：\" + list);\n// 现在有四个元素。移除索引\
  \ 1（包含）到索引 3（不包含）的中间两个元素\nlist.remove(1, 3);\nSystem.out.println(\"执行 remove() 后\
  \ - 列表：\" + list);\n// 仅保留元素 \"one\"\nlist.retainAll(\"one\");\nSystem.out.println(\"\
  执行 retainAll() 后 - 列表：\" + list);\n// 替换列表中的第一个元素\nlist.set(0, \"ONE\");\nSystem.out.println(\"\
  执行 set() 后 - 列表：\" + list);\n}\npublic static void onChanged(ListChangeListener.Change\
  \ change) {\nwhile (change.next()) {\nif (change.wasPermutated()) {\nSystem.out.println(\"\
  检测到排列变更。\");\n} else if (change.wasUpdated()) {\nSystem.out.println(\"检测到更新变更。\"\
  );\n} else if (change.wasReplaced()) {\nSystem.out.println(\"检测到替换变更。\");\n} else\
  \ {\nif (change.wasRemoved()) {\nSystem.out.println(\"检测到移除变更。\");\n} else if (change.wasAdded())\
  \ {\nSystem.out.println(\"检测到添加变更。\");\n}\n}\n}\n}\n}\n创建列表后：[one, two]\n检测到添加变更。\n\
  执行 addAll() 后 - 列表：[one, two, three, four]\n检测到移除变更。\n执行 remove() 后 - 列表：[one, four]\n\
  检测到移除变更。\n执行 retainAll() 后 - 列表：[one]\n检测到替换变更。\n执行 set() 后 - 列表：[ONE]\n清单 8-13.\n\
  检测 ObservableList 中的变更\n```\n\n## 事件处理\n\n通常，术语“事件”用于描述感兴趣的事件发生。在 GUI 应用程序中，事件是用户与应用程序交互的发生。鼠标点击、键盘按键按下等是\
  \ JavaFX 应用程序中事件的示例。JavaFX 中的事件由 `javafx.event.Event` 类或其任何子类的对象表示。JavaFX 中的每个事件都有三个属性：\n\
  \n*   事件源\n*   事件目标\n*   事件类型\n\n当事件发生时，通常通过执行一段代码来执行某些处理。响应事件而执行的代码段称为事件处理器或事件过滤器。稍后我会澄清事件处理器和事件过滤器之间的区别。现在，将两者都视为一段代码，我将它们统称为事件处理器。当您想要处理\
  \ UI 元素的事件时，需要向该 UI 元素添加事件处理器。当 UI 元素检测到事件时，它会执行您的事件处理器。\n\n调用事件处理器的 UI 元素是这些事件处理器的事件源。当事件发生时，它会经过一系列事件分发器。事件源是事件分发器链中的当前元素。当事件在事件分发器链中从一个分发器传递到另一个分发器时，事件源会发生变化。\n\
  \n事件目标是事件的最终目的地。事件目标决定了事件在处理过程中传播的路径。假设鼠标点击发生在 `Circle` 节点上。在这种情况下，`Circle` 节点就是鼠标点击事件的事件目标。\n\
  \n事件类型描述了所发生事件的类型。事件类型以分层方式定义。每个事件类型都有一个名称和一个超类型。\n\nJavaFX 中所有事件共有的这三个属性由三个不同类的对象表示。特定事件定义了额外的事件属性；例如，表示鼠标事件的事件类添加了属性来描述鼠标光标的位置、鼠标按钮的状态等。\n\
  \n表 8-4 列出了事件处理中涉及的类和接口。JavaFX 有一个事件传递机制，它定义了事件发生和处理的细节。\n\n表 8-4.\n事件处理中涉及的类\n\n\
  | 名称 | 类/接口 | 描述 |\n| --- | --- | --- |\n| `Event` | 类 | 此类的实例表示一个事件。`Event` 类存在多个子类来表示特定类型的事件。\
  \ |\n| `EventTarget` | 接口 | 此接口的实例表示一个事件目标。 |\n| `EventType` | 类 | 此类的实例表示一个事件类型，例如鼠标按下、鼠标释放、鼠标移动等。\
  \ |\n| `EventHandler` | 接口 | 此接口的实例表示一个事件处理器或事件过滤器。当为其注册的事件发生时，会调用其 `handle()` 方法。\
  \ |\n\n### 事件处理机制\n\n当事件发生时，会执行几个步骤作为事件处理的一部分：\n\n*   事件目标选择\n*   事件路径构建\n*   事件路径遍历\n\
  \n#### 事件目标选择\n\n事件处理的第一步是选择事件目标。回想一下，事件目标是事件的最终目标节点。事件目标根据事件类型进行选择。对于鼠标事件，事件目标是鼠标光标所在的节点。鼠标光标处可能有多个节点。例如，您可以将一个圆形放在一个矩形之上。鼠标光标处最顶层的节点被选为事件目标。\n\
  \n键盘事件的事件目标是拥有焦点的节点。节点如何获得焦点取决于节点的类型。例如，`TextField` 可以通过在内部点击鼠标或使用焦点遍历键（如 Windows\
  \ 操作系统上的 Tab 或 Shift-Tab）来获得焦点。像 `Circle`、`Rectangle` 等形状默认情况下不会获得焦点。如果您希望它们接收键盘事件，可以通过调用\
  \ `Node` 类的 `requestFocus()` 方法为它们赋予焦点。\n\n\n\n#### 事件路由构建\n\n事件通过事件调度链中的事件调度器进行传播。事件调度链即为事件路由。事件的初始路由和默认路由由事件目标决定。默认事件路由由从舞台到事件目标节点的容器-子节点路径组成。\n\
  \n假设你在一个 `HBox` 中放置了一个 `Circle` 和一个 `Rectangle`，并且该 `HBox` 是某个 `Stage` 的 `Scene`\
  \ 的根节点。当你点击 `Circle` 时，`Circle` 成为事件目标。`Circle` 会构建默认事件路由，即从舞台到事件目标（`Circle`）的路径。\n\
  \n实际上，事件路由由与节点关联的事件调度器组成。然而，出于所有实际理解和应用的目的，你可以将事件路由视为由节点组成的路径。通常，你不会直接处理事件调度器。\n\
  \n图 8-7 展示了鼠标点击事件的事件路由。事件路由上的节点以灰色背景填充显示。事件路由上的节点由实线连接。请注意，当 `Circle` 被点击时，场景图中包含的\
  \ `Rectangle` 并不在事件路径上。\n\n![A323071_2_En_8_Fig7_HTML.gif](img/A323071_2_En_8_Fig7_HTML.gif)\n\
  \n图 8-7. 事件的默认事件路由构建\n\n事件调度链（或事件路由）有头部和尾部。在此例中，`Stage` 和 `Circle` 分别是事件调度链的头部和尾部。初始事件路由可能会随着事件处理的进行而修改。通常（但不一定），在事件遍历步骤中，事件会两次经过其路由上的所有节点，如下一节所述。\n\
  \n#### 事件路由遍历\n\n事件路由遍历包含两个阶段：\n\n*   捕获阶段\n*   冒泡阶段\n\n事件会两次经过其路由上的每个节点：一次在捕获阶段，一次在冒泡阶段。你可以为节点注册特定事件类型的事件过滤器和事件处理器。事件过滤器在事件于捕获阶段经过节点时执行。事件处理器在事件于冒泡阶段经过节点时执行。事件过滤器和处理器会接收到当前节点的引用作为事件源。当事件从一个节点传播到另一个节点时，事件源会不断变化。然而，从事件路由遍历开始到结束，事件目标始终保持不变。\n\
  \n在路由遍历过程中，节点可以在事件过滤器或处理器中消费事件，从而完成事件的处理。消费事件只需在事件对象上调用 `consume()` 方法。当事件被消费时，事件处理会停止，即使路由中的某些节点尚未被遍历。\n\
  \n##### 事件捕获阶段\n\n在捕获阶段，事件从其事件调度链的头部传播到尾部。图 8-8 展示了本例中针对 `Circle` 的鼠标点击事件在捕获阶段的传播过程。图中的箭头表示事件传播的方向。当事件经过一个节点时，该节点上注册的事件过滤器会被执行。请注意，事件捕获阶段仅执行当前节点的事件过滤器，而不执行事件处理器。\n\
  \n![A323071_2_En_8_Fig8_HTML.gif](img/A323071_2_En_8_Fig8_HTML.gif)\n\n图 8-8. 事件捕获阶段\n\
  \n在此例中，假设没有任何事件过滤器消费该事件，则 `Stage`、`Scene`、`HBox` 和 `Circle` 的事件过滤器会按顺序执行。\n\n你可以为一个节点注册多个事件过滤器。如果节点在其某个事件过滤器中消费了事件，那么该节点上尚未执行的其他事件过滤器仍会在事件处理停止前执行。假设你为本例中的\
  \ `Scene` 注册了五个事件过滤器，并且第一个执行的事件过滤器消费了该事件。在这种情况下，`Scene` 的其他四个事件过滤器仍会执行。在执行完 `Scene`\
  \ 的第五个事件过滤器后，事件处理才会停止，事件不会继续传播到剩余节点（`HBox` 和 `Circle`）。\n\n在事件捕获阶段，你可以拦截针对节点子节点的事件（并提供通用响应）。例如，你可以为本例中的\
  \ `Stage` 添加鼠标点击事件的事件过滤器，以拦截其所有子节点的所有鼠标点击事件。你可以通过在父节点的事件过滤器中消费事件，来阻止事件到达其目标。例如，如果你在\
  \ `Stage` 的过滤器中消费了鼠标点击事件，那么该事件将不会到达其目标（例如 `Circle`）。\n\n##### 事件冒泡阶段\n\n在冒泡阶段，事件从其事件调度链的尾部传播到头部。图\
  \ 8-9 展示了本例中针对 `Circle` 的鼠标点击事件在冒泡阶段的传播过程。\n\n![A323071_2_En_8_Fig9_HTML.gif](img/A323071_2_En_8_Fig9_HTML.gif)\n\
  \n图 8-9. 事件冒泡阶段\n\n图中的箭头表示事件传播的方向。当事件经过一个节点时，该节点上注册的事件处理器会被执行。请注意，事件冒泡阶段执行当前节点的事件处理器，而事件捕获阶段执行事件过滤器。\n\
  \n在此例中，假设没有任何事件过滤器消费该事件，则 `Circle`、`HBox`、`Scene` 和 `Stage` 的事件处理器会按顺序执行。请注意，事件冒泡阶段从事件目标开始，向上传播到父子层次结构中最顶层的父节点。\n\
  \n你可以为一个节点注册多个事件处理器。如果节点在其某个事件处理器中消费了事件，那么该节点上尚未执行的其他事件处理器仍会在事件处理停止前执行。假设你为本例中的\
  \ `Circle` 注册了五个事件处理器，并且第一个执行的事件处理器消费了该事件。在这种情况下，`Circle` 的其他四个事件处理器仍会执行。在执行完 `Circle`\
  \ 的第五个事件处理器后，事件处理才会停止，事件不会继续传播到剩余节点（`HBox`、`Scene` 和 `Stage`）。\n\n通常，事件处理器会注册到目标节点，以提供对事件的特定响应。有时，事件处理器会安装在父节点上，为其所有子节点提供默认的事件响应。如果事件目标决定对事件提供特定响应，它可以通过添加事件处理器并消费事件来实现，从而在事件冒泡阶段阻止事件到达父节点。\n\
  \n让我们讨论一个简单的例子。假设你想在用户点击窗口内的任意位置时显示一个消息框。你可以为窗口注册一个事件处理器来显示消息框。当用户点击窗口内的圆形时，你想显示一条特定的消息。你可以为圆形注册一个事件处理器来提供特定消息并消费事件。这样，当圆形被点击时，会提供特定的事件响应；而对于其他节点，窗口则提供默认的事件响应。\n\
  \n\n\n### 创建事件过滤器和处理器\n\n创建事件过滤器和处理器就像创建实现 `EventHandler` 接口的类对象一样简单。在 Java 8 之前，你需要使用内部类来创建事件过滤器和处理器。\n\
  \n```\nEventHandler aHandler = new EventHandler() {\n@Override\npublic void handle(MouseEvent\
  \ e) {\n// 事件处理代码写在这里\n}\n};\n```\n\n从 Java 8 开始，使用 lambda 表达式是创建事件过滤器和处理器的最佳选择，如下所示：\n\
  \n```\nEventHandler aHandler = e -> {\n// 事件处理代码写在这里\n};\n```\n\n本章将使用 lambda 表达式来创建事件过滤器和处理器。如果你不熟悉\
  \ Java 8 中的 lambda 表达式，建议你至少学习一下基础知识，以便能够理解事件处理代码。以下代码片段创建了一个 `MouseEvent` 处理器，它会打印发生的鼠标事件类型。\n\
  \n```\nEventHandler mouseEventHandler =\ne -> System.out.println(\"鼠标事件类型: \" +\
  \ e.getEventType());\n```\n\n### 注册事件过滤器和处理器\n\n如果某个节点对处理特定类型的事件感兴趣，你需要为该节点注册这些事件类型的事件过滤器和处理器。当事件发生时，已注册的事件过滤器和处理器的\
  \ `handle()` 方法将按照前面章节讨论的规则被调用。如果该节点不再对处理这些事件感兴趣，你需要从该节点注销事件过滤器和处理器。注册和注销事件过滤器和处理器也分别称为添加和移除事件过滤器和处理器。JavaFX\
  \ 提供了两种向节点注册和注销事件过滤器和处理器的方法：\n\n*   使用 `addEventFilter()`、`addEventHandler()`、`removeEventFilter()`\
  \ 和 `removeEventHandler()` 方法\n*   使用 `onXxx` 便捷属性\n\n你可以分别使用 `addEventFilter()`\
  \ 和 `addEventHandler()` 方法向节点注册事件过滤器和处理器。这些方法定义在 `Node` 类、`Scene` 类和 `Window` 类中。某些类（如\
  \ `MenuItem` 和 `TreeItem`）可以作为事件目标，但它们并非继承自 `Node` 类。这些方法的声明如下：\n\n*   `<T extends\
  \ Event> void addEventFilter(EventType<T> eventType, EventHandler<? super T> eventFilter)`\n\
  *   `<T extends Event> void addEventHandler(EventType<T> eventType, EventHandler<?\
  \ super T> eventHandler)`\n\n这些方法接受两个参数。第一个参数是事件类型，第二个参数是 `EventHandler` 接口的一个实例。\n\
  \n你可以使用以下代码片段处理 `Circle` 的鼠标点击事件：\n\n```\nimport javafx.scene.shape.Circle;\nimport\
  \ javafx.event.EventHandler;\nimport javafx.scene.input.MouseEvent;\n...\n// 创建一个圆形\n\
  Circle circle = new Circle (100, 100, 50);\n// 创建一个 MouseEvent 过滤器\nEventHandler\
  \ mouseEventFilter =\ne -> System.out.println(\"鼠标事件过滤器已被调用。\");\n// 创建一个 MouseEvent\
  \ 处理器\nEventHandler mouseEventHandler =\ne -> System.out.println(\"鼠标事件处理器已被调用。\"\
  );\n// 为圆形注册鼠标点击事件的 MouseEvent 过滤器和处理器\ncircle.addEventFilter(MouseEvent.MOUSE_CLICKED,\
  \ mouseEventFilter);\ncircle.addEventHandler(MouseEvent.MOUSE_CLICKED, mouseEventHandler);\n\
  ```\n\n这段代码创建了两个 `EventHandler` 对象，它们会向标准输出打印一条消息。在这个阶段，它们还不是事件过滤器或处理器，只是两个 `EventHandler`\
  \ 对象。请注意，给引用变量命名并打印包含“过滤器”和“处理器”字样的消息，并不会改变它们作为过滤器和处理器的状态。最后两条语句将其中一个 `EventHandler`\
  \ 对象注册为事件过滤器，另一个注册为事件处理器；两者都注册为鼠标点击事件。\n\n`Node`、`Scene` 和 `Window` 类包含用于存储某些选定事件类型的事件处理器的事件属性。属性名称使用事件类型模式，命名为\
  \ `onXxx`。例如，`onMouseClicked` 属性存储鼠标点击事件类型的事件处理器，`onKeyTyped` 属性存储按键输入事件的事件处理器，以此类推。你可以使用这些属性的\
  \ `setOnXxx()` 方法来为节点注册事件处理器。例如，使用 `setOnMouseClicked()` 方法注册鼠标点击事件的事件处理器，使用 `setOnKeyTyped()`\
  \ 方法注册按键输入事件的事件处理器，等等。各个类中的 `setOnXxx()` 方法被称为注册事件处理器的便捷方法。\n\n关于 `onXxx` 便捷属性，你需要记住以下几点：\n\
  \n*   它们仅支持注册事件处理器，不支持事件过滤器。如果需要注册事件过滤器，请使用 `addEventFilter()` 方法。\n*   它们仅支持为一个节点注册一个事件处理器。为一个节点注册多个事件处理器可以使用\
  \ `addEventHandler()` 方法。\n*   这些属性仅存在于节点类型的常用事件中。例如，`onMouseClicked` 属性存在于 `Node`\
  \ 和 `Scene` 类中，但不存在于 `Window` 类中；`onShowing` 属性存在于 `Window` 类中，但不存在于 `Node` 和 `Scene`\
  \ 类中。\n\n以下代码片段展示了如何使用便捷的 `onMouseClicked` 属性为圆形设置事件处理器：\n\n```\n// 创建一个圆形\nCircle\
  \ circle = new Circle (100, 100, 50);\n// 创建一个 MouseEvent 处理器\nEventHandler eventHandler\
  \ =\ne -> System.out.println(\"鼠标事件处理器已被调用。\");\n// 使用 onMouseClicked 便捷事件属性的 setter\
  \ 方法注册处理器\ncircle.setOnMouseClicked(eventHandler);\n```\n\n以下代码片段展示了如何使用 `Button`\
  \ 类的 `setOnAction()` 便捷方法为 `Button` 添加一个 `ActionEvent` 处理器：\n\n```\n// 创建一个按钮\n\
  Button exitBtn = new Button(\"退出\");\n// 为退出按钮添加事件处理器\nexitBtn.setOnAction(e ->\
  \ Platform.exit());\n```\n\n便捷事件属性没有提供单独的方法来注销事件处理器。将属性设置为 `null` 即可注销已注册的事件处理器。\n\
  \n```\n// 注销圆形的鼠标点击事件处理器\ncircle.setOnMouseClicked(null);\n```\n\n定义了 `onXxx` 事件属性的类也定义了\
  \ `getOnXxx()` getter 方法，该方法返回已注册事件处理器的引用。如果没有设置事件处理器，getter 方法将返回 `null`。\n\n清单\
  \ 8-14 包含一个演示事件路由和处理机制的程序。它还展示了如何消费事件及其效果。图 8-10 显示了运行程序时的屏幕画面。\n\n![A323071_2_En_8_Fig10_HTML.jpg](img/A323071_2_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10.\n\n处理与消费事件\n\n\n\n```\n// EventHandling.java\npackage com.jdojo.javafx;\n\
  import javafx.application.Application;\nimport javafx.event.EventHandler;\nimport\
  \ javafx.geometry.Insets;\nimport javafx.scene.Scene;\nimport javafx.scene.control.CheckBox;\n\
  import javafx.scene.input.MouseEvent;\nimport static javafx.scene.input.MouseEvent.MOUSE_CLICKED;\n\
  import javafx.scene.layout.HBox;\nimport javafx.scene.paint.Color;\nimport javafx.scene.shape.Circle;\n\
  import javafx.scene.shape.Rectangle;\nimport javafx.stage.Stage;\npublic class EventHandling\
  \ extends Application {\nprivate CheckBox consumeEventCbx = new CheckBox(\"在圆形处消耗鼠标点击事件\"\
  );\npublic static void main(String[] args) {\nApplication.launch(args);\n}\n@Override\n\
  public void start(Stage stage) {\nCircle circle = new Circle(50, 50, 50);\ncircle.setFill(Color.CORAL);\n\
  Rectangle rect = new Rectangle(100, 100);\nrect.setFill(Color.TAN);\nHBox root =\
  \ new HBox();\nroot.setPadding(new Insets(20));\nroot.setSpacing(20);\nroot.getChildren().addAll(circle,\
  \ rect, consumeEventCbx);\nScene scene = new Scene(root);\n// 为所有节点注册鼠标点击事件处理器，矩形和复选框除外\n\
  EventHandler handler = e -> handleEvent(e);\nEventHandler circleMeHandler = e ->\
  \ handleEventforCircle(e);\nstage.addEventHandler(MOUSE_CLICKED, handler);\nscene.addEventHandler(MOUSE_CLICKED,\
  \ handler);\nroot.addEventHandler(MOUSE_CLICKED, handler);\ncircle.addEventHandler(MOUSE_CLICKED,\
  \ circleMeHandler);\nstage.setScene(scene);\nstage.setTitle(\"事件处理\");\nstage.show();\n\
  }\npublic void handleEvent(MouseEvent e) {\nprint(e);\n}\npublic void handleEventforCircle(MouseEvent\
  \ e) {\nprint(e);\nif (consumeEventCbx.isSelected()) {\ne.consume();\n}\n}\npublic\
  \ void print(MouseEvent e) {\nString type = e.getEventType().getName();\nString\
  \ source = e.getSource().getClass().getSimpleName();\nString target = e.getTarget().getClass().getSimpleName();\n\
  // 获取鼠标相对于事件源的坐标\ndouble x = e.getX();\ndouble y = e.getY();\nSystem.out.println(\"\
  类型=\" + type + \", 目标=\" + target\n+ \", 源=\" + source\n+ \", 位置(\" + x + \", \"\
  \ + y + \")\");\n}\n}\n清单 8-14.\n处理与消耗事件\n```\n\n该程序将一个`Circle`、一个`Rectangle`和一个`CheckBox`添加到一个`HBox`中。`HBox`是一种容器，它将其子节点水平排列在一行上。`HBox`作为根节点添加到场景中。事件处理器被添加到`Stage`、`Scene`、`HBox`和`Circle`上。请注意，为了简化程序逻辑，您为`Circle`使用了不同的事件处理器。当选中`CheckBox`时，`Circle`的事件处理器会消耗鼠标点击事件，从而阻止事件向上传播到`HBox`、`Scene`和`Stage`。如果未选中`CheckBox`，则`Circle`上的鼠标点击事件会从`Circle`向上传播到`HBox`、`Scene`和`Stage`。运行程序，使用鼠标点击场景的不同区域以查看效果。请注意，即使您点击的是`Circle`外部的点，`HBox`、`Scene`和`Stage`的鼠标点击事件处理器也会被执行，因为它们位于被点击节点的事件分发链中。\n\
  \n点击`CheckBox`不会执行`HBox`、`Scene`和`Stage`的鼠标点击事件处理器，而点击`Rectangle`则会。您能想到这种行为的原因吗？原因很简单。`CheckBox`有一个默认的事件处理器（用于鼠标按下事件），该处理器会执行默认操作并消耗事件，从而阻止事件向上传播到事件分发链。而`Rectangle`不会消耗事件，因此允许事件向上传播到事件分发链。\n\
  \n提示\n\n事件目标在事件过滤器中消耗事件不会影响任何其他事件过滤器的执行。但是，它会阻止事件冒泡阶段的发生。在最顶层节点（即事件分发链的头部）的事件处理器中消耗事件，对事件处理没有影响。\n\
  \n## 布局面板\n\n您可以使用两种类型的布局来排列场景图中的节点：\n\n*   静态布局\n*   动态布局\n\n在静态布局中，节点的位置和大小只计算一次，并且在调整窗口大小时保持不变。当窗口大小与节点最初布局时的大小一致时，用户界面看起来效果最佳。\n\
  \n在动态布局中，每当用户操作导致节点的位置、大小或两者同时发生变化时，场景图中的节点都会重新布局。通常，改变一个节点的位置或大小会影响场景图中其他节点的位置和大小。动态布局会在调整窗口大小时强制重新计算部分或全部节点的位置和大小。\n\
  \n静态布局和动态布局各有优缺点。静态布局让开发者完全控制用户界面的设计。它允许您按照自己的意愿利用可用空间。动态布局需要更多的编程工作，并且逻辑要复杂得多。通常，支持\
  \ GUI 的编程语言（如 JavaFX）通过库来支持动态布局。库解决了动态布局的大部分用例。如果它们不能满足您的需求，您就必须付出艰苦努力来推出自己的动态布局。\n\
  \n布局面板是一个包含其他节点的节点，这些节点被称为其子节点（或子节点）。布局面板的职责是在需要时对其子节点进行布局。布局面板也称为容器或布局容器。\n\n布局面板具有一个布局策略，用于控制布局面板如何布局其子节点。例如，布局面板可以水平、垂直或以任何其他方式布局其子节点。容器的布局策略是一组用于计算其子节点位置和大小的规则。节点有三种类型的大小，称为首选大小、最小大小和最大大小。大多数容器会尝试为其子节点提供首选大小。节点的实际（或当前）大小可能与其首选大小不同。节点的当前大小取决于窗口大小、容器的布局策略以及节点的扩展和收缩策略等。\n\
  \nJavaFX 包含多个容器类。图 8-11 显示了容器类的类图。容器类是`Parent`类的直接或间接子类。\n\n![A323071_2_En_8_Fig11_HTML.jpg](img/A323071_2_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11.\n\nJavaFX 中容器类的类图\n\n`Group`允许您对其所有子节点集体应用效果和变换。`Group`类位于`javafx.scene`包中。\n\
  \n`Region`类的子类用于布局子节点。它们可以使用 CSS 设置样式。`Region`类及其大多数子类位于`javafx.scene.layout`包中。\n\
  \n确实，容器必须是`Parent`类的子类。然而，并非所有`Parent`类的子类都是容器。例如，`Button`类是`Parent`类的子类；但它是一个控件，而不是容器。节点必须添加到容器中才能成为场景图的一部分。容器根据其布局策略对其子节点进行布局。如果您不希望容器管理某个节点的布局，则需要将该节点的`managed`属性设置为`false`。\n\
  \n一个节点一次只能是一个容器的子节点。如果将一个节点添加到某个容器时，它已经是另一个容器的子节点，则该节点会先被从第一个容器中移除，然后再添加到第二个容器中。通常，为了创建复杂的布局，需要嵌套容器。也就是说，您可以将一个容器作为子节点添加到另一个容器中。\n\
  \n`Parent`类包含三个用于获取容器子节点列表的方法：\n\n\n\n*   `protected ObservableList<Node> getChildren()`\n\
  *   `public ObservableList<Node> getChildrenUnmodifiable()`\n*   `protected <E extends\
  \ Node> List<E> getManagedChildren()`\n\n`getChildren()` 方法返回一个可修改的 `ObservableList`，其中包含容器的子节点。如果你想向容器添加节点，只需将节点添加到此列表中。这是容器类中最常用的方法。从本章的第一个程序开始，你一直在使用此方法向\
  \ `Group`、`HBox`、`VBox` 等容器添加子节点。\n\n请注意 `getChildren()` 方法的 `protected` 访问权限。如果\
  \ `Parent` 类的子类不希望成为容器，它将保持此方法的访问权限为 `protected`。例如，`Button` 和 `TextField` 等控件相关类将此方法保持为\
  \ `protected`，因此你不能向它们添加子节点。容器类会重写此方法并将其设为 `public`。例如，`Group` 和 `Pane` 类将此方法公开为\
  \ `public`。\n\n`getChildrenUnmodifiable()` 方法在 `Parent` 类中被声明为 `public`。它返回一个只读的\
  \ `ObservableList` 子节点列表。它在两种情况下很有用：\n\n*   你需要将容器的子节点列表传递给一个不应修改该列表的方法。\n*   你想了解一个非容器的控件由什么组成。\n\
  \n`getManagedChildren()` 方法具有 `protected` 访问权限。容器类不会将其公开为 `public`。它们在内部使用此方法，在布局期间获取受管理的子节点列表。你将使用此方法来推出你自己的容器类。\n\
  \n表 8-5 包含了 JavaFX 中容器类的简要描述。本章不可能讨论所有类型的容器。在本节中，我将展示一些使用示例。\n\n表 8-5.\n\nJavaFX\
  \ 中的容器类\n\n| 容器类 | 描述 |\n| --- | --- |\n| `Group` | 对其所有子节点集体应用效果和变换。 |\n| `Pane`\
  \ | 用于对其子节点进行绝对定位。 |\n| `HBox` | 在单行中水平排列子节点。 |\n| `VBox` | 在单列中垂直排列子节点。 |\n| `FlowPane`\
  \ | 在行或列中水平或垂直排列子节点。如果它们无法容纳在单行或单列中，则会在指定的宽度或高度处换行。 |\n| `BorderPane` | 将布局区域划分为顶部、右侧、底部、左侧和中心区域，并将其每个子节点放置在五个区域之一中。\
  \ |\n| `StackPane` | 以从后到前的堆叠方式排列子节点。 |\n| `TilePane` | 在统一大小的单元格网格中排列子节点。 |\n|\
  \ `GridPane` | 在可变大小的单元格网格中排列子节点。 |\n| `AnchorPane` | 通过将子节点的边缘锚定到布局区域的边缘来排列子节点。\
  \ |\n| `TextFlow` | 布局富文本，其内容可能包含多个 `Text` 节点。 |\n\n容器旨在包含子节点。你可以在创建容器对象时或创建之后向容器添加子节点。所有容器类都提供接受可变参数\
  \ `Node` 类型参数的构造函数，以添加初始子节点集。一些容器提供构造函数来添加初始子节点集并设置容器的初始属性。\n\n你也可以在容器创建后的任何时间向容器添加子节点。容器将其子节点存储在一个可观察列表中，可以使用\
  \ `getChildren()` 方法检索该列表。向容器添加节点就像向该可观察列表添加节点一样简单。以下代码片段展示了如何在创建 `HBox` 时以及创建之后向其添加子节点。\n\
  \n```\n// 创建两个按钮\nButton okBtn = new Button(\"确定\");\nButton cancelBtn = new Button(\"\
  取消\");\n// 创建一个 HBox，包含两个按钮作为其子节点\nHBox hBox1 = new HBox(okBtn, cancelBtn);\n//\
  \ 创建一个 HBox，包含两个按钮，它们之间水平间距为 20px\ndouble hSpacing = 20;\nHBox hBox2 = new HBox(hSpacing,\
  \ okBtn, cancelBtn);\n// 创建一个空的 HBox，然后向其中添加两个按钮\nHBox hBox3 = new HBox();\nhBox3.getChildren().addAll(okBtn,\
  \ cancelBtn);\n```\n\n提示\n\n当你需要向容器添加多个子节点时，请使用 `ObservableList` 的 `addAll()` 方法，而不是多次使用\
  \ `add()` 方法。\n\n清单 8-15 中的程序展示了如何使用 `BorderPane`、`HBox` 和 `VBox` 来排列 UI 元素，如图 8-12\
  \ 所示。\n\n![A323071_2_En_8_Fig12_HTML.jpg](img/A323071_2_En_8_Fig12_HTML.jpg)\n\n\
  图 8-12.\n\n一个 BorderPane，在其顶部、右侧、底部和中心区域使用了一些控件\n\n```\n// BorderPaneTest.java\n\
  package com.jdojo.javafx;\nimport javafx.application.Application;\nimport javafx.geometry.Insets;\n\
  import javafx.scene.Node;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\n\
