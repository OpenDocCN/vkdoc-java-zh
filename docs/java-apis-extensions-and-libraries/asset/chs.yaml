  \n```\n// simplestfxapp.js\n$STAGE.scene = new javafx.scene.Scene(new javafx.scene.control.Label(\"\
  Hello JavaFX Scripting\"));\n清单 9-34.\n在 Nashorn 脚本中使用 $STAGE 全局变量\n```\n\n以下命令将运行最简单的\
