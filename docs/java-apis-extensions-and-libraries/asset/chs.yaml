  \ (pid=10160) 已终止。\nPID: 10160\nIsAlive: false\n命令：\n参数：[]\n命令行：\n启动时间：2018-01-21T20:46:07.100-06:00[America/Chicago]\n\
  CPU 时间：PT0.8125S\n所有者：kishori\\ksharan\n子进程数：0\n```\n\n## 获取进程句柄\n\n获取原生进程句柄有多种方式。对于由\
  \ Java 代码创建的进程，可以通过 `Process` 类的 `toHandle()` 方法获取 `ProcessHandle`。原生进程也可以在 JVM\
  \ 外部创建。`ProcessHandle` 接口包含以下用于获取原生进程句柄的方法：\n\n*   `static Optional<ProcessHandle>\
  \ of(long pid)`\n*   `static ProcessHandle current()`\n*   `Optional<ProcessHandle>\
  \ parent()`\n*   `Stream<ProcessHandle> children()`\n*   `Stream<ProcessHandle>\
  \ descendants()`\n*   `static Stream<ProcessHandle> allProcesses()`\n\n静态方法 `of()`\
  \ 为指定的 `pid` 返回一个 `Optional<ProcessHandle>`。如果不存在具有此 `pid` 的进程，则返回一个空的 `Optional`。要使用此方法，你需要知道进程的\
  \ PID：\n\n```\n// 获取 pid 为 1234 的进程句柄\nOptional handle = ProcessHandle.of(1234L);\n\
  ```\n\n静态方法 `current()` 返回当前进程的句柄，该进程始终是执行代码的 Java 进程。你已经在清单 10-3 中看到了一个示例。\n\n\
  `parent()` 方法返回父进程的句柄。如果进程没有父进程或无法获取父进程，则返回一个空的 `Optional`。\n\n`children()` 方法返回该进程所有直接子进程的快照。不保证此方法返回的进程仍然存活。请注意，不存活的进程没有子进程。\n\
  \n`descendants()` 方法返回该进程所有子进程（直接或间接）的快照。\n\n`allProcesses()` 方法返回该进程可见的所有进程的快照。不保证在处理流时，流中包含操作系统中所有进程。在拍摄快照后，进程可能已终止或创建。以下代码片段按\
  \ PID 排序并打印所有进程的 PID：\n\n```\nSystem.out.printf(\"所有进程的 PID：%n\");\nProcessHandle.allProcesses()\n\
  .map(ph -> ph.pid())\n.sorted()\n.forEach(System.out::println);\n```\n\n你可以计算所有正在运行进程的不同类型的统计信息。你还可以在\
  \ Java 中创建一个任务管理器，显示所有正在运行的进程及其属性。清单 10-8 展示了如何获取运行时间最长的进程详细信息以及使用 CPU 时间最多的进程。我通过比较进程的启动时间来获取运行时间最长的进程，通过比较总\
  \ CPU 时长来获取使用 CPU 时间最多的进程。你可能会得到不同的输出。我在 Windows 10 上运行该程序时得到了以下输出。\n\n```\n// ProcessStats.java\n\
  package com.jdojo.process;\nimport java.time.Duration;\nimport java.time.Instant;\n\
  public class ProcessStats {\npublic static void main(String[] args) {\nSystem.out.printf(\"\
  CPU 使用时间最长的用户进程：%n\");\nProcessHandle.allProcesses()\n.max(ProcessStats::compareCpuTime)\n\
  .ifPresent(CurrentProcessInfo::printInfo);\nSystem.out.printf(\"%n 运行时间最长的进程：%n\"\
  );\nProcessHandle.allProcesses()\n.max(ProcessStats::compareStartTime)\n.ifPresent(CurrentProcessInfo::printInfo);\n\
  }\npublic static int compareCpuTime(ProcessHandle ph1,\nProcessHandle ph2) {\nreturn\
  \ ph1.info()\n.totalCpuDuration()\n.orElse(Duration.ZERO)\n.compareTo(ph2.info()\n\
  .totalCpuDuration()\n.orElse(Duration.ZERO));\n}\npublic static int compareStartTime(ProcessHandle\
  \ ph1, ProcessHandle ph2) {\nreturn ph1.info()\n.startInstant()\n.orElse(Instant.now())\n\
  .compareTo(ph2.info()\n.startInstant()\n.orElse(Instant.now()));\n}\n}\n清单 10-8.\
  \ 计算进程统计信息\n```\n\n```\nCPU 使用时间最长的用户进程：\nPID: 5808\nIsAlive: true\n命令：C:\\Windows\\\
  explorer.exe\n参数：[]\n命令行：\n启动时间：2018-01-15T22:17:12.521-06:00[America/Chicago]\n\
  CPU 时间：PT1H21M38.3125S\n所有者：kishori\\ksharan\n子进程数：10\n运行时间最长的进程：\nPID: 0\nIsAlive:\
  \ false\n命令：\n参数：[]\n命令行：\n启动时间：2018-01-21T20:49:47.757303400-06:00[America/Chicago]\n\
  CPU 时间：PT0S\n所有者：未知\n子进程数：162\n```\n\n## 终止进程\n\n你可以使用 `ProcessHandle` 接口和 `Process`\
  \ 类的 `destroy()` 或 `destroyForcibly()` 方法终止进程。如果终止进程的请求成功，这两个方法都返回 `true`，否则返回 `false`。`destroy()`\
  \ 方法请求正常终止，而 `destroyForcibly()` 方法请求强制终止。在发出终止进程请求后的短暂时间内，`isAlive()` 方法可能仍返回 `true`。\n\
  \n提示\n\n你不能终止当前进程。对当前进程调用 `destroy()` 或 `destroyForcibly()` 方法会抛出 `IllegalStateException`。操作系统的访问控制可能会阻止进程被终止。\n\
  \n进程的正常终止允许进程干净地退出。进程的强制终止会立即终止进程。进程是否支持正常终止取决于具体实现。你可以使用 `ProcessHandle` 接口和 `Process`\
  \ 类的 `supportsNormalTermination()` 方法来检查进程是否支持正常终止。如果进程支持正常终止，该方法返回 `true`，否则返回\
  \ `false`。\n\n调用这些方法之一来终止一个已经终止的进程不会产生任何效果。当进程终止时，从 `Process` 类的 `onExit()` 返回的\
  \ `CompletableFuture<Process>` 以及从 `ProcessHandle` 接口的 `onExit()` 返回的 `CompletableFuture<ProcessHandle>`\
  \ 会变为 `completed` 状态。\n\n\n\n## 管理进程权限\n\n在前几节的示例中，我假设没有安装 Java 安全管理器。如果安装了安全管理器，则需要授予适当的权限才能启动、管理和查询原生进程：\n\
  \n*   如果要创建新进程，需要拥有 `FilePermission(cmd,\"execute\")` 权限，其中 `cmd` 是用于创建进程的命令的绝对路径。如果\
  \ `cmd` 不是绝对路径，则需要拥有 `FilePermission(\"<<ALL FILES>>\",\"execute\")` 权限。\n*   要使用\
  \ `ProcessHandle` 接口中的方法查询原生进程的状态并销毁进程，应用程序需要拥有 `RuntimePermission (\"manageProcess\"\
  )` 权限。\n\n清单 10-9 包含一个程序，该程序获取进程计数并创建一个新进程。它在没有安全管理器和有安全管理器的情况下重复执行这两项任务。\n\n```\n\
  // ManageProcessPermission.java\npackage com.jdojo.process;\nimport java.util.concurrent.ExecutionException;\n\
  public class ManageProcessPermission {\npublic static void main(String[] args) {\n\
  // 获取进程计数\nlong count = ProcessHandle.allProcesses().count();\nSystem.out.printf(\"\
  进程计数: %d%n\", count);\n// 启动一个新进程\nProcess p = Job.startProcess(1, 3);\ntry {\n\
  p.toHandle().onExit().get();\n} catch (InterruptedException | ExecutionException\
  \ e) {\nSystem.out.println(e.getMessage());\n}\n// 安装安全管理器\nSecurityManager sm =\
  \ System.getSecurityManager();\nif (sm == null) {\nSystem.setSecurityManager(new\
  \ SecurityManager());\nSystem.out.println(\"已安装安全管理器。\");\n}\n// 获取进程计数\ntry {\n\
  count = ProcessHandle.allProcesses().count();\nSystem.out.printf(\"进程计数: %d%n\"\
  , count);\n} catch (RuntimeException e) {\nSystem.out.println(\"无法获取进程计数: \" + e.getMessage());\n\
  }\n// 启动一个新进程\ntry {\np = Job.startProcess(1, 3);\np.toHandle().onExit().get();\n\
  } catch (InterruptedException | ExecutionException\n| RuntimeException e) {\nSystem.out.println(\"\
  无法启动新进程: \" + e.getMessage());\n}\n}\n}\n清单 10-9.\n使用安全管理器管理进程\n```\n\n假设您尚未更改任何\
  \ Java 策略文件，请使用以下命令尝试运行 `ManageProcessPermission` 类：\n\n```\nC:\\Java9APIsAndModules>java\
  \ --module-path dist\n--module jdojo.process/com.jdojo.process.ManageProcessPermission\n\
  ```\n\n```\n进程计数: 161\n使用的命令:\nC:\\java9\\bin\\java.exe --module-path dist --module\
  \ jdojo.process/com.jdojo.process.Job 1 3\n作业 (pid=15328) 信息: 休眠间隔=1 秒, 休眠时长=3 秒。\n\
  作业 (pid=15328) 即将休眠 1 秒。\n作业 (pid=15328) 即将休眠 1 秒。\n作业 (pid=15328) 即将休眠 1 秒。\n已安装安全管理器。\n\
  无法获取进程计数: 访问被拒绝 (\"java.lang.RuntimePermission\" \"manageProcess\")\n无法启动新进程: 访问被拒绝\
  \ (\"java.lang.RuntimePermission\" \"manageProcess\")\n```\n\n您可能会得到不同的输出。输出表明，在安装安全管理器之前，您能够获取进程计数并创建新进程。安装安全管理器后，Java\
  \ 运行时在请求进程计数和创建新进程时抛出异常。要解决此问题，您需要授予以下权限：\n\n*   `\"manageProcess\" RuntimePermission`，这将允许应用程序查询原生进程并创建新进程。\n\
  *   Java 命令路径上的 `\"execute\" FilePermission`，这将允许启动 JVM。\n*   系统属性 `\"jdk.module.path\"\
  ` 和 `\"java.class.path\"` 上的 `\"read\" PropertyPermission`，以便 `Job` 类在构建启动 JVM 的命令行时可以读取这些属性。\n\
  \n清单 10-10 包含一个脚本，用于向所有代码授予这四项权限。您需要将此脚本添加到您机器上的 `JDK_HOME\\conf\\security\\java.policy`\
  \ 文件中。Java 启动器的路径是 `C:\\\\java9\\\\bin\\\\java.exe`，仅当您在 `C:\\java9` 目录中安装了 JDK9\
  \ 时，此路径在 Windows 上才有效。对于所有其他平台和 JDK 安装，请修改此路径以指向您机器上正确的 Java 启动器。\n\n```\ngrant\
  \ {\npermission java.lang.RuntimePermission \"manageProcess\";\npermission java.io.FilePermission\
  \ \"C:\\\\java9\\\\bin\\\\java.exe\", \"execute\";\npermission java.util.PropertyPermission\
  \ \"jdk.module.path\", \"read\";\npermission java.util.PropertyPermission \"java.class.path\"\
  , \"read\";\n};\n清单 10-10.\nJDK_HOME|conf\\security\\java.policy 文件的附录\n```\n\n\
  如果使用相同的命令再次运行 `ManageProcessPermission` 类，您应该会得到类似于以下的输出：\n\n```\nC:\\Java9APIsAndModules>java\
  \ --module-path dist\n--module jdojo.process/com.jdojo.process.ManageProcessPermission\n\
  ```\n\n```\n进程计数: 164\n使用的命令:\nC:\\java9\\bin\\java.exe --module-path dist --module\
  \ jdojo.process/com.jdojo.process.Job 1 3\n作业 (pid=2916) 信息: 休眠间隔=1 秒, 休眠时长=3 秒。\n\
  作业 (pid=2916) 即将休眠 1 秒。\n作业 (pid=2916) 即将休眠 1 秒。\n作业 (pid=2916) 即将休眠 1 秒。\n已安装安全管理器。\n\
  进程计数: 164\n使用的命令:\nC:\\java9\\bin\\java.exe --module-path dist --module jdojo.process/com.jdojo.process.Job\
  \ 1 3\n作业 (pid=12440) 信息: 休眠间隔=1 秒, 休眠时长=3 秒。\n作业 (pid=12440) 即将休眠 1 秒。\n作业 (pid=12440)\
  \ 即将休眠 1 秒。\n作业 (pid=12440) 即将休眠 1 秒。\n```\n\n\n\n## 摘要\n\nProcess API 由用于处理原生进程的类和接口组成。自\
  \ 1.0 版本起，Java SE 就通过 `Runtime` 和 `Process` 类提供了 Process API。它允许你创建新的原生进程、管理其 I/O\
  \ 流以及销毁它们。后续的 Java SE 版本对该 API 进行了改进。直到 Java 9 之前，开发者不得不编写原生代码来获取进程 ID、用于启动进程的命令等基本信息。Java\
  \ 9 新增了一个名为 `ProcessHandle` 的接口，它代表一个进程句柄。你可以使用进程句柄来查询和管理原生进程。\n\n以下类和接口构成了 Process\
  \ API：`Runtime`、`ProcessBuilder`、`ProcessBuilder.Redirect`、`Process`、`ProcessHandle`\
  \ 和 `ProcessHandle.Info`。\n\n`Runtime` 类的 `exec()` 方法用于启动一个原生进程。`ProcessBuilder`\
  \ 类的 `start()` 方法比 `Runtime` 类的 `exec()` 方法更受推荐，用于启动进程。`ProcessBuilder.Redirect`\
  \ 类的实例代表进程的输入源或进程的输出目标。\n\n默认情况下，新进程的标准 I/O 通过管道连接到当前进程。你需要读取和写入与管道关联的流，才能访问新进程的标准\
  \ I/O。你可以选择将新进程的标准 I/O 设置为与当前进程相同，或者将 I/O 重定向到其他源/目标（例如文件）。\n\n`Process` 类的实例代表由\
  \ Java 程序创建的原生进程。\n\n`ProcessHandle` 接口的实例代表由 Java 程序或其他方式创建的进程；它是在 Java 9 中添加的，并提供了多种查询和管理进程的方法。`ProcessHandle.Info`\
  \ 接口的实例代表进程的快照信息；可以通过 `Process` 类或 `ProcessHandle` 接口的 `info()` 方法获取。如果你有一个 `Process`\
  \ 实例，可以使用其 `toHandle()` 方法来获取一个 `ProcessHandle`。\n\n`ProcessHandle` 接口的 `onExit()`\
  \ 方法返回一个 `CompletableFuture<ProcessHandle>`，用于进程的终止。你可以使用返回的对象添加一个任务，该任务将在进程终止时执行。请注意，你不能在当前进程上使用此方法。\n\
  \n如果安装了安全管理器，应用程序需要拥有 `\"manageProcess\" RuntimePermission` 来查询和管理原生进程，并且需要拥有从 Java\
  \ 代码启动的进程的命令文件的 `\"execute\" FilePermission`。\n\n问题与练习\n\n1.  什么是 Process API？\n\
  2.  `Runtime` 类的实例代表什么？\n3.  如何获取 `Runtime` 类的实例？\n4.  如何使用 `ProcessBuilder` 类？该类的哪个方法用于启动一个新的原生进程？\n\
  5.  `Process` 类的实例代表什么？\n6.  `ProcessHandle` 接口的实例代表什么？如何从 `Process` 获取 `ProcessHandle`？\n\
  7.  如何获取代表正在运行的 Java 程序的当前进程的句柄？\n8.  `ProcessHandle.Info` 接口的实例代表什么？\n9.  由 `ProcessBuilder`\
  \ 类的 `start()` 方法创建的新进程的默认标准 I/O 是什么？\n10. 能否使用 Process API 终止当前 Java 程序？\n\n# 11.\
  \ 打包模块\n\n在本章中，你将学习：\n\n*   打包 Java 模块的不同格式\n*   JAR 格式的增强\n*   什么是多版本 JAR\n*  \
  \ 如何创建和使用多版本 JAR\n*   什么是 JMOD 格式\n*   如何使用 `jmod` 工具处理 JMOD 文件\n*   如何创建、提取和描述\
  \ JMOD 文件\n*   如何列出 JMOD 文件的内容\n*   如何在 JMOD 文件中记录模块的哈希值以进行依赖验证\n\n模块可以打包成不同的格式，以便在三个阶段（编译时、链接时和运行时）中使用。并非所有格式在所有阶段都受支持。JDK9\
  \ 支持以下格式来打包模块：\n\n*   展开目录\n*   JAR 格式\n*   JMOD 格式\n*   JIMAGE 格式\n\n展开目录和 JAR\
  \ 格式在 JDK9 之前就已支持。JDK9 对 JAR 格式进行了增强，以支持模块化 JAR 和多版本 JAR。JDK9 引入了两种新的模块打包格式：JMOD\
  \ 格式和 JIMAGE 格式。本章将讨论 JAR 格式的增强以及 JMOD 格式。第 12 章将详细介绍 JIMAGE 格式以及 `jlink` 工具。\n\n\
  ## JAR 格式\n\n第一卷的第 3 章介绍了模块化 JAR 的基础知识。第二卷的第 8 章介绍了如何使用 `jar` 工具的大部分选项，以及如何以编程方式处理模块化\
  \ JAR。`jar` 工具还用于列出 JAR 文件中的条目，以及提取和更新 JAR 文件的内容。`jar` 工具在 JDK9 之前就支持这些操作，并且在 JDK9\
  \ 中这些操作没有新增内容。在本章中，我将介绍 JAR 格式新增的一个特性，称为多版本 JAR。\n\n\n\n### 什么是多版本 JAR？\n\n作为一名经验丰富的\
  \ Java 开发者，你一定使用过 Spring 框架、Hibernate 等 Java 库/框架。你可能正在使用 Java 8，但这些库可能仍在使用 Java\
  \ 6 或 Java 7。为什么库开发者不能使用最新版本来利用 JDK 的新特性呢？原因之一是并非所有库用户都使用最新的 JDK。将库更新到较新版本的 JDK\
  \ 意味着强制所有库用户迁移到那个较新的 JDK，这在实践中是不可行的。针对不同 JDK 维护和发布库是打包代码时的另一个痛点。通常，你会为不同的 JDK 找到单独的库\
  \ JAR。JDK9 通过为库开发者提供一种打包库代码的新方式解决了这个问题——使用一个单一的 JAR，其中包含同一个库版本，适用于多个 JDK。这样的 JAR\
  \ 被称为多版本 JAR。\n\n多版本 JAR（MRJAR）包含同一个库版本（提供相同的 API），适用于多个 JDK 版本。也就是说，你可以拥有一个作为 MRJAR\
  \ 的库，它既适用于 JDK8 也适用于 JDK9。MRJAR 中的代码将包含在 JDK8 和 JDK9 下编译的类文件。用 JDK9 编译的类可以利用 JDK9\
  \ 提供的 API，而用 JDK8 编译的类则提供使用 JDK8 编写的相同库 API。\n\nMRJAR 扩展了 JAR 已有的目录结构。一个 JAR 包含一个根目录，其所有内容都位于其中。它包含一个\
  \ `META-INF` 目录，用于存储关于该 JAR 的元数据。通常，一个 JAR 包含一个 `META-INF/MANIFEST.MF` 文件，其中包含其属性。一个典型\
  \ JAR 中的条目如下所示：\n\n```\n- jar-root\n- C1.class\n- C2.class\n- C3.class\n- C4.class\n\
  - META-INF\n- MANIFEST.MF\n```\n\n该 JAR 包含四个类文件和一个 `MANIFEST.MF` 文件。MRJAR 扩展了 `META-INF`\
  \ 目录，用于存储特定于某个 JDK 版本的类。`META-INF` 目录包含一个 `versions` 子目录，该子目录下可能包含许多子目录——每个子目录的名称与\
  \ JDK 主版本号相同。例如，对于特定于 JDK9 的类，可能存在 `META-INF/versions/9` 目录；对于特定于 JDK10 的类，可能存在名为\
  \ `META-INF/versions/10` 的目录，等等。一个典型的 MRJAR 可能包含以下条目：\n\n```\n- jar-root\n- C1.class\n\
  - C2.class\n- C3.class\n- C4.class\n- META-INF\n- MANIFEST.MF\n- versions\n\n- C2.class\n\
  - C5.class\n\n- C1.class\n- C2.class\n- C6.class\n```\n\n如果此 MRJAR 在不支持 MRJAR 的环境中使用，它将被视为一个常规\
  \ JAR——将使用根目录中的内容，而 `META-INF/versions/9` 和 `META-INF/versions/10` 中的所有其他内容将被忽略。因此，如果此\
  \ MRJAR 与 JDK8 一起使用，则只会使用四个类：`C1`、`C2`、`C3` 和 `C4`。\n\n当此 MRJAR 在 JDK9 中使用时，有五个类生效：`C1`、`C2`、`C3`、`C4`\
  \ 和 `C5`。将使用 `META-INF/versions/9` 目录中的 `C2` 类，而不是根目录中的 `C2` 类。在这种情况下，MRJAR 表明它为\
  \ JDK9 提供了一个更新版本的 `C2` 类，该版本覆盖了根目录中为 JDK8 或更早版本提供的 `C2` 版本。JDK9 版本还添加了一个名为 `C5`\
  \ 的新类。\n\n类似地，对于 JDK 版本 10，MRJAR 覆盖了类 `C1` 和 `C2`，并包含一个名为 `C6` 的新类。\n\n在单个 MRJAR\
  \ 中针对多个 JDK 版本时，MRJAR 中的搜索过程与常规 JAR 不同。在 MRJAR 中搜索资源或类文件使用以下规则：\n\n*   根据使用 MRJAR\
  \ 的环境确定 JDK 的主版本号。假设 JDK 的主版本号为 `N`。\n*   要定位名为 `R` 的资源或类文件，将从版本 `N` 对应的目录开始，搜索\
  \ `META-INF/versions` 目录下特定于平台的子目录。\n*   如果在子目录 `N` 中找到 `R`，则返回它。否则，继续搜索低于 `N` 版本的子目录。此过程会持续遍历\
  \ `META-INF/versions` 目录下的所有子目录。\n*   如果在 `META-INF/versions/N` 子目录中未找到 `R`，则在 MRJAR\
  \ 的根目录中搜索 `R`。\n\n让我们使用之前展示的 MRJAR 结构来举个例子。假设程序正在查找 `C3.class`，并且当前 JDK 版本是 10。搜索将从\
  \ `META-INF/versions/10` 开始，在那里找不到 `C3.class`。搜索继续在 `META-INF/versions/9` 中进行，也找不到\
  \ `C3.class`。然后搜索继续在根目录中进行，在那里找到了 `C3.class`。\n\n再举一个例子，假设你想在 JDK 版本为 10 时查找 `C2.class`。搜索从\
  \ `META-INF/versions/10` 开始，在那里找到了 `C2.class` 并返回。\n\n再举一个例子，假设你想在 JDK 版本为 9 时查找\
  \ `C2.class`。搜索从 `META-INF/versions/9` 开始，在那里找到了 `C2.class` 并返回。\n\n再举一个例子，假设你想在\
  \ JDK 版本为 8 时查找 `C2.class`。没有名为 `META-INF/versions/8` 的 JDK8 特定目录。因此，搜索从根目录开始，在那里找到了\
  \ `C2.class` 并返回。\n\n提示\n\n在 JDK9 中，所有处理 JAR 的工具——例如 `java`、`javac` 和 `javap`——都已修改为支持多版本\
  \ JAR。处理 JAR 的 API 也已更新以处理多版本 JAR。\n\n\n\n### 创建多版本 JAR 文件\n\n一旦你了解了在特定 JDK 版本上搜索资源或类文件时，MRJAR\
  \ 中各目录的搜索顺序，就很容易理解类和资源是如何被找到的。JDK 版本特定目录的内容有一些规则。我将在后续章节中描述这些规则。在本节中，我将重点介绍如何创建\
  \ MRJAR。\n\n要运行此示例，你需要在机器上安装 JDK8 和 JDK9。如果你没有 JDK8，任何除 JDK9 之外的 JDK 也可以。对于除版本 8\
  \ 之外的 JDK，你需要更改示例中的代码，以便代码能在你的 JDK 上编译。\n\n我将使用一个 MRJAR 来存储应用程序的 JDK8 和 JDK9 版本。该应用程序包含以下两个类：\n\
  \n*   `com.jdojo.mrjar.Main`\n*   `com.jdojo.mrjar.TimeUtil`\n\n`Main` 类创建 `TimeUtil`\
  \ 类的对象并调用其方法。`Main` 类可用作运行应用程序的 `main` 类。`TimeUtil` 类包含一个 `getLocalDate(Instant\
  \ now)` 方法，该方法接受一个 `Instant` 作为参数，并在当前时区中解释该瞬时值，返回一个 `LocalDate`。JDK9 为 `LocalDate`\
  \ 类添加了一个新方法，名为 `ofInstant(Instant instant, ZoneId zone)`。我们将更新应用程序以使用 JDK9，从而利用\
  \ JDK9 中的这个新方法，并保留使用 JDK8 Time API 实现相同目的的旧应用程序。\n\n本书的源代码包含两个 NetBeans 项目。`Java9APIsAndModules`\
  \ 目录下的主 NetBeans 项目包含一个名为 `jdojo.mrjar` 的模块，用于 JDK9。`Java9APIsAndModules\\jdojo.mrjar.jdk8`\
  \ 目录包含一个名为 `jdojo.mrjar.jdk8` 的 NetBeans 项目，其中包含 JDK8 的代码。\n\n清单 11-1 和清单 11-2 分别包含了\
  \ JDK8 的 `TimeUtil` 和 `Main` 类的代码。这些项目的源代码很简单，因此我不再提供解释。我本可以将 `TimeUtil` 类中的 `getLocalDate()`\
  \ 方法设为静态方法。我将其保留为实例方法，以便你可以在输出（稍后讨论）中看到实例化的是哪个版本的类。当你运行 `Main` 类时，它会打印当前的本地日期，当你运行此示例时，日期可能会有所不同。\n\
  \n```\n// TimeUtil.java\npackage com.jdojo.mrjar;\nimport java.time.Instant;\nimport\
  \ java.time.LocalDate;\nimport java.time.ZoneId;\npublic class TimeUtil {\npublic\
  \ TimeUtil() {\nSystem.out.println(\"正在创建 JDK 8 版本的 TimeUtil...\");\n}\npublic LocalDate\
  \ getLocalDate(Instant now) {\nreturn now.atZone(ZoneId.systemDefault())\n.toLocalDate();\n\
  }\n}\n清单 11-1.\n用于 JDK8 的 TimeUtil 类\n```\n\n```\n// Main.java\npackage com.jdojo.mrjar;\n\
  import java.time.Instant;\nimport java.time.LocalDate;\npublic class Main {\npublic\
  \ static void main(String[] args) {\nSystem.out.println(\"在 JDK 8 版本的 Main.main()\
  \ 内部...\");\nTimeUtil t = new TimeUtil();\nLocalDate ld = t.getLocalDate(Instant.now());\n\
  System.out.println(\"本地日期: \" + ld);\n}\n}\n在 JDK 8 版本的 Main.main() 内部...\n正在创建\
  \ JDK 8 版本的 TimeUtil...\n本地日期: 2018-01-22\n清单 11-2.\n用于 JDK8 的 Main 类\n```\n\n我们将所有\
  \ JDK9 类放在一个名为 `jdojo.mrjar` 的模块中，其模块声明如清单 11-3 所示。清单 11-4 和清单 11-5 分别包含了 JDK9 的\
  \ `TimeUtil` 和 `Main` 类的代码。\n\n```\n// module-info.java\nmodule jdojo.mrjar {\n\
  exports com.jdojo.mrjar;\n}\n清单 11-3.\n名为 com.jdojo.mrjar 的模块的模块声明\n```\n\n```\n\
  // TimeUtil.java\npackage com.jdojo.mrjar;\nimport java.time.Instant;\nimport java.time.LocalDate;\n\
  import java.time.ZoneId;\npublic class TimeUtil {\npublic TimeUtil() {\nSystem.out.println(\"\
  正在创建 JDK 9 版本的 TimeUtil...\");\n}\npublic LocalDate getLocalDate(Instant now) {\n\
  return LocalDate.ofInstant(now, ZoneId.systemDefault());\n}\n}\n清单 11-4.\n用于 JDK9\
  \ 的 TimeUtil 类\n```\n\n```\n// Main.java\npackage com.jdojo.mrjar;\nimport java.time.Instant;\n\
  import java.time.LocalDate;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"在 JDK 9 版本的 Main.main() 内部...\");\nTimeUtil t =\
  \ new TimeUtil();\nLocalDate ld = t.getLocalDate(Instant.now());\nSystem.out.println(\"\
  本地日期: \" + ld);\n}\n}\n在 JDK 9 版本的 Main.main() 内部...\n正在创建 JDK 9 版本的 TimeUtil...\n\
  本地日期: 2018-01-22\n清单 11-5.\n用于 JDK9 的 Main 类\n```\n\n我已经展示了在 JDK8 和 JDK9 上运行 `Main`\
  \ 类时将获得的输出。然而，此示例的目的不是单独运行这两个类，而是将它们全部打包到一个 MRJAR 中，然后从该 MRJAR 运行它们，我马上就会向你展示这一点。\n\
  \n`jar` 工具在 JDK9 中得到了增强，以支持创建 MRJAR。在 JDK9 中，`jar` 工具接受一个名为 `--release` 的新选项。其语法如下：\n\
  \n```\njar  --release N \n```\n\n这里，`N` 是一个 JDK 主版本号，例如 JDK9 的 9。`N` 的值必须大于或等于 9。`--release\
  \ N` 选项之后的所有文件都将被添加到 MRJAR 中的 `META-INF/versions/N` 目录中。\n\n以下命令创建一个名为 `jdojo.mrjar.jar`\
  \ 的 MRJAR，并将其放置在 `C:\\Java9APIsAndModules\\mrjars` 目录中。在运行以下命令之前，请确保输出目录（本例中为 `mrjars`）已存在。\n\
  \n```\nC:\\Java9APIsAndModules>jar --create --file mrjars\\jdojo.mrjar.jar\n-C jdojo.mrjar.jdk8\\\
  build\\classes .\n--release 9 -C build\\modules\\jdojo.mrjar .\n```\n\n请注意此命令中 `--release\
  \ 9` 选项的使用。来自 `build\\modules\\jdojo.mrjar` 目录的所有文件都将被添加到 MRJAR 中的 `META-INF/versions/9`\
  \ 目录。来自 `jdojo.mrjar.jdk8\\build\\classes` 目录的所有文件都将被添加到 MRJAR 的根目录。MRJAR 中的条目将如下所示：\n\
  \n```\n- jar-root\n- com\n- jdojo\n- mrjar\n- Main.class\n- TimeUtil.class\n- META-INF\n\
  - MANIFEST.MF\n- versions\n\n- module-info.class\n- com\n- jdojo\n- mrjar\n- Main.class\n\
  - TimeUtil.class\n```\n\n在创建 MRJAR 时，将 `--verbose` 选项与 `jar` 工具一起使用非常有帮助。该选项会打印出许多有用的信息，有助于诊断错误。以下是相同的命令，但添加了\
  \ `--verbose` 选项。输出显示了哪些文件被复制以及它们的位置：\n\n```\nC:\\Java9APIsAndModules>jar --create\
  \ --verbose --file mrjars\\jdojo.mrjar.jar\n-C jdojo.mrjar.jdk8\\build\\classes\
  \ .\n--release 9 -C build\\modules\\jdojo.mrjar .\nadded manifest\nadded module-info:\
  \ META-INF/versions/9/module-info.class\nadding: com/(in = 0) (out= 0)(stored 0%)\n\
  adding: com/jdojo/(in = 0) (out= 0)(stored 0%)\nadding: com/jdojo/mrjar/(in = 0)\
  \ (out= 0)(stored 0%)\nadding: com/jdojo/mrjar/Main.class(in = 1098) (out= 591)(deflated\
  \ 46%)\nadding: com/jdojo/mrjar/TimeUtil.class(in = 884) (out= 503)(deflated 43%)\n\
  adding: META-INF/versions/9/(in = 0) (out= 0)(stored 0%)\nadding: META-INF/versions/9/com/(in\
  \ = 0) (out= 0)(stored 0%)\nadding: META-INF/versions/9/com/jdojo/(in = 0) (out=\
  \ 0)(stored 0%)\nadding: META-INF/versions/9/com/jdojo/mrjar/(in = 0) (out= 0)(stored\
  \ 0%)\nadding: META-INF/versions/9/com/jdojo/mrjar/Main.class(in = 1326) (out= 688)(deflated\
  \ 48%)\nadding: META-INF/versions/9/com/jdojo/mrjar/TimeUtil.class(in = 814) (out=\
  \ 470)(deflated 42%)\n```\n\n假设你想为 JDK 版本 8、9 和 10 创建一个 MRJAR。以下命令将完成此任务，假设 `jdojo.mrjar.jdk10\\\
  modules\\jdojo.mrjar` 目录包含特定于 JDK10 的类：\n\n\n\n```\nC:\\Java9APIsAndModules>jar\
  \ --create --verbose --file mrjars\\jdojo.mrjar.jar\n-C jdojo.mrjar.jdk8\\build\\\
  classes .\n--release 9 -C build\\modules\\jdojo.mrjar .\n--release 10 -C jdojo.mrjar.jdk10\\\
  modules\\jdojo.mrjar .\n```\n\n你可以使用 `--list` 选项来验证 MRJAR 中的条目，如下所示：\n\n```\nC:\\\
  Java9APIsAndModules>jar --list --file mrjars\\jdojo.mrjar.jar\nMETA-INF/\nMETA-INF/MANIFEST.MF\n\
  META-INF/versions/9/module-info.class\ncom/\ncom/jdojo/\ncom/jdojo/mrjar/\ncom/jdojo/mrjar/Main.class\n\
  com/jdojo/mrjar/TimeUtil.class\nMETA-INF/versions/9/\nMETA-INF/versions/9/com/\n\
  META-INF/versions/9/com/jdojo/\nMETA-INF/versions/9/com/jdojo/mrjar/\nMETA-INF/versions/9/com/jdojo/mrjar/Main.class\n\
  META-INF/versions/9/com/jdojo/mrjar/TimeUtil.class\n```\n\n假设你有一个包含 JDK8 资源和类文件的\
  \ JAR，并且你想通过添加 JDK9 的资源和类文件来将其更新为 MRJAR。你可以使用 `--update` 选项更新 JAR 的内容来实现。以下命令创建了一个仅包含\
  \ JDK8 文件的 JAR：\n\n```\nC:\\Java9APIsAndModules>jar --create --file mrjars\\jdojo.mrjar.jar\n\
  -C jdojo.mrjar.jdk8\\build\\classes .\n```\n\n以下命令将该 JAR 更新为 MRJAR：\n\n```\nC:\\\
  Java9APIsAndModules>jar --update --file mrjars\\com.jdojo.mrjar.jar\n--release 9\
  \ -C com.jdojo.mrjar.jdk9\\build\\classes .\nC:\\Java9APIsAndModules>jar --update\
  \ --file mrjars\\jdojo.mrjar.jar\n--release 9 -C build\\modules\\jdojo.mrjar .\n\
  ```\n\n来看看这个 MRJAR 的实际效果。以下命令运行 `com.jdojo.mrjar` 包中的 `Main` 类，并将 MRJAR 放置在类路径上。这里使用\
  \ JDK8 来运行该类。\n\n```\nC:\\Java9APIsAndModules>C:\\java8\\bin\\java -classpath mrjars\\\
  jdojo.mrjar.jar com.jdojo.mrjar.Main\nInside JDK 8 version of Main.main()...\nCreating\
  \ JDK 8 version of TimeUtil...\nLocal Date: 2018-01-22\n```\n\n输出显示，`Main` 和 `TimeUtil`\
  \ 这两个类都来自 MRJAR 的根目录，因为 JDK8 不支持 MRJAR。以下命令使用模块路径运行同一个类。这里使用 JDK9 来运行该命令：\n\n```\n\
  C:\\Java9APIsAndModules>C:\\java9\\bin\\java --module-path mrjars\\jdojo.mrjar.jar\n\
  --module jdojo.mrjar/com.jdojo.mrjar.Main\nInside JDK 9 version of Main.main()...\n\
  Creating JDK 9 version of TimeUtil...\nLocal Date: 2018-01-22\n```\n\n输出显示，`Main`\
  \ 和 `TimeUtil` 这两个类都来自 MRJAR 的 `META-INF/versions/9` 目录，因为 JDK9 支持 MRJAR，并且该 MRJAR\
  \ 包含这些类针对 JDK9 的版本。\n\n让我们对这个 MRJAR 稍作改动。创建一个内容相同，但 `META-INF/versions/9` 目录中没有\
  \ `Main.class` 文件的 MRJAR。在实际场景中，只有 `TimeUtil` 类在应用程序的 JDK9 版本中发生了变化，因此无需为 JDK9 打包\
  \ `Main` 类。JDK8 的 `Main` 类也可以在 JDK9 上使用。以下命令打包了我们上次做的所有内容，除了 JDK9 的 `Main` 类。生成的\
  \ MRJAR 命名为 `jdojo.mrjar2.jar`。\n\n```\nC:\\Java9APIsAndModules>jar --create --file\
  \ mrjars\\jdojo.mrjar2.jar\n-C jdojo.mrjar.jdk8\\build\\classes .\n--release 9\n\
  -C build\\modules\\jdojo.mrjar module-info.class\n-C build\\modules\\jdojo.mrjar\
  \ com\\jdojo\\mrjar\\TimeUtil.class\n```\n\n你可以使用以下命令验证新 MRJAR 的内容：\n\n```\nC:\\\
  Java9APIsAndModules>jar --list --file mrjars\\jdojo.mrjar2.jar\nMETA-INF/\nMETA-INF/MANIFEST.MF\n\
  META-INF/versions/9/module-info.class\ncom/\ncom/jdojo/\ncom/jdojo/mrjar/\ncom/jdojo/mrjar/Main.class\n\
  com/jdojo/mrjar/TimeUtil.class\nMETA-INF/versions/9/com/jdojo/mrjar/TimeUtil.class\n\
  ```\n\n如果你在 JDK8 上运行 `Main` 类，你将得到与之前相同的输出。但是，在 JDK9 上运行它会得到不同的输出：\n\n```\nC:\\\
  Java9APIsAndModules>C:\\java9\\bin\\java --module-path mrjars\\jdojo.mrjar2.jar\n\
  --module jdojo.mrjar/com.jdojo.mrjar.Main\nInside JDK 8 version of Main.main()...\n\
  Creating JDK 9 version of TimeUtil...\nLocal Date: 2018-01-22\n```\n\n输出显示，`Main`\
  \ 类来自 JAR 根目录，而 `TimeUtil` 类来自 `META-INF/versions/9` 目录。请注意，你会得到不同的本地日期值。它会打印你机器上的当前日期。\n\
  \n### 多版本 JAR 的规则\n\n在创建多版本 JAR 时，你需要遵循一些规则。如果出错，`jar` 工具会打印错误信息。有时，错误信息并不直观。正如我所建议的，最好使用\
  \ `--verbose` 选项运行 `jar` 工具，以获取有关错误的更多详细信息。\n\n大多数规则都基于一个事实：一个 MRJAR 包含一个库（或应用程序）的某个版本针对多个\
  \ JDK 平台的 API。例如，你有一个名为 `jdojo-lib-1.0.jar` 的 MRJAR，它可能包含名为 `jdojo-lib` 的库的 API\
  \ 版本 1.0，并且该库可能使用 JDK8 和 JDK9 的 API。这意味着，当这个 MRJAR 在 JDK8 的类路径上、JDK9 的类路径上或 JDK9\
  \ 的模块路径上使用时，它应该提供相同的 API（就公共类型及其公共成员而言）。如果 MRJAR 在 JDK8 和 JDK9 上提供不同的 API，那么它就不是一个有效的\
  \ MRJAR。以下部分描述了一些规则。\n\n#### 模块化多版本 JAR\n\n一个 MRJAR 可以是一个模块化 JAR，在这种情况下，它可以在根目录、一个或多个版本化目录中，或两者的组合中包含一个模块描述符\
  \ `module-info.class`。版本化描述符必须与根模块描述符相同，但以下情况除外：\n\n*   版本化描述符可以对 `java.*` 和 `jdk.*`\
  \ 模块具有不同的非传递性 `requires` 语句。\n*   不同的模块描述符不能对非 JDK 模块具有不同的非传递性 `requires` 语句。\n\
  *   版本化描述符可以具有不同的 `uses` 语句。\n\n这些规则基于这样一个事实：允许更改实现细节，但不允许更改 API 本身。允许更改非 JDK 模块的\
  \ `requires` 语句被视为对 API 的更改——这要求你为不同版本的 JDK 拥有不同的用户定义模块。这就是不允许这样做的原因。\n\n一个模块化 MRJAR\
  \ 不需要在根目录中包含模块描述符。这就是我们在上一节示例中的情况。我们在根目录中没有模块描述符，但在 `META-INF/versions/9` 目录中有一个。这种安排使得在一个\
  \ MRJAR 中同时包含 JDK8 的非模块化代码和 JDK9 的模块化代码成为可能。\n\n\n\n#### 模块化多版本 JAR 与封装\n\n如果在版本化目录中添加了根目录中不存在的新公共类型，则在创建\
  \ MRJAR 时会收到错误。假设在我们的示例中，你为 JDK 9 添加了一个名为`Test`的公共类。如果`Test`类位于`com.jdojo.mrjar`包中，它将被模块导出，并且可供\
  \ MRJAR 外部的代码使用。请注意，根目录不包含`Test`类，因此此 MRJAR 为 JDK 8 和 JDK 9 提供了不同的公共 API。在这种情况下，为\
  \ JDK 9 在`com.jdojo.mrjar`包中添加一个公共的`Test`类，在创建 MRJAR 时将会生成错误。\n\n继续使用同一个示例，假设你为\
  \ JDK 9 将`Test`类添加到了`com.jdojo.test`包中。请注意，该模块并未导出此包。当你在模块路径上使用此 MRJAR 时，外部代码将无法访问`Test`类。从这个意义上说，此\
  \ MRJAR 为 JDK 8 和 JDK 9 提供了相同的公共 API。然而，这里有一个陷阱！你也可以在 JDK 9 中将此 MRJAR 放置在类路径上，在这种情况下，外部代码可以访问`Test`类——这违反了模块封装原则，也违反了\
  \ MRJAR 应在不同 JDK 版本间提供相同公共 API 的规则。因此，在 MRJAR 中向模块的未导出包添加公共类型也是不允许的。如果你尝试这样做，将会收到类似如下的错误信息：\n\
  \n```\nentry: META-INF/versions/9/com/jdojo/test/Test.class, contains a new public\
  \ class not found in base entries\ninvalid multi-release jar file mrjars\\jdojo.mrjar.jar\
  \ deleted\n```\n\n有时，为了支持更新版本的 JDK，需要为同一个库添加更多类型。这些类型必须添加以支持更新的实现。你可以通过向 MRJAR 的版本化目录中添加包私有类型来实现这一点。在此示例中，如果你将`Test`类设为非公共类，则可以为\
  \ JDK 9 添加它。\n\n#### 多版本 JAR 与引导类加载器\n\n引导类加载器不支持多版本 JAR，例如，使用`-Xbootclasspath/a`选项指定\
  \ MRJAR。支持此功能会使引导类加载器的实现因一个很少需要的特性而变得复杂。\n\n#### 相同版本的文件\n\nMRJAR 应在版本化目录中包含同一文件的不同版本。如果某个资源或类文件在不同平台版本中相同，则该文件应仅添加到根目录一次。目前，如果`jar`工具在多个版本化目录中看到内容相同的条目，它会发出警告。\n\
  \n### 多版本 JAR 与 JAR URL\n\n在 MRJAR 出现之前，JAR 中的所有资源都位于根目录下。当你从类加载器请求资源时（`ClassLoader.getResource(\"\
  com/jdojo/mrjar/TimeUtil.class\")`），返回的 URL 类似于以下格式：\n\n```\njar:file:/C:/Java9APIsAndModules/mrjars/jdojo.mrjar.jar!\
  \ com/jdojo/mrjar/TimeUtil.class\n```\n\n使用 MRJAR 后，资源可能从根目录或版本化目录返回。如果你在 JDK 9\
  \ 上查找`TimeUtil.class`文件，URL 将如下所示：\n\n```\njar:file:/C:/Java9APIsAndModules/mrjars/jdojo.mrjar.jar!/META-INF/versions/9/com/jdojo/mrjar/TimeUtil.class\n\
  ```\n\n如果你现有的代码期望资源的`jar` URL 采用特定格式，或者你手动编写了类似的`jar` URL，那么使用 MRJAR 时可能会得到意想不到的结果。如果你正在将\
  \ JAR 重新打包为 MRJAR，则需要重新检查代码并进行修改，使其能与 MRJAR 协同工作。\n\n### 多版本清单属性\n\nMRJAR 在其`MANIFEST.MF`文件中包含一个特殊的属性条目：\n\
  \n```\nMulti-Release: true\n```\n\n`Multi-Release`属性由`jar`工具为 MRJAR 添加。如果此属性的值为`true`，则表示该\
  \ JAR 是一个多版本 JAR。如果其值为`false`或缺少该属性，则它不是多版本 JAR。该属性被添加到清单文件的主节中。\n\n一个名为`MULTI_RELEASE`的新常量已被添加到`java.util.jar`包中的`Attributes.Name`类，用于表示清单文件中的新属性`Multi-Release`。因此，`Attributes.Name.MULTI_RELEASE`常量在\
  \ Java 代码中代表`Multi-Release`属性的值。\n\n## JMOD 格式\n\nJDK 9 引入了一种名为 JMOD 的新格式，用于打包模块。JMOD\
  \ 文件旨在处理比 JAR 文件更多的内容类型。JMOD 文件可以打包本地代码、配置文件、本地命令和其他类型的数据。在撰写本文时，JMOD 格式基于 ZIP 格式，但未来将会改变。JDK\
  \ 9 模块以 JMOD 格式打包，供你在编译时和链接时使用。JMOD 格式在运行时不受支持。你可以在`JDK_HOME\\jmods`目录中找到 JMOD 格式的\
  \ JDK 模块，其中`JDK_HOME`是你安装 JDK 9 的目录。你可以将自己的模块打包成 JMOD 格式。JMOD 格式的文件具有`.jmod`扩展名。例如，名为`java.base`的平台模块已打包在`java.base.jmod`文件中。\n\
  \nJMOD 文件可以包含本地代码，这在运行时动态提取和链接有点棘手。这就是 JMOD 文件在编译时和链接时受支持，但在运行时不受支持的原因。\n\n### 使用\
  \ jmod 工具\n\nJDK 9 附带了一个名为`jmod`的新工具。它位于`JDK_HOME\\bin`目录中。它可以用于创建 JMOD 文件、列出 JMOD\
  \ 文件的内容、打印模块的描述以及记录所用模块的哈希值。使用`jmod`工具的一般语法如下：\n\n```\njmod   \n```\n\n你必须将以下子命令之一与`jmod`命令一起使用：\n\
  \n*   `create`\n*   `extract`\n*   `list`\n*   `describe`\n*   `hash`\n\n`list`和`describe`子命令不接受任何选项。`<jmod-file>`是你正在创建的\
  \ JMOD 文件，或者是你想要描述的现有 JMOD 文件。表 11-1 包含了该工具支持的选项列表。\n\n表 11-1.\n\njmod 工具的选项列表\n\
  \n\n\n| 选项 | 描述 |\n| --- | --- |\n| `--class-path <路径>` | 指定类路径，其中包含待打包的类。`<路径>`\
  \ 可以是 JAR 文件路径列表，或包含应用程序类的目录路径。`<路径>` 中的内容将被复制到 JMOD 文件中。 |\n| `--cmds <路径>` | 指定包含本地命令的目录列表，这些命令需要被复制到\
  \ JMOD 文件中。 |\n| `--config <路径>` | 指定包含用户可编辑配置文件的目录列表，这些文件需要被复制到 JMOD 文件中。 |\n|\
  \ `--dir <路径>` | 指定目标目录，用于提取指定 JMOD 文件的内容。 |\n| `--do-not-resolve-by-default` |\
  \ 如果使用此选项创建 JMOD 文件，则该 JMOD 文件中的模块将从默认根模块集中排除。要解析此类模块，必须使用 `--add-modules` 命令行选项将其添加到默认根模块集中。\
  \ |\n| `--dry-run` | 对模块进行哈希计算的预演。使用此选项会计算并打印哈希值，但不会将其记录在 JMOD 文件中。 |\n| `--exclude\
  \ <模式列表>` | 排除与提供的逗号分隔模式列表匹配的文件，每个元素使用以下形式之一：`<glob 模式>`、`glob:<glob 模式>` 或 `regex:<正则表达式模式>`。\
  \ |\n| `--hash-modules <正则表达式模式>` | 计算并记录哈希值，以将打包的模块与匹配给定 `<正则表达式模式>` 且直接或间接依赖它的模块关联起来。哈希值记录在正在创建的\
  \ JMOD 文件中，或记录在使用 `jmod hash` 命令指定的模块路径上的 JMOD 文件或模块化 JAR 中。 |\n| `--help, -h` |\
  \ 打印 `jmod` 命令的用法描述和所有选项列表。 |\n| `--header-files <路径>` | 指定路径列表作为 `<路径>`，其中包含需要复制到\
  \ JMOD 文件的本地代码头文件。 |\n| `--help-extra` | 打印 `jmod` 工具支持的额外选项的帮助信息。 |\n| `--legal-notices\
  \ <路径>` | 指定需要复制到 JMOD 文件的法律声明的存放位置。 |\n| `--libs <路径>` | 指定包含需要复制到 JMOD 文件的本地库的目录列表。\
  \ |\n| `--main-class <类名>` | 指定用于运行应用程序的主类名。 |\n| `--man-pages <路径>` | 指定手册页的存放位置。\
  \ |\n| `--module-version <版本>` | 指定要记录在 `module-info.class` 文件中的模块版本。 |\n| `--module-path\
  \ <路径>,` `-p <路径>` | 指定用于查找待哈希模块的模块路径。 |\n| `--target-platform <平台>` | `<平台>` 以\
  \ `<操作系统>-<架构>` 的形式指定，例如 `windows-amd64` 和 `linux-amd64`。该选项指定目标操作系统和架构，这些信息将被记录在\
  \ `module-info.class` 文件的 `ModuleTarget` 属性中。 |\n| `--version` | 打印 `jmod` 工具的版本。\
  \ |\n| `--warn-if-resolved <原因>` | 向 `jmod` 工具指定一个提示，如果解析的模块已被弃用、标记为待移除或处于孵化状态，则发出警告。`<原因>`\
  \ 的值可以是以下三种之一：`deprecated`、`deprecated-for-removal` 或 `incubating`。 |\n| `@<文件名>`\
  \ | 从指定文件中读取选项。 |\n\n以下各节详细说明如何使用 `jmod` 命令。本章中使用的所有命令都应在一行内输入。有时，为了在书中清晰展示，我会将它们显示在多行上。\n\
  \n#### 创建 JMOD 文件\n\n你可以使用 `jmod` 工具的 `create` 子命令创建 JMOD 文件。JMOD 文件的内容即一个模块的内容。假设存在以下目录和文件：\n\
  \n```\nC:\\Java9APIsAndModules\\jmods\nC:\\Java9APIsAndModules\\dist\\jdojo.javafx.jar\n\
  ```\n\n以下命令在 `C:\\Java9APIsAndModules\\jmods` 目录中创建一个 `jdojo.javafx.jmod` 文件。该 JMOD\
  \ 文件的内容来自 `jdojo.javafx.jar` 文件。\n\n```\nC:\\Java9APIsAndModules>jmod create --class-path\
  \ dist\\jdojo.javafx.jar jmods\\jdojo.javafx.jmod\n```\n\n通常，JMOD 文件的内容来自一组包含模块编译后代码的目录。以下命令创建一个\
  \ `jdojo.javafx.jmod` 文件。其内容来自 `build\\modules\\jdojo.javafx` 目录。该命令使用 `--module-version`\
  \ 选项设置模块版本，该版本将被记录在 `build\\modules\\jdojo.javafx` 目录下的 `module-info.class` 文件中。在运行以下命令之前，请确保删除上一步创建的\
  \ JMOD 文件。\n\n```\nC:\\Java9APIsAndModules>jmod create --module-version 1.0\n--class-path\
  \ build\\modules\\jdojo.javafx jmods\\jdojo.javafx.jmod\n```\n\n你能用这个 JMOD 文件做什么？你可以将其放在模块路径上，以便在编译时使用。你可以将其与\
  \ `jlink` 工具一起使用，以创建可用于运行应用程序的自定义运行时映像。请记住，你不能在运行时使用 JMOD 文件。如果你尝试通过将 JMOD 文件放在模块路径上来在运行时使用它，你将收到以下错误：\n\
  \n```\nError occurred during initialization of VM\njava.lang.module.ResolutionException:\
  \ JMOD files not supported: jmods\\jdojo.javafx.jmod\n...\n```\n\n#### 提取 JMOD 文件内容\n\
  \n你可以使用 `extract` 子命令提取 JMOD 文件的内容。以下命令将 `jmods\\jdojo.javafx.jmod` 文件的内容提取到名为 `extracted`\
  \ 的目录中。\n\n```\nC:\\Java9APIsAndModules>jmod extract --dir extracted jmods\\jdojo.javafx.jmod\n\
  ```\n\n如果不使用 `--dir` 选项，JMOD 文件的内容将被提取到当前目录中。\n\n#### 列出 JMOD 文件内容\n\n你可以使用 `jmod`\
  \ 工具的 `list` 子命令打印 JMOD 文件中所有条目的名称。以下命令列出了你在上一节中创建的 `jdojo.javafx.jmod` 文件的内容：\n\
  \n```\nC:\\Java9APIsAndModules>jmod list jmods\\jdojo.javafx.jmod\nclasses/module-info.class\n\
  classes/com/jdojo/javafx/BindingTest.class\n...\nclasses/resources/fxml/sayhello.fxml\n\
  ```\n\n以下命令列出了 `java.base` 模块的内容，该模块以名为 `java.base.jmod` 的 JMOD 文件形式提供。该命令假设你已将\
  \ JDK9 安装在 `C:\\java9` 目录中。输出超过 120 页。这里显示部分输出。请注意，JMOD 文件在内部将不同类型的内容存储在不同的目录中。\n\
  \n```\nC:\\Java9APIsAndModules>jmod list C:\\java9\\jmods\\java.base.jmod\nclasses/module-info.class\n\
  classes/java/nio/file/WatchEvent.class\nclasses/java/nio/file/WatchKey.class\nbin/java.exe\n\
  bin/javaw.exe\nnative/amd64/jvm.cfg\nnative/java.dll\nconf/net.properties\nconf/security/java.policy\n\
  conf/security/java.security\n...\n```\n\n#### 描述 JMOD 文件\n\n你可以使用 `jmod` 工具的 `describe`\
  \ 子命令描述 JMOD 文件中包含的模块。以下命令描述了 `jdojo.javafx.jmod` 文件中包含的模块：\n\n```\nC:\\Java9APIsAndModules>jmod\
  \ describe jmods\\jdojo.javafx.jmod\njdojo.javafx@1.0\nexports com.jdojo.javafx\n\
  requires java.base mandated\nrequires javafx.controls\nrequires javafx.fxml\ncontains\
  \ resources.fxml\n```\n\n你可以使用此命令描述平台模块。以下命令描述了 `java.sql.jmod` 中包含的模块，假设你已将 JDK9\
  \ 安装在 `C:\\java9` 目录中：\n\n```\nC:\\Java9APIsAndModules>jmod describe C:\\java9\\\
  jmods\\java.sql.jmod\njava.sql@9.0.1\nexports java.sql\nexports javax.sql\nexports\
  \ javax.transaction.xa\nrequires java.base mandated\nrequires java.logging transitive\n\
  requires java.xml transitive\nuses java.sql.Driver\nplatform windows-amd64\n```\n\
  \n\n\n#### 记录模块哈希值\n\n你可以使用 `jmod` 工具的 `hash` 子命令，在 JMOD 文件所含模块的 `module-info.class`\
  \ 文件中记录其他模块的哈希值。这些哈希值将用于后续的依赖验证。假设你有四个模块，分别位于四个 JMOD 文件中：\n\n*   `jdojo.prime`\n\
  *   `jdojo.prime.faster`\n*   `jdojo.prime.probable`\n*   `jdojo.prime.client`\n\
  \n假设你想将这些模块分发给客户，并确保模块代码保持不变。你可以通过在 `jdojo.prime` 模块中记录 `jdojo.prime.faster`、`jdojo.prime.probable`\
  \ 和 `jdojo.prime.client` 模块的哈希值来实现这一点。让我们看看如何实现。\n\n为了计算其他模块的哈希值，`jmod` 工具需要找到这些模块。你需要使用\
  \ `--module-path` 选项来指定模块路径，该路径下可以找到其他模块。你还需要使用 `--hash-modules` 选项来指定需要记录哈希值的模块的模式列表。\n\
  \n提示\n\n当你将模块打包为模块化 JAR 时，也可以对 `jar` 工具使用 `--hash-modules` 和 `--module-path` 选项来记录依赖模块的哈希值。\n\
  \n使用以下四个命令为这四个模块创建 JMOD 文件。请注意，我在创建 `com.jdojo.prime.client.jmod` 文件时使用了 `--main-class`\
  \ 选项。在讨论 `jlink` 工具的第 12 章中，我会再次使用它。如果在运行这些命令时出现“文件已存在”错误，请从 `jmods` 目录中删除现有的 JMOD\
  \ 文件并重新运行命令。\n\n```\nC:\\Java9APIsAndModules>jmod create --module-version 1.0\n\
  --class-path build\\modules\\jdojo.prime jmods\\jdojo.prime.jmod\nC:\\Java9APIsAndModules>jmod\
  \ create --module-version 1.0\n--class-path build\\modules\\jdojo.prime.faster jmods\\\
  jdojo.prime.faster.jmod\nC:\\Java9APIsAndModules>jmod create --module-version 1.0\n\
  --class-path build\\modules\\jdojo.prime.probable jmods\\jdojo.prime.probable.jmod\n\
  C:\\Java9APIsAndModules>jmod create --module-version 1.0\n--class-path build\\modules\\\
  jdojo.prime.client jmods\\jdojo.prime.client.jmod\n```\n\n现在，你可以使用以下命令，在 `jdojo.prime`\
  \ 模块中记录所有名称以 `\"jdojo.prime.\"` 开头的模块的哈希值：\n\n```\nC:\\Java9APIsAndModules>jmod\
  \ hash --module-path jmods --hash-modules jdojo.prime.? jmods\\jdojo.prime.jmod\n\
  Hashes are recorded in module jdojo.prime\n```\n\n让我们查看记录在 `com.jdojo.prime` 模块中的哈希值。以下命令将打印模块描述以及记录在\
  \ `com.jdojo.prime` 模块中的哈希值：\n\n```\nC:\\Java9APIsAndModules>jmod describe jmods\\\
  jdojo.prime.jmod\njdojo.prime@1.0\nexports com.jdojo.prime\nrequires java.base mandated\n\
  uses com.jdojo.prime.PrimeChecker\nprovides com.jdojo.prime.PrimeChecker with com.jdojo.prime.impl.genericprimechecker\n\
  contains com.jdojo.prime.impl\nhashes jdojo.prime.client SHA-256 5950eccd247f32586ce95e9849f520f4b9f54bc520d7969c396dc4f93805121b\n\
  hashes jdojo.prime.faster SHA-256 553822453a53e3884e264cfa12848be32d3f0b9a5df506aa57ba4443dfcbdc6a\n\
  hashes jdojo.prime.probable SHA-256 a1b8b081f2f15a205d62313de97ee285ed845895c8ef3c52b53a16370dd3b2d5\n\
  ```\n\n你也可以在使用 `create` 子命令创建新的 JMOD 文件时记录其他模块的哈希值。假设三个模块 `jdojo.prime.faster`、`jdojo.prime.probable`\
  \ 和 `jdojo.prime.client` 存在于模块路径上，你可以使用以下命令创建 `jdojo.prime.jmod` 文件，该文件也会记录这三个模块的哈希值：\n\
  \n```\nC:\\Java9APIsAndModules>jmod create --module-version 1.0\n--module-path jmods\n\
  --hash-modules jdojo.prime.?\n--class-path build\\modules\\jdojo.prime jmods\\jdojo.prime.jmod\n\
  ```\n\n你可以对 JMOD 文件进行哈希处理过程的试运行，此时会打印哈希值，但不会记录。试运行选项有助于在不创建 JMOD 文件的情况下确保所有设置正确。以下命令序列将引导你完成整个过程。首先，删除上一步中创建的\
  \ `jmods\\jdojo.prime.jmod` 文件。\n\n以下命令创建 `jmods\\jdojo.prime.jmod` 文件，但不记录任何其他模块的哈希值：\n\
  \n```\nC:\\Java9APIsAndModules>jmod create --module-version 1.0\n--module-path jmods\n\
  --class-path build\\modules\\jdojo.prime jmods\\jdojo.prime.jmod\n```\n\n以下命令试运行\
  \ `hash` 子命令。它会计算并打印与 `--hash-modules` 选项中指定的正则表达式匹配的其他模块的哈希值。不会在 `jmods\\jdojo.javafx.jmod`\
  \ 文件中记录任何哈希值。\n\n```\nC:\\Java9APIsAndModules>jmod hash --dry-run --module-path\
  \ jmods --hash-modules jdojo.prime.? jmods\\jdojo.prime.jmod\nDry run:\njdojo.prime\n\
  hashes jdojo.prime.client SHA-256 5950eccd247f32586ce95e9849f520f4b9f54bc520d7969c396dc4f93805121b\n\
  hashes jdojo.prime.faster SHA-256 553822453a53e3884e264cfa12848be32d3f0b9a5df506aa57ba4443dfcbdc6a\n\
  hashes jdojo.prime.probable SHA-256 a1b8b081f2f15a205d62313de97ee285ed845895c8ef3c52b53a16370dd3b2d5\n\
  ```\n\n以下命令验证了上一条命令没有在 JMOD 文件中记录任何哈希值：\n\n```\nC:\\Java9APIsAndModules>jmod describe\
  \ jmods\\jdojo.prime.jmod\njdojo.prime@1.0\nexports com.jdojo.prime\nrequires java.base\
  \ mandated\nuses com.jdojo.prime.PrimeChecker\nprovides com.jdojo.prime.PrimeChecker\
  \ with com.jdojo.prime.impl.genericprimechecker\ncontains com.jdojo.prime.impl\n\
  ```\n\n你将在第 12 章中使用 `jlink` 工具创建自定义运行时镜像时，再次看到 JMOD 文件的实际应用。\n\n\n\n## 摘要\n\nJDK9\
  \ 支持四种打包模块的格式：展开目录、JAR 文件、JMOD 文件和 JIMAGE 文件。JDK9 对 JAR 格式进行了增强，以支持模块化 JAR 和多版本\
  \ JAR。多版本 JAR 允许你将同一版本的库或应用程序打包，使其面向不同版本的 JDK。例如，一个多版本 JAR 可能包含库 1.2 版本的代码，其中既有面向\
  \ JDK8 的代码，也有面向 JDK9 的代码。当该多版本 JAR 在 JDK8 上使用时，将使用面向 JDK8 的库代码；当它在 JDK9 上使用时，则将使用面向\
  \ JDK9 的库代码。特定于 JDK 版本 `N` 的文件存储在多版本 JAR 的 `META-INF\\versions\\N` 目录中。所有 JDK 版本通用的文件则存储在根目录中。对于不支持多版本\
  \ JAR 的环境，此类 JAR 会被视为普通 JAR。在多版本 JAR 中，文件的搜索顺序有所不同——所有以当前平台主版本号命名的版本化目录会在根目录之前被搜索。\n\
  \nJMOD 文件旨在处理比 JAR 文件更多的内容类型。它们可以打包原生代码、配置文件、原生命令以及其他类型的数据。在撰写本文时，JMOD 格式基于 ZIP\
  \ 格式，但未来将会改变。JDK9 模块以 JMOD 格式打包，供你在编译时和链接时使用。JMOD 格式在运行时不受支持。你可以使用 `jmod` 工具来处理\
  \ JMOD 文件。\n\n问题与练习\n\n1.  你可以使用哪些格式来打包你的模块？\n2.  什么是多版本 JAR？\n3.  描述多版本 JAR 的结构。\n\
  4.  当一个多版本 JAR 在不理解多版本 JAR 的 JDK 版本（例如 JDK8）上使用时，会发生什么？\n5.  描述在多版本 JAR 中查找资源时的搜索顺序。\n\
  6.  描述多版本 JAR 的局限性。\n7.  对于多版本 JAR，其 `META-INF\\MANIFEST.MF` 文件中存在的属性名称是什么？\n8.\
  \  什么是 `jmod` 工具，它位于何处？\n9.  什么是 JMOD 格式，它比 JAR 格式好在哪里？\n10. Java 从 JDK9 开始支持三个阶段：编译时、链接时和运行时。JMOD\
  \ 格式在哪些阶段受支持？\n11. 假设你有一个名为 `jdojo.test.jmod` 的 JMOD 文件。请写出使用 `jmod` 工具描述此 JMOD\
  \ 文件中存储的模块的命令。\n12. JDK 模块以 JMOD 格式存放的位置在哪里？\n\n# 12. 自定义运行时镜像\n\n在本章中，你将学习：\n\n\
  *   什么是自定义运行时镜像和 JIMAGE 格式\n*   如何使用 `jlink` 工具创建自定义运行时镜像\n*   如何指定运行存储在自定义镜像中的应用程序的命令名称\n\
  *   如何将插件与 `jlink` 工具一起使用\n\n## 什么是自定义运行时镜像？\n\n在 JDK9 之前，Java 运行时镜像是一个巨大的单体工件——这增加了下载时间、启动时间和内存占用。单体\
  \ JRE 使得在内存较小的设备上使用 Java 变得不可能。如果你将 Java 应用程序部署到云端，你需要为使用的内存付费；通常情况下，单体 JRE 使用的内存比实际需要的多，从而导致你为云服务支付更多费用。Java\
  \ 8 中引入的紧凑配置文件（compact profiles）朝着减小 JRE 大小（从而减小运行时内存占用）迈出了一步，它允许你将 JRE 的一个子集打包到一个称为紧凑配置文件的自定义运行时镜像中。\n\
  \nJava 9 采用了一种整体性的方法来打包运行时镜像。JDK 已经被模块化。你的应用程序代码也作为模块进行打包。在 Java 9 中，你可以创建一个自定义运行时，其中包含你的应用程序模块以及你的应用程序所使用的那些\
  \ JDK 模块。你还可以在运行时镜像中打包原生命令。创建运行时镜像的另一个好处是，你只需要向应用程序用户交付一个包——即运行时镜像。他们不再需要下载和安装单独的\
  \ JRE 包来运行你的应用程序。\n\n运行时镜像以一种称为 JIMAGE 的特殊格式存储，该格式针对空间和速度进行了优化。JIMAGE 格式仅在运行时受支持。它是一种用于在\
  \ JDK 中存储和索引模块、类及资源的容器格式。从 JIMAGE 文件中搜索和加载类比从 JAR 和 JMOD 文件中快得多。JIMAGE 格式是 JDK 内部的，开发者很少需要直接与\
  \ JIMAGE 文件交互。\n\nJIMAGE 格式预计会随着时间的推移而显著演变，因此其内部细节不会向开发者公开。JDK9 附带了一个名为 `jimage`\
  \ 的工具，可用于探索 JIMAGE 文件。我将在本章的单独一节中详细介绍该工具。\n\n提示\n\n你使用 `jlink` 工具来创建自定义运行时镜像，该镜像使用一种名为\
  \ JIMAGE 的新文件格式来存储模块。JDK9 附带了 `jimage` 工具，让你可以探索 JIMAGE 文件的内容。\n\n## 不再有 rt.jar\n\
  \n如果你的代码期望运行时镜像存储在名为 `rt.jar` 的文件中，请注意：JDK 运行时在 JDK9 之前存储在 `rt.jar` 中，但在 JDK9 中已不再如此。当你将应用程序迁移到\
  \ JDK9 时，这可能会破坏你的代码。\n\n## 创建自定义运行时镜像\n\n你可以使用 `jlink` 工具创建一个特定于平台的自定义运行时镜像。该运行时镜像将包含指定的应用程序模块及其依赖项，以及仅包含所需的平台模块，从而减小运行时镜像的大小。这对于运行在内存较小的嵌入式设备上的应用程序非常有用。`jlink`\
  \ 工具位于 `JDK_HOME\\bin` 目录中。运行 `jlink` 工具的一般语法如下：\n\n```\njlink  --module-path  --add-modules\
  \  --output \n```\n\n这里，`<options>` 包括零个或多个 `jlink` 的选项，如表 12-1 所列。`<modulepath>`\
  \ 是模块路径，平台模块和应用程序模块位于其中。模块可以是模块化 JAR、展开目录和 JMOD 文件。`<mods>` 是要添加到镜像中的模块列表，由于对其他模块的传递依赖，这可能会导致添加额外的模块。`<path>`\
  \ 是输出目录，生成的运行时镜像将存储在此处。\n\n表 12-1. jlink 工具的选项列表\n\n\n\n| 选项 | 描述 |\n| --- | ---\
  \ |\n| `--add-modules <mod>,<mod>…` | 指定要解析的根模块列表。所有已解析的模块都将被添加到运行时映像中。 |\n| `--bind-services`\
  \ | 在链接过程中执行完整的服务绑定。如果添加的模块包含 `uses` 语句，`jlink` 将扫描模块路径上的所有模块，以将 `uses` 语句中指定的服务的所有服务提供者模块包含到运行时映像中。\
  \ |\n| `-c, --compress <0&#124;1&#124;2>[:filter=<pattern-list>]` | 指定输出映像中所有资源的压缩级别。`0`\
  \ 表示常量字符串共享，`1` 表示 ZIP 压缩，`2` 表示两者兼有。可以指定一个可选的 `<pattern-list>` 过滤器来列出要包含的文件模式。\
  \ |\n| `--disable-plugin <plugin-name>` | 禁用指定的插件。 |\n| `--endian <little&#124;big>`\
  \ | 指定生成的运行时映像的字节顺序。默认值为本机平台的字节顺序。 |\n| `-h, --help` | 打印 `jlink` 工具的使用说明和所有选项列表。\
  \ |\n| `--ignore-signing-information` | 当已签名的模块化 JAR 被链接到映像中时，抑制致命错误。已签名的模块化 JAR\
  \ 的相关文件的签名不会被复制到运行时映像中。 |\n| `--launcher <command>=<module>` | 指定模块的启动器命令。`<command>`\
  \ 是你想要生成的用于启动应用程序的命令名称，例如 `runmyapp`。该工具将创建一个名为 `<command>` 的脚本/批处理文件来运行 `<module>`\
  \ 中记录的主类。 |\n| `--launcher <command>=<module>/<main-class>` | 指定模块和主类的启动器命令。`<command>`\
  \ 是你想要生成的用于启动应用程序的命令名称，例如 `runmyapp`。该工具将创建一个名为 `<command>` 的脚本/批处理文件来运行 `<module>`\
  \ 中的 `<main-class>`。 |\n| `--limit-modules <mod>,<mod>` | 将可观察模块限制为指定模块的传递闭包中的模块，加上主模块（如果指定），以及使用\
  \ `--add-modules` 选项指定的任何其他模块。 |\n| `--list-` `plugins` | 列出可用的插件。 |\n| `-p, --module-path\
  \ <modulepath>` | 指定模块路径，平台模块和应用程序模块将在此路径下被查找并添加到运行时映像中。 |\n| `--no-header-files`\
  \ | 排除本机代码的包含头文件。 |\n| `--no-man-pages` | 排除手册页。 |\n| `--output <path>` | 指定生成的运行时映像的位置。\
  \ |\n| `--save-opts <filename>` | 将 `jlink` 选项保存到指定的文件中。 |\n| `-G, --strip-debug`\
  \ | 从输出映像中剥离调试信息。 |\n| `--suggest-providers [<service-name>,...]` | 如果未指定服务名称，则建议将为添加的模块链接的所有服务的提供者名称。如果指定一个或多个服务名称，则建议指定服务名称的提供者。此选项可在创建映像之前使用，以了解使用\
  \ `--bind-services` 选项时将包含哪些服务。 |\n| `-v, --` `verbose` | 打印详细输出。 |\n| `--version`\
  \ | 打印 `jlink` 工具的版本。 |\n| `@<filename>` | 从指定文件读取选项。 |\n\n让我们创建一个运行时映像，其中包含用于素数检查器应用程序的四个模块以及所需的平台模块（仅包含\
  \ `java.base` 模块）。素数检查应用程序是在本书第二卷的第 [14](https://doi.org/10.1007/978-1-4842-3546-1_14)\
  \ 章中创建的，我在该章中解释了如何实现服务。我将素数检查器应用程序的源代码包含在了本书的源代码中。这些模块是 `jdojo.prime`、`jdojo.prime.faster`、`jdojo.prime.probable`\
  \ 和 `jdojo.prime.client`。你可以选择任何其他模块来创建自定义运行时映像。\n\n请注意，以下命令仅包含素数检查器应用程序中的三个模块。第四个模块\
  \ `jdojo.prime` 将被添加，因为这三个模块依赖于 `jdojo.prime` 模块。该命令假设你已经将所有四个模块打包成 JMOD 格式并存储在\
  \ `jmods` 目录中。以 JMOD 格式打包模块在第 11 章中介绍过。命令后面的文本包含解释。\n\n```\nC:\\Java9APIsAndModules>jlink\
  \ --module-path jmods;C:\\java9\\jmods\n--add-modules jdojo.prime.client,jdojo.prime.faster,jdojo.prime.probable\n\
  --launcher runprimechecker=jdojo.prime.client/com.jdojo.prime.client.Main\n--output\
  \ image\\primechecker\n```\n\n在我解释此命令的所有选项之前，让我们验证运行时映像是否已成功创建。该命令应该将运行时映像复制到 `C:\\\
  Java9APIsAndModules\\image\\primechecker` 目录。运行以下命令以验证运行时映像包含五个模块：\n\n```\nC:\\\
  Java9APIsAndModules>image\\primechecker\\bin\\java --list-modules\n```\n\n```\n\
  java.base@9\njdojo.prime@1.0\njdojo.prime.client@1.0\njdojo.prime.faster@1.0\njdojo.prime.probable@1.0\n\
  ```\n\n如果你得到的输出与此处显示的类似，则说明运行时映像已正确创建。输出中 `@` 符号后面显示的模块版本号可能与你不同。\n\n`--``module-path`\
  \ 选项指定了两个目录——`jmods` 和 `C:\\java9\\jmods`。我将素数检查器应用程序的四个 JMOD 文件保存在 `C:\\Java9APIsAndModules\\\
  jmods` 目录中。模块路径中的第一个元素让 `jlink` 工具找到所有应用程序模块。我将 JDK9 安装在 `C:\\java9` 目录中，因此模块路径中的第二个元素让该工具找到平台模块。如果你不指定第二部分，则会收到错误：\n\
  \n```\nError: Module java.base not found, required by jdojo.prime.probable\n```\n\
  \n`--``add-modules` 选项指定了素数检查器应用程序的三个模块。你可能想知道为什么我们没有使用此选项指定名为 `jdojo.prime` 的第四个模块。此列表包含根模块，而不仅仅是包含在运行时映像中的模块。`jlink`\
  \ 工具将传递性地解析这些根模块的所有依赖项，并将所有已解析的依赖模块包含到运行时映像中。这三个模块依赖于 `jdojo.prime` 模块，该模块将通过定位其在模块路径上而被解析，因此将被包含在运行时映像中。该映像还将包含\
  \ `java.base` 模块，因为所有应用程序模块都隐式依赖于它。\n\n`--output` 选项指定运行时映像将被复制到的目录。该命令会将运行时映像复制到\
  \ `C:\\Java9APIsAndModules\\image\\primechecker` 目录。输出目录包含子目录和一个名为 `release` 的文件。`release`\
  \ 文件包含 JDK 版本以及链接到此映像的所有 JDK 和用户模块的列表。表 12-2 包含每个目录内容的描述。\n\n表 12-2.\n\njlink 工具的选项列表\n\
