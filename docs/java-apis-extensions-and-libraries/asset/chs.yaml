  --module-path ./dist\n--module jdojo.jni/com.jdojo.jni.HelloJNI\n```\n\n```\nHello\
  \ JNI\n```\n\n## 原生函数命名规则\n\n编译器使用（通过 `-h` 选项）一种基于名称改编（name mangling）的命名规则，用于在 C/C++\
  \ 头文件中生成本地方法名。Java 运行时使用相同的规则，将 Java 本地方法名解析为共享库中的原生函数名。采用名称改编规则是为了确保为原生函数生成的名称是有效的\
  \ C/C++ 名称，且不会发生名称冲突。您可以将名称改编理解为简单地将无效字符替换为构成有效函数名的字符。原生函数名基于以下部分生成，各部分之间用下划线连接：\n\
  \n*   方法名以单词 `Java` 开头。\n*   包含本地方法声明的 Java 类的包名的改编后完全限定名。下划线用作包/子包分隔符。\n*   Java\
  \ 中的本地方法名。\n*   对于重载的本地方法，后跟两个下划线以及改编后的方法签名。\n\nJava 运行时为原生函数使用两个名称——短名称和长名称。短名称不使用两个下划线后跟改编后的方法签名。Java\
  \ 运行时首先在共享库中搜索短名称。如果未找到具有短名称的函数，则使用长名称进行搜索。改编后的名称使用表 7-1 中所示的转换表。\n\n表 7-1. 名称改编过程中使用的转义序列\n\
  \n| 原始字符 | 替换字符 |\n| --- | --- |\n| 任何非 ASCII 的 Unicode 字符 | `_0xxxx` 注意，`_oxxxx`\
  \ 中使用的字母均为小写，例如 `_0abcd` |\n| `_` (下划线) | `_1` |\n| `;` (分号) | `_2` |\n| `` (左方括号)\
  \ | `_3` |\n\n诸如分号和左方括号之类的字符可能作为 Java 内部使用的方法参数签名的一部分出现。表 [7-2 展示了 `.Java` 代码中的方法声明以及\
  \ Java 内部使用的方法签名的几个示例。\n\n表 7-2. Java 方法声明与内部使用方法签名的示例\n\n| 方法声明 | 内部使用方法签名 |\n\
  | --- | --- |\n| `public static void javaPrintMsg(java.lang.String)` | `(Ljava/lang/String;)V`\
  \ |\n| `public void javaCallBack()` | `()V` |\n| `public static void main(java.lang.String[])`\
  \ | `(Ljava/lang/String;)V` |\n\n如果您声明了一个 `java.lang.String` 类型的参数，它在内部会被用作 `Ljava/lang/String;`。要了解\
  \ Java 内部使用的方法的签名，您需要使用带有 `-s` 选项的 `javap` 命令。以下命令将打印 `com.jdojo.jni.HelloJNI` 类中所有方法的方法签名。您可以使用\
  \ `-private` 选项来打印包括 `private` 方法在内的所有方法的签名。\n\n```\njavap -s -private com.jdojo.jni.HelloJNI\n\
  ```\n\n如果您需要在原生代码的 JNI 函数中使用 Java 方法的方法签名，您应该运行 `javap` 命令来获取签名，而不是手动输入。您可以学习构成\
  \ Java 内部使用的方法签名的规则。但是，使用 `javap` 命令可以轻松获取此信息。让我们考虑一个 `Test` 类中一些本地方法的声明，如[清单 7-6\
  \ 所示。\n\n```\n// Test.java\npackage com.jdojo.jni;\npublic class Test {\nprivate\
  \ native void sayHello();\nprivate native void printMsg(String msg);\nprivate native\
  \ int[] increment(int[] num, int incrementValue);\nprivate native double myMethod(int\
  \ i, String s[], String ss);\nprivate native double myMethod(double i, String s[],\
  \ String ss);\nprivate native double myMethod(short i, String s[], String ss);\n\
  }\n清单 7-6. 包含一些本地方法声明的 Test 类\n```\n\n如果您使用 `-h` 选项编译 `Test` 类并运行命令，您将得到一个 `com_jdojo_jni_Test.h`\
  \ 头文件，其内容如清单 7-7 所示。\n\n```\n/* 不要编辑此文件 - 它是机器生成的 */\n#include \n/* 用于类 com_jdojo_jni_Test\
  \ 的头文件 */\n#ifndef _Included_com_jdojo_jni_Test\n#define _Included_com_jdojo_jni_Test\n\
  #ifdef __cplusplus\nextern \"C\" {\n#endif\n/*\n* 类:     com_jdojo_jni_Test\n* 方法:\
  \    sayHello\n* 签名: ()V\n*/\nJNIEXPORT void JNICALL Java_com_jdojo_jni_Test_sayHello\n\
  (JNIEnv *, jobject);\n/*\n* 类:     com_jdojo_jni_Test\n* 方法:    printMsg\n* 签名:\
  \ (Ljava/lang/String;)V\n*/\nJNIEXPORT void JNICALL Java_com_jdojo_jni_Test_printMsg\n\
  (JNIEnv *, jobject, jstring);\n/*\n* 类:     com_jdojo_jni_Test\n* 方法:    increment\n\
  * 签名: ([II)[I\n*/\nJNIEXPORT jintArray JNICALL Java_com_jdojo_jni_Test_increment\n\
  (JNIEnv *, jobject, jintArray, jint);\n/*\n* 类:     com_jdojo_jni_Test\n* 方法:  \
  \  myMethod\n* 签名: (I[Ljava/lang/String;Ljava/lang/String;)D\n*/\nJNIEXPORT jdouble\
  \ JNICALL Java_com_jdojo_jni_Test_myMethod__I_3Ljava_lang_String_2Ljava_lang_String_2\n\
  (JNIEnv *, jobject, jint, jobjectArray, jstring);\n/*\n* 类:     com_jdojo_jni_Test\n\
  * 方法:    myMethod\n* 签名: (D[Ljava/lang/String;Ljava/lang/String;)D\n*/\nJNIEXPORT\
  \ jdouble JNICALL Java_com_jdojo_jni_Test_myMethod__D_3Ljava_lang_String_2Ljava_lang_String_2\n\
  (JNIEnv *, jobject, jdouble, jobjectArray, jstring);\n/*\n* 类:     com_jdojo_jni_Test\n\
  * 方法:    myMethod\n* 签名: (S[Ljava/lang/String;Ljava/lang/String;)D\n*/\nJNIEXPORT\
  \ jdouble JNICALL Java_com_jdojo_jni_Test_myMethod__S_3Ljava_lang_String_2Ljava_lang_String_2\n\
  (JNIEnv *, jobject, jshort, jobjectArray, jstring);\n#ifdef __cplusplus\n}\n#endif\n\
  #endif\n清单 7-7. 为类 com.jdojo.jni.Test 生成的头文件\n```\n\n您可以查看为不同本地方法声明生成的原生函数名。不必担心函数参数使用的数据类型。我将在下一节介绍\
  \ Java 与原生语言之间的数据类型映射。\n\n\n\n## 数据类型映射\n\nJNI 定义了 Java 与原生函数中所用数据类型之间的映射关系。表 7-3\
  \ 列出了 Java 与原生 C/C++ 语言之间基本数据类型的映射。请注意，你只需在 Java 基本数据类型名称前加上 `j`，即可得到 C/C++ 中对应的数据类型名称。JNI\
  \ 还定义了一种名为 `jsize` 的数据类型，用于存储长度，例如数组或字符串的长度。\n\n表 7-3.\n\nJava 基本数据类型与 JNI 原生数据类型之间的映射\n\
  \n| Java 基本类型 | 原生基本类型 | 描述 |\n| --- | --- | --- |\n| `boolean` | `jboolean` | 无符号\
  \ 8 位 |\n| `byte` | `jbyte` | 有符号 8 位 |\n| `char` | `jchar` | 无符号 16 位 |\n| `double`\
  \ | `jdouble` | 64 位 |\n| `float` | `jfloat` | 32 位 |\n| `int` | `jint` | 有符号 32\
  \ 位 |\n| `long` | `jlong` | 有符号 64 位 |\n| `short` | `jshort` | 有符号 16 位 |\n| `void`\
  \ | `void` | 不适用 |\n\nJNI 为 Java 引用类型定义了对应的引用类型。在 JNI 中，不可能为 Java 中可创建的所有引用类型都定义单独的类型。所有\
  \ Java 引用类型都可以映射到名为 `jobject` 的 JNI 引用类型。JNI 提供了一些专门的引用类型，用于表示 Java 中常用的引用类型；例如，JNI\
  \ 中的 `jstring` 表示 Java 中的 `java.lang.String`。表 7-4 列出了 Java 与 JNI 之间的引用类型映射。\n\n\
  表 7-4.\n\nJava 与 JNI 之间的引用类型映射\n\n| Java 引用类型 | JNI 类型 |\n| --- | --- |\n| 任意 Java\
  \ 对象 | `jobject` |\n| `java.lang.String` | `jstring` |\n| `java.lang.Class` | `jclass`\
  \ |\n| `java.lang.Throwable` | `jthrowable` |\n\nJNI 定义了单独的引用类型来表示 Java 数组。`jarray`\
  \ 类型是一种通用数组类型，可表示任何 Java 数组类型。对于 Java 中的每种数组类型，都有一种专门的数组类型。在 JNI 中，数组类型的命名方式类似于\
  \ `jxxxArray`，其中 `xxx` 可以是 `object`、`boolean`、`byte`、`char`、`double`、`float`、`int`、`long`\
  \ 和 `short`。例如，C/C++ 中的 `jintArray` 表示 Java 中的 `int` 数组。请注意，Java 中的所有引用类型数组都由 C/C++\
  \ 中的 `jobjectArray` 类型表示。\n\n在使用 JNI 编写 C/C++ 代码时，你还会遇到另一种名为 `jvalue` 的类型。它是 C/C++\
  \ 中定义的一个联合体类型，如下所示：\n\n```\ntypedef union jvalue {\njboolean z;\njbyte    b;\njchar\
  \    c;\njshort   s;\njint     i;\njlong    j;\njfloat   f;\njdouble  d;\njobject\
  \  l;\n} jvalue\n```\n\n请注意，`jvalue` 联合体类型在 Java 中没有对应的类型。通常，`jvalue` 类型被定义为 JNI\
  \ API 中内置函数的参数类型。\n\n## 在 C/C++ 中使用 JNI 函数\n\nJNI 函数允许你在原生代码中访问 JVM 数据结构和对象。有时，它们允许你转换在\
  \ Java 与原生环境之间传递的特定格式的数据。所有原生函数的第一个参数始终是指向 `JNIEnv` 的指针，而 `JNIEnv` 本身又是指向所有 JNI\
  \ 函数指针表的指针。\n\n对于 `JNIEnv` 类型，你始终可以调用两个版本的函数：一个用于 C，一个用于 C++。C 版本的函数接受指向 `JNIEnv`\
  \ 的指针作为第一个参数，而 C++ 版本则没有这个第一个参数。C 和 C++ 中同一方法的两个版本调用方式不同。以下代码片段展示了在 C 和 C++ 中调用\
  \ JNI 函数的区别，假设 `FuncXxx` 是函数名，`env` 是指向 `JNIEnv` 类型的指针：\n\n```\n// C 风格\n(*env)->FuncXxx(env,\
  \ );\n// C++ 风格\nenv->FuncXxx();\n```\n\n本章使用 C++ 方式调用 JNI 函数。你可以参考前面的代码片段，轻松地将代码转换为\
  \ C 风格。\n\n作为一个具体示例，以下是 `GetStringUTFChars()` JNI 函数的函数签名，该函数允许你将 Java 字符串转换为 UTF-8\
  \ 字符串格式：\n\n```\n// GetStringUTFChars() JNI 函数的 C 版本\nconst char * GetStringUTFChars(JNIEnv\
  \ *env, jstring string, jboolean *isCopy);\n// GetStringUTFChars() JNI 函数的 C++ 版本\n\
  const char * GetStringUTFChars(jstring string, jboolean *isCopy);\n```\n\n如果你想在\
  \ C 或 C++ 中调用此函数，你的代码将如下所示：\n\n```\n// C 代码\nconst char *utfMsg = (*env)->GetStringUTFChars(env,\
  \ msg, iscopy);\n// C++ 代码\nconst char *utfMsg = env->GetStringUTFChars(msg, iscopy);\n\
  ```\n\n\n\n## 处理字符串\n\nJava 与 C/C++ 中字符串的表示方式不同。在 Java 中，字符串表示为 16 位 Unicode 字符序列；而在\
  \ C/C++ 中，字符串是指向以空字符结尾的字符序列的指针。原生代码中的 `jstring` 引用类型代表 `java.lang.String` 类的一个实例，该类是一个\
  \ 16 位 Unicode 字符序列。JNI 提供了将 Java 字符串转换为原生字符串以及反向转换的函数。其中一组字符串函数处理 UTF-8 字符串，另一组处理\
  \ Unicode 字符串。当 Java 将字符串传递给原生代码时，你必须在原生代码中将该字符串转换为原生格式（UTF-8 或 Unicode）后才能使用。将字符串从原生代码返回给\
  \ Java 时也遵循同样的逻辑。你必须将原生字符串转换为 `jstring` 实例，然后才能将其返回给 Java。\n\n让我们从一个示例开始，该示例中你将把一个字符串从\
  \ Java 代码传递给 C/C++ 代码。C/C++ 代码会将 Java 字符串转换为原生 UTF-8 格式，并使用 `printf()` 函数将其打印到标准输出。Java\
  \ 中的原生方法声明如下：\n\n*   `public native void printMsg(String msg);`\n*   `public native\
  \ String getMsg();`\n\n`printMsg()` 方法接受一个 Java 字符串，其原生函数会将其打印到标准输出。`getMsg()` 方法将一个原生字符串返回给\
  \ Java，Java 会将其打印到标准输出。清单 7-8 包含了声明这两个原生方法的 Java 代码。请注意，静态初始化加载了你在上一节中创建的名为 `beginningjava`\
  \ 的共享库。这次，你需要在共享库中包含新原生方法的 C++ 代码。\n\n```\n// JNIStringTest.java\npackage com.jdojo.jni;\n\
  public class JNIStringTest {\nstatic {\nSystem.loadLibrary(\"beginningjava\");\n\
  }\npublic native void printMsg(String msg);\npublic native String getMsg();\npublic\
  \ static void main(String[] args) {\nJNIStringTest stringTest = new JNIStringTest();\n\
  String javaMsg = \"Hello from Java to JNI\";\nstringTest.printMsg(javaMsg);\nString\
  \ nativeMsg = stringTest.getMsg();\nSystem.out.println(nativeMsg);\n}\n}\n清单 7-8.\n\
  在 Java 与原生函数之间传递字符串\n```\n\n以下是 C/C++ 中 `printMsg()` 和 `getMsg()` 的原生函数声明：\n\n*\
  \   `JNIEXPORT void JNICALL Java_com_jdojo_jni_JNIStringTest_printMsg(JNIEnv *env,\
  \ jobject obj, jstring msg);`\n*   `JNIEXPORT jstring JNICALL Java_com_jdojo_jni_JNIStringTest_getMsg(JNIEnv\
  \ *env, jobject obj);`\n\n请注意，原生函数中的前两个参数类型为 `JNIEnv` 和 `jobject`。`printMsg()` 函数包含第三个参数，类型为\
  \ `jstring`，其返回类型为 `void`。`getMsg()` 函数仅包含两个标准参数，并返回一个 `jstring`。\n\n要将 `jstring`\
  \ 转换为 UTF-8 原生字符串，你需要使用 `GetStringUTFChars()` JNI 函数，该函数可以通过 `JNIEnv` 引用访问。`GetStringUTFChars()`\
  \ JNI 函数有两个版本：一个用于 C，一个用于 C++。\n\n`GetStringUTFChars()` 函数将 Java 字符串（在 C/C++ 代码中为\
  \ `jstring`）转换为 UTF-8 格式，并返回指向转换后的 UTF-8 字符串的指针。如果失败，则返回 `NULL`。`GetStringUTFChars()`\
  \ 函数可能需要在内存中复制原始 Java 字符串对象，以便将其转换为 UTF-8 格式。该函数的 `isCopy` 参数（一个指向 `boolean` 变量的指针）可用于检查此函数是否必须复制原始\
  \ Java 字符串。如果 `isCopy` 不为 `NULL`，则在复制了 Java 字符串时将其设置为 `JNI_TRUE`，否则设置为 `JNI_FALSE`。使用完此函数的返回值后，必须调用\
  \ `ReleaseStringUTFChars()` 方法来释放内存。该方法的 C 和 C++ 风格签名如下：\n\n```\n// C 风格\nvoid ReleaseStringUTFChars(JNIEnv\
  \ *env, jstring string, const char *utf);\n// C++ 风格\nvoid ReleaseStringUTFChars(jstring\
  \ string, const char *utf);\n```\n\n清单 7-9 包含了 C++ 中 `printMsg()` 和 `getMsg()` 原生方法的实现。代码位于本书源代码的\
  \ `jnistringtest.cpp` 文件中。`getMsg()` 的代码很简单。它使用 `NewStringUTF()` JNI 函数从原生字符串获取\
  \ Java 字符串。\n\n```\n// jnistringtest.cpp\n#include \n#include \n#include \"com_jdojo_jni_JNIStringTest.h\"\
  \nJNIEXPORT void JNICALL Java_com_jdojo_jni_JNIStringTest_printMsg\n(JNIEnv *env,\
  \ jobject obj, jstring msg) {\nconst char *utfMsg;\njboolean *iscopy = NULL;\n//\
  \ 获取 UTF 字符串\nutfMsg = env->GetStringUTFChars(msg, iscopy);\nif (utfMsg == NULL)\
  \ {\nprintf(\"无法将 Java 字符串转换为 UTF-8 字符串。\\n\");\nreturn;\n}\n// 将消息打印到标准输出\nprintf(\"\
  %s\\n\", utfMsg);\n// 释放内存\nenv->ReleaseStringUTFChars(msg, utfMsg);\n}\nJNIEXPORT\
  \ jstring JNICALL Java_com_jdojo_jni_JNIStringTest_getMsg\n(JNIEnv *env, jobject\
  \ obj) {\nconst char *utfMsg = \"Hello from JNI to Java\";\njstring javaString =\
  \ env->NewStringUTF(utfMsg);\nreturn javaString;\n}\n清单 7-9.\njnistringtest.cpp\
  \ 文件的内容\n```\n\n使用 `-h` 选项编译 `JNIStringTest` 类，以生成 C++ 头文件 `com_jdojo_jni_JNIStringTest.h`。你需要为你的平台重新生成\
  \ `beginningjava` 共享库，以包含 `jnistringtest.cpp` 文件中的函数。`Java9APIsAndModules\\cplusplus\\\
  src` 目录包含所有 C++ 头文件和 C++ 代码。该目录包含一个 `build_dll.bat` 文件和一个 `build_so.sh` 文件。这些文件将在\
  \ Windows 和 Linux 上构建 `beginningjava` 共享库。在运行它们之前，你需要验证这些脚本中使用的路径。对于后续示例，我假设你在运行包含原生方法的\
  \ Java 程序之前，为你的平台重新创建了共享库。\n\n现在你可以运行清单 7-8 中列出的 `JNIStringTest` 类了。它将生成以下输出：\n\n\
  ```\nHello from JNI to Java\nHello from Java to JNI\n```\n\n你可以使用 `GetStringUTFLength(jstring\
  \ string)` JNI 函数获取 `jstring` 以 UTF-8 格式表示时所需的字节长度。JNI 还提供了让你处理 Unicode 原生字符串的函数。Unicode\
  \ 字符串函数的命名与 UTF 字符串函数类似，只是去掉了 \"UTF\" 字样。例如，要获取 `jstring` 的 Unicode 字符长度，你可以使用 `GetStringLength()`\
  \ 函数，而不是 `GetStringUTFLength()` 函数。要从 Unicode 字符构造一个新的 Java `String`（即 `jstring`），你可以使用\
  \ `NewString()` JNI 函数，而不是 `NewStringUTF()` JNI 函数（后者从 UTF-8 原生字符串创建 Java 字符串）。有时你可能需要将\
  \ `jstring` 中的 Java 字符串转换为原生编码，反之亦然。你可以使用 `java.lang.String` 类，它拥有丰富的构造函数和方法，可以让你将一种编码的字符串转换为字节数组，反之亦然。我将在后续章节中介绍如何在原生代码中访问\
  \ Java 类。\n\n\n\n## 使用数组\n\nJNI 允许你将基本类型或引用类型的数组从 Java 传递到原生代码，反之亦然。你不能在原生代码中直接访问或操作\
  \ Java 数组。你需要使用 JNI 函数在原生代码中操作 Java 数组。JNI 为基本类型数组和引用类型数组提供了不同的函数集。有些函数对两种类型都通用。本节中使用的所有与数组相关的方法都采用\
  \ C++ 版本。将 `JNIEnv *env` 作为第一个参数添加到这些方法中，即可获得对应的 C 版本。\n\n`GetArrayLength()` 方法返回基本类型或引用类型数组的长度。其声明如下：\n\
  \n```\njsize GetArrayLength(jarray array)\n```\n\n你可以使用 `New<Xxx>Array()` 方法来创建基本类型数组，其中\
  \ `<Xxx>` 是 `Boolean`、`Byte`、`Char`、`Double`、`Float`、`Int`、`Long` 或 `Short` 这些基本类型之一。你需要将基本类型数组的长度作为参数传递给此方法。如果无法创建数组，它将返回\
  \ `NULL`。以下代码片段创建了一个长度为 10 的 `int` 数组和一个长度为 10 的 `double` 数组：\n\n```\njintArray\
  \ iArray = env->NewIntArray(10);\njdoubleArray dArray = env->NewDoubleArray(10);\n\
  ```\n\n你可以使用 `Get<Xxx>ArrayElements()` 来获取基本类型数组的内容，其中 `<Xxx>` 是 `Boolean`、`Byte`、`Char`、`Double`、`Float`、`Int`、`Long`\
  \ 或 `Short` 这些基本类型之一。其声明如下：\n\n```\n*GetArrayElements( array, jboolean *isCopy)\n\
  ```\n\n这里，`<RRR>` 是 JNI 原生数据类型，例如 `jint` 或 `jdouble`，而 `<AAA>` 是 JNI 数组类型，例如 `jintArray`、`jdoubleArray`\
  \ 等。`isCopy` 参数指示返回的数组元素是否是原始数组的副本。如果 `isCopy` 不为 `NULL`，则当创建了原始数组的副本时，它被设置为 `JNI_TRUE`；如果没有创建原始数组的副本，则设置为\
  \ `JNI_FALSE`。你也可以在原生代码中对数组元素进行更改，这些更改将反映到原始数组中。在使用完通过此方法获取的元素后，你需要释放它们。你需要使用 `Release<Xxx>ArrayElements()`\
  \ 方法来释放数组元素，其声明如下：\n\n```\nvoid ReleaseArrayElements( array,  *elems, jint mode)\n\
  ```\n\n最后一个名为 `mode` 的参数指示如何释放在原生代码中用于数组元素的缓冲区。其值可以是 0、`JNI_COMMIT` 或 `JNI_ABORT`。0\
  \ 表示复制回内容并释放 `elems` 缓冲区；`JNI_COMMIT` 表示复制回内容，但不释放 `elems` 缓冲区；`JNI_ABORT` 表示释放缓冲区而不复制回可能的更改。以下代码片段在原生代码中访问一个\
  \ Java `int` 数组，并将其所有元素值打印到标准输出：\n\n```\njintArray num = /* 获取一个 Java 数组... */;\n\
  const jsize count = env->GetArrayLength(num);\njboolean isCopy;\njint *intNum =\
  \ env->GetIntArrayElements(num, &isCopy);\nfor (jsize i = 0; i < count; i++) {\n\
  \    // 处理 intNum[i]...\n}\nenv->ReleaseIntArrayElements(num, intNum, JNI_ABORT);\n\
  ```\n\n原生代码中的引用类型 Java 数组处理方式不同。你可以使用 `NewObjectArray()` 函数来创建一个新的引用类型数组。该方法声明如下：\n\
  \n```\njobjectArray NewObjectArray(jsize length, jclass elementClass, jobject initialElement)\n\
  ```\n\n请注意，你需要使用数组元素的类类型对象来创建引用数组。最后一个参数是初始元素，数组的所有元素都将使用该元素进行初始化。\n\n与基本类型数组不同，你不需要获取引用类型数组的元素来访问它们。你可以使用\
  \ `GetObjectArrayElement()` 函数一次访问一个元素。你可以使用 `SetObjectArrayElement()` 函数来设置引用类型数组元素的值。这些方法的声明如下：\n\
  \n*   `jobject GetObjectArrayElement(jobjectArray array, jsize index)`\n*   `void\
  \ SetObjectArrayElement(jobjectArray array, jsize index, jobject value)`\n\n让我们来看一个在\
  \ JNI 应用程序中使用数组的示例。清单 7-10 包含的 Java 代码声明了三个使用数组的原生方法。\n\n```\n// JNIArrayTest.java\n\
  package com.jdojo.jni;\nimport java.util.Arrays;\npublic class JNIArrayTest {\n\
