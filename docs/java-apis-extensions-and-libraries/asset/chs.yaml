  \ URL 来获取调用此方法的 Connection 对象的引用\nString dbURL = \"jdbc:default:connection\";\n\
  Connection conn = DriverManager.getConnection(dbURL);\nString sql = \"select income\
  \ from person where person_id = ?\";\nPreparedStatement pstmt = conn.prepareStatement(sql);\n\
  pstmt.setInt(1, personId);\nResultSet rs = pstmt.executeQuery();\nif (!rs.next())\
  \ {\nreturn;\n}\noldIncome = rs.getDouble(\"income\");\nif (rs.wasNull()) {\nnewIncome\
  \ = 20000.00;\n} else {\nnewIncome = oldIncome * (1 + raise / 100);\n}\nString updateSql\
  \ = \"update person \"\n+ \"set income = ? \"\n+ \"where person_id = ?\";\nPreparedStatement\
  \ updateStmt = conn.prepareStatement(updateSql);\nupdateStmt.setDouble(1, newIncome);\n\
  updateStmt.setInt(2, personId);\nupdateStmt.executeUpdate();\n// 关闭语句\nupdateStmt.close();\n\
  oldIncomeOut[0] = oldIncome;\nnewIncomeOut[0] = newIncome;\n}\n}\n清单 5-11.\nApache\
