  使用 JavaFX 控件创建输入人员详细信息的表单\n```\n\n## 使用 2D 形状\n\nJavaFX 提供了多种类型的节点来绘制不同形状，例如线条、圆形、矩形等。你可以将形状添加到场景图中。你可以绘制\
  \ 2D 和 3D 形状。在本节中，我将向你展示如何绘制 2D 形状。在 JavaFX 中使用 3D 形状需要一定的学习曲线。由于篇幅限制，本书不讨论 3D 形状。所有\
  \ 2D 形状类都位于 `javafx.scene.shape` 包中。表示 2D 形状的类继承自抽象的 `Shape` 类，如图 8-16 所示。\n\n![A323071_2_En_8_Fig16_HTML.jpg](img/A323071_2_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16.\n\n2D 形状的类图\n\n形状具有由其属性定义的大小和位置。例如，`width` 和 `height` 属性定义了矩形的大小；`radius`\
  \ 属性定义了圆形的大小；`x` 和 `y` 属性定义了矩形左上角的位置；`centerX` 和 `centerY` 属性定义了圆的中心。\n\n形状在布局期间不会由其父节点调整大小。形状的大小仅在其大小相关属性发生变化时才会改变。你可能会看到类似“JavaFX\
  \ 形状不可调整大小”的说法。这意味着形状在布局期间不能由其父节点调整大小。它们只能通过更改其属性来调整大小。\n\n形状具有内部区域和描边。用于定义形状内部区域和描边的所有属性都在\
  \ `Shape` 类中声明。`fill` 属性指定填充形状内部的颜色。默认的 `fill` 是 `Color.BLACK`。`stroke` 属性指定轮廓描边的颜色，默认为\
  \ `null`，但 `Line`、`Polyline` 和 `Path` 除外，它们的默认 `stroke` 颜色为 `Color.BLACK`。\n\n`Shape`\
  \ 类包含一个 `smooth` 属性，默认为 `true`。其值为 `true` 表示应使用抗锯齿提示来渲染形状。如果将其设置为 `false`，则不会使用抗锯齿提示，这可能导致形状边缘不够清晰。\n\
  \n清单 8-18 中的程序创建了一个圆形、一个矩形、一条直线、一个表示平行四边形的多边形、一个表示六边形的折线，以及一个带弦的弧。这些形状如图 8-17 所示。请注意关于此程序中创建形状的以下几点：\n\
  \n*   它创建了一个半径为 40px 的圆形。\n*   它创建了一个宽度为 100px、高度为 75px 的矩形。\n*   它创建了一条从 (0, 0)\
  \ 到 (50, 50) 的直线。\n*   它通过连接四个点：(30.0, 0.0)、(130.0, 0.0)、(100.00, 50.0) 和 (0.0,\
  \ 50.0) 创建了一个表示平行四边形的多边形。多边形通过连接第一个点和最后一个点自动闭合。\n*   它创建了一个表示六边形的折线。折线与多边形类似，区别在于它不会自动闭合。请注意，在折线构造函数中，第一个点\
  \ (100.0, 0.0) 和最后一个点 (100.0, 0.0) 是相同的，因此它是闭合的。\n*   它使用 `Arc` 类的构造函数 `Arc(double\
  \ centerX, double centerY, double radiusX, double radiusY, double startAngle, double\
  \ length)` 创建了一个弧。弧可以是弦形、圆形或开放形。该程序使用 `ArcType.CHORD` 作为弧类型，通过一条直线（弦）连接弧上的两个端点。\n\
  \n![A323071_2_En_8_Fig17_HTML.jpg](img/A323071_2_En_8_Fig17_HTML.jpg)\n\n图 8-17.\n\
  \nJavaFX 中的一些 2D 形状\n\n\n\n```\n// ShapeTest.java\npackage com.jdojo.javafx;\nimport\
  \ javafx.application.Application;\nimport javafx.scene.Scene;\nimport javafx.scene.layout.HBox;\n\
  import javafx.scene.paint.Color;\nimport javafx.scene.shape.Arc;\nimport javafx.scene.shape.ArcType;\n\
  import javafx.scene.shape.Circle;\nimport javafx.scene.shape.Line;\nimport javafx.scene.shape.Polygon;\n\
  import javafx.scene.shape.Polyline;\nimport javafx.scene.shape.Rectangle;\nimport\
  \ javafx.stage.Stage;\npublic class ShapeTest extends Application {\npublic static\
  \ void main(String[] args) {\nApplication.launch(args);\n}\n@Override\npublic void\
  \ start(Stage stage) {\n// 创建一个圆形，填充黄色，黑色描边，宽度为 2.0 像素\nCircle circle = new Circle(40);\n\
  circle.setFill(Color.YELLOW);\ncircle.setStroke(Color.BLACK);\ncircle.setStrokeWidth(2.0);\n\
  // 创建一个矩形\nRectangle rect = new Rectangle(100, 75);\nrect.setFill(Color.RED);\n\
  // 创建一条直线\nLine line = new Line(0, 0, 50, 50);\nline.setStrokeWidth(5.0);\nline.setStroke(Color.GREEN);\n\
  // 创建一个平行四边形\nPolygon parallelogram = new Polygon();\nparallelogram.getPoints().addAll(30.0,\
  \ 0.0,\n130.0, 0.0,\n100.00, 50.0,\n0.0, 50.0);\nparallelogram.setFill(Color.AZURE);\n\
  parallelogram.setStroke(Color.BLACK);\n// 创建一个六边形\nPolyline hexagon = new Polyline(100.0,\
  \ 0.0,\n120.0, 20.0,\n120.0, 40.0,\n100.0, 60.0,\n80.0, 40.0,\n80.0, 20.0,\n100.0,\
  \ 0.0);\nhexagon.setFill(Color.WHITE);\nhexagon.setStroke(Color.BLACK);\n// 一个弦弧，无填充，有描边\n\
  Arc arc = new Arc(0, 0, 50, 100, 0, 90);\narc.setFill(Color.TRANSPARENT);\narc.setStroke(Color.BLACK);\n\
  arc.setType(ArcType.CHORD);\n// 将所有形状添加到一个 HBox 中\nHBox root = new HBox(circle,\
  \ rect, line, parallelogram, hexagon, arc);\nroot.setSpacing(10);\nroot.setStyle(\"\
  -fx-padding: 10;\"\n+ \"-fx-border-style: solid inside;\"\n+ \"-fx-border-width:\
  \ 2;\"\n+ \"-fx-border-insets: 5;\"\n+ \"-fx-border-radius: 5;\"\n+ \"-fx-border-color:\
  \ blue;\");\nScene scene = new Scene(root);\nstage.setScene(scene);\nstage.setTitle(\"\
  2D 形状\");\nstage.show();\n}\n}\n清单 8-18.\n在 JavaFX 中使用 2D 形状\n```\n\n`Path` 类，以及许多其他类（如\
  \ `MoveTo`、`LineTo`、`HLineTo` 和 `VLineTo`），可用于在 JavaFX 中绘制非常复杂的形状。JavaFX 还支持使用 `SVGPath`\
  \ 类，通过编码字符串中的路径数据来支持可缩放矢量图形（SVG）。SVG 规范可在 [`www.w3.org/TR/SVG`](http://www.w3.org/TR/SVG)\
  \ 找到。以字符串格式构建路径数据的详细规则可在 [`www.w3.org/TR/SVG/paths.html`](http://www.w3.org/TR/SVG/paths.html)\
  \ 找到。JavaFX 部分支持 SVG 规范。本书不详细介绍如何使用 `Path` 和 `SVGPath` 类创建 2D 形状。清单 8-19 展示了如何使用\
  \ `Path` 和 `SVGPath` 类创建三角形，如图 8-18 所示。有关如何使用这些类的详细信息，请参阅 JavaFX API 文档。\n\n![A323071_2_En_8_Fig18_HTML.jpg](img/A323071_2_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18.\n\n使用 Path 和 SVGPath 类创建三角形\n\n```\n// PathTest.java\npackage com.jdojo.javafx;\n\
  import javafx.application.Application;\nimport javafx.scene.Scene;\nimport javafx.scene.layout.HBox;\n\
  import javafx.scene.paint.Color;\nimport javafx.scene.shape.LineTo;\nimport javafx.scene.shape.MoveTo;\n\
  import javafx.scene.shape.Path;\nimport javafx.scene.shape.SVGPath;\nimport javafx.stage.Stage;\n\
  public class PathTest extends Application {\npublic static void main(String[] args)\
  \ {\nApplication.launch(args);\n}\n@Override\npublic void start(Stage stage) {\n\
  // 使用 Path 创建一个三角形\nPath pathTriangle = new Path(new MoveTo(50, 0),\nnew LineTo(0,\
  \ 50),\nnew LineTo(100, 50),\nnew LineTo(50, 0));\npathTriangle.setFill(Color.LIGHTGRAY);\n\
  pathTriangle.setStroke(Color.BLACK);\n// 使用 SVGPath 创建一个三角形\nSVGPath svgTriangle\
  \ = new SVGPath();\nsvgTriangle.setContent(\"M50, 0 L0, 50 L100, 50 Z\");\nsvgTriangle.setFill(Color.LIGHTGRAY);\n\
  svgTriangle.setStroke(Color.BLACK);\n// 将所有形状添加到一个 HBox 中\nHBox root = new HBox(pathTriangle,\
  \ svgTriangle);\nroot.setSpacing(10);\nroot.setStyle(\"-fx-padding: 10;\"\n+ \"\
  -fx-border-style: solid inside;\"\n+ \"-fx-border-width: 2;\"\n+ \"-fx-border-insets:\
  \ 5;\"\n+ \"-fx-border-radius: 5;\"\n+ \"-fx-border-color: blue;\");\nScene scene\
  \ = new Scene(root);\nstage.setScene(scene);\nstage.setTitle(\"使用 Path 和 SVGPath\
  \ 类的 2D 形状\");\nstage.show();\n}\n}\n清单 8-19.\n使用 Path 和 SVGPath 类创建 2D 形状\n```\n\
  \n\n\n## 在画布上绘图\n\n通过 `javafx.scene.canvas` 包，JavaFX 提供了 Canvas API，该 API 提供了一个绘图表面，可以使用绘图命令绘制形状、图像和文本。该\
  \ API 还提供了对绘图表面的像素级访问，您可以在表面上写入任何像素。该 API 包含以下两个类：\n\n*   `Canvas`\n*   `GraphicsContext`\n\
  \n画布是一个用作绘图表面的位图图像。`Canvas` 类的实例代表一个画布。它继承自 `Node` 类。因此，画布是一个可以添加到场景图中的节点，并且可以对其应用效果和变换。`Canvas`\
  \ 有一个与之关联的图形上下文，用于向 `Canvas` 发出绘图命令。`GraphicsContext` 类的实例代表一个图形上下文。\n\n`Canvas`\
  \ 类包含两个构造器。无参构造器创建一个空的 `Canvas`。之后，您可以使用其 `width` 和 `height` 属性设置画布的大小。另一个构造器将 `Canvas`\
  \ 的 `width` 和 `height` 作为参数。以下代码片段展示了如何创建画布：\n\n```\n// 创建一个宽度和高度为零的 Canvas\nCanvas\
  \ canvas = new Canvas();\n// 设置画布大小\ncanvas.setWidth(400);\ncanvas.setHeight(200);\n\
  // 创建一个 400X200 的画布\nCanvas canvas = new Canvas(400, 200);\n```\n\n创建 `Canvas` 后，您需要使用\
  \ `getGraphicsContext2D()` 方法获取其图形上下文，如下所示：\n\n```\n// 获取画布的图形上下文\nGraphicsContext\
  \ gc = canvas.getGraphicsContext2D();\n```\n\n所有绘图命令都作为方法在 `GraphicsContext` 类中提供。超出\
  \ `Canvas` 边界的绘图将被裁剪。`Canvas` 使用一个缓冲区。绘图命令将必要的参数推送到缓冲区。需要注意的是，在将 `Canvas` 添加到场景图之前，您应该从任何一个线程使用图形上下文。一旦\
  \ `Canvas` 被添加到场景图，图形上下文应仅在 JavaFX 应用程序线程上使用。\n\n清单 8-20 中的程序展示了如何在画布上绘制圆角矩形、椭圆和文本。图\
  \ 8-19 显示了包含所有绘图的画布。`strokeRoundRect(double x, double y, double w, double h, double\
  \ arcWidth, double arcHeight)` 方法用于绘制圆角矩形；`fillOval(double x, double y, double w,\
  \ double h)` 方法用于绘制填充椭圆。`strokeText(String text, double x, double y)` 方法用于绘制文本。\n\
  \n![A323071_2_En_8_Fig19_HTML.jpg](img/A323071_2_En_8_Fig19_HTML.jpg)\n\n图 8-19.\n\
  \n在画布上绘制的矩形、椭圆和文本\n\n```\n// CanvasTest.java\npackage com.jdojo.javafx;\nimport\
  \ javafx.application.Application;\nimport javafx.scene.Scene;\nimport javafx.scene.canvas.Canvas;\n\
  import javafx.scene.canvas.GraphicsContext;\nimport javafx.scene.layout.Pane;\n\
  import javafx.scene.paint.Color;\nimport javafx.stage.Stage;\npublic class CanvasTest\
  \ extends Application {\npublic static void main(String[] args) {\nApplication.launch(args);\n\
  }\n@Override\npublic void start(Stage stage) {\n// 创建一个画布\nCanvas canvas = new Canvas(300,\
  \ 100);\n// 获取画布的图形上下文\nGraphicsContext gc = canvas.getGraphicsContext2D();\n//\
  \ 设置线宽和填充颜色\ngc.setLineWidth(2.0);\ngc.setFill(Color.RED);\n// 绘制一个圆角矩形\ngc.strokeRoundRect(10,\
  \ 10, 50, 50, 10, 10);\n// 填充一个椭圆\ngc.fillOval(70, 10, 50, 20);\n// 绘制文本\ngc.strokeText(\"\
  Hello Canvas\", 150, 20);\nPane root = new Pane();\nroot.getChildren().add(canvas);\n\
  Scene scene = new Scene(root);\nstage.setScene(scene);\nstage.setTitle(\"在画布上绘图\"\
  );\nstage.show();\n}\n}\n清单 8-20.\n在画布上绘图\n```\n\n## 应用效果\n\n效果是一种过滤器，它接受一个或多个图形输入，对输入应用算法，并产生输出。通常，效果应用于节点以创建视觉上吸引人的用户界面。效果的示例包括阴影、模糊、扭曲、发光、反射、混合、不同类型的照明等。JavaFX\
  \ 库提供了几个与效果相关的类。效果是一个条件特性。如果平台上不可用，应用于节点的效果将被忽略。图 8-20 显示了四个使用投影、模糊、发光和辉光效果的 `Text`\
  \ 节点。\n\n![A323071_2_En_8_Fig20_HTML.jpg](img/A323071_2_En_8_Fig20_HTML.jpg)\n\n\
  图 8-20.\n\n具有不同效果的文本节点\n\n在 JavaFX 中为节点应用效果很容易。`Node` 类包含一个 `effect` 属性，该属性指定应用于节点的效果。默认情况下，它为\
  \ `null`。要应用效果，请创建特定效果类的对象，并使用 `setEffect()` 方法将其设置到节点。以下代码片段将投影效果应用于 `Text` 节点：\n\
  \n```\nText t1 = new Text(\"投影\");\nt1.setFont(Font.font(24));\nt1.setEffect(new\
  \ DropShadow());\n```\n\n`Effect` 类的实例代表一个效果。`Effect` 类是所有效果类的抽象基类。所有效果类都在 `javafx.scene.effect`\
  \ 包中。清单 8-21 中的程序创建了 `Text` 节点并对其应用效果。`Text` 节点如图 8-20 所示。\n\n```\n// EffectTest.java\n\
  package com.jdojo.javafx;\nimport javafx.application.Application;\nimport javafx.scene.Scene;\n\
  import javafx.scene.effect.Bloom;\nimport javafx.scene.effect.BoxBlur;\nimport javafx.scene.effect.DropShadow;\n\
  import javafx.scene.effect.Glow;\nimport javafx.scene.layout.HBox;\nimport javafx.scene.layout.StackPane;\n\
  import javafx.scene.paint.Color;\nimport javafx.scene.shape.Rectangle;\nimport javafx.scene.text.Font;\n\
  import javafx.scene.text.FontWeight;\nimport javafx.scene.text.Text;\nimport javafx.stage.Stage;\n\
  public class EffectTest extends Application {\npublic static void main(String[]\
  \ args) {\nApplication.launch(args);\n}\n@Override\npublic void start(Stage stage)\
  \ {\nText t1 = new Text(\"投影！\");\nt1.setFont(Font.font(24));\nt1.setEffect(new\
  \ DropShadow());\nText t2 = new Text(\"模糊！\");\nt2.setFont(Font.font(24));\nt2.setEffect(new\
  \ BoxBlur());\nText t3 = new Text(\"发光！\");\nt3.setFont(Font.font(24));\nt3.setEffect(new\
  \ Glow());\nText t4 = new Text(\"辉光！\");\nt4.setFont(Font.font(\"Arial\", FontWeight.BOLD,\
  \ 24));\nt4.setFill(Color.WHITE);\nt4.setEffect(new Bloom(0.10));\n// 将具有辉光效果的 Text\
  \ 节点堆叠在 Rectangle 上\nRectangle rect = new Rectangle(100, 30, Color.GREEN);\nStackPane\
  \ spane = new StackPane(rect, t4);\nHBox root = new HBox(t1, t2, t3, spane);\nroot.setSpacing(20);\n\
  root.setStyle(\"-fx-padding: 10;\"\n+ \"-fx-border-style: solid inside;\"\n+ \"\
  -fx-border-width: 2;\"\n+ \"-fx-border-insets: 5;\"\n+ \"-fx-border-radius: 5;\"\
  \n+ \"-fx-border-color: blue;\");\nScene scene = new Scene(root);\nstage.setScene(scene);\n\
  stage.setTitle(\"应用效果\");\nstage.show();\n}\n}\n清单 8-21.\n将效果应用于节点\n```\n\n提示\n\n\
  应用于 `Group` 的效果将应用于其所有子节点。也可以将多个效果链接起来，其中一个效果的输出成为链中下一个效果的输入。\n\n\n\n## 应用变换\n\n\
  变换是坐标空间中的点到自身的映射，它保持点之间的距离和方向。可以对坐标空间中的点应用多种类型的变换。JavaFX 支持以下类型的变换：\n\n*   平移\n\
  *   旋转\n*   剪切\n*   缩放\n*   仿射\n\n抽象类 `Transform` 的实例代表了 JavaFX 中的一种变换。`Transform`\
  \ 类包含了所有节点变换类型通用的方法和属性。它提供了用于创建特定类型变换的工厂方法。图 8-21 展示了代表不同类型变换的类的类图。类的名称与其提供的变换类型相匹配。所有类都位于\
  \ `javafx.scene.transform` 包中。\n\n![A323071_2_En_8_Fig21_HTML.jpg](img/A323071_2_En_8_Fig21_HTML.jpg)\n\
  \n图 8-21.\n\n变换相关类的类图\n\n仿射变换是一种广义的变换，它保持点、直线和平面的性质。平行线在变换后仍然保持平行。它可能不保持直线间的角度和点之间的距离。但是，直线上点之间的距离比例保持不变。平移、缩放、位似变换、相似变换、反射、旋转和剪切都是仿射变换的例子。\n\
  \n`Affine` 类的实例代表一个仿射变换。该类对于初学者来说不易使用。它的使用需要高级数学知识，例如矩阵。如果你需要特定类型的变换，请使用特定的子类，例如\
  \ `Translate`、`Shear` 等，而不是使用通用的 `Affine` 类。你也可以组合多个单独的变换来创建一个更复杂的变换。\n\n使用变换很简单。然而，有时会令人困惑，因为创建和应用变换有多种方式。创建\
  \ `Transform` 实例有两种方法：\n\n*   使用 `Transform` 类的某个工厂方法，例如，使用 `translate()` 方法创建 `Translate`\
  \ 对象，使用 `rotate()` 方法创建 `Rotate` 对象等。\n*   使用特定的类来创建特定类型的变换，例如，使用 `Translate` 类进行平移，使用\
  \ `Rotate` 类进行旋转等。\n\n以下两个 `Translate` 对象都表示相同的平移：\n\n```\ndouble tx = 20.0;\ndouble\
  \ ty = 10.0;\n// 使用 Transform 类中的工厂方法\nTranslate translate1 = Transform.translate(tx,\
  \ ty);\n// 使用 Translate 类构造器\nTranslate translate2 = new Translate(tx, ty);\n```\n\
  \n对节点应用变换有两种方法：\n\n*   使用 `Node` 类中的特定属性。例如，使用 `Node` 类的 `translateX`、`translateY`\
  \ 和 `translateZ` 属性对节点应用平移。请注意，你不能通过这种方式应用剪切变换。\n*   使用节点的 `transforms` 序列。`Node`\
  \ 类的 `getTransforms()` 方法返回一个 `ObservableList<Transform>`。用所有 `Transform` 对象填充此列表。这些\
  \ `Transform` 将按顺序应用。你只能使用此方法应用剪切变换。\n\n这两种应用 `Transforms` 的方法工作方式略有不同。我将在讨论特定类型的变换时讨论这些差异。有时可以同时使用这两种方法来应用变换，在这种情况下，`transforms`\
  \ 序列中的变换会在节点属性上设置的变换之前应用。\n\n以下代码片段对一个 `Rectangle` 应用了三种变换——剪切、缩放和平移：\n\n```\n//\
  \ 创建一个矩形\nRectangle rect = new Rectangle(100, 50, Color.LIGHTGRAY);\n// 使用 Rectangle\
  \ 的 transforms 序列应用变换\nTransform shear = Transform.shear(2.0, 1.2);\nTransform scale\
  \ = Transform.scale(1.1, 1.2);\nrect.getTransforms().addAll(shear, scale);\n// 使用\
  \ Node 类的 translateX 和 translateY 属性应用平移\nrect.setTranslateX(10);\nrect.setTranslateY(10);\n\
  ```\n\n剪切和缩放变换是使用 `transforms` 序列应用的。平移是使用 `Node` 类的 `translateX` 和 `translateY`\
  \ 属性应用的。`transforms` 序列中的变换（剪切和缩放）按顺序应用，随后是平移。讨论所有类型的变换超出了本书的范围。更多详细信息，请参考 Java\
  \ API 文档。\n\n清单 8-22 展示了如何对矩形应用平移、旋转、缩放和剪切变换。它创建了两个大小相同且位于同一位置的矩形。这些矩形使用不同的填充颜色来区分它们。对黄色填充的矩形应用了平移、旋转、缩放和剪切变换。对浅灰色填充的矩形未应用任何变换。图\
  \ 8-22 显示了这两个矩形。\n\n![A323071_2_En_8_Fig22_HTML.jpg](img/A323071_2_En_8_Fig22_HTML.jpg)\n\
  \n图 8-22.\n\n两个矩形，一个应用了变换，一个未应用变换\n\n```\n// TransformationTest.java\npackage com.jdojo.javafx;\n\
  import javafx.application.Application;\nimport javafx.scene.Scene;\nimport javafx.scene.layout.Pane;\n\
  import javafx.scene.paint.Color;\nimport javafx.scene.shape.Rectangle;\nimport javafx.scene.transform.Rotate;\n\
  import javafx.scene.transform.Scale;\nimport javafx.scene.transform.Shear;\nimport\
  \ javafx.scene.transform.Translate;\nimport javafx.stage.Stage;\npublic class TransformationTest\
  \ extends Application {\npublic static void main(String[] args) {\nApplication.launch(args);\n\
  }\n@Override\npublic void start(Stage stage) {\nRectangle rect1 = new Rectangle(100,\
  \ 50, Color.LIGHTGRAY);\nrect1.setStroke(Color.BLACK);\nRectangle rect2 = new Rectangle(100,\
  \ 50, Color.YELLOW);\nrect2.setStroke(Color.BLACK);\n// 对 rect2 应用平移、旋转、缩放和剪切变换\n\
  Translate translate = new Translate(50, 10);\nRotate rotate = new Rotate(30, 0,\
  \ 0);\nScale scale = new Scale(0.5, 0.5);\nShear shear = new Shear(0.5, 0.5);\n\
  rect2.getTransforms().addAll(translate, rotate, scale, shear);\nPane root = new\
  \ Pane(rect1, rect2);\nroot.setPrefSize(200, 100);\nScene scene = new Scene(root);\n\
  stage.setScene(scene);\nstage.setTitle(\"应用变换\");\nstage.show();\n}\n}\n清单 8-22.\n\
  对节点应用变换\n```\n\n\n\n## 动画\n\n在现实世界中，动画意味着通过快速连续显示图像而产生的某种运动。例如，当你观看电影时，你看到的图像变化如此之快，以至于你产生了运动的错觉。\n\
  \n在 JavaFX 中，动画被定义为随时间改变节点的属性。如果改变的属性决定了节点的位置，那么 JavaFX 中的动画就会产生电影中那种运动的错觉。并非所有动画都必须涉及运动；例如，随时间改变\
  \ `Shape` 的 `fill` 属性就是一种不涉及运动的 JavaFX 动画。\n\n要理解动画是如何执行的，理解一些关键概念很重要：\n\n*   时间线\n\
  *   关键帧\n*   关键值\n*   插值器\n\n动画是在一段时间内执行的。时间线表示动画过程中的时间推进，并在给定时刻关联一个关键帧。关键帧表示在时间线上的特定时刻，被动画化节点的状态。一个关键帧具有关联的关键值。关键值表示节点某个属性的值，以及要使用的插值器。\n\
  \n假设你想在 10 秒内将一个场景中的圆从左侧水平移动到右侧。图 8-23 显示了该圆在几个位置的状态。粗水平线代表时间线。实线轮廓的圆代表时间线上特定时刻的关键帧。与关键帧关联的关键值显示在顶行。例如，第五秒关键帧处圆的\
  \ `translateX` 属性值为 500，在图中显示为 `tx=500`。\n\n![A323071_2_En_8_Fig23_HTML.gif](img/A323071_2_En_8_Fig23_HTML.gif)\n\
  \n图 8-23.\n\n使用时间线沿水平线对圆进行动画化\n\n时间线、关键帧和关键值由开发者提供。在你的示例中，你有五个关键帧。如果 JavaFX 只在这五个时刻显示五个关键帧，动画看起来会不连贯。为了提供平滑的动画，JavaFX\
  \ 需要在时间线上的任意时刻插值圆的位置。也就是说，JavaFX 需要在两个连续的关键帧之间创建中间关键帧。JavaFX 借助插值器来完成此操作。默认情况下，它使用线性插值器，该插值器随时间线性地改变被动画化的属性。也就是说，如果时间线上的时间经过了\
  \ x%，那么属性的值将是初始值和最终目标值之间的 x%。在图中，虚线轮廓的圆是由 JavaFX 使用插值器创建的。\n\n提供动画的类位于 `javafx.animation`\
  \ 包中，但 `Duration` 类除外，它位于 `javafx.util` 包中。图 8-24 显示了动画相关类的类图。\n\n![A323071_2_En_8_Fig24_HTML.jpg](img/A323071_2_En_8_Fig24_HTML.jpg)\n\
  \n图 8-24.\n\n动画中使用的核心类的类图\n\n抽象的 `Animation` 类代表一个动画。它包含所有类型动画共用的属性和方法。JavaFX 支持两种类型的动画：\n\
  \n*   时间线动画\n*   过渡\n\n在时间线动画中，你创建一个时间线并向其添加关键帧。JavaFX 使用插值器创建中间关键帧。`Timeline` 类的实例代表一个时间线动画。这种类型的动画需要你编写更多代码，但它能让你拥有更多控制权。\n\
  \n有几种常见的动画类型，例如，沿路径移动节点、随时间改变节点的不透明度等。这些类型的动画被称为过渡。它们使用内部时间线执行。`Transition` 类的实例代表一个过渡动画。`Transition`\
  \ 类有多个子类来支持特定类型的过渡。例如，`FadeTransition` 类通过随时间改变节点的不透明度来实现淡入淡出效果动画。你创建 `Transition`\
  \ 类某个子类的实例，然后指定要动画化的属性的初始值和最终值以及动画的持续时间。JavaFX 负责创建时间线并执行动画。这种类型的动画更易于使用。\n\n有时你可能希望顺序或并行地执行多个过渡。`SequentialTransition`\
  \ 和 `ParallelTransition` 类分别允许你顺序和并行地执行一组过渡。\n\n`Duration` 类位于 `javafx.util` 包中。它表示以毫秒、秒、分钟和小时为单位的时间长度。它是一个不可变类。`Duration`\
  \ 表示动画每个周期的时间量。`Duration` 可以表示正持续时间或负持续时间。\n\n`KeyValue` 类的实例代表一个关键值，该值在动画期间的特定时间间隔内被插值。它封装了三件事：\n\
  \n*   一个目标\n*   目标的一个结束值\n*   一个插值器\n\n目标是 `WritableValue`，这使得所有 JavaFX 属性都可以成为目标。结束值是时间间隔结束时目标的值。插值器用于计算中间关键帧。\n\
  \n关键帧定义了节点在时间线上指定点的目标状态。目标状态由与该关键帧关联的关键值定义。一个关键帧封装了四件事：\n\n*   时间线上的一个时刻\n*   一组\
  \ `KeyValue`\n*   一个名称\n*   一个 `ActionEvent` 处理器\n\n关键帧关联的时间线上的时刻由一个 `Duration`\
  \ 定义，该 `Duration` 是时间线上关键帧的偏移量。`KeyValue` 集合定义了该关键帧的目标的结束值。关键帧可以选择性地拥有一个名称，该名称可用作提示点，以便在动画期间跳转到它所定义的时刻。`Animation`\
  \ 类的 `getCuePoints()` 方法返回 `Timeline` 上提示点的 `ObservableMap`。你可以选择性地将 `ActionEvent`\
  \ 处理器附加到 `KeyFrame`。当动画期间关键帧的时间到达时，会调用 `ActionEvent` 处理器。`KeyFrame` 类的实例代表一个关键帧。\n\
  \n\n\n### 使用时间线动画\n\n时间线动画用于对节点的任意属性进行动画处理。`Timeline` 类的实例代表一个时间线动画。使用时间线动画涉及以下步骤：\n\
  \n*   构建关键帧\n*   使用关键帧创建一个 `Timeline` 对象\n*   设置动画属性\n*   使用 `play()` 方法运行动画\n\n\
  你可以在创建 `Timeline` 对象时或之后向其添加关键帧。时间线将所有关键帧保存在一个 `ObservableList<KeyFrame>` 中。`getKeyFrames()`\
  \ 方法返回此列表的引用。你可以随时修改关键帧列表。如果时间线动画已在运行，你需要停止并重新启动它，以便加载修改后的关键帧列表。`Timeline` 类包含几个构造方法：\n\
  \n*   `Timeline()`\n*   `Timeline(double targetFramerate)`\n*   `Timeline(double\
  \ targetFramerate, KeyFrame… keyFrames)`\n*   `Timeline(KeyFrame… keyFrames)`\n\n\
  无参构造方法创建一个没有关键帧的时间线，动画以最佳速率运行。其他构造方法允许你指定动画的目标帧率（即每秒帧数）以及关键帧。请注意，关键帧添加到时间线的顺序并不重要。时间线会根据它们的时间偏移量对其进行排序。\n\
  \n清单 8-23 中的程序启动了一个时间线动画，该动画使文本在场景中从右向左无限循环滚动。图 8-25 显示了该动画的截图。\n\n![A323071_2_En_8_Fig25_HTML.jpg](img/A323071_2_En_8_Fig25_HTML.jpg)\n\
  \n图 8-25.\n\n使用时间线动画滚动文本\n\n```\n// ScrollingText.java\npackage com.jdojo.javafx;\n\
  import javafx.animation.KeyFrame;\nimport javafx.animation.KeyValue;\nimport javafx.animation.Timeline;\n\
  import javafx.application.Application;\nimport javafx.geometry.VPos;\nimport javafx.scene.Scene;\n\
  import javafx.scene.layout.Pane;\nimport javafx.scene.text.Font;\nimport javafx.scene.text.Text;\n\
  import javafx.stage.Stage;\nimport javafx.util.Duration;\npublic class ScrollingText\
  \ extends Application {\npublic static void main(String[] args) {\nApplication.launch(args);\n\
  }\n@Override\npublic void start(Stage stage) {\nText msg = new Text(\"JavaFX animation\
  \ is cool!\");\nmsg.setTextOrigin(VPos.TOP);\nmsg.setFont(Font.font(24));\nPane\
  \ root = new Pane(msg);\nroot.setPrefSize(500, 70);\nScene scene = new Scene(root);\n\
  stage.setScene(scene);\nstage.setTitle(\"Scrolling Text\");\nstage.show();\n/* 设置一个时间线动画\
  \ */\n// 获取场景宽度和文本宽度\ndouble sceneWidth = scene.getWidth();\ndouble msgWidth = msg.getLayoutBounds().getWidth();\n\
  // 创建初始和最终关键帧\nKeyValue initKeyValue = new KeyValue(msg.translateXProperty(), sceneWidth);\n\
  KeyFrame initFrame = new KeyFrame(Duration.ZERO, initKeyValue);\nKeyValue endKeyValue\
  \ = new KeyValue(msg.translateXProperty(), -1.0 * msgWidth);\nKeyFrame endFrame\
  \ = new KeyFrame(Duration.seconds(3), endKeyValue);\n// 创建一个 Timeline 对象\nTimeline\
  \ timeline = new Timeline(initFrame, endFrame);\n// 让动画无限循环运行\ntimeline.setCycleCount(Timeline.INDEFINITE);\n\
  // 启动动画\ntimeline.play();\n}\n}\n清单 8-23.\n使用时间线动画滚动文本节点\n```\n\n执行动画的逻辑在 `start()`\
  \ 方法中。该方法首先创建一个 `Text` 对象、一个包含该 `Text` 对象的 `Pane`，并为舞台设置一个场景。显示舞台后，它设置一个动画。首先，它获取场景和\
  \ `Text` 对象的宽度。\n\n```\ndouble sceneWidth = scene.getWidth();\ndouble msgWidth =\
  \ msg.getLayoutBounds().getWidth();\n```\n\n创建了两个关键帧：一个对应时间 = 0 秒，另一个对应时间 = 3 秒。动画使用\
  \ `Text` 对象的 `translateX` 属性来改变其水平位置，使其看起来像是在滚动。在零秒时，`Text` 位于场景宽度处，因此不可见。在三秒时，它被放置在场景左侧，距离等于其自身长度，因此同样不可见。\n\
  \n```\nKeyValue initKeyValue = new KeyValue(msg.translateXProperty(), sceneWidth);\n\
  KeyFrame initFrame = new KeyFrame(Duration.ZERO, initKeyValue);\nKeyValue endKeyValue\
  \ = new KeyValue(msg.translateXProperty(), -1.0 * msgWidth);\nKeyFrame endFrame\
  \ = new KeyFrame(Duration.seconds(3), endKeyValue);\n```\n\n使用两个关键帧创建了一个 `Timeline`\
  \ 对象。\n\n```\nTimeline timeline = new Timeline(initFrame, endFrame);\n```\n\n默认情况下，动画只运行一次。也就是说，文本将从右向左滚动一次，然后动画停止。你可以设置动画的循环次数，即动画需要运行的次数。通过将循环次数设置为\
  \ `Timeline.INDEFINITE`，可以让动画无限循环运行，如下所示：\n\n```\ntimeline.setCycleCount(Timeline.INDEFINITE);\n\
  ```\n\n最后，通过调用 `play()` 方法启动动画。\n\n```\ntimeline.play();\n```\n\n这个例子有一个缺陷。当场景宽度改变时，滚动文本不会更新其初始水平位置。你可以通过在场景宽度变化时更新初始关键帧来解决此问题。将以下语句附加到清单\
  \ 8-23 的 `start()` 方法中。它为场景的 `width` 属性添加了一个 `ChangeListener`，用于更新关键帧并重新启动动画。\n\n\
  ```\nscene.widthProperty().addListener( (prop, oldValue , newValue) -> {\nKeyValue\
  \ kv = new KeyValue(msg.translateXProperty(), scene.getWidth());\nKeyFrame kf =\
  \ new KeyFrame(Duration.ZERO, kv);\ntimeline.stop();\ntimeline.getKeyFrames().clear();\n\
  timeline.getKeyFrames().addAll(kf, endFrame);\ntimeline.play();\n});\n```\n\n也可以仅使用一个关键帧来创建时间线动画。该关键帧被视为最后一个关键帧。时间线会使用正在动画处理的属性的当前值来合成一个初始关键帧（对应时间\
  \ = 0 秒）。要查看效果，请将清单 8-23 中的语句\n\n```\nTimeline timeline = new Timeline(initFrame,\
  \ endFrame);\n```\n\n替换为以下语句\n\n```\nTimeline timeline = new Timeline(endFrame);\n\
  ```\n\n时间线将使用 `Text` 对象的 `translateX` 属性的当前值（即 0.0）创建一个初始关键帧。这次，文本的滚动方式不同。滚动开始时，文本位于\
  \ 0.0 位置，然后向左滚动，直至移出场景。\n\n\n\n## FXML\n\nFXML 是一种基于 XML 的语言，用于构建 JavaFX 应用程序的用户界面。你可以使用\
  \ FXML 构建整个场景或场景的一部分。FXML 允许应用程序开发者将构建 UI 的逻辑与业务逻辑分离。如果应用程序的 UI 部分发生变化，你无需重新编译 JavaFX\
  \ 代码；只需使用文本编辑器修改 FXML 并重新运行应用程序即可。你仍然使用 Java 编程语言中的 JavaFX 来编写业务逻辑。FXML 文档是一种 XML\
  \ 文档。理解 FXML 需要具备 XML 的基础知识。\n\nJavaFX 场景图是一个 Java 对象的层次结构。XML 格式非常适合存储表示某种层次结构的信息。因此，使用\
  \ FXML 来存储场景图非常直观。\n\n在 JavaFX 应用程序中，通常使用 FXML 来构建场景图。然而，FXML 的用途并不仅限于构建场景图。它还可以构建\
  \ Java 对象的层次结构图。事实上，它甚至可以用于创建单个对象，例如，一个 `Person` 类的对象。\n\n让我们快速预览一下 FXML 文档的样子。你将创建一个简单的\
  \ UI，它由一个包含 `Label` 和 `Button` 的 `VBox` 组成。清单 8-24 包含了你熟悉的、用于构建该 UI 的 JavaFX 代码。清单\
  \ 8-25 包含了用于构建相同 UI 的 FXML 版本。\n\n```\nimport javafx.scene.layout.VBox;\nimport\
  \ javafx.scene.control.Label;\nimport javafx.scene.control.Button;\nVBox root =\
  \ new VBox();\nroot.getChildren().addAll(new Label(\"FXML is cool\"),\nnew Button(\"\
  Say Hello\"));\n清单 8-24.\n在 JavaFX 中构建对象图\n```\n\n```\n\n清单 8-25.\n在 FXML 中构建对象图\n\
  ```\n\n`FXML` 中的第一行是 XML 解析器使用的标准 XML 声明。它在 FXML 中是可选的。如果省略，则假定版本为 1，编码为 UTF-8。接下来的三行是\
  \ import 语句，对应于 Java 代码中的 `import` 语句。表示 UI 的元素（例如 `VBox`、`Label` 和 `Button`）的名称与\
  \ JavaFX 类的名称相同。`<children>` 标签指定了 `VBox` 的子元素。`Label` 和 `Button` 的 text 属性通过各自元素的\
  \ text 属性来指定。\n\nFXML 文档只是一个文本文件。通常，文件名具有 `.fxml` 扩展名，例如 `hello.fxml`。例如，你可以在 Windows\
  \ 上使用记事本创建 FXML 文档。如果你使用过 XML，就会知道在文本编辑器中编辑大型 XML 文档并不容易。有一个名为 Scene Builder 的可视化编辑器可用于编辑\
  \ FXML 文档。你可以从 [`http://gluonhq.com/products/scene-builder`](http://gluonhq.com/products/scene-builder)\
  \ 下载适用于 Java 9 的 Scene Builder 工具。本书不讨论 Scene Builder 的使用。\n\n在本节中，我将介绍 FXML 的基础知识。你将使用\
  \ FXML 开发一个简单的 JavaFX 应用程序。该应用程序包含以下内容：\n\n*   一个 `VBox`\n*   一个 `Label`\n*   一个\
  \ `Button`\n\n`VBox` 的 `spacing` 设置为 10px。`Label` 和 `Button` 的 `text` 属性分别设置为“FXML\
  \ is cool!”和“Say Hello”。当按钮被点击时，标签中的文本将更改为“Hello from FXML!”。图 8-26 显示了该应用程序显示的两个窗口实例。\n\
  \n![A323071_2_En_8_Fig26_HTML.jpg](img/A323071_2_En_8_Fig26_HTML.jpg)\n\n图 8-26.\n\
  \n使用 FXML 创建场景图的两个窗口实例\n\n清单 8-26 中的程序是此示例应用程序的 JavaFX 实现，它使用 Java 编程语言构建 UI。\n\n\
  ```\n// SayHelloFX.java\npackage com.jdojo.javafx;\nimport javafx.application.Application;\n\
  import javafx.event.ActionEvent;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\n\
  import javafx.scene.control.Label;\nimport javafx.scene.layout.VBox;\nimport javafx.stage.Stage;\n\
  public class SayHelloFX extends Application {\nprivate Label msgLbl = new Label(\"\
  FXML is coll!\");\nprivate Button sayHelloBtn = new Button(\"Say Hello\");\npublic\
  \ static void main(String[] args) {\nApplication.launch(args);\n}\n@Override\npublic\
  \ void start(Stage stage) {\n// 设置标签的首选宽度\nmsgLbl.setPrefWidth(150);\n// 设置按钮的 ActionEvent\
  \ 处理器\nsayHelloBtn.setOnAction(this::sayHello);\nVBox root = new VBox(10);\nroot.getChildren().addAll(msgLbl,\
  \ sayHelloBtn);\nroot.setStyle(\"-fx-padding: 10;\"\n+ \"-fx-border-style: solid\
  \ inside;\"\n+ \"-fx-border-width: 2;\"\n+ \"-fx-border-insets: 5;\"\n+ \"-fx-border-radius:\
  \ 5;\"\n+ \"-fx-border-color: blue;\");\nScene scene = new Scene(root);\nstage.setScene(scene);\n\
  stage.setTitle(\"Hello FXML\");\nstage.show();\n}\npublic void sayHello(ActionEvent\
  \ e) {\nmsgLbl.setText(\"Hello from FXML!\");\n}\n}\n清单 8-26.\nFXML 示例应用程序的 JavaFX\
  \ 版本\n```\n\n现在，让我们构建清单 8-26 中程序的另一个版本，该版本将使用 FXML 构建 UI。创建一个 FXML 文件 `sayhello.fxml`，其内容如清单\
  \ 8-27 所示。清单 8-27 是你的示例的 FXML 文档。它将为图 8-26 中所示的场景创建根元素。将 `sayhello.fxml` 文件保存在 `resources/fxml`\
  \ 目录中，该目录包含 `jdojo.javafx` 模块的源代码。在本书的源代码中，该文件位于 `Java9APIsAndModules\\src\\jdojo.javafx\\\
  classes\\resources\\fxml\\sayhello.fxml`。\n\n```\n\n-fx-padding: 10;\n-fx-border-style:\
  \ solid inside;\n-fx-border-width: 2;\n-fx-border-insets: 5;\n-fx-border-radius:\
  \ 5;\n-fx-border-color: blue;\n\nfunction sayHello() {\nmsgLbl.setText(\"Hello from\
  \ FXML!\");\n}\n\n清单 8-27.\nsayhello.fxml 文件的内容\n```\n\n你已经设置了 `VBox` 的 `spacing`\
  \ 属性，以及 `Label` 和 `Button` 控件的 `fx:id` 属性。你使用 `<style>` 属性元素设置了 `VBox` 的 `style`\
  \ 属性。你也可以选择使用 style 属性或属性元素来设置样式。你使用了属性元素，因为样式值是一个很大的字符串，如果分成多行输入会更易读。`<fx:script>`\
  \ 元素定义了一个包含一个函数 `sayHello()` 的脚本块。该函数设置了由 `msgLbl fx:id` 属性标识的 `Label` 的 text 属性。你将\
  \ `sayHello()` 函数设置为 `Button` 的 `onAction` 属性，因此当 `Button` 被点击时，`sayHello()` 函数将被执行。\n\
  \n要从 FXML 构建 UI，你需要将其加载到 JavaFX 程序中。加载 FXML 由 `FXMLLoader` 类的实例执行，该类位于 `javafx.fxml`\
  \ 包中。\n\n`FXMLLoader` 类提供了几个构造函数，允许你指定用于加载文档的位置、字符集、资源包等。你至少需要指定 FXML 文档的位置，它是一个\
  \ `URL`。该类包含一个 `load()` 方法来执行文档的实际加载。以下代码片段从模块 `jdojo.javafx` 加载一个 FXML 文档。请注意，代码中引用的\
  \ `this` 是 `jdojo.javafx` 模块中某个类的对象的引用。\n\n```\n// 构建定位 FXML 文件的 URL\nURL fxmlUrl\
  \ = this.getClass()\n.getResource(\"/resources/fxml/sayhello.fxml\");\n// 创建一个 FXMLLoader\
  \ 对象并设置其位置，即 FXML 内容的 URL\nFXMLLoader loader = new FXMLLoader();\nloader.setLocation(fxmlUrl);\n\
  // 加载 FXML，它将返回一个 VBox\nVBox root = loader.load();\n```\n\n\n\n`load()` 方法具有泛型返回类型。在前面的代码片段中，你通过在调用\
  \ `load()` 方法时明确指定类型（`loader.<VBox>load()`），表明你期望从 FXML 文档中获取一个 `VBox` 实例。如果你愿意，也可以省略泛型参数，如下所示：\n\
  \n```\n// load() 方法的返回类型将被推断为 VBox\nVBox root = loader.load();\n```\n\n`FXMLLoader`\
  \ 类支持使用 `InputStream` 加载 FXML 文档。以下代码片段演示了如何使用 `InputStream` 加载同一个 FXML 文档：\n\n\
  ```\nInputStream fxmlStream = this.getClass()\n.getResourceAsStream(\"/resources/fxml/sayhello.fxml\"\
  );\nFXMLLoader loader = new FXMLLoader();\nVBox root = loader.load(fxmlStream);\n\
  ```\n\n在内部，`FXMLLoader` 通过流读取文档，这可能会抛出 `IOException`。`FXMLLoader` 类中所有版本的 `load()`\
  \ 方法都会抛出 `IOException`。为了保持代码简洁，我在这些代码片段中省略了异常处理。在你的应用程序中，你需要处理这个异常。\n\n加载完 FXML\
  \ 文档后，下一步该做什么？此时，FXML 的作用已经结束，你的 JavaFX 代码应该接管控制权。\n\n清单 8-28 中的程序包含了该示例的 JavaFX\
  \ 代码。它加载了存储在 `sayhello.fxml` 文件中的 FXML 文档。程序从 `jdojo.javafx` 模块中加载该文档。加载器返回一个 `VBox`，并将其设置为场景的根节点。其余代码与你之前使用的相同。请注意\
  \ `start()` 方法声明中的一个区别：该方法声明它可能会抛出 `IOException`，你必须添加这个声明，因为你在方法内部调用了 `FXMLLoader`\
  \ 的 `load()` 方法。运行该程序时，它会显示一个窗口，如图 8-26 所示。点击按钮，`Label` 的文本将会改变。\n\n```\n// SayHelloFXML.java\n\
  package com.jdojo.javafx;\nimport javafx.application.Application;\nimport javafx.fxml.FXMLLoader;\n\
  import java.io.IOException;\nimport java.io.InputStream;\nimport java.net.URL;\n\
  import javafx.scene.Scene;\nimport javafx.scene.layout.VBox;\nimport javafx.stage.Stage;\n\
  public class SayHelloFXML extends Application {\npublic static void main(String[]\
  \ args) {\nApplication.launch(args);\n}\n@Override\npublic void start(Stage stage)\
  \ throws IOException {\n// 为 FXML 文档构建一个 URL\nURL fxmlUrl = this.getClass()\n.getResource(\"\
  /resources/fxml/sayhello.fxml\");\n// 加载 FXML 文档\nVBox root = FXMLLoader.load(fxmlUrl);\n\
  Scene scene = new Scene(root);\nstage.setScene(scene);\nstage.setTitle(\"Hello FXML\"\
  );\nstage.show();\n}\n}\n清单 8-28.\n使用 FXML 构建 GUI\n```\n\nFXML 提供的功能远不止你在本例中看到的这些。使用\
  \ FXML，你可以将 UI 元素绑定到 JavaFX 中的变量、进行数据绑定和事件处理、创建自定义控件等。讨论这些功能超出了本书的范围。\n\n## 打印\n\
  \nJavaFX 通过 `javafx.print` 包中的 Print API 支持打印节点。该 API 包含以下类以及一些枚举（未列出）：\n\n*   `Printer`\n\
  *   `PrinterAttributes`\n*   `PrintResolution`\n*   `PrinterJob`\n*   `JobSettings`\n\
  *   `Paper`\n*   `PaperSource`\n*   `PageLayout`\n*   `PageRange`\n\n这些类的实例代表了打印过程的不同组件。例如，`Printer`\
  \ 代表可用于打印作业的打印机；`PrinterJob` 代表一个可以发送给 `Printer` 进行打印的打印作业；`Paper` 代表打印机上可用的纸张尺寸等。\n\
  \nPrint API 支持打印可能已附加或未附加到场景图的节点。一个常见的需求是打印网页的内容，而不是包含该网页的 `WebView` 节点。`javafx.scene.web.WebEngine`\
  \ 类包含一个 `print(PrinterJob job)` 方法，该方法打印的是网页的内容，而不是 `WebView` 节点。\n\n如果在打印过程中修改了节点，打印出的节点可能显示不正确。请注意，打印一个节点可能会跨越多个脉冲事件，导致正在打印的内容发生并发更改。为确保正确打印，请确保在打印过程中不修改正在打印的节点。\n\
  \n节点可以在任何线程上打印，包括 JavaFX 应用程序线程。建议将大型、耗时的打印作业提交到后台线程，以保持 UI 的响应性。\n\nPrint API 中的类是\
  \ final 的，因为它们代表了现有的打印设备属性。其中大多数不提供公共构造函数，因为你无法凭空制造一个打印设备。相反，你需要使用类中的工厂方法来获取它们的引用。\n\
  \n`Printer.getAllPrinters()` 静态方法返回机器上已安装打印机的可观察列表。请注意，该方法返回的打印机列表可能会随时间变化，因为可能会安装新打印机或移除旧打印机。使用\
  \ `Printer` 的 `getName()` 方法获取该 `Printer` 所代表的打印机的名称。以下代码片段列出了运行该代码的机器上所有已安装的打印机。你可能会得到不同的输出。\n\
  \n```\nimport javafx.collections.ObservableSet;\nimport javafx.print.Printer;\n\
  ...\nObservableSet allPrinters = Printer.getAllPrinters();\nfor(Printer p : allPrinters)\
  \ {\nSystem.out.println(p.getName());\n}\nBrother HL-L2380DW series Printer\nFax\n\
  Microsoft Print to PDF\nMicrosoft XPS Document Writer\nSend To OneNote 2013\n```\n\
  \n`Printer.getDefaultPrinter()` 方法返回默认的 `Printer`。如果没有安装打印机，该方法可能返回 `null`。默认打印机可能会在机器上更改。因此，该方法每次调用可能返回不同的打印机，并且返回的打印机在一段时间后可能失效。以下代码片段展示了如何获取默认打印机：\n\
  \n```\nPrinter defaultPrinter = Printer.getDefaultPrinter();\nif (defaultPrinter\
  \ != null) {\nString name = defaultPrinter.getName();\nSystem.out.println(\"默认打印机名称:\
  \ \" + name);\n} else {\nSystem.out.println(\"未安装打印机。\");\n}\n```\n\n打印一个节点很简单：创建一个\
  \ `PrinterJob` 并调用其 `printPage()` 方法，传入要打印的节点。使用默认打印机和所有默认设置打印一个节点只需要三行代码：\n\n```\n\
  PrinterJob printerJob = PrinterJob.createPrinterJob();\nprinterJob.printPage(myNode);\
  \ // myNode 是要打印的节点\nprinterJob.endJob();\n```\n\n在实际应用程序中，你需要处理错误，因此前面的代码重写如下：\n\
  \n\n\n```\n// 为默认打印机创建一个打印任务\nPrinterJob printerJob = PrinterJob.createPrinterJob();\n\
  if (printerJob != null) {\n// 打印节点\nboolean printed = printerJob.printPage(node);\n\
  if (printed) {\n// 结束打印任务\nprinterJob.endJob();\n} else {\nSystem.out.println(\"\
  打印失败。\");\n}\n} else {\nSystem.out.println(\"无法创建打印任务。\");\n}\n```\n\n你可以使用 `PrinterJob`\
  \ 类的 `createPrinterJob()` 静态方法来创建一个打印任务。该方法有重载形式，如下所示：\n\n*   `PrinterJob createPrinterJob()`\n\
  *   `PrinterJob createPrinterJob(Printer printer)`\n\n无参方法会为默认打印机创建一个打印任务。你可以使用该方法的另一个版本来为指定的打印机创建打印任务。\n\
  \n你可以通过调用 `PrinterJob` 的 `setPrinter()` 方法来更改其对应的打印机。如果新打印机不支持当前的打印任务设置，这些设置会自动重置以适配新打印机。\n\
  \n```\n// 为打印任务设置一台新打印机\nprinterJob.setPrinter(myNewPrinter);\n```\n\n将打印机的值设置为\
  \ `null` 将使用默认打印机。使用 `PrinterJob` 类中的以下 `printPage()` 方法之一来打印节点：\n\n*   `boolean\
  \ printPage(Node node)`\n*   `boolean printPage(PageLayout pageLayout, Node node)`\n\
  \n该方法的第一个版本仅将要打印的节点作为参数。它使用任务的默认页面布局进行打印。第二个版本允许你指定一个页面布局来打印节点。如果打印成功，该方法返回 `true`。否则，返回\
  \ `false`。\n\n打印完成后，调用 `endJob()` 方法。如果任务可以成功假脱机到打印机队列，该方法返回 `true`。否则，返回 `false`，这可能表示任务无法假脱机或已经完成。任务成功完成后，该任务不能再被重复使用。\n\
  \n你可以使用 `PrinterJob` 的 `cancelJob()` 方法来取消打印任务。打印可能不会立即取消，例如，当一页正在打印中时。取消操作会尽快执行。在以下情况下，该方法不会产生任何效果：\n\
  \n*   该任务已被请求取消。\n*   该任务已经完成。\n*   该任务出现错误。\n\n`PrinterJob` 类包含一个只读的 `jobStatus`\
  \ 属性，用于指示打印任务的当前状态。该状态由 `PrinterJob.JobStatus` 枚举中的以下常量之一定义：\n\n*   `NOT_STARTED`\n\
  *   `PRINTING`\n*   `CANCELED`\n*   `DONE`\n*   `ERROR`\n\n`NOT_STARTED` 状态表示一个新任务。在此状态下，可以配置任务并启动打印。`PRINTING`\
  \ 状态表示任务已请求打印至少一页，并且尚未终止打印。在此状态下，无法配置任务。\n\n其他三种状态，`CANCELED`、`DONE` 和 `ERROR`，表示任务的终止状态。一旦任务处于这些状态之一，就不应再重复使用。当状态变为\
  \ `CANCELED` 或 `ERROR` 时，无需调用 `endJob()` 方法。当打印成功并且调用了 `endJob()` 方法时，会进入 `DONE`\
  \ 状态。\n\n清单 8-29 中的程序展示了如何打印节点。它显示了一个 `TextArea`，你可以在其中输入文本。提供了两个按钮：一个打印 `TextArea`\
  \ 节点，另一个打印整个场景。当启动打印时，打印任务的状态会显示在一个标签中。`print()` 方法中的代码与你之前在示例中看到的代码相同。该方法包含了在标签中显示任务状态的逻辑。该程序显示一个如图\
  \ 8-27 所示的窗口。运行程序，在 `TextArea` 中输入文本，然后点击两个按钮之一进行打印。\n\n![A323071_2_En_8_Fig27_HTML.jpg](img/A323071_2_En_8_Fig27_HTML.jpg)\n\
  \n图 8-27.\n\n一个允许用户在 TextArea 和场景中打印文本的窗口\n\n```\n// PrintingNodes.java\npackage\
  \ com.jdojo.javafx;\nimport javafx.application.Application;\nimport javafx.print.PrinterJob;\n\
  import javafx.scene.Node;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\n\
  import javafx.scene.control.Label;\nimport javafx.scene.control.TextArea;\nimport\
  \ javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\nimport javafx.stage.Stage;\n\
  public class PrintingNodes extends Application {\nprivate Label jobStatus = new\
  \ Label();\npublic static void main(String[] args) {\nApplication.launch(args);\n\
  }\n@Override\npublic void start(Stage stage) {\nVBox root = new VBox(5);\nLabel\
  \ textLbl = new Label(\"文本:\");\nTextArea text = new TextArea();\ntext.setPrefRowCount(10);\n\
  text.setPrefColumnCount(20);\ntext.setWrapText(true);\n// 打印 TextArea 节点的按钮\nButton\
  \ printTextBtn = new Button(\"打印文本\");\nprintTextBtn.setOnAction(e -> print(text));\n\
  // 打印整个场景的按钮\nButton printSceneBtn = new Button(\"打印场景\");\nprintSceneBtn.setOnAction(e\
  \ -> print(root));\nHBox jobStatusBox\n= new HBox(5, new Label(\"打印任务状态:\"), jobStatus);\n\
  HBox buttonBox = new HBox(5, printTextBtn, printSceneBtn);\nroot.getChildren().addAll(textLbl,\
  \ text, jobStatusBox, buttonBox);\nScene scene = new Scene(root);\nstage.setScene(scene);\n\
  stage.setTitle(\"打印节点\");\nstage.show();\n}\nprivate void print(Node node) {\njobStatus.textProperty().unbind();\n\
  jobStatus.setText(\"正在创建打印任务...\");\n// 为默认打印机创建一个打印任务\nPrinterJob job = PrinterJob.createPrinterJob();\n\
  if (job != null) {\n// 显示打印任务状态\njobStatus.textProperty().bind(job.jobStatusProperty().asString());\n\
  // 打印节点\nboolean printed = job.printPage(node);\nif (printed) {\n// 结束打印任务\njob.endJob();\n\
  } else {\njobStatus.textProperty().unbind();\njobStatus.setText(\"打印失败。\");\n}\n\
  } else {\njobStatus.setText(\"无法创建打印任务。\");\n}\n}\n}\n清单 8-29.\n打印节点\n```\n\n打印\
  \ API 提供了更多打印功能，例如显示打印对话框。有关更多详细信息，请参阅 `javafx.print` 包中类的 JavaFX API 文档。\n\n\n\n\
  ## 摘要\n\nJavaFX 是一个基于 Java 的开源 GUI 框架，用于开发富客户端应用程序。它是 Java 平台 GUI 开发技术领域中 Swing\
  \ 的继任者。\n\n与 JDK9 一同发布的 JavaFX API 已被模块化为以下模块：`javafx.base`、`javafx.controls`、`javafx.fxml`、`javafx.graphics`、`javafx.media`、`javafx.swing`\
  \ 和 `javafx.web`。这些模块包含在 JDK/JRE 9 中。JDK9 API 文档也包含了这些模块的文档。\n\nJavaFX 中的 GUI 显示在一个舞台（stage）中。舞台是\
  \ `Stage` 类的一个实例。在桌面应用程序中，舞台是一个窗口；在 Web 应用程序中，舞台是浏览器中的一个区域。一个舞台包含一个场景（scene）。一个场景包含一组以树状结构排列的节点（图形）。\n\
  \n一个 JavaFX 应用程序继承自 `Application` 类。JavaFX 运行时创建第一个舞台，称为主舞台，并调用应用程序类的 `start()`\
  \ 方法，同时传递主舞台的引用。开发者需要向舞台添加一个场景，并使舞台可见。\n\n使用 JavaFX UI 的 JavaFX 应用程序必须将包含应用程序类的包导出到至少\
  \ `javafx.graphics` 模块。\n\nJavaFX 支持属性类，其实例用于表示类的属性。属性支持单向和双向绑定。如果属性绑定到一个表达式，属性值会自动与表达式的值同步。属性支持失效和更改通知。感兴趣的一方可以注册这些通知。当属性失效或其值发生变化时，他们会收到通知。当属性的依赖项发生变化时，属性会失效。\n\
  \nJavaFX 提供了可观察的列表、集合和映射，它们是 `ObservableList`、`ObservableSet` 和 `ObservableMap`\
  \ 接口的实例。可以观察它们的失效和变化。`FXCollections` 类包含用于创建此类可观察集合实例的工厂方法。\n\nJavaFX 支持 UI 元素的事件处理。您可以为\
  \ UI 元素注册事件处理器。当事件发生时，您注册的事件处理器将被执行。\n\nJavaFX 提供了布局面板，它们是节点的容器。它们以特定方式排列节点。例如，`HBox`\
  \ 布局面板通过将节点水平放置在一行中来排列它们，而 `VBox` 布局面板通过将节点垂直放置在一列中来排列它们。JavaFX 提供了丰富的控件集，例如 `Button`、`ButtonBar`、`Label`、`ChoiceBox`、`ComboBox`、`TextField`、`DatePicker`、`Spinner`\
  \ 等。`HTMLEditor` 控件提供了编辑富文本的功能。`WebView` 节点用于显示网页内容。\n\nJavaFX 为绘制 2D 和 3D 形状提供了广泛支持。它提供了\
  \ Canvas API，用于使用绘图命令在画布上绘制 2D 形状。Canvas API 还允许您访问（读取和写入）画布表面上的像素。\n\n您只需编写几行代码，即可对场景中的节点应用效果、变换和动画。JavaFX\
  \ 支持 FXML，这是一种基于 XML 的标记语言，用于构建 JavaFX 应用程序的 GUI。您可以使用打印 API 打印节点和网页内容。\n\n## 问题与练习\n\
  \n1.  什么是 JavaFX？\n2.  您的 JavaFX 应用程序类必须继承的类的完全限定名称是什么？\n3.  要运行带有 UI 组件的 JavaFX\
  \ 应用程序，您的模块必须将包含 JavaFX 应用程序类的包导出到至少一个 JavaFX 模块。该 JavaFX 模块的名称是什么？\n4.  您的 JavaFX\
  \ 应用程序类需要重写的 `start()` 方法的签名是什么？\n5.  您是否需要为应用程序类包含一个 `public static void main(String[]\
  \ args)` 方法来运行您的 JavaFX 应用程序？\n6.  什么是舞台？主舞台是如何创建的？您如何显示一个舞台？\n7.  什么是场景？如何向舞台添加场景？\n\
  8.  解释 JavaFX 应用程序的生命周期，包括在每个阶段执行代码所涉及的线程。\n9.  解释 JavaFX 应用程序可能终止的两种方式。\n10. 编写一个简单的\
