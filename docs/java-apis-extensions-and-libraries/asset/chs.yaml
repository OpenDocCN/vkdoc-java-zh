  descText.setPrefRowCount(5);\nVBox.setVgrow(descText, Priority.ALWAYS);\n// 将所有控件放入一个\
  \ VBox 中\nVBox center = new VBox(nameFields, descLbl, descText);\nreturn center;\n\
  }\n}\n清单 8-15.\n使用 BorderPane 容器\n```\n\n请注意清单 8-15 中容器对 `setStyle()` 方法的使用。你可以使用\
  \ CSS 自定义 JavaFX 中容器和控件的视觉外观。JavaFX 中的 CSS 属性的命名和工作方式类似于用于自定义浏览器中 HTML 内容的 CSS 属性。JavaFX\
  \ 中的 CSS 属性以 `-fx-` 开头，例如，用于指定字体大小的 CSS 属性名称是 `-fx-font-size`。你也可以使用 CSS 文件为 JavaFX\
  \ 应用程序设置样式。清单 8-16 展示了如何通过向场景的根节点添加样式，为场景添加内边距和圆角蓝色边框。图 8-13 显示了窗口中生成的场景。\n\n\n\n\
