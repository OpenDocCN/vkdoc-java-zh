  \ `beginingjava.dll` 文件。为清晰起见，命令的每个部分显示在单独的行中；你应该在一行内输入整个命令。\n\n```\nC:\\> g++ -Wl,--kill-at\
  \ -shared\n-IC:/java9/include\n-IC:/java9/include/win32\n-IC:/Java9APIsAndModules/jni/headers/jdojo.jni\n\
