  \n清单 10-7 包含`StartProcessTest`类的代码，该代码展示了如何使用`Job`类创建新进程。在其`main()`方法中，它创建了一个新进程，打印进程详细信息，向进程添加了一个关闭任务，等待进程终止，然后再次打印进程详细信息。请注意，该进程运行了\
