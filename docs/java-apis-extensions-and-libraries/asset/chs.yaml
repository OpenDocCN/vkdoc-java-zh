  \ BorderLayout.CENTER);\nmsgText.append(\"使用其左侧的手柄移动工具栏\");\n}\nprivate void prepareToolBar()\
  \ {\nInsets zeroInset = new Insets(0, 0, 0, 0);\nJButton newButton = new JButton(\"\
  新建\");\nnewButton.setMargin(zeroInset);\nnewButton.setToolTipText(\"添加新策略\");\n\
  JButton openButton = new JButton(\"打开\");\nopenButton.setMargin(zeroInset);\nopenButton.setToolTipText(\"\
  打开策略\");\nJButton exitButton = new JButton(\"退出\");\nexitButton.setMargin(zeroInset);\n\
  exitButton.setToolTipText(\"退出应用程序\");\n// 为“退出”工具栏按钮添加动作监听器\nexitButton.addActionListener(e\
  \ -> System.exit(0));\ntoolBar.add(newButton);\ntoolBar.add(openButton);\ntoolBar.addSeparator();\n\
  toolBar.add(exitButton);\ntoolBar.setRollover(true);\n}\n// 显示框架\npublic static\
  \ void main(String[] args) {\nJToolBarFrame frame = new JToolBarFrame(\"JToolBar\
  \ 测试\");\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 2-9.\n在 JFrame 中使用 JToolBar\n\
  ```\n\n## JToolBar 与 Action 接口的结合\n\n`JButton`、`JMenuItem` 和 `JToolBar` 中的项这三个组件有什么共同点？它们都代表一个动作。有时，你会以菜单项、工具栏项和\
  \ `JButton` 的形式向用户提供相同的选项。如果你需要禁用你通过三个组件提供的某个选项，你会怎么做？难道你不认为你需要至少在三个地方分别禁用它们，因为它们是代表同一选项的三个不同组件吗？你可能是对的。然而，在\
  \ Swing 中，有一种更简单的方法来处理这种情况。当你需要以不同方式提供某个动作的选项时，你应该使用 `Action` 接口。你需要将选项的逻辑和属性封装在一个\
  \ `Action` 对象中，并使用该对象来构造 `JButton`、`JMenuItem` 和工具栏中的项。如果你需要禁用该选项，只需在 `Action` 对象上调用一次\
  \ `setEnabled(false)`，所有选项都将被禁用。在这种情况下，使用 `Action` 对象会让你的编程工作更轻松。\n\n让我们看看它的实际应用。让我们创建一个继承自\
  \ `AbstractAction` 类的 `ExitAction` 类。它的 `actionPerformed()` 方法简单地退出应用程序。你可以在其构造函数中使用其\
  \ `putValue()` 方法设置一些属性，如下所示：\n\n```\npublic class ExitAction extends AbstractAction\
  \ {\npublic ExitAction(String action) {\nsuper(action);\n// 为工具栏设置工具提示文本\nthis.putValue(SHORT_DESCRIPTION,\
  \ \"退出应用程序\");\n// 设置助记键\nthis.putValue(MNEMONIC_KEY, KeyEvent.VK_E);\n}\n@Override\n\
  public void actionPerformed(ActionEvent e) {\nSystem.exit(0);\n}\n}\n```\n\n如果你想添加一个“退出”菜单项、一个\
  \ `JButton` 和一个工具栏按钮，你可以先创建一个 `ExitAction` 类的对象，然后使用它来创建所有选项项，如下所示：\n\n```\nExitAction\
  \ exitAction = new ExitAction(\"退出\");\nJButton exitButton = new JButton(ExitAction);\n\
  JMenuItem exitMenuItem = new JMenuItem(exitAction);\nJButton exitToolBarButton =\
  \ new JButton(exitAction);\nexitToolBarButton.setMargin(new Insets(0,0,0,0));\n\
  ```\n\n现在，你可以将 `exitButton` 添加到你的 `JFrame`，将 `exitMenuItem` 添加到你的菜单，并将 `exitToolBarButton`\
  \ 添加到你的工具栏。它们的行为方式相同，因为它们共享同一个 `exitAction` 对象。如果你想在所有三个地方禁用退出选项，只需调用一次 `exitAction.setEnabled(false)`\
  \ 即可。\n\n\n\n## JTable\n\nSwing 允许你使用 `JTable` 组件以表格形式显示和编辑数据。`JTable` 通过行和列来展示数据。你可以设置列标题的标签，还可以在运行时对表格数据进行排序。使用\
  \ `JTable` 可以简单到只需编写几行代码，也可以复杂到需要编写数百行代码。`JTable` 是一个复杂且功能强大的 Swing 组件，它值得用一整章来介绍。本节将解释使用\
  \ `JTable` 的基础知识，并提供一些关于其强大功能的提示。`JTable` 使用了 `javax.swing.table` 包中的许多其他类和接口。`JTable`\
  \ 类本身位于 `javax.swing` 包中。\n\n让我们从最简单的 `JTable` 示例开始。你可以通过使用其无参构造函数来创建一个 `JTable`。\n\
  \n```\nJTable table = new JTable();\n```\n\n嗯，这很简单。然而，它的列、行和数据会怎样呢？你得到的只是一个没有可视化组件的空表格。稍后你将解决这些问题。\n\
  \n`JTable` 并不存储数据，它只负责显示数据。它使用一个模型来存储数据、列数和行数。`TableModel` 接口的实例代表了 `JTable` 的模型。`DefaultTableModel`\
  \ 类是 `TableModel` 接口的一个实现。当你使用 `JTable` 类的默认构造函数时，Java 会设置一个 `DefaultTableModel`\
  \ 类的实例作为其模型。如果你想添加或删除列/行，你必须操作它的模型。你可以使用 `JTable` 的 `getModel()` 方法获取其模型的引用。让我们向表格中添加两行和三列。\n\
  \n```\n// 获取表格模型的引用\nDefaultTableModel tableModel = (DefaultTableModel)table.getModel();\n\
  // 将行数设置为 2\ntableModel.setRowCount(2);\n// 将列数设置为 3\ntableModel.setColumnCount(3);\n\
  ```\n\n让我们设置表格中某个单元格的值。你可以使用表格模型或表格本身的 `setValueAt(Object data, int row, int column)`\
  \ 方法来设置单元格中的值。我们将 \"John Jacobs\" 设置为第一行第一列的值。请注意，第一行和第一列从 0 开始计数。\n\n```\n// 在表格模型中设置\
  \ (0, 0) 位置的值\ntableModel.setValueAt(\"John Jacobs\", 0, 0);\n// 在表格中设置 (0, 0) 位置的值\n\
  // 效果与使用表格模型设置值相同\ntable.setValueAt(\"John Jacobs\", 0, 0);\n```\n\n如果你将表格添加到容器中，它将如图\
  \ 2-25 所示。\n\n![A323071_2_En_2_Fig25_HTML.jpg](img/A323071_2_En_2_Fig25_HTML.jpg)\n\
  \n图 2-25.\n\n一个具有两行三列并使用默认列标题标签的 JTable\n\n确保你将表格添加到了 `JScrollPane` 中。注意，你得到了两行和三列。列标题的标签被设置为\
  \ A、B 和 C。你可以双击任意单元格开始编辑其中的值。要获取单元格中包含的值，你可以使用表格模型或 `JTable` 的 `getValueAt(int row,\
  \ int column)` 方法。它返回一个 `Object`。你还可以通过使用 `DefaultTableModel` 类的 `addColumn()` 和\
  \ `addRow()` 方法向 `JTable` 添加更多列或行。你可以使用其模型类的 `removeRow(int row)` 方法从模型中删除一行，从而也从\
  \ `JTable` 中删除该行。\n\n你可以使用模型的 `setColumnIdentifiers()` 方法为列标题设置自定义标签，如下所示：\n\n```\n\
  // 将列标题存储在一个数组中\nObject[] columnHeaderLabels = new Object[]{\"Name\", \"DOB\", \"\
  Gender\"};\n// 使用模型为表格设置列标题\ntableModel.setColumnIdentifiers(columnHeaderLabels);\n\
  ```\n\n使用自定义列标题后，表格如图 2-26 所示。\n\n![A323071_2_En_2_Fig26_HTML.jpg](img/A323071_2_En_2_Fig26_HTML.jpg)\n\
  \n图 2-26.\n\n一个具有两行、三列和自定义列标题标签的 JTable\n\n如果你希望列标题始终可见，则必须将 `JTable` 添加到 `JScrollPane`\
  \ 中。如果不将其添加到 `JScrollPane`，当行数超过组件可用高度时，列标题将不可见。你可以使用 `JTable` 的 `getTableHeader()`\
  \ 方法获取列标题组件并自行显示（例如，如果 `JTable` 在 `BorderLayout` 的中心区域，则将其放在北部区域）。你可以通过点击某行来选择该行。默认情况下，`JTable`\
  \ 允许你选择多行。你可以使用 `JTable` 的 `getSelectedRow()` 方法获取第一个选中的行号，使用 `getSelectedRows()`\
  \ 方法获取所有选中行的行号。`getSelectedRowCount()` 方法返回选中的行数。\n\n你从最简单的 `JTable` 开始。然而，使用这个所谓最简单的\
  \ `JTable` 并非易事，但现在你已经掌握了使用 `JTable` 的基础知识。\n\n让我们通过使用另一个构造函数创建 `JTable` 来重复这个示例。`JTable`\
  \ 类还有另一个构造函数，它接受行数和列数作为参数。你可以创建一个具有两行三列的 `JTable`，如下所示：\n\n```\n// 创建一个具有 2 行 3\
  \ 列的 JTable\nJTable table = new JTable(2, 3);\n```\n\n如果你想将第一行第一列的值设置为 \"John Jacobs\"\
  ，则无需使用表格的模型。你可以使用 `JTable` 的 `setValueAt()` 方法来完成同样的操作。\n\n```\ntable.setValueAt(\"\
  John Jacobs\", 0, 0);\n```\n\n这个比上一个稍微简单一些。但是，你仍然会得到默认的列标题标签 A、B 和 C。`JTable` 的另外两个构造函数允许你一次性设置行数、列数和数据。它们仅在参数类型上有所不同：一个允许你使用\
  \ `Object` 数组，另一个允许你使用 `Vector` 对象。它们的声明如下：\n\n*   `JTable(Object[][] rowData, Object[]\
  \ columnNames)`\n*   `JTable(Vector rowData, Vector columnNames)`\n\n如果你使用一个二维的\
  \ `Object` 数组来设置行数据，数组的第一个维度的大小决定了行数。如果你使用 `Vector`，`Vector` 中的元素数量决定了表格的行数。`Vector`\
  \ 中的每个元素都应该是一个包含一行数据的 `Vector` 对象。以下是使用二维 `Object` 数组构造 `JTable` 的方法。图 2-27 显示了显示代码中所有数据的表格。\n\
  \n![A323071_2_En_2_Fig27_HTML.jpg](img/A323071_2_En_2_Fig27_HTML.jpg)\n\n图 2-27.\n\
  \n一个具有两行、三列和数据的 JTable\n\n```\n// 准备列标题\nObject[] columnNames = {\"ID\", \"Name\"\
  , \"Gender\" } ;\n// 创建一个二维数组来包含表格数据\nObject[][] rowData = new Object[][] {\n{new\
  \ Integer(100), \"John Jacobs\", \"Male\" },\n{new Integer(101), \"Barbara Gentry\"\
  , \"Female\"}\n};\n// 使用数据和列标题创建一个 JTable\nJTable table = new JTable(rowData, columnNames);\n\
  ```\n\n到目前为止，你的表格数据都是硬编码的。`JTable` 将所有数据视为 `String`，并且表格中的所有单元格都是可编辑的。例如，你将 ID 列的值设置为整数，但它们仍然显示为左对齐的文本。数字在单元格中应该右对齐。如果你想自定义\
  \ `JTable`，你需要为表格使用你自己的模型。回想一下，`TableModel` 接口定义了 `JTable` 的模型。以下是 `TableModel`\
  \ 接口的声明：\n\n\n\n```\npublic interface TableModel\npublic int getRowCount();\npublic\
  \ int getColumnCount();\npublic String getColumnName(int columnIndex);\npublic Class\
  \ getColumnClass(int columnIndex);\npublic boolean isCellEditable(int rowIndex,\
  \ int columnIndex);\npublic Object getValueAt(int rowIndex, int columnIndex);\n\
  public void setValueAt(Object aValue, int rowIndex, int columnIndex);\npublic void\
  \ addTableModelListener(TableModelListener l);\npublic void removeTableModelListener(TableModelListener\
  \ l);\n}\n```\n\n`AbstractTableModel`类实现了`TableModel`接口。它为`TableModel`接口中的方法提供了空实现，但并未规定数据的存储方式。如果你想实现自己的表格模型，需要让你的类继承自`AbstractTableModel`类。如果在自定义表格模型类中至少实现了以下三个方法，你将得到一个只读的表格模型：\n\
  \n*   `public int getRowCount();`\n*   `public int getColumnCount();`\n*   `public\
  \ Object getValueAt(int row, int column);`\n\n`DefaultTableModel`类继承自`AbstractTableModel`类。它为`TableModel`接口中的所有方法提供了默认实现，并使用`Vector`的`Vector`来存储表格数据。\n\
  \n如果使用自己的表格模型，你可以对`JTable`的工作方式拥有更强的控制力。清单 2-10 实现了一个简单的表格模型，该模型使用数组的数组来存储数据。\n\n\
  ```\n// SimpleTableModel.java\npackage com.jdojo.swing.component;\nimport javax.swing.table.AbstractTableModel;\n\
  public class SimpleTableModel extends AbstractTableModel {\nprivate final Object[][]\
  \ data = {};\nprivate final String[] columnNames = {\"ID\", \"Name\", \"Gender\"\
  };\nprivate final Class[] columnClass = {Integer.class, String.class, String.class};\n\
  private final Object[][] rowData = new Object[][]{\n{100, \"John Jacobs\", \"Male\"\
  },\n{101, \"Barbara Gentry\", \"Female\"}\n};\npublic SimpleTableModel() {\n}\n\
  @Override\npublic int getRowCount() {\nreturn rowData.length;\n}\n@Override\npublic\
  \ int getColumnCount() {\nreturn columnNames.length;\n}\n@Override\npublic String\
  \ getColumnName(int columnIndex) {\nreturn columnNames[columnIndex];\n}\n@Override\n\
  public Class getColumnClass(int columnIndex) {\nreturn columnClass[columnIndex];\n\
  }\n@Override\npublic boolean isCellEditable(int rowIndex, int columnIndex) {\nboolean\
  \ isEditable = true;\nif (columnIndex == 0) {\nisEditable = false; // 使 ID 列不可编辑\n\
  }\nreturn isEditable;\n}\n@Override\npublic Object getValueAt(int rowIndex, int\
  \ columnIndex) {\nreturn rowData[rowIndex][columnIndex];\n}\n@Override\npublic void\
  \ setValueAt(Object aValue, int rowIndex, int columnIndex) {\nrowData[rowIndex][columnIndex]\
  \ = aValue;\n}\n}\n清单 2-10.\n实现一个简单的表格模型\n```\n\n在`getColumnClass()`方法中，你需要指定列数据的类；`JTable`将利用此信息来恰当地显示列数据。例如，它会将数字列右对齐显示。如果你为某列指定了`Boolean`类型，`JTable`会在该列的每个单元格中使用`JCheckBox`来显示`Boolean`值。请注意，通过为`columnIndex`为\
  \ 0 的列在`isEditable()`方法中返回`false`，你已将 ID 列设置为不可编辑。在这个例子中，你再次硬编码了表格数据。不过，你可以从数据库、数据文件、网络或任何其他数据源读取数据。以下代码片段使用自定义模型创建了一个`JTable`：\n\
  \n```\n// 使用 SimpleTableModel 作为表格的模型\nJTable table = new JTable(new SimpleTableModel());\n\
  ```\n\n请注意，你的表格模型不允许添加和删除行/列。如果你需要这些扩展功能，最好让你的模型类继承自`DefaultTableModel`类，并自定义你想要改变的行为。\n\
  \n你可以通过调用`JTable`的`setAutoCreateRowSorter(true)`方法为其添加数据排序功能。点击列标题即可对该列数据进行排序。调用此方法后，`JTable`会在列标题中显示一个向上/向下的箭头，以指示该列是按升序还是降序排序。你还可以使用行过滤器，根据某些条件隐藏`JTable`中的行，如下所示：\n\
  \n```\n// 为表格设置行排序器\nTableRowSorter sorter = new TableRowSorter(table.getModel());\n\
  table.setRowSorter(sorter);\n// 为表格设置 ID 过滤器\nRowFilter IDFilter = new RowFilter\
  \ () {\n@Override\npublic boolean include(Entry entry) {\nSimpleTableModel model\
  \ = entry.getModel();\nint rowIndex = entry.getIdentifier().intValue();\nInteger\
  \ ID = (Integer) model.getValueAt(rowIndex, 0);\nif (ID.intValue() <= 100) {\nreturn\
  \ false; // 不显示 ID <= 100 的行\n}\nreturn true;\n}\n};\nsorter.setRowFilter(IDFilter);\n\
  ```\n\n这段代码为名为`table`的`JTable`设置了一个过滤器，使得 ID 小于或等于 100 的行不被显示。`RowFilter`是一个`abstract`类；你必须重写其`include()`方法来指定过滤条件。它还有一些静态方法，可以返回不同类型的`RowFilter`对象，你可以直接与`RowSorter`对象一起使用。以下是创建行过滤器的一些示例：\n\
  \n```\n// 创建一个过滤器，仅显示第二列（列索引为 1）中以\"John\"开头的行\nRowFilter nameFilter = RowFilter.regexFilter(\"\
  ^John*\", 1);\n// 创建一个过滤器，仅显示第三列（列索引为 2）中值为\"Female\"的行\nRowFilter genderFilter\
  \ = RowFilter.regexFilter(\"^Female$\", 2);\n// 创建一个过滤器，仅显示第 3、5、7 列的值以\"A\"开头的行\n\
  RowFilter anyFilter1 = RowFilter.regexFilter(\"^A*\", 3, 5, 7);\n// 创建一个过滤器，仅显示任意列的值以\"\
  A\"开头的行\nRowFilter anyFilter2 = RowFilter.regexFilter(\"^A*\");\n```\n\n你可以向`TableModel`添加一个`TableModelListener`，以监听表格模型发生的任何更改。\n\
  \n提示\n\n由于篇幅限制，本节无法描述`JTable`的众多功能。它还允许你设置自定义单元格渲染器来显示单元格中的值。例如，你可以在单元格中显示单选按钮供用户选择，而不是让他们编辑纯文本值。\n\
  \n\n\n## JTree\n\n`JTree` 用于以树状结构显示分层数据，如图 2-28 所示。你可以将 `JTree` 想象成倒置的真实树木。\n\n\
  ![A323071_2_En_2_Fig28_HTML.jpg](img/A323071_2_En_2_Fig28_HTML.jpg)\n\n图 2-28.\n\
  \n一个显示部门及其员工列表的 JTree\n\n`JTree` 中的每一项都称为一个**节点**。在图中，部门、销售部、John 等都是节点。节点进一步分为**分支节点**或**叶节点**。如果一个节点下面可以有其他节点（称为其子节点），则它被称为**分支节点**。如果一个节点没有子节点，则称为**叶节点**。部门、销售部和信息技术部是分支节点的例子，而\
  \ John、Elaine 和 Aarav 则是叶节点的例子。在现实世界的树中，总有一个特殊的分支称为**根**。类似地，`JTree` 也总有一个特殊的分支节点，称为**根节点**。你的\
  \ `JTree` 有一个名为“部门”的根节点。在 `JTree` 中，你可以通过使用其 `setRootVisible(boolean visibility)`\
  \ 方法来控制根节点的可见性。\n\n分支节点对于其子节点来说称为**父节点**。请注意，子节点也可以是分支节点。销售部、信息技术部和广告部是部门节点的子节点。销售部节点有两个子节点：John\
  \ 和 Elaine。John 和 Elaine 拥有相同的父节点，即销售部节点。\n\n处于同一层级的节点称为**兄弟节点**。换句话说，拥有相同父节点的节点称为兄弟节点。销售部、信息技术部和广告部是兄弟节点；John\
  \ 和 Elaine 是兄弟节点；Tejas 和 Aarav 是兄弟节点。在节点的语境中，**祖先**和**后代**这两个术语经常被使用。父节点的父节点，以此类推的所有节点都称为**祖先节点**。也就是说，从祖父节点开始向上的所有节点都是祖先节点。从孙子节点开始向下的所有节点都称为**后代节点**。例如，部门节点是\
  \ Elaine 节点的祖先节点，而 Elaine 节点是部门节点的后代节点。\n\n你已经学习了足够多与 `JTree` 相关的术语。是时候看看 `JTree`\
  \ 的实际应用了。与 `JTree` 相关的类位于 `javax.swing` 和 `javax.swing.tree` 包中。一个 `JTree` 由节点组成。`TreeNode`\
  \ 接口的实例代表一个节点。`TreeNode` 接口声明了一些方法，这些方法提供关于节点的基本信息，例如其节点类型（分支或叶）、其父节点、其子节点等。\n\n\
  `MutableTreeNode` 是一个扩展了 `TreeNode` 接口的接口。它声明了额外的方法，允许你通过插入/移除子节点或更改节点对象来修改节点。`DefaultMutableTreeNode`\
  \ 类是 `MutableTreeNode` 接口的一个实现。\n\n在开始创建节点之前，你需要理解节点是 Java 对象的一种可视化表示（通常是一行文本）。换句话说，节点包装了一个对象，并且通常显示该对象的一行文本表示。节点所代表的对象称为该节点的**用户对象**。因此，在构建节点之前，你必须拥有一个节点将要代表的对象。不用担心为了构建节点而创建一个新类。你可以直接使用\
  \ `String` 来构建节点。以下代码片段创建了一些可以在 `JTree` 中使用的节点：\n\n```\n// 创建一个部门节点\nDefaultMutableTreeNode\
  \ root = new DefaultMutableTreeNode(\"部门\");\n// 创建一个销售部节点\nDefaultMutableTreeNode\
  \ sales = new DefaultMutableTreeNode(\"销售部\");\n// 创建一个 John 节点\nDefaultMutableTreeNode\
  \ john = new DefaultMutableTreeNode(\"John\");\n// 创建一个客户节点，假设你有一个 Customer 类。\n\
  // 在这种情况下，该节点将包装一个 Customer 对象\nCustomer cust101 = new Customer(101, \"Joe\");\n\
  DefaultMutableTreeNode c101Node = new DefaultMutableTreeNode(cust101);\n// 如果你想获取节点包装的用户对象，可以使用\n\
  // DefaultMutableTreeNode 类的 getUserObject() 方法\nCustomer c101Back = (Customer)c101Node.getUserObject();\n\
  ```\n\n一旦你有了一个节点，就可以使用 `add()` 或 `insert()` 方法轻松地为其添加子节点。`add()` 方法将节点追加到末尾；`insert()`\
  \ 方法允许你指定新节点的位置。例如，要将 `Sales` 节点作为子节点添加到 `Departments` 根节点，你可以这样写：\n\n```\nroot.add(sales);\n\
  ```\n\n要将 `John` 作为子节点添加到 `sales`，你可以这样写：\n\n```\nsales.add(john);\n```\n\n一旦你准备好了节点，就可以轻松地将它们放入\
  \ `JTree` 中。你需要通过指定其根节点来创建一个 `JTree`。\n\n```\nJTree tree = new JTree(root);\n```\n\
  \n`JTree` 类的其他构造函数允许你以不同的方式创建 `JTree`。无参构造函数除非你正在学习 `JTree`，否则不太有用。它会创建一个已添加了一些节点的\
  \ `JTree`，如果你想试验 `JTree`，这可以省去你添加节点的麻烦。你也可以通过向构造函数传递一个 `Object` 数组或 `Object` 的 `Vector`\
  \ 来创建 `JTree`，这些对象将作为 `JTree` 根节点的子节点。在添加传入的对象作为其子节点之前，会先向新的 `JTree` 添加一个根节点。例如：\n\
  \n```\n// 创建一个 JTree。它会创建一个名为 Root 的默认根节点，\n// 并为 Root 添加两个子节点：\"One\" 和 \"Two\"\
  。\n// 默认情况下，Root 节点不显示。\nJTree tree = new JTree(new Object[]{\"One\", \"Two\"});\n\
  ```\n\n一旦你创建了 `JTree` 组件，就该将其显示在 Swing 容器中了。通常，你会将 `JTree` 添加到 `JScrollPane` 中，这样它就能拥有滚动功能。\n\
  \n```\nmyContainer.add(new JScrollPane(tree));\n```\n\n如何访问或遍历 `JTree` 节点？有两种方法可以访问\
  \ `JTree` 中的节点：使用行号和使用树路径。\n\n一个 `JTree` 由节点组成。`JTree` 如何显示节点？回想一下，节点是 `TreeNode`\
  \ 类的一个实例，它包装了任何类型的对象。因此，你可以说节点是对象的包装器。默认情况下，`JTree` 会调用节点对象的 `toString()` 方法来获取要显示的节点文本。如果你的节点包装的对象，其\
  \ `toString()` 方法没有返回有意义的字符串用于在 `JTree` 节点中显示，你可以通过创建自定义的 `JTree` 并重写其 `convertValueToText()`\
  \ 方法来为该节点提供自定义字符串。在示例中，你在节点内包装了一个 `String` 对象，而 `String` 对象的 `toString()` 方法返回字符串本身。假设你想为\
  \ `Customer` 对象创建一个节点。请确保重写 `Customer` 类的 `toString()` 方法，并返回一个有意义的字符串（例如客户名称和 ID）以在\
  \ `Customer` 节点中显示。\n\n\n\n从上到下查看`JTree`节点时，每个节点都显示在单独的水平行中。第一个节点（如果根节点可见，则为根节点）是行号零。第二个节点位于行号\
  \ 1，依此类推。在图 2-28 中，Departments、Sales、John、Elaine 和 Information Technology 的行号分别为\
  \ 0、1、2、3 和 4。请注意，仅当节点显示时才会为其分配行号。当节点的父节点折叠时，该节点可能不会显示。例如，Advertising 节点有一些子节点未显示，并且它们没有分配行号，因为它们的父节点\
  \ Advertising 处于折叠状态。`JTree`的`getRowCount()`方法返回可查看节点的数量。请注意，当您在`JTree`中展开和折叠节点时，可查看节点的数量会发生变化。\n\
  \n`TreePath`类的对象在`JTree`中唯一地表示一个节点。其结构类似于文件系统中用于表示文件的路径。文件路径通过指定从根文件夹开始的路径来唯一表示一个文件，例如/Departments/Sales/John\
  \ 表示一个名为 John 的文件，该文件位于 Sales 文件夹下，而 Sales 文件夹位于 Departments 文件夹下，Departments 文件夹位于根目录下。`TreePath`对象封装了相同类型的信息来表示`JTree`中的一个节点。它包含一个从根节点开始的有序节点数组。例如，如果需要为示例中的\
  \ John 节点构造一个`TreePath`对象，可以按如下方式操作：\n\n```\nObject[] path = new Object[] {root,\
  \ sales, john};\nTreePath johnNodePath = new TreePath(path);\n```\n\n`TreePath`类的`getPath()`方法返回`Object`数组，`getLastPathComponent()`方法返回数组的最后一个元素，即`TreePath`对象所表示路径指向的节点的引用。通常，在处理`JTree`时，您不会构造`TreePath`对象。相反，`TreePath`对象会在`JTree`事件中提供给您。如果您使用`JTree`，表示`TreePath`对象的数组对象中的每个元素都是`TreeNode`的实例。如果您使用默认的树模型，`TreePath`将由一个`DefaultMutableTreeNode`对象数组组成。拥有指向节点的`TreePath`后，您可以按如下方式获取该节点包装的对象：\n\
  \n```\n// 假设 path 是 TreePath 类的一个实例\n// 并且它表示一个节点\nDefaultMutableTreeNode node =\
  \ (DefaultMutableTreeNode)path.getLastPathComponent();\nObject myObject = node.getUserObject();\n\
  ```\n\n`JTree`提供了两个方法，名为`getRowForPath()`和`getPathForRow()`，用于在行号和`TreePath`之间进行转换。稍后学习`JTree`事件时，您将使用`TreePath`。\n\
  \n如果您不是为`JTree`的事件编写代码，您将不会拥有节点的`TreePath`（除非您存储了节点引用本身，但这并非必需）。在这种情况下，您始终可以从根节点开始，并沿着树向下导航。`JTree`的模型是`TreeModel`类的一个实例，它有一个`getRoot()`方法。一旦获得根节点的句柄，就可以使用`TreeNode`类的`children()`方法，该方法返回`TreeNode`所有子节点的枚举。以下代码片段定义了一个方法`navigateTree()`，如果您将根节点的引用传递给它，它将遍历所有树节点：\n\
  \n```\npublic void navigateTree(TreeNode node) {\nif (node.isLeaf()) {\nSystem.out.println(\"\
  Got a leaf node: \" + node);\nreturn;\n} else {\nSystem.out.println(\"Got a branch\
  \ node: \" + node);\nEnumeration e = node.children();\nwhile(e.hasMoreElements())\
  \ {\nTreeNode n = (TreeNode)e.nextElement();\nnavigateTree(n); // 递归方法调用\n}\n}\n\
  }\n```\n\n您可以通过单击来选择树节点。`JTree`使用选择模型来跟踪选中的节点。您需要与其选择模型交互以选择节点或获取有关选中节点的信息。选择模型是`TreeSelectionModel`接口的一个实例。`JTree`允许用户以三种不同的模式选择节点。它们由`TreeSelectionModel`接口中定义的三个常量表示：\n\
  \n*   `SINGLE_TREE_SELECTION`：允许用户一次只选择一个节点。\n*   `CONTIGUOUS_TREE_SELECTION`：允许用户选择任意数量的连续节点。\n\
  *   `DISCONTIGUOUS_TREE_SELECTION`：允许用户选择任意数量的节点，没有任何限制。\n\n以下代码片段演示了如何使用`JTree`选择模型的一些方法：\n\
  \n```\n// 获取 JTree 的选择模型\nTreeSelectionModel selectionModel = tree.getSelectionModel();\n\
  // 设置选择模式为不连续\nselectionModel.setSelectionMode(\nTreeSelectionModel.DISCONTIGUOUS_TREE_SELECTION);\n\
  // 获取选中的节点数量\nint selectedCount = selectionModel.getSelectionCount();\n// 获取所有选中节点的\
  \ TreePath\nTreePath[] selectedPaths = selectionModel.getSelectionPaths();\n```\n\
  \n您可以向`JTree`添加一个`TreeSelectionListener`，当节点被选中或取消选中时，该监听器将收到通知。以下代码片段演示了如何向`JTree`添加`TreeSelectionListener`：\n\
  \n```\n// 创建一个 JTree。Java 会添加一些节点\nJTree tree = new JTree();\n// 向 JTree 添加选择监听器\n\
  tree.addTreeSelectionListener((TreeSelectionEvent event) -> {\nTreeSelectionModel\
  \ selectionModel = tree.getSelectionModel();\nTreePath[] paths = event.getPaths();\n\
  for (TreePath path : paths) {\nObject node = path.getLastPathComponent();\nif (selectionModel.isPathSelected(path))\
  \ {\nSystem.out.println(\"Selected: \" + node);\n} else {\n// 节点被取消选中\nSystem.out.println(\"\
  DeSelected: \" + node);\n}\n}\n});\n```\n\n您可以通过单击加号或节点本身来展开节点。您可以通过单击减号或节点本身来折叠节点。当节点展开或折叠时，`JTree`会触发两个事件。它会依次触发一个树将展开事件和一个树展开事件。树将展开事件恰好在节点展开或折叠之前触发。如果您从此事件中抛出`ExpandVetoException`，则展开（或折叠）将被停止。否则，将触发树展开事件。以下代码片段演示了如何为这些事件编写代码：\n\
  \n```\n// 添加 TreeWillExpandListener\ntree.addTreeWillExpandListener(new TreeWillExpandListener()\
  \ {\n@Override\npublic void treeWillExpand(TreeExpansionEvent event) throws ExpandVetoException\
  \ {\nSystem.out.println(\"Will Expand: \" + event.getPath());\n}\n@Override\npublic\
  \ void treeWillCollapse(TreeExpansionEvent event) throws ExpandVetoException {\n\
  System.out.println(\"Will Collapse: \" + event.getPath());\n}\n});\n// 添加 TreeExpansionListener\n\
  tree.addTreeExpansionListener(new TreeExpansionListener() {\n@Override\npublic void\
  \ treeExpanded(TreeExpansionEvent event) {\nSystem.out.println(\"Expanded: \" +\
  \ event.getPath());\n}\n@Override\npublic void treeCollapsed(TreeExpansionEvent\
  \ event) {\nSystem.out.println(\"Collapsed: \" + event.getPath());\n}\n});\n```\n\
  \n提示\n\n`JTree`是一个功能强大且复杂的 Swing 组件。它允许您自定义其中的几乎所有内容。每个节点都显示在`JLabel`中。分支节点和叶节点显示的图标不同。默认图标取决于外观和感觉。您可以通过创建自己的树单元格渲染器来自定义默认图标。您还可以向`JTree`添加`TreeModelListener`，它将通知您其模型中的任何更改。您可以通过使用`setEditable(true)`方法使`JTree`可编辑。您可以通过双击来编辑节点的标签。\n\
  \n\n\n## JTabbedPane 与 JSplitPane\n\n有时，由于空间限制，无法在窗口中显示所有信息。你可以使用 `JTabbedPane`\
  \ 对窗口中的信息进行分组和分隔。图 2-29 展示了一个 `JFrame`，其中包含一个带有两个选项卡（标题分别为“常规信息”和“联系人”）的选项卡面板，用于显示某人的常规信息和联系信息。\n\
  \n![A323071_2_En_2_Fig29_HTML.jpg](img/A323071_2_En_2_Fig29_HTML.jpg)\n\n图 2-29.\n\
  \n一个带有两个选项卡的 JTabbedPane\n\n`JTabbedPane` 组件充当其他 Swing 组件的容器，以选项卡的形式排列它们。它可以显示带有标题、图标或两者兼有的选项卡。用户需要点击某个选项卡才能查看其内容。使用\
  \ `JTabbedPane` 的最大优势在于空间共享。在 `JTabbedPane` 中，一次只能看到一个选项卡的内容。用户可以在选项卡之间切换以查看其他选项卡的内容。\n\
  \n`JTabbedPane` 还允许你指定选项卡的显示位置。你可以将选项卡放置在顶部、底部、左侧或右侧。图 2-29 将选项卡显示在顶部。如果你有一个名为 `frame`\
  \ 的 `JFrame`，以下代码片段将生成图 2-29 所示的框架。该代码向由两个 `JPanel` 表示的两个选项卡各添加了一个 `JLabel`。\n\n\
  ```\nJPanel generalInfoPanel = new JPanel();\nJPanel contactInfoPanel = new JPanel();\n\
  JTabbedPane tabbedPane = new JTabbedPane();\ngeneralInfoPanel.add(new JLabel(\"\
  General info components go here...\"));\ncontactInfoPanel.add(new JLabel(\"Contact\
  \ info components go here...\"));\ntabbedPane.addTab(\"General Information\", generalInfoPanel);\n\
  tabbedPane.addTab(\"Contacts\", contactInfoPanel);\nframe.getContentPane().add(tabbedPane,\
  \ BorderLayout.CENTER);\n```\n\n`getTabCount()` 方法返回 `JTabbedPane` 中的选项卡数量。`JTabbedPane`\
  \ 中的每个选项卡都有一个索引。第一个选项卡的索引为 0，第二个选项卡的索引为 1，依此类推。你可以使用索引获取表示某个选项卡的组件。\n\n```\n// 获取联系人选项卡的组件引用\n\
  JPanel contactsPanel = tabbedPane.getTabComponentAt(1);\n```\n\n`JSplitPane` 是一个分割器，可用于在两个组件之间分割空间。分割条可以水平或垂直显示。当可用空间小于显示两个组件所需的空间时，用户可以上下或左右移动分割条，从而使一个组件获得比另一个更多的空间。如果有足够的空间，两个组件都可以完全显示。\n\
  \n`JSplitPane` 类提供了许多构造方法。你可以使用其默认构造方法创建它，然后使用 `setXxxComponent(Component c)` 方法添加两个组件，其中\
  \ `Xxx` 可以是 `Top`、`Bottom`、`Left` 或 `Right`。它还允许你指定更改分割条位置时组件的重绘方式。可以是连续重绘或非连续重绘。如果是连续重绘，则在移动分割条时组件会实时重绘。如果是非连续重绘，则在你停止移动分割条时组件才会重绘。\n\
  \n以下代码片段展示了将两个 `JPanel` 实例添加到一个 `JSplitPane` 中，而该 `JSplitPane` 又被添加到名为 `frame` 的\
  \ `JFrame` 的内容窗格中。图 2-30 显示了生成的 `JFrame`。\n\n![A323071_2_En_2_Fig30_HTML.jpg](img/A323071_2_En_2_Fig30_HTML.jpg)\n\
  \n图 2-30.\n\n使用 JSplitPane 在两个组件之间分割空间\n\n```\n// 创建两个 JPanel 和一个 JSplitPane\nJPanel\
  \ generalInfoPanel = new JPanel();\nJPanel contactInfoPanel = new JPanel();\nJSplitPane\
  \ splitPane = new JSplitPane();\ngeneralInfoPanel.add(new JLabel(\"General info\
  \ components go here...\"));\ncontactInfoPanel.add(new JLabel(\"Contact info components\
  \ go here...\"));\n// 将两个 JPanel 添加到 JSplitPane，并将 JSplitPane\n// 添加到 JFrame 的内容窗格\n\
  splitPane.setLeftComponent(generalInfoPanel);\nsplitPane.setRightComponent(contactInfoPanel);\n\
  frame.getContentPane().add(splitPane, BorderLayout.CENTER);\n```\n\n## 自定义对话框\n\n\
  `JDialog` 是一个 Swing 顶级容器。它用作临时顶级容器（或弹出窗口），以辅助主窗口的工作并吸引用户的注意。这里我宽泛地使用“窗口”一词来指代 Swing\
  \ 顶级容器。假设你有一个 `JFrame`，需要在其中显示某人的信息。但 `JFrame` 中可能没有足够的空间来显示该人的所有详细信息。在这种情况下，你只能在\
  \ `JFrame` 上显示基本的个人最低限度信息，并提供一个标有“人员详情”的按钮。当用户点击此按钮时，你可以打开一个 `JDialog`，显示该人的详细信息。这是使用\
  \ `JDialog` 向用户显示信息的一个示例。使用对话框窗口的另一个示例是让用户从文件系统中选择一个文件。你可以向用户显示一个对话框，让他浏览文件系统并选择一个文件。你还可以在其他场合使用\
  \ `JDialog`，如下所列：\n\n*   当你需要确认用户的操作时：这称为**确认对话框**。例如，当用户在窗口中选择一条人员记录并尝试删除该记录时，你会显示一条确认消息：“您确定要删除此人吗？”对话框会显示两个按钮，分别标有“是”和“否”，以表示用户的选择。\n\
  *   当你需要用户输入一些信息时：这称为**输入对话框**。例如，当焦点移动到日期字段时，你可能会在 `JDialog` 中显示一个日历，并希望用户选择一个日期。输入对话框可以简单到输入/选择一个值，也可以复杂到输入多个值，例如一个人的详细信息。\n\
  *   当你需要向用户显示某些消息时：这称为**消息对话框**。例如，当用户将某些信息保存到数据库时，你希望向用户显示一条消息，指示数据库事务的状态。\n\n\
  创建对话框窗口非常简单：只需创建一个继承自 `JDialog` 类的新类即可。你可以像向 `JFrame` 添加组件一样，向自定义的 `JDialog` 添加任意数量的\
  \ Swing 组件。`JDialog` 使得向其中添加组件稍微容易一些。你无需获取其内容窗格的引用来设置布局管理器和添加组件。相反，你可以直接在 `JDialog`\
  \ 本身上调用 `setLayout()` 和 `add()` 方法。这些方法会将调用路由到其内容窗格。默认情况下，`JDialog` 使用 `BorderLayout`\
  \ 作为布局管理器。\n\n清单 2-11 列出了一个自定义的 `JDialog`，它在 `JLabel` 中显示当前日期和时间，并包含一个“确定” `JButton`。当用户点击该\
  \ `JButton` 时，`JDialog` 会关闭。\n\n\n\n```\n// DateTimeDialog.java\npackage com.jdojo.swing.component;\n\
  import java.awt.BorderLayout;\nimport java.time.LocalDateTime;\nimport java.time.format.DateTimeFormatter;\n\
  import javax.swing.JButton;\nimport javax.swing.JDialog;\nimport javax.swing.JLabel;\n\
  public class DateTimeDialog extends JDialog {\nJLabel dateTimeLabel = new JLabel(\"\
  Datetime placeholder\");\nJButton okButton = new JButton(\"OK\");\npublic DateTimeDialog()\
  \ {\ninitFrame();\n}\nprivate void initFrame() {\n// 关闭 JDialog 时释放所有资源\nthis.setDefaultCloseOperation(JDialog.DISPOSE_ON_CLOSE);\n\
  this.setTitle(\"当前日期和时间\");\nthis.setModal(true);\nString currentDateTimeString\
  \ = getCurrentDateTimeString();\ndateTimeLabel.setText(currentDateTimeString);\n\
  // 无需将组件添加到内容窗格。\n// 可以直接将它们添加到 JDialog 中。\nthis.add(dateTimeLabel, BorderLayout.NORTH);\n\
  this.add(okButton, BorderLayout.SOUTH);\n// 为“确定”按钮添加动作监听器\nokButton.addActionListener(e\
  \ -> DateTimeDialog.this.dispose());\n}\nprivate String getCurrentDateTimeString()\
  \ {\nLocalDateTime ldt = LocalDateTime.now();\nDateTimeFormatter formatter\n= DateTimeFormatter.ofPattern(\"\
  EEEE MMMM dd, yyyy hh:mm:ss a\");\nString dateString = ldt.format(formatter);\n\
  return dateString;\n}\n}\n清单 2-11.\n一个显示当前日期和时间的自定义 JDialog\n```\n\n`DateTimeDialog`\
  \ 类是一个自定义 `JDialog` 的简单示例。要在应用程序中使用它，你需要创建此 `JDialog` 的实例，调用 `pack()` 方法，并将其设置为可见，如下所示：\n\
  \n```\nDateTimeDialog dateTimeDialog = new DateTimeDialog();\ndateTimeDialog.pack();\n\
  dateTimeDialog.setVisible(true);\n```\n\n如果你从另一个顶级容器（例如 `JFrame` 或另一个 `JDialog`）中显示一个\
  \ `JDialog`，你可能希望将其显示在该顶级容器的中央。有时你可能希望将其显示在屏幕中央。你可以通过使用 `setLocationRelativeTo(Component\
  \ c)` 方法将 `JDialog` 放置在顶级容器或屏幕的中央。如果向其传递 `null` 作为参数，则 `JDialog` 将在屏幕上居中显示。否则，它将居中显示在你作为参数传递的组件内。\n\
  \n```\n// 在框架内居中显示 JDialog，假设 myFrame 已存在\ndateTimeDialog.setLocationRelativeTo(myFrame);\n\
  // 将 JDialog 放置在屏幕中央\ndateTimeDialog.setLocationRelativeTo(null);\n```\n\n你可以创建一个带有所有者的\
  \ `JDialog`，该所有者可以是另一个 `JDialog`、`JFrame` 或 `JWindow`。通过为 `JDialog` 指定所有者，你正在创建一个父子关系。当\
  \ `JDialog` 的所有者（或父级）关闭时，该 `JDialog` 也会关闭。当所有者最小化或最大化时，`JDialog` 也会最小化或最大化。带有所有者的\
  \ `JDialog` 始终显示在其所有者之上。你可以在其构造函数中指定 `JDialog` 的所有者。当你使用无参构造函数创建 `JDialog` 时，会创建一个隐藏的\
  \ `Frame` 作为其所有者。请注意，这是一个 `java.awt.Frame`，而不是 `javax.swing.JFrame`。`JFrame` 类继承自\
  \ `Frame` 类。你也可以创建一个所有者是 `null` 的 `JDialog`，在这种情况下，它没有所有者。\n\n默认情况下，`JDialog` 是可调整大小的。如果你不希望用户调整\
  \ `JDialog` 的大小，可以通过调用其 `setResizable(false)` 方法来实现。\n\n根据 `JDialog` 的焦点行为，它可以分为：\n\
  \n*   模态（Modal）\n*   非模态（Modeless）\n\n当显示模态 `JDialog` 时，它会阻止应用程序中其他已显示的窗口。换句话说，如果显示了一个模态\
  \ `JDialog`，你必须先关闭它，然后才能与该应用程序中的任何其他窗口进行交互。要使 `JDialog` 成为模态，可以使用其 `setModal(true)`\
  \ 方法。`JDialog` 类的一些构造函数也允许你指定 `JDialog` 应该是模态还是非模态。\n\n非模态 `JDialog` 不会阻止应用程序中任何其他已显示的窗口。你可以在其他窗口和非模态\
  \ `JDialog` 的实例之间切换焦点。默认情况下，`JDialog` 是非模态的。\n\n你还可以为模态 `JDialog` 设置模态范围。一个 `JDialog`\
  \ 可以具有四种模态类型之一。它们由 `java.awt.Dialog.ModalityType` 枚举中的四个常量定义：\n\n*   `MODELESS`\n\
  *   `DOCUMENT_MODAL`\n*   `APPLICATION_MODAL`\n*   `TOOLKIT_MODAL`\n\n你可以在其构造函数中或通过使用其\
  \ `setModalityType()` 方法来指定 `JDialog` 的模态类型。\n\n`MODELESS` 模态类型意味着 `JDialog` 不会阻止任何窗口。\n\
  \n`DOCUMENT_MODAL` 模态类型意味着 `JDialog` 将阻止其父级层次结构（其所有者、所有者的所有者等）中的任何窗口。它不会阻止其子级层次结构（其子级、子级的子级等）中的任何窗口。假设你显示了三个窗口：`frame`\
  \ 是一个 `JFrame`；`dialog1` 是一个所有者是 `frame` 的 `JDialog`；`dialog2` 是另一个所有者是 `dialog1`\
  \ 的 `JDialog`。如果你为 `dialog1` 指定了 `DOCUMENT_MODAL` 模态类型，你可以与 `dialog2` 交互，但不能与 `frame`\
  \ 交互。如果 `dialog2` 的模态类型是 `MODELESS`，你可以同时与 `dialog1` 和 `dialog2` 交互，因为 `dialog2`\
  \ 不会阻止任何窗口。\n\n`APPLICATION_MODAL` 模态类型意味着 `JDialog` 将阻止该 Java 应用程序中的任何窗口，但其子级层次结构中的窗口除外。\n\
  \n`TOOLKIT_MODAL` 模态类型意味着 `JDialog` 将阻止从同一工具包运行的所有窗口，但其子级层次结构中的窗口除外。在 Java 应用程序中，它与\
  \ `APPLICATION_MODAL` 相同。当你在使用 Java Web Start 启动的小程序或应用程序中使用它时，它非常有用。你可以将浏览器视为一个应用程序，将多个小程序视为顶级窗口。所有小程序都由同一个工具包加载。如果你在一个小程序中显示一个模态类型为\
  \ `TOOLKIT_MODAL` 的 `JDialog`，它将阻止对同一浏览器中任何其他小程序的输入。你必须为小程序授予“`toolkitModality`”\
  \ `AWTPermission` 才能使用 `TOOLKIT_MODAL` 模态。对于使用 Java Web Start 启动的多个应用程序，其行为相同。\n\
  \n清单 2-12 包含一个用于试验 `JDialog` 模态类型的程序。使用 `dialog1Modality` 和 `dialog2Modality` 变量的不同值，观察它如何影响对其他窗口的输入阻止。\n\
  \n```\n// JDialogModalityTest.java\npackage com.jdojo.swing.component;\nimport javax.swing.JButton;\n\
  import javax.swing.JDialog;\nimport javax.swing.JFrame;\nimport java.awt.Dialog.ModalityType;\n\
  public class JDialogModalityTest {\npublic static void main(String[] args) {\nJFrame\
  \ frame = new JFrame(\"我的 JFrame\");\nframe.setBounds(0, 0, 400, 400);\nframe.setVisible(true);\n\
  final ModalityType dialog1Modality = ModalityType.DOCUMENT_MODAL;\nfinal ModalityType\
  \ dialog2Modality = ModalityType.DOCUMENT_MODAL;\nfinal JDialog dailog1 = new JDialog(frame,\
  \ \"JDialog 1\");\nJButton openBtn = new JButton(\"打开 JDialog 2\");\nopenBtn.addActionListener(e\
  \ -> {\nJDialog d2 = new JDialog(dailog1, \"JDialog 2\");\nd2.setBounds(200, 200,\
  \ 200, 200);\nd2.setModalityType(dialog2Modality);\nd2.setVisible(true);\n});\n\
  dailog1.add(openBtn);\ndailog1.setBounds(20, 20, 200, 200);\ndailog1.setModalityType(dialog1Modality);\n\
  dailog1.setVisible(true);\n}\n}\n清单 2-12.\n试验 JDialog 的模态类型\n```\n\n`JDialog` 在\
  \ Swing 应用程序中经常使用，例如，用于向用户显示错误消息。每次需要对话框窗口时都创建一个自定义 `JDialog` 非常耗时。Swing 设计者意识到了这一点。他们为我们提供了\
  \ `JOptionPane` 类，使得在使用常用的 `JDialog` 类型时，我们的生活更加轻松。我将在下一节讨论 `JOptionPane`。\n\n\n\
  \n## 标准对话框\n\n`JOptionPane` 类使您能够轻松创建和显示标准模态对话框。它包含许多静态方法，用于创建不同类型的 `JDialog`，为其填充详细信息，并将其作为模态\
  \ `JDialog` 显示。当 `JDialog` 关闭时，该方法会返回一个值，以指示用户在 `JDialog` 上的操作。请注意，`JOptionPane`\
  \ 类继承自 `JComponent` 类。`JOptionPane` 类与 `JDialog` 类没有任何继承关系，只是被用作创建标准对话框的工厂。它还包含一些返回\
  \ `JDialog` 对象的方法，您可以自定义这些对象并在应用程序中使用。您可以显示以下四种标准对话框：\n\n*   消息对话框\n*   确认对话框\n\
  *   输入对话框\n*   选项对话框\n\n`JOptionPane` 类用于显示标准 `JDialog` 的静态方法名称类似于 `showXxxDialog()`。其中的\
  \ `Xxx` 可以替换为 `Message`、`Confirm`、`Input` 和 `Option`。您还可以使用这些方法的另一个版本 `showInternalXxxDialog()`，它使用\
  \ `JInternalFrame` 而不是 `JDialog` 来显示对话框详情。所有四种类型的标准对话框都接受不同类型的参数并返回不同类型的值。表 2-17\
  \ 列出了这些方法的参数及其说明。\n\n表 2-17.\n\n与 JOptionPane 一起使用的标准参数类型及其值列表\n\n| 参数名称 | 参数类型\
  \ | 说明 |\n| --- | --- | --- |\n| `parentComponent` | `Component` | `JDialog` 将居中显示在指定的父组件上。包含此组件的顶层容器将成为所显示\
  \ `JDialog` 的所有者。如果为 `null`，则 `JDialog` 将在屏幕上居中显示。 |\n| `message` | `Object` | 通常，它是一个需要作为消息显示在对话框中的字符串。但是，您可以传递任何对象。如果传递一个\
  \ Swing 组件，它将直接显示在对话框中。如果传递一个 `Icon`，它将显示在 `JLabel` 中。如果传递任何其他对象，则会调用该对象的 `toString()`\
  \ 方法，并显示返回的字符串。您还可以传递一个对象数组（通常是字符串数组），数组中的每个元素将垂直依次显示。 |\n| `messageType` | `Int`\
  \ | 表示您想要显示的消息类型。根据消息类型，对话框中会显示一个合适的图标。可用的消息类型由 `JOptionPane` 类中的以下常量定义：`ERROR_MESSAGE`、`INFORMATION_MESSAGE`、`WARNING_MESSAGE`、`QUESTION_MESSAGE`、`PLAIN_MESSAGE`。`PLAIN_MESSAGE`\
  \ 类型不显示任何图标。另一个 `Icon` 类型的参数允许您指定要在对话框中显示的自定义图标。 |\n| `optionType` | `Int` | 表示需要在对话框中显示的按钮。以下是\
  \ `JOptionPane` 类中定义的常量列表，您可以使用它们来获取对话框中的标准按钮：`DEFAULT_OPTION`、`YES_NO_OPTION`、`YES_NO_CANCEL_OPTION`、`OK_CANCEL_OPTION`。`DEFAULT_OPTION`\
  \ 显示一个“确定”按钮。其他选项如其名称所示，显示一组按钮。您可以通过向 `showOptionDialog()` 方法提供 `options` 参数来自定义按钮的数量及其文本。\
  \ |\n| `options` | `Object[]` | 此参数允许您自定义对话框中显示的按钮集。如果您在数组中传递一个 `Component` 对象，该组件将显示在按钮行中。如果您指定一个\
  \ `Icon` 对象，该图标将显示在一个 `JButton` 中。对于您传递的任何其他类型的对象，将显示一个 `JButton`，并且该 `JButton`\
  \ 的文本是该对象 `toString()` 方法返回的字符串。通常，您会传递一个字符串数组作为此参数，以在对话框中显示一组自定义按钮。 |\n| `title`\
  \ | `String` | 显示为对话框标题的文本。如果您不传递此参数，则会提供一个默认标题。 |\n| `initialValue` | `Object`\
  \ | 此参数用于输入对话框。它表示输入对话框中显示的初始值。 |\n\n通常，当用户关闭对话框时，您需要检查用户是使用哪个按钮关闭对话框的。不过，有一个例外情况，即当对话框只有一个按钮（例如“确定”按钮）时。在这种情况下，您用于显示对话框的方法要么不返回值，要么您直接忽略返回的值。以下是可用于与返回值进行相等性检查的常量列表：\n\
  \n*   `OK_OPTION`\n*   `YES_OPTION`\n*   `NO_OPTION`\n*   `CANCEL_OPTION`\n*   `CLOSED_OPTION`\n\
  \n`CLOSED_OPTION` 表示用户通过标题栏上的关闭（`X`）菜单按钮，或通过其他方式（例如在 Windows 平台上按键盘上的 Ctrl+F4 键）关闭了对话框。其他常量表示对话框上的常规按钮操作；例如，`OK_OPTION`\
  \ 表示用户单击了对话框上的“确定”按钮以将其关闭。\n\n\n\n`JOptionPane` 还允许你自定义其显示的按钮标签。你也不局限于使用标准按钮集。也就是说，你可以在对话框中显示任意数量的按钮。在这种情况下，用于显示对话框的\
  \ `JOptionPane` 方法会为第一次点击按钮返回 0，第二次点击返回 1，第三次点击返回 2，以此类推。稍后讨论 `JOptionPane` 类的 `showOptionDialog()`\
  \ 方法时，你将看到一个此类示例。\n\n你可以通过使用 `JOptionPane` 类的 `showMessageDialog()` 静态方法之一来显示一个消息对话框。消息对话框总是向用户显示某种信息，并带有一个按钮，通常为“确定”按钮。该方法不返回任何值，因为用户所能做的只是点击“确定”按钮来关闭对话框。`showMessageDialog()`\
  \ 方法的签名如下所示：\n\n*   `showMessageDialog(Component parentComponent, Object message)`\n\
  *   `showMessageDialog(Component parentComponent, Object message, String title,\
  \ int messageType)`\n*   `showMessageDialog(Component parentComponent, Object message,\
  \ String title, int messageType, Icon icon)`\n\n以下代码片段显示了一个消息对话框，如图 2-31 所示。\n\n\
  ![A323071_2_En_2_Fig31_HTML.jpg](img/A323071_2_En_2_Fig31_HTML.jpg)\n\n图 2-31.\n\
  \n使用 `JOptionPane.showMessageDialog()` 方法的信息消息对话框\n\n```\n// 显示一个信息消息对话框\nJOptionPane.showMessageDialog(null,\
  \ \"JOptionPane is cool!\", \"FYI\",\nJOptionPane.INFORMATION_MESSAGE);\n```\n\n\
  你可以通过使用 `showConfirmDialog()` 方法来显示一个确认对话框。使用此方法时，你需要了解用户的响应，这由该方法的返回值指示。以下代码片段显示了一个确认对话框，如图\
  \ 2-32 所示，并处理了用户的响应：\n\n![A323071_2_En_2_Fig32_HTML.jpg](img/A323071_2_En_2_Fig32_HTML.jpg)\n\
  \n图 2-32.\n\n使用 `JOptionPane.showConfirmDialog()` 方法的确认对话框\n\n```\n// 显示一个确认对话框\n\
  int response = JOptionPane.showConfirmDialog(null,\n\"Are you sure you want to save\
  \ the changes?\",\n\"Confirm Save Changes\",\nJOptionPane.YES_NO_CANCEL_OPTION,\n\
  JOptionPane.QUESTION_MESSAGE);\nswitch (response) {\ncase JOptionPane.YES_OPTION:\n\
  System.out.println(\"You chose yes\");\nbreak;\ncase JOptionPane.NO_OPTION:\nSystem.out.println(\"\
  You chose no\");\nbreak;\ncase JOptionPane.CANCEL_OPTION:\nSystem.out.println(\"\
  You chose cancel\");\nbreak;\ncase JOptionPane.CLOSED_OPTION:\nSystem.out.println(\"\
  You closed the dialog box.\");\nbreak;\ndefault:\nSystem.out.println(\"I do not\
  \ know what you did \");\n}\n```\n\n你可以使用 `showInputDialog()` 方法来请求用户输入。你可以为用户输入指定一个初始值。如果你希望用户从列表中选择一个值，可以传递一个包含该列表的对象数组。UI\
  \ 会在合适的组件（如 `JComboBox` 或 `JList`）中显示该列表。以下代码片段显示了一个输入对话框，如图 2-33 所示。\n\n```\n//\
  \ 请求用户输入一些关于 JOptionPane 的文本\nString response = JOptionPane.showInputDialog(\"Please\
  \ enter your opinion about input dialog.\");\nif (response == null) {\nSystem.out.println(\"\
  You have cancelled the input dialog.\");\n} else {\nSystem.out.println(\"You entered:\
  \ \" + response);\n}\n```\n\n你使用的 `showInputDialog()` 方法版本返回一个 `String`，即用户在输入字段中输入的文本。如果用户取消了输入对话框，则返回\
  \ `null`。\n\n![A323071_2_En_2_Fig33_HTML.jpg](img/A323071_2_En_2_Fig33_HTML.jpg)\n\
  \n图 2-33.\n\n一个简单的输入对话框\n\n以下代码片段显示了一个带有选项列表的输入对话框。用户可以从列表中选择一个选项。该对话框如图 2-34 所示。此版本的\
  \ `showInputDialog()` 方法返回一个对象，而不是字符串。\n\n![A323071_2_En_2_Fig34_HTML.jpg](img/A323071_2_En_2_Fig34_HTML.jpg)\n\
  \n图 2-34.\n\n一个带有选项列表的输入对话框\n\n```\n// 显示一个输入对话框，向用户展示三个选项：\"Cool!\", \"Sucks\"\
  , \"Don't know\"。\n// 默认选中的值是 \"Don't know\"。\nJComponent parentComponent = null;\n\
  Object message = \"Please select your opinion about JOptionPane\";\nString title\
  \ = \"JOptionPane Input Dialog\";\nint messageType = JOptionPane.INFORMATION_MESSAGE;\n\
  Icon icon = null;\nObject[] selectionValues = new String[] {\"Cool!\", \"Sucks\"\
  , \"Don't know\"};\nObject initialSelectionValue = selectionValues[2];\nObject response\
  \ = JOptionPane.showInputDialog(parentComponent, message,                  title,\
  \ messageType, icon, selectionValues, initialSelectionValue);\nif (response == null)\
  \ {\nSystem.out.println(\"You have cancelled the input dialog.\");\n} else {\nSystem.out.println(\"\
  You entered: \" + response);\n}\n```\n\n最后，你可以使用 `showOptionDialog()` 方法来自定义选项按钮，该方法声明如下：\n\
  \n```\nint showOptionDialog(Component parentComponent, Object message, String title,\
  \ int optionType,\nint messageType, Icon icon, Object[] options, Object initialValue)\n\
  ```\n\n`options` 参数指定了用户的选项。如果你在 `options` 参数中传递组件，这些组件将作为选项显示。如果你传递任何其他对象（如字符串），则会为\
  \ `options` 数组中的每个元素显示一个按钮。\n\n以下代码片段展示了如何在对话框中显示自定义按钮。它询问用户对 `JOptionPane` 的看法。生成的对话框如图\
  \ 2-35 所示。\n\n![A323071_2_En_2_Fig35_HTML.jpg](img/A323071_2_En_2_Fig35_HTML.jpg)\n\
  \n图 2-35.\n\n使用 `JOptionPane.showOptionDialog()` 方法自定义选项按钮\n\n```\nJComponent parentComponent\
  \ = null;\nObject message = \"How is JOptionPane?\";\nString title = \"JOptionPane\
  \ Option Dialog\";\nint messageType = JOptionPane.INFORMATION_MESSAGE;\nIcon icon\
  \ = null;\nObject[] options = new String[] {\"Cool!\", \"Sucks\", \"Don't know\"\
  \ };\nObject initialOption = options[2];\nint response = JOptionPane.showOptionDialog(null,\
  \ message, title,\nJOptionPane.DEFAULT_OPTION,\nJOptionPane.QUESTION_MESSAGE,\n\
  icon, options, initialOption);\nswitch(response) {\ncase 0:\ncase 1:\ncase 2:\n\
  System.out.println(\"You selected:\" + options[response]);\nbreak;\ncase JOptionPane.CLOSED_OPTION:\n\
  System.out.println(\"You closed the dialog box.\");\nbreak;\ndefault:\nSystem.out.println(\"\
  I don't know what you did.\");\n}\n```\n\n默认情况下，本节中显示的所有对话框都是不可调整大小的。让我们自定义它们，使其可调整大小。你可以通过使用\
  \ `JOptionPane` 的 `createDialog()` 方法并执行一系列步骤，来自定义由 `JOptionPane` 静态方法显示的对话框。\n\n\
  *   创建一个 `JOptionPane` 对象。\n*   （可选）使用其方法自定义 `JOptionPane` 的属性。\n*   使用 `createDialog()`\
  \ 方法获取对话框的引用。\n*   自定义对话框。\n*   使用其 `setVisible(true)` 方法显示对话框。\n\n以下代码片段显示了自定义的可调整大小对话框，如图\
  \ 2-36 所示。\n\n![A323071_2_En_2_Fig36_HTML.jpg](img/A323071_2_En_2_Fig36_HTML.jpg)\n\
  \n图 2-36.\n\n使用 `JOptionPane.createDialog()` 方法的自定义对话框\n\n```\n// 使用 JOptionPane\
  \ 显示一个自定义的可调整大小对话框\nJOptionPane pane = new JOptionPane(\"JOptionPane is cool!\"\
  , JOptionPane.INFORMATION_MESSAGE);\nString dialogTitle = \"Resizable Custom Dialog\
  \ Using JOptionPane\";\nJDialog dialog = pane.createDialog(dialogTitle);\ndialog.setResizable(true);\n\
  dialog.setVisible(true);\n```\n\n\n\n## 文件选择器与颜色选择器\n\nSwing 内置了两个 `JDialog`，可让您更轻松地从文件系统中选择文件/目录，或以图形方式选择颜色。`JFileChooser`\
  \ 允许用户从文件系统中选择文件。与您在 `JOptionPane` 中看到的静态方法不同，它提供了非静态方法，这些方法会在 `JDialog` 中创建并显示文件选择器组件。\n\
  \n`JColorChooser` 是一个 Swing 组件，可让您在 `JDialog` 中以图形方式选择颜色。与您在 `JOptionPane` 中看到的一样，它提供了一个静态方法，用于在\
  \ `JDialog` 中创建并显示颜色选择器组件。\n\n提示\n\n`JFileChooser` 类提供了非静态方法来创建和显示 `JDialog`，而 `JColorChooser`\
  \ 类则为此提供了静态方法。使用静态方法或非静态方法的区别在于：非静态方法允许您自定义 `JDialog`，而静态方法只能通过其参数来自定义 `JDialog`。这意味着您可以自定义由\
  \ `JFileChooser` 显示的 `JDialog`，但无法自定义 `JColorChooser`。另一个区别是，您必须创建 `JFileChooser`\
  \ 类的对象才能使用它。建议重复使用同一个 `JFileChooser` 对象，因为它会记住上次访问的目录，因此当您重复使用时，它会默认导航到上次访问的目录。\n\
  \n### JFileChooser\n\n以下是在 `JDialog` 中显示文件选择器所需执行的步骤。\n\n*   创建 `JFileChooser` 类的对象。\n\
  *   （可选）使用其方法自定义属性。您可以自定义的属性包括：是否允许用户仅选择文件、仅选择目录或两者均可；是否允许用户选择多个文件；应用文件筛选条件以根据您的标准显示文件等。\n\
  *   使用三个非静态方法之一——`showOpenDialog()`、`showSaveDialog()` 或 `showDialog()`——在 `JDialog`\
  \ 中显示它。\n*   检查上一步方法调用的返回值，该值为 `int` 类型。如果返回 `JFileChooser.APPROVE_OPTION`，则表示用户已做出选择。其他两个可能的返回值是\
  \ `JFileChooser.CANCEL_OPTION` 和 `JFileChooser.ERROR_OPTION`，分别表示用户取消了对话框或发生了某种错误。要获取所选文件，请调用\
  \ `getSelectedFile()` 或 `getSelectedFiles()` 方法，它们分别返回一个 `File` 对象和一个 `File` 数组。请注意，`JFileChooser`\
  \ 组件仅允许您从文件系统中选择文件。它不会保存或读取文件。您可以对返回的文件引用进行任何操作。\n*   您可以重复使用文件选择器对象。它会记住上次访问的文件夹。\n\
  \n默认情况下，`JFileChooser` 从用户的默认目录开始显示文件。您可以在其构造函数中或使用其 `setCurrentDirectory()` 方法指定初始目录。\n\
  \n```\n// 使用默认初始目录创建文件选择器\nJFileChooser fileChooser = new JFileChooser();\n// 使用初始目录\
  \ C:\\java9 创建文件选择器。\n// 您可以根据操作系统的语法指定目录路径。\n// C:\\java9 使用的是 Windows 文件路径语法。\n\
  JFileChooser fileChooser = new JFileChooser(\"C:\\\\java9\");\n```\n\n默认情况下，文件选择器只允许选择文件。让我们对其进行自定义，以便您可以选择文件或目录。它还应该允许多重选择。以下代码片段实现了此自定义：\n\
  \n```\n// 允许用户选择文件和目录\nfileChooser.setFileSelectionMode(JFileChooser.FILES_AND_DIRECTORIES);\n\
  // 允许多重选择\nfileChooser.setMultiSelectionEnabled(true);\n```\n\n让我们显示一个打开文件选择器对话框，并检查用户是否选择了文件。如果用户做出了选择，则将文件路径打印到标准输出。以下代码片段显示了图\
  \ 2-37 中所示的对话框。\n\n![A323071_2_En_2_Fig37_HTML.jpg](img/A323071_2_En_2_Fig37_HTML.jpg)\n\
  \n图 2-37.\n\n使用 JFileChooser 的打开文件选择器对话框\n\n```\n// 显示一个打开文件选择器\nint returnValue\
  \ = fileChooser.showOpenDialog(null);\nif(returnValue == JFileChooser.APPROVE_OPTION)\
  \ {\nFile selectedFile = fileChooser.getSelectedFile();\nSystem.out.println(\"您选择了:\
  \ \" + selectedFile);\n}\n```\n\n`JFileChooser` 类的所有三个方法都接受一个 `Component` 参数。它用作所显示\
  \ `JDialog` 的所有者，并用于将对话框居中。传递 `null` 作为其父组件，可将其在屏幕上居中。\n\n请注意，在图 2-37 中，有两个按钮。一个标记为“打开”，另一个标记为“取消”。“打开”按钮称为批准按钮。对话框的标题是“打开”。当您使用\
  \ `JFileChooser` 的 `showSaveDialog()` 方法时，您会得到相同的对话框，只是按钮的文本“打开”和标题被替换为文本“保存”。您可以在显示之前自定义对话框标题和批准按钮文本，如下所示：\n\
  \n```\n// 更改对话框的标题\nfileChooser.setDialogTitle(\"打开一个图片文件\");\n// 更改按钮的文本\nfileChooser.setApproveButtonText(\"\
  打开文件\");\n```\n\n第三个方法 `showDialog()` 允许您指定批准按钮文本和对话框标题，如下所示：\n\n\n\n```\n// 打开一个文件选择器，标题和确认按钮文本均为\"\
  Attach\"\nint returnValue = fileChooser.showDialog(null, \"Attach\");\nif (returnValue\
  \ == JFileChooser.APPROVE_OPTION) {\nFile selectedFile = fileChooser.getSelectedFile();\n\
  System.out.println(\"正在附加文件：\" + selectedFile);\n}\n```\n\n请注意，更改确认按钮的文本并不会改变方法的返回值。你仍需检查其是否返回了\
  \ `JFileChooser.APPROVE_OPTION`，以便继续获取所选文件。\n\n提示\n\n当你使用 `showOpenDialog()` 和 `showSaveDialog()`\
  \ 方法时，确认按钮的默认文本取决于外观和风格。在 Windows 系统上，它们分别显示为“打开”和“保存”。\n\n`JFileChooser` 允许你设置文件过滤器。文件过滤器是一组条件，文件选择器在对话框中显示文件之前会应用这些条件。文件过滤器是\
  \ `FileFilter` 类的对象，该类位于 `javax.swing.filechooser` 包中。`FileFilter` 类是一个 `abstract`\
  \ 类。要创建文件过滤器，你需要创建一个继承自 `FileFilter` 类的子类，并重写 `accept()` 和 `getDescription()` 方法。当文件选择器要显示某个文件时，会调用\
  \ `accept()` 方法并传入该文件的引用。如果 `accept()` 方法返回 `true`，则显示该文件；否则不显示。以下代码片段创建并设置了一个文件过滤器，使其仅显示目录或扩展名为\
  \ `doc` 的文件。请记住，用户需要浏览文件系统，因此你必须显示目录。\n\n```\n// 创建一个文件过滤器，仅显示目录或 .doc 文件\nFileFilter\
  \ filter = new FileFilter() {\n@Override\npublic boolean accept(File f) {\nif (f.isDirectory())\
  \ {\nreturn true;\n}\nString fileName = f.getName().toLowerCase();\nif (fileName.endsWith(\"\
  .doc\")) {\nreturn true;\n}\nreturn false; // 拒绝任何其他文件\n}\n@Override\npublic String\
  \ getDescription() {\nreturn \"Word 文档\";\n}\n};\n// 设置文件过滤器\nfileChooser.setFileFilter(filter);\n\
  int returnValue = fileChooser.showDialog(null, \"Attach\");\nif (returnValue ==\
  \ JFileChooser.APPROVE_OPTION) {\n// 处理文件\n}\n```\n\n基于文件扩展名设置文件过滤器非常常见，因此可以通过继承自\
  \ `FileFilter` 类的 `FileNameExtensionFilter` 类直接实现。其构造函数接受文件扩展名及其描述。第二个参数是可变长度参数。请注意，文件扩展名是文件名中最后一个点之后的部分。如果文件名中没有点，则它没有扩展名。创建\
  \ `FileNameExtensionFilter` 类的对象后，你需要调用文件选择器的 `addChoosableFileFilter()` 方法来设置过滤器。以下代码片段添加了\
  \ `\"java\"` 和 `\"jav\"` 作为文件扩展名过滤器。\n\n```\nFileNameExtensionFilter extFilter =\n\
  new FileNameExtensionFilter(\"Java 源文件\", \"java\", \"jav\");\nfileChooser.addChoosableFileFilter(extFilter);\n\
  ```\n\n你可以向文件选择器添加多个文件扩展名过滤器。它们会作为文件类型显示在文件选择器的下拉列表中。如果你想限制用户只能选择你设置为文件过滤器的文件，则需要移除那个允许用户选择任何文件的过滤器，该过滤器被称为“接受所有文件过滤器”。在\
  \ Windows 上，它显示为 `\"所有文件(*.*)\"` 文件类型。\n\n```\n// 禁用\"接受所有文件过滤器\"\nfileChooser.setAcceptAllFileFilterUsed(false);\n\
  ```\n\n你可以使用 `isAcceptAllFileFilterUsed()` 方法检查“接受所有文件过滤器”是否已启用，如果文件选择器正在使用此过滤器，则返回\
  \ `true`。你可以使用 `getAcceptAllFileFilter()` 方法获取“接受所有文件过滤器”的引用。以下代码片段在“接受所有文件过滤器”尚未设置时进行设置。\n\
  \n```\nif (!fileChooser.isAcceptAllFileFilterUsed()) {     fileChooser.setAcceptAllFileFilterUsed(true);\n\
  }\n```\n\n提示\n\n`JFileChooser` 具有许多可在应用程序中使用的功能。有时你可能希望获取某种文件类型的关联图标。你可以通过文件选择器的\
  \ `getIcon(java.io.File file)` 方法获取文件类型的关联图标，该方法返回一个 `Icon` 对象。请注意，你可以使用 `JLabel`\
  \ 组件显示 `Icon` 对象。它还提供了一种机制，用于在对话框显示时监听用户执行的选择更改和其他操作。\n\n### JColorChooser\n\n`JColorChooser`\
  \ 允许你通过对话框选择颜色。它是可定制的。你可以向默认的颜色选择器添加更多面板。你也可以将颜色选择器组件嵌入到容器中。它提供了监听用户对颜色选择器组件操作的方法。其常见用法非常简单。你需要调用其静态方法\
  \ `showDialog()`，该方法将返回一个 `java.awt.Color` 对象，代表用户选择的颜色。否则，它返回 `null`。我将在本章后面介绍\
  \ `Color` 类。\n\n`showDialog()` 方法的签名如下。它允许你指定对话框的父组件和标题。你还可以设置初始颜色，该颜色将显示在对话框中。\n\
  \n*   `static Color showDialog(Component parentComponent, String title, Color initialColor)`\n\
  \n以下代码片段允许用户使用 `JColorChooser` 选择颜色，并在标准输出上打印一条消息：\n\n```\n// 显示颜色选择器对话框\nColor\
  \ color = JColorChooser.showDialog(null, \"选择颜色\", null);\n// 检查用户是否选择了颜色\nif (color\
  \ == null) {\nSystem.out.println(\"您已取消或关闭了颜色选择器\");\n} else {\nSystem.out.println(\"\
  您选择的颜色是：\" + color);\n}\n```\n\n## JWindow\n\n与 `JFrame` 类似，`JWindow` 是另一个顶级容器。它就像一个无装饰的\
  \ `JFrame`。它没有标题栏、窗口菜单等功能。它不是非常常用的顶级容器。你可以将其用作启动画面，在应用程序启动时显示一次，然后在几秒钟后自动消失。有关如何在\
  \ Java 应用程序中显示启动画面的更多详细信息，请参阅 `java.awt.SplashScreen` 类的 API 文档。与 `JFrame` 一样，你可以将\
  \ Swing 组件添加到 `JWindow` 中。\n\n\n\n## 使用颜色\n\n`java.awt.Color` 类的对象代表一种颜色。你可以使用其\
  \ RGB（红、绿、蓝）分量来创建一个 `Color` 对象。RGB 值可以指定为 `float` 或 `int` 类型。作为 `float` 值，RGB 中每个分量的范围是\
  \ 0.0 到 1.0。作为 `int` 值，RGB 中每个分量的范围是 0 到 255。还有一种与颜色相关的分量，称为 alpha。颜色的 alpha 值定义了颜色的透明度。作为\
  \ `float`，其值范围是 0.0 到 1.0；作为 `int`，其值范围是 0 到 255。alpha 值为 0.0 或 0 表示颜色完全透明，而值为 1.0\
  \ 或 255 则表示完全不透明。\n\n你可以按如下方式创建一个 `Color` 对象。请注意构造函数 `Color(int red, int green,\
  \ int blue)` 中 RGB 分量的值。\n\n```\n// 创建红色\nColor red = new Color(255, 0, 0);\n//\
  \ 创建绿色\nColor green = new Color(0, 255, 0);\n// 创建蓝色\nColor blue = new Color(0,\
  \ 0, 255);\n// 创建白色\nColor white = new Color(255, 255, 255);\n// 创建黑色\nColor black\
  \ = new Color(0, 0, 0);\n```\n\nalpha 分量被隐式设置为 1.0 或 255，这意味着如果你没有为颜色指定 alpha 分量，则该颜色是不透明的。以下代码片段通过将\
  \ alpha 分量指定为 0 来创建一种透明的红色：\n\n```\n// 创建一种透明的红色。最后一个参数 0 是 alpha 值。\nColor transparentRed\
  \ = new Color(255, 0, 0, 0);\n```\n\n`Color` 类为常用颜色定义了许多颜色常量。例如，你不需要创建红色。相反，你可以使用\
  \ `Color.red` 或 `Color.RED` 常量。`Color.red` 常量自 Java 1.0 起就已存在。相同常量的大写版本 `Color.RED`\
  \ 是在 Java 1.4 中添加的，以遵循常量的命名约定（常量名称应使用大写）。类似地，你还有 `Color.black`、`Color.BLACK`、`Color.green`、`Color.GREEN`、`Color.darkGray`、`Color.DARK_GRAY`\
  \ 等。如果你有一个 `Color` 对象，可以分别使用其 `getRed()`、`getGreen()`、`getBlue()` 和 `getAlpha()`\
  \ 方法来获取它的红色、绿色、蓝色和 alpha 分量。\n\n还有另一种指定颜色的方法，即使用 HSB（色相、饱和度和亮度）分量。`Color` 类有两个方法，名为\
  \ `RGBtoHSB()` 和 `HSBtoRGB()`，它们允许你在 RGB 模型和 HSB 模型之间进行转换。\n\n`Color` 对象与 Swing\
  \ 组件的 `setBackground(Color c)` 和 `setForeground(Color c)` 方法一起使用。所有 Swing 组件都从 `JComponent`\
  \ 继承这些方法。这些方法调用可能会被外观忽略。背景色是绘制组件时使用的颜色，而前景色通常是组件中显示的文本的颜色。在设置组件的背景色时，有一个重要的事情需要考虑，即透明度。如果组件是透明的，它不会在其边界内绘制像素。相反，它会让容器的像素显示出来。为了使背景色生效，你必须通过调用其\
  \ `setOpaque(true)` 方法使组件不透明。以下代码创建了一个 `JLabel`，并将其背景色设置为红色，前景色（或文本颜色）设置为黑色：\n\n\
  ```\nJLabel testLabel = new JLabel(\"Color Test\");\n// 首先使 JLabel 不透明。默认情况下，JLabel\
  \ 是透明的。\ntestLabel.setOpaque(true);\ntestLabel.setBackground(Color.RED);\ntestLabel.setForeground(Color.BLACK);\n\
  ```\n\n提示\n\n`Color` 类的对象是不可变的。在创建 `Color` 对象后，它没有任何方法允许你设置颜色分量值。这使得共享 `Color` 对象成为可能。\n\
  \n## 使用边框\n\nSwing 允许你在组件的边缘绘制边框。边框有多种类型：\n\n*   斜面边框\n*   软斜面边框\n*   蚀刻边框\n*  \
  \ 线边框\n*   标题边框\n*   哑光边框\n*   空边框\n*   复合边框\n\n图 2-38 展示了使用 Windows 外观时不同种类边框的显示效果。\n\
  \n![A323071_2_En_2_Fig38_HTML.jpg](img/A323071_2_En_2_Fig38_HTML.jpg)\n\n图 2-38.\n\
  \n不同类型的边框\n\n虽然你可以为任何 Swing 组件设置边框，但 Swing 组件的实现可能会忽略它。通常使用带有标题边框的 `JPanel` 来产生分组效果。许多\
  \ GUI 工具都有一个分组框 GUI 组件来对相关组件进行分组。Java 没有分组框组件。如果你需要分组效果，你需要将相关组件放置在一个 `JPanel` 内，并为其设置一个标题边框。图\
  \ 2-39 显示了一个 `JPanel`，它有五个与地址相关的字段，并带有一个标题设置为 `Address` 的标题边框。\n\n![A323071_2_En_2_Fig39_HTML.jpg](img/A323071_2_En_2_Fig39_HTML.jpg)\n\
  \n图 2-39.\n\n使用带有标题边框的 JPanel 创建分组框效果\n\n为 Swing 组件设置边框很容易：你需要创建一个边框对象，并使用组件的 `setBorder(Border\
  \ b)` 方法。`Border` 是一个接口，由所有其实例代表特定种类边框的类实现。每种边框都有一个对应的类。你也可以通过继承 `AbstractBorder`\
  \ 类来创建自定义边框。所有与边框相关的类和 `Border` 接口都在 `javax.swing.border` 包中。\n\n`Border` 对象被设计为可共享的。虽然你可以直接使用边框类创建边框对象，但建议使用\
  \ `javax.swing.BorderFactory` 类来创建边框，以便边框对象可以被共享。`BorderFactory` 类负责边框对象的缓存和共享。你只需要使用其\
  \ `createXxxBorder()` 方法来创建特定类型的边框，其中 `Xxx` 是边框类型。表 2-18 列出了所有边框类型的边框类。\n\n表 2-18.\n\
  \n可用的边框类\n\n| 边框类型 | 边框类 |\n| --- | --- |\n| 斜面 | `BevelBorder` |\n| 软斜面 | `SoftBevelBorder`\
  \ |\n| 蚀刻 | `EtchedBorder` |\n| 线 | `LineBorder` |\n| 标题 | `TitledBorder` |\n| 哑光\
  \ | `MatteBorder` |\n| 空 | `EmptyBorder` |\n| 复合 | `CompoundBorder` |\n\n以下代码片段创建了不同类型的边框：\n\
  \n\n\n```\n// 创建斜面边框\nBorder bevelRaisedBorder = BorderFactory.createBevelBorder(BevelBorder.RAISED);\n\
  Border bevelLoweredBorder = BorderFactory.createBevelBorder(BevelBorder.LOWERED);\n\
  // 创建软斜面边框\nBorder softBevelRaisedBorder = BorderFactory.createSoftBevelBorder(BevelBorder.RAISED);\n\
  Border softBevelLoweredBorder = BorderFactory.createSoftBevelBorder(BevelBorder.LOWERED);\n\
  // 创建蚀刻边框\nBorder etchedRaisedBorder = BorderFactory.createEtchedBorder(EtchedBorder.RAISED);\n\
  Border etchedLoweredBorder = BorderFactory.createEtchedBorder(EtchedBorder.LOWERED);\n\
  // 创建线边框\nBorder lineBorder = BorderFactory.createLineBorder(Color.BLACK);\nBorder\
  \ lineThickerBorder = BorderFactory.createLineBorder(Color.BLACK, 3);\n// 创建标题边框\n\
  Border titledBorderAtTop = BorderFactory.createTitledBorder(etchedLoweredBorder,\n\
  \"标题文本放在这里\",                                        TitledBorder.CENTER,\nTitledBorder.TOP);\n\
  Border titledBorderAtBottom = BorderFactory.createTitledBorder(etchedLoweredBorder,\n\
  \"标题文本放在这里\",\nTitledBorder.CENTER,\nTitledBorder.BOTTOM);\n// 创建马赛克边框\nBorder matteBorder\
  \ = BorderFactory.createMatteBorder(1,3,5,7, Color.BLUE);\n// 创建空边框\nBorder emptyBorder\
  \ = BorderFactory.createEmptyBorder();\n// 创建复合边框\nBorder twoCompoundBorder = BorderFactory.createCompoundBorder(etchedRaisedBorder,\
  \ lineBorder);\nBorder threeCompoundBorder = BorderFactory.createCompoundBorder(titledBorderAtTop,\n\
  twoCompoundBorder);\n```\n\n你可以按如下方式为组件设置边框：\n\n```\nmyComponent.setBorder(matteBorder);\n\
  ```\n\n斜面边框通过为边框的内外边缘添加阴影和高光，营造出三维效果。你可以实现凸起或凹陷的效果。软斜面边框是一种边角更柔和的斜面边框。\n\n蚀刻边框能带来雕刻般的效果。它有两种样式：凸起和凹陷。\n\
  \n线边框只是简单地绘制一条线。你可以指定线条的颜色和粗细。\n\n你可以为任何类型的边框添加标题。边框的标题是文本，可以显示在边框的指定位置，例如上边框/下边框的中间位置，或上边框之上/下边框之下。你还可以指定标题文本的对齐方式、颜色和字体。请注意，使用标题边框时，必须拥有另一个边框对象。标题边框只是让你为另一种边框提供标题文本。\n\
  \n马赛克边框允许你使用图标装饰边框。如果没有图标，你可以指定边框的厚度。\n\n空边框，顾名思义，不显示任何内容。你能猜到为什么需要空边框吗？边框会在组件周围添加间距。如果你只想在组件周围添加间距，可以使用空边框。空边框允许你分别为四个边指定间距。\n\
  \n复合边框是一种组合边框，允许你将任意两种边框合并为一个边框对象。嵌套层数没有限制。你可以通过将前两种边框创建为复合边框，然后将该复合边框与第三种边框组合，从而创建最终的复合边框，以此实现三种边框的组合。\n\
  \n## 使用字体\n\n字体用于在视觉上呈现文本，例如在计算机屏幕、打印纸或任何其他设备上。`java.awt.Font` 类的对象在 Java 程序中代表一种字体。你几乎在每个程序中都在使用\
  \ `Font` 对象，而无需直接引用 `Font` 类。Java 已经为你处理了以特定字体显示文本的工作。例如，你一直在使用显示标签的按钮。为了显示按钮的标签，Java\
  \ 一直使用默认字体。你可以使用 `Font` 对象为 Java 程序中显示的任何文本指定字体。在代码中使用 `Font` 对象很简单：创建一个 `Font`\
  \ 类的对象，然后使用组件的 `setFont(Font f)` 方法。在使用 `Font` 类之前，我们先定义一下“字体”及相关术语。\n\n在计算机内存中，一切都是以\
  \ 0 和 1 表示的数字。因此，字符在内存中也是由 0 和 1 表示的。如何在计算机屏幕或纸张上表示一个字符呢？字符在屏幕或纸张上通过符号来呈现。表示字符的符号形状称为字形。你可以将字形视为字符的图形表示（或图像）。字符和字形之间的关系并不总是一一对应的。\n\
  \n一组字符的特定字形设计称为字体。请注意，字体是字符（字形）视觉呈现的设计方面，它并不指代字形的具体实现。表 2-19 列出了一些字体类别及其描述和示例文本。如果在不支持所有字体的设备（例如\
  \ Kindle）上查看，表中的示例文本可能不会以相同的字体显示。一些字体的名称包括 Times、Courier、Helvetica、Garamond 等。\n\
  \n表 2-19. 字体示例\n\n| 字体类别 | 描述 | 示例文本 |\n| --- | --- | --- |\n| 衬线体 | 字形在笔画末端有修饰线。请注意衬线体和无衬线体每个字符末端笔画的差异。在\
  \ Windows 中，它被称为 Roman。示例：Times New Roman。 | The quick brown fox… |\n| 无衬线体 | 与衬线体不同，字形没有末端修饰线。比较此类别和衬线体的文本示例。你会发现无衬线体的字形由简单的线条构成。在\
  \ Windows 中，它被称为 Swiss。示例：Arial。 | The quick brown fox… |\n| 手写体 | 看起来像手写文本，单词中连续的字形通常连在一起。它通常用于书法。在\
  \ Windows 中，它被称为 Script。示例：Mistral AV。 | The quick brown fox… |\n| 装饰体 | 这是一种装饰性字体。在\
  \ Windows 中，它被称为 Decorative。示例：Impact。 | The quick brown fox… |\n| 等宽体 | 表示所有字符的字形宽度相同。在\
  \ Windows 中，它被称为 Modern。通常用于计算机程序。 | `The quick brown fox…` |\n\n除了形状设计之外，字符的视觉呈现还有另外两个组成部分：样式和大小。样式指其特征，例如粗体（黑度或亮度）、斜体和常规（或罗马体）。大小以\
  \ 10、12、14 等单位度量。字符的高度以磅为单位指定，1 磅等于 1/72 英寸。字符的宽度以间距指定。间距决定了一英寸内可以显示多少个字符。间距的典型值范围是\
  \ 8 到 14。\n\n现在我们来定义“字体”这个术语。字体是一组特定字体、样式和大小的字形，用于表示一组字符。你可以拥有使用相同字体但样式和大小不同的字体。这种字体的集合（相同字体但不同样式和大小）称为字体系列。例如，Times\
  \ 是一个字体系列名称，包含 Times Roman、Times Bold、Times Bold Italic 等字体。\n\n\n字体可根据其存储和渲染方式分为位图字体和矢量字体（也称为面向对象字体或轮廓字体）。在位图字体中，每个字符都以特定样式和大小的位图形式（表示每个像素点）存储。当需要在屏幕上渲染字符或将其打印到纸张上时，需要找到该样式和大小的字符位图并进行渲染。而在矢量字体中，几何算法定义了每个字符的形状，无需指定具体大小。当需要以特定大小渲染矢量字体的字符时，算法会针对该大小进行应用。这就是矢量字体也被称为可缩放字体的原因。TrueType\
  \ 和 PostScript 是使用矢量字体的字体技术。所有 Java 实现都必须支持 TrueType 字体。\n\n计算机上可用的字体数量可能差异很大。你的操作系统可能安装了一些字体，你可以添加一些字体，也可以删除一些字体。由于\
  \ Java 被设计为可在各种操作系统上运行，它允许你使用字体的逻辑字体族名称，并会为你找出最佳的物理（真实）字体。这样，你无需担心实际的字体名称，以及它们是否会在你程序运行的所有计算机上可用。Java\
  \ 定义了五个逻辑字体族名称，并根据其运行的计算机将它们映射到物理字体族名称。这五个逻辑字体族名称如下：\n\n*   Serif\n*   SansSerif\n\
  *   Dialog\n*   DialogInput\n*   Monospace\n\n创建字体对象时，你需要指定三个元素：逻辑族名称、样式和大小。以下代码片段创建了一些\
  \ `Font` 对象：\n\n```\n// 创建大小为 10 的 Serif 普通字体\nFont f1 = new Font(Font.SERIF, Font.PLAIN,\
  \ 10);\n// 创建大小为 10 的 SansSerif 粗体字体\nFont f2 = new Font(Font.SANS_SERIF, Font.BOLD,\
  \ 10);\n// 创建大小为 15 的 Dialog 粗体字体\nFont f3 = new Font(Font.DIALOG, Font.BOLD, 15);\n\
  // 创建大小为 15 的 DialogInput 粗斜体字体\nFont f4 = new Font(Font.DIALOG_INPUT, Font.BOLD|Font.ITALIC,\
  \ 15);\n```\n\n`Font` 类包含了逻辑字体族名称的常量。如果你想为字体对象应用多种样式，例如同时使用粗体和斜体，你需要使用 `Font.BOLD`\
  \ 和 `Font.ITALIC` 的位掩码联合，如 `Font.BOLD|Font.ITALIC`。\n\n要为 Swing 组件设置字体，你需要使用该组件的\
  \ `setFont()` 方法，如下所示：\n\n```\nJButton closeButton = new JButton(\"Close\");\ncloseButton.setFont(f4);\n\
  ```\n\n`Font` 类提供了几个方法，让你可以操作字体对象。例如，你可以分别使用 `getFamily()`、`getStyle()` 和 `getSize()`\
  \ 方法来获取字体对象的族名称、样式和大小。\n\n## 验证组件\n\n组件可以是有效的或无效的。除非另有说明，本节中的“组件”一词也包括容器。你可以使用 `isValid()`\
  \ 方法来检查组件是否有效。如果组件有效，该方法返回 `true`，否则返回 `false`。如果组件的大小和位置已被计算，并且其子组件也有效，则该组件被认为是有效的。如果组件无效，则意味着需要重新计算其大小和位置，并且需要在其容器中重新布局。\n\
  \n当你向容器添加/从容器移除组件时，该容器会被标记为无效。在容器首次变为可见之前，容器会被验证。容器的验证过程会计算其包含层次结构中所有子组件的大小和位置。考虑以下显示框架的代码片段：\n\
  \n```\nMyFrame frame = new MyFrame(\"Test Frame\");\nframe.pack();\nframe.setVisible(true);\n\
  ```\n\n`pack()` 方法执行两项操作：\n\n*   首先，它计算框架所有子组件的大小和位置（即验证框架）。\n*   其次，它调整框架的大小，使其子组件恰好适合其中。\n\
  \n代码中的 `setVisible()` 方法足够智能，不会再次验证框架，因为 `pack()` 方法已经验证了框架。如果在调用 `setVisible()`\
  \ 方法之前没有调用 `pack()` 方法，那么 `setVisible()` 方法将会验证框架。\n\n因此，组件在首次显示之前是有效的。组件是如何变为无效的呢？向容器添加/从容器移除组件会使容器无效。设置某些属性（例如组件的大小）也会使该组件无效。当组件变为无效时，其无效性会沿着包含层次结构向上传播。你也可以通过调用组件的\
  \ `invalidate()` 方法来使其无效。请注意，调用 `invalidate()` 方法会使组件无效，并且无效性会沿着包含层次结构向上传播。需要将包含层次结构中所有上层容器标记为无效的原因是，如果某个组件被重新布局（通过重新计算其大小/位置），它也会影响其他组件的大小/位置。因此，如果一个组件被无效化，那么包含层次结构中所有上层组件和容器也会被标记为无效。\n\
  \n如何再次验证组件呢？你需要使用组件或容器的 `validate()` 方法。与 `invalidate()` 方法不同，`validate()` 方法沿着包含层次结构向下传播，并验证调用该方法的组件下的所有子组件/容器。在调用\
  \ `validate()` 方法后，你可能需要调用 `repaint()` 方法来重绘屏幕。\n\n你也可以重新验证组件。请注意，重新验证选项仅适用于 `JComponent`，不适用于容器。你可以通过调用组件的\
  \ `revalidate()` 方法来重新验证它。该方法会在父容器上安排一个 `validate()` 方法调用。验证的是组件的哪个父容器？是直接父容器、祖父容器还是曾祖父容器等？一个容器可以是验证根。你可以使用\
  \ `isValidateRoot()` 方法来测试容器是否为验证根。如果此方法返回 `true`，则该容器是验证根。当你在组件上调用 `revalidate()`\
  \ 方法时，它会沿着包含层次结构向上查找，直到找到一个验证根容器。`JRootPane` 和 `JScrollPane` 是验证根。对验证根容器的 `validate()`\
  \ 方法的调用会被安排在事件调度线程上执行。如果有多个对 `revalidate()` 的调用，它们会被合并，并且组件只会被重新验证一次。\n\n\n\n##\
  \ 绘制组件与图形\n\n绘制机制是任何图形用户界面（GUI）的核心。你知道在屏幕上显示一个 `JFrame` 需要经历哪些步骤吗？这是一个非常复杂的过程。它通过绘制一幅图像来完成，而你在屏幕上看到的正是这幅图像，即\
  \ `JFrame`。当你在 `JFrame` 内按下 `JButton` 时，该按钮所占用的区域会使用不同的明暗和颜色重新绘制，从而给你一种按钮已被按下的感觉。大多数情况下，Swing\
  \ 会在适当的时间绘制屏幕上的适当区域。但有时，你可能需要自行重新绘制 Swing 组件的某个区域。例如，当你在一个 Swing 容器可见后从中添加或移除组件时，你需要对该容器进行验证和重绘，以确保屏幕上被修改的区域能够被正确绘制。\n\
  \nSwing 中万物皆有管理器！你还有一个重绘管理器，它是 `RepaintManager` 类的一个实例，负责提供绘制服务。你可以通过调用组件的 `repaint()`\
  \ 方法来请求重绘该组件。`repaint()` 方法是被重载的，你也可以只重绘组件的一部分，而不是整个组件。对 `repaint()` 方法的调用会被排队到事件分发线程中。如果重绘管理器在开始重绘组件时，有多个待处理的重绘请求，它只会对该组件进行一次重绘。\n\
  \n如何在 Swing 组件上执行自定义绘制？Swing 允许你通过回调机制在组件上执行自定义绘制。`JComponent` 类有一个名为 `paintComponent(Graphics\
  \ g)` 的回调方法。`Graphics` 类位于 `java.awt` 包中，用于在组件上绘图。请注意，绘图可以在各种设备上实现，例如计算机屏幕、屏幕外图像或打印机。要为组件实现自定义绘制，需要重写其\
  \ `paintComponent()` 方法。`JComponent` 类中的 `paintComponent()` 方法负责绘制组件的背景。为了确保组件的背景能被正确绘制，你需要在自定义组件的\
  \ `paintComponent()` 方法中调用 `JComponent` 的 `paintComponent()` 方法。`paintComponent()`\
  \ 方法的典型代码如下：\n\n```\nimport java.awt.Graphics;\npublic class YourCustomSwingComponent\
  \ extends ASwingComponent {\n@Override\npublic void paintComponent(Graphics g) {\n\
  // 绘制背景\nsuper.paintComponent(g);\n// 在此处编写你的自定义绘制代码\n}\n}\n```\n\n每当需要重绘时，或者当程序调用\
  \ `repaint()` 方法时，组件的 `paintComponent()` 方法就会被调用。\n\n当你对 Swing 组件调用 `repaint()`\
  \ 方法时，重绘管理器可能会绘制超出你请求重绘的组件范围。在绘制一个组件之前，需要考虑许多因素。绘制组件时，组件的背景及其与其他组件的重叠区域是需要考虑的两个最重要因素。如果组件不是不透明的，则必须先绘制该组件的容器，然后才能绘制该组件。这是必要的，这样你就不会透过组件看到其杂乱的背景。如果一个组件与另一个组件重叠，则至少必须绘制重叠区域，并考虑为该重叠区域显示正确的颜色和形状。重叠区域的绘制将包括所有被重叠组件的绘制。\n\
  \n`Graphics` 对象拥有许多绘制几何形状和字符串的方法。你可以绘制不同的形状，例如矩形、椭圆、圆弧等。`Graphics` 对象具有许多绘制属性，例如字体、颜色、坐标系（称为平移）、裁剪区域（定义绘图区域）、要绘制的组件等。`paintComponent()`\
  \ 方法参数中的 `Graphics` 对象已经设置了许多属性。例如：\n\n*   字体被设置为组件的字体。\n*   颜色被设置为组件的前景色。\n*  \
  \ 平移被设置为组件的左上角。组件的左上角代表原点，即坐标 (0, 0)。\n*   裁剪区域被设置为组件需要绘制的区域。\n\n你可以在 `paintComponent()`\
  \ 方法内部更改 `Graphics` 对象的这些属性。但是，如果你想更改平移或裁剪区域，则需要格外小心。你应该创建 `Graphics` 对象的一个副本，并使用该副本进行绘制，而不是更改原始\
  \ `Graphics` 对象的属性。你可以使用 `Graphics` 类的 `create()` 方法来创建 `Graphics` 对象的副本。确保在 `Graphics`\
  \ 对象的副本上调用 `dispose()` 方法，以释放其占用的系统资源。复制和使用 `Graphics` 对象的典型逻辑如下所示：\n\n```\npublic\
  \ void paintComponent(Graphics g) {\n// 创建传入的 Graphics 对象的副本\nGraphics gCopy = g.create();\n\
  // 更改 gCopy 的属性并在此处使用它进行绘制\n// 释放 Graphics 对象的副本\ngCopy.dispose();\n}\n```\n\n当你使用传递给\
  \ `paintComponent()` 方法的 `Graphics` 对象时，有几点需要注意。\n\n![A323071_2_En_2_Fig40_HTML.gif](img/A323071_2_En_2_Fig40_HTML.gif)\n\
  \n图 2-40.\n\n组件 `paintComponent()` 方法内图形对象使用的坐标系。它显示了一个 600X200 的 JPanel 四个角的坐标。\n\
  \n*   它使用笛卡尔坐标系，原点位于组件的左上角。\n*   x 轴向右延伸，y 轴向下延伸，如图 2-40 所示。\n*   当你使用 `Graphics`\
  \ 对象绘图时，你的图形可能会超出组件的边界。但是，任何超出重绘管理器在 `Graphics` 对象中设置的裁剪区域的图形都将被忽略。实际上，在 `paintComponent()`\
  \ 方法返回后，重绘管理器只会使用所绘制组件的裁剪区域来在屏幕上显示它。这就是为什么你不应该在 `paintComponent()` 方法内部更改 `Graphics`\
  \ 对象的裁剪区域属性的原因。裁剪区域被设置为组件需要绘制的区域。\n*   `Graphics` 对象的平移属性用于设置绘图的坐标系。传递给 `paintComponent()`\
  \ 方法的 `Graphics` 对象已经设置了平移属性，因此组件的左上角代表坐标系的原点 (0,0)。如果你在 `paintComponent()` 方法内部更改了\
  \ `Graphics` 对象的平移属性，你最好清楚自己在做什么。\n*   绘图是使用 `Graphics` 对象的当前颜色和字体来执行的。\n\n`Graphics`\
  \ 类中有许多方法可以让你绘制不同类型的形状，例如圆角矩形、圆弧、多边形等。表 2-20 列出了其中的一些方法。有关方法的完整列表，请参阅 `Graphics`\
  \ 类的 API 文档。\n\n表 2-20.\n\nGraphics 类的方法\n\n\n\n| 方法 | 描述 |\n| --- | --- |\n| `void\
  \ drawLine(int x1, int y1, int x2, int y2)` | 从点 `(x1, y1)` 到点 `(x2, y2)` 绘制一条直线。\
  \ |\n| `void drawRect(int x, int y,` `int width, int height)` | 绘制一个矩形，其左上角坐标为 `(x,\
  \ y)`。指定的 `width` 和 `height` 分别为矩形的宽度和高度。 |\n| `void fillRect(int x, int y,` `int\
  \ width, int height)` | 与 `drawRect()` 方法相同，但有两个区别：它使用 `Graphics` 对象的当前颜色填充该区域；其宽度和高度比指定的\
  \ `width` 和 `height` 各少一个像素。 |\n| `void drawOval(int x, int y, int width, int height)`\
  \ | 绘制一个椭圆，该椭圆内切于一个矩形，该矩形以点 `(x, y)` 为左上角，并具有指定的宽度和高度。如果指定的宽度和高度相同，则会绘制一个圆形。 |\n\
  | `void fillOval(int x, int y, int width, int height)` | 绘制一个椭圆，并使用当前颜色填充该区域。 |\n\
  | `void drawstring(String str, int x, int y)` | 绘制指定的字符串 `str`。最左侧字符的基线位于点 `(x,\
  \ y)`。 |\n\n通常，您使用 `JPanel` 作为自定义绘图的画布。清单 2-13 中的代码展示了一个名为 `DrawingCanvas` 的类，它继承自\
  \ `JPanel` 类。在其构造函数中，设置了首选大小。它重写了 `paintComponent()` 方法来绘制一些自定义形状和字符串。图 2-41 显示了运行\
  \ `DrawingCanvas` 类时的屏幕画面。\n\n![A323071_2_En_2_Fig41_HTML.jpg](img/A323071_2_En_2_Fig41_HTML.jpg)\n\
  \n图 2-41.\n\n使用图形对象在自定义 JPanel 上绘制形状\n\n```\n// DrawingCanvas.java\npackage com.jdojo.swing.component;\n\
  import javax.swing.JPanel;\nimport java.awt.Graphics;\nimport java.awt.Dimension;\n\
  import java.awt.Graphics2D;\nimport java.awt.BasicStroke;\nimport javax.swing.JFrame;\n\
  public class DrawingCanvas extends JPanel {\npublic DrawingCanvas() {\nthis.setPreferredSize(new\
  \ Dimension(600, 75));\n}\n@Override\npublic void paintComponent(Graphics g) {\n\
  // 绘制其背景\nsuper.paintComponent(g);\n// 绘制一条线\ng.drawLine(10, 10, 50, 50);\n// 绘制一个矩形\n\
  g.drawRect(80, 10, 40, 20);\n// 绘制一个椭圆\ng.drawOval(140, 10, 40, 20);\n// 填充一个椭圆\n\
  g.fillOval(200, 10, 40, 20);\n// 绘制一个圆形\ng.drawOval(250, 10, 40, 40);\n// 绘制一条弧线\n\
  g.drawArc(300, 10, 50, 50, 60, 120);\n// 绘制一个字符串\ng.drawString(\"Hello Swing!\"\
  , 350, 30);\n// 使用 Graphics2D 绘制一个更粗的矩形\nGraphics2D g2d = (Graphics2D)g;\ng2d.setStroke(new\
  \ BasicStroke(4));\ng2d.drawRect(450, 10, 50, 50);\n}\npublic static void main(String[]\
  \ args) {\nJFrame frame = new JFrame(\"使用图形对象绘制示例\");\nframe.getContentPane().add(new\
  \ DrawingCanvas());\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 2-13.\n用作绘图画布的自定义\
  \ JPanel\n```\n\n在运行时，您会获得一个传递给 `paintComponent()` 方法的 `Graphics2D` 类实例。`Graphics2D`\
  \ 类继承自 `Graphics` 类，并拥有非常强大的 API 来绘制几何形状。例如，当您使用 `Graphics` 对象时，它会以 1.0 的笔画宽度（线宽）绘制形状。如果使用\
  \ `Graphics2D`，则可以使用自定义笔画。以下在 `DrawingCanvas` 类的 `paintComponent()` 方法中的代码片段使用 4.0\
  \ 的笔画宽度来绘制一个矩形。要在 `paintComponent()` 方法内部使用 `Graphics2D` API，请将传入的 `Graphics` 对象转换为\
  \ `Graphics2D`，如下所示：\n\n```\nGraphics2D g2d = (Graphics2D)g;\ng2d.setStroke(new\
  \ BasicStroke(4));\ng2d.drawRect(450, 10, 50, 50);\n```\n\n`JComponent` 类有一个 `getGraphics()`\
  \ 方法，该方法返回该组件的 `Graphics` 对象。如果您需要在组件的 `paintComponent()` 方法之外进行绘制，可以使用此方法获取该组件的\
  \ `Graphics` 对象来进行绘制。\n\n## 立即绘制\n\nSwing 会在适当的时候自动重绘组件中可见的区域。您也可以通过调用组件的 `repaint()`\
  \ 方法来请求重绘。对 `repaint()` 方法的调用是异步的。也就是说，它不会立即执行。它会被放入事件分发线程的队列中，并在将来的某个时间执行。有时可能需要立即进行绘制。请使用组件的\
  \ `paintImmediately()` 方法来立即执行绘制。该方法已被重载。两个版本声明如下：\n\n*   `void paintImmediately(int\
  \ x, int y, int w, int h)`\n*   `void paintImmediately(Rectangle r)`\n\n提示\n\n如果您需要更频繁地或在循环中进行绘制，调用\
  \ `repaint()` 方法效率更高。对 `repaint()` 方法的多次调用会合并为一次调用，而对 `paintImmediately()` 方法的调用则会单独执行。\n\
  \n\n\n## 双缓冲\n\n绘制屏幕组件可采用多种技术。若组件直接绘制在屏幕上，称为屏幕内绘制。若组件使用离屏缓冲区绘制，再将缓冲区内容一次性复制到屏幕，则称为双缓冲。另一种绘制技术称为页面翻转。页面翻转利用计算机显卡的视频指针（即视频内容的地址）来显示视频。与双缓冲类似，您先在离屏缓冲区中绘制待显示内容。绘制完成后，将显卡的视频指针指向该离屏缓冲区，显卡便会负责将图像显示在屏幕上。与双缓冲不同，页面翻转不会将离屏缓冲区的内容复制到屏幕缓冲区，而是直接重定向显卡到新缓冲区。双缓冲和页面翻转通过避免组件绘制时的屏幕闪烁，提供了更佳的用户体验。\n\
  \nSwing 使用双缓冲绘制所有组件。您可以为特定组件禁用双缓冲，但禁用时需注意：有时禁用双缓冲可能不会产生实际效果。当容器被绘制时，Swing 会检查该容器是否启用了双缓冲。如果容器启用了双缓冲，其所有子组件都将使用双缓冲。因此，仅对单个组件禁用双缓冲通常无济于事。若要禁用双缓冲，建议在组件层次结构的顶层（即\
  \ `JRootPane`）进行禁用。重绘管理器也允许您全局启用/禁用应用程序的双缓冲，如下所示：\n\n```\nRepaintManager currentManager\
  \ = RepaintManager.currentManager(component);\ncurrentManager.setDoubleBufferingEnabled(false);\n\
  ```\n\n启用双缓冲时，Swing 会创建一个离屏图像，并将该离屏图像的图形上下文传递给 `JComponent` 的 `paintComponent()`\
  \ 方法。当您在 `paintComponent()` 方法中使用 `Graphics` 对象绘制任何内容时，实际上是在离屏图像上绘制。最后，Swing 会将离屏图像复制到屏幕。\n\
  \n双缓冲还允许您在程序中创建离屏图像。您可以绘制到该离屏图像，并在应用程序中任意位置使用它。您需要使用组件的 `createImage()` 方法来创建离屏图像。以下代码创建了一个名为\
  \ `OffScreenImagePanel` 的自定义 `JPanel`。在其 `paintComponent()` 方法中，它创建了一个离屏图像，用红色填充该图像，并使用该图像在\
  \ `JPanel` 上绘制。这是一个简单的示例，但演示了在应用程序中使用离屏图像所需的步骤。\n\n```\npublic class OffScreenImagePanel\
  \ extends JPanel{\npublic OffScreenImagePanel() {\nthis.setPreferredSize(new Dimension(200,\
  \ 200));\n}\npublic void paintComponent(Graphics g) {\nsuper.paintComponent(g);\n\
  // 创建一个离屏图像并用红色填充矩形\nint w = this.getWidth();\nint h = this.getHeight();\nImage\
  \ offScreenImage = this.createImage(w, h);\nGraphics imageGraphics = offScreenImage.getGraphics();\n\
  imageGraphics.setColor(Color.RED);\nimageGraphics.fillRect(0, 0, w, h);\n// 在 JPanel\
  \ 上绘制离屏图像\ng.drawImage(offScreenImage, 0, 0, null);\n}\n}\n```\n\n## 再探 JFrame\n\
  \n在本章中，您几乎在每个程序中都使用了 `JFrame`。本节将讨论 `JFrame` 的一些重要事件和属性。\n\n您可以使用 `setExtendedState(int\
  \ state)` 方法以编程方式设置 `JFrame` 的状态。状态通过 `java.awt.Frame` 类（`JFrame` 类继承自该类）中定义的常量来指定。\n\
  \n```\n// 最大化显示 JFrame\nframe.setExtendedState(JFrame.MAXIMIZED_BOTH);\n```\n\n\
  通常，您会使用标题栏角落的状态按钮或状态菜单来更改 `JFrame` 的状态。表 2-21 列出了可用于更改 `JFrame` 状态的常量。\n\n表 2-21.\
  \ 定义 JFrame 状态的常量\n\n| JFrame 状态常量 | 描述 |\n| --- | --- |\n| `NORMAL` | `JFrame`\
  \ 以正常大小显示。 |\n| `ICONIFIED` | `JFrame` 以最小化状态显示。 |\n| `MAXIMIZED_HORIZ` | `JFrame`\
  \ 水平方向最大化显示，垂直方向保持正常大小。 |\n| `MAXIMIZED_VERT` | `JFrame` 垂直方向最大化显示，水平方向保持正常大小。 |\n\
  | `MAXIMIZED_BOTH` | `JFrame` 在水平和垂直方向均最大化显示。 |\n\n有时您可能希望在 `JFrame` 或 `JDialog`\
  \ 中使用默认按钮。默认按钮是 `JButton` 类的一个实例，当用户按下键盘上的某个键时会被激活。激活默认按钮的键由外观和感觉定义。通常，激活默认按钮的键是\
  \ Enter 键。您可以为 `JRootPane`（存在于 `JFrame`、`JDialog`、`JWindow`、`JApplet` 和 `JInternalFrame`\
  \ 中）设置默认按钮。通常，您会将“确定”按钮设置为 `JDialog` 上的默认按钮。如果 `JRootPane` 设置了默认按钮，按下 Enter 键将激活该按钮；如果您为该按钮添加了动作事件处理器，您的代码将被执行。\n\
  \n```\n// 创建一个 JButton\nJButton okButton = new JButton(\"确定\");\n// 在此处为 okButton\
  \ 添加事件处理器...\n// 将 okButton 设置为默认按钮\nframe.getRootPane().setDefaultButton(okButton);\n\
  ```\n\n您可以为 `JFrame` 或任何其他顶级 Swing 窗口添加窗口监听器，该监听器会通知您窗口状态的七种变化。以下代码片段为名为 `frame`\
  \ 的 `JFrame` 添加了一个窗口监听器。如果您只对监听少数窗口状态变化感兴趣，可以使用 `WindowAdapter` 类代替 `WindowListener`\
  \ 接口。`WindowAdapter` 类提供了 `WindowListener` 接口中所有七个方法的空实现。\n\n```\nframe.addWindowListener(new\
  \ WindowListener() {\n@Override\npublic void windowOpened(WindowEvent e) {\nSystem.out.println(\"\
  JFrame 首次变为可见\");\n}\n@Override\npublic void windowClosing(WindowEvent e) {\nSystem.out.println(\"\
  JFrame 正在关闭。\");\n}\n@Override\npublic void windowClosed(WindowEvent e) {\nSystem.out.println(\"\
  JFrame 已关闭。\");\n}\n@Override\npublic void windowIconified(WindowEvent e) {\nSystem.out.println(\"\
  JFrame 已最小化。\");\n}\n@Override\npublic void windowDeiconified(WindowEvent e) {\n\
  System.out.println(\"JFrame 已恢复。\");\n}\n@Override\npublic void windowActivated(WindowEvent\
  \ e) {\nSystem.out.println(\"JFrame 已激活。\");\n}\n@Override\npublic void windowDeactivated(WindowEvent\
  \ e) {\nSystem.out.println(\"JFrame 已停用。\");\n}\n});\n// 使用 WindowAdapter 类仅拦截窗口关闭事件\n\
  frame.addWindowListener(new WindowAdapter() {\n@Override\npublic void windowClosing(WindowEvent\
  \ e) {\nSystem.out.println(\"JFrame 正在关闭。\");\n}\n});\n```\n\n当您不再需要某个窗口（`JFrame`、`JDialog`\
  \ 或 `JWindow`）时，应调用其 `dispose()` 方法，该方法会使窗口不可见并将资源释放给操作系统。请注意，`dispose()` 方法不会销毁或垃圾回收窗口对象。只要您持有窗口的引用且该引用可达，Java\
  \ 就不会销毁您的窗口，您可以再次调用其 `setVisible(true)` 方法来显示它。\n\n\n\n## 摘要\n\nSwing 提供了大量组件用于开发\
  \ GUI 应用程序。大多数 Swing 组件都是轻量级组件，它们使用 Java 代码重新绘制，而无需使用原生对等体。`JComponent` 类是所有 Swing\
  \ 组件的基类。能够包含其他组件的组件称为容器。Swing 提供了两种类型的容器：顶层容器和非顶层容器。顶层容器不包含在其他容器中，可以直接显示在桌面上。`JFrame`\
  \ 类的实例代表一个顶层容器。\n\n`JButton` 类的对象代表一个按钮。按钮也称为按压按钮或命令按钮。用户按下或点击 `JButton` 来执行一个操作。按钮可以显示文本、图标，或两者都显示。\n\
  \n`JPanel` 类的对象代表一个可以包含其他组件的容器。通常，`JPanel` 用于将相关组件分组在一起。`JPanel` 是一个非顶层容器。\n\n`JLabel`\
  \ 类的对象代表一个显示文本、图标或两者都显示的标签组件。通常，`JLabel` 中的文本用于描述另一个组件。\n\nSwing 提供了几个文本组件，允许您显示和编辑不同类型的文本。`JTextField`\
  \ 类的对象用于处理单行纯文本。`JTextArea` 类的对象用于处理多行纯文本。`JPasswordField` 类的对象用于处理单行文本，其中文本中的实际字符会被回显字符替换。`JFormattedTextField`\
  \ 类的对象允许您处理单行纯文本，并可以指定文本的格式，例如以 `mm/dd/yyyy` 格式显示日期。`JEditorPane` 类的对象允许您处理样式文本，例如\
  \ HTML 和 RTF 格式。`JTextPane` 类的对象允许您处理包含嵌入图像和组件的样式文档。您可以为文本组件添加输入验证器，以验证用户输入的文本。`InputVerifier`\
  \ 类的实例充当输入验证器。您可以使用 `JComponent` 类的 `setInputVerifier()` 方法为文本组件设置输入验证器。\n\nSwing\
  \ 提供了许多组件，允许您从项目列表中选择一个或多个项目。此类组件是 `JToggleButton`、`JCheckBox`、`JRadioButton`、`JComboBox`\
  \ 和 `JList` 类的对象。`ToggleButton` 可以处于按下或未按下状态，代表一个“是/否”选择。`JCheckBox` 可用于表示“是/否”选择。有时，一组\
  \ `JCheckBox` 用于让用户选择零个或多个选项。一组 `JRadioButton` 用于向用户呈现一组互斥的选项。`ComboBox` 用于向用户提供一组互斥的选择，用户可以选择输入一个新的选择值。与其他提供选择的组件相比，`ComboBox`\
  \ 在屏幕上占用的空间更少，因为它折叠了所有选项，用户必须先打开选项列表才能进行选择。`JList` 允许用户从选项列表中选择零个或多个选项。`JList` 中的所有选项对用户都是可见的。\n\
  \n`JSpinner` 组件结合了 `JFormattedTextField` 和可编辑 `JComboBox` 的优点。它允许您像在 `JComboBox`\
  \ 中一样设置选项列表，同时还可以对显示的值应用格式。它一次只显示选项列表中的一个值。它还允许您输入新值。\n\n`JScrollBar` 用于提供滚动功能，以便查看尺寸大于可用空间的组件。`JScrollBar`\
  \ 可以垂直或水平放置。滚动是通过沿 `JScrollBar` 的轨道拖动滑块来执行的。您需要编写逻辑来使用 `JScrollBar` 组件提供滚动功能。\n\n\
  `ScrollPane` 是一个容器，用于包裹尺寸大于可用空间的组件。`ScrollPane` 在水平和垂直方向上提供自动滚动功能。\n\n`JProgressBar`\
  \ 用于显示任务的进度。它可以具有水平或垂直方向。它关联了三个值：当前值、最小值和最大值。如果任务的进度未知，则称 `JProgressBar` 处于不确定状态。\n\
  \n`JSlider` 允许您通过沿轨道滑动滑块，从两个整数之间的一组值中以图形方式选择一个值。\n\n当您想在两个组件或两组组件之间添加分隔符时，`JSeparator`\
  \ 是一个方便的组件。通常，`JSeparator` 用于菜单中，以分隔相关的菜单项组。它通常显示为一条水平或垂直的实线。\n\n菜单组件用于以紧凑的形式向用户提供一系列操作。`JMenuBar`\
  \ 类的对象代表一个菜单栏。`JMenu`、`JMenuItem`、`JCheckBoxMenuItem` 和 `JRadioButtonMenuItem` 类的对象代表菜单项。\n\
  \n工具栏是一组小按钮，在 `JFrame` 中向用户提供常用操作。通常，工具栏与菜单一起提供。\n\n`JTable` 用于以表格形式显示和编辑数据。它以行和列的形式呈现数据。每列都有一个列标题。行和列使用从\
  \ 0 开始的索引进行引用。\n\n`JTree` 用于以树状结构显示层次数据。`JTree` 中的每个项目称为一个节点。有子节点的节点称为分支节点。没有子节点的节点称为叶节点。分支节点是其子节点的父节点。`JTree`\
  \ 中没有父节点的第一个节点称为根节点。\n\n`JTabbedPane` 组件充当其他 Swing 组件的容器，以选项卡的方式排列它们。它可以使用标题、图标或两者来显示选项卡。一次只能看到一个选项卡的内容。`JTabbedPane`\
  \ 允许您在多个选项卡之间共享空间。\n\n`JSplitPane` 是一个分割器，可用于在两个组件之间分割空间。分割条可以水平或垂直显示。当可用空间小于显示两个组件所需的空间时，用户可以向上/向下或向左/向右移动分割条，以便一个组件获得比另一个更多的空间。如果有足够的空间，两个组件都可以完全显示。\n\
  \n`JDialog` 是一个 Swing 顶层容器。它用作临时的顶层容器（或弹出窗口），以辅助主窗口的工作，吸引用户的注意或获取用户的输入。`JOptionPane`\
  \ 类提供了许多静态方法，用于通过 `JDialog` 类的实例向用户显示不同类型的对话框。\n\n`JFileChooser` 允许用户使用内置对话框从文件系统中选择文件/目录。`JColorChooser`\
  \ 允许用户使用内置对话框以图形方式选择颜色。\n\n`JWindow` 是一个无装饰的顶层容器。它不是一个常用的顶层容器，除了用作启动画面，在应用程序启动时显示一次。它会在几秒钟后自动消失。\n\
  \nSwing 允许您设置组件的背景色和前景色。`java.awt.Color` 类的对象代表一种颜色。您可以使用红色、绿色、蓝色和 alpha 分量，或使用色调、饱和度和亮度分量来指定颜色。`Color`\
  \ 类是不可变的。它提供了几个表示常用颜色的常量，例如，`Color.RED` 和 `Color.BLUE` 常量分别代表红色和蓝色。\n\n\n\n在 Swing\
  \ 中，你可以为组件绘制边框。边框由 `Border` 接口的实例表示。存在不同类型的边框：斜面边框、软斜面边框、蚀刻边框、线边框、标题边框、哑光边框、空边框和复合边框。`BorderFactory`\
  \ 类提供了创建所有类型边框的工厂方法。\n\nSwing 允许你为组件中显示的文本设置字体。`java.awt.Font` 类的对象在 Java 程序中表示一种字体。\n\
  \n组件可以是有效的或无效的。如果组件无效，其 `isValid()` 方法返回 `true`。无效组件表示其位置和大小需要重新计算，并且需要重新布局。组件在首次可见之前是有效的。添加/移除组件以及更改可能改变组件位置、大小或两者的属性，可能会使组件无效。调用\
  \ `validate()` 方法可使组件重新变为有效。\n\nSwing 允许你使用 `Graphics` 对象绘制多种类型的形状（圆形、矩形、线条、多边形等）。通常，你使用\
  \ `JPanel` 作为绘制形状的画布。\n\nSwing 提供了两种重新绘制组件的方式：异步和同步。调用 `repaint()` 方法会异步绘制组件。调用\
  \ `paintImmediately()` 方法会立即绘制组件。\n\n绘制组件可以在屏幕上或屏幕外进行。屏幕上的绘制可能会导致闪烁。可以使用缓冲区在屏幕外进行绘制，然后将缓冲区一次性复制到屏幕上，以避免闪烁。这种屏幕外绘制称为双缓冲，它通过在屏幕上提供平滑绘制来提供更好的用户体验。\n\
  \n问题与练习\n\n1.  所有 Swing 组件的超类是什么？\n2.  Swing 中哪个类表示按钮？使用 `Action` 对象在 Swing 中创建按钮有哪些优点？\n\
  3.  描述 `JPanel` Swing 组件的几种用途。\n4.  你会使用哪个 Swing 组件来显示图像？\n5.  创建一个登录表单，允许用户输入用户\
  \ ID 和密码。该表单应有两个按钮，分别标记为“登录”和“取消”。当点击“登录”按钮时，应显示一个对话框，让用户了解登录状态。有效的用户 ID 和密码分别是\
  \ `jdk9` 和 `letmein`。当点击“取消”按钮时，应用程序应退出。\n6.  创建一个像 Windows 记事本一样的纯文本编辑器。用户应该能够将文本文件的内容加载到编辑器中，修改内容，并将更改保存到文件中。使用菜单、工具栏、`JTextArea`\
  \ 和其他 Swing 组件来开发此编辑器。\n7.  你会使用哪个 Swing 组件在你的应用程序中显示 HTML 页面？\n8.  你会使用哪个 Swing\
  \ 组件让用户编辑 RTF 格式的样式化文档？\n9.  Swing 提供了以下组件让用户从项目列表中选择零个或多个项目：`JToggleButton`、`JCheckBox`、`JRadioButton`、`JComboBox`\
  \ 和 `JList`。这些组件中哪些适合呈现多项选择项目（例如爱好）？如果你有一个包含 50 个州的列表，并希望用户只选择一个，你会使用这些组件中的哪一个？\n\
  10. 何时需要使用 `JScrollPane` 组件？\n11. 假设你必须让用户选择一个介于 1 和 10 之间的整数。如果你没有空间限制，你会使用哪个 Swing\
  \ 组件，`JSpinner` 还是 `JSlider`？\n12. 何时使用 `JFileChooser` 组件？\n13. 在 Swing 应用程序中，表示颜色的类的完全限定名称是什么？\n\
  14. 什么是双缓冲？\n15. 假设你正在开发一个 `JFrame`，它将允许用户输入并保存一些数据。数据必须在 `JFrame` 关闭之前保存。你会捕获什么事件来编写此逻辑？\n\
  \n# 3. 高级 Swing\n\n在本章中，你将学习：\n\n*   如何在 Swing 组件中使用 HTML 格式的标签\n*   关于 Swing 中的线程模型以及事件分发线程如何工作\n\
  *   如何在事件分发线程之外执行长时间运行的任务\n*   如何在 Swing 中使用可插拔的外观和感觉\n*   如何在 Swing 组件之间执行拖放操作\n\
  *   如何创建多文档界面（MDI）应用程序\n*   如何使用 `Toolkit` 类发出蜂鸣声并了解屏幕详细信息\n*   如何使用 `JLayer` 装饰\
  \ Swing 组件\n*   如何创建半透明窗口\n*   如何创建异形窗口\n\n本章中的所有示例程序都是 `jdojo.swing.advanced` 模块的成员，如清单\
  \ 3-1 中所声明。\n\n```\n// module-info.java\nmodule jdojo.swing.advanced {\n    requires\
  \ java.desktop;\n    exports com.jdojo.swing.advanced;\n}\n清单 3-1.\njdojo.swing.advanced\
  \ 模块的声明\n```\n\nSwing 和 AWT API 在 `java.desktop` 模块中定义。使用 Swing 的模块需要像 `jdojo.swing.advanced`\
  \ 模块那样读取 `java.desktop` 模块。\n\n## 在 Swing 组件中使用 HTML\n\n通常，你使用一种字体和颜色在一行上显示组件上的文本。如果你想在组件上使用不同的字体和颜色或多行显示文本，你可以使用\
  \ HTML 字符串作为组件的文本来实现。Swing 组件内置了对将 HTML 文本显示为其标签的支持。你可以使用 HTML 格式的字符串作为 `JButton`、`JMenuItem`、`JLabel`、`JToolTip`、`JTabbedPane`、`JTree`\
  \ 等的标签，该字符串应分别以 `<html>` 和 `</html>` 标签开头和结尾。例如，如果你想在 `JButton` 上显示文本“Close Window”作为其标签（Close\
  \ 使用粗体字体，Window 使用普通字体），你可以按如下方式操作：\n\n```\nJButton b1 = new JButton(\"Close Window\"\
  );\n```\n\n大多数情况下，将 HTML 字符串放在 `<html>` 和 `</html>` 标签内即可正常工作。但是，如果 HTML 字符串中的一行以斜杠（`/`）开头，则可能无法正确显示。例如，`<html>/Close\
  \ Window</html>` 将不显示任何内容，而 `<html>/Close Window <b>Problem</b></html>` 将仅显示 `Problem`。为了避免此类问题，你可以始终将\
  \ HTML 格式的字符串放在 `<body>` HTML 标签内，如 `<html><body>/Close Window</body></html>`，它将显示为\
  \ `/Close Window`。如何显示包含 HTML 标签的字符串作为标签？Swing 允许你使用组件的 `html.disable` 客户端属性禁用默认的\
  \ HTML 解释。以下代码片段禁用了 `JButton` 的 HTML 属性，并在其标签中使用了 HTML 标签：\n\n```\nJButton b3 =\
  \ new JButton();\nb3.putClientProperty(\"html.disable\", Boolean.TRUE);\nb3.setText(\"\
  HTML is disabled\");\n```\n\n你必须在禁用 `html.disable` 客户端属性之后设置组件的文本。以下代码片段展示了使用 HTML\
  \ 格式字符串作为 `JButton` 文本的一些示例。当代码在 Windows XP 上运行时，这些按钮如图 3-1 所示。\n\n![A323071_2_En_3_Fig1_HTML.jpg](img/A323071_2_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1.\n\n使用 HTML 格式的字符串作为 Swing 组件标签的文本\n\n```\nJButton b1 = new JButton();\n\
  JButton b2 = new JButton();\nJButton b3 = new JButton();\nb1.setText(\"Close Window\"\
  );\nb2.setText(\"Line 1 Line 2\");\n// 禁用 b3 的 HTML 文本显示\nb3.putClientProperty(\"\
  html.disable\", Boolean.TRUE);\nb3.setText(\"HTML is disabled\");\n```\n\n\n\n##\
  \ Swing 中的线程模型\n\nSwing 中的大多数类都不是线程安全的。它们被设计为仅与单个线程配合使用。这并不意味着你不能在 Swing 应用程序中使用多线程。它只意味着你必须理解\
  \ Swing 的线程模型，才能编写线程安全的 Swing 应用程序。\n\nSwing 的线程安全规则非常简单。它规定，一旦 Swing 组件被实现，你必须在事件调度线程上修改或访问该组件的状态。如果一个组件已经被绘制或准备好被绘制，则认为它已被实现。当你首次调用顶级容器的\
  \ `pack()`、`setVisible(true)` 或 `show()` 方法时，该容器即被实现。当一个顶级容器被实现时，其所有子组件也会被实现。\n\n\
  什么是事件调度线程？它是 JVM 在检测到正在处理 Swing 应用程序时自动创建的一个线程。JVM 使用此线程来执行 Swing 组件的事件处理器。假设你有一个带有动作监听器的\
  \ `JButton`。当你点击 `JButton` 时，`actionPerformed()` 方法中的代码（即 `JButton` 的点击事件处理器代码）将由事件调度线程执行。你在前面章节的示例中使用过\
  \ `JButton`。你从未关注过执行其动作监听器的 `actionPerformed()` 方法的线程。通常，在像你之前使用过的那些简单 Swing 应用程序中，你无需关心线程问题。既然你知道每个\
  \ Swing 应用程序中都存在一个事件调度线程，那么让我们来揭开它如何工作的神秘面纱。你可以在 Swing 应用程序中使用以下两个辅助类来处理其线程模型：\n\
  \n*   `SwingUtilities`\n*   `SwingWorker`\n\n你如何知道你的代码正在事件调度线程中执行？通过使用 `SwingUtilities`\
  \ 类的静态方法 `isEventDispatchThread()`，可以非常简单判断你的代码是否在事件调度线程中执行。如果你的代码在事件调度线程中执行，则返回\
  \ `true`。否则，返回 `false`。出于调试目的，你可以在 Java 代码中的任何位置编写以下语句。如果它打印出 `true`，则意味着你的代码在事件调度线程中执行。\n\
  \n```\nSystem.out.println(SwingUtilities.isEventDispatchThread());\n```\n\n考虑清单\
  \ 3-2 中所示的程序。\n\n```\n// BadSwingApp.java\npackage com.jdojo.swing.advanced;\nimport\
  \ javax.swing.SwingUtilities;\nimport java.awt.BorderLayout;\nimport java.awt.Container;\n\
  import javax.swing.JFrame;\nimport javax.swing.JComboBox;\npublic class BadSwingApp\
  \ extends JFrame {\nJComboBox combo = new JComboBox();\npublic BadSwingApp(String\
  \ title) {\nsuper(title);\ninitFrame();\n}\nprivate void initFrame() {\nthis.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = this.getContentPane();\ncontentPane.add(combo, BorderLayout.NORTH);\n\
  // 为组合框添加一个 ItemEvent 监听器\ncombo.addItemListener(e ->\nSystem.out.println(\"isEventDispatchThread():\
  \ \" +\nSwingUtilities.isEventDispatchThread()));\ncombo.addItem(\"First\");\ncombo.addItem(\"\
  Second\");\ncombo.addItem(\"Third\");\n}\npublic static void main(String[] args)\
  \ {\nBadSwingApp badSwingApp = new BadSwingApp(\"A bad Swing App\");\nbadSwingApp.pack();\n\
  badSwingApp.setVisible(true);\n}\n}\n清单 3-2.\n一个糟糕的 Swing 应用程序\n```\n\n该程序是一个简单的\
  \ Swing 应用程序，但它包含一个潜在的 bug。它在 `JFrame` 中显示一个 `JComboBox`。在 `initFrame()` 方法中，它为\
  \ `JComboBox` 添加了一个项目监听器。然后它向 `JComboBox` 添加了三个项目。该项目监听器只是打印一条消息，显示它是否由事件调度线程执行。像往常一样，你通过创建框架、打包并使其可见来运行应用程序。应用程序将以下文本打印到标准输出：\n\
  \n```\nisEventDispatchThread(): false\n```\n\n我不是说过事件调度线程的工作是执行所有 Swing 组件的事件吗？不要失去希望，在应用程序运行时从组合框中选择另一个项目，例如\
  \ `\"Second\"` 或 `\"Third\"`。你会看到以下消息打印到标准输出：\n\n```\nisEventDispatchThread(): true\n\
  ```\n\n第一次，组合框的项目监听器事件在非事件调度线程上执行，而从第二次开始，它在事件调度线程上执行。要了解为什么在这个小应用程序中会发生这种情况，你需要知道事件调度线程何时创建，以及何时开始处理事件。事件调度线程等待由用户与\
  \ GUI 交互生成的事件。一旦 GUI 创建完成，所有用户与它的交互都会由事件调度线程自动处理。在这种情况下，“main”线程在 `main()` 方法中创建了\
  \ `BadSwingApp` 框架。当代码向 `JComboBox` 添加第一个项目时，甚至在 GUI 创建并显示之前，就触发了项目事件。由于“main”线程运行了\
  \ `BadSwingApp` 框架的创建，因此 main 线程也处理了该项目事件。这个程序存在两个问题。\n\n首先将事件处理器添加到组件，然后在 GUI 显示之前执行会触发该事件处理器的操作，这不是一个好习惯。将一条经验法则作为准则：在\
  \ GUI 构建代码的末尾将所有事件处理器添加到组件。你可以通过在 `initFrame()` 方法中将 `addItem()` 调用移到 `addItemListener()`\
  \ 调用之前来解决此问题。\n\n你需要将所有 GUI 代码（从 GUI 构建到使其可见）都在事件调度线程上运行。这也是一个简单的操作。你需要使用 `SwingUtilities`\
  \ 类的 `invokeLater(Runnable r)` 静态方法。该方法接受一个 `Runnable` 作为参数。它将 `Runnable` 安排到事件调度线程上运行。以下是启动\
  \ Swing 应用程序的正确方法。在前几章的任何示例中，你都没有遵循这种启动 Swing 应用程序的方式。你总是在 `main()` 方法中创建并显示框架，这使用了\
  \ `main` 线程来构建和显示 GUI。我没有遵循构建和显示 GUI 的正确方法，因为我的重点是演示我正在讨论的主题。现在是时候学习如何正确启动你的 Swing\
  \ 应用程序了。\n\n```\n// 启动 Swing 应用程序的正确方法\nSwingUtilities.invokeLater(() -> {\nBadSwingApp\
  \ badSwingApp = new BadSwingApp(\"A bad Swing App\");\nbadSwingApp.pack();\nbadSwingApp.setVisible(true);\n\
  });\n```\n\n如果你将清单 3-2 的 `main()` 方法中的现有代码替换为此代码，应用程序运行时将打印 `isEventDispatchThread():\
  \ true`，因为 `SwingUtilities` 类的 `invokeLater()` 方法会将 GUI 构建代码安排到事件调度线程上运行。一旦你以这种方式启动应用程序，就能保证应用程序的所有事件处理器都将在事件调度线程上执行。调用\
  \ `SwingUtilities.invokeLater(Runnable r)` 方法将启动事件调度线程（如果尚未启动）。\n\n`SwingUtilities.invokeLater()`\
  \ 方法会立即返回，其 `Runnable` 参数的 `run()` 方法会异步执行。也就是说，其 `run()` 方法的执行被排队到事件调度线程，以便稍后执行。\n\
  \n`SwingUtilities` 类中还有另一个重要的静态方法，名为 `invokeAndWait(Runnable r)`。此方法是同步执行的，并且直到其\
  \ `Runnable` 参数的 `run()` 方法在事件调度线程上执行完毕后才返回。此方法可能会抛出 `InterruptedException` 或 `InvocationTargetException`。\n\
  \n提示\n\n\n\n`SwingUtilities.invokeAndWait(Runnable r)` 方法不应从事件调度线程中调用，因为执行此方法调用的线程会一直等待，直到\
  \ `run()` 方法执行完毕。如果你从事件调度线程执行此方法，它将被排队到事件调度线程，而同一个线程（即事件调度线程）将会等待。在事件调度线程中执行此方法调用会生成运行时错误。\n\
  \n有时你可能希望使用 `SwingUtilities` 类的 `invokeAndWait()` 方法来启动 Swing 应用程序，而不是使用 `invokeLater()`\
  \ 方法。例如，以下代码片段启动了一个 Swing 应用程序，并在控制台打印一条消息，表明应用程序已启动：\n\n```\ntry {\nSwingUtilities.invokeAndWait(()\
  \ -> {\nJFrame frame = new JFrame();\nframe.pack();\nframe.setVisible(true);\n});\n\
  System.out.println(\"Swing 应用程序正在运行...\");\n/* 在此处执行一些非 Swing 相关的工作... */\n} catch\
  \ (Exception e) {\ne.printStackTrace();\n}\n```\n\n有时你可能需要在 Swing 应用程序中执行耗时的任务。如果你在事件调度线程上执行耗时任务，你的应用程序将变得无响应，这是用户所不喜欢的。你应该在事件调度线程之外的单独线程中执行长时间运行的任务。请注意，当任务完成时，你很可能想要更新\
  \ GUI 或在某个组件中显示结果，而该组件是 GUI 的一部分。这将要求你从非事件调度线程访问 Swing 组件。你可以使用 `SwingUtilities`\
  \ 类的 `invokeLater()` 和 `invokeAndWait()` 方法从你的单独线程更新 Swing 组件。然而，Swing 提供了一个 `SwingWorker`\
  \ 类，它使得在 Swing 应用程序中处理多线程变得容易。它负责启动一个新线程，并在新的后台线程中执行部分代码，在事件调度线程中执行另一部分代码。你需要了解\
  \ `SwingWorker` 类中的哪些方法将在新线程和事件调度线程中执行。\n\n`SwingWorker<T,V>` 类被声明为 `abstract`。类型参数\
  \ `T` 是此类产生的结果类型，类型参数 `V` 是中间结果类型。你必须创建继承自它的自定义类。它包含几个你需要编写自定义代码的关键方法：\n\n*   `doInBackground()`：这是你编写代码以执行耗时任务的方法。它在一个单独的工作线程中执行。如果你想发布中间结果，可以在此方法中调用\
  \ `SwingWorker` 类的 `publish()` 方法，该方法随后会调用其 `process()` 方法。请注意，你不应该在此方法中访问任何 Swing\
  \ 组件，因为此方法不在事件调度线程上执行。\n*   `process()`：此方法作为调用 `publish()` 方法的结果而被调用。此方法在事件调度线程上执行，你可以在此方法中自由访问任何\
  \ Swing 组件。对 `process()` 方法的一次调用可能是多次调用 `publish()` 方法的结果。以下是这两个方法的签名：`protected\
  \ final void publish(V... chunks)` `protected void process(List<V> chunks)` `publish()`\
  \ 方法接受可变参数。`process()` 方法将传递给 `publish()` 方法的所有参数打包在一个 `List` 中。如果多次调用 `publish()`\
  \ 方法被合并，`process()` 方法会在其 `List` 参数中获取所有这些参数。\n*   `done()`：当 `doInBackground()`\
  \ 方法正常或异常结束时，会在事件调度线程上调用 `done()` 方法。你可以在此方法中访问 Swing 组件。默认情况下，此方法不执行任何操作。\n*  \
  \ `execute()`：当你想要在单独的线程中开始执行任务时，调用此方法。此方法安排 `SwingWorker` 对象在工作线程上执行。\n*   `get()`：此方法返回\
  \ `doInBackground()` 方法返回的任务结果。如果 `SwingWorker` 对象尚未完成 `doInBackground()` 方法的执行，则对此方法的调用将阻塞，直到结果准备就绪。不建议在事件调度线程上调用此方法，因为它会阻塞所有事件直到返回。\n\
  *   `cancel(boolean mayInterruptIfRunning)`：如果任务仍在运行，此方法会取消该任务。如果任务尚未启动，则任务永远不会运行。请确保在\
  \ `doInBackground()` 方法中检查取消状态和任何中断，并相应地退出该方法。否则，你的进程将不会响应 `cancel()` 调用。\n*   `isCancelled()`：如果进程已被取消，则返回\
  \ `true`。否则，返回 `false`。\n*   `isDone()`：如果任务已完成，则返回 `true`。任务可能正常完成、通过抛出异常完成或通过取消完成。否则，返回\
  \ `false`。\n\n提示\n\n需要注意的是，`SwingWorker` 对象属于一次性使用类型。也就是说，你不能多次使用它。多次调用其 `execute()`\
  \ 方法不会产生任何效果。\n\n让我们开始讨论 `SwingWorker` 类的一个简单用法。假设你想执行一个耗时任务，该任务在单独的线程中计算一个数字，比如一个整数。你想通过轮询来获取处理结果。也就是说，你将定期检查进程是否已完成处理。以下是\
  \ `SwingWorker` 类的一个简单用法：\n\n```\n// 首先，创建一个自定义的 SwingWorker 类，例如 MySwingWorker。\n\
  public class MySwingWorker extends SwingWorker {\n@Override\nprotected Integer doInBackground()\
  \ throws Exception {\nint result = -1;\n// 编写代码以执行任务\nreturn result;\n}\n}\n// 创建你的\
  \ SwingWorker 类的对象并执行任务\nMySwingWorker mySW = new MySwingWorker();\nmySW.execute();\n\
  // 定期检查结果。你需要将 get() 调用包装在 try-catch 中以处理任何异常。\nif (mySW.isDone()) {\nint result\
  \ = mySW.get();\n}\n```\n\n\n\n清单 3-3 和清单 3-4 演示了`SwingWorker`类的工作方式。运行清单 3-4 中的代码时，会显示一个如图\
  \ 3-2 所示的框架。你可以通过点击`Start`按钮启动任务，也可以随时点击`Cancel`按钮取消任务。中间结果会显示在`JLabel`中。`SwingWorkerProcessor`类很简单。它接收一个`SwingWorkerFrame`、一个计数器和一个时间间隔。它计算从\
  \ 1 到计数器数值的总和。每将一个数字累加到结果后，它会休眠指定的时间间隔。它通过`process()`和`done()`方法显示中间迭代结果和最终结果。\n\
  \n```\n// SwingWorkerProcessor.java\npackage com.jdojo.swing.advanced;\nimport javax.swing.SwingWorker;\n\
  import java.util.List;\npublic class SwingWorkerProcessor extends SwingWorker {\n\
  private final SwingWorkerFrame frame;\nprivate int iteration;\nprivate int intervalInMillis;\n\
  public SwingWorkerProcessor(SwingWorkerFrame frame, int iteration,\nint intervalInMillis)\
  \ {\nthis.frame = frame;\nthis.iteration = iteration;\nif (this.iteration  data)\
  \ {\nfor (int counter : data) {\nframe.updateStatus(counter, iteration);\n}\n}\n\
  @Override\npublic void done() {\nframe.doneProcessing();\n}\n}\n清单 3-3.\n自定义 SwingWorker\
  \ 类\n```\n\n![A323071_2_En_3_Fig2_HTML.jpg](img/A323071_2_En_3_Fig2_HTML.jpg)\n\n\
  图 3-2.\n\n演示 SwingWorker 类的使用\n\n```\n// SwingWorkerFrame.java\npackage com.jdojo.swing.advanced;\n\
  import javax.swing.JFrame;\nimport java.awt.Container;\nimport javax.swing.JLabel;\n\
  import javax.swing.JButton;\nimport java.awt.BorderLayout;\nimport java.util.concurrent.ExecutionException;\n\
  import javax.swing.SwingUtilities;\npublic class SwingWorkerFrame extends JFrame\
  \ {\nString startMessage = \"请点击开始按钮...\";\nJLabel statusLabel = new JLabel(startMessage);\n\
  JButton startButton = new JButton(\"开始\");\nJButton cancelButton = new JButton(\"\
  取消\");\nSwingWorkerProcessor processor;\npublic SwingWorkerFrame(String title) {\n\
  super(title);\ninitFrame();\n}\nprivate void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n\
  Container contentPane = this.getContentPane();\ncancelButton.setEnabled(false);\n\
  contentPane.add(statusLabel, BorderLayout.NORTH);\ncontentPane.add(startButton,\
  \ BorderLayout.WEST);\ncontentPane.add(cancelButton, BorderLayout.EAST);\nstartButton.addActionListener(e\
  \ -> startProcessing());\ncancelButton.addActionListener(e -> cancelProcessing());\n\
  }\npublic void setButtonStatus(boolean canStart) {\nif (canStart) {\nstartButton.setEnabled(true);\n\
  cancelButton.setEnabled(false);\n} else {\nstartButton.setEnabled(false);\ncancelButton.setEnabled(true);\n\
  }\n}\npublic void startProcessing() {\nsetButtonStatus(false);\nprocessor = new\
  \ SwingWorkerProcessor(this, 10, 1000);\nprocessor.execute();\n}\npublic void cancelProcessing()\
  \ {\n// 取消处理\nprocessor.cancel(true);\nsetButtonStatus(true);\n}\npublic void updateStatus(int\
  \ counter, int total) {\nString msg = \"正在处理 \" + counter + \" / \" + total;\nstatusLabel.setText(msg);\n\
  }\npublic void doneProcessing() {\nif (processor.isCancelled()) {\nstatusLabel.setText(\"\
  处理已取消...\");\n} else {\ntry {\n// 获取处理结果\nint sum = processor.get();\nstatusLabel.setText(\"\
  处理完成。总和为 \" + sum);\n} catch (InterruptedException | ExecutionException e) {\ne.printStackTrace();\n\
  }\n}\nsetButtonStatus(true);\n}\npublic static void main(String[] args) {\nSwingUtilities.invokeLater(()\
  \ -> {\nSwingWorkerFrame frame = new SwingWorkerFrame(\"SwingWorker 框架\");\nframe.pack();\n\
  frame.setVisible(true);\n});\n}\n}\n清单 3-4.\n演示 SwingWorker 类如何工作的 Swing 应用程序\n\
  ```\n\n## 可插拔外观\n\nSwing 支持可插拔外观（L&F）。你可以使用`UIManager`类的`setLookAndFeel(String lafClassName)`静态方法更改\
  \ Swing 应用程序的 L&F。该方法会抛出受检异常。该方法的`lafClassName`参数是提供 L&F 的类的完全限定名。以下代码片段使用一个通用的`catch`块处理所有类型的异常，为\
  \ Windows 设置 L&F：\n\n```\nString windowsLAF= \"com.sun.java.swing.plaf.windows.WindowsLookAndFeel\"\
  ;\ntry {\nUIManager.setLookAndFeel(windowsLAF);\n} catch (Exception e) {\ne.printStackTrace();\n\
  }\n```\n\n`javax.swing.LookAndFeel`类的实例代表一种外观。JDK 9 为`UIManager`类新增了一个`createLookAndFeel()`静态方法，该方法可根据外观名称创建`LookAndFeel`。该方法声明如下：\n\
  \n```\nLookAndFeel createLookAndFeel(String name) throws UnsupportedLookAndFeelException\n\
  ```\n\n使用`createLookAndFeel()`方法，你可以避免像之前代码片段那样使用 L&F 的类名。以下代码片段使用 L&F 的名称“Windows”来设置\
  \ Windows L&F。下一个清单将展示如何获取所有已安装 L&F 的名称。\n\n```\ntry {\nUIManager.setLookAndFeel(UIManager.createLookAndFeel(\"\
  Windows\"));\n} catch (Exception e) {\ne.printStackTrace();\n}\n```\n\n通常，你会在启动\
  \ Swing 应用程序之前设置 L&F。如果在 GUI 显示后更改 L&F，则需要使用`SwingUtilities`类的`updateComponentTreeUI(container)`方法更新\
  \ GUI。更改 L&F 可能会导致组件大小发生变化，你可能需要再次使用`pack()`方法重新调整容器大小。在 GUI 显示后更改应用程序的 L&F 时，最终可能需要编写以下三行代码：\n\
  \n```\n// 假设 frame 是 JFrame 对象的引用，并且\n// windowsLAF 包含 Windows L&F 的类名，\n// 设置新的\
  \ L&F，更新 GUI，并调整框架大小。\nUIManager.setLookAndFeel(windowsLAF);\nSwingUtilities.updateComponentTreeUI(frame);\n\
  frame.pack();\n```\n\n`UIManager`类的以下两个方法返回默认 Java L&F 和系统 L&F 的类名：\n\n*   `String\
  \ getCrossPlatformLookAndFeelClassName()`\n*   `String getSystemLookAndFeelClassName()`\n\
  \n系统 L&F 为 Swing 组件提供原生系统的 L&F，并且会因系统而异。如果你希望应用程序看起来与原生 L&F 相同，可以使用以下代码实现，而无需担心应用程序运行机器上代表系统\
  \ L&F 的类的实际名称：\n\n```\n// 设置系统（或原生）L&F\nUIManager.setLookAndFeel(UIManager.getSystemLookAndFeelClassName());\n\
  ```\n\n并非总是需要为 Swing 应用程序设置 L&F。当你启动应用程序时，Swing 会自动使用默认的 Java L&F。如果对`UIManager.setLookAndFeel()`的调用失败，你的\
  \ Swing 应用程序将使用当前的 L&F，如果这是你第一次尝试设置新的 L&F，则当前 L&F 就是默认的 Java L&F。虽然可以创建自己的 L&F，但这并不容易。不过，Java\
  \ 5.0 添加了 Synth L&F，以方便创建可换肤的 L&F。本书不涉及 Synth。你可以从[`https://docs.oracle.com/javase/tutorial/uiswing/lookandfeel/synth.html`](https://docs.oracle.com/javase/tutorial/uiswing/lookandfeel/synth.html)开始了解\
  \ Synth。\n\n你可以使用`UIManager`类列出计算机上所有已安装的、可在 Swing 应用程序中使用的 L&F。清单 3-5 中的程序列出了你机器上所有可用的\
  \ L&F。输出结果是在 Windows 上运行程序时获得的；你可能会得到不同的输出。\n\n\n\n```\n// InstalledLookAndFeel.java\n\
  package com.jdojo.swing.advanced;\nimport javax.swing.UIManager;\nimport javax.swing.UIManager.LookAndFeelInfo;\n\
  public class InstalledLookAndFeel {\npublic static void main(String[] args) {\n\
  // 获取已安装的外观列表\nLookAndFeelInfo[] lafList = UIManager.getInstalledLookAndFeels();\n\
  // 打印所有已安装外观的名称和类名\nfor (LookAndFeelInfo lafInfo : lafList) {\nString name = lafInfo.getName();\n\
  String className = lafInfo.getClassName();\nSystem.out.println(\"名称: \" + name +\
  \ \", 类名: \" + className);\n}\n}\n}\n清单 3-5.\n了解您机器上已安装的外观\n```\n\n```\n名称: Metal,\
