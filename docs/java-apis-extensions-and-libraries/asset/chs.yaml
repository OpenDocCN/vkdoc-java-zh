  使用 BorderPane\");\nstage.show();\n}\nprivate VBox getCenter() {\n// 一个 HBox 中包含一个标签和一个文本字段\n\
  Label nameLbl = new Label(\"姓名:\");\nTextField nameFld = new TextField();\nHBox.setHgrow(nameFld,\
  \ Priority.ALWAYS);\nHBox nameFields = new HBox(nameLbl, nameFld);\n// 一个标签和一个文本区域\n\
