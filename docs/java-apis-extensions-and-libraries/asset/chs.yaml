  lafClassNameFld.setText(currentLafClassName);\nlafClassNameFld.setEditable(false);\n\
  // 构建面板\nJPanel topPanel = buildTopPanel();\nJPanel leftPanel = buildLeftPanel(currentLafName);\n\
  JPanel rightPanel = buildRightPanel();\ncontentPane.add(topPanel, BorderLayout.NORTH);\n\
  contentPane.add(leftPanel, BorderLayout.WEST);\ncontentPane.add(rightPanel, BorderLayout.CENTER);\n\
  }\nprivate void setLAF(String lafClassName) {\ntry {\nUIManager.setLookAndFeel(lafClassName);\n\
  SwingUtilities.updateComponentTreeUI(this);\nthis.pack();\n} catch (Exception e)\
  \ {\ne.printStackTrace();\n}\n}\nprivate JPanel buildTopPanel() {\nJPanel panel\
  \ = new JPanel();\npanel.add(lafClassNameFld);\npanel.setBorder(getBorder(\"外观类名\"\
  ));\nreturn panel;\n}\nprivate JPanel buildLeftPanel(String currentLafName) {\n\
  JPanel panel = new JPanel();\npanel.setBorder(getBorder(\"外观名称\"));\nBox vBox =\
  \ Box.createVerticalBox();\n// 为每个已安装的外观添加一个单选按钮\nfor (String lafName : installedLAF.keySet())\
  \ {\nJRadioButton radioBtn = new JRadioButton(lafName);\nif (lafName.equals(currentLafName))\
  \ {\nradioBtn.setSelected(true);\n}\nradioBtn.addItemListener(this::changeLAF);\n\
  vBox.add(radioBtn);\nradioGroup.add(radioBtn);\n}\npanel.add(vBox);\nreturn panel;\n\
  }\nprivate JPanel buildRightPanel() {\nJPanel panel = new JPanel();\npanel.setBorder(getBorder(\"\
  Swing 组件\"));\nBox hBox = Box.createHorizontalBox();\nhBox.add(nameLbl);\nhBox.add(nameFld);\n\
  hBox.add(saveBtn);\npanel.add(hBox);\nreturn panel;\n}\nprivate void changeLAF(ItemEvent\
  \ e) {\nif (e.getSource() instanceof AbstractButton) {\nAbstractButton btn = (AbstractButton)\
  \ e.getSource();\nString lafName = btn.getText();\nString lafClassName = installedLAF.get(lafName);\n\
  this.lafClassNameFld.setText(lafClassName);\nthis.setLAF(lafClassName);\n}\n}\n\
  private Border getBorder(String title) {\nBorder etched = BorderFactory.createEtchedBorder(EtchedBorder.LOWERED);\n\
  Border titledBorder = BorderFactory.createTitledBorder(etched, title);\nreturn titledBorder;\n\
  }\npublic static void main(String[] args) {\nSwingUtilities.invokeLater(() -> {\n\
  InstalledLAF lafApp = new InstalledLAF(\"Swing 外观\");\nlafApp.pack();\nlafApp.setVisible(true);\n\
  });\n}\n}\n清单 3-6.\n在当前平台上试验已安装的外观\n```\n\n\n\n## 拖放\n\n拖放（DnD）是一种在应用程序中传输数据的方式。你也可以通过剪贴板使用剪切、复制和粘贴操作来传输数据。\n\
  \nDnD 允许你通过拖动一个组件并将其放到另一个组件上来传输数据。被拖动的组件称为**拖动源**；它提供要传输的数据。拖动源被放置到的组件称为**放置目标**；它是数据的接收者。放置目标负责接受放置操作并导入拖动源提供的数据。数据传输通过\
  \ `Transferable` 完成。`Transferable` 是 `java.awt.datatransfer` 包中的一个接口，该包位于 `java.datatransfer`\
  \ 模块中。`java.desktop` 模块会传递性地读取 `java.datatransfer` 模块，因此如果你的模块读取了 `java.desktop`\
  \ 模块，你的模块也会自动读取 `java.datatransfer` 模块。DnD 机制如图 3-5 所示。\n\n![A323071_2_En_3_Fig5_HTML.gif](img/A323071_2_En_3_Fig5_HTML.gif)\n\
  \n图 3-5.\n\nDnD 中使用的数据传输机制\n\n`Transferable` 接口包含以下三个方法：\n\n*   `DataFlavor[] getTransferDataFlavors()`\n\
  *   `boolean isDataFlavorSupported(DataFlavor flavor)`\n*   `Object getTransferData(DataFlavor\
  \ flavor) throws UnsupportedFlavorException, IOException`\n\n在学习 `Transferable`\
  \ 接口的三个方法之前，你需要了解为什么需要使用 `Transferable` 对象通过 DnD 传输数据。为什么放置目标不能直接从拖动源获取数据？你可以在同一个\
  \ Java 应用程序内、两个 Java 应用程序之间、从原生应用程序到 Java 应用程序以及从 Java 应用程序到原生应用程序之间使用 DnD 传输数据。数据传输的范围非常广泛，并且支持传输多种多样的数据。`Transferable`\
  \ 接口提供了一种将数据及其类型打包到一个对象中的机制。接收者可以查询此对象以了解其持有的数据类型，并在数据符合接收者要求时导入数据。`DataFlavor`\
  \ 类的对象封装了数据的详细信息。我不详细讨论 `DataFlavor` 类。它包含多个用于定义数据类型的常量；例如，`DataFlavor.stringFlavor`\
  \ 表示 Java 的 Unicode 字符串类。`Transferable` 接口的前两个方法提供了数据的详细信息。第三个方法将数据本身作为 `Object`\
  \ 返回。放置目标将使用 `getTransferData()` 方法来获取拖动源提供的数据。\n\n在 Swing 中使用 DnD 很容易。大多数情况下，你只需要编写一行代码即可开始使用\
  \ DnD。你只需要在组件上启用拖动功能，如下所示：\n\n```\n// 为 myComponent 启用 DnD\nmyComponent.setDragEnabled(true);\n\
  ```\n\n之后，你就可以开始在 `myComponent` 上使用 DnD 了。使用 DnD 是与 UI 相关的。在 Windows 平台上，你需要在拖动源上按下鼠标左键来开始拖动操作。要持续拖动拖动源，你需要在按住鼠标左键的同时移动鼠标。当鼠标指针位于放置目标上时释放鼠标左键，即可执行放置操作。在整个\
  \ DnD 过程中，用户会收到视觉反馈。\n\n所有文本组件（`JFileChooser`、`JColorChooser`、`JList`、`JTree` 和\
  \ `JTable`）都内置了对 DnD 的拖动支持。所有文本组件和 `JColorChooser` 都内置了对 DnD 的放置支持。例如，假设你有一个名为 `nameFld`\
  \ 的 `JTextField` 和一个名为 `descTxtArea` 的 `JTextArea`。要在它们之间开始使用 DnD，你需要编写以下两行代码：\n\
  \n```\nnameFld.setDragEnabled(true);\ndescTxtArea.setDragEnabled(true);\n```\n\n\
  你可以选择 `JTextField` 中的文本，将其拖动并放到 `JTextArea` 上。`JTextField` 中选中的文本会被传输到 `JTextArea`。你也可以将文本从\
  \ `JTextArea` 拖动到 `JTextField`。\n\n数据是如何从一个文本组件传输到另一个文本组件的？它是被复制还是移动？答案取决于拖动源和用户的操作。拖动源声明其支持的操作。用户的操作决定了实际执行的操作。例如，在\
  \ Windows 平台上，简单的拖动表示 `MOVE` 操作，而按住 Ctrl 键拖动表示 `COPY` 操作，按住 Ctrl+Shift 键拖动表示 `LINK`\
  \ 操作。操作由 `TransferHandler` 类中声明的常量表示：\n\n*   `TransferHandler.COPY`\n*   `TransferHandler.MOVE`\n\
  *   `TransferHandler.COPY_OR_MOVE`\n*   `TransferHandler.LINK`\n*   `TransferHandler.NONE`\n\
  \n`JList`、`JTable` 和 `JTree` 组件没有内置的放置操作。原因是当拖动源被放到这些组件上时，无法预测用户的意图。你需要编写代码来为这些组件实现放置操作。请注意，它们内置了对拖动操作的支持。DnD\
  \ 会为你提供关于这些组件上放置位置的适当信息。这些组件允许你使用它们的 `setDropMode(DropMode dm)` 方法来指定放置模式。放置模式决定了在\
  \ DnD 操作期间如何跟踪放置位置。放置模式由 `java.swing.DropMode` 枚举中的常量表示，如表 3-1 所列。\n\n表 3-1.\n\n\
  用于 JList、JTree 和 JTable 的 DropMode 枚举常量\n\n| DropMode 枚举常量 | 使用的组件 | 描述 |\n| ---\
  \ | --- | --- |\n| `ON` | `JList` `JTree` `JTable` | 使用现有项目的索引来跟踪放置位置。 |\n| `INSERT`\
  \ | `JList` `JTree` `JTable` | 将放置位置跟踪为数据将要插入的位置。 |\n| `INSERT_COLS` | `JTable`\
  \ | 根据新列将插入的列索引来跟踪放置位置。 |\n| `INSERT_ROWS` | `JTable` | 根据新行将插入的行索引来跟踪放置位置。 |\n\
  | `ON_OR_INSERT` | `JList` `JTree` `JTable` | 同时以 `ON` 和 `INSERT` 方式跟踪放置位置。 |\n\
  | `ON_OR_INSERT_ROWS ON_OR_INSERT_COLS` | `JTable` | 相对于行或列跟踪 `ON` 或 `INSERT`。 |\n\
  | `USE_SELECTION` | `JList` `JTree` `JTable` | 其工作方式与 `ON` 相同。这是默认的放置模式。如果你拖动到一个已被选中的组件上，此模式会将选择更改为鼠标光标正在拖动的项目。然而，`ON`\
  \ 放置模式会保持用户的选择不变，并临时选择鼠标光标拖动的项目。`ON` 是更好的用户体验选择。此选项仅出于向后兼容性而提供。 |\n\n让我们编写一些代码来在\
  \ `JList` 上使用 DnD。你需要执行以下操作：\n\n*   创建一个继承自 `javax.swing.TransferHandler` 类的新类。\n\
  *   在新类中重写一些方法来处理数据传输。\n*   使用 `JList` 的 `setTransferHandler()` 方法来设置你的传输处理程序类的实例。\n\
  \n清单 3-7 包含了用于 `JList` 的自定义 `TransferHandler` 的代码。\n\n\n\n```\n// ListTransferHandler.java\n\
  package com.jdojo.swing.advanced;\nimport java.awt.datatransfer.DataFlavor;\nimport\
  \ java.awt.datatransfer.StringSelection;\nimport java.awt.datatransfer.Transferable;\n\
  import java.awt.datatransfer.UnsupportedFlavorException;\nimport java.io.IOException;\n\
  import javax.swing.DefaultListModel;\nimport javax.swing.JComponent;\nimport javax.swing.JList;\n\
  import javax.swing.TransferHandler;\npublic class ListTransferHandler extends TransferHandler\
  \ {\n@Override\npublic int getSourceActions(JComponent c) {\nreturn TransferHandler.COPY_OR_MOVE;\n\
  }\n@Override\nprotected Transferable createTransferable(JComponent source) {\n//\
  \ 抑制未经检查的强制转换警告\n@SuppressWarnings(\"unchecked\")\nJList sourceList = (JList) source;\n\
  String data = sourceList.getSelectedValue();\n// 仅使用列表中第一个选中的项\nTransferable t =\
  \ new StringSelection(data);\nreturn t;\n}\n@Override\nprotected void exportDone(JComponent\
  \ source, Transferable data, int action) {\n// 抑制未经检查的强制转换警告\n@SuppressWarnings(\"\
  unchecked\")\nJList sourceList = (JList) source;\nString movedItem = sourceList.getSelectedValue();\n\
  if (action == TransferHandler.MOVE) {\n// 移除被移动的项\nDefaultListModel listModel\n\
  = (DefaultListModel) sourceList.getModel();\nlistModel.removeElement(movedItem);\n\
  }\n}\n@Override\npublic boolean canImport(TransferHandler.TransferSupport support)\
  \ {\n// 我们只支持拖放，不支持复制粘贴\nif (!support.isDrop()) {\nreturn false;\n}\nreturn support.isDataFlavorSupported(DataFlavor.stringFlavor);\n\
  }\n@Override\npublic boolean importData(TransferHandler.TransferSupport support)\
  \ {\n// 处理粘贴操作时需要此检查\nif (!this.canImport(support)) {\nreturn false;\n}\n// 获取数据\n\
  Transferable t = support.getTransferable();\nString data = null;\ntry {\ndata =\
  \ (String) t.getTransferData(DataFlavor.stringFlavor);\nif (data == null) {\nreturn\
  \ false;\n}\n} catch (UnsupportedFlavorException | IOException e) {\ne.printStackTrace();\n\
  return false;\n}\n// 获取 JList 的放置位置\nJList.DropLocation dropLocation = (JList.DropLocation)\
  \ support.getDropLocation();\nint dropIndex = dropLocation.getIndex();\n// 抑制未经检查的强制转换警告\n\
  @SuppressWarnings(\"unchecked\")\nJList targetList = (JList) support.getComponent();\n\
  DefaultListModel listModel\n= (DefaultListModel) targetList.getModel();\nif (dropLocation.isInsert())\
  \ {\nlistModel.add(dropIndex, data);\n} else {\nlistModel.set(dropIndex, data);\n\
  }\nreturn true;\n}\n}\n清单 3-7.\nJList 的自定义 TransferHandler\n```\n\n如果你只想支持对 `JList`\
  \ 的拖放操作，只需在你的传输处理器类中重写两个方法——`canImport()` 和 `importData()`。如果放置目标想要传输数据，`canImport()`\
  \ 方法返回 `true`，否则返回 `false`。在你的代码中，你确保这是一个拖放操作，并且拖拽源提供的是字符串数据。请注意，如果你为一个组件设置了自定义的\
  \ `TransferHandler` 对象，同一个 `TransferHandler` 对象也会被用于剪切-复制-粘贴操作。你的代码只支持拖放操作。`importData()`\
  \ 方法从 `Transferable` 对象中读取数据，并根据用户的操作在 `JList` 中插入或替换项。\n\n`JList` 的默认 `TransferHandler`\
  \ 处理拖拽动作并提供数据。然而，一旦你设置了自己的 `TransferHandler`，你就会失去默认功能，并且需要自己为你的 `TransferHandler`\
  \ 添加该功能。如果你想支持拖拽动作，你需要为 `createTransferable()` 和 `getSourceActions()` 方法编写自定义代码。第一个方法将数据打包到\
  \ `Transferable` 对象中，第二个方法返回拖拽源支持的动作类型。`StringSelection` 是 `Transferable` 接口的一个实现，用于传输\
  \ Java 字符串。\n\n如果你的拖拽源支持 `MOVE` 动作，你应该提供在移动动作后移除该项的代码。你可以在 `exportDone()` 方法中编写清理代码，如清单\
  \ 3-7 所示。\n\n清单 3-8 包含显示一个 `JTextField` 和两个 `JList` 的代码，让你可以演示 JList 的拖放功能。图 3-6\
  \ 显示了运行清单 3-8 中的程序时得到的 `JFrame`。你可以在三个组件（`JTextField` 和两个 `JList`）之间使用拖放功能。代码中有一个\
  \ bug。如果你在 `JList` 中拖拽一个项并将其放置到同一个 `JList` 中，什么也不会发生。这留作练习，让你找出这个 bug 并修复它。我给你一个提示：尝试在\
  \ `ListTransferHandler` 类的 `importData()` 方法中，先将元素从同一个 `List` 中移除，然后再添加。此外，这个自定义代码只支持\
  \ `JList` 中的单选。你可以自定义 `ListTransferHandler` 类中的代码，以处理 `JList` 中的多选。\n\n![A323071_2_En_3_Fig6_HTML.jpg](img/A323071_2_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6.\n一个包含几个支持拖放功能的 Swing 组件的 JFrame\n\n```\n// DragAndDropApp.java\npackage\
  \ com.jdojo.swing.advanced;\nimport java.awt.BorderLayout;\nimport java.awt.Container;\n\
  import javax.swing.Box;\nimport javax.swing.DefaultListModel;\nimport javax.swing.DropMode;\n\
  import javax.swing.JFrame;\nimport javax.swing.JLabel;\nimport javax.swing.JList;\n\
  import javax.swing.JScrollPane;\nimport javax.swing.JTextField;\nimport javax.swing.ListSelectionModel;\n\
  import javax.swing.SwingUtilities;\npublic class DragAndDropApp extends JFrame {\n\
  private JLabel newLabel = new JLabel(\"新建:\");\nprivate JTextField newTextField\
  \ = new JTextField(10);\nprivate JLabel sourceLabel = new JLabel(\"源列表\");\nprivate\
  \ JLabel destLabel = new JLabel(\"目标列表\");\nprivate JList sourceList = new JList(new\
  \ DefaultListModel());\nprivate JList destList = new JList(new DefaultListModel());\n\
  public DragAndDropApp(String title) {\nsuper(title);\npopulateList();\ninitFrame();\n\
  }\nprivate void initFrame() {\nContainer contentPane = this.getContentPane();\n\
  Box nameBox = Box.createHorizontalBox();\nnameBox.add(newLabel);\nnameBox.add(newTextField);\n\
  Box sourceBox = Box.createVerticalBox();\nsourceBox.add(sourceLabel);\nsourceBox.add(new\
  \ JScrollPane(sourceList));\nBox destBox = Box.createVerticalBox();\ndestBox.add(destLabel);\n\
  destBox.add(new JScrollPane(destList));\nBox listBox = Box.createHorizontalBox();\n\
  listBox.add(sourceBox);\nlistBox.add(destBox);\nBox allBox = Box.createVerticalBox();\n\
  allBox.add(nameBox);\nallBox.add(listBox);\ncontentPane.add(allBox, BorderLayout.CENTER);\n\
  // 我们的列表只支持单选\nsourceList.setSelectionMode(ListSelectionModel.SINGLE_SELECTION);\n\
  destList.setSelectionMode(ListSelectionModel.SINGLE_SELECTION);\n// 为组件启用拖放功能\n\
  newTextField.setDragEnabled(true);\nsourceList.setDragEnabled(true);\ndestList.setDragEnabled(true);\n\
  // 将放置模式设置为插入\nsourceList.setDropMode(DropMode.INSERT);\ndestList.setDropMode(DropMode.INSERT);\n\
  // 设置传输处理器\nsourceList.setTransferHandler(new ListTransferHandler());\ndestList.setTransferHandler(new\
  \ ListTransferHandler());\n}\npublic void populateList() {\nDefaultListModel sourceModel\n\
  = (DefaultListModel) sourceList.getModel();\nDefaultListModel destModel\n= (DefaultListModel)\
  \ destList.getModel();\nfor (int i = 0; i < 5; i++) {\nsourceModel.addElement(\"\
  源项 \" + (i + 1));\ndestModel.addElement(\"目标项 \" + (i + 1));\n}\n}\npublic static\
  \ void main(String[] args) {\nSwingUtilities.invokeLater(() -> {\nDragAndDropApp\
  \ frame = new DragAndDropApp(\"拖放框架\");\nframe.pack();\nframe.setVisible(true);\n\
  });\n}\n}\n清单 3-8.\n使用拖放功能在 Swing 组件之间传输数据\n```\n\n\n\n## 多文档界面应用程序\n\n从广义上讲，根据应用程序如何组织窗口以向用户呈现信息，可以分为三种类型。它们是：\n\
  \n*   单文档界面 (SDI)\n*   多文档界面 (MDI)\n*   选项卡式文档界面 (TDI)\n\n在 SDI 应用程序中，任何时候都只能打开一个窗口。在\
  \ MDI 应用程序中，会打开一个主窗口（也称为父窗口），并在主窗口内打开多个子窗口。在 TDI 应用程序中，会打开一个窗口，该窗口内以选项卡形式打开多个子窗口。Microsoft\
  \ 记事本是 SDI 应用程序的一个例子，Microsoft Word 97 是 MDI 应用程序的一个例子（较新版本的 Microsoft Word 是 SDI），而\
  \ Google Chrome 浏览器则是 TDI 应用程序的一个例子。\n\n你可以使用 Swing 来开发 SDI、MDI 和 TDI 应用程序。在 MDI\
  \ 应用程序中，你可以打开多个框架，这些框架将是 `JInternalFrame` 类的实例。你可以通过多种方式组织多个内部框架。例如，你可以最大化或最小化它们；你可以以平铺方式并排查看它们，或者以层叠形式查看它们。以下是你在\
  \ MDI 应用程序中将使用的四个类：\n\n*   `JInternalFrame`\n*   `JDesktopPane`\n*   `DesktopManager`\n\
  *   `JFrame`\n\n`JInternalFrame` 类的实例充当一个子窗口，它始终显示在其父窗口的区域内部。在大多数情况下，使用它就像使用 `JFrame`\
  \ 一样。你将 Swing 组件添加到其内容窗格，使用 `pack()` 方法打包它们，并使用 `setVisible(true)` 方法使其可见。如果你想监听窗口事件，例如激活、停用等，你需要向\
  \ `JInternalFrame` 添加一个 `InternalFrameListener`，而不是用于 `JFrame` 的 `WindowListener`。你可以在其构造函数中或使用\
  \ setter 方法设置各种属性。以下代码片段展示了如何使用 `JInternalFrame` 类的实例：\n\n```\nString title = \"\
  A Child Window\";\nBoolean resizable = true;\nBoolean closable = true;\nBoolean\
  \ maximizable = true;\nBoolean iconifiable = true;\nJInternalFrame iFrame =\nnew\
  \ JInternalFrame(title, resizable, closable, maximizable, iconifiable);\n// 使用 iFrame.add(...)\
  \ 向 iFrame 添加组件\n// 打包框架并使其可见\niFrame.pack();\niFrame.setVisible(true);\n```\n\n\
  `JDesktopPane` 类的实例用作所有 `JInternalFrame` 类实例（子窗口）的容器（不是顶级容器）。它使用 `null` 布局管理器。你将其添加到\
  \ `JFrame`。你最好将桌面面板的引用作为实例变量存储在 `JFrame` 中，以便以后可以访问它来处理子窗口。\n\n```\n// 创建一个桌面面板\n\
  JDesktopPane desktopPane = new JDesktopPane();\n// 将所有 JInternalFrame 添加到 desktopPane\n\
  desktopPane.add(iFrame);\n```\n\n你可以使用 `JDesktopPane` 的 `getAllFrames()` 方法获取添加到其中的所有\
  \ `JInternalFrame`。\n\n```\n// 获取子窗口列表\nJInternalFrame[] frames = desktopPane.getAllFrames();\n\
  ```\n\n`JDesktopPane` 使用 `DesktopManager` 接口的实例来管理所有内部框架。`DefaultDesktopManager`\
  \ 类是 `DesktopManager` 接口的一个实现。如果你想自定义桌面管理器管理内部框架的方式，你需要创建自己的类，继承自 `DefaultDesktopManager`。你可以使用\
  \ `JDesktopPane` 的 `setDesktopManager()` 方法设置自定义桌面管理器。桌面管理器有许多有用的方法。例如，如果你想以编程方式关闭一个内部框架，可以使用其\
  \ `closeFrame()` 方法。用户也可以通过右键菜单关闭内部框架（如果你将其设置为可关闭的话）。你可以使用桌面面板的 `getDesktopManager()`\
  \ 方法获取桌面管理器的引用。\n\n```\n// 关闭名为 frame1 的内部框架\ndesktopPane.getDesktopManager().closeFrame(frame1);\n\
  ```\n\n`JFrame` 类用作顶级容器，并充当 `JInternalFrame` 的父窗口。它包含一个 `JDesktopPane` 的实例。请注意，`JFrame`\
  \ 的 `pack()` 方法在 MDI 应用程序中不会起任何作用，因为它唯一的子组件（桌面面板）使用了 `null` 布局管理器。你必须显式设置其大小。通常，你会以最大化方式显示\
  \ `JFrame`。\n\n清单 3-9 演示了如何开发一个 MDI 应用程序。Swing 没有提供将内部框架组织为平铺或层叠窗口的方法，而这在任何基于 Windows\
  \ 的 MDI 应用程序中都是很常见的。你可以通过应用简单的逻辑来组织内部框架，并提供菜单项来使用它们，从而在 Swing MDI 应用程序中构建平铺和层叠功能。图\
  \ 3-7 显示了运行清单 3-9 中的程序时显示的屏幕。\n\n![A323071_2_En_3_Fig7_HTML.jpg](img/A323071_2_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7.\n\n在 Windows 上运行的 Swing MDI 应用程序\n\n```\n// MDIApp.java\npackage com.jdojo.swing.advanced;\n\
  import java.awt.BorderLayout;\nimport java.awt.Dimension;\nimport javax.swing.JDesktopPane;\n\
  import javax.swing.JFrame;\nimport javax.swing.JInternalFrame;\nimport javax.swing.JLabel;\n\
  import javax.swing.SwingUtilities;\nimport javax.swing.UIManager;\npublic class\
  \ MDIApp extends JFrame {\nprivate final JDesktopPane desktopPane = new JDesktopPane();\n\
  public MDIApp(String title) {\nsuper(title);\ninitFrame();\n}\npublic void initFrame()\
  \ {\nJInternalFrame frame1 = new JInternalFrame(\"Frame 1\", true, true, true, true);\n\
  JInternalFrame frame2\n= new JInternalFrame(\"Frame 2\", true, true, true, true);\n\
  JLabel label1 = new JLabel(\"Frame 1 contents...\");\nframe1.getContentPane().add(label1);\n\
  frame1.pack();\nframe1.setVisible(true);\nJLabel label2 = new JLabel(\"Frame 2 contents...\"\
  );\nframe2.getContentPane().add(label2);\nframe2.pack();\nframe2.setVisible(true);\n\
  // JInternalFrame 的默认位置是 (0,0)。\n// 设置 frame2 的位置，以便两个框架都可见\nint x2 = frame1.getX()\
  \ + frame1.getWidth() + 10;\nint y2 = frame1.getY();\nframe2.setLocation(x2, y2);\n\
  // 将两个内部框架添加到桌面面板\ndesktopPane.add(frame1);\ndesktopPane.add(frame2);\n// 最后将桌面面板添加到\
  \ JFrame\nthis.add(desktopPane, BorderLayout.CENTER);\n// 需要为 JFrame 设置最小尺寸\nthis.setMinimumSize(new\
  \ Dimension(300, 300));\n}\npublic static void main(String[] args) {\ntry {\n//\
  \ 设置系统外观\nUIManager.setLookAndFeel(UIManager.getSystemLookAndFeelClassName());\n\
  } catch (Exception e) {\ne.printStackTrace();\n}\nSwingUtilities.invokeLater(()\
  \ -> {\nMDIApp frame = new MDIApp(\"MDI Frame\");\nframe.pack();\nframe.setVisible(true);\n\
  frame.setExtendedState(frame.MAXIMIZED_BOTH);\n});\n}\n}\n清单 3-9.\n使用 Swing 开发 MDI\
  \ 应用程序\n```\n\n当使用 MDI 应用程序时，你需要使用 `JOptionPane` 的 `showInternalXxxDialog()` 方法，而不是\
  \ `showXxxDialog()` 方法。例如，在 MDI 应用程序中，你使用 `JOptionPane.showInternalMessageDialog()`\
  \ 方法而不是 `JOptionPane.showMessageDialog()`。`showInternalXxxDialog()` 版本显示的对话框始终位于顶级容器内，而\
  \ `showXxxDialog()` 版本显示的对话框可以拖拽到 MDI 应用程序顶级容器的边界之外。\n\n提示\n\n预先决定是要开发 SDI、MDI 还是\
  \ TDI 应用程序非常重要。从一种类型更改为另一种类型并非易事。\n\n\n\n## Toolkit 类\n\nJava 需要与原生系统通信以提供大部分基本\
  \ GUI 功能。它在每个平台上使用特定的类来实现这一点。`java.awt.Toolkit` 是一个抽象类。Java 在每个平台上使用 `Toolkit` 类的子类与原生工具包系统通信。`Toolkit`\
  \ 类提供了一个静态的 `getDefaultToolkit()` 工厂方法，用于获取特定平台上使用的工具包对象。`Toolkit` 类包含一些有用的方法，让你能够处理屏幕尺寸和分辨率、访问系统剪贴板、发出蜂鸣声等。表\
  \ 3-2 列出了 `Toolkit` 类的一些方法。该表包含会抛出 `HeadlessException` 的方法。当在不支持键盘、显示器或鼠标的环境中调用依赖于键盘、显示器或鼠标的代码时，会抛出\
  \ `HeadlessException`。\n\n表 3-2.\n\njava.awt.Toolkit 类的几个有用方法\n\n| Toolkit 类的方法\
  \ | 描述 |\n| --- | --- |\n| `abstract void beep()` | 发出蜂鸣声。当应用程序发生严重错误时，可用于提醒用户。\
  \ |\n| `static Toolkit getDefaultToolkit()` | 返回应用程序中使用的当前 `Toolkit` 实例。 |\n| `abstract\
  \ int getScreenResolution() throws HeadlessException` | 以每英寸点数返回屏幕分辨率。 |\n| `abstract\
  \ Dimension getScreenSize() throws HeadlessException` | 返回一个 `Dimension` 对象，其中包含屏幕的宽度和高度（以像素为单位）。\
  \ |\n| `abstract Clipboard getSystemClipboard() throws HeadlessException` | 返回一个表示系统剪贴板的\
  \ `Clipboard` 类实例。 |\n\n以下代码片段展示了一些如何使用 `Toolkit` 类的示例：\n\n```\n// 将名为 dataTextArea\
  \ 的 JTextArea 中选中的文本复制到系统剪贴板。\n// 如果没有选中文本，则发出蜂鸣声并显示一条消息。\nToolkit toolkit = Toolkit.getDefaultToolkit();\n\
  String data = dataTextArea.getSelectedText();\nif (data == null || data.equals(\"\
  \")) {\ntoolkit.beep();\nJOptionPane.showMessageDialog(null, \"请选择要复制的文本。\");\n\
  } else {\nClipboard clipboard = toolkit.getSystemClipboard();\n// 将数据作为字符串打包到 Transferable\
  \ 对象中\nTransferable transferableData = new StringSelection(data);\nclipboard.setContents(transferableData,\
  \ null);\n}\n// 将系统剪贴板中的文本粘贴到名为 dataTextArea 的 TextArea 中。\n// 如果系统剪贴板中没有文本，则发出蜂鸣声并显示一条消息。\n\
  Toolkit toolkit = Toolkit.getDefaultToolkit();\nClipboard clipboard = toolkit.getSystemClipboard();\n\
  Transferable data = clipboard.getContents(null);\nif (data != null && data.isDataFlavorSupported(DataFlavor.stringFlavor))\
  \ {\ntry {\nString text = (String)data.getTransferData(DataFlavor.stringFlavor);\n\
  dataTextArea.replaceSelection(text);\n} catch (Exception e) {\ne.printStackTrace();\n\
  }\n} else {\ntoolkit.beep();\nJOptionPane.showMessageDialog(null, \"系统剪贴板中没有可粘贴的文本\"\
  );\n}\n// 将 JFrame 的大小设置为屏幕大小。请注意，你也可以使用\n// frame.setExtendedState(JFrame.MAXIMIZED_BOTH)\
  \ 方法让 JFrame 使用全屏区域。\nJFrame frame = new JFrame(\"我的框架\");\nframe.setSize(Toolkit.getDefaultToolkit().getScreenSize());\n\
  ```\n\n## 使用 JLayer 装饰组件\n\n`JLayer` 类代表一个 Swing 组件。它用于装饰另一个组件，该组件被称为目标组件。它允许你在其装饰的组件之上执行自定义绘制。它还可以接收在其边界内生成的所有事件的通知。换句话说，`JLayer`\
  \ 允许你根据其装饰的组件中发生的事件执行自定义处理。\n\n当你使用 `JLayer` 类时，还需要使用 `LayerUI<V extends Component>`\
  \ 类。`JLayer` 将其工作委托给 `LayerUI` 进行自定义绘制和事件处理。要使用 `JLayer` 执行任何有意义的操作，你需要创建 `LayerUI`\
  \ 类的子类，并重写其适当的方法来编写你的代码。在 Swing 应用程序中使用 `JLayer` 需要以下步骤。\n\n*   创建 `LayerUI` 类的子类。重写其各种方法以实现组件的自定义处理。`LayerUI`\
  \ 类接受一个类型参数，即它将处理的组件的类型。\n*   创建 `LayerUI` 子类的对象。\n*   创建一个你想要用 `JLayer` 装饰的 Swing\
  \ 组件（目标组件），例如 `JTextField`、`JPanel` 等。\n*   创建 `JLayer` 类的对象，将目标组件和 `LayerUI` 子类的对象传递给其构造函数。\n\
  *   将 `JLayer` 对象添加到你的容器中，而不是目标组件。\n\n让我们看看 `JLayer` 的实际应用。假设你想使用 `JLayer` 在 `JTextField`\
  \ 组件周围绘制一个蓝色矩形边框。第一步是创建 `LayerUI` 的子类。清单 3-10 包含一个继承自 `LayerUI` 类的 `BlueBorderUI`\
  \ 类的代码。它重写了 `LayerUI` 类的 `paint()` 方法。\n\n```\n// BlueBorderUI.java\npackage com.jdojo.swing.advanced;\n\
  import java.awt.Color;\nimport java.awt.Graphics;\nimport java.awt.Graphics2D;\n\
  import javax.swing.JComponent;\nimport javax.swing.JTextField;\nimport javax.swing.plaf.LayerUI;\n\
  public class BlueBorderUI extends LayerUI {\n@Override\npublic void paint(Graphics\
  \ g, JComponent layer) {\n// 先让超类绘制组件\nsuper.paint(g, layer);\n// 创建 Graphics 对象的副本\n\
  Graphics gTemp = (Graphics2D) g.create();\n// 获取层的尺寸\nint width = layer.getWidth();\n\
  int height = layer.getHeight();\n// 绘制一个蓝色矩形作为自定义边框\ngTemp.setColor(Color.BLUE);\n\
  gTemp.drawRect(0, 0, width, height);\n// 销毁 Graphics 对象的副本\ngTemp.dispose();\n}\n\
  }\n清单 3-10.\nLayerUI 类的子类，用于在层周围绘制蓝色边框\n```\n\n每当需要绘制目标组件时，都会调用 `LayerUI` 的 `paint()`\
  \ 方法。`LayerUI` 类的方法接收两个参数。第一个参数是 `Graphics` 对象的引用，你可以用它来在组件上绘制。第二个参数是 `JLayer` 对象的引用，而不是目标组件。你可以使用第二个参数获取目标组件（即\
  \ `JLayer` 正在装饰的组件）的引用。你可以将第二个参数转换为 `JLayer` 类型，并使用 `JLayer` 类的 `getView()` 方法，该方法返回目标组件的引用。`paint()`\
  \ 方法内部的逻辑很简单。它创建其 `Graphics` 参数的副本，并在组件周围绘制一个蓝色矩形。传递给此方法的 `Graphics` 对象已设置为绘制此组件。建议复制传入的\
  \ `Graphics` 对象，因为对传入的 `Graphics` 对象进行更改可能会导致意外结果。\n\n现在，你可以将 `BlueBorderUI` 与 `JLayer`\
  \ 一起使用，在 `JTextField` 周围绘制蓝色边框。以下代码片段展示了逻辑：\n\n\n\n```\n// 像往常一样创建一个 JTextField\n\
  JTextField firstName = new JTextField(10);\n// 创建一个 BlueBorderUI 对象\nLayerUI ui\
  \ = new BlueBorderUI();\n// 通过包装 JTextField 和 BlueBorderUI 创建一个 JLayer 对象\nJLayer\
  \ layer = new JLayer(firstName, ui);\n// 将 layer 对象添加到容器中，例如框架的内容面板。\n// 注意：添加到容器的是\
  \ layer，而不是组件本身。\ncontentPane.add(layer)\n```\n\n目标组件和 `LayerUI` 可以在创建 `JLayer`\
  \ 时传入。如果你在创建 `JLayer` 时不知道目标组件和/或 `LayerUI`，可以稍后使用 `JLayer` 类的 `setView()` 和 `setUI()`\
  \ 方法传入。`JLayer` 类的 `getView()` 和 `getUI()` 方法分别用于获取当前目标组件和 `JLayer` 的 `LayerUI`\
  \ 引用。\n\n清单 3-11 演示了如何使用 `JLayer` 在两个 `JTextField` 组件周围绘制边框。代码简单明了。运行此程序时，它会在一个\
  \ `JFrame` 中显示两个带有蓝色边框的 `JTextField` 组件。\n\n```\n// JLayerBlueBorderFrame.java\n\
  package com.jdojo.swing.advanced;\nimport java.awt.FlowLayout;\nimport javax.swing.JFrame;\n\
  import javax.swing.JLabel;\nimport javax.swing.JLayer;\nimport javax.swing.JTextField;\n\
  import javax.swing.SwingUtilities;\nimport javax.swing.plaf.LayerUI;\npublic class\
  \ JLayerBlueBorderFrame extends JFrame {\nprivate JLabel firstNameLabel = new JLabel(\"\
  名字:\");\nprivate JLabel lastNameLabel = new JLabel(\"姓氏:\");\nprivate JTextField\
  \ firstName = new JTextField(10);\nprivate JTextField lastName = new JTextField(10);\n\
  public JLayerBlueBorderFrame(String title) {\nsuper(title);\ninitFrame();\n}\npublic\
  \ void initFrame() {\nthis.setLayout(new FlowLayout());\nthis.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  // 创建一个 LayerUI 子类 BlueBorderUI 的对象\nLayerUI ui = new BlueBorderUI();\n// 将 LayerUI\
  \ 和两个 JTextField 分别包装到两个 JLayer 中。\n// 注意：一个 LayerUI 对象可以被多个 JLayer 共享\nJLayer layer1\
  \ = new JLayer(firstName, ui);\nJLayer layer2 = new JLayer(lastName, ui);\nthis.add(firstNameLabel);\n\
  this.add(layer1); // 将 layer1 而不是 firstName 添加到框架\nthis.add(lastNameLabel);\nthis.add(layer2);\
  \ // 将 layer2 而不是 lastName 添加到框架\n}\npublic static void main(String[] args) {\n\
  SwingUtilities.invokeLater(() -> {\nJLayerBlueBorderFrame frame = new JLayerBlueBorderFrame(\"\
  JLayer 测试框架\");\nframe.pack();\nframe.setVisible(true);\n});\n}\n}\n清单 3-11.\n使用\
  \ JLayer 装饰 JTextField 组件\n```\n\n让我们看一个如何使用 `JLayer` 处理目标组件事件的示例。`JLayer` 将事件处理任务委托给关联的\
  \ `LayerUI`。你需要执行以下步骤来处理 `LayerUI` 子类中的事件。\n\n*   注册 `JLayer` 将要处理的事件。\n*   在 `LayerUI`\
  \ 子类的适当方法中编写事件处理代码。\n\n你需要调用 `JLayer` 类的 `setLayerEventMask(long layerEventMask)`\
  \ 方法来注册 `JLayer` 感兴趣的所有事件。此方法的 `layerEventMask` 参数必须是 `AWTEvent` 常量的位掩码。例如，如果一个名为\
  \ `layer` 的 `JLayer` 对键盘和焦点事件感兴趣，你可以像这样调用此方法：\n\n```\nint layerEventMask = AWTEvent.KEY_EVENT_MASK\
  \ | AWTEvent.FOCUS_EVENT_MASK;\nlayer.setLayerEventMask(layerEventMask);\n```\n\n\
  通常，`JLayer` 会在 `LayerUI` 子类的 `installUI()` 方法中注册事件。你需要在子类中重写 `LayerUI` 类的 `installUI()`\
  \ 方法。当 UI 被卸载时，需要将 `JLayer` 的事件掩码设置为零。这可以在 `uninstallUI()` 方法中完成。以下代码片段展示了一个 `JLayer`\
  \ 注册焦点事件并重置其事件掩码的过程：\n\n```\npublic class SmartBorderUI extends LayerUI {\n@Override\n\
  public void installUI(JComponent c) {\nsuper.installUI(c);\nJLayer layer = (JLayer)c;\n\
  // 注册焦点事件\nlayer.setLayerEventMask(AWTEvent.FOCUS_EVENT_MASK);\n}\n@Override\npublic\
  \ void uninstallUI(JComponent c) {\nsuper.uninstallUI(c);\nJLayer layer = (JLayer)c;\n\
  // 重置事件掩码\nlayer.setLayerEventMask(0);\n}\n// 其他代码写在这里\n}\n```\n\n当注册的事件被传递给 `JLayer`\
  \ 时，关联的 `LayerUI` 的 `eventDispatched(AWTEvent event, JLayer layer)` 方法会被调用。你可能会想在\
  \ `LayerUI` 子类中重写此方法来处理所有注册的事件。从技术上讲，重写此方法来处理事件是正确的。然而，在 `LayerUI` 子类中提供事件处理代码有一种更好的方式。`LayerUI`\
  \ 类的 `eventDispatched()` 方法在接收到事件时会调用一个命名恰当的方法。这些方法声明如下：\n\n```\nprotected void\
  \ processXxxEvent(XxxEvent e, JLayer layer)\n```\n\n这里，`Xxx` 是注册事件的名称。以下代码片段展示了事件类型的示例以及当\
  \ `JLayer` 接收到该类事件时被调用的方法声明：\n\n```\npublic class SmartBorderUI extends LayerUI\
  \ {\n@Override\nprotected void processFocusEvent(FocusEvent e, JLayer layer) {\n\
  // 在此处处理焦点事件\n}\n@Override\nprotected void processKeyEvent(KeyEvent e, JLayer layer)\
  \ {\n// 在此处处理键盘事件\n}\n@Override\nprotected void processMouseEvent(MouseEvent e,\
  \ JLayer layer) {\n// 在此处处理鼠标事件\n}\n// 其他代码写在这里...\n}\n```\n\n这就是在 `JLayer` 中处理事件所需做的全部工作。让我们改进之前的示例。这一次，`JLayer`\
  \ 将在 `JTextField` 周围绘制一个边框，其颜色取决于 `JTextField` 是否获得焦点。当它获得焦点时，绘制红色边框。当它失去焦点时，绘制蓝色边框。\n\
  \n清单 3-12 包含了 `SmartBorderUI` 类的代码，该类继承自 `LayerUI`。它的 `paint()` 方法根据目标组件是否获得焦点来绘制红色或蓝色边框。它的\
  \ `installUI()` 方法注册焦点事件。`unInstallUI()` 方法通过将事件掩码设置为零来取消注册焦点事件。它的 `processFocusEvent()`\
  \ 方法处理焦点事件。请注意，当目标组件上发生焦点事件时，会调用此方法。它调用 `repaint()` 方法，该方法进而会调用 `paint()` 方法，后者根据组件的焦点状态绘制边框。\n\
  \n\n\n```\n// SmartBorderUI.java\npackage com.jdojo.swing.advanced;\nimport java.awt.AWTEvent;\n\
  import java.awt.Color;\nimport java.awt.Graphics;\nimport java.awt.Graphics2D;\n\
  import java.awt.event.FocusEvent;\nimport javax.swing.JComponent;\nimport javax.swing.JLayer;\n\
  import javax.swing.JTextField;\nimport javax.swing.plaf.LayerUI;\npublic class SmartBorderUI\
  \ extends LayerUI {\n@Override\npublic void paint(Graphics g, JComponent layer)\
  \ {\n// 先让父类绘制组件\nsuper.paint(g, layer);\nGraphics gTemp = (Graphics2D) g.create();\n\
  int width = layer.getWidth();\nint height = layer.getHeight();\n// 抑制未检查警告\n@SuppressWarnings(\"\
  unchecked\")\nJLayer myLayer = (JLayer) layer;\nJTextField field = (JTextField)\
  \ myLayer.getView();\n// 当获得焦点时绘制红色矩形，否则绘制蓝色矩形\nColor bColor;\nif (field.hasFocus())\
  \ {\nbColor = Color.RED;\n} else {\nbColor = Color.BLUE;\n}\ngTemp.setColor(bColor);\n\
  gTemp.drawRect(0, 0, width, height);\ngTemp.dispose();\n}\n@Override\npublic void\
  \ installUI(JComponent c) {\n// 让父类完成其工作\nsuper.installUI(c);\n// 设置图层的事件掩码，表明它有兴趣监听其目标组件的焦点事件\n\
  JLayer layer = (JLayer) c;\nlayer.setLayerEventMask(AWTEvent.FOCUS_EVENT_MASK);\n\
  }\n@Override\npublic void uninstallUI(JComponent c) {\n// 让父类完成其工作\nsuper.uninstallUI(c);\n\
  JLayer layer = (JLayer) c;\n// 将事件掩码重置为零\nlayer.setLayerEventMask(0);\n}\n@Override\n\
  protected void processFocusEvent(FocusEvent e, JLayer layer) {\nlayer.repaint();\n\
  }\n}\n清单 3-12.\n用于基于焦点装饰 JTextField 的 LayerUI 子类\n```\n\n清单 3-13 包含了将 `SmartBorderUI`\
  \ 类与 `JLayer` 结合使用的代码。运行此程序时，它将显示一个包含两个 `JTextField` 组件的 `JFrame`。在两个 `JTextField`\
  \ 组件之间切换焦点将改变它们的边框颜色。\n\n```\n// JLayerSmartBorderFrame.java\npackage com.jdojo.swing.advanced;\n\
  import java.awt.FlowLayout;\nimport javax.swing.JFrame;\nimport javax.swing.JLabel;\n\
  import javax.swing.JLayer;\nimport javax.swing.JTextField;\nimport javax.swing.SwingUtilities;\n\
  import javax.swing.plaf.LayerUI;\npublic class JLayerSmartBorderFrame extends JFrame\
  \ {\nprivate JLabel firstNameLabel = new JLabel(\"名:\");\nprivate JLabel lastNameLabel\
  \ = new JLabel(\"姓:\");\nprivate JTextField firstName = new JTextField(10);\nprivate\
  \ JTextField lastName = new JTextField(10);\npublic JLayerSmartBorderFrame(String\
  \ title) {\nsuper(title);\ninitFrame();\n}\npublic void initFrame() {\nthis.setLayout(new\
  \ FlowLayout());\nthis.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n// 创建 LayerUI\
  \ 子类 SmartBorderUI 的对象\nLayerUI ui = new SmartBorderUI();\n// 将 LayerUI 和两个 JTextField\
  \ 分别包装到两个 JLayer 中\nJLayer layer1 = new JLayer(firstName, ui);\nJLayer layer2 =\
  \ new JLayer(lastName, ui);\nthis.add(firstNameLabel);\nthis.add(layer1); // 将 layer1\
  \ 而非 firstName 添加到框架\nthis.add(lastNameLabel);\nthis.add(layer2); // 将 layer2 而非\
  \ lastName 添加到框架\n}\npublic static void main(String[] args) {\nSwingUtilities.invokeLater(()\
  \ -> {\nJLayerSmartBorderFrame frame\n= new JLayerSmartBorderFrame(\"JLayer 测试框架\"\
  );\nframe.pack();\nframe.setVisible(true);\n});\n}\n}\n清单 3-13.\n使用 JLayer 基于焦点装饰\
  \ JTextField 组件\n```\n\n## 半透明窗口\n\n在讨论 Swing 中的半透明窗口之前，我们先定义三个术语：\n\n*   **透明**\n\
  *   **半透明**\n*   **不透明**\n\n如果某物是透明的，你可以看穿它；清水是透明的。如果某物是不透明的，你无法看穿它；混凝土墙是不透明的。如果某物是半透明的，你可以看穿它，但看不清楚。如果某物是半透明的，它允许部分光线通过；塑料窗帘是半透明的。术语“透明”和“不透明”描述的是两种相反的状态，而术语“半透明”描述的是介于透明和不透明之间的状态。\n\
  \n你可以定义窗口（例如 `JFrame`）的半透明程度。一个 90% 半透明的窗口就是 10% 不透明的。窗口的半透明程度可以使用像素颜色分量的 alpha\
  \ 值来定义。你可以使用 `Color` 类的构造函数来定义颜色的 alpha 值：\n\n*   `Color(int red, int green, int\
  \ blue, int alpha)`\n*   `Color(float red, float green, float blue, float alpha)`\n\
  \n当颜色分量以 `int` 值指定时，`alpha` 参数的值在 0 到 255 之间。对于 `float` 类型的参数，其值在 0.0 到 1.0 之间。alpha\
  \ 值为 0 或 0.0 表示透明（100% 半透明，0% 不透明）。alpha 值为 255 或 1.0 表示不透明（0% 半透明，完全不透明）。\n\n窗口支持三种形式的半透明效果。它们由\
  \ `WindowTranslucency` 枚举中的以下三个常量表示：\n\n*   `PERPIXEL_TRANSPARENT`：在这种半透明形式中，窗口中的每个像素要么不透明，要么透明。也就是说，像素的\
  \ alpha 值要么是 0.0，要么是 1.0。\n*   `TRANSLUCENT`：在这种半透明形式中，窗口中的所有像素具有相同的半透明度，可以通过介于\
  \ 0.0 和 1.0 之间的 alpha 值来定义。\n*   `PERPIXEL_TRANSLUCENT`：在这种半透明形式中，窗口中的每个像素可以有自己的\
  \ alpha 值，介于 0.0 和 1.0 之间。它允许你基于每个像素来定义窗口的半透明度。\n\n并非所有平台都支持这三种半透明形式。在使用它们之前，你必须检查程序中支持的半透明形式。否则，你的代码可能会抛出\
  \ `UnsupportedOperationException`。`GraphicsDevice` 类的 `isWindowTranslucencySupported()`\
  \ 方法允许你检查平台上支持的半透明形式。清单 3-14 演示了如何检查平台上的半透明支持。此清单中的代码简短且不言自明。为了保持代码更简洁，我在后续示例中省略了检查。\n\
  \n```\n// TranslucencySupport.java\npackage com.jdojo.swing.advanced;\nimport java.awt.GraphicsDevice;\n\
  import java.awt.GraphicsEnvironment;\nimport static java.awt.GraphicsDevice.WindowTranslucency.*;\n\
  public class TranslucencySupport {\npublic static void main(String[] args) {\nGraphicsEnvironment\
  \ graphicsEnv = GraphicsEnvironment.getLocalGraphicsEnvironment();\nGraphicsDevice\
  \ graphicsDevice = graphicsEnv.getDefaultScreenDevice();\n// 打印平台支持的半透明形式\nboolean\
  \ isSupported\n= graphicsDevice.isWindowTranslucencySupported(PERPIXEL_TRANSPARENT);\n\
  System.out.println(\"PERPIXEL_TRANSPARENT 支持: \" + isSupported);\nisSupported =\
  \ graphicsDevice.isWindowTranslucencySupported(TRANSLUCENT);\nSystem.out.println(\"\
  TRANSLUCENT 支持: \" + isSupported);\nisSupported = graphicsDevice.isWindowTranslucencySupported(PERPIXEL_TRANSLUCENT);\n\
  System.out.println(\"PERPIXEL_TRANSLUCENT 支持: \" + isSupported);\n}\n}\n清单 3-14.\n\
  检查平台上的半透明支持\n```\n\n让我们看看一个均匀半透明的 `JFrame` 的实际效果。你可以使用 `setOpacity(float opacity)`\
  \ 方法设置 `JFrame` 的半透明度。指定的 `opacity` 值必须在 0.0f 到 1.0f 之间。在窗口上调用此方法之前，必须满足以下三个条件：\n\
  \n\n\n*   平台必须支持 `TRANSLUCENT` 半透明效果。\n*   窗口必须是无装饰的。你可以通过调用 `JFrame` 或 `JDialog`\
  \ 上的 `setUndecorated(true)` 方法使其变为无装饰状态。\n*   窗口不能处于全屏模式。你可以使用 `GraphicsDevice`\
  \ 类的 `setFullScreenWindow(Window w)` 方法将窗口置于全屏模式。\n\n如果所有条件均未满足，则将窗口的不透明度设置为 1.0f\
  \ 以外的值会抛出 `IllegalComponentStateException`。\n\n清单 3-15 演示了如何使用统一的半透明 `JFrame`。该清单中\
  \ `initFrame()` 方法里的以下两条语句对于获取半透明 `JFrame` 至关重要：\n\n```\n// 确保框架是无装饰的\nthis.setUndecorated(true);\n\
  // 设置 40% 的不透明度。即 60% 的半透明度。\nthis.setOpacity(0.40f);\n```\n\n第一条语句确保框架是无装饰的，第二条语句以不透明度的形式设置了框架的半透明度。\n\
  \n运行此程序时，你可以透过 `JFrame` 的显示区域看到屏幕上的内容。框架上添加了一个 `Close` 按钮用于关闭它。\n\n```\n// UniformTranslucentFrame.java\n\
  package com.jdojo.swing.advanced;\nimport java.awt.BorderLayout;\nimport javax.swing.JButton;\n\
  import javax.swing.JFrame;\nimport javax.swing.SwingUtilities;\npublic class UniformTranslucentFrame\
  \ extends JFrame {\nprivate JButton closeButton = new JButton(\"Close\");\npublic\
  \ UniformTranslucentFrame(String title) {\nsuper(title);\ninitFrame();\n}\npublic\
  \ void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n// 确保框架是无装饰的\n\
  this.setUndecorated(true);\n// 设置 40% 的不透明度。即 60% 的半透明度。\nthis.setOpacity(0.40f);\n\
  // 设置其大小\nthis.setSize(200, 200);\n// 使其在屏幕上居中\nthis.setLocationRelativeTo(null);\n\
  // 添加一个按钮来关闭窗口\nthis.add(closeButton, BorderLayout.SOUTH);\n// 点击关闭按钮时退出应用程序\ncloseButton.addActionListener(e\
  \ -> System.exit(0));\n}\npublic static void main(String[] args) {\nSwingUtilities.invokeLater(()\
  \ -> {\nUniformTranslucentFrame frame\n= new UniformTranslucentFrame(\"Translucent\
  \ Frame\");\nframe.setVisible(true);\n});\n}\n}\n清单 3-15.\n使用统一的半透明 JFrame\n```\n\
  \n接下来，让我们看看一个逐像素半透明的 `JFrame` 的实际效果。你将通过为其显示区域内不同像素的背景颜色设置不同的 alpha 值，在 `JPanel`\
  \ 内部创建一个渐变效果。你可以通过多种方式实现逐像素半透明。观察其效果最简单的方法是使用一个带有背景颜色的 `JPanel`，并将 alpha 分量设置为所需的半透明度。以下代码片段说明了这一点：\n\
  \n```\n// 创建一个框架并设置其属性\nJFrame frame = new JFrame();\nframe.setUndecorated(true);\n\
  frame.setBounds(0, 0, 200, 200);\n// 将框架的背景颜色全部设置为零，以便逐像素半透明生效\nframe.setBackground(new\
  \ Color(0, 0, 0, 0));\n// 创建一个 alpha 分量为 128 的蓝色 JPanel\nJPanel panel = new JPanel();\n\
  int alpha = 128;\nColor bgColor = new Color(0, 0, 255, alpha);\npanel.setBackground(bgColor);\n\
  // 将 JPanel 添加到框架并显示\nframe.add(panel);\nframe.setVisible(true);\n```\n\n代码中有两点不同。首先，它将框架的背景颜色所有颜色分量都设置为\
  \ 0，以实现逐像素半透明。其次，它将 `JPanel` 的背景颜色（包含 alpha 分量）设置为 128。你可以向 `JFrame` 添加另一个 `JPanel`，其背景颜色使用不同的\
  \ alpha 分量。这样，`JFrame` 上就会有两个区域，其像素使用不同的半透明度。\n\n如果你使用 `GradientPaint` 类的对象来绘制你的\
  \ `JPanel`，你可以获得更炫酷的效果。`GradientPaint` 对象使用线性渐变图案填充 `Shape`。它要求你指定两个点 p1 和 p2，以及每个点的颜色\
  \ c1 和 c2。p1 和 p2 之间连线上的颜色将从 c1 按比例变化到 c2。\n\n清单 3-16 包含了一个自定义 `JPanel` 的代码，它使用\
  \ `GradientPaint` 对象来绘制其区域。`JPanel` 的背景颜色在其构造函数中指定。它重写了 `paintComponent()` 以提供自定义的绘制效果。渐变颜色图案由\
  \ `Graphics2D` 提供。该方法检查是否拥有 `Graphics2D` 对象。起始点 p1 是 `JPanel` 的左上角。起始点的颜色 c1 与构造函数中传入的颜色相同，其\
  \ alpha 分量使用 255。第二个点 p2 是 `JPanel` 的右上角，使用相同的颜色，但 alpha 分量为零。这将使 `JPanel` 产生从左侧边缘不透明逐渐过渡到右侧边缘透明的渐变效果。你可以通过更改这两个点及其\
  \ alpha 分量值来尝试获得不同的渐变图案。它将 `GradientPaint` 对象设置为 `Graphics2D` 对象的 `Paint` 对象，并调用\
  \ `fillRect()` 方法来绘制 `JPanel` 的区域。\n\n```\n// TranslucentJPanel.java\npackage com.jdojo.swing.advanced;\n\
  import java.awt.Color;\nimport java.awt.GradientPaint;\nimport java.awt.Graphics;\n\
  import java.awt.Graphics2D;\nimport java.awt.Paint;\nimport javax.swing.JPanel;\n\
  public class TranslucentJPanel extends JPanel {\nprivate int red = 240;\nprivate\
  \ int green = 240;\nprivate int blue = 240;\npublic TranslucentJPanel(Color bgColor)\
  \ {\nthis.red = bgColor.getRed();\nthis.green = bgColor.getGreen();\nthis.blue =\
  \ bgColor.getBlue();\n}\n@Override\nprotected void paintComponent(Graphics g) {\n\
  if (g instanceof Graphics2D) {\nint width = this.getWidth();\nint height = this.getHeight();\n\
  float startPointX = 0.0f;\nfloat startPointY = 0.0f;\nfloat endPointX = width;\n\
  float endPointY = 0.0f;\nColor startColor = new Color(red, green, blue, 255);\n\
  Color endColor = new Color(red, green, blue, 0);\n// 创建一个 GradientPaint 对象\nPaint\
  \ paint = new GradientPaint(startPointX, startPointY,\nstartColor,\nendPointX, endPointY,\n\
  endColor);\nGraphics2D g2D = (Graphics2D) g;\ng2D.setPaint(paint);\ng2D.fillRect(0,\
  \ 0, width, height);\n}\n}\n}\n清单 3-16.\n使用逐像素半透明实现渐变颜色效果的自定义 JPanel\n```\n\n清单\
  \ 3-17 包含了在 `JFrame` 中观察逐像素半透明效果的代码。它添加了三个 `TranslucentJPanel` 类的实例，其背景颜色分别为红色、绿色和蓝色。并添加了一个\
  \ `Close` 按钮用于关闭框架。\n\n\n\n```\n// PerPixelTranslucentFrame.java\npackage com.jdojo.swing.advanced;\n\
  import java.awt.Color;\nimport java.awt.GridLayout;\nimport javax.swing.JButton;\n\
  import javax.swing.JFrame;\nimport javax.swing.SwingUtilities;\npublic class PerPixelTranslucentFrame\
  \ extends JFrame {\nprivate JButton closeButton = new JButton(\"关闭\");\npublic PerPixelTranslucentFrame(String\
  \ title) {\nsuper(title);\ninitFrame();\n}\npublic void initFrame() {\nthis.setDefaultCloseOperation(EXIT_ON_CLOSE);\n\
  // 确保框架无装饰\nthis.setUndecorated(true);\n// 将背景色的所有分量设为 0，以启用逐像素半透明效果\nthis.setBackground(new\
  \ Color(0, 0, 0, 0));\n// 设置其大小\nthis.setSize(200, 200);\n// 使其在屏幕上居中\nthis.setLocationRelativeTo(null);\n\
  this.getContentPane().setLayout(new GridLayout(0, 1));\n// 创建并添加三个具有不同颜色渐变效果的 JPanel\n\
  this.add(new TranslucentJPanel(Color.RED));\nthis.add(new TranslucentJPanel(Color.GREEN));\n\
  this.add(new TranslucentJPanel(Color.BLUE));\n// 添加一个用于关闭窗口的按钮\nthis.add(closeButton);\n\
  closeButton.addActionListener(e -> System.exit(0));\n}\npublic static void main(String[]\
  \ args) {\nSwingUtilities.invokeLater(() -> {\nPerPixelTranslucentFrame frame\n\
  = new PerPixelTranslucentFrame(\"逐像素半透明框架\");\nframe.setVisible(true);\n});\n}\n\
  }\n清单 3-17.\n在 JFrame 中使用逐像素半透明效果\n```\n\n图 3-8 显示了程序运行时的 `JFrame`。请注意框架中的渐变效果。从左到右，每个面板的半透明程度逐渐增加。图中显示的文本并非\
  \ `JFrame` 的一部分。这些文本是在 `JFrame` 显示时，背景中显示的内容。你可以透过 `JFrame` 的半透明部分看到它们。\n\n![A323071_2_En_3_Fig8_HTML.jpg](img/A323071_2_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8.\n\n一个使用逐像素半透明效果的 JFrame\n\n## 异形窗口\n\nSwing 允许你创建自定义形状的窗口，例如圆形的 `JFrame`、椭圆形的\
  \ `JDialog` 等。你可以通过 `Window` 类的 `setShape(Shape s)` 方法为窗口赋予自定义形状。窗口的形状仅受限于你的想象力。你可以使用\
  \ `java.awt.geom` 包中的类，通过组合多个形状来创建新形状。以下代码片段创建了一个形状，该形状由一个位于矩形上方的椭圆组成。最后，它将自定义形状设置给一个\
  \ `JFrame`。\n\n```\n// 创建一个椭圆位于矩形上方的形状\nEllipse2D.Double ellipse = new Ellipse2D.Double(0,\
  \ 0, 200, 100);\nRectangle2D.Double rect = new Rectangle2D.Double(0, 100, 200, 200);\n\
  // 将椭圆和矩形合并为一个 Path2D 对象，以获得新形状\nPath2D path = new Path2D.Double();\npath.append(rect,\
  \ true);\npath.append(ellipse, true);\n// 创建一个 JFrame\nJFrame frame = new JFrame(\"\
  一个自定义形状的 JFrame\");\n// 将自定义形状设置给 JFrame\nFrame.setShape(path);\n```\n\n一个 `Window`\
  \ 在屏幕上拥有一个矩形区域。如果你为窗口赋予自定义形状，其部分区域可能会被裁剪掉。异形窗口中不属于自定义形状的部分既不可见也不可点击。图 3-9 显示了一个自定义形状的窗口，其中椭圆位于矩形上方。该窗口包含一个“关闭”按钮。椭圆四个角周围的区域既不可见也不可点击。\n\
  \n![A323071_2_En_3_Fig9_HTML.jpg](img/A323071_2_En_3_Fig9_HTML.jpg)\n\n图 3-9.\n\n\
  一个自定义形状的窗口，椭圆位于矩形上方\n\n使用异形窗口必须满足以下三个条件：\n\n*   平台必须支持 `PERPIXEL_TRANSPARENT` 半透明效果。\n\
  *   窗口必须是无装饰的。你可以通过调用 `JFrame` 或 `JDialog` 的 `setUndecorated(true)` 方法使其无装饰。\n*\
  \   窗口不能处于全屏模式。你可以使用 `GraphicsDevice` 类的 `setFullScreenWindow(Window w)` 方法将窗口置于全屏模式。\n\
  \n清单 3-18 包含的代码显示了一个异形 `JFrame`，即图 3-9 中所示的窗口。\n\n```\n// ShapedFrame.java\npackage\
  \ com.jdojo.swing.advanced;\nimport java.awt.BorderLayout;\nimport java.awt.geom.Path2D;\n\
  import java.awt.geom.Ellipse2D;\nimport java.awt.geom.Rectangle2D;\nimport javax.swing.JButton;\n\
  import javax.swing.JFrame;\nimport javax.swing.SwingUtilities;\npublic class ShapedFrame\
  \ extends JFrame {\nprivate JButton closeButton = new JButton(\"关闭\");\npublic ShapedFrame()\
  \ {\ninitFrame();\n}\npublic void initFrame() {\n// 确保框架无装饰\nthis.setUndecorated(true);\n\
  this.setDefaultCloseOperation(EXIT_ON_CLOSE);\nthis.setSize(200, 200);\n// 创建一个椭圆位于矩形上方的形状\n\
  Ellipse2D.Double ellipse = new Ellipse2D.Double(0, 0, 200, 100);\nRectangle2D.Double\
  \ rect = new Rectangle2D.Double(0, 100, 200, 200);\n// 将椭圆和矩形合并为一个 Path2D 对象，并\n\
  // 将其设置为 JFrame 的形状\nPath2D path = new Path2D.Double();\npath.append(rect, true);\n\
  path.append(ellipse, true);\nthis.setShape(path);\n// 添加一个关闭按钮以关闭框架\nthis.add(closeButton,\
  \ BorderLayout.SOUTH);\ncloseButton.addActionListener(e -> System.exit(0));\n}\n\
  public static void main(String[] args) {\nSwingUtilities.invokeLater(() -> {\n//\
  \ 显示自定义形状的框架\nShapedFrame frame = new ShapedFrame();\nframe.setLocationRelativeTo(null);\n\
  frame.setVisible(true);\n});\n}\n}\n清单 3-18.\n使用自定义形状的 JFrame\n```\n\n本清单中 `initFrame()`\
  \ 方法内的以下代码部分值得关注：\n\n```\n// 确保框架无装饰\nthis.setUndecorated(true);\n// 创建一个椭圆位于矩形上方的形状\n\
  Ellipse2D.Double ellipse = new Ellipse2D.Double(0, 0, 200, 100);\nRectangle2D.Double\
  \ rect = new Rectangle2D.Double(0, 100, 200, 200);\n// 将椭圆和矩形合并为一个 Path2D 对象，并\n\
  // 将其设置为 JFrame 的形状\nPath2D path = new Path2D.Double();\npath.append(rect, true);\n\
  path.append(ellipse, true);\nthis.setShape(path);\n```\n\n第一条语句确保 `JFrame` 是无装饰的。创建了两个形状：一个椭圆和一个矩形。它们的坐标和大小被设置为使椭圆位于矩形上方。使用\
  \ `Path2D.Double` 对象将椭圆和矩形连接成一个自定义的 `Shape` 对象。`Path2D` 是 `java.awt.geom` 包中的一个抽象类。它声明了两个静态内部类：`Path2D.Double`\
  \ 和 `Path2D.Float`，分别用于以双精度和单精度浮点数存储形状的坐标。`Shape` 是 `java.awt` 包中声明的接口。`Path2D`\
  \ 类实现了 `Shape` 接口。请注意，`Window` 类中的 `setShape()` 方法接受一个 `Shape` 作为参数。`Path2D` 类的\
  \ `append()` 方法将指定 `Shape` 对象的几何形状追加到路径中。`append()` 方法的第二个参数是一个指示符，表示是否希望用线段连接两个形状。如果为\
  \ `true`，则对 `moveTo()` 方法的调用会被转换为对 `lineTo()` 方法的调用。在这种情况下，此参数值为 `true` 并无实际意义。请探索\
  \ `java.awt.geom` 包中的类，以了解更多你可以在 Java 应用程序中使用的有趣形状。\n\n\n\n## 摘要\n\nSwing 组件内置了对将\
  \ HTML 文本显示为标签的支持。你可以使用 HTML 格式的字符串作为 `JButton`、`JMenuItem`、`JLabel`、`JToolTip`、`JTabbedPane`、`JTree`\
  \ 等组件的标签，该 HTML 字符串应分别以 `<html>` 和 `</html>` 标签开头和结尾。如果你不希望 Swing 将包含在 HTML 标签中的文本解释为组件的\
  \ HTML，可以通过在组件上调用 `putClientProperty(\"html.disable\", Boolean.TRUE)` 方法来禁用此功能。\n\
  \nSwing 组件并非线程安全。你应该在称为事件调度线程的单个线程中更新组件的状态。所有组件的事件处理器都在事件调度线程中执行。Swing 会自动创建事件调度线程。Swing\
  \ 提供了一个名为 `SwingUtilities` 的工具类来处理事件调度线程；其 `invokeLater(Runnable r)` 方法会将指定的 `Runnable`\
  \ 调度到事件调度线程上执行。在事件调度线程上构建 Swing GUI 并显示它是安全的。如果此方法由事件调度线程执行，`SwingUtilities` 类的\
  \ `isEventDispatchThread()` 方法将返回 `true`。\n\n在事件调度线程上运行长时间运行的任务会使你的 GUI 无响应。Swing\
  \ 提供了一个 `SwingWorker` 类，用于在工作线程（即非事件调度线程的线程）上执行长时间运行的任务。`SwingWorker` 类提供了在事件调度线程上发布任务结果的功能，从而可以安全地更新\
  \ Swing 组件。\n\nSwing 支持可插拔的外观和感觉（L&F）。它自带了一些预定义的 L&F。你可以使用 `UIManager.setLookAndFeel()`\
  \ 方法为你的应用程序设置新的 L&F。\n\n拖放（DnD）是一种在应用程序组件之间传输数据的方式。Swing 支持 Swing 组件之间以及 Swing 组件与原生组件之间的\
  \ DnD。使用 DnD，你可以在两个组件之间复制、移动和链接数据。\n\n使用 Swing，你可以开发一个多文档界面（MDI）应用程序，该应用程序由桌面管理器管理的多个框架组成。MDI\
  \ 应用程序中的框架可以以不同的方式排列；例如，它们可以分层排列、层叠排列、并排放置等。\n\nSwing 提供了一个 `Toolkit` 类的实例来与原生系统通信。该类包含许多有用的方法，例如发出蜂鸣声、获取屏幕分辨率和尺寸等。\n\
  \nSwing 允许你拥有半透明窗口。半透明性可以定义为窗口中所有像素相同，也可以基于每个像素定义。\n\n在 Swing 中，你不仅限于使用矩形窗口。它还允许你创建异形窗口。异形窗口可以是任何形状，例如圆形、椭圆形或任何自定义形状。\n\
  \n问题与练习\n\n1.  创建一个带有 `Close` 标签的 `JButton`。该标签应使用 HTML 格式化为斜体和粗体字体。\n2.  创建一个带有\
  \ `<html>Use the <b> tag for bold</html>` 标签的 `JButton`。请注意，标签包含 HTML 标签，并且这些标签应按照标签中所示显示。\n\
  3.  如何检查你的代码是否在事件调度线程中运行？\n4.  比较并对比 `SwingUtilities` 类的 `invokeLater()` 和 `invokeAndWait()`\
  \ 方法的使用。\n5.  当你想在非事件调度线程中运行长时间运行的任务并在 Swing 应用程序中发布任务结果时，你需要使用哪个 Swing 工具类？\n6.\
  \  如何为 Swing 应用程序设置系统（或原生）外观和感觉？\n7.  什么是拖放（DnD）？创建一个包含 `JTextArea` 的应用程序。用户应该能够从任何其他应用程序（如互联网浏览器）拖放文本到\
  \ `JTextArea` 中，并且拖动的文本应插入到 `JTextArea` 中。\n8.  什么是 SDI、MDI 和 TDI 应用程序？每种类型各举一个例子。\n\
  9.  何时使用 `JInternalFrame` 和 `JDesktopPane` 类的实例？\n10. `DesktopManager` 在 Swing 应用程序中的作用是什么？\n\
  11. `java.awt.Toolkit` 类的实例提供了哪些功能？\n12. 编写一个使用 `Toolkit` 类的程序，将屏幕尺寸打印到标准输出。\n13.\
  \ 何时在你的 Swing 应用程序中使用 `JLayer`？\n\n# 4. 网络编程\n\n在本章中，你将学习：\n\n*   什么是网络编程\n*   什么是网络协议套件\n\
  *   什么是 IP 地址以及不同的 IP 寻址方案\n*   特殊 IP 地址及其用途\n*   什么是端口号以及如何使用它们\n*   使用 TCP 和 UDP\
  \ 客户端与服务器套接字进行远程计算机之间的通信\n*   URI、URL 和 URN 的定义以及如何在 Java 程序中表示它们\n*   如何使用非阻塞套接字\n\
  *   如何使用异步套接字通道\n*   面向数据报的套接字通道和多播数据报通道\n\n本章中的所有示例程序都是 `jdojo.net` 模块的成员，如清单 4-1\
  \ 中所声明。\n\n```\n// module-info.java\nmodule jdojo.net {\n    exports com.jdojo.net;\n\
  }\n清单 4-1.\njdojo.net 模块的声明\n```\n\n本章前几节旨在为没有计算机科学背景的读者快速概述与网络技术相关的基础知识。如果你理解 IP\
  \ 地址、端口号和网络协议套件等术语，可以跳过这些章节，从“套接字 API 与客户端-服务器范式”部分开始阅读。\n\n\n\n## 什么是网络编程？\n\n\
  网络是由两台或更多计算机或其他类型的电子设备（如打印机）连接而成的群体，其目标是共享信息。连接到网络的每个设备称为节点。连接到网络的计算机称为主机。Java 中的网络编程涉及编写\
  \ Java 程序，以促进网络上不同计算机上运行的进程之间的信息交换。\n\nJava 使得编写网络程序变得简单。向另一台计算机上运行的进程发送消息，就像向本地文件系统写入数据一样简单。同样，接收从另一台计算机上运行的进程发送的消息，就像从本地文件系统读取数据一样简单。本章中的大多数程序都涉及通过网络读写数据，它们与文件\
  \ I/O 类似。有关文件 I/O 的更多详细信息，请参阅《Beginning Java 9 Language Features》一书中的第 7 章至第 10\
  \ 章。在本章中，你将学习一些有助于网络上两台计算机之间通信的新类。\n\n要理解或编写本章中的 Java 程序，你不需要具备高级的网络技术知识。本章涵盖了网络通信中涉及的几个方面的高级细节。\n\
  \n网络可以根据不同的标准进行分类。根据网络覆盖的地理区域，分类如下：\n\n*   **局域网（LAN）**：覆盖小范围区域，例如一栋建筑或一个建筑群。\n\
  *   **园区网（CAN）**：覆盖一个园区，例如大学校园，互联该园区内的多个局域网。\n*   **城域网（MAN）**：覆盖的地理区域比局域网更大，通常覆盖一个城市。\n\
  *   **广域网（WAN）**：覆盖更大的地理区域，例如一个国家的一个地区或世界上不同国家的多个地区。\n\n当两个或多个网络使用路由器（也称为网关）连接时，称为互联网络，由此产生的组合网络称为互联网络，简称为\
  \ internet（注意 internet 中的小写 i）。全球互联网络，即连接了世界上所有网络的整体，被称为 Internet（注意 Internet 中的大写\
  \ I）。\n\n根据拓扑结构（网络中节点的排列方式），网络可以分为星型、树型、环型、总线型、混合型等。\n\n根据网络用于传输数据的技术，它可以分为以太网、LocalTalk、光纤分布式数据接口（FDDI）、令牌环网、异步传输模式（ATM）等。\n\
  \n我不会详细介绍不同类型的网络。请参考任何标准的网络教材，以详细了解网络和网络技术。\n\n计算机上两个进程之间的通信很简单，它通过操作系统定义的进程间通信来实现。当互联网上两台不同计算机上运行的两个进程需要通信时，这是一项非常繁琐的任务。在这两个进程开始通信之前，你需要考虑通信的许多方面。需要考虑的一些要点如下：\n\
  \n*   两台计算机可能使用不同的技术，例如不同的操作系统、不同的硬件等。\n*   它们可能位于两个使用不同网络技术的不同网络上。\n*   它们可能被许多其他使用不同技术的网络隔开。也就是说，两台计算机并不在直接互联的两个网络上。你不仅需要考虑两个网络，还需要考虑数据从一台计算机传输到另一台计算机必须经过的所有网络。\n\
  *   它们可能相距几英里，或者位于地球的两端。如何在不担心两台计算机之间距离的情况下高效地传输信息？\n*   一台计算机可能无法理解另一台计算机发送的信息。\n\
  *   通过网络发送的信息可能被复制、延迟或丢失。接收方和发送方应如何处理这些异常情况？\n\n简单来说，网络上的两台计算机使用消息（0 和 1 的序列）进行通信。必须有明确定义的规则来处理前面提到的问题（以及更多问题）。处理特定任务的一组规则称为协议。处理网络通信涉及许多类型的任务。每个特定任务都定义了一个协议。有一组协议（也称为协议栈）共同用于处理网络通信。\n\
  \n## 网络协议栈\n\n现代网络被称为分组交换网络，因为它们以称为数据包的数据块形式传输数据。每个数据包独立于其他数据包进行传输。这使得从同一台计算机到同一目的地使用不同路由传输数据包变得容易。然而，如果一台计算机向远程计算机发送两个数据包，而第二个数据包在第一个之前到达，这可能会成为问题。因此，每个数据包除了目标地址外，还有一个数据包编号。有规则用于重新排列在目标计算机上乱序到达的数据包。以下讨论试图解释网络通信中用于处理数据包的一些机制。\n\
  \n图 4-1 展示了一个分层协议栈，称为互联网参考模型或 TCP/IP 分层模型。这是使用最广泛的协议栈。模型中的每一层都执行一个明确定义的任务。拥有分层协议模型的主要优点是任何一层都可以在不影响其他层的情况下进行更改。可以在不更改其他层的情况下向任何层添加新协议。\n\
  \n![A323071_2_En_4_Fig1_HTML.gif](img/A323071_2_En_4_Fig1_HTML.gif)\n\n图 4-1.\n\n\
  互联网协议栈，展示其五个协议层\n\n每一层只了解其正上方和正下方的层。每一层有两个接口——一个用于其上层，一个用于其下层。例如，传输层有到应用层和互联网层的接口。也就是说，传输层只知道如何与应用层和互联网层通信。它对网络接口层或物理层一无所知。\n\
  \n用户应用程序（例如 Java 程序）使用应用层与远程应用程序通信。用户应用程序必须指定它想要用来与远程应用程序通信的协议。应用层中的协议定义了格式化消息以及将含义关联到消息中包含的信息（例如消息类型，描述它是请求还是响应等）的规则。应用层格式化消息后，它将消息交给传输层。应用层中协议的例子包括超文本传输协议（HTTP）、文件传输协议（FTP）、Gopher、远程通信网络（Telnet）、简单邮件传输协议（SMTP）和网络新闻传输协议（NNTP）。\n\
  \n\n\n传输层协议负责处理消息从一台计算机上的一个应用程序传输到远程计算机上另一个应用程序的方式。它控制数据流、数据传输过程中的错误处理以及两个应用程序之间的连接。例如，一个用户应用程序可能将一大块数据交给传输层，以传输给远程应用程序。远程计算机可能无法一次性处理如此大量的数据。传输层的职责是每次向远程计算机传递适量的数据，以便远程应用程序能够根据其处理能力来处理数据。通过网络传输到远程计算机的数据可能会因各种原因在途中丢失。传输层的职责是重新传输丢失的数据。请注意，应用层只将待传输的数据传递给传输层一次。是传输层（而非应用层）在传输过程中跟踪已送达和丢失的数据。可能有多个应用程序在运行，它们都使用不同的协议，并与不同的远程应用程序交换信息。传输层的职责是正确地将发送给远程应用程序的消息传递过去。例如，你可能正在使用\
  \ HTTP 协议从一个远程 Web 服务器浏览互联网，同时使用 FTP 协议从另一个 FTP 服务器下载文件。你的计算机正在从两台远程计算机接收消息，这些消息是发送给你计算机上运行的两个不同应用程序的——一个\
  \ Web 浏览器用于接收 HTTP 数据，一个 FTP 应用程序用于接收 FTP 数据。传输层的职责是将传入的数据传递给相应的应用程序。你可以看到协议栈的不同层在网络数据传输中扮演着不同的角色。根据所使用的传输层协议，传输层会向消息添加相关信息，并将其传递给下一层，即互联网层。传输层中使用的协议示例包括传输控制协议（TCP）、用户数据报协议（UDP）和流控制传输协议（SCTP）。\n\
  \n互联网层从传输层接收消息，并准备一个适合在互联网上发送的数据包。它包含互联网协议（IP）。由 IP 准备的数据包也称为 IP 数据报。它由一个头部和一个数据区以及其他信息片段组成。头部包含发送方的\
  \ IP 地址、目标 IP 地址、生存时间（TTL，一个整数）、头部校验和以及协议中指定的许多其他信息。IP 将消息准备成数据报，这些数据报已准备好通过互联网传输。IP\
  \ 数据报头部中的 TTL 指定了一个 IP 数据报在被丢弃之前可以继续传输多长时间（以路由器数量计）。它的大小是一个字节，其值可以在 1 到 255 之间。当一个\
  \ IP 数据报在前往目的地的途中到达一个路由器时，路由器会将 TTL 值减 1。如果减后的值为零，路由器会丢弃该数据报，并使用互联网控制消息协议（ICMP）向发送方发送一条错误消息。如果\
  \ TTL 值仍然为正数，路由器会将数据报转发给下一个路由器。IP 使用一种地址方案，为每台计算机分配一个唯一的地址。这个地址称为 IP 地址。我将在下一节详细讨论\
  \ IP 地址方案。互联网层将 IP 数据报交给下一层，即网络接口层。互联网层中的协议示例包括互联网协议（IP）、互联网控制消息协议（ICMP）、互联网组管理协议（IGMP）和互联网协议安全（IPsec）。\n\
  \n网络接口层准备一个要在网络上传输的数据包。这个数据包称为帧。网络接口层直接位于物理层之上，物理层涉及硬件。请注意，IP 层使用 IP 地址来识别网络上的目的地。IP\
  \ 地址是一个虚拟地址，完全在软件中维护。硬件不知道 IP 地址，也不知道如何使用 IP 地址传输帧。必须向硬件提供需要传输帧的目标的硬件地址，也称为媒体访问控制（MAC）地址。该层从\
  \ IP 地址解析出目标硬件地址，并将其放入帧头部。它将帧交给物理层。网络接口层中的协议示例包括开放最短路径优先（OSPF）、点对点协议（PPP）、点对点隧道协议（PPTP）和第二层隧道协议（L2TP）。\n\
  \n物理层由硬件组成。它负责将信息比特转换为信号，并通过线缆传输信号。\n\n提示\n\n数据包是一个通用术语，用于表示网络编程中独立的数据块。协议栈的每一层也使用特定的术语来表示其处理的数据包。例如，数据包在\
  \ TCP 层称为段；在 IP 层称为数据报；在网络接口层和物理层称为帧。每一层在准备通过网络传输的数据包时，都会向从上一层接收到的数据包添加一个头部（有时也添加一个尾部）。当每一层从下一层接收到数据包时，会执行相反的操作。它从数据包中移除头部；如果需要，执行一些操作；然后将数据包交给上一层。\n\
  \n当一个由应用程序发送的数据包到达远程计算机时，它必须按相反的顺序通过相同的协议层。每一层将移除其头部，执行一些操作，并将数据包传递给紧邻的上一层。最后，数据包以与发送方计算机上应用程序开始时相同的格式到达远程应用程序。图\
  \ 4-2 显示了数据包从发送方和接收方计算机的传输过程。P1、P2、P3 和 P4 是同一数据的不同格式的数据包。目的地的一个协议层从紧邻的下一层接收到与发送方计算机上同一协议层传递给紧邻下一层相同的数据包。\n\
  \n![A323071_2_En_4_Fig2_HTML.gif](img/A323071_2_En_4_Fig2_HTML.gif)\n\n图 4-2.\n\n\
  数据包通过发送方和接收方计算机上的协议层进行传输\n\n\n\n## IP 寻址方案\n\nIP 使用一种称为 IP 地址的唯一地址，将 IP 数据报路由到目的地。IP\
  \ 地址唯一标识一台计算机与一台路由器之间的连接。通常，人们认为 IP 地址标识一台计算机。然而，需要强调的是，它标识的是计算机与路由器之间的连接，而不仅仅是计算机本身。路由器也会被分配一个\
  \ IP 地址。一台计算机可以通过多个路由器连接到多个网络，并且计算机与路由器之间的每个连接都会有一个唯一的 IP 地址。在这种情况下，该计算机将被分配多个 IP\
  \ 地址，这种计算机被称为多宿主机。多宿主技术提高了计算机网络连接的可用性。如果一个网络连接失败，计算机可以使用其他可用的网络连接。\n\n一个 IP 地址包含两部分——网络标识符（我称之为前缀）和主机标识符（我称之为后缀）。前缀在互联网上唯一标识一个网络；后缀在该网络内唯一标识一台主机。只要前缀不同，两台主机可以拥有后缀相同的\
  \ IP 地址。\n\n互联网协议有两个版本——IPv4（或简称为 IP）和 IPv6，其中 v4 和 v6 代表版本 4 和版本 6。IPv6 也被称为下一代互联网协议（IPng）。请注意，没有\
  \ IPv5。当 IP 处于鼎盛时期时，其版本为 4。在 IPng 被分配版本号 6 之前，版本 5 已经被分配给另一个名为互联网流协议（ST）的协议。\n\n\
  IPv4 和 IPv6 都使用 IP 地址来标识网络上的主机。然而，这两个版本的寻址方案差异很大。接下来的两节将解释 IPv4 和 IPv6 所使用的寻址方案。\n\
  \n由于 IP 地址必须是唯一的，其分配由一个名为互联网号码分配局（IANA）的组织控制。IANA 为属于某个组织的每个网络分配一个唯一地址。该组织使用网络地址和一个唯一编号来为网络上的每台主机形成一个唯一的\
  \ IP 地址。IANA 将 IP 地址分配划分给五个区域互联网注册管理机构（RIR）组织，这些组织在特定区域分配 IP 地址，如表 4-1 所列。你可以从 IANA\
  \ 网站 [`www.iana.com`](http://www.iana.com) 找到更多关于如何在你的区域获取网络地址的信息。\n\n表 4-1.\n\n\
  用于分配网络 IP 地址的区域互联网注册管理机构\n\n| 区域互联网注册管理机构名称 | 覆盖区域 |\n| --- | --- |\n| 非洲网络信息中心（AfriNIC）\
  \ | 非洲地区 |\n| 亚太网络信息中心（APNIC） | 亚太地区 |\n| 美国互联网号码注册局（ARIN） | 北美地区 |\n| 拉丁美洲和加勒比互联网地址注册局（LACNIC）\
  \ | 拉丁美洲及部分加勒比岛屿 |\n| 欧洲 IP 网络协调中心（RIPE NCC） | 欧洲、中东和中亚 |\n\n### IPv4 寻址方案\n\nIPv4（或简称为\
  \ IP）使用一个 32 位数字来表示 IP 地址。一个 IP 地址包含两部分——前缀和后缀。前缀标识一个网络，后缀标识该网络上的一个主机，如图 4-3 所示。\n\
  \n![A323071_2_En_4_Fig3_HTML.jpg](img/A323071_2_En_4_Fig3_HTML.jpg)\n\n图 4-3.\n\n\
  IPv4 寻址方案\n\n人类很难记住二进制格式的 32 位数字。IPv4 允许你使用四个十进制数字的替代形式。每个十进制数字的范围是 0 到 255。程序负责将十进制数字转换为计算机将使用的\
  \ 32 位二进制数字。IPv4 的十进制数字格式称为点分十进制格式，因为使用点号来分隔两个十进制数字。每个十进制数字代表 32 位数字中 8 位所包含的值。例如，二进制格式的\
  \ IPv4 地址 `11000000101010000000000111100111` 可以表示为点分十进制格式的 `192.168.1.231`。将二进制\
  \ IPv4 转换为其等效十进制数的过程如图 4-4 所示。在 `192.168.1.231` 中，`192.168.1` 部分标识网络地址（前缀），`231`\
  \ 部分（后缀）标识该网络上的主机。\n\n![A323071_2_En_4_Fig4_HTML.gif](img/A323071_2_En_4_Fig4_HTML.gif)\n\
  \n图 4-4.\n\nIPv4 地址的二进制和十进制格式的组成部分\n\n你怎么知道 `192.168.1` 在 IPv4 地址 `192.168.1.231`\
  \ 中代表前缀？有一个规则规定了 IPv4 中前缀和后缀的值。我将在本节后面讨论网络类别类型时，讨论如何识别 IPv4 中的前缀和后缀。\n\nIPv4 地址如何在其\
  \ 32 位中划分前缀和后缀？IPv4 地址空间被划分为五类，称为网络类别，分别命名为 `A`、`B`、`C`、`D` 和 `E`。类别类型定义了 32 位中有多少位将用于表示\
  \ IP 地址的网络地址部分。前缀中的前导位（或若干位）定义了 IP 地址的类别。这也被称为自标识或有类 IP 地址，因为你可以通过查看 IP 地址来判断它属于哪个类别。\n\
  \n表 4-2 列出了 IPv4 中的五个网络类别及其特征。IP 地址中的前导位标识网络的类别。例如，如果一个 IP 地址看起来像 `0XXX`，其中 `XXX`\
  \ 是 32 位中的最后 31 位，则它属于 `A` 类网络；如果一个 IP 地址看起来像 `110XXX`，其中 `XXX` 是 32 位中的最后 29 位，则它属于\
  \ `C` 类网络。`A` 类网络只能有 `128` 个，每个网络可以有 `16777214` 台主机。`A` 类网络可以拥有的主机数量非常大，一个网络不太可能拥有那么多主机。在\
  \ `C` 类网络中，一个网络可以拥有的最大主机数限制为 254。\n\n表 4-2.\n\n有类寻址方案中的五类 IPv4\n\n| 网络类别 | 前缀 |\
  \ 后缀 | 前缀中的前导位 | 网络数量 | 每个网络的主机数量 |\n| --- | --- | --- | --- | --- | --- |\n| `A`\
  \ | 8 位 | 24 位 | `0` | `128` | `16777214` |\n| `B` | 16 位 | 16 位 | `10` | `16384`\
  \ | `65534` |\n| `C` | 24 位 | 8 位 | `110` | `2097152` | `254` |\n| `D` | 未定义 | 未定义\
  \ | `1110` | 未定义 | 未定义 |\n| `E` | 未定义 | 未定义 | `1111` | 未定义 | 未定义 |\n\n\n\n如果一个组织被分配了一个\
  \ `C` 类网络地址，但只有 10 台主机需要接入该网络，会发生什么情况？该网络中 IP 地址的其余插槽将保持未使用状态。请记住，IP 地址中的主机（或后缀）部分在网络（前缀部分）内必须是唯一的。另一方面，如果一个组织需要将\
  \ 300 台计算机连接到一个网络，它需要获取两个 `C` 类网络地址，因为获取一个可容纳 `65534` 台主机的 `B` 类网络地址，同样会浪费大量 IP\
  \ 地址。\n\n请注意，如果分配给后缀的位数是 `N`，则可使用的主机数量为 `2` ^(`N`) `- 2`。两种位模式——全 0 和全 1——不能用于主机地址。它们用于特殊目的。这就是\
  \ `C` 类网络最多只能有 254 台主机，而不是 256 台的原因。`D` 类地址用作多播地址。`E` 类地址被保留。\n\n互联网的快速增长以及大量 IP\
  \ 地址未被使用，促使人们采用一种新的寻址方案。该方案仅基于一个标准——人们应该能够在 IP 地址的前缀和后缀部分之间使用任意边界，而不是使用预定义的 8、16\
  \ 和 24 位边界。这将使未使用的地址保持在最低限度。例如，如果一个组织需要一个只有 20 台主机的网络的网络号，该组织可以只使用 27 位前缀和 5 位后缀。\n\
  \n有两个术语，称为子网划分和超网划分，用于描述后缀中的某些位用于前缀，以及前缀中的某些位用作后缀的情况。当后缀中的位用作前缀时，本质上是以牺牲主机地址为代价来创建更多的网络地址。这些额外的网络地址称为子网。子网划分是通过使用一个称为子网掩码或地址掩码的数字来实现的。子网掩码是一个\
  \ 32 位数字，用于从 IP 地址计算网络地址。使用子网掩码消除了网络类别必须预定义 IP 地址网络号部分的限制。对 IP 地址和子网掩码执行逻辑 `AND`\
  \ 运算，以计算网络号。在这种寻址方案中，IP 地址总是与其子网掩码一起指定。IP 地址后跟一个斜杠和子网掩码。例如，`140.10.11.9/255.255.0.0`\
  \ 表示一个 IP 地址为 `140.10.11.9`，子网掩码为 `255.255.0.0`。可以使用任何子网掩码，其四个十进制部分的范围从 0 到 255。在此示例中，`140.10.11.9`\
  \ 是一个 `B` 类地址。`B` 类地址使用 16 位作为前缀，16 位作为后缀。让我们从后缀中取出 6 位并将其添加到前缀中。现在，前缀是 22 位，后缀只有\
  \ 10 位。通过这样做，你以牺牲主机号为代价创建了额外的网络号。为了在这种子网划分方案中描述一个 IP 地址，你需要使用子网掩码 `255.255.252.0`。如果你使用此子网掩码将\
  \ IP 地址写为 `140.10.11.9/255.255.252.0`，则网络地址计算为 `140.10.8.0`，如下所示：\n\n```\nIP 地址:\
  \   10001100 00001010 00001011 00001001\n子网掩码:  11111111 11111111 11111100 00000000\n\
  \n逻辑 AND:  10001100 00001010 00001000 00000000\n(140)     (10)      (8)      (0)\n\
  ```\n\n无类别域间路由选择 (CIDR) 是另一种 IPv4 寻址方案，其中 IPv4 地址被指定为四个点分十进制数，后跟一个斜杠和另一个十进制数，例如\
  \ `192.168.1.231/24`，其中最后一个数字 `24` 表示 32 位 IPv4 地址中的前缀长度（或用于网络号的位数）。请注意，CIDR 寻址方案允许你在\
  \ 32 位 IPv4 中的任意位位置定义前缀/后缀边界。通过将位从前缀移动到后缀，你可以组合多个网络并增加每个网络的主机数量。这称为超网划分。你可以使用 CIDR\
  \ 表示法创建超网以及子网。\n\nIPv4 寻址方案中的某些 IP 地址被保留用于广播和多播 IP 地址。我将在本章后面讨论广播和多播。\n\n\n\n###\
  \ IPv6 寻址方案\n\nIPv6 是 IP 协议的新版本，也是 IPv4 的继任者。在快速发展的互联网世界中，IPv4 的地址空间正面临枯竭。IPv6 旨在提供足够的地址空间，以便在未来几十年内，世界上的每台计算机都能获得一个唯一的\
  \ IP 地址。以下是 IPv6 的一些主要特性：\n\n*   IPv6 使用 128 位数字作为 IP 地址，而 IPv4 使用 32 位数字。\n*  \
  \ 其 IP 数据包的头部格式与 IPv4 不同。IPv4 每个数据报只有一个头部，而 IPv6 每个数据报有一个基本头部，后跟多个可变长度的扩展头部。\n*\
  \   IPv6 支持比 IPv4 更大的数据报。\n*   在 IPv4 中，路由器执行 IP 数据包的分片。在 IPv6 中，应由发送主机执行数据包分片，而非路由器。这意味着使用\
  \ IPv6 的主机必须预先知道路径的最大传输单元（MTU），即通往目标主机的所有网络所允许的最大数据包大小的最小值。当 IP 数据报需要进入一个传输容量比其离开的网络更小的网络时，就会发生分片。在\
  \ IPv4 中，分片由检测到路由中存在较低传输容量网络的路由器执行。由于 IPv6 只允许主机执行分片，因此主机必须发现能够通过从源主机到目标主机的所有可能路由的最小尺寸数据报。\n\
  *   IPv6 支持在头部中为数据报指定路由信息，以便路由器可以利用该信息通过特定路由来转发数据报。此功能有助于传递时间关键型信息。\n*   IPv6 是可扩展的。可以向\
  \ IPv6 数据报添加任意数量的扩展头部，这些头部可以以新的方式进行解释。\n\nIPv6 使用 128 位 IP 地址。它使用一种易于理解的表示法以文本形式表示\
  \ IP 地址。这 128 位被分成 8 个字段，每个字段 16 位。每个字段以十六进制形式书写，并用冒号分隔。以下是 IPv6 地址的一些示例：\n\n* \
  \  `F6DC:0:0:4015:0:BA98:C0A8:1E7`\n*   `F6DC:0:0:7678:0:0:0:A21D`\n*   `F6DC:0:0:0:0:0:0:A21D`\n\
  *   `0:0:0:0:0:0:0:1`\n\nIPv6 地址中经常有许多字段的值为零，尤其是所有 IPv4 地址。IPv6 地址表示法允许您使用两个连续的冒号来压缩连续的零值字段。在一个地址中，您只能使用两个冒号来压缩连续的零值字段一次。可以使用零压缩技术重写上述\
  \ IPv6 地址：\n\n*   `F6DC::4015:0:BA98:C0A8:1E7`\n*   `F6DC:0:0:7678::A21D`\n*   `F6DC::A21D`\n\
  *   `::1`\n\n请注意，在第二个地址 `F6DC:0:0:7678::A21D` 中，我们只能压缩两组连续零值字段中的一组。将其重写为 `F6DC::7678::A21D`\
  \ 是无效的，因为它多次使用了两个冒号。您可以使用两个冒号来压缩连续的零值字段，这些字段可能出现在地址字符串的开头、中间或结尾。如果一个地址全部为零，您可以简单地将其表示为\
  \ `::`。\n\n您还可以在 IPv6 地址中混合使用十六进制和十进制格式。当您有一个 IPv4 地址并希望以 IPv6 格式书写时，这种表示法非常有用。您可以按照前面描述的方式，使用十六进制表示法书写前六个\
  \ 16 位字段，并对最后两个 16 位字段使用 IPv4 的点分十进制表示法。混合表示法的形式为 `X:X:X:X:X:X:D.D.D.D`，其中 `X` 是十六进制数字，`D`\
  \ 是十进制数字。您可以使用此表示法重写之前的 IPv6 地址，如下所示：\n\n*   `F6DC::4015:0:BA98:192.168.1.231`\n\
  *   `F6DC:0:0:7678::0.0.162.29`\n*   `F6DC::0.0.162.29`\n*   `::0.0.0.1`\n\n与 IPv4\
  \ 不同，IPv6 不基于网络类别分配 IP 地址。与 IPv4 一样，它使用 CIDR 地址，因此 IP 地址中前缀和后缀之间的边界可以在任意比特位指定。例如，`::1`\
  \ 可以用 CIDR 表示法表示为 `::1/128`，其中 128 是前缀长度。\n\n提示\n\n当 IPv6 地址作为 URL 的一部分出现在字面字符串中时，应将其括在方括号（`[]`）中。此规则不适用于\
  \ IPv4。例如，如果您使用 IPv4 地址访问环回地址上的 Web 服务器，可以使用类似 [`http://127.0.0.1/index.html`](http://127.0.0.1/index.html)\
  \ 的 URL。在 IPv6 地址表示法中，您需要使用类似 `http://[::1]/index.html` 的 URL。在使用前，请确保您的浏览器支持 URL\
  \ 中的 IPv6 地址表示法。\n\n## 特殊 IP 地址\n\n某些 IP 地址用于特殊目的。其中一些 IP 地址如下：\n\n*   环回 IP 地址\n\
  *   单播 IP 地址\n*   多播 IP 地址\n*   任播 IP 地址\n*   广播 IP 地址\n*   未指定 IP 地址\n\n以下各节将详细描述这些特殊\
  \ IP 地址的用途。\n\n### 环回 IP 地址\n\n测试或运行网络程序至少需要两台通过网络连接的计算机。有时，在项目开发阶段测试网络程序时，建立网络可能不可行或不理想。IP\
  \ 的设计者意识到了这一需求。IP 寻址方案中有一项规定，即将 IP 地址视为环回地址，以便仅使用一台计算机就能测试网络程序。当协议栈中的互联网层检测到 IP\
  \ 数据报的目标地址是环回 IP 地址时，它不会将数据包传递给其下方的协议层（即网络接口层）。相反，它会回转（或环回，因此得名环回地址）并将数据包路由回同一台计算机的传输层。传输层将像处理来自远程主机的数据包一样，将数据包传递给同一主机上的目标进程。环回\
  \ IP 地址使得使用一台计算机测试网络程序成为可能。图 4-5 描绘了 IP 如何处理目标地址为环回 IP 地址的互联网数据包。该数据包永远不会离开源计算机。它被互联网层拦截并路由回其起始的同一台计算机。\n\
  \n![A323071_2_En_4_Fig5_HTML.gif](img/A323071_2_En_4_Fig5_HTML.gif)\n\n图 4-5.\n\n\
  目标地址为环回 IP 地址的互联网数据包，由互联网层中的互联网协议路由回同一台计算机\n\n环回 IP 地址是保留地址，IP 协议不得将目标地址为环回 IP 地址的数据包转发到网络接口层。\n\
  \n在 IPv4 寻址方案中，`127.X.X.X` 块被保留用于环回地址，其中 `X` 是 0 到 255 之间的十进制数字。通常，`127.0.0.1` 在\
  \ IPv4 中被用作环回地址。但是，您并不局限于仅使用 `127.0.0.1` 作为唯一的环回地址。如果需要，您也可以使用 `127.0.0.2` 或 `127.3.5.11`\
  \ 作为有效的环回地址。通常，名称 `localhost` 被映射到计算机上的环回地址 `127.0.0.1`。\n\n在 IPv6 寻址方案中，只有一个环回地址，足以对网络程序执行任何本地测试。它是\
  \ `0:0:0:0:0:0:0:1` 或简写为 `::1`。\n\n### 单播 IP 地址\n\n单播是网络上两台计算机之间的一对一通信，其中 IP 数据包被传送到单个远程主机。单播\
  \ IP 地址标识网络上的唯一主机。IPv4 和 IPv6 都支持单播 IP 地址。\n\n\n\n### 组播 IP 地址\n\n组播是一种一对多的通信方式，其中一台计算机发送一个\
  \ IP 数据包，该数据包会被传送到多台远程计算机。组播允许你实现群组交互的概念，例如音频或视频会议，其中一台计算机向组内的所有计算机发送信息。使用组播代替多个单播的好处在于，发送方只发送数据包的一个副本。只要可能，数据包的一个副本就会在网络中传输。如果数据包的接收者位于多个网络上，则在需要时复制数据包，并且每个数据包副本会独立路由。最终，每个接收者都会收到一个单独的数据包副本。组播是群组成员之间一种高效的通信方式，因为它减少了网络流量。\n\
  \n一个 IP 数据包只有一个目标 IP 地址。那么，如何使用组播将 IP 数据包传送到多个主机呢？IP 在其地址空间中包含一些地址作为组播地址。如果一个数据包的目标地址是组播地址，该数据包将被传送到多个主机。组播数据包传送的概念类似于某项活动的群组成员资格。当一个群组形成时，该群组会被赋予一个群组\
  \ ID。任何发送到该群组 ID 的信息都会被传送给所有群组成员。在组播通信中，会使用一个组播 IP 地址（类似于群组 ID）。组播数据包的目标地址就是该组播地址。每个感兴趣的主机都会向本地路由器注册其\
  \ IP 地址，表明它对该组播地址上的通信感兴趣。主机与本地路由器之间的注册过程通过互联网组管理协议（IGMP）完成。当路由器收到一个带有组播地址的数据包时，它会将该数据包的一个副本传送给每个在该路由器上注册了该组播地址的主机。接收者可以随时通过通知路由器来选择离开该组播组。\n\
  \n一个组播数据包在到达接收主机之前，可能会经过许多路由器。一个组播数据包的所有接收者可能不在同一个网络上。有许多协议，例如距离向量组播路由协议（DVMRP），用于处理组播数据包的路由。\n\
  \nIPv4 和 IPv6 都支持组播寻址。在 IPv4 中，`D` 类网络地址用于组播。也就是说，在 IPv4 的组播地址中，最高的四位是 `1110`。在\
  \ IPv6 中，组播地址的前 8 位被设置为 1。也就是说，IPv6 中的组播地址总是以 `FF` 开头。例如，`FF0X:0:0:0:0:0:2:0000`\
  \ 是 IPv6 中的一个组播地址。\n\n### 任播 IP 地址\n\n任播是一种从群组到其中一员的通信方式，其中一台计算机向一组计算机发送数据包，但该数据包只被传送到该组中的恰好一台计算机。IPv4\
  \ 不支持任播。IPv6 支持任播。在任播中，同一个地址被分配给多台计算机。当路由器收到一个目标地址为任播地址的数据包时，它会将该数据包传送到最近的一台计算机。当一个服务已在多台主机上复制，并且你希望向客户端提供最近主机上的服务时，任播非常有用。有时，任播地址也被称为集群地址。任播地址是从单播地址空间中使用的。你无法通过查看位排列来区分单播地址和任播地址。当同一个单播地址被分配给多台主机时，它就被视为任播地址。请注意，路由器必须知道哪些主机被分配了任播地址，这样它才能将目标地址为该任播地址的数据包传送到最近的主机之一。\n\
  \n### 广播 IP 地址\n\n广播是一种一对所有的通信方式，其中一台计算机发送一个数据包，该数据包会被传送到网络上的所有计算机。IPv4 将一些地址指定为广播地址。当所有\
  \ 32 位都设置为 1 时，就形成了一个广播地址，该数据包会被传送到本地子网上的所有主机。当主机地址中的所有位都设置为 1，并且指定了一个网络地址时，就形成了该指定网络号的广播地址。例如，`255.255.255.255`\
  \ 是本地子网的广播地址，而 `192.168.1.255` 是网络 `192.168.1.0` 的广播地址。IPv6 没有广播地址。在 IPv6 中，你需要使用组播地址作为广播地址。\n\
  \n### 未指定 IP 地址\n\nIPv4 中的 `0.0.0.0` 和 IPv6 中的 `::`（注意 `::` 表示所有位都设置为零的 128 位 IPv6\
  \ 地址）被称为未指定地址。主机使用此地址作为源地址，以表明它还没有 IP 地址，例如在启动过程中尚未被分配 IP 地址时。\n\n\n\n## 端口号\n\n\
  端口号是一个 16 位的无符号整数，取值范围从 0 到 65535。有时端口号也简称为端口。一台计算机上运行着许多进程，这些进程与远程计算机上运行的其他进程进行通信。当传输层从网络层接收到一个传入的数据包时，它需要知道该数据包应被递送到这台计算机上的哪个进程（运行在应用层）。端口号是一个逻辑编号，传输层用它来识别计算机上数据包的目标进程。\n\
  \n每个到达传输层的数据包都带有一个协议；例如，传输层中的 TCP 协议处理程序处理 TCP 数据包，而传输层中的 UDP 协议处理程序处理 UDP 数据包。\n\
  \n在应用层，一个进程会为它想要与远程进程通信的每个通信通道使用一个独立的协议。一个进程会为它针对特定协议打开的每个通信通道使用一个唯一的端口号，并将该端口号注册到传输层中对应的特定协议模块。因此，对于特定协议而言，端口号必须是唯一的。例如，进程\
  \ P1 可以为 TCP 协议使用端口号 1988，而另一个名为 P2 的进程可以在同一台计算机上为 UDP 协议使用相同的端口号 1988。主机上的一个进程使用远程进程的协议和端口号来向该远程进程发送数据。\n\
  \n计算机上的一个进程是如何开始与远程进程通信的呢？例如，当你访问雅虎网站时，你只需输入[`http://www.yahoo.com`](http://www.yahoo.com)作为网页地址。在这个网页地址中，`http`表示应用层协议，它使用\
  \ TCP 作为传输层协议，而[`www.yahoo.com`](http://www.yahoo.com)是机器名，它会通过域名系统（DNS）解析为一个 IP\
  \ 地址。由[`www.yahoo.com`](http://www.yahoo.com)标识的机器可能运行着许多进程，这些进程可能都使用`http`协议。你的网页浏览器连接到的是[`www.yahoo.com`](http://www.yahoo.com)上的哪个进程呢？由于很多人使用雅虎网站，它需要在一个众所周知的端口上运行其`http`服务，这样每个人都可以使用该端口连接到它。通常，`http`网页服务器运行在端口\
  \ 80。你可以使用[`http://www.yahoo.com:80`](http://www.yahoo.com:80)，这与使用[`http://www.yahoo.com`](http://www.yahoo.com)是相同的。并非总是必须将`http`网页服务器运行在端口\
  \ 80。如果你没有将`http`网页服务器运行在端口 80，那么想要使用你`http`服务的人必须知道你所使用的端口。IANA 负责推荐哪些端口号用于众所周知的服务。IANA\
  \ 将端口号分为三个范围：\n\n*   知名端口：0 - 1023\n*   注册端口：1024 - 49151\n*   动态和/或私有端口：49152 -\
  \ 65535\n\n知名端口号被全球最常用的服务（如 HTTP、FTP 等）所使用。表 4-3 列出了一些用于知名应用层协议的知名端口。通常，你需要在计算机上拥有管理员权限才能使用知名端口。\n\
  \n表 4-3.\n\n用于部分应用层协议的知名端口列表\n\n| 应用层协议 | 端口号 |\n| --- | --- |\n| `echo` | `7` |\n\
  | `FTP` | `21` |\n| `Telnet` | `23` |\n| `SMTP` | `25` |\n| `HTTP` | `80` |\n| `HTTPS`\
  \ | `443` |\n| `POP3` | `110` |\n| `NNTP` | `119` |\n\n一个组织（或用户）可以在注册端口范围内向 IANA\
  \ 注册一个端口号，供某个应用程序使用。例如，端口 1099（TCP/UDP）已被注册用于 RMI 注册表（RMI 代表远程方法调用）。\n\n任何应用程序都可以使用动态/私有端口号范围内的端口号。\n\
  \n\n\n## Socket API 与客户端-服务器范式\n\n我尚未开始讨论使 Java 程序能够实现网络通信的 Java 类。在本节中，我将介绍套接字以及两个远程主机之间网络通信中使用的客户端-服务器范式。\n\
  \n在前面的章节中，我简要介绍了不同的底层协议及其职责。现在是时候向上移动到协议栈，讨论应用层与传输层之间的交互了。应用程序如何利用这些协议与远程应用程序通信？操作系统提供了一种称为套接字的应用程序编程接口（API），它允许两个远程应用程序利用协议栈中的底层协议进行通信。套接字并不是另一层协议。它是传输层与应用层之间的接口。它为这两层之间提供了一种标准的通信方式，进而为两个远程应用程序之间提供了一种标准的通信方式。套接字有两种类型：\n\
  \n*   面向连接的套接字\n*   无连接的套接字\n\n面向连接的套接字也称为流套接字。无连接的套接字也称为数据报套接字。请注意，在互联网上，数据始终是使用\
  \ IP 数据报一次一个数据报地从一台主机发送到另一台主机。\n\n传输控制协议（TCP）用于传输层，是提供面向连接套接字最广泛使用的协议之一。应用程序将数据交给\
  \ TCP 套接字，TCP 负责将数据流式传输到目标主机。TCP 负责处理通信双方的所有问题，如排序、分片、组装、丢失数据检测、重复数据传输等，这给应用程序一种印象，即数据像连续的字节流一样从源应用程序流向目标应用程序。使用\
  \ TCP 套接字的两台主机之间在硬件层面不存在物理连接。这一切都在软件中实现。有时它也被称为虚拟连接。两个套接字的组合唯一地定义了一个连接。\n\n在面向连接的套接字通信中，客户端和服务器各自在其端创建一个套接字，建立连接，然后交换信息。TCP\
  \ 负责处理数据传输过程中可能出现的错误。TCP 也被称为可靠的传输层协议，因为它保证数据的交付。如果由于某些原因无法交付数据，它会将错误情况通知发送方应用程序。发送数据后，它会等待接收方的确认，以确保数据到达目的地。然而，TCP\
  \ 提供的可靠性是有代价的。与无连接协议相比，其开销要大得多，并且速度更慢。TCP 确保发送方发送的数据量是接收方缓冲区大小能够处理的。它还处理网络上的流量拥塞。当检测到流量拥塞时，它会减慢数据传输速度。Java\
  \ 支持 TCP 套接字。\n\n用户数据报协议（UDP）用于传输层，是提供无连接套接字最广泛使用的协议。它不可靠，但速度更快。它允许你发送有限大小的数据——一次一个数据包，这与\
  \ TCP 不同，TCP 允许你以任意大小的流形式发送数据，并处理将其分割成适当大小数据包的细节。使用 UDP 发送数据时，不保证数据交付。然而，它仍然在许多应用程序中使用，并且运行良好。发送方将\
  \ UDP 数据包发送到目的地后就不再理会。如果接收方收到了，它就收到了。否则，接收方无法知道曾有一个 UDP 数据包发送给它。你可以将 TCP 和 UDP 中使用的通信与电话和邮寄信件中使用的通信进行比较。电话交谈是可靠的，并且在通信双方之间提供确认。当你邮寄一封信时，你不知道收件人何时收到，或者他是否收到了。UDP\
  \ 和 TCP 之间还有另一个重要区别。UDP 不保证数据的顺序。也就是说，如果你使用 UDP 向目的地发送五个数据包，这五个数据包可能以任意顺序到达。然而，TCP\
  \ 保证数据包将按照发送的顺序交付。Java 支持 UDP 套接字。\n\n应该使用哪种协议：TCP 还是 UDP？这取决于应用程序的使用方式。如果数据完整性至关重要，你应该使用\
  \ TCP。如果速度优先于较低的数据完整性，你应该使用 UDP。例如，文件传输应用程序应该使用 TCP，而视频会议应用程序应该使用 UDP。如果你丢失了几个像素的视频数据，对视频会议来说影响不大，可以继续进行。然而，如果在传输文件时丢失了几个字节的数据，该文件可能完全无法使用。\n\
  \n两个远程应用程序如何开始通信？哪个应用程序发起通信？应用程序如何知道远程应用程序有兴趣与其通信？你是否曾拨打过公司的客服号码与客服代表通话？如果你曾与公司的客服代表交谈过，那么你已经体验过两个远程应用程序的通信。在本节中，我将借用公司客服的机制来解释远程通信。你和公司的代表位于两个远程地点。你需要一项服务，而公司提供该服务。换句话说，你是客户端，公司是服务提供者（或服务器）。你不知道何时需要公司的服务。公司提供一个客服电话号码，以便你可以联系公司。公司还做了一件事。公司必须做什么才能为你提供服务？你能猜到吗？它在你给它的电话号码处等待你的来电。通信必须在你和公司之间进行，而公司已经通过被动等待你的电话，在通信中向前迈出了一步。一旦你拨通公司的号码，连接就建立了，你与公司的代表交换信息。最后，双方挂断电话，终止通信。使用套接字的网络通信类似于你与公司代表之间的通信。如果你理解了这个通信示例，理解套接字就很容易了。\n\
  \n两个远程应用程序使用一对套接字进行通信。任何通信都需要两个端点。套接字是通信通道每一端的通信端点。通过一对套接字的通信遵循典型的客户端-服务器通信范式。一个应用程序创建一个套接字并被动等待被另一个远程应用程序联系。等待远程应用程序联系它的应用程序称为服务器应用程序，或简称为服务器。另一个应用程序创建一个套接字并启动与等待中的服务器应用程序的通信。这称为客户端应用程序，或简称为客户端。在客户端和服务器能够交换信息之前，还必须执行许多其他步骤。例如，服务器必须公布其位置和其他自身详细信息，以便客户端可以联系它。\n\
  \n套接字会经历不同的状态。每个状态标志着一个事件。正是套接字的状态告诉你套接字能做什么和不能做什么。通常，套接字的生命周期由表 4-4 中列出的八个原语描述。\n\
  \n表 4-4. 典型套接字原语及其描述\n\n| 原语 | 描述 |\n| --- | --- |\n| `Socket` | 创建一个套接字，应用程序将其用作通信端点。\
  \ |\n| `Bind` | 将本地地址关联到套接字。本地地址包括一个 IP 地址和一个端口号。端口号必须是 0 到 65535 之间的数字。对于计算机上套接字所使用的协议，该端口号应是唯一的。例如，如果一个\
  \ TCP 套接字使用端口 12456，一个 UDP 套接字也可以使用相同的端口号 12456。 |\n| `Listen` | 定义其等待客户端请求的队列大小。仅由面向连接的服务器套接字执行。\
  \ |\n| `Accept` | 等待客户端请求到达。仅由面向连接的服务器套接字执行。 |\n| `Connect` | 尝试与正在等待 `accept` 原语的服务器套接字建立连接。由面向连接的客户端套接字执行。\
  \ |\n| `Send/Sendto` | 发送数据。通常 `send` 表示面向连接套接字上的发送操作，`Sendto` 表示无连接套接字上的发送操作。 |\n\
  | `Receive/ReceiveFrom` | 接收数据。它们是 `Send` 和 `Sendto` 的对应操作。 |\n| `Close` | 关闭连接\
  \ |\n\n以下各节将详细阐述每个套接字原语。\n\n\n\n### Socket 原语\n\n服务器通过指定 socket 的类型（流式 socket 或数据报\
  \ socket）来创建它。\n\n### 绑定原语\n\n`bind` 原语将 socket 关联到一个本地 IP 地址和一个端口号。请注意，一台主机可以有多个\
  \ IP 地址。一个 socket 可以绑定到主机的其中一个 IP 地址，也可以绑定到所有 IP 地址。将 socket 绑定到主机所有可用的 IP 地址也称为绑定到通配符地址。绑定会为该\
  \ socket 保留端口号。其他任何 socket 都不能使用该端口号进行通信。绑定的端口将被传输层协议（TCP 以及 UDP）用于路由发往该 socket\
  \ 的数据。我将在本节稍后部分详细解释传输层与 socket 之间的数据传输。目前，只需理解在绑定时，socket 告诉传输层：“这是我的 IP 地址和端口号，如果你收到任何发往此地址的数据，请将其传递给我。”\
  \ socket 绑定的 IP 地址和端口号分别称为该 socket 的本地地址和本地端口。\n\n### 监听原语\n\n服务器通知操作系统将 socket\
  \ 置于被动模式，以便等待传入的客户端请求。此时，服务器尚未准备好接受任何客户端请求。服务器还会为 socket 指定一个等待队列大小。当客户端通过此 socket\
  \ 联系服务器时，客户端请求会被放入该队列。初始时，队列为空。如果客户端通过此 socket 联系服务器时等待队列已满，客户端的请求将被拒绝。\n\n### 接受原语\n\
  \n服务器通知操作系统，此 socket 已准备好接受客户端请求。如果服务器使用的是无连接传输层协议（如 UDP）的 socket，则不会执行此步骤。此步骤针对\
  \ TCP 服务器 socket 执行。当 socket 向操作系统发送接受消息时，它会阻塞，直到收到客户端的新连接请求。\n\n### 连接原语\n\n只有面向连接的客户端\
  \ socket 才会执行此步骤。这是 socket 通信中最重要的阶段。客户端 socket 向服务器 socket 发送请求以建立连接。服务器 socket\
  \ 已发出 `accept` 并一直在等待客户端请求到达。客户端 socket 会发送服务器 socket 的 IP 地址和端口号。回想一下，服务器 socket\
  \ 在开始监听并接受来自外部的连接之前，会先绑定一个 IP 地址和一个端口号。客户端 socket 在发送请求的同时，还会发送其自身的 IP 地址以及它已绑定的端口号。\n\
  \n此时出现一个重要问题。传输层（如 TCP）如何知道来自客户端的报文（以连接请求的形式）必须交给服务器 socket？在绑定阶段，socket 会指定其本地\
  \ IP 地址和本地端口号，以及远程 IP 地址和远程端口号。如果服务器 socket 只想接受来自特定远程主机 IP 地址和端口号的连接，它可以这样做。通常，服务器\
  \ socket 会接受来自任何客户端的连接，并将其远程地址指定为未指定的 IP 地址和零端口号。服务器 socket 会将五条信息——本地 IP 地址、本地端口号、远程\
  \ IP 地址、远程端口号以及一个缓冲区——传递给传输层。传输层将它们存储在一个称为传输控制块（TCB）的特殊结构中，以备将来使用。当来自外部的报文到达传输层时，它会根据传入报文中包含的四条信息（<源\
  \ IP 地址、源端口号、目的 IP 地址、目的端口号>）查找其 TCB。回想一下，客户端会在每个 TCP 报文中向服务器发送源地址和目的地址。传输层尝试查找与源地址和目的地址关联的缓冲区。如果找到缓冲区，它会将传入的数据传输到该缓冲区，并通知\
  \ socket 缓冲区中有其信息。如果服务器 socket 接受来自任何客户端的请求（远程地址全为零），则来自任何客户端的数据都将被路由到其缓冲区。\n\n\
  一旦服务器 socket 检测到来自客户端的请求，它会使用远程客户端的地址信息创建一个新的 socket。新的 socket 使用 <本地 IP 地址、本地端口号（与服务器\
  \ socket 的端口号相同）、远程 IP 地址和远程端口号> 进行绑定，并创建一个新的缓冲区绑定到这些组合地址。实际上，一个 socket 会创建两个缓冲区：一个用于传入数据，一个用于传出数据。此时，服务器\
  \ socket 让新 socket 与请求连接的客户端 socket 进行通信。服务器 socket 本身可以关闭（不再接受客户端连接请求），也可以重新开始等待以接受另一个客户端的连接请求。\n\
  \n在两个 socket（一个客户端和一个服务器）之间建立连接后，它们可以交换信息。TCP 连接支持全双工连接。也就是说，数据可以同时在两个方向上发送或接收。\n\
  \n客户端 socket 在尝试连接到服务器之前，就知道其本地 IP 地址、本地端口号、远程 IP 地址和远程端口号。在客户端，TCB 的创建遵循类似的规则。\n\
  \n一旦客户端和服务器 socket 就位，两个 socket（客户端 socket 和专用于该客户端的服务器 socket）就定义了一个连接。\n\n服务器\
  \ socket 就像坐在办公室（服务器）前台接待处的接待员。客户进来首先与接待员交谈。连接请求从客户端到达服务器，并首先联系服务器 socket。接待员将客户交给另一位员工。此时，接待员与该客户的工作就结束了。她继续工作，等待迎接下一位来到办公室的客户。与此同时，第一个客户可以根据需要继续与另一位员工交谈。类似地，服务器\
  \ socket 创建一个新的 socket，并将该新 socket 分配给客户端以进行进一步通信。一旦服务器 socket 将新 socket 分配给客户端，它与该客户端的工作就结束了。它将等待来自另一个客户端的另一个传入连接请求。请注意，除了许多其他细节外，一个\
  \ socket 关联着五条重要信息：协议、本地 IP 地址、本地端口号、远程 IP 地址和远程端口号。\n\n### 发送/Sendto 原语\n\n这是 socket\
  \ 发送数据的阶段。\n\n### 接收/ReceiveFrom 原语\n\n这是 socket 接收数据的阶段。\n\n### 关闭原语\n\n是时候说再见了。最后，服务器和客户端\
  \ socket 关闭连接。\n\n后续章节将讨论支持不同类型 socket 以促进网络编程的 Java 类。与网络编程相关的 Java 类位于 `java.net`、`javax.net`\
  \ 和 `javax.net.ssl` 包中。\n\n\n\n## 表示机器地址\n\n互联网协议使用机器的 IP 地址来传送数据包。在程序中使用 IP 地址并不总是那么容易，因为它是数字格式。你可能能够记住并使用\
  \ IPv4 地址，因为它们只有四个十进制数字。而记忆和使用 IPv6 地址则稍微困难一些，因为它们采用十六进制格式，包含八个数字。每台计算机也有一个名称，例如\
  \ [`www.yahoo.com`](http://www.yahoo.com)。在程序中使用计算机名称会让你的工作轻松很多。Java 提供了相应的类，让你可以在\
  \ Java 程序中使用计算机名称或 IP 地址。如果你使用计算机名称，Java 会负责通过域名系统（DNS）将该计算机名称解析为其 IP 地址。\n\n`InetAddress`\
  \ 类的对象代表一个 IP 地址。它有两个子类：`Inet4Address` 和 `Inet6Address`，分别代表 IPv4 和 IPv6 地址。`InetAddress`\
  \ 类没有公共构造器。它提供了以下工厂方法来创建其对象。这些方法如下所示——它们都会抛出受检异常 `UnknownHostException`：\n\n*  \
  \ `static InetAddress[] getAllByName(String host)`\n*   `static InetAddress getByAddress(byte[]\
  \ addr)`\n*   `static InetAddress getByAddress(String host, byte[] addr)`\n*   `static\
  \ InetAddress getByName(String host)`\n*   `static InetAddress getLocalHost()`\n\
  *   `static InetAddress getLoopbackAddress()`\n\n`host` 参数指的是标准格式的计算机名称或 IP 地址。`addr`\
  \ 参数指的是 IP 地址的各部分，以字节数组形式表示。如果你指定一个 IPv4 地址，`addr` 必须是一个包含 4 个元素的 `byte` 数组。对于 IPv6\
  \ 地址，它应该是一个包含 16 个元素的 `byte` 数组。`InetAddress` 类负责使用 DNS 将主机名解析为 IP 地址。\n\n有时一台主机可能有多个\
  \ IP 地址。`getAllByName()` 方法会以 `InetAddress` 对象数组的形式返回所有地址。\n\n通常，你会使用这些工厂方法之一创建一个\
  \ `InetAddress` 类的对象，然后在创建套接字和建立连接时将该对象传递给其他方法。以下代码片段演示了它的一些用法。当你使用 `InetAddress`\
  \ 类或其子类时，需要处理异常。\n\n```\n// 获取雅虎网络服务器的 IP 地址\nInetAddress yahooAddress = InetAddress.getByName(\"\
  www.yahoo.com\");\n// 获取回环 IP 地址\nInetAddress loopbackAddress = InetAddress.getByName(null);\n\
  /* 获取本地主机的地址。通常，名称 \"localhost\" 会\n映射到回环地址。这里，我们尝试获取的是执行此代码的\n本地计算机的 IP 地址，而不是回环地址。\n\
  */\nInetAddress myComputerIPAddress = InetAddress.getLocalHost();\n```\n\n以下代码片段展示了如何打印执行该代码的计算机的名称和\
  \ IP 地址：\n\n```\ntry {\nInetAddress addr = InetAddress.getLocalHost();\nSystem.out.println(\"\
  我的计算机名称: \" + addr.getHostName());\nSystem.out.println(\"我的计算机 IP 地址: \" + addr.getHostAddress());\n\
  } catch (UnknownHostException e) {\ne.printStackTrace();\n}\n```\n\n清单 4-2 演示了 `InetAddress`\
  \ 类及其一些方法的使用。当你运行该程序时，可能会得到不同的输出。\n\n```\n// InetAddressTest.java\npackage com.jdojo.net;\n\
  import java.io.IOException;\nimport java.net.InetAddress;\npublic class InetAddressTest\
  \ {\npublic static void main(String[] args) {\n// 打印 www.yahoo.com 的地址详情\nprintAddressDetails(\"\
  www.yahoo.com\");\n// 打印回环地址详情\nprintAddressDetails(null);\n// 使用 IPv6 格式打印回环地址详情\n\
  printAddressDetails(\"::1\");\n}\npublic static void printAddressDetails(String\
  \ host) {\nSystem.out.println(\"主机名: \" + host);\ntry {\nInetAddress addr = InetAddress.getByName(host);\n\
  System.out.println(\"主机 IP 地址: \" + addr.getHostAddress());\nSystem.out.println(\"\
  规范主机名: \" + addr.getCanonicalHostName());\nint timeOutinMillis = 10000;\nSystem.out.println(\"\
  isReachable(): \" + addr.isReachable(timeOutinMillis));\nSystem.out.println(\"isLoopbackAddress():\
  \ \" + addr.isLoopbackAddress());\n} catch (IOException e) {\ne.printStackTrace();\n\
  } finally {\nSystem.out.println(\"-------------------------------\\n\");\n}\n}\n\
  }\n主机名: www.yahoo.com\n主机 IP 地址: 98.138.252.39\n规范主机名: media-router-fp2.prod.media.vip.ne1.yahoo.com\n\
  isReachable(): true\nisLoopbackAddress(): false\n\n主机名: null\n主机 IP 地址: 127.0.0.1\n\
  规范主机名: 127.0.0.1\nisReachable(): true\nisLoopbackAddress(): true\n\n主机名: ::1\n主机\
  \ IP 地址: 0:0:0:0:0:0:0:1\n规范主机名: 0:0:0:0:0:0:0:1\nisReachable(): true\nisLoopbackAddress():\
  \ true\n\n清单 4-2.\n演示 InetAddress 类的使用\n```\n\n## 表示套接字地址\n\n一个套接字地址包含两部分：一个 IP\
  \ 地址和一个端口号。`InetSocketAddress` 类的对象代表一个套接字地址。你可以使用以下构造器来创建 `InetSocketAddress` 类的对象：\n\
  \n*   `InetSocketAddress(InetAddress addr, int port)`\n*   `InetSocketAddress(int\
  \ port)`\n*   `InetSocketAddress(String hostname, int port)`\n\n所有构造器都会尝试将主机名解析为\
  \ IP 地址。如果主机名无法解析，该套接字地址将被标记为未解析，你可以使用 `isUnresolved()` 方法进行测试。如果你不希望此类在创建对象时解析地址，可以使用以下工厂方法来创建套接字地址：\n\
  \n```\nstatic InetSocketAddress createUnresolved(String host, int port)\n```\n\n\
  `InetSocketAddress` 类的 `getAddress()` 方法返回一个 `InetAddress`。如果主机名未解析，`getAddress()`\
  \ 方法返回 `null`。如果你将一个未解析的 `InetSocketAddress` 对象与套接字一起使用，则在绑定过程中会尝试解析该主机名。\n\n清单\
  \ 4-3 展示了如何创建已解析和未解析的 `InetSocketAddress` 对象。当你运行该程序时，可能会得到不同的输出。\n\n```\n// InetSocketAddressTest.java\n\
  package com.jdojo.net;\nimport java.net.InetSocketAddress;\npublic class InetSocketAddressTest\
  \ {\npublic static void main(String[] args) {\nInetSocketAddress addr1 = new InetSocketAddress(\"\
  ::1\", 12889);\nprintSocketAddress(addr1);\nInetSocketAddress addr2 = InetSocketAddress.createUnresolved(\"\
  ::1\", 12881);\nprintSocketAddress(addr2);\n}\npublic static void printSocketAddress(InetSocketAddress\
  \ sAddr) {\nSystem.out.println(\"套接字地址: \" + sAddr.getAddress());\nSystem.out.println(\"\
  套接字主机名: \" + sAddr.getHostName());\nSystem.out.println(\"套接字端口: \" + sAddr.getPort());\n\
  System.out.println(\"isUnresolved(): \" + sAddr.isUnresolved());\nSystem.out.println();\n\
  }\n}\n套接字地址: /0:0:0:0:0:0:0:1\n套接字主机名: 0:0:0:0:0:0:0:1\n套接字端口: 12889\nisUnresolved():\
  \ false\n套接字地址: null\n套接字主机名: ::1\n套接字端口: 12881\nisUnresolved(): true\n清单 4-3.\n\
  创建 InetSocketAddress 对象\n```\n\n\n\n## 创建 TCP 服务器套接字\n\n`ServerSocket` 类的对象代表一个\
  \ TCP 服务器套接字。`ServerSocket` 对象用于接受来自远程客户端的连接请求。`ServerSocket` 类提供了多个构造器。你可以使用无参构造器创建一个未绑定的服务器套接字，然后使用其\
  \ `bind()` 方法将其绑定到本地端口和本地 IP 地址。以下代码片段展示了如何创建服务器套接字：\n\n```\n// 创建一个未绑定的服务器套接字\n\
  ServerSocket serverSocket = new ServerSocket();\n// 创建一个套接字地址对象\nInetSocketAddress\
  \ endPoint = new InetSocketAddress(\"localhost\", 12900);\n// 设置等待队列大小为 100\nint\
  \ waitQueueSize = 100;\n// 将服务器套接字绑定到 localhost 的 12900 端口，等待队列大小为 100\nserverSocket.bind(endPoint,\
  \ waitQueueSize);\n```\n\n`ServerSocket` 类中没有与 `listen` 套接字原语对应的独立 `listen()` 方法。其\
  \ `bind()` 方法负责指定套接字的等待队列大小。\n\n你可以通过使用 `ServerSocket` 类的以下任一构造器，将 `create`、`bind`\
  \ 和 `listen` 操作合并为一步。等待队列大小的默认值为 50。本地 IP 地址的默认值是通配符地址，这意味着服务器机器的所有 IP 地址。\n\n*\
  \   `ServerSocket(int port)`\n*   `ServerSocket(int port, int waitQueueSize)`\n\
  *   `ServerSocket(int port, int waitQueueSize, InetAddress bindAddr)`\n\n你可以将套接字创建和绑定步骤合并到一个语句中，如下所示：\n\
  \n```\n// 在 12900 端口创建一个服务器套接字，等待队列大小为 100\n// 位于 localhost 回环地址\nServerSocket serverSocket\
  \ = new ServerSocket(12900, 100, InetAddress.getByName(\"localhost\"));\n```\n\n\
  一旦服务器套接字创建并绑定完成，它就可以接受来自远程客户端的传入连接请求了。要接受远程连接请求，你需要在服务器套接字上调用 `accept()` 方法。`accept()`\
  \ 方法调用会阻塞，直到远程客户端的请求到达其等待队列。当服务器套接字收到连接请求时，它会从请求中读取远程 IP 地址和远程端口号，并创建一个新的活动套接字。新创建的活动套接字的引用会从\
  \ `accept()` 方法返回。`Socket` 类的对象代表这个新的活动套接字。`accept()` 方法返回一个新的活动套接字，因为它不像服务器套接字那样是被动等待远程请求的。它是一个活动套接字，因为它是为了与远程客户端进行主动通信而创建的。有时这个活动套接字也被称为连接套接字，因为它处理连接上的数据传输。\n\
  \n```\n// 等待新的远程连接请求\nSocket activeSocket = serverSocket.accept();\n```\n\n一旦服务器套接字从\
  \ `accept()` 方法调用返回，服务器应用程序中的套接字数量就增加一个。你拥有一个被动服务器套接字和一个新的活动套接字。这个新的活动套接字是服务器端用于新客户端连接的端点。此时，你需要使用这个新的活动套接字来处理与客户端的通信。\n\
  \n现在，你可以在由新套接字表示的连接上读写数据了。一个 Java TCP 套接字提供全双工连接。它允许你从连接读取数据，也允许你向连接写入数据。为此，`Socket`\
  \ 类包含两个方法：`getInputStream()` 和 `getOutputStream()`。`getInputStream()` 方法返回一个 `InputStream`\
  \ 对象，你可以用它从连接读取数据。`getOutputStream()` 方法返回一个 `OutputStream` 对象，你可以用它向连接写入数据。你使用\
  \ `InputStream` 和 `OutputStream` 对象的方式，就像在本地文件系统上读写文件一样。我假设你熟悉 Java I/O。如果你不熟悉 Java\
  \ I/O，请在继续本节之前参考《Beginning Java 9 Language Features》一书中的第 7 章。不过，你仍然可以在本章后面的部分阅读关于\
  \ UDP 套接字的内容。当你在连接上完成数据读写后，关闭 `InputStream/OutputStream`，最后关闭套接字。以下代码片段从客户端读取一条消息，并将该消息回显给客户端。请注意，服务器和客户端必须在开始通信之前就消息格式达成一致。以下代码片段假设客户端每次发送一行文本：\n\
  \n```\n// 从套接字的输入和输出流创建缓冲读取器和缓冲写入器，\n// 这样我们可以一次读取/写入一行\nBufferedReader br = new\
  \ BufferedReader(new InputStreamReader(activeSocket.getInputStream()));\nBufferedWriter\
  \ bw = new BufferedWriter(new OutputStreamWriter(activeSocket.getOutputStream()));\n\
  ```\n\n你可以像使用它们从文件读取或写入文件一样使用 `br` 和 `bw`。尝试从输入流读取会阻塞，直到连接上有数据可用。\n\n```\n// 从连接读取一行文本\n\
  String inMsg = br.readLine();\n// 向输出缓冲区写入一些文本\nbw.write(\"Hello from server\");\n\
  bw.flush();\n```\n\n最后，使用套接字的 `close()` 方法关闭连接。关闭套接字也会关闭其输入和输出流。实际上，你可以关闭三者（输入流、输出流或套接字）中的任何一个，另外两个将自动关闭。尝试在已关闭的套接字上读写会抛出\
  \ `java.net.SocketException`。你可以使用其 `isClosed()` 方法检查套接字是否已关闭，如果套接字已关闭，该方法返回 `true`。\n\
  \n```\n// 关闭套接字\nactiveSocket.close();\n```\n\n提示\n\n一旦关闭套接字，就不能再重复使用它。在使用新套接字之前，必须创建一个新的套接字并绑定它。\n\
  \n服务器处理两种工作：接受新的连接请求和响应已连接的客户端。如果响应客户端所需时间非常短，你可以使用如下所示的策略：\n\n```\nServerSocket\
  \ serverSocket = 在此处创建服务器套接字;\nwhile(true) {\nSocket activeSocket = serverSocket.accept();\n\
  // 在此处处理 activeSocket 上的客户端请求\n}\n```\n\n这种策略一次只处理一个客户端。它仅适用于并发传入连接数量非常低，并且客户端请求响应时间非常短的情况。如果客户端请求需要很长时间才能响应，所有其他客户端将不得不等待才能被服务。\n\
  \n另一种处理多个客户端请求的策略是在单独的线程中处理每个客户端的请求，这样服务器可以同时为多个客户端提供服务。以下伪代码概述了此策略：\n\n```\nServerSocket\
  \ serverSocket = 在此处创建服务器套接字;\nwhile(true) {\nSocket activeSocket = serverSocket.accept();\n\
  Runnable runnable = () -> {\n// 在此处处理 activeSocket 上的客户端请求\n};\nnew Thread(runnable).start();\
  \ // 启动一个新线程\n}\n```\n\n\n\n当为并发客户端连接创建的线程过多时，这种策略就会失效。另一种在大多数情况下都行之有效的策略是使用线程池来服务所有客户端连接。如果线程池中的所有线程都在忙于服务客户端，那么请求就需要等待，直到某个线程空闲下来才能被处理。\n\
  \n清单 4-4 包含了一个回显服务器的完整代码。它会为每个客户端请求创建一个新线程来处理。现在你可以运行这个回显服务器程序了。不过，由于还没有客户端程序与之连接，它暂时不会有什么实际作用。在下一节学习如何创建\
  \ TCP 客户端套接字之后，你将看到它的实际运行效果。\n\n```\n// TCPEchoServer.java\npackage com.jdojo.net;\n\
  import java.io.BufferedReader;\nimport java.io.BufferedWriter;\nimport java.io.IOException;\n\
  import java.io.InputStreamReader;\nimport java.io.OutputStreamWriter;\nimport java.net.InetAddress;\n\
  import java.net.ServerSocket;\nimport java.net.Socket;\npublic class TCPEchoServer\
  \ {\npublic static void main(String[] args) {\ntry {\n// 创建一个服务器套接字\nServerSocket\
  \ serverSocket\n= new ServerSocket(12900, 100, InetAddress.getByName(\"localhost\"\
  ));\nSystem.out.println(\"服务器已启动，地址为: \" + serverSocket);\n// 在无限循环中持续接受客户端连接\n\
  while (true) {\nSystem.out.println(\"正在等待连接...\");\n// 接受一个连接\nfinal Socket activeSocket\
  \ = serverSocket.accept();\nSystem.out.println(\"收到来自 \" + activeSocket + \" 的连接\"\
  );\n// 创建一个新线程来处理这个新连接\nRunnable runnable = () -> handleClientRequest(activeSocket);\n\
  new Thread(runnable).start(); // 启动一个新线程\n}\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\npublic static void handleClientRequest(Socket socket) {\nBufferedReader socketReader\
  \ = null;\nBufferedWriter socketWriter = null;\ntry {\n// 为套接字创建缓冲读取器和写入器\nsocketReader\n\
  = new BufferedReader(new InputStreamReader(socket.getInputStream()));\nsocketWriter\n\
  = new BufferedWriter(new OutputStreamWriter(socket.getOutputStream()));\nString\
  \ inMsg = null;\nwhile ((inMsg = socketReader.readLine()) != null) {\nSystem.out.println(\"\
  收到来自客户端的消息: \" + inMsg);\n// 将收到的消息回显给客户端\nString outMsg = inMsg;\nsocketWriter.write(outMsg);\n\
  socketWriter.write(\"\\n\");\nsocketWriter.flush();\n}\n} catch (IOException e)\
  \ {\ne.printStackTrace();\n} finally {\ntry {\nsocket.close();\n} catch (IOException\
  \ e) {\ne.printStackTrace();\n}\n}\n}\n}\n清单 4-4.\n基于 TCP 套接字的回显服务器\n```\n\n## 创建\
  \ TCP 客户端套接字\n\n`Socket` 类的对象代表一个 TCP 客户端套接字。你已经了解了 `Socket` 类的对象如何与 TCP 服务器套接字协同工作。对于服务器套接字，你从服务器套接字的\
  \ `accept()` 方法返回值中获取一个 `Socket` 类的对象。对于客户端套接字，你需要执行三个步骤：创建、绑定和连接。`Socket` 类提供了许多构造函数，允许你指定远程\
  \ IP 地址和端口号。这些构造函数会将套接字绑定到本地主机和一个可用的端口号。以下代码片段展示了如何创建一个 TCP 客户端套接字：\n\n```\n// 创建一个客户端套接字，绑定到本地主机的任意可用端口，\n\
  // 并连接到远程 IP 192.168.1.2 的 3456 端口\nSocket socket = new Socket(\"192.168.1.2\",\
  \ 3456);\n// 创建一个未绑定的客户端套接字，然后绑定并连接它\nSocket socket = new Socket();\nsocket.bind(new\
  \ InetSocketAddress(\"localhost\", 14101));\nsocket.connect(new InetSocketAddress(\"\
  localhost\", 12900));\n```\n\n一旦你获得了一个已连接的 `Socket`，就可以分别使用 `getInputStream()` 和\
  \ `getOutputStream()` 方法来获取其输入和输出流。你可以像使用输入输出流读写文件一样，通过该连接进行读写操作。\n\n清单 4-5 包含了一个回显客户端应用程序的完整代码。它接收用户输入，将输入发送给清单\
  \ 4-4 中列出的回显服务器，并将服务器的响应打印到标准输出。回显服务器和回显客户端这两个应用程序必须就它们将要交换的消息格式达成一致。它们每次交换一行文本。需要注意的是，你必须在通过连接发送的每条消息后附加一个换行符，因为你使用的是\
  \ `BufferedReader` 类的 `readLine()` 方法，该方法只有在遇到换行符时才会返回。客户端应用程序必须使用与服务器套接字接受连接时相同的\
  \ IP 地址和端口号。\n\n```\n// TCPEchoClient.java\npackage com.jdojo.net;\nimport java.io.BufferedReader;\n\
  import java.io.BufferedWriter;\nimport java.io.IOException;\nimport java.io.InputStreamReader;\n\
  import java.io.OutputStreamWriter;\nimport java.net.Socket;\npublic class TCPEchoClient\
  \ {\npublic static void main(String[] args) {\nSocket socket = null;\nBufferedReader\
  \ socketReader = null;\nBufferedWriter socketWriter = null;\ntry {\n// 创建一个将连接到本地主机\
  \ 12900 端口的套接字。\n// 注意，服务器也必须在本地主机的 12900 端口上运行。\nsocket = new Socket(\"localhost\"\
  , 12900);\nSystem.out.println(\"客户端套接字已启动，地址为 \"\n+ socket.getLocalSocketAddress());\n\
  // 使用套接字的输入和输出流创建缓冲读取器和写入器\nsocketReader\n= new BufferedReader(new InputStreamReader(socket.getInputStream()));\n\
  socketWriter\n= new BufferedWriter(new OutputStreamWriter(socket.getOutputStream()));\n\
  // 为用户输入创建一个缓冲读取器\nBufferedReader consoleReader\n= new BufferedReader(new InputStreamReader(System.in));\n\
  String promptMsg = \"请输入一条消息 (输入 Bye 退出):\";\nString outMsg = null;\nSystem.out.print(promptMsg);\n\
  while ((outMsg = consoleReader.readLine()) != null) {\nif (outMsg.equalsIgnoreCase(\"\
  bye\")) {\nbreak;\n}\n// 在发送给服务器的消息后添加一个新行，\n// 因为服务器每次只读取一行。\nsocketWriter.write(outMsg);\n\
  socketWriter.write(\"\\n\");\nsocketWriter.flush();\n// 读取并显示来自服务器的消息\nString inMsg\
  \ = socketReader.readLine();\nSystem.out.println(\"服务器: \" + inMsg);\nSystem.out.println();\
  \ // 打印一个空行\nSystem.out.print(promptMsg);\n}\n} catch (IOException e) {\ne.printStackTrace();\n\
  } finally {\n// 最后关闭套接字\nif (socket != null) {\ntry {\nsocket.close();\n} catch\
  \ (IOException e) {\ne.printStackTrace();\n}\n}\n}\n}\n}\n清单 4-5.\n基于 TCP 套接字的回显客户端\n\
  ```\n\n\n\n## 整合 TCP 服务器与客户端\n\n图 4-6 展示了三个客户端连接至一台服务器的配置。每个连接由两个 `Socket` 对象表示，分别位于两端。服务器中的\
  \ `ServerSocket` 对象持续等待来自客户端的连接请求。\n\n![A323071_2_En_4_Fig6_HTML.gif](img/A323071_2_En_4_Fig6_HTML.gif)\n\
  \n图 4-6.\n\n使用 ServerSocket 和 Socket 对象的客户端-服务器配置\n\n清单 4-4 和清单 4-5 列出了 TCP 回显服务器与客户端应用的完整程序。你需要先运行\
  \ `TCPEchoServer` 类，再运行 `TCPEchoClient` 类。服务器应用等待客户端应用连接。客户端应用提示用户在控制台输入文本消息。用户输入文本消息并按下\
  \ `Enter` 键后，客户端应用将该文本发送至服务器。服务器将相同的消息回传给客户端。两个应用都会将对话详情输出到标准输出。以下是回显服务器和回显客户端的输出示例。你可以运行多个\
  \ `TCPEchoClient` 应用实例。服务器应用会在单独的线程中处理每个客户端连接。\n\n以下是服务器应用的输出示例：\n\n```\nServer\
  \ started at: ServerSocket[addr=localhost/127.0.0.1,port=0,localport=12900]\nWaiting\
  \ for a connection ...\nReceived a connection from Socket[addr=/127.0.0.1,port=1698,localport=12900]\n\
  Waiting for a connection ...\nReceived from client: Hello\n```\n\n以下是客户端应用的输出示例：\n\
  \n```\nStarted client socket at /127.0.0.1:53498\nPlease enter a message (Bye to\
  \ quit):Hello\nServer: Hello\nPlease enter a message (Bye to quit):Bye\n```\n\n\
  ## 使用 UDP 套接字\n\n基于 UDP 的套接字是无连接的，且基于数据报，而 TCP 套接字则是面向连接的，且基于流。无连接套接字的影响在于，两个套接字（客户端和服务器）在通信前不会建立连接。回想一下，TCP\
  \ 有一个服务器套接字，其唯一功能是监听来自远程客户端的连接请求。由于 UDP 是无连接协议，因此在使用 UDP 时不会存在服务器套接字。在 TCP 套接字中，客户端与服务器之间流式数据传输的印象是由传输层的\
  \ TCP 凭借其面向连接的特性产生的。TCP 维护了连接两端正在传输数据的状态。UDP 作为无连接协议的含义是，每一端（客户端和服务器）在发送或接收数据块时，彼此之间没有任何预先的通信信息。在使用\
  \ UDP 的通信中，发送到同一目的地的每个数据块都独立于之前发送的数据。使用 UDP 发送的数据块称为数据报或 UDP 数据包。每个 UDP 数据包包含数据、目标\
  \ IP 地址和目标端口号。UDP 是一种不可靠的协议，因为它不保证数据包能够送达预期接收方，也不保证数据包的送达顺序。\n\n提示\n\n尽管 UDP 是无连接协议，但你可以在应用中基于\
  \ UDP 构建面向连接的通信。你需要编写逻辑来处理丢包、数据包乱序送达等问题。TCP 在传输层提供了所有这些特性，你的应用无需为此担忧。\n\n使用 UDP\
  \ 套接字编写应用比使用 TCP 套接字更简单。你只需处理两个类：\n\n*   `DatagramPacket`\n*   `DatagramSocket`\n\
  \n`DatagramPacket` 类的对象代表一个 UDP 数据报，它是通过 UDP 套接字进行数据传输的单位。`DatagramSocket` 类的对象代表一个\
  \ UDP 套接字，用于发送或接收数据报包。以下是使用 UDP 套接字需要执行的步骤：\n\n*   创建 `DatagramSocket` 类的对象，并将其绑定到本地\
  \ IP 地址和本地端口号。\n*   创建 `DatagramPacket` 类的对象，用于保存目标地址和待传输的数据。\n*   使用 `DatagramSocket`\
  \ 类的 `send(DatagramPacket packet)` 方法将数据报包发送到其目的地。在接收端，使用 `receive(DatagramPacket\
  \ packet)` 方法读取数据报包。\n\n你可以使用其中一个构造函数来创建 `DatagramSocket` 类的对象。所有这些构造函数都会创建套接字并将其绑定到本地\
  \ IP 地址和本地端口号。请注意，UDP 套接字没有远程 IP 地址和远程端口号，因为它从未连接到远程套接字。它可以接收来自任何 UDP 套接字的数据报包，或向任何\
  \ UDP 套接字发送数据报包。\n\n```\n// 创建一个绑定到本地主机 15900 端口的 UDP 套接字\nDatagramSocket udpSocket\
  \ = new DatagramSocket(15900, \"localhost\");\n```\n\n`DatagramSocket` 类提供了一个 `bind()`\
  \ 方法，允许你将套接字绑定到本地 IP 地址和本地端口号。通常你不需要使用此方法，因为正如你刚才所做的那样，你可以在其构造函数中指定需要绑定的套接字地址。\n\
  \n\n\n一个`DatagramPacket`包含三部分内容：目标 IP 地址、目标端口号以及数据。`DatagramPacket`类的构造函数分为两类。其中一类构造函数用于创建接收数据包的`DatagramPacket`对象，只需指定缓冲区大小、偏移量和该缓冲区中的数据长度。另一类构造函数用于创建发送数据包的`DatagramPacket`对象，需要同时指定目标地址和数据。如果创建`DatagramPacket`时未指定目标地址，之后可以通过`setAddress()`和`setPort()`方法进行设置。\n\
  \n用于创建接收数据包的`DatagramPacket`类构造函数如下：\n\n*   `DatagramPacket(byte[] buffer, int length)`\n\
  *   `DatagramPacket(byte[] buffer, int offset, int length)`\n\n用于创建发送数据包的`DatagramPacket`类构造函数如下：\n\
  \n*   `DatagramPacket(byte[] buffer, int length, InetAddress address, int port)`\n\
  *   `DatagramPacket(byte[] buffer, int offset, int length, InetAddress address,\
  \ int port)`\n*   `DatagramPacket(byte[] buffer, int length, SocketAddress address)`\n\
  *   `DatagramPacket(byte[] buffer, int offset, int length, SocketAddress address)`\n\
  \n以下代码片段演示了创建数据报包的几种方式：\n\n```\n// 创建一个接收 1024 字节数据的包\nbyte[] data = new byte[1024];\n\
  DatagramPacket packet = new DatagramPacket(data, data.length);\n// 创建一个缓冲区大小为 1024\
  \ 的包，但它将从偏移量 8 开始接收数据\n// （偏移量为 0 表示数组的第一个元素），并且只接收 32 字节的数据。\nbyte[] data2 = new\
  \ byte[1024];\nDatagramPacket packet2 = new DatagramPacket(data2, 8, 32);\n// 创建一个发送\
  \ 1024 字节数据的包，目标地址为\"localhost\"，端口为 15900。\n// 发送前需要填充 data3 数组。\nbyte[] data3\
  \ = new byte[1024];\nDatagramPacket packet3 = new DatagramPacket(data3, 1024,\n\
  InetAddress.getByName(\"localhost\"), 15900);\n// 创建一个发送 1024 字节数据的包，目标地址为\"localhost\"\
  ，端口为 15900。\n// 发送前需要填充 data4 数组。此代码通过调用包的方法来设置目标地址，\n// 而不是在构造函数中指定。\nbyte[] data4\
  \ = new byte[1024];\nDatagramPacket packet4 = new DatagramPacket(data4, 1024);\n\
  packet4.setAddress(InetAddress.getByName(\"localhost\"));\npacket4.setPort(15900);\n\
  ```\n\n理解数据包中的数据始终具有指定的偏移量和长度至关重要。从数据包读取数据时，需要使用这两条信息。假设`receivedPacket`对象引用代表一个从远程\
  \ UDP 套接字接收到的`DatagramPacket`。`DatagramPacket`类的`getData()`方法返回数据包的缓冲区（一个字节数组）。数据包的缓冲区可能大于从远程客户端接收到的数据大小。在这种情况下，必须使用偏移量和长度从缓冲区中读取接收到的数据，而不触及缓冲区中的垃圾数据。如果数据包的缓冲区大小小于接收到的数据大小，多余的字节会被静默忽略。应使用类似以下代码来读取套接字接收到的数据。关键在于，应使用接收缓冲区中从指定`offset`开始、长度为`length`属性所指示字节数的数据。\n\
  \n```\n// 获取数据包的缓冲区、偏移量和长度\nbyte[] dataBuffer = receivedPacket.getData();\nint offset\
  \ = receivedPacket.getOffset();\nint length = receivedPacket.getLength();\n// 使用偏移量和长度将接收到的数据复制到\
  \ receivedData 数组中，\n// 该数组将包含所有有效数据\nbyte[] receivedData = new byte[length];\n\
  System.arraycopy(dataBuffer, offset, receivedData, 0, length);\n```\n\n创建 UDP 套接字（包括客户端和服务器端）就像创建`DatagramSocket`类的对象一样简单。可以使用其`send()`方法发送数据包，使用`receive()`方法从远程套接字接收数据包。`receive()`方法会阻塞，直到有数据包到达。你需要向`receive()`方法提供一个空的数据报包，套接字会用从远程套接字接收到的信息填充该数据包。如果提供的数据报包的数据缓冲区大小小于接收到的数据报包的大小，接收到的数据会被静默截断以适配提供的数据报包。如果提供的数据报包的数据缓冲区大小大于接收到的数据报包，套接字会将接收到的数据复制到提供的数据缓冲区中，从其`offset`和`length`属性指示的段开始，而不触及缓冲区的其他部分。请注意，可用的数据缓冲区大小并非字节数组的大小，而是由`length`属性定义的。例如，假设有一个数据报包，其字节数组有\
  \ 32 个元素，偏移量为 2，数据缓冲区长度为 8。如果将这个数据报包传递给`receive()`方法，最多会复制 8 字节的接收数据。数据将从缓冲区中的第三个元素复制到第十一个元素，分别由偏移量\
  \ 2 和长度 8 指示。\n\n```\n// 创建一个绑定到本地主机 15900 端口的 UDP 套接字\nDatagramSocket socket =\
  \ new DatagramSocket(15900, InetAddress.getByName(\"localhost\"));\n// 发送一个数据包，假设你有一个数据报包\
  \ p\nsocket.send(p);\n// 接收一个数据包\nDatagramPacket p2 = new DatagramPacket(new byte[1024],\
  \ 1024);\nsocket.receive(p2);\n```\n\n\n\n## 创建 UDP 回显服务器\n\n使用 UDP 创建回显服务器非常简单，仅需四行核心代码。请按照以下步骤创建\
  \ UDP 回显服务器：\n\n*   创建一个 `DatagramSocket` 对象来表示 UDP 套接字。\n*   创建一个 `DatagramPacket`\
  \ 对象来接收来自远程客户端的数据包。\n*   调用套接字的 `receive()` 方法等待数据包到达。\n*   调用套接字的 `send()` 方法，并传入你收到的同一个数据包。当服务器收到\
  \ UDP 数据包时，该数据包已包含发送方的地址。你无需修改数据包中的任何内容即可将相同消息回显给发送方。当你准备发送数据报包时，需要设置目标地址。当数据包到达目的地时，它包含其发送方的地址。这在接收方需要响应数据报包发送方时非常有用。\n\
  \n以下代码片段展示了如何编写 UDP 回显服务器：\n\n```\nDatagramSocket socket = new DatagramSocket(15900);\n\
  DatagramPacket packet = new DatagramPacket(new byte[1024], 1024);\nwhile(true) {\n\
  // 接收数据包\nsocket.receive(packet);\n// 将同一数据包发送回发送方\nsocket.send(packet);\n}\n```\n\
  \n清单 4-6 包含了 UDP 回显服务器相同代码的扩展版本。它包含了前面展示的基本逻辑，此外还包含了错误处理代码，并在标准输出上打印数据包的详细信息。\n\n\
  ```\n// UDPEchoServer.java\npackage com.jdojo.net;\nimport java.io.IOException;\n\
  import java.net.DatagramPacket;\nimport java.net.DatagramSocket;\nimport java.net.InetAddress;\n\
  public class UDPEchoServer {\npublic static void main(String[] args) {\nfinal int\
  \ LOCAL_PORT = 15900;\nfinal String SERVER_NAME = \"localhost\";\ntry {\nDatagramSocket\
  \ udpSocket\n= new DatagramSocket(LOCAL_PORT, InetAddress.getByName(SERVER_NAME));\n\
  System.out.println(\"已在 \" + udpSocket.getLocalSocketAddress() + \" 创建 UDP 服务器套接字...\"\
  );\n// 在循环中等待消息，并将相同消息回显给发送方\nwhile (true) {\nSystem.out.println(\"正在等待 UDP 数据包到达...\"\
  );\n// 准备一个数据包来保存接收到的数据\nDatagramPacket packet = new DatagramPacket(new byte[1024],\
  \ 1024);\n// 接收数据包\nudpSocket.receive(packet);\n// 打印数据包详细信息\ndisplayPacketDetails(packet);\n\
  // 将同一数据包回显给发送方\nudpSocket.send(packet);\n}\n} catch (IOException e) {\ne.printStackTrace();\n\
  }\n}\npublic static void displayPacketDetails(DatagramPacket packet) {\n// 获取消息\n\
  byte[] msgBuffer = packet.getData();\nint length = packet.getLength();\nint offset\
  \ = packet.getOffset();\nint remotePort = packet.getPort();\nInetAddress remoteAddr\
  \ = packet.getAddress();\nString msg = new String(msgBuffer, offset, length);\n\
  System.out.println(\"收到数据包：[IP 地址=\" + remoteAddr + \", 端口=\" + remotePort + \"\
  , 消息=\" + msg + \"]\");\n}\n}\n清单 4-6.\n基于 UDP 套接字的回显服务器\n```\n\n清单 4-7 包含了客户端应用程序的程序，该程序使用\
  \ UDP 套接字向 UDP 回显服务器发送/接收消息。请注意，客户端和服务器每次只交换一行文本。\n\n```\n// UDPEchoClient.java\n\
  package com.jdojo.net;\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\n\
  import java.net.DatagramPacket;\nimport java.net.DatagramSocket;\nimport java.net.InetAddress;\n\
  import java.net.UnknownHostException;\npublic class UDPEchoClient {\npublic static\
  \ void main(String[] args) {\nDatagramSocket udpSocket = null;\nBufferedReader br\
  \ = null;\ntry {\n// 在本地主机上使用可用端口创建 UDP 套接字\nudpSocket = new DatagramSocket();\n\
  String msg = null;\n// 创建缓冲读取器以获取用户输入\nbr = new BufferedReader(new InputStreamReader(System.in));\n\
  String promptMsg = \"请输入消息（输入 Bye 退出）：\";\nSystem.out.print(promptMsg);\nwhile ((msg\
  \ = br.readLine()) != null) {\nif (msg.equalsIgnoreCase(\"bye\")) {\nbreak;\n}\n\
  // 准备发送到服务器的数据包\nDatagramPacket packet = UDPEchoClient.getPacket(msg);\n// 将数据包发送到服务器\n\
  udpSocket.send(packet);\n// 等待来自服务器的数据包\nudpSocket.receive(packet);\n// 显示从服务器接收到的数据包详细信息\n\
  displayPacketDetails(packet);\nSystem.out.print(promptMsg);\n}\n} catch (Exception\
  \ e) {\ne.printStackTrace();\n} finally {\n// 关闭套接字\nif (udpSocket != null) {\n\
  udpSocket.close();\n}\n}\n}\npublic static void displayPacketDetails(DatagramPacket\
  \ packet) {\nbyte[] msgBuffer = packet.getData();\nint length = packet.getLength();\n\
  int offset = packet.getOffset();\nint remotePort = packet.getPort();\nInetAddress\
  \ remoteAddr = packet.getAddress();\nString msg = new String(msgBuffer, offset,\
  \ length);\nSystem.out.println(\"[服务器 IP 地址=\" + remoteAddr + \", 端口=\" + remotePort\
  \ + \"]：\" + msg);\n// 添加换行\nSystem.out.println();\n}\npublic static DatagramPacket\
  \ getPacket(String msg) throws UnknownHostException {\n// 我们将发送和接受长度为 1024 字节的消息。\n\
  // 更长的消息将被截断\nfinal int PACKET_MAX_LENGTH = 1024;\nbyte[] msgBuffer = msg.getBytes();\n\
  int length = msgBuffer.length;\nif (length > PACKET_MAX_LENGTH) {\nlength = PACKET_MAX_LENGTH;\n\
  }\nDatagramPacket packet = new DatagramPacket(msgBuffer, length);\n// 设置目标地址和端口号\n\
  int serverPort = 15900;\nfinal String SERVER_NAME = \"localhost\";\nInetAddress\
  \ serverIPAddress = InetAddress.getByName(SERVER_NAME);\npacket.setAddress(serverIPAddress);\n\
  packet.setPort(serverPort);\nreturn packet;\n}\n}\n清单 4-7.\n基于 UDP 套接字的回显客户端\n```\n\
  \n要测试 UDP 回显应用程序，你需要运行 `UDPEchoServer` 和 `UDPEchoClient` 类。你需要先运行服务器。客户端应用程序会提示你输入消息。输入文本消息并按\
  \ Enter 键将该消息发送到服务器。服务器将回显相同的消息。两个应用程序都会在标准输出上显示正在交换的消息。它们还会显示数据包的详细信息，例如发送方的 IP\
  \ 地址和端口号。服务器应用程序使用端口号 15900，客户端应用程序使用计算机上任何可用的 UDP 端口。如果出现错误，则表示端口号 15900 已被占用，因此你需要在服务器程序中更改端口号，并在客户端程序中使用新的端口号来寻址数据包。该服务器设计为一次处理多个客户端。你可以运行\
  \ `UDPEchoClient` 类的多个实例。请注意，服务器运行在一个无限循环中，你必须手动停止服务器应用程序。\n\n以下是服务器控制台上的示例日志：\n\
  \n```\n已在 /127.0.0.1:15900 创建 UDP 服务器套接字...\n正在等待 UDP 数据包到达...\n收到数据包：[IP 地址=/127.0.0.1,\
  \ 端口=61119, 消息=Hello]\n正在等待 UDP 数据包到达...\n收到数据包：[IP 地址=/127.0.0.1, 端口=61119, 消息=Nice\
  \ talking to you]\n正在等待 UDP 数据包到达...\n```\n\n以下是客户端控制台上的示例日志：\n\n```\n请输入消息（输入 Bye\
  \ 退出）：Hello\n[服务器 IP 地址=localhost/127.0.0.1, 端口=15900]：Hello\n请输入消息（输入 Bye 退出）：Nice\
  \ talking to you\n[服务器 IP 地址=localhost/127.0.0.1, 端口=15900]：Nice talking to you\n\
  请输入消息（输入 Bye 退出）：Bye\n```\n\n\n\n## 已连接的 UDP 套接字\n\nUDP 套接字不像 TCP 套接字那样支持端到端连接。`DatagramSocket`类包含一个`connect()`方法。该方法允许应用程序将\
  \ UDP 数据包的发送和接收限制到特定 IP 地址的特定端口号。请参考以下代码片段：\n\n```\nInetAddress localIPAddress =\
  \ InetAddress.getByName(\"192.168.11.101\");\nint localPort = 15900;\nDatagramSocket\
  \ socket = new DatagramSocket(localPort, localIPAddress);\n// 将套接字连接到远程地址\nInetAddress\
  \ remoteIPAddress = InetAddress.getByName(\"192.168.12.115\");\nint remotePort =\
  \ 17901;\nsocket.connect(remoteIPAddress, remotePort);\n```\n\n该套接字绑定到本地 IP 地址`192.168.11.101`和本地\
  \ UDP 端口号`15900`。它连接到了远程 IP 地址`192.168.12.115`和远程 UDP 端口号`17901`。这意味着`socket`对象只能用于向/从运行在\
  \ IP 地址`192.168.12.115`、端口号`17901`的另一个 UDP 套接字发送/接收数据报包。在 UDP 套接字上调用了`connect()`方法后，你无需再为发出的数据报包设置目标\
  \ IP 地址和端口号。该套接字会自动将`connect()`方法调用中使用的目标 IP 地址和端口号添加到所有发出的数据包中。如果你在发送数据包前确实提供了目标地址，套接字会确保数据包中提供的目标地址与`connect()`方法调用中使用的远程地址相同。否则，`send()`方法将抛出`IllegalArgumentException`。\n\
  \n使用 UDP 套接字的`connect()`方法有两个优点：\n\n*   它会在每次发送数据包时设置发出数据包的目标地址。\n*   它将套接字的通信限制为仅与`connect()`方法调用中使用的\
  \ IP 地址所对应的远程主机进行通信。\n\n现在你明白了 UDP 套接字是无连接的，并且使用 UDP 套接字时并没有真正的连接。`DatagramSocket`类中的`connect()`方法并未为\
  \ UDP 套接字提供任何形式的连接。相反，它对于将通信限制到特定的远程 UDP 套接字非常有用。\n\n## UDP 多播套接字\n\nJava 支持 UDP\
  \ 多播套接字，它可以接收发送到多播 IP 地址的数据报包。`MulticastSocket`类的对象代表一个多播套接字。使用`MulticastSocket`套接字与使用`DatagramSocket`类似，但有一个区别——多播套接字基于组成员关系。创建并绑定多播套接字后，你需要调用其`joinGroup(InetAddress\
  \ multiCastIPAddress)`方法，使该套接字成为由指定多播 IP 地址`multiCastIpAddress`定义的多播组的成员。一旦成为多播组的成员，任何发送到该组的数据报包都将被传递到此套接字。一个多播组可以有多个成员。一个多播套接字可以是多个多播组的成员。如果某个成员决定不再接收来自某个组的多播数据包，它可以通过调用`leaveGroup(InetAddress\
  \ multiCastIPAddress)`方法离开该组。\n\n在 IPv4 中，范围从`224.0.0.0`到`239.255.255.255`的任何 IP\
  \ 地址都可用作发送数据报包的多播地址。IP 地址`224.0.0.0`是保留地址，不应在你的应用程序中使用。多播 IP 地址不能用作数据报包的源地址，这意味着你不能将套接字绑定到多播地址。\n\
  \n套接字本身不必是多播组的成员即可向多播地址发送数据报包。\n\nJava 7 为`DatagramChannel`类增加了 IP 多播功能。关于如何使用数据报通道进行\
  \ IP 多播，请参考本章后面的“使用数据报通道进行多播”一节。请注意，`DatagramChannel`类是在 Java 1.4 中添加的，当时它不具备 IP\
  \ 多播功能。\n\n清单 4-8 包含一个程序，该程序创建了一个多播套接字，用于接收发送到 230.1.1.1 多播 IP 地址的数据报包。\n\n```\n\
  // UDPMultiCastReceiver.java\npackage com.jdojo.net;\nimport java.io.IOException;\n\
  import java.net.DatagramPacket;\nimport java.net.InetAddress;\nimport java.net.MulticastSocket;\n\
  public class UDPMultiCastReceiver {\npublic static void main(String[] args) {\n\
  int mcPort = 18777;\nString mcIPStr = \"230.1.1.1\";\nMulticastSocket mcSocket =\
  \ null;\nInetAddress mcIPAddress = null;\ntry {\nmcIPAddress = InetAddress.getByName(mcIPStr);\n\
  mcSocket = new MulticastSocket(mcPort);\nSystem.out.println(\"多播接收器运行于:\"\n+ mcSocket.getLocalSocketAddress());\n\
  // 加入组\nmcSocket.joinGroup(mcIPAddress);\nDatagramPacket packet = new DatagramPacket(new\
  \ byte[1024], 1024);\nwhile (true) {\nSystem.out.println(\"等待多播消息...\");\nmcSocket.receive(packet);\n\
  String msg = new String(packet.getData(),\npacket.getOffset(),\npacket.getLength());\n\
  System.out.println(\"[多播接收器] 收到:\" + msg);\n}\n} catch (Exception e) {\ne.printStackTrace();\n\
  } finally {\nif (mcSocket != null) {\ntry {\nmcSocket.leaveGroup(mcIPAddress);\n\
  mcSocket.close();\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n}\n\
  }\n清单 4-8.\n一个接收 UDP 多播消息的 UDP 多播套接字\n```\n\n清单 4-9 包含一个程序，该程序向同一个多播地址发送消息。请注意，你可以运行`UDPMulticastReceiver`类的多个实例，它们都将成为同一个多播组的成员。当你运行`UDPMulticastSender`类时，它会向该组发送一条消息，组内的所有成员都会收到该消息的一个副本。`UDPMulticastSender`类使用`DatagramSocket`（而非`MulticastSocket`）来发送多播消息。\n\
  \n```\n// UDPMultiCastSender.java\npackage com.jdojo.net;\nimport java.net.DatagramPacket;\n\
  import java.net.DatagramSocket;\nimport java.net.InetAddress;\npublic class UDPMultiCastSender\
  \ {\npublic static void main(String[] args) {\nint mcPort = 18777;\nString mcIPStr\
  \ = \"230.1.1.1\";\nDatagramSocket udpSocket = null;\ntry {\n// 创建一个数据报套接字\nudpSocket\
  \ = new DatagramSocket();\n// 准备一条消息\nInetAddress mcIPAddress = InetAddress.getByName(mcIPStr);\n\
  byte[] msg = \"Hello multicast socket\".getBytes();\nDatagramPacket packet = new\
  \ DatagramPacket(msg, msg.length);\npacket.setAddress(mcIPAddress);\npacket.setPort(mcPort);\n\
  udpSocket.send(packet);\nSystem.out.println(\"已发送一条多播消息。\");\nSystem.out.println(\"\
  正在退出应用程序\");\n} catch (Exception e) {\ne.printStackTrace();\n} finally {\nif (udpSocket\
  \ != null) {\ntry {\nudpSocket.close();\n} catch (Exception e) {\ne.printStackTrace();\n\
  }\n}\n}\n}\n}\n清单 4-9.\n一个 UDP 数据报套接字，多播发送器应用程序\n```\n\n要观察多播的实际运行，请先运行一个或多个`UDPMulticastReceiver`类的实例，然后运行一个`UDPMulticastSender`类的实例。以下是运行`UDPMulticastReceiver`类时的示例输出。请注意，当`UDPMulticastSender`运行时，该程序会收到一条多播消息。\n\
  \n```\n多播接收器运行于:0.0.0.0/0.0.0.0:18777\n等待多播消息...\n[多播接收器] 收到:Hello multicast socket\n\
  等待多播消息...\n```\n\n以下是运行`UDPMulticastSender`类时的示例输出：\n\n```\n已发送一条多播消息。\n正在退出应用程序\n\
  ```\n\n\n\n## URI、URL 与 URN\n\n统一资源标识符（URI）是一串用于标识资源的字符序列。RFC 3986（请求评议）定义了 URI\
  \ 的通用语法。该 RFC 的全文可在 [`http://www.ietf.org/rfc/rfc3986.txt`](http://www.ietf.org/rfc/rfc3986.txt)\
  \ 获取。资源标识符可以通过位置、名称或两者结合来标识资源。本节概述 URI。若您对 URI 的细节感兴趣，建议阅读 RFC 3986。\n\n使用位置来标识资源的\
  \ URI 称为统一资源定位符（URL）。例如，[`http://www.yahoo.com/index.html`](http://www.yahoo.com/index.html)\
  \ 是一个 URL，它标识了主机 [`www.yahoo.com`](http://www.yahoo.com) 上名为 `index.html` 的文档。另一个\
  \ URL 示例是 `mailto:ksharan@jdojo.com`，其中 `mailto` 协议指示解析它的应用程序打开一个电子邮件客户端，向 URL 中指定的电子邮件地址发送邮件。在这种情况下，URL\
  \ 并非定位资源，而是标识电子邮件的详细信息。您还可以使用 `mailto` 协议设置电子邮件的主题和正文部分。因此，URL 并不总是意味着资源的位置。有时资源可能是抽象的，就像\
  \ `mailto` 协议的情况。一旦使用 URL 定位到资源，您就可以对该资源执行某些操作，例如检索、更新或删除。操作执行的细节取决于 URL 中使用的方案（scheme）。URL\
  \ 仅标识资源位置和定位方案的部分，而非可对资源执行的任何操作的细节。\n\n使用名称来标识资源的 URI 称为统一资源名称（URN）。例如，`URN:ISBN:978-1-4302-6661-7`\
  \ 是一个 URN，它使用国际标准书号（ISBN）命名空间来标识一本书。\n\nURL 和 URN 是 URI 的子集。因此，关于 URI 的讨论同样适用于 URL\
  \ 和 URN。URI 的详细语法取决于其使用的方案。在本节中，我将介绍 URI 的通用语法，它通常是一个 URL。下一节将探讨 Java 程序中用于表示 URI\
  \ 和 URL 的 Java 类。\n\nURI 可以是绝对 URI 或相对 URI。相对 URI 总是在另一个绝对 URI（称为基础 URI）的上下文中进行解释。换句话说，您必须有一个绝对\
  \ URI 才能使相对 URI 有意义。绝对 URI 具有以下通用格式：\n\n```\n<方案>:<方案特定部分>\n```\n\n`<方案特定部分>` 取决于\
  \ `<方案>`。例如，`http` 方案使用一种格式，而 `mailto` 方案使用另一种格式。URI 的另一种通用形式如下。通常（但不一定）它表示一个 URL。\n\
  \n```\n<方案>://<权限>/<路径>?<查询>#<片段>\n```\n\n这里，`<方案>` 表示访问资源的方法。它是协议名称，例如 `http`、`ftp`\
  \ 等。我们都使用术语“协议”来指代 URI 规范中所谓的“方案”。如果术语“方案”让您感到困惑，您可以在本节中将其理解为“协议”。URI 中 `<方案>` 和\
  \ `<路径>` 部分是必需的。所有其他部分都是可选的。`<路径>` 部分可以是空字符串。\n\n`<权限>` 部分表示服务器名称（或 IP 地址）或方案特定的注册表。如果\
  \ `<权限>` 部分表示服务器名称，它可以写成 `<用户信息>@主机:端口` 的形式。如果 URI 中存在 `<权限>`，它将以两个正斜杠开头；这是一个可选部分。例如，标识机器本地文件系统中文件的\
  \ URL 使用 `file` 方案，如 `file:///c:/documents/welcome.doc`。\n\nURI 语法在其 `<路径>` 部分使用分层语法，用于定位服务器上的资源。`<路径>`\
  \ 的多个部分由正斜杠（`/`）分隔。\n\n`<查询>` 部分表示通过执行指定查询来获取资源。它由名称-值对组成，用与号（`&`）分隔。名称和值用等号（=）分隔。例如，`id=123&rate=5.5`\
  \ 是一个查询，包含两个部分：`id` 和 `rate`。`id` 的值为 `123`，`rate` 的值为 `5.5`。\n\n`<片段>` 部分标识一个次级资源，通常是\
  \ URI 其他部分所标识的主资源的子集。\n\n以下是一个 URI 示例，并分解为各个部分：\n\n```\nURI:       http://www.jdojo.com/java/intro.html?id=123#conclusion\n\
  方案:      http\n权限:      www.jdojo.com\n路径:      /java/intro.html\n查询:      id=123\n\
  片段:      conclusion\n```\n\n该 URI 表示一个 URL，指向 [`www.jdojo.com`](http://www.jdojo.com)\
  \ 服务器上名为 `intro.html` 的文档。方案 `http` 表示可以使用 `http` 协议检索该文档。查询 `id=123` 表示通过执行此查询来获取文档。片段部分\
  \ `conclusion` 可由使用该文档的不同应用程序以不同方式解释。对于 HTML 文档，片段部分由 Web 浏览器解释为主文档的一部分。\n\n并非 URI\
  \ 的所有部分都是必需的。哪些部分是必需的，哪些部分是可选的，取决于所使用的方案。使用 URI 标识资源的目标之一是使其具有普遍可读性。因此，有一组明确定义的字符可用于表示\
  \ URI。URI 语法使用一些具有特殊含义的保留字符，它们只能用于 URI 的特定部分。在其他部分，保留字符需要进行转义。字符转义是通过使用百分号后跟其十六进制格式的\
  \ ASCII 值来实现的。例如，空格的 ASCII 值十进制为 32，十六进制为 20。如果要在 URI 中使用空格字符，必须使用 `%20`，这是空格的转义形式。由于百分号用作转义字符的一部分，因此必须在\
  \ URI 中使用 `%25` 来表示 `%` 字符（25 是十进制数 37 的十六进制值。`%` 的 ASCII 值十进制为 37）。例如，如果要在查询中使用值\
  \ 5.2%，以下是一个无效的 URI：\n\n`http://www.jdojo.com/details?rate=5.2%`\n\n要使其成为有效的 URI，需要将百分号字符转义为\
  \ `%25`，如下所示：\n\n[`http://www.jdojo.com/details?rate=5.2%25`](http://www.jdojo.com/details?rate=5.2%25)\n\
  \n理解相对 URI 的用法很重要。相对 URI 总是在绝对 URI（称为基础 URI）的上下文中进行解释。绝对 URI 以方案开头。相对 URI 会继承其基础\
  \ URI 的某些部分。让我们考虑一个指向 HTML 文档的 URI，如下所示：\n\n[`http://www.jdojo.com/java/intro.html`](http://www.jdojo.com/java/intro.html)\n\
  \n该 URI 引用的文档是 `intro.html`。其路径为 `/java/intro.html`。假设两个名为 `brief_intro.html` 和\
  \ `detailed_intro.html` 的文档（物理上或逻辑上）位于与 `intro.html` 相同的路径层次结构中。以下是这三个文档的绝对 URI：\n\
  \n*   [`http://www.jdojo.com/java/intro.html`](http://www.jdojo.com/java/intro.html)\n\
  *   [`http://www.jdojo.com/java/brief_intro.html`](http://www.jdojo.com/java/brief_intro.html)\n\
  *   [`http://www.jdojo.com/java/detailed_intro.html`](http://www.jdojo.com/java/detailed_intro.html)\n\
  \n\n\n如果你已经处于 `intro.html` 的上下文中，那么使用其他两个文档的名称而非其绝对 URI 来引用它们会更容易。那么，处于 `intro.html`\
  \ 的上下文中是什么意思呢？当你使用 [`http://www.jdojo.com/java/intro.html`](http://www.jdojo.com/java/intro.html)\
  \ 这个 URI 来标识一个资源时，它包含三个部分：协议（`http`）、服务器名称（[`www.jdojo.com`](http://www.jdojo.com)）和文档路径（`/java/intro.html`）。该路径表明文档位于\
  \ `java` 路径层级下，而该层级又位于路径层级的根目录。所有细节——协议、服务器名称、路径详情（不包括文档名称本身 `intro.html`）——共同构成了\
  \ `intro.html` 文档的上下文。如果你查看前面列出的另外两个文档的 URI，你会发现它们的所有细节都与 `intro.html` 相同。换句话说，你可以认为另外两个文档的上下文与\
  \ `intro.html` 相同。在这种情况下，以 `intro.html` 文档的绝对 URI 作为基础 URI，另外两个文档的相对 URI 就是它们的名称：`brief_intro.html`\
  \ 和 `detailed_intro.html`。可以列举如下：\n\n*   基础 URI：[`http://www.jdojo.com/java/intro.html`](http://www.jdojo.com/java/intro.html)\n\
  *   相对 URI：`brief_intro.html`\n*   相对 URI：`detailed_intro.html`\n\n在列表中，这两个相对 URI\
  \ 从基础 URI 继承了协议、服务器名称和路径层级。需要强调的是，如果不指定其基础 URI，相对 URI 就毫无意义。\n\n当必须使用相对 URI 时，必须将其解析为等效的绝对\
  \ URI。URI 规范制定了解析相对 URI 的规则。我将讨论一些最常用的相对 URI 形式及其解析方法。有两个特殊字符用于定义 URI 的 `<path>`\
  \ 部分，它们分别是单个点号和两个点号。单个点号表示当前路径层级，两个点号表示向上一级路径层级。你一定在文件系统中见过这两组字符，它们分别表示当前目录和父目录。你可以认为它们在\
  \ URI 中的含义相同，但 URI 并不假定任何目录层级结构。在 URI 中，路径被视为层级结构，并且它完全不与文件系统的层级结构绑定。然而，在实际应用中，当你处理基于\
  \ Web 的应用程序时，URL 通常会被映射到文件系统的层级结构。在 URI 的规范化形式中，点号会被适当地替换。例如，`s://sn/a/./b` 会被规范化为\
  \ `s://sn/a/b`，而 `s://sn/a/../b` 会被规范化为 `s://sn/b`。非规范化形式和规范化形式指向同一个 URL。规范化形式去除了多余的字符。仅凭查看两个\
  \ URI，你无法判断它们是否指向同一个资源。在比较它们是否相等之前，必须先对它们进行规范化。在比较过程中，协议、服务器名称和十六进制数字被视为不区分大小写。以下是解析相对\
  \ URI 的一些规则：\n\n*   如果 URI 以协议开头，则视为绝对 URI。\n*   如果相对 URI 以权限（authority）开头，则从其基础\
  \ URI 继承协议。\n*   如果相对 URI 是空字符串，则等同于基础 URI。\n*   如果相对 URI 仅包含片段部分，则解析后的 URI 使用新的片段。如果基础\
  \ URI 原本有片段，则会被相对 URI 的片段替换。否则，相对 URI 的片段会被添加到基础 URI 中。\n*   相对 URI 的路径不以正斜杠（`/`）开头。如果基础\
  \ URI 有路径，则移除基础 URI 中路径的最后一个组成部分，并追加相对 URI。请注意，路径的最后一个组成部分可能是一个空字符串，例如在 [`http://www.abc.com/`](http://www.abc.com/)\
  \ 中。\n*   如果相对 URL 以路径开头，而该路径又以正斜杠（`/`）开头，则基础 URI 的路径会被相对 URI 的路径替换。\n\n表 4-5 包含了使用这些规则的示例。表中的示例符合\
  \ Java URI 和 URL 类遵循的规则。Java 规则在少数情况下与 URI 规范中设定的规则略有偏差。\n\n表 4-5. 使用基础 URI 将相对\
  \ URI 解析为绝对 URI 的示例\n\n| 基础 URI | 相对 URI | 解析后的相对 URI | 相对 URI 描述 |\n| --- | ---\
  \ | --- | --- |\n| `h://sn/a/b/c` | `http://sn2/foo` | `h://sn2/foo` | 这是一个绝对 URI。\
  \ |\n| `h://sn/a/b/c` | `//sn2/h/k` | `h://sn2/h/k` | 它以权限开头。 |\n| `h://sn/a/b/c`\
  \ |   | `h://sn/a/b/c` | 这是一个空字符串。 |\n| `h://sn/a/b/c` | `#k` | `h://sn/a/b/c#k`\
  \ | 它仅包含片段。 |\n| `h://sn/a/b/c#a` | `#k` | `h://sn/a/b/c#k` | 它仅包含片段。 |\n| `h://sn/a/b/`\
  \ | `foo` | `h://sn/a/b/foo` | 路径不以 / 开头。 |\n| `h://sn/a/b/c` | `foo` | `h://sn/a/b/foo`\
  \ | 路径不以 / 开头。 |\n| `h://sn/a/b/c?d=3` | `foo` | `h://sn/a/b/foo` | 路径不以 / 开头。 |\n\
  | `h://sn/` | `foo` | `h://sn/foo` | 路径不以 / 开头。 |\n| `h://sn` | `foo` | `h://sn/foo`\
  \ | 路径不以 / 开头。 |\n| `h://sn/a/b/` | `/foo` | `h://sn/foo` | 路径以 / 开头。 |\n| `h://sn/a/b/c`\
  \ | `/foo` | `h://sn/foo` | 路径以 / 开头。 |\n| `h://sn/a/b/c?d=3` | `/foo` | `h://sn/foo`\
  \ | 路径以 / 开头。 |\n| `h://sn/` | `/foo` | `h://sn/foo` | 路径以 / 开头。 |\n| `h://sn` |\
  \ `/foo` | `h://sn/foo` | 路径以 / 开头。 |\n\n提示\n\n你也可以使用主机名或 IP 地址作为 URI 中的权限。IPv4\
  \ 可以使用其点分十进制格式，例如 [`http://192.168.10.178/docs/toc.html`](http://192.168.10.178/docs/toc.html)\
  \ 。IPv6 必须用方括号括起来，例如 `http://[1283::8:800:200C:A43A]/docs/toc.html`。\n\n\n\n## URI\
  \ 和 URL 作为 Java 对象\n\nJava 将 URI 和 URL 表示为对象。它提供了以下四个类，供你在 Java 程序中将 URI 和 URL 作为对象使用：\n\
  \n*   `java.net.URI`\n*   `java.net.URL`\n*   `java.net.URLEncoder`\n*   `java.net.URLDecoder`\n\
  \n`URI` 类的对象代表一个 URI。`URL` 类的对象代表一个 URL。`URLEncoder` 和 `URLDecoder` 是工具类，用于帮助编码和解码\
  \ URI 字符串。我将在后续章节中介绍其他用于检索 URL 所标识资源的 Java 类。\n\n`URI` 类有许多构造器，允许你通过 URI 的各个部分（方案、权限、路径、查询和片段）的组合来创建\
  \ `URI` 对象。如果你用于构造 `URI` 对象的字符串可能不符合 URI 规范，所有构造器都会抛出一个受检异常 `URISyntaxException`。\n\
  \n```\n// 创建一个 URI 对象\nURI baseURI = new URI(\"http://www.yahoo.com\");\n// 使用相对\
  \ URI 字符串创建 URI，并使用 baseURI 解析它\nURI relativeURI = new URI(\"welcome.html\");\n\
  URI resolvedRelativeURI = baseURI.resolve(relativeURI);\n```\n\n清单 4-10 演示了如何在 Java\
  \ 程序中使用 `URI` 类。\n\n```\n// URITest.java\npackage com.jdojo.net;\nimport java.net.URI;\n\
  import java.net.URISyntaxException;\npublic class URITest {\npublic static void\
  \ main(String[] args) {\nString baseURIStr = \"http://www.jdojo.com/javaintro.html?\"\
  \n+ \"id=25&rate=5.5%25#foo\";\nString relativeURIStr = \"../sports/welcome.html\"\
  ;\ntry {\nURI baseURI = new URI(baseURIStr);\nURI relativeURI = new URI(relativeURIStr);\n\
  // 相对于基础 URI 解析相对 URI\nURI resolvedURI = baseURI.resolve(relativeURI);\nprintURIDetails(baseURI);\n\
  printURIDetails(relativeURI);\nprintURIDetails(resolvedURI);\n} catch (URISyntaxException\
  \ e) {\ne.printStackTrace();\n}\n}\npublic static void printURIDetails(URI uri)\
  \ {\nSystem.out.println(\"URI:\" + uri);\nSystem.out.println(\"Normalized:\" + uri.normalize());\n\
  String parts = \"[Scheme=\" + uri.getScheme()\n+ \", Authority=\" + uri.getAuthority()\n\
  + \", Path=\" + uri.getPath()\n+ \", Query:\" + uri.getQuery()\n+ \", Fragment:\"\
  \ + uri.getFragment() + \"]\";\nSystem.out.println(parts);\nSystem.out.println();\n\
  }\n}\nURI:http://www.jdojo.com/javaintro.html?id=25&rate=5.5%25#foo\nNormalized:http://www.jdojo.com/javaintro.html?id=25&rate=5.5%25#foo\n\
  [Scheme=http, Authority=www.jdojo.com, Path=/javaintro.html, Query:id=25&rate=5.5%,\
  \ Fragment:foo]\nURI:../sports/welcome.html\nNormalized:../sports/welcome.html\n\
  [Scheme=null, Authority=null, Path=../sports/welcome.html, Query:null, Fragment:null]\n\
  URI:http://www.jdojo.com/../sports/welcome.html\nNormalized:http://www.jdojo.com/../sports/welcome.html\n\
  [Scheme=http, Authority=www.jdojo.com, Path=/../sports/welcome.html, Query:null,\
  \ Fragment:null]\n清单 4-10.\n演示 java.net.URI 类使用的示例类\n```\n\n你也可以使用 `URI` 对象的 `toURL()`\
  \ 方法从中获取一个 `URL` 对象，如下所示：\n\n```\nURL baseURL = baseURI.toURL();\n```\n\n你还可以使用\
  \ `URI` 类的 `create(String str)` 静态方法创建 `URI` 对象。`create()` 方法不会抛出受检异常。它会抛出一个运行时异常。因此，使用它不会强制你处理异常。只有在你确定\
  \ URI 字符串格式正确时，才应使用此方法。\n\n```\nURI uri2 = URI.create(\"http://www.yahoo.com\");\n\
  ```\n\n`java.net.URL` 类的实例在 Java 程序中代表一个 URL。尽管每个 URL 也是一个 URI，但 Java 并未让 `URL`\
  \ 类继承自 `URI` 类。Java 使用术语“协议”来指代 URI 规范中的“方案”部分。你可以通过提供一个包含 URL 所有部分的拼接字符串，或者分别提供各个部分来创建\
  \ URL 对象。如果你提供的用于创建 URL 对象的字符串无效，`URL` 类的构造器将抛出一个受检异常 `MalformedURLException`。\n\
  \n清单 4-11 演示了如何创建 `URL` 对象。`URL` 类允许你使用其一个构造器，通过相对 URL 和基础 URL 来创建绝对 URL。\n\n```\n\
  // URLTest.java\npackage com.jdojo.net;\nimport java.net.URL;\npublic class URLTest\
  \ {\npublic static void main(String[] args) {\nString baseURLStr = \"http://www.ietf.org/rfc/rfc3986.txt\"\
  ;\nString relativeURLStr = \"rfc2732.txt\";\ntry {\nURL baseURL = new URL(baseURLStr);\n\
  URL resolvedRelativeURL = new URL(baseURL, relativeURLStr);\nSystem.out.println(\"\
  Base URL:\" + baseURL);\nSystem.out.println(\"Relative URL String:\" + relativeURLStr);\n\
  System.out.println(\"Resolved Relative URL:\" + resolvedRelativeURL);\n} catch (Exception\
  \ e) {\ne.printStackTrace();\n}\n}\n}\nBase URL:http://www.ietf.org/rfc/rfc3986.txt\n\
  Relative URL String:rfc2732.txt\nResolved Relative URL:http://www.ietf.org/rfc/rfc2732.txt\n\
  清单 4-11.\n演示 java.net.URL 类使用的示例类\n```\n\n通常，你创建 `URL` 对象是为了检索该 URL 所标识的资源。请注意，只要\
  \ URL 在文本上格式正确，并且处理该 URL 的协议可用，你就可以创建 `URL` 类的对象。在 Java 程序中成功创建 `URL` 对象并不能保证该资源在\
  \ URL 指定的服务器上存在。`URL` 类提供了可以与其他类结合使用的方法，以检索 URL 所标识的资源。\n\n`URL` 类会确保它能够处理 URL 字符串中指定的协议。例如，除非你开发并提供一个名为\
  \ `ppp` 的协议处理器，否则它不会允许你使用 `ppp://`[`www.sss.com/`](http://www.sss.com/) 这样的字符串创建\
  \ `URL` 对象。我将在下一节介绍如何检索 URL 所标识的资源。\n\n有时你无法预先知道 URL 字符串的各个部分。你会在运行时从程序的其他部分或用户那里获取\
  \ URL 的各个部分作为输入。在这种情况下，你需要先对 URL 的各个部分进行编码，然后才能使用它们创建 `URL` 对象。有时你会得到一个已编码形式的字符串，并希望对其进行解码。一个已编码的字符串会将所有受限字符进行适当的转义。\n\
  \n`URLEncoder` 和 `URLDecoder` 类分别用于编码和解码字符串。`URLEncoder.encode(String source, String\
  \ encoding)` 静态方法用于使用指定的编码对源字符串进行编码。`URLDecoder.decode(String source, String encoding)`\
  \ 静态方法用于使用指定的编码对源字符串进行解码。以下代码片段展示了如何编码/解码字符串。通常，你编码/解码的是 URL 查询部分中名称-值对的值部分。请注意，你绝不应该尝试对整个\
  \ URL 字符串进行编码。否则，它会编码一些保留字符，例如正斜杠，导致生成的 URL 字符串无效。\n\n```\nString source = \"this\
  \ is a test for 2.5% and &\" ;\nString encoded = URLEncoder.encode(source, \"utf-8\"\
  );\nString decoded = URLDecoder.decode(encoded, \"utf-8\");\nSystem.out.println(\"\
  Source: \" + source);\nSystem.out.println(\"Encoded: \" + encoded);\nSystem.out.println(\"\
  Decoded: \" + decoded);\nSource: this is a test for 2.5% and &\nEncoded: this+is+a+test+for+2.5%25+and+%26\n\
  Decoded: this is a test for 2.5% and &\n```\n\n\n\n## 访问 URL 的内容\n\n`A` URL 使用一种协议来与托管其内容的远程应用程序进行通信。例如，URL\
  \ [`http://www.yahoo.com/index.html`](http://www.yahoo.com/index.html) 使用了 `http`\
  \ 协议。在 URL 中，你需要指定协议套件中应用层所使用的协议。当需要访问 URL 的内容时，计算机会使用协议套件中较低层（传输层、互联网层等）的某些协议与远程主机进行通信。`http`\
  \ 应用层协议在较低层使用 `TCP/IP` 协议。在分布式应用中，经常需要检索（或读取）由 URL 标识的资源（可能是文本、HTML 内容、图像文件、音频/视频文件或任何其他类型的信息）。虽然每次读取\
  \ URL 内容时都可以打开一个套接字，但对程序员来说，这既耗时又繁琐。毕竟，程序员需要一种比编写重复代码更高效的方法来处理这种看似常规的任务。Java 的设计者意识到了这一需求，并提供了一种非常简单（是的，非常简单）的方法来从\
  \ URL 读取数据或向 URL 写入数据。本节将探讨从 URL 读取数据或向 URL 写入数据的一些方法，从非常简单到相当复杂。\n\n当数据在协议套件中从一层传递到另一层时，每一层都会向数据添加一个头部。由于\
  \ URL 使用应用层协议，因此它也包含自己的头部。头部的格式取决于所使用的协议。当 `http` 请求发送到远程主机时，源主机的应用层会向数据添加 `http`\
  \ 头部。远程主机有一个处理 `http` 协议的应用层，它使用头部信息来解释内容。总之，一个 URL 数据将包含两部分：头部部分和内容部分。`URL` 类以及其他一些类允许你读取和写入\
  \ URL 的头部和内容部分。我将从读取 URL 内容的最简单情况开始。\n\n在从 URL 读取数据或向 URL 写入数据之前，你需要有一个可以访问的有效 URL。你可以读取互联网上任何公开可用的\
  \ URL 的内容。在本次讨论中，我使用网站 [`http://www.httpbin.org/`](http://www.httpbin.org/) 上的一个\
  \ URL，该网站提供了多个用于测试目的的 URL。该网站提供了多个用于测试的端点。请访问该网站以获取完整的端点列表。表 4-6 包含了两个这样的端点，你将在本节的示例中使用它们。\n\
  \n表 4-6.\n\n示例中使用的 [`www.httpbin.org`](http://www.httpbin.org) 上的有用端点\n\n| URL |\
  \ 描述 |\n| --- | --- |\n| [`http://www.httpbin.org/get`](http://www.httpbin.org/get)\
  \ | 接受 HTTP `GET` 请求，并以 JSON 格式返回传递给此 URL 的参数。如果你向此端点传递一个值为 1969 的 year 参数，你的 URL\
  \ 将如下所示：[`http://www.httpbin.org/get?year=1069`](http://www.httpbin.org/get?year=1069)\
  \ |\n| [`http://www.httpbin.org/post`](http://www.httpbin.org/post) | 接受 HTTP `POST`\
  \ 请求，并以 JSON 格式返回传递给此 URL 的相同 `POST` 数据。 |\n\n`URL` 类允许你仅通过编写两行代码来读取 URL 的内容（而非头部），如下所示：\n\
  \n```\nURL url = new URL(\"your URL string goes here\");\nInputStream ins = url.openStream();\n\
  ```\n\n清单 4-12 包含了完整的程序，该程序读取 URL [`http://httpbin.org/get?year=1969`](http://httpbin.org/get?year=1969)\
  \ 的内容。输出显示服务器在 `args` 对象中返回了传递的 `GET` 参数（year=1969）。如果你想使用 `POST` 方法向 URL 发送请求，则需要使用\
  \ `URLConnection` 类，我将在后面解释。为了便于阅读，我对输出进行了格式化。\n\n```\n// SimpleURLContentReader.java\n\
  package com.jdojo.net;\nimport java.io.BufferedReader;\nimport java.io.IOException;\n\
  import java.io.InputStreamReader;\nimport java.net.URL;\npublic class SimpleURLContentReader\
  \ {\npublic static void main(String[] args) {\nString urlStr = \"http://httpbin.org/get?year=1969\"\
  ;\nString content = getURLContent(urlStr);\nSystem.out.println(content);\n}\npublic\
  \ static String getURLContent(String urlStr) {\nBufferedReader br = null;\ntry {\n\
  URL url = new URL(urlStr);\n// 将输入流包装到 BufferedReader 中\nbr = new BufferedReader(new\
  \ InputStreamReader(url.openStream()));\nStringBuilder sb = new StringBuilder();\n\
  String msg = null;\nwhile ((msg = br.readLine()) != null) {\nsb.append(msg);\nsb.append(\"\
  \\n\"); // 追加一个新行\n}\nreturn sb.toString();\n} catch (IOException e) {\ne.printStackTrace();\n\
  } finally {\nif (br != null) {\ntry {\nbr.close();\n} catch (IOException e) {\n\
  e.printStackTrace();\n}\n}\n}\n// 如果执行到这里，说明发生了错误\nreturn null;\n}\n}\n{\n\"args\"\
  : {\n\"year\": \"1969\"\n},\n\"headers\": {\n\"Accept\": \"text/html, image/gif,\
  \ image/jpeg, *; q=.2, */*; q=.2\",\n\"Connection\": \"close\",\n\"Host\": \"httpbin.org\"\
  ,\n\"User-Agent\": \"Java/9\"\n},\n\"origin\": \"50.58.251.82\",\n\"url\": \"http://httpbin.org/get?year=1969\"\
  \n}\n清单 4-12.\n一个简单的 URL 内容读取器程序\n```\n\n一旦获得输入流，你就可以用它来读取 URL 的内容。另一种读取 URL 内容的方法是使用\
  \ `URL` 类的 `getContent()` 方法。由于 `getContent()` 可以返回任何类型的内容，因此其返回类型是 `Object` 类型。在使用对象的内容之前，你需要检查它返回的是哪种类型的对象。例如，它可能返回一个\
  \ `InputStream` 对象，在这种情况下，你需要从输入流中读取数据。以下是 `getContent()` 方法的两个版本：\n\n*   `final\
  \ Object getContent() throws IOException`\n*   `final Object getContent(Class[]\
  \ classes) throws IOException`\n\n该方法的第二个版本允许你传递一个类类型数组。它会尝试将内容对象转换为你按指定顺序传递给它的类之一。如果内容对象与任何类型都不匹配，它将返回\
  \ `null`。你仍然需要编写 `if` 语句来了解 `getContent()` 方法返回的对象类型，如下所示：\n\n```\nURL baseURL =\
  \ new URL (\"your url string goes here\");\nClass[] c = new Class[] {String.class,\
  \ BufferedReader.class, InputStream.class};\nObject content = baseURL.getContent(c);\n\
  if (content == null) {\n// 内容不属于这三种类型中的任何一种\n} else if (content instanceof String)\
  \ {\n// 你得到了一个字符串\n} else if (content instanceof BufferedReader) {\n// 你得到了一个读取器\n\
  } else if (content instanceof InputStream) {\n// 你得到了一个输入流\n}\n```\n\n如果你使用 `openStream()`\
  \ 或 `getContent()` 方法读取 URL 的内容，`URL` 类会在内部处理使用套接字的许多复杂性。这种方法的缺点是你无法控制连接设置。你无法使用这种方法向\
  \ URL 写入数据。此外，你也无法访问 URL 中所用协议的头部信息。别担心；Java 提供了另一个名为 `URLConnection` 的类，它允许你以简单明了的方式完成这些操作。\n\
  \n`URLConnection` 是一个抽象类，你不能直接创建它的对象。你需要使用 URL 对象的 `openConnection()` 方法来获取一个 `URLConnection`\
  \ 对象。`URL` 类将处理 `URLConnection` 对象的创建，该对象将适合处理 URL 中使用的协议的数据。以下代码片段展示了如何使用 `URLConnection`\
  \ 对象从 URL 读取数据和向 URL 写入数据：\n\n\n\n```\nURL url = new URL(\"your URL string goes\
  \ here\");\n// 获取连接对象\nURLConnection connection = url.openConnection();\n// 表明你将向该连接写入数据\n\
  connection.setDoOutput(true);\n// 获取用于写入/读取数据的输出/输入流\nOutputStream ous = connection.getOutputStream();\n\
  InputStream ins = connection.getInputStream(); // 注意：请阅读下方说明\n```\n\n`URL` 类的 `openConnection()`\
  \ 方法返回一个 `URLConnection` 对象，该对象尚未连接到 URL 源。在连接之前，你必须为此对象设置所有与连接相关的参数。例如，如果你想向 URL\
  \ 写入数据，必须在连接之前调用连接对象的 `setDoOutput(true)` 方法。当你调用 `URLConnection` 对象的 `connect()`\
  \ 方法时，它才会建立连接。然而，当你调用需要连接的方法时，它会隐式地建立连接。例如，向 URL 写入数据以及读取 URL 的数据或标头字段，如果 `URLConnection`\
  \ 对象尚未连接，则会自动建立连接。\n\n如果你想在使用 `URLConnection` 读取和写入 URL 数据时避免出现问题，必须遵循以下几点：\n\n\
  *   当你仅从 URL 读取数据时，可以使用其 `getInputStream()` 方法获取输入流。使用输入流读取数据。它将使用 `GET` 方法向远程主机发送请求。也就是说，如果你要向\
  \ URL 传递一些参数，必须通过向 URL 添加查询部分来实现。\n*   如果你既要向 URL 写入数据，又要从中读取数据，则必须在连接之前调用 `setDoOutput(true)`。在开始读取数据之前，必须完成向\
  \ URL 写入数据。向 URL 写入数据会将请求方法更改为 `POST`。在完成向 URL 写入数据之前，你甚至无法获取输入流。实际上，`getInputStream()`\
  \ 方法会向远程主机发送一个请求。你的意图是向远程主机发送数据并读取远程主机的响应。这一点可能变得非常棘手。下面使用一段代码片段进行更详细的说明，假设 `connection`\
  \ 是一个 `URLConnection` 对象：\n\n```\n    // 错误 – 1. 获取输入和输出流\n    // 你必须先获取输出流\n  \
  \  InputStream ins = connection.getInputStream();\n    OutputStream ous = connection.getOutputStream();\n\
  \    // 错误 – 2. 获取输出和输入流\n    // 你必须先获取输出流并完成写入\n    // 然后才能获取输入流\n    OutputStream\
  \ ous = connection.getOutputStream();\n    InputStream ins = connection.getInputStream();\n\
  \    // 正确。获取输出流并完成操作。\n    // 然后，获取输入流并读取数据。\n    OutputStream ous = connection.getOutputStream();\n\
  \    // 在此处编写使用 ous 对象写入数据的逻辑。确保\n    // 在调用 getInputStream() 方法之前完成数据写入\n    //\
  \ 如下所示\n    InputStream ins = connection.getInputStream();\n    // 编写读取数据的逻辑\n \
  \   ```\n\n*   使用 `getInputStream()` 方法和读取标头字段（使用任何方法，例如 `getHeaderField(String\
  \ headerName)`）具有相同的效果。URL 的服务器同时提供标头和内容。`URLConnection` 必须发送请求才能获取它们。\n\n清单 4-13\
  \ 包含了向/从 [`http://www.httpbin/post`](http://www.httpbin/post) URL 写入/读取数据的完整代码。\n\
  \n```\n// URLConnectionReaderWriter.java\npackage com.jdojo.net;\nimport java.io.BufferedReader;\n\
  import java.io.BufferedWriter;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
  import java.io.InputStreamReader;\nimport java.io.OutputStream;\nimport java.io.OutputStreamWriter;\n\
  import java.io.UnsupportedEncodingException;\nimport java.net.URL;\nimport java.net.URLConnection;\n\
  import java.net.URLEncoder;\nimport java.util.Map;\npublic class URLConnectionReaderWriter\
  \ {\npublic static String getURLContent(String urlStr, String input) {\nBufferedReader\
  \ br = null;\nBufferedWriter bw = null;\ntry {\nURL url = new URL(urlStr);\nURLConnection\
  \ connection = url.openConnection();\n// 必须调用 setDoOutput(true) 以表明你将向连接写入数据。\n\
  // 默认情况下，该值为 false。\n// 默认情况下，setDoInput() 设置为 true。\nconnection.setDoOutput(true);\n\
  // 现在，连接到远程对象\nconnection.connect();\n// 在读取响应之前，先向 URL 写入数据\nOutputStream ous =\
  \ connection.getOutputStream();\nbw = new BufferedWriter(new OutputStreamWriter(ous));\n\
  bw.write(input);\nbw.flush();\nbw.close();\n// 必须放在写入数据之后。否则，会导致错误，\n// 因为如果执行了写入操作，则必须在写入之后执行读取操作。\n\
  printRequestHeaders(connection);\nInputStream ins = connection.getInputStream();\n\
  // 将输入流包装到读取器中\nbr = new BufferedReader(new InputStreamReader(ins));\nStringBuilder\
  \ sb = new StringBuilder();\nString msg = null;\nwhile ((msg = br.readLine()) !=\
  \ null) {\nsb.append(msg);\nsb.append(\"\\n\"); // 追加一个新行\n}\nreturn sb.toString();\n\
  } catch (IOException e) {\ne.printStackTrace();\n} finally {\nif (br != null) {\n\
  try {\nbr.close();\n} catch (IOException e) {\ne.printStackTrace();\n}\n}\n}\n//\
  \ 如果执行到这里，表示发生了错误\nreturn null;\n}\npublic static void printRequestHeaders(URLConnection\
  \ connection) {\nMap headers = connection.getHeaderFields();\nSystem.out.println(\"\
  请求标头为：\");\nSystem.out.println(headers);\nSystem.out.println();\n}\npublic static\
  \ void main(String[] args) {\n// 将 URL 更改为指向你的 Web 服务器上的 echo_params.jsp 页面\nString\
  \ urlStr = \"http://www.httpbin.org/post\";\nString query = null;\ntry {\n// 对查询进行编码。我们只需要对\
  \ name 参数的值进行编码。\n// 其他名称和值没有问题\nquery = \"id=789&name=\" + URLEncoder.encode(\"\
  John & Co.\", \"utf-8\");\n// 获取内容并在控制台上显示\nString content = getURLContent(urlStr,\
  \ query);\nSystem.out.println(\"从服务器返回的数据为：\");\nSystem.out.println(content);\n\
  } catch (UnsupportedEncodingException e) {\ne.printStackTrace();\n}\n}\n}\n请求标头为：\n\
  {null=[HTTP/1.1 200 OK], X-Processed-Time=[0.000935077667236], Server=[meinheld/0.6.1],\
  \ Access-Control-Allow-Origin=[*], Access-Control-Allow-Credentials=[true], Connection=[keep-alive],\
  \ Content-Length=[462], Date=[Wed, 03 Jan 2018 19:37:10 GMT], Via=[1.1 vegur], X-Powered-By=[Flask],\
  \ Content-Type=[application/json]}\n从服务器返回的数据为：\n{\n\"args\": {},\n\"data\": \"\"\
  ,\n\"files\": {},\n\"form\": {\n\"id\": \"789\",\n\"name\": \"John & Co.\"\n},\n\
  \"headers\": {\n\"Accept\": \"text/html, image/gif, image/jpeg, *; q=.2, */*; q=.2\"\
  ,\n\"Connection\": \"close\",\n\"Content-Length\": \"24\",\n\"Content-Type\": \"\
  application/x-www-form-urlencoded\",\n\"Host\": \"www.httpbin.org\",\n\"User-Agent\"\
  : \"Java/9\"\n},\n\"json\": null,\n\"origin\": \"50.58.251.82\",\n\"url\": \"http://www.httpbin.org/post\"\
  \n}\n清单 4-13.\n一个向/从 URL 写入/读取数据的 URL 读取器/写入器类\n```\n\n这次，你使用 `POST` 方法向 URL 发送数据。请注意，你发送的数据已使用\
  \ `URLEncoder` 类进行了编码。你只需要对 name 字段的值（即 `\"John & Co.\"`）进行编码，因为该值中的 & 符号会与查询字符串中的名称-值对分隔符冲突。该程序包含大量注释，以警告你如果更改任何语句的顺序可能带来的风险。\n\
  \n\n\n该程序会打印 `java.util.Map` 对象中返回的所有标头信息。`URLConnection` 类提供了多种获取标头字段值的方法。对于常用的标头，它提供了直接方法。例如，名为\
  \ `getContentLength()`、`getContentType()` 和 `getContentEncoding()` 的方法分别返回表示 URL\
  \ 内容长度、类型和编码的标头字段值。如果你知道标头字段名称或其索引，可以使用 `getHeaderField(String headerName)` 或 `getHeaderField(int\
  \ headerIndex)` 方法来获取其值。`getHeaderFields()` 方法返回一个 `Map` 对象，其键代表标头字段名称，值代表标头字段值。读取标头字段时需谨慎，因为它对\
  \ `URLConnection` 对象的影响与读取内容相同。如果你想向 URL 写入数据，必须先写入数据，然后才能读取标头字段。\n\nJava 允许你使用\
  \ `jar` 协议读取 JAR 文件的内容。假设你有一个名为 `myclasses.jar` 的 JAR 文件，其中包含一个路径为 `myfolder/Abc.class`\
  \ 的类文件。你可以从 URL 获取 `JarURLConnection`，并使用其方法访问 JAR 文件数据。请注意，你只能从 URL 读取 JAR 文件内容，不能向\
  \ JAR 文件 URL 写入数据。以下代码片段展示了如何获取 `JarURLConnection` 对象。你需要使用其方法来获取 JAR 特定的数据。\n\n\
  ```\nString str = \"jar:http://www.abc.com/myclasses.jar!/myfolder/Abc.class\";\n\
  URL url = new URL(str);\nJarURLConnection connection = (JarURLConnection) url.openConnection();\n\
  // 使用连接对象访问任何与 jar 相关的数据。\n```\n\n提示\n\n你在本节中已经阅读了许多关于使用 `URLConnection` 对象的警告。这里还有一条：一个\
  \ `URLConnection` 对象只能用于一个请求。它遵循“获取-使用-丢弃”的概念。如果你希望多次向 URL 写入或读取数据，必须每次都单独调用 URL\
  \ 的 `openConnection()` 方法。\n\n## 非阻塞套接字编程\n\n在前面的章节中，我解释了 TCP 和 UDP 套接字。`Socket`\
  \ 和 `ServerSocket` 类的 `connect()`、`accept()`、`read()` 和 `write()` 方法会阻塞，直到操作完成。例如，如果客户端套接字调用\
  \ `read()` 方法从服务器读取数据，其线程会阻塞，直到数据可用。如果你能在客户端套接字上调用 `read()` 方法，然后开始做其他事情，直到服务器数据到达，那岂不是很好？当服务器数据可用时，客户端套接字会收到通知，并在适当的时候读取数据。套接字编程中你面临的另一个大问题是服务器应用程序的可扩展性。在前面的章节中，我建议你需要创建一个新线程来处理每个客户端连接，或者拥有一个线程池来处理所有客户端连接。无论哪种方式，你都需要在程序中创建和维护一堆线程。如果服务器程序无需处理线程就能处理多个客户端，那岂不是很好？非阻塞套接字通道提供了所有这些优秀特性。一如既往，好的特性都有其代价；非阻塞套接字通道也不例外。它有一定的学习曲线。你已经习惯了按顺序执行任务的编程方式。使用非阻塞套接字通道，你需要改变对程序中任务执行方式的思维模式。改变思维模式需要时间。你的程序将执行多个不会按顺序执行的任务。如果你是第一次学习\
  \ Java，可以跳过本节，等你在编写复杂 Java 程序方面积累更多经验后再回来学习。\n\n假设你已经很好地掌握了使用 `ServerSocket` 和 `Socket`\
  \ 类进行套接字编程的知识。同时假设你对使用缓冲区和通道的 Java 新输入/输出有基本的了解。本节使用了 `java.nio`、`java.nio.channels`\
  \ 和 `java.nio.charset` 包中的一些类。\n\n让我们从比较阻塞和非阻塞套接字通信中涉及的类开始。表 4-7 列出了阻塞和非阻塞套接字应用程序中使用的主要类。\n\
  \n表 4-7.\n\n阻塞与非阻塞套接字编程中涉及的类对比\n\n| 阻塞套接字通信中使用的类 | 非阻塞套接字通信中使用的类 |\n| --- | ---\
  \ |\n| `ServerSocket` | `ServerSocketChannel` `ServerSocket` 类仍在后台存在。 |\n| `Socket`\
  \ | `SocketChannel` `Socket` 类仍在后台存在。 |\n| `InputStream` `OutputStream` | 不存在对应的类。使用\
  \ `SocketChannel` 来读取/写入数据。 |\n| 不存在对应的类。 | `Selector` |\n| 不存在对应的类。 | `SelectionKey`\
  \ |\n\n你将主要使用 `ServerSocketChannel` 对象在服务器中接受新的连接请求，而不是使用 `ServerSocket`。`ServerSocket`\
  \ 并未消失，它仍在后台发挥作用。如果你需要内部使用的 `ServerSocket` 对象的引用，可以通过 `ServerSocketChannel` 对象的\
  \ `socket()` 方法获取。你可以将 `ServerSocketChannel` 对象视为 `ServerSocket` 对象的包装器。\n\n你将使用\
  \ `SocketChannel` 在客户端和服务器之间进行通信，而不是使用 `Socket`。`Socket` 对象仍在后台发挥作用。你可以通过 `SocketChannel`\
  \ 类的 `socket()` 方法获取 `Socket` 对象的引用。你可以将 `SocketChannel` 对象视为 `Socket` 对象的包装器。\n\
  \n\n\n在开始讨论非阻塞套接字用于提供更高效、可扩展应用接口的机制之前，先看一个现实世界的例子会很有帮助。我们来讨论一下快餐店点餐和供餐的方式。假设这家餐厅在任何时候最多接待十位顾客，最少为零位。一位顾客来到餐厅，点餐，然后拿到食物。这家餐厅应该雇佣多少服务员呢？最好的情况下，它可能只需要一名服务员，就能处理所有顾客的点餐和供餐。最坏的情况下，它可以有十名服务员——一名服务员专门服务一位顾客。在后一种情况下，如果餐厅里只有三位顾客，那么七名服务员就会闲置。\n\
  \n让我们在餐厅管理上采取折中方案。厨房里安排几名厨师负责烹饪，柜台安排一名服务员负责接单。顾客来了，在柜台向服务员点餐，顾客拿到一个订单号，然后离开柜台。柜台服务员将订单传给厨房里的一名厨师，然后开始接待下一位顾客。此时，顾客在等待餐品准备期间可以自由地做其他事情。柜台服务员正在处理其他顾客。厨房里的厨师们正忙着根据订单准备食物。没有人需要等待任何人。一旦订单中的某个餐品准备好了，柜台服务员就从厨师那里接过餐品，并呼叫订单号，让下该订单的顾客来取餐。顾客可能会分多次拿到他的食物。他可以先吃已经拿到手的食物，同时他订单中剩余的食物正在厨房里准备。这种架构是餐厅里能拥有的最高效的架构。它能让每个人大部分时间都保持忙碌，并高效地利用资源。这正是非阻塞套接字通道所遵循的方法。\n\
  \n另一种方法是：顾客进来，点餐，一直等到他的订单完成并拿到食物，然后下一位顾客再点餐，以此类推。这是阻塞套接字所遵循的方法。如果你理解了快餐店高效利用资源的方法，你就能轻松理解非阻塞套接字通道。在接下来的讨论中，我将把餐厅例子中的人员与非阻塞套接字中使用的对象进行类比。\n\
  \n首先，我们来讨论服务器端的情况。服务器端就是你的餐厅。在柜台与所有顾客打交道的人被称为选择器（selector）。选择器是`Selector`类的一个对象。它的唯一工作就是与外部世界交互。它位于与服务器交互的远程客户端和服务器内部组件之间。远程客户端永远不会与服务器内部工作的对象直接交互，就像餐厅里的顾客永远不会直接与厨房里的厨师交互一样。图\
  \ 4-7 展示了非阻塞套接字通道通信的架构。它显示了选择器在架构中的位置。\n\n![A323071_2_En_4_Fig7_HTML.gif](img/A323071_2_En_4_Fig7_HTML.gif)\n\
  \n图 4-7.\n\n非阻塞客户端-服务器套接字的架构\n\n你不能直接使用构造函数创建选择器对象。你需要调用它的`open()`静态方法来获取一个选择器对象，如下所示：\n\
  \n```\n// 获取一个选择器对象\nSelector selector = Selector.open();\n```\n\n`ServerSocketChannel`用于监听来自客户端的新连接请求。同样，你不能使用构造函数创建新的`ServerSocketChannel`对象。你需要调用它的`open()`静态方法，如下所示：\n\
  \n```\n// 获取一个服务器套接字通道\nServerSocketChannel ssChannel = ServerSocketChannel.open();\n\
  ```\n\n默认情况下，服务器套接字通道或套接字通道是阻塞通道。你需要对其进行配置，使其成为非阻塞通道，如下所示：\n\n```\n// 将服务器套接字通道配置为非阻塞\n\
  ssChannel.configureBlocking(false);\n```\n\n你的服务器套接字通道需要绑定到一个本地 IP 地址和一个本地端口号，这样远程客户端才能联系它以建立新连接。你可以使用它的`bind()`方法来绑定服务器套接字通道。`bind()`方法是在\
  \ Java 7 中添加到`ServerSocketChannel`和`SocketChannel`中的。在 Java 7 之前，你需要在与通道关联的套接字上调用`bind()`方法。\n\
  \n```\nInetAddress hostIPAddress = InetAddress.getByName(\"localhost\");\nint port\
  \ = 19000;\n// Java 7 之前\nssChannel.socket().bind(new InetSocketAddress(hostIPAddress,\
  \ port));\n// Java 7 及以后\nssChannel.bind(new InetSocketAddress(hostIPAddress, port));\n\
  ```\n\n现在要执行最关键的一步。服务器套接字必须向选择器注册自己，表明对某种操作感兴趣。这就像餐厅里的披萨师傅让柜台服务员知道，他已经准备好为顾客制作披萨，并且当有披萨订单时，需要通知他。你可以向选择器注册通道的操作有四种。它们被定义为`SelectionKey`类中的整数常量，列在表\
  \ 4-8 中。\n\n表 4-8.\n\n选择器识别的操作\n\n| 操作类型 | 值（SelectionKey 类中的常量） | 谁可以注册此操作 | 描述\
  \ |\n| --- | --- | --- | --- |\n| `Connect` | `OP_CONNECT` | 客户端的 `SocketChannel`\
  \ | 选择器将通知连接操作的进度。 |\n| `Accept` | `OP_ACCEPT` | 服务端的 `ServerSocketChannel` | 当客户端请求新连接到达时，选择器将通知。\
  \ |\n| `Read` | `OP_READ` | 客户端和服务端的 `SocketChannel` | 当通道准备好读取一些数据时，选择器将通知。 |\n\
  | `Write` | `OP_WRITE` | 客户端和服务端的 `SocketChannel` | 当通道准备好写入一些数据时，选择器将通知。 |\n\n\
  `ServerSocketChannel`仅用于监听接受新的客户端连接请求，因此，它只能注册一种操作，如下所示：\n\n```\n// 将服务器套接字通道注册到选择器，用于接受操作\n\
  ssChannel.register(selector, SelectionKey.OP_ACCEPT);\n```\n\n`ServerSocketChannel`的`register()`方法返回一个`SelectionKey`类型的对象。你可以将这个对象视为向选择器注册的证书。如果你以后需要使用这个键对象，可以将其存储在一个变量中。本例中忽略了它。选择器拥有你的键（注册详情）的副本，它将在未来使用它来通知你通道已准备好的任何操作。\n\
  \n此时，你的选择器已准备好拦截传入的客户端连接请求，并将其传递给服务器套接字通道。假设此时一个客户端尝试连接到服务器套接字通道。选择器和服务器套接字通道之间的交互是如何进行的呢？当选择器检测到有一个已注册的键准备好执行某个操作时，它会将该键（`SelectionKey`类的对象）放入一个单独的组中，称为就绪集（ready\
  \ set）。一个`java.util.Set`对象代表一个就绪集。你可以通过调用`Selector`对象的`select()`方法来确定处于就绪状态的键的数量。\n\
  \n```\n// 获取就绪集中的键数量\nint readyCount = selector.select();\n```\n\n一旦你在就绪集中至少获得了一个就绪键，你需要获取该键并查看详细信息。你可以像这样从就绪集中获取所有就绪键：\n\
  \n```\n// 获取就绪键的集合\nSet readySet = selector.selectedKeys();\n```\n\n\n\n请注意，您注册一个键用于一个或多个操作。您需要查看键的详细信息，以了解其是否已准备好执行特定操作。如果一个键已准备好接受新的连接请求，其\
  \ `isAcceptable()` 方法将返回 `true`。如果一个键已准备好进行连接操作，其 `isConnectable()` 方法将返回 `true`。如果一个键已准备好进行读写操作，其\
  \ `isReadable()` 和 `isWritable()` 方法将返回 `true`。您可能会发现，每种操作类型都有一个检查就绪状态的方法。当您处理就绪集合时，还需要从就绪集合中移除该键。以下是在服务器应用程序中处理就绪集合的典型代码。在服务器应用程序中，无限循环是典型的做法，因为一旦处理完当前的就绪集合，您需要继续寻找下一个就绪集合。\n\
  \n```\nwhile(true) {\n// 获取就绪集合中键的数量。如果就绪键的数量\n// 大于零，则处理就绪集合中的每个键。\n}\n```\n\n\
  以下代码片段展示了可用于处理就绪集合中所有键的典型逻辑：\n\n```\nSelectionKey key = null;\nIterator iterator\
  \ = readySet.iterator();\nwhile (iterator.hasNext()) {\n// 获取下一个就绪的选择键对象\nkey =\
  \ (SelectionKey)iterator.next();\n// 从就绪集合中移除该键\niterator.remove();\n// 根据操作处理该键\n\
  if (key.isAcceptable()) {\n// 处理新连接\n}\nif (key.isReadable()) {\n// 从通道读取\n}\nif\
  \ (key.isWritable()) {\n// 写入通道\n}\n}\n```\n\n如何在服务器套接字通道上接受来自远程客户端的连接请求？其逻辑类似于使用\
  \ `ServerSocket` 对象接受远程连接请求。`SelectionKey` 对象持有注册它的 `ServerSocketChannel` 的引用。您可以通过\
  \ `SelectionKey` 对象的 `channel()` 方法获取其 `ServerSocketChannel` 对象。您需要调用 `ServerSocketChannel`\
  \ 对象的 `accept()` 方法来接受新的连接请求。`accept()` 方法返回一个 `SocketChannel` 类的对象，该对象用于与远程客户端进行通信（读写）。您需要将新的\
  \ `SocketChannel` 对象配置为非阻塞套接字通道。您需要理解的最重要的一点是，新的 `SocketChannel` 对象必须向选择器注册读、写或两者操作，才能开始在连接通道上读取/写入数据。以下代码片段展示了接受远程连接请求的逻辑：\n\
  \n```\nServerSocketChannel ssChannel = (ServerSocketChannel)key.channel();\nSocketChannel\
  \ sChannel = (SocketChannel)ssChannel.accept();\nsChannel.configureBlocking(false);\n\
  // 仅注册读操作。您的消息很小，并且您会在读取后立即将其写回\n// 给客户端。\nsChannel.register(key.selector(), SelectionKey.OP_READ);\n\
  ```\n\n如果您希望将套接字通道向选择器注册为读和写操作，可以按如下方式操作：\n\n```\n// 注册读和写操作\nsChannel.register(key.selector(),\
  \ SelectionKey.OP_READ | SelectionKey.OP_WRITE);\n```\n\n一旦您的套接字通道向选择器注册，当它从远程客户端接收到任何数据，或者当您可以在其通道上向远程客户端写入数据时，它都会通过选择器的就绪集合得到通知。\n\
  \n如果套接字通道上有数据可用，则此套接字通道的 `key.isReadable()` 将返回 `true`。典型的读取操作如下所示。您必须对 Java NIO（新输入/输出）有基本的了解，才能使用通道和缓冲区读取数据。\n\
  \n```\nSocketChannel sChannel = (SocketChannel) key.channel();\nByteBuffer buffer\
  \ = ByteBuffer.allocate(1024);\nint bytesCount = sChannel.read(buffer);\nString\
  \ msg = \"\";\nif (bytesCount > 0) {\nbuffer.flip();\nCharset charset = Charset.forName(\"\
  UTF-8\");\nCharsetDecoder decoder = charset.newDecoder();\nCharBuffer charBuffer\
  \ = decoder.decode(buffer);\nmsg = charBuffer.toString();\nSystem.out.println(\"\
  Received Message: \" + msg);\n}\n```\n\n如果您可以向通道写入数据，选择器会将关联的键放入其就绪集合中，该键的 `isWritable()`\
  \ 方法将返回 `true`。同样，您需要了解 Java NIO 才能使用 `ByteBuffer` 对象在通道上写入数据。\n\n```\nSocketChannel\
  \ sChannel = (SocketChannel)key.channel();\nString msg = \"message to be sent to\
  \ remote client goes here\";\nByteBuffer buffer = ByteBuffer.wrap(msg.getBytes());\n\
  sChannel.write(buffer);\n```\n\n客户端发生的情况很容易理解。您首先获取一个选择器对象，然后通过调用 `SocketChannel.open()`\
  \ 方法获取一个 `SocketChannel` 对象。此时，您需要在连接到服务器之前将套接字通道配置为非阻塞。现在，您可以将套接字通道向选择器注册。通常，您会向选择器注册连接、读取和写入操作。处理选择器的就绪集合的方式与您在服务器应用程序中处理选择器的就绪集合的方式相同。读取和写入通道的代码与服务器端代码类似。以下代码片段展示了客户端应用程序中使用的典型逻辑：\n\
  \n```\nInetAddress serverIPAddress = InetAddress.getByName(\"localhost\");\nint\
  \ port = 19000;\nInetSocketAddress serverAddress = new InetSocketAddress(serverIPAddress,\
  \ port);\n// 获取一个选择器\nSelector selector = Selector.open();\n// 创建并配置客户端套接字通道\nSocketChannel\
  \ channel = SocketChannel.open();\nchannel.configureBlocking(false);\n// 连接到服务器\n\
  channel.connect(serverAddress);\n// 为连接、读取和写入操作注册通道\nint operations = SelectionKey.OP_CONNECT\
  \ | SelectionKey.OP_READ | SelectionKey.OP_WRITE;\nchannel.register(selector, operations);\n\
  // 在此处处理选择器的就绪集合\n```\n\n当您在客户端 `SocketChannel` 上获得连接操作时，这可能意味着连接成功或失败。您可以调用 `SocketChannel`\
  \ 对象的 `finishConnect()` 方法来完成连接过程。如果连接失败，`finishConnect()` 调用将抛出 `IOException`。通常，您按如下方式处理连接操作：\n\
  \n```\nif (key.isConnectable()) {\ntry {\n// 对 finishConnect() 的调用在循环中进行，因为对于您的通道来说它是非阻塞的\n\
  while(channel.isConnectionPending()) {\nchannel.finishConnect();\n}\n} catch (IOException\
  \ e) {\n// 取消通道向选择器的注册\nkey.cancel();\ne.printStackTrace();\n}\n}\n```\n\n现在是时候使用这些通道构建一个回声客户端应用程序和一个回声服务器应用程序了。清单\
  \ 4-14 和清单 4-15 分别包含了用于回声服务器和回声客户端的非阻塞套接字通道的完整代码。\n\n您需要先运行 `NonBlockingEchoServer`\
  \ 类，然后运行一个或多个 `NonBlockingEchoClient` 类的实例。它们的工作方式与您的另外两个回声客户端-服务器程序类似。请注意，这次，您在客户端应用程序中输入消息后，可能不会立即看到来自服务器的消息。客户端应用程序向服务器发送消息，并且不会等待消息被回声返回。相反，它会在套接字通道收到来自选择器的通知时处理服务器消息。因此，有可能一次从服务器收到两条回声返回的消息。在这些示例中，为了保持代码简单易读，异常处理已被省略。\n\
  \n\n\n```\n// NonBlockingEchoServer.java\npackage com.jdojo.net;\nimport java.io.IOException;\n\
  import java.net.InetAddress;\nimport java.net.InetSocketAddress;\nimport java.nio.ByteBuffer;\n\
  import java.nio.CharBuffer;\nimport java.nio.channels.SelectionKey;\nimport java.nio.channels.Selector;\n\
  import java.nio.channels.ServerSocketChannel;\nimport java.nio.channels.SocketChannel;\n\
  import java.nio.charset.Charset;\nimport java.nio.charset.CharsetDecoder;\nimport\
  \ java.util.Iterator;\nimport java.util.Set;\npublic class NonBlockingEchoServer\
  \ {\npublic static void main(String[] args) throws Exception {\nInetAddress hostIPAddress\
  \ = InetAddress.getByName(\"localhost\");\nint port = 19000;\n// 获取一个选择器\nSelector\
  \ selector = Selector.open();\n// 获取一个服务器套接字通道\nServerSocketChannel ssChannel =\
  \ ServerSocketChannel.open();\n// 将服务器套接字通道设置为非阻塞模式，并绑定到一个地址\nssChannel.configureBlocking(false);\n\
  ssChannel.socket().bind(new InetSocketAddress(hostIPAddress, port));\n// 将服务器套接字通道注册到选择器上，用于接受操作，\n\
  // 这样当有新的连接请求到达时，它就能收到通知\nssChannel.register(selector, SelectionKey.OP_ACCEPT);\n\
  // 现在我们将在一个循环中持续等待，处理到达服务器的任何类型的请求\n// ——连接、读取或写入请求。如果收到连接请求，我们将接受该请求，\n// 并将一个新的套接字通道注册到选择器上，用于读取和写入操作。\n\
  // 如果收到读取或写入请求，我们将把该请求转发给已注册的通道。\nwhile (true) {\nif (selector.select() > 0) {\n\
  // 获取已就绪键的集合\nSet<SelectionKey> selectedKeys = selector.selectedKeys();\nIterator<SelectionKey>\
  \ iterator = selectedKeys.iterator();\nwhile (iterator.hasNext()) {\nSelectionKey\
  \ key = iterator.next();\n// 从集合中移除该键，以免重复处理\niterator.remove();\nif (key.isAcceptable())\
  \ {\nprocessAccept(key);\n} else if (key.isReadable()) {\nString msg = processRead(key);\n\
  echoMsg(key, msg);\n}\n}\n}\n}\n}\npublic static void processAccept(SelectionKey\
  \ key) throws IOException {\n// 此方法调用表示我们收到了一个新的连接请求。接受\n// 该连接请求，并将新的套接字通道注册到选择器上，\n\
  // 以便客户端可以在新通道上进行通信\nServerSocketChannel ssChannel = (ServerSocketChannel)key.channel();\n\
  SocketChannel sChannel = (SocketChannel) ssChannel.accept();\nsChannel.configureBlocking(false);\n\
  // 仅注册读取操作。我们的消息很小，一旦读取完毕，\n// 就会立即将其写回给客户端\nsChannel.register(key.selector(), SelectionKey.OP_READ);\n\
  }\npublic static String processRead(SelectionKey key) throws Exception {\nSocketChannel\
  \ sChannel = (SocketChannel) key.channel();\nByteBuffer buffer = ByteBuffer.allocate(1024);\n\
  int bytesCount = sChannel.read(buffer);\nString msg = \"\";\nif (bytesCount > 0)\
  \ {\nbuffer.flip();\nCharset charset = Charset.forName(\"UTF-8\");\nCharsetDecoder\
  \ decoder = charset.newDecoder();\nCharBuffer charBuffer = decoder.decode(buffer);\n\
  msg = charBuffer.toString();\nSystem.out.println(\"收到的消息: \" + msg);\n}\nreturn\
  \ msg;\n}\npublic static void echoMsg(SelectionKey key, String msg) throws IOException\
  \ {\nSocketChannel sChannel = (SocketChannel) key.channel();\nByteBuffer buffer\
  \ = ByteBuffer.wrap(msg.getBytes());\nsChannel.write(buffer);\n}\n}\n清单 4-14.\n\
  一个非阻塞套接字通道回显服务器程序\n```\n\n```\n// NonBlockingEchoClient.java\npackage com.jdojo.net;\n\
  import java.io.BufferedReader;\nimport java.io.IOException;\nimport java.io.InputStreamReader;\n\
  import java.net.InetAddress;\nimport java.net.InetSocketAddress;\nimport java.nio.ByteBuffer;\n\
  import java.nio.CharBuffer;\nimport java.nio.channels.SelectionKey;\nimport java.nio.channels.Selector;\n\
  import java.nio.channels.SocketChannel;\nimport java.nio.charset.Charset;\nimport\
  \ java.nio.charset.CharsetDecoder;\nimport java.util.Iterator;\nimport java.util.Set;\n\
  public class NonBlockingEchoClient {\nprivate static BufferedReader userInputReader\
  \ = null;\npublic static void main(String[] args) throws Exception {\nInetAddress\
  \ serverIPAddress = InetAddress.getByName(\"localhost\");\nint port = 19000;\nInetSocketAddress\
  \ serverAddress = new InetSocketAddress(serverIPAddress, port);\n// 获取一个选择器\nSelector\
  \ selector = Selector.open();\n// 创建并配置一个客户端套接字通道\ntry (SocketChannel channel =\
  \ SocketChannel.open()) {\nchannel.configureBlocking(false);\nchannel.connect(serverAddress);\n\
  // 将通道注册到选择器上，用于连接、读取和写入操作\nint operations\n= SelectionKey.OP_CONNECT | SelectionKey.OP_READ\
  \ | SelectionKey.OP_WRITE;\nchannel.register(selector, operations);\nuserInputReader\
  \ = new BufferedReader(new InputStreamReader(System.in));\nwhile (true) {\nif (selector.select()\
  \ > 0) {\nboolean doneStatus = processReadySet(selector.selectedKeys());\nif (doneStatus)\
  \ {\nbreak;\n}\n}\n}\n}\n}\npublic static boolean processReadySet(Set readySet)\
  \ throws Exception {\nSelectionKey key = null;\nIterator iterator = null;\niterator\
  \ = readySet.iterator();\nwhile (iterator.hasNext()) {\n// 获取下一个已就绪的选择键对象\nkey =\
  \ (SelectionKey) iterator.next();\n// 从已就绪键集合中移除该键\niterator.remove();\nif (key.isConnectable())\
  \ {\nboolean connected = processConnect(key);\nif (!connected) {\nreturn true; //\
  \ 退出\n}\n}\nif (key.isReadable()) {\nString msg = processRead(key);\nSystem.out.println(\"\
  [服务器]: \" + msg);\n}\nif (key.isWritable()) {\nString msg = getUserInput();\nif\
  \ (msg.equalsIgnoreCase(\"bye\")) {\nreturn true; // 退出\n}\nprocessWrite(key, msg);\n\
  }\n}\nreturn false; // 尚未完成\n}\npublic static boolean processConnect(SelectionKey\
  \ key) {\nSocketChannel channel = (SocketChannel) key.channel();\ntry {\n// 由于通道是非阻塞的，因此在循环中调用\
  \ finishConnect()\nwhile (channel.isConnectionPending()) {\nchannel.finishConnect();\n\
  }\n} catch (IOException e) {\n// 取消通道在选择器上的注册\nkey.cancel();\ne.printStackTrace();\n\
  return false;\n}\nreturn true;\n}\npublic static String processRead(SelectionKey\
  \ key) throws Exception {\nSocketChannel sChannel = (SocketChannel) key.channel();\n\
  ByteBuffer buffer = ByteBuffer.allocate(1024);\nsChannel.read(buffer);\nbuffer.flip();\n\
  Charset charset = Charset.forName(\"UTF-8\");\nCharsetDecoder decoder = charset.newDecoder();\n\
  CharBuffer charBuffer = decoder.decode(buffer);\nString msg = charBuffer.toString();\n\
  return msg;\n}\npublic static void processWrite(SelectionKey key, String msg) throws\
  \ IOException {\nSocketChannel sChannel = (SocketChannel) key.channel();\nByteBuffer\
  \ buffer = ByteBuffer.wrap(msg.getBytes());\nsChannel.write(buffer);\n}\npublic\
  \ static String getUserInput() throws IOException {\nString promptMsg = \"请输入一条消息（输入\
  \ Bye 退出）: \";\nSystem.out.print(promptMsg);\nString userMsg = userInputReader.readLine();\n\
  return userMsg;\n}\n}\n清单 4-15.\n一个非阻塞套接字通道回显客户端程序\n```\n\n\n\n## Socket 安全权限\n\n\
  您可以使用 `java.net.SocketPermission` 类的实例来控制 Java 程序使用套接字的访问权限。在 Java 策略文件中授予套接字权限的通用格式如下：\n\
  \n```\ngrant {\npermission java.net.SocketPermission \"target\", \"actions\";\n\
  };\n```\n\n目标（target）的格式为 `<主机名>:<端口范围>`。操作（actions）的可能值为 `accept`、`connect`、`listen`\
  \ 和 `resolve`。\n\n`listen` 操作仅在主机名使用 \"localhost\" 时才有意义。`resolve` 操作指的是 DNS 查找，如果其他三个操作中的任何一个存在，则隐含此操作。\n\
  \n主机名可以是 DNS 名称或 IP 地址。您可以在 DNS 主机名中使用星号 (*) 作为通配符。如果使用星号，它必须作为 DNS 名称中最左边的字符。如果主机名仅由一个星号组成，则表示任何主机。主机名\
  \ \"localhost\" 指的是本地机器。您可以使用不同的格式来表示主机名的端口范围，如表 4-9 所述。此处，N1 和 N2 表示端口号（0 到 65535），并假定\
  \ N1 小于 N2。表 4-9 列出了用于表示端口范围的格式。\n\n表 4-9.\n\njava.net.SocketPermission 安全设置的 <端口范围>\
  \ 格式\n\n| 端口范围值 | 描述 |\n| --- | --- |\n| N1 | 仅一个端口号——N1 |\n| N1-N2 | 从 N1 到 N2\
  \ 的端口号 |\n| N1- | 从 N1 及更大的端口号 |\n| -N1 | 从 N1 及更小的端口号 |\n\n以下是在 Java 策略文件中使用 `java.net.SocketPermission`\
  \ 的示例：\n\n```\n// 授予所有代码库\ngrant {\n// 允许连接到 192.168.10.123 的 5000 端口\npermission\
  \ java.net.SocketPermission \"192.168.10.123:5000\", \"connect\";\n// 允许连接到任何主机的\
  \ 80 端口\npermission java.net.SocketPermission \"*:80\", \"connect\";\n// 允许 localhost\
  \ 上端口 >= 1024 的所有套接字权限\npermission java.net.SocketPermission \"localhost:1024-\"\
  , \"listen, accept, connect\";\n};\n```\n\n## 异步套接字通道\n\nJava 7 增加了对异步套接字操作（如 connect、read\
  \ 和 write）的支持。异步套接字操作通过以下两个套接字通道类执行：\n\n*   `java.nio.channels.AsynchronousServerSocketChannel`\n\
  *   `java.nio.channels.AsynchronousSocketChannel`\n\n`AsynchronousServerSocketChannel`\
  \ 充当服务器套接字，监听新的传入客户端连接。一旦它接受一个新的客户端连接，客户端和服务器之间的交互由两端的 `AsynchronousSocketChannel`\
  \ 处理。异步套接字通道的设置与同步套接字非常相似。两者设置的主要区别在于，异步套接字操作的请求会立即返回，并在操作完成时通知请求者；而在同步套接字操作中，套接字操作的请求会阻塞，直到操作完成。由于异步套接字通道操作的异步特性，处理套接字操作完成或失败的代码会稍微复杂一些。\n\
  \n在异步套接字通道中，您可以使用异步套接字通道类的方法之一来请求操作。该方法会立即返回。您稍后会收到操作完成或失败的通知。允许您请求异步操作的方法被重载了。其中一个版本返回一个\
  \ `Future` 对象，让您可以检查请求操作的状态。有关使用 `Future` 对象的详细信息，请参阅《Beginning Java Language Features》（ISBN:\
  \ 978-1-4302-6658-7）一书的第 6 章。这些方法的另一个版本允许您传递一个 `CompletionHandler`。当请求的操作成功完成时，会调用\
  \ `CompletionHandler` 的 `completed()` 方法。当请求的操作失败时，会调用 `CompletionHandler` 的 `failed()`\
  \ 方法。以下代码片段演示了处理请求的异步套接字操作完成/失败的两种方法。它展示了服务器套接字通道如何异步接受客户端连接。\n\n```\n/* 使用 Future\
  \ 对象 */\n// 获取一个服务器套接字通道实例\nAsynchronousServerSocketChannel server = 获取一个服务器实例...;\n\
  // 将套接字绑定到主机和端口\nserver.bind(your_host, your_port);\n// 开始接受一个新的客户端连接。注意 accept()\n\
  // 方法通过返回一个 Future 对象来立即返回\nFuture result = server.accept();\n// 通过调用 Future 对象的\
  \ get() 方法等待新的客户端连接。\n// 或者，您可以使用其 isDone() 方法定期轮询 Future 对象\nAsynchronousSocketChannel\
  \ newClient = result.get();\n// 在此处处理 newClient，并再次调用 server.accept() 以\n// 接受另一个客户端连接\n\
  /* 使用 CompletionHandler 对象 */\n// 获取一个服务器套接字通道实例\nAsynchronousServerSocketChannel\
  \ server = 获取一个服务器实例...;\n// 将套接字绑定到主机和端口\nserver.bind(your_host, your_port);\n\
  // 开始接受一个新的客户端连接。accept() 方法立即返回。\n// 在请求的操作完成或失败时，将调用 ConnectionHandler 的\n// completed()\
  \ 或 failed() 方法\nYourAnyClass attach = ...; // 获取一个附件\nserver.accept(attach, new\
  \ ConnectionHandler());\n```\n\n此版本的 `accept()` 方法接受任何类的对象作为附件。它可以是 `null` 引用。该附件被传递给完成处理器的\
  \ `completed()` 和 `failed()` 方法，在本例中，完成处理器是 `ConnectionHandler` 的一个对象。`ConnectionHandler`\
  \ 类可能如下所示。\n\n```\nprivate static class ConnectionHandler\nimplements CompletionHandler\
  \ {\n@Override\npublic void completed(AsynchronousSocketChannel client, YourAnyClass\
  \ attach) {\n// 在此处处理新的客户端连接，并再次开始\n// 接受一个新的客户端连接\n}\n@Override\npublic void failed(Throwable\
  \ e, YourAnyClass attach) {\n// 在此处处理失败情况\n}\n}\n```\n\n在本节中，我将详细讨论以下三个步骤。在讨论过程中，我将构建一个包含回声服务器和客户端的应用程序。客户端将异步地向服务器发送消息，服务器将异步地将消息回显给客户端。假设您熟悉缓冲区和通道的使用。\n\
  \n*   设置异步服务器套接字通道\n*   设置异步客户端套接字通道\n*   让异步服务器和客户端套接字通道运行起来\n\n\n\n### 设置异步服务器套接字通道\n\
  \n`AsynchronousServerSocketChannel` 类的实例用作异步服务器套接字通道，用于监听新的客户端连接。一旦与客户端建立连接，就会使用\
  \ `AsynchronousSocketChannel` 类的实例与客户端通信。`AsynchronousServerSocketChannel` 类的静态\
  \ `open()` 方法会返回一个尚未绑定的 `AsynchronousServerSocketChannel` 类对象。\n\n```\n// 创建一个异步服务器套接字通道对象\n\
  AsynchronousServerSocketChannel server = AsynchronousServerSocketChannel.open();\n\
  // 将服务器绑定到本地主机和端口 8989\nString host = \"localhost\";\nint port = 8989;\nInetSocketAddress\
  \ sAddr = new InetSocketAddress(host, port);\nserver.bind(sAddr);\n```\n\n此时，可以通过调用服务器套接字通道的\
  \ `accept()` 方法来接受新的客户端连接，如下所示。代码使用了两个类：`Attachment` 和 `ConnectionHandler`，稍后会进行说明。\n\
  \n```\n// 准备附件\nAttachment attach = new Attachment();\nattach.server = server;\n\
  // 接受新连接\nserver.accept(attach, new ConnectionHandler());\n```\n\n通常，服务器应用程序会无限期运行。你可以通过在\
  \ `main()` 方法中让主线程等待，使服务器应用程序永远运行，如下所示：\n\n```\ntry {\n// 无限期等待，直到有人中断主线程\nThread.currentThread().join();\n\
  } catch (InterruptedException e) {\ne.printStackTrace();\n}\n```\n\n你将使用完成处理程序机制来处理服务器套接字通道的完成/失败通知。以下\
  \ `Attachment` 类的对象将用作完成处理程序的附件。附件对象用于传递服务器套接字的上下文，该上下文可能在完成处理程序的 `completed()`\
  \ 和 `failed()` 方法中使用。\n\n```\nclass Attachment {\nAsynchronousServerSocketChannel\
  \ server;\nAsynchronousSocketChannel client;\nByteBuffer buffer;\nSocketAddress\
  \ clientAddr;\nboolean isRead;\n}\n```\n\n你需要一个 `CompletionHandler` 实现来处理 `accept()`\
  \ 调用的完成。我们将你的类命名为 `ConnectionHandler`，如下所示：\n\n```\nprivate static class ConnectionHandler\n\
  implements CompletionHandler {\n@Override\npublic void completed(AsynchronousSocketChannel\
  \ client, Attachment attach) {\ntry {\n// 获取客户端地址\nSocketAddress clientAddr = client.getRemoteAddress();\n\
  System.out.format(\"接受来自 %s 的连接%n\", clientAddr);\n// 接受另一个连接\nattach.server.accept(attach,\
  \ this);\n// 通过调用异步读取来处理客户端连接\nAttachment newAttach = new Attachment();\nnewAttach.server\
  \ = attach.server;\nnewAttach.client = client;\nnewAttach.buffer = ByteBuffer.allocate(2048);\n\
  newAttach.isRead = true;\nnewAttach.clientAddr = clientAddr;\n// 创建一个新的完成处理程序，用于从新客户端读取和写入\n\
  ReadWriteHandler readWriteHandler = new ReadWriteHandler();\n// 从客户端读取\nclient.read(newAttach.buffer,\
  \ newAttach, readWriteHandler);\n}\ncatch (IOException e) {\ne.printStackTrace();\n\
  }\n}\n@Override\npublic void failed(Throwable e, Attachment attach) {\nSystem.out.println(\"\
  接受连接失败。\");\ne.printStackTrace();\n}\n}\n```\n\n`ConnectionHandler` 类很简单。在其 `failed()`\
  \ 方法中，它打印异常堆栈跟踪。在其 `completed()` 方法中，它打印一条消息，表明已建立新的客户端连接，并通过再次调用服务器套接字上的 `accept()`\
  \ 方法开始监听另一个新的客户端连接。请注意，在 `completed()` 方法内部的另一个 `accept()` 方法调用中复用了附件。它再次使用了同一个\
  \ `CompletionHandler` 对象。请注意，`attach.server.accept(attach, this)` 方法调用使用了关键字 `this`\
  \ 来引用完成处理程序的同一个实例。最后，它准备了一个新的 `Attachment` 类实例，该实例封装了处理（读取和写入）新客户端连接的详细信息，并调用客户端套接字上的\
  \ `read()` 方法来从客户端读取数据。请注意，`read()` 方法使用了另一个完成处理程序，它是 `ReadWriteHandler` 类的一个实例。`ReadWriteHandler`\
  \ 的代码如下：\n\n```\nprivate static class ReadWriteHandler implements CompletionHandler\
  \ {\n@Override\npublic void completed(Integer result, Attachment attach) {\nif (result\
  \ == -1) {\ntry {\nattach.client.close();\nSystem.out.format(\"停止监听客户端 %s%n\", attach.clientAddr);\n\
  } catch (IOException ex) {\nex.printStackTrace();\n}\nreturn;\n}\nif (attach.isRead)\
  \ {\n// 已完成对客户端的读取\n// 准备缓冲区以便从中读取\nattach.buffer.flip();\nint limits = attach.buffer.limit();\n\
  byte bytes[] = new byte[limits];\nattach.buffer.get(bytes, 0, limits);\nCharset\
  \ cs = Charset.forName(\"UTF-8\");\nString msg = new String(bytes, cs);\n// 打印来自客户端的消息\n\
  System.out.format(\"客户端 %s 说：%s%n\", attach.clientAddr, msg);\n// 让我们将相同的消息回显给客户端\n\
  attach.isRead = false; // 这是一个写入操作\n// 准备缓冲区以便再次读取\nattach.buffer.rewind();\n//\
  \ 再次写入客户端\nattach.client.write(attach.buffer, attach, this);\n} else {\n// 已完成对客户端的写入。执行另一次从客户端的读取。\n\
  attach.isRead = true;\n// 准备缓冲区以便填充数据\nattach.buffer.clear();\n// 执行从客户端的读取\nattach.client.read(attach.buffer,\
  \ attach, this);\n}\n}\n@Override\npublic void failed(Throwable e, Attachment attach)\
  \ {\ne.printStackTrace();\n}\n}\n```\n\n`completed()` 方法的第一个参数 `result` 是从客户端读取或写入客户端的字节数。其值为\
  \ -1 表示流结束，在这种情况下，客户端套接字将被关闭。如果读取操作完成，它会在标准输出上显示读取的文本，并将相同的文本写回客户端。如果对客户端的写入操作完成，它会对同一客户端执行读取操作。\n\
  \n清单 4-16 包含了异步服务器套接字通道的完整代码。它使用了三个内部类：一个用于附件，一个用于连接完成处理程序，一个用于读/写完成处理程序。现在可以运行\
  \ `AsyncEchoServerSocket` 类。但是，它不会执行任何工作，因为它需要一个客户端连接到它，以便回显从客户端发送的消息。你将在下一节中开发异步客户端套接字通道，然后在后续章节中，你将一起测试服务器和客户端套接字通道。\n\
  \n\n```markdown\n\n```\n// AsyncEchoServerSocket.java\npackage com.jdojo.net;\n\
