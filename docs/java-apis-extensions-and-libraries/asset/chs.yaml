  \n注意：在此语法中，`@`用作创建存储过程的语句终止符。\n\n\n\n#### Derby 数据库\n\nDerby 允许你使用 Java 编程语言编写存储过程。在\
  \ Derby 中，你可以将类的静态方法用作存储过程。要获取执行存储过程的数据库连接引用，需要将 `jdbc:default:connection` 作为连接\
  \ URL 传递给 `DriverManager`。清单 5-11 包含了 `JavaDBGiveRaiseSp` 类的代码，其 `giveRaise()` 静态方法将用作存储过程。在将此方法用作存储过程之前，你需要完成一些设置工作，具体如下所述。现在，只需编译该类并将其包含在模块路径中即可。\n\
