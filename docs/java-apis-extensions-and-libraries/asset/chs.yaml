- "# 1. Swing 简介\n\n在本章中，你将学习：\n\n*   什么是 Swing\n*   基于字符的界面与图形用户界面的区别\n*   如何开发最简单的\
  \ Swing 程序\n*   什么是 `JFrame`，以及它如何由不同组件构成\n*   如何向 JFrame 添加组件\n*   什么是布局管理器，以及\
  \ Swing 中不同类型的布局管理器\n*   如何创建可复用的框架\n*   如何处理事件\n*   如何处理鼠标事件，以及如何使用适配器类处理鼠标事件\n\
  \n本章中的所有示例程序都属于 `jdojo.swing.intro` 模块，如代码清单 1-1 所示。\n\n```\n// module-info.java\n\
  module jdojo.swing.intro {\nrequires java.desktop;\nexports com.jdojo.swing.intro;\n\
  }\n代码清单 1-1.\njdojo.swing.intro 模块的声明\n```\n\nSwing 和 AWT API 定义在 `java.desktop`\
  \ 模块中。使用 Swing 的模块需要像 `jdojo.swing.intro` 模块那样读取 `java.desktop` 模块。\n\n## 什么是 Swing？\n\
  \nSwing 提供了图形用户界面（GUI）组件，用于开发具有丰富图形集（如窗口、文本字段、按钮、复选框等）的 Java 应用程序。什么是 GUI？在定义 GUI\
  \ 之前，我先定义一下用户界面（UI）。一个程序做三件事：\n\n*   接收用户的输入\n*   处理输入\n*   产生输出\n\n用户界面提供了一种在用户与程序之间交换信息的方式，涉及输入和输出。换句话说，用户界面定义了用户与程序之间交互的方式。使用键盘输入文本、用鼠标选择菜单项或点击按钮都可以为程序提供输入。程序的输出可以以基于字符的文本、图表（如条形图）、图片等形式显示在计算机显示器上。\n\
  \n你已经编写过许多 Java 程序。你见过这样的程序：用户必须以控制台输入文本的形式向程序提供输入，然后程序将输出打印到控制台。用户的输入和程序的输出都是文本形式的用户界面称为**基于字符的用户界面**。GUI\
  \ 允许用户使用称为控件或小部件的图形元素，通过键盘、鼠标和其他设备与程序进行交互。\n\n图 1-1 展示了一个程序，它允许用户输入姓名和出生日期（DOB），并通过键盘保存信息。这是一个基于字符的用户界面的例子。\n\
  \n![A323071_2_En_1_Fig1_HTML.jpg](img/A323071_2_En_1_Fig1_HTML.jpg)\n\n图 1-1.\n\n\
  一个基于字符的用户界面的程序示例\n\n图 1-2 允许用户执行相同的操作，但使用的是图形用户界面。它在一个窗口中显示了六个图形元素。它使用了两个标签（`Name:`\
  \ 和 `DOB:`）、两个用户将输入 `Name` 和 `DOB` 值的文本字段，以及两个按钮（Save 和 Close）。与基于字符的用户界面相比，图形用户界面使用户与程序的交互更加容易。你能猜出本章将要开发什么样的应用程序吗？它将全部关于\
  \ GUI。GUI 开发很有趣，但比基于字符的程序开发稍微复杂一些。一旦你理解了 GUI 开发中涉及的元素，使用它就会变得很有趣。\n\n![A323071_2_En_1_Fig2_HTML.jpg](img/A323071_2_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2.\n\n一个图形用户界面的程序示例\n\n本章试图涵盖使用 Swing 组件和顶层容器进行 GUI 开发的基础知识。对于那些之前可能没有使用过任何编程语言/工具开发\
  \ GUI 的程序员，我们已尽力解释与 GUI 相关的细节。如果你已经使用过 GUI 开发语言/工具，那么理解本章涵盖的内容会更容易。Swing 是一个庞大的主题，不可能涵盖其所有细节。它本身就值得用一本书来讲述。事实上，市面上有几本书专门介绍\
  \ Swing。\n\n容器是一种可以容纳其他组件的组件。最高层的容器称为**顶层容器**。`JFrame`、`JDialog`、`JWindow` 和 `JApplet`\
  \ 是顶层容器的例子。`JPanel` 是一个简单容器的例子。`JButton`、`JTextField` 等是组件的例子。在 Swing 应用程序中，每个组件都必须包含在一个容器内。该容器被称为组件的**父容器**，而该组件被称为容器的**子组件**。这种父子关系（或容器-被包含关系）称为**包含层次结构**。要在屏幕上显示一个组件，顶层容器必须位于包含层次结构的根节点。每个\
  \ Swing 应用程序必须至少有一个顶层容器。图 1-3 展示了一个 Swing 应用程序的包含层次结构。一个顶层容器包含一个名为“容器 1”的容器，该容器又包含一个名为“组件\
  \ 1”的组件和一个名为“容器 2”的容器，而“容器 2”又包含两个名为“组件 2”和“组件 3”的组件。\n\n![A323071_2_En_1_Fig3_HTML.jpg](img/A323071_2_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3.\n\nSwing 应用程序中的包含层次结构\n\n\n\n## 最简单的 Swing 程序\n\n让我们从最简单的 Swing 程序开始。你将显示一个\
  \ `JFrame`，它是一个不包含任何组件的顶级容器。要创建并显示一个 `JFrame`，你需要执行以下操作：\n\n*   创建一个 `JFrame` 对象。\n\
  *   使其可见。\n\n`JFrame` 类的其中一个构造方法接受一个 `String` 参数，该参数是 `JFrame` 的标题。代表 Swing 组件的类位于\
  \ `javax.swing` 包中，`JFrame` 类也是如此。以下代码片段创建了一个 `JFrame` 对象，并将其标题设置为 `Simplest Swing`：\n\
  \n```\n// 创建一个 JFrame 对象\nJFrame frame = new JFrame(\"Simplest Swing\");\n```\n\n\
  当你创建一个 `JFrame` 对象时，默认情况下它是不可见的。你需要调用它的 `setVisible` `(boolean visible)` 方法使其可见。如果你向此方法传递\
  \ `true`，则 `JFrame` 变为可见；如果传递 `false`，则变为不可见。\n\n```\n// 使 JFrame 在屏幕上可见\nframe.setVisible(true);\n\
  ```\n\n这就是开发你的第一个 Swing 应用程序所需做的全部工作！实际上，你可以将创建和显示 `JFrame` 这两个语句合并为一个语句，如下所示：\n\
  \n```\nnew JFrame(\"Simplest Swing\").setVisible(true);\n```\n\n从 `main` 线程创建 `JFrame`\
  \ 并使其可见并不是启动 Swing 应用程序的正确方式。不过，在你将在此处使用的简单程序中，这不会造成任何损害，因此我将继续使用这种方法，以保持代码简单易学，这样你就可以专注于正在学习的主题。此外，还需要理解\
  \ Swing 中的事件处理和线程机制，才能明白为什么需要以另一种方式启动 Swing 应用程序。第 3 章将详细解释如何启动 Swing 应用程序。创建和显示\
  \ `JFrame` 的正确方式是将 GUI 创建和使其可见的代码包装在一个 `Runnable` 中，然后将该 `Runnable` 传递给 `javax.swing.SwingUtilities`\
  \ 或 `java.awt.EventQueue` 类的 `invokeLater()` 方法，如下所示：\n\n```\nimport javax.swing.JFrame;\n\
  import javax.swing.SwingUtilities;\n...\nSwingUtilities.invokeLater(() -> new JFrame(\"\
  Test\").setVisible(true));\n```\n\n清单 1-2 包含了创建和显示 `JFrame` 的完整代码。当你运行此程序时，它会在屏幕的左上角显示一个\
  \ `JFrame`，如图 1-4 所示。该图显示了在 Windows 10 上运行程序时的框架。在其他平台上，框架的外观可能略有不同。本章中大多数 GUI 的截图都是在\
  \ Windows 10 上截取的。\n\n![A323071_2_En_1_Fig4_HTML.jpg](img/A323071_2_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4.\n\n最简单的 Swing 框架\n\n```\n// SimplestSwing.java\npackage com.jdojo.swing.intro;\n\
  import javax.swing.JFrame;\npublic class SimplestSwing {\npublic static void main(String[]\
  \ args) {\n// 创建一个框架\nJFrame frame = new JFrame(\"Simplest Swing\");\n// 显示框架\n\
  frame.setVisible(true);\n}\n}\n清单 1-2.\n最简单的 Swing 程序\n```\n\n这并不令人印象深刻，对吧？不要灰心。随着你对\
  \ Swing 的进一步了解，你将改进这个程序。这只是向你展示 Swing 所提供的冰山一角。\n\n你可以调整图 1-4 中所示的 `JFrame` 的大小，使其变大。将鼠标指针放在显示的\
  \ `JFrame` 的四个边缘（左、上、右或下）或四个角中的任何一个上。当鼠标指针放在 `JFrame` 的边缘上时，它会变成调整大小的指针（两端带有箭头的线条）。然后只需拖动调整大小的鼠标指针，即可按你想要的方向调整\
  \ `JFrame` 的大小。\n\n图 1-5 显示了调整大小后的 `JFrame`。请注意，你在创建 `JFrame` 时传递给构造方法的文本“Simplest\
  \ Swing”会显示在 `JFrame` 的标题栏中。\n\n![A323071_2_En_1_Fig5_HTML.jpg](img/A323071_2_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5.\n\n调整大小后的最简单 Swing 框架\n\n如何退出 Swing 应用程序？当你运行清单 1-2 中列出的程序时，如何退出？当你单击标题栏中的关闭按钮（标题栏最右边带有\
  \ X 的按钮）时，`JFrame` 会被关闭。但是，程序不会退出。如果你从命令提示符运行此程序，当你关闭 `JFrame` 时，提示符不会返回。你将不得不强制退出程序，例如，如果你在\
  \ Windows 上从命令提示符运行它，可以按 Ctrl+C。那么，如何退出 Swing 应用程序呢？你可以定义 `JFrame` 的四种行为之一，以确定关闭\
  \ `JFrame` 时会发生什么。它们在 `javax.swing.WindowConstants` 接口中定义为四个常量。`JFrame` 类实现了 `WindowConstants`\
  \ 接口。你可以使用 `JFrame.CONSTANT_NAME` 语法（或使用 `WindowConstants.CONSTANT_NAME` 语法）来引用所有这些常量。这四个常量如下：\n\
  \n*   `DO_NOTHING_ON_CLOSE`\n*   `HIDE_ON_CLOSE`\n*   `DISPOSE_ON_CLOSE`\n*   `EXIT_ON_CLOSE`\n\
  \n`DO_NOTHING_ON_CLOSE` 选项在用户关闭 `JFrame` 时不执行任何操作。如果你为 `JFrame` 设置了此选项，则必须提供其他退出应用程序的方式，例如在\
  \ `JFrame` 中添加一个“退出”按钮或“退出”菜单选项。\n\n`HIDE_ON_CLOSE` 选项在用户关闭 `JFrame` 时仅将其隐藏。这是默认行为。这就是当你单击标题栏中的关闭按钮以关闭清单\
  \ 1-2 中列出的程序时发生的情况。`JFrame` 只是变得不可见，而程序仍在运行。\n\n`DISPOSE_ON_CLOSE` 选项在用户关闭 `JFrame`\
  \ 时将其隐藏并释放。释放 `JFrame` 会释放其使用的所有操作系统级资源。请注意 `HIDE_ON_CLOSE` 和 `DISPOSE_ON_CLOSE`\
  \ 之间的区别。当你使用 `HIDE_ON_CLOSE` 选项时，`JFrame` 只是被隐藏，但它仍然在使用所有操作系统资源。如果你的 `JFrame` 被频繁地隐藏和显示，你可能希望使用此选项。但是，如果你的\
  \ `JFrame` 消耗大量资源，你可能希望使用 `DISPOSE_ON_CLOSE` 选项，这样在 `JFrame` 不显示时，资源可以被释放并重用。\n\n\
  `EXIT_ON_CLOSE` 选项会退出应用程序。设置此选项后，当 `JFrame` 关闭时，其效果就如同调用了 `System.exit()` 一样。应谨慎使用此选项。此选项将退出应用程序。如果屏幕上显示了多个\
  \ `JFrame` 或任何其他类型的窗口，为一个 `JFrame` 使用此选项将关闭所有其他窗口。请谨慎使用此选项，因为应用程序退出时可能会丢失任何未保存的数据。\n\
  \n你可以通过将四个常量之一传递给 `JFrame` 的 `setDefaultCloseOperation()` 方法来设置其默认关闭行为，如下所示：\n\n\
  ```\n// 当 JFrame 关闭时退出应用程序\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  ```\n\n\n\n你用第一个示例解决了一个问题。另一个问题是，`JFrame` 显示时没有可视区域，只显示了标题栏。你需要在 `JFrame` 可见之前或之后设置其大小和位置。框架的大小由其宽度和高度（以像素为单位）定义，你可以使用\
  \ `setSize(int width, int height)` 方法进行设置。位置由 `JFrame` 左上角相对于屏幕左上角的 (x, y) 像素坐标定义。默认情况下，其位置设置为\
  \ (0, 0)，这就是 `JFrame` 显示在屏幕左上角的原因。你可以使用 `setLocation(int x, int y)` 方法设置 `JFrame`\
  \ 的 (x, y) 坐标。如果想一步设置其大小和位置，请改用 `setBounds(int x, int y, int width, int height)`\
  \ 方法。清单 1-3 在最简单的 Swing 程序中修复了这两个问题。\n\n```\n// RevisedSimplestSwing.java\npackage\
  \ com.jdojo.swing.intro;\nimport javax.swing.JFrame;\npublic class RevisedSimplestSwing\
  \ {\npublic static void main(String[] args) {\n// 创建一个框架\nJFrame frame = new JFrame(\"\
  Revised Simplest Swing\");\n// 设置默认关闭行为为退出应用程序\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  // 一次性设置 x、y、宽度和高度属性\nframe.setBounds(50, 50, 200, 200);\n// 显示框架\nframe.setVisible(true);\n\
  }\n}\n清单 1-3.\n修订版最简单的 Swing 程序\n```\n\n提示\n\n你可以通过调用 `setLocationRelativeTo(Component\
  \ c)` 方法并传入 `null` 参数，将 `JFrame` 居中定位。\n\n## JFrame 的组件\n\n你在上一节中显示了一个 `JFrame`。它看起来是空的，但实际上并非如此。当你创建一个\
  \ `JFrame` 时，会自动为你完成以下操作：\n\n*   一个称为根窗格的容器被添加为 `JFrame` 的唯一子组件。根窗格是一个容器，它是 `JRootPane`\
  \ 类的对象。你可以通过 `JFrame` 类的 `getRootPane()` 方法获取根窗格的引用。\n*   两个称为玻璃窗格和分层窗格的容器被添加到根窗格中。默认情况下，玻璃窗格是隐藏的，并且位于分层窗格之上。顾名思义，玻璃窗格是透明的，即使你让它可见，也能看穿它。你可以使用玻璃窗格来阻止所有鼠标事件到达其下方层中的其他组件。你还可以使用玻璃窗格向用户显示消息，并淡出窗格后面的内容。通常，你不会使用玻璃窗格。分层窗格之所以如此命名，是因为它可以在其不同层中容纳其他容器或组件。可选地，分层窗格可以容纳一个菜单栏。但是，当你创建\
  \ `JFrame` 时，默认不会添加菜单栏。你可以分别使用 `JFrame` 类的 `getGlassPane()` 和 `getLayeredPane()`\
  \ 方法获取玻璃窗格和分层窗格的引用。\n*   一个称为内容窗格的容器被添加到分层窗格中。默认情况下，内容窗格是空的。这是你应该添加所有 Swing 组件（如按钮、文本字段、标签等）的容器。大多数时候，你将使用\
  \ `JFrame` 的内容窗格。你可以通过 `JFrame` 类的 `getContentPane()` 方法获取内容窗格的引用。\n\n图 1-6 展示了\
  \ `JFrame` 的组装结构。根窗格、分层窗格和玻璃窗格覆盖了 `JFrame` 的整个可视区域。`JFrame` 的可视区域是其大小减去四个方向的内边距。容器的内边距包括容器四周边框所占用的空间：上、左、下、右。对于\
  \ `JFrame`，上内边距表示标题栏的高度。为了更好地可视化，图 1-6 将分层窗格描绘得比根窗格小。\n\n![A323071_2_En_1_Fig6_HTML.gif](img/A323071_2_En_1_Fig6_HTML.gif)\n\
  \n图 1-6.\n\nJFrame 的构成\n\n你感到困惑了吗？如果你对 `JFrame` 的所有窗格感到困惑，这里有一个更简单的解释。把 `JFrame`\
  \ 想象成一个相框。相框有一个玻璃罩，`JFrame` 也有，形式就是玻璃窗格。在玻璃罩后面，你放置你的照片。那就是你的分层窗格。你可以在一个相框内放置多张照片。每张照片构成玻璃罩后面的一层。只要一张照片没有被另一张完全覆盖，你就可以看到它的全部或部分。所有不同层的照片一起构成了你相框的分层窗格。离玻璃罩最远的照片层就是你的内容窗格。通常你的相框里只放一张照片。分层窗格也是如此；默认情况下，它包含一个内容窗格。相框中的照片是感兴趣的内容，画作就放在那里。内容窗格也是如此；所有组件都放在内容窗格中。\n\
  \n`JFrame` 的包含层次结构如下所示。`JFrame` 位于层次结构的顶部，而菜单栏（默认不添加；此处为完整性而显示）和内容窗格位于包含层次结构的底部。\n\
  \n```\nJFrame\n根窗格\n玻璃窗格\n分层窗格\n菜单栏\n内容窗格\n```\n\n如果你仍然无法理解 `JFrame` 的所有“窗格”（读作\
  \ panes），可以稍后再回顾本节。现在，你只需要理解 `JFrame` 的一个窗格，那就是内容窗格，它容纳了 `JFrame` 的 Swing 组件。你应该将所有想要添加到\
  \ `JFrame` 的组件都添加到其内容窗格中。你可以按如下方式获取内容窗格的引用：\n\n```\n// 创建一个 JFrame\nJFrame frame\
  \ = new JFrame(\"Test\");\n// 获取内容窗格的引用\nContainer contentPane = frame.getContentPane();\n\
  ```\n\n\n\n## 向 JFrame 添加组件\n\n本节将解释如何向 `JFrame` 的内容面板添加组件。使用容器的 `add()` 方法（注意内容面板本身也是一个容器）即可将组件添加到容器中。\n\
  \n```\n// 将 aComponent 添加到 aContainer\naContainer.add(aComponent);\n```\n\n`add()`\
  \ 方法已被重载。除了被添加的组件外，该方法的参数还取决于其他因素，例如你希望组件在容器中如何布局。下一节将讨论 `add()` 方法的所有版本。\n\n我在此将讨论范围限定为向\
  \ `JFrame` 添加一个按钮（Swing 组件）。`JButton` 类的对象代表一个按钮。如果你使用过 Windows，一定用过消息框上的“确定”按钮以及互联网浏览器窗口上的“后退”和“前进”按钮。通常，`JButton`\
  \ 包含文本，该文本也称为其标签或文本。创建 `JButton` 的方法如下：\n\n```\n// 创建一个带有“Close”文本的 JButton\nJButton\
  \ closeButton = new JButton(\"Close\");\n```\n\n要将 `closeButton` 添加到 `JFrame` 的内容面板，你需要获取\
  \ `JFrame` 内容面板的引用，并调用其 `add()` 方法：\n\n```\n// 获取 JFrame 内容面板的引用 Container contentPane\
  \ = frame.getContentPane();\n// 调用内容面板的 add() 方法 contentPane.add(closeButton);\n\
  ```\n\n这就是向内容面板添加组件所需的全部操作。如果你想用一行代码添加 `JButton`，可以将所有三个语句合并为一个，如下所示：\n\n```\nframe.getContentPane().add(new\
  \ JButton(\"Close\"));\n```\n\n向 `JFrame` 添加组件的代码如清单 1-4 所示。运行程序时，你会得到一个 `JFrame`，如图\
  \ 1-7 所示。点击“Close”按钮时不会发生任何操作，因为你尚未为其添加任何动作。\n\n![A323071_2_En_1_Fig7_HTML.jpg](img/A323071_2_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7.\n\n一个带有文本为“Close”的 JButton 的 JFrame\n\n```\n// AddingComponentToJFrame.java\n\
  package com.jdojo.swing.intro;\nimport javax.swing.JFrame;\nimport javax.swing.JButton;\n\
  import java.awt.Container;\npublic class AddingComponentToJFrame {\npublic static\
  \ void main(String[] args) {\nJFrame frame = new JFrame(\"Adding Components to JFrame\"\
  );\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer contentPane\
  \ = frame.getContentPane();\n// 添加一个 Close 按钮\nJButton closeButton = new JButton(\"\
  Close\");\ncontentPane.add(closeButton);\n// 设置框架大小为 300 x 200\nframe.setBounds(50,\
  \ 50, 300, 200);\nframe.setVisible(true);\n}\n}\n清单 1-4.\n向 JFrame 添加组件\n```\n\n\
  这段代码完成了将带有 `Close` 文本的 `JButton` 添加到 `JFrame` 的任务。然而，`JButton` 看起来非常大，并且填满了 `JFrame`\
  \ 的整个可视区域。请注意，你已使用 `setBounds()` 方法将 `JFrame` 的大小设置为宽 300 像素、高 200 像素。既然 `JButton`\
  \ 填满了整个 `JFrame`，你能把 `JFrame` 的尺寸设小一点吗？或者，你能为 `JButton` 本身设置大小吗？这两种建议在这种情况下都行不通。如果你想缩小\
  \ `JFrame`，你需要猜测需要缩小多少。如果你想为 `JButton` 设置大小，那将会彻底失败；`JButton` 始终会填满 `JFrame` 的整个可视区域。这是怎么回事？要完全理解发生了什么，你需要阅读下一节关于布局管理器的内容。\n\
  \nSwing 为解决 `JFrame` 和 `JButton` 尺寸计算问题提供了一种神奇而快速的解决方案。`JFrame` 类的 `pack()` 方法就是那个神奇的解决方案。该方法会遍历你添加到\
  \ `JFrame` 的所有组件，确定它们的首选大小，并将 `JFrame` 的大小设置为刚好能显示所有组件。当你调用此方法时，无需再设置 `JFrame` 的大小。`pack()`\
  \ 方法会为你计算并设置 `JFrame` 的大小。要解决尺寸问题，请移除对 `setBounds()` 方法的调用，改为调用 `pack()` 方法。请注意，`setBounds()`\
  \ 方法之前也在设置 `JFrame` 的 (x, y) 坐标。如果你仍想将 `JFrame` 的 (x, y) 坐标设置为 (50, 50)，可以使用其 `setLocation(50,\
  \ 50)` 方法。清单 1-5 包含了修改后的代码，图 1-8 显示了生成的 `JFrame`。\n\n![A323071_2_En_1_Fig8_HTML.jpg](img/A323071_2_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8.\n\n经过打包的带有 JButton 的 JFrame\n\n```\n// PackedJFrame.java\npackage com.jdojo.swing.intro;\n\
  import javax.swing.JFrame;\nimport java.awt.Container;\nimport javax.swing.JButton;\n\
  public class PackedJFrame {\npublic static void main(String[] args) {\nJFrame frame\
  \ = new JFrame(\"Adding Components to JFrame\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  // 添加一个关闭按钮\nJButton closeButton = new JButton(\"Close\");\nContainer contentPane\
  \ = frame.getContentPane();\ncontentPane.add(closeButton);\n// 计算并设置框架的合适大小\nframe.pack();\n\
  frame.setVisible(true);\n}\n}\n清单 1-5.\n打包 JFrame 的所有组件\n\n到目前为止，你已经成功地向 `JFrame`\
  \ 添加了一个 `JButton`。现在让我们向同一个 `JFrame` 添加另一个 `JButton`。将新按钮命名为 `helpButton`。代码将与清单\
  \ 1-5 类似，只是这次你将添加两个 `JButton` 实例。清单 1-6 包含了完整的程序。图 1-9 显示了运行程序时的结果。\n\n![A323071_2_En_1_Fig9_HTML.jpg](img/A323071_2_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9.\n\n一个带有两个按钮（Close 和 Help）的 JFrame。只有 Help 按钮可见。\n\n```\n// JFrameWithTwoJButtons.java\n\
  package com.jdojo.swing.intro;\nimport javax.swing.JFrame;\nimport java.awt.Container;\n\
  import javax.swing.JButton;\npublic class JFrameWithTwoJButtons {\npublic static\
  \ void main(String[] args) {\nJFrame frame = new JFrame(\"Adding Components to JFrame\"\
  );\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n// 添加两个按钮 - Close 和 Help\n\
  JButton closeButton = new JButton(\"Close\");\nJButton helpButton = new JButton(\"\
  Help\");\nContainer contentPane = frame.getContentPane();\ncontentPane.add(closeButton);\n\
  contentPane.add(helpButton);\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-6.\n\
  向 JFrame 添加两个按钮\n```\n\n当你添加了 Help 按钮后，Close 按钮不见了。这是否意味着你只能向 `JFrame` 添加一个按钮？答案是否定的。你可以向\
  \ `JFrame` 添加任意数量的按钮。那么，你的 Close 按钮去哪了？在我回答这个问题之前，你需要了解内容面板的布局机制。\n\n内容面板是一个容器。你可以向其中添加组件。然而，它会将内部所有组件的布局任务交给一个称为布局管理器的对象。布局管理器就是一个\
  \ Java 对象，其唯一职责是确定容器内组件的位置和大小。清单 1-6 中的示例是经过精心挑选的，旨在向你介绍布局管理器的概念。存在多种类型的布局管理器。它们在容器内定位和调整组件大小的方式上有所不同。\n\
  \n\n\n默认情况下，`JFrame` 的内容面板使用名为 `BorderLayout` 的布局管理器。在前一个示例中，由于 `BorderLayout` 布局组件的方式，只显示了“帮助”按钮。实际上，当你添加两个按钮时，内容面板接收了这两个按钮。为了确认这两个按钮仍在内容面板中，请在清单\
  \ 1-6 的 `main()` 方法末尾添加以下代码片段，该代码会显示内容面板中的组件数量。它将在标准输出上打印一条消息：`\"Content Pane has\
  \ 2 components.\"`。每个容器都有一个 `getComponents()` 方法，该方法返回添加到其中的组件数组。\n\n```\n// 获取添加到内容面板的组件\n\
  Component[] comps = contentPane.getComponents();\n// 显示内容面板有多少个组件\nSystem.out.println(\"\
  Content Pane has \" + comps.length + \" components.\");\n```\n\n有了这些背景知识，是时候学习各种布局管理器了。当我在后面的章节讨论\
  \ `BorderLayout` 管理器时，你将解开“关闭”按钮消失之谜。但在讨论各种布局管理器之前，我将向你介绍一些在使用 Swing 应用程序时经常用到的实用类。\n\
  \n提示\n\n一个组件一次只能添加到一个容器中。如果你将同一个组件添加到另一个容器，该组件会从第一个容器中移除，然后添加到第二个容器中。\n\n## 一些实用类\n\
  \n在开始开发一些复杂的 Swing GUI 之前，有必要提一下一些常用的实用类。它们都是简单的类。大多数类都有一些可以在其构造函数中指定的属性，并且这些属性都有\
  \ getter 和 setter 方法。这些类位于 `java.awt` 包中。\n\n### Point 类\n\n顾名思义，`Point` 类的对象表示二维空间中的一个位置。二维空间中的位置由两个值表示：x\
  \ 坐标和 y 坐标。以下代码片段演示了它的用法：\n\n```\n// 创建一个 Point 类的对象，其 (x, y) 坐标为 (20, 40)\nPoint\
  \ p = new Point(20, 40);\n// 获取 p 的 x 和 y 坐标\nint x = p.getX();\nint y = p.getY();\n\
  // 将 p 的 x 和 y 坐标设置为 (10, 60)\np.setLocation(10, 60);\n```\n\n在 Swing 中，`Point`\
  \ 类的主要用途是设置和获取组件的位置（x 和 y 坐标）。例如，你可以设置 `JButton` 的位置。\n\n```\nJButton closeButton\
  \ = new JButton(\"关闭\");\n// 以下两条语句效果相同。\n// 你将使用其中一条语句，而不是同时使用两条。\ncloseButton.setLocation(10,\
  \ 15);\ncloseButton.setLocation(new Point(10, 15));\n// 获取 closeButton 的位置\nPoint\
  \ p = closeButton.getLocation();\n```\n\n### Dimension 类\n\n`Dimension` 类的对象封装了组件的\
  \ `width` 和 `height`。组件的 `width` 和 `height` 统称为其大小。换句话说，`Dimension` 类的对象用于表示组件的大小。\n\
  \n```\n// 创建一个 Dimension 类的对象，宽度为 200，高度为 20\nDimension d  = new Dimension(200,\
  \ 20);\n// 将 closeButton 的大小设置为 200 X 20。两条语句效果相同。\n// 你将使用以下两条语句中的一条。\ncloseButton.setSize(200,\
  \ 20);\ncloseButton.setsize(d);\n// 获取 closeButton 的大小\nDimension d2 = closeButton.getSize();\n\
  int width = d2.width;\nint height = d2.height;\n```\n\n### Insets 类\n\n`Insets`\
  \ 类的对象表示容器周围留出的空间。它封装了四个属性，分别名为 `top`、`left`、`bottom` 和 `right`。它们的值表示容器四个边上留出的空间。\n\
  \n```\n// 使用构造函数 Insets(top, left, bottom, right) 创建一个 Insets 类的对象\nInsets ins =\
  \ new Insets(20, 5, 5, 5);\n// 获取 JFrame 的 insets\nInsets ins = frame.getInsets();\n\
  int top = ins.top;\nint left = ins.left;\nint bottom = ins.bottom;\nint right =\
  \ ins.right;\n```\n\n### Rectangle 类\n\n顾名思义，`Rectangle` 类的实例表示一个矩形。你可以通过多种方式定义一个矩形。一个\
  \ `Rectangle` 由三个属性定义：\n\n*   左上角的 (x, y) 坐标\n*   宽度\n*   高度\n\n你可以将 `Rectangle`\
  \ 对象视为 `Point` 对象和 `Dimension` 对象的组合；`Point` 对象保存左上角的 (x, y) 坐标，`Dimension` 对象保存宽度和高度。你可以通过指定其属性的不同组合来创建\
  \ `Rectangle` 类的对象。\n\n```\n// 创建一个 Rectangle 对象，其左上角位于 (0, 0)，宽度和高度为零\nRectangle\
  \ r1 = new Rectangle();\n// 从一个 Point 对象创建一个 Rectangle 对象，宽度和高度为零\nRectangle r2\
  \ = new Rectangle(new Point(10, 10));\n// 从一个 Point 对象和一个 Dimension 对象创建一个 Rectangle\
  \ 对象\nRectangle r3 = new Rectangle(new Point(10, 10), new Dimension(200, 100));\n\
  // 创建一个 Rectangle 对象，指定其左上角坐标为 (10, 10)，宽度为 200，高度为 100\nRectangle r4 = new Rectangle(10,\
  \ 10, 200, 100);\n```\n\n`Rectangle` 类定义了许多方法来操作 `Rectangle` 对象并查询其属性，例如其左上角的 (x,\
  \ y) 坐标、宽度和高度。\n\n`Rectangle` 类的对象定义了 Swing 组件的位置和大小。组件的位置和大小称为组件的边界。可以使用 `setBounds()`\
  \ 和 `getBounds()` 这两个方法来设置和获取任何组件或容器的边界。`setBounds()` 方法已被重载，你可以指定组件的 x、y、width\
  \ 和 height 属性，或者一个 `Rectangle` 对象。`getBounds()` 方法返回一个 `Rectangle` 对象。在清单 1-3 中，你使用了\
  \ `setBounds()` 方法来设置框架的 x、y、width 和 height。请注意，组件的“边界”是其位置和大小的组合。`setLocation()`\
  \ 和 `setSize()` 方法的组合可以达到与 `setBounds()` 方法相同的效果。类似地，你可以使用 `getLocation()`（或 `getX()`\
  \ 和 `getY()`）与 `getSize()`（或 `getWidth()` 和 `getHeight()`）的组合，而不是使用 `getBounds()`\
  \ 方法。\n\n\n\n## 布局管理器\n\n容器使用布局管理器来计算其所有组件的位置和大小。换句话说，布局管理器的工作是计算容器中所有组件的四个属性（x、y、宽度和高度）。x\
  \ 和 y 属性决定了组件在容器内的位置。宽度和高度属性决定了组件的大小。你可能会问：“为什么需要一个布局管理器来完成计算组件四个属性这么简单的任务？难道不能直接在程序中指定这四个属性，让容器用它们来显示组件吗？”答案是肯定的。你可以在程序中指定这些属性。但如果这样做，当容器调整大小时，你的组件将不会重新定位和调整大小。此外，你必须为应用程序运行的所有平台指定组件的大小，因为不同平台渲染组件的方式略有不同。假设你的应用程序以多种语言显示文本。一个\
  \ `JButton`（例如“关闭”按钮）的最佳大小在不同语言中会有所不同，你必须根据应用程序使用的语言，计算每种语言中“关闭”按钮的大小并进行设置。然而，如果你使用布局管理器，则无需考虑所有这些因素。布局管理器会为你完成这些简单但耗时的工作。\n\
  \n使用布局管理器是可选的。如果你不使用布局管理器，则需要自行计算并设置容器中所有组件的位置和大小。\n\n从技术上讲，布局管理器是实现了 `LayoutManager`\
  \ 接口的 Java 类的一个对象。还有另一个名为 `LayoutManager2` 的接口，它继承自 `LayoutManager` 接口。部分布局管理器类实现了\
  \ `LayoutManager2` 接口。这两个接口都在 `java.awt` 包中。\n\n布局管理器有很多种。有些布局管理器简单且易于手动编码。有些则非常复杂，难以手动编码，它们旨在供\
  \ NetBeans 等 GUI 构建工具使用。如果没有可用的布局管理器能满足你的需求，你可以创建自己的布局管理器。互联网上可以免费获取一些有用的布局管理器。有时你需要嵌套使用它们才能达到理想效果。本节将讨论以下布局管理器：\n\
  \n*   `FlowLayout`\n*   `BorderLayout`\n*   `CardLayout`\n*   `BoxLayout`\n*   `GridLayout`\n\
  *   `GridBagLayout`\n*   `GroupLayout`\n*   `SpringLayout`\n\n每个容器都有一个默认的布局管理器。`JFrame`\
  \ 内容面板的默认布局管理器是 `BorderLayout`，而 `JPanel` 的默认布局管理器是 `FlowLayout`。布局管理器在创建容器时设置。你可以通过容器的\
  \ `setLayout()` 方法来更改其默认布局管理器。如果你不希望容器使用布局管理器，可以将 `null` 传递给 `setLayout()` 方法。容器的\
  \ `getLayout()` 方法会返回该容器当前使用的布局管理器的引用。\n\n```\n// 将 FlowLayout 设置为 JFrame 内容面板的布局管理器\n\
  JFrame frame = new JFrame(\"测试窗口\");\nContainer contentPane = frame.getContentPane();\n\
  contentPane.setLayout(new FlowLayout());\n// 将 BorderLayout 设置为 JPanel 的布局管理器\n\
  JPanel panel = new JPanel();\npanel.setLayout(new BorderLayout());\n// 获取容器的布局管理器\n\
  LayoutManager layoutManager = container.getLayout()\n```\n\n从 Java 5 开始，对 `JFrame`\
  \ 调用 `add()` 和 `setLayout()` 方法会被转发到其内容面板。在 Java 5 之前，对 `JFrame` 调用这些方法会抛出运行时异常。也就是说，从\
  \ Java 5 开始，`frame.setLayout()` 和 `frame.add()` 这两个调用与调用 `frame.getContentPane().setLayout()`\
  \ 和 `frame.getContentPane().add()` 效果相同。非常重要的一点是，`JFrame` 的 `getLayout()` 方法返回的是\
  \ `JFrame` 本身的布局管理器，而不是其内容面板的。为了避免这种从 `JFrame` 到其内容面板的调用转发不对称问题（部分调用被转发，部分没有），最好直接调用内容面板的方法，而不是在\
  \ `JFrame` 上调用它们。\n\n\n\n### FlowLayout\n\n`FlowLayout` 是最简单的布局管理器。它先水平排列组件，再垂直排列。组件按照添加到容器的顺序进行布局。在水平排列组件时，可以是从左到右，也可以是从右到左。水平布局方向取决于容器的朝向，你可以通过调用容器的\
  \ `setComponentOrientation()` 方法来设置。如果你想设置容器及其所有子组件的朝向，可以使用 `applyComponentOrientation()`\
  \ 方法。以下是一段设置容器朝向的代码示例：\n\n```\n// 方法 – 1\n// 将框架内容面板的朝向设置为“从右到左”\nJFrame frame =\
  \ new JFrame(\"Test\");\nContainer pane = frame.getContentPane();\npane.setComponentOrientation(ComponentOrientation.RIGHT_TO_LEFT);\n\
  // 方法 – 2\n// 将内容面板及其所有子组件的朝向设置为“从右到左”\nJFrame frame = new JFrame(\"Test\");\nContainer\
  \ pane = frame.getContentPane();\npane.applyComponentOrientation(ComponentOrientation.RIGHT_TO_LEFT);\n\
  ```\n\n如果你的应用程序支持多语言，并且组件朝向将在运行时决定，你可能希望以更通用的方式设置组件的区域设置和朝向，而不是硬编码。你可以像这样全局设置应用程序中所有\
  \ Swing 组件的默认区域设置：\n\n```\n// \"ar\" 用于阿拉伯语区域设置\nJComponent.setDefaultLocale(new\
  \ Locale(\"ar\"));\n```\n\n当你创建 `JFrame` 时，可以根据默认区域设置获取组件的朝向，并将其设置到框架及其子组件上。这样，你就不必为应用程序中的每个容器设置朝向。\n\
  \n```\n// 获取默认区域设置\nLocale defaultLocale = JComponent.getDefaultLocale();\n// 获取默认区域设置对应的组件朝向\n\
  ComponentOrientation componentOrientation = ComponentOrientation.getOrientation(defaultLocale);\n\
  // 将组件的默认朝向应用于整个框架\nframe.applyComponentOrientation(componentOrientation);\n```\n\
  \n`FlowLayout` 会尝试将所有组件放入一行，并赋予它们首选大小。如果所有组件无法放入一行，则会另起一行。每个布局管理器都必须计算其布局所有组件所需空间的高度和宽度。`FlowLayout`\
  \ 请求的宽度是所有组件首选宽度的总和。它请求的高度是容器中最高的组件的高度。它会在宽度和高度上增加额外的空间，以容纳组件之间的水平和垂直间距。清单 1-7 演示了如何为\
  \ `JFrame` 的内容面板使用 `FlowLayout`。它向内容面板添加了三个按钮。图 1-10 显示了使用 `FlowLayout` 的三个按钮的屏幕。当你水平展开框架时，按钮会显示出来，如图\
  \ 1-11 所示。\n\n![A323071_2_En_1_Fig11_HTML.jpg](img/A323071_2_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11.\n\n使用 FlowLayout 的 JFrame 水平展开后\n\n![A323071_2_En_1_Fig10_HTML.jpg](img/A323071_2_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10.\n\n使用 FlowLayout 管理器的 JFrame 中的三个按钮\n\n```\n// FlowLayoutTest.java\npackage\
  \ com.jdojo.swing.intro;\nimport java.awt.Container;\nimport java.awt.FlowLayout;\n\
  import javax.swing.JButton;\nimport javax.swing.JFrame;\npublic class FlowLayoutTest\
  \ {\npublic static void main(String[] args) {\nJFrame frame = new JFrame(\"Flow\
  \ Layout Test\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer\
  \ contentPane = frame.getContentPane();\ncontentPane.setLayout(new FlowLayout());\n\
  for (int i = 1; i <= 3; i++) {\ncontentPane.add(new JButton(\"Button \" + i));\n\
  }\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-7.\n使用 FlowLayout 管理器\n```\n\
  \n默认情况下，`FlowLayout` 将所有组件在容器中居中对齐。你可以通过使用其 `setAlignment()` 方法或在构造函数中传递对齐参数来更改对齐方式，如下所示：\n\
  \n```\n// 在创建布局管理器对象时设置对齐方式\nFlowLayout flowLayout = new FlowLayout(FlowLayout.RIGHT);\n\
  // 在创建流式布局管理器后设置对齐方式\nflowLayout.setAlignment(FlowLayout.RIGHT);\n```\n\n`FlowLayout`\
  \ 类中定义了以下五个常量来表示五种不同的对齐方式：`LEFT`、`RIGHT`、`CENTER`、`LEADING` 和 `TRAILING`。前三个常量的定义显而易见。`LEADING`\
  \ 对齐可能表示左对齐或右对齐；这取决于组件的朝向。如果组件的朝向是 `RIGHT_TO_LEFT`，则 `LEADING` 对齐表示 `RIGHT`。如果组件的朝向是\
  \ `LEFT_TO_RIGHT`，则 `LEADING` 对齐表示 `LEFT`。类似地，`TRAILING` 对齐可能表示左对齐或右对齐。如果组件的朝向是\
  \ `RIGHT_TO_LEFT`，则 `TRAILING` 对齐表示 `LEFT`。如果组件的朝向是 `LEFT_TO_RIGHT`，则 `TRAILING`\
  \ 对齐表示 `RIGHT`。始终建议使用 `LEADING` 和 `TRAILING` 而不是 `RIGHT` 和 `LEFT`，这样你就不必担心组件的朝向问题。\n\
  \n你可以在 `FlowLayout` 类的构造函数中设置两个组件之间的间距，或者使用其 `setHgap()` 和 `setVgap()` 方法。清单 1-8\
  \ 包含了向 `JFrame` 添加三个按钮的完整代码。内容面板使用具有 `LEADING` 对齐方式的 `FlowLayout`，并且 `JFrame` 的朝向设置为\
  \ `RIGHT_TO_LEFT`。当你运行程序时，`JFrame` 将如图 1-12 所示。\n\n![A323071_2_En_1_Fig12_HTML.jpg](img/A323071_2_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12.\n\n具有三个按钮和自定义 FlowLayout 的 JFrame\n\n```\n// FlowLayoutTest2.java\npackage\
  \ com.jdojo.swing.intro;\nimport java.awt.ComponentOrientation;\nimport java.awt.Container;\n\
  import java.awt.FlowLayout;\nimport javax.swing.JButton;\nimport javax.swing.JFrame;\n\
  public class FlowLayoutTest2 {\npublic static void main(String[] args) {\nint horizontalGap\
  \ = 20;\nint verticalGap = 10;\nJFrame frame = new JFrame(\"Flow Layout Test\");\n\
  frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer contentPane = frame.getContentPane();\n\
  FlowLayout flowLayout\n= new FlowLayout(FlowLayout.LEADING, horizontalGap, verticalGap);\n\
  contentPane.setLayout(flowLayout);\nframe.applyComponentOrientation(ComponentOrientation.RIGHT_TO_LEFT);\n\
  for (int i = 1; i <= 3; i++) {\ncontentPane.add(new JButton(\"Button \" + i));\n\
  }\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-8.\n自定义 FlowLayout\n```\n\n\
  你必须记住，`FlowLayout` 会尝试将所有组件仅布局在一行中。因此，它不会请求能容纳所有组件的高度。相反，它请求的是容器中最高的组件的高度。为了演示这个细微之处，尝试向\
  \ `JFrame` 添加 30 个按钮，使它们无法全部放入一行。以下代码片段演示了这一点：\n\n```\nJFrame frame = new JFrame(\"\
  FlowLayout\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nframe.getContentPane().setLayout(new\
  \ FlowLayout());\nfor (int i = 1; i <= 30; i++) {\nframe.getContentPane().add(new\
  \ JButton(\"Button \" + i));\n}\nframe.pack();\nframe.setVisible(true);\n```\n\n\
  `JFrame` 如图 1-13 所示。请注意，并非所有 30 个按钮都显示出来。如果你调整 `JFrame` 的大小使其高度变大，你将能够看到所有按钮，如图\
  \ 1-14 所示。`FlowLayout` 会隐藏无法在一行中显示的组件。\n\n![A323071_2_En_1_Fig14_HTML.jpg](img/A323071_2_En_1_Fig14_HTML.jpg)\n\
  \n图 1-14.\n\n调整大小后具有 30 个按钮的 JFrame\n\n![A323071_2_En_1_Fig13_HTML.jpg](img/A323071_2_En_1_Fig13_HTML.jpg)\n\
  \n\n\n图 1-13.\n\n一个包含 30 个按钮的 JFrame。并非所有按钮都显示出来。\n\n`FlowLayout`的一个非常重要的特性是它试图将所有组件排列在一行中。它只要求高度足以显示最高的组件。如果你将一个使用`FlowLayout`管理器的容器嵌套在另一个也使用`FlowLayout`管理器的容器中，你将永远无法在嵌套容器中看到超过一行的内容。为了演示这一点，向一个`JPanel`中添加\
  \ 30 个`JButton`实例。`JPanel`是一个空的容器，其默认布局管理器为`FlowLayout`。将`JFrame`内容面板的布局管理器设置为`FlowLayout`，并将该`JPanel`添加到`JFrame`的内容面板中。这样，你就有了一个使用`FlowLayout`的容器`JPanel`，它嵌套在另一个也使用`FlowLayout`的容器（内容面板）中。清单\
  \ 1-9 包含了演示此功能的完整程序。运行该程序时，生成的`JFrame`如图 1-15 所示。即使你调整`JFrame`使其高度变大，你也始终只能看到一行按钮。\n\
  \n![A323071_2_En_1_Fig15_HTML.jpg](img/A323071_2_En_1_Fig15_HTML.jpg)\n\n图 1-15.\n\
  \n嵌套的 FlowLayout 始终只显示一行\n\n```\n// FlowLayoutNesting.java\npackage com.jdojo.swing.intro;\n\
  import java.awt.FlowLayout;\nimport javax.swing.JButton;\nimport javax.swing.JFrame;\n\
  import javax.swing.JPanel;\npublic class FlowLayoutNesting {\npublic static void\
  \ main(String[] args) {\nJFrame frame = new JFrame(\"FlowLayout Nesting\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  // 将内容面板的布局设置为 FlowLayout\nframe.getContentPane().setLayout(new FlowLayout());\n\
  // JPanel 是一个空的容器，其布局管理器为 FlowLayout\nJPanel panel = new JPanel();\n// 向 JPanel\
  \ 添加 30 个 JButton\nfor (int i = 1; i <= 30; i++) {\npanel.add(new JButton(\"Button\
  \ \" + i));\n}\n// 将 JPanel 添加到内容面板\nframe.getContentPane().add(panel);\nframe.pack();\n\
  frame.setVisible(true);\n}\n}\n清单 1-9.\n嵌套 FlowLayout 管理器\n```\n\n我想以一条说明来结束关于`FlowLayout`的讨论：由于本节讨论的局限性，它在实际应用程序中的用途非常有限。它通常用于原型设计。\n\
  \n### BorderLayout\n\n`BorderLayout`将容器的空间划分为五个区域：北区、南区、东区、西区和中心区。当你向使用`BorderLayout`的容器添加组件时，需要指定要将组件添加到五个区域中的哪一个。`BorderLayout`类定义了五个常量来标识这五个区域。这些常量是`NORTH`、`SOUTH`、`EAST`、`WEST`和`CENTER`。例如，要向北部区域添加一个按钮，你可以这样写：\n\
  \n```\n// 向容器的北部区域添加一个按钮\nJButton northButton = new JButton(\"North\");\ncontainer.add(northButton,\
  \ BorderLayout.NORTH);\n```\n\n`JFrame`内容面板的默认布局是`BorderLayout`。清单 1-10 包含了向`JFrame`内容面板添加五个按钮的完整程序。生成的`JFrame`如图\
  \ 1-16 所示。\n\n![A323071_2_En_1_Fig16_HTML.jpg](img/A323071_2_En_1_Fig16_HTML.jpg)\n\
  \n图 1-16.\n\nBorderLayout 的五个区域\n\n```\n// BorderLayoutTest.java\npackage com.jdojo.swing.intro;\n\
  import java.awt.BorderLayout;\nimport javax.swing.JFrame;\nimport java.awt.Container;\n\
  import javax.swing.JButton;\npublic class BorderLayoutTest {\npublic static void\
  \ main(String[] args) {\nJFrame frame = new JFrame(\"BorderLayout Test\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container container = frame.getContentPane();\n// 向 BorderLayout 的五个区域各添加一个按钮\n\
  container.add(new JButton(\"North\"), BorderLayout.NORTH);\ncontainer.add(new JButton(\"\
  South\"), BorderLayout.SOUTH);\ncontainer.add(new JButton(\"East\"), BorderLayout.EAST);\n\
  container.add(new JButton(\"West\"), BorderLayout.WEST);\ncontainer.add(new JButton(\"\
  Center\"), BorderLayout.CENTER);\nframe.pack();\nframe.setVisible(true);\n}\n}\n\
  清单 1-10.\n向 BorderLayout 添加组件\n```\n\n你最多只能向`BorderLayout`的一个区域添加一个组件。你可以让某些区域保持为空。如果你想向`BorderLayout`的某个区域添加多个组件，可以先将这些组件添加到一个容器中，然后将该容器添加到目标区域。\n\
  \n`BorderLayout`中的五个区域（北区、南区、东区、西区和中心区）方向固定，不依赖于组件的方向。还有四个常量用于指定`BorderLayout`中的区域。这些常量是`PAGE_START`、`PAGE_END`、`LINE_START`和`LINE_END`。`PAGE_START`和`PAGE_END`常量分别与`NORTH`和`SOUTH`常量相同。`LINE_START`和`LINE_END`常量的位置会根据容器的方向而变化。如果容器的方向是从左到右，则`LINE_START`等同于`WEST`，`LINE_END`等同于`EAST`。如果容器的方向是从右到左，则`LINE_START`等同于`EAST`，`LINE_END`等同于`WEST`。图\
  \ 1-17 和图 1-18 展示了在不同组件方向下，`BorderLayout`各区域定位的差异。\n\n![A323071_2_En_1_Fig18_HTML.jpg](img/A323071_2_En_1_Fig18_HTML.jpg)\n\
  \n图 1-18.\n\n当容器方向为从右到左时，BorderLayout 的区域\n\n![A323071_2_En_1_Fig17_HTML.jpg](img/A323071_2_En_1_Fig17_HTML.jpg)\n\
  \n图 1-17.\n\n当容器方向为从左到右时，BorderLayout 的区域\n\n如果你没有为组件指定区域，它将被添加到中心区域。以下两条语句具有相同的效果：\n\
  \n```\n// 假设容器使用 BorderLayout。\n// 向容器添加按钮，不指定区域\ncontainer.add(new JButton(\"Close\"\
  ));\n// 上述语句与以下语句效果相同\ncontainer.add(new JButton(\"Close\"), BorderLayout.CENTER);\n\
  ```\n\n\n\n我已经说明过，一个 `BorderLayout` 最多只能添加五个组件，每个区域一个。那么，如果在 `BorderLayout` 的同一个区域添加了多个组件会发生什么？也就是说，如果你编写以下代码，会发生什么？\n\
  \n```\n// 假设 container 使用的是 BorderLayout\ncontainer.add(new JButton(\"关闭\"), BorderLayout.NORTH);\n\
  container.add(new JButton(\"帮助\"), BorderLayout.NORTH);\n```\n\n你会发现，`BorderLayout`\
  \ 的北部区域只显示了一个按钮：最后添加的那个按钮。也就是说，北部区域只会显示“帮助”按钮。清单 1-6 中就是这种情况。你向 `JFrame` 的内容面板添加了两个按钮，分别名为“关闭”和“帮助”。由于你没有指定要将它们添加到\
  \ `BorderLayout` 的哪个区域，因此两个按钮都被添加到了中央区域。由于 `BorderLayout` 的每个区域只能有一个组件，因此“帮助”按钮替换了“关闭”按钮。这就是为什么你在运行清单\
  \ 1-6 中的程序时看不到“关闭”按钮的原因。要解决这个问题，在将两个按钮添加到容器时，请为它们指定区域。\n\n提示\n\n如果你在由 `BorderLayout`\
  \ 管理的容器中缺少某些组件，请确保你没有在同一个区域添加多个组件。如果你使用区域常量向 `BorderLayout` 添加组件，则 `PAGE_START`、`PAGE_END`、`LINE_START`\
  \ 和 `LINE_END` 常量的优先级高于 `NORTH`、`SOUTH`、`EAST` 和 `WEST` 常量。也就是说，如果你使用 `add(c1, NORTH)`\
  \ 和 `add(c2, PAGE_START)` 向 `BorderLayout` 添加两个组件，则 `c2` 会被使用，而不是 `c1`。\n\n`BorderLayout`\
  \ 如何计算组件的大小？它根据组件所在的区域来计算其大小。它尊重北部和南部组件的首选高度。但是，它会根据北部和南部的可用空间水平拉伸组件的宽度。也就是说，它不尊重北部和南部组件的首选宽度。它尊重东部和西部组件的首选宽度，并赋予它们垂直填充整个空间所需的高度。中央区域的组件会在水平和垂直方向上拉伸以适应该区域。也就是说，中央区域不尊重其组件的首选宽度和高度。\n\
  \n### CardLayout\n\n`CardLayout` 将容器中的组件像一叠卡片一样进行布局。就像一叠卡片一样，在 `CardLayout` 中，一次只有一张卡片（最上面的那张）是可见的。它一次只让一个组件可见。你需要按照以下步骤为容器使用\
  \ `CardLayout`：\n\n*   创建一个容器，例如 `JPanel`。\n\n```\n    JPanel cardPanel = new JPanel();\n\
  \    ```\n\n*   创建一个 `CardLayout` 对象。\n\n```\n    CardLayout cardLayout = new CardLayout();\n\
  \    ```\n\n*   为容器设置布局管理器。\n\n```\n    cardPanel.setLayout(cardLayout);\n    ```\n\
  \n*   向容器添加组件。你需要为每个组件指定一个名称。要向 `cardPanel` 添加一个 `JButton`，请使用以下语句：\n\n```\n   \
  \ cardPanel.add(new JButton(\"卡片 1\"), \"myLuckyCard\");\n    ```\n\n你已经将卡片命名为 `myLuckyCard`。这个名称可以在\
  \ `CardLayout` 的 `show()` 方法中使用，以使这张卡片可见。\n*   调用其 `next()` 方法来显示下一张卡片。\n\n```\n\
  \    cardLayout.next(cardPanel);\n    ```\n\n`CardLayout` 类提供了几种方法来切换组件。默认情况下，它显示第一个添加的组件。所有与切换相关的方法都将它所管理的容器作为参数。`first()`\
  \ 和 `last()` 方法分别显示第一张和最后一张卡片。`previous()` 和 `next()` 方法从当前显示的卡片开始，显示上一张和下一张卡片。如果当前显示的是最后一张卡片，调用\
  \ `next()` 方法会显示第一张卡片。如果当前显示的是第一张卡片，调用 `previous()` 方法会显示最后一张卡片。\n\n清单 1-11 演示了如何使用\
  \ `CardLayout`。图 1-19 显示了生成的 `JFrame`。当你点击“下一张”按钮时，会切换到下一张卡片。该程序向 `JFrame` 的内容面板添加了两个\
  \ `JPanel`。一个 `JPanel`（`buttonPanel`）包含“下一张”按钮，它被添加到内容面板的南部区域。请注意，默认情况下，`JPanel`\
  \ 使用 `FlowLayout`。\n\n![A323071_2_En_1_Fig19_HTML.jpg](img/A323071_2_En_1_Fig19_HTML.jpg)\n\
  \n图 1-19.\n\nCardLayout 的实际应用。点击“下一张”按钮可切换卡片。\n\n```\n// CardLayoutTest.java\npackage\
  \ com.jdojo.swing.intro;\nimport java.awt.Container;\nimport javax.swing.JFrame;\n\
  import java.awt.CardLayout;\nimport javax.swing.JPanel;\nimport javax.swing.JButton;\n\
  import java.awt.Dimension;\nimport java.awt.BorderLayout;\npublic class CardLayoutTest\
  \ {\npublic static void main(String[] args) {\nJFrame frame = new JFrame(\"CardLayout\
  \ 测试\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer contentPane\
  \ = frame.getContentPane();\n// 向内容面板添加一个包含“下一张”JButton 的 JPanel\nJPanel buttonPanel\
  \ = new JPanel();\nJButton nextButton = new JButton(\"下一张\");\nbuttonPanel.add(nextButton);\n\
  contentPane.add(buttonPanel, BorderLayout.SOUTH);\n// 创建一个 JPanel 并将其布局设置为 CardLayout\n\
  final JPanel cardPanel = new JPanel();\nfinal CardLayout cardLayout = new CardLayout();\n\
  cardPanel.setLayout(cardLayout);\n// 向 cardPanel 添加五个 JButton 作为卡片\nfor (int i =\
  \ 1; i  cardLayout.next(cardPanel));\nframe.pack();\nframe.setVisible(true);\n}\n\
  }\n清单 1-11.\nCardLayout 的实际应用\n```\n\n该程序为“下一张”按钮添加了一个动作监听器。我还没有讨论如何为按钮添加动作监听器。但为了看到\
  \ `CardLayout` 的实际效果，这是必要的。我将在事件处理部分详细讨论如何为按钮添加动作。目前，只需说明你需要调用 `JButton` 类的 `addActionListener()`\
  \ 方法来为其添加动作监听器即可。该方法接受一个 `ActionListener` 接口类型的对象，该接口有一个名为 `actionPerformed()` 的方法。当你点击\
  \ `JButton` 时，`actionPerformed()` 方法中的代码会被执行。切换下一张卡片的代码是调用 `cardLayout.next(cardPanel)`\
  \ 方法。`ActionListener` 接口是一个函数式接口，你可以使用 lambda 表达式来创建其实例，如下所示：\n\n```\n// 为“下一张”JButton\
  \ 添加动作监听器以切换下一张卡片\nnextButton.addActionListener(e -> cardLayout.next(cardPanel));\n\
  ```\n\n提示\n\n`CardLayout` 并不常用，因为除了一个组件之外，其他所有组件都对用户隐藏。`JTabbedPane` 更易于使用，它提供了与\
  \ `CardLayout` 类似的功能。我将在第 2 章讨论 `JTabbedPane`。`JTabbedPane` 是一个容器，而不是布局管理器。它将所有组件作为选项卡进行布局，并允许用户在这些选项卡之间切换。\n\
  \n\n\n### BoxLayout\n\n`BoxLayout` 将容器中的组件按水平一行或垂直一列进行排列。要在程序中使用 `BoxLayout`，需要遵循以下步骤：\n\
  \n*   创建一个容器，例如 `JPanel`。\n\n```\n    JPanel hPanel = new JPanel();\n    ```\n\n\
  *   创建一个 `BoxLayout` 类的对象。与其他布局管理器不同，你需要将容器传递给构造函数。同时，还需要将你要创建的盒子类型（水平或垂直）传递给其构造函数。该类有四个常量：`X_AXIS`、`Y_AXIS`、`LINE_AXIS`\
  \ 和 `PAGE_AXIS`。常量 `X_AXIS` 用于创建水平 `BoxLayout`，将所有组件从左到右排列。常量 `Y_AXIS` 用于创建垂直 `BoxLayout`，将所有组件从上到下排列。另外两个常量\
  \ `LINE_AXIS` 和 `PAGE_AXIS` 与 `X_AXIS` 和 `Y_AXIS` 类似，但它们在排列组件时会使用容器的方向。\n\n```\n\
  \    // 为 hPanel 创建一个 BoxLayout，用于从左到右排列组件\n    BoxLayout boxLayout = new BoxLayout(hPanel,\
  \ BoxLayout.X_AXIS);\n    ```\n\n*   为容器设置布局。\n\n```\n    hPanel.setLayout(boxLayout);\n\
  \    ```\n\n*   将组件添加到容器中。\n\n```\n    hPanel.add(new JButton(\"Button 1\"));\n\
  \    hPanel.add(new JButton(\"Button 2\"));\n    ```\n\n清单 1-12 使用水平 `BoxLayout`\
  \ 显示了三个按钮，如图 1-20 所示。\n\n![A323071_2_En_1_Fig20_HTML.jpg](img/A323071_2_En_1_Fig20_HTML.jpg)\n\
  \n图 1-20.\n\n一个包含三个按钮的水平 BoxLayout 的 JFrame\n\n```\n// BoxLayoutTest.java\npackage\
  \ com.jdojo.swing.intro;\nimport java.awt.Container;\nimport javax.swing.JFrame;\n\
  import javax.swing.JButton;\nimport javax.swing.JPanel;\nimport javax.swing.BoxLayout;\n\
  import java.awt.BorderLayout;\npublic class BoxLayoutTest {\npublic static void\
  \ main(String[] args) {\nJFrame frame = new JFrame(\"BoxLayout Test\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\nJPanel hPanel = new JPanel();\n\
  BoxLayout boxLayout = new BoxLayout(hPanel, BoxLayout.X_AXIS);\nhPanel.setLayout(boxLayout);\n\
  for (int i = 1; i <= 3; i++) {\nhPanel.add(new JButton(\"Button \" + i));\n}\ncontentPane.add(hPanel,\
  \ BorderLayout.SOUTH);\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-12.\n\
  使用水平 BoxLayout\n```\n\n`BoxLayout` 在水平布局中会尝试为所有组件提供首选宽度，在垂直布局中则提供首选高度。在水平布局中，最高组件的高度会被赋予所有其他组件。如果无法将某个组件的高度调整为与组中最高的组件一致，则会沿水平方向居中对齐该组件。你可以通过设置组件的对齐方式，或使用\
  \ `setAlignmentY()` 方法设置容器对齐方式来更改此默认对齐方式。在垂直布局中，它会尝试为所有组件提供首选高度，并尝试使所有组件的宽度与最宽的组件相同。如果无法使所有组件具有相同的宽度，则会沿其垂直中心线对齐它们。你可以通过更改组件的对齐方式，或使用\
  \ `setAlignmentX()` 方法更改容器的对齐方式来更改此默认对齐方式。\n\n`javax.swing` 包中包含一个 `Box` 类，它使得使用\
  \ `BoxLayout` 更加容易。`Box` 是一个使用 `BoxLayout` 作为其布局管理器的容器。`Box` 类提供了静态方法来创建具有水平或垂直布局的容器。`createHorizontalBox()`\
  \ 和 `createVerticalBox()` 方法分别用于创建水平盒子和垂直盒子。\n\n```\n// 创建一个水平盒子\nBox hBox = Box.createHorizontalBox();\n\
  // 创建一个垂直盒子\nBox vBox = Box.createVerticalBox();\n```\n\n要向 `Box` 添加组件，请使用其 `add()`\
  \ 方法，如下所示：\n\n```\n// 向水平盒子添加两个按钮\nhBox.add(new JButton(\"Button 1\");\nhBox.add(new\
  \ JButton(\"Button 2\");\n```\n\n`Box` 类还允许你创建不可见组件并将其添加到盒子中，以便调整两个组件之间的间距。它提供了四种类型的不可见组件：\n\
  \n*   粘合剂 (Glue)\n*   支柱 (Strut)\n*   刚性区域 (Rigid Area)\n*   填充物 (Filler)\n\n粘合剂是一种不可见的、可扩展的组件。你可以使用\
  \ `Box` 类的 `createHorizontalGlue()` 和 `createVerticalGlue()` 静态方法创建水平和垂直粘合剂。以下代码片段在水平盒子布局中的两个按钮之间使用了水平粘合剂。你也可以使用\
  \ `Box` 类的 `createGlue()` 静态方法创建一个可以在水平和垂直方向上扩展的粘合剂组件。\n\n```\nBox hBox = Box.createHorizontalBox();\n\
  hBox.add(new JButton(\"First\"));\nhBox.add(Box.createHorizontalGlue());\nhBox.add(new\
  \ JButton(\"Last\"));\n```\n\n中间带有粘合剂的按钮如图 1-21 所示。图 1-22 显示了容器水平扩展后的情况。请注意两个按钮之间的水平空白空间，这是已经扩展的不可见粘合剂。\n\
  \n![A323071_2_En_1_Fig22_HTML.jpg](img/A323071_2_En_1_Fig22_HTML.jpg)\n\n图 1-22.\n\
  \n调整大小后，带有两个按钮和它们之间水平粘合剂的水平盒子\n\n![A323071_2_En_1_Fig21_HTML.jpg](img/A323071_2_En_1_Fig21_HTML.jpg)\n\
  \n图 1-21.\n\n带有两个按钮和它们之间水平粘合剂的水平盒子\n\n支柱是一种具有固定宽度或固定高度的不可见组件。你可以使用 `createHorizontalStrut()`\
  \ 方法创建水平支柱，该方法以像素为单位的宽度作为参数。你可以使用 `createVerticalStrut()` 方法创建垂直支柱，该方法以像素为单位的高度作为参数。\n\
  \n```\n// 向水平盒子添加一个 100 像素的支柱\nhBox.add(Box.createHorizontalStrut(100));\n```\n\n\
  刚性区域是一种大小始终不变的不可见组件。你可以通过使用 `Box` 类的 `createRigidArea()` 静态方法来创建刚性区域。你需要向其传递一个 `Dimension`\
  \ 对象来指定其宽度和高度。\n\n```\n// 向水平盒子添加一个 10x5 的刚性区域\nhBox.add(Box.createRigidArea(new\
  \ Dimesnion(10, 5)));\n```\n\n填充物是一种不可见的自定义组件，你可以通过指定自己的最小、最大和首选大小来创建它。`Box` 类的\
  \ `Filler` 静态嵌套类代表一个填充物。\n\n```\n// 创建一个填充物，其作用类似于粘合剂。请注意，粘合剂只是一个\n// 最小和首选大小设置为零，\n\
  // 并且在两个方向上的最大大小设置为\n// Short.MAX_VALUE 的填充物\nDimension minSize = new Dimension(0,\
  \ 0);\nDimension prefSize = new Dimension(0, 0);\nDimension maxSize = new Dimension(Short.MAX_VALUE,\
  \ Short.MAX_VALUE);\nBox.Filler filler = new Box.Filler(minSize, prefSize, maxSize);\n\
  ```\n\n通过嵌套具有水平和垂直 `BoxLayout` 的盒子，你可以获得非常强大的布局。`Box` 类提供了便捷的方法来创建粘合剂、支柱和刚性区域。但是，它们都是\
  \ `Box.Filler` 类的对象。当最小和首选大小设置为零，并且在两个方向上的最大大小设置为 `Short.MAX_VALUE` 时，`Box.Filler`\
  \ 对象的作用类似于粘合剂。当粘合剂的最大高度设置为零时，它起到水平粘合剂的作用。当粘合剂的最大宽度设置为零时，它起到垂直粘合剂的作用。你可以使用 `Box.Filler`\
  \ 类创建水平支柱，方法是将其最小和首选大小设置为指定的宽度和零高度，并将最大大小设置为指定的宽度和 `Short.MAX_VALUE` 高度。你能想到使用 `Box.Filler`\
  \ 类创建刚性区域的方法吗？对于刚性区域，所有大小（最小、首选和最大）都是相同的。以下代码片段创建了一个 10x10 的刚性区域：\n\n\n\n```\n//\
  \ 创建一个 10x10 的刚性区域\nDimension d = new Dimension(10, 10); JComponent rigidArea =\
  \ new Box.Filler(d, d, d);\n```\n\n清单 1-13 演示了如何使用 `Box` 类和胶水（glue）。图 1-23 显示了水平展开后的\
  \ `JFrame` 效果。当 `JFrame` 打开时，“上一页”和“下一页”按钮之间没有间隙。\n\n![A323071_2_En_1_Fig23_HTML.jpg](img/A323071_2_En_1_Fig23_HTML.jpg)\n\
  \n图 1-23.\n\n带胶水的 BoxLayout\n\n```\n// BoxLayoutGlueTest.java\npackage com.jdojo.swing.intro;\n\
  import java.awt.Container;\nimport javax.swing.JFrame;\nimport javax.swing.JButton;\n\
  import javax.swing.Box;\nimport java.awt.BorderLayout;\npublic class BoxLayoutGlueTest\
  \ {\npublic static void main(String[] args) {\nJFrame frame = new JFrame(\"带胶水的\
  \ BoxLayout\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer\
  \ contentPane = frame.getContentPane();\nBox hBox = Box.createHorizontalBox();\n\
  hBox.add(new JButton(\"\"));\nhBox.add(new JButton(\"最后>>\"));\ncontentPane.add(hBox,\
  \ BorderLayout.SOUTH);\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-13.\n\
  使用 Box 类和胶水的 BoxLayout\n```\n\n### GridLayout\n\n`GridLayout` 将组件排列在由等尺寸单元格组成的矩形网格中。每个组件恰好放置在一个单元格内。它不遵循组件的首选尺寸，而是将可用空间划分为等尺寸的单元格，并将每个组件调整为单元格的大小。\n\
  \n您可以指定网格的行数或列数。如果同时指定两者，则仅使用行数，列数会被自动计算。假设 `ncomponents` 是添加到容器中的组件数量，`nrows` 和\
  \ `ncols` 是指定的行数和列数。如果 `nrows` 大于零，则使用以下公式计算网格的列数：\n\n```\nncols = (ncomponents\
  \ + nrows - 1)/nrows\n```\n\n如果 `nrows` 为零，则使用以下公式计算网格的行数：\n\n```\nnrows = (ncomponents\
  \ + ncols - 1)/ncols\n```\n\n您不能为 `nrows` 或 `ncols` 指定负数，并且至少其中一个必须大于零。否则会抛出运行时异常。\n\
  \n您可以使用 `GridLayout` 类的以下三个构造函数之一来创建 `GridLayout`：\n\n*   `GridLayout()`\n*   `GridLayout(int\
  \ rows, int cols)`\n*   `GridLayout(int rows, int cols, int hgap, int vgap)`\n\n\
  您可以指定网格的行数、列数、单元格之间的水平间距和垂直间距。您也可以使用 `setRows()`、`setColumns()`、`setHgap()` 和 `setVgap()`\
  \ 方法来设置这些属性。\n\n无参构造函数创建一个单行网格，列数与添加到容器中的组件数量相同。\n\n```\n// 创建一个单行网格布局\nGridLayout\
  \ gridLayout = new GridLayout();\n```\n\n第二个构造函数创建一个具有指定行数或列数的 `GridLayout`。\n\n\
  ```\n// 创建一个 5 行的网格布局。将列数指定为 0。\n// 列数将被自动计算。\nGridLayout gridLayout = new GridLayout(5,\
  \ 0);\n// 创建一个 3 列的网格布局。将行数指定为 0。\n// 行数将被自动计算。\nGridLayout gridLayout = new GridLayout(0,\
  \ 3);\n// 创建一个 2 行 3 列的网格布局。由于您为行数指定了非零值，\n// 列数将被忽略，并根据组件数量自动计算。\nGridLayout gridLayout\
  \ = new GridLayout(2, 3);\n```\n\n第三个构造函数允许您指定行数或列数，以及两个单元格之间的水平和垂直间距。您可以创建一个三行的\
  \ `GridLayout`，单元格之间水平间距为 10 像素，垂直间距为 20 像素，如下所示：\n\n```\nGridLayout gridLayout\
  \ = new GridLayout(3, 0, 10, 20);\n```\n\n清单 1-14 演示了如何使用 `GridLayout`。请注意，您无需指定组件将放置在哪个单元格中。只需将组件添加到容器中，布局管理器会自动决定其位置。\n\
  \n```\n// GridLayoutTest.java\npackage com.jdojo.swing.intro;\nimport java.awt.GridLayout;\n\
  import javax.swing.JPanel;\nimport java.awt.BorderLayout;\nimport javax.swing.JFrame;\n\
  import java.awt.Container;\nimport javax.swing.JButton;\npublic class GridLayoutTest\
  \ {\npublic static void main(String[] args) {\nJFrame frame = new JFrame(\"GridLayout\
  \ 测试\");\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\nContainer contentPane\
  \ = frame.getContentPane();\nJPanel buttonPanel = new JPanel();\nbuttonPanel.setLayout(new\
  \ GridLayout(3, 0));\nfor (int i = 1; i <= 9; i++) {\nbuttonPanel.add(new JButton(\"\
  按钮 \" + i));\n}\ncontentPane.add(buttonPanel, BorderLayout.CENTER);\nframe.pack();\n\
  frame.setVisible(true);\n}\n}\n清单 1-14.\n使用 GridLayout\n```\n\n图 1-24 显示了一个包含三行和九个组件的\
  \ `GridLayout` 容器。图 1-25 显示了一个包含三行和七个组件的 `GridLayout` 容器。如果您调整带有 `GridLayout` 的容器大小，所有组件都会被调整大小，并且它们的大小将保持一致。尝试运行清单\
  \ 1-14 中的程序来调整 `JFrame` 的大小。\n\n![A323071_2_En_1_Fig25_HTML.jpg](img/A323071_2_En_1_Fig25_HTML.jpg)\n\
  \n图 1-25.\n\n包含三行和七个组件的 GridLayout\n\n![A323071_2_En_1_Fig24_HTML.jpg](img/A323071_2_En_1_Fig24_HTML.jpg)\n\
  \n图 1-24.\n\n包含三行和九个组件的 GridLayout\n\n`GridLayout` 是一个易于手动编码的简单布局管理器。然而，它并不十分强大，原因有二。首先，它强制每个组件具有相同的大小；其次，您无法指定组件在网格中的行号和列号（或精确位置）。也就是说，您只能将组件添加到\
  \ `GridLayout` 中。它们会按照您添加到容器的顺序，先水平排列，再垂直排列。如果容器的方向是 `LEFT_TO_RIGHT`，组件从左到右、再从上到下排列。如果容器的方向是\
  \ `RIGHT_TO_LEFT`，组件从右到左、再从上到下排列。`GridLayout` 的一个良好用途是创建一组相同大小的按钮。例如，假设您向容器中添加了两个文本分别为\
  \ `确定` 和 `取消` 的按钮，并希望它们具有相同的大小。您可以通过将这些按钮添加到由 `GridLayout` 布局管理器管理的容器中来实现这一点。\n\n\
  \n\n### GridBagLayout\n\n`GridBagLayout` 将组件布局在由行和列组成的矩形单元格网格中，这与 `GridLayout` 类似。然而，它比\
  \ `GridLayout` 强大得多。它的强大之处在于其使用上的复杂性。它不像 `GridLayout` 那样易于使用。在 `GridBagLayout` 中，你可以自定义许多属性，这使得快速学习和使用其所有功能变得困难。\n\
  \n它允许你自定义组件的许多属性，例如大小、对齐方式、可扩展性等。与 `GridLayout` 不同，网格中的所有单元格不必具有相同的大小。组件不必精确地放置在一个单元格中。组件可以水平或垂直地跨越多个单元格。你可以指定组件在其单元格内的对齐方式。\n\
  \n在使用 `GridBagLayout` 布局管理器时，会用到 `GridBagLayout` 和 `GridBagConstraints` 类。这两个类都在\
  \ `java.awt` 包中。`GridBagLayout` 类的对象定义了一个 `GridBagLayout` 布局管理器。`GridBagConstraints`\
  \ 类的对象定义了 `GridBagLayout` 中组件的约束条件。组件的约束条件用于布局该组件。这些约束条件包括组件在网格中的位置、宽度、高度、在单元格内的对齐方式等。\n\
  \n以下代码片段创建了一个 `GridBagLayout` 类的对象，并将其设置为 `JPanel` 的布局管理器：\n\n```\n// 创建一个 JPanel\
  \ 容器\nJPanel panel = new JPanel();\n// 将 GridBagLayout 设置为 JPanel 的布局管理器\nGridBagLayout\
  \ gridBagLayout = new GridBagLayout();\npanel.setLayout(gridBagLayout);\n```\n\n\
  让我们以最简单的形式使用 `GridBagLayout`：创建一个框架，将其内容窗格的布局设置为 `GridBagLayout`，并向内容窗格添加九个按钮。这在清单\
  \ 1-15 中完成。图 1-26 显示了运行程序时得到的屏幕。\n\n![A323071_2_En_1_Fig26_HTML.jpg](img/A323071_2_En_1_Fig26_HTML.jpg)\n\
  \n图 1-26.\n\nGridBagLayout 中的九个按钮\n\n```\n// SimplestGridBagLayout.java\npackage\
  \ com.jdojo.swing.intro;\nimport javax.swing.JFrame;\nimport java.awt.Container;\n\
  import javax.swing.JButton;\nimport java.awt.GridBagLayout;\npublic class SimplestGridBagLayout\
  \ {\npublic static void main(String[] args) {\nString title = \"GridBagLayout in\
  \ its Simplest Form\";\nJFrame frame = new JFrame(title);\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\ncontentPane.setLayout(new GridBagLayout());\n\
  for (int i = 1; i <= 9; i++) {\ncontentPane.add(new JButton(\"Button \" + i));\n\
  }\nframe.pack();\nframe.setVisible(true);\n}\n}\n清单 1-15.\n以最简单形式使用的 GridBagLayout\n\
  ```\n\n起初，`GridBagLayout` 的行为似乎与 `FlowLayout` 类似。效果与使用 `FlowLayout` 相同。然而，`GridBagLayout`\
  \ 与 `FlowLayout` 并不相同，尽管它能够像 `FlowLayout` 一样工作。它比 `FlowLayout` 强大得多（也更容易出错！）。当你添加九个按钮时，你并没有指定它们的单元格。你使用了\
  \ `contentPane.add(Component c)` 方法来添加按钮。结果是它将按钮一个接一个地放置在一行中。\n\n你可以指定组件在 `GridBagLayout`\
  \ 中应放置的单元格。要指定组件的单元格，你需要调用 `add(Component c, Object constraints)` 方法，其中第二个参数是 `GridBagConstraints`\
  \ 类的对象。如果你没有为 `GridBagLayout` 中的组件指定约束对象，它会将组件放置在下一个单元格中。下一个单元格是用于放置前一个组件的单元格之后的那个单元格。如果你没有为\
  \ `GridBagLayout` 中的任何组件使用约束，所有组件都会放置在一行中，如图 1-26 所示。稍后当我介绍 `GridBagConstraints`\
  \ 对象的 `gridx` 和 `gridy` 属性时，我会对此进行更多讨论。\n\n让我们通过展示 `GridBagLayout` 确实是一种网格布局，并且它将组件放置在单元格网格中，来澄清对它的误解。为了证明这一点，你将在前面的示例中，将九个按钮显示在一个三行三列的单元格网格中。这次只有一个区别：你将指定按钮在网格中的单元格位置。行号和列号的组合表示单元格在网格中的位置。组件及其单元格的所有属性都使用\
  \ `GridBagConstraints` 类的对象来指定，该类有许多公共实例变量。它的 `gridx` 和 `gridy` 实例变量分别指定单元格的列号和行号。第一列由\
  \ `gridx = 0` 表示，第二列由 `gridx = 1` 表示，依此类推。第一行由 `gridy = 0` 表示，第二行由 `gridy = 1` 表示，依此类推。\n\
  \n网格中的第一个单元格是哪个——左上角、右上角、左下角还是右下角？这取决于容器的方向。如果容器使用 `LEFT_TO_RIGHT` 方向，则网格左上角的单元格是第一个单元格。如果容器使用\
  \ `RIGHT_TO_LEFT` 方向，则网格右上角的单元格是第一个单元格。表 1-1 和表 1-2 显示了在不同容器方向的 `GridBagLayout`\
  \ 中，单元格及其对应的 `gridx` 和 `gridy` 值。这些表格仅显示了九个单元格。`GridBagLayout` 并不局限于只有九个单元格。你可以拥有任意数量的单元格。确切地说，你最多可以有\
  \ `Integer.MAX_VALUE` 行和列，这在任何应用程序中肯定都不会用到。\n\n表 1-2.\n\n具有 RIGHT_TO_LEFT 方向的容器中单元格的\
  \ gridx 和 gridy 值\n\n| `gridx=2, gridy=0` | `gridx=1, gridy=0` | `gridx=0, gridy=0`\
  \ |\n| --- | --- | --- |\n| `gridx=2, gridy=1` | `gridx=1, gridy=1` | `gridx=0,\
  \ gridy=1` |\n| `gridx=2, gridy=2` | `gridx=1, gridy=2` | `gridx=0, gridy=2` |\n\
  \n表 1-1.\n\n具有 LEFT_TO_RIGHT 方向的容器中单元格的 gridx 和 gridy 值\n\n| `gridx=0, gridy=0`\
  \ | `gridx=1, gridy=0` | `gridx=2, gridy=0` |\n| --- | --- | --- |\n| `gridx=0,\
  \ gridy=1` | `gridx=1, gridy=1` | `gridx=2, gridy=1` |\n| `gridx=0, gridy=2` | `gridx=1,\
  \ gridy=2` | `gridx=2, gridy=2` |\n\n\n\n设置组件的 `gridx` 和 `gridy` 属性非常简单。你需要为组件创建一个约束对象，该对象是\
  \ `GridBagConstraints` 类的实例；设置其 `gridx` 和 `gridy` 属性；然后在将组件添加到容器时，将该约束对象传递给 `add()`\
  \ 方法。以下代码片段展示了如何为 `JButton` 的约束设置 `gridx` 和 `gridy` 属性。当你调用 `container.add(component,\
  \ constraint)` 方法时，约束对象会被复制给正在添加的组件，因此你可以修改其部分属性并复用于另一个组件。这样一来，你无需为添加到 `GridBagLayout`\
  \ 的每个组件都创建新的约束对象。然而，这种方法容易出错。你可能会为一个组件设置约束，但在复用于另一个组件时忘记修改。因此，复用时请务必小心。\n\n```\n\
  // 创建一个约束对象\nGridBagConstraints gbc = new GridBagConstraints();\n// 在约束对象中设置 gridx\
  \ 和 gridy 属性\ngbc.gridx = 0;\ngbc.gridy = 0;\n// 添加一个 JButton，并将约束对象作为第二个参数传递给 add()\
  \ 方法\ncontainer.add(new JButton(\"B1\"), gbc);\n// 将 gridx 属性设置为 1。gridy 属性保持之前设置的\
  \ 0\ngbc.gridx = 1;\n// 向容器中添加另一个 JButton\ncontainer.add(new JButton(\"B2\"), gbc);\n\
  ```\n\n清单 1-16 演示了如何为组件设置 `gridx` 和 `gridy` 值（或单元格编号）。图 1-27 显示了运行程序后得到的 `JFrame`。\n\
  \n![A323071_2_En_1_Fig27_HTML.jpg](img/A323071_2_En_1_Fig27_HTML.jpg)\n\n图 1-27.\n\
  \n一个包含九个按钮的 GridBagLayout\n\n```\n// GridBagLayoutWithgridxAndgridy.java\npackage\
  \ com.jdojo.swing.intro;\nimport java.awt.GridBagLayout;\nimport java.awt.Container;\n\
  import javax.swing.JFrame;\nimport javax.swing.JButton;\nimport java.awt.GridBagConstraints;\n\
  public class GridBagLayoutWithgridxAndgridy {\npublic static void main(String[]\
  \ args) {\nString title = \"GridBagLayout with gridx and gridy\";\nJFrame frame\
  \ = new JFrame(title);\nframe.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
  Container contentPane = frame.getContentPane();\ncontentPane.setLayout(new GridBagLayout());\n\
  // 创建一个 GridBagConstraints 对象，用于设置\n// 每个 JButton 的约束\nGridBagConstraints gbc =\
  \ new GridBagConstraints();\nfor (int y = 0; y < 3; y++) {\nfor (int x = 0; x <\
  \ 3; x++) {\ngbc.gridx = x;\ngbc.gridy = y;\nString text = \"Button (\" + x + \"\
  , \" + y + \")\";\ncontentPane.add(new JButton(text), gbc);\n}\n}\nframe.pack();\n\
  frame.setVisible(true);\n}\n}\n清单 1-16.\n在 GridBagLayout 中为组件设置 gridx 和 gridy 属性\n\
  ```\n\n你可以使用 `GridBagConstraints` 对象为组件指定其他约束。`GridBagConstraints` 对象中的所有约束均通过表\
  \ 1-3 列出的实例变量之一进行设置。该类还定义了许多常量，例如 `RELATIVE`、`REMAINDER` 等。请注意，所有实例变量均为小写。\n\n表\
  \ 1-3.\n\nGridBagConstraints 类的实例变量\n\n| 实例变量 | 默认值 | 可能的值 | 用途 |\n| --- | --- |\
  \ --- | --- |\n| `gridx` `gridy` | `RELATIVE` | `RELATIVE` `整数` | 组件所在网格单元格的列号和行号。\
  \ |\n| `gridwidth` `gridheight` | `1` | `整数` `RELATIVE` `REMAINDER` | 用于显示组件的网格单元格数量。\
  \ |\n| `fill` | `NONE` | `BOTH` `HORIZONTAL` `VERTICAL` `NONE` | 指定组件如何填充分配给它的网格单元格。\
  \ |\n| `ipadx` `ipady` | `0` | 整数 | 指定组件的内部填充，该填充会添加到其最小尺寸中。允许使用负整数，这将减小组件的最小尺寸。\
  \ |\n| `insets` | `(0,0,0,0)` | Insets 对象 | 指定组件边缘与其网格单元格之间的外部填充。允许使用负值。 |\n| `anchor`\
  \ | `CENTER` | `CENTER`, `NORTH`, `NORTHEAST`, `EAST`, `SOUTHEAST`, `SOUTH`, `SOUTHWEST`,\
  \ `WEST`, `NORTHWEST, PAGE_START`, `PAGE_END`, `LINE_START`, `LINE_END`, `FIRST_LINE_START`,\
  \ `FIRST_LINE_END`, `LAST_LINE_START`, `LAST_LINE_END, BASELINE`, `BASELINE_LEADING`,\
  \ `BASELINE_TRAILING`, `ABOVE_BASELINE`, `ABOVE_BASELINE_LEADING`, `ABOVE_BASELINE_TRAILING,BELOW_BASELINE`,\
  \ `BELOW_BASELINE_LEADING`, `BELOW_BASELINE_TRAILING` | 指定组件在显示区域中的放置位置。 |\n| `weightx`\
  \ `weighty` | `0.0` | 正 double 值 | 指定当容器调整大小时，额外空间（水平和垂直方向）如何在网格单元格之间分配。 |\n\n以下各节将详细讨论每个约束的效果。\n\
  \n#### gridx 和 gridy 约束\n\n`gridx` 和 `gridy` 约束指定组件在网格中放置的单元格。一个组件可以水平或垂直占据多个单元格。组件占据的所有单元格合起来称为组件的显示区域。\n\
  \n让我们给出 `gridx` 和 `gridy` 约束的精确定义。它们指定组件显示区域的起始单元格。默认情况下，每个组件只占据一个单元格。我将在下一节讨论 `gridwidth`\
  \ 和 `gridheight` 约束时，介绍如何让组件占据多个单元格。有关为组件设置 `gridx` 和 `gridy` 约束值的更多详细信息，请参考清单 1-16。\n\
  \n你可以为 `gridx` 和 `gridy` 约束中的一个或两个指定 `RELATIVE` 值。如果你为 `gridx` 和 `gridy` 指定了值（大于或等于零的整数），则由你决定组件放置的位置。如果你将其中一个或两个约束值指定为\
  \ `RELATIVE`，则布局管理器将确定 `gridx` 和/或 `gridy` 的值。如果你阅读 `GridBagLayout` 类的 API 文档，其中关于\
  \ `gridx` 和/或 `gridy` 的 `RELATIVE` 值的描述并不十分清晰。它只说当你将 `gridx` 和/或 `gridy` 的值指定为 `RELATIVE`\
  \ 时，组件将被放置在此前添加的组件旁边。API 文档中的这个描述简直是一团浆糊！以下段落将通过示例详细描述如何设置 `gridx` 和 `gridy` 的值。\n\
  \n##### 情况 #1\n\n你已经为 `gridx` 和 `gridy` 都指定了值。这是网格中的绝对定位情况。你的组件将根据你指定的 `gridx` 和\
  \ `gridy` 值进行放置。你已经在清单 1-16 中看到了这种类型的示例。\n\n\n\n##### 案例 #2\n\n你为 `gridx` 指定了一个值，并将\
  \ `gridy` 的值设置为 `RELATIVE`。在这种情况下，布局管理器需要确定 `gridy` 的值。让我们看一个例子。假设你有三个按钮要放置在网格中，并且你有一个\
  \ `container` 对象，其布局管理器设置为 `GridBagLayout`。以下代码片段将这三个按钮添加到网格中。图 1-28 显示了包含三个按钮的屏幕。\n\
  \n![A323071_2_En_1_Fig28_HTML.jpg](img/A323071_2_En_1_Fig28_HTML.jpg)\n\n图 1-28.\n\
  \n指定 gridx 并将 gridy 设置为 RELATIVE\n\n```\nGridBagConstraints gbc = new GridBagConstraints();\n\
  JButton b1 = new JButton(\"Button 1\");\nJButton b2 = new JButton(\"Button 2\");\n\
  JButton b3 = new JButton(\"Button 3\");\ngbc.gridx = 0;\ngbc.gridy = 0;\ncontainer.add(b1,\
  \ gbc);\ngbc.gridx = 0;\ngbc.gridy = GridBagConstraints.RELATIVE;\ncontainer.add(b2,\
  \ gbc);\ngbc.gridx = 1;\ngbc.gridy = GridBagConstraints.RELATIVE ; container.add(b3,\
  \ gbc);\n```\n\n按钮 `b1` 的放置没有混淆，因为你同时指定了 `gridx` 和 `gridy` 的值。它被放置在第一行（`gridy =\
  \ 0`）和第一列（`gridx = 0`）。\n\n对于按钮 `b2`，你指定了 `gridx = 0`。你希望它被放置在第一列，结果与你预期一致。你为 `b2`\
  \ 将 `gridy` 指定为 `RELATIVE`。这意味着你告诉 `GridBagLayout` 通过将 `b2` 放置在第一列（`gridx = 0`）来为其找到合适的行。由于第一行在第一列已经被\
  \ `b1` 占据，`b2` 可用的下一行是第二行，因此它被放置在那里。\n\n你为按钮 `b3` 设置了 `gridx = 1`。这意味着它应该被放置在第二列。你将其\
  \ `gridy` 指定为 `RELATIVE`。这意味着布局管理器需要在第二列中为其找到一行。由于第一行在第二列中没有放置任何组件，布局管理器将其放置在第一行。如果你将\
  \ `b3` 的 `gridx` 指定为 0，它会被放置在哪里？再次应用相同的逻辑。由于第一列在第一行和第二行已经分别有 `b1` 和 `b2`，`b3` 可用的下一行是第三行，布局管理器会将其放置在\
  \ `b2` 的正下方。\n\n##### 案例 #3\n\n你为 `gridy` 指定了一个值，并将 `gridx` 的值设置为 `RELATIVE`。在这种情况下，布局管理器需要确定\
  \ `gridx` 的值。也就是说，基于指定的行号值，布局管理器必须确定其列号。图 1-29 显示了当你使用以下代码片段时三个按钮的布局方式。以这种方式布局按钮的逻辑与上一个示例相同，不同之处在于这次布局管理器决定的是\
  \ `b2` 和 `b3` 的列号，而不是它们的行号。\n\n![A323071_2_En_1_Fig29_HTML.jpg](img/A323071_2_En_1_Fig29_HTML.jpg)\n\
  \n图 1-29.\n\n在 GridBagLayout 中指定 gridy 并将 gridx 设置为 RELATIVE\n\n```\ngbc.gridx =\
  \ 0;\ngbc.gridy = 0;\ncontainer.add(b1, gbc);\ngbc.gridx = GridBagConstraints.RELATIVE;\n\
  gbc.gridy = 0;\ncontainer.add(b2, gbc);\ngbc.gridx = GridBagConstraints.RELATIVE;\n\
  gbc.gridy = 1;\ncontainer.add(b3, gbc);\n```\n\n##### 案例 #4\n\n这是四种可能性中的最后一种，你将\
  \ `gridx` 和 `gridy` 都指定为 `RELATIVE`。布局管理器必须为正在添加的组件确定行号和列号。它将首先确定行号。组件的行将是当前行。哪一行是当前行？默认情况下，第一行（`gridy\
  \ = 0`）是当前行。当你添加一个组件时，你也可以指定其 `gridwidth` 约束。它的一个值是 `REMAINDER`，这意味着这是该行中的最后一个组件。如果你将一个组件添加到第一行，并将其\
  \ `gridwidth` 设置为 `REMAINDER`，则第二行将成为当前行。一旦布局管理器确定了组件的行号（即当前行），它就会将该组件放置在该行中最后添加的组件的下一列。`gridx`\
  \ 和 `gridy` 的默认值是 `RELATIVE`。现在你可以理解为什么清单 1-15 默认将所有按钮放置在第一行，该清单对所有按钮都使用了 `RELATIVE`\
  \ 作为 `gridx` 和 `gridy`。由于默认的 `gridwidth` 是 1，第一行始终是当前行。每当你添加一个按钮时，第一行（当前行）被分配为其行，其列则是该行中最后添加的按钮的下一列。让我们看一些你将\
  \ `gridx` 和 `gridy` 都设置为 `RELATIVE` 的例子。\n\n##### 示例 #1\n\n以下代码片段布局的按钮如图 1-30 所示：\n\
  \n![A323071_2_En_1_Fig30_HTML.jpg](img/A323071_2_En_1_Fig30_HTML.jpg)\n\n图 1-30.\n\
  \n将 gridx 和 gridy 都指定为 RELATIVE\n\n```\ngbc.gridx = 0;\ngbc.gridy = 0;\ncontainer.add(b1,\
  \ gbc);\ngbc.gridx = GridBagConstraints.RELATIVE;\ngbc.gridy = GridBagConstraints.RELATIVE;\n\
  container.add(b2, gbc);\ngbc.gridx = GridBagConstraints.RELATIVE;\ngbc.gridy = 1;\n\
  container.add(b3, gbc);\n```\n\n你通过指定 `gridx = 0` 和 `gridy = 0` 对 `b1` 使用了绝对定位。这导致\
  \ `b1` 被放置在第一行和第一列。你为 `b2` 将 `gridx` 和 `gridy` 都指定为 `RELATIVE`。布局管理器必须为 `b2` 确定行号和列号。它查看当前行，默认情况下是第一行。因此，它将\
  \ `b2` 的行号设置为 0。它发现第一列已经放置了一个组件（`b1`）。因此，它将下一列（即第二列）设置为 `b2` 的列。在这里你看到 `b2` 被放置在第一行和第二列。理解\
  \ `b3` 的放置很简单。由于你指定了其 `gridy = 1`，它被放置在第二行。其 `gridx` 是 `RELATIVE`，并且由于第二行中第一列可用，它被放置在第一列。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n##### 示例 #2\n\n以下代码片段按照图\
  \ 1-31 所示布局了这些按钮。请注意，`b1` 按钮被放置在其可用空间的中心，这是默认行为。您可以使用 `anchor` 属性自定义组件在其分配空间内的位置，我稍后会讨论这一点。\n\
  \n![A323071_2_En_1_Fig31_HTML.jpg](img/A323071_2_En_1_Fig31_HTML.jpg)\n\n图 1-31.\n\
  \n将 gridx 和 gridy 指定为 RELATIVE，并将 gridwidth 指定为 REMAINDER\n\n```\ngbc.gridx = 0;\n\
  gbc.gridy = 0;\ngbc.gridwidth = GridBagConstraints.REMAINDER; // 行中的最后一个组件\ncontainer.add(b1,\
  \ gbc);\ngbc.gridx = GridBagConstraints.RELATIVE;\ngbc.gridy = GridBagConstraints.RELATIVE;\n\
  gbc.gridwidth = 1; // 重置为默认值\ncontainer.add(b2, gbc);\ngbc.gridx = GridBagConstraints.RELATIVE;\n\
  gbc.gridy = 1;\ncontainer.add(b3, gbc);\n```\n\n您为 `b1` 指定了 `gridx = 0` 和 `gridy\
  \ = 0`。这次，您为 `b1` 指定了 `gridwidth` 为 `REMAINDER`。这意味着 `b1` 是第一行中的最后一个组件。由于这是添加到第一行的唯一组件，它便成为该行中的第一个也是最后一个组件。在\
  \ `b1` 以其 `gridwidth` 为 `REMAINDER` 添加之后，第二行成为当前行。对于 `b2`，`gridx` 和 `gridy` 被设置为\
  \ `RELATIVE`。布局管理器会将第二行（`gridy = 1`）设置为其行号。由于在 `b2` 之前没有组件放置在第二行，它将成为该行中的第一个组件。这导致\
  \ `b2` 被放置在第二行第一列。请注意，您为 `b2` 和 `b3` 将 `gridwidth` 的值设置为 1。确定 `b3` 的位置很简单。由于您将其\
  \ `gridy` 指定为 `1`（第二行），它被放置在第二行。其 `gridx` 为 `RELATIVE`。由于 `b2` 已经在第一列，它便被放置在第二列。\n\
  \n#### gridwidth 和 gridheight 约束\n\n`gridwidth` 和 `gridheight` 约束分别指定了组件显示区域的宽度和高度。两者的默认值都是\
  \ `1`。也就是说，默认情况下，一个组件被放置在一个单元格中。如果您为一个组件指定 `gridwidth = 2`，其显示区域将跨越两个单元格的宽度。如果您为一个组件指定\
  \ `gridheight = 2`，其显示区域将跨越两个单元格的高度。如果您使用过 HTML 表格，可以将 `gridwidth` 比作 `colspan`，将\
  \ `gridheight` 比作 `rowspan`，它们是 HTML 表格中单元格的属性。\n\n您可以为 `gridwidth` 和 `gridheight`\
  \ 指定两个预定义的常量。它们是 `REMAINDER` 和 `RELATIVE`。`gridwidth` 的 `REMAINDER` 值意味着该组件将从其 `gridx`\
  \ 单元格跨越到该行的剩余部分。换句话说，它是该行中的最后一个组件。`gridheight` 的 `REMAINDER` 值表示它是该列中的最后一个组件。`gridwidth`\
  \ 的 `RELATIVE` 值表示该组件显示区域的宽度将从其 `gridx` 开始，到该行的倒数第二个单元格结束。`gridheight` 的 `RELATIVE`\
  \ 值表示该组件显示区域的高度将从其 `gridy` 开始，到倒数第二个单元格结束。让我们以 `gridwidth` 为例各举一个例子。您可以将这个概念扩展到\
  \ `gridheight`。唯一的区别在于 `gridwidth` 影响组件显示区域的宽度，而 `gridheight` 影响高度。\n\n以下代码片段向一个容器中添加了九个按钮——第一行三个，第二行六个：\n\
  \n```\n// 将组件扩展以填充整个单元格\ngbc.fill = GridBagConstraints.BOTH;\ngbc.gridx = 0;\ngbc.gridy\
  \ = 0;\ncontainer.add(new JButton(\"Button 1\"), gbc);\ngbc.gridx = 1;\ngbc.gridy\
  \ = 0;\ngbc.gridwidth = GridBagConstraints.RELATIVE;\ncontainer.add(new JButton(\"\
  Button 2\"), gbc);\ngbc.gridx = GridBagConstraints.RELATIVE; gbc.gridy = 0;\ngbc.gridwidth\
  \ = GridBagConstraints.REMAINDER;\ncontainer.add(new JButton(\"Button 3\"), gbc);\n\
  // 将 gridwidth 重置为其默认值 1\ngbc.gridwidth = 1;\n// 在第二行放置六个 JButton\ngbc.gridy = 1;\n\
  for (int i = 0; i < 6; i++) {\ngbc.gridx = i;\ncontainer.add(new JButton(\"Button\
  \ \" + (i + 4)), gbc);\n}\n```\n\n第一条语句对您来说是新的。它将 `GridBagConstraints` 的 `fill`\
  \ 实例变量设置为 `BOTH`，这表示添加到单元格的组件将在两个方向（水平和垂直）上扩展以填充整个单元格区域。我稍后会更详细地讨论这一点。第一个按钮被放置在第一行第一列。\n\
  \n第二个按钮被放置在第一行第二列。其 `gridwidth` 被设置为 `RELATIVE`，这意味着它将从第二列（`gridx = 1`）跨越到该行的倒数第二列。第一行的最后一列是哪一列？您还不知道。您必须查看所有添加到\
  \ `GridBagLayout` 的组件，以找出网格中的最大行数和列数。目前，您知道第二个按钮从第二列开始，但您不知道它将在哪一列结束（或它将扩展到哪一列）。\n\
  \n让我们看看第三个按钮。您为其指定了 `gridy = 0`，这意味着它应该被放置在第一行。您将其 `gridx` 设置为 `RELATIVE`，这意味着它将被放置在第一行中第二个按钮之后。您将其\
  \ `gridwidth` 值设置为 `REMAINDER`，这意味着这是第一行中的最后一个组件。有一个有趣的点需要注意。第二个按钮将根据需要从第二列扩展到倒数第二列。您说第三个按钮是第一行中的最后一个组件，它应该占据剩余的单元格。结果是，由于第二个按钮的\
  \ `gridwidth` 使用了贪婪的 `RELATIVE` 值，第三个按钮始终只会剩下一个单元格（最后一个单元格）。\n\n在第二行，您添加了六个按钮。每行的单元格总数由一行中的最大列数决定。因此，每一行（第一行和第二行）都将有六个单元格。您已将\
  \ `gridwidth` 设置为其默认值 `1`，因此第二行中的每个按钮将只占据一个单元格。在第一行中，第一个按钮占据一个单元格，第三个按钮占据一个单元格，第二个按钮占据剩余的四个单元格，如图\
  \ 1-32 所示。\n\n![A323071_2_En_1_Fig32_HTML.jpg](img/A323071_2_En_1_Fig32_HTML.jpg)\n\
  \n图 1-32.\n\n指定 gridwidth 和 gridheight\n\n\n\n#### fill 约束\n\n`GridBagLayout` 会为每个组件分配其首选宽度和高度。列的宽度由该列中最宽的组件决定。同样，行的高度由该行中最高的组件决定。`fill`\
  \ 约束值表示当组件的显示区域大于其自身大小时，组件如何水平和垂直扩展。请注意，`fill` 约束仅在组件尺寸小于其显示区域时使用。\n\n`fill` 约束有四个可能的值：`NONE`、`HORIZONTAL`、`VERTICAL`\
  \ 和 `BOTH`。其默认值为 `NONE`，表示“不调整组件大小”。值 `HORIZONTAL` 表示“水平扩展组件以填充其显示区域”。值 `VERTICAL`\
  \ 表示“垂直扩展组件以填充其显示区域”。值 `BOTH` 表示“水平和垂直扩展组件以填充其显示区域”。\n\n以下代码片段将九个按钮添加到一个三行三列的网格中，如图\
  \ 1-33 所示。\n\n![A323071_2_En_1_Fig33_HTML.jpg](img/A323071_2_En_1_Fig33_HTML.jpg)\n\
  \n图 1-33.\n\n在 GridBagLayout 中为组件指定 fill 约束\n\n```\ngbc.gridx = 0; gbc.gridy = 0;\n\
  container.add(new JButton(\"Button 1\"), gbc);\ngbc.gridx = 1; gbc.gridy = 0;\n\
  container.add(new JButton(\"Button 2\"), gbc);\ngbc.gridx = 2; gbc.gridy = 0;\n\
  container.add(new JButton(\"Button 3\"), gbc);\ngbc.gridx = 0; gbc.gridy = 1;\n\
  container.add(new JButton(\"Button 4\"), gbc);\ngbc.gridx = 1; gbc.gridy = 1;\n\
  container.add(new JButton(\"This is a big Button 5\"), gbc);\ngbc.gridx = 2; gbc.gridy\
  \ = 1;\ncontainer.add(new JButton(\"Button 6\"), gbc);\ngbc.gridx = 0; gbc.gridy\
  \ = 2;\ncontainer.add(new JButton(\"Button 7\"), gbc);\ngbc.gridx = 1; gbc.gridy\
  \ = 2;\ngbc.fill = GridBagConstraints.HORIZONTAL;\ncontainer.add(new JButton(\"\
  Button 8\"), gbc);\ngbc.gridx = 2; gbc.gridy = 2;\ngbc.fill = GridBagConstraints.NONE;\n\
  container.add(new JButton(\"Button 9\"), gbc);\n```\n\n第五个按钮决定了第二列的宽度，因为它是该列中最宽的\
  \ `JButton`。请注意第一行第二列中的空白区域。之所以有空白区域，是因为第二个按钮的 `fill` 值为 `NONE`（默认值），并且第二个按钮没有扩展以占据其显示区域的整个宽度，而是保持其首选大小。再看第八个按钮。你指定了它应该水平扩展，它也确实这样做了，以匹配其显示区域的宽度。\n\
  \n#### ipadx 和 ipady 约束\n\n`ipadx` 和 `ipady` 约束用于指定组件的内部填充。它们会增加组件的首选大小和最小大小。默认情况下，这两个约束都设置为零。允许使用负值。这些约束的负值会减小组件的首选大小和最小大小。如果为\
  \ `ipadx` 指定了值，组件的首选宽度和最小宽度将增加 `2*ipadx`。同样，如果为 `ipady` 指定了值，组件的首选高度和最小高度将增加 `2*ipady`。这些选项很少使用。`ipadx`\
  \ 和 `ipady` 的值以像素为单位指定。\n\n#### insets 约束\n\n`insets` 约束指定组件周围的外部填充。它会在组件周围添加空间。你需要将\
  \ `insets` 值指定为 `java.awt.Insets` 类的对象。它有一个构造函数：`Insets(int top, int left, int bottom,\
  \ int right)`。你可以为组件的所有四个边指定填充。默认情况下，`insets` 的值设置为一个 `Insets` 对象，其四个边的像素均为零。以下代码片段将九个按钮添加到一个\
  \ 3X3 的网格中，所有按钮的四个边都有 5 像素的 insets。生成的布局如图 1-34 所示。请注意，你已为所有按钮指定了 `fill` 约束为 `BOTH`，但由于它们的\
  \ `insets` 约束，你仍然可以看到相邻按钮之间的间隙。`insets` 约束告诉布局管理器在组件边缘和显示区域边缘之间留出空间。\n\n![A323071_2_En_1_Fig34_HTML.jpg](img/A323071_2_En_1_Fig34_HTML.jpg)\n\
  \n图 1-34.\n\n在 GridBagLayout 中为组件指定 insets\n\n```\ngbc.fill = GridBagConstraints.BOTH;\n\
  gbc.insets = new Insets(5, 5, 5, 5);\nint count = 1;\nfor (int y = 0; y < 3; y++)\
  \ {\ngbc.gridy = y;\nfor(int x = 0; x < 3; x++) {\ngbc.gridx = x;\ncontainer.add(new\
  \ JButton(\"Button \" + count++), gbc);\n}\n}\n```\n\n\n\n#### 锚点约束\n\n`anchor`（锚点）约束指定了当组件尺寸小于其显示区域时，组件应如何放置在该区域内。默认情况下，其值设置为`CENTER`，这意味着组件将居中显示在其显示区域内。\n\
  \n`GridBagConstraints`类中定义了许多常量，可用作`anchor`约束的值。所有常量可分为三类：绝对定位、基于方向和基于基线。\n\n绝对定位的值包括`NORTH`、`SOUTH`、`WEST`、`EAST`、`NORTHWEST`、`NORTHEAST`、`SOUTHWEST`、`SOUTHEAST`和`CENTER`。图\
  \ 1-35 展示了使用不同绝对锚点值时，组件在单元格内的放置方式。请注意，图中所有九个组件的`fill`约束均设置为`NONE`。\n\n![A323071_2_En_1_Fig35_HTML.jpg](img/A323071_2_En_1_Fig35_HTML.jpg)\n\
  \n图 1-35.\n\n绝对锚点值及其对组件在显示区域中位置的影响\n\n基于方向的值根据容器的`ComponentOrientation`属性来使用。它们包括`PAGE_START`、`PAGE_END`、`LINE_START`、`LINE_END`、`FIRST_LINE_START`、`FIRST_LINE_END`、`LAST_LINE_START`和`LAST_LINE_END`。图\
  \ 1-36 和图 1-37 展示了当容器方向设置为`LEFT_TO_RIGHT`和`RIGHT_TO_LEFT`时，使用基于方向的锚点值所产生的效果。您可能会注意到，基于方向的值会根据容器所使用的方向自动调整。\n\
  \n![A323071_2_En_1_Fig37_HTML.jpg](img/A323071_2_En_1_Fig37_HTML.jpg)\n\n图 1-37.\n\
  \n当容器方向为 RIGHT_TO_LEFT 时，基于方向的锚点值及其效果\n\n![A323071_2_En_1_Fig36_HTML.jpg](img/A323071_2_En_1_Fig36_HTML.jpg)\n\
  \n图 1-36.\n\n当容器方向为 LEFT_TO_RIGHT 时，基于方向的锚点值及其效果\n\n当您希望将一行中的组件沿其基线对齐时，可使用基于基线的锚点值。什么是组件的基线？基线是相对于文本而言的。它是一条假想的水平线，文本的字符就坐落在这条线上。一个组件可能具有基线。通常，组件的基线是指从其顶部边缘到其所显示文本的基线之间的像素距离。您可以通过组件的`getBaseline(int\
  \ width, int height)`方法获取其基线值。请注意，您需要传入组件的宽度和高度才能获取其基线。并非每个组件都有基线。如果组件没有基线，此方法将返回`–1`。图\
  \ 1-38 展示了三个组件——一个`JLabel`、一个`JTextField`和一个`JButton`——在`GridBagLayout`中沿其基线对齐排列。\n\
  \n![A323071_2_En_1_Fig38_HTML.jpg](img/A323071_2_En_1_Fig38_HTML.jpg)\n\n图 1-38.\n\
  \n一个 JLabel、一个 JTextField 和一个 JButton 沿其基线对齐\n\n`GridBagLayout`中的每一行都可以有一个基线。图 1-38\
  \ 展示了一行包含三个组件的基线。图中的一条实线水平线表示基线。请注意，这条实线水平基线是一条假想线，并非真实存在。此处仅用于演示基线的概念。只有当至少一个组件具有有效基线，并且其锚点值为`BASELINE`、`BASELINE_LEADING`或`BASELINE_TRAILING`时，`GridBagLayout`中的行才具有基线。图\
  \ 1-39 展示了一些基于基线的锚点值在实际中的应用。表 1-4 列出了所有可能的值及其描述。\n\n表 1-4.\n\n基于基线的锚点值及描述\n\n| 基于基线的锚点值\
  \ | 垂直对齐 | 水平对齐 |\n| --- | --- | --- |\n| `BASELINE` | 行基线 | 居中 |\n| `BASELINE_LEADING`\
  \ | 行基线 | 沿起始边缘对齐** |\n| `BASELINE_TRAILING` | 行基线 | 沿结束边缘对齐*** |\n| `ABOVE_BASELINE`\
  \ | 底部边缘接触起始行的基线 | 居中 |\n| `ABOVE_BASELINE_LEADING` | 底部边缘接触起始行的基线* | 沿起始边缘对齐**\
  \ |\n| `ABOVE_BASELINE_TRAILING` | 底部边缘接触起始行的基线 | 沿结束边缘对齐*** |\n| `BELOW_BASELINE`\
  \ | 顶部边缘接触起始行的基线* | 居中 |\n| `BELOW_BASELINE_LEADING` | 顶部边缘接触起始行的基线 | 沿起始边缘对齐**\
  \ |\n| `BELOW_BASELINE_TRAILING` | 顶部边缘接触起始行的基线* | 沿结束边缘对齐*** |\n| *起始行：术语“起始行”仅适用于组件跨越多行的情况。否则，将其理解为组件所在的行。如果某行没有基线，则组件垂直居中。\
  \ **对于`LEFT_TO_RIGHT`方向，起始边缘是左边缘；对于`RIGHT_TO_LEFT`方向，起始边缘是右边缘。 ***对于`LEFT_TO_RIGHT`方向，结束边缘是右边缘；对于`RIGHT_TO_LEFT`方向，结束边缘是左边缘。\
  \ |\n\n![A323071_2_En_1_Fig39_HTML.jpg](img/A323071_2_En_1_Fig39_HTML.jpg)\n\n图\
  \ 1-39.\n\n一些基于基线的锚点值在实际中的应用\n\n\n\n#### weightx 和 weighty 约束\n\n`weightx` 和 `weighty`\
  \ 约束控制容器中的额外空间如何在行和列之间分配。`weightx` 和 `weighty` 的默认值为零。它们可以取任何非负值。\n\n图 1-40 展示了一个使用\
  \ `GridBagLayout` 并包含九个按钮的 `JFrame`。图 1-41 展示了同一个 `JFrame` 在水平和垂直方向扩展后的效果。\n\n![A323071_2_En_1_Fig41_HTML.jpg](img/A323071_2_En_1_Fig41_HTML.jpg)\n\
  \n图 1-41.\n调整大小后，一个包含九个按钮且使用 GridBagLayout 的 JFrame\n\n![A323071_2_En_1_Fig40_HTML.jpg](img/A323071_2_En_1_Fig40_HTML.jpg)\n\
  \n图 1-40.\n一个包含九个按钮且使用 GridBagLayout 的 JFrame，无额外空间\n\n请注意按钮组周围产生的额外空间。您已将所有按钮的\
  \ `fill` 约束设置为 `BOTH`，因此所有按钮都代表了 `GridBagLayout` 中的单元格网格。`weightx` 和 `weighty` 约束保持其默认值零。当所有组件的\
  \ `weightx` 和 `weighty` 约束都设置为零时，容器中的任何额外空间都会出现在容器边缘与单元格网格边缘之间。\n\n`weightx` 值决定了额外水平空间在列之间的分配，而\
  \ `weighty` 值则负责在行之间分配额外垂直空间。如果所有组件具有相同的 `weightx` 和 `weighty`，则额外空间会在它们之间平均分配。图\
  \ 1-42 展示了所有九个按钮的 `weightx` 和 `weighty` 都设置为 1.0 时的效果。您可以为 `weightx` 和/或 `weighty`\
  \ 设置任何正值。只要它们对所有组件都相同，额外空间就会在它们之间平均分配。\n\n![A323071_2_En_1_Fig42_HTML.jpg](img/A323071_2_En_1_Fig42_HTML.jpg)\n\
  \n图 1-42.\n调整大小后，一个包含九个按钮且使用 GridBagLayout 的 JFrame。所有按钮的 weightx 和 weighty 都设置为\
  \ 1。额外空间在所有按钮的显示区域之间平均分配。\n\n以下是基于 `weightx` 值计算每列额外空间的方法。假设一个使用 `GridBagLayout`\
  \ 的容器在水平方向上扩展，产生了 `ES` 像素的额外空间。假设网格有三列三行。布局管理器会找出每列中组件 `weightx` 值的最大值。假设 `cwx1`、`cwx2`\
  \ 和 `cwx3` 分别是第 1 列、第 2 列和第 3 列的 `weightx` 最大值。第 1 列将获得 `(cwx1 * ES)/(cwx1 + cwx2\
  \ + cwx3)` 的额外空间。第 2 列将获得 `(cwx2 * ES)/(cwx1 + cwx2 + cwx3)` 的额外空间。第 3 列将获得 `(cwx3\
  \ * ES)/(cwx1 + cwx2 + cwx3)` 的额外空间。为了维持单元格网格，必须使用该列中的最大 `weightx` 值来计算分配给该列的额外空间。使用\
  \ `weighty` 在单元格之间分配额外垂直空间的计算方法类似。\n\n提示\n\n`weightx` 和 `weighty` 约束会影响组件的显示区域大小以及组件本身的大小。通常，`weightx`\
  \ 和 `weighty` 的值在 0.0 到 1.0 之间。但是，您可以使用任何非负值。组件的大小还会受到其他约束的影响，例如 `fill`、`gridwidth`、`gridheight`\
  \ 等。如果您希望组件在有额外空间时能够扩展，则需要将其 `fill` 约束设置为 `HORIZONTAL`、`VERTICAL` 或 `BOTH`。您也可以在将组件添加到容器后，使用\
  \ `GridBagLayout` 类的 `setConstraints(Component c, GridBagConstraints cons)` 方法为其设置\
  \ `GridBagLayout` 中的约束。\n\n### SpringLayout\n\n`SpringLayout` 类（位于 `javax.swing`\
  \ 包中）的实例代表一个 `SpringLayout` 管理器。回想一下，布局管理器的工作是计算容器中组件的四个属性（x、y、宽度和高度）。换句话说，它负责在容器内定位组件并计算其大小。`SpringLayout`\
  \ 管理器用弹簧来表示组件的这四个属性。手动编码比较繁琐。它专为 GUI 构建工具而设计。在本节中，我将通过手动编写一些简单示例来介绍此布局的基础知识。\n\n\
  什么是弹簧？在 `SpringLayout` 管理器的上下文中，您可以将弹簧想象成机械弹簧，它可以被拉伸、压缩或保持正常状态。`Spring` 类的对象代表 `SpringLayout`\
  \ 中的一个弹簧。一个 `Spring` 对象有四个属性：最小值、首选值、最大值和当前值。您可以将这四个属性视为其四种长度类型。弹簧在压缩最紧时具有最小值。在正常状态（既不压缩也不拉伸）下，它具有首选值。在拉伸最紧时，它具有最大值。它在任何给定时刻的值就是其当前值。当弹簧的最小值、首选值和最大值相同时，它被称为支柱。\n\
  \n如何创建弹簧？`Spring` 类没有公共构造函数。它包含用于创建弹簧的工厂方法。要从头开始创建弹簧或支柱，您可以使用其重载的 `constant()` 静态方法。您也可以使用组件的宽度或高度来创建弹簧。弹簧的最小值、首选值和最大值是根据组件宽度或高度的相应值设置的。以下是创建弹簧的几个示例：\n\
  \n```\n// 创建一个 10 像素的支柱\nSpring strutPadding = Spring.constant(10);\n// 创建一个最小值为\
  \ 10、首选值为 25、最大值为 50 的弹簧\nSpring springPadding = Spring.constant(10, 25, 50);\n\
  // 根据名为 c1 的组件的宽度创建弹簧\nSpring s1 = Spring.width(c1);\n// 根据名为 c1 的组件的高度创建弹簧\nSpring\
  \ s2 = Spring.height(c1);\n```\n\n`Spring` 类包含一些实用方法，允许您操作弹簧属性。您可以使用 `sum()` 方法将两个弹簧相加来创建一个新弹簧，如下所示：\n\
  \n```\n// 假设 s1 和 s2 是两个弹簧\nSpring s3 = Spring.sum(s1, s2);\n```\n\n`sum` 的计算不是在语句执行时进行的。相反，弹簧\
  \ `s3` 存储了 `s1` 和 `s2` 的引用。每当 `s1`、`s2` 或两者都发生变化时，就会计算 `s3` 的值。在这种情况下，`s3` 的行为就像您将弹簧\
  \ `s1` 和 `s2` 串联起来一样。\n\n您也可以通过从一个弹簧中减去另一个弹簧来创建弹簧。但是，没有名为 `subtract()` 的方法。有一个名为\
  \ `minus()` 的方法，它返回一个弹簧的负值。您可以使用 `sum()` 和 `minus()` 方法的组合来执行减法，如下所示：\n\n```\n//\
  \ 执行 s1 – s2，等同于 s1 + (-s2)\nSpring s4 = Spring.sum(s1, Spring.minus(s2));\n```\n\
  \n要获取两个弹簧 `s1` 和 `s2` 的最大值，您可以使用 `Spring.max(s1, s2)`。请注意，没有对应的名为 `min()` 的方法。但是，您可以通过组合使用\
  \ `minus()` 和 `max()` 方法来模拟它，如下所示：\n\n```\n// 2 和 5 的最小值是 –2 和 –5 的最大值的负值。要获取两个弹簧\
  \ s1 和 s2 的最小值，\n// 您可以使用 –s1 和 –s2 的最大值的负值\nSpring min = Spring.minus(Spring.max(Spring.minus(s1),\
  \ Spring.minus(s2)));\n```\n\n您还可以使用 `scale()` 方法获取另一个弹簧的分数值。例如，如果您有一个弹簧 `s1`，并且想要创建一个其值为\
  \ `s1` 的 40% 的弹簧，您可以通过将 0.40f 作为第二个参数传递给 `scale()` 方法来实现，如下所示：\n\n\n```java\nString\
  \ fractionSpring = Spring.scale(s1, 0.40f);\n```\n\n提示\n\n创建弹簧后，您无法更改其最小值、首选值和最大值。您可以通过使用其\
  \ `setValue()` 方法来设置其当前值。\n\n您刚刚对弹簧进行了大量讨论。现在是时候看看它们实际运行的效果了。如何将组件添加到使用 `SpringLayout`\
  \ 的容器中？最简单的形式是使用容器的 `add()` 方法来添加组件。清单 1-17 将 `JFrame` 内容面板的布局设置为 `SpringLayout`，并向其中添加了两个按钮。图\
  \ 1-43 显示了运行程序时的 `JFrame`。\n\n![A323071_2_En_1_Fig43_HTML.jpg](img/A323071_2_En_1_Fig43_HTML.jpg)\n\
