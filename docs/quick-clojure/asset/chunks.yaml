  trans: "\n### 审查库\n\n查看我们的辅助库时，可以看到我采用了极其简单且扁平的文件夹结构（清单 12-19）。这表明，如果你的层级结构不需要很深或嵌套，完全可以避免这样做。\n\
    \n```\n.\n├── src\n├── spurious_aws_sdk_helper\n├── core.clj\n├── dynamodb.clj\n\
    ├── s3.clj\n├── sqs.clj\n├── utils.clj\n├── project.clj\n清单 12-19.\nClojure 库的简单树形结构\n\
    ```\n\n我有一个单独的 `src` 文件夹，其中又有一个名为 `spurious_aws_sdk_helper` 的文件夹，里面包含了库所需的所有 Clojure\
    \ 文件。`core.clj` 负责加载其余文件：`dynamodb.clj`、`s3.clj` 和 `sqs.clj`。\n\n`utils.clj` 文件（正如你所料）包含大量实用函数。该文件中只有两个函数是公开的，以便我们的消费应用程序可以调用它们来启动并运行服务；其余函数都是私有的，仅供库内部使用。\n\
    \n注意\n\n请记住，你可以通过连字符 `defn-` 来判断函数何时被定义为私有（公开函数使用你已经熟悉的标准 `defn` 宏）。\n\n一个值得关注的点是，`core`\
    \ 命名空间中的 `configure` 函数如何使用多参函数，以便根据是否提供了 `opts` 映射来执行不同的行为。\n\n```\n(defn configure\n\
    ([type]\n(s3/setup  type)\n(ddb/setup type))\n([type opts]\n(if-let [name   (:s3\
    \  opts)] (s3/setup  type name))\n(if-let [name   (:sqs opts)] (sqs/setup type\
    \ name))\n(if-let [schema (:ddb opts)]\n(ddb/setup type (yaml/parse-string schema)))))\n\
    清单 12-20.\n简单多参函数示例\n```\n\n如清单 12-20 所示，如果没有提供 `opts`，我们只需为 S3 和 DynamoDB 调用\
    \ `setup` 方法；否则，如果提供了 `opts` 参数，我们使用 `if-let` 从提供的 `opts` 哈希中提取相关键（例如 `:s3`、`:sqs`\
    \ 或 `:ddb`），然后将其与 `name` 符号关联。我们将再次为每个服务调用 `setup` 方法，这次会传入 `name`。\n\n注意\n\n\
    我们之前没见过 `if-let`，但它是一个极其有用的宏，它允许我们仅在 `let` 绑定能够成功将数据解构到指定符号时，才执行一段代码（你还有类似的选项，例如\
    \ `when-let` 和 `letfn`，值得进一步探索）。\n\n### 准备部署\n\n现在，假设你有一个想要部署的项目（如果是库，那么如前所述，你需要将库部署到\
    \ Clojars，这样其他应用程序才能使用它）。\n\n否则，如果这是一个标准应用程序而非库，那么 Leiningen 也提供了一个单一命令来帮助我们打包应用程序，使其能够轻松部署到生产服务器并几乎无需繁琐操作即可运行：`lein\
    \ uberjar`。\n\n当在 `project.clj` 中正确配置后（稍后会介绍），`uberjar` 命令将生成一个包含项目代码及其所有依赖项的单一\
    \ jar 文件。如果你之前没有处理过 `.jar` 格式，清单 12-21 将展示如何从命令行执行 jar 文件。\n\n```\njava -jar my_jar_file.jar\
    \   \n清单 12-21.\n通过终端执行 Jar 文件的示例\n```\n\n如果你使用 `lein-tar` 插件，³¹ 那么你可以使用 `lein\
    \ tar` 命令；如果你使用 `lein-ring`，³² 那么你可以使用 `lein ring uberjar`（或者如果需要兼容旧服务器，可以使用 `lein\
    \ ring war`）来构建 Web 应用程序。\n\n现在，回到标准的 `lein uberjar` 命令，我之前提到你需要配置应用程序才能使该命令正常工作。你需要修改\
    \ `project.clj`，添加一个 `:main` 键，并指定一个指向应用程序入口点的命名空间。\n\n如果你查看示例应用程序，³³ 你会看到我将命名空间设置为\
    \ `:main ^:skip-aot spurious-clojure-example.repl`。该命名空间指向 `src/spurious_clojure_example/repl.clj`，并且在该文件中我添加了一个名为\
    \ `main` 的新函数。`main` 函数负责启动 Web 服务器（参见清单 12-22）。\n\n```\n(defn -main []\n(start-server))\n\
    清单 12-22.\nClojure 示例应用中的 main 函数示例\n```\n\n注意\n\n如前所述，我们的主入口点还需要 `(gen-class)`，所以你会注意到我也将其包含在了文件中。\n\
    \n实际上，这一切归结为（取决于你的应用程序功能）：修改 `project.clj` 中的 `:main` 键，使其指向一个包含 `main` 函数的文件，该函数以所需方式引导你的应用程序，并确保在文件顶部添加\
    \ `(gen-class)`（请参阅本章前面的内容以了解原因）。\n"
- fmt: '# Summary


    By the end of this chapter, we have gained a good understanding of the basics
    of using `Leiningen` and constructing a project using specific templates (such
    as `compojure-app`) as well as the differences between the various built-in templates.


    I’ve not delved too deeply into building web applications because the requirements
    are too vast and unique for each project. If you’re interested in the topic of
    web development with `Clojure`, then I would strongly suggest reading *Web Development
    with Clojure*.[^(34)](#A453572_1_En_12_Chapter.html#Fn34) It’s a great introduction
    to the sheer wealth of `Clojure` libraries and plugins that can be composed together
    to build a robust web-based application.


    In the next chapter, we’ll be looking at how to build a command-line interface
    application. It’ll cover the basics of the setup and the various tools available
    for developing this kind of application. This should help you to expand your vision
    of `Clojure` beyond just a web-based programming language and open up new possibilities
    for useful business tools that can take advantage of your operating system.


    ## Footnotes


