    \n`deftype` 的目的是最终生成一个行为非常类似于典型 Java 类的类型。因此，在接下来的示例（代码清单 11-3）中，我们将看到，当我们初始化这个类型（类）时，我们能够将自己的特定数据传递给构造函数（随后在\
