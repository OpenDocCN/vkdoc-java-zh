    The second test validates that the web server returns the status code 404 when
    a request is received by the web server for a path that it isn’t configured to
    handle (so, in this case, a request to the nonsensical path `"/invalid"` was made).


    In order to run these tests, we need to utilize a sub-command of Leiningen: `lein
    test`. This command will locate all the tests within the test directory and execute
    them one by one. We can also execute only specific test suites by specifying the
    relevant namespace. For example, `lein test :only foo.test.handler/test-app`.


    Note


    `test-app` is the containing suite of tests defined in `tests/handler.clj`, and
    within that we have a set of testing “contexts” that allow us to display specific
    output messages.


    If all is well, you’ll see the output shown in Listing [12-10](#A453572_1_En_12_Chapter.html#Par68);
    otherwise, if there’s an error (let’s say we changed the expected status code
    output for a successful request to be 202 instead of 200) you’ll see what’s shown
    in Listing [12-11](#A453572_1_En_12_Chapter.html#Par69).


    ```

    lein test foo.test.handler

    Ran 1 tests containing 3 assertions.

    0 failures, 0 errors.

    Listing 12-10.

    Successful Test Output

    ```


    ```

    lein test foo.test.handler

    lein test :only foo.test.handler/test-app

    FAIL in (test-app) (handler.clj:9)

    main route

    expected: (= (:status response) 202)

    actual: (not (= 200 202))

    Ran 1 tests containing 3 assertions.

    1 failures, 0 errors.

    Tests failed.

    Listing 12-11.

    Failed Test Output

    ```


    That covers things as far as the basic setup and usage of a Compojure web application
    are concerned. There’s obviously lots more to what Compojure can do and how it
    can be configured, but, as mentioned earlier, there are entire books based on
    the topic of Clojure web development, so let’s instead now turn our attention
    to the set of templates that are included as part of Leiningen, as this will show
    us what other types of applications we can build.'
  trans: '

    ## Compojure 树形结构


    让我们快速了解一下使用命令 `lein new compojure-app foo` 创建的 Compojure Web 服务器的树形结构（参见列表 12-6）。


    Compojure 应用的结构与其他应用并无太大差异（当我们查看 Leiningen 中提供的其他模板时就会发现这一点），但通过 Compojure 模板，我们可以看到有一个
    `src` 目录，其中包含了 Web 服务器应用的所有源代码。


    与 `src` 目录并列的是 `test` 目录，其中包含一组样板测试，以便我们了解典型测试用例的样式；此外还有一个 `resources` 目录，用于存放静态资源，例如
    JavaScript、CSS 样式表和图片。


    ```

    ├── README.md

    ├── project.clj

    ├── resources

    │   └── public

    │       ├── css

    │       │   └── screen.css

    │       ├── img

    │       └── js

    ├── src

    │   └── foo

    │       ├── handler.clj

    │       ├── models

    │       ├── repl.clj

    │       ├── routes

    │       │   └── home.clj

    │       └── views

    │           └── layout.clj

    └── test

    └── foo

    └── test

    └── handler.clj

    列表 12-6.

    Compojure 树形结构

    ```


    在列表 12-7 中，我们可以看到主文件 `home.clj` 是如何工作的。它包含了我们在前几章学到的许多概念，例如命名空间、引入依赖并确定其引用方式，以及定义负责定义应用应处理的不同“路由”和“处理器”本身的函数。


    让我们快速浏览一下 `home.clj`，以确保我们理解其设置以及应用自动配置了哪些路由（作为样板构建的一部分）。


    ```

    (ns foo.routes.home

    (:require [compojure.core :refer :all]

    [foo.views.layout :as layout]))

    (defn home []

    (layout/common [:h1 "Hello World!"]))

    (defroutes home-routes

    (GET "/" [] (home)))

    列表 12-7.

    Compojure home.clj 文件内容

    ```


    首先，我们定义了一个命名空间，可以看到我们引入了 Compojure 核心函数，其中包括 `defroutes` 宏。我们还从自己的树形结构中引入了布局 `views`
    文件，该文件使用 hiccup 库来处理 HTML 响应的构建（参见列表 12-8 中的 `layout.clj`）。


    `defroutes` 宏使我们能够定义应用应处理的特定路由。默认情况下，我们的应用通过指定我们希望处理任何 `GET` 请求来处理所有可能的路由，并且如果传入路径匹配
    `"/"`（实际上所有请求都会匹配，因为它们都以 `/` 开头），则将请求信息传递给 `home` 函数进行处理。


    如果我们想处理路径 `/foo/bar`，那么我们可以为 `"/foo/bar"` 定义一个 `GET` 请求，然后指定哪个函数应处理该路由。


    `home` 函数调用 `layout/common` 函数（该函数通过我们的 `views layout.clj` 文件提供），并向该函数传递我们的响应体内容，在本例中是一个值为
    `"Hello World!"` 的 `H1` 标题。


    ```

    (ns foo.views.layout

    (:require [hiccup.page :refer [html5 include-css]]))

    (defn common [& body]

    (html5

    [:head

    [:title "Welcome to foo"]

    (include-css "/css/screen.css")]

    [:body body]))

    列表 12-8.

    Compojure layout.clj 文件内容

    ```


    从列表 12-8 中，我们可以看到 Compojure 使用的默认 HTML。这是一个简单的 HTML 页面，包含 `<head>`、`<title>` 和
    `<body>`（其内容由 `common` 函数的调用者提供）。我们还可以看到它包含一个 `screen.css` 文件，该文件为页面提供了默认样式。


    ## 测试


    Compojure 还在 `test/foo/test/handler.clj` 文件中为我们构建了一些基本测试（参见列表 12-9）。该文件利用内置的 Clojure
    测试库 `clojure.test` ⁶ 来定义一些简单的测试，以验证 Web 服务器是否按预期运行。


    注意


    这些测试是集成测试，而非单元测试。简而言之，单元测试用于验证单个函数（或代码单元）的行为，而集成测试则验证整个系统是否按预期工作。有关两者区别的更多信息，我推荐阅读
    Nathan Hughes 简短但精彩的解释。⁷


    ```

    (ns foo.test.handler

    (:use clojure.test

    ring.mock.request

    foo.handler))

    (deftest test-app

    (testing "main route"

    (let [response (app (request :get "/"))]

    (is (= (:status response) 200))

    (is (.contains (:body response) "Hello World"))))

    (testing "not-found route"

    (let [response (app (request :get "/invalid"))]

    (is (= (:status response) 404)))))

    列表 12-9.

    Compojure 的 test/handler.clj 文件内容

    ```


    在列表 12-9 中，我们可以看到我们引入了 `clojure.test` 依赖以及 Ring 自身指定的一个依赖，即其模拟请求库。⁸ 我们还引入了 Compojure
    的 `handler` 文件，因为这样我们就可以访问该文件中的 `app` 函数。


    从代码中可以看出，我们现在能够向 `app` 函数提供一个伪造的（即模拟的）请求对象，随后我们可以检查响应，并确定相关细节是否如我们所预期的那样返回。


    就列表 12-9 而言，我们可以看到我们期望对 `"/"` 的请求会返回响应内容 `"Hello World"`，并且响应状态码应为 200（表示请求成功）。


    第二个测试验证了当 Web 服务器收到一个针对其未配置处理的路径的请求时，会返回状态码 404（因此，在本例中，是对无意义的路径 `"/invalid"`
    发起了请求）。


    为了运行这些测试，我们需要使用 Leiningen 的一个子命令：`lein test`。该命令会定位测试目录中的所有测试，并逐一执行。我们也可以通过指定相关的命名空间来仅执行特定的测试套件。例如，`lein
    test :only foo.test.handler/test-app`。


    注意


    `test-app` 是在 `tests/handler.clj` 中定义的测试套件容器，其中包含一组测试“上下文”，允许我们显示特定的输出消息。


    如果一切顺利，您将看到列表 12-10 中所示的输出；否则，如果出现错误（假设我们将成功请求的预期状态码输出从 200 改为 202），您将看到列表 12-11
    中所示的内容。


    ```

    lein test foo.test.handler

    Ran 1 tests containing 3 assertions.

    0 failures, 0 errors.

    列表 12-10.

    成功测试输出

    ```


    ```

    lein test foo.test.handler

    lein test :only foo.test.handler/test-app

    FAIL in (test-app) (handler.clj:9)

    main route

    expected: (= (:status response) 202)

    actual: (not (= 200 202))

    Ran 1 tests containing 3 assertions.

    1 failures, 0 errors.

    Tests failed.

    列表 12-11.

    失败测试输出

    ```


    以上内容涵盖了 Compojure Web 应用的基本设置和使用。显然，Compojure 的功能和配置方式远不止于此，但正如前面提到的，关于 Clojure
    Web 开发这一主题已有整本书籍论述，因此现在让我们将注意力转向 Leiningen 中包含的模板集，这将向我们展示我们可以构建哪些其他类型的应用。

    '
- fmt: "# Templates\n\nOne thing you will notice as we review the various templates\
    \ that are built-in with Leiningen (there are many other templates that can be\
    \ found on the Internet for all types of requirements) is that the tree structure\
    \ isn’t vastly different between each template, and this is both a good thing\
    \ (as it provides a consistent base to work from) and a bad thing (as it makes\
    \ it hard to distinguish the differences and use cases).\n\nSo, to recap what\
    \ we know so far: Leiningen uses the concept of templates to dynamically construct\
    \ a new project. There are a few built-in templates, and there are numerous external\
    \ templates (such as the Compojure template I used in the ten-second example).\
    \ There are (at the time of writing) four separate built-in templates available,\
    \ as follows:\n\n*   template: a meta-template for `lein new` templates\n*   default:\
    \ a general project template for libraries\n*   app: an application project template\n\
    *   plugin: a Leiningen plugin project template\n\n## template\n\nSo, the first\
    \ template in the list is actually a template used to define new templates. I’m\
    \ not going to cover how to create your own templates, as it’s outside the scope\
    \ of this book, and to be honest I’ve also never had a need to use them myself,\
    \ as nearly every possible use case I’ve had has already been covered by the open\
    \ source community. See Listing [12-12](#A453572_1_En_12_Chapter.html#Par78).\n\
    \n```\n├── CHANGELOG.md\n├── LICENSE\n├── README.md\n├── project.clj\n├── resources\n\
    │   └── leiningen\n│       └── new\n│           └── foo\n│               └── foo.clj\n\
    └── src\n└── leiningen\n└── new\n└── foo.clj\nListing 12-12.\nTree Structure for\
    \ the Leiningen “template” Template\n```\n\nThat being said, you might have some\
    \ organizational structures and dependencies that you have to use for all your\
    \ work-related projects, and so maybe creating a template for simplifying and\
    \ quickening that tedious process over and over would be beneficial.\n\nNote\n\
    \nAn example of an organization’s using its own templates is the ClojureWerks\
    \ lein-template repository.[⁹](#A453572_1_En_12_Chapter.html#Fn9)\n\nIn Listing\
    \ [12-12](#A453572_1_En_12_Chapter.html#Par78), we can see what the directory\
    \ structure for a template application looks like. This is just so we have a frame\
    \ of reference compared to the other templates (see Listing [12-12](#A453572_1_En_12_Chapter.html#Par78)).\
    \ Here’s a quick reminder of the command required to create this project: `lein\
    \ new template <name>`.\n\nNote\n\nLeiningen provides a great/short official document\
    \ that explains the relevant steps for creating your own template.[^(10)](#A453572_1_En_12_Chapter.html#Fn10)\n\
    \nIn essence, in order to use a new template project, you would need to deploy\
    \ your template to Clojars[^(11)](#A453572_1_En_12_Chapter.html#Fn11) (which is\
    \ Clojure’s open/public repository of community-driven libraries). If you named\
    \ the repo something like `<name>/lein-template` (where `<name>` is whatever you\
    \ want your template to be referred to as), then a Clojure developer could execute\
    \ `lein new <name> <project_name>`, and this would cause Leiningen to search Clojars\
    \ for a template project under the title `<name>/lein-template`.\n\n## default\n\
    \nThe second template (as the description stated earlier) is used for general-purpose\
    \ libraries rather than for an actual application. Let’s take a look at its directory\
    \ structure (see Listing [12-13](#A453572_1_En_12_Chapter.html#Par88)).\n\n```\n\
    ├── LICENSE\n├── README.md\n├── doc\n│   └── intro.md\n├── project.clj\n├── resources\n\
    ├── src\n│   └── \n│       └── core.clj\n└── test\n└── \n└── core_test.clj\nListing\
    \ 12-13.\nTree Structure for the Leiningen “default” Template\n```\n\nThere are\
    \ two ways you can generate a default project. You can be either explicit or implicit.\
    \ If we’re being explicit, then we’re specifying the template name: `lein new\
    \ default <name>`. You can also be implicit by leaving off the “default” part.\n\
    \nNote\n\nAs long as there isn’t a template called `<name>`, then Leiningen will\
    \ presume that what you specify is the project name for the default template.\n\
    \nWhat we can see in Listing [12-13](#A453572_1_En_12_Chapter.html#Par88) is that\
    \ it’s very lean. If we look at `project.clj` we can see there are no dependencies\
    \ other than Clojure itself, and that the `core.clj` is equally light in that\
    \ it has a single function inside it. The function defined in `core.clj` is named\
    \ after the project, and it simply prints `\"Hello World\"` to the stdout (i.e.,\
    \ the terminal screen).\n\nInterestingly, you’ll see that `project.clj` doesn’t\
    \ define a entrypoint (like we saw with the Compojure template’s `project.clj`).\
    \ This helps to enforce the concept that this code base doesn’t need one, as it\
    \ is expected to be loaded within another code base as a dependency library, and\
    \ so it will be required via the `ns` macro.\n\n## app\n\nThe third template type\
    \ is “app,” and although its directory structure (see Listing [12-14](#A453572_1_En_12_Chapter.html#Par95))\
    \ is the same as the library template, its purpose is simply to execute some general-purpose\
    \ code.\n\nWhat do we mean by general purpose? Well, you could create a command-line\
    \ application, or maybe you decide to download the relevant dependencies for building\
    \ a web application (and that will become your project focus). This is fundamentally\
    \ different from the library template whose purpose is for the code to be loaded\
    \ within another project/application as a dependency/library.\n\n```\n├── CHANGELOG.md\n\
    ├── LICENSE\n├── README.md\n├── doc\n│   ├── intro.md\n├── project.clj\n├── resources\n\
    ├── src\n│   ├── foo\n│       ├── core.clj\n├── test\n├── foo\n├── core_test.clj\n\
    Listing 12-14.\nTree Structure for the Leiningen “app” Template\n```\n\nWith this\
    \ difference in mind, if you were to now look at the contents of the `core.clj`\
    \ file within the `src` directory, you would see that its contents are slightly\
    \ different than the library template’s `core.clj` in that they define a `main`\
    \ function (prefixed with a hyphen: `defn –main`). Also, at the top of that file\
    \ you’ll see that the `namespace` macro has included an extra configuration setting\
    \ of `(:gen-class)`. Lastly, the `project.clj` file itself has a `:main` attribute\
    \ that points to our `core.clj` file to indicate this is the file that should\
    \ be executed when the `lein run` command is executed.\n\nLet’s now briefly review\
    \ these three differences (`:main`, `-main`, and `gen-class`) to be sure we understand\
    \ their purposes. The `:main` attribute’s purpose is to notify Leiningen of the\
    \ entrypoint to your application, but you’ll likely have noticed there was an\
    \ extra attribute defined: `^:skip-aot`. What this does is skip Clojure’s “Ahead-of-Time”\
    \ (AOT) compilation step,[^(12)](#A453572_1_En_12_Chapter.html#Fn12) which can\
    \ be useful for speeding up your application’s startup by compiling the code into\
    \ JVM bytecode.\n\nConsidering AOT compilation can help performance, why might\
    \ we want to skip it? Well, in some cases your code might rely on input that you’ll\
    \ only know at runtime, and so if your code references an environment variable\
    \ (for example) that is not available at the point in time of compilation (let’s\
    \ say it’s only available on the server where the application is deployed), then\
    \ this would mean the compilation would change the code to use the value `nil`\
    \ for that environment variable wherever it’s referenced in the code.\n\nNote\n\
    \nThere are ways to solve these types of issues, but they’re outside the scope/focus\
    \ of this book.\n\nThe references to `(gen-class)` and the function `-main` are\
    \ used together as they’re intrinsically coupled. The `gen-class` tells Clojure’s\
    \ compiler to create a new Java class for your namespace, while `-main` defines\
    \ the behavior of that Java class.\n\nFinally, this all ties back in with the\
    \ use of the `:main` attribute in the `project.clj`, as it indicates there is\
    \ a Java class that should be used as the entrypoint for the application. I suggest\
    \ reading the reference material[^(13)](#A453572_1_En_12_Chapter.html#Fn13) to\
    \ learn more about these features."
