- fmt: "### STM Restart Policy\n\nIn Listing [8-23](#A453572_1_En_8_Chapter.html#Par148),\
    \ we will see the use of an `alter` function, again to modify the `ref` value.\
    \ This is what you’ll likely use most of the time when dealing with the STM. The\
    \ STM will attempt to identify whether a change has happened to the `ref` outside\
    \ of its transaction and will restart the transaction if a change has indeed occurred.\n\
    \nYou’ll see in Listing [8-23](#A453572_1_En_8_Chapter.html#Par148) that we attempt\
    \ to modify the value three times simultaneously using multiple `future`s (remember\
    \ a `future` will run in a separate thread to the parent thread).\n\nHave a read\
    \ over the code first, and then I’ll start to break down the process taken by\
    \ the STM in order to resolve the conflict that it is being presented with, thanks\
    \ to a fairly simple multi-threaded program.\n\n```\n(def r (ref []))\n(defn modify\
    \ [r, f, a, s]\n(dosync\n(Thread/sleep s)\n(alter r f a)))\n(future (modify r\
    \ conj :a 2000))\n(future (modify r conj :b 1000))\n(future (modify r conj :c\
    \ 0))\n@r\n;; [:c :b :a]\nListing 8-23.\nExample of How the STM Restart Policy\
    \ Works\n```\n\nIf you tried to dereference `r` immediately, then you would have\
    \ noticed it only contained a single value `[:c]`; then one second later it would\
    \ have contained `[:c :b]`, and finally three seconds later it would hold the\
    \ finished collection of `[:c :b :a]`.\n\nIn Listing [8-23](#A453572_1_En_8_Chapter.html#Par148),\
    \ we can see a user-defined function called `modify`, which simply starts up a\
    \ transaction (using `dosync`), then sleeps for the specified number of seconds\
    \ before using `alter` to modify the value inside the provided reference variable.\n\
    \nFrom there, we spin up three threads (using `future`) and execute the user-defined\
    \ function `modify` within each thread while passing it the relevant reference\
    \ value, function, and sleep arguments.\n\nWe’ve used very specific sleep values\
    \ to demonstrate how in the application design process non-deterministic code\
    \ doesn’t necessarily complete in the sequential order it’s defined in.\n\n**Note**\n\
    \nJust to be clear, I’m only using `(Thread/sleep)` to mimic non-deterministic\
    \ behavior. Your application code might use some form of blocking I/O instead\
    \ that takes varying times to complete. Hence, executing that code multiple times\
    \ can result in a different result order.\n\nThe process the STM takes in Listing\
    \ [8-23](#A453572_1_En_8_Chapter.html#Par148) is as follows (this is an oversimplification,\
    \ but it’ll give you an idea at least of how it works):\n\n- `:a` is passed (the\
    \ code pauses for two seconds).\n- `:b` is passed (the code pauses for one second).\n\
    - `:c` is passed.\n  - The `alter` function causes the STM to check if the `ref`\
    \ value has changed since the transaction started.\n  - The value is still `[]`\
    \ at this point (as the other calls are paused).\n  - The updated value is applied.\n\
    - `:b` unpauses and checks the `ref` value (as it’s about to apply the `conj`\
    \ function).\n  - The value is no longer `[]`; it’s `[:c]`, so the STM restarts\
    \ the transaction.\n  - `:a` is still paused by this point, and so the transaction\
    \ completes.\n- `:a` unpauses and checks the `ref` value.\n  - The value is no\
    \ longer `[]`; it’s `[:c :b]`, so the STM restarts the transaction.\n  - The transaction\
    \ completes, as there are no other transactions to cause a restart.\n  - This\
    \ means the `ref` value (eventually) is `[:c :b :a]`.\n\nIn a real-world scenario,\
    \ the time a transaction takes to complete won’t be as clean as the example just\
    \ used, but at least it gives you an idea of the process involved when dealing\
    \ with the STM.\n\n### Nested Transactions\n\nClojure’s STM implementation also\
    \ supports nested transactions. In Listing [8-24](#A453572_1_En_8_Chapter.html#Par170),\
    \ you will see two examples. The first will highlight how a nested transaction\
    \ executed within a separate thread will start a new transaction, whereas the\
    \ second example defines a new `dosync` block, but as it’s running on the same\
    \ thread as the outer `dosync` block, it doesn’t create a new transaction and\
    \ so the behavior/results are different.\n\n```\n(def r (ref 0))\n(dosync\n(future\
    \ (dosync (Thread/sleep 50) (println :foo) (alter r inc)))\n(println :bar)\n(alter\
    \ r inc))\n;; :bar\n;; 1\n;; :foo\n;; :foo (indicates transaction restart, as\
    \ ref was modified from outside)\n;; 2\n;; No new thread spawned, so ref is altered\
    \ twice\n;; While the inner transaction is not retried\n(def r (ref 0))\n(dosync\n\
    (dosync (Thread/sleep 50) (println :foo) (alter r inc ))\n(println :bar)\n(alter\
    \ r inc))\n;; :foo\n;; :bar\n;; 2\nListing 8-24.\nExamples of Nested Transactions\n\
    ```\n\n### ensure\n\nTo avoid a dead- or livelock situation, whereby competing\
    \ transactions are reliant on multiple references, we can utilize the `ensure`\
    \ function to protect the reference from modification by other transactions.\n\
    \nIn Listing [8-25](#A453572_1_En_8_Chapter.html#Par174), you can see that we\
    \ have two references, `current-account` and `savings-account`, which when added\
    \ together will result in a total value of 1100. The only condition we have is\
    \ that the total for both accounts cannot be below 1000.\n\nIn the given example,\
    \ we attempt to subtract the value 100 from both accounts simultaneously. Only\
    \ one of these requests will succeed, as our constraint of needing 1000 as a minimum\
    \ value means both requests can’t succeed, because we’d fall below the constraint\
    \ threshold. This dilemma is a good example of how a simple concurrency requirement\
    \ can cause contention.\n\n```\n(def current-account (ref 500))\n(def savings-account\
    \ (ref 600))\n(defn withdraw [from available amount]\n(dosync\n(let [total (+\
    \ @from (ensure available))]\n(Thread/sleep 1000) ; allows for a more visible\
    \ context switch\n(if (>= (- total amount) 1000)\n(alter from - amount)\n(println\
    \ \"Sorry, can't withdraw 100 from \"\n(:name (meta (var current-account)))\n\"\
    \ due to constraint violation\")))))\n(println \"Before: Current Account balance\
    \ is\" @current-account)\n(println \"Before: Savings Account balance is\" @savings-account)\n\
    (println\n\"Before: Total balance is\"\n(+ @current-account @savings-account))\n\
    (future (withdraw current-account savings-account 100))\n(future (withdraw savings-account\
    \ current-account 100))\n(Thread/sleep 2000)\n;; sleep long enough to allow both\
    \ transactions to complete\n(println \"After: Current Account balance is\" @current-account)\n\
    (println \"After: Savings Account balance is\" @savings-account)\n(println\n\"\
    After: Total balance is\"\n(+ @current-account @savings-account))\nListing 8-25.\n\
    Example of ensure to Negotiate Multiple Conditions\n```\n\nThe output you can\
    \ expect from Listing [8-25](#A453572_1_En_8_Chapter.html#Par174) can be seen\
    \ in Listing [8-26](#A453572_1_En_8_Chapter.html#Par176).\n\n```\nBefore: Current\
    \ Account balance is 500\nBefore: Savings Account balance is 600\nBefore: Total\
    \ balance is 1100\nSorry, can't withdraw 100 from current-account\ndue to constraint\
    \ violation\nAfter: Current Account balance is 500\nAfter: Savings Account balance\
    \ is 500\nAfter: Total balance is 1000\nListing 8-26.\nOutput of Listing 8-25\
    \ Program\n```\n\nIf we look at what’s happening, it might look like there’s a\
    \ lot to take in, but remember that this is all code that we’ve already seen,\
    \ and so by reading through it line by line you should be able to see that ultimately,\
    \ we’re using `ensure` to protect the type (in this case, `available`) from modification\
    \ while within the transaction.\n\nIf `available` is modified outside the transaction,\
    \ then the STM will restart the transaction using the latest value, and from there\
    \ we will know whether the removal of the specified amount can proceed safely\
    \ or not.\n\n**Note**\n\nTake some time to really review the preceding piece of\
    \ code; don’t rush through it. Make sure you understand what’s happening, and\
    \ when, in the context of multiple threads."
