    ##### cqc


    `cqc` 键绑定可在当前缓冲区的任意位置执行。它会打开 Vim 命令行窗口，允许你搜索之前的求值结果，并在重新求值前进行修改。


    ##### cmm


    `cmm` 键绑定对于理解宏在抽象层之下的工作原理（即宏展开后的代码是什么样子）非常有用。以我们一直在使用的 `calc` 函数为例；如果在定义上执行 `cmm`，宏展开会将其求值为清单
    B-9 所示的内容。


    ```

    (def calc (fn* ([f g] (* (+ f g) (/ g f)))))

    清单 B-9.

    使用 cmm 键绑定展开的 Defn 宏

    ```


    在清单 B-9 中，我们可以看到在 `defn` 宏上执行 `cmm` 会将其展开，从而让我们看到 `calc` 定义实际上只是一个 `def` 形式。它还展示了底层使用匿名函数来实现
    `defn` 为我们抽象掉的功能。


