    # Introduction


    This is a book about the Clojure programming language. Chances are you’re already
    somewhat familiar with the language and you’re keen to expose yourself to more
    of it. Maybe you’re learning Clojure for fun, or maybe it’s because you’re starting
    a new job that requires you to work with it more. Either way, I’m sure you’ll
    learn some useful things about the language and will enjoy programming in it for
    many years to come.


    We’re going to start off fairly slow and pick up speed as we go through the chapters.
    There is no thread that ties all the chapters together. Once you have the basic
    syntax understood, you should be able to drop into any chapter safely.


    You may find some chapters are shorter than others; this is simply because I wanted
    conciseness wherever possible. We could try and cover every conceivable feature
    in the Clojure language (for which there is a lot of ground to cover), but let’s
    face it—this would become one of those books you never finish. It would sit on
    a shelf or become a door stop because it’s too big to feasibly read through.


    I wanted this book to be as short as possible, to give you the information you
    need and then allow you the freedom to investigate beyond your own understanding
    when the time comes for you to need to know something that might not have been
    covered within these pages.


    I wish you all the best with your journey into Clojure. I’m sure you’re itching
    to get started. So, let’s do that . . .


    # Acknowledgments


    As you get older, you typically find the adage “less is more” to be the appropriate
    way to go for most things. With this in mind, I’d like to acknowledge the reviewers
    of this book, who helped round off some of the rough edges into something altogether
    more cohesive.


    I’d also like to acknowledge the patience of my wife (Catherine), who recognized
    early on that there was only one thing better than having a book published with
    your name on it . . . and that’s having two published books.'
