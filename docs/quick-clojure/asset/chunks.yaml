- fmt: '# List


    In order to appreciate the importance of the list data structure in a language
    such as Clojure, we need to understand that Clojure is a dialect of Lisp, which
    stands for “LISt Processing”. Lisp is both a programming language (originally
    designed in 1958) and also a recognised structural basis for a collection of programming
    languages (Common Lisp, Scheme and Clojure being a few popular examples of languages
    that are built upon the same syntax as Lisp).


    In simplistic terms, a language can be considered a dialect of lisp when it implements
    a parenthesized prefix notation syntax. This type of notation is distinct in that
    parentheses are used to group logic, and within the parentheses operators are
    placed to the left of their operands.


    In a practical sense, when looking at a language such as Clojure, prefix notation
    means that inside the parentheses a function to be executed is what’s specified
    first, followed by any arguments that function accepts. If we look at the list
    data structure, we can see that the syntax is the same as prefix notation. This
    is why the list data structure is prevalent across all Lisp languages, as it was
    a fundamental part of the original language design.


    A list uses parentheses as its surrounding delimiters, and so an empty list would
    look like `()`, whereas a list with three elements could look like `("a" "b" "c")`.


    The power of a Lisp based language (such as Clojure) comes from the fact that
    the language API utilizes the same syntax as the underlying data structures it
    manipulates. This is unlike other languages, whose API design is usually a lot
    of syntactic sugar on top of the underlying data structures they manipulate.


    This mimicry between API syntax and the underlying data structures allows the
    Clojure programming language to rewrite itself and implement additional features
    it was not initially designed for (we’ll see how this can be achieved later on
    when we learn about Clojure’s Macros feature). But in essence this concept is
    what is meant by the word homoiconic : “code is data”, as mentioned at the beginning
    of Chapter [1](#A453572_1_En_1_Chapter.html).


    Now that you recognize how a programming interface for a Lisp-based language uses
    the same syntax as the underlying data structures, you’ll likely have noticed
    that Clojure’s syntax for executing a function also happens to be a list data
    structure. For example, `(+ 1 2)` is a function call that produces the result
    of `1 + 2`, but `(+ 1 2)` is also itself a list data structure.


    When Clojure evaluates the text `(+ 1 2)`, it tokenizes the individual parts and
    evaluates them. In this instance, it is being provided a list data structure,
    and when provided this particular data structure, the Clojure language interpreter
    expects the first element within that structure to be a function and the remaining
    elements to be arguments that are passed to the function.


    So, in our example we provided the `+` function and two arguments. The first argument
    was the value `1`, and the second argument was the value `2`. We’ll learn more
    about functions later on, but for now you should know that the syntax structure
    for calling a function is as shown in Listing [2-2](#A453572_1_En_2_Chapter.html#Par24).


    ```

    (fn arg1 arg2 arg3...)

    Listing 2-2.

    Syntax Structure for Calling a Function

    ```


    **Note**


    When using the REPL, you might not realize it, but the `clojure.core` namespace
    (and all the functions it contains) have been pre-loaded for you. This is where
    the `+` function has come from. We will cover namespaces in a later chapter.


    In Clojure a list is implemented as a linked list, which means if you want to
    loop through its contents you’ll have to start from the beginning of the list
    and move next, next, next until you reach the end of the list. This is the essence
    of how a linked list data structure works.


    A list is very efficient at putting new elements onto the beginning of itself,
    but isn’t very good at putting new elements onto the end of itself. This is because
    if it’s a very long list, then it could take some time to step through each element
    in the list trying to find the end.


    Now, most of the time when programming in Clojure, you shouldn’t have to worry
    about how certain data structures are implemented “under the covers.” Clojure
    will happily hide those details away from you and provide abstractions that make
    dealing with data structures in the most appropriate and performant manner very
    easy.


    That being said, I personally feel it’s important we know what implementation
    sits underneath a data structure, because it allows us to make decisions that
    can result in optimized code performance (when we really need it). It also means
    we won’t be left scratching our heads trying to understand why a certain function
    didn’t provide the result we were expecting.


    If you need to add a value onto a linked list data structure, then you have a
    couple of options. You can be explicit about your understanding of the underlying
    implementation of the list (i.e., you now know a list data structure is implemented
    as a linked list) by using the `cons` function, which will insert your value at
    the beginning of the list, as shown in Listing [2-3](#A453572_1_En_2_Chapter.html#Par32).


    ```

    (cons 4 ''(1 2 3))

    ;; (4 1 2 3)

    Listing 2-3.

    Using cons to Be Explicit About Data-Structure Manipulation

    ```


    Or, you can use an abstraction like the `conj` function instead, which will pick
    the correct method for inserting the new value depending on the underlying data
    structure. So, for example, if your data structure is a list (which is implemented
    as a linked list), then `conj` will place the value at the start of the list,
    as shown in Listing [2-4](#A453572_1_En_2_Chapter.html#Par34).


    ```

    (conj ''(1 2 3) 4)

    ;; (4 1 2 3)

    ;; same as the more explicit cons

    Listing 2-4.

    Using the conj Abstraction Function on a List

    ```


    But, if your data structure were a vector collection instead (and we’ll look at
    vectors in the next section), then the `conj` function would know to insert the
    value at the end of the collection (which is more performant when dealing with
    vectors), as seen in Listing [2-5](#A453572_1_En_2_Chapter.html#Par36).


    ```

    (conj [1 2 3] 4)

    ;; [1 2 3 4]

    Listing 2-5.

    Using the conj Abstraction Function on a Vector

    ```


    Some readers may be wondering about the single quote in front of the list data
    structure (i.e., `''(1 2 3)`); we’ll discuss this in more detail when we talk
    about Macros in Clojure, but effectively it prevents Clojure from evaluating the
    list as if it was a function and instead allows Clojure to treat it as a literal
    list data structure.


    Otherwise, without the single quote, as we mentioned earlier, Clojure would try
    to execute the list as if the first argument were a function; so, it would attempt
    to locate and execute a function by the identifier `1` and pass it the values
    `2` and `3` as arguments to the function. But there is no such function called
    `1`, and so an error would occur.


    The list data structure is the only structure where you have to worry about quoting.
    Alternatively, you can use the `list` function to dynamically create the list.
    For example, `(cons 4 (list 1 2 3))`.


    There are other abstraction functions (like `conj`), such as `peek` and `pop`,
    which help to determine the right “process” for the data structures they’re being
    applied to. See Listing [2-6](#A453572_1_En_2_Chapter.html#Par41).


    ```

    (peek [1 2 3])  ;; 3

    (peek ''(1 2 3)) ;; 1

    (pop [1 2 3])  ;; [1 2]

    (pop ''(1 2 3)) ;; (2 3)

    Listing 2-6.

    The peek and pop Abstraction Functions

    ```


    Notice how the `peek` and `pop` methods handle things differently depending on
    the data structure being provided. It knows that a list (i.e., `''(1 2 3)`) is
    a linked list, and so it handles things from the beginning of the data structure,
    whereas it knows a vector (i.e., `[1 2 3]`) has “index access,” and so it’s more
    performant at working from the end of the data structure.'
  raw: '## List


    In order to appreciate the importance of the list data structure in a language
    such as Clojure, we need to understand that Clojure is a dialect of Lisp, which
    stands for “LISt Processing ”. Lisp is both a programming language (originally
    designed in 1958) and also a recognised structural basis for a collection of programming
    languages (Common Lisp, Scheme and Clojure being a few popular examples of languages
    that are built upon the same syntax as Lisp).


    In simplistic terms, a language can be considered a dialect of lisp when it implements
    a parenthesized prefix notation syntax. This type of notation is distinct in that
    parentheses are used to group logic, and within the parentheses operators are
    placed to the left of their operands.


    In a practical sense, when looking at a language such as Clojure, prefix notation
    means that inside the parentheses a function to be executed is what’s specified
    first, followed by any arguments that function accepts. If we look at the list
    data structure, we can see that the syntax is the same as prefix notation. This
    is why the list data structure is prevalent across all Lisp languages, as it was
    a fundamental part of the original language design.


    A list uses parentheses as its surrounding delimiters, and so an empty list would
    look like `()`, whereas a list with three elements could look like `("a" "b" "c")`.


    The power of a Lisp based language (such as Clojure) comes from the fact that
    the language API utilizes the same syntax as the underlying data structures it
    manipulates. This is unlike other languages, whose API design is usually a lot
    of syntactic sugar on top of the underlying data structures they manipulate.


    This mimicry between API syntax and the underlying data structures allows the
    Clojure programming language to rewrite itself and implement additional features
    it was not initially designed for (we’ll see how this can be achieved later on
    when we learn about Clojure’s Macros feature). But in essence this concept is
    what is meant by the word homoiconic : “code is data ”, as mentioned at the beginning
    of Chapter [1](#A453572_1_En_1_Chapter.html) .


    Now that you recognize how a programming interface for a Lisp-based language uses
    the same syntax as the underlying data structures, you’ll likely have noticed
    that Clojure’s syntax for executing a function also happens to be a list data
    structure. For example, `(+ 1 2)` is a function call that produces the result
    of `1 + 2`, but `(+ 1 2)` is also itself a list data structure.


    When Clojure evaluates the text `(+ 1 2)`, it tokenizes the individual parts and
    evaluates them. In this instance, it is being provided a list data structure,
    and when provided this particular data structure, the Clojure language interpreter
    expects the first element within that structure to be a function and the remaining
    elements to be arguments that are passed to the function.


    So, in our example we provided the `+` function and two arguments. The first argument
    was the value `1`, and the second argument was the value `2`. We’ll learn more
    about functions later on, but for now you should know that the syntax structure
    for calling a function is as shown in Listing [2-2](#A453572_1_En_2_Chapter.html#Par24).


    ```

    (fn arg1 arg2 arg3...)

    Listing 2-2.

    Syntax Structure for Calling a Function

    ```


    Note


    When using the REPL, you might not realize it, but the `clojure.core` namespace
    (and all the functions it contains) have been pre-loaded for you. This is where
    the `+` function has come from. We will cover namespaces in a later chapter.


    In Clojure a list is implemented as a linked list,[²](#A453572_1_En_2_Chapter.html#Fn2)
    which means if you want to loop through its contents you’ll have to start from
    the beginning of the list and move next, next, next until you reach the end of
    the list. This is the essence of how a linked list data structure works.


    A list is very efficient at putting new elements onto the beginning of itself,
    but isn’t very good at putting new elements onto the end of itself. This is because
    if it’s a very long list, then it could take some time to step through each element
    in the list trying to find the end.


    Now, most of the time when programming in Clojure, you shouldn’t have to worry
    about how certain data structures are implemented “under the covers.” Clojure
    will happily hide those details away from you and provide abstractions that make
    dealing with data structures in the most appropriate and performant manner very
    easy.


    That being said, I personally feel it’s important we know what implementation
    sits underneath a data structure, because it allows us to make decisions that
    can result in optimized code performance (when we really need it). It also means
    we won’t be left scratching our heads trying to understand why a certain function
    didn’t provide the result we were expecting.


    If you need to add a value onto a linked list data structure, then you have a
    couple of options. You can be explicit about your understanding of the underlying
    implementation of the list (i.e., you now know a list data structure is implemented
    as a linked list) by using the `cons` function , which will insert your value
    at the beginning of the list, as shown in Listing [2-3](#A453572_1_En_2_Chapter.html#Par32).


    ```

    (cons 4 ''(1 2 3))

    ;; (4 1 2 3)

    Listing 2-3.

    Using cons to Be Explicit About Data-Structure Manipulation

    ```


    Or, you can use an abstraction like the `conj` function instead, which will pick
    the correct method for inserting the new value depending on the underlying data
    structure. So, for example, if your data structure is a list (which is implemented
    as a linked list), then `conj` will place the value at the start of the list,
    as shown in Listing [2-4](#A453572_1_En_2_Chapter.html#Par34).


    ```

    (conj ''(1 2 3) 4)

    ;; (4 1 2 3)

    ;; same as the more explicit cons

    Listing 2-4.

    Using the conj Abstraction Function on a List

    ```


    But, if your data structure were a vector collection instead (and we’ll look at
    vectors in the next section), then the `conj` function would know to insert the
    value at the end of the collection (which is more performant when dealing with
    vectors), as seen in Listing [2-5](#A453572_1_En_2_Chapter.html#Par36).


    ```

    (conj [1 2 3] 4)

    ;; [1 2 3 4]

    Listing 2-5.

    Using the conj Abstraction Function on a Vector

    ```


    Some readers may be wondering about the single quote in front of the list data
    structure (i.e., `''(1 2 3)`); we’ll discuss this in more detail when we talk
    about Macros in Clojure, but effectively it prevents Clojure from evaluating the
    list as if it was a function and instead allows Clojure to treat it as a literal
    list data structure.


    Otherwise, without the single quote, as we mentioned earlier, Clojure would try
    to execute the list as if the first argument were a function; so, it would attempt
    to locate and execute a function by the identifier `1` and pass it the values
    `2` and `3` as arguments to the function. But there is no such function called
    `1`, and so an error would occur.


    The list data structure is the only structure where you have to worry about quoting.
    Alternatively, you can use the `list` function to dynamically create the list.
    For example, `(cons 4 (list 1 2 3))`.


    There are other abstraction functions (like `conj`), such as `peek` and `pop`,
    which help to determine the right “process” for the data structures they’re being
    applied to. See Listing [2-6](#A453572_1_En_2_Chapter.html#Par41).


    ```

    (peek [1 2 3])  ;; 3

    (peek ''(1 2 3)) ;; 1

    (pop [1 2 3])  ;; [1 2]

    (pop ''(1 2 3)) ;; (2 3)

    Listing 2-6.

    The peek and pop Abstraction Functions

    ```


    Notice how the `peek` and `pop` methods handle things differently depending on
    the data structure being provided. It knows that a list (i.e., `''(1 2 3)`) is
    a linked list, and so it handles things from the beginning of the data structure,
    whereas it knows a vector (i.e., `[1 2 3]`) has “index access,” and so it’s more
    performant at working from the end of the data structure.'
  trans: '

    ## 列表


    为了理解列表数据结构在 Clojure 这类语言中的重要性，我们需要知道 Clojure 是 Lisp 的一种方言，而 Lisp 代表“LISt Processing（列表处理）”。Lisp
    既是一种编程语言（最初设计于 1958 年），也是一个公认的编程语言集合的结构基础（Common Lisp、Scheme 和 Clojure 就是基于 Lisp
    相同语法构建的几个流行语言示例）。


    简单来说，当一种语言实现了带括号的前缀表示法语法时，它就可以被视为 Lisp 的一种方言。这种表示法的独特之处在于，括号用于对逻辑进行分组，并且在括号内，运算符位于其操作数的左侧。


    在实际应用中，当我们看 Clojure 这样的语言时，前缀表示法意味着在括号内，首先指定的是要执行的函数，后面跟着该函数接受的任何参数。如果我们观察列表数据结构，会发现其语法与前缀表示法相同。这就是为什么列表数据结构在所有
    Lisp 语言中都很普遍，因为它是原始语言设计的基本组成部分。


    列表使用括号作为其边界分隔符，因此一个空列表看起来像 `()`，而一个包含三个元素的列表可能看起来像 `("a" "b" "c")`。


    基于 Lisp 的语言（如 Clojure）的强大之处在于，其语言 API 使用了与其操作的基础数据结构相同的语法。这与其他语言不同，其他语言的 API 设计通常是在其操作的基础数据结构之上添加大量语法糖。


    API 语法与基础数据结构之间的这种相似性，使得 Clojure 编程语言能够重写自身，并实现其最初未设计的功能（我们稍后在学习 Clojure 的宏功能时会看到如何实现这一点）。但本质上，这就是“代码即数据”这一同像性概念的含义，正如第
    1 章开头所提到的。


    既然你已经认识到基于 Lisp 的语言的编程接口如何使用与基础数据结构相同的语法，你可能已经注意到 Clojure 执行函数的语法恰好也是一个列表数据结构。例如，`(+
    1 2)` 是一个产生 `1 + 2` 结果的函数调用，但 `(+ 1 2)` 本身也是一个列表数据结构。


    当 Clojure 评估文本 `(+ 1 2)` 时，它会将各个部分进行词法分析并评估。在这个例子中，它被提供了一个列表数据结构，当提供这种特定数据结构时，Clojure
    语言解释器期望该结构中的第一个元素是一个函数，其余元素是传递给该函数的参数。


    因此，在我们的示例中，我们提供了 `+` 函数和两个参数。第一个参数是值 `1`，第二个参数是值 `2`。我们稍后会学习更多关于函数的知识，但现在你应该知道调用函数的语法结构如代码清单
    2-2 所示。


    ```

    (fn arg1 arg2 arg3...)

    代码清单 2-2.

    调用函数的语法结构

    ```


    注意


    使用 REPL 时，你可能没有意识到，但 `clojure.core` 命名空间（以及其中包含的所有函数）已经为你预加载了。这就是 `+` 函数的来源。我们将在后面的章节中介绍命名空间。


    在 Clojure 中，列表被实现为链表，² 这意味着如果你想遍历其内容，你必须从列表的开头开始，然后逐个移动到下一个，直到到达列表的末尾。这就是链表数据结构工作的本质。


    列表在将新元素添加到其开头时非常高效，但在将新元素添加到其末尾时则不太擅长。这是因为如果列表非常长，那么逐个遍历列表中的每个元素以找到末尾可能会花费一些时间。


    现在，在大多数使用 Clojure 编程的情况下，你不必担心某些数据结构是如何“在底层”实现的。Clojure 会很乐意为你隐藏这些细节，并提供抽象，使得以最合适和最高效的方式处理数据结构变得非常容易。


    话虽如此，我个人认为了解数据结构的底层实现很重要，因为它能让我们做出决策，从而优化代码性能（当我们真正需要时）。这也意味着我们不会因为试图理解为什么某个函数没有提供我们期望的结果而挠头。


    如果你需要向链表数据结构添加一个值，那么你有几个选择。你可以通过使用 `cons` 函数来明确表达你对列表底层实现的理解（即，你现在知道列表数据结构是作为链表实现的），该函数会将你的值插入到列表的开头，如代码清单
    2-3 所示。


    ```

    (cons 4 ''(1 2 3))

    ;; (4 1 2 3)

    代码清单 2-3.

    使用 cons 明确进行数据结构操作

    ```


    或者，你可以使用像 `conj` 函数这样的抽象，它会根据底层数据结构选择正确的方法来插入新值。例如，如果你的数据结构是一个列表（作为链表实现），那么 `conj`
    会将值放在列表的开头，如代码清单 2-4 所示。


    ```

    (conj ''(1 2 3) 4)

    ;; (4 1 2 3)

    ;; 与更明确的 cons 相同

    代码清单 2-4.

    在列表上使用 conj 抽象函数

    ```


    但是，如果你的数据结构是向量集合（我们将在下一节中介绍向量），那么 `conj` 函数会知道将值插入到集合的末尾（这在处理向量时性能更高），如代码清单 2-5
    所示。


    ```

    (conj [1 2 3] 4)

    ;; [1 2 3 4]

    代码清单 2-5.

    在向量上使用 conj 抽象函数

    ```


    有些读者可能想知道列表数据结构前面的单引号（即 `''(1 2 3)`）是什么意思；我们将在讨论 Clojure 的宏时更详细地讨论这一点，但它实际上是为了防止
    Clojure 将列表作为函数进行评估，而是让 Clojure 将其视为字面列表数据结构。


    否则，如果没有单引号，正如我们之前提到的，Clojure 会尝试将列表作为函数执行，就好像第一个参数是一个函数一样；因此，它会尝试定位并执行一个标识符为 `1`
    的函数，并将值 `2` 和 `3` 作为参数传递给该函数。但不存在名为 `1` 的函数，因此会发生错误。


    列表数据结构是唯一需要担心引用的结构。或者，你可以使用 `list` 函数动态创建列表。例如，`(cons 4 (list 1 2 3))`。


    还有其他抽象函数（如 `conj`），例如 `peek` 和 `pop`，它们有助于确定应用于数据结构的正确“过程”。参见代码清单 2-6。


    ```

    (peek [1 2 3])  ;; 3

    (peek ''(1 2 3)) ;; 1

    (pop [1 2 3])  ;; [1 2]

    (pop ''(1 2 3)) ;; (2 3)

    代码清单 2-6.

    peek 和 pop 抽象函数

    ```


    注意 `peek` 和 `pop` 方法如何根据所提供的数据结构以不同方式处理事情。它知道列表（即 `''(1 2 3)`）是一个链表，因此从数据结构的开头处理；而它知道向量（即
    `[1 2 3]`）具有“索引访问”，因此从数据结构的末尾处理性能更高。

