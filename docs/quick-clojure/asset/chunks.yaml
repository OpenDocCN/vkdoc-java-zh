  trans: "\n## 加载命名空间文件\n\n如果你正在从 REPL 测试现有应用程序，并希望`load`一个需要其他依赖项的代码文件，那么你需要使用`load`函数。`load`函数会尝试在你的“类路径”中找到给定路径，然后`load`该文件。类路径是\
    \ Java 用来识别代码库位置的机制，由于 Clojure 构建在 Java 之上，这意味着我们需要确保类路径中添加了相关路径。\n\n项目管理工具 Leiningen\
    \ 通过 `project.clj` 文件处理依赖项和库的添加。因此，只要你在其中列出了依赖项，就应该能够使用`load`函数将它们加载到 REPL 会话中。有关`load`函数的示例，请参见清单\
    \ 9-3。\n\n```\n(load \"/path/to/namespace\")\n(in-ns 'namespace)\n清单 9-3.\n从外部文件加载代码\n\
    ```\n\n现在，你在使用`in-ns`之前使用`load`的原因是，即使你有一个定义了指定命名空间的文件，除非你将其添加到 JVM 类路径，否则 REPL\
    \ 无法定位它。`load`函数会将命名空间添加到类路径。\n\n注意\n\n确保路径以正斜杠开头，并且相对于 Leiningen 的 `src` 目录（参见下一条注释）；这是因为\
    \ Leiningen 工具会为每个 Leiningen 项目修改操作系统的 JVM 类路径。\n\n虽然我们还没有介绍 Leiningen 项目自动化工具，但值得提及的是，Clojure\
    \ 项目设置的一部分要求使用一个 `project.clj` 文件来引导应用程序。\n\n如果你想跟着我接下来要解释的内容操作，最好先退出 REPL，然后在终端中运行以下命令：`lein\
    \ new compojure-app foo`。这将为你生成一个新项目。进入该新项目目录（`cd foo`），你会发现有一个新的 `project.clj`。\n\
    \n花些时间查看这个新 Leiningen 项目中文件夹和文件的组织结构。现在不必担心这一切意味着什么或如何工作，我们将在后面的章节中介绍。但命名空间在设置一个真实的\
    \ Clojure 应用程序中扮演着重要角色，因此这将为你提供一个基本的起点，帮助你理解以下信息。\n\n`project.clj` 引导文件中的设置之一是\
    \ `:handler` 键，它告诉 Leiningen 哪个 Clojure 文件是应用程序的入口点（还有一个 `:init` 函数，在处理程序之前执行）。\n\
    \n注意\n\n对于大多数 Leiningen 项目模板，你会发现你的 Clojure 代码位于：`src/<项目名称>/<文件.clj>`。\n\n例如，如果你的\
    \ `project.clj` 包含 `:handler foo.handler/app`，你实际上是在告诉 Leiningen 在 `src/foo/handler.clj`\
    \ 定位入口点（并且在该文件中，你会找到引导应用程序的 `app` 函数）。\n\n当从项目目录运行 `lein repl` 时，你可以执行 (`ns foo.handler`)\
    \ 来跳转到该命名空间，并开始执行该命名空间暴露的函数。请参见清单 9-4 的简单示例。\n\n```\n(ns foo.handler)\n(init)\
    \ ;; foo 正在启动\n清单 9-4.\n将命名空间加载到 REPL 中\n```\n\n如果你对文件进行了更改——例如，假设你用新变量更新了 `handler.clj`\
    \ 文件：`(def x 123)`——为了使该更改反映在已经运行的当前 REPL 实例中，你需要重新加载命名空间文件。请参见清单 9-5。\n\n```\n\
    (load \"/foo/handler\")\nx ;; 123\n清单 9-5.\n将命名空间重新加载到 REPL 中\n\n如果你想显示所有已加载的命名空间，最简单的选择是使用\
    \ `(loaded-libs)` 函数。如果你在当前 REPL 实例中运行该命令，你会看到一个已为你加载的命名空间大列表（包括 REPL 启动后添加的任何新命名空间）。请参见清单\
    \ 9-6。\n\n```\n#{clj-stacktrace.core clj-stacktrace.repl clj-stacktrace.utils\
    \ clj-time.core clj-time.format clojure.core.protocols clojure.core.server clojure.edn\
    \ clojure.instant clojure.java.browse clojure.java.io clojure.java.javadoc ...}\n\
    清单 9-6.\n当前 REPL 实例中已加载的库\n```\n\n## 内部化\n\n我们在第 2 章中已经介绍过变量，当时我指出：\n\n> 变量在其他命名空间中不可用，除非它们被“内部化”到这些命名空间中。内部化是一种花哨的说法，意思是“在当前命名空间中查找变量\
    \ x；如果不存在则创建它”。但你也可以使用 `ns` 宏的 `:refer` 特性从另一个命名空间“内部化”变量。 ——我，第 2 章\n\n那么，让我们来看看从另一个命名空间“内部化”数据的不同方式。有几种不同的选项：\n\
    \n*   `:use`\n*   `:require`\n    *   `:as`\n    *   `:refer`\n    *   `:all`\n\
    \n现在，我应该澄清一下，实际上只有两种方法可以内部化数据，那就是使用前面列表中的前两项（`:use` 和 `:require`）。列表中的其他项都是与 `:require`\
    \ 相关的子集特性，在官方文档中被称为库规范。\n\n注意\n\n我将最后介绍 `:use`，因为自从 Clojure 早期版本以来，`:require`\
    \ 的功能已大大改进，`:use` 被认为是不必要的。我介绍 `:use` 只是为了让你知道它曾经存在，但现在已经不再需要，因为 `:require` 的功能已经取代了它。\n\
    \n我将首先解释这些项各自的工作原理及其区别，但在那之前，我想先稍微绕个弯……\n\n### 根绑定\n\n在讨论变量时，理解它们还有一个称为根绑定的东西，并且被认为是“线程局部的”，这一点很重要。这在实践中的意思是，当你创建一个变量并为其赋值时——例如，`(def\
    \ foo \"hello\")`——它的根绑定就是你定义的值（在本例中，是字符串 `\"hello\"`）。一旦你将一个值与变量关联起来，那就成为该变量的“根绑定”，这意味着从当前命名空间内创建的任何线程都将能够访问它，因为它们本质上是在同一个内存空间中创建的。这就是“线程局部”的含义，其他命名空间将无法看到该变量或其值。\n\
    \n如果你定义了一个变量但没有为其赋值，那么它被认为是“未绑定的”（参见清单 9-7 的示例）。\n\n```\n(def foo)\nfoo\n;; #\n\
    清单 9-7.\n未绑定变量的示例\n```\n\n### 动态变量\n\n我们在第 2 章中已经介绍过动态变量（即 `^:dynamic` 属性和 `binding`\
    \ 形式），但由于我们现在正在阅读关于命名空间的章节，因此有必要提一个如果在本书开头提及可能没有意义的问题：`ns` 宏之所以能够动态更改 Clojure\
    \ 中的命名空间，是因为该宏修改了全局的 `*ns*` 变量，这意味着它可以被重新定义。\n\n注意\n\n定义动态变量的约定是将它们包裹在“耳罩”（即星号）中。例如，`*变量名*`。\n"
- fmt: "### Detour Over…\n\nOK, back to the discussion of interning and the list of\
    \ items we had earlier (i.e., `:use`, `:require`, etc.). I’ll be using a new application.\
    \ Earlier, we actually created a simple web server application using `lein new\
    \ compojure-app <name>`. Now we’ll use `lein new app <name>`.\n\n**Note:** The\
    \ difference is that the latter example is a “standard” application rather than\
    \ a web server. We’ll discuss the different types of applications in a future\
    \ chapter covering the Leiningen tool in more detail.\n\nSimilar to the previous\
    \ application, if you look at the `project.clj` file you’ll find a structure that\
    \ resembles what we saw before. The difference here is that instead of a `:handler`\
    \ key we’ll find a `:main` key. But it does the same thing—it tells Leiningen\
    \ where the main code file can be located.\n\nIn this example, we’ll see the main\
    \ file is set to `foo.core`, but I’m also going to create some new files, `foo/bar.clj`\
    \ and `foo/baz.clj`, which will in turn represent the namespaces `foo.bar` and\
    \ `foo.baz`. I’ll demonstrate each of these files as we go through the examples.\n\
    \n**Note:** The use of `core` as a file name (and namespace) within `project.clj`\
    \ is simply convention. There’s no reason why you couldn’t rename the `core` file\
    \ to something else and manually update `project.clj` to reflect the new file/namespace.\n\
    \nThe syntax used in the following examples (see Listings [9-8](#A453572_1_En_9_Chapter.html#Par56),\
    \ [9-9](#A453572_1_En_9_Chapter.html#Par58), and [9-10](#A453572_1_En_9_Chapter.html#Par60))\
    \ is specific to Clojure code files. If you wanted to test these features in the\
    \ REPL, then you could call them as direct functions. For example, where we have\
    \ defined something like `(:use name.space)` you could change it to `(use 'name.space)`\
    \ within the REPL.\n\n**Note:** When using the functions directly (as opposed\
    \ to using them from within the `ns` macro), you’ll need to quote any symbols/vectors\
    \ used.\n\nLet’s now imagine that each of our namespaces (`foo.core`, `foo.bar`,\
    \ and `foo.baz`) contains the code from Listings [9-8](#A453572_1_En_9_Chapter.html#Par56),\
    \ [9-9](#A453572_1_En_9_Chapter.html#Par58), and [9-10](#A453572_1_En_9_Chapter.html#Par60)\
    \ (I would suggest you edit your test `foo` app to mimic the following examples\
    \ if you wish to follow along in your REPL).\n\n### foo.core\n\n```\n(ns foo.core\n\
    \  (:use foo.bar)\n  (:use foo.baz)\n  (:gen-class))\n(def x 1)\n(defn -main [&\
    \ args]\n  (println \"Hello, World!\"))\n```\n\n*Listing 9-8. The `foo.core` Namespace\
    \ Code*\n\n### foo.bar\n\n```\n(ns foo.bar)\n(def a 1)\n(def b 2)\n(defn beep\
    \ [] \"bop\")\n(defn- bing [] \"bong\")\n```\n\n*Listing 9-9. The `foo.bar` Namespace\
    \ Code*\n\n**Note:** You might have noticed in `foo.bar` the function `bing` defined\
    \ using `defn-`. The extra hyphen at the end is important, as it means that when\
    \ generating a Java class from that namespace it’ll treat that function as private\
    \ and so it won’t be available within the other namespace.\n\n### foo.baz\n\n\
    ```\n(ns foo.baz)\n(def c 3)\n(def d 4)\n(def e 5)\n```\n\n*Listing 9-10. The\
    \ `foo.baz` Namespace Code*\n\nLet’s start up our REPL (`lein repl`) from within\
    \ the new `foo` directory, and we should notice we’re dropped into the same namespace\
    \ as specified by the `:main` attribute in `project.clj` (you should see the line\
    \ in the terminal set to `foo.core=>`).\n\nFrom the main namespace `foo.core`\
    \ you should be able to enter into the REPL the symbols `a`, `b`, `c`, `d`, and\
    \ `e` and see the corresponding values assigned to them. Equally, you should be\
    \ able to execute the function `(beep)` and see the appropriate return value.\n\
    \nBut, you won’t be able to execute the `(bing)` function, as it was defined using\
    \ `defn-` and so should be private and only accessible via the `foo.bar` namespace.\
    \ Listing [9-11](#A453572_1_En_9_Chapter.html#Par64) demonstrates how to access\
    \ it.\n\n```\n(in-ns 'foo.bar)\n(bing) ;; \"bong\"\n```\n\n*Listing 9-11. Access\
    \ Private Function by Entering its Namespace*\n\nNow that we have a better understanding\
    \ of how namespaces are working with our `foo` application, let’s go back and\
    \ look at the `:require`, `:as`, `:refer`, `:all`, and `:use` features and see\
    \ how they work.\n\n### :require\n\nThe inclusion of `:require` within an `ns`\
    \ macro means that it will import any public variables into the current namespace,\
    \ and from there the options available (`:as` and `:refer`) help to determine\
    \ how you access the imported data (as we’ll see in the next couple of sections).\
    \ The syntax structure for `:require` is as shown in Listing [9-12](#A453572_1_En_9_Chapter.html#Par67).\n\
    \n```\n(ns \n  (:require \n    [ :refer [ ]]\n    [ :as ]\n    [ :as  :refer []])\n\
    \  (:gen-class))\n```\n\n*Listing 9-12. Syntax Structure for `:require` Macro*\n\
    \n### :as\n\nThe `:as` libspec allows you to rename the namespace itself.\n\n\
    We’ve already seen the shorthand form of `:require`, but you can write it the\
    \ long-form way if you prefer (see Listing [9-13](#A453572_1_En_9_Chapter.html#Par70)).\n\
    \n```\n(ns foo.core\n  (:require [clojure.string :as str])\n  (:require [foo.bar\
    \ :as fbr])\n  (:require [foo.baz :as fbz])\n  (:gen-class))\n```\n\n*Listing\
    \ 9-13. Long-form Version of `:require`*\n\nHowever, it’s actually more than likely\
    \ you’ll want to use the short-form variation instead (see Listing [9-14](#A453572_1_En_9_Chapter.html#Par72)).\
    \ This means you can refer to all the public vars inside the `foo.bar` and `foo.baz`\
    \ namespaces using a shorter symbol. For example, instead of writing `foo.bar/b`\
    \ (to access the public `b` variable) you can type `fbr/b`.\n\n```\n(ns foo.core\n\
    \  (:require [clojure.string :as str]\n            [foo.bar :as fbr]\n       \
    \     [foo.baz :as fbz])\n  (:gen-class))\n```\n\n*Listing 9-14. Short-form Version\
    \ of `:require`*\n\n**Note:** When using the function version of `require` (i.e.,\
    \ outside of the `ns` macro), the quote before the vector means you don’t have\
    \ to quote each symbol inside the vector. For example, `(require '[name.space\
    \ :as nmsp])` instead of `(require ['name.space :as 'nmsp])`.\n\n### :refer\n\n\
    The `:refer` libspec allows you to import only the public variables you need into\
    \ the current scope. All other public variables are still available, but you have\
    \ to provide a fully qualified namespace to access them. See Listing [9-15](#A453572_1_En_9_Chapter.html#Par76).\n\
    \n```\n(ns foo.core\n  (:require clojure.string\n            [foo.bar :refer [a\
    \ beep]]\n            [foo.baz :as fbz :refer [c]])\n  (:gen-class))\n```\n\n\
    *Listing 9-15. Example of the `:refer` Libspec*\n\nIn Listing [9-15](#A453572_1_En_9_Chapter.html#Par76),\
    \ we can see that we’re loading the `clojure.string` namespace as is; we’re not\
    \ shortening it in any way. So, if we wanted to use the `upper-case` function\
    \ from that namespace, then we would execute `(clojure.string/upper-case \"make\
    \ me upper case!\")`, which would subsequently return `\"MAKE ME UPPER CASE!\"\
    `.\n\nIn the second statement `[foo.bar :refer [a beep]]`, we’re saying “make\
    \ `a` and `beep` available in the current scope and everything else that’s public\
    \ from that namespace we’ll have to access via the full namespace.” So, typing\
    \ `a` will return `2`; typing `(beep)` will return `\"bop\"`, and to access `b`\
    \ we can’t just type that, but instead must type `foo.bar/b`, which will return\
    \ `1`.\n\nIn the third statement `[foo.baz :as fbz :refer [c]]`, we’re saying\
    \ the same sort of thing as before, but now we’re also stating that when we have\
    \ to refer to a public variable using the full namespace, we only have to use\
    \ the shortened `fbz` as the namespace rather than the longer `foo.baz`. So, if\
    \ you type `c` you’ll get back `3`, and if you want to access `d` or `e` then\
    \ you’ll need to type `fbz/d` and `fbz/e` instead.\n\n**Note:** With the third\
    \ statement form, you can still use the long-form namespace. So, both `fbz/c`\
    \ and `foo.baz/c` work."
