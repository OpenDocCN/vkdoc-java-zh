  trans: '

    ## 真实世界的库示例


    有时最好看看真实项目是什么样子。例如，构建一个 Clojure Web 应用程序是一回事（大多数开发者都能应付——或许借助一些谷歌搜索），但我从个人经验中发现，构建一个被其他应用程序使用的库可能是一个相当令人困惑的过程。因此，我想向你展示一个我编写的小型
    Clojure 库，它帮助我使用一个名为 Spurious²⁵ 的工具（这是几年前的一个例子，但原理仍然适用）。


    我们将从理解 Spurious 是什么开始，然后查看我创建的库项目，并简要浏览一个使用该库的示例应用程序。但首先，让我们参考 Spurious 的 README
    文件，看看它是如何描述自己的：


    > Spurious 是一个工具集，允许在本地针对 AWS²⁶ 资源的子集进行开发。这些服务以 Docker 容器形式运行，Spurious 管理它们的生命周期和链接，因此你只需专注于使用这些服务。要使用
    Spurious，你需要将每个 AWS 服务的端点和端口更改为 Spurious 提供的值。——Spurious. GitHub


    简而言之，Spurious 试图在开发使用 AWS 服务的应用程序时为你节省资金（通过在本地运行这些服务）。这对我来说非常棒，因为我经常使用 AWS，它让我能够进行实验，而无需为可能永远不会成型的代码付费。


    注意


    为了让事情更复杂（对我自己而言），我需要我的库代码在标准 Clojure 应用程序中加载时能够工作，同时也要在应用程序从 Docker 容器内运行时能够工作（这不一定导致更多代码，但增加了整体过程的复杂性，以及对如何编写和测试我的库的理解难度）。


    你可以在 GitHub²⁷ 上找到我的库代码，以及使用该库的示例应用程序²⁸。我不会详细讲解它们的细节，但我会提供链接，因为它们将作为有用的参考点。


    ### 消费者


    让我们从示例应用程序以及它如何使用我的库开始。如果你查看 `project.clj`，你会看到我简单地将我的库定义为一个依赖项。请查看清单 12-17 以了解简化后的示例。


    ```

    (defproject spurious-clojure-example "0.1.0"

    :dependencies [[spurious-aws-sdk-helper "0.2.0"]])

    清单 12-17.

    消费者 project.clj 示例

    ```


    所以，这里没什么特别的；我们有一个依赖项，并指定了我们希望应用程序使用的特定版本。


    ### 本地测试


    如果你不熟悉发布库的过程，我将快速绕道说明我需要做什么才能测试并将自己的库作为依赖项加载。


    首先，我需要将我的库部署到 Clojure 的在线可用库仓库（称为 Clojars²⁹）。这需要你遵循 Leiningen³⁰ 提供的说明，但本质上涉及的步骤是注册一个账户，然后执行子命令
    `lein deploy clojars`。


    但是，在发布之前如何测试你的库代码呢（你怎么知道它能工作）？你不想推送版本 1.0.0，然后使用时发现有一个你未预料到的 bug。你想使用本地应用程序在本地测试库，这样你可以
    100% 确定它能工作（这对我来说尤其重要，因为我的库需要在 Docker 容器内工作，而我不确定没有手动步骤就能验证这一点）。


    解决这个问题的方法很简单：将库安装到本地缓存目录。要理解这意味着什么，你需要知道 Leiningen 会为你的依赖项创建一个本地缓存。它这样做是为了避免为你创建的每个项目反复下载相同的依赖项。


    这意味着我们可以利用本地缓存来“欺骗”Leiningen，让它以为已经在线下载了依赖项（即从 Clojars 下载），即使该依赖项在线尚不存在。要做到这一点，你只需（在你的库项目目录内）运行
    `lein install`，这会将你的库安装到本地的 `∼/.m2` 缓存目录中。


    ### 加载依赖项


    查看清单 12-18，了解消费者的 `home.clj` 文件是什么样的。在这里，你将看到我们如何拉取库以供使用。


    ```

    (ns spurious-clojure-example.routes.home

    (:require [compojure.core :refer :all]

    [spurious-aws-sdk-helper.core :as core]

    [spurious-aws-sdk-helper.utils :refer [endpoint cred]]))

    清单 12-18.

    加载外部依赖项（为简洁起见已缩短）

    ```


    你可以看到我拉取了 `core` 命名空间并对其重命名，以便更容易引用该加载命名空间中的公共函数（例如 `core/configure`）。你还可以看到我从
    `utils` 命名空间中引用了两个函数：`endpoint` 和 `cred`。


    在不陷入逐行解释的情况下，这基本上就是在消费者中加载库的全部内容。这与我们目前学到的关于命名空间和 Leiningen 项目的所有知识是一致的。

    '
- fmt: "### Reviewing the Library\n\nWhen looking at our helper library, we can see\
    \ that I’ve used an extremely simple and flat folder structure (Listing [12-19](#A453572_1_En_12_Chapter.html#Par167)).\
    \ It shows that your hierarchy doesn’t have to be deep and nested if you don’t\
    \ need it to be.\n\n```\n.\n├── src\n├── spurious_aws_sdk_helper\n├── core.clj\n\
    ├── dynamodb.clj\n├── s3.clj\n├── sqs.clj\n├── utils.clj\n├── project.clj\nListing\
    \ 12-19.\nClojure Library Simple Tree Structure\n```\n\nI have a single `src`\
    \ folder, and inside that I have a single folder called `spurious_aws_sdk_helper`,\
    \ which contains all the Clojure files required by my library. The `core.clj`\
    \ is responsible for loading the remaining files: `dynamodb.clj`, `s3.clj`, and\
    \ `sqs.clj`.\n\nThe `utils.clj` file contains (as you would expect) lots of utility\
    \ functions. Only two functions in this file are public and exposed as such so\
    \ that our consuming application can call them to get the service set up and running;\
    \ the rest of the functions are all private and used internally by the library\
    \ itself.\n\n> **Note**  \n> Remember, you can tell when a function is defined\
    \ as private by the use of the hyphen `defn-` (public functions use the standard\
    \ `defn` macro that you’re already familiar with).\n\nOne item of interest is\
    \ how the `configure` function with the `core` namespace is using a multi-arity\
    \ function in order to execute different behaviors depending on whether an `opts`\
    \ map was provided or not.\n\n```\n(defn configure\n([type]\n(s3/setup  type)\n\
    (ddb/setup type))\n([type opts]\n(if-let [name   (:s3  opts)] (s3/setup  type\
    \ name))\n(if-let [name   (:sqs opts)] (sqs/setup type name))\n(if-let [schema\
    \ (:ddb opts)]\n(ddb/setup type (yaml/parse-string schema)))))\nListing 12-20.\n\
    Example of a Simple Multi-arity Function\n```\n\nAs you can see from Listing [12-20](#A453572_1_En_12_Chapter.html#Par172),\
    \ if no `opts` is provided then we just call the `setup` method for both S3 and\
    \ DynamoDB; otherwise, if an `opts` argument is provided then we use `if-let`\
    \ to extract the relevant key (e.g., `:s3`, `:sqs`, or `:ddb`) from the `opts`\
    \ hash provided, and then associate it with the `name` symbol. We again will call\
    \ the `setup` method for each service, and this time we pass in `name`.\n\n> **Note**\
    \  \n> We’ve not seen `if-let` before, but it’s an immensely useful macro that\
    \ lets us execute a block of code only if the `let` binding is able to destruct\
    \ the data into the specified symbol successfully (you also have similar options,\
    \ such as `when-let` and `letfn`, which are worth exploring further).\n\n### Preparing\
    \ for Deploy\n\nAt this point, let’s assume you have a project you want to deploy\
    \ (if it’s a library, then as I mentioned earlier you’ll need to deploy the library\
    \ to Clojars, where it can then be consumed by other applications).\n\nOtherwise,\
    \ if this is a standard application and not a library, then Leiningen also provides\
    \ a single command to help us package our application in such a way that it can\
    \ be easily deployed to a production server and run with relatively little fuss:\
    \ `lein uberjar`.\n\nThe `uberjar` command, when configured properly from within\
    \ your `project.clj` (I’ll cover that in a moment), will generate a single jar\
    \ file that contains your project code as well as all its dependencies. If you’ve\
    \ not dealt with the `.jar` format before, Listing [12-21](#A453572_1_En_12_Chapter.html#Par178)\
    \ will show you how you can execute a jar from the command line.\n\n```\njava\
    \ -jar my_jar_file.jar   \nListing 12-21.\nExample of How to Execute a Jar via\
    \ the Terminal\n```\n\nIf you use the `lein-tar` plugin,[^(31)](#A453572_1_En_12_Chapter.html#Fn31)\
    \ then you’ll have at your disposal the `lein tar` command, and if you’re using\
    \ `lein-ring`,[^(32)](#A453572_1_En_12_Chapter.html#Fn32) then you can build a\
    \ web application using `lein ring uberjar` (or `lein ring war` for older servers,\
    \ if you require that).\n\nNow, coming back to the standard `lein uberjar` command,\
    \ I mentioned earlier that you need to configure your application in order for\
    \ that command to work properly. You’ll need to modify your `project.clj` to include\
    \ a `:main` key and assign a namespace that points to the entry point of your\
    \ application.\n\nIf you look at the example application,[^(33)](#A453572_1_En_12_Chapter.html#Fn33)\
    \ you’ll see I set the namespace to `:main ^:skip-aot spurious-clojure-example.repl`.\
    \ The namespace points to `src/spurious_clojure_example/repl.clj`, and inside\
    \ that file I’ve added a new function called `main`. The `main` function is what\
    \ should start up the web server (see Listing [12-22](#A453572_1_En_12_Chapter.html#Par185)).\n\
    \n```\n(defn -main []\n(start-server))\nListing 12-22.\nExample main Function\
    \ in Clojure Example App\n```\n\n> **Note**  \n> As we mentioned earlier, our\
    \ main entry point also needs `(gen-class)`, so you’ll notice I’ve included that\
    \ in the file as well.\n\nEffectively, what it all boils down to is (depending\
    \ on what your application does): modify the `:main` key in your `project.clj`\
    \ to point to a file that has a `main` function that bootstraps your application\
    \ in whatever way it needs to, and make sure to add `(gen-class)` to the top of\
    \ the file (see earlier in the chapter to understand why)."
