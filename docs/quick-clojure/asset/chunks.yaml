- fmt: '# Compojure Tree Structure


    Let’s take a quick moment to explore the tree structure of our Compojure web server
    (see Listing [12-6](#A453572_1_En_12_Chapter.html#Par45)) that was created using
    the command `lein new compojure-app foo`.


    The structure for a Compojure application isn’t too dissimilar to other applications
    (as we’ll see when we view some of the other templates available in Leiningen),
    but we can see with the Compojure template that we have a `src` directory that
    contains all our source code for the web server application.


    Alongside the `src` directory is a `test` directory that has a set of boilerplate
    tests included so we can see what a typical test case should look like, as well
    as a `resources` directory containing static assets such as JavaScript and CSS
    style sheets and images.


    ```

    ├── README.md

    ├── project.clj

    ├── resources

    │   └── public

    │       ├── css

    │       │   └── screen.css

    │       ├── img

    │       └── js

    ├── src

    │   └── foo

    │       ├── handler.clj

    │       ├── models

    │       ├── repl.clj

    │       ├── routes

    │       │   └── home.clj

    │       └── views

    │           └── layout.clj

    └── test

    └── foo

    └── test

    └── handler.clj

    Listing 12-6.

    Compojure Tree Structure

    ```


    In Listing [12-7](#A453572_1_En_12_Chapter.html#Par48), we can see how the main
    `home.clj` file works. It includes many concepts we’ve learned in previous chapters,
    such as namespaces, requiring dependencies and determining how they’re referenced,
    and defining functions responsible for defining the different “routes” our application
    should handle as well as the “handlers” themselves.


    Let’s get a quick run-down of `home.clj` to be sure we understand its setup and
    what routes our application is automatically configured with (as part of the boilerplate
    construction).


    ```

    (ns foo.routes.home

    (:require [compojure.core :refer :all]

    [foo.views.layout :as layout]))

    (defn home []

    (layout/common [:h1 "Hello World!"]))

    (defroutes home-routes

    (GET "/" [] (home)))

    Listing 12-7.

    Contents of the Compojure home.clj File

    ```


    To start with, we have a namespace defined, and you can see we’re pulling in the
    Compojure core functions, which include the `defroutes` macro. We also pull in
    the layout `views` file from our own tree structure, and that uses the hiccup
    library for handling constructing an HTML response (see `layout.clj` in Listing
    [12-8](#A453572_1_En_12_Chapter.html#Par53)).


    The `defroutes` macro gives us the ability to define a specific route that our
    application should handle. By default, our application handles all possible routes
    by specifying we want our application to handle any `GET` requests, and that if
    the incoming path matches `"/"` (which effectively all requests will do, as they
    all begin with `/`) then pass that request information to the `home` function
    to deal with.


    If we wanted to handle the path `/foo/bar`, then we would define a `GET` request
    for `"/foo/bar"` and then specify which function should handle that route.


    The `home` function calls the `layout/common` function (that was made available
    via our `views layout.clj` file), and we pass that function our response body
    content, which in this case is an `H1` header with the value `"Hello World!"`.


    ```

    (ns foo.views.layout

    (:require [hiccup.page :refer [html5 include-css]]))

    (defn common [& body]

    (html5

    [:head

    [:title "Welcome to foo"]

    (include-css "/css/screen.css")]

    [:body body]))

    Listing 12-8.

    Contents of the Compojure layout.clj File

    ```


    We can see from Listing [12-8](#A453572_1_En_12_Chapter.html#Par53) what the default
    HTML is that’s used by Compojure. It’s a simple HTML page consisting of a `<head>`
    and `<title>` and a `<body>` (whose contents are provided by the caller of the
    `common` function). We can also see it includes a `screen.css` file, which is
    what gives our page its default styling.


    ## Tests


    Compojure also constructs some basic tests for us in the `test/foo/test/handler.clj`
    file (see Listing [12-9](#A453572_1_En_12_Chapter.html#Par56)). This file utilizes
    the built-in Clojure testing library `clojure.test` [⁶](#A453572_1_En_12_Chapter.html#Fn6)
    in order to define some simple tests that verify the web server is running as
    expected.


    Note


    These tests are integration tests rather than unit tests. In short, a unit test
    is for verifying the behavior of an individual function (or unit of code), whereas
    an integration test verifies the system as a whole is working as expected. For
    more information on the difference, I refer you to a short but good explanation
    by Nathan Hughes.[⁷](#A453572_1_En_12_Chapter.html#Fn7)


    ```

    (ns foo.test.handler

    (:use clojure.test

    ring.mock.request

    foo.handler))

    (deftest test-app

    (testing "main route"

    (let [response (app (request :get "/"))]

    (is (= (:status response) 200))

    (is (.contains (:body response) "Hello World"))))

    (testing "not-found route"

    (let [response (app (request :get "/invalid"))]

    (is (= (:status response) 404)))))

    Listing 12-9.

    Contents of Compojure’s test/handler.clj File

    ```


    In Listing [12-9](#A453572_1_En_12_Chapter.html#Par56), we can see that we’re
    pulling in the `clojure.test` dependency along with a dependency specified by
    Ring itself, which is its mock request library.[⁸](#A453572_1_En_12_Chapter.html#Fn8)
    We also pull in the Compojure `handler` file, as that gives us access to the `app`
    function within that file.


    From the code, we can see that we’re now able to provide a fake (i.e., mocked)
    request object into the `app` function, and subsequently we can inspect the response
    and identify if the relevant details came back as we had expected them to.


    As far as Listing [12-9](#A453572_1_En_12_Chapter.html#Par56) is concerned, we
    can see that we’re expecting that a request to `"/"` will result in the response
    contents `"Hello World"`, and that the response status code will be a 200 code
    (which indicates a successful request).


    The second test validates that the web server returns the status code 404 when
    a request is received by the web server for a path that it isn’t configured to
    handle (so, in this case, a request to the nonsensical path `"/invalid"` was made).


    In order to run these tests, we need to utilize a sub-command of Leiningen: `lein
    test`. This command will locate all the tests within the test directory and execute
    them one by one. We can also execute only specific test suites by specifying the
    relevant namespace. For example, `lein test :only foo.test.handler/test-app`.


    Note


    `test-app` is the containing suite of tests defined in `tests/handler.clj`, and
    within that we have a set of testing “contexts” that allow us to display specific
    output messages.


    If all is well, you’ll see the output shown in Listing [12-10](#A453572_1_En_12_Chapter.html#Par68);
    otherwise, if there’s an error (let’s say we changed the expected status code
    output for a successful request to be 202 instead of 200) you’ll see what’s shown
    in Listing [12-11](#A453572_1_En_12_Chapter.html#Par69).


    ```

    lein test foo.test.handler

    Ran 1 tests containing 3 assertions.

    0 failures, 0 errors.

    Listing 12-10.

    Successful Test Output

    ```


    ```

    lein test foo.test.handler

    lein test :only foo.test.handler/test-app

    FAIL in (test-app) (handler.clj:9)

    main route

    expected: (= (:status response) 202)

    actual: (not (= 200 202))

    Ran 1 tests containing 3 assertions.

    1 failures, 0 errors.

    Tests failed.

    Listing 12-11.

    Failed Test Output

    ```


    That covers things as far as the basic setup and usage of a Compojure web application
    are concerned. There’s obviously lots more to what Compojure can do and how it
    can be configured, but, as mentioned earlier, there are entire books based on
    the topic of Clojure web development, so let’s instead now turn our attention
    to the set of templates that are included as part of Leiningen, as this will show
    us what other types of applications we can build.'
