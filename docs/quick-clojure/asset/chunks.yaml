- fmt: '# Map


    The map data structure goes by many different names—hash, hash map, dictionary—and
    what distinguishes it from other data structures is the underlying implementation,
    which is a key part of ensuring the algorithmic performance of this particular
    data structure (but that topic of discussion is outside the scope of this book).


    Effectively, a map is a key/value lookup. You provide a key and associate a value
    with that key. See Listing [2-17](#A453572_1_En_2_Chapter.html#Par104), for example.


    ```

    {:my-key "this is my value"}

    Listing 2-17.

    Simple Map Data Structure

    ```


    **Note:** Clojure maps have a 1:1 mapping to JSON.


    We use the `get` function to retrieve a value for a specified key, as seen in
    Listing [2-18](#A453572_1_En_2_Chapter.html#Par107).


    ```

    (get {:my-key "this is my value"} :my-key)

    ;; "this is my value"

    Listing 2-18.

    Retrieve Value from a Map Data Structure

    ```


    **Note:** If you want the entire entry (i.e., the key and the value, not just
    the value) then you can use `find` instead:


    `(find {:a 1 :b 2} :a)` will return `[:a 1]`


    We can also add a key to an existing map using the `assoc` function. We used `assoc`
    earlier with the vector data structure, so already you can see the “Sequence Abstraction”
    coming into play with a function that can be used consistently across different
    data structure types. See Listing [2-19](#A453572_1_En_2_Chapter.html#Par111).


    ```

    (assoc {:foo "bar"} :baz "qux")

    ;; {:foo "bar", :baz "qux"}

    Listing 2-19.

    Associate a New Key/Value Pair into a Map Data Structure

    ```


    You can also remove pairs using the `dissoc` function, like in Listing [2-20](#A453572_1_En_2_Chapter.html#Par113).


    ```

    (dissoc {:foo "bar" :baz "qux"} :baz)

    ;; {:foo "bar"}

    Listing 2-20.

    Remove a Key/Value Pair from a Map Data Structure

    ```


    Similarly, if you need to return a new map that consists of a specific key, then
    you can use the `select-keys` function, shown in Listing [2-21](#A453572_1_En_2_Chapter.html#Par115).


    ```

    (select-keys {:name "Mark" :age 33 :location "London"} [:name :location])

    ;; {:name "Mark", :location "London"}

    Listing 2-21.

    Filter Map for Specific Keys

    ```


    You’ll notice in the preceding example that the returned map is now correctly
    missing the `:age` key pair. Also, take note of the fact that unlike `dissoc`,
    where you can specify multiple keys as arguments in order to remove them all from
    the resulting map, with `select-keys` you need to specify multiple keys within
    a vector in order to select the pairs you want.


    ## Keywords


    Some readers may be wondering what the colon prefixing the key is supposed to
    mean (i.e., as we’ve seen with `:foo` and `:baz`). The colon indicates that the
    key is actually a keyword. If you’ve used Symbols in Ruby, then it’s the same
    thing. If not, then know that its usage is primarily for performance reasons.


    To elaborate, if you create a map key with a string (e.g., `{"my-key" "my key
    value"}`), then every time you reference the key using a string, you’ll be recreating
    it in memory, whereas referencing a key via a keyword is only done once.


    To understand this better, imagine we have the vector seen in Listing [2-22](#A453572_1_En_2_Chapter.html#Par120)
    with the same value for every element.


    ```

    ["hi" "hi" "hi"]

    ;; creates the string “hi” three times in memory

    [:hi :hi :hi]

    ;; the value hi is created once in memory

    Listing 2-22.

    Demonstrate Keyword Performance

    ```


    So, we can see the performance benefit of specifying a keyword once and having
    the underlying memory allocation reused wherever the keyword is found in the code.
    This is why you’ll see keywords used the majority of the time instead of a string
    (unless you have a very specific need for a string).


    **Note:** You can convert a string into a keyword using the `keyword` function:
    `(keyword "my-string")`, which returns `:my-string`. The reverse is also possible
    with the `name` function: `(name :my-string)`, which returns `"my-string"`.


    There is one important addition to the use of keywords—if you use them as keys
    inside a map, then the keyword acts like a `get` function.


    So, for example, imagine you have a map `{:foo "bar" :baz "qux"}` and you wanted
    the value from the `:baz` key. You could use either of the following snippets
    seen in Listing [2-23](#A453572_1_En_2_Chapter.html#Par125) to get at that value.


    ```

    (get {:foo "bar" :baz "qux"} :baz)

    ;; "qux"

    (:baz {:foo "bar" :baz "qux"})

    ;; "qux"

    Listing 2-23.

    Keyword as a Function

    ```


    In Listing [2-23](#A453572_1_En_2_Chapter.html#Par125) we’ve used the familiar
    `get` function like before to retrieve the value of the specified key, but we
    can also just use the keyword in the place where a function is expected, and it’ll
    return the value for that key. If you’re unsure whether your map includes a certain
    key, then you can use the `contains?` function, as seen in Listing [2-24](#A453572_1_En_2_Chapter.html#Par127).


    ```

    (contains? {:foo "bar" :baz "qux"} :foo)

    ;; true

    Listing 2-24.

    Demonstrate the contains? Function

    ```'
