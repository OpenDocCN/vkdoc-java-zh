- fmt: "# 3. Functional Programming\n\nClojure is a functional language, so it provides\
    \ certain features you would expect to find in other functional programming (FP)\
    \ languages, such as the following:\n\n- Immutability\n- Referential transparency\n\
    - First-class functions\n- Partial application\n- Recursive iteration\n- Composability\n\
    \nLet’s take a moment to consider each of these features.\n\n## Immutability\n\
    \nThe idea behind immutability is that it is used when we wish to avoid “mutating\
    \ state.” What that really means is that it helps us to avoid changing data that\
    \ might be used by multiple (separate) areas of a program.\n\nIf you have state\
    \ and it can change, then once your application becomes distributed and concurrent\
    \ (i.e., multi-threaded), you’ll end up in a world of hurt, as many different\
    \ threads can start manipulating your data at non-deterministic times. This can\
    \ cause your application to fail at any given moment and become very hard to debug\
    \ and to reason about.\n\nBy offering immutability, Clojure can help to side-step\
    \ this problem. In Clojure, every time you manipulate a data structure you are\
    \ returned not a mutated version of the original, but rather a whole new copy\
    \ with your change(s) applied.\n\n> **Note**  \n> Having complete copies of your\
    \ data might sound like a performance nightmare, but thanks to how Clojure implements\
    \ certain data structures internally—using tries—it’s actually very efficient.\
    \ Clojure calls this Persistent Data Structures.\n\nImmutability is a strange\
    \ concept to grasp when coming from an object-oriented language (OOP). This is\
    \ because functional programming (FP) and OOP have different goals.\n\nOOP is\
    \ about encapsulating data (state) and providing controlled access via object\
    \ methods. FP is about the flow of a software system, where data is passed through\
    \ a set of functions that manipulate the data as it makes its way out to the end\
    \ user (i.e., the data is filtered).\n\n## Referential Transparency\n\nReferential\
    \ transparency is when an expression can be replaced by its value without changing\
    \ the behavior of a program. In a practical sense, it’s when you define a function\
    \ that takes an argument and always returns the same value when given the same\
    \ argument. See Listing 3-1.\n\n> **Note**  \n> There is a related concept called\
    \ pure functions that more broadly refers to a function whose return value is\
    \ determined by its inputs, and with no visible side effects.\n\n```\n(defn sum\
    \ [x y]\n  (+ x y))\n(sum 1 1)\n;; 2\n```\n\n*Listing 3-1. Example of a Referentially\
    \ Transparent Function*\n\nThe function `sum` (shown in Listing 3-1) is referentially\
    \ transparent. No matter what happens, if I provide the same set of arguments\
    \ (in this case `1` and `1`), I’ll always get back the same result.\n\nEvery program\
    \ needs state of some sort, and that’s why Clojure is not a “strict” FP language\
    \ like maybe Haskell. Clojure’s philosophy is to strive for being functional and\
    \ referentially transparent wherever possible.\n\n## First-class Functions\n\n\
    For a language to offer “first-class functions,” it needs to be able to both store\
    \ functions and pass functions around as if they were values. We’ve already seen\
    \ the former being achieved using variables, and the latter (passing functions\
    \ around as values) is also possible within Clojure.\n\n> **Note**  \n> The concept\
    \ of first-class functions helps to promote the idea of higher-order functions.\
    \ A higher-order function is one that can either take or return a function as\
    \ a value. There are many higher-order functions in Clojure: `map`, `reduce`,\
    \ `comp`, `apply`, `partial`, and `filter`, and I’ll demonstrate all of these\
    \ within this chapter.\n\nLet’s begin by seeing an—admittedly simple and silly—example\
    \ of first-class functions in action (Listing 3-2).\n\n```\n(defn cap [s]\n  (clojure.string/upper-case\
    \ s))\n(defn greeting [c s]\n  (prn (c s)))\n(greeting cap \"hi there\")\n;; \"\
    HI THERE\"\n```\n\n*Listing 3-2. Example of How Clojure Supports First-class Functions*\n\
    \nIn Listing 3-2, we’ve defined a `cap` function, which we’re passing in to a\
    \ `greeting` function. This demonstrates how functions can be passed around as\
    \ if they were values and meets the first half of the “first-class function” requirement.\n\
    \n> **Note**  \n> The `cap` function itself isn’t important, but you’ll see we’ve\
    \ referenced a function `clojure.string/upper-case`. This is a “fully qualified”\
    \ function, meaning we’ve given an explicit/direct path to where the function\
    \ can be located (within the `clojure.string` namespace; we’ll cover namespaces\
    \ in a later chapter).\n\nThe other half of that requirement is the ability to\
    \ return a function from a function (as opposed to returning a value from a function).\
    \ We can see an example of this in Listing 3-3, where the `partial` function doesn’t\
    \ return a value but rather another function.\n\nI’ll demonstrate how `partial`\
    \ application works in the following section, but hopefully the example in Listing\
    \ 3-3 is simple enough to highlight the potential for what partial application\
    \ can provide.\n\n```\n(defn sum [x y]\n  (+ x y))\n(def add-on-five (partial\
    \ sum 5))\n(add-on-five 10)\n;; 15\n```\n\n*Listing 3-3. Example of Partial Application*\n\
    \nOther examples of Clojure’s first-class function credentials can be found in\
    \ the following list. In each of the subsequent examples, we’ll demonstrate first-class\
    \ functions by passing existing functions into other functions. The functions\
    \ we’ll be using in our examples are:\n\n- `complement`\n- `apply`\n- `map`\n\
    - `reduce`\n- `filter`\n- `comp`\n\n### Complement\n\nThe `complement` function\
    \ is very simple: it takes in a predicate and returns a predicate (remember that\
    \ a predicate is what you call a function if it returns a Boolean value). See\
    \ Listing 3-4.\n\n```\n((complement empty?) \"\")\n;; false\n```\n\n*Listing 3-4.\
    \ Example of the `complement` function returning the opposite truth value*\n\n\
    > **Note**  \n> The naming convention used for predicate functions is similar\
    \ to the Ruby programming language in that you suffix a question mark onto the\
    \ name of predicates (e.g., `even?`).\n\nIn our example, we pass an empty string\
    \ into our new predicate function. The `empty?` function would normally return\
    \ `true` for an empty string, but the point of `complement` is to reverse the\
    \ original Boolean, so instead we get `false`.\n\nFor this example, to be more\
    \ practical, you would ideally save the new predicate function in a variable called\
    \ `not-empty?` to allow for maximum reusability.\n\n### Apply\n\nThe `apply` example\
    \ takes a function (in this case it will be `str`, which concatenates strings\
    \ together) and a collection `[\"a\" \"b\" \"c\"]` and then passes each element\
    \ in the collection to the specified function.\n\n```\n(apply str [\"a\" \"b\"\
    \ \"c\"])\n;; \"abc\"\n```\n\n*Listing 3-5. Example of `apply`*\n\nIn Listing\
    \ 3-5, we’re able to utilize a collection, while the effect of this code is that\
    \ it in essence works like we called `(str \"a\" \"b\" \"c\")` instead. The benefit\
    \ of the `apply` function is for times when you don’t know what the arguments\
    \ will be until runtime."
  raw: '# 3. Functional Programming


    Clojure is a functional language, so it provides certain features you would expect
    to find in other functional programming (FP) languages, such as the following:


    *   Immutability

    *   Referential transparency

    *   First-class functions

    *   Partial application

    *   Recursive iteration

    *   Composability


    Let’s take a moment to consider each of these features.


    ## Immutability


    The idea behind immutability is that it is used when we wish to avoid “mutating
    state .” What that really means is that it helps us to avoid changing data that
    might be used by multiple (separate) areas of a program.


    If you have state and it can change, then once your application becomes distributed
    and concurrent (i.e., multi-threaded), you’ll end up in a world of hurt, as many
    different threads can start manipulating your data at non-deterministic times.
    This can cause your application to fail at any given moment and become very hard
    to debug and to reason about.


    By offering immutability, Clojure can help to side-step this problem. In Clojure,
    every time you manipulate a data structure you are returned not a mutated version
    of the original, but rather a whole new copy with your change(s) applied.


    Note


    Having complete copies of your data might sound like a performance nightmare,
    but thanks to how Clojure implements certain data structures internally—using
    tries[¹](#A453572_1_En_3_Chapter.html#Fn1)—it’s actually very efficient. Clojure
    calls this Persistent Data Structures.


    Immutability is a strange concept to grasp when coming from an object-oriented
    language (OOP) . This is because functional programming (FP) and OOP have different
    goals.


    OOP is about encapsulating data (state) and providing controlled access via object
    methods. FP is about the flow of a software system, where data is passed through
    a set of functions that manipulate the data as it makes its way out to the end
    user (i.e., the data is filtered).


    ## Referential Transparency


    Referential transparency is when an expression can be replaced by its value without
    changing the behavior of a program. In a practical sense, it’s when you define
    a function that takes an argument and always returns the same value when given
    the same argument. See Listing [3-1](#A453572_1_En_3_Chapter.html#Par18).


    Note


    There is a related concept called pure functions that more broadly refers to a
    function whose return value is determined by its inputs, and with no visible side
    effects.


    ```

    (defn sum [x y]

    (+ x y))

    (sum 1 1)

    ;; 2

    Listing 3-1.

    Example of a Referentially Transparent Function

    ```


    The function `sum` (shown in Listing [3-1](#A453572_1_En_3_Chapter.html#Par18))
    is referentially transparent. No matter what happens, if I provide the same set
    of arguments (in this case `1` and `1`), I’ll always get back the same result.


    Every program needs state of some sort, and that’s why Clojure is not a “strict”
    FP language like maybe Haskell.[²](#A453572_1_En_3_Chapter.html#Fn2) Clojure’s
    philosophy is to strive for being functional and referentially transparent wherever
    possible.


    ## First-class Functions


    For a language to offer “first-class functions,” it needs to be able to both store
    functions and pass functions around as if they were values. We’ve already seen
    the former being achieved using variables, and the latter (passing functions around
    as values) is also possible within Clojure.


    Note


    The concept of first-class functions helps to promote the idea of higher-order
    functions. A higher-order function is one that can either take or return a function
    as a value. There are many higher-order functions in Clojure: `map`, `reduce`,
    `comp`, `apply`, `partial`, and `filter`, and I’ll demonstrate all of these within
    this chapter.


    Let’s begin by seeing an—admittedly simple and silly— example of first-class functions
    in action (Listing [3-2](#A453572_1_En_3_Chapter.html#Par25)).


    ```

    (defn cap [s]

    (clojure.string/upper-case s))

    (defn greeting [c s]

    (prn (c s)))

    (greeting cap "hi there")

    ;; "HI THERE"

    Listing 3-2.

    Example of How Clojure Supports First-class Functions

    ```


    In Listing [3-2](#A453572_1_En_3_Chapter.html#Par25), we’ve defined a `cap` function
    , which we’re passing in to a `greeting` function. This demonstrates how functions
    can be passed around as if they were values and meets the first half of the “first-class
    function” requirement.


    Note


    The `cap` function itself isn’t important, but you’ll see we’ve referenced a function
    `clojure.string/upper-case`. This is a “fully qualified” function, meaning we’ve
    given an explicit/direct path to where the function can be located (within the
    `clojure.string` namespace; we’ll cover namespaces in a later chapter).


    The other half of that requirement is the ability to return a function from a
    function (as opposed to returning a value from a function). We can see an example
    of this in Listing [3-3](#A453572_1_En_3_Chapter.html#Par30), where the `partial`
    function doesn’t return a value but rather another function.


    I’ll demonstrate how `partial` application works in the following section, but
    hopefully the example in Listing [3-3](#A453572_1_En_3_Chapter.html#Par30) is
    simple enough to highlight the potential for what partial application can provide.


    ```

    (defn sum [x y]

    (+ x y))

    (def add-on-five (partial sum 5))

    (add-on-five 10)

    ;; 15

    Listing 3-3.

    Example of Partial Application

    ```


    Other examples of Clojure’s first-class function credentials can be found in the
    following list. In each of the subsequent examples, we’ll demonstrate first-class
    functions by passing existing functions into other functions. The functions we’ll
    be using in our examples are:


    *   `complement`

    *   `apply`

    *   `map`

    *   `reduce`

    *   `filter`

    *   `comp`


    ### Complement


    The `complement` function is very simple: it takes in a predicate and returns
    a predicate (remember that a predicate is what you call a function if it returns
    a Boolean value). See Listing [3-4](#A453572_1_En_3_Chapter.html#Par39).


    ```

    ((complement empty?) "")

    ;; false

    Listing 3-4.

    Example of the complement function returning the opposite truth value

    ```


    Note


    The naming convention used for predicate functions is similar to the Ruby programming
    language in that you suffix a question mark onto the name of predicates (e.g.,
    `even?`).


    In our example, we pass an empty string into our new predicate function. The `empty?`
    function would normally return `true` for an empty string, but the point of `complement`
    is to reverse the original Boolean, so instead we get `false`.


    For this example, to be more practical, you would ideally save the new predicate
    function in a variable called `not-empty?` to allow for maximum reusability.


    ### Apply


    The `apply` example takes a function (in this case it will be `str`, which concatenates
    strings together) and a collection `["a" "b" "c"]` and then passes each element
    in the collection to the specified function.


    ```

    (apply str ["a" "b" "c"])

    ;; "abc"

    Listing 3-5.

    Example of apply

    ```


    In Listing [3-5](#A453572_1_En_3_Chapter.html#Par44), we’re able to utilize a
    collection, while the effect of this code is that it in essence works like we
    called `(str "a" "b" "c") instead`. The benefit of the `apply` function is for
    times when you don’t know what the arguments will be until runtime.'
