- fmt: '### Predicate Functions


    There’s a small selection of predicate-related functions that I’d like to show
    you (remember that a predicate is a function that returns a Boolean `true`/`false`
    value). The functions I want to look at are as follows:


    - `every?`

    - `every-pred`

    - `not-any?`

    - `some`


    These are useful functions to know, because when working with data you’ll often
    want to verify whether a selection of items match a condition completely or whether
    only some of them do (or even if just any of the values match the condition).


    So, let’s start with the `every?` function, which takes a predicate and a collection
    and will return a `true` Boolean value only if all the items in the provided collection
    themselves return `true` via the predicate (otherwise `every?` will return `false`).
    See Listing [5-28](#A453572_1_En_5_Chapter.html#Par96), for a demonstration of
    this behaviour.


    ```

    (every? even? [2 4 6]) ;; true

    (every? even? [1 4 6]) ;; false

    Listing 5-28.

    Example of every? Function

    ```


    What’s interesting in the example in Listing [5-28](#A453572_1_En_5_Chapter.html#Par96)
    is that you can also use other data structures with `every?`, not just functions
    in the typical sense that you think of them. So, you could use a set data structure
    as the predicate and then `every?` would return `true` if every item in the collection
    also appeared within the set. Alternatively, you could use a map data structure
    as the predicate, and this would mean that each item in the collection would be
    checked to see if it appeared as a key in the map.


    **Note**


    There is also `not-every?`, which is the reverse behavior. I personally find it
    so confusing to read that I’d argue that your code clarity would suffer because
    of it. I’ve also never had a need to use it either, as I rarely need to know if
    a collection of items doesn’t match. Nevertheless, it’s a tool at your disposal.


    Functional programming is all about the composing of single-responsibility functions,
    and the `every-pred` function is a great example of the ability to easily compose
    logic checks. It accepts a list of predicate functions and will itself return
    a function. The returned function can then be applied against a list of items
    to see if they pass all the defined predicates. Again, a simple example will help
    clarify the usage (see Listing [5-29](#A453572_1_En_5_Chapter.html#Par100)).


    ```

    ((every-pred number? odd?) 1 2 3) ;; false

    ((every-pred number? odd?) 1 3 5) ;; true

    Listing 5-29.

    Example of every-pred Function

    ```


    A moment ago I mentioned how the `not-every?` function was a bit confusing because
    that direction of checking conditional matches didn’t make as much sense to me
    as the alternative, which is the `every?` function (as well as the fact that it
    feels more confusing—to me anyway—for readers of your code to use `not-every?`
    compared to `every?`). Now, there is a `not-any?` function that sits very much
    in that same camp for me. See Listing [5-30](#A453572_1_En_5_Chapter.html#Par102)
    for an example use case.


    ```

    (not-any? odd? [2 4 6]) ;; true

    (not-any? odd? [1 3 5]) ;; false

    Listing 5-30.

    Example of not-any? Function

    ```


    The reason I even make mention of `not-any?` (considering I’m clearly not a fan
    of the `not-`type functions) is because in an upcoming Clojure language version
    release (at the time of writing this will possibly be `1.9`) there will be an
    `any?` function added to the core library, and that’s something I’d recommend
    you take a look at once it becomes more widely available.


    Lastly, we’ll take a look at the `some` function, which every once in a blue moon
    you’ll find a use for. The `some` function takes a predicate and a collection
    and will return `true` if at least one item in the provided collection passes
    the predicate check (otherwise `some` will return `nil`). See Listing [5-31](#A453572_1_En_5_Chapter.html#Par105)
    for an example.


    ```

    (some even? [1 3 5 7]) ;; nil

    (some even? [1 2 3 4]) ;; true

    Listing 5-31.

    Example of some Function

    ```


    OK, before moving on, it’s worth clarifying that there is also a `some?` function,
    and I don’t find it as useful as some alternative functions. What it does is return
    `true` if the provided argument is not `nil`. Now, this function is like the `not-`
    form of another function called `nil?`, which I find much more useful and easier
    to understand when sifting through code. The `nil?` function returns `true` if
    the provided argument is `nil`, otherwise it returns `false`.


    **Note**


    There is also a `false?` function, which explicitly checks for the `false` value:
    `(false? true) ;; false`


    ### Collection Extraction


    There are some simple functions that can help reduce a bit of the boilerplate
    required in accessing the first item(s) within a collection.


    The first function we’ll look at is itself called `first` and works exactly how
    you might expect it to, in that you provide it a collection and it extracts the
    first item in that collection for you.


    The other function we’ll look at is called `last`, and it works, again, how you
    might expect it to, in that you provide it a collection and it extracts the last
    item in the collection. See Listing [5-32](#A453572_1_En_5_Chapter.html#Par111)
    for examples of both `first` and `last`.


    ```

    (first [:a :b :c]) ;; :a

    (last [:a :b :c]) ;; :c

    Listing 5-32.

    Example of first and last Functions

    ```


    **Note**


    The `first` and `last` functions return the extracted values, whereas the functions
    `rest` and `pop` remove the first/last value and return the mutated collection.


    Now that we’ve seen how to extract the first item, let’s see how we can take that
    idea further and extract the first item from the first nested collection using
    the `ffirst` function. See Listing [5-33](#A453572_1_En_5_Chapter.html#Par114)
    for an example.


    ```

    (first [[1 2 3] :b :c])  ;; [1 2 3]

    (ffirst [[1 2 3] :b :c]) ;; 1

    Listing 5-33.

    Example of ffirst Function

    ```


    We also have a `fnext` function, which locates the first item in the provided
    collection and then returns the next item along. Although, admittedly, that’s
    quite a specific use case, and for most cases using the `get` function would be
    more flexible.


    Let’s consider two other functions: `nnext` and `nfirst`. The `nnext` function
    is interesting in that it locates the item next to the first item and then returns
    the remaining items in the collection, whereas the `nfirst` function extracts
    the first item in the collection and then returns the nested collection minus
    the first value. See Listing [5-34](#A453572_1_En_5_Chapter.html#Par117) for an
    example.


    ```

    (nnext [1 2 3 4 5 6]) ;; (3 4 5 6)

    (nfirst [[1 2 3] 4 5 6]) ;; (2 3)

    Listing 5-34.

    Example of nnext and nfirst Functions

    ```


    Ultimately, these are interesting functions to have available in the core library,
    but I do question how useful they are in the sense of code clarity. I know from
    past experience seeing these functions in someone else’s code that having to look
    up the documentation made the flow of the code difficult to follow. But I guess
    if the right use case presents itself, then these could be a nice shortcut into
    the data structure you’re dealing with.'
