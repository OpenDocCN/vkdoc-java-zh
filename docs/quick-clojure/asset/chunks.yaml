    ### 基本输入/输出


    Clojure 的核心库提供了两个用于处理简单磁盘输入/输出（I/O）的函数：`slurp` 和 `spit`。`slurp` 函数用于读取数据，而 `spit`
    函数用于写入数据。


    请参阅清单 5-51 中的演示，该演示创建了一个新文件，然后多次将其读取到 REPL 中。第一次调用 `spit` 时，我们创建了该文件。第二次，我们使用
    `:append true` 来防止重新创建文件，最后我们调用不带 `append` 的 `spit`。我们会看到文件被新内容覆盖。


    ```

    (spit "foo.txt" "abc") ;; 返回 nil，但创建了 foo.txt

    (slurp "foo.txt") ;; "abc"

    (spit "foo.txt" "xyz" :append true)

    (slurp "foo.txt") ;; "abcxyz"

    (spit "foo.txt" 123)

    (slurp "foo.txt") ;; "123"

    清单 5-51.

    spit 和 slurp 函数示例

    ```


    注意


    `slurp` 函数还提供了一个 `:encoding` 参数，用于定义读取文件时使用的编码。


    如果文件可以轻松地放入内存，那么 `slurp` 方法很适合读取文件，但如果我们处理的是非常大的文件，那么还有其他选项可供我们使用，例如 Java 的 `BufferedReader`，它允许我们在读取缓冲行时逐行读取。


    清单 5-52 演示了如何将 Java 的 `BufferedReader` 与 `with-open` 函数结合使用来打开文本文件。


    ```

    (with-open [rdr (java.io.BufferedReader. (java.io.FileReader. "foo.txt"))]

    (let [seq (line-seq rdr)]

    (print seq)))

    清单 5-52.

    with-open 和 Java 的 BufferedReader 示例

    ```


    因此，在清单 5-52 中发生了一些我们应该注意的事情。我们做的第一件事是创建一个 Java FileReader 实例，因为这是使用 BufferedReader
    的要求。然后，`BufferedReader` 的实例被分配给符号 `rdr`。从这里，我们可以看到 `rdr` 被传递给 `with-open` 宏，该宏的作用类似于上下文管理器，因为它会在
    `try`/`finally` 表单内部执行主体表单。


    我们示例中的“主体”是 `let` 表单，它将符号 `seq` 绑定到从 `BufferedReader` 传递给它的各个文件行。我们可以看到我们调用了 `line-seq`
    并将 `rdr` 实例传递给它，它会将其转换为惰性序列。


    `with-open` 函数期望一个项目列表，它可以在 `try`/`finally` 表单的 `finally` 子句部分对这些项目调用 `.close`。在我们的示例中，这意味着我们可以确保我们的
    `BufferedReader` 在完成后会被关闭。


    ## clojure.string


    `clojure.string` 命名空间包含用于处理字符串的有用工具。就像我对 `clojure.core` 命名空间所做的那样，我将介绍我认为值得强调的一小部分函数。


    ### 检查空白


    一个常见的任务是验证某些输入是否实际上是空白的。也就是说，输入是 nil 还是空，或者是否只包含空白字符？


    Clojure 在核心命名空间中已经有一个 `empty?` 函数，但它只适用于集合（不适用于字符串）。如果你需要使用字符串验证这种行为，那么你需要 `blank?`
    函数（参见清单 5-53）。


    ```

    (clojure.string/blank? "") ;; true

    (clojure.string/blank? "    ") ;; true

    (clojure.string/blank? "    a") ;; false

    (clojure.string/blank? "123") ;; false

    清单 5-53.

    演示 blank? 函数的示例

    ```


    注意


    为简单起见，我提供了函数的完全限定命名空间路径。在实践中，你可能会从 `clojure.string` 命名空间中引用 `blank?` 函数，这样你的代码看起来更像：`(blank?
    "")`。我们将在后面讨论命名空间的章节中看到如何做到这一点。


    ### 开头和结尾


    另一个常见任务是检查字符串是否以特定的子字符串或字符开头和结尾。例如，如果处理 URL 路径，你可能想检查字符串的开头是否包含正斜杠。


    Clojure 的 `string` 命名空间提供了两个函数来让我们验证这一点；它们是 `starts-with?` 和 `ends-with?` 函数。请参阅清单
    5-54 中的示例（但请注意，它们是区分大小写的；我们可以使用正则表达式来规避这个问题，但我稍后会再讨论）。


    ```

    (clojure.string/starts-with? "I am a string" "g") ;; false

    (clojure.string/starts-with? "I am a string" "i") ;; false

    (clojure.string/starts-with? "I am a string" "I") ;; true

    (clojure.string/starts-with? "I am a string" "I am") ;; true

    (clojure.string/ends-with? "I am a string" "!") ;; false

    (clojure.string/ends-with? "I am a string" "G") ;; false

    (clojure.string/ends-with? "I am a string" "g") ;; true

    (clojure.string/ends-with? "I am a string" "string") ;; true

    清单 5-54.

    starts-with? 和 ends-with? 函数示例

    ```


    现在，正如你可能注意到的，演示的函数是区分大小写的，有时这可能是个问题。规避这个问题的一种可能方法是使用正则表达式进行模式匹配。关于正则表达式的讨论超出了本书的范围，但如果你有兴趣了解更多关于语法和可用特性的信息，我建议访问
    [`http://www.regular-expressions.info/`](http://www.regular-expressions.info/)。


    现在，让我们尝试清单 5-54 中失败的一个示例，检查字符串是否以 I 或 i 开头，然后使用 Clojure 的 `re-find` 函数进行验证。在清单
    5-55 中，你会看到我们使用语法 `#"..."` 编译我们的正则表达式模式，其中引号内的所有内容都是我们的模式。


    ```

    (re-find #"(?i)^i" "I am a string")

    ;; "I"

    清单 5-55.

    re-find 函数示例

    ```


    注意


    Clojure 在其核心命名空间中提供了相当多的与正则表达式相关的函数。我建议搜索文档以找到它们³（它们通常命名为 `re-*`）。


    在清单 5-55 中，我们可以看到返回值是匹配本身。如果我们使用的正则表达式模式与字符串中的任何内容都不匹配，那么返回值将是 `nil`，这意味着你可以将
    `re-find` 作为值传递给 Clojure 的 `nil?` 函数，它会指示是否存在匹配。


    另一个值得注意的事项是在我们的正则表达式模式中使用了 `(?i)`。尽管它所代表的概念由所有风格的正则表达式引擎提供，但在这种情况下，它定义了一个“不区分大小写匹配”标志，实际的语法是
    Clojure 特有的。在其他语言或正则表达式引擎中，你通常会看到像 `/` 这样的分隔符用于包裹模式（例如，`/my-pattern/`），而在 Clojure
    中，我们使用 `#"my-pattern"`。


    然后，正则表达式模式的标志通常像这样放在分隔符之外：`/my-pattern/i`。在 Clojure 中，我们改为在分隔符内部和模式的开头提供标志。


    注意


    有关内联标志和可用标志类型的更多详细信息，请参阅 Java 的 Pattern 类文档⁴（特别是“嵌入式标志表达式”）。

