- fmt: '### Agent Errors


    If you cause an agent to error, then it’ll do so silently (depending on the error).
    In the past, I’ve caused an agent to fail and then later wondered why none of
    my actions (sent via a `send` call) were being actioned. Let’s see an example
    of causing an agent to fail and how it reacts in Listing [8-18](#A453572_1_En_8_Chapter.html#Par115).


    ```

    (def a (agent 0))

    (send a #(/ % 0))

    ;; causes agent to go into failure mode (no error indicated)

    a

    ;; #object[clojure.lang.Agent 0xf1c5585 {:status :failed, :val 0}]

    Listing 8-18.

    Example of Agent Failing

    ```


    **Note**


    The last line of Listing [8-18](#A453572_1_En_8_Chapter.html#Par115) references
    the agent, and so we see the internal representation displayed. In that representation,
    you’ll notice the `:status :failed`.


    The problem with this silent change to a failed status is that all future `send`
    commands will also fail until the agent’s status has been changed back to `:ready`.


    If you need to verify what error an agent has received, then you can call the
    `agent-error` function and pass in the agent you wish to review; this will return
    the last known error for the specified agent.


    At this point, there’s a couple of things we can do: the first is to define an
    error handler for your agent so it becomes clear when an issue occurs, and the
    second is to restart the agent once your code is aware of an issue. See Listing
    [8-19](#A453572_1_En_8_Chapter.html#Par120).


    ```

    (def a (agent 0))

    (defn h [a e]

    (prn "Agent value: " @a)

    (prn "Agent error: " e))

    (set-error-handler! a h)

    (send a #(/ % 0)) ;; prints the following...

    ;; "Agent value: " 0

    ;; "Agent error: " #error{:cause "Divide by zero"...

    Listing 8-19.

    Example of Agent Error Handling

    ```


    **Note**


    To remove the error handler, you’ll need to call the `set-error-handler!` function
    again and pass `nil` as the handler value.


    At this point, the agent is in a failure state, and so if you try to send another
    action to it, that action will fail to proceed. To resolve this, we need to restart
    the agent, and we can do that using `(restart-agent a 0)`, where we provide the
    `restart-agent` function the agent (`a`) that we would like to modify along with
    the new value we want the agent to restart with (`0`).


    If you would like to restart the agent with its last known value, then you could
    swap the provided value for the dereferenced value for the agent: `(restart-agent
    a @a)`.


    Now, you might want the agent to automatically restart itself. This is possible,
    but it’s not as straightforward as you might think (e.g., just calling `restart-agent`
    from within the error handler). Listing [8-20](#A453572_1_En_8_Chapter.html#Par129)
    will demonstrate one possible solution that utilizes a `future` to decouple the
    call to `restart-agent` from the error handler.


    The real cause of the problem is that the agent doesn’t actually get marked as
    “failed” until the error handler has finished executing. This is why the use of
    a `future` fixes this issue, as it means the error handler can finish (as the
    `future` is executed asynchronously on a separate child thread) and the restarting
    of the agent will be successful.


    I discovered this by wrapping the call to `restart-agent` in a try/catch statement,
    and this revealed the message “Agent does not need a restart.”


    **Note**


    When restarting your agent, any actions that were queued up will continue to be
    processed unless you provide a `:clear-actions true` option when restarting the
    agent:


    ```

    (restart-agent a @a :clear-actions true)

    ```


    ```

    (def a (agent 0))

    (defn h [a e]

    (prn "Agent value: " @a)

    (prn "Agent error: " e)

    (future (restart-agent a 0)))

    (set-error-handler! a h)

    (send a inc)

    a ;; 1

    (send a #(/ % 0))

    ;; error handler h will be triggered

    (send a inc)

    a ;; 1

    Listing 8-20.

    Attempt to Automatically Restart a Failed Agent

    ```


    ## Transactions


    Clojure comes packaged with its own STM (software transactional memory). In essence,
    the STM works a lot like a CAS (compare-and-swap) operation, which we saw earlier
    when looking at atoms. The difference between them is that rather than concern
    itself with a single value, like an atom (which is “uncoordinated”), the STM is
    able to refer to multiple values at once (hence, the STM is thought of as being
    “coordinated”).


    There are a couple of moving pieces when using the STM:


    *   `dosync`

    *   `ref`

    *   `ref-set`

    *   `alter`

    *   `ensure`

    *   `commute`


    ### dosync/ref/alter


    The first item (`dosync`) is the transaction container, and everything related
    to the execution of the STM should happen within that form. The second item (`ref`)
    is the “Reference” type that will hold the value to be stored/verified/updated.


    All other listed items are functions that can only be used from within the transaction.
    This means any attempts to use the functions `ref-set`, `alter`, `ensure`, or
    `commute` from outside the `dosync` form will cause an error to occur. See Listing
    [8-21](#A453572_1_En_8_Chapter.html#Par140).


    ```

    (def r (ref 0))

    (dosync

    (alter r inc))

    ;; 1

    Listing 8-21.

    Simple Transaction

    ```


    In Listing [8-21](#A453572_1_En_8_Chapter.html#Par140), we create a new `ref`
    type `r` and assign it the initial value of `0`. Once set, we open a transaction
    using `dosync`, and within that we pass the `ref` instance into the `alter` function,
    which applies the provided function (in this case, `inc`) to the value the `ref`
    currently holds.


    Much like the atom type, we need to ensure that any actions that occur within
    the `dosync` block are idempotent, as the STM can end up restarting/replaying
    the entire transaction over again if a conflict arises between different references.


    ### ref-set


    In Listing [8-22](#A453572_1_En_8_Chapter.html#Par144), we’ll use `ref-set` to
    change the value of the `ref` instance. This allows us to change the value using
    another direct value, as opposed to using a function to modify the value.


    ```

    (def r (ref 1))

    (dosync

    (ref-set r 0))

    ;; 0

    Listing 8-22.

    Example of ref-set’s Allowing Literal Value to Be Assigned

    ```'
