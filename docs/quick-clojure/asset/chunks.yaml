    ### commute


    `commute` 函数在修改指定引用时提供了一种“最后写入者获胜”的行为，当你希望获得最高并发性且操作顺序无关紧要时（事务旨在防止对 `ref` 的多次同时写入），该函数最为有用。


    本质上，`commute` 会立即返回对引用应用所提供函数的结果，但在事务结束时，它会再次同步执行计算，并在此时实际更新引用的值。这种修改本身是可交换的，因此不会有任何事务被回滚。


    这就是为什么在清单 8-27 中，执行该示例代码时你可能会多次看到相同的值被打印出来，但最终的实际结果始终是一致的。


    ```

    (def foo (ref 0))

    (defn inc-ref [r]

    (dosync

    (commute r inc)

    (println @r)))

    (let [threads (for [x (range 0 20)] (Thread. #(inc-ref foo)))]

    (doall (map #(.start %) threads))

    (doall (map #(.join %) threads))

    (inc-ref foo))

    清单 8-27.

    使用 commute 的示例

    ```


    注意


    我们使用 `Thread.` 而不是 `future`，以便能够更精细地控制线程的执行时机，同时也表明我们希望等待所有线程完成后再继续执行。


    如果你运行清单 8-27 中的代码，但将其修改为使用 `alter` 而不是 `commute`，那么你会注意到 `alter` 如何强制更新顺序，因此打印的值总是精确地从
    1 计数到 21（而 `commute` 的最终结果仍然是 21，但达到该结果的过程是可交换的）。


    ## 通道


    现在我们已经介绍了所有标准核心库的并发特性，还有一项需要考虑，那就是通道的使用，它仅在 `core.async` 库中可用。


    要使用 `core.async`，你需要告诉 Leiningen 加载它（类似于我们在前一章中对 `core.match` 所做的操作）。目前最简单的方法——因为我们仍在
    REPL 中运行所有示例——是停止你当前打开的 REPL（按 `<Ctrl-d>` 即可），然后创建以下 `project.clj` 文件（如果你已有 `project.clj`
    文件，则添加新行）。参见清单 8-28。


    ```

    (defproject test "0.1.0-SNAPSHOT"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/core.async "0.3.442"]])

    清单 8-28.

    使用 core.async 依赖更新项目

    ```


    创建此文件后，使用 `lein repl` 重新启动 REPL（Leiningen 将使用 `project.clj` 的内容来设置其环境），并执行清单 8-29
    中的代码行。


    ```

    (require ''[clojure.core.async :as async :refer :all])

    清单 8-29.

    将 core.async 加载到正在运行的 REPL 实例中

    ```


    注意


    同样，不必担心理解项目文件或 `require` 函数调用的语法，我将在后续章节更详细地讨论 Leiningen 时很快解释这一切。


    此时，你将拥有一组可用的宏（例如 `<!!`、`>!!`、`chan`、`buffer` 等）。


    `core.async` 的理念借鉴自 Go 语言 ²（谷歌自己广受欢迎的编程语言，其并发原语在开发者社区中备受推崇）。


    尽管 Go 语言在现代使通道概念流行起来功不可没，但通道的设计可以追溯到 20 世纪 70 年代，始于 Tony Hoare 撰写的一篇名为《通信顺序进程》（CSP）的论文。


    实际上，通道就是一个管道：你将数据从一端塞入，然后从另一端取出。从并发的角度来看，它之所以效果很好，是因为它保护了管道中的数据免受其他线程/进程的干扰。


    使用通道最具挑战性的部分可能是，当你放入/取出数据时，它会阻塞你的应用程序。这是因为从根本上说，它们是在连接不同的进程。我们几乎总是将通道与另一个称为 go
    块的概念一起使用。但我稍后会回到这个话题；首先，我认为一个简单的示例是必要的。参见清单 8-30。


    注意


    以下代码将无限期地阻塞正在运行的进程。你可以在 REPL 中按 `<Ctrl-c>` 来解除阻塞，但在设计应用程序时，明智的做法是注意通道如果设置不当可能会阻塞进程。


    ```

    (def c (chan))

    (>!! c :foo)

    ;; 将阻塞，直到有东西

    ;; 从通道的另一端取出 :foo

    清单 8-30.

    一个会阻塞的通道的简单示例

    ```


    在清单 8-30 中，我们可以看到我们创建了一个变量 `c`，并为其分配了一个新的 `chan`（通道）。一旦有了这个通道，我们就可以使用 `>!!` 将值放入通道，使用
    `<!!` 从通道中取出值。


    前面示例的问题在于，一旦你调用 `<!!`，它就会无限期地阻塞。理想情况下，你希望做的是（至少对于一个可运行的示例而言）使用另一个线程将值放入通道，因为至少新生成的线程可以被阻塞，而不是阻塞你的主线程并导致
    REPL 锁定！


    清单 8-31 演示了一个稍微实用一些的示例，它不会阻塞你的 REPL。


    ```

    (def c (chan))

    (future (>!! c :foo))

    ;; 这个线程将被阻塞

    (<!! c)

    ;; :foo

    清单 8-31.

    一个不会阻塞的通道的简单示例

    ```


    在清单 8-31 中，我们将一条消息放入通道（在本例中，消息是关键字 `:foo`），并且由于这是在子线程中完成的（得益于使用了 `future`），我们能够继续在
    REPL 的父线程中工作。从这里，你可以看到我们现在正在从通道中取出任何可用的值（使用 `<!!`），并且由于值可用，我们不会阻塞。


    那么，举例来说，假设我现在想从我的通道 `c` 中再取出一个值。好吧，我已经取出了值 `:foo`，并且我知道通道中已经没有东西可取了，那么会发生什么呢？嗯，如果我再次取出（例如
    `(<!! c)`），那将阻塞我的整个线程，直到我程序中的其他某处有代码将值推入通道（从而使我的取出操作解除阻塞）。


    为了避免这个问题（同样，为了在 REPL 中进行实验），我们可以再次利用 `future`。参见清单 8-32 中的示例。


    ```

    (future

    (prn (str "嘿！一个新值 " (<!! c))))

    ;; 将阻塞，直到有值被放入通道

    (>!! c "bar")

    ;; true (+ 副作用：打印出 "嘿！一个新值 bar")

    清单 8-32.

    通过 future 将值放入通道

    ```

    '
- fmt: "### Go Blocks\n\n使用`future`配合通道的问题在于，`future`从线程池中获取线程。因此，可用的线程数量一开始就是有限的。\n\
    \n如果你通过通道的推/拉操作阻塞了一个线程，那么可用于多线程处理工作负载的线程就会减少一个。\n\n注意\n\n`Future`与代理共享一个线程池。\n\
    \nClojure的`core.async`库还提供了一个`go`函数，它像一个异步包装器：你提供给`go`块的主体将在单独的线程上异步执行，并且该线程来自专门用于`go`块的线程池。\n\
    \n好的，`go`块有独立的线程池，但它与`future`有何不同？嗯，使用`go`时，你可以“停放”一个线程，而不是阻塞它。\n\n“停放”意味着进程会从线程中移除，从而允许该线程被另一个`go`块进程使用。当另一个进程完成后，它会被放回线程以完成执行（参见清单[8-33](#A453572_1_En_8_Chapter.html#Par214)的示例）。\n\
    \n```\n(go\n  (Thread/sleep 1000)\n  (dotimes [x 5] (prn x)))\n(prn \"I wasn't\
    \ blocked\")\n;; 这会立即打印（随后打印数字 0-4）\n清单 8-33. go 块的简单示例\n```\n\n在`go`块内部使用通道时，需要注意推拉值的语法与在外部使用通道时略有不同（这是因为我们之前提到的关于停放`go`块而不是阻塞其运行线程的原因）。\n\
    \n通道推/拉的语法是`>!!`和`<!!`，但在`go`块内部处理通道时，语法变为`<!`和`>!`，这会导致进程被停放。这意味着当现有的`go`进程被阻塞时，`go`线程池中的线程可以被重用。参见清单[8-34](#A453572_1_En_8_Chapter.html#Par217)。\n\
    \n```\n(def c (chan))\n(go\n  (dotimes [x 10]\n    (Thread/sleep 1000)\n    (>!\
    \ c x))) ;; 每秒向通道放入一个新数字\n(go\n  (while true\n    (prn (<! c)))) ;; 永远从通道中拉取内容并打印\n\
    清单 8-34. 使用带通道的 go 块\n```\n\n在清单[8-34](#A453572_1_En_8_Chapter.html#Par217)中，我们最终每秒打印一个数字，从0到9。`future`和`go`块的另一个区别是，你可以访问`future`的返回值，而对于`go`块，你总是会返回一个通道类型，该通道会传递最后一个执行的表达式（参见清单[8-35](#A453572_1_En_8_Chapter.html#Par219)）。\n\
    \n```\n(def f (future (inc 1)))\n@f\n;; 2\n(def g (go (inc 1)))\n;; ManyToManyChannel\n\
    (<!! g)\n;; 2\n清单 8-35. Go 块返回通道类型\n```\n\n### Thread 函数\n\n现在，你可能想知道 Clojure\
    \ 还能提供多少种异步机制？实际上，`core.async`还提供了`thread`函数。它允许你在另一个线程中执行代码（这并不新鲜，很像`go`和`future`），并且它也返回一个通道，其中包含最后一个表达式的结果（再次像`go`一样，所以没有额外的东西）。\n\
    \n唯一真正的区别是，该线程是从一个“无界”线程池中获取的（这意味着它在理论上可以创建无限数量的线程）。\n\n`(thread)`的用例是当你有一个长时间运行的进程，可能会长时间阻塞时，如果你使用了`go`块，你的线程池就会被阻塞。但请记住，创建线程是一项昂贵的操作，而这正是线程池的优势所在。\n\
    \n注意\n\n当我刚开始接触 Clojure 时，它提供的并发机制数量让我不知所措。直到我真正理解了问题空间，才明白所有这些机制确实都有其用途和存在的理由。\n\
    \n### 区分\n\n通常不太清楚的是，你何时应该使用通道。经验法则似乎如下：\n\n*   如果你需要使同步过程异步化，则创建一个线程（使用`future`）。\n\
    *   如果你使用的 API 或代码已经是异步的，则使用`go`块。\n\n我还没有找到不符合这个规则的例子（至少在我使用 Clojure 的工作中），但你的情况可能有所不同。\n\
    \n在我们继续之前，`core.async`还提供了一些其他有趣的功能：\n\n*   `alt!`/`alt!!`\n*   缓冲通道\n    *  \
    \ 滑动/丢弃通道缓冲区\n*   超时\n\n### 交替\n\n让我们从`alt`函数开始（我认为它代表交替？正如你将看到的，它会在提供的通道之间进行交替）。\n\
    \n`alt!`（停放）变体必须从`go`块内部调用，而`alt!!`变体可以从外部调用（类似于`>!` vs `>!!`）。你向`alt!`函数传递一组通道，哪个通道先获得值，就返回哪个通道（参见清单[8-36](#A453572_1_En_8_Chapter.html#Par235)）。\n\
    \n```\n(def a (chan))\n(def b (chan))\n(def c (chan))\n(defn put-data [c n]\n\
    \  (go (Thread/sleep (rand 10))\n      (>! c (str \"Hi \" n))))\n(put-data a \"\
    A\")\n(put-data b \"B\")\n(put-data c \"C\")\n(let [[result channel] (alts!! [a\
    \ b c])]\n  (prn \"Result: \" result)\n  (prn \"Channel: \" channel))\n清单 8-36.\
    \ 使用 alt!! 函数的示例\n```\n\n在清单[8-36](#A453572_1_En_8_Chapter.html#Par235)中，我们创建了三个独立的通道和一个名为`put-data`的函数，该函数在将值放入提供的通道之前会休眠一段不确定的时间。\n\
    \n然后我们有一个`let`块，它获取结果（以及产生结果的通道）并打印出来。我们使用`alt!!`来确定哪个通道首先接收到值（其他结果将被丢弃）。\n\n\
    ### 缓冲通道\n\n接下来我们要介绍的是缓冲通道（及其变体：滑动和丢弃）。默认情况下，通道是无缓冲的，所以到目前为止，当我们创建一个通道时，如果你推入一个值，通道就会变满，你的线程会被阻塞，直到该值被从通道中取出。\n\
    \n为了允许更大的并发性，你可以使用预定义的缓冲区空间创建通道。假设缓冲区大小为5，你可以向通道推入5个值而不会阻塞。参见清单[8-37](#A453572_1_En_8_Chapter.html#Par240)。\n\
    \n```\n(def c (chan 5))\n(def v [:a :b :c :d])\n(dotimes [i 4]\n  (>!! c (nth\
    \ v i))\n  (prn \"Put \" (nth v i) \" into the channel. Next...\"))\n清单 8-37.\
    \ 缓冲通道示例\n```\n\n在清单[8-37](#A453572_1_En_8_Chapter.html#Par240)中，如果我们在创建通道时没有为其指定`5`的缓冲区大小，那么第一次调用`>!!`就会无限期地阻塞我们\
    \ REPL 的线程，直到我们终止正在运行的进程，或者在代码中已经定义了一个地方来为我们从通道中提取值。"
  raw: "### Go Blocks\n\nThe problem with using a `future` with channels is that a\
    \ `future` gets its thread from a thread pool. So, there are a limited number\
    \ of threads to begin with.\n\nIf you block a thread using a push/pull from a\
    \ channel, then that’s one less thread available for multi-threading your workload.\n\
    \nNote\n\n`Future`s share a thread pool with agents.\n\nClojure’s `core.async`\
    \ library also provides a `go` function that acts like an asynchronous wrapper:\
    \ the body you provide to a `go` block will be executed asynchronously on a separate\
    \ thread, and it’s from a thread pool dedicated to just `go` blocks.\n\nOK, so\
    \ you have a separate thread pool with `go` blocks, but how does it differ from\
    \ `future`s? Well, when using `go` you are able to “park” a thread rather than\
    \ block it.\n\nWhat parking means is that the process is removed from the thread\
    \ , allowing the thread to be utilized by another `go` block process. When the\
    \ other process has completed, it is placed back onto the thread to finish up\
    \ (see Listing [8-33](#A453572_1_En_8_Chapter.html#Par214) for an example).\n\n\
    ```\n(go\n(Thread/sleep 1000)\n(dotimes [x 5] (prn x)))\n(prn \"I wasn't blocked\"\
    )\n;; this is printed immediately (followed by the numbers 0-4)\nListing 8-33.\n\
    Simple Example of a go Block\n```\n\nWhen using channels from within a `go` block,\
    \ you need to be aware that the syntax for pushing and pulling values is slightly\
    \ different compared to when using channels outside of it (this is because of\
    \ what we mentioned earlier about parking a `go` block , rather than blocking\
    \ the thread it’s running within).\n\nThe syntax for a channel push/pull is `>!!`\
    \ and `<!!`, but when working with channels from within a `go` block, the syntax\
    \ changes to `<!` and `>!`, which results in parking the process. This means the\
    \ threads from the `go` thread pool can be reused while the existing `go` processes\
    \ are blocked. See Listing [8-34](#A453572_1_En_8_Chapter.html#Par217).\n\n```\n\
    (def c (chan))\n(go\n(dotimes [x 10]\n(Thread/sleep 1000)\n(>! c x))) ;; every\
    \ second we put a new number into the channel\n(go\n(while true\n(prn (<! c))))\
    \ ;; forever pull content from the channel and print it\nListing 8-34.\nUsing\
    \ go Blocks with Channels\n```\n\nIn Listing [8-34](#A453572_1_En_8_Chapter.html#Par217),\
    \ we end up printing the values 0 to 9, one number per second. Another difference\
    \ between a `future` and a `go` block is that you can access the return value\
    \ of a `future`, whereas with a `go` block you’ll always be returned a channel\
    \ type, which is passed the last executed expression (see Listing [8-35](#A453572_1_En_8_Chapter.html#Par219)).\n\
    \n```\n(def f (future (inc 1)))\n@f\n;; 2\n(def g (go (inc 1)))\n;; ManyToManyChannel\n\
    (<!! g)\n;; 2\nListing 8-35.\nGo Blocks Return a Channel Type\n```\n\n### Thread\
    \ Function\n\nNow, you may wonder how many more async mechanisms Clojure can provide?\
    \ Well, `core.async` also gives us the `thread` function. Effectively, it allows\
    \ us to execute code in another thread (nothing new there, much like `go` and\
    \ `future`), and it also returns a channel with the last expression put into the\
    \ channel (again like `go`, so nothing extra there).\n\nThe only real difference\
    \ is that the thread is pulled from an “unbounded” thread pool (meaning it has\
    \ a theoretically unlimited number of threads it can create).\n\nThe use case\
    \ for `(thread)` will be when you have a long-running process that potentially\
    \ could block for a long time, causing your thread pool to be blocked if you had\
    \ used a `go` block instead. But remember that creating threads is an expensive\
    \ operation, and that is the benefit thread pools provide.\n\nNote\n\nWhen I first\
    \ started looking at Clojure, I was overwhelmed by the number of concurrency mechanisms\
    \ it provided. It wasn’t until I really understood the problem space that it became\
    \ clear all these mechanisms did actually serve a purpose and had a reason for\
    \ existing.\n\n### Distinction\n\nWhat’s not normally made very clear though,\
    \ is when you should even use channels. It would seem the rule of thumb is as\
    \ follows:\n\n*   Create a thread (using `future`) if you need to make a synchronous\
    \ process asynchronous.\n*   If the API or code you’re using is already asynchronous,\
    \ then use a `go` block .\n\nI’ve yet to find an example that doesn’t quite fit\
    \ (in the work I use Clojure for at least), but your mileage may vary.\n\nBefore\
    \ we move on, there are a few remaining interesting features `core.async` provides:\n\
    \n*   `alt!`/`alt!!`\n*   buffered channels\n    *   sliding/dropping channel\
    \ buffers\n*   timeouts\n\n### Alternate\n\nLet’s start with the `alt` function\
    \ (which I believe stands for alternate? As you’ll see, it will alternate between\
    \ the provided channels).\n\nThe `alt!` (parking) variation must be called from\
    \ within a `go` block, while the `alt!!` variation can be called from outside\
    \ (similar to `>!` vs `>!!`). You pass the `alt!` function a collection of channels,\
    \ and whichever channel gets a value first is the one returned (see Listing [8-36](#A453572_1_En_8_Chapter.html#Par235)).\n\
    \n```\n(def a (chan))\n(def b (chan))\n(def c (chan))\n(defn put-data [c n]\n\
    (go (Thread/sleep (rand 10))\n(>! c (str \"Hi \" n))))\n(put-data a \"A\")\n(put-data\
    \ b \"B\")\n(put-data c \"C\")\n(let [[result channel] (alts!! [a b c])]\n(prn\
    \ \"Result: \" result)\n(prn \"Channel: \" channel))\nListing 8-36.\nExample of\
    \ Using alt!! Function\n```\n\nIn Listing [8-36](#A453572_1_En_8_Chapter.html#Par235),\
    \ we create three separate channels and a function called `put-data`, which sleeps\
    \ for a non-deterministic amount of time before putting a value into the provided\
    \ channel.\n\nThen we have a `let` block that acquires the result (and the channel\
    \ it was produced from) and prints it. We use `alt!!` to ascertain which channel\
    \ received a value first (the other results are discarded).\n\n### Buffered Channels\n\
    \nThe next item we’ll cover are buffered channels (and their variations: sliding\
    \ and dropping). Channels by default are unbuffered, so up until this point when\
    \ we’ve created a channel, if you were to push a single value in, then the channel\
    \ would become full and your thread would be blocked until the value is pulled\
    \ out of the channel.\n\nTo allow for greater concurrency, you can create your\
    \ channel with a predefined buffer space. With a buffer of, let’s say, five, you\
    \ could push five values onto the channel without blocking. See Listing [8-37](#A453572_1_En_8_Chapter.html#Par240).\n\
    \n```\n(def c (chan 5))\n(def v [:a :b :c :d])\n(dotimes [i 4]\n(>!! c (nth v\
    \ i))\n(prn \"Put \" (nth v i) \" into the channel. Next...\"))\nListing 8-37.\n\
    Example of a Buffered Channel\n```\n\nIn Listing [8-37](#A453572_1_En_8_Chapter.html#Par240),\
    \ if we hadn’t given a buffer size of `5` to the channel when it was created,\
    \ then the very first call to `>!!` would’ve blocked our REPL’s thread indefinitely\
    \ until we had either killed the running process or had a place defined in code\
    \ already that would’ve extracted the values from the channel for us."
  trans: "\n### Go 块\n\n在通道中使用 `future` 的问题在于，`future` 会从线程池中获取线程。因此，一开始可用的线程数量是有限的。\n\
    \n如果你通过通道的推/拉操作阻塞了一个线程，那么可用于多线程处理工作负载的线程就会减少一个。\n\n注意\n\n`Future` 与代理共享一个线程池。\n\
    \nClojure 的 `core.async` 库还提供了一个 `go` 函数，它就像一个异步包装器：你提供给 `go` 块的主体将在单独的线程上异步执行，并且该线程来自专门用于\
    \ `go` 块的线程池。\n\n好的，那么 `go` 块拥有一个独立的线程池，但它与 `future` 有何不同呢？嗯，使用 `go` 时，你可以“停放”一个线程，而不是阻塞它。\n\
    \n“停放”意味着进程会从线程中移除，从而允许该线程被另一个 `go` 块进程使用。当另一个进程完成后，它会被放回线程以完成执行（参见清单 8-33 的示例）。\n\
    \n```\n(go\n(Thread/sleep 1000)\n(dotimes [x 5] (prn x)))\n(prn \"我没有被阻塞\")\n\
    ;; 这行会立即打印（随后打印数字 0-4）\n清单 8-33.\ngo 块的简单示例\n```\n\n在 `go` 块内部使用通道时，需要注意，推入和拉取值所用的语法与在\
    \ `go` 块外部使用通道时略有不同（这是因为我们之前提到的关于“停放”`go` 块，而不是阻塞其运行所在的线程）。\n\n通道推/拉操作的语法是 `>!!`\
    \ 和 `<!!`，但在 `go` 块内部使用通道时，语法变为 `<!` 和 `>!`，这会导致进程被停放。这意味着，当现有的 `go` 进程被阻塞时，`go`\
    \ 线程池中的线程可以被重用。参见清单 8-34。\n\n```\n(def c (chan))\n(go\n(dotimes [x 10]\n(Thread/sleep\
    \ 1000)\n(>! c x))) ;; 每秒向通道放入一个新数字\n(go\n(while true\n(prn (<! c)))) ;; 永远从通道拉取内容并打印\n\
    清单 8-34.\n将 go 块与通道一起使用\n```\n\n在清单 8-34 中，我们最终每秒打印一个数字，打印出 0 到 9。`future` 和 `go`\
    \ 块的另一个区别是，你可以访问 `future` 的返回值，而对于 `go` 块，你总是会返回一个通道类型，该通道会传递最后执行的表达式（参见清单 8-35）。\n\
    \n```\n(def f (future (inc 1)))\n@f\n;; 2\n(def g (go (inc 1)))\n;; ManyToManyChannel\n\
    (<!! g)\n;; 2\n清单 8-35.\nGo 块返回通道类型\n```\n\n### 线程函数\n\n现在，你可能想知道 Clojure 还能提供多少种异步机制？嗯，`core.async`\
    \ 还为我们提供了 `thread` 函数。实际上，它允许我们在另一个线程中执行代码（这没什么新意，很像 `go` 和 `future`），并且它也会返回一个通道，其中包含了最后放入通道的表达式（再次像\
    \ `go` 一样，所以也没什么额外的）。\n\n唯一真正的区别在于，该线程是从一个“无界”线程池中获取的（这意味着它在理论上可以创建无限数量的线程）。\n\
    \n`(thread)` 的使用场景是，当你有一个长时间运行的进程，该进程可能会长时间阻塞，如果你改用 `go` 块，则会导致你的线程池被阻塞。但请记住，创建线程是一项昂贵的操作，而这正是线程池的优势所在。\n\
    \n注意\n\n当我刚开始接触 Clojure 时，它提供的并发机制数量让我不知所措。直到我真正理解了问题领域，才明白所有这些机制确实都有其用途和存在的理由。\n\
    \n### 区别\n\n通常不太明确的一点是，你究竟应该在何时使用通道。经验法则似乎是这样的：\n\n*   如果你需要将一个同步过程变为异步，则创建一个线程（使用\
    \ `future`）。\n*   如果你正在使用的 API 或代码已经是异步的，那么使用 `go` 块。\n\n我还没有找到完全不符合这个规则的例子（至少在我使用\
    \ Clojure 的工作中是这样），但你的情况可能会有所不同。\n\n在我们继续之前，`core.async` 还提供了一些其他有趣的功能：\n\n* \
    \  `alt!`/`alt!!`\n*   缓冲通道\n    *   滑动/丢弃通道缓冲区\n*   超时\n\n### 交替\n\n让我们从 `alt`\
    \ 函数开始（我认为它代表 alternate？正如你将看到的，它会在提供的通道之间进行交替）。\n\n`alt!`（停放）变体必须在 `go` 块内部调用，而\
    \ `alt!!` 变体可以在外部调用（类似于 `>!` 与 `>!!`）。你向 `alt!` 函数传递一组通道，哪个通道先获得值，就返回哪个通道（参见清单\
    \ 8-36）。\n\n```\n(def a (chan))\n(def b (chan))\n(def c (chan))\n(defn put-data\
    \ [c n]\n(go (Thread/sleep (rand 10))\n(>! c (str \"Hi \" n))))\n(put-data a \"\
    A\")\n(put-data b \"B\")\n(put-data c \"C\")\n(let [[result channel] (alts!! [a\
    \ b c])]\n(prn \"结果: \" result)\n(prn \"通道: \" channel))\n清单 8-36.\n使用 alt!! 函数的示例\n\
    ```\n\n在清单 8-36 中，我们创建了三个独立的通道和一个名为 `put-data` 的函数，该函数在将值放入提供的通道之前会休眠一段不确定的时间。\n\
    \n然后我们有一个 `let` 块，它获取结果（以及产生该结果的通道）并打印出来。我们使用 `alt!!` 来确定哪个通道最先接收到值（其他结果将被丢弃）。\n\
    \n### 缓冲通道\n\n接下来我们要介绍的是缓冲通道（及其变体：滑动和丢弃）。默认情况下，通道是无缓冲的，所以到目前为止，当我们创建一个通道时，如果你推入一个值，通道就会变满，你的线程将被阻塞，直到该值被从通道中拉出。\n\
    \n为了允许更大的并发性，你可以使用预定义的缓冲区空间来创建通道。假设缓冲区大小为 5，你可以向通道推入 5 个值而不会阻塞。参见清单 8-37。\n\n\
    ```\n(def c (chan 5))\n(def v [:a :b :c :d])\n(dotimes [i 4]\n(>!! c (nth v i))\n\
    (prn \"将 \" (nth v i) \" 放入通道。下一步...\"))\n清单 8-37.\n缓冲通道示例\n```\n\n在清单 8-37 中，如果在创建通道时我们没有为其指定\
    \ `5` 的缓冲区大小，那么第一次调用 `>!!` 就会无限期地阻塞我们 REPL 的线程，直到我们要么终止正在运行的进程，要么在代码中已经定义了一个可以从通道中提取值的位置。\n"
- fmt: '### Sliding/Dropping Buffered Channels


    We can take the buffered channel concept one step further with Clojure and utilize
    either a sliding buffer or a dropping buffer, depending on the needs of your application.


    A sliding buffer is one that will drop the first buffered value when another value
    is pushed into the channel (structurally, this is a queue, but queues do not automatically
    drop elements; this is what Clojure’s abstraction provides for us). A dropping
    buffer is one that drops the last buffered value when another value is pushed
    into the channel.


    In both cases, neither channel will result in putting a value blocking your current
    thread, because of the way the channel handles buffer overflow. See Listing [8-38](#A453572_1_En_8_Chapter.html#Par245)
    for an example.


    ```

    (def s (chan (sliding-buffer 5)))

    (def d (chan (dropping-buffer 5)))

    (def v [:a :b :c :d :e :f :g :h :i :j])

    (dotimes [i 10]

    (>!! s (nth v i))

    (prn "Put " (nth v i) " into the ''sliding buffer'' channel"))

    (dotimes [i 10]

    (>!! d (nth v i))

    (prn "Put " (nth v i) " into the ''dropping buffer'' channel"))

    (<!! s) ;; :f

    (<!! d) ;; :a

    Listing 8-38.

    Example of Sliding and Dropping Buffers

    ```


    In Listing [8-38](#A453572_1_En_8_Chapter.html#Par248), we’re demonstrating both
    a sliding buffer and a dropping buffer. We create the different buffer types and
    pass those as arguments when creating our channels. Then, we create a loop whereby
    we stick ten values into the channels, and yet the channels can only hold a maximum
    of five values. So, we’ll see how each type of buffer handles this problem.


    With the sliding buffer, if we take a value from the channel we can see we get
    back `:f` first. This shows the first five values (`:a`, `:b`, `:c`, `:d`, `:e`)
    were pushed out when the next set of values was pushed in. As the name suggests,
    the channel contents are sliding older values out first.


    With the dropping buffer, if we take a value from the channel we can see we get
    back `:a` first. This shows the last five values (`:f`, `:g`, `:h`, `:i`, `:j`)
    were dropped the moment the buffer became full. It’s like the entrance to a very
    busy nightclub: the doorman will turn you away once the club becomes full.


    **Note**


    It seems that within the community most developers create unbounded channels,
    so one-in-one-out, and only utilize sliding/dropping buffers when they need to
    eke out as much performance and throughput as possible.


    ### Timeout Channels


    This is the last feature within the realm of concurrency I want to share with
    you and is a common pattern when utilizing channels: the use of a timeout channel
    to short-circuit potential zombie (or long-blocking) processes. See Listing [8-39](#A453572_1_En_8_Chapter.html#Par251).


    ```

    (def c (chan))

    (let [[result channel]

    (alts!! [c (timeout 5000)])]

    (if result

    (prn "Result: " result)

    (prn "Timed out: " result))) ;; "Timed out: " nil

    Listing 8-39.

    Example of Timeout Channels

    ```


    In Listing [8-39](#A453572_1_En_8_Chapter.html#Par251), we create a channel and
    then never send anything to it. We then use `alts!!` to try to take a value from
    the channel, but instead of being blocked indefinitely—because we can pass a collection
    of channels and the one that gets a value first is the one returned by `alts!!`—we
    are blocked initially for five seconds, and then the process unlocks and we get
    the result of `nil`.


    This works because the timeout channel is an active channel for the set period
    of time, and then it sends itself a value of `nil`, which allows the `alt!!` to
    jump into action and subsequently short-circuit itself.


    ## Summary


    In this chapter, we’ve learned a lot of different techniques and tools for handling
    concurrent/multi-threaded code. We’ve looked at everything: delays, futures, promises,
    atoms, locks, agents, refs, and channels. Don’t rush this chapter; go back and
    try all the examples and ensure you understand the concepts fully.


    In the next chapter, we will look at namespaces and how we can utilize them for
    organizing and categorizing our code. Namespaces are a powerful feature that is
    prevalent in all Clojure code bases.


    **Footnotes**


    [1](#A453572_1_En_8_Chapter.html#Fn1_source) [`https://clojure.org/about/concurrent_programming`](https://clojure.org/about/concurrent_programming)


    [2](#A453572_1_En_8_Chapter.html#Fn2_source) [`http://www.golang.org/`](http://www.golang.org/)


    # 9. Namespaces


    Namespaces are a feature that allows the categorization of functions, symbols,
    and variables into well-defined groups. Later on in this chapter we’ll see that
    namespaces can also be translated and mapped to an actual file system directory
    structure.


    Let’s start by using the REPL to demonstrate a simple example of how namespaces
    work. When we run `lein repl` we’re automatically dropped into a new `user` namespace,
    and that namespace is pre-loaded with the Clojure core library. You can tell what
    namespace you’re in by looking at the REPL console, which displays the current
    namespace just before your cursor position: `user=>`.


    **Note**


    If you need to reference the namespace programmatically, then you can use the
    `*ns*` variable.


    Now, let’s see how we can create a new namespace `foo.bar` and then define a variable
    assigned to the symbol `baz` inside that new namespace. We’ll then define a different
    value for `baz` back in the `user` namespace and see what happens when we reference
    the variable from the different namespaces.


    ```

    (ns foo.bar)

    (def baz 1)

    baz

    ;; 1

    (ns user)

    (def baz 2)

    baz

    ;; 2

    (ns foo.bar)

    baz

    ;; 1

    Listing 9-1.

    Example of Creating a New Namespace

    ```


    In Listing [9-1](#A453572_1_En_9_Chapter.html#Par6), you can see we’ve used the
    `ns` macro to create the `foo.bar` namespace. If the namespace already exists
    (such as was the case with the `user` namespace in Listing [9-1](#A453572_1_En_9_Chapter.html#Par6)),
    then calling the `ns` macro and passing it a symbol that maps to a pre-existing
    namespace will instead move you into the specified namespace without creating
    it first.


    So, in the preceding example, we first create the `foo.bar` namespace and then
    define `baz` to have the value `1`. We then move back into the `user` namespace
    and define `baz`, but this time with a different value—`2`.


    You can see from this example how we can safely define variables and functions
    with different behaviors and values depending on the namespace in which they are
    defined and contained.


    ## What Is a Namespace?


    Clojure’s namespaces are really just a global map of symbols to variables/classes.
    Each namespace class can also contain its own mappings (mostly symbols to variables).
    The current namespace is stored in a `Namespace` object and is associated with
    the dynamic variable `*ns*`.


    **Note**


    By default, the `user` namespace, and subsequently any namespace created using
    the `ns` macro, will have all functions from the `clojure.core` namespace (as
    well as the classnames from the `java.lang` namespaces) mapped and pre-loaded
    for them.


    You can verify this from within the REPL by creating a new namespace using `in-ns`
    (rather than `ns`). The `in-ns` function will create a namespace without the `clojure.core`
    namespace pre-loaded. See Listing [9-2](#A453572_1_En_9_Chapter.html#Par13) for
    an example that demonstrates how the new namespace will be missing the default
    namespaces.


    ```

    (in-ns ''beep)

    ;; beep namespace doesn''t exist

    ;; so this created it and moved us inside the namespace

    (loaded-libs)

    ;; this function is located in clojure.core

    ;; the clojure.core namespace hasn''t been pre-loaded

    ;; so this will display an error in the REPL

    (clojure.core/refer ''clojure.core)

    ;; we explictly load the clojure.core namespace

    (loaded-libs)

    ;; we now successfully execute the function

    Listing 9-2.

    New Namespace with in-ns Will Be Missing clojure.core

    ```'
