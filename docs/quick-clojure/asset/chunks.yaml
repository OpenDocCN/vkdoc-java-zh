- fmt: '### Trimming Whitespace


    When dealing with user input, you most often will want to trim off any unnecessary
    whitespace around the input.


    There are three functions we’ll look at to help us. The first is `triml`, the
    second is `trimr`, and the last one is `trim-newline`. See Listing [5-56](#A453572_1_En_5_Chapter.html#Par197)
    for examples of their use.


    ```

    (clojure.string/triml "some space at the start")

    ;; "some space at the start"

    (clojure.string/trimr "some space at the end")

    ;; "some space at the end"

    (clojure.string/trim-newline "a newline\n\r ")

    ;; "a newline"

    (clojure.string/trim-newline "trim newline\n\rlast one only\n\r")

    ;; "trim newline\n\rlast one only"

    Listing 5-56.

    Examples of triml, trimr, and trim-newline Functions

    ```


    ## Summary


    In this chapter, we started off by learning about the anonymous function shorthand
    syntax as well as about how pre and post condition checks allow us to verify that
    the input/output of a function is what we expect them to be.


    We then began reviewing some functions from the core Clojure namespace, including
    functionality such as map construction and pipelining as well as various predicate
    functions and nested collection extraction.


    Finally, we took a quick glance at a few useful functions from the `string` namespace,
    revolving primarily around checking various whitespace conditions.


    In the next chapter, we’ll take a brief tour of Clojure’s destructuring capabilities
    and how they allow us to write very succinct code when dealing with input and
    how to extract the information we need.


