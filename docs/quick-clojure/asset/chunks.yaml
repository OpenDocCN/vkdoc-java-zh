- fmt: '## Anonymous Function Shorthand


    We’ve already seen the syntax structure for an anonymous function back in Chapter
    [2](#A453572_1_En_2_Chapter.html). In that chapter, we also saw that the syntax
    could be shortened like so: `#(...)`. One thing we skipped over previously was
    the fact that from within the function body you could access the function’s arguments
    using the syntax `%1`, `%2`, etc.


    The snippet in Listing [5-1](#A453572_1_En_5_Chapter.html#Par9) demonstrates a
    basic example of this.


    ```

    (map #(+ (+ 2 %1) 2) [1 2 3])

    ;; (5 6 7)

    Listing 5-1.

    Accessing Function Arguments Within Shorthand Syntax

    ```


    We covered how the `map` function works back in Chapter [3](#A453572_1_En_3_Chapter.html).
    As a quick summary reminder, the `map` function provides us the ability to execute
    a given function against each item within a sequence/collection.


    So, in the preceding example, our anonymous function is executed three times.
    First, given `1` as an argument; second, given `2` as an argument; and, lastly,
    given the value `3`. The anonymous function then modifies the value it has been
    given and returns a modified version of the collection.


    ## Pre and Post Conditions


    One really powerful feature available in Clojure is the ability to execute code
    just before and just after the function body itself. This allows us, for example,
    to validate the function arguments as they come in as well as validate the result
    of the function is as expected.


    The syntax structure looks like that shown in Listing [5-2](#A453572_1_En_5_Chapter.html#Par14).


    ```

    (defn  []

    {:pre  [, , ...]

    :post [, , ...]}

    ())

    Listing 5-2.

    Syntax Structure for Pre/Post Conditions

    ```


    As you can see, we provide a map data structure just before the function body
    that contains `:pre` and `:post` keys (both are optional). Each key is assigned
    a vector of functions that will be executed either directly before the function
    body or just after it, and they should return a Boolean true or false value.


    **Note**


    You can refer to the function parameters within the `:pre` and `:post` functions,
    as well as refer to the function body’s result in the `:post` functions, by referencing
    `%` (as we’ll see shortly).


    For example, imagine we have a function that is supposed to add two numbers together;
    the code for this would look something like Listing [5-3](#A453572_1_En_5_Chapter.html#Par18).


    ```

    (defn my-sum [f, g]

    {:pre  [(integer? f), (integer? g)]

    :post [(integer? %)]}

    (+ f g))

    Listing 5-3.

    Example of Pre/Post Conditions

    ```


    So, with this particular example function, if I were to execute `(my-sum 2 2)`
    I would see the expected return value of `4`. But if I were to call the function
    with one argument as a `String` type (e.g., `(my-sum "2" 2)`), then I would see
    the output shown in Listing [5-4](#A453572_1_En_5_Chapter.html#Par20).


    ```

    AssertionError Assert failed: (integer? f)  user/my-sum (form-init611908878853766826.clj:1)

    Listing 5-4.

    Exception from a Failing Pre/Post Condition

    ```


    This exception is informing me that the function failed to execute because the
    pre-condition failed to pass one of the validation functions I defined (in this
    case, the first validation function was verifying whether `f` was indeed an integer).


    Now, imagine someone comes along and modifies this code so that the return value
    is the message `"Result: "` followed by whatever the resulting value is. So, if
    we ran `(my-sum 2 2)`, then their expectation is for the result to look like `"Result:
    4"`. See Listing [5-5](#A453572_1_En_5_Chapter.html#Par23).


    ```

    (defn my-sum [f, g]

    {:pre  [(integer? f), (integer? g)]

    :post [(integer? %)]}

    (str "Result: " (+ f g)))

    Listing 5-5.

    Modified Pre/Post Condition Logic

    ```


    What would happen is that when the function was called, we would clearly see that
    the changes had broken the code because the REPL would be displaying the error
    message shown in Listing [5-6](#A453572_1_En_5_Chapter.html#Par25).


    ```

    AssertionError Assert failed: (integer? %)  user/my-sum (form-init611908878853766826.clj:1)

    Listing 5-6.

    New Exception from Failed Pre/Post Condition

    ```


    This error indicates that the post-condition validation function has failed. For
    that person to fix the issue, they could modify the `:post` condition to allow
    a `String` response instead, as in Listing [5-7](#A453572_1_En_5_Chapter.html#Par27).


    ```

    (defn my-sum [f, g]

    {:pre  [(integer? f), (integer? g)]

    :post [(string? %)]}

    (str "Result: " (+ f g)))

    ;; "Result: 4"

    Listing 5-7.

    Modified Pre/Post Condition Logic to Fix Post Error

    ```


    Or by removing the `:post` condition altogether, as in Listing [5-8](#A453572_1_En_5_Chapter.html#Par29).


    ```

    (defn my-sum [f, g]

    {:pre [(integer? f), (integer? g)]}

    (str "Result: " (+ f g)))

    ;; "Result: 4"

    Listing 5-8.

    Modified Pre/Post Condition Logic to Fix Post Error

    ```


    ## clojure.core


    The `clojure.core` namespace contains functions and macros for dealing with all
    sorts of requirements. It is the foundational library of the Clojure language.
    In the following sections, we’ll highlight some interesting items and hopefully
    will encourage you to explore the rest of the namespace to see what’s there.


    ### Map Construction


    Let’s imagine you have a list (or vector) of values that you wish to construct
    into a simple map data structure. We can achieve this in a manual sense by utilizing
    the `apply` function (see Listing [5-9](#A453572_1_En_5_Chapter.html#Par32)).


    ```

    (apply assoc {} [:foo 1 :bar 2])

    ;; {:foo 1, :bar 2}

    Listing 5-9.

    Convert Vector into a Map Using apply and assoc

    ```


    But there is already a function provided in the core library that reduces the
    boilerplate required, and it’s called `array-map`. The way this function works
    is that it accepts a list of arguments that it can then manipulate into a map.
    See Listing [5-10](#A453572_1_En_5_Chapter.html#Par34).


    ```

    (array-map :foo 1 :bar 2)

    Listing 5-10.

    Convert Arguments into a Map Using array-map

    ```


    But, you can also utilize the `apply` function (as we did when demonstrating the
    `assoc` approach) and provide it a list or vector, as in Listing [5-11](#A453572_1_En_5_Chapter.html#Par36).


    ```

    (apply array-map ''(:foo 1 :bar 2))

    (apply array-map  [:foo 1 :bar 2])

    Listing 5-11.

    Convert List/Vector into a Map Using apply and array-map

    ```'
