- fmt: '# Sequence Abstraction


    Clojure promotes the idea of programming to abstractions. In order to fulfill
    the requirements of what is known as the sequence abstraction, Clojure has to
    wrap some of its own data structures so as to provide a unified and consistent
    interface. It also is able to do this for your own code (which we’ll see an example
    of later).


    What this facilitates is for certain functions to be able to work with, for example,
    a map data structure and yet treat it like it were a less complex collection type
    (like a vector, list, or set). There is a side effect to implementing this hidden
    interface though, which is that sometimes when you pass a vector into a built-in
    function, you’ll (depending on the function) get a list data structure on the
    way out.


    But, again, thanks to the sequence abstraction, Clojure is able to apply its functions
    across multiple different data structure types in a way that works a lot like
    a traditional “interface,” as found in other OOP languages, where the benefit
    is in allowing different objects to depend on an abstraction rather than on a
    concrete implementation.


    What this means in practice is that vectors, lists, sets, and maps all share this
    hidden interface known as the sequence abstraction. So, although not all of these
    data structures are implemented in the same way as a list, they can all take advantage
    of Clojure’s collection/sequence functions as if they were of the same underlying
    implementation.


    To understand how this interface works, we need to realize that each data type
    has been built (or wrapped) in such a way that it provides the following three
    functions:


    * `first`: return first element in a collection

    * `rest`: return all elements except the first

    * `cons`: prepend element onto the collection


    Clojure provides a sequence library that consists of many functions that can be
    utilised when dealing with data structures that support the sequence abstraction
    interface. All the functions found within Clojure’s sequence library can be implemented
    with the help of these three functions. This brings us to the `seq` function,
    which helps a collection expose its elements and consequently extends the use
    of the sequence abstraction interface. Hence, a lot of the sequence library functions
    (for example, `map`) will internally call `seq` on the collection provided.


    **Note:** For a full list of functions, see Clojure’s Seq library.


    In the case of `map`, it’ll ensure a data structure such as a map `{:a 1 :b 2}`
    will be converted into vectors within a list. For example, `(seq {:a 1 :b 2})`
    returns `([:b 2] [:a 1])`.


    **Note:** It can be interesting to check the types returned when creating a data
    structure. For example, `(type (seq [:a :b :c]))` returns `clojure.lang.PersistentVector$ChunkedSeq`,
    whereas `(type (seq ''(:a :b :c)))` returns `clojure.lang.PersistentList`. Because
    the list is implemented as a linked list, it’s possible to iterate in segments,
    whereas that’s not the case with a vector, which is implemented as a hash table,
    so it’s actually utilizing a “chunked sequence.”


    Once the `map` data structure calls `seq` on the collection, the collection is
    in a structure that allows for the utilization of the sequence abstraction interface
    functions for carrying out a mapping of the data as expected.


    If you pass a vector into a `map` function, then `seq` will again ensure the data
    structure is converted into a list so it can utilize the sequence abstraction
    interface. For example, `(seq ["a" "b" "c"])` returns `("a" "b" "c")`.


    ## Lazy Sequences


    Now that we know about `seq` and the sequence abstraction, what exactly is a “lazy
    sequence”? Well, this is a sequence whose collection is computed in chunks, and
    the best way to understand it is by way of example.


    Let’s imagine we create a collection of 65 numerical elements. We pass this collection
    into the `map` function so we can both print and modify each item within the collection.
    The code for this might look something like what is shown in Listing 4-7.


    ```

    (def v (vec (range 1 65)))

    (def m (map #(do (prn %1) (str %1 "!")) v))

    (first m)

    ```


    *Listing 4-7. Lazy Sequences Compute Their Values in Chunks*


    If you run Listing 4-7 in the REPL, you should see the output is the numbers 1
    through 32 printed on individual lines followed by the return value `"1!"`. This
    demonstrates that the full 65 items weren’t computed when accessing the data assigned
    to `m` (i.e., `(first m)`). But why is that?


    To help understand why the complete collection of 65 items were not computed,
    we first need to know that `map` returns a `LazySeq` as its type. OK, but why
    were only the first 32 items printed when dealing with this `LazySeq`? Well, this
    is because lazy sequences are realized in chunks of 32, and the reason for 32
    specifically has to do with the efficiency of the underlying trie data structure
    the collection is implemented with.


    If we were to type `m` into our REPL, this would force the complete sequence to
    be fully realized (i.e., computed), and so we would see the remaining elements
    in the collection printed out and subsequently modified. Lazy sequences are a
    performance win for us.


    Let’s now execute the code from Listing 4-8 in our REPL, and we’ll again be able
    to confirm the chunked nature of a lazy sequence.


    ```

    (def v (vec (range 1 65)))

    (def m (map #(do (prn %1) (str %1 "!")) v))

    (first m) ;; prints 1-32, followed by "1!"

    (nth m 10) ;; prints "11!"

    ```


    *Listing 4-8. Lazy Sequence Chunked Output*


    Notice that in Listing 4-8 when you try to extract the tenth item in the collection
    (by using the `nth` function) it doesn’t print the values 1 to 32 again, as it
    did when you executed `(first m)`. This is because the first 32 items in the collection
    were already computed by executing `(first m)`.


    So, what happens if we now execute `(nth m 33)`, which is an index just outside
    of the first 32-item chunk already computed? Well, we would see the next 32-item
    chunk computed, meaning the values 33 to 64 would be printed to the screen, followed
    by the return value `"34!"` (which is what was assigned to index 33).


    As we saw earlier, if I request an index that is now already computed, such as
    `(nth m 50)`, we’ll not see any values from that specific 32-item grouping printed
    again. We’ll only see the cached return value printed.


    But don’t go thinking you can now just create an unfeasibly large collection,
    such as executing `(range 1 999999999)`, because the collection itself is still
    realized (i.e., placed in memory) upon creation. Executing that `range` in a REPL
    would cause you to stare at a blank screen while it computed each value.


    There is a way to side-step that, which is to assign the computation to a variable
    so the item isn’t computed until the variable is referenced. For example, the
    following snippet immediately returns focus when executed within the REPL environment:
    `(def r (range 1 999999999))`.


    **Note:** A large range is of type `LongRange` whereas an infinite range, which
    you can create with `(range)`, is of type `Iterate` and is an iterator that yields
    values (similar to a generator in other programming languages, like Python).'
