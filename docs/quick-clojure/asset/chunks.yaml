- fmt: '# 1. What Is Clojure?


    `Clojure`[¹](#A453572_1_En_1_Chapter.html#Fn1) is a functional, symbiotic, and
    homoiconic programming language.


    OK, for an opening line I’m sure you will agree that’s a bit of a mouthful. So,
    let’s break that sentence down a bit and focus on the words functional, symbiotic,
    and homoiconic in order to understand what they mean.


    Fear not if the following descriptions end up sounding like academic nonsense;
    we’ll be covering these concepts in more detail as we make our way through the
    various chapters of this book, and you’ll come to realize that they do, in fact,
    have very practical usage in `Clojure`.


    - Functional: where functions are first-class citizens and mutating state is frowned
    upon

    - Symbiotic: the language is intended to be run atop a host environment

    - Homoiconic: “code is data” — this helps facilitate a macro system for rewriting
    the language


    Note


    `Clojure` also supports optional typing,[²](#A453572_1_En_1_Chapter.html#Fn2)
    although that feature is outside the scope of this book.


    Typically, when reading about `Clojure` you will see these terms (functional,
    symbiotic, homoiconic) mentioned quite a lot, and so it can be useful to become
    better acquainted with them and with what people mean when they use these terms
    in the context of the `Clojure` language.


    The main platform `Clojure` supports is `JVM`[³](#A453572_1_En_1_Chapter.html#Fn3)
    (Java Virtual Machine). But `Clojure` also supports any platform that can execute
    the JavaScript engine, such as a web browser, by way of an offshoot of the language
    called `ClojureScript`.[⁴](#A453572_1_En_1_Chapter.html#Fn4) `ClojureScript` is
    a compiler that transforms `Clojure` code into JavaScript code.


    `Clojure` also works with the Common Language Runtime (`CLR`), which is the execution
    engine of Microsoft’s .NET Framework.


    Note


    In this book, we focus exclusively on the `JVM` implementation of the `Clojure`
    programming language.


    `Clojure` is a `Lisp`.[⁵](#A453572_1_En_1_Chapter.html#Fn5) `Lisp` is a programming
    language originally designed in 1958. It has a very distinct syntax that makes
    it stand out from other modern programming languages. Languages such as `Clojure`
    build upon `Lisp`’s structural basis (we’ll learn more about this in the next
    chapter). The `Lisp` syntax is elegant and concise, and consequently affords us
    the ability to be very expressive. If you’re unfamiliar with what the `Lisp` syntax
    looks like, don’t worry, as we’ll see examples of this as we go along.


    If you’re impatient, then the following snippet in Listing [1-1](#A453572_1_En_1_Chapter.html#Par19)
    is a small piece of code to at least give you an idea of what `Clojure` looks
    like (although at this point in time it obviously won’t make much sense if you’re
    new to `Lisp` and/or `Clojure`):


    ```

    (def base-credentials {:client-config {:protocol "http"}})

    (defn cred [{:keys [:Host :HostPort]}]

    (assoc base-credentials :endpoint (str Host ":" HostPort)))

    (cred {:Host "localhost" :HostPort 8080})

    Listing 1-1.

    Demonstration of Clojure/Lisp Syntax

    ```


    There are many interesting aspects that make up the `Clojure` programming ecosystem,
    and although most of the really important items will be covered, it’s worth noting
    that I’m not aiming to include every possible feature or detail, because then
    the focus of the book would become diluted and not be as palatable for beginners.


    `Clojure` has a lot of complex moving parts, and so the idea is to help readers
    get up and running with `Clojure` and be able to play around with some of the
    language’s most interesting features without getting bogged down with too many
    implementation details.


    ## Why Should You Care?


    `Clojure` is fun. No, really!


    But, more practically, it makes developing solutions to complex problems trivial,
    thanks to the language’s support for immutability, its multitude of concurrency
    mechanisms, and a very strong core library of functions (again, don’t worry if
    those words mean nothing to you, as we’ll cover all of these details in subsequent
    chapters).


    You can even change the `Clojure` programming language itself to suit your requirements
    via a mechanism known as `Macros`. `Macros` is such an incredibly powerful feature
    that I really wish it were available in other programming languages I use. If
    you want to add a new type of flow control that the language doesn’t natively
    support, then no problem; you can write it yourself dynamically with `Clojure`
    code! We’ll see this in action later on.


    One of the oft-cited facts about `Clojure` is that the creator, Rich Hickey, spent
    two years on the design of the language before starting the arduous task of actually
    building and implementing `Clojure`.


    This may sound like a pointless “fun fact,” but after you begin writing `Clojure`
    code you’ll soon start to understand why developers like to refer back to how
    long it took to design the language. It has meant `Clojure` was able to retrospectively
    pick all the good bits from other programming languages while also filtering out
    previous bad decisions, leaving you with a new programming language that ends
    up resolving a lot of otherwise contentious design issues.


    ## The Name?


    The word `Clojure` and where it comes from is a typical discussion point for Clojurists.
    Although, I’m not sure why, considering Rich Hickey (author of `Clojure`) has
    long since confirmed that the name is a combination of the following:


    - C#

    - Lisp

    - Java


    (C)(L)o(J)ure


    `Clojure` is pronounced (in the author’s own words):


    > exactly like closure, where the s/j has the zh sound as in azure, pleasure etc
    —Rich Hickey (Google Groups Discussion[⁶](#A453572_1_En_1_Chapter.html#Fn6))'
