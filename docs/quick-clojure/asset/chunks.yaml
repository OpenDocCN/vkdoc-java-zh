    a system directory for binaries, `/usr/bin`, and there’s a `user` directory at
    `/usr/local/bin`. We’ll want to stick our binary in the user-specific directory,
    because that is where any binaries installed by a user should go.


    In Listing [13-8](#A453572_1_En_13_Chapter.html#Par53), you’ll see the required
    changes in context of the full `project.clj` file. We’ve added the `:plugin` attribute
    (as this is our first plugin for this project), and we’ve added the new plugin-specific
    attribute `:bin`, which we set up so that it names our executable `integralist`,
    and it will also copy the generated executable into our `/usr/local/bin` directory
    automatically for us.


    ```

    (defproject cli-foo "0.1.0-SNAPSHOT"

    :description "FIXME: write description"

    :url "http://example.com/FIXME"

    :license {:name "Eclipse Public License"

    :url "http://www.eclipse.org/legal/epl-v10.html"}

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/tools.cli "0.3.5"]]

    :plugins [[lein-bin "0.3.4"]]

    :bin {:name "integralist"

    :bin-path "/usr/local/bin"}

    :main ^:skip-aot cli-foo.core

    :profiles {:uberjar {:aot :all}})

    Listing 13-8.

    Configure lein-bin via the project.clj File

    ```


    If you run `lein repl` now, you should find that Leiningen will download the newly
    defined plugin. The output will look like Listing [13-9](#A453572_1_En_13_Chapter.html#Par55)
    and highlights some nested dependencies required.


    ```

    Retrieving lein-bin/lein-bin/0.3.4/lein-bin-0.3.4.pom from clojars

    Retrieving me/raynes/fs/1.4.0/fs-1.4.0.pom from clojars

