    inside a map, then the keyword acts like a `get` function.


    So, for example, imagine you have a map `{:foo "bar" :baz "qux"}` and you wanted
    the value from the `:baz` key. You could use either of the following snippets
    seen in Listing [2-23](#A453572_1_En_2_Chapter.html#Par125) to get at that value
    .


    ```

    (get {:foo "bar" :baz "qux"} :baz)

    ;; "qux"

    (:baz {:foo "bar" :baz "qux"})

    ;; "qux"

    Listing 2-23.

    Keyword as a Function

    ```


    In Listing [2-23](#A453572_1_En_2_Chapter.html#Par125) we’ve used the familiar
    `get` function like before to retrieve the value of the specified key, but we
    can also just use the keyword in the place where a function is expected, and it’ll
    return the value for that key. If you’re unsure whether your map includes a certain
    key, then you can use the `contains?` function , as seen in Listing [2-24](#A453572_1_En_2_Chapter.html#Par127).


    ```

    (contains? {:foo "bar" :baz "qux"} :foo)

    ;; true

    Listing 2-24.

    Demonstrate the contains? Function

    ```'
  trans: '

    ## 映射


    映射这种数据结构有许多不同的名称——哈希、哈希映射、字典——它与其他数据结构的区别在于其底层实现，这是确保该特定数据结构算法性能的关键部分（但该讨论主题不在本书范围内）。


    实际上，映射是一种键/值查找结构。你提供一个键，并将一个值与这个键关联。例如，请参见清单 2-17。


    ```

    {:my-key "this is my value"}

    清单 2-17.

    简单的映射数据结构

    ```


    注意


    Clojure 映射与 JSON 存在一一对应的映射关系。


    我们使用 `get` 函数来检索指定键的值，如清单 2-18 所示。


    ```

    (get {:my-key "this is my value"} :my-key)

    ;; "this is my value"

    清单 2-18.

    从映射数据结构中检索值

    ```


    注意


    如果你想要整个条目（即键和值，而不仅仅是值），那么你可以改用 `find`：


    `(find {:a 1 :b 2} :a)` 将返回 `[:a 1]`


    我们还可以使用 `assoc` 函数向现有映射添加一个键。我们之前在处理向量数据结构时使用过 `assoc`，因此你已经可以看到“序列抽象”正在发挥作用，该函数可以一致地用于不同的数据结构类型。请参见清单
    2-19。


    ```

    (assoc {:foo "bar"} :baz "qux")

    ;; {:foo "bar", :baz "qux"}

    清单 2-19.

    向映射数据结构关联一个新的键/值对

    ```


    你也可以使用 `dissoc` 函数移除键值对，如清单 2-20 所示。


    ```

    (dissoc {:foo "bar" :baz "qux"} :baz)

    ;; {:foo "bar"}

    清单 2-20.

    从映射数据结构中移除一个键/值对

    ```


    类似地，如果你需要返回一个由特定键组成的新映射，那么你可以使用 `select-keys` 函数，如清单 2-21 所示。


    ```

    (select-keys {:name "Mark" :age 33 :location "London"} [:name :location])

    ;; {:name "Mark", :location "London"}

    清单 2-21.

    为特定键过滤映射

    ```


    在前面的示例中，你会注意到返回的映射现在正确地缺少了 `:age` 键对。另外，请注意一个事实：与 `dissoc` 不同（在 `dissoc` 中，你可以指定多个键作为参数，以便将它们全部从结果映射中移除），使用
    `select-keys` 时，你需要在一个向量内指定多个键，以便选择你想要的键值对。


    ### 关键字


    有些读者可能想知道键前面的冒号是什么意思（例如，我们在 `:foo` 和 `:baz` 中看到的）。冒号表示该键实际上是一个关键字。如果你在 Ruby 中使用过符号，那么这其实是相同的东西。如果没有，那么要知道它的使用主要是出于性能原因。


    详细来说，如果你使用字符串创建映射键（例如，`{"my-key" "my key value"}`），那么每次你使用字符串引用该键时，都会在内存中重新创建它，而通过关键字引用键则只会创建一次。


    为了更好地理解这一点，想象我们有一个如清单 2-22 所示的向量，其中每个元素的值都相同。


    ```

    ["hi" "hi" "hi"]

    ;; 在内存中创建了三次字符串 “hi”

    [:hi :hi :hi]

    ;; 值 hi 在内存中只创建一次

    清单 2-22.

    演示关键字的性能

    ```


    因此，我们可以看到指定一次关键字，并在代码中找到该关键字的地方重用底层内存分配所带来的性能优势。这就是为什么你会看到大多数时候使用关键字而不是字符串（除非你有非常特定的字符串需求）。


    注意


    你可以使用 `keyword` 函数将字符串转换为关键字：`(keyword "my-string")`，它返回 `:my-string`。反向操作也可以使用
    `name` 函数完成：`(name :my-string)`，它返回 `"my-string"`。


    关键字的使用还有一个重要的补充——如果你将它们用作映射内部的键，那么该关键字的作用就像一个 `get` 函数。


    因此，例如，假设你有一个映射 `{:foo "bar" :baz "qux"}`，并且你想要从 `:baz` 键获取值。你可以使用清单 2-23 中所示的任一代码片段来获取该值。


    ```

    (get {:foo "bar" :baz "qux"} :baz)

    ;; "qux"

    (:baz {:foo "bar" :baz "qux"})

    ;; "qux"

    清单 2-23.

    关键字作为函数使用


    在清单 2-23 中，我们像之前一样使用了熟悉的 `get` 函数来检索指定键的值，但我们也可以直接在期望函数的位置使用关键字，它会返回该键的值。如果你不确定你的映射是否包含某个键，那么你可以使用
    `contains?` 函数，如清单 2-24 所示。


    ```

    (contains? {:foo "bar" :baz "qux"} :foo)

    ;; true

    清单 2-24.

    演示 contains? 函数

    ```

    '
- fmt: '### Keys, Values, and Replacement


    Before we finish up with looking at the map data structure, let’s take a moment
    to review a few simpler functions (`keys`, `vals`, and `replace`), as well as
    to understand what a struct is. First, let’s see the `keys`/`vals` functions and
    how they work (Listing [2-25](#A453572_1_En_2_Chapter.html#Par129)).


    ```

    (keys {:foo "bar" :baz "qux"})

    ;; (:baz :foo)

    (vals {:foo "bar" :baz "qux"})

    ;; ("qux" "bar")

    Listing 2-25.

    Demonstrate the keys and vals Functions

    ```


    As you can see in Listing [2-25](#A453572_1_En_2_Chapter.html#Par129), with `keys`
    we pass the function a map data structure and it returns all the keys specified
    within the data structure. The `vals` function is similar in that we pass it a
    map data structure, but this time it returns just the values assigned to each
    key.


    The `replace` function allows you to create a new vector consisting of values
    extracted from a map data structure. It does this by using the key name for the
    value you want to extract. So, if you had the following map `{:a 1 :b 2 :c 3}`
    and you wanted to generate the vector `[3 2 1]`, then you could do that with the
    code in Listing [2-26](#A453572_1_En_2_Chapter.html#Par132).


    ```

    (replace {:a 1 :b 2 :c 3} [:c :b :a])

    Listing 2-26.

    Demonstrate the replace Function

    ```


    Note


    The `replace` function works on vectors, but using index values rather than keys:


    `(replace [:a :b :c] [2 1 0])` will return `[:c :b :a]`.


    Finally, let’s understand what structs are in Clojure. Effectively, they are a
    simple way to generate maps from a predefined structure. So, for example, if I
    wanted a map data structure that resembled attributes of a person, then I could
    manually execute the code seen in Listing [2-27](#A453572_1_En_2_Chapter.html#Par136).


    ```

    (def mark {:name "Mark" :age 35})

    (def rich {:name "Richard" :age 40})

    (def cat {:name "Catherine" :age 30})

    Listing 2-27.

    Assign Map Structures to Identifiable Symbols

    ```


    Note


    The use of the `def` function is so we can declare a variable. We’ll come back
    to variables in a little while, but, in short, they define a location in memory
    where data can be stored; we can then refer back to that data using the variable’s
    name.


    In the preceding example, you’ll notice that there is a lot of duplication with
    regards to my typing the keys `:name` and `:age` (and realistically there would
    be many more attributes I’d want to record). This can be wasted time and adds
    the potential for typo errors to cause annoying bugs, never mind the inconsistency
    of adding new keys to one of the maps and forgetting to add them to the other
    maps as well.


    It would be better for us to abstract away the “structure” of the map so that
    we can focus on just providing the data, and that’s where the `create-struct`
    and `struct` functions come in handy, as seen in Listing [2-28](#A453572_1_En_2_Chapter.html#Par140).


    ```

    (def person (create-struct :name :age :sex))

    (struct person "Mark" 35 "Male")

    ;; {:name "Mark", :age 35, :sex "Male"}

    (struct person "Richard" 40 "Male")

    ;; {:name "Richard", :age 40, :sex "Male"}

    (struct person "Catherine" 30 "Female")

    ;; {:name "Catherine", :age 30, :sex "Female"}

    Listing 2-28.

    Demonstrate create-struct and struct Functions

    ```


    Note


    Clojure provides a shortcut by way of a macro called `defstruct`. This macro handles
    the creation of structs and storing them in a variable. So, instead of `(def person
    (create-struct :name :age :sex))`, you could use `(defstruct person :name :age
    :sex)`.


    ### Set


    A set is a data structure made up of unique values. Much like Clojure’s map and
    vector data structures, it provides Clojure with a very lightweight data model.
    The example in Listing [2-29](#A453572_1_En_2_Chapter.html#Par143) is what a set
    typically looks like.


    ```

    #{1 2 3 :a :b :c}

    ;; #{1 :c 3 2 :b :a}

    Listing 2-29.

    Simple Set Data Structure Example

    ```


    The order of a set is not guaranteed (as seen in the preceding example’s return
    value). Although you can create a sorted set by using the `sorted-set` function,
    be warned you can’t use mixed-types with a sorted set. See Listing [2-30](#A453572_1_En_2_Chapter.html#Par145).


    ```

    (sorted-set 3 1 2)

    ;; #{1 2 3}

    (sorted-set 1 2 3 :a :b :c)

    ;; error – mixed types

    Listing 2-30.

    Simple Set Data Structure Example

    ```


    If you already have a set created and it’s unsorted, then you can use the `apply`
    function (which works for any collection type: lists, vectors, maps, and sets)
    to apply the `sorted-set` function onto the existing set, like in Listing [2-31](#A453572_1_En_2_Chapter.html#Par147).


    ```

    (apply sorted-set #{3 1 2})

    ;; #{1 2 3}

    Listing 2-31.

    Apply sorted-set onto Existing Set

    ```


    The ability to apply with a sorted-set can come in handy when dealing with existing
    collections, because you can filter out duplicates at the same time as sorting
    them, as in Listing [2-32](#A453572_1_En_2_Chapter.html#Par149).


    ```

    (set [1 1 2 2 3 3 4 5 6 6])

    ;; #{1 4 6 3 2 5}

    (apply sorted-set [1 1 2 2 3 3 4 5 6 6])

    ;; #{1 2 3 4 5 6}

    Listing 2-32.

    Filter Out Duplicates

    ```


    You can also use the `conj` function to add a new value to the set, but remember
    that a set is a collection of unique values, and so if you try to add a value
    that already exists, it’ll be quietly ignored. See Listing [2-33](#A453572_1_En_2_Chapter.html#Par151).


    ```

    (conj #{1 2 3} 4)

    ;; #{1 4 3 2}

    (conj #{1 2 3} 3)

    ;; #{1 3 2}

    Listing 2-33.

    Using conj to Add New Value to a Set

    ```


    Lastly, being able to add items to a set is wonderful, but being able to remove
    items is equally useful at times, and we do this using `disj` (see Listing [2-34](#A453572_1_En_2_Chapter.html#Par153)).


    ```

    (disj #{1 2 3} 3)

    ;; #{1 2}

    Listing 2-34.

    Remove Items from a Set with disj

    ```


    ### Vars and Symbols


    OK, this is the last bit of basic syntax I want to cover before moving on. In
    this section, I want to demonstrate not only how variables work (you’ll be very
    familiar with this concept from other programming languages), but also how symbols
    tie into variables and the use of the `def` function along with the `defn` macro.


    Let’s start by understanding what a symbol is. A symbol, in its simplest form,
    is a reference to some other value. It’s an identity of sorts, like your name;
    it identifies you, and although you change over time (you get older, right?) your
    identity stays the same.


    A variable, on the other hand, is a mutable storage location. When creating a
    variable, it is created within the current namespace (this prevents conflicts
    with other namespaces). To create a variable in Clojure, you need to use the `def`
    function so you can assign the value to a symbol. See Listing [2-35](#A453572_1_En_2_Chapter.html#Par157).


    ```

    (def foo "hello")

    Listing 2-35.

    Using def to Assign a Value to a Symbol/Variable

    ```


    In Listing [2-35](#A453572_1_En_2_Chapter.html#Par157), I’ve called the `def`
    function and passed the symbol `foo` and the string `"hello"` as arguments. The
    `def` function associates the symbol `foo` with the string `"hello"` so that when
    I type the symbol `foo` into the REPL (within the current namespace), it’ll know
    where to go to look up the value and return me the value associated with the symbol
    (which in this case would be the value `"hello"`).


    Note


    Internally, Clojure manages a global map of namespaces and their associated variables.


    Variables are not available within other namespaces unless they are “interned”
    into them. Interning is a fancy way of saying “find variable `x` within this current
    namespace; and if it doesn’t exist then create it.” But you can also “intern”
    variables from another namespace using the `:refer` feature of the `ns` macro.
    I’ll demonstrate how that works in a later chapter, when we look in more detail
    at namespaces.'
