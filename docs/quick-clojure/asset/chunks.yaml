- fmt: "# Macro Dissection\n\nAt this point, we have a basic understanding of all\
    \ the individual parts that can be used to create a dynamic and robust macro feature.\
    \ Let’s put this all together by reviewing a more complicated macro example-code\
    \ snippet and understanding how it works.\n\nClojure doesn’t have a classical\
    \ `for` loop construct (and by “classical” I’m referring to a low-level language\
    \ like C) whereby you specify a starting value, a condition, and an incrementor\
    \ and subsequently loop until the specified condition is no longer met.\n\nTo\
    \ remedy this within the Clojure language, let’s implement this missing construct\
    \ as a macro. The output from executing the following `for-loop` macro we’re going\
    \ to define should be the numbers zero through nine printed to `stdout` (one number\
    \ per line).\n\n**Note**\n\nI would recommend spending a good amount of time reviewing\
    \ Listing [10-11](#A453572_1_En_10_Chapter.html#Par64) to be sure you are able\
    \ to put together all the different syntax we’ve seen so far.\n\n```\n(defmacro\
    \ for-loop [[sym init check change] & steps]\n`(loop [∼sym ∼init accumulated#\
    \ nil]\n(if ∼check\n(let [new-value# (do ∼@steps)]\n(recur ∼change new-value#))\n\
    accumulated#)))\n(for-loop [i 0, (< i 10), (inc i)]\n(prn i))\nListing 10-11.\n\
    A Custom for Loop Construct Built Using Macro Features\n```\n\nOK, so let’s start\
    \ by looking at how we called the `for-loop` macro. We can see that we’re passing\
    \ in a vector that contains our loop information: `[i 0, (< i 10), (inc i)]`.\
    \ This is followed by a “body” expression, `(prn i)`, which we expect to be executed\
    \ on each loop iteration.\n\n**Note**\n\nWe could pass in multiple body expressions\
    \ to be executed using this current macro implementation if we wanted. But for\
    \ the sake of simplicity and demonstrating the basic functionality, we provided\
    \ only one form to be evaluated per iteration.\n\nWithin the macro itself, we\
    \ destructure the incoming vector (i.e., we extract each element from the incoming\
    \ vector data structure) into the following local bindings:\n\n*   `sym`: `i`\n\
    *   `init`: `0`\n*   `check`: `(< i 10)`\n*   `change`: `(inc 1)`\n\nWe also take\
    \ the remaining arguments, `(prn i)`, which we assume to be the body to be executed\
    \ on each iteration, and use `& steps` to assign them into a `steps` collection.\
    \ This means it is constructed as a list, like so: `((prn i))`.\n\nAt this point,\
    \ we start to define the main body of our macro. In summary, we carry out the\
    \ following steps:\n\n*   Create a `loop` (as a target for a later `recur`).\n\
    \    *   Bind the symbol `i` to the value `0`.\n    *   Bind the dynamically generated\
    \ symbol (i.e., `accumulated#`) to the value `nil`.\n*   Use an `if` statement\
    \ to check if the local `i` value is less than `10`.\n    *   The `check` condition\
    \ was passed into the macro at runtime (i.e., `(< i 10)`).\n    *   The value\
    \ will be less than `10` initially, as we’ve only just set it to `0` (see previous\
    \ step).\n*   If the value is greater than or equal to `10`, then the `else` statement\
    \ returns the value assigned to `accumulated#`.\n    *   We’ll see in a moment\
    \ how `accumulated#` is updated each iteration to a new value.\n*   If the value\
    \ IS less than `10`, then we execute the provided body expression(s).\n    * \
    \  The return value from the last body expression is assigned to `new-value#`.\n\
    \    *   We then use `recur` to jump back to the start of the `loop` and pass\
    \ in new values.\n    *   The new values passed in for each iteration are the\
    \ result from executing the `change` expression (i.e., `(inc i)`).\n    *   Then\
    \ `accumulated#` is passed the current value assigned to `new-value#`.\n\nYou\
    \ can see from these steps that the main meat of the solution is the use of `loop`\
    \ and `recur` to allow recursively executing code, and that for each recursion\
    \ we pass in updated values that allow the logic within the loop to decide if\
    \ it should recurse again or stop.\n\nThat’s it, really, for understanding the\
    \ basics of macros. You should now have enough information to go away and become\
    \ dangerous . . . I mean, inspirational!\n\nI also think it’s probably worth my\
    \ saying (although I’m regretting it already): “With great power, comes great\
    \ responsibility”; and what we mean by this (in the context of writing macros\
    \ in Clojure) is: There are subtle issues with using macros, especially if another\
    \ solution exists without the need for macros. If you need something executed\
    \ at compile time rather than runtime, then, fine, a macro will help. But first\
    \ see if a standard function exists that would suffice.\n\n**Note**\n\nYou can’t\
    \ pass a macro around within your code (e.g., as a function argument) the same\
    \ way as you can with a standard function. This ultimately means you lose some\
    \ composability within your code’s design, which is a fundamental principle of\
    \ functional programming.\n\n## Summary\n\nIn this chapter, we’ve delved a little\
    \ deeper into the Lisp-style syntax in order to help us redefine what behaviors\
    \ are available in Clojure. This concept (and its implementation) is extremely\
    \ powerful, and there are many examples of macros in the core library (and in\
    \ other standard Clojure namespaces).\n\nI would recommend starting simple when\
    \ creating macros, as well as spending a fair amount of time looking at the source\
    \ code for existing Clojure-implemented macros (but also including those macros\
    \ created by the wider Clojure community).\n\nIn the next chapter, we’ll be focusing\
    \ on object-oriented programming features available within the Clojure language.\
    \ Remember that Clojure isn’t a 100 percent strict functional language (like,\
    \ say, the Haskell[³](#A453572_1_En_10_Chapter.html#Fn3) programming language).\
    \ Although we won’t be diving into how to incorporate Java code with Clojure,\
    \ the OOP features available in Clojure tie in nicely with the Java environment.\n\
    \n**Footnotes**\n\n[1](#A453572_1_En_10_Chapter.html#Fn1_source) [https://en.wikipedia.org/wiki/Progressive_enhancement](https://en.wikipedia.org/wiki/Progressive_enhancement)\n\
    \n[2](#A453572_1_En_10_Chapter.html#Fn2_source) [http://sweetjs.org/](http://sweetjs.org/)\n\
    \n[3](#A453572_1_En_10_Chapter.html#Fn3_source) [https://www.haskell.org/](https://www.haskell.org/)\n\
    \n# 11. Object Orientation\n\nOne of the confusing aspects of Clojure is that\
    \ although it aims at being a functional programming language, it does also provide\
    \ “object-oriented” features (gasp). This is similar to other programming languages,\
    \ such as Scala,[¹](#A453572_1_En_11_Chapter.html#Fn1) which also provides both\
    \ FP and OOP syntax.\n\nWhen to use OOP in Clojure is a tricky discussion point\
    \ and depends on the requirements of the project you’re working on, and so we\
    \ won’t make any opinionated statements on that topic. Although, I will say, for\
    \ me personally I like the structural aspect of some of the items we’ll be looking\
    \ at shortly, and it can also be valuable to use specific types to help build\
    \ boundaries between different systems.\n\nUltimately, the OOP features within\
    \ Clojure aren’t as prominent as those found in other languages, and definitely\
    \ not nearly as much as those found in Scala, which seems to aim for an even split.\n\
    \nIn this chapter, there is a (small) select group of features that I will be\
    \ covering, and they are as follows:\n\n*   `defprotocol`\n*   `deftype`\n*  \
    \ `defrecord`\n*   `reify`\n\n## Java Interop\n\nWhen using object-oriented features\
    \ in Clojure, you’ll eventually discover each has specific nuances that tie it\
    \ to the underlying Java language/VM that Clojure uses as its host environment.\n\
    \nIf you plan on working with OOP or interacting with Java libraries, then I recommend\
    \ you both read the Clojure notes on the topic of interop with Java[²](#A453572_1_En_11_Chapter.html#Fn2)\
    \ as well as review the documentation for the macros/functions described in this\
    \ chapter, as they go into more detail on how the different items are handled\
    \ internally by Clojure (there are quite a few low-level configuration details\
    \ that can be of interest to some readers, but are generally out of the scope\
    \ of this book)."
