    First, I needed to deploy my library to Clojure’s online repository of available
    libraries (called Clojars[^(29)](#A453572_1_En_12_Chapter.html#Fn29)). This requires
    you to follow the instructions provided by Leiningen,[^(30)](#A453572_1_En_12_Chapter.html#Fn30)
    but in essence the steps involved are to register for an account and then execute
