    We created a “Hello World” example using `lein new compojure-app <name_of_app>`,
    and this provided us with lots of stuff for free, such as the handling of static
    assets and the serving up of some basic CSS to go along with our HTTP response.


    But we could have also used `lein new compojure <name_of_app>` (notice `compojure-app`
    is now just `compojure`), which would still provide us a simple web service like
    it did before, but now it is stripped back even further! This means no fancy HTML
    wrapped around our “Hello World” message, just plain text sent back to the browser.


    I recommend exploring the other differences between the two template types, but
    which template you choose ultimately depends on how comfortable you are setting
    up a lot of the tedious aspects of handling rich HTML responses. For most people,
    `compojure-app` is the simplest route to get up and running quickly and efficiently.'
  trans: '

    ### 插件


    第四种模板类型是“插件”，它对于为你的 Clojure 应用程序开发插件¹⁴代码非常有用。插件功能的一个例子是 `lein-eastwood`¹⁵，它是一个
    Clojure 代码检查工具。


    为了使用一个插件（例如 lein-eastwood），你需要更新你的 `project.clj` 文件来引用该插件（例如，添加 `:plugins [[jonase/eastwood
    "0.2.4"]]`）。完成此操作后，你会发现该插件现在可以作为 Leiningen 的一个子命令使用，并且可以在你的项目上下文中执行代码。以 lein-eastwood
    为例，它能够审查（即检查）你的代码中常见的错误。


    清单 12-15 展示了一个 Leiningen 插件的典型目录结构。为了帮助你了解插件还能提供哪些其他类型的行为，我建议你仔细查阅 Leiningen 插件的官方列表¹⁶（数量非常多！）。


    ```

    ├── LICENSE

    ├── README.md

    ├── project.clj

    ├── src

    ├── leiningen

    ├── .clj

    清单 12-15.

    Leiningen “插件”模板的树形结构

    ```


    注意


    Leiningen 提供了一份关于如何创建你自己的插件的优秀文档¹⁷，强烈推荐阅读。


    ## 项目文件


    在所有不同类型的项目/模板中，有一个始终如一的元素就是项目文件本身：`project.clj`。这个文件的主要目的是引导你的应用程序启动。它通过定义项目的依赖关系，并在你首次运行项目应用程序代码时为你拉取这些依赖来实现这一点。


    `project.clj` 还允许你关联元数据，例如项目描述和 URL，以及定义你想要使用的任何插件（以及更多其他内容）。


    有关可用配置设置的完整列表，我建议你阅读 Leiningen 模板示例文件¹⁸，该文件非常详细地解释了每一个可用的设置（而且数量很多）。


    让我们来看一个通用的 Compojure “Hello World” 应用程序（就像我们之前创建的那个）的 `project.clj` 文件，看看我们是否能更好地理解我们所获得的配置的不同方面。


    ```

    (defproject compojure-foo "0.1.0-SNAPSHOT"

    :description "FIXME: write description"

    :url "http://example.com/FIXME"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [compojure "1.5.2"]

    [hiccup "1.0.5"]

    [ring-server "0.4.0"]]

    :plugins [[lein-ring "0.8.12"]]

    :ring {:handler compojure-foo.handler/app

    :init compojure-foo.handler/init

    :destroy compojure-foo.handler/destroy}

    :profiles

    {:uberjar {:aot :all}

    :production

    {:ring

    {:open-browser? false, :stacktraces? false, :auto-reload? false}}

    :dev

    {:dependencies [[ring-mock "0.1.5"] [ring/ring-devel "1.5.1"]]}})

    清单 12-16.

    Compojure 项目的 project.clj 文件

    ```


    在清单 12-16 中，我们可以看到一些 Clojure 代码，它使用 `defproject` 宏来构建项目的引导程序。它已经使用我们运行 `lein new...`
    时提供的名称进行了设置，并将应用程序的版本默认为 `0.1.0-SNAPSHOT`。当我们准备发布应用程序时，可以将其更改为我们想要的任何值（例如，你可能希望将其更改为
    1.0.0 或 0.0.1）。


    注意


    通常，这里使用的版本格式暗示了语义化版本控制¹⁹：`<主版本>.<次版本>.<补丁>`，而使用 `SNAPSHOT` 是 Java 版本命名约定。


    接下来，我们有一个标准的 `:description` 字段和一个关联的 `:url` 字段，以便用户知道项目的源代码（或推广品牌）可以位于何处。


    我们还有一个 `:dependencies` 字段（可以说是这个文件中最重要的项目之一）。对于 Compojure 应用程序，我们发现 Compojure
    应用模板已经自动为我们预填了一些有用的依赖：


    *   `org.clojure/clojure "1.8.0"` — Clojure 语言

    *   `compojure "1.5.2"` — HTTP 请求路由库²⁰

    *   `hiccup "1.0.5"` — 用于渲染 HTML 的库²¹

    *   `ring-server "0.4.0"` — 用于 Ring 接口的 Web 服务器²²


    注意


    当你运行 Leiningen 时，它会自动拉取你所有的依赖，但你也可以随时使用子命令 `lein deps` 手动执行此操作。


    继续往下看，我们有 `:plugins` 设置，它引入了插件 `lein-ring`²³，该插件负责自动化一些常见的基于 Ring 的任务。这个插件为 `project.clj`
    文件添加了一个额外的设置，一旦指定，我们就需要包含以下属性：`:ring {…配置…}`。


    正如我们从 `project.clj` 文件中看到的，当使用 Compojure 模板时，它会自动为我们预填 `:ring` 属性的配置，以便它知道主处理函数的位置，并识别用于设置和拆卸行为的函数（默认情况下这些是空操作函数，意味着它们是已定义的函数，但没有定义任何行为）。


    接着往下看，我们看到 `:profiles` 设置。这允许我们根据环境定义某些行为。因此，我们可以看到有一个 `:production` 属性，它定义了应用程序在生产环境中应如何表现（例如，我们设置
    `:auto-reload? false`，因为这种行为仅在本地开发应用程序代码时有用；我们还设置 `:stacktraces? false`，因为我们希望向用户隐藏这类信息）。类似地，我们有一个
    `:dev` 属性，我们在其中指定仅在本地开发时有用的依赖。


    如果你想了解更多关于这些配置选项的信息，那么我建议你查看 `lein-ring` 插件的 GitHub 页面²⁴，那里会提供最新的详细信息。


    注意


    你可以通过使用 `with-profile` 选项运行应用程序来在本地测试你的配置文件（例如，`lein with-profile production run
    some_app`）。


    ## compojure 与 compojure-app 对比


    我们使用 `lein new compojure-app <应用名称>` 创建了一个“Hello World”示例，这为我们免费提供了很多东西，例如处理静态资源以及提供一些基本的
    CSS 来配合我们的 HTTP 响应。


    但我们也可以使用 `lein new compojure <应用名称>`（注意 `compojure-app` 现在只是 `compojure`），它仍然会像以前一样为我们提供一个简单的
    Web 服务，但现在它被进一步精简了！这意味着没有花哨的 HTML 包裹着我们的“Hello World”消息，只有纯文本发送回浏览器。


    我建议你探索这两种模板类型之间的其他差异，但你最终选择哪种模板取决于你对处理丰富 HTML 响应的许多繁琐方面的熟悉程度。对于大多数人来说，`compojure-app`
    是快速高效启动和运行的最简单途径。

    '
- fmt: '## Real-World Library Example


    Sometimes it’s best to consider what a real project looks like. For example, building
    a Clojure web application is one thing (most devs can muddle along with that—maybe
    with some Google assistance thrown in), but I found from my own personal experience
    that building a library that is consumed by another application can be quite a
    confusing process. So, I wanted to show you a small Clojure library I wrote to
    help me use a tool called Spurious (this is an example from a few years ago, but
    the principle still stands).


    We’ll start by understanding what Spurious is, and then we’ll take a look through
    the library project I created, as well as look briefly over an example application
    that consumed the library. But first, let’s refer to the Spurious README to see
    how it describes itself:


    > Spurious is a toolset allowing development against a subset of AWS resources,
    locally. The services are run as Docker containers, and Spurious manages their
    lifecycle and linking so all you have to worry about is using the services. To
    use Spurious, you’ll need to change the endpoint and port for each AWS service
    to those provided by Spurious. —Spurious. GitHub


    In a nutshell, Spurious attempts to save you money while developing applications
    that use AWS services (by running those services locally). This is awesome for
    me because I use AWS a lot, and it allows me to experiment without having to pay
    for the pleasure of playing around with some code that might never become anything.


    **Note:** To make things more complicated (for myself) I needed my library code
    to work when loaded both within a standard Clojure application as well as when
    the application was run from within a Docker container (which didn’t necessarily
    result in more code, but added more complexity to the overall process and understanding
    of how to write and test my library).


    You can find my library code online, hosted with GitHub, as well as the example
    application that consumes the library. I won’t be covering the ins and outs of
    either, but I link to them, as they’ll make for a useful reference point.


    ### Consumer


    Let’s start with the example application and how it consumes my library. If you
    look at the `project.clj` you’ll see that I’ve simply defined my library as being
    a dependency. Take a look at Listing 12-17 for a stripped-back example.


    ```

    (defproject spurious-clojure-example "0.1.0"

    :dependencies [[spurious-aws-sdk-helper "0.2.0"]])

    Listing 12-17.

    Example of Consumer project.clj

    ```


    So, nothing special here; we have a dependency and we’re indicating the specific
    version we wish our application to use.


    ### Local Testing


    In case you’re unfamiliar with the process of releasing a library, I’ll quickly
    detour into what I needed to do in order to be able to test and load my own library
    as a dependency.


    First, I needed to deploy my library to Clojure’s online repository of available
    libraries (called Clojars). This requires you to follow the instructions provided
    by Leiningen, but in essence the steps involved are to register for an account
    and then execute the sub-command `lein deploy clojars`.


    But how do you go about testing your library code before releasing it (how do
    you know it’ll work)? You don’t want to push up version 1.0.0 and then go to use
    it and find there was a bug you didn’t expect. You want to test the library locally
    using a local application so you can be 100 percent sure it works (this was especially
    important to me, as my library needed to work within a Docker container, and I
    just wasn’t confident that I could verify that without manual steps).


    The solution to that problem was simply to install the library to my local cache
    directory. To understand what this means, you need to realize that Leiningen creates
    a local cache of your dependencies. It does this so it doesn’t have to keep downloading
    the same dependency over and over for every project you create.


    This means we can take advantage of the local cache to trick Leiningen into thinking
    it has already downloaded the dependency from online (i.e., downloaded it from
    Clojars), even if the dependency doesn’t yet exist online. To do that you simply
    run (from inside your library project directory) `lein install`, and this will
    install your library into your local `~/.m2` cache directory.


    ### Loading the Dependency


    Take a look at Listing 12-18 to see what the consumer’s `home.clj` file looks
    like. Here, you’ll see how we’re pulling the library for consumption.


    ```

    (ns spurious-clojure-example.routes.home

    (:require [compojure.core :refer :all]

    [spurious-aws-sdk-helper.core :as core]

    [spurious-aws-sdk-helper.utils :refer [endpoint cred]]))

    Listing 12-18.

    Load the External Dependency (Shortened for Brevity)

    ```


    You can see I’m pulling in the `core` namespace and renaming it so it makes it
    easier for me to reference the public functions contained within that loaded namespace
    (e.g., `core/configure`). You can also see I refer in two functions from my `utils`
    namespace: `endpoint` and `cred`.


    Without getting bogged down in a line-by-line explanation, that’s generally all
    there is to loading the library within the consumer. This tallies up with everything
    we’ve learned so far about namespaces and Leiningen projects.'
