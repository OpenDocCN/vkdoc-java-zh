    When we defined our `drop-nth` function , we gave it the name `drop-nth`. But
    functions don’t need a name in order to be executable, and so for convenience,
    instead of defining a function that will exist for the lifetime of the program,
    we’ve defined an inline/anonymous function for the purpose of doing a quick bit
    of processing and passing that result as the first argument to the `remove` function.


    So, looking back at that form, we can see that it’s really just calling the `remove`
    function and passing it two arguments: the first being an anonymous function `#(zero?
    (mod (first %) n))` and the second being the result of the previous `map` form
    (which you don’t explicitly see being passed as the second argument, thanks to
    the `->>` macro).


    Finally, the result of the previous `remove` form is passed as the last argument
    to `(map second)`. If we didn’t have the thread-last macro, then we’d be forced
    to write the (more complex) set of nested forms shown in Listing [2-13](#A453572_1_En_2_Chapter.html#Par81)
    (notice the order of the functions are now reversed, and it’s written “outside-in”).


    ```

    (defn drop-nth [n coll]

    (map second

    (remove #(zero? (mod (first %) n))

    (map vector (iterate inc 1) coll))))

    (drop-nth 3 [:a :b :c :d])

    ;; (:a :b :d)

    Listing 2-13.

    Solution Without the Use of the Thread-Last Macro

    ```


    Now, ultimately what we’re aiming to do is to wrap all of this complex logic inside
    a user-defined function called `drop-nth`, meaning it is ready to be reused wherever
    we have the need to remove an item from a collection.


    The underlying principle of how the preceding code works is that the collection
    you provide is turned into a structure that resembles (slightly) a hash map (something
    we’ll look at in the next section, “Map”).


    So, for example, the collection `[:a :b :c :d]` would be converted into something
    like `([1 :a] [2 :b] [3 :c] [4 :d])`. You can try this yourself in the REPL (see
    Listing [2-14](#A453572_1_En_2_Chapter.html#Par85)).


    ```

    (map vector (iterate inc 1) [:a :b :c :d])

    ;; ([1 :a] [2 :b] [3 :c] [4 :d])

    Listing 2-14.

    Convert Collection into One with Numerical Access

    ```


    I’ll explain how the `map` function works in the next chapter, but for now it’ll
    suffice to know that it loops over a given collection and passes each item in
    the collection to a function that can mutate the value. This now gives us a numerical
    hook into a particular element within the collection.


    The next line, `(remove #(zero? (mod (first %) n)))`, is a call to the `remove`
    function. We now know that we’re passing the result of an anonymous function.
    The anonymous function is executing the predicate function `zero?`.


    Note


    A “predicate” sounds more complicated than it really is. A predicate is simply
    a function that returns true or false.


    The argument passed to `zero?` is an item from the collection `([1 :a] [2 :b]
    [3 :c] [4 :d])`. The `remove` function executes `zero?` against each element in
    the provided collection. You can try this yourself by combining the preceding
    snippet with the output from the previous snippet, as shown in Listing [2-15](#A453572_1_En_2_Chapter.html#Par90).


    ```

    (remove #(zero? (mod (first %) 3))

    ''([1 :a] [2 :b] [3 :c] [4 :d]))

    ;; ([1 :a] [2 :b] [4 :d])

    Listing 2-15.

    Remove Item from Collection Based on Anonymous Function

    ```


    In Listing [2-15](#A453572_1_En_2_Chapter.html#Par90), you’ll notice that I swapped
    what was `n` in our `drop-nth` implementation for the value `3`. I did that just
    for the purposes of demonstrating how this extracted snippet of code works. I
    also needed to quote the list `''(...)` in the snippet; otherwise, it would have
    caused an error.


    If you wanted , you could also have tried it with the original expression included
    instead of using the quoted `''([1 :a] [2 :b] [3 :c] [4 :d])`. See Listing [2-16](#A453572_1_En_2_Chapter.html#Par93).


    ```

    (remove #(zero? (mod (first %) 3))

    (map vector (iterate inc 1) [:a :b :c :d]))

    ;; ([1 :a] [2 :b] [4 :d])

    Listing 2-16.

    Remove Item from Collection Using Original Form

    ```


    OK, we’ve diverted from our focus a bit there. Going back to what we were saying
    before, the first element is `[1 :a]`, and in this case the anonymous function
    is able to access that via the `%` symbol. It retrieves the number `1` and divides
    it by `n` (and in the preceding example this was the number `3` that was originally
    passed as an argument to `drop-nth`). It does this calculation to verify if the
    numbers divide evenly; if they do, then zero will be the result and the predicate
    (which is the `zero?` function) will return `true`, meaning that the element should
    be removed from the collection.


    The only element in the collection that can divide evenly and result in a modulus
    of zero would be `[3 :c]`. This means the overall result of the `remove` function
    is `([1 :a] [2 :b] [4 :d])`.


    Now, we’ve successfully removed the requested element. But we still need to convert
    our data structure back to its original form . To do this, we move to the final
    line of the function `(map second)`, which maps over the resulting collection,
    which is still a collection of sub vectors—`([1 :a] [2 :b] [4 :d])`—and returns
    a modified version where it has removed the first element from each nested collection
    by specifically retrieving the “second” item.


    So, the first nested collection is `[1 :a]`, meaning `(map second)` will remove
    the 1 and leave `:a`. The overall function result is `(:a :b :d)`, which is what
    we desired originally, the ability to remove a specific element from the collection
    that wasn’t the start or end position.


    Now, one concern with the current `drop-nth` implementation is that it will actually
    remove every nth item. So, if you executed `(drop-nth 3 [:a :b :c :d :e :f :g
    :h :i :j])`, then the result would be `(:a :b :d :e :g :h :j)`. Notice it didn’t
    just remove the third item, but rather every third item. This might not necessarily
    be what you wanted to have happen.


    The solution , remembering the problem was removing a single value from the middle
    of a collection, is to replace `#(zero? (mod (first %) n))` with `#(= (first %)
    n)`, which causes all other iterations to fail because only `3` will be “equal”
    to the third element (notice we replaced the `zero?` predicate with the `=` function).


    Before we move on, instead of using `remove` we could have used another function
    called `filter` instead (I demonstrate `filter` in the following chapter), but
    I think semantically `remove` makes more sense. The only difference between the
    two functions is in the use of the predicate.


    The `filter` function will keep elements if its predicate returns `true` (the
    semantics of the function are “filter out elements I want”). The `remove` function
    will keep elements if its predicate returns `false` (the semantics of the function
    are “remove elements that pass the test”).'
  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    因此，集合 `[:a :b :c :d]` 作为参数/符号 `coll` 被传入 `drop-nth` 函数，同时也作为最后一个参数被传入 `(map vector
    (iterate inc 1))`。这意味着一旦 Clojure 编译了这个形式/表达式，它最终看起来会像 `(map vector (iterate inc
    1) coll)`。


    前一个 `map` 形式的结果本身会作为最后一个参数被传入 `(remove #(zero? (mod (first %) n)))`。


    好的，最后一个形式看起来相当复杂。我们可以看到我们正在调用一个名为 `remove` 的函数，但它后面作为参数传入的所有东西是什么呢？嗯，那是一个“匿名”函数。


    当我们定义 `drop-nth` 函数时，我们给它取名为 `drop-nth`。但函数并不需要名字才能执行，因此为了方便起见，我们没有定义一个在程序生命周期内存在的函数，而是定义了一个内联/匿名函数，用于快速处理一些数据，并将该结果作为第一个参数传递给
    `remove` 函数。


    所以，回顾那个形式，我们可以看到它实际上只是在调用 `remove` 函数，并向它传递两个参数：第一个是一个匿名函数 `#(zero? (mod (first
    %) n))`，第二个是前一个 `map` 形式的结果（由于 `->>` 宏，你不会显式地看到它作为第二个参数被传递）。


    最后，前一个 `remove` 形式的结果作为最后一个参数被传入 `(map second)`。如果我们没有使用线程末位宏，那么我们将被迫编写如清单 2-13
    所示的一组（更复杂的）嵌套形式（注意函数的顺序现在是相反的，并且是“由外向内”编写的）。


    ```

    (defn drop-nth [n coll]

    (map second

    (remove #(zero? (mod (first %) n))

    (map vector (iterate inc 1) coll))))

    (drop-nth 3 [:a :b :c :d])

    ;; (:a :b :d)

    清单 2-13.

    未使用线程末位宏的解决方案

    ```


    现在，我们的最终目标是将所有这些复杂逻辑封装在一个名为 `drop-nth` 的用户自定义函数中，这意味着无论我们在哪里需要从集合中移除一个元素，它都可以被重用。


    上述代码工作的基本原理是，你提供的集合被转换成一个（稍微）类似于哈希映射的结构（我们将在下一节“映射”中讨论）。


    例如，集合 `[:a :b :c :d]` 会被转换成类似 `([1 :a] [2 :b] [3 :c] [4 :d])` 的形式。你可以在 REPL 中自己尝试一下（见清单
    2-14）。


    ```

    (map vector (iterate inc 1) [:a :b :c :d])

    ;; ([1 :a] [2 :b] [3 :c] [4 :d])

    清单 2-14.

    将集合转换为带有数字索引的集合

    ```


    我将在下一章解释 `map` 函数是如何工作的，但现在只需知道它会遍历给定的集合，并将集合中的每个元素传递给一个可以修改其值的函数就足够了。这为我们提供了一个访问集合中特定元素的数字钩子。


    下一行代码 `(remove #(zero? (mod (first %) n)))` 是对 `remove` 函数的调用。我们现在知道我们传递的是一个匿名函数的结果。这个匿名函数正在执行谓词函数
    `zero?`。


    注意


    “谓词”听起来比实际复杂。谓词就是一个返回真或假的函数。


    传递给 `zero?` 的参数是来自集合 `([1 :a] [2 :b] [3 :c] [4 :d])` 的一个元素。`remove` 函数针对提供的集合中的每个元素执行
    `zero?`。你可以通过将前面的代码片段与前面片段的输出结合起来自己尝试一下，如清单 2-15 所示。


    ```

    (remove #(zero? (mod (first %) 3))

    ''([1 :a] [2 :b] [3 :c] [4 :d]))

    ;; ([1 :a] [2 :b] [4 :d])

    清单 2-15.

    基于匿名函数从集合中移除元素

    ```


    在清单 2-15 中，你会注意到我将 `drop-nth` 实现中的 `n` 替换成了值 `3`。我这样做只是为了演示这个提取出的代码片段是如何工作的。我还需要在代码片段中引用列表
    `''(...)`；否则，会导致错误。


    如果你愿意，你也可以尝试使用原始表达式，而不是使用引用的 `''([1 :a] [2 :b] [3 :c] [4 :d])`。见清单 2-16。


    ```

    (remove #(zero? (mod (first %) 3))

    (map vector (iterate inc 1) [:a :b :c :d]))

    ;; ([1 :a] [2 :b] [4 :d])

    清单 2-16.

    使用原始形式从集合中移除元素

    ```


    好的，我们有点偏离了重点。回到我们之前说的，第一个元素是 `[1 :a]`，在这种情况下，匿名函数可以通过 `%` 符号访问它。它检索数字 `1` 并将其除以
    `n`（在前面的例子中，这个数字是 `3`，它最初是作为参数传递给 `drop-nth` 的）。它进行这个计算是为了验证这些数字是否能被整除；如果能，那么结果将是零，并且谓词（即
    `zero?` 函数）将返回 `true`，这意味着该元素应该从集合中移除。


    集合中唯一能被整除并得到模数为零的元素是 `[3 :c]`。这意味着 `remove` 函数的整体结果是 `([1 :a] [2 :b] [4 :d])`。


    现在，我们已经成功移除了所需的元素。但我们仍然需要将我们的数据结构转换回其原始形式。为此，我们转到函数的最后一行 `(map second)`，它映射结果集合（该集合仍然是一个子向量集合——`([1
    :a] [2 :b] [4 :d])`），并通过专门检索“第二个”元素，从每个嵌套集合中移除第一个元素，从而返回一个修改后的版本。


    因此，第一个嵌套集合是 `[1 :a]`，这意味着 `(map second)` 将移除 1 并保留 `:a`。整个函数的结果是 `(:a :b :d)`，这正是我们最初想要的——能够从集合中移除一个既不是开头也不是结尾位置的特定元素。


    现在，当前 `drop-nth` 实现的一个问题是，它实际上会移除每一个第 n 个元素。所以，如果你执行 `(drop-nth 3 [:a :b :c :d
    :e :f :g :h :i :j])`，那么结果将是 `(:a :b :d :e :g :h :j)`。注意它不仅仅移除了第三个元素，而是移除了每一个第三个元素。这可能不是你希望发生的情况。


    解决方案是，记住问题是从集合中间移除单个值，将 `#(zero? (mod (first %) n))` 替换为 `#(= (first %) n)`，这将导致所有其他迭代失败，因为只有
    `3` 会“等于”第三个元素（注意我们将 `zero?` 谓词替换为了 `=` 函数）。


    在我们继续之前，除了使用 `remove`，我们还可以使用另一个名为 `filter` 的函数（我将在下一章演示 `filter`），但我认为从语义上讲 `remove`
    更有意义。这两个函数之间的唯一区别在于谓词的使用。


    `filter` 函数会在其谓词返回 `true` 时保留元素（该函数的语义是“过滤出我想要的元素”）。`remove` 函数会在其谓词返回 `false`
    时保留元素（该函数的语义是“移除通过测试的元素”）。

