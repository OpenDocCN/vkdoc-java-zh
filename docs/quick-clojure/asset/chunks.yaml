    \ tool called Leiningen. Up until this point, we’ve been exclusively playing around\
    \ within the REPL environment (thanks to Leiningen’s `lein repl` feature), but\
    \ we’ve reached the point now where we should be fairly confident writing Clojure\
    \ code, and so we need to consider how typical Clojure projects are created, structured,\
    \ and deployed, and this is where Leiningen really shines.\n\nTo demonstrate how\
    \ Leiningen constructs a project, we’ll look at building a simple “Hello World”\
    \ web application. What this application will do is serve requests for a page\
    \ that results in an HTML file being returned that displays the message “Hello\
    \ World.” As you can tell, this isn’t anything fancy, but it will highlight how\
    \ easy it is to create a simple static web page just by executing a few quick\
    \ shell commands.\n\nI’ll then proceed to explain how it all works, as well as\
    \ the various templates available within Leiningen and where to go from that point\
    \ onward as far as further reading and items of interest.\n\n> **Note**  \n> This\
    \ won’t be an in-depth discussion on the ins and outs of building complex web\
    \ applications because, quite frankly, entire books have been written on the subject,\
    \ and the requirements for every reader will be different.\n\n## Ten-second Example\n\
    \nThere’s no better way to get started than with a super quick, ten-second setup\
    \ that’ll demonstrate the elegance of a few simple commands’ resulting in a lot\
    \ of work and structural setup being automated away from our concern. There are\
    \ only four commands we need to run, which are as follows:\n\n* `lein new compojure-app\
    \ foo`\n* `cd foo`\n* `lein ring server-headless`\n* `curl localhost:3000 -i`\
    \ (or open your browser at `http://localhost:3000/`)\n\n> **Note**  \n> In Chapter\
    \ 1, we covered the installation of Leiningen, so please refer back to it if you\
    \ need to. I’m using macOS, and the following commands shouldn’t require any special\
    \ dependencies to be installed (other than Leiningen itself).\n\nThe result of\
    \ executing these commands can be seen in Listing 12-1. The preceding list of\
    \ commands could actually end up being one command shorter if we wanted by changing\
    \ the command `lein ring server-headless` into just `lein ring server`, which\
    \ would still start the web server as it did before, but now would automatically\
    \ open a web browser for us and point it to the correct local URL.\n\nIf you use\
    \ the “headless” server version (as just listed), you’ll need to open a separate\
    \ shell in order to execute the `curl` command, as your current shell will be\
    \ locked up while the server process is running.\n\n```\n$ lein new compojure-app\
    \ foo\nGenerating a lovely new Compojure project named foo...\n$ cd foo\n$ lein\
    \ ring server-headless\nfoo is starting\n2017-06-24 18:21:02.012:INFO:oejs.Server:jetty-7.6.13.v20130916\n\
    2017-06-24 18:21:02.072:INFO:oejs.AbstractConnector:Started SelectChannelConnector@0.0.0.0:3000\n\
    Started server on port 3000\nListing 12-1.\nOutput from Starting Compojure Web\
    \ Server\n```\n\n> **Note**  \n> The syntax structure for the command used in\
    \ Listing 12-1 is `lein new <template> <project-name>`. In this simple example,\
    \ we’re using a template called `compojure-app`. There are many templates available,\
    \ but this is a popular option for reasons we’ll soon discover.\n\nThe HTML generated\
    \ when visiting the Compojure web server (this was the `curl` command in our previous\
    \ example) that’s started when calling `lein ring` is shown in Listing 12-2. Ultimately,\
    \ we see a simple HTML page styled with a static CSS file called `screen.css`\
    \ and displaying a central message of `\"Hello World\"`.\n\n```\nHTTP/1.1 200\
    \ OK\nDate: Sat, 24 Jun 2017 17:41:31 GMT\nContent-Type: text/html;charset=UTF-8\n\
    Content-Length: 170\nServer: Jetty(7.6.13.v20130916)\n\nWelcome to foobarHello\
    \ World!\nListing 12-2.\nHTML Generated\n```\n\n## Help!\n\nBefore we take a look\
    \ at the example Compojure web application in more detail, it’s worth mentioning\
    \ that the Leiningen tool has a very good tutorial and help system built in. For\
    \ an introductory tutorial (which is definitely worth your time), execute the\
    \ command shown in Listing 12-3.\n\n```\nlein tutorial | less\nListing 12-3.\n\
    Leiningen’s Built-in Help Tutorial\n```\n\n> **Note**  \n> I pipe the tutorial\
    \ output into the `less` shell executable because the output from `lein tutorial`\
    \ is long and this will save you from having to scroll all the way back up to\
    \ the beginning.\n\nAny time you’re unsure of what a command does, refer to the\
    \ `help` command: `lein help <command>`. So, if (for example) you wanted to know\
    \ more about the creation of a new Leiningen project, you could run the command\
    \ `lein help new` and the output would show you things like what templates are\
    \ available for you to use, as well as how specific templates are created/resolved.\n\
    \n## Compojure\n\nCompojure is a routing library built on top of Ring. If you’ve\
    \ not heard of Ring, then I’ll quote directly from the Ring GitHub page in order\
    \ to explain it:\n\n> Ring is a Clojure web application library inspired by Python’s\
    \ WSGI and Ruby’s Rack. —Ring. GitHub\n\nNow, this doesn’t necessarily help you\
    \ if you’re equally unfamiliar with WSGI or Rack. In essence, what these two applications\
