    \ within another project/application as a dependency/library.\n\n```\n├── CHANGELOG.md\n\
    ├── LICENSE\n├── README.md\n├── doc\n│   ├── intro.md\n├── project.clj\n├── resources\n\
    ├── src\n│   ├── foo\n│       ├── core.clj\n├── test\n├── foo\n├── core_test.clj\n\
    Listing 12-14.\nTree Structure for the Leiningen “app” Template\n```\n\nWith this\
    \ difference in mind, if you were to now look at the contents of the `core.clj`\
    \ file within the `src` directory, you would see that its contents are slightly\
    \ different than the library template’s `core.clj` in that they define a `main`\
    \ function (prefixed with a hyphen: `defn –main)`. Also, at the top of that file\
    \ you’ll see that the `namespace` macro has included an extra configuration setting\
    \ of `(:gen-class)`. Lastly, the `project.clj` file itself has a `:main` attribute\
    \ that points to our `core.clj` file to indicate this is the file that should\
    \ be executed when the `lein run` command is executed.\n\nLet’s now briefly review\
    \ these three differences (`:main`, `-main`, and `gen-class`) to be sure we understand\
    \ their purposes. The `:main` attribute’s purpose is to notify Leiningen of the\
    \ entrypoint to your application, but you’ll likely have noticed there was an\
    \ extra attribute defined: `^:skip-aot`. What this does is skip Clojure’s “Ahead-of-Time”\
    \ (AOT) compilation step,[^(12)](#A453572_1_En_12_Chapter.html#Fn12) which can\
    \ be useful for speeding up your application’s startup by compiling the code into\
    \ JVM bytecode.\n\nConsidering AOT compilation can help performance, why might\
    \ we want to skip it? Well, in some cases your code might rely on input that you’ll\
    \ only know at runtime, and so if your code references an environment variable\
    \ (for example) that is not available at the point in time of compilation (let’s\
    \ say it’s only available on the server where the application is deployed), then\
    \ this would mean the compilation would change the code to use the value `nil`\
    \ for that environment variable wherever it’s referenced in the code.\n\nNote\n\
    \nThere are ways to solve these types of issues, but they’re outside the scope/focus\
    \ of this book.\n\nThe references to `(gen-class)` and the function `-main` are\
    \ used together as they’re intrinsically coupled. The `gen-class` tells Clojure’s\
    \ compiler to create a new Java class for your namespace, while `-main` defines\
    \ the behavior of that Java class.\n\nFinally, this all ties back in with the\
    \ use of the `:main` attribute in the `project.clj`, as it indicates there is\
    \ a Java class that should be used as the entrypoint for the application. I suggest\
    \ reading the reference material[^(13)](#A453572_1_En_12_Chapter.html#Fn13) to\
    \ learn more about these features ."
  trans: "\n## 模板\n\n在回顾 Leiningen 内置的各种模板（互联网上还能找到许多满足各类需求的其他模板）时，你会注意到一个现象：每个模板的树结构并没有太大差异。这既是好事（因为它提供了统一的工作基础），也是坏事（因为它让人难以区分不同模板的差异和适用场景）。\n\
    \n那么，总结一下我们目前所知的内容：Leiningen 使用模板的概念来动态构建新项目。它有一些内置模板，也有大量外部模板（比如我在十秒示例中使用的 Compojure\
    \ 模板）。目前（撰写本文时）共有四个独立的内置模板，如下所示：\n\n*   `template`：用于创建“lein new”模板的元模板\n*   `default`：用于库的通用项目模板\n\
    *   `app`：应用程序项目模板\n*   `plugin`：Leiningen 插件项目模板\n\n### template\n\n因此，列表中的第一个模板实际上是用于定义新模板的模板。我不打算介绍如何创建自己的模板，因为这超出了本书的范围，而且说实话，我自己也从未有过使用它们的需求，因为我遇到的几乎所有用例都已经被开源社区覆盖了。请参见清单\
    \ 12-12。\n\n```\n├── CHANGELOG.md\n├── LICENSE\n├── README.md\n├── project.clj\n\
    ├── resources\n│   └── leiningen\n│       └── new\n│           └── foo\n│    \
    \           └── foo.clj\n└── src\n└── leiningen\n└── new\n└── foo.clj\n清单 12-12.\n\
    Leiningen “template” 模板的树结构\n```\n\n话虽如此，你可能有一些必须用于所有工作相关项目的组织结构和依赖项，因此创建一个模板来简化和加速这个重复的繁琐过程可能会很有益处。\n\
    \n注意\n\n一个使用自有模板的组织示例是 ClojureWerks 的 lein-template 仓库。⁹\n\n在清单 12-12 中，我们可以看到模板应用程序的目录结构。这只是为了让我们与其他模板相比有一个参考框架（参见清单\
    \ 12-12）。这里快速提醒一下创建此项目所需的命令：`lein new template <name>`。\n\n注意\n\nLeiningen 提供了一份很棒/简短的官方文档，解释了创建自己模板的相关步骤。¹⁰\n\
    \n本质上，要使用一个新的模板项目，你需要将你的模板部署到 Clojars¹¹（这是 Clojure 社区驱动的库的开放/公共仓库）。如果你将仓库命名为类似\
    \ `<name>/lein-template` 的形式（其中 `<name>` 是你希望模板被引用的名称），那么 Clojure 开发者就可以执行 `lein\
    \ new <name> <project_name>`，这将使 Leiningen 在 Clojars 中搜索标题为 `<name>/lein-template`\
    \ 的模板项目。\n\n### default\n\n第二个模板（如前所述）用于通用库，而不是实际的应用程序。让我们看看它的目录结构（参见清单 12-13）。\n\
    \n```\n├── LICENSE\n├── README.md\n├── doc\n│   └── intro.md\n├── project.clj\n\
    ├── resources\n├── src\n│   └── \n│       └── core.clj\n└── test\n└── \n└── core_test.clj\n\
    清单 12-13.\nLeiningen “default” 模板的树结构\n```\n\n有两种方法可以生成默认项目。你可以显式指定，也可以隐式指定。如果显式指定，我们需要指定模板名称：`lein\
    \ new default <name>`。你也可以通过省略“default”部分来隐式指定。\n\n注意\n\n只要不存在名为 `<name>` 的模板，Leiningen\
    \ 就会假定你指定的是默认模板的项目名称。\n\n我们在清单 12-13 中看到的是它非常精简。如果我们查看 `project.clj`，会发现除了 Clojure\
    \ 本身之外没有其他依赖项，而 `core.clj` 也同样轻量，其中只包含一个函数。`core.clj` 中定义的函数以项目命名，它只是向标准输出（即终端屏幕）打印\
    \ `\"Hello World\"`。\n\n有趣的是，你会看到 `project.clj` 没有定义入口点（就像我们在 Compojure 模板的 `project.clj`\
    \ 中看到的那样）。这有助于强化一个概念：这个代码库不需要入口点，因为它预期会作为依赖库被加载到另一个代码库中，因此将通过 `ns` 宏来引用它。\n\n\
    ### app\n\n第三种模板类型是“app”，尽管它的目录结构（参见清单 12-14）与库模板相同，但其目的仅仅是执行一些通用代码。\n\n我们所说的通用代码是什么意思？嗯，你可以创建一个命令行应用程序，或者决定下载构建\
    \ Web 应用程序所需的相关依赖项（这将成为你的项目重点）。这与库模板有根本区别，库模板的目的是让代码作为依赖项/库被加载到另一个项目/应用程序中。\n\n\
    ```\n├── CHANGELOG.md\n├── LICENSE\n├── README.md\n├── doc\n│   ├── intro.md\n\
    ├── project.clj\n├── resources\n├── src\n│   ├── foo\n│       ├── core.clj\n├──\
    \ test\n├── foo\n├── core_test.clj\n清单 12-14.\nLeiningen “app” 模板的树结构\n```\n\n\
    考虑到这种差异，如果你现在查看 `src` 目录下的 `core.clj` 文件内容，你会发现其内容与库模板的 `core.clj` 略有不同，因为它定义了一个\
    \ `main` 函数（以连字符为前缀：`defn –main`）。此外，在该文件的顶部，你会看到 `namespace` 宏包含了一个额外的配置设置 `(:gen-class)`。最后，`project.clj`\
    \ 文件本身有一个 `:main` 属性，指向我们的 `core.clj` 文件，以表明这是执行 `lein run` 命令时应执行的文件。\n\n现在让我们简要回顾一下这三个不同之处（`:main`、`-main`\
    \ 和 `gen-class`），以确保我们理解它们的目的。`:main` 属性的作用是通知 Leiningen 应用程序的入口点，但你可能会注意到还定义了一个额外的属性：`^:skip-aot`。它的作用是跳过\
    \ Clojure 的“提前编译”（AOT）步骤，¹² 通过将代码编译成 JVM 字节码，有助于加快应用程序的启动速度。\n\n考虑到 AOT 编译有助于提升性能，我们为什么可能想要跳过它呢？嗯，在某些情况下，你的代码可能依赖于只有在运行时才能知道的输入，因此如果你的代码引用了一个在编译时不可用的环境变量（例如，假设它只在部署应用程序的服务器上可用），那么这将意味着编译会将代码中引用该环境变量的所有地方都改为使用值\
    \ `nil`。\n\n注意\n\n有一些方法可以解决这类问题，但这超出了本书的范围/重点。\n\n对 `(gen-class)` 和函数 `-main`\
    \ 的引用是结合使用的，因为它们本质上是耦合的。`gen-class` 告诉 Clojure 编译器为你的命名空间创建一个新的 Java 类，而 `-main`\
    \ 则定义了该 Java 类的行为。\n\n最后，这一切都与 `project.clj` 中 `:main` 属性的使用相关联，因为它表明存在一个 Java\
    \ 类应被用作应用程序的入口点。我建议阅读参考资料¹³ 以了解更多关于这些特性的信息。\n"
- fmt: '### plugin


    The fourth template type is “plugin,” and this is useful for developing plugin
    code for your Clojure applications. An example of what a plugin can do is `lein-eastwood`,
    which is a Clojure code linting tool.


    In order to use a plugin (such as `lein-eastwood`) you’ll be required to update
    your `project.clj` file to reference the plugin (for example, adding `:plugins
    [[jonase/eastwood "0.2.4"]]`). Once you do that you’ll find the plugin is now
    made available as a subcommand of Leiningen and can execute code in the context
    of your project. In the case of `lein-eastwood`, it is able to review (i.e. lint)
    your code for common mistakes.


    Listing 12-15 shows a typical directory structure for a Leiningen plugin. To help
    give you an idea of what other type of behaviors plugins can offer, I recommend
    you sift through the official list of Leiningen plugins (of which there are many!).


    ```

    ├── LICENSE

    ├── README.md

    ├── project.clj

    ├── src

    ├── leiningen

    ├── .clj

    Listing 12-15.

    Tree Structure for the Leiningen “plugin” Template

    ```


    **Note:** Leiningen provides a good document on how to create your own plugins
    that is highly recommended.


    ## Project File


    One consistent item found across all these different projects/template types is
    the project file itself: `project.clj`. The main purpose of this file is to bootstrap
    your application. It does this by defining your project’s dependencies and pulling
    them down for you when you first run your project’s application code.


    The `project.clj` also allows you to associate metadata, such as a project description
    and URL, as well as define any plugins you wish to use (and many more things).


    For a complete list of configuration settings available, I would suggest reading
    through the Leiningen template example file, which explains every single setting
    available in great detail (and there are lots of them).


    Let’s take a look at the `project.clj` file for a generic Compojure “Hello World”
    application (like the one we created earlier) and see if we can get a better understanding
    of the different aspects of the configuration we’ve been given.


    ```

    (defproject compojure-foo "0.1.0-SNAPSHOT"

    :description "FIXME: write description"

    :url "http://example.com/FIXME"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [compojure "1.5.2"]

    [hiccup "1.0.5"]

    [ring-server "0.4.0"]]

    :plugins [[lein-ring "0.8.12"]]

    :ring {:handler compojure-foo.handler/app

    :init compojure-foo.handler/init

    :destroy compojure-foo.handler/destroy}

    :profiles

    {:uberjar {:aot :all}

    :production

    {:ring

    {:open-browser? false, :stacktraces? false, :auto-reload? false}}

    :dev

    {:dependencies [[ring-mock "0.1.5"] [ring/ring-devel "1.5.1"]]}})

    Listing 12-16.

    Compojure project.clj File

    ```


    In Listing 12-16, we can see we have some Clojure code that uses the `defproject`
    macro to construct the project’s bootstrap. It’s already set up with the name
    we provided when running `lein new...`, and it has defaulted the version of the
    application to `0.1.0-SNAPSHOT`. We can change this to any value we want when
    we come to release our application (e.g., you might want to change it to `1.0.0`
    or `0.0.1`).


    **Note:** Typically, the version format used here would suggest semantic versioning:
    `<Major>.<Minor>.<Patch>` while the use of `SNAPSHOT` is a Java version-naming
    convention.


    From there we have a standard `:description` field and an associated `:url` field
    so users know where the source code (or promotional branding) for the project
    can be located.


    We also have a `:dependencies` field (arguably one of the most important items
    in this file). For the Compojure application, we find the Compojure app template
    has automatically pre-filled in some useful dependencies for us:


    *   `org.clojure/clojure "1.8.0"` — the Clojure language

    *   `compojure "1.5.2"` — HTTP request routing library

    *   `hiccup "1.0.5"` — a library for rendering HTML

    *   `ring-server "0.4.0"` — web server for Ring interface


    **Note:** When you run Leiningen it will automatically pull down all your dependencies,
    but you can also do this manually at any point using the sub-command `lein deps`.


    Moving on, we have the `:plugins` setting, which has pulled in the plugin `lein-ring`
    and which is responsible for automating some common Ring-based tasks. This plugin
    adds an additional setting to the `project.clj` file and once specified we’re
    required to include the following attribute: `:ring {…configuration…}`.


    As we can see from the `project.clj` file itself, when the Compojure template
    is used it pre-fills the `:ring` attribute configuration automatically for us
    so that it knows where the main handler function can be located, as well as identifies
    functions for set-up and tear-down behaviors (which are no-op functions by default,
    meaning they are defined functions, but don’t have any behaviors defined).


    Following on from there, we see the `:profiles` setting. This allows us to define
    certain behavior dependent on the environment. So we can see there is a `:productions`
    attribute that defines how the application should behave in a production setting
    (e.g., we set `:auto-reload? false` as that type of behavior is only useful when
    developing your application code locally, and we also set `:stacktraces? false`
    as we want to hide that type of information from our users). Similarly, we have
    a `:dev` attribute where we specify dependencies that are only useful when developing
    locally.


    If you would like to learn more about these configuration options, then I’d advise
    you to review the `lein-ring` plugin’s GitHub page, which will be up-to-date with
    the latest details.


    **Note:** You can test your profiles locally by running your application using
    the `with-profile` option (e.g., `lein with-profile production run some_app`).


    ## compojure vs. compojure-app


    We created a “Hello World” example using `lein new compojure-app <name_of_app>`,
    and this provided us with lots of stuff for free, such as the handling of static
    assets and the serving up of some basic CSS to go along with our HTTP response.


    But we could have also used `lein new compojure <name_of_app>` (notice `compojure-app`
    is now just `compojure`), which would still provide us a simple web service like
    it did before, but now it is stripped back even further! This means no fancy HTML
    wrapped around our “Hello World” message, just plain text sent back to the browser.


    I recommend exploring the other differences between the two template types, but
    which template you choose ultimately depends on how comfortable you are setting
    up a lot of the tedious aspects of handling rich HTML responses. For most people,
    `compojure-app` is the simplest route to get up and running quickly and efficiently.'
