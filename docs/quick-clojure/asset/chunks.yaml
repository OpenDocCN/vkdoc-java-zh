    ### 谓词函数


    我想向你介绍一小部分与谓词相关的函数（请记住，谓词是一个返回布尔值 `true`/`false` 的函数）。我们要看的函数如下：


    *   `every?`

    *   `every-pred`

    *   `not-any?`

    *   `some`


    这些函数非常有用，因为处理数据时，你经常需要验证一组数据项是完全符合某个条件，还是只有部分符合（甚至只是其中任意一个值符合条件）。


    那么，我们先从 `every?` 函数开始。它接受一个谓词和一个集合，只有当集合中的所有数据项都通过谓词返回 `true` 时，它才会返回布尔值 `true`（否则
    `every?` 将返回 `false`）。清单 5-28 演示了这种行为。


    ```

    (every? even? [2 4 6]) ;; true

    (every? even? [1 4 6]) ;; false

    清单 5-28.

    every? 函数示例

    ```


    清单 5-28 中的示例有趣之处在于，你也可以将其他数据结构与 `every?` 一起使用，而不仅仅是你通常认为的那种函数。因此，你可以使用一个集合数据结构作为谓词，如果集合中的每个数据项也出现在该集合中，那么
    `every?` 将返回 `true`。或者，你也可以使用一个映射数据结构作为谓词，这意味着将检查集合中的每个数据项是否作为键出现在该映射中。


    注意


    还有一个 `not-every?` 函数，它的行为正好相反。我个人觉得它读起来非常令人困惑，以至于我认为使用它会损害代码的清晰度。我也从未有过使用它的需求，因为我很少需要知道一组数据项是否不匹配。尽管如此，它仍然是一个可供你使用的工具。


    函数式编程的核心在于组合单一职责的函数，而 `every-pred` 函数就是能够轻松组合逻辑检查的一个绝佳例子。它接受一个谓词函数列表，并返回一个函数。然后，可以将返回的函数应用于一组数据项，以检查它们是否通过了所有定义的谓词。同样，一个简单的例子将有助于澄清其用法（参见清单
    5-29）。


    ```

    ((every-pred number? odd?) 1 2 3) ;; false

    ((every-pred number? odd?) 1 3 5) ;; true

    清单 5-29.

    every-pred 函数示例

    ```


    刚才我提到 `not-every?` 函数有点令人困惑，因为对我来说，这种检查条件匹配的方向不如 `every?` 函数（以及使用 `not-every?`
    相比 `every?` 会让代码读者感到更困惑——至少对我来说是这样）那么有意义。现在，有一个 `not-any?` 函数，在我看来它和 `not-every?`
    属于同一类。清单 5-30 展示了一个用例。


    ```

    (not-any? odd? [2 4 6]) ;; true

    (not-any? odd? [1 3 5]) ;; false

    清单 5-30.

    not-any? 函数示例

    ```


    我之所以提到 `not-any?`（尽管我显然不喜欢 `not-` 类型的函数），是因为在即将发布的 Clojure 语言版本中（在撰写本文时，这可能是 `1.9`
    版本），核心库中将添加一个 `any?` 函数，我建议你在它变得更广泛可用后去了解一下。


    最后，我们来看看 `some` 函数，你偶尔会用到它。`some` 函数接受一个谓词和一个集合，如果提供的集合中至少有一个数据项通过了谓词检查，它将返回 `true`（否则
    `some` 将返回 `nil`）。清单 5-31 展示了一个示例。


    ```

    (some even? [1 3 5 7]) ;; nil

    (some even? [1 2 3 4]) ;; true

    清单 5-31.

    some 函数示例

    ```


    好的，在继续之前，有必要澄清一下，还有一个 `some?` 函数，但我认为它不如其他一些替代函数有用。它的作用是，如果提供的参数不是 `nil`，则返回 `true`。这个函数类似于另一个名为
    `nil?` 的函数的 `not-` 形式，在阅读代码时，我发现 `nil?` 函数更有用，也更容易理解。`nil?` 函数在提供的参数为 `nil` 时返回
    `true`，否则返回 `false`。


    注意


    还有一个 `false?` 函数，它专门检查 `false` 值：`(false? true) ;; false`


    ### 集合提取


    有一些简单的函数可以帮助减少访问集合中第一个（或多个）数据项时所需的一些样板代码。


    我们要看的第一个函数本身就叫 `first`，它的工作方式和你预期的一样：你给它一个集合，它会为你提取该集合中的第一个数据项。


    我们要看的另一个函数叫 `last`，它的工作方式同样和你预期的一样：你给它一个集合，它会提取该集合中的最后一个数据项。清单 5-32 展示了 `first`
    和 `last` 的示例。


    ```

    (first [:a :b :c]) ;; :a

    (last [:a :b :c]) ;; :c

    清单 5-32.

    first 和 last 函数示例

    ```


    注意


    `first` 和 `last` 函数返回提取的值，而 `rest` 和 `pop` 函数则移除第一个/最后一个值并返回修改后的集合。


    现在我们已经了解了如何提取第一个数据项，让我们看看如何进一步扩展这个思路，使用 `ffirst` 函数从第一个嵌套集合中提取第一个数据项。清单 5-33 展示了一个示例。


    ```

    (first [[1 2 3] :b :c])  ;; [1 2 3]

    (ffirst [[1 2 3] :b :c]) ;; 1

    清单 5-33.

    ffirst 函数示例

    ```


    我们还有一个 `fnext` 函数，它定位提供的集合中的第一个数据项，然后返回下一个数据项。不过，诚然，这是一个相当特定的用例，在大多数情况下，使用 `get`
    函数会更灵活。


    让我们考虑另外两个函数：`nnext` 和 `nfirst`。`nnext` 函数很有趣，它定位第一个数据项旁边的数据项，然后返回集合中剩余的数据项；而 `nfirst`
    函数则提取集合中的第一个数据项，然后返回减去第一个值后的嵌套集合。清单 5-34 展示了一个示例。


    ```

    (nnext [1 2 3 4 5 6]) ;; (3 4 5 6)

    (nfirst [[1 2 3] 4 5 6]) ;; (2 3)

    清单 5-34.

    nnext 和 nfirst 函数示例

    ```


    归根结底，这些函数在核心库中可用是很有趣的，但我确实质疑它们在代码清晰度方面的实用性。根据过去的经验，在别人的代码中看到这些函数时，不得不去查阅文档，这使得代码的流程难以理解。但我想，如果出现了合适的用例，那么这些函数可能是处理你所面对的数据结构的一个不错的快捷方式。

    '
- fmt: '### String Formatting


    String formatting is something I love having available in other languages and
    I feel like sometimes using `str` to concatenate different vars together isn’t
    sufficiently eloquent. So, this is where a function such as `format` comes in.
    See Listing [5-35](#A453572_1_En_5_Chapter.html#Par120), which demonstrates how
    to interpolate multiple data types into a single string.


    ```

    (format "Hello %s, I hear you''re %d years old"

    "Mark" 35)

    ;; "Hello Mark, I hear you''re 35 years old"

    Listing 5-35.

    Example of format Function

    ```


    In Listing [5-35](#A453572_1_En_5_Chapter.html#Par120), we can see we’re defining
    a string that has two “placeholders.” The first is `%s` (which indicates a string
    value), and the second is `%d` (which indicates a `numerical` value or digit).
    We then provide the values for those two placeholders as separate arguments.


    **Note:** Execute `(javadoc java.util.Formatter)` for full details of what formatting
    options you have available.


    ### Frequency


    When dealing with collections of items, you’ll need to identify how many times
    a certain value appears in the collection. Thankfully, Clojure makes this super
    easy to figure out by providing the `frequencies` function. See Listing [5-36](#A453572_1_En_5_Chapter.html#Par124).


    ```

    (frequencies [:a :a :b :c :c :d :e :c])

    ;; {:a 2, :b 1, :c 3, :d 1, :e 1}

    Listing 5-36.

    Example of frequencies Function

    ```


    In Listing [5-36](#A453572_1_En_5_Chapter.html#Par120), we can see from the output
    that we’re getting a map data structure returned, where each of the unique values
    is made into a key, and the value assigned to that key is the number of times
    that unique value appeared in the provided collection. In this case, we can see
    that `:a` appeared twice while `:c` appeared three times.


    ### Zipping Values


    The behavior of interleaving different items across multiple collections is known
    in other languages as a `zip` function (much like how a zip on the front of a
    pair of trousers would interleave individual pins).


    If you find yourself with two collections that you wish to “zip” together, then
    Clojure provides the `interleave` function, which accepts (at a minimum) two collections
    and then proceeds to combine each index together. See Listing [5-37](#A453572_1_En_5_Chapter.html#Par128)
    for an example.


    ```

    (interleave [:a :b :c] [:x :y :z])

    ;; (:a :x :b :y :c :z)

    (interleave [:a :x] [:b :y] [:c :z] [1 :d] [:e 2] [3 :f] [:g 4] [:h :i])

    ;; (:a :b :c 1 :e 3 :g :h :x :y :z :d 2 :f 4 :i)

    Listing 5-37.

    Examples of interleave Function

    ```


    You’ll need to be careful using the `interleave` function, because if you don’t
    provide an even number of collections, then the result isn’t as obvious as you
    might think (see Listing [5-38](#A453572_1_En_5_Chapter.html#Par131) for an example
    of this).


    **Note:** I’ve spaced Listing [5-38](#A453572_1_En_5_Chapter.html#Par131) out
    a little so it’s easier to see how the values are interleaved with each other.


    ```

    (interleave

    [:a :x]

    [:b :y]

    [:c :z]

    [ 1 :d]

    [:e  2]

    [ 3 :f]

    [:g  4])

    ;; (:a :b :c 1 :e 3 :g :x :y :z :d 2 :f 4)

    Listing 5-38.

    Example of interleave with Odd Number of Collections

    ```


    In Listing [5-38](#A453572_1_En_5_Chapter.html#Par131) we can see that we have
    seven collections, meaning that once we reach the seventh collection, we need
    to pair `:g` with the next available collection, which is now the first collection
    `[:a :x]`, as we haven’t provided an even set of collections to interleave it
    with. So, because of the odd number of collections, we see `:x` is placed after
    `:g`.


    Another issue occurs if you don’t provide the same number of items in both collections.
    If that happens, then from that index onward (in both collections) the items are
    omitted (see Listing [5-39](#A453572_1_En_5_Chapter.html#Par134)).


    ```

    (interleave [:a :b :c] [:x :y])

    ;; (:a :x :b :y)

    (interleave [:a :b] [:x :y :z])

    ;; (:a :x :b :y)

    Listing 5-39.

    Examples of interleave Function with Odd Number of Items

    ```


    So, we can see in Listing [5-39](#A453572_1_En_5_Chapter.html#Par134) that the
    second collection has no third item (`:z`) and so the resulting collection omits
    `:c` from the first collection. This helps to keep the resulting collection balanced.
    We can also see that this works the other way as well. In the second example,
    the second collection had more items than the first.


    Clojure also provides a function called `zipmap` that allows you to map values
    with keys (much like `interleave`, including the potential to lose data) but returns
    a map data structure instead of a list. See Listing [5-40](#A453572_1_En_5_Chapter.html#Par137).


    ```

    (zipmap [:a :b :c :d :e] [1 2 3 4 5])

    ;; {:a 1, :b 2, :c 3, :d 4, :e 5}

    Listing 5-40.

    Example of zipmap Function

    ```


    ### Interposing Values


    The `interpose` function is similar to `interleave` in the sense that it interjects
    values together, but it does this in a different way. For `interpose` we only
    provide it a single collection, along with a string that indicates the value to
    be interposed. Listing [5-41](#A453572_1_En_5_Chapter.html#Par139) demonstrates
    how `interpose` works.


    ```

    (interpose " - " [:a :b :c])

    ;; (:a " - " :b " - " :c)

    Listing 5-41.

    Example of interpose Function

    ```


    If you’re looking to have the result be a single continuous string, then you’ll
    be better off utilizing the `join` function from the `clojure.string` namespace,
    demonstrated in Listing [5-42](#A453572_1_En_5_Chapter.html#Par141).


    ```

    (clojure.string/join ", " [:a :b :c])

    ;; ":a, :b, :c"

    Listing 5-42.

    Example of clojure.string/join Function

    ```'
