    ## 附录 A：约定


    每种编程语言都有自己的约定，以确保对该语言编写的代码设计有共同的理解和一致性。由于存在语法相似的语系（例如 C 语言），一些约定也能够相当一致地跨不同编程语言迁移，因此这些约定在应用于多种语言时是有意义的。


    例如，如果您曾经编写过 `for` 循环（任何类型的），那么您很可能会知道变量标识符 `i`、`j` 和 `k` 被用作每个嵌套循环级别的字符（参见清单 A-1，该清单使用
    JavaScript 语言语法演示了一个 `for` 循环）。


    ```

    for (i = 0; i < condition; i++) {

    for (j = 0; j < condition; j++) {

    for (k = 0; k < condition; k++) {

    // 代码

    }

    }

    }

    清单 A-1.

    for 循环中 i、j 和 k 变量的示例

    ```


    注意


    `i`、`j` 和 `k` 通常用于以下几个原因（取决于您与谁交谈）：`i` 和 `j` 在数学中已经使用了很长时间，因此从数学到编程的过渡得以延续。在实际层面上，`i`
    有时被解释为整数（integer）的缩写，因此当需要嵌套级别时，从字母表开始向上移动到 `j`，然后是 `k` 是合理的。


    Clojure 也有类似的命名约定。


    ### 函数


    *   `f`、`g`、`h`：函数输入（注意与 `i`、`j`、`k` 的相似性，现在 `f` 代表函数）

    *   `n`：整数输入（通常表示大小）

    *   `i`：整数索引

    *   `x`、`y`：数字

    *   `s`：字符串输入

    *   `xs`：被视为 `x` 的复数形式或序列

    *   `coll`：一个集合（或序列）

    *   `pred`：一个谓词闭包

    *   `& more`：可变参数输入

    *   `*var*`：动态变量应包裹在星号中（也称为“耳罩”）


    ### 宏


    *   `expr`：一个表达式

    *   `body`：一个宏体

    *   `binding`：一个宏绑定向量

