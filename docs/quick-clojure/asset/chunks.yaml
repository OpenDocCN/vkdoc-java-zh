  raw: '### Basic I/O


    Clojure’s core library provides two functions for handling simple disk input/output
    (i/o): `slurp` and `spit`. The slurp function reads in data whereas the `spit`
    function writes out data.


    See Listing [5-51](#A453572_1_En_5_Chapter.html#Par169) for a demonstration that
    creates a new file and then reads it into the REPL multiple times. The first time
    we call `spit` we create the file initially. The second time, we use `:append
    true` to prevent recreating the file, and finally we call `spit` without `append`.
    We’ll see the file is overwritten with the new content.


    ```

    (spit "foo.txt" "abc") ;; returns nil, but creates foo.txt

    (slurp "foo.txt") ;; "abc"

    (spit "foo.txt" "xyz" :append true)

    (slurp "foo.txt") ;; "abcxyz"

    (spit "foo.txt" 123)

    (slurp "foo.txt") ;; "123"

    Listing 5-51.

    Examples of spit and slurp Functions

    ```


    Note


    The `slurp` function also provides an `:encoding` param that defines what encoding
    to use when reading the file.


    The `slurp` method is fine for reading a file if it can be contained simply within
    memory, but if we’re dealing with a very large file then there are some other
    options available to us, such as Java’s `BufferedReader` , which will allow us
    to read buffered lines as they’re being read.


    Listing [5-52](#A453572_1_En_5_Chapter.html#Par173) demonstrates how to use Java’s
    BufferedReader alongside the `with-open` function to open a text file.


    ```

    (with-open [rdr (java.io.BufferedReader. (java.io.FileReader. "foo.txt"))]

    (let [seq (line-seq rdr)]

    (print seq)))

    Listing 5-52.

    Example of with-open and Java’s BufferedReader

    ```


    So, there are a few things happening in Listing [5-52](#A453572_1_En_5_Chapter.html#Par173)
    that we should be aware of. First thing we’re doing is creating a Java FileReader
    instance, as that is a requirement for using a BufferedReader. The instance of
    `BufferedReader` is then assigned to the symbol `rdr`. From there, we can see
    that `rdr` is passed to the `with-open` macro, which acts like a context manager
    in that it will execute the body form internally within a `try`/`finally` form.


    The “body” in our example is the `let` form that binds the symbol `seq` to individual
    file lines that are passed to it from the `BufferedReader` . We can see that we
    call `line-seq` and pass it the `rdr` instance, which it will convert into a lazy
    sequence.


    The `with-open` function expects a list of items that it can call `.close` on
    from within the `finally` clause part of the `try`/`finally` form. In our example,
    it means we can be sure our `BufferedReader` will be closed upon completion.


    ## clojure.string


    The `clojure.string` namespace contains useful utilities for dealing with strings.
    As I’ve done with the `clojure.core` namespace, I’ll cover a small subset of functions
    that I think are worth highlighting.


    ### Checking for Whitespace


    A common task is to verify if some input is actually blank. That is to say, is
    the input nil or empty, or does it contain nothing by whitespace characters?


    Clojure already has an `empty?` function within the core namespace, but it only
    works with collections (not strings). If you need to verify this type of behavior
    with a string, then you need the `blank?` function (see Listing [5-53](#A453572_1_En_5_Chapter.html#Par180)).


    ```

    (clojure.string/blank? "") ;; true

    (clojure.string/blank? "    ") ;; true

    (clojure.string/blank? "    a") ;; false

    (clojure.string/blank? "123") ;; false

    Listing 5-53.

    Examples Demonstrating the blank? Function

    ```


    Note


    For the sake of simplicity I’m providing the fully qualified namespace path for
    the function. In practice, you’ll likely refer in the `blank?` function from the
    `clojure.string` namespace so your code would look more like: `(blank? "")`. We’ll
    see how to do this in a later chapter when we discuss namespaces in detail.


    ### Beginnings and Endings


    Another common task is the need to check whether a string starts and ends with
    a specific substring or character. For example, if dealing with a URL path you
    might want to check if the beginning of the string included a forward slash.


    Clojure’s `string` namespace provides two functions that let us verify this; they
    are the `starts-with?` and `ends-with?` functions. See Listing [5-54](#A453572_1_En_5_Chapter.html#Par184)
    for examples of both (notice though that they are case sensitive; we can side
    step this using regular expressions, but I’ll come back to that shortly).


    ```

    (clojure.string/starts-with? "I am a string" "g") ;; false

    (clojure.string/starts-with? "I am a string" "i") ;; false

    (clojure.string/starts-with? "I am a string" "I") ;; true

    (clojure.string/starts-with? "I am a string" "I am") ;; true

    (clojure.string/ends-with? "I am a string" "!") ;; false

    (clojure.string/ends-with? "I am a string" "G") ;; false

    (clojure.string/ends-with? "I am a string" "g") ;; true

    (clojure.string/ends-with? "I am a string" "string") ;; true

    Listing 5-54.

    Example of the starts-with? and ends-with? Functions

    ```


    Now, as you would have noticed, the functions demonstrated are case sensitive,
    and sometimes that can be an issue. One possible way to side-step that issue is
    to use a regular expression to pattern-match against. The discussion of regular
    expressions is outside the scope of this book, but I recommend visiting [`http://www.regular-expressions.info/`](http://www.regular-expressions.info/)
    if you’re interested learning more about the syntax and available features.


    For now, let’s try one of the examples that failed from Listing [5-54](#A453572_1_En_5_Chapter.html#Par184),
    checking if the string starts with an I or i, and then verify this using Clojure’s
    `re-find` function. In Listing [5-55](#A453572_1_En_5_Chapter.html#Par187), you’ll
    see that we compile our regex pattern using the syntax `#"..."`, where everything
    within the quotes is our pattern.


    ```

    (re-find #"(?i)^i" "I am a string")

    ;; "I"

    Listing 5-55.

    Example of the re-find function

    ```


    Note


    Clojure provides quite a few regex-related functions within its core namespace.
    I recommend searching through the documentation to locate them[³](#A453572_1_En_5_Chapter.html#Fn3)
    (they’re typically named `re-*`).


    In Listing [5-55](#A453572_1_En_5_Chapter.html#Par187) we can see the return value
    is the match itself. If we had used a regex pattern that didn’t match anything
    in the string, then the return value would have been be `nil`, meaning you could
    pass re-find as a value to Clojure’s `nil?` function and it would indicate if
    there was a match or not.


    One other item worth noting is the use of `(?i)` within our regex pattern. Although
    the concept it represents is provided by all flavors of regex engines, in this
    case it’s defining a “case-insensitive matching” flag, the actual syntax is syntax
    specific to Clojure. In other languages or regex engines you’ll typically see
    delimiters such as `/` used to wrap the pattern (e.g., `/my-pattern/`), whereas
    with Clojure we use `#"my-pattern"`.


    The flags for the regex pattern are then typically placed outside of the delimiter
    like so: `/my-pattern/i`. In Clojure we provide the flags inside the delimiters
    and at the beginning of the pattern instead.


    Note


    For more details on the inline flags and the various types of flags available,
    please refer to the Java documentation for its Pattern class[⁴](#A453572_1_En_5_Chapter.html#Fn4)
    (specifically “Embedded Flag Expressions”).'
