    # 2. Data Structures and Syntax


    Clojure provides a language API based upon a select set of data structures. What
    this means is that the syntax for certain programming functionality matches the
    underlying data structures.


    For example, here are the main data structures that Clojure provides:


    - List: `(1 2 3)`

    - Vector: `[1 2 3]`

    - Map: `{:foo "bar"}`

    - Set: `#{1 2 3}`


    Note


    There are other data structures, terminology, and related concepts, as well as
    a great reference guide, which can be found in the official Clojure documentation.[¹](#A453572_1_En_2_Chapter.html#Fn1)
    However, for the purposes of what we wish to cover in this chapter, it can be
    a little “low-level” at times, as it also discusses some of the underlying Java
    interfaces that Clojure utilizes.


    Clojure’s data structures are read-only (also referred to as being immutable),
    meaning that when you make a change to the values stored within the data structure,
    a new version of the data structure is returned. We’ll come back to this concept
    later on.


    All data structures can be mixed and nested. See Listing [2-1](#A453572_1_En_2_Chapter.html#Par13).


    ```

    [1 2 [3 {:name "Mark"}]]

    Listing 2-1.

    Example of Nested Data Structures

    ```


    Note


    You’ll see that there are no delimiters between individual elements. You can add
    them if you want, but they’re optional, and idiomatic Clojure code will typically
    omit them (e.g., `[1 2 3]` can be written as `[1, 2, 3]`).


    You can also refer to all these data structures as sequences. A sequence is an
    interface defined by Clojure, which allows multiple data structures that support
    the interface to share access to a set of built-in functions. We’ll cover the
    topic of sequences in more detail in a later chapter.


    There are many functions available within the Clojure programming language that
    are actually designed to work with multiple types of data structures. This isn’t
    something you see in many other languages, and consequently it affords us some
    great flexibility and adaptability in our code.


    Let’s now review each of these data structures in a little more depth and see
    which functions we can use from Clojure’s core library to manipulate them. We’ll
    start with the list data structure, as that has the most complexity around it.'
