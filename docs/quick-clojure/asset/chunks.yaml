  trans: "\n## 宏剖析\n\n至此，我们已经基本了解了可用于创建动态且健壮的宏特性的各个独立部分。现在，让我们通过分析一个更复杂的宏示例代码片段并理解其工作原理，来将这些知识融会贯通。\n\
    \nClojure 没有传统的 `for` 循环结构（这里所说的“传统”指的是像 C 语言这样的底层语言），在这种结构中，你需要指定一个起始值、一个条件和一个增量器，然后循环执行，直到指定的条件不再满足为止。\n\
    \n为了在 Clojure 语言中解决这个问题，让我们将这个缺失的结构实现为一个宏。我们即将定义的 `for-loop` 宏执行后，应该将数字零到九输出到\
    \ `stdout`（每行一个数字）。\n\n注意\n\n我建议你花足够的时间仔细研读清单 10-11，确保你能将目前学到的所有不同语法融会贯通。\n\n\
    ```\n(defmacro for-loop [[sym init check change] & steps]\n`(loop [∼sym ∼init\
    \ accumulated# nil]\n(if ∼check\n(let [new-value# (do ∼@steps)]\n(recur ∼change\
    \ new-value#))\naccumulated#)))\n(for-loop [i 0, (< i 10), (inc i)]\n(prn i))\n\
    清单 10-11.\n使用宏特性构建的自定义 for 循环结构\n```\n\n好的，让我们先看看我们是如何调用 `for-loop` 宏的。我们可以看到，我们传入了一个包含循环信息的向量：`[i\
    \ 0, (< i 10), (inc i)]`。后面跟着一个“主体”表达式 `(prn i)`，我们期望它在每次循环迭代时执行。\n\n注意\n\n如果我们愿意，我们可以传入多个主体表达式，让当前的宏实现来执行它们。但为了简单起见并演示基本功能，我们每次迭代只提供了一个待求值的形式。\n\
    \n在宏内部，我们将传入的向量解构（即，从传入的向量数据结构中提取每个元素）为以下局部绑定：\n\n*   `sym`：`i`\n*   `init`：`0`\n\
    *   `check`：`(< i 10)`\n*   `change`：`(inc 1)`\n\n我们还获取了剩余的参数 `(prn i)`，我们假定这些参数是每次迭代要执行的主体，并使用\
    \ `& steps` 将它们赋值给一个 `steps` 集合。这意味着它被构造成一个列表，如下所示：`((prn i))`。\n\n此时，我们开始定义宏的主体部分。概括来说，我们执行以下步骤：\n\
    \n*   创建一个 `loop`（作为后续 `recur` 的目标）。\n    *   将符号 `i` 绑定到值 `0`。\n    *   将动态生成的符号（即\
    \ `accumulated#`）绑定到值 `nil`。\n*   使用 `if` 语句检查局部变量 `i` 的值是否小于 `10`。\n    *   `check`\
    \ 条件是在运行时传入宏的（即 `(< i 10)`）。\n    *   初始时该值会小于 `10`，因为我们刚刚将其设置为 `0`（参见上一步）。\n\
    *   如果值大于或等于 `10`，那么 `else` 语句返回赋值给 `accumulated#` 的值。\n    *   稍后我们将看到 `accumulated#`\
    \ 如何在每次迭代中被更新为一个新值。\n*   如果值**确实**小于 `10`，那么我们就执行提供的主体表达式。\n    *   最后一个主体表达式的返回值被赋值给\
    \ `new-value#`。\n    *   然后我们使用 `recur` 跳回到 `loop` 的开头，并传入新值。\n    *   每次迭代传入的新值是执行\
    \ `change` 表达式（即 `(inc i)`）的结果。\n    *   然后，`accumulated#` 被传入当前赋值给 `new-value#`\
    \ 的值。\n\n从这些步骤中可以看出，解决方案的核心在于使用 `loop` 和 `recur` 来实现递归执行代码，并且在每次递归时，我们传入更新后的值，使得循环内的逻辑能够决定是继续递归还是停止。\n\
    \n实际上，理解宏的基础知识就是这些了。你现在应该已经掌握了足够的信息，可以去大展身手了……我是说，去创造灵感了！\n\n我还认为，我可能有必要说一句（尽管我已经在后悔了）：“能力越大，责任越大”；在\
    \ Clojure 中编写宏的语境下，这句话的意思是：使用宏会带来一些微妙的问题，尤其是在存在其他无需宏的解决方案时。如果你需要在编译时而不是运行时执行某些操作，那么，没问题，宏会有所帮助。但首先，请检查是否存在可以满足需求的标准函数。\n\
    \n注意\n\n你不能像使用标准函数那样，在代码中传递宏（例如，作为函数参数）。这最终意味着你会在代码设计中失去一些可组合性，而可组合性是函数式编程的一个基本原则。\n\
    \n## 总结\n\n在本章中，我们更深入地探讨了 Lisp 风格的语法，以帮助我们重新定义 Clojure 中可用的行为。这个概念（及其实现）非常强大，并且在核心库（以及其他标准\
    \ Clojure 命名空间）中有许多宏的例子。\n\n我建议在创建宏时从简单开始，并花相当多的时间研究现有 Clojure 实现的宏的源代码（同时也包括更广泛的\
    \ Clojure 社区创建的宏）。\n\n在下一章中，我们将重点介绍 Clojure 语言中可用的面向对象编程特性。请记住，Clojure 并非 100%\
    \ 严格的函数式语言（例如，不像 Haskell³ 编程语言那样）。虽然我们不会深入探讨如何将 Java 代码与 Clojure 集成，但 Clojure\
    \ 中可用的 OOP 特性与 Java 环境很好地结合在了一起。\n\n脚注 1\n\n[`​en.​wikipedia.​org/​wiki/​Progressive_​enhancement`](https://en.wikipedia.org/wiki/Progressive_enhancement)\n\
    \n  2\n\n[`​sweetjs.​org/​`](http://sweetjs.org/)\n\n  3\n\n[`​www.​haskell.​org/​`](https://www.haskell.org/)\n\
    \n# 11. 面向对象\n\nClojure 令人困惑的一个方面是，尽管它旨在成为一种函数式编程语言，但它也确实提供了“面向对象”的特性（惊讶吧）。这与其他编程语言类似，例如\
    \ Scala，¹ 它也同时提供了 FP 和 OOP 语法。\n\n何时在 Clojure 中使用 OOP 是一个棘手的讨论点，它取决于你所从事项目的需求，因此我们不会对此发表任何武断的言论。不过，就我个人而言，我喜欢我们即将看到的一些项目的结构方面，并且使用特定类型来帮助构建不同系统之间的边界也很有价值。\n\
    \n归根结底，Clojure 中的 OOP 特性并不像其他语言中那样突出，而且绝对远不及 Scala 中的那么多，Scala 似乎旨在实现一种均衡的划分。\n\
    \n在本章中，我将介绍一个（小）精选的特性组，具体如下：\n\n*   `defprotocol`\n*   `deftype`\n*   `defrecord`\n\
    *   `reify`\n\n## Java 互操作\n\n在 Clojure 中使用面向对象特性时，你最终会发现每个特性都有其特定的细微差别，这些差别将其与\
    \ Clojure 用作宿主环境的底层 Java 语言/虚拟机联系起来。\n\n如果你计划使用 OOP 或与 Java 库交互，那么我建议你既阅读 Clojure\
    \ 关于与 Java 互操作主题的说明²，也查阅本章中描述的宏/函数的文档，因为它们会更详细地介绍 Clojure 内部如何处理不同的项目（有许多底层配置细节可能对某些读者感兴趣，但通常超出了本书的范围）。\n"
- fmt: "# `defprotocol`\n\n`defprotocol`宏与以下两种面向对象类型（`defrecord`和`deftype`）一起使用，其主要目的是创建一个接口。\n\
    \n如果你不熟悉接口的概念，它的作用是定义一个契约，所有声称支持特定接口的对象都必须保证提供该契约所规定的内容。\n\n```\n(defprotocol\
    \ Foo\n  (bar [this abc])\n  (baz [this] [this abc]))\n```\n\n在清单11-1中，我们首先定义了一个名为`Foo`的新协议（使用`defprotocol`宏）。在这个块中，我们定义了两个方法：`bar`和`baz`。这意味着任何声称支持此接口的对象都必须为指定的函数及其特定的签名提供实现。\n\
    \n`bar`方法接受两个参数。第一个参数是`this`，它应该是我们调用`bar`方法的对象实例（因此，我们使用了传统的命名约定`this`，这在许多编程语言（如Java）中都能看到），而第二个参数是`abc`。\n\
    \n`baz`方法也有类似的定义。唯一的区别是该方法具有“多重参数数量”，这意味着它可以用一个或两个参数调用，并且我们可以根据调用方法时提供的参数数量定义两种不同的行为。\n\
    \n注意\n\n`definterface`是一个与`defprotocol`类似的功能。区别在于前者会生成一个实际的接口`.class`文件，Java可以利用它来将有效的对象传递给Clojure函数。\n\
    \n单独使用`defprotocol`并不是很有用，所以让我们进入下一节，看看它如何被很好地利用。\n\n# `deftype`\n\n为了能够使用我们定义的协议（即接口），我们需要一个具体的对象（类实例）来分配给它。这就是`deftype`和`defrecord`宏发挥作用的地方。\n\
    \n`deftype`和`defrecord`都会创建一个对象，但使用哪一个取决于微妙的实现细节。例如，`deftype`宏创建一个基本的Java类实例，允许进一步的Java互操作和内部数据字段的修改。然而，`defrecord`（详见下一节）的行为更像一个简单的不可变哈希映射。\n\
    \n```\n(deftype Qux [data]\n  Foo\n  (bar [this args]\n    (prn (str \"hello \"\
    \ (subs (str (class this)) 6)\n              \" from bar! I've been given: \"\
    \ args)))\n  (baz [this]\n    (prn (class this) data))\n  (baz [this args]\n \
    \   (prn (str \"hello \" (subs (str (class this)) 6)\n              \" from baz!\
    \ I've been given: \" args))))\n```\n\n好的，清单11-2中有很多内容，让我们将其分解成几个部分。首先，我们可以看到我们定义了一个名为`Qux`的新类型，并指定它接受一个名为`data`的构造函数参数。\n\
    \n`deftype`的目的是最终生成一个行为类似于典型Java类的类型，因此在下面的示例（清单11-3）中，我们将看到当我们初始化这个类型（类）时，我们能够将自己的特定数据传递给构造函数（随后在`baz`方法内部引用这些数据）。\n\
    \n当我们定义行为（即方法`bar`和`baz`）时，我们可以看到我们指定了第一个预期参数是对象实例本身。这是因为该类型使用了一种动态分派形式（我们在第7章中学习过这个概念），因此它需要知道将行为分派到哪个类型。我们将在清单11-3中看到这一点。\n\
    \n注意\n\n在Clojure中，你不必为协议定义的每个方法都定义行为。这似乎与其他基于面向对象的语言的工作方式相冲突（例如，通常在使用接口时，你同意实现其整个契约，因此你应该为所有指定的方法定义行为）。但Clojure并非如此。\n\
    \n```\n(let [b (Qux. \"bing bop\")]\n  (.baz b)\n  (.bar b \"x\")\n  (.baz b \"\
    y\"))\n;; user.Qux \"bing bop\"\n;; \"hello user.Qux from bar! I've been given:\
    \ x\"\n;; \"hello user.Qux from baz! I've been given: y\"\n```\n\n在清单11-3中，我们可以看到我们使用语法`(ClassName.\
    \ args)`初始化了类型（构造函数），在我们的示例中是`(Qux. \"bing bop\")`。然后我们将返回的对象实例赋值给`b`这个`let`变量，之后我们使用语法结构`(.methodName\
    \ objectInstance args)`调用每个后续方法（包括不同的参数数量变体），例如`(.bar b \"x\")`。"
  raw: '## defprotocol


    The `defprotocol` macro is used alongside both of the following OOP types (`defrecord`
    and `deftype`), and its primary purpose is to create an interface.


    If you’re unfamiliar with the concept of an interface, its purpose is to define
    a contract that all objects guarantee to provide if they state their support of
    the specific interface.


    ```

    (defprotocol Foo

    (bar [this abc])

    (baz [this] [this abc]))

    Listing 11-1.

    Simple Interface Example with defprotocol

    ```


    In Listing [11-1](#A453572_1_En_11_Chapter.html#Par15), we start by defining a
    new protocol called `Foo` (using the `defprotocol` macro). Within this block,
    we define two methods, `bar` and `baz`. This means any object that claims to support
    this interface must provide implementations for the specified functions along
    with their specific signatures.


    The `bar` method accepts two arguments. The first is a parameter called `this`,
    and it should be the object instance we’re calling the `bar` method upon (hence,
    we’ve used the traditional naming convention of `this`, as seen in many programming
    languages, such as Java), while the second argument is a parameter called `abc`.


    We see a similar definition for the `baz` method . The only difference is that
    this method has “multiple arity,” meaning that it can be called with either one
    or two arguments and we can define two separate behaviors depending on the number
    of arguments provided when calling the method.


    Note


    `definterface` is a similar feature to `defprotocol`. The difference is that the
    former generates an actual interface `.class` that Java can utilize in order to
    pass valid objects to Clojure functions.


    By itself, `defprotocol` isn’t very useful, so let’s move on to the next section,
    where we can see it being put to good use.


    ## deftype


    For us to be able to use the protocol (i.e., interface) we’ve defined, we’ll need
    a concrete object (class instance) we can assign it to. This is where the macros
    `deftype` and `defrecord` come into focus.


    Both `deftype` and `defrecord` will create an object, but which one you use will
    depend on subtle implementation details. For example, the `deftype` macro creates
    a bare-bones Java class instance that will allow for further Java inter-op and
    mutating of the internal data fields. However, `defrecord` (see the next section
    for more details) will act more like a simple immutable hash map.


    ```

    (deftype Qux [data]

    Foo

    (bar [this args]

    (prn (str "hello " (subs (str (class this)) 6)

    " from bar! I''ve been given: " args)))

    (baz [this]

    (prn (class this) data))

    (baz [this args]

    (prn (str "hello " (subs (str (class this)) 6)

    " from baz! I''ve been given: " args))))

    Listing 11-2.

    Example of Using deftype

    ```


    OK, there’s a lot going on in Listing [11-2](#A453572_1_En_11_Chapter.html#Par23),
    so let’s break this down into chunks. First, we can see that we’ve defined a new
    type called `Qux` and specified that it accepts a single constructor argument
    called `data`.


    The purpose of `deftype` is to ultimately produce a type that acts a lot like
    a typical Java class, and so in the following example (Listing [11-3](#A453572_1_En_11_Chapter.html#Par28))
    we’ll see that when we initialize this type (class) we are able to pass in our
    own specific data to the constructor (which subsequently is referenced from inside
    the `baz` method).


    When we define the behavior (i.e., the methods `bar` and `baz`), we can see that
    we’ve specified that the first expected argument is to be the object instance
    itself. This is because the type uses a form of dynamic dispatch (we learned about
    this concept back in Chapter [7](#A453572_1_En_7_Chapter.html)), and so it needs
    to know which type to dispatch the behavior to. We’ll see this demonstrated in
    Listing [11-3](#A453572_1_En_11_Chapter.html#Par28).


    Note


    In Clojure, you don’t have to define behavior for every method the protocol defines.
    This seems to conflict with how other OO-based languages work (e.g., typically
    when using an interface, you’re agreeing to implement its entire contract, and
    so you should define behavior for all the specified methods). That’s not the case
    with Clojure.


    ```

    (let [b (Qux. "bing bop")]

    (.baz b)

    (.bar b "x")

    (.baz b "y"))

    ;; user.Qux "bing bop"

    ;; "hello user.Qux from bar! I''ve been given: x"

    ;; "hello user.Qux from baz! I''ve been given: y"

    Listing 11-3.

    Calling Our Qux Type (Defined by deftype)

    ```


    In Listing [11-3](#A453572_1_En_11_Chapter.html#Par28), we can see that we’ve
    initialized the type (constructor) using the syntax `(ClassName. args),` which
    in our example was `(Qux. "bing bop")`. We then assign the returned object instance
    to the `b` let variable, after which we call each subsequent method (including
    the different arity variations) using the syntax structure of `(.methodName objectInstance
    args)`, one example being `(.bar b "x")`.'
