    \ (built for two uniquely different languages), it means if you’re familiar with\
    \ one of them, then the other will be recognizable (and understandable) to you\
    \ as well. Ring supports a similar interface to WSGI and Rack, and this gives\
    \ developers reassurance that working with Ring should feel natural to them.\n\
    \nTo understand this interface a little better, let’s take a look at what a typical\
    \ “Hello World” HTTP request/response looks like from the point of view of Ruby’s\
    \ Rack (see Listing 12-4).\n\n```\n[200, { 'Content-Type' => 'text/html' }, ['Hello\
    \ World!']]\nListing 12-4.\nExample of Ruby’s Rack Interface\n```\n\nWhat we can\
    \ see in Listing 12-4 is the relevant Ruby code required to send back a HTTP response.\
    \ Now, the code syntax isn’t something you have to worry too much about, although\
    \ you will find that the data structures are very familiar, so it should be readable\
    \ to you at this point.\n\nWhat we have defined is an array (i.e., vector), and\
    \ within it are a few basic things required for us to fulfill the interface necessary\
    \ to send back an HTTP response:\n\n* Status Code: `200`\n* HTTP Headers: `{ 'Content-Type'\
    \ => 'text/html' }`\n* Response Body: `'Hello World!'`\n\nIf you look at Listing\
    \ 12-5, you’ll see what this constructed HTTP response would look like from the\
    \ perspective of a Clojure program. It’s almost identical, and so you’ll start\
    \ to see how having a standardized interface can be helpful and useful across\
    \ languages.\n\n```\n{:status 200\n:headers {\"Content-Type\" \"text/html\"}\n\
    :body \"Hello World\"}\nListing 12-5.\nExample of HTTP Response in Clojure\n```\n\
    \nThere are more settings we could add to this data structure, but a status code,\
    \ a set of HTTP headers (for example, you would very likely want to configure\
    \ things like cache control headers), and a response “body” are all you really\
    \ need.\n\n> **Note**  \n> Further reading about Ring and Compojure can be found\
    \ on their respective GitHub Wiki pages."
  raw: '# 12. Leiningen


    In this chapter, I want to talk about the Clojure project-automation tool called
    Leiningen .[¹](#A453572_1_En_12_Chapter.html#Fn1) Up until this point, we’ve been
    exclusively playing around within the REPL environment (thanks to Leiningen’s
    `lein repl` feature), but we’ve reached the point now where we should be fairly
    confident writing Clojure code, and so we need to consider how typical Clojure
    projects are created, structured, and deployed, and this is where Leiningen really
    shines.


    To demonstrate how Leiningen constructs a project, we’ll look at building a simple
    “Hello World” web application. What this application will do is serve requests
    for a page that results in an HTML file being returned that displays the message
    “Hello World.” As you can tell, this isn’t anything fancy, but it will highlight
    how easy it is to create a simple static web page just by executing a few quick
    shell commands.


    I’ll then proceed to explain how it all works, as well as the various templates
    available within Leiningen and where to go from that point onward as far as further
    reading and items of interest.


    Note


    This won’t be an in-depth discussion on the ins and outs of building complex web
    applications because, quite frankly, entire books have been written on the subject,
    and the requirements for every reader will be different.


    ## Ten-second Example


    There’s no better way to get started than with a super quick, ten-second setup
    that’ll demonstrate the elegance of a few simple commands’ resulting in a lot
    of work and structural setup being automated away from our concern. There are
    only four commands we need to run, which are as follows:


    *   `lein new compojure-app foo`

    *   `cd foo`

    *   `lein ring server-headless`

    *   `curl localhost:3000 -i` (or open your browser at `http://localhost:3000/`)


    Note


    In Chapter [1](#A453572_1_En_1_Chapter.html), we covered the installation of Leiningen,
    so please refer back to it if you need to. I’m using macOS, and the following
    commands shouldn’t require any special dependencies to be installed (other than
    Leiningen itself).


    The result of executing these commands can be seen in Listing [12-1](#A453572_1_En_12_Chapter.html#Par15).
    The preceding list of commands could actually end up being one command shorter
    if we wanted by changing the command `lein ring server-headless` into just `lein
    ring server`, which would still start the web server as it did before, but now
    would automatically open a web browser for us and point it to the correct local
    URL.


    If you use the “headless” server version (as just listed), you’ll need to open
    a separate shell in order to execute the `curl` command, as your current shell
    will be locked up while the server process is running.


    ```

    $ lein new compojure-app foo

    Generating a lovely new Compojure project named foo...

    $ cd foo

    $ lein ring server-headless

    foo is starting

    2017-06-24 18:21:02.012:INFO:oejs.Server:jetty-7.6.13.v20130916

    2017-06-24 18:21:02.072:INFO:oejs.AbstractConnector:Started SelectChannelConnector@0.0.0.0:3000

    Started server on port 3000

    Listing 12-1.

    Output from Starting Compojure Web Server

    ```


    Note


    The syntax structure for the command used in Listing [12-1](#A453572_1_En_12_Chapter.html#Par15)
    is `lein new <template> <project-name>`. In this simple example, we’re using a
    template called `compojure-app`. There are many templates available, but this
    is a popular option for reasons we’ll soon discover.


    The HTML generated when visiting the Compojure web server (this was the `curl`
    command in our previous example) that’s started when calling `lein` `ring` is
    shown in Listing [12-2](#A453572_1_En_12_Chapter.html#Par18). Ultimately, we see
    a simple HTML page styled with a static CSS file called `screen.css` and displaying
    a central message of `"Hello World"`.


    ```

    HTTP/1.1 200 OK

    Date: Sat, 24 Jun 2017 17:41:31 GMT

    Content-Type: text/html;charset=UTF-8

    Content-Length: 170

    Server: Jetty(7.6.13.v20130916)


    Welcome to foobarHello World!

    Listing 12-2.

    HTML Generated

    ```


    ## Help!


    Before we take a look at the example Compojure web application in more detail,
    it’s worth mentioning that the Leiningen tool has a very good tutorial and help
    system built in. For an introductory tutorial (which is definitely worth your
    time), execute the command shown in Listing [12-3](#A453572_1_En_12_Chapter.html#Par20).


    ```

    lein tutorial | less

    Listing 12-3.

    Leiningen’s Built-in Help Tutorial

    ```


    Note


    I pipe the tutorial output into the `less` shell executable because the output
    from `lein tutorial` is long and this will save you from having to scroll all
    the way back up to the beginning.


    Any time you’re unsure of what a command does, refer to the `help` command: `lein
    help <command>`. So, if (for example) you wanted to know more about the creation
    of a new Leiningen project, you could run the command `lein help new` and the
    output would show you things like what templates are available for you to use,
    as well as how specific templates are created/resolved.


    ## Compojure


    Compojure[²](#A453572_1_En_12_Chapter.html#Fn2) is a routing library built on
    top of Ring.[³](#A453572_1_En_12_Chapter.html#Fn3) If you’ve not heard of Ring,
    then I’ll quote directly from the Ring GitHub page in order to explain it:


    > Ring is a Clojure web application library inspired by Python’s WSGI and Ruby’s
    Rack. —Ring. GitHub


    Now, this doesn’t necessarily help you if you’re equally unfamiliar with WSGI
    or Rack. In essence, what these two applications share is a standardized interface.
    So even though they’re separate applications (built for two uniquely different
    languages), it means if you’re familiar with one of them, then the other will
    be recognizable (and understandable) to you as well. Ring supports a similar interface
    to WSGI and Rack, and this gives developers reassurance that working with Ring
    should feel natural to them.


    To understand this interface a little better, let’s take a look at what a typical
    “Hello World” HTTP request/response looks like from the point of view of Ruby’s
    Rack (see Listing [12-4](#A453572_1_En_12_Chapter.html#Par30)).


    ```

    [200, { ''Content-Type'' => ''text/html'' }, [''Hello World!'']]

    Listing 12-4.

    Example of Ruby’s Rack Interface

    ```


    What we can see in Listing [12-4](#A453572_1_En_12_Chapter.html#Par30) is the
    relevant Ruby code required to send back a HTTP response. Now, the code syntax
    isn’t something you have to worry too much about, although you will find that
    the data structures are very familiar, so it should be readable to you at this
    point.


    What we have defined is an array (i.e., vector), and within it are a few basic
    things required for us to fulfill the interface necessary to send back an HTTP
    response:


    *   Status Code: `200`

    *   HTTP Headers: `{ ''Content-Type'' => ''text/html'' }`

    *   Response Body: `''Hello World!''`


    If you look at Listing [12-5](#A453572_1_En_12_Chapter.html#Par37), you’ll see
    what this constructed HTTP response would look like from the perspective of a
    Clojure program. It’s almost identical, and so you’ll start to see how having
    a standardized interface can be helpful and useful across languages .


    ```

    {:status 200

    :headers {"Content-Type" "text/html"}

    :body "Hello World"}

    Listing 12-5.

    Example of HTTP Response in Clojure

    ```


    There are more settings we could add to this data structure, but a status code,
    a set of HTTP headers (for example, you would very likely want to configure things
    like cache control headers ), and a response “body” are all you really need.


    Note


    Further reading about Ring[⁴](#A453572_1_En_12_Chapter.html#Fn4) and Compojure[⁵](#A453572_1_En_12_Chapter.html#Fn5)
    can be found on their respective GitHub Wiki pages.'
  trans: '

    # 12. Leiningen


    在本章中，我想介绍一个名为 Leiningen 的 Clojure 项目自动化工具。¹ 到目前为止，我们一直在 REPL 环境中进行练习（这要归功于 Leiningen
    的 `lein repl` 功能），但现在我们已经到了应该能够相当自信地编写 Clojure 代码的阶段，因此我们需要考虑典型的 Clojure 项目是如何创建、构建和部署的，而这正是
    Leiningen 大显身手的地方。


    为了演示 Leiningen 如何构建一个项目，我们将构建一个简单的“Hello World”Web 应用程序。这个应用程序的作用是处理页面请求，并返回一个显示“Hello
    World”消息的 HTML 文件。如你所见，这并不复杂，但它将突出显示只需执行几个快速的 shell 命令就能创建一个简单的静态网页是多么容易。


    然后，我将继续解释这一切是如何工作的，以及 Leiningen 中可用的各种模板，并指出从这一点出发，可以进一步阅读哪些内容以及有哪些值得关注的项目。


    注意


    这不会是对构建复杂 Web 应用程序的深入讨论，因为坦率地说，关于这个主题已经写了很多本书，而且每个读者的需求都会有所不同。


    ## 十秒示例


    没有什么比一个超快速的十秒设置更好的入门方式了，它将展示几个简单命令的优雅之处，这些命令可以自动完成大量工作和结构设置，从而让我们无需操心。我们只需要运行四个命令，如下所示：


    *   `lein new compojure-app foo`

    *   `cd foo`

    *   `lein ring server-headless`

    *   `curl localhost:3000 -i`（或在浏览器中打开 `http://localhost:3000/`）


    注意


    在第 1 章中，我们介绍了 Leiningen 的安装，如果需要，请参考该章节。我使用的是 macOS，以下命令不需要安装任何特殊的依赖项（除了 Leiningen
    本身）。


    执行这些命令的结果可以在清单 12-1 中看到。如果我们愿意，前面的命令列表实际上可以缩短一个命令，只需将命令 `lein ring server-headless`
    改为 `lein ring server`，它仍然会像以前一样启动 Web 服务器，但现在会自动为我们打开一个 Web 浏览器并将其指向正确的本地 URL。


    如果你使用“无头”服务器版本（如上所列），你需要打开另一个 shell 来执行 `curl` 命令，因为当服务器进程运行时，你当前的 shell 将被锁定。


    ```

    $ lein new compojure-app foo

    正在生成一个名为 foo 的漂亮新 Compojure 项目...

    $ cd foo

    $ lein ring server-headless

    foo 正在启动

    2017-06-24 18:21:02.012:INFO:oejs.Server:jetty-7.6.13.v20130916

    2017-06-24 18:21:02.072:INFO:oejs.AbstractConnector:Started SelectChannelConnector@0.0.0.0:3000

    服务器已在端口 3000 上启动

    清单 12-1.

    启动 Compojure Web 服务器的输出

    ```


    注意


    清单 12-1 中使用的命令的语法结构是 `lein new <模板> <项目名称>`。在这个简单的示例中，我们使用了一个名为 `compojure-app`
    的模板。有很多可用的模板，但这是一个流行的选择，原因我们很快就会知道。


    访问 Compojure Web 服务器（这是我们之前示例中的 `curl` 命令）时生成的 HTML 如清单 12-2 所示，该服务器是在调用 `lein
    ring` 时启动的。最终，我们看到一个简单的 HTML 页面，它使用一个名为 `screen.css` 的静态 CSS 文件进行样式设置，并显示一条居中的消息
    `"Hello World"`。


    ```

    HTTP/1.1 200 OK

    日期: Sat, 24 Jun 2017 17:41:31 GMT

    内容类型: text/html;charset=UTF-8

    内容长度: 170

    服务器: Jetty(7.6.13.v20130916)


    欢迎来到 foobarHello World!

    清单 12-2.

    生成的 HTML

    ```


    ## 帮助！


    在我们更详细地查看 Compojure Web 应用程序示例之前，值得一提的是，Leiningen 工具内置了一个非常好的教程和帮助系统。对于入门教程（绝对值得你花时间），请执行清单
    12-3 中所示的命令。


    ```

    lein tutorial | less

    清单 12-3.

    Leiningen 内置的帮助教程

    ```


    注意


    我将教程输出通过管道传输到 `less` shell 可执行文件中，因为 `lein tutorial` 的输出很长，这样可以避免你一直滚动回开头。


    任何时候你不确定某个命令的作用，都可以参考 `help` 命令：`lein help <命令>`。因此，如果（例如）你想了解更多关于创建新 Leiningen
    项目的信息，可以运行命令 `lein help new`，输出将显示诸如哪些模板可供你使用，以及特定模板是如何创建/解析的等信息。


    ## Compojure


    Compojure² 是一个构建在 Ring³ 之上的路由库。如果你没有听说过 Ring，那么我将直接引用 Ring GitHub 页面上的话来解释它：


    > Ring 是一个受 Python 的 WSGI 和 Ruby 的 Rack 启发的 Clojure Web 应用程序库。 —Ring. GitHub


    现在，如果你同样不熟悉 WSGI 或 Rack，这不一定对你有帮助。本质上，这两个应用程序共享的是一个标准化的接口。因此，即使它们是独立的应用程序（为两种截然不同的语言构建），这也意味着如果你熟悉其中一个，那么另一个对你来说也将是可识别（且可理解）的。Ring
    支持与 WSGI 和 Rack 类似的接口，这给开发者带来了信心，让他们觉得使用 Ring 应该很自然。


    为了更好地理解这个接口，让我们从 Ruby 的 Rack 的角度来看一个典型的“Hello World”HTTP 请求/响应是什么样的（见清单 12-4）。


    ```

    [200, { ''Content-Type'' => ''text/html'' }, [''Hello World!'']]

    清单 12-4.

    Ruby 的 Rack 接口示例

    ```


    我们在清单 12-4 中看到的是发送 HTTP 响应所需的 Ruby 代码。现在，你不需要太担心代码语法，尽管你会发现数据结构非常熟悉，所以此时它应该对你来说是可读的。


    我们定义的是一个数组（即向量），其中包含了一些满足发送 HTTP 响应所需接口的基本内容：


    *   状态码：`200`

    *   HTTP 头：`{ ''Content-Type'' => ''text/html'' }`

    *   响应体：`''Hello World!''`


    如果你查看清单 12-5，你会看到从 Clojure 程序的角度来看，这个构建的 HTTP 响应是什么样子的。它几乎完全相同，因此你将开始看到拥有一个标准化接口如何在跨语言时有所帮助和用处。


    ```

    {:status 200

    :headers {"Content-Type" "text/html"}

    :body "Hello World"}

    清单 12-5.

    Clojure 中的 HTTP 响应示例


    ```


    我们可以向这个数据结构添加更多设置，但状态码、一组 HTTP 头（例如，你很可能想要配置像缓存控制头这样的东西）和一个响应“体”就是你真正需要的全部内容。


    注意


    关于 Ring⁴ 和 Compojure⁵ 的进一步阅读，可以在它们各自的 GitHub Wiki 页面上找到。

