  raw: '##### cqc


    The `cqc` key binding can be executed anywhere within your current buffer. It’ll
    open the Vim command-line window, allowing you to search through previous evaluations
    and modify them before re- evaluating .


    ##### cmm


    The `cmm` key binding is really useful for understanding how macros work underneath
    the abstraction (i.e., what the code looks like once the macro has been expanded).
    Consider the `calc` function we’ve been working with; if we execute `cmm` on the
    definition, then macro expansion will evaluate this to what’s shown in Listing
    [B-9](#A453572_1_En_BookBackmatter_OnlinePDF.html#Par93) .


    ```

    (def calc (fn* ([f g] (* (+ f g) (/ g f)))))

    Listing B-9.

    Defn Macro Expanded Using cmm Key Binding

    ```


    In Listing [B-9](#A453572_1_En_BookBackmatter_OnlinePDF.html#Par93) , we can see
    that the execution of `cmm` on the `defn` macro expands it so that we can see
    how, in reality, the `calc` definition is really just a `def` form. It also shows
    the underlying use of an anonymous function to achieve what `defn` was abstracting
    away for us.


