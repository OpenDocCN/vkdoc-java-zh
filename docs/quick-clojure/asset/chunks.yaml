- fmt: '# Documentation


    If at any time you’d like to look up a function, then the quickest way to do that
    is within the REPL itself by using the `doc` function.


    For example, if I wanted to remind myself how to increment a number using the
    `inc` function in Clojure, I would go to the REPL and execute the code seen in
    Listing [1-6](#A453572_1_En_1_Chapter.html#Par68).


    ```

    (doc inc)

    Listing 1-6.

    Look Up Documentation for the inc Function

    ```


    This would return back to me the output seen in Listing [1-7](#A453572_1_En_1_Chapter.html#Par70).


    ```

    clojure.core/inc

    ([x])

    Returns a number one greater than num. Does not auto-promote

    longs, will throw on overflow. See also: inc''

    nil

    Listing 1-7.

    Documentation for the inc Function

    ```


    From this output, the first thing we can see is the namespace in which the function
    is located (`clojure.core/inc`). We’ll be covering namespaces in a lot of detail
    within a later chapter, but it’s worth noting now that Clojure has a `core` namespace
    that provides a standardized set of functions you can use.


    We can also see that the function `inc` takes a single argument (that’s what the
    `[x]` is indicating), and we can also read the description provided to get a better
    understanding of the context of the function (i.e., what its purpose is).


    Clojure “namespaces” are a way to divide your code up into separate files. The
    primary namespace in Clojure is the `clojure.core` namespace. If you need to view
    the documentation for a function that isn’t part of `clojure.core`, then you’ll
    need to include the namespace when using the `doc` function within the REPL. For
    example, if you wanted to look up the `blank?` function, which is located within
    the `clojure.string` namespace, then in the REPL you would execute `(doc clojure.string/blank?)`.


    For Java documentation (which you sometimes need to do, as Clojure piggybacks
    off Java libraries on occasion), you’ll need to use the `javadoc` function instead
    of `doc`. For example, if we wanted to look up the `Formatter` class in Java (which
    is found in Java’s `util` namespace), we’d execute the code you see in Listing
    [1-8](#A453572_1_En_1_Chapter.html#Par75).


    ```

    (javadoc java.util.Formatter)

    Listing 1-8.

    Look Up Documentation for a Java Class

    ```


    Executing the code within Listing [1-8](#A453572_1_En_1_Chapter.html#Par75) would
    open the relevant Java documentation in your web browser instead of loading the
    results within the terminal. This isn’t as nice as looking up Clojure-specific
    functionality, but it’s very rare that you would need to look up Java when writing
    Clojure (maybe you would look through a stack trace in your code and would be
    interested in learning more about the class that was referenced).


    ## Summary


    So, at this point we know a little bit about the background of Clojure and how
    to execute code within a REPL. In the next chapter, we’ll start exploring some
    of the data structures that Clojure provides. These structures help us to achieve
    much more practical things with the Clojure language.


