- fmt: "#### Steps Required\n\nThe principal steps we need to take are as follows:\n\
    \n1. Start our REPL.\n2. Open a Clojure file in Vim.\n3. Run the `:Connect` Fireplace\
    \ command.\n4. Enter our REPL details into the Vim prompt.\n\nAfter these steps\
    \ have been completed, we can then start using Fireplace-specific key bindings\
    \ to evaluate our Clojure code.\n\n#### Preferred Workflow?\n\nYour workflow may\
    \ differ from mine (most Vim users have their own way of doing things). For me,\
    \ I use NeoVim, and so I have the ability to create a split window that contains\
    \ an actual terminal instance (e.g., using its `:terminal` command). So, for me,\
    \ I’ll have a horizontal split set of windows. In the top window would be my Clojure\
    \ code, and in the bottom window would be my terminal (which is where I start\
    \ up my REPL).\n\nYou might not use NeoVim, but that doesn’t matter. If you’re\
    \ a tmux user, then you can have a horizontal split pane that does effectively\
    \ the same thing. If you don’t use a terminal multiplexer like tmux or screen,\
    \ then you can simply start up two shell/terminal instances; you’ll have to jump\
    \ back and forth between them for the initial set-up steps I’m about to detail.\n\
    \n#### Connecting to the REPL\n\nOK, so let’s begin by starting up our REPL: `lein\
    \ repl`\n\nBefore we can connect to a REPL from Vim using the Fireplace plugin,\
    \ we need to have a Clojure file open; this is because Fireplace only loads up\
    \ its functionality if it finds a Clojure-formatted file (if you try to run any\
    \ of its commands from a different file type, then Vim will state it doesn’t recognize\
    \ the command).\n\nIn Vim you have the option of either opening a Clojure file\
    \ or simply opening an empty buffer and setting the format of the buffer to be\
    \ a Clojure file; for example, `setf clojure`. It doesn’t matter which one you\
    \ choose. Typically, if I want to just mess around with some Clojure code, then\
    \ I’ll start up Vim with an empty buffer and use `setf clojure` (I’m sure some\
    \ people would argue for using Leiningen’s REPL directly, but I prefer working\
    \ within Vim); otherwise, if I’m working on an actual project, I’ll open up the\
    \ Clojure file I want to edit.\n\nOnce we’ve done that, Vim will be able to use\
    \ the `:Connect` command that Fireplace provides. With this command you can use\
    \ tab completion to fill in most of the required values; type in the values directly\
    \ like so `:Connect <VALUE>`; or press ENTER to have Vim automatically prompt\
    \ you for answers. I usually just type in what we need `:Connect nrepl://127.0.0.1:65103`.\n\
    \nIf you’re wondering where I got the `127.0.0.1:65103` (which is `<LOCAL_IP>:<PORT_NUMBER>`)\
    \ from, then look no further than the screen where you ran `lein repl`. You should\
    \ see that the first line of output looks something like what’s shown in Listing\
    \ B-5, and once connected you will see a message similar to Listing B-6.\n\n```\n\
    nREPL server started on port \non host  -\nnrepl://:\nListing B-5.\nAbstract Output\
    \ from lein repl Command\n```\n\nNote: You can just use `localhost` instead of\
    \ `127.0.0.1`\n\n```\nConnected to nrepl://:\nScope connection to: \nListing B-6.\n\
    Vim Output Once Connected to REPL\n```\n\nTo close this message, press ENTER.\n\
    \nNote: The syntax structure of the `:Connect` command is: `<PROTOCOL>://<LOCAL_IP>:<PORT_NUMBER>\
    \ <PATH/TO/CODE>`. But be aware that the path to your project code shouldn’t have\
    \ spaces. For example, `~/Some/Project` is fine but `~/Some Other/Project` would\
    \ not work.\n\n#### Fireplace Commands\n\nThere are quite a few Fireplace key\
    \ bindings and commands, so I would strongly recommend you have a read of the\
    \ Fireplace help documents (`:help fireplace`), as I won’t attempt to cover all\
    \ of them. Hell, some of them I’ve never used! But the ones I use the most I’ve\
    \ included details for here (I urge you to try out the examples given so you get\
    \ a feel for them).\n\n*   `:Doc <symbol>` (e.g., `:Doc defn`)\n*   `:FindDoc\
    \ <symbol>` (e.g., `:FindDoc de`)\n*   `:Source <symbol>` (e.g., `:Source defn`)\n\
    \nNote: Executing the `K` key binding while the cursor is on top of a symbol is\
    \ a shortcut for the `:Doc` command. If you need to exit the `:FindDoc` results\
    \ screen you can either press Q or keep scrolling until you reach the bottom and\
    \ then press ENTER. Also, executing the `[d` or `]d` key bindings while the cursor\
    \ is on top of a symbol is a shortcut for the `:Source` command.\n\n#### Fireplace\
    \ Key Bindings\n\n*   `cpp`: evaluates innermost form\n*   `cqp`: displays prompt\
    \ to enter custom expression\n*   `cqq`: displays prompt with current form prepopulated\n\
    *   `cqc`: displays prompt within command-line window\n*   `cmm`: Expands a Clojure\
    \ macro\n\nIn Listing B-7, we can see an example function called `calc`, which\
    \ we will use as the basis for exploring the key bindings shown in the preceding\
    \ list. For the purposes of the following sections, let’s add that code into a\
    \ new empty buffer with `setf clojure` (rather than run it from an actual project\
    \ directory).\n\n```\n(defn calc [f g]\n(* (+ f g) (/ g f)))\nListing B-7.\nExample\
    \ Function to Verify Key Bindings Against\n```\n\n##### cpp\n\nPlace your cursor\
    \ on the first line of Listing B-7 (i.e., `(defn calc [f g]`) and execute the\
    \ key binding `cpp`. You should see the result displayed at the bottom of your\
    \ Vim instance: `#'user/calc`.\n\nYou’ll notice the namespace is `user` because\
    \ we’re working in a buffer that’s not been written to a file. If we were working\
    \ from a real Clojure project, you might see something like: `#'<path/to/your/project/namespace>/calc`\
    \ instead.\n\nIf you were to execute the `cpp` key binding while your cursor was\
    \ placed on top of a function call (e.g., `(calc 100 50)`), then it would evaluate\
    \ that call and return the actual result. But be aware that if (in this example)\
    \ you hadn’t already executed `cpp` on the `calc` function definition itself (i.e.,\
    \ the REPL hadn’t evaluated the function definition), then you would have found\
    \ that the REPL could not evaluate the call to the `calc` function as it wouldn’t\
    \ know where to locate it. This would result in an error (see Listing B-8).\n\n\
    ```\nCompilerException java.lang.RuntimeException:\nUnable to resolve symbol:\
    \ calc in this context, compiling:(4:1)\nListing B-8.\nError Evaluating Call to\
    \ a Function That Wasn’t Evaluated\n```\n\nThis type of error occurs when you\
    \ forget to evaluate the function definition; e.g., you enter lots of code and\
    \ then just try to call it without evaluating individual definitions first. Sometimes\
    \ it can be easier to just re-evaluate the entire buffer at once, which you can\
    \ do using `:%Eval` (that might be something you stick in a custom key binding\
    \ just to make it quicker and easier to execute).\n\n##### cqp\n\nExecuting the\
    \ key binding `cqp` anywhere in the current buffer will result in Vim’s displaying\
    \ a command prompt for you to enter a new expression to be evaluated. As before,\
    \ if you try to evaluate definitions found within your code, make sure the REPL\
    \ knows about them by evaluating the definition you want to use, or by re-evaluating\
    \ the entire buffer first.\n\n##### cqq\n\nThe `cqq` key binding works by taking\
    \ the form under the cursor in the current buffer and placing it into the Vim\
    \ command prompt, where you can then modify the command before pressing ENTER\
    \ to evaluate the expression.\n\nNote: I've found that NeoVim, when using a `:terminal`\
    \ pane, will not display the evaluation of the `cqq` key binding. The eval does\
    \ happen (we know this by checking `:Last`, which shows the last Clojure evaluation\
    \ within a preview window); it just isn't displayed. This is believed to be a\
    \ bug."
