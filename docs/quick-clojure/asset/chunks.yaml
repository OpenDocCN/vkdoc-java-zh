    # Destructuring


    In this chapter, we will be covering the concept of destructuring in Clojure.


    Specifically, Clojure provides support for what is referred to as abstract structural
    bindings . . . hmm? Yeah, let’s break that down a bit.


    What this means, for humans, is that Clojure provides us the ability to extract
    data from a data structure without having to actually traverse the data structure
    itself. This concept is typically referred to as destructuring.


    Although this is quite a short chapter, I would strongly recommend that you spend
    some time upon completing this section coding in the REPL and experimenting with
    the syntax we show you, as this will help to solidify your understanding of the
    concepts much more quickly.


    To understand how destructuring works, we will begin with a simple example (Listing
    [6-1](#A453572_1_En_6_Chapter.html#Par7)) and continue on through more complex
    variations that demonstrate the elegant and concise code that can be achieved
    by utilizing destructuring.


    Note


    Destructuring can be applied to `let` bindings, function parameter lists, and
    macros that expand into a `let` or function. But I will primarily be using the
    `let` form, as it’s the easiest form for demonstrating examples within the REPL.


    ```

    (let [[x y] [:a :b]]

    (prn y x))

    ;; :b :a

    Listing 6-1.

    Simple Destructuring Example Using a Vector

    ```


    Looking at Listing [6-1](#A453572_1_En_6_Chapter.html#Par7), we can see that we
    define our local variables using the `let` binding. When we do this, we’ll also
    notice that we have to wrap our symbols (`x` and `y`) in a data structure that
    matches the incoming data structure.


    If you remember, a `let` binding typically looks like `(let [x 1] (prn x))`, where
    `x` is assigned the value `1`. Look again at Listing [6-1](#A453572_1_En_6_Chapter.html#Par7).
    The incoming data structure `[:a :b]` is a vector, and so the symbols `x` and
    `y` are placed inside of a vector to ensure the structures match. The values `:a`
    and `:b` are then assigned to `x` and `y`, ready for us to use.


    ```

    (let [{a :a b :b} {:a "A" :b "B"}]

    (prn a b))

    ;; "A" "B"

    Listing 6-2.

    Simple Destructuring Example Using a Map

    ```


    Looking at Listing [6-2](#A453572_1_En_6_Chapter.html#Par10), we can see our example
    now utilizes a map data structure instead of a vector, like in Listing [6-1](#A453572_1_En_6_Chapter.html#Par7).
    Because of this, you should notice that the syntax inside of the `let` form is
    now a map to match the incoming data structure.


    What’s also different is that now that we’re dealing with a map data structure,
    we need to assign specific map keys to our symbols `a` and `b`. In this case,
    we’re extracting the `:a` key’s value and assigning it to the symbol `a`, and
    similarly we’re extracting the `:b` key’s value and assigning it to the symbol
    `b`.


    One nice feature Clojure provides is the ability to make our code clearer and
    more explicit by way of abstraction. Take a look at Listing [6-3](#A453572_1_En_6_Chapter.html#Par14),
    and you’ll see an example of this in action.


    ```

    (let [{:keys [a b]} {:a "A" :b "B"}]

    (prn a b))

    ;; "A" "B"

    Listing 6-3.

    Destructuring Example Using :keys Feature

    ```


    Looking back at Listing [6-3](#A453572_1_En_6_Chapter.html#Par14), we can see
    the structure is slightly different now. We have defined a `:keys` field and assigned
    it a vector of symbols `[a b]`. These symbols represent the keys of the same name
    from the incoming data structure and will hold their corresponding values.


    Let’s now extend this example further and demonstrate how you can access the entire
    data structure, as well as the specific extracted data.


    ```

    (let [{:keys [a c] :as complete} {:a "A" :b "B" :c "C" :d "D"}]

    (prn a c complete))

    ;; "A" "C" {:c "C", :b "B", :d "D", :a "A"}

    Listing 6-4.

    Destructuring Example Using :keys and :as Features

    ```'
  raw: '### Trimming Whitespace


    When dealing with user input, you most often will want to trim off any unnecessary
    whitespace around the input.


    There are three functions we’ll look at to help us. The first is `triml`, the
    second is `trimr`, and the last one is `trim-newline`. See Listing [5-56](#A453572_1_En_5_Chapter.html#Par197)
    for examples of their use.


    ```

    (clojure.string/triml "some space at the start")

    ;; "some space at the start"

    (clojure.string/trimr "some space at the end")

    ;; "some space at the end"

    (clojure.string/trim-newline "a newline\n\r ")

    ;; "a newline"

    (clojure.string/trim-newline "trim newline\n\rlast one only\n\r")

    ;; "trim newline\n\rlast one only"

    Listing 5-56.

