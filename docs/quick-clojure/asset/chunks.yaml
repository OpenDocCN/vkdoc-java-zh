  trans: '

    ### 滑动/丢弃缓冲通道


    我们可以借助 Clojure 将缓冲通道的概念进一步延伸，根据应用需求使用**滑动缓冲区**或**丢弃缓冲区**。


    滑动缓冲区是指当另一个值被推入通道时，会丢弃第一个缓冲值（从结构上看，这类似于队列，但队列不会自动丢弃元素；这是 Clojure 的抽象为我们提供的功能）。丢弃缓冲区则是指当另一个值被推入通道时，会丢弃最后一个缓冲值。


    在这两种情况下，由于通道处理缓冲区溢出的方式，都不会导致放入值的操作阻塞当前线程。请参见代码清单 8-38 中的示例。


    ```

    (def s (chan (sliding-buffer 5)))

    (def d (chan (dropping-buffer 5)))

    (def v [:a :b :c :d :e :f :g :h :i :j])

    (dotimes [i 10]

    (>!! s (nth v i))

    (prn "Put " (nth v i) " into the ''sliding buffer'' channel"))

    (dotimes [i 10]

    (>!! d (nth v i))

    (prn "Put " (nth v i) " into the ''dropping buffer'' channel"))

    (<!! s) ;; :f

    (<!! d) ;; :a

    代码清单 8-38.

    滑动缓冲区和丢弃缓冲区示例

    ```


    在代码清单 8-38 中，我们演示了滑动缓冲区和丢弃缓冲区。我们创建了不同的缓冲区类型，并在创建通道时将它们作为参数传入。然后，我们创建了一个循环，将十个值放入通道，而通道最多只能容纳五个值。因此，我们将看到每种缓冲区类型如何处理这个问题。


    对于滑动缓冲区，如果我们从通道中取出一个值，首先会得到 `:f`。这表明前五个值（`:a`、`:b`、`:c`、`:d`、`:e`）在下一组值被推入时被挤出了。顾名思义，通道内容会先滑动出旧值。


    对于丢弃缓冲区，如果我们从通道中取出一个值，首先会得到 `:a`。这表明最后五个值（`:f`、`:g`、`:h`、`:i`、`:j`）在缓冲区满的那一刻被丢弃了。这就像一个非常繁忙的夜总会入口：一旦俱乐部满员，门卫就会把你拒之门外。


    注意


    在社区中，大多数开发者似乎会创建无界通道，即一对一进出，并且仅在需要尽可能提高性能和吞吐量时，才使用滑动/丢弃缓冲区。


    ### 超时通道


    这是我想与你分享的并发领域的最后一个特性，也是使用通道时的一种常见模式：使用超时通道来短路潜在的僵尸（或长时间阻塞）进程。请参见代码清单 8-39。


    ```

    (def c (chan))

    (let [[result channel]

    (alts!! [c (timeout 5000)])]

    (if result

    (prn "Result: " result)

    (prn "Timed out: " result))) ;; "Timed out: " nil

    代码清单 8-39.

    超时通道示例

    ```


    在代码清单 8-39 中，我们创建了一个通道，然后从未向它发送任何内容。接着，我们使用 `alts!!` 尝试从通道中取出一个值，但不会无限期阻塞——因为我们可以传递一个通道集合，哪个通道先获得值，`alts!!`
    就返回哪个——我们最初被阻塞了五秒钟，然后进程解锁，我们得到了 `nil` 的结果。


    这是可行的，因为超时通道在设定的时间段内是一个活动通道，然后它会向自身发送一个 `nil` 值，这使得 `alt!!` 能够立即行动，并随后短路自身。


    ## 本章小结


    在本章中，我们学习了许多处理并发/多线程代码的不同技术和工具。我们涵盖了所有内容：延迟、未来、承诺、原子、锁、代理、引用和通道。不要急于读完本章；请回头尝试所有示例，并确保你完全理解了这些概念。


    在下一章中，我们将学习命名空间，以及如何利用它们来组织和分类我们的代码。命名空间是一个强大的特性，在所有 Clojure 代码库中都很常见。


    脚注 1


    [`https://clojure.org/about/concurrent_programming`](https://clojure.org/about/concurrent_programming)


      2


    [`http://www.golang.org/`](http://www.golang.org/)


    # 9. 命名空间


    命名空间是一种特性，允许将函数、符号和变量分类到定义良好的组中。在本章后面，我们还会看到命名空间可以被转换并映射到实际的文件系统目录结构。


    让我们先使用 REPL 来演示一个关于命名空间如何工作的简单示例。当我们运行 `lein repl` 时，会自动进入一个新的 `user` 命名空间，并且该命名空间预加载了
    Clojure 核心库。你可以通过查看 REPL 控制台来判断当前所在的命名空间，控制台会在光标位置之前显示当前命名空间：`user=>`。


    注意


    如果你需要以编程方式引用命名空间，可以使用 `*ns*` 变量。


    现在，让我们看看如何创建一个新的命名空间 `foo.bar`，然后在该新命名空间内定义一个分配给符号 `baz` 的变量。接着，我们回到 `user` 命名空间，为
    `baz` 定义一个不同的值，并观察从不同命名空间引用该变量时会发生什么。


    ```

    (ns foo.bar)

    (def baz 1)

    baz

    ;; 1

    (ns user)

    (def baz 2)

    baz

    ;; 2

    (ns foo.bar)

    baz

    ;; 1

    代码清单 9-1.

    创建新命名空间的示例

    ```


    在代码清单 9-1 中，你可以看到我们使用了 `ns` 宏来创建 `foo.bar` 命名空间。如果该命名空间已经存在（例如代码清单 9-1 中的 `user`
    命名空间），那么调用 `ns` 宏并传入一个映射到已存在命名空间的符号，将会直接把你移入该指定命名空间，而不会先创建它。


    因此，在前面的示例中，我们首先创建了 `foo.bar` 命名空间，然后将 `baz` 定义为值 `1`。接着，我们移回 `user` 命名空间并定义 `baz`，但这次赋予了一个不同的值——`2`。


    从这个例子中，你可以看到我们如何根据定义和包含它们的命名空间，安全地定义具有不同行为和值的变量和函数。


    ## 什么是命名空间？


    Clojure 的命名空间实际上只是一个从符号到变量/类的全局映射。每个命名空间类也可以包含自己的映射（主要是符号到变量的映射）。当前命名空间存储在一个 `Namespace`
    对象中，并与动态变量 `*ns*` 关联。


    注意


    默认情况下，`user` 命名空间，以及随后使用 `ns` 宏创建的任何命名空间，都会预加载并映射 `clojure.core` 命名空间中的所有函数（以及
    `java.lang` 命名空间中的类名）。


    你可以在 REPL 中使用 `in-ns`（而不是 `ns`）创建一个新命名空间来验证这一点。`in-ns` 函数创建的命名空间不会预加载 `clojure.core`
    命名空间。请参见代码清单 9-2 中的示例，该示例演示了新命名空间将缺少默认命名空间。


    ```

    (in-ns ''beep)

    ;; beep 命名空间不存在

    ;; 所以这创建了它并将我们移入该命名空间

    (loaded-libs)

    ;; 此函数位于 clojure.core 中

    ;; clojure.core 命名空间尚未预加载

    ;; 因此这将在 REPL 中显示错误

    (clojure.core/refer ''clojure.core)

    ;; 我们显式加载 clojure.core 命名空间

    (loaded-libs)

    ;; 我们现在成功执行了该函数

    代码清单 9-2.

    使用 in-ns 创建的新命名空间将缺少 clojure.core

    ```

