- fmt: '# Flags Revisited


    OK, let’s now review the flags that we defined to make sure we understand their
    configuration. Let’s start with the `-p` flag.


    If I were to execute the `integralist` command with no flags defined, then I would
    see from the output that the `-p` (`--port`) flag was given the default value
    of `80`. Looking back at Listing [13-2](#A453572_1_En_13_Chapter.html#Par10),
    we can see that’s because we configured the `:default` attribute with that value.
    This means if I execute `integralist -p 123`, we expect to see `123` assigned
    to that flag in the command’s output (which we do). This demonstrates how we can
    make certain flags optional by defining a default value.


    If I were to execute `integralist -p abc`, then the output from the command would
    be an error (see Listing [13-11](#A453572_1_En_13_Chapter.html#Par65)). We can
    see from the error that it was expecting a number, but the input was `abc`. If
    we look back at Listing [13-2](#A453572_1_En_13_Chapter.html#Par10), we can see
    this is because we configured the `-p` flag with a `:parse-fn` attribute, which
    allows us to convert the input into another format value (in this case, we assigned
    an anonymous function to `:parse-fn` that tries to convert the input into an integer).


    ```

    [Error while parsing option "-p abc": java.lang.NumberFormatException: For input
    string: "abc"]

    Listing 13-11.

    Error from -p Flag Assigned an Incorrect Type

    ```


    Similar to the `:parse-fn` attribute is the `:validate` attribute, which allows
    us to verify that the input’s value is what we expect/need it to be. In this case,
    we want to ensure the number is within a specific range. If I passed `65535` as
    the value, then everything would work fine. But if I passed `99999`, then we’d
    see an error (Listing [13-12](#A453572_1_En_13_Chapter.html#Par67)).


    ```

    [Failed to validate "-p 99999": Must be a number between 0 and 65536]

    Listing 13-12.

    Error from -p Flag Assigned an Incorrect Value

    ```


    If we now look at the `-v` flag, we can see it has two attributes we’ve not explained
    yet, `:id` and `:assoc-fn`. The `:id` attribute is required only if you’ve not
    defined a long flag. This is because the cli tools have a convention whereby they
    use the name of the long flag as a key inside the `:options` map data structure.
    With the `-v` flag, we’ve not provided a long flag (hence the use of the `nil`
    value).


    In some command-line tools, you’ll see a convention whereby a defined flag can
    actually be dynamic. For example, if your tool allowed the showing of debug information,
    you might want the user to be able to configure how much debug info they see based
    on a “level.” This is what we’re trying to represent with the verbosity flag (`-v`)
    in our tool. So, if you execute `integralist -v`, you’ll see the verbosity value
    is set to `1`, but if you changed the flag to `-vv`, it would be set to `2`, and
    again if you changed the flag to `-vvv`, it would be set to `3` (and so on).


    This is what `:assoc-fn` is used for. It accepts the entire `:options` map data
    structure along with the flag `:id` and its current value (in our case, there
    was a `:default` value of `0` set). With that information, we can see in Listing
    [13-2](#A453572_1_En_13_Chapter.html#Par10) that we simply increment the flag’s
    value inside the `:options` map.


    **Note**


    We won’t review the `-x` or `-h` flags, as they effectively just use the `:id`
    and `:default` attributes we’ve already seen.


    ## Summary


    In this chapter, we’ve taken a brief tour of some of the most important features
    from Clojure’s `tools.cli`. We’ve learned how to create the shell for a command-line
    application that defines a set of flags with a varied set of conditions and behavioral
    expectations. This includes dynamic flags such as `-v` for defining debug verbosity
    levels and the `-p` flag, which requires the value be something that can be coerced
    into an integer and also be within a specific numerical range. There are other
    features available within `tools.cli`, and I recommend you go exploring to see
    how you might utilize them.


    The other item covered was how to run the cli via Leiningen—a Jar or via a binary.
    The last two options mean you can take the single packaged file (or binary) and
    easily distribute your application to any system that has Java available.


    **Footnotes**


    [1](#A453572_1_En_13_Chapter.html#Fn1_source) [http://tldp.org/LDP/abs/html/exitcodes.html](http://tldp.org/LDP/abs/html/exitcodes.html)


    [2](#A453572_1_En_13_Chapter.html#Fn2_source) [https://en.wikipedia.org/wiki/Standard_streams](https://en.wikipedia.org/wiki/Standard_streams)


    [3](#A453572_1_En_13_Chapter.html#Fn3_source) [https://github.com/clojure/tools.cli/blob/master/src/main/clojure/cljs/tools/cli.cljs](https://github.com/clojure/tools.cli/blob/master/src/main/clojure/cljs/tools/cli.cljs)


    [4](#A453572_1_En_13_Chapter.html#Fn4_source) [https://github.com/raynes/lein-bin](https://github.com/raynes/lein-bin)


    [5](#A453572_1_En_13_Chapter.html#Fn5_source) [https://www.docker.com/](https://www.docker.com/)


    ## Appendix A: Conventions


    Every programming language has its own conventions for ensuring a collective understanding
    and consistency with the design of code written in that language. Some conventions
    are also able to transition pretty consistently across different programming languages
    due to the fact that there are groupings of languages (such as C) where the syntax
    is similar, and so the conventions make sense when applied across multiple languages.


    For example, if you’ve ever written a `for` loop (of any variety), then chances
    are you’ll know of the variable identifiers `i`, `j`, and `k` being used as characters
    for each nested loop level (see Listing [A-1](#A453572_1_En_BookBackmatter_OnlinePDF.html#Par3),
    which utilizes the JavaScript language syntax to demonstrate a `for` loop).


    ```

    for (i = 0; i < condition; i++) {

    for (j = 0; j < condition; j++) {

    for (k = 0; k < condition; k++) {

    // code

    }

    }

    }

    Listing A-1.

    Example of i, j, and k Variables in a for Loop

    ```


    **Note**


    `i`, `j`, and `k` are typically used for a few reasons (depending on who you talk
    to): `i` and `j` have been used in mathematics for a very long time, and so the
    transition of math to programming persisted. On a practical level, `i` is sometimes
    interpreted to stand for integer, and so when needing a nested level, it made
    sense to start moving up the alphabet to `j`, then `k`.


    Clojure has similar naming conventions.


    ### Functions


    * `f`, `g`, `h`: function input (notice similarity with `i`, `j`, `k`, where now
    `f` represents function)

    * `n`: integer input (usually a size)

    * `i`: integer index

    * `x`, `y`: numbers

    * `s`: string input

    * `xs`: considered a plural, or sequence, of `x`

    * `coll`: a collection (or sequence)

    * `pred`: a predicate closure

    * `& more`: variadic input

    * `*var*`: dynamic variables should be wrapped in asterisks (also referred to
    as “ear muffs”)


    ### Macros


    * `expr`: an expression

    * `body`: a macro body

    * `binding`: a macro binding vector'
