- fmt: '# 13. Command-Line Applications


    In this chapter, we’re going to do two things: first, we’re going to review Clojure’s
    `tools.cli` library in order to understand how we can utilize it to help us design
    and develop command-line applications. Second, we’ll look at how to package up
    this application in order for us to be able to distribute it.


    Building command-line applications is something that most developers enjoy doing
    because it exposes a way to enrich their working environment (as well as the environment
    of their team or wider dev community if they’re designing a tool that is abstract
    enough to be useful to more than just themselves). The possibilities are endless
    when designing a CLI tool, as you have so much scope to work with.


    Once we’ve reviewed `clojure/tools.cli` and the packaging options, you’ll find
    that we’ll have covered the vast majority of what you need to know. The rest is
    up to you; how you design and structure the application will depend on the tool
    you’re looking to build and the problem you’re trying to solve.


    Let’s begin by first creating a fresh project using the Leiningen `app` template,
    which we saw in the previous chapter. The command is `lein new app cli-foo` (you
    can name your application whatever you like, but I’ve gone with the simple but
    effective `cli-foo`).


    Inside of that project, open your `project.clj` and update the dependencies key
    to include the `clojure/tools.cli` dependency. See Listing [13-1](#A453572_1_En_13_Chapter.html#Par6)
    to view the change in context.


    ```

    (defproject cli-foo "0.1.0-SNAPSHOT"

    :description "FIXME: write description"

    :url "http://example.com/FIXME"

    :license {:name "Eclipse Public License"

    :url "http://www.eclipse.org/legal/epl-v10.html"}

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/tools.cli "0.3.5"]]

    :main ^:skip-aot cli-foo.core

    :target-path "target/%s"

    :profiles {:uberjar {:aot :all}})

    Listing 13-1.

    Update project.clj to Include tools.cli Dependency

    ```


    **Note**


    One thing you’ll want to do (and we’ll explain why later) is to delete the `:target-path`
    attribute from the `project.clj`.


    OK. Let’s now open up `src/cli_foo/core.clj` and make the modifications seen in
    Listing [13-2](#A453572_1_En_13_Chapter.html#Par10). There’s a lot going on, so
    we’ll take some time to break down each change to be sure we understand what it
    is we’re doing and why.


    The first thing you’ll notice is that we update the `ns` macro to ensure we’re
    pulling in the `parse-opts` function from the `cli` namespace. This allows us
    to parse the incoming arguments (provided by the user when using the tool) and
    to intelligently handle the input in a way that makes sense for our application.


    ```

    (ns cli-foo.core

    (:require [clojure.tools.cli :refer [parse-opts]])

    (:gen-class))

    (defn exit [status msg]

    (println msg)

    (System/exit status))

    (def cli-options

    [["-p" "--port PORT" "Port number"

    :default 80

    :parse-fn #(Integer/parseInt %)

    :validate [#(< 0 % 0x10000) "Must be a number between 0 and 65536"]]

    ["-v" nil "Verbosity level"

    :id :verbosity

    :default 0

    :assoc-fn (fn [opts k v] (update-in opts [k] inc))]

    ["-x" "--xxx WHATEVER", "A description for this option"

    :default 123]

    ["-h" "--help"

    :id :custom-help]])

    (defn -main [& args]

    (let [{:keys [options arguments errors summary]} (parse-opts args cli-options)]

    (cond

    (:custom-help options) (exit 0 summary)

    (not (nil? errors)) (exit 1 errors)

    :else (exit 0 (parse-opts args cli-options)))))

    Listing 13-2.

    The Main Application Logic for Our Command-Line Tool

    ```


    The next thing you’ll notice is that we define an `exit` function. The purpose
    of this function is to accept an “exit code” (this would typically be `0` if everything
    were executed successfully, or a positive number if there were an error[¹](#A453572_1_En_13_Chapter.html#Fn1)).
    We pass the exit code to the `System/exit` function, which will ensure the application
    shuts down appropriately and correctly. The function also accepts a `msg` argument,
    which as you can imagine will be used for printing a message. The message is sent
    to `stdout` (standard out[²](#A453572_1_En_13_Chapter.html#Fn2)), which in this
    case is the terminal screen.


    After that, we define a `cli-options` variable and have assigned to it a large
    nested vector data structure with a very specific set of attributes defined. Each
    item in the vector defines an individual flag.


    **Note**


    A flag is what we provide to a command-line application in order to configure
    its behavior. For example, `ls -l -a` is the `ls` command (this lists all files
    and directories) with two flags `-l` and `-a` applied, which affects the displayed
    output.


    We can see that we have the following flags defined (these are all arbitrarily
    made up flags), and we’ll soon see that we don’t actually do very much with these
    flags in the application itself other than print them to the screen, but they’ve
    been chosen to demonstrate some different aspects of the `tools.cli` library:


    *   `-p`, `--port`: demonstrates `:parse-fn` and `:validate`

    *   `-v`, `--verbosity`: demonstrates `:assoc-fn`

    *   `-x`, `--xxx`: demonstrates `:default`

    *   `-h`, `--help`: demonstrates `:id`


    **Note**


    To see the full list of attributes available, I recommend you read through the
    source code file, which documents them all.[³](#A453572_1_En_13_Chapter.html#Fn3)


    We’ll come back to what the flags mean and how they work, but let’s move on to
    the final segment of the code, which is the `-main` function. The first thing
    we do in this function is call the `parse-opts` function and provide it with the
    arguments that were given to us via the user of the command-line tool, along with
    the `cli-options` flags we defined and configured.


    What we get back from `parse-opts` is a map data structure consisting of four
    keys: `:options`, `:arguments`, `:summary`, and `:errors`. See Listing [13-3](#A453572_1_En_13_Chapter.html#Par25)
    for the description assigned to each of them. We assign each key to a specific
    symbol for easy referencing.


    ```

    {:options     Options map, keyed by :id, mapped to the parsed value

    :arguments   A vector of unprocessed arguments

    :summary     A string containing a minimal options summary

    :errors      A possible vector of error message strings}

    Listing 13-3.

    Map Returned from parse-opts Function

    ```


    Next, within the `-main` function we define a condition that says that if the
    user has included the flag `-h` or `--help`, then we should call the `exit` function
    and pass it the `:summary` value returned by `parse-opts`.


    You’ll also notice that we’re identifying whether the help flag was specified
    by looking up the `:id` we defined for that flag (`:custom-help`) in the `:options`
    field that was returned by `parse-opts`.


    Next, after that condition we state that if there was an error parsing the arguments
    and/or flags, then we should call the `exit` function but provide the exit code
    `1` (which indicates an error) and then pass the error message itself that was
    returned by `parse-opts` (specifically, this is the `:errors` field) so the user
    can see what they might have done wrong.


    Finally, we have an `else` statement that says to call the `exit` function and
    provide it the exit code `0` (which indicates all is well) and simply call `parse-opts`
    again and use its return value as the thing we’re going to display to the user.


    At this point, we know enough about this application to start looking at how to
    compile and run it. We’ll do this next, and then after we’ve run the application
    and explored how we interact with it, we can go back and review the flag configuration
    settings we defined and assigned to the `cli-options` variable, hopefully with
    a stronger understanding of how they’re used in practice.'
