  trans: '

    ## 引号（Quoting ''）


    在第二章 2 中，当我们探讨列表数据结构时，我曾提到有些读者可能对列表前的单引号感到好奇。正如当时所述，这被称为对数据结构的引号引用，目的是让 Clojure
    编译器不尝试对其进行求值。


    ```

    (def l ''(1 2 3))

    l

    ;; (1 2 3)

    列表 10-6.

    引号引用列表数据结构以防止求值

    ```


    在列表 10-6 中，你应该注意到赋值给变量 `l` 的值实际上是一个列表数据结构 `(1 2 3)`，而不是 Clojure 编译器试图将 `1` 作为函数执行并将
    `2`、`3` 作为函数参数传递的结果（这原本就行不通，因为 Clojure 中不存在名为 `1` 的函数）。


    引号引用是一项实用的特性，适用于那些从算法角度出发，你确实需要使用真正的链表数据结构（而非向量或集合等）的场景。


    注意


    还有其他创建链表数据结构的方式：`(list 1 2 3)` 和 `(quote (1 2 3))` 是两种常见选择，不过 `quote` 函数可用于任何类型的
    Clojure 形式。


    ## 语法引号（Syntax Quoting `）


    语法引号的工作方式与标准引号功能相同，唯一的区别在于它会将每个表达式转换为完全限定的命名空间形式。


    ```

    (def l ''(1 2 3))

    `(+ l)

    ;; (clojure.core/+ user/l)

    列表 10-7.

    语法引号生成完全限定的命名空间

    ```


    在列表 10-7 中，你可以看到我们首先定义了变量 `l`，并将其赋值为一个字面列表数据结构。接着，我们在表达式 `(+ l)` 前使用了反引号（`` `
    ``），结果得到了该表达式的限定命名空间版本。


    这意味着 `+` 函数变成了 `clojure.core/+`，而变量 `l` 变成了 `user/l`（在此例中，我是在 REPL 环境中执行示例代码的）。


    注意


    如果你尝试对结果表达式 `(clojure.core/+ user/l)` 进行求值，会发现代码无法运行。这是因为我们需要将列表元素展平（即展开），使它们不再包含在括号内，而是作为
    `+` 函数的内联参数。稍后我将演示如何使用反引号拼接语法来实现这一点。


    ## 反引号（Unquoting ∼）


    当你引号引用一个表达式时，意味着我们希望编译器不对其或其任何子表达式进行求值。但有时，你希望表达式的大部分内容被引号引用（即不求值），而其中某些小的嵌套部分仍能被求值。


    ```

    (def l ''(1 2 3))

    `(+ ∼l)

    ;; (clojure.core/+ (1 2 3))

    列表 10-8.

    对嵌套表达式求值，但不求值整个表达式

    ```


    在列表 10-8 中，我们可以看到我们使用反引号引用了表达式，但随后使用了波浪号字符（`∼`）来“反引号”变量 `l`，使其最终被 Clojure 编译器求值。这意味着我们现在得到了一个未求值的命名空间
    `+` 函数，后面跟着表达式 `(1 2 3)`。


    注意


    列表 10-8 的输出是不可执行的，因为表达式 `(1 2 3)` 是无效的。核心命名空间中不存在名为 `1` 的函数。


    ## 反引号拼接（Unquote Splicing ∼@）


    在前面的示例中，我们演示了一些特定功能，但都产生了不可执行的结果。现在让我们花点时间来解决这个问题，并将下一个示例转变为可以成功执行的代码。


    ```

    (def l ''(1 2 3))

    `(+ ∼@l)

    ;; (clojure.core/+ 1 2 3)

    (clojure.core/+ 1 2 3)

    ;; 6

    (eval `(+ ∼@l))

    ;; 6

    列表 10-9.

    使用反引号拼接展开求值序列

    ```


    因此，在列表 10-9 中，我们可以看到我们使用了反引号引号语法来确保表达式不被求值。但在这个示例中，我们希望列表数据结构（赋值给变量 `l` 的那个）不是作为一个列表放在
    `+` 函数旁边，而是作为单独的参数放在那里。


    为了实现求值列表数据结构（使其不作为 `user/l` 放在 `+` 旁边）并随后展平该列表数据结构的目标，我们使用的不是反引号波浪号，而是反引号拼接 `∼@`。我们可以看到这返回了
    `(clojure.core/+ 1 2 3)`，你可以将其粘贴到 REPL 中执行，以看到它产生正确的结果 `6`。


    如果你想以编程方式求值形式 `` `(+ ∼@l) `` 的结果，你需要将其包裹在对 `eval` 函数的调用中（如列表 10-9 所示）。


    注意


    你不能在没有反引号语法的情况下使用反引号拼接，因为这会使得 Clojure 编译器很难理解哪些内容应该或不应该被求值。


    ## 生成符号（Generating Symbols gensym/#）


    在使用宏时，你最终可能会遇到变量绑定（既在宏内部，也在包含它的局部作用域中）相互冲突的问题。为了解决这个问题，你可以利用 `gensym` 函数在宏内部生成一个唯一的符号。


    注意


    重要的是要认识到 `gensym` 总是会返回一个全新的唯一值，因此你还可以提供一个前缀字符串，以便在调试时帮助识别该符号。


    ```

    (gensym)

    ;; G__791

    (gensym "hello")

    ;; hello794

    `hello#

    ;; hello__803__auto__

    列表 10-10.

    使用 gensym 创建唯一标识符

    ```


    在列表 10-10 中，最后一个示例使用了 `#` 作为 `gensym` 的简写语法，这意味着我们必须使用反引号 `` ` `` 语法；否则编译器将不知道如何处理（这是因为
    `#` 是符号的有效字符）。


    同样值得注意的是，`#` 变体确保在整个引号表达式中使用相同的标识符，而每次对 `gensym` 的引用都会产生一个新值。

