    ### 键、值与替换


    在结束对映射数据结构的探讨之前，让我们花点时间回顾几个更简单的函数（`keys`、`vals` 和 `replace`），并理解什么是结构体。首先，让我们看看
    `keys`/`vals` 函数及其工作原理（列表 2-25）。


    ```

    (keys {:foo "bar" :baz "qux"})

    ;; (:baz :foo)

    (vals {:foo "bar" :baz "qux"})

    ;; ("qux" "bar")

    列表 2-25.

    演示 keys 和 vals 函数

    ```


    如列表 2-25 所示，使用 `keys` 时，我们向函数传递一个映射数据结构，它会返回该数据结构中指定的所有键。`vals` 函数类似，我们同样传递一个映射数据结构，但这次它只返回分配给每个键的值。


    `replace` 函数允许你创建一个由从映射数据结构中提取的值组成的新向量。它通过使用你想要提取的值的键名来实现这一点。因此，如果你有以下映射 `{:a
    1 :b 2 :c 3}`，并且想要生成向量 `[3 2 1]`，那么你可以使用列表 2-26 中的代码来实现。


    ```

    (replace {:a 1 :b 2 :c 3} [:c :b :a])

    列表 2-26.

    演示 replace 函数

    ```


    注意


    `replace` 函数也适用于向量，但使用的是索引值而非键：


    `(replace [:a :b :c] [2 1 0])` 将返回 `[:c :b :a]`。


    最后，让我们理解一下 Clojure 中的结构体是什么。实际上，它们是一种从预定义结构生成映射的简单方法。例如，如果我想要一个表示某人属性的映射数据结构，我可以手动执行列表
    2-27 中的代码。


    ```

    (def mark {:name "Mark" :age 35})

    (def rich {:name "Richard" :age 40})

    (def cat {:name "Catherine" :age 30})

    列表 2-27.

    将映射结构赋值给可识别的符号

    ```


    注意


    使用 `def` 函数是为了声明一个变量。我们稍后会再讨论变量，简而言之，它们定义了内存中一个可以存储数据的位置；然后我们可以通过变量名来引用该数据。


    在前面的例子中，你会注意到我重复输入了键 `:name` 和 `:age`（实际上，我想要记录的属性会多得多）。这既浪费时间，又增加了因拼写错误导致恼人 bug
    的可能性，更不用说在其中一个映射中添加新键却忘记添加到其他映射中这种不一致的情况了。


    更好的做法是抽象出映射的“结构”，这样我们就可以专注于提供数据，这正是 `create-struct` 和 `struct` 函数的用武之地，如列表 2-28
    所示。


    ```

    (def person (create-struct :name :age :sex))

    (struct person "Mark" 35 "Male")

    ;; {:name "Mark", :age 35, :sex "Male"}

    (struct person "Richard" 40 "Male")

    ;; {:name "Richard", :age 40, :sex "Male"}

    (struct person "Catherine" 30 "Female")

    ;; {:name "Catherine", :age 30, :sex "Female"}

    列表 2-28.

    演示 create-struct 和 struct 函数

    ```


    注意


    Clojure 通过一个名为 `defstruct` 的宏提供了一种快捷方式。这个宏处理结构体的创建并将其存储在一个变量中。因此，你可以使用 `(defstruct
    person :name :age :sex)` 来代替 `(def person (create-struct :name :age :sex))`。


    ## 集合


    集合是一种由唯一值组成的数据结构。与 Clojure 的映射和向量数据结构非常相似，它为 Clojure 提供了一种非常轻量级的数据模型。列表 2-29 中的示例展示了一个典型的集合。


    ```

    #{1 2 3 :a :b :c}

    ;; #{1 :c 3 2 :b :a}

    列表 2-29.

    简单集合数据结构示例


    集合的顺序是不保证的（如前面示例的返回值所示）。虽然你可以使用 `sorted-set` 函数创建一个有序集合，但请注意，你不能在有序集合中使用混合类型。参见列表
    2-30。


    ```

    (sorted-set 3 1 2)

    ;; #{1 2 3}

    (sorted-set 1 2 3 :a :b :c)

    ;; error – mixed types

    列表 2-30.

    简单集合数据结构示例

    ```


    如果你已经创建了一个未排序的集合，那么你可以使用 `apply` 函数（它适用于任何集合类型：列表、向量、映射和集合）将 `sorted-set` 函数应用于现有集合，如列表
    2-31 所示。


    ```

    (apply sorted-set #{3 1 2})

    ;; #{1 2 3}

    列表 2-31.

    将 sorted-set 应用于现有集合

    ```


    在处理现有集合时，能够应用 `sorted-set` 会非常方便，因为你可以在排序的同时过滤掉重复项，如列表 2-32 所示。


    ```

    (set [1 1 2 2 3 3 4 5 6 6])

    ;; #{1 4 6 3 2 5}

    (apply sorted-set [1 1 2 2 3 3 4 5 6 6])

    ;; #{1 2 3 4 5 6}

    列表 2-32.

    过滤重复项

    ```


    你也可以使用 `conj` 函数向集合中添加新值，但请记住，集合是唯一值的集合，因此如果你尝试添加一个已存在的值，它会被静默忽略。参见列表 2-33。


    ```

    (conj #{1 2 3} 4)

    ;; #{1 4 3 2}

    (conj #{1 2 3} 3)

    ;; #{1 3 2}

    列表 2-33.

    使用 conj 向集合添加新值

    ```


    最后，能够向集合中添加元素固然很好，但能够删除元素有时也同样有用，我们可以使用 `disj` 来实现这一点（参见列表 2-34）。


    ```

    (disj #{1 2 3} 3)

    ;; #{1 2}

    列表 2-34.

    使用 disj 从集合中移除元素

    ```


    ## 变量与符号


    好了，这是在继续之前我想介绍的最后一个基本语法部分。在本节中，我不仅想演示变量是如何工作的（你从其他编程语言中应该已经很熟悉这个概念了），还想演示符号如何与变量关联，以及
    `def` 函数和 `defn` 宏的使用。


    让我们从理解什么是符号开始。符号，就其最简单的形式而言，是对某个其他值的引用。它是一种标识，就像你的名字；它标识了你，尽管你随着时间的推移而变化（你变老了，对吧？），但你的身份保持不变。


    另一方面，变量是一个可变的存储位置。创建变量时，它会在当前命名空间内创建（这可以防止与其他命名空间冲突）。要在 Clojure 中创建变量，你需要使用 `def`
    函数，以便将值赋给一个符号。参见列表 2-35。


    ```

    (def foo "hello")

    列表 2-35.

    使用 def 将值赋给符号/变量

    ```


    在列表 2-35 中，我调用了 `def` 函数，并将符号 `foo` 和字符串 `"hello"` 作为参数传递。`def` 函数将符号 `foo` 与字符串
    `"hello"` 关联起来，这样当我在 REPL（在当前命名空间内）中输入符号 `foo` 时，它就知道去哪里查找该值，并返回与该符号关联的值（在本例中，该值为
    `"hello"`）。


    注意


    在内部，Clojure 管理着一个全局的命名空间及其关联变量的映射。


    变量在其他命名空间中不可用，除非它们被“内部化”到那些命名空间中。内部化是一种花哨的说法，意思是“在当前命名空间中查找变量 x；如果不存在则创建它”。但你也可以使用
    `ns` 宏的 `:refer` 特性从另一个命名空间“内部化”变量。我将在后面的章节中，当我们更详细地研究命名空间时，演示其工作原理。

    '
- fmt: '### Assigning Functions


    Now, variables don’t just contain single values (strings or data structures, etc.);
    they can also be assigned functions. For example, Listing [2-36](#A453572_1_En_2_Chapter.html#Par162)
    shows a variable that creates a function that says hello to you (you would probably
    have a short function like this written all on one line, but I’ve opened it up
    across multiple lines for readability).


    ```

    (def foo

    (fn [p]

    (prn

    (str "Hello " p "!"))))

    Listing 2-36.

    Assign a Function to a Variable

    ```


    You also have the ability to define an anonymous function, which is a function
    that has no identifier, “inline” within an existing expression. We saw an example
    of this earlier in the chapter when dealing with the vector data structure (see
    Listing [2-38](#A453572_1_En_2_Chapter.html#Par166) below for a reminder of the
    syntax structure for an anonymous function). In Listing [2-36](#A453572_1_En_2_Chapter.html#Par162),
    we’ve defined a `foo` variable and assigned an “anonymous” function that takes
    `p` as an argument and then prints out a message using the `prn` function. We
    do this by taking the value of `p` and interpolating it into a single string value
    using the `str` function. You would call this function as shown in Listing [2-37](#A453572_1_En_2_Chapter.html#Par164).


    ```

    (foo "you")

    ;; "Hello you!"

    Listing 2-37.

    Example of Calling Our User-Defined Function

    ```


    ```

    (fn [arg1 arg2 arg3...] (fn-body...))

    Listing 2-38.

    Syntax Structure of an Anonymous Function Definition

    ```


    In the earlier example (Listing [2-36](#A453572_1_En_2_Chapter.html#Par162)),
    where we defined the `foo` function, we also were treated to a demonstration on
    how to nest function calls. So, we saw `str` nested inside of `prn`, and `prn`
    nested inside of `fn`, etc. We can see that Clojure is evaluating the “forms”
    from right to left.


    **Note**


    A form is something that is handed to the Clojure parser (i.e., Reader[³](#A453572_1_En_2_Chapter.html#Fn3)).
    An example of a form could be a string or a symbol, or even a function (which
    contains forms inside it). You’ll hear people mention forms a lot when talking
    about Clojure code, so you should be familiar with the terminology.


    The Clojure parser evaluates the `str` function and passes the result to the `prn`
    function, which is then used as the function body. Now, defining a variable and
    assigning a function to it is such a common pattern that a macro was created within
    the core Clojure library to reduce the verbosity a little bit and make it easier
    to remember the syntax.


    So, instead of the long-form `def`, you can use `defn` as shown in Listing [2-39](#A453572_1_En_2_Chapter.html#Par172)
    (again, I’ve expanded it over multiple lines for readability, but this could be
    a one- or two-liner at most).


    ```

    (defn foo [p]

    (prn

    (str "Hello " p "!")))

    Listing 2-39.

    Example of the defn Macro

    ```


    ### Temp Variables


    Creating temporary variables can be achieved via the `let` form. The way `let`
    works is that you use a binding. A binding is a fancy way of saying “assign a
    value to a symbol,” and that symbol exists only while the `let` block is executed,
    after which it disappears. See Listing [2-40](#A453572_1_En_2_Chapter.html#Par174).


    ```

    (let [xyz "Hi!"]

    (prn xyz))

    ;; nil

    (prn xyz)

    ;; CompilerException java.lang.RuntimeException:

    ;; Unable to resolve symbol: xyz in this context

    Listing 2-40.

    Example let Binding

    ```


    In Listing [2-40](#A453572_1_En_2_Chapter.html#Par174), we can see that the `let`
    binding prints “Hi!” as a side effect, but ultimately returns `nil`. Then, if
    we try to print the symbol `xyz` again from outside of the `let` binding, we see
    it raises an exception.


    **Note**


    Clojure also provides a feature called transients,[⁴](#A453572_1_En_2_Chapter.html#Fn4)
    which is a way to create a non-persistent copy of a data structure. You can mutate
    this temporary structure and then use a call to `persistent!` to return a persistent/immutable
    version. This allows for some good performance enhancements when utilized in the
    right scenarios where temp structures are more performant.


    We’ll come back to `let` blocks later on when we discuss destructuring, which
    is a very powerful feature for extracting values from complex objects.


    **Note**


    Local variables created via `let` aren’t really variables, as their values cannot
    be changed once set.


    ### Dynamic Variables


    When creating variables, they are bound to the current namespace and are marked
    as “static.” But variables can be dynamically changed (for a temporary period
    of time). Similar to how `let` allows you to define local variables, the `binding`
    macro allows a current thread to manipulate the value of a variable while execution
    is happening within its block, like in Listing [2-41](#A453572_1_En_2_Chapter.html#Par181).


    ```

    (def ^:dynamic my-name "Mark")

    (prn my-name) ;; "Mark"

    (binding [my-name "Bob"]

    (prn my-name)) ;; "Bob"

    (prn my-name) ;; "Mark"

    Listing 2-41.

    Example of Dynamic Variable Bindings

    ```


    As you can see from the preceding example, we’ve defined a variable `my-name`
    the same way as we’ve defined variables previously; the only difference is that
    we now have added the metadata `^:dynamic`. Now, when using the `binding` form
    we can dynamically change the variable’s value temporarily. You can see it reverts
    back once the block has finished.


    This is particularly useful for testing purposes. Remember: functions can be assigned
    to variables too, so within a test environment you could dynamically swap out
    the function implementation. Clojure has since also implemented two additional
    functions, `with-redefs`[⁵](#A453572_1_En_2_Chapter.html#Fn5) and `with-redefs-fn`,[⁶](#A453572_1_En_2_Chapter.html#Fn6)
    specifically for this purpose.


    You could also use this functionality to provide a style of programming known
    as aspect-oriented programming.[⁷](#A453572_1_En_2_Chapter.html#Fn7) For example,
    you could manipulate a logging function so it placed context-specific details
    around the standard log information.


    ## Summary


    OK, we’ve covered a fair amount of ground here. Make sure you play around in the
    REPL with the examples given and see what happens when you tweak the examples
    (it’s the best way to confirm your understanding of these concepts and the behavior
    we’ve discussed so far).


    In the following chapter, we’ll start to look at the concepts surrounding functional
    programming and how they are reflected in the Clojure language. This will include
    topics such as immutability, referential transparency, first-class functions,
    partial application, recursive iteration, and composability.


