    # 8. Concurrency


    One of the main selling points of Clojure as a functional language is its concurrency
    mechanisms (of which it has quite a few). In order to understand what concurrency
    means, we first need to understand the problem space it’s related to and what
    it means for a program to run tasks concurrently.


    A computer process (e.g., an instance of a program running on your computer) has
    the ability to spawn multiple “threads.” Each thread has the ability to execute
    it’s own unique set of tasks, and are separate from tasks executing within other
    threads. But threads spawned from the same process share the same memory space.


    The fact that multiple threads spawned from the same parent process are able to
    access the same memory space can be a problem because if we’re executing code
    concurrently (i.e., the CPU is “context switching” between threads of execution),
    then it means a change to a piece of data in memory can occur from multiple places.


    This is why Clojure provides different mechanisms[¹](#A453572_1_En_8_Chapter.html#Fn1)
    for handling concurrency and to allow changes to occur in a synchronized and coordinated
    fashion. But when starting out with Clojure it can be quite difficult to understand
    why there are so many ways to handle immutable data in a concurrent fashion and,
    more important, when you should use them.


    I’ve found the simplest solution is to use a matrix (Table [8-1](#A453572_1_En_8_Chapter.html#Tab1)).


    Table 8-1.


    Clojure Concurrency Types


    |   | Retriable | Coordinated | Asynchronous | Thread Safe |

    | --- | --- | --- | --- | --- |

    | Delay |   |   | ✓ |   |

    | Future |   |   | ✓ |   |

    | Promise |   |   | ✓ |   |

    | Atom | ✓ |   |   | ✓ |

    | Lock |   |   |   | ✓ |

    | Agent |   |   | ✓ | ✓ |

    | Transactions | ✓ | ✓ |   | ✓ |

    | Channel |   |   |   | ✓ |


    Note


    The “channel” type refers to `(chan)`, which isn’t part of the standard library
    and needs to be loaded from `core.async,` while “transactions” refers to many
    things (as we’ll see later), one of which is the `ref` type.


    In Table [8-1](#A453572_1_En_8_Chapter.html#Tab1), you’ll see we have four features:
    retriable, coordinated, asynchronous, and thread safe. Let’s review what each
