- fmt: '# Polymorphism


    In most object-oriented programming languages, polymorphism is the ability to
    redefine the behavior of a method based upon the object it is currently residing
    with. This means you can have a `Human` class with the method `speak`, and when
    called it will return something a human would say (e.g., "Hello"); but you can
    also have a `Dog` class with the same method `speak`, and when called it’ll return
    something more appropriate, such as `"Woof!"`.


    In a functional language, where classes and objects aren’t as prevalent, polymorphism
    is hard to achieve because of a lack of types; or, to be more specific, functional
    languages tend to avoid creating new types for every programmatic situation where
    you would typically create a new type if using an OOP language.


    Clojure works around the lack of types by supporting runtime polymorphism (also
    referred to as dynamic dispatch), the principal concept being: dispatch a value
    that matches a recognized polymorphic function, and that polymorphic function
    will handle the behavior for the given value.


    There are a few ways Clojure handles this, but the one we’re interested in is
    via the use of a feature known as multimethods. Let’s take a look at a simple
    example of multimethods (see Listing [7-14](#A453572_1_En_7_Chapter.html#Par61))
    to understand how it achieves polymorphism within Clojure.


    ```

    (defmulti foo :some-key)

    (defmethod foo :a [this] (str "foo :a given " this))

    (defmethod foo :b [this] (str "foo :b given " this))

    (defmethod foo :c [this] (str "foo :c given " this))

    (foo {:some-key :a}) ;; "foo :a given {:some-key :a}"

    (foo {:some-key :b}) ;; "foo :b given {:some-key :b}"

    (foo {:some-key :c}) ;; "foo :c given {:some-key :c}"

    Listing 7-14.

    Example of Multimethod Functionality

    ```


    We start by calling the macro `defmulti`, and we pass it a name (in this case,
    our name is the symbol `foo`). We also provide it a dispatch function (in our
    example, this would be the argument `:some-key`).


    **Note**


    You may remember that a keyword will act like a function when used on a map data
    structure.


    At this point, we have defined a multimethod called `foo`, and we now need to
    define its behavior for each of the different types it might be associated with.
    That’s where the `defmethod` macro comes in.


    You can see when defining each `defmethod` that we make sure to give it the same
    name as `defmulti` (`foo`) along with a value we want to match upon (in this case,
    we define `:a`, `:b`, and `:c` for each variation of `foo`).


    In the square brackets for each `defmethod` definition, you can see we pass in
    a symbol (in this case, `this`) that refers to the type the method is associated
    with. So, in our example, the value assigned to the symbol `this` would be `{:some-key
    :a}`, `{:some-key :b}`, or `{:some-key :c}`, depending on the variation of `foo`
    that finds a match when the call to `foo` is made.


    **Note**


    I’ve named the type `this` (in the spirit of OOP, whose self value is usually
    referred to as `this`), but you could have named it anything you like.


    The body of each `defmethod` is what follows the square brackets, and this defines
    the behavior we want each version of `defmethod` to have. You would put whatever
    you need there. In our example, we’re simply returning the relevant `this` value
    depending on the matched type.


    This means, as you can see from the example in Listing [7-14](#A453572_1_En_7_Chapter.html#Par61),
    we can now call `foo` with a map data structure and have the appropriate downstream
    behavior triggered. For reference, the syntax structure is as shown in Listing
    [7-15](#A453572_1_En_7_Chapter.html#Par70).


    ```

    (defmulti

    polymorphic-function-name

    dispatch-function)

    (defmethod

    polymorphic-function-name

    pattern-value-to-match

    [symbol-for-type]

    function-behaviour)

    (polymorphic-function-name

    some-data)

    Listing 7-15.

    Multimethod Syntax Structure

    ```


    Before moving on, let’s review one other quick example for the purpose of demonstrating
    how the `:default` option works. We’ll keep with the same example as before, but
    we’ll extend it slightly (see Listing [7-16](#A453572_1_En_7_Chapter.html#Par72)).


    ```

    (defmulti foo :some-key)

    (defmethod foo :a [this] (prn "A"))

    (defmethod foo :default [this]

    (prn (str "Sorry, no idea what to do with ''" (:some-key this) "'' ?")))

    (foo {:some-key :a}) ;; "A"

    (foo {:some-key :d}) ;; "Sorry, no idea what to do with '':d'' ?"

    Listing 7-16.

    Demonstrating the :default Option

    ```


    As you can see, we have defined a new `foo` type that will be matched by `:default`
    if no other match can be found. We’ve not defined a `defmethod` that expects the
    value `:d`, and so the `:default` will be matched as a fallback.


    ## Summary


    In this chapter, we’ve learned two sides of the concept of pattern matching, the
    first being pattern matching in the strict sense using `core.match`, and the second
    being via polymorphic methods and being able to use dynamic dispatch to trigger
    specific behavior. For both styles, we looked at the various syntax differences
    and how to safeguard our code against input that might not have any matching items.


    In the next chapter, we’ll look at a big topic: concurrency. There, we will cover
    a lot of different options for dealing with code in an asynchronous fashion, which
    can also help the performance and safety of our applications.


    **Footnotes**


    [1](#A453572_1_En_7_Chapter.html#Fn1_source) [https://github.com/clojure/core.match](https://github.com/clojure/core.match)


    [2](#A453572_1_En_7_Chapter.html#Fn2_source) [http://www.regular-expressions.info/backref.html](http://www.regular-expressions.info/backref.html)


    # 8. Concurrency


    One of the main selling points of Clojure as a functional language is its concurrency
    mechanisms (of which it has quite a few). In order to understand what concurrency
    means, we first need to understand the problem space it’s related to and what
    it means for a program to run tasks concurrently.


    A computer process (e.g., an instance of a program running on your computer) has
    the ability to spawn multiple "threads." Each thread has the ability to execute
    its own unique set of tasks, and are separate from tasks executing within other
    threads. But threads spawned from the same process share the same memory space.


    The fact that multiple threads spawned from the same parent process are able to
    access the same memory space can be a problem because if we’re executing code
    concurrently (i.e., the CPU is "context switching" between threads of execution),
    then it means a change to a piece of data in memory can occur from multiple places.


    This is why Clojure provides different mechanisms[¹](#A453572_1_En_8_Chapter.html#Fn1)
    for handling concurrency and to allow changes to occur in a synchronized and coordinated
    fashion. But when starting out with Clojure it can be quite difficult to understand
    why there are so many ways to handle immutable data in a concurrent fashion and,
    more important, when you should use them.


    I’ve found the simplest solution is to use a matrix (Table [8-1](#A453572_1_En_8_Chapter.html#Tab1)).


    **Table 8-1.** Clojure Concurrency Types


    | | Retriable | Coordinated | Asynchronous | Thread Safe |

    | --- | --- | --- | --- | --- |

    | Delay | | | ✓ | |

    | Future | | | ✓ | |

    | Promise | | | ✓ | |

    | Atom | ✓ | | | ✓ |

    | Lock | | | | ✓ |

    | Agent | | | ✓ | ✓ |

    | Transactions | ✓ | ✓ | | ✓ |

    | Channel | | | | ✓ |


    **Note**


    The "channel" type refers to `(chan)`, which isn’t part of the standard library
    and needs to be loaded from `core.async`, while "transactions" refers to many
    things (as we’ll see later), one of which is the `ref` type.


    In Table [8-1](#A453572_1_En_8_Chapter.html#Tab1), you’ll see we have four features:
    retriable, coordinated, asynchronous, and thread safe. Let’s review what each
    of these means so we can better understand that matrix.'
