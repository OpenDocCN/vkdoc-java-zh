- fmt: '# Vector


    Chances are your current programming language will have a data structure that
    resembles a vector. In most other languages it is referred to as an array (although
    there are subtle semantic and implementation differences). Vectors allow you to
    have index access to any element within the data structure.


    As an example, let’s imagine we have a vector of five elements and we want to
    retrieve the fourth element. See Listing [2-7](#A453572_1_En_2_Chapter.html#Par45).


    ```

    (get [1 2 3 4 5] 3)

    ;; 4

    Listing 2-7.

    Demonstrate Index Access on a Vector Data Structure

    ```


    As you can see, vectors are zero-indexed, so asking for `3` returns the fourth
    element. You could also use the `nth` function instead of `get`. The difference
    is that the latter (`get`) works across all types of collections (including maps
    and sets), whereas `nth` only works with vectors and lists.


    You can modify the vector by using the `assoc` function (which is an abbreviation
    of “associate”). The way it works is that you provide the index of the vector
    you want to modify and then provide the value (see Listing [2-8](#A453572_1_En_2_Chapter.html#Par48)).


    ```

    (assoc [1 2 3 4 5] 5 6)

    ;; [1 2 3 4 5 6]

    Listing 2-8.

    Associate a Value into a Vector

    ```


    In the preceding example, we’re saying “put into index 5 the value 6.” Remember
    that vectors are zero-indexed, so our new value `6` will effectively be added
    to the end of the vector (as there currently is no fifth index).


    **Note**


    If you want to add a value to the collection without specifying an index, then
    use `conj`, as demonstrated earlier.


    Adding a value is cool, but what if you want to remove a value? One way to do
    this would be to use the `pop` function, which returns a copy of the vector but
    with the last element removed. See Listing [2-9](#A453572_1_En_2_Chapter.html#Par52),
    for example.


    ```

    (pop [1 2 3 4 5])

    ;; [1 2 3 4]

    Listing 2-9.

    Return Copy of Vector with Last Item Removed

    ```


    So, what if you want to remove elements from the middle of a vector? Well, you
    should be aware that this requires a surprisingly complex number of steps when
    using a Lisp-based language such as Clojure.


    You should also be aware that a vector probably isn’t the best data structure
    to use if you plan on removing elements from the middle of it. For situations
    like that, where you want to manipulate the data in complex ways, you’ll probably
    want to use a hash map instead (see the “Map” section after this for details).


    Before we look at how to remove an item from the middle of a vector, let’s first
    start with something similar but easier to achieve. Imagine you want to sample
    some of your data. You can do that by retrieving a “slice” of your vector. For
    example, if the vector looked like `[1 2 3 4 5]` and you wanted back a contiguous
    sample such as `[2 3]`, you could use the `subvec` function, as shown in Listing
    [2-10](#A453572_1_En_2_Chapter.html#Par56).


    ```

    (subvec [1 2 3 4 5] 1 3)

    Listing 2-10.

    Use subvec for Retrieving a Slice of Data

    ```


    In Listing [2-10](#A453572_1_En_2_Chapter.html#Par56), the code describes “starting
    from index 1 (which is the value `2` in the given vector), give me a copy from
    here until index 3,” and so we get back that specific range `[2 3]`.


    **Note**


    We’ll see later that there are many more functions for working with sequences/collections,
    and that because of the sequence abstraction that Clojure implements we can utilize
    these functions across different data structures.


    Going back to the earlier point about how to remove an element from the middle
    of a vector, the code snippet in Listing [2-11](#A453572_1_En_2_Chapter.html#Par61)
    demonstrates how you could remove the number `3` from the collection `[1 2 3 4
    5]` using `subvec`, leaving you with `[1 2 4 5]` as the resulting vector.


    Now, it’s important to realize that I’m about to demonstrate a rather inelegant
    solution. But once you’re more familiar with Clojure and the available functions,
    you’ll see this could easily be cleaned up. I’m also going to expand the already
    inelegant solution across multiple lines for readability.


    ```

    (vec

    (concat

    (subvec [1 2 3 4 5] 0 2)

    (subvec [1 2 3 4 5] 3)))

    Listing 2-11.

    Use subvec for Retrieving a Slice of Data

    ```


    So, the way this works is we use `subvec` to take a slice from either end of the
    vector. So `(subvec [1 2 3 4 5] 0 2)` returns `[1 2]` while `(subvec [1 2 3 4
    5] 3)` returns `[4 5]`. We then use the `concat` function to concatenate the two
    vectors together. Finally, because `concat` returns a list data structure, we
    use the `vec` function to convert the returned list back into a vector.


    The fact that the `concat` function returns a list and not a vector isn’t really
    an issue, because of how Clojure is able to handle collections as abstractions.
    But, in some cases it can be useful to ensure the returned data structure is in
    a specific format so you can take advantage of particular performance benefits.


    I didn’t have to worry about that for this basic example. I only converted the
    result back into a vector type in my example so as to avoid causing confusion
    when the result type came back different from what we provided.


    We’ll discuss why the change from a vector to a list happens in a later chapter,
    but for now it’ll suffice to know that the reason we don’t need to worry too much
    about the conversion between collection types is because of a concept known as
    the “Sequence Abstraction.”


    A more flexible and reusable solution would be to create a function that can wrap
    its complex implementation logic. The following example code, shown in Listing
    [2-12](#A453572_1_En_2_Chapter.html#Par70), is a much more flexible solution,
    and its logic is being wrapped up inside our own user-defined function, which
    we’ll name `drop-nth`.


    The function signature for our function will be `(drop-nth <n> <collection>)`,
    and an example call would be `(drop-nth 3 [:a :b :c :d])`. The expected result
    would be that the third element (`:c`) in the vector is removed.


    Before I demonstrate the implementation of our custom `drop-nth` function, I would
    suggest that if you’re new to programming and/or Clojure, maybe skip ahead to
    the next section: “Map.”


    The following example is provided so that I can demonstrate how you might solve
    the earlier problem of needing to remove an element from the middle of a vector.
    But the solution does utilize a few different advanced features of the Clojure
    language. I recommend you continue reading on and come back to this example later
    once you’ve had a chance to learn more about the Clojure features this solution
    utilizes.


    ```

    (defn drop-nth [n coll]

    (->> coll

    (map vector (iterate inc 1))

    (remove #(zero? (mod (first %) n)))

    (map second)))

    (drop-nth 3 [:a :b :c :d])

    ;; (:a :b :d)

    Listing 2-12.

    Remove Element from the Middle of a Vector

    ```


    So, I’m going to attempt to break down this example, but again, don’t worry too
    much at this point about really understanding the moving pieces, as we’ll learn
    about each of these features in later chapters.


    The first thing to mention is the use of `->>`. This looks like a function, but
    strictly speaking it’s actually a macro. The macro’s name is the “thread last
    macro.” Although the name includes the word thread, the macro has nothing to do
    with concurrency or multi-threaded code (which is a topic related to both multiple
    tasks overlapping as well as multiple tasks executed at the same time, and is
    something we’ll cover in a lot of detail in a later chapter).


    The macro `->>` passes the value (in this case `coll`) as the last argument to
    each form listed within the call.


    **Note**


    In Clojure a “form” is basically an “expression,” which is valid code that can
    be evaluated to produce a value.'
  raw: '## Vector


    Chances are your current programming language will have a data structure that
    resembles a vector. In most other languages it is referred to as an array (although
    there are subtle semantic and implementation differences). Vectors allow you to
    have index access to any element within the data structure.


    As an example, let’s imagine we have a vector of five elements and we want to
    retrieve the fourth element. See Listing [2-7](#A453572_1_En_2_Chapter.html#Par45).


    ```

    (get [1 2 3 4 5] 3)

    ;; 4

    Listing 2-7.

    Demonstrate Index Access on a Vector Data Structure

    ```


    As you can see, vectors are zero-indexed, so asking for `3` returns the fourth
    element. You could also use the `nth` function instead of `get`. The difference
    is that the latter (`get`) works across all types of collections (including maps
    and sets), whereas `nth` only works with vectors and lists.


    You can modify the vector by using the `assoc` function (which is an abbreviation
    of “associate”). The way it works is that you provide the index of the vector
    you want to modify and then provide the value (see Listing [2-8](#A453572_1_En_2_Chapter.html#Par48)).


    ```

    (assoc [1 2 3 4 5] 5 6)

    ;; [1 2 3 4 5 6]

    Listing 2-8.

    Associate a Value into a Vector

    ```


    In the preceding example, we’re saying “put into index 5 the value 6.” Remember
    that vectors are zero-indexed, so our new value `6` will effectively be added
    to the end of the vector (as there currently is no fifth index).


    Note


    If you want to add a value to the collection without specifying an index, then
    use `conj`, as demonstrated earlier.


    Adding a value is cool, but what if you want to remove a value? One way to do
    this would be to use the `pop` function, which returns a copy of the vector but
    with the last element removed. See Listing [2-9](#A453572_1_En_2_Chapter.html#Par52),
    for example.


    ```

    (pop [1 2 3 4 5])

    ;; [1 2 3 4]

    Listing 2-9.

    Return Copy of Vector with Last Item Removed

    ```


    So, what if you want to remove elements from the middle of a vector? Well, you
    should be aware that this requires a surprisingly complex number of steps when
    using a Lisp-based language such as Clojure.


    You should also be aware that a vector probably isn’t the best data structure
    to use if you plan on removing elements from the middle of it. For situations
    like that, where you want to manipulate the data in complex ways, you’ll probably
    want to use a hash map instead (see the “Map” section after this for details).


    Before we look at how to remove an item from the middle of a vector, let’s first
    start with something similar but easier to achieve. Imagine you want to sample
    some of your data. You can do that by retrieving a “slice” of your vector. For
    example, if the vector looked like `[1 2 3 4 5]` and you wanted back a contiguous
    sample such as `[2 3]`, you could use the `subvec` function , as shown in Listing
    [2-10](#A453572_1_En_2_Chapter.html#Par56).


    ```

    (subvec [1 2 3 4 5] 1 3)

    Listing 2-10.

    Use subvec for Retrieving a Slice of Data

    ```


    In Listing [2-10](#A453572_1_En_2_Chapter.html#Par56), the code describes “starting
    from index 1 (which is the value `2` in the given vector), give me a copy from
    here until index 3,” and so we get back that specific range `[2 3]`.


    Note


    We’ll see later that there are many more functions for working with sequences/collections,
    and that because of the sequence abstraction that Clojure implements we can utilize
    these functions across different data structures.


    Going back to the earlier point about how to remove an element from the middle
    of a vector, the code snippet in Listing [2-11](#A453572_1_En_2_Chapter.html#Par61)
    demonstrates how you could remove the number `3` from the collection `[1 2 3 4
    5]` using `subvec`, leaving you with `[1 2 4 5]` as the resulting vector.


    Now, it’s important to realize that I’m about to demonstrate a rather inelegant
    solution. But once you’re more familiar with Clojure and the available functions,
    you’ll see this could easily be cleaned up. I’m also going to expand the already
    inelegant solution across multiple lines for readability.


    ```

    (vec

    (concat

    (subvec [1 2 3 4 5] 0 2)

    (subvec [1 2 3 4 5] 3)))

    Listing 2-11.

    Use subvec for Retrieving a Slice of Data

    ```


    So, the way this works is we use `subvec` to take a slice from either end of the
    vector. So `(subvec [1 2 3 4 5] 0 2)` returns `[1 2]` while `(subvec [1 2 3 4
    5] 3)` returns `[4 5]`. We then use the `concat` function to concatenate the two
    vectors together. Finally, because `concat` returns a list data structure, we
    use the `vec` function to convert the returned list back into a vector.


    The fact that the `concat` function returns a list and not a vector isn’t really
    an issue, because of how Clojure is able to handle collections as abstractions.
    But, in some cases it can be useful to ensure the returned data structure is in
    a specific format so you can take advantage of particular performance benefits.


    I didn’t have to worry about that for this basic example. I only converted the
    result back into a vector type in my example so as to avoid causing confusion
    when the result type came back different from what we provided.


    We’ll discuss why the change from a vector to a list happens in a later chapter,
    but for now it’ll suffice to know that the reason we don’t need to worry too much
    about the conversion between collection types is because of a concept known as
    the “Sequence Abstraction.”


    A more flexible and reusable solution would be to create a function that can wrap
    its complex implementation logic. The following example code, shown in Listing
    [2-12](#A453572_1_En_2_Chapter.html#Par70), is a much more flexible solution,
    and its logic is being wrapped up inside our own user-defined function, which
    we’ll name `drop-nth`.


    The function signature for our function will be `(drop-nth <n> <collection>)`,
    and an example call would be `(drop-nth 3 [:a :b :c :d])`. The expected result
    would be that the third element (`:c`) in the vector is removed.


    Before I demonstrate the implementation of our custom `drop-nth` function, I would
    suggest that if you’re new to programming and/or Clojure, maybe skip ahead to
    the next section: “Map.”


    The following example is provided so that I can demonstrate how you might solve
    the earlier problem of needing to remove an element from the middle of a vector.
    But the solution does utilize a few different advanced features of the Clojure
    language. I recommend you continue reading on and come back to this example later
    once you’ve had a chance to learn more about the Clojure features this solution
    utilizes.


    ```

    (defn drop-nth [n coll]

    (->> coll

    (map vector (iterate inc 1))

    (remove #(zero? (mod (first %) n)))

    (map second)))

    (drop-nth 3 [:a :b :c :d])

    ;; (:a :b :d)

    Listing 2-12.

    Remove Element from the Middle of a Vector

    ```


    So, I’m going to attempt to break down this example, but again, don’t worry too
    much at this point about really understanding the moving pieces, as we’ll learn
    about each of these features in later chapters.


    The first thing to mention is the use of `->>`. This looks like a function, but
    strictly speaking it’s actually a macro. The macro’s name is the “thread last
    macro .” Although the name includes the word thread, the macro has nothing to
    do with concurrency or multi-threaded code (which is a topic related to both multiple
    tasks overlapping as well as multiple tasks executed at the same time, and is
    something we’ll cover in a lot of detail in a later chapter).


    The macro `->>` passes the value (in this case `coll`) as the last argument to
    each form listed within the call.


    Note


    In Clojure a “form” is basically an “expression,” which is valid code that can
    be evaluated to produce a value.'
  trans: '

    ## 向量


    你当前使用的编程语言很可能包含一种类似于向量的数据结构。在大多数其他语言中，它被称为数组（尽管在语义和实现上存在细微差异）。向量允许你通过索引访问数据结构中的任意元素。


    举个例子，假设我们有一个包含五个元素的向量，想要获取第四个元素。请参见清单 2-7。


    ```

    (get [1 2 3 4 5] 3)

    ;; 4

    清单 2-7.

    演示向量数据结构的索引访问

    ```


    如你所见，向量是零索引的，因此请求 `3` 会返回第四个元素。你也可以使用 `nth` 函数代替 `get`。区别在于后者（`get`）适用于所有类型的集合（包括映射和集合），而
    `nth` 仅适用于向量和列表。


    你可以使用 `assoc` 函数（“associate”的缩写）来修改向量。其工作方式是：提供要修改的向量索引，然后提供新值（参见清单 2-8）。


    ```

    (assoc [1 2 3 4 5] 5 6)

    ;; [1 2 3 4 5 6]

    清单 2-8.

    将值关联到向量中

    ```


    在上面的例子中，我们表示“将值 6 放入索引 5”。请记住向量是零索引的，因此我们的新值 `6` 实际上会被添加到向量的末尾（因为当前不存在第五个索引）。


    注意


    如果你想在不指定索引的情况下向集合中添加值，请使用前面演示过的 `conj`。


    添加值固然不错，但如果你想删除值呢？一种方法是使用 `pop` 函数，它会返回向量的副本，但会移除最后一个元素。例如，请参见清单 2-9。


    ```

    (pop [1 2 3 4 5])

    ;; [1 2 3 4]

    清单 2-9.

    返回移除了最后一个元素的向量副本

    ```


    那么，如果你想从向量中间删除元素呢？你应该意识到，在使用基于 Lisp 的语言（如 Clojure）时，这需要相当复杂的步骤。


    你还应该意识到，如果你计划从向量中间删除元素，向量可能不是最佳的数据结构。对于需要以复杂方式操作数据的情况，你可能更希望使用哈希映射（详情请参见后面的“映射”部分）。


    在探讨如何从向量中间删除元素之前，我们先从类似但更容易实现的操作开始。假设你想对数据进行采样。你可以通过获取向量的一个“切片”来实现。例如，如果向量是 `[1
    2 3 4 5]`，并且你想要一个连续的样本，比如 `[2 3]`，你可以使用 `subvec` 函数，如清单 2-10 所示。


    ```

    (subvec [1 2 3 4 5] 1 3)

    清单 2-10.

    使用 subvec 获取数据切片

    ```


    在清单 2-10 中，代码描述为“从索引 1（在给定向量中对应值 `2`）开始，给我一份从该处到索引 3 的副本”，因此我们得到了那个特定范围 `[2 3]`。


    注意


    稍后我们会看到，还有更多用于处理序列/集合的函数，并且由于 Clojure 实现了序列抽象，我们可以在不同的数据结构上利用这些函数。


    回到之前关于如何从向量中间删除元素的问题，清单 2-11 中的代码片段演示了如何使用 `subvec` 从集合 `[1 2 3 4 5]` 中删除数字 `3`，最终得到向量
    `[1 2 4 5]`。


    现在，重要的是要意识到我将要演示一个相当不优雅的解决方案。但一旦你更熟悉 Clojure 及其可用函数后，你会发现这很容易被优化。为了可读性，我还会将这个不优雅的解决方案扩展到多行。


    ```

    (vec

    (concat

    (subvec [1 2 3 4 5] 0 2)

    (subvec [1 2 3 4 5] 3)))

    清单 2-11.

    使用 subvec 获取数据切片

    ```


    其工作原理是：我们使用 `subvec` 从向量的两端各取一个切片。因此 `(subvec [1 2 3 4 5] 0 2)` 返回 `[1 2]`，而 `(subvec
    [1 2 3 4 5] 3)` 返回 `[4 5]`。然后我们使用 `concat` 函数将这两个向量连接起来。最后，由于 `concat` 返回的是列表数据结构，我们使用
    `vec` 函数将返回的列表转换回向量。


    `concat` 函数返回列表而非向量这一事实其实不是什么大问题，因为 Clojure 能够将集合作为抽象来处理。但在某些情况下，确保返回的数据结构是特定格式可能很有用，这样你可以利用特定的性能优势。


    对于这个基本示例，我无需担心这一点。我在示例中仅将结果转换回向量类型，是为了避免结果类型与输入类型不同时造成混淆。


    我们将在后面的章节中讨论为什么会出现从向量到列表的转换，但目前只需知道我们不必过于担心集合类型之间的转换，是因为一个称为“序列抽象”的概念。


    一个更灵活且可复用的解决方案是创建一个函数来封装其复杂的实现逻辑。下面的示例代码（如清单 2-12 所示）是一个更灵活的解决方案，其逻辑被封装在我们自己定义的函数中，我们将该函数命名为
    `drop-nth`。


    我们函数的签名将是 `(drop-nth <n> <collection>)`，一个示例调用是 `(drop-nth 3 [:a :b :c :d])`。预期结果是向量中的第三个元素（`:c`）被移除。


    在我演示自定义 `drop-nth` 函数的实现之前，我建议如果你对编程和/或 Clojure 还不熟悉，或许可以先跳到下一节：“映射”。


    提供以下示例是为了演示如何解决之前需要从向量中间删除元素的问题。但该解决方案确实利用了 Clojure 语言的几个不同的高级特性。我建议你继续阅读，并在有机会了解更多关于该解决方案所利用的
    Clojure 特性后，再回来查看这个示例。


    ```

    (defn drop-nth [n coll]

    (->> coll

    (map vector (iterate inc 1))

    (remove #(zero? (mod (first %) n)))

    (map second)))

    (drop-nth 3 [:a :b :c :d])

    ;; (:a :b :d)

    清单 2-12.

    从向量中间移除元素

    ```


    那么，我将尝试分解这个示例，但再次强调，目前不必过于担心真正理解这些活动部件，因为我们将在后面的章节中学习每个特性。


    首先要提到的是 `->>` 的使用。这看起来像一个函数，但严格来说它实际上是一个宏。这个宏的名字是“线程最后宏”。虽然名字中包含“线程”一词，但这个宏与并发或多线程代码无关（并发和多线程代码涉及多个任务重叠以及同时执行多个任务，我们将在后面的章节中详细讨论）。


    宏 `->>` 将值（本例中为 `coll`）作为最后一个参数传递给调用中列出的每个形式。


    注意


    在 Clojure 中，“形式”基本上就是一个“表达式”，它是可以被求值以产生值的有效代码。

    '
- fmt: "So, the collection `[:a :b :c :d]` is passed into the `drop-nth` function\
    \ as the argument/symbol `coll` and is also passed as the last argument to `(map\
    \ vector (iterate inc 1))`. This means that once Clojure has compiled the form/expression,\
    \ it’ll end up looking something like `(map vector (iterate inc 1) coll)`.\n\n\
    The result of the previous `map` form is itself then passed as the last argument\
    \ to `(remove #(zero? (mod (first %) n)))`.\n\nOK, so that last form looks quite\
    \ complicated. We can see that we’re calling a function called `remove`, but what’s\
    \ all the stuff after it being passed as an argument? Well, that’s an “anonymous”\
    \ function.\n\nWhen we defined our `drop-nth` function, we gave it the name `drop-nth`.\
    \ But functions don’t need a name in order to be executable, and so for convenience,\
    \ instead of defining a function that will exist for the lifetime of the program,\
    \ we’ve defined an inline/anonymous function for the purpose of doing a quick\
    \ bit of processing and passing that result as the first argument to the `remove`\
    \ function.\n\nSo, looking back at that form, we can see that it’s really just\
    \ calling the `remove` function and passing it two arguments: the first being\
    \ an anonymous function `#(zero? (mod (first %) n))` and the second being the\
    \ result of the previous `map` form (which you don’t explicitly see being passed\
    \ as the second argument, thanks to the `->>` macro).\n\nFinally, the result of\
    \ the previous `remove` form is passed as the last argument to `(map second)`.\
    \ If we didn’t have the thread-last macro, then we’d be forced to write the (more\
    \ complex) set of nested forms shown in Listing [2-13](#A453572_1_En_2_Chapter.html#Par81)\
    \ (notice the order of the functions are now reversed, and it’s written “outside-in”).\n\
    \n```\n(defn drop-nth [n coll]\n  (map second\n    (remove #(zero? (mod (first\
    \ %) n))\n      (map vector (iterate inc 1) coll))))\n(drop-nth 3 [:a :b :c :d])\n\
    ;; (:a :b :d)\nListing 2-13.\nSolution Without the Use of the Thread-Last Macro\n\
    ```\n\nNow, ultimately what we’re aiming to do is to wrap all of this complex\
    \ logic inside a user-defined function called `drop-nth`, meaning it is ready\
    \ to be reused wherever we have the need to remove an item from a collection.\n\
    \nThe underlying principle of how the preceding code works is that the collection\
    \ you provide is turned into a structure that resembles (slightly) a hash map\
    \ (something we’ll look at in the next section, “Map”).\n\nSo, for example, the\
    \ collection `[:a :b :c :d]` would be converted into something like `([1 :a] [2\
    \ :b] [3 :c] [4 :d])`. You can try this yourself in the REPL (see Listing [2-14](#A453572_1_En_2_Chapter.html#Par85)).\n\
    \n```\n(map vector (iterate inc 1) [:a :b :c :d])\n;; ([1 :a] [2 :b] [3 :c] [4\
    \ :d])\nListing 2-14.\nConvert Collection into One with Numerical Access\n```\n\
    \nI’ll explain how the `map` function works in the next chapter, but for now it’ll\
    \ suffice to know that it loops over a given collection and passes each item in\
    \ the collection to a function that can mutate the value. This now gives us a\
    \ numerical hook into a particular element within the collection.\n\nThe next\
    \ line, `(remove #(zero? (mod (first %) n)))`, is a call to the `remove` function.\
    \ We now know that we’re passing the result of an anonymous function. The anonymous\
    \ function is executing the predicate function `zero?`.\n\nNote\n\nA “predicate”\
    \ sounds more complicated than it really is. A predicate is simply a function\
    \ that returns true or false.\n\nThe argument passed to `zero?` is an item from\
    \ the collection `([1 :a] [2 :b] [3 :c] [4 :d])`. The `remove` function executes\
    \ `zero?` against each element in the provided collection. You can try this yourself\
    \ by combining the preceding snippet with the output from the previous snippet,\
    \ as shown in Listing [2-15](#A453572_1_En_2_Chapter.html#Par90).\n\n```\n(remove\
    \ #(zero? (mod (first %) 3))\n  '([1 :a] [2 :b] [3 :c] [4 :d]))\n;; ([1 :a] [2\
    \ :b] [4 :d])\nListing 2-15.\nRemove Item from Collection Based on Anonymous Function\n\
    ```\n\nIn Listing [2-15](#A453572_1_En_2_Chapter.html#Par90), you’ll notice that\
    \ I swapped what was `n` in our `drop-nth` implementation for the value `3`. I\
    \ did that just for the purposes of demonstrating how this extracted snippet of\
    \ code works. I also needed to quote the list `'(...)` in the snippet; otherwise,\
    \ it would have caused an error.\n\nIf you wanted, you could also have tried it\
    \ with the original expression included instead of using the quoted `'([1 :a]\
    \ [2 :b] [3 :c] [4 :d])`. See Listing [2-16](#A453572_1_En_2_Chapter.html#Par93).\n\
    \n```\n(remove #(zero? (mod (first %) 3))\n  (map vector (iterate inc 1) [:a :b\
    \ :c :d]))\n;; ([1 :a] [2 :b] [4 :d])\nListing 2-16.\nRemove Item from Collection\
    \ Using Original Form\n```\n\nOK, we’ve diverted from our focus a bit there. Going\
    \ back to what we were saying before, the first element is `[1 :a]`, and in this\
    \ case the anonymous function is able to access that via the `%` symbol. It retrieves\
    \ the number `1` and divides it by `n` (and in the preceding example this was\
    \ the number `3` that was originally passed as an argument to `drop-nth`). It\
    \ does this calculation to verify if the numbers divide evenly; if they do, then\
    \ zero will be the result and the predicate (which is the `zero?` function) will\
    \ return `true`, meaning that the element should be removed from the collection.\n\
    \nThe only element in the collection that can divide evenly and result in a modulus\
    \ of zero would be `[3 :c]`. This means the overall result of the `remove` function\
    \ is `([1 :a] [2 :b] [4 :d])`.\n\nNow, we’ve successfully removed the requested\
    \ element. But we still need to convert our data structure back to its original\
    \ form. To do this, we move to the final line of the function `(map second)`,\
    \ which maps over the resulting collection, which is still a collection of sub\
    \ vectors—`([1 :a] [2 :b] [4 :d])`—and returns a modified version where it has\
    \ removed the first element from each nested collection by specifically retrieving\
    \ the “second” item.\n\nSo, the first nested collection is `[1 :a]`, meaning `(map\
    \ second)` will remove the 1 and leave `:a`. The overall function result is `(:a\
    \ :b :d)`, which is what we desired originally, the ability to remove a specific\
    \ element from the collection that wasn’t the start or end position.\n\nNow, one\
    \ concern with the current `drop-nth` implementation is that it will actually\
    \ remove every nth item. So, if you executed `(drop-nth 3 [:a :b :c :d :e :f :g\
    \ :h :i :j])`, then the result would be `(:a :b :d :e :g :h :j)`. Notice it didn’t\
    \ just remove the third item, but rather every third item. This might not necessarily\
    \ be what you wanted to have happen.\n\nThe solution, remembering the problem\
    \ was removing a single value from the middle of a collection, is to replace `#(zero?\
    \ (mod (first %) n))` with `#(= (first %) n)`, which causes all other iterations\
    \ to fail because only `3` will be “equal” to the third element (notice we replaced\
    \ the `zero?` predicate with the `=` function).\n\nBefore we move on, instead\
    \ of using `remove` we could have used another function called `filter` instead\
    \ (I demonstrate `filter` in the following chapter), but I think semantically\
    \ `remove` makes more sense. The only difference between the two functions is\
    \ in the use of the predicate.\n\nThe `filter` function will keep elements if\
    \ its predicate returns `true` (the semantics of the function are “filter out\
    \ elements I want”). The `remove` function will keep elements if its predicate\
    \ returns `false` (the semantics of the function are “remove elements that pass\
    \ the test”)."
