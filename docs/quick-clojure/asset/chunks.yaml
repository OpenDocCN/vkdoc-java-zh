    ## 重温标志


    好的，现在让我们回顾一下我们定义的标志，以确保我们理解它们的配置。让我们从 `-p` 标志开始。


    如果我执行 `integralist` 命令时没有定义任何标志，那么从输出中我会看到 `-p` (`--port`) 标志被赋予了默认值 `80`。回顾清单
    13-2，我们可以看到这是因为我们将 `:default` 属性配置为该值。这意味着如果我执行 `integralist -p 123`，我们期望在命令的输出中看到
    `123` 被分配给该标志（事实也确实如此）。这展示了我们如何通过定义默认值来使某些标志成为可选项。


    如果我执行 `integralist -p abc`，那么命令的输出将是一个错误（参见清单 13-11）。从错误信息中我们可以看到，它期望的是一个数字，但输入却是
    `abc`。如果我们回顾清单 13-2，可以看到这是因为我们为 `-p` 标志配置了一个 `:parse-fn` 属性，它允许我们将输入转换为另一种格式的值（在本例中，我们为
    `:parse-fn` 分配了一个匿名函数，该函数尝试将输入转换为整数）。


    ```

    [解析选项 "-p abc" 时出错：java.lang.NumberFormatException: 输入字符串: "abc"]

    清单 13-11.

    为 -p 标志分配了错误类型导致的错误

    ```


    与 `:parse-fn` 属性类似的是 `:validate` 属性，它允许我们验证输入的值是否是我们期望/需要的。在这种情况下，我们希望确保数字在特定范围内。如果我传递
    `65535` 作为值，那么一切都会正常工作。但如果我传递 `99999`，那么我们会看到一个错误（清单 13-12）。


    ```

    [验证 "-p 99999" 失败：必须是介于 0 和 65536 之间的数字]

    清单 13-12.

    为 -p 标志分配了错误值导致的错误

    ```


    现在，如果我们看一下 `-v` 标志，会发现它有两个我们尚未解释的属性：`:id` 和 `:assoc-fn`。`:id` 属性仅在您未定义长标志时才需要。这是因为
    cli 工具有一个约定，即它们使用长标志的名称作为 `:options` 映射数据结构中的键。对于 `-v` 标志，我们没有提供长标志（因此使用了 `nil`
    值）。


    在某些命令行工具中，您会看到一种约定，即定义的标志实际上可以是动态的。例如，如果您的工具允许显示调试信息，您可能希望用户能够根据“级别”配置他们看到的调试信息量。这正是我们试图通过工具中的详细程度标志
    (`-v`) 来表示的。因此，如果您执行 `integralist -v`，您会看到详细程度值被设置为 `1`，但如果您将标志改为 `-vv`，它将被设置为
    `2`，同样，如果您将标志改为 `-vvv`，它将被设置为 `3`（依此类推）。


    这就是 `:assoc-fn` 的用途。它接受整个 `:options` 映射数据结构以及标志的 `:id` 及其当前值（在我们的例子中，设置了 `:default`
    值为 `0`）。有了这些信息，我们可以在清单 13-2 中看到，我们只是在 `:options` 映射中递增了标志的值。


    注意


    我们不会回顾 `-x` 或 `-h` 标志，因为它们实际上只使用了我们已经见过的 `:id` 和 `:default` 属性。


    ## 总结


    在本章中，我们简要介绍了 Clojure 的 `tools.cli` 中一些最重要的特性。我们学习了如何为命令行应用程序创建外壳，该外壳定义了一组具有不同条件和行为期望的标志。这包括动态标志，例如用于定义调试详细级别的
    `-v`，以及 `-p` 标志，该标志要求其值可以被强制转换为整数，并且必须在特定的数值范围内。`tools.cli` 中还有其他可用的特性，我建议您去探索一下如何利用它们。


    另一个涉及的内容是如何通过 Leiningen（一个 Jar 包或二进制文件）运行 cli。最后两个选项意味着您可以获取单个打包文件（或二进制文件），并轻松地将您的应用程序分发给任何安装了
    Java 的系统。


