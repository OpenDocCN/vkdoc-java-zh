    来重命名 `c` 和 `d`。选择权在你手中。


    但假设我们决定引入 `a` 变量。这意味着我们需要同时使用 `:only` 和 `:rename`。我们可以在清单 9-18 中看到一个示例，我们从 `foo.baz`
    中引入 `a` 变量并将其重命名为 `new-a`。使用这种格式，我们可以引入所有需要的依赖项，而无需担心任何冲突。


    ```

    (ns foo.core

    (:use foo.bar)

    (:use [foo.baz :only [d] :rename {a new-a}])

    (:gen-class))

    清单 9-18.

    使用 :only 引入特定变量

    ```


    ### 其他内容？


    虽然我并非追求面面俱到，但可能还是值得再提几件事。首先，你可以使用另一个宏来代替 `ns` 宏（我们之前实际上见过它，但我故意没有说明）。它叫做 `in-ns`。它们之间唯一的真正区别是
    `in-ns` 不提供对任何库规范的访问（即 `:use`、`:require`、`:as`、`:refer` 或 `:all`）。


    第二件值得一提的事情是使用库规范 `:verbose`、`:reload` 和 `:reload-all`。这些仅适用于 `require` 函数及其 `ns`
    变体 `(:require ...)`。例如，如果添加了 `:verbose`，那么 Clojure 会打印出与 `load` 函数调用相关的任何信息。这可以通过显示底层正在进行的调用来帮助阐明
    `:require` 调用在内部做了什么。


    `:reload` 库规范确保即使一个库已被加载（例如，被另一个命名空间加载），如果它有任何更改，也应该重新加载。我自己没有理由使用这个行为，除了在 REPL
    中反复试验并不断加载依赖项的时候。`:reload-all` 库规范的工作方式相同，但它会递归地检查所有已加载库的所有依赖项。


    最后一项是 `import` 命令，它对于导入 Java 类和接口非常有用。清单 9-19 演示了其用法的一个基本示例。


    ```

    (import java.util.Date)

    (def now (Date.))

    (str now) ;; "Thu Jun 29 09:24:04 BST 2017"

    清单 9-19.

    导入 Java 类的示例

    ```


    ## 总结


    在本章中，我们学习了各种命名空间符号和宏，如何在 REPL 中动态创建新的命名空间，以及如何在现有命名空间之间切换并在这些空间中执行代码。可能最重要的是，我们理解了如何在命名空间之间内联变量，以及如何通过可用的各种库规范选项来避免冲突。


    在下一章中，我们将研究如何利用一种称为宏的特性来操作 Clojure 语言本身。这是一个强大的特性，我们必须小心使用，以免给我们的代码库增加复杂性和混乱。

    '
- fmt: "# 10. Macros\n\nArguably one of the most interesting features of Clojure is\
    \ its ability to provide functionality that allows the user to redefine the language\
    \ and add their own features that aren’t available by default. I mean, how many\
    \ times have you written some code (in whatever language, but let’s say JavaScript)\
    \ and thought “I really wish I had feature X from language Y”?\n\nWith a language\
    \ such as JavaScript, I’m willing to bet that happens a lot. I’m sure there will\
    \ be some JavaScript developers who would counter with a point about compilers\
    \ being available that let you compile valid ES7 code down to ES5 code (for example).\
    \ But that still doesn’t account for compiling ES5 code down to ES3, which in\
    \ some situations you can’t even do (because of restrictions in the ES3 language\
    \ specification). Not to mention there are now two sets of compilation steps to\
    \ make sure your code actually works across as wide a range of devices as possible.\n\
    \n> **Note**  \n> Progressive enhancement[¹](#A453572_1_En_10_Chapter.html#Fn1)\
    \ can help the situation, but the work involved with implementing progressive\
    \ enhancement is not trivial, and compared with having native support within the\
    \ language to facilitate redefining the language, that’s an immensely powerful\
    \ concept.\n\nBut even if you are a JS developer and are able to take advantage\
    \ of one of the popular compilers available, maybe you can’t find a compiler that\
    \ offers you the features that you want. In that situation, you might end up stumbling\
    \ across something like SweetJS,[²](#A453572_1_En_10_Chapter.html#Fn2) which is\
    \ a compiler that allows you to define your own features. But this introduces\
    \ yet another barrier to getting work done, as you have an external dependency\
    \ to manage.\n\nThe ability to utilize Clojure’s macro feature allows the core\
    \ Clojure library to stay compact and focused while allowing developers to add\
    \ their own features to the language with the safety of knowing that the macro\
    \ system is natively part of the language and not some external tool that could\
    \ potentially end up unsupported.\n\n> **Note**  \n> The Clojure authors have\
    \ demonstrated (a few times in the past) a habit of assimilating popular abstractions\
    \ built using the macro system back into the official Clojure codebase. This means\
    \ if you create something useful using macros, then your work could eventually\
    \ end up being used by all Clojure devs.\n\nLet’s start our understanding of macros\
    \ by reviewing two specific macros that we’ve already used in previous chapters\
    \ and that are part of the core Clojure library: `->` and `->>`.\n\n```\n(-> \
    \ 6 (/ 2) (+ 10))\n;; 13\n(->> 6 (/ 2) (+ 10))\n;; 31/3\n```\n\n*Listing 10-1.\
    \ Examples of the `->` and `->>` Macros*\n\nIn Listing [10-1](#A453572_1_En_10_Chapter.html#Par9),\
    \ we have two lines of code that are very similar and yet return very different\
    \ values. The only difference between the two lines is the extra chevron character\
    \ `>` on the second line. This extra character causes the equation to change,\
    \ but how?\n\nIn Clojure, `->` is known as the “thread first” macro, while `->>`\
    \ is known as the “thread last” macro. For the thread first macro, the first argument\
    \ (i.e., `6` in our example) is passed as the first argument to each function\
    \ call that follows. For the thread last macro, the first argument (again, `6`\
    \ in our example) is passed as the last argument to each function call that follows.\n\
    \nTo more clearly visualize how the macro system works, we can utilize a function\
    \ called `macroexpand` to show us the long-form version of the macro (basically,\
    \ it displays what we would have written ourselves if the macro system didn’t\
    \ exist).\n\n```\n(macroexpand '(->  6 (/ 2) (+ 10)))\n;; (+ (/ 6 2) 10)\n(macroexpand\
    \ '(->> 6 (/ 2) (+ 10)))\n;; (+ 10 (/ 2 6))\n```\n\n*Listing 10-2. Expanding a\
    \ Macro Using `macroexpand`*\n\nTo use the `macroexpand` function, as seen in\
    \ Listing [10-2](#A453572_1_En_10_Chapter.html#Par13), we needed to provide it\
    \ the expression we were running earlier. But how do we prevent those expressions\
    \ from actually being executed and the result of the expressions being passed\
    \ to `macroexpand`? Well, the solution is to quote the expression, and we do this\
    \ by placing a single quote before the first parenthesis of the expression form.\n\
    \n> **Note**  \n> We could have wrapped the expression in a function call to `quote`;\
    \ e.g., `(quote (-> 6 (/ 2) (+ 10)))`, but `'` is more succinct.\n\nSo, we can\
    \ see that by passing in `'(-> 6 (/ 2) (+ 10))` we get `(+ (/ 6 2) 10)` back.\
    \ The return value is the macro expanded, and, similarly, in the second line,\
    \ if we pass in `'(->> 6 (/ 2) (+ 10))` we get back the expanded result of `(+\
    \ 10 (/ 2 6))`.\n\nNotice how with “thread first” (`->`) the first argument `6`\
    \ is now the first argument to the division function `/` and that the result of\
    \ calling that function is itself now the first expression passed to the call\
    \ to the addition function `+`.\n\nWith “thread last” (`->>`), we have the first\
    \ argument `6` passed as the last argument to the division function, and the result\
    \ of calling that function is then passed into the `+` function as the last argument.\n\
    \n## Expanding All the Way Down\n\nThe `macroexpand` function is useful for ensuring\
    \ all macros within the quoted expression are expanded, but that doesn’t include\
    \ nested macros inside a macro. Let me explain by way of an example (see Listing\
    \ [10-3](#A453572_1_En_10_Chapter.html#Par20)).\n\n```\n(cond (even? 2) \"even\"\
    \ :else \"odd\") ;; \"even\"\n(cond (even? 1) \"even\" :else \"odd\") ;; \"odd\"\
    \n(macroexpand '(cond (even? 2) \"even\" :else \"odd\"))\n;; (if (even? 2) \"\
    even\" (clojure.core/cond :else \"odd\"))\n```\n\n*Listing 10-3. `macroexpand`\
    \ Doesn’t Include Nested Macros*\n\nIn Listing [10-3](#A453572_1_En_10_Chapter.html#Par20),\
    \ we have a `cond` macro that, when passed a predicate, will return either `\"\
    even\"` or `\"odd\"` depending on the result of the predicate. In this case, if\
    \ we pass in the value `2`, then the return result is `\"even\"`, and if we pass\
    \ in `1`, then the value falls through to the `:else` case, and so the return\
    \ value becomes `\"odd\"`.\n\nAs you can see from the result of the `macroexpand`\
    \ function, we get back an expanded version of the `cond` macro. But we have an\
    \ issue: the `cond` macro internally calls itself again, and so for us to see\
    \ a truly representative expansion of the `cond` macro, we should use the `macroexpand-all`\
    \ function instead.\n\nTo access the `macroexpand-all` function, you’ll need to\
    \ load it into the REPL from the `clojure.walk` namespace (as it’s not part of\
    \ the `core` namespace). The `walk` namespace is part of the standard Clojure\
    \ language, so you don’t need to update the project dependencies like you did\
    \ with `core.match` and `core.async`. Instead, you use the `require` function\
    \ either inside the REPL or from the top of your code file.\n\n```\n(require '[clojure.walk\
    \ :as w])\n```\n\n*Listing 10-4. Requiring the `clojure.walk` Namespace*\n\nOnce\
    \ you have loaded the `clojure.walk` namespace (see Listing [10-4](#A453572_1_En_10_Chapter.html#Par24))\
    \ you should be able to reference the `macroexpand-all` function to fully expand\
    \ the `cond` macro example from earlier. See Listing [10-5](#A453572_1_En_10_Chapter.html#Par26).\n\
    \n```\n(w/macroexpand-all '(cond (even? 2) \"even\" :else \"odd\"))\n;; (if (even?\
    \ 2) \"even\" (if :else \"odd\" nil))\n```\n\n*Listing 10-5. Expand `cond` Example\
    \ with `macroexpand-all`*\n\n## Writing Your Own Macros\n\nThere are five aspects\
    \ to creating your own macro, and these depend on how complex the macro needs\
    \ to be:\n\n1. Define the macro (`defmacro`)\n2. Quoting (`'`)\n3. Syntax quoting\
    \ (`` ` ``)\n4. Unquoting (`~`)\n5. Unquote splicing (`~@`)\n6. Generating symbols\
    \ (`gensym`, `#`)\n\nInterestingly, items 2-5 are all usable from outside of a\
    \ macro, and so I’m going to demonstrate those first. After that, I’m going to\
    \ dissect a custom macro in order to understand how it works and what some of\
    \ the typical challenges are that we can expect to face."
  raw: '# 10. Macros


    Arguably one of the most interesting features of Clojure is its ability to provide
    functionality that allows the user to redefine the language and add their own
    features that aren’t available by default. I mean, how many times have you written
    some code (in whatever language, but let’s say JavaScript) and thought “I really
    wish I had feature X from language Y”?


    With a language such as JavaScript , I’m willing to bet that happens a lot. I’m
    sure there will be some JavaScript developers who would counter with a point about
    compilers being available that let you compile valid ES7 code down to ES5 code
    (for example). But that still doesn’t account for compiling ES5 code down to ES3,
    which in some situations you can’t even do (because of restrictions in the ES3
    language specification). Not to mention there are now two sets of compilation
    steps to make sure your code actually works across as wide a range of devices
    as possible.


    Note


    Progressive enhancement[¹](#A453572_1_En_10_Chapter.html#Fn1) can help the situation,
    but the work involved with implementing progressive enhancement is not trivial,
    and compared with having native support within the language to facilitate redefining
    the language, that’s an immensely powerful concept.


    But even if you are a JS developer and are able to take advantage of one of the
    popular compilers available, maybe you can’t find a compiler that offers you the
    features that you want. In that situation, you might end up stumbling across something
    like SweetJS ,[²](#A453572_1_En_10_Chapter.html#Fn2) which is a compiler that
    allows you to define your own features. But this introduces yet another barrier
    to getting work done, as you have an external dependency to manage.


    The ability to utilize Clojure’s macro feature allows the core Clojure library
    to stay compact and focused while allowing developers to add their own features
    to the language with the safety of knowing that the macro system is natively part
    of the language and not some external tool that could potentially end up unsupported.


    Note


    The Clojure authors have demonstrated (a few times in the past) a habit of assimilating
    popular abstractions built using the macro system back into the official Clojure
    codebase. This means if you create something useful using macros, then your work
    could eventually end up being used by all Clojure devs.


    Let’s start our understanding of macros by reviewing two specific macros that
    we’ve already used in previous chapters and that are part of the core Clojure
    library: `->` and `->>`.


    ```

    (->  6 (/ 2) (+ 10))

    ;; 13

    (->> 6 (/ 2) (+ 10))

    ;; 31/3

    Listing 10-1.

    Examples of the -> and ->> Macros

    ```


    In Listing [10-1](#A453572_1_En_10_Chapter.html#Par9), we have two lines of code
    that are very similar and yet return very different values. The only difference
    between the two lines is the extra chevron character `>` on the second line. This
    extra character causes the equation to change, but how?


    In Clojure, `->` is known as the “thread first ” macro, while `->>` is known as
    the “thread last ” macro. For the thread first macro, the first argument (i.e.,
    `6` in our example) is passed as the first argument to each function call that
    follows. For the thread last macro , the first argument (again, `6` in our example)
    is passed as the last argument to each function call that follows.


    To more clearly visualize how the macro system works, we can utilize a function
    called `macroexpand` to show us the long-form version of the macro (basically,
    it displays what we would have written ourselves if the macro system didn’t exist).


    ```

    (macroexpand ''(->  6 (/ 2) (+ 10)))

    ;; (+ (/ 6 2) 10)

    (macroexpand ''(->> 6 (/ 2) (+ 10)))

    ;; (+ 10 (/ 2 6))

    Listing 10-2.

    Expanding a Macro Using macroexpand

    ```


    To use the `macroexpand` function , as seen in Listing [10-2](#A453572_1_En_10_Chapter.html#Par13),
    we needed to provide it the expression we were running earlier. But how do we
    prevent those expressions from actually being executed and the result of the expressions
    being passed to `macroexpand`? Well, the solution is to quote the expression,
    and we do this by placing a single quote before the first parenthesis of the expression
    form.


    Note


    We could have wrapped the expression in a function call to `quote`; e.g., `(quote
    (-> 6 (/ 2) (+ 10)))`, but `''` is more succinct.


    So, we can see that by passing in `''(-> 6 (/ 2) (+ 10))` we get `(+ (/ 6 2) 10)`
    back. The return value is the macro expanded, and, similarly, in the second line,
    if we pass in `''(->> 6 (/ 2) (+ 10))` we get back the expanded result of `(+
    10 (/ 2 6))`.


    Notice how with “thread first ” (`->`) the first argument `6` is now the first
    argument to the division function `/` and that the result of calling that function
    is itself now the first expression passed to the call to the addition function
    `+`.


    With “thread last” (`->>`), we have the first argument `6` passed as the last
    argument to the division function, and the result of calling that function is
    then passed into the `+` function as the last argument.


    ## Expanding All the Way Down


    The `macroexpand` function is useful for ensuring all macros within the quoted
    expression are expanded, but that doesn’t include nested macros inside a macro.
    Let me explain by way of an example (see Listing [10-3](#A453572_1_En_10_Chapter.html#Par20)).


    ```

    (cond (even? 2) "even" :else "odd") ;; "even"

    (cond (even? 1) "even" :else "odd") ;; "odd"

    (macroexpand ''(cond (even? 2) "even" :else "odd"))

    ;; (if (even? 2) "even" (clojure.core/cond :else "odd"))

    Listing 10-3.

    Macroexpand Doesn’t Include Nested Macros

    ```


    In Listing [10-3](#A453572_1_En_10_Chapter.html#Par20), we have a `cond` macro
    that, when passed a predicate, will return either `"even"` or `"odd"` depending
    on the result of the predicate. In this case, if we pass in the value `2`, then
    the return result is `"even"`, and if we pass in `1`, then the value falls through
    to the `:else` case, and so the return value becomes `"odd"`.


    As you can see from the result of the `macroexpand` function, we get back an expanded
    version of the `cond` macro. But we have an issue: the `cond` macro internally
    calls itself again, and so for us to see a truly representative expansion of the
    `cond` macro, we should use the `macroexpand-all` function instead.


    To access the `macroexpand-all` function, you’ll need to load it into the REPL
    from the `clojure.walk` namespace (as it’s not part of the `core` namespace).
    The `walk` namespace is part of the standard Clojure language, so you don’t need
    to update the project dependencies like you did with `core.match` and `core.async`.
    Instead, you use the `require` function either inside the REPL or from the top
    of your code file.


    ```

    (require ''[clojure.walk :as w])

    Listing 10-4.

    Requiring the clojure.walk Namespace

    ```


    Once you have loaded the `clojure.walk` namespace (see Listing [10-4](#A453572_1_En_10_Chapter.html#Par24))
    you should be able to reference the `macroexpand-all` function to fully expand
    the `cond` macro example from earlier. See Listing [10-5](#A453572_1_En_10_Chapter.html#Par26).


    ```

    (w/macroexpand-all ''(cond (even? 2) "even" :else "odd"))

    ;; (if (even? 2) "even" (if :else "odd" nil))

    Listing 10-5.

    Expand cond Example with macroexpand-all

    ```


    ## Writing Your Own Macros


    There are five aspects to creating your own macro, and these depend on how complex
    the macro needs to be:


    *   Define the macro (`defmacro`)

    *   Quoting (`''`)

    *   Syntax quoting (`` ` ``)

    *   Unquoting (`∼`)

    *   Unquote splicing (`∼@`)

    *   Generating symbols (`gensym`, `#`)


    Interestingly, items 2-5 are all usable from outside of a macro, and so I’m going
    to demonstrate those first. After that, I’m going to dissect a custom macro in
    order to understand how it works and what some of the typical challenges are that
    we can expect to face.'
  trans: '

    # 10. 宏


    可以说，Clojure 最有趣的特性之一，是其提供了一种功能，允许用户重新定义语言，并添加默认情况下不可用的自定义特性。我的意思是，你有多少次在编写代码（无论用什么语言，比如
    JavaScript）时，会想“我真希望我有 Y 语言的 X 特性”？


    对于像 JavaScript 这样的语言，我敢打赌这种情况经常发生。我相信会有一些 JavaScript 开发者反驳说，现在有可用的编译器，可以让你将有效的
    ES7 代码编译成 ES5 代码（例如）。但这仍然无法解决将 ES5 代码编译成 ES3 代码的问题，在某些情况下你甚至无法做到这一点（因为 ES3 语言规范的限制）。更不用说现在需要两套编译步骤，才能确保你的代码能在尽可能广泛的设备上正常工作。


    注意


    渐进增强¹ 可以改善这种情况，但实现渐进增强所涉及的工作并不简单，而且与语言本身原生支持重新定义语言相比，这是一个极其强大的概念。


    但即使你是一名 JS 开发者，并且能够利用现有的某个流行编译器，也可能找不到一个能提供你所需特性的编译器。在这种情况下，你最终可能会偶然发现像 SweetJS
    ² 这样的东西，它是一个允许你定义自己特性的编译器。但这又给完成工作带来了另一个障碍，因为你需要管理一个外部依赖。


    利用 Clojure 宏特性的能力，使得 Clojure 核心库能够保持紧凑和专注，同时允许开发者向语言添加自己的特性，并且可以放心地知道宏系统是语言的原生组成部分，而不是某个可能最终失去支持的外部工具。


    注意


    Clojure 的作者们（过去曾多次）表现出一种习惯，即把使用宏系统构建的流行抽象吸收回官方的 Clojure 代码库中。这意味着，如果你使用宏创建了有用的东西，那么你的工作最终可能会被所有
    Clojure 开发者使用。


    让我们通过回顾两个我们在前几章中已经使用过、并且是 Clojure 核心库一部分的特定宏：`->` 和 `->>`，来开始理解宏。


    ```

    (->  6 (/ 2) (+ 10))

    ;; 13

    (->> 6 (/ 2) (+ 10))

    ;; 31/3

    代码清单 10-1.

    -> 和 ->> 宏的示例

    ```


    在代码清单 10-1 中，我们有两行非常相似但返回截然不同值的代码。这两行代码的唯一区别是第二行多了一个尖括号字符 `>`。这个额外的字符改变了等式，但它是如何做到的呢？


    在 Clojure 中，`->` 被称为“线程优先”宏，而 `->>` 被称为“线程最后”宏。对于线程优先宏，第一个参数（即我们示例中的 `6`）作为第一个参数传递给后续的每个函数调用。对于线程最后宏，第一个参数（同样是我们示例中的
    `6`）作为最后一个参数传递给后续的每个函数调用。


    为了更清晰地理解宏系统的工作原理，我们可以使用一个名为 `macroexpand` 的函数来展示宏的完整形式（基本上，它展示了如果宏系统不存在，我们自己会编写的内容）。


    ```

    (macroexpand ''(->  6 (/ 2) (+ 10)))

    ;; (+ (/ 6 2) 10)

    (macroexpand ''(->> 6 (/ 2) (+ 10)))

    ;; (+ 10 (/ 2 6))

    代码清单 10-2.

    使用 macroexpand 展开宏

    ```


    要使用 `macroexpand` 函数，如代码清单 10-2 所示，我们需要提供我们之前运行的表达式。但是，我们如何防止这些表达式被实际执行，并且将表达式的结果传递给
    `macroexpand` 呢？解决方案是引用该表达式，我们通过在表达式形式的第一个左括号前放置一个单引号来实现这一点。


    注意


    我们也可以将表达式包装在对 `quote` 的函数调用中；例如，`(quote (-> 6 (/ 2) (+ 10)))`，但 `''` 更简洁。


    所以，我们可以看到，通过传入 `''(-> 6 (/ 2) (+ 10))`，我们得到了 `(+ (/ 6 2) 10)`。返回值是宏展开后的结果，类似地，在第二行，如果我们传入
    `''(->> 6 (/ 2) (+ 10))`，我们会得到展开后的结果 `(+ 10 (/ 2 6))`。


    注意“线程优先”（`->`）是如何将第一个参数 `6` 作为除法函数 `/` 的第一个参数，并且调用该函数的结果本身现在作为第一个表达式传递给加法函数 `+`
    的调用。


    对于“线程最后”（`->>`），我们将第一个参数 `6` 作为最后一个参数传递给除法函数，并且调用该函数的结果随后作为最后一个参数传递给 `+` 函数。


    ## 一路展开到底


    `macroexpand` 函数对于确保引号表达式中的所有宏都被展开很有用，但这不包括宏内部的嵌套宏。让我通过一个例子来解释（参见代码清单 10-3）。


    ```

    (cond (even? 2) "even" :else "odd") ;; "even"

    (cond (even? 1) "even" :else "odd") ;; "odd"

    (macroexpand ''(cond (even? 2) "even" :else "odd"))

    ;; (if (even? 2) "even" (clojure.core/cond :else "odd"))

    代码清单 10-3.

    Macroexpand 不包含嵌套宏

    ```


    在代码清单 10-3 中，我们有一个 `cond` 宏，当传入一个谓词时，它会根据谓词的结果返回 `"even"` 或 `"odd"`。在这种情况下，如果我们传入值
    `2`，则返回结果是 `"even"`；如果我们传入 `1`，则该值会落入 `:else` 分支，因此返回值变为 `"odd"`。


    从 `macroexpand` 函数的结果可以看出，我们得到了 `cond` 宏的一个展开版本。但我们遇到了一个问题：`cond` 宏内部再次调用了自身，因此，为了看到
    `cond` 宏真正具有代表性的展开，我们应该改用 `macroexpand-all` 函数。


    要访问 `macroexpand-all` 函数，你需要从 `clojure.walk` 命名空间将其加载到 REPL 中（因为它不是 `core` 命名空间的一部分）。`walk`
    命名空间是标准 Clojure 语言的一部分，因此你不需要像对 `core.match` 和 `core.async` 那样更新项目依赖。相反，你可以在 REPL
    内部或代码文件顶部使用 `require` 函数。


    ```

    (require ''[clojure.walk :as w])

    代码清单 10-4.

    引入 clojure.walk 命名空间

    ```


    一旦你加载了 `clojure.walk` 命名空间（参见代码清单 10-4），你应该能够引用 `macroexpand-all` 函数来完全展开之前的 `cond`
    宏示例。参见代码清单 10-5。


    ```

    (w/macroexpand-all ''(cond (even? 2) "even" :else "odd"))

    ;; (if (even? 2) "even" (if :else "odd" nil))

    代码清单 10-5.

    使用 macroexpand-all 展开 cond 示例

    ```


    ## 编写你自己的宏


    创建自己的宏有五个方面，这取决于宏需要有多复杂：


    *   定义宏 (`defmacro`)

    *   引用 (`''`)

    *   语法引用 (`` ` ``)

    *   取消引用 (`∼`)

    *   取消引用拼接 (`∼@`)

    *   生成符号 (`gensym`, `#`)


    有趣的是，第 2-5 项都可以在宏外部使用，因此我将首先演示它们。之后，我将剖析一个自定义宏，以理解它是如何工作的，以及我们可能面临的一些典型挑战。

    '
- fmt: '# Quoting ''


    Back in Chapter [2](#A453572_1_En_2_Chapter.html), when we were looking at the
    list data structure, I noted that some readers might have been curious as to the
    point of the single quote in front of the list. As mentioned then, it is known
    as quoting the data structure so that the Clojure compiler doesn’t attempt to
    evaluate it.


    ```

    (def l ''(1 2 3))

    l

    ;; (1 2 3)

    Listing 10-6.

    Quoting a List Data Structure to Prevent Evaluation

    ```


    In Listing [10-6](#A453572_1_En_10_Chapter.html#Par36), you should notice that
    the value assigned to the variable `l` is actually a list data structure, `(1
    2 3)`, and not the result of the Clojure compiler trying to execute `1` as a function
    and passing `2`, `3` as function arguments (which wouldn’t have worked, as there
    is no such function in Clojure called `1`).


    Quoting is a useful feature to have for those times when, from an algorithm perspective,
    you really need to utilize a genuine linked list data structure (as opposed to
    a vector or set, for example).


    **Note**


    There are other ways to create a linked list data structure: `(list 1 2 3)` and
    `(quote (1 2 3))` are two popular options, although the `quote` function can be
    used on any type of Clojure form.


    # Syntax Quoting `


    Syntax quoting works the same as the standard quoting functionality, the only
    difference being it converts each expression into a fully qualified namespace.


    ```

    (def l ''(1 2 3))

    `(+ l)

    ;; (clojure.core/+ user/l)

    Listing 10-7.

    Syntax Quoting Results in Fully Qualified Namespaces

    ```


    You can see in Listing [10-7](#A453572_1_En_10_Chapter.html#Par41) that we’ve
    first defined the `l` variable to be assigned a literal list data structure. From
    there, we’ve used a backtick (`` ` ``) in front of our expression `(+ l)`, and
    the result is a qualified namespaced version of that expression.


    This means the `+` function becomes `clojure.core/+` and the `l` variable becomes
    `user/l` (in this case, I executed the example code from within the REPL environment).


    **Note**


    If you tried to evaluate the resulting expression `(clojure.core/+ user/l)` you
    would find the code doesn’t work. This is because we need to flatten (i.e., splat)
    the list elements so they are no longer contained within parentheses but are inlined
    arguments to the `+` function. I’ll demonstrate how to do this shortly using the
    unquote splicing syntax.


    # Unquoting ∼


    When you quote an expression, it means we want the compiler to not evaluate it
    or any of its sub-expressions. But every now and then you’ll want the majority
    of your expression to be quoted (i.e., not evaluated) and yet maybe some small
    nested parts to be evaluated still.


    ```

    (def l ''(1 2 3))

    `(+ ∼l)

    ;; (clojure.core/+ (1 2 3))

    Listing 10-8.

    Evaluate Nested Expressions, but Not Entire Expression

    ```


    What we can see in Listing [10-8](#A453572_1_En_10_Chapter.html#Par46) is that
    we’ve quoted the expression using a backtick, but then we’ve used the tilde character
    (`∼`) to “unquote” the `l` variable so that it ends up being evaluated by the
    Clojure compiler. This means we now get a namespaced `+` function unevaluated,
    followed by the expression `(1 2 3)`.


    **Note**


    The output from Listing [10-8](#A453572_1_En_10_Chapter.html#Par46) is non-functional
    because the expression `(1 2 3)` is invalid. There is no function `1` found in
    the core namespace.


    # Unquote Splicing ∼@


    In the previous examples, we’ve demonstrated specific features that have produced
    non-functional results. Let’s take a moment now to resolve that issue and to turn
    the next example into one that can execute successfully.


    ```

    (def l ''(1 2 3))

    `(+ ∼@l)

    ;; (clojure.core/+ 1 2 3)

    (clojure.core/+ 1 2 3)

    ;; 6

    (eval `(+ ∼@l))

    ;; 6

    Listing 10-9.

    Splat Evaluated Sequence Using Unquote Splicing

    ```


    So, in Listing [10-9](#A453572_1_En_10_Chapter.html#Par50), we can see that we’re
    using the backtick quoting syntax to ensure that our expression isn’t evaluated.
    But in this example, we want the list data structure (the one assigned to the
    `l` variable) to not be placed next to the `+` function as a list, but instead
    placed there as individual arguments.


    To achieve the goal of evaluating the list data structure (so it’s not placed
    next to the `+` as `user/l`) and then flattening the list data structure, we utilize
    not the unquote tilde but the unquote splicing `∼@`. We can see this returns us
    `(clojure.core/+ 1 2 3)`, which you can paste into your REPL and execute to see
    it produce the correct result of 6.


    If you wanted to programmatically evaluate the result of the form `` `(+ ∼@l)
    `` you would need to wrap it in a call to the `eval` function (as demonstrated
    in Listing [10-9](#A453572_1_En_10_Chapter.html#Par50)).


    **Note**


    You can’t use unquote splicing without the quote backtick syntax, as this would
    make it very difficult for the Clojure compiler to understand what should or shouldn’t
    be evaluated.


    # Generating Symbols gensym/#


    When using macros, you may eventually stumble across the problem of variable bindings
    (both in the macro and in the containing local scope) conflicting with each other.
    To work around this issue, you can generate a unique symbol within the macro by
    utilizing the `gensym` function.


    **Note**


    It’s important to realize that `gensym` will always return a fresh unique value,
    so you can also provide a prefix string that helps to identify the symbol while
    debugging.


    ```

    (gensym)

    ;; G__791

    (gensym "hello")

    ;; hello794

    `hello#

    ;; hello__803__auto__

    Listing 10-10.

    Using gensym to Create Unique Identifier

    ```


    In Listing [10-10](#A453572_1_En_10_Chapter.html#Par57), the last example uses
    the `#` shorthand syntax for `gensym`, which means we’re required to use the quote
    `` ` `` syntax; otherwise, the compiler won’t know what to do (this is because
    a `#` is a valid character for a symbol).


    It’s also worth being aware that the `#` variation ensures the same identifier
    is used throughout the quoted expression, whereas each reference to `gensym` would
    be a new value.'
