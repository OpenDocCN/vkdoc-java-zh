  trans: "\n## 可重试\n\n对于所列类型之一，若要被视为“可重试”，必须发生了冲突（例如，已应用了多项更改），并且解决冲突必须需要重试该操作。\n\n\
    解决冲突的一种实现方式是 CAS（比较并交换）操作，这是一种底层操作，语言 API 不会直接暴露它。一个典型场景是，当尝试更新某个值因跨线程冲突（例如，两个线程同时更新同一个值）而失败时。\n\
    \nCAS 操作的“比较”部分首先检查是否有任何变化。例如，它会检查当前值是否已被另一个线程篡改。如果是这种情况，则会执行该操作的“交换”部分，并应用请求的更新。另一方面，如果\
    \ CAS 检测到已经发生了更改，那么它将获取更新后的值并重试该操作。\n\n注意\n\nSTM（我们稍后会介绍）也被认为是可重试的，尽管它会重试操作，但这与\
    \ CAS 本身（一种底层原语）无关。\n\n## 协调\n\n对于所列类型之一，若要被视为“协调”，我们需要使用 Clojure 内置的 STM（软件事务内存）。STM\
    \ 会验证跨线程数据的一致性。\n\nSTM 和 CAS 之间的区别在于，STM 会协调（即检查）多个引用，而 CAS 只关心它自己的引用。\n\n“引用”这个概念目前可能无助于区分\
    \ CAS 和 STM，所以，别担心，稍后当我们研究如何创建和使用 `Ref` 类型时，我会更详细地讨论 STM，届时 STM 如何被视为“协调”而 CAS\
    \ 被视为“非协调”应该会更清晰。\n\n## 异步\n\n对于所列类型之一，若要被视为“异步”，它不应阻塞其当前线程的处理。你可能会发现，某个特定类型可能不会阻塞，要么是因为它确实是“异步”的（即，它在另一个线程中运行），要么是因为它不是一个“阻塞”调用，而只是等待其值在稍后的某个时间点被解析。\n\
    \n## 线程安全\n\n对于所列类型之一，若要被视为“线程安全”，它必须能在多个线程试图修改共享值时防止冲突。我们已经了解到，这可以通过使用 CAS 或\
    \ STM 来实现，但我们将在本章后面看到实际的代码示例。\n\n现在，让我们来看一些每种类型的示例，以便我们更好地理解何时以及如何使用它们。\n\n##\
    \ Delay\n\n`delay` 函数是异步的，因为当你定义其行为时，该行为不会立即执行，而是等到将来某个时刻你“解引用”它时才会执行。正因如此，`delay`\
    \ 函数不像原子或 ref 那样是一种严格的并发机制，尽管人们通常不认为它属于同一家族，但它仍然有能力阻塞你的程序，所以我认为将其纳入本章是相关的。\n\n\
    澄清一下，解引用意味着获取值（对于 `delay` 来说，你是在强制某些行为发生）。你会看到所有并发机制——agent、atom、ref 等——都使用 `(deref\
    \ …)` 函数来获取包含的值。\n\n让人困惑的是，解引用一个值有时会导致当前线程阻塞，但这取决于你使用的机制以及代码运行的上下文。正如我们稍后将看到的，agent\
    \ 即使在被解引用时也是非阻塞的。\n\n另一方面，如果值已经可用（即，它已经被计算出来），那么调用 `deref` 会立即返回该值。但如果值尚未准备好，那么它可能仍在另一个线程上计算，因此你当前进行解引用调用的线程将被阻塞，直到值准备好。\n\
    \n注意\n\n`(deref x)` 的一个便捷简写是 `@x`，其中 `x` 是一个 delay/promise/future/atom/agent/var/ref。\n\
    \n`delay` 函数阻止一个动作立即发生。它是异步的，直到被解引用时为止，此时它会阻塞，直到行为完成。一旦 `delay` 被执行，它会缓存其返回值（示例见清单\
    \ 8-1）。\n\n```\n(def later (delay (prn \"hello\")))\n;; 立即返回，不阻塞\n;; ...在应用程序稍后的某个时刻...\n\
    @later ;; nil (打印 \"hello\")\n@later ;; nil (注意这次没有打印 \"hello\")\n清单 8-1.\n使用\
    \ delay 的示例\n```\n\n在清单 8-1 中，我们可以看到，对 `later` 变量的第二次解引用调用不再打印消息 `\"hello\"`。这是因为分配给\
    \ `delay` 的动作已经被计算并缓存了。在这种情况下，没有返回值，因此返回了 `nil`。\n\n使用 `delay` 时，你也可以使用 `force`\
    \ 函数来代替 `deref` 或 `@`（示例见清单 8-2）。Clojure 开发者倾向于使用 `force`，因为它在语义上感觉更准确（因为你是在强制\
    \ `delay` 执行）。所以，选择你觉得更自然的方式。我个人使用 `@`，这样我的代码与其他也使用该符号的可用机制保持一致。\n\n```\n(def\
    \ d (delay (prn \"hello\")))\n;; 立即返回，不阻塞\n(force d)\n;; nil (打印 \"hello\")\n\
    清单 8-2.\n使用 force 的示例\n```\n\n注意\n\n你可以将超时机制与 `deref` 函数一起使用，但这仅适用于使用 `future`\
    \ 或 `promise` 时（我将很快演示超时如何工作）。但请注意，超时功能不适用于 `@` 宏。\n\n## Promise\n\n`promise`\
    \ 很像 `delay`，因为它在创建时不会阻塞当前线程，直到被解引用。`promise` 与 `delay` 的不同之处在于，它需要先有一个值被“交付”，然后才能成功解引用。\n\
    \n`promise` 的好处是，要交付的值在创建 `promise` 时不必存在。该值可以是另一个函数的结果。\n\n这就是为什么 `promise` 作为“回调”功能很有用；你可以将\
    \ promise 传递给其他函数，意图是解引用它们，同时使用单独的机制来交付其值。参见清单 8-3。\n\n```\n(def foo (promise))\n\
    (future\n  (prn \"子线程正在处理...\")\n  (Thread/sleep 10000)\n  (deliver foo :bar))\n\
    @foo\n;; :bar (阻塞直到 promise 有值被交付)\n清单 8-3.\npromise 的示例\n```\n\n注意\n\npromise\
    \ 的值一旦交付就不能更改。如果你尝试交付一个新值，它将被忽略。\n\n在清单 8-3 中，我们创建了一个 `promise` 并将其赋值给 `foo` 变量。然后我们使用一个\
    \ `future`（我将在下一节中更详细地讨论）来创建一个新线程，并从该独立线程向 `promise` 交付值（本例中为 `:bar`）。\n\n最后，我们在父线程中解引用该\
    \ `promise`，并注意到该调用会阻塞父线程，直到 `future` 的线程完成处理并随后交付了 `promise` 的赋值。\n\n`promise`\
    \ 只是一个将保存值的容器。由你的应用程序决定 `promise` 何时实际接收一个值，它通过使用 `deliver` 调用传递一个值来实现这一点。\n\n\
    在你的代码中任何期望一个值的地方，你都可以使用 `promise`。如果你有一个接受参数的函数，那么你可以传入一个 `promise`，并在未来的某个时间点解析它。\n"
- fmt: '# Future


    一个`future`允许在另一个线程中执行代码，这意味着它是非阻塞/异步的。如果你希望将某个特定的处理任务交给另一个线程，那么`future`就是你想要使用的工具。


    注意


    Clojure 会从线程池中创建线程，并在内部为你管理这些线程。


    在`future`创建后的任何时刻，你都可以解引用它来获取其值。如果`future`的线程已经执行完毕（即完成了值的计算），那么调用`deref`将返回计算出的值。


    否则，如果在调用`deref`时`future`仍在运行，那么尝试解引用该`future`的线程（通常是主线程/父线程）将被阻塞，直到值可用为止。


    在清单 [8-3](#A453572_1_En_8_Chapter.html#Par34)（见前文）中，我们使用`future`创建了一个子线程，并在该子线程中故意“休眠”了十秒钟才返回值，以模拟阻塞式
    I/O 交互。


    运行清单 [8-3](#A453572_1_En_8_Chapter.html#Par34) 中代码的结果是：当父线程解引用`future`时，它被迫等待十秒钟才返回一个值（因为当主线程解引用时，`future`尚未完成值的计算）。


    如前文讨论`delay`函数时所述，在可能预期`future`会阻塞的场景下，你更可能希望使用`deref`而不是简写形式的`@`宏，原因是长格式的`deref`允许你指定超时时间，并在超时过期时提供一个回退值。参见清单
    [8-4](#A453572_1_En_8_Chapter.html#Par47)。


    ```

    (def f (future

    (Thread/sleep 10000)

    (println "done")

    100))

    (deref f 500 "fail")

    ;; "fail" (blocked only until timeout of 500ms was reached)

    Listing 8-4.

    Example of Setting Timeout and Fallback Values

    ```


    在清单 [8-4](#A453572_1_En_8_Chapter.html#Par47) 中，我们可以看到，当我们使用`deref`时，我们传入了几个额外的参数。第一个是`500`，这是我们打算等待响应的毫秒数。第二个是`"fail"`，如果超过
    500 毫秒的阈值，它将作为返回值。


    重要的是要认识到，在单独线程中执行的任务会继续计算。超时是针对解引用值的操作，而不是针对执行线程本身。因此，在我们的示例中，如果我们继续等待，然后在稍后某个时间执行`(deref
    f)`，我们将看到值`100`被成功计算出来。


    # Atom


    `atom`既是线程安全的，也是可重试的。这意味着`atom`使用一种称为 CAS（比较并交换）的技术来确保线程安全，从而避免了使用锁机制（我将在下一节讨论）的复杂性。


    使用 CAS 时，如果两个线程试图修改一个共享变量，每个线程都可以进行更改，而不会被另一个线程阻塞。这样做的原因是，在 CAS 操作将更改提交给`atom`之前，它会验证`atom`的值是否没有改变。如果值没有改变，那就很好——它会提交新值；但如果值已经改变（例如，可能另一个线程先执行了操作），那么它将使用新的`atom`值重新启动操作。


    更新`atom`的值需要使用`swap!`函数，该函数接受两个参数：你想要修改的`atom`的名称，以及一个将应用于`atom`值的函数（参见清单 [8-5](#A453572_1_En_8_Chapter.html#Par53)）。


    ```

    (def counter (atom 0))

    (swap! counter inc) ;; 1

    Listing 8-5.

    Example of Using an Atom

    ```


    注意


    `!`后缀表示一个潜在的不安全方法；在函数式语言中，不安全通常意味着它会改变状态。


    正如你在清单 [8-5](#A453572_1_En_8_Chapter.html#Par53) 中所见，我们创建了一个新的`atom`，将其初始值设为 0，并将其赋值给`counter`变量。然后我们使用`swap!`函数来修改`atom`的当前值。


    所以，在我们的例子中，我们使用了`inc`函数，但如果你需要以特定方式修改值或接受多个参数，你也可以使用匿名函数（或其简写形式）。


    ```

    (def counter (atom 0))

    (swap! counter inc) ;; 1

    (swap! counter #(+ 2 %)) ;; 3

    (swap! counter #(+ 2 %1 %2) 3) ;; 6

    Listing 8-6.

    Example of Using an Atom with an Anonymous Function

    ```


    在清单 [8-6](#A453572_1_En_8_Chapter.html#Par58) 中，我们使用`inc`函数递增了`atom`。接下来，我们使用一个匿名函数再次更新了`atom`的值。最后，我们使用相同的技术第三次更新了`atom`，以演示`swap!`函数如何接受多个参数，然后将这些参数传递给指定的函数（即我们的匿名函数）。


    注意


    当使用用户定义的函数时，请确保它是幂等的（即无副作用），因为该操作可能会被重试，因此副作用也会被重放。


    在清单 [8-7](#A453572_1_En_8_Chapter.html#Par62) 中，我们利用`set-validator!`函数来确保`atom`新计算的值符合我们的预期（如果不符合，该值将被丢弃）。在给定的示例中，我们希望确保更新后的值始终是偶数。这类似于我们在第
    [5](#A453572_1_En_5_Chapter.html) 章中学到的函数的前置/后置条件行为。


    ```

    (def counter (atom 0))

    (set-validator! counter #(even? %))

    (swap! counter inc)

    ;; IllegalStateException

    ;; Invalid reference state clojure.lang.ARef.validate

    (swap! counter #(+ 2 %))

    ;; 2

    (swap! counter inc)

    ;; IllegalStateException

    ;; Invalid reference state  clojure.lang.ARef.validate

    (swap! counter #(+ 2 %))

    ;; 4

    (set-validator! counter nil)

    (swap! counter inc)

    ;; 5

    Listing 8-7.

    Example of Validating an Atom

    ```


    在清单 [8-7](#A453572_1_En_8_Chapter.html#Par62) 中，你会看到我们的验证器函数确保`atom`只能被设置为偶数。如果我们单独使用`inc`，它将产生一个奇数，因此会触发错误并阻止更改。


    通过将指定`atom`的验证器函数重置为`nil`，我们实际上移除了该`atom`上的验证器。回顾清单 [8-7](#A453572_1_En_8_Chapter.html#Par62)，你会注意到在我们赋值`nil`之后，设置一个奇数（通过`inc`函数）将被成功接受。


    注意


    `set-validator!`也适用于代理/变量/引用。'
  raw: '## Future


    A `future` allows the execution of code within another thread, which means it
    is non-blocking/asynchronous. If you wish to hand off a particular processing
    task to another thread, then a `future` is what you will want to use.


    Note


    Clojure handles the creation of threads from a thread pool and manages that internally
    for you.


    At any point after a `future` is created, you have the ability to dereference
    it to find out its value. If the `future`’s thread has finished executing (i.e.,
    finished computing a value), then calling `deref` will result in the computed
    value being returned.


    Otherwise, if at the point of calling `deref` the future is still running, then
    the thread (likely the main/parent thread) that has attempted to dereference the
    future will be blocked until the value is made available.


    In Listing [8-3](#A453572_1_En_8_Chapter.html#Par34) (see earlier) we created
    a child thread using a `future`, and within that child thread we purposely “slept”
    for ten seconds before returning a value in order to simulate a blocking I/O interaction.


    The outcome of running the code in Listing [8-3](#A453572_1_En_8_Chapter.html#Par34)
    was that when the parent thread dereferenced the `future` it was forced to wait
    ten seconds before a value was returned (as the `future` hadn’t finished computing
    the value when it was dereferenced by the main thread).


    As mentioned earlier when discussing the `delay` function, you would more likely
    want to use `deref` over the shorthand `@` macro in scenarios where you may expect
    a `future` to block, the reason being that the long-form `deref` allows you to
    specify a timeout as well as provide a value to fall back to if the timeout expires.
    See Listing [8-4](#A453572_1_En_8_Chapter.html#Par47).


    ```

    (def f (future

    (Thread/sleep 10000)

    (println "done")

    100))

    (deref f 500 "fail")

    ;; "fail" (blocked only until timeout of 500ms was reached)

    Listing 8-4.

    Example of Setting Timeout and Fallback Values

    ```


    In Listing [8-4](#A453572_1_En_8_Chapter.html#Par47), we can see that when we
    use `defer` we pass in a couple of additional args. The first is `500`, which
    is the number of milliseconds we intend to wait for a response. The second is
    `"fail"`, which will be the return value in case the 500ms threshold is exceeded.


    It’s important to realize that the task being executed in the separate thread
    will continue to be computed. The timeout is for dereferencing the value, not
    for the thread of execution. So, in our example, if we continued to wait and then
    executed `(deref f)` at a later time, we would see the value `100` computed successfully.


    ## Atom


    An atom is both thread safe and retriable. What this means is that an atom uses
    a technique called CAS (compare-and-swap ) to ensure thread safety, consequently
    avoiding the complication of having to use locking mechanisms (which I’ll discuss
    in the next section).


    With CAS, if two threads are trying to mutate a shared variable then each thread
    will be allowed to make its change without being blocked by the other thread.
    The reason this works is because just before the CAS operation commits a change
    to the atom, it will verify that the value of the atom hasn’t changed. If the
    value hasn’t, then great—it’ll commit the new value; but if the value has changed
    (e.g., maybe another thread got there first), then it’ll restart the operation
    using the new atom value.


    Updating the atom’s value requires the use of a `swap!` function , which takes
    as arguments the name of the atom you want to mutate and a function that will
    be applied to the atom’s value (see Listing [8-5](#A453572_1_En_8_Chapter.html#Par53)).


    ```

    (def counter (atom 0))

    (swap! counter inc) ;; 1

    Listing 8-5.

    Example of Using an Atom

    ```


    Note


    The `!` suffix indicates a potentially unsafe method; unsafe in a functional language
    usually means it mutates state.


    As you can see in Listing [8-5](#A453572_1_En_8_Chapter.html#Par53), we create
    a new `atom,` give it the initial value of zero, and assign it to the `counter`
    variable. We then use the `swap!` function to mutate the atom’s current value.


    So, in our case we used the `inc` function , but you could have used an anonymous
    function (or its shorthand variant) if you needed to mutate the value in a specific
    way or accept multiple arguments.


    ```

    (def counter (atom 0))

    (swap! counter inc) ;; 1

    (swap! counter #(+ 2 %)) ;; 3

    (swap! counter #(+ 2 %1 %2) 3) ;; 6

    Listing 8-6.

    Example of Using an Atom with an Anonymous Function

    ```


    In Listing [8-6](#A453572_1_En_8_Chapter.html#Par58), we increment the atom using
    the `inc` function . Next, we update the atom’s value again using an anonymous
    function. Finally, we update the atom a third time using the same technique in
    order to demonstrate how the `swap!` function accepts multiple arguments that
    are then passed on to the specified function (i.e., our anonymous function).


    Note


    When using a user-defined function, be sure that it’s idempotent (i.e., free of
    side effects), as the action could be retried and hence the side effect would
    be replayed as well.


    In Listing [8-7](#A453572_1_En_8_Chapter.html#Par62), we utilize the `set-validator!`
    function in order to ensure the atom’s newly computed value matches our expectations
    (if it doesn’t, the value is discarded). In the given example, we wanted to ensure
    the updated value was always an even number. It’s similar in spirit to a function’s
    pre-post condition behavior, which we learned about back in Chapter [5](#A453572_1_En_5_Chapter.html).


    ```

    (def counter (atom 0))

    (set-validator! counter #(even? %))

    (swap! counter inc)

    ;; IllegalStateException

    ;; Invalid reference state clojure.lang.ARef.validate

    (swap! counter #(+ 2 %))

    ;; 2

    (swap! counter inc)

    ;; IllegalStateException

    ;; Invalid reference state  clojure.lang.ARef.validate

    (swap! counter #(+ 2 %))

    ;; 4

    (set-validator! counter nil)

    (swap! counter inc)

    ;; 5

    Listing 8-7.

    Example of Validating an Atom

    ```


    In Listing [8-7](#A453572_1_En_8_Chapter.html#Par62), you’ll see that our validator
    function ensures the atom can only be set to an even number. If we try to use
    `inc` by itself, then it’ll result in an odd number, and so an error is triggered
    and the change is prevented.


    By resetting the validator function to `nil` for the specified atom, we effectively
    remove the validator from the atom. Looking back at Listing [8-7](#A453572_1_En_8_Chapter.html#Par62),
    you’ll notice after we assign `nil`, setting an odd number (via the `inc` function)
    would be accepted successfully.


    Note


    `set-validator!` also works for agents/vars/refs.'
