    # 1. 什么是 Clojure？


    Clojure¹ 是一门函数式、共生且同像性的编程语言。


    好吧，作为开场白，我敢肯定你会觉得这有点拗口。那么，让我们稍微拆解一下这句话，重点关注“函数式”、“共生”和“同像性”这几个词，以便理解它们的含义。


    如果下面的描述听起来像学术废话，请不要担心；随着我们阅读本书的各章节，我们会更详细地介绍这些概念，你会意识到它们实际上在 Clojure 中有着非常实用的用途。


    *   **函数式**：函数是一等公民，并且不鼓励改变状态。

    *   **共生**：该语言旨在宿主环境之上运行。

    *   **同像性**：“代码即数据”——这有助于实现用于重写语言的宏系统。


    注意


    Clojure 也支持可选类型标注，² 尽管该特性不在本书的讨论范围内。


    通常，在阅读关于 Clojure 的资料时，你会经常看到这些术语（函数式、共生、同像性），因此更好地熟悉它们以及人们在 Clojure 语言语境下使用这些术语时的含义会很有帮助。


    Clojure 支持的主要平台是 JVM³（Java 虚拟机）。但 Clojure 也支持任何能够执行 JavaScript 引擎的平台，例如网页浏览器，这通过该语言的一个分支——ClojureScript⁴
    来实现。ClojureScript 是一个将 Clojure 代码转换为 JavaScript 代码的编译器。


    Clojure 也能与公共语言运行时（CLR）配合使用，后者是微软 .NET 框架的执行引擎。


    注意


    在本书中，我们只专注于 Clojure 编程语言的 JVM 实现。


    Clojure 是一种 Lisp。⁵ Lisp 是一种最初于 1958 年设计的编程语言。它具有非常独特的语法，使其从其他现代编程语言中脱颖而出。像 Clojure
    这样的语言建立在 Lisp 的结构基础之上（我们将在下一章中了解更多）。Lisp 语法优雅而简洁，因此赋予了我们极强的表达能力。如果你不熟悉 Lisp 语法是什么样子，别担心，我们会在后续内容中看到相关示例。


    如果你等不及了，那么下面清单 1-1 中的代码片段至少能让你对 Clojure 的样子有个概念（尽管在目前这个阶段，如果你不熟悉 Lisp 和/或 Clojure，它显然没什么意义）：


    ```

    (def base-credentials {:client-config {:protocol "http"}})

    (defn cred [{:keys [:Host :HostPort]}]

    (assoc base-credentials :endpoint (str Host ":" HostPort)))

    (cred {:Host "localhost" :HostPort 8080})

    清单 1-1.

    Clojure/Lisp 语法演示

    ```


    构成 Clojure 编程生态系统的有趣方面有很多，虽然本书会涵盖大部分真正重要的内容，但值得说明的是，我并不打算包含每一个可能的特性或细节，因为那样会分散本书的重点，对初学者来说也不那么易于接受。


    Clojure 有许多复杂的活动部件，因此本书的目的是帮助读者快速上手 Clojure，并能够尝试该语言一些最有趣的特性，而不会被过多的实现细节所困扰。


    ## 为什么你应该关注？


    Clojure 很有趣。不，真的！


    但更实际的是，得益于该语言对不可变性的支持、众多的并发机制以及非常强大的核心函数库（再次强调，如果这些词对你来说毫无意义，别担心，我们会在后续章节中涵盖所有这些细节），它使得解决复杂问题的方案变得轻而易举。


    你甚至可以通过一种称为“宏”的机制来改变 Clojure 编程语言本身，以满足你的需求。宏是一个非常强大的特性，我真希望它也能在我使用的其他编程语言中可用。如果你想添加语言本身不原生支持的新类型流程控制，没问题；你可以用
    Clojure 代码动态地自己编写！我们稍后会看到它的实际应用。


    关于 Clojure，一个经常被引用的事实是，其创造者 Rich Hickey 在开始实际构建和实现 Clojure 这项艰巨任务之前，花了两年时间进行语言设计。


    这听起来可能像是一个无意义的“趣闻”，但当你开始编写 Clojure 代码后，你很快就会开始理解为什么开发者喜欢反复提及设计这门语言花了多长时间。这意味着
    Clojure 能够回顾性地从其他编程语言中挑选所有优点，同时过滤掉之前糟糕的设计决策，最终为你提供一门能够解决许多其他有争议的设计问题的新编程语言。


    ## 名字的由来？


    Clojure 这个词及其来源是 Clojurists 的典型讨论点。不过，考虑到 Rich Hickey（Clojure 的作者）早已确认这个名字是以下内容的组合，我不确定为什么还要讨论：


    *   C#

    *   Lisp

    *   Java


    (C)(L)o(J)ure


    Clojure 的发音（用作者自己的话说）：


    > 完全像 closure，其中 s/j 的发音是 azure、pleasure 等词中的 zh 音。——Rich Hickey（Google Groups
    讨论⁶）

    '
- fmt: '# Getting Started


    The first thing we’re going to need is a REPL (REPL is an acronym for “Read Eval
    Print Loop”). Effectively, a REPL is a way for you to execute arbitrary pieces
    of code and to see the results, a form of “interactive development.” You’ll find
    as we go along that Clojure’s workflow is very tightly integrated with the concept
    of using a REPL, and so that’s why we''ll be starting there.


    You’ll find most other languages also have REPLs:


    * Node

    * Ruby

    * PHP

    * Python


    Note


    Most of our time in this book will be spent using a REPL. It can be slow to start
    up initially, but we only have to do it once.


    `Leiningen` —which to this day I forget how to pronounce properly—is a complete
    project automation and build tool for Clojure. I’ll be diving into what it can
    do in a later chapter, but for now all you need to know is that it has a built-in
    REPL that we can (and will) use. Please refer to the `Leiningen` website[⁷](#A453572_1_En_1_Chapter.html#Fn7)
    for the latest instructions for how to install it.


    Just to reiterate, we’ll be working exclusively from a terminal shell throughout
    the book in order for us to be able to utilize the `Leiningen` REPL.


    For me, on a Mac, I use the `Homebrew`[⁸](#A453572_1_En_1_Chapter.html#Fn8) package
    manager, as I find it to be the easiest option for installing `Leiningen`. With
    `Homebrew` installed, you can install `Leiningen` with the command seen in Listing
    [1-2](#A453572_1_En_1_Chapter.html#Par50).


    ```

    brew install leiningen

    Listing 1-2.

    Install Leining via Homebrew

    ```


    Once installed, to start REPL, run the command `lein repl`. You should now see
    output that resembles Listing [1-3](#A453572_1_En_1_Chapter.html#Par52).


    ```

    Retrieving org/clojure/tools.nrepl/0.2.12/tools.nrepl-0.2.12.pom from central

    Retrieving org/clojure/pom.contrib/0.1.2/pom.contrib-0.1.2.pom from central

    Retrieving org/sonatype/oss/oss-parent/7/oss-parent-7.pom from central

    Retrieving clojure-complete/clojure-complete/0.2.4/clojure-complete-0.2.4.pom
    from clojars

    Retrieving org/clojure/clojure/1.8.0/clojure-1.8.0.pom from central

    Retrieving org/clojure/tools.nrepl/0.2.12/tools.nrepl-0.2.12.jar from central

    Retrieving org/clojure/clojure/1.8.0/clojure-1.8.0.jar from central

    Retrieving clojure-complete/clojure-complete/0.2.4/clojure-complete-0.2.4.jar
    from clojars

    nREPL server started on port 55415 on host 127.0.0.1 - nrepl://127.0.0.1:55415

    REPL-y 0.3.7, nREPL 0.2.12

    Clojure 1.8.0

    Java HotSpot(TM) 64-Bit Server VM 1.8.0_92-b14

    Docs: (doc function-name-here)

    (find-doc "part-of-name-here")

    Source: (source function-name-here)

    Javadoc: (javadoc java-object-or-class-here)

    Exit: Control+D or (exit) or (quit)

    Results: Stored in vars *1, *2, *3, an exception in *e

    user=>

    Listing 1-3.

    Output from Starting the Leiningen REPL

    ```


    We can see from Listing [1-3](#A453572_1_En_1_Chapter.html#Par52) that `Leiningen`
    downloaded some dependencies for us (such as the Clojure language release 1.8.0).
    But you should also take note of the last line of the output: `user=>`.


    The last line indicates that the namespace your code is going to be running within
    will be the `user` namespace. We’ll be covering how namespaces work in a later
    chapter, but for now it’ll suffice to know that Clojure allows you to segregate
    your code into namespaces to help isolate specific functionality (much like you
    would split files across separate folders).


    One other thing to mention is that if you already have Java installed you can
    access a REPL without the need to download/install `Leiningen`. First, you would
    need to download and unzip Clojure. While in a terminal shell, you would execute
    the command shown in Listing [1-4](#A453572_1_En_1_Chapter.html#Par56).


    ```

    java -cp clojure-1.8.0.jar clojure.main

    Listing 1-4.

    Start a REPL Utilizing Java Directly

    ```


    Listing [1-4](#A453572_1_En_1_Chapter.html#Par56) demonstrates how by using the
    `java` command directly you can start up a Clojure REPL interface similar to what
    you’ll see provided by `Leiningen`. But there are also online testers for when
    you’re in a hurry:


    * [http://www.tryclj.com/](http://www.tryclj.com/)

    * [http://himera.herokuapp.com/index.html](http://himera.herokuapp.com/index.html)
    (ClojureScript)


    Now that we are within the `Leiningen` REPL environment, let’s type something
    into it and see what happens. Try typing the code shown in Listing [1-5](#A453572_1_En_1_Chapter.html#Par61)
    and see if the output matches your expectations (I know we’ve not learned the
    Clojure syntax yet, but I’m hoping that the code will describe itself well enough
    for you to have a vague idea of the result before I explain it):


    ```

    (+ 2 2)

    Listing 1-5.

    Execute Some Basic Clojure Code

    ```


    Once you type into the REPL the code from Listing [1-5](#A453572_1_En_1_Chapter.html#Par61)
    and hit the ENTER key, you should see the result of this line of code being executed.
    If you’ve typed the code correctly, you will see the result is 4.


    Throughout the book, I will encourage you to try out the different code examples
    by typing them into the REPL, as this is the best way to experiment with and learn
    the language.


    Note


    Comments in Clojure code are denoted by a semi-colon `;`, and a common convention
    in Clojure is to use two semi-colons.


    OK, so this was a nice and simple snippet of code to try out. But what does this
    code actually represent? Well, in the next chapter we’ll begin to learn the basic
    syntax for Clojure and peek at some of its data structures, but before we do that,
    let’s finish up by reviewing one last important subject. . .'
