  trans: '

    如果你愿意，可以在创建原子（atom）时通过设置其 `:validator` 属性来内联定义验证器函数（示例见清单 8-8）。


    ```

    (def counter (atom 0 :validator #(even? %)))

    清单 8-8.

    内联验证示例

    ```


    有时你可能想重置原子的值，而不必关心当前值。为此，你需要使用 `reset!` 函数：`(reset! counter 0)`。


    你可能还希望仅当原子的当前值与某个预设条件匹配时才更改其值。为此，你可以使用 `compare-and-set!` 函数。


    `compare-and-set!` 函数的工作原理是：如果原子的当前值与指定的值匹配，则返回 `true`（随后会继续应用请求的更改）；否则，如果当前值不匹配，则返回
    `false` 且不应用更改。清单 8-9 展示了其工作原理。


    ```

    (def counter (atom 0))

    (swap! counter #(+ 4 %))

    @counter ;; 4

    (compare-and-set! counter 4 0) ;; true

    @counter ;; 0

    (compare-and-set! counter 4 1) ;; false

    @counter ;; 0

    清单 8-9.

    验证特定条件的示例

    ```


    请注意，在清单 8-9 中，第二次调用 `compare-and-set!` 函数后，`counter` 原子的值如何保持为零。这是因为我们指定仅当当前值为
    4 时才更改值，而当前值并非 4（在此之前它已被更改为零）。


    最后，在结束原子的话题之前，我们还应该了解如何监视原子的变化，并在满足特定条件时触发某些行为。这可以通过 `add-watch` 函数实现，该函数接受原子名称、监视器的任意名称以及一个在原子更新时执行的函数作为参数。详见清单
    8-10。


    ```

    (def state (atom {}))

    (defn state-change [key atom old new]

    (prn (format "key: %s, atom: %s, old val: %s, new val %s" key atom old new)))

    (add-watch state :foo state-change)

    (swap! state assoc :bar "baz")

    清单 8-10.

    监视原子变化的示例

    ```


    在清单 8-10 中，当我们修改 `state` 映射数据结构时（本例中，我们通过 `:bar` 键及其关联值 `"baz"` 进行关联），屏幕上会打印出更改的内容。这是因为对原子的更改触发了我们创建的
    `add-watch`。清单 8-10 的输出结果如清单 8-11 所示。


    ```

    "key: :foo, atom: clojure.lang.Atom@3e1b3567,

    old val: {}, new val: {:bar \"baz\"}"

    {:bar "baz"}

    清单 8-11.

    使用 add-watch 的前一个程序的输出

    ```


    注意


    要移除监视器，请运行 `(remove-watch atom key)`，并将 `atom` 和 `key` 替换为适当的值。


    ## 锁


    使用锁是解决多线程世界中并发问题的经典第一步。当有多个线程试图访问同一内存空间时，就会产生冲突。锁是一种处理并发的常见底层机制，但很难正确使用。这就是 Clojure
    提供更高级抽象以实现“线程安全”的原因。


    其工作方式是在要操作的数据周围应用一个锁，从而阻止其他线程在数据被“锁定”期间对其进行操作。例如，如果有两个线程同时运行（A 和 B），并且都想修改变量 `foo`，那么你就会面临一个不确定的事件（即，你不知道
    A 和 B 谁会先访问到 `foo`）。


    通过在代码中使用锁，如果结果是线程 B 先访问到 `foo`，那么由于它先到达，它就能在 `foo` 周围应用一个锁，因此当线程 A 试图访问 `foo`
    时，它无法访问，必须等待直到线程 B 完成。当线程 B 完成时，锁被释放，这样线程 A 就可以获取锁，并在持有锁期间阻止任何其他线程访问 `foo`。


    锁并不理想，因为在试图确定获取锁的正确顺序时，它们可能变得非常复杂。这之所以重要，是因为锁机制可能导致通常所说的死锁/活锁。这在利用多个锁的系统中更为明显（而不是仅使用单个锁的简单示例）。


    ### 死锁


    死锁是指两个或多个线程陷入困境，因为它们都在等待另一个线程完成（但另一个线程也在等待其他被锁定的线程完成），这意味着无法取得任何进展，系统被锁定。


    一个常见的例子是两个人互相鞠躬。这两个人必须遵守的规则是，你必须保持鞠躬姿势，直到对方有机会回礼。但如果两人同时鞠躬，那么他们将永远等待对方。


    ### 活锁


    活锁在某些方面与死锁相似，但略有不同：两个或多个线程无法进展，不是因为它们被阻塞，而是因为它们彼此之间忙个不停。


    通常给出的例子是走廊里的两个人不断向同一侧移动以避免对方；他们没有被阻塞，只是永远忙于试图让对方通过。


    注意


    原子与锁的不同之处在于，它使用 CAS（比较并交换）而非锁机制；这意味着锁不会像原子那样“重试”。


    清单 8-12 演示了如何通过原子控制对共享变量的访问。在该示例中，我们想要控制如何将项目添加到向量中。我们希望结果是 `[1 2]`。


    现在，在查看清单 8-12 之前，我们应该澄清一下，原子（正如我们在上一节中看到的）已经是线程安全的，因为它们使用 CAS 机制来防止多线程更改造成混乱，因此没有太多理由选择非常底层的锁机制而不是像
    CAS 这样的抽象。


    ```

    (def foo (atom []))

    (future

    (locking foo

    (Thread/sleep 1000)

    (swap! foo #(conj % 1))))

    (locking foo

    (swap! foo #(conj % 2)))

    @foo

    ;; [1 2]

    清单 8-12.

    锁定代码块的示例

    ```


    如果我们没有在 `swap!` 执行周围使用 `locking` 机制（你会注意到我们定义了两个锁定块），那么将会出现不一致的执行路径。


    想象一下，如果在清单 8-12 中没有使用锁定块，会发生什么情况：在 `future` 线程内部调用的 `sleep` 意味着，在 `future` 线程内部的
    `swap!` 完成计算之前，`future` 线程外部的 `swap!` 调用会先完成，因此结果将是 `[2 1]`，而不是我们期望的 `[1 2]`。


    注意


    在清单 8-12 中，你会注意到我们必须锁定 `foo` 两次。仅从子线程内部锁定 `foo` 不足以阻止该值被交换出去。这就是在实际应用中事情变得复杂的地方：在我们这个愚蠢的例子中，访问
    `foo` 的代码彼此紧挨着，但在实践中很少出现这种情况，因此你很容易遗漏应该应用锁的地方，从而导致应用程序以意想不到且难以调试的方式崩溃。

