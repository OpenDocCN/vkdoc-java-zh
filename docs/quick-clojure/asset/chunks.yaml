- fmt: '# Retriable


    For one of the listed types to be considered “retriable,” a conflict must have
    occurred (e.g., multiple changes have been applied), and knowing how to handle
    the conflict must require retrying the operation.


    One implementation for resolving a conflict is a CAS (compare-and-swap) operation,
    which is a low-level operation that’s not directly exposed by the language API.
    A typical scenario would be when an attempt to update a value fails to apply because
    of a cross-thread conflict (e.g., two threads are updating a single value at the
    same time).


    The “compare” part of a CAS operation begins by checking that nothing has changed.
    For example, it checks whether the current value has been tampered with by another
    thread. If that is the case, then the “swap” part of the operation is actioned
    and the requested update is applied. If, on the other hand, the CAS detects that
    a change has already occurred, then it’ll get the updated value and retry the
    operation.


    **Note:** The STM (which we’ll cover later) is also considered retriable, and
    although it retries the operation it does not have anything to do with CAS per
    se (which is a low-level primitive).


    # Coordinated


    For one of the listed types to be considered “coordinated,” we would need to be
    utilizing Clojure’s built-in STM (software transactional memory). The STM verifies
    the consistency of data across threads.


    The difference between STM and CAS is that the STM will coordinate (i.e., check)
    multiple references, whereas CAS only concerns itself with its own reference.


    The concept of a “reference” probably doesn’t help distinguish CAS from STM right
    now, so, fear not, I’ll discuss the STM in more detail later on when we look at
    creating and using the `Ref` type, and from there how the STM is considered “coordinated”
    and the CAS “uncoordinated” should become clearer.


    # Asynchronous


    For one of the listed types to be considered “asynchronous,” it should not block
    its current thread from processing. You might find that a particular type might
    not block because either it’s genuinely “async” (i.e., it is running in another
    thread) or it’s not a “blocking” call, but rather is simply waiting for its value
    to be resolved at some later time.


    # Thread Safe


    For one of the listed types to be considered “thread safe,” it must prevent conflicts
    when multiple threads are trying to mutate a shared value. We’ve already heard
    how this might be possible by using either a CAS or STM, but we’ll see actual
    example code of this later on in this chapter.


    Let’s now take a look at some examples of each type so we can better understand
    when and how to use them.


    # Delay


    The `delay` function is asynchronous in the sense that when you define its behavior,
    that behavior is not executed until some point in the future when you “dereference”
    it. Because of this, the `delay` function isn’t a strict concurrent mechanism
    in the same way as, let’s say, an atom or ref, and although people generally don’t
    consider it part of the same family, it still has the ability to block your program,
    so I feel it’s relevant for inclusion in this chapter.


    To clarify, dereference means to acquire the value (and in the case of `delay`
    you’re forcing some behavior to occur). You’ll see all the concurrency mechanisms—agents,
    atoms, refs, etc.—use the function `(deref …)` to acquire the contained value.


    What confuses people is that dereferencing a value can sometimes cause your current
    thread to block, but this depends on the mechanism you’re using, as well as on
    the context your code is running in. As we’ll see later, an agent is non-blocking
    even when it’s dereferenced.


    If, on the other hand, the value is already available (i.e., it has been computed),
    then calling `deref` will return the value immediately. But if the value isn’t
    ready, then maybe it’s still being computed on another thread, and so your current
    thread making the dereference call will be blocked until the value is ready.


    **Note:** A convenient shortcut for `(deref x)` is `@x` where `x` is a delay/promise/future/atom/agent/var/ref.


    The `delay` function prevents an action from happening straight away. It is asynchronous
    until the point of being dereferenced, whereby it will block until the behavior
    has completed. Once a `delay` has been executed, it will cache its return value
    (see Listing [8-1](#A453572_1_En_8_Chapter.html#Par26) for example).


    ```

    (def later (delay (prn "hello")))

    ;; returns immediately and doesn''t block

    ;; ...some point later in your application...

    @later ;; nil (prints "hello")

    @later ;; nil (notice no "hello" is printed this time)

    Listing 8-1.

    Example of Using delay

    ```


    In Listing [8-1](#A453572_1_En_8_Chapter.html#Par26), we can see that the second
    dereference call on the `later` variable no longer prints the message `"hello"`.
    This is because the action assigned to `delay` has already been computed and cached.
    In this case, there was no return value and so `nil` was returned.


    When using a `delay`, you can also use the `force` function in place of either
    `deref` or `@` (see Listing [8-2](#A453572_1_En_8_Chapter.html#Par29) for an example).
    Clojurists tend to prefer `force` as it feels more semantically accurate (as you’re
    forcing the `delay` to execute). So, pick whichever feels more natural to you.
    I personally use `@` so my code is consistent with the other mechanisms available
    that also use that symbol.


    ```

    (def d (delay (prn "hello")))

    ;; returns immediately and doesn''t block

    (force d)

    ;; nil (prints "hello")

    Listing 8-2.

    Example of Using force

    ```


    **Note:** You can utilize a timeout mechanism with the `deref` function, but this
    only works when using a `future` or a `promise` (I’ll demonstrate how the timeout
    works shortly). But be aware the timeout feature doesn’t work with the `@` macro.


    # Promise


    A `promise` is a lot like a `delay`, in that when it is created it won’t block
    your current thread until it has been dereferenced. A `promise` is different than
    a `delay` in that it needs a value to be “delivered” first before it can be successfully
    dereferenced.


    The benefit of a `promise` is that the value to be delivered doesn’t have to exist
    at the point of creating the `promise`. The value could be the result of another
    function.


    This is why a `promise` is useful as a “callback” feature; you can pass a promise
    around into other functions with the intention of dereferencing them while having
    a separate mechanism for the delivery of its value. See Listing [8-3](#A453572_1_En_8_Chapter.html#Par34).


    ```

    (def foo (promise))

    (future

    (prn "child thread doing stuff...")

    (Thread/sleep 10000)

    (deliver foo :bar))

    @foo

    ;; :bar (blocks until promise has a value delivered)

    Listing 8-3.

    Example of a promise

    ```


    **Note:** A promise’s value can’t be changed once delivered. If you try to deliver
    a new value, it’ll be ignored.


    In Listing [8-3](#A453572_1_En_8_Chapter.html#Par34), we’ve created a `promise`
    and assigned it to the `foo` variable. We then use a `future` (which I’ll discuss
    in more detail in the next section) to create a new thread and to deliver the
    value (in this case `:bar`) to the `promise` from that separate thread.


    Finally, we dereference the `promise` within the parent thread and notice that
    the call blocks the parent thread until the `future`’s thread has finished processing
    and subsequently delivered the `promise`’s assigned value.


    A `promise` is just a container that will hold a value. It is up to your application
    to decide when the `promise` actually receives a value, and it does this by passing
    a value using the `deliver` call.


    Anywhere your code expects a value, you could use a `promise`. If you had a function
    that accepted a parameter, then you could pass in a `promise` and resolve it at
    some future point in time.'
