    # 3. 函数式编程


    Clojure 是一种函数式语言，因此它提供了你在其他函数式编程（FP）语言中期望找到的某些特性，例如：


    *   不可变性

    *   引用透明性

    *   一等函数

    *   偏函数应用

    *   递归迭代

    *   可组合性


    让我们花点时间来逐一探讨这些特性。


    ## 不可变性


    不可变性背后的理念是，当我们希望避免“改变状态”时使用它。这实际上意味着它帮助我们避免更改可能被程序多个（独立）区域使用的数据。


    如果你有状态并且它可以改变，那么一旦你的应用程序变得分布式和并发（即多线程），你就会陷入困境，因为许多不同的线程可能会在不确定的时间开始操作你的数据。这可能导致你的应用程序在任何时刻失败，并且变得非常难以调试和推理。


    通过提供不可变性，Clojure 可以帮助规避这个问题。在 Clojure 中，每次你操作一个数据结构时，返回的不是原始数据的修改版本，而是一个应用了你的更改的全新副本。


    注意


    拥有数据的完整副本听起来可能像是一场性能噩梦，但得益于 Clojure 在内部实现某些数据结构的方式——使用字典树¹——它实际上非常高效。Clojure 称之为持久化数据结构。


    当从面向对象语言（OOP）转向时，不可变性是一个难以理解的概念。这是因为函数式编程（FP）和 OOP 有着不同的目标。


    OOP 是关于封装数据（状态）并通过对象方法提供受控访问。FP 是关于软件系统的流程，其中数据通过一组函数传递，这些函数在数据流向最终用户的过程中对其进行操作（即数据被过滤）。


    ## 引用透明性


    引用透明性是指一个表达式可以被其值替换而不改变程序的行为。从实际意义上讲，当你定义一个函数，该函数接受一个参数，并且在给定相同参数时总是返回相同的值，就实现了引用透明性。参见代码清单
    3-1。


    注意


    有一个相关的概念叫做纯函数，它更广泛地指代其返回值由其输入决定且没有可见副作用的函数。


    ```

    (defn sum [x y]

    (+ x y))

    (sum 1 1)

    ;; 2

    代码清单 3-1.

    引用透明函数示例

    ```


    函数 `sum`（如代码清单 3-1 所示）是引用透明的。无论发生什么，如果我提供相同的参数集（在本例中是 `1` 和 `1`），我总会得到相同的结果。


    每个程序都需要某种状态，这就是为什么 Clojure 不像 Haskell² 那样是一种“严格”的 FP 语言。Clojure 的理念是尽可能追求函数式和引用透明性。


    ## 一等函数


    对于一个语言来说，要提供“一等函数”，它需要能够像存储值一样存储函数并传递函数。我们已经看到前者可以通过变量实现，而后者（将函数作为值传递）在 Clojure
    中也是可行的。


    注意


    一等函数的概念有助于推广高阶函数的思想。高阶函数是可以将函数作为值接收或返回的函数。Clojure 中有许多高阶函数：`map`、`reduce`、`comp`、`apply`、`partial`
    和 `filter`，我将在本章中演示所有这些函数。


    让我们先看一个——诚然简单且有点傻的——一等函数实际应用的例子（代码清单 3-2）。


    ```

    (defn cap [s]

    (clojure.string/upper-case s))

    (defn greeting [c s]

    (prn (c s)))

    (greeting cap "hi there")

    ;; "HI THERE"

    代码清单 3-2.

    Clojure 支持一等函数的示例

    ```


    在代码清单 3-2 中，我们定义了一个 `cap` 函数，并将其传递给 `greeting` 函数。这演示了函数如何像值一样被传递，满足了一等函数要求的前半部分。


    注意


    `cap` 函数本身并不重要，但你会看到我们引用了一个函数 `clojure.string/upper-case`。这是一个“完全限定”的函数，意味着我们给出了一个显式/直接的路径来定位该函数（位于
    `clojure.string` 命名空间中；我们将在后面的章节中介绍命名空间）。


    该要求的另一半是从函数中返回一个函数的能力（而不是从函数中返回一个值）。我们可以在代码清单 3-3 中看到一个例子，其中 `partial` 函数返回的不是一个值，而是另一个函数。


    我将在下一节演示 `partial` 应用是如何工作的，但希望代码清单 3-3 中的例子足够简单，能够突出偏函数应用可能提供的功能。


    ```

    (defn sum [x y]

    (+ x y))

    (def add-on-five (partial sum 5))

    (add-on-five 10)

    ;; 15

    代码清单 3-3.

    偏函数应用示例

    ```


    Clojure 一等函数特性的其他示例可以在以下列表中找到。在每个后续示例中，我们将通过将现有函数传递给其他函数来演示一等函数。我们在示例中将使用的函数有：


    *   `complement`

    *   `apply`

    *   `map`

    *   `reduce`

    *   `filter`

    *   `comp`


    ### Complement


    `complement` 函数非常简单：它接收一个谓词并返回一个谓词（记住，谓词是指返回布尔值的函数）。参见代码清单 3-4。


    ```

    ((complement empty?) "")

    ;; false

    代码清单 3-4.

    complement 函数返回相反布尔值的示例

    ```


    注意


    谓词函数的命名约定类似于 Ruby 编程语言，即在谓词名称后加上问号（例如 `even?`）。


    在我们的示例中，我们将一个空字符串传递给新的谓词函数。`empty?` 函数通常会对空字符串返回 `true`，但 `complement` 的作用是反转原始的布尔值，因此我们得到
    `false`。


    对于这个例子，为了更实用，你最好将新的谓词函数保存在一个名为 `not-empty?` 的变量中，以实现最大的可重用性。


    ### Apply


    `apply` 示例接收一个函数（在本例中是 `str`，它用于拼接字符串）和一个集合 `["a" "b" "c"]`，然后将集合中的每个元素传递给指定的函数。


    ```

    (apply str ["a" "b" "c"])

    ;; "abc"

    代码清单 3-5.

    apply 示例

    ```


    在代码清单 3-5 中，我们能够利用一个集合，而这段代码的效果本质上就像我们调用了 `(str "a" "b" "c")` 一样。`apply` 函数的优势在于，当你直到运行时才知道参数是什么的时候使用。

