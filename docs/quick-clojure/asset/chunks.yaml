    # 4. 序列


    在 Clojure 中，我们有许多类型的集合：列表、向量、映射和集合。这些集合中的每一个也都是一个序列。Clojure 提供了一个被称为序列抽象的接口，正是这种抽象使得多种内置函数能够统一地处理这些不同的集合类型。


    在深入探讨序列抽象之前，让我们先从一个在 Clojure 编程中常见的任务开始，即需要遍历一个集合以执行某种形式的副作用。请考虑以下示例（清单 4-1），其中我们遍历一个列表集合。


    ```

    (doseq [element ''(:a :b :c)]

    (prn (str (name element) "!")))

    ;; "a!"

    ;; "b!"

    ;; "c!"

    ;; nil

    清单 4-1.

    仅触发副作用的示例（无修改）

    ```


    在清单 4-1 中，我们可以看到我们正在遍历集合 `''(:a :b :c)`，并且在每次循环迭代中，局部变量 (`element`) 都会被更新以保存当前的集合项。作为
    `doseq` “主体”的一部分，我们使用 `name` 函数将该项（它是一个关键字）转换为字符串，然后使用 `str` 在末尾追加 `"!"`。最后，我们打印出结果值。


    因此，在这个示例中，我们并没有修改集合；我们只是在创建副作用，这个副作用就是我们将一个值打印到屏幕上。执行 `doseq` 的实际结果是 `nil` 值。


    现在，我们可以使用 Clojure 的 `for` 函数来遍历序列，实现相同的副作用，但得到不同的最终结果。请参见清单 4-2。


    ```

    (for [element ''(:a :b :c)]

    (prn (str (name element) "!")))

    ;; (nil nil nil)

    清单 4-2.

    for 循环示例

    ```


    在前面的示例中，代码遍历给定的集合，目的是根据每次迭代的结果创建一个新的列表。但由于我们没有为每次迭代从主体中返回任何内容，最终返回的是 `(nil nil
    nil)`。


    因此，`for` 和 `doseq` 的真正区别在于，后者仅用于副作用（并随后返回 `nil`）；而 `for` 形式实际上就是所谓的列表推导式。那么，让我们进入下一节，以更好地理解这意味着什么。


    ## 列表推导式


    使用前面的示例，你可能会认为 `for` 很像 `map` 函数（我们在前一章中见过），这是情有可原的。清单 4-3 中的示例使用了 `map`，它产生了完全相同的副作用，并且返回了与我们刚刚看到的
    `for` 版本相同的整体结果。


    ```

    (map

    (fn [element]

    (prn (str (name element) "!")))

    ''(:a :b :c))

    清单 4-3.

    使用 map 模拟 for 示例


    与之前的 `for` 示例相比，`for` 似乎比 `map` 版本更容易阅读，那么问题就变成了：哪种更合适使用，以及何时使用？


    嗯，从技术上讲，`for` 函数就是所谓的列表推导式，这是一种从现有列表创建列表的方法，并且应该返回一个列表或迭代器。选择 `for` 形式而不是 `map`（反之亦然）的原因将取决于两点：


    1.  你是要从现有序列创建一个新序列，还是想要修改一个现有集合？  

    2.  你是想使用多个集合，还是不想？  


    在第一种场景中，`for` 允许使用“修饰符”来帮助创建一个比它所遍历的序列更小的序列，而 `map` 总是返回相同大小的序列。


    在第二种场景中，如果你使用多个集合，`for` 形式将产生与 `map` 处理多个集合时不同的结果（如清单 4-4 所示）。


    ```

    (for [x [1 2]

    y [7 8]]

    (do

    (prn x y)

    (+ x y)))

    清单 4-4.

    使用 for 形式进行列表推导式的示例

    ```


    如果你在 REPL 中运行清单 4-4，你应该会注意到我们最终遍历了第二个集合 `y` 两次。我们取第一个集合 `x` 的第一个元素，然后遍历集合 `y`。完成后，我们取第一个集合
    `x` 的第二个元素，然后再次开始遍历第二个集合 `y`。


    现在，将此与 `map` 如何处理多个集合进行对比（清单 4-5）。


    ```

    (map #(do

    (prn %1 %2)

    (+ %1 %2))

    [1 2]

    [7 8])

    清单 4-5.

    map 处理多个集合时的差异

    ```


    在 REPL 中运行清单 4-5 后，你应该会注意到 `map` 实际上只遍历了一个集合，但对于每次迭代，它都会组合来自第一个和第二个集合的元素（几乎像 zip
    操作一样）。因此，在第一次迭代中，它将 `1` 和 `7` 传递给匿名函数。在第二次迭代中，它传递了 `2` 和 `8`。


    好的，那么列表推导式还有什么特别之处呢？嗯，它们提供了“修饰符”，用于控制主体何时执行。Clojure 提供了三个修饰符：`:let`、`:while` 和
    `:when`。我们可以在清单 4-6 中看到最后一项 (`:when`) 的使用。


    ```

    (for [x (range 5)

    :when (> (* x x) 3)]

    (* 2 x))

    ;; (4 6 8)

    清单 4-6.

    :when 修饰符的演示

    ```


    在清单 4-6 中，我们使用 `range` 函数创建一个数字序列 `(0 1 2 3 4)`，并在每次迭代中将当前元素赋值给 `x`。在绑定块中，我们指定要使用的修饰符（在本例中为
    `:when`），后跟它将验证的测试条件。


    在我们的测试中，我们规定只有当当前元素（自身相乘时）大于 3 时，才应执行主体。主体的结果随后被放入一个返回的新列表中。因此，当使用 `for` 形式时，我们实际上是在“从一个序列构建一个序列”。

