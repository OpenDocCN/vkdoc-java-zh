    ## 匿名函数简写


    我们在第 2 章已经见过匿名函数的语法结构。在那章中，我们还看到语法可以简写为：`#(...)`。之前我们略过的一点是，在函数体内，你可以使用 `%1`、`%2`
    等语法来访问函数的参数。


    清单 5-1 中的代码片段演示了一个基本示例。


    ```

    (map #(+ (+ 2 %1) 2) [1 2 3])

    ;; (5 6 7)

    清单 5-1.

    在简写语法中访问函数参数

    ```


    我们在第 3 章介绍了 `map` 函数的工作原理。快速回顾一下，`map` 函数使我们能够对序列/集合中的每个元素执行给定的函数。


    因此，在上面的示例中，我们的匿名函数被执行了三次。第一次，参数为 `1`；第二次，参数为 `2`；最后一次，参数值为 `3`。然后匿名函数修改它接收到的值，并返回集合的修改版本。


    ## 前置与后置条件


    Clojure 中一个非常强大的特性是能够在函数体本身之前和之后执行代码。例如，这使我们能够验证传入的函数参数，以及验证函数的结果是否符合预期。


    语法结构如清单 5-2 所示。


    ```

    (defn  []

    {:pre  [, , ...]

    :post [, , ...]}

    ())

    清单 5-2.

    前置/后置条件的语法结构

    ```


    如你所见，我们在函数体之前提供了一个映射数据结构，其中包含 `:pre` 和 `:post` 键（两者都是可选的）。每个键被分配一个函数向量，这些函数将在函数体之前或之后直接执行，并且它们应返回布尔值
    true 或 false。


    注意


    你可以在 `:pre` 和 `:post` 函数中引用函数参数，并通过引用 `%`（我们稍后会看到）在 `:post` 函数中引用函数体的结果。


    例如，假设我们有一个函数，它应该将两个数字相加；其代码类似于清单 5-3。


    ```

    (defn my-sum [f, g]

    {:pre  [(integer? f), (integer? g)]

    :post [(integer? %)]}

    (+ f g))

    清单 5-3.

    前置/后置条件示例

    ```


    因此，对于这个特定的示例函数，如果我执行 `(my-sum 2 2)`，我会看到预期的返回值 `4`。但是，如果我使用一个 `String` 类型的参数调用该函数（例如，`(my-sum
    "2" 2)`），那么我会看到清单 5-4 中显示的输出。


    ```

    AssertionError Assert failed: (integer? f)  user/my-sum (form-init611908878853766826.clj:1)

    清单 5-4.

    前置/后置条件失败引发的异常

    ```


    这个异常告诉我函数执行失败，因为前置条件未能通过我定义的某个验证函数（在这种情况下，第一个验证函数正在验证 `f` 是否确实是一个整数）。


    现在，假设有人过来修改了这段代码，使得返回值是消息 `"Result: "` 后跟任何结果值。因此，如果我们运行 `(my-sum 2 2)`，他们期望的结果看起来像
    `"Result: 4"`。参见清单 5-5。


    ```

    (defn my-sum [f, g]

    {:pre  [(integer? f), (integer? g)]

    :post [(integer? %)]}

    (str "Result: " (+ f g)))

    清单 5-5.

    修改后的前置/后置条件逻辑

    ```


    会发生的情况是，当函数被调用时，我们会清楚地看到修改破坏了代码，因为 REPL 会显示清单 5-6 中所示的错误消息。


    ```

    AssertionError Assert failed: (integer? %)  user/my-sum (form-init611908878853766826.clj:1)

    清单 5-6.

    前置/后置条件失败引发的新异常

    ```


    这个错误表明后置条件验证函数失败了。为了解决这个问题，那个人可以修改 `:post` 条件以允许 `String` 响应，如清单 5-7 所示。


    ```

    (defn my-sum [f, g]

    {:pre  [(integer? f), (integer? g)]

    :post [(string? %)]}

    (str "Result: " (+ f g)))

    ;; "Result: 4"

    清单 5-7.

    修改前置/后置条件逻辑以修复后置错误

    ```


    或者完全移除 `:post` 条件，如清单 5-8 所示。


    ```

    (defn my-sum [f, g]

    {:pre [(integer? f), (integer? g)]}

    (str "Result: " (+ f g)))

    ;; "Result: 4"

    清单 5-8.

    修改前置/后置条件逻辑以修复后置错误

    ```


    ## clojure.core


    `clojure.core` 命名空间包含用于处理各种需求的函数和宏。它是 Clojure 语言的基础库。在接下来的章节中，我们将重点介绍一些有趣的内容，并希望能鼓励你探索命名空间的其余部分，看看里面有什么。


    ### 映射构建


    假设你有一个值列表（或向量），希望将其构建成一个简单的映射数据结构。我们可以通过使用 `apply` 函数以手动方式实现这一点（参见清单 5-9）。


    ```

    (apply assoc {} [:foo 1 :bar 2])

    ;; {:foo 1, :bar 2}

    清单 5-9.

    使用 apply 和 assoc 将向量转换为映射

    ```


    但是核心库中已经提供了一个函数来减少所需的样板代码，它叫做 `array-map`。这个函数的工作方式是接受一个参数列表，然后将其操作成一个映射。参见清单
    5-10。


    ```

    (array-map :foo 1 :bar 2)

    清单 5-10.

    使用 array-map 将参数转换为映射

    ```


    但是，你也可以利用 `apply` 函数（就像我们在演示 `assoc` 方法时那样）并向其提供一个列表或向量，如清单 5-11 所示。


    ```

    (apply array-map ''(:foo 1 :bar 2))

    (apply array-map  [:foo 1 :bar 2])

    清单 5-11.

    使用 apply 和 array-map 将列表/向量转换为映射

    ```

