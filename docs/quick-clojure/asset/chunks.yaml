    Note


    With `map->Record`, the keys in the map data structure can be in any order, unlike
    with `Record.` or `->Record`.


    Let’s now consider an example where we also would like our record to home a single
    method called `message` (as well as the previously defined fields `bar`, `baz`,
    and `qux`).


    ```

    (defprotocol IFoo

    (message [obj]))

    (defrecord Foo [bar baz qux]

    IFoo

    (message [obj] (str "hello " obj " from " bar ", " baz " and " qux)))

    (def f (Foo. "x" "y" "z"))

    f

    ;; #user.Foo{:bar "x", :baz "y", :qux "z"}

    (.message f) ;; "hello user.Foo@b679dccc from x, y and z"

    Listing 11-5.

    Example of defrecord with Additional Method

    ```


    In Listing [11-5](#A453572_1_En_11_Chapter.html#Par45), we can see that because
    we want to include a method in our record (and because records are really just
    Java classes) we first need to define a protocol (interface). I’ve used the convention
    of prefixing an interface name with a capital `i` (but you can use whatever convention
    makes most sense to you). The method we’ve defined accepts a single parameter,
    `obj`.


    Next, we define our record the same way as we did previously, but now we have
    an extra two lines. The first is the interface we wish to support, and the second
    is the concrete implementation of the protocol. You can also see that the method
    is able to access the other fields the record has been initialized with.


    Lastly, we call our method using dot Java interop dot notation.


    ## Reify


    The last item we’ll look at is the `reify` macro, which is able to produce an
    anonymous type. This is unlike both `deftype` and `defrecord`, which produce a
    named type. The purpose of `reify` is solely to provide a way to define a one-time
    implementation of a pre-existing protocol/record, while its body is a lexical
    closure, meaning it can access the surrounding local scope.


    This is probably best demonstrated by way of an example (see Listing [11-6](#A453572_1_En_11_Chapter.html#Par53)),
    which highlights how the `reify` type is able to access the local scope around
    it to provide a wrapped response.


    Note


    See `clojuredocs.org` [³](#A453572_1_En_11_Chapter.html#Fn3) for a more practical
    example.


    ```

    (defprotocol IFoo (message [obj]))

    (defrecord Foo [bar baz qux] IFoo

    (message [obj] (str "hello " obj " from " bar ", " baz " and " qux)))

    (def f (Foo. "x" "y" "z"))

    (defn wrapper [instance]

    (reify IFoo

    (message [_] (str "wrapped result: " (message instance)))))

    (message (wrapper f))

    ;; "wrapped result: hello user.Foo@b679dccc from x,y and z"

    Listing 11-6.

    Example of reify for One-time Anonymous Implementation

    ```


    ## Summary


    This has been a very short chapter that has focused primarily on a small subset
    of available object-oriented features within the Clojure language.


    We’ve avoided discussing the Java interop features and how to work with Java code
    from Clojure, as I feel that this should be a book focused more on Clojure than
    on Java. The moment you start introducing interop with Java it means requiring
    some basic knowledge of Java (something outside the scope of this book).


    What we’ve learned is that we can define structure code very well through the
    use of protocols (`defprotocol` allows us to define clear interface boundaries),
    as well as define both mutable and immutable classes using `deftype` and `defrecord`.
    We also saw how we could implement a scoped wrapper for one-off protocol/record
    implementations.


    In the next chapter, we will take a closer look at the Leiningen build tool. So
    far, we’ve been using Leiningen as a REPL and simple project tool (for defining
    some additional dependencies). We’ll take a look at the different types of templates
    and application structures available within Leiningen and at how to produce a
    quick static web page.


    Footnotes [1](#A453572_1_En_11_Chapter.html#Fn1_source)


    [https://​www.​scala-lang.​org/​](https://www.scala-lang.org/)


      [2](#A453572_1_En_11_Chapter.html#Fn2_source)


    [https://​clojure.​org/​reference/​java_​interop](https://clojure.org/reference/java_interop)


      [3](#A453572_1_En_11_Chapter.html#Fn3_source)


    [https://​clojuredocs.​org/​clojure.​core/​reify#example-542692cdc026201c​dc326d5d](https://clojuredocs.org/clojure.core/reify#example-542692cdc026201cdc326d5d)'
