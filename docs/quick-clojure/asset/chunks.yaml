  trans: "\n### STM 重启策略\n\n在清单 8-23 中，我们将看到如何使用 `alter` 函数来修改 `ref` 的值。这很可能是在处理 STM\
    \ 时最常用的操作。STM 会尝试检测 `ref` 在其事务外部是否发生了更改，如果确实发生了更改，则会重启该事务。\n\n你将在清单 8-23 中看到，我们尝试使用多个\
    \ `future` 同时修改该值三次（请记住，`future` 会在与父线程不同的独立线程中运行）。\n\n请先通读代码，然后我将开始分解 STM 为解决其面临的冲突所采取的过程，这要归功于一个相当简单的多线程程序。\n\
    \n```\n(def r (ref []))\n(defn modify [r, f, a, s]\n(dosync\n(Thread/sleep s)\n\
    (alter r f a)))\n(future (modify r conj :a 2000))\n(future (modify r conj :b 1000))\n\
    (future (modify r conj :c 0))\n@r\n;; [:c :b :a]\n清单 8-23.\nSTM 重启策略如何工作的示例\n\
    ```\n\n如果你立即尝试解引用 `r`，你会注意到它只包含一个值 `[:c]`；然后一秒钟后，它会包含 `[:c :b]`；最后三秒钟后，它会包含最终的集合\
    \ `[:c :b :a]`。\n\n在清单 8-23 中，我们可以看到用户自定义的函数 `modify`，它首先启动一个事务（使用 `dosync`），然后休眠指定的秒数，再使用\
    \ `alter` 修改提供的引用变量内的值。\n\n接着，我们启动三个线程（使用 `future`），并在每个线程中执行用户自定义函数 `modify`，同时向其传递相关的引用值、函数和休眠参数。\n\
    \n我们使用了非常具体的休眠值来演示，在应用程序设计过程中，非确定性代码并不一定会按照其定义的顺序完成。\n\n注意\n\n需要明确的是，我仅使用 `(Thread/sleep)`\
    \ 来模拟非确定性行为。你的应用程序代码可能会使用某种形式的阻塞 I/O，其完成时间各不相同。因此，多次执行该代码可能会导致不同的结果顺序。\n\n在清单\
    \ 8-23 中，STM 采取的过程如下（这是一个过度简化的描述，但至少能让你了解其工作原理）：\n\n*   `:a` 被传入（代码暂停两秒）。\n* \
    \  `:b` 被传入（代码暂停一秒）。\n*   `:c` 被传入。\n    *   `alter` 函数使 STM 检查自事务开始以来 `ref` 的值是否已更改。\n\
    \    *   此时值仍然是 `[]`（因为其他调用处于暂停状态）。\n    *   更新后的值被应用。\n*   `:b` 解除暂停并检查 `ref`\
    \ 的值（因为它即将应用 `conj` 函数）。\n    *   值不再是 `[]`，而是 `[:c]`，因此 STM 重启事务。\n    *   此时\
    \ `:a` 仍处于暂停状态，因此事务完成。\n*   `:a` 解除暂停并检查 `ref` 的值。\n    *   值不再是 `[]`，而是 `[:c\
    \ :b]`，因此 STM 重启事务。\n    *   事务完成，因为没有其他事务导致重启。\n    *   这意味着 `ref` 的值（最终）是 `[:c\
    \ :b :a]`。\n\n在现实场景中，事务完成所需的时间不会像刚才的例子那样清晰，但这至少让你了解了处理 STM 时所涉及的过程。\n\n### 嵌套事务\n\
    \nClojure 的 STM 实现也支持嵌套事务。在清单 8-24 中，你将看到两个示例。第一个示例将突出显示在独立线程中执行的嵌套事务如何启动一个新事务，而第二个示例定义了一个新的\
    \ `dosync` 块，但由于它在与外部 `dosync` 块相同的线程上运行，因此它不会创建新事务，所以行为/结果有所不同。\n\n```\n(def\
    \ r (ref 0))\n(dosync\n(future (dosync (Thread/sleep 50) (println :foo) (alter\
    \ r inc)))\n(println :bar)\n(alter r inc))\n;; :bar\n;; 1\n;; :foo\n;; :foo (表示事务重启，因为\
    \ ref 被外部修改)\n;; 2\n;; 未生成新线程，因此 ref 被修改两次\n;; 而内部事务不会被重试\n(def r (ref 0))\n(dosync\n\
    (dosync (Thread/sleep 50) (println :foo) (alter r inc ))\n(println :bar)\n(alter\
    \ r inc))\n;; :foo\n;; :bar\n;; 2\n清单 8-24.\n嵌套事务示例\n```\n\n### ensure\n\n为了避免出现死锁或活锁情况（即竞争事务依赖于多个引用），我们可以利用\
    \ `ensure` 函数来保护引用免受其他事务的修改。\n\n在清单 8-25 中，你可以看到我们有两个引用：`current-account` 和 `savings-account`，它们相加后的总值为\
    \ 1100。我们唯一的条件是这两个账户的总和不能低于 1000。\n\n在给定的示例中，我们尝试同时从两个账户中减去 100。这些请求中只有一个会成功，因为我们要求最低值为\
    \ 1000 的约束意味着两个请求不能同时成功，因为那样我们会低于约束阈值。这个困境很好地说明了简单的并发需求如何导致争用。\n\n```\n(def current-account\
    \ (ref 500))\n(def savings-account (ref 600))\n(defn withdraw [from available\
    \ amount]\n(dosync\n(let [total (+ @from (ensure available))]\n(Thread/sleep 1000)\
    \ ; 允许更明显的上下文切换\n(if (>= (- total amount) 1000)\n(alter from - amount)\n(println\
    \ \"抱歉，无法从 \"\n(:name (meta (var current-account)))\n\" 中提取 100，因为违反了约束\")))))\n\
    (println \"之前：活期账户余额为\" @current-account)\n(println \"之前：储蓄账户余额为\" @savings-account)\n\
    (println\n\"之前：总余额为\"\n(+ @current-account @savings-account))\n(future (withdraw\
    \ current-account savings-account 100))\n(future (withdraw savings-account current-account\
    \ 100))\n(Thread/sleep 2000)\n;; 休眠足够长的时间以允许两个事务完成\n(println \"之后：活期账户余额为\" @current-account)\n\
    (println \"之后：储蓄账户余额为\" @savings-account)\n(println\n\"之后：总余额为\"\n(+ @current-account\
    \ @savings-account))\n清单 8-25.\n使用 ensure 协调多个条件的示例\n```\n\n从清单 8-25 可以预期的输出如清单\
    \ 8-26 所示。\n\n```\n之前：活期账户余额为 500\n之前：储蓄账户余额为 600\n之前：总余额为 1100\n抱歉，无法从 current-account\
    \ 中提取 100，\n因为违反了约束\n之后：活期账户余额为 500\n之后：储蓄账户余额为 500\n之后：总余额为 1000\n清单 8-26.\n\
    清单 8-25 程序的输出\n```\n\n如果我们看看正在发生的事情，可能看起来有很多内容需要消化，但请记住，这些都是我们已经见过的代码，因此通过逐行阅读，你应该能够看到，最终，我们是在事务内部使用\
    \ `ensure` 来保护 `available` 这个引用免受修改。\n\n如果 `available` 在事务外部被修改，那么 STM 将使用最新的值重启事务，然后我们就能知道是否可以安全地继续扣除指定金额。\n\
    \n注意\n\n花些时间仔细回顾前面的代码；不要急于求成。在多线程的上下文中，确保你理解正在发生的事情以及发生的时间。\n"
- fmt: '### `commute`


    `commute`函数在修改指定引用时提供“最后写入者获胜”的行为，当您希望获得最高并发性且操作顺序无关紧要时最为有用（事务旨在防止对`ref`的多次同时写入）。


    本质上，`commute`会立即返回对引用应用所提供函数的结果，但在事务结束时，它会再次同步执行计算，此时才实际更新引用的值。该修改本身是可交换的，因此不会有事务被回滚。


    这就是为什么在清单[8-27](#A453572_1_En_8_Chapter.html#Par183)中，执行该示例代码时您可能会多次看到相同的值被打印，但最终结果始终一致。


    ```

    (def foo (ref 0))

    (defn inc-ref [r]

    (dosync

    (commute r inc)

    (println @r)))

    (let [threads (for [x (range 0 20)] (Thread. #(inc-ref foo)))]

    (doall (map #(.start %) threads))

    (doall (map #(.join %) threads))

    (inc-ref foo))

    Listing 8-27.

    Example of Using commute

    ```


    注意


    我们使用`Thread.`而不是`future`，以便能够更精细地控制线程何时执行，并表明我们希望等待所有线程完成后再继续。


    如果您运行了清单[8-27](#A453572_1_En_8_Chapter.html#Par183)中的代码，但将其修改为使用`alter`而不是`commute`，那么您会注意到`alter`如何强制更新顺序，因此打印的值总是精确地从1计数到21（而`commute`的最终结果仍然是21，但达到该结果的过程是可交换的）。


    ## 通道


    现在我们已经介绍了所有标准核心库的并发特性，还有一项需要考虑，那就是通道的使用，它仅在`core.async`库中可用。


    要使用`core.async`，您需要告诉Leiningen加载它（类似于我们在前一章中对`core.match`所做的操作）。目前最简单的方法是——因为我们仍在REPL中运行所有示例——停止当前打开的REPL（按`<Ctrl-d>`执行此操作），并创建以下`project.clj`文件（如果您已有`project.clj`文件，则添加新行）。参见清单[8-28](#A453572_1_En_8_Chapter.html#Par188)。


    ```

    (defproject test "0.1.0-SNAPSHOT"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/core.async "0.3.442"]])

    Listing 8-28.

    Update Project with core.async Dependency

    ```


    创建此文件后，使用`lein repl`重新启动REPL（Leiningen将使用`project.clj`的内容设置其环境），并执行清单[8-29](#A453572_1_En_8_Chapter.html#Par190)中的行。


    ```

    (require ''[clojure.core.async :as async :refer :all])

    Listing 8-29.

    Load core.async into Your Running REPL Instance

    ```


    注意


    同样，不必担心理解项目文件或`require`函数调用的语法，我将在后续章节详细讨论Leiningen时解释这一切。


    此时，您将拥有一组可用的宏（例如`<!!`、`>!!`、`chan`、`buffer`等）。


    `core.async`背后的思想借鉴自Go语言[²](#A453572_1_En_8_Chapter.html#Fn2)（谷歌广受欢迎的编程语言，其并发原语在开发者社区中备受推崇）。


    尽管Go在现代使通道概念流行起来，但通道的设计可以追溯到20世纪70年代，始于Tony Hoare撰写的一篇名为“通信顺序进程”（CSP）的论文。


    实际上，通道是一个管道：您将数据从一端放入，然后从另一端取出。从并发的角度来看，这之所以效果很好，是因为它保护了管道中的数据免受其他线程/进程的干扰。


    使用通道最具挑战性的部分可能是，当您放入/取出数据时，它们会阻塞您的应用程序。这是因为它们本质上是在连接不同的进程。我们几乎总是将通道与另一个称为go块的概念一起使用。但我稍后会回到这一点；首先，我认为一个简单的示例是必要的。参见清单[8-30](#A453572_1_En_8_Chapter.html#Par199)。


    注意


    以下代码将无限期地阻塞正在运行的进程。您可以在REPL中按`<Ctrl-c>`来解除阻塞，但在设计应用程序时，明智的做法是注意，如果设置不当，通道可能会阻塞进程。


    ```

    (def c (chan))

    (>!! c :foo)

    ;; will block until something

    ;; takes :foo out the other end of the channel

    Listing 8-30.

    Simple Example of a Channel That Will Block

    ```


    在清单[8-30](#A453572_1_En_8_Chapter.html#Par190)中，我们可以看到我们创建了一个变量`c`，并为其分配了一个新的`chan`（通道）。一旦有了这个通道，我们可以使用`>!!`将值放入通道，并使用`<!!`从通道中取出值。


    前面示例的问题在于，一旦您调用`<!!`，它将无限期阻塞。理想情况下，您希望（至少对于一个可工作的示例）使用另一个线程将值放入通道，因为至少新生成的线程可以被阻塞，而不是阻塞您的主线程并导致REPL锁定！


    清单[8-31](#A453572_1_En_8_Chapter.html#Par203)演示了一个稍微实用一些的示例，它不会阻塞您的REPL。


    ```

    (def c (chan))

    (future (>!! c :foo))

    ;; this thread will be blocked

    (<!! c)

    ;; :foo

    Listing 8-31.

    Simple Example of a Channel That Doesn’t Block

    ```


    在清单[8-31](#A453572_1_En_8_Chapter.html#Par203)中，我们将一条消息放入通道（在本例中，消息是关键字`:foo`），并且由于这是在子线程中完成的（得益于使用了`future`），我们能够继续在REPL的父线程中工作。从这里，您可以看到我们现在正在从通道中取出任何可用的值（使用`<!!`），并且由于值可用，我们不会阻塞。


    因此，举例来说，假设我现在想从我的通道`c`中取出另一个值。好吧，我已经取出了值`:foo`，并且我知道通道中已经没有剩余内容可取了，那么会发生什么？如果我再次取出（例如，`(<!!
    c)`），那将阻塞我的整个线程，直到程序中其他地方的某些代码将值推入通道（从而解除我的取出操作）。


    为了避免这个问题（同样，为了在REPL中进行实验），我们可以再次利用`future`。参见清单[8-32](#A453572_1_En_8_Chapter.html#Par207)中的示例。


    ```

    (future

    (prn (str "hey! a new value " (!! c "bar")

    ;; true (+ side effect: "hey! a new value bar" printed)

    Listing 8-32.

    Place Value into Channel via future

    ```'
  raw: '### commute


    The `commute` function provides us a “last one in wins” behavior when mutating
    a specified reference, and is most useful when you want the highest possible concurrency
    and the order of operations does not matter (transactions are designed to prevent
    multiple simultaneous writes to a `ref`).


    In essence, `commute` will immediately return the result of applying the provided
    function on the reference, but at the end of the transaction it will perform the
    calculation again synchronously, and it is at that point it actually updates the
    reference’s value. The modification itself is commutative, and so no transaction
    is ever rolled back.


    This is why, in Listing [8-27](#A453572_1_En_8_Chapter.html#Par183), you could
    see the same value printed multiple times when executing that example code, but
    the actual end result is always consistent.


    ```

    (def foo (ref 0))

    (defn inc-ref [r]

    (dosync

    (commute r inc)

    (println @r)))

    (let [threads (for [x (range 0 20)] (Thread. #(inc-ref foo)))]

    (doall (map #(.start %) threads))

    (doall (map #(.join %) threads))

    (inc-ref foo))

    Listing 8-27.

    Example of Using commute

    ```


    Note


    We use `Thread.` instead of a `future` so that we can have greater control over
    when the thread is actioned, as well as to indicate that we wish to wait for all
    the threads to finish before we move on.


    If you ran the code from Listing [8-27](#A453572_1_En_8_Chapter.html#Par183) but
    modified it so that you used `alter` instead of `commute`, then you would notice
    how alter enforces the order of updates, and so the printed values are always
    exactly counted 1-21 (whereas `commute`’s end result is still 21, but the process
    to get there is commutative).


    ## Channels


    Now that we’ve covered all the standard core library concurrency features, there
    is one more item to consider, and that’s the use of channels, which are only available
    within the `core.async` library.


    To use `core.async`, you’ll need to tell Leiningen to load it (similar to what
    we did in a previous chapter with `core.match`). The easiest way to do this right
    now`—`as we’re still running all our examples within the REPL`—`is to stop the
    REPL you currently have open (press `<Ctrl-d>` to do that) and create the following
    `project.clj` file (or add the new lines if you already have a `project.clj` file).
    See Listing [8-28](#A453572_1_En_8_Chapter.html#Par188).


    ```

    (defproject test "0.1.0-SNAPSHOT"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/core.async "0.3.442"]])

    Listing 8-28.

    Update Project with core.async Dependency

    ```


    Once this file has been created, start up the REPL again using `lein repl` (Leiningen
    will use the content of the `project.clj` to set up its environment) and execute
    the line in Listing [8-29](#A453572_1_En_8_Chapter.html#Par190).


    ```

    (require ''[clojure.core.async :as async :refer :all])

    Listing 8-29.

    Load core.async into Your Running REPL Instance

    ```


    Note


    Again, don’t worry about understanding the syntax of either the project file or
    the `require` function call, as I’ll explain all this soon enough when we start
    discussing Leiningen in more detail in a later chapter.


    At this point, you’ll have a group of macros available (such as `<!!`, `>!!`,
    `chan`, `buffer`, and more) at your disposal.


    The idea behind `core.async` was borrowed from golang [²](#A453572_1_En_8_Chapter.html#Fn2)
    (Google’s own popular programming language, whose concurrency primitives are highly
    touted among the developer community).


    Although Go has done the hard work of making the concept of channels popular in
    our modern age, the design of channels goes way back to the 1970s, starting with
    a paper called “Communicating Sequential Processes ” (CSP) written by Tony Hoare.


    Effectively, a channel is a pipe: you stick data in one end and you pull it out
    from the other end. The reason this works really well, from a concurrency perspective,
    is because it protects the data on the way down the pipe from interference from
    other threads/processes.


    Probably the most challenging part of using channels is the idea that they block
    your application when you put/pull data. This is because fundamentally they’re
    connecting different processes. We’ll almost always use channels with another
    concept known as a go block . But I’ll come back to that; first, I think a simple
    example is in order. See Listing [8-30](#A453572_1_En_8_Chapter.html#Par199).


    Note


    The following code will block your running process indefinitely. You can press
    `<Ctrl-c>` while inside the REPL to break the block, but when designing your application,
    it would be wise to be mindful that channels can block a process if not set up
    properly.


    ```

    (def c (chan))

    (>!! c :foo)

    ;; will block until something

    ;; takes :foo out the other end of the channel

    Listing 8-30.

    Simple Example of a Channel That Will Block

    ```


    In Listing [8-30](#A453572_1_En_8_Chapter.html#Par190), we can see we’ve created
    a variable `c` and assigned it a new `chan` (channel). Once we have this channel,
    we can use `>!!` for putting a value into the channel, and we can use `<!!` for
    taking a value from the channel.


    The problem with the preceding example is that it will block indefinitely once
    you call `<!!`. Ideally, what you’ll want to do (at least for a workable example)
    is to use another thread for putting a value onto a channel, because at least
    the new thread spawned can be blocked, rather than blocking your main thread and
    causing the REPL to lock up!


    Listing [8-31](#A453572_1_En_8_Chapter.html#Par203) demonstrates a slightly more
    practical example that doesn’t block your REPL .


    ```

    (def c (chan))

    (future (>!! c :foo))

    ;; this thread will be blocked

    (<!! c)

    ;; :foo

    Listing 8-31.

    Simple Example of a Channel That Doesn’t Block

    ```


    In Listing [8-31](#A453572_1_En_8_Chapter.html#Par203), we put a message into
    the channel (in this case, the message is the keyword `:foo`), and because that’s
    done in a child thread (thanks to the use of a `future`), we’re able to continue
    working in the REPL’s parent thread. From here, you can see we’re now pulling
    whatever value is available from the channel (using `<!!`), and because the value
    is available we do not block.


    So, for example, let’s now say I want to try to pull another value from my channel
    `c`. Well, I’ve already pulled out the value `:foo`, and I know there is nothing
    left to take from the channel, so what will happen? Well, if I were to pull again
    (e.g., `(<!! c)`), that would block my entire thread until I had some code somewhere
    else in my program that pushed a value into the channel (causing my pull to unblock).


    To avoid that issue (again, for the purposes of experimentation within the REPL),
    we can take advantage of `future`s again. See an example in Listing [8-32](#A453572_1_En_8_Chapter.html#Par207).


    ```

    (future

    (prn (str "hey! a new value " (!! c "bar")

    ;; true (+ side effect: "hey! a new value bar" printed)

    Listing 8-32.

    Place Value into Channel via future

    ```'
