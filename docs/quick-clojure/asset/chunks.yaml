  trans: '

    ## 偏函数应用


    在上一节中，我们使用 `partial` 函数演示了 Clojure 如何支持高阶函数。但 `partial` 函数本身也体现了另一个重要的函数式概念——偏函数应用，即通过基于现有函数定义新函数，并预填充部分参数，从而提升代码的可复用性。


    偏函数应用有助于创建能够超越其初始用途、扩展应用场景的函数。例如，你正在为使用者构建一个 API。API 的某部分需要与后端系统通信，而调用时需要提供大量参数（其中一半是固定不变的通用细节）。


    与其让 API 使用者提供所有参数，不如在 API 中暴露一个已经经过偏函数应用的函数。在你的代码中，使用偏函数应用预填充某些参数，然后 API 使用者只需填写剩余参数（而无需察觉已有额外参数被预先设置）。


    注意


    关于 `partial` 函数的简单示例，请参见清单 3-3。


    偏函数应用的概念经常与另一个函数式概念——柯里化（Currying，Clojure 不支持）混淆。当你对函数进行“柯里化”时，函数的参数会在内部被拆解为多个独立的函数。


    如果你的函数接受三个参数，那么经过柯里化后，你需要执行该函数三次，每次调用提供一个参数（实际过程比这更复杂，但这是理解两者区别所需的基本概念）。


    柯里化函数在所有参数提供完毕之前不会执行其函数体（这与偏函数应用类似）。因此，再次强调，如果你的函数接受三个参数，你可以通过以下方式之一调用柯里化函数。第一个示例见清单
    3-19。


    注意


    我将使用类似 C 语言的语法，仅用于区分示例原理与实际的 Clojure 代码（Clojure 不支持柯里化）。但请注意，JavaScript 中也不存在此类原生函数。


    ```

    curried(1, 2, 3);

    // 所有参数在一次调用中同时提供

    curried(1, 2)(3);

    // 提供两个参数，然后单独调用提供剩余参数

    curried(1)(2)(3);

    // 每次调用提供一个参数

    清单 3-19.

    使用类 C 语法的理论柯里化函数示例

    ```


    让我们考虑一个更详细的示例（见清单 3-20），继续使用类 C 语法，但再次强调，此示例仅用于传达柯里化的核心思想，以便你理解其与偏函数应用的区别。


    ```

    var fn  = function (a, b, c) { return a + b + c }

    var foo = curry(fn)

    foo(''x'')(''y'')(''z'') // ''xyz''

    var bar = curry(fn)

    var baz = bar(''x'')

    baz(''y'')(''z'') // ''xyz''

    清单 3-20.

    对之前理论柯里化函数的扩展

    ```


    当我们查看清单 3-20 中的示例时，实际上我们看到的是，赋值给变量 `fn` 的函数在内部被转换为类似清单 3-21 的形式。


    ```

    function f(a) {

    function (b) {

    function (c) {

    return a + b + c;

    }

    }

    }

    清单 3-21.

    柯里化编译输出的内部表示

    ```


    因此，总结一下，柯里化与偏函数应用的主要区别如下：


    1.  偏函数应用只进行一次值填充。因此，如果你的函数接受三个参数，并且你偏函数应用了其中两个，那么当调用结果函数时，你只需提供一个参数。如果你只偏函数应用了一个参数，那么你仍然只需调用结果函数一次（但这次你需要提供剩余的两个参数）。

    2.  如果考虑之前的“API”场景，你（作为 API 的创建者）为偏函数应用提供初始值；而对于柯里化函数，则由使用者提供参数。

    '
- fmt: '# Recursive Iteration


    Programming languages that are mutable by default (e.g., JavaScript, Ruby, etc.)
    rely on the fact that they create side effects (and can mutate state) in order
    to execute their looping constructs.


    The classic `for` loop you’re likely familiar with, `for (i = 0; i < 10; i++)
    {}`, by design allows mutating local variables to increment the loop. In Clojure,
    local variables are immutable, and so for us to loop we need to use recursive
    function calls instead.


    Instead of looping, you’ll typically need to use the `loop`/`recur` special form
    (which we’ll demonstrate shortly), although a lot of the time other iterator-style
    functions such as `map`, `reduce`, and `filter` will be better fitted to solving
    the problem at hand.


    The main benefit of the `loop`/`recur` special form is that it allows you to safely
    apply recursive function calls without exhausting your memory stack. For example,
    if you’ve ever written any JavaScript code in your life you’ll likely have hit
    a problem at least once where you’ve exhausted the stack and caused a “stack overflow”
    error.


    I won’t delve too deep into the memory stack problem space, so I recommend you
    read a blog post I’ve previously written on the topic.[⁴](#A453572_1_En_3_Chapter.html#Fn4)
    In that article, I explain what recursion means and how tail call optimizations
    work. It helps clarify why a language like Clojure needs a mechanism such as `loop`/`recur`,
    as well as the purpose of a `trampoline` function, both of which I’ll be demonstrating
    next.


    To begin, let’s understand how the `loop`/`recur` form works. By using this form
    we’re able to execute some code recursively. We start by defining where our “loop”
    begins (using the `loop` function), then later on in our code we’ll need to define
    where the recursion should happen (using the `recur` function). If `recur` doesn’t
    find a `loop`, it’ll search for the next function in order for it to restart from
    that. The example in Listing [3-22](#A453572_1_En_3_Chapter.html#Par122) gives
    a simple example of its use.


    ```

    (loop [i 10]

    (if (= i 0)

    (prn "finished")

    (recur (do (prn i) (dec i)))))

    Listing 3-22.

    Example of a Simple loop/recur

    ```


    The output of Listing [3-22](#A453572_1_En_3_Chapter.html#Par122) should be the
    numbers 10–1 printing to the screen in descending order and finishing with the
    statement “finished”.


    Let’s break down Listing [3-22](#A453572_1_En_3_Chapter.html#Par122) to understand
    what’s happening. First, we create our `loop` and bind the value `10` to the symbol
    `i`. This is our starting point. Within the loop, we have an `if` statement that
    uses the `=` function to check if `i` is equal to zero. If it is, then we know
    we’re done, and so we print the message `"finished"` to `stdout` (i.e., the terminal
    screen). If the value isn’t zero, then we call `recur` and pass it the result
    of `(dec i)`, which decrements the current value of `i` by one.


    This example demonstrates the essence of recursive function calls. We’re not mutating
    local variables; we’re instead calling the function (in this case `loop`) over
    and over but passing in an updated value/argument for each successive execution.


    **Note**


    You’ll see we’re also using a `do` function (`do` allows us to execute multiple
    code blocks). The reason for using it is so we can force the side effect of displaying
    the current value of `i`. In a real application, you’d probably just omit it,
    like so: `(recur (dec i))`.


    With Clojure’s `recur` implementation, you’ll never exhaust the stack, and so
    you could change the value from `10` to `100000` and have no problems at all.
    A less-used function, but one very much related to `recur` and the problem of
    tail-call optimizations, is `trampoline`. The example in Listing [3-23](#A453572_1_En_3_Chapter.html#Par128)
    demonstrates how not using `recur` (or `trampoline`) can break your application.


    ```

    (defn count-down [x]

    (if (= x 0)

    (prn "finished")

    (count-down (do (prn x) (dec x)))))

    (count-down 10)     ;; works exactly as previous example BUT it''s not safe!

    (count-down 100000) ;; will cause a "StackOverflowError"

    Listing 3-23.

    Example of Stack Exhaustion

    ```


    So, in the preceding example (Listing [3-23](#A453572_1_En_3_Chapter.html#Par128)),
    our function `count-down` calls itself (much like `recur` jumping back up to the
    opening `loop`). Each time that function calls itself, it passes an updated value
    for `x`. But unlike `recur`, which protects against the JVM’s not providing tail-call
    optimizations, this implementation is doomed to fail if given a large value such
    as `100,000`.


    If we didn’t want to use `recur`, we could still work around this issue by utilizing
    `trampoline`. I’ve already discussed the inner workings of how trampolining works
    in a blog post,[⁵](#A453572_1_En_3_Chapter.html#Fn5) but in summary, rather than
    automatically calling the function over and over, the return value itself is a
    function, and `trampoline` flattens the calls for you so you don’t fill up your
    memory stack.


    Resolving the problem with our code will require a two-step process. First, modify
    the `else` statement so that instead of returning a function call to `count-down`
    you return a function. We achieve that in the modified version in Listing [3-24](#A453572_1_En_3_Chapter.html#Par134)
    by adding `#` before the call to `count-down`. Remember: `#(...)` is a shorthand
    syntax for an anonymous function.


    The second step is to not call the `count-down` function directly, but to pass
    it to `trampoline` instead. The code snippet in Listing [3-24](#A453572_1_En_3_Chapter.html#Par134)
    demonstrates the required modifications.


    ```

    (defn count-down [x]

    (if (= x 0)

    (prn "finished")

    #(count-down (do (prn x) (dec x)))))

    (trampoline count-down 10)     ; works fine still

    (trampoline count-down 100000) ; no longer triggers an error

    Listing 3-24.

    Example of trampoline Function

    ```


    # Composability


    The fundamental concept behind composability is to facilitate the passing of data
    through many different “filters” that manipulate the data so it’s ready for its
    final destination. This is similar to how the Unix philosophy works; Unix utilizes
    pipes (`|`) for passing the result of one function into another. For example,
    the shell command `ps aux | grep java` takes the result of `ps aux`, which returns
    many lines of output, and passes it through to `grep java`, which filters it down
    to only the lines that include the word java.


    Being able to create a pipeline like this, one built up from different isolated
    units of functionality, is very important within a functional language (we saw
    this demonstrated earlier with the `comp` function).


    The main reason this is such a key aspect of functional programming is that your
    units of functionality should be generic enough to be reused within many different
    contexts, rather than being overly specific to one environment and ultimately
    not being reusable.


    I won’t demonstrate composable code in this section, as I think it’s safe to say
    by this point that we’ve already seen many examples of how Clojure allows for
    composability. We’ve seen this via the use of `comp` and `partial`, as well as
    other enumerable functions such as `reduce`, `map`, and `filter`, and there are
    so many more useful composable functions, all within the standard core library,
    just waiting to be explored.'
