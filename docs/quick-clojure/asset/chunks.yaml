    (add-watch state :foo state-change)

    (swap! state assoc :bar "baz")

    Listing 8-10.

    Example of Watching an Atom for Changes

    ```


    In Listing [8-10](#A453572_1_En_8_Chapter.html#Par74), when we mutate the `state`
    map data structure (in this case, we associate into it via the `:bar` key, along
    with the associated value `"baz"`), we get a printout on the screen of what was
    changed. This happens because the change to the atom triggered the `add-` `watch`
    we created. The output of Listing [8-10](#A453572_1_En_8_Chapter.html#Par74) can
    be seen in Listing [8-11](#A453572_1_En_8_Chapter.html#Par76).


    ```

    "key: :foo, atom: clojure.lang.Atom@3e1b3567,

    old val: {}, new val: {:bar \"baz\"}"

    {:bar "baz"}

    Listing 8-11.

    Output from Previous Program Using add-watch

    ```


    Note


    To remove the watch, run `(remove-watch atom key)`, replacing `atom` and `key`
    with appropriate values.


