    # 6. 解构


    在本章中，我们将介绍 Clojure 中的解构概念。


    具体来说，Clojure 支持所谓的抽象结构绑定……嗯？是的，让我们稍微分解一下。


    对人类而言，这意味着 Clojure 为我们提供了从数据结构中提取数据的能力，而无需实际遍历数据结构本身。这个概念通常被称为解构。


    虽然这一章相当简短，但我强烈建议你在完成本节后花一些时间在 REPL 中编码，并试验我们向你展示的语法，因为这将帮助你更快地巩固对这些概念的理解。


    为了理解解构的工作原理，我们将从一个简单的示例（清单 6-1）开始，然后继续探讨更复杂的变体，这些变体展示了通过利用解构可以实现优雅而简洁的代码。


    注意


    解构可以应用于 `let` 绑定、函数参数列表以及扩展为 `let` 或函数的宏。但我将主要使用 `let` 形式，因为它是在 REPL 中演示示例的最简单形式。


    ```

    (let [[x y] [:a :b]]

    (prn y x))

    ;; :b :a

    清单 6-1.

    使用向量的简单解构示例

    ```


    查看清单 6-1，我们可以看到我们使用 `let` 绑定定义了局部变量。当我们这样做时，我们还会注意到必须将我们的符号（`x` 和 `y`）包装在与传入数据结构匹配的数据结构中。


    如果你还记得，`let` 绑定通常看起来像 `(let [x 1] (prn x))`，其中 `x` 被赋值为 `1`。再看一下清单 6-1。传入的数据结构
    `[:a :b]` 是一个向量，因此符号 `x` 和 `y` 被放置在一个向量内以确保结构匹配。然后值 `:a` 和 `:b` 被分配给 `x` 和 `y`，供我们使用。


    ```

    (let [{a :a b :b} {:a "A" :b "B"}]

    (prn a b))

    ;; "A" "B"

    清单 6-2.

    使用映射的简单解构示例

    ```


    查看清单 6-2，我们可以看到我们的示例现在使用了映射数据结构，而不是像清单 6-1 中的向量。因此，你应该注意到 `let` 形式内部的语法现在是一个映射，以匹配传入的数据结构。


    另一个不同之处在于，既然我们处理的是映射数据结构，我们需要将特定的映射键分配给我们的符号 `a` 和 `b`。在这个例子中，我们提取了 `:a` 键的值并将其分配给符号
    `a`，同样地，我们提取了 `:b` 键的值并将其分配给符号 `b`。


    Clojure 提供的一个不错的功能是通过抽象使我们的代码更清晰、更明确。看一下清单 6-3，你会看到一个实际应用的例子。


    ```

    (let [{:keys [a b]} {:a "A" :b "B"}]

    (prn a b))

    ;; "A" "B"

    清单 6-3.

    使用 :keys 特性的解构示例

    ```


    回顾清单 6-3，我们可以看到结构现在略有不同。我们定义了一个 `:keys` 字段，并为其分配了一个符号向量 `[a b]`。这些符号代表传入数据结构中同名的键，并将持有它们对应的值。


    现在让我们进一步扩展这个示例，演示如何访问整个数据结构以及特定的提取数据。


    ```

    (let [{:keys [a c] :as complete} {:a "A" :b "B" :c "C" :d "D"}]

    (prn a c complete))

    ;; "A" "C" {:c "C", :b "B", :d "D", :a "A"}

    清单 6-4.

    使用 :keys 和 :as 特性的解构示例

    ```

    '
- fmt: '通过查看[清单 6-4](#A453572_1_En_6_Chapter.html#Par17)，我们可以开始看到一组更强大的功能被暴露出来。当这段代码被编译时，Clojure
    会识别出`:as`字段表示我们希望将整个传入的数据结构存储到紧随其后的符号中。


    这意味着符号`complete`现在是整个传入数据结构的引用，而符号`a`和`c`仅是对同名的已提取键的引用。你会注意到我们不必提取所有的键，只提取我们主要关心的那些键即可。


    在解构数据结构时，另一个值得回顾的项目是`:or`字段，它为我们提供了为传入数据结构中缺失的任何键实现默认值的功能。[清单 6-5](#A453572_1_En_6_Chapter.html#Par21)
    演示了这一点。


    ```

    (def a-map {:a 1 :c 3})

    (let [{:keys [a b c]

    :as original-data

    :or {a 11 b 22 c 33}} a-map]

    [a b c original-data])

    ;; [1 22 3 {:c 3, :a 1}]

    Listing 6-5.

    Destructuring Example Using :or Feature

    ```


    你可以在[清单 6-5](#A453572_1_En_6_Chapter.html#Par21) 中看到，我实际上将语法分散到了几行中，并且为了可读性，我还将传入的数据结构存储到了一个单独的变量中；否则，这个例子可能会开始变得有些杂乱。


    我们可以看到我们已经看过的类似项目——`:keys`和`:as`字段——但现在增加了`:or`，它定义了一个映射，为我们想要绑定符号的所有键设置了默认值。


    例如，我们可以看到传入的映射数据结构没有`:b`键，因此我们的`b`符号（它将尝试引用一个原本缺失的键）现在将引用由`:or`映射中指定的`b`符号提供的值。


    此外，我们可以使用`&`后跟一个符号，这将表示我们希望这个符号持有一个对剩余所有值的引用，作为一个列表。在[清单 6-6](#A453572_1_En_6_Chapter.html#Par28)
    中，你可以看到我们在`&`字符后指定了符号`z`，因此我们可以看到它持有值`(:c :d)`。


    使用`&`意味着我们能够使这个`let`块变成可变参数的（即，能够接受大量额外的项目）。


    > **注意**

    >

    > `&`仅适用于向量数据结构。


    ```

    (let [[x y & z] [:a :b :c :d]]

    (prn x y z))

    ;; :a :b (:c :d)

    Listing 6-6.

    Destructuring Example Using & for Variadic Behavior

    ```


    我们要研究的最后一项是如何处理从嵌套数据结构中提取信息。让我们同时使用映射和向量来演示这一点。请参见[清单 6-7](#A453572_1_En_6_Chapter.html#Par30)。


    ```

    (let [[[a b][c d]] [[:a :b][:c :d]]]

    (prn a b c d))

    ;; :a :b :c :d

    (let [{{:keys [foo baz]} :stuff} {:stuff {:foo "bar" :baz "qux"}}]

    (prn foo baz))

    ;; "bar" "qux"

    Listing 6-7.

    Nested Destructuring Examples

    ```


    回顾[清单 6-7](#A453572_1_En_6_Chapter.html#Par30)，从第一个例子开始，我们可以看到我们实际上仍然在做和之前一样的事情。我们理解了传入数据结构的嵌套性质，因此在尝试从中解构数据时，我们模仿了这种结构。


    这意味着如果我们有一个嵌套的向量`[[:a :b][:c :d]]`，那么我们希望将其解构为一个也是嵌套的数据结构：`[[a b][c d]]`。


    同样值得一提的是，[清单 6-7](#A453572_1_En_6_Chapter.html#Par30) 中的代码可能看起来非常难以阅读，但在实践中，你的代码可能不会像这样，因为你将处理来自应用程序其他区域的数据。这意味着你很可能会有对数据的变量引用，而不是内联数据（就像我们在此处的示例中使用的那样）。


    对于[清单 6-7](#A453572_1_En_6_Chapter.html#Par30) 中的第二个例子，即嵌套的映射数据结构，我们可以看到我们希望获取分配给`:stuff`键的数据结构。因此，为了实现这一点，我们在解构时引用了`:stuff`键，然后使用熟悉的`:keys`字段从中解构其值。


    > **注意**

    >

    > 如果你的映射数据结构键是符号或字符串而不是关键字，那么你可以使用`:strs`和`:syms`来代替`:keys`，这将按预期工作。


    到目前为止，我们所有的示例都是使用`let`绑定形式设置的，但正如本章开头提到的，我们可以利用解构来处理函数参数。


    解构函数参数列表的一个有趣方面是，你可以设置可选的关键字参数。查看[清单 6-8](#A453572_1_En_6_Chapter.html#Par38)
    以了解这是如何工作的。


    ```

    (defn foo [a b & {:keys [c d]}]

    (println a b c d))

    (foo "A" "B")

    ;; A B nil nil

    (foo "A" "B" :c "C")

    ;; A B C nil

    (foo "A" "B" :c "C" :d "D")

    ;; A B C D

    Listing 6-8.

    Optional Function Arguments Using Destructuring

    ```


    从[清单 6-8](#A453572_1_En_6_Chapter.html#Par38) 中我们可以看到，我们再次使用了`&`来表示一个可变参数的函数参数列表，但现在我们也使用了`:keys`行为来允许我们处理映射键的提取。


    ## 总结


    在本章中，我们学习了解构数据结构这一重要且有用的概念。在处理复杂集合时，这有助于实现非常简洁优雅的代码。


    我们已经看到了如何对映射和向量进行基本解构的示例，以及如何处理嵌套的等价结构，并利用`:keys`、`:as`和`:or`字段来进一步扩展可用的行为。


    在下一章中，我们将研究另一个有用的概念，称为模式匹配。模式匹配提供的是基于预定义模式触发特定功能的能力。这些模式被应用于某种形式的输入，并且（很像解构）也提供了一些非常漂亮和优雅的代码解决方案。


    # 7. 模式匹配


    模式匹配是基于预定义模式触发特定功能的能力。这些预定义模式被应用于传入的消息（或用户输入）。


    这种技术有一些相关的变体，被称为运行时多态和动态分发。本质上，这些概念指的是基于运行时已知的接收者来选择实现。模式匹配是类似的，但从实际角度来看，其范围更窄。


    Clojure 有几种不同的机制来实现这种形式的运行时功能分发。第一种是使用一个名为`core.match`¹ 的 Clojure 库，另一种是使用一个名为多方法的内置特性。


    在本章的第一节中，我们将研究`core.match`，在接下来的“多态”一节中，我们将研究多方法的实现。'
  raw: 'OK, so, by looking at Listing [6-4](#A453572_1_En_6_Chapter.html#Par17) we
    can start to see that a more powerful set of features is being exposed to us.
    When this code is being compiled, Clojure recognizes the `:as` field is denoting
    that we want to store the entire incoming data structure in the symbol that follows.


    This means the symbol `complete` is now a reference to the entire incoming data
    structure, while the symbols `a` and `c` are references only to the extracted
    keys of the same name. You’ll notice we didn’t have to extract all the keys, only
    the ones we were primarily interested in.


    Another item worth reviewing when destructuring a data structure is the `:or`
    field, which provides us the facility to implement default values for any keys
    that are missing from the incoming data structure. Listing [6-5](#A453572_1_En_6_Chapter.html#Par21)
    demonstrates what this looks like.


    ```

    (def a-map {:a 1 :c 3})

    (let [{:keys [a b c]

    :as original-data

    :or {a 11 b 22 c 33}} a-map]

    [a b c original-data])

    ;; [1 22 3 {:c 3, :a 1}]

    Listing 6-5.

    Destructuring Example Using :or Feature

    ```


    You can see in Listing [6-5](#A453572_1_En_6_Chapter.html#Par21) that I’ve actually
    spread out the syntax over a few lines, and that I’ve also stored the incoming
    data structure off into a separate variable just for the sake of readability;
    otherwise, the example can start to become a little noisy.


    What we can see is the similar items we’ve already looked at–the `:keys` and `:as`
    fields—but now with the addition of `:or`, which defines a map with default values
    set for all the keys we want to bind our symbols to.


    For example, we can see that the incoming map data structure has no `:b` key,
    and so our `b` symbol, which will attempt to reference an otherwise missing key,
    will now reference the value provided by the `b` symbol specified in the `:or`
    map.


    Additionally, we can use `&` followed by a symbol, which will indicate that we
    wish this symbol to hold a reference to all the remaining values as a list. In
    Listing [6-6](#A453572_1_En_6_Chapter.html#Par28), you can see that we specify
    the symbol `z` after the `&` character, and so we can see it holds the value `(:c
    :d)`.


    The use of `&` means we’ve been able to facilitate this `let` block becoming variadic
    (i.e., able to accept lots of additional items).


    Note


    `&` only works with the vector data structure.


    ```

    (let [[x y & z] [:a :b :c :d]]

    (prn x y z))

    ;; :a :b (:c :d)

    Listing 6-6.

    Destructuring Example Using & for Variadic Behavior

    ```


    One final item we should investigate is how to handle the extraction of information
    from nested data structures . Let’s demonstrate this using both a map and a vector.
    See Listing [6-7](#A453572_1_En_6_Chapter.html#Par30).


    ```

    (let [[[a b][c d]] [[:a :b][:c :d]]]

    (prn a b c d))

    ;; :a :b :c :d

    (let [{{:keys [foo baz]} :stuff} {:stuff {:foo "bar" :baz "qux"}}]

    (prn foo baz))

    ;; "bar" "qux"

    Listing 6-7.

    Nested Destructuring Examples

    ```


    Looking back at Listing [6-7](#A453572_1_En_6_Chapter.html#Par30), and starting
    with the first example, we can see that we’re still effectively doing the same
    thing as before. We have an understanding of the nested nature of the incoming
    data structure, and so we’re mimicking it when we attempt to destructure the data
    from it.


    That means if we have a nested vector `[[:a :b][:c :d]]`, then we’ll want to destructure
    it into a data structure that is also nested: `[[a b][c d]]`.


    It’s worth mentioning as well that the code in Listing [6-7](#A453572_1_En_6_Chapter.html#Par30)
    may appear to be quite difficult to read, but in practice your code will likely
    not look like this, as you’ll be dealing with data that’s coming from other areas
    of your application. This means you’ll likely have variable references to the
    data, rather than inlined data (as we’re using within the examples here).


    For the second example in Listing [6-7](#A453572_1_En_6_Chapter.html#Par30), the
    nested map data structure , we can see we want to get to the data structure assigned
    to the `:stuff` key. So, in order to achieve that, we reference the `:stuff` key
    when destructuring, and from that we then destruct its values using the familiar
    `:keys` field.


    Note


    If your map data structure keys are symbols or strings rather than keywords, then
    you can use `:strs` and `:syms` in place of `:keys`, and this will work as expected.


    At this point, all of our examples have been set up using the `let` binding form,
    but as mentioned at the start of this chapter, we can utilize destructuring with
    function arguments.


    One interesting aspect of destructuring a function parameter list is that you
    can set up optional keyword arguments . Take a look at Listing [6-8](#A453572_1_En_6_Chapter.html#Par38)
    to understand how this works.


    ```

    (defn foo [a b & {:keys [c d]}]

    (println a b c d))

    (foo "A" "B")

    ;; A B nil nil

    (foo "A" "B" :c "C")

    ;; A B C nil

    (foo "A" "B" :c "C" :d "D")

    ;; A B C D

    Listing 6-8.

    Optional Function Arguments Using Destructuring

    ```


    We can see from Listing [6-8](#A453572_1_En_6_Chapter.html#Par38) that we’ve again
    used `&` to indicate a variadic function argument list, but now we’re also using
    the `:keys` behavior to allow us to handle the extraction of map keys.


    ## Summary


    In this chapter, we’ve learned the important and useful concept of destructuring
    data structures. This can help to facilitate very concise and elegant code when
    dealing with complex collections.


    We’ve seen examples of how to do basic destructuring of maps and vectors, as well
    as how to deal with nested equivalents and utilize the `:keys`, `:as`, and `:or`
    fields for further extending the available behaviors.


    In the next chapter, we’ll look at another useful concept known as pattern matching.
    What pattern matching provides is the ability to trigger specific functionality
    based upon predefined patterns. These patterns are applied to some form of input,
    and also (much like destructuring) provides some very nice and elegant code solutions.


    # 7. Pattern Matching


    Pattern matching is the ability to trigger specific functionality based upon predefined
    patterns. These predefined patterns are applied to an incoming message (or user
    input).


    There are somewhat related variations of this technique, which are referred to
    as runtime polymorphism and dynamic dispatch. In essence, these concepts refer
    to the selecting of an implementation based upon the known receiver at runtime.
    Pattern matching is similar, but from a practical standpoint is narrower in scope.


    Clojure has a few different mechanisms for achieving this form of runtime dispatching
    of functionality. The first is to use a Clojure library called `core.match`,[¹](#A453572_1_En_7_Chapter.html#Fn1)
    and the other is to use a built-in feature called multimethods .


    In the first section of this chapter, we’ll look at `core.match`, and in the following
    section (“Polymorphism”) we’ll look at the multimethods implementation.'
  trans: '

    通过查看清单 6-4，我们可以开始看到一组更强大的特性正展现在我们面前。当这段代码被编译时，Clojure 会识别出 `:as` 字段表示我们希望将整个传入的数据结构存储到紧随其后的符号中。


    这意味着符号 `complete` 现在是对整个传入数据结构的引用，而符号 `a` 和 `c` 仅是对提取出的同名键的引用。你会注意到我们不必提取所有键，只需提取我们主要关心的那些键。


    在解构数据结构时，另一个值得审视的项目是 `:or` 字段，它为我们提供了为传入数据结构中缺失的任何键实现默认值的功能。清单 6-5 演示了这一点。


    ```

    (def a-map {:a 1 :c 3})

    (let [{:keys [a b c]

    :as original-data

    :or {a 11 b 22 c 33}} a-map]

    [a b c original-data])

    ;; [1 22 3 {:c 3, :a 1}]

    清单 6-5.

    使用 :or 特性的解构示例

    ```


    你可以在清单 6-5 中看到，我实际上将语法分散到了几行中，并且为了可读性，还将传入的数据结构存储到了一个单独的变量中；否则，这个示例可能会开始变得有些杂乱。


    我们可以看到我们已经看过的类似项目——`:keys` 和 `:as` 字段——但现在增加了 `:or`，它定义了一个映射，为我们想要绑定符号的所有键设置了默认值。


    例如，我们可以看到传入的映射数据结构没有 `:b` 键，因此我们的 `b` 符号（原本会尝试引用一个缺失的键）现在将引用 `:or` 映射中由 `b` 符号提供的值。


    此外，我们可以使用 `&` 后跟一个符号，这将表示我们希望这个符号以列表形式持有对所有剩余值的引用。在清单 6-6 中，你可以看到我们在 `&` 字符后指定了符号
    `z`，因此我们可以看到它持有值 `(:c :d)`。


    使用 `&` 意味着我们能够使这个 `let` 块变成可变参数的（即能够接受大量额外的项目）。


    注意


    `&` 仅适用于向量数据结构。


    ```

    (let [[x y & z] [:a :b :c :d]]

    (prn x y z))

    ;; :a :b (:c :d)

    清单 6-6.

    使用 & 实现可变参数行为的解构示例


    ```


    最后一个我们应该探讨的项目是如何处理从嵌套数据结构中提取信息。让我们同时使用映射和向量来演示这一点。参见清单 6-7。


    ```

    (let [[[a b][c d]] [[:a :b][:c :d]]]

    (prn a b c d))

    ;; :a :b :c :d

    (let [{{:keys [foo baz]} :stuff} {:stuff {:foo "bar" :baz "qux"}}]

    (prn foo baz))

    ;; "bar" "qux"

    清单 6-7.

    嵌套解构示例

    ```


    回顾清单 6-7，从第一个示例开始，我们可以看到我们实际上仍在做与之前相同的事情。我们理解了传入数据结构的嵌套性质，因此在尝试从中解构数据时，我们模仿了这种结构。


    这意味着如果我们有一个嵌套向量 `[[:a :b][:c :d]]`，那么我们希望将其解构为一个同样嵌套的数据结构：`[[a b][c d]]`。


    同样值得一提的是，清单 6-7 中的代码可能看起来相当难以阅读，但在实践中，你的代码可能不会像这样，因为你将处理来自应用程序其他区域的数据。这意味着你很可能会有对数据的变量引用，而不是内联数据（就像我们在此处的示例中使用的那样）。


    对于清单 6-7 中的第二个示例，即嵌套映射数据结构，我们可以看到我们想要获取分配给 `:stuff` 键的数据结构。因此，为了实现这一点，我们在解构时引用了
    `:stuff` 键，然后使用熟悉的 `:keys` 字段从中解构其值。


    注意


    如果你的映射数据结构键是符号或字符串而不是关键字，那么你可以使用 `:strs` 和 `:syms` 来代替 `:keys`，这将按预期工作。


    至此，我们所有的示例都是使用 `let` 绑定形式设置的，但正如本章开头提到的，我们也可以将解构用于函数参数。


    解构函数参数列表的一个有趣方面是，你可以设置可选的关键字参数。查看清单 6-8 以了解其工作原理。


    ```

    (defn foo [a b & {:keys [c d]}]

    (println a b c d))

    (foo "A" "B")

    ;; A B nil nil

    (foo "A" "B" :c "C")

    ;; A B C nil

    (foo "A" "B" :c "C" :d "D")

    ;; A B C D

    清单 6-8.

    使用解构实现可选函数参数

    ```


    从清单 6-8 中我们可以看到，我们再次使用了 `&` 来表示一个可变参数的函数参数列表，但现在我们还使用了 `:keys` 行为来允许我们处理映射键的提取。


    ## 总结


    在本章中，我们学习了解构数据结构这一重要且有用的概念。在处理复杂集合时，这有助于实现非常简洁优雅的代码。


    我们看到了如何对映射和向量进行基本解构的示例，以及如何处理嵌套的等价结构，并利用 `:keys`、`:as` 和 `:or` 字段来进一步扩展可用的行为。


    在下一章中，我们将研究另一个有用的概念，称为模式匹配。模式匹配提供的是基于预定义模式触发特定功能的能力。这些模式应用于某种形式的输入，并且（很像解构）也提供了一些非常漂亮和优雅的代码解决方案。


    # 7. 模式匹配


    模式匹配是基于预定义模式触发特定功能的能力。这些预定义模式应用于传入的消息（或用户输入）。


    这种技术有一些相关的变体，被称为运行时多态和动态分发。本质上，这些概念指的是基于运行时已知的接收者来选择实现。模式匹配与之类似，但从实际角度来看，其范围更窄。


    Clojure 有几种不同的机制来实现这种形式的运行时功能分发。第一种是使用一个名为 `core.match` 的 Clojure 库，¹ 另一种是使用一个名为
    multimethods 的内置特性。


    在本章的第一部分，我们将研究 `core.match`，在接下来的部分（“多态”）中，我们将研究 multimethods 的实现。

    '
- fmt: '# core.match


    要使用`core.match`，你需要告诉Leiningen加载它，因为它不是Clojure标准核心库的一部分。


    目前最简单的方法（因为我们仍在REPL中运行所有示例）是停止当前打开的REPL，然后创建一个`project.clj`文件（参见清单[7-1](#A453572_1_En_7_Chapter.html#Par8)）。


    ```

    (defproject test "0.1.0-SNAPSHOT"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/core.match "0.3.0-alpha4"]])

    Listing 7-1.

    New project.clj File for Adding core.match Dependency

    ```


    创建此文件后，使用`lein repl`重新启动REPL；你会发现Leiningen会使用`project.clj`的内容来设置其环境。REPL启动后，你可以尝试执行清单[7-2](#A453572_1_En_7_Chapter.html#Par10)中显示的代码来引入`match`函数。


    ```

    (require ''[clojure.core.match :refer [match]])

    Listing 7-2.

    Load the  match Function from the core.match Namespace

    ```


    注意


    不用担心理解项目文件或`require`函数调用的语法，我将在后续章节更详细地讨论Leiningen时解释这些内容。


    ## 示例：FizzBuzz


    好的，现在你已经在REPL中有了`match`函数，我们可以开始尝试一些示例。让我们从一个来自`core.match`README的简单示例开始（参见清单[7-3](#A453572_1_En_7_Chapter.html#Par13)）。


    ```

    (doseq [n (range 1 21)]

    (println

    (match [(mod n 3) (mod n 5)]

    [0 0] "FizzBuzz"

    [0 _] "Fizz"

    [_ 0] "Buzz"

    :else n)))

    Listing 7-3.

    Pattern Matching Example from core.match

    ```


    在清单[7-3](#A453572_1_En_7_Chapter.html#Par13)中，我们看到的是经典的编程面试题：FizzBuzz。其思路是打印从1到20的数字列表，但对于3的倍数，你应该打印消息"Fizz"而不是数字；对于5的倍数，你应该打印消息"Buzz"而不是数字。最后，对于既是3的倍数又是5的倍数，你应该打印消息"FizzBuzz"。程序的输出应如清单[7-4](#A453572_1_En_7_Chapter.html#Par15)所示。


    ```


    Fizz


    Buzz

    Fizz


    Fizz

    Buzz


    Fizz


    FizzBuzz


    Fizz


    Buzz

    Listing 7-4.

    Output from Earlier Pattern Matching Example

    ```


    现在，让我们花点时间理解清单[7-3](#A453572_1_En_7_Chapter.html#Par13)中代码示例发生了什么。首先，我们使用`range`函数创建一个从1到20的数字集合，然后打印对范围内每个元素执行`match`的结果。


    `match`语法允许我们定义一些想要匹配的模式类型；在这个例子中，它匹配`(mod n 3)`和`(mod n 5)`的结果，其中`n`是当前范围内的元素（例如，1，然后2，然后3，依此类推）。如果当前范围内的数字是3或5的倍数，那么`mod`应该返回`zero`。


    接下来是不同预期的模式结果，以及如果这些预期匹配时我们想要触发的功能。在清单[7-3](#A453572_1_En_7_Chapter.html#Par13)的示例中，我们首先检查如果两个`mod`函数的结果都为零，则返回`"FizzBuzz"`：`[0
    0] "FizzBuzz"`。否则，如果失败，我们继续下一个条件模式检查。


    下一个预期是检查我们是否能够将范围内的数字被3整除：`[0 _] "Fizz"`。你会看到我们使用下划线字符`_`作为通配符来检查范围内的数字是否是5的倍数。我们这样做是因为我们不关心该检查返回了什么（因为如果该值是5的倍数，那么我们在第一步就已经找到了完全匹配）。


    如果该预期不匹配，那么我们将继续下一个预期：`[_ 0]`。这与之前的检查相反，我们现在在检查数字是否是3的倍数时使用`_`（同样，我们不关心该值是什么）。然后我们检查另一个值是否是5的倍数，结果应为`zero`，因此此时应找到匹配并打印单词`"Buzz"`。


    你可以在代码末尾看到我们使用`:else`语句来捕获并返回未找到匹配时提供的范围内的数字。这段代码提供了成功通过FizzBuzz测试所需的所有条件。


    ## 匹配字面量


    在前面的示例中，我们一直在根据符号匹配值。但我们也可以匹配字面量值（参见清单[7-6](#A453572_1_En_7_Chapter.html#Par30)）。


    ```

    (match [''foobar]

    [''foobar] :bar

    [''bazqux] :qux)

    ;; :bar

    Listing 7-6.

    Pattern Matching with Literal Values

    ```


    在清单[7-6](#A453572_1_En_7_Chapter.html#Par30)中，我们传入一个字面量符号进行匹配。在这种情况下，该符号不指向任何其他值；它实际上求值结果就是自身。然后我们有一个直接与之匹配的关联模式，因此我们成功匹配并返回相应的值。


    现在，如果我们还需要提供回退机制（例如当找不到匹配时），那么我们可以使用`:else`关键字，如清单[7-7](#A453572_1_En_7_Chapter.html#Par33)所示。我们在前面FizzBuzz测试的实现中看到过这个用法，如果找不到匹配，我们既不返回`"Fizz"`也不返回`"Buzz"`也不返回`"FizzBuzz"`，而只是返回传入的范围数字。


    ```

    (let [a (+ 1 1)]

    (match [99]

    [a]   :success

    :else :fail))

    ;; :fail

    Listing 7-7.

    Provide Fallback Using :else Statement

    ```


    ## 匹配数据结构


    到目前为止，我们已经看到了对表达式和直接字面量值的匹配。但也可以比较数据结构。


    ```

    (match [[:a :b :c]]

    [[:a :b _]] :success

    :else :fail)

    ;; :success

    (match [{:a 1 :b 1}]

    [{:a _ :b 2}] :foo

    [{:a 1 :b _}] :bar

    :else :baz)

    ;; :bar

    Listing 7-8.

    Pattern Matching with Data Structures

    ```


    从清单[7-8](#A453572_1_En_7_Chapter.html#Par35)中，我们可以看到两个示例。在第一个示例中，我们传入一个向量数据结构，在第二个示例中，我们传入一个映射。在这两种情况下，我们都可以通过使用`_`通配符符号来轻松找到匹配，该符号用于捕获我们不在乎或不确定其值的某些值。


    注意


    当使用映射数据结构时，你不能在键上使用通配符；它只能在键的值上使用。


    当使用向量时，你可能只需要部分匹配。例如，你可能只想匹配集合中的前几个元素。如果是这种情况，你可以使用`&` rest参数（你会在第[6](#A453572_1_En_6_Chapter.html)章中认出它）。参见清单[7-9](#A453572_1_En_7_Chapter.html#Par39)的示例。


    ```

    (match [[:a 1 :b 2 :c 3 :d 4]]

    [[:a 1 :b 2]] "this would need to be complete match"

    [[:a 1 :b _ & rest]] "rest allows for a partial match"

    :else :fail)

    ;; "rest allows for a partial match"

    Listing 7-9.

    Partial Pattern Matching with the Rest Symbol &

    ```'
  raw: '## core.match


    To use `core.match`, you’ll need to tell Leiningen to load it, as it’s not part
    of the standard core library built into Clojure.


    The easiest way to do this right now—as we’re still running all our examples within
    the REPL—is to stop the REPL you currently have open and to create a `project.clj`
    file (see Listing [7-1](#A453572_1_En_7_Chapter.html#Par8)).


    ```

    (defproject test "0.1.0-SNAPSHOT"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/core.match "0.3.0-alpha4"]])

    Listing 7-1.

    New project.clj File for Adding core.match Dependency

    ```


    Once this file has been created, start up the REPL again using `lein repl`; you
    should find that Leiningen will use the content of `project.clj` to set up its
    environment. Once the REPL has started, you can try executing the code shown in
    Listing [7-2](#A453572_1_En_7_Chapter.html#Par10) to pull in the `match` function.


    ```

    (require ''[clojure.core.match :refer [match]])

    Listing 7-2.

    Load the  match Function from the core.match Namespace

    ```


    Note


    Don’t worry about understanding the syntax of either the project file or the `require`
    function call, as I’ll explain this when we start discussing Leiningen in more
    detail in a later chapter.


    ### Example: FizzBuzz


    OK, so at this point you’ll have a `match` function available within the REPL,
    and we can start trying out some examples. Let’s start with a simple example that
    comes straight from the `core.match` README (see Listing [7-3](#A453572_1_En_7_Chapter.html#Par13)).


    ```

    (doseq [n (range 1 21)]

    (println

    (match [(mod n 3) (mod n 5)]

    [0 0] "FizzBuzz"

    [0 _] "Fizz"

    [_ 0] "Buzz"

    :else n)))

    Listing 7-3.

    Pattern Matching Example from core.match

    ```


    What we can see in Listing [7-3](#A453572_1_En_7_Chapter.html#Par13) is the classic
    programming interview test: FizzBuzz. The idea is that you print a list of numbers
    starting from 1 to 20, but for multiples of three you should print the message
    “Fizz” instead of the number, and for multiples of five you should print the message
    “Buzz” instead of the number. Finally, for multiples of both three and five you
    should print the message “FizzBuzz.” The output of the program should look like
    Listing [7-4](#A453572_1_En_7_Chapter.html#Par15).


    ```


    Fizz


    Buzz

    Fizz


    Fizz

    Buzz


    Fizz


    FizzBuzz


    Fizz


    Buzz

    Listing 7-4.

    Output from Earlier Pattern Matching Example

    ```


    So, let’s take a moment to understand what’s happening in our code example from
    Listing [7-3](#A453572_1_En_7_Chapter.html#Par13). First, we create a collection
    of numbers from 1 to 20 using the `range` function, and then we print out the
    result of executing `match` against each item in the range.


    The `match` syntax allows us to define some pattern types we want to match against;
    in this case, it’s the result of `(mod n 3)` and `(mod n 5)`, where `n` is the
    current range element (e.g., 1, then 2, then 3, and so on). If the current range
    number is a multiple of three or five, then `mod` should return `zero`.


    What follows from there are the different expected pattern results and the functionality
    we want to trigger if those expectations match. In the example from Listing [7-3](#A453572_1_En_7_Chapter.html#Par13),
    we first check that, if the results of both `mod` functions are zero, then return
    `"FizzBuzz"`: `[0 0] "` `FizzBuzz` `"`. Otherwise, if that fails, we fall through
    to the next conditional pattern check.


    The next expectation is checking whether we were able to evenly divide the range
    number by three: `[0 _] "Fizz"`. You’ll see we use the underscore character `_`
    to act as a wildcard for the check for whether the range number was a multiple
    of five. We do this because we don’t care what was returned for that check (because
    if the value was a multiple of five, then we would have already found a complete
    match in the first step).


    If that expectation didn’t match, then we would fall through to the next expectation:
    `[_ 0]`. This is the reverse of the previous check, where we now use `_` when
    checking to see if the number was a multiple of three (as, again, we don’t care
    what the value is). We then check if the other value was a multiple of five, then
    the result should come in as `zero`, and so a match should be found at that point
    and the word `"Buzz"` printed.


    You can see at the end of our code we use the `:else` statement to catch and return
    the provided range number for when no match is found. This code provides all the
    requirements necessary for a successful FizzBuzz test.


    ### Matching Literals


    In the previous examples, we’ve been matching values based upon symbols. But we
    can also match on literal values (see Listing [7-6](#A453572_1_En_7_Chapter.html#Par30)).


    ```

    (match [''foobar]

    [''foobar] :bar

    [''bazqux] :qux)

    ;; :bar

    Listing 7-6.

    Pattern Matching with Literal Values

    ```


    In Listing [7-6](#A453572_1_En_7_Chapter.html#Par30), we’re passing in a literal
    symbol to match against. In this case, the symbol doesn’t point to any other value;
    it effectively evaluates to itself. We then have an associated pattern that matches
    directly with it, and so we have a successful match and return the appropriate
    value.


    Now, if we also need to provide a fallback mechanism (such as when we fail to
    find a match), then we can use the `:else` keyword , as demonstrated in Listing
    [7-7](#A453572_1_En_7_Chapter.html#Par33). We saw this used earlier in the implementation
    for the FizzBuzz test, where if no match was found we would want to return neither
    `"Fizz"` nor `"Buzz"` nor `"FizzBuzz"`, but just the incoming range number.


    ```

    (let [a (+ 1 1)]

    (match [99]

    [a]   :success

    :else :fail))

    ;; :fail

    Listing 7-7.

    Provide Fallback Using :else Statement

    ```


    ### Matching Data Structures


    At this point , we’ve seen matching against both expressions and direct literal
    values. But it’s also possible to compare data structures.


    ```

    (match [[:a :b :c]]

    [[:a :b _]] :success

    :else :fail)

    ;; :success

    (match [{:a 1 :b 1}]

    [{:a _ :b 2}] :foo

    [{:a 1 :b _}] :bar

    :else :baz)

    ;; :bar

    Listing 7-8.

    Pattern Matching with Data Structures

    ```


    We can see from Listing [7-8](#A453572_1_En_7_Chapter.html#Par35), that we have
    two examples. In the first example, we’re passing through a vector data structure,
    and in the second we’re passing a map. In both cases, we’re able to find a match
    easily by utilizing the `_` wildcard symbol to catch certain values we either
    don’t care about or are unsure of what their values will be.


    Note


    When using a map data structure, you can’t use a wildcard on the key; it can only
    be used on the key’s value.


    When using a vector , you might only need a partial match. For example, you might
    only want to match against the first couple of items in the collection. If that’s
    the case, you can use the `&` rest parameter (which you’ll recognize from Chapter
    [6](#A453572_1_En_6_Chapter.html)). See Listing [7-9](#A453572_1_En_7_Chapter.html#Par39)
    for an example .


    ```

    (match [[:a 1 :b 2 :c 3 :d 4]]

    [[:a 1 :b 2]] "this would need to be complete match"

    [[:a 1 :b _ & rest]] "rest allows for a partial match"

    :else :fail)

    ;; "rest allows for a partial match"

    Listing 7-9.

    Partial Pattern Matching with the Rest Symbol &

    ```'
