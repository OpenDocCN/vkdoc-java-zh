- fmt: "# Loading Namespaced Files\n\nIf you’re testing an existing application from\
    \ the REPL and you’re looking to `load` a code file that requires some other dependencies,\
    \ then you’ll want to use the `load` function. The `load` function attempts to\
    \ find the given path in your “classpath” and then `load` that file. The classpath\
    \ is what Java uses to identify the location of code libraries, and because Clojure\
    \ is built upon Java it means we need to ensure our classpath has the relevant\
    \ paths added to it.\n\nThe project management tool Leiningen handles the adding\
    \ of dependencies and libraries to our classpath via a `project.clj` file. So\
    \ as long as you have your dependencies listed there you should be able to use\
    \ the `load` function to pull them into a REPL session. See Listing [9-3](#A453572_1_En_9_Chapter.html#Par15)\
    \ for an example of the `load` function.\n\n```\n(load \"/path/to/namespace\"\
    )\n(in-ns 'namespace)\nListing 9-3.\nLoading Code from External Files\n```\n\n\
    Now, the reason you use `load` before `in-ns` is because even though you might\
    \ have a file that defines the specified namespace, the REPL won’t be able to\
    \ locate it unless you add it to the JVM classpath. The `load` function adds the\
    \ namespace to the classpath.\n\n**Note**\n\nMake sure the path starts with a\
    \ forward slash and that it’s relative to Leiningen’s `src` directory (see the\
    \ next note); this is because the Leiningen tool messes with your OS’ JVM classpath\
    \ for each Leiningen project.\n\nAlthough we’ve yet to look at the Leiningen project\
    \ automation tool, it’s worth mentioning that part of a Clojure project’s setup\
    \ requires the use of a `project.clj` file that bootstraps the application.\n\n\
    If you want to follow along with what I’m about to explain, it’s probably easier\
    \ if you exit the REPL and then run the following command from your terminal:\
    \ `lein new compojure-app foo`. This will generate a new project for you. Move\
    \ into that new project directory (`cd foo`), and you’ll find there is a new `project.clj`.\n\
    \nSpend some time looking around the organization of folders and files in this\
    \ new Leiningen project. Don’t worry for now about what it all means or how it\
    \ works, as we’ll be covering that in a later chapter. But namespaces play an\
    \ important role in setting up a real-world Clojure application, and so this will\
    \ give you a basic starting point to help you understand the following information.\n\
    \nOne of the settings within the `project.clj` bootstrap file is a `:handler`\
    \ key, which informs Leiningen of which Clojure file is the entry point for the\
    \ application (there is also a `:init` function that executes just before the\
    \ handler).\n\n**Note**\n\nFor most Leiningen project templates, you’ll find your\
    \ Clojure code located at: `src/<name_of_project>/<file.clj>`.\n\nFor example,\
    \ if your `project.clj` includes `:handler foo.handler/app`, you’re effectively\
    \ telling Leiningen to locate the entry point at `src/foo/handler.clj` (and within\
    \ that file you would find the `app` function that bootstraps your application).\n\
    \nWhen running `lein repl` from the project directory, you can execute (`ns foo.handler`)\
    \ to jump into the namespace and start executing the functions exposed by that\
    \ namespace. See Listing [9-4](#A453572_1_En_9_Chapter.html#Par25) for a simple\
    \ example.\n\n```\n(ns foo.handler)\n(init) ;; foo is starting\nListing 9-4.\n\
    Loading Namespace into the REPL\n```\n\nIf you make a change to a file—for example,\
    \ let’s say you update the `handler.clj` file with a new variable: `(def x 123)`—in\
    \ order for that change to be reflected within the current REPL instance that’s\
    \ already running, you would be required to reload the namespace file. See Listing\
    \ [9-5](#A453572_1_En_9_Chapter.html#Par27).\n\n```\n(load \"/foo/handler\")\n\
    x ;; 123\nListing 9-5.\nReload Namespace into the REPL\n```\n\nIf you want to\
    \ display all the namespaces that have been loaded, then the simplest option is\
    \ to use the `(loaded-libs)` function. If you were to run that command within\
    \ the current REPL instance, you would see a big list of namespaces loaded for\
    \ you (including any new namespaces that were added after the REPL was started).\
    \ See Listing [9-6](#A453572_1_En_9_Chapter.html#Par29).\n\n```\n#{clj-stacktrace.core\
    \ clj-stacktrace.repl clj-stacktrace.utils clj-time.core clj-time.format clojure.core.protocols\
    \ clojure.core.server clojure.edn clojure.instant clojure.java.browse clojure.java.io\
    \ clojure.java.javadoc ...}\nListing 9-6.\nLoaded Libraries Within Current REPL\
    \ Instance\n```\n\n## Interning\n\nWe covered variables way back in Chapter [2](#A453572_1_En_2_Chapter.html),\
    \ and at that point I stated:\n\n> Variables are not available within other namespaces\
    \ unless they are “interned” into them. Interning is a fancy way of saying “find\
    \ variable x within this current namespace; and if it doesn’t exist then create\
    \ it”. But you can also “intern” variables from another namespace using the `:refer`\
    \ feature of the `ns` macro. —Me, Chapter [2](#A453572_1_En_2_Chapter.html)\n\n\
    So, let’s take a look at the different ways we can “intern” data from another\
    \ namespace. There are a few different options:\n\n*   `:use`\n*   `:require`\n\
    \    *   `:as`\n    *   `:refer`\n    *   `:all`\n\nNow, I should actually clarify\
    \ that there are really only two ways to intern data, and that is by using the\
    \ first two items in the preceding list (`:use` and `:require`). The other items\
    \ in the list are all subset features related to `:require` and are referred to\
    \ in the official documentation as libspecs.\n\n**Note**\n\nI’m going to cover\
    \ `:use` last because it’s considered unnecessary now that `:require`’s functionality\
    \ has vastly improved since the earlier releases of Clojure. I'm covering `:use`\
    \ just so you know that it existed first, but it’s no longer needed, as `:require`’s\
    \ functionality supersedes it.\n\nI’ll begin by explaining how each of these items\
    \ works, along with their differences, but before I do I would like to take a\
    \ small detour…\n\n### Root Bindings\n\nIt’s important when talking about variables\
    \ to understand that they also have something called a root binding and are known\
    \ to be “thread-local.” What this means in practical terms is that when you create\
    \ a variable and assign it a value—e.g., `(def foo \"hello\")`—its root binding\
    \ is the value you’ve defined (in this case, the string `\"hello\"`). Once you\
    \ associate a value with a variable, then that becomes the “root binding” for\
    \ the variable, and it means that any threads created from within the current\
    \ namespace will all have access to it, as they are essentially created within\
    \ the same memory space. This is what’s meant by “thread-local”, other namespaces\
    \ won’t be able to see that variable or its value.\n\nIf you define a variable\
    \ but don’t assign it a value, then it is considered “unbound” (see Listing [9-7](#A453572_1_En_9_Chapter.html#Par44)\
    \ for an example).\n\n```\n(def foo)\nfoo\n;; #\nListing 9-7.\nExample of an Unbound\
    \ Variable\n```\n\n### Dynamic Variables\n\nWe covered dynamic variables back\
    \ in Chapter [2](#A453572_1_En_2_Chapter.html) (i.e., the `^:dynamic` attribute\
    \ and the `binding` form), but as we’re now reading a chapter about namespaces,\
    \ it would be pertinent for me to mention a point that might not have made sense\
    \ if referenced right at the start of the book: the reason the `ns` macro is able\
    \ to dynamically change the namespace in Clojure is because the macro modifies\
    \ the global `*ns*` variable, meaning it is possible for it to be redefined.\n\
    \n**Note**\n\nThe convention for defining dynamic variables is to wrap them in\
    \ “ear muffs” (i.e., asterisks). For example, `*var_name*`."
