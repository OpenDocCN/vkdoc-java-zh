    ## core.match


    要使用 `core.match`，你需要告知 Leiningen 加载它，因为它并非 Clojure 内置标准核心库的一部分。


    目前最简单的方法——因为我们仍在 REPL 中运行所有示例——是停止当前打开的 REPL，并创建一个 `project.clj` 文件（参见代码清单 7-1）。


    ```

    (defproject test "0.1.0-SNAPSHOT"

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/core.match "0.3.0-alpha4"]])

    代码清单 7-1.

    用于添加 core.match 依赖的新 project.clj 文件

    ```


    创建此文件后，使用 `lein repl` 重新启动 REPL；你会发现 Leiningen 会使用 `project.clj` 的内容来设置其环境。REPL
    启动后，你可以尝试执行代码清单 7-2 中的代码来引入 `match` 函数。


    ```

    (require ''[clojure.core.match :refer [match]])

    代码清单 7-2.

    从 core.match 命名空间加载 match 函数

    ```


    注意


    不必担心理解项目文件或 `require` 函数调用的语法，我将在后续章节更详细地讨论 Leiningen 时进行解释。


    ### 示例：FizzBuzz


    好了，现在你已经在 REPL 中拥有了 `match` 函数，我们可以开始尝试一些示例了。让我们从一个直接来自 `core.match` README 的简单示例开始（参见代码清单
    7-3）。


    ```

    (doseq [n (range 1 21)]

    (println

    (match [(mod n 3) (mod n 5)]

    [0 0] "FizzBuzz"

    [0 _] "Fizz"

    [_ 0] "Buzz"

    :else n)))

    代码清单 7-3.

    来自 core.match 的模式匹配示例

    ```


    在代码清单 7-3 中，我们看到的是经典的编程面试题：FizzBuzz。其思路是打印从 1 到 20 的数字列表，但对于 3 的倍数，应打印消息“Fizz”而非数字；对于
    5 的倍数，应打印消息“Buzz”而非数字。最后，对于既是 3 的倍数又是 5 的倍数，应打印消息“FizzBuzz”。程序的输出应如代码清单 7-4 所示。


    ```


    Fizz


    Buzz

    Fizz


    Fizz

    Buzz


    Fizz


    FizzBuzz


    Fizz


    Buzz

    代码清单 7-4.

    上述模式匹配示例的输出

    ```


    那么，让我们花点时间来理解代码清单 7-3 中代码示例的运行机制。首先，我们使用 `range` 函数创建一个从 1 到 20 的数字集合，然后打印对范围内每个元素执行
    `match` 的结果。


    `match` 语法允许我们定义一些想要匹配的模式类型；在此例中，它匹配的是 `(mod n 3)` 和 `(mod n 5)` 的结果，其中 `n` 是当前范围内的元素（例如，1，然后
    2，然后 3，依此类推）。如果当前范围内的数字是 3 或 5 的倍数，那么 `mod` 应返回 `zero`。


    接下来是各种预期的模式结果，以及当这些预期匹配时我们希望触发的功能。在代码清单 7-3 的示例中，我们首先检查，如果两个 `mod` 函数的结果都为零，则返回
    `"FizzBuzz"`：`[0 0] "` `FizzBuzz` `"`。否则，如果匹配失败，则进入下一个条件模式检查。


    下一个预期是检查我们是否能将范围内的数字被 3 整除：`[0 _] "Fizz"`。你会看到我们使用下划线字符 `_` 作为通配符，用于检查范围内的数字是否是
    5 的倍数。我们这样做是因为我们不关心该检查返回了什么（因为如果该值是 5 的倍数，那么我们在第一步中就已经找到了完全匹配）。


    如果该预期不匹配，那么我们将进入下一个预期：`[_ 0]`。这与前一个检查相反，我们现在在检查数字是否是 3 的倍数时使用 `_`（同样，我们不关心值是什么）。然后我们检查另一个值是否是
    5 的倍数，结果应为 `zero`，因此此时应找到匹配并打印单词 `"Buzz"`。


    你可以在代码末尾看到我们使用了 `:else` 语句来捕获并在未找到匹配时返回所提供的范围内的数字。此代码提供了成功通过 FizzBuzz 测试所需的所有条件。


    ### 匹配字面量


    在前面的示例中，我们一直基于符号来匹配值。但我们也可以匹配字面量值（参见代码清单 7-6）。


    ```

    (match [''foobar]

    [''foobar] :bar

    [''bazqux] :qux)

    ;; :bar

    代码清单 7-6.

    使用字面量值进行模式匹配

    ```


    在代码清单 7-6 中，我们传入了一个字面量符号进行匹配。在这种情况下，该符号不指向任何其他值；它实际上求值结果就是它自身。然后我们有一个与之直接匹配的关联模式，因此我们成功匹配并返回相应的值。


    现在，如果我们还需要提供一个回退机制（例如，当匹配失败时），那么我们可以使用 `:else` 关键字，如代码清单 7-7 所示。我们在前面实现 FizzBuzz
    测试时看到过它的用法，如果未找到匹配，我们既不返回 `"Fizz"` 也不返回 `"Buzz"` 或 `"FizzBuzz"`，而只是返回传入的范围数字。


    ```

    (let [a (+ 1 1)]

    (match [99]

    [a]   :success

    :else :fail))

    ;; :fail

    代码清单 7-7.

    使用 :else 语句提供回退

    ```


    ### 匹配数据结构


    到目前为止，我们已经看到了对表达式和直接字面量值的匹配。但也可以比较数据结构。


    ```

    (match [[:a :b :c]]

    [[:a :b _]] :success

    :else :fail)

    ;; :success

    (match [{:a 1 :b 1}]

    [{:a _ :b 2}] :foo

    [{:a 1 :b _}] :bar

    :else :baz)

    ;; :bar

    代码清单 7-8.

    使用数据结构进行模式匹配

    ```


    从代码清单 7-8 中，我们可以看到有两个示例。在第一个示例中，我们传入了一个向量数据结构；在第二个示例中，我们传入了一个映射。在这两种情况下，我们都能通过使用
    `_` 通配符符号轻松找到匹配，以捕获那些我们不在乎或不确定其值的某些值。


    注意


    使用映射数据结构时，不能在键上使用通配符；它只能用于键的值。


    使用向量时，你可能只需要部分匹配。例如，你可能只想匹配集合中的前几个元素。如果是这种情况，你可以使用 `&` rest 参数（你在第 6 章中会认识它）。参见代码清单
    7-9 中的示例。


    ```

    (match [[:a 1 :b 2 :c 3 :d 4]]

    [[:a 1 :b 2]] "这需要完全匹配"

    [[:a 1 :b _ & rest]] "rest 允许部分匹配"

    :else :fail)

    ;; "rest 允许部分匹配"

    代码清单 7-9.

    使用 Rest 符号 & 进行部分模式匹配

    ```

    '
- fmt: '### Safeguarding


    Before moving on to looking at polymorphism, I want to demonstrate a few other
    features of `core.match`, such as how, when using a map data structure, you can
    end up with a partial match unintentionally, as well as how to use the `:or` modifier
    to implement safeguards for the data being validated.


    ```

    (match [{:a 1 :b 2 :c 3 :d 4}]

    [{:a _ :b 2}] "maps default to partial matching"

    :else :fail)

    ;; "maps default to partial matching"

    Listing 7-10.

    Accidental Partial Pattern Match

    ```


    In Listing [7-10](#A453572_1_En_7_Chapter.html#Par41), we can see that unlike
    with vectors, where you can use the `&` rest symbol to implement an explicit partial
    match, the map data structure triggers a partial match as its default behavior.


    You should be aware of this so that you don’t accidentally match something you
    would rather avoid. It would be best in these situations to have a more explicit
    match defined in order to prevent accidental matching.


    Alternatively, you can use the `:only` modifier to define which keys you will
    accept, and thus prevent an accidental match from occurring. See Listing [7-11](#A453572_1_En_7_Chapter.html#Par45),
    which demonstrates the implementation.


    ```

    (match [{:a 1 :b 2 :c 3 :d 4}]

    [({:a _ :b 2} :only [:a :b :c])] "Didn''t match, :only expects three keys"

    [({:a _ :b 2} :only [:a :b :c :d])] "Match!"

    [{:a _ :b 2}] "this assertion is never executed"

    :else :fail)

    ;; "Match!"

    Listing 7-11.

    Use :only Modifier to Avoid Accidental Pattern Match

    ```


    We can see from Listing [7-11](#A453572_1_En_7_Chapter.html#Par45) that we have
    an incoming data structure consisting of four keys (`:a`, `:b`, `:c`, and `:d`),
    and within our first match we’re using the `:only` modifier to state that we’ll
    accept a match if it only contains the keys we’ve specified. So, no match is made,
    and we fall through to the next pattern, where we again have potential for a partial
    match, but this time we accept it because of our modifier definition: `[:a :b
    :c :d]`.


    Now, in some cases we might want to have a variable number of possible matches
    within a single pattern. We can do this using the `:or` modifier. See Listing
    [7-12](#A453572_1_En_7_Chapter.html#Par48) for an example.


    ```

    (match [[1 2 3]]

    [[1 (:or 3 4) 3]] :foo

    [[1 (:or 2 3) 3]] :bar)

    ;; :bar

    (match [{:a 3}]

    [{:a (:or 1 2)}] :foo

    [{:a (:or 3 4)}] :bar)

    ;; :bar

    Listing 7-12.

    Use :or Modifier to Facilitate Variable Matches per Pattern

    ```


    In Listing [7-12](#A453572_1_En_7_Chapter.html#Par48), we have two data structures:
    a vector and a map. With the vector example, we can see we’re stating that we
    expect the data structure to consist of `1` followed by either `3` or `4`, followed
    by `3`. If that doesn’t match, then we try to match a data structure consisting
    of `1` followed by either `2` or `3`, followed by `3` (this is what actually matches).


    The map data structure example is effectively the same principle, but we use the
    `:or` modifier to identify the key’s value.


    Finally, let’s take a look at the `:guard` modifier. What this enables us to do
    is to specify a function that verifies the incoming value is valid (and what is
    meant by valid depends on the function used). See Listing [7-13](#A453572_1_En_7_Chapter.html#Par52),
    for an example of how you might use this modifier.


    ```

    (defn div3? [n]

    "A function that returns true or false

    if the parameter can be evenly divided by three"

    (if (= (mod n 3) 0) true false))

    (match [[2 3 4 5]]

    [[_ (a :guard even?) _ _]] (format "We matched first %d" a)

    [[_ (b :guard [odd? div3?]) _ _]] (format "We matched second %d" b))

    ;; "We matched second 3"

    Listing 7-13.

    Use :guard Modifier to Facilitate Type/Value Validation

    ```


    In Listing [7-13](#A453572_1_En_7_Chapter.html#Par52), we can see that we have
    two expected matches. In the first, we state that we don’t care about any of the
    incoming values inside the vector data structure, except for the second item (which
    is the value `3`). But, we do want to ensure that the value is an odd number and
    is divisible by three.


    So, in the first pattern we tell `:guard` to use the `even?` function. Well, we
    know that the value `3` isn’t an even number, so that match will fail. We move
    on to the next pattern, which specifies multiple functions to validate against
    (and so we place them inside of a vector). The first function to validate with
    is the `odd?` function, and this will pass, as `3` is an odd number. The second
    function to validate with is our own user-defined function `div3?`, which again
    passes, as `3` is indeed divisible by itself.


    **Note:** According to the documentation, neither inline functions nor shorthand
    functions are currently supported.


    Overall, you can see what a powerful feature pattern matching can be for a variety
    of different scenarios. Let’s now take a look at polymorphism and see what that
    has to offer us.'
