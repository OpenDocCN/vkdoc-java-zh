    ## 附录 B：使用 Vim 编写 Clojure


    市面上有许多文本/代码编辑器，各有优缺点以及你应当使用它们的理由。以下是我整理的一份简短列表，列出了那些以某种形式支持 Clojure（或通过插件支持）的编辑器：


    *   Atom：Proto REPL

    *   Emacs：CIDER

    *   Vim：Fireplace

    *   IntelliJ（Java IDE）：Cursive

    *   Light Table：内置交互式 Clojure IDE


    你可能已经从这个附录的标题猜到了，我是一名 Vim 用户。现在，我不打算向你推销为什么我认为 Vim 是最好的编辑器，因为我已经通过撰写一本名为《Pro Vim》¹（由
    Apress 出版）的书来阐述这一点了。此外，Vim 的学习曲线确实相当陡峭，所以它并非适合所有人。


    话虽如此，如果你有兴趣使用 Vim 来编写 Clojure，或者你已经是 Vim 用户，那么请继续阅读，我将介绍你需要安装的不同插件和配置设置，以便在 Vim
    中高效地使用 Clojure。


    首先，我们需要安装以下插件：


    *   vim-fireplace ²

    *   vim-sexp-mappings-for-regular-people ³

    *   rainbow_parentheses.vim ⁴


    现在我将按相反的顺序介绍这些插件，因为前面的列表实际上是按优先级排序的（即 Fireplace 插件是必不可少的，但接下来的两个插件虽然非常有用，严格来说，对于让某些功能正常工作并非“必需”）。


    此外，每个插件的复杂度与其优先级和重要性相匹配。例如，优先级最低的插件 Rainbow Parentheses 也是最容易描述的。


    ### Rainbow Parentheses


    这个插件使用起来非常简单。它会把所有单调的括号变成彩色编码（仅此而已）。其目的是让你更容易辨别特定 Clojure 形式的起始和结束位置。


    你可能会想：何必这么麻烦？但请相信我，即使使用了 Clojure 文件格式主题，你的眼睛仍然难以在代码中找出特定的形式（尤其是当你的代码变得更复杂时，你会发现需要处理大量嵌套的括号），因此让它们变成彩虹色确实是一种福音。


    ### Sexp Mappings for Regular People


    在基于 Lisp 的语言中，你会遇到所谓的 S 表达式。⁵ 用通俗的话说，它们只是符号格式的一部分，你在基于 Lisp 的语言中会看到它们以括号包裹表达式的方式出现（这又回到了我们在本书开头讨论的“代码即数据”的理念，即代码代表了相同的基础数据结构）。


    因此，这个插件允许你操作 Clojure 代码（例如 Clojure 的“形式”）。但重要的是，不要将这个插件与另一个名为 Sexp ⁶ 的 Vim 插件混淆，后者也是一个用于操作
    S 表达式的有效插件。但我们这里感兴趣的插件实际上是 Sexp 的扩展，只是为基于终端的 Vim 用户提供了更符合习惯的键位绑定。


    这个插件有两个主要功能：


    1.  自动括号匹配

    2.  列表操作


    第一项相当直接：如果你输入一个左括号 `(`，那么 Vim 会自动在其后插入一个右括号 `)`，然后将光标置于括号之间。这很棒，因为它能防止你忘记自己添加左括号或右括号，从而避免意外导致程序触发错误（这可能是一个相当烦人的
    bug，因为在处理深度嵌套的形式时，很难识别出来）。


    第二项，列表操作，是这个插件的核心。它提供了以下键位绑定：


    *   `<f` 和 `>f`：向左或向右移动“形式”

    *   `<e` 和 `>e`：向左或向右移动“元素”

    *   `<(` 和 `>(`：向左或向右移动“左括号”

    *   `<)` 和 `>)`：向左或向右移动“右括号”

    *   `<I` 和 `>I`：向左或向右移动“插入点”


    让我们快速演示一下这些键位绑定是如何工作的。假设我们处理的是以下代码（参见清单 B-1），每次操作后，我们都会与清单 B-1 进行比较，看看发生了什么变化。


    ```

    (def myfn [f g h]

    (* h (+ f g)))

    清单 B-1.

    一个处理计算的简单函数

    ```


    #### 形式操作


    键位绑定 `<f` 和 `>f` 会影响光标当前所在的最内层形式。因此，如果你的光标位于形式 `(+ f g)` 内部（或之上），并且你执行了 `<f`，那么你会发现该形式向左移动（新布局见清单
    B-2）。


    ```

    (def myfn [f g h]

    (* (+ f g) h))

    清单 B-2.

    形式操作的结果

    ```


    #### 元素操作


    与形式操作类似，如果你的光标位于原始示例代码中的 `h` 符号（即“元素”）之上，并且你执行了 `>e`，那么你会发现该元素向右移动（新布局见清单 B-3）。


    ```

    (def myfn [f g h]

    (* (+ f g) h))

    清单 B-3.

    元素操作的结果

    ```


    注意


    你会看到清单 B-3 达到了与清单 B-2 相同的输出，但这是通过两种不同的机制实现的。


    #### 括号操作


    如果你的光标位于 `(+ f g)` 中的 `(` 字符之上（或内部），并且你在原始示例代码上执行了 `2<(`，那么你会发现该括号向左移动了两个位置（新布局见清单
    B-4）。在这个例子中，我对 `<(` 使用了 Vim 的计数 `2`，因此它被执行了两次。


    ```

    (def myfn [f g h]

    ((* h + f g)))

    清单 B-4.

    括号操作的结果

    ```


    注意


    这段代码在运行时现在会导致错误，但我这样做是为了演示该功能（由于自动括号插入功能，我很少需要操作单个括号）。


    #### 插入点操作


    如果你的光标位于某个形式之上（或内部），执行 `<I` 会将光标移动到该形式的开头，并自动进入 Vim 的插入模式。例如，将光标放在 `(+ f g)` 内部并执行
    `<I`；你应该会看到光标被放置在 `+` 之前，准备开始输入。


    类似地，如果你将光标放在 `(* h ...)` 内部，确保它位于嵌套在内的 `(+ f g)` 形式之外，然后执行 `>I`；你会看到光标被放置在该形式右括号之前。这个功能对于快速定位到长而复杂的形式的开头和结尾非常有用。


    ### Fireplace


    Fireplace 插件是重头戏。使用这个插件，你可以将 Vim 连接到网络 REPL（在我们的例子中是 Leiningen，但如果你愿意，也可以使用其他
    REPL），并直接在 Vim 内部动态评估你的 Clojure 代码。这将使你能够即时获得关于你编写的代码及其实际行为的反馈。这是一种极其强大且富有启发性的开发体验。


    注意


    很多人对这个插件的名字感到困惑：为什么叫 Fireplace？奥秘就在名字里：fi-REPL-ace（注意中间的 REPL）。

