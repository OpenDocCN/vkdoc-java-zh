    ```


    Sometimes you might want to reset the value of the atom without worrying about
    the current value. To do this, you would need to use the `reset!` function: `(reset!
    counter 0)`.


    You might also want to change an atom’s value only if its current value matches
    some pre-set condition. To do this, you would use the `compare-and-set!` function.


    The `compare-and-set!` function works by returning `true` if the current atom
    value matches what you’ve specified (and subsequently it will proceed to apply
    the requested change); otherwise, if the current value isn’t a match, then it’ll
    return `false` and not apply the change. See Listing [8-9](#A453572_1_En_8_Chapter.html#Par71)
    for an example of how this works .


    ```

    (def counter (atom 0))

    (swap! counter #(+ 4 %))

    @counter ;; 4

    (compare-and-set! counter 4 0) ;; true

    @counter ;; 0

    (compare-and-set! counter 4 1) ;; false

    @counter ;; 0

    Listing 8-9.

    Example of Validating Specific Conditions

    ```


    Notice in Listing [8-9](#A453572_1_En_8_Chapter.html#Par71) how the `counter`
    atom value stays set to zero after the second `compare-and-set!` function call.
    That is because we specified that the value be changed only if its current value
    were set to four, which it wasn’t (it was changed before that to zero).


    Finally, before moving on from atoms, we should also look at how to watch an atom
