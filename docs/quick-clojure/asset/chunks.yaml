- fmt: '### Map


    在下面的示例（清单 [3-6](#A453572_1_En_3_Chapter.html#Par47)）中，我们使用`map`将一个函数应用于集合`[1 2
    3]`，这意味着我们可以将集合中的每个值加一，这得益于`inc`函数的使用。


    ```

    (map inc [1 2 3])

    ;; (2 3 4)

    Listing 3-6.

    Example of map

    ```


    请注意，如果你在映射数据结构（例如`{:a 1 :b 2 :c 3}`）上使用`map`，你会发现返回的是一个列表数据结构（并且不一定是你期望的顺序）。我们在清单
    [3-7](#A453572_1_En_3_Chapter.html#Par49) 中看到了这一点。


    ```

    (map

    (fn [[k v]] (inc v))

    {:a 1 :b 2 :c 3}) ;; => (4 3 2)

    ;; (2 3 4)

    Listing 3-7.

    The map Return Value Type Is a List

    ```


    因此，如果你需要返回一个映射数据结构，请确保在构造返回的数据结构时，使其在输出时看起来像一个键/值结构。一旦我们有了这个类似键/值的数据结构，我们就能将其转换为实际的映射数据结构。清单
    [3-8](#A453572_1_En_3_Chapter.html#Par51) 演示了如何做到这一点。


    ```

    (map

    (fn [[k v]] [k (inc v)])

    {:a 1 :b 2 :c 3})

    ;; ([:c 4] [:b 3] [:a 2])

    Listing 3-8.

    Ensure map Returns Key/Value-like Data Structure

    ```


    现在我们有了类似键/值的结构`([:c 4] [:b 3] [:a 2])`，我们可以用`into`函数包裹前面的形式，将该返回的结构（即子向量列表）从列表转换回映射，如清单
    [3-9](#A453572_1_En_3_Chapter.html#Par53) 所示。


    ```

    (into {}

    (map

    (fn [[k v]] [k (inc v)])

    {:a 1 :b 2 :c 3}))

    ;; {:c 4, :b 3, :a 2}

    Listing 3-9.

    Convert Key/Value-like Data Structure Back into a map Data Structure

    ```


    ### Reduce


    在清单 [3-10](#A453572_1_En_3_Chapter.html#Par55) 中，我们使用了`reduce`函数，它接受两个参数。第一个是一个函数（该函数本身必须接受两个参数），第二个应该是一个集合。`Reduce`遍历给定的集合，并将每个元素传递给提供的函数（在清单
    [3-10](#A453572_1_En_3_Chapter.html#Par55) 中，我们提供了`+`函数和集合`[1 2 3]`）。


    ```

    (reduce + [1 2 3 4])

    ;; 10

    Listing 3-10.

    Example of the reduce Function

    ```


    在这个特定示例中，可能不太明显的是，`reduce`需要一个累加器，它在每次迭代中作为第一个参数传递给给定的函数。你可以为累加器提供一个初始值，但如果不提供，则使用集合中的第一个元素。


    在前面的示例中，我们没有提供累加器，因此第一个元素（`1`）被用作初始累加值。这意味着`1`作为第一个参数传递给`+`函数，而集合中的第二个元素（`2`）作为第二个参数传递给`+`函数。然后`+`函数将这两个值相加，得到结果`3`。该值随后在下次迭代中作为累加器提供。


    因此，对于集合中的下一个元素（即元素`3`），传递给`+`函数的第一个参数将是之前的值`3`，而第二个参数将是集合元素`3`。那次迭代将返回结果值`6`（即`3
    + 3 = 6`），然后该值将作为“累加”值传递给下一次迭代。


    现在，在最后一次迭代中，我们有累加值`6`和集合元素`4`，这意味着最后一次执行将是`(+ 6 4)`，结果为`10`。


    让我们看一个更显式的`reduce`函数版本（清单 [3-11](#A453572_1_En_3_Chapter.html#Par61)）。


    ```

    (reduce

    (fn [acc, element]

    (assoc acc (first element) (last element)))

    {}

    [[:a :b] [:c :d]])

    ;; {:c :d, :a :b}

    Listing 3-11.

    Explicit Accumulator Example of the reduce Function

    ```


    在清单 [3-11](#A453572_1_En_3_Chapter.html#Par61) 中，我们更改了几件事，首先是我们使用了一个匿名函数而不是内置函数。我们这样做是为了直观地演示累加器是如何传递给给定函数的。我们更改的第二件事是累加器的初始值。我们没有使用集合中的第一个元素（它将是`[:a
    :b]`），而是使用了一个空的映射数据结构`{}`。


    这就是我们可以看到`reduce`函数真正强大之处的地方。我们能够将一个数据结构转换为一个完全不同的数据结构。我们可以看到，我们的匿名函数将第二个参数`[:a
    :b]`中的第一个和最后一个元素关联到映射数据结构中（由第一个参数符号`acc`引用）。


    第一次迭代的结果是`{:a :b}`，由于这是最后被求值的表达式，它被用作下一次迭代的累加值。这意味着在第二次迭代中，我们将第二个参数`[:c :d]`中的第一个和最后一个元素关联到映射数据结构`{:a
    :b}`中（由第一个参数符号`acc`引用）。这最终得到值`{:c :d, :a :b}`。


    你可以在传递给`reduce`的函数中做任何你想做的事情，但请记住，最后一个表达式（或函数末尾返回的内容）将用作下一次迭代的累加器。


    ### Filter


    `filter`函数用于从集合中“过滤”出那些成功通过谓词检查的值。清单 [3-12](#A453572_1_En_3_Chapter.html#Par67)
    演示了该函数如何工作的一个示例。


    ```

    (filter even? (range 10))

    ;; (0 2 4 6 8)

    Listing 3-12.

    Example of the filter Function

    ```


    在这个示例中，我们使用`range`函数创建了一个集合（即`(range 10)`），它给我们一个看起来像`(0 1 2 3 4 5 6 9 8 9)`的列表。


    该列表中的每个元素都被传递给`even?`函数，正如你可能猜到的，如果元素是偶数则返回`true`，否则返回`false`，最终我们得到结果集合`(0 2
    4 6 8)`。


    注意


    此函数返回一个列表，但如果你希望返回一个向量，可以将`filter`替换为`filterv`。'
  raw: '### Map


    In the following example (Listing [3-6](#A453572_1_En_3_Chapter.html#Par47)),
    we’re using `map` to apply a function to the collection `[1 2 3]`, which means
    we’re able to increment each value within the collection by one, thanks to the
    use of the `inc` function.


    ```

    (map inc [1 2 3])

    ;; (2 3 4)

    Listing 3-6.

    Example of map

    ```


    Be aware that if you use `map` over a map data structure (e.g., `{:a 1 :b 2 :c
    3}`) you’ll find you get returned a list data structure (and not necessarily in
    the order you expect). We see this in Listing [3-7](#A453572_1_En_3_Chapter.html#Par49).


    ```

    (map

    (fn [[k v]] (inc v))

    {:a 1 :b 2 :c 3}) ;; => (4 3 2)

    ;; (2 3 4)

    Listing 3-7.

    The map Return Value Type Is a List

    ```


    So, you if you need a map data structure returned, make sure you construct the
    returning data structure in such a way that on the way out it resembles a key/value
    structure. Once we have this key/value-like data structure, we’ll be able to convert
    it into an actual map data structure. Listing [3-8](#A453572_1_En_3_Chapter.html#Par51)
    demonstrates how you might do this.


    ```

    (map

    (fn [[k v]] [k (inc v)])

    {:a 1 :b 2 :c 3})

    ;; ([:c 4] [:b 3] [:a 2])

    Listing 3-8.

    Ensure map Returns Key/Value-like Data Structure

    ```


    Now that we have our key/value-like structure `([:c 4] [:b 3] [:a 2])`, we can
    wrap the preceding form with the `into` function to convert that returned structure
    (i.e., the list of sub-vectors) back into a map from a list, as in Listing [3-9](#A453572_1_En_3_Chapter.html#Par53).


    ```

    (into {}

    (map

    (fn [[k v]] [k (inc v)])

    {:a 1 :b 2 :c 3}))

    ;; {:c 4, :b 3, :a 2}

    Listing 3-9.

    Convert Key/Value-like Data Structure Back into a map Data Structure

    ```


    ### Reduce


    In Listing [3-10](#A453572_1_En_3_Chapter.html#Par55), we’re using the `reduce`
    function, which accepts two arguments. The first is a function (this function
    must itself accept two arguments), and the second should be a collection. `Reduce`
    iterates over the given collection and passes each item through to the provided
    function (in Listing [3-10](#A453572_1_En_3_Chapter.html#Par55) we provide the
    `+` function and the collection `[1 2 3]`).


    ```

    (reduce + [1 2 3 4])

    ;; 10

    Listing 3-10.

    Example of the reduce Function

    ```


    What’s probably not obvious in this particular example is that `reduce` requires
    an accumulator, which is passed through as the first argument to the given function
    for each iteration. You can provide an initial value for an accumulator , but
    if you don’t provide one then the first element in the collection is used.


    We didn’t provide an accumulator in the preceding example, and so the first item
    (`1`) was used as the initial accumulated value. This means `1` was given to the
    `+` function as the first argument, and the second item in the collection (`2`)
    was given to the `+` function as the second argument. The `+` function then added
    the two values together, which resulted in the value `3`. That value was then
    provided as the accumulator on the next iteration.


    So, for the next item in the collection (which was the item `3`), the first argument
    provided to the `+` function would’ve been the earlier value 3, while the second
    argument would have been the collection item `3`. That iteration would have returned
    the resulting value of `6` (i.e., `3 + 3 = 6`), which would have then been passed
    as the “accumulated” value for the next iteration.


    Now, on the final iteration we have the accumulated value `6` and the collection
    item `4`, meaning the last execution would be `(+ 6 4)`, which results in the
    value `10`.


    Let’s see a more explicit version of the `reduce` function (Listing [3-11](#A453572_1_En_3_Chapter.html#Par61)).


    ```

    (reduce

    (fn [acc, element]

    (assoc acc (first element) (last element)))

    {}

    [[:a :b] [:c :d]])

    ;; {:c :d, :a :b}

    Listing 3-11.

    Explicit Accumulator Example of the reduce Function

    ```


    In Listing [3-11](#A453572_1_En_3_Chapter.html#Par61) we change a few things,
    the first being we’re using an anonymous function instead of a built-in function.
    The reason we’ve done this is to visually demonstrate how the accumulator is passed
    into the given function. The second thing we’ve changed is the initial value of
    the accumulator. We’re not using the first item in the collection (which would’ve
    been `[:a :b]`), but rather an empty map data structure `{}`.


    This is where we can see the real power of the `reduce` function. We’re able to
    convert one data structure into a completely different data structure. We can
    see that our anonymous function associates the first and last element from the
    second argument `[:a :b]` into the map data structure (referenced by the first
    argument symbol `acc`).


    The result of that first iteration is `{:a :b}`, and as that is the last expression
    that was evaluated, it is used as the accumulated value for the next iteration.
    This means that on the second iteration we associate the first and last element
    from the second argument `[:c :d]` into the map data structure `{:a :b}` (referenced
    by the first argument symbol `acc`). This results in the final value of `{:c :d,
    :a :b}`.


    You can do anything you want within the function passed to `reduce`, but remember
    that the last expression (or the thing that is returned at the end of the function)
    is what will be used as the accumulator on the next iteration.


    ### Filter


    The `filter` function is useful for “filtering” out values from a collection that
    successfully pass a predicate check. Listing [3-12](#A453572_1_En_3_Chapter.html#Par67)
    demonstrates an example of how this function works.


    ```

    (filter even? (range 10))

    ;; (0 2 4 6 8)

    Listing 3-12.

    Example of the filter Function

    ```


    In this example, we create a collection using the `range` function (i.e., `(range
    10)`), which gives us a list that looks like `(0 1 2 3 4 5 6 9 8 9)`.


    Each element in that list is passed to the `even?` function, which as you can
    probably guess returns `true` if the element is an even number or `false` otherwise,
    leaving us with the resulting collection `(0 2 4 6 8)`.


    Note


    This function returns a list, but if you wanted a vector returned instead you
    can swap out `filter` for `filterv`.'
