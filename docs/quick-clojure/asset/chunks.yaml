  trans: '

    ## 运行 CLI 应用程序


    目前，我们有三种方式可以运行这个应用程序：


    1.  直接通过 Leiningen 运行

    2.  将应用程序编译成 jar 包

    3.  将应用程序编译成二进制文件


    在测试阶段，我们会使用第一种方式。稍后，我会向你介绍第二和第三种方式，不过实际上第三种方式可能是你最感兴趣的，因为它能让我们像运行真正的命令行二进制文件一样运行应用程序（就像你常用的标准二进制文件，例如
    `ls` 或 `cat` 等）。


    ### 通过 Leiningen 运行


    要通过 Leiningen 运行命令行应用程序，我们只需执行一个具有以下语法结构的命令：`lein run <选项> <参数>`。例如，在代码清单 13-4
    中，我们可以看到这样一个适用于我们已定义应用程序的示例。


    ```

    lein run -v -p 9090 -x 666 arg1 arg2 arg3

    代码清单 13-4.

    执行我们的命令行应用程序

    ```


    上述命令的输出结果如代码清单 13-5 所示，我们可以看到，显示的输出正是我们期望从 `parse-opts` 函数返回的内容。


    ```

    {:options {:xxx 666, :verbosity 1, :port 9090}, :arguments [arg1 arg2 arg3], :summary   -p,
    --port PORT     80   Port number

    -v                       Verbosity level

    -x, --xxx WHATEVER  123  A description for this option

    -h, --help, :errors nil}

    代码清单 13-5.

    应用程序的输出

    ```


    还记得在代码清单 13-3 中，我们是如何描述返回的映射数据结构中应包含的四个属性的吗？现在，我们在这里可以看到它们，以及它们被赋予的实际值。这将帮助我们更好地理解如何在应用程序中使用它们。


    注意


    如果没有错误，那么 `:errors` 字段应被赋予 `nil` 值。


    ### 通过 Jar 包运行


    通过 jar 包运行应用程序与直接通过 Leiningen 运行并没有太大区别。标志选项和参数完全相同；只是你需要引用一个 jar 文件，而不是引用 Leiningen。


    这意味着我们首先需要将应用程序编译成 jar 包，你可以使用命令 `lein uberjar` 来完成。运行该命令后，你应该会看到类似于代码清单 13-6
    的输出。


    ```

    Compiling cli-foo.core

    Created /Users/M/cli-foo/target/uberjar+uberjar/cli-foo-0.1.0-SNAPSHOT.jar

    Created /Users/M/cli-foo/target/uberjar/cli-foo-0.1.0-SNAPSHOT-standalone.jar

    代码清单 13-6.

    生成应用程序 Jar 包的输出

    ```


    从输出中可以看到，该命令为我们生成了一组 jar 包（如果这确实是一个标准应用程序而非命令行变体，这些 jar 包还可以用于部署）。现在，让我们看看如何运行生成的
    jar 文件。假设你当前在 `cli-foo` 目录内，你应该执行代码清单 13-7 中的命令。


    ```

    java -jar target/cli-foo-0.1.0-SNAPSHOT-standalone.jar -v -p 9090 -x 666 arg1
    arg2 arg3

    代码清单 13-7.

    运行我们应用程序的 Jar 命令

    ```


    ### 通过二进制文件运行


    我认为这种打包方式会是读者最感兴趣的。我们希望我们的应用程序能够在任何操作系统上运行，且设置简单、无需繁琐操作。为此，我们需要使用一个外部插件。


    我们将使用的插件叫做 `lein-bin`，⁴ 它会获取 Leiningen 原本会生成的 uberjar，并将其与特定配置一起包装成另一种格式，使其能够在
    Windows、Mac 或 Linux 环境中运行。


    首先，我们需要在 `project.clj` 中更新 `lein-bin` 插件，并提供一些额外的设置，例如为我们的二进制文件命名（这里，我希望我的二进制文件名为
    `integralist`）。我们还将配置该二进制文件，使其被添加到本地用户 bin 路径中，这样我就可以使用 `integralist <选项> <参数>`
    的格式隐式地运行它。


    注意


    `bin` 路径是大多数操作系统可执行二进制文件的存储位置。系统二进制文件目录是 `/usr/bin`，用户目录是 `/usr/local/bin`。我们应该将二进制文件放在用户特定的目录中，因为用户安装的任何二进制文件都应该放在那里。


    在代码清单 13-8 中，你将看到在完整的 `project.clj` 文件上下文中所需的更改。我们添加了 `:plugin` 属性（因为这是我们项目的第一个插件），并添加了新的插件特定属性
    `:bin`，我们将其配置为将可执行文件命名为 `integralist`，并且它会自动将生成的可执行文件复制到我们的 `/usr/local/bin` 目录中。


    ```

    (defproject cli-foo "0.1.0-SNAPSHOT"

    :description "FIXME: write description"

    :url "http://example.com/FIXME"

    :license {:name "Eclipse Public License"

    :url "http://www.eclipse.org/legal/epl-v10.html"}

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/tools.cli "0.3.5"]]

    :plugins [[lein-bin "0.3.4"]]

    :bin {:name "integralist"

    :bin-path "/usr/local/bin"}

    :main ^:skip-aot cli-foo.core

    :profiles {:uberjar {:aot :all}})

    代码清单 13-8.

    通过 project.clj 文件配置 lein-bin

    ```


    如果你现在运行 `lein repl`，你会发现 Leiningen 会下载新定义的插件。输出将类似于代码清单 13-9，并突出显示了一些所需的嵌套依赖项。


    ```

    Retrieving lein-bin/lein-bin/0.3.4/lein-bin-0.3.4.pom from clojars

    Retrieving me/raynes/fs/1.4.0/fs-1.4.0.pom from clojars

    Retrieving org/apache/commons/commons-compress/1.3/commons-compress-1.3.pom from
    central

    Retrieving org/apache/commons/commons-compress/1.3/commons-compress-1.3.jar from
    central

    Retrieving lein-bin/lein-bin/0.3.4/lein-bin-0.3.4.jar from clojars

    Retrieving me/raynes/fs/1.4.0/fs-1.4.0.jar from clojars

    代码清单 13-9.

    下载 lein-bin 插件及其依赖项


    此时，你将拥有一个可用的 `lein bin` 命令。如果你在项目目录中执行该命令，你将看到类似于代码清单 13-10 所示的输出。二进制文件编译完成后，它会被复制到你的
    `/usr/local/bin` 目录中，你会发现它可以在你计算机上的任何位置使用。


    注意


    这是因为你的 `$PATH` 环境变量已预先配置为在 `/usr/local/bin` 目录中查找可执行文件。


    ```

    Compiling cli-foo.core

    Created /Users/M/code/clojure/cli-foo/target/cli-foo-0.1.0-SNAPSHOT.jar

    Created /Users/M/code/clojure/cli-foo/target/cli-foo-0.1.0-SNAPSHOT-standalone.jar

    Creating standalone executable: /Users/M/code/clojure/cli-foo/target/integralist

    Copying binary to /usr/local/bin

    代码清单 13-10.

    lein-bin 命令的输出

    ```


    如果你现在执行 `integralist -vvv abc`，你应该会在屏幕上看到预期的输出。太棒了！我们已经创建了一个可执行文件，现在可以在系统的任何位置运行它。但请注意，这个可执行文件仅适用于你构建它的操作系统。为了让该可执行文件在另一个操作系统上运行，你需要在该操作系统架构上构建它。


    注意


    一种选择是使用 Docker，⁵ 它允许你在自己的计算机上运行不同的操作系统。然后，你可以从你希望应用程序运行的目标操作系统构建一个 Docker 镜像，并设置好环境，使其包含
    Leiningen 和 `lein-bin` 插件，然后通过将你的代码库在运行时挂载到 Docker 容器中，在 Docker 容器内编译可执行文件。Docker
    超出了本书的范围，因此我们不再进一步讨论这个选项。

