    \ believed to be a bug."
  trans: "\n#### 所需步骤\n\n我们需要执行的主要步骤如下：\n\n1.  启动 REPL。\n2.  在 Vim 中打开一个 Clojure 文件。\n\
    3.  运行 Fireplace 的 `:Connect` 命令。\n4.  在 Vim 提示符中输入 REPL 的详细信息。\n\n完成这些步骤后，我们就可以开始使用\
    \ Fireplace 特有的键位绑定来求值我们的 Clojure 代码了。\n\n#### 首选工作流程？\n\n你的工作流程可能与我不同（大多数 Vim\
    \ 用户都有自己的做事方式）。对我来说，我使用 NeoVim，⁷ 因此我可以创建一个包含实际终端实例的分屏窗口（例如，使用其 `:terminal` 命令）。所以，我会有一个水平分割的窗口集。顶部窗口是我的\
    \ Clojure 代码，底部窗口是我的终端（也就是我启动 REPL 的地方）。\n\n你可能不使用 NeoVim，但这没关系。如果你是 tmux ⁸ 用户，那么你可以有一个水平分割的窗格，效果基本相同。如果你不使用像\
    \ tmux 或 screen ⁹ 这样的终端复用器，那么你可以简单地启动两个 shell/终端实例；在我即将详述的初始设置步骤中，你需要在它们之间来回切换。\n\
    \n#### 连接到 REPL\n\n好的，那么让我们从启动 REPL 开始：`lein repl`\n\n在使用 Fireplace 插件从 Vim 连接到\
    \ REPL 之前，我们需要打开一个 Clojure 文件；这是因为 Fireplace 只有在找到 Clojure 格式的文件时才会加载其功能（如果你尝试从其他文件类型运行其任何命令，Vim\
    \ 会提示无法识别该命令）。\n\n在 Vim 中，你可以选择打开一个 Clojure 文件，或者简单地打开一个空缓冲区并将该缓冲区的格式设置为 Clojure\
    \ 文件；例如，`setf clojure`。选择哪种方式并不重要。通常，如果我只是想摆弄一些 Clojure 代码，我会用空缓冲区启动 Vim 并使用 `setf\
    \ clojure`（我相信有些人会主张直接使用 Leiningen 的 REPL，但我更喜欢在 Vim 内部工作）；否则，如果我在处理一个实际项目，我会打开我想要编辑的\
    \ Clojure 文件。\n\n完成这些操作后，Vim 就可以使用 Fireplace 提供的 `:` `Connect` 命令了。使用此命令，你可以使用\
    \ Tab 补全来填写大部分必需的值；直接输入值，例如 `:Connect <VALUE>`；或者按 ENTER 让 Vim 自动提示你输入答案。我通常直接输入我们需要的\
    \ `:Connect nrepl://127.0.0.1:65103`。\n\n如果你想知道我是从哪里得到 `127.0.0.1:65103`（即 `<LOCAL_IP>:<PORT_NUMBER>`）的，那么请看运行\
    \ `lein repl` 的那个屏幕。你应该会看到输出的第一行类似于清单 B-5 所示的内容，连接成功后你会看到一条类似于清单 B-6 的消息。\n\n\
    ```\nnREPL server started on port \non host  -\nnrepl://:\n清单 B-5.\n来自 lein repl\
    \ 命令的抽象输出\n```\n\n注意\n\n你可以使用 `localhost` 代替 `127.0.0.1`\n\n```\nConnected to\
    \ nrepl://:\nScope connection to: \n清单 B-6.\n连接到 REPL 后的 Vim 输出\n```\n\n要关闭此消息，请按\
    \ ENTER。\n\n注意\n\n`:` `Connect` 命令的语法结构是：`<PROTOCOL>://<LOCAL_IP>:<PORT_NUMBER>\
    \ <PATH/TO/CODE>`。但请注意，项目代码的路径不应包含空格。例如，`∼/Some/Project` 没问题，但 `∼/Some Other/Project`\
    \ 则不行。\n\n#### Fireplace 命令\n\nFireplace 有相当多的键位绑定和命令，所以我强烈建议你阅读 Fireplace 的帮助文档（`:help\
    \ fireplace`），因为我不会尝试涵盖所有内容。说真的，有些我甚至从未用过！但我最常用的那些，我在这里包含了详细信息（我鼓励你尝试给出的示例，以便熟悉它们）。\n\
    \n*   `:Doc <symbol>`（例如，`:Doc defn`）\n*   `:FindDoc <symbol>`（例如，`:FindDoc de`）\n\
    *   `:Source <symbol>`（例如，`:Source defn`）\n\n注意\n\n当光标位于某个符号上时，执行 `K` 键位绑定是 `:Doc`\
    \ 命令的快捷方式。如果需要退出 `:FindDoc` 结果屏幕，你可以按 Q 或一直滚动到底部然后按 ENTER。另外，当光标位于某个符号上时，执行 `[d`\
    \ 或 `]d` 键位绑定是 `:Source` 命令的快捷方式。\n\n#### Fireplace 键位绑定\n\n*   `cpp`：求值最内层的表单\n\
    *   `cqp`：显示提示符以输入自定义表达式\n*   `cqq`：显示提示符，并预填充当前表单\n*   `cqc`：在命令行窗口内显示提示符\n*\
    \   `cmm`：展开一个 Clojure 宏\n\n在清单 B-7 中，我们可以看到名为 `calc` 的示例函数，我们将以此为基础来探索前面列表中显示的键位绑定。为了后续章节的演示，让我们将该代码添加到一个新的空缓冲区中，并使用\
    \ `setf clojure`（而不是从实际项目目录中运行它）。\n\n```\n(defn calc [f g]\n(* (+ f g) (/ g f)))\n\
    清单 B-7.\n用于验证键位绑定的示例函数\n```\n\n##### cpp\n\n将光标放在清单 B-7 的第一行（即 `(defn calc [f\
    \ g]`）上，然后执行键位绑定 `cpp`。你应该会看到结果显示在 Vim 实例的底部：`#'user/calc`。\n\n你会注意到命名空间是 `user`，因为我们是在一个尚未写入文件的缓冲区中工作。如果我们是在一个真实的\
    \ Clojure 项目中工作，你可能会看到类似 `#'<path/to/your/project/namespace>/calc` 的内容。\n\n如果你将光标放在一个函数调用上（例如\
    \ `(calc 100 50)`）并执行 `cpp` 键位绑定，那么它将求值该调用并返回实际结果。但请注意，如果（在此示例中）你还没有对 `calc` 函数定义本身执行过\
    \ `cpp`（即 REPL 尚未求值该函数定义），那么你会发现 REPL 无法求值对 `calc` 函数的调用，因为它不知道在哪里找到它。这将导致一个错误（参见清单\
    \ B-8）。\n\n```\nCompilerException java.lang.RuntimeException:\nUnable to resolve\
    \ symbol: calc in this context, compiling:(4:1)\n清单 B-8.\n对未求值的函数进行调用时出现的错误\n\
    ```\n\n当你忘记求值函数定义时，就会发生这种类型的错误；例如，你输入了大量代码，然后试图直接调用它，而没有先求值各个定义。有时，一次性重新求值整个缓冲区会更简单，你可以使用\
    \ `:%Eval` 来实现（你可以将其绑定到自定义键位上，使其执行起来更快更简单）。\n\n##### cqp\n\n在当前缓冲区的任何位置执行键位绑定\
    \ `cqp`，Vim 都会显示一个命令提示符，让你输入一个新的表达式进行求值。和之前一样，如果你尝试求值代码中的定义，请确保通过求值你想要使用的定义，或者先重新求值整个缓冲区，让\
    \ REPL 知道它们的存在。\n\n##### cqq\n\n`cqq` 键位绑定的工作原理是：获取当前缓冲区中光标所在位置的表单，并将其放入 Vim 命令提示符中，然后你可以在按\
    \ ENTER 求值表达式之前修改该命令。\n\n注意\n\n我发现 NeoVim 在使用 `:terminal` 窗格时，不会显示 `cqq` 键位绑定的求值结果。求值确实发生了（我们可以通过检查\
    \ `:Last` 来知道这一点，它会在预览窗口中显示最后一次 Clojure 求值结果）；只是没有显示出来。这被认为是一个 bug。\n"
- fmt: '##### `cqc`


    `cqc`键绑定可以在当前缓冲区的任何位置执行。它会打开Vim的命令行窗口，允许你搜索之前的求值结果，并在重新求值前进行修改。


    ##### `cmm`


    `cmm`键绑定对于理解宏在抽象层之下的工作方式（即宏展开后的代码是什么样子）非常有用。以我们一直在使用的`calc`函数为例；如果我们在其定义上执行`cmm`，宏展开将将其求值为清单B-9所示的内容。


    ```

    (def calc (fn* ([f g] (* (+ f g) (/ g f)))))

    Listing B-9.

    Defn Macro Expanded Using cmm Key Binding

    ```


    在清单B-9中，我们可以看到在`defn`宏上执行`cmm`会将其展开，从而让我们看到实际上`calc`定义只是一个`def`形式。它还展示了底层使用匿名函数来实现`defn`为我们抽象掉的功能。


