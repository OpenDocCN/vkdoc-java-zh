    ## defrecord


    记录（record）是一种与映射（map）非常相似的数据结构，因为它是一个不可变的键/值存储，但它也类似于结构体（struct，其定义的对象具有特定的字段用于分配，因此方法可以应用于它）。


    与 `deftype` 的一个关键区别在于，`defrecord` 是不可变的，而 `deftype` 可以改变其内部状态。但在讨论如何使用 `defrecord`
    之前，让我们先考虑一下你可能想要使用它的一些原因。


    注意


    如果在记录上定义方法，则还必须定义一个协议（接口）。


    如果你使用动态分发（例如， multimethods），那么你可能会遇到的一个问题是，当你实际上只改变了整体功能的一小部分时，你最终会多次定义相似的行为。使用
    `defrecord`（以及 `defprotocol`）则可以将方法和行为分组到一个统一的类型之下。


    从性能角度来看，与使用 `defrecord` 相比，multimethods 相当慢，如前所述，`defrecord` 只不过是一个不可变的持久化映射数据结构。


    注意


    在内部，记录被表示为 Java 类。


    ```

    (defrecord Foo [bar baz qux])

    (def f (Foo. "x" "y" "z"))

    f ;; #user.Foo{:bar "x", :baz "y", :qux "z"}

    (:bar f)

    ;; "x"

    清单 11-4.

    简单 defrecord 示例

    ```


    因此，在清单 11-4 中，我们可以看到我们定义了一个名为 `Foo` 的新记录，并期望它拥有字段 `bar`、`baz` 和 `qux`。然后我们定义了一个
    `Foo` 的新实例，并将其赋值给变量 `f`。


    这个实例化过程的有趣之处在于记录名称后面使用了句点字符（点号）。这是 Clojure 与 Java “互操作”的方式之一（请记住，“在底层” `Foo` 记录实际上被表示为
    Java 类）。


    一旦我们创建了实例，我们就可以通过指定字段名称，后跟应分发行为以进行处理的对象实例 `(:bar f)` 来访问该字段。


    注意


    由于记录实际上是一个 Java 类，我们也可以使用点互操作符号来访问成员字段：`(.bar f)`。


    现在，当我们定义记录时，会自动生成两个函数供我们使用。第一个是 `->` `Record`，第二个是 `map->Record`（其中 `Record` 是记录的名称）。使用前者，我们可以像这样创建实例：`(->Foo
    "x" "y" "z")`，这并没有太大区别。我个人更喜欢 Java 互操作语法。但使用后者，你可以使用映射数据结构而不是标准参数来实例化记录。这在你已经有一个想要封装到记录中的数据结构的情况下非常有用。例如，`(map->Foo
    {:qux "z" :bar "x" :baz "y"})`。


    注意


    使用 `map->Record` 时，映射数据结构中的键可以是任意顺序，这与 `Record.` 或 `->Record` 不同。


    现在让我们考虑一个例子，我们希望我们的记录也包含一个名为 `message` 的方法（以及之前定义的字段 `bar`、`baz` 和 `qux`）。


    ```

    (defprotocol IFoo

    (message [obj]))

    (defrecord Foo [bar baz qux]

    IFoo

    (message [obj] (str "hello " obj " from " bar ", " baz " and " qux)))

    (def f (Foo. "x" "y" "z"))

    f

    ;; #user.Foo{:bar "x", :baz "y", :qux "z"}

    (.message f) ;; "hello user.Foo@b679dccc from x, y and z"

    清单 11-5.

    带有附加方法的 defrecord 示例

    ```


    在清单 11-5 中，我们可以看到，因为我们想要在记录中包含一个方法（并且因为记录实际上只是 Java 类），我们首先需要定义一个协议（接口）。我使用了在接口名称前加上大写字母
    `i` 的约定（但你可以使用任何对你最有意义的约定）。我们定义的方法接受一个参数 `obj`。


    接下来，我们像之前一样定义我们的记录，但现在多了两行。第一行是我们希望支持的接口，第二行是协议的具体实现。你还可以看到该方法能够访问记录已初始化的其他字段。


    最后，我们使用点 Java 互操作点符号来调用我们的方法。


    ## Reify


    我们要看的最后一项是 `reify` 宏，它能够生成一个匿名类型。这与 `deftype` 和 `defrecord` 不同，后两者生成的是具名类型。`reify`
    的唯一目的是提供一种方式来定义预先存在的协议/记录的**一次性**实现，同时它的主体是一个词法闭包，这意味着它可以访问周围的局部作用域。


    这最好通过一个例子来演示（见清单 11-6），该例子突出了 `reify` 类型如何能够访问其周围的局部作用域以提供包装后的响应。


    注意


    请参阅 `clojuredocs.org` ³ 获取更实际的例子。


    ```

    (defprotocol IFoo (message [obj]))

    (defrecord Foo [bar baz qux] IFoo

    (message [obj] (str "hello " obj " from " bar ", " baz " and " qux)))

    (def f (Foo. "x" "y" "z"))

    (defn wrapper [instance]

    (reify IFoo

    (message [_] (str "wrapped result: " (message instance)))))

    (message (wrapper f))

    ;; "wrapped result: hello user.Foo@b679dccc from x,y and z"

    清单 11-6.

    用于一次性匿名实现的 reify 示例

    ```


    ## 总结


    这是一个非常简短的章节，主要关注 Clojure 语言中可用的一小部分面向对象特性。


    我们避免讨论 Java 互操作特性以及如何从 Clojure 中使用 Java 代码，因为我认为这本书应该更侧重于 Clojure 而非 Java。一旦你开始引入与
    Java 的互操作，就意味着需要一些 Java 基础知识（这超出了本书的范围）。


    我们学到的是，我们可以通过使用协议（`defprotocol` 允许我们定义清晰的接口边界）来很好地定义结构化代码，也可以使用 `deftype` 和 `defrecord`
    来定义可变和不可变的类。我们还看到了如何为一次性协议/记录实现实现一个作用域包装器。


    在下一章中，我们将更仔细地研究 Leiningen 构建工具。到目前为止，我们一直将 Leiningen 用作 REPL 和简单的项目工具（用于定义一些额外的依赖项）。我们将研究
    Leiningen 中可用的不同类型的模板和应用程序结构，以及如何生成一个快速的静态网页。


    脚注 1


    [`​www.​scala-lang.​org/​`](https://www.scala-lang.org/)


      2


    [`​clojure.​org/​reference/​java_​interop`](https://clojure.org/reference/java_interop)


      3


    [`​clojuredocs.​org/​clojure.​core/​reify#example-542692cdc026201c​dc326d5d`](https://clojuredocs.org/clojure.core/reify#example-542692cdc026201cdc326d5d)

