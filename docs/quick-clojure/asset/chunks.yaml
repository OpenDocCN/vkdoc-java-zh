    ### 分配函数


    现在，变量不仅可以包含单一值（字符串或数据结构等），还可以分配函数。例如，清单 2-36 展示了一个变量，它创建了一个向你打招呼的函数（你可能会将这样一个简短的函数写在一行内，但为了可读性，我将其展开为多行）。


    ```

    (def foo

    (fn [p]

    (prn

    (str "Hello " p "!"))))

    清单 2-36.

    将函数分配给变量

    ```


    你还可以在现有表达式中“内联”定义一个匿名函数，即没有标识符的函数。我们在本章前面处理向量数据结构时已经见过一个例子（请参见下面的清单 2-38，回顾匿名函数的语法结构）。在清单
    2-36 中，我们定义了一个 `foo` 变量，并分配了一个“匿名”函数，该函数接受 `p` 作为参数，然后使用 `prn` 函数打印一条消息。我们通过使用
    `str` 函数获取 `p` 的值并将其插入到单个字符串值中来实现这一点。你可以像清单 2-37 所示那样调用此函数。


    ```

    (foo "you")

    ;; "Hello you!"

    清单 2-37.

    调用用户定义函数的示例

    ```


    ```

    (fn [arg1 arg2 arg3...] (fn-body...))

    清单 2-38.

    匿名函数定义的语法结构

    ```


    在之前的示例（清单 2-36）中，我们定义了 `foo` 函数，同时也演示了如何嵌套函数调用。因此，我们看到了 `str` 嵌套在 `prn` 内部，`prn`
    嵌套在 `fn` 内部，等等。我们可以看到 Clojure 是从右向左评估“形式”的。


    注意


    形式是传递给 Clojure 解析器（即读取器³）的内容。形式的例子可以是字符串、符号，甚至是函数（其内部包含形式）。在讨论 Clojure 代码时，你会经常听到人们提到形式，因此你应该熟悉这个术语。


    Clojure 解析器评估 `str` 函数，并将结果传递给 `prn` 函数，然后将其用作函数体。现在，定义一个变量并为其分配一个函数是一种非常常见的模式，以至于在
    Clojure 核心库中创建了一个宏，以稍微减少冗长性并使其更容易记住语法。


    因此，你可以使用 `defn` 来代替长格式的 `def`，如清单 2-39 所示（同样，为了可读性，我将其展开为多行，但这最多可以是一行或两行）。


    ```

    (defn foo [p]

    (prn

    (str "Hello " p "!")))

    清单 2-39.

    defn 宏的示例

    ```


    ### 临时变量


    可以通过 `let` 形式创建临时变量。`let` 的工作方式是使用绑定。绑定是一种花哨的说法，意思是“将值分配给符号”，并且该符号仅在 `let` 块执行期间存在，之后就会消失。请参见清单
    2-40。


    ```

    (let [xyz "Hi!"]

    (prn xyz))

    ;; nil

    (prn xyz)

    ;; CompilerException java.lang.RuntimeException:

    ;; Unable to resolve symbol: xyz in this context

    清单 2-40.

    let 绑定示例

    ```


    在清单 2-40 中，我们可以看到 `let` 绑定作为副作用打印了“Hi!”，但最终返回了 `nil`。然后，如果我们尝试从 `let` 绑定外部再次打印符号
    `xyz`，我们会看到它引发了一个异常。


    注意


    Clojure 还提供了一个称为瞬态⁴的特性，这是一种创建数据结构非持久化副本的方法。你可以修改这个临时结构，然后调用 `persistent!` 来返回一个持久化/不可变的版本。当在临时结构性能更优的合适场景中使用时，这可以带来一些良好的性能提升。


    我们稍后会在讨论解构时再回到 `let` 块，解构是一种从复杂对象中提取值的非常强大的特性。


    注意


    通过 `let` 创建的局部变量并非真正的变量，因为它们的值一旦设置就无法更改。


    ### 动态变量


    创建变量时，它们会被绑定到当前命名空间，并被标记为“静态”。但变量可以（在临时时间段内）被动态更改。类似于 `let` 允许你定义局部变量，`binding`
    宏允许当前线程在其块内执行期间操作变量的值，如清单 2-41 所示。


    ```

    (def ^:dynamic my-name "Mark")

    (prn my-name) ;; "Mark"

    (binding [my-name "Bob"]

    (prn my-name)) ;; "Bob"

    (prn my-name) ;; "Mark"

    清单 2-41.

    动态变量绑定示例

    ```


    从前面的示例可以看出，我们定义变量 `my-name` 的方式与之前定义变量的方式相同；唯一的区别是我们现在添加了元数据 `^:dynamic`。现在，当使用
    `binding` 形式时，我们可以临时动态更改变量的值。你可以看到一旦块执行完毕，它就会恢复原状。


    这对于测试目的特别有用。请记住：函数也可以分配给变量，因此在测试环境中，你可以动态地替换函数实现。此后，Clojure 还专门为此目的实现了另外两个函数：`with-redefs`
    ⁵ 和 `with-redefs-fn`⁶。


    你也可以使用此功能来提供一种称为面向方面编程⁷的编程风格。例如，你可以操作一个日志函数，使其在标准日志信息周围添加上下文特定的细节。


    ## 总结


    好了，我们已经涵盖了不少内容。请务必在 REPL 中尝试给出的示例，并看看当你调整示例时会发生什么（这是确认你理解这些概念以及我们迄今为止讨论的行为的最佳方式）。


    在下一章中，我们将开始探讨函数式编程相关的概念，以及它们如何在 Clojure 语言中体现。这将包括诸如不可变性、引用透明性、一等函数、部分应用、递归迭代和可组合性等主题。


    脚注 1


    [`https://clojure.org/reference/data_structures`](https://clojure.org/reference/data_structures)


      2


    [`http://en.wikipedia.org/wiki/Linked_list`](http://en.wikipedia.org/wiki/Linked_list)


      3


    [`https://clojure.org/reference/reader`](https://clojure.org/reference/reader)


      4


    [`https://clojure.org/reference/transients`](https://clojure.org/reference/transients)


      5


    [`http://clojure.github.io/clojure/clojure.core-api.html#clojure.core/with-redefs`](http://clojure.github.io/clojure/clojure.core-api.html#clojure.core/with-redefs)


      6


    [`http://clojure.github.io/clojure/clojure.core-api.html#clojure.core/with-redefs-fn`](http://clojure.github.io/clojure/clojure.core-api.html#clojure.core/with-redefs-fn)


      7


    [`https://en.wikipedia.org/wiki/Aspect-oriented_programming`](https://en.wikipedia.org/wiki/Aspect-oriented_programming)

