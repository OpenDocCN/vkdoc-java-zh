  trans: "\n### 绕道结束……\n\n好了，回到关于驻留（interning）以及我们之前列出的项目列表（即 `:use`、`:require` 等）的讨论。我将使用一个新的应用程序。之前，我们实际上使用\
    \ `lein new compojure-app <name>` 创建了一个简单的 Web 服务器应用程序。现在，我们将使用 `lein new app\
    \ <name>`。\n\n注意\n\n区别在于，后者是一个“标准”应用程序，而不是 Web 服务器。我们将在未来更详细地介绍 Leiningen 工具的章节中讨论不同类型的应用程序。\n\
    \n与之前的应用程序类似，如果你查看 `project.clj` 文件，你会发现一个与我们之前看到的类似的结构。这里的区别在于，我们找到的不是 `:handler`\
    \ 键，而是 `:main` 键。但它做的是同样的事情——它告诉 Leiningen 主代码文件的位置。\n\n在这个例子中，我们会看到主文件被设置为 `foo.core`，但我还将创建一些新文件：`foo/bar.clj`\
    \ 和 `foo/baz.clj`，它们将分别代表命名空间 `foo.bar` 和 `foo.baz`。在讲解示例的过程中，我会逐一演示这些文件。\n\n\
    注意\n\n在 `project.clj` 中使用 `core` 作为文件名（和命名空间）只是一种约定。你完全可以将 `core` 文件重命名为其他名称，并手动更新\
    \ `project.clj` 以反映新的文件/命名空间。\n\n以下示例（参见清单 9-8、9-9 和 9-10）中使用的语法是 Clojure 代码文件特有的。如果你想在\
    \ REPL 中测试这些特性，可以将它们作为直接函数调用。例如，如果我们定义了类似 `(:use name.space)` 的内容，你可以在 REPL 中将其改为\
    \ `(use 'name.space)`。\n\n注意\n\n当直接使用这些函数时（而不是在 `ns` 宏中使用它们），你需要对任何符号/向量进行引用。\n\
    \n现在，让我们假设我们的每个命名空间（`foo.core`、`foo.bar` 和 `foo.baz`）都包含了清单 9-8、9-9 和 9-10 中的代码（如果你想在\
    \ REPL 中跟着操作，我建议你编辑你的测试 `foo` 应用程序来模仿以下示例）。\n\n### foo.core\n\n```\n(ns foo.core\n\
    (:use foo.bar)\n(:use foo.baz)\n(:gen-class))\n(def x 1)\n(defn -main [& args]\n\
    (println \"Hello, World!\"))\n清单 9-8.\nfoo.core 命名空间代码\n```\n\n### foo.bar\n\n\
    ```\n(ns foo.bar)\n(def a 1)\n(def b 2)\n(defn beep [] \"bop\")\n(defn- bing []\
    \ \"bong\")\n清单 9-9.\nfoo.bar 命名空间代码\n```\n\n注意\n\n你可能已经注意到在 `foo.bar` 中，函数 `bing`\
    \ 是使用 `defn-` 定义的。末尾的额外连字符很重要，因为这意味着当从该命名空间生成 Java 类时，它会将该函数视为私有函数，因此它在其他命名空间中不可用。\n\
    \n### foo.baz\n\n```\n(ns foo.baz)\n(def c 3)\n(def d 4)\n(def e 5)\n清单 9-10.\n\
    foo.baz 命名空间代码\n```\n\n让我们从新的 `foo` 目录中启动 REPL（`lein repl`），我们应该会注意到我们进入了与 `project.clj`\
    \ 中 `:main` 属性指定的相同命名空间（你应该会在终端中看到 `foo.core=>` 这一行）。\n\n从主命名空间 `foo.core` 中，你应该能够在\
    \ REPL 中输入符号 `a`、`b`、`c`、`d` 和 `e`，并看到分配给它们的相应值。同样，你应该能够执行函数 `(beep)` 并看到相应的返回值。\n\
    \n但是，你将无法执行 `(bing)` 函数，因为它是用 `defn-` 定义的，所以应该是私有的，只能通过 `foo.bar` 命名空间访问。清单 9-11\
    \ 演示了如何访问它。\n\n```\n(in-ns 'foo.bar)\n(bing) ;; \"bong\"\n清单 9-11.\n通过进入其命名空间访问私有函数\n\
    ```\n\n现在我们对命名空间如何与我们的 foo 应用程序协同工作有了更好的理解，让我们回过头来看看 `:require`、`:as`、`:refer`、`:all`\
    \ 和 `:use` 特性，看看它们是如何工作的。\n\n### :require\n\n在 `ns` 宏中包含 `:require` 意味着它将把所有公共变量导入到当前命名空间中，然后可用的选项（`:as`\
    \ 和 `:refer`）有助于确定如何访问导入的数据（我们将在接下来的几节中看到）。`:require` 的语法结构如清单 9-12 所示。\n\n```\n\
    (ns \n(:require \n[ :refer [ ]]\n[ :as ]\n[ :as  :refer []])\n(:gen-class))\n\
    清单 9-12.\n:require 宏的语法结构\n```\n\n### :as\n\n`:as` 库规范允许你重命名命名空间本身。\n\n我们已经见过\
    \ `:require` 的简写形式，但如果你愿意，也可以使用长格式（参见清单 9-13）。\n\n```\n(ns foo.core\n(:require\
    \ [clojure.string :as str])\n(:require [foo.bar :as fbr])\n(:require [foo.baz\
    \ :as fbz])\n(:gen-class))\n清单 9-13.\n:require 的长格式版本\n```\n\n然而，实际上你更可能使用简写形式（参见清单\
    \ 9-14）。这意味着你可以使用更短的符号来引用 `foo.bar` 和 `foo.baz` 命名空间内的所有公共变量。例如，不用写 `foo.bar/b`（来访问公共变量\
    \ `b`），你可以输入 `fbr/` `b`。\n\n```\n(ns foo.core\n(:require [clojure.string :as str]\n\
    [foo.bar :as fbr]\n[foo.baz :as fbz])\n(:gen-class))\n清单 9-14.\n:require 的简写形式版本\n\
    ```\n\n注意\n\n当使用 `require` 的函数版本时（即在 `ns` 宏之外），向量前的引号意味着你不必引用向量内的每个符号。例如，使用 `(require\
    \ '[name.space :as nmsp])` 而不是 `(require ['name.space : as 'nmsp])`。\n\n### :refer\n\
    \n`:refer` 库规范允许你只将需要的公共变量导入到当前作用域。所有其他公共变量仍然可用，但你必须提供完全限定的命名空间才能访问它们。参见清单 9-15。\n\
    \n```\n(ns foo.core\n(:require clojure.string\n[foo.bar :refer [a beep]]\n[foo.baz\
    \ :as fbz :refer [c]])\n(:gen-class))\n清单 9-15.\n:refer 库规范示例\n```\n\n在清单 9-15\
    \ 中，我们可以看到我们按原样加载了 `clojure.string` 命名空间；我们没有以任何方式缩短它。所以，如果我们想使用该命名空间中的 `upper-case`\
    \ 函数，我们将执行 `(clojure.script/upper-case \"make me upper case!\")`，随后它将返回 `\"MAKE\
    \ ME UPPER CASE!\"`。\n\n在第二个语句 `[foo.bar :refer [a beep]]` 中，我们说的是“让 `a` 和 `beep`\
    \ 在当前作用域中可用，而该命名空间中所有其他公共变量，我们必须通过完整的命名空间来访问。”所以，输入 `a` 将返回 `2`；输入 `(beep)` 将返回\
    \ `\"bop\"`，而要访问 `b`，我们不能直接输入它，而必须输入 `foo.bar/b`，这将返回 `1`。\n\n在第三个语句 `[foo.baz\
    \ :as fbz :refer [c]]` 中，我们说的是与之前类似的事情，但现在我们还声明，当我们必须使用完整的命名空间来引用一个公共变量时，我们只需使用缩短后的\
    \ `fbz` 作为命名空间，而不是更长的 `foo.baz`。所以，如果你输入 `c`，你将得到 `3`，如果你想访问 `d` 或 `e`，那么你需要输入\
    \ `fbz/d` 和 `fbz/e`。\n\n注意\n\n对于第三种语句形式，你仍然可以使用长格式的命名空间。所以，`fbz/c` 和 `foo.baz/c`\
    \ 都有效。\n"
- fmt: '### `:all`


    ` :all` 这个库规范与 `:refer` 配合使用。因此，当使用 `:refer` 时，你需要提供一个符号集合，这些符号代表你想要导入到当前命名空间的公共变量，而你可以选择使用
    `:all` 作为选项来代替这个集合。


    ```

    (ns foo.core

    (:require clojure.string

    [foo.bar :refer :all])

    (:gen-class))

    Listing 9-16.

    Example of :all Libspect

    ```


    在清单 [9-16](#A453572_1_En_9_Chapter.html#Par82) 中，我们可以在当前命名空间中直接引用 `a`、`b` 和 `beep`，而无需提供完全限定的命名空间。例如，我们不必指定
    `foo.bar/a`，只需使用 `a` 即可。


    **注意**


    你会在下一节中注意到，`:all` 实际上是 `:use` 的默认用法，因此它已被弃用。


    ### `:use`


    在 `ns` 宏中包含 `:use` 意味着它会将任何公共变量导入到当前命名空间，并覆盖任何与被导入变量同名的现有定义。请记住，函数也是通过 `defn`
    宏赋值给变量的，因此公共函数也会在当前命名空间中被提供/覆盖。


    如果你将 `foo.baz` 中的变量 `c` 更改为另一个命名空间中已定义的变量（例如 `foo.bar` 中的 `var a`），你会注意到使用 `:use`
    时会出现问题。


    尝试将 `(def c 3)` 改为 `(def a 3)`，然后从项目根目录运行 `lein repl`。你应该会在 REPL 输出的前几行看到异常信息（参见清单
    [9-17](#A453572_1_En_9_Chapter.html#Par88)）。


    ```

    a already refers to #''foo.bar/a in namespace foo.core.

    Listing 9-17.

    Exception Raised When Mixing Variables with :use

    ```


    发生此异常是因为 `foo.baz` 试图重新定义变量 `a`，而该变量已由 `foo.bar` 定义。这就是使用标准 `use` 而不使用其库规范选项（如
    `:exclude`、`:only` 或 `:rename`）时会出现的问题。


    **注意**


    当从 REPL 调用 `use` 时（例如 `(use ''foo.baz)`），它会重新定义任何定义而不发出警告。


    要修复此异常（并随后让所有代码正常加载和运行），我们需要决定如何处理导入 `foo.baz` 命名空间的问题。


    我们可以排除 `a` 和 `d` 变量，或者使用 `:only` 单独引入 `e` 变量（在这个例子中，这样做更合理，因为输入更少）；我们甚至可以使用 `:rename`
    重命名 `c` 和 `d`。选择权在你手中。


    但假设我们决定引入 `a` 变量。这意味着我们需要同时使用 `:only` 和 `:rename`。我们可以在清单 [9-18](#A453572_1_En_9_Chapter.html#Par94)
    中看到一个示例，我们从 `foo.baz` 中引入 `a` 变量并将其重命名为 `new-a`。使用这种格式，我们可以引入所有需要的依赖项，而无需担心任何冲突。


    ```

    (ns foo.core

    (:use foo.bar)

    (:use [foo.baz :only [d] :rename {a new-a}])

    (:gen-class))

    Listing 9-18.

    Use :only to Pull Specific Variables

    ```


    ### 其他内容？


    虽然我并非追求全面，但可能还有几件事值得一提。首先，你可以使用另一个宏来代替 `ns` 宏（我们之前实际上见过它，但我故意没有说明）。它叫做 `in-ns`。它们之间唯一的真正区别是
    `in-ns` 不提供对任何库规范的访问（即 `:use`、`:require`、`:as`、`:refer` 或 `:all`）。


    第二件值得一提的事情是使用库规范 `:verbose`、`:reload` 和 `:reload-all`。这些仅适用于 `require` 函数及其 `ns`
    变体 `(:require ...)`。例如，如果我们添加 `:verbose`，那么 Clojure 会打印出任何关于 `load` 函数调用的信息。这可以通过显示正在进行的底层调用来帮助阐明
    `:require` 调用在内部做了什么。


    `:reload` 库规范确保即使一个库已被加载（例如，被另一个命名空间加载），如果它有任何更改，也应该重新加载。我自己没有理由使用这种行为，除了在 REPL
    中玩耍并反复加载依赖项时。`:reload-all` 库规范的工作方式相同，但它会递归地检查所有已加载库的所有依赖项。


    最后一项是 `import` 命令，它对于导入 Java 类和接口非常有用。清单 [9-19](#A453572_1_En_9_Chapter.html#Par99)
    演示了其用法的一个基本示例。


    ```

    (import java.util.Date)

    (def now (Date.))

    (str now) ;; "Thu Jun 29 09:24:04 BST 2017"

    Listing 9-19.

    Example of Importing a Java Class

    ```


    ## 总结


    在本章中，我们学习了各种命名空间符号和宏，如何在 REPL 中动态创建新的命名空间，以及如何在现有命名空间之间移动并在这些空间中执行代码。可能最重要的是，我们理解了如何在命名空间之间实习变量，以及如何通过可用的各种库规范选项来避免冲突。


    在下一章中，我们将研究如何利用一个称为宏的特性来操作 Clojure 语言本身。这是一个强大的特性，我们必须小心使用，以免给我们的代码库增加复杂性和混乱。'
  raw: '### :all


    The `:all` libspec works in conjunction with `:refer`. So, whereas with `:refer`
    you would provide a collection of symbols that represent the public variables
    you want to import into the current namespace, you can instead provide `:all`
    as an option in place of the collection.


    ```

    (ns foo.core

    (:require clojure.string

    [foo.bar :refer :all])

    (:gen-class))

    Listing 9-16.

    Example of :all Libspect

    ```


    In Listing [9-16](#A453572_1_En_9_Chapter.html#Par82), we would be able to reference
    `a`, `b`, and `beep` in the current namespace without having to provide a fully
    qualified namespace. For example, we wouldn’t have to specify `foo.bar/a`; we
    could just use `a`).


    Note


    You’ll notice in the next section that `:all` is effectively the default usage
    of `:use`, hence its deprecation.


    ### :use


    The inclusion of `:use` within the `ns` macro means that it will import any public
    variables into the current namespace and overwrite any existing definitions with
    the same name as those being imported. Remember that functions are also assigned
    to variables underneath the `defn` macro, so public functions are also made available/overridden
    within the current namespace.


    You’ll notice an issue with using `:use` if you change the variable `c` in `foo.baz`
    to be a variable that’s already defined in another namespace (like `var a` from
    `foo.bar`).


    Try changing `(def c 3)` to `(def a 3)` and then running `lein repl` from the
    root of the project. You should see the first few lines of in the REPL output
    as showing an exception (see Listing [9-17](#A453572_1_En_9_Chapter.html#Par88)).


    ```

    a already refers to #''foo.bar/a in namespace foo.core.

    Listing 9-17.

    Exception Raised When Mixing Variables with :use

    ```


    The exception occurs because `foo.baz` is trying to redefine the variable a, which
    was defined already by `foo.bar`. This is the issue with using the standard `use`
    without one of its libspec options, such as `:exclude`, `:only`, or `:rename`.


    Note


    When calling `use` from the REPL (e.g., `(use ''foo.baz)`) it’ll redefine any
    definitions without warning.


    To fix the exception (and subsequently allow all our code to load and function
    properly) we need to make a decision about what we want to do with regards to
    importing the `foo.baz` namespace.


    We could exclude the `a` and `d` variables, or we could use `:only` to pull in
    the `e` variable by itself (which in this example makes more sense, as it’s less
    typing); or we could even rename `c` and `d` using `:rename`. The choice is up
    to you.


    But let’s say we decide to pull in the `a` variable. This means we’ll need `:only`
    and `:rename`. We can see an example of this in Listing [9-18](#A453572_1_En_9_Chapter.html#Par94)
    where we pull in the `a` variable from `foo.baz` and rename it to `new-a`. Using
    this format, we can pull in all the dependencies we need without worrying about
    any conflicts .


    ```

    (ns foo.core

    (:use foo.bar)

    (:use [foo.baz :only [d] :rename {a new-a}])

    (:gen-class))

    Listing 9-18.

    Use :only to Pull Specific Variables

    ```


    ### Anything Else?


    Although I’m not aiming for completeness, it’s probably worth mentioning a couple
    more things. The first is that you have another macro you can use in place of
    the `ns` macro (we actually saw it earlier, but I purposely didn’t clarify). It’s
    called `in-ns`. The only real difference between them is that `in-ns` doesn’t
    provide access to any libspecs (i.e., `:use`, `:require`, `:as`, `:refer`, or
    `:all`).


    The second thing worth mentioning is the use of the libspecs `:` `verbose` , `:reload`,
    and `:reload-all`. These only apply to the `require` function and its `ns` variation
    `(:require ...)`. For example, if were to add `:verbose`, then Clojure would print
    out any information regarding calls to the `load` function. This can help to clarify
    what the `:require` calls are doing internally by displaying the underlying calls
    being made.


    The `:` `reload` libspec ensures that even if a library has been loaded (e.g.,
    loaded by another namespace), it should be loaded again in case of any changes.
    I’ve not had a reason to use this behavior myself, with the exception of when
    I’m playing around in the REPL and constantly loading dependencies over and over.
    The `:reload-` `all` libspec works the same way, but it recursively checks all
    dependencies for all loaded libraries.


    One last item would be the `import` command, which is useful for importing Java
    classes and interfaces. Listing [9-19](#A453572_1_En_9_Chapter.html#Par99) demonstrates
    a basic example of its usage.


    ```

    (import java.util.Date)

    (def now (Date.))

    (str now) ;; "Thu Jun 29 09:24:04 BST 2017"

    Listing 9-19.

    Example of Importing a Java Class

    ```


    ## Summary


    In this chapter, we’ve learned about the various namespace symbols and macros,
    how to create new namespaces dynamically within the REPL, as well as how to move
    between existing namespaces and execute code within those spaces. Probably most
    important, we’ve understood how to intern variables across namespaces and how
    to avoid conflicts via the various libspec options available to us.


    In the next chapter, we’re going to look at how to manipulate the Clojure language
    itself by utilizing a feature known as macros. This is a powerful feature and
    one that we must take care with, lest we add complexity and confusion to our codebases.'
