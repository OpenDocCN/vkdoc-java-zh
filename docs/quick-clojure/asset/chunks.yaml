  trans: '

    ## 序列抽象


    Clojure 提倡面向抽象编程的理念。为了满足所谓序列抽象的要求，Clojure 必须包装其自身的一些数据结构，以提供统一且一致的接口。它也能对你的代码做到这一点（我们稍后会看到一个例子）。


    这样做的好处是，某些函数能够处理例如映射（map）这样的数据结构，却将其视为一种更简单的集合类型（如向量、列表或集合）。不过，实现这个隐藏接口有一个副作用：有时当你将一个向量传入内置函数时，根据函数的不同，你可能会得到一个列表数据结构作为输出。


    但同样，得益于序列抽象，Clojure 能够将其函数应用于多种不同的数据结构类型，其工作方式很像其他面向对象语言中传统的“接口”，其好处在于允许不同的对象依赖于抽象而非具体实现。


    这在实践中意味着，向量、列表、集合和映射都共享这个被称为序列抽象的隐藏接口。因此，尽管并非所有这些数据结构都以列表的方式实现，但它们都能利用 Clojure
    的集合/序列函数，就好像它们具有相同的底层实现一样。


    要理解这个接口的工作原理，我们需要认识到每种数据类型都以提供以下三个函数的方式被构建（或包装）：


    *   `first`：返回集合中的第一个元素

    *   `rest`：返回除第一个元素外的所有元素

    *   `cons`：将元素前置到集合中


    Clojure 提供了一个序列库，其中包含许多函数，可用于处理支持序列抽象接口的数据结构。Clojure 序列库中的所有函数都可以借助这三个函数来实现。这就引出了
    `seq` 函数，它帮助集合暴露其元素，从而扩展了序列抽象接口的使用。因此，许多序列库函数（例如 `map`）会在内部对提供的集合调用 `seq`。


    注意


    有关函数的完整列表，请参阅 Clojure 的 Seq 库。¹


    以 `map` 为例，它会确保像 `{:a 1 :b 2}` 这样的映射数据结构被转换为列表中的向量。例如，`(seq {:a 1 :b 2})` 返回 `([:b
    2] [:a 1])`。


    注意


    检查创建数据结构时返回的类型可能会很有趣。例如，`(type (seq [:a :b :c]))` 返回 `clojure.lang.PersistentVector$ChunkedSeq`，而
    `(type (seq ''(:a :b :c)))` 返回 `clojure.lang.PersistentList`。因为列表是作为链表实现的，所以可以分段迭代，而向量则不是这样，它是作为哈希表实现的，因此实际上它利用的是“分块序列”。


    一旦 `map` 数据结构对集合调用了 `seq`，该集合就处于一种允许利用序列抽象接口函数来按预期执行数据映射的结构中。


    如果你将一个向量传入 `map` 函数，那么 `seq` 会再次确保该数据结构被转换为列表，以便它能利用序列抽象接口。例如，`(seq ["a" "b" "c"])`
    返回 `("a" "b" "c")`。


    ## 惰性序列


    既然我们已经了解了 `seq` 和序列抽象，那么究竟什么是“惰性序列”呢？嗯，这是一种其集合被分块计算的序列，理解它的最佳方式是通过示例。


    假设我们创建一个包含 65 个数字元素的集合。我们将这个集合传入 `map` 函数，以便打印并修改集合中的每个元素。相关代码可能类似于清单 4-7 所示。


    ```

    (def v (vec (range 1 65)))

    (def m (map #(do (prn %1) (str %1 "!")) v))

    (first m)

    Listing 4-7.

    惰性序列分块计算其值

    ```


    如果你在 REPL 中运行清单 4-7，你应该会看到输出是数字 1 到 32 分别打印在单独的行上，然后是返回值 `"1!"`。这表明在访问分配给 `m`
    的数据（即 `(first m)`）时，并没有计算全部 65 个元素。但这是为什么呢？


    为了帮助理解为什么没有计算完整的 65 个元素的集合，我们首先需要知道 `map` 返回的类型是 `LazySeq`。好的，但为什么在处理这个 `LazySeq`
    时只打印了前 32 个元素呢？嗯，这是因为惰性序列是以 32 个为一组被实现的，而具体选择 32 这个数字与实现该集合的底层字典树（trie）数据结构的效率有关。


    如果我们直接在 REPL 中输入 `m`，这将强制整个序列被完全实现（即计算），因此我们会看到集合中剩余的元素被打印出来并随后被修改。惰性序列对我们来说是一种性能上的提升。


    现在，让我们在 REPL 中执行清单 4-8 中的代码，我们将再次确认惰性序列的分块特性。


    ```

    (def v (vec (range 1 65)))

    (def m (map #(do (prn %1) (str %1 "!")) v))

    (first m) ;; 打印 1-32，接着打印 "1!"

    (nth m 10) ;; 打印 "11!"

    Listing 4-8.

    惰性序列的分块输出

    ```


    注意，在清单 4-8 中，当你尝试提取集合中的第十个元素（使用 `nth` 函数）时，它不会像执行 `(first m)` 时那样再次打印值 1 到 32。这是因为集合中的前
    32 个元素已经通过执行 `(first m)` 计算过了。


    那么，如果我们现在执行 `(nth m 33)`，即一个刚好超出已计算的第一个 32 元素块的索引，会发生什么呢？嗯，我们会看到下一个 32 元素块被计算，这意味着值
    33 到 64 会被打印到屏幕上，然后是返回值 `"34!"`（即分配给索引 33 的值）。


    正如我们之前所见，如果我请求一个现在已经计算过的索引，例如 `(nth m 50)`，我们将不会看到来自该特定 32 元素分组的任何值被再次打印。我们只会看到缓存的返回值被打印出来。


    但是，不要以为你现在就可以创建一个大得离谱的集合，比如执行 `(range 1 999999999)`，因为该集合本身在创建时就会被实现（即放入内存）。在
    REPL 中执行那个 `range` 会导致你盯着一个空白屏幕，等待它计算每个值。


    有一种方法可以避免这种情况，那就是将计算赋值给一个变量，这样直到该变量被引用时才会计算该项。例如，以下代码片段在 REPL 环境中执行时会立即返回控制权：`(def
    r (range 1 999999999))`。


    注意


    一个大的范围是 `LongRange` 类型，而一个无限范围（你可以通过 `(range)` 创建）是 `Iterate` 类型，它是一个产生值的迭代器（类似于其他编程语言（如
    Python）中的生成器）。

