    ## 总结


    本章对于函数式编程概念以及它们如何在 Clojure 编程语言中体现，都是非常重要的一章。


    在本章中，我们学习了函数式编程的六大主要原则：不可变性（持久化数据结构）、引用透明性（纯函数）、一等函数、偏函数应用、递归迭代和可组合性。


    在下一章中，我们将重点讨论序列的概念及其与集合的关系，以及一个被称为序列抽象的重要主题。


    脚注 1


    [`​en.​wikipedia.​org/​wiki/​Trie`](http://en.wikipedia.org/wiki/Trie)


      2


    [`​www.​haskell.​org/​`](https://www.haskell.org/)


      3


    [`​christophermaier​.​name/​blog/​2011/​07/​07/​writing-elegant-clojure-code-using-higher-order-functions`](http://christophermaier.name/blog/2011/07/07/writing-elegant-clojure-code-using-higher-order-functions)


