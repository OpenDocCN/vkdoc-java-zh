  trans: '

    ## 总结


    通过本章的学习，我们已充分掌握了使用 Leiningen 的基础知识，以及如何利用特定模板（例如 `compojure-app`）构建项目，并了解了各种内置模板之间的差异。


    我并未深入探讨 Web 应用程序的构建，因为每个项目的需求都过于庞大且独特。如果你对使用 Clojure 进行 Web 开发感兴趣，我强烈建议阅读《Web
    Development with Clojure》³⁴。这本书很好地介绍了大量可组合使用的 Clojure 库和插件，用以构建健壮的 Web 应用程序。


    在下一章中，我们将探讨如何构建一个命令行界面应用程序。内容将涵盖此类应用程序的基本设置以及可用的各种开发工具。这将有助于你拓宽对 Clojure 的认知，不再局限于
    Web 编程语言，并为利用操作系统优势的有用业务工具开辟新的可能性。


