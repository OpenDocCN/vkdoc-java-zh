    composability. We’ve seen this via the use of `comp` and `partial`, as well as
    other enumerable functions such as `reduce`, `map`, and `filter`, and there are
    so many more useful composable functions, all within the standard core library,
    just waiting to be explored.'
  trans: '

    ## 递归迭代


    默认支持可变状态的编程语言（例如 JavaScript、Ruby 等）依赖其创建副作用（并能改变状态）的能力来执行循环结构。


    你可能熟悉的经典 `for` 循环，`for (i = 0; i < 10; i++) {}`，其设计允许通过改变局部变量来递增循环。在 Clojure 中，局部变量是不可变的，因此要实现循环，我们需要改用递归函数调用。


    通常，你需要使用 `loop`/`recur` 特殊形式（我们稍后会演示）来代替循环，尽管很多时候其他迭代器风格的函数，如 `map`、`reduce` 和
    `filter`，更适合解决手头的问题。


    `loop`/`recur` 特殊形式的主要好处是，它允许你安全地应用递归函数调用，而不会耗尽内存栈。例如，如果你曾经写过任何 JavaScript 代码，你很可能至少遇到过一个问题，即栈被耗尽并导致“堆栈溢出”错误。


    我不会深入探讨内存栈问题空间，因此我建议你阅读我之前写过的一篇关于该主题的博客文章。⁴ 在那篇文章中，我解释了递归的含义以及尾调用优化的工作原理。这有助于阐明为什么像
    Clojure 这样的语言需要 `loop`/`recur` 这样的机制，以及 `trampoline` 函数的用途，我接下来将演示这两者。


    首先，让我们了解 `loop`/`recur` 形式是如何工作的。通过使用这种形式，我们能够递归地执行一些代码。我们首先定义“循环”从哪里开始（使用 `loop`
    函数），然后在代码的后面，我们需要定义递归应该在哪里发生（使用 `recur` 函数）。如果 `recur` 没有找到 `loop`，它会搜索下一个函数，以便从那里重新开始。清单
    3-22 中的示例给出了其用法的简单演示。


    ```

    (loop [i 10]

    (if (= i 0)

    (prn "finished")

    (recur (do (prn i) (dec i)))))

    清单 3-22.

    简单 loop/recur 示例

    ```


    清单 3-22 的输出应该是数字 10 到 1 按降序打印到屏幕上，并以语句“finished”结束。


    让我们分解清单 3-22 来理解发生了什么。首先，我们创建 `loop` 并将值 `10` 绑定到符号 `i`。这是我们的起点。在循环内部，我们有一个 `if`
    语句，它使用 `=` 函数来检查 `i` 是否等于零。如果是，那么我们知道完成了，于是将消息 `"finished"` 打印到 `stdout`（即终端屏幕）。如果值不为零，那么我们调用
    `recur` 并将 `(dec i)` 的结果传递给它，这会将 `i` 的当前值减一。


    这个示例演示了递归函数调用的本质。我们不是在改变局部变量；而是反复调用函数（在本例中是 `loop`），但每次连续执行时都传入一个更新后的值/参数。


    注意


    你会看到我们还使用了 `do` 函数（`do` 允许我们执行多个代码块）。使用它的原因是为了强制产生显示 `i` 当前值的副作用。在实际应用中，你可能直接省略它，像这样：`(recur
    (dec i))`。


    使用 Clojure 的 `recur` 实现，你永远不会耗尽栈，因此你可以将值从 `10` 改为 `100000`，而完全不会有任何问题。一个较少使用但与
    `recur` 和尾调用优化问题密切相关的函数是 `trampoline`。清单 3-23 中的示例演示了不使用 `recur`（或 `trampoline`）如何导致应用程序崩溃。


    ```

    (defn count-down [x]

    (if (= x 0)

    (prn "finished")

    (count-down (do (prn x) (dec x)))))

    (count-down 10)     ;; 与之前的示例完全相同，但不安全！

    (count-down 100000) ;; 会导致 "StackOverflowError"

    清单 3-23.

    栈耗尽示例

    ```


    因此，在前面的示例（清单 3-23）中，我们的函数 `count-down` 调用自身（很像 `recur` 跳回到开头的 `loop`）。每次该函数调用自身时，它都会为
    `x` 传入一个更新后的值。但与防止 JVM 不提供尾调用优化的 `recur` 不同，如果给定一个像 `100,000` 这样的大值，这个实现注定会失败。


    如果我们不想使用 `recur`，我们仍然可以通过利用 `trampoline` 来解决这个问题。我已经在一篇博客文章中讨论过 trampolining 的内部工作原理，⁵
    但简而言之，它不是自动反复调用函数，而是返回值本身就是一个函数，`trampoline` 为你扁平化这些调用，这样你就不会填满内存栈。


    解决我们代码中的问题需要两步过程。首先，修改 `else` 语句，使其返回一个函数，而不是返回对 `count-down` 的函数调用。我们在清单 3-24
    的修改版本中通过在调用 `count-down` 之前添加 `#` 来实现这一点。记住：`#(...)` 是匿名函数的简写语法。


    第二步是不要直接调用 `count-down` 函数，而是将其传递给 `trampoline`。清单 3-24 中的代码片段演示了所需的修改。


    ```

    (defn count-down [x]

    (if (= x 0)

    (prn "finished")

    #(count-down (do (prn x) (dec x)))))

    (trampoline count-down 10)     ; 仍然正常工作

    (trampoline count-down 100000) ; 不再触发错误

    清单 3-24.

    trampoline 函数示例

    ```


    ## 可组合性


    可组合性背后的基本概念是促进数据通过许多不同的“过滤器”传递，这些过滤器处理数据，使其准备好到达最终目的地。这与 Unix 哲学的工作方式类似；Unix 利用管道（`|`）将一个函数的结果传递给另一个函数。例如，shell
    命令 `ps aux | grep java` 获取 `ps aux` 的结果（返回多行输出），并将其传递给 `grep java`，后者将其过滤为仅包含单词
    java 的行。


    能够创建这样一个由不同隔离功能单元构建的管道，在函数式语言中非常重要（我们之前在 `comp` 函数中看到过这一点）。


    这成为函数式编程如此关键方面的主要原因是，你的功能单元应该足够通用，以便在许多不同的上下文中重用，而不是过于特定于一个环境，最终无法重用。


    我不会在本节中演示可组合代码，因为我认为到目前为止，我们已经看到了许多 Clojure 如何实现可组合性的示例。我们已经通过使用 `comp` 和 `partial`，以及其他可枚举函数如
    `reduce`、`map` 和 `filter` 看到了这一点，并且标准核心库中还有更多有用的可组合函数等待探索。

    '
- fmt: '# Summary


    This has been an important chapter with regards to both functional programming
    concepts as well as how they are reflected in the Clojure programming language.


    Within this chapter we learned about the six main tenets of functional programming:
    immutability (persistent data structures), referential transparency (pure functions),
    first-class functions, partial application, recursive iteration, and composability.


    In the next chapter, we will focus on the concept of sequences and how they are
    related to collections, as well as on an important topic known as the sequence
    abstraction.


    Footnotes [1](#A453572_1_En_3_Chapter.html#Fn1_source)


    [http://​en.​wikipedia.​org/​wiki/​Trie](http://en.wikipedia.org/wiki/Trie)


    [2](#A453572_1_En_3_Chapter.html#Fn2_source)


    [https://​www.​haskell.​org/](https://www.haskell.org/)


    [3](#A453572_1_En_3_Chapter.html#Fn3_source)


    [http://​christophermaier​.​name/​blog/​2011/​07/​07/​writing-elegant-clojure-code-using-higher-order-functions](http://christophermaier.name/blog/2011/07/07/writing-elegant-clojure-code-using-higher-order-functions)


    [4](#A453572_1_En_3_Chapter.html#Fn4_source)


    [http://​www.​integralist.​co.​uk/​posts/​js-recursion.​html](http://www.integralist.co.uk/posts/js-recursion.html)


    [5](#A453572_1_En_3_Chapter.html#Fn5_source)


    [http://​www.​integralist.​co.​uk/​posts/​js-recursion.​html](http://www.integralist.co.uk/posts/js-recursion.html)


    # 4. Sequences


    In Clojure we have many types of collections: lists, vectors, maps, and sets.
    Each of these collections is also a sequence. Clojure provides an interface that
    is known as the sequence abstraction, and it is this abstraction that allows multiple
    types of built-in functions to work uniformly across these different collection
    types.


    Before we get into the sequence abstraction, let’s start with a task that is common
    when programming in Clojure, which is the need to loop over a collection in order
    to carry out some form of side effect. Consider the following example (Listing
    [4-1](#A453572_1_En_4_Chapter.html#Par3)), where we loop over a list collection.


    ```

    (doseq [element ''(:a :b :c)]

    (prn (str (name element) "!")))

    ;; "a!"

    ;; "b!"

    ;; "c!"

    ;; nil

    Listing 4-1.

    Example of Triggering Side-effect Only (No Modifications)

    ```


    In Listing [4-1](#A453572_1_En_4_Chapter.html#Par3), we can see that we’re looping
    over the collection `''(:a :b :c)` and that for each loop iteration the local
    variable (`element`) is updated to hold the current collection item. As part of
    the `doseq` “body” we convert the item (which is a keyword) into a string using
    the `name` function, and then we append `"!"` onto the end using `str`. Finally,
    we print the resulting value.


    So, in this example we’re not modifying the collection; we’re only creating side
    effects, the side effect being we’re printing a value to the screen. The actual
    result of executing `doseq` is a `nil` value.


    Now, we could use Clojure’s `for` function to loop over the sequence and achieve
    the same side effects but with a different end result. See Listing [4-2](#A453572_1_En_4_Chapter.html#Par7).


    ```

    (for [element ''(:a :b :c)]

    (prn (str (name element) "!")))

    ;; (nil nil nil)

    Listing 4-2.

    Example of for Loop

    ```


    In the preceding example, the code loops over the given collection with the intention
    of creating a new list based upon the result of each iteration. But because we’ve
    not returned anything from the body for each iteration, we end up with `(nil nil
    nil)` being returned.


    So, the real difference between `for` and `doseq` is that the latter is solely
    for side effects (and subsequently returns `nil`); whereas the `for` form is actually
    what is known as a list comprehension. So, let’s move on to the next section to
    better understand what that means.


    ## List Comprehension


    Using the previous example, you could be forgiven for thinking a `for` is a lot
    like the `map` function (which we saw in the previous chapter). The example in
    Listing [4-3](#A453572_1_En_4_Chapter.html#Par11) uses `map` and provides exactly
    the same side effect as well as returns the same overall result as the `for` version
    we’ve just been looking at.


    ```

    (map

    (fn [element]

    (prn (str (name element) "!")))

    ''(:a :b :c))

    Listing 4-3.

    Use of map to Mimic for Example

    ```


    Compared to the previous `for` example, it would seem that the `for` is easier
    to read than the `map` version, so the question becomes: Which is more appropriate
    to use, and when?


    Well, technically the `for` function is what’s known as a list comprehension,
    which is a way to create a list from existing lists and which should return a
    list or an iterator. The reason to choose the `for` form over a `map` (and vice
    versa) will depend on two things:


    1.  Are you creating a new sequence from an existing sequence, or are you looking
    to modify an existing collection?

    2.  Are you wanting to use multiple collections, or not?


    In the first scenario, `for` allows the use of “modifiers” to help create a sequence
    that is smaller than the sequence it’s looping over, whereas `map` will always
    return the same-sized sequence.


    In the second scenario, if you’re using multiple collections the `for` form will
    produce different results than those produced when `map` handles multiple collections
    (as demonstrated in Listing [4-4](#A453572_1_En_4_Chapter.html#Par18)).


    ```

    (for [x [1 2]

    y [7 8]]

    (do

    (prn x y)

    (+ x y)))

    Listing 4-4.

    Example of List Comprehension Using for Form

    ```


    If you run Listing [4-4](#A453572_1_En_4_Chapter.html#Par18) in your REPL, you
    should notice that we end up looping over the second collection `y` twice. We
    take the first element from the first collection `x` and then loop over collection
    `y`. After that has completed, we take the second element from the first collection
    `x` and start looping over the second collection `y` again.


    Now, contrast this with how `map` handles multiple collections (Listing [4-5](#A453572_1_En_4_Chapter.html#Par21)).


    ```

    (map #(do

    (prn %1 %2)

    (+ %1 %2))

    [1 2]

    [7 8])

    Listing 4-5.

    Difference of map with Multiple Collections

    ```


    After running Listing [4-5](#A453572_1_En_4_Chapter.html#Par21) in your REPL,
    you should notice that `map` actually loops only a single collection, but for
    each iteration it combines elements from the first and second collections (almost
    like a zip). So, on the first iteration it passed `1` and `7` to the anonymous
    function. On the second iteration, it passed `2` and `8`.


    OK, so what else is so special about list comprehensions? Well, they provide “modifiers,”
    which control when the body gets executed. There are three modifiers Clojure provides:
    `:let`, `:while`, and `:when`. We can see the last item (`:when`) being used in
    Listing [4-6](#A453572_1_En_4_Chapter.html#Par24).


    ```

    (for [x (range 5)

    :when (> (* x x) 3)]

    (* 2 x))

    ;; (4 6 8)

    Listing 4-6.

    Demonstration of :when Modifier

    ```


    In Listing [4-6](#A453572_1_En_4_Chapter.html#Par24), we use the `range` function
    to create a sequence of numbers `(0 1 2 3 4)` and assign the current element to
    `x` for each iteration. Within the binding block, we specify the modifier we want
    to use (in this case, `:when`) followed by the test it will verify against.


    In our test, we’re saying the body should only be executed if the current element
    (when multiplied by itself) is greater than 3. The body’s result is then placed
    in a new list that is returned. Hence, when using the `for` form, we’re really
    “building a sequence, from a sequence.”'
