- fmt: 'If you prefer, you can set the validator function inline with the creation
    of the atom by setting its `:validator` attribute (see Listing [8-8](#A453572_1_En_8_Chapter.html#Par67)
    for an example).


    ```

    (def counter (atom 0 :validator #(even? %)))

    Listing 8-8.

    Example of Inline Validation

    ```


    Sometimes you might want to reset the value of the atom without worrying about
    the current value. To do this, you would need to use the `reset!` function: `(reset!
    counter 0)`.


    You might also want to change an atom’s value only if its current value matches
    some pre-set condition. To do this, you would use the `compare-and-set!` function.


    The `compare-and-set!` function works by returning `true` if the current atom
    value matches what you’ve specified (and subsequently it will proceed to apply
    the requested change); otherwise, if the current value isn’t a match, then it’ll
    return `false` and not apply the change. See Listing [8-9](#A453572_1_En_8_Chapter.html#Par71)
    for an example of how this works.


    ```

    (def counter (atom 0))

    (swap! counter #(+ 4 %))

    @counter ;; 4

    (compare-and-set! counter 4 0) ;; true

    @counter ;; 0

    (compare-and-set! counter 4 1) ;; false

    @counter ;; 0

    Listing 8-9.

    Example of Validating Specific Conditions

    ```


    Notice in Listing [8-9](#A453572_1_En_8_Chapter.html#Par71) how the `counter`
    atom value stays set to zero after the second `compare-and-set!` function call.
    That is because we specified that the value be changed only if its current value
    were set to four, which it wasn’t (it was changed before that to zero).


    Finally, before moving on from atoms, we should also look at how to watch an atom
    for changes and to trigger some behavior once a specific condition is met. This
    is done using the `add-watch` function, which takes as parameters the name of
    the atom followed by an arbitrary name for the watcher and a function that will
    be executed when the atom is updated. See Listing [8-10](#A453572_1_En_8_Chapter.html#Par74).


    ```

    (def state (atom {}))

    (defn state-change [key atom old new]

    (prn (format "key: %s, atom: %s, old val: %s, new val %s" key atom old new)))

    (add-watch state :foo state-change)

    (swap! state assoc :bar "baz")

    Listing 8-10.

    Example of Watching an Atom for Changes

    ```


    In Listing [8-10](#A453572_1_En_8_Chapter.html#Par74), when we mutate the `state`
    map data structure (in this case, we associate into it via the `:bar` key, along
    with the associated value `"baz"`), we get a printout on the screen of what was
    changed. This happens because the change to the atom triggered the `add-watch`
    we created. The output of Listing [8-10](#A453572_1_En_8_Chapter.html#Par74) can
    be seen in Listing [8-11](#A453572_1_En_8_Chapter.html#Par76).


    ```

    "key: :foo, atom: clojure.lang.Atom@3e1b3567,

    old val: {}, new val: {:bar \"baz\"}"

    {:bar "baz"}

    Listing 8-11.

    Output from Previous Program Using add-watch

    ```


    Note


    To remove the watch, run `(remove-watch atom key)`, replacing `atom` and `key`
    with appropriate values.


    ## Lock


    The use of locks is the classic first step taken to solve concurrency problems
    within a multi-threaded world. When you have multiple threads, all trying to access
    the same memory space, then conflicts will arise. A lock is a common low-level
    mechanism for handling concurrency, but is hard to use correctly. This is why
    Clojure provides higher-level abstractions in order to achieve “thread safety.”


    The way it works is by applying a lock around the data you want to manipulate,
    which prevents other threads from being able to manipulate the data while it is
    “locked.” For example, if you have two threads running at the same time (A and
    B) and both want to modify the variable `foo`, then you’ll find you have a non-deterministic
    event on your hands (i.e., you don’t know if A or B will get to `foo` first).


    By using a lock in your code, if it turned out thread B got to `foo` first, then
    by virtue of it getting there first it’ll be able to apply a lock around `foo`,
    so when thread A tries to get access to `foo` it can’t, and it has to wait until
    thread B is finished. When thread B is finished, the lock is relinquished so thread
    A can acquire it and prevent any other thread from accessing `foo` while it holds
    the lock.


    Locks are not ideal, because they can be very complicated when trying to figure
    out the correct order in which to acquire a lock. The reason this is important
    is because locking mechanisms can cause what is commonly referred to as deadlock/livelock.
    This is more apparent within systems that utilize multiple locks (rather than
    simple examples that only use a single lock).


    ### Deadlock


    A deadlock is when two or more threads are trapped because they’re waiting on
    the other thread to complete (but the other thread is also waiting for the other
    locked threads to complete), meaning no progress is made and the system locks
    up.


    A common example given is of two people bowing to each other. The rules these
    two people have to follow are that you must remain bowed until the other person
    has the chance to return the bow. But if both participants bow at the same time,
    then they’ll be forever waiting for the other person.


    ### Livelock


    A livelock is similar in ways to a deadlock, but is slightly different in that
    two or more threads can’t progress, not because they’re blocked, but because they’re
    kept busy by each other.


    The example typically given is of two people in a corridor constantly moving to
    the same side to avoid each other; they’re not blocked, they’re just kept busy
    forever trying to allow the other person to pass.


    Note


    An atom is different from a lock in that it uses CAS (compare-and-swap) rather
    than a lock mechanism; this means that a lock won’t “retry” like an atom does.


    Listing [8-12](#A453572_1_En_8_Chapter.html#Par89) demonstrates how to control
    access to a shared variable by way of an atom. In the example, we want to control
    how items are added to a vector. We want the result to be `[1 2]`.


    Now, before we look at [Listing 8-12](#A453572_1_En_8_Chapter.html#Par89) we should
    clarify that atoms (as we’ve seen in the previous section) are already thread
    safe because they use a CAS mechanism to prevent multi-threaded changes’ causing
    havoc, so there aren’t many reasons to choose a very low-level locking mechanism
    over an abstraction such as CAS.


    ```

    (def foo (atom []))

    (future

    (locking foo

    (Thread/sleep 1000)

    (swap! foo #(conj % 1))))

    (locking foo

    (swap! foo #(conj % 2)))

    @foo

    ;; [1 2]

    Listing 8-12.

    Example of Locking Blocks of Code

    ```


    If we didn’t utilize the `locking` mechanism around the `swap!` execution (you’ll
    notice we have two locking blocks defined), then what would happen is an inconsistent
    execution path.


    Imagine the locking blocks were not utilized in Listing [8-12](#A453572_1_En_8_Chapter.html#Par89).
    What would happen would be that the `sleep` called inside the `future` thread
    would mean that a call to `swap!` from outside of the `future`’s thread would
    complete first, before the `swap!` from within the `future`’s thread had finished
    computing, and so the result would have been `[2 1]` instead of what we were expecting,
    which was `[1 2]`.


    Note


    In Listing [8-12](#A453572_1_En_8_Chapter.html#Par89) you’ll notice we have to
    lock `foo` twice. Locking `foo` from within the child thread isn’t enough to prevent
    the value from being swapped out. This is where things get complicated in real-world
    applications: in our silly example, the code for accessing `foo` is right next
    to each other, but in practice this is rarely the case, and so you could easily
    miss places where a lock should be applied, and consequently cause your application
    to break in unexpected and hard-to-debug ways.'
