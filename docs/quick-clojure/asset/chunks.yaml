- fmt: '# Partial Application


    In the previous section, we used the `partial` function to demonstrate how Clojure
    can facilitate higher-order functions. But the `partial` function itself also
    demonstrates another important functional concept known as partial application,
    which states that you can gain more reusability from your code by defining new
    functions that are composed from existing functions with part of their arguments
    prefilled.


    Partial application helps to promote the creation of functions that can expand
    their use cases beyond their initial intent. An example could be that you’re creating
    an API for users to consume. Part of your API is required to talk to some back-end
    system that requires lots of parameters to be provided as part of the call (half
    of them are generic details that never change).


    Rather than rely on the consumer of your API to provide all the values, you could
    expose a function in your API that is an already partially applied function. In
    your code, you use partial application to prefill certain params, and then the
    API consumer can fill in the rest (unaware there are extra params already set
    for them).


    **Note**


    See Listing [3-3](#A453572_1_En_3_Chapter.html#Par30) for a simple example of
    the `partial` function.


    The concept of partial application is regularly confused with another functional
    concept known as currying (which Clojure doesn’t support). When you “curry” a
    function, the function’s arguments are expanded internally into separate functions.


    If your function took three arguments, then, when curried, you would need to execute
    the function three times and provide an argument for each call (there’s slightly
    more to it than that, but that’s the basic concept you need to know to understand
    the difference).


    A curried function won’t execute its body until all arguments have been provided
    (similar to partial application). So, again, if your function accepted three arguments
    you could effectively call your curried function in one of the following ways.
    See Listing [3-19](#A453572_1_En_3_Chapter.html#Par107) for the first example.


    **Note**


    I''ll be using a form C-like syntax simply to differentiate the principle of the
    example from actual Clojure code (which doesn’t support currying). But be aware
    that there is no such native function available in JavaScript either.


    ```

    curried(1, 2, 3);

    // all arguments provided at once in a single call

    curried(1, 2)(3);

    // two arguments provided, then a separate call for remaining argument

    curried(1)(2)(3);

    // one argument provided per call

    Listing 3-19.

    Example of a Theoretical Curry Function with C-like Syntax

    ```


    Let’s consider a slightly more fleshed out example (see Listing [3-20](#A453572_1_En_3_Chapter.html#Par109)),
    continuing with the C-like syntax, but, again, this example is used simply to
    get across the principal idea behind currying so you can see how it’s different
    from partial application.


    ```

    var fn  = function (a, b, c) { return a + b + c }

    var foo = curry(fn)

    foo(''x'')(''y'')(''z'') // ''xyz''

    var bar = curry(fn)

    var baz = bar(''x'')

    baz(''y'')(''z'') // ''xyz''

    Listing 3-20.

    Extension of Our Earlier, Theoretical Curry function

    ```


    When we look at the example in Listing [3-20](#A453572_1_En_3_Chapter.html#Par109),
    what we’re in effect seeing is that internally the function assigned to the variable
    `fn` is being converted into a form that would look something like Listing [3-21](#A453572_1_En_3_Chapter.html#Par111).


    ```

    function f(a) {

    function (b) {

    function (c) {

    return a + b + c;

    }

    }

    }

    Listing 3-21.

    Internal Representation of a Curry-Compiled Output

    ```


    So, just to recap, the main differences between currying and partial application
    are as follows:


    1. You only partially apply your values once. So, if your function takes three
    arguments and you partially apply two of them, then when your resulting function
    is called you only provide one argument. If you had instead partially applied
    only one argument, you would still only call the resulting function once (but
    this time you would have to provide the remaining two arguments).


    2. If we consider the “API” scenario from earlier, you (as the creator of the
    API) are providing the initial values for the partially applied function, whereas
    with a curried function it is the user who provides the arguments.'
  raw: '## Partial Application


    In the previous section, we used the `partial` function to demonstrate how Clojure
    can facilitate higher-order functions. But the `partial` function itself also
    demonstrates another important functional concept known as partial application,
    which states that you can gain more reusability from your code by defining new
    functions that are composed from existing functions with part of their arguments
    prefilled.


    Partial application helps to promote the creation of functions that can expand
    their use cases beyond their initial intent. An example could be that you’re creating
    an API for users to consume. Part of your API is required to talk to some back-end
    system that requires lots of parameters to be provided as part of the call (half
    of them are generic details that never change).


    Rather than rely on the consumer of your API to provide all the values, you could
    expose a function in your API that is an already partially applied function. In
    your code, you use partial application to prefill certain params, and then the
    API consumer can fill in the rest (unaware there are extra params already set
    for them).


    Note


    See Listing [3-3](#A453572_1_En_3_Chapter.html#Par30) for a simple example of
    the `partial` function.


