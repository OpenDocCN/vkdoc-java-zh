    # 13. 命令行应用程序


    在本章中，我们将完成两件事：首先，我们将回顾 Clojure 的 `tools.cli` 库，以了解如何利用它来帮助我们设计和开发命令行应用程序。其次，我们将探讨如何打包此应用程序，以便我们能够分发它。


    构建命令行应用程序是大多数开发者喜欢做的事情，因为它提供了一种丰富其工作环境（以及其团队或更广泛开发者社区的环境，如果他们设计的工具足够抽象，能够对除自己之外的更多人有用）的方式。在设计
    CLI 工具时，可能性是无限的，因为你拥有很大的发挥空间。


    一旦我们回顾了 `clojure/tools.cli` 和打包选项，你会发现我们已经涵盖了绝大部分你需要了解的内容。剩下的就靠你自己了；你如何设计和构建应用程序将取决于你想要构建的工具以及你试图解决的问题。


    让我们首先使用我们在上一章中看到的 Leiningen `app` 模板创建一个新项目。命令是 `lein new app cli-foo`（你可以随意命名你的应用程序，但我选择了简单而有效的
    `cli-foo`）。


    在该项目中，打开你的 `project.clj` 并更新依赖项键，以包含 `clojure/tools.cli` 依赖项。参见清单 13-1 以查看上下文中的更改。


    ```

    (defproject cli-foo "0.1.0-SNAPSHOT"

    :description "FIXME: write description"

    :url "http://example.com/FIXME"

    :license {:name "Eclipse Public License"

    :url "http://www.eclipse.org/legal/epl-v10.html"}

    :dependencies [[org.clojure/clojure "1.8.0"]

    [org.clojure/tools.cli "0.3.5"]]

    :main ^:skip-aot cli-foo.core

    :target-path "target/%s"

    :profiles {:uberjar {:aot :all}})

    清单 13-1.

    更新 project.clj 以包含 tools.cli 依赖项

    ```


    注意


    你需要做的一件事（我们稍后会解释原因）是从 `project.clj` 中删除 `:target-path` 属性。


    好的。现在让我们打开 `src/cli_foo/core.clj` 并进行清单 13-2 中所示的修改。这里有很多内容，所以我们将花一些时间来分解每个更改，以确保我们理解我们在做什么以及为什么这样做。


    你首先会注意到我们更新了 `ns` 宏，以确保我们引入了来自 `cli` 命名空间的 `parse-opts` 函数。这允许我们解析传入的参数（用户在使用工具时提供的），并以对我们的应用程序有意义的方式智能地处理输入。


    ```

    (ns cli-foo.core

    (:require [clojure.tools.cli :refer [parse-opts]])

    (:gen-class))

    (defn exit [status msg]

    (println msg)

    (System/exit status))

    (def cli-options

    [["-p" "--port PORT" "端口号"

    :default 80

    :parse-fn #(Integer/parseInt %)

    :validate [#(< 0 % 0x10000) "必须是一个介于 0 和 65536 之间的数字"]]

    ["-v" nil "详细程度级别"

    :id :verbosity

    :default 0

    :assoc-fn (fn [opts k v] (update-in opts [k] inc))]

    ["-x" "--xxx WHATEVER", "此选项的描述"

    :default 123]

    ["-h" "--help"

    :id :custom-help]])

    (defn -main [& args]

    (let [{:keys [options arguments errors summary]} (parse-opts args cli-options)]

    (cond

    (:custom-help options) (exit 0 summary)

    (not (nil? errors)) (exit 1 errors)

    :else (exit 0 (parse-opts args cli-options)))))

    清单 13-2.

    我们命令行工具的主要应用程序逻辑

    ```


    接下来你会注意到我们定义了一个 `exit` 函数。这个函数的目的是接受一个“退出码”（如果一切执行成功，通常为 `0`；如果出现错误，则为正数¹）。我们将退出码传递给
    `System/exit` 函数，该函数将确保应用程序正确且恰当地关闭。该函数还接受一个 `msg` 参数，顾名思义，它将用于打印消息。消息被发送到 `stdout`（标准输出²），在这种情况下是终端屏幕。


    之后，我们定义了一个 `cli-options` 变量，并为其分配了一个大型嵌套向量数据结构，其中包含一组非常具体的属性定义。向量中的每个项目定义了一个单独的标志。


    注意


    标志是我们提供给命令行应用程序以配置其行为的东西。例如，`ls -l -a` 是 `ls` 命令（列出所有文件和目录），并应用了两个标志 `-l` 和 `-a`，这会影响显示的输出。


    我们可以看到我们定义了以下标志（这些都是任意编造的标志），我们很快就会看到，在应用程序本身中，除了将它们打印到屏幕上之外，我们实际上并没有对这些标志做太多处理，但它们被选用来演示
    `tools.cli` 库的一些不同方面：


    *   `-p`，`--port`：演示 `:parse-fn` 和 `:validate`

    *   `-v`，`--verbosity`：演示 `:assoc-fn`

    *   `-x`，`--xxx`：演示 `:default`

    *   `-h`，`--help`：演示 `:id`


    注意


    要查看可用属性的完整列表，我建议你阅读源代码文件，其中记录了所有属性。³


    我们将稍后回到这些标志的含义及其工作原理，但让我们先继续看代码的最后一部分，即 `-main` 函数。我们在这个函数中做的第一件事是调用 `parse-opts`
    函数，并向其提供通过命令行工具用户传递给我们的参数，以及我们定义和配置的 `cli-options` 标志。


    我们从 `parse-opts` 得到的是一个包含四个键的映射数据结构：`:options`、`:arguments`、`:summary` 和 `:errors`。参见清单
    13-3 以了解分配给每个键的描述。我们将每个键分配给一个特定的符号以便于引用。


    ```

    {:options     选项映射，以 :id 为键，映射到解析后的值

    :arguments   未处理参数的向量

    :summary     包含最小选项摘要的字符串

    :errors      可能的错误消息字符串向量}

    清单 13-3.

    从 parse-opts 函数返回的映射

    ```


    接下来，在 `-main` 函数中，我们定义了一个条件：如果用户包含了标志 `-h` 或 `--help`，那么我们应该调用 `exit` 函数，并传递由
    `parse-opts` 返回的 `:summary` 值。


    你还会注意到，我们通过查找我们在 `:options` 字段中为该标志定义的 `:id`（`:custom-help`）来识别是否指定了帮助标志，该字段由
    `parse-opts` 返回。


    接下来，在该条件之后，我们声明如果解析参数和/或标志时出现错误，那么我们应该调用 `exit` 函数，但提供退出码 `1`（表示错误），然后传递由 `parse-opts`
    返回的错误消息本身（具体来说是 `:errors` 字段），以便用户可以看到他们可能做错了什么。


    最后，我们有一个 `else` 语句，它表示调用 `exit` 函数并提供退出码 `0`（表示一切正常），然后简单地再次调用 `parse-opts` 并将其返回值用作我们将要显示给用户的内容。


    至此，我们对这个应用程序的了解已经足够，可以开始研究如何编译和运行它了。我们接下来将这样做，然后在运行应用程序并探索如何与之交互之后，我们可以返回并回顾我们定义并分配给
    `cli-options` 变量的标志配置设置，希望能更深入地理解它们在实际中是如何使用的。

    '
- fmt: "# Running the `cli` Application\n\nThere are three ways we could potentially\
    \ run this application right now:\n\n1. Directly via Leiningen\n2. Compiling the\
    \ application into a jar\n3. Compiling the application into a binary\n\nWhile\
    \ we’re just testing things, we’ll use option 1. Later, I’ll show you options\
    \ 2 and 3, although really option 3 is the one you’ll most likely be interested\
    \ in, as that is the option that will allow us to run the application like a true\
    \ command-line binary (much like the standard binaries you already use, such as\
    \ `ls` or `cat`, etc.).\n\n## Running via Leiningen\n\nTo run the command-line\
    \ application via Leiningen, we simply execute a command with the following syntax\
    \ structure: `lein run <options> <arguments>`. For example, in Listing [13-4](#A453572_1_En_13_Chapter.html#Par37)\
    \ we can see one such example that would work for the application we’ve defined.\n\
    \n```\nlein run -v -p 9090 -x 666 arg1 arg2 arg3\nListing 13-4.\nExecuting Our\
    \ Command-Line Application\n```\n\nThe output of the preceding command can be\
    \ seen in Listing [13-5](#A453572_1_En_13_Chapter.html#Par39), and, as we can\
    \ see, the displayed output is what we would expect to see return from the `parse-opts`\
    \ function.\n\n```\n{:options {:xxx 666, :verbosity 1, :port 9090}, :arguments\
    \ [arg1 arg2 arg3], :summary   -p, --port PORT     80   Port number\n-v      \
    \                 Verbosity level\n-x, --xxx WHATEVER  123  A description for\
    \ this option\n-h, --help, :errors nil}\nListing 13-5.\nOutput from Our Application\n\
    ```\n\nRemember in Listing [13-3](#A453572_1_En_13_Chapter.html#Par25) how we\
    \ described the four attributes that were expected to be included in the returned\
    \ map data structure? Well, we can see them here and what their actual values\
    \ have been assigned. This will help us better understand how to utilize them\
    \ in our app.\n\n> **Note**  \n> If there were no errors, then the `:errors` field\
    \ is expected to be assigned the `nil` value.\n\n## Running via a Jar\n\nRunning\
    \ the application from a jar isn’t that much different from running it directly\
    \ via Leiningen. The flag options and arguments are no different; it’s just you\
    \ have to reference a jar file instead of referring to Leiningen.\n\nThis means\
    \ we need to first compile the app into a jar, which you would do using the command\
    \ `lein uberjar`. Once you run that command, you should see output similar to\
    \ that in Listing [13-6](#A453572_1_En_13_Chapter.html#Par44).\n\n```\nCompiling\
    \ cli-foo.core\nCreated /Users/M/cli-foo/target/uberjar+uberjar/cli-foo-0.1.0-SNAPSHOT.jar\n\
    Created /Users/M/cli-foo/target/uberjar/cli-foo-0.1.0-SNAPSHOT-standalone.jar\n\
    Listing 13-6.\nOutput of Generating a Jar of Your Application\n```\n\nYou can\
    \ see from this output that the command has generated a set of jars for us to\
    \ use (and deploy, if this were indeed a standard application rather than a command-line\
    \ variety). Let’s now see how we run the generated jar file. Assuming you’re currently\
    \ inside the `cli-foo` directory, you should execute the command seen in Listing\
    \ [13-7](#A453572_1_En_13_Chapter.html#Par46).\n\n```\njava -jar target/cli-foo-0.1.0-SNAPSHOT-standalone.jar\
    \ -v -p 9090 -x 666 arg1 arg2 arg3\nListing 13-7.\nJar Command to Run Our Application\n\
    ```\n\n## Running via Binary\n\nThis is the packaging option that I believe will\
    \ be of most interest to readers. We would like our application to be run from\
    \ any operating system (OS) with minimal setup and hassle. To do that we’ll need\
    \ to utilize an external plugin.\n\nThe plugin we’ll be using is called `lein-bin`,[⁴](#A453572_1_En_13_Chapter.html#Fn4)\
    \ and it takes the uberjar Leiningen would otherwise produce and wraps it in another\
    \ format along with a specific configuration to allow it to be run from Windows,\
    \ Mac, or Linux environments.\n\nTo start, we need to update the `project.clj`\
    \ with the `lein-bin` plugin, as well as provide some additional settings, such\
    \ as giving our binary a name (in this case, I want my binary to be `integralist`).\
    \ We’ll also configure the binary to be added to the local user bin path so I\
    \ can run it implicitly with the format: `integralist <options> <arguments>`.\n\
    \n> **Note**  \n> The `bin` path is where most of your OS’ executable binaries\
    \ are stored. There’s a system directory for binaries, `/usr/bin`, and there’s\
    \ a user directory at `/usr/local/bin`. We’ll want to stick our binary in the\
    \ user-specific directory, because that is where any binaries installed by a user\
    \ should go.\n\nIn Listing [13-8](#A453572_1_En_13_Chapter.html#Par53), you’ll\
    \ see the required changes in context of the full `project.clj` file. We’ve added\
    \ the `:plugin` attribute (as this is our first plugin for this project), and\
    \ we’ve added the new plugin-specific attribute `:bin`, which we set up so that\
    \ it names our executable `integralist`, and it will also copy the generated executable\
    \ into our `/usr/local/bin` directory automatically for us.\n\n```\n(defproject\
    \ cli-foo \"0.1.0-SNAPSHOT\"\n:description \"FIXME: write description\"\n:url\
    \ \"http://example.com/FIXME\"\n:license {:name \"Eclipse Public License\"\n:url\
    \ \"http://www.eclipse.org/legal/epl-v10.html\"}\n:dependencies [[org.clojure/clojure\
    \ \"1.8.0\"]\n[org.clojure/tools.cli \"0.3.5\"]]\n:plugins [[lein-bin \"0.3.4\"\
    ]]\n:bin {:name \"integralist\"\n:bin-path \"/usr/local/bin\"}\n:main ^:skip-aot\
    \ cli-foo.core\n:profiles {:uberjar {:aot :all}})\nListing 13-8.\nConfigure lein-bin\
    \ via the project.clj File\n```\n\nIf you run `lein repl` now, you should find\
    \ that Leiningen will download the newly defined plugin. The output will look\
    \ like Listing [13-9](#A453572_1_En_13_Chapter.html#Par55) and highlights some\
    \ nested dependencies required.\n\n```\nRetrieving lein-bin/lein-bin/0.3.4/lein-bin-0.3.4.pom\
    \ from clojars\nRetrieving me/raynes/fs/1.4.0/fs-1.4.0.pom from clojars\nRetrieving\
    \ org/apache/commons/commons-compress/1.3/commons-compress-1.3.pom from central\n\
    Retrieving org/apache/commons/commons-compress/1.3/commons-compress-1.3.jar from\
    \ central\nRetrieving lein-bin/lein-bin/0.3.4/lein-bin-0.3.4.jar from clojars\n\
    Retrieving me/raynes/fs/1.4.0/fs-1.4.0.jar from clojars\nListing 13-9.\nPulling\
    \ Down the lein-bin Plugin and Its Dependencies\n```\n\nAt this point, you’ll\
    \ have a `lein bin` command available to you. If you execute that command from\
    \ the project directory, you’ll see output similar to that shown in Listing [13-10](#A453572_1_En_13_Chapter.html#Par58).\
    \ With the binary now compiled and it’s being copied into your `/usr/local/bin`\
    \ directory, you’ll find it should be available to you from anywhere on your computer.\n\
    \n> **Note**  \n> This is because your `$PATH` environment variable is pre-configured\
    \ to look up executables in the `/usr/local/bin` directory.\n\n```\nCompiling\
    \ cli-foo.core\nCreated /Users/M/code/clojure/cli-foo/target/cli-foo-0.1.0-SNAPSHOT.jar\n\
    Created /Users/M/code/clojure/cli-foo/target/cli-foo-0.1.0-SNAPSHOT-standalone.jar\n\
    Creating standalone executable: /Users/M/code/clojure/cli-foo/target/integralist\n\
    Copying binary to /usr/local/bin\nListing 13-10.\nOutput from lein-bin Command\n\
    ```\n\nIf you now execute `integralist -vvv abc` you should see the expected output\
    \ displayed on your screen. Great! We’ve created an executable that we can now\
    \ run from anywhere on our system. But be aware that this executable is only going\
    \ to work for the OS from where you built it. In order for the executable to work\
    \ on another OS, you would need to build it from that OS architecture.\n\n> **Note**\
    \  \n> One option would be to utilize Docker,[⁵](#A453572_1_En_13_Chapter.html#Fn5)\
    \ which allows you to run different operating systems from your own computer.\
    \ You could then build a docker image from the specific OS you want your application\
    \ to work with and set up the environment to have Leiningen and the `lein-bin`\
    \ plugin and compile the executable from within the Docker container by mounting\
    \ your code base into the Docker container at runtime. Docker is outside the scope\
    \ of this book, so we won’t discuss this option further."
  raw: '## Running the cli Application


    There are three ways we could potentially run this application right now:


    1.  Directly via Leiningen  

    2.  Compiling the application into a jar  

    3.  Compiling the application into a binary  


    While we’re just testing things, we’ll use option 1\. Later, I’ll show you options
    2 and 3, although really option 3 is the one you’ll most likely be interested
    in, as that is the option that will allow us to run the application like a true
    command-line binary (much like the standard binaries you already use, such as
    `ls` or `cat`, etc.).


    ### Running via Leiningen


    To run the command-line application via Leiningen, we simply execute a command
    with the following syntax structure: `lein run <options> <arguments>`. For example,
    in Listing [13-4](#A453572_1_En_13_Chapter.html#Par37) we can see one such example
    that would work for the application we’ve defined.


    ```

    lein run -v -p 9090 -x 666 arg1 arg2 arg3

    Listing 13-4.

    Executing Our Command-Line Application

    ```


    The output of the preceding command can be seen in Listing [13-5](#A453572_1_En_13_Chapter.html#Par39),
    and, as we can see, the displayed output is what we would expect to see return
    from the `parse-opts` function.


    ```

    {:options {:xxx 666, :verbosity 1, :port 9090}, :arguments [arg1 arg2 arg3], :summary   -p,
    --port PORT     80   Port number

    -v                       Verbosity level

    -x, --xxx WHATEVER  123  A description for this option

    -h, --help, :errors nil}

    Listing 13-5.

    Output from Our Application

    ```


    Remember in Listing [13-3](#A453572_1_En_13_Chapter.html#Par25) how we described
    the four attributes that were expected to be included in the returned map data
    structure ? Well, we can see them here and what their actual values have been
    assigned. This will help us better understand how to utilize them in our app.


    Note


    If there were no errors, then the `:errors` field is expected to be assigned the
    `nil` value.


    ### Running via a Jar


    Running the application from a jar isn’t that much different from running it directly
    via Leiningen. The flag options and arguments are no different; it’s just you
    have to reference a jar file instead of referring to Leiningen.


    This means we need to first compile the app into a jar, which you would do using
    the command `lein uberjar`. Once you run that command, you should see output similar
    to that in Listing [13-6](#A453572_1_En_13_Chapter.html#Par44).


    ```

    Compiling cli-foo.core

    Created /Users/M/cli-foo/target/uberjar+uberjar/cli-foo-0.1.0-SNAPSHOT.jar

    Created /Users/M/cli-foo/target/uberjar/cli-foo-0.1.0-SNAPSHOT-standalone.jar

    Listing 13-6.

    Output of Generating a Jar of Your Application

    ```


    You can see from this output that the command has generated a set of jars for
    us to use (and deploy, if this were indeed a standard application rather than
    a command-line variety). Let’s now see how we run the generated jar file. Assuming
    you’re currently inside the `cli-foo` directory, you should execute the command
    seen in Listing [13-7](#A453572_1_En_13_Chapter.html#Par46).


    ```

    java -jar target/cli-foo-0.1.0-SNAPSHOT-standalone.jar -v -p 9090 -x 666 arg1
    arg2 arg3

    Listing 13-7.

    Jar Command to Run Our Application

    ```


    ### Running via Binary


    This is the packaging option that I believe will be of most interest to readers.
    We would like our application to be run from any operating system (OS) with minimal
    setup and hassle. To do that we’ll need to utilize an external plugin.


    The plugin we’ll be using is called `lein-bin`,[⁴](#A453572_1_En_13_Chapter.html#Fn4)
    and it takes the uberjar Leiningen would otherwise produce and wraps it in another
    format along with a specific configuration to allow it to be run from Windows,
    Mac, or Linux environments.


    To start, we need to update the `project.clj` with the `lein-bin` plugin , as
    well as provide some additional settings, such as giving our binary a name (in
    this case, I want my binary to be `integralist`). We’ll also configure the binary
    to be added to the local user bin path so I can run it implicitly with the format:
    `integralist <options> <arguments>`.


