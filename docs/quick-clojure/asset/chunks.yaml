    so the transition of math to programming persisted. On a practical level, `i`
    is sometimes interpreted to stand for integer , and so when needing a nested level,
    it made sense to start moving up the alphabet to `j` , then `k` .


    Clojure has similar naming conventions.


    ### Functions


    *   `f` , `g` , `h` : function input (notice similarity with `i` , `j` , `k` ,
    where now `f` represents function )

    *   `n` : integer input (usually a size)

    *   `i` : integer index

    *   `x` , `y` : numbers

    *   `s` : string input

    *   `xs` : considered a plural, or sequence, of `x`

    *   `coll` : a collection (or sequence)

    *   `pred` : a predicate closure

    *   `& more` : variadic input

    *   `*var*` : dynamic variables should be wrapped in asterisks (also referred
    to as “ear muffs”)


    ### Macros


    *   `expr` : an expression

    *   `body` : a macro body

    *   `binding` : a macro binding vector'
