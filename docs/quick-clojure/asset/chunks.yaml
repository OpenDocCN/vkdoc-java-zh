  trans: '

    ### Agent 错误


    如果你导致一个 agent 出错，那么它会静默地出错（取决于错误类型）。过去，我曾导致一个 agent 失败，然后后来疑惑为什么我通过 `send` 调用发送的操作都没有被执行。让我们看一个导致
    agent 失败的例子以及它的反应，如清单 8-18 所示。


    ```

    (def a (agent 0))

    (send a #(/ % 0))

    ;; 导致 agent 进入失败模式（未显示错误）

    a

    ;; #object[clojure.lang.Agent 0xf1c5585 {:status :failed, :val 0}]

    清单 8-18.

    Agent 失败示例

    ```


    注意


    清单 8-18 的最后一行引用了该 agent，因此我们看到了其内部表示。在该表示中，你会注意到 `:status :failed`。


    这种静默地变为失败状态的问题在于，所有未来的 `send` 命令也会失败，直到 agent 的状态被改回 `:ready`。


    如果你需要验证 agent 收到了什么错误，可以调用 `agent-error` 函数并传入你想要检查的 agent；这将返回指定 agent 的最后一个已知错误。


    此时，我们可以做几件事：第一是为你的 agent 定义一个错误处理器，这样当问题发生时就会变得清晰；第二是在你的代码意识到问题后重启 agent。参见清单
    8-19。


    ```

    (def a (agent 0))

    (defn h [a e]

    (prn "Agent value: " @a)

    (prn "Agent error: " e))

    (set-error-handler! a h)

    (send a #(/ % 0)) ;; 打印以下内容...

    ;; "Agent value: " 0

    ;; "Agent error: " #error{:cause "Divide by zero"...

    清单 8-19.

    Agent 错误处理示例

    ```


    注意


    要移除错误处理器，你需要再次调用 `set-error-handler!` 函数，并传入 `nil` 作为处理器值。


    此时，agent 处于失败状态，因此如果你尝试向它发送另一个操作，该操作将无法执行。要解决这个问题，我们需要重启 agent，可以使用 `(restart-agent
    a 0)` 来实现，其中我们向 `restart-agent` 函数提供要修改的 agent（`a`）以及我们希望 agent 重启时使用的新值（`0`）。


    如果你希望用 agent 的最后一个已知值来重启它，可以将提供的值替换为 agent 的解引用值：`(restart-agent a @a)`。


    现在，你可能希望 agent 自动重启。这是可能的，但并不像你想象的那么简单（例如，仅仅在错误处理器中调用 `restart-agent`）。清单 8-20
    将演示一种可能的解决方案，该方案利用 `future` 将对 `restart-agent` 的调用与错误处理器解耦。


    问题的真正原因在于，agent 实际上直到错误处理器执行完毕才会被标记为“失败”。这就是为什么使用 `future` 可以解决这个问题，因为它意味着错误处理器可以结束（因为
    `future` 在单独的子线程上异步执行），并且 agent 的重启将会成功。


    我通过将对 `restart-agent` 的调用包装在 try/catch 语句中发现了这一点，这揭示了消息“Agent does not need a
    restart.”


    注意


    重启 agent 时，任何已排队的操作将继续被处理，除非你在重启 agent 时提供了 `:clear-actions true` 选项：


    ```

    (restart-agent a @a :clear-actions true)

    ```


    ```

    (def a (agent 0))

    (defn h [a e]

    (prn "Agent value: " @a)

    (prn "Agent error: " e)

    (future (restart-agent a 0)))

    (set-error-handler! a h)

    (send a inc)

    a ;; 1

    (send a #(/ % 0))

    ;; 错误处理器 h 将被触发

    (send a inc)

    a ;; 1

    清单 8-20.

    尝试自动重启失败的 Agent

    ```


    ## 事务


    Clojure 自带了自己的 STM（软件事务内存）。本质上，STM 的工作方式很像 CAS（比较并交换）操作，我们在之前讨论原子时已经见过。它们之间的区别在于，STM
    不像原子（它是“非协调的”）那样只关心单个值，而是能够同时引用多个值（因此，STM 被认为是“协调的”）。


    使用 STM 时有几个活动部件：


    *   `dosync`

    *   `ref`

    *   `ref-set`

    *   `alter`

    *   `ensure`

    *   `commute`


    ### dosync/ref/alter


    第一个项（`dosync`）是事务容器，所有与 STM 执行相关的内容都应发生在这个形式内。第二个项（`ref`）是“引用”类型，它将持有要存储/验证/更新的值。


    所有其他列出的项都是只能从事务内部使用的函数。这意味着任何尝试在 `dosync` 形式外部使用 `ref-set`、`alter`、`ensure` 或
    `commute` 函数的操作都会导致错误。参见清单 8-21。


    ```

    (def r (ref 0))

    (dosync

    (alter r inc))

    ;; 1

    清单 8-21.

    简单事务

    ```


    在清单 8-21 中，我们创建了一个新的 `ref` 类型 `r`，并为其分配了初始值 `0`。设置完成后，我们使用 `dosync` 打开一个事务，并在其中将
    `ref` 实例传递给 `alter` 函数，该函数将提供的函数（本例中为 `inc`）应用于 `ref` 当前持有的值。


    与原子类型非常相似，我们需要确保 `dosync` 块内发生的任何操作都是幂等的，因为如果不同引用之间发生冲突，STM 可能会重新启动/重放整个事务。


    ### ref-set


    在清单 8-22 中，我们将使用 `ref-set` 来更改 `ref` 实例的值。这允许我们使用另一个直接值来更改值，而不是使用函数来修改值。


    ```

    (def r (ref 1))

    (dosync

    (ref-set r 0))

    ;; 0

    清单 8-22.

    ref-set 允许分配字面值的示例

    ```

