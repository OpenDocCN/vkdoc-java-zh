- fmt: '# Agent


    An agent is a bit like an asynchronous version of an atom: it is a shared mutable
    value, non-blocking (until you attempt to dereference the value), and also uncoordinated.


    **Note:** We’ve not discussed what coordination means yet, but we’ll cover that
    in the next section. For now, it’ll suffice to know that an uncoordinated type,
    such as an agent or atom, simply means a value that is independent.


    In order to modify the value contained within an agent, you have two methods available:


    1. `send`

    2. `send-off`


    Both functions have the same signature, `(a f & args)`, which means it accepts
    a reference to an Atom (`a`) followed by a function that should mutate its value
    (`f`—this is often referred to as an action), followed by any number of arguments
    the action takes (`& args`). See Listing [8-13](#A453572_1_En_8_Chapter.html#Par99).


    ```

    (def a (agent 0))

    (send a inc)

    @a

    ;; 1

    Listing 8-13.

    Example of Sending a Value to an Agent

    ```


    **Note:** You can fire multiple actions to an agent, and they’ll be stored up
    in a queue and processed sequentially.


    Now, there is a slight difference between `send` and `send-off` that you’ll want
    to be aware of, which is that the former runs in a separate thread picked from
    a managed thread pool. The latter runs in a new thread specifically for the agent.


    Most of the time you’ll use the `send` function, but if you have an I/O blocking
    action you need to apply, then you’ll want to use `send-off` instead, as this
    will allow that thread to take its time and ultimately not use up shared thread-pool
    resources.


    One important difference between an agent and other types (such as atoms, futures,
    and promises) is that retrieving the value (dereferencing) for an agent doesn’t
    cause the current thread to block. See Listing [8-14](#A453572_1_En_8_Chapter.html#Par104).


    ```

    (def a (agent 0))

    (future

    (Thread/sleep 5000)

    (prn "increment the value")

    (send a inc))

    @a ;; 0

    ;; 5 seconds later...

    @a ;; 1

    Listing 8-14.

    Dereferencing an Agent Is Non-blocking

    ```


    Because agents are completely non-blocking (even when dereferencing), if you need
    to ensure a group of actions have completed before continuing on, then you’ll
    need to either manage this process yourself OR utilize the `await` and `await-for`
    functions that provide this behavior for you.


    The difference between the two functions is that the latter allows you to specify
    a timeout: `(await-for timeout agent)`. Let’s see some examples that demonstrate
    how to use these functions.


    ## Without wait/wait-for


    In Listing [8-15](#A453572_1_En_8_Chapter.html#Par108), we can see that we send
    an agent two actions. Both actions sleep for ten seconds before modifying the
    agent’s value. When we dereference the agent, it’s non-blocking, and so we see
    the initial value (zero) is what’s returned. If we dereference again later, then
    we’ll see the final value.


    ```

    (def a (agent 0))

    (send a #(do (Thread/sleep 10000) (prn "added 5") (+ % 5)))

    (send a #(do (Thread/sleep 10000) (prn "added 2") (+ % 2)))

    @a ;; 0

    Listing 8-15.

    Example of Standard Non-blocking Agent Dereferencing

    ```


    ## Using wait


    In Listing [8-16](#A453572_1_En_8_Chapter.html#Par110), we have the same example
    as in Listing [8-15](#A453572_1_En_8_Chapter.html#Par108), but this time we use
    the `await` function instead of a normal `deref` call. We can see that the returned
    value is `nil`, but we block until the actions are complete. Once it finishes,
    we can dereference the agent and get the final value immediately.


    ```

    (def a (agent 0))

    (send a #(do (Thread/sleep 10000) (prn "added 5") (+ % 5)))

    (send a #(do (Thread/sleep 10000) (prn "added 2") (+ % 2)))

    (await a)

    ;; nil

    Listing 8-16.

    Example of Waiting for Actions to Complete

    ```


    ## Using wait-for


    In Listing [8-17](#A453572_1_En_8_Chapter.html#Par113), we have the same example
    as in Listing [8-16](#A453572_1_En_8_Chapter.html#Par110), but this time we use
    the `await-for` function instead of the `await` call. We can see that the returned
    value is `false`, which indicates that the timeout was reached and we didn’t receive
    a value before the timeout was exceeded.


    If we were to now dereference the agent, we would find the value is still zero.
    It will stay zero until the two actions complete. The benefit of using `await-for`
    means we’re able to safely escape the blocking actions (which could be a very
    long time blocked).


    ```

    (def a (agent 0))

    (send a #(do (Thread/sleep 10000) (prn "added 5") (+ % 5)))

    (send a #(do (Thread/sleep 10000) (prn "added 2") (+ % 2)))

    (await-for 500 a)

    ;; false

    Listing 8-17.

    Example of Waiting—with Timer—for Actions to Complete

    ```'
  raw: '## Agent


    An agent is a bit like an asynchronous version of an atom: it is a shared mutable
    value, non-blocking (until you attempt to dereference the value), and also uncoordinated.


    Note


    We’ve not discussed what coordination means yet, but we’ll cover that in the next
    section. For now, it’ll suffice to know that an uncoordinated type, such as an
    agent or atom, simply means a value that is independent.


    In order to modify the value contained within an agent, you have two methods available:


    1.  `send`  

    2.  `send-off`  


    Both functions have the same signature, `(a f & args)`, which means it accepts
    a reference to an Atom (`a`) followed by a function that should mutate its value
    (`f`—this is often referred to as an action), followed by any number of arguments
    the action takes (`& args`). See Listing [8-13](#A453572_1_En_8_Chapter.html#Par99).


    ```

    (def a (agent 0))

    (send a inc)

    @a

    ;; 1

    Listing 8-13.

    Example of Sending a Value to an Agent

    ```


    Note


    You can fire multiple actions to an agent, and they’ll be stored up in a queue
    and processed sequentially.


    Now, there is a slight difference between `send` and `send-` `off` that you’ll
    want to be aware of, which is that the former runs in a separate thread picked
    from a managed thread pool. The latter runs in a new thread specifically for the
    agent.


    Most of the time you’ll use the `send` function, but if you have an I/O blocking
    action you need to apply, then you’ll want to use `send-off` instead, as this
    will allow that thread to take its time and ultimately not use up shared thread-pool
    resources.


    One important difference between an agent and other types (such as atoms, futures,
    and promises) is that retrieving the value (dereferencing) for an agent doesn’t
    cause the current thread to block. See Listing [8-14](#A453572_1_En_8_Chapter.html#Par104).


    ```

    (def a (agent 0))

    (future

    (Thread/sleep 5000)

    (prn "increment the value")

    (send a inc))

    @a ;; 0

    ;; 5 seconds later...

    @a ;; 1

    Listing 8-14.

    Dereferencing an Agent Is Non-blocking

    ```


    Because agents are completely non-blocking (even when dereferencing), if you need
    to ensure a group of actions have completed before continuing on, then you’ll
    need to either manage this process yourself OR utilize the `await` and `await-for`
    functions that provide this behavior for you.


    The difference between the two functions is that the latter allows you to specify
    a timeout: `(await-for timeout agent)`. Let’s see some examples that demonstrate
    how to use these functions .


    ### Without wait/wait-for


    In Listing [8-15](#A453572_1_En_8_Chapter.html#Par108), we can see that we send
    an agent two actions. Both actions sleep for ten seconds before modifying the
    agent’s value. When we dereference the agent, it’s non-blocking, and so we see
    the initial value (zero) is what’s returned. If we dereference again later, then
    we’ll see the final value.


    ```

    (def a (agent 0))

    (send a #(do (Thread/sleep 10000) (prn "added 5") (+ % 5)))

    (send a #(do (Thread/sleep 10000) (prn "added 2") (+ % 2)))

    @a ;; 0

    Listing 8-15.

    Example of Standard Non-blocking Agent Dereferencing

    ```


    ### Using wait


    In Listing [8-16](#A453572_1_En_8_Chapter.html#Par110), we have the same example
    as in Listing [8-15](#A453572_1_En_8_Chapter.html#Par108), but this time we use
    the `await` function instead of a normal `deref` call. We can see that the returned
    value is `nil`, but we block until the actions are complete. Once it finishes,
    we can dereference the agent and get the final value immediately.


    ```

    (def a (agent 0))

    (send a #(do (Thread/sleep 10000) (prn "added 5") (+ % 5)))

    (send a #(do (Thread/sleep 10000) (prn "added 2") (+ % 2)))

    (await a)

    ;; nil

    Listing 8-16.

    Example of Waiting for Actions to Complete

    ```


    ### Using wait-for


    In Listing [8-17](#A453572_1_En_8_Chapter.html#Par113), we have the same example
    as in Listing [8-16](#A453572_1_En_8_Chapter.html#Par110), but this time we use
    the `await-for` function instead of the `await` call. We can see that the returned
    value is `false`, which indicates that the timeout was reached and we didn’t receive
    a value before the timeout was exceeded.


    If we were to now dereference the agent, we would find the value is still zero.
    It will stay zero until the two actions complete. The benefit of using `await-for`
    means we’re able to safely escape the blocking actions (which could be a very
    long time blocked).


    ```

    (def a (agent 0))

    (send a #(do (Thread/sleep 10000) (prn "added 5") (+ % 5)))

    (send a #(do (Thread/sleep 10000) (prn "added 2") (+ % 2)))

    (await-for 500 a)

    ;; false

    Listing 8-17.

    Example of Waiting—with Timer—for Actions to Complete

    ```'
  trans: "\n## Agent（代理）\n\nAgent 有点像异步版本的 Atom（原子）：它是一个共享的可变值，非阻塞（直到你尝试解引用该值），并且也是非协调的。\n\
    \n注意\n\n我们尚未讨论协调的含义，但将在下一节中介绍。目前，只需知道非协调类型（如 agent 或 atom）仅表示一个独立的值即可。\n\n要修改\
    \ agent 中包含的值，你有两种方法可用：\n\n1.  `send`  \n2.  `send-off`  \n\n这两个函数具有相同的签名 `(a\
    \ f & args)`，这意味着它接受一个对 Atom 的引用（`a`），后跟一个应改变其值的函数（`f`——这通常被称为动作），再后跟该动作所需的任意数量的参数（`&\
    \ args`）。请参见清单 8-13。\n\n```\n(def a (agent 0))\n(send a inc)\n@a\n;; 1\n清单 8-13.\n\
    向 Agent 发送值的示例\n```\n\n注意\n\n你可以向一个 agent 触发多个动作，它们会被存储在队列中并按顺序处理。\n\n现在，`send`\
    \ 和 `send-off` 之间有一个细微差别需要你注意：前者在从托管线程池中选取的独立线程中运行，而后者则在一个专门为该 agent 创建的新线程中运行。\n\
    \n大多数情况下你会使用 `send` 函数，但如果你需要应用一个 I/O 阻塞动作，那么你应该改用 `send-off`，因为这能让该线程从容处理，最终不会耗尽共享线程池的资源。\n\
    \nAgent 与其他类型（如 atom、future 和 promise）的一个重要区别在于：获取 agent 的值（解引用）不会导致当前线程阻塞。请参见清单\
    \ 8-14。\n\n```\n(def a (agent 0))\n(future\n(Thread/sleep 5000)\n(prn \"increment\
    \ the value\")\n(send a inc))\n@a ;; 0\n;; 5 seconds later...\n@a ;; 1\n清单 8-14.\n\
    解引用 Agent 是非阻塞的\n```\n\n由于 agent 是完全非阻塞的（即使在解引用时），如果你需要确保一组动作在继续执行前已完成，那么你需要自行管理此过程，或者利用\
    \ `await` 和 `await-for` 函数，它们为你提供了此行为。\n\n这两个函数的区别在于：后者允许你指定一个超时时间：`(await-for\
    \ timeout agent)`。让我们看一些示例来演示如何使用这些函数。\n\n### 不使用 wait/wait-for\n\n在清单 8-15 中，我们可以看到我们向一个\
    \ agent 发送了两个动作。这两个动作在修改 agent 的值之前都休眠十秒钟。当我们解引用 agent 时，它是非阻塞的，因此我们看到返回的是初始值（零）。如果稍后再次解引用，那么我们将看到最终值。\n\
    \n```\n(def a (agent 0))\n(send a #(do (Thread/sleep 10000) (prn \"added 5\")\
    \ (+ % 5)))\n(send a #(do (Thread/sleep 10000) (prn \"added 2\") (+ % 2)))\n@a\
    \ ;; 0\n清单 8-15.\n标准非阻塞 Agent 解引用示例\n```\n\n### 使用 wait\n\n在清单 8-16 中，我们使用了与清单\
    \ 8-15 相同的示例，但这次我们使用了 `await` 函数而不是普通的 `deref` 调用。我们可以看到返回的值是 `nil`，但我们会阻塞直到动作完成。一旦完成，我们可以解引用\
    \ agent 并立即获得最终值。\n\n```\n(def a (agent 0))\n(send a #(do (Thread/sleep 10000)\
    \ (prn \"added 5\") (+ % 5)))\n(send a #(do (Thread/sleep 10000) (prn \"added\
    \ 2\") (+ % 2)))\n(await a)\n;; nil\n清单 8-16.\n等待动作完成的示例\n```\n\n### 使用 wait-for\n\
    \n在清单 8-17 中，我们使用了与清单 8-16 相同的示例，但这次我们使用了 `await-for` 函数而不是 `await` 调用。我们可以看到返回的值是\
    \ `false`，这表明已到达超时时间，并且在超时之前我们没有收到值。\n\n如果我们现在解引用 agent，我们会发现值仍然是零。它将保持为零，直到两个动作完成。使用\
    \ `await-for` 的好处在于我们能够安全地退出阻塞动作（这些动作可能会阻塞很长时间）。\n\n```\n(def a (agent 0))\n(send\
    \ a #(do (Thread/sleep 10000) (prn \"added 5\") (+ % 5)))\n(send a #(do (Thread/sleep\
    \ 10000) (prn \"added 2\") (+ % 2)))\n(await-for 500 a)\n;; false\n清单 8-17.\n\
