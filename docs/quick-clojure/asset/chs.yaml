- "# 8. 并发\n\nClojure 作为函数式语言的主要卖点之一是其并发机制（它拥有相当多的并发机制）。为了理解并发的含义，我们首先需要了解它相关的问题空间，以及程序并发运行任务意味着什么。\n\
  \n一个计算机进程（例如，在你的计算机上运行的一个程序实例）能够生成多个“线程”。每个线程都有能力执行自己独特的一组任务，并且与其他线程中执行的任务是分开的。但是，从同一进程生成的线程共享相同的内存空间。\n\
  \n从同一父进程生成的多个线程能够访问相同的内存空间这一事实可能是一个问题，因为如果我们并发执行代码（即 CPU 在执行线程之间进行“上下文切换”），那么意味着对内存中某块数据的更改可能来自多个地方。\n\
  \n这就是为什么 Clojure 提供了不同的机制¹来处理并发，并允许以同步和协调的方式进行更改。但是，在开始使用 Clojure 时，很难理解为什么有这么多方法可以以并发方式处理不可变数据，更重要的是，何时应该使用它们。\n\
  \n我发现最简单的解决方案是使用一个矩阵（表 8-1）。\n\n表 8-1.\n\nClojure 并发类型\n\n|   | 可重试 | 协调 | 异步 |\
  \ 线程安全 |\n| --- | --- | --- | --- | --- |\n| Delay |   |   | ✓ |   |\n| Future |\
  \   |   | ✓ |   |\n| Promise |   |   | ✓ |   |\n| Atom | ✓ |   |   | ✓ |\n| Lock\
  \ |   |   |   | ✓ |\n| Agent |   |   | ✓ | ✓ |\n| Transactions | ✓ | ✓ |   | ✓ |\n\
  | Channel |   |   |   | ✓ |\n\n注意\n\n“channel”类型指的是 `(chan)`，它不是标准库的一部分，需要从 `core.async`\
  \ 加载；而“transactions”指的是许多东西（我们稍后会看到），其中之一是 `ref` 类型。\n\n在表 8-1 中，你会看到我们有四个特性：可重试、协调、异步和线程安全。让我们回顾一下每个特性的含义，以便更好地理解该矩阵。\n\
  \n\n\n## 可重试\n\n对于所列类型之一，若要被视为“可重试”，必须发生了冲突（例如，已应用了多项更改），并且解决冲突必须需要重试该操作。\n\n解决冲突的一种实现方式是\
  \ CAS（比较并交换）操作，这是一种底层操作，语言 API 不会直接暴露它。一个典型场景是，当尝试更新某个值因跨线程冲突（例如，两个线程同时更新同一个值）而失败时。\n\
  \nCAS 操作的“比较”部分首先检查是否有任何变化。例如，它会检查当前值是否已被另一个线程篡改。如果是这种情况，则会执行该操作的“交换”部分，并应用请求的更新。另一方面，如果\
  \ CAS 检测到已经发生了更改，那么它将获取更新后的值并重试该操作。\n\n注意\n\nSTM（我们稍后会介绍）也被认为是可重试的，尽管它会重试操作，但这与\
  \ CAS 本身（一种底层原语）无关。\n\n## 协调\n\n对于所列类型之一，若要被视为“协调”，我们需要使用 Clojure 内置的 STM（软件事务内存）。STM\
  \ 会验证跨线程数据的一致性。\n\nSTM 和 CAS 之间的区别在于，STM 会协调（即检查）多个引用，而 CAS 只关心它自己的引用。\n\n“引用”这个概念目前可能无助于区分\
  \ CAS 和 STM，所以，别担心，稍后当我们研究如何创建和使用 `Ref` 类型时，我会更详细地讨论 STM，届时 STM 如何被视为“协调”而 CAS 被视为“非协调”应该会更清晰。\n\
  \n## 异步\n\n对于所列类型之一，若要被视为“异步”，它不应阻塞其当前线程的处理。你可能会发现，某个特定类型可能不会阻塞，要么是因为它确实是“异步”的（即，它在另一个线程中运行），要么是因为它不是一个“阻塞”调用，而只是等待其值在稍后的某个时间点被解析。\n\
  \n## 线程安全\n\n对于所列类型之一，若要被视为“线程安全”，它必须能在多个线程试图修改共享值时防止冲突。我们已经了解到，这可以通过使用 CAS 或 STM\
  \ 来实现，但我们将在本章后面看到实际的代码示例。\n\n现在，让我们来看一些每种类型的示例，以便我们更好地理解何时以及如何使用它们。\n\n## Delay\n\
  \n`delay` 函数是异步的，因为当你定义其行为时，该行为不会立即执行，而是等到将来某个时刻你“解引用”它时才会执行。正因如此，`delay` 函数不像原子或\
  \ ref 那样是一种严格的并发机制，尽管人们通常不认为它属于同一家族，但它仍然有能力阻塞你的程序，所以我认为将其纳入本章是相关的。\n\n澄清一下，解引用意味着获取值（对于\
  \ `delay` 来说，你是在强制某些行为发生）。你会看到所有并发机制——agent、atom、ref 等——都使用 `(deref …)` 函数来获取包含的值。\n\
  \n让人困惑的是，解引用一个值有时会导致当前线程阻塞，但这取决于你使用的机制以及代码运行的上下文。正如我们稍后将看到的，agent 即使在被解引用时也是非阻塞的。\n\
  \n另一方面，如果值已经可用（即，它已经被计算出来），那么调用 `deref` 会立即返回该值。但如果值尚未准备好，那么它可能仍在另一个线程上计算，因此你当前进行解引用调用的线程将被阻塞，直到值准备好。\n\
  \n注意\n\n`(deref x)` 的一个便捷简写是 `@x`，其中 `x` 是一个 delay/promise/future/atom/agent/var/ref。\n\
  \n`delay` 函数阻止一个动作立即发生。它是异步的，直到被解引用时为止，此时它会阻塞，直到行为完成。一旦 `delay` 被执行，它会缓存其返回值（示例见清单\
  \ 8-1）。\n\n```\n(def later (delay (prn \"hello\")))\n;; 立即返回，不阻塞\n;; ...在应用程序稍后的某个时刻...\n\
  @later ;; nil (打印 \"hello\")\n@later ;; nil (注意这次没有打印 \"hello\")\n清单 8-1.\n使用 delay\
  \ 的示例\n```\n\n在清单 8-1 中，我们可以看到，对 `later` 变量的第二次解引用调用不再打印消息 `\"hello\"`。这是因为分配给 `delay`\
  \ 的动作已经被计算并缓存了。在这种情况下，没有返回值，因此返回了 `nil`。\n\n使用 `delay` 时，你也可以使用 `force` 函数来代替 `deref`\
  \ 或 `@`（示例见清单 8-2）。Clojure 开发者倾向于使用 `force`，因为它在语义上感觉更准确（因为你是在强制 `delay` 执行）。所以，选择你觉得更自然的方式。我个人使用\
  \ `@`，这样我的代码与其他也使用该符号的可用机制保持一致。\n\n```\n(def d (delay (prn \"hello\")))\n;; 立即返回，不阻塞\n\
  (force d)\n;; nil (打印 \"hello\")\n清单 8-2.\n使用 force 的示例\n```\n\n注意\n\n你可以将超时机制与\
  \ `deref` 函数一起使用，但这仅适用于使用 `future` 或 `promise` 时（我将很快演示超时如何工作）。但请注意，超时功能不适用于 `@`\
  \ 宏。\n\n## Promise\n\n`promise` 很像 `delay`，因为它在创建时不会阻塞当前线程，直到被解引用。`promise` 与 `delay`\
  \ 的不同之处在于，它需要先有一个值被“交付”，然后才能成功解引用。\n\n`promise` 的好处是，要交付的值在创建 `promise` 时不必存在。该值可以是另一个函数的结果。\n\
  \n这就是为什么 `promise` 作为“回调”功能很有用；你可以将 promise 传递给其他函数，意图是解引用它们，同时使用单独的机制来交付其值。参见清单\
  \ 8-3。\n\n```\n(def foo (promise))\n(future\n  (prn \"子线程正在处理...\")\n  (Thread/sleep\
  \ 10000)\n  (deliver foo :bar))\n@foo\n;; :bar (阻塞直到 promise 有值被交付)\n清单 8-3.\npromise\
  \ 的示例\n```\n\n注意\n\npromise 的值一旦交付就不能更改。如果你尝试交付一个新值，它将被忽略。\n\n在清单 8-3 中，我们创建了一个\
  \ `promise` 并将其赋值给 `foo` 变量。然后我们使用一个 `future`（我将在下一节中更详细地讨论）来创建一个新线程，并从该独立线程向 `promise`\
  \ 交付值（本例中为 `:bar`）。\n\n最后，我们在父线程中解引用该 `promise`，并注意到该调用会阻塞父线程，直到 `future` 的线程完成处理并随后交付了\
  \ `promise` 的赋值。\n\n`promise` 只是一个将保存值的容器。由你的应用程序决定 `promise` 何时实际接收一个值，它通过使用 `deliver`\
  \ 调用传递一个值来实现这一点。\n\n在你的代码中任何期望一个值的地方，你都可以使用 `promise`。如果你有一个接受参数的函数，那么你可以传入一个 `promise`，并在未来的某个时间点解析它。\n\
  \n\n\n## Future\n\n`future` 允许在另一个线程中执行代码，这意味着它是非阻塞/异步的。如果你希望将某个特定的处理任务交给另一个线程，那么\
  \ `future` 就是你想要使用的工具。\n\n注意\n\nClojure 会从线程池中创建线程，并在内部为你管理这些线程。\n\n在 `future` 创建后的任何时刻，你都可以解引用它来获取其值。如果\
  \ `future` 的线程已经执行完毕（即，已完成值的计算），那么调用 `deref` 将返回计算出的值。\n\n否则，如果在调用 `deref` 时 future\
  \ 仍在运行，那么尝试解引用该 future 的线程（通常是主线程/父线程）将会被阻塞，直到该值可用为止。\n\n在清单 8-3（见前文）中，我们使用 `future`\
  \ 创建了一个子线程，并在该子线程中故意“休眠”了十秒钟才返回一个值，以模拟阻塞式 I/O 交互。\n\n运行清单 8-3 中代码的结果是：当父线程解引用该 `future`\
  \ 时，它被迫等待了十秒钟才返回一个值（因为当主线程解引用它时，该 `future` 尚未完成值的计算）。\n\n正如之前在讨论 `delay` 函数时提到的，在你预期\
  \ `future` 可能会阻塞的场景下，更推荐使用 `deref` 而不是简写形式的 `@` 宏，原因是长格式的 `deref` 允许你指定一个超时时间，并在超时发生时提供一个回退值。参见清单\
  \ 8-4。\n\n```\n(def f (future\n(Thread/sleep 10000)\n(println \"done\")\n100))\n\
  (deref f 500 \"fail\")\n;; \"fail\" (仅阻塞直到达到 500ms 超时)\n清单 8-4.\n设置超时和回退值的示例\n```\n\
  \n在清单 8-4 中，我们可以看到，当我们使用 `deref` 时，我们传入了几个额外的参数。第一个是 `500`，这是我们打算等待响应的毫秒数。第二个是 `\"\
  fail\"`，如果超过了 500ms 的阈值，这将是返回值。\n\n重要的是要认识到，在独立线程中执行的任务会继续计算。超时是针对解引用值的操作，而不是针对执行线程本身。因此，在我们的示例中，如果我们继续等待，然后在稍后某个时间执行\
  \ `(deref f)`，我们会看到值 `100` 被成功计算出来。\n\n## Atom\n\nAtom 既是线程安全的，也是可重试的。这意味着 atom\
  \ 使用一种称为 CAS（比较并交换）的技术来确保线程安全，从而避免了使用锁机制（我将在下一节讨论）的复杂性。\n\n使用 CAS 时，如果两个线程试图修改一个共享变量，每个线程都可以进行自己的更改，而不会被另一个线程阻塞。这样做的原因是，在\
  \ CAS 操作将更改提交给 atom 之前，它会验证 atom 的值是否没有改变。如果值没有改变，那就很好——它会提交新值；但如果值已经改变（例如，可能另一个线程先修改了它），那么它将使用新的\
  \ atom 值重新启动操作。\n\n更新 atom 的值需要使用 `swap!` 函数，该函数接受你想要修改的 atom 的名称以及一个将应用于 atom 值的函数作为参数（参见清单\
  \ 8-5）。\n\n```\n(def counter (atom 0))\n(swap! counter inc) ;; 1\n清单 8-5.\n使用 Atom\
  \ 的示例\n```\n\n注意\n\n`!` 后缀表示一个潜在的不安全方法；在函数式语言中，不安全通常意味着它会改变状态。\n\n正如你在清单 8-5 中所见，我们创建了一个新的\
  \ `atom`，将其初始值设为 0，并将其赋值给 `counter` 变量。然后我们使用 `swap!` 函数来修改 atom 的当前值。\n\n所以，在我们的例子中，我们使用了\
  \ `inc` 函数，但如果你需要以特定方式修改值或接受多个参数，你也可以使用匿名函数（或其简写形式）。\n\n```\n(def counter (atom\
  \ 0))\n(swap! counter inc) ;; 1\n(swap! counter #(+ 2 %)) ;; 3\n(swap! counter #(+\
  \ 2 %1 %2) 3) ;; 6\n清单 8-6.\n使用匿名函数操作 Atom 的示例\n```\n\n在清单 8-6 中，我们使用 `inc` 函数递增了\
  \ atom。接下来，我们使用一个匿名函数再次更新了 atom 的值。最后，我们使用相同的技术第三次更新了 atom，以演示 `swap!` 函数如何接受多个参数，然后将这些参数传递给指定的函数（即我们的匿名函数）。\n\
  \n注意\n\n当使用用户自定义函数时，请确保它是幂等的（即，无副作用），因为该操作可能会被重试，因此副作用也会被重放。\n\n在清单 8-7 中，我们利用 `set-validator!`\
  \ 函数来确保 atom 新计算出的值符合我们的预期（如果不符合，该值将被丢弃）。在给定的示例中，我们希望确保更新后的值始终是偶数。这类似于我们在第 5 章中学到的函数的前置-后置条件行为。\n\
  \n```\n(def counter (atom 0))\n(set-validator! counter #(even? %))\n(swap! counter\
  \ inc)\n;; IllegalStateException\n;; Invalid reference state clojure.lang.ARef.validate\n\
  (swap! counter #(+ 2 %))\n;; 2\n(swap! counter inc)\n;; IllegalStateException\n\
  ;; Invalid reference state  clojure.lang.ARef.validate\n(swap! counter #(+ 2 %))\n\
  ;; 4\n(set-validator! counter nil)\n(swap! counter inc)\n;; 5\n清单 8-7.\n验证 Atom\
  \ 的示例\n```\n\n在清单 8-7 中，你会看到我们的验证器函数确保 atom 只能被设置为偶数。如果我们单独使用 `inc`，它将产生一个奇数，因此会触发错误并阻止更改。\n\
  \n通过将指定 atom 的验证器函数重置为 `nil`，我们有效地从 atom 中移除了验证器。回顾清单 8-7，你会注意到在我们赋值 `nil` 之后，设置一个奇数（通过\
  \ `inc` 函数）会被成功接受。\n\n注意\n\n`set-validator!` 也适用于 agent/var/ref。\n\n\n\n如果你愿意，可以在创建原子（atom）时通过设置其\
  \ `:validator` 属性来内联定义验证器函数（示例见清单 8-8）。\n\n```\n(def counter (atom 0 :validator\
  \ #(even? %)))\n清单 8-8.\n内联验证示例\n```\n\n有时你可能想重置原子的值，而不必关心当前值。为此，你需要使用 `reset!`\
  \ 函数：`(reset! counter 0)`。\n\n你可能还希望仅当原子的当前值与某个预设条件匹配时才更改其值。为此，你可以使用 `compare-and-set!`\
  \ 函数。\n\n`compare-and-set!` 函数的工作原理是：如果原子的当前值与指定的值匹配，则返回 `true`（随后会继续应用请求的更改）；否则，如果当前值不匹配，则返回\
  \ `false` 且不应用更改。清单 8-9 展示了其工作原理。\n\n```\n(def counter (atom 0))\n(swap! counter\
  \ #(+ 4 %))\n@counter ;; 4\n(compare-and-set! counter 4 0) ;; true\n@counter ;;\
  \ 0\n(compare-and-set! counter 4 1) ;; false\n@counter ;; 0\n清单 8-9.\n验证特定条件的示例\n\
  ```\n\n请注意，在清单 8-9 中，第二次调用 `compare-and-set!` 函数后，`counter` 原子的值如何保持为零。这是因为我们指定仅当当前值为\
  \ 4 时才更改值，而当前值并非 4（在此之前它已被更改为零）。\n\n最后，在结束原子的话题之前，我们还应该了解如何监视原子的变化，并在满足特定条件时触发某些行为。这可以通过\
  \ `add-watch` 函数实现，该函数接受原子名称、监视器的任意名称以及一个在原子更新时执行的函数作为参数。详见清单 8-10。\n\n```\n(def\
  \ state (atom {}))\n(defn state-change [key atom old new]\n(prn (format \"key: %s,\
  \ atom: %s, old val: %s, new val %s\" key atom old new)))\n(add-watch state :foo\
  \ state-change)\n(swap! state assoc :bar \"baz\")\n清单 8-10.\n监视原子变化的示例\n```\n\n\
  在清单 8-10 中，当我们修改 `state` 映射数据结构时（本例中，我们通过 `:bar` 键及其关联值 `\"baz\"` 进行关联），屏幕上会打印出更改的内容。这是因为对原子的更改触发了我们创建的\
  \ `add-watch`。清单 8-10 的输出结果如清单 8-11 所示。\n\n```\n\"key: :foo, atom: clojure.lang.Atom@3e1b3567,\n\
  old val: {}, new val: {:bar \\\"baz\\\"}\"\n{:bar \"baz\"}\n清单 8-11.\n使用 add-watch\
  \ 的前一个程序的输出\n```\n\n注意\n\n要移除监视器，请运行 `(remove-watch atom key)`，并将 `atom` 和 `key`\
  \ 替换为适当的值。\n\n## 锁\n\n使用锁是解决多线程世界中并发问题的经典第一步。当有多个线程试图访问同一内存空间时，就会产生冲突。锁是一种处理并发的常见底层机制，但很难正确使用。这就是\
  \ Clojure 提供更高级抽象以实现“线程安全”的原因。\n\n其工作方式是在要操作的数据周围应用一个锁，从而阻止其他线程在数据被“锁定”期间对其进行操作。例如，如果有两个线程同时运行（A\
  \ 和 B），并且都想修改变量 `foo`，那么你就会面临一个不确定的事件（即，你不知道 A 和 B 谁会先访问到 `foo`）。\n\n通过在代码中使用锁，如果结果是线程\
  \ B 先访问到 `foo`，那么由于它先到达，它就能在 `foo` 周围应用一个锁，因此当线程 A 试图访问 `foo` 时，它无法访问，必须等待直到线程 B\
  \ 完成。当线程 B 完成时，锁被释放，这样线程 A 就可以获取锁，并在持有锁期间阻止任何其他线程访问 `foo`。\n\n锁并不理想，因为在试图确定获取锁的正确顺序时，它们可能变得非常复杂。这之所以重要，是因为锁机制可能导致通常所说的死锁/活锁。这在利用多个锁的系统中更为明显（而不是仅使用单个锁的简单示例）。\n\
  \n### 死锁\n\n死锁是指两个或多个线程陷入困境，因为它们都在等待另一个线程完成（但另一个线程也在等待其他被锁定的线程完成），这意味着无法取得任何进展，系统被锁定。\n\
  \n一个常见的例子是两个人互相鞠躬。这两个人必须遵守的规则是，你必须保持鞠躬姿势，直到对方有机会回礼。但如果两人同时鞠躬，那么他们将永远等待对方。\n\n###\
  \ 活锁\n\n活锁在某些方面与死锁相似，但略有不同：两个或多个线程无法进展，不是因为它们被阻塞，而是因为它们彼此之间忙个不停。\n\n通常给出的例子是走廊里的两个人不断向同一侧移动以避免对方；他们没有被阻塞，只是永远忙于试图让对方通过。\n\
  \n注意\n\n原子与锁的不同之处在于，它使用 CAS（比较并交换）而非锁机制；这意味着锁不会像原子那样“重试”。\n\n清单 8-12 演示了如何通过原子控制对共享变量的访问。在该示例中，我们想要控制如何将项目添加到向量中。我们希望结果是\
  \ `[1 2]`。\n\n现在，在查看清单 8-12 之前，我们应该澄清一下，原子（正如我们在上一节中看到的）已经是线程安全的，因为它们使用 CAS 机制来防止多线程更改造成混乱，因此没有太多理由选择非常底层的锁机制而不是像\
  \ CAS 这样的抽象。\n\n```\n(def foo (atom []))\n(future\n(locking foo\n(Thread/sleep 1000)\n\
  (swap! foo #(conj % 1))))\n(locking foo\n(swap! foo #(conj % 2)))\n@foo\n;; [1 2]\n\
  清单 8-12.\n锁定代码块的示例\n```\n\n如果我们没有在 `swap!` 执行周围使用 `locking` 机制（你会注意到我们定义了两个锁定块），那么将会出现不一致的执行路径。\n\
  \n想象一下，如果在清单 8-12 中没有使用锁定块，会发生什么情况：在 `future` 线程内部调用的 `sleep` 意味着，在 `future` 线程内部的\
  \ `swap!` 完成计算之前，`future` 线程外部的 `swap!` 调用会先完成，因此结果将是 `[2 1]`，而不是我们期望的 `[1 2]`。\n\
  \n注意\n\n在清单 8-12 中，你会注意到我们必须锁定 `foo` 两次。仅从子线程内部锁定 `foo` 不足以阻止该值被交换出去。这就是在实际应用中事情变得复杂的地方：在我们这个愚蠢的例子中，访问\
  \ `foo` 的代码彼此紧挨着，但在实践中很少出现这种情况，因此你很容易遗漏应该应用锁的地方，从而导致应用程序以意想不到且难以调试的方式崩溃。\n\n\n\n\
  ## Agent（代理）\n\nAgent 有点像异步版本的 Atom（原子）：它是一个共享的可变值，非阻塞（直到你尝试解引用该值），并且也是非协调的。\n\n\
  注意\n\n我们尚未讨论协调的含义，但将在下一节中介绍。目前，只需知道非协调类型（如 agent 或 atom）仅表示一个独立的值即可。\n\n要修改 agent\
  \ 中包含的值，你有两种方法可用：\n\n1.  `send`  \n2.  `send-off`  \n\n这两个函数具有相同的签名 `(a f & args)`，这意味着它接受一个对\
  \ Atom 的引用（`a`），后跟一个应改变其值的函数（`f`——这通常被称为动作），再后跟该动作所需的任意数量的参数（`& args`）。请参见清单 8-13。\n\
  \n```\n(def a (agent 0))\n(send a inc)\n@a\n;; 1\n清单 8-13.\n向 Agent 发送值的示例\n```\n\
  \n注意\n\n你可以向一个 agent 触发多个动作，它们会被存储在队列中并按顺序处理。\n\n现在，`send` 和 `send-off` 之间有一个细微差别需要你注意：前者在从托管线程池中选取的独立线程中运行，而后者则在一个专门为该\
  \ agent 创建的新线程中运行。\n\n大多数情况下你会使用 `send` 函数，但如果你需要应用一个 I/O 阻塞动作，那么你应该改用 `send-off`，因为这能让该线程从容处理，最终不会耗尽共享线程池的资源。\n\
  \nAgent 与其他类型（如 atom、future 和 promise）的一个重要区别在于：获取 agent 的值（解引用）不会导致当前线程阻塞。请参见清单\
  \ 8-14。\n\n```\n(def a (agent 0))\n(future\n(Thread/sleep 5000)\n(prn \"increment\
  \ the value\")\n(send a inc))\n@a ;; 0\n;; 5 seconds later...\n@a ;; 1\n清单 8-14.\n\
  解引用 Agent 是非阻塞的\n```\n\n由于 agent 是完全非阻塞的（即使在解引用时），如果你需要确保一组动作在继续执行前已完成，那么你需要自行管理此过程，或者利用\
  \ `await` 和 `await-for` 函数，它们为你提供了此行为。\n\n这两个函数的区别在于：后者允许你指定一个超时时间：`(await-for timeout\
  \ agent)`。让我们看一些示例来演示如何使用这些函数。\n\n### 不使用 wait/wait-for\n\n在清单 8-15 中，我们可以看到我们向一个\
  \ agent 发送了两个动作。这两个动作在修改 agent 的值之前都休眠十秒钟。当我们解引用 agent 时，它是非阻塞的，因此我们看到返回的是初始值（零）。如果稍后再次解引用，那么我们将看到最终值。\n\
  \n```\n(def a (agent 0))\n(send a #(do (Thread/sleep 10000) (prn \"added 5\") (+\
  \ % 5)))\n(send a #(do (Thread/sleep 10000) (prn \"added 2\") (+ % 2)))\n@a ;; 0\n\
  清单 8-15.\n标准非阻塞 Agent 解引用示例\n```\n\n### 使用 wait\n\n在清单 8-16 中，我们使用了与清单 8-15 相同的示例，但这次我们使用了\
  \ `await` 函数而不是普通的 `deref` 调用。我们可以看到返回的值是 `nil`，但我们会阻塞直到动作完成。一旦完成，我们可以解引用 agent\
  \ 并立即获得最终值。\n\n```\n(def a (agent 0))\n(send a #(do (Thread/sleep 10000) (prn \"\
  added 5\") (+ % 5)))\n(send a #(do (Thread/sleep 10000) (prn \"added 2\") (+ % 2)))\n\
  (await a)\n;; nil\n清单 8-16.\n等待动作完成的示例\n```\n\n### 使用 wait-for\n\n在清单 8-17 中，我们使用了与清单\
  \ 8-16 相同的示例，但这次我们使用了 `await-for` 函数而不是 `await` 调用。我们可以看到返回的值是 `false`，这表明已到达超时时间，并且在超时之前我们没有收到值。\n\
  \n如果我们现在解引用 agent，我们会发现值仍然是零。它将保持为零，直到两个动作完成。使用 `await-for` 的好处在于我们能够安全地退出阻塞动作（这些动作可能会阻塞很长时间）。\n\
  \n```\n(def a (agent 0))\n(send a #(do (Thread/sleep 10000) (prn \"added 5\") (+\
  \ % 5)))\n(send a #(do (Thread/sleep 10000) (prn \"added 2\") (+ % 2)))\n(await-for\
  \ 500 a)\n;; false\n清单 8-17.\n等待动作完成——带定时器——的示例\n```\n\n\n\n### Agent 错误\n\n如果你导致一个\
  \ agent 出错，那么它会静默地出错（取决于错误类型）。过去，我曾导致一个 agent 失败，然后后来疑惑为什么我通过 `send` 调用发送的操作都没有被执行。让我们看一个导致\
  \ agent 失败的例子以及它的反应，如清单 8-18 所示。\n\n```\n(def a (agent 0))\n(send a #(/ % 0))\n\
  ;; 导致 agent 进入失败模式（未显示错误）\na\n;; #object[clojure.lang.Agent 0xf1c5585 {:status :failed,\
  \ :val 0}]\n清单 8-18.\nAgent 失败示例\n```\n\n注意\n\n清单 8-18 的最后一行引用了该 agent，因此我们看到了其内部表示。在该表示中，你会注意到\
  \ `:status :failed`。\n\n这种静默地变为失败状态的问题在于，所有未来的 `send` 命令也会失败，直到 agent 的状态被改回 `:ready`。\n\
  \n如果你需要验证 agent 收到了什么错误，可以调用 `agent-error` 函数并传入你想要检查的 agent；这将返回指定 agent 的最后一个已知错误。\n\
  \n此时，我们可以做几件事：第一是为你的 agent 定义一个错误处理器，这样当问题发生时就会变得清晰；第二是在你的代码意识到问题后重启 agent。参见清单\
  \ 8-19。\n\n```\n(def a (agent 0))\n(defn h [a e]\n(prn \"Agent value: \" @a)\n(prn\
  \ \"Agent error: \" e))\n(set-error-handler! a h)\n(send a #(/ % 0)) ;; 打印以下内容...\n\
  ;; \"Agent value: \" 0\n;; \"Agent error: \" #error{:cause \"Divide by zero\"...\n\
  清单 8-19.\nAgent 错误处理示例\n```\n\n注意\n\n要移除错误处理器，你需要再次调用 `set-error-handler!` 函数，并传入\
  \ `nil` 作为处理器值。\n\n此时，agent 处于失败状态，因此如果你尝试向它发送另一个操作，该操作将无法执行。要解决这个问题，我们需要重启 agent，可以使用\
  \ `(restart-agent a 0)` 来实现，其中我们向 `restart-agent` 函数提供要修改的 agent（`a`）以及我们希望 agent\
  \ 重启时使用的新值（`0`）。\n\n如果你希望用 agent 的最后一个已知值来重启它，可以将提供的值替换为 agent 的解引用值：`(restart-agent\
  \ a @a)`。\n\n现在，你可能希望 agent 自动重启。这是可能的，但并不像你想象的那么简单（例如，仅仅在错误处理器中调用 `restart-agent`）。清单\
  \ 8-20 将演示一种可能的解决方案，该方案利用 `future` 将对 `restart-agent` 的调用与错误处理器解耦。\n\n问题的真正原因在于，agent\
  \ 实际上直到错误处理器执行完毕才会被标记为“失败”。这就是为什么使用 `future` 可以解决这个问题，因为它意味着错误处理器可以结束（因为 `future`\
  \ 在单独的子线程上异步执行），并且 agent 的重启将会成功。\n\n我通过将对 `restart-agent` 的调用包装在 try/catch 语句中发现了这一点，这揭示了消息“Agent\
  \ does not need a restart.”\n\n注意\n\n重启 agent 时，任何已排队的操作将继续被处理，除非你在重启 agent 时提供了\
  \ `:clear-actions true` 选项：\n\n```\n(restart-agent a @a :clear-actions true)\n```\n\
  \n```\n(def a (agent 0))\n(defn h [a e]\n(prn \"Agent value: \" @a)\n(prn \"Agent\
  \ error: \" e)\n(future (restart-agent a 0)))\n(set-error-handler! a h)\n(send a\
  \ inc)\na ;; 1\n(send a #(/ % 0))\n;; 错误处理器 h 将被触发\n(send a inc)\na ;; 1\n清单 8-20.\n\
  尝试自动重启失败的 Agent\n```\n\n## 事务\n\nClojure 自带了自己的 STM（软件事务内存）。本质上，STM 的工作方式很像 CAS（比较并交换）操作，我们在之前讨论原子时已经见过。它们之间的区别在于，STM\
  \ 不像原子（它是“非协调的”）那样只关心单个值，而是能够同时引用多个值（因此，STM 被认为是“协调的”）。\n\n使用 STM 时有几个活动部件：\n\n\
  *   `dosync`\n*   `ref`\n*   `ref-set`\n*   `alter`\n*   `ensure`\n*   `commute`\n\
  \n### dosync/ref/alter\n\n第一个项（`dosync`）是事务容器，所有与 STM 执行相关的内容都应发生在这个形式内。第二个项（`ref`）是“引用”类型，它将持有要存储/验证/更新的值。\n\
  \n所有其他列出的项都是只能从事务内部使用的函数。这意味着任何尝试在 `dosync` 形式外部使用 `ref-set`、`alter`、`ensure` 或\
  \ `commute` 函数的操作都会导致错误。参见清单 8-21。\n\n```\n(def r (ref 0))\n(dosync\n(alter r inc))\n\
  ;; 1\n清单 8-21.\n简单事务\n```\n\n在清单 8-21 中，我们创建了一个新的 `ref` 类型 `r`，并为其分配了初始值 `0`。设置完成后，我们使用\
  \ `dosync` 打开一个事务，并在其中将 `ref` 实例传递给 `alter` 函数，该函数将提供的函数（本例中为 `inc`）应用于 `ref` 当前持有的值。\n\
  \n与原子类型非常相似，我们需要确保 `dosync` 块内发生的任何操作都是幂等的，因为如果不同引用之间发生冲突，STM 可能会重新启动/重放整个事务。\n\n\
  ### ref-set\n\n在清单 8-22 中，我们将使用 `ref-set` 来更改 `ref` 实例的值。这允许我们使用另一个直接值来更改值，而不是使用函数来修改值。\n\
  \n```\n(def r (ref 1))\n(dosync\n(ref-set r 0))\n;; 0\n清单 8-22.\nref-set 允许分配字面值的示例\n\
  ```\n\n\n\n### STM 重启策略\n\n在清单 8-23 中，我们将看到如何使用 `alter` 函数来修改 `ref` 的值。这很可能是在处理\
  \ STM 时最常用的操作。STM 会尝试检测 `ref` 在其事务外部是否发生了更改，如果确实发生了更改，则会重启该事务。\n\n你将在清单 8-23 中看到，我们尝试使用多个\
  \ `future` 同时修改该值三次（请记住，`future` 会在与父线程不同的独立线程中运行）。\n\n请先通读代码，然后我将开始分解 STM 为解决其面临的冲突所采取的过程，这要归功于一个相当简单的多线程程序。\n\
  \n```\n(def r (ref []))\n(defn modify [r, f, a, s]\n(dosync\n(Thread/sleep s)\n\
  (alter r f a)))\n(future (modify r conj :a 2000))\n(future (modify r conj :b 1000))\n\
  (future (modify r conj :c 0))\n@r\n;; [:c :b :a]\n清单 8-23.\nSTM 重启策略如何工作的示例\n```\n\
  \n如果你立即尝试解引用 `r`，你会注意到它只包含一个值 `[:c]`；然后一秒钟后，它会包含 `[:c :b]`；最后三秒钟后，它会包含最终的集合 `[:c\
  \ :b :a]`。\n\n在清单 8-23 中，我们可以看到用户自定义的函数 `modify`，它首先启动一个事务（使用 `dosync`），然后休眠指定的秒数，再使用\
  \ `alter` 修改提供的引用变量内的值。\n\n接着，我们启动三个线程（使用 `future`），并在每个线程中执行用户自定义函数 `modify`，同时向其传递相关的引用值、函数和休眠参数。\n\
  \n我们使用了非常具体的休眠值来演示，在应用程序设计过程中，非确定性代码并不一定会按照其定义的顺序完成。\n\n注意\n\n需要明确的是，我仅使用 `(Thread/sleep)`\
  \ 来模拟非确定性行为。你的应用程序代码可能会使用某种形式的阻塞 I/O，其完成时间各不相同。因此，多次执行该代码可能会导致不同的结果顺序。\n\n在清单 8-23\
  \ 中，STM 采取的过程如下（这是一个过度简化的描述，但至少能让你了解其工作原理）：\n\n*   `:a` 被传入（代码暂停两秒）。\n*   `:b` 被传入（代码暂停一秒）。\n\
  *   `:c` 被传入。\n    *   `alter` 函数使 STM 检查自事务开始以来 `ref` 的值是否已更改。\n    *   此时值仍然是\
  \ `[]`（因为其他调用处于暂停状态）。\n    *   更新后的值被应用。\n*   `:b` 解除暂停并检查 `ref` 的值（因为它即将应用 `conj`\
  \ 函数）。\n    *   值不再是 `[]`，而是 `[:c]`，因此 STM 重启事务。\n    *   此时 `:a` 仍处于暂停状态，因此事务完成。\n\
  *   `:a` 解除暂停并检查 `ref` 的值。\n    *   值不再是 `[]`，而是 `[:c :b]`，因此 STM 重启事务。\n    * \
  \  事务完成，因为没有其他事务导致重启。\n    *   这意味着 `ref` 的值（最终）是 `[:c :b :a]`。\n\n在现实场景中，事务完成所需的时间不会像刚才的例子那样清晰，但这至少让你了解了处理\
  \ STM 时所涉及的过程。\n\n### 嵌套事务\n\nClojure 的 STM 实现也支持嵌套事务。在清单 8-24 中，你将看到两个示例。第一个示例将突出显示在独立线程中执行的嵌套事务如何启动一个新事务，而第二个示例定义了一个新的\
  \ `dosync` 块，但由于它在与外部 `dosync` 块相同的线程上运行，因此它不会创建新事务，所以行为/结果有所不同。\n\n```\n(def r\
  \ (ref 0))\n(dosync\n(future (dosync (Thread/sleep 50) (println :foo) (alter r inc)))\n\
  (println :bar)\n(alter r inc))\n;; :bar\n;; 1\n;; :foo\n;; :foo (表示事务重启，因为 ref 被外部修改)\n\
  ;; 2\n;; 未生成新线程，因此 ref 被修改两次\n;; 而内部事务不会被重试\n(def r (ref 0))\n(dosync\n(dosync (Thread/sleep\
  \ 50) (println :foo) (alter r inc ))\n(println :bar)\n(alter r inc))\n;; :foo\n\
  ;; :bar\n;; 2\n清单 8-24.\n嵌套事务示例\n```\n\n### ensure\n\n为了避免出现死锁或活锁情况（即竞争事务依赖于多个引用），我们可以利用\
  \ `ensure` 函数来保护引用免受其他事务的修改。\n\n在清单 8-25 中，你可以看到我们有两个引用：`current-account` 和 `savings-account`，它们相加后的总值为\
  \ 1100。我们唯一的条件是这两个账户的总和不能低于 1000。\n\n在给定的示例中，我们尝试同时从两个账户中减去 100。这些请求中只有一个会成功，因为我们要求最低值为\
  \ 1000 的约束意味着两个请求不能同时成功，因为那样我们会低于约束阈值。这个困境很好地说明了简单的并发需求如何导致争用。\n\n```\n(def current-account\
  \ (ref 500))\n(def savings-account (ref 600))\n(defn withdraw [from available amount]\n\
  (dosync\n(let [total (+ @from (ensure available))]\n(Thread/sleep 1000) ; 允许更明显的上下文切换\n\
  (if (>= (- total amount) 1000)\n(alter from - amount)\n(println \"抱歉，无法从 \"\n(:name\
  \ (meta (var current-account)))\n\" 中提取 100，因为违反了约束\")))))\n(println \"之前：活期账户余额为\"\
  \ @current-account)\n(println \"之前：储蓄账户余额为\" @savings-account)\n(println\n\"之前：总余额为\"\
  \n(+ @current-account @savings-account))\n(future (withdraw current-account savings-account\
  \ 100))\n(future (withdraw savings-account current-account 100))\n(Thread/sleep\
  \ 2000)\n;; 休眠足够长的时间以允许两个事务完成\n(println \"之后：活期账户余额为\" @current-account)\n(println\
  \ \"之后：储蓄账户余额为\" @savings-account)\n(println\n\"之后：总余额为\"\n(+ @current-account @savings-account))\n\
  清单 8-25.\n使用 ensure 协调多个条件的示例\n```\n\n从清单 8-25 可以预期的输出如清单 8-26 所示。\n\n```\n之前：活期账户余额为\
  \ 500\n之前：储蓄账户余额为 600\n之前：总余额为 1100\n抱歉，无法从 current-account 中提取 100，\n因为违反了约束\n\
  之后：活期账户余额为 500\n之后：储蓄账户余额为 500\n之后：总余额为 1000\n清单 8-26.\n清单 8-25 程序的输出\n```\n\n如果我们看看正在发生的事情，可能看起来有很多内容需要消化，但请记住，这些都是我们已经见过的代码，因此通过逐行阅读，你应该能够看到，最终，我们是在事务内部使用\
  \ `ensure` 来保护 `available` 这个引用免受修改。\n\n如果 `available` 在事务外部被修改，那么 STM 将使用最新的值重启事务，然后我们就能知道是否可以安全地继续扣除指定金额。\n\
  \n注意\n\n花些时间仔细回顾前面的代码；不要急于求成。在多线程的上下文中，确保你理解正在发生的事情以及发生的时间。\n\n\n\n### commute\n\
  \n`commute` 函数在修改指定引用时提供了一种“最后写入者获胜”的行为，当你希望获得最高并发性且操作顺序无关紧要时（事务旨在防止对 `ref` 的多次同时写入），该函数最为有用。\n\
  \n本质上，`commute` 会立即返回对引用应用所提供函数的结果，但在事务结束时，它会再次同步执行计算，并在此时实际更新引用的值。这种修改本身是可交换的，因此不会有任何事务被回滚。\n\
  \n这就是为什么在清单 8-27 中，执行该示例代码时你可能会多次看到相同的值被打印出来，但最终的实际结果始终是一致的。\n\n```\n(def foo (ref\
  \ 0))\n(defn inc-ref [r]\n(dosync\n(commute r inc)\n(println @r)))\n(let [threads\
  \ (for [x (range 0 20)] (Thread. #(inc-ref foo)))]\n(doall (map #(.start %) threads))\n\
  (doall (map #(.join %) threads))\n(inc-ref foo))\n清单 8-27.\n使用 commute 的示例\n```\n\
  \n注意\n\n我们使用 `Thread.` 而不是 `future`，以便能够更精细地控制线程的执行时机，同时也表明我们希望等待所有线程完成后再继续执行。\n\
  \n如果你运行清单 8-27 中的代码，但将其修改为使用 `alter` 而不是 `commute`，那么你会注意到 `alter` 如何强制更新顺序，因此打印的值总是精确地从\
  \ 1 计数到 21（而 `commute` 的最终结果仍然是 21，但达到该结果的过程是可交换的）。\n\n## 通道\n\n现在我们已经介绍了所有标准核心库的并发特性，还有一项需要考虑，那就是通道的使用，它仅在\
  \ `core.async` 库中可用。\n\n要使用 `core.async`，你需要告诉 Leiningen 加载它（类似于我们在前一章中对 `core.match`\
  \ 所做的操作）。目前最简单的方法——因为我们仍在 REPL 中运行所有示例——是停止你当前打开的 REPL（按 `<Ctrl-d>` 即可），然后创建以下 `project.clj`\
  \ 文件（如果你已有 `project.clj` 文件，则添加新行）。参见清单 8-28。\n\n```\n(defproject test \"0.1.0-SNAPSHOT\"\
  \n:dependencies [[org.clojure/clojure \"1.8.0\"]\n[org.clojure/core.async \"0.3.442\"\
  ]])\n清单 8-28.\n使用 core.async 依赖更新项目\n```\n\n创建此文件后，使用 `lein repl` 重新启动 REPL（Leiningen\
  \ 将使用 `project.clj` 的内容来设置其环境），并执行清单 8-29 中的代码行。\n\n```\n(require '[clojure.core.async\
  \ :as async :refer :all])\n清单 8-29.\n将 core.async 加载到正在运行的 REPL 实例中\n```\n\n注意\n\
  \n同样，不必担心理解项目文件或 `require` 函数调用的语法，我将在后续章节更详细地讨论 Leiningen 时很快解释这一切。\n\n此时，你将拥有一组可用的宏（例如\
  \ `<!!`、`>!!`、`chan`、`buffer` 等）。\n\n`core.async` 的理念借鉴自 Go 语言 ²（谷歌自己广受欢迎的编程语言，其并发原语在开发者社区中备受推崇）。\n\
  \n尽管 Go 语言在现代使通道概念流行起来功不可没，但通道的设计可以追溯到 20 世纪 70 年代，始于 Tony Hoare 撰写的一篇名为《通信顺序进程》（CSP）的论文。\n\
  \n实际上，通道就是一个管道：你将数据从一端塞入，然后从另一端取出。从并发的角度来看，它之所以效果很好，是因为它保护了管道中的数据免受其他线程/进程的干扰。\n\
  \n使用通道最具挑战性的部分可能是，当你放入/取出数据时，它会阻塞你的应用程序。这是因为从根本上说，它们是在连接不同的进程。我们几乎总是将通道与另一个称为 go\
  \ 块的概念一起使用。但我稍后会回到这个话题；首先，我认为一个简单的示例是必要的。参见清单 8-30。\n\n注意\n\n以下代码将无限期地阻塞正在运行的进程。你可以在\
  \ REPL 中按 `<Ctrl-c>` 来解除阻塞，但在设计应用程序时，明智的做法是注意通道如果设置不当可能会阻塞进程。\n\n```\n(def c (chan))\n\
  (>!! c :foo)\n;; 将阻塞，直到有东西\n;; 从通道的另一端取出 :foo\n清单 8-30.\n一个会阻塞的通道的简单示例\n```\n\n\
  在清单 8-30 中，我们可以看到我们创建了一个变量 `c`，并为其分配了一个新的 `chan`（通道）。一旦有了这个通道，我们就可以使用 `>!!` 将值放入通道，使用\
  \ `<!!` 从通道中取出值。\n\n前面示例的问题在于，一旦你调用 `<!!`，它就会无限期地阻塞。理想情况下，你希望做的是（至少对于一个可运行的示例而言）使用另一个线程将值放入通道，因为至少新生成的线程可以被阻塞，而不是阻塞你的主线程并导致\
  \ REPL 锁定！\n\n清单 8-31 演示了一个稍微实用一些的示例，它不会阻塞你的 REPL。\n\n```\n(def c (chan))\n(future\
  \ (>!! c :foo))\n;; 这个线程将被阻塞\n(<!! c)\n;; :foo\n清单 8-31.\n一个不会阻塞的通道的简单示例\n```\n\n\
  在清单 8-31 中，我们将一条消息放入通道（在本例中，消息是关键字 `:foo`），并且由于这是在子线程中完成的（得益于使用了 `future`），我们能够继续在\
  \ REPL 的父线程中工作。从这里，你可以看到我们现在正在从通道中取出任何可用的值（使用 `<!!`），并且由于值可用，我们不会阻塞。\n\n那么，举例来说，假设我现在想从我的通道\
  \ `c` 中再取出一个值。好吧，我已经取出了值 `:foo`，并且我知道通道中已经没有东西可取了，那么会发生什么呢？嗯，如果我再次取出（例如 `(<!! c)`），那将阻塞我的整个线程，直到我程序中的其他某处有代码将值推入通道（从而使我的取出操作解除阻塞）。\n\
  \n为了避免这个问题（同样，为了在 REPL 中进行实验），我们可以再次利用 `future`。参见清单 8-32 中的示例。\n\n```\n(future\n\
  (prn (str \"嘿！一个新值 \" (<!! c))))\n;; 将阻塞，直到有值被放入通道\n(>!! c \"bar\")\n;; true (+\
  \ 副作用：打印出 \"嘿！一个新值 bar\")\n清单 8-32.\n通过 future 将值放入通道\n```\n\n\n\n### Go 块\n\n在通道中使用\
  \ `future` 的问题在于，`future` 会从线程池中获取线程。因此，一开始可用的线程数量是有限的。\n\n如果你通过通道的推/拉操作阻塞了一个线程，那么可用于多线程处理工作负载的线程就会减少一个。\n\
  \n注意\n\n`Future` 与代理共享一个线程池。\n\nClojure 的 `core.async` 库还提供了一个 `go` 函数，它就像一个异步包装器：你提供给\
  \ `go` 块的主体将在单独的线程上异步执行，并且该线程来自专门用于 `go` 块的线程池。\n\n好的，那么 `go` 块拥有一个独立的线程池，但它与 `future`\
  \ 有何不同呢？嗯，使用 `go` 时，你可以“停放”一个线程，而不是阻塞它。\n\n“停放”意味着进程会从线程中移除，从而允许该线程被另一个 `go` 块进程使用。当另一个进程完成后，它会被放回线程以完成执行（参见清单\
  \ 8-33 的示例）。\n\n```\n(go\n(Thread/sleep 1000)\n(dotimes [x 5] (prn x)))\n(prn \"\
  我没有被阻塞\")\n;; 这行会立即打印（随后打印数字 0-4）\n清单 8-33.\ngo 块的简单示例\n```\n\n在 `go` 块内部使用通道时，需要注意，推入和拉取值所用的语法与在\
  \ `go` 块外部使用通道时略有不同（这是因为我们之前提到的关于“停放”`go` 块，而不是阻塞其运行所在的线程）。\n\n通道推/拉操作的语法是 `>!!`\
  \ 和 `<!!`，但在 `go` 块内部使用通道时，语法变为 `<!` 和 `>!`，这会导致进程被停放。这意味着，当现有的 `go` 进程被阻塞时，`go`\
  \ 线程池中的线程可以被重用。参见清单 8-34。\n\n```\n(def c (chan))\n(go\n(dotimes [x 10]\n(Thread/sleep\
  \ 1000)\n(>! c x))) ;; 每秒向通道放入一个新数字\n(go\n(while true\n(prn (<! c)))) ;; 永远从通道拉取内容并打印\n\
  清单 8-34.\n将 go 块与通道一起使用\n```\n\n在清单 8-34 中，我们最终每秒打印一个数字，打印出 0 到 9。`future` 和 `go`\
  \ 块的另一个区别是，你可以访问 `future` 的返回值，而对于 `go` 块，你总是会返回一个通道类型，该通道会传递最后执行的表达式（参见清单 8-35）。\n\
  \n```\n(def f (future (inc 1)))\n@f\n;; 2\n(def g (go (inc 1)))\n;; ManyToManyChannel\n\
  (<!! g)\n;; 2\n清单 8-35.\nGo 块返回通道类型\n```\n\n### 线程函数\n\n现在，你可能想知道 Clojure 还能提供多少种异步机制？嗯，`core.async`\
  \ 还为我们提供了 `thread` 函数。实际上，它允许我们在另一个线程中执行代码（这没什么新意，很像 `go` 和 `future`），并且它也会返回一个通道，其中包含了最后放入通道的表达式（再次像\
  \ `go` 一样，所以也没什么额外的）。\n\n唯一真正的区别在于，该线程是从一个“无界”线程池中获取的（这意味着它在理论上可以创建无限数量的线程）。\n\n\
  `(thread)` 的使用场景是，当你有一个长时间运行的进程，该进程可能会长时间阻塞，如果你改用 `go` 块，则会导致你的线程池被阻塞。但请记住，创建线程是一项昂贵的操作，而这正是线程池的优势所在。\n\
  \n注意\n\n当我刚开始接触 Clojure 时，它提供的并发机制数量让我不知所措。直到我真正理解了问题领域，才明白所有这些机制确实都有其用途和存在的理由。\n\
  \n### 区别\n\n通常不太明确的一点是，你究竟应该在何时使用通道。经验法则似乎是这样的：\n\n*   如果你需要将一个同步过程变为异步，则创建一个线程（使用\
  \ `future`）。\n*   如果你正在使用的 API 或代码已经是异步的，那么使用 `go` 块。\n\n我还没有找到完全不符合这个规则的例子（至少在我使用\
  \ Clojure 的工作中是这样），但你的情况可能会有所不同。\n\n在我们继续之前，`core.async` 还提供了一些其他有趣的功能：\n\n*   `alt!`/`alt!!`\n\
  *   缓冲通道\n    *   滑动/丢弃通道缓冲区\n*   超时\n\n### 交替\n\n让我们从 `alt` 函数开始（我认为它代表 alternate？正如你将看到的，它会在提供的通道之间进行交替）。\n\
  \n`alt!`（停放）变体必须在 `go` 块内部调用，而 `alt!!` 变体可以在外部调用（类似于 `>!` 与 `>!!`）。你向 `alt!` 函数传递一组通道，哪个通道先获得值，就返回哪个通道（参见清单\
  \ 8-36）。\n\n```\n(def a (chan))\n(def b (chan))\n(def c (chan))\n(defn put-data\
  \ [c n]\n(go (Thread/sleep (rand 10))\n(>! c (str \"Hi \" n))))\n(put-data a \"\
  A\")\n(put-data b \"B\")\n(put-data c \"C\")\n(let [[result channel] (alts!! [a\
  \ b c])]\n(prn \"结果: \" result)\n(prn \"通道: \" channel))\n清单 8-36.\n使用 alt!! 函数的示例\n\
  ```\n\n在清单 8-36 中，我们创建了三个独立的通道和一个名为 `put-data` 的函数，该函数在将值放入提供的通道之前会休眠一段不确定的时间。\n\
  \n然后我们有一个 `let` 块，它获取结果（以及产生该结果的通道）并打印出来。我们使用 `alt!!` 来确定哪个通道最先接收到值（其他结果将被丢弃）。\n\
  \n### 缓冲通道\n\n接下来我们要介绍的是缓冲通道（及其变体：滑动和丢弃）。默认情况下，通道是无缓冲的，所以到目前为止，当我们创建一个通道时，如果你推入一个值，通道就会变满，你的线程将被阻塞，直到该值被从通道中拉出。\n\
  \n为了允许更大的并发性，你可以使用预定义的缓冲区空间来创建通道。假设缓冲区大小为 5，你可以向通道推入 5 个值而不会阻塞。参见清单 8-37。\n\n```\n\
  (def c (chan 5))\n(def v [:a :b :c :d])\n(dotimes [i 4]\n(>!! c (nth v i))\n(prn\
  \ \"将 \" (nth v i) \" 放入通道。下一步...\"))\n清单 8-37.\n缓冲通道示例\n```\n\n在清单 8-37 中，如果在创建通道时我们没有为其指定\
  \ `5` 的缓冲区大小，那么第一次调用 `>!!` 就会无限期地阻塞我们 REPL 的线程，直到我们要么终止正在运行的进程，要么在代码中已经定义了一个可以从通道中提取值的位置。\n\
  \n\n\n### 滑动/丢弃缓冲通道\n\n我们可以借助 Clojure 将缓冲通道的概念进一步延伸，根据应用需求使用**滑动缓冲区**或**丢弃缓冲区**。\n\
  \n滑动缓冲区是指当另一个值被推入通道时，会丢弃第一个缓冲值（从结构上看，这类似于队列，但队列不会自动丢弃元素；这是 Clojure 的抽象为我们提供的功能）。丢弃缓冲区则是指当另一个值被推入通道时，会丢弃最后一个缓冲值。\n\
  \n在这两种情况下，由于通道处理缓冲区溢出的方式，都不会导致放入值的操作阻塞当前线程。请参见代码清单 8-38 中的示例。\n\n```\n(def s (chan\
  \ (sliding-buffer 5)))\n(def d (chan (dropping-buffer 5)))\n(def v [:a :b :c :d\
  \ :e :f :g :h :i :j])\n(dotimes [i 10]\n(>!! s (nth v i))\n(prn \"Put \" (nth v\
  \ i) \" into the 'sliding buffer' channel\"))\n(dotimes [i 10]\n(>!! d (nth v i))\n\
  (prn \"Put \" (nth v i) \" into the 'dropping buffer' channel\"))\n(<!! s) ;; :f\n\
  (<!! d) ;; :a\n代码清单 8-38.\n滑动缓冲区和丢弃缓冲区示例\n```\n\n在代码清单 8-38 中，我们演示了滑动缓冲区和丢弃缓冲区。我们创建了不同的缓冲区类型，并在创建通道时将它们作为参数传入。然后，我们创建了一个循环，将十个值放入通道，而通道最多只能容纳五个值。因此，我们将看到每种缓冲区类型如何处理这个问题。\n\
  \n对于滑动缓冲区，如果我们从通道中取出一个值，首先会得到 `:f`。这表明前五个值（`:a`、`:b`、`:c`、`:d`、`:e`）在下一组值被推入时被挤出了。顾名思义，通道内容会先滑动出旧值。\n\
  \n对于丢弃缓冲区，如果我们从通道中取出一个值，首先会得到 `:a`。这表明最后五个值（`:f`、`:g`、`:h`、`:i`、`:j`）在缓冲区满的那一刻被丢弃了。这就像一个非常繁忙的夜总会入口：一旦俱乐部满员，门卫就会把你拒之门外。\n\
  \n注意\n\n在社区中，大多数开发者似乎会创建无界通道，即一对一进出，并且仅在需要尽可能提高性能和吞吐量时，才使用滑动/丢弃缓冲区。\n\n### 超时通道\n\
  \n这是我想与你分享的并发领域的最后一个特性，也是使用通道时的一种常见模式：使用超时通道来短路潜在的僵尸（或长时间阻塞）进程。请参见代码清单 8-39。\n\n\
  ```\n(def c (chan))\n(let [[result channel]\n(alts!! [c (timeout 5000)])]\n(if result\n\
  (prn \"Result: \" result)\n(prn \"Timed out: \" result))) ;; \"Timed out: \" nil\n\
  代码清单 8-39.\n超时通道示例\n```\n\n在代码清单 8-39 中，我们创建了一个通道，然后从未向它发送任何内容。接着，我们使用 `alts!!`\
  \ 尝试从通道中取出一个值，但不会无限期阻塞——因为我们可以传递一个通道集合，哪个通道先获得值，`alts!!` 就返回哪个——我们最初被阻塞了五秒钟，然后进程解锁，我们得到了\
  \ `nil` 的结果。\n\n这是可行的，因为超时通道在设定的时间段内是一个活动通道，然后它会向自身发送一个 `nil` 值，这使得 `alt!!` 能够立即行动，并随后短路自身。\n\
  \n## 本章小结\n\n在本章中，我们学习了许多处理并发/多线程代码的不同技术和工具。我们涵盖了所有内容：延迟、未来、承诺、原子、锁、代理、引用和通道。不要急于读完本章；请回头尝试所有示例，并确保你完全理解了这些概念。\n\
  \n在下一章中，我们将学习命名空间，以及如何利用它们来组织和分类我们的代码。命名空间是一个强大的特性，在所有 Clojure 代码库中都很常见。\n\n脚注 1\n\
  \n[`https://clojure.org/about/concurrent_programming`](https://clojure.org/about/concurrent_programming)\n\
  \n  2\n\n[`http://www.golang.org/`](http://www.golang.org/)\n\n"
- "# 9. 命名空间\n\n命名空间是一种特性，允许将函数、符号和变量分类到定义良好的组中。在本章后面，我们还会看到命名空间可以被转换并映射到实际的文件系统目录结构。\n\
  \n让我们先使用 REPL 来演示一个关于命名空间如何工作的简单示例。当我们运行 `lein repl` 时，会自动进入一个新的 `user` 命名空间，并且该命名空间预加载了\
  \ Clojure 核心库。你可以通过查看 REPL 控制台来判断当前所在的命名空间，控制台会在光标位置之前显示当前命名空间：`user=>`。\n\n注意\n\
  \n如果你需要以编程方式引用命名空间，可以使用 `*ns*` 变量。\n\n现在，让我们看看如何创建一个新的命名空间 `foo.bar`，然后在该新命名空间内定义一个分配给符号\
  \ `baz` 的变量。接着，我们回到 `user` 命名空间，为 `baz` 定义一个不同的值，并观察从不同命名空间引用该变量时会发生什么。\n\n```\n\
  (ns foo.bar)\n(def baz 1)\nbaz\n;; 1\n(ns user)\n(def baz 2)\nbaz\n;; 2\n(ns foo.bar)\n\
  baz\n;; 1\n代码清单 9-1.\n创建新命名空间的示例\n```\n\n在代码清单 9-1 中，你可以看到我们使用了 `ns` 宏来创建 `foo.bar`\
  \ 命名空间。如果该命名空间已经存在（例如代码清单 9-1 中的 `user` 命名空间），那么调用 `ns` 宏并传入一个映射到已存在命名空间的符号，将会直接把你移入该指定命名空间，而不会先创建它。\n\
  \n因此，在前面的示例中，我们首先创建了 `foo.bar` 命名空间，然后将 `baz` 定义为值 `1`。接着，我们移回 `user` 命名空间并定义 `baz`，但这次赋予了一个不同的值——`2`。\n\
  \n从这个例子中，你可以看到我们如何根据定义和包含它们的命名空间，安全地定义具有不同行为和值的变量和函数。\n\n## 什么是命名空间？\n\nClojure\
  \ 的命名空间实际上只是一个从符号到变量/类的全局映射。每个命名空间类也可以包含自己的映射（主要是符号到变量的映射）。当前命名空间存储在一个 `Namespace`\
  \ 对象中，并与动态变量 `*ns*` 关联。\n\n注意\n\n默认情况下，`user` 命名空间，以及随后使用 `ns` 宏创建的任何命名空间，都会预加载并映射\
  \ `clojure.core` 命名空间中的所有函数（以及 `java.lang` 命名空间中的类名）。\n\n你可以在 REPL 中使用 `in-ns`（而不是\
  \ `ns`）创建一个新命名空间来验证这一点。`in-ns` 函数创建的命名空间不会预加载 `clojure.core` 命名空间。请参见代码清单 9-2 中的示例，该示例演示了新命名空间将缺少默认命名空间。\n\
  \n```\n(in-ns 'beep)\n;; beep 命名空间不存在\n;; 所以这创建了它并将我们移入该命名空间\n(loaded-libs)\n;;\
  \ 此函数位于 clojure.core 中\n;; clojure.core 命名空间尚未预加载\n;; 因此这将在 REPL 中显示错误\n(clojure.core/refer\
  \ 'clojure.core)\n;; 我们显式加载 clojure.core 命名空间\n(loaded-libs)\n;; 我们现在成功执行了该函数\n\
  代码清单 9-2.\n使用 in-ns 创建的新命名空间将缺少 clojure.core\n```\n\n\n\n## 加载命名空间文件\n\n如果你正在从 REPL\
  \ 测试现有应用程序，并希望`load`一个需要其他依赖项的代码文件，那么你需要使用`load`函数。`load`函数会尝试在你的“类路径”中找到给定路径，然后`load`该文件。类路径是\
  \ Java 用来识别代码库位置的机制，由于 Clojure 构建在 Java 之上，这意味着我们需要确保类路径中添加了相关路径。\n\n项目管理工具 Leiningen\
  \ 通过 `project.clj` 文件处理依赖项和库的添加。因此，只要你在其中列出了依赖项，就应该能够使用`load`函数将它们加载到 REPL 会话中。有关`load`函数的示例，请参见清单\
  \ 9-3。\n\n```\n(load \"/path/to/namespace\")\n(in-ns 'namespace)\n清单 9-3.\n从外部文件加载代码\n\
  ```\n\n现在，你在使用`in-ns`之前使用`load`的原因是，即使你有一个定义了指定命名空间的文件，除非你将其添加到 JVM 类路径，否则 REPL\
  \ 无法定位它。`load`函数会将命名空间添加到类路径。\n\n注意\n\n确保路径以正斜杠开头，并且相对于 Leiningen 的 `src` 目录（参见下一条注释）；这是因为\
  \ Leiningen 工具会为每个 Leiningen 项目修改操作系统的 JVM 类路径。\n\n虽然我们还没有介绍 Leiningen 项目自动化工具，但值得提及的是，Clojure\
  \ 项目设置的一部分要求使用一个 `project.clj` 文件来引导应用程序。\n\n如果你想跟着我接下来要解释的内容操作，最好先退出 REPL，然后在终端中运行以下命令：`lein\
  \ new compojure-app foo`。这将为你生成一个新项目。进入该新项目目录（`cd foo`），你会发现有一个新的 `project.clj`。\n\
  \n花些时间查看这个新 Leiningen 项目中文件夹和文件的组织结构。现在不必担心这一切意味着什么或如何工作，我们将在后面的章节中介绍。但命名空间在设置一个真实的\
  \ Clojure 应用程序中扮演着重要角色，因此这将为你提供一个基本的起点，帮助你理解以下信息。\n\n`project.clj` 引导文件中的设置之一是 `:handler`\
  \ 键，它告诉 Leiningen 哪个 Clojure 文件是应用程序的入口点（还有一个 `:init` 函数，在处理程序之前执行）。\n\n注意\n\n对于大多数\
  \ Leiningen 项目模板，你会发现你的 Clojure 代码位于：`src/<项目名称>/<文件.clj>`。\n\n例如，如果你的 `project.clj`\
  \ 包含 `:handler foo.handler/app`，你实际上是在告诉 Leiningen 在 `src/foo/handler.clj` 定位入口点（并且在该文件中，你会找到引导应用程序的\
  \ `app` 函数）。\n\n当从项目目录运行 `lein repl` 时，你可以执行 (`ns foo.handler`) 来跳转到该命名空间，并开始执行该命名空间暴露的函数。请参见清单\
  \ 9-4 的简单示例。\n\n```\n(ns foo.handler)\n(init) ;; foo 正在启动\n清单 9-4.\n将命名空间加载到 REPL\
  \ 中\n```\n\n如果你对文件进行了更改——例如，假设你用新变量更新了 `handler.clj` 文件：`(def x 123)`——为了使该更改反映在已经运行的当前\
  \ REPL 实例中，你需要重新加载命名空间文件。请参见清单 9-5。\n\n```\n(load \"/foo/handler\")\nx ;; 123\n\
  清单 9-5.\n将命名空间重新加载到 REPL 中\n\n如果你想显示所有已加载的命名空间，最简单的选择是使用 `(loaded-libs)` 函数。如果你在当前\
  \ REPL 实例中运行该命令，你会看到一个已为你加载的命名空间大列表（包括 REPL 启动后添加的任何新命名空间）。请参见清单 9-6。\n\n```\n#{clj-stacktrace.core\
  \ clj-stacktrace.repl clj-stacktrace.utils clj-time.core clj-time.format clojure.core.protocols\
  \ clojure.core.server clojure.edn clojure.instant clojure.java.browse clojure.java.io\
  \ clojure.java.javadoc ...}\n清单 9-6.\n当前 REPL 实例中已加载的库\n```\n\n## 内部化\n\n我们在第 2\
  \ 章中已经介绍过变量，当时我指出：\n\n> 变量在其他命名空间中不可用，除非它们被“内部化”到这些命名空间中。内部化是一种花哨的说法，意思是“在当前命名空间中查找变量\
  \ x；如果不存在则创建它”。但你也可以使用 `ns` 宏的 `:refer` 特性从另一个命名空间“内部化”变量。 ——我，第 2 章\n\n那么，让我们来看看从另一个命名空间“内部化”数据的不同方式。有几种不同的选项：\n\
  \n*   `:use`\n*   `:require`\n    *   `:as`\n    *   `:refer`\n    *   `:all`\n\n\
  现在，我应该澄清一下，实际上只有两种方法可以内部化数据，那就是使用前面列表中的前两项（`:use` 和 `:require`）。列表中的其他项都是与 `:require`\
  \ 相关的子集特性，在官方文档中被称为库规范。\n\n注意\n\n我将最后介绍 `:use`，因为自从 Clojure 早期版本以来，`:require` 的功能已大大改进，`:use`\
  \ 被认为是不必要的。我介绍 `:use` 只是为了让你知道它曾经存在，但现在已经不再需要，因为 `:require` 的功能已经取代了它。\n\n我将首先解释这些项各自的工作原理及其区别，但在那之前，我想先稍微绕个弯……\n\
  \n### 根绑定\n\n在讨论变量时，理解它们还有一个称为根绑定的东西，并且被认为是“线程局部的”，这一点很重要。这在实践中的意思是，当你创建一个变量并为其赋值时——例如，`(def\
  \ foo \"hello\")`——它的根绑定就是你定义的值（在本例中，是字符串 `\"hello\"`）。一旦你将一个值与变量关联起来，那就成为该变量的“根绑定”，这意味着从当前命名空间内创建的任何线程都将能够访问它，因为它们本质上是在同一个内存空间中创建的。这就是“线程局部”的含义，其他命名空间将无法看到该变量或其值。\n\
  \n如果你定义了一个变量但没有为其赋值，那么它被认为是“未绑定的”（参见清单 9-7 的示例）。\n\n```\n(def foo)\nfoo\n;; #\n\
  清单 9-7.\n未绑定变量的示例\n```\n\n### 动态变量\n\n我们在第 2 章中已经介绍过动态变量（即 `^:dynamic` 属性和 `binding`\
  \ 形式），但由于我们现在正在阅读关于命名空间的章节，因此有必要提一个如果在本书开头提及可能没有意义的问题：`ns` 宏之所以能够动态更改 Clojure 中的命名空间，是因为该宏修改了全局的\
  \ `*ns*` 变量，这意味着它可以被重新定义。\n\n注意\n\n定义动态变量的约定是将它们包裹在“耳罩”（即星号）中。例如，`*变量名*`。\n\n\n\n\
  ### 绕道结束……\n\n好了，回到关于驻留（interning）以及我们之前列出的项目列表（即 `:use`、`:require` 等）的讨论。我将使用一个新的应用程序。之前，我们实际上使用\
  \ `lein new compojure-app <name>` 创建了一个简单的 Web 服务器应用程序。现在，我们将使用 `lein new app <name>`。\n\
  \n注意\n\n区别在于，后者是一个“标准”应用程序，而不是 Web 服务器。我们将在未来更详细地介绍 Leiningen 工具的章节中讨论不同类型的应用程序。\n\
  \n与之前的应用程序类似，如果你查看 `project.clj` 文件，你会发现一个与我们之前看到的类似的结构。这里的区别在于，我们找到的不是 `:handler`\
  \ 键，而是 `:main` 键。但它做的是同样的事情——它告诉 Leiningen 主代码文件的位置。\n\n在这个例子中，我们会看到主文件被设置为 `foo.core`，但我还将创建一些新文件：`foo/bar.clj`\
  \ 和 `foo/baz.clj`，它们将分别代表命名空间 `foo.bar` 和 `foo.baz`。在讲解示例的过程中，我会逐一演示这些文件。\n\n注意\n\
  \n在 `project.clj` 中使用 `core` 作为文件名（和命名空间）只是一种约定。你完全可以将 `core` 文件重命名为其他名称，并手动更新 `project.clj`\
  \ 以反映新的文件/命名空间。\n\n以下示例（参见清单 9-8、9-9 和 9-10）中使用的语法是 Clojure 代码文件特有的。如果你想在 REPL 中测试这些特性，可以将它们作为直接函数调用。例如，如果我们定义了类似\
  \ `(:use name.space)` 的内容，你可以在 REPL 中将其改为 `(use 'name.space)`。\n\n注意\n\n当直接使用这些函数时（而不是在\
  \ `ns` 宏中使用它们），你需要对任何符号/向量进行引用。\n\n现在，让我们假设我们的每个命名空间（`foo.core`、`foo.bar` 和 `foo.baz`）都包含了清单\
  \ 9-8、9-9 和 9-10 中的代码（如果你想在 REPL 中跟着操作，我建议你编辑你的测试 `foo` 应用程序来模仿以下示例）。\n\n### foo.core\n\
  \n```\n(ns foo.core\n(:use foo.bar)\n(:use foo.baz)\n(:gen-class))\n(def x 1)\n\
  (defn -main [& args]\n(println \"Hello, World!\"))\n清单 9-8.\nfoo.core 命名空间代码\n```\n\
  \n### foo.bar\n\n```\n(ns foo.bar)\n(def a 1)\n(def b 2)\n(defn beep [] \"bop\"\
  )\n(defn- bing [] \"bong\")\n清单 9-9.\nfoo.bar 命名空间代码\n```\n\n注意\n\n你可能已经注意到在 `foo.bar`\
  \ 中，函数 `bing` 是使用 `defn-` 定义的。末尾的额外连字符很重要，因为这意味着当从该命名空间生成 Java 类时，它会将该函数视为私有函数，因此它在其他命名空间中不可用。\n\
  \n### foo.baz\n\n```\n(ns foo.baz)\n(def c 3)\n(def d 4)\n(def e 5)\n清单 9-10.\n\
  foo.baz 命名空间代码\n```\n\n让我们从新的 `foo` 目录中启动 REPL（`lein repl`），我们应该会注意到我们进入了与 `project.clj`\
  \ 中 `:main` 属性指定的相同命名空间（你应该会在终端中看到 `foo.core=>` 这一行）。\n\n从主命名空间 `foo.core` 中，你应该能够在\
  \ REPL 中输入符号 `a`、`b`、`c`、`d` 和 `e`，并看到分配给它们的相应值。同样，你应该能够执行函数 `(beep)` 并看到相应的返回值。\n\
  \n但是，你将无法执行 `(bing)` 函数，因为它是用 `defn-` 定义的，所以应该是私有的，只能通过 `foo.bar` 命名空间访问。清单 9-11\
  \ 演示了如何访问它。\n\n```\n(in-ns 'foo.bar)\n(bing) ;; \"bong\"\n清单 9-11.\n通过进入其命名空间访问私有函数\n\
  ```\n\n现在我们对命名空间如何与我们的 foo 应用程序协同工作有了更好的理解，让我们回过头来看看 `:require`、`:as`、`:refer`、`:all`\
  \ 和 `:use` 特性，看看它们是如何工作的。\n\n### :require\n\n在 `ns` 宏中包含 `:require` 意味着它将把所有公共变量导入到当前命名空间中，然后可用的选项（`:as`\
  \ 和 `:refer`）有助于确定如何访问导入的数据（我们将在接下来的几节中看到）。`:require` 的语法结构如清单 9-12 所示。\n\n```\n\
  (ns \n(:require \n[ :refer [ ]]\n[ :as ]\n[ :as  :refer []])\n(:gen-class))\n清单\
  \ 9-12.\n:require 宏的语法结构\n```\n\n### :as\n\n`:as` 库规范允许你重命名命名空间本身。\n\n我们已经见过 `:require`\
  \ 的简写形式，但如果你愿意，也可以使用长格式（参见清单 9-13）。\n\n```\n(ns foo.core\n(:require [clojure.string\
  \ :as str])\n(:require [foo.bar :as fbr])\n(:require [foo.baz :as fbz])\n(:gen-class))\n\
  清单 9-13.\n:require 的长格式版本\n```\n\n然而，实际上你更可能使用简写形式（参见清单 9-14）。这意味着你可以使用更短的符号来引用\
  \ `foo.bar` 和 `foo.baz` 命名空间内的所有公共变量。例如，不用写 `foo.bar/b`（来访问公共变量 `b`），你可以输入 `fbr/`\
  \ `b`。\n\n```\n(ns foo.core\n(:require [clojure.string :as str]\n[foo.bar :as fbr]\n\
  [foo.baz :as fbz])\n(:gen-class))\n清单 9-14.\n:require 的简写形式版本\n```\n\n注意\n\n当使用\
  \ `require` 的函数版本时（即在 `ns` 宏之外），向量前的引号意味着你不必引用向量内的每个符号。例如，使用 `(require '[name.space\
  \ :as nmsp])` 而不是 `(require ['name.space : as 'nmsp])`。\n\n### :refer\n\n`:refer`\
  \ 库规范允许你只将需要的公共变量导入到当前作用域。所有其他公共变量仍然可用，但你必须提供完全限定的命名空间才能访问它们。参见清单 9-15。\n\n```\n\
  (ns foo.core\n(:require clojure.string\n[foo.bar :refer [a beep]]\n[foo.baz :as\
  \ fbz :refer [c]])\n(:gen-class))\n清单 9-15.\n:refer 库规范示例\n```\n\n在清单 9-15 中，我们可以看到我们按原样加载了\
  \ `clojure.string` 命名空间；我们没有以任何方式缩短它。所以，如果我们想使用该命名空间中的 `upper-case` 函数，我们将执行 `(clojure.script/upper-case\
  \ \"make me upper case!\")`，随后它将返回 `\"MAKE ME UPPER CASE!\"`。\n\n在第二个语句 `[foo.bar\
  \ :refer [a beep]]` 中，我们说的是“让 `a` 和 `beep` 在当前作用域中可用，而该命名空间中所有其他公共变量，我们必须通过完整的命名空间来访问。”所以，输入\
  \ `a` 将返回 `2`；输入 `(beep)` 将返回 `\"bop\"`，而要访问 `b`，我们不能直接输入它，而必须输入 `foo.bar/b`，这将返回\
  \ `1`。\n\n在第三个语句 `[foo.baz :as fbz :refer [c]]` 中，我们说的是与之前类似的事情，但现在我们还声明，当我们必须使用完整的命名空间来引用一个公共变量时，我们只需使用缩短后的\
  \ `fbz` 作为命名空间，而不是更长的 `foo.baz`。所以，如果你输入 `c`，你将得到 `3`，如果你想访问 `d` 或 `e`，那么你需要输入 `fbz/d`\
  \ 和 `fbz/e`。\n\n注意\n\n对于第三种语句形式，你仍然可以使用长格式的命名空间。所以，`fbz/c` 和 `foo.baz/c` 都有效。\n\n\
  \n\n### :all\n\n`:all` 这个库规范与 `:refer` 配合使用。因此，当使用 `:refer` 时，你需要提供一个符号集合，这些符号代表你想要导入当前命名空间的公共变量；而你可以选择提供\
  \ `:all` 作为该集合的替代选项。\n\n```\n(ns foo.core\n(:require clojure.string\n[foo.bar :refer\
  \ :all])\n(:gen-class))\n清单 9-16.\n:all 库规范示例\n```\n\n在清单 9-16 中，我们可以在当前命名空间中直接引用\
  \ `a`、`b` 和 `beep`，而无需提供完全限定的命名空间。例如，我们不必指定 `foo.bar/a`，直接使用 `a` 即可。\n\n注意\n\n你会在下一节中注意到，`:all`\
  \ 实际上是 `:use` 的默认用法，因此它已被弃用。\n\n### :use\n\n在 `ns` 宏中包含 `:use` 意味着它会将所有公共变量导入当前命名空间，并用这些导入的变量覆盖任何同名的现有定义。请记住，函数也是通过\
  \ `defn` 宏赋值给变量的，因此公共函数也会在当前命名空间中被提供/覆盖。\n\n如果你将 `foo.baz` 中的变量 `c` 改为另一个命名空间中已定义的变量（例如\
  \ `foo.bar` 中的 `var a`），你就会注意到使用 `:use` 时会出现问题。\n\n尝试将 `(def c 3)` 改为 `(def a 3)`，然后从项目根目录运行\
  \ `lein repl`。你应该会在 REPL 输出的前几行看到一个异常（参见清单 9-17）。\n\n```\na already refers to #'foo.bar/a\
  \ in namespace foo.core.\n清单 9-17.\n使用 :use 混合变量时引发的异常\n```\n\n发生此异常是因为 `foo.baz`\
  \ 试图重新定义变量 `a`，而该变量已被 `foo.bar` 定义。这就是使用标准 `use` 而不使用其库规范选项（如 `:exclude`、`:only`\
  \ 或 `:rename`）时会出现的问题。\n\n注意\n\n当从 REPL 调用 `use` 时（例如 `(use 'foo.baz)`），它会重新定义任何定义而不发出警告。\n\
  \n要修复此异常（并随后让所有代码正常加载和运行），我们需要决定如何处理导入 `foo.baz` 命名空间的问题。\n\n我们可以排除 `a` 和 `d` 变量，或者使用\
  \ `:only` 单独引入 `e` 变量（在这个例子中这样做更合理，因为输入更少）；我们甚至可以使用 `:rename` 来重命名 `c` 和 `d`。选择权在你手中。\n\
  \n但假设我们决定引入 `a` 变量。这意味着我们需要同时使用 `:only` 和 `:rename`。我们可以在清单 9-18 中看到一个示例，我们从 `foo.baz`\
  \ 中引入 `a` 变量并将其重命名为 `new-a`。使用这种格式，我们可以引入所有需要的依赖项，而无需担心任何冲突。\n\n```\n(ns foo.core\n\
  (:use foo.bar)\n(:use [foo.baz :only [d] :rename {a new-a}])\n(:gen-class))\n清单\
  \ 9-18.\n使用 :only 引入特定变量\n```\n\n### 其他内容？\n\n虽然我并非追求面面俱到，但可能还是值得再提几件事。首先，你可以使用另一个宏来代替\
  \ `ns` 宏（我们之前实际上见过它，但我故意没有说明）。它叫做 `in-ns`。它们之间唯一的真正区别是 `in-ns` 不提供对任何库规范的访问（即 `:use`、`:require`、`:as`、`:refer`\
  \ 或 `:all`）。\n\n第二件值得一提的事情是使用库规范 `:verbose`、`:reload` 和 `:reload-all`。这些仅适用于 `require`\
  \ 函数及其 `ns` 变体 `(:require ...)`。例如，如果添加了 `:verbose`，那么 Clojure 会打印出与 `load` 函数调用相关的任何信息。这可以通过显示底层正在进行的调用来帮助阐明\
  \ `:require` 调用在内部做了什么。\n\n`:reload` 库规范确保即使一个库已被加载（例如，被另一个命名空间加载），如果它有任何更改，也应该重新加载。我自己没有理由使用这个行为，除了在\
  \ REPL 中反复试验并不断加载依赖项的时候。`:reload-all` 库规范的工作方式相同，但它会递归地检查所有已加载库的所有依赖项。\n\n最后一项是\
  \ `import` 命令，它对于导入 Java 类和接口非常有用。清单 9-19 演示了其用法的一个基本示例。\n\n```\n(import java.util.Date)\n\
  (def now (Date.))\n(str now) ;; \"Thu Jun 29 09:24:04 BST 2017\"\n清单 9-19.\n导入 Java\
  \ 类的示例\n```\n\n## 总结\n\n在本章中，我们学习了各种命名空间符号和宏，如何在 REPL 中动态创建新的命名空间，以及如何在现有命名空间之间切换并在这些空间中执行代码。可能最重要的是，我们理解了如何在命名空间之间内联变量，以及如何通过可用的各种库规范选项来避免冲突。\n\
  \n在下一章中，我们将研究如何利用一种称为宏的特性来操作 Clojure 语言本身。这是一个强大的特性，我们必须小心使用，以免给我们的代码库增加复杂性和混乱。\n\
  \n\n\n# 10. 宏\n\n可以说，Clojure 最有趣的特性之一，是其提供了一种功能，允许用户重新定义语言，并添加默认情况下不可用的自定义特性。我的意思是，你有多少次在编写代码（无论用什么语言，比如\
  \ JavaScript）时，会想“我真希望我有 Y 语言的 X 特性”？\n\n对于像 JavaScript 这样的语言，我敢打赌这种情况经常发生。我相信会有一些\
  \ JavaScript 开发者反驳说，现在有可用的编译器，可以让你将有效的 ES7 代码编译成 ES5 代码（例如）。但这仍然无法解决将 ES5 代码编译成\
  \ ES3 代码的问题，在某些情况下你甚至无法做到这一点（因为 ES3 语言规范的限制）。更不用说现在需要两套编译步骤，才能确保你的代码能在尽可能广泛的设备上正常工作。\n\
  \n注意\n\n渐进增强¹ 可以改善这种情况，但实现渐进增强所涉及的工作并不简单，而且与语言本身原生支持重新定义语言相比，这是一个极其强大的概念。\n\n但即使你是一名\
  \ JS 开发者，并且能够利用现有的某个流行编译器，也可能找不到一个能提供你所需特性的编译器。在这种情况下，你最终可能会偶然发现像 SweetJS ² 这样的东西，它是一个允许你定义自己特性的编译器。但这又给完成工作带来了另一个障碍，因为你需要管理一个外部依赖。\n\
  \n利用 Clojure 宏特性的能力，使得 Clojure 核心库能够保持紧凑和专注，同时允许开发者向语言添加自己的特性，并且可以放心地知道宏系统是语言的原生组成部分，而不是某个可能最终失去支持的外部工具。\n\
  \n注意\n\nClojure 的作者们（过去曾多次）表现出一种习惯，即把使用宏系统构建的流行抽象吸收回官方的 Clojure 代码库中。这意味着，如果你使用宏创建了有用的东西，那么你的工作最终可能会被所有\
  \ Clojure 开发者使用。\n\n让我们通过回顾两个我们在前几章中已经使用过、并且是 Clojure 核心库一部分的特定宏：`->` 和 `->>`，来开始理解宏。\n\
  \n```\n(->  6 (/ 2) (+ 10))\n;; 13\n(->> 6 (/ 2) (+ 10))\n;; 31/3\n代码清单 10-1.\n\
  -> 和 ->> 宏的示例\n```\n\n在代码清单 10-1 中，我们有两行非常相似但返回截然不同值的代码。这两行代码的唯一区别是第二行多了一个尖括号字符\
  \ `>`。这个额外的字符改变了等式，但它是如何做到的呢？\n\n在 Clojure 中，`->` 被称为“线程优先”宏，而 `->>` 被称为“线程最后”宏。对于线程优先宏，第一个参数（即我们示例中的\
  \ `6`）作为第一个参数传递给后续的每个函数调用。对于线程最后宏，第一个参数（同样是我们示例中的 `6`）作为最后一个参数传递给后续的每个函数调用。\n\n\
  为了更清晰地理解宏系统的工作原理，我们可以使用一个名为 `macroexpand` 的函数来展示宏的完整形式（基本上，它展示了如果宏系统不存在，我们自己会编写的内容）。\n\
  \n```\n(macroexpand '(->  6 (/ 2) (+ 10)))\n;; (+ (/ 6 2) 10)\n(macroexpand '(->>\
  \ 6 (/ 2) (+ 10)))\n;; (+ 10 (/ 2 6))\n代码清单 10-2.\n使用 macroexpand 展开宏\n```\n\n要使用\
  \ `macroexpand` 函数，如代码清单 10-2 所示，我们需要提供我们之前运行的表达式。但是，我们如何防止这些表达式被实际执行，并且将表达式的结果传递给\
  \ `macroexpand` 呢？解决方案是引用该表达式，我们通过在表达式形式的第一个左括号前放置一个单引号来实现这一点。\n\n注意\n\n我们也可以将表达式包装在对\
  \ `quote` 的函数调用中；例如，`(quote (-> 6 (/ 2) (+ 10)))`，但 `'` 更简洁。\n\n所以，我们可以看到，通过传入 `'(->\
  \ 6 (/ 2) (+ 10))`，我们得到了 `(+ (/ 6 2) 10)`。返回值是宏展开后的结果，类似地，在第二行，如果我们传入 `'(->> 6 (/\
  \ 2) (+ 10))`，我们会得到展开后的结果 `(+ 10 (/ 2 6))`。\n\n注意“线程优先”（`->`）是如何将第一个参数 `6` 作为除法函数\
  \ `/` 的第一个参数，并且调用该函数的结果本身现在作为第一个表达式传递给加法函数 `+` 的调用。\n\n对于“线程最后”（`->>`），我们将第一个参数\
  \ `6` 作为最后一个参数传递给除法函数，并且调用该函数的结果随后作为最后一个参数传递给 `+` 函数。\n\n## 一路展开到底\n\n`macroexpand`\
  \ 函数对于确保引号表达式中的所有宏都被展开很有用，但这不包括宏内部的嵌套宏。让我通过一个例子来解释（参见代码清单 10-3）。\n\n```\n(cond (even?\
  \ 2) \"even\" :else \"odd\") ;; \"even\"\n(cond (even? 1) \"even\" :else \"odd\"\
  ) ;; \"odd\"\n(macroexpand '(cond (even? 2) \"even\" :else \"odd\"))\n;; (if (even?\
  \ 2) \"even\" (clojure.core/cond :else \"odd\"))\n代码清单 10-3.\nMacroexpand 不包含嵌套宏\n\
  ```\n\n在代码清单 10-3 中，我们有一个 `cond` 宏，当传入一个谓词时，它会根据谓词的结果返回 `\"even\"` 或 `\"odd\"`。在这种情况下，如果我们传入值\
  \ `2`，则返回结果是 `\"even\"`；如果我们传入 `1`，则该值会落入 `:else` 分支，因此返回值变为 `\"odd\"`。\n\n从 `macroexpand`\
  \ 函数的结果可以看出，我们得到了 `cond` 宏的一个展开版本。但我们遇到了一个问题：`cond` 宏内部再次调用了自身，因此，为了看到 `cond` 宏真正具有代表性的展开，我们应该改用\
  \ `macroexpand-all` 函数。\n\n要访问 `macroexpand-all` 函数，你需要从 `clojure.walk` 命名空间将其加载到\
  \ REPL 中（因为它不是 `core` 命名空间的一部分）。`walk` 命名空间是标准 Clojure 语言的一部分，因此你不需要像对 `core.match`\
  \ 和 `core.async` 那样更新项目依赖。相反，你可以在 REPL 内部或代码文件顶部使用 `require` 函数。\n\n```\n(require\
  \ '[clojure.walk :as w])\n代码清单 10-4.\n引入 clojure.walk 命名空间\n```\n\n一旦你加载了 `clojure.walk`\
  \ 命名空间（参见代码清单 10-4），你应该能够引用 `macroexpand-all` 函数来完全展开之前的 `cond` 宏示例。参见代码清单 10-5。\n\
  \n```\n(w/macroexpand-all '(cond (even? 2) \"even\" :else \"odd\"))\n;; (if (even?\
  \ 2) \"even\" (if :else \"odd\" nil))\n代码清单 10-5.\n使用 macroexpand-all 展开 cond 示例\n\
  ```\n\n## 编写你自己的宏\n\n创建自己的宏有五个方面，这取决于宏需要有多复杂：\n\n*   定义宏 (`defmacro`)\n*   引用 (`'`)\n\
  *   语法引用 (`` ` ``)\n*   取消引用 (`∼`)\n*   取消引用拼接 (`∼@`)\n*   生成符号 (`gensym`, `#`)\n\
  \n有趣的是，第 2-5 项都可以在宏外部使用，因此我将首先演示它们。之后，我将剖析一个自定义宏，以理解它是如何工作的，以及我们可能面临的一些典型挑战。\n\n\
  \n\n## 引号（Quoting '）\n\n在第二章 2 中，当我们探讨列表数据结构时，我曾提到有些读者可能对列表前的单引号感到好奇。正如当时所述，这被称为对数据结构的引号引用，目的是让\
  \ Clojure 编译器不尝试对其进行求值。\n\n```\n(def l '(1 2 3))\nl\n;; (1 2 3)\n列表 10-6.\n引号引用列表数据结构以防止求值\n\
  ```\n\n在列表 10-6 中，你应该注意到赋值给变量 `l` 的值实际上是一个列表数据结构 `(1 2 3)`，而不是 Clojure 编译器试图将 `1`\
  \ 作为函数执行并将 `2`、`3` 作为函数参数传递的结果（这原本就行不通，因为 Clojure 中不存在名为 `1` 的函数）。\n\n引号引用是一项实用的特性，适用于那些从算法角度出发，你确实需要使用真正的链表数据结构（而非向量或集合等）的场景。\n\
  \n注意\n\n还有其他创建链表数据结构的方式：`(list 1 2 3)` 和 `(quote (1 2 3))` 是两种常见选择，不过 `quote` 函数可用于任何类型的\
  \ Clojure 形式。\n\n## 语法引号（Syntax Quoting `）\n\n语法引号的工作方式与标准引号功能相同，唯一的区别在于它会将每个表达式转换为完全限定的命名空间形式。\n\
  \n```\n(def l '(1 2 3))\n`(+ l)\n;; (clojure.core/+ user/l)\n列表 10-7.\n语法引号生成完全限定的命名空间\n\
  ```\n\n在列表 10-7 中，你可以看到我们首先定义了变量 `l`，并将其赋值为一个字面列表数据结构。接着，我们在表达式 `(+ l)` 前使用了反引号（``\
  \ ` ``），结果得到了该表达式的限定命名空间版本。\n\n这意味着 `+` 函数变成了 `clojure.core/+`，而变量 `l` 变成了 `user/l`（在此例中，我是在\
  \ REPL 环境中执行示例代码的）。\n\n注意\n\n如果你尝试对结果表达式 `(clojure.core/+ user/l)` 进行求值，会发现代码无法运行。这是因为我们需要将列表元素展平（即展开），使它们不再包含在括号内，而是作为\
  \ `+` 函数的内联参数。稍后我将演示如何使用反引号拼接语法来实现这一点。\n\n## 反引号（Unquoting ∼）\n\n当你引号引用一个表达式时，意味着我们希望编译器不对其或其任何子表达式进行求值。但有时，你希望表达式的大部分内容被引号引用（即不求值），而其中某些小的嵌套部分仍能被求值。\n\
  \n```\n(def l '(1 2 3))\n`(+ ∼l)\n;; (clojure.core/+ (1 2 3))\n列表 10-8.\n对嵌套表达式求值，但不求值整个表达式\n\
  ```\n\n在列表 10-8 中，我们可以看到我们使用反引号引用了表达式，但随后使用了波浪号字符（`∼`）来“反引号”变量 `l`，使其最终被 Clojure\
  \ 编译器求值。这意味着我们现在得到了一个未求值的命名空间 `+` 函数，后面跟着表达式 `(1 2 3)`。\n\n注意\n\n列表 10-8 的输出是不可执行的，因为表达式\
  \ `(1 2 3)` 是无效的。核心命名空间中不存在名为 `1` 的函数。\n\n## 反引号拼接（Unquote Splicing ∼@）\n\n在前面的示例中，我们演示了一些特定功能，但都产生了不可执行的结果。现在让我们花点时间来解决这个问题，并将下一个示例转变为可以成功执行的代码。\n\
  \n```\n(def l '(1 2 3))\n`(+ ∼@l)\n;; (clojure.core/+ 1 2 3)\n(clojure.core/+ 1\
  \ 2 3)\n;; 6\n(eval `(+ ∼@l))\n;; 6\n列表 10-9.\n使用反引号拼接展开求值序列\n```\n\n因此，在列表 10-9\
  \ 中，我们可以看到我们使用了反引号引号语法来确保表达式不被求值。但在这个示例中，我们希望列表数据结构（赋值给变量 `l` 的那个）不是作为一个列表放在 `+`\
  \ 函数旁边，而是作为单独的参数放在那里。\n\n为了实现求值列表数据结构（使其不作为 `user/l` 放在 `+` 旁边）并随后展平该列表数据结构的目标，我们使用的不是反引号波浪号，而是反引号拼接\
  \ `∼@`。我们可以看到这返回了 `(clojure.core/+ 1 2 3)`，你可以将其粘贴到 REPL 中执行，以看到它产生正确的结果 `6`。\n\n\
  如果你想以编程方式求值形式 `` `(+ ∼@l) `` 的结果，你需要将其包裹在对 `eval` 函数的调用中（如列表 10-9 所示）。\n\n注意\n\n\
  你不能在没有反引号语法的情况下使用反引号拼接，因为这会使得 Clojure 编译器很难理解哪些内容应该或不应该被求值。\n\n## 生成符号（Generating\
  \ Symbols gensym/#）\n\n在使用宏时，你最终可能会遇到变量绑定（既在宏内部，也在包含它的局部作用域中）相互冲突的问题。为了解决这个问题，你可以利用\
  \ `gensym` 函数在宏内部生成一个唯一的符号。\n\n注意\n\n重要的是要认识到 `gensym` 总是会返回一个全新的唯一值，因此你还可以提供一个前缀字符串，以便在调试时帮助识别该符号。\n\
  \n```\n(gensym)\n;; G__791\n(gensym \"hello\")\n;; hello794\n`hello#\n;; hello__803__auto__\n\
  列表 10-10.\n使用 gensym 创建唯一标识符\n```\n\n在列表 10-10 中，最后一个示例使用了 `#` 作为 `gensym` 的简写语法，这意味着我们必须使用反引号\
  \ `` ` `` 语法；否则编译器将不知道如何处理（这是因为 `#` 是符号的有效字符）。\n\n同样值得注意的是，`#` 变体确保在整个引号表达式中使用相同的标识符，而每次对\
  \ `gensym` 的引用都会产生一个新值。\n\n\n\n## 宏剖析\n\n至此，我们已经基本了解了可用于创建动态且健壮的宏特性的各个独立部分。现在，让我们通过分析一个更复杂的宏示例代码片段并理解其工作原理，来将这些知识融会贯通。\n\
  \nClojure 没有传统的 `for` 循环结构（这里所说的“传统”指的是像 C 语言这样的底层语言），在这种结构中，你需要指定一个起始值、一个条件和一个增量器，然后循环执行，直到指定的条件不再满足为止。\n\
  \n为了在 Clojure 语言中解决这个问题，让我们将这个缺失的结构实现为一个宏。我们即将定义的 `for-loop` 宏执行后，应该将数字零到九输出到 `stdout`（每行一个数字）。\n\
  \n注意\n\n我建议你花足够的时间仔细研读清单 10-11，确保你能将目前学到的所有不同语法融会贯通。\n\n```\n(defmacro for-loop\
  \ [[sym init check change] & steps]\n`(loop [∼sym ∼init accumulated# nil]\n(if ∼check\n\
  (let [new-value# (do ∼@steps)]\n(recur ∼change new-value#))\naccumulated#)))\n(for-loop\
  \ [i 0, (< i 10), (inc i)]\n(prn i))\n清单 10-11.\n使用宏特性构建的自定义 for 循环结构\n```\n\n好的，让我们先看看我们是如何调用\
  \ `for-loop` 宏的。我们可以看到，我们传入了一个包含循环信息的向量：`[i 0, (< i 10), (inc i)]`。后面跟着一个“主体”表达式\
  \ `(prn i)`，我们期望它在每次循环迭代时执行。\n\n注意\n\n如果我们愿意，我们可以传入多个主体表达式，让当前的宏实现来执行它们。但为了简单起见并演示基本功能，我们每次迭代只提供了一个待求值的形式。\n\
  \n在宏内部，我们将传入的向量解构（即，从传入的向量数据结构中提取每个元素）为以下局部绑定：\n\n*   `sym`：`i`\n*   `init`：`0`\n\
  *   `check`：`(< i 10)`\n*   `change`：`(inc 1)`\n\n我们还获取了剩余的参数 `(prn i)`，我们假定这些参数是每次迭代要执行的主体，并使用\
  \ `& steps` 将它们赋值给一个 `steps` 集合。这意味着它被构造成一个列表，如下所示：`((prn i))`。\n\n此时，我们开始定义宏的主体部分。概括来说，我们执行以下步骤：\n\
  \n*   创建一个 `loop`（作为后续 `recur` 的目标）。\n    *   将符号 `i` 绑定到值 `0`。\n    *   将动态生成的符号（即\
  \ `accumulated#`）绑定到值 `nil`。\n*   使用 `if` 语句检查局部变量 `i` 的值是否小于 `10`。\n    *   `check`\
  \ 条件是在运行时传入宏的（即 `(< i 10)`）。\n    *   初始时该值会小于 `10`，因为我们刚刚将其设置为 `0`（参见上一步）。\n* \
  \  如果值大于或等于 `10`，那么 `else` 语句返回赋值给 `accumulated#` 的值。\n    *   稍后我们将看到 `accumulated#`\
  \ 如何在每次迭代中被更新为一个新值。\n*   如果值**确实**小于 `10`，那么我们就执行提供的主体表达式。\n    *   最后一个主体表达式的返回值被赋值给\
  \ `new-value#`。\n    *   然后我们使用 `recur` 跳回到 `loop` 的开头，并传入新值。\n    *   每次迭代传入的新值是执行\
  \ `change` 表达式（即 `(inc i)`）的结果。\n    *   然后，`accumulated#` 被传入当前赋值给 `new-value#`\
  \ 的值。\n\n从这些步骤中可以看出，解决方案的核心在于使用 `loop` 和 `recur` 来实现递归执行代码，并且在每次递归时，我们传入更新后的值，使得循环内的逻辑能够决定是继续递归还是停止。\n\
  \n实际上，理解宏的基础知识就是这些了。你现在应该已经掌握了足够的信息，可以去大展身手了……我是说，去创造灵感了！\n\n我还认为，我可能有必要说一句（尽管我已经在后悔了）：“能力越大，责任越大”；在\
  \ Clojure 中编写宏的语境下，这句话的意思是：使用宏会带来一些微妙的问题，尤其是在存在其他无需宏的解决方案时。如果你需要在编译时而不是运行时执行某些操作，那么，没问题，宏会有所帮助。但首先，请检查是否存在可以满足需求的标准函数。\n\
  \n注意\n\n你不能像使用标准函数那样，在代码中传递宏（例如，作为函数参数）。这最终意味着你会在代码设计中失去一些可组合性，而可组合性是函数式编程的一个基本原则。\n\
  \n## 总结\n\n在本章中，我们更深入地探讨了 Lisp 风格的语法，以帮助我们重新定义 Clojure 中可用的行为。这个概念（及其实现）非常强大，并且在核心库（以及其他标准\
  \ Clojure 命名空间）中有许多宏的例子。\n\n我建议在创建宏时从简单开始，并花相当多的时间研究现有 Clojure 实现的宏的源代码（同时也包括更广泛的\
  \ Clojure 社区创建的宏）。\n\n在下一章中，我们将重点介绍 Clojure 语言中可用的面向对象编程特性。请记住，Clojure 并非 100% 严格的函数式语言（例如，不像\
  \ Haskell³ 编程语言那样）。虽然我们不会深入探讨如何将 Java 代码与 Clojure 集成，但 Clojure 中可用的 OOP 特性与 Java\
  \ 环境很好地结合在了一起。\n\n脚注 1\n\n[`​en.​wikipedia.​org/​wiki/​Progressive_​enhancement`](https://en.wikipedia.org/wiki/Progressive_enhancement)\n\
  \n  2\n\n[`​sweetjs.​org/​`](http://sweetjs.org/)\n\n  3\n\n[`​www.​haskell.​org/​`](https://www.haskell.org/)\n\
  \n# 11. 面向对象\n\nClojure 令人困惑的一个方面是，尽管它旨在成为一种函数式编程语言，但它也确实提供了“面向对象”的特性（惊讶吧）。这与其他编程语言类似，例如\
  \ Scala，¹ 它也同时提供了 FP 和 OOP 语法。\n\n何时在 Clojure 中使用 OOP 是一个棘手的讨论点，它取决于你所从事项目的需求，因此我们不会对此发表任何武断的言论。不过，就我个人而言，我喜欢我们即将看到的一些项目的结构方面，并且使用特定类型来帮助构建不同系统之间的边界也很有价值。\n\
  \n归根结底，Clojure 中的 OOP 特性并不像其他语言中那样突出，而且绝对远不及 Scala 中的那么多，Scala 似乎旨在实现一种均衡的划分。\n\n\
  在本章中，我将介绍一个（小）精选的特性组，具体如下：\n\n*   `defprotocol`\n*   `deftype`\n*   `defrecord`\n\
  *   `reify`\n\n## Java 互操作\n\n在 Clojure 中使用面向对象特性时，你最终会发现每个特性都有其特定的细微差别，这些差别将其与\
  \ Clojure 用作宿主环境的底层 Java 语言/虚拟机联系起来。\n\n如果你计划使用 OOP 或与 Java 库交互，那么我建议你既阅读 Clojure\
  \ 关于与 Java 互操作主题的说明²，也查阅本章中描述的宏/函数的文档，因为它们会更详细地介绍 Clojure 内部如何处理不同的项目（有许多底层配置细节可能对某些读者感兴趣，但通常超出了本书的范围）。\n\
  \n\n\n## defprotocol\n\n`defprotocol` 宏与以下两种面向对象类型（`defrecord` 和 `deftype`）配合使用，其主要目的是创建一个接口。\n\
  \n如果你对接口的概念不熟悉，它的作用是定义一个契约：所有声称支持该特定接口的对象，都必须保证提供该契约所规定的功能。\n\n```\n(defprotocol\
  \ Foo\n  (bar [this abc])\n  (baz [this] [this abc]))\n代码清单 11-1.\n使用 defprotocol\
  \ 的简单接口示例\n```\n\n在代码清单 11-1 中，我们首先使用 `defprotocol` 宏定义了一个名为 `Foo` 的新协议。在这个代码块中，我们定义了两个方法：`bar`\
  \ 和 `baz`。这意味着任何声称支持此接口的对象，都必须为这些指定的函数及其特定的签名提供实现。\n\n`bar` 方法接受两个参数。第一个参数是 `this`，它应该是我们调用\
  \ `bar` 方法的对象实例（因此，我们沿用了许多编程语言（如 Java）中传统的 `this` 命名约定），而第二个参数是 `abc`。\n\n`baz`\
  \ 方法的定义类似。唯一的区别在于该方法具有“多重参数数量”，这意味着它可以用一个或两个参数来调用，并且我们可以根据调用方法时提供的参数数量来定义两种不同的行为。\n\
  \n注意\n\n`definterface` 是一个与 `defprotocol` 类似的功能。区别在于前者会生成一个实际的接口 `.class` 文件，Java\
  \ 可以利用该文件将有效的对象传递给 Clojure 函数。\n\n`defprotocol` 本身并不是非常有用，所以让我们进入下一节，看看它是如何被有效利用的。\n\
  \n## deftype\n\n为了能够使用我们定义的协议（即接口），我们需要一个具体的对象（类实例）来分配给它。这就是宏 `deftype` 和 `defrecord`\
  \ 发挥作用的地方。\n\n`deftype` 和 `defrecord` 都会创建一个对象，但使用哪一个取决于微妙的实现细节。例如，`deftype` 宏会创建一个精简的\
  \ Java 类实例，该实例允许进一步的 Java 互操作以及内部数据字段的修改。然而，`defrecord`（详见下一节）的行为更像一个简单的不可变哈希映射。\n\
  \n```\n(deftype Qux [data]\n  Foo\n  (bar [this args]\n    (prn (str \"hello \"\
  \ (subs (str (class this)) 6)\n              \" from bar! I've been given: \" args)))\n\
  \  (baz [this]\n    (prn (class this) data))\n  (baz [this args]\n    (prn (str\
  \ \"hello \" (subs (str (class this)) 6)\n              \" from baz! I've been given:\
  \ \" args))))\n代码清单 11-2.\n使用 deftype 的示例\n```\n\n好的，代码清单 11-2 中内容很多，让我们将其分解成几个部分。首先，我们可以看到我们定义了一个名为\
  \ `Qux` 的新类型，并指定它接受一个名为 `data` 的构造函数参数。\n\n`deftype` 的目的是最终生成一个行为非常类似于典型 Java 类的类型。因此，在接下来的示例（代码清单\
  \ 11-3）中，我们将看到，当我们初始化这个类型（类）时，我们能够将自己的特定数据传递给构造函数（随后在 `baz` 方法内部引用该数据）。\n\n当我们定义行为（即方法\
  \ `bar` 和 `baz`）时，我们可以看到我们指定了第一个预期的参数是对象实例本身。这是因为该类型使用了一种动态分发形式（我们在第 7 章中学习过这个概念），因此它需要知道将行为分发给哪个类型。我们将在代码清单\
  \ 11-3 中看到这一点。\n\n注意\n\n在 Clojure 中，你不必为协议定义的每个方法都定义行为。这似乎与其他基于面向对象的语言的工作方式相冲突（例如，通常在使用接口时，你同意实现其整个契约，因此你应该为所有指定的方法定义行为）。但\
  \ Clojure 并非如此。\n\n```\n(let [b (Qux. \"bing bop\")]\n  (.baz b)\n  (.bar b \"x\"\
  )\n  (.baz b \"y\"))\n;; user.Qux \"bing bop\"\n;; \"hello user.Qux from bar! I've\
  \ been given: x\"\n;; \"hello user.Qux from baz! I've been given: y\"\n代码清单 11-3.\n\
  调用我们的 Qux 类型（由 deftype 定义）\n```\n\n在代码清单 11-3 中，我们可以看到我们使用语法 `(ClassName. args)`\
  \ 初始化了类型（构造函数），在我们的示例中是 `(Qux. \"bing bop\")`。然后我们将返回的对象实例赋值给 `b` 这个 let 变量，之后我们使用语法结构\
  \ `(.methodName objectInstance args)` 调用每个后续方法（包括不同的参数数量变体），例如 `(.bar b \"x\")`。\n\
  \n\n\n## defrecord\n\n记录（record）是一种与映射（map）非常相似的数据结构，因为它是一个不可变的键/值存储，但它也类似于结构体（struct，其定义的对象具有特定的字段用于分配，因此方法可以应用于它）。\n\
  \n与 `deftype` 的一个关键区别在于，`defrecord` 是不可变的，而 `deftype` 可以改变其内部状态。但在讨论如何使用 `defrecord`\
  \ 之前，让我们先考虑一下你可能想要使用它的一些原因。\n\n注意\n\n如果在记录上定义方法，则还必须定义一个协议（接口）。\n\n如果你使用动态分发（例如，\
  \ multimethods），那么你可能会遇到的一个问题是，当你实际上只改变了整体功能的一小部分时，你最终会多次定义相似的行为。使用 `defrecord`（以及\
  \ `defprotocol`）则可以将方法和行为分组到一个统一的类型之下。\n\n从性能角度来看，与使用 `defrecord` 相比，multimethods\
  \ 相当慢，如前所述，`defrecord` 只不过是一个不可变的持久化映射数据结构。\n\n注意\n\n在内部，记录被表示为 Java 类。\n\n```\n\
  (defrecord Foo [bar baz qux])\n(def f (Foo. \"x\" \"y\" \"z\"))\nf ;; #user.Foo{:bar\
  \ \"x\", :baz \"y\", :qux \"z\"}\n(:bar f)\n;; \"x\"\n清单 11-4.\n简单 defrecord 示例\n\
  ```\n\n因此，在清单 11-4 中，我们可以看到我们定义了一个名为 `Foo` 的新记录，并期望它拥有字段 `bar`、`baz` 和 `qux`。然后我们定义了一个\
  \ `Foo` 的新实例，并将其赋值给变量 `f`。\n\n这个实例化过程的有趣之处在于记录名称后面使用了句点字符（点号）。这是 Clojure 与 Java\
  \ “互操作”的方式之一（请记住，“在底层” `Foo` 记录实际上被表示为 Java 类）。\n\n一旦我们创建了实例，我们就可以通过指定字段名称，后跟应分发行为以进行处理的对象实例\
  \ `(:bar f)` 来访问该字段。\n\n注意\n\n由于记录实际上是一个 Java 类，我们也可以使用点互操作符号来访问成员字段：`(.bar f)`。\n\
  \n现在，当我们定义记录时，会自动生成两个函数供我们使用。第一个是 `->` `Record`，第二个是 `map->Record`（其中 `Record` 是记录的名称）。使用前者，我们可以像这样创建实例：`(->Foo\
  \ \"x\" \"y\" \"z\")`，这并没有太大区别。我个人更喜欢 Java 互操作语法。但使用后者，你可以使用映射数据结构而不是标准参数来实例化记录。这在你已经有一个想要封装到记录中的数据结构的情况下非常有用。例如，`(map->Foo\
  \ {:qux \"z\" :bar \"x\" :baz \"y\"})`。\n\n注意\n\n使用 `map->Record` 时，映射数据结构中的键可以是任意顺序，这与\
  \ `Record.` 或 `->Record` 不同。\n\n现在让我们考虑一个例子，我们希望我们的记录也包含一个名为 `message` 的方法（以及之前定义的字段\
  \ `bar`、`baz` 和 `qux`）。\n\n```\n(defprotocol IFoo\n(message [obj]))\n(defrecord\
  \ Foo [bar baz qux]\nIFoo\n(message [obj] (str \"hello \" obj \" from \" bar \"\
  , \" baz \" and \" qux)))\n(def f (Foo. \"x\" \"y\" \"z\"))\nf\n;; #user.Foo{:bar\
  \ \"x\", :baz \"y\", :qux \"z\"}\n(.message f) ;; \"hello user.Foo@b679dccc from\
  \ x, y and z\"\n清单 11-5.\n带有附加方法的 defrecord 示例\n```\n\n在清单 11-5 中，我们可以看到，因为我们想要在记录中包含一个方法（并且因为记录实际上只是\
  \ Java 类），我们首先需要定义一个协议（接口）。我使用了在接口名称前加上大写字母 `i` 的约定（但你可以使用任何对你最有意义的约定）。我们定义的方法接受一个参数\
  \ `obj`。\n\n接下来，我们像之前一样定义我们的记录，但现在多了两行。第一行是我们希望支持的接口，第二行是协议的具体实现。你还可以看到该方法能够访问记录已初始化的其他字段。\n\
  \n最后，我们使用点 Java 互操作点符号来调用我们的方法。\n\n## Reify\n\n我们要看的最后一项是 `reify` 宏，它能够生成一个匿名类型。这与\
  \ `deftype` 和 `defrecord` 不同，后两者生成的是具名类型。`reify` 的唯一目的是提供一种方式来定义预先存在的协议/记录的**一次性**实现，同时它的主体是一个词法闭包，这意味着它可以访问周围的局部作用域。\n\
  \n这最好通过一个例子来演示（见清单 11-6），该例子突出了 `reify` 类型如何能够访问其周围的局部作用域以提供包装后的响应。\n\n注意\n\n请参阅\
  \ `clojuredocs.org` ³ 获取更实际的例子。\n\n```\n(defprotocol IFoo (message [obj]))\n(defrecord\
  \ Foo [bar baz qux] IFoo\n(message [obj] (str \"hello \" obj \" from \" bar \",\
  \ \" baz \" and \" qux)))\n(def f (Foo. \"x\" \"y\" \"z\"))\n(defn wrapper [instance]\n\
  (reify IFoo\n(message [_] (str \"wrapped result: \" (message instance)))))\n(message\
  \ (wrapper f))\n;; \"wrapped result: hello user.Foo@b679dccc from x,y and z\"\n\
  清单 11-6.\n用于一次性匿名实现的 reify 示例\n```\n\n## 总结\n\n这是一个非常简短的章节，主要关注 Clojure 语言中可用的一小部分面向对象特性。\n\
  \n我们避免讨论 Java 互操作特性以及如何从 Clojure 中使用 Java 代码，因为我认为这本书应该更侧重于 Clojure 而非 Java。一旦你开始引入与\
  \ Java 的互操作，就意味着需要一些 Java 基础知识（这超出了本书的范围）。\n\n我们学到的是，我们可以通过使用协议（`defprotocol` 允许我们定义清晰的接口边界）来很好地定义结构化代码，也可以使用\
  \ `deftype` 和 `defrecord` 来定义可变和不可变的类。我们还看到了如何为一次性协议/记录实现实现一个作用域包装器。\n\n在下一章中，我们将更仔细地研究\
  \ Leiningen 构建工具。到目前为止，我们一直将 Leiningen 用作 REPL 和简单的项目工具（用于定义一些额外的依赖项）。我们将研究 Leiningen\
  \ 中可用的不同类型的模板和应用程序结构，以及如何生成一个快速的静态网页。\n\n脚注 1\n\n[`​www.​scala-lang.​org/​`](https://www.scala-lang.org/)\n\
  \n  2\n\n[`​clojure.​org/​reference/​java_​interop`](https://clojure.org/reference/java_interop)\n\
  \n  3\n\n[`​clojuredocs.​org/​clojure.​core/​reify#example-542692cdc026201c​dc326d5d`](https://clojuredocs.org/clojure.core/reify#example-542692cdc026201cdc326d5d)\n\
  \n\n\n# 12. Leiningen\n\n在本章中，我想介绍一个名为 Leiningen 的 Clojure 项目自动化工具。¹ 到目前为止，我们一直在\
  \ REPL 环境中进行练习（这要归功于 Leiningen 的 `lein repl` 功能），但现在我们已经到了应该能够相当自信地编写 Clojure 代码的阶段，因此我们需要考虑典型的\
  \ Clojure 项目是如何创建、构建和部署的，而这正是 Leiningen 大显身手的地方。\n\n为了演示 Leiningen 如何构建一个项目，我们将构建一个简单的“Hello\
  \ World”Web 应用程序。这个应用程序的作用是处理页面请求，并返回一个显示“Hello World”消息的 HTML 文件。如你所见，这并不复杂，但它将突出显示只需执行几个快速的\
  \ shell 命令就能创建一个简单的静态网页是多么容易。\n\n然后，我将继续解释这一切是如何工作的，以及 Leiningen 中可用的各种模板，并指出从这一点出发，可以进一步阅读哪些内容以及有哪些值得关注的项目。\n\
  \n注意\n\n这不会是对构建复杂 Web 应用程序的深入讨论，因为坦率地说，关于这个主题已经写了很多本书，而且每个读者的需求都会有所不同。\n\n## 十秒示例\n\
  \n没有什么比一个超快速的十秒设置更好的入门方式了，它将展示几个简单命令的优雅之处，这些命令可以自动完成大量工作和结构设置，从而让我们无需操心。我们只需要运行四个命令，如下所示：\n\
  \n*   `lein new compojure-app foo`\n*   `cd foo`\n*   `lein ring server-headless`\n\
  *   `curl localhost:3000 -i`（或在浏览器中打开 `http://localhost:3000/`）\n\n注意\n\n在第 1 章中，我们介绍了\
  \ Leiningen 的安装，如果需要，请参考该章节。我使用的是 macOS，以下命令不需要安装任何特殊的依赖项（除了 Leiningen 本身）。\n\n\
  执行这些命令的结果可以在清单 12-1 中看到。如果我们愿意，前面的命令列表实际上可以缩短一个命令，只需将命令 `lein ring server-headless`\
  \ 改为 `lein ring server`，它仍然会像以前一样启动 Web 服务器，但现在会自动为我们打开一个 Web 浏览器并将其指向正确的本地 URL。\n\
  \n如果你使用“无头”服务器版本（如上所列），你需要打开另一个 shell 来执行 `curl` 命令，因为当服务器进程运行时，你当前的 shell 将被锁定。\n\
  \n```\n$ lein new compojure-app foo\n正在生成一个名为 foo 的漂亮新 Compojure 项目...\n$ cd foo\n\
  $ lein ring server-headless\nfoo 正在启动\n2017-06-24 18:21:02.012:INFO:oejs.Server:jetty-7.6.13.v20130916\n\
  2017-06-24 18:21:02.072:INFO:oejs.AbstractConnector:Started SelectChannelConnector@0.0.0.0:3000\n\
  服务器已在端口 3000 上启动\n清单 12-1.\n启动 Compojure Web 服务器的输出\n```\n\n注意\n\n清单 12-1 中使用的命令的语法结构是\
  \ `lein new <模板> <项目名称>`。在这个简单的示例中，我们使用了一个名为 `compojure-app` 的模板。有很多可用的模板，但这是一个流行的选择，原因我们很快就会知道。\n\
  \n访问 Compojure Web 服务器（这是我们之前示例中的 `curl` 命令）时生成的 HTML 如清单 12-2 所示，该服务器是在调用 `lein\
  \ ring` 时启动的。最终，我们看到一个简单的 HTML 页面，它使用一个名为 `screen.css` 的静态 CSS 文件进行样式设置，并显示一条居中的消息\
  \ `\"Hello World\"`。\n\n```\nHTTP/1.1 200 OK\n日期: Sat, 24 Jun 2017 17:41:31 GMT\n\
  内容类型: text/html;charset=UTF-8\n内容长度: 170\n服务器: Jetty(7.6.13.v20130916)\n\n欢迎来到 foobarHello\
  \ World!\n清单 12-2.\n生成的 HTML\n```\n\n## 帮助！\n\n在我们更详细地查看 Compojure Web 应用程序示例之前，值得一提的是，Leiningen\
  \ 工具内置了一个非常好的教程和帮助系统。对于入门教程（绝对值得你花时间），请执行清单 12-3 中所示的命令。\n\n```\nlein tutorial |\
  \ less\n清单 12-3.\nLeiningen 内置的帮助教程\n```\n\n注意\n\n我将教程输出通过管道传输到 `less` shell 可执行文件中，因为\
  \ `lein tutorial` 的输出很长，这样可以避免你一直滚动回开头。\n\n任何时候你不确定某个命令的作用，都可以参考 `help` 命令：`lein\
  \ help <命令>`。因此，如果（例如）你想了解更多关于创建新 Leiningen 项目的信息，可以运行命令 `lein help new`，输出将显示诸如哪些模板可供你使用，以及特定模板是如何创建/解析的等信息。\n\
  \n## Compojure\n\nCompojure² 是一个构建在 Ring³ 之上的路由库。如果你没有听说过 Ring，那么我将直接引用 Ring GitHub\
  \ 页面上的话来解释它：\n\n> Ring 是一个受 Python 的 WSGI 和 Ruby 的 Rack 启发的 Clojure Web 应用程序库。 —Ring.\
  \ GitHub\n\n现在，如果你同样不熟悉 WSGI 或 Rack，这不一定对你有帮助。本质上，这两个应用程序共享的是一个标准化的接口。因此，即使它们是独立的应用程序（为两种截然不同的语言构建），这也意味着如果你熟悉其中一个，那么另一个对你来说也将是可识别（且可理解）的。Ring\
  \ 支持与 WSGI 和 Rack 类似的接口，这给开发者带来了信心，让他们觉得使用 Ring 应该很自然。\n\n为了更好地理解这个接口，让我们从 Ruby\
  \ 的 Rack 的角度来看一个典型的“Hello World”HTTP 请求/响应是什么样的（见清单 12-4）。\n\n```\n[200, { 'Content-Type'\
  \ => 'text/html' }, ['Hello World!']]\n清单 12-4.\nRuby 的 Rack 接口示例\n```\n\n我们在清单\
  \ 12-4 中看到的是发送 HTTP 响应所需的 Ruby 代码。现在，你不需要太担心代码语法，尽管你会发现数据结构非常熟悉，所以此时它应该对你来说是可读的。\n\
  \n我们定义的是一个数组（即向量），其中包含了一些满足发送 HTTP 响应所需接口的基本内容：\n\n*   状态码：`200`\n*   HTTP 头：`{\
  \ 'Content-Type' => 'text/html' }`\n*   响应体：`'Hello World!'`\n\n如果你查看清单 12-5，你会看到从\
  \ Clojure 程序的角度来看，这个构建的 HTTP 响应是什么样子的。它几乎完全相同，因此你将开始看到拥有一个标准化接口如何在跨语言时有所帮助和用处。\n\
  \n```\n{:status 200\n:headers {\"Content-Type\" \"text/html\"}\n:body \"Hello World\"\
  }\n清单 12-5.\nClojure 中的 HTTP 响应示例\n\n```\n\n我们可以向这个数据结构添加更多设置，但状态码、一组 HTTP 头（例如，你很可能想要配置像缓存控制头这样的东西）和一个响应“体”就是你真正需要的全部内容。\n\
  \n注意\n\n关于 Ring⁴ 和 Compojure⁵ 的进一步阅读，可以在它们各自的 GitHub Wiki 页面上找到。\n\n\n\n## Compojure\
  \ 树形结构\n\n让我们快速了解一下使用命令 `lein new compojure-app foo` 创建的 Compojure Web 服务器的树形结构（参见列表\
  \ 12-6）。\n\nCompojure 应用的结构与其他应用并无太大差异（当我们查看 Leiningen 中提供的其他模板时就会发现这一点），但通过 Compojure\
  \ 模板，我们可以看到有一个 `src` 目录，其中包含了 Web 服务器应用的所有源代码。\n\n与 `src` 目录并列的是 `test` 目录，其中包含一组样板测试，以便我们了解典型测试用例的样式；此外还有一个\
  \ `resources` 目录，用于存放静态资源，例如 JavaScript、CSS 样式表和图片。\n\n```\n├── README.md\n├── project.clj\n\
  ├── resources\n│   └── public\n│       ├── css\n│       │   └── screen.css\n│  \
  \     ├── img\n│       └── js\n├── src\n│   └── foo\n│       ├── handler.clj\n│\
  \       ├── models\n│       ├── repl.clj\n│       ├── routes\n│       │   └── home.clj\n\
  │       └── views\n│           └── layout.clj\n└── test\n└── foo\n└── test\n└──\
  \ handler.clj\n列表 12-6.\nCompojure 树形结构\n```\n\n在列表 12-7 中，我们可以看到主文件 `home.clj`\
  \ 是如何工作的。它包含了我们在前几章学到的许多概念，例如命名空间、引入依赖并确定其引用方式，以及定义负责定义应用应处理的不同“路由”和“处理器”本身的函数。\n\
  \n让我们快速浏览一下 `home.clj`，以确保我们理解其设置以及应用自动配置了哪些路由（作为样板构建的一部分）。\n\n```\n(ns foo.routes.home\n\
  (:require [compojure.core :refer :all]\n[foo.views.layout :as layout]))\n(defn home\
  \ []\n(layout/common [:h1 \"Hello World!\"]))\n(defroutes home-routes\n(GET \"/\"\
  \ [] (home)))\n列表 12-7.\nCompojure home.clj 文件内容\n```\n\n首先，我们定义了一个命名空间，可以看到我们引入了\
  \ Compojure 核心函数，其中包括 `defroutes` 宏。我们还从自己的树形结构中引入了布局 `views` 文件，该文件使用 hiccup 库来处理\
  \ HTML 响应的构建（参见列表 12-8 中的 `layout.clj`）。\n\n`defroutes` 宏使我们能够定义应用应处理的特定路由。默认情况下，我们的应用通过指定我们希望处理任何\
  \ `GET` 请求来处理所有可能的路由，并且如果传入路径匹配 `\"/\"`（实际上所有请求都会匹配，因为它们都以 `/` 开头），则将请求信息传递给 `home`\
  \ 函数进行处理。\n\n如果我们想处理路径 `/foo/bar`，那么我们可以为 `\"/foo/bar\"` 定义一个 `GET` 请求，然后指定哪个函数应处理该路由。\n\
  \n`home` 函数调用 `layout/common` 函数（该函数通过我们的 `views layout.clj` 文件提供），并向该函数传递我们的响应体内容，在本例中是一个值为\
  \ `\"Hello World!\"` 的 `H1` 标题。\n\n```\n(ns foo.views.layout\n(:require [hiccup.page\
  \ :refer [html5 include-css]]))\n(defn common [& body]\n(html5\n[:head\n[:title\
  \ \"Welcome to foo\"]\n(include-css \"/css/screen.css\")]\n[:body body]))\n列表 12-8.\n\
  Compojure layout.clj 文件内容\n```\n\n从列表 12-8 中，我们可以看到 Compojure 使用的默认 HTML。这是一个简单的\
  \ HTML 页面，包含 `<head>`、`<title>` 和 `<body>`（其内容由 `common` 函数的调用者提供）。我们还可以看到它包含一个\
  \ `screen.css` 文件，该文件为页面提供了默认样式。\n\n## 测试\n\nCompojure 还在 `test/foo/test/handler.clj`\
  \ 文件中为我们构建了一些基本测试（参见列表 12-9）。该文件利用内置的 Clojure 测试库 `clojure.test` ⁶ 来定义一些简单的测试，以验证\
  \ Web 服务器是否按预期运行。\n\n注意\n\n这些测试是集成测试，而非单元测试。简而言之，单元测试用于验证单个函数（或代码单元）的行为，而集成测试则验证整个系统是否按预期工作。有关两者区别的更多信息，我推荐阅读\
  \ Nathan Hughes 简短但精彩的解释。⁷\n\n```\n(ns foo.test.handler\n(:use clojure.test\nring.mock.request\n\
  foo.handler))\n(deftest test-app\n(testing \"main route\"\n(let [response (app (request\
  \ :get \"/\"))]\n(is (= (:status response) 200))\n(is (.contains (:body response)\
  \ \"Hello World\"))))\n(testing \"not-found route\"\n(let [response (app (request\
  \ :get \"/invalid\"))]\n(is (= (:status response) 404)))))\n列表 12-9.\nCompojure\
  \ 的 test/handler.clj 文件内容\n```\n\n在列表 12-9 中，我们可以看到我们引入了 `clojure.test` 依赖以及 Ring\
  \ 自身指定的一个依赖，即其模拟请求库。⁸ 我们还引入了 Compojure 的 `handler` 文件，因为这样我们就可以访问该文件中的 `app` 函数。\n\
  \n从代码中可以看出，我们现在能够向 `app` 函数提供一个伪造的（即模拟的）请求对象，随后我们可以检查响应，并确定相关细节是否如我们所预期的那样返回。\n\n\
  就列表 12-9 而言，我们可以看到我们期望对 `\"/\"` 的请求会返回响应内容 `\"Hello World\"`，并且响应状态码应为 200（表示请求成功）。\n\
  \n第二个测试验证了当 Web 服务器收到一个针对其未配置处理的路径的请求时，会返回状态码 404（因此，在本例中，是对无意义的路径 `\"/invalid\"\
  ` 发起了请求）。\n\n为了运行这些测试，我们需要使用 Leiningen 的一个子命令：`lein test`。该命令会定位测试目录中的所有测试，并逐一执行。我们也可以通过指定相关的命名空间来仅执行特定的测试套件。例如，`lein\
  \ test :only foo.test.handler/test-app`。\n\n注意\n\n`test-app` 是在 `tests/handler.clj`\
  \ 中定义的测试套件容器，其中包含一组测试“上下文”，允许我们显示特定的输出消息。\n\n如果一切顺利，您将看到列表 12-10 中所示的输出；否则，如果出现错误（假设我们将成功请求的预期状态码输出从\
  \ 200 改为 202），您将看到列表 12-11 中所示的内容。\n\n```\nlein test foo.test.handler\nRan 1 tests\
  \ containing 3 assertions.\n0 failures, 0 errors.\n列表 12-10.\n成功测试输出\n```\n\n```\n\
  lein test foo.test.handler\nlein test :only foo.test.handler/test-app\nFAIL in (test-app)\
  \ (handler.clj:9)\nmain route\nexpected: (= (:status response) 202)\nactual: (not\
  \ (= 200 202))\nRan 1 tests containing 3 assertions.\n1 failures, 0 errors.\nTests\
  \ failed.\n列表 12-11.\n失败测试输出\n```\n\n以上内容涵盖了 Compojure Web 应用的基本设置和使用。显然，Compojure\
  \ 的功能和配置方式远不止于此，但正如前面提到的，关于 Clojure Web 开发这一主题已有整本书籍论述，因此现在让我们将注意力转向 Leiningen 中包含的模板集，这将向我们展示我们可以构建哪些其他类型的应用。\n\
  \n\n\n## 模板\n\n在回顾 Leiningen 内置的各种模板（互联网上还能找到许多满足各类需求的其他模板）时，你会注意到一个现象：每个模板的树结构并没有太大差异。这既是好事（因为它提供了统一的工作基础），也是坏事（因为它让人难以区分不同模板的差异和适用场景）。\n\
  \n那么，总结一下我们目前所知的内容：Leiningen 使用模板的概念来动态构建新项目。它有一些内置模板，也有大量外部模板（比如我在十秒示例中使用的 Compojure\
  \ 模板）。目前（撰写本文时）共有四个独立的内置模板，如下所示：\n\n*   `template`：用于创建“lein new”模板的元模板\n*   `default`：用于库的通用项目模板\n\
  *   `app`：应用程序项目模板\n*   `plugin`：Leiningen 插件项目模板\n\n### template\n\n因此，列表中的第一个模板实际上是用于定义新模板的模板。我不打算介绍如何创建自己的模板，因为这超出了本书的范围，而且说实话，我自己也从未有过使用它们的需求，因为我遇到的几乎所有用例都已经被开源社区覆盖了。请参见清单\
  \ 12-12。\n\n```\n├── CHANGELOG.md\n├── LICENSE\n├── README.md\n├── project.clj\n\
  ├── resources\n│   └── leiningen\n│       └── new\n│           └── foo\n│      \
  \         └── foo.clj\n└── src\n└── leiningen\n└── new\n└── foo.clj\n清单 12-12.\n\
  Leiningen “template” 模板的树结构\n```\n\n话虽如此，你可能有一些必须用于所有工作相关项目的组织结构和依赖项，因此创建一个模板来简化和加速这个重复的繁琐过程可能会很有益处。\n\
  \n注意\n\n一个使用自有模板的组织示例是 ClojureWerks 的 lein-template 仓库。⁹\n\n在清单 12-12 中，我们可以看到模板应用程序的目录结构。这只是为了让我们与其他模板相比有一个参考框架（参见清单\
  \ 12-12）。这里快速提醒一下创建此项目所需的命令：`lein new template <name>`。\n\n注意\n\nLeiningen 提供了一份很棒/简短的官方文档，解释了创建自己模板的相关步骤。¹⁰\n\
  \n本质上，要使用一个新的模板项目，你需要将你的模板部署到 Clojars¹¹（这是 Clojure 社区驱动的库的开放/公共仓库）。如果你将仓库命名为类似 `<name>/lein-template`\
  \ 的形式（其中 `<name>` 是你希望模板被引用的名称），那么 Clojure 开发者就可以执行 `lein new <name> <project_name>`，这将使\
  \ Leiningen 在 Clojars 中搜索标题为 `<name>/lein-template` 的模板项目。\n\n### default\n\n第二个模板（如前所述）用于通用库，而不是实际的应用程序。让我们看看它的目录结构（参见清单\
  \ 12-13）。\n\n```\n├── LICENSE\n├── README.md\n├── doc\n│   └── intro.md\n├── project.clj\n\
  ├── resources\n├── src\n│   └── \n│       └── core.clj\n└── test\n└── \n└── core_test.clj\n\
  清单 12-13.\nLeiningen “default” 模板的树结构\n```\n\n有两种方法可以生成默认项目。你可以显式指定，也可以隐式指定。如果显式指定，我们需要指定模板名称：`lein\
  \ new default <name>`。你也可以通过省略“default”部分来隐式指定。\n\n注意\n\n只要不存在名为 `<name>` 的模板，Leiningen\
  \ 就会假定你指定的是默认模板的项目名称。\n\n我们在清单 12-13 中看到的是它非常精简。如果我们查看 `project.clj`，会发现除了 Clojure\
  \ 本身之外没有其他依赖项，而 `core.clj` 也同样轻量，其中只包含一个函数。`core.clj` 中定义的函数以项目命名，它只是向标准输出（即终端屏幕）打印\
  \ `\"Hello World\"`。\n\n有趣的是，你会看到 `project.clj` 没有定义入口点（就像我们在 Compojure 模板的 `project.clj`\
  \ 中看到的那样）。这有助于强化一个概念：这个代码库不需要入口点，因为它预期会作为依赖库被加载到另一个代码库中，因此将通过 `ns` 宏来引用它。\n\n###\
  \ app\n\n第三种模板类型是“app”，尽管它的目录结构（参见清单 12-14）与库模板相同，但其目的仅仅是执行一些通用代码。\n\n我们所说的通用代码是什么意思？嗯，你可以创建一个命令行应用程序，或者决定下载构建\
  \ Web 应用程序所需的相关依赖项（这将成为你的项目重点）。这与库模板有根本区别，库模板的目的是让代码作为依赖项/库被加载到另一个项目/应用程序中。\n\n\
  ```\n├── CHANGELOG.md\n├── LICENSE\n├── README.md\n├── doc\n│   ├── intro.md\n├──\
  \ project.clj\n├── resources\n├── src\n│   ├── foo\n│       ├── core.clj\n├── test\n\
  ├── foo\n├── core_test.clj\n清单 12-14.\nLeiningen “app” 模板的树结构\n```\n\n考虑到这种差异，如果你现在查看\
  \ `src` 目录下的 `core.clj` 文件内容，你会发现其内容与库模板的 `core.clj` 略有不同，因为它定义了一个 `main` 函数（以连字符为前缀：`defn\
  \ –main`）。此外，在该文件的顶部，你会看到 `namespace` 宏包含了一个额外的配置设置 `(:gen-class)`。最后，`project.clj`\
  \ 文件本身有一个 `:main` 属性，指向我们的 `core.clj` 文件，以表明这是执行 `lein run` 命令时应执行的文件。\n\n现在让我们简要回顾一下这三个不同之处（`:main`、`-main`\
  \ 和 `gen-class`），以确保我们理解它们的目的。`:main` 属性的作用是通知 Leiningen 应用程序的入口点，但你可能会注意到还定义了一个额外的属性：`^:skip-aot`。它的作用是跳过\
  \ Clojure 的“提前编译”（AOT）步骤，¹² 通过将代码编译成 JVM 字节码，有助于加快应用程序的启动速度。\n\n考虑到 AOT 编译有助于提升性能，我们为什么可能想要跳过它呢？嗯，在某些情况下，你的代码可能依赖于只有在运行时才能知道的输入，因此如果你的代码引用了一个在编译时不可用的环境变量（例如，假设它只在部署应用程序的服务器上可用），那么这将意味着编译会将代码中引用该环境变量的所有地方都改为使用值\
  \ `nil`。\n\n注意\n\n有一些方法可以解决这类问题，但这超出了本书的范围/重点。\n\n对 `(gen-class)` 和函数 `-main` 的引用是结合使用的，因为它们本质上是耦合的。`gen-class`\
  \ 告诉 Clojure 编译器为你的命名空间创建一个新的 Java 类，而 `-main` 则定义了该 Java 类的行为。\n\n最后，这一切都与 `project.clj`\
  \ 中 `:main` 属性的使用相关联，因为它表明存在一个 Java 类应被用作应用程序的入口点。我建议阅读参考资料¹³ 以了解更多关于这些特性的信息。\n\n\
  \n\n### 插件\n\n第四种模板类型是“插件”，它对于为你的 Clojure 应用程序开发插件¹⁴代码非常有用。插件功能的一个例子是 `lein-eastwood`¹⁵，它是一个\
  \ Clojure 代码检查工具。\n\n为了使用一个插件（例如 lein-eastwood），你需要更新你的 `project.clj` 文件来引用该插件（例如，添加\
  \ `:plugins [[jonase/eastwood \"0.2.4\"]]`）。完成此操作后，你会发现该插件现在可以作为 Leiningen 的一个子命令使用，并且可以在你的项目上下文中执行代码。以\
  \ lein-eastwood 为例，它能够审查（即检查）你的代码中常见的错误。\n\n清单 12-15 展示了一个 Leiningen 插件的典型目录结构。为了帮助你了解插件还能提供哪些其他类型的行为，我建议你仔细查阅\
  \ Leiningen 插件的官方列表¹⁶（数量非常多！）。\n\n```\n├── LICENSE\n├── README.md\n├── project.clj\n\
  ├── src\n├── leiningen\n├── .clj\n清单 12-15.\nLeiningen “插件”模板的树形结构\n```\n\n注意\n\n\
  Leiningen 提供了一份关于如何创建你自己的插件的优秀文档¹⁷，强烈推荐阅读。\n\n## 项目文件\n\n在所有不同类型的项目/模板中，有一个始终如一的元素就是项目文件本身：`project.clj`。这个文件的主要目的是引导你的应用程序启动。它通过定义项目的依赖关系，并在你首次运行项目应用程序代码时为你拉取这些依赖来实现这一点。\n\
  \n`project.clj` 还允许你关联元数据，例如项目描述和 URL，以及定义你想要使用的任何插件（以及更多其他内容）。\n\n有关可用配置设置的完整列表，我建议你阅读\
  \ Leiningen 模板示例文件¹⁸，该文件非常详细地解释了每一个可用的设置（而且数量很多）。\n\n让我们来看一个通用的 Compojure “Hello\
  \ World” 应用程序（就像我们之前创建的那个）的 `project.clj` 文件，看看我们是否能更好地理解我们所获得的配置的不同方面。\n\n```\n\
  (defproject compojure-foo \"0.1.0-SNAPSHOT\"\n:description \"FIXME: write description\"\
  \n:url \"http://example.com/FIXME\"\n:dependencies [[org.clojure/clojure \"1.8.0\"\
  ]\n[compojure \"1.5.2\"]\n[hiccup \"1.0.5\"]\n[ring-server \"0.4.0\"]]\n:plugins\
  \ [[lein-ring \"0.8.12\"]]\n:ring {:handler compojure-foo.handler/app\n:init compojure-foo.handler/init\n\
  :destroy compojure-foo.handler/destroy}\n:profiles\n{:uberjar {:aot :all}\n:production\n\
  {:ring\n{:open-browser? false, :stacktraces? false, :auto-reload? false}}\n:dev\n\
  {:dependencies [[ring-mock \"0.1.5\"] [ring/ring-devel \"1.5.1\"]]}})\n清单 12-16.\n\
  Compojure 项目的 project.clj 文件\n```\n\n在清单 12-16 中，我们可以看到一些 Clojure 代码，它使用 `defproject`\
  \ 宏来构建项目的引导程序。它已经使用我们运行 `lein new...` 时提供的名称进行了设置，并将应用程序的版本默认为 `0.1.0-SNAPSHOT`。当我们准备发布应用程序时，可以将其更改为我们想要的任何值（例如，你可能希望将其更改为\
  \ 1.0.0 或 0.0.1）。\n\n注意\n\n通常，这里使用的版本格式暗示了语义化版本控制¹⁹：`<主版本>.<次版本>.<补丁>`，而使用 `SNAPSHOT`\
  \ 是 Java 版本命名约定。\n\n接下来，我们有一个标准的 `:description` 字段和一个关联的 `:url` 字段，以便用户知道项目的源代码（或推广品牌）可以位于何处。\n\
  \n我们还有一个 `:dependencies` 字段（可以说是这个文件中最重要的项目之一）。对于 Compojure 应用程序，我们发现 Compojure\
  \ 应用模板已经自动为我们预填了一些有用的依赖：\n\n*   `org.clojure/clojure \"1.8.0\"` — Clojure 语言\n*\
  \   `compojure \"1.5.2\"` — HTTP 请求路由库²⁰\n*   `hiccup \"1.0.5\"` — 用于渲染 HTML 的库²¹\n\
  *   `ring-server \"0.4.0\"` — 用于 Ring 接口的 Web 服务器²²\n\n注意\n\n当你运行 Leiningen 时，它会自动拉取你所有的依赖，但你也可以随时使用子命令\
  \ `lein deps` 手动执行此操作。\n\n继续往下看，我们有 `:plugins` 设置，它引入了插件 `lein-ring`²³，该插件负责自动化一些常见的基于\
  \ Ring 的任务。这个插件为 `project.clj` 文件添加了一个额外的设置，一旦指定，我们就需要包含以下属性：`:ring {…配置…}`。\n\n\
  正如我们从 `project.clj` 文件中看到的，当使用 Compojure 模板时，它会自动为我们预填 `:ring` 属性的配置，以便它知道主处理函数的位置，并识别用于设置和拆卸行为的函数（默认情况下这些是空操作函数，意味着它们是已定义的函数，但没有定义任何行为）。\n\
  \n接着往下看，我们看到 `:profiles` 设置。这允许我们根据环境定义某些行为。因此，我们可以看到有一个 `:production` 属性，它定义了应用程序在生产环境中应如何表现（例如，我们设置\
  \ `:auto-reload? false`，因为这种行为仅在本地开发应用程序代码时有用；我们还设置 `:stacktraces? false`，因为我们希望向用户隐藏这类信息）。类似地，我们有一个\
  \ `:dev` 属性，我们在其中指定仅在本地开发时有用的依赖。\n\n如果你想了解更多关于这些配置选项的信息，那么我建议你查看 `lein-ring` 插件的\
  \ GitHub 页面²⁴，那里会提供最新的详细信息。\n\n注意\n\n你可以通过使用 `with-profile` 选项运行应用程序来在本地测试你的配置文件（例如，`lein\
  \ with-profile production run some_app`）。\n\n## compojure 与 compojure-app 对比\n\n\
  我们使用 `lein new compojure-app <应用名称>` 创建了一个“Hello World”示例，这为我们免费提供了很多东西，例如处理静态资源以及提供一些基本的\
  \ CSS 来配合我们的 HTTP 响应。\n\n但我们也可以使用 `lein new compojure <应用名称>`（注意 `compojure-app`\
  \ 现在只是 `compojure`），它仍然会像以前一样为我们提供一个简单的 Web 服务，但现在它被进一步精简了！这意味着没有花哨的 HTML 包裹着我们的“Hello\
  \ World”消息，只有纯文本发送回浏览器。\n\n我建议你探索这两种模板类型之间的其他差异，但你最终选择哪种模板取决于你对处理丰富 HTML 响应的许多繁琐方面的熟悉程度。对于大多数人来说，`compojure-app`\
  \ 是快速高效启动和运行的最简单途径。\n\n\n\n## 真实世界的库示例\n\n有时最好看看真实项目是什么样子。例如，构建一个 Clojure Web 应用程序是一回事（大多数开发者都能应付——或许借助一些谷歌搜索），但我从个人经验中发现，构建一个被其他应用程序使用的库可能是一个相当令人困惑的过程。因此，我想向你展示一个我编写的小型\
  \ Clojure 库，它帮助我使用一个名为 Spurious²⁵ 的工具（这是几年前的一个例子，但原理仍然适用）。\n\n我们将从理解 Spurious 是什么开始，然后查看我创建的库项目，并简要浏览一个使用该库的示例应用程序。但首先，让我们参考\
  \ Spurious 的 README 文件，看看它是如何描述自己的：\n\n> Spurious 是一个工具集，允许在本地针对 AWS²⁶ 资源的子集进行开发。这些服务以\
  \ Docker 容器形式运行，Spurious 管理它们的生命周期和链接，因此你只需专注于使用这些服务。要使用 Spurious，你需要将每个 AWS 服务的端点和端口更改为\
  \ Spurious 提供的值。——Spurious. GitHub\n\n简而言之，Spurious 试图在开发使用 AWS 服务的应用程序时为你节省资金（通过在本地运行这些服务）。这对我来说非常棒，因为我经常使用\
  \ AWS，它让我能够进行实验，而无需为可能永远不会成型的代码付费。\n\n注意\n\n为了让事情更复杂（对我自己而言），我需要我的库代码在标准 Clojure\
  \ 应用程序中加载时能够工作，同时也要在应用程序从 Docker 容器内运行时能够工作（这不一定导致更多代码，但增加了整体过程的复杂性，以及对如何编写和测试我的库的理解难度）。\n\
  \n你可以在 GitHub²⁷ 上找到我的库代码，以及使用该库的示例应用程序²⁸。我不会详细讲解它们的细节，但我会提供链接，因为它们将作为有用的参考点。\n\n\
  ### 消费者\n\n让我们从示例应用程序以及它如何使用我的库开始。如果你查看 `project.clj`，你会看到我简单地将我的库定义为一个依赖项。请查看清单\
  \ 12-17 以了解简化后的示例。\n\n```\n(defproject spurious-clojure-example \"0.1.0\"\n:dependencies\
  \ [[spurious-aws-sdk-helper \"0.2.0\"]])\n清单 12-17.\n消费者 project.clj 示例\n```\n\n\
  所以，这里没什么特别的；我们有一个依赖项，并指定了我们希望应用程序使用的特定版本。\n\n### 本地测试\n\n如果你不熟悉发布库的过程，我将快速绕道说明我需要做什么才能测试并将自己的库作为依赖项加载。\n\
  \n首先，我需要将我的库部署到 Clojure 的在线可用库仓库（称为 Clojars²⁹）。这需要你遵循 Leiningen³⁰ 提供的说明，但本质上涉及的步骤是注册一个账户，然后执行子命令\
  \ `lein deploy clojars`。\n\n但是，在发布之前如何测试你的库代码呢（你怎么知道它能工作）？你不想推送版本 1.0.0，然后使用时发现有一个你未预料到的\
  \ bug。你想使用本地应用程序在本地测试库，这样你可以 100% 确定它能工作（这对我来说尤其重要，因为我的库需要在 Docker 容器内工作，而我不确定没有手动步骤就能验证这一点）。\n\
  \n解决这个问题的方法很简单：将库安装到本地缓存目录。要理解这意味着什么，你需要知道 Leiningen 会为你的依赖项创建一个本地缓存。它这样做是为了避免为你创建的每个项目反复下载相同的依赖项。\n\
  \n这意味着我们可以利用本地缓存来“欺骗”Leiningen，让它以为已经在线下载了依赖项（即从 Clojars 下载），即使该依赖项在线尚不存在。要做到这一点，你只需（在你的库项目目录内）运行\
  \ `lein install`，这会将你的库安装到本地的 `∼/.m2` 缓存目录中。\n\n### 加载依赖项\n\n查看清单 12-18，了解消费者的 `home.clj`\
  \ 文件是什么样的。在这里，你将看到我们如何拉取库以供使用。\n\n```\n(ns spurious-clojure-example.routes.home\n\
  (:require [compojure.core :refer :all]\n[spurious-aws-sdk-helper.core :as core]\n\
  [spurious-aws-sdk-helper.utils :refer [endpoint cred]]))\n清单 12-18.\n加载外部依赖项（为简洁起见已缩短）\n\
  ```\n\n你可以看到我拉取了 `core` 命名空间并对其重命名，以便更容易引用该加载命名空间中的公共函数（例如 `core/configure`）。你还可以看到我从\
  \ `utils` 命名空间中引用了两个函数：`endpoint` 和 `cred`。\n\n在不陷入逐行解释的情况下，这基本上就是在消费者中加载库的全部内容。这与我们目前学到的关于命名空间和\
  \ Leiningen 项目的所有知识是一致的。\n\n\n\n### 审查库\n\n查看我们的辅助库时，可以看到我采用了极其简单且扁平的文件夹结构（清单 12-19）。这表明，如果你的层级结构不需要很深或嵌套，完全可以避免这样做。\n\
  \n```\n.\n├── src\n├── spurious_aws_sdk_helper\n├── core.clj\n├── dynamodb.clj\n\
  ├── s3.clj\n├── sqs.clj\n├── utils.clj\n├── project.clj\n清单 12-19.\nClojure 库的简单树形结构\n\
  ```\n\n我有一个单独的 `src` 文件夹，其中又有一个名为 `spurious_aws_sdk_helper` 的文件夹，里面包含了库所需的所有 Clojure\
  \ 文件。`core.clj` 负责加载其余文件：`dynamodb.clj`、`s3.clj` 和 `sqs.clj`。\n\n`utils.clj` 文件（正如你所料）包含大量实用函数。该文件中只有两个函数是公开的，以便我们的消费应用程序可以调用它们来启动并运行服务；其余函数都是私有的，仅供库内部使用。\n\
  \n注意\n\n请记住，你可以通过连字符 `defn-` 来判断函数何时被定义为私有（公开函数使用你已经熟悉的标准 `defn` 宏）。\n\n一个值得关注的点是，`core`\
  \ 命名空间中的 `configure` 函数如何使用多参函数，以便根据是否提供了 `opts` 映射来执行不同的行为。\n\n```\n(defn configure\n\
  ([type]\n(s3/setup  type)\n(ddb/setup type))\n([type opts]\n(if-let [name   (:s3\
  \  opts)] (s3/setup  type name))\n(if-let [name   (:sqs opts)] (sqs/setup type name))\n\
  (if-let [schema (:ddb opts)]\n(ddb/setup type (yaml/parse-string schema)))))\n清单\
  \ 12-20.\n简单多参函数示例\n```\n\n如清单 12-20 所示，如果没有提供 `opts`，我们只需为 S3 和 DynamoDB 调用 `setup`\
  \ 方法；否则，如果提供了 `opts` 参数，我们使用 `if-let` 从提供的 `opts` 哈希中提取相关键（例如 `:s3`、`:sqs` 或 `:ddb`），然后将其与\
  \ `name` 符号关联。我们将再次为每个服务调用 `setup` 方法，这次会传入 `name`。\n\n注意\n\n我们之前没见过 `if-let`，但它是一个极其有用的宏，它允许我们仅在\
  \ `let` 绑定能够成功将数据解构到指定符号时，才执行一段代码（你还有类似的选项，例如 `when-let` 和 `letfn`，值得进一步探索）。\n\n\
  ### 准备部署\n\n现在，假设你有一个想要部署的项目（如果是库，那么如前所述，你需要将库部署到 Clojars，这样其他应用程序才能使用它）。\n\n否则，如果这是一个标准应用程序而非库，那么\
  \ Leiningen 也提供了一个单一命令来帮助我们打包应用程序，使其能够轻松部署到生产服务器并几乎无需繁琐操作即可运行：`lein uberjar`。\n\n\
  当在 `project.clj` 中正确配置后（稍后会介绍），`uberjar` 命令将生成一个包含项目代码及其所有依赖项的单一 jar 文件。如果你之前没有处理过\
  \ `.jar` 格式，清单 12-21 将展示如何从命令行执行 jar 文件。\n\n```\njava -jar my_jar_file.jar   \n\
  清单 12-21.\n通过终端执行 Jar 文件的示例\n```\n\n如果你使用 `lein-tar` 插件，³¹ 那么你可以使用 `lein tar` 命令；如果你使用\
  \ `lein-ring`，³² 那么你可以使用 `lein ring uberjar`（或者如果需要兼容旧服务器，可以使用 `lein ring war`）来构建\
  \ Web 应用程序。\n\n现在，回到标准的 `lein uberjar` 命令，我之前提到你需要配置应用程序才能使该命令正常工作。你需要修改 `project.clj`，添加一个\
  \ `:main` 键，并指定一个指向应用程序入口点的命名空间。\n\n如果你查看示例应用程序，³³ 你会看到我将命名空间设置为 `:main ^:skip-aot\
  \ spurious-clojure-example.repl`。该命名空间指向 `src/spurious_clojure_example/repl.clj`，并且在该文件中我添加了一个名为\
  \ `main` 的新函数。`main` 函数负责启动 Web 服务器（参见清单 12-22）。\n\n```\n(defn -main []\n(start-server))\n\
  清单 12-22.\nClojure 示例应用中的 main 函数示例\n```\n\n注意\n\n如前所述，我们的主入口点还需要 `(gen-class)`，所以你会注意到我也将其包含在了文件中。\n\
  \n实际上，这一切归结为（取决于你的应用程序功能）：修改 `project.clj` 中的 `:main` 键，使其指向一个包含 `main` 函数的文件，该函数以所需方式引导你的应用程序，并确保在文件顶部添加\
  \ `(gen-class)`（请参阅本章前面的内容以了解原因）。\n\n\n\n## 总结\n\n通过本章的学习，我们已充分掌握了使用 Leiningen 的基础知识，以及如何利用特定模板（例如\
  \ `compojure-app`）构建项目，并了解了各种内置模板之间的差异。\n\n我并未深入探讨 Web 应用程序的构建，因为每个项目的需求都过于庞大且独特。如果你对使用\
  \ Clojure 进行 Web 开发感兴趣，我强烈建议阅读《Web Development with Clojure》³⁴。这本书很好地介绍了大量可组合使用的\
  \ Clojure 库和插件，用以构建健壮的 Web 应用程序。\n\n在下一章中，我们将探讨如何构建一个命令行界面应用程序。内容将涵盖此类应用程序的基本设置以及可用的各种开发工具。这将有助于你拓宽对\
  \ Clojure 的认知，不再局限于 Web 编程语言，并为利用操作系统优势的有用业务工具开辟新的可能性。\n\n脚注 1\n\n[`​leiningen.​org/​`](http://leiningen.org/)\n\
