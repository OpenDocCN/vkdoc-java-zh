  \n\n\n# 13. 命令行应用程序\n\n在本章中，我们将完成两件事：首先，我们将回顾 Clojure 的 `tools.cli` 库，以了解如何利用它来帮助我们设计和开发命令行应用程序。其次，我们将探讨如何打包此应用程序，以便我们能够分发它。\n\
  \n构建命令行应用程序是大多数开发者喜欢做的事情，因为它提供了一种丰富其工作环境（以及其团队或更广泛开发者社区的环境，如果他们设计的工具足够抽象，能够对除自己之外的更多人有用）的方式。在设计\
  \ CLI 工具时，可能性是无限的，因为你拥有很大的发挥空间。\n\n一旦我们回顾了 `clojure/tools.cli` 和打包选项，你会发现我们已经涵盖了绝大部分你需要了解的内容。剩下的就靠你自己了；你如何设计和构建应用程序将取决于你想要构建的工具以及你试图解决的问题。\n\
  \n让我们首先使用我们在上一章中看到的 Leiningen `app` 模板创建一个新项目。命令是 `lein new app cli-foo`（你可以随意命名你的应用程序，但我选择了简单而有效的\
  \ `cli-foo`）。\n\n在该项目中，打开你的 `project.clj` 并更新依赖项键，以包含 `clojure/tools.cli` 依赖项。参见清单\
  \ 13-1 以查看上下文中的更改。\n\n```\n(defproject cli-foo \"0.1.0-SNAPSHOT\"\n:description\
  \ \"FIXME: write description\"\n:url \"http://example.com/FIXME\"\n:license {:name\
  \ \"Eclipse Public License\"\n:url \"http://www.eclipse.org/legal/epl-v10.html\"\
  }\n:dependencies [[org.clojure/clojure \"1.8.0\"]\n[org.clojure/tools.cli \"0.3.5\"\
  ]]\n:main ^:skip-aot cli-foo.core\n:target-path \"target/%s\"\n:profiles {:uberjar\
  \ {:aot :all}})\n清单 13-1.\n更新 project.clj 以包含 tools.cli 依赖项\n```\n\n注意\n\n你需要做的一件事（我们稍后会解释原因）是从\
  \ `project.clj` 中删除 `:target-path` 属性。\n\n好的。现在让我们打开 `src/cli_foo/core.clj` 并进行清单\
  \ 13-2 中所示的修改。这里有很多内容，所以我们将花一些时间来分解每个更改，以确保我们理解我们在做什么以及为什么这样做。\n\n你首先会注意到我们更新了 `ns`\
  \ 宏，以确保我们引入了来自 `cli` 命名空间的 `parse-opts` 函数。这允许我们解析传入的参数（用户在使用工具时提供的），并以对我们的应用程序有意义的方式智能地处理输入。\n\
  \n```\n(ns cli-foo.core\n(:require [clojure.tools.cli :refer [parse-opts]])\n(:gen-class))\n\
  (defn exit [status msg]\n(println msg)\n(System/exit status))\n(def cli-options\n\
  [[\"-p\" \"--port PORT\" \"端口号\"\n:default 80\n:parse-fn #(Integer/parseInt %)\n\
  :validate [#(< 0 % 0x10000) \"必须是一个介于 0 和 65536 之间的数字\"]]\n[\"-v\" nil \"详细程度级别\"\
  \n:id :verbosity\n:default 0\n:assoc-fn (fn [opts k v] (update-in opts [k] inc))]\n\
  [\"-x\" \"--xxx WHATEVER\", \"此选项的描述\"\n:default 123]\n[\"-h\" \"--help\"\n:id :custom-help]])\n\
  (defn -main [& args]\n(let [{:keys [options arguments errors summary]} (parse-opts\
  \ args cli-options)]\n(cond\n(:custom-help options) (exit 0 summary)\n(not (nil?\
  \ errors)) (exit 1 errors)\n:else (exit 0 (parse-opts args cli-options)))))\n清单\
  \ 13-2.\n我们命令行工具的主要应用程序逻辑\n```\n\n接下来你会注意到我们定义了一个 `exit` 函数。这个函数的目的是接受一个“退出码”（如果一切执行成功，通常为\
  \ `0`；如果出现错误，则为正数¹）。我们将退出码传递给 `System/exit` 函数，该函数将确保应用程序正确且恰当地关闭。该函数还接受一个 `msg`\
  \ 参数，顾名思义，它将用于打印消息。消息被发送到 `stdout`（标准输出²），在这种情况下是终端屏幕。\n\n之后，我们定义了一个 `cli-options`\
  \ 变量，并为其分配了一个大型嵌套向量数据结构，其中包含一组非常具体的属性定义。向量中的每个项目定义了一个单独的标志。\n\n注意\n\n标志是我们提供给命令行应用程序以配置其行为的东西。例如，`ls\
  \ -l -a` 是 `ls` 命令（列出所有文件和目录），并应用了两个标志 `-l` 和 `-a`，这会影响显示的输出。\n\n我们可以看到我们定义了以下标志（这些都是任意编造的标志），我们很快就会看到，在应用程序本身中，除了将它们打印到屏幕上之外，我们实际上并没有对这些标志做太多处理，但它们被选用来演示\
  \ `tools.cli` 库的一些不同方面：\n\n*   `-p`，`--port`：演示 `:parse-fn` 和 `:validate`\n*   `-v`，`--verbosity`：演示\
  \ `:assoc-fn`\n*   `-x`，`--xxx`：演示 `:default`\n*   `-h`，`--help`：演示 `:id`\n\n注意\n\
  \n要查看可用属性的完整列表，我建议你阅读源代码文件，其中记录了所有属性。³\n\n我们将稍后回到这些标志的含义及其工作原理，但让我们先继续看代码的最后一部分，即\
  \ `-main` 函数。我们在这个函数中做的第一件事是调用 `parse-opts` 函数，并向其提供通过命令行工具用户传递给我们的参数，以及我们定义和配置的\
  \ `cli-options` 标志。\n\n我们从 `parse-opts` 得到的是一个包含四个键的映射数据结构：`:options`、`:arguments`、`:summary`\
  \ 和 `:errors`。参见清单 13-3 以了解分配给每个键的描述。我们将每个键分配给一个特定的符号以便于引用。\n\n```\n{:options  \
  \   选项映射，以 :id 为键，映射到解析后的值\n:arguments   未处理参数的向量\n:summary     包含最小选项摘要的字符串\n:errors\
  \      可能的错误消息字符串向量}\n清单 13-3.\n从 parse-opts 函数返回的映射\n```\n\n接下来，在 `-main` 函数中，我们定义了一个条件：如果用户包含了标志\
  \ `-h` 或 `--help`，那么我们应该调用 `exit` 函数，并传递由 `parse-opts` 返回的 `:summary` 值。\n\n你还会注意到，我们通过查找我们在\
  \ `:options` 字段中为该标志定义的 `:id`（`:custom-help`）来识别是否指定了帮助标志，该字段由 `parse-opts` 返回。\n\
  \n接下来，在该条件之后，我们声明如果解析参数和/或标志时出现错误，那么我们应该调用 `exit` 函数，但提供退出码 `1`（表示错误），然后传递由 `parse-opts`\
  \ 返回的错误消息本身（具体来说是 `:errors` 字段），以便用户可以看到他们可能做错了什么。\n\n最后，我们有一个 `else` 语句，它表示调用 `exit`\
  \ 函数并提供退出码 `0`（表示一切正常），然后简单地再次调用 `parse-opts` 并将其返回值用作我们将要显示给用户的内容。\n\n至此，我们对这个应用程序的了解已经足够，可以开始研究如何编译和运行它了。我们接下来将这样做，然后在运行应用程序并探索如何与之交互之后，我们可以返回并回顾我们定义并分配给\
  \ `cli-options` 变量的标志配置设置，希望能更深入地理解它们在实际中是如何使用的。\n\n\n\n## 运行 CLI 应用程序\n\n目前，我们有三种方式可以运行这个应用程序：\n\
  \n1.  直接通过 Leiningen 运行\n2.  将应用程序编译成 jar 包\n3.  将应用程序编译成二进制文件\n\n在测试阶段，我们会使用第一种方式。稍后，我会向你介绍第二和第三种方式，不过实际上第三种方式可能是你最感兴趣的，因为它能让我们像运行真正的命令行二进制文件一样运行应用程序（就像你常用的标准二进制文件，例如\
  \ `ls` 或 `cat` 等）。\n\n### 通过 Leiningen 运行\n\n要通过 Leiningen 运行命令行应用程序，我们只需执行一个具有以下语法结构的命令：`lein\
  \ run <选项> <参数>`。例如，在代码清单 13-4 中，我们可以看到这样一个适用于我们已定义应用程序的示例。\n\n```\nlein run -v\
  \ -p 9090 -x 666 arg1 arg2 arg3\n代码清单 13-4.\n执行我们的命令行应用程序\n```\n\n上述命令的输出结果如代码清单\
  \ 13-5 所示，我们可以看到，显示的输出正是我们期望从 `parse-opts` 函数返回的内容。\n\n```\n{:options {:xxx 666,\
  \ :verbosity 1, :port 9090}, :arguments [arg1 arg2 arg3], :summary   -p, --port\
  \ PORT     80   Port number\n-v                       Verbosity level\n-x, --xxx\
  \ WHATEVER  123  A description for this option\n-h, --help, :errors nil}\n代码清单 13-5.\n\
  应用程序的输出\n```\n\n还记得在代码清单 13-3 中，我们是如何描述返回的映射数据结构中应包含的四个属性的吗？现在，我们在这里可以看到它们，以及它们被赋予的实际值。这将帮助我们更好地理解如何在应用程序中使用它们。\n\
  \n注意\n\n如果没有错误，那么 `:errors` 字段应被赋予 `nil` 值。\n\n### 通过 Jar 包运行\n\n通过 jar 包运行应用程序与直接通过\
  \ Leiningen 运行并没有太大区别。标志选项和参数完全相同；只是你需要引用一个 jar 文件，而不是引用 Leiningen。\n\n这意味着我们首先需要将应用程序编译成\
  \ jar 包，你可以使用命令 `lein uberjar` 来完成。运行该命令后，你应该会看到类似于代码清单 13-6 的输出。\n\n```\nCompiling\
  \ cli-foo.core\nCreated /Users/M/cli-foo/target/uberjar+uberjar/cli-foo-0.1.0-SNAPSHOT.jar\n\
  Created /Users/M/cli-foo/target/uberjar/cli-foo-0.1.0-SNAPSHOT-standalone.jar\n\
  代码清单 13-6.\n生成应用程序 Jar 包的输出\n```\n\n从输出中可以看到，该命令为我们生成了一组 jar 包（如果这确实是一个标准应用程序而非命令行变体，这些\
  \ jar 包还可以用于部署）。现在，让我们看看如何运行生成的 jar 文件。假设你当前在 `cli-foo` 目录内，你应该执行代码清单 13-7 中的命令。\n\
  \n```\njava -jar target/cli-foo-0.1.0-SNAPSHOT-standalone.jar -v -p 9090 -x 666\
  \ arg1 arg2 arg3\n代码清单 13-7.\n运行我们应用程序的 Jar 命令\n```\n\n### 通过二进制文件运行\n\n我认为这种打包方式会是读者最感兴趣的。我们希望我们的应用程序能够在任何操作系统上运行，且设置简单、无需繁琐操作。为此，我们需要使用一个外部插件。\n\
  \n我们将使用的插件叫做 `lein-bin`，⁴ 它会获取 Leiningen 原本会生成的 uberjar，并将其与特定配置一起包装成另一种格式，使其能够在\
  \ Windows、Mac 或 Linux 环境中运行。\n\n首先，我们需要在 `project.clj` 中更新 `lein-bin` 插件，并提供一些额外的设置，例如为我们的二进制文件命名（这里，我希望我的二进制文件名为\
  \ `integralist`）。我们还将配置该二进制文件，使其被添加到本地用户 bin 路径中，这样我就可以使用 `integralist <选项> <参数>`\
  \ 的格式隐式地运行它。\n\n注意\n\n`bin` 路径是大多数操作系统可执行二进制文件的存储位置。系统二进制文件目录是 `/usr/bin`，用户目录是\
  \ `/usr/local/bin`。我们应该将二进制文件放在用户特定的目录中，因为用户安装的任何二进制文件都应该放在那里。\n\n在代码清单 13-8 中，你将看到在完整的\
  \ `project.clj` 文件上下文中所需的更改。我们添加了 `:plugin` 属性（因为这是我们项目的第一个插件），并添加了新的插件特定属性 `:bin`，我们将其配置为将可执行文件命名为\
  \ `integralist`，并且它会自动将生成的可执行文件复制到我们的 `/usr/local/bin` 目录中。\n\n```\n(defproject\
  \ cli-foo \"0.1.0-SNAPSHOT\"\n:description \"FIXME: write description\"\n:url \"\
  http://example.com/FIXME\"\n:license {:name \"Eclipse Public License\"\n:url \"\
  http://www.eclipse.org/legal/epl-v10.html\"}\n:dependencies [[org.clojure/clojure\
  \ \"1.8.0\"]\n[org.clojure/tools.cli \"0.3.5\"]]\n:plugins [[lein-bin \"0.3.4\"\
  ]]\n:bin {:name \"integralist\"\n:bin-path \"/usr/local/bin\"}\n:main ^:skip-aot\
  \ cli-foo.core\n:profiles {:uberjar {:aot :all}})\n代码清单 13-8.\n通过 project.clj 文件配置\
  \ lein-bin\n```\n\n如果你现在运行 `lein repl`，你会发现 Leiningen 会下载新定义的插件。输出将类似于代码清单 13-9，并突出显示了一些所需的嵌套依赖项。\n\
  \n```\nRetrieving lein-bin/lein-bin/0.3.4/lein-bin-0.3.4.pom from clojars\nRetrieving\
  \ me/raynes/fs/1.4.0/fs-1.4.0.pom from clojars\nRetrieving org/apache/commons/commons-compress/1.3/commons-compress-1.3.pom\
  \ from central\nRetrieving org/apache/commons/commons-compress/1.3/commons-compress-1.3.jar\
  \ from central\nRetrieving lein-bin/lein-bin/0.3.4/lein-bin-0.3.4.jar from clojars\n\
  Retrieving me/raynes/fs/1.4.0/fs-1.4.0.jar from clojars\n代码清单 13-9.\n下载 lein-bin\
  \ 插件及其依赖项\n\n此时，你将拥有一个可用的 `lein bin` 命令。如果你在项目目录中执行该命令，你将看到类似于代码清单 13-10 所示的输出。二进制文件编译完成后，它会被复制到你的\
  \ `/usr/local/bin` 目录中，你会发现它可以在你计算机上的任何位置使用。\n\n注意\n\n这是因为你的 `$PATH` 环境变量已预先配置为在\
  \ `/usr/local/bin` 目录中查找可执行文件。\n\n```\nCompiling cli-foo.core\nCreated /Users/M/code/clojure/cli-foo/target/cli-foo-0.1.0-SNAPSHOT.jar\n\
  Created /Users/M/code/clojure/cli-foo/target/cli-foo-0.1.0-SNAPSHOT-standalone.jar\n\
  Creating standalone executable: /Users/M/code/clojure/cli-foo/target/integralist\n\
  Copying binary to /usr/local/bin\n代码清单 13-10.\nlein-bin 命令的输出\n```\n\n如果你现在执行 `integralist\
  \ -vvv abc`，你应该会在屏幕上看到预期的输出。太棒了！我们已经创建了一个可执行文件，现在可以在系统的任何位置运行它。但请注意，这个可执行文件仅适用于你构建它的操作系统。为了让该可执行文件在另一个操作系统上运行，你需要在该操作系统架构上构建它。\n\
  \n注意\n\n一种选择是使用 Docker，⁵ 它允许你在自己的计算机上运行不同的操作系统。然后，你可以从你希望应用程序运行的目标操作系统构建一个 Docker\
  \ 镜像，并设置好环境，使其包含 Leiningen 和 `lein-bin` 插件，然后通过将你的代码库在运行时挂载到 Docker 容器中，在 Docker\
  \ 容器内编译可执行文件。Docker 超出了本书的范围，因此我们不再进一步讨论这个选项。\n\n\n\n## 重温标志\n\n好的，现在让我们回顾一下我们定义的标志，以确保我们理解它们的配置。让我们从\
  \ `-p` 标志开始。\n\n如果我执行 `integralist` 命令时没有定义任何标志，那么从输出中我会看到 `-p` (`--port`) 标志被赋予了默认值\
  \ `80`。回顾清单 13-2，我们可以看到这是因为我们将 `:default` 属性配置为该值。这意味着如果我执行 `integralist -p 123`，我们期望在命令的输出中看到\
  \ `123` 被分配给该标志（事实也确实如此）。这展示了我们如何通过定义默认值来使某些标志成为可选项。\n\n如果我执行 `integralist -p abc`，那么命令的输出将是一个错误（参见清单\
  \ 13-11）。从错误信息中我们可以看到，它期望的是一个数字，但输入却是 `abc`。如果我们回顾清单 13-2，可以看到这是因为我们为 `-p` 标志配置了一个\
  \ `:parse-fn` 属性，它允许我们将输入转换为另一种格式的值（在本例中，我们为 `:parse-fn` 分配了一个匿名函数，该函数尝试将输入转换为整数）。\n\
  \n```\n[解析选项 \"-p abc\" 时出错：java.lang.NumberFormatException: 输入字符串: \"abc\"]\n清单\
  \ 13-11.\n为 -p 标志分配了错误类型导致的错误\n```\n\n与 `:parse-fn` 属性类似的是 `:validate` 属性，它允许我们验证输入的值是否是我们期望/需要的。在这种情况下，我们希望确保数字在特定范围内。如果我传递\
  \ `65535` 作为值，那么一切都会正常工作。但如果我传递 `99999`，那么我们会看到一个错误（清单 13-12）。\n\n```\n[验证 \"-p\
  \ 99999\" 失败：必须是介于 0 和 65536 之间的数字]\n清单 13-12.\n为 -p 标志分配了错误值导致的错误\n```\n\n现在，如果我们看一下\
  \ `-v` 标志，会发现它有两个我们尚未解释的属性：`:id` 和 `:assoc-fn`。`:id` 属性仅在您未定义长标志时才需要。这是因为 cli 工具有一个约定，即它们使用长标志的名称作为\
  \ `:options` 映射数据结构中的键。对于 `-v` 标志，我们没有提供长标志（因此使用了 `nil` 值）。\n\n在某些命令行工具中，您会看到一种约定，即定义的标志实际上可以是动态的。例如，如果您的工具允许显示调试信息，您可能希望用户能够根据“级别”配置他们看到的调试信息量。这正是我们试图通过工具中的详细程度标志\
  \ (`-v`) 来表示的。因此，如果您执行 `integralist -v`，您会看到详细程度值被设置为 `1`，但如果您将标志改为 `-vv`，它将被设置为\
  \ `2`，同样，如果您将标志改为 `-vvv`，它将被设置为 `3`（依此类推）。\n\n这就是 `:assoc-fn` 的用途。它接受整个 `:options`\
  \ 映射数据结构以及标志的 `:id` 及其当前值（在我们的例子中，设置了 `:default` 值为 `0`）。有了这些信息，我们可以在清单 13-2 中看到，我们只是在\
  \ `:options` 映射中递增了标志的值。\n\n注意\n\n我们不会回顾 `-x` 或 `-h` 标志，因为它们实际上只使用了我们已经见过的 `:id`\
  \ 和 `:default` 属性。\n\n## 总结\n\n在本章中，我们简要介绍了 Clojure 的 `tools.cli` 中一些最重要的特性。我们学习了如何为命令行应用程序创建外壳，该外壳定义了一组具有不同条件和行为期望的标志。这包括动态标志，例如用于定义调试详细级别的\
  \ `-v`，以及 `-p` 标志，该标志要求其值可以被强制转换为整数，并且必须在特定的数值范围内。`tools.cli` 中还有其他可用的特性，我建议您去探索一下如何利用它们。\n\
  \n另一个涉及的内容是如何通过 Leiningen（一个 Jar 包或二进制文件）运行 cli。最后两个选项意味着您可以获取单个打包文件（或二进制文件），并轻松地将您的应用程序分发给任何安装了\
  \ Java 的系统。\n\n脚注 1\n\n[`​tldp.​org/​LDP/​abs/​html/​exitcodes.​html`](http://tldp.org/LDP/abs/html/exitcodes.html)\n\
  \n  2\n\n[`​en.​wikipedia.​org/​wiki/​Standard_​streams`](https://en.wikipedia.org/wiki/Standard_streams)\n\
  \n  3\n\n[`​github.​com/​clojure/​tools.​cli/​blob/​master/​src/​main/​clojure/​cljs/​tools/​cli.​cljs`](https://github.com/clojure/tools.cli/blob/master/src/main/clojure/cljs/tools/cli.cljs)\n\
  \n  4\n\n[`​github.​com/​raynes/​lein-bin`](https://github.com/raynes/lein-bin)\n\
  \n  5\n\n[`​www.​docker.​com/​`](https://www.docker.com/)\n\n## 附录 A：约定\n\n每种编程语言都有自己的约定，以确保对该语言编写的代码设计有共同的理解和一致性。由于存在语法相似的语系（例如\
  \ C 语言），一些约定也能够相当一致地跨不同编程语言迁移，因此这些约定在应用于多种语言时是有意义的。\n\n例如，如果您曾经编写过 `for` 循环（任何类型的），那么您很可能会知道变量标识符\
  \ `i`、`j` 和 `k` 被用作每个嵌套循环级别的字符（参见清单 A-1，该清单使用 JavaScript 语言语法演示了一个 `for` 循环）。\n\n\
  ```\nfor (i = 0; i < condition; i++) {\nfor (j = 0; j < condition; j++) {\nfor (k\
  \ = 0; k < condition; k++) {\n// 代码\n}\n}\n}\n清单 A-1.\nfor 循环中 i、j 和 k 变量的示例\n```\n\
  \n注意\n\n`i`、`j` 和 `k` 通常用于以下几个原因（取决于您与谁交谈）：`i` 和 `j` 在数学中已经使用了很长时间，因此从数学到编程的过渡得以延续。在实际层面上，`i`\
  \ 有时被解释为整数（integer）的缩写，因此当需要嵌套级别时，从字母表开始向上移动到 `j`，然后是 `k` 是合理的。\n\nClojure 也有类似的命名约定。\n\
  \n### 函数\n\n*   `f`、`g`、`h`：函数输入（注意与 `i`、`j`、`k` 的相似性，现在 `f` 代表函数）\n*   `n`：整数输入（通常表示大小）\n\
  *   `i`：整数索引\n*   `x`、`y`：数字\n*   `s`：字符串输入\n*   `xs`：被视为 `x` 的复数形式或序列\n*   `coll`：一个集合（或序列）\n\
  *   `pred`：一个谓词闭包\n*   `& more`：可变参数输入\n*   `*var*`：动态变量应包裹在星号中（也称为“耳罩”）\n\n###\
  \ 宏\n\n*   `expr`：一个表达式\n*   `body`：一个宏体\n*   `binding`：一个宏绑定向量\n\n\n\n## 附录 B：使用\
  \ Vim 编写 Clojure\n\n市面上有许多文本/代码编辑器，各有优缺点以及你应当使用它们的理由。以下是我整理的一份简短列表，列出了那些以某种形式支持\
  \ Clojure（或通过插件支持）的编辑器：\n\n*   Atom：Proto REPL\n*   Emacs：CIDER\n*   Vim：Fireplace\n\
  *   IntelliJ（Java IDE）：Cursive\n*   Light Table：内置交互式 Clojure IDE\n\n你可能已经从这个附录的标题猜到了，我是一名\
  \ Vim 用户。现在，我不打算向你推销为什么我认为 Vim 是最好的编辑器，因为我已经通过撰写一本名为《Pro Vim》¹（由 Apress 出版）的书来阐述这一点了。此外，Vim\
  \ 的学习曲线确实相当陡峭，所以它并非适合所有人。\n\n话虽如此，如果你有兴趣使用 Vim 来编写 Clojure，或者你已经是 Vim 用户，那么请继续阅读，我将介绍你需要安装的不同插件和配置设置，以便在\
  \ Vim 中高效地使用 Clojure。\n\n首先，我们需要安装以下插件：\n\n*   vim-fireplace ²\n*   vim-sexp-mappings-for-regular-people\
  \ ³\n*   rainbow_parentheses.vim ⁴\n\n现在我将按相反的顺序介绍这些插件，因为前面的列表实际上是按优先级排序的（即 Fireplace\
  \ 插件是必不可少的，但接下来的两个插件虽然非常有用，严格来说，对于让某些功能正常工作并非“必需”）。\n\n此外，每个插件的复杂度与其优先级和重要性相匹配。例如，优先级最低的插件\
  \ Rainbow Parentheses 也是最容易描述的。\n\n### Rainbow Parentheses\n\n这个插件使用起来非常简单。它会把所有单调的括号变成彩色编码（仅此而已）。其目的是让你更容易辨别特定\
  \ Clojure 形式的起始和结束位置。\n\n你可能会想：何必这么麻烦？但请相信我，即使使用了 Clojure 文件格式主题，你的眼睛仍然难以在代码中找出特定的形式（尤其是当你的代码变得更复杂时，你会发现需要处理大量嵌套的括号），因此让它们变成彩虹色确实是一种福音。\n\
  \n### Sexp Mappings for Regular People\n\n在基于 Lisp 的语言中，你会遇到所谓的 S 表达式。⁵ 用通俗的话说，它们只是符号格式的一部分，你在基于\
  \ Lisp 的语言中会看到它们以括号包裹表达式的方式出现（这又回到了我们在本书开头讨论的“代码即数据”的理念，即代码代表了相同的基础数据结构）。\n\n因此，这个插件允许你操作\
  \ Clojure 代码（例如 Clojure 的“形式”）。但重要的是，不要将这个插件与另一个名为 Sexp ⁶ 的 Vim 插件混淆，后者也是一个用于操作\
  \ S 表达式的有效插件。但我们这里感兴趣的插件实际上是 Sexp 的扩展，只是为基于终端的 Vim 用户提供了更符合习惯的键位绑定。\n\n这个插件有两个主要功能：\n\
  \n1.  自动括号匹配\n2.  列表操作\n\n第一项相当直接：如果你输入一个左括号 `(`，那么 Vim 会自动在其后插入一个右括号 `)`，然后将光标置于括号之间。这很棒，因为它能防止你忘记自己添加左括号或右括号，从而避免意外导致程序触发错误（这可能是一个相当烦人的\
  \ bug，因为在处理深度嵌套的形式时，很难识别出来）。\n\n第二项，列表操作，是这个插件的核心。它提供了以下键位绑定：\n\n*   `<f` 和 `>f`：向左或向右移动“形式”\n\
  *   `<e` 和 `>e`：向左或向右移动“元素”\n*   `<(` 和 `>(`：向左或向右移动“左括号”\n*   `<)` 和 `>)`：向左或向右移动“右括号”\n\
  *   `<I` 和 `>I`：向左或向右移动“插入点”\n\n让我们快速演示一下这些键位绑定是如何工作的。假设我们处理的是以下代码（参见清单 B-1），每次操作后，我们都会与清单\
  \ B-1 进行比较，看看发生了什么变化。\n\n```\n(def myfn [f g h]\n(* h (+ f g)))\n清单 B-1.\n一个处理计算的简单函数\n\
  ```\n\n#### 形式操作\n\n键位绑定 `<f` 和 `>f` 会影响光标当前所在的最内层形式。因此，如果你的光标位于形式 `(+ f g)` 内部（或之上），并且你执行了\
  \ `<f`，那么你会发现该形式向左移动（新布局见清单 B-2）。\n\n```\n(def myfn [f g h]\n(* (+ f g) h))\n清单\
  \ B-2.\n形式操作的结果\n```\n\n#### 元素操作\n\n与形式操作类似，如果你的光标位于原始示例代码中的 `h` 符号（即“元素”）之上，并且你执行了\
  \ `>e`，那么你会发现该元素向右移动（新布局见清单 B-3）。\n\n```\n(def myfn [f g h]\n(* (+ f g) h))\n清单\
  \ B-3.\n元素操作的结果\n```\n\n注意\n\n你会看到清单 B-3 达到了与清单 B-2 相同的输出，但这是通过两种不同的机制实现的。\n\n####\
  \ 括号操作\n\n如果你的光标位于 `(+ f g)` 中的 `(` 字符之上（或内部），并且你在原始示例代码上执行了 `2<(`，那么你会发现该括号向左移动了两个位置（新布局见清单\
  \ B-4）。在这个例子中，我对 `<(` 使用了 Vim 的计数 `2`，因此它被执行了两次。\n\n```\n(def myfn [f g h]\n((*\
  \ h + f g)))\n清单 B-4.\n括号操作的结果\n```\n\n注意\n\n这段代码在运行时现在会导致错误，但我这样做是为了演示该功能（由于自动括号插入功能，我很少需要操作单个括号）。\n\
  \n#### 插入点操作\n\n如果你的光标位于某个形式之上（或内部），执行 `<I` 会将光标移动到该形式的开头，并自动进入 Vim 的插入模式。例如，将光标放在\
  \ `(+ f g)` 内部并执行 `<I`；你应该会看到光标被放置在 `+` 之前，准备开始输入。\n\n类似地，如果你将光标放在 `(* h ...)` 内部，确保它位于嵌套在内的\
  \ `(+ f g)` 形式之外，然后执行 `>I`；你会看到光标被放置在该形式右括号之前。这个功能对于快速定位到长而复杂的形式的开头和结尾非常有用。\n\n\
  ### Fireplace\n\nFireplace 插件是重头戏。使用这个插件，你可以将 Vim 连接到网络 REPL（在我们的例子中是 Leiningen，但如果你愿意，也可以使用其他\
  \ REPL），并直接在 Vim 内部动态评估你的 Clojure 代码。这将使你能够即时获得关于你编写的代码及其实际行为的反馈。这是一种极其强大且富有启发性的开发体验。\n\
  \n注意\n\n很多人对这个插件的名字感到困惑：为什么叫 Fireplace？奥秘就在名字里：fi-REPL-ace（注意中间的 REPL）。\n\n\n\n\
  #### 所需步骤\n\n我们需要执行的主要步骤如下：\n\n1.  启动 REPL。\n2.  在 Vim 中打开一个 Clojure 文件。\n3.  运行\
  \ Fireplace 的 `:Connect` 命令。\n4.  在 Vim 提示符中输入 REPL 的详细信息。\n\n完成这些步骤后，我们就可以开始使用\
  \ Fireplace 特有的键位绑定来求值我们的 Clojure 代码了。\n\n#### 首选工作流程？\n\n你的工作流程可能与我不同（大多数 Vim 用户都有自己的做事方式）。对我来说，我使用\
  \ NeoVim，⁷ 因此我可以创建一个包含实际终端实例的分屏窗口（例如，使用其 `:terminal` 命令）。所以，我会有一个水平分割的窗口集。顶部窗口是我的\
  \ Clojure 代码，底部窗口是我的终端（也就是我启动 REPL 的地方）。\n\n你可能不使用 NeoVim，但这没关系。如果你是 tmux ⁸ 用户，那么你可以有一个水平分割的窗格，效果基本相同。如果你不使用像\
  \ tmux 或 screen ⁹ 这样的终端复用器，那么你可以简单地启动两个 shell/终端实例；在我即将详述的初始设置步骤中，你需要在它们之间来回切换。\n\
  \n#### 连接到 REPL\n\n好的，那么让我们从启动 REPL 开始：`lein repl`\n\n在使用 Fireplace 插件从 Vim 连接到\
  \ REPL 之前，我们需要打开一个 Clojure 文件；这是因为 Fireplace 只有在找到 Clojure 格式的文件时才会加载其功能（如果你尝试从其他文件类型运行其任何命令，Vim\
  \ 会提示无法识别该命令）。\n\n在 Vim 中，你可以选择打开一个 Clojure 文件，或者简单地打开一个空缓冲区并将该缓冲区的格式设置为 Clojure\
  \ 文件；例如，`setf clojure`。选择哪种方式并不重要。通常，如果我只是想摆弄一些 Clojure 代码，我会用空缓冲区启动 Vim 并使用 `setf\
  \ clojure`（我相信有些人会主张直接使用 Leiningen 的 REPL，但我更喜欢在 Vim 内部工作）；否则，如果我在处理一个实际项目，我会打开我想要编辑的\
  \ Clojure 文件。\n\n完成这些操作后，Vim 就可以使用 Fireplace 提供的 `:` `Connect` 命令了。使用此命令，你可以使用 Tab\
  \ 补全来填写大部分必需的值；直接输入值，例如 `:Connect <VALUE>`；或者按 ENTER 让 Vim 自动提示你输入答案。我通常直接输入我们需要的\
  \ `:Connect nrepl://127.0.0.1:65103`。\n\n如果你想知道我是从哪里得到 `127.0.0.1:65103`（即 `<LOCAL_IP>:<PORT_NUMBER>`）的，那么请看运行\
  \ `lein repl` 的那个屏幕。你应该会看到输出的第一行类似于清单 B-5 所示的内容，连接成功后你会看到一条类似于清单 B-6 的消息。\n\n```\n\
  nREPL server started on port \non host  -\nnrepl://:\n清单 B-5.\n来自 lein repl 命令的抽象输出\n\
  ```\n\n注意\n\n你可以使用 `localhost` 代替 `127.0.0.1`\n\n```\nConnected to nrepl://:\nScope\
  \ connection to: \n清单 B-6.\n连接到 REPL 后的 Vim 输出\n```\n\n要关闭此消息，请按 ENTER。\n\n注意\n\n\
  `:` `Connect` 命令的语法结构是：`<PROTOCOL>://<LOCAL_IP>:<PORT_NUMBER> <PATH/TO/CODE>`。但请注意，项目代码的路径不应包含空格。例如，`∼/Some/Project`\
  \ 没问题，但 `∼/Some Other/Project` 则不行。\n\n#### Fireplace 命令\n\nFireplace 有相当多的键位绑定和命令，所以我强烈建议你阅读\
  \ Fireplace 的帮助文档（`:help fireplace`），因为我不会尝试涵盖所有内容。说真的，有些我甚至从未用过！但我最常用的那些，我在这里包含了详细信息（我鼓励你尝试给出的示例，以便熟悉它们）。\n\
  \n*   `:Doc <symbol>`（例如，`:Doc defn`）\n*   `:FindDoc <symbol>`（例如，`:FindDoc de`）\n\
  *   `:Source <symbol>`（例如，`:Source defn`）\n\n注意\n\n当光标位于某个符号上时，执行 `K` 键位绑定是 `:Doc`\
  \ 命令的快捷方式。如果需要退出 `:FindDoc` 结果屏幕，你可以按 Q 或一直滚动到底部然后按 ENTER。另外，当光标位于某个符号上时，执行 `[d`\
  \ 或 `]d` 键位绑定是 `:Source` 命令的快捷方式。\n\n#### Fireplace 键位绑定\n\n*   `cpp`：求值最内层的表单\n\
  *   `cqp`：显示提示符以输入自定义表达式\n*   `cqq`：显示提示符，并预填充当前表单\n*   `cqc`：在命令行窗口内显示提示符\n*  \
  \ `cmm`：展开一个 Clojure 宏\n\n在清单 B-7 中，我们可以看到名为 `calc` 的示例函数，我们将以此为基础来探索前面列表中显示的键位绑定。为了后续章节的演示，让我们将该代码添加到一个新的空缓冲区中，并使用\
  \ `setf clojure`（而不是从实际项目目录中运行它）。\n\n```\n(defn calc [f g]\n(* (+ f g) (/ g f)))\n\
  清单 B-7.\n用于验证键位绑定的示例函数\n```\n\n##### cpp\n\n将光标放在清单 B-7 的第一行（即 `(defn calc [f g]`）上，然后执行键位绑定\
  \ `cpp`。你应该会看到结果显示在 Vim 实例的底部：`#'user/calc`。\n\n你会注意到命名空间是 `user`，因为我们是在一个尚未写入文件的缓冲区中工作。如果我们是在一个真实的\
  \ Clojure 项目中工作，你可能会看到类似 `#'<path/to/your/project/namespace>/calc` 的内容。\n\n如果你将光标放在一个函数调用上（例如\
  \ `(calc 100 50)`）并执行 `cpp` 键位绑定，那么它将求值该调用并返回实际结果。但请注意，如果（在此示例中）你还没有对 `calc` 函数定义本身执行过\
  \ `cpp`（即 REPL 尚未求值该函数定义），那么你会发现 REPL 无法求值对 `calc` 函数的调用，因为它不知道在哪里找到它。这将导致一个错误（参见清单\
  \ B-8）。\n\n```\nCompilerException java.lang.RuntimeException:\nUnable to resolve\
  \ symbol: calc in this context, compiling:(4:1)\n清单 B-8.\n对未求值的函数进行调用时出现的错误\n```\n\
  \n当你忘记求值函数定义时，就会发生这种类型的错误；例如，你输入了大量代码，然后试图直接调用它，而没有先求值各个定义。有时，一次性重新求值整个缓冲区会更简单，你可以使用\
  \ `:%Eval` 来实现（你可以将其绑定到自定义键位上，使其执行起来更快更简单）。\n\n##### cqp\n\n在当前缓冲区的任何位置执行键位绑定 `cqp`，Vim\
  \ 都会显示一个命令提示符，让你输入一个新的表达式进行求值。和之前一样，如果你尝试求值代码中的定义，请确保通过求值你想要使用的定义，或者先重新求值整个缓冲区，让\
  \ REPL 知道它们的存在。\n\n##### cqq\n\n`cqq` 键位绑定的工作原理是：获取当前缓冲区中光标所在位置的表单，并将其放入 Vim 命令提示符中，然后你可以在按\
  \ ENTER 求值表达式之前修改该命令。\n\n注意\n\n我发现 NeoVim 在使用 `:terminal` 窗格时，不会显示 `cqq` 键位绑定的求值结果。求值确实发生了（我们可以通过检查\
  \ `:Last` 来知道这一点，它会在预览窗口中显示最后一次 Clojure 求值结果）；只是没有显示出来。这被认为是一个 bug。\n\n\n\n#####\
  \ cqc\n\n`cqc` 键绑定可在当前缓冲区的任意位置执行。它会打开 Vim 命令行窗口，允许你搜索之前的求值结果，并在重新求值前进行修改。\n\n#####\
  \ cmm\n\n`cmm` 键绑定对于理解宏在抽象层之下的工作原理（即宏展开后的代码是什么样子）非常有用。以我们一直在使用的 `calc` 函数为例；如果在定义上执行\
  \ `cmm`，宏展开会将其求值为清单 B-9 所示的内容。\n\n```\n(def calc (fn* ([f g] (* (+ f g) (/ g f)))))\n\
  清单 B-9.\n使用 cmm 键绑定展开的 Defn 宏\n```\n\n在清单 B-9 中，我们可以看到在 `defn` 宏上执行 `cmm` 会将其展开，从而让我们看到\
  \ `calc` 定义实际上只是一个 `def` 形式。它还展示了底层使用匿名函数来实现 `defn` 为我们抽象掉的功能。\n\n索引 A 抽象函数列表 peek\
