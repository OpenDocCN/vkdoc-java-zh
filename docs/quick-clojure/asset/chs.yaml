  ## 文档


  如果你在任何时候想查找某个函数，最快的方法是在 REPL 中直接使用 `doc` 函数。


  例如，如果我想提醒自己如何使用 Clojure 中的 `inc` 函数来递增数字，我会进入 REPL 并执行清单 1-6 中的代码。


  ```

  (doc inc)

  清单 1-6.

  查找 inc 函数的文档

  ```


  这会返回给我清单 1-7 中所示的输出。


  ```

  clojure.core/inc

  ([x])

  返回一个比 num 大一的数字。不会自动提升

  long 类型，溢出时会抛出异常。另请参阅：inc''

  nil

  清单 1-7.

  inc 函数的文档

  ```


  从这个输出中，我们首先可以看到该函数所在的命名空间（`clojure.core/inc`）。我们将在后面的章节中详细讨论命名空间，但现在值得注意的一点是，Clojure
  有一个 `core` 命名空间，它提供了一组标准化的函数供你使用。


  我们还可以看到 `inc` 函数接受一个参数（`[x]` 表示的就是这个意思），并且我们还可以阅读提供的描述，以更好地理解该函数的上下文（即它的用途是什么）。


  Clojure 的“命名空间”是一种将代码划分到不同文件中的方式。Clojure 中的主要命名空间是 `clojure.core` 命名空间。如果你需要查看不属于
  `clojure.core` 的函数的文档，那么你需要在 REPL 中使用 `doc` 函数时包含该命名空间。例如，如果你想查找位于 `clojure.string`
  命名空间中的 `blank?` 函数，那么在 REPL 中你应该执行 `(doc clojure.string/blank?)`。


  对于 Java 文档（有时你需要这样做，因为 Clojure 偶尔会依赖 Java 库），你需要使用 `javadoc` 函数而不是 `doc`。例如，如果我们想查找
  Java 中的 `Formatter` 类（它位于 Java 的 `util` 命名空间中），我们会执行你在清单 1-8 中看到的代码。


  ```

  (javadoc java.util.Formatter)

  清单 1-8.

  查找 Java 类的文档

  ```


  执行清单 1-8 中的代码会在你的网页浏览器中打开相关的 Java 文档，而不是在终端中显示结果。这不如查找 Clojure 特定功能那么方便，但在编写 Clojure
  代码时，你很少需要查找 Java（也许你会在代码中查看堆栈跟踪，并对所引用的类感兴趣时才会这样做）。


  ## 总结


  至此，我们对 Clojure 的背景以及如何在 REPL 中执行代码有了一些了解。在下一章中，我们将开始探索 Clojure 提供的一些数据结构。这些结构帮助我们使用
  Clojure 语言实现更多实用功能。


