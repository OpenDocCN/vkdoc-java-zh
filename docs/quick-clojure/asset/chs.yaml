  最后一行表明你的代码将在 `user` 命名空间中运行。我们将在后续章节介绍命名空间的工作原理，但目前只需知道 Clojure 允许你将代码隔离到不同的命名空间中，以帮助隔离特定功能（就像你将文件拆分到不同的文件夹中一样）。


