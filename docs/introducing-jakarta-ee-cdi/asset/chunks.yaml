    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figf_HTML.jpg](img/493447_1_En_10_Figf_HTML.jpg)


    第 1 行和第 2 行在 `myDynamicValue` 字段上使用了 `@Inject` 和 `@ConfigProperties`。然而，`myDynamicValue`
    的类型是来自 CDI API 的 `Provider`，其定义如下所示。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figg_HTML.jpg](img/493447_1_En_10_Figg_HTML.jpg)


    `Provider` 是 CDI API 中的一个参数化接口，它有一个方法 `get()`。该方法返回参数化类型。正如前面代码中所使用的，将 `myDynamicValue`
    的类型设置为 `Provider` 意味着，每次对其调用 `get()` 方法时，都会返回一个类型为 `String` 的新实例，该实例可能包含来自配置源的最新值。以下代码片段展示了将对
    `myDynamicValue` 调用的 `get()` 方法进行日志记录。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figh_HTML.jpg](img/493447_1_En_10_Figh_HTML.jpg)


    整个 MicroProfile 项目都构建在 Jakarta EE 平台之上，因此，它利用该平台的能力来帮助你构建云原生的企业级 Java 应用程序。


    ## Apache Delta Spike


    Delta Spike 是一个 Apache 顶级项目，其模块以 CDI 扩展的形式存在，为你的 Jakarta EE 应用程序提供额外的功能。其中一些模块包括
    JSF、Scheduler、Security 和 Data。本节将介绍 Data 模块。


    Data 模块提供了实现仓储模式的能力，从而简化了仓储层。仓储模式非常适合那些需要样板代码的简单查询，它能够集中查询逻辑，从而减少代码重复并提高可测试性。^(³⁵)


    对于餐厅应用程序，你可以将 `ApplicationUser` bean 转换为 JPA 实体，如下所示。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figi_HTML.jpg](img/493447_1_En_10_Figi_HTML.jpg)


    `ApplicationUser` 实体包含许多字段，在典型的数据库驱动应用程序中，你可能需要对这些字段进行查询。例如，你可能想通过 `userName`
    查找用户，或者通过电子邮件进行搜索等。Delta Spike 模块通过使用基于 CDI 的仓储，帮助你减少此类繁琐的样板代码。你可以声明一个 `ApplicationUserRepo`，它将为你处理实体类字段上的基本
    CRUD 操作。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figj_HTML.jpg](img/493447_1_En_10_Figj_HTML.jpg)


    第 1 行在 `ApplicationUserRepo` 接口上声明了来自 Delta Spike 数据模块的 `@Repository` 注解，该接口扩展了同样来自
    Delta Spike 数据模块的参数化接口 `EntityRepository`。`EntityRepository` 接口定义如下：


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figk_HTML.jpg](img/493447_1_En_10_Figk_HTML.jpg)


    该接口包含一些基本的基于 CRUD 的方法，几乎每个数据库应用程序都会实现这些方法。例如，第 12 行声明了一个 `findBy()` 方法，该方法接收实体的主键并在数据库中查询它。所有这些方法都由数据模块的
    CDI 扩展实现。接下来，你将在接口中声明一些用于 CRUD 操作的方法。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figl_HTML.jpg](img/493447_1_En_10_Figl_HTML.jpg)


    第 5 行声明了一个 `findByEmail` 方法。该方法将根据用户的电子邮件查找用户。第 7、9 和 11 行分别声明了 `findByUserName`、`findOptionalByHashedPassword`
    和 `findByUserNameLike` 方法。要使用该仓储，你只需将其注入到你的 `QueryService` 类中，如下所示。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figm_HTML.jpg](img/493447_1_En_10_Figm_HTML.jpg)


    第 5 行在 `QueryService` 类中声明了一个类型为 `ApplicationUserRepo` 的 CDI 注入字段。有了它，你无需编写大量代码即可实现大部分繁琐的
    CRUD 样板代码，如下所示。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Fign_HTML.jpg](img/493447_1_En_10_Fign_HTML.jpg)


    `QueryService` 包含多个方法声明，这些方法使用了在第 5 行注入的 `ApplicationUserRepo`。如你所见，其中一些方法直接来自
    `EntityRepository`，例如 `findOptionalBy()` 方法，它接收实体的 ID 并返回一个类型为实体的 `Optional` 对象。`findAll`
    方法也调用了 `findAll` 方法，该方法直接定义在 `EntityRepository` 接口中。


    所有这些方法都是通过结合使用 CDI API 结构为你实现的。例如，Delta Spike 模块需要一个类型为 `EntityManager` 的生产者字段，以便能够拦截并实现仓储方法。`EntityManager`
    生产者方法足以满足此要求。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figo_HTML.jpg](img/493447_1_En_10_Figo_HTML.jpg)


    该仓储也可用于持久化到数据库。请记住，它带有一个 `save()` 方法，该方法接收一个实体，并根据实体的状态将其持久化或合并到持久化上下文中。你可以在持久化服务中使用
    `ApplicationUserRepo` 来持久化 `ApplicationUser` 实体。


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figp_HTML.jpg](img/493447_1_En_10_Figp_HTML.jpg)


    `PersistenceService` 是一个无状态 EJB，它在第 9 行声明了对 `ApplicationUserRepo` 的依赖。然后，在第 14
    行的 `persistUser` 方法中，使用注入的仓储来持久化一个 `ApplicationUser` 实体。仓储上的 `save()` 方法也会由 Delta
    Spike 模块自动为你拦截并实现。


