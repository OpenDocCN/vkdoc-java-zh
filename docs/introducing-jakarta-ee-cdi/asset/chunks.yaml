- fmt: '# Pick and Choose: Tank or Pistol


    Jakarta EE is a huge platform that may appear intimidating at first. However,
    you can pick and choose whatever API your application requires. You can use the
    platform as a tank or as a pistol—you decide. All the various APIs are integrated
    as a whole if you choose to use Jakarta EE as a tank, or they can stand alone
    individually if you choose to nitpick. Also, as the application server provides
    the runtime implementation, whether you choose to use the entire platform or just
    select APIs, you still ship your application with just your code. Either way,
    your application is always shipped as a lightweight bundle.


    ![../images/493447_1_En_6_Chapter/493447_1_En_6_Figb_HTML.jpg](images/493447_1_En_6_Chapter/493447_1_En_6_Figb_HTML.jpg)


    [Image Credit](https://blogs.oracle.com/java/java-ee-8-overview)


    ## Amazing Documentation


    Jakarta EE is a well organized community project that has an amazing amount of
    documentation. Chief among this is the *Java EE Tutorials*^([⁶](#fn6)), the official
    Java EE handbook. There are also lots of community and corporate organized conferences—like
    Devoxx and Oracle CodeOne—that place a lot of emphasis on server-side Java development.
    There are also books written by individual developers like this one you are reading,
    all focused on helping you become a well-grounded enterprise Java software developer.


    These points are just a few of the reasons why you should give Jakarta EE a try.
    I know in the J2EE days, the platform was a unwieldy thing for a lot of people.
    However, today, Jakarta EE is a nimble, elegant, deceptively simple but compelling
    software development platform, as you will see in the second part of this book.


    Footnotes [1](#493447_1_En_6_Chapter.xhtml#Fn1_source)


    # 7. Jakarta EE and the Spring Framework


    A book on Jakarta EE would not be complete without a discussion of the Spring
    Framework. So what is the Spring Framework?


    The Spring Framework is an alternative server-side software development platform
    for the JVM that runs on a servlet container. It used to be Java-based but you
    can now develop Spring apps with other JVM-based languages like Kotlin. The Spring
    Framework came about because of the frustrations developers faced using the earlier
    versions of Java EE, then called J2EE.


    Rod Johnson^([⁷](#fn7)) started the project as an alternative platform that was
    more developer friendly and less arcane than J2EE. In the beginning, the Spring
    Framework was just an inversion of control (dependency injection) framework. It
    soon became very popular and has since grown to become a full-stack alternative
    to Jakarta EE. The Spring Framework intellectual property is owned by Pivotal
    Inc.


    However, as Spring was growing, developers started experiencing pain points that
    caused them lots of frustrations with the platform^([⁸](#fn8)). At the same time
    that Spring was enjoying all the popularity, Java EE was also evolving with all
    the feedback it was getting.


    The release of Java EE 7 marked a milestone in the history of the platform, because
    it had almost caught up with the Spring Framework in terms of developer productivity,
    but had managed to avoid Spring’s pitfalls. Java EE releases have been heavily
    influenced by the Spring Framework.


    Today, Spring as a platform has the Spring Boot framework, a framework I like
    to call “Little Java EE for Spring”. Spring Boot has been influenced by Java EE''s
    convention over configuration and sensible default philosophies. Both platforms
    have been very influential of the other.


    As a Java developer, you have the choice of using Jakarta EE or the Spring Framework.
    Neither, for me, is superior to the other. Both platforms have their strengths
    and weaknesses. Naturally, as the author of a Jakarta EE book, I choose Jakarta
    EE, but that is because I am excited about its future as an Eclipse Foundation
    community project, I feel effective using it, and I find it easy to learn and
    to teach.


    You should choose a platform based on its technical merits to you, how easily
    you can maintain your apps, how much you value backward compatibility, the existing
    skillset of your development team, and other such metrics. My opinion about the
    whole Spring vs. Java EE flame wars is that it''s just not worth it. They are
    both excellent platforms that cater to different kinds of developers. Pivotal,
    the company behind the Spring Framework, is now a member of the Jakarta EE community.


    Spring Framework vs. Java EE can be rephrased as Spring Framework *and* Jakarta
    EE. You as a developer should pick what is right in your context. As you are reading
    this book, I am certain you have already decided which you want to go with.


    Footnotes [1](#493447_1_En_7_Chapter.xhtml#Fn1_source) [2](#493447_1_En_7_Chapter.xhtml#Fn2_source)


    # 8. The Contexts and Dependency Injection (CDI) API


    Dependency injection (DI) is a way of developing software such that various components
    are related in a very loosely coupled way. In most software applications, there
    is always some form of dependency between the various bits and pieces.


    Take a restaurant application for instance. You might have a component that handles
    taking orders, another for sending a message to the kitchen, yet another for checking
    available ingredients for a given meal, and one or two for calculating the total
    bill.


    These are all various components that need to depend on each other to fulfill
    the duty of running a restaurant. However, creating and managing this inter-dependency
    can be a difficult task. You need to create individual dependencies for each component,
    and at times, think of the contexts within which you want a specific dependency
    to exist.


    This is where the concept of dependency injection comes in. With DI, your various
    components simply declare a dependency on other components and leave the creation,
    management, and destruction of these dependencies to an external mechanism. In
    short, you invert control in your application. Components simply request a dependency
    and some black box makes that dependency available. That black box is generally
    referred to as an inversion of control (IoC) container.


    Dependency injection is a specific type of IoC “which concerns itself with decoupling
    dependencies between high-level and low-level layers through shared abstractions.”^([⁹](#fn9))
    Contexts and Dependency Injection (CDI) is an implementation of the DI principle.'
