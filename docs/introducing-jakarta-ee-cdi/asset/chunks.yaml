    provide a level playing field for all participants.


    The Java Community Process (JCP) will be replaced by the Eclipse Foundation Specification
    Process (EFSP) (see [`https://www.eclipse.org/projects/efsp/`](https://www.eclipse.org/projects/efsp/)).
    How is it different from the JCP?


    ![../images/493447_1_En_5_Chapter/493447_1_En_5_Figa_HTML.jpg](images/493447_1_En_5_Chapter/493447_1_En_5_Figa_HTML.jpg)


    [Image Credit](https://blogs.eclipse.org/post/tanja-obradovic/how-eclipse-foundation-specification-process-efsp-different-java-community)


    It uses a code-first approach. The most vital difference between the JCP and EFSP
    is that specifications are going to be developed through this code-first approach.
    In the JCP, the specification is developed, followed by the reference implementation.
    In the EFSP, however, there will be hands-on coding and experimenting first to
    ensure that something is worthy of being included in a specification document.


    The other differences all bring more openness on the side of the EFSP than on
    the erstwhile JCP process. This is a good thing. It means you as a developer can
    feel safe in using the Jakarta EE platform for your applications, knowing that
    it is a fully open platform run by a non-profit organization, with broader participation
    by the entire Java community. Microsoft and Pivotal (the company behind the Spring
    Framework) are members of the Jakarta EE community.


    With regards to releases, the first release of the umbrella specification under
    Eclipse Foundation is Glassfish 5.1, which is a Java EE 8 compatible release.
    Recall that Chapter [3](#493447_1_En_3_Chapter.xhtml) stated that the Glassfish
    Application Server is the reference implementation of the Java EE umbrella JSR.
    The Foundation has released Jakarta EE 8 with Glassfish 5.2 as the reference implementation.
    Jakarta EE 8 is a fully compatible Java EE 8 release. This means every Java EE
    8 application is automatically compatible with Eclipse Jakarta EE 8.


    The future for you as a Jakarta EE developer is inspiring. There is a lot of community
    interest in moving the entire Jakarta EE platform forward, aiming to make it the
    most reliable, cloud-native, enterprise Java development platform of choice for
    modern software development paradigms. Why wouldn’t you want to master this exciting
    platform?


    Footnotes [1](#493447_1_En_5_Chapter.xhtml#Fn1_source)   [2](#493447_1_En_5_Chapter.xhtml#Fn2_source)


    # 6. Why Jakarta EE?


    As a Java developer, you have many choices when it comes to frameworks and platforms
    for software development. A question you might be asking yourself is why you should
    choose Jakarta EE as your primary software development platform. What makes it
    a better choice?


    There are number of reasons to at least give Jakarta EE a try, key among them
    being these:


    *   Standardization


    *   Openness


    *   Stability


    *   Ease of development


    *   Portability


    *   Pick and choose: tank or pistol


    *   Amazing documentation


    ## Standardization


    Every single JSR has gone through a rigorous process of both public and JSR Expert
    Group scrutiny before being voted on by the JCP EC, for all Java EE APIs. Every
    JSR is weighed in terms of backward compatibility, benefit to the Java platform
    as a whole, etc. This painstaking JSR approval process ensures that every feature
    is accepted based on certain well-defined technical criteria. Similarly, every
    API of the new Jakarta EE platform will go through a well-defined specification
    process to ensure whatever API is included in the platform is going to be there
    for the long haul.


    ## Openness


    As discussed earlier, the new Jakarta EE specifications are going to be developed
    using a code-first approach through the Eclipse Foundation Specification Process.
    The EFSP is an open process that anyone can be part of. The entire specification
    process is developed in the open.


    ## Ease of Development


    Jakarta EE development is effortless. All that’s needed is an application server
    or a Jakarta EE compliant runtime and one Maven dependency. It requires minimal
    configuration, follows convention over configuration, and leads to no XML hell.
    It also has sensible defaults. For example, EJBs are transactional by default,
    use default data-source, and are CDI-enabled by default.


    ![../images/493447_1_En_6_Chapter/493447_1_En_6_Figa_HTML.jpg](images/493447_1_En_6_Chapter/493447_1_En_6_Figa_HTML.jpg)


    This code snippet is the only dependency you need to have the entire Jakarta EE
    platform available at your fingertips. Moreover, because you are abstracted from
    the implementation of the standard, you only package your application with your
    code and any other third-party libraries used. Your chosen application server
    will provide the implementation and all the other heavy lifting required to run
    an application.


    ## Portability


    Jakarta EE as a standard means that your application should work with minimal
    to no configuration across various implementations of the standard, as long as
    you code against the standard. This is compelling because you don''t get locked
    into one Jakarta EE application runtime vendor. Your code is portable across various
    application servers as long as you use the standard Jakarta EE APIs.'
