  trans: '

    # 2. 什么是 Java 规范请求（JSR）？


    Java 规范请求的核心，是由个人或组织向 Java 社区进程（JCP）提交的一份正式的、开放的标准文档提案^(²)。它包含了对 Java 技术平台提出的变更、新增或改进建议。


    从这个定义中可以提炼出许多关键点。首先，JSR 是一份正式文档。这意味着 JSR 或向 Java 技术体系提交的添加请求必须采用某种预定义的格式。该格式由
    JCP 定义。


    其次，JSR 是一份开放标准文档。这同样意味着 JSR 是一份符合特定既定规则和条例的文档，这些规则涉及文档的分发与贡献。这也意味着任何有兴趣评估 JSR
    的人都可以轻松访问其中包含的内容。


    从 Java 规范请求的定义可以得出，JSR 可以由个人或组织提出。JCP 的任何成员都可以提出 JSR。JCP 的成员资格向公众开放；个人也可以免费加入。因此，这意味着如果你不是该组织的成员，就无法向
    JCP 提出请求。


    最后，JSR 是一份提议对 Java 技术平台进行变更、新增或改进的文档。每个 JSR 都以某种方式包含了对 Java 技术栈的新特性、错误修复或通用改进。


    Java EE 上可用的每个主要 API 实际上都是一个经过 JCP 批准流程的 JSR 规范。所有 JSR 都必须经过一个流程才能获得 JCP 的批准。


    一旦 JSR 获得 JCP 批准，它就成为 Java 技术栈的一部分，并且可以安全地用于生产环境。JSR 流程确保只有经过充分测试的技术才能成为 Java
    技术栈的一部分，从而防止因追逐潮流技术而导致不必要的臃肿。


    JSR 流程还确保 API 经过精心设计，以保持向后兼容性。如果说 Java 有一项闻名遐迩的特性，那便是向后兼容性，而 JSR 流程确保了这一关键的 Java
    特性得以维持。


    由于 JSR 只是一个抽象规范，它需要某种形式的实现才能发挥作用。这就是参考实现（在第 3 章中介绍）概念的由来。


    脚注 1


    # 3. 什么是参考实现？


    在上一章中，你了解了什么是 JSR。回顾一下，JSR 是向 JCP 提交的一份抽象请求，其中包含了对 Java 技术平台的添加建议。


    由于它是抽象的，你无法直接运行它。JSR 需要某种形式的实现或具体化，才能对最终开发者有用。这就是*参考实现*概念的由来。


    每个 JSR 都必须有一个参考实现，它是 JSR 文档中包含的规范的具体实现。这是 JCP 的一项要求。每一个 JSR 都有一个免费提供并与应用服务器捆绑在一起的参考实现。


    JSR 还有一个技术兼容性工具包（TCK），它是“一套测试套件，至少名义上用于检查某个声称实现了特定 Java 规范请求（JSR）的实现是否符合规范。”^(³)


    TCK 用于测试 JSR 实现是否符合规范。这也是 Java EE 被称为一套*标准化*规范集合的部分原因。


    这个严谨的流程也确保了源自 JSR 文档的 API 的质量。一些流行的 JSR 参考实现（RI）包括：


    *   JSR 380（Bean Validation 2.0）– Hibernate Validator 6

    *   JSR 367（JSON-B 绑定）– Eclipse Yasson 1.0

    *   JSR 370（JAX-RS 2.1）– Jersey

    *   JSR 365（CDI 2.0）– WELD 3.0


    这些是一些较新且更流行的 JSR 及其各自的参考实现。这些参考实现中的大部分都与应用服务器捆绑在一起，这将是下一章的主题。


    脚注 1


    # 4. 什么是应用服务器？


    上一章讨论了什么是 JSR 参考实现。Java EE 的定义也提到它是一组抽象规范的集合。Java EE 本身就是一个 Java 规范请求。


    更准确地说，Java EE 被称为一个*伞式 JSR*，因为它封装了多个 JSR。例如，Java EE 7 就是 [JSR 342](https://www.jcp.org/en/jsr/detail%253Fid%253D342)。Java
    EE 8 是 [JSR 366](https://www.jcp.org/en/jsr/detail%253Fid%253D366)。因此，Java EE
    本身就是一个需要经过 JCP JSR 流程，并遵守每个 JSR 要求的 JSR。


    基于这个想法，并记住 JSR 流程要求每个 JSR 都必须有一个参考实现，这意味着作为伞式 JSR 的 Java EE 也必须有一个参考实现。


    伞式 JSR 或 Java EE 的实现通常被称为*应用服务器*。应用服务器是 Java EE 规范的具体实现，你可以在其上实际运行代码。Java EE 的参考实现是
    Glassfish 应用服务器。


    应用服务器通常将开发者从许多原本需要自行管理的繁琐事务中抽象出来，例如数据源池化、缓存、集群以及其他开销。


    应用服务器还必须通过 TCK 测试，才能被完全认证为符合给定的伞式 JSR。应用服务器也是 Java EE 可移植性的基础。作为开发者，通常建议你针对 `javax.*`
    包（即标准的 Java EE 包）进行编码。


    由于应用服务器遵循标准，使用 Java EE 包意味着你可以更换应用服务器，而你的代码通常只需很少甚至无需修改即可运行。仔细想想，这很有吸引力。


    首先，没有任何一个应用供应商能够锁定你。因为你可以更换应用服务器，所以理论上，如果你对当前供应商不满意，可以随时更换。


    市面上有许多应用供应商，有些免费，有些昂贵。在开源供应商中，比较流行的是 Payara Server（参见 [`http://payara.fish`](http://payara.fish)），它是一个源自
    Glassfish、经过全面修补的应用服务器，可以免费下载使用。


    Java EE 是一个抽象规范，其具体实现被称为*应用服务器*。作为一个 JSR，Java EE 所需的参考实现是 Glassfish 应用服务器。

    '
- fmt: '# 5. What Is Jakarta EE?


    You have learned what Java EE is. You''ve seen what an application server is and
    how it relates to the term Java EE. Now it’s time to consider what Jakarta EE
    is.


    Jakarta EE is the new Java EE. Back in 2017, Oracle, which was the owner of the
    Java EE technology stack, decided to open the platform to the wider community.
    In the process, the entire Java EE platform had to be moved to a non-profit, community-oriented
    foundation.


    The Java EE community voted and chose the Eclipse Foundation. So Java EE was moved
    to the Eclipse Foundation. Due to legal issues, the name of the platform had to
    be changed to something other than its original Java EE. Again, the community
    made suggestions and eventually the name *Jakarta EE* won^([⁴](#fn4)).


    With a renewed goal of aligning the former Java EE platform to more modern software
    development paradigms, the Eclipse Foundation is seeking to position Jakarta EE
    as a modern, cloud-native, agile software development platform.


    One of the criticisms leveled against Java EE was that it was too slow to evolve.
    The software development landscape moved faster than the platform could keep up.
    In light of such valid concerns, the Eclipse Foundation, through the Jakarta EE
    working group, developed the following guiding principles for Jakarta EE:


    - Deliver more frequent releases

    - Provide lower barriers to participation

    - Develop the community

    - Manage the Jakarta EE brand on behalf of the community


    Initially, Jakarta EE is the exact equivalent to the Java EE 8 platform. All of
    the specifications, reference implementations (RIs), and technology compatibility
    kits (TCKs) that comprised Java EE 8 have been transferred to the Eclipse Foundation^([⁵](#fn5)).
    This means that the former Java EE 8 release is the foundation of the new cloud-native
    Jakarta EE.


    Previous chapters discussed how Java EE evolved through the concept of Java Specification
    Requests (JSRs) through the Java Community Process (JCP). However, how will Jakarta
    EE evolve at the Eclipse Foundation? Alternatively, how is the Jakarta EE governance
    model different from that of Java EE?


    The main difference is that the Jakarta EE governance model is now community-based,
    multi-vendor, and open to participation and contribution by the enterprise consumers
    of these technologies. The Eclipse Foundation will ensure that the new specifications
    and development processes for Jakarta EE will remain open, vendor-neutral, and
    provide a level playing field for all participants.


    The Java Community Process (JCP) will be replaced by the Eclipse Foundation Specification
    Process (EFSP) (see [`https://www.eclipse.org/projects/efsp/`](https://www.eclipse.org/projects/efsp/)).
    How is it different from the JCP?


    ![../images/493447_1_En_5_Chapter/493447_1_En_5_Figa_HTML.jpg](images/493447_1_En_5_Chapter/493447_1_En_5_Figa_HTML.jpg)


    [Image Credit](https://blogs.eclipse.org/post/tanja-obradovic/how-eclipse-foundation-specification-process-efsp-different-java-community)


    It uses a code-first approach. The most vital difference between the JCP and EFSP
    is that specifications are going to be developed through this code-first approach.
    In the JCP, the specification is developed, followed by the reference implementation.
    In the EFSP, however, there will be hands-on coding and experimenting first to
    ensure that something is worthy of being included in a specification document.


    The other differences all bring more openness on the side of the EFSP than on
    the erstwhile JCP process. This is a good thing. It means you as a developer can
    feel safe in using the Jakarta EE platform for your applications, knowing that
    it is a fully open platform run by a non-profit organization, with broader participation
    by the entire Java community. Microsoft and Pivotal (the company behind the Spring
    Framework) are members of the Jakarta EE community.


    With regards to releases, the first release of the umbrella specification under
    Eclipse Foundation is Glassfish 5.1, which is a Java EE 8 compatible release.
    Recall that Chapter [3](#493447_1_En_3_Chapter.xhtml) stated that the Glassfish
    Application Server is the reference implementation of the Java EE umbrella JSR.
    The Foundation has released Jakarta EE 8 with Glassfish 5.2 as the reference implementation.
    Jakarta EE 8 is a fully compatible Java EE 8 release. This means every Java EE
    8 application is automatically compatible with Eclipse Jakarta EE 8.


    The future for you as a Jakarta EE developer is inspiring. There is a lot of community
    interest in moving the entire Jakarta EE platform forward, aiming to make it the
    most reliable, cloud-native, enterprise Java development platform of choice for
    modern software development paradigms. Why wouldn’t you want to master this exciting
    platform?


    Footnotes [1](#493447_1_En_5_Chapter.xhtml#Fn1_source) [2](#493447_1_En_5_Chapter.xhtml#Fn2_source)


    # 6. Why Jakarta EE?


    As a Java developer, you have many choices when it comes to frameworks and platforms
    for software development. A question you might be asking yourself is why you should
    choose Jakarta EE as your primary software development platform. What makes it
    a better choice?


    There are number of reasons to at least give Jakarta EE a try, key among them
    being these:


    - Standardization

    - Openness

    - Stability

    - Ease of development

    - Portability

    - Pick and choose: tank or pistol

    - Amazing documentation


    ## Standardization


    Every single JSR has gone through a rigorous process of both public and JSR Expert
    Group scrutiny before being voted on by the JCP EC, for all Java EE APIs. Every
    JSR is weighed in terms of backward compatibility, benefit to the Java platform
    as a whole, etc. This painstaking JSR approval process ensures that every feature
    is accepted based on certain well-defined technical criteria. Similarly, every
    API of the new Jakarta EE platform will go through a well-defined specification
    process to ensure whatever API is included in the platform is going to be there
    for the long haul.


    ## Openness


    As discussed earlier, the new Jakarta EE specifications are going to be developed
    using a code-first approach through the Eclipse Foundation Specification Process.
    The EFSP is an open process that anyone can be part of. The entire specification
    process is developed in the open.


    ## Ease of Development


    Jakarta EE development is effortless. All that’s needed is an application server
    or a Jakarta EE compliant runtime and one Maven dependency. It requires minimal
    configuration, follows convention over configuration, and leads to no XML hell.
    It also has sensible defaults. For example, EJBs are transactional by default,
    use default data-source, and are CDI-enabled by default.


    ![../images/493447_1_En_6_Chapter/493447_1_En_6_Figa_HTML.jpg](images/493447_1_En_6_Chapter/493447_1_En_6_Figa_HTML.jpg)


    This code snippet is the only dependency you need to have the entire Jakarta EE
    platform available at your fingertips. Moreover, because you are abstracted from
    the implementation of the standard, you only package your application with your
    code and any other third-party libraries used. Your chosen application server
    will provide the implementation and all the other heavy lifting required to run
    an application.


    ## Portability


    Jakarta EE as a standard means that your application should work with minimal
    to no configuration across various implementations of the standard, as long as
    you code against the standard. This is compelling because you don''t get locked
    into one Jakarta EE application runtime vendor. Your code is portable across various
    application servers as long as you use the standard Jakarta EE APIs.'
