  trans: '

    ### 生产者字段


    生产者字段与生产者方法类似，两者都充当上下文实例的来源。不过，生产者字段只是使用 `@Produces` 注解标注的 Bean 字段。与生产者方法一样，该注解字段同样可以被限定和设定作用域。生产者字段的一个典型用途是为
    JPA 生成 `EntityManager`^(²⁶) 对象，如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figac_HTML.jpg](img/493447_1_En_8_Figac_HTML.jpg)


    第 5 行声明了一个 `EntityManager` 类型的字段，第 4 行使用 `@PersistenceContext` 注解，第 3 行使用 `@Produces`
    注解。这是一个经典的字段生产者案例，你通过使用来自两个 API 的注解来生成一个对象。`@PersistenceContext` 注解来自 JPA，用于将此
    `EntityManager` 对象与持久化上下文关联起来。然后，你使用 CDI 的 `@Produces` 注解，使该字段能够满足代码中 JPA `EntityManager`
    的注入点。


    ## CDI Bean 生命周期回调


    到目前为止，我们已经讨论过，CDI Bean 由容器管理。你只需向容器请求实例即可。然而，有时你需要在 Bean 使用之前进行一些初始化或反初始化操作。


    一个典型的例子是，在 UI 访问 Bean 之前，你需要从数据库中获取某种列表形式的数据以在 UI 中显示。另一个例子是在 Bean 被销毁之前，释放 Bean
    中持有的系统资源。在你的应用程序中，你会经常遇到这些情况。


    CDI API 提供了一些注解，你可以将它们放在方法上，将这些方法转换为自动调用的生命周期回调。


    ### @PostConstruct^(²⁷)


    当一个 Bean 实例被完全构造完成，并且该 Bean 的所有依赖都已满足，但尚未投入使用之前，带有 `@PostConstruct` 注解的方法将被自动调用。


    带有 `@PostConstruct` 注解的方法不能有返回类型，也不能接受任何参数（拦截器除外，你将在后面学习到它们，对于拦截器，它们可以接受一个 `InvocationContext`^(²⁸)
    对象）。`@PostConstruct` 注解的方法可以是私有的、包内私有的、受保护的或公有的。


    在这段代码中，你希望预先填充一个列表，其中包含登录使用在线门户的自助服务用户的最近 10 个订单。如下所示，在 `SelfService` Bean 中，你可以使用
    `@PostConstruct` 回调方法。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figad_HTML.jpg](img/493447_1_En_8_Figad_HTML.jpg)


    第 6 行声明了一个 `Order` 类型的 `List` 对象。第 8 行使用 `@PostConstruct` 注解将第 9 行的 `init()` 方法声明为回调方法。该方法签名很直接——它返回
    void，命名为 `init`（这是我命名约定的一部分），并且声明为私有。在运行时，一旦 Bean 中的所有注入点都已满足，但尚未投入使用之前，容器将自动调用此方法。


    ### @PreDestroy^(²⁹)


    此注解可用于那些应在容器销毁 Bean 实例之前被调用的方法。


    到目前为止，你已经了解了各种 CDI API 结构是如何协同工作的。接下来，你将学习 CDI 拦截器的概念，了解它们是什么、解决了什么问题，以及如何创建它们。

    '
- fmt: '### CDI Interceptors


    For every application, you will have situations where you need to dynamically
    perform tasks on bean invocations that are orthogonal to the core function of
    those beans. CDI interceptors are similar in nature to Aspect Oriented Programming
    as used in the Spring Framework. A typical example is logging and security.


    In your code, for example, you would want to log method invocations on certain
    beans. You could manually implement the logging feature in all the beans you want
    to log method invocations on. However, that would be implementing features in
    the beans that aren’t really their core. Also, because the logging feature is
    a cross-cutting concern, you should abstract that away from the beans. CDI interceptors
    can help you achieve that goal.


    There are two parts to realizing interceptors using the CDI API. The first is
    to create an interceptor-binding annotation. The second is to link the interceptor-binding
    annotation to a bean that will implement the interceptor method. Let’s first create
    an interceptor-binding annotation in the restaurant app.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figae_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figae_HTML.jpg)


    Line 5 declares an annotation with the name `Logging`. You could name your interceptor-binding
    annotation anything. Line 4 uses the `@InterceptorBinding` annotation to declare
    that this annotation is an interceptor-binding annotation. Note the target of
    the annotation is `Type` and `Method`, meaning that you can use this interceptor
    for a whole class or just a method of that class. The `@InterceptorBinding` annotation
    is from the `javax.interceptor` package. Now let’s implement the bean that will
    carry out the logic of the interceptor.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaf_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figaf_HTML.jpg)


    Line 4 declares a class called `LoggingBean` annotated with `@Interceptor` on
    Line 1. This annotation makes this class an interceptor bean. Line 2 annotates
    the same class with the `@Logging` interceptor annotation. This links the annotation
    to this class. This means anytime you annotate a method or class with the `@Logging`
    annotation, the CDI container will instantiate this class to carry the logic of
    the interceptor.


    Line 3 also annotates the class with the `@Priority` annotation, taking a `Interceptor.Priority.APPLICATION`
    as a parameter. Before Java EE 7, you needed to activate interceptors through
    an XML config file. However, after version 7, you could use the `@Priority` annotation
    to activate and order/prioritize your interceptors. In this case, you are passing
    it the `APPLICATION` constant, which is just an `int` value.


    Line 10 declares a method called `log()` that takes a single object of type `InvocationContext`,
    returns `Object`, and throws `Exception`. This method is annotated with `@AroundInvoke`
    on Line 9. The `log()` method is the place you implement the logic of the interceptor,
    using an injected logger—Lines 6 and 7—to log the invoked method name. In this
    method, you can implement any logic that cuts across classes.


    The `InvocationContext` object is a bean that gives you information about the—drumroll—context
    of the invocation for which this interceptor has been dispatched. It has methods
    you can use to get information about the `method` parameter if the interceptor
    was dispatched for a method, information about the constructor if this interceptor
    was dispatched for a class, `get` and `set` method parameters, and a method to
    tell the container to proceed with the invocation of the next interceptor, or
    method if none.


    Line 14 invokes the `proceed()` method on the `InvocationContext`. This tells
    the container to proceed to the next interceptor if more than one has been dispatched,
    or to the method call if this is the only interceptor.


    Assuming you were implementing security instead of logging, and after doing some
    security checks, your code decides the currently executing user should not be
    invoking the target method for which this interceptor was dispatched, you can
    return null and the container will not proceed to invoke the target method.


    With your interceptor implemented, all you have to do to use it is annotate a
    method you want to log in a given bean. Now you can log method order invocations
    on your `OrderService` bean.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figag_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figag_HTML.jpg)


    Line 16 uses the `@Logging` annotation to log invocations of the `order()` method
    on the `OrderService` bean. Every invocation of this method will cause the container
    to dispatch the interceptor. And since you ask for the invocation to proceed at
    the end of the interceptor logic implementation, the invocation will proceed to
    the `order()` method after logging.


    This is how simple it is to implement interceptors using the CDI API. You create
    your interceptor-binding annotation, then link that annotation to an interceptor
    bean with a method annotated with `@AroundInvoke` that implements your interceptor
    logic. To use your interceptor, you annotate any method or class—depending on
    your interceptor annotation target—with your interceptor annotation. Next up,
    you’ll learn about CDI events, what they are, why you’d want to use them, how
    to create them, and how to use them. Let’s go.


    ## CDI Events'
