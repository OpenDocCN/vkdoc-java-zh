  trans: '

    ### CDI 拦截器


    对于每个应用程序，你都会遇到需要在 Bean 调用上动态执行任务的情况，而这些任务与 Bean 的核心功能是正交的。CDI 拦截器在本质上类似于 Spring
    框架中使用的面向切面编程。一个典型的例子是日志记录和安全性。


    例如，在你的代码中，你可能希望记录某些 Bean 上的方法调用。你可以手动在你想要记录方法调用的所有 Bean 中实现日志记录功能。然而，这会在 Bean
    中实现并非其核心的功能。此外，由于日志记录功能是一个横切关注点，你应该将其从 Bean 中抽象出来。CDI 拦截器可以帮助你实现这一目标。


    使用 CDI API 实现拦截器分为两个部分。第一部分是创建一个拦截器绑定注解。第二部分是将该拦截器绑定注解链接到一个将实现拦截器方法的 Bean。让我们首先在餐厅应用中创建一个拦截器绑定注解。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figae_HTML.jpg](img/493447_1_En_8_Figae_HTML.jpg)


    第 5 行声明了一个名为 `Logging` 的注解。你可以随意命名你的拦截器绑定注解。第 4 行使用 `@InterceptorBinding`^(³⁰)
    注解来声明该注解是一个拦截器绑定注解。请注意，该注解的目标是 `Type` 和 `Method`，这意味着你可以对整个类或仅对该类的某个方法使用此拦截器。`@InterceptorBinding`
    注解来自 `javax.interceptor` 包。现在，让我们实现将执行拦截器逻辑的 Bean。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaf_HTML.jpg](img/493447_1_En_8_Figaf_HTML.jpg)


    第 4 行声明了一个名为 `LoggingBean` 的类，第 1 行使用 `@Interceptor` 注解。该注解使此类成为一个拦截器 Bean。第 2
    行使用 `@Logging` 拦截器注解对同一个类进行注解。这将注解链接到了此类。这意味着每当你使用 `@Logging` 注解注解一个方法或类时，CDI
    容器将实例化此类来执行拦截器的逻辑。


    第 3 行还使用 `@Priority` 注解对该类进行注解，并将 `Interceptor.Priority.APPLICATION` 作为参数传入。在
    Java EE 7 之前，你需要通过 XML 配置文件来激活拦截器。然而，在 7 版本之后，你可以使用 `@Priority` 注解来激活并对拦截器进行排序/设置优先级。在这种情况下，你传递给它的是
    `APPLICATION` 常量，它只是一个 `int` 值。


    第 10 行声明了一个名为 `log()` 的方法，该方法接受一个 `InvocationContext`^(³¹) 类型的对象作为参数，返回 `Object`，并抛出
    `Exception`。该方法在第 9 行使用 `@AroundInvoke` 进行注解。`log()` 方法是你实现拦截器逻辑的地方，它使用注入的记录器（第
    6 行和第 7 行）来记录被调用的方法名称。在此方法中，你可以实现任何横切类的逻辑。


    `InvocationContext` 对象是一个 Bean，它为你提供有关——请敲鼓——该拦截器被分派到的调用上下文的信息。它提供了一些方法，你可以使用这些方法来获取信息：如果拦截器是为方法分派的，则获取关于
    `method` 参数的信息；如果拦截器是为类分派的，则获取关于构造函数的信息；`get` 和 `set` 方法参数；以及一个用于告诉容器继续调用下一个拦截器（如果没有更多拦截器，则继续调用方法）的方法。


    第 14 行调用了 `InvocationContext` 上的 `proceed()` 方法。这会告诉容器，如果分派了多个拦截器，则继续执行下一个拦截器；如果这是唯一的拦截器，则继续执行方法调用。


    假设你正在实现安全性而不是日志记录，并且在执行一些安全检查后，你的代码确定当前正在执行的用户不应调用此拦截器所分派的目标方法，你可以返回 `null`，容器将不会继续调用目标方法。


    实现拦截器后，要使用它，你只需在你想要记录的、给定 Bean 中的方法上添加注解即可。现在，你可以在你的 `OrderService` Bean 上记录方法调用的顺序。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figag_HTML.jpg](img/493447_1_En_8_Figag_HTML.jpg)


    第 16 行使用 `@Logging` 注解来记录 `OrderService` Bean 上 `order()` 方法的调用。每次调用此方法都会导致容器分派拦截器。由于你在拦截器逻辑实现的末尾要求继续调用，因此在记录日志后，调用将继续执行
    `order()` 方法。


    这就是使用 CDI API 实现拦截器的简单方法。你创建你的拦截器绑定注解，然后将该注解链接到一个拦截器 Bean，该 Bean 包含一个使用 `@AroundInvoke`
    注解的方法，该方法实现了你的拦截器逻辑。要使用你的拦截器，你只需使用你的拦截器注解来注解任何方法或类（取决于你的拦截器注解目标）。接下来，你将了解 CDI
    事件、它们是什么、为什么要使用它们、如何创建它们以及如何使用它们。让我们开始吧。


    ## CDI 事件

    '
- fmt: '### Synchronous Events


    A CDI event is an API construct that helps your application components communicate
    with each other without any form of compile-time dependencies, or without them
    even knowing about each other. It entails an event object of any valid Java type,
    optionally with qualifiers and one or more event listeners, also optionally with
    qualifiers.


    The `Event` object fires an event of its payload type, and the CDI container automatically
    invokes observers that are observing that particular event fired based on the
    event payload type and, optionally, qualifiers. In the restaurant application,
    say you want to have feature where you send an SMS to a user who places an order
    online to acknowledge receipt of their order and to give them an ETA.


    You could implement such a feature using events. First, you need an `Event` object
    with a suitable payload and an observer that observes that same payload event
    type. Here that is in code.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figah_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figah_HTML.jpg)


    You start by using `@Inject` to request an `Event` bean typed to `ApplicationUser`
    on Line 7. The event interface is the starting point of the CDI event mechanism.
    The injected `Event` instance is then used to fire an `ApplicationUser` event
    in the `order()` method on Line 15, using the `fire(T event)` method.


    Because the `Event` bean is typed to an `ApplicationUser` object (Line 7), the
    fire method used to fire the event must be passed an instance of the `ApplicationUser`
    class. This is the event payload, or data that will be passed to event observers,
    and in this case, it’s also used to choose which observers to invoke for the event.
    You use the injected `UserSession`—Lines 9 and 10—in the `SelfService` class to
    get the currently executing user by invoking the `getCurrentUser()` method (Line
    15).


    The `ApplicationUser` class is a bean that models an application user, as shown
    here.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figai_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figai_HTML.jpg)


    The updated `UserSession` bean is shown next.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaj_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figaj_HTML.jpg)


    The `UserSession` bean now has a field of type `ApplicationUser` on Line 7. This
    is going to be set in one way or another by some kind of security layer, after
    a user successfully authenticates herself to the system. For now, you’ll just
    use it as it is.


    With the event fired, you need at least one observer to listen for that particular
    event. Because this event has no explicit qualifiers, the event observer will
    be selected based on the event payload type for which it is observing. Here is
    the observer code.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figak_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figak_HTML.jpg)


    The event observer is declared in a bean class of type `MyEventListener`. It has
    one method called `smsObserver` that takes one argument of type `ApplicationUser`.
    The only new CDI API in this method is the `@Observes` annotation. This annotation
    transforms this method into a CDI observer for event type `ApplicationUser`, as
    fired from the `SelfService` class.


    At runtime, when an event is fired from the `SelfService` class, the container
    will cycle through all the event observers looking for events that observe the
    specific type fired. Once it comes across this method, it will invoke it and pass
    in the payload passed to the fire method of the event object.


    In the observer, you simulate a long-running task of sending an SMS, which might
    take sometime because it has to do with network communication. Once the method
    returns, execution is returned to the point of fire and then continues on from
    there.


    There are a few rules to declare an event observer:


    - The return type must be void.

    - It must have at least one parameter annotated with `@Observes` for the event
    type to be observed.

    - Other parameters to the observer method must be CDI managed beans capable of
    injection.

    - The observer must be declared in a CDI bean.


    As shown, firing and observing events with CDI is very easy and intuitive. As
    you might have noticed, the event observer has nothing to do with the `SelfService`
    class. The `MyEventListener` bean is oblivious of any bean that fires an event.
    You can have multiple event firing points for the same event type and each time
    your event observer will be invoked, without all components knowing about each
    other. This is compelling if you think about it.


    ### Async Events


    You can, however, improve this event mechanism in the restaurant application code.
    If you notice, the event observer in the `MyEventListener` class performs a blocking
    task. You might want to improve the responsiveness of this application by spawning
    long-running tasks to new threads. So instead of sending an SMS in the same thread
    that fired the event, you could do that in a different thread. Can you do that
    with the event mechanism of CDI? Yes of course. Here’s how, starting from the
    event-firing side.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figal_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figal_HTML.jpg)


    In this code, you use the same injected `Event` object—Lines 7 and 8—to fire an
    `ApplicationUser` event on Line 14. The difference, however, is that you invoked
    the `fireAsync` method instead of the plain fire. This method fires an asynchronous
    event for all async observers to listen for it. Async events return control immediately.
    The observer method is executed simultaneously, or asynchronously. Here’s the
    async event observer implementation.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figam_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figam_HTML.jpg)


    Line 3 declares a method, `smsAsyncObserver`, that takes an `ApplicationUser`
    object as a parameter. The only new thing is the annotation you use for the parameter.
    Instead of `@Observes` as earlier, the code uses `@ObservesAsync`. This is how
    you create an observer to listen to async events.


    Because this code has only one async firing point and one async observer of the
    same payload type, this observer will be invoked. The best thing is that this
    observer will not block. Once it’s invoked, execution will return to the `order()`
    method in the `SelfService` bean. This way, you can conveniently send the SMS
    without affecting the responsiveness of the application. This is how you implement
    async events in CDI. But there’s more.


    You can use qualifiers to fire and observe events of the same type, but for different
    purposes. You can qualify the event object at the injection point and the observer
    at the declaration point. The container will then link the observer to the event
    based on the qualifier. It is effortless to implement.'
