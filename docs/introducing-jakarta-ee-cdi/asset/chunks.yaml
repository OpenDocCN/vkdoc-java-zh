    Thank you for picking up*Introducing Jakarta EE CDI: Contexts and Dependency Injection
    for Enterprise Java Development.* I wrote this book as a response to the lack
    of easy-to-understand books on using the compelling and intuitive Contexts and
    Dependency Injection API on the Jakarta EE (formerly Java EE) platform.


    This book covers the very essentials of the CDI API and aims at explaining the
    various constructs in a way that is easy to understand and relate to. The ultimate
    goal is to help you, the everyday Java developer, write better code. Throughout
    the book, you will be working on a simple restaurant application, seeing when
    and how the various CDI API constructs can be used.


    ## What Do You Need to Know to Use This Book?


    Ideally, you should be a Java developer who is comfortable with Java SE before
    starting with this book. Knowing a bit of Java EE or Spring should help you pick
    up the concepts faster, but isn’t required. You should also have at least Java
    8 installed on your machine.


    ## What Does the Book Cover?


    The book starts with the theory of Java EE, including its evolution to present-day
    Jakarta EE, and proceeds to cover CDI, starting with how to activate it explicitly.
    The discussion then builds on the concept of CDI beans and discusses the various
    types. You then learn about CDI contexts and injection points. The book then introduces
    CDI qualifiers, producers, interceptors, and finally CDI events.


    ## What Will You Learn in the End?


    This is a very concise book that covers only what matters. Your time is important,
    so I selected topics that I use personally in my day-to-day coding. There is no
    point in loading the book with topics you will only use sparingly. So this book
    should be straightforward to consume over a weekend.


    At the end of this book, you will have a firm grasp of the Contexts and Dependency
    Injection API. You’ll know what it is, when to use it, and how to write better,
    more readable and maintainable code with it.


    ## Where Is the Source Code?


    The entire code for the book is available on GitHub, both in an Apress branded
    repo located at [`www.github.com/apress/introducing-jakarta-ee-cdi`](http://www.github.com/apress/introducing-jakarta-ee-cdi)
    and on my own repo, located at [`https://github.com/pedanticdev/jee-book`](https://github.com/pedanticdev/jee-book)
    . The project is built with the Maven dependency management tool and should work
    in any IDE that supports Maven. If you do not have Maven installed, you can follow
    the guide found at [`https://www.baeldung.com/install-maven-on-windows-linux-mac`](https://www.baeldung.com/install-maven-on-windows-linux-mac)
    to install it on your machine. It is available for all OSes out there. I highly
    encourage you to clone the code to your local machine to follow along with the
    book.


    The project object model (`pom.xml` ) file contains the Payara Micro Maven plugin
    that you can use to run the code sample. Change to the project directory and issue
    the following command:


    ```

    mvn package payara-micro:start

    ```


    To get the Async CDI events running, you will need to download the Payara Server
    Full Stream from [`www.payara.fish/software/downloads/`](http://www.payara.fish/software/downloads/)
    and follow the video found at [`www.youtube.com/watch?v=aw-cNxKJU_Y`](http://www.youtube.com/watch%253Fv%253Daw-cNxKJU_Y)
    to run the cloned code.


    ## How Do You Reach Me?


    Writing a book is a tedious task, and as such, despite best efforts, there may
    be errors that escape through quality checks. I take full responsibility for all
    of them.


    Should you encounter any such errors, need help with anything in this book, or
    just want to hang out for coffee, please do not hesitate to reach out to me personally
    via`hello@pedanticacademy.com` .


    Once again, thank you for picking up this book. I hope you write better code after
    reading it. Let’s get started.


    > —Luqman Saeed


    About the Author About the Technical Reviewer


    # 1. What Is Java EE?


    At its core, the Java Enterprise Edition (Java EE), formerly known as J2EE, is
    a collection of *abstract, standardized specifications* that prescribe solutions
    to commonly faced challenges in software development.


    It is important to note the word *abstract* in this definition. This means that
    Java EE is simply a set of interfaces and contracts that provide a public-facing
    API for developers.


    These abstract specs are also said to be *standardized*. What does that mean?
    It means that the entire collection of Java EE APIs are published according to
    well-defined criteria set by experts in the subject field of the API^([¹](#fn1)).


    By standardized, it also means that every Java EE API has gone through the rigorous
    process of the Java Community Process’s Java Spec Request program. The result
    of this process is a set of APIs that are industry-tried and -tested and are deemed
    to be here to stay.


    However, remember that I said Java EE is abstract, right? Well, even though you
    will generally code against the Java EE APIs in the `javax.*` packages, you can’t
    run your application on Java EE per se.


    ## How Do You Run a Java EE App?


    To run a Java EE application, you need a concrete implementation of the Java EE
    spec. Remember that they are abstract. The official name given to the concrete
    implementation of Java EE is an *application server*. I bet you have heard that
    phrase before, right?


    An application server is basically a concrete implementation of the Java EE abstract
    specs. This means that you run your application code using Java EE API implementations
    on an application server.


    There are many application servers out there, including Payara Server, Apache
    TomEE, JBoss Wildfly, and IBM OpenLiberty, among others.


