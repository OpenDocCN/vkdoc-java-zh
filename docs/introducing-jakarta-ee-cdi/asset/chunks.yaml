- fmt: '# 2. What Is a Java Specification Request (JSR)?


    At its core, a Java Specification Request is a formal, open standard document
    proposal that is made by an individual or organization to the Java Community Process
    (JCP)^([²](#fn2)). It contains proposed changes, additions, or improvements to
    the Java technology platform.


    Many essential points can be gleaned from this definition. First is that a JSR
    is a formal document. What this means is that a JSR or a request for adding to
    the Java technology group must take a certain predefined format. This format is
    defined by the JCP.


    Also, a JSR is an open standard document. What this means, again, is that a JSR
    is a document that conforms to certain established rules and regulations regarding
    its distribution and contributions to it. It also means that whatever is contained
    in the JSR is easily accessible to anyone interested in assessing it.


    Flowing from the definition of a Java Specification Request is that a JSR can
    be made by either an individual or organization. Any member of the JCP can make
    a JSR. JCP membership is opened to the public; it’s free for individuals as well.
    So what this means is that you cannot make a request to the JCP without being
    a member of the organization.


    Finally, a JSR is a document that proposes changes, additions, or improvements
    to the Java technology platform. Every JSR contains new features, bug fixes, or
    general improvements, in one way or the other, to the Java technology stack.


    Every major API available on Java EE is actually a JSR specification that has
    gone through the process of being approved by the JCP. All JSRs have a process
    they have to go through to be approved by the JCP.


    Once a JSR is approved by the JCP, it becomes part of the Java stack and can be
    safely used in production. The JSR process ensures that only well tested technologies
    become part of the Java stack, preventing unnecessary bloat in the form of fad
    technologies.


    The JSR process also ensures that APIs are carefully crafted in such a way as
    to preserve backward compatibility. If there is one thing Java is known for, it’s
    backward compatibility, and the JSR process ensures that this crucial Java feature
    is maintained.


    As a JSR is just an abstract specification, it needs some form of implementation
    to be useful. That is where the concept of reference implementation (covered in
    Chapter [3](#493447_1_En_3_Chapter.xhtml)) comes in.


    Footnotes [1](#493447_1_En_2_Chapter.xhtml#Fn1_source)


    # 3. What Is a Reference Implementation?


    In the previous chapter, you learned what a JSR is. Recall that a JSR is an abstract
    request to the JCP that contains proposed additions to the Java technology platform.


    Because it is abstract, you cannot run it. A JSR needs to have some form of implementation,
    or concrete realization, to be useful to end developers. That is where the concept
    of *reference implementation* comes in.


    Every JSR must have a reference implementation, which is a concrete implementation
    of the specification contained in the JSR document. This is a requirement of the
    JCP. Every single JSR has a reference implementation that is freely available
    and bundled with the application servers.


    A JSR also has a Technology Compatibility Kit (TCK), which is “a suite of tests
    that at least nominally checks a particular alleged implementation of a Java Specification
    Request (JSR) for compliance.”^([³](#fn3))


    A TCK is used to test a JSR implementation for compliance with the spec. That
    is part of why Java EE is said to be a *standardized* set of specifications.


    This rigorous process also ensures the quality of the APIs that are derived from
    the JSR document. Some popular reference implementations (RIs) of JSRs include
    the following:


    *   JSR 380 (Bean Validation 2.0) – Hibernate Validator 6

    *   JSR 367 (JSON-B Binding) – Eclipse Yasson 1.0

    *   JSR 370 (JAX-RS 2.1) – Jersey

    *   JSR 365 (CDI 2.0) – WELD 3.0


    These are some of the new and more popular JSRs and their respective reference
    implementations. Most of these reference implementations are bundled with application
    servers, which is the subject of the next chapter.


    Footnotes [1](#493447_1_En_3_Chapter.xhtml#Fn1_source)


    # 4. What Is an Application Server?


    The previous chapter talked about what a JSR reference implementation is. The
    definition of Java EE also mentioned that it is a collection of abstract specifications.
    Java EE itself is a Java Specification Request.


    Better still, Java EE is what is termed an *umbrella JSR* in that it encapsulates
    some JSRs. So Java EE 7, for instance, is [JSR 342](https://www.jcp.org/en/jsr/detail%253Fid%253D342).
    Java EE 8 is [JSR 366](https://www.jcp.org/en/jsr/detail%253Fid%253D366). So Java
    EE itself is a JSR that goes through the JCP JSR process and is subject to the
    requirements of every JSR.


    Flowing from this idea and remembering that the JSR process requires every JSR
    to have a reference implementation, this means Java EE as an umbrella JSR must
    also have a reference implementation.


    The implementation of the umbrella JSR or Java EE is commonly referred to as an
    *application server*. An app server is a concrete implementation of the Java EE
    spec that you can actually run your code on. The reference implementation of Java
    EE is the Glassfish Application Server.


    An application server generally abstracts the developer away from a lot of mundane
    stuff that you would have had to manage on your own, like data-source pooling,
    caching, clustering, and other overheads.


    The application server must also pass the TCK to be fully certified as being compliant
    with the given umbrella JSR. An app server is also the basis for the portability
    of Java EE. As a developer, you generally are encouraged to code against the `javax.*`
    packages, which are the standard Java EE packages.


    Because an app server is subject to a standard, using the Java EE package means
    you can swap out application servers and your code will generally run with little
    to no modifications. This is compelling if you think about it.


    For starters, no single application vendor can lock you in. Because you can swap
    out application servers, you can theoretically change vendors at any time should
    you be dissatisfied with your current vendor.


    There are many application vendors out there, some free, some costly. Popular
    among the open source ones is Payara Server (see [`http://payara.fish`](http://payara.fish)),
    a Glassfish-derived, fully patched application server that is freely available
    for download.


    Java EE is an abstract spec and its concrete realization or implementation is
    called an *application server.* As a JSR, the required reference implementation
    of Java EE is the Glassfish Application Server.'
  raw: '# 2. What Is a Java Specification Request (JSR)?


    At its core, a Java Specification Request is a formal, open standard document
    proposal that is made by an individual or organization to the Java Community Process
    (JCP)^([²](#fn2)). It contains proposed changes, additions, or improvements to
    the Java technology platform.


    Many essential points can be gleaned from this definition. First is that a JSR
    is a formal document. What this means is that a JSR or a request for adding to
    the Java technology group must take a certain predefined format. This format is
    defined by the JCP.


    Also, a JSR is an open standard document. What this means, again, is that a JSR
    is a document that conforms to certain established rules and regulations regarding
    its distribution and contributions to it. It also means that whatever is contained
    in the JSR is easily accessible to anyone interested in assessing it.


    Flowing from the definition of a Java Specification Request is that a JSR can
    be made by either an individual or organization. Any member of the JCP can make
    a JSR. JCP membership is opened to the public; it’s free for individuals as well.
    So what this means is that you cannot make a request to the JCP without being
    a member of the organization.


    Finally, a JSR is a document that proposes changes, additions, or improvements
    to the Java technology platform. Every JSR contains new features, bug fixes, or
    general improvements, in one way or the other, to the Java technology stack.


    Every major API available on Java EE is actually a JSR specification that has
    gone through the process of being approved by the JCP. All JSRs have a process
    they have to go through to be approved by the JCP.


    Once a JSR is approved by the JCP, it becomes part of the Java stack and can be
    safely used in production. The JSR process ensures that only well tested technologies
    become part of the Java stack, preventing unnecessary bloat in the form of fad
    technologies.


    The JSR process also ensures that APIs are carefully crafted in such a way as
    to preserve backward compatibility. If there is one thing Java is known for, it’s
    backward compatibility, and the JSR process ensures that this crucial Java feature
    is maintained.


    As a JSR is just an abstract specification, it needs some form of implementation
    to be useful. That is where the concept of reference implementation (covered in
    Chapter [3](#493447_1_En_3_Chapter.xhtml)) comes in.


    Footnotes [1](#493447_1_En_2_Chapter.xhtml#Fn1_source)


