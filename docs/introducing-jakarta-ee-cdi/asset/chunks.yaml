    第 4 行使用`@Inject`来请求一个`String`类型的实例，注入到`OrderFacade` Bean 的`userName`字段（第 5 行）。假设你的应用程序中没有使用任何第三方代码，这应该可以正常工作。


    然而，如果你使用了第三方库，像 OmniFaces^(²⁵) 这样的库就有返回`String`的生产者方法。在餐厅应用程序中，OmniFaces 库是应用程序依赖项的一部分。因此，`String`注入点会导致应用程序启动时容器验证失败，尽管代码编译没有问题。


    在这种情况下，你可以使用限定符来限定生产者方法和注入点。请看这里的限定符声明：


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figz_HTML.jpg](img/493447_1_En_8_Figz_HTML.jpg)


    在前面的代码中，你声明了一个名为`UserNameQualifier`的限定符，并将其与生产者方法关联，如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaa_HTML.jpg](img/493447_1_En_8_Figaa_HTML.jpg)


    第 7 行使用`@UserNameQualifier`注解了`produceUserName()`方法，以确保你可以将此生产者方法与任何其他方法（无论是你自己的代码还是任何第三方库中的）区分开来。最后，你使用相同的限定符来限定注入点。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figab_HTML.jpg](img/493447_1_En_8_Figab_HTML.jpg)


    第 5 行使用`@UserNameQualifier`注解了`userName`字段，以告诉容器查询被注解的生产者字段以获取实例来满足此注入点。简而言之，这就是如何使用生产者方法。


    到目前为止，你所看到的是生产者方法。你可以将生产者方法的返回类型限定到特定的作用域，而不是保留默认的`@Dependent`作用域。但是，有一个注意事项。根据
    CDI API 的规定，“如果生产者方法有时返回 null 值，或者生产者字段在访问时有时包含 null 值，那么该生产者方法或字段必须具有`@Dependent`作用域。”


    你可能会遇到代码请求`userName`时没有用户登录的情况。在这种情况下，你的生产者方法可能会返回 null，因此你将其保留为默认的`@Dependent`作用域。但是，请记住，你可以使用特定作用域注解你的生产者方法，并且该方法返回的类型将被放入该上下文中。

    '
- fmt: '### Producer Fields


    Producer fields are similar to producer methods in that they both act as sources
    for contextual instances. Producer fields, however, are just fields of a bean
    annotated with the `@Produces` annotation. The annotated field can be equally
    qualified and scoped as can be done with a producer method. A typical use of producer
    fields is producing `EntityManager` objects for JPA, as shown next.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figac_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figac_HTML.jpg)


    Line 5 declares a field of type `EntityManager`, annotated with `@PersistenceContext`
    on Line 4 and `@Produces` on Line 3. This is a classic case of field producers
    where you are using two annotations from two APIs to produce an object. The `@PersistenceContext`
    annotation is from the JPA and is used to link this `EntityManager` object to
    the persistence context. You then use the CDI `@Produces` annotation to make this
    field capable of satisfying the JPA `EntityManager` injection points in your code.


    ## CDI Bean Lifecycle Callbacks


    CDI beans, as has been discussed to this point, are managed by the container.
    All you have to do is request instances from the container. However, there are
    times when you’ll need to do some for initialization, or de-initialization of
    your beans before you use them.


    A typical example could be when you need to fetch some form of list from the database
    for display in the UI before the UI accesses the bean. Another example is releasing
    system resources held in a bean before the bean is destroyed. You will encounter
    these a lot in your own applications.


    The CDI API gives you annotations you can place on methods to transform those
    methods into automatically invoked lifecycle callbacks.


    ### @PostConstruct


    A method annotated `@PostConstruct` will be automatically invoked when a bean
    instance is fully constructed and all dependencies of the bean have been satisfied,
    but just before the bean is put into service.


    A method annotated `@PostConstruct` must not have a return type nor take any parameters,
    except for interceptors (you’ll learn about them later), for which case they can
    take an `InvocationContext` object. A `@PostConstruct` annotated method can be
    private, package private, protected, or public.


    In this code, you want to pre-populate a list with the last 10 orders of a self-service
    user that logs on to use the online portal. In the `SelfService` bean, as shown
    here, you can use the `@PostConstruct` callback method.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figad_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figad_HTML.jpg)


    Line 6 declares a `Order` typed `List` object. Line 8 declares the `init()` method
    on Line 9 as a callback method with the `@PostConstruct` annotation. The method
    signature is straightforward—it returns void, is named `init` (part of my naming
    convention), and is declared private. At runtime, the container will automatically
    invoke this method once all injection points in the bean have been satisfied but
    just before the bean is put into service.


    ### @PreDestroy


    This annotation can be used on a method that should be invoked just before a bean
    instance is destroyed by the container.


    So far you’ve seen how all the of the various CDI API constructs work together.
    Next up, you’ll learn about the concept of CDI interceptors, what they are, what
    problem they solve, and how you can create them.'
