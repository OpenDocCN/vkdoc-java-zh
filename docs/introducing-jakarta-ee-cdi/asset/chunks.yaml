  trans: '

    ### 同步事件


    CDI 事件是一种 API 构造，它帮助你的应用程序组件在没有任何编译时依赖，甚至彼此互不知晓的情况下进行通信。它涉及一个事件对象（可以是任何有效的 Java
    类型），可选地带有限定符，以及一个或多个事件监听器，同样可选地带有限定符。


    `Event`^(³²) 对象会触发其负载类型的事件，CDI 容器会根据事件负载类型以及可选的限定符，自动调用正在观察该特定事件的观察者。在餐厅应用程序中，假设你想要一个功能：向在线下单的用户发送一条短信，以确认收到订单并告知预计送达时间。


    你可以使用事件来实现这样的功能。首先，你需要一个带有合适负载的 `Event` 对象，以及一个观察相同负载事件类型的观察者。以下是代码实现。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figah_HTML.jpg](img/493447_1_En_8_Figah_HTML.jpg)


    你首先在第 7 行使用 `@Inject` 来请求一个类型为 `ApplicationUser` 的 `Event` bean。事件接口是 CDI 事件机制的起点。然后，在第
    15 行的 `order()` 方法中，使用注入的 `Event` 实例，通过 `fire(T event)` 方法来触发一个 `ApplicationUser`
    事件。


    因为 `Event` bean 的类型是 `ApplicationUser` 对象（第 7 行），所以用于触发事件的 fire 方法必须传入一个 `ApplicationUser`
    类的实例。这就是事件负载，即传递给事件观察者的数据，在此例中，它也用于选择要为该事件调用哪些观察者。你在 `SelfService` 类中使用注入的 `UserSession`（第
    9 行和第 10 行），通过调用 `getCurrentUser()` 方法（第 15 行）来获取当前正在执行的用户。


    `ApplicationUser` 类是一个对应用程序用户进行建模的 bean，如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figai_HTML.jpg](img/493447_1_En_8_Figai_HTML.jpg)


    更新后的 `UserSession` bean 如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaj_HTML.jpg](img/493447_1_En_8_Figaj_HTML.jpg)


    `UserSession` bean 现在在第 7 行有一个类型为 `ApplicationUser` 的字段。在用户成功向系统验证身份后，这个字段将由某种安全层以某种方式设置。目前，你只需按原样使用它。


    事件触发后，你至少需要一个观察者来监听该特定事件。由于此事件没有显式的限定符，事件观察者将根据其正在观察的事件负载类型来选择。以下是观察者代码。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figak_HTML.jpg](img/493447_1_En_8_Figak_HTML.jpg)


    事件观察者在一个类型为 `MyEventListener` 的 bean 类中声明。它有一个名为 `smsObserver` 的方法，该方法接受一个 `ApplicationUser`
    类型的参数。这个方法中唯一新的 CDI API 是 `@Observes` 注解。这个注解将此方法转换为事件类型 `ApplicationUser` 的 CDI
    观察者，用于观察从 `SelfService` 类触发的事件。


    在运行时，当从 `SelfService` 类触发一个事件时，容器会遍历所有事件观察者，寻找观察该特定触发类型的事件。一旦找到这个方法，它就会调用该方法，并传入传递给事件对象
    fire 方法的负载。


    在观察者中，你模拟了一个发送短信的长时间运行任务，由于涉及网络通信，这可能需要一些时间。一旦方法返回，执行流程将返回到事件触发点，然后从那里继续执行。


    声明事件观察者有一些规则：


    *   返回类型必须是 void。

    *   必须至少有一个参数使用 `@Observes` 注解，用于指定要观察的事件类型。

    *   观察者方法中的其他参数必须是能够被注入的 CDI 托管 bean。

    *   观察者必须在 CDI bean 中声明。


    如上所示，使用 CDI 触发和观察事件非常容易且直观。你可能已经注意到，事件观察者与 `SelfService` 类没有任何关系。`MyEventListener`
    bean 对任何触发事件的 bean 都一无所知。你可以为同一事件类型设置多个事件触发点，每次你的事件观察者都会被调用，而所有组件之间互不知晓。仔细想想，这非常引人注目。


    ### 异步事件


    然而，你可以改进餐厅应用程序代码中的这个事件机制。如果你注意到，`MyEventListener` 类中的事件观察者执行了一个阻塞任务。你可能希望通过将长时间运行的任务生成到新线程中来提高此应用程序的响应能力。因此，与其在触发事件的同一个线程中发送短信，不如在另一个线程中执行。你能用
    CDI 的事件机制做到这一点吗？当然可以。以下是实现方法，从事件触发端开始。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figal_HTML.jpg](img/493447_1_En_8_Figal_HTML.jpg)


    在这段代码中，你使用同一个注入的 `Event` 对象（第 7 行和第 8 行）在第 14 行触发一个 `ApplicationUser` 事件。然而，不同之处在于，你调用了
    `fireAsync` 方法，而不是普通的 fire 方法。此方法会触发一个异步事件，供所有异步观察者监听。异步事件会立即返回控制权。观察者方法会同时或异步地执行。以下是异步事件观察者的实现。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figam_HTML.jpg](img/493447_1_En_8_Figam_HTML.jpg)


    第 3 行声明了一个方法 `smsAsyncObserver`，它接受一个 `ApplicationUser` 对象作为参数。唯一的新东西是你用于该参数的注解。与之前的
    `@Observes` 不同，代码使用了 `@ObservesAsync`。这就是创建观察者来监听异步事件的方法。


    因为这段代码只有一个异步触发点和一个相同负载类型的异步观察者，所以这个观察者将被调用。最棒的是，这个观察者不会阻塞。一旦它被调用，执行流程将返回到 `SelfService`
    bean 中的 `order()` 方法。这样，你就可以方便地发送短信，而不会影响应用程序的响应能力。这就是在 CDI 中实现异步事件的方法。但还不止这些。


    你可以使用限定符来触发和观察相同类型的事件，但用于不同的目的。你可以在注入点限定事件对象，在声明点限定观察者。然后，容器将根据限定符将观察者与事件关联起来。实现起来非常轻松。

    '
- fmt: '### Qualifying Events


    Let’s say in your application, you decide to send an SMS to all clients, whether
    self-service or in-person diners. However, you want to have different message
    content for the two classes of clients. To do that, you need to qualify your events
    and observers with requisite qualifiers.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figan_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figan_HTML.jpg)


    This code has only one change. On Line 7, you use `@OnlineQualifier` to qualify
    the injected event object. This marks this event as qualified and will only be
    listened to by observers with the same qualifier. Here’s the observer.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figao_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figao_HTML.jpg)


    The `async` observer is the same as before except for the method parameter on
    Line 3, where you annotate the `ApplicationUser` with `@OnlineQualifier`. This
    single annotation links this observer to the event in `SelfService`. You can now
    fire an async event in the `SelfService` class and have this observer invoked.
    However, all of this is quite useless if you have just one event-firing point
    and one observer. The power of qualifying events comes in to play when you have
    more than one event. Take a look at that scenario.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figap_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figap_HTML.jpg)


    This code shows the `OrderService` bean with two new fields—`Event` and `UserSession`.
    The event object on Line 8 is qualified with the `@InStoreQualifier` on Line 7.
    You then fire an async event on Line 18 after an order is placed by a diner. This
    fired event can only be observed by `@InStoreQualifier` qualified observers, as
    follows.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaq_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figaq_HTML.jpg)


    In this code, you declare an observer on Line 3 called `smsInStore` with one parameter
    type—`ApplicationUser`. This parameter is annotated with `@ObservesAsynch` and
    `@InStoreQualifier`, effectively making this observer responsible for the event
    fired from the `OrderService` class. This is how you can combine the various CDI
    API constructs to create very powerful applications, all the while keeping your
    code easy to read and maintainable.


    ### Transactional Event Observers


    All the event observers will be called when the event is fired. There are times,
    however, when you need an event observer to be called at a specific time during
    a transaction. As an example, say you have an `ApplicationUser` class in your
    application. You would like to send a welcome email to a self-service user who
    successfully registers with the application. However, you want to send the email
    only if the user is successfully persisted in your datastore, or more technically,
    when the transaction completes successfully.


    To do that, you create a new qualifier, `CreateUserQualifier`, fire an event,
    and declare a transactional observer that gets called only if the transaction
    completes successfully. The code starts with the qualifier.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figar_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figar_HTML.jpg)


    Line 4 shows an annotation declaration called `CreateUserQualifier`, with the
    requisite qualifier metadata declared on Lines 1-3.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figas_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figas_HTML.jpg)


    Line 2 of this code declares the `PersistenceService` bean, which is set as a
    stateless EJB (Line 1). You inject an event object on Line 6, which is qualified
    on Line 5 with `@CreateUserQualifier`. The class then declares a method called
    `persistUser` on Line 8 that takes an `ApplicationUser` object as the parameter.
    In this method, you would store the user in the datastore using some form of data
    API. You then fire an event on Line 10 with the `ApplicationUser` object as the
    payload.


    Because the `persistUser` method is declared in an EJB, it will be executed in
    a transactional context. So you know that the event is being fired in a transactional
    context. Now you can examine the observer for this event.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figat_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figat_HTML.jpg)


    Line 3 declares an observer called `sendEmail` that takes an `ApplicationUser`
    as the payload. It is qualified with `@CreateUserQualifier` and annotated with
    `@Observes`. This time, however, the `@Observes` annotation has a value set for
    the `during` parameter. The value of the `during` field of the `@Observes` annotation
    can be set to any of the following:


    *   `TransactionPhase.IN_PROGRESS`: The event observer is invoked when the event
    is fired, without regard to the transaction phase. This is the default value for
    all the `@Observes` you have seen so far.

    *   `TransactionPhase.BEFORE_COMPLETION`: The event observer is called during
    the before completion phase of the transaction.

    *   `TransactionPhase.AFTER_COMPLETION`: The event observer is called during the
    after completion phase of the transaction.

    *   `TransactionPhase.AFTER_FAILURE`: The event observer is called during the
    after completion phase of the transaction, but only if the transaction failed.

    *   `TransactionPhase.AFTER_SUCCESS`: The event observer is called during the
    after completion phase of the transaction, but only if the transaction completed
    successfully.


    The last value was used in the observer declaration. What you want is for this
    observer to be invoked only if the transaction in which you are persisting the
    new user completes successfully, in which case you know for certain the user has
    been persisted in the datastore. There is no point in sending a welcome email
    to a user who has not successfully registered.


