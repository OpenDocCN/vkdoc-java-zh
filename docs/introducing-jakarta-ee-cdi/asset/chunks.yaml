    # 5. 什么是 Jakarta EE？


    你已经了解了什么是 Java EE。你已经了解了什么是应用服务器，以及它与 Java EE 这个术语的关系。现在，是时候来了解什么是 Jakarta EE
    了。


    Jakarta EE 就是新的 Java EE。早在 2017 年，作为 Java EE 技术栈所有者的 Oracle 决定将这个平台开放给更广泛的社区。在此过程中，整个
    Java EE 平台必须转移到一个非营利、面向社区的基金会。


    Java EE 社区进行了投票，并选择了 Eclipse 基金会。于是 Java EE 被转移到了 Eclipse 基金会。由于法律问题，该平台的名称必须更改，不能再使用原来的
    Java EE。社区再次提出建议，最终 *Jakarta EE* 这个名称胜出^(⁴)。


    Eclipse 基金会以将前 Java EE 平台与更现代的软件开发范式对齐为新的目标，力求将 Jakarta EE 定位为一个现代化、云原生、敏捷的软件开发平台。


    对 Java EE 的批评之一是其发展过于缓慢。软件开发领域的演进速度超过了该平台所能跟上的步伐。鉴于这些合理的担忧，Eclipse 基金会通过 Jakarta
    EE 工作组，为 Jakarta EE 制定了以下指导原则：


    *   提供更频繁的版本发布

    *   降低参与门槛

    *   发展社区

    *   代表社区管理 Jakarta EE 品牌


    最初，Jakarta EE 与 Java EE 8 平台完全等同。构成 Java EE 8 的所有规范、参考实现（RI）和技术兼容性工具包（TCK）都已转移至
    Eclipse 基金会^(⁵)。这意味着之前的 Java EE 8 版本是新的云原生 Jakarta EE 的基础。


    前面的章节讨论了 Java EE 如何通过 Java 社区流程（JCP）中的 Java 规范请求（JSR）概念进行演进。然而，Jakarta EE 在 Eclipse
    基金会将如何演进？或者说，Jakarta EE 的治理模式与 Java EE 有何不同？


    主要区别在于，Jakarta EE 的治理模式现在是基于社区的、多供应商的，并且向这些技术的企业消费者开放参与和贡献。Eclipse 基金会将确保 Jakarta
    EE 的新规范和开发流程保持开放、供应商中立，并为所有参与者提供公平的竞争环境。


    Java 社区流程（JCP）将被 Eclipse 基金会规范流程（EFSP）所取代（参见 [`https://www.eclipse.org/projects/efsp/`](https://www.eclipse.org/projects/efsp/)）。它与
    JCP 有何不同？


    ![../images/493447_1_En_5_Chapter/493447_1_En_5_Figa_HTML.jpg](img/493447_1_En_5_Figa_HTML.jpg)


    [图片来源](https://blogs.eclipse.org/post/tanja-obradovic/how-eclipse-foundation-specification-process-efsp-different-java-community)


    它采用代码优先的方法。JCP 和 EFSP 之间最根本的区别在于，规范将通过这种代码优先的方法来制定。在 JCP 中，先制定规范，然后才是参考实现。然而，在
    EFSP 中，会先进行动手编码和实验，以确保某些内容值得被纳入规范文档。


    其他差异都使得 EFSP 比之前的 JCP 流程更加开放。这是一件好事。这意味着作为开发者，你可以放心地在你的应用程序中使用 Jakarta EE 平台，因为你知道它是一个由非营利组织运营的完全开放的平台，并且有整个
    Java 社区的更广泛参与。微软和 Pivotal（Spring 框架背后的公司）都是 Jakarta EE 社区的成员。


    在版本发布方面，Eclipse 基金会下的首个总括规范版本是 Glassfish 5.1，这是一个兼容 Java EE 8 的版本。回顾第 3 章所述，Glassfish
    应用服务器是 Java EE 总括 JSR 的参考实现。该基金会已发布了 Jakarta EE 8，并以 Glassfish 5.2 作为其参考实现。Jakarta
    EE 8 是一个完全兼容 Java EE 8 的版本。这意味着每个 Java EE 8 应用程序都自动与 Eclipse Jakarta EE 8 兼容。


    作为 Jakarta EE 开发者，你的未来是令人振奋的。社区对推动整个 Jakarta EE 平台向前发展抱有极大兴趣，旨在使其成为现代软件开发范式中最可靠、云原生、首选的企业级
    Java 开发平台。你难道不想掌握这个激动人心的平台吗？


    脚注 1   2


    # 6. 为什么选择 Jakarta EE？


    作为一名 Java 开发者，在软件开发框架和平台方面，你有很多选择。你可能会问自己一个问题：为什么应该选择 Jakarta EE 作为你的主要软件开发平台？是什么让它成为更好的选择？


    至少有以下几个理由值得你尝试一下 Jakarta EE，其中关键的有：


    *   标准化

    *   开放性

    *   稳定性

    *   易于开发

    *   可移植性

    *   按需选择：坦克或手枪

    *   出色的文档


    ## 标准化


    对于所有 Java EE API，每一个 JSR 在提交给 JCP 执行委员会投票之前，都经过了严格的公众和 JSR 专家组审查流程。每个 JSR 都会根据向后兼容性、对整个
    Java 平台的益处等方面进行权衡。这种煞费苦心的 JSR 审批流程确保了每个特性都是基于某些明确定义的技术标准而被接受的。同样，新 Jakarta EE
    平台的每个 API 都将经过一个明确定义的规范流程，以确保平台中包含的任何 API 都能长期存在。


    ## 开放性


    如前所述，新的 Jakarta EE 规范将通过 Eclipse 基金会规范流程，采用代码优先的方法来制定。EFSP 是一个开放流程，任何人都可以参与其中。整个规范流程都是公开制定的。


    ## 易于开发


    Jakarta EE 开发毫不费力。所需要的只是一个应用服务器或一个兼容 Jakarta EE 的运行时，以及一个 Maven 依赖。它需要最少的配置，遵循约定优于配置的原则，并且不会导致
    XML 地狱。它还具有合理的默认值。例如，EJB 默认是事务性的，使用默认数据源，并且默认启用 CDI。


    ![../images/493447_1_En_6_Chapter/493447_1_En_6_Figa_HTML.jpg](img/493447_1_En_6_Figa_HTML.jpg)


    这段代码片段是你轻松拥有整个 Jakarta EE 平台所需的唯一依赖。此外，因为你与标准的实现是解耦的，所以你只需将你的应用程序与你的代码以及使用的任何其他第三方库打包在一起。你选择的应用服务器将提供实现以及运行应用程序所需的所有其他繁重工作。


    ## 可移植性


    Jakarta EE 作为一个标准，意味着只要你针对标准进行编码，你的应用程序就应该在标准的不同实现之间以最少配置甚至无需配置即可运行。这一点很有吸引力，因为你不会受限于某一个
    Jakarta EE 应用运行时供应商。只要你使用标准的 Jakarta EE API，你的代码就可以在各种应用服务器之间移植。

