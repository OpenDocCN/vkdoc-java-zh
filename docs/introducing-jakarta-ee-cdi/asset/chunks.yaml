  trans: '

    ## CDI 激活


    在 Jakarta EE 平台上，帮助你将应用程序代码中不同组件粘合在一起的 API 是上下文与依赖注入（CDI）API。在其 2.0 版本中，CDI 在
    Jakarta EE 中默认激活，发现模式设置为 `annotated`。


    默认激活范围的含义是，只有带有 CDI 注解或 CDI 认可注解的 Bean（或 Java 类）才有资格被注入。默认的 CDI 配置文件是一个位于 `/webapp/WEB-INF`
    文件夹中的小型 XML 文件，名为 `beans.xml`，其内容如下所示：


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figa_HTML.jpg](img/493447_1_En_8_Figa_HTML.jpg)


    第 5 行是默认的 Bean 发现模式，Bean 发现模式本质上是一种扫描机制，用于识别有资格由 CDI 容器管理的 Bean。`Annotated` 意味着在扫描期间，只有带有
    Bean 定义注解的类才会被发现。


    这意味着以下 Bean 将在应用程序启动时被扫描。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figb_HTML.jpg](img/493447_1_En_8_Figb_HTML.jpg)


    然而，由于缺少 Bean 定义注解，此类将不会被扫描。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figc_HTML.jpg](img/493447_1_En_8_Figc_HTML.jpg)


    请注意，这是在未显式创建文件时生效的那种 `beans.xml` 文件。


    然而，在默认 Bean 发现模式设置为 `annotated` 的情况下使用 CDI API 并不那么有趣。为了充分利用 Jakarta EE 依赖注入的强大功能，你需要将
    Bean 发现模式设置为 `All`。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figd_HTML.jpg](img/493447_1_En_8_Figd_HTML.jpg)


    如第 5 行所示，将 Bean 发现模式设置为 `all` 意味着在应用程序启动时，CDI 容器在扫描期间会发现所有类。因此，无论 Bean 是否带有 CDI
    注解，只要它位于同一个归档文件（即给定 Jakarta EE 应用程序的捆绑包）中，就会被发现。这是你在许多 Jakarta EE 代码中会看到的情况。这也是我偏好并推荐使用的模式。


    ## CDI 容器


    *容器*这个词通常与依赖注入相关联。那么，什么是 CDI 容器？它是你 CDI 代码的核心。它在应用程序启动时验证你的 CDI 代码，并确保所有 CDI 代码都是有效的。很少会遇到
    CDI 运行时错误。


    CDI 容器负责创建 Bean 的上下文实例，为这些创建的实例添加相关的 CDI 特性，将它们分配到相关的上下文中，并最终在它们所绑定的上下文被销毁时销毁这些实例。


    你可以将 CDI 容器视为一个黑盒，它只在响应你的请求时出现，并在不需要时隐入幕后。然而，作为开发者，你通常不需要过多考虑 CDI 容器。你只需要知道它在后台存在，并随时准备响应你的请求。


    ## CDI Bean 与上下文实例


    到目前为止，本书相当随意地使用了*Bean*和*上下文实例*这两个术语，而没有定义它们的含义。那么，Bean 到底是什么意思呢？


    CDI 规范将 Bean 定义为上下文对象的来源，这些对象定义了应用程序的状态和/或逻辑。这些对象被称为 Bean 的上下文实例。^(¹⁰) 这全部意味着，Bean
    就是你作为开发者编写的 Java 类。


    你用 Java 代码实现 Bean 的逻辑，然后使用相关的 CDI 注解为其提供你希望 Bean 的上下文实例所拥有的属性。它是可以在依赖注入过程中创建和注入实例的模板。CDI
    容器通过在应用程序启动时扫描你的应用程序归档文件来发现你的 Bean。


    因此，Bean 只是与你的 Java 代码相关联的一组元数据，容器从中创建对象以满足给定的依赖注入请求。由 CDI 从你的 Bean 创建的对象就是所谓的上下文实例。


    你可以赋予 Bean 的属性集包括：限定符、作用域、备选方案和名称。本书的其余部分将讨论这些属性。


    ## 创建和使用 Bean


    如前所述，CDI Bean 只是一个普通的 Java 类，以注解的形式应用了 CDI 元数据。请看下面最基本的 CDI Bean。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Fige_HTML.jpg](img/493447_1_En_8_Fige_HTML.jpg)


    这段代码展示了一个非常简单的普通 Java 对象，没有显式的 CDI 注解，名为 `TableService`。这个类是一个有效的 CDI Bean，因为
    CDI 发现模式设置为 `all`。这意味着你可以向 CDI 容器请求此 Bean 的上下文实例，并且它会响应你的请求。默认情况下，此 Bean 的作用域是
    `@Dependent`，这意味着它的作用域与它所注入到的任何 Bean 的作用域相同。


    然而，在餐厅应用程序中，你需要只有一个 `TableService` 实例负责检查餐桌的可用性并为客人分配餐桌。在这种情况下，你需要修改 Bean（或模板），以便从中创建仅此一个实例的上下文实例。


    ### @ApplicationScoped


    为了进行此修改，你需要使用 `@ApplicationScoped`^(¹¹) 注解在 Bean 上定义一个元数据。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figf_HTML.jpg](img/493447_1_En_8_Figf_HTML.jpg)


    这段代码显示 `TableService` 类现在带有一个名为 `@ApplicationScoped` 的显式 Bean 定义注解。此注解告诉 CDI 容器将此
    Bean 的上下文实例放入一个特定的、定义明确的作用域（或上下文）中，称为 `application`。


    作用域（或上下文）是一种告诉 CDI 容器你希望它如何管理上下文实例生命周期的方式。你从 CDI 容器请求的实例将被放置在相关的上下文中，这些上下文由你随
    Bean 代码提供的显式元数据决定，或者由 CDI 容器默认决定。


    那么，应用程序作用域或上下文意味着什么？这意味着对于 `TableService`，你希望整个应用程序只有一个上下文实例。对 CDI 容器的每个 `TableService`
    请求都将使用同一个上下文实例来服务。你可以将 `@ApplicationScoped` 视为在所部署应用程序的整个生命周期内共享状态的上下文实例。如果你熟悉其他
    DI 框架（如 Spring），可以将 `ApplicationScoped` Bean 视为单例。


    CDI 作用域的好处在于它们定义明确。你可以预测实例何时存在以及何时被销毁。你可以利用这一点在你的应用程序中构建强大的依赖关系图。那么，除了 `@ApplicationScoped`
    之外，还有哪些其他可用的作用域呢？


    ## 其他 CDI 作用域

    '
- fmt: '### `@RequestScoped`[^(12)](#fn12)


    此作用域将上下文实例绑定到一个为每个请求创建和销毁的上下文中。在典型的 HTTP 环境中，每个 HTTP 请求都会导致创建一个新的上下文实例，并在请求结束时销毁它。在非
    HTTP 环境中，使用`@RequestScoped`注解的 bean 的上下文实例总是为每个给定的请求创建和销毁。


    在餐厅应用程序中，你可以有一个搜索订单的类，该类绑定到一个 JSF facelet 页面。这个类通常应该是`RequestScoped`，这样每个搜索请求都有不同的实例。你会希望每个搜索请求都有一个全新的开始。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figg_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figg_HTML.jpg)


    在这段代码中，你有一个名为`SearchBean`的类，它在第 1 行使用`@RequestScoped`注解，在第 2 行使用`@Named`注解。这明确告诉
    CDI 容器将该 bean 的每个实例绑定到一个名为`request`的作用域。对于该 bean 的上下文实例的每个请求，都会创建一个新实例并将其放入一个新的作用域中。因此，给定用户的多个请求将导致每个请求都有新实例。


    这种 bean 通常被称为*支持 bean*，或大致称为*控制器*。`@Named`注解是一个内置的限定符[^(13)](#fn13)，它使该 bean 可以通过表达式语言[^(14)](#fn14)在
    JSF 页面中使用。


    ### `@SessionScoped`[^(15)](#fn15)


    此作用域将注解 bean 的实例绑定到一个跨越给定用户会话的上下文。将会话上下文视为一个守卫，只要用户与应用程序交互，它就会跟随用户在应用程序中移动。会话作用域或多或少是给定用户的
    HTTP 会话。


    在餐厅应用程序中，你可以有一个跟踪已登录用户的 bean，该登录用户可以是餐厅经理或收银员。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figh_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figh_HTML.jpg)


    在这段代码中，你有一个名为`UserSession`的 bean，它在第 1 行使用`@SessionScoped`注解。这告诉 CDI 容器为每个用户的每个会话创建一个该类的实例。因此，每个用户在每次会话中都会拥有该类的一个上下文实例。同一会话中的用户对该类实例的多次请求将导致提供相同的上下文实例。


    在此 bean 声明中值得注意的是，它实现了`Serializable`接口，如第 2 行所示。这是一个好习惯，因为上下文实例可能会被容器钝化（即保存）以在未使用时节省系统资源。因此，使用`Serializable`接口标记它是一个好习惯。


    ### `@ConversationScoped`[^(16)](#fn16)


    会话作用域 bean 用于执行跨越一个请求但比会话短的任务。`@ConversationScoped`的一个典型用例是下订单。从用户开始挑选商品到最终结账时，订单项一直保存在购物车中。在此期间，用户可能会在应用程序的多个页面之间导航。


    你可以使用会话作用域 bean 来管理用户与应用程序之间的此类会话，而无需在用户完成购物后仍然保持 bean 存活。


    会话作用域 bean 默认处于瞬态，也就是说，它们随时可以被销毁。与你之前看到的其他作用域不同，你需要手动将 bean 启动到会话状态。如何做到这一点？回到餐厅应用程序，你可以有一个使用`@ConversationScoped`注解的
    bean，用于在系统中下订单。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figi_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figi_HTML.jpg)


    在这段代码中，你有一个名为`OrderService`的 bean，它在第 1 行使用`@ConversationScoped`注解。这个 bean 也带有`Serializable`标记接口，因为它可能会被容器钝化。


    第 4 行使用`@Inject`注解来请求一个名为`Conversation`的 bean 类型的上下文对象，在第 5 行。这是你第一次使用`@Inject`注解。它是从
    CDI 容器请求上下文实例的魔法棒。注解的 bean 类型`Conversation`是容器为你提供的 CDI bean，它不属于开发者代码。


    `Conversation` bean 有一些方法，你可以用它们来检查 bean 是否处于瞬态、开始和结束会话，以及获取当前会话的 ID。第 7 行定义了一个名为`beginOrderProcess()`的方法，它首先检查当前实例是否处于瞬态模式。如果是，则在注入的`Conversation`实例上调用`begin()`方法。


    第 13 行定义了一个名为`addItemsToOrder()`的方法，负责将商品添加到购物车。此方法可以根据具体问题以任何方式实现。


    第 17 行最后声明了一个名为`endConversation()`的方法，该方法判断 bean 是否处于瞬态，然后对注入的`Conversation`对象调用`end()`方法。调用`end()`方法会使`OrderService`实例变为瞬态，准备销毁其上下文。


    ### 依赖伪作用域[^(17)](#fn17)


    根据 CDI 规范，`@Dependent`是一个伪作用域。当 bean 没有声明显式作用域时，它是 bean 的默认作用域。伪作用域 bean 至少有两个重要特点使其区别于其他作用域：


    -   该 bean 的注入实例永远不会在多个注入点之间共享。

    -   注入到容器正在创建的对象中的 bean 的任何实例，都绑定到所创建对象的生命周期。


    这意味着对依赖作用域 bean 的每个请求都会产生一个新实例，并且该实例的生命周期绑定到其注入点的生命周期。通常，我建议作为应用程序开发人员，你应为你的 bean
    显式声明作用域。


    到目前为止，你已经看到了 CDI 容器开箱即用的各种上下文。你已经看到了`@ApplicationScoped`、`@RequestScoped`、`@SessionScoped`和`@ConversationScoped`。然而，到目前为止我还没有回答的一个问题是，在哪里以及如何请求上下文实例。你已经了解了如何创建自己的
    CDI bean，但如何使用它们呢？如何让 CDI 容器为你服务？


    ## CDI 注入点


    有三个主要的注入点，你可以使用`@Inject`注解从 CDI 容器请求上下文实例。


    ### 字段注入点


    你在之前查看`OrderService`类时看到了你的第一个注入点，这里重新展示一下。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figj_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figj_HTML.jpg)


    第 4 行在 bean 类型`Conversation`上使用了`@Inject`注解。这是一个字段注入点，你在此请求 CDI 容器创建一个`Conversation`
    bean 的上下文实例，并将其注入到提供的该类型的变量中。字段注入是迄今为止最流行，在我看来也是最直观的请求依赖的方式。


    ### 方法注入


    方法注入是指一个方法使用`@Inject`注解，并带有一个或多个参数。这些方法被称为初始化器方法，将由容器自动调用。方法注入点的所有参数必须是有效的 CDI
    bean。'
  raw: '### @RequestScoped^([^(12)](#fn12))


    This scope binds a contextual instance to a context that is created and destroyed
    for every request. In a typical HTTP environment, every HTTP request will result
    in the creation of a new contextual instance and its destruction at the end of
    the request. In a non-HTTP environment, a bean annotated with `@RequestScoped`
    will have its contextual instances always created and destroyed for every given
    request.


    In the restaurant application, you could have a class that searches for orders
    and is bound to a JSF facelet page. This class typically should be `RequestScoped`
    so that you have different instances for each request for a search. You would
    want a clean slate for every search request.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figg_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figg_HTML.jpg)


    In this code, you have a class named `SearchBean` that is annotated with `@RequestScoped`
    on Line 1 and `@Named` on Line 2. This explicitly tells the CDI container to bind
    every instance of this bean to a scope called `request`. For every request for
    a contextual instance of this bean, a new instance will be created and put in
    a new scope. So multiple requests by a given user will result in new instances
    for each request.


    This kind of bean is typically called a *backing bean,* or roughly a *controller*.
    The `@Named` annotation is a built-in qualifier^([^(13)](#fn13)) that makes this
    bean available to JSF pages through the expression language^([^(14)](#fn14)).


    ### @SessionScoped^([^(15)](#fn15))


    This scope binds instances of an annotated bean to a context that spans a given
    user session. Think of a session context as a guard that follows a user around
    an application as long as they are interacting with the application. The session
    scope is more or less the HTTP session for a given user.


    In the restaurant application, you could have a bean that tracks a logged-in user,
    where that logged-in user could be the restaurant manager or cashier.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figh_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figh_HTML.jpg)


    In this code, you have a bean named `UserSession` that is annotated with `@SessionScoped`
    on Line 1\. This tells the CDI container to create an instance of this class per
    user per session. So every user will have one contextual instance of this class
    for each session. Multiple requests for an instance of this class by a user in
    the same session will result in the same contextual instance being supplied.


    Of note in this bean declaration is that it implements the `Serializable` interface,
    as shown on Line 2\. This is good practice because the contextual instance might
    get passivated—or saved—by the container to save system resources when not in
    use. So it''s good practice to mark it with the `Serializable` interface.


    ### @ConversationScoped^([^(16)](#fn16))


    Conversation scoped beans are used to perform tasks that transcend one request
    but are shorter than a session. A typical example of `@ConversationScoped` use
    case is placing an order. Order items are held in a cart from the time a user
    starts picking items and are finally emptied when the user checks out. In between,
    the user might navigate across multiple pages of the application.


    You can use conversation scoped beans to manage such a conversation between the
    user and your application without having to necessarily keep the bean alive once
    the user is done with the shopping.


    Conversation scoped beans are by default in a transient state, that is, they''re
    eligible to be destroyed at any time. Unlike the other scopes you''ve seen so
    far, you will have to initiate a bean into a conversation state manually. How
    do you do that? Back to the restaurant application, you could have a bean-annotated
    `@ConversationScoped` that is used to place an order in the system.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figi_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figi_HTML.jpg)


    In this code, you have a bean called `OrderService` that is annotated `@ConversationScoped`
    on Line 1\. This bean also bears the `Serializable` marker interface because it
    might get passivated by the container.


    Line 4 uses the `@Inject` annotation to request a contextual object of a bean
    type called `Conversation`, on Line 5\. This is the first time you are using the
    `@Inject` annotation. It''s the magic wand for requesting contextual instances
    from the CDI container. The annotated bean type `Conversation` is a CDI bean that
    the container provides for you. It''s not part of the developer code.


    The `Conversation` bean has methods that you use to check if a bean is transient
    or not, begin and end conversations, and get the ID of the current conversation.
    Line 7 defines a method called `beginOrderProcess()` that first checks if the
    current instance is in transient mode. If it is, the `begin()` method is invoked
    on the injected `Conversation` instance.


    Line 13 then defines a method called `addItemsToOrder()` that is responsible for
    adding items to the cart. This method can be implemented in any way depending
    on the issue at hand.


    Line 17 finally declares a method called `endConversation()` that determines whether
    or not a bean is transient and proceeds to invoke the `end()` method on the injected
    `Conversation` object. Invoking the `end()` method makes the `OrderService` instance
    transient, ready to have its context destroyed.


    ### Dependent Pseudo-Scope^([^(17)](#fn17))


    `@Dependent` is a pseudo-scope according to the CDI spec. It is the default scope
    a bean is scoped to when no explicit scopes are declared for it. Pseudo-scoped
    beans have at least two important points that distinguish them from other scopes:


    *   No injected instance of the bean is ever shared between multiple injection
    points.


    *   Any instance of the bean injected into an object that is being created by
    the container is bound to the lifecycle of the created object.


    This implies that every request for a dependent scoped bean results in a new instance
    and the life of that instance is bound to the life of its injection point. Generally,
    I recommend that you explicitly declare scopes for your beans as an application
    developer.


    So far you have seen the various contexts that are provided to you out-of-the-box
    by the CDI container. You have seen `@ApplicationScoped`, `@RequestScoped`, `@SessionScoped`,
    and `@ConversationScoped`. However, one question I have not answered at this point
    is where and how to make a request for contextual instances. You have seen how
    to create your own CDI beans, but how do you use them? How do you put the CDI
    container to your service?


    ## CDI Injection Points


    There are three main injection points where you can use the `@Inject` annotation
    to request contextual instances from the CDI container.


    ### Field Injection Point


    You saw your first injection point when you looked at the `OrderService` class
    earlier, reproduced here.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figj_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figj_HTML.jpg)


    Line 4 uses the `@Inject` annotation on bean type `Conversation`. This is a field
    injection point where you are requesting that the CDI container create a contextual
    instance of the `Conversation` bean and inject it into the provided variable of
    that type. Field injection is by far the most popular, and in my view, most intuitive
    way of requesting dependencies.


    ### Method Injection


    Method injection is when a method is annotated with the `@Inject` annotation with
    one or more parameters. These methods are called initializer methods and will
    be invoked automatically by the container. All parameters of a method injection
    point must be valid CDI beans.'
