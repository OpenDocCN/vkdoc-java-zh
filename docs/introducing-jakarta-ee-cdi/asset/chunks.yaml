  trans: "\n### 构造器注入\n\n构造器注入是指使用 `@Inject` 注解标记一个包含一个或多个参数的 Bean 构造器。所有参数都将由容器解析。每个\
    \ CDI Bean 只允许有一个构造器注入点。\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figk_HTML.jpg](img/493447_1_En_8_Figk_HTML.jpg)\n\
    \n在下面修改后的 `SearchService` Bean 中，第 6 行声明了一个 `QueryService` 类型的字段，而 `QueryService`\
    \ 本身也是一个 Bean。第 8 行在构造器声明（第 9 行）上使用了 `@Inject`，将一个 `QueryService` 实例注入到参数中。然后，你使用这个注入的参数来初始化第\
    \ 6 行声明的 `QueryService` 字段。此外，在生产者方法和观察者方法中也有其他注入点，你将在本章稍后部分了解它们。\n\n哪种注入点最好？\n\
    \n鉴于 CDI 支持的注入点，你可能会想知道哪种最好。它们在不同上下文中都很好。但根据经验法则，我始终倾向于使用字段注入。我发现它更易于阅读，并且从一开始就表明了意图。但请根据你的项目选择最适合的方式。\n\
    \n你现在已经了解了 CDI Bean、可以为其上下文实例分配的各种作用域，以及可以请求这些上下文实例的注入点。然而，CDI 有两种主要类型的 Bean。到目前为止你所看到的是所谓的*托管\
    \ Bean*。另一种类型的 Bean 是*会话 Bean*，不要与会话上下文混淆。\n\n## CDI Bean 的类型\n\n### 托管 Bean\n\
    \n托管 Bean 就是你在本书中到目前为止所看到的。它们是 Java 类，要么具有显式的 CDI 注解（适用于 `beans.xml` 文件中 `bean-discovery-mode`\
    \ 设置为 `annotated` 的 Bean），要么具有隐式注解（适用于 `bean-discovery-mode` 设置为 `all` 的 Bean）。此外，一个\
    \ Bean 是托管 Bean 的条件是：\n\n*   它不是非静态内部类。\n*   它是一个具体类，或者使用 `@Decorator` 注解。\n*\
    \   它有一个合适的构造器，满足以下条件之一：\n    *   该类有一个无参构造器\n    *   该类声明了一个使用 `@Inject` 注解的构造器\n\
    \n对于像下面这样的托管 Bean：\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figl_HTML.jpg](img/493447_1_En_8_Figl_HTML.jpg)\n\
    \n其 Bean 类型集合包括：\n\n*   所有超类，直至 `java.lang.Object`\n*   所有直接或间接实现的接口\n*   Bean\
    \ 类本身\n\n### 会话 Bean\n\n会话 Bean 是使用企业 JavaBeans^(¹⁸) 规范中的元数据进行注解的 Java 类。从技术上讲，本地的无状态、有状态和单例\
    \ EJB 会自动成为 CDI Bean，支持各种 CDI 服务，如注入、拦截和作用域管理。在 CDI 应用程序中使用 EJB 可以让你同时获得两个规范的特性。\n\
    \n创建会话 Bean 非常简单，如下代码所示。\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figm_HTML.jpg](img/493447_1_En_8_Figm_HTML.jpg)\n\
    \n在这段代码中，`QueryService` 类使用了 `@Stateless` 注解。这使得该 Bean 既是 CDI 托管 Bean，又是无状态 EJB。你可以在任何可以注入托管\
    \ Bean 的地方注入此 Bean 的实例。EJB 规范旨在使业务组件的开发变得简单且几乎不费力气。\n\n`QueryService` 上的 `@Stateless`\
    \ 注解将其转换为一个默认具有事务方法的类。这个类会被池化、安全化，并具有其他你原本需要担心的有用特性。请务必查阅 EJB 规范，以了解该 API 的强大功能。\n\
    \n会话 Bean 的 Bean 类型包括：\n\n*   所有超类，直至 `java.lang.Object`\n*   所有直接或间接实现的接口（对于具有本地接口的\
    \ Bean）\n*   Bean 类本身\n\n## CDI 限定符\n\n到目前为止，你已经学习了关于 CDI Bean 几乎所有需要了解的内容。然而，你可能会想知道，如果有两个或更多\
    \ Bean 实现了同一个接口，并且你想通过该接口进行注入，会发生什么。以餐厅应用程序为例，假设你有一个 `GenericOrder` 类型的接口，它有一个方法\
    \ `order()`，如下所示。\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Fign_HTML.jpg](img/493447_1_En_8_Fign_HTML.jpg)\n\
    \n该接口有一个方法，返回给定订单的总金额。假设餐厅有一个网站，用户可以在上面登录并向厨房下自助订单以便配送。顾客也可以到店下单，由餐厅服务员或收银员将订单录入系统。\n\
    \n你想要修改 `@ConversationScoped OrderService` Bean，使其实现 `GenericOrder` 接口，而不是拥有自己的订单方法。如下代码所示。\n\
    \n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figo_HTML.jpg](img/493447_1_En_8_Figo_HTML.jpg)\n\
    \n第 15 行实现了 `GenericOrder` 接口的 `order()` 方法。这个 `OrderService` 将用于处理实际到店就餐的顾客所下的订单。然后，你需要另一个名为\
    \ `SelfService` 的服务，它也将实现 `GenericOrder` 来处理在线客户。\n\n以下代码展示了 `SelfService` 的实现。\n\
    \n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figp_HTML.jpg](img/493447_1_En_8_Figp_HTML.jpg)\n\
    \n目前，`SelfService` 的实现与 `OrderService` 的实现完全相同。你现在将这两个实现分开，是因为将来在线下单的客户将在定价、奖励计划、抽奖以及你之后会引入的其他激励措施方面受到完全不同的对待。因此，现在就将这两个实现分开是一个好习惯，而不是等到应用程序变得非常复杂后再进行重构或引入新的实现。\n\
    \n所以现在你有两个类实现了同一个接口。尝试通过 `GenericOrder` 接口进行 `@Inject` 将会失败，如下所示。\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figq_HTML.jpg](img/493447_1_En_8_Figq_HTML.jpg)\n\
    \n在这段代码中，你有一个名为 `OrderFacade` 的 CDI Bean，它是请求作用域的。这个 Bean 在第 5 行有一个 `GenericOrder`\
    \ 类型的字段注入。这段代码可以正常编译，但部署时会失败。请记住，CDI 容器会验证归档文件，以确保你符合 CDI 规范的要求。\n\n这段代码将无法通过\
    \ CDI 容器验证，并会收到一条消息，指出注入点 `GenericOrder` 存在歧义。这是因为你有多个类实现了 `GenericOrder` 接口，并且你正在通过该接口请求一个上下文实例。容器将不知道你想要哪个具体的\
    \ Bean 类型。\n\n你会在自己的代码中遇到这类问题。为了防止这类歧义依赖问题，CDI 规范为你提供了*限定符*的概念。它们是你可以创建的注解，将其放置在你想要用此类注解标识的\
    \ Bean 上，然后通过注入点进行注解，如果你希望注入点解析到被注解的 Bean 类型的话。这听起来比实际复杂。让我们为订单服务创建两个限定符——`OnlineQualifier`\
    \ 和 `InStoreQualifier`。\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figr_HTML.jpg](img/493447_1_En_8_Figr_HTML.jpg)\n\
    \n在这段代码中，第 4 行有一个名为 `OnlineQualifier` 的注解声明。这个注解使用了 `@Qualifier` 进行注解，这告诉 CDI\
    \ 容器，你希望将你的 `OnlineQualifier` 注解视为一个 CDI 限定符。\n"
- fmt: '代码的第2行和第3行设置了`OnlineQualifier`注解的保留策略和目标。这基本上就是你声明注解所需的全部内容。你可以使用相同的结构来声明`InStoreQualifier`，如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figs_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figs_HTML.jpg)


    声明了这些注解之后，你需要将它们与你想要使用的相应Bean关联起来。你使用`OnlineQualifier`来限定`SelfService` Bean，使用`InStoreQualifier`来限定`OrderService`
    Bean。相应的代码示例如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figt_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figt_HTML.jpg)


    `OnlineQualifier`与上一段代码第2行的`SelfService` Bean相关联。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figu_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figu_HTML.jpg)


    现在，`InStoreQualifier`与第2行的`OrderService` Bean相关联。因此，你现在有两个类型为`GenericOrder`的Bean，但它们具有不同的限定符。有了这个基础，你现在可以回到`OrderFacade`
    Bean，并对`GenericOrder`注入点进行限定。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figv_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figv_HTML.jpg)


    第4行使用`@InStoreQualifier`来告诉容器将`GenericOrder`类型解析为`OrderService`具体类型。这样，即使你通过一个由多个类实现的公共接口请求实例，类型解析也不会有歧义。


    在同一个类中，你可以注入另一个`GenericOrder`字段，并使用`OnlineQualifier`对其进行限定，如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figw_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figw_HTML.jpg)


    如你所见，`OrderFace` Bean中现在有两个字段注入点，它们都使用`GenericOrder`接口，但都使用各自的具体类型限定符进行了限定。


    这就是如何使用限定符来防止代码中的歧义，同时提高代码的可读性和可扩展性。不过，限定符还可以用于更强大的任务，正如你将在本章的“事件”部分看到的那样。


    ### 内置限定符


    除了能够创建自己的CDI限定符之外，CDI API还提供了一些开箱即用的内置限定符。如下所示：


    - `@Any`^([^(19)](#fn19))：这是一个默认添加到所有Bean上的限定符，即使该Bean没有声明任何限定符。

    - `@Named`^([^(20)](#fn20))：这是一个基于字符串的限定符，用于使被注解的Bean实例在弱类型环境（如JSF页面或JavaScript）中可被引用。它也是最常用的注解。

    - `@Default`^([^(21)](#fn21))：当一个Bean除了`@Named`之外没有显式声明限定符时，会自动使用此限定符。

    - `@Initialized`^([^(22)](#fn22))：此限定符用于限定当上下文初始化并准备就绪时自动触发的事件。你将在本章后面了解事件。

    - `@Destroyed`^([^(23)](#fn23))：此限定符用于限定当上下文被销毁时自动触发的事件。


    到目前为止，你已经学习了相当多的CDI知识，足以让你写出更好的代码。然而，还有更多内容需要学习，让我们来看看CDI生产者的概念，它们是什么，以及如何使用它们。


    ## CDI生产者


    CDI中的生产者是一种API构造，你可以使用它将你不拥有的Bean或类转变为CDI管理的Bean，并附带限定符和作用域。回到餐厅应用程序，假设你想随时获取当前执行用户的用户名。有两种方法可以实现这一点。


    第一种方法是简单地`@Inject` `UserSession` Bean，并在实例上调用`getUserName()`方法。第二种更具扩展性的方法是创建一个返回用户名的`String`类型生产者方法。这样，你可以`@Inject`到一个`String`类型的字段中，容器将知道从哪里获取你想要的内容。你可以通过限定你的生产者方法来锦上添花。


    ### 方法生产者


    这比文字描述的要简单，让我们来看第一个返回当前执行用户名的生产者方法。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figx_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figx_HTML.jpg)


    在这段代码中，你有一个名为`MyProducer`的Bean（恕我缺乏想象力），它在第4行有一个`UserSession`类型的注入字段。第7行声明了一个名为`produceUserName()`的方法，该方法返回`String`类型。这个方法在第6行使用了`@Produces`^([^(24)](#fn24))注解。这个注解将此方法转换为一个CDI生产者，容器将查询它以获取满足`String`注入类型的实例。


    然后，你可以使用生产者方法将`String`类型注入到你的其他组件中，如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figy_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figy_HTML.jpg)


    第4行使用`@Inject`来请求一个`String`类型的实例，并将其注入到`OrderFacade` Bean的`userName`字段（第5行）。假设你的应用程序中没有使用任何第三方代码，这应该可以正常工作。


    但是，如果你使用了第三方库，例如OmniFaces^([^(25)](#fn25))，它们可能包含返回`String`的生产者方法。在餐厅应用程序中，OmniFaces库是应用程序依赖项的一部分。因此，`String`注入点会导致代码在应用程序启动时无法通过容器验证，尽管编译时没有问题。


    在这种情况下，你可以使用限定符来限定生产者方法和注入点。请看这里的限定符声明：


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figz_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figz_HTML.jpg)


    在上面的代码中，你声明了一个名为`UserNameQualifier`的限定符，并将其与生产者方法关联，如下所示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaa_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figaa_HTML.jpg)


    第7行使用`@UserNameQualifier`注解了`produceUserName()`方法，以确保你可以将此生产者方法与任何其他方法（无论是你自己的代码还是任何第三方库中的）区分开来。最后，你使用相同的限定符来限定注入点。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figab_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figab_HTML.jpg)


    第5行使用`@UserNameQualifier`注解了`userName`字段，以告诉容器查询被注解的生产者字段以获取实例来满足此注入点。简而言之，这就是如何使用生产者方法。


    到目前为止，你看到的是生产者方法。你可以将生产者方法的返回类型限定到特定的作用域，而不是保留默认的`@Dependent`作用域。但是，有一个注意事项。根据CDI
    API，“如果生产者方法有时返回`null`值，或者生产者字段在访问时有时包含`null`值，那么该生产者方法或字段必须具有`@Dependent`作用域。”


    你可能会遇到代码请求`userName`时没有用户登录的情况。在这种情况下，你的生产者方法可能会返回`null`，因此你将其保留为默认的`@Dependent`作用域。但是，请记住，你可以使用特定的作用域来注解你的生产者方法，并且该方法返回的类型将被放入该上下文中。'
  raw: 'Lines 2 and 3 of the code set the retention and targets of the `OnlineQualifier`
    annotation. This is pretty much all you need to declare your annotation. You can
    use the same constructs for the `InStoreQualifier` as shown next.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figs_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figs_HTML.jpg)


    So, with these annotations declared, you now need to associate them with the respective
    beans you want to use them for. You use the `OnlineQualifier` to qualify the `SelfService`
    bean and the `InStoreQualifier` for the `OrderService` beans. The respective code
    samples are reproduced next.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figt_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figt_HTML.jpg)


    The `OnlineQualifier` is associated with the `SelfService` bean on Line 2 of the
    previous code.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figu_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figu_HTML.jpg)


    The `InStoreQualifier` is now associated with the `OrderService` bean on Line
    2\. So now you have two beans of the type `GenericOrder`, but with separate qualifiers.
    With this in place, you can now go back to the `OrderFacade` bean and qualify
    the `GenericOrder` injection point.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figv_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figv_HTML.jpg)


    Line 4 uses the `@InStoreQualifier` to tell the container to resolve the `GenericOrder`
    type to the `OrderService` concrete type. This way, even though you request instances
    through a common interface implemented by more than one class, there is no ambiguity
    with regards to type resolution.


    You can, in the same class, inject another `GenericOrder` field and qualify it
    with the `OnlineQualifier`, as shown next.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figw_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figw_HTML.jpg)


    As you can see, there are two field injection points in the `OrderFace` bean now,
    both using the `GenericOrder` interface yet both qualified with their respective
    concrete type qualifiers.


    This is how you can use qualifiers to prevent ambiguity in your code, while simultaneously
    improving the readability and extensibility of it. Qualifiers can be used for
    much more powerful tasks, though, as you will see in the “Events” section of this
    chapter.


    ### Built-in Qualifiers


    Aside from the ability to create your own CDI qualifiers, the CDI API also comes
    with some built-in qualifiers out-of-the-box. These are as follows:


    *   `@Any`^([^(19)](#fn19)): This is a qualifier added to all beans by default,
    even if the bean does not declare any qualifiers.


    *   `@Named`^([^(20)](#fn20)): This is a string based qualifier used to make instances
    of the annotated bean available for reference in a weakly typed environment, like
    a JSF page or JavaScript. It is also the most used annotation.


    *   `@Default`^([^(21)](#fn21)): This qualifier is used automatically when a bean
    does not explicitly declare a qualify aside from `@Named`.


    *   `@Initialized`^([^(22)](#fn22)): This qualifier is used to qualify an automatically
    fired event when a context is initialized and ready to use. You will learn about
    events later in this chapter.


    *   `@Destroyed`^([^(23)](#fn23)): This qualifier is used to qualify an automatically
    fired event when a context is destroyed.


    Up to this point, you have learned quite a lot of CDI stuff, enough to make you
    capable of writing better. However, there''s even more to learn, so let''s take
    a look at the concept of CDI producers, what they are, and how you can use them.


    ## CDI Producers


    Producers in CDI are an API construct that you can use to turn beans or classes
    you don''t own into CDI managed beans, complete with qualifiers and scopes. Back
    to the restaurant app, say you want to have the username of the currently executing
    user at any time. There are two ways you can achieve that.


    The first is to simply `@Inject` the `UserSession` bean and invoke the `getUserName()`
    method on the instance. The second, more extensible, way is to create a producer
    method of type `String` that returns the username. This way, you can `@Inject`
    into a field of type `String` and the container will know where to get what you
    want. You can sweeten things by qualifying your producer methods.


    ### Method Producers


    It is more simple than words make it, so let''s look at the first producer method
    that returns the currently executing username.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figx_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figx_HTML.jpg)


    In this code, you have a bean named `MyProducer` (for lack of imagination on my
    part that has an injected field of type `UserSession` on Line 4\. Line 7 declares
    a method called `produceUserName()` that returns a `String` type. This method
    is annotated with `@Produces`^([^(24)](#fn24)) on Line 6\. This annotation transforms
    this method into a CDI producer that will be consulted for instances to satisfy
    `String` injection types.


    You can then use the producer method to inject `String` types into your other
    components, as shown here.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figy_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figy_HTML.jpg)


    Line 4 uses `@Inject` to request an instance of type `String` into the `userName`
    field (Line 5) of the `OrderFacade` bean. This should work fine, assuming you
    do not use any third-party code in your application.


    If you do, however, libraries such as OmniFaces^([^(25)](#fn25)) have producer
    methods that return `String` . In the restaurant app, you have the OmniFaces library
    as part of the application dependencies. So, the `String` injection point will
    cause the code to fail container validation at application startup, even though
    it will compile just fine.


    In this case, you can use a qualifier to qualify the producer method and injection
    point. Take a look at the qualifier declaration here:


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figz_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figz_HTML.jpg)


    In the previous code, you declare a qualifier called `UserNameQualifier`, which
    you associate with the producer method, as shown next.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figaa_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figaa_HTML.jpg)


    Line 7 annotates the `produceUserName()` method with the `@UserNameQualifier`
    to ensure that you can distinguish this producer method from any other, whether
    in your own code or any third-party library. Finally, you qualify the injection
    point with the same qualifier.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figab_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figab_HTML.jpg)


    Line 5 annotates the `userName` field with `@UserNameQualifier` to tell the container
    to consult the annotated producer field for instance to satisfy this injection
    point. This is how you can use producers methods in a nutshell.


    What you have seen so far are producer methods. You could scope the producer method
    return type to a specific scope instead of leaving it to the default `@Dependent`
    scope . But, there is a caveat. According to the CDI API, “if a producer method
    sometimes returns a null value, or if a producer field sometimes contains a null
    value when accessed, then the producer method or field must have scope `@Dependent`.”


    You could have a situation where your code requests a `userName` when no user
    is logged in. In such a case, your producer method might return null, and thus
    you leave it to the default `@Dependent` scope. However, just know that you can
    annotate your producer methods with a specific scope and returned types from the
    method will be put in that context.'
