    ### 字段注入点


    你在之前查看 `OrderService` 类时看到了你的第一个注入点，此处重新展示。


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figj_HTML.jpg](img/493447_1_En_8_Figj_HTML.jpg)


    第 4 行在 bean 类型 `Conversation` 上使用了 `@Inject` 注解。这是一个字段注入点，你在此处请求 CDI 容器创建一个 `Conversation`
    bean 的上下文实例，并将其注入到提供的该类型的变量中。字段注入是迄今为止最流行，在我看来也是最直观的请求依赖关系的方式。


    ### 方法注入


    方法注入是指一个方法使用 `@Inject` 注解，并带有一个或多个参数。这些方法被称为初始化方法，将由容器自动调用。方法注入点的所有参数必须是有效的 CDI
    bean。

