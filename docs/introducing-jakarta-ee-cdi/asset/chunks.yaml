  raw: '![../images/493447_1_En_10_Chapter/493447_1_En_10_Figf_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figf_HTML.jpg)


    Lines 1 and 2 use `@Inject` and `@ConfigProperties` on the `myDynamicValue` field.
    The type of `myDyanmicValue`, however, is a `Provider` from the CDI API, defined
    as shown next.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figg_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figg_HTML.jpg)


    `Provider` is a parameterized interface from the CDI API that has one method,
    `get()`. It returns the parameterized type. As used in the earlier code, setting
    the type of `myDynamicValue` to `Provider` means any time you call the `get()`
    method on it, a new instance of type `String` is returned with a possibly updated
    value from the config source. The following code snippet shows the `get()` method
    invocation on `myDynamicValue` to be logged.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figh_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figh_HTML.jpg)


    The entire MicroProfile project is built on the Jakarta EE platform and as such,
    it leverages the power of the platform to help you craft cloud-native enterprise
    Java applications.


    ## Apache Delta Spike


    Delta Spike is an Apache top-level project that has modules in the form of CDI
    extensions that provide additional functionality for your Jakarta EE application.
    Some of the modules include the JSF, Scheduler, Security, and Data. This section
    examines the Data module.


    The Data module provides capabilities for implementing repository patterns and
    thereby simplifying the repository layer. Repository patterns are ideal for simple
    queries that require boilerplate code, enabling centralization of query logic
    and consequently reducing code duplication and improving testability.^([^(35)](#fn35))


    For the restaurant application, you can convert the `ApplicationUser` bean to
    a JPA entity, as shown here.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figi_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figi_HTML.jpg)


    The `ApplicationUser` entity has a number of fields that, in a typical database-driven
    application, you would want to query on. For instance, you might want to find
    a user by `userName`, run another query to search by email, and so on. The Delta
    Spike module helps you reduce such tedious boilerplate code by using CDI-based
    repositories. You can declare an `ApplicationUserRepo` that will handle the basic
    CRUD on the fields of the entity class for you.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figj_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figj_HTML.jpg)


    Line 1 declares the `@Repository` annotation from the Delta Spike data module
    on the `ApplicationUserRepo` interface, which extends the parameterized `EntityRepository`,
    which is also from the same Delta Spike data module. The `EntityRepository` interface
    is defined as follows:


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figk_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figk_HTML.jpg)


    This interface has some basic CRUD-based methods that almost every database application
    implements. For instance, Line 12 declares a `findBy()` method that takes the
    primary key of an entity and queries the database for it. All of these methods
    are implemented by the data module CDI extension. Next, you’ll declare some methods
    in the interface for CRUD purposes.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figl_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figl_HTML.jpg)


    Line 5 declares a `findByEmail` method. This method will search for a user by
    their email. Lines 7, 9, and 11 declare the `findByUserName`, `findOptionalByHashedPassword`,
    and `findByUserNameLike` methods, respectively. To use the repository, you just
    inject it into your `QuerySerivce` class , as shown here.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figm_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figm_HTML.jpg)


    Line 5 declares a CDI-injected field of type `ApplicationUserRepo` into the `QueryService`
    class. With this, you can implement most of the tedious CRUD boilerplate code
    without having to write a fraction of it, as shown next.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Fign_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Fign_HTML.jpg)


    `QueryService` has a number of method declarations that use the `ApplicationUserRepo`
    injected on Line 5\. As you can see, some of the methods are being used directly
    from the `EntityRepository`, such as the `findOptionalBy()` method, which takes
    the ID of an entity and returns an `Optional` object typed to the entity. The
    `findAll` method also invokes the `findAll` method, which is found directly on
    the `EntityRepository` interface.


    All of these methods are implemented on your behalf using a combination of CDI
    API constructs. For instance, the Delta Spike module requires a producer field
    of type `EntityManager` in order to be able to intercept and implement repository
    methods. The `EntityManager` producer method suffices for the requirement.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figo_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figo_HTML.jpg)


    The repository can also be used for persisting into the database. Remember it
    comes with a `save()` method that takes an entity and persists or merges it into
    the persistent context, depending on the state of the entity. You can use `ApplicationUserRepo`
    in your persistence service to persist `ApplicationUser` entities.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figp_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figp_HTML.jpg)


    `PersistenceService` is a stateless EJB that declares a dependency on `ApplicationUserRepo`
    on Line 9\. Then in the `persistUser` method, on Line 14, the injected repository
    is used to persist an `ApplicationUser` entity. The `save()` method on the repository
    is also automatically intercepted and implemented by the Delta Spike module on
    your behalf.


