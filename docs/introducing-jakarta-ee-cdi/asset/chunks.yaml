- fmt: "### Constructor Injection\n\nConstructor injection is when you annotate a\
    \ bean constructor with the `@Inject` annotation with one or more parameters.\
    \ All parameters will be resolved by the container. Only one constructor injection\
    \ is allowed per CDI bean.\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figk_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figk_HTML.jpg)\n\
    \nIn the modified `SearchService` bean shown here, Line 6 declares a field of\
    \ type `QueryService`, which is itself a bean. Line 8 uses `@Inject` on the constructor\
    \ declaration (Line 9) to inject an instance of `QueryService` into the parameter.\
    \ You then use this injected parameter to initialize the `QueryService` field\
    \ declared in Line 6. There are other injection points as well, found in producer\
    \ methods and observer methods, and you will look at them a little later in this\
    \ chapter.\n\n**Which is the best injection point?**\n\nGiven the injection points\
    \ supported by CDI, you might be wondering which is best. They are all good in\
    \ different contexts. But as a rule of thumb, I always go with field injection.\
    \ I find that it is easier to read and shows my intention right from the beginning\
    \ of the code. But please feel free to choose what works best for your given project.\n\
    \nYou now have seen CDI beans, the various scopes you can assign their contextual\
    \ instances to, and the points that you can request for those contextual instances.\
    \ CDI, however, has two broad kinds of beans. What you have looked at so far are\
    \ called *managed beans*. The other kind of bean are *session beans*, not to be\
    \ confused with session contexts.\n\n## Kinds of CDI Beans\n\n### Managed Beans\n\
    \nManaged beans are what you have seen so far in this book. They are Java classes\
    \ that have either explicit CDI annotations for beans that have the `bean-discovery-mode`\
    \ of the `beans.xml` file set to `annotated`, or implicit annotations for beans\
    \ that have the `bean-discovery-mode` set to `all`. In addition, a bean is a managed\
    \ bean if:\n\n- It is not a non-static inner class.\n- It is a concrete class\
    \ or is annotated with `@Decorator`.\n- It has an appropriate constructor, as\
    \ one of the following:\n  - The class has a constructor with no parameters\n\
    \  - The class declares a constructor annotated with `@Inject`\n\nFor a given\
    \ managed bean like the following:\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figl_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figl_HTML.jpg)\n\
    \nIts set of bean types includes:\n\n- All super classes up to `java.lang.Object`\n\
    - All implemented interfaces, directly or indirectly\n- The bean class itself\n\
    \n### Session Beans\n\nSession beans are Java classes annotated with metadata\
    \ from the Enterprise JavaBeans^([^(18)](#fn18)) spec. Technically, local Stateless,\
    \ Stateful, and Singleton EJBs are automatically CDI beans that support the various\
    \ CDI services like injection, interception, and scoping. Using EJBs in a CDI\
    \ application makes the features of both specs available to you.\n\nCreating session\
    \ bean is quite simple, as seen in the following code.\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figm_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figm_HTML.jpg)\n\
    \nIn this code, the `QueryService` class is annotated with `@Stateless`. This\
    \ makes the bean both a CDI managed bean and a Stateless EJB. You can inject instances\
    \ on this bean anywhere you can inject a managed bean. The EJB spec aims at making\
    \ the development of a business component easy and almost effortless.\n\nThe `@Stateless`\
    \ annotation on the `QueryService` transforms it into a class that has transactional\
    \ methods by default. This class is pooled, secured, and has other helpful features\
    \ that you would have had to worry about. Do take a look at the EJB spec for more\
    \ information about the power of that API.\n\nThe bean type of a session bean\
    \ includes:\n\n- All super classes up to `java.lang.Object`\n- All implemented\
    \ interfaces, directly or indirectly (for beans with local interfaces)\n- The\
    \ bean class itself\n\n## CDI Qualifiers\n\nYou have so far learned almost all\
    \ there is to know about CDI beans. However, you might be wondering what happens\
    \ if two or more beans implement the same interface and you want to inject using\
    \ the given interface. Using the restaurant application, say you have an interface\
    \ of type `GenericOrder` that has one method, `order()`, as shown here.\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Fign_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Fign_HTML.jpg)\n\
    \nThis interface has a method that returns the total of a given order. Say the\
    \ restaurant has a website where a user can log on and place a self-service order\
    \ to the kitchen for delivery. Patrons can also walk in and place orders that\
    \ will be entered into the system by the restaurant attendants or cashiers.\n\n\
    You want to modify the `@ConversationScoped OrderService` bean to implement `GenericOrder`\
    \ instead of having its own order method. This is shown in the following code.\n\
    \n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figo_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figo_HTML.jpg)\n\
    \nLine 15 implements the `order()` method of the `GenericOrder` interface. This\
    \ `OrderService` will be used to service orders placed by patrons that physically\
    \ walk into the restaurant to dine. You then need another service, called `SelfService`,\
    \ that will implement `GenericOrder` to service the online clients.\n\nThe following\
    \ code shows the `SelfService` implementation.\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figp_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figp_HTML.jpg)\n\
    \nThe `SelfService` implementation is identical to the `OrderService` implementation,\
    \ for now. You separate the two implementations now because in the future, clients\
    \ who place their orders online will be treated completely differently, in terms\
    \ of pricing, reward schemes, raffles, and other incentives that you will later\
    \ introduce. So it's good practice to separate the two implementations now instead\
    \ of having to refactor or introduce a new implementation after the application\
    \ has become very complex.\n\nSo now you have two classes that implement the same\
    \ interface. Trying to do an `@Inject` by the `GenericOrder` interface will fail,\
    \ as shown here.\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figq_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figq_HTML.jpg)\n\
    \nIn this code, you have a CDI bean named `OrderFacade` that is request scoped.\
    \ This bean has a field injection of type `GenericOrder` on Line 5. This code\
    \ will compile fine but will fail deployment. The CDI container, remember, validates\
    \ the archive to ensure you are in line with the requirements of the CDI spec.\n\
    \nThis code will fail CDI container validation with a message that the injection\
    \ point `GenericOrder` is ambiguous. This is because you have more than one class\
    \ implementing the `GenericOrder` interface and are requesting a contextual instance\
    \ through the interface. The container will not know which concrete bean type\
    \ you want.\n\nYou will encounter these kinds of issues in your own code. To prevent\
    \ these kinds of ambiguous dependency issues, the CDI spec gives you the concept\
    \ of *qualifiers*. They are annotations that you create, place on beans that you\
    \ want to identify with such annotations, and then annotate through injection\
    \ points if you want injection points resolved to the annotated bean type. It\
    \ sounds more complex than it is. Let’s create two qualifiers for the order services—`OnlineQualifier`\
    \ and `InStoreQualifier`.\n\n![../images/493447_1_En_8_Chapter/493447_1_En_8_Figr_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figr_HTML.jpg)\n\
    \nIn this code, you have an annotation declaration on Line 4 with the name `OnlineQualifier`.\
    \ This annotation is annotated with `@Qualifier`, which tells the CDI container\
    \ that you want to have your `OnlineQualifier` annotation regarded as a CDI qualifier."
