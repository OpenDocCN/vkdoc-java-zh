- fmt: '# 9. CDI Stereotypes


    CDI stereotypes are an API construct that help you group together similar architectural
    patterns into one annotation. In the restaurant application you learned about
    in Chapter [8](#493447_1_En_8_Chapter.xhtml), there is a class named `QueryService`
    that you need to transform into a transactional, logged, request scoped bean to
    carry out a query service in the data layer.


    Now assume this requirement will apply to other beans as well. What this means
    is that `QueryService` would look like the following.


    ![../images/493447_1_En_9_Chapter/493447_1_En_9_Figa_HTML.jpg](images/493447_1_En_9_Chapter/493447_1_En_9_Figa_HTML.jpg)


    Lines 1-3 use the `@RequestScoped`, `@Transactional`, and `@Logging` annotations
    to declare the `QueryService` bean. The `@Transactional` annotation is an interceptor
    from the Java Transaction API. `@Logging` is the logging interceptor. If the application
    grows and there is a need for more service layer classes, every single one of
    those classes is going to have to repeat these annotations.


    Using CDI stereotypes, you can group these commonly required annotations into
    one annotation so that using that single stereotype will result in the activation
    of all the other annotations. You can declare a `CDIService` stereotype to use
    on the `QueryService` class as follows.


    ![../images/493447_1_En_9_Chapter/493447_1_En_9_Figb_HTML.jpg](images/493447_1_En_9_Chapter/493447_1_En_9_Figb_HTML.jpg)


    This code snippet declares a stereotype called `CDIService` using the `@Stereotype`
    annotation on Line 1. Line 2 then declares this stereotype as having a request
    scope. Line 3 declares `CDIService` as being `@Transactional`, meaning that every
    method in a class annotated with `@CDIService` will be run as a transaction. Line
    4 declares `@Logging`, making `@CDIService` loggable. Line 5 then uses the CDI
    qualifier called `@Named` to make any `@CDIService` annotated class available
    to any JSF page. Line 6 declares the retention as `RUNTIME` and Line 7 declares
    the target as `TYPE`, meaning that `@CDIService` can only be used on classes.


    Now you can apply this newly created stereotype to the `QueryService` bean to
    make it instantly a request-scoped, transactional, loggable, named bean.


    ![../images/493447_1_En_9_Chapter/493447_1_En_9_Figc_HTML.jpg](images/493447_1_En_9_Chapter/493447_1_En_9_Figc_HTML.jpg)


    Line 1 in this code snippet shows the use of the `@CDIService` stereotype on the
    `QueryService`. So with that, you have replaced the need for (and the tedious
    repetition of) four annotations with just one.


    This is how you can use CDI stereotypes to simplify and compact your code. If
    you need to make your data layer service classes application instead of request
    scope, all you have to do is change the scope at the stereotype definition level
    and that will instantly be available on all `@CDIService` annotated beans.


    # 10. The CDI Ecosystem


    The Contexts and Dependency Injection (CDI) API is at the heart of the entire
    Jakarta EE platform. CDI provides a powerful Service Provider Interface (SPI)
    that allows third-party libraries to create portable extensions for the platform.
    In effect, CDI makes it easy for other projects to integrate into Jakarta EE.


    A portable extension may integrate into the platform by:


    - Providing its beans, interceptors, and decorators to the container

    - Injecting dependencies into its objects using the dependency injection service

    - Providing a context implementation for a custom scope

    - Augmenting or overriding the annotation-based metadata with metadata from some
    other source


    The two notable CDI extensions are the Apache Delta Spike^([^(33)](#fn33)) and
    Eclipse MicroProfile^([^(34)](#fn34)) projects.


    ## Eclipse MicroProfile


    Eclipse MicroProfile is an Eclipse Foundation-led project aimed at making the
    Jakarta EE platform a cloud-native enterprise development choice. It features
    a number of APIs that together form a powerful toolset for creating resilient,
    portable enterprise Java applications.


    The most obvious CDI extension from MicroProfile is the Config API. The MP Config
    API aims at simplifying application configuration in different environments and
    from different sources without the need to redeploy or restart the application.


    An application might need different port numbers for different requests, or certain
    features need to be switched on or off based on certain configurations. The Config
    API aims at externalizing application configuration so that changes can be made
    without having to restart/redeploy your code.


    To get started with MicroProfile, you need to add the dependency to your project,
    as shown here. Almost all the Jakarta EE app servers support MP.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figa_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figa_HTML.jpg)


    This code snippet adds the latest MicroProfile API to your project dependencies,
    giving you access to the entire suite of sub-projects. For example, assume that
    in the restaurant app, in the `SelfService.java` class, you need a configurable
    string that contains a welcome message for self-serve customers.


    To achieve this, you first need to create at least one config source—a place to
    get values from—in the app. The following code snippet shows the `microprofile-config.properties`
    file, located in the `META-INF` folder.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figb_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figb_HTML.jpg)


    This code snippet shows a key, called `self-service`, that has a string value.
    To use this in your code, you simply create a `String` field and inject this value
    into it using a qualifier from the MicroProfile Config API, as shown here.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figc_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figc_HTML.jpg)


    Line 1 of this code snippet uses the `@Inject` annotation in combination with
    `@ConfigProperty` on Line 2 to inject the value of the field defined in the properties
    file. `@ConfigProperty` is a MicroProfile Config Qualifier that takes two parameters—`name`
    is the key of the config value you want and a default value in the absence of
    a value in any of the config sources.


    In this code, you set the name of the `@ConfigProperty` annotation to the key
    of the `self-service` string. You could as well have defined a default value,
    as shown next, to be injected into the `selfServiceWelcome` field in the absence
    of a value in the properties file or any other config source.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figd_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figd_HTML.jpg)


    From this code snippet, in the absence of a value, the default value of `"Hello,
    and welcome"` will be injected into the `selfServiceWelcome` field. `@ConfigProperty`
    is defined as a CDI Qualifier, as shown here.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Fige_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Fige_HTML.jpg)


    Line 1 declares the annotation `ConfigProperty` as a qualifier. Lines 8 and 10
    both declare the two parameters of the annotation—`name` and `defaultValue`. As
    you can see, the `@ConfigProperty` annotation is a plain CDI qualifier that the
    MicroProfile Config API leverages to help externalize application configuration.


    The use of `@ConfigProperty` is static in the sense that the values do not change
    even when the values change in the source of the configuration. So in this example,
    even if the value of the `self-service` config property entry changes, the injected
    field might not necessarily change. To truly get dynamic config values, you can
    use another CDI construct with the Config API, as shown next.'
  raw: '# 9. CDI Stereotypes


    CDI stereotypes are an API construct that help you group together similar architectural
    patterns into one annotation. In the restaurant application you learned about
    in Chapter [8](#493447_1_En_8_Chapter.xhtml), there is a class named `QueryService`
    that you need to transform into a transactional, logged, request scoped bean to
    carry out a query service in the data layer.


    Now assume this requirement will apply to other beans as well. What this means
    is that `QueryService` would look like the following.


    ![../images/493447_1_En_9_Chapter/493447_1_En_9_Figa_HTML.jpg](images/493447_1_En_9_Chapter/493447_1_En_9_Figa_HTML.jpg)


    Lines 1-3 use the `@RequestScoped`, `@Transactional`, and `@Logging` annotations
    to declare the `QueryService` bean. The `@Transactional` annotation is an interceptor
    from the Java Transaction API. `@Loggin` is the logging interceptor. If the application
    grows and there is a need for more service layer classes, every single one of
    those classes is going to have to repeat these annotations.


    Using CDI stereotypes, you can group these commonly required annotations into
    one annotation so that using that single stereotype will result in the activation
    of all the other annotations. You can declare a `CDIService` stereotype to use
    on the `QueryService` class as follows.


    ![../images/493447_1_En_9_Chapter/493447_1_En_9_Figb_HTML.jpg](images/493447_1_En_9_Chapter/493447_1_En_9_Figb_HTML.jpg)


    This code snippet declares a stereotype called `CDIService` using the `@Stereotype`
    annotation on Line 1\. Line 2 then declares this stereotype as having a request
    scope. Line 3 declares `CDIService` as being `@Transactional`, meaning that every
    method in a class annotated with `@CDIService` will be run as a transaction. Line
    4 declares `@Logging`, making `@CDIService` loggable. Line 5 then uses the CDI
    qualifier called `@Named` to make any `@CDIService` annotated class available
    to any JSF page. Line 6 declares the retention as `RUNTIME` and Line 7 declares
    the target as `TYPE`, meaning that `@CDIService` can only be used on classes.


    Now you can apply this newly created stereotype to the `QueryService` bean to
    make it instantly a request-scoped, transactional, loggable, named bean.


    ![../images/493447_1_En_9_Chapter/493447_1_En_9_Figc_HTML.jpg](images/493447_1_En_9_Chapter/493447_1_En_9_Figc_HTML.jpg)


    Line 1 in this code snippet shows the use of the `@CDIService` stereotype on the
    `QueryService`. So with that, you have replaced the need for (and the tedious
    repetition of) four annotations with just one.


    This is how you can use CDI stereotypes to simplify and compact your code. If
    you need to make your data layer service classes application instead of request
    scope, all you have to do is change the scope at the stereotype definition level
    and that will instantly be available on all `@CDIService` annotated beans.


    # 10. The CDI Ecosystem


    The Contexts and Dependency Injection (CDI) API is at the heart of the entire
    Jakarta EE platform. CDI provides a powerful Service Provider Interface (SPI)
    that allows third-party libraries to create portable extensions for the platform.
    In effect, CDI makes it easy for other projects to integrate into Jakarta EE.


    A portable extension may integrate into the platform by


    *   Providing its beans, interceptors, and decorators to the container


    *   Injecting dependencies into its objects using the dependency injection service


    *   Providing a context implementation for a custom scope


    *   Augmenting or overriding the annotation-based metadata with metadata from
    some other source


    The two notable CDI extensions are the Apache Delta Spike^([^(33)](#fn33)) and
    Eclipse MicroProfile^([^(34)](#fn34)) projects.


    ## Eclipse MicroProfile


    Eclipse MicroProfile is an Eclipse Foundation-led project aimed at making the
    Jakarta EE platform a cloud-native enterprise development choice. It features
    a number of APIs that together form a powerful toolset for creating resilient,
    portable enterprise Java applications.


    The most obvious CDI extension from MicroProfile is the Config API. The MP Config
    API aims at simplifying application configuration in different environments and
    from different sources without the need to redeploy or restart the application.


    An application might need different port numbers for different requests, or certain
    features need to be switched on or off based on certain configurations. The Config
    API aims at externalizing application configuration so that changes can be made
    without having to restart/redeploy your code.


    To get started with MicroProfile, you need to add the dependency to your project,
    as shown here. Almost all the Jakarta EE app servers support MP.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figa_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figa_HTML.jpg)


    This code snippet adds the latest MicroProfile API to your project dependencies,
    giving you access to the entire suite of sub-projects. For example, assume that
    in the restaurant app, in the `SelfService.java` class, you need a configurable
    string that contains a welcome message for self-serve customers.


    To achieve this, you first need to create at least one config source—a place to
    get values from—in the app. The following code snippet shows the `microprofile-config.properties`
    file , located in the `META-INF` folder.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figb_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figb_HTML.jpg)


    This code snippet shows a key, called `self-service`, that has a string value.
    To use this in your code, you simply create a `String` field and inject this value
    into it using a qualifier from the MicroProfile Config API, as shown here.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figc_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figc_HTML.jpg)


    Line 1 of this code snippet uses the `@Inject` annotation in combination with
    `@ConfigProperty` on Line 2 to inject the value of the field defined in the properties
    file. `@ConfigProperty` is a MicroProfile Config Qualifier that takes two parameters—`name`
    is the key of the config value you want and a default value in the absence of
    a value in any of the config sources.


    In this code, you set the name of the `@ConfigProperty` annotation to the key
    of the `self-service` string. You could as well have defined a default value,
    as shown next, to be injected into the `selfServiceWelcome` field in the absence
    of a value in the properties file or any other config source.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Figd_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Figd_HTML.jpg)


    From this code snippet, in the absence of a value, the default value of `“Hello,
    and welcome”` will be injected into the `selfServiceWelcome` field. `@ConfigProperty`
    is defined as a CDI Qualifier, as shown here.


    ![../images/493447_1_En_10_Chapter/493447_1_En_10_Fige_HTML.jpg](images/493447_1_En_10_Chapter/493447_1_En_10_Fige_HTML.jpg)


    Line 1 declares the annotation `ConfigProperty` as a qualifier. Lines 8 and 10
    both declare the two parameters of the annotation—`name` and `defaultValue`. As
    you can see, the `@ConfigProperty` annotation is a plain CDI qualifier that the
    MicroProfile Config API leverages to help externalize application configuration.


    The use of `@ConfigProperty` is static in the sense that the values do not change
    even when the values change in the source of the configuration. So in this example,
    even if the value of the `self-service` config property entry changes, the injected
