- fmt: '# CDI Activation


    On the Jakarta EE platform, the API that helps you glue together the disparate
    components of your application code is the Contexts and Dependency Injection (CDI)
    API. In its version 2.0, CDI is activated by default in Jakarta EE with the discovery
    mode set to `annotated`.


    What the default activation scope means is that only beans (or Java classes) annotated
    with CDI annotations or CDI recognized annotations are eligible for injection.
    The default CDI config file, a small XML file called `beans.xml` in the `/webapp/WEB-INF`
    folder, looks as shown here:


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figa_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figa_HTML.jpg)


    Line 5 is the default bean discovery mode, where bean discovery mode is simply
    the scanning mechanism for identifying beans that are eligible to be managed by
    the CDI container. `Annotated` means only classes with bean defining annotations
    will be discovered during scanning.


    This implies that the following bean will be scanned at application boot time.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figb_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figb_HTML.jpg)


    However, this class will not be scanned for lack of a bean defining annotation.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figc_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figc_HTML.jpg)


    Note that this is the kind of `beans.xml` file that kicks in when there isn’t
    an explicitly created file.


    Using the CDI API with the default bean discovery mode set to `annotated` isn''t
    quite fun, however. To utilize the power of Jakarta EE dependency injection fully,
    you want to set the bean discovery mode to `All`.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figd_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figd_HTML.jpg)


    Setting the bean discovery mode to `all`, as seen in Line 5, means that all classes
    will be discovered during scanning by the CDI container at application startup.
    So, whether a bean has a CDI annotation or not, as long as it''s in the same archive
    (a bundle of a given Jakarta EE app), it will be discovered. This is what you
    will find in a lot of Jakarta EE code out there. It is also my preferred and recommended
    mode.


    ## The CDI Container


    The word *container* is most often associated with dependency injections. So what
    is the CDI container? It''s the heartbeat of your CDI code. It validates your
    CDI code at application startup and ensures that all your CDI code is valid. It''s
    very rare to get a CDI runtime error.


    The CDI container is responsible for creating contextual instances of your beans,
    adding relevant CDI magic to those created instances, assigning them to relevant
    contexts, and finally destroying those instances when the contexts they’re bound
    to get destroyed.


    You can think of the CDI container as a black box that only appears to answer
    your requests and disappears into the shadows when not needed. You as a developer
    will mostly not need to think much about the CDI container, however. You just
    have to know it''s there in the background, and ready to answer your requests.


    ## CDI Beans vs. Contextual Instances


    Up to this point, the book has used the term *beans* and *contextual instances*
    quite freely, without defining what they mean. So, what exactly is meant by beans?


    The CDI spec defines beans as a source of contextual objects that define application
    state and/or logic. These objects are called contextual instances of the bean.^([^(10)](#fn10))
    All that means is that a bean is the Java class that you, as a developer, write.


    You implement your bean logic in Java code and then use relevant CDI annotations
    to provide it with attributes that you want the bean''s contextual instance to
    posses. It is the template from which instances can be created and injected in
    the dependency injection process. The CDI container discovers your beans at application
    startup by scanning your application archive.


    A bean then is just a collection of metadata associated with your Java code, from
    which the container creates objects to satisfy a given dependency injection request.
    That CDI created object from your bean is what is called a contextual instance.


    The set of attributes that you can give your beans are Qualifiers, Scopes, Alternatives,
    and Name. These attributes are discussed throughout the rest of the book.


    ## Creating and Using Beans


    As stated earlier, a CDI bean is just a regular Java class with CDI metadata applied
    in the form of annotations. Take a look at the most basic CDI bean here.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Fige_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Fige_HTML.jpg)


    This code shows a very boring plain old Java object, with no explicit CDI annotations,
    called `TableService`. This class is a valid CDI bean because the CDI discovery
    mode is set to `all`. This means you can request contextual instances of this
    bean from the CDI container, and it will honor your request. This bean, by default,
    has a scope called `@Dependent`, meaning it takes the scope of whatever bean it
    is injected into.


    However, in the restaurant application, you need to have only one instance of
    the `TableService` responsible for checking the availability and assignment of
    tables to guests. In this case, you need to modify the bean—or template—from which
    the only-one-instance contextual instance will be created.


    ### @ApplicationScoped


    To make this modification, you need to use the `@ApplicationScoped`^([^(11)](#fn11))
    annotation to define a metadata on the bean.


    ![../images/493447_1_En_8_Chapter/493447_1_En_8_Figf_HTML.jpg](images/493447_1_En_8_Chapter/493447_1_En_8_Figf_HTML.jpg)


    This code shows the `TableService` class now bearing an explicit bean-defining
    annotation called `@ApplicationScoped`. This annotation tells the CDI container
    to put the contextual instance of this bean in a specific, well defined scope,
    or context, called `application`.


    Scopes, or contexts, are a way of telling the CDI container how you want it to
    manage the lifecycle of your contextual instances. Instances you request from
    the CDI container will be placed in relevant contexts that are determined by either
    the explicit metadata you provide along with your bean code, or one that the CDI
    container defaults to.


    So, what does the application scope or context mean? It means that for `TableService`,
    you only want to have one contextual instance for the entire application. Every
    single request for a `TableService` from the CDI container will be serviced with
    the same contextual instance. Think of `@ApplicationScoped` as a shared state
    contextual instance across the lifetime of the deployed application. You can think
    of an `ApplicationScoped` bean as a singleton if you are familiar with other DI
    frameworks like Spring.


    The good thing about CDI scopes is that they are well defined. You can predict
    when an instance will be in existence and when it will be destroyed. You can use
    this knowledge to craft powerful dependency graphs in your application. So what
    are the other available scopes aside from `@ApplicationScoped`?


    ## Other CDI Scopes'
