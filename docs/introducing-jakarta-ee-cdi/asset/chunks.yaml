    ## 精挑细选：坦克还是手枪


    Jakarta EE 是一个庞大的平台，初看可能令人生畏。不过，你可以挑选应用程序所需的任何 API。你可以将平台用作坦克，也可以用作手枪——由你决定。如果你选择将
    Jakarta EE 作为坦克使用，那么所有不同的 API 都会作为一个整体集成；如果你选择精挑细选，它们也可以各自独立。此外，由于应用服务器提供了运行时实现，无论你选择使用整个平台还是仅选择部分
    API，你交付的应用程序都只包含你的代码。无论哪种方式，你的应用程序始终以轻量级包的形式交付。


    ![../images/493447_1_En_6_Chapter/493447_1_En_6_Figb_HTML.jpg](img/493447_1_En_6_Figb_HTML.jpg)


    [图片来源](https://blogs.oracle.com/java/java-ee-8-overview)


    ## 出色的文档


    Jakarta EE 是一个组织良好的社区项目，拥有海量的文档。其中最主要的是 *Java EE 教程*^(⁶)，这是官方的 Java EE 手册。此外，还有许多社区和企业组织的会议——例如
    Devoxx 和 Oracle CodeOne——这些会议非常重视服务器端 Java 开发。还有像你正在阅读的这本由个人开发者撰写的书籍，所有这些都旨在帮助你成为一名功底扎实的企业级
    Java 软件开发人员。


    以上几点只是你应该尝试 Jakarta EE 的部分原因。我知道在 J2EE 时代，这个平台对很多人来说难以驾驭。然而，如今的 Jakarta EE 是一个灵活、优雅、看似简单却极具吸引力的软件开发平台，正如你将在本书第二部分中看到的那样。


    脚注 1


    # 7. Jakarta EE 与 Spring 框架


    一本关于 Jakarta EE 的书如果不讨论 Spring 框架，那将是不完整的。那么，什么是 Spring 框架？


    Spring 框架是 JVM 上另一种运行在 Servlet 容器上的服务器端软件开发平台。它过去是基于 Java 的，但现在你可以使用其他基于 JVM 的语言（如
    Kotlin）来开发 Spring 应用程序。Spring 框架的出现是因为开发者在早期版本的 Java EE（当时称为 J2EE）中遇到了诸多挫折。


    Rod Johnson^(⁷) 启动了该项目，旨在提供一个比 J2EE 更对开发者友好、更少晦涩难懂的替代平台。最初，Spring 框架只是一个控制反转（依赖注入）框架。它很快变得非常流行，并逐渐发展成为
    Jakarta EE 的全栈替代方案。Spring 框架的知识产权归 Pivotal Inc. 所有。


    然而，在 Spring 发展的同时，开发者开始遇到一些痛点，这些痛点给他们带来了很多对该平台的挫败感^(⁸)。在 Spring 大受欢迎的同时，Java EE
    也在根据收到的反馈不断演进。


    Java EE 7 的发布标志着该平台历史上的一个里程碑，因为它在开发者生产力方面几乎赶上了 Spring 框架，同时成功避免了 Spring 的陷阱。Java
    EE 的发布深受 Spring 框架的影响。


    如今，Spring 作为一个平台，拥有 Spring Boot 框架，我称其为“Spring 的小型 Java EE”。Spring Boot 受到了 Java
    EE 的“约定优于配置”和“明智默认值”理念的影响。这两个平台相互影响深远。


    作为一名 Java 开发者，你可以选择使用 Jakarta EE 或 Spring 框架。对我来说，两者没有孰优孰劣之分。两个平台各有其优势和劣势。自然，作为一本
    Jakarta EE 书籍的作者，我选择 Jakarta EE，但这仅仅是因为我对它作为 Eclipse 基金会社区项目的未来感到兴奋，我觉得使用它很高效，并且我发现它易于学习和教授。


    你应该根据平台对你的技术价值、你维护应用程序的难易程度、你对向后兼容性的重视程度、你开发团队的现有技能以及其他类似指标来选择平台。我对于整个 Spring
    与 Java EE 之争的看法是，这根本不值得。它们都是优秀的平台，迎合了不同类型的开发者。Spring 框架背后的公司 Pivotal 现在已是 Jakarta
    EE 社区的成员。


    Spring 框架与 Java EE 可以重新表述为 Spring 框架*和* Jakarta EE。作为开发者，你应该选择适合你具体情况的平台。既然你正在阅读这本书，我相信你已经决定要选择哪一个了。


