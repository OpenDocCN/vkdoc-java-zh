    前言


    感谢您选择《* Jakarta EE CDI 入门：面向企业 Java 开发的上下文与依赖注入*》。我撰写本书，是因为市面上缺乏关于在 Jakarta EE（原
    Java EE）平台上使用强大且直观的上下文与依赖注入 API 的易懂书籍。


    本书涵盖了 CDI API 的核心要点，旨在以易于理解和关联的方式解释各种结构。最终目标是帮助您——日常的 Java 开发者——编写出更优质的代码。在本书中，您将开发一个简单的餐厅应用程序，了解何时以及如何使用各种
    CDI API 结构。


    ## 使用本书需要具备哪些知识？


    理想情况下，您在开始阅读本书前应是一名熟悉 Java SE 的 Java 开发者。了解一些 Java EE 或 Spring 知识有助于您更快掌握相关概念，但并非必需。您的机器上至少应安装
    Java 8。


    ## 本书涵盖哪些内容？


    本书从 Java EE 的理论讲起，包括其向当今 Jakarta EE 的演进过程，然后开始介绍 CDI，首先讲解如何显式激活它。接着，讨论基于 CDI Bean
    的概念，并介绍各种类型。随后，您将学习 CDI 上下文和注入点。本书还将介绍 CDI 限定符、生产者、拦截器，最后是 CDI 事件。


    ## 最终您将学到什么？


    这是一本非常精炼的书籍，只涵盖关键内容。您的时间宝贵，因此我选择了自己日常编码中实际使用的主题。在书中塞满您只会偶尔用到的主题毫无意义。因此，本书内容直截了当，您可以在一个周末内读完。


    在本书结束时，您将牢固掌握上下文与依赖注入 API。您将了解它是什么、何时使用它，以及如何用它编写更优质、更易读且更易维护的代码。


    ## 源代码在哪里？


    本书的完整代码可在 GitHub 上获取，既位于 Apress 品牌的仓库 [`www.github.com/apress/introducing-jakarta-ee-cdi`](http://www.github.com/apress/introducing-jakarta-ee-cdi)，也位于我个人的仓库
    [`https://github.com/pedanticdev/jee-book`](https://github.com/pedanticdev/jee-book)。该项目使用
    Maven 依赖管理工具构建，应可在任何支持 Maven 的 IDE 中运行。如果您未安装 Maven，可按照 [`https://www.baeldung.com/install-maven-on-windows-linux-mac`](https://www.baeldung.com/install-maven-on-windows-linux-mac)
    上的指南在您的机器上安装。它适用于所有操作系统。我强烈建议您将代码克隆到本地机器，以便跟随本书学习。


    项目对象模型（`pom.xml`）文件包含 Payara Micro Maven 插件，您可以使用它来运行代码示例。切换到项目目录并执行以下命令：


    ```

    mvn package payara-micro:start

    ```


    要运行异步 CDI 事件，您需要从 [`www.payara.fish/software/downloads/`](http://www.payara.fish/software/downloads/)
    下载 Payara Server Full Stream，并按照 [`www.youtube.com/watch?v=aw-cNxKJU_Y`](http://www.youtube.com/watch%253Fv%253Daw-cNxKJU_Y)
    上的视频来运行克隆的代码。


    ## 如何联系我？


    写书是一项繁琐的任务，因此，尽管尽了最大努力，仍可能存在未通过质量检查的错误。我对所有错误承担全部责任。


    如果您遇到任何此类错误，需要本书中任何内容的帮助，或者只是想喝杯咖啡聊聊天，请随时通过 `hello@pedanticacademy.com` 直接联系我。


    再次感谢您选择本书。希望您在阅读后能编写出更优质的代码。让我们开始吧。


    > ——Luqman Saeed


    关于作者 关于技术审校者


    # 1. 什么是 Java EE？


    Java 企业版（Java EE），原名 J2EE，其核心是一组*抽象的、标准化的规范*，这些规范规定了软件开发中常见挑战的解决方案。


    注意定义中*抽象*这个词很重要。这意味着 Java EE 只是一组接口和契约，为开发者提供了一个面向公众的 API。


    这些抽象规范也被称为是*标准化的*。这是什么意思？这意味着整个 Java EE API 集合都是根据该 API 主题领域的专家制定的明确定义标准发布的^(¹)。


    标准化还意味着每个 Java EE API 都经过了 Java 社区流程的 Java 规范请求项目的严格流程。这一流程的结果是一套经过行业实践检验、被认为会长期存在的
    API。


    但是，请记住我之前说过 Java EE 是抽象的，对吧？嗯，尽管您通常会针对 `javax.*` 包中的 Java EE API 进行编码，但您并不能直接在
    Java EE 上运行您的应用程序。


    ## 如何运行 Java EE 应用程序？


    要运行 Java EE 应用程序，您需要一个 Java EE 规范的具体实现。请记住，它们是抽象的。Java EE 具体实现的官方名称是*应用服务器*。我敢打赌您以前听过这个说法，对吧？


    应用服务器本质上是 Java EE 抽象规范的具体实现。这意味着您可以在应用服务器上使用 Java EE API 实现来运行您的应用程序代码。


    市面上有许多应用服务器，包括 Payara Server、Apache TomEE、JBoss Wildfly 和 IBM OpenLiberty 等。


