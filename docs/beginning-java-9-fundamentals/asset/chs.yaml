  \ `Comparable` 接口在类中指定的排序不同的排序。有时，你可能希望对一个未实现 `Comparable` 接口的类的对象指定一种特定的排序。例如，你可能希望基于名字和姓氏对\
  \ `ComparablePerson` 类的对象进行排序，而不是按照其 `Comparable` 接口的 `compareTo()` 方法所指定的排序（即基于姓氏和名字）。`Comparator`\
  \ 接口允许你对任何类的对象指定自定义排序。通常，处理对象集合的 Java API 需要一个 `Comparator` 对象来指定自定义排序。`Comparator`\
  \ 接口是一个泛型接口：\n\n```\npublic interface Comparator {\nint compare(T o1, T o2);\nboolean\
  \ equals(Object obj);\n// 此处未显示默认方法和静态方法\n}\n```\n\n`Comparator` 接口在 Java 8 中经过了彻底改造。该接口新增了几个静态方法和默认方法。我将在本章讨论其中一些新方法，并在本系列第二卷的第\
  \ 5 章中讨论 lambda 表达式时再讨论另一些方法。\n\n通常，你不需要实现 `Comparator` 接口的 `equals()` 方法。Java 中的每个类都从\
  \ `Object` 类继承了 `equals()` 方法，这在大多数情况下已经足够。`compare()` 方法接受两个参数并返回一个整数。如果第一个参数小于、等于或大于第二个参数，它分别返回一个负整数、零或正整数。清单\
