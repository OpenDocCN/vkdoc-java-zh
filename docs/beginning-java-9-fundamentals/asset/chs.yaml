  \  DEL\n |\n  删除\n |\n\n8 位字符集\n\nASCII 字符集对于英语来说运行良好。要表示其他语言的字母表，例如法语和德语，则催生了 **8\
  \ 位字符集** 的发展。一个 8 位字符集定义了 2⁸（即 256）个字符位置，其数值范围从 0 到 255。8 位字符集的位组合范围从 00000000 到\
  \ 11111111。8 位字符集分为两部分。第一部分表示的字符与 ASCII 字符集相同。第二部分引入了 128 个新字符。第二部分的前 32 个位置保留给控制字符。因此，在一个\
  \ 8 位字符集中有两个控制字符区域：0-31 和 128-159。由于 SPACE 和 DELETE 字符已在第一部分中定义，一个 8 位字符集可以容纳 192\
  \ 个可打印字符（95 + 97），其中包括 SPACE。ISO Latin-1 是 8 位字符集的一个例子。\n\n即使是 8 位字符集也不足以容纳世界上大多数语言的字母表。这导致了更大（也许是最大）字符集的发展，即通用字符集（UCS）。\n\
  \n通用多八位编码字符集\n（UCS）\n\n通用多八位编码字符集，简称为 UCS，旨在提供一个单一的编码字符集，用于对世界上所有语言的书面形式以及可能与此类语言结合使用的各种附加符号进行编码。它不仅旨在涵盖当前使用的语言，还涵盖过去的语言以及未来可能需要添加的语言。UCS\
  \ 使用 4 个八位组（1 个八位组为 8 位）的结构来表示一个字符。然而，最高有效八位组的最高有效位被限制为 0，这允许其在数据处理系统中用于私有的内部目的。剩余的\
  \ 31 位使我们能够表示超过二十亿个字符。这四个八位组命名如下：\n\n*   组八位组，或 G\n\n*   面八位组，或 P\n\n*   行八位组，或\
  \ R\n\n*   单元八位组，或 C\n\n\n\nG 是最高有效八位字节，C 是最低有效八位字节。\n因此，UCS 的整个编码范围可视为一个\n四维结构，\n\
  由以下部分组成：\n\n*   128 个组\n\n*   每组 256 个平面\n\n*   每个平面 256 行\n\n*   每行 256 个单元\n\n\
  两个十六进制数字（0-9，A-F）用于指定任意八位字节的值。\nG 的值被限制在 00-7F 范围内。G=00 且 P=00 的平面被称为**基本多文种平面（BMP）**。BMP\
  \ 中 R=00 的行所表示的字符集与 8 位 ISO Latin-1 相同。因此，ASCII、ISO Latin-1 以及 BMP 中 R=00 的前 128\
  \ 个字符是匹配的。ISO Latin-1 的第 129 到第 256 个字符与 BMP 中 R=00 的对应字符也匹配。这使得 UCS 与现有的 7 位 ASCII\
  \ 和 8 位 ISO Latin-1 兼容。此外，**BMP** 被划分为五个区域。\n\n*   **A 区**：用于字母文字、符号文字以及各种符号。A 区可用的编码位置范围为\
  \ 0000-4DFF。编码位置 0000-001F 和 0080-009F 保留给控制字符。编码位置 007F 保留给 DELETE 字符。因此，该区域有 19903\
  \ 个编码位置可用于图形字符。\n\n*   **I 区**：用于中日韩统一表意文字（CJK）。其范围为 4E00-9FFF，因此该区域有 20992 个可用编码位置。\n\
  \n*   **O 区**：用于韩文音节文字及其他文字。其范围为 A000-D7FF，因此该区域有 14336 个可用编码位置。\n\n*   **S 区**：保留用于转换格式\
  \ UTF-16。转换格式 UTF-16 将在稍后介绍。其范围为 D800-DFFF，因此该区域有 2048 个可用编码位置。\n\n*   **R 区**：被称为受限区域。仅在特殊情况下才能使用。该区域的用途之一是用于特定的用户自定义字符。然而，在这种情况下，发送方和接收方之间需要达成协议才能成功通信。其范围为\
  \ E000-FFFD，因此该区域有 8190 个可用编码位置。\n\nUCS 与另一种流行的字符集 Unicode 密切相关，Unicode 由统一码联盟制定。Unicode\
  \ 采用 2 八位字节（16 位）编码结构，因此可以容纳 2¹⁶（= 65536）个不同的字符。Unicode 可以被视为 UCS 的 BMP 的 16 位编码。这两个字符集，Unicode\
  \ 和 UCS，由两个不同的组织开发并维护。然而，它们相互合作以保持 Unicode 和 UCS 的兼容性。如果计算机系统使用 Unicode 字符集存储文本，即使文本中的所有字符都来自\
  \ ASCII 字符集，文本中的每个字符也必须分配 16 位。请注意，Unicode 的前 128 个字符与 ASCII 的字符匹配，而 ASCII 中的一个字符仅需\
  \ 8 位即可表示。因此，使用 16 位来表示 Unicode 中的所有字符会浪费计算机内存。另一种方法是，对来自 ASCII 的所有字符使用 8 位，对 ASCII\
  \ 范围之外的字符使用 16 位。然而，这种对 Unicode 中不同字符使用不同位数的方法必须保持一致和统一，以确保在不同计算机系统之间存储或交换数据时不会产生歧义。这个问题导致了字符编码方法的发展。目前，ISO/IEC\
  \ 10646-1 中规定了四种字符编码方法。\n\n*   UCS-2\n\n*   UCS-4\n\n*   UTF-16\n\n*   UTF-8\n\n\
  **UCS-2**\n\n这是一种 2 八位字节的 BMP 编码形式，允许使用两个八位字节来表示 BMP 中的一个字符。这是一种固定长度的编码方法。也就是说，BMP\
  \ 中的每个字符都由恰好两个八位字节表示。\n\n**UCS-4**\n\n这种编码方法也称为 4 八位字节规范编码形式，它对 UCS 中的每个字符使用四个八位字节。这也是一种固定长度的编码方法。\n\
  \n**UTF-16**\n\n（UCS 转换格式 16）\n\n\n\n一旦使用基本多语言平面（BMP）之外的字符，UCS-2 编码方法便无法表示它们。此时，编码必须切换为使用\
  \ UCS-4，这会使内存、网络带宽等资源的使用量翻倍。为了避免使用 UCS-4 编码方法所导致的内存及其他资源的浪费，设计了 UTF-16 转换格式。UTF-16\
  \ 是一种可变长度编码方法。在 UTF-16 编码方法中，BMP 内的所有字符使用 UCS-2，而 BMP 外的字符则使用 UCS-4 进行编码。\n\nUTF-8\n\
  \n（UCS 转换格式 8）\n\n这是一种可变长度编码方法，可能使用 1 到 6 个八位位组来表示 UCS 中的一个字符。所有 ASCII 字符都使用一个八位位组进行编码。在\
  \ UTF-8 字符编码格式中，字符使用一个或多个八位位组表示，如表 A-2 所示。\n\n表 A-2.\n\n合法的 UTF-8 序列列表\n\n八位位组数量\n\
  \ |\n  使用的位模式\n |\n  UCS 代码\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\
  \n|\n  八位位组 1: 0xxxxxxx\n |\n  00000000-0000007F\n |\n\n|\n  八位位组 1: 110xxxxx\n\n\
  八位位组 2: 10xxxxxx\n |\n  00000080-000007FF\n |\n\n|\n  八位位组 1: 1110xxxx\n\n八位位组 2:\
  \ 10xxxxxx\n\n八位位组 3: 10xxxxxx\n |\n  00000800-0000FFFF\n |\n\n|\n  八位位组 1: 11110xxx\n\
  \n八位位组 2: 10xxxxxx\n\n八位位组 3: 10xxxxxx\n\n八位位组 4: 10xxxxxx\n |\n  00010000-001FFFFF\n\
  \ |\n\n|\n  八位位组 1: 111110xx\n\n八位位组 2: 10xxxxxx\n\n八位位组 3: 10xxxxxx\n\n八位位组 4:\
  \ 10xxxxxx\n\n八位位组 5: 10xxxxxx\n |\n  00200000-03FFFFFF\n |\n\n|\n  八位位组 1: 1111110x\n\
  \n八位位组 2: 10xxxxxx\n\n八位位组 3: 10xxxxxx\n\n八位位组 4: 10xxxxxx\n\n八位位组 5: 10xxxxxx\n\
  \n八位位组 6: 10xxxxxx\n |\n  04000000-7FFFFFFF\n |\n\n表中的“x”表示 0 或 1。请注意，在 UTF-8 格式中，以\
  \ 0 位开头的八位位组表示它代表一个 ASCII 字符。以 110 位组合开头的八位位组表示它是字符的 2 八位位组表示中的第一个八位位组，依此类推。另请注意，当一个八位位组是多八位位组字符表示的一部分时，除第一个八位位组外的其他八位位组以\
  \ 10 位模式开头。可以轻松地对 UTF-8 编码的数据实施安全检查。不符合表中所示八位位组序列的 UTF-8 八位位组序列被视为无效。\n\nJava 与字符编码\n\
  \nJava 将所有字符和字符串作为 Unicode 字符进行存储和操作。在序列化和字节码中，Java 使用 Unicode 字符集的 UTF-8 编码。所有\
  \ Java 虚拟机实现都需要支持表 A-3 所示的字符编码方法。\n\n表 A-3.\n\nJVM 支持的字符编码列表\n\n字符编码\n |\n  描述\n\
  \ |\n\n| --- | --- | --- | --- | --- |\n\nASCII\n |\n  7 位 ASCII（也称为 ISO646-US，Unicode\
  \ 字符集的基本拉丁区块）。\n |\n\nISO-8859-1\n |\n  ISO 拉丁字母表第 1 号（也称为 ISO-LATIN-1）。\n |\n\n\
  UTF-8\n |\n  8 位 Unicode 转换格式。\n |\n\nUTF-16BE\n |\n  16 位 Unicode 转换格式，大端字节序。大端字节序在第\
  \ 3 章中讨论。\n |\n\nUTF-16LE\n |\n  16 位 Unicode 转换格式，小端字节序。小端字节序在第 3 章中讨论。\n |\n\n\
  UTF-16\n |\n  16 位 Unicode 转换格式，字节序由强制性的初始字节顺序标记指定（输入时接受任一顺序；输出时使用大端字节序）。\n |\n\n\
  Java 支持 UTF-8 格式，并带有以下两个重要的修改：\n\n*   Java 使用 16 位来表示类文件中的 NUL 字符，而标准 UTF-8 仅使用\
  \ 8 位。做出这种折衷是为了让其他语言更容易解析 Java 类文件，因为在字符串中不允许出现 NUL 字符。然而，在某些情况下，Java 使用标准 UTF-8\
  \ 格式来表示 NUL 字符。\n\n*   Java 仅识别 1 八位位组、2 八位位组和 3 八位位组的 UTF-8 格式，而标准 UTF-8 格式可能使用\
  \ 1 八位位组、2 八位位组、3 八位位组、4 八位位组、5 八位位组和 6 八位位组序列。这是因为 Java 支持 Unicode 字符集，并且 Unicode\
  \ 中的所有字符都可以使用 UTF-8 的 1、2 或 3 八位位组格式表示。\n\n当你编译 Java 源代码时，默认情况下，Java 编译器假定源代码文件是使用平台的默认编码（也称为本地代码页或本机编码）编写的。Windows\
  \ 和 Solaris 上的平台默认字符编码是 Latin-1，Mac 上是 MacRoman。请注意，Windows 不使用真正的 Latin-1 字符编码。它使用\
  \ Latin-1 的一种变体，包含较少的控制字符和更多的可打印字符。你可以指定文件编码名称（或代码页名称）来控制编译器如何解释 ASCII 字符集之外的字符。在编译\
  \ Java 源代码时，你可以将源代码文件中使用的字符编码名称传递给 Java 编译器。以下命令告诉 Java 编译器（`javac`），Java 源代码 `Test.java`\
  \ 是使用名为 `Big5` 的传统中文编码编写的。现在，Java 编译器会将所有以 `Big5` 编码的字符转换为 Unicode。\n\n```\njavac\
  \ -encoding Big5 Test.java\n```\n\nJDK 包含 `native2ascii` 工具，可用于将包含其他字符编码的文件转换为包含\
  \ Latin-1 和/或 Unicode 编码字符的文件。使用 `native2ascii` 工具的一般语法是\n\n```\nnative2ascii option\
  \ inputfile outputfile\n```\n\n例如，以下命令将 `Source.java` 文件中的所有字符转换为 Unicode 编码字符，并将输出放入\
  \ `Destination.java` 文件中，前提是 `Source.java` 文件是使用平台的默认编码编写的：\n\n```\nnative2ascii\
  \ Source.java Destination.java\n```\n\n以下命令将 `Source.java` 文件中的所有字符转换为 Unicode 编码字符，并将输出放入\
  \ `Destination.java` 文件中。假定 `Source.java` 文件是使用中文 `Big5` 编码编写的。\n\n```\nnative2ascii\
  \ -encoding Big5 Source.java Destination.java\n```\n\n以下命令执行反向操作，即将包含 Latin-1 和/或\
  \ Unicode 编码字符的 `Source.java` 文件转换为包含本机编码字符的 `Destination.java` 文件：\n\n```\nnative2ascii\
  \ -reverse Source.java Destination.java\n```\n\n如果省略了 `outputfile` 名称，`native2ascii`\
  \ 工具将使用标准输出作为输出。如果也省略了 `inputfile` 名称，它将使用标准输入作为输入。\n\n附录 B：文档注释\n\nJava 编程语言允许你在源代码中包含注释，这些注释可用于为应用程序准备文档。此类注释称为文档注释或\
  \ Javadoc 注释。JDK 提供了一个 `javadoc` 命令行工具，用于从源代码中提取文档注释并生成 HTML 格式的文档。`javadoc` 工具位于\
  \ `JDK_HOME` 目录的 `bin` 目录中。例如，如果你已将 JDK 安装在 `C:\\java9` 目录中，则 `javadoc` 工具将位于 `C:\\\
  java9\\bin` 目录中。使用 `--help` 和 `--help-extra` 参数执行 `javadoc` 工具以查看所有可用选项。\n\n\n\n\
  尽管文档注释可以出现在 Java 源代码的任何位置，但 `javadoc` 工具仅使用那些紧跟在类、嵌套类、接口、枚举、注解、构造器、方法和字段声明之前的文档注释来生成\
  \ HTML 页面。请注意，该工具不会为匿名类、包声明和导入声明编写的文档注释生成文档。你需要为包编写一个单独的专用文件来存放文档注释，工具将使用该文件为该包生成文档。\n\
  \n提示\n\nJava SE 9 引入了一种名为模块的新结构。`javadoc` 工具支持模块声明中的文档注释。\n\n文档注释以 `/**` 字符开头，以\
  \ `*/` 字符结尾。文档注释每行开头的星号（`*`）会被忽略。以下是为 `Calc` 类声明编写的文档注释示例：\n\n```\n// Calc.java\n\
  package com.jdojo.utility;\n/**\n* 一个用于对数字执行基本计算的工具类。此类中的所有方法都是静态的。它提供了执行加法、减法、乘法和除法的方法。\n\
  *\n* @author Kishori Sharan\n*/\npublic final class Calc {\n// Calc 类的代码在此处\n}\n\
  ```\n\n需要注意的是，文档注释必须紧跟在它所针对的程序元素声明之前。否则，它将被 `javadoc` 工具忽略，或显示在错误的元素上。以下两个文档注释并不相同：\n\
  \n```\n/* 示例 #1 */\n/**\n* 此文档注释旨在用于类声明 Xyz。但是，它将被 javadoc 工具忽略，因为在此文档注释和 Xyz 类声明之间有一个包声明。请注意，为包声明编写的文档注释方式不同，并且不会写在源代码中。\n\
  */\npackage com.jdojo.utility;\npublic class Xyz {\n/* Xyz 类的代码在此处 */\n}\n/* 示例\
  \ #2 */\npackage com.jdojo.utility;\n/**\n* 此文档注释旨在用于类声明 Xyz。它将被 javadoc 工具使用，因为它紧跟在\
  \ Xyz 类声明之前。\n*/\npublic class Xyz {\n/* Xyz 类的代码在此处 */\n}\n```\n\n编写文档注释\n\n你可以在\
  \ Java 源代码中编写三种类型的注释：\n\n*   单行注释\n*   多行注释\n*   文档注释\n\n前两种类型的注释是自由格式的注释，供开发人员阅读。第三种类型的注释旨在由\
  \ `javadoc` 工具处理，以生成源代码的 HTML 文档。\n\n文档注释的文本部分可以包含 HTML 标签，这些标签将在生成的 HTML 文档中被解释为\
  \ HTML。例如，要在文档注释中以粗体字体显示文本 `\"Hello\"`，你可以编写 `<b>Hello<b>`，如下所示：\n\n```\n/**\n*\
  \ 你可以在文档注释中包含 HTML 标签。这将以粗体字体显示 Hello。\n*/\n```\n\n提示\n\n在 Java SE 9 中，`javadoc`\
  \ 工具支持文档注释中的 HTML5。\n\n除了 HTML 标签，你还可以使用一些特殊标签。文档注释中的标签是一种特殊类型的关键字，由 `javadoc` 工具解释和处理。可以使用两种类型的标签：\n\
  \n*   块标签\n*   内联标签\n\n块标签的形式如下：\n\n```\n@tagName tagText\n```\n\n块标签以 `@` 字符开头，后跟标签名称。标签文本跟在标签名称之后。以下是一个块标签的示例，它使用了\
  \ `@author` 块标签，并将 `Kishori Sharan` 作为标签文本：\n\n```\n@author Kishori Sharan\n```\n\
  \n块标签必须出现在文档注释中一行的开头。请注意，如果行首出现星号、空白字符和 `/**` 字符，`javadoc` 工具会忽略它们。当我说块标签必须出现在一行的开头时，我指的是忽略这些字符后的行首。以下是使用\
  \ `@author` 和 `@since` 块标签的示例。`@author` 标签允许你指定作者姓名，`@since` 标签允许你指定引入该 API 的版本。\n\
  \n```\n/**\n* 一个用于对数字执行基本计算的工具类。此类中的所有方法都是静态的。它提供了执行加法、减法、乘法和除法的方法。\n*\n* @author\
  \ Kishori Sharan\n* @since 版本 1.0\n*/\npublic final class Calc {\n// 更多代码在此处\n}\n\
  ```\n\n如果文档注释中的一行以 `@` 字符开头，它将被解释为块标签的开始。如果你希望一行以 `@` 字符开头而不被解释为块标签的开始，则需要使用 HTML\
  \ 实体 `&#064` 代替 `@` 字符。但是，`@` 字符可以作为行内文本的一部分出现，前提是其前一个字符不是 `{`，这一点将在后面进一步解释。\n\n\
  与块标签关联的文本可以跨越多行，包括标签名称之后直到遇到另一个块标签或文档注释结束的所有文本。\n\n内联标签可以出现在文档注释中任何可以出现文本的位置。其形式如下：\n\
  \n```\n{@tagName tagText}\n```\n\n内联标签包含在花括号（`{` 和 `}`）内。以下是一个使用 `{@code text}`\
  \ 内联标签以代码字体显示文本 `n1 + n2` 的文档注释示例：\n\n```\n/**\n* 内联标签的示例。它计算 {@code n1 + n2}。\n\
  */\n```\n\n提示\n\n编写文档注释时，请确保注释描述选择部分的第一句话是一个摘要句。包、类和成员的注释分为两部分：摘要部分和详细部分。注释的第一句话显示在摘要部分，而整个注释显示在文档的详细部分。\n\
  \n块标签和内联标签列表\n\n并非所有标签都可以在所有上下文中用于文档注释。表 B-1 包含了可用的上下文以及可在这些上下文中使用的标签。JDK 9 添加了几个标签，以支持模块声明上的文档注释并增强生成的\
  \ Javadoc。我将在后续章节中讨论它们。\n\n表 B-1.\n\n块标签和内联标签列表及其可用上下文\n\n| 上下文 | 可用标签 |\n| :---\
  \ | :--- |\n| 概述 | `@author, @see, @since, @serialField, @version, {@code}, {@docRoot},\
  \ {@index}, {@link}, {@linkplain}, {@literal}` |\n| 模块声明 | `@author, @deprecated,\
  \ @provides, @see, @since, @serialField, @uses, @version, {@code}, {@docRoot}, {@index},\
  \ {@link}, {@linkplain}, {@literal}` |\n| 包声明 | `@author, @see, @since, @serialField,\
  \ @version, {@code}, {@docRoot}, {@index}, {@link}, {@linkplain}, {@literal}` |\n\
  | 类型声明 | `@author, @deprecated, @hidden, @param, @see, @since, @serialField, @version,\
  \ {@code}, {@docRoot}, {@index}, {@link}, {@linkplain}, {@literal}` |\n| 构造器和方法声明\
  \ | `@deprecated, @exception, @hidden, @param, @return, @see, @since, @serialData,\
  \ @throws, @version, {@code}, {@docRoot}, {@index}, {@inheritDoc}, {@link}, {@linkplain},\
  \ {@literal}` |\n| 字段声明 | `@deprecated, @hidden, @see, @since, @serial, @serialField,`<br>`{@code},\
  \ {@docRoot}, {@index}, {@link}, {@linkplain}, {@literal}, {@value}` |\n\n\n\n表格中的“概述”上下文可能并不明显，因为\
  \ Java 编程语言中并没有“概述”这样的结构。`javadoc` 工具允许您在一个地方为整个应用程序添加文档注释，这被称为概述注释。概述注释会显示在该工具生成的概述页面上。我将在后面讨论如何在生成的文档中包含概述注释的示例。以下各节简要描述了这些标签。\n\
  \n@author <作者姓名>\n\n`@author` 标签会在文档的“作者”部分添加一个或多个作者姓名。一个文档注释可以包含多个 `@author` 标签。如果您有多个作者姓名，可以只用一个\
  \ `@author` 标签来指定所有作者姓名，也可以使用单独的 `@author` 标签来指定每个作者姓名。如果使用多个 `@author` 标签，所有作者姓名将使用特定于语言环境的分隔符连接起来，并放在一个“作者”条目下。表\
  \ B-2 展示了使用一个和多个 `@author` 标签的效果。请注意，该表仅显示了生成文本中的“作者”条目。\n\n表 B-2.\n\n在文档注释中使用一个和多个\
  \ @author 标签的效果\n\n文档注释 | 生成的作者条目\n\n| --- | --- | --- | --- | --- |\n\n`/**`\n\n\
  `* 一个虚拟类。`\n\n`*`\n\n`* @author Kishori Sharan`\n\n`*/`\n | 作者：\n\nKishori Sharan\n\
  \n`/**`\n\n`* 一个虚拟类。`\n\n`*`\n\n`* @author Kishori Sharan`\n\n`* @author Greg Langham`\n\
  \n`* @author John Jacobs`\n\n`*/`\n | 作者：\n\nKishori Sharan, Greg Langham, John\
  \ Jacobs\n\n@deprecated <解释文本>\n\n`@deprecated` 标签用于为那些不应再使用（尽管它们可能功能正常）的程序元素生成文档。此标签的解释文本应说明为何不应使用该程序元素。如果已弃用的程序元素有替代品，解释文本应包含指向替代品的链接或对其的说明。以下文档注释为\
  \ `Dummy` 类使用了 `@deprecated` 标签。它提供了一个指向替代类 `Dummy2` 的链接。\n\n```\n/**\n* 一个虚拟类。\n\
  *\n* @deprecated 自版本 1.1 起。请改用 {@link com.jdojo.utility.Dummy2 Dummy2}。\n*/\npublic\
  \ class Dummy {\n}\n```\n\n@exception <类名> <描述>\n\n`@exception` 标签是 `@throws` 标签的同义词。详情请参阅\
  \ `@throws` 标签的描述。\n\n@param <参数名> <描述>\n\n`@param` 仅适用于类、方法和构造器。它会使用指定的 `参数名` 和\
  \ `描述` 生成一个“参数”部分。如果参数是类型参数，则指定的 `参数名` 应包含在尖括号（`<>`）中。以下是使用 `@param` 标签记录方法参数的示例：\n\
  \n```\n/**\n* 返回 n1 和 n2 相乘的结果。如果 n1 和 n2 的乘积\n* 超出 int 数据类型的范围，则可能返回不正确的结果。\n*\n\
  * @param n1 被乘数\n* @param n2 乘数\n* @return 返回 n1 和 n2 相乘的结果\n*/\npublic static int\
  \ multiply(int n1, int n2) {\nreturn n1 * n2;\n}\n```\n\n以下是使用 `@param` 标签记录类类型参数的示例：\n\
  \n```\n/**\n* 包装任意类型的对象。\n*\n* @param  包装在 Wrapper 中的对象类型\n*/\npublic class Wrapper\
  \ {\n// Wrapper 类的代码放在这里\n}\n```\n\n@return <描述>\n\n它仅对方法有效。它会使用指定的 `描述` 添加一个“返回”部分。指定的\
  \ `描述` 应包含返回类型以及从方法返回的值的描述。请参阅 `@param` 标签的示例，了解如何在文档注释中使用 `@return` 标签。\n\n@see\
  \ <引用>\n\n它会添加一个“另请参阅”部分，其中包含指向指定 `引用` 的链接或文本。一个文档注释可以有多个 `@see` 标签。所有 `@see` 标签将显示在一个文档注释的“另请参阅”部分下。您可以通过以下三种形式之一来指定\
  \ `引用`：\n\n```\n@see \"文本\"\n@see 标签\n@see 包名.类名#成员 标签\n```\n\n在第一种形式中，引用被指定为用双引号括起来的文本。`javadoc`\
  \ 工具会在“另请参阅”部分添加指定的文本，不带任何链接。\n\n在第二种形式中，引用使用 HTML 锚点标签（<a> 标签）指定。`javadoc` 工具会生成一个指向指定\
  \ `URL` 的超链接。如果指定了，指定的 `标签` 将显示为链接文本。\n\n在第三种形式中，引用指向一个类、接口、字段、构造器或方法。请注意，如果您引用的是字段、构造器或方法，其名称前应带有井号（`#`），而不是点号。`javadoc`\
  \ 工具会生成一个指向该引用的链接，并将指定的 `标签` 作为可见文本。标签是可选的。如果省略标签，该工具会使用从 `@see` 标签的第一个参数派生的合适文本作为链接。对程序元素的引用可以使用完全限定名称或部分名称。该工具使用与\
  \ Java 编译器相同的规则来解析程序元素的部分名称。\n\n以下是使用不同形式 `@see` 标签的示例。它假设 `Calc` 类与 `Dummy` 类位于同一个包中，并且\
  \ `Calc` 类包含 `add()` 和 `multiply()` 方法。\n\n```\npackage com.jdojo.utility;\n/**\n\
  * 一个虚拟类。\n*\n* @see \"在线 Java 教程\"\n* @see Oracle 网站\n* @see com.jdojo.utility.Calc\
  \ 计算器\n* @see com.jdojo.utility.Calc#add(int, int) 加法方法\n* @see com.jdojo.utility.Calc#multiply(int,\
  \ int)\n*/\npublic class Dummy {\n}\n```\n\n为 `Dummy` 类生成的“另请参阅”部分将如下所示：\n\n```\n\
  另请参阅：\n\"在线 Java 教程\" Oracle 网站, 计算器, 加法方法,\nCalc.multiply(int, int)\n```\n\n@serial\
  \ <字段描述 或 包含/排除>\n\n`javadoc` 工具会生成一个“序列化形式”页面，其中包含所有关于所有可序列化类的序列化形式的信息。该工具会为可序列化类创建一个“另请参阅”部分，其中包含指向“序列化形式”页面的链接。一个类需要实现\
  \ `java.io.Serializable` 或 `java.io.Externalizable` 接口才能被添加到“序列化形式”页面。\n\n`@serial`\
  \ 标签用于为类的默认可序列化字段添加描述。指定的描述将被添加到该字段的“序列化形式”页面中。以下是在字段上使用 `@serial` 标签的示例：\n\n```\n\
  /**\n* 一个虚拟类。\n*/\npublic class Dummy implements java.io.Serializable {\n/**\n*\
  \ @serial value 字段的描述放在这里\n*/\nprivate int value;\n}\n```\n\n您可以通过在 `@serial` 标签中使用\
  \ `include` 或 `exclude` 参数来包含或排除某个包或类出现在“序列化形式”页面上。如果 `@serial` 标签同时用于包级别和类级别，则类级别的标签优先。默认情况下，`public`\
  \ 或 `protected` 的可序列化类会包含在“序列化形式”页面中。以下文档注释将 `Dummy` 类从“序列化形式”页面中排除：\n\n```\n/**\n\
  * 一个虚拟类。它不会出现在序列化形式页面上。\n*\n* @serial exclude\n*/\npublic class Dummy implements\
  \ java.io.Serializable {\n/**\n* @serial value 字段的描述放在这里\n*/\nprivate int value;\n\
  }\n```\n\n@serialData <数据描述>\n\n\n\n实现 `java.io.Externalizable` 接口的类需要实现 `readExternal()`\
  \ 和 `writeExternal()` 方法。一个可序列化的类也可以实现 `writeObject()`、`readObject()`、`writeReplace()`\
  \ 和 `readResolve()` 方法来自定义该类对象的序列化过程。`@serialData` 标签可用于这六个方法中任意一个的文档注释中。数据描述文本应描述序列化形式中数据的类型和顺序。\n\
  \n@serialField <字段名> <字段类型> <字段描述>\n\n一个可序列化的类可以包含一个 `serialPersistentFields` 字段，该字段是一个\
  \ `ObjectStreamField` 数组。`@serialField` 标签描述了该数组的每个组件。这些元素的描述将出现在“序列化形式”页面中。以下文档注释使用\
  \ `@serialField` 标签来记录 `ObjectStreamField` 的 `name` 和 `height` 组件：\n\n```\npackage\
  \ com.jdojo.utility;\nimport java.io.ObjectStreamField;\nimport java.io.Serializable;\n\
  /**\n* 一个表示人的类\n*/\npublic class Person implements Serializable {\nprivate String\
  \ name;\nprivate String gender;\nprivate double height;\n/**\n* @serialField name\
  \ String 人的姓名\n* @serialField height double 人的身高（单位：英尺）\n*/\nprivate static final\
  \ ObjectStreamField[] serialPersistentFields\n= {new ObjectStreamField(\"name\"\
  , String.class),\nnew ObjectStreamField(\"height\", double.class)\n};\n}\n```\n\n\
  @since <描述>\n\n`@since` 标签会在文档中添加一个“始于”部分。指定的 `描述` 指明了添加了被记录程序元素的软件版本。以下文档注释展示了如何使用\
  \ `@since` 标签：\n\n```\n/**\n* 一个虚拟类。\n*\n* @since 1.0\n*/\npublic class Dummy {\n\
  }\n```\n\n@throws <类名> <描述>\n\n`@throws` 标签是 `@exception` 标签的同义词。它会在文档中添加一个“抛出”部分。它用于描述可能从构造器或方法中抛出的异常。一个文档注释中可以使用多个\
  \ `@throws` 标签。如果一个方法抛出一个受检异常，并且没有 `@throws` 标签，那么 `javadoc` 工具会自动添加一个不带描述的 `@throws`\
  \ 标签，以确保所有受检异常都被记录。以下针对 `divide()` 方法的文档注释展示了如何使用 `@throws` 标签。如果你没有提供类的完全限定名，`javadoc`\
  \ 工具将使用与 Java 编译器相同的搜索顺序来解析部分类名。\n\n```\n/**\n* 返回 n1 除以 n2 的整数除法结果。\n*\n* @param\
  \ n1 被除数\n* @param n2 除数\n* @return 返回 n1 / n2 的结果\n* @throws ArithmeticException\
  \ 如果 n2 为零。\n*/\npublic static int divide(int n1, int n2) throws ArithmeticException\
  \ {\nreturn n1 / n2;\n}\n```\n\n@version <版本文本>\n\n`@version` 标签会在生成的文档中添加一个“版本”部分。版本文本应包含程序元素的当前版本。`@since`\
  \ 标签用于指定程序元素被添加时的软件版本，而 `@version` 标签用于指定当前版本。以下文档注释展示了如何使用 `@version` 标签：\n\n```\n\
  /**\n* 一个虚拟类。\n*\n* @since 1.0\n* @version 1.6\n*/\npublic class Dummy {\n}\n```\n\
  \n{@code <文本>}\n\n它以代码字体显示指定的文本，而不将文本解释为 HTML 标记或嵌套的文档注释标签。它等价于以下内容：\n\n```\n{@literal\
  \ }\n```\n\n{@docRoot}\n\n它解析为生成文档的根目录的相对路径。它用于链接的 URL 部分。假设你有一个名为 `myfiles/copyright.html`\
  \ 的文件，位于生成文档的根目录下。如果你想在文档注释中包含指向 `copyright.html` 文件的链接，可以执行以下操作：\n\n```\n/**\n\
  * 一个虚拟类。请阅读\n* 版权页面。\n*/\npublic class Dummy {\n}\n```\n\n{@inheritDoc}\n\n它从最近的可继承类或可实现的接口复制方法的文档。请注意，要使此标签复制文档，包含此标签的方法必须重写其父类中的方法或实现其接口中的方法。\n\
  \n此标签只能用于方法文档注释的主描述中，或用于方法的 `@return`、`@param` 和 `@throws` 标签的文本参数中。如果它出现在主描述中，它会复制被重写方法的主描述。如果它出现在其他标签的文本中，它会从被重写方法中复制该标签的文本。\n\
  \n如果一个方法重写了父类中的方法或实现了接口中的方法，并且重写方法中缺少这些标签的主描述，那么 `javadoc` 工具会自动复制主描述、`@return`、`@param`\
  \ 和 `@throws` 的文档。\n\n以下文档注释演示了 `{@inheritDoc}` 标签的用法。它用于 `SmartPerson` 类的 `getId()`\
  \ 方法的文档注释中。它既用于主描述中，也用于 `@return` 标签的文本部分。请注意，`SmartPerson` 类的 `getId()` 方法缺少 `@param`\
  \ 标签。`javadoc` 工具将自动从 `Person` 类的 `getId()` 方法复制 `@param` 标签的文档。\n\n```\n/**\n*\
  \ 一个表示人的类\n*/\npublic class Person {\n/**\n* 返回人员 ID。\n* @param x 要添加到 ID 的值\n*\
  \ @return 人员 ID。\n*/\npublic int getId(int x) {\nreturn x + 10;\n}\n}\n/**\n* 一个表示聪明人的类\n\
  */\npublic class SmartPerson extends Person {\n/**\n* {@inheritDoc}\n* @return {@inheritDoc}\n\
  */\npublic int getId(int x) {\nreturn 20 + x;\n}\n}\n```\n\n`SmartPerson` 类的 `getId()`\
  \ 方法生成的文档如下：\n\n```\ngetId\npublic int getId (int x)\n返回人员 ID。\n覆盖：\n类 Person 中的\
  \ getId\n参数：\nx - 要添加到 ID 的值\n返回：\n人员 ID。\n```\n\n{@link <包.类#成员> <标签>}\n\n它插入一个内联链接，使用指定的\
  \ `标签` 作为链接文本。此标签生成的链接类似于 `@see` 标签的某种形式生成的链接。两者之间的主要区别在于，此标签是一个内联标签，而 `@see` 标签是一个块标签。以下文档注释展示了如何使用此标签。使用以下标签将创建一个文本为\
  \ `add` 的链接，该链接将指向 `Calc` 类的 `add()` 方法的文档。\n\n```\n/**\n* 一个虚拟类。请参阅\n* {@link com.jdojo.utility.Calc#add(int,\
  \ int) add} 方法\n* 的 Calc 类，了解如何将两个整数相加。\n*\n*/\npublic class Dummy {\n}\n```\n\n\
  {@linkplain <包.类#成员> <标签>}\n\n它的工作方式与 `{@link}` 标签类似，不同之处在于它以纯文本显示链接的标签，而 `{@link}`\
  \ 以代码字体显示链接的标签。更多详细信息，请参阅 `{@link}` 标签的描述。\n\n{@literal <文本>}\n\n它显示指定的文本，而不将其解释为\
  \ HTML 标记或嵌套的文档注释标签。请注意，HTML 标签包含在尖括号（`<>`）中。如果你想在文档注释中使用尖括号，你需要使用 HTML 实体 `&lt;`\
  \ 和 `&gt;`。如果你不想使用 HTML 实体，你可以将此标签与原始文本一起使用。例如，在文档注释中的任何位置编写 `{@literal x < y}`\
  \ 是有效的，而无需编写 `x &lt; y`。\n\n{@value <包.类#字段>}\n\n\n\n它用于复制一个`static`和`final`字段（即常量字段）的值。如果使用时不带参数，它会复制该位置常量字段的值。以下文档注释展示了如何使用`{@value}`标签。在`MULTIPLIER`字段的文档注释中，它使用了不带参数的`{@value}`标签，这将插入`MULTIPLIER`字段的值。在`DIVISOR`字段的文档注释中，它使用了`{@value}`标签的两种形式，一种带参数，一种不带参数。参数`#MULTIPLIER`引用的是同一个类中的`MULTIPLIER`字段。\n\
  \n```\n/**\n* 一个虚拟类。\n*/\npublic class Dummy {\n/**\n* MULTIPLIER 的值是 {@value}\n\
  */\npublic static final int MULTIPLIER = 2000;\n/**\n* MULTIPLIER 的值是 {@value #MULTIPLIER}。\n\
  * DIVISOR 的值是 {@value}。\n*/\npublic final static int DIVISOR = 1000;\n}\n```\n\n\
  以下是生成的文档注释，展示了使用`{@value}`标签的效果：\n\n```\nMULTIPLIER\npublic static final int MULTIPLIER\n\
  ```\n\nMULTIPLIER 的值是 2000\n\n```\nDIVISOR\npublic static final int DIVISOR\n```\n\
  \n`MULTIPLIER`的值是`2000`。`DIVISOR`的值是`1000`。\n\n@hidden\n\nJDK 9 引入了`@hidden`块标签。它用于从生成的\
  \ API 文档中隐藏某个程序元素。有多种方法可以从生成的 Javadoc 中隐藏程序元素；例如，除非你使用`javadoc`工具指定包含它们的选项，否则一个类型的所有私有成员都不会出现在\
  \ Javadoc 中。使用`@hidden`标签来隐藏那些无法通过其他任何选项排除的程序元素。通常，我在处理某个章节时，会在每个模块中创建一个`Test`类来测试我的逻辑。我可以使用`@hidden`标签隐藏`Test`类，使其不显示在\
  \ Javadoc 中，如下所示：\n\n```\n// Test.java\npackage com.jdojo.utility;\n/**\n* @hidden\n\
  */\npublic class Test {\npublic static void main(String[] args) {\n// 代码写在这里\n}\n\
  }\n```\n\n{@index <keyword> <description>}\n\nJDK 9 引入了`@index`内联标签。它可以用来告诉`javadoc`工具为某个关键字建立索引。它可以在\
  \ Javadoc 中如下使用：\n\n```\n{@index  }\n```\n\n这里，`<keyword>`是要建立索引的关键字，`<description>`是该关键字的描述。如果关键字是由多个单词组成的短语，请将其用双引号括起来。以下\
  \ Javadoc 标签是使用`@index`标签并带有关键字`jdojo`的示例：\n\n```\n{@index jdojo Info site (www.jdojo.com)\
  \ for the Java 9 Revealed book!}.\n```\n\n@provides <service-type>\n<description>\n\
  \nJDK 9 引入了`@provides`块标签。你只能在模块声明中使用它。它用于记录模块提供的某个服务的实现。描述可以说明如何获取此服务提供者的实例以及提供者的其他详细信息。以下模块声明展示了一个示例。\n\
  \n```\n/**\n* @provides com.jdojo.prime.PrimeChecker 为 PrimeChecker 服务提供通用实现。\n\
  */\nmodule jdojo.prime.generic {\nrequires com.jdojo.prime;\nprovides com.jdojo.prime.PrimeChecker\
  \ with com.jdojo.generic.GenericPrimeChecker;\n}\n```\n\n@uses <service-type> <description>\n\
  \nJDK 9 引入了`@uses`块标签。你只能在模块声明中使用它。它用于记录此模块可能使用的某个服务。描述可以说明提供者的详细信息。以下模块声明展示了一个示例。\n\
  \n```\n/**\n* @uses com.jdojo.prime.PrimeChecker 加载 PrimeChecker 服务\n*/\nmodule\
  \ jdojo.prime {\nexports com.jdojo.prime;\nuses com.jdojo.prime.PrimeChecker;\n\
  }\n```\n\n记录包\n\n包声明在应用程序中会出现多次。需要一种更简单且独立的方式来记录包。你可以通过将以下两个文件之一（但不能同时存在）放置在包目录中（与`.java`源文件一起）来记录包：\n\
  \n*   `package-info.java`\n\n*   `package.html`\n\n提示\n\n如果`package-info.java`和`package.html`文件都存在，则会使用`package-info.java`文件。\n\
  \n当你运行`javadoc`工具时，它会自动使用这两个文件之一的文档作为你包的文档。包文档的第一句话应该是关于该包的摘要说明。包文档的第一句话会显示在包摘要描述中。\n\
  \ncom/jdojo/utility/ package-info.java 文件\n\n它包含带有文档注释的包声明。在`package-info.java`文件中，包的记录方式与其他任何程序元素的记录方式相同。`com.jdojo.utility`包的`package-info.java`文件内容如下：\n\
  \n```\n/**\n* 包含工具类。关于 com.jdojo.utility 包的更多描述写在这里。\n* @since 1.1\n* @version 2.0\n\
  */\npackage com.jdojo.utility;\n```\n\ncom/jdojo/utility/ package.html 文件\n\n这是一个包含\
  \ HTML 标签的常规 HTML 文件。`<body>`和`</body>`标签内的 HTML 内容被用作包文档。它不包含包声明。它不使用`/**`和`*/`字符作为文档注释的开始和结束。但是，你可以使用对包有效的文档标签。`com.jdojo.utility`包的`package.html`文件内容如下所示：\n\
  \n```\n\n包含工具类。关于 com.jdojo.utility 包的更多描述写在这里。\n@since 1.1\n@version 2.0\n\n```\n\
  \n概述文档\n\n概述文档用于在一个单独的 HTML 文件中编写整个应用程序的文档。概述文档文件的命名没有规则。通常，它被命名为`overview.html`。注释放在\
  \ HTML 文件的`<body>`和`</body>`标签内。你需要使用`–overview`命令行选项将此文件的路径传递给`javadoc`工具。以下是包含在\
  \ HTML 文件中的示例概述注释：\n\n```\n\n虚拟应用程序的 API 文档。更多概述文本写在这里。\n@author Kishori Sharan\n\
  @version 2.0\n\n```\n\n在文档中包含未处理的文件\n\n有时你可能希望将一些文件包含在你的 Java 文档中，这些文件你在文档注释中引用了。例如，你可能想要显示图形或源代码。`javadoc`工具允许你包含文件，它会将这些文件复制到生成的文档目录中而不进行处理。你需要在包含`.java`源文件的任何包目录下创建一个名为`doc-files`的目录，并将你的额外文件复制到该目录中。`javadoc`工具会将你所有的文件复制到目标目录而不进行处理。\n\
  \n跳过源文件处理\n\n有时你可能有一些不希望`javadoc`工具处理的 Java 源文件。例如，你可能有一些不希望为其生成文档的测试文件。`javadoc`工具在决定处理文件内容之前会先查看文件名。如果文件名不是有效的\
  \ Java 标识符，它会跳过该文件。如果你有一个`.java`源文件，而`javadoc`工具应该跳过它，你需要将该文件命名为一个不是有效 Java 标识符的名称。例如，你可以在文件名中包含连字符（`-`）来跳过它。请注意，当你使用通配符（`*`）或包名将`javadoc`工具传递给文档生成时，才需要这种跳过源文件处理的策略。如果你向`javadoc`工具提供要处理的源文件列表，则不需要使用此策略。\n\
  \n文档注释示例\n\n\n\n清单 B-1\n包含了带有文档注释的 `com.jdojo` 模块声明。清单 B-2\n包含了 `Calc` 类的源代码。这是一个简单的类，其目的仅在于演示如何编写文档注释。它使用了前面讨论过的许多标签。请注意\
  \ `Calc` 类的文档注释中使用了 `@index` 标签，这将使得术语 `jdojo` 在生成的 Javadoc 中可被搜索到。术语 `jdojo` 也是可搜索的，因为它是许多模块和包的一部分。\n\
  \n```\n// module-info.java\n/**\n* 一个实用工具模块，演示如何使用文档注释。\n*\n* @author Kishori SHaran\n\
  * @since 2.0\n*/\nmodule jdojo.utility {\n    exports com.jdojo.utility;\n}\n清单\
  \ B-1. jdojo.utility 模块的声明\n```\n\n```\n// Calc.java\npackage com.jdojo.utility;\n\
  /**\n* 一个用于对数字执行基本计算的实用工具类。\n* 该类中的所有方法都是静态的。它提供了执行加法、减法、\n* 乘法和除法的方法。\n*\n* {@index\
  \ jdojo 访问 www.jdojo.com 获取更多关于《Beginning Java 9 Fundamentals》书籍的信息！}\n*\n* @author\
  \ Kishori Sharan\n* @since 版本 1.0\n*/\npublic final class Calc {\n    /**\n    \
  \ * 阻止实例化此类。此类不应被实例化，因为其所有方法都是\n     * 静态的。\n     */\n    private Calc() {\n   \
  \ }\n\n    /**\n     * 对两个数字执行加法。返回 n1 + n2 的结果（int 类型）。\n     * 如果 n1 + n2 的结果超出\
  \ int 数据类型的范围，\n     * 则不会返回正确结果。对于更大的数字，请使用 {@link #add(long, long)}。\n     *\n\
  \     * @param n1 第一个数字\n     * @param n2 第二个数字\n     * @return 返回 n1 + n2 的值\n\
  \     */\n    public static int add(int n1, int n2) {\n        return n1 + n2;\n\
  \    }\n\n    /**\n     * 对两个数字执行加法。返回 n1 + n2 的结果（long 类型）。\n     *\n     * @param\
  \ n1 第一个数字\n     * @param n2 第二个数字\n     * @return 返回 n1 + n2 的值\n     */\n    public\
  \ static long add(long n1, long n2) {\n        return n1 + n2;\n    }\n\n    /**\n\
  \     * 返回 n1 - n2 的结果。\n     *\n     * @param n1 第一个数字\n     * @param n2 第二个数字\n\
  \     * @return 返回 n1 - n2 的结果\n     */\n    public static int subtract(int n1,\
  \ int n2) {\n        return n1 - n2;\n    }\n\n    /**\n     * 返回 n1 和 n2 相乘的结果。如果\
  \ n1 和 n2 的乘积\n     * 超出 int 数据类型的范围，则可能返回不正确的结果。\n     *\n     * @param n1 被乘数\n\
  \     * @param n2 乘数\n     * @return 返回 n1 和 n2 相乘的结果\n     */\n    public static\
  \ int multiply(int n1, int n2) {\n        return n1 * n2;\n    }\n\n    /**\n  \
  \   * 返回 n1 除以 n2 的整数结果。\n     *\n     * @param n1 被除数\n     * @param n2 除数\n  \
  \   * @return 返回 n1 / n2 的结果\n     * @throws ArithmeticException 如果 n2 为零\n    \
  \ */\n    public static int divide(int n1, int n2) throws ArithmeticException {\n\
  \        return n1 / n2;\n    }\n}\n清单 B-2. 带有文档注释的 Calc 类源代码\n```\n\n运行 javadoc\
  \ 工具\n\n你需要运行 `javadoc` 命令行工具来为源文件（`.java` 文件）中的文档注释生成 HTML 页面。在 JDK 9 中，`javadoc`\
  \ 工具已得到增强，可以与模块一起使用。如果将所有模块的源代码放在一个目录中（该目录包含以每个模块命名的子目录），则更容易为多个模块生成 Javadoc。在本书提供的源代码中，我创建了一个目录\
  \ `Java9Fundamentals/docsrc`，其中包含 `jdojo.utility` 和 `jdojo.jshell` 模块的源代码。`docsrc`\
  \ 子目录的内容如下。对于这些运行 `javadoc` 工具的示例，我假设以下文件包含文档注释：\n\n*   `Java9Fundamentals/docsrc/jdojo.jshell/com/jdojo/jshell/JShellApiTest.java`\n\
  \n*   `Java9Fundamentals/docsrc/jdojo.jshell/com/jdojo/jshell/Person.java`\n\n*\
  \   `Java9Fundamentals/docsrc/jdojo.jshell/module-info.java`\n\n*   `Java9Fundamentals/docsrc/jdojo.utility/com/jdojo/utility/Calc.java`\n\
  \n*   `Java9Fundamentals/docsrc/jdojo.utility/com/jdojo/utility/package-info.java`\n\
  \n*   `Java9Fundamentals/docsrc/jdojo.utility/module-info.java`\n\n*   `Java9Fundamentals/docsrc/overview.html`\n\
  \n`overview.html` 文件是文档的概述文档文件。`com.jdojo.utility` 包有一个 `package-info.java` 文件。`Calc.java`\
  \ 是一个 Java 源文件。`module-info.java` 文件包含 `jdojo.utility` 模块的模块声明。如果你将本书的源代码复制到了 `C:\\\
  Java9Fundamentals`，那么 `C:\\Java9Fundamentals\\docsrc` 目录包含这两个模块的 `.java` 源文件。运行\
  \ `javadoc` 工具的语法如下：\n\n```\njavadoc [options] [@args-file-paths]\n```\n\n`[options]`\
  \ 是 `javadoc` 工具的零个或多个命令行选项。选项用于自定义输出。例如，`–d` 选项允许你指定输出目录，`javadoc` 工具会将所有生成的输出文件存储在该目录中；`--module`\
  \ 选项允许你指定要生成文档的模块名称。\n\n`<@args-file-paths>` 允许你将工具的参数包含在文件中。有时，`javadoc` 工具的注释文本会变得过长。某些命令提示符对命令中可输入的字符数有限制。在这种情况下，你可以将命令行参数放在一个或多个参数文件中，并将这些参数文件的路径作为参数提供给\
  \ `javadoc` 工具。请注意，参数文件路径前带有 `@` 符号。`javadoc` 工具不支持参数文件中的 `–J` 选项和通配符（`*`）。\n\n\
  提示\n\n`javadoc` 工具提供了许多选项来自定义生成的输出文件。要列出所有选项，你可以使用 `--help` 选项运行它。你可以使用 `–J-version`\
  \ 选项来打印 `javadoc` 工具的版本。\n\n以下命令将为你生成 Javadoc：\n\n```\nC:\\Java9Fundamentals>javadoc\
  \ -d docs -html5 -author -version --module-source-path docsrc --module jdojo.utility,jdojo.jshell\
  \ -overview docsrc\\overview.html\n```\n\n以下是命令中每个部分的详细信息：\n\n*   当前目录是 `C:\\Java9Fundamentals`。\n\
  \n*   `-d docs` 选项指定生成的 Javadoc 应复制到 `C:\\Java9Fundamentals\\docs` 目录。\n\n*   `-html5`\
  \ 选项指定生成的输出应为 HTML 5 格式。此选项是在 Java 9 中添加的。\n\n*   默认情况下，`javadoc` 工具不会为 `@author`\
  \ 和 `@version` 标签生成文档。`–author` 和 `-version` 选项分别指示工具在生成的文档中包含 `@author` 和 `@version`\
  \ 标签的文本。\n\n*   `--module-source-path docsrc` 选项指定模块的源代码位于 `C:\\Java9Fundamentals\\\
  docsrc` 目录中。\n\n*   `--module jdojo.utility,jdojo.jshell` 选项表示你要为这两个模块（`jdojo.utility`\
  \ 和 `jdojo.jshell`）生成 Javadoc。如果你想为更多模块生成 Javadoc，请将其源代码放在 `docsrc` 目录中，并将其名称包含在此列表中。\n\
  \n*   `-overview docsrc\\overview.html` 选项指定包含应用程序概述注释的 HTML 文件的位置，你正在为该应用程序生成 Javadoc。\n\
  \n你可以使用一个或多个参数文件来存储 `javadoc` 工具的所有参数。请注意，参数文件中不支持 `–J` 选项和通配符（`*`）。你必须使用命令行来输入这两类参数。假设名为\
  \ `args.txt` 的文件内容如下，该文件位于 `C:\\Java9Fundamentals` 目录中：\n\n\n\n```\n-d docs\n-html5\n\
  -author\n-version\n--module-source-path docsrc\n--module jdojo.utility,jdojo.jshell\n\
  -overview docsrc\\overview.html\n```\n\n你可以运行 `javadoc` 工具，它将使用 `args.txt` 文件中的参数，如下所示。参数文件中的所有相对路径都将根据当前目录进行解析。\n\
  \n```\nC:\\Java9Fundamentals>javadoc @args.txt\n```\n\n你可以将 `javadoc` 的参数拆分成多个文件。你可以通过空格分隔的方式向\
  \ `javadoc` 工具传递多个参数文件，如下所示。选项可以按任意顺序分布在多个参数文件中。你可以使用参数文件的相对路径（例如 `args.txt`）或绝对路径（例如\
  \ `C:\\Java9Fundamentals\\args.txt`）传递给 `javadoc` 工具。\n\n```\nC:\\projects>javadoc\
  \ @args1.txt @args2.txt @args3.txt\n```\n\nNetBeans IDE 允许你为项目生成 Javadoc。在项目的“属性”对话框中，选择“构建”-->“文档”以打开\
  \ Javadoc 属性表，你可以在其中为 `javadoc` 工具指定所有选项。要生成 Javadoc，请从项目的右键菜单选项或“运行”菜单中选择“生成 Javadoc”。\n\
  \n生成的文档文件\n\n`javadoc` 工具会生成许多 HTML 文件。所有生成的文件可以分为三类：\n\n*   模块、类、接口、枚举、注解、包和概览的文件\n\
  *   用于在 HTML 页面之间交叉引用某些信息的文件，例如索引页、每个包的类层次结构页、每个包的使用页等。\n*   支持文件\n\n该工具为每个类/接口/枚举/注解生成一个\
  \ HTML 文件。这些文件放置在模拟类、接口、枚举和注解的包层次结构的目录中。文件名与其包含文档的程序元素名称相同。每个包含包文档的包目录中都包含一个 `package-summary.html`\
  \ 文件。为所有包生成一个 `overview-summary.html` 文件作为概览文档。为模块生成单独的页面。\n\n生成的 HTML 页面包括类层次结构页面、已弃用\
  \ API 页面、常量值页面、序列化表单页面等。这些文件具有自解释的名称，并且其名称中包含连字符。支持文件包括任何图像文件、用于描述生成文档文件的 `help-doc.html`\
  \ 文件等。\n\n查看生成的 HTML 文档\n\n你可以使用 HTML 框架或无框架在 HTML 页面中查看由 `javadoc` 工具生成的文档。`javadoc`\
  \ 工具会生成一个 `index.html` 文件，该文件位于输出目录的根目录。你需要在浏览器（例如 Microsoft Internet Explorer、Google\
  \ Chrome、Mozilla Firefox、Safari 等）中打开 `index.html` 文件，以使用 HTML 框架查看文档。你可以随时单击 `FRAMES`\
  \ 和 `NO FRAMES` 链接，在 HTML 框架视图和无框架视图之间切换。HTML 框架的组织方式如图 B-1 所示。\n\n![A323069_2_En_BookBackmatter_Fig2_HTML.gif](img/A323069_2_En_BookBackmatter_Fig2_HTML.gif)\n\
  \n图 B-1.\n\n由 javadoc 工具生成的 HTML 框架的排列方式\n\n图 B-2 显示了为你创建的 Javadoc 在框架模式下打开的 `index.html`\
  \ 页面。它显示了 `com.jdojo.utility` 包中 `Calc` 类的 Javadoc。\n\n![A323069_2_En_BookBackmatter_Fig3_HTML.jpg](img/A323069_2_En_BookBackmatter_Fig3_HTML.jpg)\n\
  \n图 B-2.\n\n为 Calc 类生成的 HTML 页面\n\n在框架模式下，`index.html` 页面包含三个框架：\n\n*   左上角的“模块/包”框架\n\
  *   左下角的“类”框架\n*   右侧的“详细信息”框架\n\n左上角的框架包含所有类、所有包和所有模块的列表。导航栏包含用于在左上角框架中切换这些视图的链接。如果你生成的文档只包含一个包，则不会生成此框架。也就是说，你必须为至少两个包生成文档，`javadoc`\
  \ 工具才会生成“模块/包”框架。在左上角的框架中，你可以查看所有包或所有模块。当你单击一个模块时，左上角的框架会显示该模块中的所有包。左下角框架中的导航栏会显示一个链接，其文本为选定的模块或包。当你单击此链接时，“详细信息”框架会显示该模块或包的文档。\n\
  \n左下角的框架包含从“模块/包”框架中选择的包中的类、接口、枚举、异常和注解的列表。右侧的框架显示从左侧框架中选择的项目的详细信息。\n\n搜索 Javadoc\n\
  \n考虑以下场景。你正在寻找用 Java 实现某些功能的逻辑，并在互联网上找到了一段代码，该代码使用了一个类，但没有显示导入该类的 `import` 语句。你可以访问\
  \ Java SE 的 Javadoc，并且想进一步了解该类。如何获取该类的包名（这是访问该类文档所必需的）？你再次搜索互联网。这次，搜索类名，可能会得到该类\
  \ Javadoc 的链接。或者，你可以将这段代码复制并粘贴到 Java IDE（如 NetBeans 和 Eclipse）中，IDE 将帮助你生成 `import`\
  \ 语句，从而提供该类的包名。不必担心在 Java 9 中搜索类包名的不便之处。\n\n由 `javadoc` 工具生成的 Javadoc 中的“详细信息”框架还有另一个新增功能。此框架中的所有页面都在右上角显示一个搜索框（参见图\
  \ B-2）。搜索框允许你搜索 Javadoc。`javadoc` 工具会准备一个可搜索的术语索引。要了解哪些内容可搜索，你需要知道被索引的术语：\n\n* \
  \  你可以搜索模块、包、类型和成员的声明名称。构造函数和方法的形参类型会被索引，但这些参数的名称不会被索引。因此，你可以搜索形参的类型。如果你在搜索框中输入\
  \ `\"(String, int, int)\"`，它将找到所有接受 `String`、`int` 和 `int` 三个形参的构造函数和方法列表。如果你输入\
  \ `\"util\"` 作为搜索词，它将显示所有名称中包含 `\"util\"` 的包、类型和成员的列表。\n*   你可以搜索使用 `@index` 内联标签指定的所有关键字和短语。\n\
  \n此列表中未列出的任何其他内容都无法使用 Javadoc 搜索框进行搜索。当你输入搜索词时，搜索框会以列表形式显示找到的结果。结果列表分为“模块”、“包”、“类型”、“成员”和“搜索标签”等类别。“搜索标签”类别包含从使用\
  \ `@index` 标签指定的索引关键字中找到的结果。\n\n提示\n\nJavadoc 搜索不支持正则表达式。输入的搜索关键字会在索引术语中的任何位置进行匹配。\n\
  \n图 B-3 展示了使用 Javadoc 搜索框并显示结果列表的情况。我为 `com.jdojo.utility` 模块生成了 Javadoc，并使用它搜索\
  \ `jdojo`，如图左侧所示。我使用 Java SE 9 的 Javadoc 搜索术语 `Module`，如图右侧所示。\n\n![A323069_2_En_BookBackmatter_Fig4_HTML.jpg](img/A323069_2_En_BookBackmatter_Fig4_HTML.jpg)\n\
  \n图 B-3.\n\n\n\n包含关键词和搜索结果的 Javadoc 搜索框\n\n您可以使用向上和向下箭头键浏览搜索结果。您可以通过以下两种方式之一查看搜索结果的详细信息：\n\
  \n*   点击某个搜索结果，即可打开该主题的 Javadoc。\n\n*   当使用向上/向下箭头高亮显示某个搜索结果时，按 Enter 键即可打开该主题的详细信息。\n\
  \n提示\n\n您可以在 `javadoc` 工具中使用 `-noindex` 选项来禁用 Javadoc 搜索。这样将不会生成索引，生成的 Javadoc 中也不会提供搜索框。\n\
  \nJavadoc 搜索是使用客户端 JavaScript 在本地执行的。服务器端没有实现任何计算或搜索逻辑。如果您在浏览器中禁用了 JavaScript，将无法使用\
  \ Javadoc 搜索功能。\n\n摘要\n\nJava 允许在源代码中编写可用于生成文档的注释。文档注释以 `/**` 开头，以 `*/` 结尾。JDK 中包含的\
  \ `javadoc` 工具用于从源代码中提取并生成文档注释。该工具会生成 HTML 格式的文档。该工具支持许多具有特殊含义的自定义标签。它还允许您在文档中使用\
  \ HTML 标签。\n\n除了 HTML 标签，您还可以使用一些特殊标签。文档注释中的标签是一种特殊类型的关键字，由 `javadoc` 工具解释和处理。可以使用两种类型的标签：块标签和内联标签。\n\
  \n块标签以 `@` 字符开头，后跟标签名称。标签文本跟在标签名称之后。块标签必须出现在文档注释中一行的开头。请注意，如果星号、空白字符和 `/**` 字符出现在行首，`javadoc`\
  \ 工具会忽略它们。\n\n内联标签可以出现在文档注释中任何可以出现文本的位置。内联标签用大括号括起来。\n\nJDK 9 引入了以下新的 Javadoc 标签：`@hidden`、`@provides`、`@uses`\
  \ 和 `{@index}`。`@hidden` 标签用于在生成的 Javadoc 中隐藏某个程序元素。`@provides` 和 `@uses` 标签仅用于模块声明，以记录模块提供和使用的服务。`{@index}`\
  \ 标签用于在 Javadoc 中指定一个可搜索的关键字。\n\nJDK 9 在每个页面的右上角添加了一个搜索框。您可以搜索程序元素名称以及使用 `{@index}`\
  \ 标签指定的关键字。如果您不希望搜索框出现在生成的 Javadoc 中，请在 `javadoc` 工具中使用 `-noindex` 选项。JDK 9 还为 `javadoc`\
