  \ 枚举的代码，而不是以下代码片段。\n    for(Gender c : Gender.values()) {\n    System.out.printf(\"\
  %s%n\", c);\n    }\n    预期输出：\n    Male\n    female\n    ```\n\n14. 假设 `Color` 是一个枚举。以下\
  \ `MyFavColor` 枚举的声明是否有效？如果无效，请解释你的答案。\n\n```\n    public enum MyFavColor extends\
  \ Color {\n    WHITE, BLACK\n    }\n    ```\n\n15. 运行以下代码片段时，输出是什么？\n\n```\n   \
  \ public enum Day {\n    MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY,\
  \ SUNDAY;\n    }\n    Day[] days = {Day.FRIDAY, Day.MONDAY, Day.WEDNESDAY};\n  \
  \  System.out.println(Arrays.toString(days));\n    Arrays.sort(days);\n    System.out.println(Arrays.toString(days));\n\
  \    ```\n\n16. 以下代码片段的输出是什么？\n\n```\n    public enum Gender {\n    MALE, FEMALE\n\
  \    }\n    System.out.println(Gender.MALE == Gender.MALE);\n    System.out.println(Gender.MALE.equals(Gender.MALE));\n\
  \    ```\n\n23. Java Shell\n\n在本章中，您将学习：\n\n*   什么是 Java shell\n\n*   什么是 JShell\
  \ 工具和 JShell API\n\n*   如何配置 JShell 工具\n\n*   如何使用 JShell 工具评估 Java 代码片段\n\n*  \
  \ 如何使用 JShell API 评估 Java 代码片段\n\n本章中的所有示例程序都是 `jdojo.jshell` 模块的成员，如清单 23-1 所示。\n\
  \n```\n// module-info.java\nmodule jdojo.jshell {\nexports com.jdojo.jshell;\nrequires\
  \ jdk.jshell;\n}\n清单 23-1.\njdojo.jshell 模块的声明\n```\n\n在您开始阅读本章之前，请允许我澄清本章中经常使用的以下三个短语的用法：\n\
  \n*   JShell 命令行工具或 JShell 工具\n\n*   `jshell`\n\n*   JShell API\n\n在本章中，讨论的主要主题是\
  \ JShell，它既可以用作命令行工具，也可以用作 Java API。“JShell 命令行工具”指的是 JShell 作为命令行工具使用的能力。JShell\
  \ 命令行工具名为 `jshell`（全部小写），当您在 Windows 上安装 JDK 9 时，它会作为 `jshell.exe` 文件安装在 `JDK_HOME\\\
  bin` 目录中。“JShell API”指的是 JShell 作为 Java API 的能力。\n\n什么是 Java Shell？\n\nJava shell，在\
  \ JDK 9 中称为 JShell，是一个命令行工具，它提供了一种交互式访问 Java 编程语言的方式。它允许您评估 Java 代码片段，而不是强迫您编写整个\
  \ Java 程序。它是 Java 的 `REPL`（读取-求值-打印循环）。JShell 也是一个 API，您可以使用它来开发应用程序，以提供与 JShell\
  \ 命令行工具相同的功能。\n\n`R`ead-`E`val-`P`rint 循环（`REPL`）是一个命令行工具（也称为交互式语言 shell），它允许用户快速评估代码片段，而无需编写完整的程序。名称\
  \ `REPL` 来源于 Lisp 中的三个基本函数——`read`、`eval` 和 `print`——它们在一个循环中使用。`read` 函数读取用户输入并将其解析为数据结构；`eval`\
  \ 函数评估解析后的用户输入以产生结果；`print` 函数打印结果。打印结果后，该工具准备再次接受用户输入，从而触发读取-求值-打印循环。术语 `REPL`\
  \ 用于指代允许您与编程语言交互的交互式工具。图 23-1 展示了 `REPL` 的概念图。UNIX shell 或 Windows 命令提示符就像一个 `REPL`，它读取操作系统命令，执行它，打印输出，然后等待读取另一个命令。\n\
  \n![A323069_2_En_23_Fig1_HTML.gif](img/A323069_2_En_23_Fig1_HTML.gif)\n\n图 23-1.\n\
  \n读取-求值-打印循环的概念图\n\n\n\n为什么 JShell 被纳入 JDK 9？将其纳入 JDK 9 的主要原因之一是学术界反馈称 Java 学习曲线陡峭。其他编程语言，如\
  \ Lisp、Python、Ruby、Groovy 和 Clojure，早已支持 `REPL`。\n仅仅为了在 Java 中编写一个“Hello, world!”程序，你就不得不采用编辑-编译-执行循环（ECEL），这涉及编写完整程序、编译并执行它。如果需要修改，你必须重复这些步骤。除了定义目录结构、编译和执行程序等其他一些维护工作外，以下是在\
  \ JDK 9 中使用模块化 Java 程序打印“Hello, world!”消息所需编写的最少代码：\n\n```\n// module-info.java\n\
  module HelloWorld {\n}\n// HelloWorld.java\npackage com.jdojo.intro;\npublic class\
  \ HelloWorld {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  Hello, world!\");\n}\n}\n```\n\n这个程序在执行时，会在控制台打印一条消息：`\"Hello, world!\"`。\n编写一个完整的程序来评估像这样的简单表达式是小题大做。这是学术界不再将\
  \ Java 作为学生入门编程语言的主要原因。Java 设计者听取了教学社区的反馈，并在 JDK 9 中引入了 JShell 工具。要实现与此程序相同的功能，你只需在\
  \ `jshell` 命令提示符下编写一行代码：\n\n```\njshell> System.out.println(\"Hello, world!\")\n\
  Hello, world!\njshell>\n```\n\n第一行是你在 `jshell` 命令提示符下输入的代码；第二行是输出。打印输出后，`jshell`\
  \ 提示符返回，你可以输入另一个 Java 表达式进行评估。\n\n提示\n\nJShell 不是一种新语言或新编译器。它是一个用于交互式访问 Java 编程语言的工具和\
  \ API。对于初学者，它提供了一种快速探索 Java 编程语言的方法。对于经验丰富的开发者，它提供了一种无需编译和运行整个程序即可快速查看代码片段结果的方法。它还提供了一种使用增量方法快速开发原型的方法。你添加一段代码，获得即时反馈，再添加另一段代码，直到原型完成。\n\
  \nJDK 9 附带了一个 JShell 命令行工具和 `JShell` API。该工具支持的所有功能也得到 API 的支持。也就是说，你可以使用该工具或通过\
  \ API 以编程方式运行代码片段。你应该能够根据本讨论的上下文区分这两者。本章大部分内容致力于解释该工具。最后，我包含了一个描述 API 并附有示例的章节。\n\
  \nJShell 架构\n\nJava 编译器本身不识别诸如方法声明或变量声明之类的代码片段。只有类和 `import` 语句可以是顶级结构，它们可以独立存在。其他类型的代码片段必须是类的一部分。JShell\
  \ 允许你执行 Java 代码片段，并允许你逐步改进它们。\n\n当前 JShell 架构的指导原则是利用 JDK 中现有的 Java 语言支持和其他 Java\
  \ 技术，使其与当前和未来版本的语言保持兼容。随着 Java 语言的发展，JShell 中的支持也将随之发展，而对 JShell 实现几乎无需或只需很少修改。图\
  \ 23-2 展示了 JShell 的高级架构。\n\n![A323069_2_En_23_Fig2_HTML.jpg](img/A323069_2_En_23_Fig2_HTML.jpg)\n\
  \n图 23-2.\n\nJShell 架构\n\nJShell 工具使用 JLine 版本 2，这是一个用于处理控制台输入的 Java 库。标准 JDK 编译器不知道如何解析和编译\
  \ Java 代码片段。因此，JShell 实现有自己的解析器，用于解析代码片段并确定代码片段的类型，例如，方法声明、变量声明等。一旦确定了代码片段类型，该代码片段将使用以下规则包装在一个合成类中：\n\
  \n*   导入语句按“原样”使用。也就是说，所有 `import` 语句都按“原样”放置在合成类的顶部。\n\n*   变量、方法和类声明成为合成类的静态成员。\n\
  \n*   表达式和语句被包装在合成类的合成方法中。\n\n所有合成类都属于一个名为 `REPL` 的包。代码片段被包装后，包装后的源代码将由标准 Java 编译器使用编译器\
  \ API 进行分析和编译。编译器将字符串格式的包装源代码作为输入，并将其编译成字节码，存储在内存中。生成的字节码通过套接字发送到运行 JVM 的远程进程进行加载和执行。有时，加载到远程\
  \ JVM 中的现有代码片段需要由 JShell 工具替换，它使用 Java 调试器 API 来完成此操作。\n\n启动 JShell 工具\n\nJDK 9\
  \ 附带了一个 JShell 工具，位于 `JDK_HOME\\bin` 目录中。该工具名为 `jshell`。如果你在 Windows 上将 JDK 9 安装在\
  \ `C:\\java9` 目录中，你将有一个名为 `C:\\java9\\bin\\jshell.exe` 的可执行文件，这就是 JShell 工具。要启动\
  \ JShell 工具，你需要打开一个命令提示符并输入 `jshell` 命令：\n\n```\nC:\\Java9Fundamentals>jshell\n\
  |  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\n\
  ```\n\n在命令提示符下输入 `jshell` 命令可能会出错：\n\n```\nC:\\Java9Fundamentals>jshell\n'jshell'\
  \ is not recognized as an internal or external command,\noperable program or batch\
  \ file.\nC:\\Java9Fundamentals>\n```\n\n此错误表明 `JDK_HOME\\bin` 目录未包含在计算机的 `PATH`\
  \ 环境变量中。我将 JDK 9 安装在 `C:\\java9` 目录中，因此 `JDK_HOME` 对我来说是 `C:\\java9`。要修复此错误，你可以将\
  \ `C:\\java9\\bin` 目录包含在 `PATH` 环境变量中，或者使用 `jshell` 命令的完整路径，对我来说是 `C:\\java9\\bin\\\
  jshell`。以下命令序列向你展示如何在 Windows 上设置 `PATH` 环境变量并运行 `JShell` 工具：\n\n```\nC:\\Java9Fundamentals>SET\
  \ PATH=C:\\java9\\bin;%PATH%\nC:\\Java9Fundamentals>jshell\n|  Welcome to JShell\
  \ -- Version 9\n|  For an introduction type: /help intro\njshell>\n```\n\n以下命令向你展示如何使用\
  \ `jshell` 命令的完整路径来启动该工具：\n\n```\nC:\\Java9Fundamentals>C:\\java9\\bin\\jshell\n\
  |  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\n\
  ```\n\n当 `jshell` 成功启动时，它会打印一条欢迎消息及其版本信息。它还会打印命令，即 `/help intro`。你可以使用此命令打印该工具的简短介绍：\n\
  \n```\njshell> /help intro\n|\n|  intro\n|\n|  The jshell tool allows you to execute\
  \ Java code, getting immediate results.\n|  You can enter a Java definition (variable,\
  \ method, class, etc), like:  int x = 8\n|  or a Java expression, like:  x + x\n\
  |  or a Java statement or import.\n|  These little chunks of Java code are called\
  \ 'snippets'.\n|\n|  There are also jshell commands that allow you to understand\
  \ and\n|  control what you are doing, like:  /list\n|\n|  For a list of commands:\
  \ /help\njshell>\n```\n\n如果你需要该工具的帮助，可以在 `jshell` 上输入命令 `/help` 来打印命令列表及其简短描述：\n\
  \n```\njshell> /help\n\njshell>\n```\n\n提示\n\n\n\nNetBeans 已集成对 JShell 工具的支持。你可以通过选择“工具”➤“打开\
  \ Java 平台 Shell”菜单，在 NetBeans IDE 中打开 JShell 提示符。NetBeans JShell 提示符为你提供了 `jshell`\
  \ 命令行工具的所有功能，以及更多——全部通过 UI 选项实现。例如，NetBeans 允许你使用其“保存到类”工具栏选项，将所有代码片段保存为一个类。它还允许你像在普通\
  \ Java 编辑器中一样自动补全代码。\n\n你可以对 `jshell` 命令使用多个命令行选项，以向工具本身传递值。例如，你可以向用于解析和编译片段的编译器以及用于执行/评估片段的远程\
  \ JVM 传递值。使用 `--help` 选项运行 `jshell` 程序，可以查看所有可用的标准选项列表。使用 `--help-extra` 或 `-X`\
  \ 选项运行，可以查看所有可用的非标准选项列表。例如，使用这些选项，你可以为 `JShell` 工具设置类路径和模块路径。我将在本章后面解释这些选项。\n\n\
  你还可以使用命令行 `--start` 选项自定义 `jshell` 工具的启动脚本。你可以使用 `DEFAULT` 和 `PRINTING` 作为此选项的参数。`DEFAULT`\
  \ 参数会使用多个 `import` 语句启动 `jshell`，这样你在使用 `jshell` 时就不需要导入常用的类。以下两个命令以相同的方式启动 `jshell`：\n\
  \n*   `jshell`\n\n*   `jshell --start DEFAULT`\n\n你可以使用 `System.out.println()` 方法将消息打印到标准输出。你可以使用带有\
  \ `PRINTING` 参数的 `--start` 选项启动 `jshell`，这将包含所有版本的 `System.out.print()`、`System.out.println()`\
  \ 和 `System.out.printf()` 方法，作为 `print()`、`println()` 和 `printf()` 顶级方法。这将允许你在 `jshell`\
  \ 上使用 `print()`、`println()` 和 `printf()` 方法，而不是它们更长的版本 `System.out.print()`、`System.out.println()`\
  \ 和 `System.out.printf()`。\n\n```\nC:\\Java9Fundamentals>jshell --start PRINTING\n\
  |  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\
  \ println(\"hello\")\nhello\njshell>\n```\n\n你可以在启动 `jshell` 时重复 `--start` 选项，以包含默认的\
  \ `import` 语句和打印方法：\n\n```\nC:\\Java9Fundamentals>jshell --start DEFAULT --start\
  \ PRINTING\n|  Welcome to JShell -- Version 9\n|  For an introduction type: /help\
  \ intro\njshell>\n```\n\n退出 JShell 工具\n\n要退出 `jshell`，请在 `jshell` 提示符下输入 `/exit`\
  \ 并按 Enter。该命令会打印一条告别消息，退出工具，并返回到命令提示符：\n\n```\nC:\\Java9Fundamentals>jshell\n|\
  \  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\
  \ /exit\n|  Goodbye\nC:\\Java9Fundamentals>\n```\n\n`JShell` 工具在很多方面都很宽容。如果你在 Java\
  \ 构造中使用了不支持的*关键字*，它会直接忽略它。你可以使用部分命令。如果你输入的部分命令可以自动补全为唯一的命令名称，该工具将像你输入了完整命令一样工作。例如，`/edit`\
  \ 和 `/exit` 是两个以 `/e` 开头的命令。如果你输入 `/ex` 而不是 `/exit`，`jshell` 会将其解释为 `/exit` 命令。\n\
  \n```\njshell> /ex\n|  Goodbye\nC:\\Java9Fundamentals>\n```\n\n如果你输入 `/e`，你会收到一个错误，因为有多个可能的命令以\
  \ `/e` 开头：\n\n```\njshell> /e\n|  Command: '/e' is ambiguous: /edit, /exit, /env\n\
  |  Type /help for help.\njshell>\n```\n\n什么是片段和命令？\n\n你可以使用 JShell 工具来：\n\n*   评估\
  \ Java 代码片段，在 JShell 术语中简称为片段。\n*   执行命令，用于查询 JShell 状态和设置 JShell 环境。\n\n为了区分命令和片段，所有命令都以斜杠（`/`）开头。你在前面的章节中已经看到了一些，例如\
  \ `/exit` 和 `/help`。命令用于与工具本身交互，例如自定义其输出、打印帮助、退出工具以及打印命令和片段的历史记录。我将在后面解释更多命令。如果你有兴趣了解所有可用的命令，请使用\
  \ `/help` 命令。\n\n使用 JShell 工具，你可以一次编写一段 Java 代码并进行评估。这些代码片段被称为片段。片段必须遵循 Java 语言规范中指定的语法。片段可以是：\n\
  \n*   导入声明\n*   类声明\n*   接口声明\n*   方法声明\n*   字段声明\n*   语句\n*   表达式\n\n提示\n\n你可以在\
  \ JShell 中使用所有 Java 语言构造，但包声明除外。JShell 中的所有片段都发生在一个名为 `REPL` 的内部包和一个内部合成类中。\n\n\
  JShell 工具知道您何时完成输入一个片段。当您按 Enter 时，如果片段完整，该工具将执行该片段；否则，它将转到下一行并等待您完成该片段。如果一行以 `...>`\
  \ 开头，则表示该片段不完整，您需要输入更多文本来完成该片段。用于更多输入的默认提示符 `...>` 可以自定义。以下是一些示例：\n\n```\nC:\\Java9Fundamentals>jshell\n\
  |  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\
  \ 2 + 2\n$1 ==> 4\njshell> 2 +\n...> 2\n$2 ==> 4\njshell> 2\n$3 ==> 2\njshell>\n\
  ```\n\n当你输入 `2 + 2` 并按 Enter 时，`jshell` 将其视为一个完整的片段（一个表达式）。它评估该表达式并打印反馈，表明该表达式被评估为\
  \ 4，并且结果被赋值给一个名为 `$1` 的变量。名为 `$1` 的变量是由工具自动生成的。我将在后面更详细地解释由工具生成的变量。当你输入 `2 +` 并按\
  \ Enter 时，`jshell` 会提示你输入更多内容，因为 `2 +` 在 Java 中不是一个完整的片段。当你在第二行输入 `2` 时，片段就完整了；`jshell`\
  \ 评估该片段并打印反馈。当你输入 `2` 并按 Enter 时，`jshell` 会评估该片段，因为 `2` 本身就是一个完整的表达式。\n\n评估表达式\n\
  \n你可以在 `jshell` 中执行任何有效的 Java 表达式。以下示例评估了两个分别进行加法和乘法运算的表达式：\n\n```\njshell> 2 +\
  \ 2\n$1 ==> 4\njshell> 9.0 * 6\n$2 ==> 54.0\n```\n\n当你评估一个表达式时，如果该表达式求值为一个值，`jshell`\
  \ 会打印反馈。在这些情况下，`2 + 2` 求值为 4，`9.0 * 6` 求值为 `54.0`。表达式的值被赋值给一个变量。反馈包含变量的名称和表达式的值。在第一种情况下，反馈\
  \ `$1 ==> 4` 意味着表达式 `2 + 2` 求值为 `4`，并且结果被赋值给一个名为 `$1` 的变量。类似地，表达式 `9.0 * 6` 被求值为\
  \ `54.0`，并且该值被赋值给一个名为 `$2` 的变量。你可以在其他表达式中使用这些变量名。你可以通过简单地输入它们的名称来打印它们的值：\n\n```\n\
  jshell> $1\n$1 ==> 4\njshell> $2\n$2 ==> 54.0\njshell> System.out.println($1)\n\n\
  jshell> System.out.println($2)\n54.0\n```\n\n提示\n\n在 `jshell` 中，你不需要像在 Java 程序中那样用分号终止语句。该工具会为你插入缺失的分号。\n\
  \n\n\n在 Java 中，每个变量都有一个数据类型。在以下示例中，名为 `$1` 和 `$2` 的变量的数据类型是什么？在 Java 中，`2 + 2` 的计算结果为\
  \ `int` 类型，`9.0 * 6` 的计算结果为 `double` 类型。因此，`$1` 和 `$2` 变量的数据类型应分别为 `int` 和 `double`。如何验证这一点？我们先采用一种较为复杂的方法。你可以将\
  \ `$1` 和 `$2` 强制转换为 `Object` 类型，并调用它们的 `getClass()` 方法，这将返回 `Integer` 和 `Double`。请注意，当你将\
  \ `int` 和 `double` 类型的原始值强制转换为 `Object` 时，它们会被自动装箱为 `Integer` 和 `Double` 引用类型：\n\
  \n```\njshell> 2 + 2\n$1 ==> 4\njshell> 9.0 * 6\n$2 ==> 54.0\njshell> ((Object)$1).getClass()\n\
  $3 ==> class java.lang.Integer\njshell> ((Object)$2).getClass()\n$4 ==> class java.lang.Double\n\
  jshell>\n```\n\n有一种更简单的方法可以确定 `jshell` 创建的变量的数据类型——你只需让 `jshell` 提供详细反馈，它就会打印出它创建的变量的数据类型以及更多信息！以下命令将反馈模式设置为\
  \ `verbose`，并计算相同的表达式：\n\n```\njshell> /set feedback verbose\n|  Feedback mode:\
  \ verbose\njshell> 2 + 2\n$1 ==> 4\n|  created scratch variable $1 : int\njshell>\
  \ 9.0 * 6\n$2 ==> 54.0\n|  created scratch variable $2 : double\njshell>\n```\n\n\
  请注意，`jshell` 打印了名为 `$1` 和 `$2` 的变量的数据类型，分别为 `int` 和 `double`。对于初学者来说，使用 `-retain`\
  \ 选项执行以下命令会很有帮助，这样详细反馈模式会在 `jshell` 会话之间持续生效：\n\n```\njshell> /set feedback -retain\
  \ verbose\n```\n\n你也可以使用 `/vars` 命令列出 `jshell` 中定义的所有变量：\n\n```\njshell> /vars\n\
  |    int $1 = 4\n|    double $2 = 54.0\njshell>\n```\n\n如果你想再次使用 `normal` 反馈模式，请使用以下命令：\n\
  \n```\njshell> /set feedback -retain normal\n|  Feedback mode: normal\nJshell>\n\
  ```\n\n你不仅限于计算像 `2 + 2` 这样的简单表达式。你可以计算任何 Java 表达式。以下示例计算了字符串拼接表达式，并使用了 `String`\
  \ 类的方法。它还向你展示了如何使用 `for` 循环：\n\n```\njshell> \"Hello \" + \"world! \" + 2017\n$1\
  \ ==> \"Hello world! 2017\"\njshell> $1.length()\n$2 ==> 17\njshell> $1.toUpperCase()\n\
  $3 ==> \"HELLO WORLD! 2017\"\njshell> $1.split(\" \")\n$4 ==> String[3] { \"Hello\"\
  , \"world!\", \"2017\" }\njshell> for(String s : $4) {\n...>     System.out.println(s);\n\
  ...> }\nHello\nworld!\n\nJshell>\n```\n\n列出代码片段\n\n你在 `jshell` 中输入的任何内容最终都会成为代码片段的一部分。每个代码片段都会被分配一个唯一的代码片段\
  \ ID，你可以稍后使用它来引用该代码片段，例如，用于删除该代码片段。`/list` 命令列出所有代码片段。它有以下几种形式：\n\n*   `/list`\n\
  \n*   `/list -all`\n\n*   `/list -start`\n\n*   `/list <snippet-name>`\n\n*   `/list\
  \ <snippet-id>`\n\n不带参数/选项的 `/list` 命令会打印所有用户输入的、处于活动状态的代码片段，这些代码片段也可能是通过 `/open`\
  \ 命令从文件中打开的。\n\n使用 `-all` 选项可以列出所有代码片段——活动的、非活动的、错误的以及启动时的。\n\n使用 `-start` 选项仅列出启动时的代码片段。启动时的代码片段会被缓存，`-start`\
  \ 选项会打印这些缓存的代码片段。即使你在当前会话中删除了它们，它也会打印启动时的代码片段。\n\n某些类型的代码片段有名称（例如，变量/方法声明），并且所有代码片段都有\
  \ ID。将代码片段的名称或 ID 与 `/list` 命令一起使用，可以打印由该名称或 ID 标识的代码片段。`/list` 命令以下列格式打印代码片段列表：\n\
  \n```\n: \n: \n: \n...\n```\n\n`JShell` 工具会生成唯一的代码片段 ID。对于启动时的代码片段，它们是 `s1`、`s2`、`s3...`；对于有效的代码片段，它们是\
  \ `1`、`2`、`3...`，依此类推；对于错误的代码片段，它们是 `e1`、`e2`、`e3...`。以下 `jshell` 会话向你展示了如何使用 `/list`\
  \ 命令列出代码片段。这些示例使用了 `/drop` 命令，通过代码片段名称和代码片段 ID 来删除代码片段。\n\n```\nC:\\Java9Fundamentals>jshell\n\
  |  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\
  \ /list\njshell> 2 + 2\n$1 ==> 4\njshell> /list\n1 : 2 + 2\njshell> int x = 100\n\
  x ==> 100\njshell> /list\n1 : 2 + 2\n2 : int x = 100;\njshell> /list -all\ns1 :\
  \ import java.io.*;\ns2 : import java.math.*;\ns3 : import java.net.*;\ns4 : import\
  \ java.nio.file.*;\ns5 : import java.util.*;\ns6 : import java.util.concurrent.*;\n\
  s7 : import java.util.function.*;\ns8 : import java.util.prefs.*;\ns9 : import java.util.regex.*;\n\
  s10 : import java.util.stream.*;\n1 : 2 + 2\n2 : int x = 100;\njshell> /list -start\n\
  s1 : import java.io.*;\ns2 : import java.math.*;\ns3 : import java.net.*;\ns4 :\
  \ import java.nio.file.*;\ns5 : import java.util.*;\ns6 : import java.util.concurrent.*;\n\
  s7 : import java.util.function.*;\ns8 : import java.util.prefs.*;\ns9 : import java.util.regex.*;\n\
  s10 : import java.util.stream.*;\njshell> string str = \"String type is misspelled\
  \ as string\"\n|  Error:\n|  cannot find symbol\n|    symbol:   class string\n|\
  \  string str = \"String type is misspelled as string\";\n|  ^----^\njshell> /list\n\
  1 : 2 + 2\n2 : int x = 100;\njshell> /list -all\ns1 : import java.io.*;\ns2 : import\
  \ java.math.*;\ns3 : import java.net.*;\ns4 : import java.nio.file.*;\ns5 : import\
  \ java.util.*;\ns6 : import java.util.concurrent.*;\ns7 : import java.util.function.*;\n\
  s8 : import java.util.prefs.*;\ns9 : import java.util.regex.*;\ns10 : import java.util.stream.*;\n\
  1 : 2 + 2\n2 : int x = 100;\ne1 : string str = \"String type is misspelled as string\"\
  ;\njshell> /drop 1\n|  dropped variable $1\njshell> /list\n2 : int x = 100;\njshell>\
  \ /drop x\n|  dropped variable x\njshell> /list\njshell> /list -all\ns1 : import\
  \ java.io.*;\ns2 : import java.math.*;\ns3 : import java.net.*;\ns4 : import java.nio.file.*;\n\
  s5 : import java.util.*;\ns6 : import java.util.concurrent.*;\ns7 : import java.util.function.*;\n\
  s8 : import java.util.prefs.*;\ns9 : import java.util.regex.*;\ns10 : import java.util.stream.*;\n\
  1 : 2 + 2\n2 : int x = 100;\ne1 : string str = \"String type is misspelled as string\"\
  ;\njshell> /exit\n|  Goodbye\n```\n\n变量、方法和类的名称会成为代码片段的名称。请注意，Java 允许你拥有同名的变量、方法和类，因为它们存在于各自的命名空间中。你可以使用这些实体的名称，通过\
  \ `/list` 命令来列出它们：\n\n```\nC:\\Java9Fundamentals>jshell\n|  Welcome to JShell --\
  \ Version 9\n|  For an introduction type: /help intro\njshell> /list x\n|  No such\
  \ snippet: x\njshell> int x = 100\nx ==> 100\njshell> /list x\n1 : int x = 100;\n\
  jshell> void x() {}\n|  created method x()\njshell> /list x\n1 : int x = 100;\n\
  2 : void x() {}\njshell> void x(int n) {}\n|  created method x(int)\njshell> /list\
  \ x\n1 : int x = 100;\n2 : void x() {}\n3 : void x(int n) {}\njshell> class x {}\n\
  |  created class x\njshell> /list x\n1 : int x = 100;\n2 : void x() {}\n3 : void\
  \ x(int n) {}\n4 : class x {}\njshell> /exit\n|  Goodbye\n```\n\n编辑代码片段\n\nJShell\
  \ 工具提供了几种编辑代码片段和命令的方法。在 `jshell` 中输入代码片段和命令时，你可以使用表 23-1 中列出的导航键在命令行上进行导航。你可以使用表\
  \ 23-2 中列出的键来编辑在 `jshell` 中一行内输入的文本。\n\n表 23-2.\n\n在 JShell 工具中修改文本的键\n\n键\n |\n\
  \ 描述\n |\n\n| --- | --- | --- | --- | --- |\n\nDelete\n |\n 删除光标下的字符\n |\n\nBackspace\n\
  \ |\n 删除光标前的字符\n |\n\nCtrl+K\n |\n 删除从光标到行尾的文本\n |\n\n\n\nMeta+D（或 Alt+D）\n |\n\
  \  删除从光标到单词末尾的文本\n |\n\nCtrl+W\n |\n  删除从光标到前一个空白字符的文本\n |\n\nCtrl+Y\n |\n  将最近删除的文本粘贴（或拉取）到当前行\n\
  \ |\n\nMeta+Y（或 Alt+Y）\n |\n  在 Ctrl+Y 之后，此组合键循环切换之前删除的文本\n |\n\n表 23-1.\n\n在 JShell\
  \ 工具中编辑时的导航键\n\n按键\n |\n  描述\n |\n\n| --- | --- | --- | --- | --- |\n\n回车键\n |\n\
  \  输入当前行\n |\n\n左箭头键\n |\n  向后移动一个字符\n |\n\n右箭头键\n |\n  向前移动一个字符\n |\n\nCtrl+A\n\
  \ |\n  移动到行首\n |\n\nCtrl+E \n |\n  移动到行尾\n |\n\nMeta+B（或 Alt+B）\n |\n  向后移动一个单词\n\
  \ |\n\nMeta+F（或 Alt+F）\n |\n  向前移动一个单词\n |\n\n在 `jshell` 中编辑多行代码片段很困难，即使你拥有丰富的编辑键组合。工具设计者意识到了这个问题，并提供了一个内置的代码片段编辑器。你可以配置该工具，使用你选择的特定于平台的代码片段编辑器。有关如何设置自己的编辑器的更多信息，请参阅标题为“设置代码片段编辑器”的部分。\n\
  \n你需要使用 `/edit` 命令来开始编辑代码片段。该命令有三种形式：\n\n*   `/edit <代码片段名称>`\n\n*   `/edit <代码片段\
  \ ID>`\n\n*   `/edit`\n\n你可以使用代码片段名称或代码片段 ID 来编辑特定的代码片段。不带参数的 `/edit` 命令会在编辑器中打开所有活动的代码片段进行编辑。默认情况下，`/edit`\
  \ 命令会打开一个名为 JShell Edit Pad 的内置编辑器，如图 23-3 所示。\n\n![A323069_2_En_23_Fig3_HTML.jpg](img/A323069_2_En_23_Fig3_HTML.jpg)\n\
  \n图 23-3.\n\n名为 JShell Edit Pad 的内置 JShell 编辑器\n\nJShell Edit Pad 是用 Swing 编写的，它显示一个包含\
  \ `JTextArea` 和三个 `JButton` 的 `JFrame`。如果你编辑代码片段，请确保在退出窗口前单击“接受”按钮，以便编辑生效。如果你取消或退出编辑器而未接受更改，你的编辑将丢失。\n\
  \n如果你知道变量、方法或类的名称，你可以使用其名称进行编辑。以下 `jshell` 会话创建了一个变量、一些方法以及一个同名为 `x` 的类，并使用 `/edit\
  \ x` 命令一次性编辑它们：\n\n```\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell -- 版本 9\n|\
  \  如需介绍，请输入：/help intro\njshell> int x = 100\nx ==> 100\njshell> void x(){}\n| \
  \ 已创建方法 x()\njshell> void x (int n) {}\n|  已创建方法 x(int)\njshell> class x{}\n|  已创建类\
  \ x\njshell> 2 + 2\n$5 ==> 4\njshell> /edit x\n```\n\n`/edit x` 命令会在 JShell Edit\
  \ Pad 中打开所有名称为 `x` 的代码片段，如图 23-4 所示。你可以编辑这些代码片段，接受更改，然后退出编辑，以继续 `jshell` 会话。\n\n\
  ![A323069_2_En_23_Fig4_HTML.jpg](img/A323069_2_En_23_Fig4_HTML.jpg)\n\n图 23-4.\n\
  \n按名称编辑代码片段\n\n重新运行之前的代码片段\n\n在像 `jshell` 这样的命令行工具中，你经常需要重新运行之前的代码片段。你可以使用上/下箭头键浏览代码片段/命令历史记录，然后在找到之前的代码片段/命令时按回车键。你也可以使用以下三个命令之一来重新运行之前的代码片段（而非命令）：\n\
  \n*   `/!`\n\n*   `/<代码片段 ID>`\n\n*   `/-<n>`\n\n`/!` 命令重新运行最后一个代码片段。`/<代码片段 ID>`\
  \ 命令重新运行由 `<代码片段 ID>` 标识的代码片段。`/-<n>` 命令重新运行倒数第 `n` 个代码片段。例如，`/-1` 重新运行最后一个代码片段，`/-2`\
  \ 重新运行倒数第二个代码片段，依此类推。`/!` 和 `/-1` 命令效果相同——它们都重新运行最后一个代码片段。\n\n声明变量\n\n你可以像在 Java\
  \ 程序中一样在 `jshell` 中声明变量。变量声明可以出现在顶层、方法内部或类中的字段声明中。顶层变量声明中不允许使用 `static` 和 `final`\
  \ 修饰符。如果你使用它们，它们将被忽略并发出警告。`static` 修饰符指定类上下文，`final` 修饰符限制你更改变量的值。不允许使用这些修饰符，因为该工具允许你声明独立的变量，以便你通过随时间改变其值来进行实验。以下示例展示了如何声明变量：\n\
  \n```\njshell> int x\nx ==> 0\njshell> int y = 90\ny ==> 90\njshell> side = 90\n\
  |  错误：\n|  找不到符号\n|    符号：   变量 side\n|  side = 90\n|  ^--^\njshell> static double\
  \ radius = 2.67\n|  警告：\n|  顶层声明中不允许使用修饰符 'static'，已忽略\n|  static double radius\
  \ = 2.67;\n|  ^----^\nradius ==> 2.67\njshell> String str = new String(\"Hello\"\
  )\nstr ==> \"Hello\"\njshell>\n```\n\n在顶层表达式中使用未声明的变量会产生错误。请注意上一个示例中使用了名为 `side`\
  \ 的未声明变量，这产生了错误。稍后我会向你展示，你可以在方法体内使用未声明的变量。\n\n还可以更改变量的数据类型。你可以声明一个名为 `x` 的 `int`\
  \ 类型变量，稍后将其重新声明为 `double` 或 `String`。以下示例展示了此功能：\n\n```\njshell> int x = 10;\nx\
  \ ==> 10\njshell> int y = x + 2;\ny ==> 12\njshell> double x = 2.71\nx ==> 2.71\n\
  jshell> y\ny ==> 12\njshell> String x = \"Hello\"\nx ==> \"Hello\"\njshell> y\n\
  y ==> 12\njshell>\n```\n\n请注意，当 `x` 的数据类型或值发生变化时，名为 `y` 的变量的值并未改变或重新计算。\n\n你也可以使用\
  \ `/drop` 命令删除一个变量，该命令将变量名作为参数。以下命令将删除名为 `x` 的变量：\n\n```\njshell> /drop x\n```\n\
  \n你可以使用 `/vars` 命令列出 `jshell` 中的所有变量。它将列出用户声明的变量以及 `jshell` 自动声明的变量（当 `jshell` 评估产生结果的表达式时会发生这种情况）。该命令有以下形式：\n\
  \n*   `/vars`\n\n*   `/vars <变量名称>`\n\n*   `/vars <变量代码片段 ID>`\n\n*   `/vars -start`\n\
  \n*   `/vars -all`\n\n不带参数的命令会列出当前会话中的所有活动变量。如果你使用代码片段名称或 ID，它会列出具有该代码片段名称或 ID 的变量声明。如果与\
  \ `-start` 选项一起使用，它会列出添加到启动脚本中的所有变量。如果与 `-all` 选项一起使用，它会列出所有变量，包括失败的、覆盖的、删除的和启动的。以下示例展示了如何使用\
  \ `/vars` 命令：\n\n```\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help\
  \ intro\njshell> /vars\njshell> 2 + 2\n$1 ==> 4\njshell> /vars\n|    int $1 = 4\n\
  jshell> int x = 20;\nx ==> 20\njshell> /vars\n|    int $1 = 4\n|    int x = 20\n\
  jshell> String str = \"Hello\";\nstr ==> \"Hello\"\njshell> /vars\n|    int $1 =\
  \ 4\n|    int x = 20\n|    String str = \"Hello\"\njshell> double x = 90.99;\nx\
  \ ==> 90.99\njshell> /vars\n|    int $1 = 4\n|    String str = \"Hello\"\n|    double\
  \ x = 90.99\njshell> /drop x\n|  已删除变量 x\njshell> /vars\n|    int $1 = 4\n|    String\
  \ str = \"Hello\"\njshell>\n```\n\n导入语句\n\n\n\n你可以在 `jshell` 中使用 `import` 语句。回想一下，在\
  \ Java 程序中，`java.lang` 包中的所有类型都是默认导入的。要使用其他包中的类型，你需要在编译单元中添加相应的 `import` 语句。我先从一个例子开始。我尝试创建三个对象：一个\
  \ `String`、一个 `List<Integer>` 和一个 `ZonedDateTime`。请注意，`String` 类位于 `java.lang` 包中；`List`\
  \ 和 `Integer` 类分别位于 `java.util` 和 `java.lang` 包中；而 `ZonedDateTime` 类位于 `java.time`\
  \ 包中。\n\n```\njshell> String str = new String(\"Hello\")\nstr ==> \"Hello\"\njshell>\
  \ List nums = List.of(1, 2, 3, 4, 5)\nnums ==> [1, 2, 3, 4, 5]\njshell> ZonedDateTime\
  \ now = ZonedDateTime.now()\n|  Error:\n|  cannot find symbol\n|    symbol:   class\
  \ ZonedDateTime\n|  ZonedDateTime now = ZonedDateTime.now();\n|  ^-----------^\n\
  |  Error:\n|  cannot find symbol\n|    symbol:   variable ZonedDateTime\n|  ZonedDateTime\
  \ now = ZonedDateTime.now();\n|                      ^-----------^\njshell>\n```\n\
  \n如果你尝试使用 `java.time` 包中的 `ZonedDateTime` 类，这些示例会产生错误。我们原本也预期在尝试创建 `List` 时会出现类似的错误，因为它位于\
  \ `java.util` 包中，而该包在 Java 程序中默认不会被导入。\n\nJShell 工具的唯一目的是在评估代码片段时让开发者的工作更轻松。为了实现这一目标，该工具默认会导入几个包中的所有类型。这些默认导入其类型的包是哪些？你可以使用\
  \ `/imports` 命令打印 `jshell` 中所有活动的 `imports` 列表：\n\n```\njshell> /imports\n|    import\
  \ java.io.*\n|    import java.math.*\n|    import java.net.*\n|    import java.nio.file.*\n\
  |    import java.util.*\n|    import java.util.concurrent.*\n|    import java.util.function.*\n\
  |    import java.util.prefs.*\n|    import java.util.regex.*\n|    import java.util.stream.*\n\
  jshell>\n```\n\n注意默认的 `import` 语句，它导入了 `java.util` 包中的所有类型。这就是你可以直接使用 `List` 而无需导入它的原因。你也可以向\
  \ `jshell` 添加自己的导入。下面的示例展示了如何导入 `ZonedDateTime` 类并使用它。当 `jshell` 打印当前日期和时区的值时，你会得到不同的输出。\n\
  \n```\njshell> /imports\n|    import java.util.*\n|    import java.io.*\n|    import\
  \ java.math.*\n|    import java.net.*\n|    import java.util.concurrent.*\n|   \
  \ import java.util.prefs.*\n|    import java.util.regex.*\njshell> import java.time.*\n\
  jshell> /imports\n|    import java.io.*\n|    import java.math.*\n|    import java.net.*\n\
  |    import java.nio.file.*\n|    import java.util.*\n|    import java.util.concurrent.*\n\
  |    import java.util.function.*\n|    import java.util.prefs.*\n|    import java.util.regex.*\n\
  |    import java.util.stream.*\n|    import java.time.*\njshell> ZonedDateTime now\
  \ = ZonedDateTime.now()\nnow ==> 2017-08-19T13:01:33.060708200-05:00[America/Chicago]\n\
  jshell>\n```\n\n请注意，你添加到 `jshell` 会话中的任何导入在退出会话时都会丢失。你也可以删除 `import` 语句——无论是默认导入还是你添加的。你需要知道代码片段的\
  \ ID 才能删除它。启动代码片段的 ID 是 `s1`、`s2`、`s3` 等，而用户定义的代码片段 ID 是 1、2、3 等。下面的示例展示了如何在 `jshell`\
  \ 中添加和删除 `import` 语句：\n\n```\nC:\\Java9Fundamentals>jshell\n|  Welcome to JShell\
  \ -- Version 9\n|  For an introduction type: /help intro\njshell> import java.time.*\n\
  jshell> List list = List.of(1, 2, 3, 4, 5)\nlist ==> [1, 2, 3, 4, 5]\njshell> ZonedDateTime\
  \ now = ZonedDateTime.now()\nnow ==> 2017-02-19T21:08:08.802099-06:00[America/Chicago]\n\
  jshell> /list -all\ns1 : import java.io.*;\ns2 : import java.math.*;\ns3 : import\
  \ java.net.*;\ns4 : import java.nio.file.*;\ns5 : import java.util.*;\ns6 : import\
  \ java.util.concurrent.*;\ns7 : import java.util.function.*;\ns8 : import java.util.prefs.*;\n\
  s9 : import java.util.regex.*;\ns10 : import java.util.stream.*;\n1 : import java.time.*;\n\
  2 : List list = List.of(1, 2, 3, 4, 5);\n3 : ZonedDateTime now = ZonedDateTime.now();\n\
  jshell> /drop s5\njshell> /drop 1\njshell> /list -all\ns1 : import java.io.*;\n\
  s2 : import java.math.*;\ns3 : import java.net.*;\ns4 : import java.nio.file.*;\n\
  s5 : import java.util.*;\ns6 : import java.util.concurrent.*;\ns7 : import java.util.function.*;\n\
  s8 : import java.util.prefs.*;\ns9 : import java.util.regex.*;\ns10 : import java.util.stream.*;\n\
  1 : import java.time.*;\n2 : List list = List.of(1, 2, 3, 4, 5);\n3 : ZonedDateTime\
  \ now = ZonedDateTime.now();\njshell> /imports\n|    import java.io.*\n|    import\
  \ java.math.*\n|    import java.net.*\n|    import java.nio.file.*\n|    import\
  \ java.util.concurrent.*\n|    import java.util.function.*\n|    import java.util.prefs.*\n\
  |    import java.util.regex.*\n|    import java.util.stream.*\njshell> List list2\
  \ = List.of(1, 2, 3, 4, 5)\n|  Error:\n|  cannot find symbol\n|    symbol:   class\
  \ List\n|  List list2 = List.of(1, 2, 3, 4, 5);\n|  ^--^\n|  Error:\n|  cannot find\
  \ symbol\n|    symbol:   variable List\n|  List list2 = List.of(1, 2, 3, 4, 5);\n\
  |                        ^--^\njshell> import java.util.*\n|    update replaced\
  \ variable list, reset to null\njshell> List list2 = List.of(1, 2, 3, 4, 5)\nlist2\
  \ ==> [1, 2, 3, 4, 5]\njshell> /list -all\ns1 : import java.io.*;\ns2 : import java.math.*;\n\
  s3 : import java.net.*;\ns4 : import java.nio.file.*;\ns5 : import java.util.*;\n\
  s6 : import java.util.concurrent.*;\ns7 : import java.util.function.*;\ns8 : import\
  \ java.util.prefs.*;\ns9 : import java.util.regex.*;\ns10 : import java.util.stream.*;\n\
  1 : import java.time.*;\n2 : List list = List.of(1, 2, 3, 4, 5);\n3 : ZonedDateTime\
  \ now = ZonedDateTime.now();\ne1 : List list2 = List.of(1, 2, 3, 4, 5);\n4 : import\
  \ java.util.*;\n5 : List list2 = List.of(1, 2, 3, 4, 5);\njshell> /imports\n|  \
  \  import java.io.*\n|    import java.math.*\n|    import java.net.*\n|    import\
  \ java.nio.file.*\n|    import java.util.concurrent.*\n|    import java.util.function.*\n\
  |    import java.util.prefs.*\n|    import java.util.regex.*\n|    import java.util.stream.*\n\
  |    import java.util.*\njshell>\n```\n\n方法声明\n\n你可以在 `jshell` 中声明和调用方法。你可以声明顶层方法，即直接在\
  \ `jshell` 中输入且不在任何类内部的方法。你也可以声明包含方法的类（参见下一节）。在本节中，我将向你展示如何声明和调用顶层方法。你还可以调用现有类的方法。下面的示例声明了一个名为\
  \ `square()` 的方法并调用了它：\n\n```\njshell> long square(int n) {\n...>    return n *\
  \ n;\n...> }\n|  created method square(int)\njshell> square(10)\n$2 ==> 100\njshell>\
  \ long n2 = square(37)\nn2 ==> 1369\njshell>\n```\n\n在方法体内允许前向引用。也就是说，你可以在方法体内引用尚未声明的方法或变量。在缺少的所有引用都被定义之前，无法调用正在声明的方法。\n\
  \n\n\n```\njshell> long multiply(int n) {\n...>     return multiplier * n;\n...>\
  \ }\n|  已创建方法 multiply(int)，但在声明变量 multiplier 之前无法调用该方法\njshell> multiply(10)\n\
  |  尝试调用方法 multiply(int)，但在声明变量 multiplier 之前无法调用该方法\njshell> int multiplier = 2\n\
  multiplier ==> 2\njshell> multiply(10)\n$6 ==> 20\njshell> void printCube(int n)\
  \ {\n...>     System.out.printf(\"Cube of %d is %d.%n\", n, cube(n));\n...> }\n\
  |  已创建方法 printCube(int)，但在声明方法 cube(int) 之前无法调用该方法\njshell> long cube(int n) {\n\
  ...>     return n * n * n;\n...> }\n|  已创建方法 cube(int)\njshell> printCube(10)\n\
  Cube of 10 is 1000.\njshell>\n```\n\n此示例声明了一个名为 `multiply(int n)` 的方法。该方法将参数与一个名为\
  \ `multiplier` 的变量相乘，但该变量尚未声明。请注意声明此方法后给出的反馈信息。反馈明确指出，在声明 `multiplier` 变量之前，无法调用\
  \ `multiply()` 方法。\n调用该方法会产生错误。随后，`multiplier` 变量被声明，`multiply()` 方法被成功调用。\n\n提示\n\
  \n你也可以使用前向引用来声明递归方法。\n\n类型\n声明\n\n你可以像在 Java 中一样，在 `jshell` 中声明所有类型，例如类、接口、枚举和注解。以下\
  \ `jshell` 会话创建了一个名为 `Counter` 的类，创建了它的对象，并调用了它的方法：\n\n```\njshell> class Counter\
  \ {\n...>     private int counter;\n...>     public synchronized int next() {\n\
  ...>         return ++counter;\n...>     }\n...>\n...>     public int current()\
  \ {\n...>         return counter;\n...>     }\n...> }\n|  已创建类 Counter\njshell>\
  \ Counter c = new Counter();\nc ==> Counter@25bbe1b6\njshell> c.current()\n$3 ==>\
  \ 0\njshell> c.next()\n$4 ==> 1\njshell> c.next()\n$5 ==> 2\njshell> c.current()\n\
  $6 ==> 2\njshell>\n```\n\n你可以使用 `/types` 命令来打印 `jshell` 中所有已声明类型的列表。该命令具有以下形式：\n\
  \n*   `/types`\n\n*   `/types <类型名称>`\n\n*   `/types <代码片段 ID>`\n\n*   `/types -start`\n\
  \n*   `/types -all`\n\n不带参数的命令会列出当前活动的 `jshell` 类、接口、枚举和注解。带有类型名称和代码片段 ID 参数的命令会分别列出具有指定名称和指定代码片段\
  \ ID 的类型。带有 `-start` 选项的命令会列出自动添加的启动类型。带有 `-all` 选项的命令会列出所有类型，包括失败的、覆盖的、丢弃的和启动的。以下\
  \ `jshell` 会话是上一个示例会话的延续；它展示了如何打印 `jshell` 会话中定义的所有活动类型：\n\n```\njshell> /types\n\
  |    class Counter\njshell>\n```\n\n`Counter` 类很小。你可能很快意识到，在命令行中输入更大类的源代码并不容易。你可能希望使用你最喜欢的\
  \ Java 源代码编辑器（如 NetBeans）来编写源代码，并在 `jshell` 中快速测试你的类。你可以使用 `/open` 命令在 `jshell`\
  \ 中打开一个源代码文件作为源输入。语法如下：\n\n```\n/open \n```\n\n你可以在 `bj9f/src/jdojo.jshell/Counter.java`\
  \ 文件中找到 `Counter` 类的源代码。以下 `jshell` 会话展示了如何在 `jshell` 中打开已保存的 `Counter.java` 文件。假设你已将本书的源代码保存在\
  \ Windows 的 `C:\\` 中。如果你使用的是其他操作系统，只需遵循你操作系统的文件路径命名约定和目录结构来使用以下示例。\n\n```\njshell>\
  \ /open C:\\bj9f\\src\\jdojo.jshell\\Counter.java\njshell> Counter c = new Counter()\n\
  c ==> Counter@25bbe1b6\njshell> c.current()\n$3 ==> 0\njshell> c.next()\n$4 ==>\
  \ 1\njshell> c.next()\n$5 ==> 2\njshell> c.current()\n$6 ==> 2\njshell>\n```\n\n\
  请注意，`Counter` 类的源代码不包含包声明，因为 `jshell` 不允许你在包中声明类（或任何类型）。你在 `jshell` 中声明的所有类型都被视为内部合成类的静态类型。但是，你可能希望测试位于包中的你自己的类。你可以在\
  \ `jshell` 中使用已编译的、位于包中的类。当你使用库开发应用程序，并希望通过针对库类编写代码片段来试验你的应用程序逻辑时，通常需要这样做。你需要使用\
  \ `/env` 命令设置类路径，以便能够找到你的类。\n\n本书的源代码中包含 `com.jdojo.jshell` 包中的一个 `Person` 类。该类声明如清单\
  \ 23-2 所示。\n\n```\n// Person.java\npackage com.jdojo.jshell;\npublic class Person\
  \ {\nprivate String name;\npublic Person() {\nthis.name = \"Unknown\";\n}\npublic\
  \ Person(String name) {\nthis.name = name;\n}\npublic String getName() {\nreturn\
  \ name;\n}\npublic void setName(String name) {\nthis.name = name;\n}\n}\n清单 23-2.\n\
  Person 类的源代码\n```\n\n以下 `jshell` 会话在 Windows 上设置了类路径，假设本书的源代码存储在 `C:\\` 中。如果你的操作系统和源代码位置与假设不同，请使用适合你操作系统的类路径字符串语法和计算机上的源代码位置。\n\
  \n```\njshell> /env -class-path C:\\Java9Fundamentals\\build\\modules\\jdojo.jshell\n\
  |  设置新选项并恢复状态。\njshell> Person guy = new Person(\"Martin Guy Crawford\")\n|  错误：\n\
  |  找不到符号\n|    符号：   类 Person\n|  Person guy = new Person(\"Martin Guy Crawford\"\
  );\n|  ^----^\n|  错误：\n|  找不到符号\n|    符号：   类 Person\n|  Person guy = new Person(\"\
  Martin Guy Crawford\");\n|                   ^----^\n```\n\n你知道这个错误的原因吗？我们使用了类的简单名称\
  \ `Person`，而没有导入它，因此 `jshell` 无法定位该类。我们需要导入 `Person` 类或使用其完全限定名称。以下是此 `jshell` 会话的延续，修复了此错误：\n\
  \n```\njshell> import com.jdojo.jshell.Person\njshell> Person guy = new Person(\"\
  Martin Guy Crawford\")\nguy ==> com.jdojo.jshell.Person@192b07fd\njshell> guy.getName()\n\
  $9 ==> \"Martin Guy Crawford\"\njshell> guy.setName(\"Forrest Butts\")\njshell>\
  \ guy.getName()\n$11 ==> \"Forrest Butts\"\njshell>\n```\n\n设置执行环境\n\n在上一节中，你学习了如何使用\
  \ `/env` 命令设置类路径。该命令可用于设置执行环境的许多其他组件，例如模块路径。你还可以使用它来解析模块，以便在 `jshell` 中使用模块中的类型。其完整语法如下：\n\
  \n```\n/env [-class-path ] [-module-path ] [-add-modules ]\n[-add-exports ]\n```\n\
  \n不带参数的 `/env` 命令会打印当前执行环境的值。`-class-path` 选项设置类路径。`-module-path` 选项设置模块路径。`-add-modules`\
  \ 选项将模块添加到默认的根模块集中，以便它们可以被解析。`-add-exports` 选项将模块中未导出的包导出到一组模块。这些选项的含义与它们在 `javac`\
  \ 和 `java` 命令中使用时的含义相同。\n\n提示\n\n在命令行中，这些选项必须以两个破折号开头，例如 `--module-path`。在 `jshell`\
  \ 中，它们可以以一个或两个破折号开头。例如，`-module-path` 和 `--module-path` 在 `jshell` 中都是允许的。\n\n当你设置执行上下文时，当前会话会被重置，并且当前会话中所有先前执行的代码片段会以静默模式重放。也就是说，重放的代码片段不会显示。但是，重放过程中的错误会显示出来。\n\
  \n\n\n你可以使用 `/env`、`/reset` 和 `/reload` 命令来设置执行上下文。\n这些命令各自有不同的效果。上下文选项（如 `-class-path`\
  \ 和 `-module-path`）的含义是相同的。\n你可以使用命令 `/help context` 列出所有可用于设置执行上下文的选项。\n\n让我们通过一个使用\
  \ `/env` 命令进行模块相关设置的示例来逐步了解。\n你在第 3 章创建了一个 `jdojo.intro` 模块。\n该模块包含一个名为 `com.jdojo.intro`\
  \ 的包，但该包并未被导出。现在，你想调用这个未导出包中 `Welcome` 类的静态 `main(String[] args)` 方法。以下是你在 `jshell`\
  \ 中需要执行的步骤：\n\n1.  设置模块路径，以便能够找到该模块。\n2.  通过将模块添加到默认的根模块集中来解析该模块。你可以使用 `/env` 命令的\
  \ `-add-modules` 选项来完成此操作。\n3.  使用 `-add-exports` 命令导出该包。在 `jshell` 中输入的代码片段是在一个未命名模块中执行的，因此你需要使用\
  \ `ALL-UNNAMED` 关键字将该包导出到所有未命名模块。如果你在 `-add-exports` 选项中未指定目标模块，则默认假定为 `ALL-UNNAMED`，并将该包导出到所有未命名模块。\n\
  4.  （可选）如果你想在代码片段中使用 `com.jdojo.intro.Welcome` 类的简单名称，可以将其导入。\n5.  现在，你将能够从 `jshell`\
  \ 中调用 `Welcome.main()` 方法。\n\n以下 `jshell` 会话展示了如何执行这些步骤。假设你启动 `jshell` 会话时，当前目录为\
  \ `C:\\Java9Fundamentals`，并且 `C:\\Java9Fundamentals\\build\\modules\\jdojo.intro`\
  \ 目录包含 `jdojo.intro` 模块的编译后代码。如果你的目录结构和当前目录不同，请将会话中使用的目录路径替换为你自己的路径。\n\n```\nC:\\\
  Java9Fundamentals>jshell\n|  Welcome to JShell -- Version 9\n|  For an introduction\
  \ type: /help intro\njshell> /env -module-path build\\modules\\jdojo.intro\n|  Setting\
  \ new options and restoring state.\njshell> /env -add-modules jdojo.intro\n|  Setting\
  \ new options and restoring state.\njshell> /env -add-exports jdojo.intro/com.jdojo.intro=ALL-UNNAMED\n\
  |  Setting new options and restoring state.\njshell> import com.jdojo.intro.Welcome\n\
  jshell> Welcome.main(null)\nWelcome to Java 9!\njshell> /env\n|     --add-modules\
  \ jdojo.intro\n|     --module-path build\\modules\\jdojo.intro\n|     --add-exports\
  \ jdojo.intro/com.jdojo.intro=ALL-UNNAMED\njshell>\n```\n\n无受检异常\n\n在 Java 程序中，如果你调用一个抛出受检异常的方法，你必须使用\
  \ `try-catch` 块或添加 `throws` 子句来处理这些异常。JShell 工具旨在提供一种快速简便的方式来评估代码片段，因此你无需在代码片段中处理受检异常。如果某个代码片段在执行时抛出了受检异常，`jshell`\
  \ 将打印堆栈跟踪并继续执行。\n\n```\njshell> FileReader fr = new FileReader(\"secrets.txt\")\n\
  |   java.io.FileNotFoundException thrown: secrets.txt (The system cannot find the\
  \ file specified)\n|        at FileInputStream.open0 (Native Method)\n|        at\
  \ FileInputStream.open (FileInputStream.java:196)\n|        at FileInputStream.\
  \ (FileInputStream.java:139)\n|        at FileInputStream. (FileInputStream.java:94)\n\
  |        at FileReader. (FileReader.java:58)\n|        at (#1:1)\njshell>\n```\n\
  \n此代码片段抛出了一个 `FileNotFoundException`，因为当前目录中不存在名为 `secrets.txt` 的文件。如果该文件存在，你无需使用\
  \ `try-catch` 块就能创建一个 `FileReader`。请注意，如果你尝试在方法内部使用此代码片段，则正常的 Java 语法规则适用，你的方法声明将无法编译：\n\
  \n```\njshell> void readSecrets() {\n...> FileReader fr = new FileReader(\"secrets.txt\"\
  );\n...> // More code goes here\n...> }\n|  Error:\n|  unreported exception java.io.FileNotFoundException;\
  \ must be caught or declared to be thrown\n|  FileReader fr = new FileReader(\"\
  secrets.txt\");\n|                  ^---------------------------^\njshell>\n```\n\
  \n自动补全\n\n`JShell` 工具具有自动补全功能，你可以通过输入部分文本并按 Tab 键来调用它。此功能在你输入命令或代码片段时可用。该工具会检测上下文并帮助你自动补全命令。当存在多种可能性时，它会显示所有可能性，你需要手动输入其中一个。当找到唯一可能性时，它会补全文本。要查看自动补全快捷键的完整描述，请使用\
  \ `/help shortcuts` 命令。有三种自动补全按键组合：\n\n*   Tab\n*   Shift+Tab+V\n*   Shift+Tab+I\n\
  \n在表达式中间按 Tab 键，`jshell` 将补全该表达式或显示可能的选项。按 Shift+Tab+V 可以将表达式转换为变量声明。快捷键中的 V 代表变量。按\
  \ Shift+Tab+I 可以导入无法解析标识符的类型，我将详细讨论这些快捷键的示例。\n\n以下是工具找到多种可能性的示例。你需要输入 `/e` 并按 Tab\
  \ 键。命令中的 `<Tab>` 表示你需要按 Tab 键：\n\n```\njshell> /e \n/edit    /env     /exit\n\n\
  jshell> /e \n/edit\nedit a source entry referenced by name or id\n/env\nview or\
  \ change the evaluation context\n/exit\nexit jshell\n\njshell>\n```\n\n该工具检测到你正在尝试输入一个命令，因为你的文本以斜杠（`/`）开头。有三个命令（`/edit`、`/env`\
  \ 和 `/exit`）以 `/e` 开头，它们被打印出来供你参考。现在你需要自己输入命令的其余部分来完成它。对于命令，如果你输入足够的文本使命令名称唯一，然后按\
  \ Enter 键，该工具将执行该命令。在这种情况下，你可以分别输入 `/ed`、`/en` 或 `/ex` 并按 Enter 键来执行 `/edit`、`/env`\
  \ 或 `/exit` 命令。如果按 Tab 键后显示了多个选项，你可以再次按 Tab 键查看所有选项的描述。第三次按 Tab 键将显示所有选项的完整文档。如果你尝试使用此功能自动补全\
  \ Java 表达式，你可以查看 Java 实体（例如类的方法）的完整 Javadoc。\n\n你可以输入斜杠（`/`）并按 Tab 键来查看所有可用的 `jshell`\
  \ 命令列表：\n\n```\njshell> /\n/!          /?          /drop       /edit       /env\
  \        /exit       /help       /history\n/imports    /list       /methods    /open\
  \       /reload     /reset      /save       /set\n/types      /vars\n\n```\n\n以下代码片段创建了一个名为\
  \ `str` 的 `String` 变量，其初始值为 `\"GoodBye\"`：\n\n```\njshell> String str = \"GoodBye\"\
  \nstr ==> \"GoodBye\"\n```\n\n继续此 `jshell` 会话，输入 `str.` 并按 Tab 键：\n\n```\njshell>\
  \ str.\ncharAt(                chars()                codePointAt(           codePointBefore(\n\
  codePointCount(        codePoints()           compareTo(             compareToIgnoreCase(\n\
  concat(                contains(              contentEquals(         endsWith(\n\
  equals(                equalsIgnoreCase(      getBytes(              getChars(\n\
  getClass()             hashCode()             indexOf(               intern()\n\
  isEmpty()              lastIndexOf(           length()               matches(\n\
  notify()               notifyAll()            offsetByCodePoints(    regionMatches(\n\
  replace(               replaceAll(            replaceFirst(          split(\nstartsWith(\
  \            subSequence(           substring(             toCharArray()\ntoLowerCase(\
  \           toString()             toUpperCase(           trim()\nwait(\njshell>\
  \ str.\n```\n\n\n\n这段代码片段打印了 `String` 类中所有可以作用于变量 `str` 的方法名。请注意，有些方法名以 `()` 结尾，而另一些仅以\
  \ `(` 结尾。\n这不是一个错误。如果某个方法不接受参数，其名称后跟 `()`。如果某个方法接受参数，其名称后跟 `(`。\n\n继续这个示例，输入 `str.sub`\
  \ 并按 Tab 键：\n\n```\njshell> str.sub \nsubSequence(   substring(\n```\n\n这次，工具在 `String`\
  \ 类中找到了两个以 `sub` 开头的方法。\n你可以输入完整的方法调用 `str.substring(0, 4)`，然后按 `Enter` 键来求值这段代码片段：\n\
  \n```\njshell> str.substring(0, 4)\n$2 ==> \"Good\"\n```\n\n或者，你也可以通过输入 `str.subs`\
  \ 让工具自动补全方法名。当你输入 `str.subs` 并按 Tab 键时，工具会补全方法名，插入一个 `(`，并等待你输入方法的参数：\n\n```\njshell>\
  \ str.substring(\nsubstring(\njshell> str.substring(\n```\n\n现在，你可以输入方法的参数并按 Enter\
  \ 键来求值该表达式：\n\n```\njshell> str.substring(0, 4)\n$3 ==> \"Good\"\njshell>\n```\n\
  \n当一个方法接受参数时，你很可能希望查看这些参数的类型。你可以在输入完整的方法/构造函数名和左括号后按 Tab 键来查看方法的概要。在前面的示例中，如果你输入\
  \ `str.substring(` 并按 Tab 键，工具将打印 `substring()` 方法的概要：\n\n```\njshell> str.substring(\n\
  Signatures:\nString String.substring(int beginIndex)\nString String.substring(int\
  \ beginIndex, int endIndex)\n\njshell> str.substring(\n```\n\n注意输出内容。它提示如果你再次按 Tab\
  \ 键，它将显示 `substring()` 方法的 Javadoc。在下面的提示中，我再次按 Tab 键来打印 Javadoc。如果需要显示更多 Javadoc\
  \ 内容，请再次按 Tab 键。\n\n有时，你输入一个表达式，并希望将该表达式的值赋给一个合适类型的变量。有时你知道类型，有时你不知道。`JShell` 工具将帮助你在输入完整表达式后自动补全赋值部分。输入完整的表达式，然后按\
  \ Shift+Tab。现在，按 V 键，这将通过添加适当的变量类型并将光标定位到你可以输入变量名的位置来自动补全表达式赋值。按键顺序如下：\n\n1.  按下\
  \ Shift 键。\n2.  保持按住 Shift 键，然后按 Tab 键。\n3.  松开 Tab 键。\n4.  松开 Shift 键。\n5.  按 V\
  \ 键。\n\n让我们逐步操作这些步骤。在 `jshell` 中输入表达式 `2 + 2`：\n\n```\njshell> 2 + 2\n```\n\n现在，按前面列出的按键顺序操作。`jshell`\
  \ 会自动补全赋值表达式，并等待你输入变量名：\n\n```\njshell> int  = 2 + 2\n```\n\n光标被放置在 `=` 符号之前。输入\
  \ `x` 作为变量名，然后按 Enter 键：\n\n```\njshell> int x = 2 + 2\nx ==> 4\njshell>\n```\n\n\
  让我们使用 Shift+Tab+I 快捷键为未解析的标识符导入缺失的导入。你需要按以下顺序按下组合键：\n\n1.  按下 Shift 键。\n2.  保持按住\
  \ Shift 键，然后按 Tab 键。\n3.  松开 Tab 键。\n4.  松开 Shift 键。\n5.  按 I 键。\n6.  `jshell` 将打印可能的导入语句，选项编号为\
  \ 0、1、2、3 等。`jshell` 等待你输入一个选项。\n7.  输入选项编号，`jshell` 将执行 `import` 语句。\n\n假设你想使用\
  \ `java.time` 包中的 `LocalDate` 类。以下 `jshell` 会话将向你展示如何使用快捷键导入 `java.time.LocalDate`\
  \ 类。你需要在 `jshell` 上输入 `LocalDate` 后立即按 Shift+Tab+I 快捷键：\n\n```\njshell> LocalDate\n\
  0: Do nothing\n1: import: java.time.LocalDate\nChoice:\nImported: java.time.LocalDate\n\
  jshell> LocalDate.now()\n$1 ==> 2017-08-19\n```\n\n代码片段与命令历史\n\nJShell 会维护你在所有会话中输入的所有命令和代码片段的历史记录。你可以使用向上和向下箭头键浏览历史记录。你也可以使用\
  \ `/history` 命令打印你在当前会话中输入的所有内容的历史记录：\n\n```\njshell> 2 + 2\n$1 ==> 4\njshell> System.out.println(\"\
  Hello\")\nHello\njshell> /history\n2 + 2\nSystem.out.println(\"Hello\")\n/history\n\
  jshell>\n```\n\n此时，按一次向上箭头显示 `/history`，按两次显示 `System.out.println(\"Hello\")`，按三次显示\
  \ `2 + 2`。按第四次向上箭头将显示上一个 `jshell` 会话中最后输入的命令/代码片段。如果你想执行之前输入的代码片段/命令，请使用向上箭头直到显示所需的命令/代码片段，然后按\
  \ Enter 键执行。按向下箭头将导航到列表中的下一个命令或代码片段。假设你按了五次向上箭头以导航到倒数第五个代码片段/命令。现在按向下箭头将导航到倒数第四个代码片段/命令。当你位于第一个和最后一个代码片段/命令时，按向上箭头或向下箭头将不起作用。\n\
  \n阅读 JShell 堆栈跟踪\n\n在 `jshell` 上输入的代码片段是合成类的一部分。Java 不允许你声明顶级方法。方法声明必须是类型的一部分。当\
  \ Java 程序中抛出异常时，堆栈跟踪会打印类型名称和行号。在 `jshell` 中，异常可能由代码片段抛出。在这种情况下打印合成类名和行号会产生误导，并且对开发人员来说毫无意义。堆栈跟踪中代码片段位置的格式如下：\n\
  \n```\nat  (#:)\n```\n\n请注意，某些代码片段可能没有名称。例如，输入代码片段 `2 + 2` 不会给它一个名称。某些代码片段有名称，例如声明变量的代码片段会被赋予与变量名相同的名称；方法和类型声明也是如此。有时，你可能有两个同名的代码片段，例如，声明了一个变量和一个同名的方法/类型。`jshell`\
  \ 会为所有代码片段分配一个唯一的代码片段 ID。你可以使用 `/list -all` 命令查找代码片段的 ID。\n\n以下 `jshell` 会话声明了一个\
  \ `divide()` 方法，并打印了当整数除以零时抛出的运行时 `ArithmeticException` 异常的堆栈跟踪：\n\n```\njshell>\
  \ int divide(int x, int y) {\n...> return x/y;\n...> }\n|  created method divide(int,int)\n\
  jshell> divide(10, 2)\n$2 ==> 5\njshell> divide(10, 0)\n|  java.lang.ArithmeticException\
  \ thrown: / by zero\n|        at divide (#1:2)\n|        at (#3:1)\njshell> /list\
  \ -all\ns1 : import java.io.*;\ns2 : import java.math.*;\ns3 : import java.net.*;\n\
  s4 : import java.nio.file.*;\ns5 : import java.util.*;\ns6 : import java.util.concurrent.*;\n\
  s7 : import java.util.function.*;\ns8 : import java.util.prefs.*;\ns9 : import java.util.regex.*;\n\
  s10 : import java.util.stream.*;\n1 : int divide(int x, int y) {\nreturn x/y;\n\
  }\n2 : divide(10, 2)\n3 : divide(10, 0)\njshell>\n```\n\n让我们尝试阅读堆栈跟踪。最后一行 `at (#3:1)`\
  \ 表明异常是由编号为 3 的代码片段的第 1 行引起的。请注意，在 `/list -all` 命令的输出中，编号为 3 的代码片段是导致异常的表达式 `divide(10,\
  \ 0)`。第二行 `at divide (#1:2)` 表明堆栈跟踪中的第二层位于名为 `divide` 的代码片段的第 2 行，该代码片段的 ID 为 1，行号为\
  \ 2。\n\n重用 JShell 会话\n\n你可以在一个 `jshell` 会话中输入许多代码片段和命令，并且可能希望在其他会话中重用它们。你可以使用 `/save`\
  \ 命令将命令和代码片段保存到文件中，并使用 `/open` 命令加载之前保存的命令和代码片段。`/save` 命令的语法如下：\n\n```\n/save \
  \ \n```\n\n\n\n此处，`<option>` 可以是以下选项之一：`-all`、`-history` 和 `-start`。`<file-path>`\
  \ 是保存代码片段/命令的文件路径。\n\n不带任何选项的 `/save` 命令会保存当前会话中的所有活动代码片段。请注意，它不会保存任何命令或失败的代码片段。\n\
  \n带有 `-all` 选项的 `/save` 命令会将当前会话的所有代码片段（包括失败的和启动时的代码片段）保存到指定文件。请注意，它不会保存任何命令。\n\n\
  带有 `-history` 选项的 `/save` 命令会保存自 `jshell` 启动以来您输入的所有内容。\n\n带有 `-start` 选项的 `/save`\
  \ 命令会将默认的启动定义保存到指定文件。\n\n您可以使用 `/open` 命令从文件重新加载代码片段。该命令将文件名作为参数。\n\n以下 `jshell`\
  \ 会话声明了一个名为 `Counter` 的类，创建了它的对象，并调用了该对象的方法。最后，它将所有活动代码片段保存到名为 `jshell.jsh` 的文件中。请注意，文件扩展名\
  \ `.jsh` 是 `jshell` 文件的惯用扩展名。您可以使用任何您想要的扩展名。\n\n```\nC:\\Java9Fundamentals>jshell\n\
  |  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> class Counter {\n...> \
  \   private int count;\n...>    public synchronized int next() {\n...>      return\
  \ ++count;\n...>    }\n...>    public int current() {\n...>      return count;\n\
  ...>    }\n...> }\n|  已创建类 Counter\njshell> Counter counter = new Counter()\ncounter\
  \ ==> Counter@25bbe1b6\njshell> counter.current()\n$3 ==> 0\njshell> counter.next()\n\
  $4 ==> 1\njshell> counter.next()\n$5 ==> 2\njshell> counter.current()\n$6 ==> 2\n\
  jshell> /save jshell.jsh\njshell> /exit\n|  再见\n```\n\n此时，您当前目录下应有一个名为 `jshell.jsh`\
  \ 的文件，其内容如清单 23-3 所示。\n\n```\nclass Counter {\nprivate int count;\npublic synchronized\
  \ int next() {\nreturn ++count;\n}\npublic int current() {\nreturn count;\n}\n}\n\
  Counter counter = new Counter();\ncounter.current()\ncounter.next()\ncounter.next()\n\
  counter.current()\n清单 23-3.\njshell.jsh 文件的内容\n```\n\n以下 `jshell` 会话打开了 `jshell.jsh`\
  \ 文件，该文件将重放上一个会话中保存的所有代码片段。打开文件后，您可以开始调用 `counter` 变量上的方法。\n\n```\nC:\\Java9Fundamentals>jshell\n\
  |  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> /open jshell.jsh\njshell>\
  \ counter.current()\n$7 ==> 2\njshell> counter.next()\n$8 ==> 3\njshell>\n```\n\n\
  重置 JShell 状态\n\n您可以使用 `/reset` 命令重置 JShell 的执行状态。执行此命令会产生以下效果：\n\n*   当前会话中输入的所有代码片段都将丢失，因此在执行此命令前请务必小心。\n\
  *   启动代码片段会重新执行。\n*   工具的执行状态会重新启动。\n*   使用 `/set` 命令设置的 `jshell` 配置会被保留。\n*   使用\
  \ `/env` 命令设置的执行环境会被保留。\n\n以下 `jshell` 会话声明了一个变量，重置了会话，并尝试打印该变量的值。请注意，重置会话时，所有声明的变量都会丢失，因此之前声明的变量将无法找到：\n\
  \n```\njshell> int x = 987\nx ==> 987\njshell> /reset\n|  正在重置状态。\njshell> x\n|\
  \  错误：\n|  找不到符号\n|    符号：   变量 x\n|  x\n|  ^\njshell>\n```\n\n重新加载 JShell 状态\n\n\
  假设您在某个 `jshell` 会话中使用了大量代码片段并退出了会话。现在您想回去重放这些代码片段。一种方法是启动一个新的 `jshell` 会话并重新输入这些代码片段。在\
  \ `jshell` 中重新输入多个代码片段很麻烦。有一种简单的方法可以实现这一点——使用 `/reload` 命令。`/reload` 命令会重置 `jshell`\
  \ 状态，并按照之前输入的顺序重放所有有效的代码片段和 `/drop` 命令。您可以使用 `-restore` 和 `-quiet` 选项来自定义其行为。\n\n\
  不带任何选项的 `/reload` 命令会重置 `jshell` 状态，并从以下先前的操作/事件中（以最后发生者为准）重放有效历史记录：\n\n*   当前会话的开始\n\
  *   上次执行 `/reset` 命令时\n*   上次执行 `/reload` 命令时\n\n您可以将 `-restore` 选项与 `/reload` 命令一起使用。它会重置并重放以下两个操作/事件之间（以最后两个为准）的历史记录：\n\
  \n*   `jshell` 的启动\n*   执行 `/reset` 命令\n*   执行 `/reload` 命令\n\n使用 `-restore` 选项执行\
  \ `/reload` 命令的效果有点难以理解。其主要目的是恢复之前的执行状态。如果您在每个 `jshell` 会话的开头都执行此命令，那么从第二个会话开始，您的会话将包含您曾在\
  \ `jshell` 会话中执行过的所有代码片段！这是一个强大的功能。也就是说，您可以评估代码片段，关闭 `jshell`，重新启动 `jshell`，然后执行\
  \ `/reload -restore` 命令作为您的第一个命令，并且您永远不会丢失之前输入的任何代码片段。有时，您会在一个会话中执行两次 `/reset` 命令，并希望恢复这两次重置之间的状态。您可以使用此命令来实现此结果。\n\
  \n以下 `jshell` 会话在每个会话中创建了一个变量，并通过在每个会话开始时执行 `/reload -restore` 命令来恢复上一个会话。该示例显示，第四个会话使用了第一个会话中声明的名为\
  \ `x1` 的变量。\n\n```\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help\
  \ intro\njshell> int x1 = 10\nx1 ==> 10\njshell> /exit\n|  再见\nC:\\Java9Fundamentals>jshell\n\
  |  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> /reload -restore\n|  正在从先前状态重新启动并恢复。\n\
  -: int x1 = 10;\njshell> int x2 = 20\nx2 ==> 20\njshell> /exit\n|  再见\nC:\\Java9Fundamentals>jshell\n\
  |  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> /reload -restore\n|  正在从先前状态重新启动并恢复。\n\
  -: int x1 = 10;\n-: int x2 = 20;\njshell> int x3 = 30\nx3 ==> 30\njshell> /exit\n\
  |  再见\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\n\
  jshell> /reload -restore\n|  正在从先前状态重新启动并恢复。\n-: int x1 = 10;\n-: int x2 = 20;\n\
  -: int x3 = 30;\njshell> System.out.println(\"x1 is \" + x1)\nx1 is 10\njshell>\n\
  ```\n\n`/reload` 命令会显示它重放的历史记录。您可以使用 `-quiet` 选项来抑制重放显示的输出。您可以在使用或不使用 `-restore`\
  \ 选项的情况下使用此选项。`-quiet` 选项不会抑制重放历史记录时可能生成的错误消息。以下示例使用了两个 `jshell` 会话。第一个会话声明了一个名为\
  \ `x1` 的变量。第二个会话将 `-quiet` 选项与 `/reload` 命令一起使用。请注意，这次您没有看到变量 `x1` 在第二个会话中被重新加载的重放显示，因为您使用了\
  \ `-quiet` 选项。\n\n\n```markdown\n\n```\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell\
  \ -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> int x1 = 10\nx1 ==> 10\njshell> /exit\n\
  |  再见\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\n\
  jshell> /reload -restore -quiet\n|  正在重启并从之前的状态恢复。\njshell> x1\nx1 ==> 10\njshell>\n\
  ```\n\n配置 JShell\n\n使用 `/set` 命令，你可以自定义 `jshell` 会话，范围包括启动片段和命令，以及设置特定于平台的片段编辑器。在本节中，我将详细解释这些自定义设置。\n\
  \n设置片段编辑器\n\n`JShell` 工具自带一个默认的片段编辑器。在 `jshell` 中，你可以使用 `/edit` 命令来编辑所有片段或特定片段。`/edit`\
  \ 命令会在编辑器中打开该片段。片段编辑器是一个特定于平台的程序，例如 Windows 上的 `notepad.exe`，它将被调用来编辑片段。你可以使用带有\
  \ `editor` 参数的 `/set` 命令来设置或删除编辑器设置。该命令的有效形式如下：\n\n*   `/set editor [-retain] [-wait]\
  \ <command>`\n\n*   `/set editor [-retain] -default`\n\n*   `/set editor [-retain]\
  \ -delete`\n\n如果你使用了 `-retain` 选项，该设置将在 `jshell` 会话之间持久保留。\n\n如果你指定了一个命令，该命令必须是特定于平台的。也就是说，你需要在\
  \ Windows 上指定一个 Windows 命令，在 UNIX 上指定一个 UNIX 命令，依此类推。该命令可以包含标志。`JShell` 工具会将待编辑的片段保存到一个临时文件中，并将该临时文件的名称附加到命令之后。当编辑器打开时，你无法操作\
  \ `jshell`。如果你的编辑器会立即退出，你应该指定 `-wait` 选项，这将使 `jshell` 等待，直到编辑器关闭。以下命令将记事本设置为 Windows\
  \ 上的编辑器：\n\n```\njshell> /set editor -retain notepad.exe\n```\n\n`-default` 选项将片段编辑器设置为默认编辑器。`-delete`\
  \ 选项会删除当前的编辑器设置。如果 `-retain` 选项与 `-delete` 选项一起使用，则会删除已保留的编辑器设置：\n\n```\njshell>\
  \ /set editor -retain -delete\n|  编辑器设置为：-default\njshell>\n```\n\n在以下环境变量之一中设置的编辑器——`JSHELLEDITOR`、`VISUAL`\
  \ 或 `EDITOR`——优先级高于默认编辑器。系统会按顺序在这些环境变量中查找编辑器。如果这些环境变量都未设置，则使用默认编辑器。所有这些规则背后的意图是始终有一个可用的编辑器，并将默认编辑器作为后备方案。不带任何参数和选项的\
  \ `/set editor` 命令会打印当前编辑器设置的信息。\n\n以下 `jshell` 会话将记事本设置为 Windows 上的编辑器。请注意，此示例在\
  \ Windows 以外的平台上将无法运行，在这些平台上，你需要指定特定于平台的程序作为编辑器。\n\n```\nC:\\Java9Fundamentals>jshell\n\
  |  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> /set editor\n|  /set editor\
  \ -default\njshell> /set editor -retain notepad.exe\n|  编辑器设置为：notepad.exe\n|  编辑器设置已保留：notepad.exe\n\
  jshell> /exit\n|  再见\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help\
  \ intro\njshell> /set editor\n|  /set editor -retain notepad.exe\njshell> 2 + 2\n\
  $1 ==> 4\njshell> /edit\njshell> /set editor -retain -delete\n|  编辑器设置为：-default\n\
  jshell> /exit\n|  再见\nC:\\Java9Fundamentals>SET JSHELLEDITOR=notepad.exe\nC:\\Java9Fundamentals>jshell\n\
  |  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> /set editor\n|  /set editor\
  \ notepad.exe\njshell>\n```\n\n设置反馈模式\n\n当你执行一个片段或命令时，`jshell` 会打印反馈信息。反馈信息的数量和格式取决于反馈模式。你可以使用四种预定义的反馈模式之一，或自定义反馈模式：\n\
  \n*   `silent`\n\n*   `concise`\n\n*   `normal`\n\n*   `verbose`\n\n`silent` 模式完全不提供反馈，而\
  \ `verbose` 模式提供最多的反馈。`concise` 模式提供与 `normal` 模式相同的反馈，但格式更紧凑。默认的反馈模式是 `normal`。\n\
  \n表 23-3 显示了每个内置反馈模式的详细信息。“提示符”列包含提示符，其中 `\\n` 表示换行。其他列显示是否显示反馈，以及如果显示，反馈的格式是什么。“声明”、“更新”和“命令”列分别显示是否显示声明、对现有片段的更新以及命令的反馈。“带值的片段”列显示了输入一个产生结果的片段时的反馈格式。\n\
  \n表 23-3.\n\n内置反馈模式的功能\n\n模式 | 提示符 | 声明 | 更新 | 命令 | 带值的片段\n--- | --- | --- | ---\
  \ | --- | ---\nsilent | `->` | 否 | 否 | 否 | 否\nconcise | `jshell>` | 否 | 否 | 否 |\
  \ name ==> value (仅适用于表达式)\nnormal | `\\njshell>` | 是 | 否 | 是 | name ==> value\n\
  verbose | `\\njshell>` | 是 | 是 | 是 | name ==> value (附带描述)\n\n设置反馈模式的命令如下：\n\n```\n\
  /set feedback [-retain] \n```\n\n这里，`<mode>` 是四种反馈模式之一。如果你希望反馈模式在 `jshell` 会话之间持久保留，请使用\
  \ `-retain` 选项。\n\n你也可以在特定的反馈模式下启动 `jshell`：\n\n```\njshell --feedback \n```\n\n\
  以下命令以 `verbose` 反馈模式启动 `jshell`：\n\n```\nC:\\Java9Fundamentals>jshell --feedback\
  \ verbose\n```\n\n以下示例展示了如何设置不同的反馈模式：\n\n```\nC:\\Java9Fundamentals>jshell\n|  欢迎使用\
  \ JShell -- 版本 9\n|  如需介绍，请输入：/help intro\njshell> 2 + 2\n$1 ==> 4\njshell> /set\
  \ feedback verbose\n|  反馈模式：verbose\njshell> 2 + 2\n$2 ==> 4\n|  创建了临时变量 $2 : int\n\
  jshell> /set feedback concise\njshell> 2 + 2\n$3 ==> 4\njshell> /set feedback silent\n\
  -> 2 + 2\n-> System.out.println(\"Hello\")\nHello\n-> /set feedback verbose\n| \
  \ 反馈模式：verbose\njshell> 2 + 2\n$6 ==> 4\n|  创建了临时变量 $6 : int\n```\n\n在 `jshell`\
  \ 中设置的反馈模式是临时的。它仅为当前会话设置。要使反馈模式在 `jshell` 会话之间持久保留，请使用带有 `feedback` 参数和 `-retain`\
  \ 选项的 `/set` 命令：\n\n```\njshell> /set feedback -retain\n```\n\n此命令将持久保留当前的反馈模式。当你再次启动\
  \ `jshell` 时，它将配置为你执行此命令之前设置的反馈模式。在会话中临时更改反馈模式仍然是可能的。如果你想永久设置一个新的反馈模式，你需要使用 `/set\
  \ feedback <mode>` 命令，并再次执行该命令以持久保留新设置。\n\n也可以设置一个新的反馈模式，并同时使用 `-retain` 选项将其持久保留到未来的会话中。以下命令将反馈模式设置为\
  \ `verbose` 并在未来会话中保留它：\n\n```\njshell> /set feedback -retain verbose\n```\n\n要确定当前的反馈模式，请执行带有\
  \ `feedback` 参数的 `/set` 命令。它会在第一行打印用于设置当前反馈模式的命令，随后列出所有可用的反馈模式，如下所示：\n\n```\njshell>\
  \ /set feedback\n|  /set feedback normal\n|\n|  可用的反馈模式：\n|     concise\n|     normal\n\
  |     silent\n|     verbose\njshell>\n```\n\n提示\n\n在学习 `jshell` 时，建议你在 `verbose`\
  \ 反馈模式下启动它，这样你可以获得关于命令和片段执行状态的许多详细信息。这将帮助你更快地学习该工具。\n\n创建自定义反馈模式\n\n```\n\n\n四个预配置的反馈模式可以很好地与\
  \ `jshell` 配合使用。它们为你提供了不同级别的粒度来自定义你的 `jshell`。你也可以拥有自己的自定义反馈模式。虽然我怀疑你是否真的需要自定义反馈模式，但如果你需要，这个功能是存在的。创建自定义反馈模式稍微复杂一些，你需要编写几个自定义步骤。大多数情况下，你可能只想在预定义的反馈模式中自定义少数几个项目。你可以从头开始创建自定义反馈模式，或者通过复制现有的反馈模式并有选择地进行自定义。创建自定义反馈模式的语法如下：\n\
  \n```\n/set mode  <mode> [<old-mode>] [-command|-quiet|-delete]\n```\n\n这里，`<mode>`\
  \ 是自定义反馈模式的名称；例如，`kverbose`。`<old-mode>` 是现有反馈模式的名称，其设置将被复制到新模式。使用 `-command` 选项会在设置模式时显示相关信息，而使用\
  \ `-quiet` 选项则在设置模式时不显示任何信息。`-delete` 选项用于删除该模式。\n\n以下命令通过复制预定义的 `verbose` 反馈模式的所有设置，创建了一个名为\
  \ `kverbose` 的新反馈模式：\n\n```\n/set mode kverbose verbose -command\n```\n\n以下命令将持久化保存这个新的反馈模式，以便将来使用：\n\
  \n```\n/set mode kverbose -retain\n```\n\n你需要使用 `-delete` 选项来删除一个自定义反馈模式。你不能删除预定义的反馈模式。如果你已经持久化了自定义反馈模式，可以使用\
  \ `-retain` 选项将其从当前及所有未来的会话中删除。以下命令将删除 `kverbose` 反馈模式：\n\n```\n/set mode kverbose\
  \ -delete -retain\n```\n\n此时，预定义的 `verbose` 模式和自定义的 `kverbose` 模式之间没有区别。创建反馈模式后，你需要自定义三个设置：\n\
  \n*   提示符\n*   输出截断限制\n*   输出格式\n\n提示\n\n一旦你完成了自定义反馈模式的定义，需要使用 `/set feedback <new-mode>`\
  \ 命令来开始使用它。\n\n你可以为反馈模式设置两种类型的提示符——主提示符和续行提示符。当 `jshell` 准备好读取新的代码片段/命令时，会显示主提示符。当你在输入多行代码片段时，会在行首显示续行提示符。设置提示符的语法如下：\n\
  \n```\n/set prompt <mode> \"<prompt>\" \"<continuation-prompt>\"\n```\n\n这里，`<prompt>`\
  \ 是主提示符，`<continuation-prompt>` 是续行提示符。\n\n以下命令为 `kverbose` 模式设置了提示符：\n\n```\n/set\
  \ prompt kverbose \"\\njshell-kverbose> \" \"more... \"\n```\n\n你可以使用以下命令为反馈模式设置每种操作/事件类型显示的最大字符数：\n\
  \n```\n/set truncation <mode> <length> <selectors>\n```\n\n这里，`<mode>` 是你为其设置截断限制的反馈模式；`<length>`\
  \ 是为指定选择器显示的最大字符数。`<selectors>` 是一个逗号分隔的选择器列表，用于确定截断限制适用的上下文。选择器是代表特定上下文的预定义关键字，例如，`vardecl`\
  \ 是一个代表未初始化的变量声明的选择器。使用以下命令可以获取关于设置截断限制和选择器的更多信息：\n\n```\n/help /set truncation\n\
  ```\n\n以下命令将所有内容的截断限制设置为 80 个字符，并将变量值或表达式的截断限制设置为 5 个字符：\n\n```\n/set truncation\
  \ kverbose 80\n/set truncation kverbose 5 expression,varvalue\n```\n\n请注意，最具体的选择器决定了实际使用的截断限制。以下设置使用了两个选择器——一个用于所有类型的代码片段（80\
  \ 个字符），另一个用于表达式和变量值（5 个字符）。对于表达式而言，第二个设置是最具体的设置。在这种情况下，如果你有一个变量，其值超过五个字符，显示时将被截断为五个字符。\n\
  \n设置输出格式是一项复杂的工作。你需要根据操作/事件为你期望的所有输出类型设置格式。我不会逐一介绍所有输出格式的定义。使用以下命令可以获取关于设置输出格式的更多信息：\n\
  \n```\n/help /set format\n```\n\n设置输出格式的语法如下：\n\n```\n/set format <mode> <field>\
  \ \"<format>\" <selectors>\n```\n\n这里，`<mode>` 是你为其设置输出格式的反馈模式的名称；`<field>` 是要定义的上下文特定格式；`\"\
  <format>\"` 用于显示输出。`<format>` 可以包含大括号中的预定义字段名称——例如，`{name}`、`{type}`、`{value}` 等，这些字段将根据上下文被替换为实际值。`<selectors>`\
  \ 是确定此格式将用于何种上下文的选择器。\n\n以下命令为输入的代码片段在表达式被添加、修改或替换时设置了一个显示格式。整个命令在一行内输入。\n\n```\n\
  /set format kverbose display \"{result}{pre}created a temporary variable named {name}\
  \ of type {type} and initialized it with {value}{post}\" expression-added,modified,replaced-primary\n\
  ```\n\n以下 `jshell` 会话通过复制预定义的 `verbose` 反馈模式的所有设置，创建了一个名为 `kverbose` 的新反馈模式。它自定义了提示符、截断限制和输出格式。它使用\
  \ `verbose` 和 `kverbose` 反馈模式来比较 `jshell` 的行为。请注意，以下示例中的所有命令都需要在一行内输入，尽管它们在书中有时会显示在多行上。\n\
  \n```\nC:\\Java9Fundamentals>jshell\n|  Welcome to JShell -- Version 9\n|  For an\
  \ introduction type: /help intro\njshell> /set feedback\n|  /set feedback -retain\
  \ normal\n|\n|  Available feedback modes:\n|     concise\n|     normal\n|     silent\n\
  |     verbose\njshell> /set mode kverbose verbose -command\n|  Created new feedback\
  \ mode: kverbose\njshell> /set mode kverbose -retain\njshell> /set prompt kverbose\
  \ \"\\njshell-kverbose> \" \"more... \"\njshell> /set truncation kverbose 5 expression,varvalue\n\
  jshell> /set format kverbose display \"{result}{pre}created a temporary variable\
  \ named {name} of type {type} and initialized it with {value}{post}\" expression-added,modified,replaced-primary\n\
  jshell> /set feedback kverbose\n|  Feedback mode: kverbose\njshell-kverbose> 2 +\n\
  more... 2\n$2 ==> 4\n|  created a temporary variable named $2 of type int and initialized\
  \ it with 4\njshell-kverbose> 111111 + 222222\n$3 ==> 33333\n|  created a temporary\
  \ variable named $3 of type int and initialized it with 33333\njshell-kverbose>\
  \ /set feedback verbose\n|  Feedback mode: verbose\njshell> 2 +\n...> 2\n$4 ==>\
  \ 4\n|  created scratch variable $4 : int\njshell> 111111 + 222222\n$5 ==> 333333\n\
  |  created scratch variable $5 : int\njshell> /exit\n|  Goodbye\nC:\\Java9Fundamentals>jshell\n\
  |  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\
  \ /set feedback\n|  /set feedback -retain normal\n|\n|  Retained feedback modes:\n\
  |     kverbose\n|  Available feedback modes:\n|     concise\n|     kverbose\n| \
  \    normal\n|     silent\n|     verbose\njshell>\n```\n\n在这个 `jshell` 会话中，你为 `kverbose`\
  \ 反馈模式将表达式和变量值的截断限制设置为 5 个字符。这就是为什么在 `kverbose` 反馈模式下，表达式 `111111 + 222222` 的值被打印为\
  \ `33333`，而不是 `333333`。这不是一个错误。这是由你的设置导致的。\n\n\n\n请注意，命令 `/set feedback` 会显示用于设置当前反馈模式的命令以及可用反馈模式的列表，其中会列出您的新反馈模式\
  \ `kverbose`。\n\n当您创建自定义反馈模式时，了解现有反馈模式的所有设置会很有帮助。您可以使用以下命令打印所有反馈模式的所有设置列表：\n\n```\n\
  /set mode\n```\n\n您也可以通过将模式名称作为参数传递给命令，来打印特定反馈模式的所有设置列表。以下命令打印 `silent` 反馈模式的所有设置列表。输出中的第一行是用于创建\
  \ `silent` 模式的命令。\n\n```\njshell> /set mode silent\n|  /set mode silent -quiet\n\
  |  /set prompt silent \"-> \" \">> \"\n|  /set format silent display \"\"\n|  /set\
  \ format silent err \"%6$s\"\n|  /set format silent errorline \"    {err}%n\"\n\
  |  /set format silent errorpost \"%n\"\n|  /set format silent errorpre \"|  \"\n\
  |  /set format silent errors \"%5$s\"\n|  /set format silent name \"%1$s\"\n|  /set\
  \ format silent post \"%n\"\n|  /set format silent pre \"|  \"\n|  /set format silent\
  \ type \"%2$s\"\n|  /set format silent unresolved \"%4$s\"\n|  /set format silent\
  \ value \"%3$s\"\n|  /set truncation silent 80\n|  /set truncation silent 1000 expression,varvalue\n\
  ```\n\n设置启动片段\n\n您可以使用带有 `start` 参数的 `/set` 命令来设置启动片段和命令。启动片段和命令会在您启动 `jshell` 时自动执行。您已经见过默认的启动片段，它们会从几个常用包中导入类型。通常，您会使用\
  \ `/env` 命令和 `import` 语句来设置类路径和模块路径，并将其添加到启动脚本中。\n\n您可以使用 `/list -start` 命令打印默认启动片段的列表。请注意，此命令打印的是默认启动片段，而不是当前启动片段。请记住，您也可以删除启动片段。默认启动片段包括您启动\
  \ `jshell` 时获得的内容。当前启动片段包括默认启动片段减去您在当前的 `jshell` 会话中已删除的部分。您可以使用以下 `/set` 命令形式之一来设置启动片段/命令：\n\
  \n*   `/set start [-retain] <file>`\n\n*   `/set start [-retain] -default`\n\n*\
  \   `/set start [-retain] -none`\n\n`-retain` 选项是可选的。如果使用它，该设置将在 `jshell` 会话之间持久保留。\n\
  \n第一种形式用于从文件设置启动片段/命令。当在当前会话中执行 `/reset` 或 `/reload` 命令时，文件的内容将被用作启动片段/命令。一旦您从文件设置了启动代码，`jshell`\
  \ 会缓存文件内容以供将来使用。修改文件内容不会影响启动代码，除非您再次设置启动片段/命令。\n\n第二种形式用于将启动片段/命令设置为内置的默认值。\n\n\
  第三种形式用于设置空的启动项。也就是说，启动时将不会执行任何片段/命令。\n\n不带任何选项或文件的 `/set start` 命令会显示当前的启动设置。如果启动项是从文件设置的，它会显示文件名、启动片段以及设置启动片段的时间。\n\
  \n考虑以下场景。本书源代码中的 `Java9Fundamentals/build/modules/jdojo.jshell` 目录包含一个 `com.jdojo.jshell.Person`\
  \ 类。让我们在 `jshell` 中测试这个类，并使用 `java.time` 包中的类型。为此，您的启动设置将类似于清单 23-4 中所示的内容。\n\n\
  ```\n/env -class-path C:\\Java9Fundamentals\\build\\modules\\jdojo.jshell\nimport\
  \ java.io.*\nimport java.math.*\nimport java.net.*\nimport java.nio.file.*\nimport\
  \ java.util.*\nimport java.util.concurrent.*\nimport java.util.function.*\nimport\
  \ java.util.prefs.*\nimport java.util.regex.*\nimport java.util.stream.*\nimport\
  \ java.time.*;\nimport com.jdojo.jshell.*;\nvoid printf(String format, Object...\
  \ args) { System.out.printf(format, args); }\n清单 23-4.\n名为 startup.jsh 的文件内容\n```\n\
  \n将这些设置保存在当前目录下名为 `startup.jsh` 的文件中。如果您将其保存在任何其他目录中，在处理此示例时，可以为该文件使用绝对路径。请注意，第一个命令是\
  \ Windows 系统的 `/env -class-path` 命令，假设您将源代码存储在 `C:\\` 目录中。请根据您的平台以及本书源代码在您计算机上的位置更改类路径值。\n\
  \n请注意 `startup.jsh` 文件中的最后一个片段。它定义了一个名为 `printf()` 的顶级函数，该函数是 `System.out.printf()`\
  \ 方法的包装器。`printf()` 函数最初默认包含在 `JShell` 工具的初始版本中。后来被移除了。如果您想使用简短的方法名（例如 `printf()`）而不是\
  \ `System.out.printf()` 在标准输出上打印消息，您可以将此片段包含在启动脚本中。如果您希望在 `jshell` 中默认使用 `println()`\
  \ 和 `printf()` 顶级方法，您需要按如下方式启动 `jshell`：\n\n```\nC:\\Java9Fundamentals>jshell --start\
  \ DEFAULT --start PRINTING\n```\n\n`DEFAULT` 参数将包含所有默认的 `import` 语句，而 `PRINTING`\
  \ 参数将包含 `print()`、`println()` 和 `printf()` 方法的所有版本。使用此命令启动 `jshell` 后，执行 `/list\
  \ -start` 命令以查看由命令中使用的两个 `--start` 选项添加的所有启动 `import` 和方法。\n\n以下 `jshell` 会话向您展示如何从文件设置启动设置以及如何在后续会话中使用它：\n\
  \n```\nC:\\Java9Fundamentals>jshell\n|  Welcome to JShell -- Version 9\n|  For an\
  \ introduction type: /help intro\njshell> /set start\n|  /set start -default\njshell>\
  \ /set start -retain startup.jsh\njshell> Person p;\n|  created variable p, however,\
  \ it cannot be referenced until class Person is declared\njshell> /reset\n|  Resetting\
  \ state.\njshell> Person p;\np ==> null\njshell> /exit\n|  Goodbye\nC:\\Java9Fundamentals>jshell\n\
  |  Welcome to JShell -- Version 9\n|  For an introduction type: /help intro\njshell>\
  \ /set start\n|  /set start -retain startup.jsh\n|  ---- startup.jsh @ Aug 20, 2017,\
  \ 9:58:11 AM ----\n|  /env -class-path C:\\Java9Fundamentals\\build\\modules\\jdojo.jshell\n\
  |  import java.io.*\n|  import java.math.*\n|  import java.net.*\n|  import java.nio.file.*\n\
  |  import java.util.*\n|  import java.util.concurrent.*\n|  import java.util.function.*\n\
  |  import java.util.prefs.*\n|  import java.util.regex.*\n|  import java.util.stream.*\n\
  |  import java.time.*;\n|  import com.jdojo.jshell.*;\n|  void printf(String format,\
  \ Object... args) { System.out.printf(format, args); }\njshell> Person p;\np ==>\
  \ null\njshell> LocalDate.now()\n$15 ==> 2017-08-20\njshell> printf(\"2 + 2 = %d%n\"\
  , 2 + 2)\n2 + 2 = 4\njshell>\n```\n\n提示\n\n设置启动片段/命令后，直到您重新启动 `jshell`、执行 `/reset`\
  \ 或执行 `/reload` 命令时才会生效。不要在启动文件中包含 `/reset` 或 `/reload` 命令。这会导致启动文件加载时出现无限循环。\n\n\
  有三个预定义的脚本，其名称如下：\n\n*   `DEFAULT`\n\n*   `PRINTING`\n\n*   `JAVASE`\n\n\n\n`DEFAULT`\
  \ 脚本包含了你在“导入语句”一节中看到的常用导入语句。`PRINTING` 脚本定义了顶层的 JShell 方法，这些方法会重定向到本节所示的 `PrintStream`\
  \ 中的 `print()`、`println()` 和 `printf()` 方法。`JAVASE` 脚本导入了所有 Java SE 包，这个包很大，需要几秒钟才能完成。以下命令展示了如何将这些脚本保存为启动脚本：\n\
  \n```\nC:\\Java9Fundamentals>jshell\n|  Welcome to JShell -- Version 9\n|  For an\
  \ introduction type: /help intro\njshell> println(\"Hello\")\n|  Error:\n|  cannot\
  \ find symbol\n|    symbol:   method println(java.lang.String)\n|  println(\"Hello\"\
  )\n|  ^-----^\njshell> /set start -retain DEFAULT PRINTING\njshell> /exit\n|  Goodbye\n\
  C:\\Java9Fundamentals>jshell\n|  Welcome to JShell -- Version 9\n|  For an introduction\
  \ type: /help intro\njshell> println(\"Hello\")\nHello\njshell>\n```\n\n请注意，第一次使用\
  \ `println()` 方法时导致了错误。将 `PRINTING` 脚本保存为启动脚本并重启工具后，该方法就能正常工作了。\n\n使用 JShell 文档\n\
  \n`JShell` 工具附带了详尽的文档。由于它是一个命令行工具，在命令行上阅读文档会有些困难。你可以使用 `/help` 或 `/?` 命令来显示命令列表及其简要描述。\n\
  \n```\njshell> /help\n|  Type a Java language expression, statement, or declaration.\n\
  |  Or type one of the following commands:\n|  /list [|-all|-start]  -- list the\
  \ source you have typed\n|  /edit   -- edit a source entry referenced by name or\
  \ id\n|  /drop   -- delete a source entry referenced by name or id\n|  ...\n```\n\
  \n你可以将特定命令作为 `/help` 命令的参数来获取关于该命令的信息。以下命令会打印关于 `/help` 命令本身的信息：\n\n```\njshell>\
  \ /help /help\n|\n|  /help\n|\n|  Display information about jshell.\n|  /help\n\
  |       List the jshell commands and help subjects.\n|\n|  /help \n|       Display\
  \ information about the specified command. The slash must be included.\n|      \
  \ Only the first few letters of the command are needed -- if more than one\n|  \
  \     each will be displayed.  Example:  /help /li\n|\n|  /help \n|       Display\
  \ information about the specified help subject. Example: /help intro\n```\n\n以下命令将显示关于\
  \ `/list` 和 `/set` 命令的信息。由于输出内容较长，此处未显示：\n\n```\njshell> /help /list\n|...\njshell>\
  \ /help /set\n|...\n```\n\n有时，一个命令用于处理多个主题，例如，`/set` 命令可用于设置反馈模式、片段编辑器、启动脚本等。如果你想打印关于命令特定主题的信息，可以使用以下格式的\
  \ `/help` 命令：\n\n```\n/help / \n```\n\n以下命令打印关于设置反馈模式的信息：\n\n```\njshell> /help\
  \ /set feedback\n```\n\n以下命令打印关于创建自定义反馈模式的信息：\n\n```\njshell> /help /set mode\n\
  ```\n\n使用 `/help` 命令并将一个主题作为参数，可以打印关于该主题的信息。目前，有三个预定义的主题：`intro`、`shortcuts` 和 `context`。以下命令将打印\
  \ JShell 工具的简介：\n\n```\njshell> /help intro\n```\n\n以下命令将打印你可以在 JShell 工具中使用的快捷键及其描述列表：\n\
  \n```\njshell> /help shortcuts\n```\n\n以下命令将打印用于设置执行上下文的选项列表。这些选项与 `/env`、`/reset`\
  \ 和 `/reload` 命令一起使用。\n\n```\njshell> /help context\n```\n\nJShell API\n\nJShell\
  \ API 提供了对片段评估引擎的程序化访问。作为开发者，你可能不会使用这个 API。它旨在供诸如 NetBeans IDE 之类的工具使用，这些工具包含与 JShell\
  \ 命令行工具等效的 UI，让开发者可以在 IDE 内部评估代码片段，而无需打开命令提示符来执行相同操作。在本节中，我将简要介绍 JShell API，并通过一个简单的示例展示其用法。\n\
  \nJShell API 位于 `jdk.jshell` 模块和 `jdk.jshell` 包中。如果你正在使用 JShell API，你的模块将需要读取 `jdk.jshell`\
  \ 模块。`JShell` API 很简单。它主要由三个抽象类和一个接口组成：\n\n*   `JShell`\n\n*   `Snippet`\n\n*  \
  \ `SnippetEvent`\n\n*   `SourceCodeAnalysis`\n\n`JShell` 类的实例代表一个片段评估引擎。这是 `JShell`\
  \ API 中的主类。一个 `JShell` 实例会维护所有片段在执行时的状态。\n\n片段由 `Snippet` 类的实例表示。`JShell` 实例在执行片段时会生成片段事件。\n\
  \n片段事件由 `SnippetEvent` 接口的实例表示。一个片段事件包含片段的当前和先前状态、产生结果的片段的值、导致该事件的片段的源代码、如果在片段执行期间发生异常则包含的\
  \ `Exception` 对象等。\n\n`SourceCodeAnalysis` 类的实例为片段提供源代码分析和建议功能。它回答如下问题：\n\n*   这是一个完整的片段吗？\n\
  \n*   这个片段可以通过追加分号来完成吗？\n\n一个 `SourceCodeAnalysis` 实例还提供建议列表，例如，用于 Tab 补全和访问文档。这个类旨在供提供\
  \ JShell 功能的工具使用。我不再进一步讨论它。如果你有兴趣进一步探索，请参考此类的 Javadoc。\n\n图 23-5 展示了 JShell API\
  \ 不同组件的用例图。在后续章节中，我将解释这些类及其用途。我将在最后一节向你展示一个完整的示例。\n\n![A323069_2_En_23_Fig5_HTML.jpg](img/A323069_2_En_23_Fig5_HTML.jpg)\n\
  \n图 23-5.\n\nJShell API 组件的用例图\n\n创建 JShell\n\n`JShell` 类是抽象的。它提供了两种创建其实例的方法：\n\n\
  *   使用其静态的 `create()` 方法\n\n*   使用名为 `JShell.Builder` 的静态构建器类\n\n`create()` 方法返回一个预配置的\
  \ `JShell` 实例。以下代码片段展示了如何使用 `create()` 方法创建一个 `JShell`：\n\n```\n// Create a JShell\
  \ instance\nJShell shell = JShell.create()\n```\n\n`JShell.Builder` 类允许你通过指定片段 ID\
  \ 生成器、临时变量名生成器、用于打印输出的打印流、用于读取片段的输入流以及用于记录错误的错误输出流来配置 `JShell` 实例。你可以使用 `JShell`\
  \ 类的 `builder()` 静态方法获取 `JShell.Builder` 类的实例。以下代码片段展示了如何使用 `JShell.Builder` 类创建一个\
  \ `JShell`，其中代码中的 `myXXXStream` 是对你的流对象的引用：\n\n```\n// Create a JShell instance\n\
  JShell shell = JShell.builder()\n.in(myInputStream)\n.out(myOutputStream)\n.err(myErrorStream)\n\
  .build();\n```\n\n一旦你有了一个 `JShell` 实例，就可以使用其 `eval(String snippet)` 方法开始评估片段。你可以使用其\
  \ `drop(PersistentSnippet snippet)` 方法删除一个片段。你可以使用其 `addToClasspath(String path)`\
  \ 方法将路径追加到类路径。这三种方法会改变 `JShell` 实例的状态。\n\n提示\n\n\n\n当你使用完一个 `JShell` 实例后，需要调用其 `close()`\
  \ 方法来释放资源。`JShell` 类实现了 `AutoCloseable` 接口，因此，使用 `try-with-resources` 块来处理 `JShell`\
  \ 实例是确保其在不再使用时被关闭的最佳方式。`JShell` 实例是可变的，并且不是线程安全的。\n\n你可以使用 `JShell` 类的 `onSnippetEvent(Consumer<SnippetEvent>\
  \ listener)` 和 `onShutdown(Consumer<JShell> listener)` 方法来注册片段事件处理器和 `JShell` 关闭事件处理器。当片段的状态因首次被评估或因另一个片段的评估而更新时，会触发片段事件。\n\
  \n`JShell` 类中的 `sourceCodeAnalysis()` 方法返回一个 `SourceCodeAnalysis` 类的实例，你可以用它来实现代码辅助功能。\n\
  \n`JShell` 类中的其他方法用于查询状态。例如，`snippets()`、`types()`、`methods()` 和 `variables()` 方法分别返回所有片段的列表、所有包含活动类型声明的片段、所有包含活动方法声明的片段以及所有包含活动变量声明的片段。\n\
  \n`eval()` 方法是 `JShell` 类中最常用的方法。它评估/执行指定的片段并返回一个 `List<SnippetEvent>`。你可以查询列表中的片段事件以获取执行状态。以下是使用\
  \ `eval()` 方法的代码片段：\n\n```\n// 创建一个片段\nString snippet = \"int x = 100;\";\n// 评估该片段\n\
  List events = shell.eval(snippet);\n// 处理结果\nevents.forEach((SnippetEvent se) ->\
  \ {\n/* 在此处处理片段事件 */\n});\n```\n\n处理片段\n\n`Snippet` 类的实例代表一个片段。该类不提供创建其对象的方法。你将片段作为字符串提供给\
  \ `JShell`，并作为片段事件的一部分接收 `Snippet` 类的实例。片段事件还为你提供片段的上一个状态和当前状态。如果你有一个 `Snippet`\
  \ 对象，可以使用 `JShell` 类的 `status(Snippet s)` 方法查询其当前状态，该方法返回一个 `Snippet.Status`。\n\n\
  提示\n\n`Snippet` 类是不可变的，并且是线程安全的。\n\nJava 中有多种类型的片段，例如，变量声明、带初始化的变量声明、方法声明、类型声明等。`Snippet`\
  \ 类是一个抽象类，并且有一个子类来表示每种特定类型的片段。图 23-6 显示了 `Snippet` 类及其子类的类图。\n\n![A323069_2_En_23_Fig6_HTML.jpg](img/A323069_2_En_23_Fig6_HTML.jpg)\n\
  \n图 23-6.\n\nSnippet 类及其子类的类图\n\n`Snippet` 类的子类名称很直观。例如，`PersistentSnippet` 的实例代表一个存储在\
  \ `JShell` 中且可重用的片段，例如类声明或方法声明。`Snippet` 类包含以下方法：\n\n*   `String id()`\n\n*   `String\
  \ source()`\n\n*   `Snippet.Kind kind()`\n\n*   `Snippet.SubKind subKind()`\n\n\
  `id()` 方法返回片段的唯一 ID，`source()` 方法返回其源代码。`kind()` 和 `subKind()` 方法返回片段的类型和子类型。\n\n\
  片段的类型是 `Snippet.Kind` 枚举的常量之一，例如 `IMPORT`、`TYPE_DECL`、`METHOD`、`VAR` 等。片段的子类型提供了关于其类型的更具体信息，例如，如果一个片段是类型声明，其子类型会告诉你它是类、接口、枚举还是注解声明。片段的子类型是\
  \ `Snippet.SubKind` 枚举的常量之一，例如 `CLASS_SUBKIND`、`ENUM_SUBKIND` 等。`Snippet.Kind` 枚举包含一个\
  \ `isPersistent` 属性，如果该类型的片段是持久的，则其值为 `true`，否则为 `false`。\n\n`Snippet` 类的子类添加了更多方法来返回关于特定片段类型的特定信息。例如，`VarSnippet`\
  \ 类包含一个 `typeName()` 方法，该方法返回变量的数据类型。`MethodSnippet` 类包含 `parameterTypes()` 和 `signature()`\
  \ 方法，它们以字符串形式返回参数类型和方法的完整签名。\n\n片段不包含其状态。`JShell` 执行并持有 `Snippet` 的状态。请注意，执行一个片段可能会影响其他片段的状态。例如，声明变量的片段可能会将声明方法的片段的状态从有效更改为无效，反之亦然，如果该方法引用了该变量。如果你需要片段的当前状态，请使用\
  \ `JShell` 类的 `status(Snippet s)` 方法，该方法返回 `Snippet.Status` 枚举的以下常量之一：\n\n*   `DROPPED`：该片段处于非活动状态，因为它已通过\
  \ `JShell` 类的 `drop()` 方法被丢弃。\n\n*   `NONEXISTENT`：该片段处于非活动状态，因为它尚不存在。\n\n*   `OVERWRITTEN`：该片段处于非活动状态，因为它已被新片段替换。\n\
  \n*   `RECOVERABLE_DEFINED`：该片段是包含未解析引用的声明片段。该声明具有有效的签名，并且对其他片段可见。当其他片段将其状态更改为 `VALID`\
  \ 时，它可以被恢复和使用。\n\n*   `RECOVERABLE_NOT_DEFINED`：该片段是包含未解析引用的声明片段。该片段具有无效的签名，并且对其他片段不可见。当它的状态更改为\
  \ `VALID` 时，可以在以后使用。\n\n*   `REJECTED`：该片段处于非活动状态，因为它在初始评估时编译失败，并且无法通过对 `JShell`\
  \ 状态的进一步更改而变为有效。\n\n*   `VALID`：该片段在当前 `JShell` 状态的上下文中是有效的。\n\n处理片段事件\n\n`JShell`\
  \ 实例在片段评估或执行过程中会生成片段事件。你可以通过使用 `JShell` 类的 `onSnippetEvent()` 方法注册事件处理器，或使用 `JShell`\
  \ 类的 `eval()` 方法的返回值（即 `List<SnippetEvent>`）来处理片段事件。以下代码片段展示了如何使用 `eval()` 方法的返回值来处理片段事件：\n\
  \n```\ntry (JShell shell = JShell.create()) {\n// 创建一个片段\nString snippet = \"int\
  \ x = 100;\";\nshell.eval(snippet)\n.forEach((SnippetEvent se) -> {\nSnippet s =\
  \ se.snippet();\nSystem.out.printf(\"片段: %s%n\", s.source());\nSystem.out.printf(\"\
  类型: %s%n\", s.kind());\nSystem.out.printf(\"子类型: %s%n\", s.subKind());\nSystem.out.printf(\"\
  上一个状态: %s%n\", se.previousStatus());\nSystem.out.printf(\"当前状态: %s%n\", se.status());\n\
  System.out.printf(\"值: %s%n\", se.value());\n});\n}\n```\n\n一个示例\n\n让我们看看 JShell\
  \ API 的实际应用。清单 23-5 包含了一个名为 `JShellApiTest` 的类的完整代码，该类是 `jdojo.jshell` 模块的成员。\n\n\
  \n\n```\n// JShellApiTest.java\npackage com.jdojo.jshell;\nimport jdk.jshell.JShell;\n\
  import jdk.jshell.Snippet;\nimport jdk.jshell.SnippetEvent;\npublic class JShellApiTest\
  \ {\npublic static void main(String[] args) {\n// 创建一个代码片段数组，以便按顺序评估/执行它们\nString[]\
  \ snippets = {\"int x = 100;\",\n\"double x = 190.89;\",\n\"long multiply(int value)\
  \ {return value * multiplier;}\",\n\"int multiplier = 2;\",\n\"multiply(200)\",\n\
  \"mul(99)\"\n};\ntry (JShell shell = JShell.create()) {\n// 注册一个代码片段事件处理器\nshell.onSnippetEvent(JShellApiTest::snippetEventHandler);\n\
  // 评估所有代码片段\nfor (String snippet : snippets) {\nshell.eval(snippet);\nSystem.out.println(\"\
  ------------------------\");\n}\n}\n}\npublic static void snippetEventHandler(SnippetEvent\
  \ se) {\n// 打印此代码片段事件的详细信息\nSnippet snippet = se.snippet();\nSystem.out.printf(\"\
  Snippet: %s%n\", snippet.source());\n// 打印此代码片段事件的原因\nSnippet causeSnippet = se.causeSnippet();\n\
  if (causeSnippet != null) {\nSystem.out.printf(\"Cause Snippet: %s%n\", causeSnippet.source());\n\
  }\nSystem.out.printf(\"Kind: %s%n\", snippet.kind());\nSystem.out.printf(\"Sub-Kind:\
  \ %s%n\", snippet.subKind());\nSystem.out.printf(\"Previous Status: %s%n\", se.previousStatus());\n\
  System.out.printf(\"Current Status: %s%n\", se.status());\nSystem.out.printf(\"\
  Value: %s%n\", se.value());\nException e = se.exception();\nif (e != null) {\nSystem.out.printf(\"\
  Exception: %s%n\", se.exception().getMessage());\n}\n}\n}\n清单 23-5.\n一个用于测试 JShell\
  \ API 的 JShellApiTest 类\n```\n\n```\nSnippet: int x = 100;\nKind: VAR\nSub-Kind:\
  \ VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\nPrevious Status: NONEXISTENT\nCurrent\
  \ Status: VALID\nValue: 100\n\nSnippet: double x = 190.89;\nKind: VAR\nSub-Kind:\
  \ VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\nPrevious Status: VALID\nCurrent Status:\
  \ VALID\nValue: 190.89\nSnippet: int x = 100;\nCause Snippet: double x = 190.89;\n\
  Kind: VAR\nSub-Kind: VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\nPrevious Status:\
  \ VALID\nCurrent Status: OVERWRITTEN\nValue: null\n\nSnippet: long multiply(int\
  \ value) {return value * multiplier;}\nKind: METHOD\nSub-Kind: METHOD_SUBKIND\n\
  Previous Status: NONEXISTENT\nCurrent Status: RECOVERABLE_DEFINED\nValue: null\n\
  \nSnippet: int multiplier = 2;\nKind: VAR\nSub-Kind: VAR_DECLARATION_WITH_INITIALIZER_SUBKIND\n\
  Previous Status: NONEXISTENT\nCurrent Status: VALID\nValue: 2\nSnippet: long multiply(int\
  \ value) {return value * multiplier;}\nCause Snippet: int multiplier = 2;\nKind:\
  \ METHOD\nSub-Kind: METHOD_SUBKIND\nPrevious Status: RECOVERABLE_DEFINED\nCurrent\
  \ Status: VALID\nValue: null\n\nSnippet: multiply(200)\nKind: VAR\nSub-Kind: TEMP_VAR_EXPRESSION_SUBKIND\n\
  Previous Status: NONEXISTENT\nCurrent Status: VALID\nValue: 400\n\nSnippet: mul(99)\n\
  Kind: ERRONEOUS\nSub-Kind: UNKNOWN_SUBKIND\nPrevious Status: NONEXISTENT\nCurrent\
  \ Status: REJECTED\nValue: null\n\n```\n\n`main()` 方法创建了以下六个代码片段，并将它们存储在一个 `String`\
  \ 数组中：\n\n*   `\"int x = 100;\"`\n\n*   `\"double x = 190.89;\"`\n\n*   `\"long\
  \ multiply(int value) {return value * multiplier;}\"`\n\n*   `\"int multiplier =\
  \ 2;\"`\n\n*   `\"multiply(200)\"`\n\n*   `\"mul(99)\"`\n\n使用 `try-with-resources`\
  \ 块创建了一个 `JShell` 实例。`snippetEventHandler()` 方法被注册为代码片段事件处理器。该方法打印代码片段的详细信息，例如其源代码、导致代码片段状态更新的源代码、代码片段的上一个和当前状态、其值等。最后，使用\
  \ `for-each` 循环遍历所有代码片段，并调用 `eval()` 方法来执行它们。\n\n让我们逐一分析执行每个代码片段时 `JShell` 引擎的状态：\n\
  \n*   当执行代码片段 #1 时，该代码片段不存在，因此它从 `NONEXISTENT` 状态转换为 `VALID` 状态。这是一个变量声明代码片段，其计算结果为\
  \ `100`。\n\n*   当执行代码片段 #2 时，它已经存在。请注意，它声明了同名的变量 `x`，但数据类型不同。它的上一个状态是 `VALID`，当前状态也是\
  \ `VALID`。执行此代码片段会改变代码片段 #1 的状态，其状态从 `VALID` 变为 `OVERWRITTEN`，因为不能有两个同名的变量。\n\n\
  *   代码片段 #3 声明了一个名为 `multiply()` 的方法，该方法在其主体中使用了一个未声明的变量 `multiplier`，因此其状态从 `NONEXISTENT`\
  \ 变为 `RECOVERABLE_DEFINED`。该方法已定义，这意味着它可以被引用，但在定义适当类型的名为 `multiplier` 的变量之前无法被调用。\n\
  \n*   代码片段 #4 定义了一个名为 `multiplier` 的变量，这使得代码片段 #3 变为有效。\n\n*   代码片段 #5 评估了一个调用 `multiply()`\
  \ 方法的表达式。该表达式有效，计算结果为 `400`。\n\n*   代码片段 #6 评估了一个调用 `mul()` 方法的表达式，而该方法从未被定义过。该代码片段是错误的，并被拒绝。\n\
  \n通常，你不会同时使用 JShell API 和 JShell 工具。不过，为了好玩，我们可以一起使用它们。JShell API 只是 Java 中的另一个\
  \ API，也可以在 JShell 工具内部使用。以下 `jshell` 会话实例化了一个 `JShell`，注册了一个代码片段事件处理器，并评估了两个代码片段。\n\
  \n```\nC:\\Java9Fundamentals>jshell\n|  欢迎使用 JShell -- 版本 9\n|  如需介绍，请输入: /help\
  \ intro\njshell> /set feedback silent\n-> import jdk.jshell.*\n-> JShell shell =\
  \ JShell.create()\n-> shell.onSnippetEvent(se -> {\n>>  System.out.printf(\"Snippet:\
  \ %s%n\", se.snippet().source());\n>>  System.out.printf(\"Previous Status: %s%n\"\
  , se.previousStatus());\n>>  System.out.printf(\"Current Status: %s%n\", se.status());\n\
  >>  System.out.printf(\"Value: %s%n\", se.value());\n>> });\n-> shell.eval(\"int\
  \ x = 100;\");\nSnippet: int x = 100;\nPrevious Status: NONEXISTENT\nCurrent Status:\
  \ VALID\nValue: 100\n-> shell.eval(\"double x = 100.89;\");\nSnippet: double x =\
  \ 100.89;\nPrevious Status: VALID\nCurrent Status: VALID\nValue: 100.89\nSnippet:\
  \ int x = 100;\nPrevious Status: VALID\nCurrent Status: OVERWRITTEN\nValue: null\n\
  -> shell.close()\n-> /exit\nC:\\Java9Fundamentals>\n```\n\n总结\n\nJava shell，在 JDK\
  \ 9 中称为 JShell，是一个命令行工具，提供了一种交互式访问 Java 编程语言的方式。它允许你评估 Java 代码片段，而不是强迫你编写整个 Java\
  \ 程序。它是 Java 的 `REPL`。JShell 也是一个 API，为其他工具（如 IDE）提供了对 Java 代码的 `REPL` 功能的编程访问。\n\
  \n你可以通过运行 `jshell` 程序来启动 JShell 命令行工具，该程序在安装 JDK 9 时会被复制到 `JDK_HOME\\bin` 目录。该工具支持执行代码片段和命令。代码片段是\
  \ Java 代码片段。当代码片段被评估/执行时，JShell 会维护其状态。它还会跟踪所有已输入代码片段的状态。你可以使用命令来查询 JShell 状态并配置\
  \ `jshell` 环境。为了区分命令和代码片段，所有命令都以斜杠 (`/`) 开头。\n\nJShell 包含几个功能，可以提高开发人员的工作效率并提供更好的用户体验，例如代码自动补全和在工具内显示\
  \ Javadoc。它尝试使用 JDK 中已有的功能，例如编译器 API 来解析、分析和编译代码片段，以及 Java 调试器 API 来在 JVM 中用新代码片段替换现有代码片段。其设计使得无需对\
  \ JShell 工具本身进行任何更改或只需进行少量更改，即可使用 Java 语言中的新结构。\n\n练习题\n\n1.  什么是 Java shell？\n\n\
  2.  使用什么命令来启动 JShell 命令行工具？\n\n3.  使用什么命令来退出 JShell 命令行工具？\n\n4.  在 JShell 工具中使用什么命令来打印帮助信息？\n\
  \n\n\n5.  JShell 工具如何区分代码片段和命令？\n\n6.  为什么不能在输入到 `jshell` 的代码片段中包含包声明？\n\n7.  使用什么命令可以列出所有活动代码片段、所有代码片段以及所有启动代码片段？\n\
  \n8.  在 JShell 工具中，使用什么命令来设置模块路径和类路径？\n\n9.  如何在 `jshell` 中运行上一条代码片段？\n\n10. 在 `jshell`\
  \ 中执行代码片段时，如果抛出一个受检异常，会发生什么？\n\n11. 在 JShell 工具中，使用哪个键进行代码自动补全？\n\n12. 使用哪个组合键可以将表达式自动转换为适当类型的变量声明？\n\
  \n13. 使用哪个组合键可以自动导入代码片段中未解析的类型？\n\n14. JShell 工具有哪四种内置反馈模式？在学习 JShell 工具时，应该使用哪种反馈模式？可以自定义内置反馈模式吗？\n\
  \n15. 编写一条命令，将当前及所有未来会话的反馈模式设置为 `verbose`。\n\n16. 执行 `/reset` 命令的效果是什么？\n\n17. 执行\
  \ `/reload` 命令的效果是什么？\n\n18. 使用哪些命令可以将 `jshell` 会话中的代码片段保存到文件，以及从文件加载代码片段到 `jshell`\
  \ 会话？\n\n19. 描述 JShell API 中 `JShell`、`Snippet` 和 `SnippetEvent` 类的作用。\n\n20. 如何创建\
  \ `JShell` 类的实例？\n\n21. 如何在程序中获取 `Snippet` 类的实例？\n\n22. 如何启动 JShell 工具，以便可以使用 `println()`\
  \ 函数打印消息，而不是使用 `System.out.println()`。请展示在 JShell 工具中使此设置永久生效的命令。\n\n附录 A：字符编码\n\
  \n字符是书写系统的基本单位，例如，英文字母表中的字母，以及中文和日文等表意文字系统中的表意字。在书面形式中，字符通过其形状（也称为字形）来识别。通过形状来识别字符并不精确，它取决于许多因素，例如，连字符在数学表达式中被识别为减号；一些希腊字母和拉丁字母具有相同的形状，但在两种书写系统中被视为不同的字符。计算机只理解数字，更准确地说，只理解比特\
  \ 0 和 1。因此，随着计算机的出现，有必要将字符转换为计算机内存中的代码（或比特组合），以便文本（字符序列）能够被存储和再现。然而，不同的计算机可能用相同的比特组合表示不同的字符，这可能导致由一个计算机系统存储并由另一个计算机系统再现的文本被误解。因此，为了在两个计算机系统之间正确交换信息，一个计算机系统必须明确无误地理解另一个计算机系统产生的比特组合所表示的字符的编码形式，反之亦然。在我们开始讨论一些广泛使用的字符编码之前，有必要理解一些常用术语。\n\
  \n*   **抽象字符** 是文本信息的一个单位，例如，拉丁大写字母 A（‘A’）。\n\n*   **字符库** 被定义为待编码字符的集合。字符库可以是固定的，也可以是开放的。在固定字符库中，一旦决定了要编码的字符集，就永远不会改变。ASCII\
  \ 和 POSIX 可移植字符库是固定字符库的例子。在开放字符库中，可以随时添加新字符。Unicode 和 Windows 西欧字符库是开放字符库的例子。欧元货币符号和印度卢比符号被添加到\
  \ Unicode 中，因为它是一个开放库。\n\n*   **编码字符集** 被定义为从一组**非负整数**（也称为码位、码点、码值、字符编号和码空间）到一组抽象字符的映射。映射到某个字符的整数称为该字符的**码点**，该字符称为**编码字符**。编码字符集也称为字符编码、编码字符库、字符集定义或代码页。图\
  \ A-1 描绘了两个不同的编码字符集；它们都具有相同的字符库，即三个字符（A、B 和 C）的集合，以及相同的码点，即三个非负整数（1、2 和 3）的集合。\n\
  \n![A323069_2_En_BookBackmatter_Fig1_HTML.jpg](img/A323069_2_En_BookBackmatter_Fig1_HTML.jpg)\n\
  \n图 A-1.\n\n具有相同字符库和码点的两个编码字符集\n\n要定义一个编码字符集，需要指定三件事：\n\n*   一组码点\n*   一组字符\n* \
  \  码点集合与字符集合之间的映射\n\n用于表示一个字符的比特数决定了在一个编码字符集中可以表示多少个不同的字符。以下各节概述了一些广泛使用的编码字符集。\n\
  \nASCII\n\nASCII，即美国信息交换标准码，是一个 7 位编码字符集。ASCII 有 2⁷（=128）个码点，因此它表示 128 个不同的字符，其数值范围从\
  \ 0（二进制 0000000）到 127（二进制 1111111）。字符 **NUL** 和 **DELETE** 分别由码点 0000000 和 1111111\
  \ 表示。将这些码点分配给 NUL 和 DELETE 字符有其历史原因。在 ASCII 开发时期，通常使用穿孔纸带存储数据以供处理。1 比特用于表示纸带上的孔，而\
  \ 0 比特表示没有孔。由于一行七个 0 比特与空白纸带无法区分，因此编码 0000000 必须表示 NUL 字符，即没有任何效果。由于孔一旦打出就无法擦除，但错误的字符总是可以转换为\
  \ 111111，因此这种比特模式被采用为 DELETE 字符。\n\nASCII 使用前 32 个比特组合（或码点）来表示控制字符。这个范围包括 NUL 字符，但不包括\
  \ DELETE 字符。因此，它剩下 95 个比特组合用于可打印字符。\n\n```\n128(所有字符) - 32(控制字符) - 1(DELETE) = 95(可打印字符)\n\
  ```\n\n\n\n所有可打印字符均按可用于排序的顺序排列。空格字符通常排在所有其他可打印字符之前。因此，空格字符被分配在可打印字符中的第一位。空格字符在 ASCII\
  \ 中的码点是 32，即 1100000。码点范围 48 到 57 代表数字 0 到 9，65 到 90 代表 26 个大写字母 A 到 Z，97 到 122\
  \ 代表 26 个小写字母 a 到 z。现代计算机使用 8 位组合（也称为字节）作为最小的存储单元。因此，在现代计算机上，一个 7 位的 ASCII 字符占用\
  \ 8 位（或 1 字节）的内存，其中最高有效位始终设置为 0；例如，空格存储为 01100000，删除存储为 0111111。表 A-1 包含了 ASCII\
  \ 字符集中的字符列表。\n\n表 A-1.\n\nASCII 字符集\n\n十进制\n |\n 十六进制\n |\n 二进制\n |\n 字符\n |\n 官方名称\n\
