  \n*   如何使用 `for` 循环和 `for`-`each` 循环遍历数组的元素\n\n*   如何将一个数组的元素复制到另一个数组\n\n*   如何复制基本类型和引用类型的数组\n\
  \n*   如何使用多维数组\n\n*   当需要可变长度数组时如何使用 `ArrayList`\n\n*   如何将 `ArrayList` 的元素转换为数组，反之亦然\n\
  \n*   如何执行与数组相关的操作，例如对数组元素进行排序、比较两个数组、在数组中进行二分查找、用某个值填充数组、获取数组的字符串表示等。\n\n本章中的所有示例程序都是\
  \ `jdojo.array` 模块的成员，如清单 19-1 中所声明。\n\n```\n// module-info.java\nmodule jdojo.array\
  \ {\nexports com.jdojo.array ;\n}\n清单 19-1.\njdojo.array 模块的声明\n```\n\n什么是数组？\n\n\
  数组是一种固定长度的数据结构，用于保存同一数据类型的多个值。让我们考虑一个例子，它将解释为什么我们需要数组。假设你被要求声明变量来保存三个员工的员工 ID。员工\
  \ ID 将是整数。保存三个整数值的变量声明如下所示：\n\n```\nint empId1, empId2, empId3;\n```\n\n如果员工数量增加到五个，你该怎么办？你可以修改变量声明，使其如下所示：\n\
  \n```\nint empId1, empId2, empId3, empId4, empId5;\n```\n\n\n\n如果员工数量增加到 1000 人，你会怎么做？你肯定不想声明\
  \ 1000 个 `int` 变量，比如 `empId1`、`empId2`……`empId1000`。\n即使你那样做了，生成的代码也会难以管理且笨拙不堪。在这种情况下，数组可以帮你解围。使用数组，你可以声明一个类型的变量，该变量可以容纳任意多个该类型的值。实际上，Java\
  \ 对数组能容纳的值的数量有限制。一个数组最多可以容纳 2,147,483,647 个值，这是 `int` 数据类型的最大值。\n\n是什么让一个变量成为数组？在变量声明中，将\
  \ `[]`（空方括号）放在数据类型之后或变量名之后，即可使该变量成为数组。例如，\n\n```\nint empId;\n```\n\n是一个简单的变量声明。这里，`int`\
  \ 是数据类型，`empId` 是变量名。这个声明意味着 `empId` 变量可以保存一个整数值。将 `[]` 放在前面声明的数据类型之后，如下所示：\n\n\
  ```\nint[] empId;\n```\n\n使得 `empId` 成为一个数组变量。前面的声明读作“`empId` 是一个 `int` 数组”。你也可以通过将\
  \ `[]` 放在变量名之后来使 `empId` 变量成为数组，如下所示：\n\n```\nint empId[];\n```\n\n这两种声明都是有效的。本书使用第一种约定来声明数组。我以声明一个变量来保存三个员工\
  \ ID 的示例开始了我们的讨论。到目前为止，你已经为在一个变量中保存多个值做好了准备。也就是说，你声明为 `int` 数组的 `empId` 变量能够保存多个\
  \ `int` 值。你的 `empId` 数组变量能保存多少个值？答案是你还不知道。你不能在声明数组时指定数组可以容纳的值的数量。后续章节将解释如何指定数组可以容纳的值的数量。你可以声明基本类型数组以及引用类型数组。以下是更多数组声明的示例：\n\
  \n```\n// salary 可以保存多个 float 值\nfloat[] salary;\n// name 可以保存多个对 String 对象的引用\n\
  String[] name;\n// emp 可以保存多个对 Employee 对象的引用\nEmployee[] emp;\n```\n\n提示\n\n数组是一种固定长度的数据结构，用于存储相同类型的数据项。数组的所有元素在内存中是连续存储的。\n\
  \n数组是对象\n\nJava 中的数组是一个对象。Java 中的每个对象都属于一个类；每个数组对象也是如此。你可以使用 `new` 运算符创建数组对象。你已经使用带有构造函数的\
  \ `new` 运算符来创建类的对象。构造函数的名称与类的名称相同。数组对象的类名是什么？这个问题的答案并不那么明显。我将在本章后面回答这个问题。\n\n现在，让我们专注于如何创建特定类型的数组对象。数组创建表达式的一般语法如下：\n\
  \n```\nnew <类型>[<大小>];\n```\n\n数组对象创建表达式以 `new` 运算符开头，后跟要存储在数组中的值的数据类型，再后跟一个用 `[]`（方括号）括起来的整数，该整数是数组中的元素数量。例如，你现在可以创建一个数组来存储五个\
  \ `int` 值，如下所示：\n\n```\nnew int[5];\n```\n\n在这个表达式中，`5` 是数组的长度（也称为数组的维度）。“维度”这个词也在其他上下文中使用。你可以有一维、二维、三维或更多维的数组。具有多个维度的数组称为多维数组。我将在本章后面介绍多维数组。在本书中，我将前面表达式中的\
  \ `5` 称为数组的长度，而不是数组的维度。\n\n请注意，前面的表达式在内存中创建了一个数组对象，该对象分配内存以存储五个整数。`new` 运算符返回内存中新对象的引用。如果你想在代码中稍后使用此对象，则必须将该引用存储在对象引用变量中。引用变量的类型必须与\
  \ `new` 运算符返回的对象引用类型匹配。在前面的情况下，`new` 运算符将返回一个 `int` 数组类型的对象引用。你已经看到了如何声明 `int` 数组类型的引用变量。声明如下：\n\
  \n```\nint[] empId;\n```\n\n要将数组对象引用存储在 `empId` 中，你可以这样写：\n\n```\nempId = new int[5];\n\
  ```\n\n你也可以将数组的声明和创建合并到一个语句中，如下所示：\n\n```\nint[] empId = new int[5];\n```\n\n如何创建一个数组来存储\
  \ 252 个员工 ID？你可以这样做：\n\n```\nint[] empId = new int[252];\n```\n\n你还可以在创建数组时使用表达式来指定数组的长度。\n\
  \n```\nint total = 23;\nint[] array1 = new int[total];     // array1 有 23 个元素\n\
  int[] array2 = new int[total * 3]; // array2 有 69 个元素\n```\n\n因为所有数组都是对象，所以它们的引用可以赋值给\
  \ `Object` 类型的引用变量。例如，\n\n```\nint[] empId = new int[5]; // 创建一个数组对象\nObject obj\
  \ = empId;       // 一个有效的赋值\n```\n\n但是，如果你在 `Object` 类型的引用变量中拥有数组的引用，则需要将其强制转换为适当的数组类型，然后才能将其赋值给数组引用变量或通过索引访问元素。请记住，每个数组都是一个对象。然而，并非每个对象都一定是数组。\n\
  \n```\n// 假设 obj 是 Object 类型的引用，它持有一个 int[] 的引用\nint[] tempIds = (int[]) obj;\n\
  ```\n\n访问数组元素\n\n一旦你使用 `new` 运算符创建了数组对象，就可以使用用方括号括起来的元素索引来引用数组的每个单独元素。第一个元素的索引是\
  \ 0，第二个元素是 1，第三个元素是 2，依此类推。这称为零基索引。数组最后一个元素的索引是数组长度减 1。如果你有一个长度为 5 的数组，数组元素的索引将是\
  \ 0、1、2、3 和 4。考虑以下语句：\n\n```\nint[] empId = new int[5];\n```\n\n`empId` 数组的长度是 `5`；它的元素可以被称为\
  \ `empId[0]`、`empId[1]`、`empId[2]`、`empId[3]` 和 `empId[4]`。\n\n引用数组中不存在的元素是运行时错误。例如，在代码中使用\
  \ `empId[5]` 将抛出异常，因为 `empId` 的长度为 `5`，而 `empId[5]` 引用的是第六个元素，该元素不存在。你可以按如下方式为数组元素赋值：\n\
  \n```\nempId[0] = 10;  // 将 10 赋值给 empId 的第一个元素\nempId[1] = 20;  // 将 20 赋值给 empId\
  \ 的第二个元素\nempId[2] = 30;  // 将 30 赋值给 empId 的第三个元素\nempId[3] = 40;  // 将 40 赋值给\
  \ empId 的第四个元素\nempId[4] = 50;  // 将 50 赋值给 empId 的第五个元素\n```\n\n表 19-1 显示了一个数组的详细信息。它显示了这些语句执行后数组元素的索引、值和引用。\n\
  \n表 19-1.\n\nempId 数组在内存中的数组元素\n\n元素索引\n |\n  `0`\n |\n  `1`\n |\n  `2`\n |\n  `3`\n\
  \ |\n  `4`\n |\n\n元素值\n |\n  `10`\n |\n  `20`\n |\n  `30`\n |\n  `40`\n |\n  `50`\n\
  \ |\n\n元素引用\n |\n  `empId[0]`\n |\n  `empId[1]`\n |\n  `empId[2]`\n |\n  `empId[3]`\n\
  \ |\n  `empId[4]`\n |\n\n以下语句将 `empId` 数组的第三个元素的值赋给一个 `int` 变量 `temp`：\n\n```\n\
  int temp = empId[2]; // 将 30 赋值给 temp\n```\n\n数组的长度\n\n数组对象有一个名为 `length` 的 `public\
  \ final` 实例变量，其中包含数组中的元素数量。\n\n\n\n```\nint[] empId = new int[5];  // 创建一个长度为 5\
  \ 的数组\nint len = empId.length;    // len 将被赋值为 5\n```\n\n请注意，`length` 是你创建的数组对象的属性。在创建数组对象之前，你无法使用它的\
  \ `length` 属性。以下代码片段说明了这一点：\n\n```\n// salary 是一个引用变量，可以引用一个 int 类型的数组。\n// 此时，它包含\
  \ null。也就是说，它没有引用任何有效的对象。\nint[] salary = null;\n// 运行时错误。salary 尚未引用任何数组对象。\nint\
  \ len = salary.length;\n// 创建一个长度为 1000 的 int 数组，并将其引用赋值给 salary\nsalary = new int[1000];\n\
  // 正确。len2 的值为 1000\nint len2 = salary.length;\n```\n\n通常，数组元素通过循环来访问。如果你想对数组的所有元素进行某种处理，你需要执行一个从索引\
  \ 0（零）到长度减 1 的循环。例如，要将值 10、20、30、40 和 50 赋值给长度为 `5` 的 `empId` 数组的元素，你可以执行如下所示的 `for`\
  \ 循环：\n\n```\nfor (int i = 0 ; i < empId.length; i++) {\nempId[i] = (i + 1) * 10;\n\
  }\n```\n\n需要注意的是，在执行循环时，循环条件必须检查数组索引/下标是否小于数组长度，例如 `\"i < empId.length\"`，因为数组索引从\
  \ 0 开始，而不是 1。程序员在使用 `for` 循环处理数组时另一个常见的错误是将循环计数器从 1 开始，而不是从 0 开始。如果你将前面代码中 `for`\
  \ 循环的初始化部分从 `int i = 0` 改为 `int i = 1`，会发生什么？它不会产生任何错误。但是，第一个元素 `empId[0]` 将不会被处理，也不会被赋值为\
  \ 10。\n\n数组创建后，其长度无法更改。你可能会试图修改 `length` 属性。\n\n```\nint[] roll = new int[5]; //\
  \ 创建一个包含 5 个元素的数组\n// 编译时错误。数组的 length 属性是 final 的，无法修改。\nroll.length = 10;\n```\n\
  \n你可以拥有一个长度为零的数组。这样的数组被称为空数组。\n\n```\n// 创建一个长度为零的数组\nint[] emptyArray = new int[0];\n\
  // len 将被赋值为 0\nint len = emptyArray.length;\n```\n\n提示\n\n数组使用基于零的索引。也就是说，数组的第一个元素的索引为零。数组在运行时动态创建。数组创建后，其长度无法修改。如果需要修改数组的长度，你必须创建一个新数组，并将旧数组中的元素复制到新数组中。数组的长度可以为零。\n\
  \n初始化数组元素\n\n回顾第 7 章，与类成员变量（实例变量和静态变量）不同，局部变量默认不会被初始化。除非局部变量已被赋值，否则你无法访问它。同样的规则也适用于空白的\
  \ final 变量。编译器使用**确定性赋值规则**来确保所有变量在程序中使用其值之前都已被初始化。\n\n无论数组在哪个作用域中创建，其元素总是会被初始化。基本数据类型的数组元素会被初始化为其数据类型的默认值。例如，数值型数组元素被初始化为零，`boolean`\
  \ 元素被初始化为 `false`，char 元素被初始化为 `'\\u0000'`。引用类型的数组元素被初始化为 `null`。以下代码片段说明了数组的初始化：\n\
  \n```\n// intArray[0]、intArray[1] 和 intArray[2] 默认被初始化为零。\nint[] intArray = new\
  \ int[3];\n// bArray[0] 和 bArray[1] 被初始化为 false。\nboolean[] bArray = new boolean[2];\n\
  // 引用类型数组的示例。strArray[0] 和 strArray[1] 被初始化为 null。\nString[] strArray = new String[2];\n\
  // 另一个引用类型数组的示例。\n// person 数组的所有 100 个元素都被初始化为 null。\nPerson[] person = new Person[100];\n\
  ```\n\n清单 19-2 说明了实例变量和某些局部变量的数组初始化。\n\n```\n// ArrayInit.java\npackage com.jdojo.array;\n\
  public class ArrayInit {\nprivate final boolean[] bArray = new boolean[3];  // 一个实例变量\n\
  public ArrayInit() {\n// 显示实例变量 bArray 元素的初始值\nfor (int i = 0; i < bArray.length;\
  \ i++) {\nSystem.out.println(\"bArray[\" + i + \"]:\" + bArray[i]);\n}\n}\npublic\
