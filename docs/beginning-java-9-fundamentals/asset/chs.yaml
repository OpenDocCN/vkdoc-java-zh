  通过应用抽象来定义 `getRangeSum` 过程，您获得了哪些优势？最重要的优势之一是隔离性。它与其他程序隔离。如果您修改其主体内部的逻辑，则其他程序（包括正在使用它的程序）无需修改。要打印
  `10` 和 `20` 之间整数的和，您可以使用以下程序：


  ```

  int s1 = getRangeSum(10, 20);

  System.out.println(s1);

  ```


  该过程的主体使用一个 `while` 循环，该循环执行的次数等于下限和上限之间的整数个数。`getRangeSum` 过程内部的 `while` 循环执行 `n`
  次，其中 `n` 等于 `(upperLimit – lowerLimit + 1)`。需要执行的指令数量取决于输入值。有一种更好的方法可以使用以下公式计算两个整数
  `lowerLimit` 和 `upperLimit` 之间所有整数的和：


  ```

  n = upperLimit - lowerLimit + 1;

  sum = n * (2 * lowerLimit + (n-1))/2;

  ```


  如果使用此公式，则计算两个整数之间所有整数之和所执行的指令数量始终相同。您可以重写 `getRangeSum` 过程的主体，如清单 1-4 所示。此处未显示 `getRangeSum`
  过程的规范。


  ```

  public int getRangeSum(int lowerLimit, int upperLimit) {

  int n = upperLimit - lowerLimit + 1;

  int sum = n * (2 * lowerLimit + (n-1))/2;

  return sum;

  }

  清单 1-4.

