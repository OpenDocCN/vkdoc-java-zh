  \n方法重写中的拼写错误风险\n\n有时，当你试图重写类中的方法时，很容易出错。可能看起来你已经重写了一个方法，但实际上并没有。考虑以下两个类，`C1`和`C2`：\n\
  \n```\n// C1.java\npackage com.jdojo.inheritance;\npublic class C1 {\npublic void\
  \ m1(double num) {\nSystem.out.println(\"Inside C1.m1(): \" + num);\n}\n}\n// C2.java\n\
  package com.jdojo.inheritance;\npublic class C2 extends C1 {\npublic void m1(int\
  \ num) {\nSystem.out.println(\"Inside C2.m1(): \" + num);\n}\n}\n```\n\n本意是让类`C2`中的`m1()`方法重写类`C1`的`m1()`方法。然而，事实并非如此。这是一个方法重载的情况，而不是方法重写。`C2`中的`m1()`方法被重载了；`m1(double\
  \ num)`继承自类`C1`，而`m1(int num)`在`C2`中声明。当你开始运行程序却没有得到期望的结果时，事情会变得更加困难。考虑以下代码片段：\n\
  \n```\nC1 c = new C2();\nc.m1(10); // 调用哪个方法 - C1.m() 还是 C2.m2()?\n```\n\n执行上述代码时应该打印什么？它会打印以下内容：\n\
  \n```\nInside C1.m1(): 10.0\n```\n\n你对前面代码片段的输出感到惊讶吗？让我们详细讨论一下当编译和执行前面代码片段时会发生什么。当编译器遇到第二条语句`c.m1(10)`时，它会执行以下操作：它找出引用变量\
  \ c 的编译时类型，即`C1`。\n\n\n\n它在 `C1` 中查找名为 `m1` 的方法。传递给方法 `m1()` 的参数值 `10` 是一个 `int`。编译器在\
  \ `C1` 中查找一个名为 `m1`（继承或声明的）且接受 `int` 参数的方法。它发现类 `C1` 有一个方法 `m1(double num)`，该方法接受一个\
  \ `double` 参数。编译器尝试进行类型拓宽转换，发现类 `C1` 中的 `m1(double num)` 方法可用于 `c.m1(10)` 的方法调用。此时，编译器为该调用绑定了方法签名。请注意，编译器绑定的是方法签名，而不是方法代码。方法代码在运行时绑定，因为\
  \ `m1()` 是一个实例方法。编译器不会决定 `c.m1(10)` 将执行哪个 `m1()` 方法的代码。请记住，编译器的决策完全基于它对类 `C1` 的了解。当编译\
  \ `c.m1(10)` 时，编译器不知道（也不关心）任何其他类的存在，例如 `C2`。你可以查看 Java 编译器为 `c.m1(10)` 方法调用生成的代码。你需要使用带有\
  \ `–c` 选项的 `javap` 命令行工具来反汇编编译后的代码，操作如下。你需要将类的完全限定名传递给 `javap` 命令。\n\n```\njavap\
  \ -c \n```\n\n对于包含 `c.m1(10)` 调用的前一个代码片段，`javap` 将打印编译器生成的指令。我只展示一条指令：\n\n```\n\
  12:  invokevirtual   #14; // Method com/jdojo/inheritance /C1.m1:(D)V\n```\n\n`invokevirtual`\
  \ 指令用于表示对将使用后期绑定的实例方法的调用。#14（对你来说可能不同）表示方法表条目编号，即 `C1.m1(D)V` 方法的条目。这个语法对你来说可能有点晦涩。字符\
  \ `D` 表示 `double`，即参数类型，而 `V` 表示 `void`，即方法 `m1()` 的返回类型。\n\n在运行时，当 JVM 尝试执行 `c.m1(10)`\
  \ 时，它使用后期绑定机制来查找将要执行的方法代码。请注意，JVM 将搜索 `m1(D)V` 方法签名，这是 void `m1(double)` 的编译器语法。它从查看\
  \ `c` 的运行时类型（即类 `C2`）开始搜索。类 `C2` 没有名为 `m1` 且接受 `double` 类型参数的方法。搜索沿着类层次结构向上移动到类\
  \ `C1`。JVM 在类 `C1` 中找到了该方法并执行它。这就是为什么你得到的输出表明 `c.m1(10)` 调用了类 `C1` 中的 `m1(double\
  \ num)`。\n\n这类错误非常难以排查。你可以通过使用 `@Override` 注解来避免此类错误。你已经在使用这个注解了。有关注解的更多信息，请参考本系列第二卷的第\
  \ 1 章。该注解具有编译器支持。编译器将确保使用 `@Override` 注解的方法确实覆盖了其超类中的方法。否则，它将生成一个错误。使用 `@Override`\
  \ 注解很简单。只需将其添加到方法声明中，位于方法返回类型之前的任何位置即可。以下类 `C2` 的代码为 `m1()` 方法使用了 `@Override` 注解：\n\
  \n```\npublic class C2 extends C1 {\n@Override\npublic void m1(int num) {\nSystem.out.println(\"\
  Inside C2.m1(): \" + num);\n}\n}\n```\n\n当你编译上述类 `C2` 的代码时，编译器将生成一个错误，指出类 `C2` 中的方法\
  \ `m1()` 没有覆盖其超类中的任何方法。对应该覆盖超类方法的方法使用 `@Override` 注解可以为你节省大量调试时间。请注意，`@Override`\
  \ 注解不会改变方法覆盖的工作方式。它被用作向编译器发出的指示，表明它需要确保该方法确实覆盖了其超类的方法。\n\nIs-a、has-a 和 part-of 关系\n\
  \n基于面向对象范式设计的软件应用程序由相互交互的对象组成。一个类的对象可能与另一个类的对象以某种方式相关联。Is-a、has-a 和 part-of 是两个类的对象之间最常用的三种关系。我已经讨论过，is-a\
  \ 关系是通过两个类之间的继承来建模的。例如，“兼职经理 is-a 经理”这种关系是通过让 `PartTimeManager` 类继承 `Manager` 类来建模的。\n\
  \n有时，一个类的对象包含另一个类的对象，这表示一种整体-部分关系。这种关系称为聚合。它也被称为 has-a 关系。has-a 关系的例子是“一个人 has-a\
  \ 地址”。作为一种整体-部分关系，人代表整体，地址代表部分。Java 没有任何特殊功能可以让你在代码中指示 has-a 关系。在 Java 代码中，聚合是通过在整体中使用一个类型为部分的实例变量来实现的。在这个例子中，`Person`\
  \ 类将有一个类型为 `Address` 的实例变量，如下所示。请注意，`Address` 类的对象是在 `Person` 类外部创建的，并传递给 `Person`\
  \ 类的构造函数。\n\n```\npublic class Address {\n// 代码写在这里\n}\npublic class Person {\n\
  // Person has-a Address\nprivate Address addr;\npublic Person(Address addr) {\n\
  this.addr = addr;\n}\n// 其他代码写在这里\n}\n```\n\n组合是聚合的一种特殊情况，其中整体控制着部分的生命周期。它也被称为 part-of\
  \ 关系。有时，has-a 和 part-of 关系可以互换使用。聚合和组合之间的主要区别在于，在组合中，整体控制着部分的创建/销毁。在组合中，部分不能独立存在。相反，部分是作为整体的一部分被创建和销毁的。考虑“CPU\
  \ 是计算机的一部分”这种关系。你也可以将这种关系重新表述为“计算机有一个 CPU”。CPU 在计算机之外存在有意义吗？答案是否定的。确实，计算机和 CPU 代表一种整体-部分关系。然而，这种整体-部分关系还有一些额外的约束，即“CPU\
  \ 的存在只有在计算机内部才有意义”。你可以通过在 Java 代码中声明一个类型为部分的实例变量，并在创建整体时创建部分对象来实现组合，如下所示。当创建 `Computer`\
  \ 时，会创建一个 CPU。当计算机被销毁时，CPU 也被销毁。\n\n```\npublic class CPU {\n// 代码写在这里\n}\npublic\
  \ class Computer {\n// CPU part-of Computer\nprivate CPU cpu = new CPU();\n// 其他代码写在这里\n\
  }\n```\n\nJava 有一种特殊的类类型，称为内部类，也可以用来表示组合。内部类的对象只能存在于其外部类的对象内部。外部类将是整体，内部类将是部分。你可以使用内部类来表示\
  \ CPU 和计算机之间的 part-of 关系，如下所示：\n\n```\npublic class Computer {\nprivate CPU cpu\
  \ = new CPU();\n// CPU 是 Computer 的内部类\nprivate class CPU {\n// 代码写在这里\n}\n// Computer\
  \ 类的其他代码写在这里\n}\n```\n\n将这种计算机和 CPU 之间的组合实现与之前的实现进行比较。当你使用内部类时，`CPU` 类的对象不能在没有 `Computer`\
  \ 类对象的情况下存在。当同一个类（例如 `CPU`）的对象是组合关系中另一个对象的一部分时，这种限制可能会带来问题。\n\n\n\n组合关系也表达了所有者-所属关系。计算机是所有者，CPU\
  \ 则被计算机所拥有。被拥有的对象不能脱离所有者对象而存在。通常（但不一定），当所有者对象被销毁时，被拥有的对象也会被销毁。有时，当所有者对象被销毁时，它会将被拥有对象的引用传递给另一个所有者。在这种情况下，被拥有对象在其当前所有者消亡后依然存在。需要重点注意的是，被拥有对象始终有一个所有者。\n\
  \n有时程序员会在使用继承还是组合之间感到困惑，从而用继承代替组合。你可以在 Java 类库中发现这类错误，例如 `java.util.Stack` 类继承自\
  \ `java.util.Vector` 类。`Vector` 是一个对象列表。`Stack` 也是一个对象列表，但它并非像 `Vector` 那样仅仅是对象列表。`Stack`\
  \ 应该只允许你将对象添加到其顶部，并从其顶部移除对象。然而，`Vector` 允许你在任意位置添加/移除对象。由于 `Stack` 类继承自 `Vector`\
  \ 类，它也继承了那些允许你在任意位置添加/移除对象的方法，这对于栈来说是完全错误的操作。`Stack` 类本应使用组合，将 `Vector` 对象作为其内部表示，而不是继承自它。以下代码片段展示了\
  \ `Stack` 和 `Vector` 类之间正确的“has-a”关系：\n\n```\npublic class Stack {\n// Stack has-a\
  \ Vector\nprivate Vector items = new Vector();\n// 其他代码\n}\n```\n\n提示\n\n当你在组合和继承之间犹豫不决时，优先选择组合。两者都能让你共享代码。然而，继承会强制你的类处于特定的类层次结构中。继承还会创建一个子类型，而组合则用于创建新类型。\n\
  \n无类的多重继承\n\n通常，类代表实现。Java 不支持实现的**多重继承**。也就是说，Java 中的一个类不能有多个超类。继承允许一个类从其超类继承实现和/或接口。在实现继承的情况下，超类为其子类继承和复用的功能提供实现。例如，`Employee`\
  \ 类实现了 `getName()` 和 `setName()` 方法，这些方法被 `Manager` 类继承。在接口继承的情况下，超类为其子类继承和实现的功能提供规范。请注意，在\
  \ Java 中声明 `abstract` 方法定义的是规范，而声明具体（非抽象）方法定义的是实现。例如，`Shape` 类有一个 `draw()` 方法的规范，该方法被其子类（如\
  \ `Rectangle` 和 `Circle`）继承。它没有为 `draw()` 方法提供任何实现。`Shape` 类的所有具体子类都必须为其 `draw()`\
  \ 方法提供实现。\n\n多重继承被定义为一个类从多个超类继承。当一个类从多个超类继承实现时，会带来一些问题。假设有两个类，`Singer` 和 `Employee`，它们都为处理薪资提供了实现（例如，一个\
  \ `pay()` 方法）。进一步假设你继承了一个类 `SingerEmployee`，它继承自 `Singer` 和 `Employee` 类。新类 `SingerEmployee`\
  \ 从两个具有不同实现的超类继承了 `pay()` 方法。当在 `SingerEmployee` 对象上调用 `pay()` 方法时，应该使用哪个 `pay()`\
  \ 方法——来自 `Employee` 类还是 `Singer` 类？\n\n多重继承使程序员和语言设计者的工作都变得复杂。Java 支持接口（或类型）的多重继承，但不支持实现的多重继承。它有一种称为接口的结构，与类不同。一个接口可以继承多个接口。一个类可以实现多个接口。Java\
  \ 仅支持类型多重继承的方法避免了程序员及其设计者遇到的问题。多重类型继承比多重实现继承更容易理解和设计。\n\n总结\n\n继承允许你根据另一个类的定义来定义一个类。继承是实现包含多态性的技术之一。它促进了代码复用。它允许你编写针对某个类及其所有子类都能工作的代码。子类根据某些规则继承其超类的成员。构造函数不是类的成员，因此不会被子类继承。\n\
  \n关键字 `extends` 用于让一个类继承另一个类。如果类声明中没有包含关键字 `extends`，则该类隐式继承自 `Object` 类。继承创建了一个树状的类层次结构——`Object`\
  \ 类位于所有类层次结构的顶端。`Object` 类本身没有超类。\n\nJava 支持两种类型的绑定：早期绑定和晚期绑定。在早期绑定中，编译器根据访问字段和方法的引用的编译时类型来确定要访问的字段和方法。Java\
  \ 对所有类型的字段和静态方法使用早期绑定。在晚期绑定中，引用变量的运行时类型决定了要执行的方法。继承与晚期绑定相结合，使得在 Java 中实现运行时多态性成为可能。Java\
  \ 对实例方法使用晚期绑定。\n\n超类的变量总是可以被赋予其子类的引用。这被称为向上转型。当子类的变量被类型转换并赋值给超类的变量时，这被称为向下转型。要使向下转型在运行时成功，超类的变量必须包含该子类或该子类的某个子类的引用。`instanceof`\
  \ 运算符用于测试一个引用变量是否是某个特定类的实例。\n\n你可以声明抽象类和抽象方法。关键字 `abstract` 用于声明抽象类和抽象方法。抽象类不能被实例化。如果一个类包含抽象方法，则该类必须声明为抽象类。即使一个类不包含任何抽象方法，它也可以被声明为抽象类。抽象方法应由子类重写并提供实现。\n\
  \n子类可以使用关键字 `super` 访问其超类的构造函数、方法和字段。调用超类构造函数的语句必须是子类构造函数中的第一条语句。\n\n在子类中重新定义超类的静态方法称为方法隐藏。与超类中字段同名的字段会隐藏超类中的该字段，这称为字段隐藏。被隐藏的方法可以通过使用超类名作为方法的限定符从子类中访问。你可以使用关键字\
  \ `super` 从子类访问被隐藏的字段。\n\n类和方法可以被声明为 `final`。`final` 类不能被继承。`final` 方法不能被重写。将类的所有构造函数声明为\
  \ `private` 也会阻止该类被继承。\n\n练习题\n\n1.  在类声明中，你使用哪个关键字来让你的类继承另一个类？\n\n2.  在以下类声明中，超类和子类的名称分别是什么？\n\
  \n```\n    public class Letter extends Document\n    ```\n\n3.  写出如下声明的类 `A` 的超类的完全限定名：\n\
  \n\n\n```\n    public class A {\n    }\n    ```\n\n4.  在 Java 中，一个类可以有多少个超类？\n\n\
  5.  你使用哪个关键字来调用超类的构造函数？请写出调用超类构造函数的语句，该构造函数接受一个字符串作为参数。参数值为 `\"Hello\"`。\n\n6. \
  \ 子类会继承超类中哪些类型的成员：`public`、`private`、`protected` 以及包级访问权限的成员？\n\n7.  当你在类中重写一个方法时，应该使用哪个注解，以便编译器能够验证你重写方法的意图？\n\
  \n8.  如何从子类中调用超类被重写的实例方法？请参考以下代码片段：\n\n```\n    public class A {\n    public void\
  \ print() {\n    System.out.println(\"A\");\n    }\n    }\n    public class B extends\
  \ A {\n    @Override\n    public void print() {\n    /* 你的单行代码写在这里 */\n    System.out.println(\"\
  B\");\n    }\n    public static void main(String[] args) {\n    new B().print();\n\
  \    }\n    }\n    ```\n\n完成类 `B` 的 `print()` 方法中的代码，这样当你运行类 `B` 时，它应该打印出以下内容。你需要调用类\
  \ `A` 的 `print()` 方法：\n\n```\n    A\n    B\n    ```\n\n9.  请写出以下类声明无法通过编译的原因。\n\n\
  ```\n    public abstract final class A {\n    // 代码写在这里\n    }\n    ```\n\n10. 请写出以下类\
  \ `B` 和类 `C` 的声明无法通过编译的原因。\n\n```\n    public class A {\n    public A(int x) {\n\
  \    }\n    }\n    public class B extends A {\n    }\n    public class C extends\
  \ A {\n    public C() {\n    }\n    }\n    ```\n\n11. 方法重载和方法重写之间的区别是什么？\n\n12.\
  \ 考虑以下类 `A` 和类 `B` 的声明。当运行类 `B` 时，会打印出什么？类 `B` 中方法 `m1()` 的声明是方法重写还是方法重载？请解释你的答案。\n\
  \n```\n    public class A {\n    public void m1(int x) {\n    System.out.println(\"\
  A.m1(): \" + x);\n    }\n    }\n    public class B extends A {\n    public void\
  \ m1(Integer x) {\n    System.out.println(\"B.m1(): \" + x);\n    }\n    public\
