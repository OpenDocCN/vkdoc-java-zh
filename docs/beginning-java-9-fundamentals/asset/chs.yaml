  \    ```\n\n18. 正则表达式\n\n在本章中，你将学习：\n\n*   如何创建正则表达式\n\n*   如何在 `String` 类中使用便捷方法执行基于正则表达式的查找和替换\n\
  \n*   如何使用 `Pattern` 类编译正则表达式\n\n*   如何使用 `Matcher` 类将正则表达式与输入字符串进行匹配\n\n*   如何在正则表达式中使用组\n\
  \n*   如何使用 `Matcher` 类执行高级查找和替换\n\n本章中的所有示例程序都是 `jdojo.regex` 模块的成员，如清单 18-1 中所声明。\n\
  \n```\n// module-info.java\nmodule jdojo.regex {\nexports com.jdojo.regex;\n}\n\
  清单 18-1.\njdojo.regex 模块的声明\n```\n\n什么是正则表达式？\n\n正则表达式是一种描述字符序列中模式的方式。该模式可用于验证字符序列、搜索字符序列、将匹配该模式的字符序列替换为其他字符序列等。\n\
  \n让我们从一个例子开始。假设你有一个字符串，它可能是一个电子邮件地址。你如何确保该字符串是有效的电子邮件地址格式？此时，你并不关心电子邮件地址是否存在。你只想验证其格式。\n\
  \n你需要根据一些规则来验证该字符串。例如，它必须包含一个 `@` 符号，该符号前面至少有一个字符，后面跟着一个域名。可选地，你可以指定 `@` 符号前面的文本只能包含字母、数字、下划线和连字符。域名必须包含一个点。你可能还想添加一些其他验证。如果你只想检查字符串中是否包含\
  \ `@` 字符，可以通过调用 `email.indexOf('@')` 来实现，其中 `email` 是保存电子邮件地址的字符串引用。如果你想确保电子邮件字符串中只有一个\
  \ `@` 字符，则需要添加更多逻辑。在这种情况下，根据你想要执行的验证数量，你最终可能会编写 20 到 50 行甚至更多的代码。\n\n这时正则表达式就派上用场了。它会使你的电子邮件地址验证变得简单。你只需一行代码即可完成。这听起来好得令人难以置信，不是吗？就在刚才，你还被告知可能需要编写\
  \ 50 行代码。现在你被告知只需一行代码就能完成同样的工作。这是真的。它确实可以用一行代码完成。在我详细介绍如何做到这一点之前，让我们先列出完成此任务所需的步骤。\n\
  \n*   要验证这类字符串，你需要识别你要寻找的模式。例如，在最简单的电子邮件地址验证形式中，字符串应由一些文本（至少一个字符）加上一个 `@` 符号，后跟一些表示域名的文本组成。现在让我们暂时忽略其他细节。\n\
  \n\n\n*   你需要一种表达已识别模式的方式。**正则表达式**就是用来描述这种模式的。\n*   你需要一个能将模式与输入字符串进行匹配的程序。这种程序也被称为**正则表达式引擎**。\n\
  \n假设你想测试一个字符串是否符合 `X@X` 的形式，其中 `X` 代表任意字符。\n字符串 `\"a@a\"`、\n`\"b@f\"`、`\"3@h\"`\
  \ 都属于这种形式。你可以从中观察到一个模式。这个模式是“一个字符\n后跟 `@`，\n再后跟另一个字符”。如何在 Java 中表达这个模式呢？\n\n在这种情况下，字符串\
  \ `\".@.\"` 将代表你的正则表达式。在 `\".@.\"` 中，点号具有\n特殊含义。它们代表任意字符。所有在正则表达式内部具有特殊含义的字符都被称为**元字符**。我将在下一节讨论\n\
  元字符。`String` 类包含\n一个 `matches()`\n方法。它接受一个正则表达式作为参数，如果整个\n字符串与正则表达式匹配，则返回 `true`；否则返回\
  \ `false`。该方法的签名是：\n\n```\nboolean matches(String regex)\n```\n\n清单 18-2 包含了\n演示如何使用\
  \ `String` 类的 `matches()` 方法的完整代码。\n\n```\n// RegexMatch.java\npackage com.jdojo.regex;\n\
  public class RegexMatch {\npublic static void main(String[] args) {\n// 准备一个正则表达式来表示模式\n\
  String regex = \".@.\";\n// 尝试将多个字符串与正则表达式进行匹配\nRegexMatch.matchIt(\"a@k\", regex);\n\
  RegexMatch.matchIt(\"webmaster@jdojo.com\", regex);\nRegexMatch.matchIt(\"r@j\"\
  , regex);\nRegexMatch.matchIt(\"a%N\", regex);\nRegexMatch.matchIt(\".@.\", regex);\n\
  }\npublic static void matchIt(String str, String regex) {\n// 测试模式匹配\nboolean matched\
  \ = str.matches(regex);\nSystem.out.printf(\"%s matched %s = %b%n\", str, regex,\
  \ matched);\n}\n}\n清单 18-2.\n将字符串与模式进行匹配\n```\n\n```\na@k matched .@. = true\nwebmaster@jdojo.com\
  \ matched .@. = false\nr@j matched .@. = true\na%N matched .@. = false\n.@. matched\
  \ .@. = true\n```\n\n需要注意的一些重要点如下：\n\n*   正则表达式 `\".@.\"` 没有匹配\n    `\"webmaster@jdojo.com\"\
  `，\n    因为一个点号只代表一个字符，并且 `String.matches()`\n    方法是将正则表达式中的模式与整个字符串进行匹配。请注意，字符串\
  \ `\"webmaster@jdojo.com\"`\n    包含由 `.@.` 表示的模式；也就是说，一个\n    字符后跟 `@` 和另一个\n  \
