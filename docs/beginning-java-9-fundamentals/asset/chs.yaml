- '# 1. 编程概念


  在本章中，你将学习：


  *   编程的通用概念

  *   编程的不同组成部分

  *   主要的编程范式

  *   什么是面向对象范式，以及它如何在 Java 中使用


  ## 什么是编程？


  “编程”一词在许多语境中都有使用。我们在此讨论其在人机交互语境中的含义。简单来说，编程就是编写一系列指令，告诉计算机执行特定任务的方式。给计算机的一系列指令被称为程序。编写程序需要使用一组定义明确的符号。这组用于编写程序的符号被称为编程语言。编写程序的人被称为程序员。程序员使用编程语言来编写程序。


  一个人如何告诉计算机执行一项任务？是一个人能告诉计算机执行任何任务，还是计算机只能执行一组预定义的任务？在我们探讨人机通信之前，先来看看人与人之间的通信。人与人之间是如何交流的？你可能会说，人与人之间的交流是通过口语语言完成的，例如英语、德语、印地语等。然而，口语并非人类之间唯一的交流方式。我们也通过书面语言或使用手势（不发出任何词语）进行交流。有些人甚至可以在相隔数英里的情况下，不使用任何词语或手势进行交流；他们可以在思想层面进行沟通。


  要实现成功的沟通，仅仅使用口语或书面语言等沟通媒介是不够的。双方成功沟通的主要要求是，双方都能理解对方所传达的内容。例如，假设有两个人。一个人会说英语，另一个人会说德语。他们能互相交流吗？答案是不能，因为他们无法理解对方的语言。如果我们在他们之间加入一个英德翻译，会发生什么？我们会同意，即使他们不能直接理解对方，也能借助翻译进行交流，对吗？


  计算机只理解二进制格式的指令，即由 0 和 1 组成的序列。所有计算机都能理解的 0 和 1 序列被称为机器语言或机器码。计算机有一套固定的基本指令集，它只能理解这些指令。每台计算机都有自己的指令集。例如，一台计算机可能使用
  `0010` 作为加法指令，而另一台计算机可能使用 `0101` 来实现相同的目的。因此，用机器语言编写的程序是依赖于机器的。机器码有时也被称为原生代码，因为它对于编写它的机器来说是原生的。用机器语言编写的程序，即使不是不可能，也是非常难以编写、阅读、理解和修改的。假设你想编写一个程序，将
  15 和 12 这两个数相加。用机器语言编写的加法程序看起来类似于下面这样。你不需要理解本节中编写的示例代码。它仅用于讨论和说明目的。


  ```

  0010010010  10010100000100110

  0001000100  01010010001001010

  ```


  这些指令用于将两个数相加。用机器语言编写一个执行复杂任务的程序会有多困难？基于这段代码，你现在可能意识到，用机器语言编写的程序非常难以编写、阅读和理解。但计算机难道不应该让我们的工作更轻松，而不是更困难吗？我们需要用某种更容易编写、阅读和理解的符号来表示计算机的指令，因此计算机科学家提出了另一种语言，称为汇编语言。汇编语言提供了不同的符号来编写指令。它比其前身机器语言更容易编写、阅读和理解一些。汇编语言使用助记符来表示指令，而不是机器语言中使用的二进制（0
  和 1）。用汇编语言编写的加法程序看起来类似于下面这样：


  ```

  li $t1, 15

  add $t0, $t1, 12

  ```


  如果你比较用两种不同语言编写的、执行相同任务的两个程序，你会发现汇编语言比机器码更容易编写、阅读和理解。对于给定的计算机架构，机器语言和汇编语言的指令之间存在一一对应关系。回想一下，计算机只理解机器语言的指令。用汇编语言编写的指令必须被翻译成机器语言后，计算机才能执行它们。将汇编语言编写的指令翻译成机器语言的程序被称为汇编器。图
  1-1 展示了汇编代码、汇编器和机器码之间的关系。


  ![A323069_2_En_1_Fig1_HTML.gif](img/A323069_2_En_1_Fig1_HTML.gif)


  图 1-1.


  汇编代码、汇编器和机器码之间的关系


  机器语言和汇编语言也被称为低级语言，因为程序员必须了解计算机的低级细节才能使用这些语言编写程序。例如，如果你用这些语言编写程序，你需要知道正在写入或读取哪个内存位置，使用哪个寄存器来存储特定值等。很快，程序员意识到需要一种更高级的编程语言，能够隐藏计算机的低级细节。这种需求催生了高级编程语言的发展，例如
  COBOL、Pascal、FORTRAN、C、C++、Java、C# 等。高级编程语言使用类似英语的单词、数学符号和标点符号来编写程序。用高级编程语言编写的程序也被称为源代码。它们更接近人类熟悉的书面语言。用高级编程语言（例如
  Java）编写的加法指令看起来类似于下面这样：


  ```

  int x = 15 + 12;

  ```




  你可能已经注意到，用高级语言编写的程序比用机器语言和汇编语言编写的程序更容易、更直观地编写、阅读、理解和修改。你可能已经意识到，计算机并不理解用高级语言编写的程序，因为它们只理解由
  0 和 1 组成的序列。因此，需要一种方法将用高级语言编写的程序翻译成机器语言。这种翻译由编译器、解释器或两者的结合来完成。**编译器**是一种将用高级编程语言编写的程序翻译成机器语言的程序。编译程序是一个含义过载的短语。通常，它意味着将用高级语言编写的程序翻译成机器语言。有时，它也用来指将用高级编程语言编写的程序翻译成较低级的编程语言，而不一定是机器语言。由编译器生成的代码称为**编译代码**。编译后的程序由计算机执行。


  执行用高级编程语言编写的程序的另一种方法是使用**解释器**。解释器不会一次性将整个程序翻译成机器语言。相反，它一次读取一条用高级编程语言编写的指令，将其翻译成机器语言，然后执行它。你可以将解释器视为一个模拟器。有时，可能会结合使用编译器和解释器来编译和运行用高级语言编写的程序。例如，用
  Java 编写的程序会被编译成一种称为**字节码**的中间语言。一个专门称为 Java 虚拟机（JVM）的解释器（针对 Java 平台）用于解释字节码并执行它。解释型程序的运行速度比编译型程序慢。如今大多数
  JVM 都使用**即时编译器（JIT）**，它会根据需要将整个 Java 程序编译成机器语言。有时，另一种称为**提前编译器（AOT）**的编译器会被用来将中间语言（例如
  Java 字节码）的程序编译成机器语言。图 1-2 展示了源代码、编译器和机器码之间的关系。


  ![A323069_2_En_1_Fig2_HTML.gif](img/A323069_2_En_1_Fig2_HTML.gif)


