  11    12      13\n21    22      23\n31    32      33\n```\n\nfor-each 语句\n\nJava\
  \ 5 引入了一种增强的 `for` 循环，称为 `for-each` 循环。它用于遍历数组和集合中的元素。此处包含本节是为了完善允许你循环遍历值集合的语句列表。有关\
  \ `for-each` 循环的详细说明，请参阅关于数组和集合的章节。`for`-`each` 循环的一般语法如下：\n\n```\nfor(Type element\
  \ : a_collection_or_an_array) {\n// 对于集合/数组中的每个元素，此代码将执行一次。\n// 每次执行此代码时，element\
  \ 变量都持有\n// 集合/数组中当前元素的引用\n}\n```\n\n以下代码片段打印一个 `int` 数组 `numList` 的所有元素：\n\n```\n\
  // 创建一个包含 4 个元素的数组\nint[] numList = {10, 20, 30, 40};\n// 在单独的行中打印数组的每个元素\nfor(int\
  \ num : numList) {\nSystem.out.println(num);\n}\n```\n\n```\n\n```\n\nwhile 语句\n\
  \n`while` 语句是另一种迭代（或循环）语句，用于在条件为真时重复执行一条语句。`while` 语句也称为 `while` 循环语句。`while` 循环语句的一般形式是：\n\
  \n```\nwhile (condition-expression)\nstatement\n```\n\n条件表达式必须是一个 `boolean` 表达式，并且语句可以是一个简单语句或一个块语句。首先计算条件表达式。如果它返回\
  \ `true`，则执行该语句。然后再次计算条件表达式。如果它返回 `true`，则执行该语句。此循环持续进行，直到条件表达式返回 `false`。图 6-4\
  \ 显示了 `while` 语句的流程图。\n\n![A323069_2_En_6_Fig4_HTML.gif](img/A323069_2_En_6_Fig4_HTML.gif)\n\
  \n图 6-4.\n\nwhile 语句的流程图\n\n与 `for` 循环语句不同，`while` 循环语句中的条件表达式不是可选的。例如，要使 `while`\
  \ 语句成为一个无限循环，你需要使用 `boolean` 字面量 `true` 作为条件表达式。\n\n```\nwhile (true)\nSystem.out.println\
  \ (\"这是一个无限循环\");\n```\n\n通常，一个 `for` 循环语句可以转换为一个 `while` 循环语句。然而，并非所有 `for` 循环语句都能转换为\
  \ `while` 循环语句。`for` 循环和 `while` 循环语句之间的转换如下所示：\n\n```\n// for 循环语句\nfor (initialization;\
  \ condition-expression; expression-list)\nstatement\n// 等效的 while 循环语句\ninitialization\n\
  while (condition-expression) {\nstatement\nexpression-list\n}\n```\n\n你可以使用 `while`\
  \ 循环打印 1 到 10 之间的所有整数，如下所示：\n\n```\nint i = 1;\nwhile (i <= 10) {\nSystem.out.println(i);\n\
  i++;\n}\n```\n\n这个 `while` 循环可以用以下三种不同的方式重写：\n\n```\n// #1\nint i = 0;\nwhile (++i\
  \ <= 10) {\nSystem.out.println(i);\n}\n// #2\nint i = 1;\nwhile (i <= 10) {\nSystem.out.println(i++);\n\
  }\n// #3\nint i = 1;\nwhile (i <= 10) {\nSystem.out.println(i);\ni++;\n}\n```\n\n\
  `break` 语句用于退出 `while` 循环语句中的循环。你可以使用 `break` 语句重写前面的示例，如下所示。请注意，以下代码仅用于说明 `break`\
  \ 语句在 `while` 循环中的使用；这并不是一个使用 `break` 语句的好例子。\n\n```\nint i = 1;\nwhile (true) {\
  \ /* 无法从这里退出循环，因为条件为 true */\nif (i <= 10) {\nSystem.out.println(i);\ni++;\n} else\
  \ {\nbreak; // 退出循环\n}\n}\n```\n\ndo-while 语句\n\n`do-while` 语句是另一种循环语句。它与 `while`\
  \ 循环语句类似，但有一个区别。如果条件表达式第一次求值就为 `false`，则与 `while` 循环语句关联的语句可能一次都不会执行。然而，与 `do-while`\
  \ 语句关联的语句至少会执行一次。`do-while` 语句的一般形式是：\n\n```\ndo\nstatement\nwhile (condition-expression);\n\
  ```\n\n请注意，`do-while` 语句以分号结尾。条件表达式必须是一个 `boolean` 表达式。语句可以是一个简单语句或一个块语句。首先执行该语句。然后计算条件表达式。如果它求值为\
  \ `true`，则再次执行该语句。此循环持续进行，直到条件表达式求值为 `false`。图 6-5 显示了 `do-while` 语句的流程图。\n\n![A323069_2_En_6_Fig5_HTML.gif](img/A323069_2_En_6_Fig5_HTML.gif)\n\
  \n图 6-5.\n\ndo-while 语句的流程图\n\n与 `for` 循环和 `while` 循环一样，可以使用 `break` 语句退出 `do-while`\
  \ 循环。`do-while` 循环可以计算 1 到 10 之间整数的和，如下所示：\n\n```\nint i = 1;\nint sum = 0;\ndo\
  \ {\nsum = sum + i; // 最好使用 sum += i\ni++;\n}\nwhile (i <= 10);\n// 打印结果\nSystem.out.println(\"\
  Sum = \" + sum);\n```\n\n```\nSum = 55\n```\n\n什么时候使用 `do-while` 语句而不是 `while` 语句？你可以将每个\
  \ `do-while` 语句重写为 `while` 语句，反之亦然。然而，在某些用例中使用 `do-while` 语句可以使你的代码更具可读性。考虑以下代码片段：\n\
  \n```\nString filePath = \"C:\\\\kishori\\\\poem.txt\";\nBufferedReader reader =\
  \ new BufferedReader(new FileReader(filePath));\nString line;\nwhile((line = reader.readLine())\
  \ != null) {\nSystem.out.println(line);\n}\n```\n\n这段代码一次读取文件的一行内容，并将其打印到标准输出。我省略了此代码片段的错误检查和导入语句的细节。它使用了\
  \ `while` 循环。以下代码片段使用 `do-while` 语句完成相同操作：\n\n```\nString filePath = \"C:\\\\kishori\\\
  \\poem.txt\";\nBufferedReader reader = new BufferedReader(new FileReader(filePath));\n\
  String line;\ndo {\nline = reader.readLine();\nif (line != null) {\nSystem.out.println(line);\n\
  }\n} while (line != null);\n```\n\n你可以看到，当你使用 `do-while` 语句时，逻辑流程并不顺畅。在打印之前，你不得不使用一个额外的\
  \ `if` 语句来检查是否读取了一行。在这种情况下，使用 `while` 语句是更好的选择。\n\n\n\n当循环的条件表达式依赖于循环内部计算的值时，你需要使用\
  \ `do-while` 语句。\n假设你需要让用户输入一个月份值，该值必须在 1 到 12 之间。程序会持续询问用户，直到输入一个有效值。在这种情况下，`do-while`\
  \ 语句更为合适。清单 6-3 包含了完整的程序。我省略了错误检查，例如当用户输入文本而非整数时的情况。\n\n```\n// UserInput.java\n\
  package com.jdojo.statement;\nimport java.util.Scanner;\npublic class UserInput\
  \ {\npublic static void main(String[] args) {\nScanner input = new Scanner(System.in);\n\
  int month;\ndo {\nSystem.out.print(\"Enter a month[1-12]: \");\n// 从用户处读取输入\nmonth\
  \ = input.nextInt();\n} while (month < 1 || month > 12);\nSystem.out.println(\"\
  You entered \" + month);\n}\n}\n清单 6-3.\n使用 do-while 语句接受有效的用户输入\n```\n\n```\nEnter\
  \ a month[1-12]: 20\nEnter a month[1-12]: -1\nEnter a month[1-12]: 0\nEnter a month[1-12]:\
  \ 9\nYou entered 9\n```\n\n`Scanner` 类用于从标准输入读取数据。在此例中，键盘就是标准输入。`Scanner` 类的 `nextInt()`\
  \ 方法从键盘读取下一个整数。程序在循环中运行，直到用户输入一个介于 1 和 12 之间的整数。如果用户输入了非整数值，程序将因错误而中止。\n\nbreak\
  \ 语句\n\n`break` 语句用于退出一个代码块。`break` 语句有两种形式：\n\n*   无标签 `break` 语句\n*   带标签 `break`\
  \ 语句\n\n无标签 `break` 语句的示例如下：\n\n```\nbreak;\n```\n\n带标签 `break` 语句的示例如下：\n\n```\n\
  break label;\n```\n\n你已经见过在 `switch`、`for` 循环、`while` 循环和 `do-while` 语句内部使用无标签 `break`\
  \ 语句的情况。它会将控制权转移出它所在的 `switch`、`for` 循环、`while` 循环或 `do-while` 语句。在这四种语句嵌套的情况下，如果在内部语句中使用无标签\
  \ `break` 语句，它只会将控制权转移出内部语句，而不会转移出外部语句。假设你想打印如下所示的 3x3 矩阵的下半部分：\n\n```\n\n21   \
  \   22\n31      32      33\n```\n\n要仅打印 3x3 矩阵的下半部分，你可以编写以下代码片段：\n\n```\nfor(int\
  \ i = 1; i <= 3; i++) {\nfor(int j = 1; j <= 3; j++) {\nSystem.out.print ( i + \"\
  \" + j);\nif (i == j) {\nbreak; // 退出内部 for 循环\n}\nSystem.out.print(\"\\t\");\n\
  }\nSystem.out.println();\n}\n```\n\n```\n\n21    22\n31    32      33\n```\n\n`break`\
  \ 语句被用在内部 `for` 循环语句中。当外层循环计数器 (`i`) 的值等于内层循环计数器 (`j`) 的值时，`break` 语句被执行，内层循环退出。如果你想从内部\
  \ `for` 循环语句中退出外层的 `for` 循环语句，则必须使用带标签的 `break` 语句。Java 中的标签是任何有效的 Java 标识符后跟一个冒号。以下是\
  \ Java 中一些有效的标签：\n\n*   `label1:`\n*   `alabel:`\n*   `Outer:`\n*   `Hello:`\n*\
  \   `IamALabel:`\n\n现在在前面的例子中使用带标签的 `break` 语句，看看结果。\n\n```\nouter:  // 定义一个名为 outer\
  \ 的标签\nfor(int i = 1; i <= 3; i++ ) {\nfor(int j = 1; j <= 3; j++ ) {\nSystem.out.print(i\
  \ + \"\" + j);\nif (i == j) {\nbreak outer;  // 退出外层 for 循环\n}\nSystem.out.print(\"\
  \\t\");\n}\nSystem.out.println();\n}  // outer 标签在此结束\n```\n\n前面代码片段的输出如下：\n\n```\n\
  \n```\n\n为什么它只打印了 3x3 矩阵的一个元素？这次你在内部 `for` 循环语句中使用了带标签的 `break` 语句。当 `i == j` 第一次求值为\
  \ `true` 时，带标签的 `break` 语句被执行。它将控制权转移出被标记为 `outer` 的代码块。请注意，`outer` 标签出现在外层 `for`\
  \ 循环语句之前。因此，与标签 `outer` 关联的代码块就是外层 `for` 循环语句。带标签的语句不仅可以在 `switch`、`for` 循环、`while`\
  \ 循环和 `do-while` 语句内部使用；它还可以与任何类型的块语句一起使用。以下是一个带标签 `break` 语句的简单示例：\n\n```\nblockLabel:\n\
  {\nint i = 10;\nif (i == 5) {\nbreak blockLabel; // 退出该代码块\n}\nif (i == 10) {\n\
  System.out.println(\"i is not five\");\n}\n}\n```\n\n关于带标签的 `break` 语句，需要记住的一个重要点是：与\
  \ `break` 语句一起使用的标签必须是该带标签 `break` 语句所在代码块的标签。以下代码片段说明了带标签 `break` 语句的错误用法：\n\n\
  ```\nlab1:\n{\nint i = 10;\nif (i == 10)\nbreak lab1; // 正确。此处可以使用 lab1\n}\nlab2:\n\
  {\nint i = 10;\nif (i == 10)\n// 编译时错误。此处不能使用 lab1\n// 因为此代码块与 lab1 标签无关。\n// 在此代码块中只能使用\
  \ lab2。\nbreak lab1;\n}\n```\n\ncontinue 语句\n\n`continue` 语句只能用在 `for` 循环、`while`\
  \ 循环和 `do-while` 语句内部。`continue` 语句有两种形式：\n\n*   无标签 `continue` 语句\n*   带标签 `continue`\
  \ 语句\n\n无标签 `continue` 语句的示例如下：\n\n```\ncontinue;\n```\n\n带标签 `continue` 语句的示例如下：\n\
  \n```\ncontinue label;\n```\n\n当在 `for` 循环内部执行 `continue` 语句时，循环体中剩余的语句将被跳过，并执行表达式列表中的表达式。你可以使用\
  \ `for` 循环语句打印 1 到 10 之间的所有奇数，如下所示：\n\n```\nfor (int i = 1; i < 10; i += 2) {\n\
  System.out.println(i);\n}\n```\n\n在这个 `for` 循环语句中，你在表达式列表中将 `i` 的值递增 2。你可以使用 `continue`\
  \ 语句重写前面的 `for` 循环语句，如图 6-6 所示。\n\n![A323069_2_En_6_Fig6_HTML.gif](img/A323069_2_En_6_Fig6_HTML.gif)\n\
  \n图 6-6.\n\n在 for 循环语句中使用 continue 语句\n\n表达式 `i % 2` 对于 2 的倍数的 `i` 值返回 0，并且表达式 `i\
  \ % 2 == 0` 返回 `true`。在这种情况下，`continue` 语句被执行，最后一条语句 `System.out.println(i)` 被跳过。在\
  \ `continue` 语句执行后，递增语句 `i++` 被执行。前面的代码片段当然不是使用 `continue` 语句的最佳示例；然而，它足以说明其用法。\n\
  \n当在 `while` 循环或 `do-while` 循环内部执行无标签 `continue` 语句时，循环中剩余的语句将被跳过，并计算条件表达式以进行下一次迭代。例如，图\
  \ 6-7 中的代码片段将使用 `while` 循环内部的 `continue` 语句打印 1 到 10 之间的所有奇数。\n\n![A323069_2_En_6_Fig7_HTML.gif](img/A323069_2_En_6_Fig7_HTML.gif)\n\
  \n图 6-7.\n\n在 while 循环语句中使用 continue 语句\n\n在 `for` 循环和 `while` 循环中使用 `continue`\
  \ 语句的主要区别在于控制权转移的位置。在 `for` 循环内部，控制权转移到表达式列表；而在 `while` 循环中，控制权转移到条件表达式。这就是为什么 `for`\
  \ 循环语句不能在不修改某些逻辑的情况下总是转换为 `while` 循环语句的原因。\n\n\n\n一个未标记的 `continue` 语句\n总是继续最内层的\
  \ `for` 循环、`while` 循环和 `do-while` 循环。如果你\n正在使用嵌套循环语句，你需要使用一个带标签的 `continue` 语句来\n\
  继续外层循环。例如，你可以使用 `continue` 语句重写下面这段\n打印 3x3 矩阵下半部分的代码片段，如下所示：\n\n```\nouter: //\
  \ 标签 \"outer\" 从这里开始\nfor(int i = 1; i <= 3; i++) {\nfor(int j = 1; j <= 3; j++)\
  \ {\nSystem.out.print(i + \"\" + j);\nSystem.out.print(\"\\t\");\nif (i == j) {\n\
  System.out.println(); // 打印一个新行\ncontinue outer;    // 继续外层循环\n}\n}\n}  // 标签 \"\
  outer\" 在这里结束\n```\n\n空语句\n\n一个空语句\n  就是\n一个单独的分号。空语句不执行任何操作。如果空语句\n不执行任何操作，为什么我们还需要它？有时，一条语句\n\
  是某个构造语法的一部分。然而，你可能\n不需要执行任何有意义的操作。在这种情况下，就会使用空语句。一个 `for` 循环必须有一个\n与之关联的语句。但是，要打印\
  \ 1 到 10 之间的所有整数，你只能使用 `for` 循环语句的\n初始化、条件表达式和表达式列表部分。\n在这种情况下，你没有语句可以与 `for` 循环语句关联。\n\
  因此，在这种情况下，你使用一个空语句，如下所示：\n\n```\nfor(int i = 1; i <= 10; System.out.println(i++))\n\
  ;  // 这个分号是 for 循环的空语句\n```\n\n有时，空语句用于避免代码中的双重否定逻辑。\n假设 `noDataFound` 是一个\n`boolean`\n\
  变量。你可以编写如下所示的代码片段：\n\n```\nif (noDataFound)\n; // 一个空语句\nelse {\n// 执行一些处理\n}\n\
  ```\n\n前面的 `if-else` 语句\n可以不用空语句来编写，如下所示：\n\n```\nif (!noDataFound) {\n// 执行一些处理\n\
  }\n```\n\n使用哪种代码是个人选择。最后，请注意，如果你\n在只需要一个分号的地方键入了两个或更多分号，它不会\n导致任何错误，因为每个额外的分号都被视为一个空语句。\n\
  例如，\n\n```\ni++;  // 可以。这里，分号是语句的一部分\ni++;; // 仍然可以。第二个分号被视为空语句。\n```\n\n你不能在不允许使用语句的地方使用空语句。例如\n\
  ，当只允许一条语句时，添加一个额外的空\n语句会导致错误，如下面的代码片段所示。\n它将两条语句 `i++;` 和一个空语句 (`;`) 关联到一个 `if`\
  \ 语句，而该语句\n只允许一条语句。\n\n```\nif (i == 10)\ni++;; // 编译时错误。不能在 else 语句前使用两条语句\nelse\n\
  i--;\n```\n\n总结\n\nJava 程序中的语句指定了一个操作。Java 中的语句\n可以大致分为三类：声明语句、表达式语句和控制流语句。声明语句\n\
  用于声明变量。表达式语句用于\n计算表达式。控制流语句控制\n其他语句执行的顺序。控制流语句包括\n`if`、`if-else` 和循环\n语句。循环语句重复执行一个语句块，直到\n\
  某个条件变为假。Java 提供了四种\n循环语句：`for` 循环、`for-each` 循环、`while` 循环和 `do-while` 循环。`break`\
  \ 语句\n用于将控制权转移到块语句或循环之外。`continue`\n语句用于忽略执行循环的剩余代码，并\n继续下一次迭代。Java 也有一个空语句，\n它就是一个单独的分号。\n\
