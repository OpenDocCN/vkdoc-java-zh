  清单 21-40.\n一个使用 Comparator 对象对 ComparablePerson 对象进行排序的测试类\n```\n\n多态——一个对象，多种视图\n\
  \n多态（Polymorphism）指的是一个对象能够呈现出多种形态的能力。我使用“视图”（view）一词来代替“形态”（form）。“视图”一词能让我们更好地理解接口上下文中的多态。让我们重新阐述多态的定义：它是一个对象提供其不同视图的能力。接口让你能够创建多态对象。\n\
  \n考虑清单 21-24 中所示的 `Turtle` 类声明。它实现了 `Swimmable` 和 `Walkable` 接口。你可以像下面这样创建一个 `Turtle`\
  \ 对象：\n\n```\nTurtle turti = new Turtle(\"Turti\");\n```\n\n因为 `Turtle` 类实现了 `Walkable`\
  \ 和 `Swimmable` 接口，你可以将 `turti` 对象视为 `Walkable` 或 `Swimmable` 类型。\n\n```\nWalkable\
  \ turtiWalkable = turti;\nSwimmable turtiSwimmable = turti;\n```\n\n由于 Java 中的每个类都继承自\
  \ `Object` 类，你也可以将 `turti` 对象视为 `Object` 类型：\n\n```\nObject turiObject = turti;\n\
  ```\n\n图 21-3 展示了同一个 `Turtle` 对象的四种不同视图。请注意，只有一个对象，它是 `Turtle` 类的实例。当你从不同方向（顶部、正面、背面、左侧、右侧等）观察一所房子时，你会看到同一所房子的不同视图。尽管如此，房子只有一所。当你从正面看房子时，你看不到它的其他视图，例如背面视图或左侧视图。就像房子一样，一个\
  \ Java 对象可以展示其自身的不同视图，这被称为多态。\n\n![A323069_2_En_21_Fig3_HTML.gif](img/A323069_2_En_21_Fig3_HTML.gif)\n\
  \n图 21-3.\n\n多态：一个对象，多种视图。一个 Turtle 对象的四种不同视图\n\n什么定义了一个 Java 对象的特定视图，以及你如何获得该对象的视图？视图是可供外部（用技术术语来说，就是类的客户端或用户）使用的东西。在一个类型（类或接口）中定义的一组方法（对客户端可访问）定义了该类型对象的一个视图。例如，`Walkable`\
  \ 类型定义了一个方法：`walk()`。如果你获得了某个对象的 `Walkable` 视图，这意味着你只能访问该对象的 `walk()` 方法。类似地，如果你拥有一个对象的\
  \ `Swimmable` 视图，你只能访问该对象的 `swim()` 方法。那么，拥有一个 `Turtle` 对象的 `Turtle` 视图呢？`Turtle`\
  \ 类定义了三个方法：`bite()`、`walk()` 和 `swim()`。它还从 `Object` 类继承了方法。因此，如果你拥有一个对象的 `Turtle`\
  \ 视图，你可以访问 `Turtle` 类中所有可用的方法（直接声明的或从其超类和超接口继承的）。Java 中的每个类都直接或间接地继承自 `Object` 类。因此，Java\
  \ 中的每个对象至少有两个视图：一个视图由对象类中可用（声明或继承的）的方法集定义，另一个视图由 `Object` 类中定义的方法集定义。当你使用一个对象的 `Object`\
  \ 视图时，你只能访问 `Object` 类的方法。\n\n通过使用不同类型的引用变量来访问对象，你可以获得对象的不同视图。例如，要获取一个 `Turtle`\
  \ 对象的 `Walkable` 视图，你可以执行以下任一操作：\n\n```\nTurtle t = new Turtle(\"Turti\");\nWalkable\
  \ w2 = t;            // w2 提供了 Turtle 对象的 Walkable 视图\nWalkable w3 = new Turtle();\
  \ // w3 提供了 Turtle 对象的 Walkable 视图\n```\n\n了解了 Java 对象可以支持不同视图后，让我们来看看 `instanceof`\
  \ 运算符的用法。它用于测试一个对象是否支持特定的视图。考虑以下代码片段：\n\n```\nObject anObject = 获取任何对象引用...;\nif(anObject\
  \ instanceof Walkable) {\n// anObject 具有 Walkable 视图\nWalkable w = (Walkable) anObject;\n\
  // 现在使用 w 访问对象的 Walkable 视图\n} else {\n// anObject 不具有 Walkable 视图\n}\n```\n\n`anObject`\
  \ 变量引用了一个对象。`instanceof` 运算符用于测试 `anObject` 变量所引用的对象是否支持 `Walkable` 视图。请注意，仅仅在一个类中定义一个\
  \ `walk()` 方法，并不能为该类的对象定义 `Walkable` 视图。该类必须实现 `Walkable` 接口并实现 `walk()` 方法，其对象才能拥有\
  \ `Walkable` 视图。对象的视图与其类型是同义词。回想一下，为一个类实现一个接口会为该类的对象提供一个额外的类型（即一个额外的视图）。一个类的对象可以有多少个视图？一个类的对象可以拥有以下视图：\n\
  \n*   由其类类型定义的视图\n*   由其所有超类（直接或间接）定义的视图\n*   由其类或超类（直接或间接）实现的所有接口定义的视图\n\n动态绑定与接口\n\
  \n\n\nJava 使用动态绑定（也称为运行时绑定或后期绑定）来处理通过接口类型变量调用方法的情况。请参考以下代码片段：\n\n```\nWalkable john\
  \ = a Walkable object reference...\njohn.walk();\n```\n\n变量 `john` 具有两种类型：编译时类型和运行时类型。其编译时类型是声明类型，即\
  \ `Walkable`。编译器知道变量的编译时类型。当编译代码 `john.walk()` 时，编译器必须根据编译时可用的所有信息验证此调用是否有效。编译器会为\
  \ `john.walk()` 方法调用添加类似以下的指令：\n\n```\ninvokeinterface #5,  1; //InterfaceMethod\
  \ com/jdojo/interfaces/Walkable.walk:()V\n```\n\n上述指令表明，`john.walk()` 方法调用是在接口类型\
  \ `Walkable` 的变量上进行的。变量 `john` 在运行时引用的对象是其运行时类型。编译器不知道变量 `john` 的运行时类型。变量 `john`\
  \ 可能引用 `Person` 类、`Turtle` 类、`Duck` 类或任何其他实现 `Walkable` 接口的类的对象。编译器并未指定执行 `john.walk()`\
  \ 时应使用 `walk()` 方法的哪个实现。运行时按如下方式决定要调用的 `walk()` 方法实现：\n\n1.  它获取变量 `john` 所引用对象的类信息。例如，考虑以下代码片段：\n\
  \n```\n    Walkable john = new Person(\"John\"); // john 引用一个 Person 对象\n    john.walk();\n\
  \    ```\n\n此处，变量 `john` 在运行时引用的对象的类类型是 `Person`。\n\n2.  它在上一步确定的类中查找 `walk()` 方法的实现。如果在那个类中未找到\
  \ `walk()` 方法实现，运行时会在其祖先类中递归查找 `walk()` 方法的实现。\n\n3.  如果在上一步中找到了 `walk()` 方法的实现，则一旦找到就会立即执行。也就是说，如果在变量\
  \ `john` 所引用的对象的类中找到了 `walk()` 方法的实现，运行时就会执行该方法的实现，并且不会在其祖先类中进一步查找该方法。\n\n4.  如果在类层次结构中未找到\
  \ `walk()` 方法的实现，则会搜索该类所实现的超接口的继承层次结构。如果根据前面描述的接口中查找方法的最具体规则找到了 `walk()` 方法，并且它是一个默认方法，则调用该方法。如果找到了多个默认的\
  \ `walk()` 方法，则会抛出 `IncompatibleClassChangeError`。如果找到了一个抽象的 `walk()` 方法，则会抛出 `AbstractMethodError`。\n\
  \n5.  如果仍然未找到 `walk()` 方法的实现，则会抛出 `NoSuchMethodError`。如果所有类都一致编译，则不应出现此错误。\n\n总结\n\
  \n接口是一种规范，旨在由类实现。接口可以包含静态常量、抽象方法、默认方法、静态方法和嵌套类型等成员。接口不能有实例变量。接口不能被实例化。\n\n没有成员的接口称为标记接口。只有一个抽象方法的接口称为函数式接口。\n\
  \n类实现接口。在类声明中使用关键字 `implements` 来实现接口。实现接口的类会继承接口的所有成员，但静态方法除外。如果类从实现的接口继承了抽象方法，则需要重写这些方法并提供实现，否则该类应声明为抽象类。实现接口的类是所实现接口的子类型，而所实现的接口是该类的超类型。如果一个类从多个超类型（超类或超接口）继承了具有相同签名的方法；在这种情况下，超类中的方法优先；如果所有方法都继承自超接口，则使用最具体的方法；如果仍然有多个候选方法，则类必须重写该方法以解决冲突。\n\
  \n一个接口可以继承自其他接口。在接口声明中使用关键字 `extends` 来指定所有继承的接口。被继承的接口称为超接口，而该接口本身称为子接口。子接口继承其所有超接口的成员，但静态方法除外。如果一个接口从多个超接口继承了具有相同签名的方法组合（默认-默认或默认-抽象），则可能会产生冲突。冲突通过两步解决——首先使用最具体的候选方法；如果有多个最具体的候选方法，则接口必须重写冲突的方法。\n\
  \n在 Java 8 之前，在不破坏现有代码的情况下，接口发布后无法更改。从 Java 8 开始，你可以向现有接口添加默认方法和静态方法。直到 Java 9，接口中的所有方法都隐式地为\
  \ public，并且不允许有私有方法。Java 9 允许你在接口中拥有私有方法。\n\n当使用接口类型的变量调用抽象方法或默认方法时，会使用动态绑定。当调用接口的静态方法时，会使用静态绑定。请注意，接口的静态方法只能使用一种语法调用：\n\
  \n```\nInterfaceName.staticMethodName(arg1, arg2...)\n```\n\n练习题\n\n1.  Java 中的接口是什么？什么是标记接口？什么是函数式接口？\n\
  \n2.  你使用哪个关键字让类实现接口？\n\n3.  一个类可以实现多少个接口？\n\n4.  在接口声明中，你使用哪个关键字来让接口继承其他接口？\n\n\
  5.  你能在接口中声明实例变量吗？\n\n6.  哪个版本的 Java SE 允许你在接口中拥有私有方法？\n\n7.  接口中哪些类型的方法可以声明为私有？接口中可以有抽象的私有方法吗？如果不能，请解释你的答案。\n\
  \n8.  你在类中实现哪个接口来实现该类对象的自然排序？你使用哪个接口来实现该类对象的自定义排序？\n\n9.  描述以下接口声明无法编译的原因，并提出修复建议。\n\
  \n```\n    public interface Choices {\n    int YES;\n    int NO = 1;\n    private\
  \ int CANCEL = 2;\n    }\n    ```\n\n10. 以下接口声明有什么问题？\n\n```\n    public interface\
