  \ name: John Jacobs\n清单 20-27.\n用于测试 Manager2 类的测试类\n```\n\n\n\n我需要讨论几条关于在子类中使用超类构造函数的规则。考虑以下定义在**两个不同包**中的类\
  \ `X` 和 `Y`：\n\n```\n// X.java\npackage com.jdojo.inheritance.pkg1;\npublic class\
  \ X {\n// X() 具有包级访问权限\nX() {\n}\n}\n// Y.java\npackage com.jdojo.inheritance.pkg2;\n\
  import com.jdojo.inheritance.pkg1.X;\npublic class Y extends X {\npublic Y() {\n\
  }\n}\n```\n\n类 `Y` 的代码将无法编译。它会生成如下编译时错误：\n\n```\nError(7):  X() is not public in\
  \ com.jdojo.inheritance.pkg1.X; cannot be accessed from outside package\n```\n\n\
  该错误指出，类 `X` 中的无参构造函数具有**包级访问权限**。因此，它无法从位于不同包中的类 `Y` 访问。你收到此错误是因为编译器会将类 `Y` 的定义修改如下：\n\
  \n```\n// 编译器修改后的类 Y 版本\n// Y.java\npackage com.jdojo.inheritance.pkg2;\nimport\
  \ com.jdojo.inheritance.pkg1.X;\npublic class Y extends X {\npublic Y() {\n// 由编译器注入，用于调用\
  \ X() 构造函数\nsuper();\n}\n}\n```\n\n类 `X` 的无参构造函数具有包级访问权限。因此，它只能从 `com.jdojo.inheritance.pkg1`\
  \ 包中访问。如何修复类 `Y`？在这种情况下提出解决方案需要谨慎。解决方案取决于创建类 `X` 和类 `Y` 时所使用的设计。然而，为了让类 `Y` 能够编译，你必须为类\
  \ `X` 创建一个具有 `public` 或 `protected` 访问权限的构造函数，以便它能从类 `Y` 中访问。\n\n以下是关于在继承中使用构造函数的另一条规则。必须使用\
  \ `super` 关键字，在类的构造函数内部**显式或隐式**地调用超类构造函数。然而，从子类访问超类构造函数的行为受超类构造函数访问级别的控制。有时，类构造函数的访问级别可能导致其根本无法被访问。考虑以下名为\
  \ `NoSubclassingAllowed` 的类定义：\n\n```\npublic class NoSubclassingAllowed {\nprivate\
  \ NoSubclassingAllowed() {\n}\n// 其他代码在此处\n}\n```\n\n`NoSubclassingAllowed` 类显式声明了一个\
  \ `private` 构造函数。`private` 构造函数无法从任何地方（包括子类）访问。要使子类存在，子类必须能够调用其超类的至少一个构造函数。这意味着\
  \ `NoSubclassingAllowed` 类不能被任何其他类继承。这是禁用类继承的方法之一。以下代码将无法编译，它试图继承没有可访问构造函数的 `NoSubclassingAllowed`\
  \ 类：\n\n```\n// 无法编译。\npublic class LetUsTryInVain extends NoSubclassingAllowed\
  \ {\n}\n```\n\n你可能注意到，没有人可以创建 `NoSubclassingAllowed` 类的对象，因为其构造函数无法从外部访问。像这样的类会提供方法来创建其对象并将其返回给调用者。这也是控制和封装类对象创建的一种方式。\n\
  \n回顾第 9 章，你可以使用 `this` 关键字从同一个类的另一个构造函数中调用该类的构造函数，并且该调用必须是构造函数体中的第一条语句。当你查看调用同一个类的另一个构造函数和调用超类构造函数的规则时，你会发现两者都规定调用必须是构造函数体内的第一条语句。这两条规则的结果是，在一个构造函数中，你只能使用\
  \ `this()` 调用同一个类的另一个构造函数，或者使用 `super()` 调用超类的构造函数，但不能同时使用两者。这条规则也确保了超类的构造函数总是且仅被调用一次。\n\
  \n方法隐藏\n\n一个类也会从其超类继承所有非 `private` 的 `static` 方法。在子类中重新定义继承的 `static` 方法被称为**方法隐藏**。子类中重新定义的\
  \ `static` 方法被称为隐藏了其超类的 `static` 方法。回顾一下，在类中重新定义非静态方法被称为方法重写。清单 20-28 包含了 `MHidingSuper`\
  \ 类的代码，该类有一个 `static print()` 方法。清单 20-29 包含了 `MHidingSub` 类的代码，该类继承自 `MHidingSuper`\
  \ 类。它重新定义了 `print()` 方法，该方法隐藏了 `MHidingSuper` 类中的 `print()` 方法。`MHidingSub` 中的 `print()`\
  \ 方法是方法隐藏的一个示例。\n\n```\n// MHidingSuper.java\npackage com.jdojo.inheritance;\npublic\
  \ class MHidingSuper {\npublic static void print() {\nSystem.out.println(\"Inside\
  \ MHidingSuper.print()\");\n}\n}\n清单 20-28.\n一个包含静态方法的 MHidingSuper 类\n```\n\n```\n\
  // MHidingSub.java\npackage com.jdojo.inheritance;\npublic class MHidingSub extends\
  \ MHidingSuper {\npublic static void print() {\nSystem.out.println(\"Inside MHidingSub.print()\"\
  );\n}\n}\n清单 20-29.\n一个隐藏其超类 print() 方法的 MHidingSub 类\n```\n\n关于方法隐藏的重新定义方法（名称、访问级别、返回类型和异常）的所有规则与方法重写相同。有关这些规则的更详细讨论，请参阅“方法重写”部分。方法隐藏的一个不同规则是**绑定规则**。静态方法使用**早期绑定**。基于表达式的编译时类型，编译器决定在运行时为\
  \ `static` 方法调用执行什么代码。请注意，你可以使用类名以及引用变量来调用 `static` 方法。当你使用类名调用 `static` 方法时，方法绑定没有歧义。编译器会绑定在该类中定义（或重新定义）的\
  \ `static` 方法。如果某个类没有定义（或重新定义）该 `static` 方法，编译器会绑定该类从其超类继承的方法。如果编译器在类中找不到已定义/重新定义/继承的方法，则会生成错误。清单\
  \ 20-30 包含了演示类静态方法隐藏的早期绑定规则的代码。\n\n```\n// MHidingTest.java\npackage com.jdojo.inheritance;\n\
  public class MHidingTest {\npublic static void main(String[] args) {\nMHidingSuper\
  \ mhSuper = new MHidingSub();\nMHidingSub mhSub = new MHidingSub();\nSystem.out.println(\"\
  #1\");\n// #1\nMHidingSuper.print();\nmhSuper.print();\nSystem.out.println(\"#2\"\
  );\n// #2\nMHidingSub.print();\nmhSub.print();\n((MHidingSuper) mhSub).print();\n\
  System.out.println(\"#3\");\n// #3\nmhSuper = mhSub;\nmhSuper.print();\n((MHidingSub)\
  \ mhSuper).print();\n}\n}\n#1\nInside MHidingSuper.print()\nInside MHidingSuper.print()\n\
  #2\nInside MHidingSub.print()\nInside MHidingSub.print()\nInside MHidingSuper.print()\n\
  #3\nInside MHidingSuper.print()\nInside MHidingSub.print()\n清单 20-30.\n一个用于演示方法隐藏的测试类\n\
  ```\n\n测试代码包含三个部分，分别标记为 #1、#2 和 #3。让我们讨论编译器在每个部分是如何执行早期绑定的。\n\n```\n// #1\nMHidingSuper.print();\n\
  mhSuper.print();\n```\n\n第一个调用 `MHidingSuper.print()` 是使用类名进行的。编译器将此调用绑定到执行 `MHidingSuper`\
  \ 类的 `print()` 方法。第二个调用 `mhSuper.print()` 是使用引用变量 `mhSuper` 进行的。`mhSuper` 变量的编译时类型（或声明类型）是\
  \ `MHidingSuper`。因此，编译器将此调用绑定到执行 `MHidingSuper` 类的 `print()` 方法。\n\n```\n// #2\n\
  MHidingSub.print();\nmhSub.print();\n((MHidingSuper)mhSub).print();\n```\n\n\n\n\
  第 #2 节中的前两次调用与第 #1 节中的两次调用类似。它们被绑定到 `MHidingSub` 类的 `print()` 方法。第三次调用 `((MHidingSuper)\
  \ mhSub).print()` 需要稍作解释。`mhSub` 变量的编译时类型是 `MHidingSub`。当你对 `mhSub` 变量使用类型转换 `(MHidingSuper)`\
  \ 时，表达式 `(MHidingSuper) mhSub` 的编译时类型就变成了 `MHidingSuper`。当你对这个表达式调用 `print()` 方法时，编译器会将其绑定到它的编译时类型，即\
  \ `MHidingSuper`。因此，第 #2 节中的第三次方法调用被绑定到 `MHidingSuper` 类的 `print()` 方法。\n\n```\n\
  // #3\nmhSuper = mhSub;\nmhSuper.print();\n((MHidingSub)mhSuper).print();\n```\n\
  \n第 #3 节中的第一条语句将 `MHidingSub` 对象的引用赋值给 `mhSuper` 引用变量。执行第一条语句后，`mhSuper` 变量引用了一个\
  \ `MHidingSub` 类的对象。当第一次调用 `print()` 方法时，编译器会查看 `mhSuper` 变量的编译时类型（或声明类型），即 `MHidingSuper`。因此，编译器将调用\
  \ `mhSuper.print()` 绑定到 `MHidingSuper` 类的 `print()` 方法。第二次调用 `print()` 方法被绑定到 `MHidingSub`\
  \ 类的 `print()` 方法，因为类型转换 `(MHidingSub)` 使得整个表达式的类型变为 `MHidingSub`。\n\n提示\n\n一个类的\
  \ `static` 方法不能隐藏其超类的实例方法。如果你想从类内部调用超类的隐藏方法，你需要使用超类名来限定隐藏方法的调用。例如，如果你想从 `MHidingSub`\
  \ 类内部调用 `MHidingSuper` 类的 `print()` 方法，你需要使用 `MHidingSuper.print()`。在 `MHidingSub`\
  \ 类内部，如果不使用类名或变量，对 `print()` 方法的调用指的是 `MHidingSub` 类的隐藏方法 `print()`。\n\n字段隐藏\n\n\
  一个类中的字段声明（`static` 或非静态）会隐藏其超类中同名的继承字段。在字段隐藏的情况下，不考虑字段的类型及其访问级别。字段隐藏仅基于字段名发生。字段访问使用早期绑定。也就是说，使用类的编译时类型来绑定字段访问。考虑以下两个类\
  \ `G` 和 `H` 的声明：\n\n```\npublic class G {\nprotected int x = 200;\nprotected String\
  \ y = \"Hello\";\nprotected double z = 10.5;\n}\npublic class H extends G {\nprotected\
  \ int x = 400;       // 隐藏类 G 中的 x\nprotected String y = \"Bye\";  // 隐藏类 G 中的 y\n\
  protected String z = \"OK\";   // 隐藏类 G 中的 z\n}\n```\n\n类 `H` 中的字段声明 `x`、`y` 和 `z`\
  \ 隐藏了类 `G` 中继承的字段 x、y 和 z。需要强调的是，仅凭类中的相同字段名就能隐藏其超类的字段。隐藏字段和被隐藏字段的数据类型无关紧要。例如，类 `G`\
  \ 中 z 的数据类型是 `double`，而类 `H` 中 z 的数据类型是 `String`。尽管如此，类 `H` 中的字段 `z` 仍然隐藏了类 `G`\
  \ 中的字段 `z`。类 `H` 中字段 x、y 和 z 的简单名称指的是隐藏字段，而不是继承字段。因此，如果你在类 `H` 中使用简单名称 x，它指的是在类\
  \ `H` 中声明的字段 `x`，而不是类 `G` 中的。如果你想从类 `H` 内部引用类 `G` 中的字段 x，你需要使用关键字 `super`，例如 `super.x`。\n\
  \n在清单 20-31 中，`FHidingSuper` 类声明了字段 `num` 和 `name`。在清单 20-32 中，`FHidingSub` 类继承自\
  \ `FHidingSuper` 类，并从中继承了 num 和 name 字段。`FHidingSub` 类的 `print()` 方法打印 `num` 和 `name`\
  \ 字段的值。`print()` 方法使用了 `num` 和 `name` 字段的简单名称，它们指的是从 `FHidingSuper` 类继承的字段。当你运行清单\
  \ 20-33 中的 `FHidingTest` 类时，输出显示 `FHidingSub` 类确实从其超类继承了 `num` 和 `name` 字段。\n\n\
  ```\n// FHidingSuper.java\npackage com.jdojo.inheritance;\npublic class FHidingSuper\
  \ {\nprotected int num = 100;\nprotected String name = \"John Jacobs\";\n}\n清单 20-31.\n\
  包含两个受保护实例字段的 FHidingSuper 类\n```\n\n```\n// FHidingSub.java\npackage com.jdojo.inheritance;\n\
  public class FHidingSub extends FHidingSuper {\npublic void print() {\nSystem.out.println(\"\
  num: \" + num);\nSystem.out.println(\"name: \" + name);\n}\n}\n清单 20-32.\nFHidingSub\
  \ 类，继承自 FHidingSuper 类并继承字段 num 和 name\n```\n\n```\n// FHidingTest.java\npackage\
  \ com.jdojo.inheritance;\npublic class FHidingTest {\npublic static void main(String[]\
  \ args) {\nFHidingSub fhSub = new FHidingSub();\nfhSub.print();\n}\n}\nnum: 100\n\
  name: John Jacobs\n清单 20-33.\n演示字段继承的测试类\n```\n\n考虑清单 20-34 中所示的 `FHidingSub2` 类的定义。\n\
  \n```\n// FHidingSub2.java\npackage com.jdojo.inheritance;\npublic class FHidingSub2\
  \ extends FHidingSuper {\n// 隐藏 FHidingSuper 类中的 num 字段\nprivate int num = 200;\n\
  // 隐藏 FHidingSuper 类中的 name 字段\nprivate String name = \"Wally Inman\";\npublic void\
  \ print() {\nSystem.out.println(\"num: \" + num);\nSystem.out.println(\"name: \"\
  \ + name);\n}\n}\n清单 20-34.\nFHidingSub2 类，继承自 FHidingSuper 并声明了两个与其超类中同名的变量\n```\n\
  \n`FHidingSub2` 类继承自 `FHidingSuper` 类。它声明了两个字段 `num` 和 `name`，这两个字段与其超类中声明的两个字段同名。这是一个字段隐藏的情况。`FHidingSub2`\
  \ 中的 `num` 和 `name` 字段隐藏了从 `FHidingSuper` 类继承的 `num` 和 `name` 字段。当在 `FHidingSub2`\
  \ 类内部使用 `num` 和 `name` 字段的简单名称时，它们指的是在 `FHidingSub2` 类中声明的字段，而不是从 `FHidingSuper`\
  \ 类继承的字段。这可以通过运行清单 20-35 中所示的 `FHidingTest2` 类来验证。\n\n```\n// FHidingTest2.java\n\
  package com.jdojo.inheritance;\npublic class FHidingTest2 {\npublic static void\
  \ main(String[] args) {\nFHidingSub2 fhSub2 = new FHidingSub2();\nfhSub2.print();\n\
  }\n}\nnum: 200\nname: Wally Inman\n清单 20-35.\n演示字段隐藏的测试类\n```\n\n`FHidingSub2` 类有四个字段，两个是继承的（`num`\
  \ 和 `name`），两个是声明的（`num` 和 `name`）。如果你想引用从超类继承的字段，你需要使用关键字 `super` 来限定字段名。例如，`FHidingSub2`\
  \ 内部的 `super.num` 和 `super.name` 指的是 `FHidingSuper` 类中的 `num` 和 `name` 字段。\n\n清单\
  \ 20-36 中 `FHidingSub3` 类的 `print()` 方法使用关键字 `super` 来访问超类的隐藏字段，并使用字段的简单名称来访问自己类中的字段。清单\
  \ 20-37 的输出验证了这一点。\n\n\n\n```\n// FHidingSub3.java\npackage com.jdojo.inheritance;\n\
  public class FHidingSub3 extends FHidingSuper {\n// 隐藏 FHidingSuper 类中的 num 字段\n\
  private int num = 200;\n// 隐藏 FHidingSuper 类中的 name 字段\nprivate String name = \"\
  Wally Inman\";\npublic void print() {\n// FHidingSub3.num\nSystem.out.println(\"\
  num: \" + num);\n// FHidingSuper.num\nSystem.out.println(\"super.num: \" + super.num);\n\
  // FHidingSub3.name\nSystem.out.println(\"name: \" + name);\n// FHidingSuper.name\n\
  System.out.println(\"super.name: \" + super.name);\n}\n}\n清单 20-36.\n一个演示如何使用 super\
  \ 关键字访问超类隐藏字段的 FHidingSub3 类\n```\n\n```\n// FHidingTest3.java\npackage com.jdojo.inheritance;\n\
  public class FHidingTest3 {\npublic static void main(String[] args) {\nFHidingSub3\
  \ fhSub3 = new FHidingSub3();\nfhSub3.print();\n}\n}\nnum: 200\nsuper.num: 100\n\
  name: Wally Inman\nsuper.name: John Jacobs\n清单 20-37.\n一个访问隐藏字段的测试类\n```\n\n回顾一下，当创建一个对象时，Java\
  \ 运行时会为该对象所属类及其所有祖先类中的所有实例变量分配内存。当你创建 `FHidingSub2` 或 `FHidingSub3` 类的对象时，将为这四个实例变量分配内存，如图\
  \ 20-4 所示。\n\n![A323069_2_En_20_Fig4_HTML.gif](img/A323069_2_En_20_Fig4_HTML.gif)\n\
  \n图 20-4.\n\nFHidingSuper 和 FHidingSub2 类对象的内存布局\n\n以下是字段隐藏规则的总结：\n\n*   当一个类声明了一个与其超类继承的变量同名的变量时，就会发生字段隐藏。\n\
  \n*   字段隐藏仅基于字段的名称发生。访问级别、数据类型和字段类型（`static` 或非静态）在字段隐藏中不予考虑。例如，一个 `static` 字段可以隐藏一个实例字段。一个\
  \ `int` 类型的字段可以隐藏一个 `String` 类型的字段，等等。一个类中的 `private` 字段可以隐藏其超类中的 `protected` 字段。一个类中的\
  \ `public` 字段可以隐藏其超类中的 `protected` 字段。\n\n*   一个类应使用关键字 `super` 来访问超类的隐藏字段。该类可以使用简单名称来访问其主体中重新定义的字段。\n\
  \n禁用\n继承\n\n你可以通过将类声明为 `final` 来禁用对类的子类化。你之前已经见过使用 `final` 关键字声明常量。同样的 `final` 关键字也用于类声明中。一个\
  \ `final` 类不能被继承。以下代码片段声明了一个名为 `Security` 的 `final` 类：\n\n```\npublic final class\
  \ Security {\n// 代码写在这里\n}\n```\n\n以下 `CrackedSecurity` 类的声明将无法编译：\n\n```\n// 无法编译。不能继承自\
  \ Security\npublic final class CrackedSecurity extends Security {\n// 代码写在这里\n}\n\
  ```\n\n你也可以将一个方法声明为 `final`。一个 `final` 方法不能被子类重写或隐藏。由于 `final` 方法不能被重写或隐藏，代码优化器可能会内联对\
  \ `final` 方法的调用以获得更好的性能。\n\n```\npublic class A {\npublic final void m1() {\n//\
  \ 代码写在这里\n}\npublic void m2() {\n// 代码写在这里\n}\n}\npublic class B extends A {\n//\
  \ 此处不能重写 A.m1()，因为它在类 A 中是 final 的\n// 可以重写 m2()，因为它在类 A 中不是 final 的\npublic void\
  \ m2() {\n// 代码写在这里\n}\n}\n```\n\n你会在 Java 类库中发现许多被声明为 `final` 的类和方法。最值得注意的是，`String`\
  \ 类是 `final` 的。为什么要将类或方法声明为 `final`？换句话说，为什么要阻止对类的继承或对方法的重写/隐藏？这样做的主要原因是为了安全性、正确性和性能。如果你的类出于安全原因很重要，你就不希望有人继承你的类并破坏你的类本应实现的安全性。有时，你将类/方法声明为\
  \ `final` 是为了保持程序的正确性。一个 `final` 方法可能会在运行时带来更好的性能，因为代码优化器可以自由地内联对 `final` 方法的调用。\n\
  \n抽象类和抽象方法\n\n有时你可能创建一个类只是为了表示一个概念，而不是为了表示对象。假设你想开发一些类来表示不同的形状。形状只是一个想法或概念。它在现实中并不存在。假设有人让你画一个形状。你的第一反应会是：“你想让我画什么形状？”如果有人让你画一个圆或一个矩形，这对你来说是有意义的。Java\
  \ 允许你创建一个不能创建其对象的类。它的目的仅仅是表示一个想法，这个想法对于其他类的对象来说是通用的。这样的类称为抽象类。术语“具体类”用于表示非抽象的、可以创建其对象的类。到目前为止，你所有的类都是具体类。\n\
  \n你需要在类声明中使用 `abstract` 关键字来声明一个抽象类。例如，以下代码将 `Shape` 类声明为抽象类：\n\n```\npublic abstract\
  \ class Shape {\n// 暂时没有代码\n}\n```\n\n因为 `Shape` 类已被声明为抽象类，即使它有一个 `public` 构造方法（编译器添加的默认构造方法），你也不能创建它的对象。你可以像为具体类声明变量一样，声明一个抽象类的变量。以下代码片段展示了\
  \ `Shape` 类的一些有效和无效用法：\n\n```\nShape s;     // 可以\nnew Shape(); // 编译时错误。无法创建 Shape\
  \ 对象\n```\n\n如果你查看 `Shape` 类的定义，除了在声明中使用了 `abstract` 关键字之外，它看起来和其他任何具体类一样。一个类拥有实例变量和实例方法来定义其对象的状态和行为。通过将类声明为抽象类，你表明该类对其对象有一些不完整的方法定义（行为），并且为了创建对象的目的，它必须被认为是不完整的。\n\
  \n类中的不完整方法是什么？一个只有声明但没有主体的方法是不完整的方法。缺少方法主体并不意味着空主体。它意味着没有主体。方法声明后面的大括号表示方法的主体。对于不完整的方法，大括号被替换为分号。如果一个方法是不完整的，你必须在方法声明中使用\
  \ `abstract` 关键字来指明。你的 `Shape` 类在提到具体形状之前，不知道如何绘制一个形状。然而，有一件事是确定的——无论是什么形状，你都应该能够绘制它。在这种情况下，你知道行为名称（`draw`），但不知道如何实现它。因此，`draw`\
  \ 是一个很好的候选者，可以在 `Shape` 类中被声明为抽象方法（或不完整方法）。`Shape` 类如下所示，带有一个 `abstract draw()`\
  \ 方法：\n\n```\npublic abstract class Shape {\npublic Shape() {\n}\npublic abstract\
  \ void draw();\n}\n```\n\n\n\n当你将一个类声明为抽象类时，并不一定意味着它至少有一个抽象方法。抽象类可以包含所有具体方法，也可以包含所有抽象方法，还可以同时包含具体方法和抽象方法。如果你有一个抽象类，这意味着该类的对象无法存在。然而，如果一个类包含抽象方法（无论是声明的还是继承的），它就必须被声明为抽象类。将类声明为抽象类，就像在一栋建筑前放置“施工中”的标识。如果建筑前放置了“施工中”的标识，就意味着它不应被使用（对于类而言，就是不应被创建）。无论建筑是否完工，这都不重要。“施工中”的标识足以表明它无法使用。但是，如果建筑的某些部分尚未完工（比如类包含抽象方法），你就必须在其前方放置“施工中”的标识（必须将类声明为抽象类），以避免有人试图使用时发生意外。\n\
  \n提示\n\n你不能创建 `abstract` 类的对象。如果一个类包含 `abstract` 方法（无论是声明的还是继承的），该类必须被声明为 `abstract`。如果一个类没有任何\
  \ `abstract` 方法，你仍然可以将其声明为 `abstract`。`abstract` 方法的声明方式与其他方法相同，只是其方法体由分号表示。\n\n\
