  \ `module-info.class` 文件中。因此，这两份 `module-info.class` 文件的内容并不相同。如何证明这一点？首先，打印出这两份\
  \ `module-info.class` 文件中的模块声明。你可以使用 `javap` 工具（位于 `JDK_HOME\\bin` 目录下）来反汇编任何类文件中的代码。你可以指定要反汇编的文件名、URL\
  \ 或类名。以下命令用于打印模块声明：\n\n```\nC:\\bj9f>javap mod\\jdojo.intro\\module-info.class\n\
  ```\n\n```\nCompiled from \"module-info.java\"\nmodule jdojo.intro {\nrequires java.base;\n\
  }\n```\n\n```\nC:\\bj9f>javap jar:file:lib/com.jdojo.intro.jar!/module-info.class\n\
  ```\n\n```\nCompiled from \"module-info.java\"\nmodule jdojo.intro {\nrequires java.base;\n\
  }\n```\n\n第一条命令使用文件名，第二条命令使用带有 `jar` 方案的 URL。两条命令都使用了相对路径。如果你愿意，也可以使用绝对路径。\n\n输出结果表明，两份\
  \ `module-info.class` 文件包含相同的模块声明。你需要使用 `–verbose` 选项（或 `–v` 选项）来打印类信息，以查看类属性。以下命令打印了\
  \ `mod` 目录下 `module-info.class` 文件的信息，结果显示模块版本和主类名不存在。下面展示了部分输出。\n\n```\nC:\\bj9f>javap\
  \ -verbose mod\\jdojo.intro\\module-info.class\n```\n\n```\nClassfile /C:/bj9f/mod/jdojo.intro/module-info.class\n\
  Last modified Jul 23, 2017; size 154 bytes\nMD5 checksum 2e4a3e6b8b8b03c92fdede9a5784b1d7\n\
  Compiled from \"module-info.java\"\nmodule jdojo.intro\n...\n```\n\n以下命令打印了 `lib\\\
  com.jdojo.intro.jar` 文件中 `module-info.class` 文件的信息，结果显示模块版本和主类名确实存在。下面展示了部分输出。输出中的相关行已用粗体字体显示。\n\
  \n```\nC:\\bj9f>javap -verbose jar:file:lib/com.jdojo.intro.jar!/module-info.class\n\
  ```\n\n```\nClassfile jar:file:lib/com.jdojo.intro.jar!/module-info.class\nLast\
  \ modified Jul 24, 2017; size 263 bytes\nMD5 checksum 60f5f169a580f02fa8085fd36e50c0e5\n\
  Compiled from \"module-info.java\"\nmodule jdojo.intro@1.0\n...\n#8 = Utf8     \
  \          ModuleMainClass\n#9 = Utf8               com/jdojo/intro/Welcome\n#10\
  \ = Class              #9             // com/jdojo/intro/Welcome\n...\n#14 = Utf8\
  \               1.0\n...\nModulePackages :\n#7                                 \
  \     // com.jdojo.intro\nModuleMainClass: #10                    // com.jdojo.intro.Welcome\n\
  Module:\n#13,0                                   // \"jdojo.intro\"\n#14       \
  \                              // 1.0\n...\n```\n\n你也可以反汇编模块中某个类的代码。你需要指定模块路径、模块名以及类的完全限定名。以下命令从其模块化\
  \ JAR 中打印 `com.jdojo.intro.Welcome` 类的代码：\n\n```\nC:\\bj9f>javap --module-path lib\
  \ --module jdojo.intro com.jdojo.intro.Welcome\n```\n\n```\nCompiled from \"Welcome.java\"\
  \npublic class com.jdojo.intro.Welcome {\npublic com.jdojo.intro.Welcome();\npublic\
  \ static void main(java.lang.String[]);\n}\n```\n\n你还可以打印系统类的类信息。以下命令打印 `java.base`\
  \ 模块中 `java.lang.Object` 类的类信息。请注意，打印系统类信息时无需指定模块路径。\n\n```\nC:\\bj9f>javap --module\
  \ java.base java.lang.Object\n```\n\n```\nCompiled from \"Object.java\"\npublic\
  \ class java.lang.Object {\npublic java.lang.Object();\npublic final native java.lang.Class\
  \ getClass();\npublic native int hashCode();\npublic boolean equals(java.lang.Object);\n\
  ...\n}\n```\n\n如何打印系统模块（例如 `java.base` 或 `java.sql`）的模块声明？回想一下，系统模块被打包成一种名为 JIMAGE\
  \ 的特殊文件格式，而不是模块化 JAR。JDK 9 引入了一种名为 `jrt`（`jrt` 是 Java 运行时（Java runtime）的缩写）的新 URL\
  \ 方案，用于引用 Java 运行时映像（或系统模块）的内容。使用 `jrt` 方案的语法如下：\n\n```\njrt://\n```\n\n以下命令打印名为\
  \ `java.sql` 的系统模块的模块声明：\n\n```\nC:\\bj9f>javap jrt:/java.sql/module-info.class\n\
  ```\n\n```\nCompiled from \"module-info.java\"\nmodule java.sql@9 {\nrequires transitive\
  \ java.logging;\nrequires transitive java.xml;\nrequires java.base;\nexports javax.transaction.xa;\n\
  exports javax.sql;\nexports java.sql;\nuses java.sql.Driver;\n}\n```\n\n以下命令打印 `java.se`（一个聚合模块）的模块声明：\n\
  \n```\nC:\\bj9f>javap jrt:/java.se/module-info.class\n```\n\n```\nCompiled from\
  \ \"module-info.java\"\nmodule java.se@9 {\nrequires transitive java.naming;\nrequires\
  \ transitive java.instrument;\nrequires transitive java.compiler;\nrequires transitive\
  \ java.sql.rowset;\nrequires transitive java.logging;\nrequires transitive java.management.rmi;\n\
  requires transitive java.desktop;\nrequires transitive java.rmi;\nrequires transitive\
  \ java.datatransfer;\nrequires transitive java.prefs;\nrequires transitive java.xml.crypto;\n\
  requires transitive java.sql;\nrequires transitive java.xml;\nrequires transitive\
  \ java.security.sasl;\nrequires transitive java.scripting;\nrequires transitive\
  \ java.management;\nrequires java.base;\nrequires transitive java.security.jgss;\n\
  }\n```\n\n你也可以使用 `jrt` 方案来引用系统类。以下命令打印 `java.base` 模块中 `java.lang.Object` 类的类信息：\n\
  \n```\nC:\\Java9Revealed>javap jrt:/java.base/java/lang/Object.class\n```\n\n```\n\
  Compiled from \"Object.java\"\npublic class java.lang.Object {\npublic java.lang.Object();\n\
  public final native java.lang.Class getClass();\npublic native int hashCode();\n\
  public boolean equals(java.lang.Object);\n...\n}\n```\n\n总结\n\n简单来说，模块是一组包的集合。一个模块可以选择性地包含资源，例如图片、属性文件等。如果一个模块需要使用另一个模块中包含的公共类型，那么第二个模块需要导出包含这些类型的包，并且第一个模块需要读取第二个模块。\n\
  \n模块使用 `exports` 语句导出其包。一个模块可以仅向一组指定的模块或所有其他模块导出其包。导出包中的公共类型在编译时和运行时对其他模块可用。导出的包不允许对公共类型的非公共成员进行深度反射。\n\
  \n如果一个模块希望允许其他模块通过反射访问所有类型的成员（公共和非公共），则该模块必须声明为开放模块，或者该模块可以使用 `opens` 语句有选择地开放包。访问开放包中类型的模块无需读取包含这些开放包的模块。\n\
  \n模块使用 `requires` 语句声明对另一个模块的依赖。这种依赖可以使用 `transitive` 修饰符声明为传递性依赖。如果模块 `M` 声明了对模块\
  \ `N` 的传递性依赖，那么任何声明了对模块 `M` 依赖的模块都会隐式声明对模块 `N` 的依赖。\n\n依赖可以在编译时声明为强制性的，但在运行时使用 `requires`\
  \ 语句中的 `static` 修饰符声明为可选的。依赖可以同时是运行时可选的和传递性的。\n\n\n\n根据模块的声明方式以及是否具有名称，模块可分为几种类型。根据模块是否有名称，模块可以是**具名模块**或**未命名模块**。当模块有名称时，该名称可以在模块声明中显式给出，也可以自动（或隐式）生成。如果名称在模块声明中显式给出，则称为**显式模块**。如果名称在\
  \ JAR 清单的 `Automatic-Module-Name` 属性中指定，或由模块系统通过读取模块路径上的 JAR 文件名生成，则称为**自动模块**。如果你声明模块时未使用\
  \ `open` 修饰符，则称为**普通模块**。如果你使用 `open` 修饰符声明模块，则称为**开放模块**。基于这些定义，开放模块也是显式模块和具名模块。自动模块是具名模块，因为它有名称（该名称是自动生成的），但它不是显式模块，因为它是由模块系统在编译时和运行时隐式声明的。\n\
  \n当你将 JAR（非模块化 JAR）放置在模块路径上时，该 JAR 代表一个自动模块，其名称在 JAR 清单的 `Automatic-Module-Name`\
  \ 属性中指定，或从 JAR 文件名派生而来。自动模块读取所有其他模块，并且其所有包都被导出和开放。\n\n在 JDK 9 中，类加载器可以从模块或类路径加载类。每个类加载器维护一个名为未命名模块的模块，该模块包含它从类路径加载的所有类型。未命名模块读取所有其他模块。它将其所有包导出并开放给所有其他模块。未命名模块没有名称，因此显式模块不能声明对未命名模块的编译时依赖。如果显式模块需要访问未命名模块中的类型，前者可以使用自动模块作为桥梁，或使用反射。\n\
  \n你可以创建一个不包含自身代码的模块。它收集并重新导出其他模块的内容。这种模块称为**聚合模块**。聚合模块只包含一个类文件，即 `module-info.class`。聚合模块的模块声明由所有\
  \ `requires transitive <module>` 语句组成。\n\n不允许将包拆分到多个模块中。也就是说，同一个包不能定义在多个模块中。如果两个名为\
  \ `M` 和 `N` 的模块定义了同一个名为 `P` 的包，则不能存在一个模块 `Q`，使得 `M` 和 `N` 模块中的包 `P` 都能被 `Q` 访问。换句话说，多个模块中的同一个包不能同时被一个模块读取。否则，将发生错误。\n\
  \nJava 9 提供了一组类和接口，用于在运行时处理模块。它们统称为模块 API。模块 API 允许你在运行时查询和修改模块信息。模块在运行时表示为 `java.lang.Module`\
  \ 类的实例。你可以使用 `java.lang.Class<T>` 类的 `getModule()` 方法获取某个类型的模块引用。\n\n你可以使用 `javap`\
  \ 工具打印模块声明或属性。使用该工具的 `-verbose`（或 `-v`）选项来打印模块描述符的类属性。JDK 9 以特殊格式存储运行时映像。JDK 9 引入了一种名为\
  \ `jrt` 的新文件方案，你可以使用它来访问运行时映像的内容。其语法为 `jrt:/<module>/<path-to-a-file>`。\n\n练习题\n\
  \n1.  什么是模块？\n\n2.  你使用哪个关键字来声明模块？\n\n3.  指定模块名称的规则是什么？以下哪些模块名称是有效的？\n\n```\n  \
  \  jdojo.dashboard\n    $jdojo.$dashboard\n    jdojo.policy.1.0\n    java9Fundamentals\n\
  ```\n\n4.  列出所有仅在模块声明中特定位置使用时才被视为关键字的受限关键字。\n\n\n\n5.  使用什么模块语句可以将一个包导出给所有其他模块或一组命名模块？\n\
  \n6.  考虑以下针对名为 `jdojo.core` 的模块的声明：\n\n```\n    module jdojo.core {\n    exports\
  \ com.jdojo.core to jdojo.ext, jdojo.util;\n    }\n    ```\n\n解释此模块声明中 `exports`\
  \ 语句的作用。在编译 `jdojo.core` 模块时，`jdojo.ext` 和 `jdojo.util` 这两个模块是否必须存在？\n\n7.  使用什么模块语句来表达一个模块对另一个模块的依赖？什么是传递性依赖，使用传递性依赖有什么好处？\n\
  \n8.  考虑以下针对名为 `jdojo.ext` 的模块的声明：\n\n```\n    module jdojo.ext {\n    requires\
  \ jdojo.core;\n    }\n    ```\n\n`jdojo.ext` 读取哪两个模块？\n\n9.  如何表达一个模块对另一个模块的依赖，该依赖在编译时是必需的，但在运行时是可选的？\n\
  \n10. 什么是开放模块？何时使用开放模块？\n\n11. 开放模块与选择性开放模块的包之间有什么区别？为什么不能在开放模块内部使用 `opens` 语句？\n\
  \n12. 考虑以下针对名为 `jdojo.misc` 的模块的声明：\n\n```\n    module jdojo.misc {\n    opens com.jdojo.misc;\n\
  \    exports com.jdojo.misc;\n    }\n    ```\n\n此模块声明是否有效？如果有效，请解释开放和导出该模块的同一个包的作用。\n\
  \n13. 两个模块可以包含相同的包吗？请描述禁止两个模块拥有相同包的确切规则。\n\n14. 什么是自动模块？描述指定或推导自动模块名称的两种方式。\n\n\
  15. 什么是未命名模块？如果将模块化 JAR 放置在类路径上，该模块化 JAR 中的所有类型是否都会成为未命名模块的成员？\n\n16. 什么是聚合模块？请列举\
  \ JDK 9 中的一个聚合模块。\n\n17. 在运行时表示模块的类的完全限定类名是什么？\n\n18. 如何在运行时获取某个类所属模块的引用？\n\n19.\
  \ 考虑以下代码片段，假设存在一个 `Person` 类：\n\n```\n    Person john = new Person();\n    String\
  \ moduleName = john./* 补全代码 */;\n    System.out.println(\"Person 类的模块名称是 \" + moduleName);\n\
  \    ```\n\n通过将第二行中的注释替换为你的代码来补全此代码片段。此代码片段应打印 `Person` 类所属模块的名称，如果它属于未命名模块，则打印\
  \ `null`。\n\n20. 使用 `jar` 和 `java` 工具的哪个选项来描述模块？\n\n21. 如果给你一个包含模块声明编译后代码的 `module-info.class`\
  \ 文件，你将如何获取该模块的源代码？换句话说，你使用什么工具来反汇编一个类文件（该文件也可以是 `module-info.class` 文件）？\n\n22.\
  \ JDK 模块以名为 JIMAGE 的内部格式存储。JDK 9 引入的用于访问 JDK 模块的类文件和资源的新方案名称是什么？\n\n23. 使用 `javap`\
  \ 命令打印 `java.sql` 模块（这是一个 JDK 模块）的声明。\n\n11. Object 和 Objects 类\n\n在本章中，你将学习：\n\n\
  *   关于 Java 中的层次化类结构\n\n*   关于 `Object` 类是所有其他类的超类\n\n*   如何通过详细示例使用 `Object` 类的方法\n\
  \n*   如何在自己的类中重新实现 `Object` 类的方法\n\n*   如何检查两个对象是否相等\n\n*   不可变对象与可变对象之间的区别\n\n\
  *   如何使用 `Objects` 类的实用方法优雅地处理 `null` 值\n\n本章中的所有类都是 `jdojo.object` 模块的成员，如清单 11-1\
  \ 中所声明。\n\n\n\n```\n// module-info.java\nmodule jdojo.object {\nexports com.jdojo.object;\n\
  }\n清单 11-1.\njdojo.object 模块的声明\n```\n\nObject 类\n\nJava 在 `java.lang` 包中有一个 `Object`\
  \ 类，它是 `java.base` 模块的成员。所有 Java 类，无论是 Java 类库中包含的类，还是您自己创建的类，都直接或间接地继承自 `Object`\
  \ 类。所有 Java 类都是 `Object` 类的子类，而 `Object` 类是所有类的超类。请注意，`Object` 类本身没有超类。\n\nJava\
  \ 中的类以树状层次结构排列，其中 `Object` 类位于根（或顶部）。我将在第 20 章（涵盖继承）中详细讨论类层次结构。本章将讨论 `Object` 类的一些细节。\n\
  \n关于 `Object` 类有两条重要规则。我在此不解释这些规则背后的原因。在您阅读第 20 章后，您就能理解为什么可以对 `Object` 类执行这些操作。\n\
  \n规则 #1\n\n`Object` 类的引用变量可以持有任何类的对象的引用。由于任何引用变量都可以存储 `null` 引用，因此 `Object` 类型的引用变量也可以。考虑以下\
  \ `Object` 类型的引用变量 `obj` 的声明：\n\n```\nObject obj;\n```\n\n您可以将 Java 中任何对象的引用赋值给\
  \ `obj`。以下所有语句都是有效的：\n\n```\n// 可以赋值为 null 引用\nobj = null;\n// 可以赋值为 Object 类对象的引用\n\
  obj = new Object();\n// 可以赋值为 Account 类对象的引用\nAccount act = new Account();\nobj\
  \ = act;\n// 可以赋值为任何类的对象的引用。假设 AnyClass 类存在\nobj = new AnyClass();\n```\n\n此规则的逆命题不成立。您不能将\
  \ `Object` 类对象的引用赋值给任何其他类型的引用变量。以下语句无效：\n\n```\nAccount act = new Object(); // 编译时错误\n\
  ```\n\n有时，您可能会将特定类型（例如 `Account` 类型）对象的引用存储在 `Object` 类型的引用变量中，之后希望将该引用重新赋值给 `Account`\
  \ 类型的引用变量。您可以通过使用强制类型转换来实现，如下所示：\n\n```\nObject obj2 = new Account(); \nAccount\
  \ act = (Account)obj2; // 必须使用强制类型转换\n```\n\n有时您可能不确定 `Object` 类的引用变量是否持有特定类型对象的引用。在这些情况下，您需要使用\
  \ `instanceof` 运算符进行测试。`instanceof` 运算符的左操作数是一个引用变量，右操作数是一个类名——具体来说，是一个类型名，包括类和接口。如果其左操作数是其右操作数类型的引用，则返回\
  \ `true`。否则，返回 `false`。有关 `instanceof` 运算符的更详细讨论，请参阅第 20 章。\n\n```\nObject obj;\n\
  Cat c;\n/* 在此处执行某些操作并将引用存储在 obj 中... */\nif (obj instanceof Cat) {\n// 如果执行到这里，obj\
  \ 肯定持有 Cat 的引用\nc = (Cat)obj;\n}\n```\n\n当您有一个以 `Object` 作为参数的方法时，需要使用此规则。您可以为 `Object`\
  \ 类的参数传递任何对象的引用。考虑以下显示方法声明的代码片段：\n\n```\npublic void m1(Object obj) {\n// 代码在此处\n\
  }\n```\n\n您可以通过多种不同的方式调用 `m1()`：\n\n```\nm1(null);           // 传递 null 引用\nm1(new\
  \ Object());   // 传递 Object 类对象的引用\nm1(new AnyClass()); // 传递 AnyClass 类对象的引用\n\
  ```\n\n规则 #2\n\n`Object` 类包含九个方法，这些方法可供 Java 中的所有类使用。我们可以将这些方法分为两类。\n\n*   第一类方法已在\
  \ `Object` 类中实现。您应该按原样使用它们。您不能在您创建的任何类中重新实现（重新实现的技术术语是重写）这些方法。它们的实现是 `final` 的。属于此类别的方法有\
  \ `getClass()`、`notify()`、`notifyAll()` 和 `wait()`。\n\n*   第二类方法在 `Object` 类中有默认实现。您可以通过在您的类中重新实现它们来自定义其实现。属于此类别的方法有\
  \ `toString()`、`equals()`、`hashCode()`、`clone()` 和 `finalize()`。\n\nJava 程序员必须理解\
  \ `Object` 类中所有方法的正确用法。我将详细讨论它们，但 `notify()`、`notifyAll()` 和 `wait()` 方法除外。这些方法用于线程同步。它们将在本系列第二卷的第\
  \ 6 章中讨论。表 11-1 列出了 `Object` 类中的所有方法及其简要说明。“已实现”列中的“是”表示 `Object` 类已实现该方法，无需编写任何代码即可使用。此列中的“否”表示您需要先实现该方法才能使用它。“可自定义”列中的“是”表示您可以在您的类中重新实现该方法以自定义它。此列中的“否”表示\
  \ `Object` 类已实现该方法，并且其实现是 `final` 的。\n\n表 11-1.\n\nObject 类中的方法\n\n方法\n |\n 已实现\n\
  \ |\n 可自定义\n |\n 描述\n |\n\n| --- | --- | --- | --- | --- | --- | --- | --- | ---\
  \ |\n\n`public String toString()`\n |\n 是\n |\n 是\n |\n 返回对象的字符串表示形式。通常用于调试目的。\n\
  \ |\n\n`public boolean equals(Object obj)`\n |\n 是\n |\n 是\n |\n 用于比较两个对象是否相等。\n\
  \ |\n\n`public int hashCode()`\n |\n 是\n |\n 是\n |\n 返回对象的哈希码（整数）值。\n |\n\n`protected\
  \ Object clone() throws CloneNotSupportedException`\n |\n 否\n |\n 是\n |\n 用于复制对象。\n\
  \ |\n\n`protected void finalize() throws Throwable`\n |\n 否\n |\n 是\n |\n 在对象被销毁前由垃圾回收器调用。在\
  \ Java SE 9 中已弃用。\n |\n\n`public final Class  getClass()`\n |\n 是\n |\n 否\n |\n\
  \ 返回对该对象的 `Class` 对象的引用。\n |\n\n`public final void notify()`\n |\n 是\n |\n 否\n |\n\
  \ 通知对象等待队列中的一个线程。\n |\n\n`public final void notifyAll()`\n |\n 是\n |\n 否\n |\n 通知对象等待队列中的所有线程。\n\
  \ |\n\n`public final void wait()`\n\n`throws InterruptedException`\n\n`public final\
  \ void wait(long timeout)`\n\n`throws InterruptedException`\n\n`public final void\
  \ wait(long timeout, int nanos)`\n\n`throws InterruptedException`\n |\n 是\n |\n\
  \ 否\n |\n 使线程在对象的等待队列中等待，可以设置超时或不设置超时。\n |\n\n要重新实现 `Object` 类的方法，您需要以与 `Object`\
  \ 类中声明相同的方式声明该方法，然后在其方法体中编写您自己的代码。重新实现方法还有更多规则。我将在第 20 章中介绍所有规则。您可以在您的类（例如 `Test`）中重新实现\
  \ `Object` 类的 `toString()` 方法，如下所示：\n\n```\npublic class Test {\n/* 重新实现 Object\
  \ 类的 toString() 方法 */\npublic String toString() {\nreturn \"Here is a string\";\n\
  }\n}\n```\n\n我将在接下来的章节中详细讨论 `Object` 类的六个方法。\n\n对象的类是什么？\n\n\n\nJava 中的每个对象都属于一个类。你在源代码中定义类，并将其编译为二进制格式（扩展名为\
  \ `.class` 的类文件）。在运行时使用某个类之前，其二进制表示会被加载到 JVM 中。将类的二进制表示加载到 JVM 的过程由名为**类加载器**的对象处理。通常，Java\
  \ 应用程序会使用多个类加载器来加载不同类型的类。类加载器是 `java.lang.ClassLoader` 类的一个实例。Java 允许你通过扩展 `ClassLoader`\
  \ 类来创建自己的类加载器。通常，你不需要创建自己的类加载器，Java 运行时会使用其内置的类加载器来加载你的类。\n\n类加载器将类定义的二进制格式读入 JVM。二进制类格式可以从任何可访问的位置加载，例如本地文件系统、网络、数据库等。然后，它会创建一个\
  \ `java.lang.Class<T>` 类的对象，该对象在 JVM 中表示类型 `T` 的二进制表示。请注意类名 `java.lang.Class` 中的大写字母\
  \ `C`。类定义的二进制格式可能由不同的类加载器在 JVM 中多次加载。JVM 中的一个类由其完全限定名称和其类加载器的组合来标识。通常，一个类的二进制定义在\
  \ JVM 中只加载一次。\n\n提示\n\n你可以将 `Class<T>` 类的对象视为类源代码的运行时描述符。你的类源代码在运行时由 `Class` 类的对象表示。事实上，Java\
  \ 中的所有类型——类、接口和基本类型——在运行时都由 `Class` 类的实例表示。\n\n`Object` 类的 `getClass()` 方法返回 `Class`\
  \ 对象的引用。由于 `getClass()` 方法是在 `Object` 类中声明和实现的，因此你可以在任何类型的引用变量上使用此方法。以下代码片段展示了如何获取\
  \ `Cat` 对象的 `Class` 对象引用：\n\n```\nCat c = new Cat();\nClass catClass = c.getClass();\n\
  ```\n\n`Class` 类是泛型类，其形式类型参数是其对象所表示的类的名称。你可以使用泛型重写此语句，如下所示：\n\n```\nClass<Cat> catClass\
  \ = c.getClass();\n```\n\n默认情况下，类定义只加载一次，每个 Java 类只有一个 `Class` 对象。我们不考虑那些你编写代码多次加载同一个类的情况。如果你对同一个类的不同对象使用\
  \ `getClass()` 方法，你将获得同一个 `Class` 对象的引用。请考虑以下代码片段：\n\n```\nCat c2 = new Cat();\n\
  Cat c3 = new Cat();\nClass catClass2 = c2.getClass();\nClass catClass3 = c3.getClass();\n\
  ```\n\n这里，`c2` 和 `c3` 是同一个 `Cat` 类的两个对象。因此，`c2.getClass()` 和 `c3.getClass()` 返回同一个\
  \ `Class` 对象的引用，该对象在 JVM 中表示 `Cat` 类。表达式 `catClass2 == catClass3` 的计算结果为 `true`。\n\
  \n`Class` 类有许多有用的方法。我将在本系列第二卷的第 3 章中讨论其大部分方法。你可以使用其 `getName()` 方法获取类的完全限定名称。你可以使用其\
  \ `getSimpleName()` 方法获取类的简单名称。例如：\n\n```\nString fullName = catClass.getName();\n\
  String simpleName = catClass.getSimpleName();\n```\n\n提示\n\n并非应用程序中的所有类在应用程序启动时都会被加载到\
  \ JVM 中。当应用程序首次使用某个类时，该类才会被加载，并创建相应的 `Class` 对象。\n\n计算对象的哈希码\n\n哈希码是使用算法为一段信息计算出的整数值。哈希码也称为哈希和、哈希值或简称为哈希。从一段信息计算整数的算法称为哈希函数。哈希码的定义涉及三件事：\n\
  \n*   一段信息\n*   一个算法\n*   一个整数值\n\n你有一段信息。你对其应用一个算法以产生一个整数值。你得到的整数值就是你所拥有信息的哈希码。如果你更改了信息或算法，计算出的哈希码可能会改变，也可能不会改变。图\
  \ 11-1 描述了计算哈希码的过程。\n\n![A323069_2_En_11_Fig1_HTML.gif](img/A323069_2_En_11_Fig1_HTML.gif)\n\
  \n图 11-1. 计算哈希码的过程\n\n计算哈希码是一个单向过程。从哈希码中获取原始信息并非易事，而且这也不是哈希码计算的目标。\n\n可用于生成哈希码的信息可以是任意的字节序列、字符序列、数字序列或它们的组合。例如，你可能想要计算字符串\
  \ `\"Hello\"` 的哈希码。\n\n哈希函数是什么样的？哈希函数可能像以下函数一样简单，该函数对所有输入数据都返回整数零：\n\n```\nint myHashFunction()\
  \ {\n    return 0;  // 始终返回零\n}\n```\n\n这个哈希函数符合哈希函数的定义，尽管它实际上不是一个好的哈希函数。编写一个好的哈希函数并非易事。在编写一个好的哈希函数之前，你需要考虑输入数据的许多方面。\n\
  \n为什么需要哈希码？当数据存储在基于哈希的集合（或容器）中时，需要哈希码来高效检索与之关联的数据。在数据存储到容器之前，会计算其哈希码，然后将其存储在一个基于其哈希码的位置（也称为桶）。当你想检索数据时，会使用其哈希码在容器中找到其位置，从而使信息检索更快。值得注意的是，使用哈希码高效检索数据是基于哈希码值在一定范围内的分布情况。如果生成的哈希码分布不均匀，数据检索可能效率不高。在最坏的情况下，数据检索可能像对容器中存储的所有元素进行线性搜索一样糟糕。如果你使用一个哈希函数，容器中的所有元素都将存储在同一个桶中，这将需要搜索所有元素。使用一个好的哈希函数，使其为你提供均匀分布的哈希码，对于实现高效的基于哈希的容器以实现快速数据检索至关重要。\n\
  \n哈希码在 Java 中有什么用途？Java 使用哈希码的原因与上述相同——从基于哈希的集合中高效检索数据。如果你的类的对象不用作基于哈希的集合（例如 `HashSet`、`HashMap`\
  \ 等）中的键，则无需担心对象的哈希码。\n\n你可以在 Java 中计算对象的哈希码。对于对象而言，用于计算哈希码的信息是构成对象状态的信息。Java 设计者认为对象的哈希码非常重要，因此他们在\
  \ `Object` 类中提供了计算对象哈希码的默认实现。\n\n\n\n`Object` 类包含一个 `hashCode()` 方法，该方法返回一个 `int`\
  \ 值，即对象的哈希码。该方法的默认实现通过将对象的内存地址转换为整数来计算对象的哈希码。由于 `hashCode()` 方法定义在 `Object` 类中，因此\
  \ Java 中的所有类都可以使用它。不过，你可以自由地在自己的类中重写该实现。以下是在类中重写 `hashCode()` 方法时必须遵循的规则。假设有两个对象引用\
  \ `x` 和 `y`。\n\n*   如果 `x.equals(y)` 返回 `true`，则 `x.hashCode()` 必须返回一个与 `y.hashCode()`\
  \ 相等的整数。也就是说，如果两个对象通过 `equals()` 方法判定为相等，那么它们必须具有相同的哈希码。\n\n*   如果 `x.hashCode()`\
  \ 等于 `y.hashCode()`，则 `x.equals(y)` 不一定返回 `true`。也就是说，如果两个对象通过 `hashCode()` 方法具有相同的哈希码，它们不一定通过\
  \ `equals()` 方法判定为相等。\n\n*   如果在同一个 Java 应用程序的同一执行过程中，对同一个对象多次调用 `hashCode()` 方法，该方法必须返回相同的整数值。`hashCode()`\
  \ 和 `equals()` 方法紧密相关。如果你的类重写了这两个方法中的任何一个，那么为了你的类对象能在基于哈希的集合中正常工作，它必须同时重写这两个方法。另一个规则是，你应该只使用那些在\
  \ `equals()` 方法中用于检查相等性的实例变量来计算对象的哈希码。\n\n如果你的类是可变的，则不应将你的类对象用作基于哈希的集合中的键。如果用作键的对象在使用后发生了变化，你将无法在集合中找到该对象，因为在基于哈希的集合中查找对象是基于其哈希码的。在这种情况下，集合中会留下孤立的对象。\n\
  \n你应该如何为一个类实现 `hashCode()` 方法？以下是为你的类编写 `hashCode()` 方法逻辑的一些指南，这些指南对于大多数情况都是合理的：\n\
  \n1.  从一个质数开始，比如 37。\n\n```\n    int hash = 37;\n    ```\n\n2.  使用以下逻辑分别计算每个基本数据类型实例变量的哈希码值。请注意，你只需要在哈希码计算中使用那些也是\
  \ `equals()` 方法逻辑一部分的实例变量。让我们将这一步的结果存储在一个 `int` 变量 `code` 中。假设 `value` 是实例变量的名称。\n\
  \n对于 `byte`、`short`、`int` 和 `char` 数据类型，使用它们的整数值作为\n\n```\n    code = (int)value;\n\
  \    ```\n\n对于 `long` 数据类型，使用 64 位两半的 `XOR` 作为\n\n```\n    code = (int)(value ^\
  \ (value >>> 32));\n    ```\n\n对于 `float` 数据类型，使用以下方法将其浮点值转换为等效的整数值\n\n```\n   \
  \ code = Float.floatToIntBits(value);\n    ```\n\n对于 `double` 数据类型，使用 `Double` 类的\
  \ `doubleToLongBits()` 方法将其浮点值转换为 `long`，然后使用前面为 `long` 数据类型描述的过程将 long 值转换为 `int`\
  \ 值。\n\n```\n    long longBits = Double.doubleToLongBits(value);\n    code = (int)(longBits\
  \ ^ (longBits >>> 32));\n    ```\n\n对于 `boolean` 数据类型，`true` 使用 `1`，`false` 使用 `0`。\n\
  \n```\n    code = (value ? 1 : 0);\n    ```\n\n3.  对于引用实例变量，如果为 `null`，则使用 `0`。否则，调用其\
  \ `hashCode()` 方法获取其哈希码。假设 `ref` 是引用变量的名称。\n\n```\n    code = (ref == null ? 0:\
