  jdojo.intro\\com\\jdojo\\intro\\Welcome.class`。当你清理项目（右键单击并选择“清理”）或清理并构建项目时，整个 `build`\
  \ 目录会被删除并重新创建。\n\n`dist` 目录为项目中的每个模块存储一个模块化 JAR。对项目执行“清理”或“清理+构建”操作会删除所有模块化 JAR\
