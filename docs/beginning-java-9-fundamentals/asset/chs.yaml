  \ `abstract` 的主要规则的讨论。然而，在 Java 程序中，还有许多其他规则支配着 `abstract` 类和 `abstract` 方法的使用。这里列出了其中的大部分规则（如果不是全部的话）。所有规则都指向一个基本规则：“抽象类应该被子类化才能有用，并且子类应该重写抽象方法并为其提供实现。”\n\
  \n*   即使一个类没有 `abstract` 方法，它也可以被声明为 `abstract`。\n*   如果一个类声明或继承了一个 `abstract` 方法，那么它必须被声明为\
  \ `abstract`。如果该类重写了所有继承的 `abstract` 方法并提供了实现，并且没有声明任何 `abstract` 方法，那么它不必被声明为 `abstract`。尽管它也可以被声明为\
  \ `abstract`。\n*   你不能创建 `abstract` 类的对象。但是，你可以声明一个 `abstract` 类类型的变量，并使用它调用方法。\n\
  *   `abstract` 类不能被声明为 `final`。回想一下，`final` 类不能被继承，这与 `abstract` 类的要求相冲突，即它必须被子类化才能在真正意义上发挥作用。\n\
  *   `abstract` 类不应将所有构造函数都声明为 `private`。否则，`abstract` 类将无法被子类化。请注意，当创建一个类的对象时，所有祖先类（包括\
  \ `abstract` 类）的构造函数都会被调用。当你创建一个 `Rectangle` 类的对象时，`Object` 类和 `Shape` 类的构造函数也会被调用。如果你将\
  \ `abstract` 类的所有构造函数都声明为 `private`，你就无法为你的 `abstract` 类创建子类，这使其等同于声明一个 `abstract\
  \ final` 类。\n*   `abstract` 方法不能被声明为 `static`。请注意，`abstract` 方法必须被子类重写并实现。`static`\
  \ 方法不能被重写。但是，它可以被隐藏。\n*   `abstract` 方法不能被声明为 `private`。回想一下，`private` 方法不会被继承，因此不能被重写。`abstract`\
  \ 方法的要求是子类必须能够重写它并为其提供实现。\n\n\n\n*   `abstract`方法不能声明为`native`、`strictfp`或`synchronized`。这些关键字涉及方法的实现细节。`native`关键字表示该方法是用本地代码而非\
  \ Java 代码实现的。`strictfp`关键字表示方法内的代码在浮点运算中使用 FP-strict 规则。有关`strictfp`关键字及其用法的更多详细信息，请参阅[`http://en.wikipedia.org/wiki/Strictfp`](http://en.wikipedia.org/wiki/Strictfp)。`synchronized`关键字表示线程在执行方法代码之前，必须先锁定调用该方法的对象。由于`abstract`方法没有实现，因此暗示实现的关键字不能用于`abstract`方法。\n\
  \n*   类中的`abstract`方法可以重写其超类中的`abstract`方法，而无需提供实现。子类的`abstract`方法可以优化被重写的`abstract`方法的返回类型或异常列表。请考虑以下代码。类`B`重写了类`A`的`abstract\
  \ m1()`方法，但未提供其实现。它只是从`throws`子句中移除了一个异常。类`C`重写了类`B`的`m1()`方法并为其提供了实现。请注意，如类`B`和类`C`的`m1()`方法所示，返回类型或异常列表的更改必须遵循方法重写的规则。\n\
  \n```\n    public abstract class A {\n    public abstract void m1() throws CE1,\
  \ CE2;\n    }\n    public abstract class B extends A {\n    public abstract void\
  \ m1() throws CE1;\n    }\n    public class C extends B {\n    public void m1()\
  \ {\n    // 代码写在这里\n    }\n    }\n    ```\n\n一个具体的实例方法可以被`abstract`实例方法重写。这样做可以强制子类为该方法提供实现。Java\
  \ 中的所有类都继承自`Object`类的`equals()`、`hashCode()`和`toString()`方法。假设你有一个类`CA`，并且你希望它的所有子类都重写并为`Object`类的`equals()`、`hashCode()`和`toString()`方法提供实现。你需要在类`CA`中重写这三个方法并将它们声明为`abstract`，如下所示：\n\
  \n```\n    public abstract class CA {\n    public abstract int hashCode();\n   \
  \ public abstract boolean equals(Object obj);\n    public abstract String toString();\n\
  \    // 其他代码写在这里\n    }\n    ```\n\n在这种情况下，`Object`类的具体方法已被`CA`类中的`abstract`方法重写。`CA`的所有具体子类都被强制重写并为`equals()`、`hashCode()`和`toString()`方法提供实现。\n\
