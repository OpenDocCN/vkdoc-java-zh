  \ // 正确。将使用 add(int, double)\n```\n\n继承与构造方法\n\n一个对象包含两样东西：状态和行为。类中的实例变量表示其对象的状态。实例方法表示其对象的行为。类的每个对象都维护自己的状态。当你创建一个类的对象时，会为该类中声明的所有实例变量以及其所有祖先类中声明的所有实例变量分配内存。你的\
  \ `Employee` 类声明了一个 `name` 实例变量。当你创建 `Employee` 类的对象时，会为其 `name` 实例变量分配内存。当创建 `Manager`\
  \ 类的对象时，会为其超类 `Employee` 中存在的 `name` 字段分配内存。毕竟，经理具有与员工相似的状态。经理的行为与员工相似。让我们看一个例子。考虑两个类\
  \ `U` 和 `V`，如下所示：\n\n```\npublic class U {\nprivate int id;\nprotected String name;\n\
  }\npublic class V extends U {\nprotected double salary;\nprotected String address;\n\
  }\n```\n\n图 20-3 描述了创建类 `U` 和 `V` 的对象时的内存分配。当创建类 `U` 的对象时，仅为在类 `U` 中声明的实例变量分配内存。当创建类\
  \ `V` 的对象时，会为类 `U` 和类 `V` 中的所有实例变量分配内存。\n\n![A323069_2_En_20_Fig3_HTML.gif](img/A323069_2_En_20_Fig3_HTML.gif)\n\
  \n图 20-3.\n\n对象的内存分配包括该类及其所有祖先类的所有实例变量\n\n现在让我们进入本节讨论的主要话题，即构造方法。构造方法不是类的成员，也不会被子类继承。它们用于初始化实例变量。当你创建一个类的对象时，该对象包含来自该类及其所有祖先类的实例变量。为了初始化祖先类的实例变量，必须调用祖先类的构造方法。考虑以下两个类\
  \ `CSuper` 和 `CSub`，如清单 20-20 和 20-21 所示。清单 20-22 中的 `CTest` 类用于创建 `CSub` 类的对象。\n\
  \n```\n// CSuper.java\npackage com.jdojo.inheritance;\npublic class CSuper {\npublic\
