  ```\n\n编写自定义格式化器\n\n`Formatter` 类通过 `s` 和 `S` 转换支持自定义格式化。如果参数实现了 `java.util.Formattable`\
  \ 接口，`s` 转换会调用参数的 `formatTo()` 方法来获取格式化结果。`formatTo()` 方法接收一个 `Formatter` 对象的引用，以及格式说明符中使用的标志、宽度和精度值。你可以在类的\
  \ `formatTo()` 方法中应用任何自定义逻辑来格式化类的对象。清单 17-8 包含了 `FormattablePerson` 类的代码，该类实现了 `Formattable`\
  \ 接口。\n\n```\n// FormattablePerson.java\npackage com.jdojo.format;\nimport java.util.Formattable;\n\
  import java.util.Formatter;\nimport java.util.FormattableFlags;\npublic class FormattablePerson\
  \ implements Formattable {\nprivate String firstName = \"Unknown\";\nprivate String\
  \ lastName = \"Unknown\";\npublic FormattablePerson(String firstName, String lastName)\
  \ {\nthis.firstName = firstName;\nthis.lastName = lastName;\n}\n/* 其他代码在此... */\n\
  @Override\npublic void formatTo(Formatter formatter, int flags, int width, int precision)\
  \ {\nString str = this.firstName + \" \" + this.lastName;\nint alternateFlagValue\
  \ = FormattableFlags.ALTERNATE & flags;\nif (alternateFlagValue == FormattableFlags.ALTERNATE)\
  \ {\nstr = this.lastName + \", \" + this.firstName;\n}\n// 检查是否使用了转换的大写变体\nint upperFlagValue\
  \ = FormattableFlags.UPPERCASE & flags;\nif (upperFlagValue == FormattableFlags.UPPERCASE)\
  \ {\nstr = str.toUpperCase();\n}\n// 调用 formatter 参数的 format() 方法，\n// 以便将结果存储在其中，调用者将获取该结果\n\
  formatter.format(str);\n}\n}\n清单 17-8.\n使用 Formattable 接口实现自定义格式化器\n```\n\n你的 `Formattable`\
  \ 人物类包含名和姓。`formatTo()` 方法中的逻辑有意保持简单。你检查备用标志 `#`。如果在格式说明符中使用了此标志，则按 `姓, 名` 格式格式化人名。如果未使用备用标志，则按\
  \ `名 姓` 格式格式化人名。你还支持大写变体 `S` 到 `s` 的转换。如果使用了 `S` 转换，则以大写形式格式化人名。你的逻辑未使用标志、宽度和精度的其他值。标志以\
