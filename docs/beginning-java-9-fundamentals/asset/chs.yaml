  \ `equals()` 方法实现的规范。假设 `x`、`y` 和 `z` 是三个对象的非空引用。\n\n*   **自反性**：它应该是自反的。表达式 `x.equals(x)`\
  \ 应返回 `true`。也就是说，一个对象必须等于它自身。\n\n*   **对称性**：它应该是对称的。如果 `x.equals(y)` 返回 `true`，那么\
