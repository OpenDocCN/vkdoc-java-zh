  \n在本章中，你将学习：\n\n*   什么是新的日期时间 API\n\n*   日期时间 API 背后的设计原则\n\n*   计时、时区和夏令时的演变\n\n\
  *   关于日期、时间和日期时间记录的 ISO-8601 标准\n\n*   如何使用日期时间 API 类来表示日期、时间和日期时间，以及如何查询、调整、格式化和解析它们\n\
  \n*   如何使用旧的日期时间 API\n\n*   如何在旧版和新版日期时间 API 之间进行互操作\n\n日期时间 API 是在 Java 8 中引入的，并在\
  \ Java 9 中通过多个接口和类中的大量新方法得到了增强。本章全面介绍了日期时间 API，包括 Java 9 中对 API 的增强。该 API 由 `java.time.*`\
  \ 包组成，这些包位于 `java.base` 模块中。本章中的所有示例程序都是 `jdojo.datetime` 模块的成员，如清单 16-1 所示。\n\n\
  ```\n// module-info.java\nmodule jdojo.datetime {\nexports com.jdojo.datetime;\n\
  }\n清单 16-1.\njdojo.datetime 模块的声明\n```\n\n日期时间 API\n\nJava 8 引入了一个新的日期时间 API 来处理日期和时间。在本章中，我将\
  \ Java 8 之前可用的日期和时间相关类称为旧版日期时间 API。旧版日期时间 API 包括 `Date`、`Calendar`、`GregorianCalendar`\
  \ 等类。它们位于 `java.util` 和 `java.sql` 包中。`Date` 类自 JDK 诞生之初就已存在；其他类是在 JDK 1.1 中添加的。\n\
  \n为什么我们需要一个新的日期时间 API？简单的答案是，旧版日期时间 API 的设计者在两次尝试中都没有做对。仅举几例，旧版日期时间 API 的一些问题如下：\n\
  \n*   一个日期总是包含两个组成部分：日期和时间。如果你只需要一个不包含任何时间信息的日期，你别无选择。开发人员过去常常将日期对象中的时间设置为午夜来表示仅包含日期的日期，这在很多情况下都是不正确的。同样的论点也适用于仅存储时间的情况。\n\
  \n*   日期时间只是简单地存储为自 1970 年 1 月 1 日午夜 UTC 以来经过的毫秒数。\n\n*   操作日期复杂得超乎想象；`Date` 对象中的\
  \ `year` 字段存储为相对于 1900 年的偏移量；月份从 0 到 11，而不是像人类习惯的那样从 1 到 12。\n\n*   旧版日期时间类是可变的，因此不是线程安全的。\n\
  \n第三次尝试会成功吗？这是第三次尝试提供一个正确、强大且可扩展的日期时间 API。至少，在撰写本文时我们是这么说的！然而，新的 API 并非免费的午餐。如果你想充分发挥其潜力，学习曲线会相当陡峭。它包含大约\
  \ 80 个类。不要担心类数量庞大。它们都经过精心设计和命名。一旦你理解了其设计背后的思想，就相对容易找出在特定情况下需要使用的类名和方法。作为开发人员，你需要了解大约\
  \ 15 个类，才能在日常编程中有效地使用新的日期时间 API。\n\n设计原则\n\n在开始学习新日期时间 API 的细节之前，你需要了解一些关于日期和时间的基本概念。新的日期时间\
  \ API 基于 ISO-8601 日期时间标准。一个名为 Joda-Time 的 Java 日期时间框架启发了这个新的 API。如果你以前使用过 Joda-Time，你将能够快速学习新的日期时间\
  \ API。你可以在 [`http://joda-time.sourceforge.net`](http://joda-time.sourceforge.net)\
  \ 找到 Joda-Time 项目的详细信息。\n\n新的 API 区分了机器和人类使用日期和时间的方式。机器将时间视为连续的滴答声，即一个以秒、毫秒等单位测量的不断递增的数字。人类使用日历系统以年、月、日、时、分、秒的形式来处理时间。日期时间\
  \ API 有一组独立的类来处理基于机器的时间和基于日历的人类时间。它允许你将基于机器的时间转换为基于人类的时间，反之亦然。\n\n旧版日期时间 API 已经存在了超过\
  \ 15 年。在处理现有应用程序时，你很可能会遇到旧版日期时间类。旧版日期时间类已经过改造，可以与新类无缝协作。当你编写新代码时，请使用新的日期时间 API 类。当你接收到旧版类的对象作为输入时，将旧版对象转换为新的日期时间对象，然后使用新的日期时间\
  \ API。\n\n新的日期时间 API 主要由不可变类组成。由于新的 API 是可扩展的，建议你在可能的情况下创建不可变类来扩展 API。对日期时间对象的操作会创建一个新的日期时间对象。这种模式使得方法调用链式操作变得容易。\n\
  \n日期时间 API 中的类不提供公共构造函数。它们允许你通过提供名为 `of()`、`ofXxx()` 和 `from()` 的静态工厂方法来创建它们的对象。新的\
  \ API 使用方法命名约定来命名方法。API 中的每个类都有多个方法。了解方法命名约定可以让你轻松找到适合你目的的正确方法。我将在稍后的单独部分中讨论方法命名约定。\n\
  \n一个快速示例\n\n让我们看一个使用新的日期时间 API 处理日期和时间的示例。`LocalDate` 类的实例表示不带时间的本地日期；`LocalTime`\
  \ 类的实例表示不带日期的本地时间；`LocalDateTime` 类的实例表示本地日期和时间；`ZonedDateTime` 类的实例表示带时区的日期和时间。\n\
  \n\n\n`LocalDate` 和 `LocalTime` 也被称为**部分时间**，因为它们并不表示时间线上的某个时刻；它们不感知夏令时的变化。而 `ZonedDateTime`\
  \ 则表示给定时区中的一个时间点，该时间点可以转换为时间线上的一个时刻；它能够感知夏令时。例如，将凌晨 1 点的 `LocalTime` 增加四小时，会得到另一个凌晨\
  \ 5 点的 `LocalTime`，无论日期和地点如何。但是，如果你将表示 2014 年 3 月 9 日凌晨 1 点（芝加哥/美洲时区）的 `ZonedDateTime`\
  \ 增加四小时，则会得到同一时区 2014 年 3 月 9 日早上 6 点的时间，因为由于夏令时，当天凌晨 2 点时时钟会向前拨快一小时。航空应用程序使用 `ZonedDateTime`\
  \ 类的实例来存储航班的起飞时间和到达时间。\n\n在日期-时间 API 中，表示日期、时间和日期时间的类都有一个 `now()` 方法，分别返回当前日期、时间或日期时间。以下代码片段创建了表示日期、时间以及带时区和不带时区的日期时间组合的对象：\n\
  \n```\nLocalDate dateOnly = LocalDate.now();\nLocalTime timeOnly = LocalTime.now();\n\
  LocalDateTime dateTime = LocalDateTime.now();\nZonedDateTime dateTimeWithZone =\
  \ ZonedDateTime.now();\n```\n\n`LocalDate` 不感知时区。在同一时刻，它在不同时区会有不同的解释。当时间和时区对于赋予日期值意义并不重要时（例如出生日期、书籍出版日期等），`LocalDate`\
  \ 对象用于存储日期值。\n\n你可以使用静态工厂方法 `of()` 来指定日期时间对象的各个组成部分。以下代码片段通过指定日期的年、月、日组成部分来创建一个\
  \ `LocalDate`：\n\n```\n// 创建一个表示 1968 年 1 月 12 日的 LocalDate\nLocalDate myBirthDate\
  \ = LocalDate.of(1968, JANUARY, 12);\n```\n\n提示\n\n`LocalDate` 存储的是仅包含日期的值，不包含时间和时区。当你使用静态方法\
  \ `now()` 获取 `LocalDate` 时，系统会使用默认时区来获取日期值。\n\n清单 16-2 展示了如何获取当前日期、时间、日期时间以及带时区的日期时间。它还展示了如何根据年、月中的月份、月中的日期来构造一个日期。由于它会打印当前的日期和时间值，因此你可能会得到不同的输出。\n\
  \n```\n// CurrentDateTime.java\npackage com.jdojo.datetime;\nimport java.time.LocalDate;\n\
  import java.time.LocalTime;\nimport java.time.LocalDateTime;\nimport java.time.ZonedDateTime;\n\
  import static java.time.Month.JANUARY;\npublic class CurrentDateTime {\npublic static\
  \ void main(String[] args) {\n// 获取当前日期、时间和日期时间\nLocalDate dateOnly = LocalDate.now();\n\
  LocalTime timeOnly = LocalTime.now();\nLocalDateTime dateTime = LocalDateTime.now();\n\
  ZonedDateTime dateTimeWithZone = ZonedDateTime.now();\nSystem.out.println(\"当前日期:\
  \ \" + dateOnly);\nSystem.out.println(\"当前时间: \" + timeOnly);\nSystem.out.println(\"\
  当前日期和时间: \" + dateTime);\nSystem.out.println(\"当前日期、时间和时区: \" + dateTimeWithZone);\n\
  // 从日期时间组成部分构造出生日期和时间\nLocalDate myBirthDate = LocalDate.of(1968, JANUARY, 12);\n\
  LocalTime myBirthTime = LocalTime.of(7, 30);\nSystem.out.println(\"我的出生日期: \" +\
  \ myBirthDate);\nSystem.out.println(\"我的出生时间: \" + myBirthTime);\n}\n}\n清单 16-2.\n\
  获取当前日期、时间和日期时间，以及构造日期\n```\n\n```\n当前日期: 2017-08-04\n当前时间: 08:48:29.402753900\n\
  当前日期和时间: 2017-08-04T08:48:29.402753900\n当前日期、时间和时区: 2017-08-04T08:48:29.403754200-05:00[America/Chicago]\n\
  我的出生日期: 1968-01-12\n我的出生时间: 07:30\n```\n\n该程序使用了四个类来获取本地日期、时间、日期时间以及带时区的日期时间。在旧的日期-时间\
  \ API 中，你可能只需要使用 `Calendar` 类就能获得类似的结果。\n\n日期-时间 API 非常全面。它包含大约 80 个类和大约 1000 个方法。它允许你使用不同的刻度和不同的日历系统来表示和操作日期与时间。在计时方面，有几种本地标准和一个通用标准（ISO-8601）一直在使用。为了充分利用日期-时间\
  \ API，你需要了解计时的发展历史。接下来的几节将简要概述使用日历系统和 ISO-8601 日期与时间标准来测量时间的不同方法。如果你对这些主题有很好的理解，可以跳过这些部分，从“探索新的日期-时间\
  \ API”部分继续阅读。\n\n计时的演变\n\n我们使用刻度来测量物理事物的数量，例如以米为单位的字符串长度、以磅为单位的人的体重、以升为单位的水的体积等。在这里，米、磅和升是特定刻度上的测量单位。\n\
  \n我们如何测量时间？时间不是物理事物。为了测量时间，我们将其与周期性的物理现象联系起来，例如钟摆的摆动、地球绕其轴的自转、地球绕太阳的公转、与原子中两个能级之间的量子跃迁相关的电磁信号的振荡等。因此，时间刻度是一种用于定义时间持续时长的事件安排。\n\
  \n在古代，诸如日出和日落（由于地球绕其轴自转而产生）等事件被用作时间刻度；该时间刻度的单位是天。两次连续日出之间的持续时间计为一天。\n\n随着人类文明的发展，计时设备被开发出来。其中一些包括：\n\
  \n*   基于太阳位置的日晷\n*   基于钟摆周期性运动的机械钟\n*   最后，基于铯-133 原子特性的原子钟\n\n时钟是一种计时设备，由两个组件组成：频率标准和计数器。时钟中的频率标准是一个组件，用于获取等间距的周期性事件，以测量所需时间间隔的长度。计数器（也称为累加器或加法器）统计周期性事件发生的次数。例如，在摆钟中，钟摆完成一个完整周期表示一秒的时间间隔，齿轮统计秒数，钟面显示时间。即使在古代，也存在两部分时钟的概念用于计时。地球的自转以日出和日落的周期性事件形式提供了时钟的第一个组件；日历则提供了时钟的第二个组件，用于统计天数、月份和年份。\n\
  \n\n\n基于地球绕其自转轴的旋转，人们使用了多种被称为**世界时（UT）** 的时间尺度。地球绕其自转轴和太阳的运动是不规则的。由于地球运动的不规则性，每天的长度以及每年所含的小数天数都会发生变化。一个太阳日（也称为**视太阳日**或**真太阳日**）是通过观测太阳在本地正午连续两次经过同一位置所测得的时间长度。如果你每天正午使用一个完美的时钟在本地子午线上观测太阳，你会发现，在一年中，太阳在天空中的位置会在本地子午线的东西方向变化约四度（约\
  \ 16 分钟的时间）。这意味着，在一年中的某一天，时钟显示的正午时间与太阳经过本地子午线的时间之间可能存在长达 16 分钟的差异。时钟时间与太阳时间之间的这种差异，是由于地球自转轴相对于其轨道平面的倾斜以及其绕太阳的椭圆轨道引起的，被称为**均时差**。使用太阳日测量的时间称为**视太阳时**。\n\
  \n通过对太阳时进行修正以考虑均时差而得到的时间称为**世界时零（UT0）** 或**平太阳时**。经过英国格林威治的本初子午线（零度经度）的午夜被定义为 UT0\
  \ 的 00 时。一秒被定义为平太阳日的 1/86400。\n\n地球相对于其自转轴的摆动被称为**极移**。对 UT0 进行极移修正后得到另一个时间尺度，称为**UT1**。地球的自转速度并不均匀。对\
  \ UT1 进行地球自转速度季节性变化的修正后得到另一个时间尺度，称为**UT2**。\n\n地球不规则的旋转速率导致了另一个时间尺度，称为**历书时（ET）**。ET\
  \ 基于地球绕太阳公转一周的周期以及其他天体的运动。在 ET 尺度上，历书秒被定义为 1900 年 1 月 0 日 12 时历书时回归年的 1/31556925.9747。ET\
  \ 在 20 世纪 80 年代初被**地球动力学时（TDT）** 和**质心动力学时（TDB）** 所取代。\n\n**国际原子时**（也称为 TAI，源自其法文名称\
  \ Temps Atomique International）尺度是一种原子时尺度。原子秒，即 TAI 尺度的时间单位，被定义为铯-133 原子基态两个超精细能级之间跃迁所对应辐射的\
  \ 9192631770 个周期的持续时间。1967 年，原子秒的定义成为了国际单位制（SI）秒的定义。**国际计量局（BIPM）** 是原子时的官方计时机构。共有\
  \ 65 个实验室的超过 230 台原子钟为 TAI 尺度做出贡献。每台为 TAI 做出贡献的原子钟都会根据其性能被分配一个权重因子。所有贡献原子钟的加权平均值即为\
  \ TAI。\n\n为什么我们要使用许多原子钟来测量 TAI？一台时钟可能会发生故障并停止计时。即使是原子钟也会受到环境变化的影响。为了避免此类故障和不准确性，人们使用多台原子钟来追踪\
  \ TAI。\n\n1972 年 1 月 1 日，**协调世界时（UTC）** 被采纳为全世界所有民用目的的官方时间尺度。UTC 和原子钟以相同的速率运行。当\
  \ BIPM 以 TAI 尺度计算秒数时，天文学家继续使用地球绕其自转轴的旋转来测量时间。天文时间与 UTC 进行比较，如果它们相差超过 0.9 秒，则会向 UTC\
  \ 增加或减去一个**闰秒**，以使 UT0 和 UTC 时间尺度尽可能接近。**国际地球自转服务（IERS）** 负责决定是否向 UTC 引入闰秒。\n\n\
  在任何时候，UTC 与 TAI 相差一个整数秒。UTC 和 TAI 之间的关系可以表示如下：\n\n```\nUTC = TAI - (闰秒的代数和)\n```\n\
  \n截至 2012 年 7 月 1 日，已向 UTC 增加了 35 个闰秒。到目前为止，还没有从 UTC 中减去闰秒。因此，在 2012 年 7 月 1 日及直到引入下一个闰秒之前，UTC\
  \ 和 TAI 的关系如下：\n\n```\nUTC = TAI - 35\n```\n\n你可能会认为，因为我们一直在向 UTC 增加闰秒，UTC 应该比 TAI\
  \ 快。事实并非如此。向 UTC 增加一个闰秒会使 UTC 尺度上的那一小时变为 61 秒长，而不是 60 秒。TAI 是一个连续的时间尺度；它一直在滴答作响。当\
  \ UTC 完成该小时的第六十一秒时，TAI 已经进入了下一小时的第一秒。因此，当向 UTC 增加一个闰秒时，UTC 滞后于 TAI。类似的逻辑，但顺序相反，适用于从\
  \ UTC 中减去闰秒的情况。如果在未来的某个时候，向 UTC 增加和从 UTC 中减去的闰秒数量相等，那么 UTC 和 TAI 将显示相同的时间。\n\nUTC\
  \ 代表地球本初子午线（零度经线，穿过英国格林威治）的当天时间。UTC 基于 24 小时制，一天从午夜 00 时开始。UTC 也被称为**祖鲁时间**。ISO-8601\
  \ 标准使用字母 Z 作为 UTC 当天时间的标识符；例如，当天时间 15 时 19 分 23 秒 UTC 写作 15:19:23Z。\n\n关于 UTC，你还没学完呢！我将讨论另外两个版本的\
  \ UTC：**简化 UTC**和**带平滑闰秒的 UTC（UTC-SLS）**。\n\n人类习惯于将太阳日理解为 24 小时周期：每小时包含 60 分钟，每分钟包含\
  \ 60 秒。一个太阳日包含 86400 秒。在 UTC 尺度上，由于闰秒的存在，一个太阳日也可能包含 86399 或 86401 秒。为了方便普通用户理解，大多数计算机系统会忽略\
  \ UTC 尺度上的闰秒。忽略闰秒的 UTC 尺度被称为**简化 UTC 尺度**。\n\n提示\n\n为了满足大多数用户的期望，新的 Java 日期时间 API\
  \ 使用了简化 UTC，其中闰秒被忽略，使得所有天数都具有相同的 86400 秒。\n\n当在 UTC 中增加或减去闰秒时，会在一天结束时的时间尺度上产生一秒的间隙或重叠。UTC-SLS\
  \ 是一种处理 UTC 闰秒的提议标准。UTC-SLS 并非在一天结束时引入一个闰秒，而是提议通过将时钟速率改变 0.1%，在一天的最后 1000 秒内平滑地调整\
  \ 1 秒。在向 UTC 增加闰秒的那一天，UTC-SLS 将使该天的最后 1000 秒变为 1001 毫秒长；因此，从 23:43:21 到 24:00:00，UTC-SLS\
  \ 时钟的速率降低了 0.1%。在向 UTC 增加闰秒的那一天，UTC-SLS 将使该天的最后 1000 秒变为 999 毫秒长；因此，从 23:43:19 到\
  \ 24:00:00，UTC-SLS 时钟的速率增加了 0.1%。\n\n最后，有人提议通过从 UTC 中移除闰秒来获得通用且单调的民用时间。也有人提议用**闰小时**来取代\
  \ UTC 闰秒！\n\n**时区**与夏令时\n\n当 UTC 时间是 2012 年 4 月 20 日午夜时，印度新德里和美国芝加哥的当地时间是什么？在印度新德里是\
  \ 2012 年 4 月 20 日早上 5 点 30 分，在美国芝加哥是 2012 年 4 月 19 日晚上 7 点 00 分。我们如何确定一个地方的当地时间？如果全世界只有一个时间，那岂不是很好？如果\
  \ UTC 是午夜，那么全世界都是午夜。也许这在过去会是一个好主意，因为人类的大脑能够通过实践随着时间的推移逐渐适应新观念。一个地区的当地时间被设定为一天从 00\
  \ 时开始，也就是午夜。因此，新德里和芝加哥的 00 时都是午夜。\n\n\n\n从地理上看，世界可划分为 24 个纵向带区，每个带区从本初子午线开始覆盖 15\
  \ 度的经度范围；每个带区代表一个时区。一个时区所覆盖的区域将使用相同的时间。\n\n人类在政治上的划分远多于地理上的划分。在这个世界上，我们的政治差异总是凌驾于地理相似性之上！有时，分隔两个国家或州的虚构边界会使边界两侧的人们观察到不同的时间。\n\
  \n实际上，时区是根据政治区域划分的：国家以及国家内部的地区。每个时区的当地时间都是相对于协调世界时（UTC）的偏移量。这个偏移量，即 UTC 与某个时区当地时间之间的差值，被称为时区偏移量。本初子午线以东的地区使用正的时区偏移量。本初子午线以西的地区使用负的时区偏移量。时区偏移量以小时和分钟表示，例如\
  \ +5:30 小时、-10:00 小时等。例如，印度使用的时区偏移量为 +5:30 小时；因此，你可以在 UTC 基础上加上 5 小时 30 分钟来得到印度当地时间。你可能会认为某个时区的偏移量是固定的。唉，我们这些文明且先进的人类，在计时方面曾经是如此简单！\n\
  \n有些国家拥有多个时区。例如，美国有五个时区：阿拉斯加、太平洋、山地、中部和东部；印度只有一个时区。在美国，当阿拉巴马州莫比尔市（中部时区）的当地时间是早上\
  \ 7:00 时，加利福尼亚州洛杉矶市（太平洋时区）的当地时间是早上 5:00。由于只有一个时区，印度的所有地方都使用相同的时间。\n\n某些时区的偏移量在一年中会发生变化。例如，在美国芝加哥（称为中部时区），夏季的时区偏移量为\
  \ -5:00 小时，冬季为 -6:00 小时。大多数国家使用固定的时区偏移量。例如，印度使用固定的 +5:30 小时偏移量。一个时区的规则，包括时区偏移量何时变化以及变化多少，由政府决定。这些规则被称为时区规则。\n\
  \n时区偏移量的范围在 +14:00 小时到 -12:00 小时之间。如果一天只有 24 小时，怎么会有 +14 的时区偏移量呢？这个范围，从 +14 到 -12，使得一天变成了\
  \ 26 小时！请注意，一些国家由几个相距遥远的小岛组成，这些岛屿位于国际日期变更线的两侧，使得它们之间相差一天。这给这些国家岛屿间的官方通信带来了问题，因为它们只有四个共同的工作日。它们将时区偏移量扩展到\
  \ 12:00 以上，从而为本国移动了国际日期变更线，以使整个国家位于国际日期变更线的同一侧。使用 +13:00 和 +14:00 小时时区偏移量的国家包括基里巴斯（发音为“kirbas”）、萨摩亚和托克劳。\n\
  \n夏令时（DST）是为了更好地利用傍晚的日光，在春季将时钟拨快（通常为一小时）。秋季再将时钟拨回相同的时间。一年中实行夏令时的时期称为夏季；一年中的其他时期称为冬季。并非所有国家都实行夏令时。一个国家（或仅国内某些地区）是否实行夏令时，由政府决定；如果实行，政府会决定拨快和拨回时钟的日期和时间。例如，美国实行夏令时的地区在\
  \ 2012 年 3 月 11 日当地时间凌晨 2:00 将时钟拨快一小时，从而产生了一小时的间隙。请注意，在 2012 年 3 月 11 日，美国这些地区的当地时间在凌晨\
  \ 2:00 到 3:00 之间是不存在的。在秋季，当时钟被拨回时，会产生相同时间量的重叠。印度和泰国是众多不实行夏令时的国家中的两个。夏令时每年两次改变实行夏令时地区相对于\
  \ UTC 的时区偏移量。\n\n历法系统\n\n人类使用历法来处理时间。历法中使用的单位是年、月、日、小时、分钟和秒。从这个意义上说，历法是一种系统，用于以有意义的方式为人类追踪过去和未来的时间，服务于社会、政治、法律、宗教等目的。\n\
  \n通常，历法系统不追踪一天中的具体时间；它以日、月和年为单位运作。广义上讲，在历法中，一天基于地球绕其轴的自转，一月基于月球绕地球的公转，一年基于地球绕太阳的公转。有时，历法系统基于星期，而星期则基于非天文周期。\n\
  \n在人类历史上，已知不同文明使用过不同的历法系统。大多数古代历法系统都基于由太阳运动、月球运动或两者共同产生的天文周期，从而产生了三种历法系统：阳历、阴历和阴阳历。\n\
  \n阳历旨在与回归年（也称为太阳年）对齐，回归年是春分之间的平均间隔。春分每年发生两次，此时太阳中心与地球赤道处于同一平面。“春分”一词意为“等夜”；在春分日，白天和黑夜的长度几乎相等。春分发生在春季，大约在\
  \ 3 月 21 日；秋分发生在秋季，大约在 9 月 22 日。公历是世界上最广泛用于民用目的的历法，是阳历的一个例子。\n\n阴历基于月相周期。它不与回归年对齐。在一年中，它会偏离回归年\
  \ 11 到 12 天。阴历大约需要 33 年才能赶上回归年，然后再用 33 年再次偏离。一个朔望月，也称为太阴月，是新月之间的时间间隔，等于 29 天 12\
  \ 小时 44 分钟 2.8 秒。伊斯兰历是阴历的一个例子。\n\n阴阳历像阴历一样基于月相周期计算月份。然而，它会在 2 年或 3 年的周期中插入一个闰月，以使其与回归年保持一致。佛教历、印度阴阳历、中国历和希伯来历都是阴阳历的一些例子。\n\
  \n儒略历\n\n儒略历是尤利乌斯·凯撒于公元前 45 年引入的一种阳历。它被欧洲文明广泛使用，直到公元 1582 年公历被引入。\n\n平年有 365 天。每四年，在\
  \ 2 月 28 日和 3 月 1 日之间插入一天，指定为 2 月 29 日，使该年有 366 天，这被称为闰年。公元前 1 年被认为是闰年。儒略历年的平均长度为\
  \ 365.25 天，接近当时已知的回归年长度。\n\n一年有 12 个月。每个月的长度是固定的。表 16-1 列出了儒略历中月份的顺序、名称和天数。\n\n\
  表 16-1. 儒略历（及公历）中月份的顺序、名称和天数\n\n| 顺序 | 月份名称 | 天数 |\n| --- | --- | --- |\n| 1 | 一月\
  \ | 31 |\n| 2 | 二月 | 28（闰年 29） |\n| 3 | 三月 | 31 |\n| 4 | 四月 | 30 |\n| 5 | 五月 | 31\
  \ |\n| 6 | 六月 | 30 |\n| 7 | 七月 | 31 |\n| 8 | 八月 | 31 |\n| 9 | 九月 | 30 |\n| 10 |\
  \ 十月 | 31 |\n| 11 | 十一月 | 30 |\n| 12 | 十二月 | 31 |\n\n公历\n\n公历是世界上用于民用目的最广泛使用的历法。它在一年中的月数和每月的天数上遵循儒略历的规则。然而，它改变了计算闰年的规则：如果年份能被\
  \ 4 整除，则为闰年。能被 100 整除的年份不是闰年，除非它也能被 400 整除。\n\n\n\n例如，4、8、12、400 和 800 被称为闰年，而 1、2、3、5、300\
  \ 和 100 被称为平年。公元 0 年（即公元前 1 年）被视为闰年。通过采用新的闰年定义，公历年的平均长度为 365.2425 天，这与回归年的长度非常接近。公历每\
  \ 400 年重复一次。如果你保存了 2014 年的纸质日历，你的第 N 代曾孙将能在 2414 年重新使用它！\n\n公历于 1582 年 10 月 15 日星期五开始推行。在公历开始的前一天，根据当时使用的儒略历，是\
  \ 1582 年 10 月 4 日星期四。请注意，公历的引入并未影响星期周期的循环；然而，它导致两种历法之间出现了 10 天的断层，这被称为“切换日”。切换日之前的日期为儒略历日期，切换日之后的日期为公历日期，而切换日期间的日期则不存在。\n\
  \n公历在 1582 年 10 月 15 日之前并不存在。我们如何为公历开始之前的事件指定日期呢？将公历应用于其尚未生效时期的做法，被称为**预测公历**。因此，1582\
  \ 年 10 月 14 日存在于预测公历中，它等同于儒略历中的 1582 年 10 月 4 日。\n\n为什么公历的第一天是 1582 年 10 月 15 日星期五，而不是\
  \ 1582 年 10 月 5 日星期五？根据 Doggett 的《历法》（未注明出版年份），在儒略历中，基督教节日复活节的日期是基于“3 月 21 日是春分日”这一假设来计算的。后来人们意识到，春分日已经从\
  \ 3 月 21 日发生了漂移；因此，复活节的日期也随之偏离了春季时节。为了使复活节的日期与春季保持同步，公历在起始日期上调整了 10 天，这样 1583 年及以后的春分日大约都发生在\
  \ 3 月 21 日。\n\n**提示**\n\n儒略历和公历的主要区别在于确定闰年的规则。公历年的平均长度比儒略历更接近回归年的长度。\n\n**ISO-8601\
  \ 日期时间标准**\n\n新的日期时间 API 对 ISO-8601 标准提供了广泛支持。本节旨在简要且有限地介绍 ISO-8601 标准中包含的日期时间组件及其文本表示形式。ISO\
  \ 8601 中的日期时间由三个组件组成：日期、时间和时区偏移量，它们按以下格式组合：\n\n```\n[日期]T[时间][时区偏移量]\n```\n\n日期组件由三个日历字段组成：年、月和日。日期中的两个字段之间用连字符分隔。\n\
  \n```\n年-月-日\n```\n\n例如，`2012-04-30` 表示 2012 年 4 月的第 30 天。\n\n有时，人们处理的日期可能不包含识别日历中特定某一天所需的完整信息。例如，`12\
  \ 月 25 日` 作为圣诞节是有意义的，无需指定日期的年份部分。要识别日历中特定的圣诞节，我们还必须指定年份。缺少某些部分的日期称为**部分日期**。`2012`、`2012-05`、`-----05-29`\
  \ 等是部分日期的示例。ISO-8601 只允许从日期的右端省略部分。也就是说，它允许省略日，或者省略月和日。日期时间 API 允许三种类型的部分日期：年、年-月\
  \ 和 月-日。\n\n日期和时间组件由字符 `T` 分隔。时间组件由字段组成：时、分、秒。时间组件中的两个字段之间用冒号分隔。时间按以下格式表示：\n\n```\n\
  时:分:秒\n```\n\nISO-8601 使用 24 小时计时系统。小时元素可以在 00 到 24 之间。小时 24 用于表示一个日历日的结束。分钟元素的值范围是\
  \ 00 到 59。秒元素的范围可以是 00 到 60。秒元素的值为 60 表示一个正闰秒。例如，`15:20:56` 表示午夜后 15 小时又 20 分 56\
  \ 秒的本地时间。当允许降低精度时，可以从时间中省略秒，或者省略秒和分钟元素。例如，`15:19` 和 `07` 分别表示 15 小时又 19 分，以及午夜后\
  \ 7 小时。\n\n午夜是一个日历日的开始。它由 `00:00:00` 或 `00:00` 表示。一个日历日的开始与前一个日历日的结束重合。因此，一个日历日的午夜也可以用\
  \ `24:00:00` 或 `24:00` 表示。\n\n当指定日期、时间或日期时间而没有时区偏移量时，它们分别被视为本地日期、本地时间或本地日期时间。本地日期、本地时间和本地日期时间的示例分别是\
  \ `2012-05-01`、`13:52:05` 和 `2012-05-01T13:52:05`。\n\n使用时区偏移量，你可以表示相对于世界协调时（UTC）当天的时间分量。时区偏移量表示本地时间与\
  \ UTC 之间的固定差值。它以加号或减号（+ 或 -）开头，后跟由冒号分隔的小时和分钟元素。时区偏移量的一些示例有 `+05:30`、`-06:00`、`+10:00`、`+5:30`\
  \ 等。字符 `Z` 用作时区偏移量指示符，表示 UTC 当天的时间。例如，`10:20:40Z` 表示 UTC 当天上午 10 点 20 分 40 秒；`12:20:40+2:00`\
  \ 表示下午 12 点 20 分 40 秒的本地时间，比 UTC 快 2 小时。`10:20:40Z` 和 `12:20:40+2:00` 这两个时间表示的是同一个时间点。\n\
  \n**提示**\n\nISO-8601 规定了在时间表示中使用相对于 UTC 的固定时区偏移量的标准。回想一下，对于实行夏令时的时区，时区偏移量可能会变化。除了\
  \ ISO-8601 标准之外，日期时间 API 也支持可变的时区偏移量。\n\n一个所有三个组件都完全指定的日期时间示例如下：\n\n```\n2012-05-01T16:30:00-06:00\n\
  ```\n\n此日期时间表示 2012 年 5 月 1 日午夜后 16 小时 30 分，该时间比 UTC 慢 6 小时。\n\nISO-8601 还包括其他几个与日期和时间相关的概念标准，例如瞬时、持续时间、周期、时间间隔等。日期时间\
  \ API 提供了类，这些类的对象直接表示大多数（但不是全部）ISO 日期和时间概念。\n\n日期时间 API 中所有日期和时间类的 `toString()`\
  \ 方法都会返回 ISO 格式的日期和时间的文本表示形式。该 API 包含一些类，允许你以非 ISO 格式格式化日期和时间。\n\nISO 标准包括用于指定时间量的格式，称为**持续时间**。ISO-8601\
  \ 将持续时间定义为非负量。但是，日期时间 API 也允许将负量视为持续时间。表示持续时间的 ISO 格式如下：\n\n```\nPnnYnnMnnDTnnHnnMnnS\n\
  ```\n\n在此格式中，`P` 是持续时间指示符；`nn` 表示一个数字；`Y`、`M`、`D`、`H`、`M` 和 `S` 分别表示年、月、日、时、分和秒；`T`\
  \ 是时间指示符，仅当持续时间涉及小时、分钟和秒时才出现。以下是一些持续时间的文本表示示例。内联注释描述了该持续时间。\n\n```\nP12Y      //\
  \ 持续时间为 12 年\nPT15:30   // 持续时间为 15 小时 30 分钟\nPT20S     // 持续时间为 20 秒\nP4Y2MT30M\
  \ // 持续时间为 4 年 2 个月 30 分钟\n```\n\n**提示**\n\n日期时间 API 提供了 `Duration` 和 `Period` 类来处理时间量。`Duration`\
  \ 表示机器尺度时间线上的时间量。`Period` 表示人类尺度时间线上的时间量。\n\n**探索新的日期时间 API**\n\n\n\n起初，探索日期时间 API\
  \ 会让人望而生畏，因为它包含许多拥有大量方法的类。学习方法的命名约定将极大地帮助理解该 API。日期时间 API 经过精心设计，以确保类及其方法的名称保持一致且直观。以相同前缀开头的方法执行类似的工作。例如，类中的\
  \ `of()` 方法被用作静态工厂方法来创建该类的对象。\n\n日期时间 API 的所有类、接口和枚举都位于 `java.time` 包及其四个子包中，如表\
  \ 16-2 所列。\n\n表 16-2.\n\n日期时间 API 的包和子包\n\n包\n | 描述\n |\n\n| --- | --- | --- | ---\
  \ | --- |\n\n`java.time`\n | 包含常用类。`LocalDate`、`LocalTime`、`LocalDateTime`、`ZonedDateTime`、`Period`、`Duration`\
  \ 和 `Instant` 类都在此包中。此包中的类基于 ISO 标准。\n |\n\n`java.time.chrono`\n | 包含支持非 ISO 日历系统的类，例如，伊斯兰历、泰国佛历等。\n\
  \ |\n\n`java.time.format`\n | 包含用于格式化和解析日期和时间的类。\n |\n\n`java.time.temporal`\n |\
  \ 包含用于访问日期和时间组件的类。它还包含充当日期时间调整器的类。\n |\n\n`java.time.zone`\n | 包含支持时区和时区规则的类。\n\
  \ |\n\n以下部分解释了日期时间 API 中方法名称中使用的前缀及其含义和示例。\n\nofXxx() 方法\n\n日期时间 API 中的类不提供公共构造函数来创建其对象。它们允许您通过名为\
  \ `ofXxx()` 的静态工厂方法来创建对象。以下代码片段展示了如何创建 `LocalDate` 类的对象：\n\n```\nLocalDate ld1 =\
  \ LocalDate.of(2012, 5, 2);          // 2012-05-02\nLocalDate ld2 = LocalDate.of(2012,\
  \ Month.JULY, 4); // 2012-07-04\nLocalDate ld3 = LocalDate.ofEpochDay(2002);   \
  \     // 1975-06-26\nLocalDate ld4 = LocalDate.ofYearDay(2014, 40);     // 2014-02-09\n\
  ```\n\nfrom() 方法\n\n`from()` 方法是一种静态工厂方法，类似于 `of()` 方法，用于从指定的参数派生出一个日期时间对象。与 `of()`\
  \ 方法不同，`from()` 方法需要对指定的参数进行数据转换。\n\n要理解 `from()` 方法的作用，可以将其视为名为 `deriveFrom()`\
  \ 的方法。使用 `from()` 方法，您可以从指定的参数派生出一个新的日期时间对象。以下代码片段展示了如何从 `LocalDateTime` 派生出一个 `LocalDate`：\n\
  \n```\nLocalDateTime ldt = LocalDateTime.of(2012, 5, 2, 15, 30); // 2012-05-02T15:30\n\
  LocalDate ld = LocalDate.from(ldt);                       // 2012-05-02\n```\n\n\
  withXxx() 方法\n\n日期时间 API 中的大多数类都是不可变的。它们没有 `setXxx()` 方法。如果您想更改日期时间对象的某个字段，例如日期中的年份值，您需要查找以\
  \ `withXxx` 为前缀的方法。`withXxx()` 方法返回一个指定字段已更改的对象副本。\n\n假设您有一个 `LocalDate` 对象，并且想要更改其年份。您需要使用\
  \ `LocalDate` 类的 `withYear(int newYear)` 方法。以下代码片段展示了如何从另一个 `LocalDate` 获取一个年份已更改的\
  \ `LocalDate`：\n\n```\nLocalDate ld1 = LocalDate.of(2012, Month.MAY, 2); // 2012-05-02\n\
  LocalDate ld2 = ld1.withYear(2014);               // 2014-05-02\n```\n\n您可以通过链式调用\
  \ `withXxx()` 方法来更改多个字段，从而从现有的 `LocalDate` 获取一个新的 `LocalDate`。以下代码片段通过更改年份和月份，从现有的\
  \ `LocalDate` 创建了一个新的 `LocalDate`：\n\n```\nLocalDate ld3 = LocalDate.of(2012, 5,\
  \ 2); // 2012-05-02\nLocalDate ld4 = ld3.withYear(2014)\n.withMonth(7);        \
  \ // 2014-07-02\n```\n\ngetXxx() 方法\n\n\n\n`getXxx()` 方法\n返回对象的指定元素。例如，`LocalDate`\
  \ 类中的 `getYear()` 方法返回日期的年份部分。以下代码片段展示了如何从 `LocalDate` 对象中获取年、月、日：\n\n```\nLocalDate\
  \ ld = LocalDate.of(2012, 5, 2);\nint year = ld.getYear();       // 2012\nMonth\
  \ month = ld.getMonth();   // Month.MAY\nint day = ld.getDayOfMonth();  // 2\n```\n\
  \ntoXxx() 方法\n\n`toXxx()` 方法将对象转换为相关的 `Xxx` 类型。例如，`LocalDateTime` 类中的 `toLocalDate()`\
  \ 方法返回一个包含原始 `LocalDateTime` 对象中日期的 `LocalDate` 对象。以下是一些使用 `toXxx()` 方法的示例。\n\n\
  ```\nLocalDate ld = LocalDate.of(2017, 8, 29); // 2017-08-29\n// 将日期转换为纪元天数。纪元天数是自\
  \ 1970-01-01 到某个日期的天数。\n// 1970-01-01 之前的日期返回负整数。\nlong epochDays = ld.toEpochDay();\
  \ // 17407\n// 使用 toLocalTime() 方法将 LocalDateTime 转换为 LocalTime\nLocalDateTime ldt\
  \ = LocalDateTime.of(2017, 8, 29, 16, 30);\nLocalTime lt = ldt.toLocalTime(); //\
  \ 16:30\n```\n\natXxx() 方法\n\n`atXxx()` 方法允许你通过提供一些额外的信息，从现有的日期时间对象构建一个新的日期时间对象。请对比\
  \ `atXxx()` 方法与 `withXxx()` 方法的使用；前者通过提供额外信息来创建新类型的对象，而后者通过更改字段来创建对象的副本。\n\n假设你有一个日期\
  \ 2012-05-02。如果你想创建一个新日期 2012-07-02（月份改为 7），你会使用 `withXxx()` 方法。如果你想创建一个日期时间 2012-05-02T15:30（通过添加时间\
  \ 15:30），你会使用 `atXxx()` 方法。这里展示了一些使用 `atXxx()` 方法的示例。\n\n```\nLocalDate ld = LocalDate.of(2012,\
  \ 5, 2);  // 2012-05-02\nLocalDateTime ldt1 = ld.atStartOfDay();   // 2012-05-02T00:00\n\
  LocalDateTime ldt2 = ld.atTime(15, 30);   // 2012-05-02T15:30\n```\n\n`atXxx()`\
  \ 方法支持构建器模式。以下代码片段展示了如何使用构建器模式构建一个本地日期：\n\n```\n// 使用构建器模式构建日期 2012-05-22\nLocalDate\
  \ d1 = Year.of(2012).atMonth(5).atDay(22);\n// 使用 of() 工厂方法构建日期 2012-05-22\nLocalDate\
  \ d2 = LocalDate.of(2012, 5, 22);\n```\n\nplusXxx() 和 minusXxx() 方法\n\n`plusXxx()`\
  \ 方法通过添加指定值返回对象的副本。例如，`LocalDate` 类中的 `plusDays(long days)` 方法通过添加指定天数返回 `LocalDate`\
  \ 对象的副本。\n\n`minusXxx()` 方法通过减去指定值返回对象的副本。例如，`LocalDate` 类中的 `minusDays(long days)`\
  \ 方法通过减去指定天数返回 `LocalDate` 对象的副本。\n\n```\nLocalDate ld = LocalDate.of(2012, 5, 2);\
  \ // 2012-05-02\nLocalDate ld1 = ld.plusDays(5);    // 2012-05-07\nLocalDate ld2\
  \ = ld.plusMonths(3);  // 2012-08-02\nLocalDate ld3 = ld.plusWeeks(3);   // 2012-05-23\n\
  LocalDate ld4 = ld.minusMonths(7); // 2011-10-02\nLocalDate ld5 = ld.minusWeeks(3);\
  \  // 2012-04-11\n```\n\nmultipliedBy()、dividedBy() 和 negated() 方法\n\n乘法、除法和取反对日期和时间没有意义。它们适用于表示时间量的日期时间类型，例如\
  \ `Duration` 和 `Period`。持续时间和周期可以进行加减运算。日期时间 API 支持负的持续时间和周期。\n\n```\nDuration d\
  \ = Duration.ofSeconds(200); // PT3M20S (3 分 20 秒)\nDuration d1 = d.multipliedBy(2);\
  \      // PT6M40S (6 分 40 秒)\nDuration d2 = d.negated();            // PT-3M-20S\
  \ (-3 分 -20 秒)\n```\n\n瞬时与持续时间\n\n时间线（或时间轴）是时间流逝的数学表示，它沿着唯一轴以瞬时事件的形式呈现。机器尺度的时间线将时间的流逝表示为一个单一递增的数字，如图\
  \ 16-1 所示。\n\n![A323069_2_En_16_Fig1_HTML.gif](img/A323069_2_En_16_Fig1_HTML.gif)\n\
  \n图 16-1.\n\n表示机器尺度时间流逝的时间线\n\n瞬时是时间线上代表唯一时刻的一个点。纪元是时间线上用作测量其他瞬时的参考点（或原点）的一个瞬时。\n\
  \n`Instant` 类的对象表示时间线上的一个瞬时。它使用时间线以纳秒精度表示简化的 UTC。也就是说，时间线上两个连续瞬时之间的时间间隔（或持续时间）为一纳秒。该时间线使用\
  \ 1970-01-01T00:00:00Z 作为纪元。纪元之后的瞬时具有正值；纪元之前的瞬时具有负值。纪元处的瞬时被赋值为零。\n\n有多种方法可以创建 `Instant`\
  \ 类的实例。使用其 `now()` 方法，你可以使用系统默认时钟获取当前瞬时。\n\n```\n// 获取当前瞬时\nInstant i1 = Instant.now();\n\
  ```\n\n你可以使用从纪元开始的不同时间单位的时间量来获取 `Instant` 类的实例。以下代码片段创建了一个 `Instant` 对象，表示从纪元开始\
  \ 19 秒，即 1970-01-01T00:00:19Z：\n\n```\n// 一个瞬时：从纪元开始 19 秒\nInstant i2 = Instant.ofEpochSecond(19);\n\
  ```\n\n`Duration` 类的对象表示时间线上两个瞬时之间的时间量。`Duration` 类支持有向持续时间。也就是说，它允许正持续时间和负持续时间。图\
  \ 16-1 使用箭头表示持续时间，以表明它们是有向持续时间。\n\n你可以使用其 `ofXxx()` 静态工厂方法之一创建 `Duration` 类的实例。\n\
  \n```\n// 持续 2 天\nDuration d1 = Duration.ofDays(2);\n// 持续 25 分钟\nDuration d2 =\
  \ Duration.ofMinutes(25);\n```\n\n提示\n\n`Instant` 类的 `toString()` 方法以 ISO-8601 格式\
  \ `yyyy-MM-ddTHH:mm:ss.SSSSSSSSSZ` 返回 `Instant` 的文本表示。`Duration` 类的 `toString()`\
  \ 方法以 `PTnHnMnS` 格式返回持续时间的文本表示，其中 `n` 是小时、分钟或秒的数量。\n\n你能用瞬时和持续时间做什么？通常，它们用于记录时间戳和两个事件之间的经过时间。可以比较两个瞬时，以了解一个是否发生在另一个之前或之后。你可以将持续时间添加（和减去）到瞬时以获得另一个瞬时。将两个持续时间相加得到另一个持续时间。日期时间\
  \ API 中的类是可序列化的。你可以使用 `Instant` 在数据库中存储时间戳。\n\n`Instant` 和 `Duration` 类分别存储其值的秒和纳秒部分。`Duration`\
  \ 类具有 `getSeconds()` 和 `getNano()` 方法，而 `Instant` 类具有 `getEpochSecond()` 和 `getNano()`\
  \ 方法来获取这两个值。以下是获取 `Instant` 的秒和纳秒的示例：\n\n```\n// 获取当前瞬时\nInstant i1 = Instant.now();\n\
  // 获取秒和纳秒\nlong seconds = i1.getEpochSecond();\nint nanoSeconds = i1.getNano();\n\
  System.out.println(\"当前瞬时: \" + i1);\nSystem.out.println(\"秒: \" + seconds);\nSystem.out.println(\"\
  纳秒: \" + nanoSeconds);\n```\n\n```\n（你可能会得到不同的输出。）\n当前瞬时: 2017-08-04T19:12:44.859580900Z\n\
  秒: 1501873964\n纳秒: 859580900\n```\n\n清单 16-3 演示了一些可以在瞬时和持续时间上执行的操作。\n\n\n\n```\n\
  // InstantDurationTest.java\npackage com.jdojo.datetime;\nimport java.time.Duration;\n\
  import java.time.Instant;\npublic class InstantDurationTest {\npublic static void\
  \ main(String[] args) {\nInstant i1 = Instant.ofEpochSecond(20);\nInstant i2 = Instant.ofEpochSecond(55);\n\
  System.out.println(\"i1:\" + i1);\nSystem.out.println(\"i2:\" + i2);\nDuration d1\
  \ = Duration.ofSeconds(55);\nDuration d2 = Duration.ofSeconds(-17);\nSystem.out.println(\"\
  d1:\" + d1);\nSystem.out.println(\"d2:\" + d2);\n// 比较瞬时点\nSystem.out.println(\"\
  i1.isBefore(i2):\" + i1.isBefore(i2));\nSystem.out.println(\"i1.isAfter(i2):\" +\
  \ i1.isAfter(i2));\n// 对瞬时点进行时长加减\nInstant i3 = i1.plus(d1);\nInstant i4 = i2.minus(d2);\n\
  System.out.println(\"i1.plus(d1):\" + i3);\nSystem.out.println(\"i2.minus(d2):\"\
  \ + i4);\n// 两个时长相加\nDuration d3 = d1.plus(d2);\nSystem.out.println(\"d1.plus(d2):\"\
  \ + d3);\n}\n}\n清单 16-3.\n使用 Instant 和 Duration 类\n```\n\n```\ni1:1970-01-01T00:00:20Z\n\
  i2:1970-01-01T00:00:55Z\nd1:PT55S\nd2:PT-17S\ni1.isBefore(i2):true\ni1.isAfter(i2):false\n\
  i1.plus(d1):1970-01-01T00:01:15Z\ni2.minus(d2):1970-01-01T00:01:12Z\nd1.plus(d2):PT38S\n\
  ```\n\nJava 9 为 `Duration` 类新增了几个有用的方法，这些方法可以分为以下三类：\n\n*   将一个时长除以另一个时长的方法\n\n\
  *   以特定时间单位获取时长的方法，以及获取时长特定部分（如天、小时、秒等）的方法\n\n*   将时长截断到特定时间单位的方法\n\n在接下来的章节中，我将展示在\
  \ Java 9 中使用这些新方法的示例。在示例中，我使用一个时长为 23 天、3 小时、45 分钟和 30 秒的时长。以下代码片段将此时长创建为一个 `Duration`\
  \ 对象，并将其引用存储在名为 `compTime` 的变量中：\n\n```\n// 创建一个时长为 23 天、3 小时、45 分钟和 30 秒的 Duration\
  \ 对象\nDuration compTime = Duration.ofDays(23)\n.plusHours(3)\n.plusMinutes(45)\n\
  .plusSeconds(30);\nSystem.out.println(\"Duration: \" + compTime);\n```\n\n```\n\
  Duration: PT555H45M30S\n```\n\n如输出所示，将天数乘以 24 转换为小时后，该时长表示 555 小时 45 分钟 30 秒。\n\n\
  将一个时长除以另一个时长\n\n此类别中只有一个方法：\n\n```\nlong dividedBy(Duration divisor)\n```\n\n`dividedBy()`\
  \ 方法允许你将一个时长除以另一个时长。它返回指定的 `divisor` 在调用该方法的时长中出现的次数。要了解该时长中包含多少个整周，你可以使用 7 天作为除数来调用\
  \ `dividedBy()` 方法。以下代码片段展示了如何计算一个时长中的整天数、整周数和整小时数：\n\n```\nlong wholeDays = compTime.dividedBy(Duration.ofDays(1));\n\
  long wholeWeeks = compTime.dividedBy(Duration.ofDays(7));\nlong wholeHours = compTime.dividedBy(Duration.ofHours(7));\n\
  System.out.println(\"Number of whole days: \" + wholeDays);\nSystem.out.println(\"\
  Number of whole weeks: \" + wholeWeeks);\nSystem.out.println(\"Number of whole hours:\
  \ \" + wholeHours);\n```\n\n```\nNumber of whole days: 23\nNumber of whole weeks:\
  \ 3\nNumber of whole hours: 79\n```\n\n转换和检索时长的组成部分\n\n此类别中为 `Duration` 类添加了几个方法：\n\
  \n*   `long toDaysPart()`\n\n*   `int toHoursPart()`\n\n*   `int toMillisPart()`\n\
  \n*   `int toMinutesPart()`\n\n*   `int toNanosPart()`\n\n*   `long toSeconds()`\n\
  \n*   `int toSecondsPart()`\n\n`Duration` 类包含两组方法。它们分别命名为 `toXxx()` 和 `toXxxPart()`，其中\
  \ `Xxx` 可以是 `Days`、`Hours`、`Minutes`、`Seconds`、`Millis` 和 `Nanos`。在此列表中，你可能会注意到包含了\
  \ `toDaysPart()`，但缺少了 `toDays()`。如果你发现某一组方法中缺少了某个 `Xxx` 对应的方法，这意味着这些方法在 JDK 8 中已经存在。例如，`toDays()`\
  \ 方法自 JDK 8 起就已存在于 `Duration` 类中。\n\n名为 `toXxx()` 的方法将时长转换为 `Xxx` 时间单位并返回整数部分。名为\
  \ `toXxxPart()` 的方法将时长分解为 `天:小时:分钟:秒:毫秒:纳秒` 这样的组成部分，并从中返回 `Xxx` 部分。在此示例中，`toDays()`\
  \ 会将时长转换为天并返回整数部分，即 23。`toDaysPart()` 会将时长分解为 `23 天:3 小时:45 分钟:30 秒:0 毫秒:0 纳秒`，并返回第一部分，即\
  \ 23。让我们将相同的规则应用于 `toHours()` 和 `toHoursPart()` 方法。`toHours()` 方法会将时长转换为小时并返回总小时数，即\
  \ 555。`toHoursPart()` 方法会像 `toDaysPart()` 方法那样将时长分解为各个部分，并返回小时部分，即 3。以下代码片段展示了几个示例：\n\
  \n```\nSystem.out.println(\"toDays(): \" + compTime.toDays());\nSystem.out.println(\"\
  toDaysPart(): \" + compTime.toDaysPart());\nSystem.out.println(\"toHours(): \" +\
  \ compTime.toHours());\nSystem.out.println(\"toHoursPart(): \" + compTime.toHoursPart());\n\
  System.out.println(\"toMinutes(): \" + compTime.toMinutes());\nSystem.out.println(\"\
  toMinutesPart(): \" + compTime.toMinutesPart());\n```\n\n```\nDuration: PT555H45M30S\n\
  toDays(): 23\ntoDaysPart(): 23\ntoHours(): 555\ntoHoursPart(): 3\ntoMinutes(): 33345\n\
  toMinutesPart(): 45\n```\n\n截断时长\n\n此类别中为 `Duration` 类只添加了一个方法：\n\n```\nDuration\
  \ truncatedTo(TemporalUnit unit)\n```\n\n`truncatedTo()` 方法返回一个时长副本，其中小于指定 `unit`\
  \ 的概念时间单位被截断。指定的时间单位必须是 `DAYS` 或更小的单位。指定大于 `DAYS` 的时间单位（如 `WEEKS` 和 `YEARS`）会抛出运行时异常。\n\
  \n提示\n\n`truncatedTo(TemporalUnit unit)` 方法在 Java 8 中已存在于 `LocalTime` 和 `Instant`\
  \ 类中。\n\n以下代码片段展示了如何使用此方法：\n\n```\nSystem.out.println(\"Truncated to DAYS: \" +\
  \ compTime.truncatedTo(ChronoUnit.DAYS));\nSystem.out.println(\"Truncated to HOURS:\
  \ \" + compTime.truncatedTo(ChronoUnit.HOURS));\nSystem.out.println(\"Truncated\
  \ to MINUTES: \" + compTime.truncatedTo(ChronoUnit.MINUTES));\n```\n\n```\nTruncated\
  \ to DAYS: PT552H\nTruncated to HOURS: PT555H\nTruncated to MINUTES: PT555H45M\n\
  ```\n\n该时长为 `23 天:3 小时:45 分钟:30 秒:0 毫秒:0 纳秒`。当你将其截断到 `DAYS` 时，所有小于天的部分都会被丢弃，返回 23\
  \ 天，如输出所示，即 552 小时。当你截断到 `HOURS` 时，它会丢弃所有小于小时的部分，返回 555 小时。将其截断到 `MINUTES` 会保留到分钟的部分，并丢弃所有更小的部分，如秒和毫秒。\n\
  \n人类尺度时间\n\n在上一节中，我讨论了 `Instant` 和 `Duration` 类的使用，它们的实例更适合处理机器尺度的时间。人类处理时间时使用的是年、月、日、时、分、秒等字段。回想一下\
  \ ISO-8601 格式中指定日期和时间的格式：\n\n```\n[date]T[time][zone offset]\n```\n\n日期时间 API 提供了几个类，列于表\
  \ 16-3 中，用于表示人类尺度时间的所有字段及其组合。对于某个类，组件列中的“是”或“否”表示该类的实例是否存储该组件。我将在稍后详细讨论所有这些类。\n\n\
  表 16-3.\n\n人类尺度日期和时间类及其组件\n\n类名\n |\n  日期\n |\n  时间\n |\n  时区偏移量\n |\n  时区规则\n |\n\
  \n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\n`LocalDate`\n\
  \ |\n  是\n |\n  否\n |\n  否\n |\n  否\n |\n\n`LocalTime`\n |\n  否\n |\n  是\n |\n \
  \ 否\n |\n  否\n |\n\n`LocalDateTime`\n |\n  是\n |\n  是\n |\n  否\n |\n  否\n |\n\n\
  `OffsetTime`\n |\n  否\n |\n  是\n |\n  是\n |\n  否\n |\n\n`OffsetDateTime`\n |\n \
  \ 是\n |\n  是\n |\n  是\n |\n  否\n |\n\n`ZonedDateTime`\n |\n  是\n |\n  是\n |\n  是\n\
  \ |\n  是\n |\n\n\n\n`ZoneOffset`\n |\n  否\n |\n  否\n |\n  是\n |\n  否\n |\n\n`ZoneId`\
  \ \n |\n  `否`\n |\n  `否`\n |\n  `是`\n |\n  `是`\n |\n\nZoneOffset 类\n\n`ZoneOffset`\
  \ 类的实例表示相对于 UTC 时区的固定偏移量，例如 +05:30、-06:00 等。它代表时区与 UTC 之间的时间差。`ZoneOffset` 不会感知因夏令时导致的偏移量变化。`ZoneOffset`\
  \ 类声明了三个常量：\n\n*   `UTC`\n\n*   `MAX`\n\n*   `MIN`\n\n`UTC` 是 UTC 的时区偏移常量。`MAX`\
  \ 和 `MIN` 分别是支持的最大和最小偏移量。\n\n提示\n\nUTC 时区的偏移标识符使用 `Z`，而不是 `+00:00` 或 `-00:00`。\n\
  \n`ZoneOffset` 类提供了通过组合小时、分钟和秒来创建其实例的方法。清单 16-4 演示了如何创建 `ZoneOffset` 类的实例。\n\n```\n\
  // ZoneOffsetTest.java\npackage com.jdojo.datetime;\nimport java.time.ZoneOffset;\n\
  public class ZoneOffsetTest {\npublic static void main(String[] args) {\n// 使用小时、分钟和秒创建偏移量\n\
  ZoneOffset zos1 = ZoneOffset.ofHours(-6);\nZoneOffset zos2 = ZoneOffset.ofHoursMinutes(5,\
  \ 30);\nZoneOffset zos3 = ZoneOffset.ofHoursMinutesSeconds(8, 30, 45);\nSystem.out.println(zos1);\n\
  System.out.println(zos2);\nSystem.out.println(zos3);\n// 使用字符串形式的偏移 ID 创建偏移量\nZoneOffset\
  \ zos4 = ZoneOffset.of(\"+05:00\");\nZoneOffset zos5 = ZoneOffset.of(\"Z\"); //\
  \ 等同于 ZoneOffset.UTC\nSystem.out.println(zos4);\nSystem.out.println(zos5);\n// 打印偏移量常量的值\n\
  System.out.println(\"ZoneOffset.UTC: \"  + ZoneOffset.UTC);\nSystem.out.println(\"\
  ZoneOffset.MIN: \"  + ZoneOffset.MIN);\nSystem.out.println(\"ZoneOffset.MAX: \"\
  \  + ZoneOffset.MAX);\n}\n}\n清单 16-4. 创建 ZoneOffset 类的实例\n```\n\n```\n-06:00\n+05:30\n\
  +08:30:45\n+05:00\nZ\nZoneOffset.UTC: Z\nZoneOffset.MIN: -18:00\nZoneOffset.MAX:\
  \ +18:00\n```\n\n根据 ISO-8601 标准，时区偏移量可以包含小时和分钟，或仅包含小时。新的 Date-Time API 还允许在偏移量中包含秒。你可以使用\
  \ `ZoneOffset` 类的 `compareTo()` 方法来比较两个偏移量。偏移量按降序比较，即它们在一天中出现的时间顺序，例如，+5:30 的偏移量出现在\
  \ +5:00 的偏移量之前。ISO-8601 标准支持 -12:00 到 +14:00 之间的偏移量。然而，为了避免未来偏移量范围扩展时出现问题，Date-Time\
  \ API 支持 -18:00 到 +18:00 之间的偏移量。\n\nZoneId 类\n\n`ZoneId` 类的实例表示偏移量与夏令时偏移变化规则的组合。并非所有时区都实行夏令时。为了简化你对\
  \ `ZoneId` 的理解，可以将其视为：\n\n```\nZoneId = ZoneOffset + ZoneRules\n```\n\n提示\n\n`ZoneOffset`\
  \ 表示相对于 UTC 时区的固定偏移量，而 `ZoneId` 表示可变偏移量。变化量、一年中偏移量改变的时间以及改变幅度，都由时区规则控制。`ZoneOffset`\
  \ 类继承自 `ZoneId` 类。\n\n每个时区都有一个唯一的文本 ID，可以通过三种格式指定：\n\n*   在此格式中，时区 ID 以偏移量的形式指定，可以是以下格式之一：`+h`、`+hh`、`+hh:mm`、`-hh:mm`、`+hhmm`、`-hhmm`、`+hh:mm:ss`、`-hh:mm:ss`、`+hhmmss`\
  \ 和 `-hhmmss`，其中 `h`、`m` 和 `s` 分别代表小时、分钟和秒的单个数字。`Z` 用于表示 UTC。偏移量的一个示例是 `+06:00`。\n\
  \n*   在此格式中，时区 ID 以 `UTC`、`GMT` 或 `UT` 为前缀，后跟偏移量，例如 `UTC+06:00`。\n\n*   在此格式中，时区\
  \ ID 通过区域名称指定，例如 `America/Chicago`。\n\n使用前两种形式的时区 ID，你可以创建一个具有固定偏移量的 `ZoneId`。你可以使用\
  \ `of()` 工厂方法创建 `ZoneId`。\n\n```\nZoneId usChicago = ZoneId.of(\"America/Chicago\"\
  );\nZoneId bdDhaka = ZoneId.of(\"Asia/Dhaka\");\nZoneId fixedZoneId = ZoneId.of(\"\
  +06:00\");\n```\n\n`ZoneId` 类提供了对所有已知时区 ID 的访问。其静态方法 `getAvailableZoneIds()` 返回一个包含所有可用时区\
  \ ID 的 `Set<String>`。清单 16-5 展示了如何打印所有时区 ID。输出中显示了部分时区 ID 列表。\n\n```\n// PrintAllZoneIds.java\n\
  package com.jdojo.datetime;\nimport java.time.ZoneId;\nimport java.util.Set;\npublic\
  \ class PrintAllZoneIds {\npublic static void main(String[] args) {\nSet zoneIds\
  \ = ZoneId.getAvailableZoneIds();\nfor (String zoneId: zoneIds) {\nSystem.out.println(zoneId);\n\
  }\n}\n}\n清单 16-5. 打印所有可用的时区 ID\n```\n\n```\nAsia/Aden\nAfrica/Cairo\nPacific/Honolulu\n\
  America/Chicago\nEurope/Athens\n...\n```\n\n`ZoneId` 对象允许你访问其所代表时区的规则。你可以使用 `ZoneId`\
  \ 类的 `getRules()` 方法获取 `ZoneRules` 类的实例，以处理夏令时转换、指定日期时间的偏移量、夏令时量等规则。通常，你不会在代码中直接使用时区规则。作为开发者，你会使用\
  \ `ZoneId` 来创建 `ZonedDateTime`，这将在稍后讨论。清单 16-6 中的程序展示了如何查询 `ZoneRules` 对象以获取 `ZoneId`\
  \ 的时间偏移量和时间变化信息。时间转换列表非常庞大，输出中仅显示部分内容。\n\n```\n// ZoneRulesTest.java\npackage com.jdojo.datetime;\n\
  import java.time.LocalDateTime;\nimport java.time.ZoneId;\nimport java.time.ZoneOffset;\n\
  import java.time.zone.ZoneOffsetTransition;\nimport java.time.zone.ZoneRules;\n\
  import java.util.List;\npublic class ZoneRulesTest {\npublic static void main(String[]\
  \ args) {\nLocalDateTime now = LocalDateTime.now();\nSystem.out.println(\"当前日期时间:\
  \ \" + now);\nZoneId fixedZoneId = ZoneId.of(\"+06:00\");\nZoneId bdDhaka = ZoneId.of(\"\
  Asia/Dhaka\");\nZoneId usChicago = ZoneId.of(\"America/Chicago\");\n// 打印 ZoneId\
  \ 的一些时区规则\nprintDetails(fixedZoneId, now);\nprintDetails(bdDhaka, now);\nprintDetails(usChicago,\
  \ now);\n}\npublic static void printDetails(ZoneId zoneId, LocalDateTime now) {\n\
  System.out.println(\"时区 ID: \" + zoneId.getId());\nZoneRules rules = zoneId.getRules();\n\
  boolean isFixedOffset = rules.isFixedOffset();\nSystem.out.println(\"isFixedOffset():\
  \ \" + isFixedOffset);\nZoneOffset offset = rules.getOffset(now);\nSystem.out.println(\"\
  时区偏移量: \" + offset);\nList transitions = rules.getTransitions();\nSystem.out.println(transitions);\n\
  }\n}\n清单 16-6. 了解 ZoneId 的时间变化规则 (ZoneRules)\n```\n\n```\n当前日期时间: 2017-08-04T14:33:30.352524400\n\
  时区 ID: +06:00\nisFixedOffset(): true\n时区偏移量: +06:00\n[]\n时区 ID: Asia/Dhaka\nisFixedOffset():\
  \ false\n时区偏移量: +06:00\n[Transition[Overlap at 1890-01-01T00:00+06:01:40 to +05:53:20],\
  \ ..., Transition[Overlap at 2010-01-01T00:00+07:00 to +06:00]]\n时区 ID: America/Chicago\n\
  isFixedOffset(): false\n时区偏移量: -05:00\n[Transition[Overlap at 1883-11-18T12:09:24-05:50:36\
  \ to -06:00], ..., Transition[Overlap at 2008-11-02T02:00-05:00 to -06:00]]\n```\n\
  \n多个组织和团体提供了一套时区规则数据库，其中包含世界上所有时区的代码和数据。每个提供者都有一个唯一的组 ID。标准规则提供者之一是 TZ 数据库，其组 ID\
  \ 为 TZDB。有关 TZ 数据库的更多详细信息，请参阅 [`www.twinsun.com/tz/tz-link.htm`](http://www.twinsun.com/tz/tz-link.htm)。\n\
  \n\n\n由于时区规则会随时间变化，一个组织会为不同地区提供多个版本的规则数据。通常，一个地区代表一个时区规则相同的时区。每个组织对其版本和地区都有自己独特的命名方案。\n\
  \nTZDB 以 `[区域]/[城市]` 的格式存储地区名称。一些地区名称的示例包括 Africa/Tunis、America/Chicago、Asia/Kolkata、Asia/Tokyo、Europe/Istanbul、Europe/London\
  \ 和 Europe/Moscow。\n\n日期时间 API 默认使用 TZDB 作为时区规则提供者。如果你使用来自 TZDB 的基于地区的区域 ID，请将地区名称用作区域\
  \ ID。如果使用 TZDB 以外的组织提供区域规则，则地区名称应以提供者的组织 ID 为前缀，格式为“组织~地区”。例如，如果你使用的是国际航空运输协会（IATA）提供者，则芝加哥地区应使用“IATA~CHI”。有关如何注册自定义时区规则提供者的更多详细信息，请参阅\
  \ `java.time.zone` 包中的 `ZoneRulesProvider` 类。\n\n有用的日期时间相关枚举\n\n在讨论表示日期和时间不同组合的类之前，有必要先讨论一些表示日期和时间组件常量的枚举：\n\
  \n*   `Month`\n\n*   `DayOfWeek`\n\n*   `ChronoField`\n\n*   `ChronoUnit`\n\n大多数情况下，你会直接将这些枚举中的常量作为方法的参数使用，或作为方法的返回值接收。一些枚举包含以常量本身作为输入来计算有用日期时间值的方法。\n\
  \n表示月份\n\n`Month` 枚举有 12 个常量，分别表示一年的 12 个月。常量名称是 `JANUARY`、`FEBRUARY`、`MARCH`、`APRIL`、`MAY`、`JUNE`、`JULY`、`AUGUST`、`SEPTEMBER`、`OCTOBER`、`NOVEMBER`\
  \ 和 `DECEMBER`。月份按顺序从 1 到 12 编号，一月为 1，十二月为 12。`Month` 枚举提供了一些有用的方法，例如 `of()` 用于从\
  \ `int` 值获取 `Month` 实例，`from()` 用于从任何日期对象获取 `Month`，`getValue()` 用于获取 `Month` 的\
  \ `int` 值等。\n\n为了提高可读性，如果日期时间 API 中提供了枚举常量，请使用它而不是整数值。例如，对于七月，请在代码中使用 `Month.JULY`，而不是整数\
  \ 7。有时 API 会提供同一方法的两个版本：一个接受 `Month` 枚举参数，另一个接受月份的 `int` 值。此类方法的一个例子是 `LocalDate`\
  \ 类中的静态工厂方法 `of()`：\n\n*   `static LocalDate of(int year, int month, int dayOfMonth)`\n\
  \n*   `static LocalDate of(int year, Month month, int dayOfMonth)`\n\n清单 16-7 演示了\
  \ `Month` 枚举的一些用法。\n\n```\n// MonthTest.java\npackage com.jdojo.datetime;\nimport\
  \ java.time.LocalDate;\nimport java.time.Month;\npublic class MonthTest {\npublic\
  \ static void main(String[] args) {\n// 使用 Month.JULY 作为方法参数\nLocalDate ld1 = LocalDate.of(2012,\
  \ Month.JULY, 1);\n// 从本地日期派生 Month\nMonth m1 = Month.from(ld1);\n// 从 int 值 2 创建\
  \ Month\nMonth m2 = Month.of(2);\n// 获取 m2 的下一个月\nMonth m3 = m2.plus(1);\n// 从本地日期获取\
  \ Month\nMonth m4 = ld1.getMonth();\n// 将枚举常量转换为 int\nint m5 = m2.getValue();\n\
  System.out.format(\"%s, %s, %s, %s, %d%n\", m1, m2, m3, m4, m5);\n}\n}\n清单 16-7.\n\
  使用 Month 枚举\n```\n\n```\nJULY, FEBRUARY, MARCH, JULY, 2\n```\n\n表示星期几\n\n`DayOfWeek`\
  \ 枚举有七个常量，分别表示一周的七天。这些常量是 `MONDAY`、`TUESDAY`、`WEDNESDAY`、`THURSDAY`、`FRIDAY`、`SATURDAY`\
  \ 和 `SUNDAY`。它的 `getValue()` 方法返回一个 `int` 值：星期一为 1，星期二为 2，依此类推，这遵循 ISO-8601 标准。`DayOfWeek`\
  \ 枚举位于 `java.time` 包中。以下是使用 `DayOfWeek` 枚举及其方法的一些示例。\n\n```\nLocalDate ld = LocalDate.of(2012,\
  \ 5, 10);\n// 从 LocalDate 中提取星期几\nDayOfWeek dw1 = DayOfWeek.from(ld); // THURSDAY\n\
  // 获取星期几的 int 值\nint dw11 = dw1.getValue(); // 4\n// 使用 LocalDate 类的方法获取星期几\nDayOfWeek\
  \ dw12 = ld.getDayOfWeek(); // THURSDAY\n// 使用 int 值获取 DayOfWeek 实例\nDayOfWeek dw2\
  \ = DayOfWeek.of(7); // SUNDAY\n// 在星期几上加一天得到下一天\nDayOfWeek dw3 = dw2.plus(1); //\
  \ MONDAY\n// 获取两天前的星期几\nDayOfWeek dw4 = dw2.minus(2); // FRIDAY\n```\n\n表示日期时间字段\n\
  \n日期时间中的大多数字段都可以表示为数值，例如年、月、日、小时等。`TemporalField` 接口的实例表示日期时间的一个字段，例如年、月中的日、小时中的分钟等。`ChronoField`\
  \ 枚举实现了 `TemporalField` 接口，并提供了多个常量来表示日期时间字段。`ChronoField` 枚举包含一长串常量。其中一些如下：`AMPM_OF_DAY`、`CLOCK_HOUR_OF_AMPM`、`CLOCK_HOUR_OF_DAY`、`DAY_OF_MONTH`、`DAY_OF_WEEK`、`DAY_OF_YEAR`、`ERA`、`HOUR_OF_AMPM`、`HOUR_OF_DAY`、`INSTANT_SECONDS`、`MINUTE_OF_HOUR`、`MONTH_OF_YEAR`、`SECOND_OF_MINUTE`、`YEAR`\
  \ 和 `YEAR_OF_ERA`。\n\n通常，你使用 `TemporalField` 从日期时间中获取字段的值。所有日期时间类都有一个 `get()` 方法，该方法为指定的\
  \ `TemporalField` 返回一个 `int` 值。如果某个字段的值对于 `int` 来说太长，请使用配套的 `getLong()` 方法以 `long`\
  \ 类型获取该值。\n\n并非所有日期时间类都支持所有类型的字段。例如，`LocalDate` 不支持 `MINUTE_OF_HOUR` 字段。使用日期时间类的\
  \ `isSupported()` 方法来检查它们是否支持特定类型的字段。使用 `ChronoField` 的 `isSupportedBy()` 方法来检查某个字段是否被日期时间类支持。\n\
  \n提示\n\n特定于 ISO-8601 日历系统的某些日期时间字段的常量在 `IsoFields` 类中声明。例如，`IsoFields.DAY_OF_QUARTER`\
  \ 表示基于 ISO-8601 的季度中的日。\n\n以下代码片段演示了如何使用 `ChronoField` 从日期时间中提取字段值，以及该日期时间是否支持该字段：\n\
  \n```\nimport java.time.LocalDate;\nimport java.time.LocalDateTime;\nimport java.time.temporal.ChronoField;\n\
  ...\nLocalDateTime now = LocalDateTime.now();\nSystem.out.println(\"当前日期时间: \" +\
  \ now);\nSystem.out.println(\"年: \" + now.get(ChronoField.YEAR));\nSystem.out.println(\"\
  月: \" + now.get(ChronoField.MONTH_OF_YEAR));\nSystem.out.println(\"日: \" + now.get(ChronoField.DAY_OF_MONTH));\n\
  System.out.println(\"小时(24 小时制): \" + now.get(ChronoField.HOUR_OF_DAY));\nSystem.out.println(\"\
  小时(12 小时制): \" + now.get(ChronoField.HOUR_OF_AMPM));\nSystem.out.println(\"上午/下午:\
  \ \" + now.get(ChronoField.AMPM_OF_DAY));\nLocalDate today = LocalDate.now();\n\
  System.out.println(\"当前日期 : \" + today);\nSystem.out.println(\"LocalDate 支持年: \"\
  \ + today.isSupported(ChronoField.YEAR));\nSystem.out.println(\"LocalDate 支持小时(24\
  \ 小时制): \" + today.isSupported(ChronoField.HOUR_OF_DAY));\nSystem.out.println(\"\
  年被 LocalDate 支持: \" + ChronoField.YEAR.isSupportedBy(today));\nSystem.out.println(\"\
  小时(24 小时制)被 LocalDate 支持: \" + ChronoField.HOUR_OF_DAY.isSupportedBy(today));\n\
  ```\n\n```\n当前日期时间: 2017-08-04T14:41:38.922063700\n年: 2017\n月: 8\n日: 4\n小时(24 小时制):\
  \ 14\n小时(12 小时制): 2\n上午/下午: 1\n当前日期 : 2017-08-04\nLocalDate 支持年: true\nLocalDate\
  \ 支持小时(24 小时制): false\n年被 LocalDate 支持: true\n小时(24 小时制)被 LocalDate 支持: false\n\
  ```\n\n`AMPM_OF_DAY` 字段的值可以是 0 或 1；0 表示上午，1 表示下午。\n\n表示日期时间字段的单位\n\n\n\n时间以年、月、日、小时、分钟、秒、周等单位进行度量。`java.time.temporal`\
  \ 包中的 `TemporalUnit` 接口的实例表示一个时间单位。同一包中的 `ChronoUnit` 包含以下常量来表示时间单位：`CENTURIES`、`DAYS`、`DECADES`、`ERAS`、`FOREVER`、`HALF_DAYS`、`HOURS`、`MICROS`、`MILLENNIA`、`MILLIS`、`MINUTES`、`MONTHS`、`NANOS`、`SECONDS`、`WEEKS`\
  \ 和 `YEARS`。\n\n`ChronoUnit` 枚举实现了 `TemporalUnit` 接口。因此，该枚举中的所有常量都是 `TemporalUnit`\
  \ 的实例。\n\n提示\n\n某些特定于 ISO-8601 日历系统的日期时间单位常量在 `IsoFields` 类中声明。例如，`IsoFields.QUARTER_YEARS`\
  \ 和 `IsoFields.WEEK_BASED_YEARS` 分别表示基于 ISO-8601 的季度（3 个月）和基于周的年（52 或 53 周）。ISO-8601\
  \ 标准将七天视为一周；一周从星期一开始；一年的第一个日历周是包含该年第一个星期四的那一周；一年的第一周可能从上一年开始，最后一周可能在下一年结束。这可能导致一年有\
  \ 53 周。例如，2009 年的第一周从 2008 年 12 月 29 日开始，最后一周在 2009 年 12 月 29 日结束，使得 2009 年成为有 53\
  \ 周的一年。\n\n日期时间类提供了两个方法：`minus()` 和 `plus()`。它们接受一个时间量和时间单位，通过减去和增加指定的时间，返回一个新的日期时间。便捷方法如\
  \ `minusDays()`、`minusHours()`、`plusDays()`、`plusHours()` 等也由相应的类提供，用于减去和增加时间。以下代码片段说明了如何将\
  \ `ChronoUnit` 枚举常量与这些方法一起使用：\n\n```\nimport java.time.LocalDateTime;\nimport java.time.temporal.ChronoUnit;\n\
  ...\nLocalDateTime now = LocalDateTime.now();\n// 获取 4 天前的日期时间\nLocalDateTime ldt2\
  \ = now.minus(4, ChronoUnit.DAYS);\n// 使用 minusDays() 方法获得相同结果\nLocalDateTime ldt3\
  \ = now.minusDays(4);\n// 获取 4 小时后的日期时间\nLocalDateTime ldt4 = now.plus(4, ChronoUnit.HOURS);\n\
  // 使用 plusHours() 方法获得相同结果\nLocalDateTime ldt5 = now.plusHours(4);\nSystem.out.println(\"\
  当前日期时间: \" + now);\nSystem.out.println(\"4 天前: \" + ldt2);\nSystem.out.println(\"\
  4 天前: \" + ldt3);\nSystem.out.println(\"4 小时后: \" + ldt4);\nSystem.out.println(\"\
  4 小时后: \" + ldt5);\n```\n\n```\n当前日期时间: 2017-08-04T14:44:10.511389400\n4 天前: 2017-07-31T14:44:10.511389400\n\
  4 天前: 2017-07-31T14:44:10.511389400\n4 小时后: 2017-08-04T18:44:10.511389400\n4 小时后:\
  \ 2017-08-04T18:44:10.511389400\n```\n\n本地日期、时间和日期时间\n\n`LocalDate` 类的实例表示一个没有时间或时区的日期。该类中的多个方法允许你将\
  \ `LocalDate` 转换为其他日期时间对象，并操作其字段（年、月、日）以获得另一个 `LocalDate`。以下代码片段创建了一些 `LocalDate`\
  \ 对象：\n\n```\n// 获取当前本地日期\nLocalDate ldt1 = LocalDate.now();\n// 创建一个本地日期 2012 年\
  \ 5 月 10 日\nLocalDate ldt2 = LocalDate.of(2012, Month.MAY, 10);\n// 创建一个本地日期，该日期是纪元日期\
  \ 1970-01-01 之后 10 天\nLocalDate ldt3 = LocalDate.ofEpochDay(10); // 1970-01-11\n\
  ```\n\n`LocalDate` 类包含两个常量 `MAX` 和 `MIN`，分别表示支持的最大和最小 `LocalDate`。`LocalDate.MAX`\
  \ 的值为 +999999999-12-31，`LocalDate.MIN` 的值为 -999999999-01-01。\n\n`LocalTime` 类的实例表示一个没有日期或时区的时间。时间精确到纳秒。它包含\
  \ `MIN`、`MAX`、`MIDNIGHT` 和 `NOON` 常量，分别表示时间常量 00:00、23:59:59.999999999、00:00 和 12:00。该类中的多个方法允许你以不同方式创建、操作和比较时间。以下代码片段创建了一些\
  \ `LocalTime` 对象：\n\n```\n// 获取当前本地时间\nLocalTime lt1 = LocalTime.now();\n// 创建一个本地时间\
  \ 07:30\nLocalTime lt2 = LocalTime.of(7, 30);\n// 创建一个本地时间 07:30:50\nLocalTime lt3\
  \ = LocalTime.of(7, 30, 50);\n// 创建一个本地时间 07:30:50.000005678\nLocalTime lt4 = LocalTime.of(7,\
  \ 30, 50, 5678);\n```\n\n`LocalDateTime` 类的实例表示一个没有时区的日期和时间。它提供了多种方法来创建、操作和比较日期时间。你可以将\
  \ `LocalDateTime` 视为 `LocalDate` 和 `LocalTime` 的组合。\n\n```\nLocalDateTime = LocalDate\
  \ + LocalTime\n```\n\n以下代码片段创建了一些 `LocalDateTime` 对象：\n\n```\n// 获取当前本地日期时间\nLocalDateTime\
  \ ldt1 = LocalDateTime.now();\n// 一个本地日期时间 2012-05-10T16:14:32\nLocalDateTime ldt2\
  \ = LocalDateTime.of(2012, Month.MAY, 10, 16, 14, 32);\n// 从本地日期和本地时间构造一个本地日期时间\n\
  LocalDate ld1 = LocalDate.of(2012, 5, 10);\nLocalTime lt1 = LocalTime.of(16, 18,\
  \ 41);\nLocalDateTime ldt3 = LocalDateTime.of(ld1, lt1); // 2012-05-10T16:18:41\n\
  ```\n\n有关这些方法的完整列表，请参考这些类的在线 API 文档。在探索在线 API 文档之前，请务必阅读本章中的“探索新的日期时间 API”部分。你会在一个类\
  \ `LocalDateTime` 中找到超过 60 个方法。如果不了解这些方法名称背后的模式，查看这些类的 API 文档会让人不知所措。请记住，你可以使用 API\
  \ 中的不同方法达到相同的结果。\n\n清单 16-8 演示了在本地日期、时间和日期时间上创建和执行操作的一些方法。\n\n```\n// LocalDateTimeTest.java\n\
  package com.jdojo.datetime;\nimport java.time.LocalDate;\nimport java.time.LocalDateTime;\n\
  import java.time.LocalTime;\nimport java.time.Month;\npublic class LocalDateTimeTest\
  \ {\npublic static void main(String[] args) {\n// 创建一个本地日期和时间\nLocalDate ld = LocalDate.of(2012,\
  \ Month.MAY, 11);\nLocalTime lt = LocalTime.of(8, 52, 23);\nSystem.out.println(\"\
  ld: \" + ld);\nSystem.out.println(\"ld.isLeapYear(): \" + ld.isLeapYear());\nSystem.out.println(\"\
  lt: \" + lt);\n// 从本地日期和时间创建一个本地日期时间\nLocalDateTime ldt = LocalDateTime.of(ld, lt);\n\
  System.out.println(\"ldt: \" + ldt);\n// 向本地日期时间增加 2 个月和 25 分钟\nLocalDateTime ldt2\
  \ = ldt.plusMonths(2).plusMinutes(25) ;\nSystem.out.println(\"ldt2: \" + ldt2);\n\
  // 从本地日期时间中推导出本地日期和时间\nLocalDate ld2 = LocalDate.from(ldt2);\nLocalTime lt2 = LocalTime.from(ldt2);\n\
  System.out.println(\"ld2: \" + ld2);\nSystem.out.println(\"lt2: \" + lt2);\n}\n\
  }\n清单 16-8.\n使用本地日期、时间和日期时间\n```\n\n```\nld: 2012-05-11\nld.isLeapYear(): true\n\
