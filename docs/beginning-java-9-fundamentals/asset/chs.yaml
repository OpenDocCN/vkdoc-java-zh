  \ `IABC` 的接口，它有三个方法——`m1()`、`m2()` 和 `m3()`。\n\n```\npackage com.jdojo.interfaces;\n\
  public interface IABC {\nvoid m1();\nvoid m2();\nvoid m3();\n}\n```\n\n假设一个名为 `ABCImpl`\
  \ 的类实现了 `IABC` 接口，但它没有为所有三个方法都提供实现。\n\n```\npackage com.jdojo.interfaces;\n// 编译时错误\n\
  public class ABCImpl implements IABC {\n// 仅为 IABC 接口的一个方法提供实现\n@Override\npublic\
  \ void m1() {\n// 方法的代码在此处\n}\n}\n```\n\n\n\n之前的 `ABCImpl` 类代码无法编译。它承诺为 `IABC` 接口的所有三个方法提供实现。然而，该类的主体并未履行承诺，只为其中一个方法\
  \ `m1()` 提供了实现。由于 `ABCImpl` 类没有为 `IABC` 接口的另外两个方法提供实现，因此 `ABCImpl` 类是不完整的，必须声明为\
  \ `abstract` 以表明其不完整性。如果你尝试编译 `ABCImpl` 类，编译器将生成以下错误：\n\n```\nError(3,14): class\
  \ com.jdojo.interfaces.ABCImpl should be declared abstract; it does not define method\
  \ m2() of interface com.jdojo.interfaces.IABC\nError(3,14): class com.jdojo.interfaces.ABCImpl\
  \ should be declared abstract; it does not define method m3() of interface com.jdojo.interfaces.IABC\n\
  ```\n\n编译器的错误信息清晰明确。它指出 `ABCImpl` 类必须声明为 `abstract`，因为它没有实现 `IABC` 接口的 `m2()` 和\
  \ `m3()` 方法。以下代码片段通过将类声明为抽象类来修复编译错误：\n\n```\npackage com.jdojo.interfaces;\npublic\
  \ abstract class ABCImpl implements IABC {\n@Override\npublic void m1() {\n// 方法代码写在这里\n\
  }\n}\n```\n\n将类声明为抽象类的含义是它不能被实例化。以下代码将产生编译时错误：\n\n```\nnew ABCImpl(); // 编译时错误。ABCImpl\
  \ 是抽象的\n```\n\n使用 `ABCImpl` 类的唯一方法是继承它并创建另一个类，然后为 `IABC` 接口的 `m2()` 和 `m3()` 方法提供缺失的实现。以下是新类\
  \ `DEFImpl` 的声明，它继承自 `ABCImpl` 类：\n\n```\npackage com.jdojo.interfaces;\npublic\
  \ class DEFImpl extends ABCImpl {\n// 其他代码写在这里\n@Override\npublic void m2() {\n\
  // 方法代码写在这里\n}\n@Override\npublic void m3() {\n// 方法代码写在这里\n}\n}\n```\n\n`DEFImpl`\
  \ 类为 `ABCImpl` 类的 `m2()` 和 `m3()` 方法提供了实现。请注意，`DEFImpl` 类从其超类 `ABCImpl` 继承了 `m1()`、`m2()`\
  \ 和 `m3()` 方法。编译器不再强制你将 `DEFImpl` 类声明为抽象类。如果你愿意，仍然可以将 `DEFImpl` 类声明为抽象类。\n\n你可以创建\
  \ `DEFImpl` 类的对象，因为它不是抽象的。`DEFImpl` 类的对象有哪些类型？它有四种类型：`DEFImpl`、`ABCImpl`、`Object`\
  \ 和 `IABC`。`DEFImpl` 类的对象也是 `ABCImpl` 类型，因为 `DEFImpl` 继承自 `ABCImpl`。`ABCImpl` 类的对象也是\
  \ `IABC` 类型，因为 `ABCImpl` 实现了 `IABC` 接口。由于 `DEFImpl` 是 `ABCImpl`，而 `ABCImpl` 是 `IABC`，因此\
  \ `DEFImpl` 也是 `IABC` 是合乎逻辑的。此规则已通过以下代码片段演示。`DEFImpl` 类的对象已被赋值给 `DEFImpl`、`Object`、`ABCImpl`\
  \ 和 `IABC` 类型的变量。\n\n```\nDEFImpl d = new DEFImpl();\nObject obj = d;\nABCImpl a\
  \ = d;\nIABC ia = d;\n```\n\n超类型-子类型关系\n\n类实现接口建立了超类型-子类型关系。该类成为其实现的所有接口的子类型，而所有接口都成为该类的超类型。替换规则适用于这种超类型-子类型关系。替换规则是子类型可以在任何地方替换其超类型。考虑以下类\
  \ `C` 的声明，它实现了三个接口 `J`、`K` 和 `L`：\n\n```\npublic class C implements J, K, L {\n\
  // 类 C 的代码写在这里\n}\n```\n\n前面的代码在三个接口 `J`、`K` 和 `L` 与类 `C` 之间建立了超类型-子类型关系。回想一下，接口声明定义了一个新类型。假设你已经声明了三个接口：`J`、`K`\
  \ 和 `L`。这三个接口声明定义了三种类型：类型 `J`、类型 `K` 和类型 `L`。类 `C` 的声明定义了第四种类型：类型 `C`。这四种类型 `J`、`K`、`L`\
  \ 和 `C` 之间是什么关系？类 `C` 是类型 `J`、`K` 和 `L` 的子类型；类型 `J` 是类型 `C` 的超类型；类型 `K` 是类型 `C`\
  \ 的超类型；并且类型 `L` 是类型 `C` 的超类型。这种超类型-子类型关系的含义是，在任何需要类型 `J`、`K` 或 `L` 的值的地方，你可以安全地替换为类型\
  \ `C` 的值。以下代码片段演示了此规则：\n\n```\nC cObject = new C();\n// cObject 是类型 C。它可以在任何期望类型\
  \ J、K 或 L 的地方使用。\nJ jobject = cObject; // 正确\nK kobject = cObject; // 正确\nL lobject\
  \ = cObject; // 正确\n```\n\n接口继承\n\n一个接口可以继承自另一个接口。与类不同，一个接口可以继承自多个接口。考虑清单 21-26\
  \ 到 21-28 中所示的 `Singer`、`Writer` 和 `Player` 接口。\n\n```\n// Singer.java\npackage\
  \ com.jdojo.interfaces;\npublic interface Singer {\nvoid sing();\nvoid setRate(double\
  \ rate);\ndouble getRate();\n}\n清单 21-26.\n一个 Singer 接口\n```\n\n```\n// Writer.java\n\
  package com.jdojo.interfaces;\npublic interface Writer {\nvoid write();\nvoid setRate(double\
  \ rate);\ndouble getRate();\n}\n清单 21-27.\n一个 Writer 接口\n```\n\n```\n// Player.java\n\
  package com.jdojo.interfaces;\npublic interface Player {\nvoid play();\nvoid setRate(double\
  \ rate);\ndefault double getRate() {\nreturn 300.0;\n}\n}\n清单 21-28.\n一个 Player\
  \ 接口\n```\n\n所有三种类型的专业人士（歌手、作家和演奏者）都执行他们的工作并获得报酬。这三个接口包含两种类型的方法。一种类型的方法表示他们所做的工作，例如\
  \ `sing()`、`write()` 和 `play()`。另一种类型的方法表示他们的最低小时费率。`Singer` 和 `Writer` 接口将 `setRate()`\
  \ 和 `getRate()` 方法声明为抽象方法，让实现类指定其实现。`Player` 接口将 `setRate()` 方法声明为抽象方法，并为 `getRate()`\
  \ 方法提供了默认实现。\n\n就像类继承自另一个类一样，接口使用关键字 `extends` 来继承其他接口。关键字 `extends` 后跟一个逗号分隔的继承接口名称列表。被继承的接口称为超接口，继承它们的接口称为子接口。一个接口继承其超接口的以下成员：\n\
  \n*   抽象方法和默认方法\n\n*   常量字段\n\n*   嵌套类型\n\n提示\n\n接口不会从其超接口继承静态方法。\n\n一个接口可以覆盖从其超接口继承的抽象方法和默认方法。如果该接口包含与从超接口继承的常量字段和嵌套类型同名的常量字段和嵌套类型，则称该接口中的常量字段和嵌套类型隐藏了继承的对应名称。\n\
  \n假设你想创建一个接口来表示不收取唱歌费用的慈善歌手。慈善歌手也是歌手。你将创建一个名为 `CharitySinger` 的接口，它继承自 `Singer`\
  \ 接口，如下所示：\n\n```\npublic interface CharitySinger extends Singer {\n}\n```\n\n\n\
  \n此时，`CharitySinger` 接口从 `Singer` 接口继承了三个抽象方法。任何实现 `CharitySinger` 接口的类都需要实现这三个方法。由于慈善歌手唱歌不收费，`CharitySinger`\
  \ 接口可以重写 `setRate()` 和 `getRate()` 方法，并使用如清单 21-29 所示的默认方法提供默认实现。\n\n```\n// CharitySinger.java\n\
  package com.jdojo.interfaces;\npublic interface CharitySinger extends Singer {\n\
  @Override\ndefault void setRate(double rate) {\n// 一个空操作的方法\n}\n@Override\ndefault\
  \ double getRate() {\nreturn 0.0;\n}\n}\n清单 21-29. CharitySinger 接口\n```\n\n`setRate()`\
  \ 方法是一个空操作。`getRate()` 方法返回零。实现 `CharitySinger` 接口的类需要实现 `sing()` 方法并为其提供实现。该类将继承默认方法\
  \ `setRate()` 和 `getRate()`。\n\n同一个人可能既是歌手又是作家。你可以创建一个名为 `SingerWriter` 的接口，它继承自\
  \ `Singer` 和 `Writer` 两个接口，如清单 21-30 所示。\n\n```\n// SingerWriter.java\npackage com.jdojo.interfaces;\n\
  public interface SingerWriter extends Singer, Writer {\n// 无代码\n}\n清单 21-30. 继承自\
  \ Singer 和 Writer 接口的 SingerWriter 接口\n```\n\n`SingerWriter` 接口有多少个方法？它从 `Singer`\
  \ 接口继承了三个抽象方法，并从 `Writer` 接口继承了三个抽象方法。它继承了两次 `setRate()` 和 `getRate()` 方法——一次来自\
  \ `Singer` 接口，一次来自 `Writer` 接口。这些方法在两个超接口中具有相同的声明，并且都是抽象的。这不会造成问题，因为这两个方法都是抽象的。实现\
  \ `SingerWriter` 接口的类只需要为这两个方法提供一次实现。\n\n清单 21-31 展示了一个实现 `SingerWriter` 接口的 `Melodist`\
  \ 类的代码。请注意，它只重写了 `setRate()` 和 `getRate()` 方法一次。\n\n```\n// Melodist.java\npackage\
  \ com.jdojo.interfaces;\npublic class Melodist implements SingerWriter {\nprivate\
  \ String name;\nprivate double rate = 500.00;\npublic Melodist(String name) {\n\
  this.name = name;\n}\n@Override\npublic void sing() {\nSystem.out.println(name +\
  \ \" 正在唱歌。\");\n}\n@Override\npublic void setRate(double rate) {\nthis.rate = rate;\n\
  }\n@Override\npublic double getRate() {\nreturn rate;\n}\n@Override\npublic void\
  \ write() {\nSystem.out.println(name + \" 正在写作\");\n}\n}\n清单 21-31. 实现 SingerWriter\
  \ 接口的 Melodist 类\n```\n\n以下代码片段展示了如何使用 `Melodist` 类：\n\n```\nSingerWriter purcell\
  \ = new Melodist(\"亨利·珀塞尔\");\npurcell.setRate(700.00);\npurcell.write();\npurcell.sing();\n\
  亨利·珀塞尔 正在写作\n亨利·珀塞尔 正在唱歌。\n```\n\n一个人可能既唱歌又玩游戏。让我们创建一个 `SingerPlayer` 接口来表示这类人。让我们让该接口继承自\
  \ `Singer` 和 `Player` 接口，如下所示：\n\n```\npublic interface SingerPlayer extends Singer,\
  \ Player {\n// 暂时无代码\n}\n```\n\n尝试编译 `SingerPlayer` 接口会导致以下错误：\n\n```\nSingerPlayer.java:4:\
  \ 错误: 接口 SingerPlayer 从类型 Player 和 Singer 继承了 getRate() 的抽象方法和默认方法\n```\n\n该错误源于\
  \ `getRate()` 方法的两个继承版本之间的冲突。`Singer` 接口将 `getRate()` 方法声明为抽象方法，而 `Player` 接口将其声明为默认方法。这导致了冲突。编译器无法决定继承哪个方法。当从不同的超接口继承同一个默认方法的多个版本时，可能会发生这种冲突。考虑以下\
  \ `CharitySingerPlayer` 接口的声明：\n\n```\npublic interface CharitySingerPlayer extends\
  \ CharitySinger, Player {\n}\n```\n\n尝试编译 `CharitySingerPlayer` 接口会导致以下错误：\n\n```\n\
  CharitySingerPlayer.java:4: 错误: 接口 CharitySingerPlayer 从类型 CharitySinger 和 Player\
  \ 继承了不相关的 getRate() 默认方法\nCharitySingerPlayer.java:4: 错误: 接口 CharitySingerPlayer\
  \ 从类型 CharitySinger 和 Player 继承了 setRate(double) 的抽象方法和默认方法\n```\n\n这次，错误是由两个原因造成的：\n\
  \n*   该接口继承了两次 `getRate()` 默认方法，一次来自 `CharitySinger` 接口，一次来自 `Player` 接口。\n*   该接口从\
  \ `CharitySinger` 接口继承了一个默认的 `setRate()` 方法，并从 `Player` 接口继承了一个抽象的 `setRate()` 方法。\n\
  \n在 Java 8 之前，这种类型的冲突是不可能的，因为当时还没有默认方法。当编译器遇到抽象-默认或默认-默认方法的组合时，它不知道继承哪个方法。为了解决此类冲突，接口需要重写接口中的方法。有几种方法可以解决冲突——所有方法都涉及在接口中重写冲突的方法。\n\
  \n*   你可以用一个抽象方法重写冲突的方法。\n*   你可以用一个默认方法重写冲突的方法，并提供一个新的实现。\n*   你可以用一个默认方法重写冲突的方法，并调用超接口的其中一个方法。\n\
  \n让我们解决 `SingerPlayer` 接口中的冲突。清单 21-32 包含该接口的声明，它用一个抽象的 `getRate()` 方法重写了 `getRate()`\
  \ 方法。任何实现 `SingerPlayer` 接口的类都必须为 `getRate()` 方法提供实现。\n\n```\n// SingerPlayer.java\n\
  package com.jdojo.interfaces;\npublic interface SingerPlayer extends Singer, Player\
  \ {\n// 用一个抽象方法重写 getRate() 方法\n@Override\ndouble getRate();\n}\n清单 21-32. 用抽象方法重写冲突的方法\n\
  ```\n\n清单 21-33 中 `SingerPlayer` 接口的声明通过用一个默认的 `getRate()` 方法重写 `getRate()` 方法来解决冲突，该方法简单地返回值\
  \ 700.00。任何实现此 `SingerPlayer` 接口的类都将继承 `getRate()` 方法的默认实现。\n\n```\n// SingerPlayer.java\n\
  package com.jdojo.interfaces;\npublic interface SingerPlayer extends Singer, Player\
  \ {\n// 用一个默认方法重写 getRate() 方法\n@Override\ndefault double getRate() {\nreturn 700.00;\n\
  }\n}\n清单 21-33. 用默认方法重写冲突的方法\n```\n\n有时，接口可能想要访问其超接口中被重写的默认方法。Java 8 引入了一种新语法，用于从接口调用直接超接口中被重写的默认方法。新语法使用关键字\
  \ `super`，如下所示：\n\n```\n.super.\n```\n\n提示\n\n使用关键字 `super`，只能访问直接超接口的默认方法。该语法不支持访问超接口的超接口的默认方法。你不能使用此语法访问超接口的抽象方法。\n\
  \n\n\n清单 21-34 包含了`SingerPlayer`接口的声明，该接口通过一个默认的`getRate()`方法覆盖了冲突的方法。该方法使用`Player.super.getRate()`调用`Player`接口的`getRate()`方法，将返回值乘以\
  \ 3.5 后返回。它简单地实现了一条规则：`SingerPlayer`的最低报酬是`Player`的 3.5 倍。任何实现`SingerPlayer`接口的类都将继承`getRate()`方法的默认实现。\n\
  \n```\n// SingerPlayer.java\npackage com.jdojo.interfaces;\npublic interface SingerPlayer\
  \ extends Singer, Player{\n// 使用默认方法覆盖 getRate() 方法，该方法调用\n// Player 父接口的 getRate()\
  \ 方法\n@Override\ndefault double getRate() {\ndouble playerRate = Player.super.getRate();\n\
  double singerPlayerRate = playerRate * 3.5;\nreturn singerPlayerRate;\n}\n}\n清单\
  \ 21-34.\n使用调用父接口方法的默认方法覆盖冲突方法\n```\n\n清单 21-35 包含了`CharitySingerPlayer`接口的代码。它使用抽象方法覆盖了`setRate()`方法，并使用默认方法覆盖了`getRate()`方法。`getRate()`方法调用了`Player`接口的默认`getRate()`方法。\n\
  \n```\n// CharitySingerPlayer.java\npackage com.jdojo.interfaces;\npublic interface\
  \ CharitySingerPlayer extends CharitySinger, Player {\n// 使用抽象方法覆盖 setRate() 方法\n\
  @Override\nvoid setRate(double rate);\n// 使用默认方法覆盖 getRate() 方法，该方法调用\n// Player\
  \ 父接口的 getRate() 方法\n@Override\ndefault double getRate() {\nreturn Player.super.getRate();\n\
  }\n}\n清单 21-35.\n在 CharitySinger 接口中覆盖冲突方法\n```\n\n父接口与子接口的关系\n\n接口继承建立了父接口-子接口（也称为超类型-子类型）关系。当`CharitySinger`接口继承自`Singer`接口时，`Singer`接口被称为`CharitySinger`接口的父接口，而`CharitySinger`接口被称为`Singer`接口的子接口。一个接口可以有多个父接口，一个接口也可以是多个接口的子接口。子接口的引用可以赋值给父接口类型的变量。考虑以下代码片段来演示父接口-子接口关系的使用。代码中的注释解释了赋值成功或失败的原因。\n\
  \n```\npublic interface Shape {\n// 代码写在这里\n}\npublic interface Line extends Shape\
  \ {\n// 代码写在这里\n}\npublic interface Circle extends Shape {\n// 代码写在这里\n}\n```\n\n\
  以下是使用这些接口编写的示例代码，并附有注释解释代码的意图：\n\n```\nShape shape = 获取一个 Shape 对象的引用...;\nLine\
  \ line = 获取一个 Line 对象的引用...;\nCircle circle = 获取一个 Circle 对象的引用...;\n/* 更多代码写在这里...\
  \ */\nshape = line;   // 总是正确的。Line 总是 Shape。\nshape = circle; // 总是正确的。Circle 总是\
  \ Shape。\n// 编译时错误。Shape 不总是 Line。Shape 可能是 Circle。\n// 必须使用强制类型转换才能编译。\nline =\
  \ shape;\n// 编译器接受。运行时 shape 变量必须引用一个 Line 对象。\n// 否则，运行时将抛出 ClassCastException。\n\
  line =(Line) shape;\n```\n\n继承冲突的实现\n\n在 Java 8 之前，一个类不可能从多个超类型继承多个实现（非抽象方法）。默认方法的引入使得一个类可以从其超类和父接口继承冲突的实现。当一个类从多个路径（超类和父接口）继承具有相同签名的方法时，Java\
  \ 使用三条简单的规则来解决冲突。\n\n*   **超类始终优先**：如果一个类从其超类继承了一个方法（抽象或具体），并且从其某个父接口继承了一个具有相同签名的方法，则超类优先。也就是说，该类继承超类的方法，而父接口中的方法被忽略。此规则将接口中的默认方法视为回退方案，前提是类层次结构中不存在相同的方法。\n\
  \n*   **最具体的父接口优先**：如果第一条规则未能解决冲突，则使用此规则。如果继承的默认方法来自多个父接口，则类将继承来自最具体父接口的方法。\n\n\
  *   **类必须覆盖冲突方法**：如果前两条规则未能解决冲突，则使用此规则。在这种情况下，开发人员必须在类中覆盖冲突的方法。\n\n让我们讨论一下应用这三条规则的不同场景。\n\
  \n超类始终优先\n\n这条规则应用起来很简单。如果一个类继承或声明了一个方法，则父接口中具有相同签名的方法将被忽略。\n\n示例 #1\n\n考虑以下两个类：`Employee`\
  \ 和 `Manager`。\n\n```\npublic abstract class Employee {\nprivate double rate;\n\
  public abstract void setRate(double rate);\npublic double getRate() {\nreturn rate;\n\
  }\n}\npublic abstract class Manager extends Employee implements CharitySinger {\n\
  // 代码写在这里\n}\n```\n\n`Manager` 类继承自 `Employee` 类。以下五个方法可供 `Manager` 类继承：\n\n*  \
  \ 抽象的 `CharitySinger.sing()` 方法\n*   默认的 `CharitySinger.setRate()` 方法\n*   默认的 `CharitySinger.getRate()`\
  \ 方法\n*   抽象的 `Employee.setRate()` 方法\n*   具体的 `Employee.getRate()` 方法\n\n`sing()`\
  \ 方法没有冲突。因此，`Manager` 类从 `CharitySinger` 接口继承了 `sing()` 方法。`setRate()` 和 `getRate()`\
  \ 方法有两个选择。这两个方法在超类中可用。因此，`Manager` 类从 `Employee` 类继承了 `setRate()` 和 `getRate()`\
  \ 方法。\n\n示例 #2\n\n“超类始终优先”规则意味着，`Object` 类中声明的方法不能被接口中的默认方法覆盖。以下 `Runner` 接口的声明将无法编译：\n\
  \n```\n// 无法编译\npublic interface Runner {\nvoid run();\n// 不允许\n@Override\ndefault\
  \ String toString() {\nreturn \"WhoCares\";\n}\n}\n```\n\n在我给出这条规则背后的原因之前，让我们假设\
  \ `Runner` 接口可以编译。假设一个 `Thinker` 类实现了 `Runner` 接口，如下所示：\n\n```\npublic class Thinker\
  \ implements Runner {\n@Override\npublic void run() {\nSystem.out.println();\n}\n\
  // 继承哪个方法 - Object.toString() 还是 Runner.toString()？\n}\n```\n\n`Thinker` 类有两个选择来继承\
  \ `toString()` 方法：一个来自超类 `Object`，另一个来自父接口 `Runner`。请记住，超类始终优先，因此 `Thinker` 类继承的是来自\
  \ `Object` 类的 `toString()` 方法，而不是来自 `Runner` 接口的。这个论点适用于 `Object` 类和所有类中的所有方法。因为接口中的此类默认方法永远不会被任何类使用，所以不允许接口使用默认方法覆盖\
  \ `Object` 类的方法。\n\n示例 #3\n\n\n\n接口中的默认方法不能声明为 final，原因有二：\n\n*   默认方法旨在被类重写。\n\
  *   如果在现有接口中添加了默认方法，所有实现了该接口的类，只要它们包含具有相同签名的方法，就应该能继续正常工作。\n\n考虑一个 `Sizeable` 接口\n\
  和一个实现了该接口的 `Bag` 类。\n\n```\npublic interface Sizeable {\nint size();\n}\npublic\
  \ class Bag implements Sizeable {\nprivate int size;\n@Override\npublic int size()\
  \ {\nreturn size;\n}\npublic boolean isEmpty() {\nreturn (size == 0);\n}\n// 此处省略更多代码\n\
  }\n```\n\n`Bag` 类\n重写了 `Sizeable` 接口的 `size()` 方法。\n该类包含一个名为 `isEmpty()` 的额外具体方法。此时\n\
  没有任何问题。现在，`Sizeable` 接口的设计者\n决定向该接口添加一个默认的 `isEmpty()` 方法，如下所示：\n\n```\npublic interface\
  \ Sizeable {\nint size();\n// 一个新的默认方法。不能将其声明为 final\ndefault boolean isEmpty()\
  \ {\nreturn (size() == 0);\n}\n}\n```\n\n在向 `Sizeable` 接口添加了新的默认 `isEmpty()` 方法后，\n\
  `Bag` 类\n将继续正常工作。该类只是重写了 `Sizeable`\n接口的默认 `isEmpty()` 方法。\n如果允许将默认的 `isEmpty()`\
  \ 方法声明为 final，\n则会导致错误，因为 final 方法不允许被重写。\n不允许 final 默认方法的规则确保了向后兼容性。\n如果类包含一个方法，并且在其实现的接口中添加了具有相同签名的默认方法，那么现有的类将继续正常工作。\n\
  \n最具体的超接口获胜\n\n此规则旨在解决从多个接口继承具有相同签名的冲突方法的问题。\n如果通过不同路径从多个超接口继承了相同的方法（抽象或默认），则使用最具体的路径。\n\
  假设 `I1` 是一个包含方法 `m()` 的接口。`I2` 是 `I1` 的子接口，并且 `I2` 重写了\n方法 `m()`。如果\n一个类 `Test`\
  \ 实现了 `I1` 和 `I2` 两个接口，它就有两个\n继承 `m()` 方法的选择——`I1.m()` 和 `I2.m()`。在这种情况下，\n`I2.m()`\
  \ 被认为是最具体的，因为它重写了 `I1.m()`。规则可以\n总结如下：\n\n*   列出所有来自不同超接口的、具有相同签名的可用方法选择。\n*   从列表中移除所有已被列表中其他方法重写的方法。\n\
  *   如果只剩下一个选择，那么该类将继承该方法。\n\n考虑以下 `Employee` 类。它\n实现了 `Singer` 和 `Player` 接口。\n\n\
  ```\npublic class Employee implements Singer, SingerPlayer {\n// 代码写在这里\n}\n```\n\
  \n继承 `play()` 方法没有冲突，该方法\n继承自 `Player` 接口。\n继承 `sing()` 方法也没有冲突，因为\n两个超接口都指向 `Singer`\n\
  接口中的同一个 `sing()` 方法。`Employee` 类\n继承了哪个 `setRate()` 方法？你\n有以下选择：\n\n*   `Singer.setRate()`\n\
  *   `SingerPlayer.setRate()`\n\n两个选择都指向一个抽象的 `setRate()` 方法。\n因此，没有冲突。然而，在这种情况下，`Player.setRate()`\n\
  方法是最具体的，因为它重写了 `Singer.setRate()` 方法。\n\n`Employee` 类\n继承了哪个 `getRate()` 方法？你\n\
  有以下选择：\n\n*   `Singer.getRate()`\n*   `SingerPlayer.getRate()`\n\n`Singer.getRate()`\
  \ 方法已被 `Player.getRate()` 方法重写。\n因此，`Singer.getRate()` 被\n从选择中移除，只剩下一个选择，即 `Player.getRate()`。\n\
  因此，`Employee` 类\n从 `Player` 接口继承了默认的 `getRate()` 方法。\n\n类必须重写冲突的方法\n\n如果前两条规则无法解决冲突方法的继承问题，则类必须重写该方法，并在方法内部选择其想要执行的操作。它可以以全新的方式实现该方法，也可以选择调用超接口中的某个方法。你可以使用以下语法调用类的某个超接口的默认方法：\n\
  \n```\n.超级.\n```\n\n如果你想调用类的超类中的某个方法，可以使用以下语法：\n\n```\n.超级.\n```\n\n考虑以下 `MultiTalented`\
  \ 类的声明，\n它继承自 `Singer` 和 `Player` 接口：\n\n```\n// 无法编译\npublic abstract class MultiTalented\
  \ implements Singer, Player {\n}\n```\n\n此类声明将无法编译。该类继承 `sing()`、`play()` 和 `setRate()`\
  \ 方法\n时没有任何冲突。继承 `getRate()` 方法有两个选择：\n\n*   抽象的 `Singer.getRate()` 方法\n*   默认的\
  \ `Player.getRate()` 方法\n\n`getRate()` 方法的两个版本\n没有哪个比另一个更具体。在这种情况下，`MultiTalented`\
  \ 类\n必须重写 `getRate()` 方法来解决\n冲突。以下 `MultiTalented` 类的代码\n可以编译：\n\n```\npublic abstract\
  \ class MultiTalented implements Singer, Player {\n// MultiTalented 的报酬是 Player\
  \ 的费率加上 200.00\n@Override\npublic double getRate() {\n// 从 Player 接口获取 Player 的默认费率\n\
  double playerRate = Player.super.getRate();\ndouble rate = playerRate + 200.00;\n\
  return rate;\n}\n}\n```\n\n该类重写了 `getRate()` 方法来解决\n冲突。该方法调用了 `Player`\n接口的默认 `getRate()`\
  \ 方法并执行了其他逻辑。该类仍然被声明为\n抽象类，因为它没有实现来自 `Singer` 和 `Player` 接口的抽象方法。\n\ninstanceof\
  \ 运算符\n\n你可以使用 `instanceof` 运算符\n来评估一个引用类型变量是否引用了特定类的对象，或者其类是否实现了特定接口。它是一个\n双目运算符，计算结果为\
  \ `boolean` 值。`instanceof` 运算符的\n一般语法如下：\n\n```\ninstanceof \n```\n\n考虑以下代码片段，它定义了两个接口\n\
  （`Generous` 和\n`Munificent`）以及\n四个类（`Giver`、`GenerousGiver`、`MunificentGiver` 和\n\
  `StingyGiver`）。\n\n```\npublic interface Generous {\nvoid give();\n}\npublic interface\
  \ Munificent extends Generous {\nvoid giveALot();\n}\npublic class Giver {\n}\n\
  public class GenerousGiver extends Giver implements Generous {\n@Override\npublic\
  \ void give() {\n}\n}\npublic class MunificentGiver extends Giver implements Munificent\
  \ {\n@Override\npublic void give() {\n}\n@Override\npublic void giveALot() {\n}\n\
  }\npublic final class StingyGiver extends Giver {\npublic void giveALittle() {\n\
  }\n}\n```\n\n图 21-2 展示了这些接口和类的类图。\n\n![A323069_2_En_21_Fig2_HTML.jpg](img/A323069_2_En_21_Fig2_HTML.jpg)\n\
  \n图 21-2.\n\n展示接口和类之间关系的类图：Generous、\nMunificent、Object、Giver、GenerousGiver、MunificentGiver\
  \ 和\nStingyGiver\n\nJava 中的每个表达式都有两种类型：编译时类型和\n运行时类型。编译时类型\n也称为静态类型或声明类型。运行时类型\n\
  也称为动态类型或实际类型。表达式的编译时类型\n在编译时已知。表达式的运行时类型\n在表达式实际执行时已知。考虑以下\n语句：\n\n```\nMunificent\
  \ john = new MunificentGiver();\n```\n\n\n\n这段代码包含一个变量声明 `Munificent john` 和一个表达式\
  \ `new MunificentGiver()`。变量 `john` 的编译时类型是 `Munificent`。表达式 `new MunificentGiver()`\
  \ 的编译时类型是 `MunificentGiver`。在运行时，变量 `john` 将持有对 `MunificentGiver` 类对象的引用，其运行时类型为\
  \ `MunificentGiver`。表达式 `new MunificentGiver()` 的运行时类型与其编译时类型相同，即 `MunificentGiver`。\n\
  \n`instanceof` 运算符同时执行编译时检查和运行时检查。在编译时，它检查其左操作数是否可能指向其右操作数类型的实例。左操作数允许指向 `null`\
  \ 引用。如果左操作数可能持有其右操作数类型的引用，则代码通过编译器检查。例如，以下代码将编译通过并在运行时打印 `true`：\n\n```\nMunificent\
  \ john = new MunificentGiver();\nif (john instanceof Munificent) {\nSystem.out.println(\"\
  true\");\n} else {\nSystem.out.println(\"false\");\n}\n```\n\n查看 `john` 的编译时类型（即\
  \ `Munificent`），编译器确信 `john` 将引用 `null` 或一个其类实现了 `Munificent` 接口的对象。因此，编译器不会对 `john\
  \ instanceof Munificent` 表达式报错。\n\n考虑以下代码片段，它编译通过并打印 `false`：\n\n```\nGiver donna\
  \ = new Giver();\nif (donna instanceof Munificent) {\nSystem.out.println(\"true\"\
  );\n} else {\nSystem.out.println(\"false\");\n}\n```\n\n变量 `donna` 的编译时类型是 `Giver`。在运行时，它也指向一个\
  \ `Giver` 类型的对象。也就是说，其运行时类型是 `Giver`。当编译器尝试编译 `donna instanceof Munificent` 表达式时，它会问一个问题：“编译时类型为\
  \ `Giver` 的变量 `donna` 是否可能指向一个其类实现了 `Munificent` 接口的对象？”答案是肯定的。这个答案让你困惑了吗？编译器在评估\
  \ `instanceof` 运算符时，并不会查看前面代码片段中的完整语句 `Giver donna = new Giver();`。它只查看变量 `donna`\
  \ 的编译时类型，即 `Giver`。`Giver` 类本身并未实现 `Munificent` 接口。然而，`Giver` 类的任何子类都可能实现 `Munificent`\
  \ 接口，并且变量 `donna` 可能引用任何此类子类的对象。例如，可以编写如下代码：\n\n```\nGiver donna = new MunificentGiver();\n\
  ```\n\n在这种情况下，变量 `donna` 的编译时类型仍然是 `Giver` 类型。然而，在运行时，它将引用一个其类实现了 `Munificent` 接口的对象。编译器的工作仅仅是确保一种“可能性”，这种可能性在运行时可能为\
  \ `true` 或 `false`。当变量 `donna` 引用 `Giver` 类的对象时，`donna instanceof Munificent` 表达式在运行时将返回\
  \ `false`，因为 `Giver` 类没有实现 `Munificent` 接口。当变量 `donna` 引用 `MunificentGiver` 类的对象时，`donna\
  \ instanceof Munificent` 表达式在运行时将返回 `true`，因为 `MunificentGiver` 类实现了 `Munificent`\
  \ 接口。\n\n以下代码片段将编译通过并打印 `false`：\n\n```\nGiver kim = new StingyGiver();\nif (kim\
  \ instanceof Munificent) {\nSystem.out.println(\"true\");\n} else {\nSystem.out.println(\"\
  false\");\n}\n```\n\n考虑上述代码的一个变体如下：\n\n```\nStingyGiver jim = new StingyGiver();\n\
  if (jim instanceof Munificent) { // 编译时错误\nSystem.out.println(\"true\");\n} else\
  \ {\nSystem.out.println(\"false\");\n}\n```\n\n这次，编译器将拒绝编译该代码。让我们应用逻辑并尝试找出代码的问题所在。编译器会针对\
  \ `jim instanceof Munificent` 表达式生成一个错误。它表示它确信在运行时变量 `jim` 不可能引用一个其类实现了 `Munificent`\
  \ 接口的对象。编译器如何能如此确定这种可能性呢？这很简单。你已经将 `StingyGiver` 类声明为 final，这意味着它不能被继承。这暗示着编译时类型为\
  \ `StingyGiver` 的变量 `jim` 只能引用其类为 `StingyGiver` 的对象。编译器也知道 `StingyGiver` 类及其任何祖先类都没有实现\
  \ `Munificent` 接口。基于所有这些推理，编译器判定你的程序中存在逻辑错误，需要修复。\n\n如果 `instanceof` 运算符在运行时返回 `true`，则意味着其左操作数可以安全地强制转换为其右操作数所表示的类型。通常，当你需要使用\
  \ `instanceof` 运算符时，你的逻辑如下：\n\n```\nABC a = null;\nDEF d = null;\nif (x instanceof\
  \ ABC) {\n// 可以安全地将 x 强制转换为 ABC 类型\na = (ABC) x;\n} else if (x instanceof DEF) {\n\
  // 可以安全地将 x 强制转换为 DEF 类型\nd = (DEF) x;\n}\n```\n\n如果 `instanceof` 运算符的左操作数是 `null`\
  \ 或一个在运行时指向 `null` 的引用变量，则返回 `false`。以下代码片段也将打印 `false`：\n\n```\nGiver ken = null;\n\
  if (ken instanceof Munificent) {\nSystem.out.println(\"true\");\n} else {\nSystem.out.println(\"\
  false\");\n}\n```\n\n你可以得出结论：如果 `v instanceof XYZ` 返回 `true`，则可以安全地假设以下两点：\n\n*\
  \   `v` 不为 `null`。也就是说，`v` 指向内存中的一个有效对象。\n\n*   强制转换 `(XYZ) v` 将始终成功。也就是说，以下代码保证在运行时不会抛出\
  \ `ClassCastException`：\n\n```\n    XYZ x = (XYZ) v;\n    ```\n\n标记接口\n\n你可以声明一个没有成员的接口。请注意，接口可以通过两种方式拥有成员：通过声明自己的成员或从其父接口继承成员。当一个接口没有成员（无论是声明的还是继承的）时，它被称为**标记接口**。标记接口也称为标签接口。\n\
  \n标记接口有什么用？为什么类要实现标记接口？顾名思义，标记接口用于标记类，赋予其一种特殊含义，该含义可在特定上下文中使用。标记接口为类添加的含义取决于上下文。标记接口的开发者必须记录该接口的含义，而接口的使用者将利用其预期含义。例如，让我们声明一个名为\
  \ `Funny` 的标记接口，如下所示。这个 `Funny` 接口的含义取决于使用它的开发者。\n\n```\npublic interface Funny\
  \ {\n// 此处不写任何代码\n}\n```\n\n每个接口都定义了一个新类型，标记接口也不例外。因此，你可以声明一个 `Funny` 类型的变量。\n\n\
  ```\nFunny simon = 一个实现了 Funny 接口的类的对象;\n```\n\n使用类型为 `Funny` 的变量 `simon` 可以访问什么？除了\
  \ `Object` 类的所有方法外，你无法通过 `simon` 变量访问任何内容。即使不将 `Funny` 接口实现到你的类中，你也可以做到这一点。通常，标记接口与\
  \ `instanceof` 运算符一起使用，以检查引用类型变量是否引用了一个其类实现了该标记接口的对象。例如，你可以编写如下代码：\n\n\n```\n```\n\
  Object obj = any java object;\n...\nif (obj instanceof Funny) {\n// obj 是一个其类实现了\
  \ Funny 接口的对象。在标准输出上显示一条消息，表明我们正在使用一个 Funny 对象。或者，执行 Funny 接口开发者所预期的某些操作。\nSystem.out.println(\"\
  Using a Funny object\");\n}\n```\n\nJava API 中有许多标记接口。`java.lang.Cloneable`、`java.io.Serializable`\
  \ 和 `java.rmi.Remote` 是 Java 类库中的几个标记接口。如果一个类实现了 `Cloneable` 接口，就意味着该类的开发者意图允许对该类的对象进行克隆。你还需要在你的类中额外重写\
  \ `Object` 类的 `clone()` 方法，这样 `clone()` 方法才能在你的类对象上被调用，因为 `clone()` 方法在 `Object`\
  \ 类中被声明为 protected。即使你的类重写了 `clone()` 方法，在你的类实现 `Cloneable` 标记接口之前，你的类对象仍然无法被克隆。你可以看到，实现\
  \ `Cloneable` 接口为类赋予了一种含义，即其对象可以被克隆。当调用 `Object` 类的 `clone()` 方法时，Java 会检查该对象的类是否实现了\
  \ `Cloneable` 接口。如果对象的类没有实现 `Cloneable` 接口，它会在运行时抛出一个异常。\n\nJava 5 引入了一种特殊形式的接口，称为注解。它可以用来为\
  \ Java 程序的任何元素（例如类、方法、变量、包等）赋予含义。我将在本系列第二卷的第 1 章中介绍注解。\n\n函数式接口\n\n只有一个抽象方法的接口被称为函数式接口。静态方法和默认方法不计入将接口指定为函数式接口的条件。除了我已经讨论过的内容之外，不需要额外的步骤来将接口声明为函数式接口。我将在本系列第二卷的第\
  \ 5 章中进一步讨论函数式接口。`Walkable` 和 `Swimmable` 接口是函数式接口的例子，因为它们只包含一个抽象方法。`Singer` 接口是非函数式接口的例子，因为它包含多个抽象方法。你可以使用\
  \ `@FunctionalInterface` 注解来标注一个函数式接口，编译器会验证被标注的接口是否真的只包含一个抽象方法；否则，接口声明将无法编译。以下是一个使用\
  \ `@FunctionalInterface` 注解标注的函数式接口示例：\n\n```\n@FunctionalInterface\npublic interface\
  \ Runner {\npublic void run();\n}\n```\n\n比较对象\n\n当你有一组对象时，有时你可能希望根据某些标准对它们进行排序。`java.lang.Comparable`\
  \ 和 `java.util.Comparator` 是用于对象排序的两个常用接口。我将在本节中讨论这两个接口。\n\n使用 Comparable 接口\n\n\
  如果类的对象需要为了排序目的而进行比较，则该类实现 `Comparable` 接口。例如，当对数组或列表中的一组人员集合进行排序时，你可能需要比较 `Person`\
  \ 类的两个对象。用于比较两个对象的标准取决于上下文。例如，当需要显示多个人员时，你可能希望按他们的姓氏、人员 ID、地址或电话号码排序显示。\n\n由 `Comparable`\
  \ 接口强加给类对象的排序也称为该类的自然排序。`Comparable` 接口包含一个抽象的 `compareTo()` 方法，该方法接受一个参数。如果被比较的两个对象被认为相等，则该方法返回零；如果该对象小于指定的参数，则返回负整数；如果该对象大于指定的参数，则返回正整数。`Comparable`\
  \ 接口是一个泛型接口，声明如下：\n\n```\npublic interface Comparable {\npublic int compareTo(T\
  \ o);\n}\n```\n\n`String` 类和包装类（`Integer`、`Double`、`Float` 等）实现了 Comparable 接口。`String`\
  \ 类的 `compareTo()` 方法按字典顺序对字符串进行排序。所有用于数值原始类型的包装类按数值比较两个对象。\n\n通常比较相同类型的对象。以下类 `A`\
  \ 的类声明使用 `A` 作为其泛型类型实现了 `Comparable<A>` 接口，这表明类 `A` 仅支持比较其自身类型的对象：\n\n```\npublic\
  \ class A implement Comparable {\npublic int compareTo(A a) {\n// 代码写在这里\n}\n}\n\
