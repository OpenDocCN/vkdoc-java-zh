  一个 Manager2 类，它有一个接受 String 参数的构造函数，并显式调用 Employee2 类的构造函数\n```\n\n```\n// Manager2Test.java\n\
  package com.jdojo.inheritance;\npublic class Manager2Test {\npublic static void\
