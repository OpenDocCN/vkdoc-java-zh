  \ 类中的常量定义。例如，要检查格式说明符是否使用了左对齐 `-` 标志，需要使用以下逻辑：\n\n```\nint leftJustifiedFlagValue\
  \ = FormattableFlags.LEFT_JUSTIFY & flags;\nif (leftJustifiedFlagValue == FormattableFlags.LEFT_JUSTIFY)\
  \ {\n// 使用了左对齐标志 '-'\n} else {\n// 未使用左对齐标志 '-'\n}\n```\n\n你可以将 `FormattablePerson`\
  \ 对象与使用字符串转换 `s` 和 `S` 的格式说明符一起使用，如下所示：\n\n```\nFormattablePerson fp = new FormattablePerson(\"\
  Ken\", \"Smith\");\nSystem.out.printf(\"%s %n\", fp );\nSystem.out.printf(\"%#s\
  \ %n\", fp );\nSystem.out.printf(\"%S %n\", fp );\nSystem.out.printf(\"%#S %n\"\
  , fp );\n```\n\n```\nKen Smith\nSmith, Ken\nKEN SMITH\nSMITH, KEN\n```\n\n字符格式化\n\
  \n字符格式化可应用于 `char` 基本数据类型或 `Character` 对象的值。如果 `byte`、`Byte`、`short`、`Short`、`int`\
