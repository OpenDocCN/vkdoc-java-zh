  带有 Javadoc 工具规范的 getRangeSum 过程

  ```


  它使用 Javadoc 标准为 Java 程序编写规范，该规范可由 Javadoc 工具处理以生成 HTML 页面。在 Java 中，程序元素的规范放在紧邻该元素之前的
  `/**` 和 `*/` 之间。该规范面向 `getRangeSum` 过程的用户。Javadoc 工具将为 `getRangeSum` 过程生成规范，如图 1-4
  所示。


