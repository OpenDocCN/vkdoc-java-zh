  \ 中打开。使用左侧的“项目”或“文件”选项卡浏览本书所有章节的源代码。请参阅前几节关于如何编译、构建和运行源代码中类的内容。\n\n## 幕后原理\n\n本节回答一些与编译和运行\
  \ Java 程序相关的常见问题。例如，为什么我们在运行 Java 源代码之前要将其编译成字节码格式？什么是 Java 平台？什么是 JVM，它是如何工作的？对这些主题的详细讨论超出了本书的范围。有关\
  \ JVM 功能的任何主题的详细讨论，请参阅 JVM 规范。JVM 规范可在 [`http://docs.oracle.com/javase/specs`](http://docs.oracle.com/javase/specs)\
  \ 在线获取。\n\n让我们看一个简单的日常例子。假设有一个法国人，他只能听懂和说法语，他需要与另外三个人——一个美国人、一个德国人和一个俄罗斯人——交流，而这三人各自只懂一种语言（分别是英语、德语和俄语）。这个法国人将如何与另外三人交流？解决这个问题有很多方法。\n\
  \n*   法国人可能学习所有三种语言。\n*   法国人可能雇佣一个懂所有四种语言的翻译。\n*   法国人可能雇佣三个翻译，分别懂法语-英语、法语-德语和法语-俄语。\n\
  \n这个问题还有无数其他可能的解决方案。让我们在运行 Java 程序的背景下考虑类似的问题。Java 源代码被编译成字节码。相同的字节码需要在不做任何修改的情况下在所有操作系统上运行。Java\
  \ 语言的设计者选择了第三种方案，即为每个操作系统配备一个翻译。翻译的工作是将字节码翻译成机器码，机器码是运行翻译后代码的操作系统所原生的。这个翻译被称为 Java\
  \ 虚拟机（JVM）。您需要为每个操作系统配备一个 JVM。图 3-23 以图形方式展示了 JVM 如何充当字节码（类文件）与不同操作系统之间的翻译。\n\n\
  ![A323069_2_En_3_Fig23_HTML.gif](img/A323069_2_En_3_Fig23_HTML.gif)\n\n图 3-23.\n\
  \nJVM 作为字节码和操作系统之间的翻译\n\n编译成字节码格式的 Java 程序有两个优点：\n\n*   如果您想在具有不同操作系统的另一台机器上运行它，则无需重新编译源代码。这在\
  \ Java 中也被称为平台无关性。对于 Java 代码，这也被称为“一次编写，到处运行”。\n*   如果您通过网络运行 Java 程序，由于字节码格式紧凑，加载时间更短，因此程序运行速度更快。\n\
  \n为了通过网络运行 Java 程序，Java 代码的大小必须足够紧凑，以便在网络中更快地传输。由 Java 编译器以字节码格式生成的类文件非常紧凑。这是将 Java\
  \ 源代码编译成字节码格式的优点之一。\n\n使用字节码格式的第二个重要优点是它与架构无关。字节码格式与架构无关意味着，如果您在特定的主机系统（例如 Windows）上编译\
  \ Java 源代码，生成的类文件不会提及或受到其在 Windows 上生成的影响。如果您在两个不同的主机系统（例如 Windows 和 UNIX）上编译相同的\
  \ Java 源代码，两个类文件将是相同的。\n\n\n\n字节码格式的类文件无法直接在主机系统上执行，因为它不包含任何特定于主机系统的直接指令。换句话说，我们可以说字节码不是任何特定主机系统的机器语言。那么，问题来了：谁能理解字节码，并将其转换为主机系统底层的机器码？JVM\
  \ 负责完成这项工作。字节码是 JVM 的机器语言。如果你在 Windows 上编译 Java 源代码生成一个类文件，只要在运行 UNIX 的机器上安装了 Java\
  \ 平台（JVM 和 Java API 统称为 Java 平台），你就可以在 UNIX 上运行同一个类文件。你无需重新编译源代码来为 UNIX 生成新的类文件，因为运行在\
  \ UNIX 上的 JVM 能够理解你在 Windows 上生成的字节码。这就是 Java 程序实现“一次编写，到处运行”概念的方式。\n\nJava 平台，也称为\
  \ Java 运行时系统，由两部分组成：\n\n*   Java 虚拟机（JVM）\n*   Java 应用程序编程接口（Java API）\n\n术语“JVM”在三种语境下使用：\n\
  \n*   JVM 规范：它是一个抽象机器的规范或标准，Java 编译器可以为其生成字节码。\n*   JVM 规范的具体实现：如果你想运行 Java 程序，你需要有一个真实的\
  \ JVM，它是根据 JVM 的抽象规范开发出来的。要运行上一节中的 Java 程序，你使用了 `java` 命令，该命令是抽象 JVM 规范的一个具体实现。`java`\
  \ 命令（或 JVM）完全是用软件实现的。然而，JVM 也可以用软件、硬件或软硬件结合的方式实现。\n*   一个正在运行的 JVM 实例：当你调用 `java`\
  \ 命令时，你就拥有了一个正在运行的 JVM 实例。\n\n本书在所有这三种情况下都使用术语 JVM。其实际含义应根据使用的上下文来理解。\n\nJVM 执行的工作之一就是执行字节码，并为宿主系统生成机器特定的指令集。JVM\
  \ 拥有类加载器和执行引擎。类加载器在需要时读取类文件的内容并将其加载到内存中。执行引擎的工作是执行字节码。\n\nJVM 也被称为 Java 解释器。通常，“Java\
  \ 解释器”这个术语会让人产生误解，尤其是对于那些刚开始学习 Java 语言的人来说。根据“Java 解释器”这个术语，他们得出结论：JVM 的执行引擎一次只解释一条字节码，因此\
  \ Java 一定非常慢。JVM 的“Java 解释器”这个名称与执行引擎用来执行字节码的技术无关。执行引擎可能选择用来执行字节码的实际技术，取决于 JVM 的具体实现。一些执行引擎的类型包括：解释器、即时编译器和自适应优化器。在最简单的类型（即解释器）中，执行引擎一次只解释一条字节码，因此速度较慢。在第二种类型（即即时编译器）中，它在方法第一次被调用时，将整个方法的代码编译成底层宿主机器语言。然后，当下次调用同一个方法时，它会重用编译后的代码。与第一种类型相比，这种执行引擎速度更快，但需要更多内存来缓存编译后的代码。在自适应优化器技术中，它不会编译和缓存整个字节码；而只针对字节码中使用最频繁的部分进行编译和缓存。\n\
  \n什么是 API（应用程序编程接口）？API 是操作系统或应用程序提供给程序员直接使用的一组特定方法。在前面的章节中，你在 `com.jdojo.intro`\
  \ 包中创建了 `Welcome` 类，该类声明了一个 `main` 方法，该方法接受一个 `String` 数组作为参数，并且不返回任何内容（由关键字 `void`\
  \ 表示）。如果你公开关于所创建的包、类和方法的所有这些信息，并使其可供其他程序员使用，那么你的 `Welcome` 类中的 `main` 方法就是一个典型的（尽管很简单）API\
  \ 示例。通常，当我们使用术语“API”时，我们指的是一组可供程序员使用的方法。现在很容易理解 Java API 的含义了。Java API 是程序员在编写 Java\
  \ 源代码时可以使用的所有类和其他组件的集合。在你的 `Welcome` 类示例中，你已经使用了一个 Java API。你在 `main` 方法体内使用它来在控制台上打印消息。使用\
  \ Java API 的代码如下：\n\n```\nSystem.out.println(\"Welcome to Java 9!\");\n```\n\n你没有在你的代码中声明任何名为\
  \ `println` 的方法。这个方法在运行时通过 Java API 提供给 JVM，而 Java API 是 Java 平台的一部分。广义上讲，Java API\
  \ 可以分为两类：核心 API 和扩展 API。每个 JDK 都必须支持核心 API。核心 Java API 的例子有 Java 运行时（例如，Applets、AWT、I/O\
  \ 等）、JFC、JDBC 等。Java 扩展 API 包括 JavaMail、JNDI（Java 命名和目录接口）等。Java 9 将 JavaFX API\
  \ 作为扩展 API 包含在内。编译和运行 Java 程序的过程如图 3-24 所示。\n\n![A323069_2_En_3_Fig24_HTML.gif](img/A323069_2_En_3_Fig24_HTML.gif)\n\
  \n图 3-24.\n\n编译和运行 Java 程序所涉及的组件\n\n\n\n## 摘要\n\nJava 程序使用文本编辑器或 IDE 以纯文本格式编写。Java\
  \ 源代码也称为编译单元，它存储在扩展名为 `.java` 的文件中。市面上可以免费获得多种 Java 集成开发环境（IDE），例如 NetBeans。使用 IDE\
  \ 开发 Java 应用程序可以减少开发所需的时间和精力。\n\nJDK 9 为 Java 平台引入了模块系统。一个 Java 应用程序由多个模块组成。一个模块包含多个包，而包又包含多种类型。类型可以是类、接口、枚举或注解。模块在名为\
  \ `module-info.java` 的源文件中声明，并编译成名为 `module-info.class` 的类文件。一个编译单元包含一个或多个类型的源代码。当编译单元被编译时，会为其中声明的每个类型生成一个类文件。\n\
  \nJava 源代码通过 Java 编译器编译成类文件。类文件包含字节码。JDK 附带的 Java 编译器称为 `javac`。编译后的代码使用名为 `jar`\
  \ 的工具打包成 JAR 文件。当一个 JAR 文件在其根目录下包含 `module-info.class` 文件（即模块描述符）时，该 JAR 文件被称为模块化\
  \ JAR。编译后的代码由 JVM 运行。JDK 安装了一个可以作为 `java` 命令运行的 JVM。`javac` 和 `java` 命令都位于 `JDK_HOME\\\
  bin` 目录中，其中 `JDK_HOME` 是 JDK 的安装目录。\n\n一个模块可以包含供外部和内部使用的包。如果一个模块导出了一个包，那么该包中包含的公共类型可以被其他模块使用。如果一个模块想要使用另一个模块导出的包，则第一个模块必须声明对第二个模块的依赖。JDK\
  \ 9 由多个模块组成，称为平台模块。`java.base` 模块是一个基础模块，所有其他模块都隐式地依赖于它。\n\n模块路径是一系列路径名的序列，其中路径名可以是目录、模块化\
  \ JAR 或 JMOD 文件的路径。模块路径中的每个条目由特定于平台的路径分隔符分隔，在 Windows 上是分号（`;`），在类 UNIX 操作系统上是冒号（`:`）。用户定义的模块由模块系统通过模块路径定位。模块路径使用\
  \ `--module-path`（或简写版本 `-p`）命令行选项设置。\n\n在 JDK 9 之前，类是通过类路径定位的。类路径是一系列目录、JAR 文件和\
  \ ZIP 文件的序列。类路径中的每个条目由特定于平台的路径分隔符分隔，在 Windows 上是分号（`;`），在类 UNIX 操作系统上是冒号（`:`）。你可以使用\
  \ `--class-path`（或 `-cp` 或 `-classpath`）命令行选项指定类路径。\n\n类路径和模块路径的值可能看起来相同，但它们的用途不同。类路径用于定位类（更具体地说是类型），而模块路径用于定位模块。\n\
  \n你可以使用 `jar` 和 `java` 命令的 `--describe-module`（或简写版本 `-d`）选项打印模块的描述。如果你有一个模块化 JAR，请使用\
  \ `jar` 命令。如果你在模块路径上有一个位于模块化 JAR 或展开目录中的模块，请使用 `java` 命令。\n\n在任何阶段（编译时或运行时）模块系统可访问的所有模块都称为可观察模块。你可以使用\
  \ `--list-modules` 命令行选项打印可观察模块的列表。模块系统通过递归解析一组称为根模块的模块相对于可观察模块集合的依赖关系来创建模块图。在编译时，所有正在编译的模块构成根模块集合。在运行时，其主类被运行的主模块构成根模块集合。如果主类在类路径上，则所有系统模块都是根模块。你可以使用\
  \ `--add-modules` 命令行选项将模块添加到根模块集合中。你可以使用 `--limit-modules` 命令行选项限制可观察模块的数量。\n\n\
  JDK 9 既可以处理你的代码位于模块内的情况，也可以处理不在模块内的情况。每个类加载器都有一个未命名模块。如果类加载器从模块路径加载类型，则该类型是命名模块的成员。如果类加载器从类路径加载类型，则该类型成为该类加载器的未命名模块的成员。\n\
  \n在 JDK 9 之前，JDK 工具只支持 UNIX 风格的选项。JDK 9 为所有工具添加了 GNU 风格的选项。UNIX 风格的选项名称以连字符（`-`）开头，并以\
  \ `\"<名称> <值>\"` 的形式指定，其中 `<名称>` 和 `<值>` 由一个或多个空格分隔。GNU 风格的选项以两个连字符（`--`）开头，可以以\
  \ `\"<名称> <值>\"` 或 `\"<名称>=<值>\"` 的形式指定。大多数选项两种风格都可用。\n\n练习\n\n\n\n1.  Java 程序源代码文件的扩展名是什么？\n\
  2.  什么是编译单元？\n3.  在一个编译单元中可以声明多少种类型？\n4.  在一个编译单元中可以声明多少个公共类型？\n5.  如果编译单元包含一个公共类型，对其命名有什么限制？如果编译单元包含一个名为\
  \ `HelloWorld` 的公共类的声明，那么该编译单元的名称应该是什么？\n6.  在编译单元中，以下结构的指定顺序是什么：类型声明、包和导入语句？\n\
  7.  在一个编译单元中可以有多个包语句吗？\n8.  包含 Java 编译后代码的文件的扩展名是什么？\n9.  包含 Java 模块的源代码和编译后代码的文件名是什么？\n\
  10. 声明模块时使用什么关键字？\n11. 在一个 `module-info.java` 文件中可以声明多少个模块？\n12. 什么是未命名模块？一个类加载器可以有多少个未命名模块？类型（例如，类）何时成为未命名模块的成员？\n\
  13. 什么是 JAR？JAR 文件和 ZIP 文件有什么区别？\n14. 什么是模块化 JAR，它与 JAR 有何不同？你能将模块化 JAR 当作 JAR 使用，反之亦然吗？提示：模块化\
  \ JAR 也是一个 JAR，并且可以这样使用。放置在模块路径上的 JAR 充当模块化 JAR，在这种情况下，模块定义由模块系统自动派生；这样的模块称为自动模块。\n\
  15. 使用什么命令启动 JShell 工具，该命令位于何处？\n16. 使用什么命令编译 Java 源代码？\n17. 使用什么命令将 Java 编译后的代码打包成\
  \ JAR 或模块化 JAR？\n18. 模块描述符（`module-info.class` 文件）放置在模块化 JAR 中的什么位置？\n19. 你有一个模块化\
  \ JAR 保存在 `C:\\lib\\com.jdojo.test.jar`。它包含一个名为 `jdojo.test` 的模块和一个名为 `com.jdojo.test.Test`\
  \ 的主类。编写在模块模式和传统模式下运行此类的命令。\n20. 你有一个模块化 JAR 保存在 `C:\\lib\\com.jdojo.test.jar`。编写使用\
  \ `jar` 命令来描述此模块化 JAR 中打包的模块的命令。\n21. 什么是模块描述符？声明模块时可以指定模块的版本吗？如何指定模块版本？\n22. 什么是可观察模块？什么是根模块，它们在构建模块图时如何使用？\n\
  23. 写出用于将模块添加到根模块集合的命令行选项的名称。\n24. 使用哪个命令行选项来打印可观察模块的列表？\n25. 使用哪个命令行选项来限制可观察模块的集合？\n\
  26. 用于指定模块路径的 GNU 风格选项名称是 `--module-path`。其等效的 UNIX 风格选项是什么？\n27. 打印命令帮助的选项有哪些？如何打印命令可用的非标准选项的额外帮助？\n\
  \n"
- "# 4. 数据类型\n\n在本章中，你将学习：\n\n*   什么是标识符以及声明它们的详细规则\n*   什么是数据类型\n*   原始数据类型和引用数据类型之间的区别\n\
  *   如何声明某种数据类型的变量\n*   如何给变量赋值\n*   Java 中所有原始数据类型的详细描述\n*   什么是数据类型的字面量\n*   什么是类型转换以及何时需要它\n\
  *   整数和浮点数的二进制表示\n*   浮点数的不同舍入模式\n*   Java 如何实现 IEEE 浮点标准\n\n我在本章中使用了大量代码片段。评估这些片段并查看结果的最快方法是使用\
  \ JShell 工具。请参考第 2 章，了解如何在命令提示符下和 NetBeans IDE 中启动 JShell 工具。\n\n## 什么是数据类型？\n\n\
  数据类型（或简称为类型）由三个组件定义：\n\n*   一组值（或数据对象）\n*   一组可以应用于该集合中所有值的操作\n*   一种数据表示，它决定了值如何存储\n\
  \n编程语言提供了一些预定义的数据类型，这些被称为内置数据类型。编程语言也可能允许程序员定义自己的数据类型，这些被称为用户定义数据类型。\n\n由原子性的、不可分割的值组成，并且不借助任何其他数据类型定义的数据类型，称为原始数据类型。用户定义数据类型是根据原始数据类型和其他用户定义数据类型定义的。通常，编程语言不允许程序员扩展或重新定义原始数据类型。\n\
  \nJava 提供了许多内置的原始数据类型，例如 `int`、`float`、`boolean`、`char` 等。例如，定义 Java 中 `int` 原始数据类型的三个组件如下：\n\
  \n*   `int` 数据类型由 -2147483648 到 2147483647 之间的所有整数组成。\n*   为 `int` 数据类型定义了加法、减法、乘法、除法、比较等操作。\n\
  *   `int` 数据类型的值以 32 位内存中的 2 的补码形式表示。\n\n`int` 数据类型的所有三个组件都由 Java 语言预定义。开发人员不能扩展或重新定义\
  \ `int` 数据类型的定义。你可以为 `int` 数据类型的值命名，如下所示：\n\n```\nint employeeId;\n```\n\n这条语句表明\
  \ `employeeId` 是一个名称（技术上称为标识符），它可以与定义 `int` 数据类型值的集合中的一个值相关联。例如，你可以使用如下赋值语句将整数 `1969`\
  \ 与名称 `employeeId` 关联起来：\n\n```\nemployeeId = 1969;\n```\n\n\n\n## 什么是标识符？\n\nJava\
  \ 中的标识符是一个长度不受限制的字符序列。该字符序列包含所有 Java 字母和 Java 数字，其中第一个字符必须是 Java 字母。Java 使用 Unicode\
  \ 字符集。Java 字母是指由 Unicode 字符集表示的任意语言中的字母。例如，A-Z、a-z、_（下划线）和 $ 都被视为 Unicode 中 ASCII\
  \ 字符集范围内的 Java 字母。Java 数字包括 0-9 的 ASCII 数字以及任何表示某种语言中数字的 Unicode 字符。标识符中不允许出现空格。\n\
  \n提示\n\nJava 中的标识符是一个由一个或多个 Unicode 字母和数字组成的序列，并且必须以字母开头。\n\n标识符是“名称”的技术术语。因此，标识符就是\
  \ Java 程序中赋予某个实体的名称，例如模块、包、类、方法、变量等。在上一章中，你声明了一个名为 `jdojo.intro` 的模块、一个名为 `com.jdojo.intro`\
  \ 的包、一个名为 `Welcome` 的类、一个名为 `main` 的方法，以及 `main` 方法的一个名为 `args` 的参数。所有这些名称都是标识符。\n\
  \n你已经见过两种形式的名称：一种是由单个部分组成的名称，例如 `Welcome`；另一种是由点分隔的多个部分组成的名称，例如 `jdojo.intro` 和\
  \ `com.jdojo.intro`。仅由单个部分组成且不使用任何点的名称称为简单名称；可以由点分隔的部分组成的名称称为限定名称。关于 Java 中哪些类型的实体可以拥有简单名称和限定名称，是有相应规则的。例如，模块和包可以拥有限定名称，而类、方法和变量只能拥有简单名称。一个实体可以拥有限定名称，并不意味着该实体的名称必须至少由两个部分组成（例如\
  \ `x.y`）；它仅仅意味着此类实体的名称可以由点分隔的部分组成。例如，模块名 `ComJdojoIntro` 与模块名 `com.jdojo.intro`\
  \ 或 `jdojo.intro` 一样有效。\n\n为什么我们有两种类型的名称——简单名称和限定名称？要理解其背后的原因，请思考以下两个问题：\n\n*  \
  \ 约翰和他的朋友安娜住在英国。约翰告诉安娜他明天要去伯明翰。\n*   托马斯和他的朋友旺达住在美国。托马斯告诉旺达他明天要去伯明翰。\n\n约翰和托马斯说的是同一个伯明翰市吗？答案是否定的。英国和美国都有一个名为伯明翰的城市。约翰说的是英国的城市，而托马斯说的是美国的城市。当你在日常对话或\
  \ Java 程序中使用一个名称时，该名称都有一个有效的空间（一个区域、一个范围或一个作用域），并且在该空间内它必须是唯一的。这样的空间称为命名空间。在我们的例子中，英国和美国充当了命名空间，在这些命名空间中，伯明翰这个城市名称是唯一的。限定名称允许你为名称使用命名空间。例如，约翰和托马斯可能使用了\
  \ `UK.Birmingham` 和 `USA.Birmingham` 作为城市名称，用 Java 术语来说，这些就是限定名称。\n\n当一个 Java 实体可以独立存在时（例如模块和包），允许为此类实体使用限定名称以防止名称冲突。假设我有一个名为\
  \ `jdojo.intro` 的模块，而其他人也创建了一个名为 `jdojo.intro` 的模块。这些模块不能在同一 Java 应用程序中使用（或引用），因为它们的名称冲突。然而，如果这些模块是独立使用的，那么这些名称就没问题。类总是在包内部出现（或声明）；因此，只要简单名称在包内是唯一的，类名就必须是简单名称。\n\
  \n为可重用和发布的模块及包命名的一个简单经验法则是使用互联网反向域名命名约定。如果你拥有 `jdojo.com`，请使用 `com.jdojo` 作为所有模块和包名称的前缀。在本书中，我只使用\
  \ `jdojo` 作为所有模块名称的前缀，因为这些模块并非供公开使用；它们仅用于本书的示例，并且仅供学习之用；较短的模块名称也便于你我输入和阅读！\n\nJava\
  \ 编程语言是区分大小写的。标识符中使用的所有字符及其大小写都很重要。名称 `welcome`、`Welcome` 和 `WELCOME` 是三个不同的标识符。如果你在\
  \ Java 程序中使用能传达实体用途的直观名称，将有助于代码的阅读者。假设你需要在一个变量中存储员工的 ID。你可以将变量命名为 `n1` 和 `id`，Java\
  \ 不会报错。然而，如果你将其命名为 `employeeId` 或 `empId`，你的代码可读性会更强。任何阅读你代码的人都会获得该变量的正确上下文和用途。表\
  \ 4-1 包含了一些 Java 中有效和无效标识符的示例。\n\n表 4-1. Java 中有效和无效标识符的示例\n\n| 标识符 | 是否有效 | 描述\
  \ |\n| --- | --- | --- |\n| `Welcome` | 是 | 全部由字母组成。 |\n| `num1` | 是 | 由三个字母和一个数字组成。\
  \ |\n| `_myId` | 是 | 可以以下划线开头。 |\n| `sum_of_two_numbers` | 是 | 可以包含字母和下划线。 |\n|\
  \ `Outer$Inner` | 是 | 可以包含字母和 $。 |\n| `$` `var` | 是 | 可以以 $ 开头。 |\n| `$` | 是 | 可以只有一个\
  \ $。 |\n| `_` | 否 | 从 JDK 9 开始，下划线不能单独用作标识符。但是，下划线可以是多字符标识符名称的一部分。 |\n| `2num` |\
  \ 否 | 标识符不能以数字开头。 |\n| `my name` | 否 | 标识符不能包含空格。 |\n| `num1+num2` | 否 | 标识符不能包含像\
  \ `+`、`-`、`*`、`/` 等符号。 |\n\n## 关键字\n\n关键字是在 Java 编程语言中具有预定义含义的单词。它们只能在 Java 编程语言定义的上下文中使用。关键字不能用作标识符。表\
  \ 4-2 包含了 Java 中关键字的完整列表。\n\n表 4-2. Java 中的关键字和保留字列表\n\n| `abstract` | `continue`\
  \ | `for` | `new` | `switch` |\n| --- | --- | --- | --- | --- |\n| `assert` | `default`\
  \ | `if` | `package` | `synchronized` |\n| `boolean` | `do` | `goto` | `private`\
  \ | `this` |\n| `break` | `double` | `implements` | `protected` | `throw` |\n| `byte`\
  \ | `else` | `import` | `public` | `throws` |\n| `case` | `enum` | `instanceof`\
  \ | `return` | `transient` |\n| `catch` | `extends` | `int` | `short` | `try` |\n\
  | `char` | `final` | `interface` | `static` | `void` |\n| `class` | `finally` |\
  \ `long` | `strictfp` | `volatile` |\n| `const` | `float` | `native` | `super` |\
  \ `while` |\n| `_ (下划线)` |   |   |   |   |\n\n`const` 和 `goto` 这两个关键字目前未在 Java 中使用。它们是保留关键字，不能用作标识符。\n\
  \n随着模块系统的引入，Java SE 9 引入了 10 个新的受限关键字，它们不能用作标识符。这些受限关键字是 `open`、`module`、`requires`、`transitive`、`exports`、`opens`、`to`、`uses`、`provides`\
  \ 和 `with`。它们是受限关键字，因为仅在模块声明的上下文中才被视为关键字；在程序的其他任何地方，它们都可以用作标识符。它们在 Java SE 8 中不是关键字。如果它们在\
  \ Java SE 9 中被声明为关键字，那么许多使用它们作为标识符编写的 Java SE 程序将会出错。\n\n提示\n\n你将在 Java 程序中遇到三个词——`true`、`false`\
  \ 和 `null`。它们看起来像是关键字，但并非如此。实际上，`true` 和 `false` 是布尔字面量，`null` 是空字面量。你不能在 Java 中将\
  \ `true`、`false` 或 `null` 用作标识符，即使它们不是关键字。\n\n\n\n## Java 中的数据类型\n\n在开始讨论 Java 中所有可用的数据类型之前，我们先来看一个简单的两数相加的例子。假设你的朋友让你把两个数加起来。两数相加的过程如下：\n\
  \n1.  你的朋友告诉你第一个数，你听到后，大脑将其记录在记忆中的某个特定位置。当然，你并不知道这个数具体存储在大脑记忆的哪个位置。\n2.  你的朋友告诉你第二个数，你听到后，大脑再次将其记录在记忆中的某个特定位置。\n\
  3.  现在，你的朋友让你把这两个数加起来。你的大脑再次开始工作。它回忆（或读取）这两个数，然后将它们相加，最后你告诉朋友这两个数的和。\n\n现在，如果你的朋友想让你告诉他这两个数的差，他不需要再把这两个数告诉你一遍。这是因为这两个数已经存储在你的记忆中，你的大脑可以再次回忆并使用它们。然而，你的大脑能否执行这两个数的加法，取决于许多因素，例如：这两个数有多大；你的大脑能否记住（或存储）这么大的数；你的大脑是否经过加法训练等等。两数相加的过程也取决于这两个数的类型。根据这两个数是整数（例如\
  \ 10 和 20）、实数（例如 12.4 和 19.1），还是整数与实数的混合（例如 10 和 69.9），你的大脑会使用不同的逻辑来相加。整个过程在你大脑中发生，而你甚至没有察觉（也许是因为你太习惯做这些加法了）。但是，当你想在\
  \ Java 程序中对数字或任何其他类型的值进行任何操作时，你需要详细说明你要操作的值以及操作这些值的步骤。\n\n让我们讨论一下在 Java 程序中实现两数相加的相同例子。你需要告诉\
  \ Java 的第一件事就是你要相加的两个数的类型。假设你想将两个整数 50 和 70 相加。当你自己相加两个数时，你的大脑会给每个数一个名字（可能是“第一个数”和“第二个数”）。你没有注意到大脑给这些数命名的过程。然而，在\
  \ Java 程序中，你必须显式地给这两个数命名（也称为标识符）。让我们将这两个数分别命名为 `num1` 和 `num2`。Java 程序中的以下两行表明存在两个整数\
  \ `num1` 和 `num2`：\n\n```\nint num1;\nint num2;\n```\n\n`int` 关键字用于表示其后的名称代表一个整数值，例如\
  \ 10、15、70、1000 等。当这两行代码被执行时，Java 会分配两个内存位置，并将名称 `num1` 与第一个内存位置关联，将名称 `num2` 与第二个内存位置关联。此时的内存状态如图\
  \ 4-1 所示。\n\n![A323069_2_En_4_Fig1_HTML.gif](img/A323069_2_En_4_Fig1_HTML.gif)\n\
  \n图 4-1.\n\n声明两个 int 类型变量时的内存状态\n\n这些内存位置被称为变量，它们被命名为 `num1` 和 `num2`。严格来说，`num1`\
  \ 和 `num2` 是与两个内存位置关联的两个名称。但粗略地说，你可以认为：\n\n*   `num1` 和 `num2` 是两个变量，或者\n*   `num1`\
  \ 和 `num2` 是两个 `int` 数据类型的变量，或者\n*   `num1` 和 `num2` 是两个 `int` 变量。\n\n因为你已经将 `num1`\
  \ 和 `num2` 声明为 `int` 数据类型的变量，所以你不能在这些内存位置存储实数，例如 10.51。以下代码将 50 存储在 `num1` 中，将 70\
  \ 存储在 `num2` 中：\n\n```\nnum1 = 50;\nnum2 = 70;\n```\n\n这两行代码执行后的内存状态如图 4-2 所示。\n\
  \n\n\n![A323069_2_En_4_Fig2_HTML.gif](img/A323069_2_En_4_Fig2_HTML.gif)\n\n图 4-2.\n\
  \n两个 int 类型变量被赋值后的内存状态\n\n现在，你想要将这两个数字相加。在相加之前，你必须分配另一个内存位置，用于存放结果。你将这个内存位置命名为 `num3`，以下代码执行了这些任务：\n\
  \n```\nint num3;            // 分配内存位置 num3\nnum3 = num1 + num2;  // 计算和并将结果存储在 num3\
  \ 中\n```\n\n这两行代码执行后的内存状态如图 4-3 所示。\n\n![A323069_2_En_4_Fig3_HTML.gif](img/A323069_2_En_4_Fig3_HTML.gif)\n\
  \n图 4-3.\n\n两个数相加过程中的内存状态\n\n前面的两行代码可以合并为一行：\n\n```\nint num3 = num1 + num2;\n```\n\
  \n一个变量具有三个属性：\n\n*   一个用于存放值的内存位置\n*   存储在该内存位置的数据类型\n*   一个用于引用该内存位置的名称（也称为标识符）\n\
  \n变量的数据类型还决定了该内存位置所能容纳的值的范围。因此，为变量分配的内存量取决于其数据类型。例如，为 `int` 数据类型的变量分配 32 位内存。在这个例子中，每个变量（`num1`、`num2`\
  \ 和 `num3`）都使用 32 位内存。\n\nJava 支持两种数据类型：\n\n*   基本数据类型\n*   引用数据类型\n\n基本数据类型的变量保存一个值，而引用数据类型的变量保存对内存中某个对象的引用。本节将讨论\
  \ Java 中可用的引用数据类型之一：`String`。`String` 是 Java 库中定义的一个类，你可以用它来操作文本（字符序列）。你可以按如下方式声明一个名为\
  \ `str` 的 `String` 类型引用变量：\n\n```\nString str;\n```\n\n在将对象的引用赋值给引用变量之前，你需要先创建一个对象。你可以使用\
  \ `new` 运算符创建对象。你可以按如下方式创建一个内容为 `\"Hello\"` 的 `String` 类对象：\n\n```\n// 创建一个 String\
  \ 对象，并将该对象的引用赋值给 str\nstr = new String(\"Hello\");\n```\n\n这段代码执行时会发生什么？首先，分配内存，并将变量名\
  \ `str` 与该内存位置关联起来，如图 4-4 所示。这个过程与声明基本数据类型变量相同。第二段代码在内存中创建了一个包含文本 `\"Hello\"` 的\
  \ `String` 对象，并将该 `String` 对象的引用（或内存地址）存储到变量 `str` 中。图 4-4 的后半部分通过一个从变量 `str` 指向内存中对象的箭头展示了这一事实。\n\
  \n![A323069_2_En_4_Fig4_HTML.gif](img/A323069_2_En_4_Fig4_HTML.gif)\n\n图 4-4.\n\n\
  使用引用变量的内存状态\n\n你也可以将一个引用变量中存储的对象引用赋值给另一个引用变量。在这种情况下，两个引用变量都指向内存中的同一个对象。这可以通过以下方式实现：\n\
  \n```\n// 声明 String 引用变量 str1 和 str2\nString str1;\nString str2;\n// 将 String 对象\
  \ \"Hello\" 的引用赋值给 str1\nstr1 = new String(\"Hello\");\n// 将 str1 中存储的引用赋值给 str2\n\
  str2 = str1;\n```\n\n有一个引用常量（也称为引用字面量）`null`，它可以被赋值给任何引用变量。如果将 `null` 赋值给一个引用变量，意味着该引用变量不指向内存中的任何对象。`null`\
  \ 引用字面量可以赋值给 `str2`。\n\n```\nstr2 = null;\n```\n\n所有这些语句执行后的内存状态如图 4-5 所示。\n\n![A323069_2_En_4_Fig5_HTML.gif](img/A323069_2_En_4_Fig5_HTML.gif)\n\
  \n图 4-5.\n\n在引用变量赋值中使用 null 时的内存状态\n\n`String` 对象是使用 `new` 运算符创建的。然而，字符串使用非常频繁，因此有一种创建字符串对象的快捷方式。所有字符串字面量，即用双引号括起来的字符序列，都被视为\
  \ `String` 对象。因此，你可以使用字符串字面量，而不是使用 `new` 运算符来创建 `String` 对象，如下所示：\n\n```\n// 将包含文本\
  \ \"Hello\" 的 String 对象的引用赋值给 str1\nString str1 = \"Hello\";\n// 将包含文本 \"Hello\"\
  \ 的 String 对象的引用赋值给 str1\nString str1 = new String (\"Hello\");\n```\n\n这两个语句之间存在细微差别，它们都将一个包含相同文本\
  \ `\"Hello\"` 的 `String` 对象赋值给 `str1`。我将在单独章节讨论 `String` 类时介绍这个区别。\n\n## Java 中的基本数据类型\n\
  \nJava 有八种基本数据类型。表 4-3 列出了它们的名称、大小、是否有符号、取值范围以及一些示例。以下各节将详细描述它们。\n\n表 4-3.\n\n基本数据类型列表：大小、取值范围及示例\n\
  \n| 数据类型 | 大小（位） | 有符号/无符号 | 取值范围 | 示例 |\n| --- | --- | --- | --- | --- |\n| `byte`\
  \ | `8` | 有符号 | `-2` ^(`7`) 到 `+2` ^(`7`) `- 1` | `-2, 8, 10` |\n| `short` | `16`\
  \ | 有符号 | `-2` ^(`15`) 到 `+2` ^(`15`) `- 1` | `-2, 8, 10` |\n| `int` | `32` | 有符号\
  \ | `-2` ^(`31`) 到 `+2` ^(`31`) `- 1` | `1990, -90, 23` |\n| `long` | `64` | 有符号\
  \ | `-2` ^(`63`) 到 `+2` ^(`63`) `- 1` | `1990L, -90L, 23L` |\n| `char` | `16` |\
  \ 无符号 | `0` 到 `65535` | `'A', '8', '\\u0000'` |\n| `float` | `32` | 有符号 | `-3.4\
  \ x 10` ^(`38`) 到 `+3.4 x 10` ^(`38`) | `12.89F, -89.78F` |\n| `double` | `64` |\
  \ 有符号 | -1.7 x 10³⁰⁸ 到 +1.7 x 10³⁰⁸ | `12.78, -78.89` |\n| `boolean` | 未指定 | 不适用\
  \ | `true` 和 `false` | `true, false` |\n\n这八种基本数据类型分为两类：\n\n*   `boolean` 数据类型\n\
  *   数值数据类型\n\n数值数据类型可以进一步细分为整数类型和浮点类型。所有基本数据类型及其分类如图 4-6 所示。后续章节将详细描述所有基本数据类型。\n\
  \n![A323069_2_En_4_Fig6_HTML.gif](img/A323069_2_En_4_Fig6_HTML.gif)\n\n图 4-6.\n\n\
  按类别划分的 Java 基本数据类型列表\n\n我收到了本书第一版的一些读者发来的电子邮件，他们认为将 `char` 数据类型列在数值数据类型类别下是一个错误。然而，事实并非如此。`char`\
  \ 数据类型无论如何都是一种数值数据类型。你可以将整数赋值给 `char` 变量，也可以对 `char` 变量执行加法和减法等算术运算。Java 语言规范也将\
  \ `char` 归类为数值数据类型。许多 Java 书籍要么将 `char` 列为单独的数据类型，要么将其描述为非数值数据类型；这两种做法都是错误的。\n\n\
  在阅读本书以及使用 Java 的过程中，你会多次遇到术语“字面量”。类型 `X` 的字面量是指可以在源代码中直接表示而无需任何计算的 `X` 类型的值。例如，10\
  \ 是一个 `int` 字面量，这意味着每当你在 Java 程序中需要一个 `int` 类型的值 10 时，你可以直接输入 10。Java 为所有基本类型以及两种引用类型（`String`\
  \ 类型和 null 类型）定义了字面量。\n\n### 整数数据类型\n\n整数数据类型是一种数值数据类型，其值为整数。Java 提供了五种整数数据类型：`byte`、`short`、`int`、`long`\
  \ 和 `char`。所有整数数据类型将在后续章节中详细描述。\n\n\n\n#### int 数据类型\n\n`int` 数据类型是一种 32 位有符号的 Java\
  \ 基本数据类型。`int` 数据类型的变量占用 32 位内存。其有效范围是 -2,147,483,648 到 2,147,483,647（-2³¹ 到 2³¹\
  \ - 1）。此范围内的所有整数被称为整数字面量（或整数常量）。例如，10、-200、0、30、19 等，都是 `int` 类型的整数字面量。一个整数字面量可以赋值给一个\
  \ `int` 变量，比如 `num1`，如下所示：\n\n```\nint num1 = 21;\n```\n\n整数字面量可以用以下格式表示：\n\n* \
  \  十进制数字格式\n*   八进制数字格式\n*   十六进制数字格式\n*   二进制数字格式\n\n当一个整数字面量以零开头并且至少有两位数字时，它被视为八进制数字格式。下面这行代码将十进制值\
  \ 17（八进制的 021）赋值给 `num1`：\n\n```\n// 021 是八进制数字格式，不是十进制\nint num1 = 021;\n```\n\n\
  下面两行代码具有相同的效果，都将值 17 赋值给变量 `num1`：\n\n```\n// 无前导零 - 十进制数字格式\nint num1 = 17;\n//\
  \ 有前导零 - 八进制数字格式。八进制的 021 等同于十进制的 17\nint num1 = 021;\n```\n\n使用带有前导零的 `int` 字面量时要小心，因为\
  \ Java 会将这些字面量视为八进制数字格式。请注意，八进制格式的 `int` 字面量必须至少包含两位数字，并且必须以零开头才能被视为八进制数。数字 0 被视为十进制数字格式的零，而\
  \ 00 被视为八进制数字格式的零。\n\n```\n// 将零赋值给 num1，0 是十进制数字格式\nint num1 = 0;\n// 将零赋值给 num1，00\
  \ 是八进制数字格式\nint num1 = 00;\n```\n\n请注意，0 和 00 表示相同的值，即零。两者都将值零赋值给变量 `num1`，效果相同。\n\
  \n所有十六进制数字格式的 `int` 字面量都以 `0x` 或 `0X` 开头，即零后面紧跟一个大写或小写的 `X`，并且它们必须至少包含一个十六进制数字。十六进制数字格式使用\
  \ 16 个数字，即 0-9 和 A-F（或 a-f）。字母 A 到 F 的大小写无关紧要。以下是使用十六进制格式 `int` 字面量的示例：\n\n```\n\
  int num1 = 0x123;\nint num2 = 0xdecafe;\nint num3 = 0x1A2B;\nint num4 = 0X0123;\n\
  ```\n\n`int` 字面量也可以使用二进制数字格式表示。所有二进制数字格式的 `int` 字面量都以 `0b` 或 `0B` 开头，即零后面紧跟一个大写或小写的\
  \ `B`。以下是使用二进制数字格式 `int` 字面量的示例：\n\n```\nint num1 = 0b10101;\nint num2 = 0b00011;\n\
  int num3 = 0b10;\nint num4 = 0b00000010;\n```\n\n以下赋值语句使用所有四种不同的格式将相同的十进制数 51966\
  \ 赋值给名为 `num1` 的 `int` 变量：\n\n```\nnum1 = 51966;                // 十进制格式\nnum1 =\
  \ 0145376;              // 八进制格式，以零开头\nnum1 = 0xCAFE;               // 十六进制格式，以\
  \ 0x 开头\nnum1 = 0b1100101011111110;   // 二进制格式，以 0b 开头\n```\n\nJava 有一个名为 `Integer`\
  \ 的类（注意 `Integer` 中的大写 `I`），它定义了两个常量来表示 `int` 数据类型的最大值和最小值，即 `Integer.MAX_VALUE`\
  \ 和 `Integer.MIN_VALUE`。例如，\n\n```\nint max = Integer.MAX_VALUE; // 将 int 的最大值赋值给\
  \ max\nint min = Integer.MIN_VALUE; // 将 int 的最小值赋值给 min\n```\n\n#### long 数据类型\n\
  \n`long` 数据类型是一种 64 位有符号的 Java 基本数据类型。当对整数进行运算的结果可能超出 `int` 数据类型的范围时，就会使用它。其范围是\
  \ -9,223,372,036,854,775,808 到 9,223,372,036,854,775,807（-2⁶³ 到 2⁶³ - 1）。`long`\
  \ 范围内的所有整数被称为 `long` 类型的整数字面量。\n\n51 是一个整数字面量。它的数据类型是 `int` 还是 `long`？`long` 类型的整数字面量总是以\
  \ `L`（或小写 `l`）结尾。本书使用 `L` 来标记 `long` 类型整数字面量的结尾，因为在印刷体中，`l`（小写 L）经常与 `1`（数字一）混淆。以下是使用\
  \ `long` 类型整数字面量的示例：\n\n```\nlong num1 = 0L;\nlong num2 = 401L;\nlong mum3 = -3556L;\n\
  long num4 = 89898L;\nlong num5 = -105L;\n```\n\n提示\n\n`25L` 是 `long` 类型的整数字面量，而\
  \ `25` 是 `int` 类型的整数字面量。\n\n`long` 类型的整数字面量也可以用八进制、十六进制和二进制格式表示。例如，\n\n```\nlong\
  \ num1;\nnum1 = 25L;      // 十进制格式\nnum1 = 031L;     // 八进制格式\nnum1 = 0X19L;   \
  \ // 十六进制格式\nnum1 = 0b11001L; // 二进制格式\n```\n\n当将一个 `long` 字面量赋值给 `long` 类型的变量时，Java\
  \ 编译器会检查所赋的值，并确保其在 `long` 数据类型的范围内；否则会生成编译时错误。例如\n\n```\n// 比 long 的最大正值多 1。这将产生编译时错误\n\
  long num1 = 9223372036854775808L;\n```\n\n因为 `int` 数据类型的范围比 `long` 数据类型小，所以存储在 `int`\
  \ 变量中的值总是可以赋值给 `long` 变量。\n\n```\nint num1 = 10;\nlong num2 = 20;  // 可以将 int 字面量\
  \ 20 赋值给 long 变量 num2\nnum2 = num1;     // 可以将 int 赋值给 long\n```\n\n提示\n\n当你将较小类型的值赋值给较大类型的变量时（例如，`int`\
  \ 赋值给 `long`），Java 会执行自动的加宽转换，用零填充目标变量中的高位，同时保留源变量的符号位。例如，将 `int` 字面量赋值给 `long`\
  \ 类型的变量时，Java 会执行加宽转换。\n\n从 `int` 到 `long` 的赋值是有效的，因为所有可以存储在 `int` 变量中的值也都可以存储在\
  \ `long` 变量中。然而，反过来则不成立。你不能简单地将存储在 `long` 变量中的值赋值给 `int` 变量。存在值溢出（或值丢失）的可能性。考虑以下两个变量：\n\
  \n```\nint num1 = 10;\nlong num2 = 2147483655L;\n```\n\n如果你将 `num2` 的值赋值给 `num1`，如下所示：\n\
  \n```\nnum1 = num2;\n```\n\n存储在 `num2` 中的值无法存储在 `num1` 中，因为 `num1` 的数据类型是 `int`，而\
  \ `num2` 的值超出了 `int` 数据类型可以处理的范围。为了防止无意中犯此类错误，Java 不允许你编写如下代码：\n\n```\n// 编译时错误。Java\
  \ 不允许将 long 赋值给 int\nnum1 = num2;\n```\n\n即使存储在 `long` 变量中的值完全在 `int` 数据类型的范围内，也不允许从\
  \ `long` 到 `int` 的赋值，如下例所示：\n\n```\nint num1 = 5;\nlong num2 = 25L;\n// 编译时错误。即使\
  \ num2 的值 25 在 int 的范围内\nnum1 = num2;\n```\n\n如果你想将 `long` 变量的值赋值给 `int` 变量，你必须在代码中明确说明这一点，以便\
  \ Java 确保你意识到可能存在值丢失。你可以通过 Java 中的“强制转换”来实现，如下所示：\n\n```\nnum1 = (int)num2; // 现在没问题了，因为使用了\
  \ \"(int)\" 强制转换\n```\n\n通过编写 `(int)num2`，你是在指示 Java 将存储在 `num2` 中的值视为 `int` 类型。在运行时，Java\
  \ 将只使用 `num2` 的 32 个最低有效位，并将这 32 位中存储的值赋值给 `num1`。如果 `num2` 的值超出了 `int` 数据类型的范围，那么你在\
  \ `num1` 中得到的值将不相同。\n\nJava 有一个 `Long` 类（注意 `Long` 中的大写 `L`），它定义了两个常量来表示 `long`\
  \ 数据类型的最大值和最小值，即 `Long.MAX_VALUE` 和 `Long.MIN_VALUE`。\n\n```\nlong max = Long.MAX_VALUE;\n\
  long min = Long.MIN_VALUE;\n```\n\n\n\n#### byte 数据类型\n\n`byte` 数据类型是一种 8 位有符号的\
  \ Java 原始整数数据类型。其取值范围是 -128 到 127（-2⁷ 到 2⁷ - 1）。这是 Java 中可用的最小整数数据类型。通常，当程序使用大量值在\
  \ -128 到 127 范围内的变量，或者处理文件或网络中的二进制数据时，会使用 `byte` 变量。与 `int` 和 `long` 字面量不同，没有 `byte`\
  \ 字面量。但是，你可以将任何在 `byte` 范围内的 `int` 字面量赋值给 `byte` 变量。例如：\n\n```\nbyte b1 = 125;\n\
  byte b2 = -11;\n```\n\n如果你将 -128 到 127 范围之外的值赋给 `byte` 变量，Java 会生成编译器错误。以下赋值会产生编译时错误：\n\
  \n```\n// 错误。150 是一个超出 -128 到 127 范围的 int 字面量\nbyte b3 = 150;\n```\n\n请注意，你只能将 -128\
  \ 到 127 之间的 `int` 字面量赋值给 `byte` 变量。然而，这并不意味着你也可以将存储在 `int` 变量中（且其值在 -128 到 127 范围内）的值赋值给\
  \ `byte` 变量。以下代码片段将生成编译时错误，因为它将 `int` 变量 `num1` 的值赋给了 `byte` 变量 `b1`：\n\n```\nint\
  \ num1 = 15;\n// 正确。将 int 字面量（-128 到 127）赋值给 byte。\nbyte b1 = 15;\n// 编译时错误。即使 num1\
  \ 的值为 15，在 -128 到 127 范围内。\nb1 = num1;\n```\n\n为什么当 `num1` 被赋值给 `b1` 时编译器会报错？编译器不会尝试读取存储在\
  \ `num1` 中的值，因为 `num1` 是一个变量，其值只有在运行时才知道。它将 `num1` 视为 `int` 类型，即 32 位大小，而将 `b1`\
  \ 视为 `byte` 类型，即 8 位大小。基于它们的大小，编译器认为你在将一个较大的变量赋值给一个较小的变量，存在数据丢失的潜在风险。当你将 15 赋值给\
  \ `b1` 时，15 是一个 `int` 字面量，其值在编译时已知；编译器可以确保 15 在 `byte` 的范围内（-128 到 127）。如果你在前面的代码片段中将\
  \ `num1` 声明为编译时常量，编译器就不会生成错误。编译时常量是使用 `final` 关键字声明的变量，其值在编译时已知。以下代码片段实现了这一点：\n\n\
  ```\n// 使用 final 使 num1 变量成为编译时常量\nfinal int num1 = 15;\n// 正确。将 int 字面量（-128 到\
  \ 127）赋值给 byte。\nbyte b1 = 15;\n// 现在，编译器知道 num1 的值为 15，因此没问题。\nb1 = num1;\n```\n\
  \n你也可以像在 `long` 到 `int` 赋值中那样，通过使用强制转换来修复此错误。将 `num1` 赋值给 `b1` 可以重写如下：\n\n```\n\
  int num1 = 15;\nbyte b1 = 15;\nb1 = (byte)num1; // 正确。使用了强制转换\n```\n\n经过这次从 `int`\
  \ 到 `byte` 的强制转换后，Java 编译器将不再对 `int` 到 `byte` 的赋值报错。如果 `num1` 保存的值无法在 8 位的 `byte`\
  \ 变量 `b1` 中正确表示，则 `num1` 的高位（第 9 位到第 32 位）将被忽略，低位 8 位所表示的值将被赋给 `b1`。在这种 `int` 到\
  \ `byte` 的赋值情况下，如果源变量的值超出 `byte` 数据类型的范围，则赋给目标 `byte` 变量的值可能与源 `int` 变量的值不同。\n\n\
  然而，无论源 `int` 变量中的值如何，目标 `byte` 变量的值始终在 -128 到 127 之间。与 `int` 类似，由于 `long` 也是比 `byte`\
  \ 更大的数据类型，如果你想将 `long` 变量的值赋给 `byte` 变量，则需要使用显式强制转换。例如：\n\n```\nbyte b4 = 10;\n\
  long num3 = 19L;\nb4 = (byte)num3;  // 正确，因为使用了强制转换\nb4 = 19L;         // 错误。不能将\
  \ long 字面量赋值给 byte\nb4 = (byte)19L;   // 正确，因为使用了强制转换\n```\n\n确实，19 和 19L 表示相同的数字。然而，对于\
  \ Java 编译器来说，它们是不同的。19 是一个 `int` 字面量，即其数据类型是 `int`，而 19L 是一个 `long` 字面量，即其数据类型是\
  \ `long`。\n\nJava 有一个名为 `Byte`（注意 `Byte` 中的大写 `B`）的类，它定义了两个常量来表示 `byte` 数据类型的最大值和最小值：`Byte.MAX_VALUE`\
  \ 和 `Byte.MIN_VALUE`。\n\n```\nbyte max = Byte.MAX_VALUE; // 等同于 byte max = 127;\n\
  byte min = Byte.MIN_VALUE; // 等同于 byte min = -128;\n```\n\n#### short 数据类型\n\n`short`\
  \ 数据类型是一种 16 位有符号的 Java 原始整数数据类型。其取值范围是 -32768 到 32767（或 -2¹⁵ 到 2¹⁵ - 1）。通常，当程序使用大量值在\
  \ `short` 数据类型范围内的变量，或者处理文件中可以使用 `short` 数据类型轻松处理的数据时，会使用 `short` 变量。与 `int` 和 `long`\
  \ 字面量不同，没有 `short` 字面量。但是，你可以将任何在 `short` 范围内（-32768 到 32767）的 `int` 字面量赋值给 `short`\
  \ 变量。例如：\n\n```\nshort s1 = 12905;   // 正确\nshort s2 = -11890;  // 正确\n```\n\n`byte`\
  \ 变量的值始终可以赋值给 `short` 变量，因为 `byte` 数据类型的范围落在 `short` 数据类型的范围内。将 `int` 或 `long` 变量的值赋值给\
  \ `short` 变量的所有其他规则与 `byte` 变量相同。以下代码片段说明了将 `byte`、`int` 和 `long` 值赋值给 `short` 变量的情况：\n\
  \n```\nshort s1 = 15;  // 正确\nbyte b1 = 10;   // 正确\ns1 = b1;        // 正确\nint\
  \ num1 = 10;    // 正确\ns1 = num1;        // 编译时错误\ns1 = (short)num1; // 正确，因为从 int\
  \ 到 short 的强制转换\ns1 = 35000;       // 编译时错误，int 字面量超出 short 范围\nlong num2 = 555L;\
  \ // 正确\ns1 = num2;        // 编译时错误\ns1 = (short)num2; // 正确，因为从 long 到 short 的强制转换\n\
  s1 = 555L;        // 编译时错误\ns = (short)555L;  // 正确，因为从 long 到 short 的强制转换\n```\n\
  \nJava 有一个名为 `Short`（注意 `Short` 中的大写 `S`）的类，它定义了两个常量来表示 `short` 数据类型的最大值和最小值：`Short.MAX_VALUE`\
  \ 和 `Short.MIN_VALUE`。\n\n```\nshort max = Short.MAX_VALUE;\nshort min = Short.MIN_VALUE;\n\
  ```\n\n#### char 数据类型\n\n`char` 数据类型是一种 16 位无符号的 Java 原始数据类型。其值表示一个 Unicode 字符。请注意，`char`\
  \ 是一种无符号数据类型。因此，`char` 变量不能有负值。`char` 数据类型的范围是 0 到 65535，这与 Unicode 字符集的范围相同。字符字面量表示\
  \ `char` 数据类型的一个值。字符字面量可以用以下格式表示：\n\n*   用单引号括起来的字符\n*   字符转义序列\n*   Unicode 转义序列\n\
  *   八进制转义序列\n\n##### 单引号中的字符字面量\n\n字符字面量可以通过将其括在单引号中来表示。以下是一些示例：\n\n```\nchar c1\
  \ = 'A';\nchar c2 = 'L';\nchar c3 = '5';\nchar c4 = '/';\n```\n\n回想一下，用双引号括起来的字符序列是\
  \ `String` 字面量。`String` 字面量不能赋值给 `char` 变量，即使该 `String` 字面量只包含一个字符。这个限制是因为 Java\
  \ 不允许混合使用原始数据类型和引用数据类型的值。`String` 是引用数据类型，而 `char` 是原始数据类型。以下是一些示例：\n\n```\nchar\
  \ c1 = 'A';     // 正确\nString s1 = 'A';   // 错误。不能将 char 类型的 'A' 赋值给 String 类型的\
  \ s1\nString s2 = \"A\";   // 正确。\"A\" 是一个 String 字面量，赋值给 String 变量\nString s3 =\
  \ \"ABC\"; // 正确。\"ABC\" 是一个 String 字面量\nchar c2 = \"A\";     // 错误。不能将 String 类型的\
  \ \"A\" 赋值给 char 类型的 c2\nchar c4 = 'AB';    // 错误。字符字面量必须只包含一个字符\n```\n\n\n\n#####\
  \ 字符转义序列\n\n字符字面量也可以表示为字符转义序列。字符转义序列以反斜杠开头，后紧跟一个字符，两者都用单引号括起来。有八个预定义的字符转义序列，如表 4-4\
  \ 所示。在 Java 中，你不能定义自己的字符转义序列。\n\n表 4-4.\n\n字符转义序列列表\n\n| 字符转义序列 | 描述 |\n| --- |\
  \ --- |\n| `'\\n'` | 换行符 |\n| `'\\r'` | 回车符 |\n| `'\\f'` | 换页符 |\n| `'\\b'` | 退格符\
  \ |\n| `'\\t'` | 制表符 |\n| `'\\\\'` | 反斜杠 |\n| `'\\\"'` | 双引号 |\n| `'\\''` | 单引号\
  \ |\n\n以字符转义序列形式表示的字符字面量由两个字符组成——一个反斜杠和反斜杠后面的一个字符。然而，它们只代表一个字符。以下是使用字符序列的几个示例：\n\
  \n```\nchar c1 = '\\n'; // 将换行符赋值给 c1\nchar c2 = '\\\"'; // 将双引号赋值给 c2\nchar c3\
  \ = '\\a'; // 编译时错误。无效的字符转义序列\n```\n\n##### Unicode 字符转义序列\n\n字符字面量也可以表示为 `'\\uxxxx'`\
  \ 形式的 Unicode 转义序列。这里，`\\u`（一个反斜杠后紧跟一个小写字母 `u`）表示 Unicode 转义序列的开始，`xxxx` 代表恰好四个十六进制数字。`xxxx`\
  \ 表示的值是该字符的 Unicode 值。字符 `'A'` 的 Unicode 值是 65。十进制值 65 可以用十六进制表示为 41。因此，字符 `'A'`\
  \ 可以用 Unicode 转义序列表示为 `'\\u0041'`。以下代码片段将相同的字符 `'A'` 赋值给 `char` 变量 `c1` 和 `c2`：\n\
  \n```\nchar c1 = 'A';\nchar c2 = '\\u0041';  // 等同于 c2 = 'A';\n```\n\n##### 八进制字符转义序列\n\
  \n字符字面量也可以表示为 `'\\nnn'` 形式的八进制转义序列。这里，`n` 是一个八进制数字（0-7）。八进制转义序列的范围是 `'\\000'` 到\
  \ `'\\377'`。八进制数 377 与十进制数 255 相同。因此，使用八进制转义序列，你可以表示 Unicode 代码范围从 0 到 255 十进制整数的字符。\n\
  \nUnicode 字符集（代码范围 0 到 65535）可以表示为 Unicode 转义序列（`'\\uxxxx'`）。为什么 Java 还有另一个八进制转义序列，它是\
  \ Unicode 转义序列的子集？八进制转义序列的存在是为了表示字符，以便与使用 8 位无符号字符表示字符的其他语言兼容。与始终需要使用四个十六进制数字的 Unicode\
  \ 转义序列不同，在八进制转义序列中，你可以使用一个、两个或三个八进制数字。因此，八进制转义序列可以采用 `'\\n'`、`'\\nn'` 或 `'\\nnn'`\
  \ 的形式，其中 `n` 是八进制数字 0、1、2、3、4、5、6 和 7 之一。八进制转义序列的一些示例如下：\n\n```\nchar c1 = '\\52';\n\
  char c2 = '\\141';\nchar c3 = '\\400'; // 编译时错误。八进制 400 超出范围\nchar c4 = '\\42';\n\
  char c5 = '\\10';  // 等同于 '\\n'\n```\n\n如果 `int` 字面量落在 0-65535 范围内，你也可以将 `int` 字面量赋值给\
  \ `char` 变量。当你将 `int` 字面量赋值给 `char` 变量时，`char` 变量表示其 Unicode 代码等于该 `int` 字面量所表示值的字符。字符\
  \ `'a'`（小写 A）的 Unicode 代码是 97。十进制值 97 在八进制中表示为 141，在十六进制中表示为 61。你可以在 Java 中以不同形式表示\
  \ Unicode 字符 `'a'`：`'a'`、`'\\141'` 和 `'\\u0061'`。你也可以使用 `int` 字面量 97 来表示 Unicode\
  \ 字符 `'a'`。以下四个赋值在 Java 中具有相同的含义：\n\n```\nchar c1 = 97;          // 将 'a' 赋值给 c1\n\
  char c2 = 'a';         // 将 'a' 赋值给 c2\nchar c3 = '\\141';      // 将 'a' 赋值给 c3\n\
  char c4 = '\\u0061';    // 将 'a' 赋值给 c4\n```\n\n`byte` 变量占用 8 位，`char` 变量占用 16 位。即使\
  \ `byte` 数据类型的范围比 `char` 数据类型小，你也不能将存储在 `byte` 变量中的值赋值给 `char` 变量。原因是 `byte` 是有符号数据类型，而\
  \ `char` 是无符号数据类型。如果 `byte` 变量有一个负值，比如 -15，它不能在不损失精度的情况下存储在 `char` 变量中。要使此类赋值成功，你需要使用显式强制转换。以下代码片段说明了从\
  \ `char` 到其他整数数据类型以及反向赋值的可能情况：\n\n```\nbyte b1 = 10;\nshort s1 = 15;\nint num1 =\
  \ 150;\nlong num2 = 20L;\nchar c1 = 'A';\n// byte 和 char\nb1 = c1;        // 错误\n\
  b1 = (byte)c1;  // 正确\nc1 = b1;        // 错误\nc1 = (char)b1;  // 正确\n// short 和\
  \ char\ns1 = c1;         // 错误\ns1 = (short)c1;  // 正确\nc1 = s1;         // 错误\n\
  c1 = (char)s1;   // 正确\n// int 和 char\nnum1 = c1;        // 正确\nnum1 = (int)c1;\
  \   // 正确。但不需要强制转换。使用 num1 = c1\nc1 = num1;        // 错误\nc1 = (char)num1;  // 正确\n\
  c1 = 255;         // 正确。255 在 0-65535 范围内\nc1 = 70000;       // 错误。70000 超出 0-65535\
  \ 范围\nc1 = (char)70000; // 正确。但会丢失原始值\n// long 和 char\nnum2 = c1;        // 正确\n\
  num2 = (long)c1;  // 正确。但不需要强制转换。使用 num2 = c1\nc1 = num2;        // 错误\nc1 = (char)num2;\
  \  // 正确\nc1 = 255L;        // 错误。255L 是一个 long 字面量\nc1 = (char)255L;  // 正确。但请改用\
  \ c1 = 255\n```\n\n#### boolean 数据类型\n\n`boolean` 数据类型只有两个有效值：`true` 和 `false`。这两个值被称为\
  \ `boolean` 字面量。你可以如下使用 `boolean` 字面量：\n\n```\n// 声明一个名为 done 的 boolean 变量\nboolean\
  \ done;\n// 将 true 赋值给 done\ndone = true;\n```\n\n提示\n\n在 Java 中，1 和 0 不被视为 `boolean`\
  \ 值 `true` 和 `false`。如果你有 C/C++ 背景，这是一个变化。Java 只定义了两个 `boolean` 值，称为 `boolean` 字面量，即\
  \ `true` 和 `false`。除了 `true` 和 `false` 之外，你不能将任何其他值赋值给 `boolean` 变量。\n\n需要注意的重要一点是，`boolean`\
  \ 变量不能强制转换为任何其他数据类型，反之亦然。Java 没有指定 `boolean` 数据类型的大小。其大小由 JVM 实现决定。通常，`boolean`\
  \ 数据类型的值由编译器映射到 `int`，而 `boolean` 数组被编码为 `byte` 数组。\n\n\n\n### 浮点数据类型\n\n包含小数部分的数字称为实数，例如\
  \ 3.25、0.49、-9.19、19.0 等。计算机以二进制格式（仅由 0 和 1 组成）存储每个数字，无论是实数还是整数。因此，在存储实数之前，必须将其转换为二进制表示形式。读取其二进制表示形式后，必须将其转换回实数。当实数转换为二进制表示形式时，计算机还必须存储数字中小数点的位置。在计算机内存中存储实数有两种策略。\n\
  \n*   仅存储数字的二进制表示形式，并假设小数点前后始终有固定数量的数字。在数字的十进制表示中，该点称为小数点；在二进制表示中，称为二进制点。这种表示形式中点的位置始终固定的类型称为定点数格式。\n\
  *   存储实数的二进制表示形式以及实数中点的位置。由于在这种实数表示形式中，小数点前后的数字位数可以变化，因此我们说该点可以浮动。这种表示形式称为浮点格式。\n\
  \n与定点表示形式相比，浮点表示形式速度较慢且精度较低。然而，与定点表示形式相比，浮点表示形式可以使用相同的内存容量处理更大范围的数字。\n\nJava 支持浮点数格式。需要注意的是，并非所有实数都有精确的二进制表示形式，因此它们以浮点近似值的形式表示。Java\
  \ 使用 IEEE 754 浮点标准来存储实数。IEEE 是电气与电子工程师协会（Institute of Electrical and Electronic\
  \ Engineers）的缩写。Java 有两种浮点数值数据类型：\n\n*   `float`\n*   `double`\n\n#### float 数据类型\n\
  \n`float` 数据类型使用 32 位以 IEEE 754 标准格式存储浮点数。根据 IEEE 754 标准以 32 位表示的浮点数也称为单精度浮点数。它可以表示小至\
  \ `1.4 x 10` ^(`-45`) 大至 `3.4 x 10` ^(`38`)（约）的实数幅度。该范围仅包含幅度。它可以是正数或负数。这里，`1.4 x\
  \ 10` ^(`-45`) 是可以存储在 `float` 变量中的大于零的最小正数。\n\n所有以 `f` 或 `F` 结尾的实数称为 `float` 字面量。`float`\
  \ 字面量可以用以下两种格式表示：\n\n*   十进制数字格式\n*   科学记数法\n\n以下是一些十进制数字格式的 `float` 字面量示例：\n\n\
  ```\nfloat f1 = 8F;\nfloat f2 = 8.F;\nfloat f3 = 8.0F;\nfloat f4 = 3.51F;\nfloat\
  \ f5 = 0.0F;\nfloat f6 = 16.78f;\n```\n\n实数 `3.25` 也可以使用指数形式书写，例如 `32.5 x 10` ^(`-1`)\
  \ 或 `0.325 x 10` ^(`1`)。在 Java 中，此类实数可以使用科学记数法表示为 `float` 字面量。在科学记数法中，数字 `32.5 x\
  \ 10` ^(`-1`) 写作 `32.5E-1`。作为 `float` 字面量，它可以写作 `32.5E-1F` 或 `32.5E-1f`。以下所有 `float`\
  \ 字面量都表示同一个实数 `32.5`：\n\n*   `3.25F`\n*   `32.5E-1F`\n*   `0.325E+1F`\n*   `0.325E1F`\n\
  *   `0.0325E2F`\n*   `0.0325e2F`\n*   `3.25E0F`\n\n`float` 数据类型定义了两种零：`+0.0F`（或\
  \ `0.0F`）和 `-0.0F`。但是，出于比较目的，`+0.0F` 和 `-0.0F` 被视为相等。\n\n`float` 数据类型定义了两种无穷大：正无穷大和负无穷大。例如，`2.5F`\
  \ 除以 `0.0F` 的结果是 `float` 正无穷大，而 `2.5F` 除以 `-0.0F` 的结果是 `float` 负无穷大。\n\n对 `float`\
  \ 进行某些运算的结果是未定义的。例如，`0.0F` 除以 `0.0F` 是不确定的。不确定的结果由 `float` 数据类型的一个特殊值表示，称为 `NaN`（非数字）。Java\
  \ 有一个 `Float` 类（注意 `Float` 中的大写 `F`），它定义了三个常量，分别表示 `float` 数据类型的正无穷大、负无穷大和 `NaN`。表\
  \ 4-5 列出了这些 `float` 常量及其含义。该表还列出了两个常量，它们表示可以存储在 `float` 变量中的最大和最小（大于零）`float` 值。\n\
  \n表 4-5.\n\nFloat 类中定义的常量\n\n| float 常量 | 含义 |\n| --- | --- |\n| `Float.POSITIVE_INFINITY`\
  \ | `float` 类型的正无穷大。 |\n| `Float.NEGATIVE_INFINITY` | `float` 类型的负无穷大。 |\n| `Float.NaN`\
  \ | `float` 类型的非数字。 |\n| `Float.MAX_VALUE` | 可以在 `float` 变量中表示的最大正值。约等于 3.4 x 10³⁸。\
  \ |\n| `Float.MIN_VALUE` | 可以在 `float` 变量中表示的大于零的最小正值。等于 1.4 x 10^(-45)。 |\n\n所有整数类型（`int`、`long`、`byte`、`short`\
  \ 和 `char`）的值都可以赋值给 `float` 数据类型的变量，而无需使用显式强制转换。以下是一些示例：\n\n```\nint num1 = 15000;\n\
  float salary = num1;            // 正确。int 变量赋值给 float\nsalary = 12455;         \
  \        // 正确。int 字面量赋值给 float\nfloat bigNum = Float.MAX_VALUE; // 分配最大 float 值\n\
  bigNum = 1226L;                 // 正确，long 字面量赋值给 float\nfloat justAChar = 'A';\
  \          // 正确。将 65.0F 赋值给 justAChar\n// 正确。将正无穷大赋值给 fInf 变量\nfloat fInf = Float.POSITIVE_INFINITY;\n\
  // 正确。将非数字赋值给 fNan 变量\nfloat fNan = Float.NaN;\n// 编译时错误。不能将大于 float 最大值（约 3.4E38F）的\
  \ float 字面量赋值给 float 变量\nfloat fTooBig = 3.5E38F;\n// 编译时错误。不能将小于 float 最小值（大于零，1.4E-45F）的\
  \ float 字面量赋值给 float 变量\nfloat fTooSmall = 1.4E-46F;\n```\n\n在将 `float` 值赋值给任何整数数据类型\
  \ `int`、`long`、`byte`、`short` 或 `char` 的变量之前，必须对其进行强制转换。此规则背后的原因是整数数据类型无法存储 `float`\
  \ 值中的小数部分，因此当您将 `float` 值转换为整数时，Java 会警告您精度损失。以下是一些示例：\n\n```\nint num1 = 10;\n\
  float salary = 10.6F;\nnum1 = salary;       // 编译时错误。不能将 float 赋值给 int\nnum1 = (int)salary;\
  \  // 正确。num1 将存储 10\n```\n\n大多数浮点数都是其对应实数的近似值。将 `int` 和 `long` 赋值给 `float` 可能会导致精度损失。考虑以下代码片段：\n\
  \n```\nint num1 = 1029989998; // 在 num1 中存储一个整数\nfloat num2 = num1;     // 将 num1\
  \ 中存储的值赋值给 num2\nint num3 = (int)num2;  // 将 num2 中存储的值赋值给 num3\n```\n\n您期望存储在 `num1`\
  \ 和 `num3` 中的值应该相同。然而，它们并不相同，因为存储在 `num1` 中的值无法以浮点格式精确存储在 `float` 变量 `num2` 中。并非所有浮点数在二进制格式中都有精确的表示形式。这就是\
  \ `num1` 和 `num3` 不相等的原因。有关更多详细信息，请参阅本章后面的“浮点数的二进制表示”一节。以下 JShell 会话向您展示 `num3`\
  \ 比 `num1` 大 18。\n\n```\njshell> int num1 = 1029989998;\nnum1 ==> 1029989998\njshell>\
  \ float num2 = num1;\nnum2 ==> 1.02999002E9\njshell> int num3 = (int)num2;\nnum3\
  \ ==> 1029990016\njshell> num1 - num3\n$4 ==> -18\n```\n\n提示\n\n将 `int` 赋值给 `float`\
  \ 可能会导致精度损失。但是，此类赋值在 Java 中不会导致错误。\n\n\n\n#### double 数据类型\n\n`double` 数据类型使用 64\
  \ 位以 IEEE 754 标准格式存储浮点数。根据 IEEE 754 标准用 64 位表示的浮点数也称为双精度浮点数。它可以表示小至 4.9 x 10^(-324)、大至约\
  \ 1.7 x 10³⁰⁸ 的数（仅指绝对值）。该范围仅包含绝对值，数值可正可负。这里，4.9 x 10^(-324) 是能够存储在 `double` 变量中的、大于零的最小正数。\n\
  \n所有实数都称为 `double` 字面量。`double` 字面量可以选择以 `d` 或 `D` 结尾，例如 19.27d。也就是说，19.27 和 19.27d\
  \ 表示相同的 `double` 字面量。本书使用不带后缀 `d` 或 `D` 的 `double` 字面量。`double` 字面量可以用以下两种格式表示：\n\
  \n*   十进制数字格式\n*   科学记数法\n\n以下是十进制数字格式的 `double` 字面量的一些示例：\n\n```\ndouble d1 = 8D\n\
  double d2 = 8.;\ndouble d3 = 8.0;\ndouble d4 = 8.D;\ndouble d5 = 78.9867;\ndouble\
  \ d6 = 45.0;\n```\n\n提示\n\n`8` 是一个 `int` 字面量，而 `8D`、`8.` 和 `8.0` 是 `double` 字面量。\n\
  \n与 `float` 字面量类似，你也可以使用科学记数法来表示 `double` 字面量，如下所示：\n\n```\ndouble d1 = 32.5E-1;\n\
  double d2 = 0.325E+1;\ndouble d3 = 0.325E1;\ndouble d4 = 0.0325E2;\ndouble d5 =\
  \ 0.0325e2;\ndouble d6 = 32.5E-1D;\ndouble d7 = 0.325E+1d;\ndouble d8 = 0.325E1d;\n\
  double d9 = 0.0325E2d;\n```\n\n与 `float` 数据类型一样，`double` 数据类型也定义了两种零、两种无穷大和一个 `NaN`。它们由\
  \ `Double` 类中的常量表示。表 4-6 列出了这些常量及其含义。表 4-6 还列出了两个常量，它们表示可以在 `double` 变量中表示的最大和最小（大于零）的\
  \ `double` 值。\n\n表 4-6.\n\nDouble 类中的常量\n\n| double 常量 | 含义 |\n| --- | --- |\n|\
  \ `Double.POSITIVE_INFINITY` | `double` 类型的正无穷大。 |\n| `Double.NEGATIVE_INFINITY`\
  \ | `double` 类型的负无穷大。 |\n| `Double.NaN` | `double` 类型的非数字。 |\n| `Double.MAX_VALUE`\
  \ | 可以在 `double` 变量中表示的最大正值。约等于 1.7 x 10³⁰⁸。 |\n| `Double.MIN_VALUE` | 可以在 `double`\
  \ 变量中表示的、大于零的最小正值。等于 4.9 x 10^(-324)。 |\n\n所有整数类型（`int`、`long`、`byte`、`short`、`char`）和\
  \ `float` 的值都可以赋值给 `double` 数据类型的变量，而无需使用强制转换。\n\n```\nint num1 = 15000;\ndouble\
  \ salary = num1;             // 正确。将 int 赋值给 double\nsalary = 12455;           \
  \        // 正确。将 int 字面量赋值给 double\ndouble bigNum = Double.MAX_VALUE; // 将最大的 double\
  \ 值赋给 bigNum\nbigNum = 1226L;                   // 正确。将 long 字面量赋值给 double\ndouble\
  \ justAChar = 'A';           // 正确。将 65.0 赋给 justAChar\n// 将正无穷大赋给 dInf 变量\ndouble\
  \ dInf = Double.POSITIVE_INFINITY;\n// 将非数字赋给 dNan 变量\ndouble dNan = Double.NaN;\n\
  // 编译时错误。不能将大于 double 最大值（约 1.7E308）的 double 字面量赋值给 double 变量\ndouble dTooBig =\
  \ 1.8E308;\n// 编译时错误。不能将小于 double 最小值（大于零）4.9E-324 的 double 字面量赋值给 double 变量\ndouble\
  \ dTooSmall = 4.9E-325;\n```\n\n在将 `double` 值赋值给任何整数数据类型（`int`、`long`、`byte`、`short`\
  \ 或 `char`）的变量之前，必须将其强制转换为整数类型。\n\n```\nint num1 = 10;\ndouble salary = 10.0;\n\
  num1 = salary;      // 编译时错误。不能将 double 赋值给 int\nnum1 = (int)salary; // 现在正确。\n\
  ```\n\n## 数字字面量中的下划线\n\n从 Java 7 开始，你可以在数字字面量的两个数字之间使用任意数量的下划线。例如，`int` 字面量 `1969`\
  \ 可以写成 `1_969`、`19_69`、`196_9`、`1___969` 或任何其他在两个数字之间使用下划线的形式。在八进制、十六进制和二进制格式中也允许使用下划线。大数字如果没有标点符号（例如，用逗号作为千位分隔符）会更难阅读。在大数字中使用下划线使其更易于阅读。以下示例展示了数字字面量中下划线的有效用法：\n\
  \n```\nint x1 = 1_969;  // 十进制格式中的下划线\nint x2 = 1__969; // 多个连续的下划线\nint x3 = 03_661;\
  \ // 八进制字面量中的下划线\nint x4 = 0b0111_1011_0001; // 二进制字面量中的下划线\nint x5 = 0x7_B_1; \
  \         // 十六进制字面量中的下划线\nbyte b1 = 1_2_7;           // 十进制格式中的下划线\ndouble d1 \
  \ = 1_969.09_19;  // double 字面量中的下划线\n```\n\n下划线仅允许出现在数字字面量的数字之间。这意味着你不能在数字字面量的开头或结尾使用下划线。你不能在诸如十六进制格式的\
  \ `0x` 和二进制格式的 `0b` 等前缀，以及诸如 `long` 字面量的 `L` 和 `float` 字面量的 `F` 等后缀中使用下划线。以下示例展示了数字字面量中下划线的无效用法：\n\
  \n```\nint y1 = _1969;      // 错误。开头的下划线\nint y2 = 1969_;      // 错误。结尾的下划线\nint\
  \ y3 = 0x_7B1;     // 错误。前缀 0x 后的下划线\nint y4 = 0_x7B1;     // 错误。前缀 0x 内部的下划线\n\
  long z1 = 1969_L;    // 错误。后缀 L 旁的下划线\ndouble d1 = 1969_.0919; // 错误。小数点前的下划线\n\
  double d1 = 1969._0919; // 错误。小数点后的下划线\n```\n\n提示\n\n你可以将 `int` 字面量 `1969` 以八进制格式写成\
  \ `03661`。在八进制格式的 `int` 字面量中，开头的零被视为一个数字，而不是前缀。允许在八进制格式的 `int` 字面量中，在第一个零之后使用下划线。你可以将\
  \ `03661` 写成 `0_3661`。\n\n\n\n## Java 编译器与 Unicode 转义序列\n\n回顾一下，Java 程序中的任何 Unicode\
  \ 字符都可以用 Unicode 转义序列的形式表示。例如，字符 `'A'` 可以替换为 `'\\u0041'`。Java 编译器首先会将每个出现的 Unicode\
  \ 转义序列转换为一个 Unicode 字符。Unicode 转义序列以 `\\u` 开头，后跟四个十六进制数字。`'\\\\u0041'` 不是一个 Unicode\
  \ 转义序列。要使 `uxxxx` 成为 Unicode 转义序列的有效部分，其前面必须跟有奇数个反斜杠，因为两个连续的反斜杠（`\\\\`）代表一个反斜杠字符。因此，`\"\
  \\\\u0041\"` 表示一个由 `'\\'`、`'u'`、`'0'`、`'0'`、`'4'` 和 `'1'` 组成的 6 字符字符串。然而，`\"\\\\\
  \\u0041\"` 表示一个双字符字符串 `\"\\A\"`。\n\n有时，在 Java 源代码中不当使用 Unicode 转义序列可能会导致编译时错误。考虑以下\
  \ `char` 变量的声明：\n\n```\nchar c = '\\u000A'; // 错误\n```\n\n程序员打算用换行符（其 Unicode 转义序列为\
  \ `\\u000A`）来初始化变量 `c`。当编译这段代码时，编译器会将 `\\u000A` 转换为实际的 Unicode 字符，这段代码将被分割成如下两行：\n\
  \n```\n// 插入实际换行符后\nchar c = '\n';\n```\n\n由于字符字面量不能跨两行，这段代码会产生编译时错误。初始化变量 `c` 的正确方法是使用字符转义序列\
  \ `\\n`，如下所示：\n\n```\nchar c = '\\n'; // 正确\n```\n\n在字符字面量和字符串字面量中，换行符和回车符应始终分别写作\
  \ `\\n` 和 `\\r`，而不是 `\\u000A` 和 `\\u000D`。如果你没有正确使用换行符和回车符，即使是一行注释也可能产生编译时错误。假设你注释掉了\
  \ `char` 变量的错误声明，如下所示：\n\n```\n// char c = '\\u000A';\n```\n\n即使这一行是注释行，它也会产生编译时错误。该注释在编译前会被分割成两行，如下所示：\n\
  \n```\n// char c = '\n';\n```\n\n第二行包含 `';`，导致了错误。在这种情况下，多行注释语法不会产生编译器错误。\n\n```\n\
  /* char c = '\\u000A'; */\n```\n\n会被转换为\n\n```\n/* char c = '\n'; */\n```\n\n这仍然是一个有效的多行注释。\n\
  \n## 短暂休息\n\n我已经讨论完了 Java 中所有的基本数据类型。在下一节中，我将讨论二进制数的一般概念及其在 Java 中表示不同类型值时的用法。如果你有计算机科学背景，可以跳过下一节。\n\
  \n本章中的类是清单 4-1 中声明的 `jdojo.datatype` 模块的成员。清单 4-2 中的程序展示了如何声明不同数据类型的变量以及如何使用不同类型的字面量。它还打印了\
  \ `Double` 类中一些常量的值。Java 8 新增了 `Double.BYTES` 常量，其中包含 `double` 变量占用的字节数。\n\n```\n\
  清单 4-1. 名为 jdojo.datatype 的模块的声明\n// module-info.java\nmodule jodjo.datatype {\n\
  // 目前不需要任何模块语句\n}\n```\n\n```\n清单 4-2. 使用基本数据类型\n// NumberTest.java\npackage com.jdojo.datatype;\n\
  public class NumberTest {\npublic static void main(String[] args) {\nint anInt =\
  \ 100;\nlong aLong = 200L;\nbyte aByte = 65;\nshort aShort = -902;\nchar aChar =\
  \ 'A';\nfloat aFloat = 10.98F;\ndouble aDouble = 899.89;\n// 打印变量的值\nSystem.out.println(\"\
  anInt = \" + anInt);\nSystem.out.println(\"aLong = \" + aLong);\nSystem.out.println(\"\
  aByte = \" + aByte);\nSystem.out.println(\"aShort = \" + aShort);\nSystem.out.println(\"\
  aChar = \" + aChar);\nSystem.out.println(\"aFloat = \" + aFloat);\nSystem.out.println(\"\
  aDouble = \" + aDouble);\n// 打印一些 double 常量\nSystem.out.println(\"Max double = \"\
  \ + Double.MAX_VALUE);\nSystem.out.println(\"Min double = \" + Double.MIN_VALUE);\n\
  System.out.println(\"Double.POSITIVE_INFINITY = \" + Double.POSITIVE_INFINITY);\n\
  System.out.println(\"Double.NEGATIVE_INFINITY = \" + Double.NEGATIVE_INFINITY);\n\
  System.out.println(\"Not-a-Number for double = \" + Double.NaN);\nSystem.out.println(\"\
  Double takes \" + Double.BYTES + \" bytes\");\n}\n}\n```\n\n```\nanInt = 100\naLong\
  \ = 200\naByte = 65\naShort = -902\naChar = A\naFloat = 10.98\naDouble = 899.89\n\
  Max double = 1.7976931348623157E308\nMin double = 4.9E-324\nDouble.POSITIVE_INFINITY\
  \ = Infinity\nDouble.NEGATIVE_INFINITY = -Infinity\nNot-a-Number for double = NaN\n\
  Double takes 8 bytes\n```\n\n\n\n## 整数的二进制表示\n\n计算机使用二进制数字系统来处理数据。二进制系统中的所有数据都使用\
  \ 1 和 0 存储。字符 1 和 0 被称为比特（bit，二进制数字的简称）。它们是计算机能够处理的最小信息单位。一组 8 个比特被称为一个字节（byte）或八位组（octet）。半个字节（即一组\
  \ 4 个比特）被称为一个半字节（nibble）。计算机使用数据总线（一种通路）将数据从计算机系统的一个部分发送到另一个部分。一次能从一部分移动到另一部分的信息量取决于数据总线的位宽。特定计算机上数据总线的位宽也称为字长（word-size），而一个字长所包含的信息简称为一个字（word）。因此，一个字可能指代\
  \ 16 位、32 位或其他位宽，具体取决于计算机的架构。Java 中的 `long` 和 `double` 数据类型占用 64 位。在字长为 32 位的计算机上，这两种数据类型不会被原子性地处理。例如，要向一个\
  \ `long` 变量写入一个值，需要执行两次写入操作——每次写入 32 位的一半。\n\n可以使用以下步骤将十进制数转换为二进制格式：\n\n1.  将十进制数连续除以\
  \ 2。\n2.  每次除法后，记录余数。余数将为 1 或 0。\n3.  继续执行步骤 1 和 2，直到除法的结果为 0。\n4.  通过从下到上书写余数列中的数字来形成二进制数。\n\
  \n例如，十进制数 13 的二进制表示可以按照表 4-7 所示进行计算。\n\n表 4-7. 十进制到二进制转换\n\n| 数字 | 除以 2 | 结果 | 余数\
  \ |\n| --- | --- | --- | --- |\n| 13 | 13/2 | 6 | 1 |\n| 6 | 6/2 | 3 | 0 |\n| 3\
  \ | 3/2 | 1 | 1 |\n| 1 | 1/2 | 0 | 1 |\n\n十进制数 13 的二进制表示为 1101。Java 中的 `byte` 变量占用一个字节。`byte`\
  \ 变量中的值 13 存储为 00001101。请注意，在二进制表示 1101 前面添加了四个零，因为无论其包含的值是多少，`byte` 变量总是占用 8 位。一个字节或一个字中最右边的位称为最低有效位（LSB），最左边的位称为最高有效位（MSB）。13\
  \ 的二进制表示的 MSB 和 LSB 如图 4-7 所示。\n\n![A323069_2_En_4_Fig7_HTML.gif](img/A323069_2_En_4_Fig7_HTML.gif)\n\
  \n图 4-7. 二进制数中的 MSB 和 LSB\n\n二进制数中的每一位都被赋予一个权重，该权重是 2 的幂。可以通过将二进制数中的每一位与其权重相乘然后相加，将二进制数转换为其十进制等效值。例如，二进制数\
  \ 1101 可以按如下方式转换为其十进制等效值：\n\n```\n(1101)2  = 1 x 20 + 0 x 21 + 1 x 22 + 1 x 23\n\
  = 1 + 0 + 4 + 8\n= (13)10\n```\n\nJava 以 2 的补码形式存储负整数。让我们讨论给定数字系统中一个数的补码。每个数字系统都有一个基数（base），也称为基（radix）。例如，10\
  \ 是十进制数字系统的基数，2 是二进制数字系统的基数，8 是八进制数字系统的基数。我们将使用符号 R 表示基数。每个数字系统定义两种类型的补码：\n\n* \
  \  基数减 1 的补码，也称为 (R-1) 的补码。\n*   基数补码，也称为 R 的补码。\n\n因此，对于十进制数字系统，我们有 9 的补码和 10 的补码；对于八进制数字系统，我们有\
  \ 7 的补码和 8 的补码；对于二进制数字系统，我们有 1 的补码和 2 的补码。\n\n### 基数减 1 的补码\n\n设 N 是基数为 R 的数字系统中的一个数，n\
  \ 是 N 的总位数。数 N 的基数减 1 的补码或 (R-1) 的补码定义为：\n\n```\n(Rn-1) - N\n```\n\n在十进制数字系统中，数\
  \ N 的 9 的补码为：\n\n```\n(10n -1) - N\n```\n\n由于 10^n 由 1 后跟 n 个零组成，因此 (10^n -1) 由\
  \ n 个 9 组成。因此，一个数的 9 的补码可以通过简单地从 9 中减去该数中的每一位数字来计算。例如，5678 的 9 的补码是 4321，894542\
  \ 的 9 的补码是 105457。\n\n在二进制数字系统中，二进制数的 1 的补码为：\n\n```\n(2n-1) - N\n```\n\n由于二进制数字系统中的\
  \ 2^n 由 1 后跟 n 个零组成，因此 (2^n -1) 由 n 个 1 组成。例如，10110（此处 n 为 5）的 1 的补码可以计算为 (2⁵ -1)\
  \ - 10110，即 11111 - 10110（2⁵ -1）是 31，即二进制中的 11111。\n\n二进制数的 1 的补码可以通过简单地从 1 中减去该数中的每一位数字来计算。二进制数由\
  \ 0 和 1 组成。当从 1 中减去 1 时，得到 0；当从 1 中减去 0 时，得到 1。因此，二进制数的 1 的补码只需通过反转该数的位即可计算，即将 1\
  \ 改为 0，将 0 改为 1。例如，10110 的 1 的补码是 01001，0110001 的 1 的补码是 1001110。\n\n在一个数字系统中，一个数的\
  \ (R-1) 的补码是通过从该数字系统的最大数字值中减去该数的每一位数字来计算的。例如，八进制数字系统中的最大数字值是 7，因此，八进制数的 7 的补码是通过从\
  \ 7 中减去该数的每一位数字来计算的。对于十六进制数字系统，最大数字值是 15，用 F 表示。例如，八进制数 56072 的 7 的补码是 21705，十六进制数\
  \ 6A910F 的 15 的补码是 956EF0。\n\n### 基数补码\n\n设 N 是基数为 R 的数字系统中的一个数，n 是数 N 的总位数。数 N\
  \ 的基数补码或 R 的补码定义如下：\n\n```\nRn - N\n```\n\n对于 N = 0，R 的补码定义为零。从 R 的补码和 (R-1) 的补码的定义可以明显看出，一个数的\
  \ R 的补码是通过将该数的 (R-1) 的补码加 1 来计算的。因此，十进制数的 10 的补码是通过将其 9 的补码加 1 得到的，二进制数的 2 的补码是通过将其\
  \ 1 的补码加 1 得到的。例如，10110 的 2 的补码是 01001 + 1，即 01010。通过仔细观察计算二进制数 2 的补码的过程，你可以发现只需查看二进制数即可计算出来。计算二进制数\
  \ 2 的补码的简单过程可以描述如下：\n\n1.  从二进制数的右端开始。\n2.  原样写出直到第一个 1 位的所有数字。\n3.  随后反转位以得到二进制数的\
  \ 2 的补码。\n\n例如，让我们计算 10011000 的 2 的补码。从右端开始，原样写出直到第一个 1 位的所有数字。由于从右边数起的第四位是 1，你将原样写出前四位数字，即\
  \ 1000。现在，从右边数起的第五位开始反转位，这将得到 01101000。此过程如图 4-8 所示。\n\n![A323069_2_En_4_Fig8_HTML.gif](img/A323069_2_En_4_Fig8_HTML.gif)\n\
  \n图 4-8. 计算二进制数的 2 的补码\n\n所有负整数（`byte`、`short`、`int` 和 `long`）在内存中都以它们的 2 的补码形式存储。让我们考虑\
  \ Java 中的两个 `byte` 变量。\n\n```\nbyte bPos = 13;\nbyte bNeg = -13;\n```\n\n`bPos`\
  \ 在内存中存储为 00001101。00001101 的 2 的补码计算为 11110011。因此，`bNeg`（即 -13）存储为 11110011，如图\
  \ 4-9 所示。\n\n![A323069_2_En_4_Fig9_HTML.gif](img/A323069_2_En_4_Fig9_HTML.gif)\n\
  \n图 4-9. 以 2 的补码形式存储数字 13\n\n\n\n## 浮点数的二进制表示\n\n二进制浮点数系统只能精确表示有限数量的浮点数值。所有其他数值都必须由最接近的可表示值来近似。IEEE\
  \ 754-1985 是计算机行业最广泛接受的浮点数标准，它规定了表示二进制浮点数的格式和方法。该 IEEE 标准专为工程计算设计，其目标是最大化精度（尽可能接近实际数值）。精度指的是你能表示的数字位数。IEEE\
  \ 标准试图在分配给指数的位数和用于数字小数部分的位数之间取得平衡，以使精度和准确度都保持在可接受的范围内。本节将概述 IEEE 754-1985 二进制浮点数格式标准，并指出\
  \ Java 如何支持该标准。一个浮点数包含四个部分：\n\n*   符号（Sign）\n*   有效数（Significand，也称为尾数 Mantissa）\n\
  *   基数（Base，也称为底数 Radix）\n*   指数（Exponent）\n\n浮点数 19.25 可以用其所有四个部分表示为：\n\n```\n\
  +19.25 x 100\n```\n\n这里，符号是 +（正数），有效数是 19.25，基数是 10，指数是 0。\n\n数字 19.25 也可以用许多其他形式表示，如下所示。我将\
  \ +19.25 写为 19.25，从而省略了数字的正号。\n\n*   `19.25 x 10` ^(`0`)\n*   `1.925 x 10` ^(`1`)\n\
  *   `0.1925 x 10` ^(`2`)\n*   `192.5 x 10` ^(`-1`)\n*   `1925 x 10` ^(`-2`)\n\n\
  一个浮点数可以有无限多种表示方式。如果一个以 10 为基数的浮点数的有效数满足以下规则，则称其为规格化形式：\n\n```\n0.1 <= 有效数 < 1\n\
  ```\n\n根据此规则，表示形式 `0.1925 x 10²` 是 19.25 的规格化形式。浮点数 19.25（基数为 10）可以写成二进制形式（基数为 2）的\
  \ `10011.01`。浮点数 19.25 可以重写为许多不同的二进制形式。十进制数 19.25 的一些其他二进制表示形式如下：\n\n*   `10011.01\
  \ x 2` ^(`0`)\n*   `1001.101 x 2` ^(`1`)\n*   `100.1101 x 2` ^(`2`)\n*   `1.001101\
  \ x 2` ^(`4`)\n*   `100110.1 x 2` ^(`-1`)\n*   `1001101 x 2` ^(`-2`)\n\n注意，在二进制形式中，基数是\
  \ 2。当二进制小数点向左移动一位时，指数增加一。当二进制小数点向右移动一位时，指数减少一。如果一个二进制形式的浮点数的有效数满足以下条件，则它是规格化的：\n\
  \n```\n1 <= 有效数 < 2\n```\n\n如果一个二进制浮点数的有效数形式为 `1.bbbbbbb...`，其中 `b` 是一个比特位（0 或 1），则该二进制浮点数被称为规格化形式。因此，`1.001101\
  \ x 2⁴` 是二进制浮点数 `10011.01` 的规格化形式。换句话说，一个规格化的二进制浮点数以比特位 1 开头，紧接着是一个二进制小数点。\n\n那些未规格化的浮点数被称为非规格化浮点数。非规格化浮点数也被称为非正规数或次正规数。并非所有浮点数都能以规格化形式表示。这可能有以下两个原因。\n\
  \n*   该数字不包含任何为 1 的比特位。例如 0.0。由于 0.0 没有任何比特位被设置为 1，因此它不能以规格化形式表示。\n*   计算机使用固定数量的比特位来存储二进制浮点数的符号、有效数和指数。如果一个二进制浮点数的指数是计算机存储格式允许的最小指数，并且有效数小于\
  \ 1，那么这样的二进制浮点数无法被规格化。例如，假设 `-126` 是给定存储格式中可以为二进制浮点数存储的最小指数值。如果二进制浮点数是 `0.01101\
  \ x 2` ^(`-126`) ，则此数字无法规格化。此数字的规格化形式将是 `1.101 x 2` ^(`-128`) 。然而，给定的存储格式允许的最小指数是\
  \ `-126`（本例中我假设数字为 -126）。因此，指数 `-128`（`-128 < -126`）无法存储在给定的存储格式中，这就是为什么 `0.01101\
  \ x 2` ^(`-126`) 无法以规格化形式存储的原因。\n\n为什么我们需要在将二进制浮点数存入内存之前对其进行规格化？这样做有以下优点：\n\n* \
  \  规格化表示是唯一的。\n*   由于二进制浮点数中的二进制小数点可以放置在数字的任何位置，因此必须将二进制小数点的位置与数字一起存储。通过规格化数字，你总是将二进制小数点放在第一个\
  \ 1 比特位之后，因此，你无需存储二进制小数点的位置。这节省了存储一条额外信息所需的内存和时间。\n*   两个规格化的二进制浮点数可以通过比较它们的符号、有效数和指数来轻松比较。\n\
  *   在规格化形式中，有效数可以使用其所有存储位来存储有效数字（比特位）。例如，如果你只分配五位来存储有效数，对于数字 `0.0010110 x 2¹⁰`，有效数中只有\
  \ `0.00101` 部分会被存储。然而，如果你将此数字规格化为 `1.0110 x 2⁷`，则有效数可以完整地存储在五位中。\n*   在规格化形式中，有效数总是以\
  \ 1 比特位开头，在存储有效数时可以省略该比特位。在读取时，你可以添加前导的 1 比特位。这个被省略的比特位被称为“隐藏位”，它提供了一个额外的精度位。\n\n\
  IEEE 754-1985 标准定义了以下四种浮点数格式：\n\n*   32 位单精度浮点数格式\n*   64 位双精度浮点数格式\n*   单精度扩展浮点数格式\n\
  *   双精度扩展浮点数格式\n\nJava 使用 IEEE 32 位单精度浮点数格式来存储 `float` 数据类型的值。它使用 64 位双精度浮点数格式来存储\
  \ `double` 数据类型的值。\n\n我将仅讨论 IEEE 32 位单精度浮点数格式。单精度浮点数格式与其他格式之间的区别在于用于存储二进制浮点数的总位数，以及符号、指数和有效数之间的位数分配。不同\
  \ IEEE 格式之间的差异将在讨论结束时展示。\n\n### 32 位单精度浮点数格式\n\n32 位单精度浮点数格式使用 32 位来存储一个二进制浮点数。一个二进制浮点数具有以下形式：\n\
  \n```\n符号 * 有效数 * 2 指数\n```\n\n由于基数始终是 2，因此该格式不存储基数的值。这 32 位的分配如下：\n\n*   1 位用于存储符号\n\
  *   8 位用于存储指数\n*   23 位用于存储有效数\n\n单精度浮点数格式的布局如表 4-8 所示。\n\n表 4-8.\n\nIEEE 单精度格式布局\n\
  \n| 1 位符号 | 8 位指数 | 23 位有效数 |\n| --- | --- | --- |\n| `s` | `eeeeeeee` | `fffffffffffffffffffffff`\
  \ |\n\n#### 符号\n\nIEEE 单精度浮点数格式使用 1 位来存储数字的符号。符号位为 0 表示正数，符号位为 1 表示负数。\n\n\n\n####\
  \ 指数\n\n指数占用 8 位。指数可以是正数或负数。8 位能存储的指数值范围是-127 到 128。必须有一种机制来表示指数的符号。请注意，表 4-8 所示布局中的\
  \ 1 位符号字段存储的是浮点数的符号，而非指数的符号。要存储指数的符号，可以使用符号-数值法，即用 1 位存储符号，其余 7 位存储指数的大小。也可以使用补码法来存储负指数，就像存储整数那样。然而，IEEE\
  \ 并未采用这两种方法来存储指数。IEEE 使用指数的偏置表示法来存储指数值。\n\n什么是偏置值和偏置指数？偏置值是一个常量，对于 IEEE 32 位单精度格式，该值为\
  \ 127。在将指数存入内存之前，会将偏置值加到指数上。这个加上偏置后的新指数称为偏置指数。偏置指数的计算方式如下：\n\n```\n偏置指数 = 指数 + 偏置值\n\
  ```\n\n例如，19.25 可以写成归一化的二进制浮点格式：1.001101 x 2⁴。这里，指数值为 4。然而，存储在内存中的指数值将是偏置指数，其计算方式如下：\n\
  \n```\n偏置指数 = 指数 + 偏置值\n= 4 + 127 (单精度格式)\n= 131\n```\n\n对于 1.001101 x 2⁴，131 将作为指数存储。当读取二进制浮点数的指数时，必须减去该格式的偏置值才能得到实际的指数值。\n\
  \n为什么 IEEE 要使用偏置指数？使用偏置指数的优点是，正浮点数可以像整数一样进行比较。\n\n假设 E 是给定浮点格式中用于存储指数值的位数。该格式的偏置值可以按如下方式计算：\n\
  \n```\n偏置值 = 2^(E - 1) - 1\n```\n\n对于单精度格式，指数范围是-127 到 128。因此，偏置指数的范围是 0 到 255。两个极端的指数值（无偏置时为-127\
  \ 和 128，有偏置时为 0 和 255）用于表示特殊的浮点数，例如零、无穷大、`NaN`（非数值）和非规格化数。指数范围-126 到 127（偏置后为 1\
  \ 到 254）用于表示归一化的二进制浮点数。\n\n#### 尾数\n\nIEEE 单精度浮点格式使用 23 位来存储尾数。用于存储尾数的位数称为该浮点格式的精度。因此，你可能已经猜到，以单精度格式存储的浮点数的精度是\
  \ 23。然而，事实并非如此。但在得出该格式精度的结论之前，我需要先讨论尾数的存储格式。\n\n浮点数的尾数在存入内存之前会被归一化。归一化后的尾数总是形如`1.fffffffffffffffffffffff`。这里，`f`表示尾数小数部分的位，可以是\
  \ 0 或 1。由于前导的 1 位在尾数的归一化形式中始终存在，因此无需存储该前导 1 位。所以，在存储归一化尾数时，你可以使用全部 23 位来存储尾数的小数部分。实际上，不存储归一化尾数的前导\
  \ 1 位可以为你带来额外一位的精度。这样，你就能仅用 23 位来表示 24 位数字（1 位前导位 + 23 位小数位）。因此，对于归一化尾数，IEEE 单精度格式中浮点数的精度是\
  \ 24。\n\n```\n实际尾数: 1.fffffffffffffffffffffff (24 位)\n存储尾数:   fffffffffffffffffffffff\
  \ (23 位)\n```\n\n如果你总是以归一化形式表示二进制浮点数的尾数，那么在数轴上零的附近会存在一个间隙。IEEE 单精度格式能表示的最小绝对值数可以按如下方式计算：\n\
  \n*   **符号**：可以是 0 或 1，表示正数或负数。在本例中，假设符号位为 0 表示正数。\n*   **指数**：最小指数值为-126。回想一下，指数值-127\
  \ 和 128 被保留用于表示特殊浮点数。最小偏置指数将是-126 + 127 = 1。偏置指数 1 的 8 位二进制表示为 00000001。\n*   **尾数**：归一化形式中尾数的最小值将由前导\
  \ 1 位和全部 23 位小数位设为 0 组成，即 1.00000000000000000000000。\n\n如果将具有最小可能指数值和尾数值的归一化浮点数的二进制表示组合起来，计算机中实际存储的数字将如表\
  \ 4-9 所示。\n\n表 4-9. 最小可能的归一化数\n\n| 符号 | 指数 | 尾数 |\n| --- | --- | --- |\n| `0` |\
  \ `00000001` | `00000000000000000000000` |\n| `1 位` | `8 位` | `23 位` |\n\n该最小浮点数的十进制值为\
  \ 1.0 x 2^(-126)。因此，1.0 x 2^(-126) 是零之后第一个可表示的归一化数，在数轴上零的附近留下了一个间隙。\n\n如果仅使用 IEEE\
  \ 单精度格式存储归一化浮点数，那么所有绝对值小于 1.0 x 2^(-126)的数都必须舍入为零。这在处理程序中的微小数值时会导致严重问题。为了存储小于 1.0\
  \ x 2^(-126)的数，这些数必须是非规格化的。\n\n## 特殊浮点数\n\n本节描述特殊浮点数及其在 IEEE 单精度格式中的表示。\n\n### 有符号零\n\
  \nIEEE 浮点格式允许两个零：+0.0（或 0.0）和-0.0。对于单精度格式，零由最小指数值-127 表示。零的尾数为 0.0。由于符号位可以是 0 或\
  \ 1，因此存在两个零：+0.0 和-0.0。单精度格式中零的二进制表示如表 4-10 所示。\n\n表 4-10. 单精度格式中正零和负零的二进制表示\n\n\
  | 数值 | 符号 | 指数 | 尾数 |\n| --- | --- | --- | --- |\n| `0.0` | `0` | `00000000` | `00000000000000000000000`\
  \ |\n| `-0.0` | `1` | `00000000` | `00000000000000000000000` |\n\n出于比较目的，+0.0 和-0.0\
  \ 被视为相等。因此，表达式`0.0 == -0.0`始终返回`true`。\n\n既然它们被视为相等，为什么 IEEE 还要定义两个零？零的符号用于确定涉及乘法和除法的算术表达式的结果。3.0\
  \ * 0.0 的结果是正零（0.0），而 3.0 * (-0.0)的结果是负零（-0.0）。对于一个值为±无穷大的浮点数`num`，关系式`1/(1/num)\
  \ = num`成立，这完全归功于两个有符号零的存在。\n\n\n\n### 有符号无穷大\n\nIEEE 浮点格式允许两种无穷大：正无穷大和负无穷大。符号位表示无穷大的符号。对于单精度格式，最大指数值为\
  \ 128（偏置指数为 255），且尾数为零时表示无穷大。最大偏置值 255 可以用 8 位二进制表示为所有位均为 1 的 `11111111`。单精度格式下无穷大的二进制表示如表\
  \ 4-11 所示。\n\n表 4-11.\n\n单精度格式下正无穷大和负无穷大的二进制表示\n\n| 数值 | 符号 | 指数 | 尾数 |\n| --- |\
  \ --- | --- | --- |\n| `+Infinity` | `0` | `11111111` | `00000000000000000000000`\
  \ |\n| `-Infinity` | `1` | `11111111` | `00000000000000000000000` |\n\n### NaN\n\
  \n`NaN` 代表“非数字”。`NaN` 是那些没有有意义结果的算术运算的结果，例如零除以零、负数的平方根、将 `-Infinity` 加到 `+Infinity`\
  \ 等。\n\n`NaN` 由最大指数值（单精度格式为 128）和一个非零的尾数表示。`NaN` 的符号位不被解释。当 `NaN` 作为算术表达式中的一个操作数时会发生什么？例如，`NaN\
  \ + 100` 的结果是什么？涉及 `NaN` 的算术表达式的执行应该停止还是继续？有两种类型的 `NaN`：\n\n*   静默 `NaN`\n*   信号\
  \ `NaN`\n\n当一个静默 `NaN` 作为算术表达式中的操作数时，它会静默地（即不引发任何陷阱或异常）产生另一个静默 `NaN` 作为结果。对于静默 `NaN`，表达式\
  \ `NaN + 100` 将产生另一个静默 `NaN`。静默 `NaN` 的尾数最高位被设置为 1。表 4-12 显示了一个静默 `NaN` 的二进制表示。在表中，`s`\
  \ 和 `b` 表示 0 或 1 位。\n\n表 4-12.\n\n一个静默 NaN 的二进制表示\n\n| 数值 | 符号 | 指数 | 尾数 |\n| ---\
  \ | --- | --- | --- |\n| `Quiet NaN` | `s` | `11111111` | `1bbbbbbbbbbbbbbbbbbbbbb`\
  \ |\n\n当一个信号 `NaN` 作为算术表达式中的操作数时，会发出无效操作异常信号，并产生一个静默 `NaN` 作为结果。信号 `NaN` 通常用于初始化程序中的未初始化变量，这样当变量在使用前未被初始化时，就可以发出错误信号。信号\
  \ `NaN` 的尾数最高位被设置为 0。表 4-13 显示了一个信号 `NaN` 的二进制表示。在表中，`s` 和 `b` 表示 0 或 1 位。\n\n表\
  \ 4-13.\n\n一个信号 NaN 的二进制表示\n\n| 数值 | 符号 | 指数 | 尾数 |\n| --- | --- | --- | --- |\n\
  | `Signaling NaN` | `s` | `11111111` | `0bbbbbbbbbbbbbbbbbbbbbb` |\n\n提示\n\nIEEE\
  \ 为单精度格式定义了 2²⁴ - 2 个不同的 `NaN`，为双精度格式定义了 2⁵³ - 2 个不同的 `NaN`。然而，Java 的 `float` 数据类型只有一个\
  \ `NaN`，`double` 数据类型也只有一个 `NaN`。Java 始终使用静默 `NaN`。\n\n### 非规格化数\n\n当偏置指数为 0 且尾数非零时，表示一个非规格化数。表\
  \ 4-14 显示了单精度格式下表示非规格化数的位模式。\n\n表 4-14.\n\n非规格化单精度浮点数的位模式\n\n| 符号 | 指数 | 尾数 |\n\
  | --- | --- | --- |\n| `s` | `000000000` | `fffffffffffffffffffffff` |\n\n在表 4-14\
  \ 中，`s` 表示符号位，正数为 0，负数为 1。指数位全为零。尾数中至少有一位被设置为 1。非规格化数的十进制值按如下方式计算：\n\n```\n(-1)s\
  \ * 0.fffffffffffffffffffffff * 2-126\n```\n\n假设你想以单精度格式存储数字 0.25 x 2 ^(`-128`)。如果你在将\
  \ 0.25 转换为二进制后以规格化形式写出这个数字，它将是 1.0 x 2 ^(`-130`)。然而，单精度格式允许的最小指数是 -126。因此，这个数字不能以规格化形式存储在单精度格式中。指数保持为\
  \ -126，二进制小数点向左移动，得到非规格化形式 0.0001 x 2 ^(`-126`)。该数字的存储方式如表 4-15 所示。\n\n表 4-15.\n\
  \n非规格化数 1.0 * 2^(-130) 的位模式\n\n| 数值 | 符号 | 指数 | 尾数 |\n| --- | --- | --- | --- |\n\
  | `0.0001 x 2` ^(`-126`) | `0` | `00000000` | `00010000000000000000000` |\n\n对于数字\
  \ 0.0001 x 2^(-126)，似乎偏置指数应计算为 -126 + 127 = 1，指数位应为 00000001。然而，事实并非如此。对于非规格化数，指数存储为全\
  \ 0 位；当读回时，它被解释为 -126。这是因为在读回浮点数时需要区分规格化数和非规格化数，并且对于所有非规格化数，其尾数中没有前导的 1 位。非规格化数填补了数轴上零附近的间隙，如果只存储规格化数，这个间隙就会存在。\n\
  \n## 舍入模式\n\n并非所有实数都能用有限位数的二进制浮点格式精确表示。因此，无法在二进制浮点格式中精确表示的实数必须进行舍入。有四种舍入模式：\n\n\
  *   向零舍入\n*   向正无穷大舍入\n*   向负无穷大舍入\n*   向最近值舍入\n\n### 向零舍入\n\n这种舍入模式也称为截断模式。在这种舍入模式下，从原始数字中保留的总位数（或数字位数）与给定格式中可用于存储浮点数的位数相同。其余位被忽略。这种舍入模式被称为“向零舍入”，因为它会使舍入后的结果更接近零。向零舍入的一些示例如表\
  \ 4-16 所示。\n\n表 4-16.\n\n向零舍入示例\n\n| 原始数字 | 可用二进制位数 | 舍入后数字 |\n| --- | --- | ---\
  \ |\n| `1.1101` | `2` | `1.11` |\n| `-0.1011` | `2` | `-0.10` |\n| `0.1010` | `2`\
  \ | `0.10` |\n| `0.0011` | `2` | `0.00` |\n\n### 向正无穷大舍入\n\n在这种舍入模式下，数字被舍入到更接近正无穷大的值。向正无穷大舍入的一些示例如表\
  \ 4-17 所示。\n\n表 4-17.\n\n向正无穷大舍入示例\n\n| 原始数字 | 可用二进制位数 | 舍入后数字 |\n| --- | --- |\
  \ --- |\n| `1.1101` | `2` | `10.00` |\n| `-0.1011` | `2` | `-0.10` |\n| `0.1010`\
  \ | `2` | `0.11` |\n| `0.0011` | `2` | `0.01` |\n\n### 向负无穷大舍入\n\n在这种舍入模式下，数字被舍入到更接近负无穷大的值。向负无穷大舍入的一些示例如表\
  \ 4-18 所示。\n\n表 4-18.\n\n向负无穷大舍入示例\n\n| 原始数字 | 可用二进制位数 | 舍入后数字 |\n| --- | --- |\
  \ --- |\n| `1.1101` | `2` | `1.11` |\n| `-0.1011` | `2` | `-0.11` |\n| `0.1010`\
  \ | `2` | `0.10` |\n| `0.0011` | `2` | `0.00` |\n\n\n\n### 向最近值舍入\n\n在此舍入模式下，舍入结果是最近的可表示浮点数。如果出现平局，即存在两个与原始数值等距的可表示浮点数，则选择最低有效位为零的那个结果。换句话说，在平局情况下，舍入结果为偶数。实现\
  \ IEEE 浮点标准的系统默认采用此模式。IEEE 标准规定系统还应允许用户选择其他三种舍入模式之一。Java 将这种模式作为浮点数的默认舍入模式，但不允许用户（即程序员）选择任何其他舍入模式。表\
  \ 4-19 展示了一些向最近值舍入的示例。\n\n表 4-19. 向最近值舍入示例\n\n| 原始数值 | 可用二进制小数位数 | 舍入后数值 |\n| ---\
  \ | --- | --- |\n| `1.1101` | `2` | `1.11` |\n| `-0.1011` | `2` | `-0.11` |\n| `0.1010`\
  \ | `2` | `0.10` |\n| `0.0011` | `2` | `0.01` |\n\n## IEEE 浮点异常\n\nIEEE 浮点标准定义了若干种在浮点运算结果不可接受时发生的异常。异常可以被忽略，此时会采取某些默认操作，例如返回一个特殊值。当为某个异常启用陷阱时，一旦该异常发生，就会发出错误信号。浮点运算可能导致以下五种类型的浮点异常：\n\
  \n*   除零异常\n*   无效操作异常\n*   上溢异常\n*   下溢异常\n*   不精确异常\n\n### 除零异常\n\n当一个非零数除以一个浮点零时，会发生除零异常。如果未安装陷阱处理程序，则结果将返回带有相应符号的无穷大。\n\
  \n### 无效操作异常\n\n当操作数对于正在执行的操作无效时，会发生无效操作异常。如果未安装陷阱处理程序，则结果将返回一个静默`NaN`。以下是一些会引发无效异常的操作：\n\
  \n*   负数的平方根\n*   零除以零或无穷大除以无穷大\n*   零与无穷大相乘\n*   对信令`NaN`的任何操作\n*   无穷大减去无穷大\n\
  *   当使用`>`或`<`关系运算符比较静默`NaN`时\n\n### 上溢异常\n\n当浮点运算结果的量级过大，无法适配到目标格式时，会发生上溢异常。例如，将`Float.MAX_VALUE`乘以\
  \ 2 并尝试将结果存储到`float`变量中时就会发生此异常。如果未安装陷阱处理程序，则返回的结果取决于舍入模式和中间结果的符号。\n\n*   如果舍入模式是向零舍入，则上溢结果为该格式可表示的最大有限数。结果的符号与中间结果的符号相同。\n\
  *   如果舍入模式是向正无穷舍入，则负上溢结果为该格式最负的有限数，正上溢结果为该格式最正的有限数。\n*   如果舍入模式是向负无穷舍入，则负上溢结果为负无穷，正上溢结果为该格式最正的有限数。\n\
  *   如果舍入模式是向最近值舍入，则上溢结果为无穷大。结果的符号与中间结果的符号相同。\n\n然而，如果安装了陷阱处理程序，则在发生上溢时传递给陷阱处理程序的结果按如下方式确定：将无限精确的结果除以\
  \ 2^t，并在传递给陷阱处理程序之前进行舍入。对于单精度格式，t 的值为 192；对于双精度格式，t 的值为 1536；对于扩展格式，t 的值为 3 x 2^(n-1)，其中\
  \ n 是用于表示指数的位数。\n\n### 下溢异常\n\n当运算结果小到无法以其格式表示为规格化`float`时，会发生下溢异常。如果启用了陷阱，则会发出浮点下溢异常信号。否则，运算结果将是一个非规格化`float`或零。下溢可以是突变的或渐变的。如果运算结果小于该格式可表示的规格化最小值，则结果可能返回为零或一个非规格化数。在突变下溢的情况下，结果为零。在渐变下溢的情况下，结果是一个非规格化数。IEEE\
  \ 默认采用渐变下溢（非规格化数）。Java 支持渐变下溢。\n\n### 不精确异常\n\n如果运算的舍入结果与无限精确结果不完全相同，则会发出不精确异常信号。不精确异常相当常见。1.0/3.0\
  \ 就是一个不精确运算。当运算发生上溢但未触发上溢陷阱时，也会发生不精确异常。\n\n## Java 与 IEEE 浮点标准\n\nJava 遵循 IEEE-754\
  \ 标准的一个子集。以下是 IEEE 浮点标准与其 Java 实现之间的一些差异：\n\n*   Java 不会发出 IEEE 异常信号。\n*   Java\
  \ 没有信令`NaN`。\n*   Java 使用向最近值舍入模式来舍入不精确结果。但是，在将浮点值转换为整数时，Java 采用向零舍入。Java 不为浮点计算提供用户可选的舍入模式：向上、向下或向零。\n\
  *   IEEE 为单精度格式定义了(2²⁴ - 2)个`NaN`，为双精度格式定义了(2⁵³ - 2)个`NaN`。然而，Java 为这两种格式各自只定义了一个`NaN`。\n\
  \n表 4-20 列出了不同 IEEE 格式的参数。\n\n表 4-20. IEEE 格式参数\n\n|  | 位宽 | 指数位宽 | 精度 | 最大指数 |\
  \ 最小指数 | 指数偏移量 |\n| --- | --- | --- | --- | --- | --- | --- |\n| 单精度 | `32` | `8`\
  \ | `24` | `127` | `-126` | `127` |\n| 双精度 | `64` | `11` | `53` | `1023` | `-1022`\
  \ | `1023` |\n| 单精度扩展 | `>= 43` | `>= 11` | `>= 32` | `>= 1023` | `<= -1022` | `未指定`\
  \ |\n| 双精度扩展 | `>= 79` | `>= 15` | `>= 64` | `>= 16383` | `<= -16382` | `未指定` |\n\
  \n\n\n## 小端序与大端序\n\n这两个术语与 CPU 架构中一个字内部字节的排列方向有关。计算机内存通过正整数地址进行引用。在计算机内存中，将数字的最低有效字节存储在最高有效字节之前是一种“自然”的存储方式。有时，计算机设计者更倾向于使用这种表示方式的逆序版本。这种在内存中低有效字节位于高有效字节之前的“自然”顺序被称为**小端序**。许多供应商，如\
  \ IBM、CRAY 和 Sun，则更倾向于相反的顺序，这自然被称为**大端序**。例如，32 位的十六进制值 0x45679812 在内存中的存储方式如下：\n\
  \n```\n地址         00  01  02  03\n\n小端序       12  98  67  45\n大端序       45  67 \
  \ 98  12\n```\n\n在两台机器之间传输数据时，字节序的差异可能会成为一个问题。表 4-21 列出了一些供应商、它们的 `float` 类型以及其机器上的字节序。\n\
  \n表 4-21.\n\n供应商、浮点类型与字节序\n\n| 供应商 | 浮点类型 | 字节序 |\n| --- | --- | --- |\n| ALPHA\
  \ | DEC/IEEE | 小端序 |\n| IBM | IBM | 大端序 |\n| MAC | IEEE | 大端序 |\n| SUN | IEEE |\
  \ 大端序 |\n| VAX | DEC | 小端序 |\n| PC | IEEE | 小端序 |\n\nJava 二进制格式文件中的所有内容都以大端序存储。这有时也被称为网络顺序。这意味着，如果你只使用\
  \ Java，那么所有文件在所有平台（Mac、PC、UNIX 等）上的处理方式都是相同的。你可以自由地以电子方式交换二进制数据，而无需担心字节序问题。当你必须与某些非\
  \ Java 编写的、使用小端序的程序（最常见的是用 C 语言编写的程序）交换数据文件时，问题就出现了。一些平台内部使用大端序（Mac、IBM 390）；一些平台使用小端序（Intel）。Java\
  \ 向你隐藏了其内部的字节序。\n\n## 总结\n\n程序中所有需要被引用的内容（如值和实体）都会被赋予一个名称。Java 中的名称被称为**标识符**。Java\
  \ 中的标识符是一个长度不限的字符序列。该字符序列包括所有 Java 字母和 Java 数字，其中第一个字符必须是 Java 字母。Java 使用 Unicode\
  \ 字符集。Java 字母是指由 Unicode 字符集表示的任何语言中的字母。例如，A-Z、a-z、_（下划线）和 $ 都被视为来自 Unicode 的 ASCII\
  \ 字符集范围内的 Java 字母。Java 数字包括 0-9 的 ASCII 数字以及任何表示某种语言中数字的 Unicode 字符。标识符中不允许出现空格。\n\
  \n**关键字**是在 Java 编程语言中具有预定义含义的单词。Java 编程语言定义了几个关键字。从 Java SE 9 开始，下划线（`_`）成为一个关键字。Java\
  \ 中关键字的一些示例包括 `class`、`if`、`do`、`while`、`int`、`long` 和 `for`。关键字不能用作标识符。**保留关键字**是那些为将来使用而保留的关键字，例如\
  \ `goto` 和 `const`。**受限关键字**是指在特定位置使用时具有特殊含义，而在其他位置不被视为关键字的关键字。受限关键字的示例包括 `module`、`exports`、`open`、`opens`、`requires`\
  \ 等。\n\nJava 中的每个值都有一个**数据类型**。Java 支持两种数据类型：**基本数据类型**和**引用数据类型**。基本数据类型表示原子性的、不可分割的值。Java\
  \ 有八种基本数据类型：`byte`、`short`、`int`、`long`、`float`、`double`、`char` 和 `boolean`。基本数据类型的字面量是可以在源代码中直接表示的常量。引用数据类型表示内存中对象的引用。Java\
  \ 是一种**静态类型**编程语言。也就是说，它在编译时检查所有值的数据类型。\n\n`byte` 数据类型是一种 8 位有符号的 Java 基本整数数据类型。其范围是\
  \ -128 到 127（-2⁷ 到 2⁷ - 1）。这是 Java 中可用的最小整数数据类型。\n\n`short` 数据类型是一种 16 位有符号的 Java\
  \ 基本整数数据类型。其范围是 -32768 到 32767（或 -2¹⁵ 到 2¹⁵ - 1）。\n\n`int` 数据类型是一种 32 位有符号的 Java\
  \ 基本数据类型。`int` 数据类型的变量占用 32 位内存。其有效范围是 -2,147,483,648 到 2,147,483,647（-2³¹ 到 2³¹\
  \ - 1）。此范围内的所有整数都称为整数字面量（或整数常量）。例如，10、-200、0、30、19 等是 `int` 类型的整数字面量。\n\n`long`\
  \ 数据类型是一种 64 位有符号的 Java 基本数据类型。当对整数进行运算的结果可能超出 `int` 数据类型的范围时使用它。其范围是 -9,223,372,036,854,775,808\
  \ 到 9,223,372,036,854,775,807（-2⁶³ 到 2⁶³ - 1）。`long` 范围内的所有整数都称为 `long` 类型的整数字面量。`long`\
  \ 类型的整数字面量必须以 `L` 或 `l` 结尾，例如 10L 和 897L。\n\n`char` 数据类型是一种 16 位无符号的 Java 基本数据类型。其值表示一个\
  \ Unicode 字符。`char` 数据类型的范围是 0 到 65535，这与 Unicode 字符集的范围相同。字符字面量表示 `char` 数据类型的一个值，它可以用四种格式表示：用单引号括起来的字符、用单引号括起来的转义序列形式的字符、Unicode\
  \ 转义序列形式以及八进制转义序列形式。`'A'`、`'X'` 和 `'8'` 是 `char` 字面量的示例。\n\n\n\n`float` 数据类型使用 32\
  \ 位以 IEEE 754 标准格式存储浮点数。根据 IEEE 754 标准用 32 位表示的浮点数也称为单精度浮点数。它可以表示小至 1.4 x 10^(-45)、大至约\
  \ 3.4 x 10³⁸ 的实数。该范围仅包含数值大小，可正可负。其中，1.4 x 10^(-45) 是能存储在 `float` 变量中的最小正数（大于零）。`float`\
  \ 字面量必须以 F 或 f 结尾。`float` 字面量的几个示例包括 2.0f、56F、0.78F。\n\n`double` 数据类型使用 64 位以 IEEE\
  \ 754 标准格式存储浮点数。根据 IEEE 754 标准用 64 位表示的浮点数也称为双精度浮点数。它可以表示小至 4.9 x 10^(-324)、大至约\
  \ 1.7 x 10³⁰⁸ 的实数。该范围仅包含数值大小，可正可负。所有实数都称为 `double` 字面量。`double` 字面量可以选择以 `d` 或 `D`\
  \ 结尾，例如 19.27d。也就是说，19.27 和 19.27d 表示相同的 `double` 字面量。\n\n`boolean` 数据类型只有两个有效值：`true`\
  \ 和 `false`。这两个值被称为 `boolean` 字面量。\n\n为了使表示为数字字面量的大数值更具可读性，Java 允许你在数字字面量的两个数字之间使用任意数量的下划线。例如，`int`\
  \ 字面量 `1969` 可以写成 `1_969`、`19_69`、`196_9`、`1___969` 或任何其他在两个数字之间使用下划线的形式。在八进制、十六进制和二进制格式中也允许使用下划线。\n\
  \n练习\n\n1.  Java 中的标识符是什么？标识符可以由哪些字符组成？列出 Java 中五个有效标识符和五个无效标识符。\n2.  Java 中的关键字、保留关键字和受限关键字是什么？下划线是\
  \ Java 中的关键字吗？\n3.  什么是数据类型？基本数据类型和引用数据类型有什么区别？\n4.  列出 Java 编程语言支持的所有八种基本数据类型的名称。列出它们以字节为单位的大小。\n\
  5.  什么是字面量？列出 Java 中每种基本类型的两个字面量。\n6.  Java 中最短的数值基本数据类型是什么？其值的范围是多少？\n7.  考虑以下两个变量声明：\n\
  \n```\n    byte small = 10;\n    int big = 99;\n    ```\n\n如何将 `big` 变量中的值赋给 `small`\
  \ 变量？\n8.  为什么在将较大尺寸的变量赋值给较小尺寸的变量时（例如，将 `int` 变量赋值给 `byte` 变量）需要使用强制类型转换？\n9.  说出\
  \ Java 中两种值可以是浮点数的基本数据类型。\n10. 如果你声明了一个 `boolean` 类型的变量，它可以有哪两个可能的值？\n11. 你能像以下语句所示那样将\
  \ `boolean` 值强制转换为 `int` 类型吗？\n\n```\n    boolean done = true;\n    int x = (int)\
  \ done;\n    ```\n\n编译这段代码片段时会发生什么？\n12. `boolean` 字面量 `true` 和 `false` 与整数 1 和\
  \ 0 相同吗？\n13. 说出 Java 中的一种无符号数值数据类型。\n14. 说出编写 `char` 数据类型字面量的四种不同格式。每种格式给出两个示例。\n\
  15. 如何在 Java 中将反斜杠（`\\`）和双引号（`\"`）表示为 `char` 字面量？编写代码声明两个名为 `c1` 和 `c2` 的 `char`\
  \ 变量。将反斜杠字符赋给 `c1`，将双引号字符赋给 `c2`。\n16. 什么是二进制数的反码和补码？计算二进制数 10111011 的反码和补码。\n17.\
  \ 为什么 Java 程序中的以下注释行无法编译？`\\u000A` 是换行符的 Unicode 代码值。\n\n```\n    char c = '\\u000A';\n\
  \    ```\n\n18. `float` 和 `double` 数据类型支持多少个零？\n19. 什么是 `NaN`？Java 中的 `float` 和\
  \ `double` 类型支持多少个 `NaN`？区分静默 `NaN` 和信号 `NaN`。Java 支持哪种类型的 `NaN`——静默 `NaN`、信号 `NaN`，还是两者都支持？\n\
  20. 什么是非规格化浮点数？\n21. 浮点数的不同舍入模式有哪些？Java 支持哪些舍入模式？\n22. 什么是小端序和大端序？Java 使用哪种字节序来编码类文件中的多字节二进制数据？\n\
  \n"
- "# 5. 运算符\n\n在本章中，你将学习：\n\n*   什么是运算符\n*   Java 中可用的不同类型运算符\n*   运算符优先级，它决定了在同一表达式中使用多个运算符时运算符的求值顺序\n\
  \n我在本章中使用了大量代码片段。评估这些片段并查看结果的最快方法是使用 JShell 工具。关于如何在命令提示符和 NetBeans IDE 中启动 JShell\
  \ 工具，请参考第 2 章。\n\n本章中的所有类都是名为 `jdojo.operator` 的模块的成员，其声明如清单 5-1 所示。\n\n```\n//\
  \ module-info.java\nmodule jdojo.operator {\n// 无模块语句\n}\n清单 5-1.\n名为 jdojo.operator\
  \ 的模块的声明\n```\n\n\n\n## 什么是运算符？\n\n运算符是一种符号，可对一个、两个或三个操作数执行特定类型的运算，并产生一个结果。运算符及其操作数的类型决定了所执行运算的种类以及所产生结果的类型。Java\
  \ 中的运算符可以根据两个标准进行分类：\n\n*   它们操作的操作数数量\n*   它们对操作数执行的运算类型\n\n根据操作数的数量，有三种类型的运算符：\n\
  \n*   一元运算符\n*   二元运算符\n*   三元运算符\n\n如果一个运算符接受一个操作数，则称为一元运算符；如果接受两个操作数，则称为二元运算符；如果接受三个操作数，则称为三元运算符。\n\
  \n一元运算符可以使用后缀或前缀表示法。在后缀表示法中，运算符出现在其操作数之后。\n\n以下是使用后缀一元运算符的示例：\n\n```\n// num 是操作数，++\
  \ 是 Java 一元运算符\nnum++\n```\n\n在前缀表示法中，一元运算符出现在其操作数之前。\n\n以下是使用前缀一元运算符的示例。请注意，Java\
  \ 中的 `++` 运算符既可以作为前缀运算符，也可以作为后缀运算符使用。\n\n```\n// ++ 是 Java 一元运算符，num 是操作数\n++num\n\
  ```\n\n二元运算符使用中缀表示法。运算符出现在两个操作数之间。使用中缀二元运算符的语法如下：\n\n以下是使用 `+` 作为中缀二元运算符的示例：\n\n\
  ```\n// 10 是第一个操作数，+ 是二元运算符，15 是第二个操作数\n10 + 15\n```\n\n与二元运算符类似，三元运算符也使用中缀表示法。使用中缀三元运算符的语法如下：\n\
  \n这里，`<operator1>` 和 `<operator2>` 共同构成一个三元运算符。\n\n以下是在 Java 中使用三元运算符的示例：\n\n```\n\
  // isSunday 是第一个操作数，? 是三元运算符的第一部分，\n// holiday 是第二个操作数，: 是三元运算符的第二部分，noHoliday 是第三个操作数\n\
  isSunday ? holiday : noHoliday\n```\n\n根据运算符执行的运算类型，可以将它们分为以下几类：\n\n*   算术运算符\n\
  *   关系运算符\n*   逻辑运算符\n*   位运算符\n\nJava 有一个庞大的运算符列表。本章讨论大多数 Java 运算符。我将在后续章节中，在适当的上下文中讨论其中的一部分。请享受在后续章节中学习\
  \ Java 运算符的漫长旅程！\n\n## 赋值运算符\n\n赋值运算符（`=`）用于将值赋给变量。它是一个二元运算符。它接受两个操作数。右侧操作数的值被赋给左侧操作数。左侧操作数必须是一个变量。例如：\n\
  \n```\nint num;\nnum = 25;\n```\n\n这里，`num = 25` 使用了赋值运算符 `=`。在此示例中，`25` 是右侧操作数，`num`\
  \ 是左侧操作数，它是一个变量。\n\nJava 确保赋值运算符右侧操作数的值与左侧操作数的数据类型赋值兼容；否则，会发生编译时错误。对于引用变量，如果右侧操作数表示的对象与指定为左侧操作数的引用变量不赋值兼容，则您可能能够编译源代码，但会得到运行时错误。例如，`byte`、`short`\
  \ 和 `char` 类型的值与 `int` 数据类型赋值兼容，因此以下代码片段是有效的。\n\n```\nbyte b = 5;\nchar c = 'a';\n\
  short s = -200;\nint i = 10;\ni = b; // 正确。byte b 与 int i 赋值兼容\ni = c; // 正确。char\
  \ c 与 int i 赋值兼容\ni = s; // 正确。short s 与 int i 赋值兼容\n```\n\n然而，`long` 到 `int` 以及\
  \ `float` 到 `int` 的赋值是不兼容的，因此以下代码片段会产生编译时错误。\n\n```\nlong big = 524L;\nfloat f =\
  \ 1.19F;\nint i = 15;\ni = big; // 编译时错误。long 到 int，赋值不兼容\ni = f;   // 编译时错误。float\
  \ 到 int，赋值不兼容\n```\n\n如果右侧操作数的值与左侧变量的数据类型不赋值兼容，则必须将右侧操作数的值强制转换为适当的类型。前面使用赋值运算符的代码片段可以通过强制转换重写如下：\n\
  \n```\ni = (int)big; // 正确\ni = (int)f;   // 正确\n```\n\n表达式是根据 Java 编程语言的语法构造的一系列变量、运算符和方法调用，其计算结果为单个值。例如，`num\
  \ = 25` 是一个表达式。使用赋值运算符的表达式也有一个值。该表达式的值等于右侧操作数的值。考虑以下代码片段，假设 `num` 是一个 `int` 变量。\n\
  \n```\nnum = 25;\n```\n\n这里，`num = 25` 被称为表达式，而 `num = 25;` 被称为语句。表达式 `num = 25`\
  \ 做了两件事：\n\n*   将值 25 赋给变量 `num`。\n*   产生一个值 25，该值等于赋值运算符右侧操作数的值。\n\n在表达式中使用赋值运算符的第二个效果（产生一个值）在这一点上可能看起来很奇怪。您可能想知道表达式\
  \ `num = 25` 产生的值 25 会发生什么。我们是否使用过表达式返回的值？答案是肯定的。我们确实使用表达式返回的值。考虑以下表达式，它使用了链式赋值运算符，假设\
  \ `num1` 和 `num2` 是 `int` 变量。\n\n```\nnum1 = num2 = 25;\n```\n\n执行此代码时会发生什么？首先，执行表达式\
  \ `num2 = 25` 的部分。如前所述，这次执行将产生两个效果：\n\n*   它会将值 25 赋给 `num2`。\n*   它会生成一个值 25。换句话说，可以说在将值\
  \ 25 赋给 `num2` 之后，表达式 `num2 = 25` 被替换为值 25，这会将主表达式 `num1 = num2 = 25` 更改为 `num1\
  \ = 25`。\n\n现在，执行表达式 `num1 = 25`，将值 25 赋给 `num1`，而生成的值 `25` 被忽略。这样，您可以在单个表达式中将相同的值赋给多个变量。在这种链式赋值表达式中可以使用任意数量的变量。例如：\n\
  \n```\nnum1 = num2 = num3 = num4 = num5 = num6 = 219;\n```\n\n假设有两个 `int` 变量 `num1`\
  \ 和 `num2`。以下赋值 `num1 = num2` 将存储在 `num2` 中的值 `200` 赋给 `num1`。\n\n```\nint num1\
  \ = 100; // num1 是 100\nint num2 = 200; // num2 是 200\nnum1 = num2; // num1 是 200。num2\
  \ 是 200\nnum2 = 500;  // num2 是 500。num1 仍然是 200\n```\n\n当您说 `num1 = num2` 时，存储在\
  \ `num2` 中的值被复制到 `num1`，并且 `num1` 和 `num2` 都维护着相同值 `200` 的自己的副本。之后，当执行 `num2 = 500`\
  \ 时，只有 `num2` 的值变为 `500`。但 `num1` 的值保持不变，仍然是 `200`。现在，假设有两个引用变量 `ref1` 和 `ref2`，它们引用同一个类的两个不同对象。如果我们写：\n\
  \n```\nref1 = ref2;\n```\n\n表达式 `ref1 = ref2` 的效果是，两个引用变量 `ref1` 和 `ref2` 现在都引用内存中的同一个对象——即\
  \ `ref2` 之前引用的对象。在此赋值之后，两个引用变量 `ref1` 和 `ref2` 都能够同样地操作该对象。通过引用变量 `ref1` 对内存中对象所做的更改也将被\
  \ `ref2` 观察到，反之亦然。第 7 章将更详细地介绍引用变量赋值。\n\n## 声明、初始化和赋值\n\n\n\n在 Java 程序中，任何类型的变量在使用前都必须先声明并赋值。假设你想使用一个名为\
  \ `num1` 的 `int` 变量。首先，你必须按如下方式声明它：\n\n```\n// 声明一个变量 num1\nint num1;\n```\n\n值可以在变量声明之后或声明之时赋予。在变量声明之后赋值，称为赋值操作。以下代码声明了一个\
  \ `int` 变量 `num2` 并为其赋值为 `50`。\n\n```\nint num2;   // 声明一个变量 num2\nnum2 = 50;  //\
  \ 赋值\n```\n\n在声明变量时直接赋值，称为初始化。以下代码声明了一个 `int` 变量 `num3` 并将其初始化为 `100`。\n\n```\n\
  // 声明变量 num3 并初始化\nint num3 = 100;\n```\n\n你可以通过逗号分隔每个变量的名称，在一次声明中声明多个相同类型的变量。\n\
  \n```\n// 声明三个 int 类型的变量 num1、num2 和 num3\nint num1, num2, num3;\n```\n\n你也可以在一次声明中声明多个变量，并初始化其中部分或全部变量。\n\
  \n```\n// 声明变量 num1、num2 和 num3。仅初始化 num1 和 num3\nint num1 = 10, num2, num3 = 200;\n\
  // 声明并初始化变量 num1、num2 和 num3\nint num1 = 10, num2 = 20, num3 = 30;\n```\n\n除非变量已通过初始化或赋值过程获得了值，否则\
  \ Java 不允许你使用它。Java 会在某些上下文中隐式初始化变量。在其他上下文中声明的变量，如果 Java 没有隐式初始化它们，则必须在使用前进行初始化或赋值。我将在第\
  \ 7 章中讨论 Java 对变量的隐式初始化。在声明变量时进行初始化是一个好习惯。\n\n算术运算符\n\n算术运算符是一种以数值作为操作数并执行算术运算（例如加法和减法）以计算另一个数值的运算符。表\
  \ 5-1 列出了 Java 中的所有算术运算符。表 5-1 中列出的所有运算符只能用于数值类型的操作数。也就是说，算术运算符的两个操作数必须是 `byte`、`short`、`char`、`int`、`long`、`float`\
  \ 或 `double` 类型之一。这些运算符不能有 `boolean` 基本类型和引用类型的操作数。以下各节将详细描述算术运算符。\n\n表 5-1.\n\n\
  Java 中的算术运算符列表\n\n运算符 | 描述 | 类型 | 用法 | 结果\n--- | --- | --- | --- | ---\n`+` | 加法\
  \ | 二元 | `2 + 5` | \n`-` | 减法 | 二元 | `5 - 2` | \n`+` | 一元正号 | 一元 | `+5` | 正五。等同于\
  \ 5。\n`-` | 一元负号 | 一元 | `-5` | 负五。\n`*` | 乘法 | 二元 | `5 * 3` | \n`/` | 除法 | 二元 |\
  \ `5 / 2` | \n| | | | `6 / 2` | \n| | | | `5.0 / 2.0` | 2.5\n| | | | `6.0 / 2.0`\
  \ | 3.0\n`%` | 取模 | 二元 | `5 % 3` | \n`++` | 自增 | 一元 | `num++` | 计算 num 的值，然后将 num\
  \ 增加 1。\n`--` | 自减 | 一元 | `num--` | 计算 `num` 的值，然后将 `num` 减少 1。\n`+=` | 算术复合赋值 |\
  \ 二元 | `num += 5` | 将 5 加到 `num` 的值上，并将结果赋给 `num`。如果 `num` 是 10，则 `num` 的新值将为 15。\n\
  `-=` | 算术复合赋值 | 二元 | `num -= 3` | 从 `num` 的值中减去 3，并将结果赋给 `num`。如果 `num` 是 10，则 `num`\
  \ 的新值将为 7。\n`*=` | 算术复合赋值 | 二元 | `num *= 15` | 将 `num` 的值乘以 15，并将结果赋给 `num`。如果 `num`\
  \ 是 10，则 `num` 的新值将为 150。\n`/=` | 算术复合赋值 | 二元 | `num /= 5` | 将 `num` 的值除以 5，并将结果赋给\
  \ `num`。如果 `num` 是 10，则 `num` 的新值将为 2。\n`%=` | 算术复合赋值 | 二元 | `num %= 5` | 计算 `num`\
  \ 除以 5 的余数，并将结果赋给 `num`。如果 `num` 是 12，则 `num` 的新值将为 2。\n\n加法运算符 (+)\n\n加法运算符 (`+`)\
  \ 是一种算术运算符，其使用形式如下：\n\n```\noperand1 + operand2\n```\n\n加法运算符用于将两个操作数表示的数值相加，例如，5\
  \ + 3 的结果是 8。操作数可以是任何数值字面量、数值变量、数值表达式或方法调用。每个涉及加法运算符 (`+`) 的表达式都有一个数据类型。该表达式的数据类型根据以下四条规则之一确定：\n\
  \n*   如果其中一个操作数是 `double`，则另一个操作数被转换为 `double`，整个表达式为 `double` 类型。否则，\n*   如果其中一个操作数是\
  \ `float`，则另一个操作数被转换为 `float`，整个表达式为 float 类型。否则，\n*   如果其中一个操作数是 `long`，则另一个操作数被转换为\
  \ `long`，整个表达式为 `long` 类型。否则，\n*   如果前三条规则都不适用，则所有操作数（如果它们还不是 `int` 类型）都会被转换为 `int`，并且整个表达式为\
  \ `int` 类型。\n\n这些规则有一些重要的含义。考虑一个 `byte` 变量 `b1`，它被赋值为 `5`，如下代码片段所示。\n\n```\nbyte\
  \ b1;\nb1 = 5;\n```\n\n当你尝试将相同的值 `5` 赋给一个 `byte` 变量 `b1` 时，会出现编译时错误，如下代码片段所示。\n\n\
  ```\nbyte b1;\nbyte b2 = 2;\nbyte b3 = 3;\nb1 = b2 + b3; // 编译时错误。尝试将 5 赋给 b1\n\
  ```\n\n为什么这段代码会导致编译时错误？表达式 `b1 = 5` 和 `b1 = b2 + b3` 不是都具有将 `5` 赋给变量 `b1` 的相同效果吗？是的，效果是相同的。然而，在这两种情况下，控制赋值操作的规则是不同的。在表达式\
  \ `b1 = 5` 中，赋值受规则约束：任何介于 -128 和 127 之间的 `int` 字面量都可以赋给 `byte` 变量。因为 5 在 -128 和\
  \ 127 之间，所以赋值 `b1 = 5` 是有效的。第二个赋值 `b1 = b2 + b3` 受确定算术表达式数据类型的第四条规则约束，该规则使用了加法运算符\
  \ (`+`)。因为表达式 `b2 + b3` 中的两个操作数都是 `byte` 类型，所以操作数 `b2` 和 `b3` 首先被转换为 `int`，然后表达式\
  \ `b2 + b3` 变为 `int` 类型。由于 `b1` 的数据类型是 `byte`，它比表达式 `b2 + b3` 的 `int` 数据类型小，因此赋值\
  \ `b1 = b2 + b3`（即 `int` 到 `byte`）是不兼容的，这就是它产生错误的原因。在这种情况下，你需要将右侧表达式的结果强制转换为左侧操作数的数据类型。\n\
  \n```\nb1 = (byte)(b2 + b3); // 现在可以了\n```\n\n初学者可能会尝试将这段代码写成如下形式：\n\n```\nb1 =\
  \ (byte) b2 + b3; // 再次出现编译时错误\n```\n\n这两个表达式 `(byte)(b2 + b3)` 和 `(byte)b2 + b3`\
  \ 并不相同。在表达式 `(byte) (b2 + b3)` 中，首先，`b2` 和 `b3` 被提升为 `int`，然后执行加法，得到 `int` 类型的值\
  \ 5。然后，`int` 值 `5` 被强制转换为 `byte` 并赋给 `b1`。\n\n\n\n在表达式 `(byte)b2 + b3` 中，首先将 `b2`\
  \ 强制转换为 `byte`。请注意，由于 `b2` 本身已经是 `byte` 类型，此强制转换是多余的；`b2` 和 `b3` 都会被提升为 `int` 类型；整个表达式\
  \ `(byte)b2 + b3` 的结果类型为 `int`。由于不允许将 `int` 类型赋值给 `byte` 类型，因此该表达式无法通过编译。\n\n第二个表达式\
  \ `(byte)(b2 + b3)` 产生的错误引出了一个有趣的问题。为什么 Java 没有先计算 `(byte)b2 + b3` 中的 `b2 + b3`，然后再将结果强制转换为\
  \ `byte` 类型？因为这里需要执行两个操作：一个是强制转换为 `byte`，另一个是 `b2` 和 `b3` 的加法运算，Java 先对 `b2` 进行了强制转换，然后才执行加法。先执行强制转换再执行加法的决定并非随意为之。Java\
  \ 中的每个运算符都有优先级顺序。优先级高的运算符会先于优先级低的运算符被求值。强制转换运算符的优先级高于加法运算符。这就是为什么在 `(byte)b2 + b3`\
  \ 中会先计算 `(byte)b2` 的原因。你始终可以使用括号来覆盖运算符的优先级。我们在表达式 `(byte)(b2 + b3)` 中通过使用括号覆盖了强制转换运算符的优先级。考虑另一个例子。\n\
  \n```\nbyte b1;\nb1 = 3 + 2; // 这行代码能编译通过吗？\n```\n\n表达式 `b1 = 3 + 2` 能编译通过吗？如果我们应用确定此表达式数据类型的第四条规则，它应该无法编译，因为\
  \ `3` 和 `2` 是 `int` 字面量。表达式 `3 + 2` 的类型是 `int`。由于 `int` 与 `byte` 赋值不兼容，表达式 `b1 =\
  \ 3 + 2` 应该会报错。然而，我们的假设是错误的，表达式 `b1 = 3 + 2` 可以正常编译。在这种情况下，赋值过程如下。\n\n操作数 `3` 和\
  \ `2` 是常量，因此它们的值在编译时是已知的。因此，编译器在编译时计算表达式 `3 + 2` 的结果，并将其结果 `5` 替换 `3 + 2`。编译器将表达式\
  \ `b1 = 3 + 2` 替换为 `b1 = 5`。现在，你可以理解为什么 Java 没有对这个表达式报错了。因为 `int` 字面量 `5` 在 `-128`\
  \ 到 `127` 的范围内，根据将 `int` 字面量赋值给 `byte` 变量的规则，`b1 = 5` 是一个有效的赋值。然而，如果你尝试编写像 `b1 =\
  \ 127 + 10` 这样的表达式，它肯定无法编译，因为 `127 + 10` 的结果是 `137`，超出了 `byte` 数据类型的范围。以下是关于操作数数据类型转换以及涉及加法运算符的表达式类型确定的最终结论。\n\
  \n```\nvar = operand1 + operand2;\n```\n\n如果 `operand1` 和 `operand2` 是编译时常量，则 `operand1\
  \ + operand2` 的结果决定了此赋值是否有效。如果 `operand1 + operand2` 的结果在变量 `var` 的数据类型范围内，则表达式可以编译。否则，将产生编译器错误。如果\
  \ `operand1` 或 `operand2` 中有一个是变量（即 `operand1` 或 `operand2` 的值在编译时无法确定），则根据本节开头讨论的四条规则之一来确定表达式的数据类型。以下是加法运算符正确和错误使用的示例。代码旁边的注释指出了使用是否正确。\n\
  \n```\nbyte b1 = 2;\nbyte b2 = 3;\nshort s1 = 100;\nint i = 10;\nint j = 12;\nfloat\
  \ f1 = 2.5F;\ndouble d1 = 20.0;\n// 正确。125 在 -128 到 127 的范围内\nb1 = 15 + 110;\n//\
  \ 错误。i + 5 的数据类型是 int，不允许将 int 赋值给 byte\nb1 = i + 5;\nb1 = (byte)(i + 5); // 正确\n\
  // 错误。s1 被提升为 int，s1 + 2 的数据类型是 int。\n// 不允许将 int 赋值给 byte\nb1 = s1 + 2;\n// 错误。b2\
  \ 被提升为 float，f1 + b2 的数据类型是 float。\n// 不允许将 float 赋值给 byte\nb1 = f1 + b2;\n// 错误。f1\
  \ 被提升为 double，f1 + d1 的数据类型是 double\nb1 = f1 + d1;\n// 正确。i 被提升为 float，i + f1 的数据类型是\
  \ float\nf1 = i + f1;\n// 错误。i 被提升为 double，i + d1 的数据类型是 double。\n// 不允许将 double\
  \ 赋值给 float\nf1 = i + d1;\nf1 = (float)(i + d1); // 正确\n// 错误。2.0 和 3.0 是 double\
  \ 类型。2.0 + 3.2 的结果是 5.2，\n// 它也是 double 类型。不允许将 double 赋值给 float。\nf1 = 2.0 + 3.2;\n\
  // 正确。2.0F 和 3.2F 是 float 类型。2.0F + 3.2F 的结果，\n// 即 5.2F，是 float 类型。\nf1 = 2.0F\
  \ + 3.2F;\n// 正确。j 被提升为 float，f1 + j 的数据类型是 float。\n// 允许将 float 赋值给 double。\nd1\
  \ = f1 + j;\n```\n\n减法运算符 (-)\n\n减法运算符 (`-`) 是一个算术运算符，其使用形式如下：\n\n```\noperand1\
  \ - operand2\n```\n\n减法运算符用于计算两个数的差，例如 `5 - 3` 的结果是 `2`。我之前讨论的关于加法运算符表达式中操作数数值类型转换和数据类型确定的所有规则，同样适用于涉及减法运算符的表达式。以下是使用减法运算符的几个示例。\n\
  \n```\nbyte b1 = 5;\nint i = 100;\nfloat f1 = 2.5F;\ndouble d1 = 15.45;\n// 正确。200\
  \ - 173 将被替换为 27。\n// b1 = 27 是正确的，因为 27 在 -128 到 127 的范围内\nb1 = 200 - 173;\n//\
  \ 错误。i - 27 是 int 类型。不允许将 int 赋值给 byte\nb1 = i - 27;\nb1 = (byte)(i - 27);  // 正确。将\
  \ 73 赋值给 b1\nd1 = f1 - i;          // 正确。将 -97.5 赋值给 d1\n```\n\n乘法运算符 (*)\n\n乘法运算符\
  \ (`*`) 是一个算术运算符，其使用形式如下：\n\n```\noperand1 * operand2\n```\n\n乘法运算符 (`*`) 用于计算两个数的乘积，例如\
  \ `7 * 3` 的结果是 `21`。我之前讨论的关于加法运算符表达式中操作数数值类型转换和数据类型确定的所有规则，同样适用于涉及乘法运算符的表达式。以下是使用乘法运算符的一些示例。\n\
  \n```\nbyte b1 = 5;\nint i = 10;\nfloat f1 = 2.5F;\ndouble d1 = 15.45;\n// 正确。20\
  \ * 6 将被替换为 120\n// b1 = 120 是正确的，因为 120 在 -128 到 127 的范围内\nb1 = 20 * 6;\n// 错误。i\
  \ * 12 是 int 类型。不允许将 int 赋值给 byte\nb1 = i * 12;\nb1 = (byte)(i * 12); // 正确。将 120\
  \ 赋值给 b1\n// 正确。i * b1 是 int 类型。允许将 int 赋值给 float\nf1 = i * b1;\n// 错误。d1 * i 是\
  \ double 类型。不允许将 double 赋值给 float\nf1 = d1 * i;\nf1 = (float)(d1 * i); // 正确。将 154.5\
  \ 赋值给 f1\n```\n\n除法运算符 (/)\n\n除法运算符 (`/`) 是一个算术运算符，其使用形式如下：\n\n```\noperand1 / operand2\n\
  ```\n\n除法运算符 (`/`) 用于计算两个数的商，例如 `5.0/2.0` 的结果是 `2.5`。我之前讨论的关于加法运算符 (`+`) 表达式中操作数数值类型转换和数据类型确定的所有规则，同样适用于涉及除法运算符的表达式。除法有两种类型：\n\
  \n*   整数除法\n\n*   浮点数除法\n\n\n\n如果除法运算符的两个操作数都是整数，即 `byte`、`short`、`char`、`int` 或\
  \ `long`，则会执行常规除法运算，并将结果向零截断以表示整数。例如，如果你编写表达式 `5/2`，除法结果为 `2.5`；小数部分 `0.5` 被忽略；最终结果为\
  \ `2`。以下示例说明了整数除法：\n\n```\nint num;\nnum = 5/2; // 将 2 赋值给 num\nnum = 5/3; // 将\
  \ 1 赋值给 num\nnum = 5/4; // 将 1 赋值给 num\nnum = 5/5; // 将 1 赋值给 num\nnum = 5/6; //\
  \ 将 0 赋值给 num\nnum = 5/7; // 将 0 赋值给 num\n```\n\n在上述所有示例中，赋值给变量 `num` 的值都是整数。结果在所有情况下都是整数，并非因为变量\
  \ `num` 的数据类型是 `int`。结果之所以是整数，是因为除法运算符的两个操作数都是整数。由于两个操作数的数据类型都是 `int`，整个表达式 `5/3`\
  \ 的类型就是 `int`。因为小数部分（例如 0.5、0.034）无法存储在 `int` 中，所以小数部分被忽略，结果始终是整数。使用 JShell 工具是试验这些运算符的好方法。以下\
  \ `jshell` 会话展示了这些表达式的结果：\n\n```\njshell> int num;\nnum ==> 0\njshell> num = 5/2;\n\
  num ==> 2\njshell> num = 5/3;\nnum ==> 1\njshell> num = 5/4;\nnum ==> 1\njshell>\
  \ num = 5/5;\nnum ==> 1\njshell> num = 5/6;\nnum ==> 0\njshell> num = 5/7;\nnum\
  \ ==> 0\n```\n\n如果除法运算符的一个或两个操作数是 `float` 或 `double`，则会执行浮点除法，并且结果不会被截断。以下是一些示例：\n\
  \n```\nfloat f1;\n// 15.0F 和 4.0F 是 float 类型。因此，表达式 15.0F/4.0F 是 float 类型。\n// 结果\
  \ 3.75F 被赋值给 f1。\nf1 = 15.0F/4.0F;\n// 15 是 int 类型，4.0F 是 float 类型。表达式 15/4.0F 是\
  \ float 类型。\n// 结果 3.75F 被赋值给 f1。\nf1 = 15/4.0F;\n// 错误。15.0 是 double 类型，4.0F 是\
  \ float 类型。表达式\n// 15.0/4.0F 是 double 类型。结果 3.75 是 double 类型，不能\n// 赋值给 f1，因为不允许将\
  \ double 赋值给 float。\nf1 = 15.0/4.0F;\n// 正确。3.75F 被赋值给 f1\nf1 = (float)(15.0/4.0F);\n\
  // 15 和 4 是 int 类型。表达式 15/4 是 int 类型。执行整数除法。\n// 结果 3 被赋值给 f1，因为允许将 int 赋值给 float。\n\
  f1 = 15/4;\n```\n\n当你尝试将一个数（整数或浮点数）除以零时会发生什么？一个数除以零的结果取决于除法的类型。如果对该数执行整数除法，除以零会导致运行时错误。如果你在\
  \ Java 程序中编写表达式 `3/0`，它可以正常编译，但在运行时执行该表达式时会出错。例如：\n\n```\nint i = 2;\nint j = 5;\n\
  int k = 0;\ni = j/k;  // 运行时错误。除以零\ni = 0/0;  // 运行时错误。除以零\n```\n\n如果除法运算符的任一操作数是浮点数，则会执行浮点除法，并且该数除以零的结果不是错误。如果在浮点数除以零的操作中，被除数（在\
  \ 7/2 中，7 是被除数，2 是除数）是非零数，则结果为正无穷大或负无穷大。如果被除数是浮点零（例如 0.0 或 0.0F），则结果为 `NaN`。例如：\n\
  \n```\nfloat f1 = 2.5F;\ndouble d1 = 5.6;\nf1 = 5.0F/0.0F;    // Float.POSITIVE_INFINITY\
  \ 被赋值给 f1\nf1 = -5.0F/0.0F;   // Float.NEGATIVE_INFINITY 被赋值给 f1\nf1 = -5.0F/-0.0F;\
  \  // Float.POSITIVE_INFINITY 被赋值给 f1\nf1 = 5.0F/-0.0F;   // Float.NEGATIVE_INFINITY\
  \ 被赋值给 f1\nd1 = 5.0/0.0;      // Double.POSITIVE_INFINITY 被赋值给 d1\nd1 = -5.0/0.0;\
  \     // Double.NEGATIVE_INFINITY 被赋值给 d1\nd1 = -5.0/-0.0;    // Double.POSITIVE_INFINITY\
  \ 被赋值给 d1\nd1 = 5.0/-0.0;     // Double.NEGATIVE_INFINITY 被赋值给 d1\n// 5.0F 是 float\
  \ 类型，0 是 int 类型。5.0F/0 是 float 类型。\n// Float.POSITIVE_INFINITY 被赋值给 f1\nf1 = 5.0F/0;\n\
  // 编译时错误。5.0F 是 float 类型，0.0 是 double 类型\n// 5.0F/0.0 是 double 类型。不允许将 double 赋值给\
  \ float。\nf1 = 5.0F/0.0;\nf1 = (float)(5.0F/0.0); // f1 被赋值为 Float.POSITIVE_INFINITY\n\
  f1 = 0.0F/0.0F;         // 将 Float.NaN 赋值给 f1\nd1 = 0.0/0.0;           // 将 Double.NaN\
  \ 赋值给 d1\nd1 = -0.0/0.0;          // 将 Double.NaN 赋值给 d1\n```\n\n取模运算符 (%)\n\n取模运算符（`%`）是一种算术运算符，其使用形式如下：\n\
  \n```\noperand1 % operand2\n```\n\n取模运算符（`%`）也称为求余运算符。取模运算符对左侧操作数执行除以右侧操作数的运算，并返回除法的余数，例如\
  \ `7%5` 的计算结果为 `2`。所有关于操作数数值数据类型转换以及涉及加法运算符（`+`）的表达式数据类型确定的规则，同样适用于涉及取模运算符的表达式。由于使用取模运算符涉及除法运算，因此有一些特殊规则用于确定取模运算的结果。\n\
  \n如果取模运算符的两个操作数都是整数，则应用以下规则来计算结果。\n\n规则 #1\n\n如果右侧操作数为零，则会发生运行时错误。例如：\n\n```\nint\
  \ num;\nnum = 15 % 0; // 运行时错误\n```\n\n规则 #2\n\n如果右侧操作数不为零，则结果的符号与左侧操作数的符号相同。例如：\n\
  \n```\nint num;\nnum = 15 % 6;   // 将 3 赋值给 num\nnum = -15 % 6;  // 将 -3 赋值给 num\n\
  num = 15 % -6;  // 将 3 赋值给 num\nnum = -15 % -6; // 将 -3 赋值给 num，因为左侧操作数是 -15，为负数\n\
  num = 5 % 7;    // 将 5 赋值给 num\nnum = 0 % 7;    // 将 0 赋值给 num\n```\n\n如果取模运算符的任一操作数是浮点数，则应用以下规则来计算结果。\n\
  \n规则 #1\n\n即使右侧操作数是浮点零，该操作也永远不会导致错误。\n\n规则 #2\n\n如果任一操作数是 `NaN`，则结果为 `NaN`。例如：\n\
  \n```\nfloat f1;\ndouble d1;\nf1 = Float.NaN % 10.5F;     // 将 Float.NaN 赋值给 f1\n\
  f1 = 20.0F % Float.NaN;     // 将 Float.NaN 赋值给 f1\nf1 = Float.NaN % Float.NaN; //\
  \ 将 Float.NaN 赋值给 f1\n// 编译时错误。表达式是 double 类型。\n// 不允许将 double 赋值给 float。\nf1 =\
  \ Float.NaN % Double.NaN;\nd1 = Float.NaN % Double.NaN; // 将 Double.NaN 赋值给 d1\n\
  ```\n\n规则 #3\n\n如果右侧操作数为零，则结果为 `NaN`。例如：\n\n```\nfloat f1;\nf1 = 15.0F % 0.0F; //\
  \ 将 Float.NaN 赋值给 f1\n```\n\n规则 #4\n\n如果左侧操作数是无穷大，则结果为 `NaN`。例如：\n\n```\nfloat f1;\n\
  f1 = Float.POSITIVE_INFINITY % 2.1F; // 将 Float.NaN 赋值给 f1\n```\n\n规则 #5\n\n如果前面的规则都不适用，则取模运算符返回左侧操作数除以右侧操作数的余数。结果的符号与左侧操作数的符号相同。例如：\n\
  \n\n```csharp\nfloat f1;\ndouble d1;\nf1 = 15.5F % 6.5F; // 将 2.5F 赋值给 f1\nd1 =\
  \ 5.5 % 15.65;  // 将 5.5 赋值给 d1\nd1 = 0.0 % 3.78;   // 将 0.0 赋值给 d1\nd1 = 85.0 %\
  \ Double.POSITIVE_INFINITY;  // 将 85.0 赋值给 d1\nd1 = -85.0 % Double.POSITIVE_INFINITY;\
  \ // 将 -85.0 赋值给 d1\nd1 = 85.0 % Double.NEGATIVE_INFINITY;  // 将 85.0 赋值给 d1\nd1\
  \ = -85.0 % Double.NEGATIVE_INFINITY; // 将 -85.0 赋值给 d1\n```\n\n一元正号运算符 (+)\n\n\
  一元正号运算符\n   (`+`) 是一个算术\n运算符，其使用形式如下：\n\n```\n+操作数\n```\n\n`操作数`\n必须是基本数值类型。如果 `操作数`\
  \ 是 `byte`、`short` 或 `char`，一元正号\n运算符会将其提升为 `int`。否则，\n使用此运算符不会产生任何效果。例如，如果有一个值为\
  \ `5` 的 `int` 变量 `num`，`+num` 的值\n仍然是 `5`。\n以下示例说明了此运算符的用法：\n\n```\nbyte b1 = 10;\n\
  byte b2 = 5;\nb1 = b2;  // 正确。byte 到 byte 的赋值\n// 编译时错误。b2 是 byte 类型。但是，对 b2 使用一元正号运算符\n\
  // 将其类型提升为 int。因此，+b2 是 int 类型。\n// 不允许将 int (+b2) 赋值给 byte (b1)。\nb1 = +b2;\nb1\
  \ = (byte) +b2; // 正确\n```\n\n一元负号运算符 (-)\n\n一元负号运算符\n   (`-`) 是一个算术\n运算符，其使用形式如下：\n\
  \n```\n-操作数\n```\n\n一元负号运算符对其操作数的值进行算术取反。`操作数` 必须是\n基本数值类型。如果 `操作数` 是 `byte`、`short`\
  \ 或 `char`，它会被提升\n为 `int`。以下示例说明了其用法：\n\n```\nbyte b1 = 10;\nbyte b2 = 5;\nb1 =\
  \ b2;  // 正确。byte 到 byte 的赋值\n// 编译时错误。b2 是 byte 类型。但是，对 b2 使用一元负号运算符 (-)\n// 将其类型提升为\
  \ int。因此，-b2 是 int 类型。\n// 不允许将 int (-b2) 赋值给 byte (b1)。\nb1 = -b2;\nb1 = (byte)\
  \ -b2; // 正确\n```\n\n复合算术赋值运算符\n\n五个基本算术运算符\n  (`+`、`-`、`*`、`/` 和 `%`) 各自都有一个\n\
  对应的复合算术赋值运算符。这些运算符\n可以通过一个例子更好地解释。假设你有两个变量，\n`num1` 和 `num2`：\n\n```\nint num1 =\
  \ 100;\nbyte num2 = 15;\n```\n\n如果你想将 `num1` 的值加到 `num2` 上，你会编写\n如下代码：\n\n```\n\
  num2 = (byte)(num2 + num1);\n```\n\n你需要将 `num2 + num1` 的结果强制转换为 `byte`，因为该表达式\n\
  的数据类型是 `int`。使用复合算术运算符 (`+=`) 可以重写\n实现相同的效果，如下所示。\n\n```\nnum2 += num1; // 将 num1\
  \ 的值加到 num2 上\n```\n\n复合算术赋值运算符的使用形式如下：\n\n```\n操作数 1 op= 操作数 2\n```\n\n这里，`op`\
  \ 是\n算术运算符 `+`、`-`、`*`、`/` 和 `%` 之一。`操作数 1` 和 `操作数 2` 是\n基本数值数据类型，其中 `操作数 1` 必须是一个\n\
  变量。前面的表达式等价于以下\n表达式。\n\n```\n操作数 1 = (操作数 1 的类型) (操作数 1 op 操作数 2)\n```\n\n例如，\n\n\
  ```\nint i = 100;\ni += 5.5;     // 将 105 赋值给 i\n```\n\n等价于\n\n```\ni = (int)(i\
  \ + 5.5); // 将 105 赋值给 i\n```\n\n使用复合算术赋值运算符\n有两个优点。\n\n*   `操作数 1` 只\n    被求值一次。例如，在\
  \ `i += 5.5` 中，变量 `i` 只\n    被求值一次，而在 `i = (int) (i + 5.5)` 中，\n    变量 `i` 被求值两次。\n\
  \n*   结果在赋值前会自动转换为 `操作数 1` 的类型。\n    这种转换可能导致窄化转换或恒等转换。\n    在前面的例子中，转换是窄化转换。\n\
  \    表达式 `i + 5.5` 的类型是 `double`，该表达式的结果\n    被转换为 `int`。因此，结果\n    `double 105.5`\
  \ 被\n    转换为 `int 105`。如果你编写像 `i += 5` 这样的表达式，其\n    等价表达式将是 `i = (int)(i + 5)`。\n\
  \    因为表达式 `i + 5` 的类型已经是\n    `int`，将结果再次转换为\n    `int` 是一个\n    恒等转换。\n\n复合赋值运算符\
  \ `+=` 也可以\n应用于 `String` 变量。在\n这种情况下，`操作数 1` 必须是\n`String` 类型，而\n`操作数 2` 可以是\n任何类型，包括\
  \ `boolean`。例如，\n\n```\nString str1 = \"Hello\";\nstr1 = str1 + 100;    // 将 \"\
  Hello100\" 赋值给 str1\n```\n\n可以重写为：\n\n```\nstr1 += 100; // 将 \"Hello100\" 赋值给 str1\n\
  ```\n\n提示\n\n只有 `+=`\n运算符可以与 `String` 类型的左操作数一起使用。\n\n以下是使用复合赋值运算符的示例。\n在这些示例中，每次使用复合赋值运算符都独立于其先前使用的影响。在所有情况下，都假设变量的值保持不变，即它们在声明时被赋予的值。\n\
  \n```\nint i = 110;\nfloat f = 120.2F;\nbyte b = 5;\nString str = \"Hello\";\nboolean\
  \ b1 = true;\ni += 10;        // 将 120 赋值给 i\n// 编译时错误。boolean 类型不能与 += 一起使用，\n\
  // 除非左操作数（此处为 i）是 String 变量\ni += b1;\ni -= 15;  // 将 95 赋值给 i。假设 i 是 110\ni *=\
  \ 2;   // 将 220 赋值给 i。假设 i 是 110\ni /= 2;   // 将 55 赋值给 i。假设 i 是 110\ni /= 0;  \
  \ // 运行时错误。除零错误\nf /= 0.0; // 将 Float.POSITIVE_INFINITY 赋值给 f\ni %= 3;   // 将 2\
  \ 赋值给 i。假设 i 是 110\nstr += \" How are you\"; // 将 \"Hello How are you\" 赋值给 str\n\
  str += f;  // 将 \"Hello120.2\" 赋值给 str。假设 str 是 \"Hello\"\nb += f;    // 将 125 赋值给\
  \ b。假设 b 是 5，f 是 120.2\nstr += b1; // 将 \"Hellotrue\" 赋值给 str。假设 str 是 \"Hello\"\
  \n```\n\n递增 (++) 和递减 (--) 运算符\n\n递增运算符\n   (`++`) 用于数值数据类型的变量，将变量的值增加 `1`，而\n递减运算符\
  \ (`--`) 用于\n将值减少 `1`。在本节中，我\n只讨论递增运算符。同样的讨论也适用于\n递减运算符，唯一的区别是它将值减少 `1`\n而不是增加 `1`。假设有一个\n\
  `int` 变量\n`i` 声明如下：\n\n```\nint i = 100;\n```\n\n要将 `i` 的值增加 `1`，你可以使用以下\n三个表达式之一。\n\
  \n```\ni = i + 1; // 将 101 赋值给 i\ni += 1;    // 将 101 赋值给 i\ni++;       // 将 101\
  \ 赋值给 i\n```\n\n递增运算符 `++` 也可以\n用于更复杂的表达式中，例如：\n\n```\nint i = 100;\nint j = 50;\n\
  j = i++ + 15;  // 将 115 赋值给 j，i 变为 101\n```\n\n表达式 `i++ + 15` 的求值过程如下：\n\n*   对\
  \ `i` 的值\n    进行求值，右侧表达式变为 `100 + 15`。\n\n*   内存中 `i` 的值\n    增加 `1`。因此，在此阶段，\n\
  \    内存中变量 `i` 的值是 `101`。\n\n*   表达式 `100 + 15` 被求值，结果 115 被赋值给 `j`。\n\n有两种递增运算符：\n\
  \n*   后缀递增运算符，例如 `i++`\n\n*   前缀递增运算符，例如 `++i`\n```\n\n\n当`++`出现在操作数之后时，称为**后缀递增运算符**。当`++`出现在操作数之前时，称为**前缀递增运算符**。后缀和前缀递增运算符的唯一区别在于它们使用操作数当前值和递增操作数值的顺序。后缀递增先使用操作数的当前值，然后递增操作数的值，正如你在表达式`j\
  \ = i++ + 15`中所见。因为`i++`使用了后缀递增运算符，首先使用`i`的当前值来计算表达式`i++ + 15`的值（例如`100 + 15`）。赋给`j`的值是`115`。然后，`i`的值增加`1`。如果使用前缀递增运算符重写此表达式，结果将不同：\n\
  \n```\nint i = 100;\nint j = 50;\nj = ++i + 15;   // 将 116 赋给 j，i 变为 101\n```\n\n\
  在这种情况下，表达式`++i + 15`的计算过程如下：\n\n*   因为`++i`使用了前缀递增运算符，首先`i`的值在内存中增加`1`。因此，`i`的值变为`101`。\n\
  *   然后使用`i`的当前值（即`101`）参与表达式，表达式变为`101 + 15`。\n*   计算表达式`101 + 15`，结果`116`被赋给`j`。\n\
  \n请注意，在计算完表达式`i++ + 15`和`++i + 15`后，`i`的值相同，都是`101`。然而，赋给`j`的值不同。如果你在像`i++`或`++i`这样的简单表达式中使用递增运算符`++`，则无法观察到使用后缀或前缀运算符的任何区别。\n\
  \n这里有一个针对 Java 初学者的谜题。该谜题涉及递增运算符的使用，如下所示：\n\n```\nint i = 15;\ni = i++; // 此赋值后\
  \ i 的值是多少？\n```\n\n猜猜执行`i = i++`后`i`的值是多少？如果你猜是 16，那就错了。以下是该表达式的计算过程解释：\n\n*   计算`i++`。因为`i++`使用了后缀递增运算符，所以使用`i`的当前值参与表达式。`i`的当前值是\
  \ 15。表达式变为`i = 15`。\n*   作为`i++`的第二个效果，`i`的值在内存中增加`1`。此时，内存中`i`的值是 16。\n*   计算表达式`i\
  \ = 15`，将值`15`赋给`i`。内存中变量`i`的值是 15，这就是最终值。实际上，变量`i`在上一步中曾观察到值 16，但这一步用 15 覆盖了该值。因此，执行`i\
  \ = i++`后变量`i`的最终值将是`15`，而不是 16。\n\n在这个例子中，操作的顺序很重要。需要特别注意的是，对于`i++`，一旦`i`的当前值被用于表达式，变量`i`的值就会立即递增。为了更清楚地说明这一点，请考虑以下示例：\n\
  \n```\nint i = 10;\ni = i++ + i;   // 将 21 赋给 i\ni = 10;\ni = ++i + i++; // 将 22\
  \ 赋给 i\n```\n\n还有后缀和前缀递减运算符，例如`i--`、`--i`。以下是使用后缀和前缀递减运算符的几个示例：\n\n```\nint i =\
  \ 15;\nint j = 16;\ni--;\n--i;\ni = 10;\ni = i--;  // 将 10 赋给 i\ni = 10;\nj = i--\
  \ + 10;  // 将 20 赋给 j，i 变为 9\ni = 10;\nj = --i + 10;  // 将 19 赋给 j，i 变为 9\n```\n\
  \n关于递增和递减运算符的使用，有两点需要牢记：\n\n*   递增和递减运算符的操作数必须是变量。例如，表达式`5++`是错误的，因为`++`被用于常量。\n\
  *   使用`++`或`--`运算符的表达式的结果是一个值，而不是一个变量。例如，`i++`计算得到一个值，因此我们不能将`i++`用作赋值运算符的左侧或需要变量的地方。\n\
  \n字符串连接运算符 (+)\n\nJava 中的`+`运算符是重载的。如果一个运算符被用于执行多种功能，则称其为重载。到目前为止，你已经看到它作为算术加法运算符用于两个数字相加。它也可以用于连接两个字符串。例如，两个字符串`\"\
  abc\"`和`\"xyz\"`可以使用`+`运算符连接为`\"abc\" + \"xyz\"`，生成一个新字符串`\"abcxyz\"`。另一个字符串连接的示例如下：\n\
  \n```\nString str1 = \"Hello\";\nString str2 = \" Alekhya\";\nString str3 = str1\
  \ + str2; // 将 \"Hello Alekhya\" 赋给 str3\n```\n\n字符串连接运算符也用于将基本数据类型和引用数据类型值连接到字符串。本节仅讨论字符串和基本数据类型的连接。当`+`运算符的任一操作数是字符串时，它执行字符串连接。当`+`的两个操作数都是数字时，它执行数字加法。考虑以下代码片段：\n\
  \n```\nint num = 26;\nString str1 = \"Alphabets\";\nString str2 = num + str1; //\
  \ 将 \"26Alphabets\" 赋给 str2\n```\n\n当执行表达式`num + str1`时，`+`运算符充当字符串连接运算符，因为其右侧操作数`str1`是一个`String`。在`num`和`str1`连接之前，`num`被替换为其字符串表示形式，即`\"\
  26\"`。现在，表达式变为`\"26\" + str1`，结果为`\"26Alphabets\"`。表 5-2 列出了基本数据类型值的字符串表示形式。\n\n\
  表 5-2.\n\n基本数据类型值的字符串表示形式\n\n数据类型\n |\n  值\n |\n  字符串表示形式\n |\n\n| --- | --- | ---\
  \ | --- | --- | --- | --- |\n\n`int, short, byte, long`\n |\n  `1678`\n |\n  `\"\
  1678\"`\n |\n\n`0`\n |\n  `\"0\"`\n |\n\n`char`\n |\n  `'A'`\n |\n  `\"A\"`\n |\n\
  \n`'\\u0041'`\n\n(Unicode 转义序列)\n |\n  `\"A\"`\n |\n\n`boolean`\n |\n  `true`\n\
  \ |\n  `\"true\"`\n |\n\n`false`\n |\n  `\"false\"`\n |\n\n`float`\n |\n  `2.5`\n\
  \ |\n  `\"2.5\"`\n |\n\n`0.0F`\n |\n  `\"0.0\"`\n |\n\n`-0.0F`\n |\n  `\"-0.0\"\
  `\n |\n\n`Float.POSITIVE_INFINITY`\n |\n  `\"Infinity\"`\n |\n\n`Float.NEGATIVE_INFINITY`\n\
  \ |\n  `\"-Infinity\"`\n |\n\n`Float.NaN`\n |\n  `\"NaN\"`\n |\n\n`double`\n |\n\
  \  `89.12`\n |\n  `\"89.12\"`\n |\n\n`0.0`\n |\n  `\"0.0\"`\n |\n\n`-0.0`\n |\n\
  \  `\"-0.0\"`\n |\n\n`Double.POSITIVE_INFINITY`\n |\n  `\"Infinity\"`\n |\n\n`Double.NEGATIVE_INFINITY`\n\
  \ |\n  `\"-Infinity\"`\n |\n\n`Double.NaN`\n |\n  `\"NaN\"`\n |\n\n如果`String`变量包含`null`引用，连接运算符会使用字符串`\"\
  null\"`。以下示例说明了在字符串连接中使用基本数据类型值的字符串表示形式：\n\n```\nboolean b1 = true;\nboolean b2\
  \ = false;\nint num = 365;\ndouble d = -0.0;\nchar c = 'A';\nString str1;\nString\
  \ str2 = null;\nstr1 = b1 + \" friends\";  // 将 \"true friends\" 赋给 str1\nstr1 =\
  \ b2 + \" identity\"; // 将 \"false identity\" 赋给 str1\n// 将 \"null and void\" 赋给\
  \ str1。因为 str2 为 null，字符串连接运算符将其替换为字符串 \"null\"\nstr1 = str2 + \" and void\";\n\
  str1 = num + \" days\"; // 将 \"365 days\" 赋给 str1\nstr1 = d + \" zero\";   // 将\
  \ \"-0.0 zero\" 赋给 str1\nstr1 = Double.NaN + \" is absurd\"; // 将 \"NaN is absurd\"\
  \ 赋给 str1\nstr1 = c + \" is a letter\"; // 将 \"A is a letter\" 赋给 str1\nstr1 = \"\
  This is \" + b1;    // 将 \"This is true\" 赋给 str1\n// 将 \"Beyond Infinity\" 赋给 str1\n\
  str1 = \"Beyond \" + Float.POSITIVE_INFINITY\n```\n\n有时，确定使用多个`+`运算符和字符串的表达式的结果可能会令人困惑。以下表达式的结果是什么？\n\
  \n```\n12 + 15 + \" men\"\n```\n\n\n\n结果是 `\"1215 men\"` 还是 `\"27 men\"`？找到正确答案的关键在于判断哪个\
  \ `+` 是算术运算符，哪个 `+` 是字符串连接运算符。\n\n如果两个操作数都是数值，`+` 运算符执行加法。如果任一操作数是字符串，`+` 运算符执行字符串连接。表达式的执行从左到右进行，除非使用括号改变优先级。在表达式\
  \ `12 + 15 + \" men\"` 中，从左数的第一个 `+` 对 `12` 和 `15` 执行加法，结果为 `27`。之后，表达式简化为 `27 +\
  \ \" men\"`。现在，`+` 运算符执行字符串连接，因为右侧操作数 `\" men\"` 是字符串，结果为 `\"27 men\"`。考虑以下代码片段。\n\
  \n```\nint num1 = 12;\nint num2 = 15;\nString str1 = \" men\";\nString str2;\n```\n\
  \n我们想使用三个变量 `num1`、`num2` 和 `str1` 以及 `+` 运算符创建一个字符串 `\"1215 men\"`。我们想将结果赋值给 `str2`。这是第一次尝试。\n\
  \n```\nstr2 = num1 + num2 + str1;\n```\n\n这条语句会将 `\"27 men\"` 赋值给 `str2`。另一种解决方案是将\
  \ `num2 + str1` 放在括号中。\n\n```\nstr2 = num1 + (num2 + str1); // 将 \"1215 men\" 赋值给\
  \ str2\n```\n\n括号内的表达式首先被求值。表达式 `(num2 + str1)` 首先被求值，将表达式简化为 `num1` + `\"15 men\"\
  `，进而求值为 `\"1215 men\"`。另一种选择是在表达式开头放置一个空字符串。\n\n```\nstr2 = \"\" + num1 + num2 +\
  \ str1; // 将 \"1215 men\" 赋值给 str1\n```\n\n在这种情况下，`\"\" + num1` 首先被求值，结果为 `\"12\"\
  `，将表达式简化为 `\"12\" + num2 + str1`。现在，`\"12\" + num2` 被求值，结果为 `\"1215\"`。现在，表达式简化为\
  \ `\"1215\" + \" men\"`，结果为字符串 `\"1215 men\"`。你也可以在表达式中 `num1` 和 `num2` 之间放置一个空字符串来获得相同的结果。\n\
  \n```\nstr2 = num1 + \"\" + num2 + str1; // 将 \"1215 men\" 赋值给 str2\n```\n\n有时，字符串连接比你想象的更棘手。考虑以下代码片段。\n\
  \n```\nboolean b = false;\nint num = 15;\nString str1 = “faces\";\nString str2 =\
  \ b + num + str1; // 编译时错误\n```\n\n最后一条语句会产生编译时错误。这条语句有什么问题？你期望字符串 `\"false15faces\"\
  ` 被赋值给 `str2`，不是吗？让我们分析表达式 `b + num + str1`。从左数的第一个 `+` 运算符是算术运算符还是字符串连接运算符？要使 `+`\
  \ 运算符成为字符串连接运算符，其至少一个操作数必须是字符串。由于 `b` 和 `num` 都不是字符串，因此 `b + num + str1` 中从左数的第一个\
  \ `+` 运算符不是字符串连接运算符。\n\n它是算术加法运算符吗？它的操作数是 `boolean` 类型（`b`）和 `int` 类型（`num`）。你已经学过，算术加法运算符（`+`）不能有\
  \ `boolean` 类型的操作数。表达式 `b + num` 中存在 `boolean` 操作数导致了编译时错误。`boolean` 不能与数字相加。但是，如果另一个操作数是字符串，`+`\
  \ 运算符可以作为字符串连接运算符对 `boolean` 进行操作。要纠正此错误，你可以通过多种方式重写表达式，如下所示：\n\n```\nstr2 = b +\
  \ (num + str1);     // 正确。将 \"false15faces\" 赋值给 str2\nstr2 = \"\" + b + num + str1;\
  \  // 正确。将 \"false15faces\" 赋值给 str2\nstr2 = b + \"\" + num + str1;  // 正确。将 \"\
  false15faces\" 赋值给 str2\n```\n\n你使用 `println()` 或 `print()` 方法在标准输出上打印消息，如下所示。\n\
  \n```\nSystem.out.println(\"在文本末尾打印一个新行\");\nSystem.out.print(\"不在文本末尾打印新行\");\n\
  ```\n\n如果你使用 `System.out.println()` 方法在控制台打印文本，打印文本后，它还会在文本末尾打印一个新行字符。使用 `println()`\
  \ 和 `print()` 的唯一区别在于，前者在文本末尾打印一个新行，而后者不会。`println()` 和 `print()` 方法是重载的。到目前为止，你只看到它们与字符串参数一起使用。你可以将任何\
  \ Java 数据类型参数传递给这两个方法。以下代码片段说明了如何将 Java 原始类型作为参数传递给这些方法。\n\n```\nint num = 156;\n\
  // 在控制台打印 156\nSystem.out.println(num);\n// 在控制台打印 Value of num = 156\nSystem.out.println(\"\
  Value of num = \" + num);\n// 在控制台打印一个新行字符\nSystem.out.println();\n```\n\n清单 5-2\
  \ 包含一个完整的程序，演示了算术运算符和字符串连接运算符的使用。\n\n```\n// ArithOperator.java\npackage com.jdojo.operator;\n\
  class ArithOperator {\npublic static void main(String[] args) {\nint num = 120;\n\
  double realNum = 25.5F;\ndouble veryBigNum = 25.8 / 0.0;\ndouble garbage = 0.0 /\
  \ 0.0;\nboolean test = true;\n// 打印 num 的值\nSystem.out.println(\"num = \" + num);\n\
  // 打印 realNum 的值\nSystem.out.println(\"realNum = \" + realNum);\n// 打印 veryBigNum\
  \ 的值\nSystem.out.println(\"veryBigNum = \" + veryBigNum);\n// 打印 garbage 的值\nSystem.out.println(\"\
  garbage = \" + garbage);\n// 打印 test 的值\nSystem.out.println(\"test = \" + test);\n\
  // 打印 int 类型的最大值\nSystem.out.println(\"Maximum int = \" + Integer.MAX_VALUE);\n\
  // 打印 double 类型的最大值\nSystem.out.println(\"Maximum double = \" + Double.MAX_VALUE);\n\
  // 打印两个数的和\nSystem.out.println(\"12.5 + 100 = \" + (12.5 + 100));\n// 打印两个数的差\n\
  System.out.println(\"12.5 - 100 = \" + (12.5 - 100));\n// 打印两个数的乘积\nSystem.out.println(\"\
  12.5 * 100 = \" + (12.5 * 100));\n// 打印除法结果\nSystem.out.println(\"12.5 / 100 = \"\
  \ + (12.5 / 100));\n// 打印取模结果\nSystem.out.println(\"12.5 % 100 = \" + (12.5 % 100));\n\
  // 打印字符串连接结果\nSystem.out.println(\"\\\"abc\\\" + \\\"xyz\\\" = \" + \"\\\"\" + (\"\
  abc\" + \"xyz\") + \"\\\"\");\n}\n}\nnum = 120\nrealNum = 25.5\nveryBigNum = Infinity\n\
  garbage = NaN\ntest = true\nMaximum int = 2147483647\nMaximum double = 1.7976931348623157E308\n\
  12.5 + 100 = 112.5\n12.5 - 100 = -87.5\n12.5 * 100 = 1250.0\n12.5 / 100 = 0.125\n\
  12.5 % 100 = 12.5\n\"abc\" + \"xyz\" = \"abcxyz\"\n清单 5-2.\n使用 Java 运算符的示例\n```\n\
  \n关系运算符\n\n关系运算符比较其操作数的值。此类比较的几个示例包括相等性、不等性、大于、小于等比较。Java 支持七个关系运算符，其中六个列在表 5-3\
  \ 中。第七个是 `instanceof` 运算符，我将在本书后面讨论。\n\n表 5-3.\n\nJava 中的关系运算符列表\n\n运算符\n |\n  含义\n\
  \ |\n  类型\n |\n  用法\n |\n  结果\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\
  \ --- | --- | --- | --- |\n\n`==`\n |\n  等于\n |\n  二元\n |\n  `3 == 2`\n |\n  `false`\n\
  \ |\n\n`!=`\n |\n  不等于\n |\n  二元\n |\n  `3 != 2`\n |\n  `true`\n |\n\n`>`\n |\n\
  \  大于\n |\n  二元\n |\n  `3 > 2`\n |\n  `true`\n |\n\n`>=`\n |\n  大于或等于\n |\n  二元\n\
  \ |\n  `3 >= 2`\n |\n  `true`\n |\n\n`<`\n |\n  小于\n |\n  二元\n |\n  `3 < 2`\n |\n\
  \  `false`\n |\n\n`<=`\n |\n  小于或等于\n |\n  二元\n |\n  `3 <= 2`\n |\n  `false`\n |\n\
  \n所有关系运算符都是二元运算符。也就是说，它们接受两个操作数。关系运算符产生的结果始终是 `boolean` 值：`true` 或 `false`。\n\n\
  相等运算符 (==)\n\n相等运算符 (`==`) 的使用形式如下：\n\n```\noperand1 == operand2\n```\n\n相等运算符用于测试两个操作数是否相等。它使用以下规则。\n\
  \n\n\n*   两个操作数必须同为基本类型或同为引用类型。不允许混合使用操作数类型。\n\n*   对于基本类型的操作数，如果两个操作数表示相同的值，则返回\
  \ `true`；否则返回 `false`。两个操作数必须同为数值类型或同为 `boolean` 类型。不允许混合使用数值类型和 `boolean` 类型。\n\
  \n*   对于引用类型的操作数，如果两个操作数指向内存中的同一个对象，则返回 `true`；否则返回 `false`。\n\n假设有一个名为 `i` 的 `int`\
  \ 变量，声明如下：\n\n```\nint i = 10;\n```\n\n现在，`i == 10` 将测试 `i` 是否等于 10。因为 `i` 等于 `10`，所以表达式\
  \ `i == 10` 的计算结果为 `true`。考虑另一个例子：\n\n```\nint i;\nint j;\nint k;\nboolean b;\n\
  i = j = k = 15;    // 将 15 赋值给 i, j 和 k\nb = (i == j == k); // 编译时错误\n```\n\n在这个例子中，你试图测试三个变量\
  \ `i`、`j` 和 `k` 是否具有相同的值，但表达式 `(i == j == k)` 导致了错误。为什么会出错？表达式 `(i == j == k)` 的计算过程如下：\n\
  \n*   首先，在表达式 `i == j == k` 中计算 `i == j`。由于 `i` 和 `j` 的值相同，都是 15，因此表达式 `i == j`\
  \ 返回 `true`。\n\n*   第一步将表达式 `i == j == k` 简化为 `true == k`。这是一个错误，因为 `==` 运算符的操作数分别是\
  \ `boolean` 和 `int` 类型。你不能在相等性运算符中混合使用 `boolean` 和数值类型的操作数。\n\n当相等性运算符的操作数为浮点类型时，适用以下规则。\n\
  \n规则 #1\n\n负零（-0.0）和正零（0.0）被视为相等。回想一下，-0.0 和 0.0 在内存中的存储方式是不同的。\n\n```\ndouble d1\
  \ = 0.0;\ndouble d2 = -0.0;\nboolean b = (d1 == d2); // 将 true 赋值给 b\n```\n\n规则\
  \ #2\n\n正无穷大和负无穷大被视为不相等。\n\n```\ndouble d1 = Double.POSITIVE_INFINITY;\ndouble d2\
  \ = Double.NEGATIVE_INFINITY;\nboolean b = (d1 == d2); // 将 false 赋值给 b\n```\n\n\
  规则 #3\n\n如果任一操作数是 `NaN`，则相等性测试返回 `false`。\n\n```\ndouble d1 = Double.NaN;\ndouble\
  \ d2 = 5.5;\nboolean b = (d1 == d2); // 将 false 赋值给 b\n```\n\n请注意，即使两个操作数都是 `NaN`，相等性运算符也会返回\
  \ `false`。\n\n```\nd1 = Double.NaN;\nd2 = Double.NaN;\nb = (d1 == d2); // 将 false\
  \ 赋值给 b\n```\n\n如何测试存储在 `float` 或 `double` 变量中的值是否为 `NaN`？如果你编写以下代码来测试 `double`\
  \ 变量 `d1` 的值是否为 `NaN`，它将始终返回 `false`。\n\n```\ndouble d1 = Double.NaN;\nboolean b\
  \ = (d1 == Double.NaN); // 将 false 赋值给 b。错误的测试方式\n```\n\n`Float` 和 `Double` 类有一个\
  \ `isNaN()` 方法，该方法分别接受一个 `float` 和一个 `double` 参数。如果参数是 `NaN`，则返回 `true`；否则返回 `false`。例如，要测试\
  \ `d1` 是否为 `NaN`，可以将之前的表达式重写如下：\n\n```\ndouble d1 = Double.NaN;\n// 将 true 赋值给 b。测试\
  \ NaN 值的正确方式\nb = Double.isNaN(d1);\n```\n\n你不应该使用 `==` 运算符来测试两个字符串是否相等。例如，\n\n\
  ```\nString str1 = new String(\"Hello\");\nString str2 = new String(\"Hello\");\n\
  boolean b;\nb = (str1 == str2); // 将 false 赋值给 b\n```\n\nJava 中的 `new` 运算符总是在内存中创建一个新对象。因此，`str1`\
  \ 和 `str2` 指向内存中的两个不同对象，这就是 `str1 == str2` 计算结果为 `false` 的原因。内存中的两个 `String` 对象确实具有相同的内容。每当\
  \ `==` 运算符与引用变量一起使用时，它总是比较其操作数所引用的对象的引用。要比较两个 `String` 变量 `str1` 和 `str2` 所表示的文本，你应该使用\
  \ `String` 类的 `equals()` 方法，如下所示：\n\n```\n// 将 true 赋值给 b，因为 str1 和 str2 具有相同的文本\
  \ \"Hello\"\nb = str1.equals(str2);\n// 将 true 赋值给 b，因为 str1 和 str2 具有相同的文本 \"Hello\"\
  \nb = str2.equals(str1);\n```\n\n我将在第 15 章（涵盖字符串）中进一步讨论字符串比较。\n\n不等运算符 (!=)\n\n\
  不等运算符（`!=`）的使用形式如下：\n\n```\noperand1 != operand2\n```\n\n如果 `operand1` 和 `operand2`\
  \ 不相等，则不等运算符返回 `true`。否则返回 `false`。不等运算符（`!=`）的操作数数据类型规则与相等性运算符（`==`）相同。以下是使用不等运算符的一些示例：\n\
  \n```\nint i = 15;\nint j = 10;\nint k = 15;\nboolean b;\nb = (i != j);        //\
  \ 将 true 赋值给 b\nb = (i != k);        // 将 false 赋值给 b\nb = (true != true);  // 将\
  \ false 赋值给 b\nb = (true != false); // 将 true 赋值给 b\n```\n\n如果任一操作数是 `NaN`（`float`\
  \ 或 `double`），则不等运算符返回 `true`。如果 `d1` 是一个浮点变量（`double` 或 `float`），那么当且仅当 `d1` 是\
  \ `NaN` 时，`d1 == d1` 返回 `false`，`d1 != d1` 返回 `true`。\n\n大于运算符 (>)\n\n大于运算符（>）的使用形式如下：\n\
  \n```\noperand1 > operand2\n```\n\n如果 `operand1` 的值大于 `operand2` 的值，则大于运算符返回 `true`。否则返回\
  \ `false`。大于运算符只能用于基本数值数据类型。如果任一操作数是 `NaN`（`float` 或 `double`），则返回 `false`。以下是使用此运算符的一些示例：\n\
  \n```\nint i = 10;\nint j = 15;\ndouble d1 = Double.NaN;\nboolean b;\nb = (i > j);\
  \ // 将 false 赋值给 b\nb = (j > i); // 将 true 赋值给 b\n// 编译时错误。> 不能与 boolean 操作数一起使用\n\
  b = (true > false);\nb = (d1 > Double.NaN); // 将 false 赋值给 b\nString str1 = \"Hello\"\
  ;\nString str2 = \"How is Java?\";\n// 编译时错误。> 不能与引用类型操作数 str1 和 str2 一起使用\nb =\
  \ (str1 > str2);\n```\n\n如果你想测试 `String str1` 中的字符数是否大于 `str2` 中的字符数，你应该使用 `String`\
  \ 类的 `length()` 方法。`String` 类的 `length()` 方法返回字符串中的字符数。例如，\n\n```\ni = str1.length();\
  \ // 将 5 赋值给 i。\"Hello\" 有 5 个字符\nb = (str1.length() > str2.length()); // 将 false\
  \ 赋值给 b\nb = (str2.length() > str1.length()); // 将 true 赋值给 b\n```\n\n大于或等于运算符 (>=)\n\
  \n大于或等于运算符（`>=`）的使用形式如下：\n\n```\noperand1 >= operand2\n```\n\n如果 `operand1` 的值大于或等于\
  \ `operand2` 的值，则大于或等于运算符返回 `true`。否则返回 `false`。大于或等于运算符只能用于基本数值数据类型。如果任一操作数是 `NaN`（`float`\
  \ 或 `double`），则大于或等于运算符返回 `false`。以下是使用此运算符的一些示例：\n\n```\nint i = 10;\nint j = 10;\n\
  boolean b;\nb = (i >= j);  // 将 true 赋值给 b\nb = (j >= i);  // 将 true 赋值给 b\n```\n\
  \n小于运算符 (<)\n\n小于运算符（`<`）的使用形式如下：\n\n```\noperand1 < operand2\n```\n\n如果 `operand1`\
  \ 小于 `operand2`，则小于运算符返回 `true`。否则返回 `false`。该运算符只能用于基本数值数据类型。如果任一操作数是 `NaN`（`float`\
  \ 或 `double`），则小于运算符返回 `false`。以下是使用此运算符的一些示例：\n\n```\nint i = 10;\nint j = 15;\n\
  double d1 = Double.NaN;\nboolean b;\nb = (i < j);  // 将 true 赋值给 b\nb = (j < i);\
  \  // 将 false 赋值给 b\n// 编译时错误。< 不能与 boolean 操作数一起使用\nb = (true < false);\nb = (d1\
  \ < Double.NaN); // 将 false 赋值给 b\n```\n\n小于或等于运算符 (<=)\n\n小于或等于运算符（`<=`）的使用形式如下：\n\
  \n```\noperand1 <= operand2\n```\n\n\n\n小于等于运算符在 `operand1` 的值小于或等于 `operand2` 的值时返回\
  \ `true`，否则返回 `false`。该运算符只能用于基本数值数据类型。如果任一操作数为 `NaN`（`float` 或 `double` 类型），则小于等于运算符返回\
  \ `false`。以下是使用该运算符的几个示例：\n\n```\nint i = 10;\nint j = 10;\nint k = 15;\nboolean\
  \ b;\nb = (i <= j);  // 将 true 赋给 b\nb = (j <= i);  // 将 true 赋给 b\nb = (j <= k);\
  \  // 将 true 赋给 b\nb = (k <= j);  // 将 false 赋给 b\n```\n\n布尔逻辑运算符\n\n布尔逻辑运算符接收 `boolean`\
  \ 类型的操作数，对其应用布尔逻辑，并产生一个 `boolean` 类型的值。表 5-4 列出了 Java 中可用的 `boolean` 逻辑运算符。所有 `boolean`\
  \ 逻辑运算符只能用于 `boolean` 类型的操作数。后续章节将详细解释这些运算符的用法。\n\n表 5-4.\n\n布尔逻辑运算符列表\n\n运算符\n\
  \ |\n  含义\n |\n  类型\n |\n  用法\n |\n  结果\n |\n\n| --- | --- | --- | --- | --- | ---\
  \ | --- | --- | --- | --- | --- |\n\n`!`\n |\n  逻辑非\n |\n  一元\n |\n  `!true`\n |\n\
  \  `false`\n |\n\n`&&`\n |\n  短路与\n |\n  二元\n |\n  `true && true`\n |\n  `true`\n\
  \ |\n\n`&`\n |\n  逻辑与\n |\n  二元\n |\n  `true & true`\n |\n  `true`\n |\n\n`&#124;&#124;`\n\
  \ |\n  短路或\n |\n  二元\n |\n  `true &#124;&#124; false`\n |\n  `true`\n |\n\n`&#124;`\n\
  \ |\n  逻辑或\n |\n  二元\n |\n  `true &#124; false`\n |\n  `true`\n |\n\n`^`\n |\n \
  \ 逻辑异或\n |\n  二元\n |\n  `true ^ true`\n |\n  `false`\n |\n\n`&=`\n |\n  与赋值\n |\n\
  \  二元\n |\n  `test &= true`\n |\n   |\n\n`&#124;=`\n |\n  或赋值\n |\n  二元\n |\n  `test\
  \ &#124;= true`\n |\n   |\n\n`^=`\n |\n  异或赋值\n\n|\n  二元\n |\n  `test ^= true`\n\
  \ |\n   |\n\n逻辑非运算符 (!)\n\n逻辑 `NOT` 运算符（`!`）的使用形式如下：\n\n```\n!operand\n```\n\n如果\
  \ `operand` 为 `false`，该运算符返回 `true`；如果 `operand` 为 `true`，则返回 `false`。\n\n```\n\
  boolean b;\nb = !true;     // 将 false 赋给 b\nb = !false;    // 将 true 赋给 b\nint i\
  \ = 10;\nint j = 15;\nboolean b1 = true;\nb = !b1;      // 将 false 赋给 b\nb = !(i\
  \ > j); // 将 true 赋给 b，因为 i > j 返回 false\n```\n\n假设你想改变一个 `boolean` 变量 `b` 的值：如果当前值为\
  \ `false`，则改为 `true`；如果当前值为 `true`，则改为 `false`。这可以通过以下方式实现。\n\n```\nb = !b; // 如果\
  \ b 为 false 则赋值为 true，如果 b 为 true 则赋值为 false\n```\n\n逻辑短路与运算符 (&&)\n\n逻辑短路 `AND`\
  \ 运算符（`&&`）的使用形式如下：\n\n```\noperand1 && operand2\n```\n\n`&&` 运算符在两个操作数都为 `true`\
  \ 时返回 `true`。如果任一操作数为 `false`，则返回 `false`。它被称为短路 `AND` 运算符，因为如果 `operand1`（左侧操作数）求值为\
  \ `false`，它会在不计算 `operand2`（右侧操作数）的情况下直接返回 `false`。\n\n```\nint i = 10;\nint j =\
  \ 15;\nboolean b = (i > 5 && j > 10);  // 将 true 赋给 b\n```\n\n在这个表达式中，首先计算 `i >\
  \ 5`，它返回 `true`。由于左侧操作数求值为 `true`，右侧操作数也被计算。右侧操作数 `j > 10` 被计算，同样返回 `true`。现在，表达式简化为\
  \ `true && true`。由于两个操作数都为 `true`，最终结果为 `true`。再考虑另一个示例：\n\n```\nint i = 10;\nint\
  \ j = 15;\nboolean b = (i > 20 && j > 10);  // 将 false 赋给 b\n```\n\n表达式 `i > 20`\
  \ 返回 `false`。表达式简化为 `false && j > 10`。由于左侧操作数为 `false`，右侧操作数 `j > 10` 不会被计算，`&&`\
  \ 返回 `false`。然而，在这个示例中无法证明右侧操作数 `j > 10` 未被计算。考虑另一个示例来证明这一点。我们已经讨论过赋值运算符（`=`）。如果\
  \ `num` 是一个 `int` 类型的变量，`num = 10` 会返回值 `10`。\n\n\n\n```\nint num = 10;\nboolean\
  \ b = ((num = 50) > 5); // 将 true 赋值给 b\n```\n\n请注意此示例中括号的使用。在表达式 `((num = 50) >\
  \ 5)` 中，\n`(num = 50)`\n表达式首先被求值。它将 `50` 赋值给 `num` 并返回 `50`，从而将表达式\n简化为 `(50 > 5)`，进而返回\
  \ `true`。如果在\n`num = 50` 表达式执行后使用 `num`\n的值，其值将为 `50`。牢记此\n要点，请考虑以下代码片段。\n\n```\n\
  int i = 10;\nint j = 10;\nboolean b = (i > 5 && ((j = 20) > 15));\nSystem.out.println(\"\
  b = \" + b);\nSystem.out.println(\"i = \" + i);\nSystem.out.println(\"j = \" + j);\n\
  b = true\ni = 10\nj = 20\n```\n\n因为左侧操作数 `i > 5` 求值结果为\n`true`，所以\n右侧操作数 `((j =\
  \ 20) > 15)` 被求值，并且变量 `j` 被赋值为\n20。如果我们修改此代码，使左侧操作数求值结果为\n`false`，则\n右侧操作数将不会被求值，`j`\
  \ 的值将保持为 `10`。修改后的代码\n如下：\n\n```\nint i = 10;\nint j = 10;\n// ((j = 20) > 5) 不会被求值，因为\
  \ i > 25 返回 false\nboolean b = (i > 25 && ((j = 20) > 15));\nSystem.out.println\
  \ (\"b = \" + b);\nSystem.out.println (\"i = \" + i);\nSystem.out.println (\"j =\
  \ \" + j); // 将打印 j = 10\nb = false\ni = 10\nj = 10\n```\n\n逻辑与运算符 (&)\n\n逻辑 `AND`\n\
  运算符 (`&`) 的使用\n形式为：\n\n```\noperand1 & operand2\n```\n\n如果两个操作数都为 `true`，逻辑 `AND`\n\
  运算符返回 `true`。如果\n任一操作数为 `false`，则返回\n`false`。逻辑\n`AND` 运算符 (`&`) 的工作方式与逻辑短路 `AND`\
  \ 运算符 (`&&`) 相同，但\n有一点区别——即使左侧操作数求值结果为 `false`，逻辑 `AND` 运算符 (`&`) 也会\n求值其右侧操作数。\n\
  \n```\nint i = 10;\nint j = 15;\nboolean b;\nb = (i > 5 & j > 10);            //\
  \ 将 true 赋值给 b\nb = (i > 25 & ((j = 20) > 15));  // 即使 i > 25 返回 false，((j = 20)\
  \ > 5) 也会被求值\nSystem.out.println (\"b = \" + b);\nSystem.out.println (\"i = \" +\
  \ i);\nSystem.out.println (\"j = \" + j); // 将打印 j = 20\nb = false\ni = 10\nj =\
  \ 20\n```\n\n逻辑短路或运算符 (||)\n\n逻辑短路 `OR` 运算符 (`||`) 的使用\n形式为：\n\n```\noperand1 ||\
  \ operand2\n```\n\n如果任一\n操作数为 `true`，逻辑短路 `OR` 运算符返回\n`true`。如果两个\n操作数都为 `false`，则返回\n\
  `false`。它被\n称为短路\n`OR` 运算符\n，因为如果 `operand1` 求值结果为\n`true`，它会在\n不计算 `operand2` 的情况下返回\n\
  `true`。\n\n```\nint i = 10;\nint j = 15;\nboolean b = (i > 5 || j > 10); // 将 true\
  \ 赋值给 b\n```\n\n在此表达式中，首先求值 `i > 5`，它返回 `true`。由于\n左侧操作数求值结果为 `true`，右侧\n操作数不会被求值，表达式\
  \ (`i > 5 || j > 10)` 返回 `true`。考虑\n另一个示例：\n\n```\nint i = 10;\nint j = 15;\nboolean\
  \ b = (i > 20 || j > 10); // 将 true 赋值给 b\n```\n\n表达式\n`i > 20` 返回\n`false`。该\n\
  表达式简化为 `false || j > 10`。因为 `||` 的左侧操作数为 `false`，右侧\n操作数 `j > 10` 被求值，它返回 `true`，整个\n\
  表达式返回 `true`。\n\n逻辑或运算符 (|)\n\n逻辑 `OR`\n运算符 (`|`) 的\n使用形式为：\n\n```\noperand1 | operand2\n\
  ```\n\n如果任一\n操作数为 `true`，逻辑 `OR`\n运算符返回 `true`。如果两个\n操作数都为 `false`，则返回\n`false`。逻辑\n\
  `OR` 运算符的工作方式与逻辑短路 `OR` 运算符相同，但\n有一点区别——即使左侧操作数求值结果为 `true`，逻辑 `OR` 运算符也会\n求值其右侧操作数。\n\
  \n```\nint i = 10;\nint j = 15;\nboolean b = (i > 5 | j > 10); // 将 true 赋值给 b\n\
  ```\n\n在此表达式中，首先求值 `i > 5`，它返回 `true`。即使\n左侧操作数 `i > 5` 求值结果为 `true`，右侧\n操作数 `j\
  \ > 15` 仍然会被求值，整个表达式 `(i > 5 | j > 10)` 返回 `true`。\n\n逻辑异或运算符 (^)\n\n逻辑 `XOR`\n\
  运算符 (`^`) 的\n使用形式为：\n\n```\noperand1 ^ operand2\n```\n\n如果 `operand1` 和 `operand2`\
  \ 不同，逻辑 `XOR`\n运算符返回 `true`。也就是说，如果其中一个\n操作数为 `true`，但并非两者都为 `true`，则返回 `true`。\n\
  如果两个操作数相同，则返回 `false`。\n\n```\nint i = 10;\nboolean b;\nb = true ^ true;      //\
  \ 将 false 赋值给 b\nb = true ^ false;     // 将 true 赋值给 b\nb = false ^ true;     //\
  \ 将 true 赋值给 b\nb = false ^ false;    // 将 false 赋值给 b\nb = (i > 5 ^ i < 15); //\
  \ 将 false 赋值给 b\n```\n\n复合布尔逻辑赋值运算符\n\n有三个复合\n`boolean` 逻辑\n赋值运算符。请注意，Java 中\n没有像\
  \ `&&=` 和 `||=` 这样的运算符。这些运算符\n的使用形式为：\n\n```\noperand1 op= operand2\n```\n\n`operand1`\
  \ 必须\n是一个 `boolean`\n变量，`op`\n可以是 `&`、\n`|` 或 `^`。此形式等价于\n编写：\n\n```\noperand1 =\
  \ operand1 op operand2\n```\n\n表 5-5 展示了\n复合逻辑赋值运算符及其等价形式。\n\n表 5-5.\n\n复合逻辑赋值运算符及其等价形式\n\
