  如果两个操作数求值结果不同，即其中一个\n操作数为 `true` 但并非两者都为 `true`，\n`^=` 返回\n`true`。\n否则，它返回 `false`。\n\
  \n```\nboolean b = true;\nb ^= true;  // 将 false 赋值给 b\nb ^= false; // 将 true 赋值给\
  \ b\n```\n\n三元运算符 (? :)\n\nJava 有一个条件运算符。它被称为\n三元运算符。它接受三个操作数。其使用形式为：\n\n```\nboolean-expression\
  \ ? true-expression : false-expression\n```\n\n两个符号 `?`\n和 `:` 构成了\n三元运算符。如果 `boolean-expression`\n\
  求值结果为 `true`，则求值\n`true-expression`；\n否则，求值 `false-expression`。\n\n假设你有三个整型变量 `num1`、`num2`\
  \ 和 `minNum`。你想将\n`minNum` 赋值为 `num1` 和 `num2` 中的最小值。你可以使用\n三元运算符来实现：\n\n```\nint\
  \ num1 = 50;\nint num2 = 25;\n// 将 num2 赋值给 minNum，因为 num2 小于 num1\nint minNum =\
  \ (num1 < num2 ? num1 : num2);\n```\n\n位运算符\n\n位运算符是一种对其整数操作数\n使用其位模式执行操作的运算符。Java\
