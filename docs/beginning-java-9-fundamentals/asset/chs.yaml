  面向对象范式是一种非常强大的范式，用于在计算模型中模拟现实世界中的现象。我们在日常生活中习惯于与各种对象打交道。面向对象范式自然且直观，因为它让你能够以对象的方式进行思考。然而，它并不能让你正确地以对象的方式进行思考。有时，问题的解决方案并不属于面向对象范式的范畴。在这种情况下，你需要使用最适合问题领域的范式。面向对象范式有一个学习曲线。它远不止是在程序中创建和使用对象那么简单。抽象、封装、多态和继承是面向对象范式的一些重要特性。你必须理解并能够使用这些特性，才能充分利用面向对象范式。我将在后续章节中讨论这些特性。在接下来的章节中，我将详细讨论这些特性以及如何在程序中实现它们。


  举几个例子，C++、Java 和 C#（读作“C sharp”）都是支持面向对象范式的编程语言。请注意，编程语言本身并不是面向对象的。面向对象的是范式。一种编程语言可能具备也可能不具备支持面向对象范式的特性。


  ## 什么是 Java？


  Java 是一种通用编程语言。它具备支持基于面向对象、过程式和函数式范式进行编程的特性。你经常会读到类似“Java 是一种面向对象的编程语言”这样的说法。其含义是
  Java 语言具备支持面向对象范式的特性。编程语言本身并不是面向对象的。面向对象的是范式，而一种编程语言可能具备使其易于实现面向对象范式的特性。有时，程序员会错误地认为所有用
  Java 编写的程序都是面向对象的。Java 也具备支持过程式和函数式范式的特性。你可以用 Java 编写一个 100% 的过程式程序，其中不包含丝毫的面向对象特性。


  Java 平台的初始版本由 Sun Microsystems（自 2010 年 1 月起成为 Oracle 公司的一部分）于 1995 年发布。Java 编程语言的开发始于
  1991 年。最初，该语言被称为 Oak，旨在用于电视机的机顶盒。


  发布后不久，Java 就成为了一种非常流行的编程语言。其流行最重要的特性之一是“一次编写，到处运行”（WORA）特性。这个特性让你只需编写一次 Java 程序，就能在任何平台上运行。例如，你可以在
  UNIX 上编写并编译一个 Java 程序，然后在 Microsoft Windows、Macintosh 或 UNIX 机器上运行，而无需对源代码进行任何修改。WORA
  是通过将 Java 程序编译成一种称为字节码的中间语言来实现的。字节码的格式是与平台无关的。一种称为 Java 虚拟机（JVM）的虚拟机被用于在每个平台上运行字节码。请注意，JVM
  是一个用软件实现的程序。它不是一台物理机器，这就是它被称为“虚拟”机器的原因。JVM 的工作是根据其运行所在的平台，将字节码转换为可执行代码。这个特性使得 Java
  程序与平台无关。也就是说，同一个 Java 程序可以在多个平台上运行，而无需任何修改。


  以下是 Java 在软件行业中流行和被接受的几个特点：


  *   简单性

  *   广泛的使用环境

  *   健壮性


  在这种情况下，简单性可能是一个主观的词。在 Java 发布时，C++ 是软件行业中广泛使用的流行且强大的编程语言。如果你是一名 C++ 程序员，与你的 C++
  经验相比，Java 会在学习和使用上为你提供简单性。Java 保留了 C/C++ 的大部分语法，这有助于 C/C++ 程序员学习这门新语言。更好的是，它排除了
  C++ 中一些最令人困惑且难以正确使用的特性（尽管很强大）。例如，Java 没有 C++ 中存在的指针和多重继承。


  如果你将 Java 作为你的第一门编程语言来学习，那么它是否是一门简单的语言对你来说可能并非如此。这就是为什么我说 Java 或任何编程语言的简单性都是非常主观的。Java
  语言及其库（一组包含 Java 类的包）自首次发布以来一直在不断增长。为了成为一名真正的 Java 开发者，你需要付出一些认真的努力。



  Java 可用于开发能在不同环境中运行的程序。你可以编写 Java 程序，使其在客户端-服务器环境中使用。在早期，Java 程序最流行的用途是开发小程序（applet），但该功能已在
  Java SE 9 中弃用。小程序是嵌入在网页中的 Java 程序，网页使用超文本标记语言（HTML），并在诸如 Microsoft Internet Explorer、Google
  Chrome 等网页浏览器中显示。小程序的代码存储在网页服务器上，当浏览器加载包含小程序引用的 HTML 页面时，代码会被下载到客户端机器上，并在客户端机器上运行。


  Java 包含一些特性，使其易于开发分布式应用程序。分布式应用程序由通过网络连接的不同机器上运行的程序组成。Java 具有易于开发并发应用程序的特性。并发应用程序有多个相互交互的执行线程并行运行。我将在本书后续章节中详细讨论
  Java 平台的这些特性。


  程序的健壮性指的是其合理处理意外情况的能力。程序中的意外情况也称为错误。Java 通过在程序生命周期的不同阶段提供多种错误检查特性来保证健壮性。以下是 Java
  程序中可能出现的三种不同类型的错误：


  *   编译时错误

  *   运行时错误

  *   逻辑错误


  编译时错误也称为语法错误。它们是由 Java 语言语法使用不当引起的，由 Java 编译器检测。存在编译时错误的程序在错误被修正之前无法编译成字节码。语句末尾缺少分号、将十进制值（如
  10.23）赋值给整数类型变量等，都是编译时错误的例子。


  运行时错误发生在 Java 程序运行时。这类错误不会被编译器检测到，因为编译器无法获取所有可用的运行时信息。Java 是一种强类型语言，在编译时和运行时都具有强大的类型检查机制。Java
  提供了一种简洁的异常处理机制来处理运行时错误。当 Java 程序中出现运行时错误时，JVM 会抛出一个异常，程序可以捕获并处理该异常。例如，用零除整数（如 `17/0`）会产生运行时错误。Java
  通过提供内置的自动内存分配和释放机制，避免了关键性的运行时错误，如内存溢出和内存泄漏。自动内存释放的特性被称为垃圾回收。


  逻辑错误是程序中最关键的错误，且难以发现。它们是由程序员错误地实现功能需求而引入的。这类错误无法被 Java 编译器或 Java 运行时检测到。当应用程序测试人员或用户将程序的实际行为与其预期行为进行比较时，才会发现它们。有时，一些逻辑错误可能会潜入生产环境，甚至在应用程序退役后仍未被察觉。


  程序中的错误被称为 bug。查找并修复程序中 bug 的过程被称为调试。所有现代集成开发环境（IDE），如 NetBeans、Eclipse、JDeveloper
  和 IntelliJ IDEA，都为程序员提供了一种称为调试器的工具，它允许程序员逐步运行程序，并在每一步检查程序状态以检测 bug。调试是程序员日常工作中的现实情况。如果你想成为一名优秀的程序员，你必须学习并善于使用你用来开发
  Java 程序的开发工具所附带的调试器。


  ## 面向对象范式与 Java


  面向对象范式支持四大主要原则：抽象、封装、继承和多态。它们也被称为面向对象范式的四大支柱。抽象是暴露实体的基本细节，同时忽略无关细节以降低用户复杂度的过程。封装是将数据和对数据的操作捆绑在一个实体中的过程。继承用于从现有类型派生新类型，从而建立父子关系。多态允许一个实体在不同上下文中呈现不同含义。这四大原则将在后续章节中详细讨论。




  ### 抽象


  程序为现实世界的问题提供解决方案。程序的规模可能从几行到几百万行不等。它可以被编写成一个整体结构，从第一行到第一百万行都在一个地方运行。如果整体程序的规模超过
  25 到 50 行，编写、理解和维护就会变得更加困难。为了便于维护，大型整体程序必须分解为更小的子程序。然后，这些子程序被组合在一起以解决原始问题。在分解程序时必须谨慎。所有子程序都必须足够简单和小巧，以便能够独立理解，并且当它们组合在一起时，必须能够解决原始问题。让我们考虑以下对某个设备的需求：


  > 设计并开发一种设备，让用户能够使用所有英文字母、数字和符号输入文本。


  设计这种设备的一种方法是提供一个键盘，该键盘拥有所有字母、数字和符号所有可能组合的按键。这个方案并不合理，因为设备的尺寸会非常巨大。你可能会意识到，我们正在讨论的是设计一个键盘。看看你的键盘，了解它是如何设计的。它将输入文本的问题分解为一次输入一个字母、一个数字或一个符号，这代表了原始问题的更小部分。如果你能一次输入所有字母、所有数字和所有符号，你就可以输入任意长度的文本。


  原始问题的另一种分解方案可能包括两个按键：一个用于输入水平线，另一个用于输入垂直线，用户可以用它们输入`E`、`T`、`I`、`F`、`H`和`L`，因为这些字母仅由水平线和垂直线组成。通过这个方案，用户只需组合使用两个按键就能输入六个字母。然而，根据你使用键盘的经验，你可能会意识到，将按键分解到每个按键只能输入字母的一部分，这并非一个合理的方案，尽管它确实是一个方案。


  为什么提供两个按键来输入六个字母不是一个合理的方案？我们不是在节省键盘上的空间和按键数量吗？在这个语境下，“合理”一词的使用是相对的。从纯粹主义的角度来看，这可能是一个合理的方案。我称之为“不合理”的理由是，它不容易被用户理解。它向用户暴露了比必要更多的细节。用户必须记住，水平线在顶部表示`T`，在底部表示`L`。当用户为每个字母配备一个单独的按键时，他就不必处理这些细节。重要的是，为原始问题各部分提供解决方案的子程序必须被简化，使其具有相同的细节层次，以便无缝协作。同时，子程序不应暴露他人使用它时无需了解的细节。


  最后，所有按键都安装在键盘上，并且可以单独更换。如果一个按键坏了，可以在不影响其他按键的情况下进行更换。类似地，当程序被分解为子程序时，对一个子程序的修改不应影响其他子程序。子程序还可以通过关注不同层次的细节并忽略其他细节来进一步分解。良好的程序分解旨在提供以下特性：


  *   **简单性**

  *   **隔离性**

  *   **可维护性**


  每个子程序都应足够简单，以便能够独立理解。简单性是通过关注相关信息并忽略无关信息来实现的。哪些信息相关、哪些无关，取决于上下文。


  每个子程序都应与其他子程序隔离，以便对子程序的任何修改都能将影响局部化。对一个子程序的修改不应影响任何其他子程序。子程序定义了一个与其他子程序交互的接口。子程序的内部细节对外部世界是隐藏的。只要子程序的接口保持不变，其内部细节的修改就不应影响与之交互的其他子程序。


  每个子程序都应足够小，以便于编写、理解和维护。


  所有这些特性都是在分解问题（或解决问题的程序）时，通过一个称为**抽象**的过程实现的。抽象是一种通过关注相关细节并忽略特定上下文中无关细节来分解问题的方法。请注意，问题的任何细节都不是无关的。换句话说，问题的每一个细节都是相关的。然而，某些细节可能在一个上下文中相关，而在另一个上下文中无关。重要的是要认识到，是“上下文”决定了哪些细节相关，哪些无关。例如，考虑设计和开发键盘的问题。从用户的角度来看，键盘由可以按下和释放以输入文本的按键组成。按键的数量、类型、大小和位置是键盘用户唯一相关的细节。然而，按键并不是键盘的全部细节。键盘有电子电路，并且连接到计算机。当用户按下按键时，键盘和计算机内部会发生很多事情。键盘的内部工作原理与键盘设计者和制造者相关。然而，它们与键盘用户无关。可以说，不同的用户在不同的上下文中对同一事物有不同的看法。关于该事物的哪些细节相关、哪些无关，取决于用户和上下文。


  抽象就是考虑那些在特定上下文中以适当方式查看问题所必需的细节，并忽略（隐藏、抑制或遗忘）那些不必要的细节。在抽象的语境中，“隐藏”和“抑制”等术语可能具有误导性。这些术语可能意味着隐藏问题的某些细节。抽象关注的是，为了特定目的，应该考虑事物的哪些细节，不应该考虑哪些细节。它确实意味着对细节的隐藏。事物如何被隐藏是另一个概念，称为信息隐藏，这将在下一节讨论。


  术语“抽象”用于指代两种事物之一：一个过程或一个实体。作为一个过程，它是一种提取问题相关细节并忽略无关细节的技术。作为一个实体，它是问题的一种特定视图，该视图考虑了一些相关细节并忽略了无关细节。




  #### 抽象化：隐藏复杂性


  让我们讨论一下抽象化在实际编程中的应用。假设你想编写一个程序，计算两个整数之间所有整数的和。比如，你想计算 10 到 20 之间所有整数的和。你可以按如下方式编写程序。如果你不理解本节程序中使用的语法，不必担心；只需尝试理解如何使用抽象化来分解程序的大致思路。


  ```

  int sum = 0;

  int counter = 10;

  while (counter <= 20) {

  sum = sum + counter;

  counter = counter + 1;

  }

  System.out.println(sum);

  ```


  这段代码将计算 `10 + 11 + 12 + … + 20` 的和，并输出 `165`。假设你想计算 `40` 到 `60` 之间所有整数的和。以下是实现该功能的程序：


  ```

  int sum = 0;

  int counter = 40;

  while (counter <= 60) {

  sum = sum + counter;

  counter = counter + 1;

  }

  System.out.println(sum);

  ```


  这段代码将计算 `40` 到 `60` 之间所有整数的和，并输出 `1050`。请注意两段代码之间的相似之处和不同之处。两者的逻辑是相同的。然而，范围的上下限不同。如果你能忽略这两段代码之间的差异，就能避免在两个地方重复相同的逻辑。让我们看看下面这段代码：


  ```

  int sum = 0;

  int counter = lowerLimit;

  while (counter <= upperLimit) {

  sum = sum + counter;

  counter = counter + 1;

  }

  System.out.println(sum);

  ```


  这一次，你没有为任何范围的上下限使用实际值。相反，你使用了 `lowerLimit` 和 `upperLimit` 这两个在编写代码时未知的占位符。通过在代码中使用两个占位符，你隐藏了范围上下限的具体身份。换句话说，在编写这段代码时，你忽略了它们的实际值。通过忽略范围上下限的实际值，你在代码中应用了抽象化的过程。


  当这段代码被执行时，必须用实际值替换 `lowerLimit` 和 `upperLimit` 这两个占位符。在编程语言中，这是通过将代码片段打包到一个称为过程的模块（子例程或子程序）中来实现的。这些占位符被定义为该过程的形式参数。清单
  1-2 展示了这样一个过程的代码。


  ```

  int getRangeSum(int lowerLimit, int upperLimit) {

  int sum = 0;

  int counter = lowerLimit;

  while (counter <= upperLimit) {

  sum = sum + counter;

  counter = counter + 1;

  }

  return sum;

  }

  清单 1-2.

  一个名为 getRangeSum 的过程，用于计算两个整数之间所有整数的和

  ```


  一个过程有一个名称，本例中为 `getRangeSum`。一个过程有一个返回类型，位于其名称之前。返回类型指明了它将返回给调用者的值的类型。本例中返回类型为 `int`，表示计算结果将是一个整数。一个过程有形式参数（可能为零个），位于其名称后的括号内。形式参数由数据类型和名称组成。本例中，形式参数名为
  `lowerLimit` 和 `upperLimit`，且两者数据类型均为 `int`。它有一个主体，位于花括号内。过程的主体包含了逻辑。


  当你想执行一个过程的代码时，必须为其形式参数传递实际值。你可以按如下方式计算并输出 10 到 20 之间所有整数的和：


  ```

  int s1 = getRangeSum(10, 20);

  System.out.println(s1);

  ```


  这段代码将输出 `165`。要计算 40 到 60 之间所有整数的和，你可以执行以下代码：


  ```

  int s2 = getRangeSum(40, 60);

  System.out.println(s2);

  ```


  这段代码将输出 `1050`，这与之前得到的结果完全相同。


  你在定义 `getRangeSum` 过程时使用的抽象化方法称为**参数化抽象**。过程中的形式参数用于隐藏过程主体所操作的实际数据的身份。`getRangeSum`
  过程中的两个参数隐藏了整数范围上下限的具体身份。现在你已经看到了抽象化的第一个具体例子。抽象化是一个庞大的主题。在本节中，我将介绍一些关于抽象化的更基础的内容。


  假设一个程序员编写了清单 1-2 中所示的 `getRangeSum` 过程的代码，而另一个程序员想要使用它。第一个程序员是过程的设计者和编写者；第二个是过程的使用者。`getRangeSum`
  过程的使用者需要了解哪些信息才能使用它？


  在回答这个问题之前，让我们考虑一个设计和使用的真实世界例子：DVD（数字多功能光盘）播放器。DVD 播放器由电子工程师设计和开发。你如何使用 DVD 播放器？在使用
  DVD 播放器之前，你不会打开它去研究所有基于电子工程理论的部件细节。当你购买它时，会附带一本使用手册。DVD 播放器被封装在一个盒子里。盒子隐藏了内部播放器的细节。同时，盒子以接口的形式向外界暴露了播放器的一些细节。DVD
  播放器的接口包括以下项目：


  *   用于连接电源插座、电视机等的输入和输出连接端口

  *   用于插入 DVD 的面板

  *   一组用于执行弹出、播放、暂停、快进等操作的按钮


  DVD 播放器附带的手册描述了面向用户的播放器接口的用法。DVD 用户无需担心其内部工作原理的细节。手册还描述了一些操作条件。例如，你必须将电源线插入电源插座并打开电源开关，然后才能使用它。


  程序的设计、开发和使用方式与 DVD 播放器相同。清单 1-2 中所示的程序的使用者无需担心用于实现该程序的内部逻辑。程序的使用者只需要知道其用法，包括使用它的接口，以及使用前后必须满足的条件。换句话说，你需要为
  `getRangeSum` 过程提供一个描述其用法的“手册”。`getRangeSum` 过程的使用者需要阅读其手册才能使用它。程序的“手册”被称为其**规约**。有时它也被称为文档或注释。它提供了另一种抽象化方法，称为**规约抽象**。它描述（或暴露、聚焦）程序的“做什么”部分，并向使用者隐藏（或忽略、抑制）程序的“如何做”部分。


  清单 1-3 展示了带有其规约的相同 `getRangeSum` 过程代码。




  ```

  /**

  * 计算并返回由 lowerLimit 和 upperLimit 参数指定的两个整数之间所有整数的和。

  *

  * lowerLimit 参数必须小于或等于 upperLimit 参数。如果 lowerLimit 和 upperLimit 之间所有整数的和

  * 超出了 int 数据类型的范围，则结果未定义。

  *

  * @param lowerLimit 整数范围的下限

  * @param upperLimit 整数范围的上限

  * @return 从 lowerLimit（含）到 upperLimit（含）之间所有整数的和

  */

  public static int getRangeSum(int lowerLimit, int upperLimit) {

  int sum = 0;

  int counter = lowerLimit;

  while (counter <= upperLimit) {

  sum = sum + counter;

  counter = counter + 1;

  }

  return sum;

  }

