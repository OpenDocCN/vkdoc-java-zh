  \ step)`\n\n这些方法会生成一个有序的 `LocalDate` 顺序流。我将在本系列第二卷的第 13 章中介绍流。流中的第一个元素是调用该方法的 `LocalDate`。`datesUntil(LocalDate\
  \ endExclusive)` 方法每次将流中的元素增加一天。`datesUntil(LocalDate endExclusive, Period step)`\
  \ 方法则按指定的 `step` 递增日期。指定的结束日期是排除在外的。你可以对返回的流执行多种有用的计算。以下代码片段统计了 2017 年星期日的数量。请注意，代码使用\
  \ 2018 年 1 月 1 日作为结束日期（排除在外），这将使流返回 2017 年的所有日期。\n\n```\nlong sundaysIn2017 = LocalDate.of(2017,\
