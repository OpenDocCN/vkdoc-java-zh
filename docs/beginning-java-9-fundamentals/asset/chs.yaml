  该规范提供了 `getRangeSum` 过程的描述（“做什么”部分）。它还指定了两个条件，称为前置条件，这些条件在调用该过程时必须为真。第一个前置条件是下限必须小于或等于上限。第二个前置条件是下限和上限的值必须足够小，使得它们之间所有整数的和能够容纳在
  `int` 数据类型的大小内。它还指定了另一个称为后置条件的条件，该条件在“返回”子句中指定。只要前置条件成立，后置条件就成立。前置条件和后置条件就像程序与其用户之间的契约（或协议）。它表明，只要程序的用户确保前置条件成立，程序就保证后置条件成立。请注意，该规范从未告诉用户程序如何实现（实现细节）后置条件。它只说明“做什么”，而不是“怎么做”。拥有该规范的
  `getRangeSum` 程序的用户无需查看 `getRangeSum` 过程的主体来弄清楚其使用的逻辑。换句话说，通过向用户提供此规范，您已经隐藏了 `getRangeSum`
  过程的实现细节。也就是说，`getRangeSum` 过程的用户在使用时可以忽略其实现细节。这是抽象的另一个具体示例。通过使用规范来隐藏子程序（“怎么做”部分）的实现细节并公开其用法（“做什么”部分）的方法称为**通过规范实现抽象**。


  通过参数化实现抽象和通过规范实现抽象允许程序的用户将程序视为一个黑盒，他们只关心程序产生的效果，而不关心程序如何产生这些效果。图 1-5 描绘了用户对 `getRangeSum`
  过程的视图。请注意，用户看不到（也不需要看到）包含细节的过程主体。这些细节仅与程序的编写者相关，与其用户无关。


