  \n转换字符\n\n不同的转换字符用于格式化不同数据类型的值。例如，`s` 用于将值格式化为字符串。格式说明符中其他部分的有效值也由转换字符以及格式说明符所引用的参数的数据类型决定。基于数据类型的格式化类型可以大致分为四类：\n\
  \n*   通用格式化\n*   字符格式化\n*   数值格式化\n*   日期/时间格式化\n\n许多转换字符都有大写变体。例如，`S` 是 `s` 的大写变体。大写变体会将格式化后的输出转换为大写，就像调用了\
