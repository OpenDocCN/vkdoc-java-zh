  \ 方法。你将这个新类命名为 `SmartIntHolder`。你的 `toString()` 方法应该返回什么？`SmartIntHolder` 类的对象表示一个整数值。仅将存储的整数值作为字符串返回就可以了。你可以使用\
  \ `String` 类的 `valueOf()` 静态方法将整数值（例如 `123`）转换为 `String` 对象，如下所示：\n\n```\nString\
  \ str = String.valueOf(123); // str 包含字符串 \"123\"\n```\n\n清单 11-6 包含了 `SmartIntHolder`\
  \ 类的完整代码。\n\n```\n// SmartIntHolder.java\npackage com.jdojo.object;\npublic class\
  \ SmartIntHolder {\nprivate int value;\npublic SmartIntHolder(int value) {\nthis.value\
  \ = value;\n}\npublic void setValue(int value) {\nthis.value = value;\n}\npublic\
  \ int getValue() {\nreturn value;\n}\n/* 重新实现 Object 类的 toString() 方法 */\n@Override\n\
  public String toString() {\n// 将存储的值作为字符串返回\nString str = String.valueOf(this.value);\n\
  return str;\n}\n}\n清单 11-6.\n在 SmartIntHolder 类中重新实现 Object 类的 toString() 方法\n```\n\
  \n以下代码片段展示了如何使用 `SmartIntHolder` 类的 `toString()` 方法：\n\n```\n// 创建一个 SmartIntHolder\
  \ 类的对象\nSmartIntHolder intHolder = new SmartIntHolder(234);\nString intHolderStr\
  \ = intHolder.toString();\nSystem.out.println(intHolderStr);\n// 更改 SmartIntHolder\
  \ 对象中的值\nintHolder.setValue(8967);\nintHolderStr = intHolder.toString();\nSystem.out.println(intHolderStr);\n\
  ```\n\n```\n\n```\n\n在你的类中重新实现 `toString()` 方法没有特殊的技术要求。你需要确保它被声明为 `public`，其返回类型是\
  \ `String`，并且它不接受任何参数。返回的字符串应该是人类可读的文本，以便了解调用该方法时对象的状态。建议在你创建的每个类中都重新实现 `Object`\
  \ 类的 `toString()` 方法。\n\n假设你有一个 `Point` 类来表示一个二维点，如清单 11-7 所示。一个 `Point` 对象保存一个点的\
  \ x 和 y 坐标。`Point` 类中 `toString()` 方法的实现可以返回形式为 `(x, y)` 的字符串，其中 x 和 y 是点的坐标。\n\n\
  ```\n// Point.java\npackage com.jdojo.object;\npublic class Point {\nprivate int\
  \ x;\nprivate int y;\npublic Point(int x, int y) {\nthis.x = x;\nthis.y = y;\n}\n\
  /* 重新实现 Object 类的 toString() 方法 */\n@Override\npublic String toString() {\nString\
  \ str = \"(\" + x + \", \" + y + \")\";\nreturn str;\n}\n}\n清单 11-7.\n一个对象表示二维点的\
  \ Point 类\n```\n\n类的 `toString()` 方法非常重要，Java 为你提供了使用它的简便方法。当 Java 需要对象的字符串表示时，它会自动为你调用该对象的\
  \ `toString()` 方法。有两个值得提及的情况：\n\n*   涉及对象引用的字符串连接表达式\n*   以对象引用作为参数调用 `System.out.print()`\
  \ 和 `System.out.println()` 方法\n\n当你像这样连接一个字符串和一个对象时：\n\n```\nString str = \"Hello\"\
  \ + new Point(10, 20);\n```\n\nJava 会调用 `Point` 对象上的 `toString()` 方法，并将返回的值连接到 `\"\
  Hello\"` 字符串。这条语句会将字符串 `\"Hello(10, 20)\"` 赋值给变量 `str`。这条语句等同于下面这条：\n\n```\nString\
  \ str = \"Hello\" + new Point(10, 20).toString();\n```\n\n你使用字符串连接运算符（`+`）来连接不同类型的数据。首先，Java\
  \ 在连接所有数据之前获取它们的字符串表示。在连接表达式中自动为你调用对象的 `toString()` 方法有助于节省一些输入。如果连接中使用的对象引用是 `null`\
  \ 引用，Java 会使用 `\"null\"` 字符串作为其字符串表示。\n\n以下代码片段清楚地展示了在对象引用上调用 `toString()` 方法的情况。你可以观察到，在字符串连接表达式中，单独使用对象的引用与调用其\
  \ `toString()` 方法得到的结果相同。类似地，当你使用 `System.out.println(pt)` 时，Java 会自动调用 `pt` 引用变量上的\
  \ `toString()` 方法。\n\n```\nPoint pt = new Point(10, 12);\n// str1 和 str2 将具有相同的内容\n\
  String str1 = \"Test \" + pt;\nString str2 = \"Test \" + pt.toString();\nSystem.out.println(pt);\n\
  System.out.println(pt.toString());\nSystem.out.println(str1);\nSystem.out.println(str2);\n\
  ```\n\n```\n(10, 12)\n(10, 12)\nTest (10, 12)\nTest (10, 12)\n```\n\n以下代码片段展示了在字符串连接表达式和\
  \ `System.out.println()` 方法调用中使用 `null` 引用的效果。请注意，当 `pt` 持有 `null` 引用时，你不能使用 `pt.toString()`。对\
  \ `null` 引用调用任何方法都会产生运行时异常。\n\n```\n// 将 pt 设置为 null\nPoint pt = null;\nString str3\
  \ = \"Test \" + pt;\nSystem.out.println(pt);\nSystem.out.println(str3);\n//System.out.println(pt.toString());\
  \ /* 将产生运行时异常 */\n```\n\n```\nnull\nTest null\n```\n\n克隆对象\n\n\n\nJava 并未提供自动克隆（复制）对象的机制。回顾一下，当你将一个引用变量赋值给另一个引用变量时，仅复制了对象的引用，而非对象的内容。克隆对象意味着逐位复制对象的内容。如果你希望你的类对象能够被克隆，则必须在你的类中重新实现\
  \ `clone()` 方法。一旦你重新实现了 `clone()` 方法，就应该能够通过调用 `clone()` 方法来克隆你的类对象。`Object` 类中\
  \ `clone()` 方法的声明如下：\n\n```\nprotected Object clone() throws CloneNotSupportedException\n\
  ```\n\n关于 `clone()` 方法的声明，你需要留意以下几点。\n\n*   它被声明为 `protected`。因此，你无法在客户端代码中调用它。以下代码是无效的：\n\
  \n```\n    Object obj = new Object();\n    Object clone = obj.clone(); // 错误。无法访问受保护的\
  \ clone()\n    // 方法\n    ```\n\n*   这意味着，如果你希望客户端代码能够克隆你的类对象，则需要在你的类中将 `clone()`\
  \ 方法声明为 `public`。\n\n*   它的返回类型是 `Object`。这意味着你需要对 `clone()` 方法的返回值进行强制类型转换。假设 `MyClass`\
  \ 是可克隆的。你的克隆代码将如下所示：\n\n```\n    MyClass mc = new MyClass();\n    MyClass clone\
  \ = (MyClass)mc.clone(); // 需要使用强制类型转换\n    ```\n\n你无需了解对象的任何内部细节即可克隆它。`Object`\
  \ 类中的 `clone()` 方法包含了克隆对象所需的所有代码。你只需在你的类的 `clone()` 方法中调用它即可。它将对原始对象进行逐位复制，并返回副本的引用。\n\
  \n`Object` 类中的 `clone()` 方法会抛出 `CloneNotSupportedException` 异常。这意味着当你调用 `Object`\
  \ 类的 `clone()` 方法时，需要将该调用放在 `try-catch` 块中，或者重新抛出该异常。你将在第 13 章中了解更多关于 `try-catch`\
  \ 块的内容。你也可以选择不从你的类的 `clone()` 方法中抛出 `CloneNotSupportedException` 异常。以下代码片段放置在你的类的\
  \ `clone()` 方法内部，它使用 `super` 关键字调用了 `Object` 类的 `clone()` 方法：\n\n```\nYourClass\
  \ obj = null;\ntry {\n// 使用 super.clone() 调用 Object 类的 clone() 方法\nobj = (YourClass)super.clone();\n\
  } catch (CloneNotSupportedException e) {\ne. printStackTrace();\n}\nreturn obj;\n\
  ```\n\n你必须做的一件重要事情是在你的类声明中添加 `implements Cloneable` 子句。`Cloneable` 是在 `java.lang`\
  \ 包中声明的一个接口。你将在第 21 章中了解接口。现在，只需在你的类声明中添加此子句即可。否则，当你对你的类对象调用 `clone()` 方法时，将会出现运行时错误。你的类声明必须如下所示：\n\
  \n```\npublic class MyClass implements Cloneable {\n// 你的类代码放在这里\n}\n```\n\n清单 11-8\
  \ 包含了 `DoubleHolder` 类的完整代码。它重写了 `Object` 类的 `clone()` 方法。`clone()` 方法中的注释解释了代码的作用。`DoubleHolder`\
  \ 类的 `clone()` 方法没有像 `Object` 类的 `clone()` 方法那样带有 `throws` 子句。当你重写一个方法时，可以选择去掉超类中声明的\
  \ `throws` 子句。\n\n```\n// DoubleHolder.java\npackage com.jdojo.object;\npublic class\
  \ DoubleHolder implements Cloneable {\nprivate double value;\npublic DoubleHolder(double\
  \ value) {\nthis.value = value;\n}\npublic void setValue(double value) {\nthis.value\
  \ = value;\n}\npublic double getValue() {\nreturn this.value;\n}\n@Override\npublic\
  \ Object clone() {\nDoubleHolder copy = null;\ntry {\n// 调用 Object 类的 clone() 方法，该方法将进行\n\
  // 逐位复制并返回克隆体的引用\ncopy = (DoubleHolder) super.clone();\n} catch (CloneNotSupportedException\
  \ e) {\n// 如果在克隆过程中出现任何问题，打印错误详情\ne.printStackTrace();\n}\nreturn copy;\n}\n}\n\
  清单 11-8.\n具有克隆能力的 DoubleHolder 类\n```\n\n一旦你的类正确实现了 `clone()` 方法，克隆你的类对象就如同调用其 `clone()`\
  \ 方法一样简单。以下代码片段展示了如何克隆 `DoubleHolder` 类的对象。请注意，你必须将从 `dh.clone()` 方法调用返回的引用强制转换为\
  \ `DoubleHolder` 类型。\n\n```\nDoubleHolder dh = new DoubleHolder(100.00);\nDoubleHolder\
  \ dhClone = (DoubleHolder) dh.clone();\n```\n\n此时，内存中存在两个独立的 `DoubleHolder` 对象。`dh`\
  \ 变量引用原始对象，`dhClone` 变量引用原始对象的克隆体。原始对象和克隆对象都持有相同的值 `100.00`。但是，它们各自拥有该值的独立副本。如果你更改原始对象中的值，例如\
  \ `dh.setValue(200)`，克隆对象中的值保持不变。清单 11-9 展示了如何使用 `clone()` 方法克隆 `DoubleHolder` 类的对象。输出结果证明，一旦你克隆了一个对象，内存中就会存在两个独立的对象。\n\
  \n```\n// CloningTest.java\npackage com.jdojo.object;\npublic class CloningTest\
  \ {\npublic static void main(String[] args)  {\nDoubleHolder dh = new DoubleHolder(100.00);\n\
  // 克隆 dh\nDoubleHolder dhClone = (DoubleHolder)dh.clone();\n// 打印原始对象和克隆对象中的值\n\
  System.out.println(\"原始对象:\" + dh.getValue());\nSystem.out.println(\"克隆对象:\" + dhClone.getValue());\n\
  // 更改原始对象和克隆对象中的值\ndh.setValue(200.00);\ndhClone.setValue(400.00);\n// 再次打印原始对象和克隆对象中的值\n\
  System.out.println(\"原始对象:\" + dh.getValue());\nSystem.out.println(\"克隆对象:\" + dhClone.getValue());\n\
  }\n}\n清单 11-9.\n演示对象克隆的测试类\n```\n\n```\n原始对象:100.0\n克隆对象:100.0\n原始对象:200.0\n克隆对象:400.0\n\
  ```\n\n从 Java 5 开始，你无需将你的类中 `clone()` 方法的返回类型指定为 `Object` 类型。你可以在 `clone()` 方法声明中将你的类指定为返回类型。这样就不会强制客户端代码在调用你的类的\
  \ `clone()` 方法时使用强制类型转换。以下代码片段展示了 `DoubleHolder` 类的修改后代码，该代码仅在 Java 5 或更高版本中才能编译。它将\
  \ `DoubleHolder` 声明为 `clone()` 方法的返回类型，并在 `return` 语句中使用了强制类型转换。\n\n```\n// DoubleHolder.java\n\
  package com.jdojo.object;\npublic class DoubleHolder implements Cloneable {\n/*\
  \ 此处代码与之前相同... */\npublic DoubleHolder clone() {\nObject copy = null;\n/* 此处代码与之前相同...\
  \ */\nreturn (DoubleHolder)copy;\n}\n}\n```\n\n使用上述 `clone()` 方法的声明，你可以编写如下代码来克隆对象。请注意，不再需要强制类型转换。\n\
  \n```\nDoubleHolder dh = new DoubleHolder(100.00);\nDoubleHolder dhClone = dh.clone();//\
  \ 克隆 dh。无需强制类型转换\n```\n\n\n\n一个对象可能由另一个对象组成。在这种情况下，内存中会分别存在两个对象——一个被包含对象和一个容器对象。容器对象存储被包含对象的引用。当你克隆容器对象时，被包含对象的引用也会被克隆。克隆完成后，会得到两个容器对象的副本；它们都持有对同一个被包含对象的引用。这被称为**浅克隆**，因为复制的是引用，而非对象本身。`Object`类的`clone()`方法默认只进行浅克隆，除非你另行编码。图\
  \ 11-2 展示了一个复合对象的内存状态，其中某个对象包含对另一个对象的引用。图 11-3 展示了使用浅克隆克隆该复合对象后的内存状态。你可能会注意到，在浅克隆中，被包含对象由原始复合对象和克隆后的复合对象共享。\n\
  \n![A323069_2_En_11_Fig3_HTML.gif](img/A323069_2_En_11_Fig3_HTML.gif)\n\n图 11-3.\
  \ 使用浅克隆克隆容器对象后的内存状态\n\n![A323069_2_En_11_Fig2_HTML.gif](img/A323069_2_En_11_Fig2_HTML.gif)\n\
  \n图 11-2. 一个复合对象。容器对象存储了对另一个对象（被包含对象）的引用。\n\n当在克隆复合对象时复制的是被包含对象本身，而非它们的引用时，这被称为**深克隆**。你必须克隆一个对象所有引用变量所引用的所有对象，才能实现深克隆。一个复合对象可能包含多层级的被包含对象链。例如，容器对象可能包含对另一个被包含对象的引用，而该对象又包含对另一个被包含对象的引用，以此类推。你是否能对复合对象进行深克隆取决于许多因素。如果你持有对被包含对象的引用，但该对象不支持克隆，那么在这种情况下，你只能满足于浅克隆。你可能持有对一个被包含对象的引用，而该对象本身也是一个复合对象。然而，该被包含对象只支持浅克隆，那么在这种情况下，你同样只能满足于浅克隆。让我们来看一些浅克隆和深克隆的例子。\n\
  \n如果对象的引用实例变量存储的是对不可变对象的引用，则无需克隆它们。也就是说，如果复合对象的被包含对象是不可变的，你就不需要克隆这些被包含对象。在这种情况下，对不可变被包含对象进行浅拷贝就足够了。回想一下，不可变对象在创建后不能被修改。不可变对象的引用可以被多个对象共享，而不会产生任何副作用。这是使用不可变对象的好处之一。如果一个复合对象包含一些对可变对象的引用和一些对不可变对象的引用，你必须克隆所引用的可变对象才能实现深拷贝。清单\
  \ 11-10 展示了`ShallowClone`类的代码。\n\n```\n// ShallowClone.java\npackage com.jdojo.object;\n\
  public class ShallowClone implements Cloneable {\nprivate DoubleHolder holder =\
  \ new DoubleHolder(0.0);\npublic ShallowClone(double value) {\nthis.holder.setValue(value);\n\
  }\npublic void setValue(double value) {\nthis.holder.setValue(value);\n}\npublic\
  \ double getValue() {\nreturn this.holder.getValue();\n}\n@Override\npublic Object\
  \ clone() {\nShallowClone copy = null;\ntry {\ncopy = (ShallowClone) super.clone();\n\
  } catch (CloneNotSupportedException e) {\ne.printStackTrace();\n}\nreturn copy;\n\
  }\n}\n清单 11-10. 一个支持浅克隆的 ShallowClone 类\n```\n\n`ShallowClone`类的对象由`DoubleHolder`类的对象组成。`ShallowClone`类中`clone()`方法的代码与`DoubleHolder`类的`clone()`方法相同。区别在于两个类所使用的实例变量的类型。`DoubleHolder`类有一个原始类型`double`的实例变量，而`ShallowClone`类有一个引用类型`DoubleHolder`的实例变量。当`ShallowClone`类调用`Object`类的`clone()`方法（通过`super.clone()`）时，它得到的是自身的浅拷贝。也就是说，它与其克隆体共享其实例变量中使用的`DoubleHolder`对象。\n\
  \n清单 11-11 提供了测试用例，用于测试`ShallowClone`类的对象及其克隆体。输出结果显示，在克隆之后，通过原始对象更改值也会更改克隆对象中的值。这是因为`ShallowClone`对象将值存储在另一个`DoubleHolder`类的对象中，而该对象被克隆对象和原始对象共享。\n\
  \n```\n// ShallowCloneTest.java\npackage com.jdojo.object;\npublic class ShallowCloneTest\
  \ {\npublic static void main(String[] args) {\nShallowClone sc = new ShallowClone(100.00);\n\
  ShallowClone scClone = (ShallowClone) sc.clone();\n// 打印原始对象和克隆对象中的值\nSystem.out.println(\"\
  原始: \" + sc.getValue());\nSystem.out.println(\"克隆: \" + scClone.getValue());\n//\
  \ 更改原始对象中的值，由于我们进行了浅克隆，克隆对象中的值也会改变\nsc.setValue(200.00);\n// 打印原始对象和克隆对象中的值\nSystem.out.println(\"\
  原始: \" + sc.getValue());\nSystem.out.println(\"克隆: \" + scClone.getValue());\n}\n\
  }\n清单 11-11. 一个演示浅拷贝机制的测试类\n```\n\n```\n原始: 100.0\n克隆: 100.0\n原始: 200.0\n克隆: 200.0\n\
  ```\n\n在深克隆中，你需要克隆一个对象所有引用实例变量所引用的所有对象。在执行深克隆之前，必须先执行浅克隆。浅克隆通过调用`Object`类的`clone()`方法执行。然后，你需要编写代码来克隆所有引用实例变量。清单\
  \ 11-12 展示了执行深克隆的`DeepClone`类的代码。\n\n```\n// DeepClone.java\npackage com.jdojo.object;\n\
  public class DeepClone implements Cloneable {\nprivate DoubleHolder holder = new\
  \ DoubleHolder(0.0);\npublic DeepClone(double value) {\nthis.holder.setValue(value);\n\
  }\npublic void setValue(double value) {\nthis.holder.setValue(value);\n}\npublic\
  \ double getValue() {\nreturn this.holder.getValue();\n}\n@Override\npublic Object\
  \ clone() {\nDeepClone copy = null;\ntry {\ncopy = (DeepClone) super.clone();\n\
  // 也需要克隆 holder 引用变量\ncopy.holder = (DoubleHolder) this.holder.clone();\n} catch\
  \ (CloneNotSupportedException e) {\ne.printStackTrace();\n}\nreturn copy;\n}\n}\n\
  清单 11-12. 一个执行深克隆的 DeepClone 类\n```\n\n如果你比较`ShallowClone`和`DeepClone`类中`clone()`方法的代码，你会发现，为了实现深克隆，你只需要多写一行代码：\n\
  \n```\n// 也需要克隆 holder 引用变量\ncopy.holder = (DoubleHolder)this.holder.clone();\n\
  ```\n\n如果`DoubleHolder`类不可克隆会发生什么？在这种情况下，你将无法编写此语句来克隆`holder`实例变量。你可以通过以下方式克隆`holder`实例变量：\n\
  \n```\n// 也需要克隆 holder 引用变量\ncopy.holder = new DoubleHolder(this.holder.getValue());\n\
  ```\n\n\n\n目标是克隆 `holder` 实例变量，且不一定要通过调用其 `clone()` 方法来实现。清单 11-13 展示了你的 `DeepClone`\
  \ 类是如何工作的。将其输出与 `ShallowCloneTest` 类的输出进行比较，以观察差异。\n\n```\n// DeepCloneTest.java\n\
  package com.jdojo.object;\npublic class DeepCloneTest {\npublic static void main(String[]\
  \ args) {\nDeepClone sc = new DeepClone(100.00);\nDeepClone scClone = (DeepClone)\
  \ sc.clone();\n// 打印原始对象和克隆对象中的值\nSystem.out.println(\"原始对象: \" + sc.getValue());\n\
  System.out.println(\"克隆对象: \" + scClone.getValue());\n// 修改原始对象的值，由于我们进行了深克隆，克隆对象的值不会改变\n\
  sc.setValue(200.00);\n// 打印原始对象和克隆对象中的值\nSystem.out.println(\"原始对象: \" + sc.getValue());\n\
  System.out.println(\"克隆对象: \" + scClone.getValue());\n}\n}\n清单 11-13.\n用于测试对象深克隆的测试类\n\
  ```\n\n```\n原始对象: 100.0\n克隆对象: 100.0\n原始对象: 200.0\n克隆对象: 100.0\n```\n\n提示\n\n使用\
  \ `Object` 类的 `clone()` 方法并不是克隆对象的唯一途径。你可以使用其他方法来克隆对象。你可以提供一个拷贝构造函数，它接受一个同类对象并创建该对象的克隆。你也可以在你的类中提供一个工厂方法，该方法可以接受一个对象并返回其克隆。另一种克隆对象的方法是将其序列化，然后再反序列化。序列化和反序列化对象的内容将在本系列第二卷的第\
  \ 7 章中介绍。\n\n终结对象\n\n有时，对象会使用一些资源，这些资源需要在对象被销毁时释放。Java 提供了一种方式，让你可以在对象即将被销毁时执行资源释放或其他类型的清理工作。在\
  \ Java 中，你可以创建对象，但不能销毁对象。JVM 会运行一个称为垃圾收集器的低优先级特殊任务，来销毁所有不再被引用的对象。垃圾收集器会在对象被销毁之前，给你一个执行清理代码的机会。`Object`\
  \ 类有一个 `finalize()` 方法，其声明如下：\n\n```\nprotected void finalize() throws Throwable\
  \ { }\n```\n\n`Object` 类中的 `finalize()` 方法不执行任何操作。你需要在你的类中重写该方法。在你的类的对象被销毁之前，垃圾收集器会调用你类中的\
  \ `finalize()` 方法。清单 11-14 包含了 `Finalize` 类的代码。它重写了 `Object` 类的 `finalize()` 方法，并在标准输出上打印一条消息。你可以在此方法中执行任何清理逻辑。`finalize()`\
  \ 方法中的代码也被称为终结器。\n\n```\n// Finalize.java\npackage com.jdojo.object;\npublic class\
  \ Finalize {\nprivate int x;\npublic Finalize(int x) {\nthis.x = x;\n}\n@Override\n\
  public void finalize() {\nSystem.out.println(\"正在终结 \" + this.x);\n/* 在此处执行任何清理工作...\
  \ */\n}\n}\n清单 11-14.\n一个重写了 Object 类 finalize() 方法的 Finalize 类\n```\n\n垃圾收集器对每个对象只调用一次终结器。为一个对象运行终结器，并不一定意味着该对象会在终结器完成后立即被销毁。当垃圾收集器确定不存在对该对象的引用时，就会运行终结器。然而，当对象的终结器运行时，它可能会将自己的引用传递给程序的其他部分。这就是为什么垃圾收集器在运行对象的终结器后会再次检查，以确保不存在对该对象的引用，然后才销毁（释放内存）该对象。终结器运行的顺序和时间都是未指定的。甚至不能保证终结器一定会运行。这使得程序员在\
  \ `finalize()` 方法中编写清理逻辑变得不可靠。有更好的方法来执行清理逻辑，例如使用 `try-finally` 块。建议不要依赖 Java 程序中的\
  \ `finalize()` 方法来清理对象使用的资源。\n\n提示\n\n自 Java 9 起，`Object` 类中的 `finalize()` 方法已被弃用，因为使用\
  \ `finalize()` 方法清理资源本身存在问题。有几种更好的替代方案来清理资源，例如使用 `try-with-resources` 和 `try-finally`\
  \ 块。我将在本卷的第 13 章和本系列第二卷的第 11 章中讨论这些技术。本章介绍 `finalize()` 方法只是为了内容的完整性。\n\n清单 11-15\
  \ 包含了用于测试你的 `Finalize` 类终结器的代码。运行此程序时，你可能会得到不同的输出。\n\n```\n// FinalizeTest.java\n\
  package com.jdojo.object;\npublic class FinalizeTest {\npublic static void main(String[]\
  \ args) {\n// 创建大量对象，例如 2000000 个对象。\nfor(int i = 0; i < 2000000; i++) {\nnew Finalize(i);\n\
  }\n}\n}\n清单 11-15.\n用于测试终结器的测试类\n```\n\n```\n正在终结 977620\n正在终结 977625\n正在终结 977627\n\
  ```\n\n该程序创建了 2000000 个 `Finalize` 类的对象，但没有存储它们的引用。重要的是，你不要存储所创建对象的引用。只要你持有对象的引用，它就不会被销毁，其终结器也不会运行。从输出中可以看出，在程序结束前，只有三个对象有机会运行它们的终结器。你可能完全没有输出，或者得到不同的输出。如果你没有得到任何输出，可以尝试增加要创建的对象数量。垃圾收集器会在它感觉内存不足时销毁对象。你可能需要创建更多对象来触发垃圾回收，这反过来会运行你的对象的终结器。\n\
  \n不可变对象\n\n创建后状态无法更改的对象称为不可变对象。其对象不可变的类称为不可变类。如果对象的状态在创建后可以更改（或改变），则称为可变对象，其类称为可变类。\n\
  \n在我详细介绍创建和使用不可变对象之前，让我们先定义“不可变性”这个词。对象的实例变量定义了对象的状态。对象的状态有两种视图：内部状态和外部状态。对象的内部状态由其在某个时间点的实例变量的实际值定义。对象的外部状态由对象的使用者（或客户端）在某个时间点看到的值定义。当我们说一个对象是不可变的时，我们必须明确我们指的是对象的哪种状态是不可变的：内部状态、外部状态，还是两者都是。\n\
  \n\n\n通常，在 Java 中当我们使用“不可变对象”这个术语时，我们指的是**外部不可变性**。在外部不可变性中，对象在创建后可以改变其内部状态。然而，其内部状态的改变对外部用户是不可见的。用户在对象创建后看不到其状态的任何变化。在内部不可变性中，对象的状态在创建后不会改变。如果一个对象是内部不可变的，那么它也是外部不可变的。我将讨论这两种情况的例子。\n\
  \n与可变对象相比，不可变对象有几个优势。不可变对象可以被程序的不同部分共享，而无需担心其状态变化。测试不可变类很容易。不可变对象本质上是线程安全的。你无需同步多个线程对不可变对象的访问，因为它的状态不会改变。有关线程同步的更多详细信息，请参考本系列第二卷的第\
  \ 6 章。在同一个 Java 应用程序中，不可变对象不必被复制并传递给程序的其他部分，因为它的状态不会改变。你只需传递它的引用，该引用即可作为副本使用。其引用可用于访问其内容。避免复制是一个巨大的性能优势，因为它既节省了时间又节省了空间。\n\
  \n让我们从一个可变类开始，其对象的状态在创建后可以被修改。清单 11-16 包含了 `IntHolder` 类的代码。\n\n```\n// IntHolder.java\n\
  package com.jdojo.object;\npublic class IntHolder {\nprivate int value;\npublic\
  \ IntHolder(int value) {\nthis.value = value;\n}\npublic void setValue(int value)\
  \ {\nthis.value = value;\n}\npublic int getValue() {\nreturn value;\n}\n}\n清单 11-16.\n\
  一个可变类的示例，其对象的状态在创建后可以更改\n```\n\n`value` 实例变量定义了 `IntHolder` 对象的状态。你按如下方式创建一个 `IntHolder`\
  \ 类的对象：\n\n```\nIntHolder holder = new IntHolder(101);\nint v = holder.getValue();\
  \ // 将 101 存储在 v 中\n```\n\n此时，`value` 实例变量持有 `101`，这定义了它的状态。你可以使用 getter 和 setter\
  \ 来获取和设置该实例变量。\n\n```\n// 更改值\nholder.setValue(505);\nint w = holder.getValue();\
  \ // 将 505 存储在 w 中\n```\n\n此时，`value` 实例变量已从 `101` 变为 `505`。也就是说，对象的状态已经改变。状态的改变是由\
  \ `setValue()` 方法促成的。`IntHolder` 类的对象就是可变对象的例子。\n\n让我们使 `IntHolder` 类不可变。你所要做的就是从中移除\
  \ `setValue()` 方法，使其成为一个不可变类。我们将 `IntHolder` 类的不可变版本称为 `IntWrapper`，如清单 11-17 所示。\n\
  \n```\n// IntWrapper.java\npackage com.jdojo.object;\npublic class IntWrapper {\n\
  private final int value;\npublic IntWrapper(int value) {\nthis.value = value;\n\
  }\npublic int getValue() {\nreturn value;\n}\n}\n清单 11-17.\n一个不可变类的示例\n```\n\n这是你创建\
  \ `IntWrapper` 类对象的方式：\n\n```\nIntWrapper wrapper = new IntWrapper(101);\n```\n\n\
  此时，`wrapper` 对象持有 `101`，并且没有办法改变它。因此，`IntWrapper` 类是一个不可变类，它的对象是不可变对象。你可能已经注意到，为了将\
  \ `IntHolder` 类转换为 `IntWrapper` 类，做了两处更改。`setValue()` 方法被移除，并且 `value` 实例变量被声明为\
  \ `final`。在这种情况下，没有必要将 `value` 实例变量声明为 `final`。使用 `final` 关键字可以向类的阅读者明确你的意图，并保护\
  \ `value` 实例变量免于被意外更改。最佳实践是（将其作为经验法则）将所有定义对象不可变状态的实例变量声明为 `final`，这样 Java 编译器将在编译期间强制执行不可变性。`IntWrapper`\
  \ 类的对象在内部和外部都是不可变的。一旦创建，就无法更改其状态。\n\n让我们创建 `IntWrapper` 类的一个变体，它将是外部不可变但内部可变的。我们称之为\
  \ `IntWrapper2`。它列在清单 11-18 中。\n\n```\n// IntWrapper2.java\npackage com.jdojo.object;\n\
  public class IntWrapper2 {\nprivate final int value;\nprivate int halfValue = Integer.MAX_VALUE;\n\
  public IntWrapper2(int value) {\nthis.value = value;\n}\npublic int getValue() {\n\
  return value;\n}\npublic int getHalfValue() {\n// 如果尚未计算，则计算一半的值\nif (this.halfValue\
  \ == Integer.MAX_VALUE) {\n// 缓存一半的值以供将来使用\nthis.halfValue = this.value / 2;\n}\n\
  return this.halfValue;\n}\n}\n清单 11-18.\n一个外部不可变且内部可变的类的示例\n```\n\n`IntWrapper2`\
  \ 添加了另一个名为 `halfValue` 的实例变量，它将保存传递给构造函数的值的半值。这是一个简单的例子。然而，它足以解释外部不可变对象和内部不可变对象的含义。假设（仅为了本次讨论）计算一个整数的一半是一个非常耗时的过程，并且你不想在\
  \ `IntWrapper2` 类的构造函数中计算它，特别是当并非所有人都需要它时。`halfValue` 实例变量被初始化为最大整数值，这作为一个标志，表明它尚未被计算。你添加了一个\
  \ `getHalfValue()` 方法，该方法检查是否已经计算了半值。第一次调用时，它将计算半值并将其缓存在 `halfValue` 实例变量中。从第二次调用开始，它将简单地返回缓存的值。\n\
  \n问题是，“`IntWrapper2` 对象是不可变的吗？”答案是既是也不是。它在内部是可变的。然而，它在外部是不可变的。一旦创建，其客户端从 `getValue()`\
  \ 和 `getHalfValue()` 方法将看到相同的返回值。但是，当 `getHalfValue()` 方法第一次被调用时，它的状态（具体来说是 `halfValue`）在其生命周期中会改变一次。然而，这种改变对对象的用户是不可见的。该方法在后续所有调用中返回相同的值。像\
  \ `IntWrapper2` 这样的对象被称为不可变对象。回想一下，通常不可变对象指的是外部不可变。\n\nJava 类库中的 `String` 类就是不可变类的一个例子。它使用了为\
  \ `IntWrapper2` 类讨论的缓存技术。`String` 类在其 `hashCode()` 方法第一次被调用时计算其内容的哈希码并缓存该值。因此，`String`\
  \ 对象在内部改变了其状态，但对其客户端而言并未改变。你不会经常听到“Java 中的 `String` 对象是外部不可变且内部可变的”这种说法。相反，你经常会听到“Java\
  \ 中的 `String` 对象是不可变的”这种说法。你应该理解这意味着 `String` 对象至少是外部不可变的。\n\n\n\n清单 11-19 展示了一个棘手的情况，其中尝试创建一个不可变类。`IntHolderWrapper`\
  \ 类没有任何方法可以直接修改其 `valueHolder` 实例变量中存储的值。它看起来像一个不可变类。\n\n```\n// IntHolderWrapper.java\n\
  package com.jdojo.object;\npublic class IntHolderWrapper {\nprivate final IntHolder\
  \ valueHolder;\npublic IntHolderWrapper(int value) {\nthis.valueHolder = new IntHolder(value);\n\
  }\npublic IntHolder getIntHolder() {\nreturn this.valueHolder;\n}\npublic int getValue()\
  \ {\nreturn this.valueHolder.getValue();\n}\n}\n清单 11-19.\n创建不可变类的一次失败尝试\n```\n\n\
  清单 11-20 包含一个测试类，用于测试 `IntHolderWrapper` 类的不可变性。\n\n```\n// BadImmutableTest.java\n\
  package com.jdojo.object;\npublic class BadImmutableTest {\npublic static void main(String[]\
  \ args) {\nIntHolderWrapper ihw = new IntHolderWrapper(101);\nint value = ihw.getValue();\n\
  System.out.println(\"#1 value = \" + value);\nIntHolder holder = ihw.getIntHolder();\n\
  holder.setValue(207);\nvalue = ihw.getValue();\nSystem.out.println(\"#2 value =\
  \ \" + value);\n}\n}\n清单 11-20.\n测试 IntHolderWrapper 类不可变性的测试类\n```\n\n```\n#1 value\
  \ = 101\n#2 value = 207\n```\n\n输出显示 `IntHolderWrapper` 类是可变的。对其 `getValue()` 方法的两次调用返回了不同的值。罪魁祸首是它的\
  \ `getIntHolder()` 方法。它返回了 `valueHolder` 实例变量，这是一个引用变量。请注意，`valueHolder` 实例变量代表一个\
  \ `IntHolder` 类的对象，该对象构成了 `IntHolderWrapper` 对象的状态。如果 `valueHolder` 引用变量所引用的对象被更改，那么\
  \ `IntHolderWrapper` 的状态也会随之改变。由于 `IntHolder` 对象是可变的，你不应该从 `getIntHolder()` 方法中将其引用返回给客户端。以下两条语句从客户端代码更改了对象的状态：\n\
  \n```\nIntHolder holder = ihw.getIntHolder(); /* 获取了实例变量 */\nholder.setValue(207);\
  \ /* 通过更改实例变量的状态来更改状态 */\n```\n\n请注意，`IntHolderWrapper` 类的设计者在返回 `valueHolder` 引用时忽略了一点：即使没有直接的方法来更改\
  \ `IntHolderWrapper` 类的状态，它也可以被间接更改。\n\n如何纠正这个问题？解决方案很简单。在 `getIntHolder()` 方法中，创建\
  \ `valueHolder` 对象的一个副本，并返回该副本的引用，而不是实例变量本身。这样，如果客户端更改了值，它只会更改客户端副本中的值，而不会更改 `IntHolderWrapper`\
  \ 对象持有的副本。清单 11-21 包含了 `IntHolderWrapper` 类的正确不可变版本，我们将其称为 `IntHolderWrapper2`。\n\
  \n```\n// IntHolderWrapper2.java\npackage com.jdojo.object;\npublic class IntHolderWrapper2\
  \ {\nprivate final IntHolder valueHolder;\npublic IntHolderWrapper2(int value) {\n\
  this.valueHolder = new IntHolder(value);\n}\npublic IntHolder getIntHolder() {\n\
  // 创建 valueHolder 的副本\nint v = this.valueHolder.getValue();\nIntHolder copy = new\
  \ IntHolder(v);\n// 返回副本而不是原始对象\nreturn copy;\n}\npublic int getValue() {\nreturn\
  \ this.valueHolder.getValue();\n}\n}\n清单 11-21.\nIntHolderWrapper 类的修改后不可变版本\n```\n\
  \n创建不可变类比看起来要棘手一些。我在本节中介绍了一些情况。这是另一个需要小心的案例。假设你设计了一个不可变类，它有一个引用类型的实例变量。假设它在其某个构造函数中接受其引用类型实例变量的初始值。如果实例变量的类是一个可变类，你必须复制传递给其构造函数的参数，并将副本存储在实例变量中。在构造函数中传递对象引用的客户端代码稍后可能会通过相同的引用更改此对象的状态。清单\
  \ 11-22 展示了如何正确实现 `IntHolderWrapper3` 类的第二个构造函数。其中注释掉了第二个构造函数的错误实现版本。\n\n```\n//\
  \ IntHolderWrapper3.java\npackage com.jdojo.object;\npublic class IntHolderWrapper3\
  \ {\nprivate final IntHolder valueHolder;\npublic IntHolderWrapper3(int value) {\n\
  this.valueHolder = new IntHolder(value);\n}\npublic IntHolderWrapper3(IntHolder\
  \ holder) {\n// 必须创建 holder 参数的副本\nthis.valueHolder = new IntHolder(holder.getValue());\n\
  /* 以下实现是错误的。客户端代码稍后将能够使用 holder 引用更改对象的状态 */\n//this.valueHolder = holder; /* 不要使用它\
  \ */\n}\n/* 其余代码在此处... */\n}\n清单 11-22.\n使用拷贝构造函数正确实现不可变类\n```\n\nObjects 类\n\n\
  JDK 在 `java.util` 包中包含一个名为 `Objects` 的实用工具类，用于处理对象。它由所有静态方法组成。`Objects` 类的大多数方法都能优雅地处理\
  \ `null` 值。Java 9 为该类添加了一些额外的实用方法。`Objects` 类中的方法根据其执行的操作类型可分为以下几类：\n\n*   边界检查\n\
  *   比较对象\n*   计算哈希码\n*   检查 null\n*   验证参数\n*   获取对象的字符串表示形式\n\n边界检查\n\n此类别中的方法用于检查索引或子范围是否在某个范围的边界内。通常，在对数组执行涉及数组边界的操作之前，你会使用这些方法。Java\
  \ 中的数组是相同类型元素的集合。数组中的每个元素都有一个用于访问它的索引。数组索引从零开始。第一个元素的索引为 0，第二个为 1，第三个为 2，依此类推。假设你有一个包含五个元素的数组，有人要求你从索引\
  \ 3 开始给他数组中的四个元素。这个请求是无效的，因为数组索引范围是 0 到 4，而请求的元素是从索引 3 到 6。`Objects` 类包含以下三种执行边界检查的方法——所有这些方法都是在\
  \ Java 9 中添加的：\n\n*   `int checkFromIndexSize(int fromIndex, int size, int length)`\n\
  *   `int checkFromToIndex(int fromIndex, int toIndex, int length)`\n*   `int checkIndex(int\
  \ index, int length)`\n\n如果索引或子范围的检查不在 `0` 到 `length` 的边界内（其中 `length` 是方法的参数之一），所有这些方法都会抛出\
  \ `IndexOutOfBoundsException`。\n\n`checkFromIndexSize(int fromIndex, int size, int\
  \ length)` 方法检查从 `fromIndex`（包含）到 `fromIndex + size`（不包含）的子范围是否在从 `0`（包含）到 `length`（不包含）的范围内。\n\
  \n`checkFromToIndex(int fromIndex, int toIndex, int length)` 方法检查从 `fromIndex`（包含）到\
  \ `toIndex`（不包含）的子范围是否在从 `0`（包含）到 `length`（不包含）的范围内。\n\n`checkIndex(int index, int\
  \ length)` 方法检查 `index` 是否在从 `0`（包含）到 `length`（不包含）的范围内。\n\n比较对象\n\n\n\n此类别中的方法用于比较对象以进行排序或判断相等性。该类别包含三种方法：\n\
  \n*   `<T> int compare(T a, T b, Comparator<? super T> c)`\n\n*   `boolean deepEquals(Object\
  \ a, Object b)`\n\n*   `boolean equals(Object a, Object b)`\n\n`compare()` 方法用于比较两个对象以进行排序。如果两个参数相同，则返回\
  \ `0`。否则，返回 `c.compare(a, b)` 的值。如果两个参数均为 `null`，则返回 `0`。\n\n`deepEquals()` 方法用于检查两个对象是否深度相等。如果两个参数深度相等，则返回\
  \ `true`。否则，返回 `false`。如果两个参数均为 `null`，则返回 `true`。\n\n`equals()` 方法比较两个对象是否相等。如果两个参数相等，则返回\
  \ `true`。否则，返回 `false`。如果两个参数均为 `null`，则返回 `true`。如果只有一个参数为 `null`，则返回 `false`。\n\
  \n计算哈希码\n\n此类别中的方法用于计算一个或多个对象的哈希码。该类别包含两种方法：\n\n*   `int hash(Object... values)`\n\
  \n*   `int hashCode(Object obj)`\n\n`hash()` 方法为其参数中的所有指定对象生成哈希码。它可用于计算包含多个实例字段的对象的哈希码。清单\
  \ 11-23 包含了 `Book` 类的另一个版本。这次，`hashCode()` 方法使用 `Objects.hash()` 方法来计算 `Book` 对象的哈希码。请将清单\
  \ 11-2 中 `Book` 类的代码与清单 11-23 中 `Book2` 类的代码进行比较。注意使用 `Objects.hash()` 方法计算对象哈希码是多么简单。\n\
  \n```\n// Book2.java\npackage com.jdojo.object;\nimport java.util.Objects;\npublic\
  \ class Book2 {\nprivate String title;\nprivate String author;\nprivate int pageCount;\n\
  private boolean hardCover;\nprivate double price;\n/* 其他代码在此 */\n/* 也必须实现 equals()\
  \ 方法。 */\n@Override\npublic int hashCode() {\nreturn Objects.hash(title, author,\
  \ pageCount, hardCover, price);\n}\n}\n清单 11-23.\n使用 Objects.hash() 方法计算对象的哈希码\n\
  ```\n\n如果将单个对象引用传递给 `Objects.hash()` 方法，返回的哈希码不等于从该对象的 `hashCode()` 方法返回的哈希码。换句话说，如果\
  \ `book` 是一个对象引用，那么 `book.hashCode()` 不等于 `Objects.hash(book)`。\n\n`Objects.hashCode(Object\
  \ obj)` 方法返回指定对象的哈希码值。如果参数为 `null`，则返回 `0`。\n\n检查空值\n\n此类别中的方法用于检查对象是否为空。该类别包含两种方法：\n\
  \n*   `boolean isNull(Object obj)`\n\n*   `boolean nonNull(Object obj)`\n\n`isNull()`\
  \ 方法在指定对象为 `null` 时返回 `true`。否则，返回 `false`。你也可以使用比较运算符 `==` 来检查对象是否为空，例如，`obj ==\
  \ null` 在 `obj` 为 `null` 时返回 `true`。`isNull()` 方法是在 Java 8 中添加的。它的存在是为了在 lambda\
  \ 表达式中作为方法引用（如 `Objects::isNull`）使用。Lambda 表达式将在本系列第二卷的第 5 章中介绍。\n\n`nonNull()`\
  \ 方法执行与 `isNull()` 方法相反的检查。它是在 Java 8 中添加的，用于在 lambda 表达式中作为方法引用（如 `Objects::nonNull`）使用。\n\
  \n验证参数\n\n此类别中的方法用于验证构造函数和方法的 `require` 参数。以前需要用 `if` 语句编写几行代码才能实现的功能，现在使用这些方法只需一行代码即可完成。该类别包含五种方法：\n\
  \n*   `<T> T requireNonNull(T obj)`\n\n*   `<T> T requireNonNull(T obj, String message)`\n\
  \n*   `<T> T requireNonNull(T obj, Supplier<String> messageSupplier)`\n\n*   `<T>\
  \ T requireNonNullElse(T obj, T defaultObj)`\n\n*   `<T> T requireNonNullElseGet(T\
  \ obj, Supplier<? extends T> supplier)`\n\n`requireNonNull(T obj)` 方法检查参数是否不为 `null`。如果参数为\
  \ `null`，则抛出 `NullPointerException`。此方法专为验证方法和构造函数的参数而设计。注意方法声明中的形式类型参数 `<T>`。这是一个泛型方法。任何类型的对象都可以作为参数传递给此方法。其返回类型与传递对象的类型相同。该方法已被重载。该方法的第二个版本允许你指定当参数为\
  \ `null` 时抛出的 `NullPointerException` 的消息。该方法的第三个版本接受一个 `Supplier<String>` 作为第二个参数。它将消息的创建延迟到执行空值检查之后。如果参数为\
  \ `null`，则调用 `Supplier<String>` 对象的 `get()` 方法来获取用于 `NullPointerException` 的错误消息。使用供应商可以延迟错误消息的构造，并且还为你提供了更多选项，例如在错误消息中添加时间戳。\n\
  \nJava 9 在 `Objects` 类中添加了 `requireNonNullElse()` 和 `requireNonNullElseGet()` 方法。如果第一个参数不为\
  \ `null`，`requireNonNullElse()` 方法返回第一个参数；否则，如果第二个参数不为 `null`，则返回第二个参数。如果两个参数都为\
  \ null，则抛出 `NullPointerException`。如果第一个参数不为 `null`，`requireNonNullElseGet()` 方法返回第一个参数；否则，返回从\
  \ `supplier` 的 `get()` 方法返回的非 `null` 值。如果第一个参数为 `null`，并且 `supplier` 为 null 或供应商返回\
  \ `null`，则抛出 `NullPointerException`。\n\n获取对象的字符串表示形式\n\n此类别中的方法用于获取对象的字符串表示形式。该类别包含两种方法：\n\
  \n*   `String toString(Object o)`\n\n*   `String toString(Object o, String nullDefault)`\n\
  \n`toString()` 方法在参数为 `null` 时返回字符串“null”。对于非空参数，它返回通过调用参数的 `toString()` 方法返回的值。该方法的第二个版本允许你指定当参数为\
  \ null 时返回的默认字符串。\n\n使用 Objects 类\n\n清单 11-24 演示了如何使用 `Objects` 类的一些方法。该程序使用 lambda\
  \ 表达式创建了一个 `Supplier<String>` 对象。Lambda 表达式将在本书第二卷的第 5 章中讨论。我在这里使用它是为了给你一个完整的示例。\n\
  \n\n\n```\n// ObjectsTest.java\npackage com.jdojo.object;\nimport java.time.Instant;\n\
  import java.util.Objects;\nimport java.util.function.Supplier;\npublic class ObjectsTest\
  \ {\npublic static void main(String[] args) {\n// 计算两个整数、一个字符和一个字符串的哈希码\nint hash\
  \ = Objects.hash(10, 8900, '\\u20b9', \"Hello\");\nSystem.out.println(\"哈希码是 \"\
  \ + hash);\n// 测试相等性\nboolean isEqual = Objects.equals(null, null);\nSystem.out.println(\"\
  null 等于 null: \" + isEqual);\nisEqual = Objects.equals(null, \"XYZ\");\nSystem.out.println(\"\
  null 等于 XYZ: \" + isEqual);\n// toString() 方法测试\nSystem.out.println(\"toString(null)\
  \ 是 \" + Objects.toString(null));\nSystem.out.println(\"toString(null, \\\"XXX\\\
  \") 是 \" + Objects.toString(null, \"XXX\"));\n// 测试 requireNonNull(T obj, String\
  \ message)\ntry {\nprintName(\"Doug Dyer\");\nprintName(null);\n} catch (NullPointerException\
  \ e) {\nSystem.out.println(e.getMessage());\n}\n// requireNonNull(T obj, Supplier\
  \ messageSupplier)\ntry {\n// 使用 lambda 表达式创建 Supplier 对象。\n// Supplier 返回一个带时间戳的消息。\n\
  Supplier messageSupplier =\n() -> \"名称是必填项。错误生成于 \" + Instant.now();\nprintNameWithSupplier(\"\
  Babalu\", messageSupplier);\nprintNameWithSupplier(null, messageSupplier);\n} catch\
  \ (NullPointerException e) {\nSystem.out.println(e.getMessage());\n}\n// T requireNonNullElse(T\
  \ obj, T defaultObj)\nprintNameWithDefault(\"Kishori Sharan\");\n// 将使用默认名称 \"John\
  \ Doe\"\nprintNameWithDefault(null);\n}\npublic static void printName(String name)\
  \ {\n// 测试 name 不为 null。如果为 null，则生成 NullPointerException。\nObjects.requireNonNull(name,\
  \ \"名称是必填项。\");\n// 如果上述语句未抛出异常，则打印名称\nSystem.out.println(\"名称是 \" + name);\n}\n\
  public static void printNameWithSupplier(String name, Supplier messageSupplier)\
  \ {\n// 测试 name 不为 null。如果为 null，则生成 NullPointerException。\nObjects.requireNonNull(name,\
  \ messageSupplier);\n// 如果上述语句未抛出异常，则打印名称\nSystem.out.println(\"名称是 \" + name);\n\
  }\npublic static void printNameWithDefault(String name) {\n// 测试 name 不为 null。如果为\
  \ null，则生成 NullPointerException。\nObjects.requireNonNullElse(name, \"John Doe\"\
  );\n// 如果上述语句未抛出异常，则打印名称\nSystem.out.println(\"名称是 \" + name);\n}\n}\n清单 11-24.\n\
  演示 Objects 类方法使用的测试类\n```\n\n```\n哈希码是 79643668\nnull 等于 null: true\nnull 等于 XYZ:\
  \ false\ntoString(null) 是 null\ntoString(null, \"XXX\") 是 XXX\n名称是 Doug Dyer\n名称是必填项。\n\
  名称是 Babalu\n名称是必填项。错误生成于 2017-07-29T02:44:25.974523900Z\n名称是 Kishori Sharan\n名称是\
  \ null\n```\n\n总结\n\nJava 中的类按树状层次结构排列。树中的类具有超类-子类关系。`Object` 类位于类层次结构的根节点。它是 Java\
  \ 中所有类的超类。`Object` 类位于 `java.lang` 包中，而该包又位于 `java.base` 模块中。`Object` 类包含的方法在所有类中自动可用。其中一些方法已有实现，一些则为空实现。类也可以重新实现\
  \ `Object` 类中的某些方法。`Object` 类的引用变量可以存储 Java 中任何引用类型的引用。\n\n加载到 JVM 中的每个类型都由 `Class<T>`\
  \ 类的一个实例表示。`Object` 类的 `getClass()` 方法返回调用该方法的对象所属类型的 `Class<T>` 对象的引用。\n\n哈希码是根据一段信息通过算法计算出的整数值。哈希码也称为哈希总和、哈希值或简称为哈希。从一段信息计算整数的算法称为哈希函数。`Object`\
  \ 类包含一个 `hashCode()` 方法，该方法返回一个 `int`，即对象的哈希码。该方法的默认实现通过将对象的内存地址转换为整数来计算对象的哈希码。由于\
  \ `hashCode()` 方法定义在 `Object` 类中，因此它在 Java 的所有类中都可用。不过，你可以自由地在自己的类中重写该实现。\n\n宇宙中的每个对象都与其他所有对象不同，Java\
  \ 程序中的每个对象也与其他所有对象不同。所有对象都有唯一的标识。对象被分配的内存地址可视为其标识，这将使其始终唯一。如果两个对象具有相同的标识（用 Java\
  \ 术语来说就是相同的引用），则它们是相同的。Java 中的相等运算符（`==`）比较两个对象的引用以测试它们是否相等。有时，如果两个对象基于其部分或全部实例变量具有相同的状态，你可能希望将它们视为相等。如果要根据引用（标识）以外的标准来比较类的两个对象是否相等，则你的类需要重新实现\
  \ `Object` 类的 `equals()` 方法。`Object` 类中 `equals()` 方法的默认实现会比较作为参数传入的对象与调用该方法的对象的引用。\n\
  \n有时，将对象表示为字符串形式会很有帮助（通常在调试时），该字符串应以可读格式包含足够多的对象状态信息。`Object` 类的 `toString()` 方法允许你编写自己的逻辑，将类的对象表示为字符串。`Object`\
  \ 类提供了 `toString()` 方法的默认实现。它返回一个字符串，其中包含对象的完整限定类名以及对象的十六进制格式哈希码。\n\n克隆对象意味着逐位复制对象的内容。Java\
  \ 不提供自动克隆（制作副本）对象的机制。如果你希望类的对象可以被克隆，则必须在类中重新实现 `Object` 类的 `clone()` 方法。一旦重新实现了\
  \ `clone()` 方法，你应该能够通过调用 `clone()` 方法来克隆类的对象。\n\n有时，对象会使用一些资源，这些资源需要在对象销毁时释放。垃圾收集器通过调用对象的\
  \ `finalize()` 方法，让你有机会在对象销毁之前执行清理代码。该方法在 `Object` 类中声明，其默认实现不执行任何操作。`finalize()`\
  \ 方法中的代码也称为终结器。你需要在类中重新实现 `finalize()` 方法，并编写释放资源的逻辑。`finalize()` 方法存在问题，并且在 Java\
  \ 9 中已被弃用。还有许多其他技术可用于释放对象持有的资源。\n\nJava 7 在 `java.util` 包中添加了一个实用工具类 `Objects`。Java\
  \ 8 和 Java 9 为该类添加了更多方法。`Objects` 类中的方法根据其执行的操作类型可分为以下几类：检查索引或子范围是否在范围内、比较对象、计算哈希码、检查\
  \ null、验证构造函数和方法参数，以及获取对象的字符串表示形式。该类中的大多数方法都是为了优雅地处理 `null` 值而存在的。\n\n练习题\n\n1.\
  \  Java 中所有类的超类的完整限定名称是什么？\n\n2.  `java.lang.Object` 类的超类是什么？\n\n\n\n3.  列举 `Object`\
  \ 类中可用的三种方法，并简要描述它们的用途。\n\n4.  什么是哈希码？它在 Java 中何时使用？`Object` 类中哪个方法用于返回对象的哈希码？\n\
  \n5.  如何使用 `==` 运算符比较两个对象？\n\n6.  如果你想根据对象的状态（而非引用）来比较你的类的对象是否相等，那么必须重写 `Object`\
  \ 类中的哪个方法？\n\n7.  `Object` 类中 `equals()` 方法的默认实现是什么？\n\n8.  以下关于 Java 的陈述是否正确？\n\
  \n如果两个对象根据 `equals(Object)` 方法判断为相等，那么对这两个对象分别调用 `hashCode` 方法必须产生相同的整数结果。\n\n9.\
  \  如果你的类重写了 `Object` 类的 `equals()` 方法，那么你的类还应该重写 `Object` 类的哪个其他方法？\n\n10. Java\
  \ 中的对象克隆是什么？什么是浅克隆和深克隆？\n\n11. 为了允许克隆你的类的对象，你需要重写 `Object` 类中的哪个方法？创建一个包含如下两个字段的\
  \ `Phone` 类：\n\n```\n    // Phone.java\n    package com.jdojo.object.excercise;\n\
  \    public class Phone {\n    private String areaCode;\n    private String number;\n\
  \    }\n    ```\n\n在 `Phone` 类中实现 `clone()` 方法，以便 `Phone` 对象能够被正确克隆。该类中的两个实例变量都是必需的。\n\
  \n12. 为了提供你的类对象的字符串表示形式，你需要重写 `Object` 类中的哪个方法？通过实现 `toString()` 方法来增强 `Phone` 类。\n\
  \n13. 类中的 `finalize()` 方法有什么用途？你应该使用 `finalize()` 方法来清理你的类对象所持有的资源吗？\n\n14. 什么是不可变对象和不可变类？使用不可变对象有什么好处？列举一个你经常使用的\
  \ Java 不可变类。\n\n15. 使用 `Objects` 类的方法来实现 `Phone` 类的 `hashCode()` 方法和其他方法。例如，在 `Phone`\
  \ 类的构造函数和方法内部使用 `Objects` 类的 `requireNonNull()` 方法来验证参数值。\n\n16. 编写以下代码片段中缺失的部分，该代码将打印\
  \ `Phone` 类的简单名称和完全限定名称：\n\n```\n    Phone p = new Phone();\n    Class cls = /*\
  \ 在此处编写你的代码 */;\n    String simpleName = cls./* 在此处编写你的代码 */;\n    String fullyQualifedName\
  \ = cls./* 在此处编写你的代码 */;\n    System.out.println(\"Simple class name: \"  + simpleName);\
  \        System.out.println(\"Fully qualified name: \"  + fullyQualifedName);\n\
  \    ```\n\n12. 包装类\n\n在本章中，你将学习：\n\n*   关于 Java 中的包装类以及如何使用它们\n\n*   如何从字符串中获取原始值\n\
  \n*   原始值如何在需要时自动装箱为包装对象\n\n*   包装对象如何在需要时自动拆箱为原始值\n\n本章中的所有类都是 `jdojo.wrapper`\
  \ 模块的成员，如清单 12-1 所示。\n\n```\n// module-info.java\nmodule jdojo.wrapper {\nexports\
  \ com.jdojo.wrapper;\n}\n清单 12-1.\njdojo.wrapper 模块的声明\n```\n\n包装类\n\n在前面的章节中，你了解到原始类型和引用类型是不能赋值兼容的。你甚至不能将原始值与对象引用进行比较。Java\
  \ 库的某些部分仅适用于对象；例如，Java 中的集合仅适用于对象。你不能创建原始值（如 1、3、8 和 10）的列表。你需要先将原始值包装成对象，然后才能将它们存储在列表或集合中。\n\
  \n原始值和引用值之间的赋值不兼容性自 Java 首次发布以来就一直存在。Java 库在 `java.lang` 包中提供了八个类来表示八种原始类型。这些类被称为包装类，因为它们将原始值包装在一个对象中。表\
  \ 12-1 列出了原始类型及其对应的包装类。请注意包装类的名称。遵循 Java 的类命名约定，它们以大写字母开头。\n\n表 12-1.\n\n原始类型及其对应包装类列表\n\
  \n原始类型\n |\n  包装类\n |\n\n| --- | --- | --- | --- | --- |\n\n`byte`\n |\n  `Byte`\n\
  \ |\n\n`short`\n |\n  `Short`\n |\n\n`int`\n |\n  `Integer`\n |\n\n`long`\n |\n\
  \  `Long`\n |\n\n`float`\n |\n  `Float`\n |\n\n`double`\n |\n  `Double`\n |\n\n\
  `char`\n |\n  `Character`\n |\n\n`boolean`\n |\n  `Boolean`\n |\n\n所有包装类都是不可变的。它们提供了三种创建对象的方式：\n\
  \n*   使用构造函数。\n*   使用 `valueOf()` 工厂方法。\n*   使用 `parseXxx()` 方法，其中 `Xxx` 是包装类的名称。`Character`\
  \ 类中不提供此方法。\n\n提示\n\n自 Java SE 9 起，所有包装类中的所有构造函数已被弃用，因为它们很少用于创建包装对象。你应该使用其他方式，例如\
  \ `valueOf()` 和 `parseXxx()` 方法来创建它们的对象。\n\n除了 `Character` 之外，每个包装类至少提供两个构造函数：一个接受相应原始类型的值，另一个接受\
  \ `String`。`Character` 类只提供一个接受 `char` 的构造函数。以下代码片段使用其构造函数创建了几个包装类的对象：\n\n```\n\
  // 从 int 创建 Integer 对象\nInteger intObj1 = new Integer(100);\n// 从 String 创建 Integer\
  \ 对象\nInteger intObj2 = new Integer(\"1969\");\n// 从 double 创建 Double 对象\nDouble\
  \ doubleObj1 = new Double(10.45);\n// 从 String 创建 Double 对象\nDouble doubleObj2 =\
  \ new Double(\"234.60\");\n// 从 char 创建 Character 对象\nCharacter charObj1 = new Character('A');\n\
  // 从 boolean 创建 Boolean 对象\nBoolean booleanObj1 = new Boolean(true);\n// 从 String\
  \ 创建 Boolean 对象\nBoolean booleanTrue = new Boolean(\"true\");\nBoolean booleanFalse\
  \ = new Boolean(\"false\");\n```\n\n创建包装类对象的首选方式是使用它们的 `valueOf()` 静态方法。以下代码片段使用它们的\
  \ `valueOf()` 方法创建了几个包装类的对象：\n\n```\nInteger intObj1 = Integer.valueOf(100);\nInteger\
  \ intObj2 = Integer.valueOf(\"1969\");\nDouble doubleObj1 = Double.valueOf(10.45);\n\
  Double doubleObj2 = Double.valueOf(\"234.60\");\nCharacter charObj1 = Character.valueOf('A');\n\
  ```\n\n使用 `valueOf()` 方法为整数值（`byte`、`short`、`int` 和 `long`）创建对象可以带来更好的内存使用，因为此方法会缓存一些对象以供重用。这些原始类型的包装类会缓存\
  \ -128 到 127 之间的原始值的包装对象。例如，如果你多次调用 `Integer.valueOf(25)`，则会返回缓存中同一个 `Integer` 对象的引用。但是，当你多次调用\
  \ `new Integer(25)` 时，每次调用都会创建一个新的 `Integer` 对象。清单 12-2 演示了使用构造函数和 `valueOf()` 方法对于\
  \ `Integer` 包装类的区别。\n\n\n\n```\n// CachedWrapperObjects.java\npackage com.jdojo.wrapper;\n\
  public class CachedWrapperObjects {\npublic static void main(String[] args) {\n\
  System.out.println(\"使用构造器：\");\n// 使用构造器创建两个 Integer 对象\nInteger iv1 = new Integer(25);\n\
  Integer iv2 = new Integer(25);\nSystem.out.println(\"iv1 = \" + iv1 + \", iv2 =\
  \ \" + iv2);\n// 比较 iv1 和 iv2 的引用\nSystem.out.println(\"iv1 == iv2: \" + (iv1 ==\
  \ iv2));\n// 检查它们在值上是否相等\nSystem.out.println(\"iv1.equals(iv2): \" + iv1.equals(iv2));\n\
  System.out.println(\"\\n 使用 valueOf() 方法：\");\n// 使用 valueOf() 方法创建两个 Integer 对象\n\
  Integer iv3 = Integer.valueOf(25);\nInteger iv4 = Integer.valueOf(25);\nSystem.out.println(\"\
  iv3 = \" + iv3 + \", iv4 = \" + iv4);\n// 比较 iv3 和 iv4 的引用\nSystem.out.println(\"\
  iv3 == iv4: \" + (iv3 == iv4));\n// 检查它们在值上是否相等\nSystem.out.println(\"iv3.equals(iv4):\
  \ \" + iv3.equals(iv4));\n}\n}\n清单 12-2.\n使用构造器与 valueOf() 方法创建 Integer 对象的区别\n\
  ```\n\n```\n使用构造器：\niv1 = 25, iv2 = 25\niv1 == iv2: false\niv1.equals(iv2): true\n\
  使用 valueOf() 方法：\niv3 = 25, iv4 = 25\niv3 == iv4: true\niv3.equals(iv4): true\n\
  ```\n\n请注意，`iv1` 和 `iv2` 是两个不同对象的引用，因为 `iv1 == iv2` 返回了 `false`。然而，`iv3` 和 `iv4`\
  \ 是同一个对象的引用，因为 `iv3 == iv4` 返回了 `true`。当然，`iv1`、`iv2`、`iv3` 和 `iv4` 都表示相同的原始值 `25`，正如\
  \ `equals()` 方法返回的值所表明的那样。通常，程序会使用较小的整数字面量。如果你要包装较大的整数，`valueOf()` 方法每次调用时都会创建一个新对象。\n\
  \n提示\n\n`new` 运算符总是创建一个新对象。如果你不需要原始值的新对象，请使用包装类的 `valueOf()` 工厂方法，而不是使用构造器。包装类中的\
  \ `equals()` 方法已被重新实现，用于比较包装对象中被包装的原始值，而不是它们的引用。\n\n数值包装类\n\n`Byte`、`Short`、`Integer`、`Long`、`Float`\
  \ 和 `Double` 类都是数值包装类。它们都继承自 `Number` 类。`Number` 类被声明为抽象类。你不能创建 `Number` 类的对象。但是，你可以声明\
  \ `Number` 类的引用变量。你可以将六个数值包装类中任何一个的对象引用赋值给 `Number` 类的引用。\n\n`Number` 类包含六个方法。它们被命名为\
  \ `xxxValue()`，其中 `xxx` 是六种原始数据类型（`byte`、`short`、`int`、`long`、`float` 和 `double`）之一的名称。这些方法的返回类型与\
  \ `xxx` 相同。也就是说，`byteValue()` 方法返回一个 `byte`，`intValue()` 方法返回一个 `int`，等等。以下代码片段展示了如何从数值包装对象中检索不同类型的原始值：\n\
  \n```\n// 创建一个 Integer 对象\nInteger intObj = Integer.valueOf(100);\n// 从 Integer\
  \ 获取 byte\nbyte b = intObj.byteValue();\n// 从 Integer 获取 double\ndouble dd = intObj.doubleValue();\n\
  System.out.println(\"intObj = \" + intObj);\nSystem.out.println(\"从 intObj 获取的 byte\
  \ = \" + b);\nSystem.out.println(\"从 intObj 获取的 double = \" + dd);\n// 创建一个 Double\
  \ 对象\nDouble doubleObj = Double.valueOf(\"329.78\");\n// 从 Double 获取不同类型的原始值\ndouble\
  \ d = doubleObj.doubleValue();\nfloat f = doubleObj.floatValue();\nint i = doubleObj.intValue();\n\
  long l = doubleObj.longValue();\nSystem.out.println(\"doubleObj = \" + doubleObj);\n\
  System.out.println(\"从 doubleObj 获取的 double = \" + d);\nSystem.out.println(\"从 doubleObj\
  \ 获取的 float = \" + f);\nSystem.out.println(\"从 doubleObj 获取的 int = \" + i);\nSystem.out.println(\"\
  从 doubleObj 获取的 long = \" + l);\n```\n\n```\nintObj = 100\n从 intObj 获取的 byte = 100\n\
  从 intObj 获取的 double = 100.0\ndoubleObj = 329.78\n从 doubleObj 获取的 double = 329.78\n\
  从 doubleObj 获取的 float = 329.78\n从 doubleObj 获取的 int = 329\n从 doubleObj 获取的 long\
  \ = 329\n```\n\nJava 8 在一些数值包装类（如 `Integer`、`Long`、`Float` 和 `Double`）中添加了一些方法，例如\
  \ `sum()`、`max()` 和 `min()`。例如，`Integer.sum(10, 20)` 简单地返回 10 + 20 的结果。起初，你可能会想：“包装类的设计者难道没有更有用的事情可做，反而添加这些琐碎的方法吗？难道我们忘了使用加法运算符\
  \ + 来相加两个数字，所以要用 `Integer.sum(10, 20)`？” 你的假设是错误的。添加这些方法是为了更重要的目的。它们并非旨在像 `Integer.sum(10,\
  \ 20)` 这样使用。它们的引用被用于处理集合的 lambda 表达式中。我将在本系列第二卷的第 5 章的 lambda 表达式讨论中介绍它们。\n\n你的程序可能会接收以字符串形式表示的数字。你可能希望从这些字符串中获取原始值或包装对象。有时，字符串中的整数值可能以不同的基数（也称为\
  \ radix）编码，例如十进制、二进制、十六进制等。包装类有助于处理包含原始值的字符串。\n\n*   使用 `valueOf()` 方法将字符串转换为包装对象。\n\
  *   使用 `parseXxx()` 方法将字符串转换为原始值。\n\n`Byte`、`Short`、`Integer`、`Long`、`Float` 和 `Double`\
  \ 类分别包含 `parseByte()`、`parseShort()`、`parseInt()`、`parseLong()`、`parseFloat()` 和\
  \ `parseDouble()` 方法，用于将字符串解析为原始值。\n\n以下代码片段将一个包含二进制格式整数的字符串转换为一个 `Integer` 对象和一个\
  \ `int` 值：\n\n```\nString str = \"01111111\";\nint radix = 2;\n// 从字符串创建一个 Integer\
  \ 对象\nInteger intObject = Integer.valueOf(str, radix);\n// 从字符串中提取 int 值\nint intValue\
  \ = Integer.parseInt(str, 2);\nSystem.out.println(\"str = \" + str);\nSystem.out.println(\"\
  intObject = \" + intObject);\nSystem.out.println(\"intValue = \" + intValue);\n\
  ```\n\n```\nstr = 01111111\nintObject = 127\nintValue = 127\n```\n\nJava 9 在 `Integer`\
  \ 和 `Long` 类中添加了一些方法，用于解析内容并非全部是整数的字符串。以下是 `Integer` 类中此类方法的列表。`Long` 类中的方法名称以 `Long`\
  \ 结尾并返回 `long`。所有这些方法都会抛出 `NumberFormatException`。\n\n*   `int parseInt(CharSequence\
  \ s, int beginIndex, int endIndex, int radix)`\n*   `int parseUnsignedInt(CharSequence\
  \ s, int beginIndex, int endIndex, int radix)`\n*   `int parseUnsignedInt(String\
  \ s)`\n*   `int parseUnsignedInt(String s, int radix)`\n\n新版本的 `parseInt()` 方法将\
  \ `CharSequence` 参数（例如 `String`）解析为指定 `radix` 中的有符号 `int`，从指定的 `beginIndex` 开始，并扩展到\
  \ `endIndex - 1`。以下代码片段向你展示了如何使用新的 `parseInt()` 方法从格式为 `yyyy-mm-dd` 的日期字符串中提取年、月和日作为整数。\n\
  \n```\nString dateStr = \"2017-07-29\";\nint year = Integer.parseInt(dateStr, 0,\
  \ 4, 10);\nint month = Integer.parseInt(dateStr, 5, 7, 10);\nint day = Integer.parseInt(dateStr,\
  \ 8, 10, 10);\nSystem.out.println(\"年 = \" + year);\nSystem.out.println(\"月 = \"\
  \ + month);\nSystem.out.println(\"日 = \" + day);\n```\n\n```\n年 = 2017\n月 = 7\n\
  日 = 29\n```\n\n`parseInt()` 方法的三个版本将字符串解析为有符号整数，而 `parseUnsignedInt()` 方法的三个版本则将字符串中的数字解析为指定基数中的无符号整数。\n\
  \n\n\n所有数值包装类都包含几个有用的常量。它们的 `MIN_VALUE` 和 `MAX_VALUE` 常量表示其对应基本类型所能表示的最小值和最大值。例如，`Byte.MIN_VALUE`\
  \ 常量是 -128，而 `Byte.MAX_VALUE` 常量是 127，这是 `byte` 类型所能存储的最小值和最大值。它们还有一个 `SIZE` 常量，表示对应基本类型变量所占用的位数。例如，`Byte.SIZE`\
  \ 是 8，`Integer.SIZE` 是 32。\n\n通常，你会从外部来源（例如文件）接收字符串。如果字符串无法转换为数字，包装类会抛出 `NumberFormatException`。常见的做法是将字符串解析逻辑放在\
  \ `try-catch` 块中并处理这些异常。\n\n以下代码片段尝试将两个字符串解析为 `double` 值。第一个字符串包含一个有效的 `double`，第二个字符串包含一个无效的\
  \ `double`。当调用 `parseDouble()` 方法解析第二个字符串时，会抛出 `NumberFormatException`。\n\n```\n\
  String str1 = \"123.89\";\ntry {\ndouble value1 = Double.parseDouble(str1);\nSystem.out.println(\"\
  value1 = \" + value1);\n} catch (NumberFormatException e) {\nSystem.out.println(\"\
  Error in parsing \" + str1);\n}\nString str2 = \"78H.90\"; // 一个无效的 double\ntry\
  \ {\ndouble value2 = Double.parseDouble(str2);\nSystem.out.println(\"value2 = \"\
  \ + value2);\n} catch (NumberFormatException e) {\nSystem.out.println(\"Error in\
  \ parsing \" + str2);\n}\n```\n\n```\nvalue1 = 123.89\nError in parsing 78H.90\n\
  ```\n\n注意\n\n`java.math` 包包含 `BigDecimal` 和 `BigInteger` 类。它们用于存储超出基本类型 `double`\
  \ 和 `long` 范围的大十进制数和大整数。这些类是可变的，通常不被称为包装类。如果你需要对大数进行计算，并且不希望丢失超出标准基本类型范围的中间值，请使用它们。\n\
  \nCharacter 包装类\n\n`Character` 类的对象包装了一个 `char` 值。该类包含几个在处理字符时非常有用的常量和*方法*。例如，它包含\
  \ `isLetter()` 和 `isDigit()` 方法来检查一个字符是字母还是数字。`toUpperCase()` 和 `toLowerCase()`\
  \ 方法将字符转换为大写和小写。值得查阅该类的 API 文档。该类提供了一个构造函数和一个工厂方法 `valueOf()` 来从 `char` 创建对象。为了获得更好的性能，请使用工厂方法。`charValue()`\
  \ 方法返回该对象包装的 `char`。以下代码片段展示了如何创建 `Character` 对象以及如何使用它们的一些方法：\n\n```\n// 使用构造函数\n\
  Character c1 = new Character('A');\n// 使用工厂方法 - 推荐\nCharacter c2 = Character.valueOf('2');\n\
  Character c3 = Character.valueOf('ñ');\n// 获取包装的 char 值\nchar cc1 = c1.charValue();\n\
  char cc2 = c2.charValue();\nchar cc3 = c3.charValue();\nSystem.out.println(\"c1\
  \ = \" + c1);\nSystem.out.println(\"c2 = \" + c2);\nSystem.out.println(\"c3 = \"\
  \ + c3);\n// 在 c1 上使用一些 Character 类方法\nSystem.out.println(\"isLowerCase c1  = \"\
  \ + Character.isLowerCase(cc1));\nSystem.out.println(\"isDigit c1  = \" + Character.isDigit(cc1));\n\
  System.out.println(\"isLetter c1  = \" + Character.isLetter(cc1));\nSystem.out.println(\"\
  Lowercase of c1  = \" + Character.toLowerCase(cc1));\n// 在 c2 上使用一些 Character 类方法\n\
  System.out.println(\"isLowerCase c2  = \" + Character.isLowerCase(cc2));\nSystem.out.println(\"\
  isDigit c2  = \" + Character.isDigit(cc2));\nSystem.out.println(\"isLetter c2  =\
  \ \" + Character.isLetter(cc2));\nSystem.out.println(\"Lowercase of c2  = \" + Character.toLowerCase(cc2));\n\
  System.out.println(\"Uppercase of c3  = \" + Character.toUpperCase(cc3));\n```\n\
  \n```\nc1 = A\nc2 = 2\nc3 = ñ\nisLowerCase c1  = false\nisDigit c1  = false\nisLetter\
  \ c1  = true\nLowercase of c1  = a\nisLowerCase c2  = false\nisDigit c2  = true\n\
  isLetter c2  = false\nLowercase of c2  = 2\nUppercase of c3  = Ñ\n```\n\nBoolean\
  \ 包装类\n\n`Boolean` 类的对象包装了一个 `boolean` 值。`Boolean.TRUE` 和 `Boolean.FALSE` 是 `Boolean`\
  \ 类型的两个常量，分别代表布尔值 `true` 和 `false`。你可以使用构造函数或 `valueOf()` 工厂方法来创建 `Boolean` 对象。在解析字符串时，该类将“true”（忽略所有字符的大小写）视为\
  \ `true`，将任何其他字符串视为 `false`。请尽可能使用该类的 `valueOf()` 方法来创建 `Boolean` 对象，因为它会返回 `Boolean.TRUE`\
  \ 或 `Boolean.FALSE` 常量，而不是创建新对象。以下代码片段展示了如何使用 `Boolean` 类。每条语句中的变量名指示了 `Boolean`\
  \ 对象所表示的布尔值类型（`true` 或 `false`）。\n\n```\n// 使用构造函数\nBoolean b11True = new Boolean(true);\n\
  Boolean b21True = new Boolean(\"true\");\nBoolean b31True = new Boolean(\"tRuE\"\
  );\nBoolean b41False = new Boolean(\"false\");\nBoolean b51False = new Boolean(\"\
  how is this\"); // false\n// 使用工厂方法\nBoolean b12True = Boolean.valueOf(true);\n\
  Boolean b22True = Boolean.valueOf(\"true\");\nBoolean b32True = Boolean.valueOf(\"\
  tRuE\");\nBoolean b42False = Boolean.valueOf(\"false\");\nBoolean b52False = Boolean.valueOf(\"\
  how is this\"); // false\n// 从 Boolean 对象获取 boolean 值\nboolean bbTrue = b12True.booleanValue();\n\
  // 将字符串解析为 boolean 值\nboolean bTrue = Boolean.parseBoolean(\"true\");\nboolean bFalse\
  \ = Boolean.parseBoolean(\"This string evaluates to false\");\n// 使用常量\nBoolean\
  \ bcTrue    = Boolean.TRUE;\nBoolean bcFalse = Boolean.FALSE;\n// 打印一些 Boolean 对象\n\
  System.out.println(\"bcTrue = \" + bcTrue);\nSystem.out.println(\"bcFalse = \" +\
  \ bcFalse);\n```\n\n```\nbcTrue = true\nbcFalse = false\n```\n\n无符号数值运算\n\nJava\
  \ 不支持无符号基本整数数据类型。`byte`、`short`、`int` 和 `long` 都是有符号数据类型。对于有符号数据类型，一半的值范围用于存储正数，另一半用于存储负数，因为其中一位用于存储值的符号。例如，一个\
  \ `byte` 占用 8 位；其范围是 -128 到 127。如果你只想在 byte 中存储正数，其范围将是 0 到 255。\n\nJava 8 在包装类中添加了几个静态方法，这些方法支持将有符号值中的位视为无符号整数进行操作。`Byte`\
  \ 类包含两个静态方法：\n\n*   `int toUnsignedInt(byte x)`\n\n*   `long toUnsignedLong(byte\
  \ x)`\n\n这些方法将指定的 byte 参数转换为 `int` 和 `long`，就好像该 byte 存储的是一个无符号值。如果指定的 `byte` 参数是零或正数，转换后的\
  \ `int` 和 `long` 值将与参数值相同。如果参数是负数，转换后的数字将是 2⁸ + x。例如，对于输入 10，返回值将是 10；对于输入 -10，返回值将是\
  \ 2⁸ + (-10)，即 246。负数以 2 的补码形式存储。值 -10 将存储为 11110110。最高有效位 1 表示它是一个负数。前七位 (1110110)\
  \ 的 2 的补码将是 001010，即十进制 10。如果你将 byte 中的实际位 11110110 视为无符号整数，其值为 246 (128 + 64 +\
  \ 32 + 16 + 0 + 4 + 2 + 0)。以下代码片段展示了如何获取 byte 中存储的值作为无符号整数：\n\n```\nbyte b = -10;\n\
  int x = Byte.toUnsignedInt(b);\nSystem.out.println(\"Signed value in byte = \" +\
  \ b);\nSystem.out.println(\"Unsigned value in byte = \" + x);\n```\n\n```\nSigned\
  \ value in byte = -10\nUnsigned value in byte = 246\n```\n\n\n\n`Short` 类包含与 `Byte`\
  \ 类相同的两个方法，区别在于它们接受一个 `short` 参数，并将其转换为 `int` 和 `long`。Java 9 在 `Short` 类中新增了一个静态方法\
  \ `compareUnsigned(short x, short y)`，该方法将两个 short 值视为无符号数进行数值比较。如果 `x` 等于 `y`，则返回\
  \ 0；如果 `x` 作为无符号值小于 `y`，则返回小于 0 的值；如果 `x` 作为无符号值大于 `y`，则返回大于 0 的值。\n\n`Integer`\
  \ 类包含以下支持无符号运算和转换的静态方法：\n\n*   `int compareUnsigned(int x, int y)`\n\n*   `int divideUnsigned(int\
  \ dividend, int divisor)`\n\n*   `int parseUnsignedInt(String s)`\n\n*   `int parseUnsignedInt(String\
  \ s, int radix)`\n\n*   `int remainderUnsigned(int dividend, int divisor)`\n\n*\
  \   `long toUnsignedLong(int x)`\n\n*   `String toUnsignedString(int i)`\n\n*  \
  \ `String toUnsignedString(int i, int radix)`\n\n请注意，`Integer` 类不包含 `addUnsigned()`、`subtractUnsigned()`\
  \ 和 `multiplyUnsigned()` 方法，因为这三个操作对有符号和无符号两个操作数在比特位上是相同的。以下代码片段展示了将两个 `int` 变量视为其比特位表示无符号值时的除法运算：\n\
  \n```\n// 两个负的 int 值\nint x = -10;\nint y = -2;\n// 执行有符号除法\nSystem.out.println(\"\
  有符号 x = \" + x);\nSystem.out.println(\"有符号 y = \" + y);\nSystem.out.println(\"有符号\
  \ x/y = \" + (x/y));\n// 通过将 x 和 y 视为无符号值来执行无符号除法\nlong ux = Integer.toUnsignedLong(x);\n\
  long uy = Integer.toUnsignedLong(y);\nint uQuotient = Integer.divideUnsigned(x,\
  \ y);\nSystem.out.println(\"无符号 x = \" + ux);\nSystem.out.println(\"无符号 y = \" +\
  \ uy);\nSystem.out.println(\"无符号 x/y = \" + uQuotient);\n```\n\n```\n有符号 x = -10\n\
  有符号 y = -2\n有符号 x/y = 5\n无符号 x = 4294967286\n无符号 y = 4294967294\n无符号 x/y = 0\n```\n\
  \n`Long` 类包含执行无符号运算的方法。这些方法与 `Integer` 类中的方法类似。请注意，你不能将 `long` 中存储的值转换为无符号值，因为这样做需要比\
  \ `long` 数据类型提供的更大的存储空间，但 `long` 是 Java 提供的最大整数数据类型。这就是 `Byte` 和 `Short` 类拥有 `toUnsignedInt()`\
  \ 和 `toUnsignedLong()` 方法的原因，因为 `int` 和 `long` 比 `byte` 和 `short` 更大。实际上，要将有符号数据类型\
  \ `X` 的值作为无符号值存储在有符号数据类型 `Y` 中，数据类型 `Y` 的大小至少需要是 `X` 的两倍。遵循此存储要求，`Integer` 类中有一个\
  \ `toUnsignedLong()` 方法，但 `Long` 类中没有此类方法。\n\n自动装箱与拆箱\n\n自动装箱和拆箱用于在基本数据类型及其对应的包装类之间自动转换值。它们完全在编译器中实现。在定义自动装箱/拆箱之前，我们先讨论一个示例。这个示例很简单，但它足以说明在\
  \ Java 5 引入自动装箱之前，你在处理基本类型与其包装对象之间的转换时所经历的痛苦。\n\n假设你有一个方法，它接受两个 `int` 值，将它们相加，并返回一个\
  \ `int` 值。你可能会说：“这个方法有什么大不了的？”它应该像下面这样简单：\n\n```\n// 仅显示方法代码\npublic static int\
  \ add(int a, int b) {\nreturn a + b;\n}\n```\n\n该方法可以如下使用：\n\n```\nint a = 200;\n\
  int b = 300;\nint result = add(a, b); // result 将得到值 500\n```\n\n你说得对，这个方法确实没什么大不了的。让我们稍微改变一下逻辑。考虑同一个方法使用\
  \ `Integer` 对象而不是 `int` 值。以下是该方法的代码：\n\n```\npublic static Integer add(Integer a,\
  \ Integer b) {\nint aValue = a.intValue();\nint bValue = b.intValue();\nint resultValue\
  \ = aValue + bValue;\nInteger result = new Integer(resultValue);\nreturn result;\n\
  }\n```\n\n你是否注意到，当你将同一个方法改为使用 `Integer` 对象时，所涉及的复杂性？你必须执行三步操作才能将 `Integer` 对象中的两个\
  \ `int` 值相加。\n\n*   使用方法参数 `a` 和 `b`，通过它们的 `intValue()` 方法将它们从 `Integer` 对象解包为 `int`\
  \ 值。\n\n```\n    int aValue = a.intValue();\n    int bValue = b.intValue();\n  \
  \  ```\n\n*   执行两个 `int` 值的加法。\n\n```\n    int resultValue = aValue + bValue;\n\
  \    ```\n\n*   将结果包装成一个新的 `Integer` 对象并返回结果。\n\n```\n    Integer result = Integer.valueOf(resultValue);\n\
  \    return result;\n    ```\n\n清单 12-3 提供了演示 `add()` 方法使用的完整代码。\n\n```\n// MathUtil.java\n\
  package com.jdojo.wrapper;\npublic class MathUtil {\npublic static Integer add(Integer\
  \ a, Integer b) {\nint aValue = a.intValue();\nint bValue = b.intValue();\nint resultValue\
  \ = aValue + bValue;\nInteger result = Integer.valueOf(resultValue);\nreturn result;\n\
  }\npublic static void main(String[] args) {\nint iValue = 200;\nint jValue = 300;\n\
  int kValue;\n/* 将结果保存为 int */\n// 将 iValue 和 jValue 装箱为 Integer 对象\nInteger i =\
  \ Integer.valueOf(iValue);\nInteger j = Integer.valueOf(jValue);\n// 将 add() 方法的返回值存储在\
  \ Integer 对象 k 中\nInteger k = MathUtil.add(i, j);\n// 将 Integer 对象的 int 值解包到 kValue\
  \ int 变量中\nkValue = k.intValue();\n// 使用 int 变量显示结果\nSystem.out.println(iValue +\
  \ \" + \" + jValue + \" = \" + kValue);\n}\n}\n清单 12-3.\n使用 Integer 对象添加两个 int 值\n\
  ```\n\n```\n200 + 300 = 500\n```\n\n请注意，仅仅为了添加两个 `int` 值就需要这么多代码。将 `int` 值包装/解包为\
  \ `Integer` 以及反向操作对 Java 开发者来说是一种痛苦。Java 设计者意识到了这一点（尽管为时已晚），并为你自动化了这个包装和解包过程。\n\n\
  从基本数据类型（`byte`、`short`、`int`、`long`、`float`、`double`、`char` 和 `boolean`）自动包装到其对应的包装对象（`Byte`、`Integer`、`Long`、`Float`、`Double`、`Character`\
  \ 和 `Boolean`）称为自动装箱。相反的过程，即从包装对象解包到其对应的基本数据类型值，称为拆箱。有了自动装箱/拆箱，以下代码是有效的：\n\n```\n\
  Integer n = 200; // 装箱\nint a = n;       // 拆箱\n```\n\n编译器会将上述语句替换为以下内容：\n\n```\n\
  Integer n = Integer.valueOf(200);\nint a = n.intValue();\n```\n\n清单 12-3 中列出的 `MathUtil`\
  \ 类的 `main()` 方法中的代码可以重写如下。装箱和拆箱会自动为你完成。\n\n```\nint iValue = 200;\nint jValue =\
  \ 300;\nint kValue = MathUtil.add(iValue, jValue);\nSystem.out.println(iValue +\
  \ \" + \" + jValue + \" = \" + kValue);\n```\n\n提示\n\n自动装箱/拆箱\n    是在编译代码时执行的。JVM\
  \ 完全不知道编译器执行的装箱和拆箱操作。\n\n警惕空值\n\n自动装箱/拆箱使你免于编写额外的代码行。它还使你的代码看起来更整洁。然而，它确实带来了一些意外。其中一个意外是在你意想不到的地方出现\
  \ `NullPointerException`。基本数据类型不能赋值为 `null`，而引用类型可以赋值为 `null`。装箱和拆箱发生在基本类型和引用类型之间。请看以下代码片段：\n\
  \n```\nInteger n = null; // n 可以被赋值为 null\nint a = n;        // 运行时将抛出 NullPointerException\n\
  ```\n\n\n\n在这段代码片段中，假设你无法控制将 `null` 赋值给 `n` 的情况。你可能会因为方法调用（例如 `int a = getSomeValue()`，其中\
  \ `getSomeValue()` 返回一个 `Integer` 对象）而得到一个 `null Integer` 对象。在这种情况下，`NullPointerException`\
  \ 可能会让你感到意外。然而，这种情况确实会发生，因为 `int a = n` 会被转换为 `int a = n.intValue()`，而此处的 `n` 是\
  \ `null`。这种意外正是自动装箱/拆箱带来的优势的一部分，你需要对此有所了解。\n\n重载方法与自动装箱/拆箱\n\n当你调用重载方法并希望依赖自动装箱/拆箱特性时，可能会遇到一些意外情况。假设一个类中有两个方法。\n\
  \n```\npublic void test(Integer iObject) {\nSystem.out.println(\"Integer=\" + iObject);\n\
  }\npublic void test(int iValue) {\nSystem.out.println(\"int=\" + iValue);\n}\n```\n\
  \n假设你对 `test()` 方法进行了两次调用。\n\n```\ntest(101);\ntest(new Integer(101));\n```\n\n\
  以下哪个会是输出结果？\n\n```\nint=101\nInteger=101\n```\n\n还是\n\n```\nInteger=101\nint=101\n\
  ```\n\n使用自动装箱/拆箱的方法调用规则遵循一个两步过程。\n\n1.  如果传入的实际参数是基本类型（如 `test(10)`）：\n\n1.  尝试查找具有基本类型参数的方法。如果没有精确匹配，则尝试拓宽基本类型以找到匹配。\n\
  2.  如果上一步失败，则将基本类型装箱并尝试找到匹配。\n\n2.  如果传入的实际参数是引用类型（如 `test(new Integer(101)`）：\n\
  \n1.  尝试查找具有引用类型参数的方法。如果找到匹配，则调用该方法。在这种情况下，匹配不必是精确的。它应遵循子类型和超类型的赋值规则。\n2.  如果上一步失败，则将引用类型拆箱为对应的基本类型，并尝试找到精确匹配，或者拓宽基本类型并找到匹配。\n\
  \n如果你将这些规则应用于前面的代码片段，它将输出以下内容：\n\n```\nint=101\nInteger=101\n```\n\n假设你有以下两个 `test()`\
  \ 方法：\n\n```\npublic void test(Integer iObject) {\nSystem.out.println(\"Integer=\"\
  \ + iObject);\n}\npublic void test(long iValue) {\nSystem.out.println(\"long=\"\
  \ + iValue);\n}\n```\n\n如果你使用以下代码，会输出什么？\n\n```\ntest(101);\ntest(new Integer(101));\n\
  ```\n\n它将输出：\n\n```\nlong=101\nInteger=101\n```\n\n第一次调用 `test(101)` 会尝试为 `int`\
  \ 参数找到精确匹配。它没有找到 `test(int)` 方法，因此拓宽了 `int` 数据类型，找到了匹配的 `test(long)` 方法，并调用该方法。假设你有以下两个\
  \ `test()` 方法：\n\n```\npublic void test(Long lObject) {\nSystem.out.println(\"Long=\"\
  \ + lObject);\n}\npublic void test(long lValue) {\nSystem.out.println(\"long=\"\
  \ + lValue);\n}\n```\n\n如果你执行以下代码，会输出什么？\n\n```\ntest(101);\ntest(new Integer(101));\n\
  ```\n\n它将输出：\n\n```\nlong=101\nlong=101\n```\n\n看到这个输出你是否感到惊讶？应用我列出的规则，你会发现这个输出遵循了这些规则。对\
  \ `test(101)` 的调用很清晰，因为它将 101 从 `int` 拓宽为 `long`，并执行了 `test(long)` 方法。对于调用 `test(new\
  \ Integer(101))`，它会查找 `test(Integer)` 方法，但没有找到。也就是说，`Integer` 永远不会被拓宽为 `Long`。因此，它将\
  \ `Integer` 拆箱为 `int`，并查找 `test(int)` 方法，但没有找到。接着，它拓宽了 `int`，找到了 `test(long)` 方法并执行。\n\
  \n考虑以下三个 `test()` 方法。我在前面的方法列表中新增了一个 `test(Number nObject)` 方法：\n\n```\npublic void\
  \ test(Long lObject) {\nSystem.out.println(\"Long=\" + lObject);\n}\npublic void\
  \ test(Number nObject) {\nSystem.out.println(\"Number=\" + nObject);\n}\npublic\
  \ void test(long lValue) {\nSystem.out.println(\"long=\" + lValue);\n}\n```\n\n\
  如果你执行以下代码，会输出什么？\n\n\n\n```\ntest(101);\ntest(new Integer(101));\n```\n\n它将打印以下内容：\n\
  \n```\nlong=101\nNumber=101\n```\n\n看到输出结果，你是否再次感到惊讶？请运用我列出的规则。对 `test(101)` 的调用很清晰。\n\
  对于 `test(new Integer(101))` 的调用，它会寻找一个 `test(Integer)` 方法，但并未找到。根据规则列表中的规则 2(a)，它尝试将\
  \ `Integer` 参数拓宽为 `Number` 或 `Object`。回想一下，所有数值包装类都继承自 `Number` 类。因此，`Integer` 可以赋值给\
  \ `Number` 类型的变量。它在第二个 `test(Number nObject)` 方法中找到了匹配项并执行了它。\n\n我还有一个惊喜要给你。考虑以下两个\
  \ `test()` 方法：\n\n```\npublic void test(Long lObject) {\nSystem.out.println(\"Long=\"\
  \ + lObject);\n}\npublic void test(Object obj) {\nSystem.out.println(\"Object=\"\
  \ + obj);\n}\n```\n\n当你执行以下代码时，会打印出什么？\n\n```\ntest(101);\ntest(new Integer(101));\n\
  ```\n\n这一次，你将得到以下输出：\n\n```\nObject=101\nObject=101\n```\n\n这说得通吗？其实不然。以下是解释。当它调用\
  \ `test(101)` 时，必须将 `int` 装箱为 `Integer`，因为即使拓宽了 `int` 值，也没有与 `test(int)` 匹配的方法。所以，`test(101)`\
  \ 变成了 `test(Integer.valueOf(101))`。现在它也没有找到任何 `test(Integer)` 方法。请注意，`Integer` 是一种引用类型，它继承自\
  \ `Number` 类，而 `Number` 类又继承自 `Object` 类。因此，`Integer` 始终是一个 `Object`，并且 Java 允许你将子类型\
  \ `(Integer)` 的对象赋值给超类型 `(Object)` 的变量。这就是在这种情况下调用 `test(Object)` 的原因。第二个调用 `test(new\
  \ Integer(101))` 的工作方式相同。它尝试寻找 `test(Integer)` 方法。当找不到时，根据引用类型的子类型和超类型赋值规则，下一个匹配项就是\
  \ `test(Object)`。\n\n比较运算符\n与自动装箱/拆箱\n\n本节讨论比较操作 `==`、`>`、`>=`、`<` 和 `<=`。只有 `==`（逻辑相等运算符）可以同时用于引用类型和基本类型。其他运算符只能用于基本类型。\n\
  \n我们先来看简单的（`>`、`>=`、`<` 和 `<=`）。如果数值包装对象与这些比较运算符一起使用，则必须将其拆箱，并在比较中使用相应的基本类型。考虑以下代码片段：\n\
  \n```\nInteger a = 100;\nInteger b = 100;\nSystem.out.println(\"a : \" + a);\nSystem.out.println(\"\
  b : \" + b);\nSystem.out.println(\"a > b: \" + (a > b));\nSystem.out.println(\"\
  a >= b: \" + (a >= b));\nSystem.out.println(\"a < b: \" + (a < b));\nSystem.out.println(\"\
  a <= b: \" + (a <= b));\n```\n\n```\na : 100\nb : 100\na > b: false\na >= b: true\n\
  a < b: false\na <= b: true\n```\n\n这个输出结果并不令人意外。如果你将引用类型和基本类型这两种类型混合使用这些比较运算符，仍然会得到相同的结果。首先，引用类型会被拆箱，然后对两个基本类型进行比较。例如，\n\
  \n```\nif (101 > new Integer(100)) {\n// 执行某些操作\n}\n```\n\n会被转换为\n\n```\nif(101\
  \ <= (new Integer(100)).intValue()) {\n// 执行某些操作\n}\n```\n\n现在，我们来讨论 `==` 运算符和自动装箱规则。如果两个操作数都是基本类型，则使用值比较将它们作为基本类型进行比较。如果两个操作数都是引用类型，则比较它们的引用。在这两种情况下，不会发生自动装箱/拆箱。当一个操作数是引用类型，另一个是基本类型时，引用类型会被拆箱为基本类型，然后进行值比较。让我们看看每种类型的示例。\n\
  \n考虑以下代码片段。这是一个对 `==` 运算符使用两个基本类型操作数的示例。\n\n```\nint a = 100;\nint b = 100;\nint\
  \ c = 505;\nSystem.out.println(a == b); // 将打印 true\nSystem.out.println(a == c);\
  \ // 将打印 false\n```\n\n考虑以下代码片段：\n\n\n```markdown\n\n```\nInteger aa = new Integer(100);\n\
  Integer bb = new Integer(100);\nInteger cc = new Integer(505);\nSystem.out.println(aa\
  \ == bb); // 将打印 false\nSystem.out.println(aa == cc); // 将打印 false\n```\n\n在这段代码中，没有发生自动装箱/拆箱。这里，`aa\
  \ == bb` 和 `aa == cc` 比较的是\n`aa`、`bb` 和 `cc` 的引用，而不是它们的值。\n每个通过 `new` 运算符创建的对象都有\n\
  唯一的引用。现在，有一个惊喜：请看下面这段代码。这次你依赖的是自动装箱。\n\n```\nInteger aaa = 100; // 装箱 – Integer.valueOf(100)\n\
  Integer bbb = 100; // 装箱 – Integer.valueOf(100)\nInteger ccc = 505; // 装箱 – Integer.valueOf(505)\n\
  Integer ddd = 505; // 装箱 – Integer.valueOf(505)\nSystem.out.println(aaa == bbb);\
  \ // 将打印 true\nSystem.out.println(aaa == ccc); // 将打印 false\nSystem.out.println(ccc\
  \ == ddd); // 将打印 false\n```\n\n你将 `aaa`、\n`bbb`、`ccc` 和 `ddd` 用作引用\n类型。为什么\n`aaa\
  \ == bbb` 是 `true`\n而 `ccc == ddd` 是 `false`？好吧。这次，惊喜并非来自\n自动装箱特性。而是来自 `Integer.valueOf()`\n\
  方法。对于 -128 到 127 之间的所有值，`Integer` 类会缓存\n`Integer` 对象\n引用。当你调用它的 `valueOf()` 方法时，会使用这个缓存。例如，\n\
  如果你调用 `Integer.valueOf(100)`\n两次，你会从缓存中获得代表 `int` 值 100 的同一个 `Integer` 对象的引用。\n\
  然而，如果你调用 `Integer.valueOf(n)`，\n其中 `n` 在\n-128 到 127 的范围之外，那么每次调用都会创建一个新对象。\n这就是\
  \ `aaa` 和 `bbb` 从缓存中获得相同\n引用，而 `ccc` 和 `ddd` 获得不同\n引用的原因。`Byte`、`Short`、`Character`\
  \ 和 `Long` 类也会\n缓存 -128 到 127 范围内值的对象引用。\n\n集合 与\n自动装箱/拆箱\n\n自动装箱/拆箱帮助你处理集合。\n集合只处理引用类型。你不能在集合中使用原始\n\
  类型。如果你想在集合中存储原始类型，你必须在存储之前包装原始值，\n并在检索之后拆包。假设你有一个 `List`，并且你想在其中存储整数。\n你可以这样做：\n\
  \n```\nList list = new ArrayList();\nlist.add(new Integer(101));\nInteger a = (Integer)list.get(0);\n\
  int aValue = a.intValue();\n```\n\n你又回到了原点。`List` 接口的 `add()` 和 `get()` 方法\n处理 `Object`\
  \ 类型，你\n不得不再次求助于包装和拆包原始类型。自动装箱/拆箱可以帮助你将原始类型包装成引用类型，这段代码可以重写如下：\n\n```\nList list\
  \ = new ArrayList();\nlist.add(101);                    // 自动装箱将在此处生效\nInteger a\
  \ = (Integer)list.get(0);\nint aValue = a.intValue();\n/*int aValue = list.get(0);\
  \ */    // 自动拆箱将无法编译\n```\n\n因为 `get()` 方法的返回类型是 `Object`，所以这段代码中的最后一条语句将无法工作。请注意，拆箱\n\
  是从原始包装类型（如 `Integer`）到其对应的原始类型（如 `int`）。如果你尝试将\n一个 `Object` 引用类型\n赋值给一个 `int`\n\
  原始类型，自动拆箱不会发生。事实上，你的代码\n甚至无法编译，因为不允许 `Object` 到 `int` 的转换。\n\n尝试以下代码：\n\n```\nList\
  \ list = new ArrayList();\nlist.add(101); // 自动装箱将生效\nint aValue = list.get(0);\
  \ // 自动拆箱也将生效\n```\n\n所有集合类都是泛型的。它们声明了形式类型参数。\n在创建 `List` 对象时，在尖括号\n（`<Integer>`）中指定\
  \ `Integer` 类型，告诉\n编译器该 `List` 将只持有\n`Integer` 类型的对象。这\n使得编译器可以在你处理 `List` 对象时自由地包装和拆包你的原始\
  \ `int` 值。更多细节请参考本系列第二卷中关于泛型的第 4 章。\n\n总结\n\n对于每种原始数据类型，Java 都提供了一个类来将原始数据类型的值表示为对象。Java\
  \ 不支持无符号原始数字数据类型和无符号数字运算。Java 8 通过在包装类中添加一些方法，为原始数据类型的无符号运算增加了有限的支持。Java 9 在 `Integer`\
  \ 和 `Long` 类中添加了一些方法，用于将字符串解析为无符号整数。Java 9 还在 `Short` 类中添加了一个方法，用于将两个 `short` 值作为无符号\
  \ `short` 值进行比较。\n\nJava 不允许在同一表达式中混合使用原始类型和引用类型的值。将原始值转换为其包装对象以及反向转换很不方便。Java 5\
  \ 增加了根据上下文自动将原始值转换为包装对象以及反向转换的支持。这个特性被称为自动装箱/拆箱。例如，它允许将整数 25 赋值给一个 `Integer` 对象的引用；编译器使用表达式\
  \ `Integer.valueOf(25)` 自动将整数 25 装箱到一个包装对象中。\n\n问题与练习\n\n1.  Java 中的包装类是什么？请说出以下原始类型的包装类名称：`byte`、`int`、`long`\
  \ 和 `char`。\n\n2.  使用包装类 `Integer`，打印 `int` 数据类型的最大值和最小值。\n\n3.  数字包装类的超类名称是什么？\n\
  \n4.  假设你有一个字符串 `\"1969\"`。完成以下代码片段，将字符串中的整数值存储到一个 `int` 变量和一个 `Integer` 对象中。\n\n\
  ```\n    String str = \"1969\";\n    int value = /* 你的代码写在这里 */;\n    Integer object\
  \ = /* 你的代码写在这里 */;\n    ```\n\n5.  你有一个字符串 `\"7B1\"`，其中包含一个十六进制格式的整数。使用 `Integer`\
  \ 类解析并将其值存储在一个 `int` 变量中。\n\n6.  以下代码片段能编译吗？如果能，请描述规则/原因。\n\n```\n    Integer x\
  \ = 19;\n    ```\n\n7.  你有一个整数值 1969，并且想以十六进制格式打印它的值。完成以下实现此目的的代码片段：\n\n```\n  \
  \  int x = 1969;\n    String str = Integer./* 你的代码写在这里 */;\n    System.out.println(\"\
  1969 in hex is \" + str);\n    ```\n\n8.  为什么以下语句不能编译\n\n```\n    Double x = 1969;\n\
  \    ```\n\n而以下语句可以？\n\n```\n    double y = 1969;\n    ```\n\n请确保你理解这些语句无效和有效背后的原因。描述以下语句是如何编译的。\n\
  \n```\n    Number x = 1969;\n    ```\n\n9.  以下代码片段的输出是什么？解释你的答案。\n\n```\n    Number\
  \ x = 1969;\n    System.out.println(x.getClass().getSimpleName());\n    ```\n\n\
  10. 运行以下代码片段时，输出是什么？\n\n```\n    Double x = 128.5;\n    System.out.println(x.intValue());\n\
  \    System.out.println(x.byteValue());\n    ```\n\n13. 异常处理\n\n在本章中，你将学习：\n\n*\
  \   关于在 Java 中使用异常进行错误处理\n\n*   如何使用 `try-catch` 块来处理异常\n\n*   如何使用 `finally` 块来清理资源\n\
  \n*   已检查异常和未检查异常之间的区别\n\n*   如何创建新的异常类型并在程序中使用它\n\n*   如何使用 `try-catch-resources`\
  \ 块使用自动关闭资源\n\n*   如何访问线程的栈帧\n\n*   如何获取方法的调用者的类名\n\n本章中的所有类都是 `jdojo.exception`\
  \ 模块的成员，如清单 13-1 中所声明。\n\n```\n// module-info.java\nmodule jdojo.exception {\nexports\
  \ com.jdojo.wrapper;\n}\n清单 13-1.\njdojo.exception 模块的声明\n```\n\n什么是异常？\n\n```\n\
  \n\n异常是一种在 Java 程序执行过程中，当正常执行路径无法定义时可能出现的情况。例如，Java 程序可能会遇到一个试图将整数除以零的数值表达式。这种情况可能发生在执行以下代码片段时：\n\
  \n```\nint x = 10, y = 0, z;\nz = x / y; // 除零错误\n```\n\n语句 `z = x / y` 试图将 `x`\
  \ 除以 `y`。由于 `y` 为零，`x / y` 的结果在 Java 中未定义。请注意，将浮点数除以零，例如 `9.5 / 0.0`，是有定义的，其结果为无穷大。概括来说，像整数除以零这样的异常情况可以表述如下：\n\
  \n当 Java 程序试图将整数除以零时，就会发生错误。\n\nJava 编程语言对上述错误情况的描述有所不同。在 Java 中，我们这样说：\n\n当 Java\
  \ 程序试图将整数除以零时，会抛出异常。\n\n实际上，这两种说法意思相同。它们都表示程序中发生了异常情况。程序中发生异常情况后会发生什么？你需要处理这种异常情况。处理方法之一是在执行操作之前，检查所有可能导致异常情况的可能性。你可以将之前的代码重写如下：\n\
  \n```\nint x = 10, y = 0, z;\nif (y == 0) {\n// 在此处报告异常/错误情况\n} else {\n// 在此处执行除法\n\
  z = x / y;\n}\n```\n\n你可能会注意到，这段代码做了两件事：处理错误情况并执行预期操作。它将执行错误处理的代码和操作代码混合在一起。一行代码（`z\
  \ = x / y`）膨胀到了至少五行代码。这只是一个简单的例子。当错误处理代码与实际执行操作的代码混合在一起时，你可能无法完全意识到真正的问题。\n\n为了更清楚地说明这个问题，再考虑另一个例子。假设你想编写\
  \ Java 代码来更新员工的薪水。员工记录存储在数据库中。伪代码可能如下所示：\n\n```\n连接到数据库\n获取员工记录\n更新员工薪水\n提交更改\n\
  ```\n\n实际代码会执行这四个操作。这四个操作中的任何一个都可能导致错误。例如，你可能因为数据库宕机而无法连接到数据库；你可能因为某些验证失败而无法提交更改。你需要在执行一个操作之后、开始下一个操作之前进行错误检查。带有错误检查的伪代码可能如下所示：\n\
  \n```\n// 连接到数据库\nif (成功连接到数据库) {\n// 获取员工记录\nif (已获取员工记录) {\n// 更新员工薪水\nif (更新成功)\
  \ {\n// 提交更改\nif (提交成功) {\n// 员工薪水已成功保存\n} else {\n// 错误。保存失败\n}\n} else {\n// 错误。无法更新薪水\n\
  }\n} else {\n// 错误。员工记录不存在\n}\n} else {\n// 错误。无法连接到数据库\n}\n```\n\n请注意，当你为四行伪代码添加错误处理时，代码膨胀到了二十多行。这段代码最糟糕的地方在于，执行操作的代码被错误处理代码弄得杂乱无章。它还引入了许多嵌套的\
  \ `if-else` 语句，导致代码像意大利面条一样混乱。\n\n在最后两个例子中，你看到使用 `if-else` 语句处理错误的方式既不优雅，也难以维护。Java\
  \ 有一种更好的错误处理方式：将执行操作的代码与处理错误的代码分离开来。在 Java 中，我们使用术语“异常”而不是“错误”来表示程序中的异常情况；使用术语“异常处理”而不是“错误处理”。通常，我们说错误发生，然后你处理它。在\
  \ Java 中，我们说异常被抛出，然后你捕获它。这就是异常处理也被称为捕获异常的原因。处理异常的代码被称为异常处理器。你可以使用 Java 语法（虽然不是完整的\
  \ Java 代码）将之前的伪代码重写如下：\n\n```\ntry {\n// 连接到数据库\n// 获取员工记录\n// 更新员工薪水\n// 提交更改\n\
  } catch(DbConnectionException e1){\n// 在此处处理数据库连接异常\n} catch(EmpNotFoundException\
  \ e2){\n// 在此处处理员工未找到异常\n} catch(UpdateFailedException e3){\n// 在此处处理更新失败异常\n} catch(CommitFailedException\
  \ e4){\n// 在此处处理提交失败异常\n}\n```\n\n你不需要完全理解前面的伪代码。我稍后会详细讨论。你需要观察代码的结构，它允许将执行操作的代码与处理异常的代码分离开来。执行操作的代码放在\
  \ `try` 块中，处理异常的代码放在 `catch` 块中。你会发现，与之前需要编写许多 `if-else` 语句才能达到相同效果的尝试相比，这段代码在优雅性和可维护性方面要好得多。\n\
  \n提示\n\n在 Java 中，异常被抛出并被捕获。捕获异常等同于处理异常。执行操作的代码可能会抛出异常，而处理异常的代码会捕获抛出的异常。这种异常处理风格允许你将执行操作的代码与处理执行操作时可能出现的异常的代码分离开来。\n\
  \n异常是一个对象\n\n代码的异常处理部分如何知道另一部分代码中发生的异常？当异常发生时，Java 会创建一个包含异常所有信息（例如，异常类型、代码中发生异常的行号等）的对象，并将其传递给适当的异常处理器。术语“异常”用于表示两种含义——异常情况以及表示异常情况的\
  \ Java 对象。该术语的含义将从上下文中明确。当我们谈论抛出异常时，我们谈论的是三件事。\n\n*   异常情况的发生\n*   创建一个 Java 对象来表示异常情况\n\
  *   将异常对象抛出（或传递）给异常处理器\n\n抛出异常等同于向方法传递对象引用。在这里，你可以将异常处理器想象成一个接受异常对象引用的方法。异常处理器捕获异常对象并采取适当的行动。你可以将异常处理器捕获异常视为一次没有返回值的方法调用，其中异常对象的引用是方法的实际参数。Java\
  \ 还允许你创建自己的表示异常的对象，然后将其抛出。\n\n提示\n\nJava 中的异常是一个封装了程序中错误细节的对象。\n\n使用 try-catch 块\n\
  \n在我讨论 `try-catch` 块之前，让我们编写一个试图将整数除以零的 Java 程序，如清单 13-2 所示。\n\n\n\n```\n// DivideByZero.java\n\
  package com.jdojo.exception;\npublic class DivideByZero {\npublic static void main(String[]\
  \ args) {\nint x = 10, y = 0, z;\nz = x / y;\nSystem.out.println(\"z = \" + z);\n\
  }\n}\n清单 13-2.\n一个尝试用整数除以零的 Java 程序\n```\n\n```\nException in thread \"main\" java.lang.ArithmeticException:\
  \ / by zero\nat com.jdojo.exception.DivideByZero.main(DivideByZero.java:7)\n```\n\
  \n你是否预料到清单 13-2 会输出这样的结果？它表明\n当你运行 `DivideByZero` 类时发生了一个异常。\n该输出包含四部分信息：\n\n* \
  \  它包含了发生异常的线程名称。该线程的名称是 `\"main\"`。你可以在本系列第二卷的第 6 章中详细了解线程及线程名称。\n\n*   它包含了所发生异常的类型。异常类型由异常对象的类名表示。在本例中，`java.lang.ArithmeticException`\
  \ 是异常类的名称。Java 运行时创建了该类的一个对象，并将其引用传递给异常处理器。\n\n*   它包含一条消息，描述了代码中导致错误的异常情况。在本例中，消息是“/\
  \ by zero”（读作“除以零”）。\n\n*   它包含了异常发生的位置。输出中的第二行表明异常发生在 `com.jdojo.exception.DivideByZero`\
  \ 类的 `main()` 方法内部。源代码包含在 `DivideByZero.java` 文件中。导致异常的源代码行号为 7。\n\n你可能会注意到，仅在两行输出中，Java\
  \ 运行时就已经打印了足够多的信息来帮助你追踪代码中的错误。\n\n当执行到第 7 行的 `z = x / y` 时，Java 运行时检测到了异常情况，即尝试用整数除以零。它创建了一个新的\
  \ `ArithmeticException` 类对象，其中包含了关于该异常的所有相关信息，然后将此对象抛出（或传递）给异常处理器。在本例中，是谁捕获（或处理）了这个异常？你在代码中没有指定任何异常处理器。事实上，你目前甚至不知道如何指定异常处理器。由于你在本例中没有指定异常处理器，Java\
  \ 运行时为你处理了该异常。Java 运行时是否会处理 Java 程序中抛出的所有异常？答案是肯定的。Java 运行时处理 Java 程序中的所有异常。然而，它只在你没有自行处理异常时才会介入处理。\n\
  \n如果发生异常，而 Java 运行时没有找到程序员定义的异常处理器来处理它，这种异常被称为**未捕获异常**。所有未捕获异常都由 Java 运行时处理。既然未捕获异常总是由\
  \ Java 运行时处理，那你为什么还要费心在程序中提供任何异常处理器呢？这是一个有趣的问题。为什么你需要操心去做那些 Java 运行时会替你完成的事情？如果你懒得收拾自己的烂摊子（处理自己的错误情况），那对你来说有个坏消息。你不应该对\
  \ Java 运行时期望过高。你可能不喜欢运行时为你处理异常的方式。它会捕获未捕获异常，在标准错误上打印错误堆栈，然后终止你的 Java 应用程序。换句话说，如果你让\
  \ Java 运行时处理你所有的异常，你的程序会在异常发生的地方停止执行。这是你想要的结果吗？答案是否定的。有时，在处理完异常后，你可能希望继续执行程序的其余部分，而不是终止程序。当你运行\
  \ `DivideByZero` 类时，语句 `z = x / y` 中的表达式 `x / y` 导致了一个异常。Java 没有完成执行语句 `z = x /\
  \ y`。这种情况有时被描述为“语句 `z = x / y` 异常终止”。运行时处理了该异常，但它停止了整个程序的执行。这就是为什么你在程序中看不到以下语句输出的原因：\n\
  \n```\nSystem.out.println(\"z = \" + z);\n```\n\n现在你知道了，让运行时处理你的异常并不总是一个好主意。如果你想自己处理异常，你需要将代码放在一个\
  \ `try` 块中。一个 `try` 块看起来像下面这样：\n\n```\ntry {\n// try 块的代码放在这里\n}\n```\n\n一个 `try`\
  \ 块以关键字 `try` 开头，后跟一个左花括号和一个右花括号。`try` 块的代码放在左花括号和右花括号之间。\n\n一个 `try` 块不能单独使用。它后面必须跟一个或多个\
  \ `catch` 块，或者一个 `finally` 块，或者两者的组合。要处理 `try` 块内代码可能抛出的异常，你需要使用一个 `catch` 块。一个\
  \ `catch` 块可以用来处理多种类型的异常。目前，我将重点放在一个 `catch` 块只处理一种类型的异常上；我将在单独的一节中介绍如何在一个 `catch`\
  \ 块中处理多个异常。`catch` 块的语法类似于方法的语法：\n\n```\ncatch (异常类名 参数名) {\n// 异常处理代码放在这里\n}\n\
  ```\n\n请注意，`catch` 块的声明完全类似于方法声明。它以关键字 `catch` 开头，后跟一对圆括号。在圆括号内，你声明一个参数，就像在方法中一样。参数类型是它应该捕获的异常类的名称。`参数名`\
  \ 是用户给定的名称。圆括号后面跟着一个左花括号和一个右花括号。异常处理代码放在花括号内。当抛出异常时，异常对象的引用会被复制到 `参数名` 中。你可以使用 `参数名`\
  \ 从异常对象中获取信息。它的行为完全类似于方法的形式参数。\n\n你可以将一个或多个 `catch` 块关联到一个 `try` 块。`try-catch` 块的一般语法如下。下面的代码片段展示了一个\
  \ `try` 块，它关联了三个 `catch` 块。你可以根据需要将任意数量的 `catch` 块关联到一个 `try` 块。\n\n\n\n```\ntry\
  \ {\n// 此处放置可能抛出异常的代码\n} catch (ExceptionClass1 e1){\n// 处理 ExceptionClass1 类型的异常\n\
  } catch (ExceptionClass2 e2){\n// 处理 ExceptionClass2 类型的异常\n} catch (ExceptionClass3\
  \ e3){\n// 处理 ExceptionClass3 类型的异常\n}\n```\n\n让我们使用一个 `try-catch` 块来处理代码中可能出现的除零异常。清单\
  \ 13-3 展示了完整代码。\n\n```\n// DivideByZeroWithTryCatch.java\npackage com.jdojo.exception;\n\
  public class DivideByZeroWithTryCatch {\npublic static void main(String[] args)\
  \ {\nint x = 10, y = 0, z;\ntry {\nz = x / y;\nSystem.out.println(\"z = \" + z);\n\
  } catch (ArithmeticException e) {\n// 获取异常的描述信息\nString msg = e.getMessage();\n\
  // 打印自定义错误消息\nSystem.out.println(\"发生了一个错误。错误信息为：\" + msg);\n}\nSystem.out.println(\"\
  程序结束。\");\n}\n}\n清单 13-3.\n使用 try-catch 块处理异常\n```\n\n```\n发生了一个异常。错误信息为：/ by zero\n\
  程序结束。\n```\n\n清单 13-3 的输出比清单 13-2 的输出更友好。它准确地告诉你程序执行时发生了什么。请注意，当异常发生时程序并未终止，因为你已经处理了该异常。程序执行了最后一条打印\
  \ `\"程序结束\"` 消息的语句。\n\n控制权转移\n\n你需要非常精确地理解当 `try` 块中抛出异常时的控制流。首先，Java 运行时创建一个适当类的对象来表示已发生的异常。接着检查\
  \ `try` 块之后的第一个 `catch` 块。如果异常对象可以赋值给该 `catch` 块的参数，则 `catch` 块的参数会被赋予异常对象的引用，并且控制权转移到\
  \ `catch` 块的主体。当 `catch` 块执行完其主体后，控制权转移到 `try-catch` 块之后的点。需要注意的是，执行完 `catch` 块后，控制权**不会**返回到\
  \ `try` 块。相反，它会转移到 `try-catch` 块之后的代码。如果一个 `try` 块关联了多个 `catch` 块，则最多只会执行一个 `catch`\
  \ 块。图 13-1 展示了在典型 Java 程序中，当 `try` 块中发生异常时的控制权转移。\n\n![A323069_2_En_13_Fig1_HTML.gif](img/A323069_2_En_13_Fig1_HTML.gif)\n\
  \n图 13-1.\n\n当 try 块中发生异常时的控制权转移\n\n假设当执行 `try-statement-2` 时，它抛出了一个 `Exception2`\
  \ 类型的异常。当异常被抛出时，控制权转移到第二个 `catch` 块，并执行 `catch-statement-21` 和 `catch-statement-22`。执行完\
  \ `catch-statement-22` 后，控制权转移到 `try-catch` 块之外，并开始执行 `statement-1`。理解这一点非常重要：当\
  \ `try-statement-2` 抛出异常时，`try-statement-3` 永远不会被执行。当 `try` 块内的语句抛出异常时，三个 `catch`\
  \ 块中最多只有一个会被执行。\n\n异常类层次结构\n\nJava 类库包含许多异常类。图 13-2 展示了其中几个异常类。请注意，`Object` 类不属于异常类家族。在图中，它被显示为继承层次结构中\
  \ `Throwable` 类的祖先。\n\n![A323069_2_En_13_Fig2_HTML.jpg](img/A323069_2_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2.\n\n异常类层次结构中的几个类\n\n异常类层次结构始于 `java.lang.Throwable` 类。回想一下，`Object` 类是\
  \ Java 中所有类的超类。它也是 `Throwable` 类的超类。这就是图中将 `Object` 类放在类层次结构顶部的原因。需要强调的是，Java 异常类家族始于\
  \ `Throwable` 类，而不是 `Object` 类。\n\n当抛出异常时，它必须是 `Throwable` 类或其任何子类的对象。`catch` 块的参数必须是\
  \ `Throwable` 类型或其子类之一，例如 `Exception`、`ArithmeticException`、`IOException` 等。以下 `catch`\
  \ 块是无效的 `catch` 块，因为它们的参数不是 `Throwable` 或 `Throwable` 的子类：\n\n```\n// 编译时错误。Object\
  \ 类不是可抛出的类。\ncatch(Object e1) {\n}\n// 编译时错误。String 类不是可抛出的类。\ncatch(String e1)\
  \ {\n}\n```\n\n以下 `catch` 块是有效的，因为它们指定了可抛出的类型作为参数，这些类型是 `Throwable` 类或其子类：\n\n```\n\
  // Throwable 是一个有效的异常类\ncatch(Throwable t) {\n}\n// Exception 是一个有效的异常类，因为它是 Throwable\
  \ 的子类\ncatch(Exception e) {\n}\n// IOException 类是一个有效的异常类，因为它是 Throwable 的子类\ncatch(IOException\
  \ t) {\n}\n// ArithmeticException 是一个有效的异常类，因为它是 Throwable 的子类\ncatch(ArithmeticException\
  \ t) {\n}\n```\n\n你也可以通过从某个异常类继承你的类来创建自己的异常类。图 13-2 仅展示了 Java 类库中可用的数百个异常类中的几个。我将在第\
  \ 20 章讨论如何从一个类继承另一个类。\n\n排列多个 catch 块\n\n`Object` 类的引用变量可以引用任何类型的对象。假设 `AnyClass`\
  \ 是一个类，以下是一个有效的语句：\n\n```\nObject obj = new AnyClass();\n```\n\n上述赋值背后的规则是：一个类的对象的引用可以赋值给其自身类型或其超类的引用变量。因为\
  \ `Object` 类是 Java 中所有类的超类（直接或间接），所以将任何对象的引用赋值给 `Object` 类的引用变量是有效的。此赋值规则不仅限于 `Object`\
  \ 类的引用变量。它适用于任何对象。其表述如下：\n\n如果类 S 与类 T 相同，或者 S 是 T 的子类，则类 T 的引用变量可以引用类 S 的对象。假设\
  \ S 是 T 的子类，以下语句在 Java 中始终有效：\n\n```\nT t1 = new T();\nT t2 = new S();\n```\n\n\
  此规则意味着任何对象的引用都可以存储在 `Object` 类型的引用变量中。你可以将此规则应用于异常类层次结构。因为 `Throwable` 类是所有异常类的超类，所以\
  \ `Throwable` 类的引用变量可以引用任何异常类的对象。以下所有语句都是有效的：\n\n```\nThrowable e1 = new Exception();\n\
  Throwable e2 = new IOException();\nThrowable e3 = new RuntimeException();\nThrowable\
  \ e4 = new ArithmeticException();\n```\n\n牢记此赋值规则，考虑以下 `try-catch` 块：\n\n```\ntry\
  \ {\nstatement1;\nstatement2; // 此处抛出 MyException 类的异常\nstatement3;\n} catch (Exception1\
  \ e1) {\n// 处理 Exception1\n} catch(Exception2 e2) {\n// 处理 Exception2\n}\n```\n\n\
  当执行上述代码片段时，`statement2` 抛出一个 `MyException` 类型的异常。假设运行时创建了一个 `MyException` 对象，如下所示：\n\
  \n```\nnew MyException();\n```\n\n\n\n现在，运行时环境会选择合适的 `catch` 块，该块能够捕获异常对象。它会从与 `try`\
  \ 块关联的第一个 `catch` 块开始，按顺序依次查找合适的 `catch` 块。判断某个 `catch` 块能否处理异常的过程非常简单：将 `catch`\
  \ 块的参数类型和参数名放在赋值运算符的左侧，将抛出的异常对象放在右侧。如果这样形成的语句是一条有效的 Java 语句，那么该 `catch` 块就能处理这个异常。否则，运行时环境会继续用下一个\
  \ `catch` 块重复此检查过程。为了检查前一个代码片段中的第一个 `catch` 块能否处理 `MyException`，Java 会形成以下语句：\n\n\
  ```\n// Catch 参数声明 = 抛出的异常对象引用\nException1 e1 = new MyException();\n```\n\n只有当 `MyException`\
  \ 类是 `Exception1` 类的子类，或者 `MyException` 和 `Exception1` 是同一个类时，上述语句才是一条有效的 Java 语句。如果该语句有效，运行时环境会将\
  \ `MyException` 对象的引用赋值给 `e1`，然后执行第一个 `catch` 块内的代码。如果该语句无效，运行时环境会使用以下语句对第二个 `catch`\
  \ 块进行同样的检查：\n\n```\n// Catch 参数声明 = 抛出的异常对象引用\nException2 e2 = new MyException();\n\
  ```\n\n如果上述语句有效，`MyException` 对象会被赋值给 `e2`，并执行该 `catch` 块的主体。如果上述语句无效，则运行时环境未能在\
  \ `try` 块中找到能匹配所抛出异常的 `catch` 块，此时会执行另一条不同的执行路径，我稍后会讨论这一点。\n\n通常，对于 `try` 块可能抛出的每一种异常类型，你都会在该\
  \ `try` 块之后添加一个对应的 `catch` 块。假设有一个 `try` 块，它可能抛出三种异常，分别由三个类表示：`Exception1`、`Exception2`\
  \ 和 `Exception3`。再假设 `Exception1` 是 `Exception2` 的超类，而 `Exception2` 是 `Exception3`\
  \ 的超类。这三个异常类的类层次结构如图 13-3 所示。\n\n![A323069_2_En_13_Fig3_HTML.jpg](img/A323069_2_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3.\n\nException1、Exception2 和 Exception3 异常类的类层次结构\n\n考虑以下 `try-catch` 块：\n\
  \n```\ntry {\n// 此处可能抛出 Exception1、Exception2 或 Exception3\n} catch (Exception1\
  \ e1) {\n// 处理 Exception1\n} catch (Exception2 e2) {\n// 处理 Exception2\n} catch\
  \ (Exception3 e3) {\n// 处理 Exception3\n}\n```\n\n如果你尝试应用查找合适 `catch` 块的步骤，无论 `try`\
  \ 块抛出何种类型的异常（`Exception1`、`Exception2` 或 `Exception3`），上述代码片段都将始终执行第一个 `catch` 块。这是因为\
  \ `Exception1` 是 `Exception2` 和 `Exception3` 的直接或间接超类。上述代码片段显示了开发人员犯的一个逻辑错误。Java\
  \ 编译器被设计用来处理你可能犯的这种逻辑错误，并且会生成一个编译时错误。要修复此错误，你需要颠倒这三个 `catch` 块的顺序。对于为一个 `try` 块排列多个\
  \ `catch` 块，你必须遵循以下规则：\n\n一个 `try` 块的多个 `catch` 块必须按照从最具体异常类型到最通用异常类型的顺序排列。否则，会发生编译时错误。第一个\
  \ `catch` 块应处理最具体的异常类型，最后一个 `catch` 块应处理最通用的异常类型。\n\n以下代码片段使用了多个 `catch` 块的有效顺序。`ArithmeticException`\
  \ 类是 `RuntimeException` 类的子类。如果这两个异常都在同一个 `try` 块的 `catch` 块中被处理，那么最具体的类型（即 `ArithmeticException`）必须出现在最通用的类型（即\
  \ `RuntimeException`）之前。\n\n```\ntry {\n// 执行某些操作，可能抛出异常\n} catch(ArithmeticException\
  \ e1) {\n// 首先处理 ArithmeticException\n} catch(RuntimeException e2) {\n// 在 ArithmeticException\
  \ 之后处理 RuntimeException\n}\n```\n\n多重捕获块\n\n你可以使用多重捕获块在单个 `catch` 块中处理多种类型的异常。你可以在一个多重\
  \ `catch` 块中指定多种异常类型。多种异常类型之间用竖线（`|`）分隔。语法如下：\n\n```\ntry {\n// 可能抛出 ExceptionA、ExceptionB\
  \ 或 ExceptionC\n} catch (ExceptionA | ExceptionB | ExceptionC  e) {\n// 处理 ExceptionA、ExceptionB\
  \ 和 ExceptionC\n}\n```\n\n在多重 `catch` 块中，不允许存在具有子类化关系的备选异常。也就是说，`ExceptionA`、`ExceptionB`\
  \ 和 `ExceptionC` 不能互为子类或超类。例如，以下多重 `catch` 块是不允许的，因为 `ExceptionA` 和 `ExceptionB`\
  \ 是 `Throwable` 的子类。实际上，所有异常类都是 `Throwable` 的直接或间接子类。\n\n```\ntry {\n// 可能抛出 ExceptionA、ExceptionB\
  \ 或 ExceptionC\n} catch (ExceptionA | ExceptionB | Throwable  e) {\n// 在此处处理异常\n\
  }\n```\n\n上述代码片段将生成以下编译时错误：\n\n```\nerror: Alternatives in a multi-catch statement\
  \ cannot be related by subclassing\n} catch(ExceptionA | ExceptionB | Throwable\
  \ e) {\n^\nAlternative ExceptionA is a subclass of alternative Throwable\n1 error\n\
  ```\n\n已检查异常与未检查异常\n\n在开始讨论已检查异常和未检查异常之前，让我们先看一个从标准输入读取字符的 Java 程序。你一直在使用 `System.out.println()`\
  \ 方法在标准输出（通常是控制台）上打印消息。你可以使用 `System.in.read()` 方法从标准输入（通常是键盘）读取一个字节。它返回该字节的值，作为一个介于\
  \ 0 到 255 之间的 `int`。如果到达输入末尾，则返回 –1。清单 13-4 包含一个 `ReadInput` 类的代码，其 `readChar()`\
  \ 方法从标准输入读取一个字节，并将该字节作为字符返回。它假设你使用的语言的所有字母的 Unicode 值都在 0 到 255 之间。`readChar()`\
  \ 方法包含主要代码。要从标准输入读取一个字符，你需要使用 `ReadInput.readChar()` 方法。\n\n```\n// ReadInput.java\n\
  package com.jdojo.exception;\npublic class ReadInput {\npublic static char readChar()\
  \ {\nchar c = '\\u0000';\nint input = System.in.read();\nif (input != -1) {\nc =\
  \ (char)input;\n}\nreturn c;\n}\n}\n清单 13-4.\n从标准输入读取输入\n```\n\n编译 `ReadInput` 类。哎呀！编译器生成了以下错误：\n\
  \n```\n\"ReadInput.java\": unreported exception java.io.IOException; must be caught\
  \ or declared to be thrown at line 7, column 31\n```\n\n该错误指向源代码中的第 7 行：\n\n```\n\
  int input = System.in.read();\n```\n\n这条语句中缺少了一些东西。该错误还告诉你存在一个未捕获的异常，必须捕获或声明该异常。你知道如何使用\
  \ `try-catch` 块捕获异常。但是，你可能不理解如何声明异常。你将在下一节中学习如何声明异常。\n\n\n\n`System.in.read()` 方法调用可能会抛出\
  \ `java.io.IOException` 异常。该错误提示你需要将此方法调用放在 `try-catch` 块中，以便处理该异常。如果你不捕获此异常，则需要在\
  \ `readChar()` 方法的声明中注明它可能抛出 `java.io.IOException` 异常。\n\n你在前面的章节中已经了解到，运行时环境会处理所有未捕获的异常。那么，为什么\
  \ Java 运行时环境在这种情况下不能处理 `java.io.IOException` 呢？这就引出了受检异常（checked exceptions）和非受检异常（unchecked\
  \ exceptions）的概念。你需要了解受检异常和非受检异常，才能完全理解这个错误。Java 程序中可能发生三种异常情况：\n\n*   第一类异常是发生可能性较高，并且你可以处理的异常。例如，当你从文件读取数据时，更有可能发生\
  \ I/O 错误。最好在你的程序中处理这类异常。异常类层次结构（参见图 13-2）中，属于 `Exception` 类子类（包括 `Exception` 类本身，但不包括\
  \ `RuntimeException` 及其所有子类）的类，都属于这一类。如果某个方法或构造器可能抛出属于此类的异常，你必须在调用该方法或构造器的代码中采取适当措施来处理该异常。处理这类异常需要采取的“适当措施”是什么？你可以采取以下两种措施之一：\n\
  \n*   你可以将可能抛出异常的代码放在 `try-catch` 块中。其中一个 `catch` 块必须能够处理可能抛出的异常类型。\n\n*   你可以在调用方法/构造器的声明中指定它可能抛出异常。这可以通过在方法/构造器声明中使用\
  \ `throws` 子句来实现。\n\n*   第二类异常是在 Java 程序执行过程中可能发生的异常，并且你几乎无法处理它。例如，当运行时环境内存不足时，你会收到\
  \ `java.lang.OutOfMemoryError` 异常。你无法从内存不足错误中恢复。最好让应用程序崩溃，然后寻找在你的程序中更有效地管理内存的方法。异常类层次结构（参见图\
  \ 13-2）中，属于 `Error` 类子类以及 `Error` 类本身的类，都属于此类异常。如果某段代码可能抛出属于此类的异常，编译器不会强制你采取任何措施。如果此类异常在运行时被抛出，运行时环境会为你处理它，显示详细的错误信息并终止应用程序。\n\
  \n*   第三类异常是可能在运行时发生的异常，如果你自己处理它们，或许能够从异常情况中恢复。此类异常有很多。然而，如果你认为此类异常更有可能被抛出，你应该在你的代码中处理它。如果你尝试使用\
  \ `try-catch` 块来处理它们，你的代码往往会变得杂乱。异常类层次结构（参见图 13-2）中，属于 `RuntimeException` 类子类以及\
  \ `RuntimeException` 类本身的类，都属于此类异常。如果某段代码可能抛出属于此类的异常，编译器不会强制你采取任何措施。如果此类异常在运行时被抛出，运行时环境会为你处理它，显示详细的错误信息并终止程序。\n\
  \n第一类异常被称为受检异常（checked exceptions）。`Throwable` 类也属于受检异常。`Throwable` 类、`Exception`\
  \ 类以及 `Exception` 类的子类（不包括 `RuntimeException` 类及其子类）被称为受检异常。它们之所以被称为受检异常，是因为编译器会检查它们是否在代码中被处理。\n\
  \n所有非受检异常都被称为非受检异常（unchecked exceptions）。`Error` 类、`Error` 类的所有子类、`RuntimeException`\
  \ 类及其所有子类都是非受检异常。它们之所以被称为非受检异常，是因为编译器不会检查它们是否在代码中被处理。但是，你可以自由地处理它们。处理受检异常或非受检异常的程序结构是相同的。它们之间的区别在于编译器强制（或不强制）你在代码中处理它们的方式。\n\
  \n现在让我们修复 `ReadInput` 类的编译时错误。现在你知道 `java.io.IOException` 是一个受检异常，编译器会强制你处理它。你将使用\
  \ `try-catch` 块来处理它。清单 13-5 展示了 `ReadInput` 类的代码。这一次，你在其 `readChar()` 方法中处理了 `IOException`，代码将可以正常编译。\n\
  \n```\n// ReadInput.java\npackage com.jdojo.exception;\nimport java.io.IOException;\n\
  public class ReadInput {\npublic static char readChar() {\nchar c = '\\u0000';\n\
  int input = 0;\ntry {\ninput = System.in.read();\nif (input != -1) {\nc = (char)input;\n\
  }\n} catch (IOException e) {\nSystem.out.print(\"读取输入时发生 IOException。\");\n}\nreturn\
  \ c;\n}\n}\n清单 13-5.\n一个 ReadInput 类，其 readChar() 方法从标准输入读取一个字符\n```\n\n如何使用 `ReadInput`\
  \ 类？你可以像使用 Java 中的其他类一样使用它。如果你想捕获用户输入的第一个字符，你需要调用 `ReadInput.readChar()` 静态方法。清单\
  \ 13-6 包含了展示如何使用 `ReadInput` 类的代码。它会提示用户输入一些文本。输入文本的第一个字符会显示在标准输出上。\n\n```\n// ReadInputTest.java\n\
  package com.jdojo.exception;\npublic class ReadInputTest {\npublic static void main(String[]\
  \ args) {\nSystem.out.print(\"输入一些文本并按回车键: \");\nchar c = ReadInput.readChar();\n\
  System.out.println(\"你输入的第一个字符是: \" + c);\n}\n}\n清单 13-6.\n一个测试 ReadInput 类的程序\n\
  ```\n\n```\n输入一些文本并按回车键: Hello\n你输入的第一个字符是: H\n```\n\n受检异常：捕获或声明\n\n如果某段代码可能抛出受检异常，你必须执行以下操作之一：\n\
  \n*   通过将代码段放在 `try-catch` 块中来处理受检异常。\n*   在你的方法/构造器声明中指定它抛出该受检异常。\n\n\n\n`ReadInput`\
  \ 类的 `readChar()` 方法中对 `System.in.read()` 方法的调用（参见清单 13-5）会抛出 `IOException` 类型的受检异常。你在此处采用了第一种方案，通过将对\
  \ `System.in.read()` 方法的调用置于 `try-catch` 块中，处理了该 `IOException`。\n\n假设你正在为一个类编写一个包含三条语句的方法\
  \ `m1()`。假设这三条语句可能分别抛出类型为 `Exception1`、`Exception2` 和 `Exception3` 的受检异常。该方法的代码可能如下所示：\n\
  \n```\n// 无法编译\npublic void m1() {\nstatement-1; // 可能抛出 Exception1\nstatement-2;\
  \ // 可能抛出 Exception2\nstatement-3; // 可能抛出 Exception3\n}\n```\n\n你无法以这种形式编译 `m1()`\
  \ 方法的代码。你必须使用 `try-catch` 块处理异常，或者在其声明中包含它可能抛出这三种受检异常的信息。如果你想在 `m1()` 方法体内处理这些受检异常，你的代码可能如下所示：\n\
  \n```\npublic void m1() {\ntry {\nstatement-1; // 可能抛出 Exception1\nstatement-2;\
  \ // 可能抛出 Exception2\nstatement-3; // 可能抛出 Exception3\n} catch(Exception1 e1) {\n\
  // 在此处处理 Exception1\n} catch(Exception2 e2) {\n// 在此处处理 Exception2\n} catch(Exception3\
  \ e3) {\n// 在此处处理 Exception3\n}\n}\n```\n\n上述代码假设当三个异常中的任何一个被抛出时，你不想执行剩余的语句。\n\n\
  如果你想使用不同的逻辑，可能需要多个 `try-catch` 块。例如，如果你的逻辑要求必须尝试执行所有三条语句，即使前一条语句抛出了异常，你的代码将如下所示：\n\
  \n```\npublic void m1() {\ntry {\nstatement-1; // 可能抛出 Exception1\n} catch(Exception1\
  \ e1) {\n// 在此处处理 Exception1\n}\ntry {\nstatement-2; // 可能抛出 Exception2\n} catch(Exception2\
  \ e2) {\n// 在此处处理 Exception2\n}\ntry {\nstatement-3; // 可能抛出 Exception3\n} catch(Exception3\
  \ e3) {\n// 在此处处理 Exception3\n}\n}\n```\n\n消除编译时错误的第二种方法是在 `m1()` 方法的声明中指定它抛出三种受检异常。这通过在\
  \ `m1()` 方法的声明中使用 `throws` 子句来实现。指定 `throws` 子句的一般语法如下：\n\n```\n[修饰符]  ([参数]) [throws\
  \ ] {\n// 方法体在此处\n}\n```\n\n关键字 `throws` 用于指定 `throws` 子句。`throws` 子句位于方法参数列表的右括号之后。`throws`\
  \ 关键字后跟一个逗号分隔的异常类型列表。回想一下，异常类型不过是异常类层次结构中某个 Java 类的名称。你可以在 `m1()` 方法的声明中指定 `throws`\
  \ 子句，如下所示：\n\n```\npublic void m1() throws Exception1, Exception2, Exception3 {\n\
  statement-1; // 可能抛出 Exception1\nstatement-2; // 可能抛出 Exception2\nstatement-3; //\
  \ 可能抛出 Exception3\n}\n```\n\n当一段代码抛出多个受检异常时，你也可以在同一方法中混合使用这两种方案。你可以使用 `try-catch`\
  \ 块处理其中一些异常，并使用方法声明中的 `throws` 子句声明另一些异常。以下代码使用 `try-catch` 块处理 `Exception2`，并使用\
  \ `throws` 子句声明异常 `Exception1` 和 `Exception3`：\n\n```\npublic void m1() throws Exception1,\
  \ Exception3 {     \nstatement-1; // 可能抛出 Exception1\ntry {\nstatement-2; // 可能抛出\
  \ Exception2\n} catch(Exception2 e){\n// 在此处处理 Exception2\n}\nstatement-3; // 可能抛出\
  \ Exception3\n}\n```\n\n让我们回到 `ReadInput` 类的示例。清单 13-3 通过添加一个 `try-catch` 块修复了编译时错误。现在让我们使用第二种方案：在\
  \ `readChar()` 方法的声明中包含一个 `throws` 子句。清单 13-7 包含了 `ReadInput` 类的另一个版本，称为 `ReadInput2`。\n\
  \n```\n// ReadInput2.java\npackage com.jdojo.exception;\nimport java.io.IOException;\n\
  public class ReadInput2 {\npublic static char readChar() throws IOException {\n\
  char c = '\\u0000';\nint input = 0;\ninput = System.in.read();\nif (input != -1)\
  \ {\nc = (char) input;\n}\nreturn c;\n}\n}\n清单 13-7.\n在方法声明中使用 throws 子句\n```\n\n\
  清单 13-8 包含了一个 `ReadInput2Test` 类的代码，该类测试 `ReadInput2` 类的 `readChar()` 方法。\n\n```\n\
  // ReadInput2Test.java\npackage com.jdojo.exception;\npublic class ReadInput2Test\
  \ {\npublic static void main(String[] args) {\nSystem.out.print(\"输入一些文本，然后按回车键:\
  \ \");\nchar c = ReadInput2.readChar();\nSystem.out.print(\"您输入的第一个字符是: \" + c);\n\
  }\n}\n清单 13-8.\n在方法声明中使用 throws 子句\n```\n\n现在，编译 `ReadInput2Test` 类。哎呀！编译 `ReadInput2Test`\
  \ 类会产生以下错误：\n\n```\nError(6,11): 未报告的异常: 类 java.io.IOException; 必须被捕获或声明抛出\n```\n\
  \n此时，编译器错误可能对你来说不太清楚。`ReadInput2` 类的 `readChar()` 方法声明它可能抛出 `IOException`。`IOException`\
  \ 是一个受检异常。因此，`ReadInput2Test` 的 `main()` 方法中的以下代码可能会抛出一个受检的 `IOException`：\n\n```\n\
  char c = ReadInput2.readChar();\n```\n\n回想一下我在本节开头提到的关于处理受检异常的规则。如果一段代码可能抛出受检异常，你必须使用两种方案之一：将该段代码放在\
  \ `try-catch` 块内以处理异常，或者使用方法或构造函数声明中的 `throws` 子句指定该受检异常。现在，你必须对 `main()` 方法中对 `ReadInput2.readChar()`\
  \ 方法的调用应用这两种方案之一。清单 13-9 使用了第一种方案，将对 `ReadInput2.readChar()` 方法的调用置于 `try-catch`\
  \ 块内。请注意，你将三条语句放在了 `try` 块内，这并非必要。你只需要将可能抛出受检异常的代码放在 `try` 块内即可。\n\n```\n// ReadInput2Test2.java\n\
  package com.jdojo.exception;\nimport java.io.IOException;\npublic class ReadInput2Test2\
  \ {\npublic static void main(String[] args) {\nchar c = '\\u0000';\ntry {\nSystem.out.print(\"\
  输入一些文本，然后按回车键: \");\nc = ReadInput2.readChar();\nSystem.out.println(\"您输入的第一个字符是:\
  \ \" + c);\n} catch (IOException e) {\nSystem.out.println(\"读取输入时发生错误。\");\n}\n\
  }\n}\n清单 13-9.\n测试 ReadInput2.readChar() 方法的程序\n```\n\n你也可以使用第二种方案来修复编译器错误。清单 13-10\
  \ 包含了使用第二种方案的代码。\n\n```\n// ReadInput2Test3.java\npackage com.jdojo.exception;\n\
  import java.io.IOException;\npublic class ReadInput2Test3 {\npublic static void\
  \ main(String[] args) throws IOException {\nSystem.out.print(\"输入一些文本，然后按回车键: \"\
  );\nchar c = ReadInput2.readChar();\nSystem.out.println(\"您输入的第一个字符是: \" + c);\n\
  }\n}\n清单 13-10.\n测试 ReadInput2.readChar() 方法的程序\n```\n\n\n\n该程序在 `main()` 方法中包含一个带有\
  \ `IOException` 的 `throws` 子句。你能像使用 `java` 命令运行其他类一样，运行 `ReadInput2Test3` 类吗？是的。你可以像运行\
  \ Java 中的其他类一样运行 `ReadInput2Test3` 类。运行一个类的要求是它必须包含一个 `main()` 方法，该方法声明为 `public\
  \ static void main(String[] args)`。该要求并未对 `throws` 子句做任何规定。作为程序入口点用于运行类的 `main()`\
  \ 方法，可以包含也可以不包含 `throws` 子句。\n\n假设你运行 `ReadInput2Test3` 类，并且 `ReadInput2` 类的 `readChar()`\
  \ 方法中对 `System.in.read()` 方法的调用抛出了一个 `IOException`。这个 `IOException` 将如何处理，又由谁来处理？当方法体中抛出异常时，运行时环境会检查抛出异常的代码是否位于\
  \ `try-catch` 块内。如果抛出异常的代码在 `try-catch` 块内，Java 运行时环境会寻找能够处理该异常的 `catch` 块。如果找不到能够处理该异常的\
  \ `catch` 块，或者方法调用不在 `try-catch` 块内，异常会沿着方法调用栈向上传播。也就是说，异常会被传递给该方法的调用者。在你的例子中，`ReadInput2`\
  \ 类的 `readChar()` 方法并未处理该异常。它的调用者是 `ReadInput2Test2` 类的 `main()` 方法中的代码。在这种情况下，同样的异常会在\
  \ `ReadInput2Test2.main()` 方法中调用 `ReadInput2.readChar()` 方法的地方被抛出。运行时环境会应用相同的检查来处理该异常。如果你运行\
  \ `ReadInput2Test2` 类并抛出一个 `IOException`，运行时环境会发现对 `ReadInput2.readChar()` 的调用位于一个能够处理\
  \ `IOException` 的 `try-catch` 块内。因此，它会将控制权转移给处理该异常的 `catch` 块，程序会在 `ReadInput2Test2`\
  \ 类的 `main()` 方法中继续执行。理解这一点非常重要：在 `ReadInput2.readChar()` 方法抛出异常并且该异常在 `ReadInput2Test2.main()`\
  \ 方法中被处理后，控制权不会返回到 `ReadInput2.readChar()` 方法。\n\n当你运行 `ReadInput2Test3` 类时，对 `ReadInput2.readChar()`\
  \ 方法的调用不在 `try-catch` 块内。在这种情况下，Java 运行时环境将不得不沿着方法调用栈向上传播该异常。`main()` 方法是 Java 应用程序方法调用栈的起点。这是所有\
  \ Java 应用程序开始执行的方法。如果 `main()` 方法抛出异常，运行时环境会处理它。回想一下，如果运行时环境为你处理了异常，它会在标准错误输出上打印调用栈的详细信息，然后退出应用程序。\n\
  \n回想一下，带有特定异常类型的 `catch` 块可以处理该类型或其任何子类型的异常。例如，带有 `Throwable` 异常类型的 `catch` 块能够处理\
  \ Java 中所有类型的异常，因为 `Throwable` 类是所有异常类的超类。这个概念同样适用于 `throws` 子句。如果一个方法抛出了 `Exception1`\
  \ 类型的受检异常，你可以在其 `throws` 子句中提及 `Exception1` 类型，或者 `Exception1` 的任何超类。这条规则背后的理由是，如果方法的调用者处理了一个是\
  \ `Exception1` 超类的异常，那么同一个处理器也能处理 `Exception1`。\n\n提示\n\nJava 编译器强制你通过使用 `try-catch`\
  \ 块或在方法或构造器声明中使用 `throws` 子句来处理受检异常。如果一个方法抛出异常，它应该在调用栈的某处被处理。也就是说，如果一个方法抛出异常，它的调用者可以处理它，或者调用者的调用者可以处理，依此类推。如果异常没有被调用栈中的任何调用者处理，则称为未捕获异常（或未处理异常）。未捕获异常最终由\
  \ Java 运行时环境处理，它会在标准错误输出上打印异常堆栈跟踪并退出 Java 应用程序。在线程中，可以为未捕获异常指定不同的行为。有关如何为线程指定异常处理器的更多详细信息，请参阅本系列第二卷中关于线程的第\
  \ 6 章。\n\n编译器对于程序员处理受检异常的要求非常严格。如果 `try` 块中的代码不能抛出受检异常，而其关联的 `catch` 块却捕获了受检异常，编译器将生成错误。考虑清单\
  \ 13-11 中的代码，它使用了一个 `try-catch` 块。`catch` 块指定了一个 `IOException`，这是一个受检异常。然而，相应的 `try`\
  \ 块并没有抛出 `IOException`。\n\n```\n// CatchNonExistentException.java\npackage com.jdojo.exception;\n\
  import java.io.IOException;\n// 无法编译\npublic class CatchNonExistentException {\n\
  public static void main(String[] args) {\nint x = 10, y = 0, z = 0;\ntry {\nz =\
  \ x / y;\n} catch(IOException e) {\n// 处理异常\n}\n}\n}\n清单 13-11.\n捕获 try 块中从未抛出的受检异常\n\
  ```\n\n当你编译 `CatchNonExistentException` 类的代码时，会得到以下编译器错误：\n\n```\nError(12):  exception\
  \ java.io.IOException is never thrown in body of corresponding try statement\n```\n\
  \n错误信息不言自明。它指出 `IOException` 从未在 `try` 块中抛出。因此，`catch` 块不得捕获它。修复此错误的一种方法是完全移除 `try-catch`\
  \ 块。清单 13-12 展示了另一种有趣的方式（但不是一个好方式）来提及一个通用的 `catch` 块。\n\n```\n// CatchNonExistentException2.java\n\
  package com.jdojo.exception;\n// 可以正常编译\npublic class CatchNonExistentException2\
  \ {\npublic static void main(String[] args) {\nint x = 10, y = 0, z = 0;\ntry {\n\
  z = x / y;\n} catch(Exception e) {\n// 处理异常\n}\n}\n}\n清单 13-12.\n捕获 try 块中从未抛出的受检异常\n\
  ```\n\n\n\n`Exception` 和 `IOException` 一样，也是 Java 中的受检异常类型。如果 `catch` 块不应该捕获未在相应\
  \ `try` 块中抛出的受检异常，那么 `CatchNonExistentException2` 的代码为何能编译通过？它难道不应该产生相同的编译时错误吗？乍一想，你是对的。它本应因与\
  \ `CatchNonExistentException` 类相同的原因而编译失败。有两个受检异常类属于此规则的例外情况。这两个异常类是 `Exception`\
  \ 和 `Throwable`。`Exception` 类是 `IOException` 及其他受检异常的超类。它也是 `RuntimeException` 及其所有子类的超类，而后者属于非受检异常。回顾一下规则：超类异常类型也可以处理子类异常类型。因此，你可以使用\
  \ `Exception` 类来处理受检异常和非受检异常。检查 `catch` 块是否捕获未抛出异常的规则仅适用于受检异常。`catch` 块中的 `Exception`\
  \ 和 `Throwable` 类可以处理受检异常和非受检异常，因为它们是这两种异常类型的超类。这就是为什么编译器允许你在 `catch` 块中使用这两种受检异常类型，即使关联的\
  \ `try` 块没有抛出任何受检异常。\n\n提示\n\n所有关于编译器检查异常是否被处理或抛出的规则仅适用于受检异常。Java 不强制你在代码中处理非受检异常。但是，你可以根据自身判断自由地处理它们。\n\
  \n受检异常与初始化器\n\n你不能从 `static` 初始化器中抛出受检异常。如果 `static` 初始化器中的一段代码抛出了受检异常，则必须在初始化器内部使用\
  \ `try-catch` 块来处理它。`static` 初始化器对于一个类只调用一次，并且程序员在代码中没有特定的点来捕获它。这就是 `static` 初始化器必须处理其可能抛出的所有受检异常的原因。\n\
  \n```\npublic class Test {\nstatic {\n// 必须使用 try-catch 块来处理所有受检异常\n}\n}\n```\n\n\
  实例初始化器的规则则不同。实例初始化器作为类的构造函数调用的一部分被调用。它可以抛出受检异常。但是，所有这些受检异常都必须包含在该类的所有构造函数的 `throws`\
  \ 子句中。这样，编译器可以确保当任何构造函数被调用时，程序员都已处理了所有受检异常。以下 `Test` 类的代码假设实例初始化器抛出了 `CException`\
  \ 类型的受检异常。编译器将强制你为 `Test` 的所有构造函数添加包含 `CException` 的 `throws` 子句。\n\n```\npublic\
  \ class Test {     // 实例初始化器\n{\n// 抛出 CException 类型的受检异常\n}\n// 所有构造函数必须指定它们抛出\
  \ CException\n// 因为实例初始化器抛出了 CException\npublic Test() throws CException {\n// 代码写在这里\n\
  }\npublic Test(int x) throws CException {\n// 代码写在这里\n}\n// 其余代码写在这里\n}\n```\n\n\
  当你使用 `Test` 类的任何构造函数创建其对象时，必须处理 `CException`，如下所示：\n\n```\nTest t = null;\ntry {\n\
  t = new Test();\n} catch (CException e) {\n// 在此处处理异常\n}\n```\n\n如果你没有使用 `try-catch`\
  \ 块处理 `CException`，则必须使用 `throws` 子句来指定使用 `Test` 类构造函数的方法或构造函数可能抛出 `CException`。\n\
  \n如果实例初始化器抛出一个受检异常，你必须为你的类声明一个构造函数。如果你没有添加构造函数，编译器会为你的类添加一个默认构造函数。但是，编译器不会为默认构造函数添加\
  \ `throws` 子句，这将违反之前的规则。以下代码将无法编译：\n\n```\npublic class Test123 {\n{\n// 可能抛出 CException，这是一个受检异常。\n\
  }\n}\n```\n\n当编译 `Test123` 类时，编译器会添加一个默认构造函数，`Test123` 类将如下所示：\n\n```\npublic class\
  \ Test123 {\n{\n// 可能抛出 CException，这是一个受检异常。\n}\npublic Test123() {\n// 空方法体。编译器没有添加\
  \ throws 子句。\n}\n}\n```\n\n请注意，编译器添加的默认构造函数不包含用于包含 `CException` 的 `throws` 子句，而\
  \ `CException` 是由实例初始化器抛出的。这就是 `Test123` 类无法编译的原因。为了使 `Test123` 类能够编译，你必须显式地添加至少一个构造函数，并使用\
  \ `throws` 子句指定它可能抛出 `CException`。\n\n抛出异常\n\nJava 异常并非总是由运行时抛出。你也可以在代码中使用 `throw`\
  \ 语句抛出异常。`throw` 语句的语法是：\n\n```\nthrow <可抛出对象的引用>;\n```\n\n这里，`throw` 是一个关键字，后跟一个可抛出对象的引用。可抛出对象是\
  \ `Throwable` 类或其子类的实例。以下是 `throw` 语句的一个示例，它抛出一个 `IOException`：\n\n```\n// 创建一个\
  \ IOException 对象\nIOException e1 = new IOException(\"文件未找到\");\n// 抛出 IOException\n\
  throw e1;\n```\n\n回顾一下，`new` 运算符返回新对象的引用。你也可以在一行语句中创建并抛出一个可抛出对象。\n\n```\n// 抛出一个\
  \ IOException\nthrow new IOException(\"文件未找到\");\n```\n\n当你在代码中抛出异常时，适用相同的异常处理规则。如果你抛出一个受检异常，你必须通过将代码放在\
  \ `try-catch` 块中，或者在包含 `throw` 语句的方法或构造函数声明中使用 `throws` 子句来处理它。如果你抛出的是非受检异常，这些规则不适用。\n\
  \n创建异常类\n\n你也可以创建自己的异常类。它们必须继承（或扩展）一个现有的异常类。我将在关于继承的第 20 章中详细介绍如何扩展一个类。本节解释扩展一个类所需的必要语法。关键字\
  \ `extends` 用于扩展一个类，如下所示：\n\n```\n[修饰符] class <类名> extends <超类名> {\n// <类名> 的方法体写在这里\n\
  }\n```\n\n这里，`<类名>` 是你的异常类名称，`<超类名>` 是你的类所扩展的现有异常类名称。\n\n假设你想创建一个 `MyException`\
  \ 类，它扩展了 `java.lang.Exception` 类。语法如下：\n\n```\npublic class MyException extends\
  \ Exception {\n// MyException 类的方法体写在这里\n}\n```\n\n异常类的方法体是什么样的？异常类与 Java 中的其他类一样。通常，你不会向异常类添加任何方法。许多可用于查询异常对象状态的有用方法已在\
  \ `Throwable` 类中声明，你可以直接使用它们而无需重新声明。通常，你会为你的异常类包含四个构造函数。所有构造函数都将使用 `super` 关键字调用其超类的相应构造函数。清单\
  \ 13-13 展示了包含四个构造函数的 `MyException` 类的代码。\n\n\n```java\n// MyException.java\npackage\
  \ com.jdojo.exception;\npublic class MyException extends Exception {\npublic MyException()\
  \ {\nsuper();\n}\npublic MyException(String message) {\nsuper(message);\n}\npublic\
  \ MyException(String message, Throwable cause) {\nsuper(message, cause);\n}\npublic\
  \ MyException(Throwable cause) {\nsuper(cause);\n}\n}\n清单 13-13.\n一个继承 Exception\
  \ 类的 MyException 类\n```\n\n第一个构造方法创建一个详细消息为 `null` 的异常。\n第二个构造方法创建一个带有详细消息的异常。\n\
  第三个和第四个构造方法允许你通过包装另一个异常来创建异常，可选择是否附带详细消息。\n\n你可以按如下方式抛出 `MyException` 类型的异常：\n\n\
  ```java\nthrow new MyException(\"Your message goes here\");\n```\n\n你可以在方法/构造器声明的\
  \ `throws` 子句中使用 `MyException` 类，或将其作为 `catch` 块中的参数类型。以下代码片段展示了这一点：\n\n```java\n\
  import com.jdojo.exception.MyException;\n...\npublic void m1() throws MyException\
  \ {\n// m1() 方法体代码写在这里\n}\ntry {\n// try 块代码写在这里\n} catch(MyException e) {\n// catch\
  \ 块代码写在这里\n}\n```\n\n表 13-1 展示了 `Throwable` 类的一些常用方法。请注意，`Throwable` 类是 Java 中所有异常类的超类。此表中显示的所有方法在所有异常类中均可用。\n\
  \n表 13-1.\n\nThrowable 类的方法部分列表\n\n| 方法 | 描述 |\n| --- | --- |\n| `Throwable getCause()`\
  \ | 此方法在 Java 1.4 中添加。它返回异常的原因。如果未设置异常原因，则返回 `null`。 |\n| `String getMessage()`\
  \ | 它返回异常的详细消息。 |\n| `StackTraceElement[] getStackTrace()` | 此方法在 Java 1.4 中添加。它返回一个堆栈跟踪元素数组。数组中的每个元素代表一个堆栈帧。数组的第一个元素代表栈顶，最后一个元素代表栈底。栈顶是创建异常对象的方法/构造器。`StackTraceElement`\
  \ 类的对象保存类名、方法名、文件名、行号等信息。 |\n| `Throwable initCause(Throwable cause)` | 此方法在 Java\
  \ 1.4 中添加。有两种方法可以设置一个异常作为另一个异常的原因。一种方法是使用接受原因作为参数的构造器。另一种方法是使用此方法。 |\n| `void printStackTrace()`\
  \ | 它在标准错误流上打印堆栈跟踪。输出首先打印异常对象本身的描述作为第一行，然后打印每个堆栈帧的描述。打印异常的堆栈跟踪对于调试目的非常有用。 |\n| `void\
  \ printStackTrace(PrintStream s)` | 它将堆栈跟踪打印到指定的 `PrintStream` 对象。 |\n| `void printStackTrace(PrintWriter\
  \ s)` | 它将堆栈跟踪打印到指定的 `PrintWriter` 对象。 |\n| `String toString()` | 它返回异常对象的简短描述。异常对象的描述包含异常类的名称和详细消息。\
  \ |\n\n清单 13-14 演示了异常类中 `printStackTrace()` 方法的使用。`main()` 方法调用 `m1()` 方法，而 `m1()`\
  \ 方法又调用 `m2()` 方法。此调用的堆栈帧从 `main()` 方法开始，该方法位于栈底。栈顶包含 `m2()` 方法。\n输出显示 `printStackTrace()`\
  \ 方法从上到下打印堆栈信息。每个堆栈帧包含类名、方法名、源文件名和行号。`printStackTrace()` 方法的第一行打印带有详细消息的异常对象的类名。\n\
  \n```java\n// StackTraceTest.java\npackage com.jdojo.exception;\npublic class StackTraceTest\
  \ {\npublic static void main(String[] args) {\ntry {\nm1();\n} catch (MyException\
  \ e) {\ne.printStackTrace(); // 打印堆栈跟踪\n}\n}\npublic static void m1() throws MyException\
  \ {\nm2();\n}\npublic static void m2() throws MyException {\nthrow new MyException(\"\
  Some error has occurred.\");\n}\n}\n清单 13-14.\n打印异常的堆栈跟踪\n```\n\n```\ncom.jdojo.exception.MyException:\
  \ Some error has occurred.\nat jdojo.exception/com.jdojo.exception.StackTraceTest.m2(StackTraceTest.java:18)\n\
  at jdojo.exception/com.jdojo.exception.StackTraceTest.m1(StackTraceTest.java:14)\n\
  at jdojo.exception/com.jdojo.exception.StackTraceTest.main(StackTraceTest.java:7)\n\
  ```\n\n清单 13-14 演示了如何在标准错误上打印异常的堆栈跟踪。有时你可能需要将堆栈跟踪保存到文件或数据库中。你可能需要将堆栈跟踪信息作为字符串获取到变量中。`printStackTrace()`\
  \ 方法的另一个版本允许你这样做。清单 13-15 展示了如何使用 `printStackTrace(PrintWriter s)` 方法将异常对象的堆栈跟踪打印到\
  \ `String` 对象。\n该程序与清单 13-14 相同，但有一个区别。它将堆栈跟踪存储在字符串中，然后将该字符串打印到标准输出。方法 `getStackTrace()`\
  \ 将堆栈跟踪写入字符串并返回该字符串。有关如何使用 `StringWriter` 和 `PrintWriter` 类的更多信息，请参阅本系列第二卷的第 7 章。\n\
  \n```java\n// StackTraceAsStringTest.java\npackage com.jdojo.exception;\nimport\
  \ java.io.StringWriter;\nimport java.io.PrintWriter;\npublic class StackTraceAsStringTest\
  \ {\npublic static void main(String[] args) {\ntry {\nm1();\n} catch (MyException\
  \ e) {\nString str = getStackTrace(e);\n// 将堆栈跟踪打印到标准输出\nSystem.out.println(str);\n\
  }\n}\npublic static void m1() throws MyException {\nm2();\n}\npublic static void\
  \ m2() throws MyException {\nthrow new MyException(\"Some error has occurred.\"\
  );\n}\npublic static String getStackTrace(Throwable e) {\nStringWriter strWriter\
  \ = new StringWriter();\nPrintWriter printWriter = new PrintWriter(strWriter);\n\
  e.printStackTrace(printWriter);\n// 将堆栈跟踪作为字符串获取\nString str = strWriter.toString();\n\
  return str;\n}\n}\n清单 13-15.\n将异常的堆栈跟踪写入字符串\n```\n\n```\ncom.jdojo.exception.MyException:\
  \ Some error has occurred.\nat jdojo.exception/com.jdojo.exception.StackTraceAsStringTest.m2(StackTraceAsStringTest.java:24)\n\
  at jdojo.exception/com.jdojo.exception.StackTraceAsStringTest.m1(StackTraceAsStringTest.java:20)\n\
  at jdojo.exception/com.jdojo.exception.StackTraceAsStringTest.main(StackTraceAsStringTest.java:10)\n\
  ```\n\nfinally 块\n\n你已经了解了如何将一个或多个 catch 块与 `try` 块关联。一个 `try` 块也可以有零个或一个 `finally`\
  \ 块。`finally` 块从不单独使用。它总是与 `try` 块一起使用。使用 `finally` 块的语法是：\n\n```java\nfinally {\n\
  // finally 块代码写在这里\n}\n```\n\n\n一个 `finally` 块\n以关键字 `finally` 开头，后跟一个左花括号和一个右花括号。`finally`\
  \ 块的代码放在花括号内。\n\n`try`、`catch` 和 `finally` 块有两种可能的组合：`try-catch-finally` 或\n`try-finally`。一个\n\
  `try` 块后面可以跟零个或多个 `catch` 块。一个 `try` 块最多只能有一个 `finally` 块。一个\n`try` 块必须有一个 `catch`\n\
  块、一个 `finally` 块，或者两者都有。`try-catch-finally`\n块的语法如下：\n\n```\ntry {\n// 此处放置 try\
  \ 块的代码\n} catch(Exception1 e1) {\n// 此处放置 catch 块的代码\n} finally {\n// 此处放置 finally\
  \ 块的代码\n}\n```\n\n`try-finally` 块的语法如下：\n\n```\ntry {\n// 此处放置 try 块的代码\n} finally\
  \ {\n// 此处放置 finally 块的代码\n}\n```\n\n当你使用 `try-catch-finally`\n块时，你的意图是执行以下逻辑：\n\
  \n尝试执行 `try` 块中的代码。如果 `try` 块中的代码抛出任何异常，则执行匹配的 catch 块。最后，无论 `try` 和 `catch` 块中的代码如何结束执行，都执行\
  \ `finally` 块中的代码。\n\n当你使用 `try-finally` 块时，\n你的意图是执行以下逻辑：\n\n尝试执行 `try` 块中的代码。当\
  \ `try` 块中的代码执行完毕后，执行 `finally` 块中的代码。\n\n提示\n\n无论关联的 `try` 和/或 `catch` 块中发生什么，`finally`\
  \ 块都保证会被执行。\n此规则有两个例外：如果执行 `try` 或 `catch` 块的线程终止，或者 Java 应用程序退出（例如，通过在 `try` 或\
  \ `catch` 块内调用 `System.exit()` 方法），则 `finally` 块可能不会被执行。\n\n为什么需要使用 `finally` 块？\n\
  有时你想执行两组语句，\n比如 `set-1` 和\n`set-2`。条件是无论 `set-1` 中的语句如何结束执行，`set-2` 都应该被执行。例如，`set-1`\
  \ 中的语句可能抛出异常或正常完成。你也许可以在不使用 `finally` 块的情况下编写逻辑，在 `set-1` 执行后执行 `set-2`。\n然而，代码可能不够简洁。你可能会在多个地方重复相同的代码，并编写混乱的\
  \ `if-else` 语句。\n例如，`set-1` 可能使用一些结构，使控制流从程序的一个点跳转到另一个点。它可能使用 `break`、`continue`、`return`、`throw`\
  \ 等结构。如果 `set-1` 有多个退出点，你将需要在多个退出点之前重复调用 `set-2`。编写执行 `set-1` 和 `set-2` 的逻辑既困难又丑陋。`finally`\
  \ 块使得编写这种逻辑变得容易。你只需将 `set-1` 代码放在 `try` 块中，将 `set-2` 代码放在 `finally` 块中。可选地，你还可以使用\
  \ `catch` 块来处理 `set-1` 可能抛出的异常。你可以编写如下 Java 代码来执行 `set-1` 和 `set-2`：\n\n```\ntry\
  \ {\n// 执行 set-1 中的所有语句\n} catch(MyException e1) {\n// 在此处处理 set-1 可能抛出的任何异常\n}\
  \ finally {\n// 执行 set-2 中的语句\n}\n```\n\n如果你以这种方式组织代码来执行 `set-1` 和 `set-2`，你将得到更简洁的代码，并且保证在\
  \ `set-1` 执行后执行 `set-2`。\n\n通常，你使用 `finally` 块来编写清理代码。例如，你可能在程序中获取了一些资源，这些资源在使用完毕后必须释放。`try-finally`\
  \ 块让你能够实现这种逻辑。你的代码结构如下所示：\n\n```\ntry {\n// 在此处获取并使用一些资源\n} finally {\n// 释放 try\
  \ 块中获取的资源\n}\n```\n\n当你编写执行数据库事务和文件输入/输出的程序时，你会频繁地编写 `try-finally` 块。你在 `try` 块中获取并使用数据库连接，然后在\
  \ `finally` 块中释放该连接。当处理与数据库相关的程序时，无论事务发生什么情况，你都必须释放一开始获取的数据库连接。这类似于前面描述的执行 `set-1`\
  \ 和 `set-2` 中的语句。清单 13-16 演示了在四种不同情况下使用 `finally` 块。\n\n```\n// FinallyTest.java\n\
  package com.jdojo.exception;\npublic class FinallyTest {\npublic static void main(String[]\
  \ args) {\nint x = 10, y = 0, z;\ntry {\nSystem.out.println(\"在除以 x 和 y 之前。\");\n\
  z = x / y;\nSystem.out.println(\"在除以 x 和 y 之后。\");\n} catch (ArithmeticException\
  \ e) {\nSystem.out.println(\"在 catch 块内部 - 1。\");\n} finally {\nSystem.out.println(\"\
  在 finally 块内部 - 1。\");\n}\nSystem.out.println(\"-------------------------------\"\
  );\ntry {\nSystem.out.println(\"在将 z 设置为 2449 之前。\");\nz = 2449;\nSystem.out.println(\"\
  在将 z 设置为 2449 之后。\");\n} catch (Exception e) {\nSystem.out.println(\"在 catch 块内部\
  \ - 2。\");\n} finally {\nSystem.out.println(\"在 finally 块内部 - 2。\");\n}\nSystem.out.println(\"\
  -------------------------------\");\ntry {\nSystem.out.println(\"在 try 块内部 - 3。\"\
  );\n} finally {\nSystem.out.println(\"在 finally 块内部 - 3。\");\n}\nSystem.out.println(\"\
  -------------------------------\");\ntry {\nSystem.out.println(\"在执行 System.exit()\
  \ 之前。\");\nSystem.exit(0);\nSystem.out.println(\"在执行 System.exit() 之后。\");\n} finally\
  \ {\n// 此 finally 块不会被执行\n// 因为应用程序在 try 块中退出了\nSystem.out.println(\"在 finally 块内部\
  \ - 4。\");\n}\n}\n}\n清单 13-16.\n使用 finally 块\n```\n\n```\n在除以 x 和 y 之前。\n在 catch\
  \ 块内部 - 1。\n在 finally 块内部 - 1。\n\n在将 z 设置为 2449 之前。\n在将 z 设置为 2449 之后。\n在 finally\
  \ 块内部 - 2。\n\n在 try 块内部 - 3。\n在 finally 块内部 - 3。\n\n在执行 System.exit() 之前。\n```\n\
  \n第一个 `try-catch-finally`\n块尝试对整数执行除以零的操作。表达式 `x / y` 抛出一个 `ArithmeticException`，控制权转移到\
  \ `catch` 块。`finally` 块在 `catch` 块执行完毕后执行。请注意，`try` 块中的第二条消息没有被打印，因为一旦抛出异常，控制权就会跳转到最近的匹配\
  \ `catch` 块，并且控制权永远不会再回到 `try` 块。\n\n第二个 `try-catch-finally`\n块是一个 `try` 块正常完成（没有抛出异常）的例子。`try`\
  \ 块执行完毕后，`finally` 块被执行。\n\n第三个 `try-finally` 块很简单。`try` 块正常完成，然后 `finally` 块被执行。\n\
  \n第四个 `try-finally` 块演示了一个 `finally` 块不被执行的例外情况。`try` 块通过执行 `System.exit()` 方法退出应用程序。当调用\
  \ `System.exit()` 方法时，应用程序停止执行，而不会执行关联的 `finally` 块。\n\n重新抛出异常\n\n捕获的异常可以被重新抛出。你可能出于不同的原因想要重新抛出异常。其中一个原因可能是在捕获异常后、将其沿调用栈向上传播之前采取一些操作。例如，你可能想记录异常的详细信息，然后将其重新抛出给客户端。另一个原因是向客户端隐藏异常类型/位置。你并不是向客户端隐藏异常情况本身，而是隐藏异常情况的类型。你可能出于两个原因想要向客户端隐藏实际的异常类型：\n\
  \n*   客户端可能尚未准备好处理抛出的异常。\n\n*   抛出的异常对客户端没有意义。\n\n\n\n重新抛出异常只需使用 `throw` 语句即可。以下代码片段捕获异常，打印其堆栈跟踪，并重新抛出同一个异常。当重新抛出同一个异常对象时，它会保留原始异常的详细信息。\n\
  \n```\ntry {\n// 可能抛出 MyException 的代码\n} catch(MyException e) {\ne.printStackTrace();\
  \ // 打印堆栈跟踪\n// 重新抛出同一个异常\nthrow e;\n}\n```\n\n当从 `catch` 块中抛出异常时，不会在同一组中搜索另一个 `catch`\
  \ 块来处理该异常。如果你想处理从 `catch` 块抛出的异常，需要将抛出异常的代码包裹在另一个 `try-catch` 块中。另一种处理方式是将整个 `try-catch`\
  \ 块包裹在另一个 `try`-`catch` 块中。以下代码片段展示了两种嵌套 `try-catch` 的方式来处理 `Exception1` 和 `Exception2`。实际的嵌套\
  \ `try-catch` 结构取决于具体情况。如果你没有将可能抛出异常的代码包裹在 `try` 块中，或者 `try` 块没有匹配的 `catch` 块来捕获该异常，那么运行时会将异常沿调用栈向上传播，前提是该方法定义了\
  \ `throws` 子句。\n\n```\n// #1 - 安排嵌套的 try-catch\ntry {\n// 可能抛出 Exception1\n} catch(Exception1\
  \ e1) {\n// 在此处处理 Exception1\ntry {\n// 可能抛出 Exception2\n} catch(Exception2 e2)\
  \ {\n// 在此处处理 Exception2\n}\n}\n/* #2 - 安排嵌套的 try-catch */\ntry {       try {  \
  \      // 可能抛出 Exception1\n}    catch(Exception1 e1) {\n// 在此处处理 Exception1\n//\
  \ 可能抛出 Exception2\n}\n} catch(Exception2 e2) {\n// 在此处处理 Exception2\n}\n```\n\n\
  以下代码片段展示了如何捕获一种类型的异常并重新抛出另一种类型的异常：\n\n```\ntry {\n// 可能抛出 MyException 的代码\n} catch(MyException\
  \ e) {\ne.printStackTrace(); // 打印堆栈跟踪\n// 重新抛出 RuntimeException\nthrow new RuntimeException(e.getMessage());\n\
  }\n```\n\n`catch` 块捕获了 `MyException`，打印其堆栈跟踪，并重新抛出一个 `RuntimeException`。在此过程中，它会丢失原始抛出的异常的详细信息。当创建\
  \ `RuntimeException` 时，它会打包从创建点开始的栈帧信息。客户端获取的是关于重新抛出的 `RuntimeException` 从创建点开始的信息，而不是关于原始\
  \ `MyException` 的信息。在上述代码中，你向客户端隐藏了原始异常的类型和位置。\n\n你也可以重新抛出另一种类型的异常，并将原始异常作为重新抛出异常的原因。这就像新异常是原始异常的包装器。你可以使用接受原因作为参数的新异常类型的构造函数来设置异常的原因。你也可以使用\
  \ `initCause()` 方法来设置异常的原因。以下代码片段重新抛出一个 `RuntimeException`，并将 `MyException` 设置为其原因：\n\
  \n```\ntry {\n// 可能抛出 MyException 的代码\n} catch(MyException e) {\ne.printStackTrace();\
  \ // 打印堆栈跟踪\n// 使用原始异常作为原因重新抛出 RuntimeException\nthrow new RuntimeException(e.getMessage(),\
  \ e);\n}\n```\n\n你还可以选择在重新抛出异常时仅向客户端隐藏异常的位置。`Throwable` 类的 `fillInStackTrace()`\
  \ 方法会从调用此方法的位置开始，在异常对象中填充堆栈跟踪信息。你需要在捕获并想要重新抛出的异常上调用此方法，以隐藏原始异常的位置。以下代码片段展示了如何通过隐藏原始异常的位置来重新抛出异常：\n\
  \n```\ntry {\n// 可能抛出 MyException 的代码\n} catch(MyException e) {\n// 重新打包异常对象中的栈帧\n\
  e.fillInStackTrace();\n// 重新抛出同一个异常\nthrow e;\n}\n```\n\n清单 13-17 演示了如何通过隐藏原始异常的位置来重新抛出异常。`MyException`\
  \ 在 `m2()` 方法内部抛出。`m1()` 方法捕获该异常，重新填充堆栈跟踪，并重新抛出它。`main()` 方法接收到的异常就像是在 `m1()` 内部抛出的，而不是在\
  \ `m2()` 内部。\n\n```\n// RethrowTest.java\npackage com.jdojo.exception;\npublic class\
  \ RethrowTest {\npublic static void main(String[] args) {\ntry {\nm1();\n} catch\
  \ (MyException e) {\n// 打印堆栈跟踪\ne.printStackTrace();\n}\n}\npublic static void m1()\
  \ throws MyException {\ntry {\nm2();\n} catch (MyException e) {\ne.fillInStackTrace();\n\
  throw e;\n}\n}\npublic static void m2() throws MyException {\nthrow new MyException(\"\
  发生了一个错误。\");\n}\n}\n清单 13-17.\n重新抛出异常以隐藏原始异常的位置\n```\n\n```\nom.jdojo.exception.MyException:\
  \ 发生了一个错误。\nat jdojo.exception/com.jdojo.exception.RethrowTest.m1(RethrowTest.java:19)\n\
  at jdojo.exception/com.jdojo.exception.RethrowTest.main(RethrowTest.java:8)\n```\n\
  \n重新抛出异常的分析\n\nJava 7 改进了重新抛出异常的机制。考虑以下方法声明的代码片段：\n\n```\npublic void test() throws\
  \ Exception {\ntry {\n// 可能抛出 Exception1 或 Exception2\n} catch (Exception e) {\n\
  // 重新抛出捕获的异常\nthrow e;\n}\n}\n```\n\n`try` 块可能抛出 `Exception1` 或 `Exception2`。`catch`\
  \ 块指定 `Exception` 作为其参数，并重新抛出它捕获的异常。在 Java 7 之前，编译器看到 `catch` 块抛出一个 `Exception`\
  \ 类型的异常，并坚持要求 `test()` 方法在 `throws` 子句中指定它抛出了 `Exception` 类型或 `Exception` 类型的超类型。\n\
  \n由于 `try` 块只能抛出 `Exception1` 和 `Exception2` 类型的异常，`catch` 块重新抛出的异常始终是这两种类型。Java\
  \ 7 在重新抛出异常时执行此分析。它允许你相应地指定 `test()` 方法的 `throws` 子句。从 Java 7 开始，你可以在 `test()` 方法的\
  \ `throws` 子句中指定更具体的异常类型 `Exception1` 和 `Exception2`，如下所示：\n\n```\npublic void test()\
  \ throws Exception1, Exception2 {\ntry {\n// 可能抛出 Exception1、Exception2 或 Exception3\n\
  } catch (Exception e) {\n// 重新抛出捕获的异常\nthrow e;\n}\n}\n```\n\n抛出过多异常\n\n方法/构造函数可以在其\
  \ `throws` 子句中列出的异常类型数量没有限制。但是，最好保持数量较少。使用方法的客户端必须以某种方式处理该方法可能抛出的所有异常。同样重要的是要记住，一旦方法被设计、实现并公开发布，就不应再抛出新的异常类型。如果方法在公开发布后开始抛出新的异常类型，则所有调用此方法的客户端代码都必须更改。如果方法抛出过多异常，或者在公开发布后添加了新异常，则表明设计不佳。你可以通过在方法内部捕获所有较低级别的异常并重新抛出较高级别的异常来避免这些问题。你抛出的异常可能包含较低级别的异常作为其原因。考虑以下方法\
  \ `m1()` 的代码片段，它抛出了三个异常（`Exception1`、`Exception2` 和 `Exception3`）：\n\n```\npublic\
  \ void m1() throws Exception1, Exception2, Exception3 {\n// m1() 方法的代码放在这里\n}\n\
  ```\n\n你可以重新设计 `m1()` 方法，使其只抛出一个异常，例如 `MyException`，如下所示：\n\n\n\n```\npublic void\
  \ m1() throws MyException {\ntry {\n// m1() 方法的代码写在这里\n} catch(Exception1 e){\n\
  throw new MyException(\"Msg1\", e);\n} catch(Exception2 e){\nthrow new MyException(\"\
  Msg2\", e);\n} catch(Exception3 e){\nthrow new MyException(\"Msg3\", e);\n}\n}\n\
  ```\n\n重新设计后的方法只抛出一个异常，即类型为 `MyException` 的异常。该异常的详细消息特定于在方法内部抛出并捕获的低层异常。低层异常也会作为高层异常的原因传播给客户端。如果将来\
  \ `m1()` 方法需要抛出新的异常，你仍然可以在旧设计中容纳新异常。你需要添加一个 `catch` 块来捕获新异常，并重新抛出 `MyException`。这种设计保持了\
  \ `m1()` 方法的 `throws` 子句的稳定性，同时也允许将来在其方法体中包含更多异常类型。\n\n提示\n\n不要从你的方法中抛出通用异常，例如 `Throwable`、`Exception`、`Error`、`RuntimeException`\
  \ 等。不要在 `catch` 块中指定通用异常类型。抛出或处理异常的目的是准确了解发生的错误状况并采取适当的措施。它通过向用户提供具体的错误消息，帮助你理解错误的原因。只有当你使用特定的异常类型来处理异常时，才能生成具体的错误消息。\n\
  \n访问线程的栈\n\n栈是一块用于存储临时数据的内存区域。它采用后进先出（LIFO）的方式来添加和移除数据。栈类似于日常生活中的堆叠，比如一摞书。栈底放着最先放上去的那本书，栈顶放着最后放上去的那本书。当需要从栈中取出一本书时，最后放上去的那本书会最先被取出。这就是栈也被称为后进先出内存的原因。图\
  \ 13-4 展示了栈的排列方式。\n\n![A323069_2_En_13_Fig4_HTML.gif](img/A323069_2_En_13_Fig4_HTML.gif)\n\
  \n图 13-4.\n\n栈中的内存排列\n\n图中展示了放在栈上的三本书。`Book-1` 最先放置，`Book-2` 其次，`Book-3` 最后放置。最后添加到栈中的\
  \ `Book-3` 代表栈顶，最先添加到栈中的 `Book-1` 代表栈底。向栈中添加元素称为压栈操作，从栈中移除元素称为弹栈操作。最初，栈是空的，第一个操作是压栈操作。当栈被丢弃时，它必须执行相同数量的压栈和弹栈操作，以便再次变为空。\n\
  \nJava 中的每个线程都被分配了一个栈来存储其临时数据。线程将方法调用的状态存储到其栈上。Java 方法的状态包括参数值、局部变量、任何中间计算值以及方法的返回值（如果有）。Java\
  \ 栈由栈帧组成。每个帧存储一次方法调用的状态。对于一次方法调用，一个新的帧会被压入线程的栈中。当方法完成时，该帧会从线程的栈中弹出。\n\n假设一个线程从 `m1()`\
  \ 方法开始。`m1()` 方法调用 `m2()` 方法，而 `m2()` 方法又调用 `m3()` 方法。图 13-5 展示了当方法 `m1()`、`m2()`\
  \ 和 `m3()` 被调用时，线程栈上的帧。请注意，图中显示的是当方法 `m3()` 从方法 `m2()` 中被调用，而 `m2()` 又从方法 `m1()`\
  \ 中被调用时的帧状态。\n\n![A323069_2_En_13_Fig5_HTML.gif](img/A323069_2_En_13_Fig5_HTML.gif)\n\
  \n图 13-5.\n\n当方法 m1()、m2() 和 m3() 被调用时线程栈的状态\n\n你可以在特定时间点获取关于线程栈的一些信息。请注意，随着程序的执行，线程栈的状态总是在变化。因此，你获取的是在你请求时线程栈的一个快照。`java.lang.StackTraceElement`\
  \ 类的对象代表一个栈帧。你可以查询关于栈帧的四项信息：类名、文件名、方法名和行号。要获取栈信息，你需要调用 `Throwable` 对象的 `getStackTrace()`\
  \ 方法。它返回一个 `StackTraceElement` 对象的数组。数组的第一个元素代表栈顶帧，最后一个元素代表栈底帧。当你创建一个 `Throwable`\
  \ 类（或 Java 中的任何异常类）的对象时，它会捕获正在执行的线程的栈。\n\n提示\n\nJava 9 引入了一个栈遍历 API，我将在本系列第二卷的第\
  \ 18 章中详细介绍。使用新的栈遍历 API，遍历栈跟踪并在方法内获取调用者类的引用要容易得多。\n\n清单 13-18 演示了如何获取线程的栈帧。一个 `Throwable`\
  \ 对象会在其创建时捕获线程的栈。如果你有一个 `Throwable` 对象，并且想要在不同于该 `Throwable` 对象创建的时间点捕获线程栈的快照，你可以调用\
  \ `Throwable` 类的 `fillInStackTrace()` 方法。它会在你调用此方法时捕获当前线程的当前栈状态。\n\n```\n// StackFrameTest.java\n\
  package com.jdojo.exception;\npublic class StackFrameTest {\npublic static void\
  \ main(String[] args) {\nm1();\n}\npublic static void m1() {\nm2();\n}\npublic static\
  \ void m2() {\nm3();\n}\npublic static void m3() {\n// 创建一个 Throwable 对象，它将保存执行以下语句的线程在此刻的栈状态\n\
  Throwable t = new Throwable();\n// 获取栈跟踪元素\nStackTraceElement[] frames = t.getStackTrace();\n\
  // 打印栈帧的详细信息\nprintStackDetails(frames);\n}\npublic static void printStackDetails(StackTraceElement[]\
  \ frames) {\nSystem.out.println(\"帧计数: \" + frames.length);\nfor (int i = 0; i <\
  \ frames.length; i++) {\n// 获取帧详情\nint frameIndex = i; // i = 0 表示栈顶帧\nString fileName\
  \ = frames[i].getFileName();\nString className = frames[i].getClassName();\nString\
  \ methodName = frames[i].getMethodName();\nint lineNumber = frames[i].getLineNumber();\n\
  // 打印帧详情\nSystem.out.println(\"帧索引: \" + frameIndex);\nSystem.out.println(\"文件名:\
  \ \" + fileName);\nSystem.out.println(\"类名: \" + className);\nSystem.out.println(\"\
  方法名: \" + methodName);\nSystem.out.println(\"行号: \" + lineNumber);\nSystem.out.println(\"\
  ---------------------------\");\n}\n}\n}\n清单 13-18.\n一个打印线程栈帧详细信息的示例程序\n```\n\n\
  ```\n帧计数: 4\n帧索引: 0\n文件名: StackFrameTest.java\n类名: com.jdojo.exception.StackFrameTest\n\
  方法名: m3\n行号: 21\n\n帧索引: 1\n文件名: StackFrameTest.java\n类名: com.jdojo.exception.StackFrameTest\n\
  方法名: m2\n行号: 15\n\n帧索引: 2\n文件名: StackFrameTest.java\n类名: com.jdojo.exception.StackFrameTest\n\
  方法名: m1\n行号: 11\n\n帧索引: 3\n文件名: StackFrameTest.java\n类名: com.jdojo.exception.StackFrameTest\n\
  方法名: main\n行号: 7\n\n```\n\n\n\n现在你已经能够访问线程的栈帧，可能想知道如何利用这些信息。线程栈的信息能让你了解程序当前执行代码的位置。通常，你会记录这些信息用于调试目的。如果你将\
  \ `printStackTrace()` 方法的输出与清单 13-18 的输出进行比较，会发现它们很相似，只是以不同格式打印了相同的信息。\n\ntry-with-resources\
  \ 块\n\n当处理资源（如文件、SQL 语句等）时，你之前必须使用 `finally` 块并编写几行样板代码来关闭资源。处理资源的典型代码如下所示：\n\n\
  ```\nAnyResource aRes;\ntry {\naRes = 创建资源...;\n// 在此处使用资源\n} finally {\n// 尝试关闭资源\n\
  try {\nif (aRes != null) {\naRes.close(); // 关闭资源\n}\n} catch(Exception e) {\ne.printStackTrace();\n\
  }\n}\n```\n\n使用 `try-with-resources` 块，上述代码可以改写为：\n\n```\ntry (AnyResource aRes\
  \ = 创建资源...) {\n// 在此处使用资源。资源将自动关闭。\n}\n```\n\n哇！使用 `try-with-resources` 块，你只需三行代码就能实现相同的逻辑，而之前需要\
  \ 14 行代码。当程序退出 `try-with-resources` 块时，它会自动关闭资源。一个 `try-with-resources` 块可以有一个或多个\
  \ `catch` 块和/或一个 `finally` 块。\n\n表面上看，`try-with-resources` 块就像上一个示例中那样简单。然而，它有一些细节需要详细讨论。\n\
  \n你可以在一个 `try-with-resources` 块中指定多个资源。两个资源之间必须用分号分隔。最后一个资源后面不能跟分号。以下代码片段展示了 `try-with-resources`\
  \ 块使用一个和多个资源的一些用法：\n\n```\ntry (AnyResource aRes1 = getResource1()) {\n// 在此处使用\
  \ aRes1\n}\ntry (AnyResource aRes1 = getResource1(); AnyResource aRes2 = getResource2())\
  \ {\n// 在此处使用 aRes1 和 aRes2\n}\n```\n\n在 `try-with-resources` 中指定的资源是隐式 final 的。你可以将资源声明为\
  \ final，尽管这样做是多余的。\n\n```\ntry (final AnyResource aRes1 = getResource1()) {\n//\
  \ 在此处使用 aRes1\n}\n```\n\n在 `try-with-resources` 中指定的资源必须是 `java.lang.AutoCloseable`\
  \ 类型。`AutoCloseable` 接口有一个 `close()` 方法。当程序退出 `try-with-resources` 块时，所有资源的 `close()`\
  \ 方法会被自动调用。对于多个资源的情况，`close()` 方法会按照资源指定的相反顺序被调用。\n\n考虑一个如清单 13-19 所示的 `MyResource`\
  \ 类。它实现了 `AutoCloseable` 接口，并为 `close()` 方法提供了实现。如果 `exceptionOnClose` 实例变量设置为 `true`，其\
  \ `close()` 方法会抛出一个 `RuntimeException`。如果 `level` 为零或负数，其 `use()` 方法会抛出一个 `RuntimeException`。现在使用\
  \ `MyResource` 类来演示使用 `try-with-resources` 块的各种规则。\n\n```\n// MyResource.java\n\
  package com.jdojo.exception;\npublic class MyResource implements AutoCloseable {\n\
  private int level;\nprivate boolean exceptionOnClose;\npublic MyResource(int level,\
  \ boolean exceptionOnClose) {\nthis.level = level;\nthis.exceptionOnClose = exceptionOnClose;\n\
  System.out.println(\"创建 MyResource。级别 = \" + level);\n}\npublic void use() {\nif\
  \ (level <= 0) {\nthrow new RuntimeException(\"级别过低。\");\n}\nSystem.out.println(\"\
  使用 MyResource 级别 \" + this.level);\nlevel--;\n}\n@Override\npublic void close()\
  \ {\nif (exceptionOnClose) {\nthrow new RuntimeException(\"关闭时出错\");\n}\nSystem.out.println(\"\
  正在关闭 MyResource...\");\n}\n}\n清单 13-19.\n一个 AutoCloseable 资源类\n```\n\n清单 13-20 展示了一个在\
  \ `try-with-resources` 块中使用 `MyResource` 对象的简单案例。输出表明 `try-with-resources` 块会自动调用\
  \ `MyResource` 对象的 `close()` 方法。\n\n```\n// SimpleTryWithResource.java\npackage\
  \ com.jdojo.exception;\npublic class SimpleTryWithResource {\npublic static void\
  \ main(String[] args) {\n// 创建并使用一个 MyResource 类型的资源。\n// 其 close() 方法将被自动调用\ntry\
  \ (MyResource mr = new MyResource(2, false)) {\nmr.use();\nmr.use();\n}\n}\n}\n\
  清单 13-20.\n在 try-with-resources 块中简单使用 MyResource 对象\n```\n\n```\n创建 MyResource。级别\
  \ = 2\n使用 MyResource 级别 2\n使用 MyResource 级别 1\n正在关闭 MyResource...\n```\n\n当资源被自动关闭时，可能会抛出异常。如果\
  \ `try-with-resources` 块正常完成且未抛出异常，而 `close()` 方法的调用抛出了异常，运行时将报告从 `close()` 方法抛出的异常。如果\
  \ `try-with-resources` 块抛出了异常，并且 `close()` 方法的调用也抛出了异常，运行时将抑制从 `close()` 方法抛出的异常，并报告从\
  \ `try-with-resources` 块抛出的异常。以下代码片段演示了这一规则：\n\n```\n// 创建一个具有两个级别的 MyResource 类型资源，该资源在关闭时可能抛出异常，\n\
  // 并使用它三次，以便其 use() 方法抛出异常\ntry (MyResource mr = new MyResource (2, true) ) {\n\
  mr.use();\nmr.use();\nmr.use(); // 将抛出 RuntimeException\n} catch(Exception e) {\n\
  System.out.println(e.getMessage());\n}\n```\n\n```\n创建 MyResource。级别 = 2\n使用 MyResource\
  \ 级别 2\n使用 MyResource 级别 1\n级别过低。\n```\n\n第三次调用 `use()` 方法会抛出异常。在上面的代码片段中，自动的 `close()`\
  \ 方法调用将抛出一个 `RuntimeException`，因为你在创建资源时传递了 `true` 作为第二个参数。输出显示 `catch` 块接收到了从 `use()`\
  \ 方法抛出的 `RuntimeException`，而不是从 `close()` 方法抛出的。\n\n你可以通过使用 `Throwable` 类的 `getSuppressed()`\
  \ 方法来检索被抑制的异常。该方法是在 Java 7 中添加的。它返回一个 `Throwable` 对象数组。数组中的每个对象代表一个被抑制的异常。以下代码片段演示了如何使用\
  \ `getSuppressed()` 方法来检索被抑制的异常：\n\n```\ntry (MyResource mr = new MyResource (2,\
  \ true) ) {\nmr.use();\nmr.use();\nmr.use(); // 抛出异常\n} catch(Exception e) {\nSystem.out.println(e.getMessage());\n\
  // 显示被抑制异常的消息\nSystem.out.println(\"被抑制的异常消息为...\");\nfor(Throwable t : e.getSuppressed())\
  \ {\nSystem.out.println(t.getMessage());\n}\n}\n```\n\n```\n创建 MyResource。级别 = 2\n\
  使用 MyResource 级别 2\n使用 MyResource 级别 1\n级别过低。\n被抑制的异常消息为...\n关闭时出错\n```\n\n提示\n\n\
  \n\n在 Java 9 之前，`try-with-resources` 块中引用资源的变量必须在同一个 `try-with-resources` 块中声明。这一限制在\
  \ Java 9 中被解除，现在允许在 `try-with-resources` 块中使用一个**事实上的最终（effectively final）**资源变量。\n\
  \n直到 Java 9，`try-with-resources` 块有一个限制：你必须在同一个 `try-with-resources` 块中声明引用资源的变量。如果你在方法中接收一个资源引用作为参数，你将无法像这样编写逻辑：\n\
  \n```\nvoid useIt(MyResource res) {\n// 在 JDK 7 和 8 中会导致编译时错误\ntry(res) {\n// 在此处使用\
  \ res\n}\n}\n```\n\n为了绕过这个限制，你必须声明另一个资源类型的变量，并用你的参数值对其进行初始化。以下代码片段展示了这种方法。它声明了一个名为\
  \ `res1` 的新引用变量，当 `try-with-resources` 块退出时，将调用该变量的 `close()` 方法：\n\n```\nvoid useIt(MyResource\
  \ res) {\ntry(MyResource res1 = res) {\n// 在此处使用 res1\n}\n}\n```\n\nJDK 9 移除了这一限制，即你必须为你想要使用\
  \ `try-with-resources` 块管理的资源声明全新的变量。现在，你可以使用一个 `final` 或事实上的最终变量，该变量引用一个将由 `try-with-resources`\
  \ 块管理的资源。如果一个变量使用 `final` 关键字显式声明，则它是 final 的：\n\n```\n// res 是显式 final 的\nfinal\
  \ MyResource res = new MyResource(2, false);\n```\n\n如果一个变量的值在初始化后从未改变，则它是事实上的最终变量。在以下代码片段中，`res`\
  \ 变量是事实上的最终变量，即使它没有被声明为 final。它被初始化后，就再也不会被改变。\n\n```\nvoid doSomething() {\n//\
  \ res 是事实上的最终变量\nMyResource res = new MyResource(2, false);\nres.use();\n}\n```\n\
  \n在 JDK 9 中，你可以这样编写代码：\n\n```\nMyResource res = new MyResource(2, false);\ntry (res)\
  \ {\n// 在此处使用 res\n}\n```\n\n如果你有多个想要使用 `try-with-resources` 块管理的资源，你可以这样做：\n\n\
  ```\nMyResource res1 = new MyResource(2, false);\nMyResource res2 = new MyResource(3,\
  \ false);\ntry (res1; res2) {\n// 在此处使用 res1 和 res2\n}\n```\n\n你可以在同一个 `try-with-resources`\
  \ 块中混合使用 JDK 8 和 JDK 9 的方法。以下代码片段在一个 `try-with-resources` 块中使用了两个预先声明的事实上的最终变量和一个新声明的变量：\n\
  \n```\nMyResource res1 = new MyResource(2, false);\nMyResource res2 = new MyResource(3,\
  \ false);\ntry (res1; res2; MyResource res3 = new MyResource(5, false)) {\n// 在此处使用\
  \ res1、res2 和 res3\n}\n```\n\n自 JDK 7 起，在 `try-with-resources` 块内部声明的变量隐式地是 `final`\
  \ 的。以下代码片段显式地将这样一个变量声明为 `final`：\n\n```\nMyResource res1 = new MyResource(2, false);\n\
  MyResource res2 = new MyResource(2, false);\n// 将 res3 显式声明为 final\ntry (res1; res2;\
  \ final MyResource res3 = new MyResource(2, false)) {\n// 在此处使用 res1、res2 和 res3\n\
  }\n```\n\n清单 13-21 包含一个 `ResourceTest` 类的代码，它向你展示了如何使用 Java 9 的新特性，即允许你使用引用资源的 final\
  \ 或事实上的最终变量，通过 `try-with-resources` 块来管理资源。\n\n```\n// ResourceTest.java\npackage\
  \ com.jdojo.exception;\npublic class ResourceTest {\npublic static void main(String[]\
  \ args) {\nMyResource r1 = new MyResource(1, false);\nMyResource r2 = new MyResource(2,\
  \ false);\ntry (r1; r2) {\nr1.use();\nr2.use();\nr2.use();\n}\nuseResource(new MyResource(3,\
  \ false));\n}\npublic static void useResource(MyResource res) {\ntry (res; MyResource\
  \ res4 = new MyResource(4, false)) {\nres.use();\nres4.use();\n}\n}\n}\n清单 13-21.\n\
  一个用于演示 JDK 9 中 try-catch 块使用的 ResourceTest 类\n```\n\n```\nCreating MyResource. Level\
  \ = 1\nCreating MyResource. Level = 2\nUsing MyResource level 1\nUsing MyResource\
  \ level 2\nUsing MyResource level 1\nClosing MyResource...\nClosing MyResource...\n\
  Creating MyResource. Level = 3\nCreating MyResource. Level = 4\nUsing MyResource\
  \ level 3\nUsing MyResource level 4\nClosing MyResource...\nClosing MyResource...\n\
  ```\n\n总结\n\n异常是 Java 程序中发生异常状况的事件，此时正常的执行路径无法定义。Java 允许你将执行操作的代码与处理操作执行时可能发生的异常的代码分离开来。\n\
  \n使用 `try-catch` 块，将执行操作的代码放在 `try` 块中，将异常处理代码放在 `catch` 块中。一个 `try` 块也可以有一个 `finally`\
  \ 块，它通常用于清理在 `try` 块中使用的资源。你可以组合使用 `try-catch`、`try-catch-finally` 或 `try-finally`\
  \ 块。\n\n`try-with-resources` 块对于自动关闭资源非常方便。你可以在 `try-with-resources` 块中使用 `AutoCloseable`\
  \ 资源。当该块退出时，这些资源的 `close()` 方法会被自动调用。在 Java 9 之前，`try-with-resources` 块中引用资源的变量必须在同一个\
  \ `try-with-resources` 块中声明。这一限制在 Java 9 中被解除，现在允许在 `try-with-resources` 块中使用一个事实上的最终资源变量。\n\
  \n有两种类型的异常：受检异常（checked exceptions）和非受检异常（unchecked exceptions）。编译器确保程序中处理了所有受检异常，或者程序在\
  \ `throws` 子句中声明了它们。处理或声明非受检异常是可选的。\n\n练习题\n\n1.  什么是 Java 中的异常？请说出 Java 支持的两种异常类型。\n\
  \n2.  Java 中所有异常类的超类是什么？\n\n3.  如果一段代码可能抛出异常，你会使用什么类型的语句/块来放置你的代码？\n\n4.  在一个 `catch`\
  \ 块中可以捕获多少个异常？\n\n5.  你能从 `catch` 块内部抛出一个异常吗？\n\n6.  说出 Java 中你可以在资源使用后用于清理资源的两种结构。\n\
  \n7.  什么是 Java 中的受检异常和非受检异常？`java.lang.ArithmeticException` 是受检异常吗？`java.io.IOException`\
  \ 是受检异常吗？\n\n8.  在方法声明中，你使用哪个关键字来声明该方法抛出异常？\n\n9.  你使用哪个关键字来抛出异常？\n\n10. 以下语句会编译通过吗？\n\
  \n```\n    throw null;\n    ```\n\n如果这条语句编译通过，执行时会发生什么？\n\n11. 你能从一个方法中抛出一个运行时异常，而不在方法声明的\
  \ `throws` 子句中指定该异常吗？\n\n12. 以下方法声明会编译通过吗？如果不能，请描述原因。\n\n```\n    public void test()\
  \ {\n    throw new RuntimeException(\"An error has occurred.\");\n    System.out.println(\"\
  Everything is cool!\");\n    }\n    ```\n\n13. 补全以下代码片段，使得与异常关联的错误信息被打印到标准输出上。\n\
  \n```\n    try {\n    int x = 100 / 0;\n    } catch (ArithmeticException e) {\n\
  \    String errorMessage = e./* 你的代码写在这里 */;\n    System.out.println(errorMessage);\n\
  \    }\n    ```\n\n14. 你使用 `Throwable` 类的哪个方法来打印异常对象的堆栈跟踪？\n\n15. 描述以下 `try-catch`\
  \ 块无法编译的原因。\n\n```\n    try {\n    // 以下语句抛出 NumberFormatException\n    int luckNumber\
  \ = Integer.parseInt(\"Hello\");\n    } catch (Exception e) {\n    // 在此处处理异常\n\
  \    } catch (NumberFormatException e) {\n    // 在此处处理异常\n    }\n    ```\n\n\n\n\
  16.  考虑方法内部的以下代码，假设 `MyResource` 是一个实现了 `AutoCloseable` 接口的类。该代码无法编译。请描述代码无法编译的原因，并修复它，使其能够编译。\n\
  \n```\n    MyResource res = new MyResource(1, false);\n    try (res) {\n    res.use();\n\
  \    }\n    res = null;\n    ```\n\n14.  断言\n\n在本章中，你将学习：\n\n*   Java 中断言是什么\n\n\
  *   如何在 Java 程序中使用断言\n\n*   如何启用和禁用断言\n\n*   如何检查断言的状态\n\n本章中的所有类都是 `jdojo.assertion`\
  \ 模块的成员，如清单 14-1 所示。\n\n```\n// module-info.java\nmodule jdojo.assertion {\nexports\
  \ com.jdojo.assertion;\n}\n清单 14-1.\njdojo.assertion 模块的声明\n```\n\n什么是断言？\n\n断言的文字含义是以一种强烈、自信且有力的方式陈述某事。当你断言“某事”时，你相信“某事”为真。请注意，断言“某事”并不保证“某事”总是为真。它仅仅意味着“某事”为真的可能性非常高（或者你非常有信心）。有时你可能错了，那个“某事”可能是假的，即使你断言它为真。\n\
  \nJava 中断言的含义与其字面含义相似。它是 Java 程序中的一个语句。它允许程序员在程序的特定点断言某个条件为真。考虑以下代码片段，其中有两个语句，中间有一条注释：\n\
  \n```\nint x = 10 + 15;\n/* 我们断言此时 x 的值为 25 */\nint z = x + 12;\n```\n\n第一个语句使用了两个硬编码的整数值\
  \ `10` 和 `15`，并将它们的和赋给变量 `x`。你可以断言在执行第一个语句后，变量 `x` 的值是 `25`。注意这里使用注释来进行断言。在这段代码中，x\
  \ 的值不是 `25` 的概率有多大？你可能认为 x 的值不是 `25` 的概率为零。这意味着你的断言将始终为真。那么，当仅通过查看代码就能明显看出 x 的值是\
  \ `25` 时，添加一条断言 x 值为 `25` 的注释有什么意义呢？在编程中，某个时候看似显而易见的事情，在其他时候可能并不明显。\n\n考虑以下代码片段，假设存在一个\
  \ `getPrice()` 方法：\n\n```\nint quantity = 15;\ndouble unitPrice = getPrice();\n\
  /* 我们断言此时 unitPrice 大于 0.0 */\ndouble totalPrice = quantity * unitPrice;\n```\n\n\
  在这段代码中，你断言在执行第二个语句后，变量 `unitPrice` 的值将大于 `0.0`。在执行第二个语句后，`unitPrice` 的值大于 `0.0`\
  \ 的概率有多大？仅通过查看代码很难回答这个问题。然而，为了让代码正常工作，你假设你的断言“`unitPrice` 的值大于 `0.0`”必须为真。否则，你的代码将表明\
  \ `getPrice()` 方法中存在严重错误。对于客户来说，商品的价格总是大于零可能是显而易见的。然而，对于程序员来说，这并不那么明显，因为他必须依赖 `getPrice()`\
  \ 方法的正确实现。如果 `getPrice()` 方法有 bug，程序员的断言将为假。如果程序员的断言为假，他需要知道断言失败，并且需要修复这个 bug。如果他的断言为假，他就不想继续进行价格计算。他希望一旦断言失败就立即停止价格计算。你使用注释来陈述你的断言。注释不是可执行代码。即使\
  \ `unitPrice` 的值不大于零，你的注释也不会报告此错误条件或停止程序。在这种情况下，你需要使用断言工具来接收详细的错误消息并停止程序。\n\n你可以使用\
  \ `assert` 语句在 Java 中进行断言。`assert` 语句的语法有两种形式：\n\n*   `assert booleanAssertionExpression;`\n\
  \n*   `assert booleanAssertionExpression : errorMessageExpression;`\n\n`assert`\
  \ 语句以 `assert` 关键字开头，后跟一个布尔断言表达式，该表达式是程序员相信为真的条件。如果断言表达式的计算结果为 `true`，则不采取任何操作。如果断言表达式的计算结果为\
  \ `false`，则运行时抛出 `java.lang.AssertionError`。\n\n`assert` 语句语法的第二种形式允许你在抛出断言错误时指定自定义错误消息表达式。断言条件和自定义消息用冒号分隔。`errorMessageExpression`\
  \ 不必是字符串。它可以是一个计算结果为任何数据类型（`void` 数据类型除外）的表达式。运行时会将错误消息表达式的结果转换为字符串。你可以重写前面显示的代码以利用\
  \ `assert` 语句，如下所示：\n\n```\nint x = 10 + 15;\nassert x == 25; // 使用 assert 语句的第一种形式\n\
  int z = x + 12;\n```\n\n这里你用 `assert` 语句替换了注释。你只需要指定你断言为真的条件。你使用了 `assert` 语句的第一种形式。当断言失败时，你没有使用任何自定义消息。当断言失败时，Java\
  \ 运行时会提供关于错误的所有详细信息，例如行号、源代码、文件名等。\n\n在大多数情况下，`assert` 语句的第一种形式就足够了。如果你认为错误发生时程序中的某些值可能有助于更好地诊断问题，则应使用\
  \ `assert` 语句的第二种形式。假设你想在断言失败时打印 `x` 的值。你可以使用以下代码片段：\n\n```\nint x = 10 + 15;\n\
  assert x == 25: \"x = \" + x; // 使用 assert 语句的第二种形式\nint z = x + 12;\n```\n\n如果你只想要\
  \ `x` 的值而不需要其他内容，可以使用以下代码片段：\n\n```\nint x = 10 + 15;\nassert x == 25: x; // 使用\
  \ assert 语句的第二种形式\nint z = x + 12;\n```\n\n\n\n请注意，`assert`语句第二种形式中的`errorMessageExpression`可以是除`void`之外的任何数据类型。这段代码将`x`作为`errorMessageExpression`的值提供，其计算结果为`int`。当运行时抛出`AssertionError`时，会使用`x`值的字符串表示形式。\n\
  \n此时，您可能想测试`assert`语句。在您编译和运行包含`assert`语句的 Java 类之前，我们先讨论一些更多细节。不过，您将使用带有`assert`语句的\
  \ Java 代码，如清单 14-2 所示。\n\n```\n// AssertTest.java\npackage com.jdojo.assertion;\n\
  public class AssertTest {\npublic static void main(String[] args) {\nint x = 10\
  \ + 15;\nassert x == 100 :  \"x = \" + x; // 应抛出 AssertionError\n}\n}\n清单 14-2.\n\
  用于测试 assert 语句的简单测试类\n```\n\n`AssertTest`类的代码很简单。它将值`25`赋给变量`x`，并断言`x`的值应为`100`。当您运行`AssertTest`类时，预期它会始终抛出`AssertionError`。\n\
  \n测试断言\n\n是时候看看`assert`语句的实际运行了。尝试在 NetBeans 中运行`AssertTest`类，或在命令提示符下使用以下命令：\n\n\
  ```\nC:\\Java9Fundamentals>java --module-path dist --module jdojo.assertion/com.jdojo.assertion.AssertTest\n\
  ```\n\n此命令完成时没有任何输出。您是否预期标准输出上会出现错误消息？您的断言`x == 100`难道不是假的吗？`x`的值是`25`，而不是`100`。在您看到`assert`语句的实际运行之前，还需要执行一步。尝试使用以下命令运行`AssertTest`类：\n\
  \n```\nC:\\Java9Fundamentals>java -ea --module-path dist --module jdojo.assertion/com.jdojo.assertion.AssertTest\n\
  ```\n\n```\nException in thread \"main\" java.lang.AssertionError: x = 25\nat jdojo.assertion/com.jdojo.assertion.AssertTest.main(AssertTest.java:7)\n\
  ```\n\n您也可以在 NetBeans 项目中启用断言。右键单击 NetBeans 中的项目名称，在“运行”类别下指定`-ea`作为 VM 选项，如图 14-1\
  \ 所示。一旦启用断言，在 NetBeans 中运行`AssertTest`类将产生相同的错误。\n\n![A323069_2_En_14_Fig1_HTML.jpg](img/A323069_2_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1.\n在 NetBeans 项目中启用断言\n\n当您运行`AssertTest`类时，生成了一个`AssertionError`，其错误消息为“`x\
  \ = 25\"`。这就是代码中断言失败时发生的情况。Java 运行时会抛出`AssertionError`。由于您在代码中使用了`assert`语句的第二种形式，错误消息还包含您的自定义断言消息，该消息打印了`x`的值。请注意，默认情况下，断言错误包含断言失败的行号和源代码文件名。此错误消息指出断言在`AssertFile.java`源文件的第\
  \ 7 行失败。\n\n那么，在`java`命令中使用`–ea`开关背后的魔力是什么？默认情况下，Java 运行时不会执行`assert`语句。换句话说，断言默认是禁用的。您必须在运行类时启用断言，这样您的`assert`语句才会被执行。`–ea`开关在运行时启用断言。这就是为什么当您使用`–ea`开关运行`AssertTest`类时，收到了预期的错误消息。我将在下一节详细讨论启用/禁用断言。\n\
  \n启用/禁用断言\n\n使用断言的目标是检测程序中的逻辑错误。通常，断言应在开发和测试环境中启用。断言帮助程序员快速定位代码中问题的位置和类型。一旦应用程序经过测试，断言失败的可能性就非常小了。Java\
  \ 设计者考虑到了在生产环境中使用断言可能带来的性能损失。这就是默认情况下断言在运行时被禁用的原因。虽然在生产环境中启用断言并不可取，但您仍有选择可以这样做。\n\
  \nJava 提供了命令行选项（或开关）来在运行时以不同级别启用断言。例如，您可以选择在所有用户定义的类、所有系统类、某个包及其子包中的所有类、仅针对一个类等中启用断言。表\
  \ 14-1 列出了您可以在命令行上用于在运行时启用/禁用断言的所有开关。每个开关都有长格式和短格式。\n\n表 14-1.\n在运行时启用/禁用断言的命令行开关\n\
  \n命令行开关\n |\n  描述\n |\n\n| --- | --- | --- | --- | --- |\n\n`-enableassertions,\
  \ -ea`\n |\n  用于在运行时为系统类以及用户定义的类启用断言。您可以向此开关传递参数以控制启用断言的级别。\n |\n\n`-disableassertions,\
  \ -da`\n |\n  用于在运行时为系统类以及用户定义的类禁用断言。您可以向此开关传递参数以控制禁用断言的级别。\n |\n\n`-enablesystemassertions,\
  \ -esa`\n |\n  用于在所有系统类中启用断言。您不能向此开关传递任何参数。\n |\n\n`-disablesystemassertions, -dsa`\n\
  \ |\n  用于在所有系统类中禁用断言。您不能向此开关传递任何参数。\n |\n\n两个开关`-ea`和`–da`允许您控制在不同级别启用和禁用断言。您可以向这些开关传递参数，以控制应启用或禁用断言的级别。请注意，您不能向`–esa`和`–dsa`开关传递任何参数。它们启用和禁用所有系统类中的断言。如果您向`–ea`或`–da`开关传递参数，则开关和参数必须用冒号分隔，如下所示。表\
  \ 14-2 列出了可与这些开关一起使用的可能参数。\n\n表 14-2.\n可传递给–ea 和–da 开关的参数列表\n\n–ea 和–da 开关的参数\n\
  \ |\n  描述\n |\n\n| --- | --- | --- | --- | --- |\n\n`(无参数)`\n |\n  启用或禁用所有用户定义类中的断言。请注意，要启用/禁用所有系统类中的断言，您需要分别使用不带参数的`–esa`和`–dsa`开关。\n\
  \ |\n\n`packageName...`\n |\n  注意`packageName`后面的三个点。它在指定的`packageName`及其任何子包中启用/禁用断言。它也可用于启用/禁用系统包中的断言。\n\
  \ |\n\n`...`\n |\n  此参数值为三个点。它在当前工作目录中的未命名包中启用/禁用断言。\n |\n\n`className`\n |\n  在指定的`className`中启用/禁用断言。它也可用于启用/禁用系统类中的断言。\n\
  \ |\n\n*   `-ea:<argument>`\n\n*   `-da:<argument>`\n\n以下是使用不同参数使用断言开关的示例。所有示例均假设您在运行`com.jdojo.assertion.AssertTest`类时启用断言。示例仅向您展示如何启用断言。默认情况下，所有断言都是禁用的。\n\
  \n\n\n```\n/* 启用所有系统类中的断言 */\nC:\\Java9Fundamentals>java –esa --module-path dist\
  \ --module jdojo.assertion/com.jdojo.assertion.AssertTest\n/* 启用所有用户定义类中的断言 */\n\
  C:\\Java9Fundamentals>java –ea --module-path dist --module jdojo.assertion/com.jdojo.assertion.AssertTest\n\
  /* 启用 com.jdojo 包及其子包中的断言 */\nC:\\Java9Fundamentals>java –ea:com.jdojo... --module-path\
  \ dist --module jdojo.assertion/com.jdojo.assertion.AssertTest\nC:\\Java9Fundamentals>java\
  \ –ea:... --module-path dist --module jdojo.assertion/com.jdojo.assertion.AssertTest\n\
  /* 启用 com.jdojo.assertion.AssertTest 类中的断言 */\nC:\\Java9Fundamentals>java –ea:com.jdojo.assertion.AssertTest\
  \ --module-path dist --module jdojo.assertion/com.jdojo.assertion.AssertTest\n```\n\
  \n你可以在一条命令中使用多个 `–ea` 或 `–da` 开关，以实现更细粒度的断言启用/禁用控制。所有开关均按指定的顺序从左到右处理。\n\n```\n/*\
  \ 启用 p1 包及其所有子包中的断言，并禁用 p1.p2.MyClass 类的断言 */\nC:\\Java9Fundamentals>java -ea:p1...\
  \ -da:p1.p2.MyClass --module-path dist --module jdojo.assertion/com.jdojo.assertion.AssertTest\n\
  ```\n\n提示\n\n类的断言在类加载时被启用或禁用。类的断言状态一旦设置便无法更改。此规则有一个例外：如果在类初始化之前执行了 `assert` 语句，Java\
  \ 运行时会将其视为断言已启用。这种情况发生在两个类在各自的 `static` 初始化器中通过调用另一个类的构造器或方法相互引用时。\n\n使用断言\n\n关于何时在程序中使用断言可能会产生混淆。在\
  \ Java 中，断言是通过在现有异常类层次结构中添加一个新类 `java.lang.AssertionError` 来实现的。有时程序员会将断言误认为是另一种异常。如果仅从类层次结构来看，这种说法可能成立，你可能会说它只是现有异常类层次结构中的另一个类。然而，异常与断言的相似性仅止步于类层次结构。它们的主要区别在于使用目的。异常用于处理用户错误和业务规则实现。如果可以从异常情况中恢复，你希望从中恢复并继续运行应用程序。而断言用于检测程序员犯的编程错误。你不希望从编程错误中恢复并继续运行应用程序。断言用于验证程序员在代码特定点对其程序的假设是否正确。你绝不应使用断言来处理用户错误或验证数据，因为断言本就不应在生产环境中启用。\n\
  \n断言不应用于验证公共方法的参数数据。以下代码片段是 `BankAccount` 类的 `credit()` 方法，它使用断言来验证存入金额：\n\n```\n\
  // 错误的实现\npublic void credit(double amount) {\nassert amount > 0.0 : \"无效的存入金额：\"\
  \ + amount;\n// 其他代码\n}\n```\n\n`credit()` 方法的代码依赖于启用断言来验证存入账户的金额。很可能在生产环境中断言会被禁用，这将允许存入负数金额。此类公共方法参数的验证应使用异常来实现，如下所示：\n\
  \n```\n// 正确的实现\npublic void credit(double amount) {\nif (amount <=  0.0) {\nthrow\
  \ new IllegalArgumentException(\"无效的存入金额：\" + amount);\n}\n// 其他代码\n}\n```\n\n你可以使用断言来验证非公共方法的参数。非公共方法不能被客户端直接调用。如果非公共方法的参数不正确，则表明存在程序员错误，此时使用断言是合适的。\n\
  \n你不应使用具有副作用的断言，例如修改对象状态的断言。考虑以下方法中的代码片段，假设 `reComputeState()` 会改变类对象的状态：\n\n```\n\
  assert reComputeState();\n```\n\n当执行此 `assert` 语句时，它会改变对象的状态。随后与对象的交互将依赖于其改变后的状态。如果断言被禁用，此代码将不会执行，对象将无法正常运行。\n\
  \n你可以使用断言来实现类不变量。类不变量是指那些决定类对象状态的值始终成立的条件。在对象从一个状态过渡到另一个状态的短暂时刻，类不变量可能不成立。假设你有一个\
  \ `BankAccount` 类，包含四个实例变量：`name`、`dob`、`startDate` 和 `balance`。对于 `BankAccount`\
  \ 对象，以下类不变量必须成立：\n\n*   账户上的 `name` 不能为 `null`。\n*   账户上的 `dob` 不能为 `null`，且不能是未来的日期。\n\
  *   账户上的 `startDate` 不能为 `null`。\n*   账户上的 `startDate` 不能早于 `dob`。\n*   账户上的 `balance`\
  \ 必须大于零。\n\n你可以将所有条件检查打包到一个方法中，例如 `validAccount()` 方法。\n\n```\nprivate boolean validAccount()\
  \ {\nboolean valid = false;\n// 在此处检查类不变量。如果为真则返回 true。否则返回 false。\nreturn valid;\n\
  }\n```\n\n你可以在方法和构造器中使用以下断言，以确保类不变量得到强制执行。假设 `BankAccount` 类的 `toString()` 方法返回足够的信息来帮助程序员调试错误。\n\
  \n```\nassert validAccount(); this.tostring();\n```\n\n你可以在每个方法的开头以及从方法返回之前使用此 `assert`\
  \ 语句。如果方法不修改对象的状态，则无需在方法内部检查类不变量。在构造器中，你应仅在末尾使用它，因为构造器开始执行时类不变量不会成立。\n\n检查断言状态\n\
  \n如何在程序中知道断言是否已启用？使用 `assert` 语句检查断言状态很容易。考虑以下代码片段：\n\n```\nboolean enabled = false;\n\
  assert enabled = true;\n/* 在此处检查 enabled 的值 */\n```\n\n此代码使用了 `assert` 语句的第一种形式。注意，它在表达式\
  \ `enabled = true` 中使用了赋值运算符（`=`），而不是相等比较运算符（`==`）。该表达式会将 `true` 赋值给 `enabled` 变量，并且其计算结果为\
  \ `true`。注意，`enabled` 变量已初始化为 `false`。如果断言已启用，则在执行 `assert` 语句后，`enabled` 变量的值将为\
  \ `true`。如果断言被禁用，则 `enabled` 变量的值将为 `false`。因此，在 `assert` 语句之后检查 `enabled` 变量的值，可以让你了解断言是否已为你的类启用。清单\
  \ 14-3 展示了检查 `AssertionStatusTest` 类断言是否已启用的完整代码。请注意，断言也可以基于单个类启用或禁用。如果为特定类启用了断言，并不能保证它也为所有其他类启用。\n\
  \n\n\n```\n// AssertionStatusTest.java\npackage com.jdojo.assertion;\npublic class\
  \ AssertionStatusTest {\npublic static void main(String[] args)  {\nboolean enabled\
  \ = false;\nassert enabled = true;\nif (enabled) {\nSystem.out.println(\"断言已启用。\"\
  );\n} else {\nSystem.out.println(\"断言已禁用。\");\n}\n}\n}\n清单 14-3.\n一个用于检查断言是否启用的程序\n\
  ```\n\n总结\n\n断言是 Java 编程语言的一项特性，它允许你在程序中断言某些条件成立。关键字 `assert` 用于编写断言语句。断言用于检测程序中的逻辑错误，通常在开发和测试环境中启用。断言可以针对包和类进行启用或禁用。它们不应用于验证用户输入或业务规则。断言不能替代异常，而是与异常相辅相成。\n\
  \n问题与练习\n\n1.  Java 中的断言是什么？你使用什么语句向程序中添加断言？\n\n2.  描述 `assert` 语句的两种形式。\n\n3. \
  \ 断言默认是启用的吗？如果答案是否定的，你如何启用它？\n\n4.  你应当在以下哪种环境中启用断言：开发环境、测试环境还是生产环境？\n\n5.  你使用哪些命令行选项来启用和禁用所有系统类中的断言？\n\
  \n6.  假设 `x` 必须大于 `10`，请补全以下代码片段中的 `assert` 语句。\n\n```\n    int x = getValue();\n\
  \    assert /* 在此处编写你的代码 */ : \"x 必须大于 10。\";\n    ```\n\n7.  你正在为一个公共方法编写代码，并且想要验证方法的参数。你会使用断言还是异常来实现？请描述你的回答。\n\
  \n15. 字符串\n\n在本章中，你将学习：\n\n*   什么是 `String` 对象\n\n*   如何创建 `String` 对象\n\n*   如何使用字符串字面量\n\
  \n*   如何操作字符串\n\n*   如何在 `switch` 语句中使用字符串\n\n*   如何使用 `StringBuilder` 和 `StringBuffer`\
  \ 对象处理可变字符串\n\n本章中的所有类都是 `jdojo.string` 模块的成员，如清单 15-1 所示。\n\n```\n// module-info.java\n\
  module jdojo.string {\nexports com.jdojo.string;\n}\n清单 15-1.\njdojo.string 模块的声明\n\
  ```\n\n什么是字符串？\n\n零个或多个字符的序列称为字符串。在 Java 程序中，字符串由 `java.lang.String` 类的对象表示。`String`\
  \ 类是不可变的。也就是说，`String` 对象的内容在创建后不能被修改。`String` 类有两个伴生类：`java.lang.StringBuilder`\
  \ 和 `java.lang.StringBuffer`。这些伴生类是可变的。当字符串的内容可能被修改时，你应该使用它们。\n\n在 Java 9 之前，`String`\
  \ 类的实现将字符存储在 `char` 数组中，为字符串中的每个字符使用两个字节。大多数 `String` 对象只包含 Latin-1 字符，只需要一个字节来存储字符串中的一个字符。因此，在大多数情况下，这些\
  \ `String` 对象的 `char` 数组中有一半的空间未被使用。Java 9 改变了 `String` 类的内部实现，使用 `byte` 数组来存储 `String`\
  \ 对象的内容；它还存储了一个编码标志，用于指示 `String` 中的每个字符占用一个字节还是两个字节。Java 9 中的这一变化是实现的改变。这样做是为了更有效地利用\
  \ `String` 对象所使用的内存。作为开发人员，你不需要了解任何新知识就能在程序中使用字符串。Java 9 中没有更改 `String` 类的任何公共接口。\n\
  \n字符串字面量\n\n字符串字面量由零个或多个用双引号括起来的字符序列组成。所有字符串字面量都是 `String` 类的对象。字符串字面量的示例如下：\n\n\
  ```\nString s1 = \"\";                       // 一个空字符串\nString s2 = \"Hello\"; \
  \                 // 由 5 个字符组成的字符串字面量\nString s3 = \"Just a string literal\";  //\
  \ 由 21 个字符组成的字符串字面量\n```\n\n多个字符串字面量可以组合成一个字符串字面量。\n\n```\n// 由两个字符串字面量 \"Hello\"\
  \ 和 \"Hi\" 组成。它表示一个字符串字面量 \"HelloHi\"\nString s4 = \"Hello\" + \"Hi\";\n```\n\n\
  字符串字面量不能分成两行。\n\n```\n// 不能将字符串字面量分成多行。这是一个编译时错误\nString wronStr = \"He\nllo\";\n\
  ```\n\n如果你想将 `\"Hello\"` 分成两行，必须使用字符串连接运算符 (`+`) 来拆分，如下所示：\n\n```\nString s5 = \"\
  He\" +\n\"llo\";\n```\n\n或者\n\n```\nString s6 = \"He\"\n+ \"llo\";\n```\n\n此处展示了多行字符串字面量的另一个示例。整个文本表示一个字符串字面量。\n\
  \n```\nString s7 = \"这是一个大的字符串字面量\" +\n\" 并且它将继续到几行。\" +\n\" 像我们在这里做的那样插入多个换行也是有效的。\"\
  \ +\n\" 在两个字符串字面量之间添加多行\" +\n\" 是 Java 语言语法的特性，\" +\n\" 而不是字符串字面量的特性。\";\n```\n\n\
  字符串字面量中的转义序列字符\n\n字符串字面量由字符组成。使用所有转义序列字符来构成字符串字面量是有效的。例如，要在字符串字面量中包含换行符和回车符，你可以使用\
  \ `\\n` 和 `\\r`，如下所示：\n\n```\n\"\\n\"      // 带有换行符的字符串字面量\n\"\\r\"      // 带有回车符的字符串字面量\n\
  \"\\n\\r\"    // 带有换行符和回车符的字符串字面量\n\"第一行。\\n 第二行。\" // 嵌入的换行符\n\"Tab\\t 分隔\\t 单词\"\
  \     // 嵌入的制表符转义字符\n\"双引号 \\\" 在这里\"   // 字符串字面量中嵌入的双引号\n```\n\n字符串字面量中的 Unicode\
  \ 转义\n\n字符也可以表示为 `\\uxxxx` 形式的 Unicode 转义，其中 `x` 是十六进制数字（`0-9` 或 `A-F`）。在字符串字面量中，字符\
  \ '`A`'（第一个大写英文字母）也可以写成 '`\\u0041`'。例如，`Apple` 和 `\\u0041pple` 在 Java 中被视为相同。换行符和回车符转义字符也可以分别表示为\
  \ Unicode 转义字符 '`\\u000A`' 和 '`\\u000D`'。你不能使用 Unicode 转义在字符串字面量中嵌入换行符和回车符。换句话说，你不能在字符串字面量中用\
  \ `'\\u000A'` 替换 `'\\n'`，用 `'\\u000D'` 替换 `'\\r'`。为什么？原因是 Unicode 转义在编译过程的最开始阶段被处理，导致\
  \ '`\\u000A`' 和 '`\\u000D`' 分别被转换为真正的换行符和回车符。这违反了字符串字面量不能延续到两行的规则。例如，在编译的早期阶段，\"\
  `Hel\\u000Alo`\" 被转换为以下内容，这是一个无效的字符串字面量，并会产生编译时错误：\n\n```\n\"Hel\nlo\"\n```\n\n\
  提示\n\n在字符串字面量中使用 Unicode 转义 `\\u000A` 和 `\\u000D` 分别表示换行符和回车符是编译时错误。你必须改用转义序列 `\\\
  n` 和 `\\r`。\n\n什么是 CharSequence？\n\n`CharSequence` 是 `java.lang` 包中的一个接口。我将在第 21\
  \ 章讨论接口。目前，你可以将 `CharSequence` 视为一个表示可读字符序列的对象。`String`、`StringBuffer` 和 `StringBuilder`\
  \ 等都是 `CharSequence` 的实例。它们提供只读方法来读取它们所表示的字符序列的某些属性和内容。在 `String` 类的 API 文档中，你会看到许多方法的参数被声明为\
  \ `CharSequence`。在需要 `CharSequence` 的地方，你总是可以传递 `String`、`StringBuilder` 或 `StringBuffer`。\n\
  \n创建字符串对象\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n`String` 类包含许多可用于创建\
  \ `String` 对象的构造器。默认构造器允许你创建一个内容为空字符串的 `String` 对象。例如，以下语句创建了一个空的 `String` 对象，并将其引用赋值给\
  \ `emptyStr` 变量：\n\n```\nString emptyStr = new String();\n```\n\n`String` 类还包含另一个构造器，它接受另一个\
  \ `String` 对象作为参数。\n\n```\nString str1 = new String();\nString str2 = new String(str1);\
  \ // 传递一个 String 对象作为参数\n```\n\n现在，`str1` 和 `str2` 表示相同的字符序列。此时，`str1` 和 `str2`\
  \ 都表示一个空字符串。你也可以向此构造器传递一个字符串字面量。\n\n```\nString str3 = new String(\"\");\nString\
  \ str4 = new String(\"Have fun!\");\n```\n\n执行完这两条语句后，`str3` 将引用一个内容为空字符串（零个字符的序列）的\
  \ `String` 对象，而 `str4` 将引用一个内容为 `\"Have fun!\"` 的 `String` 对象。\n\n字符串的长度\n\n`String`\
  \ 类包含一个 `length()` 方法，该方法返回 `String` 对象中的字符数。请注意，`length()` 方法返回的是字符串中的字符数，而不是字符串使用的字节数。`length()`\
  \ 方法的返回类型是 `int`。清单 15-2 演示了如何计算字符串的长度。空字符串的长度为零。\n\n```\n// StringLength.java\n\
  package com.jdojo.string;\npublic class StringLength {\npublic static void main\
  \ (String[] args) {\n// 创建两个字符串对象\nString str1 = new String() ;\nString str2 = new\
  \ String(\"Hello\") ;\n// 获取 str1 和 str2 的长度\nint len1 = str1.length();\nint len2\
  \ = str2.length();\n// 显示 str1 和 str2 的长度\nSystem.out.println(\"Length of \\\"\"\
  \ + str1 + \"\\\" = \" + len1);\nSystem.out.println(\"Length of \\\"\" + str2 +\
  \ \"\\\" = \" + len2);\n}\n}\nLength of \"\" = 0\nLength of \"Hello\" = 5\n清单 15-2.\n\
  了解字符串的长度\n```\n\n字符串字面量是字符串对象\n\n所有字符串字面量都是 `String` 类的对象。编译器将所有字符串字面量替换为对 `String`\
  \ 对象的引用。考虑以下语句：\n\n```\nString str1 = \"Hello\";\n```\n\n编译此语句时，编译器遇到字符串字面量 `\"\
  Hello\"`，并创建一个内容为 `\"Hello\"` 的 `String` 对象。出于所有实际目的，字符串字面量与 `String` 对象相同。在任何可以使用\
  \ `String` 对象引用的地方，你也可以使用 `String` 字面量。`String` 类的所有方法都可以直接与 `String` 字面量一起使用。例如，要计算\
  \ `String` 字面量的长度，你可以这样写：\n\n```\nint len1 =  \"\".length();      // len1 等于 0\n\
  int len2 =  \"Hello\".length(); // len2 等于 5\n```\n\n字符串对象是不可变的\n\n`String` 对象是不可变的。也就是说，你不能修改\
  \ `String` 对象的内容。这带来了一个优势：字符串可以被共享，而无需担心它们被修改。例如，如果你需要两个内容相同（相同的字符序列）的 `String`\
  \ 类对象，你可以创建一个 `String` 对象，并在两个地方都使用它的引用。有时，Java 中字符串的不可变性会被误解，尤其是初学者。考虑以下代码片段：\n\
  \n```\nString str;\nstr = new String(\"Just a string\");\nstr = new String(\"Another\
  \ string\");\n```\n\n这里，`str` 是一个引用变量，它可以引用任何 `String` 对象。换句话说，`str` 可以被改变，它是可变的。然而，`str`\
  \ 所引用的 `String` 对象始终是不可变的。此场景如图 15-1 和 15-2 所示。\n\n![A323069_2_En_15_Fig2_HTML.gif](img/A323069_2_En_15_Fig2_HTML.gif)\n\
  \n图 15-2.\n将不同的 String 对象引用赋值给一个字符串变量\n\n![A323069_2_En_15_Fig1_HTML.gif](img/A323069_2_En_15_Fig1_HTML.gif)\n\
  \n图 15-1.\n一个 String 引用变量和一个 String 对象\n\n如果你不希望 `str` 在初始化后引用任何其他 `String` 对象，你可以将其声明为\
  \ `final`，如下所示：\n\n```\nfinal String str = new String(\"str cannot refer to other\
  \ object\");\nstr = new String(\"Let us try\"); // 编译时错误。str 是 final 的\n```\n\n\
  提示\n\n不可变的是内存中的 `String` 对象，而不是 `String` 类型的引用变量。如果你希望一个引用变量始终引用内存中的同一个 `String`\
  \ 对象，则必须将该引用变量声明为 `final`。\n\n比较字符串\n\n你可能想要比较两个 `String` 对象所表示的字符序列。`String` 类重写了\
  \ `Object` 类的 `equals()` 方法，并提供了自己的实现，该方法基于两个字符串的内容比较它们是否相等。例如，你可以像这样比较两个字符串是否相等：\n\
  \n```\nString str1 = new String(\"Hello\");\nString str2 = new String(\"Hi\");\n\
  String str3 = new String(\"Hello\");\nboolean b1, b2;\nb1 = str1.equals(str2); //\
  \ false 将被赋值给 b1\nb2 = str1.equals(str3); // true 将被赋值给 b2\n```\n\n你也可以比较字符串字面量与字符串字面量或字符串对象，如下所示：\n\
  \n```\nb1 = str1.equals(\"Hello\");  // true 将被赋值给 b1\nb2 = \"Hello\".equals(str1);\
  \  // true 将被赋值给 b2\nb1 = \"Hello\".equals(\"Hi\");  // false 将被赋值给 b1\n```\n\n\
  回想一下，`==` 运算符总是比较内存中两个对象的引用。例如，`str1 == str2` 和 `str1 == str3` 将返回 `false`，因为 `str1`、`str2`\
  \ 和 `str3` 是内存中三个不同 `String` 对象的引用。请注意，`new` 运算符总是返回一个新的对象引用。\n\n有时你想为了排序目的而比较字符串。你可能希望根据字符的\
  \ Unicode 值或它们在字典中出现的顺序对字符串进行排序。`String` 类中的 `compareTo()` 方法和 `java.text.Collator`\
  \ 类中的 `compare()` 方法允许你为了排序目的而比较字符串。\n\n如果你想根据字符的 Unicode 值比较两个字符串，请使用 `String`\
  \ 类的 `compareTo()` 方法，其声明如下：\n\n```\npublic int compareTo(String anotherString)\n\
  ```\n\n它返回一个整数，可以是 0（零）、正整数或负整数。它比较两个字符串对应字符的 Unicode 值。如果任何两个字符的 Unicode 值不同，该方法将返回这两个字符的\
  \ Unicode 值之差。例如，`\"a\".compareTo(\"b\")` 将返回 `-1`。`'a'` 的 Unicode 值是 97，`'b'` 是\
  \ 98。它返回差值 `97 – 98`，即 `-1`。以下是字符串比较的示例：\n\n```\n\"abc\".compareTo(\"abc\") 将返回\
  \ 0\n\"abc\".compareTo(\"xyz\") 将返回 -23 ('a' 的值 – 'x' 的值)\n\"xyz\".compareTo(\"\
  abc\") 将返回 23 ('x' 的值 – 'a' 的值)\n```\n\n非常重要的是要注意，`compareTo()` 方法基于字符的 Unicode\
  \ 值比较两个字符串。这种比较可能与字典顺序的比较不同。这对于英语和一些其他语言来说没问题，因为这些语言中字符的 Unicode 值与字符的字典顺序相同。在字符的字典顺序可能与它们的\
  \ Unicode 值不同的语言中，不应使用此方法来比较两个字符串。要执行基于语言的字符串比较，你应该改用 `java.text.Collator` 类的 `compare()`\
  \ 方法。请参考本章中的“区域设置不敏感的字符串比较”部分，了解如何使用 `java.text.Collator` 类。清单 15-3 演示了字符串比较。\n\n\
  \n\n```\n// StringComparison.java\npackage com.jdojo.string;\npublic class StringComparison\
  \ {\npublic static void main(String[] args) {\nString apple = new String(\"Apple\"\
  );\nString orange = new String(\"Orange\");\nSystem.out.println(apple.equals(orange));\n\
  System.out.println(apple.equals(apple));\nSystem.out.println(apple == apple);\n\
  System.out.println(apple == orange);\nSystem.out.println(apple.compareTo(apple));\n\
  System.out.println(apple.compareTo(orange));\n}\n}\nfalse\ntrue\ntrue\nfalse\n\n\
  清单 15-3.\n比较字符串\n```\n\n字符串池\n\nJava 维护一个所有字符串字面量的池，以最小化内存使用并提升性能。对于程序中遇到的每个字符串字面量，它会在字符串池中创建一个\
  \ `String` 对象。当遇到一个字符串字面量时，它会在字符串池中查找内容相同的字符串对象。如果在字符串池中未找到匹配项，它会创建一个包含该内容的新 `String`\
  \ 对象，并将其添加到字符串池中。最后，它会用池中新创建的 `String` 对象的引用替换该字符串字面量。如果在字符串池中找到匹配项，它会用池中找到的 `String`\
  \ 对象的引用替换该字符串字面量。让我们通过一个示例来讨论这种情况。考虑以下语句：\n\n```\nString str1 = new String(\"Hello\"\
  );\n```\n\n当 Java 遇到字符串字面量 `\"Hello\"` 时，它会尝试在字符串池中查找匹配项。如果字符串池中没有内容为 `\"Hello\"\
  ` 的 `String` 对象，则会创建一个内容为 `\"Hello\"` 的新 `String` 对象，并将其添加到字符串池中。字符串字面量 `\"Hello\"\
  ` 将被替换为字符串池中该新 `String` 对象的引用。由于你使用了 `new` 运算符，Java 会在堆上创建另一个字符串对象。因此，在这种情况下会创建两个\
  \ `String` 对象。考虑以下代码：\n\n```\nString str1 = new String(\"Hello\");\nString str2\
  \ = new String(\"Hello\");\n```\n\n这段代码会创建多少个 `String` 对象？假设执行第一条语句时，`\"Hello\"\
  ` 不在字符串池中。因此，第一条语句会创建两个 `String` 对象。执行第二条语句时，会在字符串池中找到字符串字面量 `\"Hello\"`。这次，`\"\
  Hello\"` 将被替换为池中已有对象的引用。然而，由于在第二条语句中使用了 `new` 运算符，Java 会创建一个新的 `String` 对象。假设 `\"\
  Hello\"` 原本不在字符串池中，上述两条语句将创建三个 `String` 对象。如果这些语句开始执行时 `\"Hello\"` 已经在字符串池中，则只会创建两个\
  \ `String` 对象。考虑以下语句：\n\n```\nString str1 = new String(\"Hello\");\nString str2\
  \ = new String(\"Hello\");\nString str3 = \"Hello\";\nString str4 = \"Hello\";\n\
  ```\n\n`str1 == str2` 的返回值是什么？结果是 `false`，因为 `new` 运算符总是在内存中创建一个新对象，并返回该新对象的引用。\n\
  \n`str2 == str3` 的返回值是什么？结果仍然是 `false`。这需要稍作解释。请注意，`new` 运算符总是创建一个新对象。因此，`str2`\
  \ 持有内存中一个新对象的引用。由于在执行第一条语句时已经遇到过 `\"Hello\"`，它存在于字符串池中，并且 `str3` 引用的是字符串池中内容为 `\"\
  Hello\"` 的 `String` 对象。因此，`str2` 和 `str3` 引用的是两个不同的对象，`str2 == str3` 返回 `false`。\n\
  \n`str3 == str4` 的返回值是什么？结果是 `true`。请注意，当第一条语句执行时，`\"Hello\"` 已经被添加到字符串池中。第三条语句会将字符串池中一个\
  \ `String` 对象的引用赋给 `str3`。第四条语句会将字符串池中同一个对象的引用赋给 `str4`。换句话说，`str3` 和 `str4` 引用的是字符串池中的同一个\
  \ `String` 对象。`==` 运算符比较的是两个引用，因此 `str3 == str4` 返回 `true`。再考虑另一个示例：\n\n```\nString\
  \ s1 = \"Have\" + \"Fun\";\nString s2 = \"HaveFun\";\n```\n\n`s1 == s2` 会返回 `true`\
  \ 吗？是的，它会返回 `true`。当在编译时常量表达式中创建 `String` 对象时，它也会被添加到字符串池中。由于 `\"Have\" + \"Fun\"\
  ` 是一个编译时常量表达式，结果字符串 `\"HaveFun\"` 将被添加到字符串池中。因此，`s1` 和 `s2` 将引用字符串池中的同一个对象。\n\n\
  所有编译时常量字符串字面量都会被添加到字符串池中。考虑以下示例以澄清此规则：\n\n```\nfinal String constStr = \"Constant\"\
  ;  // constStr 是一个常量\nString varStr = \"Variable\";          // varStr 不是一个常量\n\
  // \"Constant is pooled\" 将被添加到字符串池中\nString s1 = constStr + \" is pooled\";\n//\
  \ 拼接后的字符串不会被添加到字符串池中\nString s2 = varStr + \" is not pooled\";\n```\n\n执行这段代码片段后，`\"\
  Constant is pooled\" == s1` 将返回 `true`，而 `\"Variable is not pooled\" == s2` 将返回\
  \ `false`。\n\n提示\n\n所有字符串字面量以及由编译时常量表达式产生的字符串字面量都会被添加到字符串池中。\n\n你可以使用 `String` 对象的\
  \ `intern()` 方法将其添加到字符串池中。`intern()` 方法如果在字符串池中找到匹配项，则返回池中对象的引用；否则，它会向字符串池中添加一个新的\
  \ `String` 对象，并返回该新对象的引用。例如，在上面的代码片段中，`s2` 引用了一个内容为 `\"Variable is not pooled\"\
  ` 的 `String` 对象。你可以通过编写以下代码将此 `String` 对象添加到字符串池中：\n\n```\n// 将 s2 的内容添加到字符串池中，并返回池中字符串对象的引用\n\
  s2 = s2.intern();\n```\n\n现在 `\"Variable is not pooled\" == s2` 将返回 `true`，因为你已经在\
  \ `s2` 上调用了 `intern()` 方法，并且其内容已被池化。\n\n提示\n\n`String` 类在内部维护一个字符串池。所有字符串字面量都会自动添加到池中。你可以通过在\
  \ `String` 对象上调用 `intern()` 方法将自己的字符串添加到池中。你无法直接访问该池。除了退出并重新启动应用程序外，没有其他方法可以从池中移除字符串对象。\n\
  \n字符串操作\n\n本节介绍一些对 `String` 对象的常用操作。\n\n获取指定索引处的字符\n\n你可以使用 `charAt()` 方法从 `String`\
  \ 对象中获取特定索引处的字符。索引从零开始。表 15-1 显示了字符串 `\"HELLO\"` 中所有字符的索引。\n\n表 15-1.\n\n字符串 “HELLO”\
  \ 中所有字符的索引\n\n索引 ->\n |\n  `0`\n |\n  `1`\n |\n  `2`\n |\n  `3`\n |\n  `4`\n |\n\
  \n字符 ->\n |\n  `H`\n |\n  `E`\n |\n  `L`\n |\n  `L`\n |\n  `O`\n |\n\n请注意，第一个字符\
  \ `H` 的索引是 0（零），第二个字符 `E` 的索引是 1，依此类推。最后一个字符 O 的索引是 4，等于字符串 `\"Hello\"` 的长度减 1。\n\
  \n以下代码片段将打印字符串 `\"HELLO\"` 中每个索引的值及其对应的字符：\n\n\n\n```\nString str = \"HELLO\";\n\
  // 获取字符串长度\nint len = str.length();\n// 遍历所有字符并打印其索引\nfor (int i = 0; i < len; i++)\
  \ {\nSystem.out.println(str.charAt(i) + \" is at index \" + i);\n}\nH is at index\
  \ 0\nE is at index 1\nL is at index 2\nL is at index 3\nO is at index 4\n```\n\n\
  **测试字符串是否相等**\n\n如果要比较两个字符串是否相等并忽略大小写，\n可以使用 `equalsIgnoreCase()`\n方法。如果要执行区分大小写的相等性比较，\n\
  则需要使用 `equals()` 方法\n，如前所述。\n\n```\nString str1 = \"Hello\";\nString str2 = \"HELLO\"\
  ;\nif (str1.equalsIgnoreCase(str2)) {\nSystem.out.println (\"Ignoring case str1\
  \ and str2 are equal\");\n} else {\nSystem.out.println(\"Ignoring case str1 and\
  \ str2 are not equal\");\n}\nif (str1.equals(str2)) {\nSystem.out.println(\"str1\
  \ and str2 are equal\");\n} else {\nSystem.out.println(\"str1 and str2 are not equal\"\
  );\n}\nIgnoring case str1 and str2 are equal\nstr1 and str2 are not equal\n```\n\
  \n**测试字符串是否为空**\n\n有时需要测试一个 `String` 对象是否为\n空。空字符串的长度为零。有三种方法可以\n检查空字符串：\n\n*  \
  \ 使用 `isEmpty()` 方法。\n\n*   使用 `equals()` 方法。\n\n*   获取 `String` 的长度并检查\n    其是否为零。\n\
  \n以下代码片段展示了如何使用这三种方法：\n\n```\nString str1 = \"Hello\";\nString str2 = \"\";\n//\
  \ 使用 isEmpty() 方法\nboolean empty1 = str1.isEmpty(); // 将 false 赋值给 empty1\nboolean\
  \ empty2 = str2.isEmpty(); // 将 true 赋值给 empty1\n// 使用 equals() 方法\nboolean empty3\
  \ = \"\".equals(str1); // 将 false 赋值给 empty3\nboolean empty4 = \"\".equals(str2);\
  \ // 将 true 赋值给 empty4\n// 将字符串长度与 0 比较\nboolean empty5 = str1.length() == 0; //\
  \ 将 false 赋值给 empty5\nboolean empty6 = str2.length() == 0; // 将 true 赋值给 empty6\n\
  ```\n\n这些方法中哪个最好？第一种方法可能看起来更具\n可读性，因为方法名表明了其意图。然而，\n第二种方法更受推荐，因为它能优雅地处理与 `null`\
  \ 的比较。当字符串为 `null` 时，第一种和第三种方法会抛出 `NullPointerException`。当字符串为 `null` 时，第二种方法返回\
  \ `false`，例如，`\"\".equals(null)` 返回 `false`。\n\n**更改大小写**\n\n要将字符串的内容转换为小写和大写，可以分别使用\n\
  `toLowerCase()` 和\n`toUpperCase()`\n方法。例如，`\"Hello\".toUpperCase()`\n将返回字符串 `\"\
  HELLO\"`，而\n`\"Hello\".toLowerCase()`\n将返回字符串 `\"hello\"`。\n\n回想一下，`String` 对象是\n\
  不可变的。当你在 `String` 对象上使用 `toLowerCase()` 或\n`toUpperCase()`\n方法时，原始对象的内容不会被修改。相反，Java\
  \ 会创建一个新的\n`String`\n对象，其内容与原始 `String` 对象相同，但原始字符的大小写已更改。以下代码片段创建了三个 `String` 对象：\n\
  \n```\nString str1 = new String(\"Hello\"); // str1 包含 \"Hello\"\nString str2 =\
  \ str1.toUpperCase();  // str2 包含 \"HELLO\"\nString str3 = str1.toLowerCase(); \
  \ // str3 包含 \"hello\"\n```\n\n**搜索字符串**\n\n你可以使用 `indexOf()` 和 `lastIndexOf()`\n\
  方法获取一个字符或字符串在另一个字符串中的索引。例如：\n\n```\nString str = \"Apple\";\nint index = str.indexOf('p');\
  \  // index 的值为 1\nindex = str.indexOf(\"pl\");     // index 的值为 2\nindex = str.lastIndexOf('p');\
  \  // index 的值为 2\nindex = str.lastIndexOf(\"pl\"); // index 的值为 2\nindex = str.indexOf(\"\
  k\");      // index 的值为 -1\n```\n\n`indexOf()`\n方法从字符串的开头开始搜索字符或字符串，并返回第一个匹配项的索引。`lastIndexOf()`\
  \ 方法\n从末尾开始匹配字符或字符串，并返回第一个匹配项的索引。如果在字符串中未找到该字符或字符串，这些方法将返回 `–1`。\n\n**将值表示为字符串**\n\
  \n`String`\n类有一个重载的 `valueOf()` 静态\n方法。它可用于获取任何基本数据类型或任何对象的值的字符串表示形式。例如：\n\n```\n\
  String s1 = String.valueOf('C');  // s1 为 \"C\"\nString s2 = String.valueOf(\"10\"\
  ); // s2 为 \"10\"\nString s3 = String.valueOf(true); // s3 为 \"true\"\nString s4\
  \ = String.valueOf(1969); // s4 为 \"1969\"\n```\n\n**获取子字符串**\n\n你可以使用 `substring()`\
  \ 方法\n获取字符串的一部分。此方法重载如下：\n\n*   `String substring(int beginIndex)`\n\n*   `String\
  \ substring(int beginIndex, int endIndex)`\n\n第一个版本返回一个字符串，该字符串从索引 `beginIndex`\
  \ 处的字符开始，并延伸到该字符串的末尾。第二个版本返回一个字符串，该字符串从索引 `beginIndex` 处的字符开始，并延伸到索引 `endIndex -\
  \ 1` 处的字符。如果指定的索引超出字符串的范围，这两个方法都会抛出 `IndexOutOfBoundsException`。以下是使用这些方法的示例：\n\n\
  ```\nString s1 = \"Hello\".substring(1);    // s1 为 \"ello\"\nString s2 = \"Hello\"\
  .substring(1, 4); // s2 为 \"ell\"\n```\n\n**修剪字符串**\n\n你可以使用 `trim()` 方法\n删除字符串中的所有前导和尾随空白及控制字符。实际上，`trim()`\
  \ 方法会删除字符串中所有 Unicode 值小于 `\\u0020`（十进制 32）的前导和尾随字符。例如：\n\n*   `\"   hello  \".trim()`\n\
  \    将返回 `\"hello\"`\n\n*   `\"hello    \".trim()`\n    将返回 `\"hello\"`\n\n*   `\"\
  \\n   \\r \\t  hello\\n\\n\\n\\r\\r\"` 将返回 `\"hello\"`\n\n请注意，`trim()` 方法仅删除\n前导和尾随空白。它不会删除字符串中间出现的任何空白\n\
  或控制字符。例如：\n\n*   `\" he\\nllo   \".trim()` 将返回 `\"he\\nllo\"`，因为\n    `\\n` 位于字符串内部。\n\
  \n*   `\"h ello\".trim()`\n    将返回 `\"h ello\"`，因为空格位于字符串内部。\n\n**替换字符串的一部分**\n\n\
  `String`\n类包含以下方法，允许你通过将旧字符串的一部分替换为不同的字符或字符串来创建新字符串：\n\n*   `String replace(char\
  \ oldChar, char newChar)`\n\n*   `String replace(CharSequence target, CharSequence\
  \ replacement)`\n\n*   `String replaceAll(String regex, String replacement)`\n\n\
  *   `String replaceFirst(String regex, String replacement)`\n\n`replace(char oldChar,\
  \ char newChar)` 方法通过将所有出现的 `oldChar` 替换为 `newChar` 来返回一个新的 `String` 对象。示例如下：\n\n\
  ```\n// \"tooth\" 中的两个 'o' 都将被替换为两个 'e'。str 将包含 \"teeth\"\nString str = \"tooth\"\
  .replace('o', 'e');\n```\n\n`replace(CharSequence target, CharSequence replacement)`\
  \ 方法适用于 `CharSequence`。它通过将所有出现的 `target` 替换为 `replacement` 来返回一个新的 `String` 对象。示例如下：\n\
  \n```\n// \"tooth\" 中的 \"oo\" 将被替换为 \"ee\"。str 将包含 \"teeth\"\nString str = \"tooth\"\
  .replace(\"oo\", \"ee\");\n```\n\n`replaceAll(String regex, String replacement)`\
  \ 方法使用 `regex` 中的正则表达式来查找匹配项。它通过将每个匹配项替换为 `replacement` 来返回一个新的 `String` 对象。匹配数字的正则表达式是\
  \ `\\d`。我将在第 18 章介绍正则表达式。示例如下：\n\n```\n// 将所有数字替换为 *。str 包含 \"Born on Sept **, ****\"\
  \nString str = \"Born on Sept 19, 1969\".replaceAll(\"\\\\d\", \"*\");\n```\n\n\n\
  \n`replaceFirst(String regex, String replacement)` 方法的工作方式与 `replaceAll()` 方法相同，\n\
  区别在于它仅将第一个匹配项替换为 `replacement`。以下是一个示例：\n\n```\n// 将第一个数字替换为 *。str 包含 \"Born on\
  \ Sept *9, 1969\"\nString str = \"Born on Sept 19, 1969\".replaceFirst(\"\\\\d\"\
  , \"*\");\n```\n\n匹配字符串的开头和结尾\n\n`startsWith()` 方法检查字符串是否以指定的参数开头，而 `endsWith()`\
  \ 方法检查字符串是否以指定的字符串参数结尾。这两个方法都返回一个 `boolean` 值。\n以下是使用这些方法的示例：\n\n```\nString str\
  \ = \"This is a Java program\";\n// 测试 str 是否以 \"This\" 开头\nif (str.startsWith(\"\
  This\")){\nSystem.out.println(\"String starts with This\");\n} else {\nSystem.out.println(\"\
  String does not start with This\");\n}\n// 测试 str 是否以 \"program\" 结尾\nif (str.endsWith(\"\
  program\")) {\nSystem.out.println(\"String ends with program\");\n} else {\nSystem.out.println(\"\
  String does not end with program\");\n}\nString starts with This\nString ends with\
  \ program\n```\n\n分割与合并字符串\n\n通常，围绕指定的分隔符分割字符串，以及使用指定的分隔符将多个字符串合并为一个字符串，是非常有用的操作。\n\
  \n使用 `split()` 方法可以将字符串分割成多个字符串。分割操作是通过分隔符执行的。`split()` 方法返回一个 `String` 数组。你将在第\
  \ 19 章学习数组。不过，在本节中你将使用它来完成字符串操作。\n\n注意\n\n`split()` 方法接受一个正则表达式作为参数，该正则表达式定义了作为分隔符的模式。\n\
  \n```\nString str = \"AL,FL,NY,CA,GA\";\n// 使用逗号作为分隔符分割 str\nString[] parts = str.split(\"\
  ,\");\n// 打印字符串及其各部分\nSystem.out.println(str);\nfor(String part : parts) {\nSystem.out.println(part);\n\
  }\nAL,FL,NY,CA,GA\nAL\nFL\nNY\nCA\nGA\n```\n\nJava 8 为 `String` 类添加了一个静态的 `join()`\
  \ 方法，该方法可以将多个字符串合并为一个字符串。该方法已被重载。\n\n*   `String join(CharSequence delimiter, CharSequence…\
  \ elements)`\n\n*   `String join(CharSequence delimiter, Iterable<? extends CharSequence>\
  \ elements)`\n\n第一个版本接受一个分隔符和一个待合并的字符串序列。第二个参数是可变参数，因此你也可以向此方法传递一个数组。\n\n第二个版本接受一个分隔符和一个\
  \ `Iterable`，例如 `List` 或 `Set`。以下代码片段使用第一个版本合并了几个字符串：\n\n```\n// 使用逗号作为分隔符合并一些字符串\n\
  String str = String.join(\",\", \"AL\", \"FL\", \"NY\", \"CA\", \"GA\");\nSystem.out.println(str);\n\
  AL,FL,NY,CA,GA\n```\n\n在 switch 语句中使用字符串\n\n我在第 6 章讨论了 `switch` 语句。你也可以在 `switch`\
  \ 语句中使用字符串。`switch` 表达式使用 `String` 类型。如果 `switch` 表达式为 `null`，则会抛出 `NullPointerException`。`case`\
  \ 标签必须是 `String` 字面量。你不能在 `case` 标签中使用 `String` 变量。以下是在 `switch` 语句中使用 `String`\
  \ 的示例，该示例将在标准输出中打印 `\"Turn on\"`：\n\n```\nString status = \"on\";\nswitch(status)\
  \ {\ncase \"on\":\nSystem.out.println(\"Turn on\"); // 将执行此行\nbreak;\ncase \"off\"\
  :\nSystem.out.println(\"Turn off\");\nbreak;\ndefault:\nSystem.out.println(\"Unknown\
  \ command\");\nbreak;\n}\n```\n\n用于字符串的 `switch` 语句会比较 `switch` 表达式与 `case` 标签，其方式如同调用了\
  \ `String` 类的 `equals()` 方法。在前面的示例中，将调用 `status.equals(\"on\")` 来测试是否应执行第一个 `case`\
  \ 块。请注意，`String` 类的 `equals()` 方法执行的是区分大小写的字符串比较。这意味着使用字符串的 `switch` 语句是区分大小写的。\n\
  \n以下 `switch` 语句将在标准输出中打印 `\"Unknown command\"`，因为大写的 `switch` 表达式 `\"ON\"` 不会匹配第一个小写的\
  \ `case` 标签 `\"on\"`。\n\n```\nString status = \"ON\";\nswitch(status) {\ncase \"\
  on\":\nSystem.out.println(\"Turn on\");\nbreak;\ncase \"off\":\nSystem.out.println(\"\
  Turn off\");\nbreak;\ndefault:\nSystem.out.println(\"Unknown command\"); // 将执行此行\n\
  break;\n}\n```\n\n作为一种良好的编程实践，在执行带有字符串的 `switch` 语句之前，你需要执行以下两项操作：\n\n*   检查 `switch`\
  \ 语句的 `switch` 表达式是否为 `null`。如果为 `null`，则不执行 `switch` 语句。\n\n*   如果希望在 `switch`\
  \ 语句中执行不区分大小写的比较，你需要将 `switch` 表达式转换为小写或大写，并在 `case` 标签中相应地使用小写或大写。\n\n你可以重写前面的\
  \ `switch` 语句示例，如清单 15-4 所示，该示例处理了这两条建议。\n\n```\n// StringInSwitch.java\npackage\
  \ com.jdojo.string;\npublic class StringInSwitch {\npublic static void main(String[]\
  \ args) {\noperate(\"on\");\noperate(\"off\");\noperate(\"ON\");\noperate(\"Nothing\"\
  );\noperate(\"OFF\");\noperate(null);\n}\npublic static void operate(String status)\
  \ {\n// 检查是否为 null\nif (status == null) {\nSystem.out.println(\"status cannot be\
  \ null.\");\nreturn;\n}\n// 转换为小写\nstatus = status.toLowerCase();\nswitch (status)\
  \ {\ncase \"on\":\nSystem.out.println(\"Turn on\");\nbreak;\ncase \"off\":\nSystem.out.println(\"\
  Turn off\");\nbreak;\ndefault:\nSystem.out.println(\"Unknown command\");\nbreak;\n\
  }\n}\n}\nTurn on\nTurn off\nTurn on\nUnknown command\nTurn off\nstatus cannot be\
  \ null.\n清单 15-4.\n在 switch 语句中使用字符串\n```\n\n测试字符串是否为回文\n\n如果你是一位经验丰富的程序员，可以跳过本节。本节旨在为初学者提供一个简单的练习。\n\
  \n回文是指一个单词、诗句、句子或数字，其正向和反向读法相同。例如，“Able was I ere I saw Elba” 和 1991 都是回文的例子。让我们编写一个方法，该方法接受一个字符串作为参数，并测试该字符串是否为回文。如果字符串是回文，该方法将返回\
  \ `true`。否则，它将返回 `false`。你将使用在前几节中学到的 `String` 类的一些方法。以下是在方法内部执行的步骤描述。\n\n假设输入字符串中的字符数为\
  \ `n`。你需要比较索引 0 和 (n-1)、1 和 (n-2)、2 和 (n-3) 等位置的字符。请注意，如果你继续比较，最终会将索引 (n-1) 处的字符与索引\
  \ 0 处的字符进行比较，而你在开始时已经比较过它们了。你只需要比较一半的字符。如果所有相等性比较都返回 `true`，则该字符串是回文。\n\n字符串中的字符数可能是奇数或偶数。仅比较一半字符的方法在两种情况下都适用。字符串的中间位置取决于字符串长度是奇数还是偶数。例如，字符串\
  \ `\"FIRST\"` 的中间字符是 `R`。字符串 `\"SECOND\"` 的中间字符是什么？可以说它没有中间字符，因为其长度是偶数。为此，有趣的是要注意，如果字符串中的字符数是奇数，则不需要将中间字符与任何其他字符进行比较。\n\
  \n\n\n如果字符串的字符数为偶数，则需要继续比较字符直到字符串长度的一半；如果字符数为奇数，则需比较到字符串长度的一半减一。你可以通过将字符串长度除以 2\
  \ 来获得这两种情况下需要进行的比较次数。请注意，字符串长度是一个整数，如果你将整数除以 2，整数除法会丢弃小数部分（如果有的话），这将自动处理字符数为奇数的情况。清单\
  \ 15-5 包含了完整代码。\n\n```\n// Palindrome.java\npackage com.jdojo.string;\nimport java.util.Objects;\n\
  public class Palindrome {\npublic static void main(String[] args) {\nString str1\
  \ = \"hello\";\nboolean b1 = Palindrome.isPalindrome(str1);\nSystem.out.println(str1\
  \ + \" is a palindrome: \" + b1);\nString str2 = \"noon\";\nboolean b2 = Palindrome.isPalindrome(str2);\n\
  System.out.println(str2 + \" is a palindrome: \" + b2);\n}\npublic static boolean\
  \ isPalindrome(String inputString) {\nObjects.requireNonNull(inputString, \"String\
  \ cannot be null.\");\n// 获取字符串长度\nint len = inputString.length();\n// 对于空字符串和单字符字符串，无需进行任何比较。它们始终是回文。\n\
  if (len <= 1) {\nreturn true;\n}\n// 将字符串转换为大写，以便进行不区分大小写的比较\nString newStr = inputString.toUpperCase();\n\
  // 将结果变量初始化为 true\nboolean result = true;\n// 获取需要进行的比较次数\nint counter = len / 2;\n\
  // 执行比较\nfor (int i = 0; i < counter; i++) {\nif (newStr.charAt(i) != newStr.charAt(len\
  \ - 1 - i)) {\n// 不是回文\nresult = false;\n// 退出循环\nbreak;\n}\n}\nreturn result;\n\
  }\n}\nhello is a palindrome: false\nnoon is a palindrome: true\n清单 15-5. 测试字符串是否为回文\n\
  ```\n\nStringBuilder 和\nStringBuffer\n\n`StringBuilder`\n和 `StringBuffer` 是\n`String`\
  \ 类的配套类。与\n`String` 不同，它们\n表示可变的字符序列。也就是说，你可以更改\n`StringBuilder` 和\n`StringBuffer`\
  \ 的内容\n而无需创建新对象。你可能会疑惑为什么存在两个类来表示同一事物——可变的字符序列。`StringBuffer` 类\n自 Java 诞生之初就是 Java\
  \ 库的一部分，而 `StringBuilder` 类\n是在 Java 5 中添加的。两者的区别在于线程安全性。\n`StringBuffer` 是\n线程安全的，而\
  \ `StringBuilder` 不是\n线程安全的。大多数情况下，你不需要线程安全，在这些情况下使用\n`StringBuffer` 会带来性能损失。这就是后来添加\
  \ `StringBuilder` \n    的原因。这两个\n类具有相同的方法，只是 `StringBuffer` 中的所有方法都是\n同步的。本节我将只讨论\
  \ `StringBuilder`。在你的\n代码中使用 `StringBuffer` 只需更改类名即可。\n\n提示\n\n当不需要线程安全时，请使用 `StringBuilder`，例如，在方法或构造函数中操作局部变量中的字符序列。否则，请使用\
  \ `StringBuffer`。线程安全性和同步将在本系列第二卷的第 6 章中描述。\n\n在字符串内容频繁更改的情况下，你可以使用 `StringBuilder`\
  \ 类的对象\n来代替 `String` 类。回想一下，由于 `String` 类的不可变性，使用 `String` 对象进行字符串操作会产生许多新的 `String`\
  \ 对象，这反过来会降低性能。`StringBuilder` 对象\n可以被视为一个可修改的字符串。它有许多修改其内容的方法。`StringBuilder` 类\n\
  包含四个构造函数：\n\n*   `StringBuilder()`\n\n*   `StringBuilder(CharSequence seq)`\n\n\
  *   `StringBuilder(int capacity)`\n\n*   `StringBuilder(String str)`\n\n无参构造函数创建一个空的\
  \ `StringBuilder`，默认容量为 16。\n\n第二个构造函数接受一个 `CharSequence` 对象\n作为参数。它创建一个 `StringBuilder`\
  \ 对象，\n其内容与指定的 `CharSequence` 相同。\n\n第三个构造函数接受一个 `int` 作为参数；它创建一个空的 `StringBuilder`\
  \ 对象，\n其初始容量与指定的参数相同。`StringBuilder` 的\n容量是指无需分配更多空间即可容纳的字符数。当需要额外空间时，容量会自动调整。\n\
  \n第四个构造函数接受一个 `String` 并创建一个\n`StringBuilder`，\n其内容与指定的 `String` 相同。以下是创建\n`StringBuilder`\
  \ 对象的一些示例：\n\n```\n// 创建一个空的 StringBuilder，默认初始容量为 16 个字符\nStringBuilder sb1 = new\
  \ StringBuilder();\n// 从字符串创建 StringBuilder\nStringBuilder sb2 = new StringBuilder(\"\
  Here is the content\");\n// 创建一个空的 StringBuilder，初始容量为 200 个字符\nStringBuilder sb3\
  \ = new StringBuilder(200);\n```\n\n`append()`\n方法允许你将文本添加到 `StringBuilder` 的末尾。它是\n\
  重载的。它接受多种类型的参数。有关所有重载\n`append()`\n方法的完整列表，请参阅该类的 API 文档。\n它还有其他方法，例如 `insert()`\
  \ 和 `delete()`，也允许你\n修改其内容。\n\n`StringBuilder` 类\n有两个属性：`length` 和 `capacity` \n\
  \   。在某个给定时间点，\n它们的值可能不相同。其长度指的是其内容的长度，而其容量指的是无需分配新内存即可容纳的最大字符数。其长度在任何时候最多等于其容量。`length()`\
  \ 和 `capacity()` 方法\n分别返回其长度和容量。例如：\n\n```\nStringBuilder sb = new StringBuilder(200);\
  \  // 容量:200, 长度:0\nsb.append(\"Hello\");                         // 容量:200, 长度:5\n\
  int len = sb.length();                      // len 被赋值为 5\nint capacity = sb.capacity();\
  \               // capacity 被赋值为 200\n```\n\n`StringBuilder` 的\n容量由运行时控制，而其长度由你放入其中的内容控制。运行时会在其内容被修改时调整容量。\n\
  \n你可以通过使用其\n`toString()`\n方法将 `StringBuilder` 的内容作为\n`String` 获取。\n\n```\n// 创建一个\
  \ String 对象\nString s1 = new String(\"Hello\");\n// 从 String 对象 s1 创建 StringBuilder\n\
  StringBuilder sb = new StringBuilder(s1);\n// 将 \" Java\" 追加到 StringBuilder 的内容中\n\
  sb.append(\" Java\"); // 现在，sb 包含 \"Hello Java\"\n// 从 StringBuilder 获取 String\n\
  String s2 = sb.toString(); // s2 包含 \"Hello Java\"\n```\n\n与 `String` 不同，\n`StringBuilder`\n\
  有一个 `setLength()` 方法，\n该方法接受其新长度作为参数。如果新长度大于\n现有长度，则额外的位置用 `null` 字符填充（\nnull 字符是\
  \ `\\u0000`）。如果新\n长度小于现有长度，则其内容将被截断以适应\n新长度。\n\n```\n// 长度为 5\nStringBuilder sb\
  \ = new StringBuilder(\"Hello\");\n// 现在长度为 7，最后两个字符为 null 字符 '\\u0000'\nsb.setLength(7);\n\
  // 现在长度为 2，内容为 \"He\"\nsb.setLength(2);\n```\n\n`StringBuilder` 类\n有一个 `reverse()`\n\
  方法，该方法将其内容替换为相同的字符序列，但顺序相反。清单 15-6 演示了\n`StringBuilder` 类的一些方法。\n\n\n\n```\n// StringBuilderTest.java\n\
  package com.jdojo.string;\npublic class StringBuilderTest {\npublic static void\
  \ main(String[] args) {\n// 创建一个空的 StringBuffer\nStringBuilder sb = new StringBuilder();\n\
  printDetails(sb);\n// 追加 \"blessings\"\nsb.append(\"blessings\");\nprintDetails(sb);\n\
  // 在开头插入 \"Good \"\nsb.insert(0, \"Good \");\nprintDetails(sb);\n// 删除第一个字符 o\n\
  sb.deleteCharAt(1);\nprintDetails(sb);\n// 追加 \" be with you\"\nsb.append(\" be\
  \ with you\");\nprintDetails(sb);\n// 将长度设置为 3\nsb.setLength(3);\nprintDetails(sb);\n\
  // 反转内容\nsb.reverse();\nprintDetails(sb);\n}\npublic static void printDetails(StringBuilder\
  \ sb) {\nSystem.out.println(\"内容: \\\"\" + sb + \"\\\"\");\nSystem.out.println(\"\
  长度: \" + sb.length());\nSystem.out.println(\"容量: \" + sb.capacity());\n// 打印空行以分隔结果\n\
  System.out.println();\n}\n}\n内容: \"\"\n长度: 0\n容量: 16\n内容: \"blessings\"\n长度: 9\n\
  容量: 16\n内容: \"Good blessings\"\n长度: 14\n容量: 16\n内容: \"God blessings\"\n长度: 13\n\
  容量: 16\n内容: \"God blessings be with you\"\n长度: 25\n容量: 34\n内容: \"God\"\n长度: 3\n\
  容量: 34\n内容: \"doG\"\n长度: 3\n容量: 34\n清单 15-6.\n使用 StringBuilder 对象\n```\n\n字符串连接运算符\
  \ (+)\n\n有三种连接字符串的方式：\n\n*   使用 `String` 类的 `concat(String str)` 方法\n\n*   使用 +\
  \ 字符串连接运算符\n\n*   使用 `StringBuilder` 或 `StringBuffer`\n\n`concat()` 方法接受一个 `String`\
  \ 作为参数，这意味着你只能用它来连接字符串。如果你想将不同数据类型的值连接成一个字符串，请使用连接运算符。例如：\n\n```\n// 将 \"hi there\"\
  \ 赋值给 s1\nString s1 = \"hi \".concat(\" there\");\n// 将 \"XY12.56\" 赋值给 s2\nString\
  \ s2 = \"X\" + \"Y\" + 12.56;\n// 将 \"XY12.56\" 赋值给 s3\nString s3 = new StringBuilder().append(\"\
  X\").append(\"Y\").append(12.56).toString();\n```\n\n语言敏感的字符串比较\n\n`String` 类根据字符的\
  \ Unicode 值来比较字符串。有时你可能希望根据字典顺序来比较字符串。\n\n使用 `java.text.Collator` 类的 `compare()`\
  \ 方法执行语言敏感（字典顺序）的字符串比较。该方法接受两个要比较的字符串作为参数。如果两个字符串相同，则返回 `0`；如果第一个字符串排在第二个之后，则返回\
  \ `1`；如果第一个字符串排在第二个之前，则返回 `-1`。清单 15-7 演示了 `Collator` 类的使用。\n\n```\n// CollatorStringComparison.java\n\
  package com.jdojo.string;\nimport java.text.Collator;\nimport java.util.Locale;\n\
  public class CollatorStringComparison {\npublic static void main(String[] args)\
  \ {\n// 为美国创建一个 Locale 对象\nLocale USLocale = new Locale(\"en\", \"US\");\n// 获取一个美国的\
  \ Collator 实例\nCollator c = Collator.getInstance(USLocale);\nString str1 = \"cat\"\
  ;\nString str2 = \"Dog\";\nint diff = c.compare(str1, str2);\nSystem.out.print(\"\
  使用 Collator 类比较: \");\nprint(diff, str1, str2);\nSystem.out.print(\"使用 String 类比较:\
  \ \");\ndiff = str1.compareTo(str2);\nprint(diff, str1, str2);\n}\npublic static\
  \ void print(int diff, String str1, String str2) {\nif (diff > 0) {\nSystem.out.println(str1\
  \ + \" 排在 \" + str2 + \" 之后\");\n} else if (diff < 0) {\nSystem.out.println(str1\
  \ + \" 排在 \" + str2 + \" 之前\");\n} else {\nSystem.out.println(str1 + \" 和 \" + str2\
  \ + \" 相同。\");\n}\n}\n}\n使用 Collator 类比较: cat 排在 Dog 之前\n使用 String 类比较: cat 排在 Dog\
  \ 之后\n清单 15-7.\n语言敏感的字符串比较\n```\n\n该程序还展示了使用 `String` 类对相同两个字符串进行比较。请注意，在字典顺序中，单词\
  \ `\"cat\"` 排在单词 `\"Dog\"` 之前。`Collator` 类使用它们的字典顺序进行比较。然而，`String` 类比较的是 `\"cat\"\
  ` 的第一个字符（Unicode 值为 99）和 `\"Dog\"` 的第一个字符（Unicode 值为 68）。基于这两个值，`String` 类判定 `\"\
  Dog\"` 排在 `\"cat\"` 之前。输出结果证实了这两种不同的字符串比较方式。\n\n总结\n\n在本章中，你学习了 `String`、`StringBuilder`\
