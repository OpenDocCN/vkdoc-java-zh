  \  + \", p.y = \" + p.getY());\n    changePoint(p);\n    System.out.println(\"p.x\
  \ = \" + p.getX()\n    + \", p.y = \" + p.getY());\n    }\n    public static void\
  \ change(int x) {\n    x = 200;\n    }\n    public static void changePointReference(Point2D\
  \ p) {\n    p = new Point2D();\n    }\n    public static void changePoint(Point2D\
  \ p) {\n    int newX = p.getX() / 2;\n    int newY = p.getY() / 2;\n    p.setX(newX);\n\
  \    p.setY(newY);\n    }\n    }\n    ```\n\n9. 构造器\n\n在本章中，你将学习：\n\n*   什么是构造器以及如何使用它们\n\
  \n*   类的不同类型的初始化器\n\n*   声明`final`变量、类和方法\n\n*   什么是泛型类以及如何使用它们\n\n什么是构造器？\n\n构造器是一个命名的代码块，用于在对象创建后立即初始化该类的对象。构造器的结构看起来类似于方法。然而，两者之间的相似之处仅止于外观。它们是两种不同的结构，用于不同的目的。\n\
  \n声明构造器\n\n构造器声明的一般语法如下：\n\n```\n[修饰符] <类名>([参数列表]) [throws 子句] {\n// 构造器的主体放在这里\n\
  }\n```\n\n构造器的声明以修饰符开头。构造器的访问修饰符可以是`public`、`private`、`protected`或包级（无修饰符）。构造器名称与类的简单名称相同。构造器名称后面跟着一对圆括号，其中可以包含参数。可选地，右括号后面可以跟一个`throws`子句，该子句后面跟着一个逗号分隔的异常列表。我将在关于异常处理的章节中讨论关键字`throws`的用法。构造器的主体（你放置代码的地方）用花括号括起来。\n\
  \n如果你将声明方法的语法与声明构造器的语法进行比较，你会发现它们几乎相同。建议在学习构造器声明时牢记方法声明，因为大多数特性是相似的。\n\n以下代码展示了为`Test`类声明构造器的示例。图\
  \ 9-1 展示了该构造器的结构。\n\n![A323069_2_En_9_Fig1_HTML.gif](img/A323069_2_En_9_Fig1_HTML.gif)\n\
  \n图 9-1.\n\nTest 类构造器的结构\n\n```\n// Test.java\npackage com.jdojo.cls;\npublic class\
  \ Test {\npublic Test() {\n// 代码放在这里\n}\n}\n```\n\n提示\n\n构造器的名称必须与类的简单名称匹配，而不是完全限定名称。\n\
  \n与方法不同，构造器没有返回类型。你甚至不能为构造器指定`void`作为返回类型。考虑以下`Test2`类的声明：\n\n```\npublic class\
  \ Test2 {\n// 下面是一个方法，而不是构造器。\npublic void Test2() {\n// 代码放在这里\n}\n}\n```\n\n`Test2`类声明了构造器吗？答案是否定的。`Test2`类没有声明构造器。相反，你看到的可能是一个方法声明，其名称与类的简单名称相同。这是一个方法声明，因为它指定了`void`返回类型。请注意，方法名称也可以与类名相同，就像本例中的情况一样。\n\
  \n\n\n仅凭名称本身并不能区分方法或构造器。如果某个构造的名称与类的简单名称相同，它可能是方法，也可能是构造器。如果它指定了返回类型，则为方法；如果未指定返回类型，则为构造器。\n\
  \n何时使用构造器？在创建新实例后，使用 `new` 运算符配合构造器来初始化类的实例（或对象）。有时在构造器的上下文中，“创建”和“初始化”这两个短语会互换使用。然而，你需要清楚创建对象和初始化对象之间的区别。`new`\
  \ 运算符创建对象，而构造器则初始化该对象。\n\n以下语句使用 `Test` 类的构造器来初始化 `Test` 类的对象：\n\n```\nTest t =\
  \ new Test();\n```\n\n图 9-2 展示了该语句的结构。`new` 运算符后跟对构造器的调用。`new` 运算符与构造器调用（例如 `\"\
  new Test()\"`）一起被称为实例（或对象）创建表达式。实例创建表达式在内存中创建一个对象，执行指定构造器主体中的代码，最后返回新对象的引用。\n\n\
  ![A323069_2_En_9_Fig2_HTML.gif](img/A323069_2_En_9_Fig2_HTML.gif)\n\n图 9-2. 使用 new\
  \ 运算符调用构造器的结构\n\n关于声明构造器的理论我已经讲得足够多了。现在是时候看看构造器实际运行的样子了。清单 9-1 包含了一个 `Cat` 类的代码。\n\
  \n```\n// Cat.java\npackage com.jdojo.cls;\npublic class Cat {\npublic Cat() {\n\
  System.out.println(\"Meow...\");\n}\n}\n清单 9-1. 带有一个构造器的 Cat 类\n```\n\n`Cat` 类声明了一个构造器。在构造器主体内部，它打印了一条消息\
  \ `\"Meow...\"`。清单 9-2 包含了一个 `CatTest` 类的代码，该类在其 `main()` 方法中创建了两个 `Cat` 对象。请注意，你总是使用对象创建表达式来创建\
  \ `Cat` 类的新对象。是否将新对象的引用存储在引用变量中由你决定。第一个 `Cat` 对象被创建，其引用未被存储。第二个 `Cat` 对象被创建，其引用被存储在引用变量\
  \ `c` 中。\n\n```\n// CatTest.java\npackage com.jdojo.cls;\npublic class CatTest {\n\
  public static void main(String[] args) {\n// 创建一个 Cat 对象并忽略其引用\nnew Cat();\n// 创建另一个\
  \ Cat 对象并将其引用存储在 c 中\nCat c = new Cat();\n}\n}\n清单 9-2. 创建两个 Cat 对象的测试类\n```\n\n\
  ```\nMeow...\nMeow...\n```\n\n重载构造器\n\n一个类可以有多个构造器。如果一个类有多个构造器，它们被称为重载构造器。由于构造器的名称必须与类的简单名称相同，因此需要区分不同的构造器。重载构造器的规则与重载方法相同。如果一个类有多个构造器，它们必须在参数的数量、顺序或类型上彼此不同。清单\
  \ 9-3 包含了一个 `Dog` 类的代码，该类声明了两个构造器。一个构造器不接受参数，另一个接受一个 `String` 参数。\n\n```\n// Dog.java\n\
  package com.jdojo.cls;\npublic class Dog {\n// 构造器 #1\npublic Dog() {\nSystem.out.println(\"\
  A dog is created.\");\n}\n// 构造器 #2\npublic Dog(String name) {\nSystem.out.println(\"\
  A dog named \" + name + \" is created.\");\n}\n}\n清单 9-3. 带有两个构造器的 Dog 类，一个无参数，一个带\
  \ String 参数\n```\n\n如果一个类声明了多个构造器，你可以使用其中任何一个来创建该类的对象。例如，以下两条语句创建了 `Dog` 类的两个对象：\n\
  \n```\nDog dog1 = new Dog();\nDog dog2 = new Dog(\"Cupid\");\n```\n\n第一条语句使用了无参数的构造器，第二条语句使用了带\
  \ `String` 参数的构造器。如果你使用带参数的构造器创建对象，实际参数的顺序、类型和数量必须与形式参数的顺序、类型和数量匹配。清单 9-4 包含了完整的代码，该代码使用不同的构造器创建了两个\
  \ `Dog` 对象。\n\n```\n// DogTest.java\npackage com.jdojo.cls;\npublic class DogTest\
  \ {\npublic static void main(String[] args) {\nDog d1 = new Dog();         // 使用构造器\
  \ #1\nDog d2 = new Dog (\"Canis\"); // 使用构造器 #2\n}\n}\n清单 9-4. 测试 Dog 类的构造器\n```\n\
  \n```\nA dog is created.\nA dog named Canis is created.\n```\n\n运行 `DogTest` 类的输出表明，在\
  \ `main()` 方法中创建两个 `Dog` 对象时调用了不同的构造器。\n\n每个对象创建表达式调用一次构造器。在对象创建过程中，你只能执行一次构造器的代码。如果某个构造器的代码被执行了\
  \ `N` 次，这意味着该类的 `N` 个对象将被创建，并且你必须使用 `N` 个对象创建表达式来实现这一点。然而，当一个对象创建表达式调用一个构造器时，被调用的构造器可能会从其主体中调用另一个构造器。我将在本节后面介绍一个构造器调用另一个构造器的情况。\n\
  \n为构造器编写代码\n\n到目前为止，你一直在构造器中编写简单的代码。你应该在构造器中编写什么样的代码？构造器的目的是初始化新创建对象的实例变量。在构造器内部，你应该只编写初始化对象实例变量的代码。当调用构造器时，对象尚未完全创建。对象仍处于创建过程中。如果你在构造器中编写一些处理逻辑，并假设内存中已存在一个完整的对象，有时可能会得到意想不到的结果。让我们创建另一个类来表示一个狗对象。你将把这个类称为\
  \ `SmartDog`，如清单 9-5 所示。\n\n```\n// SmartDog.java\npackage com.jdojo.cls;\npublic\
  \ class SmartDog {\nprivate String name;\nprivate double price;\npublic SmartDog()\
  \ {\n// 将 name 初始化为 \"Unknown\"，将 price 初始化为 0.0\nthis.name = \"Unknown\";\nthis.price\
  \ = 0.0;\nSystem.out.println(\"Using SmartDog() constructor\");\n}\npublic SmartDog(String\
  \ name, double price) {\n// 使用 name 和 price 参数的值初始化 name 和 price 实例变量\nthis.name\
  \ = name;\nthis.price = price;\nSystem.out.println(\"Using SmartDog(String, double)\
  \ constructor\");\n}\npublic void bark() {\nSystem.out.println(name + \" is barking...\"\
  );\n}\npublic void setName(String name) {\nthis.name = name;\n}\npublic String getName()\
  \ {\nreturn this.name;\n}\npublic void setPrice(double price) {\nthis.price = price;\n\
  }\npublic double getPrice() {\nreturn this.price;\n}\npublic void printDetails()\
  \ {\nSystem.out.print(\"Name: \" + this.name);\nif (price > 0.0) {\nSystem.out.println(\"\
  , price: \" + this.price);\n} else {\nSystem.out.println(\", price: Free\");\n}\n\
  }\n}\n清单 9-5. 声明了两个构造器以不同方式初始化实例变量的 SmartDog 类\n```\n\n`SmartDog` 类看起来稍微大了一些。然而，它的逻辑非常简单。以下是\
  \ `SmartDog` 类中你需要理解的主要要点：\n\n*   它声明了两个实例变量：`name` 和 `price`。`name` 实例变量存储智能狗的名字。`price`\
  \ 实例变量存储它可以被出售的价格。\n\n\n\n*   它声明了两个构造器。第一个构造器没有参数，将实例变量 `name` 和 `price` 分别初始化为\
  \ `\"Unknown\"` 和 `0.0`。第二个构造器接受两个名为 `name` 和 `price` 的参数，并将 `name` 和 `price` 实例变量初始化为传入这两个参数的任意值。请注意构造器内部关键字\
  \ `this` 的使用。关键字 `this` 指的是构造器代码正在执行的对象。在第一个构造器中，关键字 `this` 并非必需。然而，在第二个构造器中，你必须使用关键字\
  \ `this` 来引用实例变量，因为形式参数的名称隐藏了实例变量的名称。\n\n*   这两个构造器在其主体内初始化实例变量（或对象的状态）。它们不包含任何其他处理逻辑。\n\
  \n*   实例方法 `bark()` 在标准输出上打印一条消息，其中包含正在吠叫的智能狗的名字。\n\n*   `setName()` 和 `getName()`\
  \ 方法用于设置和获取智能狗的名字。`setPrice()` 和 `getPrice()` 方法用于设置和获取智能狗的价格。\n\n*   `printDetails()`\
  \ 方法打印智能狗的 `name` 和 `price`。如果智能狗的价格未设置为正值，则将其价格打印为 `\"Free\"`。\n\n清单 9-6 包含一个 `SmartDogTest`\
  \ 类的代码，演示了这两个构造器如何初始化实例变量。\n\n```\n// SmartDogTest.java\npackage com.jdojo.cls;\n\
  public class SmartDogTest {\npublic static void main(String[] args) {\n// 创建两个 SmartDog\
  \ 对象\nSmartDog sd1 = new SmartDog();\nSmartDog sd2 = new SmartDog(\"Nova\", 219.2);\n\
  // 打印两只狗的详细信息\nsd1.printDetails();\nsd2.printDetails();\n// 让它们吠叫\nsd1.bark();\n\
  sd2.bark();\n// 更改未知狗的名字和价格\nsd1.setName(\"Opal\");\nsd1.setPrice(321.80);\n// 再次打印详细信息\n\
  sd1.printDetails();\nsd2.printDetails();\n// 让它们再吠叫一次\nsd1.bark();\nsd2.bark();\n\
  }\n}\n清单 9-6.\n演示 SmartDog 类使用的测试类\n```\n\n```\nUsing SmartDog() constructor\nUsing\
  \ SmartDog(String, double) constructor\nName: Unknown, price: Free\nName: Nova,\
  \ price: 219.2\nUnknown is barking...\nNova is barking...\nName: Opal, price: 321.8\n\
  Name: Nova, price: 219.2\nOpal is barking...\nNova is barking...\n```\n\n从一个构造器调用另一个构造器\n\
  \n一个构造器可以调用同一个类的另一个构造器。让我们考虑以下 `Test` 类。它声明了两个构造器：一个不接受参数，另一个接受一个 `int` 参数。\n\n\
  ```\npublic class Test {\nTest() {\n}\nTest(int x) {\n}\n}\n```\n\n假设你想从无参构造器中调用带\
  \ `int` 参数的构造器。你第一次尝试（这是错误的）如下所示：\n\n```\npublic class Test {\nTest() {\n// 调用另一个构造器\n\
  Test(103); // 编译时错误\n}\nTest(int x) {\n}\n}\n```\n\n上述代码无法编译。Java 有一种特殊的方式来从一个构造器调用另一个构造器。你必须使用关键字\
  \ `this`，就像它是构造器的名称一样，来从一个构造器调用另一个构造器。以下代码使用语句 `\"this(103);\"` 从无参构造器调用带 `int`\
  \ 参数的构造器。这是关键字 `this` 的另一种用法。\n\n```\npublic class Test {\nTest() {\n// 调用另一个构造器\n\
  this(103); // 正确。注意关键字 this 的使用。\n}\nTest(int x) {\n}\n}\n```\n\n关于从一个构造器调用另一个构造器，有两条规则。这些规则确保在创建类的对象过程中，每个构造器只被执行一次。这些规则如下：\n\
  \n*   对另一个构造器的调用必须是该构造器中的第一条语句。\n\n*   一个构造器不能调用自身。\n\n\n\n如果一个构造器调用另一个构造器，该调用必须是构造器主体中的第一个可执行语句。这使得编译器能够轻松检查构造器是否已被调用，并且仅被调用一次。例如，以下代码将产生编译时错误，因为带有\
  \ `int` 参数的构造器调用 `this(k)` 是构造器主体中的第二条语句，而非第一条语句。\n\n```\npublic class Test {\n\
  Test() {\nint k = 10; // 第一条语句\nthis(k);    // 第二条语句。编译时错误\n}\nTest(int x) {\n}\n\
  }\n```\n\n尝试编译此 `Test` 类的代码将生成以下错误消息：\n\n```\nError(4):  call to this must be first\
  \ statement in constructor\n```\n\n构造器不能调用自身，因为这将导致递归调用。在以下 `Test` 类的代码中，两个构造器都试图调用自身：\n\
  \n```\npublic class Test {\nTest() {\nthis();\n}\nTest(int x ) {\nthis(10);\n}\n\
  }\n```\n\n尝试编译此代码将导致以下错误。每次尝试调用构造器自身都会生成一条错误消息。\n\n```\nError(2):  recursive constructor\
  \ invocation\nError(6):  recursive constructor invocation\n```\n\n通常，当你拥有多种初始化类对象的方式时，你会为类创建重载构造器。让我们考虑清单\
  \ 9-5 中所示的 `SmartDog` 类。两个构造器为你提供了两种初始化新 `SmartDog` 对象的方式。第一个构造器使用默认值初始化 `name`\
  \ 和 `price`。第二个构造器允许你使用调用者提供的值来初始化 `name` 和 `price`。有时你可能需要在构造器内部执行一些逻辑来初始化对象。允许从一个构造器调用另一个构造器，使你只需编写一次这样的逻辑。你可以为你的\
  \ `SmartDog` 类使用此特性，如下所示：\n\n```\n// SmartDog.java\npackage com.jdojo.cls;\npublic\
  \ class SmartDog {\nprivate String name;\nprivate double price;\npublic SmartDog()\
  \ {\n// 使用 \"Unknown\" 和 0.0 作为参数调用另一个构造器\nthis(\"Unknown\", 0.0);\nSystem.out.println(\"\
  Using SmartDog() constructor\");\n}\npublic SmartDog(String name, double price)\
  \ {\n// 将 name 和 price 初始化为指定的名称和价格\nthis.name = name;\nthis.price = price;\nSystem.out.println(\"\
  Using SmartDog(String, double) constructor\");\n}\n/* 其余代码保持不变 */\n}\n```\n\n请注意，你只更改了不接受参数的构造器内部的代码。你没有在第一个构造器中设置\
  \ `name` 和 `price` 的默认值，而是从第一个构造器中以默认值作为参数调用了第二个构造器。\n\n在构造器内部使用 return 语句\n\n构造器在其声明中不能有返回类型。这意味着构造器不能返回任何值。回想一下，`return`\
  \ 语句有两种类型：一种带有返回表达式，另一种不带返回表达式。不带返回表达式的 `return` 语句只是将控制权返回给调用者，而不返回任何值。你可以在构造器主体内部使用不带返回表达式的\
  \ `return` 语句。当构造器中的 `return` 语句被执行时，控制权将返回给调用者，并忽略构造器其余部分的代码。\n\n以下代码展示了在构造器中使用\
  \ `return` 语句的示例。如果参数 `x` 是负数，构造器将简单地执行 `return` 语句以结束对构造器的调用。否则，它将执行某些逻辑。\n\n```\n\
  public class Test {\npublic Test(int x) {\nif (x < 0) {\nreturn;\n}\n/* 在此处执行某些逻辑\
  \ */\n}\n}\n```\n\n构造器的访问级别修饰符\n\n构造器的访问级别决定了程序中哪些部分可以在对象创建表达式中使用该构造器来创建该类的对象。与字段和方法类似，你可以为构造器指定四种访问级别之一：\n\
  \n*   `public`\n\n*   `private`\n\n*   `protected`\n\n*   <包级>\n\n以下代码为 `Test` 类声明了四个构造器。每个构造器的注释解释了其访问级别。\n\
  \n```\n// 类 Test 具有 public 访问级别\npublic class Test {\n// 构造器 #1 - 包级访问\nTest() {\n\
  }\n// 构造器 #2 - public 访问级别\npublic Test(int x) {\n}\n// 构造器 #3 - private 访问级别\n\
  private Test(int x, int y) {\n}\n// 构造器 #4 - protected 访问级别\nprotected Test(int\
  \ x, int y, int z){\n}\n}\n```\n\n这些访问级别的效果与它们对方法的效果相同。具有 `public` 访问级别的构造器可以在应用程序的任何部分使用，前提是类本身是可访问的。具有\
  \ `private` 访问级别的构造器只能在声明它的同一个类内部使用。具有 `protected` 访问级别的构造器可以在声明其类的同一个包内的任何程序部分使用，也可以在任何包中的任何后代类中使用。具有包级访问的构造器可以在声明其类的同一个包内使用。\n\
  \n你可以为类指定 `public` 或包级访问级别。类定义了一个新的引用类型，你可以用它来声明引用变量。类的访问级别决定了程序中哪些部分可以使用该类的名称。通常，你会在类型转换或引用变量声明中使用类的名称，如下所示：\n\
  \n```\n// 使用 Test 类名声明引用变量 t\nTest t;\n// 使用 Test 类名转换引用变量 xyz\nTest t2 = (Test)xyz;\n\
  ```\n\n让我们讨论类及其构造器的不同访问级别组合，以及它们在程序中的影响。考虑以下代码，它声明了一个具有 `public` 访问级别的类 `T1`。它还有一个同样具有\
  \ `public` 访问级别的构造器：\n\n```\n// T1.java\npackage com.jdojo.cls.p1;\npublic class\
  \ T1 {\npublic T1() {\n}\n}\n```\n\n因为类 `T1` 具有 `public` 访问级别，你可以在同一模块的任何地方声明 `T1`\
  \ 类型的引用变量。如果此代码位于不同的模块中，假设包含该类的模块导出了该类的包，并且包含此代码的模块读取了第一个模块：\n\n```\n// 任何包内的代码\n\
  T1 t;\n```\n\n因为类 `T1` 的构造器具有 `public` 访问级别，你可以在任何包的对象创建表达式中使用它。\n\n```\n// 任何包内的代码\n\
  new T1();\n```\n\n你可以将前面的两条语句合并为任何包内代码中的一条语句。\n\n```\n// 任何包内的代码\nT1 t = new T1();\n\
  ```\n\n让我们考虑以下类 `T2` 的代码，它具有 `public` 访问级别，并且有一个具有 `private` 访问级别的构造器：\n\n```\n\
  // T2.java\npackage com.jdojo.cls.p1;\npublic class T2 {\nprivate T2() {\n}\n}\n\
  ```\n\n因为类 `T2` 具有 `public` 访问级别，你可以在同一模块的任何包中使用其名称来声明引用变量。如果该包位于不同的模块中，假设该模块可以读取包含\
  \ `T2` 类的包。类 `T2` 的构造器具有 `private` 访问级别。拥有 `private` 构造器的含义是，你不能在 `T2` 类外部创建 `T2`\
  \ 类的对象。回想一下，`private` 方法、字段或构造器不能在声明它的类外部使用。因此，除非以下代码出现在 `T2` 类内部，否则它将无法编译：\n\n\
  ```\n// T2 类外部的代码\nnew T2(); // 编译时错误\n```\n\n如果你不能在 `T2` 类外部创建其对象，那么 `T2` 类有什么用呢？让我们考虑一下你可以将构造器声明为\
  \ `private`，但仍然创建和使用该类对象的可能情况。\n\n\n\n构造函数用于创建类的对象。你可能希望限制某个类的对象数量。限制类对象数量的唯一方法，就是完全控制其构造函数。如果你将类的所有构造函数都声明为`private`访问级别，就能完全控制该类的对象如何被创建。通常，你会在该类中包含一个或多个公共静态方法，这些方法用于创建和/或返回该类的对象。如果你设计一个类，使其只能存在一个对象，这被称为**单例模式**。以下代码是基于单例模式的`T2`类的一个版本。\n\
  \n```\n// T2.java\npackage com.jdojo.cls.p1;\npublic class T2 {\nprivate static\
  \ T2 instance = new T2();\nprivate T2() {\n}\npublic static T2 getInstance() {\n\
  return T2.instance;\n}\n/* 其他代码在此处 */\n}\n```\n\n`T2`类声明了一个名为`instance`的私有静态引用变量，它持有`T2`类对象的引用。请注意，`T2`类使用自己的`private`构造函数来创建对象。其公共静态方法`getInstance()`返回该类的唯一对象。`T2`类不能存在多于一个的对象。\n\
  \n你可以使用`T2.getInstance()`方法来获取`T2`类对象的引用。在内部，`T2`类并不会在每次调用`T2.getInstance()`方法时都创建一个新对象。相反，对于该方法的所有调用，它都返回同一个对象引用。\n\
  \n```\nT2 t1 = T2.getInstance();\nT2 t2 = T2.getInstance();\n```\n\n有时你希望一个类只包含静态成员。创建此类的一个对象可能没有意义。例如，`java.lang.Math`类将其构造函数声明为私有的。`Math`类包含用于执行数值运算的静态变量和静态方法。创建`Math`类的对象是没有意义的。\n\
  \n你也可以将类的所有构造函数声明为私有，以防止继承。**继承**允许你通过扩展另一个类的定义来定义一个类。如果你不希望其他人扩展你的类，实现这一目标的方法之一就是将你类的所有构造函数声明为私有。另一种防止类被扩展的方法是将其声明为`final`。我将在第\
  \ 20 章详细讨论继承。\n\n让我们考虑`T3`类，其构造函数具有受保护的访问级别，如下所示：\n\n```\n// T3.java\npackage com.jdojo.cls.p1;\n\
  public class T3 {\nprotected T3() {\n}\n}\n```\n\n具有受保护访问级别的构造函数可以在同一个包中的任何位置使用，或者在任何包中的后代类内部使用。`T3`类位于`com.jdojo.cls.p1`包中。你可以在`com.jdojo.cls.p1`包中的任何位置编写以下语句，该语句会创建一个`T3`类的对象：\n\
  \n```\n// 在 com.jdojo.cls.p1 包中的任何位置均有效\nnew T3();\n```\n\n我稍后会详细讨论继承。然而，为了完成关于受保护构造函数的讨论，你将在以下示例中使用继承。关于继承的内容，在我于第\
  \ 20 章讨论时会更加清晰。你使用关键字`extends`来继承（或扩展）一个类。以下代码通过从`T3`类继承来创建一个`T3Child`类：\n\n```\n\
  // T3Child.java\npackage com.jdojo.cls.p2;\nimport com.jdojo.cls.p1.T3;\npublic\
  \ class T3Child extends T3 {\npublic T3Child() {\nsuper(); // 可以。调用 T3() 构造函数，该函数被声明为\
  \ protected。\n}\n}\n```\n\n`T3`类被称为`T3Child`类的父类。在创建子类对象之前，必须先创建其父类的对象。请注意在`T3Child()`构造函数体内使用`super()`语句。语句`super()`调用了`T3`类的受保护构造函数。`super`关键字用于调用父类的构造函数，就像你使用关键字`this`来调用同一个类的另一个构造函数一样。你不能直接调用`T3`的受保护构造函数，因为这位于`com.jdojo.cls.p1`包之外：\n\
  \n```\nnew T3();\n```\n\n考虑一个`T4`类，其构造函数具有包级访问权限。回想一下，不使用任何访问级别修饰符即表示包级访问权限。\n\n\
  ```\n// T4.java\npackage com.jdojo.cls.p1;\npublic class T4 {\n// T4() 具有包级访问权限\n\
  T4() {\n}\n}\n```\n\n你可以在`com.jdojo.cls.p1`包中的任何位置使用`T4`的构造函数来创建其对象。有时你需要一个类作为包中其他类的辅助类。这些类的对象只需要在包内创建。你可以为这类辅助类的构造函数指定包级访问权限。\n\
  \n**默认构造函数**\n\n声明一个类的主要目的是创建其类型的对象。你需要一个构造函数来创建类的对象。类需要构造函数这一必要性非常明显，以至于如果你没有声明构造函数，Java\
  \ 编译器会为你添加一个。由编译器添加的构造函数称为**默认构造函数**。默认构造函数没有任何参数。有时默认构造函数也被称为**无参构造函数**。默认构造函数的访问级别与类的访问级别相同。\n\
  \n你一直在使用的类被称为顶级类。你也可以在另一个类内部声明一个类，这被称为**内部类**。顶级类可以具有公共或包级访问权限。然而，内部类可以具有公共、私有、受保护或包级访问权限。Java\
  \ 编译器会为顶级类以及**嵌套类**添加一个默认构造函数。顶级类的默认构造函数可以具有公共或包级访问权限，具体取决于该类的访问级别。然而，内部类的默认构造函数可以具有公共、私有、受保护或包级访问权限，具体取决于其类的访问级别。\n\
  \n表 9-1 展示了一些类以及编译器为其添加默认构造函数的示例。当编译器添加默认构造函数时，它还会添加一条名为`super()`的语句来调用父类的无参构造函数。有时，在默认构造函数内部调用父类的无参构造函数可能会导致你的类无法编译。关于此主题的完整讨论，请参阅第\
  \ 20 章。\n\n**表 9-1. Java 编译器为其添加默认构造函数的类示例**\n\n| 你的类的源代码 | 你的类的编译版本 | 注释 |\n| ---\
  \ | --- | --- |\n| `public class Test {`<br><br>`}` | `public class Test {`<br><br>`public\
  \ Test() {`<br><br>`}`<br><br>`}` | 编译器添加一个具有`public`级别访问权限的默认构造函数。 |\n| `class\
  \ Test {`<br><br>`}` | `class Test {`<br><br>`Test() {`<br><br>`}`<br><br>`}` |\
  \ 编译器添加一个具有包级访问权限的默认构造函数。 |\n| `public class Test {`<br><br>`Test() {`<br><br>`}`<br><br>`}`\
  \ | `public class Test {`<br><br>`Test() {`<br><br>`}`<br><br>`}` | `Test`类已经有一个构造函数。编译器不会添加任何构造函数。\
  \ |\n| `public class Test {`<br><br>`public Test(int x) {`<br><br>`}`<br><br>`}`\
  \ | `public class Test {`<br><br>`public Test(int x) {`<br><br>`}`<br><br>`}` |\
  \ `Test`类已经有一个构造函数。编译器不会添加任何构造函数。 |\n| `public class Test {`<br><br>`private class\
  \ Inner {`<br><br>`}`<br><br>`}` | `public class Test {`<br><br>`public Test() {`<br><br>`}`<br><br>`private\
  \ class Inner {`<br><br>`private Inner(){`<br><br>`}`<br><br>`}` |  |\n\n\n\n`}`\n\
  \ |\n  `Test` 是一个\n公共顶层类，而 `Inner` 是一个私有\n内部类。编译器为 `Test` 类添加了一个 `public` 默认\n构造函数，并为\
  \ `Inner` 类添加了一个\n`private` 默认\n构造函数。\n |\n\n提示\n\n良好的编程实践是显式地为所有类添加构造函数，而不是让编译器为你的类添加默认构造函数。构造函数的故事还没有结束。你将在关于继承的章节中再次探讨构造函数。\n\
  \n静态构造函数\n\n构造函数用于创建新对象的上下文中；因此，它们被视为对象上下文的一部分，而非类上下文。你不能将构造函数声明为 `static`。关键字\n\
  `this`（它是对当前对象的引用）在构造函数体内是可用的，就像它在所有实例方法体内可用一样。\n\n实例初始化块\n\n你已经看到构造函数用于初始化类的实例。实例初始化块（也称为实例初始化器）也用于初始化类的对象。为什么\
  \ Java 要提供两种结构来执行相同的操作？\n\n并非 Java 中的所有类都可以拥有构造函数。得知并非所有类都能拥有构造函数，你是否感到惊讶？我在讨论构造函数时没有提到这一点。简单来说，我提到了内部类，它们与顶层类不同。我在本三卷系列丛书的第二卷中讨论了另一种类型的类，称为匿名类。顾名思义，匿名类没有名称。回想一下，构造函数是一个命名的代码块，其名称与类的简单名称相同。由于匿名类不能有名称，因此它也不能有构造函数。你将如何初始化匿名类的对象？你可以使用实例初始化器来初始化匿名类的对象。使用实例初始化器来初始化对象并不仅限于匿名类。任何类型的类都可以使用它来初始化其对象。\n\
  \n实例初始化器只是类体内的一段代码块，但位于任何方法或构造函数之外。回想一下，代码块是用花括号括起来的一系列合法 Java 语句。实例初始化器没有名称。它的代码只是放在一个左花括号和一个右花括号内。以下代码片段展示了如何为\
  \ `Test` 类声明一个实例初始化器。请注意，实例初始化器在实例上下文中执行，并且关键字\n`this` 在实例初始化器内是可用的。\n\n```\npublic\
  \ class Test {\nprivate int num;\n// 一个实例初始化器\n{\nthis.num = 101;\n/* 实例初始化器的其他代码放在这里\
  \ */\n}\n/* Test 类的其他代码放在这里 */\n}\n```\n\n你可以为一个类拥有多个实例初始化器。对于你创建的每个对象，它们都会按文本顺序自动执行。所有实例初始化器的代码在任何构造函数之前执行。清单\
  \ 9-7 演示了构造函数和实例初始化器的执行顺序。\n\n```\n// InstanceInitializer.java\npackage com.jdojo.cls;\n\
  public class InstanceInitializer {\n{\nSystem.out.println(\"进入实例初始化器 1。\");\n}\n\
  {\nSystem.out.println(\"进入实例初始化器 2。\");\n}\npublic InstanceInitializer() {\nSystem.out.println(\"\
  进入无参构造函数。\");\n}\npublic static void main(String[] args) {\nInstanceInitializer\
  \ ii = new InstanceInitializer();\n}\n}\n清单 9-7.\n使用实例初始化器的示例\n```\n\n```\n进入实例初始化器\
  \ 1。\n进入实例初始化器 2。\n进入无参构造函数。\n```\n\n提示\n\n实例初始化器不能包含 `return` 语句。它不能抛出受检异常，除非所有声明的构造函数在其\
  \ `throws` 子句中列出了这些受检异常；匿名类的情况例外，因为它没有构造函数；匿名类的实例初始化器可以抛出受检异常。\n\n静态初始化块\n\n静态初始化块也称为静态初始化器。它类似于实例初始化块。它用于初始化一个类。换句话说，你可以在静态初始化器块内初始化类变量。实例初始化器每个对象执行一次，而静态初始化器在类定义被加载到\
  \ JVM 时仅对类执行一次。为了与实例初始化器区分，你需要在声明的开头使用 `static` 关键字。你可以在一个类中拥有多个静态初始化器。所有静态初始化器按它们出现的文本顺序执行，并且在任何实例初始化器之前执行。清单\
  \ 9-8 演示了静态初始化器何时执行。\n\n```\n// StaticInitializer.java\npackage com.jdojo.cls;\n\
  public class StaticInitializer {\nprivate static int num;\n// 一个实例初始化器\n{\nSystem.out.println(\"\
  进入实例初始化器。\");\n}\n// 一个静态初始化器。注意下面使用了关键字 static。\nstatic {\nnum = 1245;\nSystem.out.println(\"\
  进入静态初始化器。\");\n}\n// 构造函数\npublic StaticInitializer() {\nSystem.out.println(\"进入构造函数。\"\
  );\n}\npublic static void main(String[] args) {\nSystem.out.println(\"进入 main()\
  \ #1\\. num: \" + num);\n// 声明类的引用变量\nStaticInitializer si;\nSystem.out.println(\"\
  进入 main() #2\\. num: \" + num);\n// 创建一个对象\nnew StaticInitializer();\nSystem.out.println(\"\
  进入 main() #3\\. num: \" + num);\n// 创建另一个对象\nnew StaticInitializer();\n}\n}\n清单\
  \ 9-8.\n在类中使用静态初始化器的示例\n```\n\n```\n进入静态初始化器。\n进入 main() #1\\. num: 1245\n进入 main()\
  \ #2\\. num: 1245\n进入实例初始化器。\n进入构造函数。\n进入 main() #3\\. num: 1245\n进入实例初始化器。\n进入构造函数。\n\
  ```\n\n输出起初可能令人困惑。它显示 `static` 初始化器甚至在 `main()` 方法中显示第一条消息之前就已经执行了。当你使用以下命令运行 `StaticInitializer`\
  \ 类时，你会得到这个输出：\n\n```\nc:\\Java9Fundamentals>java --module-path dist --module jdojo.cls/com.jdojo.cls.StaticInitializer\n\
  ```\n\n`java` 命令必须在执行其 `main()` 方法之前加载 `StaticInitializer` 类的定义。当 `StaticInitializer`\
  \ 类的定义被加载到内存中时，此时该类被初始化，并且其静态初始化器被执行。这就是为什么你在看到 `main()` 方法的消息之前先看到静态初始化器的消息。请注意，实例初始化器被调用了两次，因为你创建了\
  \ `StaticInitializer` 类的两个对象。\n\n提示\n\n`static` 初始化器不能抛出受检异常，并且不能包含 `return` 语句。\n\
  \nfinal 关键字\n\n`final` 关键字在 Java 的许多上下文中使用。它在不同上下文中具有不同的含义。然而，顾名思义，其主要含义在所有上下文中是相同的。其主要含义如下：\n\
  \n与 final 关键字关联的结构不允许修改或替换该结构的原始值或定义。\n\n如果你记住了 `final` 关键字的主要含义，它将帮助你理解其在特定上下文中的专门含义。`final`\
  \ 关键字可以在以下三种上下文中使用：\n\n*   变量声明\n\n*   类声明\n\n*   方法声明\n\n\n\n在本节中，我将讨论仅在变量声明上下文中使用\
  \ `final` 关键字的情况。第 20 章将详细讨论其在类和方法声明中的使用。本节将简要说明它在所有三种上下文中的含义。\n\n如果一个变量被声明为 `final`，则它只能被赋值一次。也就是说，一旦设置了\
  \ `final` 变量的值，就不能再修改。如果一个类被声明为 final，则它不能被扩展（或创建子类）。如果一个方法被声明为 `final`，则它不能在包含该方法的类的子类中被重新定义（覆盖或隐藏）。\n\
  \n我们来讨论在变量声明中使用 `final` 关键字的情况。在此讨论中，变量声明指的是局部变量、方法/构造器的形式参数、实例变量和类变量的声明。要将变量声明为\
  \ `final`，你需要在变量声明中使用 `final` 关键字。以下代码片段声明了四个 `final` 变量：`YES`、`NO`、`MSG` 和 `act`：\n\
  \n```\nfinal int YES = 1;\nfinal int NO = 2;\nfinal String MSG = \"Good-bye\";\n\
  final Account act = new Account();\n```\n\n`final` 变量的值只能设置一次。第二次尝试设置 `final` 变量的值将产生编译时错误。\n\
  \n```\nfinal int x = 10;\nint y = 101 + x; // 读取 x 是允许的\n// 编译时错误。一旦设置，就不能更改 final\
  \ 变量 x 的值\nx = 17;\n```\n\n初始化 `final` 变量有两种方式：\n\n*   可以在声明时进行初始化。\n*   也可以将初始化推迟到稍后时间。\n\
  \n`final` 变量的初始化可以推迟多久取决于变量类型。但是，你必须在首次读取 `final` 变量之前对其进行初始化。\n\n如果不在声明时初始化 `final`\
  \ 变量，这样的变量被称为空白 final 变量。以下是声明空白 final 变量的示例。\n\n```\n// 一个空白 final 变量\nfinal int\
  \ multiplier;\n/* 在此处执行某些操作... */\n// 首次设置 multiplier 的值\nmultiplier = 3;\n// 读取\
  \ multiplier 变量是允许的\nint value = 100 * multiplier;\n```\n\n让我们逐一分析每种类型的变量，看看如何将它们声明为\
  \ `final`。\n\nfinal 局部变量\n\n你可以将局部变量声明为 `final`。如果将局部变量声明为空白 final 变量，则必须在使用前对其进行初始化。如果第二次尝试更改\
  \ final 局部变量的值，将会收到编译时错误。以下代码片段在 `test()` 方法中使用了 final 和空白 final 局部变量。代码中的注释说明了你可以对代码中的\
  \ `final` 变量进行哪些操作。\n\n```\npublic static void test() {\nint x = 4;        // 一个变量\n\
  final int y = 10; // 一个 final 变量。从此处起不能更改 y\nfinal int z;      // 一个空白 final 变量\n\
  // 我们可以读取 x 和 y，并修改 x\nx = x + y;\n/* 此处不能读取 z，因为它尚未初始化 */\n/* 初始化空白 final 变量 z\
  \ */\nz = 87;\n/* 现在可以读取 z。从此处起不能更改 z */\nx = x + y + z;\n/* 在此处执行其他逻辑... */\n}\n\
  ```\n\nfinal 参数\n\n你也可以将形式参数声明为 `final`。当方法或构造器被调用时，形式参数会自动使用实际参数的值进行初始化。因此，你不能在方法体或构造器体内更改\
  \ final 形式参数的值。以下代码片段展示了 `test2()` 方法的 final 形式参数 `x`：\n\n```\npublic void test2(final\
  \ int x) {\n// 可以读取 x，但不能更改它\nint y = x + 11;\n/* 在此处执行其他逻辑... */\n}\n```\n\nfinal\
  \ 实例变量\n\n你可以将实例变量声明为 final 和空白 final。实例变量是对象状态的一部分。final 实例变量指定了对象创建后不会改变的那部分对象状态。空白\
  \ final 实例变量必须在创建对象时进行初始化。初始化空白 final 实例变量需遵循以下规则：\n\n*   它必须在某个实例初始化器或所有构造器中进行初始化。以下规则是对此规则的扩展。\n\
  \n*   如果它在某个实例初始化器中被初始化，则不应在任何其他实例初始化器或构造器中再次初始化。\n\n*   如果它未在任何实例初始化器中被初始化，编译器会确保当任何构造器被调用时，它只被初始化一次。此规则可细分为两个子规则。作为经验法则，空白\
  \ final 实例变量必须在所有构造器中进行初始化。如果遵循此规则，那么当一个构造器调用另一个构造器时，空白 final 实例变量将被多次初始化。为了避免空白\
  \ final 实例变量的多次初始化，如果构造器中的第一个调用是调用另一个初始化了该空白 final 实例变量的构造器，则不应在该构造器中对其进行初始化。\n\n\
  这些初始化空白 final 实例变量的规则可能看起来很复杂。然而，如果你只记住一条规则——当类的任何构造器被调用时，空白 final 实例变量必须且只能被初始化一次——那么理解起来就很简单了。前面描述的所有规则都是为了确保遵循这条规则。\n\
  \n让我们考虑初始化 final 和空白 final 实例变量的不同场景。对于 final 实例变量，我们没有什么需要讨论的，其中 `x` 是 `Test` 类的一个\
  \ final 实例变量：\n\n```\npublic class Test {\nprivate final int x = 10;\n}\n```\n\n\
  `final` 实例变量 `x` 在声明时已被初始化，之后其值不能更改。以下代码展示了一个名为 `Test2` 的类，其中包含一个名为 `y` 的空白 final\
  \ 实例变量：\n\n```\npublic class Test2 {\nprivate final int y; // 一个空白 final 实例变量\n\
  }\n```\n\n尝试编译 `Test2` 类会产生错误，因为空白 final 实例变量 `y` 从未被初始化。请注意，编译器会为 `Test2` 类添加一个默认构造器，但不会在构造器内初始化\
  \ `y`。以下 `Test2` 类的代码可以编译，因为它在实例初始化器中初始化了 `y`：\n\n```\npublic class Test2 {\nprivate\
  \ final int y;\n{\ny = 10; // 在实例初始化器中初始化\n}\n}\n```\n\n以下代码无法编译，因为它在两个实例初始化器中多次初始化了\
  \ `y`：\n\n```\npublic class Test2 {\nprivate final int y;\n{\ny = 10; // 第一次初始化\
  \ y\n}\n{\ny = 10; // 错误。再次初始化 y\n}\n}\n```\n\n这段代码对你来说可能看起来合法。然而，它并不合法，因为两个实例初始化器都在初始化\
  \ `y`，即使它们都将 `y` 设置为相同的值 10。规则是关于空白 final 实例变量应被初始化的次数，而与初始化所使用的值无关。由于当创建 `Test2`\
  \ 类的对象时，所有实例初始化器都会被执行，`y` 将被初始化两次，这是不合法的。\n\n以下包含两个构造器的 `Test2` 类代码可以编译：\n\n```\n\
  public class Test2 {\nprivate final int y;\npublic Test() {\ny = 10; // 初始化 y\n\
  }\npublic Test(int z) {\ny = z; // 初始化 y\n}\n}\n```\n\n\n\n这段代码在两个构造函数中都初始化了空白 final\
  \ 实例变量 `y`。看起来 `y` 被初始化了两次——每个构造函数各一次。请注意，`y` 是一个实例变量，对于 `Test2` 类的每个对象，都存在 `y`\
  \ 的一个副本。当创建 `Test2` 类的对象时，它会使用两个构造函数中的一个，而不是两个都用。因此，对于 `Test2` 类的每个对象，`y` 只被初始化一次。\n\
  \n以下是 `Test2` 类的修改代码，它展示了一个棘手的情况。两个构造函数都初始化了空白 final 实例变量 `y`。棘手之处在于无参构造函数调用了另一个构造函数。\n\
  \n```\npublic class Test2 {\nprivate final int y;\npublic Test() {\nthis(20); //\
  \ 调用另一个构造函数\ny = 10;   // 初始化 y\n}\npublic Test(int z) {\ny = z; // 初始化 y\n}\n}\n\
  ```\n\n这段 `Test2` 类的代码无法编译。编译器会生成一条错误消息，内容为“变量 y 可能已被赋值”。让我们考虑按如下方式创建 `Test2` 类的对象：\n\
  \n```\nTest2 t = new Test2(30);\n```\n\n通过调用单参构造函数来创建 `Test2` 类的对象没有问题。空白 final\
  \ 实例变量 `y` 只被初始化了一次。现在，让我们创建 `Test2` 类的另一个对象。\n\n```\nTest2 t2 = new Test2();\n\
  ```\n\n当使用无参构造函数时，它会调用单参构造函数，后者将 `y` 初始化为 20。无参构造函数再次将 `y` 初始化为 10，这是对 `y` 的第二次初始化。因此，之前的\
  \ `Test2` 类代码无法编译。你需要从无参构造函数中移除对 `y` 的初始化，代码才能编译。以下是能够编译的 `Test2` 类修改代码：\n\n```\n\
  public class Test2 {\nprivate final int y;\npublic Test() {\nthis(20); // 另一个构造函数将初始化\
  \ y\n}\npublic Test(int z) {\ny = z; // 初始化 y\n}\n}\n```\n\nfinal 类变量\n\n你可以将类变量声明为\
  \ final 和空白 final。你必须在某个静态初始化器中初始化空白 final 类变量。如果一个类有多个静态初始化器，你必须在其中一个静态初始化器中仅初始化所有空白\
  \ final 类变量一次。\n\n以下 `Test3` 类的代码展示了如何处理 final 类变量。通常使用全大写字母来命名 final 类变量。这也是在 Java\
  \ 程序中定义常量的一种方式。Java 类库中有大量示例，它定义了 `public static final` 变量并将其用作常量。\n\n```\npublic\
  \ class Test3 {\npublic static final int YES = 1;\npublic static final int NO =\
  \ 2;\npublic static final String MSG;\nstatic {\nMSG = \"我是一个空白 final 静态变量\";\n\
  }\n}\n```\n\nfinal 引用变量\n\n任何类型的变量（基本类型和引用类型）都可以声明为 final。`final` 关键字的主要含义在两种情况下是相同的。也就是说，一旦设置，`final`\
  \ 变量中存储的值就不能更改。在本节中，我将更详细地介绍 final 引用变量。引用变量存储对象的引用。final 引用变量意味着一旦它引用了某个对象（或 `null`），就不能再修改为引用另一个对象。考虑以下语句：\n\
  \n```\nfinal Account act = new Account();\n```\n\n这里，`act` 是一个 `Account` 类型的 `final`\
  \ 引用变量。它在声明时被初始化。此时，`act` 正在引用内存中的一个对象。\n\n现在，你不能让 `act` 变量引用内存中的另一个对象。以下语句会产生编译时错误：\n\
  \n```\nact = new Account(); // 编译时错误。不能更改 act\n```\n\n在这种情况下会出现一个常见的误解。程序员错误地认为，`act`\
  \ 引用变量所引用的 `Account` 对象不能被更改。将 `act` 引用变量声明为 final 涉及两件事。\n\n*   `act` 作为一个引用变量，它是\
  \ `final` 的。\n*   内存中的一个 `Account` 对象，其引用存储在 `act` 变量中。\n\n不能更改的是 `act` 引用变量，而不是它所引用的\
  \ `Account` 对象。如果 `Account` 类允许你更改其对象的状态，你可以使用 `act` 变量来更改状态。以下是有效的语句，它们修改了 `Account`\
  \ 对象的 `balance` 实例变量：\n\n```\nact.deposit(2001.00); // 修改 Account 对象的状态\nact.debit(2.00);\
  \      // 修改 Account 对象的状态\n```\n\n如果你不希望类的对象在创建后被修改，你需要在类设计中包含该逻辑。该类不应允许在创建对象后修改其任何实例变量。这样的对象被称为不可变对象。\n\
  \n编译时 final 变量与运行时 final 变量\n\n你使用 `final` 变量来定义常量。这就是 `final` 变量也被称为常量的原因。如果 `final`\
  \ 变量的值可以在编译时由编译器计算出来，那么这样的变量就是编译时常量。如果 `final` 变量的值无法由编译器计算出来，那么它就是运行时 final 变量。所有空白\
  \ final 变量的值直到运行时才可知。引用直到运行时才被计算。因此，所有空白 final 变量和 final 引用变量都是运行时常量。\n\n当你在表达式中使用编译时常量时，Java\
  \ 会执行一项优化。它会用常量的实际值替换编译时常量的使用。假设你有一个如下的 `Constants` 类，它声明了一个名为 `MULTIPLIER` 的静态\
  \ final 变量：\n\n```\npublic class Constants {\npublic static final int MULTIPLIER\
  \ = 12;\n}\n```\n\n考虑以下语句：\n\n```\nint x = 100 * Constants.MULTIPLIER;\n```\n\n\
  当你编译这条语句时，编译器会将 `Constants.MULTIPLIER` 替换为其值 12，你的语句会被编译为：\n\n```\nint x = 100 *\
  \ 12;\n```\n\n现在，100 * 12 也是一个编译时常量表达式。编译器会将其替换为值 1200，你的原始语句将被编译为：\n\n```\nint\
  \ x = 1200;\n```\n\n这种编译器优化有一个缺点。如果你更改了 `Constants` 类中 `MULTIPLIER final` 变量的值，你必须重新编译所有引用了\
  \ `Constants.MULTIPLIER` 变量的类。否则，它们将继续使用上次编译时 `MULTIPLIER` 常量的旧值。\n\n泛型类\n\n抽象和多态是面向对象编程的核心。定义变量是抽象的一个例子，其中变量隐藏了实际值以及存储值的位置。定义方法隐藏了其实现逻辑的细节，这是抽象的另一种形式。为方法定义参数是多态的一部分，它允许方法处理不同类型的值或对象。\n\
  \nJava 有一个称为泛型的特性，它允许在 Java 中编写真正的多态代码。使用泛型，你可以在不知道代码所操作对象类型的情况下编写代码。它允许你创建泛型类、构造函数和方法。\n\
  \n泛型类是使用形式类型参数定义的。形式类型参数是一个逗号分隔的变量名列表，放在类声明中类名后的尖括号（`<>`）中。以下代码片段声明了一个泛型类 `Wrapper`，它接受一个形式类型参数：\n\
  \n```\npublic class Wrapper  {\n// Wrapper 类的代码放在这里\n}\n```\n\n\n\n该参数被命名为 `T`。此时\
  \ `T` 是什么？答案是：你不知道。此时你只知道 `T` 是一个类型变量，它可以是 Java 中的任何引用类型，例如 `String`、`Integer`、`Double`、`Human`、`Account`\
  \ 等。形式类型参数的值是在使用 `Wrapper` 类时指定的。接受形式类型参数的类也被称为**参数化类**。\n\n你可以通过指定 `String` 类型作为其形式类型参数的值来声明\
  \ `Wrapper<T>` 类的变量，如下所示。这里，`String` 是实际类型参数。\n\n```\nWrapper stringWrapper;\n```\n\
  \nJava 允许你在不指定形式类型参数的情况下使用泛型类。这是为了向后兼容而允许的。你也可以像这样声明 `Wrapper<T>` 类的变量：\n\n```\n\
  Wrapper aRawWrapper;\n```\n\n当使用泛型类时未指定实际类型参数，它被称为**原始类型**。前面的声明将 `Wrapper<T>` 类用作原始类型，因为它没有为\
  \ `T` 指定值。\n\n**提示**\n\n泛型类的实际类型参数（如果指定）必须是引用类型，例如 `String`、`Human` 等。基本类型不允许作为泛型类的实际类型参数。\n\
  \n一个类可以有多个形式类型参数。以下代码片段声明了一个 `Mapper` 类，它接受两个名为 `T` 和 `R` 的形式参数：\n\n```\npublic\
  \ class Mapper  {\n// Mapper 类的代码放在这里\n}\n```\n\n你可以像这样声明 `Mapper<T, R>` 类的变量：\n\
  \n```\nMapper mapper;\n```\n\n这里，实际类型参数是 `String` 和 `Integer`。\n\n习惯上（并非强制要求）给形式类型参数起一个字符的名称，例如\
  \ `T`、`R`、`U`、`V` 等。通常，`T` 代表“类型”（Type），`R` 代表“返回”（Return）等。单字符名称使代码更具可读性。然而，没有什么能阻止你像下面这样声明一个泛型类，它有四个名为\
  \ `MyType`、`YourType`、`Hello` 和 `WhoCares` 的形式类型参数。\n\n```\npublic class Fun {\n\
  // Fun 类的代码放在这里\n}\n```\n\nJava 会编译 `Fun` 类，但你的代码的读者肯定会抱怨！形式类型参数在类体内可用作类型。清单 9-9\
  \ 声明了一个泛型类 `Wrapper<T>`。\n\n```\n// Wrapper.java\npackage com.jdojo.cls;\npublic\
  \ class Wrapper {\nprivate T obj;\npublic Wrapper(T obj) {\nthis.obj = obj;\n}\n\
  public T get() {\nreturn obj;\n}\npublic void set(T obj) {\nthis.obj = obj;\n}\n\
  }\n清单 9-9.\n声明一个泛型类 Wrapper\n```\n\n`Wrapper<T>` 类使用形式类型参数来声明实例变量 `obj`，为其构造函数和\
  \ `set()` 方法声明形式参数，并作为 `get()` 方法的返回类型。\n\n你可以通过为构造函数指定实际类型参数来创建泛型类型的对象，如下所示：\n\n\
  ```\nWrapper w1 = new Wrapper(\"Hello\");\n```\n\n大多数情况下，编译器可以推断出构造函数的实际类型参数。在这些情况下，你可以省略实际类型参数。在下面的赋值语句中，编译器会将构造函数的实际类型参数推断为\
  \ `String`：\n\n```\nWrapper w1 = new Wrapper(\"Hello\");\n```\n\n一旦你声明了泛型类的变量，出于所有实际目的，你可以将形式类型参数视为指定的实际类型参数。现在，你可以认为，对于\
  \ `w1`，`Wrapper<T>` 类的 `get()` 方法返回一个 `String`。\n\n```\nString s1 = w1.get();\n\
  ```\n\n清单 9-10 中的程序展示了如何使用泛型 `Wrapper<T>` 类。\n\n```\n// WrapperTest.java\npackage\
  \ com.jdojo.cls;\npublic class WrapperTest {\npublic static void main(String[] args)\
  \ {\nWrapper w1 = new Wrapper(\"Hello\");\nString s1 = w1.get();\nSystem.out.println(\"\
  s1=\" + s1);\nw1.set(\"Testing generics\");\nString s2 = w1.get();\nSystem.out.println(\"\
  s2=\" + s2);\nw1.set(null);\nString s3 = w1.get();\nSystem.out.println(\"s3=\" +\
  \ s3);\n}\n}\n清单 9-10.\n在你的代码中使用泛型类\n```\n\n```\ns1=Hello\ns2=Testing generics\n\
  s3=null\n```\n\n这只是 Java 泛型功能的冰山一角。要完全理解泛型，你必须首先涵盖其他主题，例如继承。泛型将在本三卷系列丛书的第二卷中单独用一章进行完整介绍。\n\
  \n**总结**\n\n构造函数是一个命名的代码块，用于在对象创建后立即初始化该类的对象。构造函数的结构看起来类似于方法。然而，它们是两种不同的结构，用于不同的目的。构造函数的名称与类的简单名称相同。与方法一样，构造函数可以接受参数。与方法不同，构造函数不能指定返回类型。构造函数与\
  \ `new` 运算符一起使用，`new` 运算符为新对象分配内存，构造函数则初始化该新对象。构造函数不会向调用者返回值。你可以在构造函数中使用不带表达式的 `return`\
  \ 语句。`return` 语句结束构造函数调用并将控制权返回给调用者。\n\n构造函数不被视为类的成员。与字段和方法一样，构造函数也具有访问级别：public、private、protected\
  \ 和包级。在定义它们时使用关键字 `public`、`private` 和 `protected` 分别赋予它们 public、private 和 protected\
  \ 访问级别。缺少这些关键字中的任何一个则指定包级访问。\n\n一个类可以有多个构造函数。如果一个类有多个构造函数，则它们被称为重载构造函数。由于构造函数的名称必须与类的简单名称相同，因此需要区分不同的构造函数。一个类的所有构造函数必须在参数的数量、顺序或类型上彼此不同。\n\
  \n构造函数可以使用关键字 `this` 调用同一个类的另一个构造函数，就像它是一个方法名一样。如果一个类的构造函数调用了同一个类的另一个构造函数，则必须满足以下规则：\n\
  \n*   对另一个构造函数的调用必须是构造函数中的第一条语句。\n*   构造函数不能调用自身。\n\n如果你没有为类添加构造函数，Java 编译器会添加一个。这样的构造函数称为**默认构造函数**。默认构造函数与其类具有相同的访问级别，并且不接受任何参数。\n\
  \n一个类也可以有一个或多个实例初始化器来初始化该类的对象。**实例初始化器**只是类体内但在任何方法或构造函数之外的代码块。回想一下，代码块是用花括号括起来的一系列合法\
  \ Java 语句。实例初始化器没有名称。它的代码只是放在左花括号和右花括号内。当创建类的对象时，该类的所有实例初始化器将按文本顺序执行。通常，实例初始化器用于初始化匿名类的对象。\n\
  \n\n\n一个类可以包含一个或多个静态初始化器，用于初始化类，通常是类变量。实例初始化器在每个对象创建时执行一次，而静态初始化器仅在类定义被加载到 JVM 时执行一次。为了与实例初始化器区分，你需要在声明开头使用`static`关键字。一个类的所有静态初始化器将按照它们在代码中出现的文本顺序执行，并且会在任何实例初始化器之前执行。\n\
  \n你可以将类及其成员声明为 final。如果某个东西是 final 的，意味着它的定义或值（无论它代表什么）都不能被修改。final 变量用于在 Java 中定义常量。编译时常量是指在程序编译时值就已确定的常量。运行时常量是指直到程序运行时值才确定的常量。\n\
  \n变量可以声明为空白 final，这种情况下变量被声明为 final，但在声明时未赋值。空白 final 变量必须在读取其值之前被赋值。空白 final 实例变量必须在其实例初始化器或构造器中初始化一次。你可以将类变量声明为空白\
  \ final。你必须在某个静态初始化器中初始化空白 final 类变量。如果一个类有多个静态初始化器，你必须在其中一个静态初始化器中仅初始化一次所有空白 final\
  \ 类变量。\n\nJava 允许你使用泛型编写真正的多态代码，其中代码以形式类型参数的形式编写。泛型类使用形式类型参数定义。形式类型参数是在类声明中类名后的尖括号（`<>`）内以逗号分隔的变量名列表。接受形式类型参数的类也称为参数化类。实际类型参数在使用参数化类时指定。\n\
