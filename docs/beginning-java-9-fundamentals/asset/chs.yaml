  String str = ld.format(formatter);\nSystem.out.println(str);\n```\n\n```\nChristmas\
  \ in 2020 is on Friday\n```\n\n解析日期和时间\n\n解析是从字符串创建日期、时间或日期时间对象的过程。与格式化类似，解析也由`DateTimeFormatter`处理。有关如何获取`DateTimeFormatter`类实例的详细信息，请参阅上一节“格式化日期和时间”。用于格式化的相同符号也用作解析符号。将字符串解析为日期时间对象有两种方法：\n\
  \n*   使用日期时间类的`parse()`方法\n\n*   使用`DateTimeFormatter`类的`parse()`方法\n\n提示\n\n如果文本无法解析，则会抛出`DateTimeParseException`。这是一个运行时异常。该类包含两个提供错误详细信息的方法。`getErrorIndex()`方法返回文本中发生错误的索引。`getParsedString()`方法返回正在解析的文本。在解析日期时间时处理此异常是一种良好的实践。\n\
  \n每个日期时间类都有两个重载版本的`parse()`静态方法。`parse()`方法的返回类型与定义它的日期时间类相同。以下是`LocalDate`类中`parse()`方法的两个版本：\n\
  \n*   `static LocalDate parse(CharSequence text)`\n\n*   `static LocalDate parse(CharSequence\
  \ text, DateTimeFormatter formatter)`\n\n`parse()`方法的第一个版本接受 ISO 格式的`datetime`对象的文本表示形式。例如，对于`LocalDate`，文本应采用\
  \ yyyy-mm-dd 格式。第二个版本允许你指定一个`DateTimeFormatter`。以下代码片段将两个字符串解析为两个`LocalDate`对象：\n\
  \n```\n// 解析 ISO 格式的 LocalDate\nLocalDate ld1 = LocalDate.parse(\"2014-01-10\");\n\
  // 解析 MM/dd/yyyy 格式的 LocalDate\nDateTimeFormatter formatter = DateTimeFormatter.ofPattern(\"\
  MM/dd/yyyy\");\nLocalDate ld2 = LocalDate.parse(\"01/10/2014\", formatter);\nSystem.out.println(\"\
  ld1: \" + ld1);\nSystem.out.println(\"ld2: \" + ld2);\n```\n\n```\nld1: 2014-01-10\n\
  ld2: 2014-01-10\n```\n\n`DateTimeFormatter`类包含多个`parse()`方法，以便将字符串解析为日期时间对象。`DateTimeFormatter`类不知道可以从字符串形成哪种类型的日期时间对象。因此，它们中的大多数返回一个`TemporalAccessor`对象，你可以查询该对象以获取日期时间组件。你可以将`TemporalAccessor`对象传递给日期时间类的`from()`方法，以获取特定的日期时间对象。以下代码片段展示了如何使用`DateTimeFormatter`对象解析\
  \ MM/dd/yyyy 格式的字符串，以构造一个`LocalDate`：\n\n```\nimport java.time.LocalDate;\nimport\
  \ java.time.format.DateTimeFormatter;\nimport java.time.temporal.TemporalAccessor;\n\
  ...\nDateTimeFormatter formatter = DateTimeFormatter.ofPattern(\"MM/dd/yyyy\");\n\
  TemporalAccessor ta = formatter.parse(\"01/10/2014\");\nLocalDate ld = LocalDate.from(ta);\n\
  System.out.println(ld);\n```\n\n\n\n```\n2014-01-10\n```\n\n`parse()` 方法的另一个版本接受一个\
  \ `TemporalQuery` 参数，可用于直接将字符串解析为特定的日期时间对象。以下代码片段演示了此版本 `parse()` 方法的使用。第二个参数是 `LocalDate`\
  \ 类的 `from()` 方法的方法引用。你可以将以下代码片段视为前一个代码的简写形式：\n\n```\nDateTimeFormatter formatter\
  \ = DateTimeFormatter.ofPattern(\"MM/dd/yyyy\");\nLocalDate ld = formatter.parse(\"\
  01/10/2014\", LocalDate::from);\nSystem.out.println(ld);\n```\n\n```\n2014-01-10\n\
  ```\n\n`DateTimeFormatter` 类包含一个 `parseBest()` 方法。使用此方法无需过多解释。假设你收到一个字符串作为方法的参数。该参数可能包含日期和时间的各种信息片段。在这种情况下，你希望使用最多的信息片段来解析该字符串。考虑以下模式：\n\
  \n```\nyyyy-MM-dd['T'HH:mm:ss[Z]]\n```\n\n此模式有两个可选部分。符合此模式的文本可以完全解析为 `OffsetDateTime`，也可以部分解析为\
  \ `LocalDateTime` 和 `LocalDate`。你可以按如下方式为此模式创建解析器：\n\n```\nDateTimeFormatter formatter\
  \ = DateTimeFormatter.ofPattern(\"yyyy-MM-dd['T'HH:mm:ss[Z]]\");\n```\n\n以下代码片段指定了\
  \ `OffsetDateTime`、`LocalDateTime` 和 `LocalDate` 作为首选的解析结果类型：\n\n```\nString text\
  \ = ...\nTemporalAccessor ta =\nformatter.parseBest(text, OffsetDateTime::from,\
  \ LocalDateTime::from, LocalDate::from);\n```\n\n该方法将尝试按顺序将文本解析为指定的类型，并返回第一个成功的结果。通常，调用\
  \ `parseBest()` 方法后，会跟一系列带有 `instanceof` 运算符的 `if-else` 语句，以检查返回的对象类型。清单 16-27 展示了如何使用\
  \ `parseBest()` 方法。请注意，第四个文本格式无效，解析它会抛出异常。\n\n```\n// ParseBestTest.java\npackage\
  \ com.jdojo.datetime;\nimport java.time.LocalDate;\nimport java.time.LocalDateTime;\n\
  import java.time.OffsetDateTime;\nimport java.time.format.DateTimeFormatter;\nimport\
  \ java.time.format.DateTimeParseException;\nimport java.time.temporal.TemporalAccessor;\n\
  public class ParseBestTest {\npublic static void main(String[] args) {\nDateTimeFormatter\
  \ parser\n= DateTimeFormatter.ofPattern(\"yyyy-MM-dd['T'HH:mm:ss[Z]]\");\nparseStr(parser,\
  \ \"2012-05-31\");\nparseStr(parser, \"2012-05-31T16:30:12\");\nparseStr(parser,\
  \ \"2012-05-31T16:30:12-0500\");\nparseStr(parser, \"2012-05-31Hello\");\n}\npublic\
  \ static void parseStr(DateTimeFormatter formatter, String text) {\ntry {\nTemporalAccessor\
  \ ta = formatter.parseBest(text,\nOffsetDateTime::from,\nLocalDateTime::from,\n\
  LocalDate::from);\nif (ta instanceof OffsetDateTime) {\nOffsetDateTime odt = OffsetDateTime.from(ta);\n\
  System.out.println(\"OffsetDateTime: \" + odt);\n} else if (ta instanceof LocalDateTime)\
  \ {\nLocalDateTime ldt = LocalDateTime.from(ta);\nSystem.out.println(\"LocalDateTime:\
  \ \" + ldt);\n} else if (ta instanceof LocalDate) {\nLocalDate ld = LocalDate.from(ta);\n\
  System.out.println(\"LocalDate: \" + ld);\n} else {\nSystem.out.println(\"Parsing\
  \ returned: \" + ta);\n}\n} catch (DateTimeParseException e) {\nSystem.out.println(e.getMessage());\n\
  }\n}\n}\n清单 16-27.\n使用 DateTimeFormatter 类的 parseBest() 方法\n```\n\n```\nLocalDate:\
  \ 2012-05-31\nLocalDateTime: 2012-05-31T16:30:12\nOffsetDateTime: 2012-05-31T16:30:12-05:00\n\
  Text '2012-05-31Hello' could not be parsed, unparsed text found at index 10\n```\n\
  \n遗留日期时间类\n\n我将 Java 8 之前可用的日期时间相关类称为遗留日期时间类。主要的遗留类有 `Date`、`Calendar` 和 `GregorianCalendar`。它们位于\
  \ `java.util` 包中。有关如何将 `Date` 和 `Calendar` 对象转换为新 Date-Time API 的日期时间对象以及反向转换，请参阅“与遗留日期时间类的互操作性”部分。\n\
  \nDate 类\n\n`Date` 类的对象表示时间上的一个瞬间。`Date` 对象存储自纪元（1970 年 1 月 1 日 UTC 午夜）以来经过的毫秒数。\n\
  \n提示\n\n遗留 Date-Time API 中的 `Date` 类类似于新 Date-Time API 中的 `Instant` 类。它们分别具有毫秒和纳秒的精度。\n\
  \n自 JDK 1.1 起，`Date` 类的大多数构造方法和方法已被弃用。`Date` 类的默认构造方法用于创建一个表示当前系统日期时间的 `Date` 对象。清单\
  \ 16-28 演示了 `Date` 类的使用。由于它打印当前日期和时间，你可能会得到不同的输出。\n\n```\n// CurrentLegacyDate.java\n\
  package com.jdojo.datetime;\nimport java.util.Date;\npublic class CurrentLegacyDate\
  \ {\npublic static void main (String[] args) {\n// 创建一个新的 Date 对象\nDate currentDate\
  \ = new Date();\nSystem.out.println(\"当前日期: \" + currentDate);\n// 获取当前日期的毫秒值\n\
  long millis = currentDate.getTime();\nSystem.out.println(\"当前日期时间的毫秒数: \" + millis);\n\
  }\n}\n清单 16-28.\n使用 Date 类\n```\n\n```\n当前日期: Sat Jan 11 11:19:55 CST 2014\n当前日期时间的毫秒数:\
  \ 1389460795979\n```\n\n`Date` 对象使用基于 1900 的年份。当你调用此对象的 `setYear()` 方法将年份设置为 2017\
  \ 时，你需要传递 117（2017 - 1900 = 117）。其 `getYear()` 方法对于 2017 年返回 117。此类中的月份范围从 0 到 11，其中一月是\
  \ 0，二月是 1……十二月是 11。\n\nCalendar 类\n\n`Calendar` 是一个抽象类。抽象类不能被实例化。我将在关于继承的第 20 章中详细讨论抽象类。`GregorianCalendar`\
  \ 类是一个具体类，它继承了 `Calendar` 类。\n\n`Calendar` 类声明了一些最终的静态字段来表示日期字段。例如，`Calendar.JANUARY`\
  \ 可用于指定日期中的一月。`GregorianCalendar` 类有一个默认构造方法，它创建一个表示当前日期时间的对象。你也可以使用其其他构造方法创建一个\
  \ `GregorianCalendar` 对象来表示特定日期。它还允许你获取特定时区的当前日期。\n\n```\n// 获取系统默认时区的当前日期\nGregorianCalendar\
  \ currentDate = new GregorianCalendar();\n// 获取表示 2003 年 3 月 26 日 06:30:45 的 GregorianCalendar\
  \ 对象\nGregorianCalendar someDate = new GregorianCalendar(2003, Calendar.MARCH, 26,\
  \ 6, 30, 45);\n// 获取印度时区，即 GMT+05:30\nTimeZone indianTZ = TimeZone.getTimeZone(\"\
  GMT+05:30\");\n// 获取印度的当前日期\nGregorianCalendar indianDate = new GregorianCalendar(indianTZ);\n\
  // 获取莫斯科时区，即 GMT+03:00\nTimeZone moscowTZ = TimeZone.getTimeZone(\"GMT+03:00\");\n\
  // 获取莫斯科的当前日期\nGregorianCalendar moscowDate = new GregorianCalendar(moscowTZ);\n\
  ```\n\n提示\n\n`Date` 包含日期时间。`GregorianCalendar` 包含带有时区的日期时间。\n\n日期的月份部分范围从 0 到 11。也就是说，一月是\
  \ 0，二月是 1，依此类推。使用 `Calendar` 类中为月份和其他日期字段声明的常量比使用它们的整数值更容易。例如，你应该在程序中使用 `Calendar.JANUARY`\
  \ 常量来表示一月，而不是使用 0。你可以通过将请求的字段作为参数传递给 `get()` 方法来获取日期时间中某个字段的值。\n\n\n\n```\n// 创建一个\
  \ GregorianCalendar 对象\nGregorianCalendar gc = new GregorianCalendar();\n// year\
  \ 将包含当前年份值\nint year = gc.get(Calendar.YEAR);\n// month 将包含当前月份值\nint month = gc.get(Calendar.MONTH);\n\
  // day 将包含当前日期的天数\nint day = gc.get(Calendar.DAY_OF_MONTH);\n// hour 将包含小时值\nint\
  \ hour = gc.get(Calendar.HOUR);\n// minute 将包含分钟值\nint minute = gc.get(Calendar.MINUTE);\n\
  // second 将包含秒值\nint second = gc.get(Calendar.SECOND);\n```\n\n你可以通过使用 `GregorianCalendar`\
  \ 类的 `setLenient()` 方法将日期解释设置为宽松或非宽松。默认情况下，它是宽松的。如果日期解释是宽松的，那么像 2003 年 3 月 35 日这样的日期会被解释为\
  \ 2003 年 4 月 5 日。如果日期解释不是宽松的，这样的日期将导致错误。你还可以通过使用 `before()` 和 `after()` 方法来比较两个日期，判断一个日期是在另一个日期之前还是之后。有两个方法，`add()`\
  \ 和 `roll()`，需要解释一下。它们将在以下章节中描述。\n\nadd() 方法\n\n`add()` 方法用于向日期中的特定字段添加一个数量。添加的数量可以是负数或正数。假设你在一个\
  \ `GregorianCalendar` 对象中存储了 2003 年 12 月 1 日的日期。你想向月份字段添加 5。月份字段的值将是 16，这超出了范围（0\
  \ – 11）。在这种情况下，较大的日期字段（这里，年份比月份大）将被调整以容纳溢出。向月份字段添加 5 后，日期将是 2004 年 5 月 1 日。以下代码片段说明了这一概念：\n\
  \n```\nGregorianCalendar gc = new GregorianCalendar(2003, Calendar.DECEMBER, 1);\n\
  gc.add(Calendar.MONTH, 5); // 现在 gc 代表 2004 年 5 月 1 日\n```\n\n这个方法也可能导致调整较小的字段。假设你在一个\
  \ `GregorianCalendar` 对象中存储了 2003 年 1 月 30 日的日期。你向月份字段添加 1。新的月份字段没有溢出。然而，结果日期 2003\
  \ 年 2 月 30 日不是一个有效日期。在 2003 年 2 月，月份中的天数必须在 1 到 28 之间。在这种情况下，月份中的天数字段会自动调整。它被设置为最接近的可能有效值，即\
  \ `28`。结果日期将是 2003 年 2 月 28 日。\n\nroll() 方法\n\n`roll()` 方法的工作方式与 `add()` 方法相同，不同之处在于当被更改的字段溢出时，它不会改变较大的字段。它可能会调整较小的字段以使日期成为有效日期。它是一个重载方法。\n\
  \n*   `void roll(int field, int amount)`\n\n*   `void roll(int field, boolean up)`\n\
  \n第二个版本按单个时间单位向上/向下滚动指定的 `field`，而第一个版本按指定的 `amount` 滚动指定的 `field`。因此，`gc.roll(Calendar.MONTH,\
  \ 1)` 等同于 `gc.roll(Calendar.MONTH, true)`，而 `gc.roll(Calendar.MONTH, -1)` 等同于 `gc.roll(Calendar.MONTH,\
  \ false)`。清单 16-29 演示了 `GregorianCalendar` 类的一些方法的使用。你可能会得到不同的输出。\n\n```\n// GregorianDate.java\n\
  package com.jdojo.datetime;\nimport java.util.Calendar;\nimport java.util.Date;\n\
  import java.util.GregorianCalendar;\npublic class GregorianDate {\npublic static\
  \ void main(String[] args) {\nGregorianCalendar gc = new GregorianCalendar();\n\
  System.out.println(\"当前日期: \" + getStr(gc));\n// 添加 1 年\ngc.add(Calendar.YEAR, 1);\n\
  System.out.println(\"添加一年后: \" + getStr(gc));\n// 添加 15 天\ngc.add(Calendar.DATE,\
  \ 15);\nSystem.out.println(\"添加 15 天后: \" + getStr(gc));\nlong millis = gc.getTimeInMillis();\n\
  Date dt = gc.getTime();\nSystem.out.println(\"毫秒时间: \" + millis);\nSystem.out.println(\"\
  Date 时间: \" + dt);\n}\npublic static String getStr(GregorianCalendar gc) {\nint\
  \ day = gc.get(Calendar.DAY_OF_MONTH);\nint month = gc.get(Calendar.MONTH);\nint\
  \ year = gc.get(Calendar.YEAR);\nint hour = gc.get(Calendar.HOUR);\nint minute =\
  \ gc.get(Calendar.MINUTE);\nint second = gc.get(Calendar.SECOND);\nString str =\
  \ day + \"/\" + (month + 1) + \"/\" + year + \" \"\n+ hour + \":\" + minute + \"\
  :\" + second;\nreturn str;\n}\n}\n清单 16-29.\n使用 GregorianCalendar 类\n```\n\n```\n\
  当前日期: 4/8/2017 9:53:49\n添加一年后: 4/8/2018 9:53:49\n添加 15 天后: 19/8/2018 9:53:49\n毫秒时间:\
  \ 1534733629830\nDate 时间: Sun Aug 19 21:53:49 CDT 2018\n```\n\n与旧版日期时间类的互操作性\n\n\
  当新的 Date-Time API 可用时，旧版日期时间类已经存在了超过 18 年。新的 Date-Time API 不会在一夜之间取代它们。作为一名 Java\
  \ 开发人员，你将负责维护使用旧版类的应用程序。因此，还提供了旧版类与新 Date-Time API 之间的互操作性。旧版类中添加了新方法，用于将其对象转换为新的日期时间对象，反之亦然。本节讨论以下旧版类的互操作性：\n\
  \n*   `java.util.Date`\n\n*   `java.util.Calendar`\n\n*   `java.util.GregorianCalendar`\n\
  \n*   `java.util.TimeZone`\n\n*   `java.sql.Date`\n\n*   `java.sql.Time`\n\n*  \
  \ `java.sql.Timestamp`\n\n*   `java.nio.file.attribute.FileTime`\n\n表 16-8 包含了旧版日期时间类及其对应的新\
  \ Date-Time 类的列表。除了 `Calendar` 类之外，所有旧版类都提供了双向转换。`toXxx()` 方法是实例方法。它们返回一个新的日期时间类的对象。其他方法是静态方法，它们接受一个新的日期时间类的对象并返回一个旧版类的对象。例如，`java.util.Date`\
  \ 类中的 `from()` 方法是一个静态方法，它接受一个 `Instant` 参数并返回一个 `java.util.Date`。`toInstant()`\
  \ 方法是一个实例方法，它将 `java.util.Date` 转换为 `Instant`。\n\n表 16-8.\n\n新日期时间与旧版日期时间类之间的转换\n\
  \n旧版类\n |\n 旧版类中的新方法\n |\n 对应的新日期时间类\n |\n\n| --- | --- | --- | --- | --- | ---\
  \ | --- |\n\n`java.util.Date`\n |\n `from(), toInstant()`\n |\n `Instant`\n |\n\n\
  `Calendar`\n |\n `toInstant()`\n |\n `无`\n |\n\n`GregorianCalendar`\n |\n `from(),\
  \ toZonedDateTime()`\n |\n `ZonedDateTime`\n |\n\n`TimeZone`\n |\n `getTimeZone(),\
  \ toZoneId()`\n |\n `ZoneId`\n |\n\n`java.sql.Date`\n |\n `valueOf(), toLocalDate()`\n\
  \ |\n `LocalDate`\n |\n\n`Time`\n |\n `valueOf(), toLocalTime()`\n |\n `LocalTime`\n\
  \ |\n\n`Timestamp`\n |\n `from(), toInstant()`\n |\n `Instant`\n |\n\n`valueOf(),\
  \ toLocalDateTime()`\n |\n `LocalDateTime`\n |\n\n`FileTime`\n |\n `from(), toInstant()`\n\
  \ |\n `Instant`\n |\n\n清单 16-30 展示了如何将 `Date` 转换为 `Instant` 以及反之。你可能会得到不同的输出。\n\n\
  \n\n```\n// DateAndInstant.java\npackage com.jdojo.datetime;\nimport java.util.Date;\n\
  import java.time.Instant;\npublic class DateAndInstant {\npublic static void main(String[]\
  \ args) {\n// 获取当前日期\nDate dt = new Date();\nSystem.out.println(\"Date: \" + dt);\n\
  // 将 Date 转换为 Instant\nInstant in = dt.toInstant();\nSystem.out.println(\"Instant:\
  \ \" + in);\n// 将 Instant 转换回 Date\nDate dt2 = Date.from(in);\nSystem.out.println(\"\
  Date: \" + dt2);\n}\n}\n清单 16-30.\n将 Date 转换为 Instant 及反向转换\n```\n\n```\nDate: Fri\
  \ Aug 04 22:05:14 CDT 2017\nInstant: 2017-08-05T03:05:14.786Z\nDate: Fri Aug 04\
  \ 22:05:14 CDT 2017\n```\n\n通常，旧版代码使用 `GregorianCalendar` 来存储日期、时间和日期时间。你可以将其转换为\
  \ `ZonedDateTime`，然后可以再转换为新的 Date-Time API 中的任何其他类。`Calendar` 类提供了一个 `toInstant()`\
  \ 方法，用于将其实例转换为 `Instant`。`Calendar` 类是抽象类。通常，你会拥有其具体子类（例如 `GregorianCalendar`）的实例。因此，将\
  \ `Instant` 转换为 `GregorianCalendar` 是一个两步过程：\n\n*   将 `Instant` 转换为 `ZonedDateTime`。\n\
  \n*   使用 `GregorianCalendar` 类的 `from()` 静态方法来获取 `GregorianCalendar`。\n\n清单 16-31\
  \ 中的程序展示了如何将 `GregorianCalendar` 转换为 `ZonedDateTime` 以及反向转换。该程序还展示了如何从 `GregorianCalendar`\
  \ 获取 `LocalDate`、`LocalTime` 等。由于输出取决于系统的默认时区，你可能会得到不同的输出。\n\n```\n// GregorianCalendarAndNewDateTime.java\n\
  package com.jdojo.datetime;\nimport java.time.LocalDate;\nimport java.time.LocalDateTime;\n\
  import java.time.LocalTime;\nimport java.time.OffsetDateTime;\nimport java.time.OffsetTime;\n\
  import java.time.ZoneId;\nimport java.time.ZonedDateTime;\nimport java.util.GregorianCalendar;\n\
  import java.util.TimeZone;\npublic class GregorianCalendarAndNewDateTime {\npublic\
  \ static void main(String[] args) {\n// 为默认时区创建一个 GC\nGregorianCalendar gc = new\
  \ GregorianCalendar(2014, 1, 11, 15, 45, 50);\nSystem.out.println(\"Gregorian Calendar:\
  \ \" + gc.getTime());\n// 将 GC 转换为 LocalDate\nLocalDate ld = gc.toZonedDateTime().toLocalDate();\n\
  System.out.println(\"Local Date: \" + ld);\n// 将 GC 转换为 LocalTime\nLocalTime lt\
  \ = gc.toZonedDateTime().toLocalTime();\nSystem.out.println(\"Local Time: \" + lt);\n\
  // 将 GC 转换为 LocalDateTime\nLocalDateTime ldt = gc.toZonedDateTime().toLocalDateTime();\n\
  System.out.println(\"Local DateTime: \" + ldt);\n// 将 GC 转换为 OffsetDate\nOffsetDateTime\
  \ od = gc.toZonedDateTime().toOffsetDateTime();\nSystem.out.println(\"Offset Date:\
  \ \" + od);\n// 将 GC 转换为 OffsetTime\nOffsetTime ot = gc.toZonedDateTime().toOffsetDateTime().toOffsetTime();\n\
  System.out.println(\"Offset Time: \" + ot);\n// 将 GC 转换为 ZonedDateTime\nZonedDateTime\
  \ zdt = gc.toZonedDateTime();\nSystem.out.println(\"Zoned DateTime: \" + zdt);\n\
  // 将 ZonedDateTime 转换为 GC。在 GC 中月份从 0 开始\n// 而在新 API 中从 1 开始\nZoneId zoneId = zdt.getZone();\n\
  TimeZone timeZone = TimeZone.getTimeZone(zoneId);\nSystem.out.println(\"Zone ID:\
  \ \" + zoneId);\nSystem.out.println(\"Time Zone ID: \" + timeZone.getID());\nGregorianCalendar\
  \ gc2 = GregorianCalendar.from(zdt);\nSystem.out.println(\"Gregorian Calendar: \"\
  \ + gc2.getTime());\n}\n}\n清单 16-31.\n将 GregorianCalendar 转换为新的日期时间类型及反向转换\n```\n\
  \n```\nGregorian Calendar: Tue Feb 11 15:45:50 CST 2014\nLocal Date: 2014-02-11\n\
  Local Time: 15:45:50\nLocal DateTime: 2014-02-11T15:45:50\nOffset Date: 2014-02-11T15:45:50-06:00\n\
  Offset Time: 15:45:50-06:00\nZoned DateTime: 2014-02-11T15:45:50-06:00[America/Chicago]\n\
  Zone ID: America/Chicago\nTime Zone ID: America/Chicago\nGregorian Calendar: Tue\
  \ Feb 11 15:45:50 CST 2014\n```\n\n如何将 `Date` 转换为 `LocalDate`？`Date` 表示时间上的一个瞬间，因此首先需要使用\
  \ `ZoneId` 将 `Date` 转换为 `ZoneDateTime`，然后从 `ZonedDateTime` 获取 `LocalDate`。以下代码片段展示了在\
  \ Java 8 中将当前日期转换为 `Date` 再转换为 `LocalDate` 的方法：\n\n```\nDate dt = new Date();\n\
  LocalDate ld = dt.toInstant()\n.atZone(ZoneId.systemDefault())\n.toLocalDate();\n\
  System.out.println(\"Date: \" + dt);\nSystem.out.println(\"LocalDate: \" + ld);\n\
  ```\n\n```\nDate: Sat Aug 05 11:01:02 CDT 2017\nLocalDate: 2017-08-05\n```\n\n这种转换经常需要用到。Java\
  \ 9 在 `LocalDate` 类中添加了一个 `ofInstant()` 方法，使这种转换更加容易。该方法的声明如下：\n\n```\nstatic LocalDate\
  \ ofInstant(Instant instant, ZoneId zone)\n```\n\n以下代码片段使用 Java 9 执行相同的转换：\n\n```\n\
  Date dt = new Date();\nLocalDate ld = LocalDate.ofInstant(dt.toInstant(), ZoneId.systemDefault());\n\
  System.out.println(\"Date: \" + dt);\nSystem.out.println(\"LocalDate: \" + ld);\n\
  ```\n\n```\nDate: Sat Aug 05 11:01:02 CDT 2017\nLocalDate: 2017-08-05\n```\n\n总结\n\
  \n通过 `java.time` 包，Java 8 提供了一个全面的 Date-Time API 来处理日期、时间和日期时间。默认情况下，大多数类都基于 ISO-8601\
  \ 标准。主要的类有：\n\n*   `Instant`\n\n*   `LocalDate`\n\n*   `LocalTime`\n\n*   `LocalDateTime`\n\
  \n*   `OffsetTime`\n\n*   `OffsetDateTime`\n\n*   `ZonedDateTime`\n\n`Instant` 类表示时间线上的一个瞬间，适用于机器，例如作为事件的时间戳。`LocalDate`、`LocalTime`\
  \ 和 `LocalDateTime` 类表示不带时区的人类可读的日期、时间和日期时间。`OffsetTime` 和 `OffsetDateTime` 类表示带有\
  \ UTC 偏移量的时间和日期时间。`ZoneDateTime` 类表示带有区域规则的时区的日期时间，该规则会根据时区的夏令时变化调整时间。\n\nDate-Time\
  \ API 提供了用于表示机器和人类使用的时间量的类。`Duration` 类表示机器使用的时间量，而 `Period` 类表示人类感知的时间量。Date-Time\
  \ API 通过 `java.time.format.DateTimeFormatter` 类为日期和时间的格式化和解析提供了广泛支持。Date-Time API\
  \ 通过 `java.time.chrono` 包支持非 ISO 日历系统。内置支持回历、日本历、民国历和泰国佛历。该 API 是可扩展的，并支持构建你自己的日历系统。\n\
