  \ |\n\n以下各节将向您展示如何使用其中一些方法。您需要从 `java.util` 包中导入几个类和接口才能运行示例代码片段。以下导入语句即可满足要求：\n\
  \n```\nimport java.util.*;\n```\n\n将数组转换为其他类型\n\n在此类别中，`Arrays` 类的方法允许您从数组获取 `List`、`Stream`\
  \ 和 `String`。`asList(T... a)` 方法接受类型为 `T` 的可变参数，并返回一个 `List<T>`。以下是一些示例：\n\n```\n\
  // 创建一个字符串数组\nString[] animals = {\"rat\", \"dog\", \"cat\"};\n// 将数组转换为 List\n\
  List animalList = Arrays.asList(animals);\nSystem.out.println(\"作为 List: \" + animalList);\n\
  // 将数组转换为 String\nString str = Arrays.toString(animals);\nSystem.out.println(\"\
  作为 String: \" + str);\n// 获取数组的排序流并打印其元素\nSystem.out.println(\"动物的排序流: \");\nArrays.stream(animals)\n\
  .sorted()\n.forEach(System.out::println);\n作为 List: [rat, dog, cat]\n作为 String:\
  \ [rat, dog, cat]\n动物的排序流:\ncat\ndog\nrat\n```\n\n搜索数组\n\n使用 `binarySearch()` 方法在数组中搜索键。数组必须已排序。如果数组中包含搜索键，该方法将返回搜索键的索引。否则，返回一个负数，该负数等于\n\
  \n```\n(-(插入点) - 1)\n```\n\n此处，插入点定义为该键将被插入数组的索引。这保证了如果键不存在于数组中，返回值为负整数。以下是一个示例：\n\
  \n```\n// 创建一个用于操作的数组\nint[] num = {2, 4, 3, 1};\nSystem.out.println(\"原始数组: \"\
  \ + Arrays.toString(num));\n// 在使用二分搜索前对数组进行排序\nArrays.sort(num);\nSystem.out.println(\"\
  排序后的数组: \" + Arrays.toString(num));\nint index = Arrays.binarySearch(num, 3);\n\
  System.out.println(\"找到 3 的索引: \" + index);\nindex = Arrays.binarySearch(num, 200);\n\
  System.out.println(\"找到 200 的索引: \" + index);\n```\n\n比较数组\n\n`equals()` 方法允许您比较两个数组是否相等。如果两个数组或切片中的元素数量相同，并且数组或切片中所有对应的元素对都相等，则认为这两个数组相等。\n\
  \n`compare()` 和 `compareUnsigned()` 方法按字典顺序比较数组或数组切片中的元素。`compareUnsigned()` 方法将整数值视为无符号数。`null`\
  \ 数组在字典顺序上小于非 `null` 数组。两个 `null` 数组相等。\n\n`mismatch()` 方法比较两个数组或数组切片。该方法返回第一个不匹配的索引。如果没有不匹配，则返回\
  \ `-1`。如果任一数组为 `null`，则抛出 `NullPointerException`。清单 19-17 包含一个完整的程序，用于比较两个数组及其切片。该程序使用\
  \ `int` 数组进行比较。\n\n```\n// ArrayComparison.java\npackage com.jdojo.array;\nimport\
  \ java.util.Arrays;\npublic class ArrayComparison {\npublic static void main(String[]\
  \ args) {\nint[] a1 = {1, 2, 3, 4, 5};\nint[] a2 = {1, 2, 7, 4, 5};\nint[] a3 =\
  \ {1, 2, 3, 4, 5};\n// 打印原始数组\nSystem.out.println(\"三个数组:\");\nSystem.out.println(\"\
  a1: \" + Arrays.toString(a1));\nSystem.out.println(\"a2: \" + Arrays.toString(a2));\n\
  System.out.println(\"a3: \" + Arrays.toString(a3));\n// 比较数组是否相等\nSystem.out.println(\"\
  \\n 使用 equals() 方法比较数组:\");\nSystem.out.println(\"Arrays.equals(a1, a2): \" + Arrays.equals(a1,\
  \ a2));\nSystem.out.println(\"Arrays.equals(a1, a3): \" + Arrays.equals(a1, a3));\n\
  System.out.println(\"Arrays.equals(a1, 0, 2, a2, 0, 2): \"\n+ Arrays.equals(a1,\
  \ 0, 2, a2, 0, 2));\n// 按字典顺序比较数组\nSystem.out.println(\"\\n 使用 compare() 方法比较数组:\"\
  );\nSystem.out.println(\"Arrays.compare(a1, a2): \" + Arrays.compare(a1, a2));\n\
  System.out.println(\"Arrays.compare(a2, a1): \" + Arrays.compare(a2, a1));\nSystem.out.println(\"\
  Arrays.compare(a1, a3): \" + Arrays.compare(a1, a3));\nSystem.out.println(\"Arrays.compare(a1,\
  \ 0, 2, a2, 0, 2): \"\n+ Arrays.compare(a1, 0, 2, a2, 0, 2));\n// 查找数组中的不匹配索引\n\
  System.out.println(\"\\n 使用 mismatch() 方法查找不匹配:\");\nSystem.out.println(\"Arrays.mismatch(a1,\
  \ a2): \" + Arrays.mismatch(a1, a2));\nSystem.out.println(\"Arrays.mismatch(a1,\
  \ a3): \" + Arrays.mismatch(a1, a3));\nSystem.out.println(\"Arrays.mismatch(a1,\
  \ 0, 5, a2, 0, 1): \"\n+ Arrays.mismatch(a1, 0, 5, a2, 0, 1));\n}\n}\n三个数组:\na1:\
  \ [1, 2, 3, 4, 5]\na2: [1, 2, 7, 4, 5]\na3: [1, 2, 3, 4, 5]\n使用 equals() 方法比较数组:\n\
  Arrays.equals(a1, a2): false\nArrays.equals(a1, a3): true\nArrays.equals(a1, 0,\
  \ 2, a2, 0, 2): true\n使用 compare() 方法比较数组:\nArrays.compare(a1, a2): -1\nArrays.compare(a2,\
  \ a1): 1\nArrays.compare(a1, a3): 0\nArrays.compare(a1, 0, 2, a2, 0, 2): 0\n使用 mismatch()\
  \ 方法查找不匹配:\nArrays.mismatch(a1, a2): 2\nArrays.mismatch(a1, a3): -1\nArrays.mismatch(a1,\
  \ 0, 5, a2, 0, 1): 1\n清单 19-17.\n使用 Arrays 类方法比较数组和数组切片\n```\n\n复制数组\n\n`copyOf()`\
  \ 方法允许您通过为新数组指定新长度来复制原始数组的元素。如果新数组的长度大于原始数组的长度，则额外的元素将根据数组类型被赋予默认值。`copyOfRange()`\
  \ 方法允许您将数组的一个切片复制到另一个数组。以下是一个示例：\n\n```\n// 创建一个用于操作的数组\nint[] num = {2, 4, 3, 1};\n\
  System.out.println(\"原始数组: \" + Arrays.toString(num));\n// 将 num 截断复制为 2 个元素\nint[]\
  \ numCopy1 = Arrays.copyOf(num, 2);\nSystem.out.println(\"截断复制: \" + Arrays.toString(numCopy1));\n\
  // 将 num 扩展复制为 6 个元素\nint[] numCopy2 = Arrays.copyOf(num, 6);\nSystem.out.println(\"\
  扩展复制: \" +  Arrays.toString(numCopy2));\n// 复制索引 2（包含）到 4（不包含）的范围\nint[] numCopy3\
  \ = Arrays.copyOfRange(num, 2, 4);\nSystem.out.println(\"范围复制: \" +  Arrays.toString(numCopy3));\n\
  原始数组: [2, 4, 3, 1]\n截断复制: [2, 4]\n扩展复制: [2, 4, 3, 1, 0, 0]\n范围复制: [3, 1]\n```\n\n\
  填充数组\n\n您可以使用 `fill()` 方法用相同的值填充数组的所有元素或某个范围内的元素。`setAll()` 方法允许您使用函数为数组中的所有元素设置值。该函数接收数组的索引，并返回该索引处元素的值。以下是使用这两种方法的示例：\n\
  \n\n```  \n// 创建一个数组以供操作  \nint[] num = {2, 4, 3, 1};  \nSystem.out.println(\"原始数组:\
  \ \" + Arrays.toString(num));  \n// 用 10 填充数组元素  \nArrays.fill(num, 10);  \nSystem.out.println(\"\
  用 10 填充后的数组: \" + Arrays.toString(num));  \n// 用函数值（索引 + 1）* 10 填充数组元素  \nArrays.setAll(num,\
  \ index -> (index + 1) * 10);  \nSystem.out.println(\"用函数填充后的数组: \" + Arrays.toString(num));\
  \  \n原始数组: [2, 4, 3, 1]  \n用 10 填充后的数组: [10, 10, 10, 10]  \n用函数填充后的数组: [10, 20,\
  \ 30, 40]  \n```  \n\n计算哈希码  \n\n使用 `hashCode()` 方法  \n根据数组元素的值计算数组的哈希码。如果传入的数组为\
  \ `null`，该方法  \n返回 0。对于任意两个数组 `a1` 和 `a2`，若 `Arrays.equals(a1, a2)` 成立，则 `Arrays.hashCode(a1)\
  \ == Arrays.hashCode(a2)` 也成立。以下是一个示例：  \n\n```  \n// 创建一个数组以供操作  \nint[] num =\
  \ {2, 4, 3, 1};  \nSystem.out.println(\"数组: \" + Arrays.toString(num));  \n// 计算数组的哈希码\
  \  \nint hashCode = Arrays.hashCode(num);  \nSystem.out.println(\"哈希码: \" + hashCode);\
  \  \n数组: [2, 4, 3, 1]  \n哈希码: 987041  \n```  \n\n执行并行累加  \n\n```  \nint[] num =\
  \ {2, 4, 3, 1};  \nSystem.out.println(\"之前: \" + Arrays.toString(num));  \nArrays.parallelPrefix(num,\
  \ (n1, n2) -> n1 * n2);  \nSystem.out.println(\"之后: \" + Arrays.toString(num));\
  \  \n之前: [2, 4, 3, 1]  \n之后: [2, 8, 24, 24]  \n```  \n\n排序数组  \n\n使用 `sort()`  \n\
  和 `parallelSort()`  \n方法对数组元素进行排序。前者适用于较小的  \n数组，后者适用于较大的数组。以下是一些示例：  \n\n```  \n\
  // 创建一个数组以供操作  \nint[] num1 = {2, 4, 3, 1};  \nSystem.out.println(\"原始数组: \" + Arrays.toString(num1));\
  \  \n// 对数组进行排序  \nArrays.sort(num1);  \nSystem.out.println(\"使用 sort(): \" + Arrays.toString(num1));\
  \  \n// 创建一个数组以供操作  \nint[] num2 = {2, 4, 3, 1};  \nSystem.out.println(\"原始数组: \"\
  \ + Arrays.toString(num2));  \n// 对数组进行排序  \nArrays.parallelSort(num2);  \nSystem.out.println(\"\
  使用 parallelSort(): \" + Arrays.toString(num2));  \n原始数组: [2, 4, 3, 1]  \n使用 sort():\
  \ [1, 2, 3, 4]  \n原始数组: [2, 4, 3, 1]  \n使用 parallelSort(): [1, 2, 3, 4]  \n``` \
  \ \n\n总结  \n\n数组是一种用于存储多个相同类型数据值的数据结构。所有数组元素在内存中分配连续的空间。  \n数组元素通过其索引进行访问。数组使用从零开始的索引。\
  \  \n第一个元素的索引为零。每个数组都有一个名为 `length` 的属性，  \n该属性包含数组中的元素数量。数组的长度可以为零。  \n\nJava 中的数组是对象。Java\
