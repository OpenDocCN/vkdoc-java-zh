  \ `\"First day of AUGUST, 2017 is on SATURDAY\"`。\n\n```\n    public static void\
  \ printFirstDayOfMonth(LocalDate ld) {\n    LocalDate newDate = ld.with(/* 在此处编写你的代码\
  \ */);\n    System.out.printf(\"First day of %s, %d is on %s%n\",\n    ld.getMonth(),\
  \ ld.getYear(), newDate.getDayOfWeek());\n    }\n    ```\n\n17. 格式化数据\n\n在本章中，你将学习：\n\
  \n*   如何格式化和解析日期与数字\n\n*   如何使用 `printf` 风格的格式化\n\n*   如何创建使用自定义格式化器的类\n\nJava 提供了丰富的\
  \ API 用于格式化数据。这些数据可能包括简单的值（如数字）或对象（如字符串、日期和其他类型的对象）。本章涵盖了 Java 中针对不同类型值的格式化选项。本章中的所有示例程序都属于\
  \ `jdojo.format` 模块，如清单 17-1 所示。\n\n```\n// module-info.java\nmodule jdojo.format\
  \ {\n    exports com.jdojo.format;\n}\n清单 17-1. jdojo.format 模块的声明\n```\n\n格式化日期\n\
  \nJava 8 提供了新的日期时间 API 来处理日期和时间，以及对其进行格式化和解析。日期时间 API 已在第 16 章中介绍。如果你正在编写与日期和时间相关的新代码，建议使用新的日期时间\
  \ API。本节是为需要处理使用 Java 8 之前旧日期格式化方式的遗留代码而提供的。\n\n在本节中，我将讨论如何格式化日期。我还将讨论如何解析字符串以创建日期对象。你可以使用预定义格式或自定义格式来格式化日期。Java\
  \ 库提供了两个类来格式化日期：\n\n*   `java.text.DateFormat`\n\n*   `java.text.SimpleDateFormat`\n\
  \n接下来的两节将向你展示如何使用预定义格式和自定义格式来格式化日期。\n\n使用预定义日期格式\n\n使用 `DateFormat` 类以预定义格式格式化日期。它是一个\
  \ `abstract` 类。由于该类是抽象的，因此不能使用 `new` 运算符创建该类的实例。你可以调用其 `getXxxInstance()` 方法之一（其中\
  \ `Xxx` 可以是 `Date`、`DateTime` 或 `Time`）来获取格式化器对象，或者直接调用 `getInstance()`。格式化后的文本取决于两个因素：样式和区域设置。使用\
  \ `DateFormat` 类的 `format()` 方法来格式化日期和时间。格式化样式决定了格式化文本中包含多少日期/时间信息，而区域设置则决定了所有信息片段如何组合在一起。`DateFormat`\
  \ 类定义了五种样式常量：\n\n*   `DateFormat.DEFAULT`\n\n*   `DateFormat.SHORT`\n\n*   `DateFormat.MEDIUM`\n\
  \n*   `DateFormat.LONG`\n\n*   `DateFormat.FULL`\n\n`DEFAULT` 格式与 `MEDIUM` 相同，除非你使用\
  \ `getInstance()`，此时默认值为 `SHORT`。表 17-1 显示了针对美国区域设置，同一日期以不同样式格式化后的结果。\n\n表 17-1.\
  \ 针对美国区域设置的预定义日期格式样式及格式化文本\n\n| 样式 | 格式化日期 |\n| --- | --- |\n| `DEFAULT` | `Mar\
  \ 27, 2003` |\n| `SHORT` | `3/27/03` |\n| `MEDIUM` | `Mar 27, 2003` |\n| `LONG`\
  \ | `March 27, 2003` |\n| `FULL` | `Thursday, March 27, 2003` |\n\n`java.util.Locale`\
  \ 类包含一些常见区域设置的常量。例如，你可以使用 `Locale.FRANCE` 表示语言为 `\"fr\"`、国家代码为 `\"FR\"` 的区域设置。或者，你可以像这样为法国创建一个\
  \ `Locale` 对象：\n\n```\nLocale french FranceLocale = new Locale(\"fr\", \"FR\") ;\n\
  ```\n\n要创建一个 `Locale`，如果 `Locale` 类没有为该国家声明常量，你需要使用两个字母的小写语言代码和两个字母的大写国家代码。语言代码和国家代码已列在\
  \ ISO-639 代码和 ISO-3166 代码中。更多创建区域设置的示例如下：\n\n```\nLocale hindiIndiaLocale = new\
  \ Locale(\"hi\", \"IN\");\nLocale bengaliIndiaLocale = new Locale(\"bn\", \"IN\"\
  );\nLocale thaiThailandLocale = new Locale(\"th\", \"TH\");\n```\n\n提示\n\n使用 `Locale.getDefault()`\
  \ 方法获取系统的默认 `Locale`。\n\n以下代码片段以长格式打印当前日期，区域设置为美国：\n\n```\nDate today = new Date();\n\
  DateFormat formatter = DateFormat.getDateInstance(DateFormat.LONG, Locale.US);\n\
  String formattedDate = formatter.format(today);\nSystem.out.println(formattedDate);\n\
  ```\n\n```\nAugust 6, 2017\n```\n\n清单 17-2 中列出的程序以短格式和中格式显示日期，区域设置分别为默认（对于运行此示例的\
  \ JVM 来说是美国）、法国和德国。该程序打印当前日期。当你运行此程序时，它将打印同一日期的不同格式。由于程序打印的是当前日期，你可能会得到不同的输出。\n\n\
  ```\n// PredefinedDateFormats.java\npackage com.jdojo.format;\nimport java.text.DateFormat;\n\
  import java.util.Date;\nimport java.util.Locale;\npublic class PredefinedDateFormats\
  \ {\npublic static void main(String[] args) {\n// 获取当前日期\nDate today = new Date();\n\
  // 以默认区域设置格式打印日期\nLocale defaultLocale = Locale.getDefault();\nprintLocaleDetails(defaultLocale);\n\
  printDate(defaultLocale, today);\n// 以法语（法国）格式打印日期\nprintLocaleDetails(Locale.FRANCE);\n\
  printDate(Locale.FRANCE, today);\n// 以德语（德国）格式打印日期。你也可以使用 Locale.GERMANY\n// 而不是\
  \ new Locale (\"de\", \"DE\")。\nLocale germanLocale = new Locale(\"de\", \"DE\"\
  );\nprintLocaleDetails(germanLocale);\nprintDate(germanLocale, today);\n}\npublic\
  \ static void printLocaleDetails(Locale locale) {\nString languageCode = locale.getLanguage();\n\
  String languageName = locale.getDisplayLanguage();\nString countryCode = locale.getCountry();\n\
  String countryName = locale.getDisplayCountry();\n// 打印区域设置信息\nSystem.out.println(\"\
  Language: \" + languageName + \"(\"\n+ languageCode + \"); \"\n+ \"Country: \" +\
  \ countryName\n+ \"(\" + countryCode + \")\");\n}\npublic static void printDate(Locale\
  \ locale, Date date) {\n// 以 SHORT 样式格式化并打印日期\nDateFormat formatter = DateFormat.getDateInstance(DateFormat.SHORT,\
  \ locale);\nString formattedDate = formatter.format(date);\nSystem.out.println(\"\
  SHORT: \" + formattedDate);\n// 以 MEDIUM 样式格式化并打印日期\nformatter = DateFormat.getDateInstance(DateFormat.MEDIUM,\
  \ locale);\nformattedDate = formatter.format(date);\nSystem.out.println(\"MEDIUM:\
  \ \" + formattedDate);\n// 最后打印一个空行\nSystem.out.println();\n}\n}\n清单 17-2. 使用预定义日期格式\n\
  ```\n\n```\nLanguage: English(en); Country: United States(US)\nSHORT: 1/24/14\n\
  MEDIUM: Jan 24, 2014\nLanguage: French(fr); Country: France(FR)\nSHORT: 24/01/14\n\
  MEDIUM: 24 janv. 2014\nLanguage: German(de); Country: Germany(DE)\nSHORT: 24.01.14\n\
  MEDIUM: 24.01.2014\n```\n\n使用自定义日期格式\n\n\n\n如果您想使用自定义日期格式，请使用 `SimpleDateFormat`\
  \ 类。使用 `SimpleDateFormat` 类进行格式化是**区域敏感**的。其默认构造方法会使用默认区域设置和该区域的默认日期格式来创建一个格式化器。您可以使用其他构造方法创建格式化器，在其中指定自己的日期格式和区域设置。一旦拥有了\
  \ `SimpleDateFormat` 类的对象，就可以调用其 `format()` 方法来格式化日期。如果您想更改后续格式化的日期格式，可以使用 `applyPattern()`\
  \ 方法，并将新的日期格式（或模式）作为参数传入。以下代码片段展示了如何使用 `SimpleDateFormat` 类格式化日期：\n\n```\n// 使用模式\
  \ dd/MM/yyyy 创建一个格式化器。\nSimpleDateFormat simpleFormatter = new SimpleDateFormat(\"\
  dd/MM/yyyy\");\n// 获取当前日期\nDate today = new Date();\n// 格式化当前日期\nString formattedDate\
  \ = simpleFormatter.format(today);\n// 打印日期\nSystem.out.println(\"Today is (dd/MM/yyyy):\
  \ \" + formattedDate);\n// 更改日期格式。现在月份将完整拼写。\nsimpleFormatter.applyPattern(\"MMMM\
  \ dd, yyyy\");\n// 格式化当前日期\nformattedDate = simpleFormatter.format(today);\n// 打印日期\n\
  System.out.println(\"Today is (MMMM dd, yyyy): \" + formattedDate);\n```\n\n```\n\
  Today is (dd/MM/yyyy): 06/08/2017\nToday is (MMMM dd, yyyy): August 06, 2017\n```\n\
  \n请注意，当您在计算机上运行此代码时，输出会有所不同。它将使用默认区域设置以这种格式打印当前日期。之前的输出是在美国区域设置下的结果。\n\n用于创建日期和时间格式模式的字母及其含义列于表\
  \ 17-2 中。示例中显示的待格式化日期为 1996 年 7 月 10 日下午 12:30:55。\n\n表 17-2.\n\n日期和时间格式化符号列表\n\n\
  | 字母 | 日期或时间组件 | 表示形式 | 示例 |\n| --- | --- | --- | --- |\n| G | 纪元指示符 | 文本 | AD |\n\
  | y | 年份 | 年份 | 2003; 03 |\n| Y | 基于周的年份 | 年份 | 2003; 03 |\n| M | 年中的月份 | 月份 | March;\
  \ Mar; 03 |\n| w | 年中的周数 | 数字 | |\n| W | 月中的周数 | 数字 | |\n| D | 年中的天数 | 数字 | |\n\
  | d | 月中的天数 | 数字 | |\n| F | 月中的星期几 | 数字 | |\n| E | 星期几 | 文本 | Tuesday; Tue |\n|\
  \ a | 上午/下午标记 | 文本 | PM |\n| H | 一天中的小时 (0-23) | 数字 | |\n| k | 一天中的小时 (1-24) | 数字\
  \ | |\n| K | 上午/下午中的小时 (0-11) | 数字 | |\n| h | 上午/下午中的小时 (1-12) | 数字 | |\n| m | 小时中的分钟\
  \ | 数字 | |\n| s | 分钟中的秒 | 数字 | |\n| S | 毫秒 | 数字 | |\n| z | 时区 | 通用时区 | Pacific Standard\
  \ Time; PST; GMT-08:00 |\n| Z | 时区 | RFC 822 时区 | |\n\n您可以在格式化的日期中嵌入字面量。假设您的出生日期（1969\
  \ 年 9 月 19 日）存储在一个日期对象中，现在您想将其打印为“I was born on the Day 19 of the month September\
  \ in 1969”。消息中的某些部分来自出生日期，其他部分是字面量，这些字面量旨在按原样出现在消息中。您不能使用字母（如 a-z 和 A-Z）作为日期模式中的字面量。您需要将它们放在单引号内，以将其视为字面量，而不是格式化模式的一部分。首先，您需要一个\
  \ `Date` 对象来表示 1969 年 9 月 19 日。`Date` 类接受年、月、日的构造方法已被弃用。让我们从 `GregorianCalendar`\
  \ 类开始，并使用其 `getTime()` 方法来获取一个 `Date` 对象。以下代码片段打印了这条消息：\n\n```\n// 创建一个以 1969 年\
  \ 9 月 19 日为日期的 GregorianCalendar 对象\nGregorianCalendar gc = new GregorianCalendar(1969,\
  \ Calendar.SEPTEMBER,19);\n// 获取一个 Date 对象\nDate birthDate = gc.getTime();\n// 创建模式。必须将字面量放在单引号内\n\
  String pattern = \"'I was born on the day' dd 'of the month' MMMM 'in' yyyy\";\n\
  // 使用该模式创建一个 SimpleDateFormat\nSimpleDateFormat simpleFormatter = new SimpleDateFormat(pattern);\n\
  // 格式化并打印日期\nSystem.out.println(simpleFormatter.format(birthDate));\n```\n\n```\n\
  I was born on the Day 19 of the month September in 1969\n```\n\n解析日期\n\n在前面的章节中，您已经将日期对象转换为格式化的文本。现在让我们看看如何将文本转换为\
  \ `Date` 对象。这可以通过使用 `SimpleDateFormat` 类的 `parse()` 方法来实现。`parse()` 方法的签名如下：\n\n\
  ```\nDate parse(String text, ParsePosition startPos)\n```\n\n该方法接受两个参数。第一个参数是您想要从中提取日期的文本。第二个参数是文本中您想要开始解析的字符起始位置。文本中可以嵌入日期部分。例如，您可以从文本“First\
  \ date is 01/01/1995 and second one is 12/12/2001”中提取两个日期。由于解析器不知道文本中日期从何处开始，您需要使用\
  \ `ParsePosition` 对象来告知它。它只是跟踪解析位置。`ParsePosition` 类只有一个构造方法，它接受一个 `int` 值，即解析开始的位置。在\
  \ `parse()` 方法成功之后，`ParsePosition` 对象的索引会被设置为所使用的日期文本最后一个字符的索引加一。请注意，该方法不会使用作为其第一个参数传递的所有文本。它只使用创建日期对象所需的文本。\n\
  \n让我们从一个简单的例子开始。假设您有一个字符串 `\"09/19/1969\"`，它表示日期 1969 年 9 月 19 日。您想从这个字符串中获取一个 `Date`\
  \ 对象。以下代码片段说明了步骤：\n\n```\n// 要解析的文本\nString text = \"09/19/1969\";\n// 为日期文本 \"\
  09/19/1969\" 创建一个模式\nString pattern = \"MM/dd/yyyy\";\n// 创建一个 SimpleDateFormat\
  \ 对象来表示此模式\nSimpleDateFormat simpleFormatter = new SimpleDateFormat(pattern);\n\
  // 由于文本 \"09/19/1969\" 中的日期部分从索引零开始，\n// 我们创建一个值为零的 ParsePosition 对象\nParsePosition\
  \ startPos = new ParsePosition(0);\n// 解析文本\nDate parsedDate = simpleFormatter.parse(text,\
  \ startPos);\n// 这里，parsedDate 将包含日期 1969 年 9 月 19 日，并且 startPos 的当前索引\n// 将被设置为\
  \ 10，您可以通过调用 startPos.getIndex() 方法获取该值。\n```\n\n让我们解析更复杂的文本。如果前一个示例中的文本是 `\"09/19/1969\
  \ Junk\"`，您会得到相同的结果，因为在读取 1969 之后，解析器将不再查看文本中的任何其他字符。假设您有文本 `\"XX01/01/1999XX12/31/2000XX\"\
  `。文本中嵌入了两个日期。您将如何解析这两个日期？第一个日期的文本从索引 2 开始（前两个 X 的索引为 0 和 1）。一旦第一个日期文本解析完成，`ParsePosition`\
  \ 对象将指向文本中的第三个 X。您只需将其索引增加 2，使其指向第二个日期文本的第一个字符。以下代码片段说明了步骤：\n\n\n\n```\n// 待解析的文本\n\
  String text = \"XX01/01/1999XX12/31/2000XX\";\n// 为日期文本 \"09/19/1969\" 创建模式\nString\
  \ pattern = \"MM/dd/yyyy\";\n// 创建一个 SimpleDateFormat 对象来表示该模式\nSimpleDateFormat\
  \ simpleFormatter = new SimpleDateFormat(pattern);\n// 将起始索引设置为 2\nParsePosition\
  \ startPos = new ParsePosition(2);\n// 解析文本以获取第一个日期（1999 年 1 月 1 日）\nDate firstDate\
  \ = simpleFormatter.parse(text, startPos);\n// 现在，startPos 的索引已设置为第一个解析日期最后一个字符之后的位置。\n\
  // 要将其索引设置为下一个日期，请将其索引增加 2。\nint currentIndex = startPos.getIndex();\nstartPos.setIndex(currentIndex\
  \ + 2);\n// 解析文本以获取第二个日期（2000 年 12 月 31 日）\nDate secondDate = simpleFormatter.parse(text,\
  \ startPos);\n```\n\n编写一个程序，从文本 \"I was born on the day 19 of the month September\
  \ in 1969\" 中提取日期并存入 `Date` 对象，这留给读者作为练习。提取的日期应为 1969 年 9 月 19 日。（提示：在之前处理日期对象格式化的示例中，你已经有了该文本的模式。）\n\
  \n以下是另一个解析包含日期和时间的文本的示例。假设你有文本 `\"2003-04-03 09:10:40.325\"`，它表示一个格式为 年-月-日 `时:分:秒.毫秒`\
  \ 的时间戳。你想要获取该时间戳的时间部分。清单 17-3 展示了如何从该文本中获取时间部分。\n\n```\n// ParseTimeStamp.java\n\
  package com.jdojo.format;\nimport java.util.Date;\nimport java.util.Calendar;\n\
  import java.text.ParsePosition;\nimport java.text.SimpleDateFormat;\npublic class\
  \ ParseTimeStamp {\npublic static void main(String[] args){\nString input = \"2003-04-03\
  \ 09:10:40.325\";\n// 准备模式\nString pattern = \"yyyy-MM-dd HH:mm:ss.SSS\" ;\nSimpleDateFormat\
  \ sdf = new SimpleDateFormat(pattern);\n// 将文本解析为 Date 对象\nDate dt = sdf.parse(input,\
  \ new ParsePosition(0));\nSystem.out.println(dt);\n// 获取 Calendar 实例\nCalendar cal\
  \ = Calendar.getInstance();\n// 设置时间\ncal.setTime(dt);\n// 打印时间部分\nSystem.out.println(\"\
  小时:\" + cal.get(Calendar.HOUR));\nSystem.out.println(\"分钟:\" + cal.get(Calendar.MINUTE));\n\
  System.out.println(\"秒:\" + cal.get(Calendar.SECOND));\nSystem.out.println(\"毫秒:\"\
  \ + cal.get(Calendar.MILLISECOND));\n}\n}\n清单 17-3.\n解析时间戳以获取其时间部分\n```\n\n```\n\
  Thu Apr 03 09:10:40 CST 2003\n小时:9\n分钟:10\n秒:40\n毫秒:325\n```\n\n格式化数字\n\n在本节中，我将讨论如何格式化数字。我还将讨论如何解析字符串以创建\
  \ `Number` 对象。以下两个类可用于格式化和解析数字：\n\n*   `java.text.NumberFormat`\n\n*   `java.text.DecimalFormat`\n\
  \n`NumberFormat` 类用于以特定区域设置的预定义格式格式化数字。`DecimalFormat` 类用于以特定区域设置中你选择的格式格式化数字。\n\
  \n使用预定义的数字格式\n\n你可以使用 `NumberFormat` 类的 `getXxxInstance()` 方法来获取格式化器对象的实例，其中 `Xxx`\
  \ 可以替换为 `Number`、`Currency`、`Integer` 或 `Percent`，或者直接使用 `getInstance()`。这些方法已被重载。如果调用时不带任何参数，它们会返回默认区域设置的格式化器对象。调用\
  \ `format()` 方法，并将数字作为参数传递，即可将格式化后的数字作为字符串返回。以下代码片段展示了如何为不同区域设置获取不同类型的数字格式化器。它还展示了如何使用美国区域设置的货币格式化器来格式化薪水。\n\
  \n```\n// 获取默认区域设置的数字格式化器\nNumberFormat defaultFormatter = NumberFormat.getNumberInstance();\n\
  // 获取法语（法国）区域设置的数字格式化器\nNumberFormat frenchFormatter = NumberFormat.getNumberInstance(Locale.FRENCH);\n\
  // 获取美国区域设置的货币格式化器\nNumberFormat usCurrencyFormatter = NumberFormat.getCurrencyInstance(Locale.US);\n\
  double salary = 12590.90;\nString str = usCurrencyFormatter.format(salary);\nSystem.out.println(\"\
  美国货币格式的薪水: \" + str);\n```\n\n```\n美国货币格式的薪水: $12,590.90\n```\n\n清单 17-4 演示了如何以当前区域设置（本例中默认区域设置为美国）和印度区域设置的默认格式格式化数字。\n\
  \n```\n// DefaultNumberFormatters.java\npackage com.jdojo.format;\nimport java.util.Locale;\n\
  import java.text.NumberFormat;\npublic class DefaultNumberFormatters {\npublic static\
  \ void main(String[] args){\ndouble value = 1566789.785 ;\n// 默认区域设置\nprintFormatted(Locale.getDefault(),\
  \ value);\n// 印度区域设置\n// （卢比是印度货币。简写为 Rs.）\nLocale indianLocale = new Locale(\"\
  en\", \"IN\");\nprintFormatted(indianLocale, value);\n}\npublic static void printFormatted(Locale\
  \ locale, double value) {\n// 获取数字和货币格式化器\nNumberFormat nf = NumberFormat.getInstance(locale);\n\
  NumberFormat cf = NumberFormat.getCurrencyInstance(locale);\nSystem.out.println(\"\
  格式化值: \" + value + \" 区域设置: \" + locale);\nSystem.out.println(\"数字: \"   + nf.format(value));\n\
  System.out.println(\"货币: \" + cf.format(value));\n}\n}\n清单 17-4.\n使用默认格式格式化数字\n\
  ```\n\n```\n格式化值: 1566789.785 区域设置: en_US\n数字: 1,566,789.785\n货币: $1,566,789.78\n\
  格式化值: 1566789.785 区域设置: en_IN\n数字: 1,566,789.785\n货币: Rs. 1,566,789.78\n```\n\n\
  使用自定义数字格式\n\n要执行更高级的格式化，你可以使用 `DecimalFormat` 类。它允许你提供自己的格式模式。一旦创建了 `DecimalFormat`\
  \ 类的对象，你就可以使用其 `applyPattern()` 方法更改格式模式。你可以为正数和负数指定不同的模式。两种模式之间用分号分隔。\n\n`DecimalFormat`\
  \ 类在格式化数字时使用四舍五入到偶数的舍入模式。例如，如果你在数字格式中只指定了小数点后两位，12.745 将舍入为 12.74，因为 5 位于中间且 4 是偶数；12.735\
  \ 也将舍入为 12.74，因为 5 位于中间且第二位最近的偶数是 4；而 12.746 将舍入为 12.75。清单 17-5 演示了 `DecimalFormat`\
  \ 类的使用。\n\n```\n// DecimalFormatter.java\npackage com.jdojo.format;\nimport java.text.DecimalFormat;\n\
  public class DecimalFormatter {\nprivate static DecimalFormat formatter = new DecimalFormat();\n\
  public static void main(String[] args) {\nformatNumber(\"##.##\", 12.745);\nformatNumber(\"\
  ##.##\", 12.746);\nformatNumber(\"0000.0000\", 12.735);\nformatNumber(\"#.##\",\
  \ -12.735);\n// 正数和负数格式\nformatNumber(\"#.##;(#.##)\", 12.735);\nformatNumber(\"\
  #.##;(#.##)\", -12.735);\n}\npublic static void formatNumber(String pattern, double\
  \ value) {\n// 应用模式\nformatter.applyPattern(pattern);\n// 格式化数字\nString formattedNumber\
  \ = formatter.format(value);\nSystem.out.println(\"数字: \" + value + \", 模式: \"\n\
  + pattern + \", 格式化后的数字: \"\n+ formattedNumber);\n}\n}\n清单 17-5.\n格式化数字\n```\n\n\
  ```\n数字: 12.745, 模式: ##.##, 格式化后的数字: 12.74\n数字: 12.746, 模式: ##.##, 格式化后的数字: 12.75\n\
  数字: 12.735, 模式: 0000.0000, 格式化后的数字: 0012.7350\n数字: -12.735, 模式: #.##, 格式化后的数字: -12.73\n\
  数字: 12.735, 模式: #.##;(#.##), 格式化后的数字: 12.73\n数字: -12.735, 模式: #.##;(#.##), 格式化后的数字:\
  \ (12.73)\n```\n\n解析数字\n\n\n\n你也可以使用`DecimalFormat`类的`parse()`方法将字符串解析为数字。`parse()`方法返回一个`java.lang.Number`类的对象。你可以使用`xxxValue()`方法来获取原始值，其中`xxx`可以是`byte`、`double`、`float`、`int`、`long`和`short`。\n\
  \n清单 17-6 演示了如何使用`DecimalFormat`类解析数字。请注意，你也可以使用`java.lang.Double`类的`parseDouble()`方法将字符串解析为`double`值。但是，该字符串必须采用默认的数字格式。使用`DecimalFormat`类的`parse()`方法的优势在于，字符串可以采用任何格式。\n\
  \n```\n// ParseNumber.java\npackage com.jdojo.format;\nimport java.text.DecimalFormat;\n\
  import java.text.ParsePosition;\npublic class ParseNumber {\npublic static void\
  \ main(String[] args) {\n// 将字符串解析为十进制数字\nString str = \"XY4,123.983\";\nString\
  \ pattern = \"#,###.###\";\nDecimalFormat formatter = new DecimalFormat(pattern);\n\
  // 创建一个 ParsePosition 对象来指定字符串中数字的第一位\n// 在 \"XY4,123.983\" 中，数字第一位是 4，索引为 2。\n\
  ParsePosition pos = new ParsePosition(2);\nNumber numberObject = formatter.parse(str,\
  \ pos);\ndouble value = numberObject.doubleValue();\nSystem.out.println(\"解析后的值是\
  \ \" + value);\n}\n}\n清单 17-6.\n解析数字\n```\n\n```\n解析后的值是 4123.983\n```\n\nprintf\
  \ 风格格式化\n\n在本节中，我将讨论如何使用类似于 C 语言中 `printf()` 函数所支持的 `printf` 风格格式化来格式化对象和值。首先介绍\
  \ Java 中 `printf` 风格格式化支持的一般概念，然后详细介绍所有类型值的格式化细节。\n\n总体概览\n\n`java.util.Formatter`\
  \ 类支持 `printf` 风格格式化，这与 C 编程语言中 `printf()` 函数所支持的格式化类似。如果你熟悉 C、C++ 和 C#，那么理解本节内容会更容易。在本节中，你将在代码中使用诸如\
  \ `\"%1$s\"`、`\"%1$4d\"` 等格式化字符串，而不会对其含义进行完整解释。你可能无法完全理解它们；现在请先忽略这些细节。只需关注输出结果，并尝试从宏观上理解\
  \ `Formatter` 类旨在完成什么任务，而不是试图理解细节。我将在下一节讨论细节。让我们从清单 17-7 中所示的一个简单示例开始。你可能会得到略有不同的输出。\n\
  \n```\n// PrintfTest.java\npackage com.jdojo.format;\nimport java.util.Date;\npublic\
  \ class PrintfTest {\npublic static void main(String[] args) {\n// 格式化字符串\nSystem.out.printf(\"\
  %1$s, %2$s, and %3$s %n\", \"Fu\", \"Hu\", \"Lo\");\nSystem.out.printf(\"%3$s, %2$s,\
  \ and %1$s %n\", \"Fu\", \"Hu\", \"Lo\");\n// 格式化数字\nSystem.out.printf(\"%1$4d,\
  \ %2$4d, %3$4d %n\", 1, 10, 100);\nSystem.out.printf(\"%1$4d, %2$4d, %3$4d %n\"\
  , 10, 100, 1000);\nSystem.out.printf(\"%1$-4d, %2$-4d, %3$-4d %n\", 1, 10, 100);\n\
  System.out.printf(\"%1$-4d, %2$-4d, %3$-4d %n\", 10, 100, 1000);\n// 格式化日期和时间\n\
  Date dt = new Date();\nSystem.out.printf(\"今天是 %tD %n\", dt);\nSystem.out.printf(\"\
  今天是 %tF %n\", dt);\nSystem.out.printf(\"今天是 %tc %n\", dt);\n}\n}\n清单 17-7.\n在 Java\
  \ 中使用 C 语言的 printf 风格格式化\n```\n\n```\nFu, Hu, and Lo\nLo, Hu, and Fu\n1,   10, \
  \ 100\n10,  100, 1000\n1   , 10  , 100\n10  , 100, 1000\n今天是 08/06/17\n今天是 2017-08-06\n\
  今天是 Sun Aug 06 10:29:03 CDT 2017\n```\n\n你一直在使用 `System.out.println()` 和 `System.out.print()`\
  \ 方法在标准输出上打印文本。实际上，`System.out` 是 `java.io.PrintStream` 类的一个实例，该类拥有 `println()`\
  \ 和 `print()` 实例方法。`PrintStream` 类还包含另外两个方法：`format()` 和 `printf()`，它们可用于将格式化输出写入\
  \ `PrintStream` 实例。这两个方法的工作方式相同。清单 17-5 使用了 `System.out.printf()` 方法将格式化文本打印到标准输出。\n\
  \n`String` 类包含一个静态方法 `format()`，它返回一个格式化后的字符串。`PrintStream` 类的 `format()`/`printf()`\
  \ 方法与 `String` 类的 `format()` 静态方法的格式化行为是相同的。它们之间的唯一区别在于，`PrintStream` 类中的 `format()`\
  \ 和 `printf()` 方法将格式化输出写入输出流，而 `String` 类的 `format()` 方法则将格式化输出作为 `String` 返回。\n\
  \n`PrintStream` 类的 `format()` 和 `printf()` 方法以及 `String` 类的 `format()` 方法都是便捷方法。它们的存在是为了简化文本格式化。然而，真正完成实际工作的是\
  \ `Formatter` 类。让我们详细讨论一下 `Formatter` 类。在示例中，你将使用这些便捷方法。`Formatter` 用于格式化文本。格式化后的文本可以写入以下目标：\n\
  \n*   一个 `Appendable`（例如，`StringBuffer`、`StringBuilder`、`Writer` 等）\n*   一个 `File`\n\
  *   一个 `OutputStream`\n*   一个 `PrintStream`\n\n下面的代码片段实现了与清单 17-7 中代码相同的功能。这次，你使用一个\
  \ `Formatter` 对象来格式化数据。当你调用 `Formatter` 对象的 `format()` 方法时，格式化后的文本会存储在你传递给 `Formatter`\
  \ 对象构造函数的 `StringBuilder` 对象中。当你完成所有文本的格式化后，调用 `StringBuilder` 的 `toString()` 方法即可获取整个格式化后的文本。\n\
  \n```\n// 为格式化输出创建一个 Appendable 数据存储\nStringBuilder sb = new StringBuilder();\n\
  // 创建一个 Formatter，将其输出存储到 StringBuffer 中\nFormatter fm = new Formatter(sb);\n//\
  \ 格式化字符串\nfm.format(\"%1$s, %2$s, and %3$s %n\", \"Fu\", \"Hu\", \"Lo\");\nfm.format(\"\
  %3$s, %2$s, and %1$s %n\", \"Fu\", \"Hu\", \"Lo\");\n// 格式化数字\nfm.format(\"%1$4d,\
  \ %2$4d, %3$4d %n\", 1, 10, 100);\nfm.format(\"%1$4d, %2$4d, %3$4d %n\", 10, 100,\
  \ 1000);\nfm.format(\"%1$-4d, %2$-4d, %3$-4d %n\", 1, 10, 100);\nfm.format(\"%1$-4d,\
  \ %2$-4d, %3$-4d %n\", 10, 100, 1000);\n// 格式化日期和时间\nDate dt = new Date();\nfm.format(\"\
  今天是 %tD %n\", dt);\nfm.format(\"今天是 %tF %n\", dt);\nfm.format(\"今天是 %tc %n\", dt);\n\
  // 显示整个格式化后的字符串\nSystem.out.println(sb.toString() );\n```\n\n如果你想将所有格式化文本写入文件，可以使用以下代码片段。你需要处理\
  \ `FileNotFoundException`，如果指定的文件不存在，`Formatter` 类的构造函数可能会抛出此异常。当你使用完 `Formatter`\
  \ 对象后，需要调用其 `close()` 方法来关闭输出文件。请注意示例代码中使用了 `try-with-resources` 块，这样格式化器会自动关闭。\n\
  \n```\nimport java.io.File;\nimport java.io.FileNotFoundException;\nimport java.util.Formatter;\n\
  ...\n// 创建一个 Formatter，将输出写入文件 C:\\kishori\\xyz.txt\ntry (Formatter fm = new Formatter(new\
  \ File(\"C:\\\\kishori\\\\xyz.txt\"))) {\n// 格式化字符串\nfm.format(\"%1$s, %2$s, and\
  \ %3$s %n\", \"Fu\", \"Hu\", \"Lo\");\nfm.format(\"%3$s, %2$s, and %1$s %n\", \"\
  Fu\", \"Hu\", \"Lo\");\n} catch (FileNotFoundException e) {\ne.printStackTrace();\n\
  }\n```\n\n`Formatter` 类的 `format()` 方法已被重载。其声明如下。\n\n\n\n*   `Formatter format(String\
  \ format, Object... args)`\n\n*   `Formatter format(Locale l, String format, Object...\
  \ args)`\n\n`format()` 方法的第一个版本使用默认区域设置进行格式化。第二个版本允许您指定一个区域设置。`PrintStream` 类的 `format()`/`printf()`\
  \ 方法和 `String` 类的 `format()` 方法提供了 `format()` 方法的相同两个版本，它们接受相同类型的参数。此处对 `Formatter`\
  \ 类的 `format()` 方法的讨论同样适用于 `PrintStream` 和 `String` 类中的这些便捷方法。\n\n`Formatter` 类在适用时始终使用特定于区域设置的格式。例如，如果您想格式化一个十进制数，比如\
  \ 12.89，在法国该数字会被格式化为 12,89（注意 12 和 89 之间有一个逗号），而在美国则会被格式化为 12.89（注意 12 和 89 之间有一个点）。`format()`\
  \ 方法的 locale 参数用于以特定于区域设置的格式格式化文本。以下代码片段演示了特定于区域设置格式化的效果。请注意，对于相同的输入值，美国和法国的格式化输出存在差异。\n\
  \n```\nSystem.out.printf(Locale.US, \"In US: %1$.2f %n\", 12.89);\nSystem.out.printf(Locale.FRANCE,\
  \ \"In France: %1$.2f %n\", 12.89);\nDate dt = new Date();\nSystem.out.printf(Locale.US,\
  \ \"In US: %tA %n\", dt);\nSystem.out.printf(Locale.FRANCE, \"In France: %tA %n\"\
  , dt);\n```\n\n```\nIn US: 12.89\nIn France: 12,89\nIn US: Friday\nIn France: vendredi\n\
  ```\n\n详细信息\n\n使用 `Formatter` 格式化数据需要两种类型的输入：\n\n*   一个格式字符串\n\n*   一个值列表\n\n格式字符串是定义输出外观的模板。它包含零个或多个固定文本以及零个或多个嵌入的格式说明符。固定文本不应用任何格式化。格式说明符有两个用途。它在格式字符串中充当格式化数据的占位符，并指定数据的格式化方式。\n\
  \n让我们考虑以下示例。假设您想打印包含某人生日的文本。以下是此类文本的一个示例：\n\n```\nJanuary 16, 1970 is John's birth\
  \ day.\n```\n\n注意\n\n除非另有说明，本节中的所有输出均使用美国区域设置。\n\n前面的文本包含固定文本和格式化文本。固定文本应原样出现在输出中。格式化文本将取决于输入。您可以将前面的文本转换为如下所示的模板：\n\
  \n```\n,  is 's birth day.\n```\n\n您已将可能变化的文本替换为用尖括号括起来的占位符，例如 `<month>`、`<day>`\
  \ 等。您需要四个输入值（月、日、年和姓名）来使用前面的模板获取格式化文本。例如，如果您分别为 `<month>`、`<day>`、`<year>` 和 `<name>`\
  \ 提供值 `\"January\"`、`\"16\"`、`\"1970\"` 和 `\"John\"`，该模板将生成：\n\n```\nJanuary 16,\
  \ 1970 is John's birth day.\n```\n\n在此示例中，您只是将模板中的占位符替换为实际值。您没有对实际值执行任何格式化。`Formatter`\
  \ 类提供的格式化以类似的方式工作。在此示例中我们称之为占位符的东西，被称为格式说明符。在此示例中我们称之为模板的东西，被称为格式字符串。\n\n格式说明符始终以百分号（`%`）开头。您可以将模板转换为格式字符串，该字符串可以与\
  \ `Formatter` 类一起使用，如下所示：\n\n```\n%1$tB %1$td, %1$tY is %2$s's birth day.\n```\n\
  \n在此格式字符串中，\"`%1$tB\"`、`\"%1$td\"`、`\"%1$tY\"` 和 `%2$s\"` 是四个格式说明符，而 `\" \"`、`\"\
  , \"`、`\"is \"` 和 \"`'s birth day.\"` 是固定文本。\n\n以下代码片段使用此格式字符串打印格式化文本。请注意，`dob`\
  \ 和 `\"John\"` 是格式字符串的输入值。在此例中，输入值 `dob` 是包含生日的 `LocalDate` 类的一个实例。\n\n```\nLocalDate\
  \ dob = LocalDate.of(1970, Month.JANUARY, 16);\nSystem.out.printf(\"%1$tB %1$td,\
  \ %1$tY is %2$s's birth day.\", dob, \"John\");\n```\n\n```\nJanuary 16, 1970 is\
  \ John's birth day.\n```\n\n格式说明符的通用语法如下：\n\n```\n%\n```\n\n除了 `%` 和 `<conversion>`\
  \ 部分外，所有其他部分都是可选的。请注意，格式说明符的任何两个部分之间都没有空格。`%`（百分号）表示格式字符串内格式说明符的开始。如果您想在格式字符串内将\
  \ `%` 指定为固定文本的一部分，则需要使用两个连续的 `%`，即 `%%`。\n\n`<argument-index$>` 表示格式说明符所引用的参数的索引。它由一个以\
  \ 10 为基数的整数后跟一个 `$`（美元符号）组成。第一个参数被引用为 `1$`，第二个为 `2$`，依此类推。您可以在同一个格式字符串内的不同格式说明符中多次引用同一个参数。\n\
  \n`<flags>` 表示输出的格式。它是一组字符。`<flags>` 的有效值取决于格式说明符所引用的参数的数据类型。\n\n`<width>` 表示需要写入输出的最小字符数。\n\
  \n通常，`<.precision>` 表示要写入输出的最大字符数。但是，其确切含义因 `<conversion>` 的值而异。它是一个十进制数。它以点（`.`）开头。\n\
  \n`<conversion>` 表示输出的格式化方式。其值取决于格式说明符所引用的参数的数据类型。它是必需的。\n\n有两个特殊的格式说明符：`%%` 和 `%n`。`%%`\
  \ 格式说明符输出 `%`（一个百分号），而 `%n` 输出一个特定于平台的换行符。以下代码片段演示了这两个特殊格式说明符的用法：\n\n```\nSystem.out.printf(\"\
  Interest rate is 10%%.%nJohn%nDonna\");\n```\n\n```\nInterest rate is 10%.\nJohn\n\
  Donna\n\n```\n\n您没有在代码中向 `printf()` 方法提供任何参数，因为这两个特殊的格式说明符不对任何参数进行操作。请注意输出中的两个换行符，它们是由格式字符串中的两个\
  \ `%n` 格式说明符生成的。\n\n在格式说明符内引用参数\n\n我还没有介绍格式说明符的转换部分。对于本节中的讨论，我使用 `s` 作为格式说明符的转换字符。`s`\
  \ 转换将其参数格式化为字符串。在其最简单的形式中，您可以使用 `%s` 作为格式说明符。让我们考虑以下代码片段及其输出：\n\n```\nSystem.out.printf(\"\
  %s, %s, and %s\", \"Ken\", \"Lola\", \"Matt\");\n```\n\n```\nKen, Lola, and Matt\n\
  ```\n\n格式字符串中的格式说明符可以通过三种方式引用参数：\n\n*   普通索引\n\n*   显式索引\n\n*   相对索引\n\n普通索引\n\n\
  当格式说明符未指定参数索引值（如 `%s`）时，称为普通索引。在普通索引中，参数索引由格式说明符在格式字符串中的索引决定。第一个没有参数索引的格式说明符的索引为\
  \ 1，第二个的索引为 2，依此类推。索引为 1 的格式说明符引用第一个参数；索引为 2 的格式说明符引用第二个参数；依此类推。图 17-1 显示了格式说明符和参数的索引。\n\
  \n![A323069_2_En_17_Fig1_HTML.gif](img/A323069_2_En_17_Fig1_HTML.gif)\n\n图 17-1.\n\
  \n格式字符串中格式说明符的索引和参数的索引\n\n\n\n图 17-1 展示了上一个示例中索引的映射方式。第一个指定的 `%s` 格式符引用了第一个参数 `\"\
  Ken\"`。第二个指定的 `%s` 格式符引用了第二个参数 `\"Lola\"`。第三个指定的 `%s` 格式符引用了第三个参数 `\"Matt\"`。\n\n\
  如果参数数量多于格式字符串中的格式说明符数量，则多余参数会被忽略。请看以下代码片段及其输出。它包含三个格式说明符（三个 `%s`）和四个参数。第四个参数 `\"\
  Lo\"` 是多余参数，会被忽略。\n\n```\nSystem.out.printf(\"%s, %s, and %s\", \"Ken\", \"Lola\"\
  , \"Matt\", \"Lo\");\n```\n\n```\nKen, Lola, and Matt\n```\n\n如果格式说明符引用了不存在的参数，则会抛出\
  \ `java.util.MissingFormatArgumentException`。以下代码片段会抛出此异常，因为参数数量比格式说明符数量少一个。这里有三个格式说明符，但只有两个参数。\n\
  \n```\n// 编译通过，但运行时抛出异常\nSystem.out.printf(\"%s, %s, and %s\", \"Ken\", \"Lola\"\
  );\n```\n\n请注意，`Formatter` 类的 `format()` 方法的最后一个参数是可变参数（var-args）。你也可以向可变参数传递一个数组。以下代码片段是有效的，尽管它使用了三个格式说明符，但只有一个数组类型的参数。该数组类型参数包含三个值，分别对应三个格式说明符。\n\
  \n```\nString[] names = {\"Ken\", \"Matt\", \"Lola\"};\nSystem.out.printf(\"%s,\
  \ %s, and %s\", names);\n```\n\n```\nKen, Matt, and Lola\n```\n\n以下代码片段也是有效的，因为它在数组类型参数中传递了四个值，但只有三个格式说明符：\n\
  \n```\nString[] names = {\"Ken\", \"Matt\", \"Lola\", \"Lo\"};\nSystem.out.printf(\"\
  %s, %s, and %s\", names);\n```\n\n```\nKen, Matt, and Lola\n```\n\n以下代码片段无效，因为它使用的数组类型参数只有两个元素，而格式说明符有三个。运行以下代码片段时会抛出\
  \ `MissingFormatArgumentException`。\n\n```\nString[] names = {\"Ken\", \"Matt\"\
  };\nSystem.out.printf(\"%s, %s, and %s\", names); // 抛出异常\n```\n\n显式索引\n\n当格式说明符显式指定参数索引时，称为显式索引。请注意，参数索引紧跟在格式说明符中的\
  \ `%` 符号之后。它是一个十进制格式的整数，并以 `$`（美元符号）结尾。请看以下代码片段及其输出。它使用了三个格式说明符：`%1$s`、`%2$s` 和\
  \ `%3$s`，这些说明符都使用了显式索引。\n\n```\nSystem.out.printf(\"%1$s, %2$s, and %3$s\", \"Ken\"\
  , \"Lola\", \"Matt\");\n```\n\n```\nKen, Lola, and Matt\n```\n\n当格式说明符使用显式索引时，它可以通过参数的索引引用参数列表中任意位置的参数。请看以下代码片段：\n\
  \n```\nSystem.out.printf(\"%3$s, %1$s, and %2$s\", \"Lola\", \"Matt\", \"Ken\");\n\
  ```\n\n```\nKen, Lola, and Matt\n```\n\n此代码片段的输出与之前的代码片段相同。然而，在此例中，参数列表中的值顺序不同。第一个格式说明符\
  \ `%3$s` 引用了第三个参数 `\"Ken\"`；第二个格式说明符 `%1$s` 引用了第一个参数 `\"Lola\"`；第三个格式说明符 `%2$s`\
  \ 引用了第二个参数 `\"Matt\"`。\n\n允许使用显式索引多次引用同一个参数。也允许在格式字符串中不引用某些参数。在以下代码片段中，第一个参数 `\"\
  Lola\"` 未被引用，而第三个参数 `\"Ken\"` 被引用了两次：\n\n```\nSystem.out.printf(\"%3$s, %2$s, and\
  \ %3$s\", \"Lola\", \"Matt\", \"Ken\");\n```\n\n```\nKen, Matt, and Ken\n```\n\n\
  相对索引\n\n在格式说明符中引用参数还有第三种方式，称为相对索引。在相对索引中，格式说明符使用与前一个格式说明符相同的参数。相对索引不使用参数索引值，而是在格式说明符中使用\
  \ `<` 字符作为标志。由于在相对索引中，格式说明符使用与前一个格式说明符相同的参数，因此它不能用于第一个格式说明符，因为第一个格式说明符没有前一个格式说明符。请看以下使用相对索引的代码片段及其输出：\n\
  \n```\nSystem.out.printf(\"%1$s, %<s, %<s, %2$s, and %<s\", \"Ken\", \"Matt\");\n\
  ```\n\n```\nKen, Ken, Ken, Matt, and Matt\n```\n\n此代码片段使用了五个格式说明符：`%1$s`、`%<s`、`%<s`、`%2$s`\
  \ 和 `%<s`。它使用了两个参数：`\"Ken\"` 和 `\"Matt\"`。请注意，如果某些格式说明符使用了相对索引，则格式说明符的数量可以少于参数数量。第一个格式说明符\
  \ `%1$s` 使用显式索引引用了第一个参数 `\"Ken\"`。第二个格式说明符 `%<s` 使用了相对索引（注意 `<` 标志），因此它将使用与前一个格式说明符\
  \ `1$s` 相同的参数。这样，第一个和第二个格式说明符都使用了第一个参数 `\"Ken\"`。输出显示前两个名字为 `\"Ken\"`，证实了这一点。第三个格式说明符\
  \ `%<s` 也使用了相对索引。它将使用与前一个格式说明符（第二个格式说明符）相同的参数。由于第二个格式说明符使用了第一个参数 `\"Ken\"`，第三个格式说明符也将使用相同的参数。输出显示第三个名字为\
  \ `\"Ken\"`，证实了这一点。第四个格式说明符 `%2$s` 使用显式索引引用了第二个参数 `\"Matt\"`。第五个也是最后一个格式说明符 `%<s`\
  \ 使用了相对索引，它将使用与前一个格式说明符（第四个格式说明符）相同的参数。由于第四个格式说明符使用了第二个参数 `\"Matt\"`，第五个格式说明符也将使用第二个参数\
  \ `\"Matt\"`。输出显示第五个名字为 `\"Matt\"`，证实了这一点。\n\n以下语句会抛出 `MissingFormatArgumentException`，因为它对第一个格式说明符使用了相对索引：\n\
  \n```\nSystem.out.printf(\"%<s, %<s, %<s, %2$s, and %<s\", \"Ken\", \"Matt\");\n\
  ```\n\n可以在同一个格式字符串中混合使用所有三种索引类型来引用不同格式说明符中的参数。请看以下语句及其输出：\n\n```\nSystem.out.printf(\"\
  %1$s, %s, %<s, %s, and %<s\", \"Ken\", \"Matt\");\n```\n\n```\nKen, Ken, Ken, Matt,\
  \ and Matt\n```\n\n第一个格式说明符使用显式索引引用了第一个参数 `\"Ken\"`。第二个和第四个格式说明符（均为 `%s`）使用了普通索引。第三个和第五个格式说明符（均为\
  \ `%<s`）使用了相对索引。根据相对索引的规则，第三个和第五个格式说明符将分别使用与第二个和第四个格式说明符相同的参数。那么第二个和第四个格式说明符会使用哪些参数呢？答案很简单。当某些格式说明符使用普通索引，而另一些使用显式索引时，为了理解此规则，可以忽略使用显式索引的格式说明符，并将使用普通索引的格式说明符依次编号为\
  \ 1、2 等。应用此规则，你可以将前面的语句视为与以下语句相同：\n\n```\nSystem.out.printf(\"%1$s, %1$s, %<s, %2$s,\
  \ and %<s\", \"Ken\", \"Matt\");\n```\n\n\n\n请注意，你已经将第一个 `%s` 替换为 `%1$s`，并将第二个替换为\
  \ `%2$s`，就像它们使用了显式索引一样。这解释了上一条语句生成的输出。\n\n在格式说明符中使用标志\n\n标志充当修饰符。它们会修改格式化后的输出。表\
  \ 17-3 列出了所有可以在格式说明符中使用的标志。\n\n表 17-3.\n\n有效标志列表、其描述及使用示例\n\n| 标志 | 描述 | 示例 | |\
  \ |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| | 格式字符串\
  \ | 参数 | 格式化文本 | |\n| `-` | 结果左对齐。请注意，如果在格式说明符中不使用 `-` 标志，结果将右对齐。 | `\"'%6s'\"`\
  \ | `\"Ken\"` | `'   Ken'` |\n| | | `\"'%-6s'\"` | `\"Ken\"` | `'Ken   '` |\n| `#`\
  \ | 根据格式说明符的转换部分，参数以替代形式进行格式化。示例显示了相同的十进制数 `6270185` 被格式化为十六进制格式。当使用 `#` 标志时，十六进制数会以\
  \ `0x` 为前缀。 | `\"%x\"` | `6270185` | `5face9` |\n| | | `\"%#x\"` | `6270185` | `0x5face9`\
  \ |\n| `+` | 对于正值，结果包含一个 `+` 符号。它仅适用于数值。 | `\"%d\"` | `105` | `105` |\n| | | `\"\
  %+d\"` | `105` | `+105` |\n| `' '` | 对于正值，结果包含一个前导空格。它仅适用于数值。 | `\"'%d'\"` | `105`\
  \ | `'105'` |\n| | | `\"'% d'\"` | `105` | `' 105'` |\n| `0` | 结果用零填充。它仅适用于数值。 |\
  \ `\"'%6d'\"` | `105` | `'   105'` |\n| | | `\"'%06d'\"` | `105` | `'000105'` |\n\
  | `,` | 结果包含特定于区域设置的分组分隔符。它仅适用于数值。例如，在美国区域设置中，逗号用作千位分隔符，而在法国区域设置中，则使用空格。 | `\"%,d\"\
  ` | `89105` | `89,105`（美国区域设置） |\n| | | `\"%,d\"` | `89105` | `89 105`（法国区域设置） |\n\
