  );\nformat(ld, \"MM/dd/yyyy\");\nformat(ld, \"MMM dd, yyyy\");\nformat(ld, \"MMMM\
  \ dd, yyyy\");\nformat(ld, \"EEEE, MMMM dd, yyyy\");\nformat(ld, \"'Month' q 'in'\
  \ QQQ\");\nformat(ld, \"[MM-dd-yyyy][' at' HH:mm:ss]\");\nLocalTime lt = LocalTime.of(16,\
  \ 30, 5, 78899);\nSystem.out.println(\"\\n 格式化时间:\" + lt);\nformat(lt, \"HH:mm:ss\"\
