  了解数组的类\n```\n\n数组的类名以左方括号`([)`开头。左方括号的数量等于数组的维度。对于`int`数组，左方括号后面跟着字符`I`。对于引用类型数组，左方括号后面跟着字符`L`，然后是类名，最后以分号结尾。一维基本类型数组和引用类型数组的类名如表[19-2\
  \ 所示。\n\n表 19-2.\n\n数组的类名\n\n数组类型\n |\n  类名\n |\n\n| --- | --- | --- | --- | ---\
  \ |\n\n`byte[]`\n |\n  `[B`\n |\n\n`short[]`\n |\n  `[S`\n |\n\n`int[]`\n |\n  `[I`\n\
  \ |\n\n`long[]`\n |\n  `[J`\n |\n\n`char[]`\n |\n  `[C`\n |\n\n`float[]`\n |\n \
  \ `[F`\n |\n\n`double[]`\n |\n  `[D`\n |\n\n`boolean[]`\n |\n  `[Z`\n |\n\n`com.jdojo.array.Person[]`\n\
  \ |\n  `[Lcom.jdojo.array.Person;`\n |\n\n数组的类名在编译时不可用于声明或创建它们。你必须使用本章描述的语法来创建数组。也就是说，你不能编写以下代码来创建一个`int`数组：\n\
  \n```\n[I myIntArray;\n```\n\n相反，你必须编写以下代码来创建一个`int`数组：\n\n```\nint[] myIntArray;\n\
  ```\n\n数组赋值兼容性\n\n数组每个元素的数据类型与数组的数据类型相同。例如，`int[]`数组的每个元素都是`int`类型；`String[]`数组的每个元素都是`String`类型。赋值给数组元素的值必须与其数据类型赋值兼容。例如，允许将`byte`值赋给`int`数组的元素，因为`byte`与`int`赋值兼容。但是，不允许将`float`值赋给`int`数组的元素，因为`float`与`int`不赋值兼容。\n\
  \n```\nint[] sequence = new int[10];\nsequence[0] = 10;    // 正确。将 int 类型的 10 赋给\
  \ int 类型\nsequence[1] = 19.4f; // 编译时错误。将 float 类型赋给 int 类型\n```\n\n处理引用类型数组时也必须遵循相同的规则。如果存在一个类型为`T`的引用类型数组，那么只有当类型`S`与`T`赋值兼容时，才能将类型`S`的对象引用赋给其元素。子类对象引用总是与父类赋值兼容。由于`Object`类是\
  \ Java 中所有类的超类，因此你可以使用`Object`类的数组来存储任何类的对象。例如：\n\n```\nObject[] genericArray =\
  \ new Object[4];\ngenericArray[0] = new String(\"Hello\");  // 正确\ngenericArray[1]\
  \ = new Person(\"Daniel\"); // 正确。假设 Person 类存在\ngenericArray[2] = new Account(189);\
  \     // 正确。假设 Account 类存在\ngenericArray[3] = null;                 // 正确。null 可以赋给任何引用类型\n\
  ```\n\n当你从数组中读取对象时，需要进行强制类型转换，如下所示：\n\n```\n/* 编译器会对以下语句标记错误。genericArray 是 Object\
  \ 类型，Object 引用不能赋给 String 引用变量。\n即使 genericArray[0]包含一个 String 对象引用，我们也需要像下一条语句那样将其强制转换为\
  \ String。\n*/\nString s = genericArray[0]; // 编译时错误\nString str = (String) genericArray[0];\
  \ // 正确\nPerson p = (Person) genericArray[1];   // 正确\nAccount a = (Account) genericArray[2];\
  \ // 正确\n```\n\n如果你尝试将数组元素强制转换为一个其实际类型与新类型不赋值兼容的类型，则会抛出`java.lang.ClassCastException`。例如，以下语句将在运行时抛出`ClassCastException`：\n\
  \n```\nString str = (String) genericArray[1]; // Person 无法转换为 String\n```\n\n你不能将超类的对象引用存储在子类的数组中。下面的代码片段说明了这一点：\n\
  \n```\nString[] names = new String[3];\nnames[0] = new Object(); // 编译时错误。Object\
  \ 是 String 的超类\nnames[1] = new Person(); // 编译时错误。Person 不是 String 的子类\nnames[2]\
  \ = null;         // 正确。\n```\n\n最后，如果一种数组类型与另一种数组类型赋值兼容，则可以将前者的数组引用赋给后者。\n\n```\n\
  Object[] obj = new Object[3];\nString[] str = new String[2];\nAccount[] a = new\
  \ Account[5];\nobj = str;            // 正确\nstr = (String[]) obj; // 正确，因为 obj 持有\
  \ String 数组引用\nobj = a;\n// 将抛出 ClassCastException。obj 持有 Account 数组的引用，而 Account\
  \ 无法转换为 String\nstr = (String[]) obj;\na = (Account[]) obj; // 正确\n```\n\n将 ArrayList/Vector\
  \ 转换为数组\n\n\n\n当列表中的元素数量不确定时，可以使用 `ArrayList`。一旦列表中的元素数量固定，你可能希望将 `ArrayList` 转换为数组。进行此转换的原因可能如下：\n\
  \n*   程序语义可能要求你使用数组，而不是 `ArrayList`。例如，你可能需要将一个数组传递给某个方法，但你的数据却存储在 `ArrayList` 中。\n\
  \n*   你可能希望将用户输入存储在数组中。然而，你并不知道用户会输入多少个值。在这种情况下，你可以在接受用户输入的同时，将值存储在 `ArrayList`\
  \ 中。最后，你可以将 `ArrayList` 转换为数组。\n\n*   访问数组元素比访问 `ArrayList` 元素更快。如果你有一个 `ArrayList`\
  \ 并且需要多次访问其元素，你可能希望将 `ArrayList` 转换为数组以获得更好的性能。\n\n`ArrayList` 类有一个名为 `toArray()`\
  \ 的重载方法：\n\n*   `Object[] toArray()`\n\n*   `<T> T[] toArray(T[] a)`\n\n第一个方法将 `ArrayList`\
  \ 的元素作为 `Object` 数组返回。第二个方法接受任何类型的数组作为参数。如果传入的数组有足够的空间，所有 `ArrayList` 元素都会被复制到该数组中，并返回同一个数组。如果传入的数组空间不足，则会创建一个新数组。新数组的类型与传入的数组相同。新数组的长度等于\
  \ `ArrayList` 的大小。清单 19-16 展示了如何将 `ArrayList` 转换为数组。\n\n```\n// ArrayListToArray.java\n\
  package com.jdojo.array;\nimport java.util.ArrayList;\nimport java.util.Arrays;\n\
  public class ArrayListToArray {\npublic static void main(String[] args) {\nArrayList\
  \ al = new ArrayList();\nal.add(\"cat\");\nal.add(\"dog\");\nal.add(\"rat\");\n\
  // 打印 ArrayList 的内容\nSystem.out.println(\"ArrayList: \" + al);\n// 创建一个与 ArrayList\
  \ 长度相同的数组\nString[] s1 = new String[al.size()];\n// 将 ArrayList 元素复制到数组中\nString[]\
  \ s2 = al.toArray(s1);\n// s1 有足够的空间复制所有 ArrayList 元素。\n// al.toArray(s1) 返回 s1\
  \ 本身\nSystem.out.println(\"s1 == s2: \" + (s1 == s2));\nSystem.out.println(\"s1:\
  \ \" + Arrays.toString(s1));\nSystem.out.println(\"s2: \" + Arrays.toString(s2));\n\
  // 创建一个包含 1 个元素的字符串数组。\ns1 = new String[1];\ns1[0] = \"hello\"; // 在第一个元素中存储 hello\n\
  // 将 ArrayList 复制到数组 s1\ns2 = al.toArray(s1);\n/* 由于 s1 没有足够的空间复制所有 ArrayList 元素，\n\
  al.toArray(s1) 会创建一个包含 3 个元素的新 String 数组。所有\narraylist 的元素都被复制到新数组中。最后，返回新数组。\n\
  这里，s1 == s2 为 false。方法调用不会改变 s1。\n*/\nSystem.out.println(\"s1 == s2: \" + (s1 ==\
  \ s2));\nSystem.out.println(\"s1: \" + Arrays.toString(s1));\nSystem.out.println(\"\
  s2: \" + Arrays.toString(s2));\n}\n}\nArrayList: [cat, dog, rat]\ns1 == s2: true\n\
  s1: [cat, dog, rat]\ns2: [cat, dog, rat]\ns1 == s2: false\ns1: [hello]\ns2: [cat,\
  \ dog, rat]\n清单 19-16.\nArrayList 到数组的转换\n```\n\n执行数组操作\n\n在日常编程中，你需要执行几种常规的数组操作，例如排序、搜索、比较和复制。`java.util.Arrays`\
  \ 类是一个工具类，包含超过 150 个静态便捷方法，用于执行此类数组操作。在你编写自己的代码来执行数组操作之前，请参考 `Arrays` 类的 API 文档，你可能会找到实现相同功能的方法。\n\
  \n不要被这个类中大量的方法所吓倒。它并不支持超过 150 种类型的数组操作。`Arrays` 类中方法数量庞大的原因是为了支持对所有原始类型和引用类型数组执行相同的操作。大多数方法至少有九个重载版本——八个原始类型数组各一个，再加上一个引用类型数组。有时，操作可以在整个数组上执行，也可以在一个元素范围上执行，这使得一个数组操作的最小方法数量翻倍，至少达到\
  \ 18 个。逐一介绍每个方法并提供示例是不可能的，那将占用本书超过 100 页的篇幅。我根据它们执行的操作类型将所有方法分为不同的类别，并提供了一些示例。表\
  \ 19-3 列出了这些类别以及在这些类别中执行数组操作的方法名称。\n\n表 19-3.\n\nArrays 类中的方法及其类别与描述\n\n| 类别 | 方法名称\
  \ | 描述 |\n| --- | --- | --- |\n| 转换 | `asList()` | 返回由指定数组支持的固定大小列表。此方法只有一个版本。 |\n\
  | | `stream()` | 返回一个顺序流，该流包含数组的所有元素或一个范围内的元素。 |\n| | `toString()` | 返回指定数组内容的字符串表示形式。\
  \ |\n| | `deepToString()` | 返回数组“深层内容”的字符串表示形式。适用于多维数组。 |\n| 搜索 | `binarySearch()`\
  \ | 允许你使用二分搜索算法搜索已排序的数组。传递给此方法之前，数组必须已排序；否则，结果未定义。允许在整个数组或数组内的一个元素范围内进行搜索。 |\n|\
  \ 比较 | `compare()` | 按字典顺序比较两个数组。如果第一个数组和第二个数组相等且包含相同顺序的相同元素，则返回 0；如果第一个数组在字典顺序上小于第二个数组，则返回小于\
  \ 0 的值；如果第一个数组在字典顺序上大于第二个数组，则返回大于 0 的值。此方法在 Java 9 中添加。 |\n| | `compareUnsigned()`\
  \ | 与 `compare()` 方法工作方式相同，但将元素数值上视为无符号数。此方法在 Java 9 中添加。 |\n| | `deepEquals()`\
  \ | 如果两个指定数组彼此深度相等，则返回 `true`。 |\n| | `equals()` | 如果两个指定的 int 数组彼此相等，则返回 `true`。你可以比较整个数组或其中的一个元素范围是否相等。此方法在\
  \ Java 9 中添加。 |\n| | `mismatch()` | 查找并返回两个数组之间第一个不匹配的索引，如果未找到不匹配则返回 -1。可以比较两个数组的整个内容或其元素范围是否存在不匹配。此方法在\
  \ Java 9 中添加。 |\n| 复制 | `copyOf()` | 将一个数组复制到另一个数组。指定新数组的长度。新数组可以比源数组小或大。如果更大，额外的元素将填充为该数组数据类型的默认值。\
  \ |\n| | `copyOfRange()` | 将一个数组中的某个元素范围复制到另一个数组。 |\n| 填充 | `fill()` | 允许你为数组中的所有元素或某个范围内的元素分配相同的值。\
  \ |\n| | `setAll()` | 允许你为数组中的所有元素或某个范围内的元素分配一个值。这些值由生成器函数生成。 |\n| 计算哈希码 | `deepHashCode()`\
  \ | 基于数组的“深层内容”返回哈希码。对于多维数组，计算哈希码时会包含所有维度的内容。 |\n| | `hashCode()` | 基于指定数组的内容返回哈希码。\
  \ |\n\n\n\n并行更新\n |\n  `parallelPrefix()`\n |\n  使用提供的函数，就地并行累加数组中的每个元素。\n |\n\n\
  |\n  `parallelSetAll()`\n |\n  使用生成器函数计算每个元素，并行设置指定数组的所有元素。\n |\n\n排序\n |\n  `parallelSort()`\n\
  \ |\n  使用并行排序对数组中的所有元素或某个范围内的元素进行排序。\n |\n\n|\n  `sort()`\n |\n  对数组中的所有元素或某个范围内的元素进行排序。\n\
