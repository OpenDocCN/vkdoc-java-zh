  ```


  请注意，`getRangeSum` 过程的主体（实现或“怎么做”部分）在清单 1-3 和清单 1-4 之间发生了变化。但是，`getRangeSum` 过程的用户不受此更改的影响，因为通过使用抽象，该过程的实现细节对其用户是隐藏的。如果您想使用清单
  1-4 中所示的 `getRangeSum` 过程版本来计算 10 和 20 之间所有整数的和，您之前的代码仍然有效。


  ```

  int s1 = getRangeSum(10, 20);

  System.out.println(s1);

  ```


  您刚刚看到了抽象的最大好处之一，即可以在不要求使用该程序的代码进行任何更改的情况下，更改程序（在本例中是一个过程）的实现细节。这一好处还为您提供了机会，可以在未来重写程序逻辑以提高性能，而不会影响应用程序的其他部分。


  我在本节中考虑两种类型的抽象：


  *   过程抽象

  *   数据抽象


  过程抽象允许您定义一个过程，例如 `getRangeSum`，您可以将其用作一个动作或任务。到目前为止，我一直在讨论过程抽象。通过参数化实现抽象和通过规范实现抽象是实现过程抽象以及数据抽象的两种方法。下一节将详细讨论数据抽象。




  #### 数据抽象


  面向对象编程基于数据抽象。不过，在讨论数据抽象之前，我需要简要介绍一下数据类型。数据类型（或简称类型）由三个组成部分定义：


  *   一组值（或数据对象）

  *   一组可应用于该集合中所有值的操作

  *   一种数据表示，它决定了值的存储方式


  编程语言提供了一些预定义的数据类型，称为内置数据类型。它们也允许程序员定义自己的数据类型，称为用户自定义数据类型。由原子且不可分割的值组成，并且无需借助任何其他数据类型即可定义的数据类型，称为原始数据类型。例如，Java
  拥有内置的原始数据类型，如 `int`、`float`、`boolean`、`char` 等。定义 Java 中 `int` 原始数据类型的三个组成部分如下：


  *   `int` 数据类型包含介于 -2147483648 和 2147483647 之间的所有整数集合。

  *   为 `int` 数据类型定义了诸如加法、减法、乘法、除法、比较等操作。

  *   `int` 数据类型的值以 32 位内存、采用 2 的补码形式表示。


  `int` 数据类型的所有三个组成部分均由 Java 语言预定义。你不能扩展或重新定义 `int` 数据类型的定义。你可以为 `int` 数据类型的值赋予一个名称，如下所示：


  ```

  int n1;

  ```


  这条语句表明 `n1` 是一个名称（技术上称为标识符），它可以与定义 `int` 数据类型值的集合中的一个值相关联。例如，你可以使用赋值语句将整数 `26` 与名称
  `n1` 关联起来，如下所示：


  ```

  n1 = 26;

  ```


  此时，你可能会问：“与名称 `n1` 关联的值 `26` 存储在内存中的哪个位置？” 根据 `int` 数据类型的定义，你知道 `n1` 将占用 32 位内存。然而，你并不知道、无法知道、也无需知道这
  32 位内存具体分配在内存中的哪个位置给 `n1`。你在这里看到抽象的示例了吗？如果你在此例中看到了抽象的示例，那么你是对的。这是一个内置于 Java 语言中的抽象示例。在此例中，关于
  `int` 数据类型数据值的数据表示的信息对数据类型的用户（程序员）是隐藏的。换句话说，程序员忽略了 `n1` 的内存位置，而专注于它的值以及可以对其执行的操作。程序员不关心
  `n1` 的内存是分配在寄存器、RAM 还是硬盘中。


  诸如 Java 之类的面向对象编程语言允许你使用一种称为数据抽象的抽象机制来创建新的数据类型。这些新的数据类型被称为抽象数据类型（ADT）。ADT 中的数据对象可能由原始数据类型和其他
  ADT 组合而成。一个 ADT 定义了一组可应用于其所有数据对象的操作。数据表示在 ADT 中始终是隐藏的。对于 ADT 的用户而言，它仅由操作组成。其数据元素只能通过其操作进行访问和操作。使用数据抽象的好处在于，可以在不影响任何使用该
  ADT 的代码的情况下更改其数据表示。


  提示


  数据抽象允许程序员创建一种称为抽象数据类型的新数据类型，其中数据对象的存储表示对数据类型的用户是隐藏的。换句话说，ADT 完全根据可应用于其类型数据对象的操作来定义，而无需了解数据的内部表示。这种数据类型之所以被称为抽象，是因为
  ADT 的用户永远看不到数据值的表示。用户通过对其应用操作来以抽象的方式查看 ADT 的数据对象，而无需了解数据对象表示的细节。请注意，ADT 并不意味着没有数据表示。数据表示始终存在于
  ADT 中。它仅意味着对用户隐藏数据表示。


  Java 拥有一些构造，例如类、接口、注解和 `enum`，它们允许你定义新的 ADT。当你使用类来定义新的 ADT 时，你需要小心地隐藏数据表示，这样你的新数据类型才是真正抽象的。如果
  Java 类中的数据表示没有被隐藏，那么该类创建了一个新的数据类型，但并非 ADT。Java 中的类为你提供了可用于公开或隐藏数据表示的特性。在 Java 中，类数据类型的值集合被称为对象。对对象的操作被称为方法。对象的实例变量（也称为字段）是类类型的数据表示。


  Java 中的类允许你实现对数据表示进行操作的方法。Java 中的接口允许你创建纯粹的 ADT。接口允许你仅提供可应用于其类型数据对象的操作的规范。在接口中不能提及操作的实现或数据表示。清单
  1-1 展示了使用 Java 语言语法定义的 `Person` 类。通过定义一个名为 `Person` 的类，你创建了一个新的 ADT。其 `name` 和 `gender`
  的内部数据表示使用了 `String` 数据类型（`String` 是 Java 类库提供的内置 ADT）。请注意，`Person` 类的定义在 `name`
  和 `gender` 声明中使用了 `private` 关键字，以对外部世界隐藏它们。`Person` 类的用户无法访问 `name` 和 `gender` 数据元素。它提供了四个操作：一个构造方法和三个方法（`getName`、`setName`
  和 `getGender`）。


  构造方法操作用于初始化一个新建的 `Person` 类型的数据对象。`getName` 和 `setName` 操作分别用于访问和修改 `name` 数据元素。`getGender`
  操作用于访问 `gender` 数据元素的值。


  `Person` 类的用户必须仅使用这四个操作来处理 `Person` 类型的数据对象。`Person` 类型的用户对用于存储 `name` 和 `gender`
  数据元素的数据存储类型一无所知。我互换使用“类型”、“类”和“接口”这三个术语，因为在数据类型的上下文中它们含义相同。这赋予了 `Person` 类型的开发者自由，可以在不影响
  `Person` 类型任何用户的情况下更改 `name` 和 `gender` 数据元素的数据表示。假设 `Person` 类型的一个用户有以下代码片段：


  ```

  Person john = new Person("John Jacobs", "Male");

  String intialName = john.getName();

  john.setName("Wally Jacobs");

  String changedName = john.getName();

  ```


  这段代码仅根据 `Person` 类型提供的操作编写。它没有（也不能）直接引用 `name` 和 `gender` 实例变量。让我们看看如何在不影响该代码片段的情况下更改
  `Person` 类型的数据表示。清单 1-5 展示了 `Person` 类新版本的代码。




  ```

  package com.jdojo.concepts;

  public class Person {

  private String[] data = new String[2];

  public Person(String initialName, String initialGender) {

  data[0] = initialName;

  data[1] = initialGender;

  }

  public String getName() {

  return data[0];

  }

  public void setName(String newName) {

  data[0] = newName;

  }

  public String getGender() {

  return data[1];

  }

  }

  清单 1-5.

  Person 类的另一个版本，它使用包含两个元素的字符串数组来存储姓名和性别值，而不是使用两个字符串变量

  ```


  比较清单 1-1 和清单 1-5 中的代码。这一次，你将清单 1-1 中 `Person` 类型的数据表示——两个实例变量（`name` 和 `gender`），替换为了一个包含两个元素的
  `String` 数组。由于类中的操作（或方法）作用于数据表示，因此你必须更改 `Person` 类型中所有四个操作的实现。清单 1-5 中的客户端代码是基于这四个操作的规范编写的，而不是基于它们的实现。由于你没有更改任何操作的规范，因此无需更改使用
  `Person` 类的代码片段；它对于清单 1-5 中 `Person` 类型的更新定义仍然有效。`Person` 类中的一些方法使用了参数化抽象，而所有方法都使用了规约抽象。此处我没有展示这些方法的规约，它们通常是
  Javadoc 注释。


  在本节中，你已经看到了数据抽象的两种主要好处。


  *   它允许你通过定义新的数据类型来扩展编程语言。你创建的新数据类型取决于应用领域。例如，对于银行系统，`Person`、`Currency` 和 `Account`
  可能是新数据类型的不错选择；而对于汽车保险应用，`Person`、`Vehicle` 和 `Claim` 可能是更好的选择。新数据类型中包含的操作取决于应用的需求。

  *   使用数据抽象创建的数据类型可以更改数据的表示形式，而不会影响使用该数据类型的客户端代码。


  ### 封装与信息隐藏


  术语“封装”用于表示两种不同的事物：一个过程或一个实体。作为一个过程，它是将一个或多个项目捆绑到容器中的行为。容器可以是物理的或逻辑的。作为一个实体，它是一个容纳一个或多个项目的容器。


  编程语言以多种方式支持封装。过程是执行任务步骤的封装；数组是多个相同类型元素的封装，等等。在面向对象编程中，封装是将数据和对数据的操作捆绑到一个称为类的实体中。Java
  以多种方式支持封装。


  *   它允许你将数据和对数据进行操作的方法捆绑到一个称为类的实体中。

  *   它允许你将一个或多个逻辑上相关的类捆绑到一个称为包的实体中。Java 中的包是一个或多个相关类的逻辑集合。包创建了一个新的命名范围，其中所有类必须具有唯一的名称。在
  Java 中，只要两个类被捆绑（或封装）在不同的包中，它们就可以具有相同的名称。

  *   它允许你将包捆绑到模块中，该功能是在 Java SE 9 中引入的。模块可以导出其包。导出包中定义的类型对其他模块是可访问的，而未导出包中的类型对其他模块是不可访问的。

  *   它允许你将一个或多个相关的类捆绑到一个称为编译单元的实体中。一个编译单元中的所有类可以与其他编译单元分开编译。


  在讨论面向对象编程的概念时，术语“封装”和“信息隐藏”经常互换使用。然而，它们在面向对象编程中是不同的概念，不应如此互换使用。封装仅仅是将项目捆绑到一个实体中。信息隐藏是隐藏可能发生变化的实现细节的过程。封装不关心捆绑在实体中的项目是否对应用程序中的其他模块隐藏。哪些应该隐藏（或忽略）以及哪些不应该隐藏是抽象关注的问题。抽象只关心哪些项目应该被隐藏。抽象不关心项目应该如何被隐藏。信息隐藏关心的是项目如何被隐藏。


  封装、抽象和信息隐藏是三个独立的概念。不过，它们密切相关。一个概念促进了其他概念的工作。理解它们在面向对象编程中所扮演角色的细微差别非常重要。


  提示


  在 Java SE 9 中，你经常会遇到诸如“模块提供强封装”这样的短语。在这里，术语“封装”是在信息隐藏的意义上使用的。这意味着模块中未导出包中的类型对其他模块是隐藏的（或不可访问的）。


  可以在不隐藏任何信息的情况下使用封装。例如，清单 1-1 中的 `Person` 类展示了封装和信息隐藏的一个例子。数据元素（`name` 和 `gender`）和方法（`getName()`、`setName()`
  和 `getGender()`）被捆绑在一个名为 `Person` 的类中。这就是封装。换句话说，`Person` 类是数据元素 `name` 和 `gender`
  以及方法 `getName()`、`setName()` 和 `getGender()` 的封装。同一个 `Person` 类通过对外部世界隐藏数据元素来使用信息隐藏。请注意，`name`
  和 `gender` 数据元素使用了 Java 关键字 `private`，这实质上将它们对外部世界隐藏了。清单 1-6 展示了 `Person2` 类的代码。


  ```

  package com.jdojo.concepts;

  public class Person2 {

  public String name;   // 未对其用户隐藏

  public String gender; // 未对其用户隐藏

  public Person2(String initialName, String initialGender) {

  name = initialName;

  gender = initialGender;

  }

  public String getName() {

  return name;

  }

  public void setName(String newName) {

  name = newName;

  }

  public String getGender() {

  return gender;

  }

  }

  清单 1-6.

  Person2 类的定义，其中数据元素通过声明为 public 而未隐藏

  ```


  清单 1-1 和清单 1-6 中的代码基本相同，只有两个小差异。`Person2` 类使用关键字 `public` 来声明 `name` 和 `gender`
  数据元素。`Person2` 类使用封装的方式与 `Person` 类相同。然而，`name` 和 `gender` 数据元素并未被隐藏。也就是说，`Person2`
  类没有使用数据隐藏（数据隐藏是信息隐藏的一个例子）。如果你查看 `Person` 和 `Person2` 类的构造函数和方法，它们的主体使用了信息隐藏，因为其内部编写的逻辑对其用户是隐藏的。


  提示


  封装和信息隐藏是面向对象编程的两个不同概念。一个的存在并不意味着另一个的存在。




  ### 继承


  继承是面向对象编程中的另一个重要概念。它让你能够以一种新的方式使用抽象。在前面的章节中，你已经看到类如何代表一种抽象。清单 1-1 中展示的 `Person`
  类代表了现实世界中人的一种抽象。继承机制允许你通过扩展已有的抽象来定义新的抽象。已有的抽象被称为超类型、超类、父类或基类。新的抽象被称为子类型、子类、子类或派生类。可以说，子类型是从超类型派生（或继承）而来的；超类型是子类型的泛化；而子类型是超类型的特化。继承可用于在多个层级上定义新的抽象。一个子类型可以作为超类型来定义另一个子类型，以此类推。继承产生了一个按层次结构排列的类型家族。


  继承允许你在层次结构的不同层级上使用不同程度的抽象。在图 1-6 中，`Person` 类位于继承层次结构的顶部（最高层级）。`Customer` 和 `Employee`
  类位于继承层次结构的第二层。随着你向上移动继承层级，你会关注更重要的信息片段。换句话说，在更高的继承层级，你关心的是全局；而在更低的继承层级，你关心的是越来越多的细节。从抽象的角度来看，还有另一种理解继承层次结构的方式。在图
  1-6 的 `Person` 层级，你关注的是 `Customer` 和 `Employee` 的共同特征，而忽略它们之间的差异。在 `Employee` 层级，你关注的是
  `Clerk`、`Programmer` 和 `Cashier` 的共同特征，而忽略它们之间的差异。


  ![A323069_2_En_1_Fig6_HTML.jpg](img/A323069_2_En_1_Fig6_HTML.jpg)


  图 1-6.


  Person 类的继承层次结构


  在继承层次结构中，超类型及其子类型代表一种“is-a”（是一个）关系。也就是说，`Employee` 是一个 `Person`；`Programmer` 是一个
  `Employee`，等等。由于较低的继承层级意味着更多的信息片段，子类型总是包含其超类型所拥有的内容，并且可能还包含更多。继承的这一特性导致了面向对象编程中的另一个特性，即所谓的可替换性原则。这意味着超类型总是可以被其子类型替换。例如，在你的
  `Person` 抽象中，你只考虑了人的 `name` 和 `gender` 信息。如果你从 `Person` 继承出 `Employee`，那么 `Employee`
  就包含了从 `Person` 继承来的 `name` 和 `gender` 信息。`Employee` 可能还包含更多信息片段，例如员工 ID、入职日期、薪水等。如果在某个上下文中期望一个
  `Person`，这意味着在该上下文中只有 `name` 和 `gender` 信息是相关的。你总是可以用 `Employee`、`Customer`、`Clerk`
  或 `Programmer` 来替换该上下文中的 `Person`，因为作为 `Person` 的子类型（直接或间接），这些抽象保证它们至少有能力处理 `name`
  和 `gender` 信息。


  在编程层面，继承提供了一种代码复用机制。在超类型中编写的代码可以被其子类型复用。子类型可以通过添加更多功能或重新定义其超类型的现有功能来扩展其超类型的功能。


  提示


  继承也被用作实现多态的一种技术，这将在下一节讨论。继承让你能够编写多态代码。代码是围绕超类型编写的，并且相同的代码也适用于子类型。


  继承是一个庞大的主题。本书将用完整的一章来介绍如何在 Java 中使用继承。


  ### 多态


  “多态”一词源于两个希腊词根：“poly”（意为“多”）和“morphos”（意为“形态”）。在编程中，多态是指一个实体（例如变量、类、方法、对象、代码、参数等）在不同上下文中呈现不同含义的能力。呈现不同含义的实体被称为多态实体。存在多种类型的多态。每种类型的多态都有一个名称，通常表明该类型多态在实践中是如何实现的。正确使用多态可以产生通用且可复用的代码。多态的目的是通过围绕适用于多种类型（或理想情况下所有类型）的泛型类型编写代码，来编写可复用且可维护的代码。多态可以分为以下两类：


  *   特设多态

  *   通用多态


  如果一段代码仅适用于有限数量的类型，并且所有这些类型在编写代码时都必须已知，则称为特设多态。特设多态也被称为表观多态，因为它并非真正意义上的多态。一些计算机科学纯粹主义者根本不认为特设多态是多态。


  特设多态进一步分为两类：


  *   重载多态

  *   强制多态


  如果一段代码的编写方式使其适用于无限数量的类型（也适用于编写代码时未知的新类型），则称为通用多态。在通用多态中，相同的代码适用于多种类型；而在特设多态中，为不同的类型提供了不同的代码实现，从而给人一种多态的表象。


  通用多态进一步分为两类：


  *   包含多态

  *   参数多态


  在接下来的章节中，我将通过示例详细描述这些类型的多态。




  #### 重载多态


  重载是一种特定多态。当某个方法（在 Java 中称为方法，在其他语言中称为函数）或运算符至少有两个针对不同类型工作的定义时，就会产生重载。在这种情况下，方法或运算符的同一名称被用于其不同的定义。也就是说，同一名称表现出多种行为，因此产生了多态。这类方法和运算符被称为重载方法和重载运算符。Java
  允许你定义重载方法。Java 有一些重载运算符，但它不允许你为抽象数据类型（ADT）重载运算符。也就是说，你不能在 Java 中为某个运算符提供新的定义。清单
  1-7 展示了一个名为 `MathUtil` 的类的代码。


  ```

  // MathUtil.java

  package com.jdojo.concepts;

  public class MathUtil {

  public static int max(int n1, int n2) {

  /* 此处为确定两个整数最大值的代码 */

  }

  public static double max(double n1, double n2) {

  /* 此处为确定两个浮点数最大值的代码 */

  }

  public static int max(int[] num) {

  /* 此处为确定整数数组中最大值的代码 */

  }

  }

  清单 1-7.

  Java 中重载方法的示例

  ```


  `MathUtil` 类的 `max()` 方法被重载了。它有三个定义，每个定义都执行相同的计算最大值任务，但针对不同的类型。第一个定义计算两个 `int` 数据类型的数的最大值，第二个定义计算两个
  `double` 数据类型的浮点数的最大值，第三个定义计算一个 `int` 数据类型的数字数组的最大值。以下代码片段使用了重载的 `max()` 方法的全部三个定义：


  ```

  int max1 = MathUtil.max(10, 23);                 // 使用 max(int, int)double max2
  = MathUtil.max(10.34, 2.89);         // 使用 max(double, double)int max3 = MathUtil.max(new
  int[]{1, 89, 8, 3}); // 使用 max(int[])

  ```


  请注意，方法重载只提供了方法名称的共享。它并不会导致方法定义的共享。在清单 1-7 中，方法名 `max` 被所有三个方法共享，但它们各自都有自己针对不同类型计算最大值的定义。在方法重载中，方法的定义不必相互关联。它们可能执行完全不同的事情，却共享同一个名称。


  以下代码片段展示了 Java 中运算符重载的一个示例。运算符是 `+`。在以下三个语句中，它执行了三种不同的操作：


  ```

  int n1 = 10 + 20;              // 将两个整数相加 double n2 = 10.20 + 2.18;      // 将两个浮点数相加

  String str = "Hi " + "there";  // 拼接两个字符串

  ```


  在第一个语句中，`+` 运算符对两个整数 `10` 和 `20` 执行加法运算，并返回 `30`。在第二个语句中，它对两个浮点数 `10.20` 和 `2.18`
  执行加法运算，并返回 `12.38`。在第三个语句中，它对两个字符串 "Hi " 和 "there" 执行拼接操作，并返回 `"Hi there"`。


  在重载中，方法的实际参数类型（对于运算符来说是操作数的类型）被用来确定使用代码的哪个定义。方法重载只提供了方法名称的重用。你可以通过简单地为重载方法的所有版本提供唯一的名称来消除方法重载。例如，你可以将
  `max()` 方法的三个版本重命名为 `max2Int()`、`max2Double()` 和 `maxNInt()`。请注意，重载方法或运算符的所有版本不必执行相关或相似的任务。在
  Java 中，重载方法名的唯一要求是该方法的所有版本在其形式参数的数量和/或类型上必须有所不同。


  #### 强制多态


  强制是一种特定多态。当一种类型被隐式地自动转换为另一种类型时，即使并非明确意图，也会发生强制。考虑 Java 中的以下语句：


  ```

  int num = 707;

  double d1 = (double)num; // 将 int 显式转换为 double

  double d2 = num;         // 将 int 隐式转换为 double（强制）

  ```


  在第一个语句中，变量 `num` 被声明为 `int` 数据类型，并被赋值为 `707`。第二个语句使用强制转换 `(double)` 将 `num` 中存储的
  `int` 值转换为 `double`，并将转换后的值赋给名为 `d1` 的变量。这是从 `int` 到 `double` 的显式转换情况。在这种情况下，程序员通过使用强制转换明确表达了他的意图。第三个语句与第二个语句的效果完全相同；然而，它依赖于
  Java 语言提供的隐式转换（在 Java 中称为拓宽转换），该转换在需要时自动将 `int` 转换为 `double`。第三个语句是强制的一个示例。编程语言（包括
  Java）在不同上下文中执行不同类型的强制：赋值（如上所示）、方法参数等。


  考虑以下代码片段，它展示了一个 `square()` 方法的定义，该方法接受一个 `double` 数据类型的参数：


  ```

  double square(double num) {

  return num * num;

  }

  ```


  `square()` 方法可以像下面这样使用 `double` 数据类型的实际参数来调用：


  ```

  double d1 = 20.23;

  double result = square(d1);

  ```


  同一个 `square()` 方法也可以像下面这样使用 `int` 数据类型的实际参数来调用：


  ```

  int k = 20;

  double result = square(k);

  ```


  你刚刚看到，`square()` 方法可以处理 `double` 和 `int` 数据类型的参数，尽管你只根据 `double` 数据类型的形式参数定义了一次。这正是多态的含义。在这种情况下，`square()`
  方法被称为相对于 `double` 和 `int` 数据类型的多态方法。因此，即使编写该代码的程序员并未有意为之，`square()` 方法也表现出了多态行为。`square()`
  方法之所以是多态的，是因为 Java 语言提供了隐式类型转换（从 `int` 到 `double` 的强制）。以下是多态方法的一个更正式的定义：


  > 假设 m 是一个声明了类型为 T 的形式参数的方法。如果 S 是一种可以隐式转换为 T 的类型，那么方法 m 就被称为相对于 S 和 T 是多态的。




  #### 包含多态


  包含是一种通用多态。它也被称为子类型（或子类）多态，因为它是通过子类型化或子类化实现的。这是面向对象编程语言支持的最常见的多态类型。Java 支持它。


  当一段使用某种类型编写的代码能够适用于该类型的所有子类型时，就发生了包含多态。这种多态基于子类型化规则成为可能，该规则指出，属于子类型的值也属于其超类型。假设
  `T` 是一个类型，`S1`、`S2`、`S3...` 是 `T` 的子类型。那么属于 `S1`、`S2`、`S3...` 的值也属于 `T`。这个子类型化规则使得编写如下代码成为可能：


  ```

  T t;

  S1 s1;

  S2 s2;

  ...

  t = s1; // s1 类型的值可以赋值给 T 类型的变量

  t = s2; // s2 类型的值可以赋值给 T 类型的变量

  ```


  Java 通过继承（一种子类化机制）来支持包含多态。你可以使用某种类型的形参在 Java 中定义一个方法，例如 `Person`，并且该方法可以在其所有子类型上被调用，例如
  `Employee`、`Student`、`Customer` 等。假设你有一个 `processDetails()` 方法，如下所示：


  ```

  void processDetails(Person p) {

  /* 使用形参 p（类型为 Person）编写代码。如果将 Person 的任何子类的对象传递给此方法，相同的代码也能工作。

  */

  }

  ```


  `processDetails()` 方法声明了一个 `Person` 类型的形参。你可以定义任意数量的类作为 `Person` 类的子类。此方法将适用于这些子类。假设
  `Employee` 和 `Customer` 是 `Person` 类的子类。你可以编写如下代码：


  ```

  Person p1 = 创建一个 Person 对象;

  Employee e1 = 创建一个 Employee 对象;

  Customer c1 = 创建一个 Customer 对象;

  processDetails(p1); // 使用 Person 类型

  processDetails(e1); // 使用 Employee 类型，它是 Person 的子类

  processDetails(c1); // 使用 Customer 类型，它是 Person 的子类

  ```


  子类型化规则的效果是，超类型包含了（因此得名“包含”）所有属于其子类型的值。只有当一段代码能在无限多的类型上工作时，它才被称为通用多态。在包含多态的情况下，代码能工作的类型数量是受限但无限的。限制在于，所有类型都必须是编写代码时所依据类型的子类型。如果对一个类型可以拥有多少个子类型没有限制，那么子类型的数量就是无限的（至少在理论上是这样）。请注意，包含多态不仅让你能够编写可重用的代码，还让你能够编写可扩展和灵活的代码。`processDetails()`
  方法适用于 `Person` 类的所有子类。它将继续适用于将来定义的 `Person` 类的所有子类，而无需任何修改。Java 使用其他机制，如方法覆盖和动态分发（也称为后期绑定），结合子类化规则，使包含多态更加有效和有用。


  #### 参数多态


  参数是一种通用多态。它也被称为“真正的”多态，因为它允许你编写适用于任何类型（相关或不相关）的真正泛型代码。有时，它也被称为泛型。在参数多态中，一段代码的编写方式使其能适用于任何类型。将参数多态与包含多态进行对比。在包含多态中，代码是为一种类型编写的，但适用于其所有子类型。这意味着在包含多态中，代码能工作的所有类型都通过超类型-子类型关系相关联。然而，在参数多态中，相同的代码适用于所有类型，而这些类型不一定相关。参数多态是通过在编写代码时使用类型变量，而不是使用任何特定类型来实现的。类型变量会假定为需要执行代码的特定类型。自
  Java 5 起，Java 通过泛型支持参数多态。Java 支持使用参数多态的多态实体（例如，参数化类）以及多态方法（参数化方法）。


  在 Java 中，参数多态是通过使用泛型实现的。Java 中的所有集合类型都使用泛型。你可以使用泛型编写如下代码：


  ```

  /* 示例 #1 */

  // 创建一个 String 类型的 List

  List<String> sList = new ArrayList<String>();

  // 向 List 中添加两个 String

  sList.add("string 1");

  sList.add("string 2");

  // 从 List 中获取第一个 String

  String s1 = sList.get(0);

  /* 示例 #2 */

  // 创建一个 Integer 类型的 List

  List<Integer> iList = new ArrayList<Integer>();

  // 向 List 中添加两个 Integer

  iList.add(10);

  iList.add(20);

  // 从 List 中获取第一个 Integer

  int k1 = iList.get(0);

  ```


  这段代码将一个 `List` 对象用作 `String` 类型的列表，并将另一个 `List` 对象用作 `Integer` 类型的列表。使用泛型，你可以将 `List`
  对象视为 Java 中任何类型的列表。请注意这些示例中 `<Xxx>` 的用法，它用于指定你想要实例化 `List` 对象的类型。


  ## 总结


  为计算机编写一组指令以完成一项任务被称为编程。这组指令被称为程序。存在不同类型的编程语言。它们在接近硬件能理解的指令的程度或范式上有所不同。机器语言允许你使用
  0 和 1 编写程序，它是最低级的编程语言。用机器语言编写的程序被称为机器码。汇编语言允许你使用助记符编写程序。用汇编语言编写的程序被称为汇编代码。后来，开发了更高级的编程语言，它们使用类似英语的语言。


  实践中存在几种类型的编程范式。编程范式是一种以特定方式观察和分析现实世界问题的思维模式。命令式、过程式、函数式和面向对象是软件开发中广泛使用的一些范式。Java
  是一种支持过程式、函数式和面向对象编程范式的编程语言。


  抽象、封装、继承和多态是面向对象范式的四大支柱。抽象是隐藏程序中与程序用户无关的细节的过程。封装是将多个项目捆绑到一个实体中的过程。继承是以层次结构方式组织类以构建超类型-子类型关系的过程。继承通过允许程序员以超类型的方式编写代码（该代码也适用于所有子类型）来促进代码的可重用性。多态是一种编写一次代码即可操作多种类型的方式。方法重载、方法覆盖、子类型化和泛型是实现多态的一些方法。


  练习题


  以下所有问题的答案都可以在本章的不同部分找到。


  1.  什么是编程，什么是程序？

  2.  汇编器和编译器有什么区别？

  3.  什么是机器语言，用机器语言编写的程序由什么组成？

  4.  什么是汇编语言，用汇编语言编写的程序由什么组成？

  5.  说出三种高级编程语言。

  6.  根据编程语言的代（1GL、2GL 等），Java 和 SQL 属于哪一类？

  7.  什么是编程范式？举例描述过程式、函数式和面向对象范式。

  8.  说出面向对象编程的四大支柱，并举例描述每一个。

  9.  什么是“真正的”多态，Java 如何支持它？

  10. 什么是抽象数据类型？Java 如何支持抽象数据类型？




