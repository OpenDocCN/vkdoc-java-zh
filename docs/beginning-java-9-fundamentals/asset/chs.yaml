  ThaiBuddhistDate now = thaiBuddhistChrono.dateNow();\nThaiBuddhistDate now2 = ThaiBuddhistDate.now();\n\
  System.out.println(\"Current Date in Thai Buddhist: \" + now);\nSystem.out.println(\"\
  Current Date in Thai Buddhist: \" + now2);\n```\n\n```\nCurrent Date in Thai Buddhist:\
  \ ThaiBuddhist BE 2560-08-04\nCurrent Date in Thai Buddhist: ThaiBuddhist BE 2560-08-04\n\
  ```\n\n你也可以将一种日历系统中的日期转换为另一种。ISO 日期\n到非 ISO 日期的转换也是允许的。将日期从一种日历系统\n转换为另一种只需调用目标日期类的\
  \ `from()` 静态方法\n并将源日期对象作为其参数传递即可。清单 16-23 展示了如何\n将 ISO 日期转换为泰国佛教日期，反之亦然。你可能会得到\n\
  不同的输出。\n\n```\n// InterCalendarDates.java\npackage com.jdojo.datetime;\nimport java.time.LocalDate;\n\
  import java.time.chrono.ThaiBuddhistDate;\npublic class InterCalendarDates {\npublic\
  \ static void main(String[] args) {\nThaiBuddhistDate thaiBuddhistNow = ThaiBuddhistDate.now();\n\
  LocalDate isoNow = LocalDate.now();\nSystem.out.println(\"Thai Buddhist Current\
  \ Date: \" + thaiBuddhistNow);\nSystem.out.println(\"ISO Current Date: \" + isoNow);\n\
  // 将泰国佛教日期转换为 ISO 日期，反之亦然\nThaiBuddhistDate thaiBuddhistNow2 = ThaiBuddhistDate.from(isoNow);\n\
  LocalDate isoNow2 = LocalDate.from(thaiBuddhistNow);\nSystem.out.println(\"Thai\
  \ Buddhist Current Date from ISO: \" + thaiBuddhistNow2);\nSystem.out.println(\"\
  ISO Current Date from Thai Buddhist: \" + isoNow2);\n}\n}\n清单 16-23.\n使用泰国佛教日历和\
  \ ISO 日历\n```\n\n```\nThai Buddhist Current Date: ThaiBuddhist BE 2560-08-04\nISO\
  \ Current Date: 2017-08-04\nThai Buddhist Current Date from ISO: ThaiBuddhist BE\
  \ 2560-08-04\nISO Current Date from Thai Buddhist: 2017-08-04\n```\n\n格式化日期和时间\n\
  \n\n\n`DateTimeFormatter` 类的对象可用于格式化和解析日期时间对象。所谓格式化，是指以用户定义的文本形式表示日期时间对象，例如，将 `LocalDate`（2012\
  \ 年 5 月 24 日）表示为“05/24/2012”。有时格式化也被称为打印，因为格式化功能还允许你将日期时间对象的文本表示打印（或输出）到 `Appendable`\
  \ 对象（如 `StringBuilder`）中。\n\n解析是格式化的逆过程。它允许你根据日期时间的文本表示来构造日期时间对象。从文本“05/24/2012”创建一个表示\
  \ 2012 年 5 月 24 日的 `LocalDate` 对象，就是解析的一个示例。\n\n存在多种格式化和解析日期时间的方式。如果你没有以正确的方式学习，格式化日期时间可能会变得困难。需要牢记的最重要的一点是，格式化和解析始终由\
  \ `DateTimeFormatter` 类的对象执行。区别在于你如何创建该对象。`DateTimeFormatter` 类不提供任何公共构造函数。你必须间接获取其对象。起初，困惑之处在于如何获取其对象。请使用\
  \ `DateTimeFormatter` 类的以下两种方法之一来格式化日期、时间或日期时间：\n\n*   `String format(TemporalAccessor\
  \ temporal)`\n\n*   `void formatTo(TemporalAccessor temporal, Appendable appendable)`\n\
  \n`format()` 方法接收一个日期、时间或日期时间对象，并根据格式化程序的规则返回该对象的文本表示。`formatTo()` 方法允许你将对象的文本表示写入\
  \ `Appendable`（例如，文件、`StringBuilder` 等）。\n\n要格式化日期时间对象，格式化程序需要两条信息：格式模式（format pattern）和区域设置（locale）。有时其中一条或两条信息会为你提供默认值；有时则需要你提供它们。\n\
  \n你可以通过多种方式执行格式化。它们都直接或间接地使用 `DateTimeFormatter` 对象。\n\n*   使用预定义的标准日期时间格式化程序\n\n\
  *   使用日期时间类的 `format()` 方法\n\n*   使用用户定义的模式\n\n*   使用 `DateTimeFormatterBuilder`\
  \ 类\n\n使用预定义格式化程序\n\n预定义格式化程序在 `DateTimeFormatter` 类中定义为常量。它们列在表 16-6 中。大多数格式化程序使用\
  \ ISO 日期时间格式；一些格式化程序使用略微修改的 ISO 格式版本。\n\n表 16-6.\n\n预定义日期时间格式化程序\n\n格式化程序\n |  描述\n\
  \ |  示例\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n`BASIC_ISO_DATE`\n\
  \ |  一种 ISO 日期格式化程序，用于格式化和解析日期，在两个日期组件之间不使用分隔符。\n |  `20140109, 20140109-0600`\n\
  \ |\n\n`ISO_DATE,`\n\n`ISO_TIME,`\n\n`ISO_DATE_TIME`\n |  日期、时间和日期时间格式化程序，用于使用 ISO\
  \ 分隔符格式化和解析日期、时间和日期时间。\n |  `2014-01-09, 2014-01-09-06:00,`\n\n`15:38:32.927, 15:38:32.943-06:00,`\n\
  \n`2014-01-09T15:20:07.747-06:00, 2014-01-09T15:20:07.825-06:00[America/Chicago]`\n\
  \ |\n\n`ISO_`  `INSTANT` \n |  一种瞬时格式化程序，用于以 UTC 格式格式化和解析瞬时（或表示瞬时的日期时间对象，如 `ZonedDateTime`）。\n\
  \ |  `2014-01-09T21:23:56.870Z`\n |\n\n`ISO_LOCAL_DATE,`\n\n`ISO_LOCAL_TIME,`\n\n\
  `ISO_LOCAL_DATE_TIME`\n |  日期、时间和日期时间格式化程序，用于格式化和解析不带偏移量的日期、时间和日期时间。\n |  `2014-01-09,\
  \ 15:30:14.352, 2014-01-09T15:29:11.384`\n |\n\n`ISO_OFFSET_DATE,`\n\n`ISO_OFFSET_TIME,`\n\
  \n`ISO_OFFSET_DATE_TIME`\n |  日期、时间和日期时间格式化程序，用于使用 ISO 格式格式化和解析带偏移量的日期、时间和日期时间。\n\
  \ |  `2014-01-09-06:00,`\n\n`15:34:29.851-06:00,`\n\n`2014-01-09T15:33:07.07-06:0`\n\
  \ |\n\n`ISO_ZONED_DATE_TIME`\n |  一种日期时间格式化程序，用于格式化和解析带有时区 ID（如果可用）的日期时间。\n |  `2014-01-09T15:45:49.112-06:00,\
  \ 2014-01-09T15:45:49.128-06:00[America/Chicago]`\n |\n\n`ISO_ORDINAL_DATE`\n |\
  \  一种日期格式化程序，用于格式化和解析包含年份和年中天数的日期。\n |  `2014-009`\n |\n\n`ISO_WEEK_DATE`\n |  一种日期格式化程序，用于格式化和解析基于周的日期。格式为\
  \ 年-周数-星期几。例如，2014-W02-4 表示 2014 年第二周的第四天。\n |  `2014-W02-4,`\n\n`2014-W02-4-06:00`\n\
  \ |\n\n`RFC_1123_DATE_TIME`\n |  一种日期时间格式化程序，用于使用 RFC1123 规范格式化和解析电子邮件的日期时间。\n |\
  \  `Thu, 9 Jan 2014 15:50:44 -05:00`\n |\n\n使用预定义格式化程序很简单：只需将日期/时间对象传递给 `format()`\
  \ 方法。以下代码片段使用 `ISO_DATE` 格式化程序来格式化 `LocalDate`、`OffsetDateTime` 和 `ZonedDateTime`。由于它格式化并打印当前日期，你可能会得到不同的输出。\n\
  \n```\nimport java.time.LocalDate;\nimport java.time.OffsetDateTime;\nimport java.time.ZonedDateTime;\n\
  import static java.time.format.DateTimeFormatter.ISO_DATE;\n...\n// 使用 ISO_DATE\
  \ 格式化程序格式化日期\nString ldStr = ISO_DATE.format(LocalDate.now());\nString odtStr =\
  \ ISO_DATE.format(OffsetDateTime.now());\nString zdtStr = ISO_DATE.format(ZonedDateTime.now());\n\
  System.out.println(\"本地日期: \" + ldStr);\nSystem.out.println(\"偏移日期时间: \" + odtStr);\n\
  System.out.println(\"时区日期时间: \" + zdtStr);\n```\n\n```\n本地日期: 2017-08-04\n偏移日期时间:\
  \ 2017-08-04-05:00\n时区日期时间: 2017-08-04-05:00\n```\n\n请注意预定义格式化程序的名称。被格式化的日期时间对象必须包含其名称所暗示的组件。例如，`ISO_DATE`\
  \ 格式化程序期望存在日期组件，因此不应将其用于格式化仅包含时间的对象（如 `LocalTime`）。类似地，`ISO_TIME` 格式化程序应用于格式化 `LocalDate`。\n\
  \n```\n// 运行时错误，因为 LocalTime 不包含日期组件\nString ltStr = ISO_DATE.format(LocalTime.now());\n\
  ```\n\n使用日期时间类的 format() 方法\n\n你可以使用日期时间对象的 `format()` 方法对其进行格式化。`format()` 方法接收一个\
  \ `DateTimeFormatter` 类的对象。以下代码片段使用了这种方法。这里使用了 `ISO_DATE` 格式化程序。\n\n```\nimport\
  \ java.time.LocalDate;\nimport java.time.OffsetDateTime;\nimport java.time.ZonedDateTime;\n\
  import static java.time.format.DateTimeFormatter.ISO_DATE;\n...\nLocalDate ld =\
  \ LocalDate.now();\nString ldStr = ld.format(ISO_DATE);\nSystem.out.println(\"本地日期:\
  \ \" + ldStr);\nOffsetDateTime odt = OffsetDateTime.now();\nString odtStr = odt.format(ISO_DATE);\n\
  System.out.println(\"偏移日期时间: \" + odtStr);\nZonedDateTime zdt = ZonedDateTime.now();\n\
  String zdtStr = zdt.format(ISO_DATE);\nSystem.out.println(\"时区日期时间: \" + zdtStr);\n\
  ```\n\n```\n本地日期: 2017-08-04\n偏移日期时间: 2017-08-04-05:00\n时区日期时间: 2017-08-04-05:00\n\
  ```\n\n使用用户定义的模式\n\n`DateTimeFormatter` 类中最常用的方法之一是 `ofPattern()` 方法，它返回一个具有指定格式模式和区域设置的\
  \ `DateTimeFormatter` 对象。\n\n*   `static DateTimeFormatter ofPattern(String pattern)`\n\
  \n*   `static DateTimeFormatter ofPattern(String pattern, Locale locale)`\n\n以下代码片段获取两个格式化程序，用于以“月份\
  \ 日, 年份”格式格式化日期。第一个格式化程序使用默认区域设置格式化日期时间，第二个使用德语区域设置。\n\n```\n// 获取默认区域设置的格式化程序\n\
  DateTimeFormatter fmt1 = DateTimeFormatter.ofPattern(\"MMMM dd, yyyy\");\n// 获取德语区域设置的格式化程序\n\
  DateTimeFormatter fmt2 = DateTimeFormatter.ofPattern(\"MMMM dd, yyyy\", Locale.GERMAN);\n\
  ```\n\n\n\n有时你会有一个包含模式和区域设置的 `DateTimeFormatter` 对象。你想使用相同的模式在另一个区域设置中格式化日期时间。`DateTimeFormatter`\
  \ 类有一个 `withLocale()` 方法，它会返回一个使用相同模式、针对指定区域设置的 `DateTimeFormatter` 对象。在前面的代码片段中，你可以将第二条语句替换为以下语句：\n\
  \n```\n// 获取一个使用与 fmt1 相同模式的德语区域设置格式化器\nDateTimeFormatter fmt2 = fmt1.withLocale(Locale.GERMAN);\n\
  ```\n\n提示\n\n使用 `DateTimeFormatter` 类的 `getLocale()` 方法来了解它将用于格式化日期时间的区域设置。\n\n\
  日期时间格式化是基于模式执行的。格式化模式是一系列具有特殊含义的字符。例如，模式中的 `MMMM` 使用月份的完整拼写名称，如 January、February\
  \ 等；`MMM` 使用月份名称的缩写形式，如 Jan、Feb 等；`MM` 使用两位数的月份数字，如 01、02 等；`M` 使用一位或两位数的月份数字，如\
  \ 1、2、10、11 等。\n\n在格式模式中，有些字符具有特殊含义，有些则按字面使用。具有特殊含义的字符将由格式化器解释，并替换为日期时间组件。格式化器会按原样输出模式中的字面字符。所有字母，A\
  \ 到 Z 和 a 到 z，都被保留为模式字母，尽管并非所有字母都被使用。如果你想在模式中包含字面字符串，需要将其括在单引号中。要输出单引号，需要使用两个连续的单引号。\n\
  \n日期时间格式化器会直接输出任何非字母字符（`[`、`]` 和单引号除外）。但是，建议将它们括在单引号中。假设你有一个本地日期为 2012 年 5 月 29\
  \ 日。模式 \"1997 MMMM dd, yyyy\" 和 \"'1997' MMMM dd, yyyy\" 都会输出 1997 May 29, 2012；然而，推荐使用后者，它在字面量\
  \ 1997 周围使用了单引号。\n\n表 16-7 列出了模式中使用的符号及其含义。表中的所有示例均使用“2012-07-29T07:30:12.789-05:00[America/Chicago]”作为输入日期时间。\n\
