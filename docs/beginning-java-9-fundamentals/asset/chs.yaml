  \ s = t;\ns.swim(); // 可以。使用 s，你只能访问 swim() 方法\n```\n\n部分实现接口\n\n一个类同意为其实现的所有接口中的所有抽象方法提供实现。然而，一个类并不一定要为所有方法都提供实现。换句话说，一个类可以提供已实现接口的部分实现。回想一下，接口隐式地是\
