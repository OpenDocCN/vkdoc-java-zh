  \n```\n    A a = new B();\n    B b = new B();\n    a = b;\n    b = a;\n    ```\n\
  \n14. 早期绑定和晚期绑定之间的区别是什么？哪种类型的绑定完全由编译器决定？\n\n15. 写出运行以下类 `B` 时的输出。此练习旨在测试你对早期绑定和晚期绑定的理解。\n\
  \n```\n    public class A {\n    public void m1() {\n    System.out.println(\"A.m1()\"\
  );\n    }\n    public static void m2() {\n    System.out.println(\"A.m2()\");\n\
  \    }\n    }\n    public class B extends A {\n    @Override\n    public void m1()\
  \ {\n    System.out.println(\"B.m1()\");\n    }\n    public static void m2() {\n\
  \    System.out.println(\"B.m2()\");\n    }\n    public static void main(String[]\
  \ args) {\n    A a = new B();\n    a.m1();\n    a.m2();\n    ((B)a).m2();\n    A.m2();\n\
  \    B.m2();\n    }\n    }\n    ```\n\n16. 在进行向下转型引用之前，你应该使用哪个运算符，以确保向下转型总是成功？\n\
  \n17. 写出以下代码片段的输出：\n\n```\n    public class A {\n    }\n    public class B extends\
  \ A {\n    }\n    A a = new B();\n    System.out.println(\"a instanceof A: \" +\
  \ (a instanceof A));\n    System.out.println(\"a instanceof B: \" + (a instanceof\
  \ B));\n    System.out.println(\"a instanceof Object: \" + (a instanceof Object));\n\
  \    System.out.println(\"null instanceof A: \" + (null instanceof A));\n    System.out.println(\"\
  null instanceof B: \" + (null instanceof B));\n    ```\n\n18. 解释为什么以下类 `B` 的声明无法通过编译。\n\
  \n```\n    public abstract class A {\n    public abstract void print();\n    }\n\
  \    public class B extends A {\n    }\n    ```\n\n19. 解释为什么以下类 `B` 的声明无法通过编译。\n\
  \n```\n    public class A {\n    private A() {\n    System.out.println(\"Hello\"\
  );\n    }\n    }\n    public class B extends A {\n    }\n    ```\n\n20. 写出运行以下类\
  \ `B` 时的输出。此练习旨在测试你对字段隐藏、方法重写以及使用 `super` 关键字调用超类方法的理解。\n\n```\n    public class\
  \ A {\n    protected int x = 100;\n    public A() {\n    System.out.println(\"x\
  \ = \" + x);\n    }\n    public void print() {\n    System.out.println(\"x = \"\
  \ + x);\n    }\n    }\n    public class B extends A {\n    private final int x =\
  \ 200;\n    public B() {\n    System.out.println(\"x = \" + x);\n    }\n    @Override\n\
  \    public void print() {\n    super.print();\n    System.out.println(\"x = \"\
  \ + x);\n    }\n    public static void main(String[] args) {\n    A a = new B();\n\
  \    a.print();\n    }\n    }\n    ```\n\n21. 接口\n\n在本章中，你将学习：\n\n*   什么是接口\n\n\
  *   如何声明接口\n\n*   如何在接口中声明抽象方法、默认方法和静态方法\n\n*   如何在类中完全和部分实现接口\n\n*   如何在接口发布后对其进行演进\n\
  \n*   如何从其他接口继承接口\n\n*   将 `instanceof` 运算符与接口一起使用\n\n*   什么是标记接口\n\n*   接口如何用于实现多态\n\
  \n*   动态绑定如何应用于接口类型变量的方法调用\n\n本章中的所有示例程序都是 `jdojo.interfaces` 模块的成员，如清单 21-1 中所声明。\n\
  \n```\n// module-info.java\nmodule jdojo.interfaces {\nexports com.jdojo.interfaces;\n\
  }\n清单 21-1.\njdojo.interfaces 模块的声明\n```\n\n什么是接口？\n\n接口是 Java 中一个非常重要的概念。除非 Java\
  \ 开发人员理解接口的作用，否则其知识体系是不完整的。通过示例比通过正式定义更容易理解接口。在我给出其正式定义之前，让我们先讨论一个简单的示例，这将为详细讨论接口的必要性奠定基础。\n\
  \n一个 Java 应用程序由相互交互的对象组成。一个对象通过发送消息与其他对象进行交互。对象接收消息的能力是通过在对象的类中提供方法来实现的。假设有一个名为\
  \ `Person` 的类，它提供了一个 `walk()` 方法。`walk()` 方法使得 `Person` 类的每个对象都能够接收“行走”消息。让我们如下定义\
  \ `Person` 类：\n\n```\npublic class Person {\nprivate String name;\npublic Person(String\
  \ name) {\nthis.name = name;\n}\npublic void walk() {\nSystem.out.println(name +\
  \ \" (a person) is walking.\");\n}\n}\n```\n\n`Person` 类的对象将有一个名称，该名称在其构造函数中设置。当它接收到“行走”消息时，即当它的\
  \ `walk()` 方法被调用时，它会在标准输出上打印一条消息。\n\n\n\n让我们创建一个名为 `Walkables` 的工具类，用于向一组对象发送特定消息。假设你想为\
  \ `Walkables` 类添加一个 `letThemWalk()` 静态方法，该方法接收一个 `Person` 对象数组，并向数组中的所有元素发送“行走”消息。你可以按如下方式定义\
  \ `Walkables` 类。该方法名副其实，即让每个人行走！\n\n```\npublic class Walkables {\npublic static\
  \ void letThemWalk(Person[] list) {\nfor (Person person : list) {\nperson.walk();\n\
  }\n}\n}\n```\n\n以下代码片段可用于测试 `Person` 和 `Walkables` 类：\n\n```\npublic class WalkablesTest\
  \ {\npublic static void main(String[] args) {\nPerson[] persons = new Person[3];\n\
  persons[0] = new Person(\"Jack\");\npersons[1] = new Person(\"Jeff\");\npersons[2]\
  \ = new Person(\"John\");\n// 让每个人行走\nWalkables.letThemWalk(persons);\n}\n}\nJack\
  \ (a person) is walking.\nJeff (a person) is walking.\nJohn (a person) is walking.\n\
  ```\n\n到目前为止，你并未发现 `Person` 和 `Walkables` 类的设计有任何问题，对吧？它们执行了设计之初要执行的操作。`Person`\
  \ 类的设计保证了其对象能够响应“行走”消息。通过在 `Walkables` 类的 `letThemWalk()` 方法中将 `Person` 数组声明为参数类型，编译器确保了\
  \ `persons[i].walk()` 调用的有效性，因为 `Person` 对象保证能够响应“行走”消息。\n\n现在，让我们通过添加一个名为 `Duck`\
  \ 的新类来扩展这个项目，该类代表现实世界中的鸭子。我们都知道鸭子也能行走。鸭子还能做许多人类能做或不能做的其他事情。然而，为了便于讨论，我们将只关注鸭子的行走能力。你可以按如下方式定义\
  \ `Duck` 类：\n\n```\npublic class Duck {\nprivate String name;\npublic Duck(String\
  \ name) {\nthis.name = name;\n}\npublic void walk() {\nSystem.out.println(name +\
  \ \" (a duck) is walking.\");\n}\n}\n```\n\n你可能注意到 `Person` 类和 `Duck` 类之间存在相似之处。这两个类的对象都能响应“行走”消息，因为它们都提供了\
  \ `walk()` 方法。然而，这两个类之间的相似之处仅此而已。除了它们都以 `Object` 类作为共同祖先之外，它们之间没有任何其他联系。`Duck` 类的引入扩展了应用程序中对象的行走能力。在鸭子出现之前，只有人能行走。添加\
  \ `Duck` 类之后，鸭子也能行走了。\n\n现在，你想使用 `Walkables` 类让鸭子行走。你的 `Walkables` 类能让鸭子行走吗？不能。除非你做一些修改，否则它无法让鸭子行走。鸭子能够行走这一事实对现有的\
  \ `Walkables` 类来说并不是问题。目前的问题在于 `letThemWalk()` 方法将其参数类型声明为 `Person` 数组。而鸭子不是人。你不能编写如下所示的代码。`Duck`\
  \ 对象不能赋值给 `Person` 类型的引用变量。以下代码片段将无法编译：\n\n```\nPerson[] list = new Person[3];\n\
  list[0] = new Person(\"Jack\");\nlist[1] = new Duck(\"Jeff\"); // 编译时错误\nlist[2]\
  \ = new Person(\"John\");\nWalkables.letThemWalk(list);\n```\n\n如何解决这个问题，以便你的 `Walkables`\
  \ 类能让一个人和一只鸭子一起行走？根据你现有的 Java 编程语言知识，有三种方法可以解决这个问题。请注意，我们目前不讨论接口。在本节末尾，你将使用接口高效且正确地解决这个问题。现在先暂时忘记本章的标题，这样你才能体会到接口在\
  \ Java 编程中所扮演的重要角色。解决这个问题的三种方法如下：\n\n*   将 `Walkables` 类的 `letThemWalk()` 方法的参数类型从\
  \ `Person` 数组改为 `Object` 数组。使用反射来调用传入数组中所有元素的 `walk()` 方法。目前不必担心“反射”这个术语。这将在本系列第二卷的第\
  \ 3 章中介绍。\n\n*   在 `Walkables` 类中定义一个新的静态方法，名为 `letDucksWalk(Duck[] ducks)`。当你想让鸭子行走时，调用此方法。\n\
  \n*   让 `Person` 和 `Duck` 类继承自一个共同的祖先类，例如 `Animal` 类，并在 `Animal` 类中添加一个 `walk()`\
  \ 方法。将 `Walkables` 类的 `letThemWalk()` 方法的参数类型从 `Person` 数组改为 `Animal` 数组。\n\n让我们详细看看这三种解决方案。\n\
  \n**提议的解决方案 #1**\n\n你可以通过向 `Walkables` 类添加两个方法来实现第一个解决方案，如下所示：\n\n```\n// Walkables.java\n\
  import java.lang.reflect.Method;\npublic class Walkables {\npublic static void letThemWalk(Object[]\
  \ list) {\nfor (Object obj : list) {\n// 获取 walk 方法的引用\nMethod walkMethod = getWalkMethod(obj);\n\
  if (walkMethod != null) {\ntry {\n// 调用 walk() 方法\nwalkMethod.invoke(obj);\n} catch\
  \ (Exception e) {\ne.printStackTrace();\n}\n}\n}\n}\npublic static Method getWalkMethod(Object\
  \ obj) {\nClass c = obj.getClass();\ntry {\nMethod walkMethod = c.getMethod(\"walk\"\
  );\nreturn walkMethod;\n} catch (NoSuchMethodException e) {\n// walk() 方法不存在\n}\n\
  return null;\n}\n}\n```\n\n`getWalkMethod()` 方法在指定对象的类中查找 `walk()` 方法。如果找到 `walk()`\
  \ 方法，则返回该方法的引用。否则，返回 `null`。你已经将 `letThemWalk()` 方法的参数类型从 `Person` 数组改为 `Object`\
  \ 数组。你可以使用以下代码片段来测试修改后的 `Walkables` 类：\n\n```\nObject[] list = new Object[4];\n\
  list[0] = new Person(\"Jack\");\nlist[1] = new Duck(\"Jeff\");\nlist[2] = new Person(\"\
  John\");\nlist[3] = new Object(); // 没有 walk() 方法\n// 让每个人行走\nWalkables.letThemWalk(list);\n\
  Jack (a person) is walking.\nJeff (a duck) is walking.\nJohn (a person) is walking.\n\
  ```\n\n输出表明你的解决方案有效。它让人和鸭子一起行走。同时，如果某个对象不知道如何行走，它也不会强制该对象行走。你向 `letThemWalk()` 方法传递了四个对象，并且没有尝试对数组的第四个元素调用\
  \ `walk()` 方法，因为 `Object` 类没有 `walk()` 方法。\n\n我们拒绝这个解决方案，原因很简单：你使用反射来调用传入的所有对象的\
  \ `walk()` 方法，并且你依赖于所有知道如何行走的对象都会有一个名为“walk”的方法这一事实。如果你更改了方法名称，例如在 `Person` 类中将\
  \ `walk()` 改为 `walkMe()`，这个解决方案很容易在静默中失效。你的程序将继续运行而不会出现任何错误，但是当你使用 `Person` 对象调用\
  \ `letThemWalk()` 方法时，其已更改的 `walkMe()` 方法将不会被调用。\n\n**提议的解决方案 #2**\n\n让我们看看第二个提议的解决方案。你提议向\
  \ `Walkables` 类添加一个新方法 `letDucksWalk()`，如下所示：\n\n```\npublic class Walkables {\n\
  public static void letThemWalk(Person[] list) {\nfor (Person person : list) {\n\
  person.walk();\n}\n}\npublic static void letDucksWalk(Duck[] list) {\nfor (Duck\
  \ duck : list) {\nduck.walk();\n}\n}\n}\n```\n\n\n\n这解决了问题，因为它能让所有鸭子行走。  \n然而，这也不是一个理想的解决方案。它仍然无法让人和鸭子一起行走。这个方案的另一个问题是可扩展性。它不是一个可扩展的解决方案。如果你观察这两个方法，`letThemWalk()`\
  \ 和 `letDucksWalk()`，你会发现除了参数类型 `Person` 和 `Duck` 不同之外，它们的逻辑完全相同。如果你添加一个名为 `Cat`\
  \ 的新类，且其对象也能行走，会发生什么？这个方案会迫使你在 `Walkables` 类中再添加一个方法 `letCatsWalk(Cat[] cats)`。因此，你应该拒绝这个方案，因为它不可扩展。\n\
  \n**提议方案 #3**\n\n让我们来看第三个提议方案。它建议让 `Person` 类和 `Duck` 类继承自一个共同的祖先类，比如 `Animal`，该类拥有一个\
  \ `walk()` 方法。这还会要求你将 `Walkables` 类中 `letThemWalk()` 方法的参数从 `Person` 数组改为 `Animal`\
  \ 数组。这个方案非常接近你正在寻找的方案，并且在某些情况下可能被认为是一个好方案。然而，你基于以下两个原因拒绝了它：\n\n*   这个方案迫使你在类层次结构中拥有一个共同的祖先。例如，所有其对象知道如何行走的类都必须有相同的祖先（直接或间接）。假设你创建了一个名为\
  \ `Dog` 的新类，其对象可以行走。在这个提议方案下，`Dog` 类必须继承自 `Animal` 类，这样你才能使用 `letThemWalk()` 方法让\
  \ `Dog` 行走。有时，你想为某个已继承自其他类的类的对象添加行走能力。在这种情况下，无法将现有类的超类更改为 `Animal` 类。\n\n*   假设你继续采用这个方案。你添加了一个名为\
  \ `Fish` 的新类，它继承自 `Animal` 类。`Fish` 类的对象不知道如何行走。因为 `Fish` 类继承自 `Animal` 类，它也会继承\
  \ `walk()` 方法，即行走的能力。显然，你需要在 `Fish` 类中重写 `walk()` 方法。现在问题来了，`Fish` 类应该如何实现 `walk()`\
  \ 方法？它应该回应说“我是一条鱼，我不知道如何行走”吗？还是应该抛出一个异常，说明“要求鱼行走是非法的”？\n\n你可以看到，第三个方案似乎非常接近了。然而，它并非理想方案。这也证明了一点：继承在\
  \ Java 程序中是好事，但它并不总能提供理想的解决方案。\n\n**理想方案**\n\n你正在寻找一个能提供以下两点的解决方案：\n\n*   `Walkables`\
  \ 类中的一个单一方法 `letThemWalk()`，应该能够向所有作为参数传递给它的对象发送一条“行走”消息（即调用 `walk()` 方法）。这个方法应该适用于所有能够行走的对象类型（无论是现在已有的还是将来会有的）。\n\
  \n*   如果你想为某个现有类的对象添加行走能力，你不应该被迫更改该类的超类。\n\n在这种情况下，Java 中的接口提供了一个完美的解决方案。在我们开始详细讨论接口之前，先完成本节中问题的解决方案。首先，你需要定义一个接口。现在，只需将接口视为一种编程结构即可。\n\
  \n接口使用关键字 `interface` 声明，它可以包含 `abstract` 方法声明。请注意，`abstract` 方法没有方法体。每个接口都应该有一个名称。你的接口命名为\
  \ `Walkable`。它包含一个名为 `walk()` 的方法。你的 `Walkable` 接口的完整代码如代码清单 21-2 所示。\n\n```\n//\
  \ Walkable.java\npackage com.jdojo.interfaces;\npublic interface Walkable {\nvoid\
  \ walk();\n}\n代码清单 21-2.\nWalkable 接口的声明\n```\n\n所有其对象能够行走的类都应该实现 `Walkable` 接口。一个类可以在其声明中使用关键字\
  \ `implements` 来实现一个或多个接口。通过实现一个接口，该类保证它将为接口中声明的所有 `abstract` 方法提供实现，否则该类将声明自身为\
  \ `abstract`。现在，我们先忽略第二部分，假设该类实现了它所实现接口的所有 `abstract` 方法。如果一个类实现了 `Walkable` 接口，它必须为\
  \ `walk()` 方法提供实现。\n\n`Person` 和 `Duck` 类的对象需要具备行走能力。你需要让这些类实现 `Walkable` 接口。代码清单\
  \ 21-3 和代码清单 21-4 包含了这些类的完整修订代码。\n\n```\n// Person.java\npackage com.jdojo.interfaces;\n\
  public class Person implements Walkable {\nprivate String name;\npublic Person(String\
  \ name) {\nthis.name = name;\n}\npublic void walk() {\nSystem.out.println(name +\
  \ \" (a person) is walking.\");\n}\n}\n代码清单 21-3.\n修订后的 Person 类，实现了 Walkable 接口\n\
  ```\n\n```\n// Duck.java\npackage com.jdojo.interfaces;\npublic class Duck implements\
  \ Walkable {\nprivate String name;\npublic Duck(String name) {\nthis.name = name;\n\
  }\npublic void walk() {\nSystem.out.println(name + \" (a duck) is walking.\");\n\
  }\n}\n代码清单 21-4.\n修订后的 Duck 类，实现了 Walkable 接口\n```\n\n请注意，修订后的类声明与原始声明有一个细微差别。它们的声明中都添加了一个新的\
  \ `implements Walkable` 子句。由于它们都实现了 `Walkable` 接口，因此必须按照 `Walkable` 接口中的声明提供 `walk()`\
  \ 方法的实现。你不需要重新定义一个新的 `walk()` 方法，因为从一开始它们就已经实现了。如果这些类没有 `walk()` 方法，你需要在现阶段为它们添加。\n\
  \n在修订 `Walkables` 类的代码之前，让我们看看你还能用 `Walkable` 接口做哪些其他事情。与类一样，接口定义了一种新的引用类型。当你定义一个类时，它定义了一种新的引用类型，并允许你声明该类型的变量。类似地，当你定义一个新的接口（例如\
  \ `Walkable`）时，你可以定义该新接口类型的引用变量。变量的作用域可以是局部的、实例的、静态的或方法参数。以下声明是有效的：\n\n```\n// w\
  \ 是 Walkable 类型的引用变量\nWalkable w;\n```\n\n你不能创建接口类型的对象。以下代码是无效的：\n\n```\n// 编译时错误\n\
  new Walkable();\n```\n\n你只能创建类类型的对象。然而，接口类型的变量可以引用任何其类实现了该接口的对象。因为 `Person` 和 `Duck`\
  \ 类实现了 `Walkable` 接口，所以 `Walkable` 类型的引用变量可以引用这些类的对象。\n\n```\nWalkable w1 = new\
  \ Person(\"Jack\"); // 正确\nWalkable w2 = new Duck(\"Jeff\");   // 正确\n// 编译时错误，因为\
  \ Object 类没有实现 Walkable 接口\nWalkable w3 = new Object();\n```\n\n\n\n接口类型的引用变量能做什么？你可以通过其引用类型变量访问接口的任何成员。由于你的\
  \ `Walkable` 接口只有一个成员，即 `walk()` 方法，因此你可以编写如下代码：\n\n```\n// 让人行走\nw1.walk();\n//\
  \ 让鸭子行走\nw2.walk();\n```\n\n当你在 `w1` 上调用 `walk()` 方法时，它会调用 `Person` 对象的 `walk()`\
  \ 方法，因为 `w1` 引用的是一个 `Person` 对象。当你在 `w2` 上调用 `walk()` 方法时，它会调用 `Duck` 对象的 `walk()`\
  \ 方法，因为 `w2` 引用的是一个 `Duck` 对象。当你使用接口类型的引用变量调用方法时，它会在该变量所引用的对象上调用该方法。了解了接口的这些知识后，让我们修改一下\
  \ `Walkables` 类的代码。清单 21-5 包含了修改后的代码。请注意，在修改后的 `letThemWalk()` 方法中，你只需将参数类型从 `Person`\
  \ 改为 `Walkable`。其他一切保持不变。\n\n```\n// Walkables.java\npackage com.jdojo.interfaces;\n\
  public class Walkables {\npublic static void letThemWalk(Walkable[] list) {\nfor\
  \ (Walkable w : list) {\nw.walk();\n}\n}\n}\n清单 21-5. 修改后的 Walkables 类\n```\n\n\
  清单 21-6 展示了如何使用 `Walkable` 接口测试修改后的类。它创建了一个 `Walkable` 类型的数组。允许声明接口类型的数组，因为数组提供了一种快捷方式，可以创建多个相同类型的变量。这次，你可以将\
  \ `Person` 类和 `Duck` 类的对象放入一个 `Walkable` 类型的数组中，传递给 `Walkables` 类的 `letThemWalk()`\
  \ 方法，让它们一起行走，如输出所示。\n\n```\n// WalkablesTest.java\npackage com.jdojo.interfaces;\n\
  public class WalkablesTest {\npublic static void main(String[] args) {\nWalkable[]\
  \ w = new Walkable[3];\nw[0] = new Person(\"Jack\");\nw[1] = new Duck(\"Jeff\");\n\
  w[2] = new Person(\"John\");\n// 让所有人行走\nWalkables.letThemWalk(w);\n}\n}\nJack (a\
  \ person) is walking.\nJeff (a duck) is walking.\nJohn (a person) is walking.\n\
  清单 21-6. 用于测试修改后的 Person、Duck 和 Walkables 类的测试类\n```\n\n如果你想创建一个名为 `Cat` 的新类，并且它的对象应该具备行走能力，那么你现有的代码将如何变化？你会惊讶地发现，你不需要对现有代码做任何修改。`Cat`\
  \ 类只需要实现 `Walkable` 接口即可。清单 21-7 包含了 `Cat` 类的代码。\n\n```\n// Cat.java\npackage com.jdojo.interfaces;\n\
  public class Cat implements Walkable {\nprivate String name;\npublic Cat(String\
  \ name) {\nthis.name = name;\n}\npublic void walk() {\nSystem.out.println(name +\
  \ \" (a cat) is walking.\");\n}\n}\n清单 21-7. Cat 类\n```\n\n你可以使用以下代码片段，用现有代码测试新的\
  \ `Cat` 类。从输出可以看出，通过使用 `Walkable` 接口，你已经让人、鸭子和猫一起行走了！这就是 Java 中接口的用途之一：它允许你将不相关的类置于一个统一的框架之下。\n\
  \n```\nWalkable[] w = new Walkable[4];\nw[0] = new Person(\"Jack\");\nw[1] = new\
  \ Duck(\"Jeff\");\nw[2] = new Person(\"John\");\nw[3] = new Cat(\"Jace\");\n// 让所有人行走\n\
  Walkables.letThemWalk(w);\nJack (a person) is walking.\nJeff (a duck) is walking.\n\
  John (a person) is walking.\nJace (a cat) is walking.\n```\n\n你已经实现了让不同类型的对象通过接口结构一起行走的目标。那么，接口到底是什么呢？\n\
  \nJava 中的接口定义了一种引用类型，用于指定一个抽象概念。它由提供该概念实现的类来实现。在 Java 8 之前，接口只能包含抽象方法，因此它代表了一个纯粹的抽象概念。Java\
  \ 8 允许接口拥有静态方法和默认方法，这些方法也可以包含实现。接口让你能够通过抽象概念在不相关的类之间定义关系。在你的例子中，`Walkable` 接口代表了一个概念，它使你能够以相同的方式对待\
  \ `Person` 和 `Duck` 这两个不相关的类，因为两者都实现了相同的概念（行走）。\n\n现在是时候详细了解一下如何在 Java 程序中创建和使用接口了。在讨论接口的技术细节时，我也会介绍接口的正确用法和常见误用。\n\
  \n声明接口\n\n接口可以声明为顶层接口、嵌套接口或注解类型。我将在本章后面讨论嵌套接口。注解类型接口在本系列第二卷的第 1 章中讨论。我使用术语“接口”来指代顶层接口。声明接口的一般（不完整）语法如下：\n\
  \n```\n[修饰符] interface <接口名> {\n\n}\n```\n\n接口声明以可选的修饰符列表开头。与类一样，接口可以具有 public 或包级作用域。关键字\
  \ `public` 用于表示接口具有公共作用域。公共接口可以在应用程序中的任何位置被引用。跨模块引用接口取决于模块的可访问性规则，如第 10 章所述。缺少作用域修饰符表示接口具有包级作用域。具有包级作用域的接口只能在其包内的成员中被引用。\n\
  \n关键字 `interface` 用于声明接口。该关键字后面跟着接口的名称。接口的名称是一个有效的 Java 标识符。接口体位于其名称之后，并放在大括号内。接口的成员在接口体内声明。在特殊情况下，接口体可以为空。以下是最简单的接口声明：\n\
  \n```\npackage com.jdojo.interfaces;\ninterface Updatable {\n// 接口体为空\n}\n```\n\n\
  这段代码声明了一个名为 `Updatable` 的接口，它具有包级作用域。由于它具有包级作用域，因此只能在 `com.jdojo.interfaces` 包内部使用。它不包含任何成员声明。\n\
  \n与类一样，接口有简单名称和完全限定名称。关键字 `interface` 后面的标识符是其简单名称。接口的完全限定名称由其包名和简单名称用点号分隔组成。在前面的例子中，`Updatable`\
  \ 是简单名称，`com.jdojo.interfaces.Updatable` 是完全限定名称。使用接口的简单名称和完全限定名称的规则与类相同。\n\n以下代码声明了一个名为\
  \ `ReadOnly` 的接口。它具有公共作用域。也就是说，`ReadOnly` 接口的定义在同一模块或其他模块中的任何位置都可用，具体取决于模块的可访问性规则。\n\
  \n```\npackage com.jdojo.interfaces;\npublic interface ReadOnly {\n// 接口体为空\n}\n\
  ```\n\n接口声明是隐式抽象的。你可以如下声明 `Updatable` 和 `ReadOnly` 接口，而不会改变它们的含义。换句话说，无论你是否显式地将接口声明为\
  \ `abstract`，接口声明始终是 `abstract` 的。\n\n```\nabstract interface Updatable {\n// 接口体为空\n\
  }\npublic abstract interface ReadOnly {\n// 接口体为空\n}\n```\n\n注意\n\n\n\nJava 中的接口隐式为\
  \ `abstract`。在接口声明中使用 `abstract` 关键字已过时，不应在新程序中使用。之前的示例仅用于说明目的。\n\n声明接口成员\n\n接口可以包含三种类型的成员：\n\
  \n*   常量字段\n\n*   抽象方法、静态方法和默认方法\n\n*   静态类型（嵌套接口和类）\n\n请注意，接口声明与类声明非常相似，但接口不能包含可变的实例变量和类变量。与类不同，接口无法被实例化。接口的所有成员隐式为\
  \ public。\n\n提示\n\n在 Java 8 之前，接口中所有类型的成员都隐式为 public。Java 9 允许在接口中拥有私有方法，我将在本章后面讨论这一点。\n\
  \n常量字段声明\n\n你可以在接口中声明常量字段，如清单 21-8 所示。它声明了一个名为 `Choices` 的接口，其中包含两个 `int` 字段的声明：`YES`\
  \ 和 `NO`。\n\n```\n// Choices.java\npackage com.jdojo.interfaces;\npublic interface\
  \ Choices {\npublic static final int YES = 1;\npublic static final int NO = 2;\n\
  }\n清单 21-8.\n在接口中声明字段\n```\n\n接口中的所有字段都隐式为 `public`、`static` 和 `final`。尽管接口声明语法允许在字段声明中使用这些关键字，但使用它们是多余的。建议在接口中声明字段时不要使用这些关键字。`Choices`\
  \ 接口可以声明如下，其含义不变：\n\n```\npublic interface Choices {\nint YES = 1;\nint NO = 2;\n\
  }\n```\n\n你可以使用点符号以如下形式访问接口中的字段：\n\n```\n<接口名>.<字段名>\n```\n\n你可以使用 `Choices.YES`\
  \ 和 `Choices.NO` 来访问 `Choices` 接口中 `YES` 和 `NO` 字段的值。清单 21-9 演示了如何使用点符号访问接口的字段。\n\
  \n```\n// ChoicesTest.java\npackage com.jdojo.interfaces;\npublic class ChoicesTest\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"Choices.YES\
  \ = \" + Choices.YES);\nSystem.out.println(\"Choices.NO = \" + Choices.NO);\n}\n\
  }\nChoices.YES = 1\nChoices.NO = 2\n清单 21-9.\n访问接口的字段\n```\n\n接口中的字段始终是 `final`\
  \ 的，无论其声明中是否使用了 `final` 关键字。这意味着你必须在声明时初始化字段。你可以使用编译时常量或运行时常量表达式来初始化字段。由于 `final`\
  \ 字段（常量字段）只能被赋值一次，因此除了在声明中，你不能设置接口字段的值。以下代码片段会产生编译时错误：\n\n```\nChoices.YES = 5;\
  \ // 编译时错误\n```\n\n以下代码片段展示了一些接口字段的有效和无效声明：\n\n```\n/* 以下所有字段声明在 ValidFields 接口中均有效\
  \ */\npublic interface ValidFields {\nint X = 10;\n// 如果被引用的字段在引用它的字段之前声明，则可以使用一个字段来初始化另一个字段。\n\
  int Y = X;\ndouble N = X + 10.5;\nboolean YES = true;\nboolean NO = false;\n// 假设\
  \ Test 是一个存在的类\nTest TEST = new Test();\n}\n/* 无效字段声明的示例。 */\npublic interface InvalidFields\
  \ {\nint X;      // 无效。X 未初始化\nint Y = Z;  // 无效。不允许前向引用 Z。\nint Z = 10; // 本身有效。\n\
  Test TEST;  // 无效。TEST 未初始化，假设 Test 类存在\n}\n```\n\n提示\n\n按照惯例，接口中的字段名应全部使用大写字母，以表明它们是常量。然而，只要遵循标识符的命名规则，Java\
  \ 对接口字段的命名没有任何限制。接口的字段始终是 `public` 的。然而，从声明包外部访问 `public` 字段的可行性取决于接口的作用域。例如，如果接口被声明为具有包级作用域，则其字段在包外部不可访问，因为接口本身在包外部不可访问，即使其字段是\
  \ `public` 的。\n\n建议你不要仅仅为了包含常量字段而声明接口。接口的正确（也是最常用的）用途是声明一组方法来定义 API。如果你想将常量分组到一个结构中，请使用类，而不是接口。如果你使用的是\
  \ Java 5 或更高版本，请考虑使用枚举来声明常量。使用枚举可以为你的常量提供类型安全和编译时检查。\n\n方法声明\n\n你可以在接口中声明三种类型的方法：\n\
  \n*   抽象方法\n\n*   静态方法\n\n*   默认方法\n\n在 Java 8 之前，你只能在接口中声明 `abstract` 方法。修饰符 `static`\
  \ 和 `default` 分别用于声明静态方法和默认方法。缺少 `static` 和 `default` 修饰符的方法即为 `abstract` 方法。以下是一个包含所有三种类型方法的接口示例：\n\
  \n```\ninterface AnInterface {\n// 一个抽象方法\nint m1();\n// 一个静态方法\nstatic int m2()\
  \ {\n// 方法实现写在这里\n}\n// 一个默认方法\ndefault int m3() {\n// 方法实现写在这里\n}\n}\n```\n\n以下各节将详细讨论每种方法类型的声明。\n\
  \n抽象方法声明\n\n声明接口的主要目的是通过声明零个或多个抽象方法来创建抽象规范（或概念）。接口中的所有方法声明都隐式为 abstract 和 public，除非它们被声明为\
  \ `static` 或 `default`。与类中一样，接口中的 `abstract` 方法没有实现。`abstract` 方法的主体始终由分号表示，而不是一对花括号。以下代码片段声明了一个名为\
  \ `Player` 的接口：\n\n```\npublic interface Player {\npublic abstract void play();\n\
  public abstract void stop();\npublic abstract void forward();\npublic abstract void\
  \ rewind();\n}\n```\n\n`Player` 接口有四个方法：`play()`、`stop()`、`forward()` 和 `rewind()`。`Player`\
  \ 接口是音频/视频播放器的规范。一个真实的播放器，例如 DVD 播放器，将通过实现 `Player` 接口的所有四个方法来提供该规范的具体实现。\n\n在接口的方法声明中使用\
  \ `abstract` 和 `public` 关键字是多余的，即使编译器允许这样做，因为接口中的方法隐式为 abstract 和 public。之前 `Player`\
  \ 接口的声明可以重写如下，其含义不变：\n\n```\npublic interface Player {\nvoid play();\nvoid stop();\n\
  void forward();\nvoid rewind();\n}\n```\n\n接口中的抽象方法声明可以包含参数、返回类型和 `throws` 子句。以下代码片段声明了一个\
  \ `ATM` 接口。它声明了四个方法。如果账户信息错误，`login()` 方法会抛出 `AccountNotFoundException`。当用户尝试提取的金额会将余额降至低于所需最低余额时，`withdraw()`\
  \ 方法会抛出 `InsufficientBalanceException`。\n\n```\npublic interface ATM {\nboolean\
  \ login(int account) throws AccountNotFoundException;\nboolean deposit(double amount);\n\
  boolean withdraw(double amount) throws InsufficientBalanceException;\ndouble getBalance();\n\
  }\n```\n\n\n\n接口的抽象方法会被实现该接口的类继承，这些类通过重写抽象方法来提供具体实现。这意味着接口中的抽象方法不能声明为 `final`，因为方法声明中的\
  \ `final` 关键字表示该方法不可被重写。然而，类可以将接口中已被重写的方法声明为 `final`，以表明其子类不能再次重写该方法。\n\n静态方法声明\n\
  \n让我们参考清单 21-5 中所示的 `Walkables` 类代码。这是一个工具类，包含一个名为 `letThemWalk()` 的静态方法。在 Java\
  \ 8 之前，创建此类工具类来为接口提供静态方法是一种常见做法。你会在 Java 库中发现许多接口/工具类配对，例如 `Collection/Collections`、`Path/Paths`、`Channel/Channels`、`Executor/Executors`\
  \ 等。遵循此惯例，你将接口/工具类配对命名为 `Walkable/Walkables`。Java 设计者意识到了在接口之外额外提供工具类的必要性。从 Java\
  \ 8 开始，接口中可以包含静态方法。静态方法的声明包含 `static` 修饰符。它们隐式地是公开的。你可以重新定义 `Walkable` 接口，如清单 21-10\
  \ 所示，将 `letThemWalk()` 方法包含在内，并完全移除 `Walkables` 类。\n\n```\n// Walkable.java\npackage\
  \ com.jdojo.interfaces;\npublic interface Walkable {\n// 一个抽象方法\nvoid walk();\n\
  // 一个静态便捷方法\npublic static void letThemWalk(Walkable[] list) {\nfor (Walkable w\
  \ : list) {\nw.walk();\n}\n}\n}\n清单 21-10.\n修订后的 Walkable 接口，新增了一个静态便捷方法\n```\n\n\
  你可以使用点号表示法来调用接口的静态方法。\n\n```\n.\n```\n\n以下代码片段调用了 `Walkable.letThemWalk()` 方法：\n\
  \n```\nWalkable[] w = new Walkable[4];\nw[0] = new Person(\"Jack\");\nw[1] = new\
  \ Duck(\"Jeff\");\nw[2] = new Person(\"John\");\nw[3] = new Cat(\"Jace\");\n// 让所有人都走起来\n\
  Walkable.letThemWalk(w);\nJack (一个人) 正在行走。\nJeff (一只鸭子) 正在行走。\nJohn (一个人) 正在行走。\n\
  Jace (一只猫) 正在行走。\n```\n\n与类中的静态方法不同，接口中的静态方法不会被实现类或子接口继承。继承自另一个接口的接口称为子接口。调用接口静态方法只有一种方式：使用接口名。接口\
  \ `I` 的静态方法 `m()` 必须使用 `I.m()` 来调用。只有在接口体内，或者通过静态 `import` 语句导入该方法后，才能使用该方法的非限定名称\
  \ `m()` 来调用它。\n\n默认方法声明\n\n接口中的默认方法使用修饰符 `default` 声明。默认方法为实现了该接口但未重写默认方法的类提供了该方法的默认实现。\n\
  \n默认方法是在 Java 8 中引入的。在 Java 8 之前，接口只能包含抽象方法。为什么要在 Java 8 中添加默认方法？简而言之，添加它们是为了让现有接口能够演进。在这一点上，答案可能难以理解。让我们看一个例子来澄清这一点。\n\
  \n假设在 Java 8 之前，你想为可移动对象创建一个规范，用于描述它们在二维平面中的位置。让我们通过创建一个名为 `Movable` 的接口来创建该规范，如清单\
  \ 21-11 所示。\n\n```\n// Movable.java\npackage com.jdojo.interfaces;\npublic interface\
  \ Movable {\nvoid setX(double x);\nvoid setY(double y);\ndouble getX();\ndouble\
  \ getY();\n}\n清单 21-11.\n一个 Movable 接口\n```\n\n该接口声明了四个抽象方法。`setX()` 和 `setY()`\
  \ 方法允许 `Movable` 使用绝对定位来改变位置。`getX()` 和 `getY()` 方法根据 `x` 和 `y` 坐标返回当前位置。\n\n考虑清单\
  \ 21-12 中的 `Pen` 类。它实现了 `Movable` 接口，并根据规范为该接口的四个方法提供了实现。该类包含两个实例变量，名为 `x` 和 `y`，用于追踪笔的位置。\n\
  \n```\n// Pen.java\npackage com.jdojo.interfaces;\npublic class Pen implements Movable\
  \ {\nprivate double x;\nprivate double y;\npublic Pen() {\n// 默认情况下，笔位于 (0.0, 0.0)\n\
  }\npublic Pen(double x, double y) {\nthis.x = x;\nthis.y = y;\n}\n@Override\npublic\
  \ void setX(double x) {\nthis.x = x;\n}\n@Override\npublic void setY(double y) {\n\
  this.y = y;\n}\n@Override\npublic double getX() {\nreturn x;\n}\n@Override\npublic\
  \ double getY() {\nreturn y;\n}\n@Override\npublic String toString() {\nreturn \"\
  Pen(\" + x + \", \" + y + \")\";\n}\n}\n清单 21-12.\n一个实现了 Movable 接口的 Pen 类\n```\n\
  \n以下代码片段使用了 `Movable` 接口和 `Pen` 类：\n\n```\n// 创建一个 Pen 并将其引用赋值给一个 Movable 变量\nMovable\
  \ p1 = new Pen();\nSystem.out.println(p1);\n// 移动 Pen\np1.setX(10.0);\np1.setY(5.0);\n\
  System.out.println(p1);\nPen(0.0, 0.0)\nPen(10.0, 5.0)\n```\n\n到目前为止，`Movable` 接口和\
  \ `Pen` 类并没有发生什么特别的事情。假设 `Movable` 接口是你开发的库的一部分。你已经将该库分发给你的客户。客户已经在他们的类中实现了 `Movable`\
  \ 接口。\n\n现在故事出现了转折。一些客户要求 `Movable` 接口包含使用相对坐标改变位置的规范。他们希望你向 `Movable` 接口添加一个 `move()`\
  \ 方法，如下所示。请求的部分以粗体显示。\n\n```\npublic interface Movable {\nvoid setX(double x);\n\
  void setY(double y);\ndouble getX();\ndouble getY();\nvoid move(double deltaX, double\
  \ deltaY);\n}\n```\n\n你是一个善良的商人；你总是希望客户满意。你满足了客户的要求。你进行了更改并重新分发了新版本的库。几个小时后，你接到了几个愤怒客户的电话。他们很生气，因为新版本的库破坏了他们的现有代码。让我们分析一下哪里出了问题。\n\
  \n在 Java 8 之前，接口中的所有方法都是隐式抽象的。因此，新方法 `move()` 是一个抽象方法。所有实现了 `Movable` 接口的类都必须为新方法提供实现。请注意，客户已经拥有几个类，例如\
  \ `Pen` 类，它们实现了 `Movable` 接口。除非将这些新方法添加到这些类中，否则所有这些类将无法再编译。这个故事的寓意是，在 Java 8 之前，在接口公开发布后，不可能在不破坏现有代码的情况下向接口添加方法。\n\
  \nJava 库发布了数百个接口，这些接口被全球客户使用了数千次。Java 设计者迫切需要一种方法来演进现有接口，同时又不破坏现有代码。他们探索了几种解决方案。默认方法是演进接口的公认解决方案。可以向现有接口添加一个默认方法。它为该方法提供了一个默认实现。所有实现该接口的类都将继承这个默认实现，从而不会破坏它们。类可以选择重写这个默认实现。\n\
  \n\n\n默认方法使用关键字 `default` 声明。默认方法不能声明为 `abstract` 或 `static`，它必须提供实现，否则会发生编译时错误。清单\
  \ 21-13 展示了 `Movable` 接口的修订代码，其中包含一个名为 `move()` 的默认方法，该方法基于现有的四个方法定义。\n\n```\n//\
  \ Movable.java\npackage com.jdojo.interfaces;\npublic interface Movable {\nvoid\
  \ setX(double x);\nvoid setY(double y);\ndouble getX();\ndouble getY();\n// 一个默认方法\n\
  default void move(double deltaX, double deltaY) {\ndouble newX = getX() + deltaX;\n\
  double newY = getY() + deltaY;\nsetX(newX);\nsetY(newY);\n}\n}\n清单 21-13.\n包含默认方法的\
  \ Movable 接口\n```\n\n任何现有的类（包括 `Pen` 类），只要实现了 `Movable` 接口，都能像以前一样继续编译和运行。新的 `move()`\
  \ 方法及其默认实现对这些类都可用。清单 21-14 展示了 `Movable` 接口的旧方法和新方法，以及 `Pen` 类。\n\n```\n// MovableTest.java\n\
  package com.jdojo.interfaces;\npublic class MovableTest {\npublic static void main(String[]\
  \ args) {\n// 创建一个 Pen 对象，并将其引用赋值给 Movable 变量\nMovable p1 = new Pen();\nSystem.out.println(p1);\n\
  // 使用绝对坐标移动 Pen\np1.setX(10.0);\np1.setY(5.0);\nSystem.out.println(p1);\n// 使用相对坐标移动\
  \ Pen\np1.move(5.0, 2.0);\nSystem.out.println(p1);\n}\n}\nPen(0.0, 0.0)\nPen(10.0,\
  \ 5.0)\nPen(15.0, 7.0)\n清单 21-14.\n使用现有 Pen 类测试新的 Movable 接口\n```\n\n默认方法的另一个常见用途是在接口中声明可选方法。考虑一个\
  \ `Named` 接口，如清单 21-15 所示。\n\n```\n// Named.java\npackage com.jdojo.interfaces;\n\
  public interface Named {\nvoid setName(String name);\ndefault String getName() {\n\
  return \"John Doe\";\n}\ndefault void setNickname(String nickname) {\nthrow new\
  \ UnsupportedOperationException(\"setNickname\");\n}\ndefault String getNickname()\
  \ {\nthrow new UnsupportedOperationException(\"getNickname\");\n}\n}\n清单 21-15.\n\
  使用默认方法提供可选方法的 Named 接口\n```\n\n该接口提供了获取和设置正式名称及昵称的规范。并非所有事物都有昵称。该接口将获取和设置昵称的方法作为默认方法提供，使其成为可选的。如果一个类实现了\
  \ `Named` 接口，并且该类支持昵称，则可以覆盖 `setNickname()` 和 `getNickname()` 方法来提供实现。否则，该类无需对这些方法做任何处理，它们只会抛出运行时异常以表明不支持。该接口将\
  \ `getName()` 方法声明为默认方法，并通过返回 `\"John Doe\"` 作为默认名称，提供了一个合理的默认实现。实现 `Named` 接口的类应覆盖\
  \ `getName()` 方法以返回真实名称。\n\n这只是默认方法为 Java 语言带来的好处和强大功能的冰山一角。它为现有的 Java API 注入了新的活力。在\
  \ Java 8 中，Java 库中的多个接口都添加了默认方法，为现有 API 提供了更强的表现力和功能。\n\n类中的具体方法与接口中的默认方法有何异同？\n\
  \n*   两者都提供实现。\n*   两者都以相同的方式访问关键字 `this`。也就是说，关键字 `this` 是调用该方法的对象的引用。\n*   主要区别在于对对象状态的访问。类中的具体方法可以访问类的实例变量。然而，默认方法无法访问实现接口的类的实例变量。默认方法可以访问接口的其他成员，例如其他方法、常量和类型成员。例如，`Movable`\
  \ 接口中的默认方法是使用其他成员方法 `getX()`、`getY()`、`setX()` 和 `setY()` 编写的。\n*   不用说，两种类型的方法都可以使用它们的参数。\n\
  *   两种方法都可以有 `throws` 子句。\n\n关于默认方法，我们还没有讲完。稍后我将讨论它们在继承中的作用。\n\n接口中的私有方法\n\nJDK\
  \ 8 为接口引入了静态方法和默认方法。如果你不得不在这些方法中多次执行相同的逻辑，你只能重复该逻辑，或者将逻辑移到另一个类中以隐藏实现。考虑名为 `Alphabet`\
  \ 的接口，如清单 21-16 所示。\n\n```\n// Alphabet.java\npackage com.jdojo.interfaces;\npublic\
  \ interface Alphabet {\ndefault boolean isAtOddPos(char c) {\nif (!Character.isLetter(c))\
  \ {\nthrow new RuntimeException(\"Not a letter: \" + c);\n}\nchar uc = Character.toUpperCase(c);\n\
  int pos = uc - 64;\nreturn pos % 2 == 1;\n}\ndefault boolean isAtEvenPos(char c)\
  \ {\nif (!Character.isLetter(c)) {\nthrow new RuntimeException(\"Not a letter: \"\
  \ + c);\n}\nchar uc = Character.toUpperCase(c);\nint pos = uc - 64;\nreturn pos\
  \ % 2 == 0;\n}\n}\n清单 21-16.\n名为 Alphabet 的接口，包含两个共享逻辑的默认方法\n```\n\n`isAtOddpos()`\
  \ 和 `isAtEvenPos()` 方法检查指定字符在字母表中的位置是奇数还是偶数，假设我们只处理英文字母。该逻辑假设 `A` 和 `a` 位于位置 1，`B`\
  \ 和 `b` 位于位置 2，依此类推。注意，这两个方法中的逻辑仅在 `return` 语句上有所不同。除了最后一条语句外，这些方法的整个主体都是相同的。我们需要重构此逻辑。理想的情况是将公共逻辑移到另一个方法中，并从两个方法中调用新方法。然而，在\
  \ JDK 8 中你不想这样做，因为接口只支持公共方法。这样做会使第三个方法变成公共方法，从而将其暴露给外部世界，这是你不希望发生的。\n\nJDK 9 解决了这个问题。它允许你在接口中声明私有方法。清单\
  \ 21-17 展示了 `Alphabet` 接口的重构版本，它使用一个包含两个方法所用公共逻辑的私有方法。这次，我将接口命名为 `AlphabetJdk9`，只是为了确保可以在源代码中包含两个版本。现有的两个方法变成了单行方法。\n\
  \n```\n// AlphabetJdk9.java\npackage com.jdojo.misc;\n// AlphabetJdk9.java\npackage\
  \ com.jdojo.interfaces;\npublic interface AlphabetJdk9 {\ndefault boolean isAtOddPos(char\
  \ c) {\nreturn getPos(c) % 2 == 1;\n}\ndefault boolean isAtEvenPos(char c) {\nreturn\
  \ getPos(c) % 2 == 0;\n}\nprivate int getPos(char c) {\nif (!Character.isLetter(c))\
  \ {\nthrow new RuntimeException(\"Not a letter: \" + c);\n}\nchar uc = Character.toUpperCase(c);\n\
  int pos = uc - 64;\nreturn pos;\n}\n}\n清单 21-17.\n使用私有方法的 AlphabetJdk9 接口\n```\n\
  \n在 JDK 9 之前，接口中的所有方法都隐式是公共的。请记住这些适用于所有 Java 程序的简单规则：\n\n*   `private` 方法不会被继承，因此不能被覆盖。\n\
  *   `final` 方法不能被覆盖。\n*   `abstract` 方法会被继承，并且旨在被覆盖。\n*   `default` 方法是一个实例方法，提供默认实现，旨在被覆盖。\n\
  \n\n\n随着 JDK 9 引入私有方法，在接口中声明方法时需要遵循一些规则。并非所有修饰符组合——`abstract`、`public`、`private`、`static`\
  \ 和 `final`——都受支持，因为它们没有意义。表 21-1 列出了 JDK 9 接口方法声明中受支持和不支持的修饰符组合。请注意，接口的方法声明中不允许使用\
  \ `final` 修饰符。根据此表，你可以在接口中拥有一个私有方法，它可以是非抽象、非默认的实例方法，也可以是静态方法。\n\n表 21-1.\n\n接口方法声明中受支持的修饰符\n\
  \n修饰符\n |\n  是否支持？\n |\n  描述\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\
  \n`public static`\n |\n  是\n |\n  自 JDK 8 起支持。\n |\n\n`public abstract`\n |\n  是\n\
  \ |\n  自 JDK 1 起支持。\n |\n\n`public default`\n |\n  是\n |\n  自 JDK 8 起支持。\n |\n\n\
  `private static`\n |\n  是\n |\n  自 JDK 9 起支持。\n |\n\n`private`\n |\n  是\n |\n  自\
  \ JDK 9 起支持。这是一个非抽象实例方法。\n |\n\n`private abstract`\n |\n  否\n |\n  此组合没有意义。私有方法不会被继承，因此无法被重写，而抽象方法必须被重写才有用。\n\
  \ |\n\n`private default`\n |\n  否\n |\n  此组合没有意义。私有方法不会被继承，因此无法被重写，而默认方法旨在根据需要被重写。\n\
  \ |\n\n嵌套类型声明\n\n接口中的嵌套类型定义了一个新的引用类型。你可以将类、接口、枚举和注解声明为嵌套类型。我尚未讨论枚举和注解，因此本节将讨论范围限制在嵌套接口和类。在接口内部声明的接口/类称为嵌套接口/类。\n\
  \n接口和类定义了新的引用类型，嵌套接口和嵌套类也是如此。有时，将某个类型作为嵌套类型更有意义。假设你有一个 `ATM` 接口，并且想要定义另一个名为 `ATMCard`\
  \ 的接口。`ATMCard` 接口可以定义为顶级接口，也可以定义为 `ATM` 的嵌套接口。由于 ATM 卡是与 ATM 一起使用的，因此将 `ATMCard`\
  \ 定义为 `ATM` 接口的嵌套接口可能更有意义。由于你将 `ATMCard` 定义为 `ATM` 的嵌套接口，你还可以从其名称中删除 `\"ATM\"`，并将其命名为\
  \ `Card`，如下所示：\n\n```\npublic interface ATM {\nboolean login(int account) throws\
  \ AccountNotFoundException;\nboolean deposit(double amount);\nboolean withdraw(double\
  \ amount) throws InsufficientFundsException;\ndouble getBalance();\n// Card 是一个嵌套接口。你可以省略关键字\
  \ public 和 static。\npublic static interface Card {\nString getNumber();\nString\
  \ getSecurityCode();\nLocalDate getExpirationDate();\nString getCardHolderName();\n\
  }\n}\n```\n\n嵌套接口始终通过其封闭接口来访问。在前面的代码片段中，`ATM` 是一个顶级接口（或简称为接口），而 `Card` 是一个嵌套接口。`ATM`\
  \ 接口也称为 `Card` 接口的封闭接口。`ATM` 和 `Card` 接口的完全限定名分别是 `com.jdojo.interfaces.ATM` 和 `com.jdojo.interfaces.ATM.Card`。所有嵌套类型都隐式地是\
  \ public 和 static 的。前面的代码片段使用了关键字 `public` 和 `static` 来声明 `ATMCard` 接口，这是多余的。\n\n\
  你也可以在接口内部声明一个嵌套类。在了解如何实现接口（下一节将介绍）之前，你可能无法理解本节中描述的嵌套类的用途。此处包含以下讨论是为了完善关于接口嵌套类型的讨论。在阅读完接下来几节关于如何实现接口的内容后，你可以重新阅读本节。\n\
  \n在接口内部声明嵌套类并不常见。但是，如果你发现某个接口将嵌套类声明为其成员，也不必感到惊讶。在接口内部拥有一个嵌套类有什么好处呢？这样做只有一个好处，那就是更好地组织相关实体：接口和类。假设你想开发一个\
  \ `Job` 接口，允许用户向作业调度器提交作业。以下是 `Job` 接口的代码：\n\n```\npublic interface Job {\npublic\
  \ void runJob();\n}\n```\n\n假设每个部门每天都必须提交一个作业，即使他们没有要运行的任务。这表明有时你需要一个空作业或一个没有实际任务的作业。`Job`\
  \ 接口的开发者可能会提供一个常量，该常量代表 `Job` 接口的一个简单实现，如清单 21-18 所示。它有一个名为 `EmptyJob` 的嵌套类，该类实现了其封闭的\
  \ `Job` 接口。\n\n```\n// Job.java\npackage com.jdojo.interfaces;\npublic interface\
  \ Job {\n// 一个嵌套类\nclass EmptyJob implements Job {\nprivate EmptyJob() {\n// 不允许外部创建其对象\n\
  }\n@Override\npublic void runJob() {\nSystem.out.println(\"没有真正需要运行的任务...\");\n\
  }\n}\n// 一个常量字段\nJob EMPTY_JOB = new EmptyJob();\n// 一个抽象方法\nvoid runJob();\n}\n\
  清单 21-18.\n包含嵌套类和常量字段的 Job 接口\n```\n\n如果某个部门没有有意义的作业可提交，则可以使用 `Job.EMPTY_JOB` 常量作为作业。`EmptyJob`\
  \ 类的完全限定名是 `com.jdojo.interfaces.Job.EmptyJob`。请注意，封闭接口 `Job` 为 `EmptyJob` 类提供了一个额外的命名空间。在\
  \ `Job` 接口内部，`EmptyJob` 类可以通过其简单名称 `EmptyJob` 来引用。但是，在 `Job` 接口外部，它必须被引用为 `Job.EmptyJob`。你可能注意到，一个简单的作业对象由\
  \ `Job.EMPTY_JOB` 常量表示。你已经将 `EmptyJob` 嵌套类的构造函数设为私有，因此接口外部的任何人都无法创建其对象。清单 21-19\
  \ 展示了如何使用该类。通常，在这种情况下，你会将 `Job.EmptyJob` 类的构造函数设为私有，这样它的对象就不能在 `Job` 接口外部创建，因为 `EMPTY_JOB`\
  \ 常量已经提供了该类的一个对象。\n\n```\n// JobTest.java\npackage com.jdojo.interfaces;\npublic\
  \ class JobTest {\npublic static void main(String[] args) {\nsubmitJob(Job.EMPTY_JOB);\n\
  }\npublic static void submitJob(Job job) {\njob.runJob();\n}\n}\n没有真正需要运行的任务...\n\
  清单 21-19.\n用于测试 Job 接口及其嵌套 EmptyJob 类的测试程序\n```\n\n接口定义新类型\n\n接口定义了一个新的引用类型。你可以在任何可以使用引用类型的地方使用接口类型。例如，你可以使用接口类型声明变量（实例变量、静态变量或局部变量），或在方法中声明参数类型、作为方法的返回类型等。\n\
  \n考虑以下名为 `Swimmable` 的接口声明，它声明了一个方法 `swim()`，如清单 21-20 所示。清单 21-21 中的 `SwimmableTest`\
  \ 类展示了如何使用 `Swimmable` 接口作为引用数据类型。\n\n```\n// Swimmable.java\npackage com.jdojo.interfaces;\n\
  public interface Swimmable {\nvoid swim();\n}\n清单 21-20.\nSwimmable 接口的声明\n```\n\
  \n\n\n```\n// SwimmableTest.java\npackage com.jdojo.interfaces;\npublic class SwimmableTest\
  \ {\n// 接口类型用于定义实例变量\nprivate Swimmable iSwimmable;\n// 接口类型用于定义构造器的参数类型\npublic\
  \ SwimmableTest(Swimmable aSwimmable) {\nthis.iSwimmable = aSwimmable;\n}\n// 接口类型用于定义方法的返回类型\n\
  public Swimmable getSwimmable() {\nreturn this.iSwimmable;\n}\n// 接口类型用于定义方法的参数类型\n\
  public void setSwimmable(Swimmable newSwimmable) {\nthis.iSwimmable = newSwimmable;\n\
  }\npublic void letItSwim() {\n// 接口类型用于声明局部变量\nSwimmable localSwimmable = this.iSwimmable;\n\
  // 接口变量可用于调用接口中声明的任何方法以及 Object 类的方法\nlocalSwimmable.swim();\n}\n}\n清单 21-21.\n\
  一个演示将接口类型用作变量类型的测试类\n```\n\n`SwimmableTest` 类\n以多种方式使用了 `Swimmable` 接口定义的新类型。\n\
  该类的目的仅仅是演示如何将接口用作新类型。它使用 `Swimmable` 接口\n作为类型来声明以下内容：\n\n*   一个名为 `iSwimmable` 的实例变量。\n\
  \n*   其构造器的一个名为 `aSwimmable` 的参数。\n\n*   其 `getSwimmable()` 方法的返回类型。\n\n*   其 `setSwimmable()`\
  \ 方法的一个名为 `newSwimmable` 的参数。\n\n*   其 `letItSwim()` 方法内部的一个名为 `localSwimmable`\
  \ 的局部变量。在该方法内部，你本可以直接在实例变量 `iSwimmable` 上调用 `swim()` 方法。我使用局部变量只是为了演示接口类型可以在任何可以使用类型的地方使用。\n\
  \n此时，关于接口有两个问题需要解答。\n\n*   接口类型的变量引用的是内存中的哪个对象？\n\n*   你能用接口类型的变量做什么？\n\n由于接口定义了一种引用类型，那么接口类型的变量引用的是内存中的哪个对象？让我们通过一个例子来详细说明这个问题。你有一个\
  \ `Swimmable` 接口，并且可以声明一个 `Swimmable` 类型的引用变量，如下所示：\n\n```\nSwimmable sw;\n```\n\
  \n此时变量 `sw` 的值是什么？引用数据类型的变量引用的是内存中的一个对象。为了精确起见，让我们将问题重新表述为“`sw` 引用的是内存中的哪个对象？”目前你无法完全回答这个问题。部分且未经解释的答案是：接口类型的变量引用的是内存中其类实现了该接口的对象。当我在下一节讨论实现接口时，答案会更清晰。你不能创建接口类型的对象。接口是隐式抽象的，并且没有构造器。也就是说，你不能使用\
  \ `new` 运算符配合接口类型来创建对象。以下代码将无法编译：\n\n```\nSwimmable sw2 = new Swimmable(); // 编译时错误\n\
  ```\n\n在这个语句中，导致编译时错误的是 `new` 运算符的使用，而不是 `Swimmable sw2` 部分。`Swimmable sw2` 部分是一个变量声明，它是有效的。\n\
  \n然而，有一点是确定的：接口类型的变量可以引用内存中的一个对象。这种情况如图 21-1 所示。\n\n![A323069_2_En_21_Fig1_HTML.gif](img/A323069_2_En_21_Fig1_HTML.gif)\n\
  \n图 21-1.\n\n一个 `Swimmable` 类型变量（sw）引用内存中的一个对象\n\n让我们回答第二个问题。你能用接口类型的变量做什么？引用类型变量的所有规则同样适用于接口类型的变量。以下是你可以用引用类型变量做的一些重要事情：\n\
  \n*   你可以分配内存中一个对象的引用，包括 `null` 引用值。\n\n```\n    Swimmable sw2 = null;\n    ```\n\
  \n*   你可以使用接口类型的变量或直接使用接口名称来访问接口中声明的任何常量字段。建议使用接口名称来访问接口的常量。考虑包含两个常量 `YES` 和 `NO`\
  \ 的 `Choices` 接口。你可以使用接口的简单名称 `Choices.YES`、`Choices.NO` 来访问这两个常量的值，也可以使用接口引用变量\
  \ `sw2.YES` 和 `sw2.NO` 来访问。\n\n*   你可以使用接口类型的变量来调用接口中声明的任何方法。例如，`Swimmable` 类型的变量可以如下调用\
  \ `swim()` 方法：\n\n```\n    Swimmable sw3 = 获取一个 Swimmable 类型的对象实例...\n    sw3.swim();\n\
  \    ```\n\n*   接口类型的变量可以调用 `Object` 类的任何方法。这条规则并不十分明显。然而，如果仔细思考，这是一条非常简单且重要的规则。接口类型的变量可以引用内存中的一个对象。无论它引用的是内存中的哪个对象，该对象始终是某个类类型的。Java\
  \ 中的所有类都必须以 `Object` 类作为其直接或间接父类。因此，Java 中的所有对象都可以访问 `Object` 类的所有方法。所以，允许接口类型变量访问\
  \ `Object` 类的所有方法是合乎逻辑的。以下代码片段使用 `Swimmable` 类型变量调用了 `Object` 类的 `hashCode()`、`getClass()`\
  \ 和 `toString()` 方法：\n\n```\n    Swimmable sw4 = 获取一个 Swimmable 类型的对象...\n    int\
  \ hc = sw4.hashCode();\n    Class c = sw4.getClass();\n    String str = sw4.toString();\n\
  \    ```\n\n*   另一个需要记住的重要规则是：接口类型的实例变量或静态变量默认初始化为 `null`。与所有类型的局部变量一样，接口类型的局部变量默认不会被初始化。你必须在使用之前显式地为其赋值。\n\
  \n实现接口\n\n接口为对象定义了关于它们将如何与其他对象通信的规范。规范是对象行为的契约或协议。理解规范（或契约）与实现这两个术语之间的区别非常重要。规范是一组陈述，而实现则是这些陈述的具体化。\n\
  \n让我们举一个现实世界的例子。“杰克将在 2014 年 6 月 8 日给约翰十美元。”这句话是一个规范。当杰克在 2014 年 6 月 8 日给约翰十美元时，这个规范就被执行了。你可以重新表述为：当杰克在\
  \ 2014 年 6 月 8 日给约翰十美元时，这个规范就被实现了。有时，在讨论接口时，规范也被称为契约、协议、协议、计划或草案。无论你使用哪个术语来指代规范，它始终是抽象的。规范的实现可以是部分的或完整的。杰克可能在\
  \ 2014 年 6 月 8 日给约翰七美元，在这种情况下，规范就没有被完全实现。\n\n接口指定了一个协议，对象在与其它对象交互时保证提供该协议。它通过抽象方法和默认方法来指定协议。规范会在某个时间由某人实现，接口也是如此。接口由类来实现。当一个类实现一个接口时，该类为接口的所有抽象方法提供实现。一个类可以提供接口抽象方法的部分实现，在这种情况下，该类必须声明自身为抽象类。\n\
  \n\n实现接口的类使用 `implements` 子句来指定接口的名称。`implements` 子句由关键字 `implements` 后跟逗号分隔的接口类型列表组成。一个类可以实现多个接口。现在我们先关注只实现一个接口的类。实现接口的类声明的一般语法如下：\n\
  \n```\n[修饰符] class <类名> implements <接口名> {\n// 类主体写在这里\n}\n```\n\n假设有一个 `Fish` 类。\n\
  \n```\npublic class Fish {\n// Fish 类的代码写在这里\n}\n```\n\n现在，你希望在 `Fish` 类中实现 `Swimmable`\
  \ 接口。以下代码展示了 `Fish` 类并声明它实现了 `Swimmable` 接口：\n\n```\npublic class Fish implements\
