  \ `\"Ken\"`，`s` 产生 `\"Ken\"`，而 `S` 产生 `\"KEN\"`。\n\n```\nSystem.out.printf(\"%s\
  \ and %<S\", \"Ken\");\n```\n\n```\nKen and KEN\n```\n\n通用格式化\n\n通用格式化可用于格式化任何数据类型的值。表\
