  empId[\" + i + \"]:\" + empId[i]);\n}\nSystem.out.println (\"\\nboolean 数组初始化:\"\
  );\n// bArray 元素的初始值在构造函数内部显示\nnew ArrayInit();\nSystem.out.println(\"\\n 引用类型数组初始化:\"\
  );\nString[] name = new String[3];  // 一个局部数组变量\nfor (int i = 0; i < name.length;\
  \ i++) {\nSystem.out.println(\"name[\" + i + \"]:\" + name[i]);\n}\n}\n}\nint 数组初始化:\n\
  empId[0]:0\nempId[1]:0\nempId[2]:0\nboolean 数组初始化:\nbArray[0]:false\nbArray[1]:false\n\
  bArray[2]:false\n引用类型数组初始化:\nname[0]:null\nname[1]:null\nname[2]:null\n清单 19-2.\n\
  数组元素的默认初始化\n```\n\n警惕引用类型数组\n\n基本类型的数组元素包含该基本类型的值，而引用类型的数组元素包含对对象的引用。假设你有一个 `int`\
  \ 数组：\n\n```\nint[] empId = new int[5];\n```\n\n这里，`empId[0]`、`empId[1]...empId[4]`\
  \ 包含一个 `int` 值。假设你有一个 `String` 数组，如下所示：\n\n```\nString[] name = new String[5];\n\
  ```\n\n这里，`name[0], name[1]...name[4]` 可能包含对 `String` 对象的引用。请注意，`name` 数组的元素——`String`\
  \ 对象——尚未被创建。正如上一节所讨论的，此时 `name` 数组的所有元素都包含 `null`。你需要逐个创建 `String` 对象并将其引用赋值给数组的元素，如下所示：\n\
  \n```\nname[0] = \"John\";\nname[1] = \"Donna\";\nname[2] = \"Wally\";\nname[3]\
  \ = \"Reddy\";\nname[4] = \"Buddy\";\n```\n\n一个常见的错误是在刚创建引用类型数组之后、为每个元素赋值有效的对象引用之前，就去引用数组的元素。以下代码说明了这个常见错误：\n\
  \n```\n// 创建一个 String 数组\nString[] name = new String[5];\n// 运行时错误，因为 name[0] 是\
  \ null\nint len = name[0].length();\n// 为数组的所有元素赋值有效的字符串对象\nname[0] = \"John\";\n\
  name[1] = \"Donna\";\nname[2] = \"Wally\";\nname[3] = \"Reddy\";\nname[4] = \"Buddy\"\
  ;\n// 现在你可以获取第一个元素的长度了\nint len2 = name[0].length(); // 正确。len2 的值为 4\n```\n\n`String`\
  \ 引用类型数组的初始化概念如图 19-1 所示。此概念适用于所有引用类型。\n\n![A323069_2_En_19_Fig1_HTML.gif](img/A323069_2_En_19_Fig1_HTML.gif)\n\
  \n图 19-1.\n\n引用类型数组初始化\n\n数组的所有元素在内存中是连续存储的。对于引用类型数组，数组元素存储的是对象的引用。这些元素中的引用是连续存储的，而不是它们所引用的对象。对象存储在堆上，并且它们的位置通常是不连续的。\n\
  \n显式数组初始化\n\n\n\n你可以在声明数组时，或使用 `new` 运算符创建数组对象时，显式地初始化数组元素。元素的初始值用逗号分隔，并用花括号（`{}`）括起来。\n\
  \n```\n// 在声明时初始化数组\nint[] empId = {1, 2, 3, 4, 5};\n```\n\n这段代码创建了一个长度为 `5` 的 `int`\
  \ 类型数组，并将其元素初始化为 `1`、`2`、`3`、`4` 和 `5`。请注意，在声明数组时指定数组初始化列表时，无需指定数组的长度。数组的长度与数组初始化列表中指定的值的数量相同。此处，`empId`\
  \ 数组的长度将为 `5`，因为你在初始化列表 {`1`, `2`, `3`, `4`, `5`} 中传递了五个值。初始化列表中的最后一个值后面可以跟一个逗号。\n\
  \n```\nint[] empId = {1, 2, 3, 4, 5, }; // 最后一个值 5 后面的逗号是有效的。\n```\n\n或者，你也可以像下面这样初始化数组的元素：\n\
  \n```\nint[] empId = new int[]{1, 2, 3, 4, 5};\n```\n\n请注意，如果指定了数组初始化列表，则不能指定数组的长度。数组的长度与初始化列表中指定的值的数量相同。使用空的初始化列表创建一个空数组是有效的。\n\
  \n```\nint[] emptyNumList = { };\n```\n\n对于引用类型数组，你可以在初始化列表中指定对象列表。以下代码片段说明了 `String`\
  \ 和 `Account` 类型的数组初始化。假设 `Account` 类存在，并且它有一个以账号为参数的构造函数。\n\n```\n// 创建一个包含两个字符串\
  \ \"Sara\" 和 \"Truman\" 的 String 数组\nString[] names = {new String(\"Sara\"), new\
  \ String(\"Truman\")};\n// 你也可以使用字符串字面量\nString[] names = {\"Sara\", \"Truman\"\
  };\n// 创建一个包含两个 Account 对象的 Account 数组\nAccount[] ac = new Account[]{new Account(1)\
  \ , new Account(2)};\n```\n\n提示\n\n当你使用初始化列表来初始化数组元素时，不能指定数组的长度。数组的长度被设置为初始化列表中值的数量。\n\
  \n使用数组的局限性\n\nJava 中的数组在创建后无法扩展或缩小。假设你有一个包含 100 个元素的数组，但后来你只需要保留 15 个元素。你无法摆脱剩下的\
  \ 85 个元素。如果你需要 135 个元素，你无法再追加 35 个元素。如果你的应用程序有足够的内存可用，你可以处理第一个限制（无法释放未使用数组元素的内存）。但是，如果你需要向现有数组添加更多元素，则别无他法。唯一的解决方案是创建另一个所需长度的数组，并将原始数组中的元素复制到新数组中。你可以通过两种方式将数组元素从一个数组复制到另一个数组：\n\
  \n*   使用循环\n\n*   使用 `java.lang.System` 类的 `static arraycopy()` 方法\n\n*   使用 `java.util.Arrays`\
  \ 类的 `copyOf()` 方法\n\n假设你有一个长度为 `originalLength` 的 `int` 数组，并且你想将其长度修改为 `newLength`。你可以应用第一种复制数组的方法，如下面的代码片段所示：\n\
  \n```\nint originalLength = 100;\nint newLength = 15;\nint[] ids = new int[originalLength];\n\
  // 在此处进行一些处理...\n// 创建一个新长度的临时数组\nint[] tempIds = new int[newLength];\n// 在复制数组元素时，我们必须检查新长度是小于还是大于原始长度\n\
  int elementsToCopy = originalLength > newLength ? newLength : originalLength;\n\
  // 将元素从原始数组复制到新数组\nfor (int i = 0; i < elementsToCopy; i++){\ntempIds[i] = ids[i];\n\
  }\n// 最后将新数组的引用赋给 ids\nids = tempIds;\n```\n\n将数组元素复制到另一个数组的另一种方法是使用 `System` 类的\
  \ `arraycopy()` 方法。`arraycopy()` 方法的签名如下：\n\n```\npublic static void arraycopy(Object\
  \ sourceArray, int sourceStartPosition,\nObject destinationArray,\nint destinationStartPosition,\n\
  int lengthToBeCopied)\n```\n\n其中，\n\n*   `sourceArray` 是源数组的引用。\n\n*   `sourceStartPosition`\
  \ 是源数组中开始复制元素的起始索引。\n\n*   `destinationArray` 是目标数组的引用。\n\n*   `destinationStartPosition`\
  \ 是目标数组中开始复制源数组新元素的起始索引。\n\n*   `lengthToBeCopied` 是要从源数组复制到目标数组的元素数量。\n\n你可以用以下代码替换之前的\
  \ `for` 循环：\n\n```\n// 现在使用 arraycopy() 方法复制数组元素\nSystem.arraycopy (ids, 0, tempIds,\
  \ 0, elementsToCopy);\n```\n\n你也可以使用 `Arrays` 类的 `copyOf()` 静态方法。以下是 `copyOf()`\
  \ 方法的一些声明：\n\n*   `boolean[] copyOf(boolean[] original, int newLength)`\n\n*   `byte[]\
  \ copyOf(byte[] original, int newLength)`\n\n*   `char[] copyOf(char[] original,\
  \ int newLength)`\n\n*   `double[] copyOf(double[] original, int newLength)`\n\n\
  *   `float[] copyOf(float[] original, int newLength)`\n\n*   `int[] copyOf(int[]\
  \ original, int newLength)`\n\n*   `short[] copyOf(long[] original, int newLength)`\n\
  \n*   `<T> T[] copyOf(T[] original, int newLength)`\n\n`copyOf()` 方法的第一个参数是源数组。第二个参数\
  \ `newLength` 是新数组中的元素数量。如果 `newLength` 小于源数组的长度，则返回的数组将是源数组的截断副本。如果 `newLength`\
  \ 大于源数组的长度，则返回的数组将包含原始数组中的所有元素，并且额外的元素将根据数组的数据类型设置默认值。如果 `newLength` 等于源数组的长度，则返回的数组包含与源数组相同数量的元素。\n\
  \n提示\n\n`Arrays` 类包含一个 `copyOfRange()` 方法，该方法允许你将数组中的某个范围的元素复制到另一个数组。对于 int 数组，其声明为\
  \ `int[] copyOfRange(int[] original, int from, int to)`。该方法对所有数据类型都进行了重载。此处，`from`\
  \ 和 `to` 是要复制的源数组中元素的起始索引（包含）和结束索引（不包含）。这些索引必须在源数组的范围内，这意味着目标数组的长度最多可以等于源数组。\n\n\
  `java.util.ArrayList` 和 `java.util.Vector` 这两个类的对象可以替代数组使用，适用于需要修改数组长度的情况。你可以将这两个类的对象视为可变长度数组。下一节将详细讨论这两个类。\n\
  \n清单 19-3 演示了如何使用 `for` 循环、`System.arraycopy()` 方法、`Arrays.copyOf()` 方法和 `Arrays.copyOfRange()`\
  \ 方法来复制数组。\n\n\n```java\n// ArrayCopyTest.java\npackage com.jdojo.array;\nimport\
  \ java.util.Arrays;\npublic class ArrayCopyTest {\npublic static void main(String[]\
  \ args) {\n// 创建一个包含 5 个元素的数组\nint[] data = {1, 2, 3, 4, 5};\n// 将 data 数组扩展为 7\
  \ 个元素\nint[] eData = expandArray(data, 7);\n// 将 data 数组截断为 3 个元素\nint[] tData =\
  \ expandArray(data, 3);\nSystem.out.println(\"使用 for 循环...\");\nprintArrays(data,\
  \ eData, tData);\n/* 使用 System.arraycopy() 方法 */\n// 将 data 数组复制到新数组\neData = new\
  \ int[7];\ntData = new int[3];\nSystem.arraycopy(data, 0, eData, 0, 5);\nSystem.arraycopy(data,\
  \ 0, tData, 0, 3);\nSystem.out.println(\"\\n 使用 System.arraycopy() 方法...\");\nprintArrays(data,\
  \ eData, tData);\n/* 使用 Arrays.copyOf() 方法 */\n// 将 data 数组复制到新数组\neData = Arrays.copyOf(data,\
  \ 7);\ntData = Arrays.copyOf(data, 3);\nSystem.out.println(\"\\n 使用 Arrays.copyOf()\
  \ 方法...\");\nprintArrays(data, eData, tData);\n/* 使用 Arrays.copyOfRange() 方法 */\n\
  // 将 data 数组复制到新数组\nint[] copy1 = Arrays.copyOfRange(data, 0, 3);\nint[] copy2 =\
  \ Arrays.copyOfRange(data, 2, 4);\nSystem.out.println(\"\\n 使用 Arrays.copyOfRange()\
  \ 方法...\");\nSystem.out.println(\"原始数组: \" + Arrays.toString(data));\nSystem.out.println(\"\
  副本 1 (0, 3): \" + Arrays.toString(copy1));\nSystem.out.println(\"副本 2 (2, 4): \"\
  \ + Arrays.toString(copy2));\n}\n// 使用 for 循环复制数组\npublic static int[] expandArray(int[]\
  \ oldArray, int newLength) {\nint originalLength = oldArray.length;\nint[] newArray\
  \ = new int[newLength];\nint elementsToCopy = originalLength > newLength ? newLength\
  \ : originalLength;\nfor (int i = 0; i < elementsToCopy; i++) {\nnewArray[i] = oldArray[i];\n\
  }\nreturn newArray;\n}\nprivate static void printArrays(int[] original, int[] expanded,\
  \ int[] truncated) {\nSystem.out.println(\"原始数组: \" + Arrays.toString(original));\n\
  System.out.println(\"扩展数组: \" + Arrays.toString(expanded));\nSystem.out.println(\"\
  截断数组: \" + Arrays.toString(truncated));\n}\n}\n使用 for 循环...\n原始数组: [1, 2, 3, 4,\
  \ 5]\n扩展数组: [1, 2, 3, 4, 5, 0, 0]\n截断数组: [1, 2, 3]\n使用 System.arraycopy() 方法...\n\
  原始数组: [1, 2, 3, 4, 5]\n扩展数组: [1, 2, 3, 4, 5, 0, 0]\n截断数组: [1, 2, 3]\n使用 Arrays.copyOf()\
  \ 方法...\n原始数组: [1, 2, 3, 4, 5]\n扩展数组: [1, 2, 3, 4, 5, 0, 0]\n截断数组: [1, 2, 3]\n使用\
  \ Arrays.copyOfRange() 方法...\n原始数组: [1, 2, 3, 4, 5]\n副本 1 (0, 3): [1, 2, 3]\n副本\
  \ 2 (2, 4): [3, 4]\n清单 19-3.\n使用 for 循环和 System.arraycopy() 方法复制数组\n```\n\n`Arrays`\
  \ 类位于 `java.util` 包中。它包含许多处理数组的便捷方法。例如，它包含将数组转换为字符串格式、对数组进行排序等方法。你使用了 `Arrays.toString()`\
  \ 静态方法来获取数组内容的字符串格式。该方法已被重载；你可以使用它获取任何类型数组内容的字符串格式。在本例中，你使用了 `for` 循环和 `System.arraycopy()`\
  \ 方法来复制数组。请注意，使用 `arraycopy()` 方法比使用 `for` 循环强大得多。例如，`arraycopy()` 方法被设计用于处理将数组元素从同一数组的一个区域复制到另一个区域。它会处理源区域和目标区域在数组内可能存在的重叠情况。对于引用类型数组，你可以使用以下版本的\
  \ `copyOfRange()` 方法来更改返回数组的类型：\n\n```\nT[] copyOfRange(U[] original, int from,\
  \ int to, Class newType)\n```\n\n该方法接收一个 `U` 类型数组，并返回一个 `T` 类型的数组。\n\n**模拟可变长度数组**\n\
  \n众所周知，Java 不提供可变长度数组。然而，Java 库提供了一些类，这些类的对象可以用作可变长度数组。这些类提供了获取其元素数组表示形式的方法。`ArrayList`\
  \ 和 `Vector` 是 `java.util` 包中的两个类，在需要可变长度数组时可以使用它们。\n\n`ArrayList` 和 `Vector` 类的工作方式相同，区别在于\
  \ `Vector` 类中的方法是同步的，而 `ArrayList` 中的方法则不是。如果你的对象列表被多个线程同时访问和修改，请使用 `Vector` 类，它会更慢但线程安全。否则，你应该使用\
  \ `ArrayList` 类。在接下来的讨论中，我将仅提及 `ArrayList`。然而，这些讨论同样适用于 `Vector`。\n\n数组和 `ArrayList`\
  \ 类之间的主要区别在于，后者仅适用于对象，而不适用于原始数据类型。`ArrayList` 类是一个泛型类，它将元素类型作为类型参数。如果你想处理原始值，你需要声明一个包装类类型的\
  \ `ArrayList`。例如，使用 `ArrayList<Integer>` 来处理 `int` 元素，你所有的 `int` 值将自动装箱为 `Integer`\
  \ 对象。以下代码片段说明了 `ArrayList` 类的使用：\n\n```\nimport java.util.ArrayList;\n...\n// 创建一个\
  \ Integer 类型的 ArrayList\nArrayList ids = new ArrayList();\n// 获取数组列表的大小\nint total\
  \ = ids.size();    // 此时 total 为 0\n// 打印数组列表的详细信息\nSystem.out.println(\"ArrayList\
  \ 大小为 \" + total);\nSystem.out.println(\"ArrayList 元素为 \" + ids);\n// 向数组列表中添加三个\
  \ id：10, 20, 30\nids.add(new Integer(10)); // 添加一个 Integer 对象\nids.add(20);    \
  \          // 添加一个 int。自动装箱生效\nids.add(30);              // 添加一个 int。自动装箱生效\n//\
  \ 获取数组列表的大小\ntotal = ids.size(); // total 将为 3\n// 打印数组列表的详细信息\nSystem.out.println(\"\
  ArrayList 大小为 \" + total);\nSystem.out.println(\"ArrayList 元素为 \" + ids);\n// 清空数组列表中的所有元素\n\
  ids.clear();\n// 获取数组列表的大小\ntotal = ids.size(); // total 将为 0\n// 打印数组列表的详细信息\n\
  System.out.println(\"ArrayList 大小为 \" + total);\nSystem.out.println(\"ArrayList\
  \ 元素为 \" + ids);\nArrayList 大小为 0\nArrayList 元素为 []\nArrayList 大小为 3\nArrayList\
  \ 元素为 [10, 20, 30]\nArrayList 大小为 0\nArrayList 元素为 []\n```\n\n从该输出中注意一个重要观察点。你只需将\
  \ `ArrayList` 的引用传递给 `System.out.println()` 方法，即可打印其所有元素的列表。`ArrayList` 类的 `toString()`\
  \ 方法返回一个字符串，该字符串是其元素以逗号分隔的字符串表示形式，并用方括号（`[]`）括起来。\n\n与数组一样，`ArrayList` 使用基于零的索引。也就是说，`ArrayList`\
  \ 的第一个元素的索引为零。你可以使用 `get(int index)` 方法获取存储在任何索引处的元素。\n\n```\n// 获取索引 0 处的元素（第一个元素）\n\
  Integer firstId = ids.get(0);\n// 获取索引 1 处的元素（第二个元素）\nint secondId = ids.get(1);\
  \ // 自动拆箱生效\n```\n\n你可以使用 `contains()` 方法检查 `ArrayList` 是否包含某个对象。\n\n```\nInteger\
  \ id20 = 20;\nInteger id50 = 50;\n// 向数组列表中添加三个对象\nids.add(10);\nids.add(20);\n\
  ids.add(30);\n// 检查数组列表是否包含 id20 和 id50\nboolean found20 = ids.contains(id20); //\
  \ found20 将为 true\nboolean found50 = ids.contains(id50); // found50 将为 false\n```\n\
  \n\n你可以通过两种方式遍历 `ArrayList` 的元素：使用循环或使用迭代器。在本章中，我将讨论如何使用 `for` 循环遍历 `ArrayList`\
  \ 的元素。请参考本系列第二卷的第 15 章，了解如何使用迭代器遍历 `ArrayList`（或任何类型的集合）的元素。以下代码片段展示了如何使用 `for`\
  \ 循环遍历 `ArrayList` 的元素：\n\n```\n// 获取 ArrayList 的大小\nint total = ids.size();\n//\
  \ 遍历所有元素\nfor (int i = 0; i < total; i++) {\nint temp = ids.get(i);\n// 执行一些处理...\n\
  }\n```\n\n如果你希望遍历 `ArrayList` 的所有元素而不关心它们的索引，可以使用 `for`-`each` 循环，如下所示：\n\n```\n\
  // 遍历所有元素\nfor (int temp : ids) {\n// 使用 temp 执行一些处理...\n}\n```\n\n清单 19-4 演示了如何使用\
  \ `for` 循环和 `for-each` 循环遍历 `ArrayList` 的元素。它还展示了如何使用 `remove()` 方法从 `ArrayList`\
  \ 中移除元素。\n\n```\n// NameIterator.java\npackage com.jdojo.array;\nimport java.util.ArrayList;\n\
  public class NameIterator {\npublic static void main(String[] args) {\n// 创建一个 String\
  \ 类型的 ArrayList\nArrayList nameList = new ArrayList();\n// 添加一些名字\nnameList.add(\"\
  Chris\");\nnameList.add(\"Laynie\");\nnameList.add(\"Jessica\");\n// 获取列表中名字的数量\n\
  int count = nameList.size();\n// 使用 for 循环打印名字列表\nSystem.out.println(\"名字列表...\"\
  );\nfor(int i = 0; i < count; i++) {\nString name = nameList.get(i);\nSystem.out.println(name);\n\
  }\n// 从列表中移除 Jessica\nnameList.remove(\"Jessica\");\n// 再次获取列表中名字的数量\ncount = nameList.size();\n\
  // 使用 for-each 循环再次打印名字列表\nSystem.out.println(\"\\n 移除 Jessica 后...\");\nfor(String\
  \ name : nameList) {\nSystem.out.println(name);\n}\n}\n}\n名字列表...\nChris\nLaynie\n\
  Jessica\n移除 Jessica 后...\nChris\nLaynie\n清单 19-4.\n遍历 ArrayList 的元素\n```\n\n**将数组作为参数传递**\n\
  \n你可以将数组作为参数传递给方法或构造函数。传递给方法的数组类型必须与形参类型赋值兼容。方法中数组类型形参声明的语法与其他数据类型相同。也就是说，参数声明应以数组类型开头，后跟空格和参数名，如下所示：\n\
  \n```\n[修饰符]  ([参数名, ...])\n```\n\n以下是一些带有数组参数的方法声明示例：\n\n```\n// processSalary()\
  \ 方法有两个参数：\n// 1. id 是一个 int 数组\n// 2. salary 是一个 double 数组\npublic static void\
  \ processSalary(int[] id, double[] salary) {\n// 代码写在这里...\n}\n// setAka() 方法有两个参数：\n\
  // 1. id 是 int 类型（仅仅是 int 类型，不是 int 数组）\n// 2. aka 是一个 String 数组\npublic static\
  \ void setAka(int id, String[] aka) {\n// 代码写在这里...\n}\n// printStates() 方法有一个参数：\n\
  // 1. stateNames 是一个 String 数组\npublic static void printStates(String[] stateNames)\
  \ {\n// 代码写在这里...\n}\n```\n\n以下方法代码片段模拟了 `ArrayList` 的 `toString()` 方法。它接受一个 `int`\
  \ 数组，并返回用方括号（`[]`）括起来的逗号分隔值。\n\n```\npublic static String arrayToString(int[] source)\
  \ {\nif (source == null) {\nreturn null;\n}\n// 使用 StringBuilder 提高性能\nStringBuilder\
  \ result = new StringBuilder(\"[\");\nfor (int i = 0; i < source.length; i++) {\n\
  if (i == source.length - 1) {\nresult.append(source[i]);\n} else {\nresult.append(source[i]\
  \ + \",\");\n}\n}\nresult.append(\"]\");\nreturn result.toString();\n}\n```\n\n\
  可以按如下方式调用此方法：\n\n```\nint[] ids = {10, 15, 19};\nString str = arrayToString(ids);\
  \  // 将 ids int 数组传递给 arrayToString() 方法\n```\n\n由于数组是一个对象，因此数组引用被传递给方法。接收数组参数的方法可以修改数组的元素。清单\
  \ 19-5 演示了方法如何更改其数组参数的元素；此示例还展示了如何使用数组实现 `swap()` 方法来交换两个整数。\n\n```\n// Swap.java\n\
  package com.jdojo.array;\npublic class Swap {\npublic static void main(String[]\
  \ args) {\nint[] num = {17, 80};\nSystem.out.println(\"交换前\");\nSystem.out.println(\"\
  #1: \" + num[0]);\nSystem.out.println(\"#2: \" + num[1]);\n// 调用 swap() 方法，传递 num\
  \ 数组\nswap(num);\nSystem.out.println(\"交换后\");\nSystem.out.println(\"#1: \" + num[0]);\n\
  System.out.println(\"#2: \" + num[1]);\n}\n// swap() 方法接受一个 int 数组作为参数，如果数组包含两个值，则交换它们的值。\n\
  public static void swap (int[] source) {\nif (source != null && source.length ==\
  \ 2) {\n// 交换第一个和第二个元素\nint temp = source[0];\nsource[0] = source[1];\nsource[1]\
  \ = temp;\n}\n}\n}\n交换前\n#1: 17\n#2: 80\n交换后\n#1: 80\n#2: 17\n清单 19-5.\n将数组作为方法参数传递\n\
  ```\n\n回想一下，在第 8 章中，我们无法使用基本类型的方法参数实现交换两个整数的方法。这是因为，对于基本类型，实际参数会被复制到形参。在这里，你能够在\
  \ `swap()` 方法内部交换两个整数，是因为你使用了数组作为参数。传递给方法的是数组的引用，而不是数组元素的副本。\n\n将数组传递给方法存在一个风险。该方法可能会修改数组元素，有时这可能不是期望或预期的结果。在这种情况下，你应该将数组的副本传递给方法，而不是原始数组；这样，即使方法修改了数组，你的原始数组也不会受到影响。\n\
  \n你可以使用数组的 `clone()` 方法快速复制数组。“快速复制”这个说法需要特别注意。对于基本类型，克隆后的数组将拥有原始数组的真实副本。会创建一个长度相同的新数组，并将原始数组中每个元素的值复制到克隆数组的对应元素中。然而，对于引用类型，原始数组中每个元素存储的对象的引用会被复制到克隆数组的对应元素中。这被称为浅拷贝，而前一种复制对象（或值）的类型被称为深拷贝。在浅拷贝的情况下，原始数组和克隆数组的元素都指向内存中的同一个对象。你可以使用存储在原始数组和克隆数组中的引用来修改这些对象。在这种情况下，即使你将原始数组的副本传递给方法，原始数组中引用的对象的状态也可能在方法内部被修改。解决这个问题的方法是对原始数组进行深拷贝，然后将其传递给方法。以下代码片段说明了\
  \ `int` 数组和 `String` 数组的克隆。请注意，`clone()` 方法的返回类型是 `Object`，你需要将返回值强制转换为适当的数组类型。\n\
  \n```\n// 创建一个包含 3 个整数 1、2 和 3 的数组\nint[] ids = {1, 2, 3};\n// 声明一个名为 clonedIds\
  \ 的 int 数组。\nint[] clonedIds;\n// clonedIds 数组与 ids 数组具有相同的值。\nclonedIds = (int[])\
  \ ids.clone();\n// 创建一个包含 3 个字符串的数组。\nString[] names  = {\"Lisa\", \"Pat\", \"Kathy\"\
  };\n// 声明一个名为 clonedNames 的 String 数组。\nString[] clonedNames;\n// clonedNames 数组包含与\
  \ names 数组相同的三个字符串的引用。\nString[] clonedNames = (String[]) names.clone();\n```\n\n\
  \n\n前面代码片段中基本类型数组 `ids` 和引用类型数组 `names` 的克隆过程如图 19-2 至 19-5 所示。\n\n![A323069_2_En_19_Fig5_HTML.gif](img/A323069_2_En_19_Fig5_HTML.gif)\n\
  \n图 19-5.\n\n`names` 数组被克隆到 `clonedNames` 数组中\n\n![A323069_2_En_19_Fig4_HTML.gif](img/A323069_2_En_19_Fig4_HTML.gif)\n\
  \n图 19-4.\n\n`names` 数组被填充，并且 `clonedNames` 数组被声明\n\n![A323069_2_En_19_Fig3_HTML.gif](img/A323069_2_En_19_Fig3_HTML.gif)\n\
  \n图 19-3.\n\n`ids` 数组被克隆到 `clonedIds` 数组中\n\n![A323069_2_En_19_Fig2_HTML.gif](img/A323069_2_En_19_Fig2_HTML.gif)\n\
  \n图 19-2.\n\n`ids` 数组被填充，并且 `clonedIds` 数组被声明\n\n请注意，当克隆 `names` 数组时，`clonedNames`\
  \ 数组的元素引用的是内存中相同的 `String` 对象。当你提到修改传递给方法的数组参数的方法时，可能指的是以下三种情况中的一种或全部：\n\n*   数组参数引用\n\
  *   数组参数的元素\n*   数组参数元素所引用的对象\n\n**数组参数引用**\n\n由于数组是一个对象，因此传递给方法的是其引用的副本。如果方法改变了数组参数，实际参数不会受到影响。清单\
  \ 19-6 说明了这一点。`main()` 方法将数组传递给 `tryArrayChange()` 方法，该方法随后将一个不同的数组引用赋值给该参数。输出结果显示\
  \ `main()` 方法中的数组保持不变。\n\n```\n// ModifyArrayParam.java\npackage com.jdojo.array;\n\
  import java.util.Arrays;\npublic class ModifyArrayParam {\npublic static void main(String[]\
  \ args) {\nint[] origNum = {101, 307, 78};\nSystem.out.println(\"Before method call:\
  \ \" + Arrays.toString(origNum));\n// Pass the array to the method\ntryArrayChange(origNum);\n\
  System.out.println(\"After method call: \" + Arrays.toString(origNum));\n}\npublic\
  \ static void tryArrayChange(int[] num) {\nSystem.out.println(\"Inside method-1:\
  \ \" + Arrays.toString(num));\n// Create and store a new int array in num\nnum =\
  \ new int[]{10, 20};\nSystem.out.println(\"Inside method–2: \" + Arrays.toString(num));\n\
  }\n}\nBefore method call: [101, 307, 78]\nInside method-1: [101, 307, 78]\nInside\
  \ method–2: [10, 20]\nAfter method call: [101, 307, 78]\n清单 19-6.\n在方法内部修改数组参数\n\
  ```\n\n如果你不希望方法在方法体内改变数组引用，则必须将方法参数声明为 `final`，如下所示：\n\n```\npublic static void\
  \ tryArrayChange(final int[] num) {\n// An error. num is final and cannot be changed\n\
  num = new int[]{10, 20};\n}\n```\n\n**数组参数的元素**\n\n数组参数元素中存储的值始终可以在方法内部更改。清单 19-7\
  \ 说明了这一点。\n\n```\n// ModifyArrayElements.java\npackage com.jdojo.array;\nimport\
  \ java.util.Arrays;\npublic class ModifyArrayElements {\npublic static void main(String[]\
  \ args) {\nint[] origNum = {10, 89, 7};\nString[] origNames = {\"Mike\", \"John\"\
  };\nSystem.out.println(\"Before method call, origNum: \" + Arrays.toString(origNum));\n\
  System.out.println(\"Before method call, origNames: \" + Arrays.toString(origNames));\n\
  // Call methods passing the arrays\ntryElementChange(origNum);\ntryElementChange(origNames);\n\
  System.out.println(\"After method call, origNum: \" + Arrays.toString(origNum));\n\
  System.out.println(\"After method call, origNames: \" + Arrays.toString(origNames));\n\
  }\npublic static void tryElementChange(int[] num) {\n// If the array has at least\
  \ one element, store 1116 in its first element.\nif (num != null && num.length >\
  \ 0) {\nnum[0] = 1116;\n}\n}\npublic static void tryElementChange(String[] names)\
  \ {\n// If the array has at least one element, store \"Twinkle\" in its first element\n\
  if (names != null && names.length > 0) {\nnames[0] = \"Twinkle\";\n}\n}\n}\nBefore\
  \ method call, origNum: [10, 89, 7]\nBefore method call, origNames: [Mike, John]\n\
  After method call, origNum: [1116, 89, 7]\nAfter method call, origNames: [Twinkle,\
  \ John]\n清单 19-7.\n在方法内部修改数组参数的元素\n```\n\n请注意，方法调用后数组的第一个元素发生了变化。即使数组参数被声明为 `final`，你也可以在方法内部更改数组参数的元素。\n\
  \n**数组参数元素所引用的对象**\n\n本节仅适用于引用类型的数组参数。如果数组的引用类型是可变的，则可以更改存储在数组元素中的对象的状态。在上一节中，我讨论了用新的对象引用替换数组元素中存储的引用。本节讨论更改数组元素所引用的对象的状态。考虑一个\
  \ `Item` 类，如清单 19-8 所示。\n\n```\n// Item.java\npackage com.jdojo.array;\npublic class\
  \ Item {\nprivate double price;\nprivate final String name;\npublic Item (String\
  \ name, double price) {\nthis.name = name;\nthis.price = price;\n}\npublic double\
  \ getPrice() {\nreturn this.price;\n}\npublic void setPrice(double price ) {\nthis.price\
  \ = price;\n}\n@Override\npublic String toString() {\nreturn \"[\" + this.name +\
  \ \", \" + this.price + \"]\";\n}\n}\n清单 19-8.\nItem 类\n```\n\n清单 19-9 说明了这一点。`main()`\
  \ 方法创建了一个 `Item` 数组。该数组被传递给 `tryStateChange()` 方法，该方法将数组中第一个元素的价格更改为 10.38。输出结果显示，在\
  \ `main()` 方法中创建的原始数组元素的价格已被更改。\n\n```\n// ModifyArrayElementState.java\npackage\
  \ com.jdojo.array;\npublic class ModifyArrayElementState {\npublic static void main(String[]\
  \ args) {\nItem[] myItems = {new Item(\"Pen\", 25.11), new Item(\"Pencil\", 0.10)};\n\
  System.out.println(\"Before method call #1:\" + myItems[0]);\nSystem.out.println(\"\
  Before method call #2:\" + myItems[1]);\n// Call the method passing the array of\
  \ Item\ntryStateChange(myItems);\nSystem.out.println(\"After method call #1:\" +\
  \ myItems[0]);\nSystem.out.println(\"After method call #2:\" + myItems[1]);\n}\n\
  public static void tryStateChange(Item[] allItems) {\nif (allItems != null && allItems.length\
  \ > 0) {\n// Change the price of the first item to 10.38\nallItems[0].setPrice(10.38);\n\
  }\n}\n}\nBefore method call #1:[Pen, 25.11]\nBefore method call #2:[Pencil, 0.1]\n\
  After method call #1:[Pen, 10.38]\nAfter method call #2:[Pencil, 0.1]\n清单 19-9.\n\
  在方法内部修改数组参数元素的数组元素状态\n```\n\n**提示**\n\n\n\n`clone()` 方法可用于复制数组。对于引用数组，`clone()`\
  \ 方法执行的是浅拷贝。在向方法传递数组以及从方法返回数组时需谨慎。如果某个方法可能会修改其数组参数，而你又不希望实际数组参数受到该方法调用的影响，则必须向该方法传递数组的深拷贝。\n\
  \n如果你将对象的状态存储在数组实例变量中，那么在从类的任何方法返回该数组的引用之前，应仔细考虑。该方法的调用者将获得数组实例变量的句柄，并能够在类外部更改该类对象的状态。以下示例说明了这种情况：\n\
  \n```\npublic class MagicNumber {\n// 幻数不应被更改，但可以查询。\nprivate int[] magicNumbers\
  \ = {5, 11, 21, 51, 101};\n// 其他代码...\npublic int[] getMagicNumbers () {\n/* 切勿执行以下操作。如果这样做，该方法的调用者将能够更改幻数。\n\
  */\n// return this.magicNumbers;\n/* 应执行以下操作。对于引用数组，进行深拷贝，并返回该拷贝。对于基本类型数组，可以使用 clone()\
  \ 方法。\n*/\nreturn (int[]) magicNumbers.clone();\n}\n}\n```\n\n你也可以创建数组并将其传递给方法，而无需将数组引用存储在变量中。假设有一个名为\
  \ `setNumbers(int[] nums)` 的方法，它接受一个 `int` 数组作为参数。你可以按如下方式调用此方法：\n\n```\nsetNumbers(new\
  \ int[]{10, 20, 30});\n```\n\n请注意，在这种情况下必须使用 `new` 运算符。以下方法调用将无法工作：\n\n```\n// 编译时错误。数组初始化列表仅在数组声明语句中受支持\n\
  setNumbers({10, 20, 30});\n```\n\n命令行参数\n\nJava 应用程序可以从命令提示符（Windows 中的命令提示符和 UNIX\
  \ 中的 shell 提示符）启动。它也可以从 Java 开发环境工具（如 NetBeans、Eclipse、JDeveloper 等）中启动。Java 应用程序在命令行中按如下方式运行：\n\
  \n```\njava --module-path <模块路径> --module <模块名>/<主类>\njava --module-path <模块路径>\
  \ --module <模块名>/<主类> <参数列表>\n```\n\n参数列表中的每个参数由空格分隔。例如，以下命令运行 `com.jdojo.array.Test`\
  \ 类，并将三个名称作为命令行参数传递：\n\n```\nC:\\Java9Fundamentals>java --module-path build\\modules\\\
  jdojo.array --module jdojo.array/com.jdojo.array.Test Cat Dog Rat\n```\n\n当 `Test`\
  \ 类运行时，这三个命令行参数会发生什么？操作系统将参数列表传递给 JVM。有时操作系统可能会通过解释参数的含义来扩展参数列表，并将修改后的参数列表传递给 JVM。JVM\
  \ 使用空格作为分隔符来解析参数列表。它创建一个 `String` 数组，其长度与列表中的参数数量相同。它按顺序用参数列表中的项填充 `String` 数组。最后，JVM\
  \ 将此 `String` 数组传递给你正在运行的 `Test` 类的 `main()` 方法。此时，你可以使用传递给 `main()` 方法的 `String`\
  \ 数组参数。如果没有命令行参数，JVM 会创建一个长度为 0 的 `String` 数组并将其传递给 `main()` 方法。如果你想将空格分隔的单词作为一个参数传递，可以将它们括在双引号中。你也可以通过将特殊字符括在双引号中来避免操作系统对它们的解释。让我们创建一个名为\
  \ `CommandLine` 的类，如清单 19-10 所示。\n\n```\n// CommandLine.java\npackage com.jdojo.array;\n\
  public class CommandLine {\npublic static void main(String[] args) {\n// args 包含所有命令行参数\n\
  System.out.println(\"总参数数: \" + args.length);\n// 显示所有参数\nfor (int i = 0; i < args.length;\
  \ i++) {\nSystem.out.println(\"参数 #\" + (i + 1) + \": \" + args[i]);\n}\n}\n}\n\
  清单 19-10. 在 main() 方法内处理命令行参数\n```\n\n以下是将命令行参数传递给 `CommandLine` 类的几个示例：\n\n```\n\
  C:\\Java9Fundamentals>java --module-path build\\modules\\jdojo.array --module jdojo.array/com.jdojo.array.CommandLine\n\
  总参数数: 0\nC:\\Java9Fundamentals>java --module-path build\\modules\\jdojo.array --module\
  \ jdojo.array/com.jdojo.array.CommandLine Cat Dog Rat\n总参数数: 3\n参数 #1: Cat\n参数 #2:\
  \ Dog\n参数 #3: Rat\nC:\\Java9Fundamentals>java --module-path build\\modules\\jdojo.array\
  \ --module jdojo.array/com.jdojo.array.CommandLine \"Cat Dog Rat\"\n总参数数: 1\n参数\
  \ #1: Cat Dog Rat\nC:\\Java9Fundamentals>java --module-path build\\modules\\jdojo.array\
  \ --module jdojo.array/com.jdojo.array.CommandLine 29 Dogs\n总参数数: 2\n参数 #1: 29\n\
  参数 #2: Dogs\n```\n\n命令行参数有什么用？它们让你无需重新编译即可更改程序的行为。例如，你可能希望按升序或降序对文件内容进行排序。你可以传递命令行参数来指定排序顺序。如果命令行未指定排序顺序，你可以默认假定为升序。如果你调用排序类\
  \ `com.jdojo.array.SortFile`，你可以通过以下方式运行它。\n\n```\n// 按升序对 employee.txt 文件进行排序\n\
