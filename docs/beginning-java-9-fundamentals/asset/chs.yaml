  \ names.txt asc\n// 按降序对 department.txt 文件进行排序\nC:\\Java9Fundamentals>java --module-path\
  \ build\\modules\\jdojo.array --module jdojo.array/com.jdojo.array.SortFile names.txt\
  \ desc\n// 按升序对 salary.txt 文件进行排序\nC:\\Java9Fundamentals>java --module-path build\\\
  modules\\jdojo.array --module jdojo.array/com.jdojo.array.SortFile names.txt\n```\n\
  \n根据传递给 `SortFile` 类的 `main()` 方法的 `String` 数组的第二个元素（如果有），你可以对文件进行不同的排序。\n\n请注意，所有命令行参数都作为\
  \ `String` 传递给 `main()` 方法。如果你传递数字参数，则需要将字符串参数转换为数字。为了说明这种数字参数转换，让我们开发一个迷你计算器类，它接受一个表达式作为命令行参数并打印结果。该迷你计算器仅支持四种基本运算：加、减、乘、除；参见清单\
  \ 19-11。\n\n\n\n```\n// Calc.java\npackage com.jdojo.array;\nimport java.util.Arrays;\n\
  public class Calc {\npublic static void main(String[] args) {\n// 打印命令行参数列表\nSystem.out.println(Arrays.toString(args));\n\
  // 确保我们收到了三个参数，并且第二个参数只有一个字符以指示操作\nif (!(args.length == 3 && args[1].length() ==\
  \ 1)) {\nprintUsage();\nreturn;    // 在此处停止程序\n}\n// 解析两个数字操作数。将解析代码放在 try-catch\
  \ 块中，\n// 这样如果两个操作数不是数字，我们可以处理错误。\ndouble n1;\ndouble n2;\ntry {\nn1 = Double.parseDouble(args[0]);\n\
  n2 = Double.parseDouble(args[2]);\n} catch (NumberFormatException e) {\nSystem.out.println(\"\
  两个操作数都必须是数字\");\nprintUsage();\nreturn;    // 在此处停止程序\n}\nString operation = args[1];\n\
  double result = compute(n1, n2, operation);\n// 打印结果\nSystem.out.println(args[0]\
  \ + args[1] + args[2] + \" = \" + result);\n}\npublic static double compute(double\
  \ n1, double n2, String operation) {\n// 将结果初始化为非数字\ndouble result = Double.NaN;\n\
  switch (operation) {\ncase \"+\":\nresult = n1 + n2;\nbreak;\ncase \"-\":\nresult\
  \ = n1 - n2;\nbreak;\ncase \"*\":\nresult = n1 * n2;\nbreak;\ncase \"/\":\nresult\
  \ = n1 / n2;\nbreak;\ndefault:\nSystem.out.println(\"无效操作:\" + operation);\n}\n\
  return result;\n}\npublic static void printUsage() {\nSystem.out.println(\"用法: java\
  \ com.jdojo.array.Calc expr\");\nSystem.out.println(\"其中 expr 可以是:\");\nSystem.out.println(\"\
  n1 + n1\");\nSystem.out.println(\"n1 - n2\");\nSystem.out.println(\"n1 * n2\");\n\
  System.out.println(\"n1 / n2\");\nSystem.out.println(\"n1 和 n2 是两个数字\");\n}\n}\n\
