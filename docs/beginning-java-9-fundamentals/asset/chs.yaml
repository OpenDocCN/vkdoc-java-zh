  \ 很简单。创建它的对象，并将其传递给那些接受对象集合和比较器以进行比较的方法。例如，要对一个 `ComparablePerson` 对象数组进行排序，可以将该数组和一个\
  \ `FirstNameComparator` 传递给 `Arrays` 类的静态 `sort()` 方法。\n\n```\nComparablePerson[]\
  \ persons = 创建并填充数组...\n// 基于名字对 persons 数组进行排序\nComparator fnComparator = new FirstNameComparator();\n\
  Arrays.sort(persons, fnComparator);\n```\n\n你可以使用类似的逻辑基于姓氏对数组进行排序：\n\n```\n// 基于姓氏对\
  \ persons 数组进行排序\nComparator lnComparator = new LastNameComparator();\nArrays.sort(persons,\
  \ lnComparator);\n```\n\n在 Java 8 之前，如果你想先按名字再按姓氏对数组进行排序，你需要创建 `Comparator` 接口的另一个实现。得益于\
  \ Java 8 为接口引入的默认方法，你不再需要创建 `Comparator` 接口的新实现。`Comparator` 类包含一个 `thenComparing()`\
  \ 默认方法，其声明如下：\n\n```\ndefault Comparator thenComparing(Comparator other)\n```\n\n\
  该方法接受一个 `Comparator` 作为参数，并返回一个新的 `Comparator`。当使用原始 `Comparator` 比较两个对象相等时，将使用这个新的\
  \ `Comparator` 进行排序。以下代码片段将名字和姓氏的 `Comparator` 组合起来，创建一个新的 `Comparator`：\n\n```\n\
  // 先按名字排序，再按姓氏排序\nComparator firstLastComparator = fnComparator.thenComparing(lnComparator);\n\
  Arrays.sort(persons, firstLastComparator);\n```\n\n提示\n\n你可以链式调用 `thenComparing()`\
  \ 方法来创建一个在多个嵌套级别上施加排序的 `Comparator`。\n\nJava 8 中 `Comparator` 接口的另一个有用补充是一个名为 `reversed()`\
  \ 的默认方法。该方法返回一个新的 `Comparator`，它施加与原始 `Comparator` 相反的排序。如果你想先按名字再按姓氏降序排序数组，可以这样做：\n\
  \n```\n// 先按名字排序，再按姓氏降序排序\nComparator firstLastReverseComparator = firstLastComparator.reversed();\n\
  Arrays.sort(persons, firstLastReverseComparator);\n```\n\n比较器不能很好地处理 `null` 值。通常，它们会抛出\
  \ `NullPointerException`。Java 8 为 `Comparator` 接口添加了以下两个有用的、对 null 友好的便捷静态方法：\n\n\
  *   `static <T> Comparator<T> nullsFirst(Comparator<? super T> comparator)`\n\n\
  *   `static <T> Comparator<T> nullsLast(Comparator<? super T> comparator)`\n\n这些方法接受一个\
  \ `Comparator`，并返回一个对 null 友好的 `Comparator`，该比较器将 null 值放在最前面或最后面。你可以按如下方式使用这些方法：\n\
  \n```\n// 先按名字排序，再按姓氏排序，null 值放在最前面\nComparator nullFirstComparator = Comparator.nullsFirst(firstLastComparator);\n\
  Arrays.sort(persons, nullFirstComparator);\n```\n\n清单 21-40 使用此类的对象对 `ComparablePerson`\
