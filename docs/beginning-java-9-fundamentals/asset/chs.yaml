  \  `operand1 = operand1 &#124; operand2`\n |\n\n`operand1 ^= operand2`\n |\n  `operand1\
  \ = operand1 ^ operand2`\n |\n\n如果两个操作数都求值结果为 `true`，`&=` 返回 `true`。否则，它\n返回 `false`。\n\
  \n```\nboolean b = true;\nb &= true;  // 将 true 赋值给 b\nb &= false; // 将 false 赋值给\
  \ b\n```\n\n如果任一操作数\n\n求值结果为 `true`，`|=` 返回 `true`。否则，它\n返回 `false`。\n\n```\nboolean\
