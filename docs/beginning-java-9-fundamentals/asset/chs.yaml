  \    for() {\n\n}\n    ```\n\n7.  类\n\n在本章中，你将学习：\n\n*   Java 中的类是什么\n\n*   如何在\
  \ Java 中声明类\n\n*   如何声明字段等类成员\n\n*   如何创建类的对象\n\n*   如何在编译单元中声明 import 语句\n\n什么是类？\n\
  \n在面向对象范式中，类是编程的基本单元。在第 3 章中，你已经了解了 Java 中类的一些基本方面，例如使用 `class` 关键字声明类、声明 `main()`\
  \ 方法来运行类等。本章将详细解释如何声明和使用类。\n\n让我们从一个现实世界中类的简单示例开始，以构建 Java 中类的技术概念。当你环顾四周时，会看到许多对象，例如书籍、电脑、键盘、桌子、椅子、人类等。你看到的每个对象都属于某个类。问自己一个简单的问题：“我是谁？”你显而易见的回答是：我是人类。你说自己是人类是什么意思？你的意思是，世界上存在一个人类类，而你是该类的一个实例（“存在”）。你也理解还有其他人类（人类类的其他实例）存在，他们与你相似，但并不相同。你和你的朋友作为同一个人类类的实例，拥有相同的属性，例如姓名、性别、身高、体重，以及相同的行为，例如思考、说话、走路等能力。然而，这些属性和行为在数值、质量或两者上对你和朋友来说是不同的。例如，两人都有姓名和说话能力。但你的名字可能是理查德，而你朋友的名字可能是格雷格。你可能说话慢，而你的朋友可能说话快。如果你想为你和朋友建立一个模型来研究你们的行为，有两种选择。\n\
  \n*   你可以分别列出你和朋友的所有属性和行为，并分别研究它们，就好像你和朋友之间没有联系一样。\n\n*   你可以列出你和朋友共有的属性和行为，然后将它们作为一个实体的属性和行为来研究，而不指定你和朋友的名字。这个模型假设所有列出的属性和行为都会出现在一个实体中（不指定其名称），尽管它们可能因实体而异。你可能希望将你和朋友的所有属性和行为列为一个类（例如人类）的属性和行为，并将你和朋友视为该人类类的两个不同实例。本质上，你将具有相似属性和行为的实体（例如你和你的朋友）分组在一起，并将该组称为一个类。然后，你将把所有对象（同样，你和你的朋友）视为该类的实例。\n\
  \n第一种方法将每个对象视为一个独立的实体。在第二种方法中，对象根据属性和行为的相似性进行分类，对象始终属于某个类；类成为编程的基本部分。要确定对象的任何属性或行为，你需要查找其类定义。例如，你是人类类的一个对象。你能飞吗？这个问题可以通过一系列步骤来回答。首先，你需要回答“你属于哪个类？”答案是：你属于人类类。人类类定义了飞行行为吗？答案是否定的。因为你是人类类的一个实例，而该类没有定义飞行行为，所以你不能飞。如果你仔细审视得出答案的方式，你会发现问题是针对一个对象（你）提出的，但答案是由该对象所属的类（人类）提供的。\n\
  \n类是必不可少的，它们是面向对象编程中程序的基本组成部分。它们被用作创建对象的模板。如何在 Java 中定义类？Java 中的类可能包含五个组成部分：\n\n\
  *   字段\n\n*   方法\n\n*   构造器\n\n*   静态初始化器\n\n*   实例初始化器\n\n字段和方法也被称为类的成员。类和接口也可以是类的成员。本章仅关注字段。我将在《Beginning\
  \ Java 9》系列的第二卷中讨论作为类成员的类和接口。一个类可以有零个或多个类成员。类的类成员也称为嵌套类。\n\n类似于婴儿出生时赋予其初始特征（如姓名、性别、身高和体重），新创建对象的属性在对象创建时被初始化。在\
  \ Java 中，为对象的属性赋予初始值称为初始化对象。构造器用于初始化类的对象。一个类必须至少有一个构造器。\n\n初始化器用于初始化类的字段。你可以有零个或多个静态或实例类型的初始化器。初始化器执行与构造器相同的任务。初始化器也可用于初始化类级别的字段，而构造器只能初始化对象级别的字段。\n\
  \n本章的其余部分将讨论如何声明和使用类的字段。\n\n声明类\n\n在 Java 中声明类的一般语法如下：\n\n```\n[修饰符] class 类名 {\n\
  // 类的主体写在这里\n}\n```\n\n其中，\n\n*   `修饰符` 是可选的；它们是关键字，为类声明赋予特殊含义。一个类声明可以有零个或多个修饰符。\n\
  \n*   关键字 `class` 用于声明类。\n\n*   `类名` 是用户定义的类名称，应为有效的 Java 标识符。\n\n*   每个类都有一个主体，主体在一对大括号（`{}`）内指定。类的主体包含其不同的组成部分，例如字段、方法等。\n\
  \n以下代码片段定义了一个名为 `Human` 的类，其主体为空。请注意，`Human` 类未使用任何修饰符。\n\n```\n// Human.java\n\
  class Human {\n// 暂时为空的主体\n}\n```\n\n以下代码片段定义了一个名为 `Human` 的公共类，其主体为空。请注意，此声明使用了\
  \ `public` 修饰符。\n\n```\n// Human.java\npublic class Human {\n// 暂时为空的主体\n}\n```\n\
  \n我将在本章后面详细解释公共类与其他类型类之间的区别。\n\n在类中声明字段\n\n类的字段表示该类对象的属性（也称为特征）。假设 `Human` 类的每个对象都有两个属性：姓名和性别。`Human`\
  \ 类应包含两个字段的声明：一个表示姓名，一个表示性别。\n\n\n\n字段在类的主体内部声明。在类中声明字段的通用语法如下：\n\n```\n[修饰符] class\
  \  {\n// 字段声明\n[修饰符]   [= ];\n}\n```\n\n字段声明可以使用零个或多个`修饰符`。字段的数据类型位于其名称之前。你也可以选择为每个字段初始化一个值。如果不想初始化字段，其声明应在名称后以分号结束。\n\
  \n以两个字段`name`和`gender`为例，`Human`类的声明如下所示：\n\n```\n// Human.java\nclass Human {\n\
  String name;\nString gender;\n}\n```\n\n提示\n\n在 Java 中，约定俗成（并非规则或要求）类名以大写字母开头，后续单词首字母也大写，例如`Human`、`Table`、`ColorMonitor`等。字段和方法名应以小写字母开头，后续单词首字母大写，例如`name`、`firstName`、`maxDebitAmount`等。\n\
  \n`Human`类声明了两个字段：`name`和`gender`。这两个字段都是`String`类型。`Human`类的每个实例（或对象）都将拥有这两个字段的副本。\n\
  \n有时某个属性属于类本身，而非该类的任何特定实例。例如，所有人类的总数并非某个特定人类的属性，而是属于人类类本身。人类总数的存在并不依赖于人类类的任何特定实例，尽管人类类的每个实例都对总数属性值有贡献。无论类存在多少个实例，类属性都只有一份副本。然而，类的每个实例都拥有实例属性的独立副本。例如，`Human`类的每个实例都拥有`name`和`gender`属性的独立副本。你总是需要指定某个人的姓名和性别。但是，即使没有`Human`类的实例，你也可以说`Human`类的实例数量为零。\n\
  \nJava 允许你为类声明两种类型的字段：\n\n*   类字段\n*   实例字段\n\n类字段也称为类变量。实例字段也称为实例变量。在前面的代码片段中，`name`和`gender`是`Human`类的两个实例变量。Java\
  \ 有另一种声明类变量的方式。所有类变量都必须使用`static`关键字作为修饰符来声明。清单 7-1 中的`Human`类声明添加了一个`count`类变量。\n\
  \n```\n// Human.java\npackage com.jdojo.cls;\nclass Human {\nString name;      \
  \  // 实例变量\nString gender;      // 实例变量\nstatic long count;  // 类变量，因为使用了 static\
  \ 修饰符\n}\n清单 7-1.\n声明一个包含一个类变量和两个实例变量的 Human 类\n```\n\n提示\n\n类变量也称为静态变量。实例变量也称为非静态变量。\n\
  \n创建类的实例\n\n创建类实例的通用语法如下：\n\n```\nnew ;\n```\n\n`new`运算符后跟对正在创建实例的类的构造器的调用。`new`运算符通过在堆上分配内存来创建类的实例。以下语句创建了`Human`类的一个实例：\n\
  \n```\nnew Human();\n```\n\n这里，`Human()`是对`Human`类构造器的调用。你是否在`Human`类中添加了任何构造器？没有。你只向`Human`类添加了三个字段。对于没有添加构造器的类，你如何使用它的构造器呢？当你没有为类添加构造器时，Java\
  \ 编译器会为你添加一个。由 Java 编译器添加的构造器称为默认构造器。默认构造器不接受任何参数。类的构造器名称与类名相同。我将在第 9 章详细讨论构造器。\n\
  \n创建类的实例时会发生什么？`new`运算符为类的每个实例字段分配内存。回想一下，创建类的实例时，类变量不会被分配内存。图 7-1 描绘了内存中`Human`类的一个实例。\n\
  \n![A323069_2_En_7_Fig1_HTML.gif](img/A323069_2_En_7_Fig1_HTML.gif)\n\n图 7-1.\n\n\
  通过 new Human()实例创建表达式在内存中创建的 Human 类实例\n\n图 7-1 显示，为实例变量`name`和`gender`分配了内存。你可以根据需要创建任意多个`Human`类的实例。每次创建`Human`类的实例时，Java\
  \ 运行时都会为`name`和`gender`实例变量分配内存。`Human`类的实例分配了多少内存？简单的答案是，你并不确切知道类的实例使用了多少内存，事实上，你也不需要知道。Java\
  \ 运行时会自动为你处理内存分配和释放。\n\n现在，你希望更进一步，为新建的`Human`类实例的`name`和`gender`实例变量赋值。你能为新建的`Human`类实例的`name`和`gender`实例变量赋值吗？答案是不能。即使`name`和`gender`实例变量存在于内存中，你也无法访问它们。要访问类实例的实例变量，你必须拥有它的引用（或句柄）。表达式`new\
  \ Human()`在内存中创建了`Human`类的一个新实例。新创建的实例就像一只充满氦气飘在空中的气球。当你将充满氦气的气球释放到空中时，你就失去了对气球的控制。如果你在释放气球前给它系上一根绳子，你就可以用绳子控制气球。同样，如果你想控制（或访问）类的实例，你必须将该实例的引用存储在一个引用变量中。你用绳子控制气球；你用遥控器控制电视。控制设备的类型取决于你想要控制的对象类型。同样，你需要使用不同类型的引用变量来引用（或处理、操作）不同类的实例。\n\
  \n类的名称在 Java 中定义了一种新的引用类型。特定引用类型的变量可以存储内存中同一引用类型实例的引用。假设你想声明一个引用变量，用于存储`Human`类实例的引用。你可以这样声明变量：\n\
  \n```\nHuman jack ;\n```\n\n这里，`Human`是类名，也是一种引用类型，`jack`是该类型的变量。换句话说，`jack`是`Human`类型的引用变量。`jack`变量可用于存储`Human`类实例的引用。\n\
  \n`new`运算符为类的新实例分配内存，并返回该实例的引用（或间接指针）。你需要将`new`运算符返回的引用存储在引用变量中。\n\n```\njack =\
  \ new Human() ;\n```\n\n\n\n请注意，`jack`\n本身是一个变量，它会被单独分配内存。`jack` 变量的内存位置将存储新创建的\
  \ `Human` 类实例的内存位置的引用。图 7-1 描述了声明引用变量 `jack` 以及创建 `Human` 类实例并将其引用赋值给 `jack` 变量时的内存状态。\n\
  \n![A323069_2_En_7_Fig2_HTML.gif](img/A323069_2_En_7_Fig2_HTML.gif)\n\n图 7-2.\n\n\
  声明引用变量以及将类实例的引用赋值给引用变量时的内存状态\n\n你可以将 `jack` 变量视为内存中 `Human` 实例的遥控器。你可以使用 `jack`\
  \ 变量来引用内存中的 `Human` 实例。我将在下一节讨论如何使用引用变量。你也可以将这两个语句合并为一个。\n\n```\nHuman jack = new\
  \ Human();\n```\n\n空引用类型\n\nJava 中的每个类都定义了一个新的引用类型。Java 有一种特殊的引用类型，称为空类型。它没有名称。因此，你不能定义空引用类型的变量。空引用类型只有一个由\
  \ Java 定义的值，即 `null` 字面量。它就是 `null`。空引用类型与所有其他引用类型赋值兼容。也就是说，你可以将 `null` 赋值给任何引用类型的变量。实际上，存储在引用变量中的\
  \ `null` 意味着该引用变量没有引用任何对象。你可以将 `null` 存储在引用变量中想象成一根没有系气球的绳子，其中气球是有效的对象，绳子是引用变量。例如，你可以编写如下代码：\n\
  \n```\n// 将 null 赋值给 john\nHuman john = null;  // john 没有引用任何对象\njohn = new Human();\
  \ // 现在，john 引用了一个有效的 Human 对象\n```\n\n你可以将 `null` 与比较运算符一起使用来检查相等性和不等性。\n\n```\n\
  if (john == null) {\n// john 引用的是 null。不能对 john 进行任何操作\n} else {\n// 对 john 执行某些操作\n\
  }\n```\n\n如果你对 `null` 引用执行操作，则会抛出 `NullPointerException`。\n\n```\nHuman john = null;\n\
  // 以下语句会抛出 NullPointerException，因为 john 是 null，并且你\n// 不能对 null 引用变量执行任何操作\nString\
  \ name = john.name;\n```\n\n请注意，`null` 是空类型的一个字面量。Java 不允许你混合使用引用类型和基本类型。你不能将 `null`\
  \ 赋值给基本类型变量。以下赋值语句将产生编译时错误：\n\n```\n// 编译时错误。引用类型值 null 不能赋值给\n// 基本类型变量 num\nint\
  \ num = null;\n```\n\n因为 `null`（或任何引用类型值）不能赋值给基本类型变量，所以 Java 编译器不允许你将基本类型值与 `null`\
  \ 值进行比较。以下比较将产生编译时错误。换句话说，你可以将引用类型与其他引用类型进行比较，以及将基本类型与其他基本类型进行比较。\n\n```\nint num\
  \ = 0;\n// 编译时错误。不能将基本类型与引用类型进行比较\nif (num == null) {\n}\n```\n\n提示\n\nJava 有一种特殊的引用类型，称为空类型。空类型没有名称。空类型有一个字面量值，由\
  \ `null` 表示。空类型与所有其他引用类型赋值兼容。你可以为任何引用类型变量赋值 `null`。你可以将 `null` 值强制转换为任何引用类型。需要强调的是，`null`\
  \ 是“空引用类型”的字面量值，而不是关键字。\n\n使用点符号访问类的字段\n\n点符号用于引用实例变量。点符号语法的一般形式如下：\n\n```\n.\n\
  ```\n\n例如，你使用 `jack.name` 来引用 `jack` 引用变量所引用的实例的 `name` 实例变量。如果你想给 `name` 实例变量赋值，可以使用以下代码：\n\
  \n```\njack.name = \"Jack Parker\";\n```\n\n以下语句将 `name` 实例变量的值赋给一个 `String` 变量\
  \ `aName`：\n\n```\nString aName = jack.name;\n```\n\n如何引用类变量？有两种方法可以使用点符号引用类变量：\n\
  \n*   使用类名\n*   使用类实例的引用\n\n你可以使用类名来引用类变量。\n\n```\n.\n```\n\n例如，你可以使用 `Human.count`\
  \ 来引用 `Human` 类的 `count` 类变量。要赋一个新值，比如 101，给 `count` 类变量，你可以这样写：\n\n```\nHuman.count\
  \ = 101;\n```\n\n要将 `count` 类变量的值读入一个名为 `population` 的变量，你可以使用以下代码：\n\n```\nlong\
  \ population = Human.count;\n```\n\n你也可以使用引用变量来引用类的类变量。例如，你可以使用 `jack.count` 来引用\
  \ `Human` 类的 `count` 类变量。你可以使用以下语句给 `count` 类变量赋值，比如 101：\n\n```\njack.count = 101;\n\
  ```\n\n以下语句将 `count` 类变量的值读入一个名为 `population` 的变量：\n\n```\nlong population = jack.count;\n\
  ```\n\n这两个语句都假设 `jack` 是 `Human` 类型的引用变量，并且它引用了一个有效的 `Human` 实例。\n\n提示\n\n你可以使用类名或类类型的引用变量来引用类变量。由于类变量属于该类，并且由该类的所有实例共享，因此使用类名来引用它是合乎逻辑的。但是，你必须始终使用类类型的引用变量来引用实例变量。\n\
  \n现在是时候看看 `Human` 类中的字段是如何实际使用的了。本章中的大多数类都是 `jdojo.cls` 模块的一部分，如清单 7-2 中所声明。模块名中的\
  \ `cls` 是 class 的缩写。你不能使用 `jdojo.class` 作为模块名，因为 `class` 是一个关键字。该模块导出了一个 `com.jdojo.cls`\
  \ 包。你还没有学习模块声明中的 `exports` 语句。我将在本章中解释它。\n\n```\n// module-info.class\nmodule jdojo.cls\
  \ {\nexports com.jdojo.cls;\n}\n清单 7-2.\njdojo.cls 模块的声明\n```\n\n清单 7-3 包含一个完整的程序，演示了如何访问类的类变量和实例变量。\n\
  \n```\n// FieldAccessTest.java\npackage com.jdojo.cls;\nclass FieldAccessTest {\n\
  public static void main(String[] args) {\n// 创建 Human 类的一个实例\nHuman jack = new Human();\n\
  // 将 count 增加 1\nHuman.count++;\n// 给 name 和 gender 赋值\njack.name = \"Jack Parker\"\
  ;\njack.gender = \"Male\";\n// 读取并打印 name、gender 和 count 的值\nString jackName = jack.name;\n\
  String jackGender = jack.gender;\nlong population = Human.count;\nSystem.out.println(\"\
  Name: \" + jackName);\nSystem.out.println(\"Gender: \" + jackGender);\nSystem.out.println(\"\
  Population: \" + population);\n// 更改 name\njack.name = \"Jackie Parker\";\n// 读取并打印更改后的\
  \ name\nString changedName = jack.name;\nSystem.out.println(\"Changed Name: \" +\
  \ changedName);\n}\n}\n清单 7-3.\n在类声明中使用字段\n```\n\n```\nName: Jack Parker\nGender:\
  \ Male\nPopulation: 1\nChanged Name: Jackie Parker\n```\n\n该程序中的以下语句需要一些解释：\n\n\
  ```\n// 将 count 增加 1\nHuman.count++;\n```\n\n\n\n它在 `count` 类变量上使用了自增运算符（`++`）。\n\
  当 `count` 类变量自增 1 后，你读取并打印了它的值。输出显示，在其值自增 1 后，其值变为 `1`。这意味着在执行 `Human.count++` 语句之前，其值为零。然而，你从未将其值设为零。它的声明如下：\n\
  \n```\nstatic long count;\n```\n\n当 `count` 类变量按上述方式声明时，它会被默认初始化为零。如果你没有为类的所有字段（类变量和实例变量）赋予初始值，它们都会被初始化为一个默认值。下一节将描述用于初始化类字段的规则。\n\
  \n字段的默认初始化\n\n类的所有字段，无论是静态的还是非静态的，都会被初始化为一个默认值。字段的默认值取决于其数据类型。\n\n*   数值型字段（`byte`、`short`、`char`、`int`、`long`、`float`\
  \ 和 `double`）被初始化为零。\n*   `boolean` 字段被初始化为 `false`。\n*   引用类型字段被初始化为 `null`。\n\n\
  根据这些规则，`Human` 类的字段将被初始化如下：\n\n*   `count` 类变量被初始化为零，因为它属于数值类型。这就是 `Human.count++`\
  \ 计算结果为 `1`（`0 + 1 = 1`）的原因，如清单 7-3 的输出所示。\n*   `name` 和 `gender` 实例变量属于 `String`\
  \ 类型。`String` 是一种引用类型。它们被初始化为 `null`。回想一下，`Human` 类的每个对象都有一份 `name` 和 `gender` 字段的副本，并且每个\
  \ `name` 和 `gender` 的副本都被初始化为 `null`。\n\n如果你考虑 `Human` 类字段的默认初始化，其行为就如同你按如下方式声明了\
  \ `Human` 类一样。此 `Human` 类的声明与清单 7-1 中所示的声明是相同的。\n\n```\nclass Human {\nString name\
  \ = null;\nString gender = null;\nstatic long count = 0;\n}\n```\n\n清单 7-4 演示了字段的默认初始化。`DefaultInit`\
  \ 类仅包含实例变量。类字段与实例字段使用相同的默认值进行初始化。如果你将 `DefaultInit` 类的所有字段都声明为 `static`，输出结果将相同。该类包含两个引用类型实例变量，`str`\
  \ 和 `jack`，它们分别是 `String` 和 `Human` 类型。请注意，`String` 和 `Human` 都是引用类型，默认情况下 `null`\
  \ 会被赋值给它们的引用。\n\n```\n// DefaultInit.java\npackage com.jdojo.cls;\nclass DefaultInit\
  \ {\nbyte b;\nshort s;\nint i;\nlong l;\nfloat f;\ndouble d;\nboolean bool;\nString\
  \ str;\nHuman jack;\npublic static void main(String[] args) {\n// 创建 DefaultInit\
  \ 类的对象\nDefaultInit obj = new DefaultInit();\n// 打印所有实例变量的默认值\nSystem.out.println(\"\
  byte is initialized to \" + obj.b);\nSystem.out.println(\"short is initialized to\
  \ \" + obj.s);\nSystem.out.println(\"int is initialized to \" + obj.i);\nSystem.out.println(\"\
  long is initialized to \" + obj.l);\nSystem.out.println(\"float is initialized to\
  \ \" + obj.f);\nSystem.out.println(\"double is initialized to \" + obj.d);\nSystem.out.println(\"\
  boolean is initialized to \" + obj.bool);\nSystem.out.println(\"String is initialized\
  \ to \" + obj.str);\nSystem.out.println(\"Human is initialized to \" + obj.jack);\n\
  }\n}\n清单 7-4.\n类字段的默认初始化\n```\n\n```\nbyte is initialized to 0\nshort is initialized\
  \ to 0\nint is initialized to 0\nlong is initialized to 0\nfloat is initialized\
  \ to 0.0\ndouble is initialized to 0.0\nboolean is initialized to false\nString\
  \ is initialized to null\nHuman is initialized to null\n```\n\n类的访问级别修饰符\n\n在清单\
  \ 7-1 中，你在 `com.jdojo.cls` 包中创建了 `Human` 类。你在清单 7-3 中使用了 `Human` 类，在 `FieldAccessTest`\
  \ 类中创建了它的对象，该类与 `Human` 类位于同一模块和同一包中。编译并运行清单 7-3 中的以下语句没有问题：\n\n```\nHuman jack\
  \ = new Human();\n```\n\n让我们在 `jdojo.cls` 模块的 `com.jdojo.common` 包中创建一个名为 `ClassAccessTest`\
  \ 的类。请注意，`ClassAccessTest` 类和 `Human` 类位于不同的包中。`ClassAccessTest` 类的声明如下：\n\n```\n\
  // ClassAccessTest.java\npackage com.jdojo.common;\npublic class ClassAccessTest\
  \ {\npublic static void main(String[] args) {\nHuman jack;\n}\n}\n```\n\n`ClassAccessTest`\
  \ 类的代码非常简单。它只做了一件事——在其 `main()` 方法中声明了一个 `Human` 类型的引用变量。编译 `ClassAccessTest` 类。哎呀！你遇到了一个编译时错误：\n\
  \n```\nClassAccessTest.java:6: error: cannot find symbol\nHuman jack;\n^\nsymbol:\
  \   class Human\nlocation: class ClassAccessTest\n1 error\n```\n\n如果你仔细阅读错误信息，编译器是在抱怨以下变量声明中的\
  \ `Human` 类型：\n\n```\nHuman jack;\n```\n\n编译器表示它找不到术语 `Human` 的定义。`ClassAccessTest`\
  \ 类中的 `jack` 变量声明有什么问题？当你使用类的简单名称引用一个类时，编译器会在引用类所在的同一包中查找该类的声明。在你的例子中，引用类 `ClassAccessTest`\
  \ 位于 `com.jdojo.common` 包中，它使用简单名称 `Human` 来引用 `Human` 类。因此，编译器会在 `com.jdojo.common`\
  \ 包中查找 `Human` 类。编译器正在寻找一个不存在的 `com.jdojo.common.Human` 类。这就是你收到错误的原因。\n\n通过在 `ClassAccessTest`\
  \ 中使用简单名称 `Human`，你的本意是引用 `com.jdojo.cls` 包中的 `Human` 类，而不是 `com.jdojo.common` 包中的。如果你在\
  \ `com.jdojo.common` 包中有 `Human` 类，那么你的 `ClassAccessTest` 代码本可以编译通过。假设你没有 `com.jdojo.common.Human`\
  \ 类，并且你想修复这个错误。你可以通过使用 `Human` 类的完全限定名称来修复它，如下所示：\n\n```\n// ClassAccessTest.java\n\
  package com.jdojo.common;\npublic class ClassAccessTest {\npublic static void main(String[]\
  \ args) {\ncom.jdojo.cls.Human jack;\n}\n}\n```\n\n现在编译 `ClassAccessTest` 类。哎呀！你又遇到了一个编译时错误。不过，这次错误不同了。\n\
  \n```\nClassAccessTest.java:6: error: Human is not public in com.jdojo.cls; cannot\
  \ be accessed from outside package\ncom.jdojo.cls.Human jack;\n^\n1 error\n```\n\
  \n这次，编译器并不是说它不理解 `Human` 类型。它表示它知道 `com.jdojo.cls.Human` 类型是什么；但是，它只能在声明它的 `com.jdojo.cls`\
  \ 包内部访问。换句话说，`Human` 类型在 `com.jdojo.common` 包内部是不可访问的。这就引出了类的访问级别的概念。\n\n当你声明一个类时，你还可以指定该类是可以从任何包访问（或使用、引用），还是只能从声明它的包内部访问。例如，你可以在\
  \ `Human` 类的声明中指定它是只能从 `com.jdojo.cls` 包内部访问，还是可以从任何包（包括 `com.jdojo.common` 包）访问。指定类访问级别的一般语法如下：\n\
  \n```\n[访问级别修饰符] class  {\n// 类的主体写在这里\n}\n```\n\n在类声明中，访问级别修饰符只有两个有效值：无值和 `public`。\n\
  \n\n\n*   **无值**：与没有访问级别修饰符相同，也称为包级访问。如果一个类具有包级访问权限，则只能在其声明的包内被访问。清单 7-1 中的 `Human`\
  \ 类就具有包级访问权限。这就是你能够在清单 7-3 的 `FieldAccessTest` 类中使用（或访问）`Human` 类的原因。请注意，`Human`\
  \ 类和 `FieldAccessTest` 类位于同一个包中，并且都具有包级访问权限。因此，它们可以相互引用。`Human` 类位于 `com.jdojo.cls`\
  \ 包中，并且具有包级访问权限。因此，它无法从任何其他包（例如 `com.jdojo.common`）访问。这就是你尝试编译 `ClassAccessTest`\
  \ 类时收到错误的原因。\n\n*   `public`：具有 `public` 访问级别修饰符的类可以从同一模块中的任何包访问。如果你希望 `Human` 类能够从任何包（例如\
  \ `com.jdojo.common`）访问，则需要将其声明为 `public`。\n\n在模块 `M` 中声明的类 `C` 能否在模块 `N` 中被访问？这个问题的答案取决于类\
  \ `C` 的访问级别修饰符以及模块 `M` 和 `N` 的声明。要使类 `C` 在模块 `N` 的某个包中可访问，必须满足以下条件：\n\n*   模块 `M`\
  \ 中的类 `C` 必须声明为 `public`。\n*   模块 `M` 必须将类 `C` 所在的包导出给所有其他模块，或者至少导出给模块 `N`。通过导出包，模块声明该包中的公共类（或任何类型）可以被所有或部分其他模块使用。\n\
  *   模块 `N` 的声明必须 `requires` 模块 `M`。\n\n模块依赖是一个庞大的主题。我将在第 10 章中详细讨论。在本章中，除非必须提及模块依赖，否则我将把类型在同一模块中的可访问性讨论限制在此范围内。\n\
  \n让我们重新定义 `Human` 类，如清单 7-5 所示。这次，你将其访问级别指定为 `public`，因此它可以从任何包访问。\n\n```\n// Human.java\n\
  package com.jdojo.cls;\npublic class Human {\nString name;        // 实例变量\nString\
  \ gender;      // 实例变量\nstatic long count;  // 类变量\n}\n清单 7-5.\n使用公共访问级别修饰符重新定义的\
  \ Human 类\n```\n\n重新编译 `Human` 类，然后编译 `ClassAccessTest` 类。这次，`ClassAccessTest` 类编译时没有任何错误。\n\
  \n提示\n\n当我说一个类可以从某个包访问时，这意味着什么？一个类定义了一种新的引用类型。引用类型可用于声明变量。当一个类在某个包中可访问时，该类名就可以作为引用类型使用，例如，在该包内的代码中声明变量。\n\
  \n导入声明\n\n你在上一节中学到了两条规则：\n\n*   你必须将一个类声明为 `public`，才能在其声明所在的包之外的其他包中使用它。如果另一个包位于另一个模块中，则需要在两个模块的声明中进行额外的工作，才能使\
  \ `public` 类可访问。\n*   你需要使用类的完全限定名才能在其声明所在的包之外的其他包中使用它。在类声明的包中，可以使用其简单名称来引用该类。\n\
  \n第一条规则没有替代方案。也就是说，如果一个类需要从其包外部访问，则必须将其声明为 `public`。\n\n处理第二条规则有另一种方法。你可以通过使用导入声明，在包外部使用类的简单名称来引用它。导入声明用于将类从编译单元所在的包外部导入到编译单元中。从技术上讲，导入声明用于将任何类型（不仅仅是类）导入到编译单元中。导入声明出现在包声明之后、第一个类型声明之前。图\
  \ 7-3 显示了导入声明出现的位置。一个编译单元中可以有零个或多个导入声明。\n\n![A323069_2_En_7_Fig3_HTML.gif](img/A323069_2_En_7_Fig3_HTML.gif)\n\
  \n图 7-3.\n\nJava 中编译单元的结构\n\n本节仅提及导入类。然而，相同的规则适用于导入任何其他类型，例如接口、注解或枚举。由于到目前为止我只介绍了类类型，因此在此讨论中我不会提及任何其他类型。\n\
  \n有两种类型的导入声明：\n\n*   单类型导入声明\n*   按需导入声明\n\n单类型导入声明\n\n单类型导入声明用于从包中导入单个类型（例如，一个类）。它采用以下形式：\n\
  \n```\nimport <包名>.<类型名>;\n```\n\n以下导入声明从 `com.jdojo.cls` 包中导入 `Human` 类：\n\n```\n\
  import com.jdojo.cls.Human;\n```\n\n单类型导入声明仅从包中导入一个类型。如果你想从一个包中导入多个类型（例如，三个类），则需要为每个类型使用单独的导入声明。以下导入声明从\
  \ `pkg1` 包导入 `Class11`，从 `pkg2` 包导入 `Class21` 和 `Class22`，从 `pkg3` 包导入 `Class33`：\n\
  \n```\nimport pkg1.Class11;\nimport pkg2.Class21;\nimport pkg2.Class22;\nimport\
  \ pkg3.Class33;\n```\n\n让我们重新审视之前出现编译时错误的 `com.jdojo.common.ClassAccessTest` 类。\n\
  \n```\n// ClassAccessTest.java\npackage com.jdojo.common;\npublic class ClassAccessTest\
  \ {\npublic static void main(String[] args) {\nHuman jack;\n}\n}\n```\n\n当你使用 `Human`\
  \ 类的简单名称时，收到了编译时错误，因为编译器在 `com.jdojo.common` 包中找不到 `Human` 类。你通过使用 `Human` 类的完全限定名解决了这个错误，如下所示：\n\
  \n```\n// ClassAccessTest.java\npackage com.jdojo.common;\npublic class ClassAccessTest\
  \ {\npublic static void main(String[] args) {\ncom.jdojo.cls.Human jack; // 为 Human\
  \ 类使用完全限定名\n}\n}\n```\n\n你有另一种方法来解决这个错误，即使用单类型导入声明。你可以导入 `com.jdojo.cls.Human` 类以使用其简单名称。修改后的\
  \ `ClassAccessTest` 类声明如下：\n\n```\n// ClassAccessTest.java – 修改版本\npackage com.jdojo.common;\n\
  import com.jdojo.cls.Human; // 导入 Human 类\npublic class ClassAccessTest {\npublic\
  \ static void main(String[] args) {\nHuman jack; // 使用 Human 类的简单名称\n}\n}\n```\n\
  \n修改后的 `ClassAccessTest` 类编译正常。当编译器在语句中遇到 `Human` 类的简单名称时，例如：\n\n```\nHuman jack;\n\
  ```\n\n它会遍历所有导入声明，将简单名称解析为完全限定名。当它尝试解析简单名称 `Human` 时，会找到导入声明 `import com.jdojo.cls.Human`，该声明导入了\
  \ `Human` 类。它假定你在前面的语句中使用简单名称 `Human` 时，意图是使用 `com.jdojo.cls.Human` 类。编译器将前面的语句替换为以下语句：\n\
  \n```\ncom.jdojo.cls.Human jack;\n```\n\n提示\n\n\n\n导入声明允许你在代码中使用类型的简单名称，从而使代码更易读。编译代码时，编译器会将类型的简单名称替换为完全限定名称。它利用导入声明将类型的简单名称转换为完全限定名称。需要强调的是，在\
  \ Java 程序中使用导入声明不会影响编译后代码的大小或运行时性能。使用导入声明只是在源代码中使用类简单名称的一种方式。\n\n使用导入声明时，有许多细微之处需要牢记。我将在下文简要讨论。\n\
  \n按需导入声明\n\n有时你可能需要从同一个包中导入多个类型。你需要使用与从该包中导入的类型数量相同的单类型导入声明。按需导入声明用于通过一个 `import`\
  \ 声明从包中导入多个类型。按需导入声明的语法如下：\n\n```\nimport .*;\n```\n\n这里，包名后跟一个点和一个星号（`*`）。例如，以下按需导入声明从\
  \ `com.jdojo.cls` 包中导入所有类型：\n\n```\nimport com.jdojo.cls.*;\n```\n\n有时，在按需导入声明中使用星号会导致对导入类型的错误假设。假设有两个类，`C1`\
  \ 和 `C2`。它们分别位于包 `p1` 和 `p1.p2` 中。也就是说，它们的完全限定名称是 `p1.C1` 和 `p1.p2.C2`。你可能会编写如下按需导入声明：\n\
  \n```\nimport p1.*;\n```\n\n认为它会同时导入 `p1.C1` 和 `p1.p2.C2` 这两个类。这个假设是错误的。声明\n\n```\n\
  import p1.*;\n```\n\n仅从 `p1` 包中导入所有类型。它不会导入 `p1.p2.C2` 类，因为 `C2` 类不在 `p1` 包中；相反，它在\
  \ `p2` 包中，而 `p2` 是 `p1` 的子包。按需导入声明末尾的星号仅表示指定包中的所有类型。星号并不表示子包以及这些子包内的类型。有时，开发者会尝试在按需导入声明中使用多个星号，认为这样也会从所有子包中导入类型。\n\
  \n```\nimport p1.*.*; // 编译时错误\n```\n\n此按需导入声明会导致编译时错误，因为它使用了多个星号。它不符合按需导入声明的语法。在按需导入声明中，声明必须以一个点后跟一个且仅一个星号结尾。\n\
  \n如果你想同时导入 `C1` 和 `C2` 类，你需要使用两个按需导入声明：\n\n```\nimport p1.*;\nimport p1.p2.*;\n\
  ```\n\n你可以使用按需导入声明重写 `ClassAccessTest` 类的代码。\n\n```\n// ClassAccessTest.java – 修改版，使用按需导入\n\
  package com.jdojo.common;\n// 从 com.jdojo.cls 包中导入所有类型，包括 Human 类\nimport com.jdojo.cls.*;\n\
  public class ClassAccessTest {\npublic static void main(String[] args) {\nHuman\
  \ jack; // 使用 Human 类的简单名称\n}\n}\n```\n\n当编译器尝试解析上述代码中的简单名称 `Human` 时，它将使用按需导入声明来检查\
  \ `com.jdojo.cls` 包中是否存在 `Human` 类。实际上，`import` 声明中的星号将被替换为 `Human`，然后编译器检查 `com.jdojo.cls.Human`\
  \ 类是否存在。假设你在 `com.jdojo.cls` 包中有两个名为 `Human` 和 `Table` 的类。以下代码将使用一个按需导入声明进行编译：\n\
  \n```\n// ClassAccessTest.java – 修改版，使用按需导入\npackage com.jdojo.common;\n// 从 com.jdojo.cls\
  \ 包中导入所有类型，包括 Human 和 Table 类\nimport com.jdojo.cls.*;\npublic class ClassAccessTest\
  \ {\npublic static void main(String[] args) {\nHuman jack; // 使用 Human 类的简单名称\n\
  Table t1;   // 使用 Table 类的简单名称\n}\n}\n```\n\n上述代码中的一个按需导入声明与以下两个单类型导入声明具有相同的效果：\n\
  \n```\nimport com.jdojo.cls.Human; // 导入 Human 类\nimport com.jdojo.cls.Table; //\
  \ 导入 Table 类\n```\n\n在 Java 程序中使用哪种类型的导入声明更好：单类型导入还是按需导入？使用按需导入声明很简单。然而，它可读性不强。让我们看看以下代码，它编译正常。假设类\
  \ `A` 和 `B` 不在 `com.jdojo.cls` 包中。\n\n```\n// ImportOnDemandTest.java\npackage com.jdojo.cls;\n\
  import p1.*;\nimport p2.*;\npublic class ImportOnDemandTest {\npublic static void\
  \ main(String[] args) {\nA a; // 声明一个 A 类类型的变量\nB b; // 声明一个 B 类类型的变量\n}\n}\n```\n\
  \n你能通过查看这段代码说出类 `A` 和 `B` 的完全限定名称吗？类 `A` 是在包 `p1` 中还是 `p2` 中？仅通过查看代码是不可能知道类 `A`\
  \ 和 `B` 属于哪个包的，因为你使用了按需导入声明。让我们使用两个单类型导入声明重写之前的代码。\n\n```\n// ImportOnDemandTest.java\n\
  package com.jdojo.cls;\nimport p1.A;\nimport p2.B;\npublic class ImportOnDemandTest\
  \ {\npublic static void main(String[] args) {\nA a; // 声明一个 A 类类型的变量\nB b; // 声明一个\
  \ B 类类型的变量\n}\n}\n```\n\n通过查看导入声明，你现在可以知道类 `A` 在包 `p1` 中，类 `B` 在包 `p2` 中。单类型导入声明使读者易于了解哪个类是从哪个包导入的。它也使人们易于了解程序中从其他包使用的类的数量和名称。本书在所有示例中都使用单类型导入声明，除非在讨论按需导入声明的示例中。\n\
  \n尽管建议在程序中使用单类型导入声明，但你需要了解在同一程序中使用单类型导入和按需导入声明的一些棘手用法和影响。后续章节将详细讨论它们。\n\n导入声明与类型搜索顺序\n\
  \n导入声明用于在编译期间将类型的简单名称解析为其完全限定名称。编译器使用预定义规则来解析简单名称。假设以下语句出现在使用简单名称 `A` 的 Java 程序中：\n\
  \n```\nA var;\n```\n\nJava 编译器必须在编译过程中将简单名称 `A` 解析为其完全限定名称。它按以下顺序搜索程序中引用的类型：\n\n\
  *   当前编译单元\n*   单类型导入声明\n*   在同一包中声明的类型\n*   按需导入声明\n\n此类型搜索列表并不完整。如果类型有嵌套类型，则在查找当前编译单元之前先搜索嵌套类型。我将推迟到本三卷系列丛书的第二卷讨论内部类时再讨论嵌套类型。\n\
  \n让我们通过几个示例讨论类型搜索的规则。假设你有一个名为 `B.java` 的 Java 源文件（编译单元），其内容如下。请注意，文件 `B.java` 包含两个类\
  \ `A` 和 `B` 的声明。\n\n```\n// B.java\npackage p1;\nclass B {\nA var;\n}\nclass A {\n\
  // 代码在此处\n}\n```\n\n\n\n类 `B` 在声明类型为 `A` 的实例变量 `var` 时，使用**简单名称**引用了类 `A`。当编译 `B.java`\
  \ 文件时，编译器会在当前编译单元（`B.java` 文件）中查找简单名称为 `A` 的类型。它会在当前编译单元中找到简单名称为 `A` 的类声明。简单名称 `A`\
  \ 将被替换为其完全限定名 `p1.A`。请注意，类 `A` 和 `B` 都在同一个编译单元中声明，因此它们位于同一个包 `p1` 中。编译器会将类 `B` 的定义修改如下：\n\
  \n```\npackage p1;\nclass B {\np1.A var; // 编译器已将 A 替换为 p1.A\n}\n```\n\n假设你想在前面的示例中使用来自包\
  \ `p2` 的类 `A`。也就是说，存在一个类 `p2.A`，并且你想在类 `B` 中声明类型为 `p2.A` 的实例变量 `var`，而不是 `p1.A`。让我们尝试通过使用单类型导入声明来导入类\
  \ `p2.A`，如下所示：\n\n```\n// B.java – 包含一个新的导入声明\npackage p1;\nimport p2.A;\nclass\
  \ B {\nA var; // 你希望在此处使用 A 时引用 p2.A\n}\nclass A {\n// 代码写在这里\n}\n```\n\n当你编译修改后的\
  \ `B.java` 文件时，会得到以下编译错误：\n\n```\n\"B.java\": p1.A 已在此编译单元中定义，位于第 2 行，第 1 列\n```\n\
  \n修改后的源代码有什么问题？当你从中移除单类型导入声明后，它就能正常编译。这意味着正是这个单类型导入声明导致了错误。在解决这个错误之前，你需要了解一个关于单类型导入声明的新规则。规则如下：\n\
  \n使用多个单类型导入声明导入具有相同简单名称的多个类型是编译时错误。\n\n假设你有两个类，`p1.A` 和 `p2.A`。请注意，这两个类具有相同的简单名称\
  \ `A`，但位于不同的包中。根据此规则，如果你想在同一个编译单元中使用这两个类 `p1.A` 和 `p2.A`，则不能使用两个单类型导入声明。\n\n```\n\
  // Test.java\npackage pkg;\nimport p1.A;\nimport p2.A; // 编译时错误\nclass Test {\n\
  A var1; // 使用哪个 A？p1.A 还是 p2.A？\nA var2; // 使用哪个 A？p1.A 还是 p2.A？\n}\n```\n\n此规则背后的原因是，当你在代码中使用简单名称\
  \ `A` 时，编译器无法知道要使用哪个类（`p1.A` 或 `p2.A`）。Java 本可以通过使用第一个导入的类或最后一个导入的类来解决此问题，但这容易出错。Java\
  \ 决定通过在你导入两个具有相同简单名称的类时给出编译时错误来将问题扼杀在萌芽状态，这样你就不会犯这种愚蠢的错误，并最终花费数小时来解决它们。\n\n让我们回到在已声明类\
  \ `A` 的编译单元中导入 `p2.A` 类的问题。以下代码会产生编译时错误：\n\n```\n// B.java – 包含一个新的导入声明\npackage\
  \ p1;\nimport p2.A;\nclass B {\nA var1; // 你希望在此处使用 A 时引用 p2.A\n}\nclass A {\n//\
  \ 代码写在这里\n}\n```\n\n这次，你只使用了一个单类型导入声明，而不是两个。为什么会出现错误？当你在同一个编译单元中声明多个类时，它们很可能密切相关并且会相互引用。你需要这样思考：Java\
  \ 会使用单类型导入声明导入在同一个编译单元中声明的每个类。你可以认为前面的代码被 Java 转换成了如下形式：\n\n```\n// B.java – 包含一个新的导入声明\n\
  package p1;\nimport p1.A; // 认为这是由 Java 添加的\nimport p1.B; // 认为这是由 Java 添加的\nimport\
  \ p2.A;\nclass B {\nA var; // 我们希望在 A 处使用 p2.A\n}\nclass A {\n// 代码写在这里\n}\n```\n\
  \n现在你能看到问题了吗？类 `A` 被导入了两次，一次由 Java 导入，一次由你导入，这就是错误的原因。那么，在你的代码中究竟该如何引用 `p2.A` 呢？很简单。每当你想在你的编译单元中使用\
  \ `p2.A` 时，就使用完全限定名 `p2.A`。\n\n```\n// B.java – 在类 B 中使用完全限定名 p2.A\npackage p1;\n\
  class B {\np2.A var; // 使用 A 的完全限定名\n}\nclass A {\n// 代码写在这里\n}\n```\n\n提示\n\n如果同一个编译单元中存在具有相同简单名称的类型，则使用单类型导入声明将该类型导入到该编译单元中是编译时错误。\n\
  \n让我们解决需要从不同包中使用具有相同简单名称的类的代码中的编译时错误。代码如下：\n\n```\n// Test.java\npackage pkg;\n\
  import p1.A;\nimport p2.A; // 编译时错误\nclass Test {\nA var1; // 使用哪个 A？p1.A 还是 p2.A？\n\
  A var2; // 使用哪个 A？p1.A 还是 p2.A？\n}\n```\n\n你可以使用以下两种方法之一来解决此错误。第一种方法是移除两个导入声明，并使用类\
  \ `A` 的完全限定名，如下所示：\n\n```\n// Test.java\npackage pkg;\nclass Test {\np1.A var1;\
  \ // 使用 p1.A\np2.A var2; // 使用 p2.A\n}\n```\n\n第二种方法是只使用一个导入声明从某个包（例如 `p1`）导入类 `A`，并对来自\
  \ `p2` 包的类 `A` 使用完全限定名，如下所示：\n\n```\n// Test.java\npackage pkg;\nimport p1.A;\n\
  class Test {\nA var1;    // 引用 p1.A\np2.A var2; // 使用完全限定名 p2.A\n}\n```\n\n提示\n\n\
  如果你想在编译单元中使用来自不同包但具有相同简单名称的多个类，你最多只能导入其中一个类。对于其余的类，你必须使用完全限定名。你也可以选择对所有类都使用完全限定名。\n\
  \n让我们讨论一些关于使用按需导入声明的规则。编译器在使用所有其他方法解析简单名称后，会使用按需导入声明来解析类型的简单名称。使用单类型导入声明以及按需导入声明导入具有相同简单名称的类是有效的。在这种情况下，会使用单类型导入声明。假设你有三个类：`p1.A`、`p2.A`\
  \ 和 `p2.B`。假设你有一个如下所示的编译单元：\n\n```\n// C.java\npackage p3;\nimport p1.A;\nimport\
  \ p2.*;\nclass C {\nA var; // 将始终使用 p1.A（而不是 p2.A）\n}\n```\n\n在这个例子中，类 `A` 被导入了两次：一次使用来自包\
  \ `p1` 的单类型导入声明，一次使用来自包 `p2` 的按需导入声明。简单名称 `A` 被解析为 `p1.A`，因为单类型导入声明总是优先于按需导入声明。一旦编译器通过单类型导入声明找到了一个类，它就会停止搜索，而不会使用任何按需导入声明来查找该类。\n\
  \n让我们更改前面示例中的导入声明，改为使用按需导入声明，如下所示：\n\n```\n// C.java\npackage p3;\nimport p1.*;\n\
  import p2.*;\nclass  C {\nA var; // 编译时错误。使用哪个 A？p1.A 还是 p2.A？\n}\n```\n\n编译类 `C`\
  \ 会产生以下错误：\n\n```\n\"C.java\": 对 A 的引用不明确，类 p2.A（位于 p2 中）和类 p1.A（位于 p1 中）在第 8 行第\
  \ 5 列均匹配\n```\n\n错误信息清晰明了。当编译器通过按需导入声明找到一个类时，它会继续在所有按需导入声明中搜索该类。如果它通过多个按需导入声明找到了具有相同简单名称的类，就会产生一个错误。你可以通过以下几种方式解决此错误：\n\
  \n*   使用两个单类型导入声明。\n*   使用一个单类型导入声明和一个按需导入声明。\n*   对两个类都使用完全限定名。\n\n以下列表涵盖了关于导入声明的更多规则：\n\
  \n\n\n*   重复的单类型导入和按需导入声明会被忽略。以下代码是有效的：\n\n```\n    // D.java\n    package p4;\n\
  \    import p1.A;\n    import p1.A; // 被忽略。重复的导入声明。\n    import p2.*;\n    import\
  \ p2.*; // 被忽略。重复的导入声明。\n    class D {\n    // 代码写在这里\n    }\n    ```\n\n*   使用单类型导入声明或按需导入声明从同一个包中导入类是合法的，尽管并非必要。以下代码从同一个包\
  \ `p5` 中导入了类 `F`。请注意，同一个包中声明的所有类都会自动为你导入。在这种情况下，导入声明会被忽略。\n\n```\n    // E.java\n\
  \    package p5;\n    import p5.F; // 将被忽略\n    class E {\n    // 代码写在这里\n    }\n\
  \    // F.java\n    package p5;\n    import p5.*; // 将被忽略\n    class F {\n    //\
  \ 代码写在这里\n    }\n    ```\n\n自动导入声明\n\n你一直在使用 `String` 类和 `System` 类的简单名称，并且从未在任何程序中费心导入它们。这些类的完全限定名是\
  \ `java.lang.String` 和 `java.lang.System`。Java 总是自动导入 `java.lang` 包中声明的所有类型。可以认为在编译前，你的源代码中添加了以下按需导入声明：\n\
  \n```\nimport java.lang.*;\n```\n\n这就是你能够在代码中使用 `String` 和 `System` 类的简单名称而无需导入它们的原因。你可以在程序中使用\
  \ `java.lang` 包中任何类型的简单名称。\n\n使用导入声明从 `java.lang` 包中导入类型并不是错误。编译器会简单地忽略它们。以下代码将编译无误：\n\
  \n```\npackage p1;\nimport java.lang.*;  // 将被忽略，因为它是自动为你完成的\npublic class G {\n\
  String anythingGoes; // 引用 java.lang.String\n}\n```\n\n当使用与 `java.lang` 包中定义的类型同名的简单名称时，你需要小心。假设你声明了一个\
  \ `p1.String` 类。\n\n```\n// String.java\npackage p1;\npublic class String {\n//\
  \ 代码写在这里\n}\n```\n\n假设你在同一个包 `p1` 中有一个 `Test` 类。\n\n```\n// Test.java\npackage p1;\n\
  public class Test {\n// 将使用哪个 String 类：p1.String 还是 java.lang.String\nString myStr;\n\
  }\n```\n\n在 `Test` 类中引用的是哪个 `String` 类：`p1.String` 还是 `java.lang.String`？它将引用 `p1.String`，而不是\
  \ `java.lang.String`，因为在解析类型的简单名称时，会先搜索编译单元所在的包（本例中为 `p1`），然后再搜索任何导入声明。编译器在包 `p1`\
  \ 中找到了 `String` 类。它不会在 `java.lang` 包中搜索 `String` 类。如果你在此示例中想使用 `java.lang.String`\
  \ 类，则必须使用其完全限定名，如下所示：\n\n```\n// Test.java\npackage p1;\npublic class Test {\njava.lang.String\
  \ s1; // 使用 java.lang.String\np1.String s2;        // 使用 p1.String\nString s3; \
  \          // 将使用 p1.String\n}\n```\n\n静态导入声明\n\n静态导入声明如其名所示。它将一个类型的静态成员（静态变量/方法）导入到一个编译单元中。你在前面的章节中已经了解了静态变量（或类变量）。我将在下一节讨论静态方法。静态导入声明有两种形式：\n\
  \n*   单静态导入\n\n*   静态按需导入\n\n单静态导入声明导入一个类型的一个静态成员。静态按需导入声明导入一个类型的所有静态成员。静态导入声明的一般语法如下：\n\
  \n```\n// 单静态导入声明：\nimport static ..;\n// 静态按需导入声明：\nimport static ..*;\n```\n\n\
  你一直在使用 `System.out.println()` 方法在标准输出上打印消息。`System` 是 `java.lang` 包中的一个类，它有一个名为\
  \ `out` 的静态变量。当你使用 `System.out` 时，你引用的是 `System` 类中名为 `out` 的那个静态变量。你可以使用静态导入声明从\
  \ `System` 类中导入 `out` 静态变量，如下所示：\n\n```\nimport static java.lang.System.out;\n```\n\
  \n现在你的程序不再需要用类名 `System` 来限定 `out` 变量为 `System.out`。相反，它可以在程序中使用名称 `out` 来表示 `System.out`。编译器将使用静态导入声明将名称\
  \ `out` 解析为 `System.out`。\n\n清单 7-6 演示了如何使用静态导入声明。它导入了 `System` 类的 `out` 静态变量。请注意，`main()`\
  \ 方法使用了 `out.println()` 方法，而不是 `System.out.println()`。编译器会将 `out.println()` 调用替换为\
  \ `System.out.println()` 调用。\n\n```\n// StaticImportTest.java\npackage com.jdojo.cls;\n\
  import static java.lang.System.out;\npublic class StaticImportTest {\npublic static\
  \ void main(String[] args) {\nout.println(\"Hello static import!\");\n}\n}\n清单 7-6.\n\
  使用静态导入声明\n```\n\n```\nHello static import!\n```\n\n提示\n\n导入声明导入一个类型名称，并允许你在程序中使用该类型的简单名称。导入声明对类型所做的操作，静态导入声明对类型的静态成员所做的操作。静态导入声明允许你使用类型静态成员（静态变量/方法）的名称，而无需用类型名称来限定它。\n\
  \n让我们再看一个使用静态导入声明的例子。`java.lang` 包中的 `Math` 类包含许多实用常量和静态方法。例如，它包含一个名为 `PI` 的类变量，其值等于\
  \ `22/7`（数学中的圆周率）。如果你想使用 `Math` 类的任何静态变量或方法，你需要用类名 `Math` 来限定它们。例如，你会将 `PI` 静态变量引用为\
  \ `Math.PI`，将 `sqrt()` 方法引用为 `Math.sqrt()`。你可以使用以下静态按需导入声明导入 `Math` 类的所有静态成员：\n\n\
  ```\nimport static java.lang.Math.*;\n```\n\n现在你可以使用静态成员的名称，而无需用类名 `Math` 来限定它们。清单\
  \ 7-7 演示了通过导入其 `static` 成员来使用 `Math` 类。\n\n```\n// StaticImportTest2.java\npackage\
  \ com.jdojo.cls;\nimport static java.lang.System.out;\nimport static java.lang.Math.*;\n\
  public class StaticImportTest2 {\npublic static void main(String[] args) {\ndouble\
  \ radius = 2.9;\ndouble area = PI * radius * radius;\nout.println(\"Value of PI\
  \ is: \" + PI);\nout.println(\"Radius of circle: \" + radius);\nout.println(\"Area\
  \ of circle: \" + area);\nout.println(\"Square root of 2.0: \" + sqrt(2.0));\n}\n\
  }\n清单 7-7.\n使用静态导入导入一个类型的多个静态成员\n```\n\n```\nValue of PI is: 3.141592653589793\n\
  Radius of circle: 2.9\nArea of circle: 26.420794216690158\nSquare root of 2.0: 1.4142135623730951\n\
  ```\n\n以下是关于静态导入声明的几个重要规则。\n\n静态导入规则 #1\n\n如果导入了两个具有相同简单名称的静态成员，一个使用单静态导入声明，另一个使用静态按需导入声明，则使用单静态导入声明导入的那个优先。假设有两个类，`p1.C1`\
  \ 和 `p2.C2`。两个类都有一个名为 `m1` 的静态方法。以下代码将使用 `p1.C1.m1()` 方法，因为它是使用单静态导入声明导入的：\n\n\n\
  \n```\n// Test.java\npackage com.jdojo.cls;\nimport static p1.C1.m1; // 导入 C1.m1()\
  \ 方法\nimport static p2.C2.*;  // 也导入了 C2.m1() 方法\npublic class Test {\npublic static\
  \ void main(String[] args) {\nm1();   // 将调用 C1.m1()\n}\n}\n```\n\n静态导入规则 #2\n\n\
  不允许使用单个静态导入声明来导入两个具有相同简单名称的静态成员。以下静态导入声明会产生编译时错误，因为它们都导入了一个具有相同简单名称 `m1` 的静态成员：\n\
  \n```\nimport static p1.C1.m1;\nimport static p1.C2.m1; // 编译时错误\n```\n\n静态导入规则\
  \ #3\n\n如果使用单个静态导入声明导入了一个静态成员，并且同一个类中存在一个同名的静态成员，则将使用该类中的静态成员。以下是两个类 `p1.A` 和 `p2.Test`\
  \ 的代码：\n\n```\n// A.java package p1;\npublic class A {\npublic static void test()\
  \ {\nSystem.out.println(\"p1.A.test()\");\n}\n}\n// Test.java\npackage p2;\nimport\
  \ static p1.A.test;\npublic class Test {\npublic static void main(String[] args)\
  \ {\ntest(); // 将使用 p2.Test.test() 方法，而不是 p1.A.test() 方法\n}\npublic static void\
  \ test() {\nSystem.out.println(\"p2.Test.test()\");\n}\n}\n```\n\n```\np2.Test.test()\n\
  ```\n\n`Test` 类使用单个静态导入声明从 `p1.A` 类导入了静态方法 `test()`。`Test` 类也定义了一个静态方法 `test()`。当你在\
  \ `main()` 方法中使用简单名称 `test` 调用 `test()` 方法时，它引用的是 `p2.Test.test()` 方法，而不是由静态导入导入的那个方法。\n\
  \n在这种情况下使用静态导入声明存在一个隐患。假设 `p2.Test` 类中原本没有 `test()` 静态方法。起初，`test()` 方法调用会调用 `p1.A.test()`\
  \ 方法。之后，你在 `Test` 类中添加了一个 `test()` 方法。现在，`test()` 方法调用将开始调用 `p2.Test.test()`，这会在你的程序中引入一个难以发现的错误。\n\
  \n提示\n\n静态导入似乎可以帮助你使用静态成员的简单名称，使程序更易于编写和阅读。但有时，静态导入可能会在你的程序中引入微妙的错误，这些错误可能难以调试。建议你完全不要使用静态导入，或者仅在极少数情况下使用。\n\
  \n总结\n\n类是面向对象编程中的基本构建块。类在 Java 中表示一种引用类型。类作为创建对象的模板。一个类由四部分组成：字段、初始化器、构造器和方法。字段表示该类对象的状态。初始化器和构造器用于初始化类的字段。`new`\
  \ 运算符用于创建类的对象。方法表示该类对象的行为。\n\n字段和方法被称为类的成员。构造器不是类的成员。顶层类具有访问级别，这决定了它可以从程序的哪些部分被访问。顶层类可以具有公共访问级别或包级访问级别。公共类可以在同一模块中的任何位置被访问。如果该类的模块导出了该类所在的包，那么其他模块如果声明了对该类模块的依赖，也可以访问该公共类。顶层类上缺少访问级别修饰符会使其具有包级访问权限，这意味着该类只能在其所在的包内被访问。\n\
  \nJava 中的每个类都定义了一个新的引用类型。Java 有一种特殊的引用类型，称为 null 类型。它没有名称。因此，你不能定义 null 引用类型的变量。null\
  \ 引用类型只有一个由 Java 定义的值，即 `null` 字面量。它就是 `null`。null 引用类型与所有其他引用类型赋值兼容。\n\n一个类可以有两种类型的字段。它们被称为实例变量和类变量，也分别被称为非静态变量和静态变量。实例变量表示该类对象的状态。该类的每个对象都拥有所有实例变量的一份副本。类变量表示类本身的状态。一个类只存在一份类变量的副本。类的字段可以使用点号表示法来访问，其形式如下：\n\
  \n```\n<限定符>.<字段名>\n```\n\n对于实例变量，限定符是该类实例的一个引用。对于类变量，限定符可以是该类实例的引用，也可以是类名。\n\n\
  类的所有字段，无论是静态的还是非静态的，都会被初始化为默认值。字段的默认值取决于其数据类型。数值字段（`byte`、`short`、`char`、`int`、`long`、`float`\
  \ 和 `double`）被初始化为零。`boolean` 字段被初始化为 `false`。引用类型字段被初始化为 `null`。\n\n编译单元中的导入语句用于从其他包中导入类型。它们允许使用其他包中类型的简单名称。编译器使用导入语句将简单名称解析为完全限定名称。静态导入语句用于从其他包中导入类型的静态成员。\n\
  \n练习题\n\n1.  什么是类的实例变量？实例变量的另一个名称是什么？\n\n2.  什么是类的类变量？类变量的另一个名称是什么？\n\n3.  类的不同类型字段的默认值是什么？\n\
  \n4.  创建一个名为 `Point` 的类，其中包含两个名为 `x` 和 `y` 的 `int` 实例变量。两个实例变量都应声明为 public。不要初始化这两个实例变量。\n\
  \n5.  为你上一个练习中创建的 `Point` 类添加一个 `main()` 方法。创建一个 `Point` 类的对象，并打印 `x` 和 `y` 实例变量的默认值。分别将\
  \ `x` 和 `y` 的值设置为 5 和 10，然后在程序中读取它们并打印其值。\n\n6.  假设 `Point` 是你上一个练习中创建的类名，运行以下代码片段会发生什么？\n\
  \n```\n    Point p = null;\n    int x = p.x;\n    ```\n\n7.  以下代码的输出是什么？\n\n```\n\
  \    public class Employee {\n    String name;\n    boolean retired;\n    double\
  \ salary;\n    public static void main(String[] args) {\n    Employee emp = new\
  \ Employee();\n    System.out.println(emp.name);\n    System.out.println(emp.retired);\n\
  \    System.out.println(emp.salary);\n    }\n    }\n    ```\n\n8.  `java.time` 包包含一个\
  \ `LocalDate` 类。该类包含一个 `now()` 方法，该方法返回当前的本地日期。`CurrentDate` 类在其 main 方法中使用了该类的简单名称\
  \ `LocalDate`。其当前形式的代码无法编译。请通过添加一条导入语句（首先使用单类型导入语句，然后使用按需导入语句）来导入 `LocalDate` 类，以完成并运行以下代码。当你运行\
  \ `CurrentDate` 类时，它将打印 ISO 格式的当前本地日期，例如 2017-08-27。\n\n```\n    // CurrentDate.java\n\
  \    package com.jdojo.cls.excercise;\n    /* 在此处添加一条导入语句。 */\n    public class\
  \ CurrentDate {\n    public static void main(String[] args) {\n    LocalDate today\
  \ = LocalDate.now();\n    System.out.println(today);\n    }\n    }\n    ```\n\n\
  9.  考虑以下名为 `StaticImport` 的类的代码。该代码无法编译，因为它在 `main()` 方法中使用了 `out.println()` 而不是\
  \ `System.out.println()` 方法。通过添加一条静态导入语句来完成代码。`System` 类位于 `java.lang` 包中，而 `out`\
  \ 是 `System` 类中的一个静态变量。\n\n\n\n```\n    // StaticImport.java\n    package com.jdojo.cls.excercise;\n\
  \    /* 在此处添加静态导入语句。 */\n    public class StaticImport {\n    public static void\
  \ main(String[] args) {\n    out.println(\"Hello static import\");\n    }\n    }\n\
  \    ```\n\n10.  以下名为 `MathStaticImport` 类的代码无法编译。请添加一条静态按需导入语句以补全代码，使其能够编译。`java.lang.Math`\
  \ 类包含一个名为 `PI` 的静态变量和一个名为 `sqrt()` 的静态方法。\n\n```\n    // MathStaticImport.java\n\
  \    package com.jdojo.cls.excercise;\n    /* 在此处添加静态按需导入语句。 */\n    public class\
  \ MathStaticImport {\n    public static void main(String[] args) {\n    double radius\
  \ = 2.0;\n    double perimeter = 2 * PI * radius;\n    System.out.println(\"PI 的值是\
  \ \" + PI);\n    System.out.println(\"2 的平方根是 \" + sqrt(2));\n    System.out.println(\"\
  半径为 2.0 的圆的周长是 \"\n    + perimeter);\n    }\n    }\n    ```\n\n8.  方法\n\n在本章中，你将学习：\n\
  \n*   什么是方法，以及如何在类中声明方法\n\n*   代词 `this` 和 `super` 在 Java 程序中的含义\n\n*   什么是局部变量及其使用规则\n\
  \n*   如何调用类的方法\n\n*   通用的不同参数传递机制，以及 Java 中的参数传递机制\n\n*   如何声明和使用可变参数\n\n本章中的示例类位于\
  \ `com.jdojo.cls` 包中，该包是 `jdojo.cls` 模块的成员。你已在第 7 章中创建了 `jdojo.cls` 模块。\n\n什么是方法？\n\
  \n类中的方法定义了该类对象的行为或类本身的行为。方法是一个命名的代码块。可以调用方法来执行其代码。调用方法的代码称为方法的调用者。方法可以选择性地接受来自调用者的输入值，并可以向调用者返回一个值。输入值的列表称为参数。一个方法可以有零个参数。如果一个方法有零个参数，则称该方法没有任何参数，或者方法不接受任何参数。方法总是在类或接口的主体内部定义。也就是说，你不能单独拥有一个方法。为了使示例代码简单，本章中将方法展示为独立的代码块。在讨论完整示例时，我会在类主体内部展示方法。\n\
  \n声明类的方法\n\n方法声明的一般语法形式如下：\n\n```\n[修饰符] <返回类型> <方法名>([参数列表]) [throws 子句] {\n//\
  \ 方法体写在这里\n}\n```\n\n其中：\n\n*   `修饰符` 是方法的可选修饰符列表。\n\n*   `返回类型` 是方法返回值的**数据类型**。\n\
  \n*   `方法名` 是方法的名称。\n\n*   `参数列表` 是方法接受的参数列表。这是可选的。多个参数用逗号分隔。参数始终用一对圆括号括起来。如果方法不接受参数，则使用一对空圆括号。\n\
  \n*   参数列表之后可以选择性地跟一个 `throws` 子句，该子句声明方法可能抛出的异常类型。\n\n*   最后，在一对大括号内指定方法的代码，也称为方法体。\n\
  \n请注意，方法声明中有四个部分是强制性的：返回类型、方法名、一对圆括号和一对大括号。让我们详细讨论方法声明的每个部分。我将在本章及本书后续章节的各个部分讨论修饰符。我将在异常处理章节中讨论\
  \ `throws` 子句。以下是一个方法的示例：\n\n```\nint add(int n1, int n2) {\nint sum = n1 + n2;\n\
  return sum;\n}\n```\n\n方法名为 `add`。它接受两个参数。两个参数的类型都是 `int`。参数名为 `n1` 和 `n2`。该方法返回一个\
  \ `int` 值，这在其返回类型中已指明。方法体计算两个参数的和并返回该和。图 8-1 展示了 `add` 方法的不同部分。\n\n![A323069_2_En_8_Fig1_HTML.gif](img/A323069_2_En_8_Fig1_HTML.gif)\n\
  \n图 8-1.\n\nadd 方法的组成部分\n\n方法的返回类型是方法被调用时将返回的值的数据类型。它可以是基本数据类型（例如 `int`、`double`、`boolean`\
  \ 等）或引用类型（例如 `Human`、`String` 等）。有时，方法不向其调用者返回值。如果方法不向调用者返回任何值，则使用关键字 `void` 作为返回类型。在前面的示例中，`add`\
  \ 方法返回两个整数的和，这将是一个整数。这就是其返回类型被指定为 `int` 的原因。\n\n方法名必须是有效的 Java 标识符。按照惯例，Java 方法名以小写字母开头，后续单词首字母大写。例如，`getName`、`setName`、`getHumanCount`\
  \ 和 `createHuman` 是有效的方法名。`AbCDeFg` 也是一个有效的方法名；但是，它不符合标准的方法命名约定。\n\n方法可以从其调用者那里接受输入值。参数用于从调用者那里获取输入值。一个参数由两部分组成：数据类型和变量名。实际上，方法参数声明就是一个变量声明。变量用于保存从方法调用者传递过来的输入值。逗号用于分隔方法的两个参数。在前面的示例中，`add`\
  \ 方法声明了两个参数，`n1` 和 `n2`。两个参数都是 `int` 数据类型。当调用 `add` 方法时，调用者必须传递两个 `int` 值。从调用者传递的第一个值存储在\
  \ `n1` 中，第二个值存储在 `n2` 中。参数 `n1` 和 `n2` 也称为**形式参数**。\n\n方法有一个签名，它在特定上下文中唯一标识该方法。方法的签名是以下四个部分的组合：\n\
  \n*   方法名\n\n*   参数数量\n\n*   参数类型\n\n*   参数顺序\n\n修饰符、返回类型、参数名和 `throws` 子句不属于方法签名的一部分。表\
  \ 8-1 列出了一些方法声明及其签名的示例。\n\n表 8-1.\n\n方法声明及其签名的示例\n\n| 方法声明 | 方法签名 |\n| --- | ---\
  \ |\n| `int add(int n1, int n2)` | `add(int, int)` |\n| `int add(int n3, int n4)`\
  \ | `add(int, int)` |\n| `public int add(int n1, int n2)` | `add(int, int)` |\n\
  | `public int add(int n1, int n2) throws OutofRangeException` | `add(int, int)`\
  \ |\n| `void process(int n)` | `process(int)` |\n| `double add(int n1, double d1)`\
  \ | `add(int, double)` |\n| `double add(double d1, int n1)` | `add(double, int)`\
  \ |\n\n大多数情况下，你会遇到需要理解两个方法是否具有相同签名的情况。理解方法参数的类型和顺序是其签名的一部分非常重要。例如，`double add(int\
  \ n1, double d1)` 和 `double add(double d1, int n1)` 具有不同的签名，因为尽管参数的数量和类型相同，但它们的参数顺序不同。\n\
  \n提示\n\n方法的签名在类中唯一标识该方法。不允许在同一个类中存在多个具有相同签名的方法。\n\n\n\n最后，方法的代码在方法体中指定，方法体用花括号括起来。执行方法的代码也称为“调用方法”或“调用方法”。方法通过其名称以及参数值（如果有）在括号内进行调用。要调用\
  \ `add` 方法，你需要使用以下语句：\n\n```\nadd(10, 12);\n```\n\n对 `add` 方法的这次调用将 10 和 12 分别作为参数\
  \ `n1` 和 `n2` 的值传递。用于调用 `add` 方法的这两个值（10 和 12）被称为实际参数。Java 在执行方法体内部的代码之前，会将实际参数复制给形式参数。在上一次对\
  \ `add` 方法的调用中，10 将被复制到 `n1` 中，12 将被复制到 `n2` 中。\n你可以将形式参数名称视为方法体内具有实际参数值的变量。你可以在\
  \ `add` 方法的以下语句中看到 `n1` 和 `n2` 被当作变量处理：\n\n```\nint sum = n1 + n2;\n```\n\n`return`\
  \ 语句用于从方法返回值。它以 `return` 关键字开头。如果方法返回一个值，`return` 关键字后面必须跟一个表达式，该表达式求值后即为要返回的值。如果方法不返回值，则其返回类型指定为\
  \ `void`。如果方法的返回类型是 `void`，则方法不必包含 `return` 语句。如果返回类型为 `void` 的方法想要包含 `return` 语句，则\
  \ `return` 关键字后面不能跟任何表达式；`return` 关键字后面紧跟一个分号以标记语句结束。以下是 `return` 语句的两种形式：\n\n```\n\
  // 如果方法返回一个值，> 必须求值为一种数据类型，\n// 该类型与方法的指定返回类型赋值兼容\nreturn ;\n```\n\n或\n\n```\n//\
  \ 如果方法的返回类型是 void\nreturn;\n```\n\n`return` 语句的作用是什么？顾名思义，它将控制权返回给方法的调用者。如果它带有表达式，它会计算该表达式并将表达式的值返回给调用者。如果\
  \ `return` 语句没有表达式，它只是将控制权返回给其调用者。`return` 语句是在方法体中执行的最后一条语句。你可以在方法体中有多个 `return`\
  \ 语句。然而，对于特定的方法调用，最多只能执行一个 `return` 语句。\n\n`add` 方法返回其两个参数的和。如何捕获方法的返回值？方法调用本身就是一个表达式，其数据类型是方法的返回类型，并且它求值为从方法返回的值。例如，如果你编写如下语句：\n\
  \n```\nadd(10, 12);\n```\n\n`add(10, 12)` 是一个表达式，其数据类型是 `int`。在运行时，它将被求值为一个 `int`\
  \ 值 22，这是从 `add` 方法返回的值。要捕获方法调用的值，你可以在任何可以使用值的地方使用方法调用表达式。例如，以下代码片段将从 `add` 方法返回的值赋给一个名为\
  \ `sum` 的变量：\n\n```\nint sum = add(10, 12); // sum 变量将被赋值为 22\n```\n\n现在将注意力转向一个不返回值的方法。你指定\
  \ `void` 作为此类方法的返回类型。考虑以下名为 `printPoem` 的方法声明：\n\n```\nvoid printPoem() {\nSystem.out.println(\"\
  Strange fits of passion have I known:\");\nSystem.out.println(\"And I will dare\
  \ to tell,\");\nSystem.out.println(\"But in the lover's ear alone,\");\nSystem.out.println(\"\
  What once to me befell.\");\n}\n```\n\n`printPoem` 方法指定 `void` 作为其返回类型，这意味着它不向调用者返回值。它没有指定任何参数，这意味着它不接受来自调用者的任何输入值。如果你需要调用\
  \ `printPoem` 方法，你需要编写以下语句：\n\n```\nprintPoem();\n```\n\n注意\n\n在本书中，当我提到一个方法时，我使用方法名后跟一对圆括号。例如，我将\
  \ `add` 方法称为 `add()`，将 `printPoem` 方法称为 `printPoem()`。有时，我需要引用方法的形式参数以使方法的意义清晰。在这些情况下，我可能只使用形式参数的数据类型，例如，使用\
  \ `add(int, int)` 来引用 `add(int n1, int n2)` 方法。无论我在讨论中使用何种约定来引用方法，其使用的上下文都会使含义清晰。\n\
  \n由于 `printPoem()` 方法不返回任何值，你不能在期望值的任何表达式中使用对此方法的调用。例如，以下语句会导致编译时错误：\n\n```\nint\
  \ x = printPoem(); // 编译时错误\n```\n\n当方法的返回类型是 `void` 时，不必在方法体中使用 `return` 语句，因为你没有值要从方法返回。回想一下，`return`\
  \ 语句做两件事：计算其表达式（如果有），并通过结束方法体中的执行将控制权返回给调用者。即使你不从方法返回值，你仍然可以使用 `return` 语句来简单地结束方法的执行。让我们向\
  \ `printPoem` 方法添加一个参数，以允许调用者传递它想要打印的诗节编号。修改后的方法声明如下：\n\n```\nvoid printPoem(int\
  \ stanzaNumber) {\nif (stanzaNumber  2) {\nSystem.out.println(\"Cannot print stanza\
  \ #\" + stanzaNumber);\nreturn; // 结束方法调用\n}\nif (stanzaNumber == 1) {\nSystem.out.println(\"\
  Strange fits of passion have I known:\");\nSystem.out.println(\"And I will dare\
  \ to tell,\");\nSystem.out.println(\"But in the lover's ear alone,\");\nSystem.out.println(\"\
  What once to me befell.\");\n} else if (stanzaNumber == 2) {\nSystem.out.println(\"\
  When she I loved looked every day\");\nSystem.out.println(\"Fresh as a rose in June,\"\
  );\nSystem.out.println(\"I to her cottage bent my way,\");\nSystem.out.println(\"\
  Beneath an evening-moon.\");\n}\n}\n```\n\n修改后的 `printPoem()` 方法知道如何打印第 1 节和第 2\
  \ 节。如果其调用者传递的节号超出此范围，它会打印一条消息并结束方法调用。这是通过在第一个 `if` 语句中使用 `return` 语句来实现的。你也可以编写之前的\
  \ `printPoem()` 方法而不使用任何 `return` 语句，如下所示：\n\n```\nvoid printPoem(int stanzaNumber)\
  \ {\nif (stanzaNumber == 1) {\n/* 打印第 1 节 */\n} else if (stanzaNumber == 2) {\n\
  /* 打印第 2 节 */\n} else {\nSystem.out.println(\"Cannot print stanza #\" + stanzaNumber);\n\
  }\n}\n```\n\n编译器会强制你在声明中指定了返回类型的方法体内包含一个 `return` 语句。但是，如果编译器确定一个方法指定了返回类型，但它总是异常结束执行，例如，通过抛出异常，则你不需要在方法体中包含\
  \ `return` 语句。例如，以下方法声明是有效的。现在不必担心 `throw` 和 `throws` 关键字；我将在本书后面介绍它们。\n\n```\n\
  int aMethod() throws Exception {\nthrow new Exception(\"Do not call me...\");\n\
  }\n```\n\n局部变量\n\n\n\n在方法、构造器或代码块内部声明的变量被称为**局部变量**。\n我将在第 9 章讨论构造器。在方法中声明的局部变量仅在该方法执行期间存在。\n\
  由于局部变量仅临时存在，因此不能在声明它的方法、构造器或代码块之外使用。方法的形参被视为局部变量。当方法被调用时，它们会使用实际参数值进行初始化，且初始化发生在方法体执行之前。你需要遵守以下关于局部变量使用的规则。\n\
  \n**规则 #1**\n\n局部变量默认不会被初始化。请注意，这条规则与实例/类变量的初始化规则相反。当声明实例/类变量时，它会使用默认值进行初始化。考虑以下\
  \ `add()` 方法的部分定义：\n\n```\nint add(int n1, int n2) {\nint sum;\n/* sum 的值是多少？我们不知道，因为它尚未被初始化。\
  \ */\n/* 此处有更多代码... */\n}\n```\n\n**规则 #2**\n\n这条规则是第一条规则的衍生。在局部变量被赋值之前，不能在程序中访问它。以下代码片段将产生编译时错误，因为它试图在局部变量\
  \ `sum` 被赋值之前打印其值。请注意，Java 运行时必须读取（或访问）`sum` 变量的值才能打印它。\n\n```\nint add(int n1,\
  \ int n2) {\nint sum;\n// 编译时错误。无法读取 sum，因为它尚未被赋值。\nSystem.out.println(sum);\n}\n\
  ```\n\n以下代码片段可以正常编译，因为局部变量 `sum` 在读取之前已被初始化：\n\n```\nint add(int n1, int n2) {\n\
  int sum = 0;\nSystem.out.println(sum); // 正确。将打印 0\n}\n```\n\n**规则 #3**\n\n局部变量可以在方法体内的任何位置声明。但是，它必须在被使用之前声明。这条规则的含义是，你不需要在方法体的开头声明所有局部变量。一个好的实践是，在靠近变量使用的地方声明它。\n\
  \n**规则 #4**\n\n局部变量会隐藏同名的实例变量和类变量。让我们详细讨论这条规则。每个变量，无论其类型如何，都有一个作用域。有时变量的作用域也被称为其可见性。变量的作用域是程序中可以通过其简单名称引用该变量的部分。在方法中声明的局部变量的作用域是方法体中紧随变量声明之后的部分。在代码块中声明的局部变量的作用域是该代码块中紧随变量声明之后的剩余部分。方法的形参的作用域是整个方法体。这意味着方法形参的名称可以在该方法体内的任何地方使用。例如，\n\
  \n```\nint sum(int n1, int n2) {\n// n1 和 n2 可以在这里使用\n}\n```\n\n实例变量和类变量的作用域是整个类体。例如，实例变量\
  \ `n1` 和类变量 `n2` 可以在类 `NameHidingTest1` 中的任何地方通过其简单名称引用，如下所示：\n\n```\nclass NameHidingTest1\
  \ {\nint n1 = 10;         // 一个实例变量\nstatic int n2 = 20;  // 一个类变量\n// m1 是一个方法\n\
  void m1() {\n// n1 和 n2 可以在这里使用\n}\nint n3 = n1; // n1 可以在这里使用\n}\n```\n\n当两个变量（比如一个实例变量和一个局部变量）在程序的同一部分都处于作用域内时，会发生什么？考虑以下\
  \ `NameHidingTest2` 类的代码：\n\n```\nclass NameHidingTest2 {\n// 声明一个名为 n1 的实例变量\n\
  int n1 = 10;\n// m1 是一个方法\nvoid m1() {\n// 声明一个名为 n1 的局部变量\nint n1 = 20;\n/* 实例变量\
  \ n1 和局部变量 n1 在此处都处于作用域内 */\n// n2 将被赋予什么值：10 还是 20？\nint n2 = n1;\n}\n/* 只有实例变量\
  \ n1 在此处处于作用域内 */\n// n3 将从实例变量 n1 被赋予值 10\nint n3 = n1;\n}\n```\n\n在前面的代码中执行 `m1()`\
  \ 方法时，变量 `n2` 将被赋予什么值？请注意，该类声明了一个名为 `n1` 的实例变量，而方法 `m1()` 也声明了一个同名的局部变量 `n1`。实例变量\
  \ `n1` 的作用域是整个类体，其中包括 `m1()` 方法的方法体。局部变量 `n1` 的作用域是整个 `m1()` 方法的方法体。当在 `m1()` 方法内部执行以下语句时：\n\
  \n```\nint n2 = n1;\n```\n\n两个同名为 `n1` 的变量都处于作用域内：一个值为 `10`，另一个值为 `20`。前面的语句引用的是哪个\
  \ `n1`：是实例变量 `n1`，还是局部变量 `n1`？当局部变量与类字段（实例/类变量）的名称相同时，局部变量名会隐藏类字段的名称。这被称为**名称隐藏**。在这种情况下，局部变量名\
  \ `n1` 在 `m1()` 方法内部隐藏了实例变量 `n1` 的名称。前面的语句将引用局部变量 `n1`，而不是实例变量 `n1`。因此，`n2` 将被赋予值\
  \ `20`。\n\n**提示**\n\n与类字段同名的局部变量会隐藏类字段的名称。换句话说，当同名的局部变量和类字段都处于作用域内时，局部变量优先。\n\n\
  以下 `NameHidingTest3` 类的代码阐明了局部变量进入作用域时的场景：\n\n```\npublic class NameHidingTest3\
  \ {\n// 声明一个名为 n1 的实例变量\nint n1 = 10;\npublic void m1() {\n/* 只有实例变量 n1 在此处处于作用域内\
  \ */\n// 将 10 赋值给 n2\nint n2 = n1;\n/* 只有实例变量 n1 在此处处于作用域内。局部变量 n2 也在此处处于作用域内，为了当前讨论，我们暂时忽略它。\n\
  */\n// 声明一个名为 n1 的局部变量\nint n1 = 20;\n/* 实例变量 n1 和局部变量 n1 在此处都处于作用域内。我们暂时忽略 n2。\n\
  */\n// 将 20 赋值给 n3\nint n3 = n1;\n}\n}\n```\n\n前面的代码在 `m1()` 方法内部将变量 `n1` 的值赋给了\
  \ `n2`。在你将 `n1` 的值赋给 `n2` 时，你还没有声明局部变量 `n1`。此时，只有实例变量 `n1` 处于作用域内。当你将 `n1` 赋给 `n3`\
  \ 时，此时实例变量 `n1` 和局部变量 `n1` 都处于作用域内。赋给 `n2` 和 `n3` 的值取决于名称隐藏规则。当两个同名的变量都处于作用域内时，会使用局部变量。\n\
  \n这是否意味着你不能声明同名的实例/类变量和局部变量，并且同时使用它们？答案是否定的。你可以声明同名的实例/类变量和局部变量。你唯一需要知道的是，如果实例/类变量的名称被局部变量隐藏，如何引用它。你将在下一节学习如何引用被隐藏的实例/类变量。\n\
  \n**实例方法和类方法**\n\n在第 7 章中，你学习了两种类型的类字段：实例变量和类变量。一个类可以有两种类型的方法：实例方法和类方法。实例方法和类方法也分别被称为非静态方法和静态方法。\n\
  \n**实例方法**用于实现类的实例（也称为对象）的行为。实例方法只能在类的实例上下文中被调用。\n\n\n\n类方法用于实现类本身的行为。类方法总是在类的上下文中执行。\n\
  \n`static` 修饰符用于定义类方法。在方法声明中缺少 `static` 修饰符会使该方法成为实例方法。以下是声明静态方法和非静态方法的示例：\n\n```\n\
  // 静态方法或类方法\nstatic void aClassMethod() {\n// 方法体写在这里\n}\n// 非静态方法或实例方法\nvoid anInstanceMethod()\
  \ {\n// 方法体写在这里\n}\n```\n\n回顾一下，类的每个实例都拥有实例变量的独立副本，而类变量只存在一个副本，无论该类存在多少个实例（可能为零）。\n\
  \n当调用类的静态方法时，该类的实例可能不存在。因此，不允许在静态方法内部引用实例变量。类定义被加载到内存后，类变量就立即存在。在创建类的第一个实例之前，类定义总是被加载到内存中。请注意，不需要创建类的实例即可将其定义加载到内存。JVM\
  \ 保证在类的任何实例存在之前，该类的所有类变量都已存在。因此，你始终可以在实例方法内部引用类变量。\n\n提示\n\n类方法（或静态方法）只能引用类的类变量（或静态变量）。实例方法（非静态方法）可以引用类的类变量以及实例变量。\n\
  \n清单 8-1 演示了在实例方法和类方法内部可访问的类字段类型。\n\n```\n// MethodType.java\npackage com.jdojo.cls;\n\
  public class MethodType {\nstatic int m = 100; // 静态变量\nint n = 200;        // 实例变量\n\
  // 声明一个静态方法\nstatic void printM() {\n/* 在此方法中你只能引用静态变量 m\n因为你位于静态方法内部。\n*/\nSystem.out.println(\"\
  printM() - m = \" + m);\n// 取消下面语句的注释会导致编译时错误。\n//System.out.println(\"printM()\
  \ - n = \" + n);\n}\n// 声明一个实例方法\nvoid printMN() {\n// 在此方法中你可以引用静态变量和实例变量 m 和 n。\n\
  System.out.println(\"printMN() - m = \" + m);\nSystem.out.println(\"printMN() -\
  \ n = \" + n);\n}\n}\n清单 8-1.\n从静态方法和非静态方法访问类字段\n```\n\n`MethodType` 类将 `m` 声明为静态变量，将\
  \ `n` 声明为非静态变量。它将 `printM()` 声明为静态方法，将 `printMN()` 声明为实例方法。在 `printM()` 方法内部，你只能引用静态变量\
  \ `m`，因为静态方法只能引用静态变量。如果你取消 `printM()` 方法内部被注释的语句，代码将无法编译，因为静态方法试图访问非静态变量 `n`。`printMN()`\
  \ 方法是一个非静态方法，它可以访问静态变量 `m` 和非静态变量 `n`。现在你希望调用 `MethodType` 类的 `printM()` 和 `printMN()`\
  \ 方法。下一节将解释如何调用方法。\n\n调用方法\n\n执行方法体中的代码称为调用方法。实例方法和类方法的调用方式不同。实例方法使用点符号在类的实例上调用。调用实例方法的语法如下：\n\
  \n```\n<实例引用>.<方法名>(<参数>)\n```\n\n请注意，在调用某个类的实例方法之前，你必须拥有对该类实例的引用。例如，你可以编写以下代码片段来调用清单\
  \ 8-1 中列出的 `MethodType` 类的 `printMN()` 实例方法：\n\n```\n// 创建 MethodType 类的实例并将其引用存储在\
  \ mt 引用变量中\nMethodType mt = new MethodType();\n// 使用 mt 引用变量调用 printMN() 实例方法\n\
  mt.printMN();\n```\n\n要调用类方法，你使用类名加点符号。以下代码片段调用了 `MethodType` 类的 `printM()` 类方法：\n\
  \n```\n// 调用 printM() 类方法\nMethodType.printM();\n```\n\n属于类的一切也属于该类的所有实例。你也可以使用该类实例的引用来调用类方法。\n\
  \n```\nMethodType mt = new MethodType();\nmt.printM(); // 使用实例 mt 调用类方法\n```\n\n\
  哪种是调用类方法的更好方式：使用类名还是使用实例引用？两种方式完成的工作相同。然而，使用类名调用类方法比使用实例引用更直观。本书使用类名来调用类方法，除非是为了演示你也可以使用实例引用来调用类方法。清单\
  \ 8-2 演示了如何调用类的实例方法和类方法。请注意，当你使用类名或实例引用调用类方法 `printM()` 时，输出显示相同的结果。\n\n```\n//\
  \ MethodTypeTest.java\npackage com.jdojo.cls;\npublic class MethodTypeTest {\npublic\
  \ static void main(String[] args) {\n// 创建 MethodType 类的实例\nMethodType mt = new\
  \ MethodType();\n// 调用实例方法\nSystem.out.println(\"调用实例方法...\");\nmt.printMN();\n\
  // 使用类名调用类方法\nSystem.out.println(\"使用类名调用类方法...\");\nMethodType.printM();\n// 使用实例引用调用类方法\n\
  System.out.println(\"使用实例调用类方法...\");\nmt.printM();\n}\n}\n调用实例方法...\nprintMN()\
  \ - m = 100\nprintMN() - n = 200\n使用类名调用类方法...\nprintM() - m = 100\n使用实例调用类方法...\n\
  printM() - m = 100\n清单 8-2.\n调用类的实例方法和类方法的示例\n```\n\n特殊的 main( ) 方法\n\n你在上一节学习了如何在类中声明方法。让我们讨论一下你一直用来运行类的\
  \ `main()` 方法。`main()` 方法的声明如下：\n\n```\npublic static void main(String[] args) {\n\
  // 方法体写在这里\n}\n```\n\n`main()` 方法的声明中使用了两个修饰符：`public` 和 `static`。`public` 修饰符使其在应用程序的任何地方都可访问，只要声明它的类是可访问的。`static`\
  \ 修饰符使其成为类方法，因此可以使用类名来调用它。它的返回类型是 `void`，这意味着它不向调用者返回值。它的名称是 `main`，并且它接受一个 `String`\
  \ 数组类型（`String[]`）的参数。请注意，你一直使用 `args` 作为其参数的名称。但是，你可以使用任何你想要的参数名称。例如，你可以将 `main`\
  \ 方法声明为 `public static void main(String[] myParameters)`，这与前面显示的 `main` 方法声明相同。无论你选择什么参数名称，如果你需要引用传递给此方法的参数，你都需要在方法体中使用相同的名称。\n\
  \n在类中声明 `main()` 方法有什么特别之处？你通过将类名传递给 `java` 命令来运行 Java 应用程序。例如，你将使用以下命令来运行 `MethodTypeTest`\
  \ 类：\n\n```\nJava  --module jdojo.cls/com.jdojo.cls.MethodTypeTest\n```\n\n\n\n\
  当执行上一条命令时，JVM（`java` 命令本质上会启动一个 JVM）会在内存中查找并加载 `MethodTypeTest` 类的定义。然后，它会寻找一个声明为\
  \ `public` 和 `static`、返回类型为 `void`、且方法参数为 `String` 数组的方法声明。如果找到了 `main()` 方法声明，JVM\
  \ 就会调用该方法。如果未找到 `main()` 方法，JVM 就不知道从何处启动应用程序，并会抛出一个错误，指出未找到 `main()` 方法。\n\n为什么需要将\
  \ `main()` 方法声明为 static？`main()` 方法充当 Java 应用程序的入口点。当你运行一个类时，它由 JVM 调用。JVM 不知道如何创建类的实例。它需要一种标准的方式来启动\
  \ Java 应用程序。指定 `main()` 方法的所有细节并将其设为 static，为 JVM 提供了一种启动 Java 应用程序的标准方式。通过将 `main()`\
  \ 方法设为 static，JVM 可以使用在命令行中传递的类名来调用它。\n\n如果不将 `main()` 方法声明为 static 会发生什么？如果你不将\
  \ `main()` 方法声明为 static，它将被视为一个实例方法。代码可以正常编译。但是，你将无法运行其 `main()` 方法被声明为实例方法的那个类。\n\
  \n一个类中可以有多个 `main()` 方法吗？答案是肯定的。一个类中可以有多个方法，只要它们签名不同，就可以命名为 `main`。以下为 `MultipleMainMethod`\
  \ 类的声明，它声明了三个 `main()` 方法，这是有效的。第一个声明为 `public static void main(String[] args)`\
  \ 的 `main()` 方法，可用作运行应用程序的入口点。就 JVM 而言，另外两个 `main()` 方法没有特殊意义。\n\n```\n// MultipleMainMethod.java\n\
  package com.jdojo.cls;\npublic class MultipleMainMethods {\npublic static void main(String[]\
  \ args) {\n/* 可用作应用程序入口点 */\n}\npublic static void main(String[] args, int a) {\n\
  /* 另一个 main() 方法 */\n}\npublic int main() {\n/* 另一个 main() 方法 */\nreturn 0;\n}\n\
  }\n```\n\nJava 中的每个类都需要有一个 `main()` 方法吗？答案是否定的。如果你想运行某个类，则需要在该类中声明一个 `public static\
  \ void main(String[] args)` 方法。如果你有一个 Java 应用程序，你至少需要在一个类中拥有 `main()` 方法，这样你就可以通过运行该类来启动应用程序。应用程序中使用的所有其他类，如果不是用于启动应用程序的，则不需要有\
  \ `main()` 方法。\n\n可以在你的代码中调用 `main()` 方法吗？还是只能由 JVM 调用？当你运行一个类时，`main()` 方法由 JVM\
  \ 调用。除此之外，你可以将 `main()` 方法视为任何其他类方法。程序员普遍（错误地）认为 `main()` 方法只能由 JVM 调用。然而，事实并非如此。确实，`main()`\
  \ 方法通常（但不一定）由 JVM 调用来启动 Java 应用程序。但是，它并非（至少在理论上）只能由 JVM 调用。下面是一个示例，展示了如何像调用其他类方法一样调用\
  \ `main()` 方法。清单 8-3 定义了 `MainTest1` 类，该类声明了一个 `main()` 方法。清单 8-4 定义了 `MainTest2`\
  \ 类，该类也声明了一个 `main()` 方法。\n\n```\n// MainTest1.java\npackage com.jdojo.cls;\npublic\
  \ class MainTest1 {\npublic static void main(String[] args) {\nSystem.out.println(\"\
  Inside the MainTest1.main() method.\");\n}\n}\n清单 8-3.\n一个 MainTest1 类，它声明了一个 main()\
  \ 方法\n```\n\n```\n// MainTest2.java\npackage com.jdojo.cls;\npublic class MainTest2\
  \ {\npublic static void main(String[] args) {\nSystem.out.println(\"Inside the MainTest2.main()\
  \ method.\");\nMainTest1.main(args);\n}\n}\nInside the MainTest2.main() method.\n\
  Inside the MainTest1.main() method.\n清单 8-4.\n一个 MainTest2 类，它声明了一个 main() 方法，该方法又调用了\
  \ MainTest1 类的 main() 方法\n```\n\n`MainTest2` 类的 `main()` 方法打印一条消息，并使用以下代码调用 `MainTest1`\
  \ 类的 `main()` 方法：\n\n```\nMainTest1.main(args);\n```\n\n请注意，`MainTest1` 类的 `main()`\
  \ 方法接受一个 `String` 数组作为参数，而前面的语句将 `args` 作为该参数的实际值传递。\n\nJVM 将调用 `MainTest2` 类的 `main()`\
  \ 方法，该方法又会调用 `MainTest1` 类的 `main()` 方法。清单 8-4 中的输出证实了这一点。你也可以让 JVM 通过运行 `MainTest1`\
  \ 类来调用其 `main()` 方法，这将产生以下输出：\n\n```\nInside the MainTest1.main() method.\n```\n\
  \n提示\n\n类中声明为 `public static void main(String[] args)` 的 `main()` 方法，仅当该类由 JVM 运行时才具有特殊含义；它充当\
  \ Java 应用程序的入口点。否则，`main()` 方法与其他任何类方法的处理方式相同。\n\n什么是 this？\n\nJava 有一个名为 `this`\
  \ 的关键字。它是对当前类实例的引用。它只能在实例的上下文中使用。它永远不能在类的上下文中使用，因为它指的是当前实例，而在类的上下文中不存在实例。关键字 `this`\
  \ 在许多上下文中使用。我将在本章和第 9 章中介绍它的大部分用途。考虑以下声明 `ThisTest1` 类的代码片段：\n\n```\npublic class\
  \ ThisTest1 {\nint varA = 555;\nint varB = varA;      // 将 varA 的值赋给 varB\nint varC\
  \ = this.varA; // 将 varA 的值赋给 varC\n}\n```\n\n`ThisTest1` 类声明了三个实例变量：`varA`、`varB`\
  \ 和 `varC`。实例变量 `varA` 被初始化为 555。实例变量 `varB` 被初始化为 `varA` 的值，即 555。实例变量 `varC` 被初始化为\
  \ `varA` 的值，即 555。请注意 `varB` 和 `varC` 初始化表达式的区别。初始化 `varB` 时，我使用了未限定的 `varA`。初始化\
  \ `varC` 时，我使用了 `this.varA`。然而，效果是一样的。`varB` 和 `varC` 都用 `varA` 的值初始化。当我使用 `this.varA`\
  \ 时，它表示当前实例的 `varA` 的值，即 555。在这个简单的例子中，没有必要使用关键字 `this`。在前面的情况下，未限定的 `varA` 指的是当前实例的\
  \ `varA`。但是，在某些情况下，你必须使用关键字 `this`。我稍后会讨论这些情况。\n\n由于在类的上下文中使用关键字 `this` 是非法的，因此在初始化类变量时不能使用它，如下所示：\n\
  \n```\n// 无法编译\npublic class ThisTest2 {\nstatic int varU = 555;\nstatic int varV\
  \ = varU;\nstatic int varW = this.varU; // 编译时错误\n}\n```\n\n当你编译 `ThisTest2` 类的代码时，会收到以下错误：\n\
  \n```\n\"ThisTest2.java\": 无法从静态上下文中引用非静态变量 this，位于第 4 行，第 21 列\n```\n\n错误信息清晰明确地指出，你不能在静态上下文中使用关键字\
  \ `this`。请注意，在 Java 中，static 和 non-static 这两个词分别与“类”和“实例”同义。静态上下文等同于类上下文，非静态上下文等同于实例上下文。可以通过从\
  \ `varW` 的初始化表达式中移除限定符 `this` 来更正上述代码，如下所示：\n\n\n\n```\npublic class CorrectThisTest2\
  \ {\nstatic int varU = 555;\nstatic int varV = varU;\nstatic int varW = varU; //\
  \ 现在没问题了\n}\n```\n\n你也可以使用类名来限定类变量，如下面的 `CorrectThisTest3` 类所示：\n\n```\npublic class\
  \ CorrectThisTest3 {\nstatic int varU = 555;\nstatic int varV = varU;\nstatic int\
  \ varW = CorrectThisTest3.varU;\n}\n```\n\n提示\n\n大多数情况下，你可以在声明实例变量和类变量的类内部使用它们的简单名称。只有当实例变量或类变量被另一个同名变量隐藏时，才需要使用关键字\
  \ `this` 限定实例变量，并使用类名限定类变量。\n\n考虑以下 `ThisTest3` 类的代码片段：\n\n```\npublic class ThisTest3\
  \ {\nint varU = 555;\nstatic int varV = varU; // 编译时错误\nstatic int varW = varU;\
  \ // 编译时错误\n}\n```\n\n当你编译 `ThisTest3` 类时，会收到以下错误：\n\n```\n\"ThisTest3.java\": non-static\
  \ variable varU cannot be referenced from a static context at line 3, column 21\n\
  \"ThisTest3.java\": non-static variable varU cannot be referenced from a static\
  \ context at line 4, column 21\n```\n\n该错误与你在 `ThisTest2` 类中遇到的错误性质相同，尽管表述略有不同。上次，编译器抱怨使用了关键字\
  \ `this`。这次，它抱怨使用了实例变量 `varU`。关键字 `this` 和 `varU` 都存在于实例的上下文中，而不存在于类的上下文中。任何存在于实例上下文中的内容都不能在类上下文中使用。然而，任何存在于类上下文中的内容都可以在实例上下文中使用。实例变量的声明和初始化发生在实例的上下文中。在\
  \ `ThisTest3` 类中，`varU` 是一个实例变量，它只存在于实例的上下文中。`ThisTest3` 类中的 `varV` 和 `varW` 是类变量，它们只存在于类的上下文中。这就是编译器报错的原因。\n\
  \n考虑清单 8-5 中所示的 `ThisTest4` 类的代码。它声明了一个实例变量 `num` 和一个实例方法 `printNum()`。在 `printNum()`\
  \ 实例方法中，它打印了实例变量 `num` 的值。在其 `main()` 方法中，它创建了 `ThisTest4` 类的一个实例，并调用了该实例的 `printNum()`\
  \ 方法。`ThisTest4` 类的输出显示了预期的结果。\n\n```\n// ThisTest4.java\npackage com.jdojo.cls;\n\
  public class ThisTest4 {\nint num = 1982; // 一个实例变量\npublic static void main(String[]\
  \ args) {\nThisTest4 tt4 = new ThisTest4();\ntt4.printNum();\n}\nvoid printNum()\
  \ {\nSystem.out.println(\"实例变量 num: \" + num);\n}\n}\n实例变量 num: 1982\n清单 8-5.\n\
  在实例方法中使用实例变量简单名称的示例\n```\n\n现在修改 `ThisTest4` 类的 `printNum()` 方法，使其接受一个 `int` 参数，并将该参数命名为\
  \ `num`。清单 8-6 展示了 `ThisTest5` 类中修改后的 `printNum()` 方法代码。\n\n```\n// ThisTest5.java\n\
  package com.jdojo.cls;\npublic class ThisTest5 {\nint num = 1982; // 一个实例变量\npublic\
  \ static void main(String[] args) {\nThisTest5 tt5 = new ThisTest5();\ntt5.printNum(1969);\n\
  }\nvoid printNum(int num) {\nSystem.out.println(\"参数 num: \" + num);\nSystem.out.println(\"\
  实例变量 num: \" + num);\n}\n}\n参数 num: 1969\n实例变量 num: 1969\n清单 8-6.\n变量名隐藏\n```\n\n\
  `ThisTest5` 类的输出表明，当在其方法体内使用简单名称 `num` 时，`printNum()` 方法使用的是其参数 `num`。这是名称隐藏的一个例子，其中局部变量（方法参数被视为局部变量）`num`\
  \ 在 `printNum()` 方法体内隐藏了实例变量 `num` 的名称。在 `printNum()` 方法中，简单名称 `num` 指的是其参数 `num`，而不是实例变量\
  \ `num`。在这种情况下，如果你想在 `printNum()` 方法内部引用实例变量 `num`，则必须使用关键字 `this` 来限定 `num` 变量。\n\
  \n只要保持方法参数名为 `num`，使用 `this.num` 是在 `printNum()` 方法内部引用实例变量的唯一方法。另一种方法是将参数重命名为 `num`\
  \ 以外的名称，例如 `numParam` 或 `newNum`。清单 8-7 展示了如何使用关键字 `this` 在 `printNum()` 方法内部引用\
  \ `num` 实例变量。\n\n```\n// ThisTest6.java\npackage com.jdojo.cls;\npublic class ThisTest6\
  \ {\nint num = 1982; // 一个实例变量\npublic static void main(String[] args) {\nThisTest6\
  \ tt6 = new ThisTest6();\ntt6.printNum(1969);\n}\nvoid printNum(int num) {\nSystem.out.println(\"\
  参数 num: \" + num);\nSystem.out.println(\"实例变量 num: \" + this.num);\n}\n}\n参数 num:\
  \ 1969\n实例变量 num: 1982\n清单 8-7.\n使用 this 关键字引用被局部变量隐藏名称的实例变量\n```\n\n`ThisTest6`\
  \ 的输出显示了预期的结果。如果你不想使用关键字 `this`，可以重命名 `printNum()` 方法的参数，如下所示：\n\n```\nvoid printNum(int\
  \ numParam) {\nSystem.out.println(\"参数 num: \" + numParam);\nSystem.out.println(\"\
  实例变量 num: \" + num);\n}\n```\n\n一旦你将参数重命名为 `num` 以外的名称，`num` 实例变量在 `printNum()`\
  \ 方法体内就不再被隐藏，因此你可以使用其简单名称来引用它。\n\n即使实例变量未被隐藏，你也可以使用关键字 `this` 在 `printNum()` 方法内部引用实例变量\
  \ `num`，如下所示。然而，在以下情况下使用关键字 `this` 是可选的，而非必须的。\n\n```\nvoid printNum(int numParam)\
  \ {\nSystem.out.println(\"参数 num: \" + numParam);\nSystem.out.println(\"实例变量 num:\
  \ \" + this.num);\n}\n```\n\n在前面的例子中，你看到当实例变量名被隐藏时，使用关键字 `this` 是访问实例变量的必要条件。你可以通过重命名隐藏实例变量名的变量，或重命名实例变量本身，来避免在这种情况下使用关键字\
  \ `this`。有时保持变量名相同更容易，因为它们代表同一事物。本书采用这样的惯例：如果实例变量和局部变量在类中代表同一事物，则使用相同的名称。例如，以下代码非常常见：\n\
  \n```\npublic class Student {\nprivate int id; // 一个实例变量\npublic void setId(int\
  \ id) {\nthis.id = id;\n}\npublic int getId() {\nreturn this.id;\n}\n}\n```\n\n\
  `Student` 类声明了一个名为 `id` 的实例变量。在其 `setId()` 方法中，它也将参数命名为 `id`，并使用 `this.id` 来引用实例变量。在其\
  \ `getId()` 方法中，它也使用 `this.id` 来引用实例变量 `id`。请注意，在 `getId()` 方法中没有发生名称隐藏，你可以使用简单名称\
  \ `id`，它指的就是实例变量 `id`。\n\n表 8-2 列出了类的各个部分、它们所处的上下文，以及关键字 `this`、实例变量和类变量的允许使用方式。我尚未涵盖此表中列出的类的所有部分。我将在本章和第\
  \ 9 章中介绍它们。\n\n表 8-2.\n\n\n\n关键字 `this`、实例变量和类变量的上下文类型及允许使用方式\n\n类的组成部分\n |\n  上下文\n\
  \ |\n  能否使用 `this` 关键字？\n |\n  能否使用实例变量？\n |\n  能否使用类变量？\n |\n\n| --- | --- | ---\
  \ | --- | --- | --- | --- | --- | --- | --- | --- |\n\n实例变量初始化\n |\n  实例\n |\n \
  \ 是\n |\n  是\n |\n  是\n |\n\n类变量初始化\n |\n  类\n |\n  否\n |\n  否\n |\n  是\n |\n\n\
  实例初始化器\n |\n  实例\n |\n  是\n |\n  是\n |\n  是\n |\n\n类初始化器\n\n（也称为静态初始化器）\n |\n  类\n\
  \ |\n  否\n |\n  否\n |\n  是\n |\n\n构造器\n |\n  实例\n |\n  是\n |\n  是\n |\n  是\n |\n\
  \n实例方法\n\n（也称为非静态方法）\n |\n  实例\n |\n  是\n |\n  是\n |\n  是\n |\n\n类方法\n\n（也称为静态方法）\n\
  \ |\n  类\n |\n  否\n |\n  否\n |\n  是\n |\n\n关键字 `this` 是一个 `final`（在 Java 中，常量被称为\
  \ `final`，因为 Java 使用 `final` 关键字来声明常量）引用，指向它所在类的当前实例。由于它是 `final` 的，因此你不能更改它的值。因为\
  \ `this` 是一个关键字，所以你不能声明名为 `this` 的变量。以下代码将产生编译时错误：\n\n```\npublic class ThisError\
  \ {\nvoid m1() {\n// 错误。不能将变量命名为 this\nint this = 10;\n// 错误。不能给 this 赋值，因为它是常量。\n\
  this = null;\n}\n}\n```\n\n你也可以使用关键字 `this` 来限定实例方法名，尽管这从来都不是必需的。以下代码片段展示了 `m1()`\
  \ 方法使用关键字 `this` 调用 `m2()` 方法。请注意，这两个方法都是实例方法，它们可以使用简单名称来相互调用。\n\n```\npublic class\
  \ ThisTestMethod {\nvoid m1() {\n// 调用 m2() 方法\nthis.m2(); // 等同于 \"m2();\"\n}\n\
  void m2() {\n// 执行某些操作\n}\n}\n```\n\n类成员的访问级别\n\n在第 7 章中，我介绍了类的访问级别，可以是 `public`\
  \ 或默认（即包级别）。本节讨论类成员（字段和方法）的访问级别。类成员的访问级别决定了程序的哪些区域可以访问（使用或引用）它。类成员可以使用以下四种访问级别修饰符之一：\n\
  \n*   `public`\n\n*   `private`\n\n*   `protected`\n\n*   默认或包级别访问\n\n类成员的四种访问级别中有三种是使用三个关键字之一指定的：`public`、`private`\
  \ 或 `protected`。第四种类型称为默认访问级别（或包级别访问），它通过不使用任何访问修饰符来指定。也就是说，缺少 `public`、`private`\
  \ 或 `protected` 这三个访问级别修饰符中的任何一个，即表示包级别访问。\n\n如果使用 `public` 关键字将类成员声明为 public，则只要类本身是可访问的，就可以从任何地方访问它。\n\
  \n如果使用 `private` 关键字将类成员声明为 private，则只能在声明该类的类主体内部访问它，其他地方均不可访问。\n\n如果使用 `protected`\
  \ 关键字将类成员声明为 protected，则可以从同一个包或该类的子类（即使子类位于不同的包中）访问它。我将在第 20 章中详细讨论 protected 访问级别。\n\
  \n如果你没有为类成员使用任何访问级别修饰符，则它具有包级别访问权限。具有包级别访问权限的类成员可以从同一个包中访问。\n\n类成员属于定义该成员的类。只有当类本身可访问时，类成员才根据这些规则可访问。如果类不可访问，则无论成员的访问级别如何，其成员都不可访问。让我们打个比方。厨房属于一所房子。只有当你能够进入房子时，你才能进入厨房。如果房子的前门锁着（房子不可访问），那么即使厨房被标记为\
  \ public，它也是不可访问的。将类成员视为房子里的厨房，将类视为房子本身。在 Java 8 中，public 类可以被程序的所有部分访问，这在 Java\
  \ 9 中随着模块系统的引入而发生了变化。一个 public 类可能并非对所有人都是真正 public 的。在模块中定义的 public 类可能属于以下三类之一：\n\
  \n*   仅在定义它的模块内是 public 的\n\n*   仅对特定模块是 public 的\n\n*   对所有人都是 public 的\n\n如果一个类在模块中被定义为\
  \ public，但该模块没有导出包含该类的包，则该类仅在该模块内是 public 的。没有其他模块可以访问该类。在这种情况下，public 类的 public\
  \ 成员可以在包含该类的模块中的任何位置访问，其他地方则不行。\n\n如果一个类在模块中被定义为 public，但该模块使用限定导出来导出包含该类的包，则该类仅对限定导出中指定的模块可访问。在这种情况下，public\
  \ 类的 public 成员对于包含该类的模块以及导出该类包的指定模块是可访问的。\n\n如果一个类在模块中被定义为 public，并且该模块使用非限定导出导出了该类的包，则该类对于所有读取定义该类的模块的模块都是可访问的。在这种情况下，public\
  \ 类的 public 成员对所有模块都是可访问的。\n\n类成员的访问级别可以按从最严格到最宽松的顺序列出：`private`、包级别、`protected`\
  \ 和 `public`。表 8-3 总结了类成员的四种访问级别，假设类本身是可访问的。\n\n表 8-3.\n\n类成员访问级别列表\n\n类成员的访问级别\n\
  \ |\n  可访问性\n |\n\n| --- | --- | --- | --- | --- |\n\n`private`\n |\n  仅在同一类内\n\
  \ |\n\n`包级别`\n |\n  在同一包内\n |\n\n`protected`\n |\n  同一包或任何包中的子类\n |\n\n`public`\n\
  \ |\n  任何地方\n |\n\n在本章中，我将讨论限制在同一个模块内访问类成员。我将在第 10 章中讨论模块间的可访问性。以下是一个示例类，它声明了多个具有不同访问级别的类成员：\n\
  \n```\n// AccessLevelSample.java\npackage com.jdojo.cls;\n// 类 AccessLevelSample\
  \ 具有 public 访问级别\npublic class AccessLevelSample {\nprivate int num1;   // private\
  \ 访问级别\nint num2;           // 包级别访问\nprotected int num3; // protected 访问级别\npublic\
  \ int num4;    // public 访问级别\npublic static int count = 1; // public 访问级别\n// m1()\
  \ 方法具有 private 访问级别\nprivate void m1() {\n// 代码写在这里\n}\n// m2() 方法具有包级别访问\nvoid\
  \ m2() {\n// 代码写在这里\n}\n// m3() 方法具有 protected 访问级别\nprotected void m3() {\n// 代码写在这里\n\
  }\n// m4() 方法具有 public 访问级别\npublic void m4() {\n// 代码写在这里\n}\n// doSomething()\
  \ 方法具有 private 访问级别\nprivate static void doSomething() {\n// 代码写在这里\n}\n}\n```\n\
  \n\n\n请注意，访问级别可以同时应用于类的实例成员和静态成员。按照惯例，访问级别修饰符应作为声明中的第一个修饰符。如果你为一个类声明一个公开的静态字段，按照惯例，你应该先使用\
  \ `public` 修饰符，再使用 `static` 修饰符。例如，以下两个针对实例变量 `num` 的声明都是有效的：\n\n```\n// 声明 #1\n\
  public static int num; // 惯例用法\n// 声明 #2\nstatic public int num; // 技术上正确，但不符合惯例。\n\
  ```\n\n让我们讨论几个为类成员使用访问级别修饰符的示例及其效果。请考虑清单 8-8 中所示的 `AccessLevel` 类的代码。\n\n```\n//\
  \ AccessLevel.java\npackage com.jdojo.cls;\npublic class AccessLevel {\nprivate\
  \ int v1 = 100;\nint v2 = 200;\nprotected int v3 = 300;\npublic int v4 = 400;\n\
  private void m1() {\nSystem.out.println(\"Inside m1():\");\nSystem.out.println(\"\
  v1 = \" + v1 + \", v2 = \" + v2\n+ \", v3 = \" + v3 + \", v4 = \" + v4);\n}\nvoid\
  \ m2() {\nSystem.out.println(\"Inside m2():\");\nSystem.out.println(\"v1 = \" +\
  \ v1 + \", v2 = \" + v2\n+ \", v3 = \" + v3 + \", v4 = \" + v4);\n}\nprotected void\
  \ m3() {\nSystem.out.println(\"Inside m3():\");\nSystem.out.println(\"v1 = \" +\
  \ v1 + \", v2 = \" + v2\n+ \", v3 = \" + v3 + \", v4 = \" + v4);\n}\npublic void\
  \ m4() {\nSystem.out.println(\"Inside m4():\");\nSystem.out.println(\"v1 = \" +\
  \ v1 + \", v2 = \" + v2\n+ \", v3 = \" + v3 + \", v4 = \" + v4);\n}\n}\n清单 8-8.\n\
  一个具有不同访问级别类成员的 AccessLevel 类\n```\n\n该类有四个实例变量，分别名为 `v1`、`v2`、`v3` 和 `v4`，以及四个实例方法，分别名为\
  \ `m1()`、`m2()`、`m3()` 和 `m4()`。实例变量和实例方法使用了四种不同的访问级别修饰符。我在此示例中选择使用实例变量和方法；相同的访问级别规则也适用于类变量和类方法。`AccessLevel`\
  \ 类的代码编译无误。请注意，无论类成员的访问级别如何，它在其声明的类内部始终是可访问的。这一点可以通过以下事实得到验证：在所有四个方法内部，你都访问了（读取了它们的值）所有具有不同访问级别的实例变量。请考虑清单\
  \ 8-9 中所示的 `AccessLevelTest1` 类。\n\n```\n// AccessLevelTest1.java\npackage com.jdojo.cls;\n\
  public class AccessLevelTest1 {\npublic static void main(String[] args) {\nAccessLevel\
  \ al = new AccessLevel();\n// int a = al.v1; /* 编译时错误 */\nint b = al.v2;\nint c\
  \ = al.v3;\nint d = al.v4;\nSystem.out.println(\"b = \" + b + \", c = \" + c + \"\
  , d = \" + d);\n//al.m1(); /* 编译时错误 */\nal.m2();\nal.m3();\nal.m4();\n// 修改实例变量的值\n\
  al.v2 = 20;\nal.v3 = 30;\nal.v4 = 40;\nSystem.out.println(\"\\n 修改 v2、v3 和 v4 之后\"\
  );\nal.m2();\nal.m3();\nal.m4();\n}\n}\nb = 200, c = 300, d = 400\nInside m2():\n\
  v1 = 100, v2 = 200, v3 = 300, v4 = 400\nInside m3():\nv1 = 100, v2 = 200, v3 = 300,\
  \ v4 = 400\nInside m4():\nv1 = 100, v2 = 200, v3 = 300, v4 = 400\n修改 v2、v3 和 v4\
  \ 之后\nInside m2():\nv1 = 100, v2 = 20, v3 = 30, v4 = 40\nInside m3():\nv1 = 100,\
  \ v2 = 20, v3 = 30, v4 = 40\nInside m4():\nv1 = 100, v2 = 20, v3 = 30, v4 = 40\n\
  清单 8-9.\n与 AccessLevel 类位于同一包中的测试类\n```\n\n`AccessLevel` 类和 `AccessLevelTest1` 类位于同一个包中。`AccessLevelTest1`\
  \ 类可以访问 `AccessLevel` 类的所有类成员，除了那些声明为 `private` 的成员。你不能从 `AccessLevelTest1` 类访问\
  \ `AccessLevel` 类的实例变量 `v1` 和实例方法 `m1()`，因为它们的访问级别是 `private`。如果你取消 `AccessLevelTest1`\
  \ 类中试图访问 `AccessLevel` 类的 `private` 实例变量 `v1` 和 `private` 实例方法 `m1()` 的两条语句的注释，你将收到以下编译时错误：\n\
  \n```\nAccessLevelTest1.java:8: 错误: v1 在 AccessLevel 中是 private 访问权限\nint a = al.v1;\
  \ /* 编译时错误 */\n^\nAccessLevelTest1.java:15: 错误: m1() 在 AccessLevel 中是 private 访问权限\n\
  al.m1(); /* 编译时错误 */\n^\n2 个错误\n```\n\n`AccessLevelTest1` 类读取并修改了 `AccessLevel`\
  \ 类的实例变量的值。你必须注意一点：即使你不能从 `AccessLevelTest1` 类访问 `AccessLevel` 类的 `private` 实例变量\
  \ `v1` 和 `private` 方法 `m1()`，你仍然可以像输出中所示那样打印 `private` 实例变量 `v1` 的值。\n\n类成员的访问级别修饰符指定了谁可以直接访问它们。如果一个类成员不能直接访问，它可能可以间接访问。在此示例中，实例变量\
  \ `v1` 和实例方法 `m1()` 不能从 `AccessLevel` 类外部直接访问；但是，它们可能可以从外部间接访问。对不可访问的类成员的间接访问通常通过提供另一个可从外部访问的方法来实现。\n\
  \n假设你希望外部世界能够读取和修改原本不可访问的 `private` 实例变量 `v1` 的值。你需要在 `AccessLevel` 类中添加两个 `public`\
  \ 方法，`getV1()` 和 `setV1()`；这两个方法将读取和修改 `v1` 实例变量的值。修改后的 `AccessLevel` 类如下所示：\n\n\
  ```\npublic class AccessLevel {\nprivate int v1;\n/* 其他代码在此处 */\npublic int getV1()\
  \ {\nreturn this.v1;\n}\npublic void setV1(int v1) {\nthis.v1 = v1;\n}\n}\n```\n\
  \n现在，即使私有实例变量 `v1` 不能从外部直接访问，它也可以通过公共方法 `getV1()` 和 `setV1()` 间接访问。请考虑另一个测试类，如清单\
  \ 8-10 所示。\n\n```\n// AccessLevelTest2.java\npackage com.jdojo.cls.p1;\nimport com.jdojo.cls.AccessLevel;\n\
  public class AccessLevelTest2 {\npublic static void main(String[] args) {\nAccessLevel\
  \ al = new AccessLevel();\n//int a = al.v1; /* 编译时错误 */\n//int b = al.v2; /* 编译时错误\
  \ */\n//int c = al.v3; /* 编译时错误 */\nint d = al.v4;\nSystem.out.println(\"d = \"\
  \ + d);\n//al.m1(); /* 编译时错误 */\n//al.m2(); /* 编译时错误 */\n//al.m3(); /* 编译时错误 */\n\
  al.m4();\n/* 修改实例变量的值 */\n//al.v2 = 20;  /* 编译时错误 */\n//al.v3 = 30;  /* 编译时错误 */\n\
  al.v4 = 40;\nSystem.out.println(\"修改 v4 之后...\");\n//al.m2();  /* 编译时错误 */\n//al.m3();\
  \  /* 编译时错误 */\nal.m4();\n}\n}\nd = 400\nInside m4():\nv1 = 100, v2 = 200, v3 =\
  \ 300, v4 = 400\n修改 v4 之后...\nInside m4():\nv1 = 100, v2 = 200, v3 = 300, v4 = 40\n\
  清单 8-10.\n与 AccessLevel 类位于不同包中的测试类\n```\n\n\n\n请注意 `com.jdojo.cls.p1` 包中的 `AccessLevelTest2`\
  \ 类，它不同于 `AccessLevel` 类所在的 `com.jdojo.cls` 包。`AccessLevelTest2` 类的代码与 `AccessLevelTest1`\
  \ 类相似，只是大部分语句已被注释掉。请注意，这里使用了 import 语句从 `com.jdojo.cls` 包中导入 `AccessLevel` 类，以便你可以在\
  \ `main()` 方法中使用其简单名称。在 `AccessLevelTest1` 类中，由于它们位于同一个包中，因此无需导入 `AccessLevel` 类。`AccessLevelTest2`\
  \ 类只能访问 `AccessLevel` 类的公有成员，因为它与 `AccessLevel` 类位于不同的包中。这就是未注释的语句仅能访问公有实例变量 `v4`\
  \ 和 `public` 方法 `m4()` 的原因。请注意，即使只有 `v4` 实例变量是可访问的，你仍然可以通过公有方法 `m4()` 间接访问 `v1`、`v2`\
  \ 和 `v3` 的值。\n\n现在考虑一个更棘手的情况。请参见清单 8-11。\n\n```\n// AccessLevel2.java\npackage com.jdojo.cls;\n\
  class AccessLevel2 {\npublic static int v1 = 600;\n}\n清单 8-11. 一个具有包级访问权限且包含公有实例变量的类\n\
  ```\n\n请注意，`AccessLevel2` 类没有使用任何访问级别修饰符，因此默认具有包级访问权限。也就是说，`AccessLevel2` 类只能在 `com.jdojo.cls`\
  \ 包内被访问。`AccessLevel2` 类很简单，它只声明了一个成员，即 `public static` 变量 `v1`。\n\n现在考虑清单 8-12\
  \ 中所示的 `AccessLevelTest3` 类，它与 `AccessLevel2` 类位于不同的包中。\n\n```\n// AccessLevelTest3.java\n\
  package com.jdojo.cls.p1;\nimport com.jdojo.cls.AccessLevel2; // 编译时错误\npublic class\
  \ AccessLevelTest3 {\npublic static void main(String[] args) {\nint a = AccessLevel2.v1;\
  \ // 编译时错误\n}\n}\n清单 8-12. 一个尝试访问具有包级访问权限的类的公有成员的测试类\n```\n\n`AccessLevelTest3`\
  \ 类尝试访问 `AccessLevel2` 类的公有静态变量 `v1`，这会产生一个编译时错误。我难道没说过具有公有访问级别的类成员可以从任何地方访问吗？是的，我说过。但关键在于——一个公有类成员只有在类本身可访问时，才能从任何地方被访问。在本节开头，我用房子和厨房做过一个类比。如果你错过了那个类比，我们再来一个。\n\
  \n假设你口袋里有一些钱，并且你声明你的钱是公有的。因此，任何人都可以拿你的钱。然而，你把自己藏起来，这样就没有人能接触到你了。除非别人先能接触到你的本人，否则他们怎么能拿到你的钱呢？`AccessLevel2`\
  \ 类及其公有静态变量 `v1` 就是这种情况。将 `AccessLevel2` 类比作你自己，将其公有静态变量 `v1` 比作你的钱。`AccessLevel2`\
  \ 类具有包级访问权限，因此只有其包（`com.jdojo.cls`）内的代码才能访问它的名称。它的静态变量 `v1` 具有公有访问级别，这意味着任何代码都可以从任何包中访问它。静态变量\
  \ `v1` 属于 `AccessLevel2` 类。除非 `AccessLevel2` 类本身是可访问的，否则即使 `v1` 被声明为公有，也无法被访问。\n\
  \n清单 8-12 中的 `import` 语句也会产生编译时错误，原因在于 `AccessLevel2` 类在其包 `com.jdojo.cls` 之外是不可访问的。\n\
  \n提示\n\n你必须同时考虑类及其成员的访问级别，才能确定类成员是否可访问。类成员的访问级别可能使其对程序的某一部分可访问。但是，只有当该成员所属的类本身也是可访问的时，程序的该部分才能访问该类成员。\n\
  \n访问级别：案例研究\n\n一个类成员可以具有四种访问级别之一：`private`、`protected`、`public` 或包级访问。应该对类成员使用哪种访问级别？答案取决于成员类型及其用途。让我们讨论一个银行账户的例子。假设你创建了一个名为\
  \ `Account` 的类来表示银行账户，如下所示：\n\n```\n// Account.java\npackage com.jdojo.cls;\npublic\
  \ class Account {\npublic double balance;\n}\n```\n\n银行账户保存账户中的余额。这个 `Account` 类正是这样做的。在现实世界中，银行账户可以保存更多信息，例如账号、账户持有人姓名、地址等。让我们保持\
  \ `Account` 类简单，以便你可以专注于访问级别的讨论。它允许每个实例在其 `balance` 实例变量中保存一个数值。如果你想创建 `Account`\
  \ 类的一个实例并操作其余额，代码将如下所示：\n\n```\n// 创建一个账户对象\nAccount ac = new Account();\n// 将余额更改为\
  \ 1000.00\nac.balance = 1000.00;\n// 将余额更改为 550.29\nac.balance = 550.29;\n```\n\n\
  这段代码可以在 Java 应用程序中任何可以访问 `Account` 类的地方执行，因为 `Account` 类及其 `balance` 实例变量都是公有的。然而，在现实世界中，没有人会允许他的银行账户被这样操作。例如，银行可能要求你的账户最低余额为零。使用这种实现方式，没有什么能阻止你执行以下语句，该语句会将账户余额减少为负数：\n\
  \n```\n// 设置负余额\nac.balance = -440.67;\n```\n\n在面向对象编程中，经验法则是，定义对象状态的信息应声明为私有。一个类的所有实例变量构成了该类对象的状态。因此，它们应该被声明为\
  \ `private`。如果类外部的代码需要访问私有实例变量，则应通过提供方法来间接授予访问权限。该方法应具有适当的访问级别，只允许预期的客户端代码访问它。让我们将\
  \ `balance` 实例变量声明为私有。修改后的 `Account` 类代码如下：\n\n```\n// Account.java\npackage com.jdojo.cls;\n\
  public class Account {\nprivate double balance;\n}\n```\n\n使用修改后的 `Account` 类，如果\
  \ `Account` 类是可访问的，你可以在 Java 应用程序中的任何地方创建 `Account` 类的对象，如下所示：\n\n```\n// 创建一个账户对象\n\
  Account ac = new Account();\n```\n\n但是，除非你在 `Account` 类本身内部编写代码，否则你无法访问 `Account`\
  \ 对象的 `balance` 实例变量。以下代码只有在 `Account` 类内部编写时才有效，因为私有实例变量 `balance` 无法从 `Account`\
  \ 类外部访问：\n\n```\n// 更改余额\nac.balance = 188.37;\n```\n\n\n\n修改后的 `Account` 类形式上是不可接受的，因为虽然你可以创建一个账户，但无法读取或操作其余额。`Account`\
  \ 类必须提供某种接口，让外部世界能够以受控的方式访问和操作其余额。例如，如果你有钱并想与外界分享，你不会把钱展示给所有人并让他们直接拿走。相反，任何想要你钱的人都需要向你请求（给你发送消息），然后你根据特定情况把钱给他。换句话说，钱是你的私有财产，你通过让他们向你请求钱，而不是让他们直接从你口袋里拿钱，来让他们以受控的方式访问它。类似地，你希望其他人能够查看账户余额、向账户存入资金以及从账户扣除资金。然而，所有这些操作都应该通过一个\
  \ `Account` 对象发生，而不是直接操作账户对象的余额。\n\nJava 允许你通过实例方法向对象发送消息。一个对象可以从外界接收消息，并且根据其内部状态对同一条消息做出不同的响应。例如，当你所有的钱都花光了，有人向你要钱时，你可以回应说没有钱。然而，当你有钱时，你对同一条消息（给我钱）的回应方式（把钱给他）就不同了。\n\
  \n让我们在 `Account` 类中声明三个公共方法，它们将作为与外界交互的接口，供那些需要访问和操作账户余额的人使用。\n\n*   `getBalance()`\
  \ 方法将返回账户的余额。\n*   `credit()` 方法将向账户存入指定金额。\n*   `debit()` 方法将从账户取出指定金额。\n\n`credit()`\
  \ 和 `debit()` 方法在交易成功时返回 1，交易失败时返回 -1。\n\n清单 8-13 展示了修改后的 `Account` 类的代码。\n\n```\n\
  // Account.java\npackage com.jdojo.cls;\npublic class Account {\nprivate double\
  \ balance;\npublic double getBalance() {\n// 返回此账户的余额\nreturn this.balance;\n}\n\
  public int credit(double amount) {\n// 确保存入金额不为负数、NaN 或无穷大\nif (amount < 0.0 ||\
  \ Double.isNaN(amount) || Double.isInfinite(amount)) {\nSystem.out.println(\"无效的存入金额:\
  \ \" + amount);\nreturn -1;\n}\n// 存入金额\nSystem.out.println(\"存入金额: \" + amount);\n\
  this.balance = this.balance + amount;\nreturn 1;\n}\npublic int debit(double amount)\
  \ {\n// 确保取出金额不为负数、NaN 或无穷大 */\nif (amount < 0.0 || Double.isNaN(amount) || Double.isInfinite(amount))\
  \ {\nSystem.out.println(\"无效的取出金额: \" + amount);\nreturn -1;\n}\n// 确保维持最低余额为零\n\
  if (this.balance < amount) {\nSystem.out.println(\"资金不足。尝试取出: \" + amount);\nreturn\
  \ -1;\n}\n// 取出金额\nSystem.out.println(\"取出金额: \" + amount);\nthis.balance = this.balance\
  \ - amount;\nreturn 1;\n}\n}\n清单 8-13.\n包含私有实例变量和公共方法的 Account 类修改版本\n```\n\n该类包含一个私有实例变量。它包含一些公共方法，允许外界访问和修改这个私有实例变量。这些公共方法就像私有实例变量的保护层。它们让外界能够以受控的方式读取或修改私有实例变量。例如，你不能存入负数金额，并且必须维持最低余额为零。让我们测试一下\
  \ `Account` 类。测试代码如清单 8-14 所示。\n\n```\n// AccountTest.java\npackage com.jdojo.cls;\n\
  public class AccountTest {\npublic static void main(String[] args) {\nAccount ac\
  \ = new Account();\ndouble balance = ac.getBalance();\nSystem.out.println(\"余额 =\
  \ \" + balance);\n// 存入和取出一些金额\nac.credit(234.78);\nac.debit(100.12);\nbalance =\
  \ ac.getBalance();\nSystem.out.println(\"余额 = \" + balance);\n// 尝试存入和取出无效金额\nac.credit(-234.90);\n\
  ac.debit(Double.POSITIVE_INFINITY);\nbalance = ac.getBalance();\nSystem.out.println(\"\
  余额 = \" + balance);\n// 尝试取出超过余额的金额\nac.debit(2000.00);\nbalance = ac.getBalance();\n\
  System.out.println(\"余额 = \" + balance);\n}\n}\n余额 = 0.0\n存入金额: 234.78\n取出金额: 100.12\n\
  余额 = 134.66\n无效的存入金额: -234.9\n无效的取出金额: Infinity\n余额 = 134.66\n资金不足。尝试取出: 2000.0\n\
  余额 = 134.66\n清单 8-14.\n用于测试 Account 类行为的测试类\n```\n\n`AccountTest` 类创建了一个 `Account`\
  \ 类的对象，并使用其公共方法对其尝试各种操作。输出中显示了结果，这表明这是一个改进后的 `Account` 类，它保护账户对象免于被错误操作。你还可以注意到，将实例变量设为私有并通过公共方法允许访问它们，可以让你强制执行业务规则。如果你暴露了实例变量，就无法强制执行任何控制其有效值的业务规则，因为任何人都可以不受限制地修改它。\n\
  \n在设计类时，需要牢记的一个重要点是可维护性。将所有实例变量保持为私有，并通过公共方法允许访问它们，可以使你的代码为未来的变更做好准备。假设你最初为账户设定了最低余额为零。你已经将\
  \ `Account` 类部署到生产环境中，并且它在应用程序的许多地方被使用。现在，你想实施一条新的业务规则，规定每个账户必须保持最低余额为 100。进行这项更改很容易。只需更改\
  \ `debit()` 方法的代码即可。你无需对调用 `Account` 类 `debit()` 方法的客户端代码进行任何更改。请注意，要完全强制执行最低余额为\
  \ 100 的规则，你还需要对 `Account` 类进行更多工作。当创建账户时，余额默认为零。要在创建账户时强制执行这条新的最低余额规则，你需要了解类的构造函数。我将在下一章讨论构造函数。\n\
  \n对于 `Account` 类中 `balance` 实例变量的访问级别，另一种选择是赋予它包级访问权限。回想一下，包级访问权限是通过在类成员声明中不使用任何访问修饰符来赋予的。如果\
  \ `balance` 实例变量具有包级访问权限，这比赋予它 `public` 访问权限要好一些，因为它并非随处可访问。然而，它仍然可以被与 `Account`\
  \ 类声明在同一个包内的代码直接访问和操作。到目前为止，你应该明白，让任何代码从 `Account` 类外部直接访问 `balance` 实例变量是不可接受的。此外，如果你将\
  \ `Account` 类的方法声明为包级访问权限，那么它只能在与 `Account` 类声明相同的包内使用。你希望 `Account` 类的对象能够通过其方法在应用程序的任何地方被操作。因此，你不能将\
  \ `Account` 类的方法或实例变量声明为包级访问权限。那么，什么时候应该将类和/或类成员声明为包级访问权限呢？通常，当一个类需要作为包内其他类的辅助类或内部实现时，会为其及其成员使用包级访问权限。\n\
  \n\n\n什么时候对类成员使用私有访问级别？你已经看到了在 `Account` 类中使用 `private` 实例变量的好处。实例变量的私有访问级别提供了数据隐藏，保护对象的内部状态免受外部访问。类的实例方法定义了其对象的行为。如果一个方法仅在类内部使用，且外部代码无需知晓，那么该方法应具有私有访问级别。让我们回到你的\
  \ `Account` 类。你使用了相同的逻辑来验证传递给 `credit()` 和 `debit()` 方法的金额。你可以将验证金额的代码移动到一个私有方法\
  \ `isValidAmount()` 中，该方法由 `Account` 类内部使用。它检查用于存款或取款的金额是否为负数、`NaN` 或无穷大。这三个判断数字是否有效的标准仅适用于\
  \ `Account` 类，其他类无需使用它们。这就是为什么你需要将此方法声明为私有。将其声明为私有还有另一个好处。将来，你可能会制定一条规则，即任何账户必须至少存入或取出\
  \ 10。届时，你只需更改私有的 `isValidAmount()` 方法即可完成修改。如果你将此方法设为公有，它将影响所有使用它来验证金额的客户端代码。你可能不希望全局更改有效金额的标准。为了在业务规则变化时将更改的影响局限在类内部，你必须将方法实现为私有。你可以在\
  \ `Account` 类中实现此逻辑，如下所示（仅显示更改的代码）：\n\n```\n// Account.java\npackage com.jdojo.cls;\n\
  public class Account {\n/* 其他代码在此 */\npublic int credit(double amount) {\n// 确保存款金额有效\n\
  if (!this.isValidAmount(amount, \"credit\")) {\nreturn -1;\n}\n/* 其他代码在此 */\n}\n\
  public int debit(double amount) {\n// 确保取款金额有效\nif (!this.isValidAmount(amount,\
  \ \"debit\")) {\nreturn -1;\n}\n/* 其他代码在此 */\n}\n// 使用私有方法验证存款/取款金额\nprivate boolean\
  \ isValidAmount(double amount, String operation) {\n// 确保金额不是负数、NaN 或无穷大\nif (amount\
  \ < 0.0 || Double.isNaN(amount) || Double.isInfinite(amount)) {\nSystem.out.println(\"\
  无效的 \" + operation + \" 金额: \" + amount);\nreturn false;\n}\nreturn true;\n}\n}\n\
  ```\n\n请注意，你可能已经使用以下逻辑以更简单的方式实现了 `credit()` 方法（以及 `debit()` 方法）：\n\n```\nif (amount\
  \ >= 0)  {\nthis.balance = this.balance + amount;\nreturn 1;\n} else {\n/* 在此处打印错误\
  \ */\nreturn –1;\n{\n```\n\n你可以使用更简单的逻辑来实现 `credit()` 方法，该方法检查金额是否有效，而不是检查金额是否无效。我没有使用此逻辑，因为我想在同一个示例中演示如何使用私有方法。有时，为了在讨论中阐明观点，人们会编写更多的代码。\n\
  \n现在剩下的是受保护访问级别修饰符。什么时候将类成员声明为受保护？具有受保护访问级别的类成员可以在同一个包和子类中访问，即使子类不在同一个包中。我将在第 20\
  \ 章中讨论如何创建子类以及受保护访问级别的使用。\n\n什么是可变参数方法？\n\n术语“var-args”是“variable-length arguments”（可变长度参数）的缩写。它允许你声明一个接受可变数量参数（或形参）的方法或构造器。在本讨论中，我仅使用术语“方法”。然而，该讨论也适用于构造器。\n\
  \n方法接受的参数数量称为其元数（arity）。接受可变长度参数的方法称为可变元数方法或可变参数方法。可变参数方法长什么样？在查看可变参数方法之前，我们先讨论非可变参数方法是如何工作的。\n\
  \n考虑以下 `MathUtil` 类的代码，它声明了一个 `max()` 方法。该方法有两个参数。它计算并返回两个参数中的最大值。\n\n```\npublic\
  \ class MathUtil {\npublic static int max(int x, int y) {\nint max = x;\nif (y >\
  \ max) {\nmax = y;\n}\nreturn max;\n}\n}\n```\n\n`MathUtil` 类或其 `max()` 方法并没有什么特别之处。假设你想计算两个整数（例如\
  \ 12 和 18）的最大值，你可以像下面这样调用 `max()` 方法：\n\n```\nint max = MathUtil.max(12, 18);\n\
  ```\n\n当这条语句执行时，18 将被赋值给变量 `max`。假设你想计算三个整数的最大值。你可能会想出以下逻辑：\n\n```\nint max = MathUtil.max(MathUtil.max(70,\
  \ 9), 30);\n```\n\n这个逻辑运行良好。它先计算两个整数的最大值，然后再计算该最大值与第三个整数的最大值。假设你想计算十个整数的最大值。你可以重复这个逻辑，它也能工作，尽管代码可能不易读。你需要一种更好的方法来实现这一点。\n\
  \n现在尝试重载 `max()` 方法，使其接受三个整数参数。以下是 `MathUtil` 类的新版本，称为 `MathUtil2`：\n\n```\npublic\
  \ class MathUtil2 {\npublic static int max(int x, int y) {\nint max = x;\nif (y\
  \ > max) {\nmax = y;\n}\nreturn max;\n}\npublic static int max(int x, int y, int\
  \ z) {\nint max = x;\nif (y > max) {\nmax = y;\n}\nif (z > max) {\nmax = z;\n}\n\
  return max;\n}\n}\n```\n\n你可以像下面这样计算两个和三个整数的最大值：\n\n```\nint max1 = MathUtil2.max(12,\
  \ 18);\nint max2 = MathUtil2.max(10, 8, 18);\n```\n\n添加一个带有三个 `int` 参数的 `max()`\
  \ 方法暂时解决了问题。但真正的问题仍然存在。你将不得不为所有可能的整数参数数量添加 `max()` 方法。你会同意，没有程序员想编写一个需要不断添加新版本的\
  \ `max()` 方法。\n\n在 Java 引入可变参数方法之前，当设计时不知道方法的参数数量时，你会将方法参数声明为 `int` 数组，如下所示。我将在后面的章节中详细讨论数组。\n\
  \n```\npublic class MathUtil3 {\npublic static int max(int[] num) {\n/* 必须在此处检查\
  \ num 中是否有零个元素 */\nint max = Integer.MIN_VALUE;\nfor(int i = 0; i < num.length;\
  \ i++) {\nif(num[i] > max) {\nmax = num[i];\n}\n}\nreturn max;\n}\n}\n```\n\n你可以编写以下代码片段，使用\
  \ `MathUtil3.max()` 方法计算两个和三个整数的最大值：\n\n```\nint[] num1 = new int[] {10, 1};\nint\
  \ max1 = MathUtil3.max(num1);\nint[] num2 = new int[] {10, 8, 18} ;\nint max2 =\
  \ MathUtil3.max(num2);\n```\n\n你可以向 `MathUtil3.max()` 方法传递任意数量的整数。从某种意义上说，你有一种方法可以向方法传递任意数量的参数。让程序员困扰的是，当参数类型是数组时，调用该方法的方式。当你需要使用数组参数调用方法时，你必须创建一个数组对象并打包其所有元素的值。这里的问题不在于\
  \ `max(int[] num)` 方法内部的代码，而在于调用该方法的客户端代码。\n\n\n\n可变参数（Var-args）应运而生。让我们声明一个 `max()`\
  \ 方法，它可以接受任意数量的整数参数，包括零个参数。可变参数方法的妙处在于调用它的客户端代码更加简洁。那么，如何声明一个可变参数方法呢？你只需在方法参数的数据类型后面加上省略号（或三个点，如\
  \ `...`）。下面的代码片段展示了 `max()` 方法的声明，它有一个可变长度参数 `num`，其数据类型为 `int`。请注意省略号放置在数据类型 `int`\
  \ 之后。\n\n```\npublic static int max(int... num) {\n// 代码写在这里\n}\n```\n\n在省略号前后添加空格是可选的。以下所有可变参数方法的声明都是有效的。它们在省略号前后使用了不同类型的空格。\n\
  \n```\npublic static int max(int... num)  // 后面有一个空格\npublic static int max(int\
  \ ... num) // 前后各有一个空格\npublic static int max(int...num)   // 前后都没有空格\npublic static\
  \ int max(int ...\nnum) // 前面有一个空格，后面换行\n```\n\n一个可变参数方法可以有多个参数。下面的代码片段显示 `aMethod()`\
  \ 接受三个参数，其中一个是可变长度参数：\n\n```\npublic static int aMethod(String str, double d1, int...num)\
  \ {\n// 代码写在这里\n}\n```\n\n可变参数方法有两个限制：\n\n*   一个可变参数方法最多只能有一个可变长度参数。下面 `m1()` 方法的声明是无效的，因为它声明了两个可变长度参数\
  \ `n1` 和 `n2`：\n\n```\n    // 无效声明\n    void m1(String str, int...n1, int...n2)\
  \ {\n    // 代码写在这里\n    }\n    ```\n\n*   可变参数方法的可变长度参数必须是参数列表中的最后一个参数。下面 `m2()`\
  \ 方法的声明是无效的，因为可变长度参数 `n1` 没有被声明为最后一个参数：\n\n```\n    // 无效声明\n    void m2(int...n1,\
  \ String str) {\n    // 代码写在这里\n    }\n    ```\n\n你可以通过将参数 `n1` 移到最后来修正之前的声明，如下所示：\n\
  \n```\n    // 有效声明\n    void m2(String str, int...n1) {\n    // 代码写在这里\n    }\n\
  \    ```\n\n让我们重写 `max()` 方法，使其成为一个可变参数方法，如下所示：\n\n```\npublic class MathUtil4 {\n\
  public static int max(int...num) {\nint max = Integer.MIN_VALUE;\nfor(int i = 0;\
  \ i  max) {\nmax = num[i];\n}\n}\nreturn max;\n}\n}\n```\n\n在可变参数方法内部，你几乎总是会有一个循环来处理可变长度参数的参数列表。`length`\
  \ 属性会告诉你为可变长度参数传递了多少个值。例如，在 `max()` 可变参数方法中，`num.length` 会告诉你传递给该方法有多少个整数。要获取可变长度参数中的第\
  \ n 个值，你需要使用 `varArgsName[n-1]`。例如，`num[0]`、`num[1]` 和 `num[n-1]` 将分别包含传递给 `num`\
  \ 可变长度参数的第一个、第二个和第 n 个值。如果你只想处理传递给可变长度参数的所有值，可以使用更简单的循环，即 `foreach` 循环。你可以使用 `foreach`\
  \ 循环重写 `max()` 方法的代码如下：\n\n```\npublic static int max2(int...num) {\nint max = Integer.MIN_VALUE;\n\
  for(int currentNumber : num) {\nif (currentNumber > max) {\nmax = currentNumber;\n\
  }\n}\nreturn max;\n}\n```\n\n`MathUtil4.max()` 方法的主体与将 `num` 参数声明为 `int` 数组时相同。你这样想是对的。Java\
  \ 编译器使用数组来实现可变长度参数。编译器会更改 `MathUtil4.max()` 方法之前的声明。当你编译代码时，声明部分 `max(int…num)`\
  \ 会被更改为 `max(int[] num)`。使用可变长度参数有什么好处呢？在方法中使用可变长度参数的好处在于调用方法的优雅方式。你可以像下面这样调用 `MathUtil4.max()`\
  \ 方法：\n\n```\nint max1 = MathUtil4.max(12, 8);\nint max2 = MathUtil4.max(10, 1,\
  \ 30);\n```\n\n你可以为方法中的可变长度参数使用零个或多个参数。以下代码是对 `max()` 方法的有效调用：\n\n```\nint max =\
  \ MathUtil4.max(); // 不传递参数也是可以的\n```\n\n调用不带参数的 `MathUtil4.max()` 方法会返回什么？如果你查看方法体，它会返回\
  \ `Integer.MIN_VALUE`，即 `-2147483648`。实际上，调用 `max()` 方法时如果至少没有两个参数，就不是有效的调用。当方法是可变参数方法时，你必须检查参数数量是否无效。对于非可变参数方法，你不会遇到参数数量无效的问题，因为编译器会强制你使用精确数量的参数。下面\
  \ `max()` 方法的声明将强制其调用者至少传递两个整数：\n\n```\n// 参数 n1 和 n2 是必需的\npublic static int max(int\
  \ n1, int n2, int... num) {\n// 代码写在这里\n}\n```\n\n编译器会将前两个参数 `n1` 和 `n2` 视为必需参数，将第三个参数\
  \ `num` 视为可选参数。现在，你可以向 `max()` 方法传递两个或更多整数。清单 8-15 展示了 `max()` 方法的最终完整代码。\n\n```\n\
  // MathUtil5.java\npackage com.jdojo.cls;\npublic class MathUtil5 {\npublic static\
  \ int max(int n1, int n2, int... num) {\n// 将 max 初始化为 n1 和 n2 中的最大值\nint max =\
  \ (n1 > n2 ? n1 : n2);\nfor(int i = 0; i  max) {\nmax = num[i];\n}\n}\nreturn max;\n\
  }\npublic static void main(String[] args) {\nSystem.out.println(\"max(7, 9) = \"\
  \ + MathUtil5.max(7, 9));\nSystem.out.println(\"max(70, 19, 30) = \" + MathUtil5.max(70,\
  \ 19, 30));\nSystem.out.println(\"max(-7, -1, 3) = \" + MathUtil5.max(-70, -1, 3));\n\
  }\n}\nmax(7, 9) = 9\nmax(70, 19, 30) = 70\nmax(-7, -1, 3) = 3\n清单 8-15.\n一个使用可变参数方法计算指定整数最大值的工具类\n\
  ```\n\n当你调用 `MathUtil5.max()` 方法时，可以传递任意数量的整数。以下所有语句都是有效的：\n\n```\nint max1 = MathUtil5.max(12,\
  \ 8);        // 将 12 赋值给 max1\nint max2 = MathUtil5.max(10, 1, 30);    // 将 30 赋值给\
  \ max2\nint max3 = MathUtil5.max(11, 3, 7, 37); // 将 37 赋值给 max3\n```\n\n如果你不带参数或只带一个参数调用\
  \ `MathUtil5.max()` 方法，编译器将生成错误。\n\n```\nint max1 = MathUtil5.max();   // 编译时错误\n\
  int max2 = MathUtil5.max(10); // 编译时错误\n```\n\n重载可变参数方法\n\n相同的方法重载规则也适用于可变参数方法。只要方法的参数在类型、顺序或数量上不同，你就可以重载带有可变长度参数的方法。例如，以下是重载\
  \ `max()` 方法的一个有效示例：\n\n```\npublic class MathUtil6 {\npublic static int max(int\
  \ x, int y) {\n// 代码写在这里\n}\npublic static int max(int...num) {\n// 代码写在这里\n}\n\
  }\n```\n\n考虑下面的代码片段，它使用两个参数调用了重载方法 `MathUtil6.max()`：\n\n```\nint max = MathUtil6.max(12,\
  \ 13); // 会调用哪个 max()？\n```\n\n\n\n`MathUtil6`类有两个`max()`方法。一个方法接受两个`int`参数，另一个接受可变长度的`int`参数。在这种情况下，Java\
  \ 将调用 `max(int x, int y)`。Java 首先尝试查找与参数数量完全匹配的方法声明。如果找不到完全匹配，它会查找使用可变长度参数的匹配。\n\
  \n提示\n\n如果可变参数方法被重载，Java 会使用更具体的版本，而不是使用可变参数方法。Java 将可变参数方法作为解析方法调用的最后手段。\n\n有时，对重载的可变参数方法的调用可能会让\
  \ Java 编译器感到困惑。方法本身的重载可能是有效的。然而，对它的调用可能会引起问题。考虑以下 `MathUtil7` 类的代码片段，这是一个有效的方法重载示例：\n\
  \n```\npublic class MathUtil7 {\npublic static int max(int...num) {\n// 代码写在这里\n\
  }\npublic static double max(double...num) {\n// 代码写在这里\n}\n}\n```\n\n当执行以下语句时，将调用哪个版本的\
  \ `max()` 方法？\n\n```\nint max = MathUtil7.max(); // 调用哪个 max()？\n```\n\n前面的语句将生成一个编译时错误，指出对\
  \ `MathUtil7.max()` 的调用存在歧义。Java 允许你为可变长度参数传递零个或多个值。在前面的语句中，`max(int...num)` 和 `max(double...num)`\
  \ 这两个方法都符合 `MathUtil7.max()` 调用的条件。编译器无法决定调用哪一个。你可能会发现许多其他实例，其中对重载的可变参数方法的调用会导致歧义的方法调用，并且编译器会生成错误。错误消息将引导你找到有问题的代码。\n\
  \n可变参数方法与 main() 方法\n\n回想一下，如果你想运行一个类，你需要在其中声明一个 `main()` 方法，并以一个 `String` 数组作为其参数。`main()`\
  \ 方法的签名必须是 `main(String[] args)`。可变参数方法由编译器使用数组实现。如果你的方法签名是 `m1(Xxx…args)`，编译器会将其更改为\
  \ `m1(Xxx[] args)`。现在，你可以使用旧的表示法（使用 `String` 数组）或新的表示法（使用可变参数）来声明你的类的 `main()` 方法。以下为\
  \ `Test` 类声明的 `main()` 方法是有效的。你将能够使用 `java` 命令运行 `Test` 类。\n\n```\npublic class\
  \ Test {\npublic static void main(String...args)  {\nSystem.out.println(\"Hello\
  \ from varargs main()...\");\n}\n}\n```\n\n参数传递机制\n\n本节讨论在不同编程语言中使用的向方法传递参数的不同方式。本节不讨论任何\
  \ Java 特有的内容。本节中使用的语法或符号可能不被 Java 支持。本节对于程序员理解方法调用过程中的内存状态很重要。如果你是一位经验丰富的程序员，可以跳过本节。下一节将讨论\
  \ Java 中的参数传递机制。\n\n以下是向方法传递参数的一些常用机制：\n\n*   传值调用\n*   传常量值调用\n*   传引用调用\n*   传引用值调用\n\
  *   传结果调用\n*   传结果值调用\n*   传名调用\n*   传需求调用\n\n一个变量包含三个组成部分：名称、内存地址（或位置）和数据。变量的名称是在程序中用于引用其内存地址的逻辑名称。数据存储在与变量名关联的内存地址处。存储在内存地址处的数据也称为变量的值。假设你有一个名为\
  \ `id` 的 `int` 变量，其值为 `785`，存储在内存地址 `131072` 处。你可以按如下方式声明并初始化 `id` 变量：\n\n```\n\
  int id = 785;\n```\n\n你可以将变量名、其内存地址以及存储在该内存地址处的数据之间的关系可视化，如图 8-2 所示。\n\n![A323069_2_En_8_Fig2_HTML.gif](img/A323069_2_En_8_Fig2_HTML.gif)\n\
  \n图 8-2.\n\n变量名、其内存地址和数据之间的关系\n\n在图 8-2 中，你看到变量 `id` 的实际数据存储在内存地址处。你也可以在内存地址处存储数据，该数据不是变量的实际值；而是存储实际值的位置的内存地址。在这种情况下，存储在第一个内存地址处的值是对存储在另一个内存地址处的实际数据的引用，这样的值被称为引用或指针。如果一个变量存储了对某些数据的引用，它被称为引用变量。\n\
  \n对比“变量”和“引用变量”这两个短语。变量在其内存位置存储实际数据本身。引用变量存储实际数据的引用（或内存地址）。图 8-3 描述了变量和引用变量之间的区别。\n\
  \n![A323069_2_En_8_Fig3_HTML.gif](img/A323069_2_En_8_Fig3_HTML.gif)\n\n图 8-3.\n\n\
  变量和引用变量之间的区别\n\n在图 8-3 中，`idRef` 是一个引用变量，`id` 是一个变量。两个变量被分别分配了内存。`785` 的实际值存储在 `id`\
  \ 变量的内存位置 `131072` 处。然而，`idRef` 的内存位置 (`262144`) 存储了 `id` 变量的地址（或存储 `785` 的地址或内存位置）。你可以使用任一变量在内存中获取值\
  \ `785`。获取引用变量所引用的实际数据的操作称为解引用。\n\n方法（在某些编程语言中也称为函数或过程）可以选择性地从其调用者处接受参数。方法的参数允许在调用者上下文和方法上下文之间共享数据。实践中存在许多向方法传递参数的机制。以下各节讨论了一些常用的参数传递机制。\n\
  \n传值调用\n\n传值调用是最容易理解的参数传递机制。然而，它并不一定在所有情况下都是最高效或最容易实现的。当调用一个方法时，实际参数的值被复制到形式参数中。当方法开始执行时，内存中存在该值的两个副本：一个副本用于实际参数，另一个副本用于形式参数。在方法内部，形式参数操作其自身的值副本。对形式参数值所做的任何更改都不会影响实际参数的值。\n\
  \n图 8-4 描述了使用传值调用机制调用方法时的内存状态。需要强调的是，一旦形式参数获得其值（即实际参数的副本），这两个参数就彼此无关了。形式参数在方法调用结束时被丢弃。然而，实际参数在方法调用结束后仍保留在内存中。实际参数在内存中保留多长时间取决于实际参数的上下文。\n\
  \n![A323069_2_En_8_Fig4_HTML.gif](img/A323069_2_En_8_Fig4_HTML.gif)\n\n图 8-4.\n\n\
  调用方法时实际参数和形式参数的内存状态\n\n考虑以下 `increment()` 方法的代码，它接受一个 `int` 参数并将其增加 `2`：\n\n```\n\
  // 假设 num 是按值传递的\nvoid increment(int num) {\n/* #2 */\nnum = num + 2;\n/* #3 */\n\
  }\n```\n\n假设你使用以下代码片段调用 `increment()` 方法：\n\n```\nint id = 57;\n/* #1 */\nincrement(id);\n\
  /* #4 */\n```\n\n\n\n代码中的四个执行点分别标记为 #1、#2、#3 和 #4。表 8-4 描述了在调用 `increment()` 方法之前、之后以及调用过程中，实际参数和形式参数的内存状态。请注意，在\
  \ #4 处，形式参数 `num` 已不再存在于内存中。\n\n表 8-4.\n\n当调用 increment() 方法且参数按值传递时，实际参数与形式参数的内存状态描述\n\
  \n执行点\n |\n 实际参数 id 的内存状态\n |\n 形式参数 num 的内存状态\n |\n\n| --- | --- | --- | --- |\
  \ --- | --- | --- |\n\n`#1`\n |\n  `id` 变量存在于内存中，其值为 57。\n |\n  此时 `num` 变量不存在。\n\
  \ |\n\n`#2`\n |\n  `id` 变量存在于内存中，其值为 57。\n |\n  形式参数 `num` 已在内存中创建。实际参数 `id` 的值已被复制到与\
  \ `num` 变量关联的地址中。此时，`num` 的值为 57。\n |\n\n`#3`\n |\n  `id` 变量存在于内存中，其值为 57。\n |\n\
  \  此时，`num` 的值为 59。\n |\n\n`#4`\n |\n  `id` 变量存在于内存中，其值为 57。\n |\n  此时，形式参数 `num`\
  \ 已不存在于内存中，因为方法调用已结束。\n |\n\n所有局部变量（包括形式参数）在方法调用结束后都会被丢弃。你可以观察到，在 `increment()`\
  \ 方法内部递增形式参数的值实际上毫无用处，因为该值永远无法传回给调用环境。如果你想将一个值传回给调用环境，可以在方法体中使用 `return` 语句来实现。以下是\
  \ `smartIncrement()` 方法的代码，该方法将递增后的值返回给调用者：\n\n```\n// 假设 num 是按值传递的\nint smartIncrement(int\
  \ num) {\nnum = num + 2;\nreturn num;\n}\n```\n\n你需要使用以下代码片段，将从方法返回的递增后的值存储到 `id`\
  \ 变量中：\n\n```\nint id = 57;\nid = smartIncrement(id);  // 将返回的值存储到 id 中\n/* 此时 id\
  \ 的值为 59 */\n```\n\n请注意，按值传递允许你通过多个参数将多个值从调用环境传递给方法。然而，它只允许你从方法中传回一个值。如果仅考虑方法调用中的参数，按值传递是一种单向通信。它允许你通过参数将信息从调用者传递给方法，但不允许你通过参数将信息传回给调用者。有时你可能希望通过参数将多个值从方法传回给调用环境。在这些情况下，你需要考虑向方法传递参数的不同方式。按值传递机制在这种情况下毫无帮助。\n\
  \n当参数按值传递时，用于交换两个值的方法无法生效。考虑以下经典的 `swap()` 方法代码：\n\n```\n// 假设 x 和 y 是按值传递的\nvoid\
  \ swap(int x, int y) {\nint temp = x;\nx = y;\ny = temp;\n}\n```\n\n你可以使用以下代码片段调用上述\
  \ `swap()` 方法：\n\n```\nint u = 75;\nint v = 53;\nswap(u, v);\n/* 此时，u 和 v 仍然分别是\
  \ 75 和 53 */\n```\n\n到现在为止，你应该能明白为什么当 `u` 和 `v` 被传递给 `swap()` 方法时，它们的值没有被交换。当调用\
  \ `swap()` 方法时，`u` 和 `v` 的值分别被复制到了形式参数 `x` 和 `y` 的位置。在 `swap()` 方法内部，形式参数 `x` 和\
  \ `y` 的值被交换了，而实际参数 `u` 和 `v` 的值完全没有被触及。当方法调用结束时，形式参数 `x` 和 `y` 被丢弃。\n\n使用按值传递的优点如下：\n\
  \n*   易于实现。\n\n\n\n*   如果复制的数据是简单值，速度会更快。\n*   实际参数在传递给方法时，不会受到任何副作用的影响。\n\n按值传递的缺点如下：\n\
  \n*   如果实际参数是复杂数据（例如大型对象），即使可能，将数据复制到另一个内存位置也会很困难。\n*   复制大量数据会占用内存空间和时间，这可能会降低方法调用的速度。\n\
  \n按常量值传递\n\n按常量值传递本质上与按值传递的机制相同，区别在于形式参数被视为常量，因此不能在方法体内被修改。实际参数的值会被复制到形式参数，这与按值传递的做法一致。如果参数是按常量值传递的，你只能在方法体内读取形式参数的值。\n\
  \n按引用传递\n\n重要的是，不要混淆“引用”和“按引用传递”这两个术语。“引用”是一段信息（通常是内存地址），用于访问存储在别处的实际数据。“按引用传递”是一种机制，用于通过形式参数将信息从调用者的环境传递给方法。\n\
  \n在按引用传递中，传递的是实际参数的内存地址，并且形式参数会映射（或关联）到实际参数的内存地址。这种技术也称为别名，即多个变量关联到同一个内存位置。形式参数名是实际参数名的别名。当一个人有两个名字时，无论你使用哪个名字，指的都是同一个人。类似地，当参数按引用传递时，无论你在代码中使用哪个名字（实际参数名或形式参数名），你指的都是同一个内存位置，因此也是同一份数据。\n\
  \n在按引用传递中，如果形式参数在方法内部被修改，实际参数会立即看到该修改。图 8-5 描述了当方法的参数按引用传递时，实际参数和形式参数的内存状态。\n\n\
  ![A323069_2_En_8_Fig5_HTML.gif](img/A323069_2_En_8_Fig5_HTML.gif)\n\n图 8-5.\n\n\
  参数按引用传递时实际参数和形式参数的内存状态\n\n许多书籍使用“按引用传递”这个短语。然而，它们指的不是我们在本节讨论的这种。它们实际上指的是“按引用值传递”，我将在下一节讨论。请注意，在按引用传递中，你不会为形式参数分配单独的内存。相反，你只是将形式参数名关联到实际参数的同一个内存位置。\n\
  \n让我们再次执行 `increment()` 方法调用练习。这次，假设 `num` 参数是按引用传递的。\n\n```\n// 假设 num 是按引用传递的\n\
  void increment(int num) {\n/* #2 */\nnum = num + 2;\n/* #3 */\n}\n```\n\n你将使用以下代码片段调用\
  \ `increment()` 方法：\n\n```\nint id = 57;\n/* #1 */\nincrement(id);\n/* #4 */\n```\n\
  \n表 8-5 描述了在 `increment()` 方法调用之前、之后和期间，实际参数和形式参数的内存状态。请注意，在 #4 处，形式参数 `num` 在内存中已不存在，而实际参数\
  \ `id` 在方法调用结束后仍具有值 `59`。\n\n表 8-5.\n\n调用 increment() 方法且参数按引用传递时，实际参数和形式参数的内存状态描述\n\
  \n执行点 | 实际参数 id 的内存状态 | 形式参数 num 的内存状态\n\n| --- | --- | --- |\n\n`#1` | `id` 变量存在于内存中，其值为\
  \ 57。 | `num` 变量此时不存在。 |\n\n`#2` | `id` 变量存在于内存中，其值为 57。 | 形式参数名 `num` 已关联到实际参数\
  \ `id` 的内存地址。此时，`num` 指向值 `57`，与 `id` 指向的值完全相同。 |\n\n`#3` | `id` 变量存在于内存中，其值为 59。在方法内部，你使用了名为\
  \ `num` 的形式参数将值增加了 2。然而，`id` 和 `num` 是同一内存位置的两个名字，因此 `id` 的值也是 59。 | 此时，`num` 持有值\
  \ `59`。 |\n\n`#4` | `id` 变量存在于内存中，其值为 `59`。 | 名为 `num` 的形式参数此时在内存中不存在，因为方法调用已结束。\
  \ |\n\n按引用传递允许调用者环境和被调用方法之间进行双向通信。你可以将多个参数按引用传递给一个方法，并且该方法可以修改所有参数。对形式参数的所有修改都会立即反映回调用者的环境。这允许你在两个环境之间共享多份数据。\n\
  \n经典的 `swap()` 方法示例在其参数按引用传递时有效。考虑以下 `swap()` 方法的定义：\n\n```\n// 假设 x 和 y 是按引用传递的\n\
  void swap(int x, int y) {\nint temp = x;\nx = y;\ny = temp;\n}\n```\n\n你可以使用以下代码片段调用前面的\
  \ `swap()` 方法：\n\n```\nint u = 75;\nint v = 53;\nswap(u, v);\n/* 此时，u 和 v 将分别为 53\
  \ 和 75。 */\n```\n\n考虑以下名为 `getNumber()` 的方法的代码片段：\n\n```\n// 假设 x 和 y 是按引用传递的\n\
  int getNumber(int x, int y) {\nint x = 3;\nint y = 5;\nint sum = x + y;\nreturn\
  \ sum;\n}\n```\n\n假设你按如下方式调用 `getNumber()` 方法：\n\n```\nint w = 100;\nint s = getNumber(w,\
  \ w);\n/* 此时 s 的值是多少：200、8、10 还是其他？ */\n```\n\n当 `getNumber()` 方法返回时，变量 `s` 中会存储什么值？请注意，`getNumber()`\
  \ 方法的两个参数都是按引用传递的，并且在调用中你为两个参数传递了同一个变量 `w`。当 `getNumber()` 方法开始执行时，形式参数 `x` 和 `y`\
  \ 是同一个实际参数 `w` 的别名。当你使用 `w`、`x` 或 `y` 时，你指的是内存中的同一份数据。在将 `x` 和 `y` 相加并将结果存储到局部变量\
  \ `sum` 之前，该方法将 `y` 的值设置为 `5`，这使得 `w`、`x` 和 `y` 的值都变为 `5`。当在方法内部将 `x` 和 `y` 相加时，`x`\
  \ 和 `y` 都指向值 `5`。`getNumber()` 方法返回 `10`。\n\n考虑作为表达式一部分对 `getNumber()` 方法的另一次调用，如下所示：\n\
  \n```\nint a = 10;\nint b = 19;\nint c = getNumber(a, b) + a;\n/* 此时 c 的值是多少？ */\n\
  ```\n\n猜测前面代码片段中 `c` 的值有点棘手。你需要考虑 `getNumber()` 方法调用对实际参数的副作用。`getNumber()` 方法将返回\
  \ `8`，并且它还会将 `a` 和 `b` 的值分别修改为 `3` 和 `5`。值 `11`（`8 + 3`）将被赋值给 `c`。考虑以下语句，其中你更改了加法运算符的操作数顺序：\n\
  \n```\nint a = 10;\nint b = 19;\nint d =  a + getNumber(a, b);\n/* 此时 d 的值是多少？ */\n\
  ```\n\n`d` 的值将是 `18`（`10 + 8`）。将使用 `a` 的局部值 10。如果参数是按引用传递的，你需要考虑方法调用对实际参数的副作用。你可能会认为表达式\
  \ `getNumber(a, b) + a` 和 `a + getNumber(a, b)` 会给出相同的结果。然而，正如我所解释的，当参数按引用传递时，结果可能不同。\n\
  \n使用按引用传递的优点如下：\n\n\n\n*   相较于按值传递，它更高效，因为实际参数的值不会被复制。\n*   它允许调用者和被调用方法环境之间共享多个值。\n\
  \n使用按引用传递的缺点如下：\n*   如果调用者未考虑被调用方法内部对实际参数所做的修改，则存在潜在危险。\n*   由于通过形式参数对实际参数产生的副作用，程序逻辑不易理解。\n\
  \n按引用值传递\n\n使用按引用值传递将参数传递给方法的机制与按引用传递不同。然而，这两种机制具有相同的效果。在按引用值传递中，实际参数的引用被复制给形式参数。形式参数使用解引用机制来访问实际参数的值。形式参数在方法内部所做的修改会立即对实际参数可见，这与按引用传递的情况相同。图\
  \ 8-6 描述了使用按引用值传递机制时实际参数和形式参数的内存状态。\n\n![A323069_2_En_8_Fig6_HTML.gif](img/A323069_2_En_8_Fig6_HTML.gif)\n\
  \n图 8-6.\n\n使用按引用值传递机制进行方法调用时，实际参数和形式参数的内存状态\n\n按引用传递和按引用值传递之间存在一个重要区别。在按引用值传递中，实际参数的引用作为方法调用的一部分被复制给形式参数。但是，你可以更改形式参数，使其在方法内部指向内存中的不同位置，但这不会使实际参数指向内存中的新位置。一旦你更改了形式参数中存储的引用，对新位置存储的值所做的任何更改都不会改变实际参数的值。\n\
  \n关于按引用传递的副作用和内存状态的讨论和示例同样适用于按引用值传递机制。大多数编程语言使用按引用值传递来模拟按引用传递机制。\n\n按常量引用值传递\n\n\
  按常量引用值传递与按引用值传递基本相同，但有一个区别。形式参数在方法体内部被视为常量。也就是说，在方法执行的整个过程中，形式参数持有实际参数所持有引用的副本。形式参数不能在方法体内部被修改，以持有除实际参数所引用数据之外的其它数据的引用。\n\
  \n按结果传递\n\n你可以将按结果传递视为按值传递的反面。在按值传递中，实际参数的值被复制给形式参数。在按结果传递中，实际参数的值不会被复制给形式参数。当方法开始执行时，形式参数被视为一个未初始化的局部变量。在方法执行期间，形式参数被赋予一个值。在方法执行结束时，形式参数的值被复制回实际参数。\n\
  \n图 8-7 描述了使用按结果传递参数机制时实际参数和形式参数的内存状态。\n\n![A323069_2_En_8_Fig7_HTML.gif](img/A323069_2_En_8_Fig7_HTML.gif)\n\
  \n图 8-7.\n\n使用按结果传递参数机制时，实际参数和形式参数的内存状态\n\n有时，当使用按结果传递机制时，形式参数也被称为 `OUT` 参数。它们被称为\
  \ `OUT` 参数，因为它们用于将值从方法复制到调用者的环境中。同样地，如果形式参数使用按值传递机制，则有时被称为 `IN` 参数，因为它们用于将实际参数的值复制进来。\n\
  \n按值结果传递\n\n也称为按复制-恢复传递，这是按值传递和按结果传递的组合（因此得名“按值结果传递”）。它也被称为 `IN-OUT` 参数传递方式。当调用一个方法时，实际参数的值被复制给形式参数。在方法执行期间，形式参数在其自身的本地数据副本上操作。当方法调用结束时，形式参数的值被复制回实际参数。这就是它也被称为按复制-恢复传递的原因。它在方法调用开始时复制实际参数的值，并在方法调用结束时将形式参数的值恢复到实际参数中。图\
  \ 8-8 描述了使用按值结果传递机制传递参数时实际参数和形式参数的内存状态。\n\n![A323069_2_En_8_Fig8_HTML.gif](img/A323069_2_En_8_Fig8_HTML.gif)\n\
  \n图 8-8.\n\n使用按结果传递参数机制时，实际参数和形式参数的内存状态\n\n它以不同的方式实现了按引用传递的效果。在按引用传递中，对形式参数所做的任何修改都会立即对实际参数可见。在按值结果传递中，对形式参数的任何修改仅在方法调用返回时才对实际参数可见。如果使用按值结果传递的形式参数在方法内部被多次修改，实际参数将只能看到最终修改后的值。\n\
  \n按值结果传递用于在分布式应用中模拟按引用传递。假设你进行一个远程方法调用，该调用在另一台机器上执行。存在于一台机器上的实际参数的引用（内存地址）在远程方法执行的机器上将毫无意义。在这种情况下，客户端应用程序将实际参数的副本发送到远程机器。复制给形式参数的值位于远程机器上。形式参数在该副本上操作。当远程方法调用返回时，远程机器上形式参数的值被复制回客户端机器上的实际参数。这使得客户端代码能够实现将参数按引用传递给在另一台机器上运行的远程方法的功能。\n\
  \n按名传递\n\n通常，实际参数表达式在其值/引用传递给方法之前被求值。在按名传递中，当调用方法时，实际参数的表达式不会被求值。方法体内部形式参数的名称会被文本替换为对应实际参数的表达式。实际参数在方法执行期间每次遇到时都会被求值，并且它们在调用者的上下文中求值，而不是在方法的上下文中。如果在替换过程中，方法中的局部变量与实际参数表达式之间存在名称冲突，则局部变量会被重命名，以使每个变量都有唯一的名称。\n\
  \n按名传递是通过 thunk 实现的。thunk 是一段代码，用于在特定上下文中计算并返回表达式的值。为每个实际参数生成一个 thunk，并将其引用传递给方法。每次使用形式参数时，都会调用\
  \ thunk，该 thunk 在调用者上下文中对实际参数进行求值。\n\n\n\n按名传递（pass by name）的优势在于，实际参数只有在方法内部被使用时才会被求值。这也被称为**惰性求值**（lazy\
  \ evaluation）。\n\n与之对比的是按值传递（pass by value）机制，在该机制中，实际参数在复制给形式参数之前总是会被求值。这被称为**主动求值**（eager\
  \ evaluation）。按名传递的缺点在于，每当方法体内部使用对应的形式参数时，实际参数都会被求值。如果方法使用了按名传递的形式参数，那么理解其逻辑也会更加困难，并且该参数还可能产生副作用。\n\
  \n考虑以下 `squareDivide()` 方法的声明：\n\n```\nint squareDivide(int x, int y) {\nint z =\
  \  x * x/y * y;\nreturn z;\n}\n```\n\n考虑以下调用 `squareDivide()` 方法的代码片段：\n\n```\n\
  squareDivide((4+4), (2+2));\n```\n\n你可以将这次调用的执行过程想象成如下编写的 `squareDivide()` 方法。请注意，实际参数表达式\
  \ `(2+2)` 和 `(4+4)` 在方法体内部被多次求值。\n\n```\nint squareDivide() {\nint z = (4+4)*(4+4)/(2+2)*(2+2);\n\
  return z;\n}\n```\n\n**按需传递（Pass by Need）**\n\n按需传递与按名传递类似，但有一个区别。在按名传递中，实际参数在方法中每次被使用时都会求值。在按需传递中，实际参数仅在首次使用时被求值一次。当某个实际参数的\
  \ thunk（延迟计算对象）被首次调用时，它会计算实际参数表达式，缓存该值并返回。当同一个 thunk 再次被调用时，它直接返回缓存的值，而不会重新计算实际参数表达式。\n\
  \n**Java 中的参数传递机制**\n\nJava 支持两种数据类型：基本数据类型（primitive data type）和引用数据类型（reference\
  \ data type）。基本数据类型是一种简单的数据结构，它只关联一个值。引用数据类型是一种复杂的数据结构，它代表一个对象。基本数据类型的变量直接在其内存地址中存储值。假设你有一个\
  \ `int` 类型的变量 `id`。进一步假设它被赋值为 `754`，并且其内存地址是 `131072`。\n\n```\nint id = 754;\n```\n\
  \n图 8-9 展示了 `id` 变量的内存状态。\n\n![A323069_2_En_8_Fig9_HTML.gif](img/A323069_2_En_8_Fig9_HTML.gif)\n\
  \n图 8-9.\n\nid 变量值为 754 时的内存状态\n\n值 `754` 直接存储在内存地址 `131072` 处，该地址与变量名 `id` 相关联。如果你执行以下语句，将\
  \ `id` 变量赋值为新值 `351`，会发生什么？\n\n```\nid = 351;\n```\n\n当新值 `351` 被赋给 `id` 变量时，旧值\
  \ `754` 会在该内存地址被新值替换，如图 8-10 所示。\n\n![A323069_2_En_8_Fig10_HTML.gif](img/A323069_2_En_8_Fig10_HTML.gif)\n\
  \n图 8-10.\n\nid 变量被赋值为新值 351 时的内存状态\n\n当处理对象和引用变量时，情况就不同了。考虑清单 8-16 中所示的 `Car` 类声明。它有三个实例变量——`model`、`year`\
  \ 和 `price`——它们分别被赋予了初始值 `\"Unknown\"`、`2000` 和 `0.0`。\n\n```\n// Car.java\npackage\
  \ com.jdojo.cls;\npublic class Car {\npublic String model = \"Unknown\";\npublic\
  \ int year     = 2000;\npublic double price = 0.0;\n}\n清单 8-16.\n包含三个公共实例变量的 Car\
  \ 类\n```\n\n当你创建一个引用类型的对象时，该对象会在堆上创建，并存储在一个特定的内存地址。让我们按如下方式创建一个 `Car` 类的对象：\n\n\
  ```\nnew Car();\n```\n\n图 8-11 展示了执行上述语句创建 `Car` 对象时的内存状态。你可能假设该对象存储的内存地址是 `262144`。请注意，当创建一个对象时，会为其所有实例变量分配内存并进行初始化。在这种情况下，新的\
  \ `Car` 对象的 `model`、`year` 和 `price` 已被正确初始化，如图所示。\n\n![A323069_2_En_8_Fig11_HTML.gif](img/A323069_2_En_8_Fig11_HTML.gif)\n\
  \n图 8-11.\n\n使用 new Car() 语句创建 Car 对象时的内存状态\n\n此时，即使新创建的 `Car` 对象存在于内存中，也无法从 Java\
  \ 程序中引用它。`new` 运算符（如 `new Car()` 中所使用的）会返回它所创建对象的内存地址。在你的例子中，它将返回 `262144`。回想一下，数据（在此例中是\
  \ `Car` 对象）的内存地址也称为该数据的引用。从现在开始，我们将说 Java 中的 `new` 运算符返回它所创建对象的引用，而不是说它返回对象的内存地址。两者含义相同。然而，Java\
  \ 使用术语“引用”，其含义比“内存地址”更通用。为了访问新创建的 `Car` 对象，你必须将其引用存储在一个引用变量中。回想一下，引用变量存储的是对某些数据的引用，而这些数据存储在其他地方。在\
  \ Java 中，所有引用类型的变量都是引用变量。Java 中的引用变量可以存储一个 `null` 引用，这意味着它不引用任何东西。考虑以下对引用变量执行不同操作的代码片段：\n\
  \n```\nCar myCar = null;   /* #1 */\nmyCar = new Car();  /* #2 */\nCar xyCar = null;\
  \   /* #3 */\nxyCar = myCar;      /* $4 */\n```\n\n当执行标记为 #1 的语句时，会为 `myCar` 引用变量分配内存，假设内存地址为\
  \ `8192`。`null` 值是一个特殊值，通常是一个为零的内存地址，它被存储在 `myCar` 变量的内存地址中。图 8-12 描述了 `myCar` 变量被赋予\
  \ `null` 引用时的内存状态。\n\n![A323069_2_En_8_Fig12_HTML.gif](img/A323069_2_En_8_Fig12_HTML.gif)\n\
  \n图 8-12.\n\n执行 “Car myCar = null” 语句时 myCar 变量的内存状态\n\n标记为 #2 的语句的执行是一个两步过程。首先，它执行语句中的\
  \ `new Car()` 部分来创建一个新的 `Car` 对象。假设新的 `Car` 对象被分配在内存地址 9216 处。`new Car()` 表达式返回新对象的引用，即\
  \ `9216`。第二步，新对象的引用被存储在 `myCar` 引用变量中。执行标记为 #2 的语句后，`myCar` 引用变量和新 `Car` 对象的内存状态如图\
  \ 8-13 所示。请注意，此时新 `Car` 对象的内存地址 (`9216`) 与 `myCar` 引用变量的值相匹配。你无需担心本例中用于内存地址的数字；我只是编造了一些数字来阐明内存地址在内部是如何使用的。Java\
  \ 不允许你访问对象或变量的内存地址。Java 允许你通过引用变量访问/修改对象的状态。\n\n![A323069_2_En_8_Fig13_HTML.gif](img/A323069_2_En_8_Fig13_HTML.gif)\n\
  \n图 8-13.\n\n执行 myCar = new Car() 语句时 myCar 引用变量和新 Car 对象的内存状态\n\n标记为 #3 的语句与标记为\
  \ #1 的语句类似。`xyCar` 引用变量的内存状态如图 8-14 所示，假设 `10240` 是 `xyCar` 引用变量的内存地址。\n\n\n\n![A323069_2_En_8_Fig14_HTML.gif](img/A323069_2_En_8_Fig14_HTML.gif)\n\
  \n图 8-14.\n\n`xyCar` 引用变量的内存状态\n\n值得注意的是，当执行标记为 #4 的语句时的内存状态。该语句内容如下：\n\n```\nxyCar\
  \ = myCar;  /* #4 */\n```\n\n回顾一下，一个变量名关联着两个东西：一个内存地址和存储在该内存地址的值。内存地址（或位置）也称为其 `lvalue`，而存储在其内存地址的值也称为\
  \ `rvalue`。当一个变量出现在赋值运算符左侧时（如语句 #4 中的 `xyCar`），它指的是其内存地址。当一个变量出现在赋值运算符右侧时（如语句 #4\
  \ 中的 `myCar`），它指的是存储在其内存地址的值（`rvalue`）。标记为 #4 的语句可以解读如下：\n\n```\nxyCar = myCar;\
  \ /* #4 */\n在 xyCar 的 lvalue 处存储 myCar 的 rvalue；       /* #4 – 另一种方式 */\n在 xyCar\
  \ 的内存地址处存储 myCar 的值             /* #4 – 另一种方式 */\n```\n\n因此，当你执行语句 `xyCar = myCar`\
  \ 时，它会读取 `myCar` 的值（即 `9216`），并将其存储在 `xyCar` 的内存地址处。引用变量 `myCar` 存储了对一个 `Car` 对象的引用。像\
  \ `xyCar = myCar` 这样的赋值操作并不会复制 `myCar` 所引用的对象。相反，它复制的是存储在 `myCar` 中的值（即对 `Car` 对象的引用）并将其赋给\
  \ `xyCar`。当赋值 `xyCar = myCar` 完成后，`myCar` 和 `xyCar` 这两个引用变量就指向了内存中的同一个 `Car` 对象。此时，内存中只存在一个\
  \ `Car` 对象。图 8-15 展示了执行标记为 #4 的语句时的内存状态。\n\n![A323069_2_En_8_Fig15_HTML.gif](img/A323069_2_En_8_Fig15_HTML.gif)\n\
  \n图 8-15.\n\n内存状态，显示 myCar 和 xyCar 引用内存中同一个 Car 对象\n\n此时，你可以使用引用变量 `myCar` 或 `xyCar`\
  \ 来访问内存中的 `Car` 对象。以下代码片段将访问内存中的同一个对象：\n\n```\nmyCar.model = \"Civic LX\"; /* 使用\
  \ myCar 更改 model */\nmyCar.year  = 1999;       /* 使用 myCar 更改 year */\nxyCar.price\
  \ = 16000.00;   /* 使用 xyCar 更改 price */\n```\n\n执行完上述三条语句后，`Car` 对象的 `model`、`year`\
  \ 和 `price` 将被更改，内存状态将如图 8-16 所示。\n\n![A323069_2_En_8_Fig16_HTML.gif](img/A323069_2_En_8_Fig16_HTML.gif)\n\
  \n图 8-16.\n\n内存状态，显示在使用 myCar 和 xyCar 更改 Car 对象的状态后，myCar 和 xyCar 引用内存中同一个 Car 对象\n\
  \n此时，内存中存在两个引用变量 `myCar` 和 `xyCar`，以及一个 `Car` 对象。两个引用变量都指向同一个 `Car` 对象。让我们执行以下语句并将其标记为\
  \ #5：\n\n```\nmyCar = new Car(); /* #5 */\n```\n\n上一条语句将在内存中创建一个新的 `Car` 对象，其实例变量具有初始值，并将新\
  \ `Car` 对象的引用赋给 `myCar` 引用变量。`xyCar` 引用变量仍然指向它之前引用的那个 `Car` 对象。假设新的 `Car` 对象被分配在内存地址\
  \ `5120` 处。两个引用变量 `myCar` 和 `xyCar` 以及两个 `Car` 对象的内存状态如图 8-17 所示。\n\n![A323069_2_En_8_Fig17_HTML.gif](img/A323069_2_En_8_Fig17_HTML.gif)\n\
  \n图 8-17.\n\n引用变量 myCar 和 xyCar 以及两个 Car 对象的内存状态\n\n让我们再做一次更改，将 `xyCar` 引用变量设置为\
  \ `null`，如下所示：\n\n```\nxyCar = null; /* #6 */\n```\n\n图 8-18 显示了执行语句 #6 后的内存状态。\n\
  \n![A323069_2_En_8_Fig18_HTML.gif](img/A323069_2_En_8_Fig18_HTML.gif)\n\n图 8-18.\n\
  \n将 xyCar 赋值为 null 引用后，引用变量 myCar 和 xyCar 以及两个 Car 对象的内存状态\n\n现在，`xyCar` 引用变量存储了一个\
  \ `null` 引用，它不再指向任何 `Car` 对象。那个型号为 `Civic LX` 的 `Car` 对象不再被任何引用变量引用。在你的程序中，你完全无法访问这个\
  \ `Car` 对象，因为你没有它的引用。用 Java 术语来说，这个型号为 `Civic LX` 的 `Car` 对象是不可达的。当内存中的一个对象不可达时，它就符合垃圾回收的条件。请注意，型号为\
  \ `Civic LX` 的 `Car` 对象并不会在 `xyCar` 被设置为 `null` 后立即被销毁（或释放）。它会留在内存中，直到垃圾回收器运行并确认它不可达为止。关于对象内存如何被释放的更多细节，请参考关于垃圾回收的章节。\n\
  \n关于变量类型及其在 Java 中的工作方式，我已经介绍了足够的背景知识。现在是时候讨论 Java 中的参数传递机制了。简而言之，我们可以说：\n\nJava\
  \ 中的所有参数都是按值传递的。\n\n这个简短的陈述引起了很多困惑。这是否意味着当参数是引用类型时，会复制实际参数所引用的对象，并将其赋值给形式参数？用例子来详细阐述“Java\
  \ 中的所有参数都是按值传递的”这句话非常重要。即使是经验丰富的 Java 程序员在理解 Java 的参数传递机制时也会遇到问题。更详细地说，Java 支持以下四种参数传递机制：\n\
  \n*   按值传递\n*   按常量值传递\n*   按引用值传递\n*   按常量引用值传递\n\n请注意，Java 中所有四种参数传递方式都包含了“值”这个词。这就是许多\
  \ Java 书籍将它们总结为“Java 按值传递所有参数”的原因。有关前面提到的四种参数传递机制的更多细节，请参考上一节。\n\n前两种类型，按值传递和按常量值传递，适用于基本数据类型的参数。后两种类型，按引用值传递和按常量引用值传递，适用于引用类型的参数。\n\
  \n当形式参数是基本数据类型时，实际参数的值会被复制给形式参数。在方法体内对形式参数值所做的任何更改，只会更改形式参数的副本，而不会更改实际参数的值。现在你可以明白，用于交换两个基本类型值的\
  \ `swap()` 方法在 Java 中是行不通的。\n\n清单 8-17 演示了 `swap()` 方法无法在 Java 中编写，因为基本类型参数是按值传递的。输出显示，`swap()`\
  \ 方法的形式参数 `x` 和 `y` 接收到了 `a` 和 `b` 的值。`x` 和 `y` 的值在方法内部被交换，但这完全不影响实际参数 `a` 和 `b`\
  \ 的值。\n\n```\n// BadSwapTest.java\npackage com.jdojo.cls;\npublic class BadSwapTest\
  \ {\npublic static void swap(int x, int y) {\nSystem.out.println(\"#2: x = \" +\
  \ x + \", y = \" + y);\nint temp = x;\nx = y;\ny = temp;\nSystem.out.println(\"\
  #3: x = \" + x + \", y = \" + y);\n}\npublic static void main(String[] args) {\n\
  int a = 19;\nint b = 37;\nSystem.out.println(\"#1: a = \" + a + \", b = \" + b);\n\
  // 调用 swap() 方法来交换 a 和 b 的值\nBadSwapTest.swap(a, b);\nSystem.out.println(\"#4: a\
  \ = \" + a + \", b = \" + b);\n}\n}\n#1: a = 19, b = 37\n#2: x = 19, y = 37\n#3:\
  \ x = 37, y = 19\n#4: a = 19, b = 37\n清单 8-17.\n在 Java 中编写 swap() 方法来交换两个基本类型值的错误尝试\n\
  \n\n\n基本类型参数是按值传递的。然而，你可以在方法内部修改形参的值，而不会影响实参的值。Java 也允许你使用常量值传递。在这种情况下，形参不能在方法内部被修改。形参通过复制实参的值来初始化，之后它便成为一个常量值，只能被读取。你需要在形参声明中使用\
  \ `final` 关键字来表示你打算通过常量值传递该参数。任何试图改变通过常量值传递的参数值的操作，都会导致编译时错误。清单 8-18 演示了如何使用常量值传递机制将参数\
  \ `x` 传递给 `test()` 方法。任何试图在 `test()` 方法内部改变形参 `x` 值的操作，都会导致编译时错误。如果你取消 `test()`\
  \ 方法中 `\"x = 10;\"` 语句的注释，你将得到以下编译器错误：\n\n```\nError(10):  final parameter x may\
  \ not be assigned\n```\n\n你向 `test()` 方法传递了两个参数：`x` 和 `y`。参数 `y` 是按值传递的，因此它可以在方法内部被修改。通过查看输出可以确认这一点。\n\
  \n```\n// PassByConstantValueTest.java\npackage com.jdojo.cls;\npublic class PassByConstantValueTest\
  \ {\n// x 通过常量值传递，y 按值传递\npublic static void test(final int x, int y) {\nSystem.out.println(\"\
  #2: x = \" + x + \", y = \" + y);\n/* 取消下面语句的注释将产生编译时错误 */\n// x = 79; /* 不能改变 x。它是通过常量值传递的\
  \ */\ny = 223; // 改变 y 是允许的\nSystem.out.println(\"#3: x = \" + x + \", y = \" +\
  \ y);\n}\npublic static void main(String[] args) {\nint a = 19;\nint b = 37;\nSystem.out.println(\"\
  #1: a = \" + a + \", b = \" + b);\nPassByConstantValueTest.test(a, b);\nSystem.out.println(\"\
  #4: a = \" + a + \", b = \" + b);\n}\n}\n#1: a = 19, b = 37\n#2: x = 19, y = 37\n\
  #3: x = 19, y = 223\n#4: a = 19, b = 37\n清单 8-18.\n常量值传递示例\n```\n\n接下来讨论引用类型参数的传递机制。Java\
  \ 允许你使用按引用值传递和按常量引用值传递机制将引用类型参数传递给方法。当参数按引用值传递时，实参中存储的引用会被复制给形参。当方法开始执行时，实参和形参都指向内存中的同一个对象。如果实参是\
  \ `null` 引用，那么形参也将包含 `null` 引用。你可以在方法体内将形参赋值为另一个对象的引用。在这种情况下，形参开始引用内存中的新对象，而实参仍然引用方法调用前它所引用的那个对象。清单\
  \ 8-19 演示了 Java 中的按引用传递机制。它在 `main()` 方法内部创建了一个 `Car` 对象，并将该 `Car` 对象的引用存储在 `myCar`\
  \ 引用变量中。\n\n```\n// 创建一个 Car 对象并将其引用赋给 myCar\nCar myCar = new Car();\n```\n\n它使用\
  \ `myCar` 引用变量修改了新创建的 `Car` 对象的型号、年份和价格。\n\n```\n// 使用 myCar 更改 Car 对象的型号、年份和价格\n\
  myCar.model = \"Civic LX\";\nmyCar.year  = 1999;\nmyCar.price = 16000.0;\n```\n\n\
  输出中标有 #1 的消息显示了 `Car` 对象的状态。`myCar` 引用变量通过以下调用传递给 `test()` 方法：\n\n```\nPassByReferenceValueTest.test(myCar);\n\
  ```\n\n由于 `test()` 方法中形参 `xyCar` 的类型是 `Car`，这是一个引用类型，因此 Java 使用按引用值传递机制将实参 `myCar`\
  \ 的值传递给形参 `xyCar`。当调用 `test(myCar)` 方法时，Java 将存储在 `myCar` 引用变量中的 `Car` 对象引用复制到 `xyCar`\
  \ 引用变量。当执行进入 `test()` 方法体时，`myCar` 和 `xyCar` 引用内存中的同一个对象。此时，内存中只有一个 `Car` 对象，而不是两个。理解\
  \ `test(myCar)` 方法调用并没有复制 `myCar` 引用变量所引用的 `Car` 对象这一点非常重要。相反，它复制了 `myCar` 引用变量（即实参）所引用的\
  \ `Car` 对象的引用（内存地址），并将该引用复制给了 `xyCar` 引用变量（即形参）。`myCar` 和 `xyCar` 引用内存中同一个对象这一事实，由输出中标有\
  \ #2 的消息指示，该消息是在 `test()` 方法内部使用形参 `xyCar` 打印的。\n\n现在，你在 `test()` 方法内部创建了一个新的 `Car`\
  \ 对象，并将其引用赋给了形参 `xyCar`。\n\n```\n// 让 xyCar 引用一个新的 Car 对象\nxyCar = new Car();\n\
  ```\n\n此时，内存中有两个 `Car` 对象。形参 `xyCar` 引用的是新的 `Car` 对象，而不是那个引用被传递给方法的对象。请注意，实参 `myCar`\
  \ 仍然引用你在 `main()` 方法中创建的 `Car` 对象。形参 `xyCar` 引用新 `Car` 对象这一事实，由输出中标有 #3 的消息指示。当\
  \ `test()` 方法调用返回时，`main()` 方法打印了 `myCar` 引用变量所引用的 `Car` 对象的详细信息。参见清单 8-19。\n\n\
  提示\n\n当引用类型参数传递给 Java 中的方法时，形参可以像实参一样访问该对象。形参可以通过直接更改实例变量的值或调用对象的方法来修改该对象。通过形参对对象所做的任何修改，都会立即通过实参可见，因为两者都持有内存中同一个对象的引用。形参本身可以在方法内部被修改为引用另一个对象（或\
  \ `null` 引用）。\n\n```\n// PassByReferenceValueTest.java\npackage com.jdojo.cls;\n\
  public class PassByReferenceValueTest {\npublic static void main(String[] args)\
  \ {\n// 创建一个 Car 对象并将其引用赋给 myCar\nCar myCar = new Car();\n// 使用 myCar 更改 Car 对象的型号、年份和价格\n\
  myCar.model = \"Civic LX\";\nmyCar.year = 1999;\nmyCar.price = 16000.0;\nSystem.out.println(\"\
  #1: model = \" + myCar.model\n+ \", year = \" + myCar.year\n+ \", price = \" + myCar.price);\n\
  PassByReferenceValueTest.test(myCar);\nSystem.out.println(\"#4: model = \" + myCar.model\n\
  + \", year = \" + myCar.year\n+ \", price = \" + myCar.price);\n}\npublic static\
  \ void test(Car xyCar) {\nSystem.out.println(\"#2: model = \" + xyCar.model\n+ \"\
  , year = \" + xyCar.year\n+ \", price = \" + xyCar.price);\n// 让 xyCar 引用一个新的 Car\
  \ 对象\nxyCar = new Car();\nSystem.out.println(\"#3: model = \" + xyCar.model\n+ \"\
  , year = \" + xyCar.year\n+ \", price = \" + xyCar.price);\n}\n}\n#1: model = Civic\
  \ LX, year = 1999, price = 16000.0\n#2: model = Civic LX, year = 1999, price = 16000.0\n\
  #3: model = Unknown, year = 2000, price = 0.0\n#4: model = Civic LX, year = 1999,\
  \ price = 16000.0\n清单 8-19.\n按引用值传递示例\n```\n\n\n\n如果你不希望方法将引用类型形参修改为指向与实际参数所引用对象不同的对象，可以使用常量引用值传递机制来传递该参数。如果在引用类型形参声明中使用关键字\
  \ `final`，则该参数通过常量引用值传递，且形参不能在方法内部被修改。以下 `test()` 方法的声明将 `xyzCar` 形参声明为 `final`，并通过常量引用值传递。该方法试图通过将\
  \ `null` 引用赋值给 `xyzCar` 形参，然后再将一个新 `Car` 对象的引用赋值给它来修改该形参。这两个赋值语句都会产生编译错误：\n\n```\n\
  // xyzCar 通过常量引用值传递，因为它被声明为 final\nvoid test(final Car xyzCar) {\n// 可以读取 xyzCar\
  \ 所引用的对象\nString model = xyzCar.model;\n// 可以修改 xyzCar 所引用的对象\nxyzCar.year = 2001;\n\
  /* 不能修改 xyzCar。也就是说，xyzCar 必须引用调用该方法时实际参数所引用的对象。你甚至不能将其设置为 null 引用。\n*/\nxyzCar\
  \ = null;      // 编译时错误。不能修改 xyzCar\nxyzCar = new Car(); // 编译时错误。不能修改 xyzCar\n\
  }\n```\n\n让我们再讨论一个关于 Java 参数传递机制的示例。考虑以下 `changeString()` 方法的代码：\n\n```\npublic\
  \ static void changeString(String s2) {\n/* #2 */\ns2 = s2 + \" there\";\n/* #3\
  \ */\n}\n```\n\n考虑以下调用 `changeString()` 方法的代码片段：\n\n```\nString s1 = \"hi\";\n/*\
  \ #1 */\nchangeString(s1);\n/* #4 */\n```\n\n在 #4 处，`s1` 的内容是什么？`String` 是 Java\
  \ 中的引用类型。在 #1 处，`s1` 引用了一个内容为 `\"hi\"` 的 `String` 对象。当调用 `changeString(s1)` 方法时，`s1`\
  \ 通过引用值传递给 `s2`。在 #2 处，`s1` 和 `s2` 引用了内存中同一个内容为 `\"hi\"` 的 `String` 对象。当执行\n\n```\n\
  s2 = s2 + \" there\";\n```\n\n语句时，会发生两件事。首先，计算 `s2 + \" there\"` 表达式，该表达式在内存中创建一个内容为\
  \ `\"hi there\"` 的新 `String` 对象，并返回其引用。`s2 + \" there\"` 表达式返回的引用被赋值给 `s2` 形参。此时，内存中有两个\
  \ `String` 对象：一个内容为 `\"hi\"`，另一个内容为 `\"hi there\"`。在 #3 处，实际参数 `s1` 引用内容为 `\"hi\"\
  ` 的 `String` 对象，而形参 `s2` 引用内容为 `\"hi there\"` 的 `String` 对象。当 `changeString()` 方法调用结束时，形参\
  \ `s2` 被丢弃。请注意，内容为 `\"hi there\"` 的 `String` 对象在 `changeString()` 方法调用结束后仍然存在于内存中。方法调用结束时，只有形参被丢弃，形参所引用的对象不会被丢弃。在\
  \ #4 处，引用变量 `s1` 仍然引用内容为 `\"hi\"` 的 `String` 对象。清单 8-20 提供了尝试修改 `String` 类型形参的完整代码。\n\
  \n提示\n\n`String` 对象是不可变的，这意味着其内容在创建后不能被更改。如果需要更改 `String` 对象的内容，必须创建一个包含新内容的新 `String`\
  \ 对象。\n\n```\n// PassByReferenceValueTest2.java\npackage com.jdojo.cls;\npublic\
  \ class PassByReferenceValueTest2 {\npublic static void changeString(String s2)\
  \ {\nSystem.out.println(\"#2: s2 = \" + s2);\ns2 = s2 + \" there\";\nSystem.out.println(\"\
  #3: s2 = \" + s2);\n}\npublic static void main(String[] args) {\nString s1 = \"\
  hi\";\nSystem.out.println(\"#1: s1 = \" + s1);\nPassByReferenceValueTest2.changeString(s1);\n\
  System.out.println(\"#4: s1 = \" + s1);\n}\n}\n#1: s1 = hi\n#2: s2 = hi\n#3: s2\
  \ = hi there\n#4: s1 = hi\n清单 8-20.\nJava 中引用值传递参数的另一个示例\n```\n\n总结\n\n类中的方法定义了该类对象的行为或类本身的行为。方法是一个命名的代码块。可以调用方法来执行其代码。调用方法的代码称为方法的调用者。方法可以选择性地从调用者接收输入值，并可以向调用者返回一个值。输入值列表称为方法的参数。可变参数用于定义方法和构造函数的参数，这些参数可以接受可变数量的参数。方法总是在类或接口的主体内部定义。\n\
  \n类的方法可以具有以下四种访问级别之一：public、private、protected 和包级。在定义方法时使用关键字 `public`、`private`\
  \ 和 `protected` 分别赋予它们 public、private 和 protected 访问级别。缺少这些关键字中的任何一个则指定为包级访问。\n\n\
  可以在方法体内声明变量，此类变量称为局部变量。与类的字段不同，局部变量默认不会被初始化。局部变量必须在使用其值之前进行初始化。在局部变量初始化之前尝试读取其值会导致编译时错误。\n\
  \n一个类可以有两种类型的方法：实例方法和类方法。实例方法和类方法也分别称为非静态方法和静态方法。实例方法用于实现类的实例（也称为对象）的行为。实例方法只能在类的实例上下文中调用。类方法用于实现类本身的行为。类方法总是在类的上下文中执行。`static`\
  \ 修饰符用于定义类方法。方法声明中缺少 `static` 修饰符则使该方法成为实例方法。\n\n类的方法可以使用点表示法访问，其形式为：\n\n```\n<限定符>.<方法名>(<参数列表>)\n\
  ```\n\n对于实例方法，限定符是类实例的引用。对于类方法，限定符可以是类实例的引用或类名。\n\n可以从类的非静态方法中调用类的静态方法；但是，不允许从静态方法中调用非静态方法。类的静态方法可以访问类的所有静态字段，而非静态方法可以访问类的静态和非静态字段。\n\
  \nJava 有一个名为 `this` 的关键字。它是对类当前实例的引用。它只能在实例上下文中使用。它永远不能在类上下文中使用，因为它表示当前实例，而在类上下文中不存在实例。关键字\
  \ `this` 用于许多上下文中，例如非静态方法、构造函数、实例初始化器和用于初始化实例变量的表达式。\n\n存在不同的机制来向方法和构造函数传递参数。Java\
  \ 使用值传递和常量值传递机制来传递基本数据类型的参数。引用值传递和常量引用值传递用于在 Java 中传递引用类型的参数。\n\n练习题\n\n1.  Java\
  \ 中的方法是什么？\n\n2.  描述类的静态方法和非静态方法之间的区别。\n\n\n\n3.  静态方法能否访问类的实例变量？如果你的答案是否定的，请解释原因。\n\
