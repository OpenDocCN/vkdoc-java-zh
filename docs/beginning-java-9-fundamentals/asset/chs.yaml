  \ \"***\");\n```\n\n元字符\n\n元字符是具有特殊含义的字符。它们被用于\n正则表达式中。有时元字符不具有任何特殊含义，而是被当作普通字符处理。它们被当作普通字符还是元字符，取决于它们被使用的\n\
  上下文。Java 正则表达式支持的元字符如下：\n\n*   `(` (左括号)\n\n*   `)` (右括号)\n\n*   `[` (左方括号)\n\n\
  *   `]` (右方括号)\n\n*   `{` (左花括号)\n\n*   `}` (右花括号)\n\n*   `\\` (反斜杠)\n\n*   `^`\
  \ (脱字符)\n\n*   `$` (美元符号)\n\n*   `|` (竖线)\n\n*   `?` (问号)\n\n*   `*` (星号)\n\n* \
  \  `+` (加号)\n\n*   `.` (点号或句号)\n\n*   `<` (小于号)\n\n*   `>` (大于号)\n\n*   `-` (连字符)\n\
  \n*   `=` (等号)\n\n*   `!` (感叹号)\n\n字符类\n\n元字符 `[` 和 `]`（左方括号和\n右方括号）用于在正则表达式内部指定一个**字符类**。字符类是一组字符的集合。正则表达式\n\
  引擎将尝试匹配该集合中的一个字符。请注意，字符类与 Java 中的类构造或类文件没有任何关系。字符类 `\"[ABC]\"` 将匹配\n字符 `A`、\n`B`\
  \ 或 `C`。例如，字符串\n`\"A@V\"`、\n`\"B@V\"` 和\n`\"C@V\"` 将\n匹配正则表达式 `\"[ABC]@.\"`。然而，\n\
  字符串 `\"H@V\"` 将不会匹配\n正则表达式 `\"[ABC]@.\"`，因为\n`@` 前面不是\n`A`、\n`B` 或 `C`。再举一个例子，字符串\
  \ `\"man\"` 或 `\"men\"` 将匹配\n正则表达式 `\"m[ae]n\"`。\n\n当我使用“匹配”这个词时，我指的是模式存在于字符串中。\n\
  我并不是指整个字符串都匹配该模式。例如，\n`\"WEB@JDOJO.COM\"`\n匹配模式 `\"[ABC]@.\"`，因为\n`@` 前面是\n`B`。字符串\n\
  `\"A@BAND@YEA@U\"`\n两次匹配模式 `\"[ABC]@.\"`，尽管\n该字符串包含三个 `@` 符号。第二个\n`@` 不是匹配的一部分，因为它前面是\
  \ `D`，而不是 `A`、`B` 或 `C`。\n\n你也可以使用字符类来指定一个字符范围。该\n范围使用连字符（`-`）表示。例如，\n正则表达式中的 `\"\
  [A-Z]\"` 代表任意大写英文字母；`\"[0-9]\"` 代表\n`0` 到 `9` 之间的任意数字。如果你在\n字符类的开头使用 `^`，它表示补集（即“非”的意思）。例如，`\"\
  [^ABC]\"` 表示除了\n`A`、`B` 和 `C` 之外的任意字符。字符类 `\"[^A-Z]\"`\n代表除了大写英文字母之外的任意字符。如果你在\n\
  字符类中除了开头以外的任何位置使用\n`^`，它将失去其特殊含义（即补集的特殊含义），并且只匹配一个 `^` 字符。例如，`\"[ABC^]\"` 将匹配\n\
  `A`、`B`、`C` 或 `^`。\n\n\n\n您还可以在单个字符类中包含两个或更多范围。例如，`\"[a-zA-Z]\"` 匹配从 `a` 到 `z` 以及从\
  \ `A` 到 `Z` 的任何字符。`\"[a-zA-Z0-9]\"` 匹配从 `a` 到 `z`（大写和小写）的任何字符，以及从 `0` 到 `9` 的任何数字。表\
  \ 18-1 列出了一些字符类的示例。\n\n表 18-1.\n\n字符类示例\n\n| 字符类 | 含义 | 类别 |\n| --- | --- | ---\
  \ |\n| `[abc]` | 字符 `a`、`b` 或 `c` | 简单字符类 |\n| `[^xyz]` | 除 `x`、`y` 和 `z` 之外的任何字符\
  \ | 补集或否定 |\n| `[a-p]` | 从 `a` 到 `p` 的字符 | 范围 |\n| `[a-cx-z]` | 从 `a` 到 `c` 或从 `x`\
  \ 到 `z` 的字符，包括 `a`、`b`、`c`、`x`、`y` 或 `z` | 并集 |\n| `[0-9&&[4-8]]` | 两个范围的交集（`4`、`5`、`6`、`7`\
  \ 或 `8`） | 交集 |\n| `[a-z&&[^aeiou]]` | 所有小写字母减去元音。换句话说，即非元音的小写字母。也就是所有小写辅音字母。 |\
  \ 减法 |\n\n预定义字符类\n\n表 18-2 列出了一些常用的预定义字符类。\n\n表 18-2.\n\n预定义正则表达式字符类列表\n\n| 预定义字符类\
  \ | 含义 |\n| --- | --- |\n| .（点号） | 任何字符（可能匹配也可能不匹配行终止符）。有关更多详细信息，请参阅 `java.util.regex.Pattern`\
  \ 类 API 文档中的“行终止符”部分。 |\n| `\\d` | 一个数字。等同于 `[0-9]`。 |\n| `\\D` | 一个非数字。等同于 `[⁰-9]`。\
  \ |\n| `\\s` | 一个空白字符。等同于 `[ \\t\\n\\x0B\\f\\r]`。该列表包括空格、制表符、换行符、垂直制表符、换页符和回车符。\
  \ |\n| `\\S` | 一个非空白字符。等同于 `[^\\s]`。 |\n| `\\w` | 一个单词字符。等同于 `[a-zA-Z_0-9]`。该列表包括小写字母、大写字母、下划线和十进制数字。\
  \ |\n| `\\W` | 一个非单词字符。等同于 `[^\\w]`。 |\n\n如果您在电子邮件地址验证中允许所有大写和小写字母、下划线和数字，那么用于验证仅包含三个字符的电子邮件地址的正则表达式将是\
  \ `\"\\w@\\w\"`。现在，您在电子邮件地址验证过程中又前进了一步。与仅允许电子邮件第一部分使用 `A`、`B` 或 `C`（如正则表达式 `[ABC]@.`\
  \ 所表示）不同，现在您允许任何单词字符作为第一部分和第二部分。\n\n正则表达式的更多功能\n\n到目前为止，您只看到了 `String` 类中使用正则表达式的三种方法。`java.util.regex`\
  \ 包包含三个类来支持正则表达式的完整版本。这些类如下：\n\n*   `Pattern`\n\n*   `Matcher`\n\n*   `PatternSyntaxException`\n\
  \n`Pattern` 保存正则表达式的编译形式。正则表达式的编译形式是其专门的内存表示形式，用于促进更快的字符串匹配。\n\n`Matcher` 将要匹配的字符串与\
  \ `Pattern` 关联起来，并执行实际的匹配操作。\n\n`PatternSyntaxException` 表示格式错误的正则表达式中的错误。\n\n编译正则表达式\n\
  \n`Pattern` 保存正则表达式的编译形式。它是不可变的，可以共享。它没有 `public` 构造方法。该类包含一个静态的 `compile()` 方法，该方法返回一个\
  \ `Pattern` 对象。`compile()` 方法被重载：\n\n*   `static Pattern compile(String regex)`\n\
  \n*   `static Pattern compile(String regex, int flags)`\n\n以下代码片段将正则表达式编译为 `Pattern`\
  \ 对象：\n\n```\n// 准备一个正则表达式\nString regex = \"[a-z]@.\";\n// 将正则表达式编译为 Pattern 对象\n\
  Pattern p = Pattern.compile(regex);\n```\n\n`compile()` 方法的第二个版本允许您指定修改模式匹配方式的标志。`flags`\
  \ 参数是一个位掩码。这些标志在 `Pattern` 类中定义为 `int` 常量，如表 18-3 所列。\n\n表 18-3.\n\nPattern 类中定义的标志列表\n\
  \n| 标志 | 描述 |\n| --- | --- |\n| `Pattern.CANON_EQ` | 启用规范等价。如果设置此标志，则仅当两个字符的完整规范分解匹配时，它们才匹配。\
  \ |\n| `Pattern.CASE_INSENSITIVE` | 启用不区分大小写的匹配。此标志仅对 US-ASCII 字符集设置不区分大小写的匹配。对于\
  \ Unicode 字符集的不区分大小写匹配，还应同时设置 `UNICODE_CASE` 标志。 |\n| `Pattern.COMMENTS` | 允许在模式中使用空白和注释。设置此标志后，将忽略空白，并且忽略以\
  \ # 开头的嵌入式注释，直到行尾。 |\n| `Pattern.DOTALL` | 启用 dotall 模式。默认情况下，表达式 `.`（点号）不匹配行终止符。设置此标志后，该表达式匹配任何字符，包括行终止符。\
  \ |\n| `Pattern.LITERAL` | 启用模式的字面解析。设置此标志后，正则表达式中的字符将被视为字面字符。也就是说，元字符和转义序列没有特殊含义。与此标志一起使用时，`CASE_INSENSTIVE`\
  \ 和 `UNICODE_CASE` 标志保留其效果。 |\n| `Pattern.MULTILINE` | 启用多行模式。默认情况下，表达式 `^` 和 `$`\
  \ 匹配整个输入序列的开头和结尾。设置此标志后，它们分别匹配行终止符之后和之前，或输入序列的结尾。 |\n| `Pattern.UNICODE_CASE` |\
  \ 启用 Unicode 感知的大小写折叠。当此标志与 `CASE_INSENSITIVE` 标志一起设置时，将根据 Unicode 标准执行不区分大小写的匹配。\
  \ |\n| `Pattern.UNICODE_CHARACTER_CLASS` | 启用预定义字符类和 `POSIX` 字符类的 Unicode 版本。设置此标志也会产生设置\
  \ `UNICODE_CASE` 标志的效果。设置此标志后，（仅 US-ASCII）预定义字符类和 `POSIX` 字符类符合 Unicode 技术标准 #18：Unicode\
  \ 正则表达式附录 C：兼容性属性。 |\n| `Pattern.UNIX_LINES` | 启用 UNIX 行模式。设置此标志后，仅将 `\\n` 字符识别为行终止符。\
  \ |\n\n以下代码片段编译一个设置了 `CASE_INSENSTIVE` 和 `DOTALL` 标志的正则表达式，因此匹配将对 US-ASCII 字符集不区分大小写，并且表达式\
  \ `.`（点号）将匹配行终止符。例如，`\"A@\\n\"` 将被以下模式匹配：\n\n```\n// 准备一个正则表达式\nString regex = \"\
  [a-z]@.\";\n// 使用 CASE_INSENSITIVE 和 DOTALL 标志将正则表达式编译为 Pattern 对象\nPattern p =\
  \ Pattern.compile(regex, Pattern.CASE_INSENSITIVE | Pattern.DOTALL);\n```\n\n创建\
  \ Matcher\n\n`Matcher` 类的实例用于通过解释 `Pattern` 对象中保存的已编译模式来对字符序列执行匹配。它没有 `public` 构造方法。`Pattern`\
  \ 类的 `matcher()` 方法用于获取 `Matcher` 类的实例。该方法将要由模式匹配的字符串作为参数。以下代码片段展示了如何获取 `Matcher`：\n\
  \n```\n// 创建一个 Pattern 对象并将其编译为 Pattern\nString regex = \"[a-z]@.\";\nPattern p\
  \ = Pattern.compile(regex);\n// 要执行匹配的字符串\nString str = \"abc@yahoo.com,123@cnn.com,ksharan@jdojo.com\"\
  ;\n// 使用 Pattern 对象 p 为 str 获取一个 matcher 对象\nMatcher m = p.matcher(str);\n```\n\n\
  \n\n此时，`Matcher`对象 `m` 已将 `Pattern` 对象 `p` 中表示的模式与 `str` 中的字符序列关联起来。它已准备好开始匹配操作。通常，`Matcher`\
  \ 对象用于在字符序列中查找匹配项。匹配可能成功或失败。如果匹配成功，您可能希望了解匹配的起始和结束位置以及匹配的文本。您可以查询 `Matcher` 对象来获取所有这些信息。\n\
  \n匹配模式\n\n您需要使用 `Matcher` 的以下方法对输入执行匹配：\n\n*   `find()` 方法\n*   `start()` 方法\n*\
  \   `end()` 方法\n*   `group()` 方法\n\n`find()` 方法用于在输入中查找与模式匹配的子串。如果查找成功，则返回 `true`。否则，返回\
  \ `false`。首次调用此方法将从输入的开头开始搜索模式。如果上一次调用此方法成功，则下一次调用将从上一次匹配之后开始搜索。通常，`find()` 方法会在\
  \ `while` 循环中调用，以查找所有匹配项。它是一个重载方法。`find()` 方法的另一个版本接受一个整数参数，该参数是开始查找匹配项的偏移量。\n\n\
  `start()` 方法返回上一次匹配的起始索引。通常，它在 `find()` 方法调用成功后使用。\n\n`end()` 方法返回匹配字符串中最后一个字符的索引加一。因此，在成功调用\
  \ `find()` 方法后，`end()` 和 `start()` 方法返回值的差值即为匹配字符串的长度。使用 `String` 类的 `substring()`\
  \ 方法，您可以按如下方式获取匹配的字符串：\n\n```\n// 接前面的代码片段\nif (m.find()) {\n// str 是我们正在查找的字符串\n\
  String foundStr = str.substring(m.start(), m.end());\nSystem.out.println(\"找到的字符串是:\"\
  \ + foundStr);\n}\n```\n\n`group()` 方法返回上一次成功的 `find()` 方法调用所找到的字符串。回想一下，您也可以使用\
  \ `String` 类的 `substring()` 方法，通过匹配的起始和结束位置来获取上一次匹配的字符串。因此，前面的代码片段可以替换为以下代码：\n\n\
  ```\nif (m.find()) {\nString foundStr = m.group();\nSystem.out.println(\"找到的文本是:\"\
  \ + foundStr);\n}\n```\n\n清单 18-3 说明了这些方法的使用。为清晰起见，省略了对方法参数的验证。该程序尝试在不同的字符串中查找模式\
  \ `\"[abc]@.\"`。\n\n```\n// PatternMatcher.java\npackage com.jdojo.regex;\nimport\
  \ java.util.regex.Pattern;\nimport java.util.regex.Matcher;\npublic class PatternMatcher\
  \ {\npublic static void main(String[] args) {\nString regex = \"[abc]@.\";\nString\
  \ source = \"cric@jdojo.com is a valid email address\";\nPatternMatcher.findPattern(regex,\
  \ source);\nsource = \"kelly@jdojo.com is invalid\";\nPatternMatcher.findPattern(regex,\
  \ source);\nsource = \"a@band@yea@u\";\nPatternMatcher.findPattern(regex, source);\n\
  source = \"There is an @ sign here\";\nPatternMatcher.findPattern(regex, source);\n\
  }\npublic static void findPattern(String regex, String source) {\n// 将正则表达式编译为 Pattern\
  \ 对象\nPattern p = Pattern.compile(regex);\n// 获取 Matcher 对象\nMatcher m = p.matcher(source);\n\
  // 打印正则表达式和源文本\nSystem.out.println(\"\\nRegex: \" + regex);\nSystem.out.println(\"\
  Text: \" + source);\n// 执行查找\nboolean found = false;\nwhile (m.find()) {\nSystem.out.printf(\"\
  Matched Text: %s, Start: %s, End: %s%n\",\nm.group(), m.start(), m.end());\n// 我们至少找到了一个匹配项。将\
  \ found 标志设置为 true\nfound = true;\n}\nif (!found) {\n// 我们没有找到任何匹配项\nSystem.out.println(\"\
  No match found\");\n}\n}\n}\n清单 18-3.\n使用 Pattern 和 Matcher 类\n```\n\n```\nRegex:\
  \ [abc]@.\nText: cric@jdojo.com is a valid email address\nMatched Text: c@j, Start:\
  \ 3, End: 6\nRegex: [abc]@.\nText: kelly@jdojo.com is invalid\nNo match found\n\
  Regex: [abc]@.\nText: a@band@yea@u\nMatched Text: a@b, Start: 0, End: 3\nMatched\
  \ Text: a@u, Start: 9, End: 12\nRegex: [abc]@.\nText: There is an @ sign here\n\
  No match found\n```\n\n查询匹配项\n\n在上一节中，我向您展示了如何查询 `Matcher` 以获取匹配的状态（或详细信息）。获取此类状态的方法有\
  \ `start()`、`end()`、`group()` 和 `groupCount()`。匹配状态也可以表示为 `MatchResult` 的实例，这是一个接口。您可以使用\
  \ `MatchResult` 的以下方法来获取匹配状态：\n\n*   `int end()`\n*   `int end(int group)`\n*  \
  \ `String group()`\n*   `String group(int group)`\n*   `int groupCount()`\n*   `int\
  \ start()`\n*   `int start(int group)`\n\n如何获取 `MatchResult` 的实例？调用 `Matcher` 的\
  \ `toMatchResult()` 方法获取匹配状态的一个副本：\n\n```\nMatcher m = /* 在此处获取一个 matcher */\nwhile\
  \ (m.find()) {\nMatchResult result = m.toMatchResult();\n// 在此处使用 result...\n}\n\
  ```\n\n为什么您要使用 `MatchResult` 而不是 `Matcher` 上的方法来获取匹配状态？有两个原因：\n\n*   `Matcher` 的\
  \ `toMatchResult()` 方法返回匹配状态的一个副本，这意味着 `Matcher` 匹配状态的任何后续更改都不会影响 `MatchResult`。在匹配过程中，您可以将所有匹配状态收集到\
  \ `MatchResult` 实例中，然后在程序中稍后进行分析。\n*   `MatchResult` 是不可变的。如果您有处理匹配项的处理器，您可以安全地将\
  \ `MatchResult` 实例传递给这些处理器。传递 `Matcher` 是不安全的，因为处理器可能会意外修改 `Matcher`，从而以非预期的方式影响您的程序。\n\
  \n`Matcher` 类中有几个方法与 `MatchResult` 一起工作。我将在本章后面介绍它们。现在，只需记住 `MatchResult` 包含匹配详细信息的副本。\n\
  \n当心反斜杠\n\n在正则表达式中使用反斜杠时要小心。字符类 `\\w`（即反斜杠后跟 `w`）表示一个单词字符。回想一下，反斜杠字符也用作转义字符的一部分。因此，`\\\
  w` 必须写成字符串字面量 `\\\\w`。您也可以使用反斜杠来消除元字符的特殊含义。例如，`[` 标记字符类的开始。匹配括号内数字（例如 `[1]`、`[5]`\
  \ 等）的正则表达式是什么？请注意，正则表达式 `[0-9]` 将匹配任何数字。该数字可能包含在括号内，也可能不包含。您可能会考虑使用 `[[0-9]]`。它不会给您任何错误；但是，它也无法完成工作。您还可以将一个字符类嵌入到另一个字符类中。例如，您可以编写\
  \ `[a-z[0-9]]`，这与 `[a-z0-9]` 相同。在这种情况下，`[[0-9]]` 中的第一个 `[` 应被视为普通字符，而不是元字符。您必须使用反斜杠，如\
  \ `\\[[0-9]\\]`。要将此正则表达式编写为字符串字面量，当您将其括在双引号中时，需要使用两个反斜杠，如 `\"\\\\[[0-9]\\\\]]\"\
  `。\n\n正则表达式中的量词\n\n您还可以指定正则表达式中一个字符可以匹配字符序列的次数。如果您想匹配所有两位整数，您的正则表达式将是 `\\d\\d`，这与\
  \ `[0-9][0-9]` 相同。匹配任何整数的正则表达式是什么？根据您目前所学的知识，您无法编写匹配任何整数的正则表达式。您需要能够使用正则表达式表达“一个或多个数字”的模式。这就引出了量词的概念。量词及其含义列于表\
  \ 18-4 中。\n\n表 18-4.\n\n量词及其含义\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n量词\n |\n  含义\n |\n\n| --- | --- | --- | --- | --- |\n\n`*`\n |\n  零次或多次\n |\n\
  \n`+`\n |\n  一次或多次\n |\n\n`?`\n |\n  一次或零次\n |\n\n`{m}`\n |\n  恰好 `m` 次\n |\n\n\
  `{m, }`\n |\n  至少 `m` 次\n |\n\n`{m, n}`\n |\n  至少 `m` 次，但不超过 `n` 次\n |\n\n需要注意的是，量词必须跟在它指定数量的字符或字符类之后。用于匹配任意整数的正则表达式是\
  \ `\\d+`，它表示匹配一个或多个数字。这个匹配整数的方案正确吗？不，不正确。假设你的文本是“This is text123 which contains\
  \ 10 and 120”。如果你对这个字符串运行模式 `\\d+`，它将匹配到 123、10 和 120。请注意，`123` 并不是作为一个整数使用的；相反，它是单词\
  \ `text123` 的一部分。如果你正在查找文本中的整数，那么 `text123` 中的 123 当然不符合整数的条件。你需要匹配文本中构成一个单词的所有整数。\n\
  \n需要是发明之母。现在你需要指定，匹配应该只在单词边界上进行，而不是在包含嵌入整数的文本内部。这对于从之前的结果中排除整数 123 是必要的。下一节将讨论使用元字符来匹配边界。\n\
  \n利用你在本节学到的知识，让我们改进你的电子邮件地址验证。在一个电子邮件地址中，必须有一个且只有一个 `@` 符号。要指定一个且只有一个字符，你可以在正则表达式中使用该字符一次，尽管你也可以使用\
  \ `{1}` 作为量词。例如，`X{1}` 和 `X` 在正则表达式中的含义相同。在这方面你没问题。然而，你目前的解决方案只支持 `@` 符号前后各一个字符。实际上，电子邮件地址中\
  \ `@` 符号前后可以有多个字符。你可以将验证电子邮件地址的模式指定为 `\\w+@\\w+`，这意味着：一个或多个单词字符，一个 `@` 符号，以及一个或多个单词字符。\n\
  \n匹配边界\n\n到目前为止，你并不关心模式匹配在文本中的位置。有时，你可能想知道匹配是否发生在行的开头。你可能只关心在单词中找到匹配（而不是作为任何单词的一部分）时，才查找并替换特定的匹配。例如，你可能想将字符串中的单词\
  \ `apple` 替换为单词 `orange`。假设你的字符串是“I have an apple and five pineapples”。当然，你不想将这个字符串中所有出现的\
  \ `apple` 都替换为 `orange`。如果你这样做了，你的新字符串就会变成“I have an orange and five pineoranges”。实际上，你希望新字符串是“I\
  \ have an orange and five pineapples”。你想将单词 `apple` 作为一个独立的单词来匹配，而不是作为任何其他单词的一部分。\n\
  \n表 18-5 列出了所有可以在正则表达式中使用的边界匹配器。\n\n表 18-5.\n\n正则表达式中的边界匹配器列表\n\n边界匹配器\n |\n  含义\n\
  \ |\n\n| --- | --- | --- | --- | --- |\n\n^\n |\n  一行的开头\n |\n\n`$`\n |\n  一行的结尾\n\
  \ |\n\n`\\b`\n |\n  一个单词边界\n |\n\n`\\B`\n |\n  一个非单词边界\n |\n\n`\\A`\n |\n  输入的开头\n\
  \ |\n\n`\\G`\n |\n  上一个匹配的结尾\n |\n\n`\\Z`\n |\n  输入的结尾，但如果有最终终止符，则不包括它\n |\n\n`\\\
  z`\n |\n  输入的结尾\n |\n\n在 Java 中，单词字符由 `[a-zA-Z_0-9]` 定义。单词边界是一个零宽度的匹配，它可以匹配以下内容：\n\
  \n*   单词字符和非单词字符之间\n*   字符串开头和单词字符之间\n*   单词字符和字符串结尾之间\n\n非单词边界也是一个零宽度的匹配，它与单词边界相反。它匹配以下内容：\n\
  \n*   空字符串\n*   两个单词字符之间\n*   两个非单词字符之间\n*   非单词字符与字符串开头或结尾之间\n\n匹配单词 `apple` 的正则表达式是\
  \ `\\bapple\\b`，这意味着：一个单词边界，单词 `apple`，以及一个单词边界。清单 18-4 演示了如何使用正则表达式匹配单词边界。\n\n\
  ```\n// MatchBoundary.java\npackage com.jdojo.regex;\npublic class MatchBoundary\
  \ {\npublic static void main(String[] args) {\n// Prepare regular expression. Use\
  \ \\\\b to get \\b inside the string literal.\nString regex = \"\\\\bapple\\\\b\"\
  ;\nString replacementStr = \"orange\";\nString inputStr = \"I have an apple and\
  \ five pineapples\";\nString newStr = inputStr.replaceAll(regex, replacementStr);\n\
  System.out.printf(\"Regular Expression: %s%n\", regex);\nSystem.out.printf(\"Input\
  \ String: %s%n\", inputStr);\nSystem.out.printf(\"Replacement String: %s%n\", replacementStr);\n\
  System.out.printf(\"New String: %s%n\", newStr);\n}\n}\n清单 18-4.\n匹配单词边界\n```\n\n\
  ```\nRegular Expression: \\bapple\\b\nInput String: I have an apple and five pineapples\n\
  Replacement String: orange\nNew String: I have an orange and five pineapples\n```\n\
  \n有两个边界匹配器：`^`（一行的开头）和 `\\A`（输入的开头）。输入字符串可能由多行组成。在这种情况下，`\\A` 将匹配整个输入字符串的开头，而 `^`\
  \ 将匹配输入中每一行的开头。例如，正则表达式 `\"^The\"` 将匹配位于任何行开头的输入字符串 `the`。\n\n分组和反向引用\n\n你可以将多个字符作为一个单元来处理，将它们作为一个组。通过在括号内包含一个或多个字符，可以在正则表达式内部创建一个组。`(ab)`、`ab(z)`、`ab(ab)(xyz)`、`(the((is)(is)))`\
  \ 都是组的例子。正则表达式中的每个组都有一个组号。组号从 1 开始。`Matcher` 类有一个 `groupCount()` 方法，它返回与 `Matcher`\
  \ 实例关联的模式中的组数。有一个特殊的组称为组 0（零）。它指的是整个正则表达式。组 0 不会被 `groupCount()` 方法报告。\n\n每个组是如何编号的？正则表达式中的每个左括号都标记着一个新组的开始。表\
  \ 18-6 列出了一些正则表达式中组编号的示例。请注意，尽管 `Matcher` 类的 `groupCount()` 方法不报告组 0，但我还是为所有正则表达式列出了组\
  \ 0。列表中的最后一个示例显示，即使正则表达式中没有显式的组，组 0 也是存在的。\n\n表 18-6.\n\n正则表达式中组的示例\n\n正则表达式: AB(XY)\n\
  \ |\n\n| --- | --- | --- |\n\n`Matcher` 类的 `groupCount()` 方法报告的组数:\n\n|\n\n组号\n\
  \ |\n  组文本\n |\n\n`0`\n |\n  `AB(XY)`\n |\n\n`1`\n |\n  `(XY)`\n |\n\n正则表达式: (AB)(XY)\n\
  \ |\n\n`Matcher` 类的 `groupCount()` 方法报告的组数:\n\n|\n\n组号\n |\n  组文本\n |\n\n`0`\n |\n\
  \  `(AB)(XY)`\n |\n\n`1`\n |\n  `(AB)`\n |\n\n`2`\n |\n  `(XY)`\n |\n\n正则表达式: ((A)((X)(Y)))\n\
  \ |\n\n`Matcher` 类的 `groupCount()` 方法报告的组数: `5`\n |\n\n组号\n |\n  组文本\n |\n\n`0`\n\
  \ |\n  `((A)((X)(Y)))`\n |\n\n`1`\n |\n  `((A)((X)(Y)))`\n |\n\n`2`\n |\n  `(A)`\n\
  \ |\n\n`3`\n |\n  `((X)(Y))`\n |\n\n`4`\n |\n  `(X)`\n |\n\n`5`\n |\n  `(Y)`\n |\n\
  \n正则表达式: ABXY\n |\n\n`Matcher` 类的 `groupCount()` 方法报告的组数: 0\n |\n\n组号\n |\n  组文本\n\
  \ |\n\n`0`\n |\n  `ABXY`\n |\n\n\n\n你还可以在正则表达式中反向引用分组编号。假设你想匹配以 `\"ab\"` 开头，后跟 `\"\
  xy\"`，再跟 `\"ab\"` 的文本。你可以编写正则表达式 `\"abxyab\"`。你也可以通过创建一个包含 `\"ab\"` 的分组并反向引用它来实现相同的结果，即\
  \ `\"(ab)xy\\1\"`。这里，`\"\\1\"` 引用的是分组 1，在本例中即 `\"(ab)\"`。你可以使用 `\"\\2\"` 引用分组 2，`\"\
  \\3\"` 引用分组 3，以此类推。那么正则表达式 `\"(ab)xy\\12\"` 将如何被解释呢？你使用了 `\"\\12\"` 作为分组反向引用。正则表达式引擎足够智能，能够检测到\
  \ `\"(ab)xy\\12\"` 中只包含一个分组。它会将 `\"\\1\"` 用作对分组 1（即 `\"(ab)\"`）的反向引用，并将 `2` 视为一个普通字符。因此，正则表达式\
  \ `\"(ab)xy\\12\"` 等同于 `\"abxyab2\"`。如果一个正则表达式有 12 个或更多分组，其中的 `\\12` 将引用第 12 个分组。\n\
  \n你还可以通过使用正则表达式中的分组编号来获取匹配文本的一部分。`Matcher` 类中的 `group()` 方法是被重载的。你已经见过不带参数的 `group()`\
  \ 方法。该方法的另一个版本接受一个分组编号作为参数，并返回该分组匹配的文本。假设输入文本中嵌入了电话号码。所有电话号码都以单词形式出现，且长度为十位数字。前三位数字是区号。正则表达式\
  \ `\\b\\d{10}\\b` 将匹配输入文本中的所有电话号码。然而，要获取前三位数字（区号），你需要编写额外的代码。如果你使用分组来构建正则表达式，就可以通过分组编号获取区号。将电话号码前三位数字放入一个分组的正则表达式为\
  \ `\\b(\\d{3})\\d{7}\\b`。如果 `m` 是与该模式关联的 `Matcher` 对象的引用，那么在成功匹配后，`m.group(1)` 将返回电话号码的前三位数字。你也可以使用\
  \ `m.group(0)` 获取整个匹配文本。清单 18-5 演示了如何在正则表达式中使用分组来获取电话号码的区号部分。请注意，`2339829` 不匹配该模式，因为它只有\
  \ 7 位数字，而所使用的模式只查找 10 位电话号码。\n\n```\n// PhoneMatcher.java\npackage com.jdojo.regex;\n\
  import java.util.regex.Pattern;\nimport java.util.regex.Matcher;\npublic class PhoneMatcher\
  \ {\npublic static void main(String[] args) {\n// 准备一个正则表达式：一个由 3 位数字组成的分组，后跟 7\
  \ 位数字。\nString regex = \"\\\\b(\\\\d{3})\\\\d{7}\\\\b\";\n// 编译正则表达式\nPattern p\
  \ = Pattern.compile(regex);\nString source = \"3342449027, 2339829, and 6152534734\"\
  ;\n// 获取 Matcher 对象\nMatcher m = p.matcher(source);\n// 开始匹配并显示找到的区号\nwhile (m.find())\
  \ {\nString phone = m.group();\nString areaCode = m.group(1);\nSystem.out.printf(\"\
  Phone: %s, Area Code: %s%n\", phone, areaCode);\n}\n}\n}\n清单 18-5.\n在正则表达式中使用分组\n\
  ```\n\n```\nPhone: 3342449027, Area Code: 334\nPhone: 6152534734, Area Code: 615\n\
  ```\n\n分组也用于格式化匹配的字符串或将其替换为另一个字符串。假设你想将所有 10 位电话号码格式化为 `(xxx) xxx-xxxx`，其中 x 代表一位数字。如你所见，电话号码分为三组：前三位数字、中间三位数字和最后四位数字。你需要使用三个分组来构建一个正则表达式，以便通过分组编号引用这三个匹配的分组。该正则表达式为\
  \ `\\b(\\d{3})(\\d{3})(\\d{4})\\b`。开头和结尾的 `\\b` 表示你只对单词边界处的十位数字感兴趣。以下代码片段演示了如何显示格式化后的电话号码：\n\
  \n```\n// 准备正则表达式\nString regex = \"\\\\b(\\\\d{3})(\\\\d{3})(\\\\d{4})\\\\b\";\n\
  // 编译正则表达式\nPattern p = Pattern.compile(regex);\nString source = \"3342449027, 2339829,\
  \ and 6152534734\";\n// 获取 Matcher 对象\nMatcher m = p.matcher(source);\n// 开始匹配并显示格式化后的电话号码\n\
  while (m.find()) {\nSystem.out.printf(\"Phone: %s, Formatted Phone: (%s) %s-%s%n\"\
  ,\nm.group(), m.group(1), m.group(2), m.group(3));\n}\n```\n\n```\nPhone: 3342449027,\
  \ Formatted Phone: (334) 244-9027\nPhone: 6152534734, Formatted Phone: (615) 253-4734\n\
  ```\n\n你也可以将输入文本中的所有 10 位电话号码替换为格式化后的电话号码。你已经学会了如何使用 `String` 类的 `replaceAll()`\
  \ 方法将匹配的文本替换为其他文本。`Matcher` 类也有一个 `replaceAll()` 方法，可以实现相同的功能。在将电话号码替换为格式化电话号码时，你面临的问题是如何获取匹配电话号码的各个部分。在这种情况下，替换文本也包含匹配的文本。你无法预先知道什么文本会匹配该模式。分组在此处派上了用场。在替换文本中，`$n`（其中\
  \ `n` 是分组编号）引用分组 `n` 匹配的文本。例如，`$1` 引用第一个匹配的分组。将电话号码替换为格式化电话号码的替换文本将是 `($1) $2-$3`。清单\
  \ 18-6 演示了在替换文本中引用分组的技术。\n\n```\n// MatchAndReplace.java\npackage com.jdojo.regex;\n\
  import java.util.regex.Matcher;\nimport java.util.regex.Pattern;\npublic class MatchAndReplace\
  \ {\npublic static void main(String[] args) {\n// 准备正则表达式\nString regex = \"\\\\\
  b(\\\\d{3})(\\\\d{3})(\\\\d{4})\\\\b\";\nString replacementText = \"($1) $2-$3\"\
  ;\nString source = \"3342449027, 2339829, and 6152534734\";\n// 编译正则表达式\nPattern\
  \ p = Pattern.compile(regex);\n// 获取 Matcher 对象\nMatcher m = p.matcher(source);\n\
  // 将电话号码替换为格式化后的电话号码\nString formattedSource = m.replaceAll(replacementText);\n\
  System.out.printf(\"Text: %s%n\", source );\nSystem.out.printf(\"Formatted Text:\
  \ %s%n\", formattedSource );\n}\n}\n清单 18-6.\n在替换文本中反向引用分组\n```\n\n```\nText: 3342449027,\
  \ 2339829, and 6152534734\nFormatted Text: (334) 244-9027, 2339829, and (615) 253-4734\n\
  ```\n\n你也可以使用 `String` 类实现相同的结果。你完全不需要使用 `Pattern` 和 `Matcher` 类。以下代码片段使用 `String`\
  \ 类演示了相同的概念。`String` 类在内部使用 `Pattern` 和 `Matcher` 类来获取结果。\n\n```\n// 准备正则表达式\nString\
  \ regex = \"\\\\b(\\\\d{3})(\\\\d{3})(\\\\d{4})\\\\b\";\nString replacementText\
  \ = \"($1) $2-$3\";\nString source = \"3342449027, 2339829, and 6152534734\";\n\
  // 使用 String 类的 replaceAll() 方法\nString formattedSource = source.replaceAll(regex,\
  \ replacementText)\n```\n\n`Matcher` 类包含以下 `replaceAll()` 和 `replaceFirst()` 方法：\n\
  \n*   `String replaceAll(String replacement)`\n\n*   `String replaceAll(Function<MatchResult,String>\
  \ replacer)`\n\n*   `String replaceFirst(String replacement)`\n\n*   `String replaceFirst(Function<MatchResult,String>\
  \ replacer)`\n\n提示\n\n`replaceAll(Function<MatchResult,String> replacer)` 和 `replaceFirst(Function<MatchResult,String>\
  \ replacer)` 方法是在 Java 9 中添加到 `Matcher` 类的。\n\n\n\n`replaceAll(String)` 和 `replaceFirst(String)`\
  \ 方法的工作方式与我在本节中解释的 `String` 类中同名方法相同。其他版本接受一个 `Function<MatchResult,String>` 作为参数。该\
  \ `Function` 接收一个 `MatchResult` 并返回一个替换字符串。这些方法让你有机会在 `Function` 内部使用自己的逻辑来获取替换字符串。所有这四个方法在执行查找和替换之前都会先重置匹配器。`Function<T,R>`\
  \ 是 `java.util.function` 包中的一个接口。我将在本系列第二卷的第 5 章中讨论 `Function` 接口。\n\n假设你想在输入字符串中查找\
  \ 10 位数的电话号码，并且你想屏蔽所有区号为 334 的电话号码。例如，如果电话号码是 3342449027，你想将其替换为 `(***) ***-****`。你可以使用\
  \ `Matcher` 类中新的 `replaceAll()` 方法来实现这一点。清单 18-7 包含了完整的程序。\n\n```\n// MaskAndFormat.java\n\
  package com.jdojo.regex;\nimport java.util.regex.MatchResult;\nimport java.util.regex.Matcher;\n\
  import java.util.regex.Pattern;\npublic class MaskAndFormat {\npublic static void\
  \ main(String[] args) {\n// 准备正则表达式\nString regex = \"\\\\b(\\\\d{3})(\\\\d{3})(\\\
  \\d{4})\\\\b\";\nString source = \"3342449027, 2339829, and 6152534734\";\n// 编译正则表达式\n\
  Pattern p = Pattern.compile(regex);\n// 获取 Matcher 对象\nMatcher m = p.matcher(source);\n\
  // 将电话号码替换为格式化后的电话号码\nString formattedSource = m.replaceAll(MaskAndFormat::mask);\n\
  System.out.printf(\"文本: %s%n\", source );\nSystem.out.printf(\"格式化文本: %s%n\", formattedSource\
  \ );\n}\nprivate static String mask(MatchResult result) {\nString replacementText\
  \ = \"($1) $2-$3\";\nString areaCode = result.group(1);\nif(\"334\".equals(areaCode))\
  \ {\nreplacementText = \"(***) ***-****\";\n}\nreturn replacementText;\n}\n}\n清单\
  \ 18-7.\n根据区号使用逻辑屏蔽或格式化电话号码\n```\n\n```\n文本: 3342449027, 2339829, and 6152534734\n\
  格式化文本: (***) ***-****, 2339829, and (615) 253-4734\n```\n\n注意 `main()` 方法中使用了以下语句：\n\
  \n```\nString formattedSource = m.replaceAll(MaskAndFormat::mask);\n```\n\n`replaceAll()`\
  \ 方法的参数是 `MaskAndFormat::mask`，这是对 `MaskAndFormat` 类的 `mask()` 静态方法的方法引用。当找到匹配项时，`MatchResult`\
  \ 会被传递给 `mask()` 方法，并且该方法返回的字符串被用作替换文本。请注意你如何在 `mask()` 方法中屏蔽了区号为 334 的电话号码。所有其他区号使用与之前示例相同的替换文本。\n\
  \n使用命名组\n\n在大型正则表达式中使用组编号很麻烦。Java 也支持命名组。你可以像在上一节中使用组编号那样，使用组名完成所有操作：\n\n*   你可以为组命名。\n\
  *   你可以使用组名进行反向引用。\n*   你可以在替换文本中引用组名。\n*   你可以使用组名获取匹配的文本。\n\n和之前一样，你需要使用一对圆括号来创建一个组。起始括号后面跟着一个\
  \ `?` 和一个放在尖括号中的组名。定义命名组的格式如下：\n\n```\n(?<组名>模式)\n```\n\n组名必须仅由字母和数字组成：`a` 到 `z`、`A`\
  \ 到 `Z` 以及 `0` 到 `9`。组名必须以字母开头。以下是一个使用三个命名组的正则表达式示例。组名分别是 `areaCode`、`prefix` 和\
  \ `lineNumber`。该正则表达式用于匹配一个 10 位数的电话号码。\n\n```\n\\b(?<areaCode>\\d{3})(?<prefix>\\\
  d{3})(?<lineNumber>\\d{4})\\b\n```\n\n你可以使用 `\\k<组名>` 来反向引用名为 `组名` 的组。电话号码中的区号和前缀部分使用相同的模式。你可以将之前的正则表达式重写为以下形式，以反向引用\
  \ `areaCode` 组：\n\n```\n\\b(?<areaCode>\\d{3})\\k<areaCode>(?<lineNumber>\\d{4})\\\
  b\n```\n\n你可以在替换文本中引用命名组，格式为 `${组名}`。以下代码片段展示了一个包含三个命名组的正则表达式，以及使用其名称引用这三个组的替换文本：\n\
  \n```\nString regex = \"\\\\b(?<areaCode>\\\\d{3})(?<prefix>\\\\d{3})(?<lineNumber>\\\
  \\d{4})\\\\b\";\nString replacementText = \"(${areaCode}) ${prefix}-${lineNumber}\"\
  ;\n```\n\n当你为一个组命名时，该组仍然会获得一个组编号，如上一节所述。即使一个组有名称，你仍然可以通过其组编号来引用它。上述代码片段被重写如下，其中第三个组（已命名为\
  \ `lineNumber`）在替换文本中通过其组编号 `$3` 引用：\n\n```\nString regex = \"\\\\b(?<areaCode>\\\
  \\d{3})(?<prefix>\\\\d{3})(?<lineNumber>\\\\d{4})\\\\b\";\nString replacementText\
  \ = \"(${areaCode}) ${prefix}-$3\";\n```\n\n成功匹配后，你可以使用 `Matcher` 类的 `group(String\
  \ groupName)` 方法来获取该组的匹配文本。\n\n清单 18-8 展示了如何在正则表达式中使用组名，以及如何在替换文本中使用这些名称。\n\n```\n\
  // NamedGroups.java\npackage com.jdojo.regex;\nimport java.util.regex.Matcher;\n\
  import java.util.regex.Pattern;\npublic class NamedGroups {\npublic static void\
  \ main(String[] args) {\n// 准备正则表达式\nString regex =\n\"\\\\b(?<areaCode>\\\\d{3})(?<prefix>\\\
  \\d{3})(?<lineNumber>\\\\d{4})\\\\b\";\n// 前两个组用名称引用，第三个组用其编号引用\nString replacementText\
  \ = \"(${areaCode}) ${prefix}-$3\";\nString source = \"3342449027, 2339829, and\
  \ 6152534734\";\n// 编译正则表达式\nPattern p = Pattern.compile(regex);\n// 获取 Matcher\
  \ 对象\nMatcher m = p.matcher(source);\n// 将电话号码替换为格式化后的电话号码\nString formattedSource\
  \ = m.replaceAll(replacementText);\nSystem.out.printf(\"文本: %s%n\", source);\nSystem.out.printf(\"\
  格式化文本: %s%n\", formattedSource);\n}\n}\n清单 18-8.\n在正则表达式中使用命名组\n```\n\n```\n文本:\
  \ 3342449027, 2339829, and 6152534734\n格式化文本: (334) 244-9027, 2339829, and (615)\
  \ 253-4734\n```\n\n使用 `Matcher` 类的 `find()` 方法成功匹配后，你可以使用其 `start()` 和 `end()` 方法来了解组的匹配边界。这些方法被重载：\n\
  \n*   `int start()`\n*   `int start(int groupNumber)`\n*   `int start(String groupName)`\n\
  *   `int end()`\n*   `int end(int groupNumber)`\n*   `int end(String groupName)`\n\
  \n不带参数的方法返回上一次匹配的起始和结束位置。另外两组方法返回上一次匹配中某个组的起始和结束位置。以下代码片段使用了之前匹配字符串中 10 位电话号码的示例。它打印了每次成功匹配时每个组的起始位置。\n\
  \n```\n// 准备正则表达式\nString regex = \"\\\\b(?<areaCode>\\\\d{3})(?<prefix>\\\\d{3})(?<lineNumber>\\\
  \\d{4})\\\\b\";\nString source = \"3342449027, 2339829, and 6152534734\";\nSystem.out.println(\"\
  源文本: \" + source);\n// 编译正则表达式\nPattern p = Pattern.compile(regex);\n// 获取 Matcher\
  \ 对象\nMatcher m = p.matcher(source);\nwhile(m.find()) {\nString matchedText = m.group();\n\
  int start1 = m.start(\"areaCode\");\nint start2 = m.start(\"prefix\");\nint start3\
  \ = m.start(\"lineNumber\");\nSystem.out.printf(\"匹配文本: %s\", matchedText);\nSystem.out.printf(\"\
  . 区号起始: %d\", start1);\nSystem.out.printf(\", 前缀起始: %d\", start2);\nSystem.out.printf(\"\
  , 线路号起始: %d%n\", start3);\n}\n```\n\n```\n源文本: 3342449027, 2339829, and 6152534734\n\
  匹配文本: 3342449027\\. 区号起始: 0, 前缀起始: 3, 线路号起始: 6\n匹配文本: 6152534734\\. 区号起始: 25, 前缀起始:\
  \ 28, 线路号起始: 31\n```\n\n重置匹配器\n\n\n\n如果你已经完成了对输入文本的模式匹配，并希望从头开始重新匹配，你需要使用 `Matcher`\
  \ 类的 `reset()` 方法。调用 `reset()` 方法后，下一次匹配模式的调用将从输入文本的开头开始。`reset()` 方法已被重载。另一个版本允许你将不同的输入文本与模式关联起来。如果模式保持不变，这两个版本的\
  \ `reset()` 方法允许你重用 `Matcher` 类的任何现有实例。这通过避免为匹配同一模式而创建新的 `Matcher` 对象，从而提升了程序的性能。\n\
  \n关于电子邮件验证的总结\n\n现在你已经学习了正则表达式的主要部分。你已经准备好完成电子邮件地址验证的示例。你的电子邮件地址将根据以下规则进行验证：\n\n\
  *   所有电子邮件地址的格式均为 `name@domain`。\n\n*   名称部分必须以字母数字字符（`a-z, A-Z, 0-9`）开头。\n\n* \
  \  名称部分必须至少包含一个字符。\n\n*   名称部分可以包含任何字母数字字符（`a-z, A-Z, 0-9`）、下划线、连字符或点号。\n\n*   域名部分必须至少包含一个点号。\n\
  \n*   域名部分中的点号前后必须至少有一个字母数字字符。\n\n*   你还应该能够使用组号来引用名称和域名部分。此验证要求你将名称和域名部分作为组放置在正则表达式内部。\n\
  \n以下正则表达式将根据这些规则匹配电子邮件地址。组 1 是名称部分，而组 2 是域名部分。\n\n```\n([a-zA-Z0-9]+[\\\\w\\\\-.]*)@([a-zA-Z0-9]+\\\
  \\.[a-zA-Z0-9\\\\-.]+)\n```\n\n你添加的验证越多，正则表达式就越复杂。鼓励读者为电子邮件地址添加更多验证，并相应地修改上述正则表达式。此正则表达式允许域名部分中出现两个连续的点号。你如何防止这种情况？\n\
  \n使用正则表达式进行查找和替换\n\n查找和替换是正则表达式支持的一项非常强大的技术。有时你可能需要查找一个模式并根据其匹配的文本进行替换；也就是说，替换文本是根据某些条件决定的。Java\
  \ 正则表达式的设计者预见到了这种需求，并在 `Matcher` 类中包含了两个方法，让你能够完成此任务：\n\n*   `Matcher appendReplacement(StringBuffer\
  \ sb, String replacement)`\n\n*   `Matcher appendReplacement(StringBuilder sb, String\
  \ replacement)`\n\n*   `StringBuffer appendTail(StringBuffer sb)`\n\n*   `StringBuffer\
  \ appendTail(StringBuilder sb)`\n\n提示\n\n与 `StringBuilder` 配合使用的 `appendReplacement()`\
  \ 和 `appendTail()` 方法版本是在 Java 9 中添加的。\n\n考虑以下文本：\n\n```\n\"A train carrying 125\
  \ men and women was traveling at the speed of 100 miles per hour. The train fare\
  \ was 75 dollars per person.\"\n```\n\n你想找到文本中的所有数字（例如，125、100 和 75）并按如下方式替换它们：\n\
  \n*   “100” 替换为 “a hundred”\n\n*   “> 100” 替换为 “more than a hundred”\n\n*   “< 100”\
  \ 替换为 “less than a hundred”\n\n替换后，此文本应如下所示：\n\n```\n\"A train carrying more than\
  \ a hundred men and women was traveling at the speed of a hundred miles per hour.\
  \ The train fare was less than a hundred dollars per person.\"\n```\n\n要完成此任务，你需要找到文本中嵌入的所有数字，将找到的数字与\
  \ 100 进行比较，并决定替换文本。当你使用文本编辑器查找和替换文本时，也会出现这种情况。文本编辑器会高亮显示你正在搜索的单词，你输入一个新单词，文本编辑器就会为你进行替换。你也可以使用这两个方法创建文本编辑器中那样的查找/替换程序。通常，这些方法与\
  \ `Matcher` 类的 `find()` 方法结合使用。下面概述了使用这两个方法完成查找和替换文本所执行的步骤。\n\n1.  创建一个 `Pattern`\
  \ 对象。\n\n2.  创建一个 `Matcher` 对象。\n\n3.  创建一个 `StringBuffer/StringBuilder` 对象来保存结果。\n\
  \n4.  在循环中使用 `find()` 方法来匹配模式。\n\n5.  根据找到的匹配项的位置，调用 `appendReplacement()` 和 `appendTail()`\
  \ 方法。\n\n让我们通过编译正则表达式来创建一个 `Pattern`。由于你想找到所有数字，你的正则表达式将是 `\\b\\d+\\b`。注意开头的 `\\\
  b` 和结尾的 `\\b`。它们指定你只对单词边界上的数字感兴趣。\n\n```\nString regex = \"\\\\b\\\\d+\\\\b\"; Pattern\
  \ p = Pattern.compile(regex);\n```\n\n通过将模式与文本关联来创建一个 `Matcher`。\n\n```\nString\
  \ text = \"A train carrying 125 men and women was traveling\" +\n\" at the speed\
  \ of 100 miles per hour. The train\" +\n\" fare was 75 dollars per person.\";\n\
  Matcher m = p.matcher(text);\n```\n\n创建一个 `StringBuilder` 来保存新文本：\n\n```\nStringBuilder\
  \ sb = new StringBuilder();\n```\n\n开始在 `Matcher` 对象上使用 `find()` 方法来查找匹配项。当你第一次调用\
  \ `find()` 方法时，数字 125 将匹配该模式。此时，你需要根据匹配的文本准备替换文本，如下所示：\n\n```\nString replacementText\
  \ = \"\";\n// 获取匹配的文本。回想一下，group() 方法返回整个匹配的文本\nString matchedText = m.group();\n\
  // 将文本转换为整数以便比较\nint num = Integer.parseInt(matchedText);\n// 准备替换文本\nif (num ==\
  \ 100) {\nreplacementText = \"a hundred\";\n} else if (num < 100) {\nreplacementText\
  \ = \"less than a hundred\";\n} else {\nreplacementText = \"more than a hundred\"\
  ;\n}\n```\n\n现在，你将在 `Matcher` 对象上调用 `appendReplacement()` 方法，并将一个空的 `StringBuilder`\
  \ 和 `replacementText` 作为参数传递。在这种情况下，`replacementText` 包含字符串 `\"more than hundred\"\
  `，因为 `find()` 方法调用匹配了数字 125。\n\n```\nm.appendReplacement(sb, replacementText);\n\
  ```\n\n了解 `appendReplacement()` 方法调用的作用很有趣。它会检查是否存在先前的匹配。因为这是第一次调用 `find()` 方法，所以没有先前的匹配。对于第一次匹配，它会将从输入文本开头到匹配文本前一个字符的文本追加进去。在你的例子中，以下文本被追加到\
  \ `StringBuilder` 中。此时，`StringBuilder` 中的文本是\n\n```\n\"A train carrying \"\n```\n\
  \n现在，`appendReplacement()` 方法将 `replacementText` 参数中的文本追加到 `StringBuilder`。这将使 `StringBuilder`\
  \ 的内容变为：\n\n```\n\"A train carrying more than a hundred\"\n```\n\n`appendReplacement()`\
  \ 方法还做了一件事。它设置了追加位置，这是 `Matcher` 对象的一个内部状态，该位置被设置为第一个匹配文本之后的一个字符位置。在你的例子中，追加位置将被设置为\
  \ 125 之后的字符，即 125 后面的空格字符的位置。这完成了第一个查找和替换步骤。\n\n\n\n您将再次调用`Matcher`对象的`find()`方法。它会找到模式，即另一个数字\
  \ 100。您将使用与第一次匹配后相同的步骤来计算替换文本的值。这次，`replacementText`将包含字符串`\"a hundred\"`。您按如下方式调用`appendReplacement()`方法：\n\
  \n```\nm.appendReplacement(sb, replacementText);\n```\n\n同样，它会检查是否存在之前的匹配。由于这是对`find()`方法的第二次调用，它会找到之前的匹配，并使用上一次`appendReplacement()`调用保存的追加位置作为起始位置。最后一个要追加的字符将是第二个匹配之前的字符。它还会将追加位置设置为数字\
  \ 100 之后的字符位置。此时，`StringBuilder`包含以下文本：\n\n```\n\"A train carrying more than a hundred\
  \ men and women was traveling at the speed of a hundred\"\n```\n\n当您第三次调用`find()`方法时，它会找到数字\
  \ 75，替换后`StringBuilder`的内容如下所示。追加位置将被设置为数字`75`之后的字符位置。\n\n```\n\"A train carrying\
  \ more than a hundred men and women was traveling at the speed of a hundred miles\
  \ per hour. The train fare was less than a hundred\"\n```\n\n如果您再次调用`find()`方法，它将找不到任何匹配。然而，`StringBuilder`并不包含最后一次匹配之后的文本，即“`dollars\
  \ per person.\"`。要追加最后一次匹配之后的文本，您需要调用`appendTail()`方法。它会从追加位置开始，将输入字符串末尾的文本追加到`StringBuilder`中。调用此方法\n\
  \n```\nm.appendTail(sb);\n```\n\n会将`StringBuilder`修改为：\n\n```\n\"A train carrying\
  \ more than a hundred men and women was traveling\nat the speed of a hundred miles\
  \ per hour. The train fare was less than\na hundred dollars per person.\"\n```\n\
  \n如果在第二次调用`appendReplacement()`方法之后立即调用`appendTail()`方法，`StringBuilder`的内容会是什么？完整的程序如清单\
  \ 18-9 所示。\n\n```\n// AdvancedFindReplace.java\npackage com.jdojo.regex;\nimport\
  \ java.util.regex.Pattern;\nimport java.util.regex.Matcher;\npublic class AdvancedFindReplace\
  \ {\npublic static void main(String[] args) {\nString regex = \"\\\\b\\\\d+\\\\\
  b\";\nStringBuilder sb = new StringBuilder();\nString text = \"A train carrying\
  \ 125 men and women was traveling at\"\n+ \" the speed of 100 miles per hour. \"\
  \n+ \"The train fare was 75 dollars per person.\";\nPattern p = Pattern.compile(regex);\n\
  Matcher m = p.matcher(text);\nwhile (m.find()) {\nString matchedText = m.group();\n\
  // Convert the text into an integer for comparing\nint num = Integer.parseInt(matchedText);\n\
  // Prepare the replacement text\nString replacementText;\nif (num == 100) {\nreplacementText\
  \ = \"a hundred\";\n} else if (num < 100) {\nreplacementText = \"less than a hundred\"\
  ;\n} else {\nreplacementText = \"more than a hundred\";\n}\nm.appendReplacement(sb,\
  \ replacementText);\n}\n// Append the tail\nm.appendTail(sb);\n// Display the old\
  \ and new text\nSystem.out.printf(\"Old Text: %s%n\", text);\nSystem.out.printf(\"\
  New Text: %s%n\", sb.toString());\n}\n}\n清单 18-9.\n使用正则表达式以及 appendReplacement()和\
  \ appendTail()方法进行查找与替换\n```\n\n```\nOld Text: A train carrying 125 men and women\
  \ was traveling at the speed of 100 miles per hour. The train fare was 75 dollars\
  \ per person.\nNew Text: A train carrying more than a hundred men and women was\
  \ traveling at the speed of a hundred miles per hour. The train fare was less than\
  \ a hundred dollars per person.\n```\n\n匹配结果的流\n\nJava 9 为`Matcher`类添加了一个新方法，该方法返回一个`MatchResult`的流：\n\
  \n```\nStream results()\n```\n\nStreams API 是一个庞大的主题。它允许您对数据流应用过滤-映射-归约操作。我在本系列第二卷的第\
  \ 13 章中介绍了 Streams API。为了完整讨论`Matcher`类，我提供了一个使用`results()`方法的示例。如果您在理解本节中的示例时遇到困难，请在阅读完\
  \ Streams API 后再重新阅读本节。\n\n`results()`方法以流的形式返回匹配结果，其元素类型为`MatchResult`。您可以查询`MatchResult`来获取匹配的详细信息。`results()`方法不会重置匹配器。如果您想重用匹配器，请不要忘记调用其`reset()`方法将其重置到所需位置。当您使用`results()`方法时，诸如统计匹配次数、获取匹配列表以及查找不同的区号等操作变得非常容易。清单\
  \ 18-10 展示了此方法的一些有趣用法。它在输入字符串中搜索 10 位或 7 位电话号码。它获取所有格式化后的匹配电话号码列表。在第二个示例中，它打印匹配结果中不同区号的集合。\n\
  \n```\n// DistinctAreaCode.java\npackage com.jdojo.regex;\nimport java.util.List;\n\
  import java.util.Set;\nimport java.util.regex.Matcher;\nimport java.util.regex.Pattern;\n\
  import static java.util.stream.Collectors.toList;\nimport static java.util.stream.Collectors.toSet;\n\
  public class DistinctAreaCode {\npublic static void main(String[] args) {\n// A\
  \ regex to match 7-digit or 10-digit phone numbers\nString regex = \"\\\\b(\\\\\
  d{3})?(\\\\d{3})(\\\\d{4})\\\\b\";\n// An input string\nString source = \"1, 3342229999,\
  \ 2330001, 6159996666, 123, 3340909090\";\nSystem.out.println(\"Input: \" + source);\n\
  // Create a matcher\nMatcher matcher = Pattern.compile(regex)\n.matcher(source);\n\
  // Collect formatted phone numbers into a list\nList phones = matcher.results()\n\
  .map(mr -> (mr.group(1) == null ? \"\" : \"(\" + mr.group(1) + \") \")\n+ mr.group(2)\
  \ + \"-\" + mr.group(3))\n.collect(toList());\nSystem.out.println(\"Phones: \" +\
  \ phones);\n// Reset the matcher, so we can reuse it from start\nmatcher.reset();\n\
  // Get distinct area codes\nSet areaCodes = matcher.results()\n.filter(mr -> mr.group(1)\
  \ != null)\n.map(mr -> mr.group(1))\n.collect(toSet());\nSystem.out.println(\"Distinct\
  \ Area Codes: \" + areaCodes);\n}\n}\n清单 18-10.\n使用 Matcher 类的 results()方法\n```\n\
  \n```\nInput: 1, 3342229999, 2330001, 6159996666, 123, 3340909090\nPhones: [(334)\
  \ 222-9999, 233-0001, (615) 999-6666, (334) 090-9090]\nDistinct Area Codes: [334,\
  \ 615]\n```\n\n在`main()`方法中，以下正则表达式将匹配 7 位或 10 位电话号码：\n\n```\n// A regex to match\
  \ 7-digit or 10-digit phone numbers\nString regex = \"\\\\b(\\\\d{3})?(\\\\d{3})(\\\
  \\d{4})\\\\b\";\n```\n\n您希望将 10 位电话号码格式化为`(xxx) xxx-xxxx`，将 7 位电话号码格式化为`xxx-xxxx`。最后，您希望将所有格式化后的电话号码收集到一个`List<String>`中。以下语句实现了这一点：\n\
  \n```\n// Collect formatted phone numbers into a list\nList phones = matcher.results()\n\
  .map(mr -> (mr.group(1) == null ? \"\" : \"(\" + mr.group(1) + \") \")\n+ mr.group(2)\
  \ + \"-\" + mr.group(3))\n.collect(toList());\n```\n\n请注意`map()`方法的使用，它接收一个`MatchResult`并返回一个格式化为`String`的电话号码。当匹配是\
  \ 7 位电话号码时，组 1 将为`null`。现在，您希望重用匹配器来查找 10 位电话号码中的不同区号。您必须重置匹配器，以便下一次匹配从输入字符串的开头开始：\n\
  \n```\n// Reset the matcher, so we can reuse it from start\nmatcher.reset();\n```\n\
  \n`MatchResult`中的第一个组包含区号。您需要过滤掉 7 位电话号码，并将组 1 的值收集到`Set<String>`中，以获得不同的区号集合。以下语句实现了这一点：\n\
  \n\n\n```\n// 获取不同的区号集合\nSet<String> areaCodes = matcher.results()\n.filter(mr ->\
  \ mr.group(1) != null)\n.map(mr -> mr.group(1))\n.collect(toSet());\n```\n\n摘要\n\
  \n正则表达式是一个字符序列，用作匹配某些文本的模式。Java 通过 `java.util.regex` 包中的 `Pattern` 和 `Matcher` 类，为使用正则表达式提供了全面的支持。`String`\
  \ 类中也存在一些使用正则表达式的便捷方法。\n\n`Pattern` 对象表示一个编译后的正则表达式。`Matcher` 对象用于将 `Pattern` 与要搜索模式的输入文本关联起来。`Matcher`\
  \ 类的 `find()` 方法用于在输入文本中查找与模式匹配的内容。正则表达式允许你使用组。组会自动从 1 到 N 编号。最左边的第一个组是编号 1。存在一个特殊的组\
  \ 0，它包含整个正则表达式。从 Java 7 开始，你还可以为组命名。你可以通过编号或名称来引用这些组。\n\nJava 9 为 `Matcher` 类添加了一些有用的方法。`replaceAll()`\
  \ 和 `replaceFirst()` 方法已被重载；现在它们接受一个 `Function<MatchResult,String>` 作为匹配结果的替换器，允许你使用任何逻辑来生成匹配项的替换文本。新的\
  \ `results()` 方法返回一个 `Stream<MatchResult>`，允许你对匹配结果进行流式操作。\n\n问题与练习\n\n1.  什么是正则表达式？\n\
