  \n多维数组\n\n如果列表中的数据元素使用多个维度来标识，你可以使用多维数组来表示该列表。例如，表格中的数据元素由行和列两个维度标识。你可以将表格数据存储在二维数组中。通过在数组声明中为每个维度使用一对括号（`[]`），可以声明一个多维数组。例如，你可以声明一个\
  \ `int` 类型的二维数组，如下所示：\n\n```\nint[][] table;\n```\n\n这里，`table` 是一个引用变量，可以持有对 `int`\
  \ 类型二维数组的引用。在声明时，仅为引用变量 `table` 分配内存，而不为任何数组元素分配内存。执行此代码后的内存状态如图 19-6 所示。\n\n![A323069_2_En_19_Fig6_HTML.gif](img/A323069_2_En_19_Fig6_HTML.gif)\n\
  \n图 19-6.\n\n声明二维数组后的内存状态\n\n可以创建一个具有三行两列的 `int` 类型二维数组，如下所示：\n\n```\ntable = new\
  \ int[3][2];\n```\n\n执行此代码后的内存状态如图 19-7 所示。所有元素的值都显示为零，因为数值数组的所有元素默认初始化为零。多维数组元素默认初始化的规则与本章前面讨论的一维数组相同。\n\
  \n![A323069_2_En_19_Fig7_HTML.gif](img/A323069_2_En_19_Fig7_HTML.gif)\n\n图 19-7.\n\
  \n创建二维数组后的内存状态\n\n多维数组中每个维度的索引都是从零开始的。`table` 数组的每个元素都可以通过 `table[行号][列号]` 来访问。行号和列号始终从零开始。例如，你可以为\
  \ `table` 数组的第一行第二列赋值，如下所示：\n\n```\ntable[0][1] = 32;\n```\n\n你可以像这样为第三行第一列赋值 71：\n\
  \n```\ntable[2][0] = 71;\n```\n\n两次赋值后的内存状态如图 19-8 所示。\n\n![A323069_2_En_19_Fig8_HTML.gif](img/A323069_2_En_19_Fig8_HTML.gif)\n\
  \n图 19-8.\n\n对二维数组元素进行两次赋值后的内存状态\n\nJava 并不真正支持多维数组。相反，它支持数组的数组。使用数组的数组，你可以实现与多维数组相同的功能。当你创建一个二维数组时，第一个数组的元素是数组类型，它可以引用一个一维数组。每个一维数组的大小不必相同。考虑到\
  \ `table` 二维数组的数组的数组概念，你可以描绘出数组创建和两次值赋值后的内存状态，如图 19-9 所示。\n\n![A323069_2_En_19_Fig9_HTML.gif](img/A323069_2_En_19_Fig9_HTML.gif)\n\
  \n图 19-9.\n\n数组的数组\n\n二维数组的名称 `table` 引用了一个包含三个元素的数组。该数组的每个元素都是一个 `int` 类型的一维数组。`table[0]`、`table[1]`\
  \ 和 `table[2]` 的数据类型是 `int` 数组。`table[0]`、`table[1]` 和 `table[2]` 的长度都是 2。\n\n在创建多维数组时，你必须至少指定第一级数组的维度。例如，当你创建一个二维数组时，必须至少指定第一个维度，即行数。你可以通过以下方式实现与之前代码片段相同的结果：\n\
  \n```\ntable = new int[3][];\n```\n\n此语句仅创建了第一级数组。此时只存在 `table[0]`、`table[1]` 和\
  \ `table[2]`。它们引用的是 `null`。此时，`table.length` 的值为 `3`。由于 `table[0]`、`table[1]` 和\
  \ `table[2]` 引用的是 `null`，因此你无法访问它们的 `length` 属性。也就是说，你已经在表中创建了三行，但不知道每行将包含多少列。由于\
  \ `table[0]`、`table[1]` 和 `table[2]` 是 `int` 数组，你可以像下面这样为它们赋值：\n\n```\ntable[0]\
  \ = new int[2]; // 为第 1 行创建 2 列\ntable[1] = new int[2]; // 为第 2 行创建 2 列\ntable[2]\
  \ = new int[2]; // 为第 3 行创建 2 列\n```\n\n至此，你已经完成了二维数组的创建，该数组有三行，每行有两列。你可以像下面这样为某些单元格赋值：\n\
  \n```\ntable[0][1] = 32;\ntable[2][0] = 71;\n```\n\n也可以创建一个每行列数不同的二维数组。这种数组称为**不规则数组**。清单\
  \ 19-12 演示了如何使用不规则数组。\n\n\n```java\n// RaggedArray.java\npackage com.jdojo.array;\n\
  public class RaggedArray {\npublic static void main(String[] args) {\n// 创建一个 3\
  \ 行的二维数组\nint[][] raggedArr = new int[3][];\n// 为第一行添加 2 列\nraggedArr[0] = new int[2];\n\
  // 为第二行添加 1 列\nraggedArr[1] = new int[1];\n// 为第三行添加 3 列\nraggedArr[2] = new int[3];\n\
  // 为 raggedArr 的所有元素赋值\nraggedArr[0][0] = 1;\nraggedArr[0][1] = 2;\nraggedArr[1][0]\
  \ = 3;\nraggedArr[2][0] = 4;\nraggedArr[2][1] = 5;\nraggedArr[2][2] = 6;\n// 打印所有元素，每行打印一行\n\
  System.out.println(raggedArr[0][0] + \"\\t\" + raggedArr[0][1]);\nSystem.out.println(raggedArr[1][0]);\n\
  System.out.println(raggedArr[2][0] + \"\\t\" + raggedArr[2][1] + \"\\t\" + raggedArr[2][2]);\n\
  }\n}\n1     2\n\n4     5        6\n清单 19-12. 不规则数组示例\n```\n\n提示\n\nJava 支持数组的数组，可用于实现多维数组提供的功能。多维数组在科学和工程应用中广泛使用。如果在业务应用程序中使用超过二维的数组，可能需要重新考虑选择多维数组作为数据结构的决策。\n\
  \n访问多维数组的元素\n\n通常，多维数组通过嵌套的`for`循环进行填充。用于填充多维数组的`for`循环数量等于数组的维度数。例如，使用两个`for`循环来填充二维数组。通常，使用循环来访问多维数组的元素。清单\
  \ 19-13 演示了如何填充和访问二维数组的元素。\n\n```java\n// MDAccess.java\npackage com.jdojo.array;\n\
  public class MDAccess {\npublic static void main(String[] args){\nint[][] ra = new\
  \ int[3][];\nra[0] = new int[2];\nra[1] = new int[1];\nra[2] = new int[3];\n// 使用\
  \ for 循环填充不规则数组\nfor(int i = 0; i < ra.length; i++) {\nfor(int j = 0; j < ra[i].length;\
  \ j++){\nra[i][j] = i + j;\n}\n}\n// 使用 for 循环打印数组\nfor(int i = 0; i < ra.length;\
  \ i++) {\nfor (int j = 0; j < ra[i].length; j++){\nSystem.out.print(ra[i][j] + \"\
  \\t\");\n}\n// 每行打印后添加换行\nSystem.out.println();\n}\n}\n}\n0     1\n\n2     3   \
  \     4\n清单 19-13. 访问多维数组的元素\n```\n\n初始化多维数组\n\n可以在声明时或创建时通过提供值列表来初始化多维数组的元素。如果使用值列表初始化数组，则不能指定任何维度的长度。每个维度的初始值数量将决定数组中每个维度的长度。由于多维数组涉及多个维度，每个层级的值列表用花括号括起来。对于二维数组，每行的值列表用一对花括号括起来，如下所示：\n\
  \n```java\nint[][] arr = {{10, 20, 30}, {11, 22}, {222, 333, 444, 555}};\n```\n\n\
  该语句创建了一个包含三行的二维数组。第一行包含三列，值分别为 10、20 和 30。第二行包含两列，值分别为 11 和 22。第三行包含四列，值分别为 222、333、444\
  \ 和 555。可以创建零行零列的二维数组，如下所示：\n\n```java\nint[][] empty2D = { };\n```\n\n引用类型多维数组的初始化遵循相同规则。可以像这样初始化二维`String`数组：\n\
  \n```java\nString[][] acronymList = {{\"JMF\", \"Java Media Framework\"},\n{\"JSP\"\
  , \"Java Server Pages\"},\n{\"JMS\", \"Java Message Service\"}};\n```\n\n可以在创建多维数组时初始化其元素，如下所示：\n\
  \n```java\nint[][] arr = new int[][]{{1, 2}, {3,4,5}};\n```\n\n增强型 for 循环用于数组\n\n\
  Java 提供了一种增强型`for`循环，可以更简洁地遍历数组元素。增强型`for`循环也称为`for-each`循环。语法如下：\n\n```java\nfor(DataType\
  \ e : array) {\n// 循环体在此处...\n// e 每次包含数组的一个元素\n}\n```\n\n`for-each`循环使用与基本`for`循环相同的`for`关键字。其循环体执行的次数等于`array`中元素的数量。`DataType\
  \ e`是一个变量声明，其中`e`是变量名，`DataType`是其数据类型。变量`e`的数据类型应与`array`的类型赋值兼容。变量声明后跟冒号（`:`），再跟要遍历的数组引用。`for-each`循环将数组元素的值赋给变量`e`，可在循环体内使用。以下代码片段使用`for-each`循环打印`int`数组的所有元素：\n\
  \n```java\nint[] numList = {1, 2, 3};\nfor(int num : numList) {\nSystem.out.println(num);\n\
  }\n```\n\n可以使用基本`for`循环实现相同功能，如下所示：\n\n```java\nint[] numList = {1, 2, 3};\nfor(int\
  \ i = 0; i < numList.length; i++) {\nint num = numList[i];\nSystem.out.println(num);\n\
  }\n```\n\n请注意，`for-each`循环提供了一种遍历数组元素的方式，比基本`for`循环更简洁。但它不能替代基本`for`循环，因为并非所有情况下都能使用。例如，无法访问数组元素的索引，也无法在循环内修改元素的值，因为没有元素的索引。\n\
  \n数组声明语法\n\n可以通过在数组数据类型后或数组引用变量名后放置一对方括号（`[]`）来声明数组。例如，以下声明：\n\n```java\nint[] empIds;\n\
  int[][] points2D;\nint[][][] points3D;\nPerson[] persons;\n```\n\n等价于：\n\n```java\n\
  int empIds[];\nint points2D[][];\nint points3D[][][];\nPerson persons[];\n```\n\n\
  Java 还允许混合使用两种语法。在同一数组声明中，可以将部分方括号放在数据类型后，部分放在变量名后。例如，可以如下声明二维`int`数组：\n\n```java\n\
  int[] points2D[];\n```\n\n可以在一条声明语句中声明二维和三维`int`数组，如下所示：\n\n```java\nint[] points2D[],\
  \ points3D[][];\n```\n\n或：\n\n```java\nint[][] points2D, points3D[];\n```\n\n运行时数组边界检查\n\
  \n在运行时，Java 会对每次数组元素访问进行数组边界检查。如果超出数组边界，将抛出`java.lang.ArrayIndexOutOfBoundsException`。编译时对数组索引值的唯一要求是它们必须是整数。Java\
  \ 编译器不会检查数组索引值是否小于零或超出其长度。此检查必须在运行时、每次允许访问数组元素之前执行。运行时数组边界检查会降低程序执行速度，原因有二：\n\n\
  *   第一个原因是边界检查本身的成本。为了检查数组边界，必须将数组长度加载到内存中，并执行两次比较（一次检查是否小于零，一次检查是否大于等于其长度）。\n\n\
  *   第二个原因是当超出数组边界时必须抛出异常。Java 必须进行一些内务处理，并准备好在超出数组边界时抛出异常。\n\n清单 19-14 演示了超出数组边界时抛出的异常。该程序创建了一个名为`test`的`int`数组，长度为\
  \ 3。程序无法访问第四个元素（`test[3]`，因为它不存在）。当尝试这样做时，会抛出`ArrayIndexOutOfBoundsException`。\n\
  \n\n```\n// ArrayBounds.java\npackage  com.jdojo.array;\npublic class ArrayBounds\
  \ {\npublic static void main(String[] args) {\nint[] test = new int[3];\nSystem.out.println(\"\
  将 12 赋值给第一个元素\");\ntest[0] = 12;  // 正确。索引 0 在 0 到 2 之间。\nSystem.out.println(\"\
  将 79 赋值给第四个元素\");\n// 索引 3 不在 0 到 2 之间。运行时将抛出异常。\ntest[3] = 79;\nSystem.out.println(\"\
  我们不会执行到这里\");\n}\n}\n将 12 赋值给第一个元素\n将 79 赋值给第四个元素\nException in thread \"main\"\
  \ java.lang.ArrayIndexOutOfBoundsException: 3\nat com.jdojo.array.ArrayBounds.main(ArrayBounds.java:14)\n\
  清单 19-14.\n数组边界检查\n```\n\n在访问数组元素之前检查数组长度是一种良好的编程习惯。数组越界会抛出异常这一特性可能会被误用，如下面的代码片段所示，该代码用于打印数组中存储的值：\n\
  \n```\n/* 即使这段代码能运行，也不要使用它。*/\n// 创建一个数组\nint[] arr = new int[10];\n// 在此处填充数组...\n\
  // 打印数组。错误的方式\ntry {\n// 启动一个无限循环。当所有元素处理完毕时，会抛出一个异常，\n// 我们将进入 catch 块，从而退出循环。\n\
  int counter = 0;\nwhile (true) {\nSystem.out.println(arr[counter++]);\n}\n} catch\
  \ (ArrayIndexOutOfBoundsException e) {\n// 数组元素打印完毕\n}\n// 在此处进行一些处理...\n```\n\n\
  前面的代码片段使用了一个无限的`while`循环来打印数组元素的值，并依赖异常抛出机制来检查数组边界。正确的方法是使用`for`循环，并通过数组的`length`属性来检查数组索引值。\n\
  \n数组对象的类是什么？\n\n数组是对象。由于每个对象都有一个类，因此每个数组也必然有一个类。`Object`类的所有方法都可以用于数组。因为`Object`类的`getClass()`方法会返回\
  \ Java 中任何对象的类引用，所以你可以使用此方法来获取所有数组的类名。清单 19-15 演示了如何获取数组的类名。\n\n```\n// ArrayClass.java\n\
  package com.jdojo.array;\npublic class ArrayClass {\npublic static void main (String[]\
  \ args){\nint[] iArr = new int[2];\nint[][] iiArr = new int[2][2];\nint[][][] iiiArr\
  \ = new int[2][2][2];\nString[] sArr  = {\"A\", \"B\"} ;\nString[][] ssArr = {{\"\
  AA\"}, {\"BB\"}} ;\nString[][][] sssArr = {} ; // 一个三维空字符串数组\n// 打印所有数组的类名\nSystem.out.println(\"\
  int[]: \" + getClassName(iArr));\nSystem.out.println(\"int[][]: \" + getClassName(iiArr));\n\
  System.out.println(\"int[][][]: \" + getClassName(iiiArr));\nSystem.out.println(\"\
  String[]: \" + getClassName(sArr));\nSystem.out.println(\"String[][]: \" + getClassName(ssArr));\n\
  System.out.println(\"String[][][]: \" + getClassName(sssArr));\n}\n// 任何 Java 对象都可以传递给\
  \ getClassName()方法。\n// 由于每个数组都是一个对象，我们也可以将数组传递给此方法。\npublic static String getClassName(Object\
  \ obj) {\n// 获取其类的引用\nClass c = obj.getClass();\n// 获取类的名称\nString className = c.getName();\n\
  return className;\n}\n}\nint[]: [I\nint[][]: [[I\nint[][][]: [[[I\nString[]: [Ljava.lang.String;\n\
