  \n图 3-13.\n\n选择“模块”菜单项以创建一个模块\n\n\n\n图 3-15 展示了打开 `module-info.java` 文件时的编辑器界面。我已移除\
  \ NetBeans IDE 自动添加的注释，并在顶部添加了一条注释。你可能需要展开“项目”选项卡中的文件树才能看到所有文件。创建 `jdojo.intro`\
