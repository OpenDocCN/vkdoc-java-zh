  日期/时间格式化涉及对日期、时间和日期/时间的格式化。它可以应用于格式化 `long`、`Long`、`java.util.Calandar`、`java.util.Date`\
  \ 和 `java.time.temporal.TemporalAccessor` 类型的值。`long`/`Long` 类型参数中的值被解释为自 1970 年\
  \ 1 月 1 日午夜 UTC 以来经过的毫秒数。\n\n注意\n\n`TemporalAccessor` 是 Java 8 中新增的一个接口。它是新的日期时间\
  \ API 的一部分。该 API 中所有指定某种日期、时间或两者的类都是 `TemporalAccessor`。`LocalDate`、`LocalTime`、`LocalDateTime`\
  \ 和 `ZonedDateTime` 是 `TemporalAccessor` 的一些示例。有关使用新日期时间 API 的更多信息，请参阅第 16 章。\n\n\
  `t` 转换字符用于格式化日期/时间值。它有一个大写变体 `T`。日期/时间格式化的格式说明符的通用语法如下：\n\n```\n%\n```\n\n请注意，格式说明符中的精度部分不适用于日期/时间格式化。对于日期/时间格式化，转换是一个双字符序列。转换中的第一个字符始终是\
  \ `t` 或 `T`。第二个字符称为转换后缀，它决定了日期/时间参数的格式。表 17-7 到 17-9 列出了所有可与 `t`/`T` 日期/时间转换字符一起使用的转换后缀。\n\
