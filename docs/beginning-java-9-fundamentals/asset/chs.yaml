  演示接口类型的变量可以存储实现该接口的类的对象的引用\n```\n\n实现接口方法\n\n当一个类完全实现一个接口时，它会通过重写这些方法，为接口中所有抽象方法提供实现。接口中的方法声明包含对方法的约束（或规则）。例如，一个方法可以在其声明中声明一个\
  \ `throws` 子句。方法声明中的 `throws` 子句是对该方法的一个约束。如果 `throws` 子句声明了某些受检异常，那么该方法的调用者必须准备好处理这些异常。接口中的方法隐式地是\
  \ public 的。这定义了方法的另一个约束，即接口的所有方法都是公开可访问的，前提是接口本身是公开可访问的。考虑一个如下定义的 `Banker` 接口：\n\
  \n```\npublic interface Banker {\ndouble withdraw(double amount) throws InsufficientFundsException;\n\
  void deposit(double amount) throws FundLimitExceededException;\n}\n```\n\n`Banker`\
  \ 接口声明了两个方法：`withdraw()` 和 `deposit()`。考虑 `MinimumBalanceBank` 类中对 `Banker` 接口的以下实现。该类中重写的方法具有与\
  \ `Banker` 接口中定义的相同的约束。两个方法都声明为 `public`，并且都抛出了与其在 `Banker` 接口声明中相同的异常。\n\n```\n\
  public class MinimumBalanceBank implements Banker {\npublic double withdraw(double\
  \ amount) throws InsufficientFundsException {\n// 此方法的代码写在这里\n}\npublic void deposit(double\
  \ amount) throws FundLimitExceededException {\n// 此方法的代码写在这里\n}\n}\n```\n\n考虑 `NoLimitBank`\
  \ 类中对 `Banker` 接口的以下实现。`NoLimitBank` 的规则是客户可以拥有无限透支额度（希望现实中也能如此），并且余额没有上限。`NoLimitBank`\
  \ 在重写 `Banker` 接口的 `withdraw()` 和 `deposit()` 方法时，去掉了 `throws` 子句。\n\n```\npublic\
  \ class NoLimitBank implements Banker {\npublic double withdraw(double amount) {\n\
  // 此方法的代码写在这里\n}\npublic void deposit(double amount) {\n// 此方法的代码写在这里\n}\n}\n```\n\
  \n`NoLimitBank` 的代码是有效的，尽管它重写 `Banker` 接口方法的两个方法去掉了 `throws` 子句。当一个类重写接口方法时，允许去掉约束（本例中为异常）。`throws`\
  \ 子句中的异常施加了一个限制，即调用者必须处理该异常。如果你使用 `Banker` 类型编写代码，调用 `withdraw()` 方法的方式如下：\n\n```\n\
  Banker b = 获取一个 Banker 类型的对象...;\ntry {\ndouble amount = b.withdraw(1000.90);\n\
  // 更多代码写在这里\n} catch (InsufficientFundsException e) {\n// 在这里处理异常\n}\n```\n\n在编译时，当调用\
  \ `b.withdraw()` 方法时，编译器强制你处理从 `withdraw()` 方法抛出的异常，因为它知道变量 `b` 的类型是 `Banker`，并且\
  \ `Banker` 类型的 `withdraw()` 方法抛出了 `InsufficientFundsException`。如果你在前面的代码中将 `NoLimitBank`\
  \ 的对象赋值给变量 `b`，那么当调用 `b.withdraw()` 时，不会从 `NoLimitBank` 类的 `withdraw()` 方法抛出异常，即使对\
  \ `withdraw()` 方法的调用位于 `try-catch` 块内。编译器无法检查变量 `b` 的运行时类型。它的安全检查基于变量 `b` 的编译时类型。如果运行时抛出的异常数量少于代码预期，或者根本不抛出异常，这永远不会成为问题。考虑\
  \ `UnstablePredictableBank` 类对 `Banker` 接口的以下实现：\n\n```\n// 以下代码无法编译\npublic class\
  \ UnstablePredictableBank implements Banker {\npublic double withdraw(double amount)\
  \ throws InsufficientFundsException, ArbitraryException {\n// 此方法的代码写在这里\n}\npublic\
  \ void deposit(double amount) throws FundLimitExceededException {\n// 此方法的代码写在这里\n\
  }\n}\n```\n\n这一次，`withdraw()` 方法添加了一个新的异常 `ArbitraryException`，这给重写的方法增加了一个新的约束。绝不允许给重写的方法添加约束。考虑以下代码片段：\n\
  \n```\nBanker b = new UnstablePredictableBank ();\ntry {\ndouble amount = b.withdraw(1000.90);\n\
  // 更多代码写在这里\n} catch (InsufficientFundsException e) {\n// 在这里处理异常\n}\n```\n\n编译器不知道在运行时，类型为\
  \ `Banker` 的变量 `b` 将引用 `UnstablePredictableBank` 类型的对象。因此，当你调用 `b.withdraw()` 时，编译器只会强制你处理\
  \ `InsufficientFundsException`。如果在运行时从 `withdraw()` 方法抛出了 `ArbitraryException`，会发生什么？你的代码没有准备好处理它。这就是为什么你不能在类的方法声明中添加新的异常，而该类重写了其实现接口中的方法。\n\
  \n如果一个类重写了所实现接口的方法，那么该方法必须声明为 public。回想一下，接口中的所有方法都是隐式 public 的，而 public 是方法限制最少的访问修饰符。在类中将重写接口方法的方法声明为\
  \ private、protected 或包级私有，相当于限制了重写方法的作用域（就像施加了更多约束）。以下代码片段无法编译，因为 `withdraw()` 和\
  \ `deposit()` 方法没有声明为 public：\n\n```\n// 代码无法编译\npublic class UnstablePredictableBank\
  \ implements Banker{\n// withdraw() 方法必须是 public\nprivate double withdraw(double\
  \ amount) throws InsufficientFundsException {\n// 此方法的代码写在这里\n}\n// deposit() 方法必须是\
  \ public\nprotected void deposit(double amount) throws FundLimitExceededException\
  \ {\n// 此方法的代码写在这里\n}\n}\n```\n\n\n\n使用一条通用经验法则来判断：在覆盖接口方法的类方法中，是否允许添加或移除某个约束。编写代码时，使用接口类型的变量，并将其赋值为实现了该接口的类的对象。如果这段代码对你来说合理（当然，它也必须对编译器合理），那么就是允许的；否则，就不允许。假设\
  \ `J` 是一个接口，它声明了一个方法 `m1()`。再假设类 `C` 实现了接口 `J`，并修改了方法 `m1()` 的声明。如果以下代码合理且能通过编译，那么类\
  \ `C` 中对 `m1()` 声明的修改就是可行的。\n\n```\nJ obj = new C(); // 或者 C 的任何子类的对象\nobj.m1();\n\
  ```\n\n另一条经验法则是：检查类中的覆盖方法是否放宽了接口中为同一方法声明的限制。如果覆盖方法放宽了被覆盖方法的约束，则是可行的；否则，编译器将报错。\n\
  \n实现多个接口\n\n一个类可以实现多个接口。类实现的所有接口都列在类声明中关键字 `implements` 之后。接口名称之间用逗号分隔。通过实现多个接口，该类同意为所有接口中的所有抽象方法提供实现。假设有两个接口，分别名为\
  \ `Adder` 和 `Subtractor`，声明如下：\n\n```\npublic interface Adder {\nint add(int n1,\
  \ int n2);\n}\npublic interface Subtractor {\nint subtract(int n1, int n2);\n}\n\
  ```\n\n如果一个 `ArithOps` 类实现了这两个接口，其声明将如下所示：\n\n```\npublic class ArithOps implements\
  \ Adder, Subtractor {\n// 覆盖 Adder 接口的 add() 方法\n@Override\npublic int add(int n1,\
  \ int n2) {\nreturn n1 + n2;\n}\n// 覆盖 Subtractor 接口的 subtract() 方法\n@Override\n\
  public int subtract(int n1, int n2) {\nreturn n1 - n2;\n}\n// 类的其他代码在此处\n}\n```\n\
  \n一个类实现的接口数量没有上限。当一个类实现一个接口时，它的对象会获得一个额外的类型。如果一个类实现了多个接口，它的对象会获得与实现的接口数量相同的新类型。考虑\
  \ `ArithOps` 类的对象，它可以通过执行 `new ArithOps()` 来创建。`ArithOps` 类的对象会获得两个额外的类型，即 `Adder`\
  \ 和 `Subtractor`。以下代码片段展示了 `ArithOps` 类的对象获得两个新类型的结果。你可以将 `ArithOps` 的对象视为 `ArithOps`\
  \ 类型、`Adder` 类型或 `Subtractor` 类型。当然，在 Java 中，每个对象始终可以被视为 `Object` 类型。\n\n```\nArithOps\
  \ a = new ArithOps();\nAdder b = new ArithOps();\nSubtractor c = new ArithOps();\n\
  b = a;\nc = a;\n```\n\n让我们看一个更具体、更完整的例子。你已经有了两个接口：`Walkable` 和 `Swimmable`。如果一个类实现了\
  \ `Walkable` 接口，它必须为 `walk()` 方法提供实现。如果你希望一个类的对象被视为 `Walkable` 类型，该类就会实现 `Walkable`\
  \ 接口。同样的道理也适用于 `Swimmable` 接口。如果一个类同时实现了 `Walkable` 和 `Swimmable` 这两个接口，它的对象既可以被视为\
  \ `Walkable` 类型，也可以被视为 `Swimmable` 类型。该类唯一必须做的事情就是为 `walk()` 和 `swim()` 方法都提供实现。让我们创建一个\
  \ `Turtle` 类，它实现了这两个接口。一个 `Turtle` 对象将同时具备行走和游泳的能力。\n\n清单 21-24 包含了 `Turtle` 类的代码。乌龟也能咬人。你通过向\
  \ `Turtle` 类添加一个 `bite()` 方法，将这种行为添加到了 `Turtle` 对象中。请注意，向 `Turtle` 类添加 `bite()`\
  \ 方法与两个接口的实现无关。一个实现了接口的类，可以拥有任意数量的自身额外方法。\n\n```\n// Turtle.java\npackage com.jdojo.interfaces;\n\
  public class Turtle implements Walkable, Swimmable {\nprivate String name;\npublic\
  \ Turtle(String name) {\nthis.name = name;\n}\n// 向 Turtle 类添加 bite() 方法\npublic\
  \ void bite() {\nSystem.out.println(name + \" (a turtle) is biting.\");\n}\n// 为\
  \ Walkable 接口的 walk() 方法提供实现\n@Override\npublic void walk() {\nSystem.out.println(name\
  \ + \" (a turtle) is walking.\");\n}\n// 为 Swimmable 接口的 swim() 方法提供实现\n@Override\n\
  public void swim() {\nSystem.out.println(name + \" (a turtle) is swimming.\");\n\
