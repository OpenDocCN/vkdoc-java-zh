  `&=, &#124;=, ^=`\n |\n  复合赋值\n |\n\n总结\n\n运算符是一种符号，用于对其操作数执行某种类型的计算。Java 包含丰富的运算符集。运算符根据其操作数的数量分为一元、二元或三元运算符。根据操作数类型及其对操作数执行的操作，它们又分为算术、关系、逻辑和按位运算符。\n\
  \n算术运算符是接受数值作为操作数并执行算术运算（例如加法和减法）以计算另一个数值的运算符。Java 中算术运算符的几个例子是 `+`、`-`、`*` 和 `/`。\n\
  \n在 Java 中，`+` 运算符是重载的。当其操作数之一是 `String` 时，它会执行字符串拼接。例如，表达式 `50 + \" States\"` 会生成另一个字符串\
  \ `\"50 States\"`。\n\n关系运算符比较其操作数的值，返回一个 `boolean` 值——`true` 或 `false`。关系运算符的几个例子是\
  \ `==`、`!=`、`>`、`>=`、`<` 和 `<=`。\n\n布尔逻辑运算符接受 `boolean` 操作数，对其应用布尔逻辑，并产生一个 `boolean`\
  \ 值。Java 中布尔逻辑运算符的几个例子是 `&&`、`||` 和 `&`。\n\nJava 支持一个三元运算符（`?:`），它接受三个操作数。它也被称为条件运算符。如果第一个操作数求值为\
  \ `true`，则对第二个操作数进行求值并返回；否则，对第三个操作数进行求值并返回。\n\n按位运算符是一种使用其整数操作数的位模式对其执行操作的运算符。Java\
  \ 中按位运算符的几个例子是 `&` 和 `|`。\n\n如果一个运算符可以在多种上下文中用于执行不同类型的计算，则称其为重载运算符。Java 包含一个重载的\
  \ `+` 运算符。它既用作算术加法运算符，也用作字符串拼接运算符。与 C++ 不同，Java 不允许开发者重载运算符。\n\nJava 中的每个运算符相对于其他运算符都有一个优先级顺序。如果单个表达式中出现多个运算符，则优先级高的运算符的操作数会在优先级低的运算符的操作数之前被求值。\n\
  \n练习题\n\n1.  什么是运算符？什么是一元、二元和三元运算符？在 Java 中分别给出每种类型运算符的一个例子。\n\n2.  前缀、后缀和中缀运算符之间有什么区别？在\
  \ Java 中给出此类运算符的例子。\n\n3.  什么是算术运算符，它们接受什么类型的操作数，以及它们产生什么类型的结果？\n\n4.  说出 Java 中两个只接受\
  \ `boolean` 操作数并产生布尔值的运算符。\n\n5.  两个运算符 `=` 和 `==` 之间有什么区别？\n\n6.  考虑以下代码片段：\n\n\
  ```\n    boolean done;\n    /* 此处是一些代码 */\n    your-code-goes-here;\n    ```\n\n\
  使用一个 `boolean` 逻辑运算符，反转 `done` 变量中存储的当前值。也就是说，编写一条语句，如果 `done` 变量的当前值是 `false`，则为其赋值为\
  \ `true`；如果其当前值是 `true`，则为其赋值为 `false`。\n\n7.  考虑以下代码片段：\n\n```\n    int x = 23;\n\
  \    int y = ++x % 3;\n    ```\n\n执行此代码片段后，`y` 的值将是多少？\n\n8.  考虑以下代码片段：\n\n```\n\
  \    int x = 23;\n    x = x++ % x;\n    ```\n\n执行此代码片段后，`x` 的值将是多少？请用步骤解释你的答案，说明在执行第二条语句期间\
  \ `x` 的值是如何变化的。\n\n9.  解释为什么以下代码片段无法编译。\n\n```\n    int x = 10;\n    boolean yes\
  \ = (x = 20);\n    ```\n\n10. 执行以下代码片段时，将赋给名为 `yes` 的变量的值是多少：\n\n```\n    int x\
  \ = 10;\n    boolean yes = (x == 20);\n    ```\n\n11. 执行以下代码片段时，`y` 的值将是多少：\n\n\
  ```\n    int x = 19;\n    int y = x > 10 ? 69 : 68;\n    ```\n\n12. 你有一个名为 `x` 的\
  \ short 类型变量，声明并初始化如下：\n\n```\n    short x = -19;\n    ```\n\n你想使用以下两条语句将 `19` 赋值给\
  \ `x`，但这两条语句都无法编译：\n\n```\n    x = -x;\n    x = -1 * x;\n    ```\n\n你将如何重写这两条语句以使它们能够编译？以下试图修复这些语句中编译时错误的语句有什么问题，为什么它无法将\
  \ `19` 赋值给 `x`？\n\n```\n    x -= x;\n    ```\n\n13. 执行以下代码片段时，输出将是什么：\n\n\n\n```\n\
  \    boolean b = true;\n    String str = !b +\" is not \" + b;\n    System.out.println(str);\n\
  \    ```\n\n14.  执行以下代码片段后，输出结果是什么：\n\n```\n    boolean b = true;\n    String str\
  \ = (b ^= b) + \" is \" + b;\n    System.out.println(str);\n    ```\n\n15.  执行以下代码片段后，输出结果是什么：\n\
  \n```\n    int x = 10;\n    int y = x++;\n    int z = ++x;\n    System.out.println(\"\
  x = \" + x + \", y = \" + y + \", z = \" + z);\n    ```\n\n16.  使用三元运算符（`?:`）和按位与运算符（`&`）补全第二条语句，使其生成消息\
  \ `\"x is odd\"`。你的代码必须包含以下标记（顺序不限）：`x`、`&`、`==`、`?`、`:`、`\"odd\"` 和 `\"even\"`。你可以根据需要添加其他标记。\n\
  \n```\n    int x = 19;\n    String msg = your-code-goes-here ;\n    System.out.println(\"\
  x is \" + msg);\n    ```\n\n17.  以下哪些赋值语句无法通过编译，并说明原因：\n\n```\n    int i1 = 100;\n\
  \    int i2 = 10.6;\n    byte b1 = 90;\n    byte b2 = 3L;\n    short s1 = -90;\n\
  \    float f1 = 12.67;\n    float f2 = 0.00f;\n    double d1 = 12.56;\n    double\
  \ d2 = 12.78d;\n    boolean bn1 = true;\n    boolean bn2 = 0;\n    char c1 = 'A';\n\
  \    char c2 = \"A\";\n    char c3 = 0;\n    char c4 = '\\u0000';\n    ```\n\n18.\
  \  写出以下每条语句中赋给已声明变量的值。如果某条语句产生编译时错误，请解释错误原因，并在可能的情况下提供修复该错误的解决方案。\n\n```\n    int\
  \ i1 = 10/4;\n    int i2 = 10.0/4.0;\n    int i3 = 0/0;\n    long l1 = 10/4;\n \
  \   long l2 = 10.0/4.0;\n    float f1 = 10/4;\n    float f2 = 10.0/4.0;\n    double\
  \ d1 = 10/4;\n    double d2 = 10.0/4.0;\n    double d3 = 0/0;\n    double d4 = 0/0.0;\n\
  \    double d5 = 2.9/0.0;\n    ```\n\n19.  补全以下代码片段，将 `x` 的二进制补码赋值给 `y`。你必须使用按位运算符。\n\
  \n```\n    int x = 19;\n    int y = your-code-goes-here;\n    ```\n\n20.  以下代码片段的输出结果是什么：\n\
  \n```\n    int x = 19;\n    int y = (∼x + 1) + x;\n    System.out.println(y);\n\
  \    ```\n\n6.  语句\n\n在本章中，你将学习：\n\n*   什么是语句\n\n*   什么是声明语句\n\n*   Java 中的表达式是什么，以及如何将它们转换为表达式语句\n\
  \n*   什么是块语句，以及块内声明的变量的作用域是什么\n\n*   什么是控制流语句，以及如何使用 `if-else`、`for` 循环、`while`\
  \ 循环和 `do-while` 循环语句\n\n*   如何使用 `break` 语句退出循环或块\n\n*   如何使用 `continue` 语句忽略循环语句体中剩余的部分并继续下一次迭代\n\
  \n*   什么是空语句以及在哪里使用它\n\n本章中的所有示例都在 `jdojo.statement` 模块中，其声明如清单 6-1 所示。\n\n```\n\
  // module-info.java\nmodule jdojo.statememnt {\n// 没有模块语句\n}\n清单 6-1.\n名为 jdojo.statement\
  \ 的模块的声明\n```\n\n什么是语句？\n\n语句指定了 Java 程序中的一个动作，例如将 `x` 和 `y` 的和赋值给 `z`、向标准输出打印消息、将数据写入文件、遍历值列表、有条件地执行一段代码等。语句是使用关键字、运算符和表达式编写的。\n\
  \n语句的类型\n\n根据语句执行的动作，Java 中的语句可以大致分为三类：\n\n*   声明语句\n\n*   表达式语句\n\n*   控制流语句\n\n\
  后续章节将详细描述所有语句类型。\n\n声明语句\n\n声明语句用于声明一个变量。你已经在使用这种类型的语句了。以下是 Java 中声明语句的几个示例：\n\n\
  ```\nint num;\nint num2 = 100;\nString str;\n```\n\n表达式语句\n\nJava 中的表达式由字面量、变量、运算符和方法调用组成，它们是\
  \ Java 程序的构建块。表达式会被求值，求值结果可能产生一个变量、一个值或什么也不产生。表达式总是有一个类型，如果是对返回类型为 `void` 的方法的调用，则该类型可能是\
  \ `void`。以下是 Java 中表达式的一些示例：\n\n*   `19 + 69`\n\n*   `num + 2`\n\n*   `num++`\n\n\
  *   `System.out.println(\"Hello\")`\n\n*   `new String(\"Hello\")`\n\n末尾带有分号的表达式称为表达式语句。然而，并非所有\
  \ Java 表达式都可以通过在其后附加分号来转换为表达式语句。假设 `x` 和 `y` 是两个 `int` 变量，以下是一个求值为 `int` 值的算术表达式：\n\
  \n```\nx + y\n```\n\n但是，以下在 Java 中不是有效的表达式语句：\n\n```\nx + y;\n```\n\n允许这样的语句没有意义。它计算了\
  \ `x` 和 `y` 的值，但没有对该值进行任何操作。只有以下四种表达式可以通过在其后附加分号转换为表达式语句：\n\n*   递增和递减表达式\n\n* \
  \  赋值表达式\n\n*   对象创建表达式\n\n*   方法调用表达式\n\n递增和递减表达式语句的一些示例如下：\n\n```\nnum++;\n++num;\n\
  num--;\n--num;\n```\n\n赋值表达式语句的一些示例如下：\n\n```\nnum = 100;\nnum *= 10;\n```\n\n对象创建表达式语句的一个示例如下：\n\
  \n```\nnew String(\"This is a text\");\n```\n\n请注意，此语句创建了一个 `String` 类的新对象。但是，新对象的引用并未存储在任何引用变量中。因此，此语句不是很有用。然而，在某些情况下，你可以以有用的方式使用此类对象创建语句，例如，当驱动程序类被加载时，JDBC\
  \ 驱动程序会向驱动程序管理器注册自己，而加载驱动程序类的一种方法就是创建其对象并丢弃创建的对象。\n\n你调用 `println()` 方法在控制台上打印消息。当你使用\
  \ `println()` 方法且末尾没有分号时，它是一个表达式。当你向方法调用的末尾添加分号时，它就变成了一个语句。以下是方法调用表达式语句的一个示例：\n\n\
  ```\nSystem.out.println(\"This is a statement\");\n```\n\n控制流语句\n\n默认情况下，Java 程序中的所有语句都按照它们在程序中出现的顺序执行。但是，你可以使用控制流语句更改执行顺序。有时你可能只想在特定条件为真时执行一条语句或一组语句。有时你可能想重复执行一组语句多次，或者只要特定条件为真就执行。所有这些在\
  \ Java 中都可以通过控制流语句实现；`if` 和 `for` 语句就是控制流语句的示例。我稍后将讨论控制流语句。\n\n块语句\n\n块语句是用花括号括起来的零条或多条语句的序列。块语句通常用于将多条语句组合在一起，以便在需要单条语句的情况下使用它们。在某些情况下，你只能使用一条语句。如果你想在这些情况下使用多条语句，你可以通过将所有语句放在花括号内来创建一个块语句，这将被视为一条语句。你可以将块语句视为一个复合语句，它被当作一条语句来处理。以下是块语句的示例：\n\
  \n```\n{ /* 块语句的开始。块语句以 { 开始 */\nint num1 = 20;\nnum1++;\n} /* 块语句的结束。块语句以 } 结束\
  \ */\n{\n// 另一个有效的块语句，内部没有语句\n}\n```\n\n\n\n在块语句中声明的所有变量只能在该块内使用。换句话说，可以说在块中声明的所有变量都具有局部作用域。请看以下代码片段：\n\
  \n```\n// 声明一个变量 num1\nint num1;\n{ // 块语句开始\n// 声明一个变量 num2，它是该块的局部变量\nint num2;\n\
  // num2 是该块的局部变量，因此可以在此处使用\nnum2 = 200;\n// 我们可以在此处使用 num1，因为它是在该块之前和外部声明的\nnum1\
  \ = 100;\n} // 块语句结束\n// 编译时错误。num2 已在块内声明，因此不能在块外使用\nnum2 = 50;\n```\n\n你也可以将一个块语句嵌套在另一个块语句内部。外层块（外部块）中声明的所有变量对内层块（内部块）都是可用的。然而，在内层块中声明的变量在外层块中不可用。例如：\n\
  \n```\n// 外部块开始\n{\nint num1 = 10;\n// 内部块开始\n{\n// 此处 num1 可用，因为我们在内部块中\nnum1 =\
  \ 100;\nint num2 = 200; // 在内部块中声明\nnum2 = 678;     // 正确。num2 是内部块的局部变量\n}\n//\
  \ 内部块结束\n// 编译时错误。num2 是内部块的局部变量。\n// 因此，不能在内部块外部使用它。\nnum2 = 200;\n}\n// 外部块结束\n\
  ```\n\n关于嵌套块语句，需要记住的一个重要点是：如果外部块中已经定义了一个同名的变量，则不能在内部块中定义同名的变量。这是因为外部块中声明的变量始终可以在内部块中使用，如果你在内部块中声明了一个同名的变量，Java\
  \ 就无法区分内部块中的这两个变量。以下代码片段将无法编译：\n\n```\nint num1 = 10;\n{\n// 编译时错误。num1 已在作用域中。无法重新声明\
  \ num1\nfloat num1 = 10.5F;\nfloat num2 = 12.98F; // 正确\n{\n// 编译时错误。num2 已在作用域中。\n\
  // 你可以使用已在外部块中定义的 num2，但不能重新声明它。\nfloat num2;\n}\n}\n```\n\nif-else 语句\n\n`if-else`\
  \ 语句的格式如下：\n\n```\nif (条件)\n语句 1\nelse\n语句 2\n```\n\n`条件` 必须是 `boolean` 表达式。也就是说，它必须求值为\
  \ `true` 或 `false`。如果 `条件` 求值为 `true`，则执行 `语句 1`。否则，执行 `语句 2`。`if-else` 语句的流程图如图\
  \ 6-1 所示。\n\n![A323069_2_En_6_Fig1_HTML.gif](img/A323069_2_En_6_Fig1_HTML.gif)\n\
  \n图 6-1.\n\nif-else 语句的流程图\n\n`if-else` 语句中的 `else` 部分是可选的。如果缺少 `else` 部分，该语句有时简称为\
  \ `if` 语句。你可以按如下方式编写 `if` 语句：\n\n```\nif (条件)\n语句\n```\n\n`if` 语句的流程图如图 6-2 所示。\n\
  \n![A323069_2_En_6_Fig2_HTML.gif](img/A323069_2_En_6_Fig2_HTML.gif)\n\n图 6-2.\n\n\
  if 语句的流程图\n\n假设有两个名为 `num1` 和 `num2` 的 `int` 变量。假设你想在 `num1` 大于 `50` 时给 `num2` 加上\
  \ `10`。否则，你想从 `num2` 中减去 `10`。你可以使用 `if-else` 语句编写此逻辑：\n\n```\nif (num1 > 50)\n\
  num2 = num2 + 10;\nelse\nnum2 = num2 - 10;\n```\n\n假设你有三个名为 `num1`、`num2` 和 `num3`\
  \ 的 `int` 变量。你想在 `num1` 大于 `50` 时给 `num2` 和 `num3` 加上 `10`。否则，你想从 `num2` 和 `num3`\
  \ 中减去 `10`。你可能会尝试以下不正确的代码片段：\n\n```\nif (num1 > 50)\nnum2 = num2 + 10;\nnum3 = num3\
  \ + 10;\nelse\nnum2 = num2 - 10;\nnum3 = num3 - 10;\n```\n\n此代码会产生编译时错误。这段代码有什么问题？在\
  \ `if-else` 语句中，你只能在 `if` 和 `else` 之间放置一条语句。这就是语句 `num3 = num3 + 10;` 导致编译时错误的原因。实际上，在\
  \ `if-else` 语句或简单的 `if` 语句中，你始终只能将一条语句与 `if` 部分关联。`else` 部分也是如此。在此示例中，只有 `num2 =\
  \ num2 - 10;` 与 `else` 部分关联；最后一条语句 `num3 = num3 - 10;` 不与 `else` 部分关联。无论 `num1`\
  \ 是否大于 `50`，你都希望执行两条语句。在这种情况下，你需要将两条语句捆绑到一个块语句中，如下所示：\n\n```\nif (num1 > 50) {\n\
  num2 = num2 + 10;\nnum3 = num3 + 10;\n} else {\nnum2 = num2 - 10;\nnum3 = num3 -\
  \ 10;\n}\n```\n\n`if-else` 语句可以嵌套，如下所示：\n\n```\nif (num1 > 50) {\nif (num2 < 30)\
  \ {\nnum3 = num3 + 130;\n} else {\nnum3 = num3 - 130;\n}\n} else {\nnum3 = num3\
  \ = 200;\n}\n```\n\n有时，在嵌套的 `if-else` 语句中，确定哪个 `else` 与哪个 `if` 配对会令人困惑。考虑以下代码：\n\
  \n```\nint i = 10;\nint j = 15;\nif (i > 15)\nif (j == 15)\nSystem.out.println(\"\
  Thanks\");\nelse\nSystem.out.println(\"Sorry\");\n```\n\n这段代码的输出是什么？它会打印 `\"Thanks\"\
  ` 还是 `\"Sorry\"`，或者什么都不打印？如果你猜它什么都不打印，那么你已经理解了 `if-else` 的关联规则。\n\n你可以应用一个简单的规则来确定在\
  \ `if-else` 语句中哪个 `else` 与哪个 `if` 配对。从 `else` 开始向上查找。如果你没有找到任何其他 `else` 语句，那么你找到的第一个\
  \ `if` 就与你开始查找的 `else` 配对。如果你在找到任何 `if` 之前向上查找时找到了一个 `else`，那么第二个 `if` 就与你开始查找的\
  \ `else` 配对，依此类推。在此示例中，从 `else` 开始，你找到的第一个 `if` 是 `if (j == 15)`，因此 `else` 与此 `if`\
  \ 配对。前面的代码片段可以使用缩进和块语句重写如下：\n\n```\nint i = 10;\nint j = 15;\nif (i > 15) {\nif\
  \ (j == 15) {\nSystem.out.println(\"Thanks\");\n} else {\nSystem.out.println(\"\
  Sorry\");\n}\n}\n```\n\n因为 `i` 等于 10，表达式 `i > 15` 将返回 `false`，因此控制流根本不会进入 `if` 语句。因此，不会有任何输出。\n\
  \n请注意，`if` 语句中的 `条件` 表达式必须是 `boolean` 类型。因此，如果你想比较两个 `int` 变量 `i` 和 `j` 是否相等，你的\
  \ `if` 语句必须如下所示：\n\n```\nif (i == j)\n语句\n```\n\n你不能像这样编写 `if` 语句：\n\n```\nif (i\
  \ = 5) /* 编译时错误 */\n语句\n```\n\n此 `if` 语句将无法编译，因为 `i = 5` 是一个赋值表达式，它求值为一个 `int` 值\
  \ 5。条件表达式必须返回一个 `boolean` 值：`true` 或 `false`。因此，赋值表达式不能用作 `if` 语句中的条件表达式，除非你正在将一个\
  \ `boolean` 值赋给一个 `boolean` 变量，如下所示：\n\n```\nboolean b;\nif (b = true) /* 始终返回 true\
  \ */\n语句\n```\n\n此处，赋值表达式 `b = true` 在将 `true` 赋给 `b` 后始终返回 `true`。在这种情况下，在 `if`\
  \ 语句中使用赋值表达式是允许的，因为表达式 `b = true` 的数据类型是 `boolean`。\n\n你可以使用三元运算符代替简单的 `if-else`\
  \ 语句。假设，如果一个人是男性，你想将称谓设置为 `Mr.`，如果不是，则设置为 `Ms.`。你可以使用 `if-else` 语句以及三元运算符来实现，如下所示：\n\
  \n```\nString title;\nboolean isMale = true;\n// 使用 if-else 语句\nif (isMale)\ntitle\
  \ = \"Mr.\";\nelse\ntitle = \"Ms.\";\n// 使用三元运算符\ntitle = (isMale ? \"Mr.\" : \"\
  Ms.\");\n```\n\n\n\n你可以看到使用 `if-else` 语句与三元运算符的区别。使用三元运算符的代码更为紧凑。然而，你不能用三元运算符替换所有的\
  \ `if-else` 语句。只有当 `if-else` 语句中的 `if` 和 `else` 部分都只包含一条语句，并且这两条语句返回相同类型的值时，你才能用三元运算符替代\
  \ `if-else` 语句。因为三元运算符是一个运算符，它可以用于表达式中。假设你想将 `i` 和 `j` 中的最小值赋给 `k`。你可以在变量 `k` 的声明语句中这样操作：\n\
  \n```\nint i = 10;\nint j = 20;\nint k = (i < j ? i : j); // 在初始化中使用三元运算符\n```\n\
  \n同样的功能也可以通过 `if-else` 语句实现，如下所示：\n\n```\nint i = 10;\nint j = 20;\nint k;\nif (i\
  \ < j)\nk = i;\nelse\nk = j;\n```\n\n使用三元运算符和 `if-else` 语句的另一个区别是，你可以将包含三元运算符的表达式作为方法的参数。然而，你不能将\
  \ `if-else` 语句作为方法的参数。假设你有一个 `calc()` 方法，它接受一个 `int` 类型的参数。你有两个整数 `num1` 和 `num2`。如果你想将这两个整数中的最小值传递给\
  \ `calc()` 方法，你可以编写如下代码：\n\n```\n// 使用 if-else 语句\nif (num1 < num2)\ncalc(num1);\n\
  else\ncalc(num2);\n// 使用三元运算符\ncalc(num1 < num2 ? num1 : num2);\n```\n\n假设你想在 `int`\
  \ 变量 `k` 的值等于 `15` 时打印消息 `\"k is 15\"`，否则打印消息 `\"k is not 15\"`。你可以使用三元运算符，通过一行代码打印消息，如下所示：\n\
  \n```\nSystem.out.println(k == 15 ? \"k is 15\" : \"k is not 15\");\n```\n\nswitch\
  \ 语句\n\n`switch` 语句的一般形式是\n\n```\nswitch (switch-expression) {\ncase label1:\nstatements\n\
  case label2:\nstatements\ncase label3:\nstatements\ndefault:\nstatements\n}\n```\n\
  \n`switch-expression` 必须求值为以下类型之一：`byte`、`short`、`char`、`int`、`enum` 或 `String`。关于如何在\
  \ `switch` 语句中使用 `enum` 类型的详细信息，请参考第 22 章关于枚举的内容。关于如何在 `switch` 语句中使用字符串的详细信息，请参考第\
  \ 15 章关于字符串的内容。`label1`、`label2` 等是编译时常量表达式，它们的值必须在 `switch-expression` 类型的取值范围内。`switch`\
  \ 语句的执行过程如下：\n\n*   对 `switch-expression` 进行求值。\n\n*   如果 `switch-expression` 的值与某个\
  \ `case` 标签匹配，则从匹配的 `case` 标签开始执行，并执行所有语句，直到 `switch` 语句结束。\n\n*   如果 `switch-expression`\
  \ 的值与任何 `case` 标签都不匹配，则从可选的 `default` 标签之后的语句开始执行，并继续执行直到 `switch` 语句结束。\n\n以下代码片段是使用\
  \ `switch` 语句的一个示例：\n\n```\nint i = 10;\nswitch (i) {\ncase 10: // 找到匹配\nSystem.out.println(\"\
  Ten\"); // 从此处开始执行\ncase 20:\nSystem.out.println(\"Twenty\"); // 也会执行这条语句\ndefault:\n\
  System.out.println (\"No-match\"); // 也会执行这条语句\n}\n```\n\n```\nTen\nTwenty\nNo-match\n\
  ```\n\n`i` 的值是 10。执行从 `case 10:` 之后的第一条语句开始，并依次贯穿 `case 20:` 和 `default` 标签，执行这些标签下的语句。如果你将\
  \ `i` 的值改为 50，则不会与任何 `case` 标签匹配，执行将从 `default` 标签之后的第一条语句开始，这将打印 `\"No-match\"\
  `。以下示例说明了这一逻辑：\n\n```\nint i = 50;\nswitch (i) {\ncase 10:\nSystem.out.println(\"\
  Ten\");\ncase 20:\nSystem.out.println(\"Twenty\");\ndefault:\nSystem.out.println(\"\
  No-match\"); // 从此处开始执行\n}\n```\n\n```\nNo-match\n```\n\n\n\n`default`标签不必是`switch`语句中的最后一个标签，它是可选的。以下是一个`default`标签并非最后一个标签的示例：\n\
  \n```\nint i = 50;\nswitch (i) {\ncase 10:\nSystem.out.println(\"Ten\");\ndefault:\n\
  System.out.println(\"No-match\"); // 执行从这里开始\ncase 20:\nSystem.out.println(\"Twenty\"\
  );\n}\n```\n\n```\nNo-match\nTwenty\n```\n\n由于`i`的值为 50，与任何`case`标签都不匹配，因此执行从`default`标签后的第一条语句开始。控制流会贯穿后续的`case\
  \ 20:`标签，并执行该 case 标签后的语句，即打印`Twenty`。通常，如果`i`的值为 10，你希望打印`Ten`；如果`i`的值为 20，则打印`Twenty`；如果`i`的值既不是`10`也不是`20`，则打印`No-match`。这可以通过在`switch`语句中使用`break`语句来实现。当在`switch`语句中执行`break`语句时，控制流会转移到`switch`语句之外。以下是在`switch`语句中使用`break`语句的示例：\n\
  \n```\nint i = 10;\nswitch (i) {\ncase 10:\nSystem.out.println(\"Ten\");\nbreak;\
  \ // 将控制流转移到 switch 语句之外\ncase 20:\nSystem.out.println(\"Twenty\");\nbreak; // 将控制流转移到\
  \ switch 语句之外\ndefault:\nSystem.out.println(\"No-match\");\nbreak; // 将控制流转移到 switch\
  \ 语句之外。此处的 break 并非必需。\n}\n```\n\n```\nTen\n```\n\n请注意上述代码片段中`break`语句的使用。实际上，在`switch`语句中执行`break`语句会停止`switch`语句的执行，并将控制流转移到`switch`语句之后的第一条语句（如果有的话）。在上述代码片段中，`default`标签内使用`break`语句并非必需，因为`default`标签是`switch`语句中的最后一个标签，`switch`语句的执行无论如何都会在此之后停止。然而，我建议即使在最后一个标签中也使用`break`语句，以避免后续添加更多标签时出现错误。\n\
  \n用作`case`标签的常量表达式的值必须在`switch-expression`的数据类型范围内。请记住，Java 中`byte`数据类型的范围是-128\
  \ 到 127，以下代码将无法编译，因为第二个`case`标签是`150`，超出了`byte`数据类型的范围：\n\n```\nbyte b = 10;\nswitch\
  \ (b) {\ncase 5:\nb++;\ncase 150: // 编译时错误。150 超出了 -128 到 127 的范围\nb--;\ndefault:\n\
  b = 0;\n}\n```\n\n`switch`语句中的两个 case 标签不能相同。以下代码片段将无法编译，因为`case`标签`10`重复了：\n\n\
  ```\nint num = 10;\nswitch (num) {\ncase 10:\nnum++;\ncase 10: // 编译时错误。重复的标签 10\n\
  num--;\ndefault:\nnum = 100;\n}\n```\n\n需要注意的是，`switch`语句中每个`case`的标签必须是编译时常量。也就是说，标签的值必须在编译时已知，否则会发生编译时错误。例如，以下代码将无法编译：\n\
  \n```\nint num1 = 10;\nint num2 = 10;\nswitch (num1) {\ncase 20:\nSystem.out.println(\"\
  num1 is 20\");\ncase num2: // 编译时错误。num2 是一个变量，不能用作标签\nSystem.out.println(\"num1\
  \ is 10\");\n}\n```\n\n你可能会说，当`switch`语句执行时，你知道`num2`的值是 10。然而，所有变量都是在运行时求值的。变量的值在编译时是未知的。因此，`case\
  \ num2:`会导致编译器错误。这是必要的，因为 Java 在编译时就要确保所有`case`标签都在`switch-expression`的数据类型范围内。如果不在，那么这些\
  \ case 标签后面的语句在运行时将永远不会被执行。\n\n提示\n\n`default`标签是可选的。在一个`switch`语句中最多只能有一个`default`标签。\n\
  \n当`if-else`语句中的条件表达式比较同一个变量的值是否相等时，`switch`语句是一种更清晰的编写方式。例如，以下`if-else`和`switch`语句实现了相同的功能：\n\
  \n```\n// 使用 if-else 语句\nif (i == 10)\nSystem.out.println(\"i is 10\");\nelse if\
  \ (i == 20)\nSystem.out.println(\"i is 20\");\nelse\nSystem.out.println(\"i is neither\
  \ 10 nor 20\");\n// 使用 switch 语句\nswitch (i) {\ncase 10:\nSystem.out.println(\"\
  i is 10\");\nbreak;\ncase 20:\nSystem.out.println(\"i is 20\");\nbreak;\ndefault:\n\
  System.out.println(\"i is neither 10 nor 20\") ;\n}\n```\n\nfor 语句\n\n`for`语句是一种迭代语句，用于根据某些条件多次循环执行一条语句。它也被称为`for`循环语句或简称为`for`循环。`for`循环语句的一般形式是：\n\
  \n```\nfor (initialization; condition-expression; expression-list)\nstatement\n\
  ```\n\n`initialization`、`condition-expression`和`expression-list`之间用分号分隔。一个`for`循环语句由四部分组成：\n\
  \n*   初始化部分\n*   条件表达式\n*   语句\n*   表达式列表\n\n首先，执行初始化部分；然后，计算条件表达式。如果条件表达式计算结果为`true`，则执行与`for`循环语句关联的语句。之后，计算表达式列表中的所有表达式。再次计算条件表达式，如果计算结果为`true`，则再次执行与`for`循环语句关联的语句，然后执行表达式列表，以此类推。这个执行循环会一直重复，直到条件表达式计算结果为`false`。图\
  \ 6-3 展示了`for`循环语句的流程图。\n\n![A323069_2_En_6_Fig3_HTML.gif](img/A323069_2_En_6_Fig3_HTML.gif)\n\
  \n图 6-3.\n\nfor 循环语句的流程图\n\n例如，以下`for`循环语句将打印 1 到 10 之间的所有整数（包括 1 和 10）：\n\n```\n\
  for(int num = 1; num <= 10; num++)\nSystem.out.println(num);\n```\n\n首先，执行`int num\
  \ = 1`，声明一个名为`num`的`int`变量并将其初始化为 1。需要注意的是，在`for`循环语句的初始化部分声明的变量只能在该`for`循环语句内部使用。然后，计算条件表达式`num\
  \ <= 10`，即`1 <= 10`；第一次计算结果为`true`。现在，执行与`for`循环语句关联的语句，打印`num`的当前值。最后，计算表达式列表中的表达式`num++`，将`num`的值增加\
  \ 1。此时，`num`的值变为 2。计算条件表达式`2 <= 10`，返回`true`，并打印`num`的当前值。此过程持续进行，直到`num`的值变为 10\
  \ 并打印出来。之后，`num++`将`num`的值设置为 11，条件表达式`11 <= 10`返回`false`，从而停止`for`循环语句的执行。\n\n\
  `for`循环语句中的三个部分（初始化部分、条件表达式和表达式列表）都是可选的。请注意，第四部分（语句）不是可选的。因此，如果你在`for`循环语句中没有要执行的语句，则必须使用一个空的块语句或一个分号来代替语句。被视为语句的分号称为空语句或\
  \ null 语句。使用`for`循环语句编写无限循环的方式如下：\n\n```\nfor( ; ; ) {\n// 无限循环\n}\n```\n\n上述`for`循环语句可以使用空语句（即分号）重写如下：\n\
  \n```\n// 无限循环。注意分号作为一条语句\nfor( ; ; );\n```\n\n接下来将详细讨论`for`循环语句的每个部分。\n\n初始化部分\n\
  \n\n\n`for` 循环语句的初始化部分可以包含一个变量声明语句，该语句可以声明一个或多个相同类型的变量，也可以包含一个由逗号分隔的表达式语句列表。请注意，初始化部分中使用的语句不以分号结尾。以下代码片段展示了\
  \ `for` 循环语句中的初始化部分：\n\n```\n// 声明两个相同类型 int 的变量 i 和 j\nfor(int i = 10, j = 20;\
  \ ; );\n// 声明一个 double 类型的变量 salary\nfor(double salary = 3455.78F; ; );\n// 尝试声明两个不同类型的变量\n\
  for(int i = 10, double d1 = 20.5; ; ); /* 编译时错误 */\n// 使用表达式 i++\nint i = 100;\n\
  for(i++; ; ); // 正确\n// 使用表达式在控制台打印消息\nfor(System.out.println(\"Hello\"); ; ); \
  \ // 正确\n// 使用两个表达式：打印消息并递增 num\nint num = 100;\nfor(System.out.println(\"Hello\"\
  ), num++; ; );\n```\n\n提示\n\n`for` 循环的初始化部分仅在 `for` 循环执行时执行一次。\n\n你可以在 `for` 循环语句的初始化部分声明一个新变量。但是，你不能重新声明一个已在作用域内的变量。\n\
  \n```\nint i = 10;\nfor (int i = 0; ; ); // 错误。不能重新声明 i\n```\n\n你可以在 `for` 循环语句中重新初始化变量\
  \ `i`，如下所示：\n\n```\nint i = 10; // 将 i 初始化为 10\ni = 500;    // 此处 i 的值变为 500\n/*\
  \ 其他语句在此处... */\nfor (i = 0; ; ); // 在 for 循环内部将 i 重新初始化为零\n```\n\n条件表达式\n\n条件表达式必须求值为\
  \ `true` 或 `false` 的 `boolean` 值。否则，会发生编译时错误。条件表达式是可选的。如果省略，则假定条件表达式为 `true` 的 `boolean`\
  \ 值，这将导致无限循环，除非使用 `break` 语句来停止循环。以下两个 `for` 循环语句会导致无限循环，并且它们是相同的：\n\n```\n// 无限循环\
  \ - 隐式条件表达式为 true\nfor( ; ; );\n// 无限循环 - 使用显式的 true 作为条件表达式\nfor( ; true; );\n\
  ```\n\n`break` 语句用于停止 `for` 循环语句的执行。当执行 `break` 语句时，控制权将转移到 `for` 循环语句之后的下一条语句（如果有的话）。你可以重写\
  \ `for` 循环语句，使用 `break` 语句打印 1 到 10 之间的所有整数。\n\n```\n// 没有条件表达式的 for 循环\nfor(int\
  \ num = 1;  ; num++) {\nSystem.out.println(num); // 打印数字\nif (num == 10) {\nbreak;\
  \ // 当 i 为 10 时跳出循环\n}\n}\n```\n\n这个 `for` 循环语句打印的整数与之前的 `for` 循环语句相同。但是，不推荐使用后者，因为你使用了\
  \ `break` 语句，而不是使用条件表达式来跳出循环。良好的编程实践是，只要可能，就使用条件表达式来跳出 `for` 循环。\n\n表达式列表\n\n表达式列表部分是可选的。它可以包含一个或多个由逗号分隔的表达式。你只能使用那些可以通过在末尾附加分号而转换为语句的表达式。有关更多详细信息，请参阅本章开头关于表达式语句的讨论。你可以将打印\
  \ 1 到 10 之间所有整数的相同示例重写如下：\n\n```\nfor(int num = 1; num <= 10; System.out.println(num),\
  \ num++);\n```\n\n请注意，这个 `for` 循环语句在表达式列表中使用了两个表达式，它们由逗号分隔。`for` 循环语句让你能够编写更紧凑的代码。\n\
  \n你可以将之前的 `for` 循环语句重写如下，使其更紧凑并完成相同的任务：\n\n```\nfor(int num = 1; num <= 10; System.out.println(num++));\n\
  ```\n\n请注意，你将表达式列表中的两个表达式合并为一个。你使用了 `num++` 作为 `println()` 方法的参数，因此它首先打印 `num` 的值，然后将其值增加\
  \ 1。如果你将 `num++` 替换为 `++num`，你能预测前一个 `for` 循环语句的输出吗？\n\n你还可以使用嵌套的 `for` 循环语句，即一个\
  \ `for` 循环语句内部包含另一个 `for` 循环语句。假设你想打印一个 3x3（读作三乘三）矩阵，如下所示：\n\n```\n11      12  \
  \    13\n21      22      23\n31      32      33\n```\n\n打印 3x3 矩阵的代码可以编写如下：\n\n\
  ```\n// 外层 for 循环语句\nfor(int i = 1; i <= 3; i++) {\n// 内层 for 循环语句\nfor(int j =\
  \ 1; j <= 3; j++) {\nSystem.out.print(i + \"\" + j);\n// 在每个列值后打印一个制表符\nSystem.out.print(\"\
  \\t\");\n}\nSystem.out.println(); // 打印一个新行\n}\n```\n\n前面的代码可以通过以下步骤进行解释。\n\n1.\
  \  执行从外层 `for` 循环语句的初始化部分（`int i = 1`）开始，其中 `i` 被初始化为 1。\n\n2.  对外层 `for` 循环语句的条件表达式（`i\
  \ <= 3`）进行求值，此时 `i` 等于 1，结果为 true。\n\n3.  外层 `for` 循环的语句部分以一个内层 `for` 循环语句开始。\n\n\
  4.  现在 `j` 被初始化为 1。\n\n5.  对内层 `for` 循环语句的条件表达式（`j <= 3`）进行求值，此时 `j` 等于 1，结果为 true。\n\
  \n6.  执行与内层 `for` 循环语句关联的块语句，该语句打印 11 和一个制表符。\n\n7.  执行内层 `for` 循环语句的表达式列表（`j++`），将\
  \ `j` 的值增加到 2。\n\n8.  对内层 `for` 循环语句的条件表达式（`j <= 3`）进行求值，此时 `j` 等于 2，结果为 true。\n\
  \n9.  执行与内层 `for` 循环语句关联的块语句，该语句打印 12 和一个制表符。此时，打印的文本如下所示：\n\n`11  12`\n\n10.  执行内层\
  \ `for` 循环语句的表达式列表（`j++`），将 `j` 的值增加到 3。\n\n11.  对内层 `for` 循环语句的条件表达式（`j <= 3`）进行求值，此时\
  \ `j` 等于 3，结果为 true。\n\n12.  执行与内层 `for` 循环语句关联的块语句，该语句打印 13 和一个制表符。此时，打印的文本如下所示：\n\
  \n`11  12  13`\n\n13.  执行内层 `for` 循环语句的表达式列表（`j++`），将 `j` 的值增加到 4。\n\n14.  对内层 `for`\
  \ 循环语句的条件表达式（`j <= 3`）进行求值，此时 `j` 等于 4，结果为 false。此时，内层 `for` 循环结束。\n\n15.  执行外层\
  \ `for` 循环语句块语句的最后一条语句，即 `System.out.println()`。它打印一个系统相关的行分隔符。\n\n16.  执行外层 `for`\
  \ 循环语句的表达式列表（`i++`），将 `i` 的值增加到 2。\n\n17.  现在，内层 `for` 循环语句以 `i` 等于 2 的值重新开始。对于\
  \ `i` 等于 3 的情况，也会执行这一系列步骤。当 `i` 变为 4 时，外层 `for` 循环语句退出，此时，打印的矩阵将如下所示：\n\n11   12   13\n\
  \n21   22   23\n\n31   32   33\n\n\n\n请注意，这段代码片段还会在每行末尾打印一个制表符，并在最后一行之后打印一个换行符，这些都不是必需的。需要注意的一个重要点是，变量\
  \ `j` 在每次内部 `for` 循环语句开始时被创建，并在内部 `for` 循环语句退出时被销毁。因此，变量 `j` 被创建和销毁了三次。你不能在内部 `for`\
  \ 循环语句之外使用变量 `j`，因为它是在内部 `for` 循环语句内部声明的，其作用域仅限于该内部 `for` 循环语句。清单 6-2 包含了本节讨论的完整代码。该程序确保不会打印多余的制表符和换行符。\n\
  \n```\n// PrintMatrix.java\npackage com.jdojo.statement;\npublic class PrintMatrix\
