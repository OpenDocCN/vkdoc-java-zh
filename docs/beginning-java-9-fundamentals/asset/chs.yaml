  In Java 8\");\nSystem.out.println(\"Instant: \" + now);\nSystem.out.println(\"Local\
  \ Date: \" + ld1);\nSystem.out.println(\"Local Time: \" + lt1);\n/* In JDK 9 */\n\
  // Get a LocalDate from the Instant\nLocalDate ld2 = LocalDate.ofInstant(now, zone);\n\
  // Get the LocalTime from the Instant\nLocalTime lt2 = LocalTime.ofInstant(now,\
  \ zone);\nSystem.out.println(\"\\nIn Java 9\");\nSystem.out.println(\"Instant: \"\
  \ + now);\nSystem.out.println(\"Local Date: \" + ld2);\nSystem.out.println(\"Local\
  \ Time: \" + lt2);\n```\n\n如何计算两个日期和时间之间的天数、小时数等？日期时间 API 提供了多种计算两个日期和时间之间周期的方法。我将推迟到“两个日期和时间之间的周期”一节中讨论此类计算。\n\
  \n偏移时间和日期时间\n\n`OffsetTime` 和 `OffsetDateTime` 类的实例分别表示带有相对于 UTC 固定时区偏移的时间与日期时间。偏移时间和日期时间不包含时区信息。ISO-8601\
  \ 格式的偏移时间和偏移日期时间示例分别为 10:50:11+5:30 和 2012-05-11T10:50:11+5:30。\n\n提示\n\n没有 `OffsetDate`\
  \ 类。它曾是初始设计的一部分，后来被移除了。\n\n本地时间/日期与偏移时间/日期之间的关系可以表示如下：\n\n```\nOffsetTime = LocalTime\
  \ + ZoneOffset\nOffsetDateTime = LocalDateTime + ZoneOffset\n```\n\n处理偏移时间和日期时间与处理其本地对应类型类似，区别在于需要使用时区偏移。你始终可以从\
  \ `OffsetXxx` 中提取 `LocalXxx`。`OffsetDateTime` 存储了时间线上的一个瞬间，因此支持 `OffsetDateTime`\
  \ 与 `Instant` 之间的转换。\n\n清单 16-9 展示了创建偏移时间和日期时间的示例。当你使用 `now()` 方法获取当前偏移时间和日期时间时，会使用系统默认时区来获取时区偏移值。当前时间和日期时间的输出会有所不同。\n\
  \n\n\n```\n// OffsetDateTimeTest.java\npackage com.jdojo.datetime;\nimport java.time.Instant;\n\
  import java.time.LocalDate;\nimport java.time.LocalTime;\nimport java.time.OffsetDateTime;\n\
  import java.time.OffsetTime;\nimport java.time.ZoneId;\nimport java.time.ZoneOffset;\n\
  public class OffsetDateTimeTest {\npublic static void main(String[] args) {\n//\
  \ 获取当前偏移时间\nOffsetTime ot1 = OffsetTime.now();\nSystem.out.println(\"当前偏移时间: \"\
  \ + ot1);\n// 创建一个 +05:30 的时区偏移\nZoneOffset offset = ZoneOffset.ofHoursMinutes(5,\
  \ 30);\n// 创建一个偏移时间\nOffsetTime ot2 = OffsetTime.of(16, 40, 28, 0, offset);\nSystem.out.println(\"\
  一个偏移时间: \" + ot2);\n// 获取当前偏移日期时间\nOffsetDateTime odt1 = OffsetDateTime.now();\n\
  System.out.println(\"当前偏移日期时间: \" + odt1);\n// 创建一个偏移日期时间\nOffsetDateTime odt2 =\
  \ OffsetDateTime.of(2012, 5, 11,\n18, 10, 30, 0,\noffset);\nSystem.out.println(\"\
  一个偏移日期时间: \" + odt2);\n// 从偏移日期时间获取本地日期和时间\nLocalDate ld1 = odt1.toLocalDate();\n\
  LocalTime lt1 = odt1.toLocalTime();\nSystem.out.println(\"当前本地日期: \" + ld1);\nSystem.out.println(\"\
  当前本地时间: \" + lt1);\n// 从偏移日期时间获取瞬时点\nInstant i1 = odt1.toInstant();\nSystem.out.println(\"\
  当前瞬时点: \" + i1);\n// 从瞬时点创建偏移日期时间\nZoneId usChicago = ZoneId.of(\"America/Chicago\"\
  );\nOffsetDateTime odt3 = OffsetDateTime.ofInstant(i1, usChicago);\nSystem.out.println(\"\
  从瞬时点创建的偏移日期时间: \" + odt3);\n}\n}\n清单 16-9.\n使用偏移日期、时间和日期时间\n```\n\n```\n当前偏移时间:\
  \ 20:31:21.678068400-05:00\n一个偏移时间: 16:40:28+05:30\n当前偏移日期时间: 2017-08-04T20:31:21.709320400-05:00\n\
  一个偏移日期时间: 2012-05-11T18:10:30+05:30\n当前本地日期: 2017-08-04\n当前本地时间: 20:31:21.709320400\n\
  当前瞬时点: 2017-08-05T01:31:21.709320400Z\n从瞬时点创建的偏移日期时间: 2017-08-04T20:31:21.709320400-05:00\n\
  ```\n\n带时区的日期时间\n\n`ZonedDateTime` 类的实例表示一个带有**时区规则**的日期时间。时区规则包括一个时区偏移量，以及由于夏令时导致的偏移量变化规则。不存在\
  \ `ZonedDate` 和 `ZonedTime` 类；它们没有实际意义。`ZonedDateTime` 与 `LocalDateTime` 之间的关系可以表示如下：\n\
  \n```\nZonedDateTime = LocalDateTime + ZoneId\n```\n\n以下是从 `LocalDateTime` 创建 `ZonedDateTime`\
  \ 的示例：\n\n```\nZoneId usCentral = ZoneId.of(\"America/Chicago\");\nLocalDateTime\
  \ ldt = LocalDateTime.of(2012, Month.MAY, 11, 7, 30);\nZonedDateTime zdt = ZonedDateTime.of(ldt,\
  \ usCentral);\nSystem.out.println(zdt);\n```\n\n```\n2012-05-11T07:30-05:00[America/Chicago]\n\
  ```\n\n并非所有 `LocalDateTime` 和 `ZoneId` 的组合都能产生有效的 `ZonedDateTime`。由于夏令时的变化，时区的本地时间线上可能存在**间隙**或**重叠**。例如，在\
  \ America/Chicago 时区，2013 年 3 月 10 日凌晨 2:00，时钟向前拨快了一小时，因此在本地时间线上留下了一小时的间隙；凌晨 2:00\
  \ 到 2:59 之间的时间不存在。在同一个 America/Chicago 时区，2013 年 11 月 3 日凌晨 2:00，时钟向后拨慢了一小时，因此在本地时间线上产生了一小时的重叠；凌晨\
  \ 1:00 到 1:59 之间的时间出现了两次。日期时间 API 具有定义明确的规则来处理此类间隙和重叠。\n\n*   如果本地日期时间落在间隙中间，则时间会向前移动与间隙相同的量。例如，如果您想为\
  \ America/Chicago 时区构建一个 2013 年 3 月 10 日凌晨 2:30:00 的带时区日期时间，您将得到 2013 年 3 月 10 日凌晨\
  \ 3:30:00。时间向前移动了一小时，这等于一小时的间隙。\n\n*   如果本地日期时间落在重叠中间，则该时间是有效的。在重叠中，存在两个时区偏移量：一个是时钟向后拨动之前存在的较早偏移量，另一个是时钟向后拨动之后存在的较晚偏移量。默认情况下，对于重叠中的时间，使用较早存在的时区偏移量。`ZonedDateTime`\
  \ 类包含 `withEarlierOffsetAtOverlap()` 和 `withLaterOffsetAtOverlap()` 方法，如果时间落在重叠中，您可以使用这些方法选择所需的时区偏移量。\n\
  \n以下代码片段演示了时间落在间隙和重叠中时 `ZonedDateTime` 的结果：\n\n```\nZoneId usChicago = ZoneId.of(\"\
  America/Chicago\");\n// 2013-03-10T02:30 在 America/Chicago 时区不存在\nLocalDateTime\
  \ ldt = LocalDateTime.of(2013, Month.MARCH, 10, 2, 30);\nZonedDateTime zdt = ZonedDateTime.of(ldt,\
  \ usChicago);\nSystem.out.println(zdt);\n// 2013-10-03T01:30 在 America/Chicago 时区出现了两次\n\
  LocalDateTime ldt2 = LocalDateTime.of(2013, Month.NOVEMBER, 3, 1, 30);\nZonedDateTime\
  \ zdt2 = ZonedDateTime.of(ldt2, usChicago);\nSystem.out.println(zdt2);\n// 尝试使用重叠的两种规则：一种将使用较早的偏移量\
  \ -05:00（默认），另一种使用较晚的偏移量 -06:00\nSystem.out.println(zdt2.withEarlierOffsetAtOverlap());\n\
  System.out.println(zdt2.withLaterOffsetAtOverlap());\n```\n\n```\n2013-03-10T03:30-05:00[America/Chicago]\n\
  2013-11-03T01:30-05:00[America/Chicago]\n2013-11-03T01:30-05:00[America/Chicago]\n\
  2013-11-03T01:30-06:00[America/Chicago]\n```\n\n`ZonedDateTime` 类包含一个静态工厂方法 `ofLocal(LocalDateTime\
  \ localDateTime, ZoneId zone, ZoneOffset preferredOffset)`。当指定 `zone` 中的本地时间有两个可用的时区偏移量时，您可以使用此方法通过指定首选时区偏移量来创建\
  \ `ZonedDateTime`。如果指定的首选时区偏移量无效，则使用重叠中较早的时区偏移量。以下代码片段演示了此方法的使用。当我提供一个无效的首选偏移量 -07:00\
  \ 时，会使用较早的偏移量 -05:00。\n\n```\nZoneId usChicago = ZoneId.of(\"America/Chicago\");\n\
  ZoneOffset offset5 = ZoneOffset.of(\"-05:00\");\nZoneOffset offset6 = ZoneOffset.of(\"\
  -06:00\");\nZoneOffset offset7 = ZoneOffset.of(\"-07:00\");\n// 在 2013-10-03T01:30，偏移量\
  \ -05:00 和 -06:00 对于 America/Chicago 时区是有效的\nLocalDateTime ldt = LocalDateTime.of(2013,\
  \ Month.NOVEMBER, 3, 1, 30);\nZonedDateTime zdt5 = ZonedDateTime.ofLocal(ldt, usChicago,\
  \ offset5);\nZonedDateTime zdt6 = ZonedDateTime.ofLocal(ldt, usChicago, offset6);\n\
  ZonedDateTime zdt7 = ZonedDateTime.ofLocal(ldt, usChicago, offset7);\nSystem.out.println(\"\
  使用偏移量 \" + offset5 + \": \" + zdt5);\nSystem.out.println(\"使用偏移量 \" + offset6 +\
  \ \": \" + zdt6);\nSystem.out.println(\"使用偏移量 \" + offset7 + \": \" + zdt7);\n```\n\
  \n```\n使用偏移量 -05:00: 2013-11-03T01:30-05:00[America/Chicago]\n使用偏移量 -06:00: 2013-11-03T01:30-06:00[America/Chicago]\n\
  使用偏移量 -07:00: 2013-11-03T01:30-05:00[America/Chicago]\n```\n\n`ZonedDateTime` 类包含多个方法，用于将其转换为本地和偏移的日期、时间和日期时间表示形式，比较其实例，以及通过更改其某些字段来获取新实例。清单\
  \ 16-10 展示了如何使用带时区的日期时间。对于当前日期和时间，您将获得不同的输出。\n\n\n\n```\n// ZonedDateTimeTest.java\n\
  package com.jdojo.datetime;\nimport java.time.Instant;\nimport java.time.LocalDateTime;\n\
  import java.time.Month;\nimport java.time.OffsetDateTime;\nimport java.time.ZoneId;\n\
  import java.time.ZoneOffset;\nimport java.time.ZonedDateTime;\npublic class ZonedDateTimeTest\
  \ {\npublic static void main(String[] args) {\n// 获取系统默认时区的当前带时区的日期时间\nZonedDateTime\
  \ zdt1 = ZonedDateTime.now();\nSystem.out.println(\"当前带时区的日期时间:\" + zdt1);\n// 创建一个本地日期时间\n\
  LocalDateTime ldt = LocalDateTime.of(2012, Month.MARCH, 11, 7, 30);\n// 创建一些带时区的日期时间\n\
  ZoneId usCentralZone = ZoneId.of(\"America/Chicago\");\nZonedDateTime zdt2 = ZonedDateTime.of(ldt,\
  \ usCentralZone);\nSystem.out.println(zdt2);\n// 获取时区偏移量和时区 ID\nZoneOffset offset\
  \ = zdt2.getOffset();\nZoneId zone = zdt2.getZone();\nSystem.out.println(\"偏移量:\"\
  \ + offset + \", 时区:\" + zone);\n// 减去 10 小时。时区偏移量从 -05:00 变为 -06:00\nZonedDateTime\
  \ zdt3 = zdt2.minusHours(10);\nSystem.out.println(zdt3);\n// 在 Asia/Kolkata 时区创建一个日期时间\n\
  ZoneId indiaKolkataZone = ZoneId.of(\"Asia/Kolkata\");\nZonedDateTime zdt4 = ZonedDateTime.of(ldt,\
  \ indiaKolkataZone);\nSystem.out.println(zdt4);\n// 对带时区的日期时间执行一些转换\nLocalDateTime\
  \ ldt2 = zdt4.toLocalDateTime();\nOffsetDateTime odt = zdt4.toOffsetDateTime();\n\
  Instant i1 = zdt4.toInstant();\nSystem.out.println(\"转换为本地日期时间: \" + ldt2);\nSystem.out.println(\"\
  转换为带偏移量的日期时间: \" + odt);\nSystem.out.println(\"转换为瞬时点: \" + i1);\n}\n}\n清单 16-10.\n\
  使用 ZonedDateTime 类\n```\n\n```\n当前带时区的日期时间:2017-08-04T20:34:59.674634400-05:00[America/Chicago]\n\
  2012-03-11T07:30-05:00[America/Chicago]\n偏移量:-05:00, 时区:America/Chicago\n2012-03-10T20:30-06:00[America/Chicago]\n\
  2012-03-11T07:30+05:30[Asia/Kolkata]\n转换为本地日期时间: 2012-03-11T07:30\n转换为带偏移量的日期时间:\
  \ 2012-03-11T07:30+05:30\n转换为瞬时点: 2012-03-11T02:00:00Z\n```\n\n同一瞬时点，不同时间\n\n有时您需要将一个时区的日期时间转换为另一个时区的日期时间。这类似于询问当芝加哥时间为\
  \ 2012 年 5 月 14 日 16:30 时，印度是几月几日几时。您可以通过多种方式实现。您可以使用 `ZonedDateTime` 类的 `toInstant()`\
  \ 方法从第一个带时区的日期时间获取瞬时点，然后使用 `ofInstant()` 方法创建第二个带时区的日期时间。您也可以使用 `ZonedDateTime`\
  \ 类的 `withZoneSameInstant(ZoneId newZoneId)` 方法，如清单 16-11 所示，来达到相同的结果。\n\n```\n\
  // DateTimeZoneConversion.java\npackage com.jdojo.datetime;\nimport java.time.LocalDateTime;\n\
  import java.time.Month;\nimport java.time.ZoneId;\nimport java.time.ZonedDateTime;\n\
  public class DateTimeZoneConversion {\npublic static void main(String[] args) {\n\
  LocalDateTime ldt = LocalDateTime.of(2012, Month.MAY, 14, 16, 30);\nZoneId usCentral\
  \ = ZoneId.of(\"America/Chicago\");\nZonedDateTime zdt = ZonedDateTime.of(ldt, usCentral);\n\
  System.out.println(\"在美国中部时区:\" + zdt);\nZoneId asiaKolkata = ZoneId.of(\"Asia/Kolkata\"\
  );\nZonedDateTime zdt2 = zdt.withZoneSameInstant(asiaKolkata);\nSystem.out.println(\"\
  在亚洲/加尔各答时区:\" + zdt2);\nZonedDateTime zdt3 = zdt.withZoneSameInstant(ZoneId.of(\"\
  Z\"));\nSystem.out.println(\"在 UTC 时区:\" + zdt3);\n}\n}\n清单 16-11.\n将一个时区的日期时间转换为另一个时区\n\
  ```\n\n```\n在美国中部时区:2012-05-14T16:30-05:00[America/Chicago]\n在亚洲/加尔各答时区:2012-05-15T03:00+05:30[Asia/Kolkata]\n\
  在 UTC 时区:2012-05-14T21:30Z\n```\n\n时钟\n\n`Clock` 类是现实世界时钟的抽象。它提供了访问某个时区当前瞬时点、日期和时间的能力。您可以获取系统默认时区的时钟。\n\
  \n```\nClock clock = Clock.systemDefaultZone();\n```\n\n您也可以获取指定时区的时钟。\n\n```\n\
  // 获取 Asia/Kolkata 时区的时钟\nZoneId asiaKolkata = ZoneId.of(\"Asia/Kolkata\");\nClock\
  \ clock2 = Clock.system(asiaKolkata);\n```\n\n要从时钟获取当前瞬时点、日期和时间，您可以使用日期时间相关类的 `now(Clock\
  \ c)` 方法。\n\n```\n// 获取系统默认时钟\nClock clock = Clock.systemDefaultZone();\n// 获取时钟的当前瞬时点\n\
  Instant instant1 = clock.instant();\n// 使用时钟和 Instant 类获取当前瞬时点\nInstant instant2\
  \ = Instant.now(clock);\n// 使用时钟获取本地日期\nLocalDate ld = LocalDate.now(clock);\n//\
  \ 使用时钟获取带时区的日期时间\nZonedDateTime zdt = ZonedDateTime.now(clock);\n```\n\n所有日期、时间和日期时间类中不带参数的\
  \ `now()` 方法都使用默认时区的系统默认时钟。以下两条语句使用相同的时钟：\n\n```\nLocalTime lt1 = LocalTime.now();\n\
  LocalTime lt2 = LocalTime.now(Clock.systemDefaultZone());\n```\n\n`Clock` 类的 `systemUTC()`\
  \ 方法返回一个 UTC 时区的时钟。您还可以获取一个始终返回相同时间的固定时钟。当您希望测试用例使用相同的当前时间而不依赖于系统时钟的当前时间时，固定时钟在测试中非常有用。您可以使用\
  \ `Clock` 类的 `fixed(Instant fixedInstant, ZoneId zone)` 静态方法来获取一个在指定时区具有固定瞬时点的时钟。`Clock`\
  \ 类还允许您获取一个相对于另一个时钟具有固定偏移量的时钟。\n\n时钟始终知道其时区。您可以按如下方式使用 `Clock` 类获取系统默认时区：\n\n```\n\
  ZoneId defaultZone = Clock.systemDefaultZone().getZone();\n```\n\n提示\n\n`Clock`\
  \ 类的默认实现会忽略闰秒。您也可以扩展 `Clock` 类来实现您自己的时钟。\n\n`Clock` 类包含许多静态工厂方法，允许您创建一个按指定间隔滴答的时钟。这些方法如下：\n\
  \n*   `static Clock tick(Clock baseClock, Duration tickDuration)`\n\n*   `static\
  \ Clock tickMillis(ZoneId zone)`\n\n*   `static Clock tickMinutes(ZoneId zone)`\n\
  \n*   `static Clock tickSeconds(ZoneId zone)`\n\n`tick()` 方法允许您以 `Duration` 的形式指定滴答的粒度。此方法返回的时钟使用第一个参数指定的时钟。返回的时钟使指定的时钟按第二个参数指定的持续时间滴答。以下代码片段获取一个每\
  \ 1 毫秒滴答一次的系统默认时区时钟：\n\n```\nClock clock = Clock.tick(Clock.systemDefaultZone(),\
  \ Duration.ofMillis(1));\n```\n\n其他 `tickXxx()` 方法返回指定时区的最佳可用时钟，该时钟按 `Xxx` 间隔滴答。例如，`tickSeconds()`\
  \ 方法返回的时钟每秒滴答一次。\n\n提示\n\n`tickMillis()` 方法是在 Java 9 中添加到 `Clock` 类的。\n\n时间段\n\n\
  时间段是以日历字段 `years`、`months` 和 `days` 定义的时间量。持续时间也是以秒和纳秒为单位测量的时间量。支持负的时间段。\n\n时间段和持续时间有什么区别？持续时间表示精确的纳秒数，而时间段表示不精确的时间量。时间段之于人类，正如持续时间之于机器。\n\
  \n时间段的一些例子是 1 天、2 个月、5 天、3 个月零 2 天等。当有人提到 2 个月的时间段时，您不知道这 2 个月的确切纳秒数。2 个月的时间段可能意味着不同的天数（因此纳秒数也不同），具体取决于该时间段何时开始。例如，从\
  \ 1 月 1 日午夜开始的 2 个月时间段可能代表 59 或 60 天，具体取决于该年是否是闰年。类似地，1 天的时间段可能代表 23、24 或 25 小时，具体取决于该天是否处于夏令时的开始/结束时间。\n\
  \n\n\n`Period` 类的实例表示一个时间段。请使用以下静态工厂方法之一来创建 `Period`：\n\n*   `static Period of(int\
  \ years, int months, int days)`\n\n*   `static Period ofDays(int days)`\n\n*   `static\
  \ Period ofMonths(int months)`\n\n*   `static Period ofWeeks(int weeks)`\n\n*  \
  \ `static Period ofYears(int years)`\n\n以下代码片段创建了 `Period` 类的一些实例：\n\n```\nPeriod\
  \ p1 = Period.of(2, 3, 5);  // 2 years, 3 months, and 5 days\nPeriod p2 = Period.ofDays(25);\
  \   // 25 days\nPeriod p3 = Period.ofMonths(-3); // -3 months\nPeriod p4 = Period.ofWeeks(3);\
  \   // 3 weeks (21 days)\nSystem.out.println(p1);\nSystem.out.println(p2);\nSystem.out.println(p3);\n\
  System.out.println(p4);\n```\n\n```\nP2Y3M5D\nP25D\nP-3M\nP21D\n```\n\n你可以对时间段执行加法、减法、乘法和取反操作。除法运算执行整数除法，例如，7\
  \ 除以 3 等于 2。以下代码片段展示了对时间段的一些操作及其结果：\n\n```\nPeriod p1 = Period.ofDays(15);  // P15D\n\
  Period p2 = p1.plusDays(12);    // P27D\nPeriod p3 = p1.minusDays(12);   // P3D\n\
  Period p4 = p1.negated();       // P-15D\nPeriod p5 = p1.multipliedBy(3); // P45D\n\
  ```\n\n使用 `Period` 类的 `plus()` 和 `minus()` 方法可以将一个时间段加到另一个时间段上，或者从一个时间段中减去另一个时间段。使用\
  \ `Period` 类的 `normalized()` 方法可以规范化年份和月份。该方法确保 `month` 值保持在 0 到 11 之间。例如，一个“2 年\
  \ 15 个月”的时间段将被规范化为“3 年 3 个月”。\n\n```\nPeriod p1 = Period.of(2, 3, 5);\nPeriod p2\
  \ = Period.of(1, 15, 28);\nSystem.out.println(\"p1: \" + p1);\nSystem.out.println(\"\
  p2: \" + p2);\nSystem.out.println(\"p1.plus(p2): \" + p1.plus(p2));\nSystem.out.println(\"\
  p1.plus(p2).normalized(): \" + p1.plus(p2).normalized());\nSystem.out.println(\"\
  p1.minus(p2): \" + p1.minus(p2));\n```\n\n```\np1: P2Y3M5D\np2: P1Y15M28D\np1.plus(p2):\
  \ P3Y18M33D\np1.plus(p2).normalized(): P4Y6M33D\np1.minus(p2): P1Y-12M-23D\n```\n\
  \n日期时间 API 处理基于 `Period` 和 `Duration` 的计算的方式存在巨大差异。包含 `Period` 的计算会按照人类期望的方式运行。例如，当你向一个\
  \ `ZonedDateTime` 添加一天的时间段时，日期部分会变为第二天，而时间保持不变，无论这一天有多少小时（23、24 或 25 小时）。然而，当你添加一天的持续时间时，它总是会增加\
  \ 24 小时。让我们通过一个例子来阐明这一点。\n\n在 2012-03-11T02:00，美国中部时区的时钟向前拨快了一小时，使得 2012-03-11 成为一个只有\
  \ 23 小时的日子。假设你给某人一个美国中部时区的日期时间 2012-03-10T07:30。如果你问他一天后的日期时间是什么，他的答案会是 2012-03-11T07:30。他的回答很自然，因为对人类来说，在当前日期时间上加一天会得到第二天相同的时间。让我们向机器提出同样的问题。让机器给\
  \ 2012-03-10T07:30 加上 24 小时（这被认为等同于 1 天）。机器的响应将是 2012-03-11T08:30，因为它会精确地在初始日期时间上增加\
  \ 24 小时，并且知道 02:00 到 03:00 之间的小时不存在。清单 16-12 使用 Java 程序演示了这一讨论。\n\n```\n// PeriodTest.java\n\
  package com.jdojo.datetime;\nimport java.time.Duration;\nimport java.time.LocalDateTime;\n\
  import java.time.Month;\nimport java.time.Period;\nimport java.time.ZoneId;\nimport\
  \ java.time.ZonedDateTime;\npublic class PeriodTest {\npublic static void main(String[]\
  \ args) {\nZoneId usCentral = ZoneId.of(\"America/Chicago\");\nLocalDateTime ldt\
  \ = LocalDateTime.of(2012, Month.MARCH, 10, 7, 30);\nZonedDateTime zdt1 = ZonedDateTime.of(ldt,\
  \ usCentral);\nPeriod p1 = Period.ofDays(1);\nDuration d1 = Duration.ofHours(24);\n\
  // Add a period of 1 day and a duration of 24 hours\nZonedDateTime zdt2 = zdt1.plus(p1);\n\
  ZonedDateTime zdt3 = zdt1.plus(d1);\nSystem.out.println(\"Start Datetime: \" + zdt1);\n\
  System.out.println(\"After 1 Day period: \" + zdt2);\nSystem.out.println(\"After\
  \ 24 Hours duration: \" + zdt3);\n}\n}\n清单 16-12.\n向日期时间添加时间段和持续时间的区别\n```\n\n```\n\
  Start Datetime: 2012-03-10T07:30-06:00[America/Chicago]\nAfter 1 Day period: 2012-03-11T07:30-05:00[America/Chicago]\n\
  After 24 Hours duration: 2012-03-11T08:30-05:00[America/Chicago]\n```\n\n两个日期和时间之间的时间段\n\
  \n计算两个日期、时间以及日期时间之间经过的时间量是一个常见需求。例如，你可能需要计算两个本地日期之间的天数，或者两个本地日期时间之间的小时数。日期时间 API\
  \ 提供了计算两个日期和时间之间经过的时间段的方法。有两种方法可以获取两个日期和时间之间的时间量。\n\n*   使用 `ChronoUnit` 枚举中某个常量的\
  \ `between()` 方法。\n\n*   使用某个日期时间相关类（例如 `LocalDate`、`LocalTime`、`LocalDateTime`、`ZonedDateTime`\
  \ 等）的 `until()` 方法。\n\n`ChronoUnit` 枚举有一个 `between()` 方法，它接受两个日期时间对象并返回一个 `long`。该方法返回从第一个参数到第二个参数经过的时间量。如果第二个参数发生在第一个参数之前，则返回一个负值。返回的值是两个日期时间之间的完整单位数。例如，如果你调用\
  \ `HOURS.between(lt1, lt2)`，其中 `lt1` 和 `lt2` 分别是 07:00 和 09:30，它将返回 2，而不是 2.5。但是，如果你调用\
  \ `MINUTES.between(lt1, lt2)`，它将返回 150。\n\n`until()` 方法接受两个参数。第一个参数是结束日期或时间。第二个参数是计算经过时间的时间单位。清单\
  \ 16-13 中的程序展示了如何使用这两种方法来计算两个日期和时间之间的时间量。\n\n```\n// TimeBetween.java\npackage com.jdojo.datetime;\n\
  import java.time.LocalDate;\nimport java.time.LocalTime;\nimport java.time.Month;\n\
  import static java.time.temporal.ChronoUnit.DAYS;\nimport static java.time.temporal.ChronoUnit.HOURS;\n\
  import static java.time.temporal.ChronoUnit.MINUTES;\npublic class TimeBetween {\n\
  public static void main(String[] args) {\nLocalDate ld1 = LocalDate.of(2014, Month.JANUARY,\
  \ 7);\nLocalDate ld2 = LocalDate.of(2014, Month.MAY, 18);\nlong days = DAYS.between(ld1,\
  \ ld2);\nLocalTime lt1 = LocalTime.of(7, 0);\nLocalTime lt2 = LocalTime.of(9, 30);\n\
  long hours = HOURS.between(lt1, lt2);\nlong minutes = MINUTES.between(lt1, lt2);\n\
  System.out.println(\"Using between (days): \" + days);\nSystem.out.println(\"Using\
  \ between (hours): \" + hours);\nSystem.out.println(\"Using between (minutes): \"\
  \ + minutes);\n// Using the until() method\nlong days2 = ld1.until(ld2, DAYS);\n\
  long hours2 = lt1.until(lt2, HOURS);\nlong minutes2 = lt1.until(lt2, MINUTES);\n\
  System.out.println(\"Using until (days): \" + days2);\nSystem.out.println(\"Using\
  \ until (hours): \" + hours2);\nSystem.out.println(\"Using until (minutes): \" +\
  \ minutes2);\n}\n}\n清单 16-13.\n计算两个日期和时间之间经过的时间量\n```\n\n```\nUsing between (days):\
  \ 131\nUsing between (hours): 2\nUsing between (minutes): 150\nUsing until (days):\
  \ 131\nUsing until (hours): 2\nUsing until (minutes): 150\n```\n\n\n\n计算两个日期和时间之间经过的时间量并不总是可行的。例如，你无法判断一个\
  \ `LocalDate` 和一个 `LocalDateTime` 之间的小时数，因为 `LocalDate` 不存储时间部分。如果将这些参数传递给方法，则会抛出运行时异常。规则是，指定的结束日期/时间应可转换为开始日期/时间。\n\
  \n部分日期\n\n部分日期是指未完全指定时间线上某个时刻，但对人类仍有意义的日期、时间或日期时间。通过补充更多信息，一个部分日期可能对应时间线上的多个时刻。例如，12\
  \ 月 25 日不是一个能在时间线上唯一确定的完整日期；然而，当我们谈论圣诞节时，它是有意义的。同样，1 月 1 日作为元旦也是有意义的。\n\n你必须有日期、时间和时区才能在时间线上唯一标识一个时刻。如果你拥有这三部分信息中的一部分（而非全部），那么你拥有的就是一个部分日期。在不提供更多信息的情况下，你无法从部分日期中获得一个\
  \ `Instant`。我已在前面几节中讨论过一些部分日期。\n\n`LocalDate`、`LocalTime`、`LocalDateTime` 和 `OffsetTime`\
  \ 都是部分日期的例子。`OffsetDateTime` 和 `ZonedDateTime` 不是部分日期；它们拥有在时间线上唯一标识一个时刻的信息。本节我将讨论另外三个部分日期：\n\
  \n*   `Year`\n\n*   `YearMonth`\n\n*   `MonthDay`\n\n这些部分日期的名称很容易描述它们。`Year` 表示一个年份，例如，2012、2013\
  \ 等。`YearMonth` 表示一个有效的年份和月份组合，例如，2012-05、2013-09 等。`MonthDay` 表示一个有效的月份和月中天组合，例如，--12-15。清单\
  \ 16-14 展示了你可以对这些部分日期执行的一些操作。\n\n```\n// Partials.java\npackage com.jdojo.datetime;\n\
  import java.time.Month;\nimport java.time.MonthDay;\nimport java.time.Year;\nimport\
  \ java.time.YearMonth;\npublic class Partials {\npublic static void main(String[]\
  \ args) {\n// 使用 Year\nYear y1 = Year.of(2012);    // 2012\nYear y2 = y1.minusYears(1);\
  \ // 2011\nYear y3 = y1.plusYears(1);  // 2013\nYear y4 = Year.now();       // 当前年份\n\
  if (y1.isLeap()) {\nSystem.out.println(y1 + \" 是闰年。\");\n} else {\nSystem.out.println(y1\
  \ + \" 不是闰年。\");\n}\n// 使用 YearMonth\nYearMonth ym1 = YearMonth.of(2012, Month.MAY);\
  \ // 2012-05\n// 获取该月的天数\nint monthLen = ym1.lengthOfMonth(); // 31\nSystem.out.println(ym1\
  \ + \" 中的月天数: \" + monthLen);\n// 获取该年的天数\nint yearLen = ym1.lengthOfYear(); //\
  \ 366\nSystem.out.println(ym1 + \" 中的年天数: \" + yearLen);\n// 使用 MonthDay\nMonthDay\
  \ md1 = MonthDay.of(Month.DECEMBER, 25);\nMonthDay md2 = MonthDay.of(Month.FEBRUARY,\
  \ 29);\nif (md2.isValidYear(2009)) {\nSystem.out.println(md2 + \" 出现在 2009 年\");\n\
  } else {\nSystem.out.println(md2 + \" 未出现在 2009 年\");\n}\n}\n}\n清单 16-14.\n使用 Year、YearMonth\
  \ 和 MonthDay 部分日期\n```\n\n```\n2012 是闰年。\n2012-05 中的月天数: 31\n2012-05 中的年天数: 366\n\
  --02-29 未出现在 2009 年\n```\n\n最后，清单 16-15 包含一个组合两个部分日期以获取另一个部分日期的示例。这是一个完整的程序，用于计算从程序运行年份开始的五年内的圣诞节日期。你可能会得到不同的输出。\n\
  \n```\n// ChristmasDay.java\npackage com.jdojo.datetime;\nimport java.time.LocalDate;\n\
  import java.time.Month;\nimport java.time.MonthDay;\nimport java.time.Year;\nimport\
  \ java.time.format.TextStyle;\nimport java.util.Locale;\npublic class ChristmasDay\
  \ {\npublic static void main(String[] args) {\nMonthDay dec25 = MonthDay.of(Month.DECEMBER,\
  \ 25);\nYear year = Year.now();\n// 构造并打印未来五年的圣诞节日期\nfor (int i = 0; i < 5; i++)\
  \ {\nLocalDate ld = year.plusYears(i).atMonthDay(dec25);\nint yr = ld.getYear();\n\
  String weekDay = ld.getDayOfWeek()\n.getDisplayName(TextStyle.FULL, Locale.getDefault());\n\
  System.out.format(\"%d 年的圣诞节是 %s。%n\", yr, weekDay);\n}\n}\n}\n清单 16-15.\n组合 Year\
  \ 和 MonthDay 以获取 LocalDate\n```\n\n```\n2017 年的圣诞节是 星期一。\n2018 年的圣诞节是 星期二。\n2019\
  \ 年的圣诞节是 星期三。\n2020 年的圣诞节是 星期五。\n2021 年的圣诞节是 星期六。\n```\n\n该程序为 12 月 25 日创建了一个 `MonthDay`\
  \ 部分日期，并不断向其组合一个年份以获取 `LocalDate`。你可以使用 `LocalDate` 类重写清单 16-15 中的程序，如下所示。这展示了日期时间\
  \ API 的多功能性，它允许你以不同的方式实现相同的结果。\n\n```\nLocalDate ld = LocalDate.of(Year.now().getValue(),\
  \ Month.DECEMBER, 25);\nfor (int i = 0; i < 5; i++) {\nLocalDate newDate = ld.withYear(ld.getYear()\
  \ + i);\nint yr = newDate.getYear();\nString weekDay = newDate.getDayOfWeek()\n\
  .getDisplayName(TextStyle.FULL, Locale.getDefault());\nSystem.out.format(\"%d 年的圣诞节是\
  \ %s。%n\", yr, weekDay);\n}\n```\n\n调整日期\n\n有时你想要调整日期和时间，使其具有特定特征，例如，某月的第一个星期一、下一个星期二等。你可以使用\
  \ `TemporalAdjuster` 接口的实例对日期和时间进行调整。该接口有一个方法 `adjustInto()`，它接受一个 `Temporal` 并返回一个\
  \ `Temporal`。日期时间 API 提供了几个常用的日期时间调整器。如果它们不能满足你的需求，你可以创建自己的调整器。我将讨论这两种情况的示例。\n\n\
  提供了一个 `TemporalAdjusters` 类。它包含所有返回不同类型预定义日期调整器的静态方法。与日期时间相关的类包含一个 `with(TemporalAdjuster\
  \ adjuster)` 方法。你需要将从 `TemporalAdjusters` 类的某个方法返回的对象传递给 `with()` 方法。`with()` 方法将使用调整器中的逻辑调整原始日期时间对象的组成部分，并返回其副本。以下代码片段计算了\
  \ 2014 年 1 月 1 日之后的第一个星期一：\n\n```\nimport java.time.DayOfWeek;\nimport java.time.LocalDate;\n\
  import java.time.Month;\nimport java.time.temporal.TemporalAdjusters;\n...\nLocalDate\
  \ ld1 = LocalDate.of(2014, Month.JANUARY, 1);\nLocalDate ld2 = ld1.with(TemporalAdjusters.next(DayOfWeek.MONDAY));\n\
  System.out.println(ld1);\nSystem.out.println(ld2);\n```\n\n```\n2014-01-01\n2014-01-06\n\
  ```\n\n方法名称不言自明，如表 16-4 所示。\n\n表 16-4.\n\nTemporalAdjusters 类中的有用方法\n\n方法\n |\n\
  \  描述\n |\n\n| --- | --- | --- | --- | --- |\n\n`next(DayOfWeek dayOfWeek)`\n |\n\
  \  返回一个调整器，将日期调整为被调整日期之后第一个指定的星期几。\n |\n\n`nextOrSame(DayOfWeek dayOfWeek)`\n |\n\
  \  返回一个调整器，将日期调整为被调整日期之后第一个指定的星期几。如果被调整的日期已经是该指定的星期几，则返回相同的日期。\n |\n\n`previous(DayOfWeek\
  \ dayOfWeek)`\n |\n  返回一个调整器，将日期调整为被调整日期之前第一个指定的星期几。\n |\n\n\n\n`previousOrSame(DayOfWeek\
  \ dayOfWeek)`\n |\n  返回一个调整器，将日期调整为被调整日期之前的第一个指定星期几。如果被调整日期已经是该指定星期几，则返回相同日期。\n\
  \ |\n\n`firstInMonth(DayOfWeek dayOfWeek),`\n\n`lastInMonth(DayOfWeek dayOfWeek)`\n\
  \ |\n  每个方法都返回一个调整器，将日期调整为被调整日期所在月份的第一个/最后一个（分别对应）指定星期几。\n |\n\n`dayOfWeekInMonth(int\
  \ ordinal, DayOfWeek dayOfWeek)`\n |\n  返回一个调整器，将日期调整为被调整日期所在月份的第 `ordinal` 个指定星期几。适用于计算诸如\
  \ 2014 年 1 月的第三个星期一之类的日期。\n |\n\n`firstDayOfMonth()`\n\n`lastDayOfMonth()`\n\n|\n\
