  \ 的类，该类实现 `Greeting` 接口，使得当执行以下代码片段时，它会在标准输出上打印 `\"Hello\"`。\n\n```\n    Greeting\
  \ g = new Greeter();\n    g.sayHello();\n    ```\n\n12. 以下接口声明无法编译。描述原因并提出修复建议。\n\
  \n\n\n```\n    public final interface Colorable {\n    public void color();\n  \
  \  }\n    ```\n\n13.  以下接口声明是否有效？像 `Sensitive` 这样的接口有什么特殊名称？\n\n```\n    public\
