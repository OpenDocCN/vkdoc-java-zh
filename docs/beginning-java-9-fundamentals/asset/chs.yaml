  \ HispanicGreeting implements Greeting {\n    @Override\n    public void greet()\
  \ {\n    System.out.println(\"Ola\");\n    }\n    }\n    ```\n\n执行以下代码片段时，输出结果是什么？\n\
  \n```\n    Greeting usGreeting = new EnglishGreeting();\n    Greeting mxGreeting\
  \ = new HispanicGreeting();\n    usGreeting.greet();\n    mxGreeting.greet();\n\
  \    ```\n\n17.  考虑以下 `Item` 类的部分声明。\n\n```\n    public class Item implements Comparable\
  \ {\n    private String name;\n    private double price;\n    /* 你的代码写在这里 */\n \
  \   }\n    ```\n\n通过添加必要的构造器（允许为物品的名称和价格提供初始值）来完成 `Item` 类。同时为两个实例变量添加 getter 和\
  \ setter 方法。添加所需的方法，使该类实现 `Comparable<Item>` 接口。物品排序的自然顺序是按名称排序。\n\n18.  创建一个自定义比较器类——一个实现\
  \ `Comparator<Item>` 接口的类。该比较器类将先按价格、再按名称对 `Item` 类的对象进行排序。\n\n19.  考虑以下 `Greeting`\
  \ 接口和 `Greeter` 类的声明：\n\n```\n    public interface Greeting {\n    default void\
  \ greet() {\n    System.out.println(\"Namaste\");\n    }\n    }\n    public class\
  \ Greeter implements Greeting {\n    @Override\n    public void greet() {\n    /*\
  \ 在此处调用 Greeting 接口的 greet() 方法 */\n    System.out.println(\"Hello\");\n    }\n\
  \    }\n    ```\n\n通过在 `Greeter` 类的 `greet()` 方法中添加一条语句作为该方法的第一个语句来完成代码。该语句应调用 `Greeting`\
  \ 接口的 `greet()` 方法。当执行以下代码片段时，它应打印 `\"Namaste\"` 和 `\"Hello\"`——每个单词各占一行。\n\n```\n\
  \    Greeting g = new Greeter();\n    g.greet();\n    ```\n\n预期输出如下：\n\n```\n  \
  \  Namaste\n    Hello\n    ```\n\n22. 枚举类型\n\n在本章中，你将学习：\n\n*   什么是枚举类型\n*   如何声明枚举类型和枚举常量\n\
  *   如何在 `switch` 语句中使用枚举\n*   如何将数据和方法关联到枚举常量\n*   如何声明嵌套枚举\n*   如何为枚举类型实现接口\n*\
  \   如何对枚举常量执行反向查找\n*   如何使用 `EnumSet` 处理枚举常量的范围\n\n本章中的所有示例程序都是 `jdojo.enums` 模块的成员，如清单\
  \ 22-1 所示。\n\n```\n// module-info.java\nmodule jdojo.enums {\nexports com.jdojo.enums;\n\
  }\n清单 22-1. jdojo.enums 模块的声明\n```\n\n什么是枚举类型？\n\n枚举（也称为枚举类型和枚举数据类型）允许你将常量的有序列表创建为一种类型。在我们讨论什么是枚举以及为什么需要它之前，让我们考虑一个问题，并使用\
  \ Java 5 引入枚举之前可用的 Java 特性来解决它。假设你正在开发一个缺陷跟踪应用程序，其中需要表示缺陷的严重性。该应用程序允许你将缺陷的严重性指定为低、中、高和紧急。在\
  \ Java 5 之前，表示这四种严重性类型的典型方式是在一个类（比如 `Severity`）中声明四个 `int` 常量，如清单 22-2 所示。\n\n```\n\
  // Severity.java\npackage com.jdojo.enums;\npublic class Severity {\npublic static\
  \ final int LOW = 0;\npublic static final int MEDIUM = 1;\npublic static final int\
  \ HIGH = 2;\npublic static final int URGENT = 3;\n}\n清单 22-2. 包含几个常量的 Severity 类\n\
  ```\n\n假设你想编写一个名为 `DefectUtil` 的工具类，其中包含一个方法，用于根据缺陷的严重性计算预计周转天数。`DefectUtil` 类的代码可能如清单\
  \ 22-3 所示。\n\n```\n// DefectUtil.java\npackage com.jdojo.enums;\npublic class DefectUtil\
  \ {\npublic static int getProjectedTurnaroundDays(int severity) {\nint days = 0;\n\
  switch (severity) {\ncase Severity.LOW:\ndays = 30;\nbreak;\ncase Severity.MEDIUM:\n\
  days = 15;\nbreak;\ncase Severity.HIGH:\ndays = 7;\nbreak;\ncase Severity.URGENT:\n\
  days = 1;\nbreak;\n}\nreturn days;\n}\n// DefectUtil 类的其他代码写在这里\n}\n清单 22-3. DefectUtil\
  \ 类\n```\n\n以下是这种处理缺陷严重性方法的一些问题：\n\n*   由于严重性被表示为整数常量，你可以向 `getProjectedTurnaroundDays()`\
  \ 方法传递任何整数值，而不仅仅是 0、1、2 和 3（这些是严重性类型的有效值）。你可能希望在此方法内部添加检查，以便只允许传递有效的严重性值。否则，该方法可能会抛出异常。然而，这并不能一劳永逸地解决问题。每当你添加新的严重性类型时，都需要更新检查有效严重性值的代码。\n\
  \n*   如果你更改了严重性常量的值，必须重新编译使用它的代码以反映更改。当你编译 `DefectUtil` 类时，`Severity.LOW` 被替换为 `0`，`Severity.MEDIUM`\
  \ 被替换为 `1`，依此类推。如果你将 `Severity` 类中常量 `LOW` 的值更改为 `10`，则必须重新编译 `DefectUtil` 类以反映此更改。否则，`DefectUtil`\
  \ 类仍将使用值 `1`。\n\n*   当你将严重性值保存到磁盘时，将保存其对应的整数值，例如 `0`、`1`、`2` 等，而不是字符串值 `LOW`、`MEDIUM`、`HIGH`\
  \ 等。你必须维护一个单独的映射，以便将所有严重性类型的整数值转换为其对应的字符串表示形式。\n\n*   当你打印缺陷的严重性值时，它将打印一个整数，例如 `0`、`1`、`2`\
  \ 等。严重性的整数值对最终用户没有任何意义。\n\n*   缺陷的严重性类型具有特定的顺序。例如，`LOW` 严重性缺陷的优先级低于 `MEDIUM` 严重性缺陷。由于严重性由任意数字表示，你必须使用硬编码值编写代码来维护\
  \ `Severity` 类中定义的常量的顺序。假设你添加了另一个严重性类型 `VERY_HIGH`，其优先级低于 `URGENT` 但高于 `HIGH`。现在你必须更改处理严重性类型排序的代码，因为你已在现有严重性类型中间添加了一个。\n\
  \n\n\n*   没有自动的方法（除非通过硬编码）能让你列出所有严重性类型。\n\n你会同意，使用整数常量来表示严重性类型难以维护。这是在 Java 5 之前，定义枚举常量唯一易于实现的解决方案。在\
  \ Java 5 之前，你本可以有效解决这个问题，但需要编写的代码量与问题本身不成比例。Java 5 中的 `enum` 类型以一种简单有效的方式解决了这个问题。\n\
  \n根据《梅里亚姆-韦伯斯特在线词典》，“enumerate”一词的意思是“逐一列出”。这正是 `enum` 类型所允许你做的。它允许你按特定顺序指定常量。在\
  \ `enum` 类型中定义的常量是该枚举类型的实例。你可以使用关键字 `enum` 来定义枚举类型。其最简单的通用语法如下：\n\n```\n[access-modifier]\
  \ enum  {\n// 逗号分隔的枚举常量名称列表\n}\n```\n\n枚举的访问修饰符与类的访问修饰符相同：`public`、`private`、`protected`\
  \ 或包级。枚举类型名称是一个有效的 Java 标识符。枚举类型的主体放在其名称后的大括号内。枚举类型的主体可以包含一个逗号分隔的常量列表，以及其他与类中元素类似的元素，例如实例变量、方法等。大多数情况下，枚举主体只包含常量。以下代码声明了一个名为\
  \ `Gender` 的枚举类型，它声明了两个常量——`MALE` 和 `FEMALE`：\n\n```\npublic enum Gender {\nMALE,\
  \ FEMALE; // 在这种情况下，分号是可选的\n}\n```\n\n提示\n\n约定俗成，枚举常量名称使用大写。如果常量列表之后没有代码，最后一个枚举常量后的分号是可选的。\n\
  \n清单 22-4 声明了一个名为 `Severity` 的公共枚举类型，包含四个枚举常量：`LOW`、`MEDIUM`、`HIGH` 和 `URGENT`。\n\
  \n```\n// Severity.java\npackage com.jdojo.enums;\npublic enum Severity {\nLOW,\
  \ MEDIUM, HIGH, URGENT;\n}\n清单 22-4.\nSeverity 枚举的声明\n```\n\n公共枚举类型可以从应用程序的任何位置访问。枚举类型在模块间的可访问性规则与其他类型相同，我在第\
  \ 10 章中讨论过。\n\n就像公共类一样，你需要将清单 22-4 中的代码保存在名为 `Severity.java` 的文件中。编译代码时，编译器会创建一个\
  \ `Severity.class` 文件。请注意，除了使用 `enum` 关键字和主体部分之外，`Severity` 枚举类型的一切看起来都与类声明相同。实际上，Java\
  \ 将枚举类型实现为一个类。编译器为枚举类型做了大量工作，并为其生成本质上是一个类的代码。你需要像将所有类放入包中一样，将枚举类型放入一个包中。你可以像导入类类型一样，使用\
  \ `import` 语句将枚举类型导入到一个编译单元中。\n\n声明枚举类型的变量与声明类类型的变量方式相同：\n\n```\n// 声明 Severity\
  \ 枚举类型的 defectSeverity 变量\nSeverity defectSeverity;\n```\n\n你可以将 `null` 赋值给枚举类型变量，如下所示：\n\
  \n```\nSeverity defectSeverity = null;\n```\n\n你还可以将哪些其他值赋给枚举类型变量？枚举类型定义了两件事：\n\n\
  *   枚举常量，这些是其类型的唯一有效值\n*   这些常量的顺序\n\n`Severity` 枚举类型定义了四个枚举常量。因此，`Severity` 枚举类型的变量只能具有四个值之一——`LOW`、`MEDIUM`、`HIGH`\
  \ 和 `URGENT`——或 `null`。你可以使用点表示法，以枚举类型名称作为限定符来引用枚举常量。以下代码片段将值赋给 `Severity` 枚举类型的变量：\n\
  \n```\nSeverity low = Severity.LOW;\nSeverity medium = Severity.MEDIUM;\nSeverity\
  \ high = Severity.HIGH;\nSeverity urgent = Severity.URGENT;\n```\n\n你不能实例化枚举类型。以下尝试实例化\
  \ `Severity` 枚举类型的代码会导致编译时错误：\n\n```\nSeverity badAttempt = new Severity(); // 编译时错误\n\
  ```\n\n提示\n\n枚举类型既充当类型又充当工厂。它声明了一个新类型以及该类型有效实例的列表作为其常量。\n\n枚举类型还会为其所有常量分配一个序号（或位置编号），称为\
  \ ordinal。序号从零开始，当你从常量列表的第一个移动到最后一个时，序号递增 1。第一个枚举常量被分配序号值 0，第二个为 1，第三个为 2，依此类推。分配给\
  \ `Severity` 枚举类型中声明的常量的序号值为：`LOW` 为 0，`MEDIUM` 为 1，`HIGH` 为 2，`URGENT` 为 3。如果你更改枚举类型主体中常量的顺序或添加新常量，它们的序号值将相应更改。\n\
  \n每个枚举常量都有一个名称。枚举常量的名称与其声明中为该常量指定的标识符相同。例如，`Severity` 枚举类型中 `LOW` 常量的名称是 `\"LOW\"\
  `。\n\n你可以分别使用 `name()` 和 `ordinal()` 方法读取枚举常量的名称和序号。每个枚举类型都有一个名为 `values()` 的静态方法，该方法按其主体中声明的顺序返回一个常量数组。清单\
  \ 22-5 中的程序打印了 `Severity` 枚举类型中声明的所有枚举常量的名称和序号。\n\n```\n// ListEnumConstants.java\n\
  package com.jdojo.enums;\npublic class ListEnumConstants {\npublic static void main(String[]\
  \ args) {\nfor(Severity s : Severity.values()) {\nString name = s.name();\nint ordinal\
  \ = s.ordinal();\nSystem.out.println(name + \"(\" + ordinal + \")\");\n}\n}\n}\n\
  LOW(0)\nMEDIUM(1)\nHIGH(2)\nURGENT(3)\n清单 22-5.\n列出枚举类型常量的名称和序号\n```\n\n枚举类型的超类\n\
  \n枚举类型类似于 Java 类类型。实际上，编译器在编译枚举类型时会创建一个类。出于所有实际目的，你可以将枚举类型视为类类型。但是，有一些规则仅适用于枚举类型。枚举类型也可以有构造方法、字段和方法。我不是说过枚举类型不能被实例化吗？（换句话说，`new\
  \ Severity()` 是无效的。）如果枚举类型不能被实例化，为什么还需要构造方法呢？\n\n以下是需要为枚举类型提供构造方法的原因。枚举类型仅在编译器生成的代码中被实例化。所有枚举常量都是同一枚举类型的对象。这些实例在编译器生成的代码中被创建并命名为与枚举常量相同的名称。编译器在背后施展了魔法。编译器为枚举类型生成的代码类似于下面所示。以下示例代码只是为了让你了解幕后发生的事情。编译器实际生成的代码可能与所示代码不同。例如，`valueOf()`\
  \ 方法的代码让你感觉它比较名称与枚举常量名称，并返回匹配的常量实例。实际上，编译器为 `valueOf()` 方法生成的代码会调用 `Enum` 超类中的 `valueOf()`\
  \ 方法。\n\n\n\n```\n// 转换后的 Severity 枚举类型声明代码\npackage com.jdojo.enums;\npublic final\
  \ class Severity extends Enum {\npublic static final Severity LOW;\npublic static\
  \ final Severity MEDIUM;\npublic static final Severity HIGH;\npublic static final\
  \ Severity URGENT;\n// 在类加载时创建常量\nstatic {\nLOW    = new Severity(\"LOW\", 0);\n\
  MEDIUM = new Severity(\"MEDIUM\", 1);\nHIGH   = new Severity(\"HIGH\", 2);\nURGENT\
  \ = new Severity(\"URGENT\", 3);\n}\n// 私有构造函数，防止直接实例化\nprivate Severity(String\
  \ name, int ordinal) {\nsuper(name, ordinal);\n}\npublic static Severity[] values()\
  \ {\nreturn new Severity[] { LOW, MEDIUM, HIGH, URGENT };\n}\npublic static Severity\
  \ valueOf(String name) {\nif (LOW.name().equals(name)) {\nreturn LOW;\n}\nif (MEDIUM.name().equals(name))\
  \ {\nreturn MEDIUM;\n}\nif (HIGH.name().equals(name)) {\nreturn HIGH;\n}\nif (URGENT.name().equals(name))\
  \ {\nreturn URGENT;\n}\nthrow new IllegalArgumentException(\"无效的枚举常量 \" + name);\n\
  }\n}\n```\n\n通过查看 `Severity` 枚举声明的转换代码，可以得出以下几点：\n\n表 22-1.\n\nEnum 类中所有枚举类型均可使用的方法列表\n\
  \n方法名称\n |\n  描述\n |\n\n| --- | --- | --- | --- | --- |\n\n`public final String\
  \ name()`\n |\n  返回枚举常量的名称，与枚举类型声明中的名称完全一致。\n |\n\n`public final int ordinal()`\n\
  \ |\n  返回枚举常量在枚举类型声明中的顺序（或位置）。\n |\n\n`public final boolean equals(Object other)`\n\
  \ |\n  如果指定对象等于该枚举常量，则返回 `true`，否则返回 `false`。\n请注意，枚举类型不能直接实例化，且具有固定数量的实例，该数量等于其声明的枚举常量个数。这意味着，当对两个枚举常量使用\
  \ `==` 运算符和 `equals()` 方法时，它们会返回相同的结果。\n |\n\n`public final int hashCode()`\n |\n\
  \  返回枚举常量的哈希码值。\n |\n\n`public final int compareTo(E o)`\n |\n  比较此枚举常量与指定枚举常量的顺序。返回此枚举常量与指定枚举常量的序数值之差。请注意，要比较两个枚举常量，它们必须属于同一枚举类型，否则将抛出运行时异常。\n\
  \ |\n\n`public final Class<E> getDeclaringClass()`\n |\n  返回声明该枚举常量的类的 `Class` 对象。如果此方法为两个枚举常量返回相同的类对象，则认为它们属于同一枚举类型。请注意，每个枚举类型从\
  \ `Object` 类继承的 `getClass()` 方法返回的 `Class` 对象可能与此方法返回的类对象不同。当枚举常量具有主体时，该枚举常量对象的实际类与声明类不同；实际上，它是声明类的子类之一。\n\
  \ |\n\n`public String toString()`\n |\n  默认情况下，返回枚举常量的名称，与 `name()` 方法的返回值相同。请注意，此方法未声明为\
  \ final，因此您可以重写它，为每个枚举常量返回更有意义的字符串表示形式。\n |\n\n`public static <T extends Enum<T>>\
  \ T valueOf(Class<T> enumType, String name)`\n |\n  返回指定枚举类型和名称的枚举常量。例如，您可以使用以下代码在代码中获取\
  \ `Severity` 枚举类型的 `LOW` 枚举常量值：\n\n`Severity lowSeverity = Enum.valueOf(Severity.class,\
  \ \"LOW\")`\n |\n\n`protected final Object clone() throws CloneNotSupportedException`\n\
  \ |\n  `Enum` 类重新定义了 `clone()` 方法。它将该方法声明为 final，因此任何枚举类型都不能重写它。该方法始终抛出异常。这是有意为之，以防止枚举常量的克隆。这确保了每个枚举类型只存在一组枚举常量。\n\
  \ |\n\n`protected final void finalize()`\n |\n  `Enum` 类被声明为 final，因此任何枚举类型都不能重写它。它提供了一个空方法体。由于除了其常量之外，您无法创建枚举类型的实例，因此为枚举类型设置\
  \ `finalize()` 方法没有意义。\n |\n\n*   每个枚举类型都隐式地继承 `java.lang.Enum` 类。这意味着 `Enum` 类中定义的所有方法都可以用于所有枚举类型。表\
  \ 22-1 列出了 `Enum` 类中定义的方法。\n\n*   枚举类型隐式地是 final 的。在某些情况下（稍后讨论），编译器无法像在 `Severity`\
  \ 类的示例代码中那样将其声明为 final。\n\n*   编译器会向每个枚举类型添加两个静态方法：`values()` 和 `valueOf()`。`values()`\
  \ 方法按照枚举类型中声明的顺序返回枚举常量数组。您已经在清单 22-5 中看到了 `values()` 方法的使用。`valueOf()` 方法用于通过常量名称（字符串形式）获取枚举类型的实例。例如，`Severity.valueOf(\"\
  LOW\")` 将返回 `Severity.LOW` 常量。`valueOf()` 方法便于反向查找——从字符串值到枚举类型值。\n\n*   `Enum` 类实现了\
  \ `java.lang.Comparable` 和 `java.io.Serializable` 接口。这意味着每个枚举类型的实例都可以进行比较和序列化。`Enum`\
  \ 类确保在反序列化过程中，不会创建除声明为枚举常量之外的任何其他枚举类型实例。您可以使用 `compareTo()` 方法来确定一个枚举常量是在另一个枚举常量之前还是之后声明。请注意，您也可以通过比较它们的序数值来确定两个枚举常量的顺序。`compareTo()`\
  \ 方法执行相同的操作，但多了一项检查：被比较的枚举常量必须属于同一枚举类型。以下代码片段展示了如何比较两个枚举常量：\n\n```\n    Severity\
  \ s1 = Severity.LOW;\n    Severity s2 = Severity.HIGH;\n    // s1.compareTo(s2)\
  \ 返回 s1.ordinal() - s2.ordinal()\n    int diff = s1.compareTo(s2);\n    if (diff\
  \ > 0) {\n    System.out.println(s1 + \" 出现在 \" + s2 + \" 之后\");\n    } else {\n\
  \    System.out.println(s1 + \" 出现在 \" + s2 + \" 之前\");\n    }\n    ```\n\n在 switch\
  \ 语句中使用枚举类型\n\n您可以在 `switch` 语句中使用枚举类型。当 `switch` 表达式是枚举类型时，所有 case 标签必须是同一枚举类型的非限定枚举常量。`switch`\
  \ 语句从其表达式的类型推断出枚举类型名称。您可以包含一个 default 标签。\n\n清单 22-6 包含使用 `switch` 语句的 `DefectUtil`\
  \ 类的修订版本。现在，您无需在 `getProjectedTurnaroundDays()` 方法中处理 `severity` 参数接收 `null` 值的异常情况。如果\
  \ `switch` 语句的枚举表达式计算结果为 `null`，则会抛出 `NullPointerException`。\n\n```\n// DefectUtil.java\n\
  package com.jdojo.enums;\npublic class DefectUtil {\npublic static int getProjectedTurnaroundDays(Severity\
  \ severity) {\nint days = 0;\nswitch (severity) {\n// 必须使用非限定名称 LOW，而不是 Severity.LOW\n\
  case LOW:\ndays = 30;\nbreak;\ncase MEDIUM:\ndays = 15;\nbreak;\ncase HIGH:\ndays\
  \ = 7;\nbreak;\ncase URGENT:\ndays = 1;\nbreak;\n}\nreturn days;\n}\n}\n清单 22-6.\n\
  使用 Severity 枚举的 DefectUtil 类的修订版本\n```\n\n将数据和方法关联到枚举常量\n\n\n\n通常，声明枚举类型只是为了拥有一些枚举常量，就像你在\
  \ `Severity` 枚举类型中所做的那样。\n由于枚举类型实际上是一种类类型，你可以在枚举类型主体内声明几乎任何可以在类主体内声明的内容。让我们为每个 `Severity`\
  \ 枚举常量关联一个数据元素——预计周转天数。你将把增强后的 `Severity` 枚举类型命名为 `SmartSeverity`。\n清单 22-7 包含了\
  \ `SmartSeverity` 枚举类型的代码，它与 `Severity` 枚举类型的代码截然不同。\n\n```\n// SmartSeverity.java\n\
  package com.jdojo.enums;\npublic enum SmartSeverity {\nLOW(30), MEDIUM(15), HIGH(7),\
  \ URGENT(1);\n// 声明一个实例变量\nprivate int projectedTurnaroundDays;\n// 声明一个私有构造器\n\
  private SmartSeverity(int projectedTurnaroundDays) {\nthis.projectedTurnaroundDays\
  \ = projectedTurnaroundDays;\n}\n// 声明一个公共方法以获取周转天数\npublic int getProjectedTurnaroundDays()\
  \ {\nreturn projectedTurnaroundDays;\n}\n}\n清单 22-7.\n一个使用字段、构造器和方法的 SmartSeverity\
  \ 枚举类型声明\n```\n\n我们来讨论一下 `SmartSeverity` 枚举类型中的新内容。\n\n*   它声明了一个名为 `projectedTurnaroundDays`\
  \ 的实例变量，该变量将为每个枚举常量存储预计周转天数的值。\n\n```\n    // 声明一个实例变量\n    private int projectedTurnaroundDays;\n\
  \    ```\n\n*   它定义了一个私有构造器，该构造器接受一个 `int` 参数。它将参数的值存储在实例变量中。你可以向枚举类型添加多个构造器。如果你不添加构造器，则会添加一个无参构造器。你不能向枚举类型添加\
  \ `public` 或 `protected` 构造器。枚举类型声明中的所有构造器都会由编译器进行参数和代码转换，并且它们的访问级别会被更改为 `private`。编译器会在枚举类型的构造器中添加或更改许多内容。作为程序员，你无需了解编译器所做更改的细节。\n\
  \n```\n    // 声明一个私有构造器\n    private SmartSeverity(int projectedTurnaroundDays)\
  \ {\n    this.projectedTurnaroundDays = projectedTurnaroundDays;\n    }\n    ```\n\
  \n*   它声明了一个公共方法 `getProjectedTurnaroundDays()`，该方法返回枚举常量（或枚举类型的实例）的预计周转天数。\n\n\
  *   枚举常量声明已更改为 `LOW(30), MEDIUM(15), HIGH(7), URGENT(1);` 这个变化并不明显。现在每个枚举常量名称后面都跟有一个括号内的整数值，例如\
  \ `LOW(30)`。这种语法是调用接受 `int` 参数类型构造器的简写形式。当创建枚举常量时，括号内的值将被传递给你添加的构造器。通过简单地使用枚举常量的名称（例如常量声明中的\
  \ `LOW`），你调用的是默认的无参构造器。\n\n清单 22-8 中的程序测试了 `SmartSeverity` 枚举类型。它打印了常量的名称、它们的序数以及预计周转天数。请注意，计算预计周转天数的逻辑被封装在枚举类型本身的声明中。`SmartSeverity`\
  \ 枚举类型将 `Severity` 枚举类型的代码和 `DefectUtil` 类中的 `getProjectedTurnaroundDays()` 方法结合在了一起。你不再需要编写\
  \ `switch` 语句来获取预计周转天数。每个枚举常量都知道自己的预计周转天数。\n\n```\n// SmartSeverityTest.java\npackage\
  \ com.jdojo.enums;\npublic class SmartSeverityTest {\npublic static void main(String[]\
  \ args) {\nfor (SmartSeverity s : SmartSeverity.values()) {\nString name = s.name();\n\
  int ordinal = s.ordinal();\nint days = s.getProjectedTurnaroundDays();\nSystem.out.println(\"\
  name=\" + name + \", ordinal=\" + ordinal\n+ \", days=\" + days);\n}\n}\n}\nname=LOW,\
  \ ordinal=0, days=30\nname=MEDIUM, ordinal=1, days=15\nname=HIGH, ordinal=2, days=7\n\
  name=URGENT, ordinal=3, days=1\n清单 22-8.\n一个用于测试 SmartSeverity 枚举类型的测试类\n```\n\n\
  为枚举常量关联主体\n\n`SmartSeverity` 是一个向枚举类型添加数据和方法的示例。`getProjectedTurnaroundDays()` 方法中的代码对于所有枚举常量都是相同的。你也可以为每个枚举常量关联不同的主体。该主体可以包含字段和方法。枚举常量的主体放在其名称后面的花括号内。如果枚举常量接受参数，则其主体位于参数列表之后。为枚举常量关联主体的语法如下：\n\
  \n```\n[访问修饰符] enum <枚举类型名> {\nCONST1 {\n// CONST1 的主体放在这里\n},\nCONST2 {\n// CONST2\
  \ 的主体放在这里\n},\nCONST3(参数列表) {\n// CONST3 的主体放在这里\n};\n// 其他代码放在这里\n}\n```\n\n当你为枚举常量添加主体时，情况会稍有不同。编译器会创建一个匿名类，该类继承自该枚举类型。它将枚举常量的主体移动到该匿名类的主体中。匿名类在本系列第二卷的第\
  \ 2 章中介绍。我简要地使用它来完成对枚举类型的讨论。现在，你可以将其视为声明类并同时创建该类对象的一种不同方式。\n\n考虑一个 `ETemp` 枚举类型，如下所示：\n\
  \n```\npublic enum ETemp {\nC1 {\n// 常量 C1 的主体\npublic int getValue() {\nreturn\
  \ 100;\n}\n},\nC2,\nC3;\n}\n```\n\n`ETemp` 枚举类型的主体声明了三个常量：`C1`、`C2` 和 `C3`。你为 `C1`\
  \ 常量添加了一个主体。编译器会将 `ETemp` 的代码转换为类似以下代码的形式：\n\n```\npublic enum ETemp {\npublic static\
  \ final ETemp C1 = new ETemp() {\n// 常量 C1 的主体\npublic int getValue() {\nreturn\
  \ 100;\n}\n};\npublic static final ETemp C2 = new ETemp();\npublic static final\
  \ ETemp C3 = new ETemp();\n// 其他代码放在这里\n}\n```\n\n请注意，常量 `C1` 被声明为 `ETemp` 类型，并使用匿名类分配了一个对象。`ETemp`\
  \ 枚举类型不知道在匿名类中定义的 `getValue()` 方法。因此，出于所有实际目的，它是无用的，因为你无法像 `ETemp.C1.getValue()`\
  \ 那样调用该方法。\n\n为了让客户端代码能够使用 `getValue()` 方法，你必须为 `ETemp` 枚举类型声明一个 `getValue()` 方法。如果你希望\
  \ `ETemp` 的所有常量都重写并提供该方法的实现，则需要将其声明为 `abstract`。如果你希望它仅被部分常量（而非全部）重写，则需要将其声明为非抽象方法，并为其提供默认实现。以下代码为\
  \ `ETemp` 枚举类型声明了一个 `getValue()` 方法，该方法返回 0。\n\n```\npublic enum ETemp {\nC1 {\n\
  // 常量 C1 的主体\npublic int getValue() {\nreturn 100;\n}\n},\nC2,\nC3;\n// 为 getValue()\
  \ 方法提供默认实现\npublic int getValue() {\nreturn 0;\n}\n}\n```\n\n`C1` 常量有自己的主体，它重写了\
  \ `getValue()` 方法并返回 `100`。请注意，常量 `C2` 和 `C3` 不必有主体；它们不需要重写 `getValue()` 方法。现在，你可以在\
  \ `ETemp` 枚举类型上使用 `getValue()` 方法了。\n\n\n\n以下代码重写了先前版本的 `ETemp`，并将 `getValue()`\
  \ 方法声明为 `abstract`。枚举类型中的 `abstract` 方法强制你为所有常量提供方法体并重写该方法。现在所有常量都有了方法体。每个常量的方法体都重写了\
  \ `getValue()` 方法并提供了其实现。\n\n```\npublic enum ETemp {\nC1 {\n// 常量 C1 的方法体\npublic\
  \ int getValue() {\nreturn 100;\n}\n},\nC2 {\n// 常量 C2 的方法体\npublic int getValue()\
  \ {\nreturn 0;\n}\n},\nC3 {\n// 常量 C3 的方法体\npublic int getValue() {\nreturn 0;\n\
  }\n};\n// 将 getValue() 方法声明为抽象方法\npublic abstract int getValue();\n}\n```\n\n让我们来增强你的\
  \ `SmartSeverity` 枚举类型。你已经为枚举类型取不出更好的名字了。你将新枚举命名为 `SuperSmartSeverity`。清单 22-9 展示了代码。\n\
  \n```\n// SuperSmartSeverity.java\npackage com.jdojo.enums;\npublic enum SuperSmartSeverity\
  \ {\nLOW(\"低优先级\", 30) {\n@Override\npublic double getProjectedCost() {\nreturn\
  \ 1000.0;\n}\n},\nMEDIUM(\"中优先级\", 15) {\n@Override\npublic double getProjectedCost()\
  \ {\nreturn 2000.0;\n}\n},\nHIGH(\"高优先级\", 7) {\n@Override\npublic double getProjectedCost()\
  \ {\nreturn 3000.0;\n}\n},\nURGENT(\"紧急优先级\", 1) {\n@Override\npublic double getProjectedCost()\
  \ {\nreturn 5000.0;\n}\n};\n// 声明实例变量\nprivate final String description;\nprivate\
  \ final int projectedTurnaroundDays;\n// 声明私有构造方法\nprivate SuperSmartSeverity(String\
  \ description,\nint projectedTurnaroundDays) {\nthis.description = description;\n\
  this.projectedTurnaroundDays = projectedTurnaroundDays;\n}\n// 声明一个公共方法以获取周转天数\n\
  public int getProjectedTurnaroundDays() {\nreturn projectedTurnaroundDays;\n}\n\
  // 重写 Enum 类中的 toString() 方法以返回描述信息\n@Override\npublic String toString() {\nreturn\
  \ this.description;\n}\n// 提供抽象的 getProjectedCost() 方法，以便所有常量\n// 在其方法体中重写并实现该方法\n\
  public abstract double getProjectedCost();\n}\n清单 22-9. 为枚举常量使用方法体\n```\n\n以下是 `SuperSmartSeverity`\
  \ 枚举类型的新特性：\n\n*   它添加了一个抽象方法 `getProjectedCost()` 来返回每种严重性级别的预估成本。\n*   它为每个常量提供了方法体，用于实现\
  \ `getProjectedCost()` 方法。请注意，在枚举类型中声明抽象方法会强制你为所有常量提供方法体。\n*   它为构造方法添加了另一个参数，该参数是严重性类型的一个更友好的名称。\n\
  *   它重写了 `Enum` 类中的 `toString()` 方法。`Enum` 类中的 `toString()` 方法返回常量的名称。你的 `toString()`\
  \ 方法为每个常量返回一个简短且更直观的名称。\n\n提示\n\n通常，你不需要为枚举类型编写这种复杂的代码。Java 枚举非常强大。如果你需要，它提供了可供你利用的特性。\n\
  \n清单 22-10 中的代码演示了 `SuperSmartSeverity` 枚举类型新增特性的使用。\n\n```\n// SuperSmartSeverityTest.java\n\
  package com.jdojo.enums;\npublic class SuperSmartSeverityTest {\npublic static void\
  \ main(String[] args) {\nfor (SuperSmartSeverity s : SuperSmartSeverity.values())\
  \ {\nString name = s.name();\nString desc = s.toString();\nint ordinal = s.ordinal();\n\
  int projectedTurnaroundDays = s.getProjectedTurnaroundDays();\ndouble projectedCost\
  \ = s.getProjectedCost();\nSystem.out.println(\"name=\" + name\n+ \", description=\"\
  \ + desc\n+ \", ordinal=\" + ordinal\n+ \", turnaround days=\"\n+ projectedTurnaroundDays\n\
  + \", projected cost=\" + projectedCost);\n}\n}\n}\nname=LOW, description=Low Priority,\
  \ ordinal=0, turnaround days=30, projected cost=1000.0\nname=MEDIUM, description=Medium\
  \ Priority, ordinal=1, turnaround days=15, projected cost=2000.0\nname=HIGH, description=High\
  \ Priority, ordinal=2, turnaround days=7, projected cost=3000.0\nname=URGENT, description=Urgent\
  \ Priority, ordinal=3, turnaround days=1, projected cost=5000.0\n清单 22-10. 用于测试\
  \ SuperSmartSeverity 枚举类型的测试类\n```\n\n比较两个枚举常量\n\n你可以通过三种方式比较两个枚举常量：\n\n*   使用 `Enum`\
  \ 类的 `compareTo()` 方法\n*   使用 `Enum` 类的 `equals()` 方法\n*   使用 `==` 运算符\n\n`Enum`\
  \ 类的 `compareTo()` 方法允许你比较同一枚举类型的两个枚举常量。它返回两个枚举常量的序数差值。如果两个枚举常量相同，则返回零。以下代码片段将打印\
  \ `-3`，因为 `LOW(ordinal=0)` 和 `URGENT(ordinal=3)` 的序数差值为 -3。负值表示被比较的常量出现在被比较对象之前。\n\
  \n```\nSeverity s1 = Severity.LOW;\nSeverity s2 = Severity.URGENT;\nint diff = s1.compareTo(s2);\n\
  System.out.println(diff);\n\n```\n\n假设你有另一个名为 `BasicColor` 的枚举，如清单 22-11 所示。\n\n\
  ```\n// BasicColor.java\npackage com.jdojo.enums;\npublic enum BasicColor {\nRED,\
  \ GREEN, BLUE;\n}\n清单 22-11. BasicColor 枚举\n```\n\n以下代码片段将无法编译，因为它试图比较两个属于不同枚举类型的枚举常量：\n\
  \n```\nint diff = BasicColor.RED.compareTo(Severity.URGENT); // 编译时错误\n```\n\n你可以使用\
  \ `Enum` 类的 `equals()` 方法来比较两个枚举常量是否相等。一个枚举常量只与自身相等。请注意，`equals()` 方法可以在两个不同类型的枚举常量上调用。如果两个枚举常量来自不同的枚举类型，该方法返回\
  \ `false`。\n\n```\nSeverity s1 = Severity.LOW;\nSeverity s2 = Severity.URGENT;\n\
  BasicColor c = BasicColor.BLUE;\nSystem.out.println(s1.equals(s1));\nSystem.out.println(s1.equals(s2));\n\
  System.out.println(s1.equals(c));\ntrue\nfalse\nfalse\n```\n\n你也可以使用相等运算符（`==`）来比较两个枚举常量是否相等。`==`\
  \ 运算符的两个操作数必须是同一枚举类型。否则，你会得到一个编译时错误。\n\n```\nSeverity s1 = Severity.LOW;\nSeverity\
  \ s2 = Severity.URGENT;\nBasicColor c = BasicColor.BLUE;\nSystem.out.println(s1\
  \ == s1);\nSystem.out.println(s1 == s2);\n// 编译时错误。无法比较 Severity 和 BasicColor 枚举类型\n\
  //System.out.println(s1 == c);\ntrue\nfalse\n```\n\n嵌套枚举类型\n\n你可以进行嵌套枚举类型声明。你可以在类、接口或另一个枚举类型内部声明嵌套枚举类型。嵌套枚举类型隐式是静态的。你也可以在声明中显式地将嵌套枚举类型声明为静态。由于枚举类型总是静态的，无论你是否声明它，你都不能声明局部枚举类型（例如，在方法体内）。你可以对嵌套枚举类型使用任何访问修饰符（`public`、`private`、`protected`\
  \ 或包级别）级别。清单 22-12 展示了在 `Person` 类中声明一个名为 `Gender` 的嵌套 `public` 枚举类型的代码。\n\n\n```java\n\
  // Person.java\npackage com.jdojo.enums;\npublic class Person {\npublic enum Gender\
  \ {MALE, FEMALE}\n}\n清单 22-12.\n作为 Person 类中嵌套枚举类型的 Gender 枚举类型\n```\n\n`Person.Gender`\
  \ 枚举类型在同一模块中的任何位置均可访问，因为它已被声明为 `public`。在其他模块中访问它则取决于模块的可访问性规则。你需要导入该枚举类型，才能在其他包中使用其简单名称，如下列代码所示：\n\
  \n```java\n// Test.java\npackage com.jdojo.enums.pkg1;\nimport com.jdojo.enums.Person.Gender;\n\
  public class Test {\npublic static void main(String[] args) {\nGender m = Gender.MALE;\n\
  Gender f = Gender.FEMALE;\nSystem.out.println(m);\nSystem.out.println(f);\n}\n}\n\
  MALE\nFEMALE\n```\n\n你也可以通过静态导入来使用枚举常量的简单名称。以下代码片段使用了 `MALE` 和 `FEMALE`，它们是 `Person.Gender`\
  \ 枚举类型常量的简单名称。请注意，第一个 `import` 语句用于导入 `Gender` 类型本身，以便在代码中使用其简单名称。\n\n```java\n\
  // Test.java\npackage com.jdojo.enums.pkg1;\nimport com.jdojo.enums.Person.Gender;\n\
  import static com.jdojo.enums.Person.Gender.*;\npublic class Test {\npublic static\
  \ void main(String[] args) {\nGender m = MALE;\nGender f = FEMALE;\nSystem.out.println(m);\n\
  System.out.println(f);\n}\n}\nMALE\nFEMALE\n```\n\n你也可以将枚举类型嵌套在另一个枚举类型或接口中。以下是有效的枚举类型声明：\n\
  \n```java\npublic enum OuterEnum {\nC1, C2, C3;\npublic enum NestedEnum {\nC4, C5,\
  \ C6;\n}\n}\npublic interface MyInterface {\nint operation1();\nint operation2();\n\
  public enum AnotherNestedEnum {\nCC1, CC2, CC3;\n}\n}\n```\n\n### 为枚举类型实现接口\n\n\
  枚举类型可以实现接口。枚举类型实现接口的规则与类实现接口的规则相同。枚举类型永远不会被另一个枚举类型继承。因此，你不能将枚举类型声明为 `abstract`。这也意味着，如果枚举类型实现了一个接口，它必须为该接口中的所有抽象方法提供实现。清单\
  \ 22-13 中的程序声明了一个 `Command` 接口。\n\n```java\n// Command.java\npackage com.jdojo.enums;\n\
  public interface Command {\nvoid execute();\n}\n清单 22-13.\n一个 Command 接口\n```\n\n\
  清单 22-14 中的程序声明了一个名为 `CommandList` 的枚举类型，它实现了 `Command` 接口。每个枚举常量都实现了 `Command`\
  \ 接口的 `execute()` 方法。或者，你也可以在枚举类型主体中实现 `execute()` 方法，并省略部分或全部枚举常量的实现。清单 22-15 演示了如何将\
  \ `CommandList` 枚举类型中的枚举常量作为 `Command` 类型使用。\n\n```java\n// CommandList.java\npackage\
  \ com.jdojo.enums;\npublic enum CommandList implements Command {\nRUN {\n@Override\n\
  public void execute() {\nSystem.out.println(\"Running...\");\n}\n},\nJUMP {\n@Override\n\
  public void execute() {\nSystem.out.println(\"Jumping...\");\n}\n};\n// 强制所有常量实现\
  \ execute() 方法。\n@Override\npublic abstract void execute();\n}\n清单 22-14.\n一个实现\
  \ Command 接口的 CommandList 枚举类型\n```\n\n```java\n// CommandTest.java\npackage com.jdojo.enums;\n\
  public class CommandTest {\npublic static void main(String... args) {\n// 执行命令列表中的所有命令\n\
  for(Command cmd : CommandList.values()) {\ncmd.execute();\n}\n}\n}\nRunning...\n\
  Jumping...\n清单 22-15.\n将 CommandList 枚举常量用作 Command 类型\n```\n\n### 枚举常量的反向查找\n\n\
  如果你知道枚举常量的名称或其在列表中的位置，就可以获取其引用。这被称为基于枚举常量名称或序数（ordinal）的反向查找。你可以使用编译器添加到枚举类型中的 `valueOf()`\
  \ 方法，根据名称进行反向查找。你可以使用编译器添加到枚举类型中的 `values()` 方法返回的数组，根据序数进行反向查找。`values()` 方法返回的数组中值的顺序与枚举常量声明的顺序相同。枚举常量的序数从零开始。这意味着枚举常量的序数值可以用作\
  \ `values()` 方法返回数组的索引。以下代码片段演示了如何反向查找枚举常量：\n\n```java\nSeverity low1 = Severity.valueOf(\"\
  LOW\"); // 使用名称进行反向查找\nSeverity low2 = Severity.values()[0];    // 使用序数进行反向查找\n\
  System.out.println(low1);\nSystem.out.println(low2);\nSystem.out.println(low1 ==\
  \ low2);\nLOW\nLOW\ntrue\n```\n\n枚举常量的反向查找是区分大小写的。如果你在 `valueOf()` 方法中使用了无效的常量名称，则会抛出\
  \ `IllegalArgumentException`。例如，`Severity.valueOf(\"low\")` 将抛出一个 `IllegalArgumentException`，指出在\
  \ `Severity` 枚举中不存在名为 \"low\" 的枚举常量。\n\n### 枚举常量的范围\n\nJava API 提供了 `java.util.EnumSet`\
  \ 集合类，用于处理枚举类型的枚举常量范围。`EnumSet` 类的实现非常高效。假设你有一个名为 `Day` 的枚举类型，如清单 22-16 所示。\n\n\
  ```java\n// Day.java\npackage com.jdojo.enums;\npublic enum Day {\nMONDAY, TUESDAY,\
  \ WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY;\n}\n清单 22-16.\n一个 Day 枚举类型\n```\n\
  \n你可以使用 `EnumSet` 类来处理日期的范围；例如，你可以获取 `MONDAY` 到 `FRIDAY` 之间的所有日期。一个 `EnumSet` 只能包含来自一个枚举类型的枚举常量。清单\
  \ 22-17 演示了如何使用 `EnumSet` 类来处理枚举常量的范围。\n\n```java\n// EnumSetTest.java\npackage\
  \ com.jdojo.enums;\nimport java.util.EnumSet;\npublic class EnumSetTest {\npublic\
  \ static void main(String[] args) {\n// 获取 Day 枚举的所有常量\nEnumSet allDays = EnumSet.allOf(Day.class);\n\
  print(allDays, \"所有日期: \");\n// 获取 Day 枚举中从 MONDAY 到 FRIDAY 的所有常量\nEnumSet weekDays\
  \ = EnumSet.range(Day.MONDAY, Day.FRIDAY);\nprint(weekDays, \"工作日: \");\n// 获取 Day\
  \ 枚举中不属于 MONDAY 到 FRIDAY 的所有常量。\n// 本质上，我们将得到代表周末的日期。\nEnumSet weekends = EnumSet.complementOf(weekDays);\n\
  print(weekends, \"周末: \");\n}\npublic static void print(EnumSet days, String msg)\
  \ {\nSystem.out.print(msg);\nfor (Day d : days) {\nSystem.out.print(d + \" \");\n\
  }\nSystem.out.println();\n}\n}\n所有日期: MONDAY TUESDAY WEDNESDAY THURSDAY FRIDAY SATURDAY\
  \ SUNDAY\n工作日: MONDAY TUESDAY WEDNESDAY THURSDAY FRIDAY\n周末: SATURDAY SUNDAY\n清单\
  \ 22-17.\n一个演示如何使用 EnumSet 类的测试类\n```\n\n### 总结\n\n与类和接口一样，枚举在 Java 中定义了一种新的引用类型。枚举类型由一组预定义的、有序的值组成，这些值被称为枚举类型的元素或常量。枚举类型的常量具有名称和序数。你可以通过名称和序数获取枚举常量的引用，反之亦然。通常，枚举类型用于定义类型安全的常量。\n\
  \n枚举类型拥有类所具有的许多特性。它有构造方法、实例变量和方法。然而，枚举类型的构造方法隐式地是私有的。枚举类型也可以像类一样实现接口。\n\n\n您可以声明一个枚举类型的变量。该变量可以被赋值为\
  \ `null` 或该枚举类型的一个常量。每个枚举类型都隐式继承自 `java.lang.Enum` 类。枚举类型可以实现接口。枚举类型可以在 `switch`\
  \ 语句中使用。Java 提供了 `EnumSet` 类的高效实现，用于处理特定枚举类型的一系列枚举常量。\n\n问题与练习\n\n1.  Java 中的枚举类型是什么？\n\
