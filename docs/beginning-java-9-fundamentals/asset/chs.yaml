  \n*   如何声明模块\n\n*   模块的隐式可读性是什么以及如何声明它\n\n*   非限定导出与限定导出的区别\n\n*   声明模块的运行时可选依赖\n\
  \n*   如何开放整个模块或其选定的包以进行深度反射\n\n*   跨模块拆分包的规则\n\n*   模块声明的限制\n\n*   不同类型的模块：命名模块、未命名模块、显式模块、自动模块、普通模块和开放模块\n\
  \n*   在运行时了解模块\n\n*   如何使用 `javap` 工具反汇编模块的定义\n\n本章中某些示例的代码会经历多个步骤。本书的源代码包含了这些示例在最后一步所使用的代码。如果你想在阅读本章时，每一步都能看到这些示例的实际效果，你需要对源代码稍作修改，使其与你正在处理的步骤保持同步。\n\
  \n什么是模块？\n\n简单来说，模块是一组包的集合。一个模块可以选择性地包含资源，例如图像、属性文件等。现在，我们只关注模块作为一组包的概念。一个模块为其包指定了对其他模块的可访问性，以及它对其他模块的依赖关系。模块中包的可访问性决定了其他模块是否可以访问该包。模块的依赖关系决定了此模块所读取的其他模块的列表。“depends\
  \ on”、“reads”和“requires”这三个术语可以互换使用，以表示一个模块对另一个模块的依赖。如果模块 `M` 依赖于模块 `N`，那么以下三种表述含义相同：“模块\
  \ `M` 依赖于模块 `N`”、“模块 `M` 需要模块 `N`”或“模块 `M` 读取模块 `N`”。\n\n默认情况下，模块中的包只能在同一模块内访问。如果模块中的包需要在其模块外部可访问，则包含该包的模块需要导出该包。一个模块可以将其包导出到所有其他模块，或者仅导出到选定的其他模块列表。\n\
  \n如果一个模块想要访问另一个模块中的包，第一个模块必须声明对第二个模块的依赖，并且第二个模块必须导出这些包，以便第一个模块能够访问它们。\n\n声明模块\n\n\
  模块在一个编译单元中声明。我在第 3 章中介绍了编译单元的概念，其中编译单元包含类型声明（类和接口声明）。包含模块声明的编译单元与包含类型声明的编译单元不同。从\
  \ Java 9 开始，有两种类型的编译单元：\n\n*   普通编译单元\n\n*   模块化编译单元\n\n一个普通编译单元由三部分组成：包声明、导入声明和顶层类型声明。普通编译单元中的所有部分都是可选的。有关普通编译单元的更多详细信息，请参阅第\
  \ 3 章。\n\n一个模块化编译单元包含一个模块声明。模块声明前面可以有可选的导入声明。模块化编译单元不能有包声明。模块化编译单元中的导入声明允许你在模块声明中使用类型和类型静态成员的简单名称。\n\
  \n提示\n\n模块化编译单元的名称为 `module-info`，扩展名为 `.java` 或 `.jav`。本书示例中的所有模块化编译单元都命名为 `module-info.java`。\n\
  \n使用模块化编译单元的语法如下：\n\n```\n[import-declarations]\n\n```\n\n导入声明中使用的类型可以来自同一模块或其他模块中的包。有关如何使用导入声明的更多详细信息，请参阅第\
  \ 7 章。模块声明的语法如下：\n\n```\n[open] module  {\n;\n;\n...\n}\n```\n\n`module` 关键字用于声明一个模块。模块声明可以选择以\
  \ `open` 关键字开头，以声明一个开放模块。`module` 关键字后面跟着模块名称。模块名称是一个限定的 Java 标识符，它是由一个或多个由点分隔的\
  \ Java 标识符组成的序列。\n\n模块声明的主体放在花括号内，其中可以包含零个或多个模块语句。模块语句也称为模块指令。在本书中，我使用术语“语句”而不是“指令”。有五种类型的模块语句：\n\
  \n*   `exports` 语句\n\n*   `opens` 语句\n\n*   `requires` 语句\n\n*   `uses` 语句\n\n*\
  \   `provides` 语句\n\n为了使一个模块能够访问另一个模块中的类型，第一个模块使包含这些类型的包可访问，第二个模块读取第一个模块。所有五种类型的模块语句都用于这两个目的：\n\
  \n*   使类型可访问\n\n*   访问这些类型\n\n`exports`、`opens` 和 `provides` 语句表示模块中的类型对其他模块的可用性。模块中的\
  \ `requires` 和 `uses` 语句用于表示模块依赖关系，以读取其他模块通过 `exports`、`opens` 和 `provides` 语句提供的类型。这些语句类型的区别在于模块提供类型以及其他模块使用这些类型的上下文。以下是一个包含所有五种类型模块语句的模块声明示例。\n\
  \n```\nmodule jdojo.policy {\nexports com.jdojo.policy;\nrequires java.sql;\nopens\
  \ com.jdojo.policy.model;\nuses com.jdojo.common.Job;\nprovides com.jdojo.common.Job\
  \ with com.jdojo.policy.JobImpl;\n}\n```\n\n以下术语是 Java 9 中的受限关键字：`open`、`module`、`requires`、`transitive`、`exports`、`opens`、`to`、`uses`、`provides`\
  \ 和 `with`。只有当它们出现在模块化编译单元中的特定位置时，它们才被视为关键字。在其他任何地方，它们都是普通术语。例如，以下模块声明是有效的，尽管模块名称\
  \ `module` 不太直观：\n\n```\nmodule module {\nexports com.jdojo.policy;\n}\n```\n\n\
  这里，第一个“module”术语是受限关键字，第二个是作为模块名称使用的普通术语。\n\n后续章节将详细描述 `exports` 和 `requires` 语句。本章简要解释\
  \ `opens` 语句。我将在本三卷本《Beginning Java 9》系列的第二卷的第 3 章中详细解释开放模块和 `opens` 语句，并在第 14 章中详细解释\
  \ `uses` 和 `provides` 语句。\n\n声明模块依赖\n\n\n\n在 Java SE 8 及之前版本中，一个包中的公共类型可以被其他包无限制地访问。换句话说，包本身无法控制其所包含类型的可访问性。Java\
  \ SE 9 中的模块系统提供了对模块内包中类型可访问性的细粒度控制。\n\n跨模块的可访问性是被使用模块与使用模块之间的双向协定。一个模块明确地将其公共类型提供给其他模块使用，而使用这些公共类型的模块则明确声明对前一个模块的依赖。模块中所有未导出的包都是该模块私有的，无法从模块外部访问。\n\
  \n将包中的公共类型提供给其他模块使用，称为**导出**该包，这通过在模块声明中使用 `exports` 语句来实现。一个模块可以将其包导出给所有其他模块，也可以导出给选定的模块列表。当一个模块将其包导出给所有其他模块时，这被称为**非限定导出**。以下是将包导出给所有其他模块的语法：\n\
  \n```\nexports <包名>;\n```\n\n这里，`<包名>` 是当前模块中的包。所有读取当前模块的其他模块都可以使用此包中的公共类型。考虑以下声明：\n\
  \n```\nmodule jdojo.address {\nexports com.jdojo.address;\n}\n```\n\n`jdojo.address`\
  \ 模块将名为 `com.jdojo.address` 的包导出给所有其他模块。`jdojo.address` 模块中的所有其他包仅可在 `jdojo.address`\
  \ 模块内部访问。\n\n一个模块也可以选择性地仅将一个包导出给一个或多个指定的模块。这种导出称为**限定导出**或**模块友好导出**。在限定导出中，包内的公共类型仅可被指定的命名模块访问。以下是使用限定导出的语法：\n\
  \n```\nexports <包名> to <模块名 1> [, <模块名 2>, ...];\n```\n\n这里，`<包名>` 是当前模块中的一个包，它仅被导出给\
  \ `to` 子句中列出的友好模块。以下是一个使用限定导出的 `jdojo.policy` 模块的模块声明：\n\n```\nmodule jdojo.policy\
  \ {\nexports com.jdojo.policy to jdojo.claim, jdojo.payment;\n}\n```\n\n`jdojo.policy`\
  \ 模块包含一个名为 `com.jdojo.policy` 的包。该模块使用限定导出将此包仅导出给名为 `jdojo.claim` 和 `jdojo.payment`\
  \ 的两个模块。\n\n提示\n\n限定导出的 `to` 子句中指定的模块无需是可观察的。\n\n使用非限定导出还是限定导出更好？当你将包中的公共类型公开共享时，例如，当你开发一个供公共使用的模块时，应使用非限定导出。一旦你分发模块，就不应更改导出包中的公共\
  \ API。有时，糟糕的 API 会永远留在模块中，因为该模块已被公开使用，更改/移除这些 API 会影响大量用户。有时，你可能需要在模块之间共享公共类型，而这些模块是库或框架的一部分；然而，这些模块中的公共类型并非供公共使用。在这种情况下，你应该使用限定导出，这样如果你更改涉及这些共享公共类型的\
  \ API，影响将最小化。`java.base` 模块使用多个限定导出将其包导出给其他 JDK 模块。你可以使用以下命令描述 `java.base` 模块以列出限定导出：\n\
  \n```\nC:\\> java --describe-module java.base\n```\n\n```\njava.base@9\nexports\
  \ java.io\nexports java.lang\n...\nqualified exports jdk.internal.org.xml.sax to\
  \ jdk.jfr\nqualified exports sun.security.tools to jdk.jartool\n...\ncontains sun.invoke\n\
  contains sun.invoke.util\ncontains sun.io\n...\n```\n\n`requires` 语句用于指定一个模块对另一个模块的依赖。如果一个模块读取另一个模块，则第一个模块需要在其声明中包含一个\
  \ `requires` 语句。`requires` 语句的通用语法如下：\n\n```\nrequires [transitive] [static] <模块名>;\n\
  ```\n\n这里，`<模块名>` 是当前模块所读取的模块的名称。`transitive` 和 `static` 修饰符都是可选的。如果存在 `static`\
  \ 修饰符，则对 `<模块名>` 的依赖在编译时是必需的，但在运行时是可选的。如果没有 `static` 修饰符，则被读取的模块在编译时和运行时都是必需的。`transitive`\
  \ 修饰符的存在意味着读取当前模块的模块也会隐式地读取 `<模块名>`。我稍后会介绍在 `requires` 语句中使用 `transitive` 修饰符的示例。以下是使用\
  \ `requires` 语句的示例：\n\n```\nmodule jdojo.claim {\nrequires jdojo.policy;\n}\n```\n\
  \n这里，`jdojo.claim` 模块使用 `requires` 语句来表明它读取了 `jdojo.policy` 模块。`jdojo.policy` 模块中所有导出包的所有公共类型在\
  \ `jdojo.claim` 模块内部都是可访问的。\n\n每个模块都隐式地读取 `java.base` 模块。如果模块声明没有显式地读取 `java.base`\
  \ 模块，编译器会向该模块声明添加一个读取 `java.base` 模块的 `requires` 语句。以下两个 `jdojo.common` 模块的模块声明是相同的：\n\
  \n```\n// 声明 #1\nmodule jdojo.common {\n// 编译器将添加对 java.base 模块的依赖\n}\n// 声明 #2\n\
  module jdojo.common {\n// 显式添加对 java.base 模块的依赖\nrequires java.base;\n}\n```\n\n\
  你可以将两个模块之间的依赖关系可视化，如图 10-1 所示，该图描绘了名为 `jdojo.policy` 和 `jdojo.claim` 的两个模块之间的依赖关系。\n\
  \n![A323069_2_En_10_Fig1_HTML.gif](img/A323069_2_En_10_Fig1_HTML.gif)\n\n图 10-1.\n\
  \n声明模块间的依赖关系\n\n`jdojo.policy` 模块包含两个包：`com.jdojo.policy` 和 `com.jdojo.policy.impl`；它导出了\
  \ `com.jdojo.policy` 包，我用虚线边界将其与未导出的 `com.jdojo.policy.impl` 包区分开来。`jdojo.claim`\
  \ 模块包含两个包：`com.jdojo.claim` 和 `com.jdojo.claim.impl`；它没有导出任何包，并声明了对 `jdojo.policy`\
  \ 模块的依赖。以下两个模块声明用 Java 代码表达了这种依赖关系：\n\n```\nmodule jdojo.policy {\nexports com.jdojo.policy;\n\
  }\nmodule jdojo.claim {\nrequires jdojo.policy;\n}\n```\n\n提示\n\n两个模块（被使用模块和使用模块）中的依赖声明是不对称的——被使用模块导出包，而使用模块需要模块。\n\
  \n模块依赖示例\n\n在本节中，我将引导你完成一个使用模块依赖的完整示例。假设你有两个模块，名为 `jdojo.address` 和 `jdojo.person`。`jdojo.address`\
  \ 模块包含一个名为 `com.jdojo.address` 的包，其中包含一个名为 `Address` 的类。`jdojo.person` 模块想要使用 `jdojo.address`\
  \ 模块中的 `Address` 类。图 10-2 显示了 `jdojo.person` 模块的模块图。\n\n![A323069_2_En_10_Fig2_HTML.jpg](img/A323069_2_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2.\n\njdojo.person 模块的模块图\n\n在 NetBeans 中，你可以创建两个名为 `jdojo.address` 和 `jdojo.person`\
  \ 的模块。清单 10-1 和 10-2 包含了模块声明和 `Address` 类的代码。\n\n```\n// module-info.java\nmodule\
  \ jdojo.address {\n// 导出 com.jdojo.address 包\nexports com.jdojo.address;\n}\n清单\
  \ 10-1.\njdojo.address 模块的模块声明\n```\n\n\n```\n// Address.java\npackage com.jdojo.address;\n\
  public class Address {\nprivate String line1 = \"1111 Main Blvd.\";\nprivate String\
  \ city = \"Jacksonville\";\nprivate String state = \"FL\";\nprivate String zip =\
  \ \"32256\";\npublic Address() {\n}\npublic Address(String line1, String city, String\
  \ state, String zip) {\nthis.line1 = line1;\nthis.city = city;\nthis.state = state;\n\
  this.zip = zip;\n}\npublic String getLine1() {\nreturn line1;\n}\npublic void setLine1(String\
  \ line1) {\nthis.line1 = line1;\n}\npublic String getCity() {\nreturn city;\n}\n\
  public void setCity(String city) {\nthis.city = city;\n}\npublic String getState()\
  \ {\nreturn state;\n}\npublic void setState(String state) {\nthis.state = state;\n\
  }\npublic String getZip() {\nreturn zip;\n}\npublic void setZip(String zip) {\n\
  this.zip = zip;\n}\n@Override\npublic String toString() {\nreturn \"[Line1:\" +\
  \ line1 + \", State:\" + state +\n\", City:\" + city + \", ZIP:\" + zip + \"]\"\
  ;\n}\n}\n清单 10-2.\nAddress 类\n```\n\n`Address` 类是一个简单的类，包含四个字段及其 getter 和 setter\
  \ 方法。我为这些字段设置了默认值，这样你就不必在示例中手动输入它们。我还为 `Address` 类添加了一个 `toString()` 方法，该方法返回地址对象的字符串表示形式。我将在第\
  \ 11 章和第 20 章中详细描述 `toString()` 方法的用法。\n\n`jdojo.address` 模块导出了 `com.jdojo.address`\
  \ 包，因此其他模块可以使用 `Address` 类（该类是公共的，并且位于已导出的 `com.jdojo.address` 包中）。在本示例中，你将在 `jdojo.person`\
  \ 模块中使用 `Address` 类。清单 10-3 和 10-4 包含了 `jdojo.person` 模块的模块声明以及 `Person` 类的代码。\n\
  \n```\n// module-info.java\nmodule jdojo.person {\n// 读取 jdojo.address 模块\nrequires\
  \ jdojo.address;\n// 导出 com.jdojo.person 包\nexports com.jdojo.person;\n}\n清单 10-3.\n\
  jdojo.person 模块的模块声明\n```\n\n```\n// Person.java\npackage com.jdojo.person;\nimport\
  \ com.jdojo.address.Address;\npublic class Person {\nprivate long personId;\nprivate\
  \ String firstName;\nprivate String lastName;\nprivate Address address = new Address();\n\
  public Person(long personId, String firstName, String lastName) {\nthis.personId\
  \ = personId;\nthis.firstName = firstName;\nthis.lastName = lastName;\n}\npublic\
  \ long getPersonId() {\nreturn personId;\n}\npublic void setPersonId(long personId)\
  \ {\nthis.personId = personId;\n}\npublic String getFirstName() {\nreturn firstName;\n\
  }\npublic void setFirstName(String firstName) {\nthis.firstName = firstName;\n}\n\
  public String getLastName() {\nreturn lastName;\n}\npublic void setLastName(String\
  \ lastName) {\nthis.lastName = lastName;\n}\npublic Address getAddress() {\nreturn\
  \ address;\n}\npublic void setAddress(Address address) {\nthis.address = address;\n\
  }\n@Override\npublic String toString() {\nreturn \"[Person Id:\" + personId + \"\
  , First Name:\" + firstName +\n\", Last Name:\" + lastName + \", Address:\" + address\
  \ + \"]\";\n}\n}\n清单 10-4.\nPerson 类\n```\n\n`Person` 类位于 `jdojo.person` 模块中，它使用了一个\
  \ `Address` 类型的字段，而 `Address` 类型位于 `jdojo.address` 模块中。这意味着 `jdojo.person` 模块需要读取\
  \ `jdojo.address` 模块。这一点在 `jdojo.person` 模块声明中的 `requires` 语句中有所体现：\n\n```\n// 读取\
  \ jdojo.address 模块\nrequires jdojo.address;\n```\n\n`jdojo.person` 模块的声明包含一个不带 `static`\
  \ 修饰符的 `requires` 语句，这意味着 `jdojo.address` 模块在编译时和运行时都是必需的。当你编译 `jdojo.person` 模块时，必须将\
  \ `jdojo.address` 模块包含在模块路径中。在提供的源代码中，这两个模块是同一个 NetBeans 模块项目的一部分，你无需执行额外步骤来修改模块路径。\n\
  \n如果你使用两个独立的 NetBeans 项目创建这两个模块，则需要将 `jdojo.address` 模块的项目包含在 `jdojo.person` 模块的模块路径中。在\
  \ NetBeans 中右键单击 `jdojo.person` 项目，然后选择“属性”。在“类别”列表中，选择“库”。选择“编译”选项卡，然后单击“模块路径”行上的\
  \ + 号。从菜单中选择“添加项目...”，如图 10-3 所示，然后从文件系统中选择 `jdojo.address` NetBeans 项目。如果你有一个已编译的\
  \ `jdojo.address` 模块（以模块化 JAR 或目录形式存在），则可以使用“添加 JAR/文件夹”菜单选项。\n\n![A323069_2_En_10_Fig3_HTML.jpg](img/A323069_2_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3.\n\n在 NetBeans 中为项目设置模块路径\n\n`jdojo.person` 模块还导出了 `com.jdojo.person` 包，因此该包中的公共类型（例如\
  \ `Person` 类）可以被其他模块使用。清单 10-5 包含了 `Main` 类的代码，该类位于 `jdojo.person` 模块中。\n\n```\n\
  // Main.java\npackage com.jdojo.person;\nimport com.jdojo.address.Address;\npublic\
  \ class Main {\npublic static void main(String[] args) {\nPerson john = new Person(1001,\
  \ \"John\", \"Jacobs\");\nString fName = john.getFirstName();\nString lName = john.getLastName();\n\
  Address addr = john.getAddress();\nSystem.out.printf(\"%s %s%n\", fName, lName);\n\
  System.out.printf(\"%s%n\", addr.getLine1());\nSystem.out.printf(\"%s, %s %s%n\"\
  , addr.getCity(),\naddr.getState(), addr.getZip());\n}\n}\n清单 10-5.\n用于测试 jdojo.person\
  \ 模块的 Main 类\n```\n\n```\nJohn Jacobs\n1111 Main Blvd.\nJacksonville, FL 32256\n\
  ```\n\n当你运行这个类时，输出显示你能够使用来自 `jdojo.address` 模块的 `Address` 类。这个演示如何使用 `exports` 和\
  \ `requires` 模块语句的示例到此结束。如果你在运行此示例时遇到任何问题，请参考下一节，其中列出了一些可能的错误及其解决方案。\n\n此时，你也可以使用命令提示符运行此示例。你需要将\
  \ `jdojo.person` 和 `jdojo.address` 模块的已编译展开目录或模块化 JAR 添加到模块路径中。以下命令使用了 `dist` 目录中的模块化\
  \ JAR：\n\n```\nC:\\Java9Fundamentals>java --module-path dist\\jdojo.person.jar;dist\\\
  jdojo.address.jar --module jdojo.person/com.jdojo.person.Main\n```\n\n```\nJohn\
  \ Jacobs\n1111 Main Blvd.\nJacksonville, FL 32256\n```\n\n本书提供的源代码在 `Java9Fundamentals\\\
  dist` 目录中包含所有模块化 JAR。在此命令中，我特意只包含了 `jdojo.person` 和 `jdojo.address` 模块的模块化 JAR，以向你展示在运行\
  \ `com.jdojo.person.Main` 类时并未使用其他所有模块。你可以通过仅将 `dist` 目录添加到模块路径来简化此命令，如下所示，Java\
  \ 运行时将像之前一样使用所需的两个模块：\n\n```\nC:\\Java9Fundamentals>java --module-path dist --module\
  \ jdojo.person/com.jdojo.person.Main\n```\n\n```\nJohn Jacobs\n1111 Main Blvd.\n\
  Jacksonville, FL 32256\n```\n\n故障排除\n\n如果你是第一次使用 JDK 9，在完成此示例的过程中可能会遇到许多问题。以下是一些带有错误消息的场景及相应的解决方案。\n\
  \n空包错误\n\n错误信息为：\n\n```\nerror: package is empty or does not exist: com.jdojo.address\n\
  exports com.jdojo.address;\n^\n1 error\n```\n\n当你编译 `jdojo.address` 模块的模块声明时，如果没有包含\
  \ `Address` 类的源代码，就会遇到此错误。该模块导出了 `com.jdojo.address` 包。你必须在导出的包中至少定义一个类型。\n\n模块未找到错误\n\
  \n错误信息为：\n\n```\nerror: module not found: jdojo.address\nrequires jdojo.address;\n\
  ^\n1 error\n```\n\n\n\n当你在编译 `jdojo.person` 模块的模块声明时，如果未将 `jdojo.address` 模块包含在模块路径中，就会遇到此错误。`jdojo.person`\
  \ 模块读取了 `jdojo.address` 模块，因此前者必须在编译时和运行时都能在模块路径上找到后者。如果你使用的是命令提示符，请使用 `--module-path`\
  \ 选项为 `jdojo.address` 模块指定模块路径。如果你使用的是 NetBeans，请参考上一节关于如何为 `jdojo.person` 模块配置模块路径的内容。\n\
  \n包不存在错误\n\n错误信息如下：\n\n```\nerror: package com.jdojo.address does not exist\nimport\
  \ com.jdojo.address.Address;\n^\nerror: cannot find symbol\nprivate Address address\
  \ = new Address();\n^\nsymbol:   class Address\nlocation: class Person\n```\n\n\
  当你在编译 `jdojo.person` 模块中的 `Person` 和 `Main` 类时，如果未在模块声明中添加 `requires` 语句，就会遇到此错误。错误消息表明编译器无法找到\
  \ `com.jdojo.address.Address` 类。解决方案是在 `jdojo.person` 模块的模块声明中添加 `requires jdojo.address`\
  \ 语句，并在编译和运行 `jdojo.person` 模块时，将 `jdojo.address` 模块添加到模块路径中。\n\n模块解析异常\n\n部分错误信息如下：\n\
  \n```\nError occurred during initialization of VM\njava.lang.module.ResolutionException:\
  \ Module jdojo.person not found\n...\n```\n\n当你尝试使用命令提示符运行示例时，可能会因以下原因遇到此错误：\n\n\
  *   模块路径未正确指定。\n\n*   模块路径正确，但在模块路径上指定的目录或模块化 JAR 中未找到已编译的代码。\n\n假设你使用以下命令运行示例：\n\
  \n```\nC:\\Java9Fundamentals>java --module-path dist --module jdojo.person/com.jdojo.person.Main\n\
  ```\n\n请确保存在以下模块化 JAR：\n\n*   `C:\\Java9Fundamentals\\dist\\jdojo.person.jar`\n\n\
  *   `C:\\Java9Fundamentals\\dist\\jdojo.address.jar`\n\n如果这些模块化 JAR 不存在，请在 NetBeans\
  \ 中构建 `Java9Fundamentals` 项目。如果你使用以下命令，通过展开目录中的模块代码来运行示例，请确保在 NetBeans 中编译项目：\n\n\
  ```\nC:\\Java9Fundamentals>java --module-path build\\modules\\jdojo.person;build\\\
  modules\\jdojo.address\n--module jdojo.person/com.jdojo.person.Main\n```\n\n隐式依赖\n\
  \n如果一个模块无需在其声明中包含 `requires` 语句来读取另一个模块，就可以读取该模块，则称第一个模块隐式读取了第二个模块。每个模块都隐式读取 `java.base`\
  \ 模块。隐式读取并不局限于 `java.base` 模块。一个模块也可以隐式读取除 `java.base` 模块之外的其他模块。在我展示如何向模块添加隐式可读性之前，我将构建一个示例来说明为什么需要这个特性。\n\
  \n在上一节中，你创建了两个模块，分别名为 `jdojo.address` 和 `jdojo.person`，其中第二个模块使用以下声明读取第一个模块：\n\n\
  ```\nmodule jdojo.person {\nrequires com.jdojo.address;\n...\n}\n```\n\n`jdojo.person`\
  \ 模块中的 `Person` 类引用了 `jdojo.address` 模块中的 `Address` 类。让我们创建另一个名为 `jdojo.person.test`\
  \ 的模块，该模块读取 `jdojo.person` 模块。其模块声明如清单 10-6 所示。\n\n```\n// module-info.java\nmodule\
  \ jdojo.person.test {\nrequires jdojo.person;\n}\n清单 10-6.\ncom.jdojo.person.test\
  \ 模块的模块声明\n```\n\n`jdojo.person.test` 模块的模块图如图 10-4 所示。请注意，`jdojo.person.test` 模块并未读取\
  \ `jdojo.address` 模块，因此 `jdojo.address` 模块导出的 `com.jdojo.address` 包中的公共类型在 `jdojo.person.test`\
  \ 模块中是不可访问的。\n\n![A323069_2_En_10_Fig4_HTML.jpg](img/A323069_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4.\n\njdojo.person.test 模块的模块图\n\n清单 10-7 包含了 `jdojo.person.test` 模块中 `Main`\
  \ 类的代码。\n\n```\n// Main.java\npackage com.jdojo.person.test;\nimport com.jdojo.person.Person;\n\
  public class Main {\npublic static void main(String[] args) {\nPerson john = new\
  \ Person(1001, \"John\", \"Jacobs\");\n// 获取 John 的城市并打印\nString city = john.getAddress().getCity();\n\
  System.out.printf(\"John lives in %s%n\", city);\n}\n}\n清单 10-7.\n用于测试 jdojo.person.test\
  \ 模块的 Main 类\n```\n\n`main()` 方法中的代码非常简单——它创建了一个 `Person` 对象，并读取了该人地址中的城市值：\n\n\
  ```\nPerson john = new Person(1001, \"John\", \"Jacobs\");\nString city = john.getAddress().getCity();\n\
  ```\n\n编译 `jdojo.person.test` 模块的代码会产生以下错误：\n\n```\nC:\\Java9Fundamentals\\src\\\
  jdojo.person.test\\classes\\com\\jdojo\\person\\test\\Main.java:11: error: Address.getCity()\
  \ in package com.jdojo.address is not accessible\nString city = john.getAddress().getCity();\n\
  (package com.jdojo.address is declared in module jdojo.address, but module jdojo.person.test\
  \ does not read it)\n1 error\n```\n\n编译器消息不太清晰。它指出 `Address` 类对 `jdojo.person.test`\
  \ 模块不可访问。回想一下，`Address` 类位于 `jdojo.address` 模块中，而 `jdojo.person.test` 模块并未读取该模块。从代码来看，似乎代码应该能编译通过。你可以访问\
  \ `Person` 类，而该类使用了 `Address` 类；因此你应该能够使用 `Address` 类。这里，对 `john.getAddress()` 方法的调用返回了一个\
  \ `Address` 类型的对象，而你无法访问该类型。模块系统只是在执行其职责，强制执行 `jdojo.address` 模块定义的封装。如果一个模块想要显式或隐式地使用\
  \ `Address` 类，它必须读取 `jdojo.address` 模块。如何修复这个问题？简单的答案是让 `jdojo.person.test` 模块读取\
  \ `jdojo.address` 模块，将声明修改为清单 10-8 所示。\n\n```\n// module-info.java\nmodule jdojo.person.test\
  \ {\nrequires jdojo.person;\nrequires jdojo.address;\n}\n清单 10-8.\njdojo.person.test\
  \ 模块的修改后模块声明\n```\n\n图 10-5 显示了 `jdojo.person.test` 模块修改后的模块图。\n\n![A323069_2_En_10_Fig5_HTML.jpg](img/A323069_2_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5.\n\njdojo.person.test 模块修改后的模块图\n\n编译并运行 `jdojo.person.test` 模块中的 `Main`\
  \ 类，它将打印以下内容：\n\n```\nJohn lives in Jacksonville\n```\n\n你通过在 `jdojo.person.test`\
  \ 模块的声明中添加 `requires` 语句解决了问题。然而，其他读取 `jdojo.person` 模块的模块很可能也需要处理地址，并且它们也需要添加相同的\
  \ `requires` 语句。如果 `jdojo.person` 模块在其公共 API 中暴露了来自多个其他模块的类型，那么读取 `jdojo.person`\
  \ 模块的模块将需要为每个此类模块添加一个 `requires` 语句。对于所有这些模块来说，添加额外的 `requires` 语句将非常繁琐。\n\n\n\n\
  还有一种使用场景可能引发此类情况。假设只有两个模块——`jdojo.person.test` 和 `jdojo.person`，其中前者读取后者，后者导出所有其公开类型被前者使用的包。`com.jdojo.address`\
  \ 包位于 `jdojo.person` 模块中，而 `jdojo.person.test` 模块编译正常。后来，`jdojo.person` 模块被重构为两个模块——`jdojo.person`\
  \ 和 `jdojo.address`。现在，`jdojo.person.test` 模块停止工作，因为原本在 `jdojo.person` 模块中的某些公开类型已被移至\
  \ `jdojo.address` 模块，而 `jdojo.person.test` 模块并未读取该模块。\n\nJDK 9 的设计者意识到了这个问题，并提供了一种简单的解决方法。在这种情况下，你只需修改\
  \ `jdojo.person` 模块的声明，在 `requires` 语句中添加 `transitive` 修饰符，以读取 `jdojo.address` 模块。清单\
  \ 10-9 包含了修改后的 `jdojo.person` 模块声明。\n\n```\n// module-info.java\nmodule jdojo.person\
  \ {\n    // 读取 jdojo.address 模块\n    requires transitive jdojo.address;\n    //\
  \ 导出 com.jdojo.person 包\n    exports com.jdojo.person;\n}\n清单 10-9. 使用传递性导出的 jdojo.person\
  \ 模块的修改后模块声明\n```\n\n现在，你可以从 `jdojo.person.test` 模块的声明中移除以下语句：\n\n```\nrequires\
  \ jdojo.address;\n```\n\n你需要在模块路径上保留 `jdojo.address` 项目，以便编译和运行 `jdojo.person.test`\
  \ 模块项目，因为该模块仍需使用 `Address` 类型。重新编译 `jdojo.person` 模块。重新编译并运行 `jdojo.person.test`\
  \ 模块中的主类，以获得期望的输出。\n\n提示\n\n当模块 `M` 使用模块 `N` 的公开类型，并且这些公开类型是模块 `M` 公开 API 的一部分时，应考虑在模块\
  \ `M` 中使用 `requires transitive N`。假设你有一个导出包的模块 `P`，以及另一个读取模块 `P` 的模块 `Q`。如果你将模块\
  \ `P` 重构拆分为多个模块（例如 `S` 和 `T`），应考虑在 `P` 的模块声明中添加 `requires transitive S` 和 `requires\
  \ transitive T` 语句，以确保所有读取 `P` 的模块（此处为模块 `Q`）无需任何修改即可继续工作。\n\n当 `requires` 语句包含\
  \ `transitive` 修饰符时，依赖当前模块的模块会隐式读取 `requires` 语句中指定的模块。参考清单 10-9，任何读取 `jdojo.person`\
  \ 模块的模块都会隐式读取 `jdojo.address` 模块。本质上，隐式读取使模块声明更易于阅读，也更容易将模块重构为多个模块，但更难进行推理，因为仅查看模块声明无法了解其所有依赖关系。图\
  \ 10-6 展示了 `jdojo.person.test` 模块的最终模块图。\n\n![A323069_2_En_10_Fig6_HTML.jpg](img/A323069_2_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6. jdojo.person.test 模块的模块图\n\n在解析模块时，模块图会通过为每个传递性依赖添加读取边来扩充。在此示例中，将从 `jdojo.person.test`\
  \ 模块到 `jdojo.address` 模块添加一条读取边，如图 10-7 中的虚线箭头所示。我将连接 `jdojo.person.test` 模块与 `jdojo.address`\
  \ 模块的边以虚线表示，以表明它是在模块图解析后添加的。\n\n![A323069_2_En_10_Fig7_HTML.jpg](img/A323069_2_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7. 添加隐式读取边后的 jdojo.person.test 模块的模块图\n\n可选依赖\n\n模块系统在编译时和运行时都会验证模块依赖关系。有时你可能希望模块依赖在编译时是强制的，但在运行时是可选的。\n\
  \n你可以开发一个库，如果某个特定模块在运行时可用，其性能会更好；否则，它会回退到另一个性能较差的模块。然而，该库是针对可选模块编译的，并确保在可选模块不可用时，不会执行依赖于该可选模块的代码。\n\
  \n另一个例子是导出注解包的模块。Java 运行时已经会忽略不存在的注解类型。然而，模块依赖关系在启动时会被验证，如果运行时缺少该模块，应用程序将无法启动。因此，必须将包含注解包的模块的依赖声明为可选。\n\
  \n你可以通过在 `requires` 语句中使用 `static` 关键字来声明可选依赖：\n\n```\nrequires static ;\n```\n\n\
  以下模块声明包含对 `jdojo.annotation` 模块的可选依赖：\n\n```\nmodule jdojo.claim {\n    requires\
  \ static jdojo.annotation;\n}\n```\n\n允许在 `requires` 语句中同时使用 `transitive` 和 `static`\
  \ 修饰符：\n\n```\nmodule jdojo.claim {\n    requires transitive static jdojo.annotation;\n\
  }\n```\n\n开放模块与包\n\n反射是一个庞大的主题。如果这是你第一次接触 Java，你可能难以理解本节内容。你可以在获得更多 Java 经验后重新阅读本节，或者直接阅读而不必担心理解所有内容。我在本系列第二卷的第\
  \ 3 章中详细介绍了反射。\n\n反射是一种在编译时无需了解 Java 类型即可操作它们的方式。你在本章中使用了诸如 `Person` 类之类的类型。要创建\
  \ `Person` 对象并调用其 `getFirstName()` 方法，你可以编写如下代码：\n\n```\nimport com.jdojo.person.Person;\n\
  ...\nPerson john = new Person(1001, \"John\", \"Jacobs\");\nString firstName = john.getFirstName();\n\
  ```\n\n在这种情况下，Java 编译器会确保 `com.jdojo.person` 包中存在名为 `Person` 的类。编译器还会确保此代码可以访问 `Person`\
  \ 类、其构造函数及其 `getFirstName()` 方法。如果 `Person` 类不存在，你将无法编译此代码。当你运行此代码时，Java 运行时会再次验证\
  \ `Person` 的存在以及此代码使用它所需的访问权限。使用反射，你可以在不了解 `Person` 类存在的情况下重写此代码。你的代码和编译器将不知道 `Person`\
  \ 类的存在，但你仍然能够实现相同的功能。为此，此代码只需要在运行时访问 `Person` 类。Java 中有两种访问类型：\n\n*   编译时访问\n* \
  \  运行时访问\n\n编译器在编译期间验证编译时访问。编译时访问必须遵循 Java 语言访问规则，例如，类外部的代码无法访问该类的私有成员。\n\nJava\
  \ 运行时验证对类型及其成员的运行时访问。在运行时，代码可以通过两种方式访问类型及其成员：\n\n*   第一种方式是运行以被访问类型编写的编译代码。在这种情况下，运行时像编译时一样强化\
  \ Java 语言的可访问性规则。\n*   第二种方式是使用反射在运行时访问类型及其成员。在这种情况下，编译器不知道你的代码在运行时将访问的类型及其成员。使用反射访问类型及其成员称为反射式访问。与普通访问不同，反射式访问允许访问所有类型（不仅仅是公开类型）以及这些类型的所有成员（甚至是私有成员）。\n\
  \n\n\n反射访问既有好处也有坏处。其好处在于，它允许你开发能够适用于所有未知类型的库。有许多优秀的框架，例如 **Spring** 和 **Hibernate**，它们严重依赖于对应用程序库中定义的类型成员进行深度反射访问。反射访问的坏处在于它破坏了封装性——它可以访问那些使用常规访问规则无法访问的类型及其成员。使用反射访问原本不可访问的类型及其成员，有时被称为深度反射。\n\
  \n二十多年来，Java 一直允许反射访问。Java 9 模块系统的设计者在设计对模块化代码的深度反射访问时面临巨大挑战。允许对导出包中的类型进行深度反射，违反了模块系统的强封装原则。这使得外部代码可以访问所有内容，即使模块开发者并不想暴露模块的某些部分。另一方面，不允许深度反射将使\
  \ Java 社区失去一些优秀的、广泛使用的框架，并且也会破坏许多依赖深度反射的现有应用程序。由于这一限制，许多现有应用程序根本不会迁移到 JDK 9。\n\n\
  经过几轮设计和实验迭代，模块系统的设计者找到了一个折中方案——鱼与熊掌可以兼得！当前的设计允许你拥有一个具有强封装、深度反射访问或两者兼有的模块。规则如下：\n\
  \n*   一个导出的包将只允许在编译时和运行时访问公共类型及其公共/受保护成员。如果你不导出某个包，该包中的所有类型对其他模块都是不可访问的。这提供了强封装性。\n\
  *   你可以开放一个模块，以允许在运行时对该模块中所有包的所有类型进行深度反射。这样的模块被称为开放模块。\n*   你可以拥有一个普通模块——即未开放进行深度反射的模块——但其中特定的包可以在运行时开放用于深度反射。所有其他未开放的包则被强封装。模块中允许进行深度反射的包被称为开放包。\n\
  *   有时，你可能希望在编译时访问某个包中的类型，以便根据该包中的类型编写代码，同时，你又希望在运行时对这些类型进行深度反射访问。你可以通过导出并开放同一个包来实现这一点。\n\
  \n**开放模块**\n\n开放模块通过在 `module` 关键字前使用 `open` 修饰符来声明：\n\n```\nopen module jdojo.model\
  \ {\n// 模块语句写在这里\n}\n```\n\n这里，`jdojo.model` 模块是一个开放模块。其他模块可以对该模块中所有包的所有类型使用深度反射。你可以在开放模块的声明中使用\
  \ `exports`、`requires`、`uses` 和 `provides` 语句。你不能在开放模块内部使用 `opens` 语句。`opens` 语句用于开放特定包以进行深度反射。因为开放模块已经开放了所有包用于深度反射，所以在开放模块内部不允许使用\
  \ `opens` 语句。\n\n**开放包**\n\n开放包意味着授予其他模块对该包中公共类型的常规运行时访问权限，并允许其他模块对该包中的类型使用深度反射。你可以将包开放给所有其他模块，或开放给一个特定的模块列表。`opens`\
  \ 语句将包开放给所有其他模块的语法如下：\n\n```\nopens <包名>;\n```\n\n这里，`<包名>` 对所有其他模块开放，用于深度反射。你也可以使用限定形式的\
  \ `opens` 语句将包开放给特定模块：\n\n```\nopens <包名> to <模块 1>, <模块 2>...;\n```\n\n这里，`<包名>`\
  \ 仅对 `<模块 1>`、`<模块 2>` 等开放用于深度反射。以下是在模块声明中使用 `opens` 语句的示例：\n\n```\nmodule jdojo.model\
  \ {\n// 将 com.jdojo.util 包导出给所有模块\nexports com.jdojo.util;\n// 将 com.jdojo.util\
  \ 包开放给所有模块\nopens com.jdojo.util;\n// 仅将 com.jdojo.model.policy 包开放给 hibernate.core\
  \ 模块\nopens com.jdojo.model.policy to hibernate.core;\n}\n```\n\n`jdojo.model` 模块导出了\
  \ `com.jdojo.util` 包，这意味着所有公共类型及其公共成员在编译时和运行时的常规反射中都是可访问的。第二条语句开放了同一个包，用于运行时的深度反射。总之，`com.jdojo.util`\
  \ 包的所有公共类型及其公共成员在编译时可访问，并且该包允许在运行时进行深度反射。第三条语句仅将 `com.jdojo.model.policy` 包开放给 `hibernate.core`\
  \ 模块用于深度反射，这意味着其他模块在编译时无法访问该包的任何类型，而 `hibernate.core` 模块可以在运行时使用深度反射访问所有类型及其成员。\n\
  \n**提示**\n\n对另一个模块的开放包执行深度反射的模块，不需要读取包含这些开放包的模块。然而，允许并强烈建议（如果你知道模块名称的话）添加对包含开放包的模块的依赖，这样模块系统可以在编译时和运行时验证该依赖。\n\
  \n当模块 `M` 将其包 `P` 开放给另一个模块 `N` 进行深度反射时，模块 `N` 有可能将其对包 `P` 拥有的深度反射访问权限委托给另一个模块 `Q`。模块\
  \ `N` 需要使用模块 API 以编程方式完成此操作。将反射访问权限委托给另一个模块可以避免将整个模块开放给所有其他模块，同时，这也为获得反射访问权限的模块增加了额外的工作。我在本系列第二卷的第\
  \ 15 章中展示了一个示例。关于在模块中使用开放模块和开放包的示例，请参考本系列第二卷的第 3 章。\n\n**跨模块拆分包**\n\n不允许将包拆分到多个模块中。也就是说，同一个包不能定义在多个模块中。如果同一个包中的类型分布在多个模块中，这些模块应该合并为一个模块，或者你需要重命名包。有时，你可以成功编译这些模块，但会在运行时收到错误；其他时候，你会收到编译时错误。正如我开头提到的，拆分包并非无条件禁止。你需要了解这些错误背后的简单规则。\n\
  \n如果两个名为 `M` 和 `N` 的模块定义了同一个名为 `P` 的包，那么不能存在一个模块 `Q`，使得 `M` 和 `N` 模块中的包 `P` 都可被\
  \ `Q` 访问。换句话说，多个模块中的同一个包不能同时被一个模块读取。否则，就会发生错误。如果一个模块正在使用包 `P` 中的类型 `T`，而该类型存在于两个模块中，模块系统无法决定使用这两个模块中的哪一个的\
  \ `P.T`。它会生成一个错误，并要求你修复问题。考虑以下代码片段：\n\n```\n// Test.java\npackage java.util;\npublic\
  \ class Test {\n}\n```\n\nJDK 中的 `java.base` 模块包含一个 `java.util` 包，该包对所有模块可用。如果你在\
  \ JDK 9 中将 `Test` 类作为某个模块的一部分或单独编译，你将收到以下错误：\n\n```\nerror: package exists in another\
  \ module: java.base\npackage java.util;\n^\n1 error\n```\n\n如果你将这个类放在一个名为 `M` 的模块中，编译时错误表明\
  \ `java.util` 包在此模块以及 `java.base` 模块中都可被模块 `M` 读取。你必须将此 `Test` 类的包从 `java.util`\
  \ 更改为其他名称，例如 `com.jdojo.util`，该包在任何可观察到的模块中都不存在。\n\n\n\n模块声明中的限制\n\n声明模块时存在若干限制。若违反这些限制，将在编译时或启动时收到错误：\n\
  \n*   模块图不能包含循环依赖。也就是说，两个模块不能相互读取。如果它们相互读取，则应该合并为一个模块，而非两个。请注意，通过编程方式添加可读性边或使用命令行选项，可以在运行时实现循环依赖。\n\
  \n*   模块声明不支持模块版本。你需要使用 `jar` 工具或其他工具（如 `javac`）将模块版本作为类文件属性添加。\n\n*   模块系统没有子模块的概念。也就是说，`jdojo.person`\
  \ 和 `jdojo.person.client` 是两个独立的模块；前者并非后者的子模块。\n\n模块的类型\n\nJava 已经存在超过 20 年，无论是旧应用还是新应用，都将继续使用那些尚未模块化或永远不会模块化的库。如果\
  \ JDK 9 强制每个人都对其应用进行模块化，那么 JDK 9 很可能不会被大多数人采用。JDK 9 的设计者考虑到了向后兼容性。你可以按照自己的节奏对应用进行模块化，或者决定完全不进行模块化——只需在\
  \ JDK 9 中运行现有应用——来采用 JDK 9。在大多数情况下，你在 JDK 8 或更早版本中运行的应用无需任何修改即可在 JDK 9 中继续运行。为了简化迁移，JDK\
  \ 9 定义了四种类型的模块：\n\n*   普通模块\n\n*   开放模块\n\n*   自动模块\n\n*   未命名模块\n\n实际上，你会遇到六个描述六种不同类型模块的术语，对于\
  \ JDK 9 的初学者来说，这些术语充其量只会令人困惑。另外两种类型的模块用于概括这四种模块的更广泛类别。图 10-8 展示了所有模块类型的图示。\n\n![A323069_2_En_10_Fig8_HTML.gif](img/A323069_2_En_10_Fig8_HTML.gif)\n\
  \n图 10-8. 模块的类型\n\n在描述主要模块类型之前，我先简要定义图 10-8 中所示的模块类型。\n\n*   模块是代码和数据的集合。\n\n* \
  \  根据模块是否有名称，模块可以是命名模块或未命名模块。未命名模块没有进一步的分类。\n\n*   当模块有名称时，该名称可以在模块声明中显式给出，也可以自动（或隐式）生成。如果名称在模块声明中显式给出，则称为显式模块。如果名称由模块系统通过读取模块路径上的\
  \ JAR 文件名生成，则称为自动模块。\n\n*   如果你声明模块时未使用 `open` 修饰符，则称为普通模块。\n\n*   如果你使用 `open`\
  \ 修饰符声明模块，则称为开放模块。\n\n基于这些定义，开放模块也是显式模块和命名模块。自动模块是命名模块，因为它有名称（自动生成的），但它不是显式模块，因为它是由模块系统在编译时和运行时隐式声明的。以下小节将描述这些模块类型。\n\
  \n提示\n\n如果 Java 平台最初就设计了模块系统，那么你只会拥有一种模块类型——普通模块！所有其他模块类型的存在都是为了向后兼容以及 JDK 9 的平滑迁移和采用。\n\
  \n普通模块\n\n使用模块声明显式声明且未使用 `open` 修饰符的模块总是被赋予一个名称，称为普通模块或简称为模块。到目前为止，你主要在使用普通模块。我一直将普通模块称为模块，并且除非需要在四种模块类型之间进行区分，否则我将继续使用这个术语。默认情况下，普通模块中的所有类型都是封装的。普通模块的示例如下：\n\
  \n```\nmodule a.normal.module {\n// 模块语句写在这里\n}\n```\n\n开放模块\n\n如果模块声明包含 `open`\
  \ 修饰符，则该模块称为开放模块。开放模块的示例如下：\n\n```\nmodule an.open.module {\n// 模块语句写在这里\n}\n```\n\
  \n自动模块\n\n为了向后兼容，用于查找类型的类路径机制在 JDK 9 中仍然有效。你可以选择将 JAR 放在类路径、模块路径或两者的组合上。请注意，你可以将模块化\
  \ JAR 以及普通 JAR 同时放在模块路径和类路径上。\n\n当你将 JAR 放在模块路径上时，该 JAR 被视为一个模块，称为自动模块。“自动模块”这个名称源于该模块是由\
  \ JAR 自动定义的——你无需通过添加 `module-info.class` 文件来显式声明模块。自动模块有一个名称。自动模块的名称是什么？它读取哪些模块？它导出哪些包？我将很快回答这些问题。\n\
  \n自动模块的存在完全是为了将现有 Java 应用迁移到 JDK 9。它们允许你通过将现有 JAR 放在模块路径上来将其用作模块。然而，它们并不可靠，因为当 JAR\
  \ 的作者将其转换为模块化 JAR 时，他可能会选择赋予它们与自动推导出的名称不同的模块名称。当作者将 JAR 转换为模块化 JAR 时，自动模块中导出的包也可能会发生变化。在你的应用中使用自动模块时，请牢记这些风险。\n\
  \n为了防止自动模块的模块名称发生变化，作者可以在将其 JAR 转换为模块化 JAR 之前建议一个模块名称。你可以在 JAR 的 `MANIFEST.MF` 文件中使用建议的模块名称，将其指定为自动模块名称。你可以将自动模块名称指定为\
  \ JAR 中 `MANIFEST.MF` 文件主节中属性“Automatic-Module-Name”的值。\n\n自动模块也是命名模块。假设你想将 JAR\
  \ `com.jdojo.intro-1.0` 用作自动模块。其名称和版本根据以下规则从 JAR 文件名推导得出：\n\n*   如果 JAR 文件在其 `MANIFEST.MF`\
  \ 文件的主节中具有属性“Automatic-Module-Name”，则该属性的值即为模块名称。否则，模块名称根据以下步骤从 JAR 文件名推导得出。\n\n\
  *   移除 JAR 文件的 `.jar` 扩展名。此步骤移除 `.jar` 扩展名，后续步骤使用 `com.jdojo.intro-1.0` 来推导模块名称及其版本。\n\
  \n*   如果名称以连字符后跟至少一个数字结尾（数字后可选地跟一个点），则模块名称从最后一个连字符之前的部分推导得出。连字符之后的部分，如果能够解析为有效版本，则被分配为模块的版本；否则，该部分将被忽略。在我们的示例中，模块名称将从\
  \ `com.jdojo.intro` 推导得出。版本将被推导为 1.0。\n\n*   对于模块名称，所有尾随的数字和点都将被移除。在我们的例子中，模块名称的剩余部分\
  \ `com.jdojo.intro` 不包含任何尾随的数字和点。因此，此步骤不会改变任何内容。\n\n\n\n*   名称部分中的每个非字母数字字符都会被替换为一个点号，并且在生成的字符串中，两个连续的点号会被替换为一个点号，同时移除所有前导和尾随的点号。在我们的示例中，名称部分没有任何非字母数字字符，因此模块名称为\
  \ `com.jdojo.intro`。\n\n按顺序应用这些规则，你会得到一个模块名称和一个模块版本。在本节末尾，我将向你展示如何通过 JAR 文件获知自动模块的名称。表\
  \ 10-1 列出了一些 JAR 名称及其派生的自动模块名称。请注意，该表未显示 JAR 文件名中的 `.jar` 扩展名，并且假定在 JAR 的 `MANIFEST.MF`\
  \ 文件的主节中未指定“Automatic-Module-Name”属性。\n\n表 10-1.\n\n从 JAR 文件名派生自动模块名称的示例\n\nJAR\
  \ 名称\n |\n  模块名称\n |\n  模块版本\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\
  \n`com.jdojo.intro-1.0`\n |\n  `com.jdojo.intro`\n |\n  `1.0`\n |\n\n`junit-4.10.jar`\n\
  \ |\n  `junit`\n |\n  `4.10`\n |\n\n`jdojo-logging1.5.0`\n |\n  `N/A`\n |\n   |\n\
  \n`spring-core-4.0.1.RELEASE`\n |\n  `spring.core`\n |\n  `4.0.1.RELEASE`\n |\n\n\
  `jdojo-trans-api_1.5_spec-1.0.0`\n |\n  `N/A`\n |\n  `N/A`\n |\n\n`_`\n |\n  `N/A`\n\
  \ |\n  `N/A`\n |\n\n让我们看看表中三个特殊情况，如果你将这些 JAR 放置在模块路径上，将会收到错误。第一个 JAR 名称是 `jdojo-logging1.5.0`。应用所有规则后，派生的模块名称是\
  \ `jdojo.logging1.5.0`，这是一个无效的模块名称。回想一下，模块名称是一个限定的 Java 标识符。也就是说，模块名称中的每个部分都必须是有效的\
  \ Java 标识符。在此例中，名称的两个部分“5”和“0”不是有效的 Java 标识符。除非你在清单文件中使用“Automatic-Module-Name”属性指定一个有效的模块名称，否则在模块路径上使用此\
  \ JAR 将会产生错误。\n\n第二个导致错误的 JAR 名称是 `jdojo-trans-api_1.5_spec-1.0.0`。让我们应用规则来派生自动模块名称：\n\
  \n*   它找到最后一个连字符，其后只有数字和点号，并将 JAR 名称拆分为两部分：`jdojo-trans-api_1.5_spec` 和 `1.0.0`。第一部分用于派生模块名称。第二部分是模块版本。\n\
  \n*   名称部分不包含任何尾随的数字和点号。因此，应用下一条规则，将所有非字母数字字符转换为点号。生成的字符串是 `jdojo.trans.api.1.5.spec`。现在，“1”和“5”是模块名称中的两个部分，它们不是有效的\
  \ Java 标识符。因此，派生的模块名称无效，这就是你在模块路径上添加此 JAR 文件时收到错误的原因。\n\n第三个 JAR 名称，即表中的最后一个条目，是一个下划线（`_`）。也就是说，JAR\
  \ 文件名为 `_.jar`。如果你应用规则，下划线会被替换为一个点号，并且该点号会被移除，导致派生的名称为空字符串，这不是一个有效的模块名称。模块路径上的 `_.jar`\
  \ 文件将导致以下异常：\n\n```\njava.lang.module.ResolutionException: Unable to derive module\
  \ descriptor for: _.jar\n```\n\n你可以使用带有 `--describe-module` 选项的 `jar` 命令来了解将从 JAR\
  \ 派生的自动模块的名称。一般语法如下：\n\n```\njar --describe-module --file \n```\n\n以下命令打印名为 `jdojo.person-2.2.jar`\
  \ 的 JAR 的自动模块名称，假设该 JAR 存在于 `C:\\bj9f` 目录中：\n\n```\nc:\\bj9f\\jars>jar --describe-module\
  \ --file jdojo.util-2.2.jar\n```\n\n```\nNo module descriptor found. Derived automatic\
  \ module.\njdojo.util@2.2 automatic\nrequires java.base mandated\ncontains com.jdojo.person\n\
  ```\n\n输出中的第一行表明 `jdojo.person-2.2.jar` 是一个 JAR，而不是一个模块化 JAR。如果它是一个模块化 JAR，模块名称将从\
  \ `module-info.class` 文件中读取。第一行表明未找到模块描述符。第二行打印 `jdojo.util` 作为模块名称，`2.2` 作为模块版本。在第二行的末尾，打印了单词\
  \ `automatic`，以表明此模块名称是作为自动模块名称派生的。输出中的第三行和第四行打印了自动模块的依赖关系和包信息。\n\n你可以使用 `jar` 命令来更新清单条目。我将向你展示如何向\
  \ JAR 添加“Automatic-Module-Name”属性。在此示例中，我使用 `jdojo.person-2.2.jar`。你需要创建一个文本文件并添加清单属性。清单\
  \ 10-10 显示了一个名为 `manifest.txt` 的清单文件的内容。该文件包含两行。第一行指定了一个名为“Automatic-Module-Name”的属性，其值为\
  \ `jdojo.misc`。第二行是一个空行，你看不到。请确保此文件中有一个空行。否则，下一条命令将无法工作。\n\n```\nAutomatic-Module-Name:\
  \ jdojo.misc\n清单 10-10.\nmanifest.txt 文件的内容\n```\n\n以下命令将更新 `jdojo.util-2.2.jar`\
  \ 文件中的清单文件，假设 JAR 文件和 `manifest.txt` 文件都位于同一目录 `C:\\bj9f` 中：\n\n```\nc:\\bj9f\\\
  jars>jar --update --manifest manifest.txt --file jdojo.util-2.2.jar\n```\n\n如果你描述\
  \ `jdojo.util-2.2.jar` 文件以查看派生的自动模块名称，模块名称将从其清单文件的“Automatic-Module-Name”属性中读取。让我们重新运行之前的命令来描述该模块：\n\
  \n```\nc:\\bj9f\\jars>jar --describe-module --file jdojo.util-2.2.jar\nNo module\
  \ descriptor found. Derived automatic module.\njdojo.misc@2.2 automatic\nrequires\
  \ java.base mandated\ncontains com.jdojo.person\n```\n\n一旦你知道了自动模块的名称，其他显式模块就可以使用\
  \ `requires` 语句来读取它。以下模块声明读取了来自模块路径上 `jdojo.util-2.2.jar` 的名为 `jdojo.misc` 的自动模块，假设自动模块名称是从\
  \ JAR 文件名派生的：\n\n```\nmodule jdojo.lib {\nrequires jdojo.util;\n//...\n}\n```\n\n\
  一个自动模块要有效使用，必须导出包并读取其他模块。让我们看看相关的规则：\n\n*   自动模块读取所有其他模块。需要注意的是，从自动模块到所有其他模块的可读性是在模块图解析之后添加的。\n\
  \n*   自动模块中的所有包都被导出和开放。\n\n这两条规则基于这样一个事实：没有实际的方法来判断一个自动模块依赖于哪些其他模块，以及其他模块在编译或进行深度反射时需要自动模块的哪些包。\n\
  \n自动模块读取所有其他模块可能会创建循环依赖，这在模块图解析之后是允许的。回想一下，在模块图解析期间不允许模块之间存在循环依赖。也就是说，你不能在模块声明中存在循环依赖。\n\
  \n\n\n自动模块没有模块声明，因此它们无法声明对其他模块的依赖。显式模块可以声明对自动模块的依赖。考虑这样一种情况：一个显式模块 `M` 读取了一个自动模块\
  \ `P`，而模块 `P` 使用了另一个自动模块 `Q` 中的类型 `T`。当你使用模块 `M` 中的主类启动应用程序时，模块图将只包含 `M` 和 `P`——为简洁起见，此讨论中排除了\
  \ `java.base` 模块。解析过程将从模块 `M` 开始，并发现它读取了另一个模块 `P`。解析过程实际上无法判断模块 `P` 读取了模块 `Q`。你可以通过将模块\
  \ `P` 和 `Q` 放在类路径上来编译它们。但是，当你运行此应用程序时，将会收到一个 `ClassNotFoundException`。当模块 `P` 尝试访问模块\
  \ `Q` 中的类型时，就会发生此异常。要解决此问题，必须将模块 `Q` 包含在模块图中，方法是使用 `--add-modules` 命令行选项将其添加为根模块，并将\
  \ `Q` 指定为该选项的值。\n\n未命名模块\n\n你可以将 JAR 文件和模块化 JAR 文件放在类路径上。当加载一个类型且在其任何已知模块中都找不到其包时，模块系统会尝试从类路径加载该类型。如果在类路径上找到了该类型，它将被类加载器加载，并成为该加载器的未命名模块的成员。每个类加载器都定义了一个未命名模块，其成员都是它从类路径加载的所有类型。未命名模块没有名称，因此显式模块无法使用\
  \ `requires` 语句声明对其的依赖。如果你有一个显式模块需要使用未命名模块中的类型，则必须将该未命名模块的 JAR 文件作为自动模块使用，方法是将其放在模块路径上。\n\
  \n一个常见的错误是在编译时尝试从显式模块访问未命名模块中的类型。这根本不可能，因为未命名模块没有名称，而显式模块在编译时需要模块名称才能读取另一个模块。自动模块充当显式模块和未命名模块之间的桥梁，如图\
  \ 10-9 所示。显式模块可以使用 `requires` 语句访问自动模块，而自动模块可以访问未命名模块。\n\n![A323069_2_En_10_Fig9_HTML.gif](img/A323069_2_En_10_Fig9_HTML.gif)\n\
  \n图 10-9.\n\n充当显式模块和未命名模块之间桥梁的自动模块\n\n未命名模块没有名称。这并不意味着未命名模块的名称是空字符串、“unnamed”或 `null`。以下尝试声明对未命名模块依赖的模块声明是无效的：\n\
  \n```\nmodule some.module {\nrequires “”;        // 编译时错误\nrequires “unnamed”; //\
  \ 编译时错误\nrequires unnamed;   // 编译时错误，除非存在一个名为 unnamed 的命名模块\nrequires null;   \
  \   // 编译时错误\n}\n```\n\n未命名模块会读取其他模块，并使用以下规则将其所有包导出和开放给其他模块：\n\n*   未命名模块会读取所有其他模块。因此，未命名模块可以访问所有模块（包括平台模块）中所有导出包中的公共类型。此规则使得在\
  \ Java SE 8 中编译和运行的、使用类路径的应用程序能够继续在 Java SE 9 中编译和运行，前提是它们仅使用标准的、非弃用的 Java SE API。\n\
  \n*   未命名模块会将其所有包开放给所有其他模块。因此，显式模块有可能在运行时通过反射访问未命名模块中的类型。\n\n*   未命名模块会导出其所有包。显式模块在编译时无法读取未命名模块。在模块图解析后，所有自动模块都会被设置为读取未命名模块。\n\
  \n提示\n\n未命名模块可能包含一个也由命名模块导出的包。在这种情况下，未命名模块中的该包将被忽略。\n\n聚合模块\n\n你可以创建一个自身不包含任何代码的模块。它收集并重新导出其他模块的内容。这样的模块称为聚合模块。假设有几个模块依赖于五个模块。你可以为这五个模块创建一个聚合模块，这样，你的模块现在只需依赖一个模块——即聚合模块。聚合模块并非我之前章节中解释的另一种模块类型。它是一个命名模块。它有一个特殊的名称“聚合”，因为它自身没有内容。相反，它将其他几个模块的内容合并到一个具有不同名称的模块中。\n\
  \n聚合模块只包含一个类文件，即 `module-info.class`。聚合模块的模块声明由所有 `requires transitive <module>`\
  \ 语句组成。以下是聚合模块声明的示例。聚合模块名为 `jdojo.all`，它聚合了三个模块：`jdojo.policy`、`jdojo.claim` 和 `jdojo.payment`。\n\
  \n```\nmodule jdojo.all {\nrequires transitive jdojo.policy;\nrequires transitive\
  \ jdojo.claim;\nrequires transitive jdojo.payment;\n}\n```\n\n聚合模块的存在是为了方便。Java\
  \ 9 包含几个聚合模块，例如 `java.se` 和 `java.se.ee`。`java.se` 模块收集了 Java SE 中不与 Java EE 重叠的部分。`java.se.ee`\
  \ 模块收集了构成 Java SE 的所有模块，包括与 Java EE 重叠的模块。\n\n在运行时了解模块\n\nJava SE 9 提供了一组类和接口，用于以编程方式处理模块。它们统称为模块\
  \ API。模块 API 允许你查询和修改模块信息。我将在本系列第二卷的第 15 章中详细介绍。在本节中，我将快速预览模块 API。\n\nJVM 中加载的每个类型都由\
  \ `java.lang.Class<T>` 类的一个实例表示。也就是说，`Class<T>` 类的实例在运行时表示类型 `T`。你可以使用该类的对象的 `getClass()`\
  \ 方法获取类型的引用。假设存在一个 `Person` 类，以下代码片段获取了 `Person` 类的引用：\n\n```\nPerson p = new Person();\n\
  Class cls = p.getClass();\n```\n\n你也可以使用类字面量获取类的引用。类字面量是带有 `.class` 的类名。例如，你可以使用类字面量\
  \ `Person.class` 获取 `Person` 类的引用。你可以将前面的代码片段重写如下：\n\n```\nClass cls = Person.class;\n\
  ```\n\n在运行时，每个类型都作为模块的成员被加载。如果该类型是从类路径加载的，则它是加载该类型的类加载器的未命名模块的成员。如果该类型是从模块路径加载的，则它是一个命名模块的成员。`java.lang.Module`\
  \ 类的实例在运行时表示一个模块。`Class` 类包含一个 `getModule()` 方法，该方法返回一个表示该类型所属模块的 `Module`。以下代码片段获取了\
  \ `Person` 类所属的 `Module` 对象的引用：\n\n```\nClass cls = Person.class;\nModule m = cls.getModule();\n\
  ```\n\n\n\n`Module` 类包含多个方法，可用于查询模块在编译时声明的状态以及运行时的实际状态。请注意，模块的状态可能会与源代码中声明的状态有所不同。Module\
  \ API 中的其他类和接口位于 `java.lang.module` 包中。例如，`java.lang.module` 包中的 `ModuleDescriptor`\
  \ 类实例，对于显式模块，它表示在源文件中声明的模块描述符；对于自动模块，则表示合成的模块描述符。你可以使用 `Module` 类的 `getDescriptor()`\
  \ 方法来获取 `ModuleDescriptor` 类的实例。未命名模块没有模块描述符，因此对于未命名模块，`getDescriptor()` 方法返回 `null`。你可以使用\
  \ `Module` 类的 `getName()` 方法来获取模块名称；对于未命名模块，该方法返回 `null`。\n\n清单 10-11 包含了 `jdojo.mod`\
  \ 模块的声明。清单 10-12 包含了 `ModuleInfo` 类的代码，该类会打印其所属模块的信息。\n\n```\n// module-info.java\n\
  module jdojo.mod {\n    exports com.jdojo.mod;\n}\n清单 10-11. jdojo.mod 模块的模块声明\n\
  ```\n\n```\n// ModuleInfo.java\npackage com.jdojo.mod;\nimport java.lang.module.ModuleDescriptor;\n\
  public class ModuleInfo {\n    public static void main(String[] args) {\n      \
  \  // 获取类引用\n        Class cls = ModuleInfo.class;\n        // 获取模块引用\n        Module\
  \ m = cls.getModule();\n        if (m.isNamed()) {\n            // 这是一个命名模块\n  \
  \          // 获取模块名称\n            String name = m.getName();\n            // 获取模块描述符\n\
  \            ModuleDescriptor md = m.getDescriptor();\n            // 打印模块详细信息\n\
  \            System.out.println(\"模块名称: \" + name);\n            System.out.println(\"\
  模块是否开放: \" + md.isOpen());\n            System.out.println(\"模块是否自动: \" + md.isAutomatic());\n\
  \        } else {\n            // 这是一个未命名模块\n            System.out.println(\"未命名模块。\"\
  );\n        }\n    }\n}\n清单 10-12. ModuleInfo 类\n```\n\n以下命令通过将 `jdojo.mod` 模块的模块化\
  \ JAR 放置在模块路径上来运行 `ModuleInfo` 类。输出清晰地显示了正确的模块信息：\n\n```\nC:\\Java9Fundamentals>java\
  \ --module-path dist\\jdojo.mod.jar --module jdojo.mod/com.jdojo.mod.ModuleInfo\n\
  ```\n\n```\n模块名称: jdojo.mod\n模块是否开放: false\n模块是否自动: false\n```\n\n以下命令通过将 `jdojo.mod`\
  \ 模块的模块化 JAR 放置在类路径上来运行 `ModuleInfo` 类。这次，该类从类路径加载，并成为加载它的类加载器的未命名模块的成员。\n\n```\n\
  C:\\Java9Fundamentals>java --class-path dist\\jdojo.mod.jar com.jdojo.mod.ModuleInfo\n\
  ```\n\n```\n未命名模块。\n```\n\n迁移到 JDK 9 的路径\n\n如果你是第一次学习 Java 9，可以跳过本节。当你需要将现有 Java\
  \ 应用程序迁移到 JDK 9 时，可以再回来阅读。\n\n当你准备将应用程序迁移到 JDK 9 时，应牢记模块系统提供的两大优势：强封装性和可靠配置。你的目标是让应用程序仅由常规模块组成，少数开放模块除外。似乎有人可以给你一份清晰的步骤清单，指导你将现有应用程序迁移到\
  \ JDK 9。然而，考虑到应用程序的多样性、它们与其他代码的相互依赖关系以及不同的配置需求，这是不可能的。我所能做的只是提供一些通用的指导方针，希望能帮助你完成迁移，这也是我将在本节中要做的事情。\n\
  \n在 JDK 9 之前，一个非平凡的 Java 应用程序由位于三个层中的多个 JAR 组成：\n\n*   应用程序开发者开发的应用程序层中的应用程序 JAR\n\
  *   第三方提供的库层中的库 JAR\n*   JVM 层中的 Java 运行时 JAR\n\nJDK 9 已经通过将 Java 运行时 JAR 转换为模块，对其进行了模块化。也就是说，Java\
  \ 运行时由模块组成，并且只有模块。\n\n库层主要由放置在类路径上的第三方 JAR 组成。如果你想将应用程序迁移到 JDK 9，可能无法获得第三方 JAR 的模块化版本。你也没有办法控制第三方\
  \ JAR 的供应商如何将它们转换为模块。你可以将库 JAR 放置在模块路径上，并将它们视为自动模块。\n\n你可以选择将应用程序代码完全模块化。以下是你可以选择的模块类型，按从最不推荐到最推荐的顺序排列：\n\
  \n*   未命名模块\n*   自动模块\n*   开放模块\n*   常规模块\n\n迁移的第一步是检查你的应用程序是否能在 JDK 9 中运行，方法是将所有\
  \ JAR（应用程序 JAR 和库 JAR）放置在类路径上，而不对代码进行任何修改。类路径上所有 JAR 中的类型都将成为未命名模块的一部分。在此状态下，你的应用程序使用了\
  \ JDK 9，但没有强封装性和可靠配置。\n\n一旦你的应用程序在 JDK 9 中原样运行，你就可以开始将应用程序代码转换为自动模块。自动模块中的所有包都开放用于深度反射访问，并且被导出以允许对其公共类型进行普通的编译时和运行时访问。从这个意义上说，它并不比未命名模块好；它不提供强封装性。然而，自动模块提供了可靠配置，因为其他显式模块可以声明对自动模块的依赖。\n\
  \n你还可以选择将应用程序代码转换为开放模块，这提供了适度程度的更强封装性：在开放模块中，所有包都开放用于深度反射访问，但你可以指定哪些包（如果有的话）被导出以允许普通的编译时和运行时访问。显式模块也可以声明对开放模块的依赖，从而让你获得可靠配置的好处。\n\
  \n常规模块提供了最强的封装性，它允许你选择哪些包（如果有的话）是开放的、导出的，或两者兼有。显式模块也可以声明对开放模块的依赖，从而让你获得可靠配置的好处。\n\
  \n表 10-2 列出了模块类型及其提供的强封装性和可靠配置的程度。\n\n表 10-2. 模块类型及其提供的不同程度的强封装性和可靠配置\n\n| 模块类型\
  \ | 强封装性 | 可靠配置 |\n| --- | --- | --- |\n| 未命名 | 无 | 无 |\n| 自动 | 无 | 适度 |\n| 开放 |\
  \ 适度 | 有 |\n| 常规 | 最强 | 最强 |\n\n反汇编模块定义\n\n在本节中，我将解释 JDK 附带的 `javap` 工具，该工具可用于反汇编类文件。这个工具在学习模块系统时非常有用，尤其是在反编译模块的描述符时。\n\
  \n我使用提供的源代码中 `bj9f` 目录下的代码。我假设你已经将其解压到 `C:\\bj9f` 目录中。如果不同，请在以下示例中将此路径替换为你自己的路径。\n\
  \n\n\n在第 3 章中，你为 `jdojo.intro` 模块准备了两份 `module-info.class` 文件：一份位于 `mod\\jdojo.intro`\
