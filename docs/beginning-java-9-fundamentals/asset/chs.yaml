  \  \n引言\n\n## 本书的诞生\n\n我第一次接触 Java 编程语言是在 1997 年为期一周的 Java 培训课程中。直到 1999 年，我才有机会在项目中使用\
  \ Java。我阅读了两本 Java 书籍，并参加了 Java 2 程序员认证考试。我考得很好，得了 95 分。考试中答错的三道题让我意识到，我读过的那些书并没有充分涵盖所有必要的\
  \ Java 主题细节。于是我下定决心要写一本关于 Java 编程语言的书。我制定了一个计划，旨在涵盖 Java 开发者在项目中有效使用 Java 编程语言以及获得认证所需的大部分主题。最初，我计划用\
  \ 700 到 800 页的篇幅涵盖 Java 中所有基本主题。\n\n随着写作的深入，我意识到一本详细涵盖大多数 Java 主题的书不可能在 700 到 800\
  \ 页内完成。仅数据类型、运算符和语句这一章就写了 90 页。当时我面临一个问题：“我应该缩短本书的内容，还是包含我认为 Java 开发者需要的所有细节？”我选择了在书中包含所有细节，而不是为了减少页数而缩短内容。我从未打算通过这本书赚大钱。我也从不急于完成这本书，因为仓促可能会损害内容的质量和覆盖面。简而言之，我写这本书是为了帮助\
  \ Java 社区理解和有效使用 Java 编程语言，而无需阅读多本同类书籍。我写这本书的计划是，为所有想要学习和掌握 Java 编程语言精髓的人提供一本全面的一站式参考书。\n\
  \n我高中时的一位老师曾告诉我们，如果想了解一栋建筑，就必须先了解构成建筑的砖块、钢筋和砂浆。同样的逻辑也适用于我们生活中想要理解的大多数事物。它当然也适用于理解\
  \ Java 编程语言。如果你想掌握 Java 编程语言，就必须从理解其基本构建块开始。我在整本书中都采用了这种方法，努力通过先描述基础知识来构建每个主题。在本书中，你很少会发现一个主题在没有了解其背景的情况下就被描述。只要有可能，我就尝试将编程实践与我们日常生活中的活动联系起来。市面上大多数关于\
  \ Java 编程语言的书籍要么根本没有图片，要么只有寥寥几张。我相信一句格言：“一图胜千言。”对读者来说，一张图片能让主题更容易理解和记忆。我在书中加入了大量插图，以帮助读者理解和可视化内容。那些编程经验很少或没有编程经验的开发者，在将各部分组合成一个完整程序时会遇到困难。考虑到这一点，本书包含了超过\
  \ 290 个完整的 Java 程序，这些程序已准备好编译和运行。\n\n我花了无数个小时为写这本书做研究。我的主要研究来源是 Java 语言规范、关于 Java\
  \ 主题的白皮书和文章，以及 Java 规范请求（JSR）。我还花了不少时间阅读 Java 源代码，以更深入地了解某些 Java 主题。有时，研究一个主题需要几个月的时间，然后我才能写出关于该主题的第一句话。最后，摆弄\
  \ Java 程序总是很有趣，有时一玩就是几个小时，只为将它们添加到书中。\n\n\n\n## 第二版简介\n\n我很高兴为大家带来《Java 9 基础入门》第二版。这是三卷本系列丛书《Java\
  \ 9 基础入门》中的第一卷。本卷无法涵盖所有 JDK 9 的变更。我已在三卷本的适当位置包含了 JDK 9 特有的变更。如果你只对学习 JDK 9 特有的主题感兴趣，我建议你阅读我的《Java\
  \ 9 揭秘》一书（ISBN: 978-1484225912），该书仅包含 JDK 9 特有的主题。本版有以下几处变更。\n\n我新增了单独的一章（第 2 章），介绍如何搭建环境，例如下载和安装\
  \ JDK、验证 JDK 版本等。\n\n最显著的变更是对模块系统的介绍，这是 JDK 9 中的一个新主题。第 3 章对模块系统进行了全面介绍。我提供了分步指南，讲解如何使用命令提示符和\
  \ NetBeans 集成开发环境（NetBeans IDE）编写、编译、打包和运行你的第一个 Java 程序。第 10 章深入介绍了模块系统。本系列的第二卷将更深入地探讨模块系统，涵盖模块\
  \ API、模块层等内容。\n\nJDK 9 附带了一个非常有价值且令人兴奋的工具，名为 JShell 工具（Java Shell 的简称）。它允许你通过输入代码片段来交互式地探索\
  \ Java 编程语言，而无需编写完整的程序。我强烈建议你在编写 Java 程序时使用此工具来尝试 Java 代码片段。我在第 2 章介绍了这个工具，并在第 23\
  \ 章对其进行了详细讲解。我没有在本书前几章之一介绍它的原因是，作为初学者，你需要先了解 Java 编程的基础知识。\n\n第一版包含一个名为“类与对象”的章节，篇幅超过\
  \ 120 页。本版将该章拆分为三章，分别题为“类”、“方法”和“构造器”（第 7 章至第 9 章）。\n\n我在第 19 章新增了一节，内容涉及对数组执行操作，包括如何对数组进行排序、搜索、比较等。该节涵盖了\
  \ JDK 9 中所有与数组相关的新 API 变更。\n\n本书上一版有三个附录。本版保留了前两个附录。我更新了附录 B，以涵盖 JDK 9 中新的 Javadoc\
  \ 特性。在上一版中，附录 C 涵盖了紧凑配置文件，该特性是在 JDK 8 中引入的。现在你可以在 JDK 9 中创建自定义运行时映像，这使得紧凑配置文件显得有些多余。因此，我在本版中删除了附录\
  \ C。我将在本系列的第三卷中介绍如何在 JDK 9 中创建自定义运行时映像。\n\n我收到了多位读者的邮件，指出本系列丛书没有包含问题和练习，而这些问题和练习主要是学生和初学者所需要的。学生们将本书用作\
  \ Java 课程的教材，许多初学者也用它来学习 Java。基于这一普遍需求，我花了 60 多个小时为本书每章末尾准备了问题和练习。但我还需要更多时间来提供这些练习的解答。我的朋友\
  \ Preethi 主动提供了帮助，并给出了解答。\n\n除了这些变更之外，我还更新了第一版中的所有章节。我编辑了内容，使其更流畅，更改或添加了新的示例，并更新了内容以包含\
  \ JDK 9 特有的特性。\n\n我衷心希望本书的这一版能帮助你更好地学习 Java。\n\n## 本书结构\n\n本书包含 23 章和两个附录。这些章节涵盖了\
  \ Java 的基础主题，如语法、数据类型、运算符、类、对象等。章节的排列顺序有助于更快地学习 Java 编程语言。第一章“编程概念”解释了一般编程的基本概念，没有涉及太多技术细节；它介绍了\
  \ Java 及其特性。\n\n第三章“编写 Java 程序”介绍了使用 Java 的第一个程序；这一章是专门为初次学习 Java 的人编写的。后续章节按复杂度递增的顺序介绍\
  \ Java 主题。Java 9 的新特性被安排在章节中合适的位置。\n\n完成本书后，为了将你的 Java 知识提升到更高水平，作者还提供了两本配套书籍：《Java\
  \ 9 语言特性基础入门》和《Java 9 API、扩展与库基础入门》。\n\n在每章末尾，你可以找到问题和练习，它们会利用你在该章学到的知识向你提出挑战。问题和练习面向正在学习\
  \ Java 课程的学生和初学者。所有问题的答案和所有练习的解答都可以在 [`www.apress.com`](http://www.apress.com) 上找到。\n\
  \n## 目标读者\n\n本书旨在对任何想学习 Java 编程语言的人都有用。如果你是初学者，编程背景很少或没有，你需要按顺序从头到尾阅读。本书包含各种复杂程度的主题。作为初学者，如果你在阅读某章中的某一节时感到吃力，可以跳到下一节或下一章，等获得更多经验后再回来阅读。\n\
  \n如果你是有中级或高级经验的 Java 开发者，你可以直接跳到某一章或某一章中的某一节。如果某节使用了你不熟悉的主题，你需要在继续当前内容之前先了解该主题。\n\
  \n如果你阅读本书是为了获得 Java 编程语言的认证，你需要阅读几乎所有章节，并注意所有详细的描述和规则。大多数认证项目测试的是你对语言的基础知识，而非高级知识。你只需要阅读那些属于你认证考试范围内的主题。编译并运行超过\
  \ 290 个完整的 Java 程序将有助于你为认证做准备。\n\n如果你是正在参加 Java 编程语言课程的学生，你需要彻底阅读本书的前 10 章。这些章节详细介绍了\
  \ Java 编程语言的基础知识。除非你先掌握基础知识，否则你无法在 Java 课程中取得好成绩。在掌握基础知识后，你只需要阅读课程大纲中涵盖的那些章节。我相信，作为一名\
  \ Java 学生，你不需要逐页阅读整本书。\n\n\n\n## 如何使用本书\n\n本书是你掌握 Java 编程语言知识的起点，而非终点。如果你正在阅读本书，说明你正朝着正确的方向学习\
  \ Java 编程语言，这将使你在学业和职业生涯中脱颖而出。然而，总有更高的目标等待你去实现，你必须不断付出更多努力才能达成。以下几位伟大思想家的名言或许能帮助你理解勤奋学习、时刻保持求知欲的重要性。\n\
  \n> 我们所拥有的学识，与我们所无知的事物相比，终究微不足道。——柏拉图  \n> 真正的智慧在于认识到自己一无所知。而认识到自己一无所知，恰恰使你成为最聪明的人。——苏格拉底\n\
  \n建议读者在阅读本书时，尽可能多地查阅 Java 编程语言的 API 文档。Java API 文档中包含了 Java 类库中所有内容的完整文档列表。你可以从甲骨文公司官方网站\
  \ [`www.oracle.com`](http://www.oracle.com) 下载（或在线查看）Java API 文档。阅读本书时，你需要亲自练习编写\
  \ Java 程序。你也可以通过修改书中提供的程序来进行练习。如果只是阅读本书而不动手编写自己的程序，对你的学习过程帮助不大。请记住“熟能生巧”，学习 Java\
  \ 编程亦是如此。\n\n## 源代码\n\n本书的源代码可通过点击 [`www.apress.com/9781484228432`](http://www.apress.com/9781484228432)\
  \ 页面上的“下载源代码”按钮获取。\n\n## 问题与反馈\n\n请将您的问题和反馈直接发送至作者邮箱 `ksharan@jdojo.com`。\n\n致谢\n\
