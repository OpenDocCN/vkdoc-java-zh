  ```\n\n```\n05/30/2012\n05/30/2012 at 17:30:12\n```\n\n清单 16-25 展示了如何使用不同的模式来格式化日期和时间。\n\
  \n```\n// FormattingDateTime.java\npackage com.jdojo.datetime;\nimport java.time.LocalDate;\n\
