  \ 对象将有一个名称，该名称在其构造函数中提供。它实现了 `Swimmable` 接口的 `swim()` 方法，以在标准输出上打印一条消息。\n\n```\n\
  // Fish.java\npackage com.jdojo.interfaces;\npublic class Fish implements Swimmable\
  \ {\nprivate String name;\npublic Fish(String name) {\nthis.name = name;\n}\n@Override\n\
