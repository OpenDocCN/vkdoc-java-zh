  \ `Fish` 类的对象：\n\n```\n// 创建 Fish 类的对象\nFish fifi = new Fish(\"Fifi\");\n```\n\n\
  当你执行语句 `new Fish(\"Fifi\")` 时，它会在内存中创建一个对象，该对象的类型是 `Fish`（由其类定义的类型）。当一个类实现接口时，其对象会多一个类型，即由所实现接口定义的类型。在你的例子中，通过执行创建的对象具有两种类型：`Fish`\
  \ 和 `Swimmable`。实际上它还有第三种类型，即 `Object` 类型，这是由于 `Fish` 类默认继承了 `Object` 类。由于 `Fish`\
  \ 类的对象具有两种类型，`Fish` 和 `Swimmable`，你可以将 `Fish` 对象的引用赋值给 `Fish` 类型的变量，也可以赋值给 `Swimmable`\
  \ 类型的变量。以下代码总结了这一点：\n\n```\nFish guppi = new Fish(\"Guppi\");\nSwimmable hilda =\
  \ new Fish(\"Hilda\");\n```\n\n变量 `guppi` 是 `Fish` 类型。它引用的是 Guppi 鱼对象。第一个赋值没有意外；一个\
  \ `Fish` 对象被赋值给 `Fish` 类型的变量。第二个赋值也是有效的，因为 `Fish` 类实现了 `Swimmable` 接口，并且 `Fish`\
  \ 类的每个对象也都是 `Swimmable` 类型。此时，`hilda` 是一个 `Swimmable` 类型的变量。它引用的是 Hilda 鱼对象。以下赋值始终有效：\n\
  \n```\n// 一条 Fish 总是 Swimmable 的\nhilda = guppi;\n```\n\n然而，反过来是无效的。将 `Swimmable`\
  \ 类型的变量赋值给 `Fish` 类型的变量会产生编译时错误。\n\n```\n// 一个 Swimmable 不总是 Fish\nguppi = hilda;\
  \ // 编译时错误\n```\n\n为什么之前的赋值会产生编译时错误？原因非常简单。`Fish` 类的对象总是 `Swimmable` 的，因为 `Fish`\
  \ 类实现了 `Swimmable` 接口。由于 `Fish` 类型的变量只能引用 `Fish` 对象，而 `Fish` 对象总是 `Swimmable` 的，因此赋值\
  \ `hilda = guppi` 总是有效的。然而，`Swimmable` 类型的变量可以引用其类实现了 `Swimmable` 接口的任何对象，不一定仅限于\
  \ `Fish` 对象。例如，考虑一个实现了 `Swimmable` 接口的 `Turtle` 类。\n\n```\npublic class Turtle implements\
  \ Swimmable {\n@Override\npublic void swim() {\nSystem.out.println(\"乌龟也能游泳！\");\n\
  }\n}\n```\n\n你可以将 `Turtle` 类的对象赋值给 `hilda` 变量。\n\n```\nhilda = new Turtle(); //\
  \ 可以。一个 Turtle 总是 Swimmable 的\n```\n\n如果此时允许赋值 `guppi = hilda`，那么一个 `Fish` 类型的变量\
  \ `guppi` 将引用一个 `Turtle` 对象！这将是一场灾难。即使编译器允许了这种赋值，Java 运行时也会抛出异常。这种赋值不被允许的原因如下：\n\
  \n一条 `Fish` 总是 `Swimmable` 的。然而，并非每个 `Swimmable` 都是 `Fish`。\n\n假设你（在程序上）确定知道一个 `Swimmable`\
  \ 类型的变量包含对 `Fish` 对象的引用。如果你想将 `Swimmable` 类型的变量赋值给 `Fish` 类型的变量，可以通过使用类型转换来实现，如下所示：\n\
  \n```\n// 编译器会通过。运行时可能抛出 ClassCastException。\nguppi = (Fish)hilda;\n```\n\n\n\n\
  编译器不会对此语句报错。它假定你已经确保 `hilda` 变量引用了一个 `Fish` 对象，并且强制转换 `(Fish) hilda` 将在运行时成功。如果\
  \ `hilda` 变量碰巧没有引用 `Fish` 对象，Java 运行时将抛出 `ClassCastException`。例如，以下代码片段能通过编译器检查，但会抛出\
  \ `ClassCastException`：\n\n```\nFish fred = new Fish(\"Fred\");\nSwimmable turti\
  \ = new Turtle();\n// 对编译器来说没问题，但对运行时来说不行。turti 是 Turtle 类型，而不是 Fish 类型。\n// fred\
  \ 只能引用 Fish 类型，不能引用 Turtle 类型\nfred = (Fish) turti;\n```\n\n清单 21-23 展示了简短但完整的代码，让你可以测试\
  \ `Fish` 类和 `Swimmable` 接口。\n\n```\n// FishTest.java\npackage com.jdojo.interfaces;\n\
  public class FishTest {\npublic static void main(String[] args) {\nSwimmable finny\
