  \ 20, 30]]  \n```  \n\n20. 继承  \n\n在本章中，你将学习：  \n\n*   什么是继承  \n\n*   如何从一个类继承另一个类\
  \  \n\n*   早期绑定和晚期绑定之间的区别  \n\n*   什么是方法重写以及如何重写方法  \n\n*   什么是字段隐藏和方法隐藏以及如何使用它们\
  \  \n\n*   什么是抽象类以及在哪里使用它们  \n\n*   如何声明 `final` 类和方法  \n\n*   “is-a”、“has-a”和“part-of”关系之间的区别\
  \  \n\n本章中的所有示例程序都是 `jdojo.inheritance` 模块的成员，如清单 20-1 所示。  \n\n```  \n// module-info.java\
  \  \nmodule jdojo.inheritance {  \nexports com.jdojo.inheritance;  \n}  \n清单 20-1.\
  \  \njdojo.inheritance 模块的声明  \n```  \n\n什么是继承？\n\n\n有时您可能需要在应用程序的多个位置实现相同的功能。编写代码实现这一目标有多种方式。一种方法是在所有需要相同功能的地方复制相同的代码。如果遵循这种逻辑，当功能发生变化时，您需要在所有地方进行修改。考虑一个需要在三个不同位置实现相同功能的示例。假设您有一个处理三类对象的应用程序：行星、员工和经理。进一步假设这三类对象都有一个名称。您创建了三个类：`Planet`、`Employee`\
  \ 和 `Manager` 来表示这三类对象。每个类都有一个名为 `name` 的实例变量，以及两个名为 `getName()` 和 `setName()` 的方法。如果您思考这三个类中用于维护其对象名称的代码，您会发现它们是相同的。您可能为一个类编写了代码，然后将其复制到了另外两个类中。当相同的代码被复制到多个位置时，您可能会意识到维护此类代码的问题。如果以后需要以不同方式处理名称，您将需要在三个地方进行修改。继承是面向对象编程的一个特性，它有助于在这种情况下避免在多个位置复制相同的代码，从而促进代码复用。继承还允许您在不更改现有代码的情况下自定义代码。继承提供的远不止代码复用和自定义。\n\
  \n继承是面向对象编程语言的基石之一。它允许您通过复用现有类的代码来创建一个新类。新类称为子类，现有类称为超类。超类包含由子类复用和自定义的代码。可以说子类继承自超类。超类也称为基类或父类。子类也称为派生类或子类。从技术上讲，可以从任何现有类继承一个类。然而，在实践中，这样做并不总是一个好主意。软件开发中的继承与普通人类生活中的继承工作方式非常相似。您从父母那里继承了一些东西；您的父母从他们的父母那里继承了一些东西，依此类推。如果您观察人类生活中的继承，会发现人类之间存在一种关系才能使继承发生。类似地，超类和子类的对象之间也存在一种关系。为了使继承有效，超类和子类之间必须存在的关系称为“is-a”关系。在您决定让类\
  \ `Q` 继承自类 `P` 之前，需要问自己一个简单的问题：“类 `Q` 的对象是否也是类 `P` 的对象？”换句话说，“类 `Q` 的对象是否表现得像类 `P`\
  \ 的对象？”如果答案是肯定的，那么类 `Q` 可以继承自类 `P`。考虑三个类 `Planet`、`Employee` 和 `Manager`。让我们逐一使用这三个类来问同样的问题。\n\
  \n*   行星是员工吗？也就是说，行星和员工之间存在“is-a”关系吗？答案是否定的。员工是行星吗？答案是否定的。\n\n*   行星是经理吗？答案是否定的。经理是行星吗？答案是否定的。\n\
  \n*   员工是经理吗？答案可能是。员工可能是经理、职员、程序员或任何其他类型的员工。然而，员工不一定总是经理。经理是员工吗？答案是肯定的。\n\n您使用这三个类问了六个问题。只有一个案例得到了“是”的答案。这是唯一适合使用继承的情况。`Manager`\
  \ 类应该继承自 `Employee` 类。\n\n继承类\n\n一个类如何继承另一个类？让一个类继承另一个类非常简单。您需要在子类的类声明中使用关键字 `extends`，后跟超类名称。一般语法如下：\n\
  \n```\n[修饰符] class <子类名> extends <超类名> {\n// 子类的代码写在这里\n}\n```\n\n例如，以下代码声明了一个类\
  \ `Q`，它继承自类 `P`，假设类 `P` 已经存在：\n\n```\npublic class Q extends P {\n// 类 Q 的代码写在这里\n\
  }\n```\n\n您可以在类声明中使用超类的简单名称或完全限定名称。如果子类和超类不在同一个包中，您可能需要导入超类名称才能在 `extends` 子句中使用其简单名称。假设类\
  \ `P` 和 `Q` 的完全限定名称分别是 `pkg1.P` 和 `pkg2.Q`。之前的声明可以重写为以下两种方式之一：使用超类的简单名称或使用超类的完全限定名称。\n\
  \n```\n// #1 – 在 extends 子句中使用 P 的简单名称，并使用 import 语句。\npackage pkg2;\nimport pkg1.P;\n\
  public class Q extends P {\n// 类 Q 的代码写在这里\n}\n// #2 – 使用 P 的完全限定名称。无需使用 import\
  \ 语句。\npackage pkg2;\npublic class Q extends pkg1.P {\n// 类 Q 的代码写在这里\n}\n```\n\n\
  让我们看看 Java 中最简单的继承示例。我们从 `Employee` 类开始，如清单 20-2 所示。\n\n```\n// Employee.java\n\
  package com.jdojo.inheritance;\npublic class Employee {\nprivate String name = \"\
  Unknown\";\npublic void setName(String name) {\nthis.name = name;\n}\npublic String\
  \ getName() {\nreturn name;\n}\n}\n清单 20-2.\n一个 Employee 类\n```\n\n`Employee` 是一个简单的类，包含一个私有实例变量\
  \ `name` 和两个公有方法 `setName()` 和 `getName()`。实例变量用于存储员工的姓名，这两个方法用于获取和设置 name 实例变量。请注意，`Employee`\
  \ 类中没有特殊的代码。它是您可以在 Java 中编写的最简单的类之一。编写和理解以下使用 `Employee` 类的代码片段很容易：\n\n```\nEmployee\
  \ emp = new Employee();\nemp.setName(\"John Jacobs\");\nString empName = emp.getName();\n\
  System.out.println(\"Employee Name: \" + empName);\nEmployee Name: John Jacobs\n\
  ```\n\n清单 20-3 包含了 `Manager` 类的代码，它继承自 `Employee` 类。请注意使用关键字 extends 来指示 `Employee`\
  \ 类是超类，`Manager` 类是子类。`Manager` 类除了其声明之外，不包含任何代码。这就是目前 `Manager` 类所需的全部内容。\n\n```\n\
  // Manager.java\npackage com.jdojo.inheritance;\npublic class Manager extends Employee\
  \ {\n// 目前不需要代码\n}\n清单 20-3.\n一个 Manager 类\n```\n\n让我们测试一下 `Manager` 类。清单 20-4 包含了测试程序。\n\
  \n```\n// SimplestInheritanceTest.java\npackage com.jdojo.inheritance;\npublic class\
  \ SimplestInheritanceTest {\npublic static void main(String[] args) {\n// 创建一个 Manager\
  \ 类的对象\nManager mgr = new Manager();\n// 设置经理姓名\nmgr.setName(\"Leslie Zanders\"\
  );\n// 获取经理姓名\nString mgrName = mgr.getName();\n// 打印经理姓名\nSystem.out.println(\"\
  Manager Name: \" + mgrName);\n}\n}\nManager Name: Leslie Zanders\n清单 20-4.\n测试 Manager\
  \ 类\n```\n\n即使您没有为 `Manager` 类编写任何代码，它的工作方式也与 `Employee` 类相同，因为它继承自 `Employee` 类。您通过使用\
  \ `Manager` 类的构造函数来创建一个经理对象：\n\n```\nManager mgr = new Manager();\n```\n\n\n\n创建`Manager`对象后，代码看起来与你处理`Employee`对象时使用的代码类似。你对`Manager`对象使用了`setName()`和`getName()`方法。\n\
  \n```\nmgr.setName(\"Leslie Zanders\");\nString mgrName = mgr.getName();\n```\n\n\
  请注意，`Manager`类并未声明`setName()`和`getName()`方法，也未声明`name`实例变量。然而，这些成员似乎都已在`Manager`类中声明，因为它在声明中使用了`\"\
  extends Employee\"`子句。当一个类继承自另一个类时，它会继承其超类的成员（实例变量、方法等）。继承有许多规则。我将在本章后面逐一详细讨论这些规则。\n\
  \nObject 类是默认超类\n\n如果一个类在其类声明中没有使用关键字`extends`指定超类，那么它将继承自`java.lang.Object`类。例如，以下类`P`的两个声明是相同的：\n\
  \n```\n// #1 – 为类 P 隐式添加了 \"extends Object\"\npublic class P {\n// 类 P 的代码写在这里\n\
  }\n// #2 – 为类 P 显式添加了 \"extends Object\"\npublic class P extends Object {\n// 类\
  \ P 的代码写在这里\n}\n```\n\n在前面的章节中，你声明类时没有使用`extends`子句。它们隐式地继承自`Object`类。这就是为什么这些类的对象能够使用`Object`类的方法。考虑以下代码片段：\n\
  \n```\nEmployee emp = new Employee();\nint hc = emp.hashCode();\nString str = emp.toString();\n\
  ```\n\n`Employee`类没有使用 extends 子句指定其超类。这意味着它继承自`Object`类。`Object`类声明了`hashCode()`和`toString()`方法。由于`Employee`类是`Object`类的隐式子类，它可以像使用自己声明的方法一样使用这些方法。从你编写第一个\
  \ Java 程序开始，你就在使用继承，尽管你当时并未意识到这一点。本节展示了继承作为代码复用的强大功能。你将在本章后面看到继承的其他好处。\n\n继承与层次关系\n\
  \n我在上一节中提到，只有当子类和超类之间存在“is-a”（是一种）关系时，才应使用继承。一个子类可以有自己的子类，这些子类又可以有自己的子类，依此类推。继承链中的所有类形成一个树状结构，这被称为继承层次结构或类层次结构。在继承层次结构中，位于某个类上方的所有类被称为该类的祖先。位于某个类下方的所有类被称为该类的后代。\n\
  \nJava 允许一个类进行单继承。也就是说，一个类只能有一个超类（或父类）。然而，一个类可以是多个类的超类。除了`Object`类之外，Java 中的所有类都有一个超类。`Object`类位于所有继承层次结构的顶端。图\
  \ 20-1 使用 UML（统一建模语言）图展示了`Employee`类及其后代的示例继承层次结构。在 UML 图中，超类和子类之间用一条从子类指向超类的箭头连接。\n\
  \n![A323069_2_En_20_Fig1_HTML.jpg](img/A323069_2_En_20_Fig1_HTML.jpg)\n\n图 20-1.\n\
  \n一个示例继承类层次结构\n\n有时，术语“直接超类”用于指代在继承层次结构中高一级的祖先类，而术语“超类”则用于指代任何级别的祖先类。本书使用术语“超类”来指代在继承层次结构中高一级的类的祖先。例如，`Programmer`是`SystemProgrammer`的超类，而`Employee`和`Object`是`SystemProgrammer`的祖先。有时，术语“直接子类”用于指代在继承层次结构中低一级的后代类，而术语“子类”则用于指代任何级别的后代类。本书使用术语“子类”来指代在继承层次结构中低一级的类的后代。例如，`Employee`是`Object`的子类，而`Clerk`、`Programmer`和`Manager`是`Employee`的子类。`Clerk`、`Programmer`、`ApplicationProgrammer`、`SystemProgrammer`、`DatabaseProgrammer`、`Manager`、`FullTimeManager`和`PartTimeManager`都是`Employee`的后代。如果一个类是另一个类的后代，那么它也是该类祖先的后代。例如，`Employee`类的所有后代也都是`Object`类的后代。`Manager`类的所有后代也都是`Employee`类和`Object`类的后代。\n\
  \n子类继承了什么？\n\n子类并非继承其超类的一切。然而，子类可以直接或间接地使用其超类的一切。让我们讨论一下“子类从其超类继承某些东西”和“子类从其超类使用某些东西”之间的区别。\n\
  \n让我们举一个现实世界的例子。假设你的父母（超类）在银行账户里有钱。这笔钱属于你的父母。你（子类）需要一些钱。如果你继承了这笔钱，你就可以随意使用这笔钱，就好像这笔钱是你的一样。如果你只能使用这笔钱，你就不能直接拿到父母的钱。相反，你需要向父母要钱，他们会给你。在这两种情况下，你都使用了父母的钱。在继承的情况下，这笔钱似乎归你所有。也就是说，你可以直接访问它。在第二种情况下，父母的钱可供你使用，但你无法直接访问它。在后一种情况下，你必须通过你的父母才能使用他们的钱。\n\
  \n子类继承其超类的非私有成员。我稍后将详细讨论这条规则。请注意，构造器和初始化器（静态和实例）不是类的成员，因此它们不会被继承。类的成员包括在类体内声明的所有成员以及它从超类继承的成员。这个类成员的定义具有向下传递的效果。\n\
  \n假设有三个类：`A`、`B`和`C`。类`A`继承自`Object`类。类`B`继承自类`A`，类`C`继承自类`B`。假设类`A`声明了一个私有成员`m1`和一个非私有成员`m2`。类`A`的成员是`m1`、`m2`以及所有从`Object`类继承的成员。请注意，类`A`的成员`m1`和`m2`是声明的成员，而其他成员是继承的成员。类`B`的成员将是在类`B`中声明的任何成员以及类`A`的所有非私有成员。成员`m1`在类`A`中被声明为私有，因此它不会被类`B`继承。同样的逻辑适用于类`C`的成员。`Object`类的非私有成员通过继承层次结构向下传递到类`A`、`B`和`C`。类`A`的非私有成员通过继承层次结构向下传递到类`B`，进而再向下传递到类`C`。\n\
  \n提示\n\n\n\n超类及其子类可能位于不同的模块中。仅当子类被声明为 `public` 且模块 `Q` 将包含超类的包导出到至少模块 `P` 时，模块 `P`\
  \ 中的子类才能继承模块 `Q` 中的超类。有关跨模块边界访问类的更多信息，请参阅第 10 章。\n\n共有四种访问修饰符：`private`、`public`、`protected`\
  \ 以及包级访问。没有 `private`、`public` 和 `protected` 访问修饰符时，被视为默认访问或包级访问。类成员的访问级别修饰符决定了两件事：\n\
  \n*   谁可以直接访问（或使用）该类成员\n*   子类是否继承该类成员\n\n访问修饰符也用于类的非成员（例如构造方法）。在这种情况下，访问修饰符只有一个作用：“谁可以访问该非成员？”\n\
  \n如果类成员被声明为 `private`，则它只能在声明它的类内部被访问。`private` 类成员不会被该类的子类继承。\n\n`public` 类成员可以从任何地方访问，前提是类本身是可访问的。子类继承其超类的所有\
  \ `public` 成员。\n\n如果类成员被声明为 `protected`，则它可以在声明它的包中被访问。受保护的类成员在子类的主体内始终是可访问的，无论子类与超类是在同一个包中还是不同的包中。受保护的类成员会被子类继承。当你希望子类访问并继承该类成员时，可以对类成员使用\
  \ `protected` 访问修饰符。请注意，受保护的类成员既可以通过声明它的包访问，也可以通过子类访问。如果你只想从包内部提供对类成员的访问，则应使用包级访问修饰符，而不是\
  \ `protected` 访问修饰符。\n\n如果类成员被声明为包级访问，则它只能在声明该类的包内部被访问。仅当超类和子类位于同一个包中时，包级类成员才会被继承。如果超类和子类位于不同的包中，则子类不会从其超类继承包级成员。\n\
  \n提示\n\n访问修饰符是层层递进的，从对外部世界没有访问权限（`private`）开始，然后逐步增加：首先是包（默认），然后是子类（`protected`），最后是整个外部世界（`public`）。\n\
  \n让我们看看你在清单 20-2 和清单 20-3 中的继承示例。`Employee` 类有三个成员：一个 `name` 字段、一个 `getName()` 方法以及一个\
  \ `setName()` 方法。`name` 字段被声明为 `private`，因此它在 `Manager` 类内部不可访问，因为它没有被继承。`getName()`\
  \ 和 `setName()` 方法被声明为 `public`，它们可以从任何地方访问，包括 `Manager` 类。它们被 `Manager` 类从 `Employee`\
  \ 类继承，不过由于它们是 `public` 的，它们是否被继承其实无关紧要。\n\n向上转型与向下转型\n\n现实世界中的“是一个”关系在软件中转化为继承类层次结构。在\
  \ Java 中，类是一种类型。当你使用继承来表达“是一个”关系时，你创建了一个子类，它是超类的一种更具体的类型。例如，`Manager` 是 `Employee`\
  \ 的一种具体类型。`Employee` 是 `Object` 的一种具体类型。当你在继承层次结构中向上移动时，你从一种具体类型移动到一种更通用的类型。继承如何影响客户端代码？在此上下文中，客户端代码是任何使用类层次结构中类的代码。继承保证了类中存在的任何行为也将在其子类中存在。类中的方法代表了该类对象的行为。这意味着客户端代码期望在类中存在的任何行为也将在该类的子类中存在。这引出了一个结论：如果客户端代码适用于某个类，那么它也适用于该类的子类，因为子类至少保证了与其超类相同的行为。例如，`Manager`\
  \ 类至少提供了与其超类 `Employee` 相同的行为。考虑以下代码片段：\n\n```\nEmployee emp;\nemp = new Employee();\n\
  emp.setName(\"Richard Castillo\");\nString name = emp.getName();\n```\n\n这段代码片段编译时没有任何错误。当编译器遇到\
  \ `emp.setName(\"Richard Castillo\")` 和 `emp.getName()` 调用时，它会检查 `emp` 变量的声明类型。它发现\
  \ `emp` 变量的声明类型是 `Employee`。它确保 `Employee` 类具有符合调用要求的 `setName()` 和 `getName()`\
  \ 方法。它发现 `Employee` 类确实有一个接受 `String` 参数的 `setName()` 方法。它发现 `Employee` 类确实有一个不接受参数并返回\
  \ `String` 的 `getName()` 方法。验证了这两个事实后，编译器对 `emp.setName()` 和 `emp.getName()` 方法调用没有异议。\n\
  \n牢记子类至少保证与其超类相同的行为（方法）这一点，考虑以下代码片段：\n\n```\nEmployee emp;\nemp = new Manager();\
  \ // 将 Manager 对象赋值给 Employee 变量\nemp.setName(\"Richard Castillo\");\nString name\
  \ = emp.getName();\n```\n\n即使你这次更改了代码，将 `emp` 变量赋值为 `Manager` 类的对象，编译器也会编译这段代码片段。它将基于与前一种情况相同的基础通过\
  \ `setName()` 和 `getName()` 方法调用。它也会通过赋值语句：\n\n```\nemp = new Manager();\n```\n\n\
  `new Manager()` 表达式的编译时类型是 `Manager` 类型。`emp` 变量的编译时类型（或声明类型）是 `Employee` 类型。由于\
  \ `Manager` 类继承自 `Employee` 类，因此 `Manager` 类的对象“是一个”`Employee` 类的对象。简单来说，你可以说经理始终是一名员工。这种赋值（从子类到超类）称为向上转型，在\
  \ Java 中始终是允许的。它也被称为拓宽转换，因为 `Manager` 类（更具体的类型）的对象被赋值给 `Employee` 类型（更通用的类型）的引用变量。以下所有赋值都是允许的，并且都是向上转型的示例：\n\
  \n```\nObject obj;\nEmployee emp;\nManager mgr;\nPartTimeManager ptm;\n// 员工始终是一个对象\n\
  obj = emp;\n// 经理始终是一名员工\nemp = mgr;\n// 兼职经理始终是一名经理\nmgr = ptm;\n// 兼职经理始终是一名员工\n\
  emp = ptm;\n// 兼职经理始终是一个对象\nobj = ptm;\n```\n\n\n\n使用一个简单的规则来判断赋值是否为向上转型。查看赋值运算符右侧表达式的编译时类型（声明类型）（例如，`a\
  \ = b` 中的 `b`）。如果右侧操作数的编译时类型是左侧操作数编译时类型的子类，那么这就是向上转型，该赋值是安全且允许的。向上转型直接体现了子类对象“是一个”超类对象这一事实。\n\
  \n提示\n\n继承结合向上转型和后期绑定是 Java 中包含多态的基础。有关包含多态的更多信息，请参阅第 1 章。\n\n向上转型是继承中一个非常强大的特性。它允许你编写多态代码，这些代码既能与现有类一起工作，也能与将来添加的类一起工作。它允许你根据超类来编写应用程序逻辑，该超类将始终适用于所有子类（现有的子类或将来要添加的子类）。它允许你编写通用代码，而无需担心代码在运行时将使用的特定类型（类）。清单\
  \ 20-5 是一个简单的工具类，用于测试你的向上转型规则。它有一个 `printName()` 静态方法，该方法接受一个 `Employee` 类型的参数。该方法使用\
  \ `Employee` 类的 `getName()` 方法来获取员工对象的姓名，并将姓名打印到标准输出。\n\n```\n// EmpUtil.java\n\
  package com.jdojo.inheritance;\npublic class EmpUtil {\npublic static void printName(Employee\
  \ emp){\n// 获取员工姓名\nString name = emp.getName();\n// 打印员工姓名\nSystem.out.println(name);\n\
  }\n}\n清单 20-5.\n一个在其 printName() 方法中使用 Employee 类型参数的工具类\n```\n\n清单 20-6 包含一个使用\
  \ `EmpUtil` 类测试向上转型规则的程序。\n\n```\n// UpcastTest.java\npackage com.jdojo.inheritance;\n\
  public class UpcastTest {\npublic static void main(String[] args) {\nEmployee emp\
  \ = new Employee();\nemp.setName(\"Ken Wood\");\nManager mgr = new Manager();\n\
  mgr.setName(\"Ken Furr\"); // setName() 的继承在此起作用\n// 打印姓名\nEmpUtil.printName(emp);\n\
  EmpUtil.printName(mgr); // 向上转型在此起作用\n}\n}\nKen Wood\nKen Furr\n清单 20-6.\n一个用于测试向上转型规则的测试类\n\
  ```\n\n`main()` 方法创建了两个对象（`emp` 和 `mgr`）：一个是 `Employee` 类的实例，一个是 `Manager` 类的实例。它为两个对象设置了姓名。最后，它调用\
  \ `EmpUtil` 类的 `printName()` 方法来打印两个对象的姓名。第一次调用 `EmpUtil.printName(emp)` 没有问题，因为\
  \ `printName()` 方法接受一个 `Employee` 对象，而你传递了一个 `Employee` 对象（`emp`）。第二次调用 `EmpUtil.printName(mgr)`\
  \ 由于向上转型规则也是合法的。`printName(Employee emp)` 接受一个 `Employee` 对象，而你能够传递一个 `Manager`\
  \ 对象（`mgr`）来代替，因为经理始终是员工，并且向上转型规则允许将子类对象赋值给超类类型的变量。\n\n将超类引用赋值给子类变量称为向下转型（或窄化转换）。向下转型与向上转型相反。在向上转型中，赋值沿着类层次结构向上移动，而在向下转型中，赋值沿着类层次结构向下移动。Java\
  \ 编译器无法在编译时确保向下转型是合法的。考虑以下代码片段：\n\n```\nEmployee emp;\nManager mgr = new Manager();\n\
  emp = mgr; // 正确。向上转型\nmgr = emp; // 编译时错误。向下转型\n```\n\n赋值 `emp = mgr` 由于向上转型是允许的。然而，赋值\
  \ `mgr = emp` 是不允许的，因为这是向下转型的情况，即超类（`Employee`）的变量被赋值给子类（`Manager`）的变量。编译器假设每个经理都是员工（向上转型）是正确的。然而，并非每个员工都是经理（向下转型）。在前面的代码片段中，你可能希望向下转型能够工作，因为你确定\
  \ `emp` 变量持有对 `Manager` 的引用。为了让你的向下转型在编译时成功，Java 施加了额外的规则。你需要向编译器提供额外的保证，即你已经考虑了将超类引用赋值给子类引用变量，并且你希望编译器通过它。你通过向赋值添加一个类型转换（或简称为强制转换）来提供这种保证，如下所示：\n\
  \n```\nmgr = (Manager) emp; // 使用类型转换正确。向下转型在此起作用\n```\n\n这种带有类型转换的向下转型在编译时成功。然而，Java\
  \ 运行时将执行额外的验证。编译器的工作只是确保 `mgr` 变量的声明类型（即 `Manager`）与所使用的类型转换（即 `Manager`）赋值兼容。编译器无法检查\
  \ `emp` 变量在运行时实际引用的对象类型。Java 运行时验证前一条语句中类型转换 `(Manager) emp` 的正确性。\n\n`emp` 变量在运行时引用的对象类型也称为其运行时类型。运行时比较\
  \ `emp` 变量的运行时类型和 `Manager` 类型（类型转换中使用的 `Manager` 类型）。如果 `emp` 变量的运行时类型与类型转换中使用的类型赋值兼容，则类型转换在运行时成功。否则，运行时抛出\
  \ `java.lang.ClassCastException`。\n\n考虑以下代码片段，假设你有一个 `Manager` 类的子类，名为 `PartTimeManager`。\n\
  \n```\nEmployee emp;\nManager mgr = new Manager();\nPartTimeManager ptm = new PartTimeManager();\n\
  emp = mgr;                   // 向上转型。正确\nptm = (PartTimeManager) emp; // 向下转型。编译时正确。运行时错误。\n\
  ```\n\n最后一条使用向下转型的赋值在编译时成功，因为 `ptm` 变量的声明类型和类型转换类型相同。`emp` 的运行时类型是 `Manager`，因为\
  \ `emp = mgr` 语句将一个 `Manager` 对象的引用赋给了它。当运行时尝试执行向下转型的 `\"(PartTimeManager) emp\"\
  ` 部分时，它发现 `emp` 的运行时类型（即 `Manager`）与类型转换类型（即 `PartTimeManager`）不赋值兼容。这就是运行时将抛出 `ClassCastException`\
  \ 的原因。\n\n你可以将涉及向下转型的语句视为有两个部分用于验证目的。假设语句是 `a2 = (K) b2`。编译器的工作是验证 `a2` 的声明类型与类型\
  \ `K` 赋值兼容。运行时的工作是验证 `b2` 的运行时类型与类型 `K` 赋值兼容。如果两个检查中的任何一个失败，你将根据哪个检查失败而在编译时或运行时收到错误。图\
  \ 20-2 描述了这种情况。\n\n![A323069_2_En_20_Fig2_HTML.gif](img/A323069_2_En_20_Fig2_HTML.gif)\n\
  \n图 20-2.\n\n向下转型的运行时和编译时检查\n\n提示\n\n`Object` 类位于 Java 中每个类层次结构的顶部。这允许你将任何类类型的引用赋值给\
  \ `Object` 类型的变量。以下类型的赋值始终允许：\n\n`Object obj = new AnyJavaClass(); // 向上转型`\n\n\
  从 `Object` 类型向下转型到另一个类类型是否成功取决于向下转型规则，如本节所述。\n\ninstanceof 运算符\n\n\n\n如何确保向下转型在运行时总能成功？\n\
  Java 提供了 `instanceof` 运算符，\n它可以帮助你判断一个引用变量在运行时是否引用了某个类或其子类的对象。该运算符接受\n两个操作数，并返回一个\
  \ `boolean` 值 `true` 或 `false`。其语法\n如下：\n\n```\ninstanceof \n```\n\n如果 `<reference-variable>`\n\
  引用了 `<type-name>` 类型或其任何子类型的对象，则 `instanceof` 返回\n`true`。\n否则，返回 `false`。如果 `<reference-variable>`\n\
  为 `null`，则 `instanceof` 始终\n返回 `false`。\n\n在进行向下转型之前，你应该使用 `instanceof` 运算符\n来检查你试图向下转型的引用变量是否是你期望的类型。例如，如果你想\n\
  检查一个 `Employee` 类型的变量在运行时是否引用了一个\n`Manager` 对象，你可以编写如下代码：\n\n```\nManager mgr =\
  \ new Manager();\nEmployee emp = mgr;\nif (emp instanceof Manager) {\n// 以下向下转型将始终成功\n\
  mgr = (Manager) emp;\n} else {\n// emp 不是 Manager 类型\n}\n```\n\n`instanceof`\n运算符会进行两种类型的检查：编译时检查和\n\
  运行时检查。编译器会检查左侧操作数是否有可能\n引用右侧操作数类型的对象。目前你可能还不太清楚这个检查的用意。使用\n `instanceof` 运算符\n的目的是将引用变量的运行时类型与某个类型进行比较。简而言之，它比较的是两种类型。将芒果与员工进行比较有意义吗？你会说没有。编译器会使用\
  \ `instanceof` 运算符对这种不合逻辑的比较进行额外检查。\n它确保 `instanceof` 运算符的左侧操作数\n有可能持有右侧操作数类型对象的引用。如果\n\
  不可能，编译器会生成一个错误。判断使用 `instanceof` 运算符\n是否会导致编译器报错很容易。考虑以下代码片段：\n\n```\nManager mgr\
  \ = null;\nif (mgr instanceof Clerk) { //  编译时错误\n}\n```\n\n变量 `mgr` 可以持有\n`Manager`\
  \ 类型或其子类型的引用。\n然而，它永远不可能持有 `Clerk` 类型的引用。`Clerk` 类型与 `Manager` 类\n不在同一个继承链中，尽管它们位于同一个继承树中。出于同样的原因，以下对\
  \ `instanceof` 运算符的使用将产生编译时错误，因为 `String` 类\n不在 `Employee` 类的继承链中。\n\n```\nString\
  \ str = \"test\";\nif (str instanceof Employee) { // 编译时错误\n}\n```\n\n提示\n\n如果一个对象是某个类的类型，或者是该类的直接或间接子类型，则该对象被视为该类的一个实例。你可以使用\n\
  `instanceof` 运算符来检查一个对象是否是某个类的实例。\n\n有时，你可能会编写出在同一个地方使用 `instanceof` 运算符\n测试多个条件的代码，如下所示：\n\
  \n```\nEmployee emp;\n// 此处包含一些逻辑...\nif (emp instanceof Employee) {\n// 处理员工的代码\n\
  } else if (emp instanceof Manager) {\n// 处理经理的代码\n} else if (emp instanceof Clerk)\
  \ {\n// 处理职员的代码\n}\n```\n\n你应该避免编写这类代码。如果你添加了一个 `Employee` 的新子类，\n你将需要为此代码添加针对新子类的逻辑。通常，\n\
  这类代码表明存在设计缺陷。请始终问自己一个问题：“当我向现有类层次结构中添加一个新类时，这段代码还能正常工作吗？”如果答案是肯定的，那就没问题。\n否则，请重新考虑设计。\n\
  \n`equals()`\n方法是你经常需要使用 `instanceof` 运算符的地方。\n它定义在 `Object` 类中，并且所有类都继承了该方法。它接受一个\
  \ `Object` 作为\n参数。如果参数和调用此方法的对象被认为相等，则返回 `true`。\n否则，返回 `false`。每个类的对象\n可能以不同的方式比较相等性。例如，如果两个员工在同一家公司、同一个部门工作并且拥有相同的员工\
  \ ID，则他们可能被视为相等。如果将一个\n`Manager` 对象传递给\n`Employee` 类的 `equals()` 方法，会发生什么？\n由于经理也是员工，因此它应该比较两者是否相等。清单\
  \ 20-7 包含了\n`Employee` 类 `equals()` 方法的一个可能实现。\n\n```\n// Employee.java\npackage\
  \ com.jdojo.inheritance;\npublic class Employee {\nprivate String name = \"Unknown\"\
  ;\npublic void setName(String name) {\nthis.name = name;\n}\npublic String getName()\
  \ {\nreturn name;\n}\npublic boolean equals(Object obj) {\nboolean isEqual = false;\n\
  // 我们比较 Employee 类的对象与\n// Employee 类或其子类的对象\nif (obj instanceof Employee) {\n//\
  \ 如果两者名称相同，则认为它们相等。\nEmployee e = (Employee) obj;\nString n = e.getName();\nisEqual\
  \ = n.equals(this.name);\n}\nreturn isEqual;\n}\n}\n清单 20-7.\n为 Employee 类实现 equals()\
  \ 方法\n```\n\n在将 `equals()` 方法 添加到 `Employee` 类之后，你可以编写如下代码，该代码根据名称比较两个 `Employee`\
  \ 类型对象的相等性：\n\n```\nEmployee emp = new Employee();\nemp.setName(\"John Jacobs\"\
  );\nManager mgr = new Manager();\nmgr.setName(\"John Jacobs\");\nSystem.out.println(mgr.equals(emp));\
  \           // 输出 true\nSystem.out.println(emp.equals(mgr));           // 输出 true\n\
  System.out.println(emp.equals(\"John Jacobs\")); // 输出 false\n```\n\n在第三个比较中，你将一个\
  \ `Employee` 对象与一个\n`String` 对象进行比较，返回了 `false`。比较一个\n`Employee` 和一个 `Manager` 对象\n\
  返回了 `true`，因为它们通过子类化相关联并且具有相同的名称。\n\n绑定\n\n类拥有方法和字段；我们编写代码来访问它们，如下所示。假设 `myMethod()`\
  \ 和 `xyz` 是\n`MyClass` 类的成员，而 `MyClass` 是 `myObject` 引用变量 的声明类型。\n\n```\nMyClass\
  \ myobject = 获取一个对象引用;\nmyObject.myMethod();   // 调用哪个 myMethod()？\nint a = myObject.xyz;\
  \  // 访问哪个 xyz？\n```\n\n绑定是识别被访问方法的代码（本例中为 `myMethod()`）或字段（本例中为 `xyz`）的过程，这些代码将在代码执行时被使用。换句话说，绑定是一个做出决策的过程，决定在代码执行时将访问哪个方法的代码或字段。绑定可以在两个阶段发生：编译时和运行时。当绑定发生在编译时，称为早期绑定。早期绑定也称为静态绑定或编译时绑定。当绑定发生在运行时，称为后期绑定。后期绑定也称为动态绑定或运行时绑定。\n\
  \n早期绑定\n\n与后期绑定相比，早期绑定更容易理解。在早期绑定中，关于将访问哪个方法代码和哪个字段的决策由编译器在编译时做出。对于方法调用，编译器决定在包含该方法调用的代码执行时，将执行哪个类的哪个方法。对于字段访问，编译器决定在包含该字段访问的代码执行时，将访问哪个类的哪个字段。早期绑定用于以下类型的类方法和字段：\n\
  \n*   所有类型的字段：静态和非静态\n*   静态方法\n*   非静态 final 方法\n\n\n\n在早期绑定中，方法或字段的访问取决于访问该成员时所用变量（或表达式）的**声明类型**（即编译时类型）。例如，如果对\
  \ `a2.m1()` 方法调用使用了早期绑定，且 `a2` 被声明为 `A` 类型，那么执行 `a2.m1()` 时，将调用类 `A` 中的 `m1()` 方法。\n\
  \n让我们看一个详细示例来演示早期绑定的规则。考虑清单 20-8 和 20-9 中所示的两个类。\n\n```\n// EarlyBindingSuper.java\n\
  package com.jdojo.inheritance;\npublic class EarlyBindingSuper {\n// 一个实例变量\npublic\
  \ String str = \"EarlyBindingSuper\";\n// 一个静态变量\npublic static int count = 100;\n\
  public static void print() {\nSystem.out.println(\"Inside EarlyBindingSuper.print()\"\
  );\n}\n}\n清单 20-8.\n一个包含静态字段、实例字段和静态方法的 EarlyBindingSuper 类\n```\n\n```\n// EarlyBindingSub.java\n\
  package com.jdojo.inheritance;\npublic class EarlyBindingSub extends EarlyBindingSuper{\n\
  // 一个实例变量\npublic String str = \"EarlyBindingSub\";\n// 一个静态变量\npublic static int\
  \ count = 200;\npublic static void print() {\nSystem.out.println(\"Inside EarlyBindingSub.print()\"\
  );\n}\n}\n清单 20-9.\n一个继承自 EarlyBindingSuper 类的 EarlyBindingSub 类，包含与其超类同类型的静态字段、实例字段和静态方法\n\
  ```\n\n`EarlyBindingSuper` 类声明了两个字段：`str` 和 `count`。`str` 字段声明为非静态，`count` 声明为 `static`。`print()`\
  \ 方法声明为 `static`。\n\n`EarlyBindingSub` 类继承自 `EarlyBindingSuper` 类，并声明了相同类型且同名的字段和方法。字段被设置为不同的值，方法在\
  \ `EarlyBindingSub` 类中打印不同的消息，这样你就能在执行代码时知道访问的是哪个成员。清单 20-10 中的 `EarlyBindingTest`\
  \ 类演示了早期绑定的结果。\n\n```\n// EarlyBindingTest.java\npackage com.jdojo.inheritance;\n\
  public class EarlyBindingTest {\npublic static void main(String[] args) {\nEarlyBindingSuper\
  \ ebSuper = new EarlyBindingSuper();\nEarlyBindingSub ebSub = new EarlyBindingSub();\n\
  // 将访问 EarlyBindingSuper.str\nSystem.out.println(ebSuper.str);\n// 将访问 EarlyBindingSuper.count\n\
  System.out.println(ebSuper.count);\n// 将访问 EarlyBindingSuper.print()\nebSuper.print();\n\
  System.out.println(\"------------------------------\");\n// 将访问 EarlyBindingSub.str\n\
  System.out.println(ebSub.str);\n// 将访问 EarlyBindingSub.count\nSystem.out.println(ebSub.count)\
  \ ;\n// 将访问 EarlyBindingSub.print()\nebSub.print();\nSystem.out.println(\"------------------------------\"\
  );\n// 将访问 EarlyBindingSuper.str\nSystem.out.println(((EarlyBindingSuper) ebSub).str);\n\
  // 将访问 EarlyBindingSuper.count\nSystem.out.println(((EarlyBindingSuper) ebSub).count);\n\
  // 将访问 EarlyBindingSuper.print()\n((EarlyBindingSuper) ebSub).print();\nSystem.out.println(\"\
  ------------------------------\");\n// 将 ebSub 赋值给 ebSuper\nebSuper = ebSub; //\
  \ 向上转型\n/* 现在使用 ebSuper 变量访问方法和字段，该变量引用的是一个 EarlyBindingSub 对象\n*/\n// 将访问 EarlyBindingSuper.str\n\
  System.out.println(ebSuper.str);\n// 将访问 EarlyBindingSuper.count\nSystem.out.println(ebSuper.count);\n\
  // 将访问 EarlyBindingSuper.print()\nebSuper.print();\nSystem.out.println(\"------------------------------\"\
  );\n}\n}\nEarlyBindingSuper\n\nInside EarlyBindingSuper.print()\n\nEarlyBindingSub\n\
  \nInside EarlyBindingSub.print()\n\nEarlyBindingSuper\n\nInside EarlyBindingSuper.print()\n\
  \nEarlyBindingSuper\n\nInside EarlyBindingSuper.print()\n\n清单 20-10.\n用于演示字段和方法早期绑定的测试类\n\
  ```\n\n`main()` 方法创建了 `EarlyBindingSuper` 和 `EarlyBindingSub` 类型的对象各一个：\n\n```\n\
  EarlyBindingSuper ebSuper = new EarlyBindingSuper();\nEarlyBindingSub ebSub = new\
  \ EarlyBindingSub();\n```\n\n根据早期绑定规则，语句 `ebSuper.str`、`ebSuper.count` 和 `ebSuper.print()`\
  \ 将始终访问 `EarlyBindingSuper` 类的 `str` 和 `count` 字段以及 `print()` 方法，因为你已将 `ebSuper`\
  \ 声明为 `EarlyBindingSuper` 类型。这个决定由编译器做出，因为 `str` 和 `count` 是字段，对于字段，Java 始终使用早期绑定。`print()`\
  \ 方法是一个 `static` 方法，Java 对于 `static` 方法始终使用早期绑定。当你使用 `ebSub` 变量访问这些成员时，同样适用此规则。\n\
  \n以下语句的输出可能不那么显而易见。\n\n```\n// 将访问 EarlyBindingSuper.str\nSystem.out.println(((EarlyBindingSuper)ebSub).str);\n\
  // 将访问 EarlyBindingSuper.count\nSystem.out.println(((EarlyBindingSuper)ebSub).count);\n\
  // 将访问 EarlyBindingSuper.print()\n((EarlyBindingSuper)ebSub).print();\n```\n\n这三个语句使用一个表达式来访问字段和方法。当你编写\
  \ `ebSub.str` 时，你是直接使用 `ebSub` 变量访问 `str` 字段。很明显，`ebSub` 变量的类型是 `EarlyBindingSub`，因此\
  \ `ebSub.str` 将访问 `EarlyBindingSub` 类的 `str` 字段。当你使用类型转换时，表达式的编译时类型会发生变化。例如，`ebSub`\
  \ 的编译时类型是 `EarlyBindingSub`。然而，表达式 `(EarlyBindingSuper) ebSub` 的编译时类型是 `EarlyBindingSuper`。这就是为什么前面三个语句都将访问\
  \ `EarlyBindingSuper` 类中的字段和方法，而不是 `EarlyBindingSub` 类中的，尽管它们都使用了 `ebSub` 变量（该变量是\
  \ `EarlyBindingSub` 类型）。清单 20-10 的输出验证了关于早期绑定规则的这一解释。\n\n提示\n\n你也可以使用类名来访问类的 `static`\
  \ 字段和方法，例如 `EarlyBindingSub.str`。早期绑定规则仍然适用，编译器会将对这些字段和方法的访问绑定到用于访问它们的类名所对应的类。为了可读性，应优先使用类名来访问类的静态成员。\n\
  \n**后期绑定**\n\n所有非静态、非 `final` 方法的绑定遵循后期绑定规则。也就是说，如果你的代码访问一个未声明为 `final` 的非静态方法，那么调用哪个版本的方法将在运行时决定。被调用的方法版本取决于进行方法调用的对象的运行时类型，而不是其编译时类型。考虑以下代码片段，它创建了一个\
  \ `Manager` 类的对象，并将引用赋值给一个 `Employee` 类的变量 `emp`。`emp` 变量访问了 `setName()` 方法。\n\n\
  ```\nEmployee emp = new Manager();\nemp.setName(\"John Jacobs\");\n```\n\n\n\n编译器仅对代码中的\
  \ `emp.setName()` 方法调用执行一项检查。它确保 `emp` 变量的声明类型（即 `Employee`）拥有一个名为 `setName(String\
  \ s)` 的方法。编译器检测到 `Employee` 类中的 `setName(String s)` 方法是一个实例方法，且不是 `final` 的。对于实例方法调用，编译器不执行绑定，而是将这项工作留给运行时处理。方法调用\
  \ `emp.setName(\"John Jacobs\")` 是**后期绑定**的一个示例。在运行时，JVM 决定应该调用哪个 `setName(String\
  \ s)` 方法。JVM 获取 `emp` 变量的运行时类型。当代码中执行到 `emp.setName(\"John Jacobs\")` 语句时，`emp`\
  \ 变量的运行时类型是 `Manager`。JVM 从 `emp` 变量的运行时类型（即 `Manager`）开始，向上遍历类层次结构，寻找 `setName(String\
  \ s)` 方法的定义。首先，它查看 `Manager` 类，发现 `Manager` 类没有声明 `setName(String s)` 方法。然后 JVM\
  \ 向上移动一级到类层次结构中的 `Employee` 类。它发现 `Employee` 类声明了 `setName(String s)` 方法。一旦 JVM\
  \ 找到匹配项，它就将调用绑定到该方法并停止搜索。回想一下，在 Java 中，`Object` 类始终位于所有类层次结构的顶部。JVM 会继续向上搜索方法定义，直到\
  \ `Object` 类。如果在 `Object` 类中仍未找到匹配项，则会抛出运行时异常。\n\n让我们看一个演示后期绑定过程的示例。清单 20-11 和 20-12\
  \ 分别包含了 `LateBindingSuper` 和 `LateBindingSub` 类的代码。`LateBindingSub` 类继承自 `LateBindingSuper`\
  \ 类。它定义了与 `LateBindingSuper` 类中相同的实例方法 `print()`。两个类中的 `print()` 方法打印不同的消息，以便您可以看到哪个方法被调用。\n\
  \n```\n// LateBindingSuper.java\npackage com.jdojo.inheritance;\npublic class LateBindingSuper\
  \ {\npublic void print() {\nSystem.out.println(\"Inside LateBindingSuper.print()\"\
  );\n}\n}\n清单 20-11.\n一个名为 LateBindingSuper 的类，它有一个名为 print() 的实例方法\n```\n\n```\n\
  // LateBindingSub.java\npackage com.jdojo.inheritance;\npublic class LateBindingSub\
  \ extends LateBindingSuper {\n@Override\npublic void print() {\nSystem.out.println(\"\
  Inside LateBindingSub.print()\");\n}\n}\n清单 20-12.\n一个名为 LateBindingSub 的类，它有一个名为\
  \ print() 的实例方法\n```\n\n清单 20-13 演示了后期绑定的结果。\n\n```\n// LateBindingTest.java\npackage\
  \ com.jdojo.inheritance;\npublic class LateBindingTest {\npublic static void main(String[]\
  \ args) {\nLateBindingSuper lbSuper = new LateBindingSuper();\nLateBindingSub lbSub\
  \ = new LateBindingSub();\n// 将访问 LateBindingSuper.print()\nlbSuper.print(); //\
  \ #1\n// 将访问 LateBindingSub.print()\nlbSub.print();   // #2\n// 将访问 LateBindingSub.print()\n\
  ((LateBindingSuper) lbSub).print(); // #3\n// 将 lbSub 赋值给 lbSuper\nlbSuper = lbSub;\
  \ // 向上转型\n// 将访问 LateBindingSub.print()，因为 lbSuper\n// 引用的是一个 LateBindingSub 对象\n\
  lbSuper.print(); // #4\n}\n}\nInside LateBindingSuper.print()\nInside LateBindingSub.print()\n\
  Inside LateBindingSub.print()\nInside LateBindingSub.print()\n清单 20-13.\n一个用于演示字段和方法早期绑定的测试类\n\
  ```\n\n`main()` 方法创建了 `LateBindingSuper` 和 `LateBindingSub` 类型各一个对象：\n\n```\nLateBindingSuper\
  \ lbSuper = new LateBindingSuper();\nLateBindingSub lbSub = new LateBindingSub();\n\
  ```\n\n对 `print()` 方法的调用被标记为 #1、#2、#3 和 #4，以便我们在讨论中引用它们。\n\n变量 `lbSuper` 和 `lbSub`\
  \ 都用于访问 `print()` 实例方法。运行时决定调用哪个版本的 `print()` 方法。当您使用 `lbSuper.print()` 时，调用哪个 `print()`\
  \ 方法取决于 `lbSuper` 变量在该时间点所引用的对象。回想一下，类类型的引用变量也可以引用其任何子类的对象。`lbSuper` 变量可以引用 `LateBindingSuper`\
  \ 或 `LateBindingSub` 的对象。\n\n当语句 #1 `lbSuper.print()` 准备执行时，运行时需要找到 `print()` 方法的代码。运行时查找\
  \ `lbSuper` 变量的运行时类型，发现 `lbSuper` 变量引用了一个 `LateBindingSuper` 类型的对象。它在 `LateBindingSuper`\
  \ 类中查找 `print()` 方法并找到了它。因此，运行时将标记为 #1 的语句中的 `print()` 方法调用绑定到 `LateBindingSuper`\
  \ 类的 `print()` 方法。输出中的第一行证实了这一点。\n\n语句 #2 中绑定 `print()` 方法的逻辑与标记为 #1 的语句相同，但这次类是\
  \ `LateBindingSub`。\n\n语句 #3 比较棘手。当您使用类型转换如 `(LateBindingSuper) lbSub` 时，`lbSub`\
  \ 在运行时引用的对象不会改变。使用类型转换，您只是说您想将 `lbSub` 变量引用的对象用作 `LateBindingSuper` 类型的对象。然而，对象本身从未改变。您可以通过以下代码验证这一点，该代码获取对象的类名：\n\
  \n```\n// s1 和 s2 都具有 \"com.jdojo.inheritance.LateBindingSub\" 类名\nLateBindingSub\
  \ lbSub = new LateBindingSub();\nString s1 = lbSub.getClass().getName();\nString\
  \ s2 = ((LateBindingSuper)lbSub).getClass().getName();\n```\n\n当语句 #3 准备执行时，此时带有类型转换的表达式仍然引用一个\
  \ `LateBindingSub` 类型的对象，因此，将调用 `LateBindingSub` 类的 `print()` 方法。输出中的第三行证实了这一点。\n\
  \n考虑讨论语句 #4 的两行代码：\n\n```\nlbSuper = lbSub; // 向上转型\nlbSuper.print(); // #4\n```\n\
  \n第一行源代码将 `lbSub` 赋值给 `lbSuper`。这行的效果是 `lbSuper` 变量开始引用一个 `LateBindingSub` 类型的对象。当语句\
  \ #4 准备执行时，运行时需要找到 `print()` 方法的代码。运行时发现 `lbSuper` 变量的运行时类型是 `LateBindingSub` 类。它在\
  \ `LateBindingSub` 类中查找 `print()` 方法并立即找到了它。因此，语句 #4 执行了 `LateBindingSub` 类中的 `print()`\
  \ 方法。输出中的第四行证实了这一点。\n\n提示\n\n与早期绑定相比，后期绑定会产生较小的性能开销，因为方法调用是在运行时解析的。然而，编程语言可以使用许多技术（例如虚方法表）来实现后期绑定，因此性能影响很小或可以忽略不计。后期绑定的好处远远超过了这点性能损失。它使您能够实现包含多态。当您编写像\
  \ `a2.print()` 这样的代码时，`a2` 变量在 `print()` 方法上表现出多态行为。相同的代码 `a2.print()`，可能会调用 `a2`\
  \ 变量所属类或其任何子类的 `print()` 方法，具体取决于 `a2` 在运行时引用的对象类型。继承和后期绑定使您能够编写多态代码，这种代码以超类类型编写，并且也适用于所有子类类型。\n\
  \n方法重写\n\n在类中重新定义从超类继承的实例方法称为**方法重写**。考虑类 `A` 和类 `B` 的以下声明：\n\n\n\n```\npublic class\
  \ A {\npublic void print() {\nSystem.out.println(\"A\");\n}\n}\npublic class B extends\
  \ A {\n@Override\npublic void print() {\nSystem.out.println(\"B\");\n}\n}\n```\n\
  \n类 `B` 是类 `A` 的子类。类 `B` 从其超类继承了 `print()` 方法并对其进行了重定义。可以说，类 `B` 中的 `print()` 方法覆盖了类\
  \ `A` 的 `print()` 方法。这就像类 `B` 对类 `A` 说：“感谢你作为我的超类，让我继承了你的 `print()` 方法。但是，我需要以不同的方式工作。我将以自己的方式重新定义它，而不会以任何方式影响你的\
  \ `print()` 方法。你可以继续使用你的 `print()` 方法。” 如果一个类覆盖了一个方法，它会影响该覆盖类及其子类。考虑以下类 `C` 的声明：\n\
  \n```\npublic class C extends B {\n// C 继承了 B.print()\n}\n```\n\n类 `C` 没有声明任何方法。类\
  \ `C` 继承了哪个方法：`A.print()` 还是 `B.print()`，或者两者都继承？它继承了类 `B` 的 `print()` 方法。一个类总是继承其直接超类（在超类中声明或由其超超类继承）中可用的内容。如果一个类\
  \ `D` 继承自类 `C`，它将通过类 `C` 继承类 `B` 的 `print()` 方法。\n\n```\npublic class D extends\
  \ C {\n// D 通过 C 继承了 B.print()\n}\n```\n\n再考虑两个类 `E` 和 `F`，它们分别继承自 `D` 和 `E`。类 `E`\
  \ 覆盖了它从类 `D` 继承的类 `B` 的 `print()` 方法。\n\n```\npublic class E extends D {\n@Override\n\
  public void print() {\nSystem.out.println(\"E\");\n}\n}\npublic class F extends\
  \ E {\n// F 通过 E 继承了 E.print()\n}\n```\n\n以下代码片段的输出是什么？\n\n```\nA a = new A();\n\
  a.print();     // 将打印 A\na = new B();\na.print();     // 将打印 B\na = new C();\na.print();\
  \     // 将打印 B\na = new D();\na.print();     // 将打印 B\na = new E();\na.print();\
  \     // 将打印 E\na = new F();\na.print();     // 将打印 E\n```\n\n代码中的注释告诉了你将打印什么。你能弄清楚为什么得到这个输出吗？这里有三个因素在起作用。首先，你可以将类\
  \ `A` 的后代对象赋值给类 `A` 类型的变量。这就是你在所有语句中调用 `a.print()` 的原因。其次，`print()` 方法已被类层次结构中类\
  \ `A` 的一些后代覆盖。第三，后期绑定发挥了魔力，根据变量在运行时引用的对象的类，调用适当的 `print()` 方法。考虑以下两个类 `S` 和 `T`\
  \ 的定义：\n\n```\npublic class S {\npublic void print() {\nSystem.out.println(\"S\"\
  );\n}\n}\npublic class T extends S {\npublic void print(String msg) {\nSystem.out.println(msg);\n\
  }\n}\n```\n\n类 `T` 中的 `print()` 方法是否覆盖了其超类 `S` 中的 `print()` 方法？答案是否定的。类 `T` 中的 `print()`\
  \ 方法并没有覆盖类 `S` 中的 `print()` 方法。这被称为方法重载。类 `T` 现在将有两个 `print()` 方法：一个继承自其超类 `S`，不带参数；另一个在自身中声明，带有一个\
  \ `String` 参数。然而，类 `T` 的两个方法都有相同的名称 `print`。这就是它被称为方法重载的原因，因为同一个方法名在同一个类中被使用了多次。\n\
  \n以下是判断一个类是否覆盖了其从超类继承的方法的规则。\n\n方法覆盖规则 #1\n\n该方法必须是一个实例方法。覆盖不适用于静态方法。\n\n方法覆盖规则\
  \ #2\n\n覆盖方法必须与被覆盖方法具有相同的名称。\n\n方法覆盖规则 #3\n\n覆盖方法必须与被覆盖方法具有相同数量、相同类型且顺序相同的参数。当方法使用泛型类型作为参数时，Java\
  \ 5 略微改变了此规则。当方法的参数使用泛型类型时，在与其他方法比较以检查一个方法是否覆盖另一个方法时，你需要考虑泛型类型参数的擦除，而不是泛型类型本身。我将在后面通过示例详细讨论此规则。目前，如果两个方法具有相同数量、相同类型且顺序相同的参数，则认为一个方法覆盖了另一个方法。请注意，参数的名称无关紧要。例如，`void\
  \ print(String str)` 和 `void print(String msg)` 被认为是相同的方法。参数的不同名称 `str` 和 `msg`\
  \ 并不会使它们成为不同的方法。\n\n方法覆盖规则 #4\n\n在 Java 5 之前，覆盖方法和被覆盖方法的返回类型必须相同。在 Java 5 中，对于原始数据类型的返回类型，此规则保持不变。但是，对于引用数据类型的返回类型，此规则已更改。如果被覆盖方法的返回类型是引用类型，则覆盖方法的返回类型必须与被覆盖方法的返回类型赋值兼容。假设一个类有一个方法定义\
  \ `R1 m1()`，它被方法定义 `R2 m1()` 覆盖。仅当 `R2` 类型的实例可以在没有任何类型转换的情况下赋值给 `R1` 类型的变量时，才允许这种方法覆盖。考虑以下定义三个类\
  \ `P`、`Q` 和 `R` 的代码片段：\n\n```\npublic class P {\npublic Employee getEmp() {\n//\
  \ 代码在此\n}\n}\npublic class Q extends P {\npublic Employee getEmp() {\n// 代码在此\n\
  }\n}\npublic class R extends P {\npublic Manager getEmp() {\n// 代码在此\n}\n}\n```\n\
  \n类 `P` 定义了一个 `getEmp()` 方法，该方法返回一个 `Employee` 类型的对象。类 `Q` 的 `getEmp()` 方法覆盖了其超类\
  \ `P` 的 `getEmp()` 方法，因为它具有相同的名称、相同数量（本例中为零个）且类型和顺序相同的参数，以及相同的返回类型 `Employee`。类\
  \ `R` 的 `getEmp()` 方法也覆盖了类 `P` 的 `getEmp()` 方法，即使其返回类型 `Manager` 与被覆盖方法的返回类型 `Employee`\
  \ 不同。类 `R` 的 `getEmp()` 方法覆盖了其超类的 `getEmp()` 方法，因为 `Manager` 类型的实例总是可以在没有任何类型转换的情况下赋值给\
  \ `Employee` 类型的变量。\n\n方法覆盖规则 #5\n\n覆盖方法的访问级别必须至少与被覆盖方法的访问级别相同或更宽松。允许继承的三个访问级别是\
  \ `public`、`protected` 和包级别。回想一下，`private` 成员不会被继承，因此不能被覆盖。访问级别从最宽松到最严格的顺序是 `public`、`protected`\
  \ 和包级别。如果被覆盖方法具有 `public` 访问级别，则覆盖方法必须具有 `public` 访问级别，因为 `public` 是最宽松的访问级别。如果被覆盖方法具有\
  \ `protected` 访问级别，则覆盖方法可以具有 `public` 或 `protected` 访问级别。如果被覆盖方法具有包级别访问权限，则覆盖方法可以具有\
  \ `public`、`protected` 或包级别访问权限。表 20-1 总结了此规则。我稍后将讨论为什么存在此规则。\n\n表 20-1.\n\n覆盖方法允许的访问级别\n\
  \n被覆盖方法访问级别\n |\n  允许的覆盖方法访问级别\n |\n\n| --- | --- | --- | --- | --- |\n\n`public`\n\
  \ |\n  `public`\n |\n\n`protected`\n |\n  `public`, `protected`\n |\n\n包级别\n |\n\
  \  `public`, `protected`,\n包级别\n |\n\n方法覆盖规则 #6\n\n\n\n一个方法可以在其 `throws` 子句中包含一个已检查异常的列表。\n\
  虽然允许在方法的 `throws` 子句中包含一个未检查异常，\n但这不是必需的。在本节中，我只讨论\n已检查异常。重写方法不能向\n被重写方法的异常列表中添加新的异常。\n\
  它可以移除一个或\n所有异常，或者用一个异常替换另一个异常，\n该异常是被重写方法中列出的异常的子类之一。考虑以下类定义：\n\n```\npublic class\
  \ G {\npublic void m1() throws CheckedException1, CheckedException2 {\n// 代码写在这里\n\
  }\n}\n```\n\n如果一个类重写了类 `G` 的 `m1()` 方法，它\n不得向其添加任何新的已检查异常。以下代码将\n无法编译，因为它在重写方法 `m1()`\
  \ 中添加了一个新的已检查异常\n`CheckException3`：\n\n```\npublic class H extends G {\npublic void\
  \ m1() throws CheckedException1, CheckedException2, CheckedException3 {\n// 代码写在这里\n\
  }\n}\n```\n\n以下类声明重写了类 `G` 中的 `m1()` 方法，并且它们\n都是有效的。在类 `I` 中，方法 `m1()` 移除了两个\n异常。在类\
  \ `J` 中，它移除了一个\n异常并保留了一个。在类 `K` 中，它保留了一个异常并用一个子类型替换了另一个异常，假设 `CheckedException22`\
  \ 是\n`CheckedException2` 的子类。\n\n```\npublic class I extends G {\n// m1() 移除了所有异常\n\
  public void m1() {\n// 代码写在这里\n}\n}\npublic class J extends G {\n// m1() 移除一个异常并保留另一个\n\
  public void m1() throws CheckedException1 {\n// 代码写在这里\n}\n}\npublic class J extends\
  \ G {\n// m1() 移除一个，保留一个，并用一个子类替换一个\npublic void m1() throws CheckedException1,\
  \ CheckedException22 {\n// 代码写在这里\n}\n}\n```\n\n关于重写方法的返回类型和异常列表的规则\n可能并不明显。我将讨论这些规则背后的\n\
  原因。这些规则背后有一个原因，即“一个类类型的变量可以持有其任何子类对象的引用。”当你使用超类类型编写代码时，该代码也必须能够在不做任何修改的情况下与子类类型的对象一起工作。考虑以下类\
  \ `P` 的定义，假设 `EmpNotFoundException` 是一个已检查异常类：\n\n```\npublic class P {\npublic\
  \ Employee getEmp(int empId) throws EmpNotFoundException {\n// 代码写在这里\n}\n}\n```\n\
  \n你可以编写以下代码片段：\n\n```\nP p = // 获取 P 或其子类的对象引用；\ntry {\nEmployee emp = p.getEmp(10);\n\
  } catch (EmpNotFoundException e) {\n// 在此处处理异常\n}\n```\n\n这段代码片段中有两点需要考虑。\n首先，变量\
  \ `p`，其类型为 `P`，可以指向类型为 `P` 的对象或类 `P` 的任何子类的对象。其次，当调用 `p.getEmp(10)` 方法时，编译器会验证变量\
  \ `p` 的声明类型（`P` 类）是否有一个 `getEmp()` 方法，该方法接受一个 `int` 类型的参数，返回一个 `Employee` 类型的对象，并抛出\
  \ `EmpNotFoundException`。这些信息由编译器根据类 `P` 进行验证。编译器对 `getEmp()` 方法所做的假设（并且也验证了）绝不能在运行时失效。否则，将导致混乱——代码可以编译，但可能无法运行。\n\
  \n考虑重写 `getEmp()` 方法的一种可能情况，如下所示：\n\n```\npublic class Q extends P {\npublic Manager\
  \ getEmp(int empId) {\n// 代码写在这里\n}\n}\n```\n\n如果变量 `p` 被赋值为类 `Q` 的一个对象，那么 `try-catch`\
  \ 块内的代码\n\n```\nEmployee emp = p.getEmp(10);\n```\n\n仍然是有效的。在这种情况下，变量 `p` 将引用类 `Q`\
  \ 的一个对象，其 `getEmp()` 方法返回一个 `Manager` 对象并且不抛出任何异常。从 `getEmp()` 方法返回一个 `Manager`\
  \ 对象是可以的，因为你可以将 `Manager` 对象赋值给 `emp` 变量，这是一种向上转型的情况。从 `getEmp()` 方法不抛出异常也是可以的，因为代码已经准备好处理异常（通过使用\
  \ `try-catch` 块），以防异常被抛出。\n\n重写方法的访问级别规则背后的原因是什么？\n请注意，当变量 p 访问 `getEmp()` 方法时，编译器会验证使用\
  \ `p.getEmp()` 的代码是否有权访问类 `P` 的 `getEmp()` 方法。如果 `P` 的子类降低了访问级别，那么相同的代码 `p.getEmp()`\
  \ 在运行时可能无法工作，因为执行该语句的代码可能无权访问类 `P` 的子类中的 `getEmp()` 方法。\n\n考虑以下类 `Q2` 的定义，它继承自类\
  \ `P`。它重写了 `getEmp()` 方法，并将 `EmpNoFoundException` 替换为另一个名为 `BadEmpIdException` 的已检查异常。\n\
  \n```\n// 无法编译\npublic class Q2 extends P {\npublic Manager getEmp(int empId) throws\
  \ BadEmpIdException {\n// 代码写在这里\n}\n}\n```\n\n假设根据 `P` 类型编写的代码获取了一个 `Q2` 对象的引用，如下所示：\n\
  \n```\nP p = new Q2();\ntry {\nEmployee emp = p.getEmp(10);\n} catch(EmpNotFoundException\
  \ e) {\n// 在此处处理异常\n}\n```\n\n请注意，`try-catch` 块并未准备好处理 `BadEmpIdException`，而类 `Q2`\
  \ 的 `getEmp()` 方法可能会抛出该异常。这就是类 `Q2` 的声明无法编译的原因。\n\n为了总结重写的规则，让我们分解方法声明的各个部分，如下所示：\n\
  \n*   方法名称\n*   参数数量\n*   参数类型\n*   参数顺序\n*   参数返回类型\n*   访问级别\n*   `throws` 子句中的已检查异常列表\n\
  \n前四个部分在重写方法和被重写方法中必须始终相同。在 Java 5 之前，重写方法和被重写方法中的返回类型必须相同。从 Java 5 开始，如果返回类型是引用类型，则重写方法的返回类型也可以是被重写方法返回类型的子类型（任何子类）。被重写方法中的访问级别和异常列表可以被视为其约束。重写方法可以放宽（甚至移除）被重写方法的约束。然而，重写方法的约束绝不能比被重写方法的约束更严格。\n\
  \n重写方法的规则很复杂。掌握它们可能需要很长时间。所有规则都由编译器直接支持。如果你在重写方法时在源代码中犯了错误，编译器会生成一个不错的（并不总是）错误消息，该消息会提示你错误所在。有一条关于方法重写的黄金法则可以帮助你避免错误：“任何使用超类类型编写的代码也必须能够与子类类型一起工作。”\n\
  \n提示\n\n如果你想在你的类中重写一个方法，你应该用 `@Override` 注解来注解该方法。对于使用 `@Override` 注解的方法，编译器会验证该方法是否确实重写了超类中的一个方法；否则，它会生成一个编译时错误。\n\
  \n访问被重写的方法\n\n\n\n有时你可能需要从子类中访问被覆盖的方法。子类可以使用关键字 `super` 作为限定符来调用超类中被覆盖的方法。请注意，`Object`\
  \ 类没有超类。在 `Object` 类中使用关键字 `super` 是非法的。作为程序员，你永远不需要为 `Object` 类编写代码，因为它是 Java 类库的一部分。请考虑清单\
  \ 20-14 中 `AOSuper` 类的代码。它有一个 `print()` 方法，该方法会在标准输出上打印一条消息。\n\n```\n// AOSuper.java\n\
  package com.jdojo.inheritance;\npublic class AOSuper {\npublic void print() {\n\
  System.out.println(\"Inside AOSuper.print()\");\n}\n}\n清单 20-14.\n一个 AOSuper 类\n\
  ```\n\n清单 20-15 中的代码包含了 `AOSub` 类的声明，该类继承自 `AOSuper` 类。\n\n```\n// AOSub.java\n\
  package com.jdojo.inheritance;\npublic class AOSub extends AOSuper {\n@Override\n\
  public void print() {\n// 调用 AOSuper 类的 print() 方法\nsuper.print();\n// 打印一条消息\n\
  System.out.println(\"Inside AOSub.print()\");\n}\npublic void callOverridenPrint()\
  \ {\n// 调用 AOSuper 类的 print() 方法\nsuper.print();\n}\n}\n清单 20-15.\n一个继承自 AOSuper\
  \ 类的 AOSub 类\n```\n\n`AOSub` 类覆盖了 `AOSuper` 类的 `print()` 方法。请注意 `AOSub` 类的 `print()`\
  \ 方法和 `callOverridenPrint()` 方法内部的 `super.print()` 方法调用。它将调用 `AOSuper` 类的 `print()`\
  \ 方法。清单 20-16 的输出显示，使用 `super` 限定符的方法调用会调用超类中被覆盖的方法。\n\n```\n// AOTest.java\npackage\
  \ com.jdojo.inheritance;\npublic class AOTest {\npublic static void main(String[]\
  \ args) {\nAOSub aoSub = new AOSub();\naoSub.print();\naoSub.callOverridenPrint();\n\
  }\n}\nInside AOSuper.print()\nInside AOSub.print()\nInside AOSuper.print()\n清单 20-16.\n\
  一个用于测试带 super 限定符的方法调用的测试类\n```\n\n无法直接调用超类的超类的实例方法。你可以使用关键字 `super` 调用超类（仅限直接祖先）中被覆盖的方法。假设有三个类：`A`、`B`\
  \ 和 `C`，其中类 `B` 继承自类 `A`，类 `C` 继承自类 `B`。无法从类 `C` 内部调用类 `A` 的方法。如果类 `C` 需要调用类 `A`\
  \ 的方法，你需要在类 `B` 中提供一个方法来调用类 `A` 的方法。类 `C` 将调用类 `B` 的方法，而类 `B` 的方法又会调用类 `A` 的方法。\n\
  \n提示\n\n当使用关键字 `super` 进行方法调用时，即使该方法是实例方法，Java 也会使用早期绑定。Java 对实例方法调用使用早期绑定的另一种情况是\
  \ `private` 方法调用，因为 `private` 方法不能从其定义类的外部调用。`private` 方法也不能被覆盖。关键字 `super` 指的是其所在类的直接祖先的实例字段、方法或构造器。\n\
  \n方法重载\n\n在同一个类中拥有多个同名方法称为方法重载。类中同名的方法可以是声明的方法、继承的方法，或两者的组合。重载的方法必须具有不同的参数数量、不同的参数类型，或两者都不同。方法的返回类型、访问级别和\
  \ `throws` 子句在使其成为重载方法方面不起作用。`OME1` 类的 `m1()` 方法就是重载方法的一个例子。\n\n```\npublic class\
  \ OME1 {\npublic void m1(int a) {\n// 代码写在这里\n}\npublic void m1(int a, int b) {\n\
  // 代码写在这里\n}\npublic int m1(String a) {\n// 代码写在这里\n}\npublic int m1(String a, int\
  \ b) throws CheckedException1 {\n// 代码写在这里\n}\n}\n```\n\n以下是在 `OME2` 类中重载 `m2()`\
  \ 方法的一个错误尝试示例：\n\n```\n// 无法编译\npublic class OME2 {\npublic void m2(int p1) {\n\
  // 代码写在这里\n}\npublic void m2(int p2) {\n// 代码写在这里\n}\n}\n```\n\n为参数使用不同的名称（`p1`\
  \ 和 `p2`）并不能使 `m2()` 方法重载。`OME2` 类的代码无法编译，因为它有 `m2()` 方法的重复声明。这两个方法具有相同数量和类型的参数，这使得它无法重载。\n\
  \n参数的顺序可能在使方法重载方面起作用。`OME3` 类的 `m3()` 方法是重载的，因为参数类型不同。两个方法都有一个 `int` 类型的参数和一个 `double`\
  \ 类型的参数。然而，它们的顺序不同。\n\n```\npublic class OME3 {\npublic void m3(int p1, double p2)\
  \ {\n// 代码写在这里\n}\npublic void m3(double p1, int p2) {\n// 代码写在这里\n}\n}\n```\n\n\
  使用一个简单的规则来检查两个方法是否可以被视为重载方法。从左到右列出方法的名称及其参数类型，用逗号分隔。你可以使用任何其他分隔符。如果同一个类的两个同名方法给出不同的列表，则它们是重载的。否则，它们不是重载的。如果你为\
  \ `OME1`、`OME2` 和 `OME3` 类中的 `m1()`、`m2()` 和 `m3()` 方法制作这样的列表，你将得到以下结果：\n\n```\n\
  // 类 OME1 中 m1 的方法列表 - 已重载\nm1,int\nm1,int,int\nm1,String\nm1,String,int\n// 类 OME2\
  \ 中 m2 的方法列表 – 未重载\nm2,int\nm2,int\n// 类 OME3 中 m3 的方法列表 - 已重载\nm3,int,double\n\
  m3,double,int\n```\n\n你应该意识到，类 `OME2` 中 `m2()` 方法的两个版本结果相同，因此 `OME2.m2()` 不是重载的。表\
  \ 20-2 列出了方法覆盖和方法重载之间的一些重要区别。\n\n表 20-2.\n\n方法覆盖和方法重载之间的一些重要区别\n\n| 方法覆盖 | 方法重载\
  \ |\n| --- | --- |\n| 覆盖涉及继承和至少两个类。 | 重载与继承无关。重载只涉及一个类。 |\n| 当一个类定义了一个方法，该方法与其超类定义的方法具有相同的名称、相同数量和相同类型的参数且顺序相同时，就会发生覆盖。\
  \ | 当一个类定义了多个同名方法时，就会发生重载。所有同名方法必须在至少一个方面与其他方法不同——参数数量、类型或顺序等。 |\n| 覆盖方法的返回类型必须与覆盖方法的返回类型是赋值可替换的。\
  \ | 重载方法的返回类型在重载中不起作用。 |\n| 覆盖方法不能有比被覆盖方法更多的 `throws` 子句。它可以具有与被覆盖方法相同或限制更少的异常列表。\
  \ | 重载方法的 `throws` 子句在重载中不起作用。 |\n| 覆盖仅适用于实例（非静态）方法。 | 任何方法（静态或非静态）都可以重载。 |\n\n\
  方法重载是另一种多态性，其中相同的方法名称具有不同的含义。方法重载在编译时绑定，而方法覆盖在运行时绑定。编译器仅解析将被调用的重载方法的版本。它通过将实际参数与重载方法的形参进行匹配，来确定将调用重载方法的哪个版本。如果重载方法是实例方法，则执行哪个代码仍然在运行时使用后期绑定来确定。\n\
  \n\n\n对于重载方法的调用，编译器会选择最具体的方法。如果找不到精确匹配，它会尝试通过自动类型拓宽规则将实际参数类型转换为更通用的类型，从而寻找更通用的版本。清单\
  \ 20-17 演示了编译器如何选择重载方法。\n\n```\n// OverloadingTest.java\npackage com.jdojo.inheritance;\n\
  public class OverloadingTest {\npublic static void main(String[] args) {\nOverloadingTest\
  \ ot = new OverloadingTest();\nint i = 10;\nint j = 15;\ndouble d1 = 10.4;\ndouble\
  \ d2 = 2.5;\nfloat f1 = 2.3F;\nfloat f2 = 4.5F;\nshort s1 = 2;\nshort s2 = 6;\n\
  ot.add(i, j);\not.add(d1, j);\not.add(i, s1);\not.add(s1, s2);\not.add(f1, f2);\n\
  ot.add(f1, s2);\nEmployee emp = new Employee();\nManager mgr = new Manager();\n\
  ot.test(emp);\not.test(mgr);\nemp = mgr;\not.test(emp);\n}\npublic double add(int\
  \ a, int b) {\nSystem.out.println(\"Inside add(int a, int b)\");\ndouble s = a +\
  \ b;\nreturn s;\n}\npublic double add(double a, double b) {\nSystem.out.println(\"\
  Inside add(double a, double b)\");\ndouble s = a + b;\nreturn s;\n}\npublic void\
  \ test(Employee e) {\nSystem.out.println(\"Inside test(Employee e)\");\n}\npublic\
  \ void test(Manager e) {\nSystem.out.println(\"Inside test(Manager m)\");\n}\n}\n\
  Inside add(int a, int b)\nInside add(double a, double b)\nInside add(int a, int\
  \ b)\nInside add(int a, int b)\nInside add(double a, double b)\nInside add(double\
  \ a, double b)\nInside test(Employee e)\nInside test(Manager m)\nInside test(Employee\
  \ e)\n清单 20-17.\n一个测试程序，演示编译器如何从重载方法的多个版本中选择最具体的方法\n```\n\n编译器只知道实际参数和形式参数的编译时类型（声明类型）。请看\
  \ `ot.add(f1, s2)` 方法调用。实际参数的类型是 `float` 和 `short`。`OverloadingTest` 类中没有 `add(float,\
  \ short)` 方法。编译器尝试将第一个参数的类型拓宽为 `double` 类型，并根据第一个参数 `add(double, double)` 找到了匹配。然而，第二个参数类型仍然不匹配；实际类型是\
  \ `short`，形式类型是 `double`。Java 允许从 `short` 到 `double` 的自动拓宽。编译器将 `short` 类型转换为 `double`\
  \ 类型，并将 `add(f1, s2)` 调用绑定到 `add(double, double)` 方法。当调用 `ot.test(mgr)` 时，编译器会寻找精确匹配，在这种情况下，它找到了一个，即\
  \ `test(Manager m)`，并将调用绑定到 `test()` 方法的这个版本。假设 `OverloadingTest` 类中不存在 `test(Manager\
  \ m)` 方法。编译器会将 `ot.test(mgr)` 调用绑定到 `test(Employee e)` 方法，因为 `Manager` 类型可以自动拓宽（使用向上转型）为\
  \ `Employee` 类型。\n\n有时，重载方法和自动类型拓宽可能会使编译器混淆，从而导致编译时错误。请参考清单 20-18 和 20-19，其中包含一个带有重载\
