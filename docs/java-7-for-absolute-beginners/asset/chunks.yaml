- fmt: "# Static Members\n\nClasses can have *static members*, including fields, methods,\
    \ and other classes (a class within a class is called an *inner class*). A static\
    \ member of a class is often called a *class member*. The important thing to know\
    \ about class members is that only one instance of that member ever exists. If\
    \ our `Cat` class has a static method, we might have ten different instances of\
    \ the `Cat` class, but there would only ever be one of that static method. That\
    \ becomes an issue when each of the members of the `Cat` class want to use that\
    \ method. The instances end up waiting for each other.\n\nStatic members have\
    \ their uses, though. When you want to be certain that only one of something exists\
    \ for all the objects that instantiate a particular class, the `static` keyword\
    \ is how you do it. One obvious use of the `static` keyword is on the `main` method.\
    \ Imagine if every instance of a program class could start a new program. We would\
    \ quickly swamp the operating system with programs. A more common and useful use\
    \ of static members is to implement counters. Suppose we want to keep track of\
    \ how many `Cat` objects we create. The `Cat` class could then include a static\
    \ field called `numberOfCats`, and the constructors for the class would increment\
    \ that field every time we create a `Cat` object. That code would look something\
    \ like the `Cat` class in [Listing 6-4](#Chapter06.html#list_6_4).\n\n**Listing\
    \ 6-4.** Counting `Cat` objects\n\n```\nclass Cat extends Mammal{\n  static int\
    \ numberOfCats;\n\n  Cat() {\n    numberOfCats++;\n  }\n}\n```\n\nTo get the number\
    \ of `Cat` objects, we can either implement a method to return the value or we\
    \ can reference the field and get its value. To reference a static member, we\
    \ use the name of the class separated from the static member's name by a period,\
    \ as shown in [Listing 6-5](#Chapter06.html#list_6_5).\n\n**Listing 6-5** Referencing\
    \ a static member\n\n```\nSystem.out.println(Cat.numberOfCats);\n```\n\nHowever,\
    \ we should generally prefer the idiom of making the static field private and\
    \ creating a get method to return that value. Otherwise, we expose the field for\
    \ other classes to set, and that is probably a bug. [Listing 6-6](#Chapter06.html#list_6_6)\
    \ shows the `Cat` class modified to use the private field pattern (patterns are\
    \ common idioms in computer science—there are many of them, and they are a worthwhile\
    \ thing to study if you pursue programming).\n\n**Listing 6-6**. The Cat class\
    \ with a private static field\n\n```\nclass Cat extends Mammal{\n  private static\
    \ int numberOfCats;\n\n  Cat() {\n    numberOfCats++;\n  }\n\n  public static\
    \ final int getNumberOfCats() {\n    return numberOfCats;\n  }\n}\n```\n\nDo you\
    \ notice that the method is also static? We need only one such method, regardless\
    \ of how many `Cat` objects we create, so it makes sense for `getNumberOfCats`\
    \ to be static. We also make it `final`, because there's no reason for child classes\
    \ to implement their own `getNumberOfCats` methods. Thus, if we have `Tiger` and\
    \ `Lion` classes extending the `Cat` class, they could not have `getNumberOfCats`\
    \ methods unless those methods have different arguments.\n\n# Polymorphism\n\n\
    *Polymorphism*, from the Greek poly, for many, and morph, for form, means that\
    \ the same thing can have different forms. It's a technical term in many fields,\
    \ including chemistry, biology, and (of course) computer science. Each field defines\
    \ it in terms relevant to that field of study, but it all boils down to having\
    \ multiple forms.\n\nIn object-oriented computer languages, one kind of polymorphism\
    \ is the ability of different classes to respond appropriately to the same input.\
    \ So, our `Mammal` class might define a `speak` method. The `Cat` class would\
    \ implement the `speak` method as a meow, the dog as a bark, and the mouse as\
    \ a squeak. They all implement the same method, but they each do it in their own\
    \ appropriate way. These methods are said to be overridden. The methods in the\
    \ child class replace the behavior of the parent class with their own behavior—that\
    \ is, they override the parent's method.\n\nAnother kind of polymorphism (called\
    \ *overloading*) is having the same behavior mean something different depending\
    \ on the object passed to the behavior (or method). For example, our `Cat` object\
    \ might have two methods called `chase`, and an instance of `Cat` would exhibit\
    \ different behavior for the `chase(Tail)` method and the `chase(Mouse)` method.\
    \ That is, we have methods of the same name, but they have different signatures\
    \ (one takes a `Tail` object as its argument and one takes a `Mouse` object).\
    \ That's a classic example of method overloading."
  raw: '#### Static Members


    Classes can have *static members*, including fields, methods, and other classes
    (a class within a class is called an *inner class*). A static member of a class
    is often called a *class member*. The important thing to know about class members
    is that only one instance of that member ever exists. If our `Cat` class has a
    static method, we might have ten different instances of the `Cat` class, but there
    would only ever be one of that static method. That becomes an issue when each
    of the members of the `Cat` class want to use that method. The instances end up
    waiting for each other.


    Static members have their uses, though. When you want to be certain that only
    one of something exists for all the objects that instantiate a particular class,
    the `static` keyword is how you do it. One obvious use of the `static` keyword
    is on the `main` method. Imagine if every instance of a program class could start
    a new program. We would quickly swamp the operating system with programs. A more
    common and useful use of static members is to implement counters. Suppose we want
    to keep track of how many `Cat` objects we create. The `Cat` class could then
    include a static field called `numberOfCats`, and the constructors for the class
    would increment that field every time we create a `Cat` object. That code would
    look something like the `Cat` class in [Listing 6-4](#Chapter06.html#list_6_4).


    ***Listing 6-4.** Counting `Cat` objects*


    `class Cat extends Mammal{`


    `  static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`

    `}`


    To get the number of `Cat` objects, we can either implement a method to return
    the value or we can reference the field and get its value. To reference a static
    member, we use the name of the class separated from the static member''s name
    by a period, as shown in [Listing 6-5](#Chapter06.html#list_6_5).


    ***Listing 6-5** Referencing a static member*


    `System.out.println(Cat.numberOfCats);`


    However, we should generally prefer the idiom of making the static field private
    and creating a get method to return that value. Otherwise, we expose the field
    for other classes to set, and that is probably a bug. [Listing 6-6](#Chapter06.html#list_6_6)
    shows the `Cat` class modified to use the private field pattern (patterns are
    common idioms in computer science—there are many of them, and they are a worthwhile
    thing to study if you pursue programming).


    ***Listing 6-6**. The Cat class with a private static field*


    `class Cat extends Mammal{`


    `  private static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`


    `  public static final int getNumberOfCats() {`

    `    return numberOfCats;`

    `  }`

    `}`


    Do you notice that the method is also static? We need only one such method, regardless
    of how many `Cat` objects we create, so it makes sense for `getNumberOfCats` to
    be static. We also make it `final`, because there''s no reason for child classes
    to implement their own `getNumberOfCats` methods. Thus, if we have `Tiger` and
    `Lion` classes extending the `Cat` class, they could not have `getNumberOfCats`
    methods unless those methods have different arguments.


    ### Polymorphism


    *Polymorphism*, from the Greek poly, for many, and morph, for form, means that
    the same thing can have different forms. It''s a technical term in many fields,
    including chemistry, biology, and (of course) computer science. Each field defines
    it in terms relevant to that field of study, but it all boils down to having multiple
    forms.


    In object-oriented computer languages, one kind of polymorphism is the ability
    of different classes to respond appropriately to the same input. So, our `Mammal`
    class might define a `speak` method. The `Cat` class would implement the speak
    method as a meow, the dog as a bark, and the mouse as a squeak. They all implement
    the same method, but they each do it in their own appropriate way. These methods
    are said to be overridden. The methods in the child class replace the behavior
    of the parent class with their own behavior—that is, they override the parent''s
    method.


    Another kind of polymorphism (called *overloading*) is having the same behavior
    mean something different depending on the object passed to the behavior (or method).
    For example, our Cat object might have two methods called chase, and an instance
    of `Cat` would exhibit different behavior for the `chase(Tail)` method and the
    `chase(Mouse)` method. That is, we have methods of the same name, but they have
    different signatures (one takes a `Tail` object as its argument and one takes
    a `Mouse` object). That''s a classic example of method overloading.'
