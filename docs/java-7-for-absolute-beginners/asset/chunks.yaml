- fmt: "### Shift Operators\n\nThe shift operators take us back to working with bits.\
    \ The shift operators require two operands: The integral (no floating-point values\
    \ allowed) value to shift and the number of places to shift the bits that comprise\
    \ the value. The signed left shift operator (`<<`) shifts bits to the left. The\
    \ signed right shift operator (`>>`) shifts bits to the right. The unsigned right\
    \ shift operator (`>>>`) shifts bits to the right and fills the left bits with\
    \ zeroes.\n\n![images](images/square.jpg) **Note** The shift operators work only\
    \ on integer values.\n\n[Listing 4-10](#Chapter04.html#list_4_10) demonstrates\
    \ what the shift operators do to the value of an `int` variable.\n\n**Listing\
    \ 4-10.** `ShiftDemo`\n\n```java\npackage com.apress.javaforabsolutebeginners\
    \ .examples.shiftDemo;\n\npublic class ShiftDemo {\n\n  public static void main(String[]\
    \ args) throws Exception {\n    int b = 127;\n    System.out.println(\"b: \" +\
    \ b);\n    System.out.println(\"b as binary: \" + Integer.toBinaryString(b));\n\
    \    String leftShiftString = Integer.toBinaryString(b<<3);\n    System.out.println(\"\
    binary after signed left shifting 3 places: \" +\n      leftShiftString);\n  \
    \  System.out.println(\"value of b after signed shifting left 3 places: \" +\n\
    \      Integer.parseInt(leftShiftString, 2));\n    String rightShiftString = Integer.toBinaryString(b>>3);\n\
    \    System.out.println(\"binary after signed shifting right 3 places: \" +\n\
    \      rightShiftString);\n    System.out.println(\"value of b after signed shifting\
    \ right 3 places: \" +\n      Integer.parseInt(rightShiftString, 2));\n    String\
    \ unsignedRightShiftString = Integer.toBinaryString(b>>>3);\n    System.out.println(\"\
    binary after unsigned shifting right 3 places: \" +\n      unsignedRightShiftString);\n\
    \    System.out.println(\"value of b after unsigned shifting right 3 places: \"\
    \ +\n      Integer.parseInt(unsignedRightShiftString, 2));\n    b = -128;\n  \
    \  System.out.println(\"Resetting b to \" + b);\n    System.out.println(\"b as\
    \ binary: \" + Integer.toBinaryString(b));\n    unsignedRightShiftString = Integer.toBinaryString(b>>>3);\n\
    \    System.out.println(\"binary after unsigned shifting right 3 places: \" +\
    \ unsignedRightShiftString);\n    System.out.println(\"value of b after unsigned\
    \ shifting right 3 places: \" +\n      Integer.parseInt(unsignedRightShiftString,\
    \ 2));\n  }\n}\n```\n\nRunning `ShiftDemo` produces the following output (see\
    \ [Listing 4-11](#Chapter04.html#list_4_11)):\n\n**Listing 4-11.** `ShiftDemo`\
    \ output\n\n```\nb: 127\nb as binary: 1111111\nbinary after signed left shifting\
    \ 3 places: 1111111000\nvalue of b after signed shifting left 3 places: 1016\n\
    binary after signed shifting right 3 places: 1111\nvalue of b after signed shifting\
    \ right 3 places: 15\nbinary after unsigned shifting right 3 places: 1111\nvalue\
    \ of b after unsigned shifting right 3 places: 15\nResetting b to -128\nb as binary:\
    \ 11111111111111111111111110000000\nbinary after unsigned shifting right 3 places:\
    \ 11111111111111111111111110000\nvalue of b after unsigned shifting right 3 places:\
    \ 536870896\n```\n\n`ShiftDemo` and its output reveal a number of things worth\
    \ knowing about the shift operators:\n\n*   The left-hand operator represents\
    \ the value to be shifted, and the right-hand operator indicates the number of\
    \ bits by which to shift (known as the shift distance).\n*   Using a shift operator\
    \ on `byte`, `char`, or `short` values promotes those values to `int` values.\
    \ Unary numeric promotion strikes again. It's unary because both operands are\
    \ separately promoted before the operation is performed. So, a `byte` value shifted\
    \ by another `byte` value leads to two separate unary promotions before the shift\
    \ operation happens. Sometimes, that doesn't matter. Other times, you might need\
    \ to account for the promotion when assigning the result of the shift to another\
    \ variable.\n*   Signed shifting causes trouble with negative values. In the `ShiftDemo`\
    \ example, I didn't use the signed shift operators (`<<` and `>>`) because doing\
    \ so on that value produces an exception. That happens because of the way Java\
    \ stores negative numbers; shifting the bits that comprise a negative number results\
    \ in a binary string that Java can't recognize as any number.\n*   `Integer.toBinaryString`\
    \ shows the minimum possible number of digits. In many of the values shown by\
    \ the `ShiftDemo` results, the internal representation is 32 bits long, with all\
    \ the bits to the left of the value shown being 0 (that is, those values are 0-padded).\
    \ That's why the binary strings for the unsigned right shift operator are 32 bits\
    \ long.\n*   When used on a relatively small negative number, the unsigned shift\
    \ operator can create a large positive number. That happens because the result\
    \ of the operation is a string of binary digits that the JVM can recognize as\
    \ a number. However, that large number might not be what you have in mind. And\
    \ that takes us to our last point:\n*   Shifting is tricky. Test very carefully\
    \ when you use the shift operators.\n\nSo why use the shift operators? Because\
    \ they are the fastest possible operators. The simplest and fastest operation\
    \ a computer can do is to shift a binary value. If you can be sure that shifting\
    \ produces the values you want or if you happen to be working with values that\
    \ aren't really values but rather collections of switches (such as graphics settings),\
    \ the shift operators can provide efficient ways to manipulate those values or\
    \ switches. We cover the idea of using a value as a series of switches when we\
    \ get to the bitwise operators, later in this chapter."
  raw: '#### Shift Operators


    The shift operators take us back to working with bits. The shift operators require
    two operands: The integral (no floating-point values allowed) value to shift and
    the number of places to shift the bits that comprise the value. The signed left
    shift operator (<<) shifts bits to the left. The signed right shift operator (>>)
    shifts bits to the right. The signed right shift operator (>>>) shifts bits to
    the right and fills the left bits with zeroes.


    ![images](images/square.jpg) **Note** The shift operators work only on integer
    values.


    [Listing 4-10](#Chapter04.html#list_4_10) demonstrates what the shift operators
    do to the value of an int variable.


    ***Listing 4-10.** ShiftDemo*


    `package com.apress.javaforabsolutebeginners .examples.shiftDemo;`


    `public class ShiftDemo {`


    `  public static void main(String[] args) throws Exception {`

    `    int b = 127;`

    `    System.out.println("b: " + b);`

    `    System.out.println("b as binary: " + Integer.toBinaryString(b));`

    `    String leftShiftString = Integer.toBinaryString(b<<3);`

    `    System.out.println("binary after signed left shifting 3 places: " +`

    `      leftShiftString);`

    `    System.out.println("value of b after signed shifting left 3 places: " +`

    `      Integer.parseInt(leftShiftString, 2));`

    `    String rightShiftString = Integer.toBinaryString(b>>3);`

    `    System.out.println("binary after signed shifting right 3 places: " +`

    `      rightShiftString);`

    `    System.out.println("value of b after signed shifting right 3 places: " +`

    `      Integer.parseInt(rightShiftString, 2));`

    `    String unsignedRightShiftString = Integer.toBinaryString(b>>>3);`

    `    System.out.println("binary after unsigned shifting right 3 places: " +`

    `      unsignedRightShiftString);`

    `    System.out.println("value of b after unsigned shifting right 3 places: "
    +`

    `      Integer.parseInt(unsignedRightShiftString, 2));`

    `    b = -128;`

    `    System.out.println("Resetting b to " + b);`

    `    System.out.println("b as binary: " + Integer.toBinaryString(b));`

    `    unsignedRightShiftString = Integer.toBinaryString(b>>>3);`

    `    System.out.println("binary after unsigned shifting right 3 places: " + unsignedRightShiftString);`

    `    System.out.println("value of b after unsigned shifting right 3 places: "
    +`

    `      Integer.parseInt(unsignedRightShiftString, 2));`

    `  }`

    `}`


    Running ShiftDemo produces the following output (see [Listing 4-11](#Chapter04.html#list_4_11)):


    ***Listing 4-11.** ShiftDemo output*


    `b: 127`

    `b as binary: 1111111`

    `binary after signed left shifting 3 places: 1111111000`

    `value of b after signed shifting left 3 places: 1016`

    `binary after signed shifting right 3 places: 1111`

    `value of b after signed shifting right 3 places: 15`

    `binary after unsigned shifting right 3 places: 1111`

    `value of b after unsigned shifting right 3 places: 15`

    `Resetting b to -128`

    `b as binary: 11111111111111111111111110000000`

    `binary after unsigned shifting right 3 places: 11111111111111111111111110000`

    `value of b after unsigned shifting right 3 places: 536870896`


    `ShiftDemo` and its output reveal a number of things worth knowing about the shift
    operators:


    *   The left-hand operator represents the value to be shifted, and the right-hand
    operator indicates the number of bits by which to shift (known as the shift distance).

    *   Using a shift operator on byte, char, or short values promotes those values
    to `int` values. Unary numeric promotion strikes again. It''s unary because both
    operands are separately promoted before the operation is performed. So, a byte
    value shifted by another byte value leads to two separate unary promotions before
    the shift operation happens. Sometimes, that doesn''t matter. Other times, you
    might need to account for the promotion when assigning the result of the shift
    to another variable.

    *   Signed shifting causes trouble with negative values. In the ShiftDemo example,
    I didn''t use the signed shift operators (<< and >>) because doing so on that
    value produces an exception. That happens because of the way Java stores negative
    numbers; shifting the bits that comprise a negative number results in a binary
    string that Java can''t recognize as any number.

    *   `Integer.toBinaryString` shows the minimum possible number of digits. In many
    of the values shown by the `ShiftDemo` results, the internal representation is
    32 bits long, with all the bits to the left of the value shown being 0 (that is,
    those values are 0-padded). That''s why the binary strings for the unsigned right
    shift operator are 32 bits long.

    *   When used on a relatively small negative number, the unsigned shift operator
    can create a large positive number. That happens because the result of the operation
    is a string of binary digits that the JVM can recognize as a number. However,
    that large number might not be what you have in mind. And that takes us to our
    last point:

    *   Shifting is tricky. Test very carefully when you use the shift operators.


    So why use the shift operators? Because they are the fastest possible operators.
    The simplest and fastest operation a computer can do is to shift a binary value.
    If you can be sure that shifting produces the values you want or if you happen
    to be working with values that aren''t really values but rather collections of
    switches (such as graphics settings), the shift operators can provide efficient
    ways to manipulate those values or switches. We cover the idea of using a value
    as a series of switches when we get to the bitwise operators, later in this chapter.'
