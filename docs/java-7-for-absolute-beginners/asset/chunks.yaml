- fmt: "#### Bitwise Exclusive OR Operator (`^`)\n\nThe bitwise Exclusive OR (often\
    \ shortened to XOR) operator (`^`) compares two binary values and sets each bit\
    \ to 1 if the bits differ. Again, examples make the best explanations for this\
    \ kind of thing (see [Listing 4-18](#Chapter04.html#list_4_18)).\n\n***Listing\
    \ 4-18.** Bitwise Exclusive OR operator (`^`)*\n\n```\nByte byte1 = Byte.parseByte(\"\
    01010101\", 2); // byte1 = 85\nByte byte2 = Byte.parseByte(\"00111111\", 2); //\
    \ byte2 = 63\nint result = byte1 ^ byte2; // result = 106\n```\n\nThe value of\
    \ `result` is 106 because taking the bits where either bit in the compared values\
    \ is 1 gives a binary result of `01101010`, which happens to be the binary representation\
    \ of 106.\n\n#### Bitwise Inclusive OR Operator (`|`)\n\nThe bitwise Inclusive\
    \ OR operator (`|`) compares two binary values and sets each bit to 1 if either\
    \ bit is 1. Again, examples make the best explanations for this kind of thing\
    \ (see [Listing 4-19](#Chapter04.html#list_4_19)).\n\n***Listing 4-19.** Bitwise\
    \ Inclusive OR operator (`|`)*\n\n```\nByte byte1 = Byte.parseByte(\"01010101\"\
    , 2); // byte1 = 85\nByte byte2 = Byte.parseByte(\"00111111\", 2); // byte2 =\
    \ 63\nint result = byte1 | byte2; // result = 127\n```\n\nThe value of `result`\
    \ is 127 because taking the bits where either bit is 1 in the compared values\
    \ is 1 gives a binary result of `01101010`, which happens to be the binary representation\
    \ of 127.\n\nYou might ask when anyone would ever use these bitwise operators.\
    \ They have a number of useful applications, actually. Game developers often use\
    \ bitwise operations for high-speed graphics processing. Again, imagine a game\
    \ in which two objects merge somehow (maybe shooting a blue object with a red\
    \ bullet makes the object turn purple). The bitwise and operator (`&`) provides\
    \ a high-speed way to determine the new color. The bitwise operators are also\
    \ often used to see which combination of mouse buttons have been pressed or to\
    \ see whether a mouse button has been held down while the mouse was moved (creating\
    \ a drag operation). So they might seem like oddball operators, but they definitely\
    \ have their uses.\n\n#### Logical AND Operator (`&&`)\n\nThe logical AND operator\
    \ (`&&`) returns `true` if both arguments are true and `false` if either one is\
    \ false. It's most often used within `if` statements but is handy anywhere you\
    \ need to be sure that two boolean values are true. Also, the logical AND operator\
    \ is one of the most-often used operators. If we had a nickel for every time we\
    \ typed `&&`....\n\n[Listing 4-20](#Chapter04.html#list_4_20) is an example.\n\
    \n***Listing 4-20.** Logical AND operator (`&&`)*\n\n```\nif (2 > 1 && 1 > 0)\
    \ {\n  System.out.println(\"Numbers work as expected\");\n}\n```\n\nIn that code\
    \ snippet, we have three operators. Thanks to operator precedence, the two comparison\
    \ operators (`>`) get evaluated before the logical AND operator (`&&`), so we\
    \ don't need parentheses to make things work correctly (though you might want\
    \ parentheses for clarity, depending on your coding style).\n\nAlso, you can chain\
    \ multiple logical AND operators (and most other operators), as shown in [Listing\
    \ 4-21](#Chapter04.html#list_4_21).\n\n***Listing 4-21.** Chaining logical AND\
    \ operators*\n\n```\nif (3 > 2 && 2 > 1 && 1 > 0) {\n  System.out.println(\"Numbers\
    \ work as expected\");\n}\n```\n\nThe result of the middle comparison (`2 > 1`)\
    \ serves as an operator to both of the logical AND operators. That kind of chaining\
    \ is common in all programming problems, regardless of language. We're fortunate\
    \ that Java makes it easy to do.\n\n#### Logical OR Operator (`||`)\n\nThe logical\
    \ OR operator (`||`) returns `true` if either of its arguments are `true` and\
    \ `false` only if both arguments are `false`. Otherwise, it works just like the\
    \ logical AND operator.\n\n[Listing 4-22](#Chapter04.html#list_4_22) is an example.\n\
    \n***Listing 4-22.** Logical OR operator (`||`)*\n\n```\nif (2 > 1 || 1 < 0) {\n\
    \  System.out.println(\"Numbers work as expected\");\n}\n```\n\nAs with logical\
    \ AND operators, you can chain multiple logical OR operators, as shown in [Listing\
    \ 4-23](#Chapter04.html#list_4_23).\n\n***Listing 4-23.** Chaining logical OR\
    \ operators*\n\n```\nif (3 > 2 || 2 < 1 || 1 < 0) {\n  System.out.println(\"Numbers\
    \ work as expected\");\n}\n```\n\n![images](images/square.jpg) **Note** Eclipse\
    \ warns us that we have dead code within the comparisons when we run this code.\
    \ Because 2 is always greater than 1, the JVM won't try to compare 1 to 0, so\
    \ Eclipse tells us that we can remove that comparison. Of course, real-world examples\
    \ check to make sure that a data stream isn't `null` and has at least some content.\
    \ [Listing 4-24](#Chapter04.html#list_4_24) contains that code.\n\n***Listing\
    \ 4-24.** A more realistic use for the logical OR operator*\n\n```\nif (dataStream\
    \ == null || dataStream.length == 0) {\n  log.error(\"No data available!\");\n\
    }\n```\n\nAgain, the equality operators have higher precedence, so we don't need\
    \ additional parentheses.\n\n#### Assignment Operators\n\nThe assignment operators\
    \ set values and assign object references. The basic assignment operator (`=`)\
    \ is by far the most often used operator. Every time we put something like `int\
    \ = 0` (assigning a value to a primitive) or `Date now = new Date()` (assigning\
    \ an object reference to a variable) into an example, we use the basic assignment\
    \ operator.\n\nJava provides a number of compound assignment operators (often\
    \ called shortcut operators). [Listing 4-25](#Chapter04.html#list_4_25) is an\
    \ example of one of the compound assignment operators.\n\n***Listing 4-25.** Compound\
    \ assignment operator*\n\n```\nint myInt = 2;\nmyInt *= 2; // equivalent to myInt\
    \ = myInt * 2;\nSystem.out.println(myInt); // prints 4;\n```\n\nEach of the compound\
    \ operators applies the first operator within the compound operator and the value\
    \ after the compound operator and then applies the assignment operator. In the\
    \ previous example, the multiplication operator is applied to `myInt` with the\
    \ value after the compound operator (in this case, doubling the value of `myInt`)\
    \ and then sets `myInt` to the result.\n\nThe compound assignment operators can\
    \ lead to unexpected results. Consider the following code snippet in [Listing\
    \ 4-26](#Chapter04.html#list_4_26). Before reading past the snippet, ask yourself\
    \ “What is the value of `myInt` at the end?”\n\n***Listing 4-26.** Compound assignment\
    \ problem*\n\n```\nint myInt = 2;\nmyInt *= (myInt = 4);\nSystem.out.println(myInt);\n\
    ```\n\nThe last assignment before the print statement is `myInt = 4`, so you might\
    \ think the answer must be 4. But we set `myInt` to 4 and then multiply it by\
    \ itself, so you might think the answer must be 16. In fact, neither is correct.\
    \ The code snippet prints 8. It might seem odd at first, but it makes sense once\
    \ you understand how the JVM deals with a compound operator. When the JVM encounters\
    \ the compound operator, it knows `myInt` equals 2. Until the entire operator\
    \ is resolved, the value of `myInt` can't be changed. (This is the only case we\
    \ know of where parentheses aren't processed first, by the way.) Consequently,\
    \ the assignment within the line is ignored, but the value within the assignment\
    \ is used. After all that, the result is 2 times 4, or 8.\n\n![images](images/square.jpg)\
    \ **Note** This issue is pretty much an academic curiosity. It's an issue the\
    \ developers of the Java language had to account for, but smart programmers don't\
    \ write code like this. Smart programmers break up their operations so that the\
    \ effect of each line is clear with minimal interpretation. Remember, if you program\
    \ for a living, other programmers have to read your code and understand it, and\
    \ very few development shops will tolerate this kind of confused and confusing\
    \ code.\n\n[Table 4.3](#Chapter04.html#tab_4_3) shows all the assignment operators,\
    \ including the compound operators.\n\n![images](images/t0403.jpg)"
  raw: '#### Bitwise Exclusive OR Operator (^)


    The bitwise Exclusive OR (often shortened to XOR) operator (^) compares two binary
    values and sets each bit to 1 if the bits differ. Again, examples make the best
    explanations for this kind of thing (see [Listing 4-18](#Chapter04.html#list_4_18)).


    ***Listing 4-18.** Bitwise Exclusive OR operator (^)*


    `Byte byte1 = Byte.parseByte("01010101", 2); // byte1 = 85`

    `Byte byte2 = Byte.parseByte("00111111", 2); // byte2 = 63`

    `int result = byte1 ^ byte2; // result = 106`


    The value of result is 106 because taking the bits where either bit in the compared
    values is 1 gives a binary result of `01101010`, which happens to be the binary
    representation of 106.


    #### Bitwise Inclusive OR Operator (|)


    The bitwise Inclusive OR operator (|) compares two binary values and sets each
    bit to 1 if either bit is 1\. Again, examples make the best explanations for this
    kind of thing (see [Listing 4-19](#Chapter04.html#list_4_19)).


    ***Listing 4-19.** Bitwise Inclusive OR operator (|)*


    `Byte byte1 = Byte.parseByte("01010101", 2); // byte1 = 85`

    `Byte byte2 = Byte.parseByte("00111111", 2); // byte2 = 63`

    `int result = byte1 | byte2; // result = 127`


    The value of result is 127 because taking the bits where either bit is 1 in the
    compared values is 1 gives a binary result of `01101010`, which happens to be
    the binary representation of 127.


    You might ask when anyone would ever use these bitwise operators. They have a
    number of useful applications, actually. Game developers often use bitwise operations
    for high-speed graphics processing. Again, imagine a game in which two objects
    merge somehow (maybe shooting a blue object with a red bullet makes the object
    turn purple). The bitwise and operator (`&`) provides a high-speed way to determine
    the new color. The bitwise operators are also often used to see which combination
    of mouse buttons have been pressed or to see whether a mouse button has been held
    down while the mouse was moved (creating a drag operation). So they might seem
    like oddball operators, but they definitely have their uses.


    #### Logical AND Operator (&&)


    The logical AND operator (`&&`) returns `true` if both arguments are true and
    false if either one is false. It''s most often used within if statements but is
    handy anywhere you need to be sure that two boolean values are true. Also, the
    logical AND operator is one of the most-often used operators. If we had a nickel
    for every time we typed `&&`....


    [Listing 4-20](#Chapter04.html#list_4_20) is an example.


    ***Listing 4-20.** Logical AND operator (&&)*


    `if (2 > 1 && 1 > 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    In that code snippet, we have three operators. Thanks to operator precedence,
    the two comparison operators (`>`) get evaluated before the logical AND operator
    (`&&`), so we don''t need parentheses to make things work correctly (though you
    might want parentheses for clarity, depending on your coding style).


    Also, you can chain multiple logical AND operators (and most other operators),
    as shown in [Listing 4-21](#Chapter04.html#list_4_21).


    ***Listing 4-21.** Chaining logical AND operators*


    `if (3 > 2 && 2 > 1 && 1 > 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    The result of the middle comparison (2 > 1) serves as an operator to both of the
    logical AND operators. That kind of chaining is common in all programming problems,
    regardless of language. We''re fortunate that Java makes it easy to do.


    #### Logical OR Operator (||)


    The logical AND operator (`||`) returns true if either of its arguments are true
    and false only if both arguments are false. Otherwise, it works just like the
    logical AND operator.


    [Listing 4-22](#Chapter04.html#list_4_22) is an example.


    ***Listing 4-22.** Logical AND operator (&&)*


    `if (2 > 1 || 1 < 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    As with logical AND operators, you can chain multiple logical AND operators, as
    shown in [Listing 4-23.](#Chapter04.html#list_4_23)


    ***Listing 4-23.** Chaining logical AND operators*


    `if (3 > 2 || 2 < 1 || 1 < 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    ![images](images/square.jpg) **Note** Eclipse warns us that we have dead code
    within the comparisons when we run this code. Because 2 is always greater than
    1, the JVM won''t try to compare 1 to 0, so Eclipse tells us that we can remove
    that comparison. Of course, real-world examples check to make sure that a data
    stream isn''t null and has at least some content. [Listing 4-24](#Chapter04.html#list_4_24)
    contains that code.


    ***Listing 4-24.** A more realistic use for the logical OR operator*


    `if (dataStream == null || dataStream.length == 0) {`

    `  log.error("No data available!");`

    `}`


    Again, the equality operators have higher precedence, so we don''t need additional
    parentheses.


    #### Assignment Operators


    The assignment operators set values and assign object references. The basic assignment
    operator (`=`) is by far the most often used operator. Every time we put something
    like `int = 0` (assigning a value to a primitive) or `Date now = new Date()` (assigning
    an object reference to a variable) into an example, we use the basic assignment
    operator.


    Java provides a number of compound assignment operators (often called shortcut
    operators). [Listing 4-25](#Chapter04.html#list_4_25) is an example of one of
    the compound assignment operators.


    ***Listing 4-25.** Compound assignment operator*


    `int myInt = 2;`

    `myInt *= 2; // equivalent to myInt = myInt * 2;`

    `System.out.println(myInt); // prints 4;`


    Each of the compound operators applies the first operator within the compound
    operator and the value after the compound operator and then applies the assignment
    operator. In the previous example, the multiplication operator is applied to `myInt`
    with the value after the compound operator (in this case, doubling the value of
    `myInt`) and then sets `myInt` to the result.


    The compound assignment operators can lead to unexpected results. Consider the
    following code snippet in [Listing 4-26](#Chapter04.html#list_4_26). Before reading
    past the snippet, ask yourself “What is the value of `myInt` at the end?”


    ***Listing 4-26.** Compound assignment problem*


    `int myInt = 2;`

    `myInt *= (myInt = 4);`

    `System.out.println(myInt);`


    The last assignment before the print statement is `myInt = 4`, so you might think
    the answer must be 4\. But we set `myInt` to 4 and then multiply it by itself,
    so you might think the answer must be 16\. In fact, neither is correct. The code
    snippet prints 8\. It might seem odd at first, but it makes sense once you understand
    how the JVM deals with a compound operator. When the JVM encounters the compound
    operator, it knows myInt equals 2\. Until the entire operator is resolved, the
    value of `myInt` can''t be changed. (This is the only case we know of where parentheses
    aren''t processed first, by the way.) Consequently, the assignment within the
    line is ignored, but the value within the assignment is used. After all that,
    the result is 2 times 4, or 8.


    ![images](images/square.jpg) **Note** This issue is pretty much an academic curiosity.
    It''s an issue the developers of the Java language had to account for, but smart
    programmers don''t write code like this. Smart programmers break up their operations
    so that the effect of each line is clear with minimal interpretation. Remember,
    if you program for a living, other programmers have to read your code and understand
    it, and very few development shops will tolerate this kind of confused and confusing
    code.


    [Table 4.3](#Chapter04.html#tab_4_3) shows all the assignment operators, including
    the compound operators.


    ![images](images/t0403.jpg)'
