    `actionPerformed` 方法监听菜单事件，要么退出游戏，要么开始新游戏。在开始新游戏的情况下，它可以使用当前设置（游戏区域大小和地雷数量）开始新游戏，也可以使用新设置开始新游戏。对于不同大小的新游戏，`actionPerformed`
