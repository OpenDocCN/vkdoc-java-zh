    \ conditional breakpoints to skip over the things you know aren't problems.\n\
    *   Watch for “copy and paste” errors. If you're using code you got from somewhere\
    \ else (including this book), it's very easy to neglect to change a variable to\
    \ the value you need from whatever was in the example you borrowed. It may look\
    \ right, because it's what you read when you went looking for an example, but\
    \ it's wrong because it's not what your program needs.\n*   Take the time to understand\
    \ the code. I'm a great one for rushing through things I think are simple, only\
    \ to discover they're not so simple. Painful experience has taught me to take\
    \ the time to fully understand the code I'm using (whether from a library or a\
    \ sample or my own code). Only by understanding the code in all its detail can\
    \ you understand the results the debugger is giving you.\n\nThat last one is actually\
    \ the hardest things developers do, by the way. Getting all the relationships\
    \ within a codebase into your head so that you have a clear idea of how it works,\
    \ usually called visualization, is a tough task. Good developers are good at visualization.\
    \ It's also why so many developers are good musicians, master video game players,\
    \ or both. All three pursuits require good visualization skills, and all good\
    \ developers are good puzzle solvers for the same reason. More so than formal\
    \ education or even experience, visualization is the key to being a good developer.\
    \ Of course, education and experience help you develop and refine your visualization\
    \ skill.\n\n### Fixing the Fireworks Program\n\nNow that you know enough to be\
    \ able to understand how I used the debugger to find and fix the issue, we can\
    \ return to my problem of making searchlights when I wanted fireworks.\n\nThe\
    \ first thing I had to do was figure out where the problem was happening. Fortunately,\
    \ I had isolated all of the code for drawing an individual firework into the draw()\
    \ method of the Firework class. Remember, each method should do one easily identified\
    \ task. Making debugging easier is one of the biggest reasons Java developers\
    \ follow that practice.\n\nFireworks program[Listing 11-1](#Chapter11.html#list_11_1)\
    \ shows the version of the method that was causing the problem.\n\n***Listing\
    \ 11-1.** The flawed `Firework.draw()` method*\n\n`void draw(Graphics g) {`\n\
    `  Color drawColor = color;`\n`  g.setColor(drawColor);`\n`  int height = panelHeight\
    \ - panelHeight / steps * currentStep;`\n`  if (height > burstY) {`\n`    g.drawLine(startX,\
    \ startY, burstX, height);`\n`  }`\n`  if(currentStep >= burstStep) {`\n`    for\
    \ (int i = 0; i < 12; i++) {`\n**`double xPrime, yPrime;`**\n`      double currentRadians\
    \ = Math.toRadians(30 * i);`\n\n`      int length = burstY / 2 / steps * currentStep;`\n\
    `      xPrime = (Math.cos(currentRadians)`\n`          - Math.sin(currentRadians))\
    \ * length;`\n`      yPrime = (Math.sin(currentRadians)`\n`          + Math.cos(currentRadians))\
    \ * length;`\n`      int endX = new Double(xPrime).intValue();`\n`      int endY\
    \ = new Double(yPrime).intValue();`\n\n`      g.drawLine(burstX, burstY, endX,\
    \ endY);`\n`    }`\n`  }`\n`  currentStep++;`\n`}`\n\nWithin the draw method,\
    \ I knew that the problem had to be inside the loop that drew the twelve splines\
    \ (the lines from the center to the edge of the firework). So, I was able to determine\
    \ that a good starting point for stepping through the code would be at the first\
    \ line inside the `for` loop.\n\nFrom that breakpoint, I stepped over each line\
    \ to the last line inside the `for` loop (that is, until I got to the `drawLine`\
    \ method). At that point, I could see that `endX` and `endY` had values I didn't\
    \ expect, and I had my first clue. (Debugging often makes me feel like a detective—maybe\
    \ that's why I like Sherlock Holmes so much.) [Figure 11-10](#Chapter11.html#fig_11_10)\
    \ shows the values in the debugger.\n\n![images](images/1110.jpg)\n\n***Figure\
    \ 11-10.** Incorrect values in the debugger*\n\nThe thing that tipped me off was\
    \ that the `endX` and `endY` values were the same as the value for the length\
    \ of the line. Those two values should be somewhere near the middle of the width\
    \ and height of the panel, which would be 200 for `endX` and 100 for `endY` (though\
    \ `endX` could vary a great deal more than `endY` because of the random starting\
    \ X location).\n\nSo, on my second debug run, I paid special attention to where\
    \ `endX` and `endY` got defined: in the two lines just before the `drawLine` method\
    \ call. That's when I realized that I had forgotten to account for the offset\
    \ from the edges of the screen (one of those palm-to-forehead moments wherein\
    \ I call myself an idiot, but at least I found the problem).\n\nFinally, I corrected\
    \ the code to the version you saw in [Chapter 10](#Chapter10.html#ch10), which\
    \ I'll give you again in [Listing 11-2](#Chapter11.html#list_11_2).\n\n***Listing\
    \ 11-2.** The corrected `Firework.draw()` method*\n\n`void draw(Graphics g) {`\n\
    `  Color drawColor = color;`\n`  g.setColor(drawColor);`\n`  int height = panelHeight\
    \ - panelHeight / steps * currentStep;`\n`  if (height > burstY) {`\n`    g.drawLine(startX,\
    \ startY, burstX, height);`\n`  }`\n`  if(currentStep >= burstStep) {`\n`    for\
    \ (int i = 0; i < 12; i++) {`\n`      double xPrime, yPrime;`\n`      double currentRadians\
    \ = Math.toRadians(30 * i);`"
  trans: "\n#### 设置条件断点\n\n另一个常见需求是设置条件断点，即仅在变量达到特定值时触发断点。你也可以同时检查多个变量的值。\n\n设置条件断点的方法如下：\n\
    \n1.  右键单击你想要设置为条件的断点。\n2.  选择**断点属性**。此时将显示断点的属性窗口（参见图 11-7）。\n\n    ![images](img/1107.jpg)\n\
    \n    ***图 11-7.** 断点属性窗口：*\n\n3.  勾选**启用条件**复选框。\n4.  在复选框下方的文本字段中，输入你的条件代码。这通常是一行普通的\
    \ Java 代码，不带分号。例如，如果你只想在 `currentStep` 的值大于等于 15 时触发此断点，可以设置如图 11-8 所示的条件。\n\n\
    \    ![images](img/1108.jpg)\n\n    ***图 11-8.** 已启用并指定断点条件：*\n\n5.  点击**确定**。\n\
    \n当你让代码运行（并点击应用程序中的 **Go** 按钮开始绘图）时，稍等片刻后，你将看到如图 11-9 所示的一组变量：\n\n![images](img/1109.jpg)\n\
    \n***图 11-9.** 条件断点处的变量：*\n\n如你所见，当 `currentStep` 达到 15 时，程序停止了。\n\n### 调试技巧与诀窍\n\
    \n既然你已经了解了使用 Eclipse 调试器的基本知识，这里有一些技巧和诀窍，可以在你使用任何调试器时提供帮助：\n\n*   **在循环中要特别警惕。**\
    \ 循环的本质是反复检查和定义一小部分值。因此，在遍历循环时，请仔细检查这些变量。我无法告诉你循环变量设置不当给我带来了多少次麻烦，但这种情况占了很大比例。\n\
    *   **在循环中使用条件断点。** 通常，问题直到某个特定值出现时才会暴露。反复观察同一组值并不有趣，而且无聊会削弱你的注意力，让你错过真正的问题。因此，请使用条件断点跳过那些你已知不是问题的部分。\n\
    *   **留意“复制粘贴”错误。** 如果你使用了从别处（包括本书）获取的代码，很容易忘记将变量从你借用的示例中的值更改为你需要的值。代码看起来可能正确，因为这是你寻找示例时读到的内容，但它实际上是错误的，因为它不符合你程序的需求。\n\
    *   **花时间理解代码。** 我常常急于完成那些我认为简单的事情，结果却发现它们并不简单。痛苦的经历教会了我，要花时间充分理解我正在使用的代码（无论是来自库、示例还是我自己的代码）。只有全面理解代码的每一个细节，你才能理解调试器给出的结果。\n\
    \n顺便说一句，最后一点实际上是开发人员所做的最困难的事情之一。将代码库中的所有关系都装进你的大脑，从而清晰地了解其工作原理——这通常被称为“可视化”——是一项艰巨的任务。优秀的开发人员都擅长可视化。这也是为什么许多开发人员同时也是优秀的音乐家、顶级的电子游戏玩家，或者两者兼备。这三项追求都需要良好的可视化技能，而所有优秀的开发人员也都是优秀的解谜者，原因相同。相比正规教育甚至经验，可视化是成为优秀开发人员的关键。当然，教育和经验有助于你培养和完善你的可视化技能。\n\
    \n### 修复烟花程序\n\n既然你已经掌握了足够的知识来理解我如何使用调试器查找并修复问题，我们可以回到我的问题上：我想要烟花效果，却得到了探照灯效果。\n\
    \n我首先要做的是找出问题出在哪里。幸运的是，我已经将绘制单个烟花的全部代码隔离到了 `Firework` 类的 `draw()` 方法中。请记住，每个方法应该只完成一个易于识别的任务。使调试更容易，是\
    \ Java 开发人员遵循这一实践的最重要原因之一。\n\n烟花程序清单 11-1 展示了导致问题的方法版本。\n\n***清单 11-1.** 有缺陷的\
    \ `Firework.draw()` 方法*\n\n`void draw(Graphics g) {`\n`  Color drawColor = color;`\n\
    `  g.setColor(drawColor);`\n`  int height = panelHeight - panelHeight / steps\
    \ * currentStep;`\n`  if (height > burstY) {`\n`    g.drawLine(startX, startY,\
    \ burstX, height);`\n`  }`\n`  if(currentStep >= burstStep) {`\n`    for (int\
    \ i = 0; i < 12; i++) {`\n**`double xPrime, yPrime;`**\n`      double currentRadians\
    \ = Math.toRadians(30 * i);`\n\n`      int length = burstY / 2 / steps * currentStep;`\n\
    `      xPrime = (Math.cos(currentRadians)`\n`          - Math.sin(currentRadians))\
    \ * length;`\n`      yPrime = (Math.sin(currentRadians)`\n`          + Math.cos(currentRadians))\
    \ * length;`\n`      int endX = new Double(xPrime).intValue();`\n`      int endY\
    \ = new Double(yPrime).intValue();`\n\n`      g.drawLine(burstX, burstY, endX,\
    \ endY);`\n`    }`\n`  }`\n`  currentStep++;`\n`}`\n\n在 draw 方法内部，我知道问题一定出在绘制十二条射线（从烟花中心到边缘的线条）的循环中。因此，我能够确定，单步执行代码的一个良好起点是\
    \ `for` 循环内的第一行。\n\n从这个断点开始，我逐行执行，直到 `for` 循环内的最后一行（即，直到我到达 `drawLine` 方法）。此时，我发现\
    \ `endX` 和 `endY` 的值出乎我的意料，我得到了第一个线索。（调试常常让我感觉自己像个侦探——也许这就是我如此喜欢夏洛克·福尔摩斯的原因。）图\
    \ 11-10 显示了调试器中的值。\n\n![images](img/1110.jpg)\n\n***图 11-10.** 调试器中显示的错误值*\n\n\
    让我发现问题的是，`endX` 和 `endY` 的值与线条长度的值相同。这两个值应该位于面板宽度和高度的中间附近，即 `endX` 约为 200，`endY`\
    \ 约为 100（尽管由于起始 X 位置是随机的，`endX` 的变化可能比 `endY` 大得多）。\n\n因此，在第二次调试运行时，我特别关注了 `endX`\
    \ 和 `endY` 被定义的地方：就在调用 `drawLine` 方法之前的那两行代码。这时我才意识到，我忘记了考虑屏幕边缘的偏移量（这是一个“拍脑门”的时刻，我骂自己是白痴，但至少我找到了问题）。\n\
    \n最后，我将代码修正为你之前在第 10 章中看到的版本，我将在清单 11-2 中再次给出。\n\n***清单 11-2.** 修正后的 `Firework.draw()`\
