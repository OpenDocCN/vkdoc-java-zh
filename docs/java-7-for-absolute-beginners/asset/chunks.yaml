    在本书的其余部分，我们将反复使用所有这些概念和技术。随着我们更深入地使用 Java，你将大量使用基本类型、`String` 对象、基本类型和 `String`
    字面量以及数组。枚举在大多数代码中出现频率较低，但在需要时它们提供了重要的优势（最显著的是类型安全）。


    ## 第 4 章


    ## 运算符


    Java 包含许多运算符，从普通的数学运算符（如减号 −）到仅适用于面向对象编程的运算符（如 `instanceof`）。首先，让我们看看表 4-1 中的运算符列表。


    ![images](img/t0401.jpg)


    ![images](img/t0401a.jpg)


    #### 运算符优先级


    关于运算符，首先要了解的是它们具有优先级。我至今还记得初中代数课上史密斯先生教我们背诵“请原谅我亲爱的萨莉阿姨”这句话。这个奇怪的短语是代数中运算顺序（运算符优先级的另一种说法）的有效助记符。它缩写为
    PEMDAS，代表括号、指数、乘法、除法、加法和减法。得益于运算符优先级（就我而言，还要感谢史密斯先生），在处理代数方程时，我们知道先解析括号，再解析指数，然后解析乘法，以此类推。


    同样的情况也适用于 Java（以及许多其他编程语言）。然而，如前所述，Java 的运算符远不止六个。此外，Java 中有些运算符具有相同的优先级。在这种情况下，对于二元运算符（赋值运算符除外），优先级从左到右进行；对于赋值运算符，优先级从右到左进行。这听起来可能有点混乱，但我们很快就会通过一些示例来阐明运算顺序，并指出一些人们经常出错的问题点。


    #### 缺失的运算符：括号


    括号不在 Java 运算符列表中，但它们充当了优先级最高的运算符。括号内的任何内容都会首先被解析。当一行中有多组括号时，它们会从最内层到最外层、从左到右依次解析。让我们看看清单
    4-1 中的一些示例。


    ***清单 4-1.** 作为运算符的括号*


    `System.out.println(2 + 4 / 2); // 先处理除法，因此打印 4`

    `System.out.println((2 + 4) / 2); // 先处理加法，因此打印 3`

    `System.out.println((2 + 4) / 3 * 2); // 打印 4，而不是 1 – 原因见下文`

    `System.out.println((2 + 4) / (3 * 2)); // 打印 1`

    `System.out.println((2 + 4) / (2 * 2)); // 打印 1 – 注意截断`

    `System.out.println((2.0 + 4.0) / (2.0 * 2.0)); // 打印 1.5`


    加粗的那一行打印 4，`因为`除法运算符在乘法运算符之前被处理。这是因为相同优先级的运算符从左到右处理。在代数中，乘法优先于除法。然而，Java 不是代数，这有时会让记住代数的
    Java 新手感到困惑。（我至少在这个差异上栽过一次跟头。）


    第五行打印 1，因为我们使用了整数字面量（如前一章所述）。因此，我们得到的是一个整数字面量。Java 在处理整数时会截断（即丢弃）任何余数，所以 1.5 变成了
    1。最后一行使用了浮点字面量，因此返回 1.5。值为 1.9 也会被截断为 1。截断不是一种四舍五入；截断后的值会移除小数点右侧的所有值。


    作为一条规则，请记住使用括号来澄清你的代码，并确保运算的正确顺序。我首先提到清晰性是有原因的：清晰性大有裨益。如果你能通过将一行代码拆分成多行来使运算对其他开发者（以及日后重新查看代码的自己）更清晰，那么请这样做。如果你的同事能毫不费力地理解你的代码，他们会感谢你的。


    #### 后缀运算符


    术语 *后缀* 在数学、语言学和其他领域有多种含义。在计算机科学中，它指的是跟在表达式后面的运算符。Java 的两个后缀运算符用于对值进行递增（加一）和递减（减一）。清单
    4-2 展示了一些示例：


    ***清单 4-2.** 后缀运算符*


    `private int getC() {`

    `  int c = 0;`

    `  c++; // c 现在为 1`

    `  c--; // c 现在为 0`

    `  return c++; // 返回 0`

    `}`


    那么为什么返回 0 呢？因为后缀运算符首先返回原始值，然后将新值赋给变量。这个特定的语言细节让很多 Java 新手程序员感到困扰。要解决这个问题，可以在表达式之前使用一元
    ++ 运算符（接下来会介绍），而不是在表达式之后使用后缀运算符，或者将 return 语句单独放在一行。顺便提一下，在表达式 `(c++)` 周围加上括号并不会让这个方法返回
    1，因为 `c` 在括号内已经被设置为 0。

