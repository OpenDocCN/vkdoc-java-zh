    这两个类创建的程序看起来就像图 10-1 中的图像。


    ![images](img/1001.jpg)


    ***图 10-1.** ScootBall 的初始状态*


    `ScootBallPanel` 类的核心是 `run` 方法，它实现了 `Runnable` 接口中对应的 `run` 方法。该方法所做的就是运行一个连续循环，休眠一段时间，然后重绘面板。休眠的时间决定了帧率。在这个例子中，它休眠
    40 毫秒，产生大约 25 帧的帧率。我用了“大约”这个词，因为重绘需要一些时间，导致实际帧率略低于 25。我们将在下一个示例中看到如何获得更精确的帧率。


    `paint` 方法在屏幕上绘制球，每次都在一个新位置，直到该位置超出面板的宽度。具体来说，调用 `super.paintComponent(g)` 会将面板重绘为其原始状态（一个空白的白色方框）。随后的几行代码则绘制球。图
    10-2 展示了一个球在屏幕上滑动的画面。


    ![images](img/1002.jpg)


    ***图 10-2.** 运行中的 ScootBall*


    ScootBall 算不上一个复杂的程序，但它演示了动画的基础：每隔一段时间（通常是每秒若干次）绘制更新后的图像。接下来，让我们看一个稍微复杂一些（也因此更有趣）的示例。

