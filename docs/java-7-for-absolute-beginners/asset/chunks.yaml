    与 `MineSweeperMouseListener` 类类似，`MineSweeperActionListener` 也必须同时拥有一个 `MineSweeper`
    对象和一个 `MineSweeperHelper` 对象。为此，它有一个提供这两个对象的构造函数。该类中唯一的方法（请记住，构造函数虽然看起来很像，但它不是方法）是
