    just for fun (it certainly wouldn''t be a money maker, because many Minesweeper
    apps already exist for Android—most of my projects are for fun and my own learning).
    Also, it''s the kind of abstraction that makes for good design. When the real-world
    situation you model has discrete objects, it''s good practice to create a class
    for each of those objects. In this case, a mine is a discrete real-world object
    (to which the game adds another layer of abstraction, in fact), so a `Mine` class
    is a good choice. The same applies to a minefield, so the `MineField` class is
