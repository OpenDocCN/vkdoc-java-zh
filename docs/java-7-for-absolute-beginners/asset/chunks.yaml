    ### 正则表达式


    如果你曾在计算机的命令行中处理过文件，很可能在不知不觉中已经使用过正则表达式。例如，我最近想获取某个目录下（Windows 7 系统）所有 HTML 文件的列表。在命令窗口中，我输入了
    `dir *.htm`，便得到了所需的列表。`*.htm` 实际上就是一个正则表达式，表示所有扩展名为 `htm` 的文件。假设我想获取所有文件名以 "s"
    开头的 HTML 文件，命令则应为 `dir s*.htm`。Java 中的正则表达式工作原理与此类似，只不过你可以指定更为复杂的模式。


    Java 的正则表达式包是 `java.util.regex`。它包含了 `MatchResult` 接口、`Matcher` 类（实现了 `MatchResult`
    接口）、`Pattern` 类以及 `PatternSyntaxException` 类。你不能直接实例化 `Matcher` 和 `Pattern` 类，因为它们没有公共构造方法。换句话说，`new
    Matcher` 和 `new Pattern` 是行不通的。相反，使用它们的模式是：首先通过调用 `Pattern` 类中的某个 `compile` 方法来获取一个
    `Pattern` 对象。然后，通过调用 `Pattern` 类中的 `matcher` 方法来获取一个 `Matcher` 对象。最后，要查找与模式匹配的子字符串，需要调用
    `Matcher` 类中的 `find` 方法。让我们创建一个类来试验 `Pattern` 和 `Matcher` 类。清单 15-11 展示了此类的一个可能实现。


    ***清单 15-10.** RegexTester 类*


    `package com.bryantcs.examples;`


    `import java.util.regex.Matcher;`

    `import java.util.regex.Pattern;`


    `public class RegexTester {`


    `  public static void main(String[] args) {`

    `    Pattern pattern = Pattern.compile(args[0]);`

    `    Matcher matcher = pattern.matcher(args[1]);`

    `    while(matcher.find()) {`

    `      String groupText = matcher.group();`

    `      int matchBegin = matcher.start();`

    `      int matchEnd  = matcher.end();`

    `      StringBuilder sb = new StringBuilder("Found a match for ");`

    `      sb.append(groupText);`

    `      sb.append(" beginning at ");`

    `      sb.append(matchBegin);`

    `      sb.append(" and ending at ");`

    `      sb.append(matchEnd);`

    `      System.out.println(sb);`

    `    }`

    `  }`

    `}`


    `matcher.group` 为我们提供正在匹配的文本（这本质上是我们通过第二个参数指定的模式的结果）。`matcher.start` 为我们提供匹配字符串在输入字符串（第一个参数）中的起始位置。`matcher.end`
    为我们提供匹配字符串的结束位置。我使用了 `StringBuilder` 对象来避免产生过长的行，这在书中阅读起来很不方便。在我的生产代码中，出于性能考虑，我也经常使用
    `StringBuilder` 对象（连接运算符是创建 `String` 对象最糟糕的方式）。


    在我们深入探讨正则表达式的语法之前，先来了解一下如何向 RegexTester 程序传递值。同时，我们也将首次运行它。要为 RegexTester 设置参数，请按照以下步骤操作。


    1.  从 **运行** 菜单中，选择 **运行配置**。将出现运行配置窗口，如 图 15-2 所示。


    ![images](img/1502.jpg)


    ***图 15-2.** RegexTester 的运行配置*


    2.  在右侧窗格中，单击 **参数** 选项卡。将出现参数选项卡，如 图 15-3 所示。


    ![images](img/1503.jpg)


    ***图 15-3.** RegexTester 的空参数*


    3.  要设置我们的第一个测试数据，请在 **程序参数：** 字段中输入以下文本（包括引号）：


    `     "Sam" "Sam Spade;Yosemite Sam;Sam Merlotte;Samwise Gamgee;"`


    输入完成后，窗口应如 图 15-4 所示。


    ![images](img/1504.jpg)


    ***图 15-4.** RegexTester 的已填充参数*


    4.  要运行 RegexTester 程序，请单击 **运行**。程序的输出将显示在 Eclipse 控制台中，如 图 15-5 所示。


    ![images](img/1505.jpg)


    ***图 15-5.** Eclipse 控制台中 RegexTester 的输出*


    我不会为每个测试都展示所有这些步骤，但我认为第一次测试时看到这些步骤可能会对你有帮助。对于后续的测试，我将只展示在 **参数** 选项卡中输入的内容以及控制台中显示的内容。


    现在我们有了一个测试程序并知道如何使用它，我们需要专注于 Java 支持的正则表达式语法。正则表达式语法本身几乎就是一种语言，因此我们将重点介绍基础知识以及一些更常用的高级部分。整个内容足以写成一本书（而且确实有这样的书存在）。


    我们的简单测试用例使用了一个字符串字面量。字符串字面量只是一段文本。在我们刚刚运行的示例中，`"Sam"` 是一个字符串字面量。`"Spade"` 是另一个字符串字面量。如果我们将
    `"Sam"` 替换为 `"Spade"`，我们将在控制台中得到以下输出：


    `Found a match for Spade beginning at 4 and ending at 9`


    仅使用字符串字面量，我们能做的事情不多。我们可以找到特定字符串的所有实例，但无法找到任何与模式匹配的内容。要创建模式，我们必须深入正则表达式的关键组成部分——元字符。


    元字符是用于创建模式的字符。元字符不表示单个字面字符，而是表示一组字符。有些元字符可以单独使用，而其他元字符在没有其他元字符的情况下则毫无意义。表 15-1
    描述了 Java 正则表达式语法支持的元字符。


    ![image](img/t1501.jpg)

    ![image](img/t1501a.jpg)


    从所有这些示例中，我敢打赌你开始意识到正则表达式可以有多么强大。但实际上，描述元字符只是触及了正则表达式的皮毛。它远比我在这里展示的内容要丰富得多。让我们通过查看示例来进一步学习。


    回到我们涉及名为 Sam 的虚构角色的示例，假设我们想要获取完整的名称（包括分隔符，即分号）。我们可以尝试如下操作：


    `(Sam).*;`


    其输出为：


    `Found a match for Sam Spade;Yosemite Sam;Sam Merlotte;Samwise Gamgee; beginning
    at 0 and`

    `ending at 51`


    这行不通。问题在于 `.*` 模式会匹配它能匹配的所有内容（这称为贪婪匹配）。在这种情况下，它匹配了整行。幸运的是，Java 正则表达式语法包含一种使模式不贪婪的方法（正则表达式程序员称之为懒惰匹配）。要使匹配变为懒惰匹配，我们可以在模式后附加问号字符
    (?)，如下所示：


    `(Sam).*?;`


    该正则表达式的输出为：


    `Found a match for Sam Spade; beginning at 0 and ending at 10`

    `Found a match for Sam; beginning at 19 and ending at 23`

    `Found a match for Sam Merlotte; beginning at 23 and ending at 36`

    `Found a match for Samwise Gamgee; beginning at 36 and ending at 51`


    我们越来越接近了，但 "Yosemite Sam" 中的 "Yosemite" 去哪了？嗯，表达式以 (Sam) 开头，因此它只会匹配以 "Sam" 开头的部分，这不包括
    "Yosemite Sam"。解决方案是在开头和结尾都使用 `.*?` 模式，如下所示：


    `.*?(Sam).*?;`


    请注意，开头的模式也必须是懒惰的，否则我们又会得到整行。现在输出为：


    `Found a match for Sam Spade; beginning at 0 and ending at 10`

    `Found a match for Yosemite Sam; beginning at 10 and ending at 23`

    `Found a match for Sam Merlotte; beginning at 23 and ending at 36`

    `Found a match for Samwise Gamgee; beginning at 36 and ending at 51`

    '
- fmt: 'In this fashion, we''ve parsed a line containing multiple records. We could
    then add code to write each match to a separate line in a file or otherwise manipulate
    each of the matching values. This kind of parsing is a common task in software
    development, and regular expressions offer one good way to do it.


    As I have indicated, regular expressions can get a lot more complicated. The following
    regular expression removes `"Sam"` from each entry that starts with `"Sam"`:


    `S(?!am)|(?<!S)a|a(?!m)|(?<!Sa)m|[^Sam](.*?;)`


    Its output is:


    `Found a match for  Spade; beginning at 3 and ending at 10`

    `Found a match for Yosemite Sam; beginning at 10 and ending at 23`

    `Found a match for  Merlotte; beginning at 26 and ending at 36`

    `Found a match for wise Gamgee; beginning at 39 and ending at 51`


    The code to also remove the `"Sam"` in `"Yosemite Sam"` would be even more complex.
    As it happens, negating a group is one thing that regular expressions don''t make
    easy. In those cases, it''s often best to mix regular expressions with other `String`
    operations and to pass the result of one expression to another regular expression
    (a process known as chaining). Those techniques let you manage the complexity
    of your regular expressions and may offer better performance than a single complex
    regular expression.


    If you want to know more about regular expressions, start with the official Regular
    Expression Tutorial at [http://download.oracle.com/javase/tutorial/essential/regex/index.html](http://download.oracle.com/javase/tutorial/essential/regex/index.html)


    ### Summary


    This chapter covered the things that benefit from pattern matching: generics and
    regular expressions. About generics, we learned that:


    *   We can specify the kind of content that goes into a collection.

    *   Thanks to an improvement introduced in Java 7, we can use the diamond specifier
    (`<>`) to shorten our code a bit, so long as the compiler can determine the type
    from earlier in the line.

    *   Generics can have multiple parameters.

    *   We can nest generic parameters to ensure we get the proper kinds of objects
    at any depth.

    *   We can use wildcards within generic parameters, to accommodate similar objects
    (any object that extends a particular class or implements a particular set of
    interfaces or both).

    *   Generics let us catch problems at coding time rather than at run time, saving
    time and embarrassment.


    About regular expressions, we learned:


    *   How to instantiate the member classes (`Matcher` and `Pattern`) of the `java.util.regex`
    package.

    *   What each of the metacharacters does.

    *   How to combine the metacharacters in a number of useful ways.

    *   How to make a pattern be reluctant (match the fewest possible characters)
    rather than greedy (match the most possible characters).

    *   That regular expressions can become very complex and a bit about how to manage
    that complexity.


    This chapter covered two language features that I hope you will find useful as
    you develop your own programs. I especially hope that you''ll use generics any
    time you use a collection, as you should embrace best practices whenever you can.
    As for regular expressions, remember that they are supposed to make things simpler.
    If you find that a regular expression is too hard to figure out, break it up with
    other `String` operations and use multiple regular expressions rather than one
    big one.


