    ### Summary


    In this chapter, we learned the basics about the various data types that are available
    in Java. We found out:


    *   The size restrictions of the various numeric data types

    *   How the `boolean` data type works

    *   How `char` variables and `String` objects work and a bit about how they can
    interact

    *   How arrays work

    *   What a null is and how to use one to good effect

    *   How to create and use enumerations


    We make repeated use of all these concepts and techniques throughout the rest
    of the book. As we work more with Java, you''ll do a lot with primitives, the
    `String` object, primitive and `String` literals, and arrays. Enumerations appear
    less often in most code, but they offer important advantages (most notably type
    safety) when we need them.


    ## C H A P T E R  4


    ## Operators


    Java includes many operators, from ordinary mathematical operators such as a minus
    sign (−) to operators that only make sense for object-oriented programming, such
    as `instanceof`. To start with, let''s look at the list of operators in [Table
    4-1](#Chapter04.html#tab_4_1).


    ![images](images/t0401.jpg)


    ![images](images/t0401a.jpg)


    #### Operator Precedence


    The first thing to know about operators is that they have precedence. I can''t
    forget Mr. Smith in junior high algebra class teaching us to memorize Please Excuse
    My Dear Aunt Sally. That odd phrase is an effective mnemonic for the order of
    operations (another name for operator precedence) in algebra. It shortens to PEMDAS,
    which gives us Parentheses, Exponent, Multiplication, Division, Addition, and
    Subtraction. Thanks to operator precedence (and, in my case, Mr. Smith), when
    we work with algebra equations, we know to resolve parentheses before we resolve
    exponents, exponents before multiplication, and so on.


    The same kind of thing holds true in Java (and many other programming languages).
    However, as shown previously, Java has a lot more than six operators. Also, Java
    has some operators that have the same level of precedence. In those cases, precedence
    proceeds from left to right for binary operators (except assignment operators)
    and right to left for assignment operators. That''s probably as clear as mud,
    but we get to some examples shortly that clarify the order of operations and identify
    some of the problem spots where people often trip.


    #### The Missing Operator: Parentheses


    Parentheses aren''t in the list of Java operators, but they act as an operator
    with the highest precedence. Anything in parentheses is resolved first. When a
    line has several sets of parentheses, they are resolved from innermost to outermost
    and from left to right. Let''s consider some examples in [Listing 4-1](#Chapter04.html#list_4_1).


    ***Listing 4-1.** Parentheses as an operator*


    `System.out.println(2 + 4 / 2); // division processed first, so prints 4`

    `System.out.println((2 + 4) / 2); // addition processed first, so prints 3`

    `System.out.println((2 + 4) / 3 * 2); // prints 4, not 1 – see below for why`

    `System.out.println((2 + 4) / (3 * 2)); // prints 1`

    `System.out.println((2 + 4) / (2 * 2)); // prints 1 – note the truncation`

    `System.out.println((2.0 + 4.0) / (2.0 * 2.0)); // prints 1.5`


    The bolded line prints 4 `because` the division operator gets processed before
    the multiplication operator. That happens because operators of equal precedence
    get processed from left to right. In algebra, multiplication comes before division.
    However, Java is not algebra, and that sometimes trips up new Java developers
    who remember their algebra. (I''ve tripped over that difference at least once.)


    The fifth line prints 1 because we use integer literals (as we covered in the
    previous chapter). Consequently, we get back an integer literal. Java truncates
    (that is, throws away) any remainder when dealing with integers, so 1.5 becomes
    1. The last line uses floating-point literals, so it returns 1.5\. A value of
    1.9 would also be truncated to 1\. Truncation is not a kind of rounding; a truncated
    value has any value to the right of the decimal place removed.


    As a rule, remember to use parentheses to clarify your code and to ensure the
    proper order for your operations. I mention clarity first for a reason: Clarity
    helps a lot. If you can gain clarity by splitting a line onto multiple lines to
    make your operations clear for other developers (and for yourself when you return
    to the code at a later date), then do so. Your fellow developers will thank you
    if they can understand your code without a struggle.


    #### Postfix Operators


    The term *postfix* has a number of meanings in mathematics, linguistics, and other
    fields. In computer science, it means an operator that follows an expression.
    Java''s two postfix operators increment (increase by one) and decrement (decrease
    by one) values. [Listing 4-2](#Chapter04.html#list_4_2) shows some examples:


    ***Listing 4-2.** Postfix operators*


    `private int getC() {`

    `  int c = 0;`

    `  c++; // c = 1 now`

    `  c--; // c = 0 now`

    `  return c++; //returns 0;`

    `}`


    So why does that return 0? Because the postfix operators first return the original
    value and then assign the new value to the variable. That particular language
    detail bites a lot of new Java programmers. To fix it, use the unary ++ operator
    (next on our list) before the expression rather than the postfix operator after
    the expression or move your return statement to its own line. Parentheses around
    the expression `(c++)` do not make this method return 1, by the way, because `c`
    would have been set to 0 within the parentheses.'
