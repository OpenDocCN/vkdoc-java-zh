    `TargetPanel` 类提供了游戏区域，并保持五个目标处于活跃状态。作为维持五个目标活跃的一部分，它还会检查其区域内的鼠标点击是否击中了目标。这些功能属于游戏逻辑的一部分。在这种情况下，游戏逻辑分布在多个类中是可以接受的。指导原则是每个类都有清晰、明确的任务。维持正确数量的目标活跃并检查目标是否被击中，是管理游戏区域的一部分，而这正是`TargetClickPanel`类的职责。这里有一个经验：尽可能将逻辑与用户界面分离。然而，更应优先考虑每个类都有明确目的的原则，而非将逻辑与表现分离。理想情况下，你可以同时实现这两个目标，但这并不总是可行的（就像这里一样）。


    ***清单 12-2.** TargetClickPanel 类*


