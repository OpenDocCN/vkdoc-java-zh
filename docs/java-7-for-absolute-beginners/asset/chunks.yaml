    ## 第 15 章


    ## 泛型与正则表达式


    已经了解 Java 的读者可能会问，为什么这两个主题会放在同一章。答案是它们都涉及模式匹配。泛型说明符（也称为参数）是一种模式，代码必须匹配该模式才能使用特定的代码块（可能是接口、类、方法或其他内容）。而正则表达式则使用模式在字符串中选择子字符串。在这两种情况下，模式都限制了可用的选择。两者还有其他好处，我们接下来会讲到。


    ### 泛型


    泛型提供了一种指定类、变量或方法可以使用的对象类型的方法。泛型最常见的用途是指定哪种类型的对象可以放入集合（如列表、树或哈希映射）中。另一个用途是允许在指定泛型的地方使用尚未指定的类型。从这个意义上说，该类型是泛型的，这也是这个概念名称的由来。在本节中，我们将看到这两种泛型的示例。


    在 Java 5 之前，Java 没有指定泛型的机制。这种缺失导致了许多问题，包括能够将意外类型的对象分配给集合（导致运行时错误）、必须将对象从一种类型强制转换为另一种类型，以及代码过于冗长和复杂。幸运的是，我们现在有办法避免这些问题。


    泛型说明符的语法依赖于尖括号字符（< 和 >）。要创建带有泛型说明符的集合，请在集合的类型说明符末尾添加泛型表达式，如清单 15-1 所示。


    ***清单 15-1.** 一个简单的泛型*


    `LinkedList<JPanel> panelList = new LinkedList<JPanel>();`


    这行代码声明了一个只能包含 `JPanel` 对象的 `LinkedList`。Java 7 引入了一种简洁的简写形式，可以略微减少代码量。具体来说，在创建参数化对象的实例时，如果编译器可以从行中的其他地方推断出类型，则可以省略类型声明。因此，清单
    15-1 中的代码可以替换为清单 15-2 中的代码。


    ***清单 15-2.** 一个简化的泛型*


    `LinkedList<JPanel> panelList = new LinkedList<>();`


    请注意，我们的 `LinkedList` 对象的构造函数表明它是泛型的，但没有提供可以放入列表中的对象类型。我们可以省略它，因为编译器可以从该变量声明的类型声明部分推断出
    `JPanel` 类型。顺便提一下，`<>` 表达式通常被称为“菱形运算符”。


    一个对象可以有多个参数，前提是存在匹配的类来定义该对象。清单 15-3 展示了一个示例。


    ***清单 15-3.** 一个多参数泛型*


    `package com.bryantcs.examples;`


    `public class GenericRole<Actor, Role> {`


    `        private Actor actor;`

    `        private Role role;`


    `        public GenericRole(Actor p, Role a) {`

    `                actor = p;`

    `                role = a;`

    `        }`


    `        public Actor getActor() {`

    `                return actor;`

    `        }`


    `        public Role getRole() {`

    `                return role;`

    `        }`

    `}`


    这个类的一个重要特性是，你不必创建 `Actor` 类或 `Role` 类。因为它使用了泛型，所以创建 `GenericRole` 对象实例的声明必须指定
    `Actor` 和 `Role` 对象的类型。


    正如我在本节开头提到的，这就是“泛型”一词的来源。这些对象此时可以未声明，因此从某种意义上说，它们是泛型的。


    那么，让我们来看一个使用我们的 `GenericRole` 类的类。请参考清单 15-4。


    ***清单 15-4.** 使用多参数泛型*


    `package com.bryantcs.examples;`


    `import java.util.LinkedList;`


    `public class GenericRoleProgram {`

    `        public static void main(String[] args) {`

    `                LinkedList<GenericRole<String, String>> roleMap =`

    `                        new LinkedList<GenericRole<>>();`


    `                roleMap.add(new GenericRole<String, String>("Humphrey Bogart",`

    `                                "Sam Spade"));`

    `                System.out.println(roleMap.getFirst().getActor() +`

    `                                " appeared on screen as " + roleMap.getFirst().getRole());`

    `        }`

    `}`

    '
- fmt: 'Notice that we now have parameters nested within parameters (in `LinkedList<GenericRole<String,
    String>> roleMap`). When a parameterized (that is, generic) collection consists
    of a type of object that itself has parameters, you get nested generic specifiers.
    It may seem odd, but it''s common practice once you start using generics.


    You can also specify that a collection can contain multiple kinds of objects,
    provided that the objects all extend the same class or implement the same interface.
    To do so, Java includes a wildcard (in the form of the question mark character)
    that you can use with generic specifiers. For an example, consider [Listing 15-5](#Chapter15.html#list_15_5).


    ***Listing 15-5.** Using the Generic Wildcard*


    `LinkedList<? extends JPanel> panels = new LinkedList<>();`


    That declaration says any class that extends `JPanel` can be a member of this
    list. Remember all the times I extended `JPanel` in the chapters about animation,
    video games, and recursion? If I ever need a single list to hold those different
    panels, the list above would do the job nicely.


    The `extends` keyword works with interfaces, too. So, if I wanted a list of classes
    that implement the `MouseListener` interface, I could use the declaration shown
    in [Listing 15-6](#Chapter15.html#list_15_6).


    ***Listing 15-6.** A Generic for an Interface*


    `LinkedList<? extends MouseListener> mouseListeners = new LinkedList<>();`


    ***Listing 15-7.** A Generic with the `Super` Keyword*


    `LinkedList<? super JPanel> panelAncestors = new LinkedList<>();`


    The `super` keyword specifies that any object extended by the `JPanel` class can
    be a member of this list. For this list, that would be objects of type `javax.swing.JComponent`.
    The `super` keyword is probably most useful when you want to ensure that the objects
    that satisfy a parameter are comparable (so that they can be sorted). In my experience,
    it''s not often used, so I won''t dive into it any further.


    Now that we''ve seen the syntax for generics, let''s talk about why you want to
    use them. The biggest benefit is earlier error detection. It''s a truism in software
    development (and many other professions) that the earlier you catch an error,
    the less expensive it is to fix. If we can catch an error at coding time, fixing
    it is just a matter of re-writing code we''re already working on; the cost is
    trivial. If an error makes it to the testers (assuming we have testers—not all
    software companies have test teams), it''s more expensive. The test team has to
    find it and tell the developer about it, the developer (who has moved on to some
    other task) has to re-open and modify that code, and then the test team has to
    verify that the fixed code works correctly. The worst result is when an error
    gets all the way to the customer; we get all the added expense of communicating
    with the test team and the customer, with the added (and usually more important)
    cost that the customer now thinks less of our software and our company. So let''s
    adopt techniques, including generics, that catch errors early.


    [Listing 15-9](#Chapter15.html#list_15_9) and [Listing 15-10](#Chapter15.html#list_15_10)
    demonstrate why generics promote early error detection.


    ***Listing 15-8.** An Ordinary List*


    ```

    List integerList = new LinkedList();

    integerList.add(new Integer(0));

    integerList.add("here''s a problem"); // perfectly legal and very wrong

    ```


    In [listing 15-9](#Chapter15.html#list_15_9), `integerList` can contain any object.
    I can pass objects of type `String` into that list. A name is just a name and,
    while it reveals the intent (which is good practice), it doesn''t offer any protection
    against someone passing things other than objects of type `Integer` into the list.
    Consequently, when someone does pass something other than an `Integer` object,
    we get a run-time error when we try to get `Integer` objects out of this list.


    So let''s see how generics prevent the testers or, worse, the customer from ever
    seeing our error.


    ***Listing 15-9.** A Generic List*


    ```

    List<Integer> integerList = new LinkedList<Integer>();

    integerList.add(new Integer(0));

    integerList.add("here''s a problem");

    ```


    The generic expression (or parameter) on the `List` declaration in the second
    example specifies that this list can contain only `Integer` objects. The `Integer`
    parameter prevents anyone from passing a `String` object (or anything but an `Integer`
    object) to `integerList`. When some other programmer tries to add an object that
    isn''t of type `Integer` to `integerList`, they get a compiler error. Their code
    can''t be compiled, and there''s no chance the customer will ever see an error
    because some sloppy coder confuses a `String` with an `Integer`. [Figure 15-1](#Chapter15.html#fig_15_1)
    shows the error that Eclipse produces when I try it.


    ![images](images/1501.jpg)


    ***Figure 15-1.** Type match error from trying to misuse a generic list*


    Notice how it says the proper argument for the `add` method is an `Integer` object.
    The `List` interface has no such method, in fact. However, the Eclipse compiler
    creates an instance of the `LinkedList` class that has such a method. Consequently,
    no one can compile code that violates the intention of our generic list. That
    prevents all the problems that might occur at run-time and prevents our fellow
    programmers, the testers, and ultimately our customers from thinking we must be
    idiots.


    Personally, I also find this kind of code to be easier to read and to write. Casting
    always feels like clutter to me. Purist that I am, I also much prefer to have
    the proper type in the first place and not need to cast.


    Finally, ensuring that your collections contain only the types you expect is one
    aspect of defensive programming (another good practice every programmer should
    adopt). If you ensure that no other programmer (including yourself at a later
    date) can pass bad values to your code, you ensure less trouble for your users.
    It''s a thankless task, as no one (except possibly your co-workers) will ever
    realize you did it, but it''s a good idea all the same. If you wish to think of
    it in more positive terms, think of it as ensuring that the developers who use
    your code are more likely to write error-free code. One of my co-workers (Matt
    Hinze, who also writes books about MVC when not coding) calls it “pushing our
    customers into a pit of success.” However you phrase it, limiting the possibilities
    for errors to creep into the system is the epitome of good software development
    practice.'
