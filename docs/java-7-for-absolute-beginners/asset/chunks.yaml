- fmt: "### Blocking Garbage Collection\n\nSometimes, you need an object to exist\
    \ for as long as your program runs. To make sure it continues to exist, you need\
    \ to ensure that a reference to that object always exists. Java offers a couple\
    \ of handy ways to ensure a reference always exists: singletons and reference\
    \ lists.\n\nA singleton is a class that can never have more than one instance.\
    \ Java developers have a number of techniques for creating a singleton, but [Listing\
    \ 13-5](#Chapter13.html#list_13_5) shows one common way to do it.\n\n**Listing\
    \ 13-5.** Making a Singleton\n\n```\npublic class Singleton {\n  private static\
    \ Singleton instance = new Singleton();\n\n  private Singleton() {\n    // initialization\
    \ stuff goes here\n  }\n\n  public synchronized static Singleton instance() {\n\
    \    return instance;\n  }\n}\n```\n\nBecause there's always a static instance\
    \ of the class held within the class itself, there's always a reference to this\
    \ kind of singleton. We make the `instance()` method `synchronized` so that, if\
    \ two objects call the method at the same time, they take turns. Otherwise, they\
    \ might get the object in the wrong state (in cases where some other method updates\
    \ the data in the singleton class). As a rule, synchronize any method that returns\
    \ a static object (not including constants).\n\nOf course, if you need more than\
    \ one instance of a class, that's not going to work. In those cases, you can use\
    \ a reference list. Consider the program class shown in [Listing 13-6](#Chapter13.html#list_13_6).\n\
    \n**Listing 13-6.** Program Class with a Reference List\n\n```\npackage com.bryantcs.examples.referenceList;\n\
    \nimport java.util.ArrayList;\n\npublic class ReferenceProgram {\n\n  // This\
    \ list lasts as long as the program runs\n  public static ArrayList<Object> referenceList;\n\
    \n  public static void main(String[] args) {\n    referenceList = new ArrayList<Object>();\n\
    \  }\n}\n```\n\nAs the comment within the class says, the `referenceList` object\
    \ will have a reference for as long as the program runs. So far, so good, but\
    \ how do we add to it? The trick to that is to have any class we need to keep\
    \ around to add itself to the list, as shown in the next code listing:\n\n**Listing\
    \ 13-7.** Class that Adds Itself to a Reference List\n\n```\npackage com.bryantcs.examples.referenceList;\n\
    \npublic class ClassToList {\n\n  public ClassToList() {\n    ReferenceProgram.referenceList.add(this);\n\
    \  }\n}\n```\n\nSince `ReferenceProgram.referenceList` is static, it is a class\
    \ variable, which means there's only one of them, regardless of the number of\
    \ instances we may make of the `ReferenceProgram` class. (Of course, in this very\
    \ simple example, we wouldn't make more than one instance of the `ReferenceProgram`\
    \ class anyway.) As a result, we can add to that single list from anywhere within\
    \ the program. Thus, we have a handy mechanism for ensuring that a reference to\
    \ any given class always exists and, consequently, that any instance of this class\
    \ will never be garbage collected.\n\nWhile these techniques work, you should\
    \ avoid overusing both the singleton pattern and the reference list pattern. If\
    \ you prevent the garbage collector from removing many objects, your program performs\
    \ that much more slowly.\n\n### A New Garbage Collector\n\nAs we saw earlier in\
    \ the chapter, Java 7 includes a new garbage collector, called G1. G1 is a concurrent\
    \ garbage collector, meaning that it uses multiple processors (if available) at\
    \ the same time. Also, as we read earlier in the chapter, the G1 collector's “garbage\
    \ first” algorithm offers better performance than other collectors, regardless\
    \ of the number of processors. For a computer with just one processor (or a shared\
    \ computer that makes only one processor available to the JVM), G1 should offer\
    \ some improvement over any other garbage collector (though the nature of the\
    \ application may limit the improvement). If G1 can get access to at least two\
    \ processors, the improvement in performance should be even better. Given that\
    \ most modern computers have multiple processors and modern server-class computers\
    \ often have numerous processors, G1 may provide a sizable performance boost for\
    \ some applications. That's going to result in games that play more smoothly,\
    \ web applications that return web pages more quickly, and all the other good\
    \ things that come with higher-performance applications.\n\n### Summary\n\nIn\
    \ this chapter, we've touched on one of Java's more advanced concepts: garbage\
    \ collection. We've just skimmed the surface of this advanced topic, with an eye\
    \ toward providing you with the basic information for optimizing your own applications.\
    \ If you really get into optimization, you can find whole books written about\
    \ the subject.\n\nIn this brief overview, we covered:\n\n- Memory allocation\n\
    - The garbage-collection algorithm used by Java\n- The variations on the algorithm\
    \ (naïve, incremental, and concurrent)\n- How the G1 collector improves on the\
    \ overall algorithm\n- The difference between a scavenge and a full collection\n\
    - That garbage collection is event-driven\n- That garbage collection is beyond\
    \ our direct control, but can be controlled indirectly\n- The most common settings\
    \ that control garbage collection\n- How to see what the garbage collector does\
    \ in each of its runs\n- How to use that information to optimize our garbage collection\
    \ settings (and thus the performance of our programs)\n- How to prevent an object\
    \ from ever being garbage collected\n- That Java 7 offers an improved garbage\
    \ collector named G1 (for “garbage first”)\n\nFor all that we've learned, I'd\
    \ like to point out that you can do a lot of programming without ever thinking\
    \ about garbage collection. Other than to collect sample data for this chapter,\
    \ I haven't changed a single garbage collection setting for the programs in this\
    \ book. However, if you stick with programming in Java, your programs will eventually\
    \ run into the bottleneck that arises from not controlling your garbage collection\
    \ settings. At that point, I want you to come back to this chapter and cover the\
    \ basics. Eventually, you may need more advanced information, but this set of\
    \ basic information will let you solve a lot of garbage collection problems.\n\
    \n## Chapter 14: Recursion\n\nRecursion has an undeserved reputation for being\
    \ hard to do and hard to control. For various reasons, many developers have trouble\
    \ using recursion as one of their programming tools. I suspect the difficulty\
    \ stems from two predicaments: having to give up control so that the recursive\
    \ classes or methods can do their work and not being able to “see” the recursion\
    \ work (though the debugger can solve the latter problem). Also, the first try\
    \ at recursion usually ends poorly, resulting in an infinite loop (that is, a\
    \ process that never stops), and software developers are trained to be very wary\
    \ of infinite loops. All of these problems can be overcome with surprisingly easy-to-use\
    \ and easy-to-understand techniques, which I'll address later in the chapter.\n\
    \nBefore I dive into how to work with recursions, though, let's take a close look\
    \ at what recursion is."
  raw: '### Blocking Garbage Collection


    Sometimes, you need an object to exist for as long as your program runs. To make
    sure it continues to exist, you need to ensure that a reference to that object
    always exists. Java offers a couple of handy ways to ensure a reference always
    exists: singletons and reference lists.


    A singleton is a class that can never have more than one instance. Java developers
    have a number of techniques for creating a singleton, but [Listing 13-5](#Chapter13.html#list_13_5)
    shows one common way to do it.


    ***Listing 13-5.** Making a Singleton*


    `public class Singleton {`


    `  private static Singleton instance = new Singleton();`


    `  private Singleton() {`

    `    // initialization stuff goes here`

    `  }`


    `  public synchronized static Singleton instance() {`

    `    return instance;`

    `  }`

    `}`


    Because there''s always a static instance of the class held within the class itself,
    there''s always a reference to this kind of singleton. We make the instance method
    synchronized so that, if two objects call the method at the same time, they take
    turns. Otherwise, they might get the object in the wrong state (in cases where
    some other method updates the data in the singleton class). As a rule, synchronize
    any method that returns a static object (not including constants).


    Of course, if you need more than one instance of a class, that''s not going to
    work. In those cases, you can use a reference list. Consider the program class
    shown in [Listing 13-6](#Chapter13.html#list_13_6).


    ***Listing 13-6.** Program Class with a Reference List*


    `package com.bryantcs.examples.referenceList;`


    `import java.util.ArrayList;`


    `public class ReferenceProgram {`


    `  // This list lasts as long as the program runs`

    `  public static ArrayList<Object> referenceList;`


    `  public static void main(String[] args) {`

    `    referenceList = new ArrayList<Object>();`

    `  }`

    `}`


    As the comment within the class says, the referenceList object will have a reference
    for as long as the program runs. So far, so good, but how do we add to it? The
    trick to that is to have any class we need to keep around to add itself to the
    list, as shown in the next code listing:


    ***Listing 13-7.** Class that Adds Itself to a Reference List*


    `package com.bryantcs.examples.referenceList;`


    `public class ClassToList {`


    `  public ClassToList() {`

    `    ReferenceProgram.referenceList.add(this);`

    `  }`

    `}`


    Since `ReferenceProgram.referenceList` is static, it is a class variable, which
    means there''s only one of them, regardless of the number of instances we may
    make of the `ReferenceProgram` class. (Of course, in this very simple example,
    we wouldn''t make more than one instance of the `ReferenceProgram` class anyway.)
    As a result, we can add to that single list from anywhere within the program.
    Thus, we have a handy mechanism for ensuring that a reference to any given class
    always exists and, consequently, that any instance of this class will never be
    garbage collected.


    While these techniques work, you should avoid overusing both the singleton pattern
    and the reference list pattern. If you prevent the garbage collector from removing
    many objects, your program performs that much more slowly.


    ### A New Garbage Collector


    As we saw earlier in the chapter, Java 7 includes a new garbage collector, called
    G1\. G1 is a concurrent garbage collector, meaning that it uses multiple processors
    (if available) at the same time. Also, as we read earlier in the chapter, the
    G1 collector''s “garbage first” algorithm offers better performance than other
    collectors, regardless of the number of processors. For a computer with just one
    processor (or a shared computer that makes only one processor available to the
    JVM), G1 should offer some improvement over any other garbage collector (though
    the nature of the application may limit the improvement). If G1 can get access
    to at least two processors, the improvement in performance should be even better.
    Given that most modern computers have multiple processors and modern server-class
    computers often have numerous processors, G1 may provide a sizable performance
    boost for some applications. That''s going to result in games that play more smoothly,
    web applications that return web pages more quickly, and all the other good things
    that come with higher-performance applications.


    ### Summary


    In this chapter, we''ve touched on one of Java''s more advanced concepts: garbage
    collection. We''ve just skimmed the surface of this advanced topic, with an eye
    toward providing you with the basic information for optimizing your own applications.
    If you really get into optimization, you can find whole books written about the
    subject.


    In this brief overview, we covered:


    *   Memory allocation

    *   The garbage-collection algorithm used by Java

    *   The variations on the algorithm (naïve, incremental, and concurrent)

    *   How the G1 collector improves on the overall algorithm

    *   The difference between a scavenge and a full collection

    *   That garbage collection is event-driven

    *   That garbage collection is beyond our direct control, but can be controlled
    indirectly

    *   The most common settings that control garbage collection

    *   How to see what the garbage collector does in each of its runs

    *   How to use that information to optimize our garbage collection settings (and
    thus the performance of our programs)

    *   How to prevent an object from ever being garbage collected.

    *   That Java 7 offers an improved garbage collector named G1 (for “garbage first”)


    For all that we''ve learned, I''d like to point out that you can do a lot of programming
    without ever thinking about garbage collection. Other than to collect sample data
    for this chapter, I haven''t changed a single garbage collection setting for the
    programs in this book. However, if you stick with programming in Java, your programs
    will eventually run into the bottleneck that arises from not controlling your
    garbage collection settings. At that point, I want you to come back to this chapter
    and cover the basics. Eventually, you may need more advanced information, but
    this set of basic information will let you solve a lot of garbage collection problems.


    ## C H A P T E R  14


    ## Recursion


    Recursion has an undeserved reputation for being hard to do and hard to control.
    For various reasons, many developers have trouble using recursion as one of their
    programming tools. I suspect the difficulty stems from two predicaments: having
    to give up control so that the recursive classes or methods can do their work
    and not being able to “see” the recursion work (though the debugger can solve
    the latter problem). Also, the first try at recursion usually ends poorly, resulting
    in an infinite loop (that is, a process that never stops), and software developers
    are trained to be very wary of infinite loops. All of these problems can be overcome
    with surprisingly easy-to-use and easy-to-understand techniques, which I''ll address
    later in the chapter.


    Before I dive into how to work with recursions, though, let''s take a close look
    at what recursion is.'
  trans: '

    ### 阻止垃圾回收


    有时，你需要某个对象在程序运行的整个过程中都存在。为了确保它持续存在，你需要保证始终存在对该对象的引用。Java 提供了几种便捷的方法来确保引用始终存在：单例和引用列表。


    单例是一个永远不能有多个实例的类。Java 开发人员有多种创建单例的技术，但清单 13-5 展示了一种常见的方法。


    ***清单 13-5.** 创建单例*


    `public class Singleton {`


    `  private static Singleton instance = new Singleton();`


    `  private Singleton() {`

    `    // 初始化内容写在这里`

    `  }`


    `  public synchronized static Singleton instance() {`

    `    return instance;`

    `  }`

    `}`


    因为类内部始终持有该类的静态实例，所以对此类单例的引用始终存在。我们将 `instance` 方法设为同步（synchronized），这样如果两个对象同时调用该方法，它们会轮流执行。否则，它们可能会在错误的状态下获取对象（例如，当其他方法更新了单例类中的数据时）。通常，任何返回静态对象（不包括常量）的方法都应同步。


    当然，如果你需要一个类有多个实例，这种方法就行不通了。在这种情况下，你可以使用引用列表。请参考清单 13-6 中展示的程序类。


    ***清单 13-6.** 包含引用列表的程序类*


    `package com.bryantcs.examples.referenceList;`


    `import java.util.ArrayList;`


    `public class ReferenceProgram {`


    `  // 只要程序运行，此列表就存在`

    `  public static ArrayList<Object> referenceList;`


    `  public static void main(String[] args) {`

    `    referenceList = new ArrayList<Object>();`

    `  }`

    `}`


    正如类中的注释所说，只要程序运行，`referenceList` 对象就会拥有一个引用。到目前为止一切顺利，但我们如何向其中添加内容呢？诀窍在于，让任何我们需要保留的类将自己添加到该列表中，如下一个代码清单所示：


    ***清单 13-7.** 将自身添加到引用列表的类*


    `package com.bryantcs.examples.referenceList;`


    `public class ClassToList {`


    `  public ClassToList() {`

    `    ReferenceProgram.referenceList.add(this);`

    `  }`

    `}`


    由于 `ReferenceProgram.referenceList` 是静态的，它是一个类变量，这意味着无论我们创建多少个 `ReferenceProgram`
    类的实例，都只有一个这样的列表。（当然，在这个非常简单的例子中，我们无论如何也不会创建多个 `ReferenceProgram` 类的实例。）因此，我们可以从程序中的任何位置向这个唯一的列表添加内容。这样，我们就拥有了一种便捷的机制，可以确保对任何给定类的引用始终存在，从而确保该类的任何实例永远不会被垃圾回收。


    虽然这些技术有效，但你应该避免过度使用单例模式和引用列表模式。如果你阻止垃圾回收器移除大量对象，你的程序运行速度会慢得多。


    ### 新的垃圾回收器


    正如本章前面所述，Java 7 包含一个新的垃圾回收器，称为 G1。G1 是一种并发垃圾回收器，这意味着它可以同时使用多个处理器（如果可用）。此外，正如我们之前读到的，无论处理器数量多少，G1
    回收器的“垃圾优先”算法都能提供比其他回收器更好的性能。对于只有单个处理器的计算机（或只向 JVM 提供一个处理器的共享计算机），G1 应该能比任何其他垃圾回收器带来一些改进（尽管应用程序的性质可能会限制这种改进）。如果
    G1 能够访问至少两个处理器，性能提升应该会更大。鉴于大多数现代计算机都拥有多个处理器，而现代服务器级计算机通常拥有众多处理器，G1 可以为某些应用程序带来显著的性能提升。这将带来更流畅的游戏、更快返回网页的
    Web 应用程序，以及高性能应用程序带来的所有其他好处。


    ### 本章小结


    在本章中，我们触及了 Java 的一个更高级的概念：垃圾回收。我们只是浅尝辄止地了解了这个高级主题，旨在为你提供优化自己应用程序所需的基础信息。如果你真的深入研究优化，你会发现关于这个主题的整本书籍。


    在这篇简短的概述中，我们涵盖了：


    *   内存分配

    *   Java 使用的垃圾回收算法

    *   该算法的变体（朴素、增量式和并发式）

    *   G1 回收器如何改进整体算法

    *   清理（scavenge）与完全收集（full collection）的区别

    *   垃圾回收是事件驱动的

    *   垃圾回收超出了我们的直接控制，但可以间接控制

    *   控制垃圾回收的最常见设置

    *   如何查看垃圾回收器每次运行时的操作

    *   如何利用这些信息优化我们的垃圾回收设置（从而优化程序的性能）

    *   如何防止对象被垃圾回收

    *   Java 7 提供了一个改进的垃圾回收器，名为 G1（代表“垃圾优先”）


    尽管我们学到了这么多，但我想指出的是，你可以在完全不考虑垃圾回收的情况下进行大量编程。除了为本章收集示例数据外，我没有为本书中的程序更改过任何垃圾回收设置。然而，如果你坚持用
    Java 编程，你的程序最终会遇到因不控制垃圾回收设置而产生的瓶颈。到那时，我希望你回到本章，重温这些基础知识。最终，你可能需要更高级的信息，但这套基础知识将让你解决许多垃圾回收问题。


    ## 第 14 章


    ## 递归


    递归被不公平地认为难以实现且难以控制。由于各种原因，许多开发人员难以将递归作为编程工具之一使用。我怀疑困难源于两个困境：必须放弃控制权以便递归类或方法能够完成它们的工作，以及无法“看到”递归的工作过程（尽管调试器可以解决后一个问题）。此外，第一次尝试递归通常以糟糕的结局收场，导致无限循环（即永不停止的过程），而软件开发人员被训练要对无限循环非常警惕。所有这些问题都可以通过出奇易用且易理解的技术来克服，我将在本章后面讨论这些技术。


    不过，在我深入探讨如何使用递归之前，让我们先仔细看看什么是递归。

    '
- fmt: "### Recursion is Natural\n\nThe main reason I am surprised that so many developers\
    \ distrust recursion is that recursion is a feature of human language. We all\
    \ use it every day when we talk to one another. English utilizes recursion in\
    \ a number of situations. One of the rules (from the field within Linguistics\
    \ called Transformational Grammar, which I studied in college) of the English\
    \ language is that one sentence can be embedded into another sentence. I won't\
    \ dive into the sentence diagrams to prove it, but I'll give you an example in\
    \ the form of a children's rhyme from long ago:\n\nThis is the house that Jack\
    \ built.\n\nThis is the malt that lay in the house that Jack built.\n\nThis is\
    \ the rat that ate the malt that lay in the house that Jack built.\n\nAs you can\
    \ see, kids can keep going for as long as they can think of things to add (or\
    \ until their parents yell at them to stop). English supports recursion in other\
    \ situations as well. For instance, another rule in English is that we can stack\
    \ up prepositional phrases as deep as we like, thus:\n\nThe princess lives in\
    \ the castle.\n\nThe princess lives in the castle on the hill.\n\nThe princess\
    \ lives in the castle on the hill by the road.\n\nThe princess lives in the castle\
    \ on the hill by the road in the swamp.\n\nAgain, we can keep doing this for as\
    \ long as it amuses us to do so.\n\n### Recursion is Common\n\nYou encounter instances\
    \ of recursion every day and never think twice about them. The only notable feature\
    \ about the following sentence is that it involves a princess and a castle: “The\
    \ princess lives in the castle on the hill.” How many times have you said something\
    \ similar to “I live in a red house on Mulberry Street”?\n\nRecursion is common\
    \ in the field of computer science, too. A number of languages use recursion as\
    \ their main idiom for processing data. The most famous recursive programming\
    \ language is probably Lisp. Lisp stands for “List processing” and treats everything\
    \ as a list. The usual method of processing in Lisp is to read the first item\
    \ of a list (reducing the original list), process it, read the first value of\
    \ the remaining list, process it, and so on until the list is empty. XSLT (a grandchild\
    \ of Lisp through another language called DSSSL) works in a similar way, processing\
    \ XML nodes until it runs out of nodes.\n\nAll the programming languages with\
    \ which I am familiar also have one mechanism or another for supporting recursion.\
    \ Recursion may be easier or harder to achieve depending on the language, but\
    \ in my experience, it's always possible.\n\n### Know Your Stop Condition\n\n\
    Now that you know what recursion is and have discovered that recursion is actually\
    \ all around us, let's look at how to make it work. We'll start with a problem\
    \ that many software developers fear: the infinite loop.\n\nRecursion usually\
    \ generates an infinite loop because the developer fails to check for a stop condition\
    \ or for the correct stop condition. The trouble is that the stop condition always\
    \ depends on what you're doing. If you're processing a factorial, your stop condition\
    \ is the argument to the factorial symbol. Therefore, if you're calculating 10!\
    \ (10 factorial), you stop when you get to 10. Similarly, if you're processing\
    \ an XML file, the stop condition is the last child node.\n\nThe other problem\
    \ is that those conditions are not similar enough for many developers. People\
    \ like to be sure of things: they don't want to have to figure out the stop condition\
    \ every time. This issue often persuades developers to avoid recursion, even when\
    \ recursion is the best way to solve a problem.\n\nLet's look at one of the examples\
    \ I just mentioned, calculating a factorial:\n\n**Listing 14-1.** Calculating\
    \ a Factorial\n\n```\npackage com.bryantcs.examples.factorial;\n\npublic class\
    \ Factorial {\n\n  int calculate(int number) {\n    if (number < 0) {\n      throw\
    \ new IllegalArgumentException(\"integer must be 0+\");\n    }\n    if( number\
    \ == 0) {      return 1;\n    } else {\n      return number * calculate (number\
    \ - 1);\n    }\n  }\n    public static void main(String[] args) {\n    Factorial\
    \ factorial = new Factorial();\n    System.out.println(factorial.calculate(4));\n\
    \  }\n}\n```\n\nIn the `calculate` method, after checking for valid input, check\
    \ for the stop condition, which is the argument “1\". (Note the recursion in the\
    \ preceding sentence: “In … after … .” It really is common.)\n\n### When to Avoid\
    \ Recursion\n\nThe biggest problem with recursion is that each pass through the\
    \ method puts another object in the call stack. If you have a lot of recursion\
    \ to do, you can overflow the stack. As the following image shows, there are four\
    \ instances of the `calculate` method on the stack when the factorial of four\
    \ (4!) is calculated.\n\n![images](images/1401.jpg)\n\n**Figure 14-1.** `calculate`\
    \ Methods on the Call Stack\n\nIf I had calculated the factorial of ten (10!),\
    \ I would have had ten instances of the `calculate` method on the stack. To avoid\
    \ this problem, I can rewrite the method to use a loop instead, thus:\n\n**Listing\
    \ 14-2.** Converting Recursion to a Loop\n\n```\npackage com.bryantcs.examples.factorial;\n\
    \npublic class Factorial {\n\n  int calculate(int number) {\n    if (number <\
    \ 0) {\n      throw new IllegalArgumentException(\"integer must be 0+\");\n  \
    \  }\n    if( number == 0 || number == 1)\n      return 1;\n    else {\n     \
    \ int total = 1;\n      for (int i = 1; i < number + 1; i++) {\n        total\
    \ *= i;\n      }\n      return total;\n    }\n  }\n    public static void main(String[]\
    \ args) {\n    Factorial factorial = new Factorial();\n    System.out.println(factorial.calculate(4));\n\
    \  }\n}\n```\n\nSince it contains no calls to itself, the `calculate` method appears\
    \ on the stack only once. Therefore, the lesson here is that any time you can\
    \ easily replace recursion with a loop, you should do so.\n\n### When to Use Recursion\n\
    \nIf you should replace recursion with loops whenever you can easily do so, when\
    \ should you use recursion? The simple (but not helpful) answer is: when it's\
    \ useful to do so. But when is that? Essentially, you should use recursion when\
    \ you can't know (or can't be sure of) the number of times you need to process\
    \ something. Processing an XML file is a good illustration of this problem. When\
    \ you write a program to process an XML file, you can't be sure how many nodes\
    \ will be in the given XML file. It is possible to solve these kinds of problems\
    \ with `while` loops, but in this case, recursion is easier both to code and to\
    \ understand.\n\nIn addition to parsing, other problems are simply easier to code\
    \ with recursion. If you can significantly reduce the size of your code or gain\
    \ an algorithm that is easier to understand, you should consider recursion, even\
    \ in cases where the problem can be solved with loops. What sorts of things are\
    \ solved with recursive algorithms? Let's look at some common problems that utilize\
    \ recursion (and I'll code some of the more interesting ones later in the chapter):\n\
    \n*   Repetitive mathematical functions, such as a factorial, a sum of digits,\
    \ the Fibonacci sequence, and many others\n*   Any problem in which the depth\
    \ of processing is hard to predict (e.g., processing files and other data streams)\n\
    *   Certain kinds of searches (such as finding all the instances of a substring\
    \ within a string and finding all the instances of a particular data element in\
    \ a tree structure)\n*   Fractal images (which I'll focus on later in the chapter).\n\
    \nWithout further ado, I'll get to the fun stuff: coding solutions to problems\
    \ that are a good fit for recursion."
  raw: '### Recursion is Natural


    The main reason I am surprised that so many developers distrust recursion is that
    recursion is a feature of human language. We all use it every day when we talk
    to one another. English utilizes recursion in a number of situations. One of the
    rules (from the field within Linguistics called Transformational Grammar, which
    I studied in college) of the English language is that one sentence can be embedded
    into another sentence. I won''t dive into the sentence diagrams to prove it, but
    I''ll give you an example in the form of a children''s rhyme from long ago:


    This is the house that Jack built.


    This is the malt that lay in the house that Jack built.


    This is the rat that ate the malt that lay in the house that Jack built.


    As you can see, kids can keep going for as long as they can think of things to
    add (or until their parents yell at them to stop). English supports recursion
    in other situations as well. For instance, another rule in English is that we
    can stack up prepositional phrases as deep as we like, thus:


    The princess lives in the castle.


    The princess lives in the castle on the hill.


    The princess lives in the castle on the hill by the road.


    The princess lives in the castle on the hill by the road in the swamp.


    Again, we can keep doing this for as long as it amuses us to do so.


    ### Recursion is Common


    You encounter instances of recursion every day and never think twice about them.
    The only notable feature about the following sentence is that it involves a princess
    and a castle: “The princess lives in the castle on the hill.” How many times have
    you said something similar to “I live in a red house on Mulberry Street"?


    Recursion is common in the field of computer science, too. A number of languages
    use recursion as their main idiom for processing data. The most famous recursive
    programming language is probably Lisp. Lisp stands for “List processing” and treats
    everything as a list. The usual method of processing in Lisp is to read the first
    item of a list (reducing the original list), process it, read the first value
    of the remaining list, process it, and so on until the list is empty. XSLT (a
    grandchild of Lisp through another language called DSSSL) works in a similar way,
    processing XML nodes until it runs out of nodes.


    All the programming languages with which I am familiar also have one mechanism
    or another for supporting recursion. Recursion may be easier or harder to achieve
    depending on the language, but in my experience, it''s always possible.


    ### Know Your Stop Condition


    Now that you know what recursion is and have discovered that recursion is actually
    all around us, let''s look at how to make it work. We''ll start with a problem
    that many software developers fear: the infinite loop.


    Recursion usually generates an infinite loop because the developer fails to check
    for a stop condition or for the correct stop condition. The trouble is that the
    stop condition always depends on what you''re doing. If you''re processing a factorial,
    your stop condition is the argument to the factorial symbol. Therefore, if you''re
    calculating 10! (10 factorial), you stop when you get to 10\. Similarly, if you''re
    processing an XML file, the stop condition is the last child node.


    The other problem is that those conditions are not similar enough for many developers.
    People like to be sure of things: they don''t want to have to figure out the stop
    condition every time. This issue often persuades developers to avoid recursion,
    even when recursion is the best way to solve a problem.


    Let''s look at one of the examples I just mentioned, calculating a factorial:


    ***Listing 14-1.** Calculating a Factorial*


    `package com.bryantcs.examples.factorial;`


    `public class Factorial {`


    `  int calculate(int number) {`

    `    if (number < 0) {`

    `      throw new IllegalArgumentException("integer must be 0+");`

    `    }`

    `    if( number == 0) {      return 1;`

    `    } else {`

    `      return number * calculate (number - 1);`

    `    }`

    `  }`

    `    public static void main(String[] args) {`

    `    Factorial factorial = new Factorial();`

    `    System.out.println(factorial.calculate(4));`

    `  }`

    `}`


    In the calculate method, after checking for valid input, check for the stop condition,
    which is the argument “1". (Note the recursion in the preceding sentence: “In
    … after … .” It really is common.)


    ### When to Avoid Recursion


    The biggest problem with recursion is that each pass through the method puts another
    object in the call stack. If you have a lot of recursion to do, you can overflow
    the stack. As the following image shows, there are four instances of the `calculate`
    method on the stack when the factorial of four (4!) is calculated.


    ![images](images/1401.jpg)


    ***Figure 14-1.** `calculate` Methods on the Call Stack*


    If I had calculated the factorial of ten (10!), I would have had ten instances
    of the `calculate` method on the stack. To avoid this problem, I can rewrite the
    method to use a loop instead, thus:


    ***Listing 14-2.** Converting Recursion to a Loop*


    `package com.bryantcs.examples.factorial;`


    `public class Factorial {`


    `  int calculate(int number) {`

    `    if (number < 0) {`

    `      throw new IllegalArgumentException("integer must be 0+");`

    `    }`

    `    if( number == 0 || number == 1)`

    `      return 1;`

    `    else {`

    `      int total = 1;`

    `      for (int i = 1; i < number + 1; i++) {`

    `        total *= i;`

    `      }`

    `      return total;`

    `    }`

    `  }`

    `    public static void main(String[] args) {`

    `    Factorial factorial = new Factorial();`

    `    System.out.println(factorial.calculate(4));`

    `  }`

    `}`


    Since it contains no calls to itself, the calculate method appears on the stack
    only once. Therefore, the lesson here is that any time you can easily replace
    recursion with a loop, you should do so.


    ### When to Use Recursion


    If you should replace recursion with loops whenever you can easily do so, when
    should you use recursion? The simple (but not helpful) answer is: when it''s useful
    to do so. But when is that? Essentially, you should use recursion when you can''t
    know (or can''t be sure of) the number of times you need to process something.
    Processing an XML file is a good illustration of this problem. When you write
    a program to process an XML file, you can''t be sure how many nodes will be in
    the given XML file. It is possible to solve these kinds of problems with while
    loops, but in this case, recursion is easier both to code and to understand.


    In addition to parsing, other problems are simply easier to code with recursion.
    If you can significantly reduce the size of your code or gain an algorithm that
    is easier to understand, you should consider recursion, even in cases where the
    problem can be solved with loops. What sorts of things are solved with recursive
    algorithms? Let''s look at some common problems that utilize recursion (and I''ll
    code some of the more interesting ones later in the chapter):


    *   Repetitive mathematical functions, such as a factorial, a sum of digits, the
    Fibonacci sequence, and many others

    *   Any problem in which the depth of processing is hard to predict (e.g., processing
    files and other data streams)

    *   Certain kinds of searches (such as finding all the instances of a substring
    within a string and finding all the instances of a particular data element in
    a tree structure)

    *   Fractal images (which I''ll focus on later in the chapter).


    Without further ado, I''ll get to the fun stuff: coding solutions to problems
    that are a good fit for recursion.'
  trans: '

    ### 递归是自然的


    令我惊讶的是，许多开发者不信任递归，主要原因在于递归是人类语言的一个特征。我们每天相互交谈时都在使用它。英语在许多情境中都运用了递归。英语的规则之一（源自语言学中称为转换语法的领域，我在大学时学过）是，一个句子可以嵌入到另一个句子中。我不会深入句子图解来证明这一点，但我会用一个很久以前的童谣来举例：


    这是杰克建造的房子。


    这是放在杰克建造的房子里的麦芽。


    这是吃掉放在杰克建造的房子里的麦芽的老鼠。


    如你所见，孩子们可以一直继续下去，只要他们能想到要添加的东西（或者直到父母喊他们停下来）。英语在其他情境中也支持递归。例如，英语的另一条规则是，我们可以随心所欲地堆叠介词短语，就像这样：


    公主住在城堡里。


    公主住在山上的城堡里。


    公主住在路边山上的城堡里。


    公主住在沼泽地路边山上的城堡里。


    同样，只要觉得有趣，我们可以一直这样堆叠下去。


    ### 递归是常见的


    你每天都会遇到递归的例子，却从未多加思考。下面这句话唯一值得注意的特点就是它涉及公主和城堡：“公主住在路边山上的城堡里。” 你说过多少次类似“我住在桑树街的一栋红房子里”这样的话？


    递归在计算机科学领域也很常见。许多语言将递归作为处理数据的主要范式。最著名的递归编程语言大概是 Lisp。Lisp 代表“列表处理”，并将一切视为列表。Lisp
    中通常的处理方法是读取列表的第一个元素（从而缩减原列表），处理它，再读取剩余列表的第一个值，处理它，如此反复，直到列表为空。XSLT（通过另一种名为 DSSSL
    的语言，它是 Lisp 的“后代”）以类似的方式工作，处理 XML 节点，直到没有节点可处理为止。


    我所熟悉的所有编程语言也都拥有某种支持递归的机制。根据语言的不同，实现递归可能更容易或更困难，但根据我的经验，它总是可行的。


    ### 了解你的终止条件


    既然你已经知道什么是递归，并且发现递归其实无处不在，那么让我们来看看如何让它工作。我们将从一个令许多软件开发者恐惧的问题开始：无限循环。


    递归通常会产生无限循环，因为开发者未能检查终止条件，或者未能检查正确的终止条件。问题在于，终止条件总是取决于你在做什么。如果你在处理阶乘，你的终止条件就是阶乘符号的参数。因此，如果你在计算
    10!（10 的阶乘），当计算到 10 时就停止。类似地，如果你在处理一个 XML 文件，终止条件就是最后一个子节点。


    另一个问题是，对于许多开发者来说，这些条件并不够相似。人们喜欢确定的事情：他们不想每次都去弄清楚终止条件。这个问题常常促使开发者避免使用递归，即使递归是解决问题的最佳方式。


    让我们看看我刚才提到的例子之一，计算阶乘：


    ***清单 14-1.** 计算阶乘*


    `package com.bryantcs.examples.factorial;`


    `public class Factorial {`


    `  int calculate(int number) {`

    `    if (number < 0) {`

    `      throw new IllegalArgumentException("integer must be 0+");`

    `    }`

    `    if( number == 0) {      return 1;`

    `    } else {`

    `      return number * calculate (number - 1);`

    `    }`

    `  }`

    `    public static void main(String[] args) {`

    `    Factorial factorial = new Factorial();`

    `    System.out.println(factorial.calculate(4));`

    `  }`

    `}`


    在 `calculate` 方法中，在检查有效输入之后，检查终止条件，即参数“1”。（注意前面句子中的递归：“在……之后，检查……”。递归确实很常见。）


    ### 何时避免递归


    递归最大的问题是，每次通过方法调用都会在调用栈中放入另一个对象。如果你需要执行大量递归，可能会溢出栈。如下图所示，当计算 4 的阶乘（4!）时，栈上有四个
    `calculate` 方法的实例。


    ![图片](img/1401.jpg)


    ***图 14-1.** 调用栈上的 `calculate` 方法*


    如果我计算了 10 的阶乘（10!），栈上就会有十个 `calculate` 方法的实例。为了避免这个问题，我可以重写该方法，改用循环，如下所示：


    ***清单 14-2.** 将递归转换为循环*


    `package com.bryantcs.examples.factorial;`


    `public class Factorial {`


    `  int calculate(int number) {`

    `    if (number < 0) {`

    `      throw new IllegalArgumentException("integer must be 0+");`

    `    }`

    `    if( number == 0 || number == 1)`

    `      return 1;`

    `    else {`

    `      int total = 1;`

    `      for (int i = 1; i < number + 1; i++) {`

    `        total *= i;`

    `      }`

    `      return total;`

    `    }`

    `  }`

    `    public static void main(String[] args) {`

    `    Factorial factorial = new Factorial();`

    `    System.out.println(factorial.calculate(4));`

    `  }`

    `}`


    由于它不包含对自身的调用，`calculate` 方法在栈上只出现一次。因此，这里的教训是，任何时候只要你能轻松地用循环替换递归，就应该这样做。


    ### 何时使用递归


    如果只要轻松做到，就应该用循环替换递归，那么什么时候应该使用递归呢？简单的（但没什么帮助的）答案是：当递归有用的时候。但什么时候有用呢？本质上，当你无法知道（或无法确定）需要处理某事的次数时，就应该使用递归。处理
    XML 文件就是这个问题的一个很好的例证。当你编写程序处理 XML 文件时，你无法确定给定的 XML 文件中会有多少个节点。用 `while` 循环解决这类问题是可能的，但在这种情况下，递归在编码和理解上都更容易。


    除了解析之外，其他一些问题用递归编码也更简单。如果你能显著减少代码量，或者获得一个更容易理解的算法，就应该考虑使用递归，即使问题可以用循环解决。哪些类型的问题可以用递归算法解决？让我们看看一些常见的利用递归的问题（我将在本章后面编写其中一些更有趣的问题的代码）：


    *   重复性的数学函数，例如阶乘、数字求和、斐波那契数列以及许多其他函数

    *   任何处理深度难以预测的问题（例如，处理文件和其他数据流）

    *   某些类型的搜索（例如，在字符串中查找子串的所有实例，以及在树结构中查找特定数据元素的所有实例）

    *   分形图像（我将在本章后面重点介绍）。


    闲话少说，让我们进入有趣的部分：为适合递归解决的问题编写代码解决方案。

