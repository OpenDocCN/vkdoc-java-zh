- fmt: "#### A Note about Limitations\n\nLarry Niven, a great science fiction author,\
    \ in a collection of short stories entitled *Limits*, wrote that “Often enough,\
    \ it's the limits that *make* [emphasis in original] the story.”\n\nThat excellent\
    \ observation very much applies to software development as well. No program can\
    \ do everything, so we have to choose what each program will and won't do. In\
    \ addition to design considerations, we often also have to battle performance\
    \ and hardware constraints. For example, I am currently working as a member of\
    \ a team attempting to re-engineer content delivery for a major web site (it's\
    \ a household name and one that you'd recognize instantly). The site gets 80 million\
    \ visits a month (on average – during the holiday shopping season, that number\
    \ goes up substantially). We have to ensure that each page request (each click\
    \ a user makes on the web site, in other words) gets a response in less than two\
    \ seconds. Otherwise, the user might take their business elsewhere, and our company\
    \ wouldn't make all the money it can. That two-second limit is a huge factor in\
    \ every decision we make. And we can't just throw hardware (more and bigger servers)\
    \ at the problem, even though the company makes computers, including extremely\
    \ high-end web servers. At some point, we run out of address space for servers\
    \ (each computer on the Internet has to have a unique address, known as its IP\
    \ address). So there's yet another limitation.\n\nSo why tell you all this here?\
    \ Because games, even more than software, rely on limitations. In a very real\
    \ sense, a game is a collection of limitations. Each rule in a game is a limitation,\
    \ and a game is nothing without its rules. If you could put a card wherever you\
    \ want when you play solitaire, would it still be a game? If you could shoot multiple\
    \ times a second, wouldn't ShootingGallery be less challenging (and so less fun)?\n\
    \nIn that same essay (the introduction to *Limits*), Mr. Niven also states that\
    \ “puzzles *require* [emphasis in original] rules.” All games are puzzles. The\
    \ player always asks, even if only subconsciously, “What is the proper set of\
    \ steps that I need to follow in order to beat this game?” Thus, all games require\
    \ rules, and all rules are limitations. As you design your own games, remember\
    \ to make a set of limitations that make the game fun. If the limitations are\
    \ too many or too severe, they will make the game frustrating. If the limitations\
    \ are too few or too loose, the game is such a poor challenge that it's not worth\
    \ playing.\n\n### Game Design Resources\n\nI anticipate that many of the people\
    \ who read this book are doing so because they want to create their own games.\
    \ To that end, here's a short list of resources that I've found useful when thinking\
    \ about games and how to design good ones. Note that these resources apply to\
    \ designing games in general, not just computer games.\n\n*   *Game Design (Volume\
    \ 1: Theory and Practice)* by Nick Schuessler and Steve Jackson (1981). You can\
    \ get it from [http://e23.sjgames.com](http://e23.sjgames.com). Steve Jackson\
    \ is the fellow who made Ogre (one of my favorite board games), GURPS (the role-playing\
    \ system I use), and Munchkin (a commercial hit that spoofs role-playing games).\
    \ He does not make computer games, but the wisdom in this small book applies to\
    \ all games, computer or otherwise.\n*   *A Theory of Fun for Game Design* by\
    \ Raph Koster (Foreword by Will Wright) (2004). Raph Koster is a veteran of many\
    \ large computer game efforts, including MMOGs (Massively Multiplayer Online Games).\
    \ His book combines thoughts on learning theory with thoughts on game design,\
    \ bringing good ideas to both fields.\n*   “I Have No Words & I Must Design: Toward\
    \ a Critical Vocabulary for Games” by Greg Costikyan (online essay). You can find\
    \ this excellent exploration of what a game is and how a game works at [http://www.costik.com/nowords2002.pdf](http://www.costik.com/nowords2002.pdf)\
    \ You can find his blog, which contains other content of interest to game developers,\
    \ at [http://www.costik.com](http://www.costik.com)\n\n### Summary\n\nIn this\
    \ chapter, I hope you learned the basics of making a computer game with Java.\
    \ In particular, I hope you learned:\n\n*   The three basic components of a computer\
    \ game:\n    *   The user interface\n    *   The game logic\n    *   The game\
    \ loop\n*   The essential tasks of a game loop:\n    *   Processing the user input\
    \ and all other inputs\n    *   Processing the game logic\n    *   Redrawing the\
    \ playing field\n*   How to animate multiple objects at once\n*   How to make\
    \ multiple objects move at different speeds\n*   How to test for conditions to\
    \ see if a game should end or something else should happen\n*   How to update\
    \ a score display in response to game events\n\nAs I have mentioned several times,\
    \ there's nearly always more than one way to do any given thing in software (that's\
    \ part of both the fun and the frustration of writing software). So, when I say\
    \ that I've shown you how to do something, I really mean that I've shown you one\
    \ way to do something. I hope you'll experiment with other ideas and find your\
    \ own ways to meet your software goals. Writing a game of your own would be a\
    \ great way to do just that, so go write a game.\n\n## C H A P T E R 13\n\n##\
    \ Garbage Collection\n\nJava relies on garbage collection. A garbage collector\
    \ removes unused objects from memory and lets your programs re-use memory rather\
    \ than constantly grow. For very small programs, this constant growth doesn't\
    \ matter much. However, even a program of fairly low complexity and scale can\
    \ quickly chew through a lot of memory. Therefore, most programs really need some\
    \ kind of garbage collection mechanism.\n\nWhen they use many other languages,\
    \ including C++, programmers have to manage memory themselves, writing code to\
    \ remove objects from memory at the right time. Java frees developers from this\
    \ problem. That's not to say that Java is better than C++. Both languages have\
    \ their strengths and weaknesses. Many developers who prefer Java would tell you\
    \ that having to manage memory yourself is a weakness in C++ and that garbage\
    \ collection is a strength of Java. Conversely, many C++ developers would tell\
    \ you the opposite. Both are true: Garbage collection can be a problem in Java,\
    \ yet is also an inherent feature and very powerful if managed correctly.\n\n\
    So how do we turn garbage collection into an advantage rather than a burden?"
