    和往常一样，`ShootingGallery` 类只负责设置窗口并处理菜单和窗口控件（本例中为最小化和关闭）的点击。我禁用了窗口的调整大小控件，既是为了简化游戏中的数学计算，也是因为你可能想知道如何实现这一功能。下面这行代码禁用了调整窗口大小的功能：


    ***清单 12-5.** 禁止调整大小*


    `    frame.setResizable(false);`


    我尽量不限制用户的操作，除非有充分且对用户友好的理由。因此，我通常不会禁用调整窗口大小的功能。不过，我再次认为这能成为一个好例子，并且它简化了编程。然而，为了让自己更轻松而限制用户操作是一种不良实践（这是一种智力上的懒惰）——除非你只是为了演示如何实现，否则不要这样做。


    关于 `ShootingGallery` 类（以及整个游戏），最后要注意的一点是：它没有开始或停止控制。游戏会无休止地持续运行。我省略了一些你可能期望在游戏中看到的常见功能，以便你可以自己实现它们。我在本章末尾附近列出了这些想法的清单。


    ***清单 12-6.** ShootingGalleryPanel 类*


