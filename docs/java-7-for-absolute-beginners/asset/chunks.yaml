- fmt: "# A Basic Swing Application\n\nSwing applications follow a fairly common flow.\
    \ First, we create a `JFrame` object. The `JFrame` object is the main window and\
    \ holds all the other interface components (buttons, text fields, and so on).\n\
    \nSo, let's write a Swing application. The `JFrame` class lets you create a window,\
    \ put other components in that window, and associate other windows with the first\
    \ window. Consequently, creating a `JFrame` object is often the first step to\
    \ creating a Swing application. As usual in software development, other ways exist,\
    \ but we follow one common path, as shown in [Listing 7-1](#Chapter07.html#list_7_1).\n\
    \n**Listing 7-1.** The simplest possible Swing application\n\n```\npackage com.apress.java7forabsolutebeginners.examples.swingdemo;\n\
    \nimport java.awt.Dimension;\n\nimport javax.swing.JFrame;\n\npublic class SwingDemo\
    \ {\n\n  private JFrame frame = new JFrame(\"SwingDemo\");\n\n  private void createAndShowGUI()\
    \ {\n    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n    frame.setPreferredSize(new\
    \ Dimension(200, 200));\n    frame.pack();\n    frame.setVisible(true);\n  }\n\
    \n  public static void main(String[] args) {\n    SwingDemo swingDemo = new SwingDemo();\n\
    \    swingDemo.createAndShowGUI();\n  }\n}\n```\n\nBefore we go any further, [Figure\
    \ 7-1](#Chapter07.html#fig_7_1) shows our simple application.\n\n![images](images/0701.jpg)\n\
    \n**Figure 7-1.** Simple SwingDemo application\n\nAll this program does is create\
    \ and display an empty window. Let's look at how it does it, though. As you can\
    \ see, we first create a `JFrame` object, which defines the window. Then, we specify\
    \ some attributes for that window: size and whether to stop the application when\
    \ the window closes. After setting those attributes, we prepare the window for\
    \ display with the `pack` and `setVisible` methods. The `pack` method tells any\
    \ Swing component that can have children to arrange its children within the component.\
    \ The `setVisible` method dictates whether a component is visible or hidden. Naturally,\
    \ for an application's main window, we want it to be visible. Hiding components\
    \ can work well in some circumstances, though. If you have a window that you want\
    \ to show sometimes and not other times, leaving the window in the set of windows\
    \ and setting it to visible or hidden as needed uses a lot less overhead than\
    \ creating it from scratch every time, especially if the window needs to maintain\
    \ some content along the way.\n\nNotice the behavior of the `main` method. In\
    \ particular, notice that it creates an instance of the class that contains it.\
    \ That's a common idiom for Swing programs. Otherwise, every method in the class\
    \ must be static, and that's a nuisance (and often just won't work). I prefer\
    \ to create the instance as soon as possible, to get it out of the way, so I put\
    \ it in the `main` method. Other developers prefer to wait until at least one\
    \ Swing component requires an instance. That's largely a matter of style. The\
    \ important thing is that you'll almost always need to create an instance of your\
    \ base class at some point.\n\n![images](images/square.jpg) **Note** A window\
    \ is not a program. As the `JFrame.EXIT_ON_CLOSE` constant implies, an application\
    \ does not need to stop because all its windows have been closed. In fact, some\
    \ applications never have a window in the first place. Device drivers and services\
    \ almost always run without showing a window.\n\nBefore we proceed, let's learn\
    \ a bit more about `JFrame`. The first thing that trips up a lot of people is\
    \ that a `JFrame` goes into a separate component called a content pane. You can\
    \ get the content pane with the `getContentPane()` method. You can also replace\
    \ a content pane by calling `setContentPane()`. Any class that extends `Container`\
    \ can serve as a content pane. Swing developers often use a `JPanel` object when\
    \ they need to replace `JFrame`'s content pane. You can swap sets of content by\
    \ using `setContentPane`. However, the card layout might work better for hiding\
    \ and showing different sets of content.\n\nSwing includes the concept of a \"\
    layout.\" A layout is an object that defines the relationship between other objects.\
    \ For example, if you use a `BoxLayout` object, your components go in a line either\
    \ horizontally or vertically. A grid layout, on the other hand, creates a layout\
    \ that looks like a table (a number of cells wide by a number of cells high).\
    \ Java also has a number of other layouts. We use a number of them in this chapter\
    \ and later in the book. One handy thing about layouts is that you can use layouts\
    \ within layouts. For example, you might use a `BoxLayout` object set to vertical\
    \ and then use a number of other `BoxLayout`s, each set to horizontal, to add\
    \ rows of components to your window. You can achieve a similar effect with a `GridLayout`\
    \ object, too, but the `BoxLayout` with `BoxLayout` scheme might work better if\
    \ you have different numbers of objects to put in each row.\n\nI can go on for\
    \ a long time (probably for a whole book) about all the options available in Swing,\
    \ but I'll mention just one more that may be of interest to you. Swing includes\
    \ different looks for programs. If you use the default settings (as I do in this\
    \ chapter), you get Java's Metal look, which is meant to look the same on all\
    \ operating systems. To get the native layout for any given operating system,\
    \ use the `SystemLookAndFeel` object. If you use `SystemLookAndFeel`, people who\
    \ use your software on Windows get a Windows look and feel, whereas users on other\
    \ operating systems get the look and feel of those operating systems. The down\
    \ side is that if Java can't figure out the look and feel of the system, your\
    \ program doesn't work. That's why so many Java programs (especially those written\
    \ for demonstrations and books) use the default (Metal) look and feel. Still,\
    \ if you're writing software just for yourself or for a group of users who use\
    \ the same operating system, and you can be sure that Java supports that operating\
    \ system's look and feel, you can make your programs look just like the other\
    \ programs that run on that operating system.\n\nNow, let's do a little more with\
    \ our program. Let's start by adding a feature many programs have, a menu. [Listing\
    \ 7.2](#Chapter07.html#list_7_2) shows how to add a menu.\n\n**Listing 7-2.**\
    \ A Swing program with a menu\n\n```\npackage com.apress.java7forabsolutebeginners.examples.swingdemo;\n\
    \nimport java.awt.Dimension;\nimport java.awt.event.ActionEvent;\nimport java.awt.event.ActionListener;\n\
    \nimport javax.swing.JFrame;\nimport javax.swing.JMenu;\nimport javax.swing.JMenuBar;\n\
    import javax.swing.JMenuItem;\n\npublic class SwingDemo implements ActionListener\
    \ {\n\n  private JFrame frame = new JFrame(\"SwingDemo\");\n\n  private void addMenu(JFrame\
    \ frame) {\n    JMenu file = new JMenu(\"File\");\n    file.setMnemonic('F');\n\
    \    JMenuItem exitItem = new JMenuItem(\"Exit\");\n    exitItem.setMnemonic('x');\n\
    \    exitItem.addActionListener(this);\n    file.add(exitItem);\n    JMenuBar\
    \ menuBar = new JMenuBar();\n\n    menuBar.add(file);\n    frame.setJMenuBar(menuBar);\n\
    \  }\n\n  private void createAndShowGUI() {\n    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    \    frame.setPreferredSize(new Dimension(200, 200));\n    addMenu(frame);\n \
    \   frame.pack();\n    frame.setVisible(true);\n  }\n\n  public static void main(String[]\
    \ args) {\n    SwingDemo swingDemo = new SwingDemo();\n    swingDemo.createAndShowGUI();\n\
    \  }\n\n  @Override\n  public void actionPerformed(ActionEvent e) {\n    if (e.getActionCommand().equals(\"\
    Exit\")) {\n      System.exit(0);\n    }\n  }\n}\n```\n\nAgain, before we discuss\
    \ how and why it works, let's see what it looks like. [Figure 7-2](#Chapter07.html#fig_7_2)\
    \ shows our additions.\n\n![images](images/0702.jpg)\n\n**Figure 7-2.** SwingDemo\
    \ with a menu"
  raw: '#### A Basic Swing Application


    Swing applications follow a fairly common flow. First, we create a `JFrame` object.
    The `JFrame` object is the main window and holds all the other interface components
    (buttons, text fields, and so on).


    So, let''s write a Swing application. The `JFrame` class lets you create a window,
    put other components in that window, and associate other windows with the first
    window. Consequently, creating a `JFrame` object is often the first step to creating
    a Swing application. As usual in software development, other ways exist, but we
    follow one common path, as shown in [Listing 7-1](#Chapter07.html#list_7_1).


    ***Listing 7-1.** The simplest possible Swing application*


    `package com.apress.java7forabsolutebeginners.examples.swingdemo;`


    `import java.awt.Dimension;`


    `import javax.swing.JFrame;`


    `public class SwingDemo {`


    `  private JFrame frame = new JFrame("SwingDemo");`


    `  private void createAndShowGUI() {`

    `    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);`

    `    frame.setPreferredSize(new Dimension(200, 200));`

    `    frame.pack();`

    `    frame.setVisible(true);`

    `  }`


    `  public static void main(String[] args) {`

    `    SwingDemo swingDemo = new SwingDemo();`

    `    swingDemo.createAndShowGUI();`

    `  }`

    `}`


    Before we go any further, [Figure 7-1](#Chapter07.html#fig_7_1) shows our simple
    application.


    ![images](images/0701.jpg)


    ***Figure 7-1.** Simple SwingDemo application*


    All this program does is create and display an empty window. Let''s look at how
    it does it, though. As you can see, we first create a `JFrame` object, which defines
    the window. Then, we specify some attributes for that window: size and whether
    to stop the application when the window closes. After setting those attributes,
    we prepare the window for display with the `pack` and `setVisible` methods. The
    `pack` method tells any Swing component that can have children to arrange its
    children within the component. The `setVisible` method dictates whether a component
    is visible or hidden. Naturally, for an application''s main window, we want it
    to be visible. Hiding components can work well in some circumstances, though.
    If you have a window that you want to show sometimes and not other times, leaving
    the window in the set of windows and setting it to visible or hidden as needed
    uses a lot less overhead than creating it from scratch every time, especially
    if the window needs to maintain some content along the way.


    Notice the behavior of the `main` method. In particular, notice that it creates
    an instance of the class that contains it. That''s a common idiom for Swing programs.
    Otherwise, every method in the class must be static, and that''s a nuisance (and
    often just won''t work). I prefer to create the instance as soon as possible,
    to get it out of the way, so I put it in the main method. Other developers prefer
    to wait until at least one Swing component requires an instance. That''s largely
    a matter of style. The important thing is that you''ll almost always need to create
    an instance of your base class at some point.


    ![images](images/square.jpg) **Note** A window is not a program. As the `Jframe.EXIT_ON_CLOSE`
    constant implies, an application does not need to stop because all its windows
    have been closed. In fact, some applications never have a window in the first
    place. Device drivers and services almost always run without showing a window.


    Before we proceed, let''s learn a bit more about JFrame. The first thing that
    trips up a lot of people is that a JFrame goes into a separate component called
    .a content pane. You can get the content pane with the `getContentPane()` method.
    You can also replace a content pane by calling `setContentPane()`. Any class that
    extends `Container` can serve as a content pane. Swing developers often use a
    `JPanel` object when they need to replace `JFrame`''s content pane. You can swap
    sets of content by using `setContentPane`. However, the card layout might work
    better for hiding and showing different sets of content.


    Swing includes the concept of .a “layout.” A layout. is an object that defines
    the relationship between other objects. For example, if you use a BoxLayout object,
    your components go in a line either horizontally or vertically. A grid layout,
    on the other hand, creates a layout that looks like a table (a number of cells
    wide by a number of cells high). Java also has a number of other layouts. We use
    a number of them in this chapter and later in the book. One handy thing about
    layouts is that you can use layouts within layouts. For example, you might use
    a BoxLayout object set to vertical and then use a number of other BoxLayouts,
    each set to horizontal, to add rows of components to your window. You can achieve
    a similar effect with a GridLayout object, too, but the BoxLayout with BoxLayout
    scheme might work better if you have different numbers of objects to put in each
    row.


    I can go on for a long time (probably for a whole book) about all the options
    available in Swing, but I''ll mention just one more that may be of interest to
    you. Swing includes different looks for programs. If you use the default settings
    (as I do in this chapter), you get Java''s Metal look, which is meant to look
    the same on all operating systems. To get the native layout for any given operating
    system, use the `SystemLookAndFeel` object. If you use `SystemLookAndFeel`, people
    who use your software on Windows get a Windows look and feel, whereas users on
    other operating systems get the look and feel of those operating systems. The
    down side is that if Java can''t figure out the look and feel of the system, your
    program doesn''t work. That''s why so many Java programs (especially those written
    for demonstrations and books) use the default (Metal) look and feel. Still, if
    you''re writing software just for yourself or for a group of users who use the
    same operating system, and you can be sure that Java supports that operating system''s
    look and feel, you can make your programs look just like the other programs that
    run on that operating system.


    Now, let''s do a little more with our program. Let''s start by adding a feature
    many programs have, a menu. [Listing 7.2](#Chapter07.html#list_7_2) shows how
    to add .a menu.


    ***Listing 7-2.** A Swing program with a menu*


    `package com.apress.java7forabsolutebeginners.examples.swingdemo;`


    `import java.awt.Dimension;`

    `import java.awt.event.ActionEvent;`

    `import java.awt.event.ActionListener;`


    `import javax.swing.JFrame;`

    `import javax.swing.JMenu;`

    `import javax.swing.JMenuBar;`

    `import javax.swing.JMenuItem;`


    `public class SwingDemo implements ActionListener {`


    `  private JFrame frame = new JFrame("SwingDemo");`


    `  private void addMenu(JFrame frame) {`

    `    JMenu file = new JMenu("File");`

    `    file.setMnemonic(''F'');`

    `    JMenuItem exitItem = new JMenuItem("Exit");`

    `    exitItem.setMnemonic(''x'');`

    `    exitItem.addActionListener(this);`

    `    file.add(exitItem);`

    `    JMenuBar menuBar = new JMenuBar();`


    `    menuBar.add(file);`

    `    frame.setJMenuBar(menuBar);`

    `  }`


    `  private void createAndShowGUI() {`

    `    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);`

    `    frame.setPreferredSize(new Dimension(200, 200));`

    `    addMenu(frame);`

    `    frame.pack();`

    `    frame.setVisible(true);`

    `  }`


    `  public static void main(String[] args) {`

    `    SwingDemo swingDemo = new SwingDemo();`

    `    swingDemo.createAndShowGUI();`

    `  }`


    `  @Override`

    `  public void actionPerformed(ActionEvent e) {`

    `    if (e.getActionCommand().equals("Exit")) {`

    `      System.exit(0);`

    `    }`

    `  }`

    `}`


    Again, before we discuss how and why it works, let''s see what it looks like.
    [Figure 7-2](#Chapter07.html#fig_7_2) shows our additions.


    ![images](images/0702.jpg)


    ***Figure 7-2.** SwingDemo with a menu*'
