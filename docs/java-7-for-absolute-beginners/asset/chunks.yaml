    The key to the this class is the `actionPerformed` method. It checks for which
    action the user has chosen and starts the animation if the user selects the Scoot
    button (and if the ball isn''t already being drawn). The animation is accomplished
    through the `ScootBallPanel` class. Because `ScootBallPanel` implements the `Runnable`
    interface (meaning it can be run in its own thread), we have a means to let it
    know when to start drawing the ball. Note that we create a new thread each time
    the Scoot button is pressed, letting any previous thread go to garbage collection.
    That''s a simple way to restart an animation process.Listing 10-2 shows the `ScootBallPanel`
    class.


    ***Listing 10-2.** The ScootBallPanel class*


    `package com.bryantcs.examples.animation;`


    `import java.awt.Color;`

    `import java.awt.Graphics;`


    `import javax.swing.JPanel;`


    `public class ScootBallPanel extends JPanel implements Runnable {`


    `  private static final long serialVersionUID = 1L;`

    `  private boolean animating = false;`

    `  private int xPosition = 5;`


    `  public boolean isAnimating() {`

    `    return animating;`

    `  }`


    `  public void setAnimating(boolean animating) {`

    `    this.animating = animating;`

    `  }`


    `  public void reset() {`

    `    xPosition = 5;`

    `  }`


    `  public void paint (Graphics g) {`

    `    int width = this.getSize().width;`

    `    int height = this.getSize().height;`

    `    super.paintComponent(g);`


    `    if (animating) {`

    `      g.setColor(Color.RED);`

    `      g.fillOval(xPosition, height / 2, 10 ,10);`

    `      xPosition += 20;`

    `      if (xPosition > width) {`

    `        animating = false;`

    `      }`

    `    }`

    `  }`


    `  // The run method controls how often the screen`

    `  // gets redrawn and so controls the frame rate`

    `  public void run() {`

    `    while(animating) {`

    `      try {`

    `        Thread.sleep(40);`

    `        this.repaint();`

    `      } catch (InterruptedException ie) {`

    `        return;`

    `      }`

    `    }`

    `  }`

    `}`


    Those two classes create a program that looks like the image in [Figure 10-1](#Chapter10.html#fig_10_1).


    ![images](images/1001.jpg)


    ***Figure 10-1.** ScootBall starting state*


    The heart of the `ScootBallPanel` class is the `run` method, which implements
    the corresponding `run` method in the `Runnable` interface. All it does is run
    through a continuous loop, sleeping a while and then repainting the panel. How
    long it sleeps dictates the frame rate. In this case, it sleeps for 40 milliseconds,
    producing a frame rate of about 25\. I wrote, “about,” because the repainting
    takes some time, yielding a frame rate a bit less than 25\. We see how to get
    a more exact frame rate in the next example.


    The paint method draws the ball on the screen, each time at a new position, until
    that position exceeds the width of the panel. In particular, the call to `super.paintComponent(g)`
    redraws the panel to its original state (a blank white box). The remaining lines
    then draw the ball. [Figure 10-2](#Chapter10.html#fig_10_2) shows a ball scooting
    across the screen.


    ![images](images/1002.jpg)


