  trans: '

    通过这种方式，我们解析了一行包含多条记录的内容。然后，我们可以添加代码，将每个匹配项写入文件中的单独一行，或以其他方式处理每个匹配值。这种解析是软件开发中的常见任务，而正则表达式提供了一种很好的实现方式。


    正如我所指出的，正则表达式可能会变得复杂得多。以下正则表达式会从每个以“Sam”开头的条目中移除“Sam”：


    `S(?!am)|(?<!S)a|a(?!m)|(?<!Sa)m|^Sam`


    其输出为：


    `Found a match for  Spade; beginning at 3 and ending at 10`

    `Found a match for Yosemite Sam; beginning at 10 and ending at 23`

    `Found a match for  Merlotte; beginning at 26 and ending at 36`

    `Found a match for wise Gamgee; beginning at 39 and ending at 51`


    用于同时移除“Yosemite Sam”中“Sam”的代码会更加复杂。事实上，否定一个组是正则表达式不擅长处理的事情之一。在这些情况下，通常最好将正则表达式与其他`String`操作结合使用，并将一个表达式的结果传递给另一个正则表达式（这个过程称为链式调用）。这些技术可以让你管理正则表达式的复杂性，并且可能比单个复杂的正则表达式提供更好的性能。


    如果你想了解更多关于正则表达式的信息，可以从官方的正则表达式教程开始：[`download.oracle.com/javase/tutorial/essential/regex/index.html`](http://download.oracle.com/javase/tutorial/essential/regex/index.html)


    ### 总结


    本章涵盖了受益于模式匹配的内容：泛型和正则表达式。关于泛型，我们了解到：


    *   我们可以指定集合中内容的类型。

    *   得益于 Java 7 引入的改进，只要编译器能够从行首确定类型，我们就可以使用菱形运算符（`<>`）来稍微缩短代码。

    *   泛型可以有多个参数。

    *   我们可以嵌套泛型参数，以确保在任何深度都能获得正确类型的对象。

    *   我们可以在泛型参数中使用通配符，以容纳相似的对象（任何扩展特定类或实现特定接口集或两者兼有的对象）。

    *   泛型让我们能够在编码时而不是运行时捕获问题，从而节省时间并避免尴尬。


    关于正则表达式，我们了解到：


    *   如何实例化 `java.util.regex` 包中的成员类（`Matcher` 和 `Pattern`）。

    *   每个元字符的作用。

    *   如何以多种有用的方式组合元字符。

    *   如何使模式变为非贪婪（匹配尽可能少的字符）而不是贪婪（匹配尽可能多的字符）。

    *   正则表达式可能变得非常复杂，以及如何管理这种复杂性。


    本章涵盖了两种语言特性，我希望你在开发自己的程序时能发现它们很有用。我特别希望你在使用集合时都能使用泛型，因为你应该尽可能采用最佳实践。至于正则表达式，请记住它们是为了让事情变得更简单。如果你发现某个正则表达式太难理解，可以将其拆解，结合其他`String`操作，并使用多个正则表达式，而不是一个庞大的正则表达式。


