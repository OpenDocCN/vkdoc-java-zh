- fmt: "### Opening a File\n\nYou probably can't get by with just writing new files\
    \ all the time, so you should know how to open a file that already exists, too.\
    \ What opening a file really amounts to is creating a `File` object that corresponds\
    \ to a file on the file system. Then, through that `File` object, you can do various\
    \ things to the contents of the file. We get to manipulating contents later; for\
    \ now, let's just get a `File` object for an existing file. Because we already\
    \ created `myFile.txt`, let's get a `File` object for that file. To make sure\
    \ we actually found a file, we use the `exists()` method to check for a file,\
    \ as shown in see [Listing 8-3](#Chapter08.html#list_8_3).\n\n***Listing 8-3.**\
    \ Getting a File object for an existing file*\n\n```\npackage com.apress.java7forabsolutebeginners.examples;\n\
    \nimport java.io.File;\n\npublic class FileTest {\n\n    public static void main(String[]\
    \ args) {\n        String fileName = \"C:\" + File.separator +\n             \
    \   \"test\" + File.separator + \"myFile.txt\";\n        File myFile = new File(fileName);\n\
    \        System.out.println(fileName + \" exists? \" + myFile.exists());\n   \
    \ }\n}\n```\n\nNotice how the creation of a `File` object is the same, regardless\
    \ of whether the file exists or not. As we saw earlier in this chapter, a `File`\
    \ object is not a file. A `File` object is a path specification (which might or\
    \ might not exist on the file system) and some other information that might or\
    \ might correspond to an actual file. Just specifying a path and creating a new\
    \ `File` object for it does not create a new file or prove an existing file exists.\
    \ To do that, we have to take further steps, as shown in [Listings 8-1](#Chapter08.html#list_8_1)\
    \ and [8-2](#Chapter08.html#list_8_2) (where we used the `createnewFile()` method)\
    \ and [Listing 8-3](#Chapter08.html#list_8_3) (where we used the `exists()` method).\n\
    \n### Deleting a File\n\nSometimes, you need to delete a file, too. The process\
    \ parallels that of creating a new or finding an existing file. [Listing 8-4](#Chapter08.html#list_8_4)\
    \ shows the simplest way to do it.\n\n***Listing 8-4.** Deleting a file*\n\n```\n\
    package com.apress.java7forabsolutebeginners.examples;\n\nimport java.io.File;\n\
    \nimport java.io.IOException;\npublic class FileTest {\n\n  public static void\
    \ main(String[] args) throws IOException {\n    String fileName = \"C:\" + File.separator\
    \ +\n        \"test\" + File.separator + \"myFile.txt\";\n    File myFile = new\
    \ File(fileName);\n    if(!myFile.exists()) {\n      throw new IOException(\"\
    Cannot delete \" + fileName\n          + \" because\" + fileName + \" does not\
    \ exist\");\n    } else {\n      myFile.delete();\n    }\n    System.out.println(fileName\
    \ + \" exists? \" + myFile.exists());\n  }\n}\n```\n\nYou don't need to check\
    \ for the file after you delete it, by the way. If the operation fails, you get\
    \ an error message. We put in the print statement so that the program would produce\
    \ some output and let us know it's done. [Figure 8-3](#Chapter08.html#fig_8_3)\
    \ shows the output (in Eclipse's console window) if the program finds a file named\
    \ `myFile.txt` in the `test` directory and removes it.\n\n![images](images/0803.jpg)\n\
    \n***Figure 8-3.** Output for a successful file deletion*\n\n[Figure 8-4](#Chapter08.html#fig_8_4)\
    \ shows the output (in Eclipse's console window) if the program cannot find and\
    \ remove a file named `myFile.txt` in the `test` directory.\n\n![images](images/0804.jpg)\n\
    \n***Figure 8-4.** Output for a failed file deletion*\n\n### Working with Temporary\
    \ Files\n\n*Temporary files* give us a way to store data that we might want at\
    \ some point but don't want right now and that we don't to keep after the program\
    \ exits. For example, most word processors keep a temporary file open while you\
    \ work on a document. That file serves a number of purposes, including offering\
    \ a way to recover at least most of your work if the program crashes. The temporary\
    \ file gets removed only if the program exits normally, so a crash leaves a file\
    \ that contains your work, which can be handy indeed.\n\nThe `File` class provides\
    \ a few methods specifically for dealing with temporary files. These methods let\
    \ you create multiple temp files without having to think of a new name for each\
    \ one. Instead, you specify a prefix (at least three characters long), a suffix\
    \ (which is `.tmp` if you set the suffix to `null`), and (optionally) a directory.\
    \ If you don't specify a directory, the JVM creates your files in the system's\
    \ temp directory. On most systems, the default temp directory is a subdirectory\
    \ of your user directory.\n\nSo, let's look at how to create a batch of temporary\
    \ files in [Listing 8-5](#Chapter08.html#list_8_5).\n\n***Listing 8-5.** Creating\
    \ temp files*\n\n```\npackage com.apress.java7forabsolutebeginners.examples;\n\
    \nimport java.io.File;\n\npublic class FileTest {\n\n    public static void main(String[]\
    \ args) {\n        String tempDirectoryName = \"C:\" + File.separator + \"test\"\
    ;\n        File tempDirectory = new File(tempDirectoryName);\n        for (int\
    \ i = 0; i < 10; i++) {\n            try {\n                File thisFile =\n\
    \                    File.createTempFile(\"tmp\", null, tempDirectory);\n    \
    \        } catch (Exception e) {\n                System.out.println(\"Couldn't\
    \ create temp file \" + i);\n            }\n        }\n        System.out.println(\"\
    Done creating temp files\");\n    }\n}\n```\n\nThe `createTempFile` method guarantees\
    \ that each temp file created during the life of the program will be different.\
    \ It doesn't guarantee that the file names will mean anything to a human. [Listing\
    \ 8-6](#Chapter08.html#list_8_6) shows the names of the files that program created\
    \ in our `test` directory.\n\n***Listing 8-6.** Temp file names*\n\n```\ntmp1672349819571008723.tmp\n\
    tmp3234113842230809615.tmp\ntmp5343720775549909618.tmp\ntmp6194798942830449846.tmp\n\
    tmp7016714774703888253.tmp\ntmp720922773409895465.tmp\ntmp7634665877605496722.tmp\n\
    tmp7730975525106591320.tmp\ntmp799007629249445444.tmp\ntmp8048303951856646489.tmp\n\
    ```\n\n[Figure 8-5](#Chapter08.html#fig_8_5) shows the temp files after they've\
    \ been created in my test directory.\n\n![images](images/0805.jpg)\n\n***Figure\
    \ 8-5.** Temp files in the test directory*\n\nSome systems create files and leave\
    \ them on the system for a long time (usually until a user deletes them, often\
    \ through a program's user interface rather than through the file system). For\
    \ example, Windows Live Mail stores each mail message as a separate file, for\
    \ example. Still, we usually want to delete any temp files that we might create.\
    \ (Otherwise, they don't really seem like temp files.) All we have to do to get\
    \ rid of any temp files we create is add one line, as in [Listing 8-7](#Chapter08.html#list_8_7).\n\
    \n***Listing 8-7.** Removing temp files*\n\n```\npackage com.apress.java7forabsolutebeginners.examples;\n\
    \nimport java.io.File;\n\npublic class FileTest {\n\n    public static void main(String[]\
    \ args) {\n        String tempDirectoryName = \"C:\" + File.separator + \"test\"\
    ;\n        File tempDirectory = new File(tempDirectoryName);\n        for (int\
    \ i = 0; i < 10; i++) {\n            try {\n                File thisFile =\n\
    \                    File.createTempFile(\"tmp\", null, tempDirectory);\n    \
    \            thisFile.deleteOnExit();\n            } catch (Exception e) {\n \
    \               System.out.println(\"Couldn't create temp file \" + i);\n    \
    \        }\n        }\n        System.out.println(\"Done creating temp files\"\
    );\n    }\n}\n```\n\nThe `deleteOnExit()` method tells the JVM to remove the file\
    \ (or directory or set of directories and files) associated with a particular\
    \ `File` object when the program exits. In this case, the files don't exist for\
    \ long. However, in a program that does more, the temp files might linger for\
    \ quite a while as the program does whatever it does. Consider a game, for example,\
    \ that's storing various information in temp files. Those files exist until you\
    \ stop playing."
