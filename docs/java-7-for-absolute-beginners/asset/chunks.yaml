    `  public TargetClickPanel() {`

    `    addMouseListener(this);`

    `    for (int i = 0; i < targets.length; i++) {`

    `      targets[i] = null;`

    `    }`

    `  }`


    `  // Here''s where we update the game field`

    `  public void paint (Graphics g) {`

    `    super.paintComponent(g);`

    `    for (int i = 0; i < targets.length; i++) {`

    `      // here''s where we make the initial targets`

    `      // on the first time through the loop`

    `      if (targets[i] == null) {`

    `        targets[i] = new Target(this);`

    `      }`

    `      // Is the target done (either fully drawn or has been clicked?)`

    `      if (!targets[i].isDone()) {`

    `        // if not done, draw it in the game area`

    `        targets[i].draw(g);`

    `      } else {`

    `        // if it is done, make a new one and put it in the array;`

    `        // the old one can then be garbage collected`

    `        // as no reference to it now exists`

    `        targets[i] = new Target(this);`

    `      }`

    `    }`

    `  }`

    `  // We have to have this method to fulfill the MouseListener contract`

    `  @Override`

    `  public void mouseClicked(MouseEvent e) {`

    `  }`

    `  // We have to have this method to fulfill the MouseListener contract`

    `  @Override`

    `  public void mouseEntered(MouseEvent e) {`

    `  }`


    `  // We have to have this method to fulfill the MouseListener contract`

    `  @Override`

    `  public void mouseExited(MouseEvent e) {`

    `  }`


    `  // We have to have this method to fulfill the MouseListener contract`

    `  @Override`

    `  public void mousePressed(MouseEvent e) {`

    `  }`


    `  // Here''s where we check for user input within the game field`

    `  // and check to see if the input changes the game`

    `  // (because the user hit a target)`

    `  @Override`

    `  public void mouseReleased(MouseEvent e) {`

    `    for (int i = 0; i < targets.length; i++) {`

    `      targets[i].pointInTarget(e.getX(), e.getY());`

    `    }`

    `  }`

    `}`


    As we''ve just seen, the `TargetClickPanel` class only provides a place for targets
    to appear, handles mouse clicks in the play area (the `TargetClick` class handles
    mouse clicks in the menu and the frame), and keeps the five targets in play.


    The Target class has the simplest mission of the three classes that comprise the
    `TargetClick` game: It draws a target and figures out whether a target has been
    hit. That may seem like too much to do, and your first instinct may be to move
    the hit logic out of this class. However, an instance of the `Target` class has
    to stop drawing its target if the player hits the target. Consequently, it makes
    sense to put the hit logic in the Target class. Again, giving each class a clear
    purpose trumps separating logic from presentation. When deciding whether to separate
    code, ask yourself two useful questions: Can I separate further? Does further
    separation make the code easier to understand or maintain? In this case, the code
    could have been separated further. However, further separation would just clutter
    this simple program.


    ***Listing 12-3.** The Target class*


    `package com.bryantcs.examples.videogames;`


    `import java.awt.Color;`

    `import java.awt.Graphics;`


    `import javax.swing.JPanel;`


    `public class Target {`

    `  // The essential information drawing a target:`

    `  // where is it and how big is it right now?`

    `  private int drawX, drawY, step;`


    `  // Are we done yet? By default, no`

    `  private boolean done = false;`


    `  // a reference to the game area, which we use`

    `  // to find a spot for this target`

    `  JPanel panel;`


    `  // The constructor`

    `  Target(JPanel panel) {`

    `    this.panel = panel;`

    `    // -30 + 15 creates a 15-pixel border`


    `    // Find a random spot in the game field`

    `    drawX = TargetClick.random.nextInt(panel.getWidth() - 30) + 15;`

    `    drawY = TargetClick.random.nextInt(panel.getHeight() - 30) + 15;`


    `    // Start the step counter`

    `    step = 0;`

    `  }`


    `  // Here''s where we draw the target`

    `  void draw(Graphics g) {`

    `    if (!done) {`

    `      // if not done, draw a circle that varies in size by the current step`

    `      if (step == 0) {`

    `        g.setColor(Color.RED);`

    `        g.fillOval(drawX - 15, drawY - 15, 10, 10);`

    `      }`

    `      if (step == 1) {`

    `        g.setColor(Color.RED);`

    `        g.fillOval(drawX - 15, drawY - 15, 20, 20);`

    `      }`


    `      if (step == 2) {`

    `        g.setColor(Color.RED);`

    `        g.fillOval(drawX - 15, drawY - 15, 30, 30);`

    `      }`

    `      if (step == 3) {`

    `        g.setColor(Color.RED);`

    `        g.fillOval(drawX - 15, drawY - 15, 20, 20);`

    `      }`

    `      if (step == 4) {`

    `        g.setColor(Color.RED);`

    `        g.fillOval(drawX - 15, drawY - 15, 10, 10);`

    `        done = true;`

    `      }`

    `    } else {`

    `      // if we are done, erase the remaining circle`

    `      g.setColor(Color.WHITE);`

    `      g.fillOval(drawX + 1, drawY + 1, 30, 30);`

    `    }`

    `    step++;`

    `  }`

    `  // This is how we let the playing field`

    `  // know whether this target is done`

    `  public boolean isDone() {`

    `    return done;`

    `  }`

    `  // Did this target get hit?`

    `  public void pointInTarget(int x, int y) {`

    `    if (x > drawX -15 && x < drawX + 15 && y > drawY - 15 && y < drawY + 15)
    {`

    `      // A hit! So add 1 to the sore and indicate that this target is done`

    `      TargetClick.score++;`

    `      done = true;`

    `    }`

    `    // no need to do anything if not a hit`

    `  }`

    `}`


    The `Target` class contains the logic for drawing a target and for figuring out
    whether a target has been clicked. As a simplification, I determined whether the
    click was within a square that contains the target spot. For a more certain method,
    you could check the color of the pixel the player clicked on and award a hit if
    it is not white. My simplification makes the game a bit easier.


    TargetClick is about as simple as a game gets. Let''s move on to a more complex
    game.'
