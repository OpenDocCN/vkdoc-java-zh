  raw: '### Summary


    In this chapter, you saw a number of Swing applications, of steadily increasing
    complexity, culminating in a larger application that implements our own version
    of a common and popular game. It made for a long chapter and a lot of code, but
    it shows our first real-world example. We create several more real applications
    as we proceed throughout the rest of the book, but none of them are as large as
    the MineSweeper game.


    In the course of writing those applications, we saw that:


    *   Swing applications can become verbose (a problem that plagues all user-interface
    frameworks).

    *   The starting point for a Swing application is a `JFrame` object, because it
    gives us a window.

    *   The place to add components is in the content pane.

    *   The normal idiom for working with Swing components is to create a component,
    set whatever attributes we need to set on it (to customize it for our purpose),
    and then add that component to another component.

    *   It can be handy to move the mouse and menu listeners (and keyboard listeners,
    if we needed them) out to their own classes, to simplify a large class and to
    let each class focus on a single, clear purpose.

    *   It can be handy to have a helper class, to again simplify a large class.

    *   All the members of a class can be static and how to use such a class.


    The best way (and only real way, in my opinion) to learn to program is to program.
    So go write a Swing application or two of your own.


    ## C H A P T E R  8


    ## Writing and Reading Files


    Writing data to and reading data from files are common tasks for almost any kind
    of program. Even simple games, such as our MineSweeper game, can benefit from
    storing information in a file and retrieving it later. (MineSweeper could store
    the size of game the player last chose and keep track of the best time for each
    size.) Java provides an extensive collection of classes and interfaces for dealing
    with files (and associated objects such as directories and drives). The heart
    of it all is the aptly named and often-used `java.io.File` class. “io” stands
    for input/output.


    ### Working with File Objects


    The first thing to know about working with `java.io.File` (I''ll call it "`File"`
    from here on) objects is that a `File` object is *not* a file. A `File` object
    in Java is an object that contains various bits of information about a file. The
    distinction might seem meaningless, but it''s very important. Consider the following
    bit of code: `File myFile = new File();` That code does not create an empty file
    on your system. Instead, it creates an object within your program. For the sake
    of comparison, let''s look at code that creates an empty file on your system.
    Notice how we have to create a file, with the `createNewFile()` method, after
    we create the file object.


    ![images](images/square.jpg) **Note** To get the code in [Listing 8-1](#Chapter08.html#list_8_1)
    and [Listing 8-2](#Chapter08.html#list_8_2) to work, you must first create a directory
    called test on your C drive.


    [Figure 8-1](#Chapter08.html#fig_8_1) shows my test directory (which I created
    just for this code) before running [Listing 8-1](#Chapter08.html#list_8_1). It''s
    not the most thrilling image, but I thought you should see the “before” image
    to go with [Figure 8-2](#Chapter08.html#fig_8_2) (which shows the “after” image).


    ![images](images/0801.jpg)


    ***Figure 8-1.** A test directory*


    ***Listing 8-1.** Creating an empty file*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `    public static void main(String[] args) {`

    `        String fileName = "C:\\test\\myFile.txt";`

    `        File myFile = new File(fileName);`

    `        try {`

    `            myFile.createNewFile();`

    `        } catch (Exception e) {`

    `            System.out.println("Couldn''t create " + myFile.getPath());`

    `        }`

    `        System.out.println("Created " + myFile.getPath());`

    `    }`

    `}`


    If you have a `test` directory on your C drive, that program creates an empty
    text file called `myFile.txt` in that directory. [Figure 8-2](#Chapter08.html#fig_8_2)
    shows the results on my Windows laptop.


    ![images](images/0802.jpg)


    ***Figure 8-2.** Test directory with our file*


    Let''s examine the code. First, notice that we have double backslashes (which
    are escape sequences that insert a single backslash) for path separators. Using
    double backslashes is actually bad practice. It assumes we''re running on a Windows
    (or perhaps DOS) system. But what happens when someone runs our program on a Unix
    or Linux system or a Mac? The JVM might figure it out and use the right characters,
    but we can''t count on such things. Instead, we should specify a file name by
    using Java''s path specifiers, as shown in [listing 8-2](#Chapter08.html#list_8_2).


    Second, notice that we must handle an exception to work with a File object. Nearly
    all the methods in the various Input/Output classes and interfaces throw an `IOException`.
    As we learned when we covered the basics of exceptions in [Chapter 2](#Chapter02.html#ch2),
    “Java Syntax,” Java objects generally throw exceptions whenever something beyond
    the bounds of your program might cause a problem. In the case of methods that
    deal with files, your program cannot anticipate all the things that can go wrong
    on the file system. You might inadvertently specify a directory or drive that
    does not exist or specify an invalid file name. For example, my laptop has no
    Z drive. So, if I try to create `Z:\\test\\myFile.txt`, the program fails. [Listing
    8-2](#Chapter08.html#list_8_2) shows how to create a file with a path that works
    on any operating system (so long as a JVM exists for that operating system).


    ***Listing 8-2.** Creating an empty file with path specifiers*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `    public static void main(String[] args) {`

    **`        String fileName = "C:" + File.separator +`**

    **`                "test" + File.separator + "myFile.txt";`**

    `        File myFile = new File(fileName);`

    `        try {`

    `            myFile.createNewFile();`

    `        } catch (Exception e) {`

    `            System.out.println("Couldn''t create " + myFile.getPath());`

    `        }`

    `        System.out.println("Created " + myFile.getPath());`

    `    }`

    `}`


    Now, no matter what system we run the program on, we get a proper path for our
    file. If everything else works (the C drive exists, the `test` directory exists,
    our program has permission to write a file in that location, and so on), we get
    a new and empty text file where we expect it.'
