    我向你展示另一种反转字节内容的方法，是为了说明几乎总有其他方法可以完成事情，并阐明一个你应该了解的问题：转换的代价很高。清单 8-15 中的代码执行了多次转换（`toString`
    方法和 `getBytes` 方法都是转换）。然而，转换会消耗时间和内存，因此你可以通过使用不需要转换的算法来优化代码。相反，`reverseByteArray`
