- fmt: "# The Fourth Example\n\nThe fourth example isn't a cast, but it shows how\
    \ to get from a primitive (a `char` in this case) to a `String`. The same pattern\
    \ applies for all the primitives: First get a wrapper for the primitive and then\
    \ use the wrapper's `toString` method.\n\nI mentioned defensive coding for narrowing\
    \ casts. Defensive coding is a good idea any time you can't be sure the provided\
    \ value won't cause a problem. In fact, in some kinds of applications (distributed\
    \ applications are a prime example), it's standard practice to validate (that\
    \ is, ensure workable values for) all the arguments to a method. [Listing 4-6](#Chapter04.html#list_4_6)\
    \ is an example of defensive coding for a narrowing cast from an `int` to a `byte`:\n\
    \n**Listing 4-6.** Defensive coding for a narrowing cast\n\n```\nprivate static\
    \ byte intToByte(int i) {\n  if (i > Byte.MAX_VALUE || i < Byte.MIN_VALUE) {\n\
    \    throw new IllegalArgumentException(\"integer argument \" +\n        \"is\
    \ too large or too small to cast to a byte\");\n  }\n  return (byte) i;\n}\n```\n\
    \nThen the code that calls `intToByte` can decide what to do about the problem.\
    \ Moving the validation to its own method can be a good idea, both to encapsulate\
    \ each bit of validation and to permit multiple methods to make use of the same\
    \ bit of validation. Many systems have validation classes (and sometimes packages)\
    \ that offer a number of such methods, so that the methods in other classes can\
    \ make use of consistent validation. You get used to that kind of design as you\
    \ learn to use object-oriented languages, including Java.\n\n## Multiplicative\
    \ Operators\n\nJava has three multiplicative operators: multiplication (`*`),\
    \ division (`/`), and modulus (`%`). (The modulus operator is often called mod\
    \ or modulo; in Java shops, you hear expressions such as “a mod b” when someone\
    \ reads code aloud.)\n\nAs I mentioned earlier when discussing parentheses, there's\
    \ no implicit order of operations between these three operators. To the JVM, they\
    \ all have the same precedence. Because that's the case, the JVM processes them\
    \ from left to right. Again, Java isn't algebra, though some of the operators\
    \ and concepts exist in both.\n\nMultiplication and division are obvious enough,\
    \ but let's look at the modulus operator. As ever, examples help a lot (see [Listing\
    \ 4-7](#Chapter04.html#list_4_7)).\n\n**Listing 4-7.** Modulus operator examples\n\
    \n```\nint a = 9;\nint b = 2;\nint c = a % b; // c equals 1\nfloat f = 1.9f;\n\
    float g = 0.4f;\nfloat h = f % g; // h equals 0.3 – but beware of rounding\n```\n\
    \nAs this brief listing shows, the modulus operator divides the first operand\
    \ by the second operand and returns the remainder.\n\n![images](images/square.jpg)\
    \ **Caution** Beware of rounding when using the modulus operator on floats and\
    \ doubles. I rounded this to 0.3, but my JVM actually assigned 0.29999995 to `h`\
    \ when I ran this bit of code in Eclipse. That might not matter if you're plotting\
    \ the location of an avatar in a video game (because the screen has a fairly low\
    \ number of pixels, so the error isn't large enough to put the avatar in the wrong\
    \ spot). However, imagine the same error in code that controls a rocket going\
    \ to Mars. Then it's a large enough error to ensure that your rocket doesn't end\
    \ up in the right spot to go into orbit, and that's an expensive error indeed.\
    \ Rounding tends to be problematic in many applications.\n\n## Additive Operators\n\
    \nYou might not think I'd have much to say about plus (`+`) and minus (`−`). However,\
    \ even they have subtleties worth noting when used in a Java application. As with\
    \ the multiplicative operators, the order of precedence for the additive operators\
    \ is the same, so they get processed from left to right, even when the minus precedes\
    \ the plus operator on a line. That usually doesn't matter. However, when it does\
    \ matter, it can be a difficult problem to spot.\n\nAlso, the plus sign is the\
    \ string concatenation operator. As we see in various examples, `someString +\
    \ someOtherString = aThirdString`. Strictly speaking, the addition operator and\
    \ the string concatenation operator are different operators. However, they use\
    \ the same character. The JVM figures whether to use a plus sign as the addition\
    \ operator or as the string concatenation operator by context. If the JVM determines\
    \ that the context is numeric, it performs addition operations. If the JVM determines\
    \ that the context is textual, it performs concatenation operations. [Listing\
    \ 4-8](#Chapter04.html#list_4_8) demonstrates what happens when the JVM encounters\
    \ different contexts:\n\n**Listing 4-8.** The ShiftDemo context switching example\n\
    \n```\nint a = 1;\nint b = 2;\nint c = 3;\nSystem.out.println(a + b + c);\nSystem.out.println(\"\
    a + b + c = \" + a + b + c);\nSystem.out.println(\"a + b + c = \" + (a + b + c));\n\
    ```\n\nWhen run in a program, that code produces the following output (see [Listing\
    \ 4-9](#Chapter04.html#list_4_9)):\n\n**Listing 4-9.** Context switching example\
    \ output\n\n```\n6\na + b + c = 123\na + b + c = 6\n```\n\nThe context for the\
    \ first line is numeric, because the first value processed by the `println` method\
    \ is numeric. The context for the second line is textual because the first value\
    \ processed by the `println` method is a String literal. The third line gets the\
    \ right value because the parentheses force the addition to happen first, even\
    \ though the context is textual."
  raw: 'The fourth example isn''t a cast, but it shows how to get from a primitive
    (a `char` in this case) to a `String`. The same pattern applies for all the primitives:
    First get a wrapper for the primitive and then use the wrapper''s `toString` method.


    I mentioned defensive coding for narrowing casts. Defensive coding is a good idea
    any time you can''t be sure the provided value won''t cause a problem. In fact,
    in some kinds of applications (distributed applications are a prime example),
    it''s standard practice to validate (that is, ensure workable values for) all
    the arguments to a method. [Listing 4-6](#Chapter04.html#list_4_6) is an example
    of defensive coding for a narrowing cast from an int to a byte:


    ***Listing 4-6.** Defensive coding for a narrowing cast*


    `private static byte intToByte(int i) {`

    `  if (i > Byte.MAX_VALUE || i < Byte.MIN_VALUE) {`

    `    throw new IllegalArgumentException("integer argument " +`

    `        "is too large or too small to cast to a byte");`

    `  }`

    `  return (byte) i;`

    `}`


    Then the code that calls `intToByte` can decide what to do about the problem.
    Moving the validation to its own method can be a good idea, both to encapsulate
    each bit of validation and to permit multiple methods to make use of the same
    bit of validation. Many systems have validation classes (and sometimes packages)
    that offer a number of such methods, so that the methods in other classes can
    make use of consistent validation. You get used to that kind of design as you
    learn to use object-oriented languages, including Java.


    #### Multiplicative Operators


    Java has three multiplicative operators: multiplication (*), division (/), and
    modulus (%). (The modulus operator is often called mod or modulo; in Java shops,
    you hear expressions such as “a mod b” when someone reads code aloud.)


    As I mentioned earlier when discussing parentheses, there''s no implicit order
    of operations between these three operators. To the JVM, they all have the same
    precedence. Because that''s the case, the JVM processes them from left to right.
    Again, Java isn''t algebra, though some of the operators and concepts exist in
    both.


    Multiplication and division are obvious enough, but let''s look at the modulus
    operator. As ever, examples help a lot (see [Listing 4-7](#Chapter04.html#list_4_7)).


    ***Listing 4-7.** Modulus operator examples*


    `int a = 9;`

    `int b = 2;`

    `int c = a % b; // c equals 1`

    `float f = 1.9f;`

    `float g = 0.4f;`

    `float h = f % g; // h equals 0.3 – but beware of rounding`


    As this brief listing shows, the modulus operator divides the first operand by
    the second operand and returns the remainder.


    ![images](images/square.jpg) **Caution** Beware of rounding when using the modulus
    operator on floats and doubles. I rounded this to 0.3, but my JVM actually assigned
    0.29999995 to `h` when I ran this bit of code in Eclipse. That might not matter
    if you''re plotting the location of an avatar in a video game (because the screen
    has a fairly low number of pixels, so the error isn''t large enough to put the
    avatar in the wrong spot). However, imagine the same error in code that controls
    a rocket going to Mars. Then it''s a large enough error to ensure that your rocket
    doesn''t end up in the right spot to go into orbit, and that''s an expensive error
    indeed. Rounding tends to be problematic in many applications.


    #### Additive Operators


    You might not think I''d have much to say about plus (+) and minus (−). However,
    even they have subtleties worth noting when used in a Java application. As with
    the multiplicative operators, the order of precedence for the additive operators
    is the same, so they get processed from left to right, even when the minus precedes
    the plus operator on a line. That usually doesn''t matter. However, when it does
    matter, it can be a difficult problem to spot.


    Also, the plus sign is the string concatenation operator. As we see in various
    examples, `someString + someOtherString = aThirdString`. Strictly speaking, the
    addition operator and the string concatenation operator are different operators.
    However, they use the same character. The JVM figures whether to use a plus sign
    as the addition operator or as the string concatenation operator by context. If
    the JVM determines that the context is numeric, it performs addition operations.
    If the JVM determines that the context is textual, it performs concatenation operations.
    [Listing 4-8](#Chapter04.html#list_4_8) demonstrates what happens when the JVM
    encounters different contexts:


    ***Listing 4-8.** The ShiftDemo context switching example*


    `int a = 1;`

    `int b = 2;`

    `int c = 3;`

    `System.out.println(a + b + c);`

    `System.out.println("a + b + c = " + a + b + c);`

    `System.out.println("a + b + c = " + (a + b + c));`


    When run in a program, that code produces the following output (see [Listing 4-9](#Chapter04.html#list_4_9)):


    ***Listing 4-9.** Contect switching example output*


    `6`

    `a + b + c = 123`

    `a + b + c = 6`


    The context for the first line is numeric, because the first value processed by
    the `println` method is numeric. The context for the second line is textual because
    the first value processed by the `println` method is a String literal. The third
    line gets the right value because the parentheses force the addition to happen
    first, even though the context is textual.'
