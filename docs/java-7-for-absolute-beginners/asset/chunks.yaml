- fmt: "#### Exceptions\n\nWhen something bad happens, Java raises an error through\
    \ a process known as “throwing an exception.” `Exception` is a class with many\
    \ (and many levels of) descendants. The `AverageImpl` class throws an `IllegalArgumentException`\
    \ if someone tries to use an empty array, because the `getAverage` method divides\
    \ by the length of the array and it's illegal to divide by 0. (In fact, trying\
    \ to divide by zero creates an `ArithmeticException`, but `AverageImpl` doesn't\
    \ let things get that far.)\n\nWhen you can anticipate that someone might try\
    \ something that will cause a problem, you should test for that problem and throw\
    \ an appropriate exception. Let's look at one of the places where `AverageImpl`\
    \ throws an exception in more detail in [Listing 2-13](#Chapter02.html#list_2_13):\n\
    \n***Listing 2-13.** Throwing an exception*\n\n```\npublic AverageImpl(int[] ints)\
    \ throws IllegalArgumentException {\n        if (ints.length == 0){\n        \
    \        throw new IllegalArgumentException(EXCEPTION_MESSAGE);\n        }\n \
    \       this.ints = ints;\n}\n```\n\nAs you can see, the method declaration includes\
    \ the `throws` keyword and then the name of the exception that the method throws.\
    \ A method can throw any number of exceptions (and many do). When a method can\
    \ throw more than one kind of exception, use a comma to separate them.\n\nWithin\
    \ the method, you can see the test for a problem we want to catch, namely an empty\
    \ array as the value of `ints`. Once we detect the problem, we use the `throw`\
    \ keyword to throw a new instance of the appropriate exception.\n\nWhen a method\
    \ throws an exception, any object that uses that method must handle that exception.\
    \ You can see that happen in the `AverageTest` class, in [Listing 2-14](#Chapter02.html#list_2_14):\n\
    \n***Listing 2-14.** Handling an exception*\n\n```\ntry {\n  averageImpl.setInts(ints2);\n\
    } catch(IllegalArgumentException iae) {\n  System.out.println(\"Oops! can't use\
    \ an empty array\");\n}\n```\n\nThat structure is called a `try`-`catch` block.\
    \ As you can see, it's really two blocks—one within the `try` statement and one\
    \ within the `catch` statement. If the code in the `try` block throws an exception,\
    \ the code in the `catch` statement gets run. You can have multiple `catch` statements,\
    \ each catching a different kind of exception, within a single `try`-`catch` block.\
    \ That way, you can take different actions for different kinds of exceptions.\
    \ You can also add a `finally` block to a `try`-`catch` block. [Listing 2-15](#Chapter02.html#list_2_15)\
    \ shows a more elaborate example based on the existing example:\n\n***Listing\
    \ 2-15**. Try-catch-finally*\n\n```\ntry {\n        averageImpl.setInts(ints2);\n\
    } catch(IllegalArgumentException iae) {\n        System.out.println(\"Oops! can't\
    \ use an empty array\");\n} catch(ArithmeticException ae) {\n        throw ae;\n\
    } finally {\n        System.out.println(\"Made it past the exception!\");\n}\n\
    ```\n\nNotice that the second `catch` block re-throws that particular kind of\
    \ exception. In this case, you probably wouldn't do that, but the example illustrates\
    \ a common practice. Exceptions often get re-thrown, so that they can get handled\
    \ by the method that makes the most sense for handling that particular exception.\
    \ Often, a developer writes a method and has no idea to handle the exception while\
    \ writing that method, so the developer re-throws and figures the next method\
    \ (or the one after that and so on) will know what to do with it. Of course, if\
    \ the exception never gets handled, you have a problem that might crash the program,\
    \ stick embarrassing exception messages in your output, or otherwise leave you\
    \ wiping egg off your face and trying to placate angry users. When you re-throw\
    \ an exception, the method containing your `try`-`catch` block needs to throw\
    \ the exception, too. In that fashion, methods can pass an exception through many\
    \ methods to get it to a method that knows how to handle it.\n\nThe `finally`\
    \ keyword lets you create a block of code that gets run no matter what. Even if\
    \ an exception happens, the code in the `finally` block gets run. In the example\
    \ shown here, it doesn't do much. `finally` often isn't included precisely because\
    \ nothing needs to be done. However, it's sometimes critically important that\
    \ a `finally` block exist to do something. The classic use for a `finally` block\
    \ is to close a database connection. If you open a database connection to do some\
    \ work but then hit an exception, the database connection still needs to get closed.\
    \ Too many open connections slow database performance and can ultimately crash\
    \ a database (a disaster for most commercial software).\n\nOne last thing to know\
    \ about exceptions is that Java has two categories of exceptions: checked exceptions\
    \ and runtime exceptions. Checked exceptions are called that because the compiler\
    \ (which is the program that turns your code into machine code that your computer\
    \ can understand) checks for them when you try to compile your code. One big reason\
    \ to use Eclipse is that it checks for problems as you write your code. If you\
    \ use a method that throws checked exceptions, you must handle those exceptions\
    \ in your code (though re-throwing them counts as handling them). The compiler\
    \ does not check for runtime exceptions. Eclipse runs a compiler for us and checks\
    \ our code as we type it, so we know immediately when we need to catch checked\
    \ exceptions. Runtime exceptions (as the name implies) can only be caught at run\
    \ time, so Eclipse can't warn us about those as we write our code.\n\nChecked\
    \ exceptions represent things beyond the program's control, such as bad user input\
    \ or a file not existing. Runtime exceptions represent things that can be fixed\
    \ with more or better code. One school of thought says that checked exceptions\
    \ represent things the program should recover from. For example, if the program\
    \ encounters a missing file (that is, some method gets an `IOException` when it\
    \ expects a file handle), the program should ask the user where the file is or\
    \ let the user cancel the operation. Runtime exceptions represent errors (usually\
    \ oversights) in the code that developers should fix. If you get a `NullPointerException`,\
    \ you don't ask the user to do anything (though you might tell the user to call\
    \ customer support and report the problem). Instead, you fix the point in the\
    \ code where something is passing null when it shouldn't. One concept that nearly\
    \ all experienced programmers embrace is *defensive programming*, which means\
    \ we try to not let things get to a point where exceptions can happen. Instead,\
    \ we do things like checking to see whether something is null before we try to\
    \ use it.\n\nAs it happens, `IllegalArgumentException` is a runtime exception.\
    \ If you remove the `try`-`catch` blocks from `AverageTest`, you get no error.\
    \ However, because I can anticipate the problem, I elect to specifically throw\
    \ that error, so that I can attach a meaningful error message."
