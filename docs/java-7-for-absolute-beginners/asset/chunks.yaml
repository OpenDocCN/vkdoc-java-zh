    `Target` 类包含了绘制目标以及判断目标是否被点击的逻辑。为简化起见，我判断点击是否位于包含目标点的正方形区域内。要使用更精确的方法，你可以检查玩家点击的像素颜色，如果它不是白色，则判定为命中。我的简化使得游戏稍微容易一些。


    TargetClick 是游戏中最简单的类型。让我们继续讨论一个更复杂的游戏。

