    \ rule of garbage collection: If an object no longer has references held on it\
    \ by other objects, that object gets garbage collected. In other words, once an\
    \ object no longer has any other objects using it, that object is ready to be\
    \ removed from memory. Yet another way to say this is that the object is now unreachable,\
    \ meaning that no other bit of code can reach that object.\n\n#### The Java Garbage\
    \ Collection Algorithm: Marking and Sweeping\n\nThe algorithm that Java uses for\
    \ garbage collection is called marking and sweeping. Conceptually, it's a simple\
    \ idea. First, make an initial pass of the memory and mark any memory that can\
    \ be collected. Then make another pass and free the memory that was marked in\
    \ the first pass.\n\nIn practice, though, the process becomes much more complex.\
    \ The basic algorithm (often called naïve mark and sweep) works fine, so long\
    \ as the whole program stops while the garbage collector runs. The program has\
    \ to stop so that the garbage collector can be sure that no new objects are being\
    \ created and that no existing objects have gotten into a state such that they\
    \ can be garbage collected while the collector runs. Java's earliest versions\
    \ used just such an algorithm. Consequently, Java earned a reputation for being\
    \ unsuitable for applications that required high performance, from video games\
    \ to real-time monitoring of things like valves in a refinery. Later versions\
    \ fixed that problem, but the reputation lingered for several more versions (and\
    \ still pops up in some circles).\n\nSo how does one collect objects and still\
    \ let the program run? In particular, how does one allow creation of new objects\
    \ and send existing objects to collection while letting the garbage collector\
    \ run? Two more advanced algorithms have been developed: Incremental garbage collection\
    \ and concurrent garbage collection.\n\nIncremental garbage collection relies\
    \ on intermittently stopping and starting both the program and the garbage collector\
    \ (which is really just another program being run in parallel by the JVM). Essentially,\
    \ the program gets to do a bit of work, and then the garbage collector gets to\
    \ do a bit, and so on. In this fashion, the program gets to do some work while\
    \ the garbage collector runs. As you can imagine, though, the program's performance\
    \ is still slower than when the garbage collector is not running. In fact,  versions\
    \ of Java had noticeably slower performance when the garbage collector ran. I\
    \ recall playing a video game written in Java and being able to tell when the\
    \ garbage collector started and stopped.\n\nConcurrent garbage collection lets\
    \ the program run at full speed, with one exception: The program must be halted\
    \ while the stack (the list of objects in memory) is scanned. Fortunately, scanning\
    \ the stack takes very little time. Scanning the stack (which is really just a\
    \ list) takes much less time than does scanning the heap (which is all of the\
    \ objects in memory). Imagine reading a book's table of contents versus reading\
    \ the whole book, and you'll have an idea of the difference.\n\nSo how does a\
    \ concurrent garbage collector let the program run at (almost) full speed? The\
    \ garbage collector doesn't concern itself with finding everything that can be\
    \ collected. Instead, it finds what it can be sure of and frees those objects.\
    \ On its next pass, it can catch anything it missed, as well as anything that\
    \ has become removable in the meantime. Thus, the concurrent garbage collection\
    \ rarely gets a perfect sweep, but it lets the program run much more smoothly."
  trans: "\n### 理解内存分配\n\n在真正讨论垃圾回收之前，我们首先需要基本了解 Java 虚拟机（JVM）最初是如何分配内存的。每次创建新对象或基本类型时，堆都会增长该对象或基本类型的大小。此外，如果创建复杂对象（即自身包含其他对象的对象，许多对象都是如此），堆也会增长所有这些对象的大小。例如，考虑我们之前见过的一个类（在上一章中），即\
    \ `TargetClickPanel` 类：\n\n***清单 13-1.** TargetClickPanel 类中的内存分配*\n\n`package\
    \ com.bryantcs.examples.videogames;`\n\n`import java.awt.Graphics;`\n`import java.awt.event.MouseEvent;`\n\
    `import java.awt.event.MouseListener;`\n\n`import javax.swing.JPanel;`\n`public\
    \ class TargetClickPanel extends JPanel implements MouseListener{`\n\n`  private\
    \ static final long serialVersionUID = 1L;`\n\n**`  private Target targets[] =\
    \ new Target[5];`**\n\n`  public TargetClickPanel() {`\n`    addMouseListener(this);`\n\
    `    for (int i = 0; i < targets.length; i++) {`\n`      targets[i] = null;`\n\
    `    }`\n`  }`\n\n`  public void paint (Graphics g) {`\n`    super.paintComponent(g);`\n\
    `    for (int i = 0; i < targets.length; i++) {`\n`      if (targets[i] == null)\
    \ {`\n**`        targets[i] = new Target(this);`**\n`      }`\n`      if (!targets[i].isDone())\
    \ {`\n`        targets[i].draw(g);`\n`      } else {`\n**`        targets[i] =\
    \ new Target(this);`**\n`      }`\n`    }`\n`  }`\n\n`  @Override`\n`  public\
    \ void mouseClicked(MouseEvent e) {`\n`  }`\n\n`  @Override`\n`  public void mouseEntered(MouseEvent\
    \ e) {`\n`  }`\n`  @Override`\n`  public void mouseExited(MouseEvent e) {`\n`  }`\n\
    \n`  @Override`\n`  public void mousePressed(MouseEvent e) {`\n`  }`\n\n`  @Override`\n\
    `  public void mouseReleased(MouseEvent e) {`\n`    for (int i = 0; i < targets.length;\
    \ i++) {`\n\n`      targets[i].pointInTarget(e.getX(), e.getY());`\n`    }`\n\
    `  }`\n`}`\n\n考虑粗体显示的行（`targets` 数组以及 `paint` 方法中创建 `Target` 对象新实例的行）。如果你在程序运行时可视化所有对象和基本类型的值，你会发现\
    \ `paint` 方法首先创建了五个 `Target` 类的实例，然后在现有实例声明自身已完成时，保持其中五个实例继续运行。因此，创建 `TargetClickPanel`\
    \ 实例的结果也会创建五个 `Target` 类的实例。\n\n然而，创建 `TargetClickPanel` 类的实例实际上创建了远不止五个 `Target`\
    \ 类的实例。那些已标记为完成的 `Target` 类实例仍然存在，尽管 `TargetClickPanel` 的实例不再持有对它们的引用。这就是垃圾回收的关键：引用。我们稍后会讨论这一点。首先，让我们考虑在\
    \ `TargetClick` 游戏运行几秒后已创建的 `Target` 对象的状态：\n\n> *Target 1*：因 targets[0] 为 null\
    \ 而创建。现已完成。\n> \n> *Target 2*：因 targets[1] 为 null 而创建。现已完成。\n> \n> *Target 3*：因\
    \ targets[2] 为 null 而创建。现已完成。\n> \n> *Target 4*：因 targets[3] 为 null 而创建。现已完成。\n\
    > \n> *Target 5*：因 targets[4] 为 null 而创建。现已完成。\n> \n> *Target 6*：因 targets[0]\
    \ 已完成而创建。现已完成。\n> \n> *Target 7*：因 targets[1] 已完成而创建。现已完成。\n> \n> *Target 8*：因\
    \ targets[2] 已完成而创建。仍在运行中。\n> \n> *Target 9*：因 targets[3] 已完成而创建。仍在运行中。\n> \n\
    > *Target 10*：因 targets[4] 已完成而创建。仍在运行中。\n> \n> *Target 11*：因 targets[0] 已完成而创建。仍在运行中。\n\
    > \n> *Target 12*：因 targets[1] 已完成而创建。仍在运行中。\n\n以此类推……\n\n在任何给定时刻，`TargetClickPanel`\
    \ 类的实例都持有对五个 `Target` 类实例的引用。但所有已完成的实例会怎样呢？实际上，它们会被垃圾回收。这就是垃圾回收的首要规则：如果一个对象不再被其他对象持有引用，该对象就会被垃圾回收。换句话说，一旦某个对象不再被任何其他对象使用，该对象就准备好从内存中移除。另一种说法是，该对象现在不可达，意味着没有其他代码可以访问该对象。\n\
    \n#### Java 垃圾回收算法：标记与清除\n\nJava 用于垃圾回收的算法称为标记与清除。从概念上讲，这是一个简单的想法。首先，对内存进行初始遍历，标记所有可回收的内存。然后进行第二次遍历，释放第一次遍历中标记的内存。\n\
    \n然而，在实践中，这个过程要复杂得多。基本算法（通常称为朴素标记与清除）在垃圾回收器运行时整个程序停止的情况下工作良好。程序必须停止，以便垃圾回收器能够确保没有新对象被创建，并且现有对象在回收器运行时不会进入可被垃圾回收的状态。Java\
    \ 的早期版本正是使用了这种算法。因此，Java 曾被认为不适合需要高性能的应用程序，从视频游戏到炼油厂阀门等设备的实时监控。后来的版本修复了这个问题，但这种声誉又持续了几个版本（并且在某些圈子里仍然存在）。\n\
    \n那么，如何既回收对象又让程序继续运行呢？特别是，如何在让垃圾回收器运行的同时，允许创建新对象并将现有对象送入回收？已经开发了两种更高级的算法：增量垃圾回收和并发垃圾回收。\n\
    \n增量垃圾回收依赖于间歇性地停止和启动程序以及垃圾回收器（实际上只是 JVM 并行运行的另一个程序）。本质上，程序先执行一点工作，然后垃圾回收器执行一点工作，如此反复。通过这种方式，程序在垃圾回收器运行时也能完成一些工作。不过，可以想象，程序的性能仍然比垃圾回收器未运行时慢。事实上，某些\
    \ Java 版本在垃圾回收器运行时性能明显较慢。我记得玩过一个用 Java 编写的视频游戏，能够分辨出垃圾回收器何时启动和停止。\n\n并发垃圾回收允许程序全速运行，但有一个例外：在扫描栈（内存中的对象列表）时，程序必须暂停。幸运的是，扫描栈所需时间非常短。扫描栈（实际上只是一个列表）所需时间远少于扫描堆（即内存中的所有对象）。想象一下阅读一本书的目录与阅读整本书的差异，你就能理解这种区别。\n\
    \n那么，并发垃圾回收器如何让程序（几乎）全速运行呢？垃圾回收器并不关心找到所有可回收的对象。相反，它找到它能够确定的对象并释放这些对象。在下一轮遍历中，它可以捕获之前遗漏的任何对象，以及在此期间变得可移除的对象。因此，并发垃圾回收很少能完美清除，但它能让程序运行得更加流畅。\n"
- fmt: '# Java 垃圾收集器的发展


    `Java 1.4.2`（在 Java 社区中是一个“红色字母”版本，部分原因是垃圾收集）引入了一种垃圾收集器，可以在增量垃圾收集和并发垃圾收集之间切换。（它实际上支持
    4 种垃圾收集：两种朴素垃圾收集的变体、增量垃圾收集和并发垃圾收集。）软件开发人员随后可以（最好通过测试）决定哪种收集方式最适合他们的程序。突然间，许多 Java
    程序的性能得到了大幅提升。那时，Java 终于可以在高性能应用领域与非垃圾收集语言（尤其是 `C++`）竞争。`Java 5`（也称为 `Java 1.5`）和
    `Java 6`（或 `Java 1.6`）继续通过可以在收集器上设置的各种开关来对垃圾收集器进行微调。我们将在本章末尾介绍这些最有用的开关。


    进入 `Java 7`。`Java 7` 提供了一种新的收集器，称为 `G1`（代表“垃圾优先”）。`G1` 收集器通过将堆划分为区域（或扇区），然后从包含最多垃圾的扇区开始对每个扇区进行垃圾收集，从而比以前的垃圾收集器更进了一步。由于这种“垃圾优先”收集方案，`G1`
    收集器确保在任何给定的扫描中尽可能多地收集垃圾。如果 `G1` 收集器因为程序需要运行而无法扫描整个堆，那么至少它有机会时处理了最糟糕的扇区。在随后的扫描中，其他区域逐渐填满并开始包含最多的垃圾。这些扇区随后依次被扫描。因此，收集器最终会到达内存中的所有区域，但不会试图一次性全部处理。这是一个很好的优化，而且不需要任何新的设置来控制它，这使得它更加出色。这就是
    `G1` 收集器的工作方式。此外，无需启用 `G1` 收集器。如果你使用的是 `Java 7`，那么你就在使用 `G1` 收集器，除非你指定了更旧的收集器。


    ## 理解内存设置


    某些程序必须将大量对象保留在内存中才能正常工作。在这些情况下，使它们工作的唯一方法是扩展程序可用的内存量。


    以 XML 解析器为例。它必须持有从文档树顶部到当前位置的每个节点的引用。此外，处理每个节点会创建对每个子节点的引用。因此，当 XML 解析器深入文档树时，它可能持有大量节点的引用，每个节点由一个对象表示，并且每个对象都持有来自其父节点对象的引用。解析器是那些不太能从垃圾收集中受益的程序类型的常见例子。当然，一个解析文档然后执行其他操作的程序可以在解析完成后释放解析器使用的内存。然后该内存可以用于其他目的，这样程序的内存占用就只是解析或其他操作中较大的那个，而不是解析和其他工作的总和。相反，一个在后台运行其他进程的程序必须有足够的内存来支持其所有并发进程。


    那么 Java 程序员如何为他们的程序提供更多内存呢？他们在启动程序时通过 `JVM` 上的开关来实现。以下是基本的内存设置：


    ![images](images/t1301.jpg)


    你可以通过正确设置初始堆大小来提高程序性能。如果设置得太低，`JVM` 会以该数量启动，然后必须向上调整（可能多次），直到有足够的内存来容纳程序的初始对象集。然后，一旦程序执行某些操作（可能是因为用户对程序进行了操作），`JVM`
    就必须分配更多内存。与其强迫用户忍受低初始内存值造成的缓慢性能，不如分配足够的初始内存来处理程序启动时所需的所有对象，以及它可能需要执行的前几个操作。


    最大内存设置既更明显也更关键。如果你没有分配足够的内存，程序就会崩溃。通常，找到合适的最大内存量是一个实验问题。你必须启动程序，让它运行一段时间，然后观察它使用了多少内存。在
    Windows 上，任务管理器会显示每个进程（包括 Java 程序）使用了多少内存。其他操作系统以其他方式显示该信息，但应该都能找到。


    以下是在启动 Java 程序时使用内存开关的示例：


    ***Listing 13-2.** Example of Java Memory Switches*


    ```

    java -Xms1024M -Xmx8192M ExampleProgram

    ```


    ## 理解垃圾收集


    关于 Java 垃圾收集器，首先要理解的是你无法直接控制它。你可以给它一些提示，表明某些对象现在可以收集了。你还可以在启动程序时设置许多垃圾收集选项，这些设置将控制垃圾收集器的行为。但是，你不能显式地告诉垃圾收集器立即从内存中移除一个对象。也就是说，不存在任何方法或类可以让你专门收集一个现有对象。你可能确信该对象可以安全地移除，但你无法强制垃圾收集器移除它。


    这种缺乏控制的情况让许多软件开发人员有点抓狂。作为一个群体，软件开发人员倾向于控制他们编程的计算机，因此一个只提供间接控制的系统通常不受欢迎。对于习惯了其他语言（尤其是
    `C++`）的程序员来说，这通常是他们开始使用 Java 时的首要抱怨。Java 开发人员没有直接控制权，反而必须小心不要允许存在不必要的引用。


    当 Java 刚出现时，一些开发人员认为并说出了一些废话，比如“哦，太好了！Java 会为我管理内存！”因此，结果创建了不止一个具有不幸倾向（即使用大量内存）的程序。拥有垃圾收集器并不能让我们变得懒惰。我们仍然需要管理内存，只是不显式地进行管理。


    对 Java（以及其他使用垃圾收集的语言）的另一个常见抱怨是，过去在垃圾收集运行时所有事情都会停止。增量垃圾收集和并发垃圾收集的加入在一定程度上减少了这种抱怨，而
    Java 垃圾收集算法的进一步改进极大地改善了这种情况。过去，Java 程序在垃圾收集器运行时经常出现长时间暂停。使用现在可用的现代 Java 虚拟机，这些暂停现在非常罕见（并且是编程不良的症状，而不是
    `JVM` 的问题）。'
  raw: 'Java 1.4.2 (which was a “red letter” release in the Java community, partly
    because of garbage collection) introduced a garbage collector that can be switched
    between incremental garbage collection and concurrent garbage collection. (It
    actually supports 4 kinds of garbage collection: two variants of naïve garbage
    collection, incremental garbage collection, and concurrent garbage collection.)
    Software developers could then decide (preferably through testing) which kind
    of collection worked best for their programs. Suddenly, the performance of many
    Java programs got a big boost. At that point, Java could finally compete with
    non-garbage-collecting languages (notably C++) in the arena of high performance
    applications. Java 5 (also known as Java 1.5) and Java 6 (or Java 1.6) continued
    to add fine tuning to the garbage collector, through various switches that could
    be set on the collector. We''ll cover the most helpful of these switches near
    the end of this chapter.


    Enter Java 7\. Java 7 provides a new collector, called G1 (for “garbage first").
    The G1 collector offers a step up from the previous garbage collectors by dividing
    the heap into regions (or sectors) and then garbage collecting each sector beginning
    with the sector that has the most the most garbage to collect. As a result of
    this “garbage-first” collection scheme, the G1 collector ensures that it gets
    as much garbage as possible on any given sweep. If the G1 collector was unable
    to sweep the whole thing because the program needed to run, at least it got to
    the worst sectors while it had a chance. Over subsequent sweeps, the other regions
    gradually fill up and come to contain the most garbage. Those sectors then get
    swept in their turn. Thus, the collector eventually gets to all regions in memory
    but doesn''t try to get them all at once. It''s a nice bit of optimization that
    is made all the better by not needing any new settings to control it. It''s just
    how the G1 collector works. Also, there''s no need to enable the G1 collector.
    If you''re using Java 7, you''re using the G1 collector, unless you specify an
    older collector.


    #### Understanding Memory Settings


    Some programs must keep large numbers of objects in memory to work correctly.
    In those cases, the only way to make them work is to expand the amount of memory
    available to the programs.


    As a case in point, consider an XML parser. It must have a reference to each node
    in the document tree from the top to its current location. In addition, processing
    each node creates a reference to each child node. Consequently, by the time an
    XML parser has gotten very far into a document tree, it probably has references
    to a lot of nodes, each represented by an object, and each object having a reference
    from the object that represents its parent node. Parsers are one common example
    of the types of programs that don''t benefit much from garbage collection. Of
    course, a program that parses a document and then does something else could free
    the memory used by the parser when the parsing is done. That memory could then
    be for another purpose, such that the program''s footprint would be just the larger
    of the parsing or whatever else it does, rather than the total of both parsing
    and other work. Conversely, a program that runs other processes in the background
    must have enough memory to enable all of its concurrent processes.


    So how do Java programmers give their programs more memory? They do it through
    switches on the JVM when they start the program. Here are the basic memory settings:


    ![images](images/t1301.jpg)


    You can increase a program''s performance by setting the starting heap size properly.
    If you set the number too low, the JVM starts at that amount and then has to adjust
    upward (perhaps several times) until it has enough memory for your program''s
    initial set of objects. Then, as soon as the program does something (perhaps because
    a user did something with the program), the JVM has to allocate yet more memory.
    Rather than force your users to put up with the slow performance that a low starting
    memory value creates, you should instead allocate enough initial memory to handle
    all the objects your program needs at start-up time and to handle the first several
    operations it might need to perform.


    The maximum memory setting is both more obvious and more critical. If you don''t
    allocate enough memory, your program crashes. Usually, finding the right amount
    of maximum memory is a matter of experimentation. You have to start the program,
    let it run for a while, and see how much memory it uses. On Windows, the Task
    Manager shows how much memory each process, including a Java program, uses. Other
    operating systems reveal that information in other ways, but it should be there
    somewhere.


    Here''s an example of using the memory switches when you start a Java program:


    ***Listing 13-2.** Example of Java Memory Switches*


    `java -Xms1024M -Xmx8192M ExampleProgram`


    ### Understanding Garbage Collection


    The first thing to understand about the Java garbage collector is that you can''t
    directly control it. You can give it hints that certain objects are now ready
    for collection. You can also set a number of garbage collection options when you
    start your program, and those settings will control the garbage collector''s behavior.
    However, you cannot explicitly tell the garbage collector to remove an object
    from memory right now. That is, no method or class exists to let you specifically
    collect an existing object. You may be sure that the object can safely be removed,
    but you can''t force the garbage collector to remove it.


    This lack of control drives plenty of software developers a little nuts. As a
    group, software developers tend to want to control the computers they program,
    so a system that offers only indirect control is often not welcomed. For programmers
    accustomed to other languages (especially C++), that''s often a primary complaint
    when they start using Java. Rather than have direct control, Java developers must
    instead be careful not to allow unnecessary references to exist.


    When Java was new, some developers thought and said nonsense such as, “Oh, great!
    Java will manage my memory for me!” Therefore, more than a few programs with an
    unfortunate tendency to use large amounts of memory were created as a result.
    Having a garbage collector doesn''t allow us to be lazy. We still have to manage
    memory, but we don''t do it explicitly.


    Another common complaint with Java (and other languages that use garbage collection)
    used to be that everything stopped while garbage collection ran. The addition
    of incremental and concurrent garbage collection has reduced that complaint somewhat,
    and further refinements in Java''s garbage collection algorithms have improved
    the situation greatly. It used to be common for Java programs to have long pauses
    when the garbage collector ran. With the modern Java virtual machines available
    now, those pauses are now very rare (and are a symptom of poor programming rather
    than the JVM).'
  trans: '

    Java 1.4.2（在 Java 社区中堪称“里程碑式”的版本，部分原因在于其垃圾回收机制）引入了一种可在增量垃圾回收与并发垃圾回收之间切换的垃圾回收器。（实际上，它支持四种垃圾回收方式：两种基础垃圾回收的变体、增量垃圾回收以及并发垃圾回收。）软件开发者随后可以（最好通过测试）决定哪种回收方式最适合他们的程序。突然间，许多
    Java 程序的性能得到了大幅提升。至此，Java 终于能够在高性能应用领域与不具备垃圾回收功能的语言（尤其是 C++）一较高下。Java 5（也称为 Java
    1.5）和 Java 6（或 Java 1.6）继续通过可在回收器上设置的各种开关，对垃圾回收器进行微调。我们将在本章末尾介绍其中最有用的几个开关。


    进入 Java 7 时代。Java 7 提供了一种名为 G1（即“垃圾优先”）的新回收器。G1 回收器相比之前的垃圾回收器更进了一步，它将堆划分为多个区域（或扇区），然后从垃圾最多的扇区开始，逐个对每个扇区进行垃圾回收。得益于这种“垃圾优先”的回收方案，G1
    回收器能确保在每次扫描中尽可能多地回收垃圾。如果 G1 回收器因程序需要运行而无法完成全部扫描，至少它能在有机会时处理了最糟糕的扇区。在后续的扫描中，其他区域会逐渐填满并成为垃圾最多的区域，这些扇区随后也会被依次清理。因此，该回收器最终会处理内存中的所有区域，但不会试图一次性全部处理完。这是一项不错的优化，而且更妙的是，它无需任何新设置来控制。这就是
    G1 回收器的工作方式。此外，也无需手动启用 G1 回收器。如果你使用的是 Java 7，那么你就在使用 G1 回收器，除非你指定了更旧的回收器。


    #### 理解内存设置


    某些程序必须在内存中保留大量对象才能正常运行。在这种情况下，让它们正常工作的唯一方法就是增加程序可用的内存量。


    以 XML 解析器为例。它必须持有从文档树顶部到当前位置的每个节点的引用。此外，处理每个节点时还会创建对每个子节点的引用。因此，当 XML 解析器深入文档树时，它很可能持有大量节点的引用，每个节点由一个对象表示，并且每个对象都持有其父节点对象的引用。解析器是那些从垃圾回收中获益不多的程序类型的常见例子。当然，一个解析文档后执行其他操作的程序，可以在解析完成后释放解析器使用的内存。这部分内存随后可用于其他目的，这样程序的内存占用就只是解析阶段或其他操作中较大的那个，而不是两者之和。相反，一个在后台运行其他进程的程序必须有足够的内存来支持其所有并发进程。


    那么，Java 程序员如何为他们的程序分配更多内存呢？他们通过在启动程序时设置 JVM 的开关来实现。以下是基本的内存设置：


    ![images](img/t1301.jpg)


    通过正确设置初始堆大小，可以提高程序性能。如果设置得太低，JVM 会以该值启动，然后不得不向上调整（可能多次），直到拥有足够的内存来容纳程序初始所需的对象。接着，一旦程序执行某些操作（可能因为用户对程序进行了操作），JVM
    就必须分配更多内存。与其让用户忍受因初始内存值过低而导致的缓慢性能，不如分配足够的初始内存，以处理程序启动时所需的所有对象，以及它可能需要执行的前几次操作。


    最大内存设置既更明显也更关键。如果没有分配足够的内存，程序就会崩溃。通常，找到合适的最大内存量需要反复试验。你需要启动程序，让它运行一段时间，然后观察它使用了多少内存。在
    Windows 上，任务管理器会显示每个进程（包括 Java 程序）使用的内存量。其他操作系统会以其他方式显示该信息，但总归能找到。


    以下是在启动 Java 程序时使用内存开关的示例：


    ***清单 13-2.** Java 内存开关示例*


    `java -Xms1024M -Xmx8192M ExampleProgram`


    ### 理解垃圾回收


    关于 Java 垃圾回收器，首先要明白的一点是：你无法直接控制它。你可以给它一些提示，表明某些对象现在可以被回收。你也可以在启动程序时设置许多垃圾回收选项，这些设置会控制垃圾回收器的行为。然而，你无法明确地告诉垃圾回收器立即从内存中移除某个对象。也就是说，不存在任何方法或类可以让你专门回收一个现有的对象。你可能确信该对象可以安全地移除，但你无法强制垃圾回收器将其移除。


    这种缺乏控制的情况让不少软件开发者感到有些抓狂。作为一个群体，软件开发者往往希望控制他们编程的计算机，因此，一个只提供间接控制的系统通常不受欢迎。对于习惯了其他语言（尤其是
    C++）的程序员来说，这往往是他们开始使用 Java 时的首要抱怨。Java 开发者没有直接控制权，反而必须小心谨慎，避免存在不必要的引用。


    当 Java 刚出现时，一些开发者曾说过诸如“哦，太棒了！Java 会替我管理内存！”之类的胡话。因此，结果就产生了一些不幸倾向于使用大量内存的程序。拥有垃圾回收器并不能让我们变得懒惰。我们仍然需要管理内存，只是不再显式地进行管理。


    另一个过去对 Java（以及其他使用垃圾回收的语言）的常见抱怨是，当垃圾回收运行时，所有事情都会停止。增量垃圾回收和并发垃圾回收的加入在一定程度上减少了这种抱怨，而
    Java 垃圾回收算法的进一步改进则极大地改善了这种情况。过去，Java 程序在垃圾回收器运行时出现长时间停顿是很常见的。借助现在可用的现代 Java 虚拟机，这些停顿已经非常罕见（并且是编程不佳的症状，而非
    JVM 的问题）。

