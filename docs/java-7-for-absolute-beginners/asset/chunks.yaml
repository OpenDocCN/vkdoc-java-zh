    ## 第 5 章


    ## 控制流、循环与分支


    控制流、循环和分支是所有编程中的基本概念。控制流指的是在不同条件下执行不同的代码。循环指的是重复执行相同的代码（尽管每次可能使用不同的值或不同的对象），直到满足某个条件。分支指的是在检测到某个条件时执行其他操作。将它们联系在一起的线索就是条件检测。


    ### 控制流


    Java 提供了两种用于控制程序流程的结构。


    *   `if` 和 `if`-`else`

    *   `switch`


    ![images](img/square.jpg) **注意** try-catch 块提供了一种控制流形式，因为你可以尝试执行某件事，如果第一次尝试抛出异常，则执行其他操作。然而，由于这种机制依赖于捕获异常，它并不是真正的控制流机制。因为异常只在出现问题时才会发生，所以不应将其视为（当然也不应用于）分支。


    #### if 和 if-else 语句


    你已经见过一些 `if` 语句的例子，但让我们再来看一个。我们先从一个尽可能简单的示例开始，如清单 5-1 所示。


    ***清单 5-1.** 一个简单的 `if` 语句*


    `if (a > 0) {`

    `  b = 1;`

    `}`


