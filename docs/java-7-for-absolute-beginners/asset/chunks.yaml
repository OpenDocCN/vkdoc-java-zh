- fmt: "# Relational Operators\n\nThe relational operators compare things to one another.\
    \ In particular, they determine whether one value is greater than, less than,\
    \ equal to, or not equal to another value. For the relational operators to work,\
    \ the items being compared have to be comparable. That sounds obvious, but it\
    \ has a particular meaning in Java. The language specification defines what it\
    \ means to be comparable for the primitives. Thus, you can compare an `int` to\
    \ a `float` and get a meaningful result (the JVM promotes the `int` to a `float`\
    \ and then does the comparison). So long as one or the other can be cast to the\
    \ other value, Java can meaningfully compare primitives, and Eclipse tells you\
    \ when they can't be.\n\n`>` (greater than), `<` (less than), `>=` (greater than\
    \ or equal to), and `<=` (less than or equal to) all work on primitives, but they\
    \ don't work on objects. Conversely, `instanceof` works on objects but not on\
    \ primitives. Java does provide ways to compare objects to one another, but not\
    \ through any operators. We get to comparing objects later in this chapter.\n\n\
    [Listing 4-12](#Chapter04.html#list_4_12) illustrates the comparison of primitives\n\
    \n**Listing 4-12.** Comparing primitives\n\n```\nint a = 0;\nfloat b = 1.0f;\n\
    System.out.println(a > b);\n```\n\nThat bit of code prints \"false\" in the console.\n\
    \nThe `instanceof` operator can be a bit tricky, because a class that extends\
    \ another class is also an instance of the parent class. Consider the following\
    \ small program, implemented in three classes (see [Listing 4-13](#Chapter04.html#list_4_13)).\n\
    \n**Listing 4-13.** `instanceof` test\n\n```\npackage com.apress.javaforabsolutebeginners.examples.instanceofTest;\n\
    \npublic class Person {\n    String firstName;\n    String lastName;\n\n    public\
    \ Person(String firstName, String lastName) {\n        this.firstName = firstName;\n\
    \        this.lastName = lastName;\n    }\n}\n```\n\n```\npackage com.apress.javaforabsolutebeginners.examples.instanceofTest;\n\
    \npublic class Student extends Person {\n    String schoolName;\n\n    public\
    \ Student(String firstName, String lastName, String schoolName) {\n        super(firstName,\
    \ lastName);\n        this.schoolName = schoolName;\n    }\n}\n```\n\n```\npackage\
    \ com.apress.javaforabsolutebeginners.examples.instanceofTest;\n\npublic class\
    \ InstanceofTest {\n\n    public static void main(String[] args) {\n        Student\
    \ student = new Student(\"Sam\", \"Spade\", \"Noir U\");\n        System.out.println(student\
    \ instanceof Student);\n        System.out.println(student instanceof Person);\n\
    \    }\n}\n```\n\nBoth print statements print \"true\" in the console. After all,\
    \ a student is a person. The nature of object-oriented programming, where one\
    \ class always extends another, demands that the `instanceof` operator works this\
    \ way.\n\nThe `instanceof` operator can cause subtle problems. In particular,\
    \ the `instanceof` operator won't throw an error if its right-hand operand is\
    \ `null`. Instead, it always returns `false` in those cases. If you use something\
    \ like `myClass instanceof myBaseClass` and have inadvertently set `myBaseClass`\
    \ to `null`, the result is `false`. You might then think that `myClass` isn't\
    \ an instance of `myBaseClass`, but you can't actually know that if you're comparing\
    \ to `null`. This is another great place to practice defensive programming and\
    \ make sure you're not getting `null` there.\n\nIf you're careful to make sure\
    \ you know the relationships between the classes you use (which is part of being\
    \ a good object-oriented programmer) and to ensure that you're not comparing to\
    \ `null`, you shouldn't get into too much trouble with the `instanceof` operator.\n\
    \n# Equality Operators\n\nJava has two equality operators: `==` (equals) and `!=`\
    \ (not equals). (The exclamation point, both in this context and in others, is\
    \ sometimes called a \"bang\" by software developers.) The equality operator (`==`)\
    \ and the inequality operator (`!=`) work the same way (each is the negative of\
    \ the other), so I'll confine this discussion to the equality operator.\n\nJava\
    \ uses a single equal sign as the base assignment operator (we get to the assignment\
    \ operators later in this chapter), so it can't use a single equal sign for comparisons.\
    \ Consequently, Java (and the other languages that share Java's basic syntax)\
    \ uses two equal signs.\n\nA common mistake among folks new to Java (and not-so-new\
    \ folks who aren't careful with their typing) is to use a single equal sign (the\
    \ assignment operator) when they should use two equal signs (the equality operator)\
    \ and accidentally assign a value to a variable rather than compare the variable's\
