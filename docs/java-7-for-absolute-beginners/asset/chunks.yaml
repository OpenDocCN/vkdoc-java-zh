  trans: '

    #### 理解分代机制


    Java 垃圾回收器采用了分代的概念。在大多数应用程序中，几乎所有对象的存活时间都非常短暂。如果你观察由 `TargetClickPanel` 类实例（上一章中列出）创建的
    `Target` 对象，你会发现每个对象仅存在几秒钟。事实上，如果玩家点击了某个对象，`Target` 类的实例可能只存在不到一秒钟。相反，`TargetClickPanel`
    实例和 `TargetClick` 实例在整个游戏运行期间都存在，但整个过程中每个类只有一个实例。


    假设一局 `TargetClick` 游戏创建了 100 个 Target 对象。在这种场景下，两个对象（一个 `TargetClick` 类实例和一个 `TargetClickPanel`
    类实例）在程序整个生命周期内都存在，而另外 100 个对象（所有 `Target` 类的实例）每个存在时间都不超过几秒钟。因此，至少在这个例子中，我们有一个很好的示例，说明几乎所有对象都不会在系统中长期存在。


    所有这些短命对象最终都会进入“年轻代”。年轻代包含三个空间：“伊甸园”、“From”和“To”。伊甸园空间是对象首先进入的地方。因此，当你的程序创建一个新对象（例如
    TargetClick 游戏中的 `Target` 类实例）时，该对象会进入伊甸园空间。From 和 To 空间被称为“幸存者空间”，那些至少经历了一次垃圾回收后仍然存活的对象会移入这些空间，直到它们存活足够长的时间后，才会被移入老年代。在任何给定时刻，总有一个幸存者空间是空的。当垃圾回收器运行时，它会将幸存者从伊甸园空间和当前被占用的幸存者空间移动到当前为空的幸存者空间。


    存活时间较长的对象（无论是经过一定时间还是经历一定次数的回收）最终会进入“老年代”（也称为“旧生代”——随着年龄增长，我越来越喜欢谈论“老年代”）。最后，“永久代”实际上并不是一个分代，而是
    JVM 存储类定义的区域。永久代不一定是静态的，因为 Java 程序可以在运行时加载和卸载类。


    Java 的垃圾回收器对年轻代的回收频率高于老年代，并且对这两个分代使用不同的回收算法。更详细的细节超出了本书的范围。如果你对 Java 回收算法的更多细节感兴趣，可以找到许多专门讨论该主题的书籍和网站。高效的垃圾回收是吸引计算机科学领域最优秀人才的问题之一，因为它既具有实用性（每个
    Java 程序员都需要一个好的回收器），又具有高度的理论性。


    垃圾回收算法设计者（包括 Java 中使用的算法）面临的一个非常棘手的问题是如何处理跨越分代边界的引用。在垃圾回收器从内存中移除一个对象之前，它必须确保不存在任何引用。这意味着需要跨分代检查引用，这是一项难以快速完成的任务。


    #### 新生代回收与全回收


    Java 垃圾回收器可以通过仅回收年轻代来执行部分垃圾回收。这种操作称为“新生代回收”。当垃圾回收器同时回收年轻代和老年代时，这被称为“全回收”（或通常简称为“回收”）。许多命令行开关可以修改垃圾回收器针对年轻代和老年代的行为。我们将在本章后面的“理解垃圾回收设置”一节中遇到这些开关以及其他开关。


    #### 垃圾回收是事件驱动的


    垃圾回收并非在每次对象不再有任何引用时都会发生。如果真是这样，每个 Java 程序花在移除未使用对象上的时间将超过做其他任何事情的时间，所有 Java 程序的性能都会变得非常糟糕，以至于没有人会使用
    Java 做任何事情。


    相反，Java 垃圾回收器基于事件驱动模型工作。当满足某些条件时，垃圾回收器就会运行。这些条件涉及已使用的堆空间（内存量）与空闲内存量以及总内存量之间的比率。简单来说，当
    JVM 确定内存即将耗尽时，它就会运行垃圾回收器。因此，当堆空间相对于总内存量的比例达到某个百分比时，垃圾回收器会移除所有没有引用的对象。这样做会向下调整已使用内存的百分比，从而使程序能够继续运行。


    #### 理解垃圾回收设置


    Java 垃圾回收器使用另一组开关（类似于我们之前看到的内存开关），你可以在启动程序时进行设置。以下是最常见开关的总结：


    ![images](img/t1302.jpg)

