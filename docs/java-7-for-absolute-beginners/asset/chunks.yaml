    #### 按位异或运算符 (^)


    按位异或运算符（通常缩写为 XOR）(^) 会比较两个二进制值，如果对应位不同，则将该位设置为 1。同样，通过示例来解释这类概念最为合适（参见清单 4-18）。


    ***清单 4-18.** 按位异或运算符 (^)*


    `Byte byte1 = Byte.parseByte("01010101", 2); // byte1 = 85`

    `Byte byte2 = Byte.parseByte("00111111", 2); // byte2 = 63`

    `int result = byte1 ^ byte2; // result = 106`


    结果值为 106，因为取两个比较值中任一为 1 的位，得到的二进制结果为 `01101010`，恰好是 106 的二进制表示。


    #### 按位或运算符 (|)


    按位或运算符 (|) 会比较两个二进制值，如果任一对应位为 1，则将该位设置为 1。同样，通过示例来解释这类概念最为合适（参见清单 4-19）。


    ***清单 4-19.** 按位或运算符 (|)*


    `Byte byte1 = Byte.parseByte("01010101", 2); // byte1 = 85`

    `Byte byte2 = Byte.parseByte("00111111", 2); // byte2 = 63`

    `int result = byte1 | byte2; // result = 127`


    结果值为 127，因为取两个比较值中任一为 1 的位，得到的二进制结果为 `01101010`，恰好是 127 的二进制表示。


    你可能会问，什么时候会用到这些位运算符。实际上，它们有许多有用的应用。游戏开发者经常使用位运算进行高速图形处理。再想象一个游戏，其中两个对象以某种方式合并（例如，用红色子弹射击蓝色物体，使其变成紫色）。按位与运算符
    (`&`) 提供了一种高速确定新颜色的方法。位运算符也常用于检测鼠标按钮的组合按下情况，或者检测鼠标移动时某个按钮是否被按住（从而产生拖拽操作）。因此，它们可能看起来像是古怪的运算符，但确实有其用途。


    #### 逻辑与运算符 (&&)


    逻辑与运算符 (`&&`) 在两个参数都为真时返回 `true`，只要其中一个为假则返回 false。它最常用于 if 语句中，但在任何需要确保两个布尔值都为真的场景下都很方便。此外，逻辑与运算符是最常用的运算符之一。如果我们每次输入
    `&&` 都能得到五分钱就好了……


    清单 4-20 是一个示例。


    ***清单 4-20.** 逻辑与运算符 (&&)*


    `if (2 > 1 && 1 > 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    在这段代码片段中，我们使用了三个运算符。由于运算符优先级，两个比较运算符 (`>`) 会在逻辑与运算符 (`&&`) 之前被求值，因此我们不需要括号来确保正确执行（不过，根据你的编码风格，为了清晰起见，你可能还是想加上括号）。


    此外，你可以链式使用多个逻辑与运算符（以及大多数其他运算符），如清单 4-21 所示。


    ***清单 4-21.** 链式逻辑与运算符*


    `if (3 > 2 && 2 > 1 && 1 > 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    中间比较 (2 > 1) 的结果同时作为两个逻辑与运算符的操作数。这种链式操作在所有编程问题中都很常见，无论使用何种语言。幸运的是，Java 让这一切变得简单。


    #### 逻辑或运算符 (||)


    逻辑或运算符 (`||`) 在其任一参数为真时返回 true，仅当两个参数都为假时才返回 false。除此之外，它的工作方式与逻辑与运算符类似。


    清单 4-22 是一个示例。


    ***清单 4-22.** 逻辑或运算符 (||)*


    `if (2 > 1 || 1 < 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    与逻辑与运算符一样，你可以链式使用多个逻辑或运算符，如清单 4-23 所示。


    ***清单 4-23.** 链式逻辑或运算符*


    `if (3 > 2 || 2 < 1 || 1 < 0) {`

    `  System.out.println("Numbers work as expected");`

    `}`


    ![images](img/square.jpg) **注意** 当我们运行这段代码时，Eclipse 会警告我们在比较中存在死代码。因为 2 总是大于 1，JVM
    不会尝试比较 1 和 0，所以 Eclipse 告诉我们，可以移除那个比较。当然，现实世界中的示例会检查以确保数据流不为 null 且至少包含一些内容。清单
    4-24 包含了这样的代码。


    ***清单 4-24.** 逻辑或运算符的更实际用法*


    `if (dataStream == null || dataStream.length == 0) {`

    `  log.error("No data available!");`

    `}`


    同样，相等运算符具有更高的优先级，所以我们不需要额外的括号。


    #### 赋值运算符


    赋值运算符用于设置值并分配对象引用。基本赋值运算符 (`=`) 是迄今为止最常用的运算符。每当我们像 `int = 0`（为基本类型赋值）或 `Date now
    = new Date()`（为变量分配对象引用）这样写示例时，我们都在使用基本赋值运算符。


    Java 提供了许多复合赋值运算符（通常称为快捷运算符）。清单 4-25 是其中一个复合赋值运算符的示例。


    ***清单 4-25.** 复合赋值运算符*


    `int myInt = 2;`

    `myInt *= 2; // 等价于 myInt = myInt * 2;`

    `System.out.println(myInt); // 输出 4;`


    每个复合运算符都会先应用复合运算符中的第一个运算符以及复合运算符后面的值，然后再应用赋值运算符。在前面的示例中，乘法运算符应用于 `myInt` 和复合运算符后面的值（在本例中，将
    `myInt` 的值加倍），然后将 `myInt` 设置为结果。


    复合赋值运算符可能会导致意想不到的结果。考虑清单 4-26 中的以下代码片段。在阅读该片段后面的内容之前，先问问自己：“最后 `myInt` 的值是多少？”


    ***清单 4-26.** 复合赋值问题*


    `int myInt = 2;`

    `myInt *= (myInt = 4);`

    `System.out.println(myInt);`


    在打印语句之前的最后一次赋值是 `myInt = 4`，所以你可能会认为答案一定是 4。但是我们将 `myInt` 设置为 4，然后将其与自身相乘，所以你可能会认为答案一定是
    16。事实上，两者都不正确。该代码片段输出 8。起初可能看起来很奇怪，但一旦你理解了 JVM 如何处理复合运算符，这就说得通了。当 JVM 遇到复合运算符时，它知道
    myInt 等于 2。在整个运算符被解析之前，`myInt` 的值不能被改变。（顺便说一下，这是我们知道的唯一一个括号不优先处理的情况。）因此，该行内的赋值被忽略，但赋值中的值被使用。最终，结果是
    2 乘以 4，即 8。


    ![images](img/square.jpg) **注意** 这个问题基本上只是学术上的好奇心。这是 Java 语言开发者必须考虑的一个问题，但聪明的程序员不会编写这样的代码。聪明的程序员会分解他们的操作，使得每一行的效果清晰明了，无需过多解读。请记住，如果你以编程为生，其他程序员必须阅读并理解你的代码，很少有开发团队能容忍这种令人困惑且难以理解的代码。


    表 4.3 显示了所有赋值运算符，包括复合运算符。


    ![images](img/t0403.jpg)

