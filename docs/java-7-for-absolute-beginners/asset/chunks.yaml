  trans: '

    ##### 实现 `java.lang.Comparable`


    Java 社区公认的另一项最佳实践是，对于对象的“自然”比较，应使用 `java.lang.Comparable`。人们通常会按姓名自然排序（看看电话簿就知道了），因此实现
    `java.lang.Comparable` 并让其 `compareTo` 方法告诉我们一个姓名是小于、等于还是大于另一个人的姓名，是很有意义的。代码清单
    4-30 再次展示了我们的 `Person` 类，并新增了 `java.lang.Comparable` 的实现。在我们的 `Person` 示例中，我们获取每个
    `String` 字段的数值，将它们相加，并将其用作 `Person` 对象的数值。


    ***代码清单 4-30.** 实现 java.lang.Comparable 的 Person 类*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class Person implements Comparable<Person> {`

    `  String firstName;`

    `  String lastName;`

    `    public Person (String firstName, String lastName) {`

    `    this.firstName = firstName;`

    `    this.lastName = lastName;`

    `  }`


    `  public boolean equals(Person p) {`

    `    if (p == null) {`

    `      return false;`

    `    }`

    `    if (p == this) {`

    `      return true;`

    `    }`

    `    if (!(p instanceof Person)) {`

    `      return false;`

    `    }`

    `    if (p.lastName.equals(this.lastName)`

    `        && p.firstName.equals(this.firstName)) {`

    `      return true;`

    `    } else {`

    `      return false;`

    `    }`

    `  }`


    `  public int hashCode() {`

    `    int result = 17;`

    `    result *= firstName.hashCode() * 37;`

    `    result *= lastName.hashCode() * 37;`

    `    return result;`

    `  }`


    `  public int compareTo(Person p) {`

    `    int thisTotal = firstName.hashCode() + lastName.hashCode();`

    `    int pTotal = p.firstName.hashCode() + p.lastName.hashCode();`

    `    if (thisTotal > pTotal) {`

    `      return 1;`

    `    }`

    `    if (thisTotal < pTotal) {`

    `      return -1;`

    `    }`

    `    // 必须相等`

    `    return 0;`

    `  }`

    `}`


    `compareTo` 方法保证的约定（如其文档所述）是：如果当前对象大于参数中的对象，则返回正数；如果当前对象小于参数中的对象，则返回负数；如果两者相等，则返回
    0。同样重要的是，给定相同的对象作为参数，`equals` 方法应返回 `true`，而 `compareTo` 方法应返回 0。为此，只需在两个方法中使用相同的字段即可。如果你需要打破此规则，请务必在
    `compareTo` 方法的 Javadoc 中记录说明。


    ![images](img/square.jpg) **提示** 一个常见问题是尝试将实现了 `java.lang.Comparable` 的类强制转换为你自己的类。由于它们位于不同的包中（你的类位于你自己的包中，而另一个类位于
    `java.lang.Comparable` 包中），因此你无法将你的类强制转换为另一个类。`Integer` 可能是最常导致此问题的类，但任何扩展了 `java.lang.Comparable`
    的类都存在同样的问题。因此，如果你看到 `ClassCastException`，请记住这个特定问题，因为它很可能是导致该异常的原因。


    请记住，要比较 `Person` 对象，你需要创建另一个包含 `main` 方法的类，设置几个 `Person` 对象，然后比较它们。我在本章末尾包含了一个专门执行此操作的类，但为什么不现在就尝试一下呢？与许多其他事情一样，除非你亲自编程，否则你无法学会编程。


    **实现 `java.util.Comparator`** 尽管 Java 社区使用 `java.lang.Comparable` 进行自然比较，但当我们想要以某种任意方式比较对象时，我们会实现一个
    `Comparator`。此外，由于 `Comparator` 对象本身也是类，因此可以为同一个类实现许多不同的 `Comparator` 对象。让我们扩展
    `Person` 对象，添加一个我们通常可能不会用来排序的字段，然后创建一个 `Comparator` 类来按该字段排序。这种事情实际上经常发生，因为它允许按不太明显的特征进行分组。代码清单
    4-31 显示了修改后的 Person 类。


    ***代码清单 4-31.** 包含喜爱书籍字段的 Person 类*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class Person implements Comparable<Person> {`

    `  String firstName;`

    `  String lastName;`

    `  String favoriteBook;`

    `    public Person (String firstName, String lastName, String favoriteBook) {`

    `    this.firstName = firstName;`


    `    this.lastName = lastName;`

    `    this.favoriteBook = favoriteBook;`

    `  }`


    `  public boolean equals(Person p) {`

    `    if (p == null) {`

    `      return false;`

    `    }`

    `    if (p == this) {`

    `      return true;`

    `    }`

    `    if (!(p instanceof Person)) {`

    `      return false;`

    `    }`

    `    if (p.lastName.equals(this.lastName)`

    `        && p.firstName.equals(this.firstName)) {`

    `      return true;`

    `    } else {`

    `      return false;`

    `    }`

    `  }`


    `  public int hashCode() {`

    `    int result = 17;`

    `    result *= firstName.hashCode() * 37;`

    `    result *= lastName.hashCode() * 37;`

    `    return result;`

    `  }`


    `  public int compareTo(Person p) {`

    `    // 先按姓氏排序`

    `    if (lastName.compareTo(p.lastName) > 0) {`

    `      return 1;`

    `    }`

    `    if (lastName.compareTo(p.lastName) < 0) {`

    `      return -1;`

    `    }`

    `    // 姓氏必须相等`

    `    // 因此比较名字`

    `    if (firstName.compareTo(p.firstName) > 0) {`

    `      return 1;`

    `    }`

    `    if (firstName.compareTo(p.firstName) < 0) {`

    `      return -1;`

    `    }`

    `    // 两个名字必须相等`

    `    return 0;`

    `  }`

    `}`


    代码清单 4-32 显示了书籍比较器类。


    ***代码清单 4-32.** 书籍比较器类*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `import java.util.Comparator;`


    `public class BookComparator implements Comparator<Person> {`


    `  public int compare(Person p1, Person p2) {`

    `    return p1.favoriteBook.compareTo(p2.favoriteBook);`

    `  }`

    `}`


    在这种情况下，我们只需使用 `String` 类的 `compareTo` 方法即可。请注意，我们必须告诉比较器要比较什么类型的事物（使用 `Comparator<Person>`）。否则，我们必须接受
    `Object` 类型的参数并将其强制转换为 `Person` 类型的对象。


    ![images](img/square.jpg) **注意** 对于原始类型的数组或任何实现了 `java.lang.Comparable`（例如 `String`
    和 `Integer`）的对象的集合，你不需要比较器。这些对象本身已经是可比较的。


    最后，代码清单 4-33 展示了扩展后的 `CompareTest`，它使用了两种比较方式。


    ***代码清单 4-33.** 使用两种比较方式的 CompareTest*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `import java.util.ArrayList;`

    `import java.util.Collections;`


    `public class CompareTest {`

