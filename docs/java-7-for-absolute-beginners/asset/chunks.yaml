    need for it. Use that final `else` trick when you can''t be sure you''ll always
    get an expected condition or (as in the earlier example) when you can use it as
    a shortcut.


    #### switch Statements


    The `switch` keyword lets us set up a structure that does the same thing as a
    set of `if`-`else` statements but that uses a different syntax. Personally, I''m
    so accustomed to reading if-else blocks that we prefer them, but many developers
    prefer `switch` statements. Also, a `switch` statement can be easier to debug,
    if your debugger doesn''t support conditional breakpoints. Fortunately for us,
    the debugger built into Eclipse does support conditional breakpoints, as we will
    see in [Chapter 11](#Chapter11.html#ch11), “Debugging.”


    One difference between `if` statements and `switch` blocks is that `if` statements
    evaluate only `boolean` conditions. That is, the evaluation expression in an `if`
    statement must always resolve to `true` or `false`. A `switch` block evaluates
    any value of the type used as its argument. Consequently, a `switch` block evaluating
    `int` values evaluate any `int` value. In this way, `switch` blocks support any
    number of execution paths versus the two paths (`true` and `false`) of an `if`
    statement.


    Also, the switch statement evaluates only integers, String objects, and enumerations.
    If you have a class that produces a set of other possibilities (such as a class
    that produces a different type of object for each possible result), you need to
    use an `if`-`else` structure rather than a switch statement.


    A `switch` statement requires a number of case labels, each of which forms a comparison
    with the value defined as the `switch` statement''s single argument. Let''s consider
    [Listing 5-5](#Chapter05.html#list_5_5): creating a greeting based on the time
    of day (same output as [Listing 5-3](#Chapter05.html#list_5_3), but with a `switch`
    statement).


    ***Listing 5-5.** Example switch statement*


    `GregorianCalendar gregorianCalendar = new GregorianCalendar();`

    `int hour = gregorianCalendar.get(Calendar.HOUR_OF_DAY);`

    `String greeting = "Good ";`

    `switch(hour) {`

    `  case (1):`

    `  case (2):`

    `  case (3):`

    `  case (4):`

    `  case (5):`

    `  case (6):`

    `  case (7):`

    `  case (8):`

    `  case (9):`

    `  case (10):`

    `  case (11): {`

    `    greeting += "morning";`

    `    break;`

    `  }`

    `  case (12):`

    `  case (13):`

    `  case (14):`

    `  case (15):`

    `  case (16):`

    `  case (17): {`

    `    greeting += "afternoon";`

    `    break;`

    `  }`

    `  default: {`

    `    greeting += "evening";`

    `    break;`

    `  }`

    `}`

    `System.out.println(greeting );`


    Note the `default` case at the end. That''s a `switch` block''s way of letting
    you do something with input that doesn''t match any of the cases. In this example,
    we use it to catch the values between 18 and 24 (inclusive). We can do that because
    we know we won''t get any other values. If we aren''t sure that we wouldn''t get
    an unexpected value, we would probably throw an exception in the `default` case,
    to let whatever code uses the `switch` block know that we found a problem.


    One issue with a `switch` statement is that it cannot group its possible values
    (other than through the `default` keyword). Consequently, we end up with a lot
    of `case` labels that appear to do nothing. In fact, each group of `case` statements
    shares the next block of code they encounter within the `switch` statement. In
    this case, that means values 1 through 11 share the code that adds “morning” to
    the greeting and values 12 through 17 share the code that adds “afternoon” to
    the greeting.


    Another issue with `switch` statements is that each block of code generally requires
    a `break` statement. Each `break` statement makes the program jump from the break
    statement to the end of the `switch` statement. Consider what happens if we assume
    the input is 10\. As written, the output is “Good morning.” Without the `break`
    statements, the output is “Good morningafternoonevening.” That is, each of the
    blocks is run. This happens because any `case` label without a `break` statement
    falls through to the next `case` statement. That''s the mechanism that lets multiple
    `case` labels share one block of code. With no `break` statements, every block
    of code in the `switch` statement gets run. Although running more than one block
    of code might be useful in some cases, it''s generally an error (and can be hard
    to find because the code probably looks right).


    A final issue is the `default` keyword. A `switch` statement doesn''t require
    a `default` section. However, `switch` statements often do include `default` sections.
    A `default` section performs the same function as a final `else` statement in
    a group of `if`-`else` statements. As with the final `else`, you can use a `default`
    section for any remaining values, provided you are sure you won''t get an unexpected
    value for the `switch` statement''s argument. When you can''t be sure of your
    input, use the `default` block to trap unexpected values and take some appropriate
    action (often either doing nothing or throwing an exception). `default` sections
    don''t require `break` statements (the code “falls through” to the end of the
    `switch` statement anyway), but it''s customary (and it''s custom because it''s
    a good idea) to add one, for consistency and readability.


    Let''s consider another example in [Listing 5-6](#Chapter05.html#list_5_6) of
    a switch statement, this one being parallel in function to [Listing 5-4](#Chapter05.html#list_5_4).


    ***Listing 5-6.** Using a switch statement without a default section*


    `GregorianCalendar gregorianCalendar = new GregorianCalendar();`

    `int day = gregorianCalendar.get(Calendar.DAY_OF_WEEK);`

    `String greeting = "Good ";`

    `switch (day) {`

    `  case 1: {`

    `    greeting += "Sunday";`

    `  }`

    `  case 2: {`

    `    greeting += "Monday";`

    `  }`

    `  case 3: {`

    `    greeting += "Tuesday";`

    `  }`

    `  case 4: {`

    `    greeting += "Wednesday";`

    `  }`

    `  case 5: {`

    `    greeting += "Thursday";`

    `  }`

    `  case 6: {`

    `    greeting += "Friday";`

    `  }`

    `  case 7: {`

    `    greeting += "Saturday";`

    `  }`

    `}`

    `greeting += " to you.";`

    `System.out.println(greeting );`


    [Listing 5-4](#Chapter05.html#list_5_4) could use a final `else` statement with
    no comparison. The final `case` in [Listing 5-6](#Chapter05.html#list_5_6) could
    be a `default` section. Either one works. When I make a single `case` for every
    option, I prefer to fill it in, but that''s just a matter of style. As with the
    final `else`, you can use a `default` section either as a shortcut for all the
    cases you didn''t define or as a way to trap an unexpected value. Only use `default`
    as a shortcut if you''re absolutely sure of the values (as we can be when using
    `GregorianCalendar`).


    ### Looping


    Java offers three constructs for looping:


    *   for

    *   while

    *   do-while


    `for` loops are the most commonly used, but `while` and `do`-`while` loops certainly
    have their uses.


    ![images](images/square.jpg) **Note** All loops have three operations: initialize
    a variable, test it to see whether we''re done, and update the variable to be
    tested again. Everything else is just additional detail or alternate syntax, as
    we see shortly.'
