    As you can see, the values for `endX` and `endY` are closer to the values I expected,
    which brings us to one more thing that you need to do when writing software: figure
    out what values to expect. If you don''t know what values should appear in the
    debugger, you can''t be sure your code is doing the right (or wrong) thing.


    ### Summary


    We covered a lot of ground in this chapter. You learned:


    *   The general flow of debugging.

    *   How to debug without a debugger (and why it''s better to have one).

    *   How to set a line breakpoint.

    *   That other kinds of breakpoints are available to expand with your debugging
    needs.

    *   How to step over code and how to step into code.

    *   How to examine the values of the variables as they are affected by the code.

    *   That you need to know what to expect before you can know what''s wrong.

    *   How to use those expectations to find and fix a problem.


    As you do more with programming, you''ll go through this basic process many, many
    times. With practice, you''ll gradually develop your own feel for where problems
    lie and how to find them. Honestly, debugging is an art form, and it''s the sense
    of what''s wrong that comes with experience that will let you do more, rather
    than any formal understanding of debuggers. So, use the Eclipse debugger and any
    other debuggers you may encounter in the future to develop your own debugging
    skill. Having a knack for debugging is one of the things that separate senior
    developers from junior developers, and experience is the only way to create that
    knack for yourself.


    Now, go point the Eclipse debugger at the code you''ve developed while reading
    this book, set a few breakpoints, and see what you can learn. I bet you''ll be
    surprised.


    ## C H A P T E R  12


    ## Video Games


    By “video games,” I mean games which have very limited controls and a primary
    interface that is somehow animated. Other computer games still use animation but
    aren''t video games in classic parlance. For example, an old game called BattleZone
    (which I used to play in college) is a video game. Civilization, in all of its
    incarnations, is a computer game but not a video game. What''s the difference?
    Complexity and the skill used to play the game. Video games tend to be simple
    and require dexterity. Other games tend to be more complex and rely on intelligence.
    As an avid gamer, I enjoy both, depending on my mood.


    I bet a lot of the people who read this book want to learn to write video games.
    Fair enough. I probably would do that, too. If you love games so much that you
    jumped to this chapter first, I suggest you at least read the chapter on animation
    as those concepts very much apply to programming video games.


    ### The Mechanics of a Video Game


    Before we plunge into the game, let''s first consider the core components of a
    video game in terms that aren''t specific to any programming language, including
    Java. Then, as we go through a couple of examples, we can talk about how the examples
    implement these mechanics. Video games consist of three main pieces:


    *   The user interface

    *   The game logic

    *   The game loop


    #### The User Interface


    As we have seen in the previous chapters, any program with a graphical user interface
    devotes much of its code to creating and responding to that user interface. Unfortunately,
    that can mean losing sight of the game logic in the user interface code. Complex
    games (such as most modern video games) separate the logic from the presentation
    (another name for the user interface) by having the logic in one set of classes
    and having the presentation in another set of classes. Simple games may blend
    logic and presentation in the same classes (though probably in different methods).
    The sample games in this chapter use the latter organization as they are very
    simple games. We''ve already discussed the idea of blending logic and presentation
    in [Chapter 6](#Chapter06.html#ch6), “Object-oriented Programming.”


    However, there''s always some point in the user interface code that triggers behavior
    in the logic code. These points are usually where the code handles input from
    the user. If you click a button on a mouse, the input does go through the user
    interface layer (via the mouse handler), but that click almost certainly triggers
    some kind of game logic as well. When you read the code for video games (you can
    find code for lots of games on the web, by the way), watch for those entry points
    to the game logic. They are key spots in any computer game.


    #### The Game Logic


    “Game logic” refers to the way the game responds to the user''s input and possibly
    to other conditions (such as timers or network events). Here are some examples
    of game logic that you may have seen in various games:


    *   The player scores points after hitting a target.

    *   The game is over when the timer runs down.

    *   Jumping on a particular spot opens a secret door.


    All games have at least a little game logic. The game (usually) needs some kind
    of ending condition (the game-over condition), and most games have some way of
    keeping score. Not all games need these things, but most do. For instance, the
    second example (a very simple shooting gallery game) in this chapter has no ending
    condition. You can keep shooting things as long as you like.


    #### The Game Loop


    As you may recall from [Chapter 10](#Chapter10.html#ch10), “Animation,” the number
    of times a program redraws the screen is its frame rate, and the number of times
    a program processes all of its inputs and produces all of its outputs is its hertz.
    The game loop dictates both of those measures of speed. The second sample in this
    chapter (the shooting gallery game) runs through its game loop 50 times a second,
    so both its frame rate and its hertz are 50.


    So what does a game loop do? That can vary from game to game, but there are some
    basics that any game loop has to do:


    *   Process the user input and all other inputs

    *   Process the game logic

    *   Redraw the playing field'
