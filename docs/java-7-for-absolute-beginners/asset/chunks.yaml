    ### 编写 XML


    如前所述，你可以使用 DOM 包或通过编写 `String` 对象来编写 XML。如果你只需要编写一个 XML 文件，直接编写字符串就足够了（这也是创建 XML
    最快的方式）。另一方面，如果你需要将 XML 输出传递给一个需要 XML 头部的进程，甚至可能需要确保 XML 符合某个模式，那么你可能需要考虑使用 DOM。


    在开始编写 XML 之前，你首先需要一个数据源来提供你想要转换成 XML 的内容。下面是一个简单的类，它提供了前面用到的诗歌（威廉·卡洛斯·威廉姆斯的《大人物》）的内容。


    ***清单 9-3**。作为数据源的诗歌*


    `package com.bryantcs.examples.xml;`


    `import java.util.ArrayList;`


    `public class Poem {`


    `  private static String title = "The Great Figure";`

    `  private static String author ="William Carlos Williams";`

    `  private static ArrayList<String> lines = new ArrayList<String>();`


    `  static {`

    `    lines.add("Among the rain");`

    `    lines.add("and lights");`

    `    lines.add("I saw the figure 5");`

    `    lines.add("in gold");`

    `    lines.add("on a red");`

    `    lines.add("fire truck");`

    `    lines.add("moving");`

    `    lines.add("tense");`

    `    lines.add("unheeded");`

    `    lines.add("to gong clangs");`

    `    lines.add("siren howls");`

    `    lines.add("and wheels rumbling");`

    `    lines.add("through the dark city");`

    `  }`


    `  public static String getTitle() {`

    `    return title;`

    `  }`


    `  public static String getAuthor() {`

    `    return author;`

    `  }`

    `  public static ArrayList<String> getLines() {`

    `    return lines;`

    `  }`

    `}`


    如你所见，这是一个非常简单的诗歌表示。注意，它也是完全静态的。有些类完全由静态成员组成，但这些类通常定义一组辅助方法（针对特定应用的字符串操作是这类辅助类的常见用途）。然而，一个包含静态数据的类通常表明某人对问题的思考不够深入。这类东西通常应该放在一个文件中。不过，就我们的目的而言，这个略显奇怪的类已经足够用了。


    #### 使用 DOM 编写 XML


    以下是使用 DOM 编写 XML 文件的代码，以 Poem 类作为数据源：


