    \ Maltese Falcon\nSherlock Holmes likes The Sign of the Four\n```\n\n### Summary\n\
    \nIn this chapter, we learned:\n\n*   Java has a large number of operators.\n\
    *   Java's operators have precedence (that is, some operators are processed before\
    \ other operators).\n*   Java has some seemingly odd operators (such as the bitwise\
    \ operators) but that they all have their uses.\n*   The details of each of the\
    \ operators.\n*   When and how to use the `equals` and `hashCode` methods.\n*\
    \   How to compare objects with their natural values and how to compare objects\
    \ with arbitrary values.\n\nThis chapter presents a lot of complex information\
    \ in a fairly short space. I recommend reading it again. Also, as I mentioned\
    \ before, there's no substitute for doing some programming. You should create\
    \ a few classes that can be compared in various ways and do some fiddling with\
    \ the less-obvious operators (such as the bitwise operators).\n\n## C H A P T\
    \ E R  5\n\n## Control Flow, Looping, and Branching\n\nControl flow, looping,\
    \ and branching are fundamental concepts in all programming. Control flow consists\
    \ of running different code under different conditions. Looping consists of running\
    \ the same code (though often with different values or different objects each\
    \ time) until some condition has been met. Branching consists of doing something\
    \ else when some condition has been detected. The thread that ties them all together\
    \ is detecting conditions.\n\n### Control Flow\n\nJava offers two constructs for\
    \ controlling the flow of a program.\n\n*   `if` and `if`-`else`\n*   `switch`\n\
    \n![images](images/square.jpg) **Note** `try`-`catch` blocks offer a form of control\
    \ flow, because you can try something and then do something else if the first\
    \ thing you tried throws an exception. However, because that mechanism relies\
    \ on catching exceptions, it's not really a control flow mechanism. Because exceptions\
    \ happen only when something goes wrong, they shouldn't be thought of (and certainly\
    \ shouldn't be used for) branching.\n\n#### `if` and `if`-`else` Statements\n\n\
    You've already seen some examples of `if` statements, but let's examine another.\
    \ Let's start with a sample that's about as simple as it can be, as shown in [Listing\
    \ 5-1](#Chapter05.html#list_5_1).\n\n***Listing 5-1.** A simple `if` statement*\n\
    \n```\nif (a > 0) {\n  b = 1;\n}\n```\n\nLet's examine a little more complex example.\
    \ It's more realistic, but programs often make simple comparisons, so both [Listing\
    \ 5-1](#Chapter05.html#list_5_1) and [Listing 5-2](#Chapter05.html#list_5_2) are\
    \ realistic. Here's part of a program that generates an appropriate greeting based\
    \ on the current time of day.\n\n***Listing 5-2.** A more complex `if` statement\
    \ example*\n\n```\nGregorianCalendar gregorianCalendar = new GregorianCalendar();\n\
    int hour = gregorianCalendar.get(Calendar.HOUR_OF_DAY);\nString greeting = \"\
    Good \";\nif (hour < 12) {\n  greeting += \"morning\";\n}\n```\n\nThe condition\
    \ is simply whether the hour of the day is before 12 (that is, noon). If the hour\
    \ of the day is before noon, we add \"morning\" to our greeting. For conditions,\
    \ the equality operators (`==` and `!=`) and the comparison operators (`>`, `<`,\
    \ `<=`, `>=`) are often used. However, any condition that evaluates to `true`\
    \ or `false` works for a condition.\n\nSo what should our program do when it's\
    \ not morning? For that case, we can use the `else` keyword and have another block\
    \ of code that gets run for afternoons. [Listing 5-2](#Chapter05.html#list_5_2a)\
    \ shows that code.\n\n***Listing 5-2.** `if`-`else` statement example*\n\n```\n\
    GregorianCalendar gregorianCalendar = new GregorianCalendar();\nint hour = gregorianCalendar.get(Calendar.HOUR_OF_DAY);\n\
    String greeting = \"Good \";\nif (hour < 12) {\n  greeting += \"morning\";\n}\
    \ else {\n  greeting += \"afternoon\";\n}\n```\n\nThis structure represents a\
    \ common arrangement in all software. Often, we need consider only two alternatives.\
    \ In this case, though, we have a problem. Late in the day, we say, \"Good evening,\"\
    \ rather than \"Good afternoon.\" So let's address that problem with some more\
    \ code. In this case, we create a structure called an `else`-`if`. It's possible,\
    \ as we see later, to create long chains of branches with `else`-`if` structures.\
    \ Let's start with a fairly simple one, though, as shown in [Listing 5-3](#Chapter05.html#list_5_3).\n\
    \n***Listing 5-3.** `else`-`if` example*\n\n```\nGregorianCalendar gregorianCalendar\
    \ = new GregorianCalendar();\nint hour = gregorianCalendar.get(Calendar.HOUR_OF_DAY);\n\
    String greeting = \"Good \";\nif (hour < 12) {\n  greeting += \"morning\";\n}\
    \ else if (hour < 18) {\n  greeting += \"afternoon\";\n} else {\n  greeting +=\
    \ \"evening\";\n}\nSystem.out.println(greeting);\n```\n\nYou probably knew what\
    \ we were going to do with that `greeting` string.\n\nNotice the `else if` structure.\
    \ We can attach additional `if` statements to our `else` statements. In this fashion,\
    \ it's possible to step through any number of alternatives, providing a different\
    \ behavior for each one. If you step through the code with various values (try\
    \ 10, 13, and 19), you can see how any possible value gets caught and sets the\
    \ `greeting` string appropriately. The key to that capability is the final `else`,\
    \ which does not check for any condition. In this case, that's just a convenience\
    \ that lets us avoid writing `if (hour < 24)`.\n\nSometimes, though, you want\
    \ to use a final `else` to catch problems. In many real-world programs, a set\
    \ of `if`-`else` statements catches all the expected conditions, whereas the final\
    \ condition-free `else` statement throws an exception (which means the program\
    \ lets us know that it found a problem) because the program found an unexpected\
