    ##### 避免过度复杂的代码


    有一个老笑话：一个人写下“简化！”，另一个人则将其改写为“避免晦涩”。在某种程度上，编码很像写作（事实上，我们喜欢这两者正是因为它们的相似之处）。其中一个相似之处在于，你常常有多种方式来完成一件事。虽然把一行代码写得极其复杂可能是一种有趣的挑战，但你应该避免这种编码方式。如果你的代码尽可能易读，你的同事会感谢你，当你回头处理一个旧项目时，你也会感谢自己。让我们看看清单
    2-4 中的例子：


    ***清单 2-4**. 密集的代码*


    `someValue = someMethodToGetABooleanValue() != someOtherMethodToGetABooleanValue()
    ?  `

    `  someMethodToDoSomething() : someMethodToDoSomethingElse();`


    问题在于密度。上面这一行在一个地方包含了太多含义。因此，让我们在清单 2-5 中将其重写为更简单的代码。


    ***清单 2-5**. 简化的代码示例*


    `boolean firstBooleanValue = someMethodToGetABooleanValue();`

    `boolean secondBooleanValue = someOtherMethodToGetABooleanValue();`


    `if (firstBooleanValue != secondBooleanValue) {`

    `         someMethodToDoSomething();`

    `} else {`

    `         someMethodToDoSomethingElse();`

    `}`


    不必担心细节。只需考虑结构。我们将在本章和下一章中逐步理解所有这些零碎内容的含义。


    注意，简化后的代码要长得多。简化后的代码不是一行（在文件中占两行），而是占了八行。简化确实有代价（需要你多滚动才能读完）。然而，它可读性更强。你（和你的同事）可以快速理解它，而面对那行密集的代码，你（很可能）需要停下来琢磨其含义。


    有些开发者可能会说我们过度简化了代码。他们会指出，那两个 `boolean` 变量并没有实际帮助（返回这些值的方法可以直接放在 `if` 条件中），而且花括号也是不必要的（如果
    `if` 和 `else` 的代码块都只有一行，就不需要花括号）。这些说法都没错。代码看起来会像清单 2-6 这样。


    ***清单 2-6**. 适度简化的代码*


    `if (someMethodToGetABooleanValue() != someOtherMethodToGetABooleanValue())`

    `         someMethodToDoSomething();`

    `else`

    `         someMethodToDoSomethingElse();`


    这里涉及的是风格问题。每个开发者对于代码何时过于复杂（即信息过于密集）都有自己的阈值。有些人喜欢非常复杂的代码，认为原始那行代码没什么问题，而另一些人则喜欢把每一点细节都拆分开来。对计算机来说，这无关紧要。所以这纯粹是一个人类层面的问题。


    你会发现开发者对编码风格非常认真。事实上，我们在软件开发社区中见过的一些最严重的分歧就是关于编码风格的。作为初学者，你最好的选择是保持简单，避免过于密集的代码。最终，你会形成自己对“过于复杂”的阈值判断。


    #### 包声明


    让我们从最顶部开始，也就是包声明：


    `         package com.bryantcs.examples.syntaxExample;`


    这一行表明该类属于某个特定的包。一个包可以包含任意数量的类和接口。随着你开发更复杂的程序，你会希望将类和接口分组，以便更容易地找到某个特定的类或接口。例如，在
    Web 应用中，通常会将与数据库交互的类（数据层）与为用户生成网页的类（表示层）分开。（这类应用通常还有一个中间层，数据在其中被转换为对用户有意义的信息。）


    使用多个包的另一个好处是，不同的包可以包含同名的类。例如，标准 Java 库中包含 `java.util.Date`（本示例中用到）和 `java.sql.Date`。它们的功能略有不同（例如，它们有不同的日期格式化方式）。如果它们在同一个包中，就只能有一个被命名为
    `Date`。


    ![images](img/square.jpg) **注意** 包声明是可选的；然而，这是一个好习惯。即使你只是把开发当作爱好，你也希望将自己的项目彼此分开。


    按照惯例，包声明遵循特定的格式。虽然这不属于严格的 Java 语法（没有它程序也能运行），但如果你不遵循这种格式，大多数 Java 开发者会对你印象不佳。从右向左解读这种格式最容易理解：


    *   `syntaxExample` 表示包的本地名称。`AverageTest` 是一个简单的应用程序，因此只有一个包。

    *   `examples` 表示本地包的父包。我们将本书的所有示例都放在 `examples` 包中。

    *   `com.bryantcs` 是所有应用程序的标识符，以便它们在发布到互联网上时与其他人的应用程序区分开来。毕竟，很多人可能都有一个 `examples`
    包，甚至可能有人也有一个 `examples.syntaxExample` 包。包声明通常看起来像反向的 URL。你可能会期望看到类似 `bryantcs.com/examples/syntaxExample`
    这样的形式（但不要访问那个网站，它不存在）。正如我们接下来看到的，域名部分（com.bryantcs）提供了最后的保障，确保我们的类是唯一的。


    `com.bryantcs` 可以防止因两个包同名而产生的问题。按照惯例，包名的这一部分采用反向形式，因为域名比域类别名称更具体，而包名应该从左到右由不具体到具体。因此，从左到右阅读时，我们得到域类别（`com`）、域名（`bryantcs`）、应用类型（`examples`），最后是最内层包的名称（`syntaxExample`）。前两部分（`com.bryantcs`）是标准
    Java 命名约定的一部分。后两部分（`examples.syntaxExample`）只是我们自己的约定，用于防止程序之间相互混淆。


    以下是另一个包声明的例子：


    `         org.apache.fop`


    这指的是 apache.org 的 FOP（格式化对象处理器）项目。（Apache 是开源软件的领先提供商，也是作为 Java 开发者或测试人员参与其中的好地方。）


    包名可以更长，因为它们会不断增长以表示包中的包（包中的包，以此类推）。以下是来自 FOP 项目的一个更长的例子：


    `         org.apache.fop.fo.pagination.bookmarks`


    这指的是 `bookmarks` 包，它位于 `pagination` 包内，而 `pagination` 包位于 `fo` 包内，`fo` 包又位于 `fop`
    包内。将包嵌套多层是商业项目中的常见做法。很少有实用的应用程序能合理地只放在一个包中。


    你可以通过包含所需代码所在的包，来引入他人项目（以及你自己现有项目）中的代码。这种机制使开发者能够共享代码，并允许一家公司编写（并收费）供其他公司使用的代码。

    '
- fmt: '#### Imports


    After the package declaration, we get the `import` section (shown in [Listing
    2-3](#Chapter02.html#list_2_3), earlier in this chapter). Any number of `import`
    statements can be present.


    An `import` statement says your class uses one or more classes or interfaces from
    another package. That way, you can write two entirely separate applications but
    share code between them. Also, someone else can write a library that you can then
    use by importing the parts of the library you want to use.


    Let''s examine our `import` statements in [Listing 2-7](#Chapter02.html#list_2_7):


    **Listing 2-7**. *Import statements*


    ```

    import java.text.SimpleDateFormat;

    import java.util.Date;

    ```


    After the `import` keyword, we get a class identifier. Again, it pays to read
    from right to left when making sense of a class identifier. `java.text.SimpleDateFormat`
    says the `SimpleDateFormat` is within the `util` package, which is within the
    `java` package.


    That particular class is from the official Java library. This `import` statement
    tells experienced Java developers that `AverageTest` is going to format a date.


    Now, suppose we want to use other classes within the same package. We can then
    use a wildcard character (`*`) to specify any class within the package, thus:


    ```

    import java.text.*;

    ```


    Every different development shop has a different standard for when to stop being
    specific and use the wildcard. We prefer to use the wildcard when we have three
    classes or interfaces from the same package. Other folks use a wildcard whenever
    they have just two members of the same package. Still other developers never use
    wildcards because wildcards prevent you from seeing which objects are actually
    used.


    #### Classes


    The class line identifies this particular class. Don''t forget that the file that
    holds the class must have the same name as the class, including the same capitalization.


    ```

    public class AverageImpl extends Object implements Average {

    ```


    All classes extend some other class. However, when a class extends `Object` (which
    is Java''s root object), you can omit `extends Object`. As we mentioned before,
    software developers are by nature minimalists; we don''t write anything that doesn''t
    help. Consequently, few Java developers include the `extends` keyword when the
    class being extended is `Object`.


    Let''s pick apart that class declaration and see what all the pieces mean. The
    first word, `public`, is the access modifier for this class. See “Access Modifiers”
    later in this chapter, for more detail.


    The second word, `class`, indicates that we define a class. In other words, we
    define a kind of object that can be created in the system. In that case, we define
    a class that will never be an actual object. Abstract classes are used for other
    classes to extend and as references. If this class were abstract, its syntax would
    be as follows:


    ```

    public abstract class AverageImpl extends Object implements Average {

    ```


    Classes can also be static. On a class, the `static` keyword means that only one
    instance of that class exists. You can''t create a new instance of a static class
    (but the runtime engine creates one for you). As an aside, you might find it interesting
    to know that a static class can still be cloned, so the `static` keyword by itself
    does not guarantee a singleton (a class that has exactly one instance).


    ![images](images/square.jpg) **Note** The alternative to defining a class is defining
    an interface. We get to interfaces later in this chapter.


    The third word, `AverageImpl`, is the name of the class. Java has only two rules
    about class (and other names). Each name must start with a letter. Each name must
    consist of only certain characters: a-z, A-Z, 0-9, and the underscore (`_`) and
    dollar sign (`$`) characters.


    ![images](images/square.jpg) **Note** `Impl` is short for implementation, by the
    way. It''s a fairly common practice to have an interface and a class that provides
    an implementation for that interface. In those cases, a common naming convention
    is to name the class with the name of the interface plus `Impl`. Don''t worry,
    we get to what “implementation” means in the “Interfaces” section.


    In addition to the actual rules, the Java community follows certain customary
    guidelines for naming classes.


    * The first custom is that each class name should start with a capital letter.

    * Second, each logical word within the name should start with a capital letter.

    * Third, we rarely use underscores in class names. Dollar signs are used only
    in generated code (that is, code written by programs rather than by people).


    You can''t break the rules (your programs won''t work if you do), but you can
    break the community''s conventions. However, you should have a good reason for
    doing so. The conventions let us all communicate more easily with one another,
    so follow them unless you have a good reason to do otherwise and comment your
    reasons.


    The fourth word, `extends`, lets us know the class''s parent class. A class''s
    parent (more properly, a super) class is the class from which the current class
    gets the bases of its definition. In particular, a class can use all public and
    protected methods in its parent class just as though they had been defined in
    the class at hand. In this case, we extend Java''s root class: `Object`. The `extends`
    keyword tells us that this class is a variety of its parent class. In this case,
    `AverageImpl` is a variety of `Object`. If you look at the relationship between
    a class and its parent class and it doesn''t make sense, you need to rethink what
    you''re doing or, if it''s not a class you wrote, more closely examine the library
    you''re using.


    The fifth word, `Object`, tells us the name of the base class that we''re extending.
    Sometimes, the name is meaningful and tells us something about the parent. Sometimes,
    as here, the name of the parent class doesn''t tell us much (because every class
    ultimately extends `Object`). Good software developers strive for meaningful names,
    but it''s not always possible.


    The sixth word, `implements`, tells us that this class uses one or more interfaces.
    We visit them later in this chapter.


    The seventh (and last, in this example) word, `Average`, tells us the name of
    the interface this class implements. A class can implement any number of interfaces,
    though few implement more than two or three and many classes implement no interfaces
    at all.'
