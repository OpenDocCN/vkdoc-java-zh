- fmt: "### Deleting Multiple Directories\n\nIf you use the `mkdirs` method and the\
    \ JVM can't create the final directory, it might create some of the directories\
    \ along the way. That's a problem, so you need to check for each directory in\
    \ the chain and remove it. For that reason, paths are sometimes stored as a collection\
    \ of individual values (perhaps in an array of `String` objects), so that they\
    \ can be worked through programmatically. In cases where not making empty directories\
    \ matters (and it always matters, because it's bad form to clutter up the user's\
    \ drive), it's best to store the bits of the path as a collection and create each\
    \ one individually, stopping and removing any directories that get created if\
    \ one fails. Consequently, we wouldn't use the `mkdirs` method if we care about\
    \ removing path fragments after a failed directory creation attempt. [Listing\
    \ 8-11](#Chapter08.html#list_8_11) shows a small program to create directories\
    \ until one fails and then remove any that might be created along the way.\n\n\
    ![images](images/square.jpg) **Note** If you still have a directory called `test`\
    \ on your C drive, remove it before running the code in [Listing 8-11](#Chapter08.html#list_8_11).\n\
    \n***Listing 8-11.** Rolling back directories when creating a path fails*\n\n\
    ```\npackage com.apress.java7forabsolutebeginners.examples;\n\nimport java.io.File;\n\
    \npublic class FileTest {\n\n  public static void main(String[] args) {\n    String\
    \ currentPath = \"C:\";\n    // a double colon is illegal on my Windows machine,\
    \ so this fails\n    String[] pathParts = {\"test\", \"test2\", \"test3::fail\"\
    };\n    for (String pathPart: pathParts) {\n      currentPath += File.separator\
    \ + pathPart;\n      File testDirectory = new File(currentPath);\n      if (!testDirectory.mkdir())\
    \ {\n        System.out.println(\"Failed to create \" + testDirectory\n      \
    \      + \"; removing all created directories\");\n        removePathByParts(\"\
    C:\", pathParts);\n      } else {\n        System.out.println(\"Created \" + testDirectory);\n\
    \      }\n    }\n  }\n\n  private static void removePathByParts(String pathStart,\
    \ String[] pathParts) {\n    String currentPath = pathStart;\n    String[] paths\
    \ = new String[pathParts.length];\n    // First, build an array of possible paths\n\
    \n    for (int pathCounter = 0; pathCounter < pathParts.length; pathCounter++)\
    \ {\n      currentPath += File.separator + pathParts[pathCounter];\n      paths[pathCounter]\
    \ = currentPath;\n    }\n    // Then work backwards, checking for the existence\
    \ of each path\n    // and deleting each one if we find it\n    for (int pathCounter\
    \ = pathParts.length - 1; pathCounter >= 0;\n          pathCounter--) {\n    \
    \  File currentFile = new File(paths[pathCounter]);\n      if (currentFile.delete())\
    \ {\n        System.out.println(\"Removed \" + currentFile);\n      }\n    }\n\
    \  }\n}\n```\n\nAs you can see, fixing a failed `mkdirs` run takes a bit of doing.\
    \ (Of course, there might be better ways to solve this problem.) Ever have a software\
    \ installation fail and then notice that you have directories left behind? It's\
    \ because rolling back a path is a pain in almost every programming language,\
    \ and some folks don't bother, even for commercial software.\n\n[Figure 8-7](#Chapter08.html#list_8_7)\
    \ shows the output from trying to create a directory with an impossible name and\
    \ the process of rolling back the directory creation options.\n\n![images](images/0807.jpg)\n\
    \n***Figure 8-7.** Rolling back a failed directory creation operation*\n\n###\
    \ Writing and Reading Content\n\nWe covered quite a bit of ground without ever\
    \ writing or reading a single byte to or from a file. It often happens in software\
    \ development that you must invest the time to understand one thing before you\
    \ can understand another thing. Nearly all fields of study have enough complexity\
    \ to require learning prerequisite information, and software development works\
    \ that way, too. As Bill Cosby once quipped, “I had to tell you that joke before\
    \ I could tell you this joke.”\n\n#### Merrily Down the Stream\n\nIn Java (and\
    \ some other languages), reading from and writing to a file relies on the use\
    \ of a structure called a *stream*. A stream is the data going to or coming from\
    \ the file with some metadata (that is, data about the data) to indicate information\
    \ such as how many bytes are available (in a file being read), whether the data\
    \ is inbound or outbound, the file descriptor for the file in question, and so\
    \ on. We do a bit more with streams (because we use a different kind of stream)\
    \ when we process XML files in the next chapter. For now, just remember that a\
    \ stream is the data structure that holds the content going to or coming from\
    \ our file."
  raw: '#### Deleting Multiple Directories


    If you use the `mkdirs` method and the JVM can''t create the final directory,
    it might create some of the directories along the way. That''s a problem, so you
    need to check for each directory in the chain and remove it. For that reason,
    paths are sometimes stored as a collection of individual values (perhaps in an
    array of `String` objects), so that they can be worked through programmatically.
    In cases where not making empty directories matters (and it always matters, because
    it''s bad form to clutter up the user''s drive), it''s best to store the bits
    of the path as a collection and create each one individually, stopping and removing
    any directories that get created if one fails. Consequently, we wouldn''t use
    the `mkdirs` method if we care about removing path fragments after a failed directory
    creation attempt. [Listing 8-11](#Chapter08.html#list_8_11) shows a small program
    to create directories until one fails and then remove any that might be created
    along the way.


    ![images](images/square.jpg) **Note** If you still have a directory called test
    on your C drive, remove it before running the code in [Listing 8-11](#Chapter08.html#list_8_11).


    ***Listing 8-11.** Rolling back directories when creating a path fails*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `  public static void main(String[] args) {`

    `    String currentPath = "C:";`

    `    // a double colon is illegal on my Windows machine, so this fails`

    `    String[] pathParts = {"test", "test2", "test3::fail"};`

    `    for (String pathPart: pathParts) {`

    `      currentPath += File.separator + pathPart;`

    `      File testDirectory = new File(currentPath);`

    `      if (!testDirectory.mkdir()) {`

    `        System.out.println("Failed to create " + testDirectory`

    `            + "; removing all created directories");`

    `        removePathByParts("C:", pathParts);`

    `      } else {`

    `        System.out.println("Created " + testDirectory);`

    `      }`

    `    }`

    `  }`


    `  private static void removePathByParts(String pathStart, String[] pathParts)
    {`

    `    String currentPath = pathStart;`

    `    String[] paths = new String[pathParts.length];`

    `    // First, build an array of possible paths`


    `    for (int pathCounter = 0; pathCounter < pathParts.length; pathCounter++)
    {`

    `      currentPath += File.separator + pathParts[pathCounter];`

    `      paths[pathCounter] = currentPath;`

    `    }`

    `    // Then work backwards, checking for the existence of each path`

    `    // and deleting each one if we find it`

    `    for (int pathCounter = pathParts.length - 1; pathCounter >= 0;`

    `          pathCounter--) {`

    `      File currentFile = new File(paths[pathCounter]);`

    `      if (currentFile.delete()) {`

    `        System.out.println("Removed " + currentFile);`

    `      }`

    `    }`

    `  }`

    `}`


    As you can see, fixing a failed `mkdirs` run takes a bit of doing. (Of course,
    there might be better ways to solve this problem.) Ever have a software installation
    fail and then notice that you have directories left behind? It''s because rolling
    back a path is a pain in almost every programming language, and some folks don''t
    bother, even for commercial software.


    [Figure 8-7](#Chapter08.html#list_8_7) shows the output from trying to create
    a directory with an impossible name and the process of rolling back the directory
    creation options.


    ![images](images/0807.jpg)


    ***Figure 8-7.** Rolling back a failed directory creation operation*


    ### Writing and Reading Content


    We covered quite a bit of ground without ever writing or reading a single byte
    to or from a file. It often happens in software development that you must invest
    the time to understand one thing before you can understand another thing. Nearly
    all fields of study have enough complexity to require learning prerequisite information,
    and software development works that way, too. As Bill Cosby once quipped, “I had
    to tell you that joke before I could tell you this joke.”


    #### Merrily Down the Stream


    In Java (and some other languages), reading from and writing to a file relies
    on the use of a structure called a *stream*. A stream is the data going to or
    coming from the file with some metadata (that is, data about the data) to indicate
    information such as how many bytes are available (in a file being read), whether
    the data is inbound or outbound, the file descriptor for the file in question,
    and so on. We do a bit more with streams (because we use a different kind of stream)
    when we process XML files in the next chapter. For now, just remember that a stream
    is the data structure that holds the content going to or coming from our file.'
  trans: '

    #### 删除多个目录


    如果使用 `mkdirs` 方法且 JVM 无法创建最终目录，它可能会沿途创建部分目录。这是一个问题，因此你需要检查路径链中的每个目录并将其删除。出于这个原因，路径有时会存储为单个值的集合（例如，在
    `String` 对象的数组中），以便可以通过编程方式处理它们。在不能创建空目录的情况下（这始终很重要，因为杂乱地填充用户驱动器是不好的做法），最好将路径的各个部分存储为一个集合，并逐个创建每个目录，如果某个目录创建失败，则停止并删除已创建的任何目录。因此，如果我们关心在目录创建尝试失败后删除路径片段，我们就不会使用
    `mkdirs` 方法。清单 8-11 展示了一个小程序，该程序会创建目录直到某个目录创建失败，然后删除沿途可能创建的任何目录。


    ![images](img/square.jpg) **注意** 如果你的 C 盘上仍有一个名为 test 的目录，请在运行清单 8-11 中的代码之前将其删除。


    ***清单 8-11.** 创建路径失败时回滚目录*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `  public static void main(String[] args) {`

    `    String currentPath = "C:";`

    `    // 在我的 Windows 机器上，双冒号是非法的，因此这会失败`

    `    String[] pathParts = {"test", "test2", "test3::fail"};`

    `    for (String pathPart: pathParts) {`

    `      currentPath += File.separator + pathPart;`

    `      File testDirectory = new File(currentPath);`

    `      if (!testDirectory.mkdir()) {`

    `        System.out.println("创建 " + testDirectory`

    `            + " 失败；正在删除所有已创建的目录");`

    `        removePathByParts("C:", pathParts);`

    `      } else {`

    `        System.out.println("已创建 " + testDirectory);`

    `      }`

    `    }`

    `  }`


    `  private static void removePathByParts(String pathStart, String[] pathParts)
    {`

    `    String currentPath = pathStart;`

    `    String[] paths = new String[pathParts.length];`

    `    // 首先，构建一个可能的路径数组`


    `    for (int pathCounter = 0; pathCounter < pathParts.length; pathCounter++)
    {`

    `      currentPath += File.separator + pathParts[pathCounter];`

    `      paths[pathCounter] = currentPath;`

    `    }`

    `    // 然后反向遍历，检查每个路径是否存在`

    `    // 如果找到则将其删除`

    `    for (int pathCounter = pathParts.length - 1; pathCounter >= 0;`

    `          pathCounter--) {`

    `      File currentFile = new File(paths[pathCounter]);`

    `      if (currentFile.delete()) {`

    `        System.out.println("已移除 " + currentFile);`

    `      }`

    `    }`

    `  }`

    `}`


    如你所见，修复失败的 `mkdirs` 运行需要费些功夫。（当然，可能有更好的方法来解决这个问题。）你是否曾遇到过软件安装失败，然后发现留下了目录？这是因为在几乎所有的编程语言中，回滚路径都是一件麻烦事，有些人甚至懒得去做，即使是商业软件也是如此。


    图 8-7 显示了尝试使用不可能的名称创建目录以及回滚目录创建过程的输出。


    ![images](img/0807.jpg)


    ***图 8-7.** 回滚失败的目录创建操作*


    ### 写入和读取内容


    我们涵盖了不少内容，却从未向文件写入或从文件读取一个字节。在软件开发中，经常发生的情况是，你必须花时间先理解一件事，然后才能理解另一件事。几乎所有的研究领域都有足够的复杂性，需要学习先决知识，软件开发也是如此。正如比尔·科斯比曾调侃的那样：“我必须先给你讲那个笑话，然后才能给你讲这个笑话。”


    #### 顺流而下


    在 Java（以及某些其他语言）中，从文件读取和向文件写入依赖于一种称为*流*的结构。流是进出文件的数据，附带一些元数据（即关于数据的数据），用于指示诸如可用字节数（在正在读取的文件中）、数据是入站还是出站、相关文件的文件描述符等信息。在下一章处理
    XML 文件时，我们会对流做更多操作（因为我们使用不同类型的流）。现在，只需记住流是保存进出文件内容的数据结构。

