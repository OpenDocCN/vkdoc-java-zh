  raw: 'We also had to implement the `MouseListener` interface, so that the program
    can tell when someone clicks on the button. The MouseListener interface requires
    five methods, but we use only one of them. Other programs might need to distinguish
    between when a mouse button is pressed and when it is released (for enabling behavior
    such as drag and drop or drawing a box in a drawing program), but our little program
    just needs to know that the user clicked the button. Note the line where a mouse
    listener is added to the button. Each component that you want to handle an event
    has to have an event listener added to it. When you have multiple objects listening
    for events, you have to figure out which object the user chooses and make your
    program respond accordingly. The `getSource` method lets us do that. You''ll see
    a great deal more of that kind of decision making, both with menus and with buttons,
    in the next example.


    ![images](images/square.jpg) **Tip** If you need to detect whether a mouse button
    has been clicked, use the `mouseReleased` method instead of the `mouseClicked`
    method. In many JVMs, `mouseClicked` doesn''t work well (in particular, it misses
    some clicks, which is frustrating for the user), whereas `mouseReleased` is more
    reliable. This happens because mouse motion interrupts the mouse listener (Java
    has a separate listener interface for monitoring mouse motion). So, if you twitch
    just a little bit while clicking the button, you lose the mouse click.


    ### A Larger Swing Application


    As it happens, I like Minesweeper and similar games, so I thought I''d write my
    own Minesweeper game to serve as a larger, more real example of a Swing application.
    In addition to being one of my favorite games, MineSweeper makes a good sample
    because it uses a mouse listener and an action listener. It''s also the kind of
    application that benefits from having both a program class and a number of additional
    classes to handle various bits of functionality.


    Before we get started, let''s think about the design of such a program. [Table
    7-1](#Chapter07.html#tab_7_1) describes the various classes that comprise the
    MineSweeper program.


    ![images](images/t0701.jpg)


    Let''s start with the program class (MineSweeper). After [listing 7-4](#Chapter07.html#list_7_4),
    I''ll describe the flow of control through the class (in other words, the logic
    of it) and describe each method. Compared to other things we''ve done, it''s a
    big and complex class. For now, read through it, even if it doesn''t seem to make
    sense. Then we''ll work through it in detail. [Listing 7-4](#Chapter07.html#list_7_4)
    shows the MineSweeper class. Before we get into the listing, though, let''s see
    what we''re going to get from the MineSweeper class, in [Figure 7-4](#Chapter07.html#fig_7_4).


