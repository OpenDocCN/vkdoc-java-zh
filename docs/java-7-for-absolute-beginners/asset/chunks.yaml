- fmt: "# Reading a File's Content\n\nBefore we can get much further, we first need\
    \ a file that contains some content. So, let's set up a test case. Copy the content\
    \ from [Listing 8-12](#Chapter08.html#list_8_12) (a few lines from Shakespeare's\
    \ play, *Hamlet*) into a text file called `Hamlet.txt` and put the file in your\
    \ `C:\\test` directory.\n\n***Listing 8-12.** Original contents of Hamlet.txt*\n\
    \n```\nTo sleep: perchance to dream: ay, there's the rub;\nFor in that sleep of\
    \ death what dreams may come\nWhen we have shuffled off this mortal coil,\nMust\
    \ give us pause: there's the respect\nThat makes calamity of so long life\n```\n\
    \n(Feel free to use your own favorite bit of content if you don't like mine. For\
    \ our purposes right now, all we need is some text.)\n\nNow that we have a file\
    \ with some content, we can read that content into memory with a program. To read\
    \ a file's content, a Java developer generally reaches for a `FileInputStream`\
    \ object. [Listing 8-13](#Chapter08.html#list_8_13) shows a simple program to\
    \ read a file and repeat the contents in the console:\n\n***Listing 8-13.** Putting\
    \ hamlet.txt in the console.*\n\n```\npackage com.apress.java7forabsolutebeginners.examples;\n\
    \nimport java.io.File;\nimport java.io.FileInputStream;\nimport java.io.FileNotFoundException;\n\
    import java.io.IOException;\n\npublic class ReadFile {\n\n    public static void\
    \ main(String[] args) {\n        // Specify the file\n        String fileName\
    \ = \"C:\" + File.separator + \"test\"\n            + File.separator + \"Hamlet.txt\"\
    ;\n        File hamletFile = new File(fileName);\n        // Set up a byte array\
    \ to hold the file's content\n        byte[] content = new byte[0];\n        try\
    \ {\n            // Create an input stream for the file\n            FileInputStream\
    \ hamletInputStream = new FileInputStream(hamletFile);\n            // Figure\
    \ out how much content the file has\n            int bytesAvailable = hamletInputStream.available();\n\
    \            // Set the content array to the length of the content\n         \
    \   content = new byte[bytesAvailable];\n            // Load the file's content\
    \ into our byte array\n            hamletInputStream.read(content);\n        \
    \    // Close the stream\n            hamletInputStream.close();\n        } catch\
    \ (FileNotFoundException fnfe) {\n            System.out.println(\"Couldn't find\
    \ a file called \" + fileName);\n        } catch (IOException ioe) {\n       \
    \     System.out.println(\"Couldn't read from a file called \" + fileName);\n\
    \        }\n        // Convert our content to a String\n        // and write it\
    \ out to the console\n        System.out.print(new String(content));\n    }\n\
    }\n```\n\nLet's examine that program. After doing what we already know how to\
    \ do (finding a file), we first set up a data structure (a byte array) to hold\
    \ the content of the file. Then we set up a `try`-`catch` block to handle the\
    \ exceptions that can arise when working with files. We could handle both kinds\
    \ of exceptions by handling just `Exception` (the parent object of both `FileNotFoundException`\
    \ and `IOException`), but then we won't know what went wrong. More detail (up\
    \ to a point) is generally better when diagnosing a problem.\n\nWithin our `try`-`catch`\
    \ block, we create a stream object to hold the content of the file and then read\
    \ the content of the stream into our byte array. Then we close the stream. In\
    \ this simple case, we don't need to close the stream. The JVM does that for us\
    \ when the program exits. However, closing files as soon as you can is a good\
    \ habit to have. Each open file forces the operating system to provide an object\
    \ called a file handle. Enough open files can greatly degrade a computer's performance,\
    \ crash your program, or even crash the operating system.\n\nAfter we have the\
    \ contents of the file in memory, we can do something with it. In this case, we\
    \ cast it into a `String` object and send the `String` object to the console,\
    \ thus mirroring the contents of our file. We can potentially do many other things\
    \ with the contents of a file. A word processing program would display the content\
    \ to the user so that the user can modify the content, a game might initialize\
    \ certain values (perhaps the size of the map and how aggressive the opponent\
    \ is), and so on."
  raw: '#### Reading a File''s Content


    Before we can get much further, we first need a file that contains some content.
    So, let''s set up a test case. Copy the content from [Listing 8-12](#Chapter08.html#list_8_12)
    (a few lines from Shakespeare''s play, *Hamlet*) into a text file called `Hamlet.txt`
    and put the file in your `C:\test` directory.


    ***Listing 8-12.** Original contents of Hamlet.txt*


    `To sleep: perchance to dream: ay, there''s the rub;`

    `For in that sleep of death what dreams may come`

    `When we have shuffled off this mortal coil,`

    `Must give us pause: there''s the respect`

    `That makes calamity of so long life`


    (Feel free to use your own favorite bit of content if you don''t like mine. For
    our purposes right now, all we need is some text.)


    Now that we have a file with some content, we can read that content into memory
    with a program. To read a file''s content, a Java developer generally reaches
    for a `FileInputStream` object. [Listing 8-13](#Chapter08.html#list_8_13) shows
    a simple program to read a file and repeat the contents in the console:


    ***Listing 8-13.** Putting hamlet.txt in the console.*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`

    `import java.io.FileInputStream;`

    `import java.io.FileNotFoundException;`

    `import java.io.IOException;`


    `public class ReadFile {`


    `    public static void main(String[] args) {`

    `        // Specify the file`

    `        String fileName = "C:" + File.separator + "test"`

    `            + File.separator + "Hamlet.txt";`

    `        File hamletFile = new File(fileName);`

    `        // Set up a byte array to hold the file''s content`

    `        byte[] content = new byte[0];`

    `        try {`

    `            // Create an input stream for the file`

    `            FileInputStream hamletInputStream = new FileInputStream(hamletFile);`

    `            // Figure out how much content the file has`

    `            int bytesAvailable = hamletInputStream.available();`

    `            // Set the content array to the length of the content`

    `            content = new byte[bytesAvailable];`

    `            // Load the file''s content into our byte array`

    `            hamletInputStream.read(content);`

    `            // Close the stream`

    `            hamletInputStream.close();`

    `        } catch (FileNotFoundException fnfe) {`

    `            System.out.println("Couldn''t find a file called " + fileName);`

    `        } catch (IOException ioe) {`

    `            System.out.println("Couldn''t read from a file called " + fileName);`

    `        }`

    `        // Convert our content to a String`

    `        // and write it out to the console`

    `        System.out.print(new String(content));`

    `    }`

    `}`


    Let''s examine that program. After doing what we already know how to do (finding
    a file), we first set up a data structure (a byte array) to hold the content of
    the file. Then we set up a `try`-`catch` block to handle the exceptions that can
    arise when working with files. We could handle both kinds of exceptions by handling
    just `Exception` (the parent object of both `FileNotFoundException` and `IOException`),
    but then we won''t know what went wrong. More detail (up to a point) is generally
    better when diagnosing a problem.


    Within our `try`-`catch` block, we create a stream object to hold the content
    of the file and then read the content of the stream into our byte array. Then
    we close the stream. In this simple case, we don''t need to close the stream.
    The JVM does that for us when the program exits. However, closing files as soon
    as you can is a good habit to have. Each open file forces the operating system
    to provide an object called a file handle. Enough open files can greatly degrade
    a computer''s performance, crash your program, or even crash the operating system.


    After we have the contents of the file in memory, we can do something with it.
    In this case, we cast it into a `String` object and send the `String` object to
    the console, thus mirroring the contents of our file. We can potentially do many
    other things with the contents of a file. A word processing program would display
    the content to the user so that the user can modify the content, a game might
    initialize certain values (perhaps the size of the map and how aggressive the
    opponent is), and so on.'
  trans: '

    #### 读取文件内容


    在进一步深入之前，我们首先需要一个包含内容的文件。因此，让我们设置一个测试用例。将清单 8-12（摘自莎士比亚戏剧*《哈姆雷特》*的几行文字）中的内容复制到一个名为
    `Hamlet.txt` 的文本文件中，并将该文件放入你的 `C:\test` 目录下。


    ***清单 8-12.** Hamlet.txt 的原始内容*


    `To sleep: perchance to dream: ay, there''s the rub;`

    `For in that sleep of death what dreams may come`

    `When we have shuffled off this mortal coil,`

    `Must give us pause: there''s the respect`

    `That makes calamity of so long life`


    （如果你不喜欢我选的这段内容，也可以随意使用你自己喜欢的片段。就目前而言，我们只需要一些文本即可。）


    现在我们有了一个包含内容的文件，就可以通过程序将该内容读入内存。要读取文件内容，Java 开发者通常会使用 `FileInputStream` 对象。清单
    8-13 展示了一个简单的程序，用于读取文件并在控制台中重复其内容：


    ***清单 8-13.** 在控制台中输出 hamlet.txt*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`

    `import java.io.FileInputStream;`

    `import java.io.FileNotFoundException;`

    `import java.io.IOException;`


    `public class ReadFile {`


    `    public static void main(String[] args) {`

    `        // 指定文件`

    `        String fileName = "C:" + File.separator + "test"`

    `            + File.separator + "Hamlet.txt";`

    `        File hamletFile = new File(fileName);`

    `        // 设置一个字节数组来保存文件内容`

    `        byte[] content = new byte[0];`

    `        try {`

    `            // 为文件创建一个输入流`

    `            FileInputStream hamletInputStream = new FileInputStream(hamletFile);`

    `            // 计算文件有多少内容`

    `            int bytesAvailable = hamletInputStream.available();`

    `            // 将内容数组设置为内容的长度`

    `            content = new byte[bytesAvailable];`

    `            // 将文件内容加载到我们的字节数组中`

    `            hamletInputStream.read(content);`

    `            // 关闭流`

    `            hamletInputStream.close();`

    `        } catch (FileNotFoundException fnfe) {`

    `            System.out.println("找不到名为 " + fileName + " 的文件");`

    `        } catch (IOException ioe) {`

    `            System.out.println("无法从名为 " + fileName + " 的文件中读取");`

    `        }`

    `        // 将内容转换为字符串`

    `        // 并将其输出到控制台`

    `        System.out.print(new String(content));`

    `    }`

    `}`


    让我们分析一下这个程序。在完成我们已经知道如何做的步骤（查找文件）之后，我们首先设置一个数据结构（字节数组）来保存文件的内容。然后，我们设置一个 `try`-`catch`
    块来处理处理文件时可能出现的异常。我们可以通过仅处理 `Exception`（`FileNotFoundException` 和 `IOException`
    的父类对象）来处理这两种异常，但这样我们就无法知道具体出了什么问题。在诊断问题时，更详细的信息（在一定范围内）通常更好。


    在我们的 `try`-`catch` 块中，我们创建一个流对象来保存文件的内容，然后将流的内容读取到我们的字节数组中。接着我们关闭流。在这个简单的例子中，我们并不需要关闭流。当程序退出时，JVM
    会为我们关闭它。然而，尽快关闭文件是一个好习惯。每个打开的文件都会迫使操作系统提供一个称为文件句柄的对象。打开的文件过多会严重降低计算机的性能，导致程序崩溃，甚至导致操作系统崩溃。


    将文件内容存入内存后，我们就可以对其进行操作。在这个例子中，我们将其转换为一个 `String` 对象，并将该 `String` 对象发送到控制台，从而镜像出文件的内容。我们还可以对文件内容做许多其他事情。例如，文字处理程序会将内容显示给用户，以便用户修改内容；游戏可能会初始化某些值（比如地图的大小或对手的激进程度），等等。

