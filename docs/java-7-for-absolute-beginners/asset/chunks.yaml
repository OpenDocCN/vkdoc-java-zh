    与 `TargetClickPanel` 类类似，`ShootingGalleryPanel` 类的大部分功能是设置和管理游戏区域（用户界面）。然而，`actionPerformed`
    方法完全由游戏逻辑构成，并包含了游戏循环。它的工作原理是每隔若干滴答移动各行。最左侧的行（包含最小且分值最高的目标）在每个滴答时更新，因此移动速度非常快（我很难击中它们，但游戏设计本就该如此）。中间的行每两次滴答更新一次，而最右侧的行（包含最大且分值最低的目标）每三次滴答更新一次。因此，大而慢的目标会挡在快速且高价值目标的路径上，这正是射击场游戏的典型特征。


    最后，`actionPerformed` 方法会更新光标的位置和状态。光标是用户唯一能控制的对象，因此我们必须尽可能频繁地更新其位置和状态。每秒更新五十次足以跟上我所见过的任何玩家的操作。


    当计时器运行满一秒钟后，`actionPerformed` 方法会重置它。否则，长时间的游戏可能会导致滴答次数超过 `ticks` 变量的最大值。这种情况虽然不太可能发生，但为何不在问题出现之前就防患于未然呢？我们也可以选择每千次或每百万次滴答重置一次，但将
    `int` 设置为 0 是一个非常廉价的操作，因此我选择每秒重置一次。


    `actionPerformed` 方法处理了游戏循环所需的所有三项任务，但顺序和方式与我们在 TargetClick 游戏中看到的不同。这一次，界面的更新被推给了其他类（`ShootingGalleryTargetRow`
    和 `ShootingGalleryShooter`），而用户输入的处理被放在了最后而非最前。在这种情况下，用户输入是先处理还是后处理并无区别。我这样做的目的是为了演示任务的顺序通常并不重要。当然也存在例外情况，但当你遇到它们时，你能够识别出来，因为它们将成为游戏机制的一部分。


    由于 `ShootingGalleryPanel.actionPerformed` 方法的三个主要功能之一是更新各行，让我们来看看各行是如何工作的（其他主要功能是更新光标和管理滴答）。在阅读
