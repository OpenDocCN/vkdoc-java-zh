    By the way, you can use similar code to draw a bullet going out and exploding
    against a target. Ideas are often similar to other ideas, so the same code can
    often be used for a different purpose with little modification, and this is one
    of those ideas. I encourage you to create that animation. Try it both with all
    12 splines (the lines that radiate from the center) and with just the splines
    that are not over the target (which might be more realistic, depending on what
    kind of event you choose to model.)


    ### Sprite Animation


    So far, we concentrated on drawing simple objects made of circles and lines. You
    can use the same technique to create more complex objects, but it''s often easier
    to use a series of images. Those images are called *sprites*. Many animations
    rely on sprites to create complex images that take a lot of code (and thus time)
    to create programmatically. Also, using images lets companies hire artists to
    create the images and programmers to create the animation. Consequently, the quality
    of both the images and the code improves, making a better program. .Separation
    of concerns is also a good principle for business, where it''s generally called
    specialization.


    In this case, we create a simple four-image sprite that represents an expanding
    bullseye. [Figure 10-4](#Chapter10.html#fig_10_4) shows all four sprite images
    together and zoomed in ten times.


    ![images](images/1004.jpg)


    ***Figure 10-4.** The sprites used by the MouseSprites program*


    I zoom it in ten times to reveal something about how things are drawn on a monitor
    (or TV, your phone, or anything with a digital display)—there are no curves. Any
    curve you see on a screen is a collection of straight lines (each called a segment
    of the curve). The more segments, the better the illusion, but there is no curve.
    Create a circle on the screen (the `drawOval` method in the `Graphics` class will
    do the job), and then take a close look at it (perhaps by making a screen capture
    and zooming in on it). You see it''s a set of straight lines.


    As an aside, I work with a bunch of great digital artists whose favorite quotation
    is from *The Matrix*, when the little girl says, “There is no spoon.” She has
    realized that the matrix is an illusion, and most digital artists realize (and
    revel in the fact) that they are making illusions. If you like to make illusions,
    you can have a lot of fun (and a great career) with digital art and animation.


    I''m We no artist, so I created a simple set of sprites. I also set the timer
    to one quarter of a second, making a relatively slow (a video gamer would probably
    say it''s very slow) animation. If you look closely, you can probably see the
    individual images as they are drawn. Most animations have a much higher frame
    rate (at least comparable to a movie), but this one makes a good demonstration.


    When you run the program, click repeatedly to see how many animations you can
    get going at once. Doing so demonstrates that you can have multiple sprite animations
    going at the same time (and test your ability to click in a hurry—we were able
    to get four at a time going). Move the mouse a bit between clicks, so that you
    can see each animation separately.


    I also added one more feature: triggered animation. Rather than run through an
    endless loop (perhaps stopped and started by something like a button click), this
    animation runs once in response to an event. In this case, the trigger is a mouse
    click. I added this technique to show you how to create animations that respond
    to your users'' commands. For example, you might have an endless loop draw most
    of the objects in a game and use triggered animations to draw explosions and other
    items that appear because of game events.


    One other thing to know about sprites is that the individual images can be stored
    as separate files or as a single file (often called a sprite sheet). [Figure 10-4](#Chapter10.html#fig_10_4)
    can be a sprite sheet if used at its normal zoom level. In the case of a single
    file, the program loads part of the image rather than an entire image. For example,
    many games that involve maps store the individual terrain symbols together in
    a single file. The Java graphics API provides a method for reading part of an
    image: `getSubImage` in the `BufferedImage` class.


    [Listing 10-6](#Chapter10.html#list_10_6) shows a program class for a sprite animation
    program (called `MouseSprites` because it''s triggered by a mouse click).


