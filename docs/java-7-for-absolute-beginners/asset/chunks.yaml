  raw: '#### Blocks


    *Blocks* are units of code that (usually) consist of more than one line and are
    defined by brace characters (`{}`). (Brace characters have several names, which
    can be pretty far-fetched. Throughout the book, I call them braces, for the sake
    of consistency.)


    Braces define blocks of code for methods, classes, and various statements (such
    as `if` and `for`). Let''s look at a simple block from the AverageImpl class in
    [Listing 2-16](#Chapter02.html#list_2_16):


    ***Listing 2-16.** A simple block*


    `    for (int i = 0; i < ints.length; i++) {`

    `      result += ints[i];`

    `    }`


    Static Blocks *Static blocks* are handy bits of code that let you define one block
    of code and have it be included in every constructor. Let''s consider an example
    (in the form of a different class) in [Listing 2-17](#Chapter02.html#list_2_17).


    ***Listing 2-17**. Static block example*


    `package com.bryantcs.examples;`


    `public class StaticBlockClass {`


    `        private static String name;`

    `        private String whichOne;`


    `        static {`

    `                name = "StaticBlockClass";`

    `        }`

    `        public StaticBlockClass(int identifier) {`

    `                whichOne = Integer.toString(identifier);`

    `        }`


    `        public StaticBlockClass(String identifier) {`

    `                whichOne = identifier;`

    `        }`


    `}`


    As you can see, the field we set also has to be static. However, because we don''t
    want to change it, that''s just fine. In this case, we don''t gain much by having
    a static block. However, imagine if we have ten values to set and four constructors.


    Aside from saving space (though not in this example), the real value of static
    blocks makes sure that everything the class needs gets into each constructor.
    You can get bugs from having things set in some constructors but not others, and
    static blocks can help you manage that problem.


    #### Comments


    *Comments* are lines of code that are (usually) meant purely for humans to read.
    The compiler utterly ignores comments. Java supports two styles of comments, end-of-line
    comments and block comments. The code examples I provide have many end-of-line
    comments. *End-of-line comments* begin with two slash characters (`//`), thus:


    `// end-of-line comment that happens to be the only thing on the line`


    End-of-line comments can also start after other code on the line, thus:


    `int counter = 0; // Initialize the counter`


    Code cannot follow an end-of-line comment on the same line. It would become part
    of the comment.


    *Block comments* begin with a slash and an asterisk (`/*`) and end with an asterisk
    and a slash (`*/`). Block comments can be on one line, but they can also consist
    of multiple lines. Block comments can start on the same line as other code. In
    fact, block comments can occur between code elements on the same line (possibly
    making the line of code consist of multiple lines in the file). As ever, examples
    help. Here''s a block comment by itself on a single line:


    `/* comment */`


    And here''s a line of code with a comment in the middle of it:


    `int counter /* comment */ = 0;`


    Please don''t do that. It''s legal, but it''s poor coding practice, because it
    makes the code harder to read.


    Now let''s look at multi-line block comments in [Listing 2-18](#Chapter02.html#list_2_18).


    ***Listing 2-18**. Multi-line block comment*


    `/* Now is the time for all good coders to write meaningful comments,`

    `so that the rest of us can understand what the code is doing. */`


    [Listing 2-19](#Chapter02.html#list_2_19) shows another multi-line block comment,
    mingled with code.


    ***Listing 2-19**. Bad style in a multi-line block comment*


    `int counter /*`

    `Please don''t`

    `do this */ = 0;`


    By convention (which I break to provide you with examples that you shouldn''t
    emulate), multi-line comments have the beginning of the comment (`/*`) on its
    own line, have the end of the comment (`*/`) on its own line, and have each of
    the middle lines start with an asterisk, as shown in [Listing 2-20](#Chapter02.html#list_2_20).


    ***Listing 2-20**. Properly formatted multi-line block comment*


    `/*`

    ` * Now is the time for all good coders to write meaningful comments,`

    ` * so that the rest of us can understand what the code is doing.`

    ` * And now this comment is properly formatted, too.`

    ` */`


    This is easier to read, isn''t it?


    **JAVADOC**


    Java includes a mechanism to generate documentation from within classes and interfaces.
    That mechanism is called Javadoc, and it uses of a special kind of block comment
    (and here''s a comment meant for both humans and systems to read). A Javadoc comment
    starts with a slash and two asterisks (/**) and ends with an asterisk and a slash
    (*/), much like a block comment but with an additional asterisk in the starting
    syntax. The content of the comment then ends up in a document that the Javadoc
    tool creates. By convention, any class meant for public consumption should have
    Javadoc comments on the class and all methods that someone might use or extend
    (usually public and protected methods).


    When the Javadoc tool runs, it examines all the classes and interfaces and creates
    a set of HTML pages (or sometimes other output, depending on various settings)
    with headings and subheading corresponding to the classes, interfaces, and methods
    in the program. Various markers help the Javadoc tool indicate descriptions for
    arguments and return values, who wrote the Javadoc comment, and other special
    content.


    When coding a program for yourself, you don''t need to insert Javadoc comments.
    If you start coding for an open-source project or for a company, you might be
    asked to add Javadoc comments to your code.


    [Listing 2-21](#Chapter02.html#list_2_21) shows an example of a Javadoc comment
    and the method declaration it describes.


    ***Listing 2-21**. A Javadoc comment for a method*


    `  /**`

    `   * This method makes a Cat object chase the given Mouse object.`

    `   * @param mouse an instance of the Mouse class for our cat to chase`

    `   */`

    `  void chase(Mouse mouse) {`


    Because you probably won''t need to create Javadoc for a while, let''s stop there.
    When you do need to know more about it, you can find the Javadoc tool home page
    at [`http://www.oracle.com/technetwork/java/javase/documentation/index-jsp-135444.html`](http://www.oracle.com/technetwork/java/javase/documentation/index-jsp-135444.html).


    ### Summary


    So, what did we learn in this chapter?


    We considered:


    *   The structure of a Java file, looking at statements and declarations

    *   The components that comprise a Java program (classes and interfaces)

    *   The components that comprise classes and interfaces (methods, fields, constructors,
    blocks, and comments)

    *   The basics of Javadoc


    Whole books have been written about the content we covered in a single chapter,
    but those are awfully dry books for a beginner. I thought it would be more fun
    to learn the basics and then work with files, create animations, and create your
    own video games. We do all those things later in the book.I recommend reading
    the chapter again, thinking about what you learned from later in the chapter as
    you go. I also recommend stopping to do a little programming of your own. Try
    some simple things, such as a program to print a small multiplication table (say
    up to 4 x 4) and a program that accepts multiple Strings as arguments and combines
    them in interesting ways. There''s no substitute for learning by doing it yourself.


    ## C H A P T E R  3


    ## Data Types


    Most programming languages have data types. Java has several data types. The first
    characteristic of a data type is whether it''s a primitive or an object. Anything
    that''s not a primitive is an object of some sort.'
