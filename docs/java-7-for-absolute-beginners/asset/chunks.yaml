- fmt: "`TargetPanel`类提供了游戏场地并保持五个目标处于活跃状态。作为保持五个目标活跃的一部分，它还会检查其区域内的鼠标点击是否击中了目标。这些功能属于游戏逻辑的一部分。在这种情况下，游戏逻辑分布在多个类中是可以接受的。指导原则是每个类都有清晰、定义明确的任务。保持正确数量的目标活跃并检查目标是否被击中，是管理游戏场地的一部分，而这正是`TargetClickPanel`类的职责。这里有一个教训：尽可能将逻辑与用户界面分离。然而，在分离逻辑与呈现时，应优先考虑每个类有明确目的的原则。理想情况下，你可以同时实现这两个目标，但这并不总是可行的（就像这里一样）。\n\
    \n**清单 12-2. `TargetClickPanel`类**\n\n```java\npackage com.bryantcs.examples.videogames;\n\
    import java.awt.Graphics;\nimport java.awt.event.MouseEvent;\nimport java.awt.event.MouseListener;\n\
    \nimport javax.swing.JPanel;\n\npublic class TargetClickPanel extends JPanel implements\
    \ MouseListener{\n\n  private static final long serialVersionUID = 1L;\n\n  //\
    \ Keep track of the targets\n  private Target targets[] = new Target[5];\n\n \
    \ // The constructor, which populates the array with nulls\n  public TargetClickPanel()\
    \ {\n    addMouseListener(this);\n    for (int i = 0; i < targets.length; i++)\
    \ {\n      targets[i] = null;\n    }\n  }\n\n  // Here's where we update the game\
    \ field\n  public void paint (Graphics g) {\n    super.paintComponent(g);\n  \
    \  for (int i = 0; i < targets.length; i++) {\n      // here's where we make the\
    \ initial targets\n      // on the first time through the loop\n      if (targets[i]\
    \ == null) {\n        targets[i] = new Target(this);\n      }\n      // Is the\
    \ target done (either fully drawn or has been clicked?)\n      if (!targets[i].isDone())\
    \ {\n        // if not done, draw it in the game area\n        targets[i].draw(g);\n\
    \      } else {\n        // if it is done, make a new one and put it in the array;\n\
    \        // the old one can then be garbage collected\n        // as no reference\
    \ to it now exists\n        targets[i] = new Target(this);\n      }\n    }\n \
    \ }\n  // We have to have this method to fulfill the MouseListener contract\n\
    \  @Override\n  public void mouseClicked(MouseEvent e) {\n  }\n  // We have to\
    \ have this method to fulfill the MouseListener contract\n  @Override\n  public\
    \ void mouseEntered(MouseEvent e) {\n  }\n\n  // We have to have this method to\
    \ fulfill the MouseListener contract\n  @Override\n  public void mouseExited(MouseEvent\
    \ e) {\n  }\n\n  // We have to have this method to fulfill the MouseListener contract\n\
    \  @Override\n  public void mousePressed(MouseEvent e) {\n  }\n\n  // Here's where\
    \ we check for user input within the game field\n  // and check to see if the\
    \ input changes the game\n  // (because the user hit a target)\n  @Override\n\
    \  public void mouseReleased(MouseEvent e) {\n    for (int i = 0; i < targets.length;\
    \ i++) {\n      targets[i].pointInTarget(e.getX(), e.getY());\n    }\n  }\n}\n\
    ```\n\n正如我们刚刚看到的，`TargetClickPanel`类只提供了目标出现的位置，处理游戏区域内的鼠标点击（`TargetClick`类处理菜单和框架中的鼠标点击），并保持五个目标处于活跃状态。\n\
    \n`Target`类是构成`TargetClick`游戏的三个类中任务最简单的：它绘制一个目标并判断目标是否被击中。这看起来可能任务过多，你的第一反应可能是将命中逻辑移出这个类。然而，如果玩家击中了目标，`Target`类的实例必须停止绘制其目标。因此，将命中逻辑放在`Target`类中是合理的。再次强调，赋予每个类明确的目的比分离逻辑与呈现更重要。在决定是否分离代码时，问自己两个有用的问题：我能进一步分离吗？进一步分离是否使代码更易于理解或维护？在这个例子中，代码本可以进一步分离。然而，进一步分离只会使这个简单的程序变得杂乱。\n\
    \n**清单 12-3. `Target`类**\n\n```java\npackage com.bryantcs.examples.videogames;\n\
    \nimport java.awt.Color;\nimport java.awt.Graphics;\n\nimport javax.swing.JPanel;\n\
    \npublic class Target {\n  // The essential information drawing a target:\n  //\
    \ where is it and how big is it right now?\n  private int drawX, drawY, step;\n\
    \n  // Are we done yet? By default, no\n  private boolean done = false;\n\n  //\
    \ a reference to the game area, which we use\n  // to find a spot for this target\n\
    \  JPanel panel;\n\n  // The constructor\n  Target(JPanel panel) {\n    this.panel\
    \ = panel;\n    // -30 + 15 creates a 15-pixel border\n\n    // Find a random\
    \ spot in the game field\n    drawX = TargetClick.random.nextInt(panel.getWidth()\
    \ - 30) + 15;\n    drawY = TargetClick.random.nextInt(panel.getHeight() - 30)\
    \ + 15;\n\n    // Start the step counter\n    step = 0;\n  }\n\n  // Here's where\
    \ we draw the target\n  void draw(Graphics g) {\n    if (!done) {\n      // if\
    \ not done, draw a circle that varies in size by the current step\n      if (step\
    \ == 0) {\n        g.setColor(Color.RED);\n        g.fillOval(drawX - 15, drawY\
    \ - 15, 10, 10);\n      }\n      if (step == 1) {\n        g.setColor(Color.RED);\n\
    \        g.fillOval(drawX - 15, drawY - 15, 20, 20);\n      }\n\n      if (step\
    \ == 2) {\n        g.setColor(Color.RED);\n        g.fillOval(drawX - 15, drawY\
    \ - 15, 30, 30);\n      }\n      if (step == 3) {\n        g.setColor(Color.RED);\n\
    \        g.fillOval(drawX - 15, drawY - 15, 20, 20);\n      }\n      if (step\
    \ == 4) {\n        g.setColor(Color.RED);\n        g.fillOval(drawX - 15, drawY\
    \ - 15, 10, 10);\n        done = true;\n      }\n    } else {\n      // if we\
    \ are done, erase the remaining circle\n      g.setColor(Color.WHITE);\n     \
    \ g.fillOval(drawX + 1, drawY + 1, 30, 30);\n    }\n    step++;\n  }\n  // This\
    \ is how we let the playing field\n  // know whether this target is done\n  public\
    \ boolean isDone() {\n    return done;\n  }\n  // Did this target get hit?\n \
    \ public void pointInTarget(int x, int y) {\n    if (x > drawX -15 && x < drawX\
    \ + 15 && y > drawY - 15 && y < drawY + 15) {\n      // A hit! So add 1 to the\
    \ sore and indicate that this target is done\n      TargetClick.score++;\n   \
    \   done = true;\n    }\n    // no need to do anything if not a hit\n  }\n}\n\
    ```\n\n`Target`类包含了绘制目标以及判断目标是否被点击的逻辑。为简化起见，我判断点击是否位于包含目标点的正方形内。对于更精确的方法，你可以检查玩家点击的像素颜色，如果它不是白色则判定为命中。我的简化使得游戏稍微容易一些。\n\
    \n`TargetClick`差不多是游戏能做到的最简单的程度了。让我们继续看一个更复杂的游戏。"
