  trans: '

    #### 字面量


    所有基本类型和`String`类都可以拥有字面量值。*字面量*是一种与特定数据类型对应的常量值。表 3-2 为每种基本数据类型和`String`类提供了示例。


    ![图片](img/t0302a.jpg)


    ![图片](img/square.jpg) **注意** 声明 float 字面量时，需要在字面量末尾追加 f。否则，编译器会尝试将其转换为 double
    值，然后报错，提示无法从 double 转换为 float。类似地，你可以在 double 字面量声明的末尾加上 d。不过，这是多余的，因为 double
    是默认的浮点类型。


    字面量随处可见，人们往往不会停下来思考它（毕竟，我们通常只是想方设法让计算机做点什么）。每当我们编写一个从 0 开始计数到某个值的循环时，我们就在使用字面量（在这种情况下，是整数字面量）。其他许多字面量在几乎所有编程语言和任务中都很常见。在集合论（它为大量编程，尤其是数据库编程提供了理论基础）中，唯一重要的三个值是
    0、1 和多。因此，0 和 1 在各种软件中反复出现。空字符串（`""`——有时用于比较 String 对象）和单个空格（`" "`——用于连接 String
    对象而无需在此过程中创造一个新的大词）也经常出现。


    ##### 转义字符


    `char`类型的变量可以拥有几个特殊的值。首先，单引号（''）、双引号（`"`）和反斜杠（\）都必须被标记为特殊字符（这称为转义字符），以便 JVM 知道你想要的是这些字符之一。否则，它会将所有单引号处理为`char`的开始或结束，将所有双引号处理为`String`对象的开始或结束。反斜杠字符必须被转义，因为它本身就是转义字符。如果它本身不能被转义，那么每个反斜杠都会表示一个转义字符，这将是一个真正的问题。*转义字符*（通常称为转义序列，因为它们至少由两个字符组成——转义字符和至少一个其他字符）也用于非图形字符（通常称为控制字符）。甚至还有一个叫做
    Bell 的字符。它从不显示，但它可以（如果你的计算机支持）让你的计算机发出蜂鸣声。Bell（或 Alert）字符的转义序列是`\a`。所有这些可能不太容易理解，所以让我们看看代码清单
    3-3 中的一些例子，以便更清楚地说明问题。


    ***代码清单 3-3**. 转义字符示例*


    `// 让我们从双引号开始`

    `// 下面这行会报错，因为 meow 未定义`

    `System.out.println("My cat says, "meow."");`

    `// 所以这一行必须写成`

    `System.out.println("My cat says, \"meow.\"");`

    `// 这将产生输出：My cat says, "meow."`


    `// 现在是单引号`

    `// 下面这行会报错，因为 '' 没有匹配的 ''`

    `System.out.println("'' is my favorite character");`

    `// 所以这一行必须写成`

    `System.out.println("\'' is my favorite character");`

    `// 这将产生输出：'' is my favorite character`

    `// （我真正喜欢的字符是 ;）`


    `// 现在是反斜杠本身`

    `// 下面这行会报错，因为它缺少一个结束的 "`

    `// （编译器将 \" 视为字面量 "，然后找不到字符串的结尾。）`

    `System.out.println("I want a \");`

    `// 所以这一行必须写成`

    `System.out.println("I want a \\");`

    `// 这将产生输出：I want a \`


    Java 还支持几个特殊的转义序列（全部以反斜杠开头）。表 3-3 展示了每个转义序列并描述了其效果。它从我们已经介绍过的三个开始。


    ![图片](img/t0303.jpg)


    换行符（`\n`）在创建可读的错误消息、分隔文件中的行以及其他输出方面得到了大量使用。制表符不太常见，但有时仍会使用（用于对齐输出片段，使内容更易读）。其他转义序列则很少使用，因为如今的软件开发人员几乎不再创建非结构化输出。当程序员使用穿孔卡片进行输入、使用行式打印机进行输出时，他们广泛使用换页符和行首字符。当然，我们仍然会产生大量输出，但通常是
    HTML、XML 或其他结构化格式。


    除了作为`char`类型变量的可能值之外，`String`对象也可以包含转义序列。许多`String`对象包含一个或两个换行序列。代码清单 3-4 展示了一个简短的例子。


    ***代码清单 3-4**. 包含转义序列的字符串*


    `String errorMessage = "The whatsit didn''t work!\nCheck the doohickey.";`

    `System.out.println(errorMessage);`


    该代码片段产生的输出如代码清单 3-5 所示。


    ***代码清单 3-5**. 换行输出*


    `The whatsit did''t work!`

    `Check the doohickey.`

