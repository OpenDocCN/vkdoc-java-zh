    ## Writing and Reading XML


    XML stands for Extensible Markup Language. You might think it would be “eXtensible
    Markup Language,” but it''s not. Odd acronym aside, XML rates inclusion in a book
    for beginning programmers because, as your software-development career (whether
    as a hobbyist sqor a professional) continues, you''ll inevitably run into XML
    in all sorts of places. It''s used to store documents, from the contents of a
    single web page to the contents of entire sets of encyclopedias. It''s also used
    to transmit data between applications, whether the servers running those applications
    are halfway around the world or in the same room. It''s even used (with Cascading
    Style Sheets) to display information in web browsers. Every company I''ve worked
    for over the last dozen years, and every application I''ve written (at least those
    applications more serious and substantial than Minesweeper), has made at least
    some use of XML.


    Although a specialized language called XSLT (Extensible Stylesheet Language Transformation)
    exists specifically for processing XML, Java is also a very popular language for
    dealing with XML. Also, one of the best and most popular XSLT processors, called
    Saxon, is coded in Java. Java is especially handy for working with XML because
    it includes a number of packages intended specifically for processing (reading,
    writing, and transforming) XML. The two most common packages (largely because
    they are included in Java) are DOM (Document Object Model) and SAX (Simple API
    for XML). You can use DOM to read and write XML. SAX only reads (or, more properly,
    parses) XML. For writing XML, though, you can also create a `String` object and
    write that to your file. Done correctly, writing `String` objects offers the lowest
    overhead (in both memory and speed) for producing XML. This chapter will cover
    writing XML from DOM and from `String` objects, and reading XML with DOM and SAX.'
