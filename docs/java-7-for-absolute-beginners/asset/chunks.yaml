    `addMenu` 方法比我们目前编写的一些程序还要庞大。正如我在本章开头提到的，对 Swing 的一个常见抱怨是它过于冗长（这意味着需要大量代码才能完成看似不多的工作）。同样，这是一个不公平的批评，因为其他用户界面框架也存在同样的问题。能够设置大量选项来让程序执行各种操作，意味着需要设置很多属性，也就意味着需要大量代码。这就是用户界面开发的本质。在创建了几个带有图形用户界面（GUI）的程序之后，你就会习惯这一点。


    那么，让我们详细看看 `addMenu` 方法。该方法遵循一种重复的模式，因此我们描述这种模式，而不是逐行解释（毕竟，这*确实*是一个庞大的方法）。第一行创建了一个名为“file”的
    `JMenu` 对象。如果我们的程序还有一个编辑菜单（比如文字处理器可能有的那种），我们就会有另一个 `JMenu` 对象。因此，对于 Swing 来说，菜单是更大菜单结构（我们将在方法末尾附近看到）中的一个菜单项。创建文件菜单对象后，我们开始创建
    `JMenuItem` 对象。每个 `JMenuItem` 对象定义了此特定菜单中的一个选项。对于每个菜单项，我们指定一个名称（例如“新游戏”或“退出”），设置一个助记符（让玩家可以用键盘控制菜单），添加一个
    `ActionListener` 对象（在本例中，所有菜单项都使用同一个动作监听器），然后将该菜单项添加到文件菜单对象中。在方法末尾附近，我们创建了一个 `JMenuBar`
    对象。`JMenuBar` 对象可能更符合人们提到“菜单”时的认知，因为 `JMenuBar` 对象定义了程序顶部的整个菜单栏。有了 `JMenuBar`
    对象后，我们将文件菜单对象添加到其中，最后将整个菜单添加到我们的窗口（同样，由我们的 `JFrame` 对象定义）。


    现在我们已经看完了所有方法，接下来应该看看 `MineSweeper` 类中的字段。这些字段是类顶部的变量。为了省去你在本书页面间来回翻找的麻烦，清单 7-11
    展示了这些字段的定义。


