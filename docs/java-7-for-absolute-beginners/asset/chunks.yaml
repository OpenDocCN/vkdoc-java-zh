    criticisms fall on any UI toolkit, though. Swing is verbose but not more verbose
    than other UI toolkits that I''ve used. When you need to specify a lot of properties
    (size, font, color, placement on the screen, conditional presence, and so on),
    it takes a number of lines of code for each object to specify all that. That''s
    the nature of the job, regardless of toolkit. As for speed, Swing can perform
    as well as other UI toolkits, though you have to know a great deal about the toolkit
    to get the most from it. Again, that''s also true of other UI toolkits. The code
    in this book is not optimized for speed, by the way. I just show you the basics.
    To teach you everything about Swing, I''d have to write another (very likely larger)
    book.'
  trans: '

    ### 摘要


    关于对象建模的书籍已经出版了很多（毫无疑问未来还会更多）。它是面向对象编程的基础部分，但也很容易陷入不良实践。掌握对象建模既需要经验也需要学习：经验用于观察对象模型的实际运作，学习则用于了解其中存在的问题。本章通过一个简单示例（动物王国中的几个成员）进行讲解，但这绝非对象建模的完整论述。


    在此过程中，我们学习了何时使用抽象类、静态方法和 final 方法，以及静态字段。我们还了解了为什么通常希望将字段设为私有并通过 get 方法访问，而不是让字段在类外部可见。


    此外，我们还了解了一些关于粒度化编程（也称为“分块”、模块化及其他类似名称）的价值。请记住将程序“分块”为类和接口，这样既便于理解，也便于在出现问题时进行调试。


    最后，我们深入探讨了按引用传递与按值传递这一棘手的理论问题。具体来说，我们了解到 Java 严格采用按值传递。然而，其中某些值是指针（即对象所在的内存地址）。因此，修改已传递的对象会修改原始对象，而修改基本类型则只会修改该基本类型的本地副本，而非原始值。


    ## 第 7 章


    ## 编写用户界面


    大多数想要开发软件的人，其初衷都是为了编写具有某种丰富用户界面的程序。这种丰富的用户界面可能通过一组窗口实现（例如 Word 或许多游戏所使用的界面），也可能通过网页浏览器实现。然而，有相当一部分开发者主要开发没有用户界面的程序。他们编写诸如设备驱动程序（让鼠标等设备与计算机配合工作的软件）、服务（在用户界面之外向其他程序提供信息的程序）以及数据库引擎（通常以多程序可访问的方式管理数据）等程序。因此，用户界面之外也有大量工作可做。尽管如此，工作中可见的部分仍然吸引着许多人投身这一行业，这本身并无不妥。


    本章将向你展示如何使用 Java 内置最常用的用户界面工具包——Java Swing 来开发用户界面。我们从一些简单的基础知识开始，最后实现一个扫雷游戏。毕竟，学完之后找点乐子又何妨呢？（我敢打赌，很多购买本书的人都想编写一个游戏。这正合我意，我也喜欢游戏。）


    ### Java Swing 基础


    Java Swing 是一个大型工具包，支持你在非网页用户界面中通常（以及某些不常见）看到的所有元素：窗口、按钮（可包含文本、图像、两者皆有或两者皆无）、选项列表、菜单、标签、文本框、文本区域、复选框、下拉列表、绘图区域、文件选择对话框、文件保存对话框、其他对话框等等。简而言之，Swing
    提供了编写几乎任何程序所需的所有工具。某些专业程序可能需要 Swing 不具备的界面对象，但其他工具包很可能也没有。此外，Swing 确实具备创建新型界面对象的能力，不过这超出了本书的讨论范围。


    Swing 使用 Java 基础类（JFC）。JFC 是另一个支持创建可在多种不同操作系统（如 Windows、Unix 和 MacOS）上运行的应用程序的工具包。Swing
    是 JFC 支持的多个工具包之一。其他工具包包括 Java2D 和抽象窗口工具包（AWT）。在开发 Swing 应用程序时，我们会用到 AWT 的部分功能。例如，Java
    的 Color 类就是 AWT 的一部分。


    有些人并不喜欢 Swing，声称它过于复杂且运行缓慢。不过，这些批评也适用于任何 UI 工具包。Swing 虽然冗长，但与我使用过的其他 UI 工具包相比，并不算更啰嗦。当你需要指定大量属性（大小、字体、颜色、屏幕位置、条件显示等）时，每个对象都需要多行代码来指定所有这些信息。无论使用何种工具包，这都是工作的本质。至于速度，Swing
    的性能可以与其他 UI 工具包相媲美，尽管你需要对工具包有深入了解才能充分发挥其性能。同样，其他 UI 工具包也是如此。顺便提一下，本书中的代码并未针对速度进行优化。我只是向你展示基础知识。要教你关于
    Swing 的一切，我恐怕得再写一本（很可能更厚的）书了。

