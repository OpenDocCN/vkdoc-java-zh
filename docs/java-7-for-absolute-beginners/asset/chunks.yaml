    ### 包装类


    每一种基本类型（记住，`String` 是一个对象而非基本类型）都有一个对应的类，提供了基本类型本身所不具备的若干实用功能。你可以将包装类视为包裹在对应基本类型周围的一包实用功能。表
    3-4 展示了每种基本类型对应的包装类：


    ![图片](img/t0304.jpg)


    这些类中最常用的方法是各种 `parse`、`Value` 和 `valueOf` 方法，因为这些方法能让你将 `String` 转换为基本类型。每个类也支持
    `toString` 方法，用于将基本类型转换为 `String` 对象。代码清单 3-6 展示了你可以对 `int` 基本类型执行的操作。


    ***代码清单 3-6**。Integer 示例*


    `// 声明一个 int`

    `int myInt = 1;`


    `// 以及一个包含数字的 String`

    `String myString = "1";`


    `// 将 myInt 转换为 String`

    `String myIntString = Integer.toString(myInt);`


    `// 将 myString 转换为 int`

    `int myStringInt = Integer.parseInt(myString);`


    `// 将 myString 转换为 Integer`

    `// 如果 myString 不包含数字，请准备好处理异常`

    `Integer myStringInteger = new Integer(myString);`


    `// 然后将 myStringInteger 转换为 int`

    `int myOtherStringInt = myStringInteger.intValue();`


    `// 现在做一些更不寻常的事情`

    `// 将 int 转换为 float（也许是为了后续的浮点运算）`

    `float myFloat = new Integer(myInt).floatValue();`


    `// 将 int 转换为 byte`

    `// 如果该值超出 byte 的范围，请准备好处理异常`

    `byte myByte = new Integer(myInt).byteValue();`


    `// 将 int 转换为 long`

    `// 这次无需担心异常`

    `long myLong = new Integer(myInt).longValue();`


    `// 纯粹为了好玩，获取 myInt 的二进制字符串表示`

    `// 创建一个包含 "1" 的 String 对象`

    `String myIntBinary = Integer.toBinaryString(myInt);`


    其他数值基本类型（`byte`、`short`、`long`、`float` 和 `double`）的工作方式类似。你可以将它们中的任意一种转换为另一种，不过如果无法用你提供的值进行转换，你可能需要处理异常。例如，如果你有一个值为
    300 的 int 变量，将其转换为 byte 会出错，因为 byte 无法容纳该值。我们将在下一章讨论类型转换时更详细地介绍这个概念。


    `Boolean` 和 `Character` 类的工作方式略有不同。你仍然可以将字符串转换为 `boolean` 或 `char` 值，反之亦然，但你不能将
    `boolean` 和 `char` 基本类型转换为其他基本类型。此外，`Boolean` 类包含一个 `equals` 方法，而 `Character`
    类包含许多用于处理诸如从右到左阅读的字符（例如，阿拉伯语和希伯来语的字符）以及其他仅与字符相关的特殊问题的方法。不过，所有这些操作都相当不常见，因此我们不做介绍。如果你想了解更多关于它们的信息（如果你愿意，那很好），请查看
    `Boolean` 和 `Character` 类的 Javadoc。你可能还记得第 1 章中提到，JavaDoc 是一种内置于代码本身的特殊文档。Oracle（开发
    Java 的公司）为所有标准 Java 库提供了详尽的 JavaDoc。你可以在 [`http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Boolean.html)
    找到 Boolean 类的 JavaDoc，在 [`http://download.oracle.com/javase/7/docs/api/java/lang/Character.html`](http://download.oracle.com/javase/7/docs/api/java/lang/Character.html)
    找到 Character 类的 JavaDoc。你可以在 [`http://download.oracle.com/javase/7/docs/api/`](http://download.oracle.com/javase/7/docs/api/)
    找到 Java 7 的所有 JavaDoc（如你所见，其他主题都是整个 API 文档的分支）。


    ### 数组


    *数组*是一种数据结构，它在一个标识符下保存一组变量。Java 支持基本类型和对象的数组。变量名后的方括号表示它是一个数组。代码清单 3-7 展示了几个数组以及如何操作它们。


    ***代码清单 3-7**。基本类型数组*


    `int[] a; // 声明数组但不赋值`

    `a = new int[2]; // 指定现有数组的长度`

    `int[] b = {1, 2, 3, 4}; // 声明数组并赋值`

    `int bLength = b.length; // 如何获取数组的长度`


    `// 数组从 0 开始，而不是 1`

    `b[0] = 2; // 必须逐个重新赋值数组中的每个值`


    让我们逐行查看代码。第一行创建了一个 `int` 基本类型的数组，但没有给它赋值（此时 `a` 为 null）。第二行展示了如何将数组设置为特定长度。如果
    `a` 之前有值，这些值将被新类型的默认值（此处为 0）替换。第三行展示了如何创建一组初始值的数组。你只能在创建数组时使用这种块赋值语法，而不能在给现有数组赋新值时使用。第四行展示了如何获取数组的长度。最后一行展示了如何重新赋值数组中的某个值，并说明数组索引从
    0 开始（大多数编程语言从 0 开始计数）。


    现在让我们看看代码清单 3-8 中的对象数组，它揭示了一些有趣的事情。


    ***代码清单 3-8**。对象数组*


    `Integer[] myIntegers = new Integer[4];`

    `for (int i = 0; i < myIntegers.length; i++) {`

    `        myIntegers[i] = new Integer(i);`

    `}`


    同样，我们逐行分析。如你所见，创建对象数组的语法与创建基本类型数组略有不同。等号左边的部分看起来相同（对象类型、数组指示符和变量名），但等号右边的部分不同，它在数组元素类型之前使用了
    `new` 关键字。要创建对象的新实例，我们通常使用 `new` 关键字（尽管也存在其他方式），它会调用对象的构造函数。然而，Integer 类的所有构造函数都需要一个对象（一个
    `int` 或一个包含整数值的 `String` 对象），因此这个数组最终包含四个 null 引用（我们稍后会深入探讨 null 的含义）。


    这个代码清单还展示了如何遍历数组，并在本例中为每个 null 对象创建一个对象。请注意，即使我们在创建数组时已经使用了 `new` 关键字，这里仍然必须再次使用它。因为从最初的赋值中我们得到的是四个
    null 引用而不是实际对象，所以我们必须在这里创建新的对象。在这种情况下，我们最终得到四个 `Integer` 对象，其值分别为 0、1、2 和 3。


    Java 为数组提供了一个便捷类。`Arrays` 类由许多静态方法组成，用于执行诸如复制和排序数组等便捷操作。例如，代码清单 3-9 展示了一种对 int
    数组进行排序的方法。


    ***代码清单 3-9**。使用 Arrays 便捷类*


    `int[] a = {5, 4, 3, 2};`

    `// 在程序顶部，我们必须导入`

    `// java.util.Arrays 才能使此代码正常工作`

    `Arrays.sort(a);`

    `for (int i = 0; i < a.length; i++) {`

    `  System.out.println(a[i]);`

    `}`


    结果在控制台中输出为 2、3、4、5（每个数字占一行）。

