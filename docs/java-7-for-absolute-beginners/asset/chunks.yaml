    第四个示例并非类型转换，但它展示了如何从基本类型（本例中的`char`）转换为`String`。同样的模式适用于所有基本类型：首先获取基本类型的包装类，然后使用包装类的`toString`方法。


    我提到过在窄化转换中使用防御性编码。当你无法确定提供的值不会引发问题时，防御性编码始终是个好主意。事实上，在某些类型的应用程序中（分布式应用就是一个典型例子），验证方法的所有参数（即确保参数值可用）是标准做法。清单
    4-6 展示了从`int`到`byte`窄化转换的防御性编码示例：


    ***清单 4-6.** 窄化转换的防御性编码*


    `private static byte intToByte(int i) {`

    `  if (i > Byte.MAX_VALUE || i < Byte.MIN_VALUE) {`

    `    throw new IllegalArgumentException("integer argument " +`

    `        "is too large or too small to cast to a byte");`

    `  }`

    `  return (byte) i;`

    `}`


    然后，调用`intToByte`的代码可以决定如何处理该问题。将验证逻辑移至独立方法是个好主意，这既能封装每段验证逻辑，又能允许多个方法复用同一段验证逻辑。许多系统都拥有验证类（有时还有验证包），提供大量此类方法，以便其他类中的方法能够使用一致的验证逻辑。随着你学习使用面向对象语言（包括
    Java），你会逐渐习惯这种设计。


    #### 乘法运算符


    Java 有三种乘法运算符：乘法（*）、除法（/）和取模（%）（取模运算符常被称为 mod 或 modulo；在 Java 开发团队中，当有人朗读代码时，你会听到诸如“a
    mod b”这样的表达）。


    正如我之前在讨论括号时提到的，这三个运算符之间没有隐式的运算顺序。对于 JVM 而言，它们具有相同的优先级。正因如此，JVM 会从左到右处理它们。再次强调，Java
    不是代数，尽管某些运算符和概念在两者中都存在。


    乘法和除法足够直观，但让我们来看看取模运算符。一如既往，示例大有帮助（见清单 4-7）。


    ***清单 4-7.** 取模运算符示例*


    `int a = 9;`

    `int b = 2;`

    `int c = a % b; // c 等于 1`

    `float f = 1.9f;`

    `float g = 0.4f;`

    `float h = f % g; // h 等于 0.3 – 但要注意舍入问题`


    如这个简短清单所示，取模运算符将第一个操作数除以第二个操作数，并返回余数。


    ![images](img/square.jpg) **警告** 在`float`和`double`类型上使用取模运算符时，请注意舍入问题。我将其四舍五入为
    0.3，但当我用 Eclipse 运行这段代码时，我的 JVM 实际上将 0.29999995 赋值给了`h`。如果你是在视频游戏中绘制虚拟角色的位置，这可能无关紧要（因为屏幕像素数量相当少，所以误差不足以让角色出现在错误位置）。然而，想象一下在控制火箭飞往火星的代码中出现同样的误差。那么，这个误差就足以确保你的火箭无法到达正确位置进入轨道，而这确实是一个代价高昂的误差。在许多应用中，舍入问题往往很棘手。


    #### 加法运算符


    你可能认为我对加号（+）和减号（−）没什么可说的。然而，即使在 Java 应用中使用它们时，也存在值得注意的细微之处。与乘法运算符一样，加法运算符的优先级相同，因此它们会从左到右处理，即使减号在一行中出现在加号之前也是如此。这通常无关紧要。然而，当它确实重要时，这可能是一个难以发现的问题。


    此外，加号也是字符串连接运算符。正如我们在各种示例中看到的，`someString + someOtherString = aThirdString`。严格来说，加法运算符和字符串连接运算符是不同的运算符。然而，它们使用相同的字符。JVM
    通过上下文来判断加号是作为加法运算符还是字符串连接运算符。如果 JVM 确定上下文是数值型的，则执行加法运算。如果 JVM 确定上下文是文本型的，则执行连接运算。清单
    4-8 演示了 JVM 遇到不同上下文时发生的情况：


    ***清单 4-8.** ShiftDemo 上下文切换示例*


    `int a = 1;`

    `int b = 2;`

    `int c = 3;`

    `System.out.println(a + b + c);`

    `System.out.println("a + b + c = " + a + b + c);`

    `System.out.println("a + b + c = " + (a + b + c));`


    在程序中运行时，该代码会产生以下输出（见清单 4-9）：


    ***清单 4-9.** 上下文切换示例输出*


    `6`

    `a + b + c = 123`

    `a + b + c = 6`


    第一行的上下文是数值型的，因为`println`方法处理的第一个值是数值型的。第二行的上下文是文本型的，因为`println`方法处理的第一个值是一个字符串字面量。第三行得到了正确的值，因为括号强制先进行加法运算，即使上下文是文本型的。

