    play. As part of keeping five targets in play, it also checks to see if a mouse
    click in its area hits a target. Those functions are part of the game logic. In
    this case, it''s acceptable for the game logic to be distributed over more than
    one class. The guiding principle is that each class has a clear, well-defined
    task. Keeping the right number of targets in play and checking for targets being
    hit is part of managing the field of play, and that''s the job of the `TargetClickPanel`
    class. There''s a lesson here: where possible, separate logic from user interface.
    However, favor the principle of each class having a clear purpose over separating
    logic from presentation. Ideally, you can achieve both goals, but that''s not
    always practical (as here).


