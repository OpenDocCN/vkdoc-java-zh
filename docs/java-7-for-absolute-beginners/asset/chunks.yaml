- fmt: "Like most constructors, the `MineField` constructor first populates the fields\
    \ with the values of the current game. Then it calls a method called `init` (which\
    \ we examine next). Finally, it calls the `populate` method that has no constructors\
    \ (there are two `populate` methods–we go over why that is shortly). The pattern\
    \ of a constructor doing some simple work and then calling other methods to do\
    \ more complex work is common, by the way. It offers a way to isolate complexity,\
    \ which makes the code easier to read and easier to debug when problems arise.\n\
    \nNow let's look at the `init` method, shown in [Listing 7-15](#Chapter07.html#list_7_15).\n\
    \n***Listing 7-15.** The MineField init method*\n\n```\nprivate void init() {\n\
    \  for (int i = 0; i < rows; i++){\n    for (int j = 0; j < columns; j++) {\n\
    \      mineField[i][j] = new Mine();\n    }\n  }\n}\n```\n\nAs you can see, it's\
    \ a simple method. It populates the minefield with the right number of `Mine`\
    \ objects. The two `populate` methods do the heavy lifting of figuring out where\
    \ the mines reside. If you're a clever reader (and I know you are), you're wondering\
    \ how there can be a `Mine` object in every possible location; we tackle that\
    \ mystery when we get to the `Mine` object itself.\n\nFor now, let's press on\
    \ into the two `populate` methods, which I've put together in [Listing 7-16](#Chapter07.html#list_7_16).\n\
    \n***Listing 7-16.** The two populate methods*\n\n```\nprivate void populate()\
    \ {\n  populate(0);\n}\n\nprivate void populate(int mineCount) {\n  int currentCount\
    \ = mineCount;\n  double mineChance = (double) mines / (double) (rows * columns);\n\
    \  for (int i = 0; i < rows; i++) {\n    for (int j = 0; j < columns; j++) {\n\
    \      Mine thisMine = mineField[i][j];\n      if (!thisMine.hasMine()) {\n  \
    \      if (Math.random() < mineChance) {\n          thisMine.setMine();\n    \
    \      currentCount++;\n          if (currentCount == mines) {\n            return;\n\
    \          }\n        }\n      }\n    }\n  }\n  if (currentCount < mines) {\n\
    \    populate(currentCount);\n  }\n}\n```\n\nSo why two `populate` methods? The\
    \ first one is a convenience method that saves the trouble of providing an argument.\
    \ In this case, it's not all that convenient, because we call only the convenience\
    \ method once. You can rightfully say that we should have used just one method.\
    \ However, we use this pattern so often that it's essentially a habit. More importantly,\
    \ it gives us a chance to talk about this useful pattern.\n\nSo, again, why two\
    \ methods? It's a useful technique in a number of situations. If you're exposing\
    \ methods to other objects (meaning the methods are not `private`), multiple methods\
    \ of the same name let developers (including you) call the same method with different\
    \ parameters. Then each of those methods calls some other method that applies\
    \ the parameters. In other cases, the simpler method gets used multiple times\
    \ to make coding a bit easier (by not having to specify parameters that rarely\
    \ change every time).\n\nNow let's talk about what the two `populate` methods\
    \ do. The simple `populate` method calls the more complex `populate` method with\
    \ an argument (which is the value needed to start the process of populating the\
    \ minefield). That initial value is the number of mines that have been placed\
    \ so far. That's why the initial argument is 0.\n\nThe complex version of the\
    \ `populate` method keeps a count (the `currentCount` variable) of the mines placed\
    \ so far. To figure out whether any given spot has a mine, the method uses the\
    \ random number generator to compare against the chance of a mine being in any\
    \ one spot. That chance is the number of possible spots divided by the number\
    \ of mines.\n\nIf we happen to get to the required number of mines before going\
    \ through the whole array, we can stop. The `if` statement in the middle of the\
    \ method accomplishes that goal. On the other hand, if we go through the whole\
    \ array and don't get to the required number of mines, we call the `populate`\
    \ method again. Let me repeat that bit: We call the method we're in again. That's\
    \ called recursion, and I dedicate a whole chapter to that relatively advanced\
    \ topic later in the book. Recursion is one of my favorite programming techniques,\
    \ and you can do some interesting things with it. For now, though, let's finish\
    \ a MineSweeper game.\n\nIf we do have to re-enter the method, the second pass\
    \ will go through the array again until we finally have the required number of\
    \ mines. In theory, this process could require more than two passes. In testing,\
    \ though, no more than two passes were ever needed, and the first pass never produced\
    \ fewer than seven mines. This algorithm gives a slight weighting to the top left\
    \ corner of the minefield, but I think that's an acceptable problem.\n\nSo, the\
    \ `populate` methods get a little tricky, but they do solve the problem of how\
    \ to randomly populate a minefield. Let's press on to other methods.\n\nThe next\
    \ two methods, `getMinesFound` and `getMinesRemaining`, return the values of fields.\
    \ So let's skip describing them in any further detail. The method after those\
    \ two, though, is another complex bit of code that requires some explanation.\
    \ [Listing 7-17](#Chapter07.html#list_7_17) shows the `cascade` method.\n\n***Listing\
    \ 7-17.** The MineField cascade method*\n\n```\nprivate gameState cascade(int\
    \ x, int y) {\n  if (x < 0 || y < 0 || x >= rows || y >= columns) {\n    return\
    \ gameState.CONTINUE;\n  }\n  Mine thisMine = mineField[x][y];\n  if (thisMine.hasMine())\
    \ {\n    return gameState.CONTINUE;\n  }\n  if (!thisMine.isCleared()) {\n   \
    \ thisMine.clear();\n    emptiesRemaining--;\n    if (emptiesRemaining == 0) {\n\
    \      return gameState.WIN;\n    }\n  }\n  if (countAdjacentMines(x, y) > 0)\
    \ {\n    return gameState.CONTINUE;\n  } else{\n    for (int i = x - 1; i <= x\
    \ + 1; i++) {\n      for (int j = y - 1; j <= y + 1; j++) {\n        if (i < 0\
    \ || j < 0 || i >= rows || j >= columns) {\n          continue;\n        } else\
    \ if (!mineField[i][j].isCleared()) {\n          cascade(i, j);\n        }\n \
    \     }\n    }\n  }\n  return gameState.CONTINUE;\n}\n```\n\nThe `cascade` method\
    \ handles the hardest task, which is figuring out whether multiple locations should\
    \ be cleared when one location is cleared. It uses a simple version of the well-known\
    \ flood fill algorithm, checking for adjacent clear locations rather than pixels\
    \ of the same color (as you would expect from a flood fill in a paint program).\
    \ It works by checking the location the player clicked (not right-clicked), checking\
    \ every location next to (including diagonally) that location, checking all the\
    \ locations next to those locations, and so on, until we finally run out of locations\
    \ to check. To make that algorithm work requires recursion again. As you can see\
    \ near the bottom of the method, the `cascade` method calls itself.\n\nGiven that\
    \ a large area without mines can result in a single click clearing a lot of locations,\
    \ the `cascade` method might end up calling itself quite a number of times. I\
    \ haven't tested the method for the purpose of seeing how often it is called,\
    \ but we would not be surprised to see 100 calls in a worst-case scenario. If\
    \ you are interested in knowing that, add a counter variable (it has to be an\
    \ argument to the method), increment it each time you enter the method, and print\
    \ that value to the console. Then, when you play a game, you see how many calls\
    \ to the `cascade` method happen."
  raw: 'Like most constructors, the `MineField` constructor first populates the fields
    with the values of the current game. Then it calls a method called `init` (which
    we examine next). Finally, it calls the populate method that has no constructors
    (there are two populate methods–swe go over why that is shortly). The pattern
    of a constructor doing some simple work and then calling other methods to do more
    complex work is common, by the way. It offers a way to isolate complexity, which
    makes the code easier to read and easier to debug when problems arise.


    Now let''s look at the `init` method, shown in [Listing 7-15](#Chapter07.html#list_7_15).


    ***Listing 7-15.** The MineField init method*


    `private void init() {`

    `  for (int i = 0; i < rows; i++){`

    `    for (int j = 0; j < columns; j++) {`

    `      mineField[i][j] = new Mine();`

    `    }`

    `  }`

    `}`


    As you can see, it''s a simple method. It populates the minefield with the right
    number of Mine objects. The two populate methods do the heavy lifting of figuring
    out where the mines reside. If you''re a clever reader (and I know you are), you''re
    wondering how there can be a Mine object in every possible location; we tackle
    that mystery when we get to the Mine object itself.


    For now, let''s press on into the two populate methods., which I''ve put together
    in [Listing 7-16](#Chapter07.html#list_7_16).


    ***Listing 7-16.** The two populate methods*


    `private void populate() {`

    `  populate(0);`

    `}`


    `private void populate(int mineCount) {`

    `  int currentCount = mineCount;`

    `  double mineChance = (double) mines / (double) (rows * columns);`

    `  for (int i = 0; i < rows; i++) {`

    `    for (int j = 0; j < columns; j++) {`

    `      Mine thisMine = mineField[i][j];`

    `      if (!thisMine.hasMine()) {`

    `        if (Math.random() < mineChance) {`

    `          thisMine.setMine();`

    `          currentCount++;`

    `          if (currentCount == mines) {`

    `            return;`

    `          }`

    `        }`

    `      }`

    `    }`

    `  }`

    `  if (currentCount < mines) {`

    `    populate(currentCount);`

    `  }`

    `}`


    So why two populate methods? The first one is a convenience method that saves
    the trouble of providing an argument. In this case, it''s not all that convenient,
    because we call only the convenience method once. You can rightfully say that
    we should have used just one method. However, we use this pattern so often that
    it''s essentially a habit. More importantly, it gives us a chance to talk about
    this useful pattern.


    So, again, why two methods? It''s a useful technique in a number of situations.
    If you''re exposing methods to other objects (meaning the methods are not private),
    multiple methods of the same name let  developers (including you) call the same
    method with different parameters. Then each of those methods calls some other
    method that applies the parameters. In other cases, the simpler method gets used
    multiple times to make coding a bit easier (by not having to specify parameters
    that rarely change every time).


    Now let''s talk about what the two `populate` methods do. The simple `populate`
    method calls the more complex `populate` method with an argument (which is the
    value needed to start the process of populating the minefield). That initial value
    is the number of mines that have been placed so far. That''s why the initial argument
    is 0.


    The complex version of the `populate` method keeps a count (the `currentCount`
    variable) of the mines placed so far. To figure out whether any given spot has
    a mine, the method uses the random number generator to compare against the chance
    of a mine being in any one spot. That chance is the number of possible spots divided
    by the number of mines.


    If we happen to get to the required number of mines before going through the whole
    array, we can stop. The if statement in the middle of the method accomplishes
    that goal. On the other hand, if we go through the whole array and don''t get
    to the required number of mines, we call the populate method again. Let me repeat
    that bit: We call the method we''re in again. That''s called recursion, and I
    dedicate a whole chapter to that relatively advanced topic later in the book.
    Recursion. is one of my favorite programming techniques, and you can do some interesting
    things with it. For now, though, let''s finish a MineSweeper game.


    If we do have to re-enter the method, the second pass will go through the array
    again until we finally have the required number of mines. In theory, this process
    could require more than two passes. In testing, though, no more than two passes
    were ever needed, and the first pass never produced fewer than seven mines. This
    algorithm gives a slight weighting to the top left corner of the minefield, but
    I think that''s an acceptable problem.


    So, the populate methods get a little tricky, but they do solve the problem of
    how to randomly populate a minefield. Let''s press on to other methods.


    The next two methods, `getMinesFound` and `getMinesRemaining`, return the values
    of fields. So let''s skip describing them in any further detail. The method after
    those two, though, is another complex bit of code that requires some explanation.
    [Listing 7-17](#Chapter07.html#list_7_17) shows the cascade method.


    ***Listing 7-17.** The MineField cascade method*


    `private gameState cascade(int x, int y) {`

    `  if (x < 0 || y < 0 || x >= rows || y >= columns) {`

    `    return gameState.CONTINUE;`

    `  }`

    `  Mine thisMine = mineField[x][y];`

    `  if (thisMine.hasMine()) {`

    `    return gameState.CONTINUE;`

    `  }`

    `  if (!thisMine.isCleared()) {`

    `    thisMine.clear();`

    `    emptiesRemaining--;`

    `    if (emptiesRemaining == 0) {`

    `      return gameState.WIN;`

    `    }`

    `  }`

    `  if (countAdjacentMines(x, y) > 0) {`

    `    return gameState.CONTINUE;`

    `  } else{`

    `    for (int i = x - 1; i <= x + 1; i++) {`

    `      for (int j = y - 1; j <= y + 1; j++) {`

    `        if (i < 0 || j < 0 || i >= rows || j >= columns) {`

    `          continue;`

    `        } else if (!mineField[i][j].isCleared()) {`

    `          cascade(i, j);`

    `        }`

    `      }`

    `    }`

    `  }`

    `  return gameState.CONTINUE;`

    `}`


    The `cascade` method handles the hardest task, which is figuring out whether multiple
    locations should be cleared when one location is cleared. It uses a simple version
    of the well-known flood fill algorithm, checking for adjacent clear locations
    rather than pixels of the same color (as you would expect from a flood fill in
    a paint program). It works by checking the location the player clicked (not right-clicked),
    checking every location next to (including diagonally) that location, checking
    all the locations next to those locations, and so on, until we finally run out
    of locations to check. To make that algorithm work requires recursion again. As
    you can see near the bottom of the method, the cascade method calls itself.


    Given that a large area without mines can result in a single click clearing a
    lot of locations, the cascade method might end up calling itself quite a number
    of times. I haven''t tested the method for the purpose of seeing how often it
    is called, but we would not be surprised to see 100 calls in a worst-case scenario.
    If you are interested in knowing that, add a counter variable (it has to be an
    argument to the method), increment it each time you enter the method, and print
    that value to the console. Then, when you play a game, you see how many calls
    to the cascade method happen.'
  trans: '

    与大多数构造函数类似，`MineField` 构造函数首先用当前游戏的值填充字段。然后它调用一个名为 `init` 的方法（我们接下来会分析这个方法）。最后，它调用没有参数的
    `populate` 方法（实际上有两个 `populate` 方法——我们稍后会解释原因）。顺便提一下，构造函数先执行一些简单工作，再调用其他方法处理更复杂任务的模式很常见。这种模式提供了一种隔离复杂性的方式，使代码更易阅读，并且在出现问题时更易调试。


    现在我们来看 `init` 方法，如清单 7-15 所示。


    ***清单 7-15.** MineField 的 init 方法*


    `private void init() {`

    `  for (int i = 0; i < rows; i++){`

    `    for (int j = 0; j < columns; j++) {`

    `      mineField[i][j] = new Mine();`

    `    }`

    `  }`

    `}`


    如你所见，这是一个简单的方法。它用正确数量的 `Mine` 对象填充雷区。两个 `populate` 方法负责繁重的工作，即确定地雷的位置。如果你是一位聪明的读者（我知道你肯定是），你可能会好奇为什么每个可能的位置都有一个
    `Mine` 对象；我们会在分析 `Mine` 对象本身时解开这个谜团。


    现在，让我们继续探讨两个 `populate` 方法，我把它们放在清单 7-16 中。


    ***清单 7-16.** 两个 populate 方法*


    `private void populate() {`

    `  populate(0);`

    `}`


    `private void populate(int mineCount) {`

    `  int currentCount = mineCount;`

    `  double mineChance = (double) mines / (double) (rows * columns);`

    `  for (int i = 0; i < rows; i++) {`

    `    for (int j = 0; j < columns; j++) {`

    `      Mine thisMine = mineField[i][j];`

    `      if (!thisMine.hasMine()) {`

    `        if (Math.random() < mineChance) {`

    `          thisMine.setMine();`

    `          currentCount++;`

    `          if (currentCount == mines) {`

    `            return;`

    `          }`

    `        }`

    `      }`

    `    }`

    `  }`

    `  if (currentCount < mines) {`

    `    populate(currentCount);`

    `  }`

    `}`


    那么为什么要有两个 `populate` 方法呢？第一个是便捷方法，省去了提供参数的麻烦。在这个例子中，它其实并不那么便捷，因为我们只调用了一次这个便捷方法。你完全可以说我们应该只用一个方法。然而，我们经常使用这种模式，以至于它已经成为一种习惯。更重要的是，它给了我们一个讨论这种有用模式的机会。


    那么，再次回到这个问题：为什么是两个方法？这在很多情况下都是一种有用的技巧。如果你将方法暴露给其他对象（即这些方法不是私有的），那么多个同名方法可以让开发者（包括你自己）用不同的参数调用同一个方法。然后这些方法中的每一个都会调用另一个应用这些参数的方法。在其他情况下，更简单的方法会被多次使用，以便让编码更轻松一些（无需每次都指定很少变化的参数）。


    现在我们来谈谈这两个 `populate` 方法具体做了什么。简单的 `populate` 方法调用更复杂的 `populate` 方法并传入一个参数（这个参数是开始填充雷区所需的值）。这个初始值是到目前为止已经放置的地雷数量。这就是为什么初始参数是
    0。


    复杂版本的 `populate` 方法会记录到目前为止已放置的地雷数量（`currentCount` 变量）。为了判断某个特定位置是否有地雷，该方法使用随机数生成器，将其与地雷出现在任何位置的概率进行比较。这个概率是可能的位置数量除以地雷数量。


    如果我们在遍历整个数组之前恰好达到了所需的地雷数量，就可以停止。方法中间的 `if` 语句实现了这个目标。另一方面，如果我们遍历了整个数组却没有达到所需的地雷数量，我们就再次调用
    `populate` 方法。让我重复一下这一点：我们再次调用了当前所在的方法。这被称为递归，我将在本书后面用一整章来介绍这个相对高级的主题。递归是我最喜欢的编程技巧之一，你可以用它做一些有趣的事情。不过现在，让我们先完成扫雷游戏。


    如果我们确实需要重新进入该方法，第二次遍历会再次扫描整个数组，直到我们最终拥有所需数量的地雷。理论上，这个过程可能需要两次以上的遍历。但在测试中，从未需要超过两次遍历，并且第一次遍历从未产生少于七颗地雷的情况。这个算法会稍微偏向雷区的左上角，但我认为这是一个可以接受的问题。


    所以，`populate` 方法虽然有点棘手，但它们确实解决了如何随机填充雷区的问题。让我们继续看其他方法。


    接下来的两个方法，`getMinesFound` 和 `getMinesRemaining`，返回字段的值。因此我们不再进一步描述它们。不过，这两个方法之后的方法，是另一段需要解释的复杂代码。清单
    7-17 展示了 `cascade` 方法。


    ***清单 7-17.** MineField 的 cascade 方法*


    `private gameState cascade(int x, int y) {`

    `  if (x < 0 || y < 0 || x >= rows || y >= columns) {`

    `    return gameState.CONTINUE;`

    `  }`

    `  Mine thisMine = mineField[x][y];`

    `  if (thisMine.hasMine()) {`

    `    return gameState.CONTINUE;`

    `  }`

    `  if (!thisMine.isCleared()) {`

    `    thisMine.clear();`

    `    emptiesRemaining--;`

    `    if (emptiesRemaining == 0) {`

    `      return gameState.WIN;`

    `    }`

    `  }`

    `  if (countAdjacentMines(x, y) > 0) {`

    `    return gameState.CONTINUE;`

    `  } else{`

    `    for (int i = x - 1; i <= x + 1; i++) {`

    `      for (int j = y - 1; j <= y + 1; j++) {`

    `        if (i < 0 || j < 0 || i >= rows || j >= columns) {`

    `          continue;`

    `        } else if (!mineField[i][j].isCleared()) {`

    `          cascade(i, j);`

    `        }`

    `      }`

    `    }`

    `  }`

    `  return gameState.CONTINUE;`

    `}`


    `cascade` 方法处理最困难的任务，即判断当一个位置被清除时，是否应该同时清除多个位置。它使用了著名的泛洪填充算法的一个简单版本，检查相邻的已清除位置，而不是检查相同颜色的像素（就像你在绘图程序的泛洪填充中看到的那样）。它的工作原理是：检查玩家点击的位置（不是右键点击），检查该位置旁边的每个位置（包括对角线方向），再检查这些位置旁边的所有位置，依此类推，直到最终没有位置需要检查为止。要使该算法工作，需要再次使用递归。正如你在方法底部附近看到的，`cascade`
    方法调用了自身。


    考虑到一个没有地雷的大区域可能导致一次点击清除大量位置，`cascade` 方法可能会多次调用自身。我没有为了查看它被调用的频率而测试该方法，但在最坏的情况下，看到
    100 次调用我们也不会感到惊讶。如果你对此感兴趣，可以添加一个计数器变量（它必须是该方法的一个参数），每次进入该方法时将其递增，并将该值打印到控制台。然后，当你玩游戏时，就能看到
    `cascade` 方法被调用了多少次。

