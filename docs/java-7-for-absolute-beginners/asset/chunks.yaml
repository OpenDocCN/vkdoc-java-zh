    ## 前言


    这本书的诞生，源于一位朋友（你好，罗斯）的女儿（你好，凯莉）问我平时做什么。碰巧当时我随身带着笔记本电脑，于是就演示给她看。凯莉当时 15 岁，很快就失去了兴趣。我当时是一名
    Web 开发人员（主要编写中间件和数据库代码，而非前端代码），于是我解释说 Facebook 的工作原理也类似。这引起了她的兴趣。了解你的受众，总是有好处的。


    那次经历让我萌生了写一本书、引导年轻人入门编程的想法。那年晚些时候，当 Apress 邀请我写书时，我设法说服他们让我为初学者写一本。


    所以，如果你想尝试编写软件，这本书就是为你准备的。它绝非对这两个主题（“它是如何工作的”和“它是如何编写的”实际上是两个主题）的详尽解释，但它是一个起点。我希望这个起点足以让你拥有一个新的爱好：编写软件。如果你之后学得更多，甚至可能有一天以此为职业。我希望读过这本书的读者中，有人最终能进入这个行业，因为我们需要更多敏锐的头脑来编写软件。


    如果你恰好是那个人，欢迎来到软件开发这个古怪、令人沮丧、引人入胜，有时又回报丰厚的世界。


    ——杰伊·布莱恩特

