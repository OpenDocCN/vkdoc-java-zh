    ## About the Technical Reviewer


    ![image](images/massimo_nardone.jpg) ![image](images/square.jpg)**Massimo Nardone**
    was born under Mount Vesuvius and holds a Master of Science Degree in Computing
    Science from the University of Salerno, Italy. He currently works as a Senior
    IT Security, Cloud and Infrastructure Architect, and is the Finnish Invention
    Development Team Leader (FIDTL) for IBM Finland. With more then 16 years of experience
    in Mobile, Security, and WWW technology areas for both national and international
    projects, he has worked as a Project Manager, Software Engineer, Research Engineer,
    Chief Security Architect, and Software Specialist. Massimo is also a visiting
    lecturer and supervisor for exercises at the Networking Laboratory of the Helsinki
    University of Technology (TKK) for the course “Security of Communication Protocols”.


    ## Introduction


    ### Who This Book Is For


    The title says “for Absolute Beginners.” By that, I mean absolute beginners at
    programming. My original audience was teenagers whom I hope will go to college,
    get degrees in Mathematics, Computer Science, or Electrical Engineering (or perhaps
    Technical Communication or Graphic Design), and then enter the software industry.
    However, I quickly realized that adults might also wish to learn to program, as
    part of changing careers, as a hobby, or simply out of curiosity. As a result,
    I''ve written the book for anyone who wants to learn to program but doesn''t have
    any programming knowledge, regardless of other characteristics such as age or
    future career paths.


    ### How This Book Is Structured


    The first chapter gets you started by showing you how to install a development
    environment and by getting you through writing your first program. The next few
    chapters cover the basics of how Java works, including operators, data types,
    branching and looping, and how object-oriented languages define and solve problems.
    The middle chapters detail some of the “bread and butter” tasks that software
    developers must continually do, such as working with files and their contents
    and creating a user interface for a program. Once the book gets through all that,
    it turns to some topics that are more fun (I think), such as creating animations
    and video games. The book closes with a chapter that briefly introduces two topics
    that, although somewhat advanced, may let you do good things in your own programs
    once you finish the book.


    All through the book, I include code samples that you can type into your development
    environment and run. You can also get the code from the Apress web site. I''ve
    also included lessons from my 25 years (twenty of them full-time) in software
    development. I hope those real-world experiences make the highly abstract field
    of software development more concrete for you. It pays to remember that, although
    the field is by nature theoretical, the problems we want to solve mostly exist
    in the real world.


    ### Conventions


    This book uses a number of formatting conventions that should make it easier to
    read. Formatting can''t substitute for poor writing or poor coding, but it can
    help to make either more clear. To that end, the book incorporates the following
    conventions:


    Code within other text, usually within a paragraph, appears as follows: `java.lang.System`


    Code listings appear as follows:


    ***Listing Intro-1.** Sample Code Block*


    `public static void main(String[] args) {`

    `  System.out.println("Hello, World!");`

    `}`


    Within procedures, interface items (such as buttons and menu choices) that you
    should use appear as bold text in sentences, as follows: “From the **File** menu,
    choose **New**.” The names of objects that appear within the file system (such
    as files and directories) appear in a monospace font, as follows: `C:\temp`


    I should also mention that I''ve intentionally used an informal (almost “folksy”)
    style and tone. When I''m sharing my experiences, I use the first-person singular
    (“I”). When I hope you''re doing the same thing I did when I wrote the book (usually
    writing code or thinking about a problem in a particular way), I use the first-person
    plural (“We”). When I want you to do something, I use the second-person (“You”).
    Also, I''ve made liberal use of contractions, such as “I''ve.” I hope you''ll
    find the book to be more engaging for being informal in its presentation.


    ### Prerequisites


    Before reading this book, you need to know your way around at least one operating
    system, such as Windows or Mac OS X. In particular, you need to know how to create
    and delete files on your computer. If you''ve looked into how “command” or “batch”
    files work on your computer, that would be even better, as that is a kind of light-weight
    programming.


    You don''t need any other prerequisites to read this book. You don''t need to
    know math or logic or computer science. The book covers bits and pieces of all
    those subjects at times, but in a pragmatic way that doesn''t rely on the reader
    having any existing knowledge.


    All you really need is a desire to learn to program.


    ## C H A P T E R  1'
  trans: '

    ## 关于作者


    ![image](img/jay_bryant.jpg) 我最初是一名诗人。虽然我精通写作技巧，但我发现自己缺乏“火花”。于是，我成为了一名教师。在尝试成为诗人的过程中，我获得了两个英语文学学位，自然也就教起了英语。从
    1986 年开始，我还兼职编写软件手册。


    巧合的是，我修读了大学提供的所有语言学课程，纯粹是因为我喜欢诸如转换生成语法和形态学这样的概念。有一次，我在一位开发者身后看代码时说道：“我看到了结构和语法。告诉我它是如何工作的。”菲尔·施伦普很聪明，他没有在我看他写代码时试图解释
    C 语言是如何工作的。相反，他让我去买一本布莱恩·克尼汉和丹尼斯·里奇合著的《C 程序设计语言》。在菲尔的些许指导下，我读了这本书并完成了所有练习。


    这开启了我的软件开发之旅。从那以后，我阅读了更多书籍，学习（并遗忘了一些）更多的编程语言。1991 年大学解聘我后，我继续担任技术文档工程师，并把编程作为业余爱好，直到
    1998 年，编程开始成为我工作的一部分。我对当时使用的文档工具感到不满，于是开始自己编写一些工具。在为了制作文档工具而做了更多年的编程工作后，我在 2004
    年底放弃了作为工作一部分的写作，成为了一名全职软件开发人员。我做了三年的全职 Java 和 XSLT 开发人员，然后又做了三年的全职 Java Web 应用程序开发人员。


    到这些经历结束时，我积累了足够的知识来写一本关于 Java 的书。写这本书让我学到了更多，也帮助我将已有的知识系统化。一如既往，教学（而写这类书本身就是一种教学实践）也教会了教师本人。


    写这本书也提醒我，我真的很喜欢写作。所以我找到了一份既能写作又能编程的工作。我正在编写 API 文档。也就是说，我向软件开发人员解释软件是如何工作的，以便他们能在更短的时间内完成更多工作。对于这类工作，我最喜欢的职位头衔是“编程作家”，所以现在我也这样称呼自己。


    当我不在编写软件或撰写关于软件的文章时，我会玩各种游戏（不仅仅是电脑游戏）、阅读奇幻和科幻小说，以及和朋友一起外出。我和一只名叫奥斯卡的橙色虎斑猫住在一起，它时而像猫界恐怖分子，时而像粘人小怪兽。


    ——杰伊·布莱恩特


    ## 关于技术审校


    ![image](img/massimo_nardone.jpg) ![image](img/square.jpg)**马西莫·纳尔多内**出生于维苏威火山脚下，拥有意大利萨莱诺大学的计算机科学硕士学位。他目前担任高级
    IT 安全、云和基础架构架构师，并且是 IBM 芬兰公司的芬兰发明开发团队负责人。他在移动、安全和万维网技术领域拥有超过 16 年的国内外项目经验，曾担任项目经理、软件工程师、研究工程师、首席安全架构师和软件专家。马西莫还在赫尔辛基理工大学网络实验室担任客座讲师和习题指导老师，负责“通信协议安全”课程。


    ## 引言


    ### 本书读者对象


    书名写着“面向完全初学者”。我指的是编程方面的完全初学者。我最初的读者群是青少年，我希望他们能上大学，获得数学、计算机科学或电气工程（或者技术传播或平面设计）学位，然后进入软件行业。但我很快意识到，成年人也可能希望学习编程，无论是作为职业转型的一部分、作为一种爱好，还是仅仅出于好奇。因此，我把这本书写给任何想学习编程但没有任何编程知识的人，无论其年龄或未来职业道路等其他特征如何。


    ### 本书结构


    第一章通过向你展示如何安装开发环境以及如何编写第一个程序来帮助你入门。接下来的几章涵盖了 Java 工作原理的基础知识，包括运算符、数据类型、分支和循环，以及面向对象语言如何定义和解决问题。中间章节详细介绍了软件开发人员必须不断执行的一些“日常”任务，例如处理文件及其内容以及为程序创建用户界面。在本书讲完这些内容之后，会转向一些（我认为）更有趣的主题，例如创建动画和视频游戏。本书以一章作为结尾，简要介绍了两个主题，虽然它们有些高级，但可能会让你在读完本书后在自己的程序中实现一些不错的功能。


    整本书中，我都包含了代码示例，你可以将其输入到你的开发环境中并运行。你也可以从 Apress 网站获取这些代码。我还融入了我在软件开发领域 25 年（其中
    20 年为全职）的经验教训。我希望这些现实世界的经验能让你对高度抽象的软件开发领域有更具体的认识。值得记住的是，尽管这个领域本质上是理论性的，但我们想要解决的问题大多存在于现实世界中。


    ### 排版约定


    本书使用了一些排版约定，旨在使阅读更轻松。排版不能替代糟糕的写作或糟糕的编码，但它有助于使两者更加清晰。为此，本书采用了以下约定：


    正文中的代码（通常出现在段落中）显示如下：`java.lang.System`


    代码清单显示如下：


    ***清单 引言-1.** 示例代码块*


    `public static void main(String[] args) {`

    `  System.out.println("Hello, World!");`

    `}`


    在操作步骤中，你应该使用的界面元素（如按钮和菜单选项）在句子中以粗体文本显示，如下所示：“从**文件**菜单中选择**新建**。”文件系统中出现的对象名称（如文件和目录）以等宽字体显示，如下所示：`C:\temp`


    我还应该提到，我有意使用了非正式（近乎“乡土”）的风格和语气。当我分享我的经验时，我使用第一人称单数（“我”）。当我希望你做我在写书时所做的事情时（通常是编写代码或以特定方式思考问题），我使用第一人称复数（“我们”）。当我希望你做某事时，我使用第二人称（“你”）。此外，我大量使用了缩写形式，例如“I''ve”。我希望你会发现这本书因其非正式的呈现方式而更具吸引力。


    ### 先决条件


    在阅读本书之前，你需要至少熟悉一种操作系统，例如 Windows 或 Mac OS X。特别是，你需要知道如何在你的计算机上创建和删除文件。如果你了解过计算机上的“命令”或“批处理”文件是如何工作的，那就更好了，因为那是一种轻量级的编程。


    阅读本书不需要任何其他先决条件。你不需要了解数学、逻辑或计算机科学。本书有时会涉及所有这些学科的零散知识，但都是以一种务实的方式，不依赖于读者具备任何现有知识。


    你真正需要的只是学习编程的渴望。


    ## 第 1 章

