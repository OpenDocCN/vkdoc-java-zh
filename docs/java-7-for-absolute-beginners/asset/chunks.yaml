- fmt: "# Avoid Overly Complex Code\n\nThere's an old joke in which one person writes,\
    \ “Simplify!” and someone else rewrites it as “Eschew Obfuscation.” Coding is\
    \ a lot like writing in some ways (in fact, we enjoy both because of the similarities).\
    \ One such way is that you often have choices about how to do things. Although\
    \ it might be a fun challenge to see how complex you can make a line, you should\
    \ avoid coding that way. Your fellow developers will thank you, and you'll thank\
    \ yourself when you come back to an old project, if your code is as readable as\
    \ possible. Let's consider an example in [Listing 2-4](#Chapter02.html#list_2_4):\n\
    \n***Listing 2-4**. Dense code*\n\n```\nsomeValue = someMethodToGetABooleanValue()\
    \ != someOtherMethodToGetABooleanValue() ?  \n  someMethodToDoSomething() : someMethodToDoSomethingElse();\n\
    ```\n\nThe issue here is density. The previous line has too much meaning in one\
    \ place. So let's rewrite it into simpler code in [Listing 2-5](#Chapter02.html#list_2_5).\n\
    \n***Listing 2-5**. Simplified code example*\n\n```\nboolean firstBooleanValue\
    \ = someMethodToGetABooleanValue();\nboolean secondBooleanValue = someOtherMethodToGetABooleanValue();\n\
    \nif (firstBooleanValue != secondBooleanValue) {\n         someMethodToDoSomething();\n\
    } else {\n         someMethodToDoSomethingElse();\n}\n```\n\nDon't worry about\
    \ the details. Just consider the structure. We get to the meaning of all these\
    \ bits and pieces later in this chapter and the next chapter.\n\nNotice that the\
    \ simplified code is much longer. Rather than one line of code (on two lines of\
    \ the file), the simplified code occupies eight lines of code. Simplification\
    \ definitely has a cost (making you scroll more to read it). However, it's far\
    \ more readable. You (and your fellow developers) can understand it quickly, where\
    \ you (probably) have to stop and puzzle out the meaning of the single, dense\
    \ line.\n\nSome developers would say that we over-simplified the code. They'd\
    \ point out that the two `boolean` variables don't really help (the methods that\
    \ return those values could be in the `if`) and that the braces are unnecessary\
    \ (you don't need braces for `if` and `else` if the block belonging to each is\
    \ only one line long). Those things are true. The code would look something like\
    \ [Listing 2-6](#Chapter02.html#list_2_6).\n\n***Listing 2-6.** Moderately simplified\
    \ code*\n\n```\nif (someMethodToGetABooleanValue() != someOtherMethodToGetABooleanValue())\n\
    \         someMethodToDoSomething();\nelse\n         someMethodToDoSomethingElse();\n\
    ```\n\nThe issue here is one of style. Individual developers have their own thresholds\
    \ for when code is too complex (that is, when the information is too dense). Some\
    \ folks like it really complex and see nothing wrong with the original line, whereas\
    \ others like to have every little thing broken out. To the computer, it doesn't\
    \ matter. So this is a purely human issue.\n\nYou find that developers get serious\
    \ about coding style. In fact, some of the most serious disagreements we've seen\
    \ in the software development community have been about coding style. As a beginner,\
    \ your best bet is to keep things simple and avoid overly dense code. Eventually,\
    \ you'll develop your own threshold for what's too complex.\n\n## Package Declaration\n\
    \nLet's start at the top, with the package declaration:\n\n```\n         package\
    \ com.bryantcs.examples.syntaxExample;\n```\n\nThat line says this class belongs\
    \ to a particular package. A package can contain any number of classes and interfaces.\
    \ As you develop more complex programs, you'll want to divide your classes and\
    \ interfaces into groups, so that you can more easily find any given class or\
    \ interface. For example, in web applications, it's common to divide the classes\
    \ that talk to the database (the data layer) from the classes that make web pages\
    \ for the users (the presentation layer). (Those kinds of applications generally\
    \ have a middle layer, too, where the data gets transformed into meaningful information\
    \ for the user.)\n\nAnother good reason for multiple packages is so that separate\
    \ packages can contain classes with the same name. For example, the standard Java\
    \ libraries contain `java.util.Date` (which is in this example) and `java.sql.Date`.\
    \ They each do slightly different things (for example, they have different ways\
    \ of formatting dates). If they were in the same package, only one could be called\
    \ `Date`.\n\n![images](images/square.jpg) **Note** Package declarations are optional;\
    \ however, they are a good idea. Even if you develop only as a hobby, you want\
    \ to keep your projects separate from one another.\n\nBy convention, the package\
    \ declaration follows a particular format. Although not strictly Java syntax (a\
    \ program can work without it), most Java developers think ill of you if you don't\
    \ follow the format. It's easiest to unravel this format by working from right\
    \ to left:\n\n*   `syntaxExample` indicates the local name of the package. `AverageTest`\
    \ is a simple application and so had just the one package.\n*   `examples` indicates\
    \ the parent package for the local package. We keep all of the examples for this\
    \ book in the `examples` package.\n*   `com.bryantcs` is the identifier for all\
    \ of the applications, to keep them separate from those of other people when they\
    \ get out on the Internet. After all, many people are likely to have an `examples`\
    \ package, and someone else might even have an `examples.syntaxExample` package.\
    \ Package declarations often look like reverse URLs. You might expect to see something\
    \ like `bryantcs.com/examples/syntaxExample` (but don't visit that site; it doesn't\
    \ exist). As we see next, the domain portion (`com.bryantcs`) provides the final\
    \ bit of insurance that our class is unique.\n\n`com.bryantcs` prevents the troubles\
    \ that arise from having two packages with the same name. By convention, this\
    \ part of the package name is done in reverse, because the domain name is more\
    \ specific than the domain category name, and package names should work from less\
    \ specific on the left to more specific on the right. Thus, when reading from\
    \ left to right, we get the domain category (`com`), the domain (`bryantcs`),\
    \ the kind of application (`examples`), and finally the name of the innermost\
    \ package (`syntaxExample`). The first two (`com.bryantcs`) are part of the standard\
    \ Java naming convention. The last two (`examples.syntaxExample`) are just our\
    \ own convention for keeping the programs from getting tangled up with one another.\n\
    \nHere's another example of a package declaration:\n\n```\n         org.apache.fop\n\
    ```\n\nThat refers to the FOP (Formatting Objects Processor) project at `apache.org`.\
    \ (Apache is a leading provider of open-source software and a great place to get\
    \ involved as a Java developer or tester.)\n\nPackage names can be much longer,\
    \ because they grow to indicate packages within packages (within packages, and\
    \ so on). Here's a longer example from the FOP project:\n\n```\n         org.apache.fop.fo.pagination.bookmarks\n\
    ```\n\nThat one refers to the `bookmarks` package, which is within the `pagination`\
    \ package, which is within the `fo` package, which is within the `fop` package.\
    \ Packages nested several levels deep is a common practice in commercial projects.\
    \ Few useful applications can reasonably fit into just one package.\n\nYou can\
    \ include code from other people's projects (and your own existing projects) by\
    \ including the package in which the code you want used resides. This mechanism\
    \ enables developers to share code and lets one company write (and charge money\
    \ for) code that other companies use."
