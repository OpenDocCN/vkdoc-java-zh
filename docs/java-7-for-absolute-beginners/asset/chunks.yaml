    #### 代码块


    *代码块*是通常由多行代码组成的单元，通过花括号（`{}`）来界定。（花括号有几种不同的叫法，有些叫法可能比较牵强。为了保持全书一致，我将其统称为花括号。）


    花括号为方法、类以及各种语句（例如`if`和`for`）定义了代码块。让我们来看一个来自 清单 2-16 中 AverageImpl 类的简单代码块：


    ***清单 2-16.** 一个简单的代码块*


    `    for (int i = 0; i < ints.length; i++) {`

    `      result += ints[i];`

    `    }`


    静态代码块 *静态代码块*是一种便捷的代码片段，允许你定义一个代码块，并将其包含在每个构造函数中。让我们通过 清单 2-17 中的一个示例（以另一个类的形式）来了解。


    ***清单 2-17**. 静态代码块示例*


    `package com.bryantcs.examples;`


    `public class StaticBlockClass {`


    `        private static String name;`

    `        private String whichOne;`


    `        static {`

    `                name = "StaticBlockClass";`

    `        }`

    `        public StaticBlockClass(int identifier) {`

    `                whichOne = Integer.toString(identifier);`

    `        }`


    `        public StaticBlockClass(String identifier) {`

    `                whichOne = identifier;`

    `        }`


    `}`


    如你所见，我们设置的字段也必须是静态的。不过，因为我们不想改变它，所以这也没问题。在这个例子中，使用静态代码块并没有带来太多好处。但是，想象一下，如果我们有十个值需要设置，并且有四个构造函数。


    除了节省空间（尽管在这个例子中并非如此），静态代码块真正的价值在于确保类所需的一切都能进入每个构造函数。如果某些构造函数中设置了某些内容而其他构造函数没有，就可能导致错误，而静态代码块可以帮助你管理这个问题。


    #### 注释


    *注释*是通常纯粹供人类阅读的代码行。编译器会完全忽略注释。Java 支持两种风格的注释：行尾注释和块注释。我提供的代码示例中有许多行尾注释。*行尾注释*以两个斜杠字符（`//`）开头，如下所示：


    `// 行尾注释，恰好是该行唯一的内容`


    行尾注释也可以在该行其他代码之后开始，如下所示：


    `int counter = 0; // 初始化计数器`


    代码不能跟在行尾注释的同一行后面，否则它会成为注释的一部分。


    *块注释*以斜杠加星号（`/*`）开头，以星号加斜杠（`*/`）结尾。块注释可以在一行内，也可以由多行组成。块注释可以与其他代码在同一行开始。实际上，块注释可以出现在同一行代码元素之间（这可能导致该行代码在文件中由多行组成）。一如既往，示例会有所帮助。以下是一个单独占一行的块注释：


    `/* 注释 */`


    以下是一行中间带有注释的代码：


    `int counter /* 注释 */ = 0;`


    请不要这样做。这在语法上是合法的，但却是糟糕的编程实践，因为它会使代码更难阅读。


    现在让我们来看 清单 2-18 中的多行块注释。


    ***清单 2-18**. 多行块注释*


    `/* 现在是所有优秀程序员编写有意义注释的时候了，`

    `这样我们其他人才能理解代码在做什么。 */`


    清单 2-19 展示了另一个与代码混合的多行块注释。


    ***清单 2-19**. 多行块注释中的不良风格*


    `int counter /*`

    `请不要`

    `这样做 */ = 0;`


    按照惯例（我打破这个惯例是为了给你提供你不应模仿的示例），多行注释应将注释开头（`/*`）单独放在一行，注释结尾（`*/`）单独放在一行，并且中间每一行都以星号开头，如
    清单 2-20 所示。


    ***清单 2-20**. 格式正确的多行块注释*


    `/*`

    ` * 现在是所有优秀程序员编写有意义注释的时候了，`

    ` * 这样我们其他人才能理解代码在做什么。`

    ` * 现在这个注释的格式也正确了。`

    ` */`


    这样更容易阅读，不是吗？


    **JAVADOC**


    Java 包含一种从类和接口内部生成文档的机制。这种机制称为 Javadoc，它使用一种特殊的块注释（这里是一种既供人类阅读也供系统读取的注释）。Javadoc
    注释以斜杠加两个星号（`/**`）开头，以星号加斜杠（`*/`）结尾，与块注释非常相似，只是在起始语法中多了一个星号。注释的内容最终会出现在 Javadoc
    工具创建的文档中。按照惯例，任何供公共使用的类都应该在类及其所有可能被他人使用或扩展的方法（通常是 public 和 protected 方法）上添加 Javadoc
    注释。


    当 Javadoc 工具运行时，它会检查所有的类和接口，并创建一组 HTML 页面（或根据各种设置生成其他输出），这些页面包含与程序中的类、接口和方法相对应的标题和子标题。各种标记帮助
    Javadoc 工具指示参数和返回值的描述、Javadoc 注释的作者以及其他特殊内容。


    当你为自己编写程序时，不需要插入 Javadoc 注释。如果你开始为开源项目或公司编写代码，可能会被要求向代码中添加 Javadoc 注释。


    清单 2-21 展示了一个 Javadoc 注释及其所描述的方法声明的示例。


    ***清单 2-21**. 一个方法的 Javadoc 注释*


    `  /**`

    `   * 此方法使 Cat 对象追逐给定的 Mouse 对象。`

    `   * @param mouse 一个 Mouse 类的实例，供我们的猫追逐`

    `   */`

    `  void chase(Mouse mouse) {`


    因为你可能暂时还不需要创建 Javadoc，我们就先讲到这里。当你需要了解更多信息时，可以在 [`http://www.oracle.com/technetwork/java/javase/documentation/index-jsp-135444.html`](http://www.oracle.com/technetwork/java/javase/documentation/index-jsp-135444.html)
    找到 Javadoc 工具的主页。


    ### 本章小结


    那么，我们在本章学到了什么？


    我们讨论了：


    *   Java 文件的结构，了解了语句和声明

    *   构成 Java 程序的组件（类和接口）

    *   构成类和接口的组件（方法、字段、构造函数、代码块和注释）

    *   Javadoc 的基础知识


    关于我们在单一章节中涵盖的内容，已经可以写出整本书，但对于初学者来说，那些书可能过于枯燥。我认为学习基础知识，然后处理文件、创建动画以及制作自己的视频游戏会更有趣。我们将在本书的后续部分完成所有这些内容。我建议你重读本章，并在阅读过程中思考你从本章后面部分学到的东西。我还建议你停下来自己做一些简单的编程练习。尝试一些简单的事情，例如编写一个打印小型乘法表（比如到
    4 x 4）的程序，以及一个接受多个字符串作为参数并以有趣方式组合它们的程序。没有什么比亲自动手实践更能让你学到东西了。


    ## 第 3 章


    ## 数据类型


    大多数编程语言都有数据类型。Java 有几种数据类型。数据类型的第一个特征是它是基本类型还是对象类型。任何不是基本类型的东西都是某种对象。

