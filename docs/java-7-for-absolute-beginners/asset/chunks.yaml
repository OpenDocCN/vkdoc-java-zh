- fmt: "# About the Author\n\n![image](images/jay_bryant.jpg) I started as a poet.\
    \ I discovered that I had no “spark,” though I was good enough at the mechanics.\
    \ So I became a teacher. Having gotten two degrees in English literature while\
    \ trying to be a poet, I naturally taught English. Starting in 1986, I also worked\
    \ part-time writing software manuals.\n\nAs it happened, I had taken all the linguistics\
    \ courses the university offered, purely because I enjoy concepts such as transformational\
    \ grammar and morphology. When I was looking at code over a developer's shoulder,\
    \ I said, “I see structure and syntax here. Tell me how it works.” Phil Schlump\
    \ was smart enough to not try to explain how C works while I looked over his shoulder.\
    \ Instead, he told me to buy *The C Programming Language*, by Brian Kernighan\
    \ and Dennis Ritchie. I read the book and did all the exercises, with a little\
    \ coaching from Phil.\n\nThat got me started on my journey toward software development.\
    \ From there, I read many more books and learned (and have forgotten some) more\
    \ languages. When the university let me go in 1991, I continued on as a technical\
    \ writer who programmed as a hobby until 1998, when I started writing code as\
    \ part of my job. I was annoyed with the documentation tools I had, so I started\
    \ writing some of my own. After a few years of doing even more programming to\
    \ make documentation tools, I gave up writing as part of my job and became a full-time\
    \ software developer in late 2004. I worked full-time as a Java and XSLT developer\
    \ for three years and then full time as a Java Web Application Developer for three\
    \ years.\n\nBy the end of those experiences, I knew enough to write a book about\
    \ Java. Writing this book has taught me some more and helped to formalize the\
    \ knowledge I already had. As ever, the act of teaching (and writing this kind\
    \ of book is an exercise in teaching) also teaches the teacher.\n\nWriting this\
    \ book also reminded me that I really like writing. So I've taken a job that lets\
    \ me both write and code. I'm writing API documentation. That is, I explain how\
    \ software works to software developers, so that they can get more done in less\
    \ time. The job title I like best for this sort of work is Programming Writer,\
    \ so that's what I call myself these days.\n\nWhen I'm not writing software and\
    \ writing about software, I play games of all sorts (not just computer games),\
    \ read fantasy and science fiction, and go out with friends. I live with an orange\
    \ tabby cat named Oscar who alternates between feline terrorist and snugglemonster.\n\
    \nJay Bryant\n\n# About the Technical Reviewer\n\n![image](images/massimo_nardone.jpg)\
    \ ![image](images/square.jpg) **Massimo Nardone** was born under Mount Vesuvius\
    \ and holds a Master of Science Degree in Computing Science from the University\
    \ of Salerno, Italy. He currently works as a Senior IT Security, Cloud and Infrastructure\
    \ Architect, and is the Finnish Invention Development Team Leader (FIDTL) for\
    \ IBM Finland. With more than 16 years of experience in Mobile, Security, and\
    \ WWW technology areas for both national and international projects, he has worked\
    \ as a Project Manager, Software Engineer, Research Engineer, Chief Security Architect,\
    \ and Software Specialist. Massimo is also a visiting lecturer and supervisor\
    \ for exercises at the Networking Laboratory of the Helsinki University of Technology\
    \ (TKK) for the course “Security of Communication Protocols”.\n\n# Introduction\n\
    \n## Who This Book Is For\n\nThe title says “for Absolute Beginners.” By that,\
    \ I mean absolute beginners at programming. My original audience was teenagers\
    \ whom I hope will go to college, get degrees in Mathematics, Computer Science,\
    \ or Electrical Engineering (or perhaps Technical Communication or Graphic Design),\
    \ and then enter the software industry. However, I quickly realized that adults\
    \ might also wish to learn to program, as part of changing careers, as a hobby,\
    \ or simply out of curiosity. As a result, I've written the book for anyone who\
    \ wants to learn to program but doesn't have any programming knowledge, regardless\
    \ of other characteristics such as age or future career paths.\n\n## How This\
    \ Book Is Structured\n\nThe first chapter gets you started by showing you how\
    \ to install a development environment and by getting you through writing your\
    \ first program. The next few chapters cover the basics of how Java works, including\
    \ operators, data types, branching and looping, and how object-oriented languages\
    \ define and solve problems. The middle chapters detail some of the “bread and\
    \ butter” tasks that software developers must continually do, such as working\
    \ with files and their contents and creating a user interface for a program. Once\
    \ the book gets through all that, it turns to some topics that are more fun (I\
    \ think), such as creating animations and video games. The book closes with a\
    \ chapter that briefly introduces two topics that, although somewhat advanced,\
    \ may let you do good things in your own programs once you finish the book.\n\n\
    All through the book, I include code samples that you can type into your development\
    \ environment and run. You can also get the code from the Apress web site. I've\
    \ also included lessons from my 25 years (twenty of them full-time) in software\
    \ development. I hope those real-world experiences make the highly abstract field\
    \ of software development more concrete for you. It pays to remember that, although\
    \ the field is by nature theoretical, the problems we want to solve mostly exist\
    \ in the real world.\n\n## Conventions\n\nThis book uses a number of formatting\
    \ conventions that should make it easier to read. Formatting can't substitute\
    \ for poor writing or poor coding, but it can help to make either more clear.\
    \ To that end, the book incorporates the following conventions:\n\nCode within\
    \ other text, usually within a paragraph, appears as follows: `java.lang.System`\n\
    \nCode listings appear as follows:\n\n***Listing Intro-1.** Sample Code Block*\n\
    \n```\npublic static void main(String[] args) {\n  System.out.println(\"Hello,\
    \ World!\");\n}\n```\n\nWithin procedures, interface items (such as buttons and\
    \ menu choices) that you should use appear as bold text in sentences, as follows:\
    \ “From the **File** menu, choose **New**.” The names of objects that appear within\
    \ the file system (such as files and directories) appear in a monospace font,\
    \ as follows: `C:\\temp`\n\nI should also mention that I've intentionally used\
    \ an informal (almost “folksy”) style and tone. When I'm sharing my experiences,\
    \ I use the first-person singular (“I”). When I hope you're doing the same thing\
    \ I did when I wrote the book (usually writing code or thinking about a problem\
    \ in a particular way), I use the first-person plural (“We”). When I want you\
    \ to do something, I use the second-person (“You”). Also, I've made liberal use\
    \ of contractions, such as “I've.” I hope you'll find the book to be more engaging\
    \ for being informal in its presentation.\n\n## Prerequisites\n\nBefore reading\
    \ this book, you need to know your way around at least one operating system, such\
    \ as Windows or Mac OS X. In particular, you need to know how to create and delete\
    \ files on your computer. If you've looked into how “command” or “batch” files\
    \ work on your computer, that would be even better, as that is a kind of light-weight\
    \ programming.\n\nYou don't need any other prerequisites to read this book. You\
    \ don't need to know math or logic or computer science. The book covers bits and\
    \ pieces of all those subjects at times, but in a pragmatic way that doesn't rely\
    \ on the reader having any existing knowledge.\n\nAll you really need is a desire\
    \ to learn to program.\n\n# C H A P T E R  1"
