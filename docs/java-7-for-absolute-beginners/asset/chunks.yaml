    ### 不存在的类型：null


    Java 包含一个不代表任何东西的值：`null`。它指向一个尚未分配的内存地址。用 Java 的术语来说，这意味着它指向一个尚未创建的对象或基本类型。正如我在“数组”部分提到的，当你创建一个数组而不指定其值时，你实际上是在创建一个由
    `null` 值组成的集合。这些值没有内存地址，也没有对应的基本类型或对象，因此它们是 `null`。这听起来可能是个问题，而 `null` 的整个概念也常常给新手程序员带来一些麻烦。你可以通过记住
    `null` 是一个不存在的引用来理清这个概念。


    经常被诟病的 `null` 也有其用途（否则它就不会存在——程序员大多是务实的人）。例如，我们经常将对象与 `null` 进行比较，以确保在尝试使用某个对象之前它确实存在。如果图形库本应给我们一个
    `Color` 类型的对象，但我们却得到了 `null`，那就出问题了。因此，我们可能会将该 `Color` 值与 `null` 进行比较，以确保我们得到了一个
    `Color` 对象，如果没有，则执行一些有用的操作（例如尝试其他方法，或至少记录一个错误）。


    此外，在一个地方创建变量并在另一个地方赋值也是一种常见做法。在创建和赋值之间，该变量的值可能是 `null`（也可能不是 `null`，因为某些基本类型（如
    `int`）有默认值）。这种技术很方便，因为我们可能希望根据某些逻辑为变量赋予不同的值。例如，一系列 `if-else` 语句或一个 `switch` 语句可能包含为变量赋值的代码。让我们考虑一个小例子（来自扫雷游戏），如清单
    3-10 所示。


    ***清单 3-10.** 使用 null 值*


    `public getMineIcon(int x, int y) {`


    `// x 和 y 是游戏网格中的位置`

    `  int numberOfAdjacentMines = getNumberOfAdjacentMines(x, y);`


    `  MineIcon mineIcon = null; // 这里是我们的 null`

    `  if (numberOfAdjacentMines == 1) {`

    `    mineIcon = new MineIcon(1);`

    `  } else if (numberOfAdjacentMines == 2) {`

    `    mineIcon = new MineIcon(2);`

    `  }`

    `  // 以此类推，直到 8`


    `  return mineIcon;`

    `}`


    在这种情况下，我们可以假设存在一个 `MineIcon` 类，并且它的构造函数接受两个整数值，并返回一个显示该整数参数值的图标（一种图像类型）。因为扫雷游戏中的一个方格最多只能有八个相邻地雷，所以我们最多处理到八。我们还让该方法返回
    `null`，以表示一个方格没有相邻地雷的情况。因此，调用此方法的代码必须知道如何处理 `null` 值。碰巧的是，我们需要使用的 `setIcon` 方法接受
    `null` 参数，以此表示不需要设置图标。


    我们在第 7 章“创建用户界面”中创建了一个完整的扫雷程序。届时，你会看到另一种设置地雷图标的方法，但它仍然使用了 `null` 引用。现在，只需记住 `null`
    只是另一个值（尽管是一个表示不存在的引用的特殊值），并且它可以用于检查缺失对象之外的其他目的。


    ### 枚举


    *枚举*（通常写作“enum”）是一种由固定数量的常量组成的数据类型。例如，如果你正在编写一个涉及导航的游戏，你可能需要一个枚举来定义四个基本方向，类似于清单
    3-11 所示。


    ***清单 3-11**. 方向的枚举*


    `public enum Direction {`

    `    NORTH, EAST, SOUTH, WEST;`

    `}`


    如清单 3-11 所示，枚举的声明包括 `enum` 关键字、枚举的名称以及构成枚举的值。这些值只是名称，本身没有类型。这样可行，是因为我们需要唯一的标识符，但不需要为每个标识符指定类型。


    枚举的价值在于它们是类型安全的（这意味着它不会与其他类型混淆——过去枚举是用整数创建的，因此将枚举与整数混淆是一个真正的问题）。如果没有枚举，我们就必须用另一种方式设置常量——通常使用整数，如清单
    3-12 所示。


    ***清单 3-12.** 定义方向的常量*


    `public static final int NORTH = 0;`

    `public static final int EAST = 1;`

    `public static final int SOUTH = 2;`

    `public static final int WEST = 3;`


    ![images](img/square.jpg) **警告** 不要以这种方式编写常量集合。它们可以与 int 值进行比较，而这几乎肯定是错误的做法。这就是
    Java 有枚举的原因。枚举值 `Direction.NORTH` 不能被当作整数处理（即使是无意的），而常量 `NORTH` 却可以。此外，常量是静态和最终的（并且通常是公开的）。枚举消除了对这些修饰符的需求，这使我们在使用枚举时具有更大的灵活性。


    每个 `enum` 实际上都是一个类。（你可能已经注意到它的声明语法与类相似。）所有 `enum` 对象都隐式地扩展了 `java.lang.Enum`。这使我们能够创建比常量列表更有意义的枚举。继续我们的例子，我们可以为每个方向设置角度，如清单
    3-13 所示。


    ***清单 3-13**. 包含更多信息的枚举*


    `public enum Direction {`

    `  NORTH (0),`

    `  EAST (90),`

    `  SOUTH (180),`

    `  WEST (270);`


    `  private final int degrees;`

    `  Direction(int degrees) {`

    `    this.degrees = degrees;`

    `  }`


    `  public int getDegrees() {`

    `    return degrees;`

    `  }`

    `}`


    由此，我们可以编写代码来获取与枚举中每个值相关的附加信息，如清单 3-14 所示。


    ***清单 3-14**. 从枚举中获取详细信息*


    `for (Direction d : Direction.values()) {`

    `  System.out.println(d + " is " + d.degrees + "degrees.");`

    `}`


    我们还可以编写处理枚举值的方法。例如，我们可以编写一个方法，给定一个以度为单位的方向，告诉你哪个基本方向最接近。清单 3-15 展示了编写此类方法的一种方式。


    ***清单 3-15**. findCardinalDirection 方法*


    `public static Direction findCardinalDirection (int degrees) {`

    `  if (degrees < 45) {`

    `    return NORTH;`

    `  } else if (degrees < 135) {`

    `    return EAST;`

    `  } else if (degrees < 225) {`

    `    return SOUTH;`

    `  } else if (degrees < 315) {`

    `    return WEST;`

    `  } else {`

    `    return NORTH;`

    `  }`

    `}`


    你可能还注意到了遍历 for 循环的不同语法。这种语法并非枚举独有，但对枚举特别方便。我们将在后续章节讨论循环时介绍这些 `for` 循环的替代用法。


    如你所见，枚举远比简单的常量列表强大得多。它也更为安全，因为没有人会将 `Direction.North` 与 `0` 混淆。


    清单 3-16 展示了 `Direction` 枚举的完整代码。


    ***清单 3-16**. 完整的枚举示例*


