    Swing. They probably call it `JOptionPane` because it has a bunch of different
    options. If you examine the JavaDoc for `JOptionBox`, you see that it has a number
    of constructors, each of which creates a different kind of dialog box. For this
    case, we want a box with a message, a Yes button, a No button, and the capability
    to let us know which button the player clicked. To do all that, we create a String
    object to hold the message (either “You won!” or “You lost.”) and define an int
    value to hold the return value of the `JOptionPane` object. The return value indicates
    which button the user clicked, with 0 being “Yes” and 1 being “No.” Finally, if
    the user chose “No” (return value of 1), we exit the program with an exit code
    of 0 (which means the program shut down normally, rather than as the result of
    an error). If the user chose “Yes,” we call the `newGame` method, which is the
