    has a constructor that it uses to get an instance of the `MineSweeper` class.
    It also gets an instance of the `MineSweeperHelper` class. Both of those classes
    need to listen for mouse clicks, so the `MineSweeperMouseListener` class has to
    have instances of both classes. The only other method that does anything is the
    `mouseReleased` method. As we learn earlier, using the `mouseReleased` method
    is more reliable than using the `mouseClicked` method, thanks to the problem of
    mouse motion wiping out the click event.


    The `mouseClicked` method runs through all the buttons until it finds the button
    on which the player clicked. If the player clicked the left mouse button, the
    method calls the `resolveClick` method in the `MineField` class to see whether
    the player hit a mine. If not, the `resolveClick` method figures out whether the
    game is over (because the player won or lost) or the game should continue. If
    the user clicked any other button (most likely the right button), this method
    still calls the `resolveClick` method, but with the button flag indicating that
    a button other than the left button was clicked. The `resolveClick` method then
    toggles the mine, suspect, and unknown icons on that location. Finally, the `mouseClicked`
    method uses the value returned by the `resolveClick` method to end the game (the
    player won or lost) or continue the game. If the game didn''t end, we update the
    buttons in the minefield. Finally, once all the other processing has been done,
    the `mouseClicked` method updates the labels.


    The `MineSweeperMouseListener` class isn''t complex, but it is worth moving this
    functionality into its own class, to simplify the `MineSweeper` class. It also
    follows the design principle that each object should have a clear purpose. In
    this case, we create a class with the clear mission of listening for clicks in
    the minefield, and removing that functionality (and moving other bits to other
    classes) lets the MineSweeper focus purely on showing the user interface.


