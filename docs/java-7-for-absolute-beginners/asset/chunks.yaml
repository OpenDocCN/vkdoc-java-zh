    `    // First, get the date as seconds since 1/1/1970`

    `    // Note that a Date object also contains time information`

    `    Date now = new Date();`

    `    // Second, create a formatter object`

    `    SimpleDateFormat formatter =`

    `      new SimpleDateFormat("EEE, MMM dd, yyyy HH:mm:ss");`

    `    // Third, apply the formatter to the date`

    `    String formattedDate = formatter.format(now);`

    `    // Finally, add our formatted date to our output`

    `    System.out.println(formattedDate + "> Hello, " + args[0] + "!");`

    `  }`


    `}`


    When you run this program, you''ll see a date and time stamp before your other
    output.


    #### About Java Objects


    Notice how we had to use two kinds of objects (`Date` and `SimpleDateFormat`)
    to create a nicely formatted date. `Date` and `SimpleDateFormat` are defined by
    class files, just as your Hello program is defined by a class file. We told our
    Java program where to find those classes with the import statement near the top
    of the file. Your program cannot run without them, so we have to tell Java where
    to find them.


    For any class or other bit of code that''s part of the Java standard libraries,
    you can learn all about it from the Javadoc that Oracle maintains for each version
    of Java. Javadoc is a special document format that lets Java programmers embed
    documentation directly into code. That way, you can look at the documentation
    for classes you want to use as you program your own classes. As you do more programming,
    you''ll spend a lot of time reading this documentation. As a good learning exercise,
    look up the `SimpleDateFormat` class and look at all the options you can use when
    formatting a date.


    For Java 7, you can find the API (short for Application Programming Interface)
    documentation at [http://download.oracle.com/javase/7/docs/api/](http://download.oracle.com/javase/7/docs/api/).


    ![images](images/square.jpg) **Note** Eclipse provides the Javadoc information
    for items in the standard API. Hover your mouse over any method or object that
    you''re using, and you''ll see the Javadoc information for that item. When you
    see the Javadoc, press **F2** to open a separate window that lets you see more.


    ### Summary


    In this chapter, we did the following tasks:


    *   Downloaded and installed the Java Development Kit

    *   Downloaded and installed Eclipse, which we use to write Java programs

    *   Created the code for our first program within Eclipse

    *   Ran our first program (“Hello, world!”)

    *   Modified the first program to do a bit more (say hello to you specifically)

    *   Modified the program still more (to include the date and time)

    *   Learned where to find more information about the other code used in future
    programs


    Many of these tasks constitute the day-to-day work of full-time software developers.
    We spend a lot of time (more than we''d like, usually) setting up tools. We also
    spend most of our time either writing new classes or (far more often) rewriting
    existing classes, either to add new functionality or to correct a problem. We
    also certainly spend plenty of time reading documentation or wishing we had more
    documentation to read.


    I guarantee that you''ll find yourself returning to these tasks many, many times
    if you stick with software development, whether as a hobby or as a profession.
    You''ll also do some of these tasks (especially writing and modifying code) as
    you work your way through this book. I hope you find it to be fun. I usually do.


    ## C H A P T E R  2


    ## Java Syntax


    The syntax of any language is the rules that any speaker of the language follows
    so that other speakers of that language can understand. In other words, syntax
    is a set of rules that all the speakers of a language agree to follow so that
    they can communicate. If you violate the rules, people listening to you are either
    going to ask, “Huh? What?” or think you''re being silly (which might be appropriate
    in some settings but will often cause a problem).


    Computer languages work in much the same way, except that they''re never spoken
    (though I won''t be surprised to see, or should I say hear, oral programming languages
    someday). If you decide to do your own thing, don''t be surprised when your computer
    doesn''t do what you had in mind. If you fail to code clearly and follow the rules
    of your programming language, all you''ll get is confusion, though your computer
    will generate error messages rather than say, “Huh? What?”


    Java gets most of its syntax from another language called C++. C++ in turn gets
    most of its syntax from C. And C was influenced by other languages. The people
    who created Java chose C++ as the basis for Java''s syntax because C++ was one
    of the most widely used languages at the time, and that gave many developers some
    familiarity with Java syntax. Java''s success (it''s now widely used) depends
    on many factors, but adopting an already widely known syntax certainly didn''t
    hurt.'
