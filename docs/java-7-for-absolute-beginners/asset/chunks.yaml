    Before you get to processing the stuff, you should see what XML looks like and
    learn a bit about its nature. First off, know that XML, while called a language,
    isn''t a language in the same sense as Java. XML is a storage format, and it offers
    no processing capabilities of its own. It has no looping structure, no way to
    specify variables or data types (except that a program might use a bit of XML
    as a variable or data type, but that''s not the same as what Java does). So, XML
    is really just text that has been organized in a particular way.


    The root of any XML document is a single element. That element can have any number
    of other elements as children, and each of these children can have any number
    of children, and so on, resulting in a hierarchical structure of arbitrary complexity
    and depth (which is to say that an XML document can be of any size and have elements
    nested to any depth). Also, each element can have any number of attributes. However,
    attributes cannot have children, so most of the content, in most XML documents,
    comes from the elements.


    Before going any further, take a look at the smallest possible XML file.


    ***Listing 9-1.** The Smallest Possible XML File*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<elementName/>`


    I have worked with systems that had many such files, as each directory in a set
    of directories meant to contain the output of a complex process had to have at
    least one file. Consequently, we had a bunch of XML files with content as follows:
    `<?xml version="1.0" encoding="UTF-8"?><placeholder/>` You can see the exact syntax
    shortly. Until then, a more meaningful example will help to clarify things. Here''s
    one of my favorite poems, encoded as an XML document.


    ***Listing 9-2**. An Example of XML*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<poem title="The Great Figure" author="William Carlos Williams">`

    `  <line>Among the rain</line>`

    `  <line>and lights</line>`

    `  <line>I saw the figure 5</line>`

    `  <line>in gold</line>`

    `  <line>on a red</line>`

    `  <line>fire truck</line>`

    `  <line>moving</line>`

    `  <line>tense</line>`

    `  <line>unheeded</line>`

    `  <line>to gong clangs</line>`

    `  <line>siren howls</line>`

    `  <line>and wheels rumbling</line>`

    `  <line>through the dark city</line>`

    `</poem>`


    The first line, the document specifier, indicates that this document is an XML
    document and specifies the version (1.0, which is the most often used version,
    and suffices for most purposes) and the encoding. Document specifiers always begin
    with <? and end with ?>. This way, they can''t be confused with XML elements.
    Most systems that can process XML will work with documents that don''t have a
    document specifier, but a document without one isn''t strictly an XML file—it''s
    just a collection of characters that happen to look like an XML file. That may
    seem like an arbitrary and trivial distinction, but your XML document may be rejected
    for just that reason by some systems, so it''s good to get in the habit of always
    including a document specifier. The encoding indicates the character set that
    applies to the content. UTF-8 is a large set that includes most of the characters
    available in non-Asian languages (including English, Greek, Spanish, Russian,
    and many others). The Asian languages (Chinese, Japanese, Vietnamese, and others)
    use pictographs (that is, an image that corresponds to a word). The Asian character
    sets are consequently very large and tricky to manipulate. For the sake of simplicity,
    we''ll stick to UTF-8 and documents in English.


    The next line contains the root element. The first element in any XML file is
    that document''s root element. All other elements, no matter how deeply nested,
    are descendants of the root. The root element, `poem`, contains two attributes,
    `title` and `author`. The root element also contains all the `line` elements,
    which make up the body of the poem.


    Note the syntax for each element. Each one begins with an opening tag (`<poem>`
    or `<line>`) and ends with a closing tag (`</poem>` or `</line>`). The basic rule
    is that the names within the tags have to match (and there are various restrictions
    about which characters can be used, but just about any English word works). Other
    than that, opening tags always start with a left angle character (`<`) and end
    with a right angle character(`>`). Ending tags always begin with a left angle
    character and a forward slash (`</`) and end with a right angle character (`>`).
    Elements can also be empty, in which case they can take one of two forms: a beginning
    tag and an ending tag with nothing between them, or a special empty element tag.
    For example, an empty line element can be represented as either `<line></line>`
    or `<line/>`. That second structure provides a handy shortcut that saves some
    typing. If the poem included a blank line (such as a line between stanzas in a
    longer poem), you could represent a blank line that way.


    ![images](images/square.jpg) **Note** XML is case-sensitive. `<POEM>`, `<Poem>`,
    and `<poem>` are all different elements, so `<POEM></poem>` would cause an XML
    parser to throw an error.


    A poem offers an example of a fairly traditional document encoded as XML. Consider
    an example of data transmitted between systems as XML.


    ***Listing 9-2**. XML As Data*


    `<?xml version="1.0"?>`

    `<soap:Envelope`


    `    soap:encodingStyle="http://www.w3.org/2001/12/soap-encoding">`

    `  <soap:Body >`

    `    <w:GetTemperature>`

    `      <w:Location>78701</w:Location>`

    `    </w:GetTemperature>`

    `  </soap:Body>`

    `</soap:Envelope>`


    Look closely at the document specifier. In this case, it doesn''t indicate encoding.
    The default encoding for XML is UTF-8, so you can omit the specifier when you
    are going to use UTF-8 characters. Then you have a root element named soap:Envelope.
    The specifier and the root element constitute the minimum content for an XML file,
    but that wouldn''t make a very useful message between systems. So this example
    also contains a bit of data (the zip code for a particular city).This XML document
    represents a request for data from one system to another system. (I invented it
    from scratch, by the way; NOAA may use something else entirely.) In particular,
    it''s a request to get the temperature in Austin, TX. Note the indentation. When
    XML is meant to be read by humans, it''s customarily indented, such that each
    level of elements is farther to the right than its parent level. When creating
    a stream to send to another system, all the white space between elements is generally
    removed, resulting in the whole document being on one line. That''s tough to read
    for a human, but it saves bandwidth, and a computer doesn''t find it hard to read.


    ![images](images/square.jpg) **Note** “Document” is the normal way to refer to
    any instance of XML, whether it encodes an actual document or some arbitrary bit
    of data—XML originally comes from the publishing industry, and it retains some
    of that industry''s terminology.'
  trans: '

    ### XML 的结构


    在开始处理 XML 内容之前，你应该先了解 XML 的外观并学习其本质。首先，要知道 XML 虽然被称为一种语言，但它与 Java 并非同一种意义上的语言。XML
    是一种存储格式，本身不提供任何处理能力。它没有循环结构，也没有指定变量或数据类型的方法（程序可能会使用少量 XML 作为变量或数据类型，但这与 Java 的做法不同）。因此，XML
    实际上只是以特定方式组织起来的文本。


    任何 XML 文档的根节点都是一个单一元素。该元素可以拥有任意数量的子元素，每个子元素又可以拥有任意数量的子元素，以此类推，从而形成任意复杂度和深度的层级结构（也就是说，XML
    文档可以是任意大小，元素可以嵌套到任意深度）。此外，每个元素都可以拥有任意数量的属性。然而，属性不能包含子元素，因此在大多数 XML 文档中，大部分内容都来自元素。


    在进一步深入之前，先来看一下最小的 XML 文件。


    ***清单 9-1.** 最小的 XML 文件*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<elementName/>`


    我曾处理过包含许多此类文件的系统，因为在一组用于存放复杂流程输出的目录中，每个目录都必须至少包含一个文件。因此，我们有一堆内容如下的 XML 文件：`<?xml
    version="1.0" encoding="UTF-8"?><placeholder/>` 稍后你将看到确切的语法。在此之前，一个更有意义的示例将有助于澄清问题。下面是我最喜欢的一首诗，编码为
    XML 文档。


    ***清单 9-2**. XML 示例*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<poem title="The Great Figure" author="William Carlos Williams">`

    `  <line>Among the rain</line>`

    `  <line>and lights</line>`

    `  <line>I saw the figure 5</line>`

    `  <line>in gold</line>`

    `  <line>on a red</line>`

    `  <line>fire truck</line>`

    `  <line>moving</line>`

    `  <line>tense</line>`

    `  <line>unheeded</line>`

    `  <line>to gong clangs</line>`

    `  <line>siren howls</line>`

    `  <line>and wheels rumbling</line>`

    `  <line>through the dark city</line>`

    `</poem>`


    第一行是文档声明，表明该文档是一个 XML 文档，并指定了版本（1.0，这是最常用的版本，足以满足大多数用途）和编码。文档声明总是以 `<?` 开头，以 `?>`
    结尾。这样，它们就不会与 XML 元素混淆。大多数能够处理 XML 的系统都可以处理没有文档声明的文档，但严格来说，没有文档声明的文档并不是一个 XML 文件——它只是一组看起来像
    XML 文件的字符集合。这似乎是一个武断且微不足道的区别，但你的 XML 文档可能仅仅因为这个原因而被某些系统拒绝，因此最好养成始终包含文档声明的习惯。编码指明了适用于内容的字符集。UTF-8
    是一个大型字符集，包含了大多数非亚洲语言（包括英语、希腊语、西班牙语、俄语等）中可用的字符。亚洲语言（中文、日文、越南语等）使用表意文字（即与词语对应的图像）。因此，亚洲字符集非常庞大且难以处理。为简单起见，我们将坚持使用
    UTF-8 和英文文档。


    下一行包含根元素。任何 XML 文件中的第一个元素就是该文档的根元素。所有其他元素，无论嵌套多深，都是根元素的后代。根元素 `poem` 包含两个属性：`title`
    和 `author`。根元素还包含了构成诗歌正文的所有 `line` 元素。


    注意每个元素的语法。每个元素都以一个开始标签（`<poem>` 或 `<line>`）开头，并以一个结束标签（`</poem>` 或 `</line>`）结尾。基本规则是标签内的名称必须匹配（关于可以使用哪些字符有各种限制，但几乎任何英文单词都可以）。除此之外，开始标签总是以左尖括号（`<`）开头，以右尖括号（`>`）结尾。结束标签总是以左尖括号和斜杠（`</`）开头，以右尖括号（`>`）结尾。元素也可以是空的，此时它们可以采用两种形式之一：一个开始标签和一个结束标签，中间没有任何内容；或者一个特殊的空元素标签。例如，一个空的
    line 元素可以表示为 `<line></line>` 或 `<line/>`。第二种结构提供了一个方便的快捷方式，可以节省一些输入。如果这首诗包含一个空行（例如较长诗歌中节与节之间的行），你可以用这种方式表示空行。


    ![images](img/square.jpg) **注意** XML 是区分大小写的。`<POEM>`、`<Poem>` 和 `<poem>` 都是不同的元素，因此
    `<POEM></poem>` 会导致 XML 解析器抛出错误。


    一首诗提供了一个相当传统的文档编码为 XML 的示例。考虑一个在系统之间作为 XML 传输的数据示例。


    ***清单 9-2**. 作为数据的 XML*


    `<?xml version="1.0"?>`

    `<soap:Envelope`


    `    soap:encodingStyle="http://www.w3.org/2001/12/soap-encoding">`

    `  <soap:Body >`

    `    <w:GetTemperature>`

    `      <w:Location>78701</w:Location>`

    `    </w:GetTemperature>`

    `  </soap:Body>`

    `</soap:Envelope>`


    仔细看文档声明。在这种情况下，它没有指明编码。XML 的默认编码是 UTF-8，因此当你打算使用 UTF-8 字符时，可以省略编码声明。然后是一个名为 `soap:Envelope`
    的根元素。文档声明和根元素构成了 XML 文件的最小内容，但这对于系统间的消息传递来说意义不大。因此，这个示例还包含了一些数据（某个城市的邮政编码）。这个
    XML 文档表示一个系统向另一个系统请求数据。（顺便说一下，这是我从头发明的；NOAA 可能使用完全不同的方式。）具体来说，这是一个获取德克萨斯州奥斯汀温度的请求。注意缩进。当
    XML 旨在供人类阅读时，通常会进行缩进，使得每一级元素都比其父级元素更靠右。当创建要发送到另一个系统的数据流时，元素之间的所有空白通常会被移除，导致整个文档位于一行。这对人类来说很难阅读，但可以节省带宽，而且计算机并不觉得难以阅读。


    ![images](img/square.jpg) **注意** “文档”是引用任何 XML 实例的常规方式，无论它编码的是实际文档还是任意数据位——XML
    最初来自出版业，并保留了该行业的一些术语。

    '
- fmt: 'SOAP 代表简化对象访问协议（Simplified Object Access Protocol）。它是系统之间来回传递数据的一种常见方式。一个系统发出请求，另一个系统发送相应的响应，这可能会触发另一个请求。处理请求并产生响应的系统随后可能会发送一个请求。通过这种方式，系统之间“互相传递”，直到数据被正确传输（或者一个错误条件指示系统应停止尝试）。系统间和进程间的通信可能比简单的请求-响应周期复杂得多，但这超出了本书的范围。


    这类协议（SOAP 是众多此类标准之一）的目的是为不同的系统提供一种尽可能少地依赖操作系统或语言的通信方式。一个系统可能是一台运行着 C++ 应用程序的 Windows
    服务器，另一个系统可能是一台运行着 Java 应用程序的 Linux 服务器，而第三个系统可能是一台运行着 ADA 应用程序的超级计算机。只要其他系统能够识别请求并生成适当的响应，其他任何东西都无关紧要。这使得
    SOAP 及类似协议对软件开发人员非常有用。你可以创建各种系统并让它们相互通信。互联网是管道，但 SOAP 消息及类似内容构成了管道中的水（或者网络中的信息，这里不再使用比喻）。顺便说一句，请求和响应（尤其是后者）可能非常大。我曾经创建过一个系统，它与一个国家保险清算所共享保险单信息。该系统中的响应非常大——通常有数兆字节的数据。（老实说，如果是我设计那个系统，我会发送一个响应，指定一个位置，其他系统可以从该位置下载包含保单的文件。巨大的响应可能会带来问题。消息越长，数据损坏的可能性就越高，而且有时将数据存储一段时间是有用的。不过，这不是我能决定的。）


    `xmlns:soap` 属性指定了 SOAP 的命名空间，以便任何接收它的系统都能识别出它是什么类型的消息（假设该系统知道 SOAP）。（XMLNS 代表
    XML 命名空间。）`encodingStyle` 元素（它本身是 `soap` 命名空间的一个成员）指定了所使用的 SOAP 的确切版本。`soap:Body`
    命名空间为天气信息指定了一个（在此例中是虚构的）命名空间。请注意，每个命名空间都有一个别名（在此文档中是 `soap` 或 `w`）。这些别名省去了为每个元素输入完整命名空间的麻烦，更重要的是，减少了在网络上传输的字节数。相对简单的诗歌示例没有命名空间声明，这意味着它使用了默认的
    XML 命名空间。每个 XML 元素都有一个命名空间，即使它只是默认的。在 SOAP 示例中，你可以看到单个 XML 文档可以包含来自多个命名空间的元素（一个
    Microsoft Word 文档包含多达 14 个不同的命名空间，这正好说明了事情可以变得多么复杂）。命名空间允许不同的组织使用相同的元素，而不会在它们进入同一文档时相互冲突。例如，如果另一个组织生成天气信息，他们会有自己的命名空间，以防止与
    `noaa` 命名空间发生冲突。


    ### XML 与流


    流（Stream）是一种旨在按顺序读取的数据集合。也就是说，流旨在一次读取一个字节。通常认为这样的数据块是序列化的（意味着它已准备好被传输并按顺序读取，这是“一次一个字节”的另一种说法）。在
    Java（以及许多其他语言）中，XML 作为流来处理。读取 XML 是通过解析 `InputStream` 对象完成的，而写入 XML 通常是通过创建 `StreamResult`
    对象完成的。当使用 `String` 对象创建 XML 时，结果通常仍然会导出为 `OutputStream`，因为其他一些进程需要接收一个流以在更大的流程中完成其工作。例如，许多系统生成大型文档。在这些系统中，你可以使用
    `String` 对象创建 XML，从结果中创建一个 `OutputStream`，然后将该流作为 `InputStream` 发送给另一个对象，该对象将生成一个
    PDF 文件。PDF 文件作为最终文档，可以存储在服务器上、打印或两者兼有。


    正如你在[第 8 章](#Chapter08.html#ch8)中看到的，Java 使用 `Stream` 对象来读取和写入文件。既然你已经在处理 `Stream`
    对象，将 XML 文档保存为文件就是一项自然而简单的任务。将现有文件作为流读取也使加载 XML 文件变得简单直接。因此，有输入流、输出流，以及更大流程中各个步骤之间的流。幸运的是，Java
    使得处理流变得容易。


    ### DOM 与 SAX


    DOM（文档对象模型）和 SAX（XML 简易 API）各有优缺点。与大多数与数据相关的问题一样，知道使用哪一个取决于了解你的数据。如果你需要处理相对较小的文档，DOM
    效果很好，因为它会将整个 XML 数据流加载到内存中，使其速度很快（同样，前提是文档很小）。另一方面，SAX 只使用足够的内存来处理当前元素（称为节点），这使其能够处理任何大小的文档。我曾使用
    SAX 解析长达 2000 页的书籍内容。SAX 的缺点是你无法同时访问文档的大部分内容，因为只有很少一部分在内存中。此外，SAX 仅适用于传入的 XML
    文档；它不写入 XML。


    因此，请记住，对于小的 XML 源使用 DOM，对于较大的 XML 源使用 SAX。如果你不确定 XML 输入会是大还是小，请使用 SAX。当然，文档是大还是小取决于处理文档时可用的内存量。如果你的程序可以在拥有充足内存的计算机上独立运行，你可以使用
    DOM 加载相当大的文档。但是，如果你的程序必须与其他进程共享服务器，或者必须在小型设备（如手机）上运行，那么内存将受到限制，你的选择也会减少。最后，如果你的应用程序必须同时处理多个文档（例如为多个用户），那么每个进程的内存将大大减少。应用程序可用的内存越受限，你就越应该倾向于使用
    SAX。举个例子，我最近参与了一个应用程序，它会触发任意数量的转换来创建文档集。在实践中，每个集合包含大约 15 个文档。此外，多个用户可以同时启动文档生成运行，导致同时处理多达
    50 个文档，而所有文档都只有 8 MB 的 RAM。我们绝对需要使用 SAX。'
  raw: 'SOAP stands for Simplified Object Access Protocol. It''s a common way for
    systems to pass data back and forth. One system makes a request, and another system
    sends a corresponding response, which may trigger yet another request. The system
    that processes the request, and produces a response, may then send a request.
    In this fashion the systems “play tag” with one another, until the data is properly
    transmitted (or an error condition indicates that the systems should stop trying).
    Inter-system and inter-process communication can get much more complex than a
    simple request-response cycle, but that''s beyond the scope of this book.The purpose
    of this kind of protocol (SOAP is one of many such standards) is to provide separate
    systems a way to communicate that has as few dependencies as possible on the operating
    system or language. One system might be a Windows server running an application
    written in C++, while another system might be a Linux server running a Java application,
    and yet another system might be a supercomputer running an ADA application. Provided
    the other system can recognize the request and generate an appropriate response,
    anything else is irrelevant. This makes SOAP, and similar protocols, very useful
    to software developers. You can create all kinds of systems and make them talk
    to one another. The Internet is the plumbing, but SOAP messages, and similar content,
    constitute the water in the pipes (or the information in the network, to abandon
    the metaphor). Requests and responses (the latter, in particular) can be very
    large, by the way. I once created a system that shared insurance policy information
    with a national insurance clearing house. The responses in that system were very
    large— often several megabytes of data. (Honestly, had I designed that system,
    I would have sent a response that specified a location from which the other system
    could download a file containing the policy. Huge responses can be problematic.
    The longer the message, the higher the chance for corrupted data, and it''s sometimes
    useful to store data for a time. It wasn''t my decision to make, though.)


    The `xmlns:soap` attribute specifies the namespace for SOAP, so that any system
    receiving it can recognize what kind of message it is (assuming the system knows
    about SOAP at all). (XMLNS stands for XML NameSpace.) The `encodingStyle` element
    (itself a member of the soap namespace) specifies the exact version of SOAP being
    used. The `soap:Body` namespace specifies a (fictional, in this case) namespace
    for weather information. Note that each namespace has an alias (`soap` or `w`,
    in this document). The aliases save the trouble of typing out the namespace for
    each element and, more importantly, reduces the number of bytes going down the
    pipe. The relatively simple poem example has no namespace declaration, which means
    that it uses the default XML namespace. Every XML element has a namespace, even
    if it''s only the default. In the SOAP example, you can see that a single XML
    document can contain elements from multiple namespaces (a Microsoft Word document
    contains as many as 14 different namespaces, just to show how complex things can
    get). Namespaces let different organizations use the same elements without trampling
    one another when they get into the same document. For example, if another organization
    produced weather information, they''d have their own namespace, to prevent collisions
    with the `noaa` namespace.


    ### XML and Streams


    A stream is a collection of data meant to be read sequentially. That is, a stream
    is meant to be read one byte at a time. It is generally said that such a block
    of data is serialized (meaning that it is ready to be transmitted and read serially,
    which is another way to say one byte at a time).In Java (and in other many other
    languages), XML is processed as streams. Reading XML is done by parsing `InputStream`
    objects, and writing XML is generally done by creating `StreamResult` objects.
    When creating XML with `String` objects, the result is often still exported as
    an `OutputStream`, as some other process needs to receive a stream to do its part
    in a larger process. For example, many systems produce large documents. In these
    systems, you can create XML by using `String` objects, create an `OutputStream`
    from the result, and send that stream as an `InputStream` to another object, which
    would produce a PDF file. The PDF file serves as the final document, to be stored
    on a server, printed, or both.


    As you saw in [Chapter 8](#Chapter08.html#ch8), Java uses `Stream` objects for
    reading from, and writing to, files. Since you''re already processing `Stream`
    objects, saving an XML document as a file is a natural and easy task. Reading
    an existing file as a stream also makes loading an XML file straightforward. So,
    there are streams in, streams out, and streams between the steps of larger processes.
    Fortunately, Java makes working with streams easy.


    ### DOM and SAX


    DOM (Document Object Model) and SAX (Simplified API for XML) have their strengths
    and weaknesses. As with most data-related problems, knowing which one to use comes
    down to knowing your data. If you need to work with relatively small documents,
    DOM works well, as it loads the entire XML data stream into memory, making it
    fast (again, provided the document is small). SAX, on the other hand, uses only
    enough memory to process the current element (called a node), which makes it capable
    of handling documents of any size. I''ve used SAX to parse the contents of books
    as long as 2,000 pages. The down side of SAX is that you can''t reach much of
    the document at once, as little of it is in memory. Also, SAX only works with
    incoming XML documents; it doesn''t write XML.


    So, remember to use DOM for small XML sources and SAX for larger XML sources.
    If you''re uncertain if the XML input will be large or small, use SAX. Of course,
    whether a document is large or small depends on how much memory is available for
    processing the document. If your program can run on a computer with plenty of
    memory all to itself, you can use DOM to load fairly large documents. However,
    if your program has to share a server with other processes, or has to run on a
    small device (such as a phone), memory will be limited and your options will be
    reduced. Finally, if your application has to process multiple documents at once
    (perhaps for multiple users), the memory for each process will be greatly reduced.
    The more constrained the memory available to the application, the more you should
    lean toward SAX. As an example, I recently worked on an application that would
    trigger an arbitrary number of transforms to create sets of documents. In practice,
    each set contained about 15 documents. Also, multiple users could start document-production
    runs at the same time, leading to as many as 50 documents being processed at the
    same time, all with 8 MB of RAM. We definitely needed to use SAX.'
