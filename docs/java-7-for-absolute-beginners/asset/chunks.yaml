    `XMLToConsoleHandler();`

    `    // 获取一个解析器工厂      SAXParserFactory factory = SAXParserFactory.newInstance();`

    `    // 获取一个解析器      SAXParser saxParser = factory.newSAXParser();`

    `    // 现在使用我们的处理程序解析文件      saxParser.parse(fileName, handler );`


    `    // 处理可能的异常    } catch(IOException ioe) {`

    `      System.out.println("无法打开 " + fileName + " 进行解析");`

    `    } catch(ParserConfigurationException pce) {`

    `      System.out.println("创建 SAX 解析器失败 ");`

    `    } catch(SAXException saxe) {`

    `      System.out.println("解析 XML 文件失败");`

    `    }`

    `  }`

    `}`


    很简单，不是吗？SAX 的乐趣之一就在于它易于实现。创建一个处理程序，创建一个解析器，然后将你的输入和处理程序传递给工厂。因此，异常处理代码比实际执行工作的代码还要长。当然，这种安排实际上掩盖了复杂性在于处理程序类这一事实。尽管如此，将代码拆分，使复杂性隔离到单个类中，正是使用
    Java 这类面向对象语言的正确方式。


    ### 关于工厂类的一点说明


    你可能已经注意到，要获取 `DocumentBuilder` 对象，你必须使用 `DocumentBuilderFactory` 对象。同样，要获取 `SAXParser`
    对象，你必须使用 `SAXParserFactory` 对象。工厂模式在 Java（以及其他面向对象语言，如 C++）中经常被使用，以允许创建具有不同属性的对象。例如，`SAXParserFactory`
    类包含一种指定独立验证器对象的方法，以确保 XML 符合某个模式（模式是对一组数据应包含内容的定义）。


    工厂模式是一种方便的方式，用于呈现一组非常相似、仅通过某些功能的开启或关闭而有所不同的对象。否则，你就需要为每种可能的特性组合都创建一个类。在某些情况下，那将是一大堆非常相似的类。工厂模式为这个问题提供了一个易于使用且易于理解的解决方案。因此，Java
    的标准库中有许多工厂对象。你也可以创建自己的工厂类。当你发现自己需要创建许多非常相似（但略有不同）的对象时，可以考虑为它们创建一个工厂。


    ### 总结


    好了，以上就是关于如何使用 Java 处理 XML 的快速介绍。关于这个主题已经写了好几本好书，因为其复杂性远不止本文所呈现的这些。尽管如此，本章应该能让你为需要读写
    XML 文件或流做好准备。


    具体来说，我们涵盖了 Java 处理 XML 的两种主要方式的基础知识：文档对象模型（DOM）和 XML 简化 API（SAX）。你了解到 DOM 提供了出色的性能，因为它将整个文档加载到内存中。然而，将整个文档加载到内存中也是
    DOM 最大的问题，因为大型文档可能会超出可用内存。另一方面，SAX 可以处理任意数量的 XML（包括千兆字节大小的数据流），但它需要为每种 XML 文档创建自定义的处理程序类。


    最后，我们探讨了工厂类的本质，了解了它们存在的原因，以及你可能在何时使用它们。


    ## 第 10 章


    ## 动画


    动画涉及随时间变化的图像。有趣的是（至少对我们来说是这样，但我们热爱词源学），*动画*在计算机科学之外意味着“赋予生命”。动画图像确实看起来比静态图像更有生命力。'
- fmt: '### Timing Is Everything


    The essence of animation is timing. An animated image changes every so often.
    Usually, that''s very often (many times a second), but an image that changes once
    a minute (such as a clock) is still animated, though it might not be much fun
    to watch. To give you an idea of how often an animated image can change, let''s
    look at some common animation speeds that most of us see every day, usually without
    even thinking of them as being animated images.


    A standard TV signal (STV, the predecessor to HDTV) shows a new image (approximately)
    30 times a second. That is, an STV signal has a frame rate of 30 per second. *Frame
    rate* is a key term in animation, in computing in general, and in other industries.
    You''ve seen what it means in animation. For computing in general, "frame rate"
    refers to how often a program processes all of its inputs and produces all of
    its outputs. The classic example is software that steers a vehicle. If the vehicle
    is a freighter at sea, a low frame rate (such as once a minute) might suffice.
    For an automated lander (for the moon or Mars), a frame rate approaching 100 times
    per second might be necessary. Such a system is said to work at a certain *hertz*,
    which is the technical term for how many times a second a process repeats. Hertz
    is used in many industries, including the electronics industry. Finally, for video
    games, animation is generally measured in frames per second (FPS), which is the
    same as hertz but is an industry-specific term.


    To get back to common frame rates (or FPS), a standard TV shows 30 frames per
    second. Most movies are filmed at 24 FPS (though this is rapidly changing to 60
    FPS). NTSC (the standard television signal format in the United States and the
    predecessor to HDTV) works at 60 FPS (but it''s interlaced, meaning the screen
    is divided into lines and alternating sets of lines are shown 30 times per second
    each). Many other countries (including most of Europe) use 50 FPS (interlaced)
    for standard television. The ATSC standard (essentially the HDTV standard used
    in the United States) shows between 24 and 60 frames per second, depending on
    several factors. More recent HDTV devices claim frame rates as high as 240. Finally,
    most computer monitors operate between 75 and 85 hertz, meaning 75 to 85 frames
    per second.


    That last rate is generally the one most important to programmers (though game
    console programmers have to concern themselves with TV frame rates, too). We can
    make animation systems that can show hundreds of frames per second, but there''s
    no point in doing so. No monitor can show that many frames per second. Consequently,
    a monitor''s hertz is the practical limit on computer-generated animation. In
    fact, not only is trying for a frame rate higher than the monitor''s hertz pointless,
    it might do harm, by tying up the system such that it can''t do other work (either
    for your process or for other processes).


    In creating samples for this chapter, we chose frame rates between 4 and 25 FPS.
    That might seem low, but it''s adequate for the sake of examples. A low frame
    rate might even help you understand how animation works, as you can then see it
    happen. If you watch the sprite animation example closely, you can see the individual
    images being drawn.


    By the way, humans (and cats, dogs, and anything else with non-mechanical eyes)
    don''t see the world as frames going by every so often. Being analog, the human
    eye and brain respond to a steady input of light, motion, and color. The question
    that usually concerns game makers and other animators (such as the folks who re-create
    car accidents for use in court rooms) is at what rate can the viewers feel like
    they''re seeing something realistic (which, again, is not the same as seeing something
    real). That number varies hugely according to a number of factors, such as resolution,
    light/dark balance of the content on the screen, the lighting in the viewer''s
    area, the visual acuity of the viewer (which is itself dictated by a number of
    variables, such as age, fatigue, experience with animation, and so on).


    So what is the right FPS for your application? The only real way to know is to
    put it in front of several different potential users and ask them if it looks
    good. Also, if you do a lot of animation, you''ll probably develop a feel for
    the right frame rate. Finally, game makers often concern themselves with what
    the competition is doing. If their games run at 75 FPS, your game better be able
    to do that, too, or have a good reason for not doing so.'
