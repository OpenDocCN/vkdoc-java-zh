    `case` 语句。正是这种机制允许多个 `case` 标签共享一个代码块。如果没有 `break` 语句，`switch` 语句中的每个代码块都会被执行。尽管在某些情况下运行多个代码块可能有用，但这通常是一个错误（并且可能很难发现，因为代码看起来可能是正确的）。


