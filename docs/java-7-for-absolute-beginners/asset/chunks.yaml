- fmt: "Another bit of complexity that crops up in the `cascade` method is the need\
    \ to check for boundaries. If the current location is at the edge of the game\
    \ area, checking an adjacent location can result in an `ArrayOutOfBounds` exception,\
    \ which wouldn't be much fun. So we have an `if` statement check all four boundaries\
    \ and not call the `cascade` method again if doing so would result in an impossible\
    \ location.\n\nFinally, you probably notice that the `cascade` method returns\
    \ one of the values from the `gameState` enumeration. Most of the time, that's\
    \ `gameState.CONTINUE`. However, it is possible for a cascade event to clear the\
    \ board and win the game, so the method can also return `gameState.WIN`.\n\nThe\
    \ `MineField` class has one last non-trivial method, called `countAdjacentMines`.\
    \ [Listing 7-18](#Chapter07.html#list_7_18) shows the `countAdjacentMines` method.\n\
    \n**Listing 7-18.** The MineSweeper `countAdjacentMines` method\n\n```\nint countAdjacentMines(int\
    \ x, int y) {\n  int count = 0;\n  for (int i = x - 1; i <= x + 1; i++) {\n  \
    \  for (int j = y - 1; j <= y + 1; j++) {\n      if (i == x && j == y) {\n   \
    \     continue;\n      } else if (i < 0 || j < 0 || i >= rows || j >= columns)\
    \ {\n        continue;\n      } else if (mineField[i][j].hasMine()) {\n      \
    \  count++;\n      }\n    }\n  }\n  return count;\n}\n```\n\nWhen a player clears\
    \ a location that does not contain a mine, we have to show the number of adjacent\
    \ mines in that location. To do that, we need a method of counting the mines adjacent\
    \ to any given location. As with the `cascade` method, we have to check for the\
    \ edges of the playing field, and we use identical code to do that. Other than\
    \ that, the `countAdjacentMines` method checks each adjacent (including diagonals)\
    \ location and adds up the number of mines found.\n\nThe `Mine` class defines\
    \ an individual location. You might think it's misnamed, because it doesn't correspond\
    \ only to locations that have mines. To that end, we thought about changing the\
    \ name to `Location`. Then it occurred to us that, when Explosive Ordnance Disposal\
    \ specialists (those folks are real heroes, by the way) check for explosives,\
    \ they assume every location is mined. So, in a fit of sophistry, I left the name\
    \ as `Mine`. [Listing 7-19](#Chapter07.html#list_7_19) shows the `Mine` class.\n\
    \n**Listing 7-19.** The `Mine` class\n\n```\npackage com.apress.java7forabsolutebeginners.examples.MineSweeper;\n\
    \npublic class Mine {\n\n  enum flagState {UNKNOWN, MINE, SUSPECT};\n    private\
    \ boolean isCleared = false;\n  private boolean hasMine = false;\n  private flagState\
    \ flag = flagState.UNKNOWN;\n      boolean hasMine() {\n    return hasMine;\n\
    \  }\n\n  void setMine() {\n    hasMine = true;\n  }\n\n  boolean isCleared()\
    \ {\n    return isCleared;\n  }\n\n  void clear() {\n    isCleared = true;\n \
    \ }\n\n  flagState getFlagState() {\n    return flag;\n  }\n\n  flagState setFlagState()\
    \ {\n    if (flag == flagState.UNKNOWN) {\n      flag = flagState.MINE;\n    \
    \  return flagState.MINE;\n    }\n    if (flag == flagState.MINE) {\n      flag\
    \ = flagState.SUSPECT;\n      return flagState.SUSPECT;\n    }\n    if (flag ==\
    \ flagState.SUSPECT) {\n      flag = flagState.UNKNOWN;\n      return flagState.UNKNOWN;\n\
    \    }\n    return flagState.UNKNOWN;\n  }\n}\n```\n\nThe `Mine` class keeps track\
    \ of whether a location has a mine, whether the location has been cleared, and\
    \ whether the user has flagged the location as having a mine, being a suspect\
    \ (usually marked by a question mark icon in minesweeper games), or being unknown\
    \ (which means not having an icon in the game). The only complexity is in the\
    \ `setFlagState` method, which toggles through the states rather than accepting\
    \ an argument to set the flag state. That behavior models the user's behavior\
    \ of cycling through flags by right-clicking on a minefield location.\n\nNow we\
    \ can move on to the `MineSweeperHelper` class, which contains miscellaneous methods\
    \ that the game needs. Though not as large as the `MineSweeper` and `MineField`\
    \ classes, it's still a large class when compared to earlier work. Again, read\
    \ through it and do your best to understand it (now that you know how the rest\
    \ of the program works, you can probably do pretty well with it), and then we\
    \ examine it in detail. [Listing 7-20](#Chapter07.html#list_7_20) shows the `MineSweeperHelper`\
    \ class.\n\n**Listing 7-20.** The `MineSweeperHelper` class\n\n```\npackage com.apress.java7forabsolutebeginners.examples.MineSweeper;\n\
    \nimport java.awt.Color;\nimport javax.swing.JButton;\nimport javax.swing.JOptionPane;\n\
    \npublic class MineSweeperHelper {\n\n  private MineSweeper mineSweeper;\n\n \
    \ public MineSweeperHelper(MineSweeper mineSweeper) {\n\n    this.mineSweeper\
    \ = mineSweeper;\n  }\n\n  void updateLabels() {\n    mineSweeper.minesFoundLabel.setText(\"\
    Found: \" + mineSweeper.mineField.getMinesFound());\n    mineSweeper.minesRemainingLabel.setText(\"\
    Remaining: \" +\n        mineSweeper.mineField.getMinesRemaining());\n  }\n\n\
    \  void updateButtons() {\n    for (int i = 0; i < mineSweeper.rows; i++) {\n\
    \      for (int j = 0; j < mineSweeper.columns; j++) {\n        if (mineSweeper.mineField.getMineCleared(i,\
    \ j) == true) {\n          mineSweeper.mineButtons[i][j].removeMouseListener(mineSweeper.mouseListener);\n\
    \          mineSweeper.mineButtons[i][j].setBackground(Color.WHITE);\n       \
    \   int count = mineSweeper.mineField.countAdjacentMines(i, j);\n          if\
    \ (count > 0) {\n            mineSweeper.mineButtons[i][j].setIcon(MineIcon.getNumberIcon(count));\n\
    \          }\n        } else {\n          if (mineSweeper.mineField.getMineFlag(i,\
    \ j) == Mine.flagState.MINE) {\n            mineSweeper.mineButtons[i][j].setIcon(MineIcon.getMineIcon());\n\
    \          } else if (mineSweeper.mineField.getMineFlag(i, j) == Mine.flagState.SUSPECT)\
    \ {\n            mineSweeper.mineButtons[i][j].setIcon(MineIcon.getSuspectIcon());\n\
    \          } else {\n            mineSweeper.mineButtons[i][j].setIcon(null);\n\
    \          }\n        }\n      }\n    }\n  }\n\n  void showAll() {\n    for (int\
    \ i = 0; i < mineSweeper.rows; i++) {\n      for (int j = 0; j < mineSweeper.columns;\
    \ j++) {\n        boolean mine = mineSweeper.mineField.isMine(i, j);\n       \
    \ if (mine) {\n          mineSweeper.mineButtons[i][j].setIcon(MineIcon.getMineIcon());\n\
    \        } else {\n          JButton thisButton = mineSweeper.mineButtons[i][j];\n\
    \          thisButton.removeMouseListener(mineSweeper.mouseListener);\n      \
    \    thisButton.setBackground(Color.WHITE);\n          thisButton.setIcon(null);\n\
    \          int count = mineSweeper.mineField.countAdjacentMines(i, j);\n\n   \
