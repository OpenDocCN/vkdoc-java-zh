- fmt: "### Optimizing Garbage Collection\n\nNow that you understand the basics of\
    \ how to configure memory and garbage collection for Java programs, we can talk\
    \ about how to gather the information you need in order to make intelligent decisions\
    \ about the various switches and settings. Again, the JVM offers a number of switches\
    \ you can set to create output related to memory usage and garbage collection.\
    \ The following table describes these switches.\n\n![images](images/t1303.jpg)\n\
    \nHere's a bit of sample output from running the TargetClick game from the command\
    \ line with the `-verbose:gc`, `-XX:+PrintGCTimeStamps`, and `-XX:+PrintGCDetails`\
    \ switches:\n\n***Listing 13-3.** Garbage Collection Output Sample*\n\n```\nC:\\\
    temp>java -verbose:gc -XX:+PrintGCTimeStamps -XX:+PrintGCDetails TargetClick\n\
    Heap\n PSYoungGen      total 17920K, used 8077K [0x00000000ec000000,\n   0x00000000ed3f0000,\
    \ 0x0000000100000000)\n  eden space 15424K, 52% used [0x00000000ec000000,0x00000000ec7e3538,0x00000000ecf10000)\n\
    \  from space 2496K, 0% used [0x00000000ed180000,0x00000000ed180000,0x00000000ed3f0000)\n\
    \  to   space 2496K, 0% used [0x00000000ecf10000,0x00000000ecf10000,0x00000000ed180000)\n\
    \ PSOldGen        total 40960K, used 0K [0x00000000c4000000,   0x00000000c6800000,0x00000000ec000000)\n\
    \  object space 40960K, 0% used [0x00000000c4000000,0x00000000c4000000,0x00000000c6800000)\n\
    \ PSPermGen       total 21248K, used 9423K [0x00000000bee00000, 0x00000000c02c0000,\
    \   0x00000000c4000000)\n  object space 21248K, 44% used [0x00000000bee00000,0x00000000bf733cc0,0x00000000c02c0000)\n\
    ```\n\nLet's examine these results a bit. First, we can see that the young generation\
    \ has 17920K allocated and is using 8077K of it. All of the objects in the young\
    \ generation are in the eden space. Given how briefly instances of the `Target`\
    \ class last, there should never be one in the from and to spaces. In the tenured\
    \ generation (called `PSOldGen` here), we find nothing, although 40960K has been\
    \ allocated to it. The instances of the `TargetClick` and `TargetClickPanel` class\
    \ are not in the tenured generation because I took this snapshot shortly after\
    \ starting the TargetClick game, so those objects are still in the eden space.\
    \ Finally, the permanent generation contains the three class files, which use\
    \ 9423K of 21248K allocated.\n\nTo really make this information useful, we'd have\
    \ to let the program run for a while, find a number of these blocks of information,\
    \ and compare them to one another, watching for changes over time. As you can\
    \ imagine, analyzing this kind of information for a large and complex program\
    \ can take quite a while. For one thing, developers working on those kinds of\
    \ applications often have to let their applications run for days at a time to\
    \ get a sufficiently broad window of input. Also, if the number of users or number\
    \ of network connections or other load factors change (and they nearly always\
    \ do – very few programs exist in constantly stable environments), those factors\
    \ need to be captured and then identified in the log. Then there's the difficulty\
    \ of reading this kind of information (which is why many programmers write additional\
    \ utilities to “scrape” this data and put it into some handy application, such\
    \ as a spread sheet). All of this together makes analyzing garbage-collection\
    \ data a non-trivial task. However, the task pays off with better performance,\
    \ happier users, happier programmers, and so on. Therefore, the investment in\
    \ time and effort often pays off nicely.\n\n![images](images/square.jpg) **Tip**\
    \ You can get a good optimization by monitoring the size of the tenured generation\
    \ over the lifetime of your program and setting its size to closely match (with\
    \ perhaps a 10% increase) the tenured generation size to the largest size you\
    \ observe over a few runs of your program. You can control the size of the tenured\
    \ generation by controlling the size of the new generation, which you can do with\
    \ the `-XXNewRatio`, `-XX:NewSize`, `-XX:MaxNewSize` switches. Suppose your testing\
    \ reveals that your program needs 256MB of memory and that the tenured generation\
    \ should be 4 times the size of the new generation (meaning you have a lot of\
    \ long-lived objects). You could set the following switches: `-XXNewRatio=4 -XXNewSize=52MB\
    \ -XXMaxNewSize=52MB`\n\n### Collection Hints\n\nJava developers can give hints\
    \ to the garbage collector. The following line asks the JVM to do garbage collection\
    \ for your program:\n\n***Listing 13-4.** Garbage Collection Hint*\n\n```\nSystem.gc();\n\
    ```\n\nHowever, most of the Java programming community frowns on using garbage\
    \ collection hints. Instead, you should try to organize your code so that the\
    \ garbage collector doesn't need a hint. Most of that organization comes down\
    \ to arranging your classes such that each class has a clear, well-defined job\
    \ to do. For example, `TargetClickPanel` maintains a collection of five `Target`\
    \ objects. When it needs a new instance of the `Target` class, it sets a member\
    \ of that collection to the new instance. Thus, old instances become free for\
    \ collection. If I had tried to do more with that collection of `Target` objects,\
    \ I might easily have gotten into a situation where garbage collection wouldn't\
    \ work correctly, as I'd still be hanging onto the `Target` objects.\n\n![images](images/square.jpg)\
    \ **Note** Using a garbage collection hint will not prevent your program from\
    \ running out of memory if it is about to run out anyway. That's yet another reason\
    \ to not use garbage collection hints. As a rule, they don't help."
  raw: '### Optimizing Garbage Collection


    Now that you understand the basics of how to configure memory and garbage collection
    for Java programs, we can talk about how to gather the information you need in
    order to make intelligent decisions about the various switches and settings. Again,
    the JVM offers a number of switches you can set to create output related to memory
    usage and garbage collection. The following table describes these switches.


    ![images](images/t1303.jpg)


    Here''s a bit of sample output from running the TargetClick game from the command
    line with the `-verbose:gc, -XX:+PrintGCTimeStamps -XX:+PrintGCDetails` switches:


    ***Listing 13-3.** Garbage Collection Output Sample*


    `C:\temp>java -verbose:gc -XX:+PrintGCTimeStamps -XX:+PrintGCDetails TargetClick`

    `Heap`

    ` PSYoungGen      total 17920K, used 8077K [0x00000000ec000000,`

    `   0x00000000ed3f0000, 0x0000000100000000)`

    `  eden space 15424K, 52% used [0x00000000ec000000,0x00000000ec7e3538,0x00000000ecf10000)`

    `  from space 2496K, 0% used [0x00000000ed180000,0x00000000ed180000,0x00000000ed3f0000)`

    `  to   space 2496K, 0% used [0x00000000ecf10000,0x00000000ecf10000,0x00000000ed180000)`

    ` PSOldGen        total 40960K, used 0K [0x00000000c4000000,   0x00000000c6800000,0x00000000ec000000)`

    `  object space 40960K, 0% used [0x00000000c4000000,0x00000000c4000000,0x00000000c6800000)`

    ` PSPermGen       total 21248K, used 9423K [0x00000000bee00000, 0x00000000c02c0000,  
    0x00000000c4000000)`

    `  object space 21248K, 44% used [0x00000000bee00000,0x00000000bf733cc0,0x00000000c02c0000)`


    Let''s examine these results a bit. First, we can see that the young generation
    has 17920K allocated and is using 8077K of it. All of the objects in the young
    generation are in the eden space. Given how briefly instances of the `Target`
    class last, there should never be one in the from and to spaces. In the tenured
    generation (called PSOldGen here), we find nothing, although 40960K has been allocated
    to it. The instances of the `TargetClick` and `TargetClickPanel` class are not
    in the tenured generation because I took this snapshot shortly after starting
    the TargetClick game, so those objects are still in the eden space. Finally, the
    permanent generation contains the three class files, which use 9423K of 21248K
    allocated.


    To really make this information useful, we''d have to let the program run for
    a while, find a number of these blocks of information, and compare them to one
    another, watching for changes over time. As you can imagine, analyzing this kind
    of information for a large and complex program can take quite a while. For one
    thing, developers working on those kinds of applications often have to let their
    applications run for days at a time to get a sufficiently broad window of input.
    Also, if the number of users or number of network connections or other load factors
    change (and they nearly always do – very few programs exist in constantly stable
    environments), those factors need to be captured and then identified in the log.
    Then there''s the difficulty of reading this kind of information (which is why
    many programmers write additional utilities to “scrape” this data and put it into
    some handy application, such as a spread sheet). All of this together makes analyzing
    garbage-collection data a non-trivial task. However, the task pays off with better
    performance, happier users, happier programmers, and so on. Therefore, the investment
    in time and effort often pays off nicely.


    ![images](images/square.jpg) **Tip** You can get a good optimization by monitoring
    the size of the tenured generation over the lifetime of your program and setting
    its size to closely match (with perhaps a 10% increase) the tenured generation
    size to the largest size you observe over a few runs of your program. You can
    control the size of the tenured generation by controlling the size of the new
    generation, which you can do with the `-XXNewRatio`, `-XX:NewSize`, `-XX:MaxNewSize`
    switches. Suppose your testing reveals that your program needs 256MB of memory
    and that the tenured generation should be 4 times the size of the new generation
    (meaning you have a lot of long-lived objects). You could set the following switches:
    `-XXNewRatio=4 -XXNewSize=52MB -XXMaxNewSize=52MB`


    ### Collection Hints


    Java developers can give hints to the garbage collector. The following line asks
    the JVM to do garbage collection for your program:


    ***Listing 13-4.** Garbage Collection Hint*


    `System.gc();`


    However, most of the Java programming community frowns on using garbage collection
    hints. Instead, you should try to organize your code so that the garbage collector
    doesn''t need a hint. Most of that organization comes down to arranging your classes
    such that each class has a clear, well-defined job to do. For example, `TargetClickPanel`
    maintains a collection of five `Target` objects. When it needs a new instance
    of the `Target` class, it sets a member of that collection to the new instance.
    Thus, old instances become free for collection. If I had tried to do more with
    that collection of `Target` objects, I might easily have gotten into a situation
    where garbage collection wouldn''t work correctly, as I''d still be hanging onto
    the `Target` objects.


    ![images](images/square.jpg) **Note** Using a garbage collection hint will not
    prevent your program from running out of memory if it is about to run out anyway.
    That''s yet another reason to not use garbage collection hints. As a rule, they
    don''t help.'
  trans: '

    ### 优化垃圾回收


    现在你已经了解了为 Java 程序配置内存和垃圾回收的基础知识，我们可以讨论如何收集所需信息，以便对各种开关和设置做出明智的决策。同样，JVM 提供了许多开关，你可以设置它们来生成与内存使用和垃圾回收相关的输出。下表描述了这些开关。


    ![images](img/t1303.jpg)


    以下是从命令行运行 TargetClick 游戏时，使用 `-verbose:gc, -XX:+PrintGCTimeStamps -XX:+PrintGCDetails`
    开关生成的部分输出示例：


    ***清单 13-3.** 垃圾回收输出示例*


    `C:\temp>java -verbose:gc -XX:+PrintGCTimeStamps -XX:+PrintGCDetails TargetClick`

    `Heap`

    `  PSYoungGen      total 17920K, used 8077K 0x00000000ec000000,`

    `   0x00000000ed3f0000, 0x0000000100000000)`

    `  eden space 15424K, 52% used [0x00000000ec000000,0x00000000ec7e3538,0x00000000ecf10000)`

    `  from space 2496K, 0% used [0x00000000ed180000,0x00000000ed180000,0x00000000ed3f0000)`

    `  to   space 2496K, 0% used [0x00000000ecf10000,0x00000000ecf10000,0x00000000ed180000)`

    `  PSOldGen        total 40960K, used 0K [0x00000000c4000000,   0x00000000c6800000,0x00000000ec000000)`

    `  object space 40960K, 0% used [0x00000000c4000000,0x00000000c4000000,0x00000000c6800000)`

    `  PSPermGen       total 21248K, used 9423K [0x00000000bee00000, 0x00000000c02c0000,  
    0x00000000c4000000)`

    `  object space 21248K, 44% used [0x00000000bee00000,0x00000000bf733cc0,0x00000000c02c0000)`


    让我们稍微分析一下这些结果。首先，我们可以看到年轻代分配了 17920K，并使用了其中的 8077K。年轻代中的所有对象都在 eden 空间中。鉴于 `Target`
    类实例的存活时间非常短暂，from 和 to 空间中应该永远不会存在任何对象。在老年代（此处称为 PSOldGen）中，我们什么也没找到，尽管已经为其分配了
    40960K。`TargetClick` 和 `TargetClickPanel` 类的实例不在老年代中，因为这是在启动 TargetClick 游戏后不久截取的快照，所以这些对象仍然在
    eden 空间中。最后，永久代包含三个类文件，它们使用了已分配 21248K 中的 9423K。


    要让这些信息真正有用，我们需要让程序运行一段时间，找到多组此类信息块，并将它们相互比较，观察随时间的变化。可以想象，分析大型复杂程序的这类信息可能需要相当长的时间。首先，从事这类应用程序开发的开发人员通常需要让应用程序一次运行数天，才能获得足够宽泛的输入窗口。此外，如果用户数量、网络连接数量或其他负载因素发生变化（它们几乎总是会变化——很少有程序存在于持续稳定的环境中），这些因素也需要被捕获并在日志中识别出来。然后还有阅读这类信息的困难（这就是为什么许多程序员会编写额外的实用程序来“抓取”这些数据，并将其放入某种便捷的应用程序中，例如电子表格）。所有这些因素加在一起，使得分析垃圾回收数据成为一项不简单的任务。然而，这项任务会带来回报：更好的性能、更满意的用户、更开心的程序员等等。因此，时间和精力的投入往往能获得丰厚的回报。


    ![images **提示** 你可以通过监控程序生命周期内老年代的大小，并将其大小设置为与你通过几次程序运行观察到的最大老年代大小紧密匹配（或许增加 10%），来获得良好的优化效果。你可以通过控制新生代的大小来控制老年代的大小，这可以通过
    `-XXNewRatio`、`-XX:NewSize`、`-XX:MaxNewSize` 开关来实现。假设你的测试表明程序需要 256MB 内存，并且老年代的大小应该是新生代的
    4 倍（这意味着你有很多长生命周期对象）。你可以设置以下开关：`-XXNewRatio=4 -XXNewSize=52MB -XXMaxNewSize=52MB`###
    回收提示 Java 开发人员可以向垃圾回收器提供提示。下面这行代码要求 JVM 为你的程序执行垃圾回收：***清单 13-4.** 垃圾回收提示*`System.gc();`然而，大多数
    Java 编程社区不赞成使用垃圾回收提示。相反，你应该尝试组织你的代码，使得垃圾回收器不需要提示。这种组织方式主要归结为安排你的类，使得每个类都有清晰、定义明确的任务。例如，`TargetClickPanel`
    维护了一个包含五个 `Target` 对象的集合。当它需要 `Target` 类的新实例时，它会将该集合中的一个成员设置为新实例。这样，旧实例就可以被回收了。如果我试图对该
    `Target` 对象集合做更多操作，我可能很容易陷入垃圾回收无法正常工作的境地，因为我仍然持有对 `Target` 对象的引用。![images](img/square.jpg)
    **注意** 如果程序即将耗尽内存，使用垃圾回收提示并不能阻止它耗尽内存。这是不使用垃圾回收提示的另一个原因。通常来说，它们没有帮助。

