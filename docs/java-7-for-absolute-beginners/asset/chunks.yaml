    #### 构造函数


    `AverageImpl` 类包含一个构造函数，如代码清单 2-11 所示。


    ***代码清单 2-11.** 一个构造函数*


    `         public AverageImpl(int[] ints) throws IllegalArgumentException {`

    `                 if (ints.length == 0){`

    `                         throw new IllegalArgumentException(EXCEPTION_MESSAGE);`

    `                 }`

    `                 this.ints = ints;`

    `         }`


    构造函数看起来像方法，但并非如此。注意它没有返回类型，且名称与类名完全相同。当我们首次创建对象时，它们会被调用，使我们能够在操作对象之前对其进行设置。创建对象的过程称为*实例化*。


    需要完成的工作因类而异，差异巨大。许多构造函数（如本例所示）会设置一些值。其他类可能会创建其他对象、打开数据库连接或文件，或者启动其他进程（可能性远不止于此）。


    如果你没有定义构造函数，Java 仍会创建一个默认构造函数，以使 `new` 关键字能够正常工作。否则，没有人能够创建你的类的实例。构造函数可以拥有所有常见的访问修饰符。


    你也可以为单个类创建多个构造函数。例如，假设我们想提供一种便捷方式，来计算任意其他数字与 2 的平均值。我们可以通过像代码清单 2-12 这样的构造函数来实现：


    ***代码清单 2-12.** 另一个构造函数*


    `         public AverageImpl(int otherNumber) {`

    `                 ints = new int[] {2, otherNumber};`

    `         }`


    现在我们有两种方式来创建 `AverageImpl` 类的实例。


    ![images](img/square.jpg) **注意** `this` 关键字是对该类所定义对象的引用。在本例中，`this` 关键字是必要的，用于区分类中的
    `ints` 字段和构造函数参数列表中的 `ints` 参数。


    #### 访问修饰符


    类、接口、字段和方法都使用各种访问修饰符来指示哪些其他类和接口可以查看并（可能）修改所讨论的项。Java 有四种访问修饰符：`private`、`package-private`、`protected`
    和 `public`。


    *   `private` 意味着只有同一个类中的其他成员（即字段和方法）才能查看并（对于字段而言）修改该方法或字段。私有类和接口只出现在类内部，绝不会作为独立结构出现。

    *   `package-private`（通常简称为 package）意味着同一包中的其他成员可以访问该项。`package-private` 是默认的访问修饰符，没有对应的关键字，因为
    `package` 用于指定类或接口所属的包。要声明某物具有包访问权限，则不使用任何访问修饰符。

    *   `protected` 表示只有该类的后代才能访问该项。类可以是 `protected` 的，但受保护的类通常只出现在其他类内部（这种用法称为内部类）。类似地，接口也可以是
    `protected` 的（前提是它们位于某个类内部），但这很罕见（我从未见过）。`protected` 最常用于类中的字段和方法。

    *   `public` 表示任何对象都可以访问该项。`public` 经常被使用（可能被过度使用了）。养成习惯，问问自己是否真的应该将某物设为 `public`，这是值得的。


    另一件需要了解的事情是，访问修饰符是分层的。`private` 包含 `package-private`（也就是说，如果某物能看见一个私有对象，它也能看见一个包私有对象），`package-private`
    包含 `protected`，而 `protected` 包含 `public`。当人们忘记访问修饰符是分层的时，可能会产生难以发现的问题。想象一个包含多个类的包，在该包中，某个类有一个对包可见的方法，而另一个类有一个同名的
    `protected` 方法。代码最终可能会调用错误的方法。这种情况不常发生，但一旦发生，就很难排查。


    ![images](img/square.jpg) **注意** 访问修饰符可能很棘手。在撰写这段简短描述的过程中，我遇到了各种我之前未曾考虑过的用法（这对我来说是一次学习经历）。例如，我原以为接口不能是
    `protected` 的。然而，当它们出现在类内部时，它们可以是 `protected`（或 `private`）的。`private` 和 `public`
    易于理解和使用。对于 `package` 和 `protected`，在决定使用该修饰符之前，请仔细考虑。


    #### 接口


    *接口*定义了实现该接口的类必须实现的行为。接口总是抽象的，并且它们包含的所有方法也总是抽象的。*抽象*（Java 通过 `abstract` 关键字支持）意味着该类、方法、字段或其他任何东西不能在其定义处被实例化（即创建）。必须由其他对象来实例化所讨论的项。对于接口而言，这意味着实现该接口的类必须实现接口中定义的方法（正如我们已经了解的那样，但现在你知道为什么了）。因此，接口从不实现任何东西。此外，接口及其包含的方法总是静态的。因此，每个接口（及其方法）在系统中只存在一次。


    接口通常只包含方法定义。它们也可以包含字段，但这些字段总是常量。


    考虑本章前面列出的 `Average` 接口中的 `getAverage()` 方法。如你所见，该方法没有方法体，甚至没有花括号。这是一个方法定义（也称为方法签名），而不是一个方法。任何实现该接口的类都必须实现该方法，包括其修饰符和参数。在这个例子中，实现
    `Average` 的类必须包含一个具有相同修饰符的方法。也就是说，该类必须包含一个 `public float getAverage()` 方法，该方法带有一个执行所需操作并返回一个
    `float` 值的方法体。（我们将在下一章介绍数据类型。）


    接口提供了一种便捷的方式，来确保相似的类实现相似（但不一定相同）的行为。考虑一组模拟动物王国的类。这样的模型可能有一个带有 `hunt()` 方法的 `Predator`
    接口。猫和狗都会捕猎，但它们的方式不同（猫倾向于猛扑，而狗倾向于追逐）。通过将细节留给具体的类，`Predator` 接口让我们知道捕食者会捕猎，但为每种捕食者以自己的方式捕猎留下了空间。

