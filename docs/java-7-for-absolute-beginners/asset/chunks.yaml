    \ we use the same memory area that the object already modifies, it's said to be\
    \ \"in-place.\" We can do that because Java passes memory addresses rather than\
    \ values for objects (such as an array). We can't do it for a primitive, because\
    \ Java passes copies of values for primitives. Many developers prefer in-place\
