    `GregorianCalendar` 时那样），才将 `default` 用作快捷方式。


    ### 循环


    Java 提供了三种循环结构：


    *   for

    *   while

    *   do-while


    `for` 循环是最常用的，但 `while` 和 `do`-`while` 循环当然也有其用途。


