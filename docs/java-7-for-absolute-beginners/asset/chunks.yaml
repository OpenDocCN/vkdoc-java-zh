    #### 打开文件


    你可能无法一直只编写新文件，因此也需要了解如何打开一个已存在的文件。打开文件实际上就是创建一个与文件系统中某个文件相对应的 `File` 对象。然后，通过这个
    `File` 对象，你可以对文件内容执行各种操作。我们稍后会介绍如何操作内容；现在，先为现有文件获取一个 `File` 对象。由于我们已经创建了 `myFile.txt`，现在就来获取该文件的
    `File` 对象。为了确保我们确实找到了一个文件，可以使用 `exists()` 方法来检查文件是否存在，如清单 8-3 所示。


    ***清单 8-3.** 获取现有文件的 File 对象*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `    public static void main(String[] args) {`

    `        String fileName = "C:" + File.separator +`

    `                "test" + File.separator + "myFile.txt";`

    `        File myFile = new File(fileName);`

    `        System.out.println(fileName + " exists? " + myFile.exists());`

    `    }`

    `}`


    请注意，无论文件是否存在，创建 `File` 对象的方式都是相同的。正如本章前面所述，`File` 对象并不是一个文件。`File` 对象是一个路径规范（可能在文件系统中存在，也可能不存在）以及一些其他信息，这些信息可能与实际文件对应，也可能不对应。仅仅指定一个路径并为其创建一个新的
    `File` 对象，并不会创建新文件，也不能证明现有文件存在。要完成这些操作，我们需要采取进一步的步骤，如清单 8-1 和 8-2（我们使用了 `createnewFile()`
    方法）以及清单 8-3（我们使用了 `exists()` 方法）所示。


    #### 删除文件


    有时，你也需要删除文件。这个过程与创建新文件或查找现有文件类似。清单 8-4 展示了最简单的实现方式。


    ***清单 8-4.** 删除文件*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `import java.io.IOException;`

    `public class FileTest {`


    `  public static void main(String[] args) throws IOException {`

    `    String fileName = "C:" + File.separator +`

    `        "test" + File.separator + "myFile.txt";`

    `    File myFile = new File(fileName);`

    `    if(!myFile.exists()) {`

    `      throw new IOException("Cannot delete " + fileName`

    `          + " because" + fileName + " does not exist");`

    `    } else {`

    `      myFile.delete();`

    `    }`

    `    System.out.println(fileName + " exists? " + myFile.exists());`

    `  }`

    `}`


    顺便提一下，删除文件后无需再检查文件是否存在。如果操作失败，你会收到一条错误消息。我们添加了打印语句，以便程序能产生一些输出，让我们知道它已完成。图 8-3
    显示了程序在 `test` 目录中找到名为 `myFile.txt` 的文件并将其删除后的输出（在 Eclipse 的控制台窗口中）。


    ![images](img/0803.jpg)


    ***图 8-3.** 成功删除文件的输出*


    图 8-4 显示了程序无法在 test 目录中找到并删除名为 `myFile.txt` 的文件时的输出（在 Eclipse 的控制台窗口中）。


    ![images](img/0804.jpg)


    ***图 8-4.** 删除文件失败时的输出*


    #### 处理临时文件


    *临时文件*为我们提供了一种存储数据的方式，这些数据我们可能在某个时候需要，但当前不需要，并且程序退出后也不希望保留。例如，大多数文字处理器在你处理文档时会保持一个临时文件打开。该文件有多种用途，包括在程序崩溃时提供一种至少恢复大部分工作的方法。临时文件仅在程序正常退出时才会被删除，因此崩溃会留下一个包含你工作的文件，这确实非常方便。


    `File` 类提供了一些专门用于处理临时文件的方法。这些方法允许你创建多个临时文件，而无需为每个文件想一个新名称。相反，你可以指定一个前缀（至少三个字符长）、一个后缀（如果将后缀设置为
    `null`，则默认为 `.tmp`），以及（可选地）一个目录。如果不指定目录，JVM 会在系统的临时目录中创建你的文件。在大多数系统上，默认的临时目录是用户目录的一个子目录。


    那么，让我们看看如何在清单 8-5 中创建一批临时文件。


    ***清单 8-5.** 创建临时文件*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `    public static void main(String[] args) {`

    `        String tempDirectoryName = "C:" + File.separator + "test";`

    `        File tempDirectory = new File(tempDirectoryName);`

    `        for (int i = 0; i < 10; i++) {`

    `            try {`

    `                File thisFile =`

    `                    File.createTempFile("tmp", null, tempDirectory);`

    `            } catch (Exception e) {`

    `                System.out.println("Couldn''t create temp file " + i);`

    `            }`

    `        }`

    `        System.out.println("Done creating temp files");`

    `    }`

    `}`


    `createTempFile` 方法保证在程序生命周期内创建的每个临时文件都是不同的。它不保证文件名对人类有实际意义。清单 8-6 显示了程序在我们的 `test`
    目录中创建的文件名称。


    ***清单 8-6.** 临时文件名*


    `tmp1672349819571008723.tmp`

    `tmp3234113842230809615.tmp`

    `tmp5343720775549909618.tmp`

    `tmp6194798942830449846.tmp`

    `tmp7016714774703888253.tmp`

    `tmp720922773409895465.tmp`

    `tmp7634665877605496722.tmp`

    `tmp7730975525106591320.tmp`

    `tmp799007629249445444.tmp`

    `tmp8048303951856646489.tmp`


    图 8-5 显示了在我的测试目录中创建临时文件后的情况。


    ![images](img/0805.jpg)


    ***图 8-5.** 测试目录中的临时文件*


    有些系统会创建文件并让它们在系统中保留很长时间（通常直到用户删除它们，通常是通过程序的用户界面而不是通过文件系统）。例如，Windows Live Mail
    将每封邮件存储为一个单独的文件。尽管如此，我们通常希望删除可能创建的任何临时文件。（否则，它们看起来就不太像临时文件了。）要删除我们创建的任何临时文件，只需添加一行代码，如清单
    8-7 所示。


    ***清单 8-7.** 删除临时文件*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `    public static void main(String[] args) {`

    `        String tempDirectoryName = "C:" + File.separator + "test";`

    `        File tempDirectory = new File(tempDirectoryName);`

    `        for (int i = 0; i < 10; i++) {`

    `            try {`

    `                File thisFile =`

    `                    File.createTempFile("tmp", null, tempDirectory);`

    **`thisFile.deleteOnExit();`**

    `            } catch (Exception e) {`

    `                System.out.println("Couldn''t create temp file " + i);`

    `            }`

    `        }`

    `        System.out.println("Done creating temp files");`

    `    }`

    `}`


    `deleteOnExit()` 方法告诉 JVM 在程序退出时删除与特定 `File` 对象关联的文件（或目录，或一组目录和文件）。在这种情况下，文件不会存在很长时间。然而，在一个功能更复杂的程序中，临时文件可能会在程序执行其任务期间存在相当长的时间。例如，考虑一个游戏，它正在临时文件中存储各种信息。这些文件会一直存在，直到你停止玩游戏。

