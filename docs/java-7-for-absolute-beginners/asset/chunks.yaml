    #### 关系运算符


    关系运算符用于比较事物。具体来说，它们判断一个值是否大于、小于、等于或不等于另一个值。要使关系运算符正常工作，被比较的项必须具有可比性。这听起来显而易见，但在
    Java 中具有特定含义。语言规范定义了基本类型之间可比性的含义。因此，你可以比较一个 `int` 和一个 `float` 并得到有意义的结果（JVM 会将
    `int` 提升为 `float`，然后进行比较）。只要其中一个可以强制转换为另一个值，Java 就能有意义地比较基本类型，而当它们无法转换时，Eclipse
    会给出提示。


    `>`（大于）、`<`（小于）、`>=`（大于或等于）和 `<=`（小于或等于）都适用于基本类型，但不适用于对象。相反，`instanceof` 适用于对象，但不适用于基本类型。Java
    确实提供了比较对象的方法，但不是通过任何运算符。我们将在本章后面讨论对象的比较。


    代码清单 4-12 演示了基本类型的比较。


    ***代码清单 4-12.** 比较基本类型*


    `int a = 0;`

    `float b = 1.0f;`

    `System.out.println(a > b);`


    这段代码会在控制台输出 "false"。


    `instanceof` 运算符可能有点棘手，因为一个继承自另一个类的类也是其父类的一个实例。考虑下面这个由三个类实现的小程序（见代码清单 4-13）。


    ***代码清单 4-13.** instanceof 测试*


    `package com.apress.javaforabsolutebeginners .examples.instanceofTest;`


    `public class Person {`

    `  String firstName;`

    `  String lastName;`


    `  public Person (String firstName, String lastName) {`

    `    this.firstName = firstName;`

    `    this.lastName = lastName;`

    `  }`

    `}`


    `package com.apress.javaforabsolutebeginners .examples.instanceofTest;`


    `public class Student extends Person {`

    `  String schoolName;`


    `  public Student (String firstName, String lastName, String schoolName) {`

    `    super(firstName, lastName);`

    `    this.schoolName = schoolName;`

    `  }`

    `}`


    `package com.apress.javaforabsolutebeginners .examples.instanceofTest;`


    `public class InstanceofTest {`


    `  public static void main(String[] args) {`

    `    Student student = new Student("Sam", "Spade", "Noir U");`

    `    System.out.println(student instanceof Student);`

    `    System.out.println(student instanceof Person);`

    `  }`


    `}`


    两个打印语句都会在控制台输出 "true"。毕竟，学生也是人。面向对象编程的本质（一个类总是继承另一个类）要求 `instanceof` 运算符以这种方式工作。


    `instanceof` 运算符可能会引起一些微妙的问题。特别是，如果其右操作数为 `null`，`instanceof` 运算符不会抛出错误。相反，在这种情况下它总是返回
    `false`。如果你使用了类似 `myClass instanceof myBaseClass` 的表达式，并且无意中将 `myBaseClass` 设置为
    `null`，结果将是 `false`。你可能会因此认为 `myClass` 不是 `myBaseClass` 的实例，但如果你是在与 `null` 进行比较，你实际上无法确定这一点。这是实践防御性编程的另一个好地方，确保你不会在此处得到
    `null`。


    如果你小心地确保自己了解所用类之间的关系（这是成为优秀面向对象程序员的一部分），并确保没有与 `null` 进行比较，那么你就不太会在使用 `instanceof`
    运算符时遇到麻烦。


    #### 相等运算符


    Java 有两个相等运算符：`==`（等于）和 `!=`（不等于）。（在此上下文及其他上下文中，感叹号有时被软件开发人员称为 "bang"）。相等运算符（`==`）和不等运算符（`!=`）的工作方式相同（彼此互为否定），因此我将把讨论范围限定在相等运算符上。


    Java 使用单个等号作为基本的赋值运算符（我们将在本章后面讨论赋值运算符），因此它不能使用单个等号进行比较。因此，Java（以及其他共享 Java 基本语法的语言）使用两个等号。


    Java 新手（以及那些打字不够仔细的老手）常犯的一个错误是，在应该使用两个等号（相等运算符）时使用了单个等号（赋值运算符），从而意外地将一个值赋给变量，而不是将变量的值与其它值进行比较。考虑代码清单
    4-14 中的示例：


    ***代码清单 4-14.** 意外赋值*


    `for (int counter = 0; counter < 10; counter++) {`

    `  if (counter = 0) { // 应该是 == 而不是 =`

    `    // 执行某些操作`

    `  }`

    `}`


    这段代码如果不修正，会导致无限循环。在每次迭代中，`counter` 都被设置为 0，因此它的值始终小于 10。幸运的是，Eclipse 和其他现代开发工具会在你这样做时发出警告。你仍然可以这样做，但至少你是故意为之（不过，如果你需要重置某个值，你真的应该重构你的代码）。我必须承认，我遇到过不止一次这种情况（因为打字不熟练），不过自从我开始使用
    Eclipse 以来，就再也没遇到过，这要归功于它的警告。这也是我在本书开头就让你安装 Eclipse 的原因之一。


    对于基本类型，相等运算符的工作方式与你想象的完全一致。然而，对于对象，相等运算符指示两个引用是否指向同一个实例。一如既往，示例有助于理解（见代码清单 4-15）。


    ***代码清单 4-15.** 相等运算符示例*


    `int a = 0;`

    `int b = 1;`

    `String s = "s";`

    `String sToo = "s";`

    `System.out.println(a == b);`

    `System.out.println(s == sToo);`


    这段代码对于 `a == b` 输出 "true"，对于 `s == sToo` 输出 "false"。这是因为 `s` 和 `sToo` 是指向 `String`
    对象不同实例的引用。因此，即使它们具有相同的值，在相等运算符看来它们也不相等。此外，`s == "s"` 输出 false，因为字符串字面量产生了 `String`
    类的另一个实例。


    为了比较对象（包括 `String` 类的实例），Java 程序员使用 `equals` 方法。任何其实例可以相互比较的对象都应该实现 `equals` 方法（该方法定义在
    `Object` 类中）。因为比较 `String` 对象是有意义的，所以 `String` 类实现了 `equals` 方法。这样，我们就可以使用类似于代码清单
    4-16 的代码来比较 `String` 的实例。


    ***代码清单 4-16.** 测试对象的相等性*


    `String s = "s";`

    `String sToo = "s";`

    `System.out.println(s.equals(sToo));`

    `System.out.println(s.equals("s"));`


    这两个打印语句都会在控制台输出 "true"。我们将在本章后面更深入地讨论对象的比较。


    #### 按位与运算符 (&)


    按位与运算符 (`&`) 比较两个二进制值，并将两个被比较值中对应位都为 1 的位设置为 1。像往常一样，示例有助于理解（见代码清单 4-17）。


    ***代码清单 4-17.** 按位与运算符 (&)*


    `Byte byte1 = Byte.parseByte("01010101", 2); // byte1 = 85`

    `Byte byte2 = Byte.parseByte("00111111", 2); // byte2 = 63`

    `int result = byte1 & byte2; // result = 21`


    `result` 的值是 21，因为取两个被比较值中对应位都为 1 的位，得到的二进制结果是 `00010101`，这恰好是 21 的二进制表示。

