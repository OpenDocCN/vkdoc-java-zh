- fmt: "### The Shooting Gallery Game\n\nAs the title indicates, `ShootingGallery`\
    \ is a very simple shooting gallery game. I created it mostly to show the concept\
    \ of controlling multiple items with a single timer, to show similar objects moving\
    \ at different speeds, and to show one simple way to resolve collision detection\
    \ (which means detecting when one object interacts with another – usually by running\
    \ into one another). I'll also show one way to achieve double buffering, which\
    \ makes games have less of that irritating flicker. When you write your own (no\
    \ doubt far more interesting and entertaining) games, you'll need to know how\
    \ to do those things.\n\nBefore we dive into the code, let's see what the game\
    \ looks like. [Figure 12-2](#Chapter12.html#fig_12_2) shows the `ShootingGallery`\
    \ game during play.\n\n![images](images/1202.jpg)\n\n**Figure 12-2.** The `ShootingGallery`\
    \ Game\n\nAs you can tell from the score, I hit four 10-point targets and one\
    \ 25-point target before I took the screen shot. I find the back row to be hard\
    \ to hit, but it's supposed to be that way, so I guess that's a good sign.\n\n\
    The `ShootingGallery` game consists of six classes:\n\n*   `ShootingGallery` defines\
    \ and manages the user interface.\n*   `ShootingGalleryPanel` manages the playing\
    \ area and contains the game loop.\n*   `ShootingGalleryShooter` manages the cursor.\n\
    *   `ShootingGalleryTargetRow` manages an individual row of targets.\n*   `ShootingGalleryTarget`\
    \ manages an individual target.\n*   `ShootingGallerySprites` manages the sprites\
    \ used by the game.\n\n**Listing 12-4.** The `ShootingGallery` class\n\n```\n\
    package com.bryantcs.examples.videogames;\n\nimport java.awt.Dimension;\nimport\
    \ java.awt.event.ActionEvent;\nimport java.awt.event.ActionListener;\n\nimport\
    \ javax.swing.BoxLayout;\nimport javax.swing.JFrame;\nimport javax.swing.JLabel;\n\
    import javax.swing.JMenu;\nimport javax.swing.JMenuBar;\nimport javax.swing.JMenuItem;\n\
    import javax.swing.JPanel;\n\npublic class ShootingGallery implements ActionListener\
    \ {\n\n  // Define the components\n  private ShootingGalleryPanel shootingGalleryPanel;\n\
    \  private JPanel scorePanel = new JPanel();\n  private JLabel scoreLabel = new\
    \ JLabel(\"Score: \");\n  static JLabel scoreDisplayLabel = new JLabel(\"0\");\n\
    \  private JFrame frame = new JFrame(\"Shooting Gallery\");\n  // Set up a place\
    \ to keep score (default is 0)\n  static int score;\n  // Set the game size\n\
    \  static Dimension gameDimension = new Dimension(500, 500);\n\n  // Add a menu\
    \ (just one option, Exit)\n  private void addMenu(JFrame frame) {\n    JMenu file\
    \ = new JMenu(\"File\");\n    file.setMnemonic('F');\n    JMenuItem exitItem =\
    \ new JMenuItem(\"Exit\");\n    exitItem.setMnemonic('x');\n    exitItem.addActionListener(this);\n\
    \    JMenuBar menuBar = new JMenuBar();\n    menuBar.add(file);\n    frame.setJMenuBar(menuBar);\n\
    \  }\n\n  // Setup and display the user interface\n  private void createAndShowGUI()\
    \ {\n    shootingGalleryPanel = new ShootingGalleryPanel();\n    addMenu(frame);\n\
    \    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n    frame.setExtendedState(frame.getExtendedState()|JFrame.MAXIMIZED_BOTH);\n\
    \    shootingGalleryPanel.setPreferredSize(gameDimension);\n    scorePanel.setPreferredSize(new\
    \ Dimension(400, 50));\n    scorePanel.setLayout(new BoxLayout(scorePanel, BoxLayout.X_AXIS));\n\
    \    scorePanel.add(scoreLabel);\n    scorePanel.add(scoreDisplayLabel);\n   \
    \ frame.getContentPane().add(scorePanel);\n    frame.getContentPane().add(shootingGalleryPanel);\n\
    \    frame.getContentPane().setLayout(new\n      BoxLayout(frame.getContentPane(),\
    \ BoxLayout.Y_AXIS));\n    frame.pack();\n    frame.setVisible(true);\n    frame.setResizable(false);\n\
    \  }\n\n  // The main method\n  public static void main(String[] args) {\n   \
    \ ShootingGallery shootingGallery = new ShootingGallery();\n    shootingGallery.createAndShowGUI();\n\
    \  }\n\n  // Listen for the user choosing Exit from the menu\n  //\n  public void\
    \ actionPerformed(ActionEvent e) {\n    if (e.getActionCommand() != null) {\n\
    \      if (e.getActionCommand().equals(\"Exit\")) {\n        System.exit(0);\n\
    \      }\n    }\n  }\n}\n```\n\nAs usual, the `ShootingGallery` class just sets\
    \ up the window and handles clicks to the menu and the window's controls (minimize\
    \ and close, in this case). I disabled the resize control on the window, both\
    \ because it simplified the math in the game and because it's something you might\
    \ want to know how to do someday. The following line removes the ability to resize\
    \ the window:\n\n**Listing 12-5.** Preventing Resizing\n\n```\n    frame.setResizable(false);\n\
    ```\n\nI try to not restrict the user's actions unless I have a good, user-friendly\
    \ reason to do so. So I would not normally have removed the ability to resize\
    \ the window. Again, though, I thought it would make a good example, and it simplified\
    \ the programming a bit. Restricting the user's actions to make your own life\
    \ easier is poor practice though (it's a form of intellectual laziness) – don't\
    \ do it unless you're doing it just to show how it's done.\n\nOne last thing to\
    \ note about the `ShootingGallery` class (and the game) is that it has no start\
    \ or stop control. It just runs continuously without end. I left out a number\
    \ of common features that you might expect in a game so that you can implement\
    \ them yourself. I've added a list of those ideas near the end of the chapter.\n\
    \n**Listing 12-6.** The `ShootingGalleryPanel` class\n\n```\npackage com.bryantcs.examples.videogames;\n\
    \nimport java.awt.Dimension;\nimport java.awt.Graphics;\nimport java.awt.event.ActionEvent;\n\
    import java.awt.event.ActionListener;\n\nimport javax.swing.BoxLayout;\nimport\
    \ javax.swing.JPanel;\nimport javax.swing.Timer;\n\npublic class ShootingGalleryPanel\
    \ extends JPanel implements ActionListener{\n\n  private static final long serialVersionUID\
    \ = 1L;\n\n  // The cursor, controlled by the player\n  private ShootingGalleryShooter\
    \ shooter;\n\n  // The sprites that march down the game area\n  private ShootingGalleryTargetSprites\
    \ sprites;\n\n  // The width of the widest target\n  public final static int TARGET_SPACE\
    \ = 50;\n\n  // A tick counter to control the animation\n  private int ticks;\n\
    \n  // Three rows of targets\n  static ShootingGalleryTargetRow row1, row2, row3;\n\
    \n  // The timer, to control the game loop\n  private Timer timer = new Timer(20,\
    \ this);\n\n  // The constructor\n  public ShootingGalleryPanel() {\n\n    //\
    \ Set up the sprites\n    sprites = new ShootingGalleryTargetSprites();\n    sprites.init();\n\
    \n    // Set a horizontal layout, because we'll\n    // add three vertical rows\
    \ to the left side\n    setLayout(new BoxLayout(this, BoxLayout.X_AXIS));\n\n\
    \    // Set up and add the left-most row (the smallest and most valuable targets)\n\
    \    row1 = new ShootingGalleryTargetRow(sprites.getSpriteBySize(25), 50);\n \
    \   row1.setPreferredSize(new Dimension(TARGET_SPACE + 10, getHeight()));\n  \
    \  add(row1);\n\n    // Set up and add the middle row (slower and worth less)\n\
    \    row2 = new ShootingGalleryTargetRow(sprites.getSpriteBySize(40), 25);\n \
    \   row2.setPreferredSize(new Dimension(TARGET_SPACE + 10, getHeight()));\n  \
    \  add(row2);\n\n    // Set up and add the right-most row (slowest and least valuable\
    \ targets)\n    row3 = new ShootingGalleryTargetRow(sprites.getSpriteBySize(50),\
