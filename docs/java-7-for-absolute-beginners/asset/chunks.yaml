    #### While 循环


    正如我们刚刚学到的，`for` 循环处理的是 `while` 循环更通用用途中的一种特定情况。`for` 循环（通常）处理可以计数的事物。而 `while`
    循环只要某个条件为 `true` 就会持续循环。`while` 循环只有一个参数：一个可以被求值为 `true` 或 `false` 的表达式。


    在进一步深入之前，我们先来看一个最简单的 `while` 循环，如代码清单 5-14 所示。


    ***代码清单 5-14**。一个简单的 while 循环*


    `while (counter < 10) {`

    `  System.out.println(counter);`

    `}`


    `while` 循环没有显式的初始化变量或递增语句；你必须自己提供这些功能。（发明 `for` 循环的原因之一，就是将循环的三个部分——初始化、测试和递增——集中在一个地方。）虽然初始化和递增通常出现在
    `while` 循环附近（初始化）或内部（递增），但它们并不像在 `for` 循环中那样是 `while` 循环语法的一部分。因此，让我们看一个更完整的示例，它除了测试之外，还包含了初始化和递增（参见代码清单
    5-15）。


    ***代码清单 5-15**。一个更完整的 while 循环*


    `int counter = 0;`

    `while (counter < 10) {`

    `  System.out.println(counter);`

    `  counter++;`

    `}`


    这个（仍然简单的）示例展示了 `while` 循环的典型结构：声明一个变量，在 `while` 循环顶部测试该变量，在 `while` 循环中执行一些工作，并在
    `while` 循环中递增该变量。测试失败后，`while` 循环结束，`while` 循环下方的代码开始执行。


    你可以通过使用 `while(true)` 创建一个永远运行的 `while` 循环（或者更可能的情况是，直到循环体中的某个 `if` 语句检查的条件触发
    `break` 语句为止）。这种结构在某些情况下很有用，但并非安全之举。精明的程序员会尽量确保循环不会永远运行下去（这被称为无限循环）。如果由于意外的输入数据，循环体中的中断条件从未被触发，那该怎么办？那么你的程序就会卡住（如果它恰好正在写入文件，这可能会带来很多麻烦——你可能会因此迅速给操作系统造成问题）。如果你觉得必须使用
    `while(true)`，请务必进行彻底测试。


    `while` 循环的另一个用途是，在不知道每次尝试需要多长时间的情况下，尝试某件事一段固定的时间。例如，假设一个邮件客户端尝试连接邮件服务器一分钟，然后放弃（即超时）。代码清单
    5-14 展示了一种等待连接的方法。


    ***代码清单 5-14**。等待事件的 while 循环*


    `boolean connected = false;`

    `long now = System.currentTimeMillis();`

    `long oneMinuteFromStart = System.currentTimeMillis() + 60000;`

    `while (!connected && now < oneMinuteFromStart) {`

    `  System.out.println("正在尝试连接....");`

    `  if (MailServer.connect()) {`

    `    connected = true;`

    `    break;`

    `  }`

    `  // 暂停两秒钟`

    `  // 也让其他进程运行`

    `  try {`

    `    System.out.println("（让其他进程运行）");`

    `    Thread.sleep(2000);`

    `  } catch (Exception e) {`

    `    e.printStackTrace();`

    `  }`

    `  // 为下一次比较重置 now`

    `  now = System.currentTimeMillis();`

    `}`

    `if (connected) {`

    `  System.out.println("已连接到邮件服务器");`

    `} else {`

    `  System.out.println("尝试连接到邮件服务器时超时");`

    `}`


    在实际应用程序中，连接服务器的代码还会检查许多异常，并且不会打印到控制台，而是为用户更新一个状态窗口（其中包含一个取消按钮）。


    注意 `break` 语句。如果我们确实连接上了，我们就不想等待其余代码运行（尤其是因为它包含一条休眠指令）。因此，我们在连接后跳出 `while` 循环。方便之处在于，如果第一次尝试就连接成功，我们永远不需要等待，也永远不会循环。我们像执行线性代码一样快速通过（除了
    `while` 中比较的开销），然后就完成了。如果我们通常第一次尝试就能连接成功，那将是一个不错的小优化。我们将在本章后面详细讨论 `break` 语句。


    还要注意 try-catch 块以及其中的 `Thread.sleep(2000)` 调用。`Thread.sleep()` 方法告诉当前线程休眠若干毫秒，让其他进程运行。换句话说，它让你的进程休息时，让其他进程完成一些工作。如果没有它，JVM
    在你的 `while` 循环退出之前不会尝试做任何其他事情。这通常是一种不好的做法，因为它可能会在一切等待你的代码时导致整个应用程序停止。让你的线程休眠多长时间取决于许多因素（你所做的事情需要多长时间，你所做的事情有多重要，等等）。


    ![images](img/square.jpg) **提示** 当你做任何需要计时的事情时，几乎总是应该让当前线程休眠一小会儿，以便让其他进程工作。


    #### Do-while 循环


    Do-while 循环的工作方式与 `while` 循环非常相似。区别在于，条件检查是在代码块运行之后进行的。换句话说，测试位于循环的底部而不是顶部。这意味着代码至少会运行一次。因为我们总是希望邮件服务器连接器至少尝试一次，所以这是将其转换为
    do-while 循环的绝佳案例（参见代码清单 5-15）。


    ***代码清单 5-15**。Do-while 循环*


    `boolean connected = false;`

    `long now = System.currentTimeMillis();`

    `long oneMinuteFromStart = System.currentTimeMillis() + 60000;`

    `do {`

    `  System.out.println("正在尝试连接....");`

    `  if (MailServer.connect()) {`

    `    connected = true;`

    `    break;`

    `  }`

    `  // 暂停两秒钟`

    `  // 也让其他进程运行`

    `  try {`

    `    System.out.println("（让其他进程运行）");`

    `    Thread.sleep(2000);`

    `  } catch (Exception e) {`

    `    e.printStackTrace();`

    `  }`

    `  // 为下一次比较重置 now`

    `  now = System.currentTimeMillis();`

    `} while (!connected && now < oneMinuteFromStart);`

