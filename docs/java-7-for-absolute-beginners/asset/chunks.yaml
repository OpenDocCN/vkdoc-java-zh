    #### return 语句


    最后一种分支指令是 `return` 语句，它有两种形式。如果方法不返回任何内容（即其返回类型为 `void`），则 `return` 语句不带参数。如果方法返回一个值或对象（即返回类型不是
    `void`），则 `return` 语句带一个参数（即要返回的值或对象）。`return` 语句会停止方法内的任何进一步处理，并将处理流程返回到调用该方法的代码。让我们来看一个返回字符串的方法示例（参见清单
    5-21）。


    ***清单 5-21.** 使用 return 停止处理*


    `public String getAuthorForDetective (String detective) {`

    `  if(detective.equals("Sam Spade")) {`

    `    return "Dashiell Hammett";`

    `  }`

    `  if (detective.equals("Sherlock Holmes")) {`

    `    return "Sir Arthur Conan Doyle";`

    `  }`

    `  if (detective.equals("Charlie Chan")) {`

    `    return "Earl Derr Biggers";`

    `  }`

    `  return "Unknown author";`

    `}`


    如本例所示，一旦我们找到与虚构角色匹配的作者，就会停止查找并返回该作者的名字。如果所有条件都不匹配，我们就承认不知道作者的名字。我们不需要 `else` 语句，因为每个
    `if` 语句都包含一个 `return` 语句；在每个 `if` 语句处，如果匹配则停止处理，不匹配则继续处理，因此 `else` 是多余的语法。这种写法在
    Java 程序中很常见。当你能够按可能性大小对匹配项进行排序时，这种方法尤其有效。这样，你通常可以尽可能少地执行处理，从而实现便捷的优化。例如，如果你恰好为福尔摩斯纪念图书馆（如果存在这样的机构）编写代码，你会把“Sherlock
    Holmes”的匹配项放在最前面。


    让我们来看清单 5-22 中一个类似的示例，这是一个返回类型为 `void` 的方法。


    ***清单 5-22.** 使用不带返回值的 return*


    `public void printAuthorForDetective (String detective) {`

    `  if(detective.equals("Sam Spade")) {`

    `    System.out.println("Dashiell Hammett");`

    `    return;`

    `  }`

    `  if (detective.equals("Sherlock Holmes")) {`

    `    System.out.println("Sir Arthur Conan Doyle");`

    `    return;`

    `  }`

    `  if (detective.equals("Charlie Chan")) {`

    `    System.out.println("Earl Derr Biggers");`

    `    return;`

    `  }`

    `  System.out.println("Unknown author");`

    `}`


    同样，`return` 语句会停止方法内的进一步处理，并将处理流程返回到调用该方法的代码。如果我们没有 `return` 语句，该方法会打印出它找到的任何匹配项（如果有的话），然后打印“Unknown
    author”。因此，省略 `return` 语句不仅会导致不必要的处理，还会产生一个 bug。我们不需要在最后一条语句之后添加 `return` 语句，因为方法会在执行完最后一条指令后隐式返回。


    ### 本章小结


    本章涵盖了被许多程序员视为编程主要目的的内容：识别条件并为每种条件执行适当的操作。如果我们无法根据接收到的输入来改变我们的行为，那么任何程序都无法达到实现有用功能的复杂度。为此，每种编程语言都至少提供了几种在代码中改变执行路径的方法。


    正如我们在本章中学到的，Java 提供了：


    *   `if` 和 `if`-`else`（以及 `else if`）语句，用于简单比较

    *   `switch` 块，用于比较大量值

    *   `for`（以及增强型 for 或“for each”）循环，用于编写易读的循环

    *   `while` 循环，用于在满足条件之前持续执行某项操作

    *   `do`-`while` 循环，用于将条件判断放在循环末尾

    *   `break` 语句，用于跳出当前代码块

    *   `continue` 语句，用于继续处理下一项

    *   `return` 语句，用于声明方法执行完毕并返回一个值


    得益于所有这些控制逻辑流程的可能性，我们可以编写出能够正确处理任意数量的输入、输出以及中间处理步骤，同时仍然易于阅读的程序。


    ## 第 6 章


    ## 面向对象编程


    Java 是一种面向对象的语言。这意味着 Java 允许程序员通过开发对象并指定对象之间的关系来开发软件。这些关系在对象内部定义，因此对象是 Java 中任何软件开发工作的核心焦点。


    ### 对象


    那么什么是对象？从技术角度来说，*对象*是类的一个实例（如果类是静态的或单例的——即只能有一个实例的类，那么对象也可以是类本身）。那么实例到底是什么？可以这样理解：类定义是实例的定义，而由该类定义的特定项就是一个实例。假设我们有一个定义文档（标题、作者等）的类。那么描述特定文档的对象就是一个实例。


    通常，对象是代表系统中某个重要部分的软件对象。（系统中不重要的部分应该被消除——大多数软件开发人员天生或很快就会成为极简主义者。）有时，这些对象对应于实际的物理物品。例如，运输软件可能有一个代表运输容器的类，该类的每个实例都对应世界上某个地方的一个真实运输容器。


    然而，更常见的情况是，软件中的对象定义的是抽象项——即并非真实存在的事物。例如，`Math` 类定义了一个圆周率常量。你无法触摸到一个数学常量，尽管它对你来说可能感觉很真实（上足够多的数学课，这类东西就会显得非常真实）。但即使是数学常量，也比软件开发中出现的某些东西更不抽象。这是因为像
    Java 这样的面向对象语言允许我们定义纯抽象的对象，例如 `Shape` 类。在许多与形状相关的系统中，`Shape` 本身永远不能被实例化；你必须创建另一个扩展了
    `Shape` 的类（例如 `Circle` 类）的实例。有时，一个抽象类会扩展另一个抽象类，从而形成多层抽象。


    让我们考虑其他一些例子。以下都是我为一个或另一个系统开发过的对象：


    *   一个处理按钮点击的类

    *   一个包含三维结构（如金字塔或球体）信息的类

    *   一个描述文档中段落（字体样式、字体大小等）的类

    *   一个定义打印作业的类（例如在文字处理器中点击“打印”时创建的类）


    请注意，我始终说的是“一个类”。Java 中的所有对象都是类。枚举是一种特殊的类，因为每个枚举都有一个由编译器提供的隐式类。Java 也有基本类型和接口，但基本类型和接口不是对象。正如我们在前面章节中看到的，基本类型定义值，但它们不是对象。我们稍后会解释为什么基本类型和接口都不是对象。现在，只需记住
    Java 对象是类的一个实例，而类是定义某些有用功能的代码。即使是抽象类也定义了有用的东西，尽管它依赖于扩展它的类来提供剩余的信息。


    面向对象语言支持三个重要特性：


    *   封装

    *   继承

    *   多态


    我们依次来看这些特性。

