    ### 关于粒度的课程


    为了让三种动物发出它们各自的声音，却用了五个类和四个接口，这看起来对象数量似乎有点多。老实说，如果我要编写一个只输出三行文本的程序，我只会写一个类。然而，动物王国示例的目的是为了展示如何在
    Java 中建模一个（并非十分）复杂的系统。


    如果我真的要编写一个模拟动物王国的系统，我会使用更多的类。首先，如果我是认真做这件事，我不会将通用对象传递给 `eat` 方法。我会有一个名为 `Food`
    的抽象类，以及名为 `FreshMeat`、`Carrion` 和 `PlantMatter` 的具体类，并且很可能还会有这些类的子类。


    如果你将程序“分解”成尽可能多的类和接口，你将获得两个好处：


    *   **可扩展性**

    *   **可维护性**


    **可扩展性**意味着你可以轻松地让程序做更多当前做不到的事情。以我们的动物程序为例，我们可以快速添加更多动物，并让这些动物做更多事情（例如行走、游泳、玩耍和睡觉）。如果我们扩展程序，我们可能还会扩展食物的细节，例如让
    `PlantMatter` 类拥有 `Nut` 和 `Grain` 子类。


    **可维护性**意味着当你发现错误时，可以轻松找到代码出错的位置。如果你所有的代码都集中在少数几个类中（或者最糟糕的情况，只有一个类），那么定位问题就会更加困难。当然，调试器可以带你到正确的代码行，但你无法知道问题出在动物的定义上、哺乳动物的定义上，还是其行为（例如捕食者或食草动物）的定义上。创建多个类和接口极大地有助于调试，因为你可以看到是哪一部分包含了问题点。换句话说，粒度使得创建无错误的程序变得更加容易。


    真实的程序需要粒度，优秀的程序员会努力实现它。


    ### 按引用传递与按值传递


    **按引用传递**和**按值传递**指的是信息如何从一个对象传递到另一个对象。在 Java 中，几乎所有信息的传递都是通过方法进行的，但信息也可以通过对象内部的字段传递。


    严格来说，Java 只使用按值传递。然而，它传递的值根据传递的内容而有很大不同。对于基本类型，Java 传递的是该基本类型的一个副本。因此，如果你将一个 `int`
    传递给一个方法，该方法接收到的是该 `int` 的一个副本，而不是原始的 `int`。对于对象，Java 传递的是一个指针。**指针**是对象在内存中的地址。这个微妙的区别让许多
    Java 新手开发者感到困惑。几个例子应该能（我希望）阐明这个问题（参见清单 6-16）。我说“我希望”，是因为这个话题甚至会让经验丰富的开发者感到棘手。


    ***清单 6-16.** 按引用传递与按值传递*


    `package com.apress.java7forabsolutebeginners .examples.hello;`


    `public class IntegerWrapper {`


    `  public int objectInt = 0;`

    `}`


    `package com.apress.java7forabsolutebeginners .examples.hello;`


    `public class Hello {`


    `  static int primitiveInt = 0;`

    `  static IntegerWrapper intWrapper = new IntegerWrapper();`


    `  public static void main(String[] args) throws Exception {`

    `    passBy(primitiveInt, intWrapper);`

    `    System.out.println("primitiveInt = " + primitiveInt +`

    `        "; intWrapper.objectInt = " + intWrapper.objectInt);`

    `  }`

    `    public static void passBy(int primitiveInt, IntegerWrapper intWrapper) {`

    `    primitiveInt++;`

    `    intWrapper.objectInt++;`

    `  }`

    `}`


    如你所见，这个程序有两个类：`IntegerWrapper` 和 `PassByTest`。`IntegerWrapper` 是一种将基本类型转换为对象的方法（顺便说一句，千万不要真的像这样编写对象——这是一种不好的形式，但为了尽可能简单地说明问题，这样做是合理的）。`PassByTest`
    演示了按引用传递和按值传递。当我们运行 `PassByTest` 时，它的输出是 `primitiveInt = 0; intWrapper.objectInt
    = 1`。


    当你将一个基本类型传递给一个方法时，JVM 会保留原始值，并创建一个具有相同值的新基本类型（字面意义上的副本）供方法使用。因此，JVM 拥有两个值：`PassByTest`
    中的原始 `primitiveInt` 字段，以及 `passBy` 方法中的 `primitiveInt` 参数。这就是问题的核心所在：因为 JVM 创建了一个新的基本类型，所以原始值永远不会被修改。


    即使 `passBy` 方法返回了基本类型的值，它也不会改变原始值。在我们重新赋值之前，原始值始终保持其最初设置的值（本例中为 0）。如果我们将方法的返回值赋给原始的基本类型变量，那就可以生效。但同样，我们有两个不同的值，我们将新值（由方法创建）赋给了旧值。请考虑清单
    6-17 中修改后的 `PassByTest` 类。


    ***清单 6-17.** 为 passBy 方法添加返回值的 PassByTest*


    `package com.apress.java7forabsolutebeginners .examples.hello;`


    `public class Hello {`


    `  static int primitiveInt = 0;`

    `  static IntegerWrapper intWrapper = new IntegerWrapper();`


    `  public static void main(String[] args) throws Exception {`

    `    passBy(primitiveInt, intWrapper);`

    `    System.out.println("primitiveInt = " + primitiveInt +`

    `        "; intWrapper.objectInt = " + intWrapper.objectInt);`

    `  }`

    `    public static int passBy(int primitiveInt, IntegerWrapper intWrapper) {`

    `    primitiveInt++;`

    `    intWrapper.objectInt++;`

    `    return primitiveInt;`

    `  }`

    `}`


    现在 `passBy` 方法返回一个 `int`，但输出保持不变（`primitiveInt` 仍然是 0）。我知道我已经反复强调过这一点，但再次说明，方法中的
    `primitiveInt` 与类中的 `primitiveInt` 字段是不同的基本类型变量。请记住，编译器在调用方法时会创建它的一个副本。


    现在，让我们看看 `IntegerWrapper.objectInt` 发生了什么。因为 `IntegerWrapper` 是一个对象，所以传递的值是它在内存中的地址（即指向该对象的指针）。内存中只有一个名为
    `intWrapper` 的 `IntegerWrapper` 对象（因为我们只对该类使用了一次 `new` 关键字）。因此，对 `intWrapper`
    所做的任何操作都是针对同一个对象进行的。因此，当我们递增 `intWrapper.objectInt` 时，这个更改会传回 `main` 方法，因为 `main`
    方法仍然查看的是内存中的同一个位置。也就是说，`intWrapper` 仍然位于内存中的同一位置，因此我们可以更改那个对象，而无法更改基本类型。


    如果这一切看起来令人困惑，那你并不孤单。这个问题也曾让我困惑不已，以至于三十年后，我仍然清楚地记得我第一次意识到某些东西（实际上是 Fortran 中的一个函数）是基于按引用传递模型工作时的情景。这是一个棘手的概念，但你必须掌握它才能在
    Java（以及许多其他语言）中编程。


    顺便说一句，Java 按引用传递对象有其特殊原因。假设你有一个复杂的对象。这样的类可能包含几个字段，其中许多字段本身可能又是对其他对象的引用（回想一下组合技术），以此类推，可以达到你能想象的任何深度（对象栈，正如人们所称，通常有很多层）。这样一个对象的值到底是什么？为了给每个将该对象作为参数的方法创建一个临时副本，会消耗多少内存和处理时间？如果我们递归地使用这样一个对象（即对象可以修改自身），会发生什么？如果你思考这些问题片刻，你就会明白为什么对象是按引用（即作为内存地址）传递的。否则，Java
    程序的创建将变得异常困难，并且性能会比现在差得多。

    '
- fmt: '### Summary


    Many books have been written (and no doubt more books will be written) on object
    modeling. It''s a fundamental part of object-oriented programming, and it''s easy
    to fall into bad practices. Mastering object modeling requires both experience
    and study: experience to see how object models actually work and study to be aware
    of the issues. This chapter presents one simple example (a few members of the
    animal kingdom), but it''s by no means a complete treatment of object modeling.


    Along the way, we learned when to use abstract classes, `static` and `final` methods,
    and `static` fields. We also learned why we generally want fields to be `private`
    and have get methods rather than having the field be visible outside the class.


    We also learned a bit about the value of granular programming (also known as “chunking”
    and modularity and many other similar names). Remember to “chunk” your programs
    into classes and interfaces, both to make them easier to understand and to make
    them easier to debug when problems arise.


    Finally, we dove into the thorny theoretical issue of pass-by-reference versus
    pass-by-value. In particular, we learned that Java is strictly pass-by-value.
    However, some of those values are pointers (that is, memory addresses at which
    objects reside). Consequently, modifying an object that has been passed modifies
    the original object, whereas modifying a primitive modifies only a local copy
    of the primitive rather than the original.


    ## C H A P T E R 7


    ## Writing a User Interface


    Most of the people who want to develop software get into it to write programs
    that have rich user interfaces of some sort. That rich user interface might be
    through a set of windows, such as programs like Word or many games use, or through
    a web browser. However, a substantial community of developers largely develops
    programs that have no user interface. They write programs such as device drivers
    (the software that lets something like a mouse work with a computer), services
    (programs that provide information to other programs outside of the user interface),
    and database engines (which usually manage data in such a way that many programs
    can access that data). So there''s plenty of work to do outside of user interfaces.
    Still, though, the visible part of the job attracts a lot of people to the profession,
    and there''s nothing wrong with that.


    This chapter shows you how to develop a user interface with the most commonly
    used of Java''s built-in user-interface toolkits: Java Swing. We start with some
    simple basics and we end with an implementation of a Minesweeper game. After all,
    why not have a little fun when we''re done? (And I bet a lot of the folks who
    buy this book would like to write a game. That works for me; I like games, too.)


    ### Java Swing: The Basics


    Java Swing is a large toolkit that includes support for all the things that you
    generally (and some things you don''t generally) see in a non-web user interface:
    windows, buttons (with text, images, both, or neither), option lists, menus, labels,
    text boxes, text areas, checkboxes, droplists, drawing areas, file-selection dialogs,
    file save dialogs, other dialogs, and so on. In short, Swing offers all the tools
    you need to write almost any program. Some specialized programs might require
    interface objects that Swing doesn''t have, but other toolkits probably don''t
    have them, either. Also, Swing does include the ability to make new kinds of interface
    objects, though that''s beyond the scope of this book.


    Swing uses the Java Foundation Classes (JFC). The JFC is another toolkit that
    supports the creation of applications that can run on many different operating
    systems (such as Windows, Unix, and MacOS). Swing is one of several toolkits supported
    by JFC. Others include Java2D and the Abstract Window Toolkit (AWT). We use parts
    of the AWT as we work on our Swing application. For example, Java''s `Color` class
    is part of the AWT.


    Some people dislike Swing, claiming that it''s overly complex and slow. Those
    criticisms fall on any UI toolkit, though. Swing is verbose but not more verbose
    than other UI toolkits that I''ve used. When you need to specify a lot of properties
    (size, font, color, placement on the screen, conditional presence, and so on),
    it takes a number of lines of code for each object to specify all that. That''s
    the nature of the job, regardless of toolkit. As for speed, Swing can perform
    as well as other UI toolkits, though you have to know a great deal about the toolkit
    to get the most from it. Again, that''s also true of other UI toolkits. The code
    in this book is not optimized for speed, by the way. I just show you the basics.
    To teach you everything about Swing, I''d have to write another (very likely larger)
    book.'
