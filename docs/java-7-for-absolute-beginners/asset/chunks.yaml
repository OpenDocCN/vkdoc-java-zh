- fmt: "### Animating Multiple Items\n\nThis example shows one way to animate multiple\
    \ items at once. In this case, we use an object-oriented approach to the problem\
    \ (Java is an object-oriented language, after all). In particular, we create a\
    \ class for the things we want to animate and then create multiple instances of\
    \ that class. Being a simple example, we use the same class for all the animating\
    \ items. However, you can use the same technique to animate different kinds of\
    \ objects. For example, a tank (an instance of one class) might shoot a bullet\
    \ (an instance of a different class) at a bunker (an instance of a third class).\n\
    \nThe trick is to have each object draw itself and then iterate through them,\
    \ letting each one draw itself in turn. In that way, the calling class needs to\
    \ know nothing about how to draw the objects and can focus on the timing and user\
    \ interface. This kind of organization embodies one of the principles of object-oriented\
    \ programming, encapsulation, and embodies a primary goal of nearly all software\
    \ systems, separation of concerns (meaning that each different thing a program\
    \ can do should be handled by a different part of the program). Those principles\
    \ are part of the advantage of object-oriented programming, because they make\
    \ designing programs and finding errors much easier. We get to finding errors\
    \ in the next chapter.\n\nTo illustrate how to animate multiple objects at the\
    \ same time, we create a simple fireworks program. When the user clicks the `Go`\
    \ button, it draws fireworks on the screen, in sets of four. [Figure 10-3](#Chapter10.html#fig_10_3)\
    \ shows the Fireworks program in action.\n\n![images](images/1003.jpg)\n\n***Figure\
    \ 10-3.** The Fireworks program in action*\n\nBy the way, even with a simple animation\
    \ program such as Fireworks, a screenshot does not do it justice. It's the nature\
    \ of animation that no static image of part of the animation can compare to the\
    \ actual animation. So please run the programs in this chapter to see how they\
    \ really look. I hope you've been running the programs in the book all along,\
    \ but, if not, you need to do so in this chapter if you want to have a real sense\
    \ of what they do. I suggest you then customize the programs to create your own\
    \ versions and ultimately your own original animations.\n\nThe `Fireworks` class\
    \ works similarly to the `ScootBall` class, except for one important difference:\
    \ the `Fireworks` class uses a `Timer` object to control the animation. The `Timer`\
    \ class provides instances an easy way to trigger a process (not just animations,\
    \ but any process) every so often. Because the timer is independent of the drawing\
