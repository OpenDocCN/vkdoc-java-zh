  raw: 'In this fashion, we''ve parsed a line containing multiple records. We could
    then add code to write each match to a separate line in a file or otherwise manipulate
    each of the matching values. This kind of parsing is a common task in software
    development, and regular expressions offer one good way to do it.


    As I have indicated, regular expressions can get a lot more complicated. The following
    regular expression removes "Sam" from each entry that starts with “Sam”:


    `S(?!am)|(?<!S)a|a(?!m)|(?<!Sa)m|[^Sam](.*?;)`


    Its output is:


    `Found a match for  Spade; beginning at 3 and ending at 10`

    `Found a match for Yosemite Sam; beginning at 10 and ending at 23`

    `Found a match for  Merlotte; beginning at 26 and ending at 36`

    `Found a match for wise Gamgee; beginning at 39 and ending at 51`


    The code to also remove the “Sam” in “Yosemite Sam” would be even more complex.
    As it happens, negating a group is one thing that regular expressions don''t make
    easy. In those cases, it''s often best to mix regular expressions with other `String`
    operations and to pass the result of one expression to another regular expression
    (a process known as chaining). Those techniques let you manage the complexity
    of your regular expressions and may offer better performance than a single complex
    regular expression.


    If you want to know more about regular expressions, start with the official Regular
    Expression Tutorial at [http://download.oracle.com/javase/tutorial/essential/regex/index.html](http://download.oracle.com/javase/tutorial/essential/regex/index.html)


    ### Summary


    This chapter covered the things that benefit from pattern matching: generics and
    regular expressions. About generics, we learned that:


    *   We can specify the kind of content that goes into a collection.

    *   Thanks to an improvement introduced in Java 7, we can use the diamond specifier
    (<>) to shorten our code a bit, so long as the compiler can determine the type
    from earlier in the line.

    *   Generics can have multiple parameters.

    *   We can nest generic parameters to ensure we get the proper kinds of objects
    at any depth.

    *   We can use wildcards within generic parameters, to accommodate similar objects
    (any object that extends a particular class or implements a particular set of
    interfaces or both).

    *   Generics let us catch problems at coding time rather than at run time, saving
    time and embarrassment.


    About regular expressions, we learned:


    *   How to instantiate the member classes (`Matcher` and `Pattern`) of the `java.util.regex`
    package.

    *   What each of the metacharacters does.

    *   How to combine the metacharacters in a number of useful ways.

    *   How to make a pattern be reluctant (match the fewest possible characters)
    rather than greedy (match the most possible characters).

    *   That regular expressions can become very complex and a bit about how to manage
    that complexity.


    This chapter covered two language features that I hope you will find useful as
    you develop your own programs. I especially hope that you''ll use generics any
    time you use a collection, as you should embrace best practices whenever you can.
    As for regular expressions, remember that they are supposed to make things simpler.
    If you find that a regular expression is too hard to figure out, break it up with
    other `String` operations and use multiple regular expressions rather than one
    big one.


