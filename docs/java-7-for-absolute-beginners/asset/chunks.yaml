- fmt: "### Constructors\n\nThe `AverageImpl` class includes a constructor, as shown\
    \ in [Listing 2-11](#Chapter02.html#list_2_11).\n\n**Listing 2-11.** A constructor\n\
    \n```\npublic AverageImpl(int[] ints) throws IllegalArgumentException {\n    if\
    \ (ints.length == 0){\n        throw new IllegalArgumentException(EXCEPTION_MESSAGE);\n\
    \    }\n    this.ints = ints;\n}\n```\n\nConstructors look like methods but aren't.\
    \ Notice the lack of a return type and the name being identical to the class name.\
    \ They are called when we first create an object and enable us to set up the object\
    \ before we do anything with it. Creating the object is called *instantiation*.\n\
    \nWhat needs to be done varies tremendously by class. Many constructors (such\
    \ as the one shown in this example) set some values. Other classes might create\
    \ other objects, open a database connection or a file, or start some other process\
    \ (and the possibilities don't stop there).\n\nIf you don't define a constructor,\
    \ Java still creates a default constructor, to enable the `new` keyword to work.\
    \ Otherwise, no one would ever be able to create an instance of your class. Constructors\
    \ can have all the usual access modifiers.\n\nYou can also create multiple constructors\
    \ for a single class. For example, suppose we want to provide a handy way to average\
    \ any other number with 2. We can do that with a constructor such as in [Listing\
    \ 2-12](#Chapter02.html#list_2_12):\n\n**Listing 2-12.** Another constructor\n\
    \n```\npublic AverageImpl(int otherNumber) {\n    ints = new int[] {2, otherNumber};\n\
    }\n```\n\nNow we have two ways to create an instance of the `AverageImpl` class.\n\
    \n![images](images/square.jpg) **Note** The `this` keyword is a reference to the\
    \ object the class defines. In this case, the `this` keyword is necessary to distinguish\
    \ the `ints` field in the class from the `ints` argument in the constructor's\
    \ argument list.\n\n### Access Modifiers\n\nClasses, interfaces, fields, and methods\
    \ all use various access modifiers to indicate which other classes and interfaces\
    \ can see and (potentially) modify the item in question. Java has four access\
    \ modifiers: `private`, `package-private`, `protected`, and `public`.\n\n- `private`\
    \ means that only the other members (that is, fields and methods) within a class\
    \ can see and (for fields) modify the method or field at hand. Private classes\
    \ and interfaces appear only within classes, never as stand-alone constructs.\n\
    - `package-private` (often just called package) means that other members of the\
    \ same package have access to the item. `package-private` is the default access\
    \ modifier and does not have a keyword, because `package` is used to specify the\
    \ package for a class or interface. To declare package access for something, use\
    \ no access modifier.\n- `protected` indicates that only descendants of the class\
    \ can access the item. Classes can be protected, but protected classes generally\
    \ appear only within other classes (an idiom called an inner class). Similarly,\
