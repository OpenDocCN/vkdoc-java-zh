    `MineSweeperMouseListener` 类并不复杂，但值得将此功能移入其自己的类中，以简化 `MineSweeper` 类。这也遵循了每个对象应有明确目的的设计原则。在这种情况下，我们创建了一个职责明确的类，专门用于监听雷区中的点击事件，并将该功能移除（并将其他部分移至其他类），从而使
