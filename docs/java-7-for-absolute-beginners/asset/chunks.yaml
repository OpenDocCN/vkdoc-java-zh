    \ However, a computer has to be told exactly how to do it. To that end, Java offers\
    \ two mechanisms for creating comparisons that can be used for sorting: implementing\
    \ the `compareTo` method from `java.util.Comparable` and creating a class that\
    \ extends `java.util.Comparator`. We do both for our `Person` class. Classes don't\
