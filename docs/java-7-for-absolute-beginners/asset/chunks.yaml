  raw: '#### The return Statement


    The final branching instruction is the `return` statement, which has two forms.
    If a method returns nothing (that is, its return type is `void`), the `return`
    statement has no arguments. If a method returns a value or object (that is, the
    return type is not `void`), the `return` statement takes one argument (the value
    or object being returned). Return statements stop any further processing within
    the method and return processing to the code that called the method. Let''s consider
    an example of a method that returns a string (see [Listing 5-21](#Chapter05.html#list_5_21)).


    ***Listing 5-21.** Using return to stop processing*


    `public String getAuthorForDetective (String detective) {`

    `  if(detective.equals("Sam Spade")) {`

    `    return "Dashiell Hammett";`

    `  }`

    `  if (detective.equals("Sherlock Holmes")) {`

    `    return "Sir Arthur Conan Doyle";`

    `  }`

    `  if (detective.equals("Charlie Chan")) {`

    `    return "Earl Derr Biggers";`

    `  }`

    `  return "Unknown author";`

    `}`


    As you can see in this example, as soon as we find the author that matches the
    fictional character, we stop looking and return the name of the author. If all
    else fails, we admit to not knowing the name of the author. We don''t need `else`
    statements because each `if` statement has a `return` statement; at each `if`
    statement, we stop processing if we get a match and continue processing if we
    don''t get a match, so `else` is needless syntax. This idiom is common in Java
    programs. It works especially well when you can order your matches by likelihood.
    That way, you can often do as little processing as possible, which makes for a
    handy bit of optimization. For example, if you happen to code on behalf of the
    Sherlock Holmes Memorial Library (if there is such a thing), you''d put the “Sherlock
    Holmes” match at the top.


    Let''s consider a similar example in [Listing 5-22](#Chapter05.html#list_5_22)
    for a method that returns `void`.


    ***Listing 5-22.** Using return with no values*


    `public void printAuthorForDetective (String detective) {`

    `  if(detective.equals("Sam Spade")) {`

    `    System.out.println("Dashiell Hammett");`

    `    return;`

    `  }`

    `  if (detective.equals("Sherlock Holmes")) {`

    `    System.out.println("Sir Arthur Conan Doyle");`

    `    return;`

    `  }`

    `  if (detective.equals("Charlie Chan")) {`

    `    System.out.println("Earl Derr Biggers");`

    `    return;`

    `  }`

    `  System.out.println("Unknown author");`

    `}`


    Again, the `return` statements stop further processing within the method and return
    processing to the code that called the method. If we don''t have the `return`
    statements, the method prints whatever match it found (if any) and then prints,
    “Unknown author.” So, in addition to causing needless processing, leaving out
    the `return` statements also creates a bug. We don''t need a `return` statement
    after the last statement because the method implicitly returns after the last
    instruction.


    ### Summary


    This chapter covered what many programmers consider to be the main purpose of
    programming: identifying conditions and doing appropriate things for each one.
    If we have no ability to change what we do based on the inputs we receive, no
    program could achieve the complexity to do anything useful. To that end, every
    programming language offers at least a few ways to change paths within the code.


    As we learned in this chapter, Java offers:


    *   `if` and `if`-`else` (and `else if`) statements, for simple comparisons

    *   `switch` blocks, for comparing lots of values

    *   `for` (and enhanced for or "for each") loops, for easy-to-read looping

    *   `while` loops, for when we want to do something until a condition is met

    *   `do`-`while` loops, for when we want to have the test come last

    *   `break` statements, for jumping out of the current block

    *   `continue` statements, for moving on to the next item

    *   `return` statements, for saying we''re done with this method and returning
    a value


    Thanks to all these possibilities for controlling the flow of our logic, we can
    write programs that can handle any number of inputs and outputs and intermediate
    processing steps correctly and still be easy-to-read.


    ## C H A P T E R  6


    ## Object-oriented Programming


    Java is an object-oriented language. That means that Java lets programmers develop
    software by developing objects and specifying the relationships between the objects.
    The relationships are defined within the objects, so the objects are the central
    focus of any software development effort in Java.


    ### Objects


    So what''s an object? In technical terms, an *object* is an instance of a class
    (or the class itself if it''s static or a singleton—that is, a class of which
    there can be only one instance). So what exactly is an instance? Think of it this
    way: A class definition is the definition for an instance, and a particular item
    defined by that class is an instance. Suppose we have a class that defines documents
    (title, author, and so on). Then an object that describes a particular document
    is an instance.


    Usually, an object is a software object that represents some important part of
    the system. (Unimportant parts of the system should be eliminated —most software
    developers are by nature or quickly become minimalists.) Sometimes, these objects
    correspond to actual physical items. For example, shipping software might have
    a class that represents shipping containers, and each instance of that class corresponds
    to a real shipping container somewhere in the world.


    Far more often, though, objects in software define abstract items—that is, things
    that don''t really exist. For example, the `Math` class defines a constant for
    pi. You can''t touch a mathematical constant, though it might seem real to you
    (take enough math classes and such things seem very real). But even a mathematical
    constant is less abstract than some of the things that come up in software development.
    That''s because object-oriented languages such as Java let us define purely abstract
    objects, such as a `Shape` class. In many shape-related systems, `Shape` itself
    can never be instantiated; you must instead create an instance of some other class
    that extends `Shape` (such as a `Circle` class). And sometimes an abstract class
    extends another abstract class, making for layers of abstraction.


    Let''s consider some other examples. The following are all objects that I have
    developed for one system or another:


    *   A class that handles button clicks

    *   A class that contains information about a three-dimensional structure (such
    as a pyramid or sphere)

    *   A class that contains that describes a paragraph within a document (font style,
    font size, and so on)

    *   A class that defines a print job (such as gets created when you click Print
    in a word processor)


    Notice that I always say “a class.” All objects in Java are classes. Enumerations
    are a special kind of class, because each enumeration has an implicit class provided
    by the compiler. Java also has primitives and interfaces, but primitives and interfaces
    are not objects. As we saw in earlier chapters, primitives define values, but
    they aren''t objects. We get to why neither primitives nor interfaces are objects
    shortly. For now, just remember that a Java object is an instance of a class,
    and a class is code that defines something useful. Even an abstract class defines
    something useful, though it relies on the classes that extend it to provide the
    remaining information.


    Object-oriented languages support three important features:


    *   Encapsulation

    *   Inheritance

    *   Polymorphis


    We look at these in turn.'
