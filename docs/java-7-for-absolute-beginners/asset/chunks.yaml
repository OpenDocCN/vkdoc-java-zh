  raw: '### Comparing and Sorting Objects


    As I indicated previously, comparing objects differs from comparing primitives.
    The comparison operators work for primitives, but they do not work for objects.
    Instead, Java requires the use of a number of different interfaces and methods
    to compare objects.


    #### Implementing the `equals` Method


    The first comparison is to see whether one object is equal to another. As we saw
    previously, the equality and inequality operators determine only whether two objects
    use the same object reference (that is, the same place in memory). Consequently,
    two different objects, each with its own memory address, are never equal. The
    following class might help illustrate the issue (see [Listing 4-27](#Chapter04.html#list_4_27)).


    ***Listing 4-27.** Using the equality operator with objects*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class CompareTest {`


    `  public static void main(String[] args) {`

    `    Object a = new Object();`

    `    Object b = new Object();`

    `    Object c = b;`

    `    System.out.println(a == b);`

    `    System.out.println(b == c);`

    `  }`


    `}`


    That code prints “false” for the first comparison and “true” for the second. In
    essence, we create a single object with two names (`b` and `c`), so the second
    comparison yields a value of “true.” The `new` keyword offers a big hint here.
    For `c`, we don''t create a new object, just another reference to an existing
    one. To see whether two objects are equal, we have to compare objects that implement
    the `equals` method. Let''s return to our `Person` class and expand it to have
    an `equals` method (see [Listing 4-28](#Chapter04.html#list_4_28)).


    ***Listing 4-28.** Person class with equals method*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class Person {`

    `  String firstName;`

    `  String lastName;`


    `  public Person (String firstName, String lastName) {`

    `    this.firstName = firstName;`

    `    this.lastName = lastName;`

    `  }`


    `  public boolean equals(Person p) {`

    `    if (p == null) {`

    `      return false;`

    `    }`

    `    if (p == this) {`

    `      return true;`

    `    }`

    `    if (!(p instanceof Person)) {`

    `      return false;`

    `    }`

    `    if (p.lastName.equals(this.lastName)`

    `        && p.firstName.equals(this.firstName)) {`

    `      return true;`

    `    } else {`

    `      return false;`

    `    }`

    `  }`


    `  public int hashCode() {`

    `    int result = 17;`

    `    result *= firstName.hashCode() * 37;`

    `    result *= lastName.hashCode() * 37;`

    `    return result;`

    `  }`

    `}`


    Let''s examine that `equals` method. I followed a standard recipe for implementing
    it. (The Java community has best practices for many things, and we show them to
    you whenever they come up, as here.) First, I check for null, just to make sure
    we have an object. Then I check to see whether it''s the same object, in which
    case they are certainly equal. Then we check to make sure that, if we do have
    an object, it''s a `Person` object. If not, the comparison is always false. But
    remember that other classes might extend our `Person` class, so a `Student` object
    might be equal to our `Person` object. Because `Student` extends `Person`, this
    `equals` method works for both. However, `Student` might implement its own `equals`
    method to account for the school each student attends. Finally, I check all the
    relevant fields within the class. If they are all equal, it must be the same person.
    Naturally, a real-world `Person` class probably includes middle name, address
    fields, social security number, and possibly even ancestors and descendants. Two
    fields will do for the sake of a demonstration, though. Now, let''s rewrite `CompareTest`
    to use our new `Person` object (see [Listing 4-29](#Chapter04.html#list_4_29)).


    ***Listing 4-29.** Checking people objects for equality*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class CompareTest {`


    `  public static void main(String[] args) {`

    `    Person samSpade = new Person("Sam", "Spade");`

    `    Person greatNoirDetective = new Person("Sam", "Spade");`

    `    System.out.println(samSpade == greatNoirDetective);`

    `    System.out.println(samSpade.equals(greatNoirDetective));`

    `  }`


    `}`


    `CompareTest` now prints “false” and then “true,” even though `samSpade` and `greatNoirDetective`
    are different references to different `Person` objects. That''s because our `equals`
    method isn''t comparing references but rather the relevant fields of the two objects.


    The `hashCode` and `equals` methods are closely related because they rely on the
    same premise. They add together a set of values to create a value that can be
    used for comparison (an equals-to comparison in the case of the `equals` method
    and equals-to, greater-than, and less-than comparisons in the case of the `hashCode`
    method).


    ![images](images/square.jpg) **Note** When you implement the `equals` method,
    you must also implement the `hashCode` method. The `hashCode` method determines
    where an object reference goes when put into a collection that uses a hashing
    algorithm (such as the `HashMap` and `HashTable` classes). We address those two
    collections (and others) when we get to data structures, later in the book. The
    goal of the `hashCode` method is to return a unique (or at least nearly unique)
    identifier; that''s why it starts with a prime number and multiplies by another
    prime number. Again, we get to that in much greater detail.


    ![images](images/square.jpg) **Caution** When you implement both `equals` and
    `hashCode` (and you should implement both if you implement one), you must make
    sure that they use the same fields. For example, if you use `firstName` and `lastName`
    in the `equals` method, you must use `firstName` and `LastName` in the `hashCode`
    method. Otherwise, your comparisons fail. Worse yet, you don''t get exceptions;
    you get the wrong behavior and a hard-to-find bug.


    ![images](images/square.jpg) **Caution** The `hashCode` method must generate equal
    values for equal objects. Otherwise, comparisons that should succeed fail, and
    you have another hard-to-find bug.


    #### Comparisons for Sorting


    I include sorting in this topic because it''s impossible to sort things without
    comparing them. Suppose you want to sort a bunch of colorful rocks into the spectrum.
    To do so, you pick up each rock, compare it to the other rocks, and use that information
    to decide where in the row of rocks each rock belongs. Sorting comes to most people
    pretty readily, with little training. However, a computer has to be told exactly
    how to do it. To that end, Java offers two mechanisms for creating comparisons
    that can be used for sorting: implementing the `compareTo` method from `java.util.Comparable`
    and creating a class that extends `java.util.Comparator`. We do both for our `Person`
    class. Classes don''t have to implement both, but many do. The `String` class
    offers a fine example of a class that implements both comparison interfaces (and
    `equals` and `hashCode`), by the way.


    To be able to compare objects with the goal of sorting them, we have to know more
    than whether one object equals another. We also have to know whether one object
    is greater than or less than another object. For our color-sorting example, we
    can assign an integer value to each color and then sort our rocks by putting each
    one to the left of all the rocks its color value is greater than and to the right
    of all the rocks its color value is less than. Rocks with the same color value
    make piles of rocks whenever that happens (and that''s comparable to what happens
    in Java when hash code values are identical).'
  trans: '

    ### 比较与排序对象


    如前所述，比较对象与比较基本类型有所不同。比较运算符适用于基本类型，但不适用于对象。相反，Java 需要使用多种不同的接口和方法来比较对象。


    #### 实现 `equals` 方法


    第一个比较是判断一个对象是否等于另一个对象。正如我们之前所见，相等与不等运算符仅能判断两个对象是否使用相同的对象引用（即内存中的同一位置）。因此，两个拥有各自内存地址的不同对象永远不会相等。以下类可能有助于说明这个问题（参见清单
    4-27）。


    ***清单 4-27.** 对对象使用相等运算符*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class CompareTest {`


    `  public static void main(String[] args) {`

    `    Object a = new Object();`

    `    Object b = new Object();`

    `    Object c = b;`

    `    System.out.println(a == b);`

    `    System.out.println(b == c);`

    `  }`


    `}`


    这段代码对第一个比较输出“false”，对第二个比较输出“true”。本质上，我们创建了一个对象，却给它起了两个名字（`b` 和 `c`），因此第二个比较的结果为“true”。`new`
    关键字在此处提供了重要线索。对于 `c`，我们并没有创建新对象，只是创建了另一个指向现有对象的引用。要判断两个对象是否相等，我们必须比较实现了 `equals`
    方法的对象。让我们回到 `Person` 类，并为其扩展一个 `equals` 方法（参见清单 4-28）。


    ***清单 4-28.** 包含 equals 方法的 Person 类*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class Person {`

    `  String firstName;`

    `  String lastName;`


    `  public Person (String firstName, String lastName) {`

    `    this.firstName = firstName;`

    `    this.lastName = lastName;`

    `  }`


    `  public boolean equals(Person p) {`

    `    if (p == null) {`

    `      return false;`

    `    }`

    `    if (p == this) {`

    `      return true;`

    `    }`

    `    if (!(p instanceof Person)) {`

    `      return false;`

    `    }`

    `    if (p.lastName.equals(this.lastName)`

    `        && p.firstName.equals(this.firstName)) {`

    `      return true;`

    `    } else {`

    `      return false;`

    `    }`

    `  }`


    `  public int hashCode() {`

    `    int result = 17;`

    `    result *= firstName.hashCode() * 37;`

    `    result *= lastName.hashCode() * 37;`

    `    return result;`

    `  }`

    `}`


    让我们仔细看看这个 `equals` 方法。我遵循了一个标准的实现步骤。（Java 社区对许多事情都有最佳实践，我们会在遇到时向你展示，就像这里一样。）首先，我检查是否为
    null，以确保我们确实有一个对象。然后，我检查它是否是同一个对象，如果是，则它们肯定相等。接着，我们检查如果确实有一个对象，它是否是 `Person` 对象。如果不是，则比较结果始终为
    false。但请记住，其他类可能会扩展我们的 `Person` 类，因此一个 `Student` 对象可能与我们的 `Person` 对象相等。因为 `Student`
    扩展了 `Person`，所以这个 `equals` 方法对两者都适用。然而，`Student` 可能会实现自己的 `equals` 方法来考虑每个学生就读的学校。最后，我检查类中所有相关的字段。如果它们都相等，那么这一定是同一个人。当然，现实世界中的
    `Person` 类可能包含中间名、地址字段、社会安全号码，甚至祖先和后代。不过，为了演示，两个字段就足够了。现在，让我们重写 `CompareTest`
    来使用我们新的 `Person` 对象（参见清单 4-29）。


    ***清单 4-29.** 检查人员对象的相等性*


    `package com.apress.javaforabsolutebeginners .examples.comparing;`


    `public class CompareTest {`


    `  public static void main(String[] args) {`

    `    Person samSpade = new Person("Sam", "Spade");`

    `    Person greatNoirDetective = new Person("Sam", "Spade");`

    `    System.out.println(samSpade == greatNoirDetective);`

    `    System.out.println(samSpade.equals(greatNoirDetective));`

    `  }`


    `}`


    现在，`CompareTest` 会先输出“false”，然后输出“true”，尽管 `samSpade` 和 `greatNoirDetective` 是指向不同
    `Person` 对象的不同引用。这是因为我们的 `equals` 方法比较的不是引用，而是两个对象的相关字段。


    `hashCode` 和 `equals` 方法密切相关，因为它们基于相同的前提。它们将一组值相加，以创建一个可用于比较的值（对于 `equals` 方法是相等比较，对于
    `hashCode` 方法则是相等、大于和小于比较）。


    ![images](img/square.jpg) **注意** 当你实现 `equals` 方法时，也必须实现 `hashCode` 方法。`hashCode`
    方法决定了当对象引用被放入使用哈希算法的集合（如 `HashMap` 和 `HashTable` 类）时，该引用应被放置的位置。我们将在本书后面讨论数据结构时，再详细介绍这两个集合（以及其他集合）。`hashCode`
    方法的目标是返回一个唯一（或至少接近唯一）的标识符；这就是为什么它从一个质数开始，并乘以另一个质数。同样，我们会在后面更详细地讨论这一点。


    ![images](img/square.jpg) **警告** 当你同时实现 `equals` 和 `hashCode` 时（如果你实现了其中一个，就应该同时实现另一个），必须确保它们使用相同的字段。例如，如果你在
    `equals` 方法中使用了 `firstName` 和 `lastName`，那么在 `hashCode` 方法中也必须使用 `firstName` 和
    `lastName`。否则，你的比较会失败。更糟糕的是，你不会得到异常；你会得到错误的行为和一个难以发现的 bug。


    ![images](img/square.jpg) **警告** `hashCode` 方法必须为相等的对象生成相等的值。否则，本应成功的比较会失败，你就会遇到另一个难以发现的
    bug。


    #### 用于排序的比较


    我将排序包含在本主题中，因为不进行比较就无法对事物进行排序。假设你想把一堆五颜六色的石头按光谱排序。为此，你拿起每块石头，与其他石头进行比较，然后利用这些信息来决定每块石头在石头序列中的位置。对大多数人来说，排序几乎不需要训练就能轻松掌握。然而，计算机必须被精确地告知如何操作。为此，Java
    提供了两种机制来创建可用于排序的比较：实现 `java.util.Comparable` 中的 `compareTo` 方法，以及创建一个扩展 `java.util.Comparator`
    的类。我们将为 `Person` 类实现这两种方式。类不必同时实现两者，但很多类都这样做。顺便提一下，`String` 类就是一个很好的例子，它同时实现了这两个比较接口（以及
    `equals` 和 `hashCode`）。


    为了能够以排序为目的来比较对象，我们不仅需要知道一个对象是否等于另一个对象，还需要知道一个对象是大于还是小于另一个对象。对于我们的颜色排序示例，我们可以为每种颜色分配一个整数值，然后通过将每块石头放在所有颜色值大于它的石头的左边，以及所有颜色值小于它的石头的右边来对石头进行排序。当颜色值相同时，石头就会堆成一堆（这类似于
    Java 中哈希码值相同时发生的情况）。

