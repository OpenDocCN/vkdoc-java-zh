    \ `result` is 21 because taking the bits where both bits in the compared value\
    \ is 1 gives a binary result of `00010101`, which happens to be the binary representation\
    \ of 21."
  raw: '#### Relational Operators


    The relational operators compare things to one another. In particular, they determine
    whether one value is greater than, less than, equal to, or not equal to another
    value. For the relational operators to work, the items being compared have to
    be comparable. That sounds obvious, but it has a particular meaning in Java. The
    language specification defines what it means to be comparable for the primitives.
    Thus, you can compare an `int` to a `float` and get a meaningful result (the JVM
    promotes the `int` to a `float` and then does the comparison). So long as one
    or the other can be cast to the other value, Java can meaningfully compare primitives,
    and Eclipse tells you when they can''t be.


    `>` (greater than), `<` (less than), `>=` (greater than or equal to), and `<=`
    (less than or equal to) all work on primitives, but they don''t work on objects.
    Conversely, `instanceof` works on objects but not on primitives. Java does provide
    ways to compare objects to one another, but not through any operators. We get
    to comparing objects later in this chapter.


    [Listing 4-12](#Chapter04.html#list_4_12) illustrates the comparison of primitives


    ***Listing 4-12.** Comparing primitives*


    `int a = 0;`

    `float b = 1.0f;`

    `System.out.println(a > b);`


    That bit of code prints “false” in the console.


    The instanceof operator can be a bit tricky, because a class that extends another
    class is also an instance of the parent class. Consider the following small program,
    implemented in three classes (see [Listing 4-13](#Chapter04.html#list_4_13)).


    ***Listing 4-13.** instanceof test*


    `package com.apress.javaforabsolutebeginners .examples.instanceofTest;`


    `public class Person {`

    `  String firstName;`

    `  String lastName;`


    `  public Person (String firstName, String lastName) {`

    `    this.firstName = firstName;`

    `    this.lastName = lastName;`

    `  }`

    `}`


    `package com.apress.javaforabsolutebeginners .examples.instanceofTest;`


    `public class Student extends Person {`

    `  String schoolName;`


    `  public Student (String firstName, String lastName, String schoolName) {`

    `    super(firstName, lastName);`

    `    this.schoolName = schoolName;`

    `  }`

    `}`


    `package com.apress.javaforabsolutebeginners .examples.instanceofTest;`


    `public class InstanceofTest {`


    `  public static void main(String[] args) {`

    `    Student student = new Student("Sam", "Spade", "Noir U");`

    `    System.out.println(student instanceof Student);`

    `    System.out.println(student instanceof Person);`

    `  }`


    `}`


    Both print statements print “true” in the console. After all, a student is a person.
    The nature of object-oriented programming, where one class always extends another,
    demands that the `instanceof` operator works this way.


    The `instanceof` operator can cause subtle problems. In particular, the `instanceof`
    operator won''t throw an error if its right-hand operand is `null`. Instead, it
    always returns `false` in those cases. If you use something like `myClass instanceof
    myBaseClass` and have inadvertently set `myBaseClass` to `null`, the result is
    `false`. You might then think that `myClass` isn''t an instance of `myBaseClass`,
    but you can''t actually know that if you''re comparing to `null`. This is another
    great place to practice defensive programming and make sure you''re not getting
    `null` there.


    If you''re careful to make sure you know the relationships between the classes
    you use (which is part of being a good object-oriented programmer) and to ensure
    that you''re not comparing to `null`, you shouldn''t get into too much trouble
    with the `instanceof` operator.


    #### Equality Operators


    Java has two equality operators: `==` (equals) and `!=` (not equals). (The exclamation
    point, both in this context and in others, is sometimes called a “bang” by software
    developers.) The equality operator (`==`) and the inequality operator (`!=`)work
    the same way (each is the negative of the other), so I''ll confine this discussion
    to the equality operator.


    Java uses a single equal sign as the base assignment operator (we get to the assignment
    operators later in this chapter), so it can''t use a single equal sign for comparisons.
    Consequently, Java (and the other languages that share Java''s basic syntax) uses
    two equal signs.


    A common mistake among folks new to Java (and not-so-new folks who aren''t careful
    with their typing) is to use a single equal sign (the assignment operator) when
    they should use two equal signs (the equality operator) and accidentally assign
    a value to a variable rather than compare the variable''s value to something else.
    Consider the following example in [Listing 4-14](#Chapter04.html#list_4_14):


    ***Listing 4-14.** Accidental assignment*


    `for (int counter = 0; counter < 10; counter++) {`

    `  if (counter = 0) { // should be == rather than =`

    `    // do something`

    `  }`

    `}`


    That bit of code, if not corrected, causes an infinite loop. In every iteration,
    `counter` gets set to 0, so its value is always less than 10\. Fortunately, Eclipse
    and other modern development tools warn you when you do this. You can still do
    it, but at least you do it intentionally (though you really should re-structure
    your code if you need to reset a value). I have to admit that I have gotten into
    exactly that situation more than once (because of poor typing), though never since
    I started using Eclipse, thanks to its warnings. That''s one of the reasons I
    had you install Eclipse at the start of this journey.


    For primitives, the equality operators work exactly as you probably think they
    would. However, for objects, the equality operators indicate whether two references
    refer to the same instance. As ever, examples help (see [Listing 4-15](#Chapter04.html#list_4_15)).


    ***Listing 4-15.** Equality operator examples*


    `int a = 0;`

    `int b = 1;`

    `String s = "s";`

    `String sToo = "s";`

    `System.out.println(a == b);`

    `System.out.println(s == sToo);`


    That bit of code prints “true” for `a == b` and “false” for `s == sToo`. That''s
    because s and sToo are references to different instances of the `String` object.
    So, even though they have the same value, they are not equal in the eyes of the
    equality operators. Also, `s == "s"` prints false, because the string literal
    produces yet another instance of the `String` class.


    To compare objects (including instances of the `String` class), Java programmers
    use the `equals` method. Any object whose instances can be compared to each other
    should implement the `equals` method (which is defined in the `Object` class).
    Because it makes sense for `String` objects to be compared to one another, the
    `String` class implements the `equals` method. That way, we can use code similar
    to [Listing 4-16](#Chapter04.html#list_4_16) to compare instances of `String`.


    ***Listing 4-16.** Testing equality for objects*


    `String s = "s";`

    `String sToo = "s";`

    `System.out.println(s.equals(sToo));`

    `System.out.println(s.equals("s"));`


    Both of these print statements produce “true” in the console. We cover comparing
    objects in more depth later in this chapter.


    #### Bitwise AND Operator (&)


    The bitwise AND operator (`&`) compares two binary values and sets each bit to
    1 where each bit in the two values being compared is 1\. As usual, an example
    helps (see [Listing 4-17](#Chapter04.html#list_4_17)).


    ***Listing 4-17.** Bitwise AND operator (&)*


    `Byte byte1 = Byte.parseByte("01010101", 2); // byte1 = 85`

    `Byte byte2 = Byte.parseByte("00111111", 2); // byte2 = 63`

    `int result = byte1 & byte2; // result = 21`


    The value of result is 21 because taking the bits where both bits in the compared
    value is 1 gives a binary result of `00010101`, which happens to be the binary
    representation of 21.'
