  raw: '### Regular Expressions


    If you''ve ever worked with files from the command line on your computer, you
    may very well have used a regular expression without realizing it. For example,
    I recently wanted a list of all the HTML files in a directory (on a Windows 7
    system). In a command window, I typed `dir *.htm` and got the list I wanted. `*.htm`
    is in fact a regular expression that means all the files with an extension of
    `htm`. Suppose I had wanted all the HTML files with names that start with “s”.
    The command would have been `dir s*.htm`. Regular expressions in Java work in
    much the same way, except that you can specify much more complex patterns.


    The Java regular expression package is `java.util.regex`. It contains the `MatchResult`
    interface, the `Matcher` class (which implements the `MatchResult` interface),
    the `Pattern` class, and the `PatternSyntaxException` class. You can''t directly
    instantiate the `Matcher` and `Pattern` classes, as they have no public constructors.
    In other words, `new Matcher` and `new Pattern` don''t work. Instead, the pattern
    for using them is to get a `Pattern` object by calling one of the `compile` methods
    within the `Pattern` class. Then you get a `Matcher` object by calling the `matcher`
    method within the `Pattern` class. Finally, to find the substrings that match
    your pattern, you call the `find` method within the `Matcher` class. Let''s create
    a class that will let us experiment with the Pattern and Matcher classes. Listing
    15-11 shows one possible implementation of such a class.


    ***Listing 15-10.** RegexTester Class*


    `package com.bryantcs.examples;`


    `import java.util.regex.Matcher;`

    `import java.util.regex.Pattern;`


    `public class RegexTester {`


    `  public static void main(String[] args) {`

    `    Pattern pattern = Pattern.compile(args[0]);`

    `    Matcher matcher = pattern.matcher(args[1]);`

    `    while(matcher.find()) {`

    `      String groupText = matcher.group();`

    `      int matchBegin = matcher.start();`

    `      int matchEnd  = matcher.end();`

    `      StringBuilder sb = new StringBuilder("Found a match for ");`

    `      sb.append(groupText);`

    `      sb.append(" beginning at ");`

    `      sb.append(matchBegin);`

    `      sb.append(" and ending at ");`

    `      sb.append(matchEnd);`

    `      System.out.println(sb);`

    `    }`

    `  }`

    `}`


    `matcher.group` gives us the text being matched (that''s essentially the result
    of the pattern we specify in the second argument). `matcher.start` gives us the
    starting position of the matched string within the input string (the first argument).
    `matcher.end` gives us the ending position of the matched string. I used a `StringBuilder`
    object to avoid a really long line, which is awkward to read in a book. I often
    use `StringBuilder` objects within my production code, too, for the sake of performance
    (the concatenation operator is the worst way to create a `String` object).


    Before we plunge into the syntax of regular expressions, let''s cover how to pass
    values to the RegexTester program. In doing so, we''ll also run it for the first
    time. To set up arguments for RegexTester, follow these steps.


    1.  From the **Run** menu, choose **Run Configurations**. The Run Configurations
    window appears, as shown in [Figure 15-2](#Chapter15.html#fig_15_2).


    ![images](images/1502.jpg)


    ***Figure 15-2.** Run configurations for RegexTester*


    2.  In the right pane, click the **Arguments** tab. The Arguments tab appears,
    as shown in [Figure 15-3](#Chapter15.html#fig_15_3).


    ![images](images/1503.jpg)


    ***Figure 15-3.** Empty parameters for RegexTester*


    3.  To set up our first test data, type the following text (including the quotation
    marks) into the **Program arguments:** field:


    `     "Sam" "Sam Spade;Yosemite Sam;Sam Merlotte;Samwise Gamgee;"`


    When you''re done typing, the window should look like the window shown in [Figure
    15-4](#Chapter15.html#fig_15_4).


    ![images](images/1504.jpg)


    ***Figure 15-4.** Populated parameters for RegexTester*


    4.  To run the RegexTester program, click **Run**. The output of the program appears
    in the Eclipse console, as shown in [Figure 15-5](#Chapter15.html#fig_15_5).


    ![images](images/1505.jpg)


    ***Figure 15-5.** Output of RegexTester in the Eclipse console*


    I won''t show all those steps for each test, but I thought it might help you to
    see them for the first test. For the subsequent tests, I''ll just show what to
    type in the **Arguments** tab and what appears in the console.


    Now that we have a testing program and know how to use it, we need to focus on
    the regular expression syntax that Java supports. Regular expression syntax is
    almost a language unto itself, so we''ll focus on the basics and some of the more
    commonly used advanced bits. The whole thing is worthy of a book (and such books
    exist).


    Our simple test case uses a string literal. A string literal is just a piece of
    text. In the example we just ran, `"Sam"` is a string literal. `"Spade"` is another
    string literal. If we replace `"Sam"` with `"Spade,"` we get the following output
    in the console:


    `Found a match for Spade beginning at 4 and ending at 9`


    We won''t be able to accomplish much with just string literals. We can find all
    the instances of a particular string, but we can''t find anything that matches
    a pattern. To create a pattern, we have to dive into the key component of regular
    expressions—metacharacters.


    Metacharacters are characters that create patterns. Rather than represent a single
    literal character, a metacharacter represents a set of characters. Some metacharacters
    work by themselves, while other metacharacters are meaningless in the absence
    of other metacharacters. [Table 15-1](#Chapter15.html#tab_15_1) describes the
    metacharacters supported by the Java regular expression syntax.


    ![image](images/t1501.jpg)

    ![image](images/t1501a.jpg)


    From all those examples, I bet you''re beginning to get an idea of how powerful
    regular expressions can be. In truth, though, describing the metacharacters is
    just scratching the surface of regular expressions. There''s lots more to it than
    what I''ve shown here. Let''s learn a little more by looking at examples.


    Returning to our example involving fictional characters named Sam, suppose we
    want to get the whole name (including the separator, which is a semicolon). We
    might try something like the following:


    `(Sam).*;`


    The output of that is:


    `Found a match for Sam Spade;Yosemite Sam;Sam Merlotte;Samwise Gamgee; beginning
    at 0 and`

    `ending at 51`


    That''s not going to work. The trouble is that the `.*` pattern matches everything
    it can (that''s called a greedy match). In this case, it matches the whole line.
    Fortunately, the Java regular expression syntax includes a way to make a pattern
    not be greedy (regular expression programmers would say it''s reluctant). To make
    a match be reluctant, we can append the question mark character (?) to the pattern,
    as follows:


    `(Sam).*?;`


    The output of that regular expression is:


    `Found a match for Sam Spade; beginning at 0 and ending at 10`

    `Found a match for Sam; beginning at 19 and ending at 23`

    `Found a match for Sam Merlotte; beginning at 23 and ending at 36`

    `Found a match for Samwise Gamgee; beginning at 36 and ending at 51`


    We''re getting closer, but what happened to the “Yosemite” in “Yosemite Sam”?
    Well, the expression starts with (Sam), so it will match only bits that start
    with “Sam”, which doesn''t include “Yosemite Sam”. The solution is to use the
    `.*?` pattern at the beginning as well as at the end, as follows:


    `.*?(Sam).*?;`


    Notice that the leading pattern must be reluctant, too, or we get the whole line
    again. Now the output is:


    `Found a match for Sam Spade; beginning at 0 and ending at 10`

    `Found a match for Yosemite Sam; beginning at 10 and ending at 23`

    `Found a match for Sam Merlotte; beginning at 23 and ending at 36`

    `Found a match for Samwise Gamgee; beginning at 36 and ending at 51`'
