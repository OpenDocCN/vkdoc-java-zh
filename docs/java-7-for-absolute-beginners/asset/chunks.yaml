    类的实例。它还会获取一个 `MineSweeperHelper` 类的实例。这两个类都需要监听鼠标点击事件，因此 `MineSweeperMouseListener`
    类必须拥有这两个类的实例。唯一执行实际操作的另一个方法是 `mouseReleased` 方法。正如我们之前所学，由于鼠标移动会清除点击事件的问题，使用 `mouseReleased`
    方法比使用 `mouseClicked` 方法更可靠。


