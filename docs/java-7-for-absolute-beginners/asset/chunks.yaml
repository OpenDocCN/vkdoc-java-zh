    #### 进一步开发


    纯粹为了趣味，我们再添加一点功能。程序在生成控制台输出时，通常会包含日期和时间。格式化日期所需的代码量往往超出大多数人的预期，除非他们亲自实践过。这是因为现实世界中的日期格式千差万别。在美国，月/日/年（MDY）格式占主导地位；而在欧洲，日/月/年（DMY）格式更为普遍。除了人类使用的日期格式外，计算机系统也有多种表示日期的方式，从简单的变体如年/月/日（YMD），到更为晦涩的排列方式。Java
    继承了 C 语言的特性，采用与 C 和 Unix（最初主要用 C 编写）以及 Linux（与 Unix 共享大量代码）相同的日期存储技术。因此，Java 将日期存储为自
    1970 年 1 月 1 日以来的秒数。用更详细、更专业的术语来说，Java 的“纪元”始于 1970 年 1 月 1 日 00:00:00 GMT。


    那么，我们如何将自 1970 年以来的秒数转换为格式良好的时间戳并输出呢？清单 1-4 展示了一种方法。（软件开发既令人愉悦又令人痛苦的部分原因在于，几乎总是有多种方法来完成同一件事。）我将在下一节中详细解释这些新代码片段。


    ***清单 1-4**：为 Hello 程序添加时间戳*


    `package com.apress.java7forabsolutebeginners;`


    `import java.text.SimpleDateFormat;`

    `import java.util.Date;`


    `public class Hello {`


    `  public static void main(String[] args) {`

    `    // 首先，获取自 1970/1/1 以来的秒数形式的日期`

    `    // 注意，Date 对象也包含时间信息`

    `    Date now = new Date();`

    `    // 其次，创建一个格式化器对象`

    `    SimpleDateFormat formatter =`

    `      new SimpleDateFormat("EEE, MMM dd, yyyy HH:mm:ss");`

    `    // 第三，将格式化器应用于日期`

    `    String formattedDate = formatter.format(now);`

    `    // 最后，将格式化后的日期添加到输出中`

    `    System.out.println(formattedDate + "> Hello, " + args[0] + "!");`

    `  }`


    `}`


    当你运行这个程序时，会在其他输出之前看到一个日期和时间戳。


    #### 关于 Java 对象


    请注意，我们必须使用两种对象（`Date` 和 `SimpleDateFormat`）来创建一个格式良好的日期。`Date` 和 `SimpleDateFormat`
    由类文件定义，就像你的 Hello 程序由类文件定义一样。我们通过文件顶部的 `import` 语句告诉 Java 程序在哪里找到这些类。没有它们，你的程序无法运行，因此我们必须告诉
    Java 在哪里找到它们。


    对于 Java 标准库中的任何类或其他代码片段，你都可以从 Oracle 为每个 Java 版本维护的 Javadoc 中了解其全部信息。Javadoc 是一种特殊的文档格式，允许
    Java 程序员将文档直接嵌入到代码中。这样，当你编写自己的类时，可以查阅你想要使用的类的文档。随着你进行更多的编程，你会花大量时间阅读这些文档。作为一个很好的学习练习，请查阅
    `SimpleDateFormat` 类，并查看格式化日期时可以使用的所有选项。


    对于 Java 7，你可以在 [`download.oracle.com/javase/7/docs/api/`](http://download.oracle.com/javase/7/docs/api/)
    找到 API（应用程序编程接口的缩写）文档。


    ![images](img/square.jpg) **注意** Eclipse 为标准 API 中的项目提供了 Javadoc 信息。将鼠标悬停在你正在使用的任何方法或对象上，你将看到该项目的
    Javadoc 信息。看到 Javadoc 后，按 **F2** 键可打开一个单独的窗口，让你查看更多内容。


    ### 总结


    在本章中，我们完成了以下任务：


    *   下载并安装了 Java 开发工具包

    *   下载并安装了 Eclipse，我们用它来编写 Java 程序

    *   在 Eclipse 中为我们的第一个程序创建了代码

    *   运行了我们的第一个程序（“Hello, world!”）

    *   修改了第一个程序以增加一点功能（专门向你问好）

    *   进一步修改了程序（以包含日期和时间）

    *   了解了在哪里可以找到未来程序中使用的其他代码的更多信息


    这些任务中的许多构成了全职软件开发人员的日常工作。我们花费大量时间（通常比我们希望的要多）来设置工具。我们大部分时间要么在编写新类，要么（更常见的是）重写现有类，以添加新功能或纠正问题。当然，我们也会花大量时间阅读文档，或者希望有更多文档可供阅读。


    我保证，如果你坚持从事软件开发，无论是作为爱好还是职业，你会发现自己无数次地回到这些任务上。在阅读本书的过程中，你也会完成其中的一些任务（尤其是编写和修改代码）。我希望你觉得这很有趣。我通常觉得如此。


    ## 第 2 章


    ## Java 语法


    任何语言的语法都是该语言使用者遵循的规则，以便其他使用者能够理解。换句话说，语法是一套所有语言使用者同意遵循的规则，以便他们能够进行交流。如果你违反了规则，听你说话的人要么会问：“嗯？什么？”要么会认为你在犯傻（这在某些场合可能合适，但通常会导致问题）。


    计算机语言的工作方式大致相同，只是它们从不被说出来（尽管我毫不惊讶有一天会看到，或者应该说听到，口头编程语言）。如果你决定自行其是，当你的计算机没有按照你的想法运行时，不要感到惊讶。如果你未能清晰地编码并遵循编程语言的规则，你只会得到混乱，尽管你的计算机会生成错误消息，而不是说：“嗯？什么？”


    Java 的大部分语法源自另一种名为 C++ 的语言。而 C++ 的大部分语法又源自 C。C 则受到其他语言的影响。创建 Java 的人选择 C++ 作为
    Java 语法的基础，因为 C++ 是当时使用最广泛的语言之一，这使许多开发者对 Java 语法有了一定的熟悉度。Java 的成功（它现在被广泛使用）取决于许多因素，但采用一种已经广为人知的语法无疑是有帮助的。

