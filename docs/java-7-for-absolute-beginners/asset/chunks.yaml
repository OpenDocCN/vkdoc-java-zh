  trans: '

    #### 导入


    在包声明之后，我们进入 `import` 部分（如本章前面的清单 2-3 所示）。可以存在任意数量的 `import` 语句。


    `import` 语句表明你的类使用了来自另一个包的一个或多个类或接口。这样，你就可以编写两个完全独立的应用程序，并在它们之间共享代码。此外，其他人可以编写一个库，然后你可以通过导入该库中你想要使用的部分来使用它。


    让我们检查一下清单 2-7 中的 `import` 语句：


    ***清单 2-7**。导入语句*


    `         import java.text.SimpleDateFormat;`

    `         import java.util.Date;`


    在 `import` 关键字之后，我们得到一个类标识符。同样，从右向左阅读类标识符会很有帮助。`java.text.SimpleDateFormat` 表明
    `SimpleDateFormat` 位于 `util` 包内，而该包又位于 `java` 包内。


    这个特定的类来自官方 Java 库。这条 `import` 语句告诉有经验的 Java 开发者，`AverageTest` 将要格式化一个日期。


    现在，假设我们想使用同一个包内的其他类。那么我们可以使用通配符（*）来指定该包内的任何类，如下所示：


    `         import java.text.*;`


    每个不同的开发团队对于何时停止具体指定并使用通配符都有不同的标准。当我们从同一个包中使用了三个类或接口时，我们倾向于使用通配符。其他人则在只要从同一个包中使用了两个成员时就使用通配符。还有一些开发者从不使用通配符，因为通配符会妨碍你查看实际使用了哪些对象。


    #### 类


    类行标识了特定的类。别忘了，包含该类的文件必须与类同名，包括相同的大小写。


    `         public class AverageImpl extends Object implements Average {`


    所有类都继承自某个其他类。然而，当一个类继承自 `Object`（即 Java 的根对象）时，你可以省略 `extends Object`。正如我们之前提到的，软件开发人员天生是极简主义者；我们不会编写任何无用的东西。因此，当被继承的类是
    `Object` 时，很少有 Java 开发者会包含 `extends` 关键字。


    让我们剖析一下这个类声明，看看所有部分都意味着什么。第一个词 `public` 是这个类的访问修饰符。更多细节请参见本章后面的“访问修饰符”。


    第二个词 `class` 表明我们定义了一个类。换句话说，我们定义了一种可以在系统中创建的对象。在这种情况下，我们定义了一个永远不会成为实际对象的类。抽象类用于被其他类继承以及作为引用。如果这个类是抽象的，其语法如下：


    `         public abstract class AverageImpl extends Object implements Average
    {`


    类也可以是静态的。在类上，`static` 关键字意味着该类的实例只有一个。你不能创建静态类的新实例（但运行时引擎会为你创建一个）。顺便提一下，你可能会觉得有趣的是，静态类仍然可以被克隆，因此
    `static` 关键字本身并不能保证单例（一个只有一个实例的类）。


    ![images](img/square.jpg) **注意** 定义类的另一种选择是定义接口。我们将在本章后面介绍接口。


    第三个词 `AverageImpl` 是类的名称。Java 关于类（以及其他名称）只有两条规则。每个名称必须以字母开头。每个名称只能由特定字符组成：a-z、A-Z、0-9、下划线（_）和美元符号（$）。


    ![images](img/square.jpg) **注意** 顺便说一下，`Impl` 是 implementation（实现）的缩写。拥有一个接口以及一个为该接口提供实现的类是一种相当常见的做法。在这些情况下，常见的命名约定是将类命名为接口名称加上
    `Impl`。别担心，我们会在“接口”部分介绍“实现”的含义。


    除了实际规则之外，Java 社区还遵循某些命名类的习惯性指南。


    *   第一个习惯是每个类名应以大写字母开头。

    *   第二，名称中的每个逻辑单词应以大写字母开头。

    *   第三，我们很少在类名中使用下划线。美元符号仅用于生成的代码（即由程序而非人编写的代码）。


    你不能违反规则（如果违反，你的程序将无法运行），但你可以违反社区的约定。然而，你应该有充分的理由这样做。这些约定让我们都能更轻松地相互沟通，因此请遵循它们，除非你有充分的理由不这样做，并注释你的理由。


    第四个词 `extends` 让我们知道该类的父类。一个类的父类（更准确地说，超类）是当前类从中获取其定义基础的类。特别是，一个类可以使用其父类中所有 `public`
    和 `protected` 方法，就像它们是在当前类中定义的一样。在这种情况下，我们继承自 Java 的根类：`Object`。`extends` 关键字告诉我们这个类是其父类的一种变体。在这种情况下，`AverageImpl`
    是 `Object` 的一种变体。如果你查看一个类与其父类之间的关系，发现它不合理，那么你需要重新思考你在做什么，或者，如果这不是你编写的类，则需要更仔细地检查你正在使用的库。


    第五个词 `Object` 告诉我们正在继承的基类的名称。有时，这个名称是有意义的，并能告诉我们一些关于父类的信息。有时，就像这里一样，父类的名称并不能告诉我们太多信息（因为每个类最终都继承自
    `Object`）。优秀的软件开发人员力求使用有意义的名称，但这并不总是可能的。


    第六个词 `implements` 告诉我们这个类使用了一个或多个接口。我们将在本章后面介绍它们。


    第七个词（在这个例子中也是最后一个）`Average` 告诉我们这个类实现的接口的名称。一个类可以实现任意数量的接口，尽管很少有类实现超过两三个接口，而且许多类根本不实现任何接口。

