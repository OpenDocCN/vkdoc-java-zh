    \ Statements\n\nThe `switch` keyword lets us set up a structure that does the\
    \ same thing as a set of `if`-`else` statements but that uses a different syntax.\
    \ Personally, I'm so accustomed to reading `if`-`else` blocks that we prefer them,\
