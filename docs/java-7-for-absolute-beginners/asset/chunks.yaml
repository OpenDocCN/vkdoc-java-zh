- fmt: '### Encapsulation


    `Encapsulation` means that an object holds its contents in such a way that other
    objects can''t see or change those contents (though we have a number of ways to
    provide access to the contents of a class). That way, one object''s contents can''t
    get tangled up with the contents of another object. Given that an application
    can have thousands of classes, keeping the bits and pieces of all those classes
    separate is a really good idea. Otherwise, we''d never be able to find anything.


    One of the key concerns of a Java developer when creating a new class (or modifying
    an existing one) is figuring out which bits and pieces to make visible to other
    classes. Another, related, concern is which classes get to see (and possibly modify)
    the contents of the current class. As that implies, you can make part of a class
    visible to just selected other classes rather than all other classes. We cover
    the mechanics of access modifiers in [Chapter 3](#Chapter03.html#ch3), “Data Types”.
    We cover when you should use the various access modifiers in the next chapter.


    ### Inheritance


    `Inheritance` defines relationships between the classes (and so between the objects)
    within an object-oriented system. All classes in Java have some other object as
    a parent. Java developers say that one object `extends` another. If you think
    about it for a minute, you shortly realize that there must be some object that
    starts it all. That special object (the only one that has no parent) is a class
    called `Object`. All other Java objects are descendants (sometimes through many
    levels) of `Object`.


    Let''s consider a simple example from the field of Biology (with apologies to
    biologists for vastly over-simplifying and thanks to Caroline Valentine at Valentine
    Human Resources for the idea). Suppose we want to represent certain animals (in
    particular, cats, dogs, and mice). They''re all mammals, so we might start with
    a class called `Mammal`.


    Then we have three more classes called `Cat`, `Dog`, and `Mouse`. Each of those
    classes extend the `Mammal` class.


    ![images](images/square.jpg) **Note** You can always tell if you''re right to
    make a new class by asking a simple question: Is this new class a member of the
    old class? That''s called the “is-a” test or the “is-one-of” test. A cat is a
    mammal, so we can make our `Cat` class extend our `Mammal` class. The same is
    true for our `Dog` and `Mouse` classes. If we had a `Snake` class, it would not
    be wise to create it by extending the `Mammal` class. It''s not always so obvious,
    but it''s a good place to start when you need to figure out which class your new
    class should extend.


    Of course, there are substantial differences among cats, dogs, and mice, and we
    cover how to model those differences when we get to Polymorphism, later in this
    chapter.


    #### Multiple Inheritance


    Java does not support `multiple inheritance` (though interfaces give us a way
    to get most of the benefits of multiple inheritance without the one big problem,
    which we discuss shortly, that comes with it). That is, an object cannot extend
    more than one parent object. Other languages (such as C++) do permit inheriting
    from more than one parent. The designers of Java determined that Java could be
    made without that level of complexity. The problem with multiple inheritance is
    that a single class can extend two other classes, and those two classes might
    in turn extend the same ancestor class. How would your code know which ancestor
    class provides the right information? That''s sometimes called “the diamond problem,”
    because it looks like a diamond when graphed (see [Figure 6-1](#Chapter06.html#fig_6_1)).


    ![images](images/0601.jpg)


    ***Figure 6-1.** The diamond problem*


    You might think that the diamond problem is easy to avoid. However, remember that
    most software is created by multiple teams of people. At the time of this writing,
    I''m working with two development teams and a testing team in another country
    to create a software product that no fewer than 75 other software development
    teams in the same company will use as the basis for yet more software. In those
    circumstances, it''s not hard to imagine how one team might implement a class
    that extends a class, the other team might extend the same class, and, if we had
    multiple inheritance, someone in the client teams might try to extend both and
    run right into the diamond problem. It''s easy to get into a situation where a
    single method might extend methods from two other classes. How would the compiler
    know which method we meant to use? Java prevents all that by not providing multiple
    inheritance.


    However, Java does provide a way to get most of the benefits and very few of the
    problems from multiple inheritance. You can include instances of other classes
    as fields within your class. That way, your class can access the public (or package,
    if your class is in the same package) fields and methods within those classes.
    Because you can''t access the private bits and because you can''t include abstract
    classes, you''re (if those other classes are well designed) well protected from
    getting into problems that arise from having more than one ancestor. This technique
    is sometimes called `composition`, because your new class is composed, in part,
    of the publicly available bits of other classes. As with all techniques, be sure
    you need to do it, though. The simpler and cleaner you keep your objects, the
    easier it is to get your program to work, and the more your fellow developers
    appreciate your work.


    Here''s an example of the kind of problem for which composition works really well
    (with thanks to Jeremy Conner at Uplogix for the idea). Consider a classic monster
    from horror movies: a wolfman. Typically, a wolfman is more man than wolf (if
    only because the actors in the furry suits are themselves humans and not wolves).
    Consequently, we might model our wolfman by making a new class called `Wolfman`
    that extends `Man` (which might itself extend `Human` and be parallel to `Woman`)
    and includes an instance of the `Wolf` class as one of its fields. Then we can
    get all the attributes of a man and most of the attributes (anything declared
    public) from a wolf and have a software model of a wolfman.


    #### Modeling Behavior through Interfaces


    Java includes the concept of interfaces. An `interface` is a set of methods (basically,
    things an object can do) that an object must have if it uses (the keyword in Java
    is `implements`) that interface. In particular, a class that implements an interface
    must implement all the methods within that interface. Let''s return to our three
    concrete classes: `Cat`, `Dog`, and `Mouse`.


    Cats are predators and carnivores. Dogs are carnivores (there''s some argument
    that they''re omnivores, but we call them carnivores for the sake of our example)
    and both predators and scavengers. Mice are herbivores and are not predators or
    scavengers. So, we might create a set of interfaces to model the behavior of the
    animals we chose. We have the following interfaces: `Predator`, `Scavenger`, `Carnivore`,
    and `Herbivore`. If we add bears, we need an `Omnivore` interface, too.'
