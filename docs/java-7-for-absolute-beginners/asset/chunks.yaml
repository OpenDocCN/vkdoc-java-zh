- fmt: "### Fields\n\nA *field* is a member of a class or (rarely) an interface that\
    \ holds a value. Fields let us store the bits of information that we care about\
    \ when we use a particular class. For example, the height and width fields in\
    \ a class that defines rectangles are important to the purpose of the class. In\
    \ the `AverageImpl` class listed earlier in this chapter, the following line defines\
    \ a field:\n\n`private long begin;`\n\nThis particular field contains a value\
    \ of type `long` (which is a really big number—we get to data types in the next\
    \ chapter). In this case, the field contains `null` (a keyword meaning that something\
    \ has no value assigned to it and, for object references, refers to no object)\
    \ until some other bit of code defines it. You can also directly assign a field's\
    \ value, as shown in [Listing 2-8](#Chapter02.html#list_2_8).\n\n**Listing 2-8.**\
    \ *Field examples*\n\n```\nint[] ints = {1, 2, 3, 4};\nAverageImpl averageImpl\
    \ = new AverageImpl(ints);\n```\n\nFor primitives (such as `int`), you can use\
    \ a value. In this case, we assign values to an array of `int`s. For objects,\
    \ you have to use the `new` keyword and call the object's constructor. We cover\
    \ both the differences between primitives and objects in the next chapter.\n\n\
    On a field, the `static` keyword has a similar effect as it does on a method:\
    \ A static field has one instance that's used by all the objects defined by that\
    \ class. Consequently, a static field is also known as a class field (because\
    \ it applies only to the class, not to the objects created from the class). Static\
    \ fields are mostly used to define constants (values that never change). We get\
    \ to constants later in this chapter.\n\n![images](images/square.jpg) **Warning**\
    \ Static fields can cause problems. Suppose you have two parts of a program running\
    \ at once, each of which is working with an object whose class definition has\
    \ a static field. If both classes try to modify the field at the same time, bad\
    \ things (including both race conditions—parts of the program waiting for one\
    \ another—and the field's value not being correct) can happen. For this reason,\
    \ all static fields other than constants (which are both `static` and `final`)\
    \ should usually be private.\n\n#### Constants\n\nMany programming languages support\
    \ the concept of a *constant*. A constant is a value that never changes. For example,\
    \ Java includes a class called `Math`, and the `Math` class includes a constant\
    \ called `PI`, which holds the value of Pi to a high level of precision.\n\nIn\
    \ Java, a constant is a field with a particular set of modifiers: `static` and\
    \ `final`. Most are also `public`, though it is possible (and sometimes useful)\
    \ to have `private`, package, and `protected` constants. We use a `private` constant\
    \ in the `AverageImpl` class to avoid typing the same string twice. By convention,\
    \ the names of constants are all uppercase and have underscores between the units\
    \ that are logically words as in [Listing 2-9](#Chapter02.html#list_2_9).\n\n\
    **Listing 2-9.** *A constant*\n\n```\nprivate static final String EXCEPTION_MESSAGE\
    \ =\n    \"ints must contain at least one int\";\n```\n\n### Methods\n\nA *method*\
    \ is basically something that a class can do. One common metaphor for classes\
    \ and objects is that classes are nouns and methods are verbs. As with all metaphors,\
    \ it's sometimes true and sometimes false, but it's often a handy way to check\
    \ whether your design makes sense. Methods often do something with the other members\
    \ (fields and methods) of the class. However, some methods (usually `static` methods)\
    \ do nothing with the other members of the class, effectively operating on their\
    \ own.\n\nThanks to the capability of methods to do lots of different things,\
    \ it's hard to make a meaningful generalization about methods beyond just saying,\
    \ “Methods do things.” Perhaps some examples will help (see [Listing 2-10](#Chapter02.html#list_2_10)).\n\
    \n**Listing 2-10.** *Methods*\n\n```\n  // a classic getter method\n  @Override\n\
    \  public int[] getInts() {\n    return ints;\n  }\n\n  // a classic setter method\n\
    \  @Override\n  public void setInts(int[] ints) throws IllegalArgumentException\
    \ {\n    if (ints.length == 0){\n      throw new IllegalArgumentException(EXCEPTION_MESSAGE);\n\
    \    }\n    this.ints = ints;\n  }\n```\n\nLet's have a closer look at the “setter”\
    \ method, starting with the first line (not counting the comment, which starts\
    \ with `//`. We cover comments later in the chapter).\n\n`public` is the method's\
    \ access modifier. We cover access modifiers earlier in the chapter.\n\n`void`\
    \ is the return type. The return type tells any code that called this method what\
    \ to expect. All methods must have a return type. `void` indicates that the method\
    \ won't return anything. So, all methods must have a return type, but not all\
    \ methods must return something. If we look at the other methods in the class,\
    \ we can see that they often do return something.\n\n`setInts` is the method's\
    \ name. By convention, method names start with a lowercase letter and have capital\
    \ letters wherever a logical word appears. This is sometimes called camel case.\n\
    \nThe parentheses contain a list of arguments. In this example, the list is only\
    \ one argument long. Each argument has a type and a name. In this case, the type\
    \ is `int[]` (the brackets indicate an array), and the name is `ints`. The arguments\
    \ are separated by commas when more than one is present, as in the following method\
    \ declaration from the `AverageTest` class:\n\n`private static String buildTestString(int[]\
    \ values, float average, long time)`\n\nThe brace character opens the code block\
    \ that is the method's body. We cover blocks later in this chapter.\n\nMethods\
    \ can also be `static`. On a method, the `static` keyword means that only one\
    \ such method exists in the system, no matter how many objects of that class might\
    \ exist. For that reason, a `static` method is also known as a class method. Also,\
    \ the method cannot use any of the class's fields other than fields that have\
    \ themselves been declared `static` (usually constants). `Static` methods can\
    \ be a handy way to provide utility methods for use throughout your code. For\
    \ example, a method that takes a date and returns a formatted string might be\
    \ `static`, provided it doesn't need to use any of its containing class's non-static\
    \ methods. Also, `static` methods can be slightly more efficient, because they\
    \ don't access anything outside the method body.\n\n![images](images/square.jpg)\
    \ **Warning** Static methods can cause problems. Suppose you have two threads,\
    \ each of which is working with an object whose class definition has a `static`\
    \ method. If both classes try to access the method at the same time, bad things\
    \ can happen. For one thing, any fields modified by the method can end up with\
    \ the wrong value, because the threads might run in the wrong order. Also, a `static`\
    \ method has just one instance (the class itself), so a class that takes a long\
    \ time to do whatever it does can keep the second (and third, fourth, and so on)\
    \ thread waiting."
  raw: '#### Fields


    A *field* is a member of a class or (rarely) an interface that holds a value.
    Fields let us store the bits of information that we care about when we use a particular
    class. For example, the height and width fields in a class that defines rectangles
    are important to the purpose of the class. In the `AverageImpl` class listed earlier
    in this chapter, the following line defines a field:


    `private long begin;`


    This particular field contains a value of type `long` (which is a really big number—we
    get to data types in the next chapter). In this case, the field contains `null`
    (a keyword meaning that something has no value assigned to it and, for object
    references, refers to no object) until some other bit of code defines it. You
    can also directly assign a field''s value, as shown in [Listing 2-8](#Chapter02.html#list_2_8).


    ***Listing 2-8.** Field examples*


    `int[] ints = {1, 2, 3, 4};`

    `AverageImpl averageImpl = new AverageImpl(ints);`


    For primitives (such as `int`), you can use a value. In this case, we assign values
    to an array of `int`s. For objects, you have to use the `new` keyword and call
    the object''s constructor. We cover both the differences between primitives and
    objects in the next chapter.


    On a field, the `static` keyword has a similar effect as it does on a method:
    A static field has one instance that''s used by all the objects defined by that
    class. Consequently, a static field is also known as a class field (because it
    applies only to the class, not to the objects created from the class). Static
    fields are mostly used to define constants (values that never change). We get
    to constants later in this chapter.


    ![images](images/square.jpg) **Warning** Static fields can cause problems. Suppose
    you have two parts of a program running at once, each of which is working with
    an object whose class definition has a static field. If both classes try to modify
    the field at the same time, bad things (including both race conditions—parts of
    the program waiting for one another—and the field''s value not being correct)
    can happen. For this reason, all static fields other than constants (which are
    both static and final) should usually be private.


    ##### Constants


    Many programming languages support the concept of a *constant*. A constant is
    a value that never changes. For example, Java includes a class called Math, and
    the `Math` class includes a constant called PI, which holds the value of Pi to
    a high level of precision.


    In Java, a constant is a field with a particular set of modifiers: static and
    final. Most are also public, though it is possible (and sometimes useful) to have
    private, package, and protected constants. We use a private constant in the `AverageImpl`
    class to avoid typing the same string twice. By convention, the names of constants
    are all uppercase and have underscores between the units that are logically words
    as in [Listing 2-9](#Chapter02.html#list_2_9).


    ***Listing 2-9.** A constant*


    `private static final String EXCEPTION_MESSAGE =`

    `    “ints must contain at least one int”;`


    #### Methods


    A *method* is basically something that a class can do. One common metaphor for
    classes and objects is that classes are nouns and methods are verbs. As with all
    metaphors, it''s sometimes true and sometimes false, but it''s often a handy way
    to check whether your design makes sense. Methods often do something with the
    other members (fields and methods) of the class. However, some methods (usually
    static methods) do nothing with the other members of the class, effectively operating
    on their own.


    Thanks to the capability of methods to do lots of different things, it''s hard
    to make a meaningful generalization about methods beyond just saying, “Methods
    do things.” Perhaps some examples will help (see [Listing 2-10](#Chapter02.html#list_2_10)).


    ***Listing 2-10**. Methods*


    `  // a classic getter method`

    `  @Override`

    `  public int[] getInts() {`

    `    return ints;`

    `  }`


    `  // a classic setter method`

    `  @Override`

    `  public void setInts(int[] ints) throws IllegalArgumentException {`

    `    if (ints.length == 0){`

    `      throw new IllegalArgumentException(EXCEPTION_MESSAGE);`

    `    }`

    `    this.ints = ints;`

    `  }`


    Let''s have a closer look at the “setter” method, starting with the first line
    (not counting the comment, which starts with `//.` We cover comments later in
    the chapter).


    `public` is the method''s access modifier. We cover access modifiers earlier in
    the chapter.


    `void` is the return type. The return type tells any code that called this method
    what to expect. All methods must have a return type. v`oid` indicates that the
    method won''t return anything. So, all methods must have a return type, but not
    all methods must return something. If we look at the other methods in the class,
    we can see that they often do return something.


    `setInts` is the method''s name. By convention, method names start with a lowercase
    letter and have capital letters wherever a logical word appears. This is sometimes
    called camel case.


    The parentheses contain a list of arguments. In this example, the list is only
    one argument long. Each argument has a type and a name. In this case, the type
    is `int[]` (the brackets indicate an array), and the name is `ints`. The arguments
    are separated by commas when more than one is present, as in the following method
    declaration from the `AverageTest` class:


    `private static String buildTestString(int[] values, float average, long time)
    {`


    The brace character opens the code block that is the method''s body. We cover
    blocks later in this chapter.


    Methods can also be static. On a method, the `static` keyword means that only
    one such method exists in the system, no matter how many objects of that class
    might exist. For that reason, a static method is also known as a class method.
    Also, the method cannot use any of the class''s fields other than fields that
    have themselves been declared static (usually constants). Static methods can be
    a handy way to provide utility methods for use throughout your code. For example,
    a method that takes a date and returns a formatted string might be static, provided
    it doesn''t need to use any of its containing class''s non-static methods. Also,
    static methods can be slightly more efficient, because they don''t access anything
    outside the method body.


    ![images](images/square.jpg) **Warning** Static methods can cause problems. Suppose
    you have two threads, each of which is working with an object whose class definition
    has a static method. If both classes try to access the method at the same time,
    bad things can happen. For one thing, any fields modified by the method can end
    up with the wrong value, because the threads might run in the wrong order. Also,
    a static method has just one instance (the class itself), so a class that takes
    a long time to do whatever it does can keep the second (and third,  fourth, and
    so on) thread waiting.'
