- fmt: "### The Structure of XML\n\nBefore you get to processing the stuff, you should\
    \ see what XML looks like and learn a bit about its nature. First off, know that\
    \ XML, while called a language, isn't a language in the same sense as Java. XML\
    \ is a storage format, and it offers no processing capabilities of its own. It\
    \ has no looping structure, no way to specify variables or data types (except\
    \ that a program might use a bit of XML as a variable or data type, but that's\
    \ not the same as what Java does). So, XML is really just text that has been organized\
    \ in a particular way.\n\nThe root of any XML document is a single element. That\
    \ element can have any number of other elements as children, and each of these\
    \ children can have any number of children, and so on, resulting in a hierarchical\
    \ structure of arbitrary complexity and depth (which is to say that an XML document\
    \ can be of any size and have elements nested to any depth). Also, each element\
    \ can have any number of attributes. However, attributes cannot have children,\
    \ so most of the content, in most XML documents, comes from the elements.\n\n\
    Before going any further, take a look at the smallest possible XML file.\n\n**Listing\
    \ 9-1.** *The Smallest Possible XML File*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<elementName/>\n```\n\nI have worked with systems that had many such\
    \ files, as each directory in a set of directories meant to contain the output\
    \ of a complex process had to have at least one file. Consequently, we had a bunch\
    \ of XML files with content as follows: `<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?><placeholder/>` You can see the exact syntax shortly. Until then, a more meaningful\
    \ example will help to clarify things. Here's one of my favorite poems, encoded\
    \ as an XML document.\n\n**Listing 9-2.** *An Example of XML*\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<poem title=\"The Great Figure\" author=\"William\
    \ Carlos Williams\">\n  <line>Among the rain</line>\n  <line>and lights</line>\n\
    \  <line>I saw the figure 5</line>\n  <line>in gold</line>\n  <line>on a red</line>\n\
    \  <line>fire truck</line>\n  <line>moving</line>\n  <line>tense</line>\n  <line>unheeded</line>\n\
    \  <line>to gong clangs</line>\n  <line>siren howls</line>\n  <line>and wheels\
    \ rumbling</line>\n  <line>through the dark city</line>\n</poem>\n```\n\nThe first\
    \ line, the document specifier, indicates that this document is an XML document\
    \ and specifies the version (1.0, which is the most often used version, and suffices\
    \ for most purposes) and the encoding. Document specifiers always begin with `<?`\
    \ and end with `?>`. This way, they can't be confused with XML elements. Most\
    \ systems that can process XML will work with documents that don't have a document\
    \ specifier, but a document without one isn't strictly an XML file—it's just a\
    \ collection of characters that happen to look like an XML file. That may seem\
    \ like an arbitrary and trivial distinction, but your XML document may be rejected\
    \ for just that reason by some systems, so it's good to get in the habit of always\
    \ including a document specifier. The encoding indicates the character set that\
    \ applies to the content. UTF-8 is a large set that includes most of the characters\
    \ available in non-Asian languages (including English, Greek, Spanish, Russian,\
    \ and many others). The Asian languages (Chinese, Japanese, Vietnamese, and others)\
    \ use pictographs (that is, an image that corresponds to a word). The Asian character\
    \ sets are consequently very large and tricky to manipulate. For the sake of simplicity,\
    \ we'll stick to UTF-8 and documents in English.\n\nThe next line contains the\
    \ root element. The first element in any XML file is that document's root element.\
    \ All other elements, no matter how deeply nested, are descendants of the root.\
    \ The root element, `poem`, contains two attributes, `title` and `author`. The\
    \ root element also contains all the `line` elements, which make up the body of\
    \ the poem.\n\nNote the syntax for each element. Each one begins with an opening\
    \ tag (`<poem>` or `<line>`) and ends with a closing tag (`</poem>` or `</line>`).\
    \ The basic rule is that the names within the tags have to match (and there are\
    \ various restrictions about which characters can be used, but just about any\
    \ English word works). Other than that, opening tags always start with a left\
    \ angle character (`<`) and end with a right angle character (`>`). Ending tags\
    \ always begin with a left angle character and a forward slash (`</`) and end\
    \ with a right angle character (`>`). Elements can also be empty, in which case\
    \ they can take one of two forms: a beginning tag and an ending tag with nothing\
    \ between them, or a special empty element tag. For example, an empty line element\
    \ can be represented as either `<line></line>` or `<line/>`. That second structure\
    \ provides a handy shortcut that saves some typing. If the poem included a blank\
    \ line (such as a line between stanzas in a longer poem), you could represent\
    \ a blank line that way.\n\n![images](images/square.jpg) **Note** XML is case-sensitive.\
    \ `<POEM>`, `<Poem>`, and `<poem>` are all different elements, so `<POEM></poem>`\
    \ would cause an XML parser to throw an error.\n\nA poem offers an example of\
    \ a fairly traditional document encoded as XML. Consider an example of data transmitted\
    \ between systems as XML.\n\n**Listing 9-2.** *XML As Data*\n\n```\n<?xml version=\"\
    1.0\"?>\n<soap:Envelope\n    soap:encodingStyle=\"http://www.w3.org/2001/12/soap-encoding\"\
    >\n  <soap:Body>\n    <w:GetTemperature>\n      <w:Location>78701</w:Location>\n\
    \    </w:GetTemperature>\n  </soap:Body>\n</soap:Envelope>\n```\n\nLook closely\
    \ at the document specifier. In this case, it doesn't indicate encoding. The default\
    \ encoding for XML is UTF-8, so you can omit the specifier when you are going\
    \ to use UTF-8 characters. Then you have a root element named `soap:Envelope`.\
    \ The specifier and the root element constitute the minimum content for an XML\
    \ file, but that wouldn't make a very useful message between systems. So this\
    \ example also contains a bit of data (the zip code for a particular city). This\
    \ XML document represents a request for data from one system to another system.\
    \ (I invented it from scratch, by the way; NOAA may use something else entirely.)\
    \ In particular, it's a request to get the temperature in Austin, TX. Note the\
    \ indentation. When XML is meant to be read by humans, it's customarily indented,\
    \ such that each level of elements is farther to the right than its parent level.\
    \ When creating a stream to send to another system, all the white space between\
    \ elements is generally removed, resulting in the whole document being on one\
    \ line. That's tough to read for a human, but it saves bandwidth, and a computer\
    \ doesn't find it hard to read.\n\n![images](images/square.jpg) **Note** “Document”\
    \ is the normal way to refer to any instance of XML, whether it encodes an actual\
    \ document or some arbitrary bit of data—XML originally comes from the publishing\
    \ industry, and it retains some of that industry's terminology."
