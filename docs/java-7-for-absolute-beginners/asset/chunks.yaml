    it calculates the corners of the outer triangle and passes those values to the
    `drawTriangle` method. Then the `drawTriangle` method calculates a series of triangles
    within triangles, down to the depth specified in the `maxLevel` variable that
    is stated at the top of the class. You can change the depth by changing that value,
    and a good exercise is to add setting that value to the user interface.


    The actual drawing happens only after the class reaches the maximum level. At
    that point, there are 729 (3 to the 6th power) triangles that draw themselves
    and 364 triangles that contain other triangles. Three hundred and sixty-four is
    not a power of 3, so how was that number obtained by calculating six levels of
    depth? The following table shows the progression:


