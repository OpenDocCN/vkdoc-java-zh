    Similarly, you might need to delete a directory at some point. As you probably
    expect by now, the code for doing so is remarkably similar to the code for creating
    a directory, as shown in [Listing 8-10](#Chapter08.html#list_8_10).


    ***Listing 8-10.** Deleting a directory*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `  public static void main(String[] args) {`

    `    String testDirectoryName = "C:" + File.separator + "test";`

    `    File testDirectory = new File(testDirectoryName);`

    `    if (testDirectory.exists()) {`

    `      testDirectory.delete();`

    `      System.out.println("Deleted a directory called " + testDirectoryName);`

    `    } else {`

    `      System.out.println("Couldn''t delete " + testDirectory`

    `          + " because it does not exist");`

    `    }`

    `  }`

    `}`'
  trans: '

    #### 创建目录


    有时，你需要创建一个目录来存放所创建的文件。实际上，`File` 类既可以定义目录，也可以定义文件。（在本章前面处理临时文件的程序中，你曾见过一个例子：我们使用
    `File` 对象来指定测试目录。）请记住，`File` 对象是一个包含其他信息的路径。该路径可以指向一个文件或一个目录。清单 8-8 展示了一个创建目录的简单程序。


    ***清单 8-8.** 创建目录*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `    public static void main(String[] args) {`

    **`String testDirectoryName = "C:" + File.separator + "test";`**

    **`File testDirectory = new File(testDirectoryName);`**

    `        try {`

    `            testDirectory.mkdir();`

    `        } catch (Exception e) {`

    `            System.out.println("无法创建名为 "`

    `                    + testDirectoryName + " 的目录");`

    `            System.exit(1);`

    `        }`

    `        System.out.println("已创建名为 " + testDirectoryName + " 的目录");`

    `    }`

    `}`


    请注意，我们使用的是 `mkdir` 方法，而不是 `createNewFile` 方法。Windows 系统要求我们拥有特殊权限才能写入 `C:` 盘的根目录。任何在系统上创建名为
    `C:\test` 的文件的尝试都会失败。（如果我们将路径改为 `C:\temp\test`，我们会在 `test` 目录下得到一个名为 `test`（无扩展名）的文件。）然而，我们可以在根目录下创建一个子目录，因此
    `mkdir` 方法可以正常工作。


    你也可以创建多个目录，形式为指向特定位置的较长路径。假设我们想创建一个名为 `C:\test\test2\test3` 的目录。我们可以使用 `mkdirs`
    方法（注意末尾的 s）来实现，如清单 8-9 所示（其中指定路径的行和 `mkdirs` 行已高亮显示）。


    ***清单 8-9.** 创建多个目录*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `    public static void main(String[] args) {`

    **`String testDirectoryName = "C:" + File.separator + "test" +`**

    **`File.separator + "test2" + File.separator + "test3";`**

    `        File testDirectory = new File(testDirectoryName);`

    `        try {`

    **`testDirectory.mkdirs();`**

    `        } catch (Exception e) {`

    `            System.out.println("无法创建名为 "`

    `                    + testDirectoryName + " 的目录");`

    `            System.exit(1);`

    `        }`

    `        System.out.println("已创建名为 " + testDirectoryName + " 的目录");`

    `    }`

    `}`


    请注意 `System.Exit(1)` 命令。如果发生错误，该行会使程序停止（更准确地说，它会终止当前正在运行的 Java 虚拟机）。按照惯例（并且是一个古老的惯例），退出代码
    0 表示程序正常终止（即没有错误）。任何其他值都表示某种错误。在详细的异常信息出现之前（并且在当今某些系统中仍然如此），当程序失败时，人们只能得到一个晦涩的数字。然后，有人必须在一个错误代码列表中查找这个数字，才能知道发生了什么。优秀的系统操作员能记住大量这样的代码。如今，开发人员很高兴能获得更有意义的输出。


    像往常一样，你可以在 Eclipse 的控制台中看到目录的名称。我还包含了程序运行后文件系统的截图，只是为了证明它确实有效。图 8-6 显示了我系统上 Windows
    资源管理器路径字段中的目录。


    ![images](img/0806.jpg)


    ***图 8-6.** 创建三个嵌套目录的结果*


    #### 删除目录


    类似地，你可能需要在某个时候删除一个目录。正如你现在可能预料到的，执行此操作的代码与创建目录的代码非常相似，如清单 8-10 所示。


    ***清单 8-10.** 删除目录*


    `package com.apress.java7forabsolutebeginners.examples;`


    `import java.io.File;`


    `public class FileTest {`


    `  public static void main(String[] args) {`

    `    String testDirectoryName = "C:" + File.separator + "test";`

    `    File testDirectory = new File(testDirectoryName);`

    `    if (testDirectory.exists()) {`

    `      testDirectory.delete();`

    `      System.out.println("已删除名为 " + testDirectoryName + " 的目录");`

    `    } else {`

    `      System.out.println("无法删除 " + testDirectory`

    `          + "，因为它不存在");`

    `    }`

    `  }`

    `}`

