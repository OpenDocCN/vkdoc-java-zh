  trans: '

    ### 时机决定一切


    动画的本质在于时机。动画图像会每隔一段时间发生变化。通常，这个间隔非常短（每秒多次），但每分钟变化一次的图像（例如时钟）仍然属于动画，尽管看起来可能不那么有趣。为了让你了解动画图像变化的频率，我们来看看一些常见的动画速度，这些速度我们大多数人每天都会见到，甚至通常不会意识到它们是动画图像。


    标准电视信号（STV，高清电视的前身）每秒显示约 30 帧新图像。也就是说，STV 信号的帧率为每秒 30 帧。*帧率*是动画、通用计算以及其他行业中的一个关键术语。你已经了解了它在动画中的含义。在通用计算中，“帧率”指的是程序处理所有输入并生成所有输出的频率。经典的例子是操控车辆的软件。如果车辆是海上的货轮，较低的帧率（例如每分钟一次）可能就足够了。而对于自动着陆器（用于月球或火星），可能需要接近每秒
    100 次的帧率。这样的系统被称为以某个*赫兹*运行，这是描述进程每秒重复多少次的技术术语。赫兹被用于许多行业，包括电子行业。最后，对于视频游戏，动画通常以每秒帧数（FPS）来衡量，这与赫兹相同，但属于行业特定术语。


    回到常见的帧率（或 FPS），标准电视每秒显示 30 帧。大多数电影以 24 FPS 拍摄（尽管这正在迅速变为 60 FPS）。NTSC（美国的标准电视信号格式，高清电视的前身）以
    60 FPS 运行（但它是隔行扫描的，意味着屏幕被分成若干行，交替的行集每秒各显示 30 次）。许多其他国家（包括大部分欧洲国家）在标准电视中使用 50 FPS（隔行扫描）。ATSC
    标准（本质上是美国使用的高清电视标准）根据多种因素，每秒显示 24 到 60 帧。更新的高清电视设备声称帧率高达 240。最后，大多数计算机显示器在 75
    到 85 赫兹之间运行，即每秒 75 到 85 帧。


    最后一个速率通常是程序员最关心的（尽管游戏主机程序员也需要关注电视帧率）。我们可以制作能够显示每秒数百帧的动画系统，但这样做没有意义。没有显示器能显示那么多帧。因此，显示器的赫兹是计算机生成动画的实际限制。事实上，试图达到高于显示器赫兹的帧率不仅毫无意义，还可能有害，因为它会占用系统资源，使其无法处理其他工作（无论是你的进程还是其他进程）。


    在为本章创建示例时，我们选择了 4 到 25 FPS 之间的帧率。这看起来可能很低，但对于示例来说已经足够了。较低的帧率甚至可能帮助你理解动画的工作原理，因为你可以看到动画发生的过程。如果你仔细观察精灵动画示例，你可以看到单个图像被绘制出来。


    顺便提一下，人类（以及猫、狗和其他任何拥有非机械眼睛的生物）并不是以每隔一段时间闪过一帧的方式来看待世界的。作为模拟系统，人眼和大脑对光线、运动和颜色的稳定输入做出反应。游戏制作者和其他动画师（例如在法庭上重现车祸场景的人）通常关心的问题是，观众在什么速率下会感觉自己看到了逼真的画面（再次强调，这与看到真实事物不同）。这个数字根据许多因素而有很大差异，例如分辨率、屏幕内容的明暗平衡、观众所在区域的照明、观众的视力敏锐度（其本身又由年龄、疲劳程度、动画经验等多个变量决定）。


    那么，你的应用程序合适的 FPS 是多少？唯一真正知道的方法是将它展示给几位不同的潜在用户，并询问他们看起来是否良好。此外，如果你做了大量动画工作，你可能会培养出对合适帧率的直觉。最后，游戏制作者通常关注竞争对手在做什么。如果他们的游戏以
    75 FPS 运行，你的游戏最好也能达到这个水平，或者有充分的理由不这样做。

    '
- fmt: "### Animation: A Simple Example\n\nLet's start with the basics: getting an\
    \ object to move from one side of the screen to the other. My friends in the game\
    \ industry say this is the “Hello, World” stage of game development. To do it,\
    \ we create two classes: a field for the object to cross and a frame to be the\
    \ main program. (We could do it in a single class, but Swing makes a separate\
    \ drawing field easier to do.) [Listing 10-1](#Chapter10.html#list_10_1) shows\
    \ the program class (called `ScootBall` because a ball scoots across the screen).\n\
    \n**Listing 10-1.** The `ScootBall` class\n\n```\npackage com.bryantcs.examples.animation;\n\
    \nimport java.awt.BorderLayout;\nimport java.awt.Color;\nimport java.awt.Dimension;\n\
    import java.awt.FlowLayout;\nimport java.awt.event.ActionEvent;\nimport java.awt.event.ActionListener;\n\
    \nimport javax.swing.JButton;\nimport javax.swing.JFrame;\nimport javax.swing.JMenu;\n\
    import javax.swing.JMenuBar;\nimport javax.swing.JMenuItem;\nimport javax.swing.JPanel;\n\
    \npublic class ScootBall implements ActionListener {\n\n  private static final\
    \ long serialVersionUID = 1L;\n\n  ScootBallPanel scootBallPanel = new ScootBallPanel();\n\
    \  JFrame frame = new JFrame(\"ScootBall\");\n  JPanel buttonPanel=new JPanel(new\
    \ FlowLayout(FlowLayout.CENTER));\n  JButton scootButton=new JButton(\"Scoot\"\
    );\n  Thread animationThread = null;\n\n  private void addMenu(JFrame frame) {\n\
    \    JMenu file = new JMenu(\"File\");\n    file.setMnemonic('F');\n    JMenuItem\
    \ exitItem = new JMenuItem(\"Exit\");\n    exitItem.setMnemonic('x');\n    exitItem.addActionListener(this);\n\
    \    file.add(exitItem);\n    JMenuBar menuBar = new JMenuBar();\n    menuBar.add(file);\n\
    \    frame.setJMenuBar(menuBar);\n  }\n\n  private void createAndShowGUI() {\n\
    \    addMenu(frame);\n    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    \    frame.getContentPane().setLayout(new BorderLayout());\n    scootButton.addActionListener(this);\n\
    \    buttonPanel.add(scootButton);\n    scootBallPanel.setPreferredSize(new Dimension(400,\
    \ 200));\n    scootBallPanel.setBackground(Color.WHITE);\n    frame.getContentPane().add(scootBallPanel,BorderLayout.CENTER);\n\
    \    frame.getContentPane().add(scootBallPanel);\n    frame.getContentPane().add(buttonPanel,BorderLayout.SOUTH);\n\
    \    frame.pack();\n    frame.setVisible(true);\n  }\n\n  public static void main(String[]\
    \ args) {\n    ScootBall scootBall = new ScootBall();\n    scootBall.createAndShowGUI();\n\
    \  }\n\n  // The actionPerformed method listens for actions taken by the user\n\
    \  public void actionPerformed(ActionEvent e) {\n    // If the user chooses Exit,\
    \ then exit\n    if (e.getActionCommand().equals(\"Exit\")) {\n      System.exit(0);\n\
    \    }\n    // Since we didn't exit, check for whether the user clicked the Scoot\
    \ button\n    // and ignore the click if a ball is already moving. If not, start\
    \ one moving.\n    if (e.getActionCommand().equals(\"Scoot\") && scootBallPanel.isAnimating()\
    \ == false) {\n      scootBallPanel.reset();\n      animationThread = new Thread(scootBallPanel);\n\
    \      scootBallPanel.setAnimating(true);\n      animationThread.start();\n  \
    \  }\n  }\n}\n```\n\nThe key to the this class is the `actionPerformed` method.\
    \ It checks for which action the user has chosen and starts the animation if the\
    \ user selects the Scoot button (and if the ball isn't already being drawn). The\
    \ animation is accomplished through the `ScootBallPanel` class. Because `ScootBallPanel`\
    \ implements the `Runnable` interface (meaning it can be run in its own thread),\
    \ we have a means to let it know when to start drawing the ball. Note that we\
    \ create a new thread each time the Scoot button is pressed, letting any previous\
    \ thread go to garbage collection. That's a simple way to restart an animation\
    \ process. Listing 10-2 shows the `ScootBallPanel` class.\n\n**Listing 10-2.**\
    \ The `ScootBallPanel` class\n\n```\npackage com.bryantcs.examples.animation;\n\
    \nimport java.awt.Color;\nimport java.awt.Graphics;\n\nimport javax.swing.JPanel;\n\
    \npublic class ScootBallPanel extends JPanel implements Runnable {\n\n  private\
    \ static final long serialVersionUID = 1L;\n  private boolean animating = false;\n\
    \  private int xPosition = 5;\n\n  public boolean isAnimating() {\n    return\
    \ animating;\n  }\n\n  public void setAnimating(boolean animating) {\n    this.animating\
    \ = animating;\n  }\n\n  public void reset() {\n    xPosition = 5;\n  }\n\n  public\
    \ void paint (Graphics g) {\n    int width = this.getSize().width;\n    int height\
    \ = this.getSize().height;\n    super.paintComponent(g);\n\n    if (animating)\
    \ {\n      g.setColor(Color.RED);\n      g.fillOval(xPosition, height / 2, 10\
    \ ,10);\n      xPosition += 20;\n      if (xPosition > width) {\n        animating\
    \ = false;\n      }\n    }\n  }\n\n  // The run method controls how often the\
    \ screen\n  // gets redrawn and so controls the frame rate\n  public void run()\
    \ {\n    while(animating) {\n      try {\n        Thread.sleep(40);\n        this.repaint();\n\
    \      } catch (InterruptedException ie) {\n        return;\n      }\n    }\n\
    \  }\n}\n```\n\nThose two classes create a program that looks like the image in\
    \ [Figure 10-1](#Chapter10.html#fig_10_1).\n\n![images](images/1001.jpg)\n\n**Figure\
    \ 10-1.** ScootBall starting state\n\nThe heart of the `ScootBallPanel` class\
    \ is the `run` method, which implements the corresponding `run` method in the\
    \ `Runnable` interface. All it does is run through a continuous loop, sleeping\
    \ a while and then repainting the panel. How long it sleeps dictates the frame\
    \ rate. In this case, it sleeps for 40 milliseconds, producing a frame rate of\
    \ about 25. I wrote, “about,” because the repainting takes some time, yielding\
    \ a frame rate a bit less than 25. We see how to get a more exact frame rate in\
    \ the next example.\n\nThe `paint` method draws the ball on the screen, each time\
    \ at a new position, until that position exceeds the width of the panel. In particular,\
    \ the call to `super.paintComponent(g)` redraws the panel to its original state\
    \ (a blank white box). The remaining lines then draw the ball. [Figure 10-2](#Chapter10.html#fig_10_2)\
    \ shows a ball scooting across the screen.\n\n![images](images/1002.jpg)\n\n**Figure\
    \ 10-2.** Scootball in action\n\nScootball is not much of a program, but it demonstrates\
    \ the basics of animation: drawing an updated image every so often (generally\
    \ some number of times per second). Let's move on to a slightly more complicated\
    \ (and thus more interesting) example."
