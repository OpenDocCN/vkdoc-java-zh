    #### 使用 DOM 读取 XML


    以下是一个使用 DOM 读取 XML 的程序的源代码。要使此程序正常运行，你需要创建一个名为 `poemsource.xml` 的文件，并将其放在 `C:\test`（Windows
    系统）或 `C:/test`（Unix 或 Linux 系统）目录下。你可以使用 `domoutput.xml` 文件的内容作为 `poemsource.xml`
    文件的内容。


    ***清单 9-6**。使用 DOM 读取 XML*


    `package com.bryantcs.examples.xml;`


    `import java.io.File;`

    `import java.io.IOException;`


    `import javax.xml.parsers.DocumentBuilder;`

    `import javax.xml.parsers.DocumentBuilderFactory;`

    `import javax.xml.parsers.ParserConfigurationException;`


    `import org.w3c.dom.Document;`

    `import org.w3c.dom.Element;`

    `import org.w3c.dom.NamedNodeMap;`

    `import org.w3c.dom.Node;`

    `import org.w3c.dom.NodeList;`

    `import org.xml.sax.SAXException;`


    `public class ReadWithDOM {`


    `  public static void main(String[] args) {`

    `    String fileName = "C:" + File.separator + "test"`

    `    + File.separator + "poemsource.xml";`

    `    writeFileContentsToConsole(fileName);`

    `  }`


    `  // 将文件内容写入控制台  private static void`

    `writeFileContentsToConsole(String fileName) {`

    `    // 创建一个 DOM Document 对象    Document doc = createDocument(fileName);`

    `    // 获取根元素    Element root = doc.getDocumentElement();`

    `    // 创建一个描述根元素的 StringBuilder 对象    StringBuilder sb = new`

    `StringBuilder();    sb.append("根元素的名称为: \"" + root.getNodeName() + "\"");`

    `    sb.append(" 并具有以下属性: ");`

    `    NamedNodeMap attributes = root.getAttributes();`

    `    for (int i = 0; i < attributes.getLength(); i ++) {`

    `      Node thisAttribute = attributes.item(i);`

    `      sb.append(thisAttribute.getNodeName());`

    `      sb.append (" (\"" + thisAttribute.getNodeValue() + "\")");`

    `      if (i < attributes.getLength() - 1) {`

    `        sb.append(", ");`

    `      }`

    `    }`

    `    // 将根元素的描述写入控制台    System.out.println(sb);`


    `    // 遍历根元素的子节点`

    `    // 首先，获取子节点列表    NodeList nodes =`

    `doc.getElementsByTagName("line");`

    `    for (int i = 0; i < nodes.getLength(); i++) {`

    `      // 依次处理每个元素      Element element = (Element) nodes.item(i);`

    `      System.out.println("找到一个名为 \"" +`

    `      // 通过将其名称和内容写入控制台 (System.out)`

    `element.getTagName() + "\"" +`

    `        " 的元素，其内容如下: \"" +`

    `        element.getTextContent() + "\"");`

    `    }`

    `  }`


    `  // 从文件创建一个 DOM Document 对象  private static Document createDocument(String`

    `fileName) {`

    `    Document doc = null;`

    `    try {`

    `      // 获取文件      File xmlFile = new File(fileName);`

    `      // 创建文档构建器工厂      DocumentBuilderFactory dbfac =`

    `DocumentBuilderFactory.newInstance();`

    `      // 创建文档构建器对象      DocumentBuilder docBuilder =`

    `dbfac.newDocumentBuilder();`

    `      // 通过使用文档构建器解析文件来加载文档      doc =`

    `docBuilder.parse(xmlFile);`

    `      // 指示此文档是独立的      doc.setXmlStandalone(true);`

    `    }`

    `    // 处理可能的异常    catch (IOException ioe) {`

    `      System.out.println("无法打开文件: " + fileName);`

    `      System.exit(1);`

    `    }`

    `    catch (SAXException se) {`

    `      System.out.println("无法解析 XML 文件");`

    `      System.exit(1);`

    `    }`

    `    catch(ParserConfigurationException pce) {`

    `      System.out.println("无法创建 DocumentBuilder");`

    `      System.exit(1);`

    `    }`

    `    // 最后返回我们从文件构建的 Document 对象`

    `    return doc;`

    `  }`

    `}`


    在这个例子中，我们只是创建了一个 `Document` 对象，读取输入的每一行，并在控制台中描述其内容。当然，你可能想做比在控制台中描述输入更复杂的事情，但这个例子向你展示了如何读取文件。需要注意的一点是，每个
    `Element` 对象实际上都是一个 `Node` 对象（`Element` 接口扩展了 `Node` 接口）。由于 DOM 的实现方式，有时你需要同时处理
    `Element` 对象和 `Node` 对象，就像我在处理属性值时不得不做的那样。


    #### 使用 SAX 读取 XML


    SAX 使用一个名为 `ContentHandler` 的接口来暴露解析事件，然后你可以在自己的代码中拦截这些事件，以便为每个解析事件执行所需的任何处理。SAX
    包还提供了 `ContentHandler` 的一个默认实现，称为 `DefaultHandler`。`DefaultHandler` 对每个事件不执行任何操作，因为不执行任何操作是默认行为。但是，你可以覆盖
    `DefaultHandler` 中的方法来做任何你想做的事情。扩展 `DefaultHandler` 的好处是，你可以只覆盖你关心的那些方法，而让其余的方法保持不变。在我这里使用的示例中，我不需要
    `DefaultHandler` 中的许多方法，所以我没有覆盖它们。


    如果你查看这些方法的名称，就能明白为什么 SAX 在处理 XML 时占用如此少的内存。它会为 XML 文档的每个部分（无论是文档本身还是元素）的开始和结束触发一个事件。因此，解析器只需将元素的名称（以及一些其他细节）和元素的子节点列表放入内存。在到达
    `characters` 方法（即处理元素字符内容的方法）之前，它不必将元素的内容放入内存。大多数元素没有大量的文本内容（一个例外是当有人像 Word 文档那样将图像存储在
    XML 元素中时），因此用于处理文本的内存通常不多。


    为了向你展示如何读取一个简单的 XML 文档并在控制台中描述其内容，我首先创建了一个类（名为 `XMLToConsoleHandler`），它扩展了 `DefaultHandler`
    并覆盖了我在捕获 XML 文件内容时需要使用的几个方法。以下是 `XMLToConsoleHandler` 类：


    ***清单 9-7**。XMLToConsolHandler*


    `package com.bryantcs.examples.xml;`


    `import org.xml.sax.Attributes;`

    `import org.xml.sax.SAXException;`


    `import org.xml.sax.helpers.DefaultHandler;`


    `public class XMLToConsoleHandler extends DefaultHandler {`


    `  // characters 方法处理元素的实际内容  @Override`

    `  public void characters(char[] content, int start, int length) throws SAXException
    {`

    `    // 在控制台中描述内容    System.out.println("找到内容: " + new String(content, start,
    length));  }`


    `  // endDocument 方法让我们可以在解析器到达文档末尾时执行某些操作  @Override`

    `  public void endDocument() throws SAXException {`

    `    // 在控制台中宣布我们找到了文档的末尾`

    `System.out.println("找到文档的末尾");  }`


    `  // endElement 方法让我们可以在解析器到达元素末尾时执行某些操作  @Override`

    `  public void endElement(String arg0, String localName, String qName)`

    `      throws SAXException {`

    `    // 在控制台中宣布我们找到了一个元素的末尾`

    `System.out.println("找到一个名为 \"" + qName + "\" 的元素的末尾");`

    `  }`


    `  // startDocument 方法让我们可以在找到文档顶部时执行某些操作  @Override`

    `  public void startDocument() throws SAXException {`

    `    // 在控制台中宣布我们找到了文档的开头`

    `System.out.println("找到文档的开头");`

    `  }`

