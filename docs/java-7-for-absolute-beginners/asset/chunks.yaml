    \ almost all of Java's syntax. We learned in [Chapter 1](#Chapter01.html#ch1)\
    \ that a class is a bit of code that contains other bits of code (which we get\
    \ to later in this chapter). An interface is basically a contract; a class that\
    \ uses an interface must do all the things specified by the interface. (In proper\
    \ Java terms, a class that implements an interface must implement all the methods\
    \ specified by the interface.) I might have missed some obscure bits, but understanding\
    \ this much syntax serves you well for a long time. We refer to these three listings\
    \ throughout the rest of the chapter. If the listings seem long, don't let that\
    \ bother you. For now, just read through them. As we work through this chapter,\
    \ come back to these three listings and things should become clearer. Let's start\
    \ with an interface, as shown in [Listing 2-1](#Chapter02.html#list_2_1).\n\n\
    **Listing 2-1.** The `Average` interface\n\n```\npackage com.apress.java7forabsolutebeginners.syntaxExample;\n\
    \npublic interface Average {\n\n  public int[] getInts();\n  public void setInts(int[]\
    \ ints);\n  public float getAverage();\n}\n```\n\nAny class that uses our `Average`\
    \ interface has to include (that is, implement) the `getInts()`, `setInts()`,\
    \ and `getAverage()` methods. Also, those methods within the implementing class\
    \ must have the same arguments. So a class that includes the following method\
    \ whose signature is `getInts(int numberOfIntsToGet)` does not satisfy the interface's\
    \ contract unless it also includes a method whose signature is `getInts()`. Don't\
    \ worry too much about this just now. We work through some examples as we go,\
    \ and those should clear up your understanding nicely.\n\n**Listing 2-2.** The\
    \ `AverageImpl` class\n\n```\npackage com.apress.java7forabsolutebeginners.syntaxExample;\n\
    \npublic class AverageImpl extends Object implements Average {\n  private long\
    \ begin;\n  private long end;\n  private int[] ints;\n  private static final String\
    \ EXCEPTION_MESSAGE =\n    \"ints must contain at least one int\";\n\n  public\
    \ AverageImpl(int[] ints) throws IllegalArgumentException {\n    if (ints.length\
    \ == 0){\n      throw new IllegalArgumentException(EXCEPTION_MESSAGE);\n    }\n\
    \    this.ints = ints;\n  }\n\n  @Override\n  public float getAverage() {\n  \
    \  begin = System.nanoTime();\n    int result = 0;\n    for (int i = 0; i < ints.length;\
    \ i++) {\n      result += ints[i];\n    }\n    end = System.nanoTime();\n    return\
    \ (float) result / ints.length;\n  }\n\n  public static float averageTwoNumbers(int\
    \ a, int b) {\n    return (float) (a + b) / 2;\n  }\n\n  // a classic getter method\n\
    \  @Override\n  public int[] getInts() {\n    return ints;\n  }\n\n  // a classic\
    \ setter method\n  @Override\n  public void setInts(int[] ints) throws IllegalArgumentException\
    \ {\n    if (ints.length == 0){\n      throw new IllegalArgumentException(EXCEPTION_MESSAGE);\n\
    \    }\n    this.ints = ints;\n  }\n\n  public long getRunTime() {\n    return\
    \ end - begin;\n  }\n}\n```\n\nThe `AverageImpl` implements the `Average` interface.\
    \ (\"Impl\" is an abbreviation that is often used for a class that implements\
    \ an interface.) In particular, it implements the three methods defined by the\
    \ `Average` interface. As you can see, it does some other things, too, including\
    \ defining a message to use when things go wrong (an exception is Java's way of\
    \ saying it found something didn't work) and giving us the tools to keep track\
    \ of how long it takes to average whatever numbers we provide as input.\n\n**Listing\
    \ 2-3.** The `AverageTest` class\n\n```\npackage com.bryantcs.examples.syntaxExample;\n\
    \nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\npublic class AverageTest\
    \ {\n\n  public static void main(String[] args) {\n    // set up a test for AverageImpl\n\
    \    int[] ints = {1, 2, 3, 4};\n    AverageImpl averageImpl = new AverageImpl(ints);\n\
    \    // do one test\n    String testString = buildTestString(averageImpl.getInts(),\n\
    \        averageImpl.getAverage(), averageImpl.getRunTime());\n    System.out.println(testString);\n\
    \n    // set up a second test (using setInts)\n    ints[0] = 2;\n    ints[1] =\
    \ 3;\n    ints[2] = 4;\n    ints[3] = 5;\n    averageImpl.setInts(ints);\n\n \
    \   // do the second test\n    testString = buildTestString(averageImpl.getInts(),\n\
    \        averageImpl.getAverage(), averageImpl.getRunTime());\n    System.out.println(testString);\n\
    \n    // Test the exception\n    int[] ints2 = {};\n    try {\n      averageImpl.setInts(ints2);\n\
    \    } catch(IllegalArgumentException iae) {\n      System.out.println(\"Oops!\
    \ can't use an empty array\");\n    }\n\n    // add a test for the convenience\
    \ method\n    System.out.println(\"AverageImpl.averageTwoNumbers(1, 2) = \"\n\
    \        + AverageImpl.averageTwoNumbers(1, 2));\n  }\n\n  private static String\
    \ buildTestString(int[] values, float average, long time) {\n    // set up a timestamp\
    \ for our tests\n    Date now = new Date();\n    SimpleDateFormat formatter =\
    \ new SimpleDateFormat(\"HH:mm:ss\");\n    String timeStamp = formatter.format(now);\n\
    \n    StringBuffer sb = new StringBuffer(timeStamp);\n    sb.append(\">Averaged\
    \ {\");\n    for (int i = 0; i < values.length; i++) {\n      sb.append(values[i]);\n\
    \      if (i < values.length - 1) {\n        sb.append(\", \");\n      }\n   \
    \ }\n    sb.append(\"} and got \");\n    sb.append(average);\n    sb.append(\"\
    \ in \");\n    sb.append(time);\n    sb.append(\" nanoseconds\");\n    return\
    \ sb.toString();\n  }\n}\n```\n\nFinally, the `AverageTest` class creates a program\
    \ (you can tell because it has a `main()` method, as we saw in [Chapter 1](#Chapter01.html#ch1))\
    \ that lets us test our `Average` interface and `AverageImpl` class. It tests\
    \ all the methods in the `AverageImpl` class and even creates an exception (that\
    \ is, an error) so that we can see how that works. It also creates a `String`\
    \ object that we use as the message to the user to display our results.\n\n###\
    \ Lines\n\nJava files (classes and interfaces) consist of lines of code. Although\
    \ that might seem obvious, it's actually important. We measure code in lines (remember\
    \ in the movie *Jurassic Park* where the programmer played by Samuel L. Jackson\
    \ says that there are two million lines of code and we are supposed to think the\
    \ program is complex?) and use lines to separate bits of code from other bits\
    \ of code. Java has several kinds of lines, including statements (such as `i =\
    \ 2;`), declarations, and just plain old empty lines (which are often handy for\
    \ making a program easier to read). Java marks the end of statements with a particular\
    \ character, the semicolon (`;`). That matters because a long statement can be\
    \ broken across multiple lines in the file but can still be a single statement\
    \ from Java's perspective. Sometimes, when you debug a bit of Java code, that\
    \ can be important. The examples in Listings 2-2 and 2-3 both have statements\
    \ that have to be split because of the width of the page.\n\nTo make your programming\
    \ simpler and easier (and not drive other programmers crazy), keep your lines\
    \ (both statements and declarations) as short as possible. For historical reasons,\
    \ 80 characters is often used as a suggested limit for the length of a line. If\
    \ you get to 80 characters, find a way to divide the line into two lines. (The\
    \ 80-character value comes from punch cards having 80 characters.) You can certainly\
    \ have longer lines (and there are times when it's acceptable), but hold down\
    \ on really long lines, for sanity's sake."
