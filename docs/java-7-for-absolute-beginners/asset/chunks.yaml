- fmt: "### Our Animals in Java\n\n[Listing 6-7](#Chapter06.html#list_6_7) shows an\
    \ incomplete definition of the animal classes used as examples earlier in the\
    \ chapter. When a developer writes this kind of code, the developer is “creating\
    \ stubs” or “writing stubbed out code.” A *stub* means that we created the structure\
    \ but have left at least some of the details for another time or for someone else\
    \ to do.\n\nYou should put your code in packages. That way, the code in one package\
    \ won't interfere with the code in other packages. If you put everything in the\
    \ default package, you soon run into the problem of wanting to call a class or\
    \ interface by a name you already used. I suggest you get in the habit of putting\
    \ all your code into packages. The package used throughout this chapter includes\
    \ a `Predator` interface. Imagine if want another object model that defined `Predator`\
    \ drones (the remote-control aircraft made famous in recent wars). That's exactly\
    \ the kind of entanglement that makes packages so useful. So we add a package\
    \ definition for each class and interface. In this case, they are in the same\
    \ package.\n\n**Listing 6-7.** The finished `Mammal` class\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \nabstract class Mammal {\n  // And here's a method for making the sound.\n  //\
    \ Each child class must implement it.\n  abstract void speak();\n\n  // All descendant\
    \ classes can call this\n  // and do not need to implement their own versions\
    \ of it\n  protected void sayWhatIAm() {\n    System.out.println(\"I am a mammal\"\
    );\n  }\n}\n```\n\nThe `Mammal` class serves as the basis for our other classes.\
    \ As we discussed previously, we never want to create a `Mammal` object, so it's\
    \ abstract. It also has an abstract method, so every class that extends `Mammal`\
    \ has to implement a `speak()` method with the same signature (returns `void`\
    \ and accepts no arguments). Finally, it includes an ordinary method, which descendant\
    \ classes can use (see [Listing 6-8](#Chapter06.html#list_6_8)).\n\n**Listing\
    \ 6-8.** The finished `Cat` class\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \nclass Cat extends Mammal implements Predator, Carnivore {\n\n  private static\
    \ int numberOfCats;\n\n  Cat() {\n    numberOfCats++;\n  }\n\n  public static\
    \ final int getNumberOfCats() {\n    return numberOfCats;\n  }\n\n  @Override\n\
    \  protected void sayWhatIAm() {\n    System.out.println(\"I am a cat\");\n  \
    \  super.sayWhatIAm();\n  }\n\n  // implement the super class's abstract methods\n\
    \  @Override\n  void speak() {\n    System.out.println(\"The cat says, \\\"meow.\\\
    \"\");\n  }\n\n  // here's our example of overloading\n  void chase(Mouse mouse)\
    \ {\n    // chase a mouse\n  }\n  public void chase (Object tail) {\n    // chase\
    \ one's tail\n  }\n\n  // methods for the Predator interface\n  @Override\n  public\
    \ void hunt() {\n    // go hunting\n  }\n\n  // methods for the Carnivore interface\n\
    \  @Override\n  public void eat (Object freshMeat) {\n    // eat fresh meat\n\
    \  }\n}\n```\n\nBecause we use the `Cat` class throughout the earlier examples,\
    \ you already know it extends the `Mammal` class. As we discussed in the “Modeling\
    \ Behavior through Interfaces” section, it also implements the `Predator` and\
    \ `Carnivore` interfaces. After all, cats are predators and carnivores (see [Listing\
    \ 6-9](#Chapter06.html#list_6_9)).\n\n**Listing 6-9.** The finished `Dog` class\n\
    \n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\n\
    class Dog extends Mammal implements Predator, Carnivore, Scavenger {\n  // implement\
    \ the super class's abstract methods\n  @Override\n  void speak() {\n    System.out.println(\"\
    The dog says, \\\"bark.\\\"\");\n  }\n    // methods for the Predator interface\n\
    \  @Override  public void hunt() {\n    // go hunting\n  }\n\n  // methods for\
    \ the Carnivore interface\n  @Override  public void eat (Object freshMeat) {\n\
    \    // eat fresh meat\n  }\n\n  // methods for the Scavenger interface\n  @Override\
    \  public void eat (Object carrion, boolean tooOld) {\n    if (tooOld) {\n   \
    \   // don't eat that!\n    } else {\n      // munch away\n    }\n  }\n}\n```\n\
    \nThe `Dog` class also extends `Mammal` and implements the `Predator` and `Carnivore`\
    \ classes. However, dogs also scavenge for food, so the `Dog` class also implements\
    \ the `Scavenger` Interface.\n\nNow, let's move onto an animal that is still a\
    \ mammal but that has different behaviors: a mouse. [Listing 6-10](#Chapter06.html#list_6_10)\
    \ defines our `Mouse` object.\n\n**Listing 6-10.** The finished `Mouse` class\n\
    \n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\n\
    class Mouse extends Mammal implements Herbivore{\n  // implement the super class's\
    \ abstract methods\n  @Override\n  void speak() {\n    System.out.println(\"The\
    \ mouse says, \\\"squeak.\\\"\");\n  }\n    // methods for the Herbivore interface\n\
    \  @Override  public void eat (Object plantMatter) {\n    // eat plants\n  }\n\
    }\n```\n\nAs with our other animal objects, the `Mouse` class extends `Mammal`.\
    \ However, a mouse is not a carnivore, a predator, or a scavenger. Instead, a\
    \ mouse is an herbivore, so we make our `Mouse` class implement the `Herbivore`\
    \ interface.\n\nNow let's move onto the interfaces. We start with the `Predator`\
    \ interface (see [Listing 6-11](#Chapter06.html#list_6_11)).\n\n**Listing 6-11.**\
    \ The `Predator` interface\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \ninterface Predator {\n  public void hunt();\n}\n```\n\nAll predators hunt, so\
    \ our `Predator` interface includes a `hunt()` method. Any class that implements\
    \ this `Predator` interface must implement a `hunt()` method with the same signature\
    \ (`void` and with no arguments). If we have a `Drone` class that implements a\
    \ `Predator` interface, that interface might implement a `launch(Missile hellfire)`\
    \ method, which is different from a `Predator` interface that suits animals (at\
    \ least outside the realm of science fiction).\n\nLet's move on to the `Carnivore`\
    \ interface, shown in [Listing 6-12](#Chapter06.html#list_6_12).\n\n**Listing\
    \ 6-12.** The `Carnivore` interface\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \ninterface Carnivore {\n  public void eat(Object freshMeat);\n}\n```\n\nCarnivores\
    \ eat fresh meat, so we specify an object named `freshMeat` as the argument to\
    \ the interface's only method.\n\nCompare that to the `Scavenger` interface, shown\
    \ in [Listing 6-13](#Chapter06.html#list_6_13).\n\n**Listing 6-13.** The `Scavenger`\
    \ interface\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \ninterface Scavenger {\n  public void eat(Object carrion, boolean tooOld);\n\
    }\n```\n\nScavengers eat whatever meat they can find. Of course, one issue is\
    \ that some meat might be too foul to eat, so we include a `boolean` argument\
    \ that we can test for that problem.\n\nFinally, we come to our `Herbivore` interface,\
    \ as shown in [Listing 6-14](#Chapter06.html#list_6_14).\n\n**Listing 6-14.**\
    \ The `Herbivore` interface\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \ninterface Herbivore {\n  public void eat(Object plantMatter);\n}\n```\n\nThe\
    \ `Herbivore` interface is parallel to the `Carnivore` and `Scavenger` interfaces,\
    \ but herbivores eat plants, so we specify an object named `plantMatter` as the\
    \ only argument.\n\nFinally, here's a program class, called `AnimalVoices`, that\
    \ lets our animals speak (see [Listing 6-15](#Chapter06.html#list_6_15)).\n\n\
    **Listing 6-15.** Getting our animals to speak\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \npublic class AnimalVoices {\n\n  public static void main(String[] args) {\n\
    \    // create instances of our animals\n    Cat cat = new Cat();\n    Dog dog\
    \ = new Dog();\n    Mouse mouse = new Mouse();\n\n    // let our animals speak\n\
    \    cat.speak();\n    dog.speak();\n    mouse.speak();\n  }\n}\n```\n\nAs you\
    \ can see, all it does is create an instance of each kind of animal and then have\
    \ each one speak."
  raw: '### Our Animals in Java


    [Listing 6-7](#Chapter06.html#list_6_7) shows an incomplete definition of the
    animal classes used as examples earlier in the chapter. When a developer writes
    this kind of code, the developer is “creating stubs” or “writing stubbed out code.”
    A *stub* means that we created the structure but have left at least some of the
    details for another time or for someone else to do.


    You should put your code in packages. That way, the code in one package won''t
    interfere with the code in other packages. If you put everything in the default
    package, you soon run into the problem of wanting to call a class or interface
    by a name you already used. I suggest you get in the habit of putting all your
    code into packages. The package used throughout this chapter includes a `Predator`
    interface. Imagine if want another object model that defined Predator drones (the
    remote-control aircraft made famous in recent wars). That''s exactly the kind
    of entanglement that makes packages so useful. So we add a package definition
    for each class and interface. In this case, they are in the same package.


    ***Listing 6-7.** The finished Mammal class*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `abstract class Mammal {`

    `  // And here''s a method for making the sound.`

    `  // Each child class must implement it.`

    `  abstract void speak();`


    `  // All descendant classes can call this`

    `  // and do not need to implement their own versions of it`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a mammal");`

    `  }`

    `}`


    The `Mammal` class serves as the basis for our other classes. As we discussed
    previously, we never want to create a `Mammal` object, so it''s abstract. It also
    has an abstract method, so every class that extends `Mammal` has to implement
    a speak method with the same signature (returns void and accepts no arguments).
    Finally, it includes an ordinary method, which descendant classes can use (see
    [Listing 6-8](#Chapter06.html#list_6_8)).


    ***Listing 6-8**. The finished Cat class*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `class Cat extends Mammal implements Predator, Carnivore {`


    `  private static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`


    `  public static final int getNumberOfCats() {`

    `    return numberOfCats;`

    `  }`


    `  @Override`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a cat");`

    `    super.sayWhatIAm();`

    `  }`


    `  // implement the super class''s abstract methods`

    `  @Override`

    `  void speak() {`

    `    System.out.println("The cat says, \"meow.\"");`

    `  }`


    `  // here''s our example of overloading`

    `  void chase(Mouse mouse) {`

    `    // chase a mouse`

    `  }`

    `  public void chase (Object tail) {`

    `    // chase one''s tail`

    `  }`


    `  // methods for the Predator interface`

    `  @Override`

    `  public void hunt() {`

    `    // go hunting`

    `  }`


    `  // methods for the Carnivore interface`

    `  @Override`

    `  public void eat (Object freshMeat) {`

    `    // eat fresh meat`

    `  }`

    `}`


    Because we use the Cat class throughout the earlier examples, you already know
    it extends the `Mammal` class. As we discussed in the “Modeling Behavior through
    Interfaces” section, it also implements the `Predator` and `Carnivore` interfaces.
    After all, cats are predators and carnivores (see [Listing 6-9](#Chapter06.html#list_6_9)).


    ***Listing 6-9.** The finished Dog class*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `class Dog extends Mammal implements Predator, Carnivore, Scavenger {`

    `  // implement the super class''s abstract methods`

    `  @Override`

    `  void speak() {`

    `    System.out.println("The dog says, \"bark.\"");`

    `  }`

    `    // methods for the Predator interface`

    `  @Override  public void hunt() {`

    `    // go hunting`

    `  }`


    `  // methods for the Carnivore interface`

    `  @Override  public void eat (Object freshMeat) {`

    `    // eat fresh meat`

    `  }`


    `  // methods for the Scavenger interface`

    `  @Override  public void eat (Object carrion, boolean tooOld) {`

    `    if (tooOld) {`

    `      // don''t eat that!`

    `    } else {`

    `      // munch away`

    `    }`

    `  }`

    `}`


    The `Dog` class also extends `Mammal` and implements the `Predator` and `Carnivore`
    classes. However, dogs also scavenge for food, so the `Dog` class also implements
    the `Scavenger` Interface.


    Now, let''s move onto an animal that is still a mammal but that has different
    behaviors: a mouse. [Listing 6-10](#Chapter06.html#list_6_10) defines our Mouse
    object.


    ***Listing 6-10.** The finished Mouse class*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `class Mouse extends Mammal implements Herbivore{`

    `  // implement the super class''s abstract methods`

    `  @Override`

    `  void speak() {`

    `    System.out.println("The mouse says, \"squeak.\"");`

    `  }`

    `    // methods for the Herbivore interface`

    `  @Override  public void eat (Object plantMatter) {`

    `    // eat plants`

    `  }`

    `}`


    As with our other animal objects, the `Mouse` class extends `Mammal`. However,
    a mouse is not a carnivore, a predator, or a scavenger. Instead, a mouse is an
    herbivore, so we make our `Mouse` class implement the `Herbivore` interface.


    Now let''s move onto the interfaces. We start with the Predator interface (see
    [Listing 6-11](#Chapter06.html#list_6_11)).


    ***Listing 6-11**. The Predator interface*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Predator {`

    `  public void hunt();`

    `}`


    All predators hunt, so our `Predator` interface includes a hunt() method. Any
    class that implements this `Predator` interface must implement a `hunt()` method
    with the same signature (void and with no arguments). If we have a `Drone` class
    that implements a Predator interface, that interface might implement a `launch(Missile
    hellfire)` method, which is different from a `Predator` interface that suits animals
    (at least outside the realm of science fiction).


    Let''s move on to the `Carnivore` interface, shown in [Listing 6-12](#Chapter06.html#list_6_12).


    ***Listing 6-12**. The Carnivore interface*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Carnivore {`

    `  public void eat(Object freshMeat);`

    `}`


    Carnivores eat fresh meat, so we specify an object named `freshMeat` as the argument
    to the interface''s only method.


    Compare that to the `Scavenger` interface, shown in [Listing 6-13](#Chapter06.html#list_6_13).


    ***Listing 6-13**. The Scavenger interface*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Scavenger {`

    `  public void eat(Object carrion, boolean tooOld);`

    `}`


    Scavengers eat whatever meat they can find. Of course, one issue is that some
    meat might be too foul to eat, so we include a boolean argument that we can test
    for that problem.


    Finally, we come to our Herbivore interface, as shown in [Listing 6-14](#Chapter06.html#list_6_14).


    ***Listing 6-14**. The Hervibore interface*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Herbivore {`

    `  public void eat(Object plantMatter);`

    `}`


    The Herbivore interface is parallel to the Carnivore and Scavenger interfaces,
    but herbivores eat plants, so we specify an object named plantMatter as the only
    argument.


    Finally, here''s a program class, called `AnimalVoices`, that lets our animals
    speak (see [Listing 6-15](#Chapter06.html#list_6_15)).


    ***Listing 6-15.** Getting our animals to speak*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `public class AnimalVoices {`


    `  public static void main(String[] args) {`

    `    // create instances of our animals`

    `    Cat cat = new Cat();`

    `    Dog dog = new Dog();`

    `    Mouse mouse = new Mouse();`


    `    // let our animals speak`

    `    cat.speak();`

    `    dog.speak();`

    `    mouse.speak();`

    `  }`

    `}`


    As you can see, all it does is create an instance of each kind of animal and then
    have each one speak.'
  trans: '

    ### Java 中的动物类


    清单 6-7 展示了本章前面用作示例的动物类的不完整定义。当开发者编写这类代码时，他们是在“创建桩代码”或“编写存根代码”。*桩代码*意味着我们创建了结构，但至少将部分细节留待以后处理或由他人完成。


    你应该将代码放入包中。这样，一个包中的代码就不会干扰其他包中的代码。如果你把所有内容都放在默认包中，很快就会遇到想要使用已用过的名称来调用类或接口的问题。我建议你养成将所有代码放入包中的习惯。本章使用的包包含一个
    `Predator` 接口。想象一下，如果你想定义另一个对象模型，其中包含 Predator 无人机（近年来因战争而闻名的遥控飞机）。这正是包如此有用的那种纠缠情况。因此，我们为每个类和接口添加一个包定义。在本例中，它们位于同一个包中。


    ***清单 6-7.** 完成的 Mammal 类*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `abstract class Mammal {`

    `  // 这里是发出声音的方法。`

    `  // 每个子类都必须实现它。`

    `  abstract void speak();`


    `  // 所有后代类都可以调用此方法`

    `  // 并且不需要实现它们自己的版本`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a mammal");`

    `  }`

    `}`


    `Mammal` 类是我们其他类的基础。正如我们之前讨论的，我们从不希望创建 `Mammal` 对象，因此它是抽象的。它还有一个抽象方法，因此每个扩展 `Mammal`
    的类都必须实现一个具有相同签名（返回 void 且不接受参数）的 speak 方法。最后，它包含一个普通方法，后代类可以使用该方法（参见清单 6-8）。


    ***清单 6-8**. 完成的 Cat 类*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `class Cat extends Mammal implements Predator, Carnivore {`


    `  private static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`


    `  public static final int getNumberOfCats() {`

    `    return numberOfCats;`

    `  }`


    `  @Override`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a cat");`

    `    super.sayWhatIAm();`

    `  }`


    `  // 实现超类的抽象方法`

    `  @Override`

    `  void speak() {`

    `    System.out.println("The cat says, \"meow.\"");`

    `  }`


    `  // 这里是重载的示例`

    `  void chase(Mouse mouse) {`

    `    // 追逐老鼠`

    `  }`

    `  public void chase (Object tail) {`

    `    // 追逐自己的尾巴`

    `  }`


    `  // Predator 接口的方法`

    `  @Override`

    `  public void hunt() {`

    `    // 去捕猎`

    `  }`


    `  // Carnivore 接口的方法`

    `  @Override`

    `  public void eat (Object freshMeat) {`

    `    // 吃鲜肉`

    `  }`

    `}`


    因为我们在前面的示例中一直使用 Cat 类，所以你已经知道它扩展了 `Mammal` 类。正如我们在“通过接口建模行为”一节中讨论的，它还实现了 `Predator`
    和 `Carnivore` 接口。毕竟，猫是捕食者和食肉动物（参见清单 6-9）。


    ***清单 6-9.** 完成的 Dog 类*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `class Dog extends Mammal implements Predator, Carnivore, Scavenger {`

    `  // 实现超类的抽象方法`

    `  @Override`

    `  void speak() {`

    `    System.out.println("The dog says, \"bark.\"");`

    `  }`

    `    // Predator 接口的方法`

    `  @Override  public void hunt() {`

    `    // 去捕猎`

    `  }`


    `  // Carnivore 接口的方法`

    `  @Override  public void eat (Object freshMeat) {`

    `    // 吃鲜肉`

    `  }`


    `  // Scavenger 接口的方法`

    `  @Override  public void eat (Object carrion, boolean tooOld) {`

    `    if (tooOld) {`

    `      // 别吃那个！`

    `    } else {`

    `      // 大口咀嚼`

    `    }`

    `  }`

    `}`


    `Dog` 类也扩展了 `Mammal` 并实现了 `Predator` 和 `Carnivore` 类。然而，狗也会 scavenge 食物，因此 `Dog`
    类也实现了 `Scavenger` 接口。


    现在，让我们转向另一种仍然是哺乳动物但行为不同的动物：老鼠。清单 6-10 定义了我们的 Mouse 对象。


    ***清单 6-10.** 完成的 Mouse 类*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `class Mouse extends Mammal implements Herbivore{`

    `  // 实现超类的抽象方法`

    `  @Override`

    `  void speak() {`

    `    System.out.println("The mouse says, \"squeak.\"");`

    `  }`

    `    // Herbivore 接口的方法`

    `  @Override  public void eat (Object plantMatter) {`

    `    // 吃植物`

    `  }`

    `}`


    与我们的其他动物对象一样，`Mouse` 类扩展了 `Mammal`。然而，老鼠不是食肉动物、捕食者或 scavenger。相反，老鼠是食草动物，因此我们让
    `Mouse` 类实现 `Herbivore` 接口。


    现在让我们转向接口。我们从 Predator 接口开始（参见清单 6-11）。


    ***清单 6-11**. Predator 接口*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Predator {`

    `  public void hunt();`

    `}`


    所有捕食者都会捕猎，因此我们的 `Predator` 接口包含一个 hunt() 方法。任何实现此 `Predator` 接口的类都必须实现一个具有相同签名（void
    且无参数）的 `hunt()` 方法。如果我们有一个实现 Predator 接口的 `Drone` 类，该接口可能会实现一个 `launch(Missile
    hellfire)` 方法，这与适合动物的 `Predator` 接口不同（至少在科幻小说领域之外）。


    让我们继续讨论 `Carnivore` 接口，如清单 6-12 所示。


    ***清单 6-12**. Carnivore 接口*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Carnivore {`

    `  public void eat(Object freshMeat);`

    `}`


    食肉动物吃鲜肉，因此我们指定一个名为 `freshMeat` 的对象作为该接口唯一方法的参数。


    将其与 `Scavenger` 接口进行比较，如清单 6-13 所示。


    ***清单 6-13**. Scavenger 接口*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Scavenger {`

    `  public void eat(Object carrion, boolean tooOld);`

    `}`


    Scavenger 吃它们能找到的任何肉。当然，一个问题是有些肉可能太臭而不能吃，因此我们包含一个布尔参数，可以用来测试该问题。


    最后，我们来到 Herbivore 接口，如清单 6-14 所示。


    ***清单 6-14**. Herbivore 接口*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `interface Herbivore {`

    `  public void eat(Object plantMatter);`

    `}`


    Herbivore 接口与 Carnivore 和 Scavenger 接口类似，但食草动物吃植物，因此我们指定一个名为 plantMatter 的对象作为唯一参数。


    最后，这是一个名为 `AnimalVoices` 的程序类，它让我们的动物说话（参见清单 6-15）。


    ***清单 6-15.** 让我们的动物说话*


    `package com.apress.java7forabsolutebeginners .examples.animalKingdom;`


    `public class AnimalVoices {`


    `  public static void main(String[] args) {`

    `    // 创建我们的动物实例`

    `    Cat cat = new Cat();`

    `    Dog dog = new Dog();`

    `    Mouse mouse = new Mouse();`


    `    // 让我们的动物说话`

    `    cat.speak();`

    `    dog.speak();`

    `    mouse.speak();`

    `  }`

    `}`


    如你所见，它所做的就是创建每种动物的一个实例，然后让每个动物说话。

