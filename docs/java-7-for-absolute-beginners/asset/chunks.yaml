- fmt: "### A Lesson about Granularity\n\nFive classes and four interfaces might seem\
    \ like a lot of objects to get three animals to make their appropriate sounds.\
    \ Honestly, if I were writing a program to produce three lines of text, I'd write\
    \ just one class. However, the purpose of the animal kingdom example was to show\
    \ how to model a (not very) complex system in Java.\n\nIf I were really writing\
    \ a system to model the animal kingdom, I'd have many more classes. For starters,\
    \ if I were doing this for real, I wouldn't pass generic objects to the `eat`\
    \ methods. I'd have an abstract class called `Food` and concrete classes called\
    \ `FreshMeat`, `Carrion`, and `PlantMatter` and very likely subclasses from those,\
    \ too.\n\nIf you “chunk up” your program into as many classes and interfaces as\
    \ possible, you gain two things:\n\n- Extensibility\n- Maintainability\n\n*Extensibility*\
    \ means that you can easily make your program do more than it does now. In the\
    \ case of our animal program, we could quickly add more animals and make those\
    \ animals do more things (such as walk, swim, play, and sleep). If we expand the\
    \ program, we might also expand the food details such that the `PlantMatter` class\
    \ has `Nut` and `Grain` subclasses.\n\n*Maintainability* means that you can easily\
    \ find the spot where your code is wrong when you find an error. If all your code\
    \ is in just a few classes (or worst of all, one class), you have a harder time\
    \ figuring out the problem. Sure, the debugger gets you to the right line, but\
    \ you won't know whether the problem is in your definition of an animal or your\
    \ definition of a mammal or your definition of its behavior (such as predator\
    \ or herbivore). Making multiple classes and interfaces greatly aids debugging\
    \ because you can see which piece holds the problem spot. In other words, granularity\
    \ makes it easier to create error-free programs.\n\nReal programs need granularity,\
    \ and good programmers work to achieve it.\n\n### Pass-by-Reference and Pass-by-Value\n\
    \n*Pass-by-reference* and *pass-by-value* refer to how information is passed from\
    \ one object to another. Nearly all of the passing of information in Java goes\
    \ through methods, but information can also go through fields within an object.\n\
    \nStrictly speaking, Java uses only pass-by-value. However, the values it passes\
    \ differ greatly based on what is passed. For primitives, Java passes a copy of\
    \ the primitive. So, if you pass an `int` to a method, the method receives a copy\
    \ of the `int`, not the original `int`. For objects, Java passes a pointer. A\
    \ *pointer* is the address of an object in memory. This subtle difference trips\
    \ up many novice Java developers. A few examples clarify (I hope) the issue (see\
    \ [Listing 6-16](#Chapter06.html#list_6_16)). I say, “I hope,” because this topic\
    \ gives even seasoned developers fits.\n\n***Listing 6-16.** Pass-by-reference\
    \ and pass-by-value*\n\n```\npackage com.apress.java7forabsolutebeginners .examples.hello;\n\
    \npublic class IntegerWrapper {\n\n  public int objectInt = 0;\n}\n\npackage com.apress.java7forabsolutebeginners\
    \ .examples.hello;\n\npublic class Hello {\n\n  static int primitiveInt = 0;\n\
    \  static IntegerWrapper intWrapper = new IntegerWrapper();\n\n  public static\
    \ void main(String[] args) throws Exception {\n    passBy(primitiveInt, intWrapper);\n\
    \    System.out.println(\"primitiveInt = \" + primitiveInt +\n        \"; intWrapper.objectInt\
    \ = \" + intWrapper.objectInt);\n  }\n    public static void passBy(int primitiveInt,\
    \ IntegerWrapper intWrapper) {\n    primitiveInt++;\n    intWrapper.objectInt++;\n\
    \  }\n}\n```\n\nAs you can see, this program has two classes, `IntegerWrapper`\
    \ and `PassByTest`. `IntegerWrapper` is a way to turn a primitive into an object\
    \ (and don't ever write objects like this for real, by the way—it's bad form,\
    \ but it makes sense to keep this illustration as simple as possible). `PassByTest`\
    \ demonstrates pass-by-reference and pass-by-value. When we run `PassByTest`,\
    \ its output is `primitiveInt = 0; intWrapper.objectInt = 1`.\n\nWhen you pass\
    \ a primitive to a method, the JVM preserves the original value and makes a new\
    \ primitive (literally, a copy) with the same value for use in the method. The\
    \ JVM consequently has two values, the original `primitiveInt` field in `PassByTest`\
    \ and the `primitiveInt` argument to the `passBy` method. Therein lies the heart\
    \ of the issue: Because the JVM makes a new primitive, the original never gets\
    \ modified.\n\nEven if the `passBy` method returned the primitive value, it would\
    \ not change the original value. Until we re-assign the original value, it remains\
    \ whatever it was originally set to (0 in this case). If we assign the return\
    \ value of the method to the original primitive, that works. Again, though, we\
    \ have two different values, and we assign the value of the new one (created by\
    \ the method) to the old one. Consider the modified `PassByTest` class in [Listing\
    \ 6-17](#Chapter06.html#list_6_17).\n\n***Listing 6-17.** PassByTest with a return\
    \ value for the passBy method*\n\n```\npackage com.apress.java7forabsolutebeginners\
    \ .examples.hello;\n\npublic class Hello {\n\n  static int primitiveInt = 0;\n\
    \  static IntegerWrapper intWrapper = new IntegerWrapper();\n\n  public static\
    \ void main(String[] args) throws Exception {\n    passBy(primitiveInt, intWrapper);\n\
    \    System.out.println(\"primitiveInt = \" + primitiveInt +\n        \"; intWrapper.objectInt\
    \ = \" + intWrapper.objectInt);\n  }\n    public static int passBy(int primitiveInt,\
    \ IntegerWrapper intWrapper) {\n    primitiveInt++;\n    intWrapper.objectInt++;\n\
    \    return primitiveInt;\n  }\n}\n```\n\nThe `passBy` method now returns an `int`,\
    \ but the output remains the same (`primitiveInt` remains 0). I know I've hammered\
    \ the point repeatedly, but, again, `primitiveInt` in the method is a different\
    \ primitive than the `primitiveInt` field in the class. Remember, the compiler\
    \ makes a copy of it when it calls the method.\n\nNow, let's look at what happens\
    \ to `IntegerWrapper.objectInt`. Because `IntegerWrapper` is an object, the value\
    \ that gets passed is its address in memory (that is, a pointer to the object).\
    \ There's only one `IntegerWrapper` object, named `intWrapper`, in memory (because\
    \ we used the `new` keyword with that class only once). So, any work done on `intWrapper`\
    \ is done to the same object. Consequently, when we increment `intWrapper.objectInt`,\
    \ the change makes it back to the `main` method, because the `main` method still\
    \ looks at the same spot in memory. That is, `intWrapper` continues to be at the\
