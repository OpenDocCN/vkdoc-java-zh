    \ at the problem, even though the company makes computers, including extremely\
    \ high-end web servers. At some point, we run out of address space for servers\
    \ (each computer on the Internet has to have a unique address, known as its IP\
    \ address). So there's yet another limitation.\n\nSo why tell you all this here?\
    \ Because games, even more than software, rely on limitations. In a very real\
    \ sense, a game is a collection of limitations. Each rule in a game is a limitation,\
    \ and a game is nothing without its rules. If you could put a card wherever you\
    \ want when you play solitaire, would it still be a game? If you could shoot multiple\
    \ times a second, wouldn't ShootingGallery be less challenging (and so less fun)?\n\
    \nIn that same essay (the introduction to *Limits*), Mr. Niven also states that\
    \ “puzzles *require* [emphasis in original] rules.” All games are puzzles. The\
    \ player always asks, even if only subconsciously, “What is the proper set of\
    \ steps that I need to follow in order to beat this game?” Thus, all games require\
    \ rules, and all rules are limitations. As you design your own games, remember\
    \ to make a set of limitations that make the game fun. If the limitations are\
    \ too many or too severe, they will make the game frustrating. If the limitations\
    \ are too few or too loose, the game is such a poor challenge that it's not worth\
    \ playing.\n\n### Game Design Resources\n\nI anticipate that many of the people\
    \ who read this book are doing so because they want to create their own games.\
    \ To that end, here's a short list of resources that I've found useful when thinking\
    \ about games and how to design good ones. Note that these resources apply to\
    \ designing games in general, not just computer games.\n\n*   *Game Design (Volume\
    \ 1: Theory and Practice)* by Nick Schuessler and Steve Jackson (1981). You can\
    \ get it from [http://e23.sjgames.com](http://e23.sjgames.com). Steve Jackson\
    \ is the fellow who made Ogre (one of my favorite board games), GURPS (the role-playing\
    \ system I use), and Munchkin (a commercial hit that spoofs role-playing games).\
    \ He does not make computer games, but the wisdom in this small book applies to\
    \ all games, computer or otherwise.\n*   *A Theory of Fun for Game Design* by\
    \ Raph Koster (Foreword by Will Wright) (2004). Raph Koster is a veteran of many\
    \ large computer game efforts, including MMOGs (Massively Multiplayer Online Games).\
    \ His book combines thoughts on learning theory with thoughts on game design,\
    \ bringing good ideas to both fields.\n*   “I Have No Words & I Must Design: Toward\
    \ a Critical Vocabulary for Games” by Greg Costikyan (online essay). You can find\
    \ this excellent exploration of what a game is and how a game works at [http://www.costik.com/nowords2002.pdf](http://www.costik.com/nowords2002.pdf)\
    \ You can find his blog, which contains other content of interest to game developers,\
    \ at [http://www.costik.com](http://www.costik.com)\n\n### Summary\n\nIn this\
    \ chapter, I hope you learned the basics of making a computer game with Java.\
    \ In particular, I hope you learned:\n\n*   The three basic components of a computer\
    \ game:\n    *   The user interface\n    *   The game logic\n    *   The game\
    \ loop\n*   The essential tasks of a game loop:\n    *   Processing the user input\
    \ and all other inputs\n    *   Processing the game logic\n    *   Redrawing the\
    \ playing field\n*   How to animate multiple objects at once\n*   How to make\
    \ multiple objects move at different speeds\n*   How to test for conditions to\
    \ see if a game should end or something else should happen\n*   How to update\
    \ a score display in response to game events\n\nAs I have mentioned several times,\
    \ there's nearly always more than one way to do any given thing in software (that's\
    \ part of both the fun and the frustration of writing software). So, when I say\
    \ that I've shown you how to do something, I really mean that I've shown you one\
    \ way to do something. I hope you'll experiment with other ideas and find your\
    \ own ways to meet your software goals. Writing a game of your own would be a\
    \ great way to do just that, so go write a game.\n\n## C H A P T E R  13\n\n##\
    \ Garbage Collection\n\nJava relies on garbage collection. A garbage collector\
    \ removes unused objects from memory and lets your programs re-use memory rather\
    \ than constantly grow. For very small programs, this constant growth doesn't\
    \ matter much. However, even a program of fairly low complexity and scale can\
    \ quickly chew through a lot of memory. Therefore, most programs really need some\
    \ kind of garbage collection mechanism.\n\nWhen they use many other languages,\
    \ including C++, programmers have to manage memory themselves, writing code to\
    \ remove objects from memory at the right time. Java frees developers from this\
    \ problem. That's not to say that Java is better than C++. Both languages have\
    \ their strengths and weaknesses. Many developers who prefer Java would tell you\
    \ that having to manage memory yourself is a weakness in C++ and that garbage\
    \ collection is a strength of Java. Conversely, many C++ developers would tell\
    \ you the opposite. Both are true: Garbage collection can be a problem in Java,\
    \ yet is also an inherent feature and very powerful if managed correctly.\n\n\
    So how do we turn garbage collection into an advantage rather than a burden?"
  trans: "\n#### 关于局限性的说明\n\n著名科幻作家拉里·尼文在其短篇小说集《极限》中写道：“很多时候，正是这些局限*造就*了故事（原文强调）。”\n\
    \n这一精辟见解同样适用于软件开发。没有哪个程序能包罗万象，因此我们必须为每个程序划定功能边界。除了设计考量，我们往往还要应对性能和硬件限制。例如，我目前所在的团队正致力于重构某大型网站（家喻户晓的品牌，您一听便知）的内容分发系统。该网站月均访问量达\
    \ 8000 万次（在假日购物季，这个数字会大幅攀升）。我们必须确保每个页面请求（即用户在网站上的每次点击）都能在两秒内得到响应。否则，用户可能会转向其他平台，公司也无法实现收益最大化。这个两秒的限制深刻影响着我们的每个决策。尽管公司生产包括高端网络服务器在内的计算机设备，但我们不能单纯通过增加硬件（更多、更强大的服务器）来解决问题。因为服务器地址空间终将耗尽（互联网上的每台计算机都必须拥有唯一的\
    \ IP 地址）。这便构成了另一重限制。\n\n那么为何要在此赘述这些？因为游戏比普通软件更依赖限制。从本质上说，游戏就是一系列限制的集合。游戏中的每条规则都是一种限制，没有规则就不成其为游戏。如果玩纸牌游戏时能随意放置卡牌，它还能被称为游戏吗？如果射击游戏每秒能连发数枪，它还会具有挑战性（从而失去趣味性）吗？\n\
    \n在同一篇文章（《极限》的序言）中，尼文先生还指出：“谜题*需要*规则（原文强调）。”所有游戏都是谜题。玩家总会（即便只是潜意识地）思考：“要通关这个游戏，我需要遵循哪些正确步骤？”因此，所有游戏都需要规则，而所有规则都是限制。在设计自己的游戏时，请记住要制定一套能让游戏变得有趣的限制。如果限制过多或过于严苛，游戏会令人沮丧；如果限制过少或过于宽松，游戏则缺乏挑战性，不值得一玩。\n\
    \n### 游戏设计资源\n\n我预计本书的许多读者都希望创作自己的游戏。为此，这里列出一些我在思考游戏及如何设计优秀游戏时发现的有用资源。请注意，这些资源适用于通用游戏设计，而不仅限于电脑游戏。\n\
    \n*   《游戏设计（第一卷：理论与实践）》，作者尼克·舒斯勒和史蒂夫·杰克逊（1981 年）。可从[`e23.sjgames.com`](http://e23.sjgames.com)获取。史蒂夫·杰克逊是《食人魔》（我最喜欢的桌游之一）、《GURPS》（我使用的角色扮演系统）和《芒奇金》（恶搞角色扮演游戏的商业热门作品）的创作者。他虽不制作电脑游戏，但这本小书中的智慧适用于所有游戏，无论电脑游戏与否。\n\
    *   《游戏设计快乐之道》，作者拉夫·科斯特（威尔·赖特作序）（2004 年）。拉夫·科斯特是众多大型电脑游戏项目的资深人士，包括 MMOG（大型多人在线游戏）。他的著作将学习理论思考与游戏设计思考相结合，为两个领域都带来了真知灼见。\n\
    *   《无言以对，必须设计：迈向游戏批判性词汇》，作者格雷格·科斯蒂基恩（在线文章）。您可以在[`www.costik.com/nowords2002.pdf`](http://www.costik.com/nowords2002.pdf)找到这篇关于游戏本质与运作机制的精彩探讨。他的博客（[`www.costik.com`](http://www.costik.com)）也包含其他对游戏开发者有价值的内容。\n\
    \n### 本章小结\n\n在本章中，我希望您已学会使用 Java 制作电脑游戏的基础知识。具体而言，我希望您已掌握：\n\n*   电脑游戏的三个基本组成部分：\n\
    \    *   用户界面\n    *   游戏逻辑\n    *   游戏循环\n*   游戏循环的核心任务：\n    *   处理用户输入及其他所有输入\n\
    \    *   处理游戏逻辑\n    *   重绘游戏画面\n*   如何同时为多个对象添加动画效果\n*   如何让多个对象以不同速度移动\n*  \
    \ 如何检测条件以判断游戏是否应结束或触发其他事件\n*   如何根据游戏事件更新分数显示\n\n正如我多次提到的，在软件开发中，完成任何任务几乎总有多种方法（这既是编写软件的乐趣所在，也是其令人沮丧之处）。因此，当我说向您展示了如何做某事时，我实际上是指向您展示了其中一种方法。希望您能尝试其他思路，找到实现软件目标的独特途径。编写自己的游戏正是实践这一点的绝佳方式，所以去创作一款游戏吧。\n\
    \n## 第 13 章\n\n## 垃圾回收\n\nJava 依赖垃圾回收机制。垃圾回收器会从内存中移除不再使用的对象，使程序能够复用内存，而非持续增长。对于非常小的程序而言，这种持续增长影响不大。然而，即使是复杂度与规模适中的程序，也可能迅速消耗大量内存。因此，大多数程序确实需要某种垃圾回收机制。\n\
    \n在使用包括 C++在内的许多其他语言时，程序员必须自行管理内存，编写代码在适当时机从内存中移除对象。Java 将开发者从这一问题中解放出来。这并非说 Java\
    \ 优于 C++。两种语言各有优劣。许多偏爱 Java 的开发者会告诉你，必须自行管理内存是 C++的弱点，而垃圾回收是 Java 的优势。反之，许多 C++开发者则会持相反观点。两者都有道理：垃圾回收在\
    \ Java 中可能成为问题，但它也是固有特性，若管理得当则功能强大。\n\n那么，我们该如何将垃圾回收从负担转化为优势呢？\n"
- fmt: "### Understanding Memory Allocation\n\nBefore we can really talk about garbage\
    \ collection, we need a basic understanding of how the Java Virtual Machine (JVM)\
    \ allocates memory in the first place. Every time you create a new object or primitive,\
    \ the heap grows by the size of that object or primitive. In addition, if you\
    \ create a complex object (an object that itself contains other objects, as many\
    \ objects do), the heap grows by the size of all those objects as well. For example,\
    \ consider a class we've seen before (in the previous chapter), the `TargetClickPanel`\
    \ class:\n\n**Listing 13-1.** Memory Allocation in the `TargetClickPanel` Class\n\
    \n```\npackage com.bryantcs.examples.videogames;\n\nimport java.awt.Graphics;\n\
    import java.awt.event.MouseEvent;\nimport java.awt.event.MouseListener;\n\nimport\
    \ javax.swing.JPanel;\npublic class TargetClickPanel extends JPanel implements\
    \ MouseListener{\n\n  private static final long serialVersionUID = 1L;\n\n  private\
    \ Target targets[] = new Target[5];\n\n  public TargetClickPanel() {\n    addMouseListener(this);\n\
    \    for (int i = 0; i < targets.length; i++) {\n      targets[i] = null;\n  \
    \  }\n  }\n\n  public void paint (Graphics g) {\n    super.paintComponent(g);\n\
    \    for (int i = 0; i < targets.length; i++) {\n      if (targets[i] == null)\
    \ {\n        targets[i] = new Target(this);\n      }\n      if (!targets[i].isDone())\
    \ {\n        targets[i].draw(g);\n      } else {\n        targets[i] = new Target(this);\n\
    \      }\n    }\n  }\n\n  @Override\n  public void mouseClicked(MouseEvent e)\
    \ {\n  }\n\n  @Override\n  public void mouseEntered(MouseEvent e) {\n  }\n  @Override\n\
    \  public void mouseExited(MouseEvent e) {\n  }\n\n  @Override\n  public void\
    \ mousePressed(MouseEvent e) {\n  }\n\n  @Override\n  public void mouseReleased(MouseEvent\
    \ e) {\n    for (int i = 0; i < targets.length; i++) {\n\n      targets[i].pointInTarget(e.getX(),\
    \ e.getY());\n    }\n  }\n}\n```\n\nConsider the lines in bold (the `targets`\
    \ array and the lines within the `paint` method that create new instances of the\
    \ `Target` object). If you visualize the values of all of the objects and primitives\
    \ as the program runs, you can see that the `paint` method first creates five\
    \ instances of the `Target` class and then keeps five of the instances going as\
    \ the existing instances declare themselves to be finished. Consequently, the\
    \ result of creating an instance of the `TargetClickPanel` also creates five instances\
    \ of the `Target` class.\n\nHowever, creating an instance of the `TargetClickPanel`\
    \ class actually creates many more than just five instances of the `Target` class.\
    \ The instances of the `Target` class that have marked themselves as finished\
    \ still exist, even though the instance of the `TargetClickPanel` no longer has\
    \ references to them. That's the key to garbage collection: references. We'll\
    \ get to that shortly. First, let's consider the state of the `Target` objects\
    \ that have been created after the `TargetClick` game has run for a few seconds:\n\
    \n> *Target 1*: Created because `targets[0]` was null. Now finished.\n> \n> *Target\
    \ 2*: Created because `targets[1]` was null. Now finished.\n> \n> *Target 3*:\
    \ Created because `targets[2]` was null. Now finished.\n> \n> *Target 4*: Created\
    \ because `targets[3]` was null. Now finished.\n> \n> *Target 5*: Created because\
    \ `targets[4]` was null. Now finished.\n> \n> *Target 6*: Created because `targets[0]`\
    \ was finished. Now finished.\n> \n> *Target 7*: Created because `targets[1]`\
    \ was finished. Now finished.\n> \n> *Target 8*: Created because `targets[2]`\
    \ was finished. Still in play.\n> \n> *Target 9*: Created because `targets[3]`\
    \ was finished. Still in play.\n> \n> *Target 10*: Created because `targets[4]`\
    \ was finished. Still in play.\n> \n> *Target 11*: Created because `targets[0]`\
    \ was finished. Still in play.\n> \n> *Target 12*: Created because `targets[1]`\
    \ was finished. Still in play.\n\nAnd so on...\n\nAt any given moment, the instance\
    \ of the `TargetClickPanel` class has references to five instances of the `Target`\
    \ class. But what happens to all the finished instances? As it happens, they get\
    \ garbage collected. And there's the primary rule of garbage collection: If an\
    \ object no longer has references held on it by other objects, that object gets\
    \ garbage collected. In other words, once an object no longer has any other objects\
    \ using it, that object is ready to be removed from memory. Yet another way to\
    \ say this is that the object is now unreachable, meaning that no other bit of\
    \ code can reach that object.\n\n### The Java Garbage Collection Algorithm: Marking\
    \ and Sweeping\n\nThe algorithm that Java uses for garbage collection is called\
    \ marking and sweeping. Conceptually, it's a simple idea. First, make an initial\
    \ pass of the memory and mark any memory that can be collected. Then make another\
    \ pass and free the memory that was marked in the first pass.\n\nIn practice,\
    \ though, the process becomes much more complex. The basic algorithm (often called\
    \ naïve mark and sweep) works fine, so long as the whole program stops while the\
    \ garbage collector runs. The program has to stop so that the garbage collector\
    \ can be sure that no new objects are being created and that no existing objects\
    \ have gotten into a state such that they can be garbage collected while the collector\
    \ runs. Java's earliest versions used just such an algorithm. Consequently, Java\
    \ earned a reputation for being unsuitable for applications that required high\
    \ performance, from video games to real-time monitoring of things like valves\
    \ in a refinery. Later versions fixed that problem, but the reputation lingered\
    \ for several more versions (and still pops up in some circles).\n\nSo how does\
    \ one collect objects and still let the program run? In particular, how does one\
    \ allow creation of new objects and send existing objects to collection while\
    \ letting the garbage collector run? Two more advanced algorithms have been developed:\
    \ Incremental garbage collection and concurrent garbage collection.\n\nIncremental\
    \ garbage collection relies on intermittently stopping and starting both the program\
    \ and the garbage collector (which is really just another program being run in\
    \ parallel by the JVM). Essentially, the program gets to do a bit of work, and\
    \ then the garbage collector gets to do a bit, and so on. In this fashion, the\
    \ program gets to do some work while the garbage collector runs. As you can imagine,\
    \ though, the program's performance is still slower than when the garbage collector\
    \ is not running. In fact, versions of Java had noticeably slower performance\
    \ when the garbage collector ran. I recall playing a video game written in Java\
    \ and being able to tell when the garbage collector started and stopped.\n\nConcurrent\
    \ garbage collection lets the program run at full speed, with one exception: The\
    \ program must be halted while the stack (the list of objects in memory) is scanned.\
    \ Fortunately, scanning the stack takes very little time. Scanning the stack (which\
    \ is really just a list) takes much less time than does scanning the heap (which\
    \ is all of the objects in memory). Imagine reading a book's table of contents\
    \ versus reading the whole book, and you'll have an idea of the difference.\n\n\
    So how does a concurrent garbage collector let the program run at (almost) full\
    \ speed? The garbage collector doesn't concern itself with finding everything\
    \ that can be collected. Instead, it finds what it can be sure of and frees those\
    \ objects. On its next pass, it can catch anything it missed, as well as anything\
    \ that has become removable in the meantime. Thus, the concurrent garbage collection\
    \ rarely gets a perfect sweep, but it lets the program run much more smoothly."
