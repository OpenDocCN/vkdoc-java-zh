    #### 抽象类


    有时，Java 开发者会编写一个永远不应被实例化的类。也就是说，这个类永远不会有关联的对象。这样的类通常作为其他类的基础。我们的 `Mammal` 类就是这样一个例子。现实世界中的所有哺乳动物都是特定类型的哺乳动物，而不仅仅是“哺乳动物”。猫、狗、老鼠、人类、鲸鱼等等当然都是哺乳动物，但它们都有更具体的名称和更具体的特征。因此，并不存在一种通用的“哺乳动物”实体。所以，我们不希望任何人创建
    `Mammal` 类的实例，因为那会是糟糕的建模。


    Java 允许开发者使用 `abstract` 关键字声明一个类永远不应有实例。在 Java 中，`abstract` 意味着该类仍然可以被其他类继承，但永远不能被实例化（转化为对象）。回到我们的例子，我们可以让
    `Mammal` 成为 `abstract`（因为不存在通用的哺乳动物这种东西），同时仍然让 `Cat`、`Dog` 和 `Mouse` 继承 `Mammal`（因为猫、狗和老鼠都是哺乳动物）。


    难点在于判断一个类何时应该是抽象的。对动物王国进行建模是一个简单的例子，所以不难看出 `Mammal` 应该是一个抽象类。


    与抽象类相对的概念通常被称为*具体类*。具体类是默认的，因此没有对应的关键字。在大多数程序中，大多数类都是具体类。


    ##### 抽象类中的方法


    抽象类可以包含抽象方法。任何继承包含抽象方法的类的类都必须实现该方法。例如，我们的 `Mammal` 类包含一个抽象的 `speak()` 方法。任何继承
    `Mammal` 的类都必须实现 `speak` 方法，并且该实现必须具有相同的签名。因此，在这种情况下，实现必须返回 `void` 且不接受任何参数。


    抽象类也可以包含常规方法，其子类可以直接使用这些方法而无需实现它们。代码清单 6-1 展示了 Mammal 类中的两种方法。


    ***代码清单 6-1**. 抽象类中的方法*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `abstract class Mammal {`

    `  // 这是一个发出声音的方法。`

    `  // 每个子类都必须实现它。`

    `  abstract void speak();`


    `  // 所有子类都可以调用此方法，`

    `  // 并且不需要实现它们自己的版本`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a mammal");`

    `  }`

    `}`


    这是一个简单的方法，但它提出了一个有趣的观点。继承 `Mammal` 类的类也可能具有相同签名的方法。这些方法被称为*重写*此方法。例如，`Cat` 类可能有自己的
    `sayWhatIAm` 方法。假设它完全相同，但向 `System.out` 打印的是“I am a cat”。那么，要使用 `Mammal` 类的方法，我们必须使用
    `super` 关键字，如代码清单 6-2 所示。


    ![images](img/square.jpg) **注意** 我将 `sayWhatIAm()` 方法设为 `protected`，这样只有 `Mammal`
    类的子类才能说它们是哺乳动物。如果它是 `public` 的，我们可能会让 `Snake` 对象说它们是哺乳动物，那就不对了。设为 `protected`
    会强制子类中的任何重写方法也必须是 `protected` 的。因此，`Cat` 类中的 `sayWhatIAm()` 方法必须是 `protected`
    的。不过，这完全合理。如果我们添加 `Lion` 和 `Tiger` 类，我们希望它们说自己是哺乳动物和猫科动物。


    ***代码清单 6-2**. 重写了 sayWhatIAm 方法的 Cat 类*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `class Cat extends Mammal {`

    `  // 实现超类的抽象方法`


    `  private static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`


    `  public static final int getNumberOfCats() {`

    `    return numberOfCats;`

    `  }`


    `  @Override`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a cat");`

    `    super.sayWhatIAm();`

    `  }`

    `}`


    如果一个测试程序随后调用了 `Cat` 对象的 `sayWhatIAm()` 方法，输出将如代码清单 6-3 所示。


    ***代码清单 6-3.** Cat 对象的 sayWhatIAm 方法的输出*


    `I am a cat`

    `I am a mammal`


    这是一个简单的例子，但我希望它能让你了解如何利用基类和子类的特性，为用户提供有意义的信息和其他功能。诀窍在于知道将哪些对象放在哪个层级。一条经验法则是：尽可能将每个对象放在类层次结构的高层。这就是为什么我在
    `Mammal` 层级定义 `speak` 方法，但在各个具体动物层级实现它的原因。

