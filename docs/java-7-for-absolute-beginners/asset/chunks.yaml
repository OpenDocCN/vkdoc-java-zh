    ***Listing 4-4**. Unary numeric promotion*


    `byte a = 0;`

    `Byte b = new Byte(a); // no problem`

    `Byte c = new Byte(~a); // won''t compile because the Byte constructor cannot
    accept an int`

    `int d = ~a; // no problem`


    #### Casting


    Software developers often find that they need a variable of one type to be a variable
    of another type. In Java (and most programming languages), you can''t change the
    type of a variable. Instead, you should create a new variable and convert the
    existing variable into the new variable''s type. That process is called *casting*,
    and Java provides an operator of sorts for doing it. I say, “of sorts,” because
    the casting operator differs according to the data type to which you''re casting.
    In particular, you wrap parentheses around the name of the type to which you''re
    casting and put that operator before the value you want to cast. Casting is often
    necessary to prevent the compiler from throwing errors when we convert one data
    type to another. As ever, examples go a long way toward clarifying things (see
    [Listing 4-5](#Chapter04.html#list_4_5)).


    ***Listing 4-5.** Casting*


    `// Cast a byte to an int`

    `byte b = 123;`

    `int bInt =  b; // no casting necessary`


    `// Cast an int to a short`

    `int i = 123;`

    `short s = (short) i; //(short) is the casting operator – beware of values that
    are too large`


    `// Cast a float to an int`

    `float f = 12.34f;`

    `int floatInt = (int) f; // floatInt = 12 – the original value is truncated`


    `// Cast a char to a String – oops`

    `char c = ''c''; // can''t directly cast a char to a string`

    `Character cChar = new Character(c); // so get a Character wrapper object for
    our char`

    `String s = cChar.toString(); // and get a String object from the wrapper`


    In the first example shown previously, casting a `byte` to an `int` does not require
    a cast operator. Because there''s no possibility of data loss (an `int` can hold
    any value that a `byte` can hold), the JVM does what''s sometimes called “an implicit
    upcast”—implicit because you don''t have to add any syntax to make it happen and
    upcast because you''ve gone from smaller to larger in terms of both value range
    and number of bits. It''s also called a *widening cast*.


    In the second example, casting an int to a short, we must have a cast operator,
    to tell the compiler that we really mean to do that. That''s necessary because
    data loss can occur when casting from a type with more bits (32 in this case)
    to a type with fewer bits (16 in this case). Suppose `i` equals 65537\. `s` would
    then equal 1\. That''s because the maximum value of a short is 65536\. The JVM
    divides the original value by the maximum value of the variable you''re casting
    into and returns the remainder. As you can imagine, that can produce havoc and
    be hard to track down. As a rule, don''t use narrowing casts (which place the
    value of a data type with more available bits into a data type with fewer available
    bits). Widening casts (which place the value of a data type with fewer available
    bits into a data type with more available bits) aren''t a problem (though don''t
    do it unless you have a reason for it), but narrowing casts are dangerous.


    The third example shows another hazard involved in casting: loss of precision.
    If you cast a float or a double to an integral type (any of the numeric types
    with no floating point component), the JVM truncates (that is, removes) the mantissa.
    So 12.34 becomes 12\. Even if it was originally 12.999, it would get truncated
    to 12\. In other words, it doesn''t round; it removes. Similarly, casting from
    a double to a float can lose precision, because a double has more bits than a
    float and can therefore have greater precision. Again, narrowing casts are risky.
    Hard-to-find errors can arise from narrowing casts. Don''t do it unless you must,
    and it''s a good idea to add some defensive code (which we get to shortly).


    ![images](images/square.jpg) **Caution** Widening casts are fine; however, narrowing
    casts are dangerous. Take steps to ensure that your narrowing casts can''t receive
    values that cause trouble.'
