  raw: '### The Shooting Gallery Game


    As the title indicates, Shooting Gallery is a very simple shooting gallery game.
    I created it mostly to show the concept of controlling multiple items with a single
    timer, to show similar objects moving at different speeds, and to show one simple
    way to resolve collision detection (which means detecting when one object interacts
    with another – usually by running into one another). I''ll also show one way to
    achieve double buffering, which makes games have less of that irritating flicker.
    When you write your own (no doubt far more interesting and entertaining) games,
    you''ll need to know how to do those things.


    Before we dive into the code, let''s see what the game looks like. [Figure 12-2](#Chapter12.html#fig_12_2)
    shows the ShootingGallery game during play.


    ![images](images/1202.jpg)


    ***Figure 12-2.** The ShootingGallery Game*


    As you can tell from the score, I hit four 10-point targets and one 25-point target
    before I took the screen shot. I find the back row to be hard to hit, but it''s
    supposed to be that way, so I guess that''s a good sign.


    The ShootingGallery game consists of six classes:


    *   ShootingGallery defines and manages the user interface.

    *   ShootingGalleryPanel manages the playing area and contains the game loop.

    *   ShootingGalleryShooter manages the cursor.

    *   ShootingGalleryTargetRow manages an individual row of targets.

    *   ShootingGalleryTarget manages an individual target.

    *   ShootingGallerySprites manages the sprites used by the game.


    ***Listing 12-4.** The ShootingGallery class*


    `package com.bryantcs.examples.videogames;`


    `import java.awt.Dimension;`

    `import java.awt.event.ActionEvent;`

