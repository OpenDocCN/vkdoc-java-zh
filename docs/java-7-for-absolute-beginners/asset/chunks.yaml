    Strictly speaking, a *unary operator* is an operator that takes just one operand.
    By that definition, the postfix operators are also unary operators. However, Java
    distinguishes between the postfix operators and the other unary operators. As
    we learned previously, the postfix operators return the value before the postfix
    operation has been applied. The unary operators return their values after the
    operator has been applied. [Table 4-2](#Chapter04.html#tab_4_2) briefly describes
    the unary operators (other than the postfix operators):


    ![images](images/t0402.jpg)


    Let''s consider a code example that exercises each of the unary operators (see
    [Listing 4-3](#Chapter04.html#list_4_3)):


    ***Listing 4-3.** Unary operators*


    ```

    byte a = 0;

    ++a; // unary prefix increment operator - now a has a value of 1

    --a; // unary prefix decrement operator - back to 0

    byte b = +1; // unary plus operator (unnecessary)

    byte c = -1; // unary minus operator to create a negative number

    System.out.println(~b); // bitwise complement operator - prints -2

    System.out.println(~c); // bitwise complement operator - prints 0

    boolean myCatScratchesTheCouch = false;

    System.out.println(!myCatScratchesTheCouch); // logical complement operator -
    prints true

    ```


    ##### Understanding the Bitwise Complement Operator


    Java (and all programming languages) store values in one or more bytes, and each
    byte consists of 32 bits. When we talk about bytes in this context, we mean the
    units computers use for memory. That''s not the same as Java''s data type called
    `Byte` (which has a minimum value of -128 and a maximum value of 127). The JVM
    stores a value of one as the following binary string: `00000000000000000000000000000001`
    (a 32-bit binary value that consists of 31 zeroes and a single one). When you
    use the bitwise complement operator on it, the JVM turns all the zeroes into ones
    and all the ones into zeroes, resulting in `11111111111111111111111111111110`,
    which evaluates to -2. Similarly, -1 in binary is `11111111111111111111111111111111`.
    Because that''s all ones, the bitwise complement operator turns it to all zeroes,
    so its value is 0.


    I won''t blame you if you think that''s all meaningless trivia, but the bitwise
    complement operator does have real-world uses. For example, in graphics programming,
    the color white is generally represented by all the bits being 1. Applying the
    bitwise complement operator sets all the bits to 0, which generally indicates
    the color black. The same principle applies to other colors (which have various
    bits set to 0 or 1). In this fashion, a graphics program can quickly create a
    negative of an image without any mathematical processing.


    The bitwise complement operator promotes the values of `byte`, `short`, and `char`
    variables to 32 bits before applying the `~` operator. The result of the operator
    is an `int` in those cases. That''s why the binary strings have 32 characters.
    This process is called *unary numeric promotion*. Consider the following code
    in [Listing 4-4](#Chapter04.html#list_4_4):


    ***Listing 4-4**. Unary numeric promotion*


    ```

    byte a = 0;

    Byte b = new Byte(a); // no problem

    Byte c = new Byte(~a); // won''t compile because the Byte constructor cannot accept
    an int

    int d = ~a; // no problem

    ```


    #### Casting


    Software developers often find that they need a variable of one type to be a variable
    of another type. In Java (and most programming languages), you can''t change the
    type of a variable. Instead, you should create a new variable and convert the
    existing variable into the new variable''s type. That process is called *casting*,
    and Java provides an operator of sorts for doing it. I say, "of sorts," because
    the casting operator differs according to the data type to which you''re casting.
    In particular, you wrap parentheses around the name of the type to which you''re
    casting and put that operator before the value you want to cast. Casting is often
    necessary to prevent the compiler from throwing errors when we convert one data
    type to another. As ever, examples go a long way toward clarifying things (see
    [Listing 4-5](#Chapter04.html#list_4_5)).


    ***Listing 4-5.** Casting*


    ```

    // Cast a byte to an int

    byte b = 123;

    int bInt =  b; // no casting necessary


    // Cast an int to a short

    int i = 123;

    short s = (short) i; //(short) is the casting operator – beware of values that
    are too large


    // Cast a float to an int

    float f = 12.34f;

    int floatInt = (int) f; // floatInt = 12 – the original value is truncated


    // Cast a char to a String – oops

    char c = ''c''; // can''t directly cast a char to a string

    Character cChar = new Character(c); // so get a Character wrapper object for our
    char

    String s = cChar.toString(); // and get a String object from the wrapper

    ```


    In the first example shown previously, casting a `byte` to an `int` does not require
    a cast operator. Because there''s no possibility of data loss (an `int` can hold
    any value that a `byte` can hold), the JVM does what''s sometimes called "an implicit
    upcast"—implicit because you don''t have to add any syntax to make it happen and
    upcast because you''ve gone from smaller to larger in terms of both value range
    and number of bits. It''s also called a *widening cast*.


    In the second example, casting an `int` to a `short`, we must have a cast operator,
    to tell the compiler that we really mean to do that. That''s necessary because
    data loss can occur when casting from a type with more bits (32 in this case)
    to a type with fewer bits (16 in this case). Suppose `i` equals 65537. `s` would
    then equal 1. That''s because the maximum value of a `short` is 65536. The JVM
    divides the original value by the maximum value of the variable you''re casting
    into and returns the remainder. As you can imagine, that can produce havoc and
    be hard to track down. As a rule, don''t use narrowing casts (which place the
    value of a data type with more available bits into a data type with fewer available
    bits). Widening casts (which place the value of a data type with fewer available
    bits into a data type with more available bits) aren''t a problem (though don''t
    do it unless you have a reason for it), but narrowing casts are dangerous.


    The third example shows another hazard involved in casting: loss of precision.
    If you cast a `float` or a `double` to an integral type (any of the numeric types
    with no floating point component), the JVM truncates (that is, removes) the mantissa.
    So 12.34 becomes 12. Even if it was originally 12.999, it would get truncated
    to 12. In other words, it doesn''t round; it removes. Similarly, casting from
    a `double` to a `float` can lose precision, because a `double` has more bits than
    a `float` and can therefore have greater precision. Again, narrowing casts are
    risky. Hard-to-find errors can arise from narrowing casts. Don''t do it unless
    you must, and it''s a good idea to add some defensive code (which we get to shortly).


    ![images](images/square.jpg) **Caution** Widening casts are fine; however, narrowing
    casts are dangerous. Take steps to ensure that your narrowing casts can''t receive
    values that cause trouble.'
