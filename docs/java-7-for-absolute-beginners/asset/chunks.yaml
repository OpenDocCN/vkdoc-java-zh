- fmt: "# Abstract Classes\n\nSometimes, a Java developer writes a class that should\
    \ never be instantiated. That is, it's a class that will never have an object\
    \ associated with it. Such a class usually serves as the basis for other classes.\
    \ Our `Mammal` class is an example of such a class. All the mammals in the real\
    \ world are specific types of mammals rather than just mammals. Cats, dogs, mice,\
    \ humans, whales, and so on are all mammals, of course, but they all have more\
    \ specific names and more specific traits. So, there's no actual animal that's\
    \ a generic mammal. Consequently, we don't want anyone to create an instance of\
    \ our `Mammal` class, because that would be bad modeling.\n\nJava lets developers\
    \ declare that a class should never have an instance by using the `abstract` keyword.\
    \ In Java, `abstract` means that the class can still be extended by other classes\
    \ but that it can never be instantiated (turned into an object). Returning to\
    \ our example, we can have `Mammal` be `abstract` (because there's no such thing\
    \ as a generic mammal) and still have `Cat`, `Dog`, and `Mouse` extend `Mammal`\
    \ (because cats, dogs, and mice are mammals).\n\nThe hard part is figuring out\
    \ when a class should be abstract. Modeling the animal kingdom is a simple example,\
    \ so it's not hard to see that `Mammal` should be an abstract class.\n\nThe opposite\
    \ of an abstract class is usually called a concrete class. Concrete classes are\
    \ the default, so there's no keyword for it. In most programs, most classes are\
    \ concrete classes.\n\n## Methods in Abstract Classes\n\nAbstract classes can\
    \ include abstract methods. Any class that extends a class with an abstract method\
    \ must implement that method. For example, our `Mammal` class includes an abstract\
    \ `speak()` method. Any class that extends `Mammal` must implement the `speak`\
    \ method, and that implementation must have the same signature. So, in this case,\
    \ the implementations must return void and accept no arguments.\n\nAbstract classes\
    \ can also include regular methods that their descendant classes can use without\
    \ needing to implement them. [Listing 6-1](#Chapter06.html#list_6_1) shows both\
    \ kinds of methods within the `Mammal` class.\n\n**Listing 6-1**. Methods within\
    \ an abstract class\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \nabstract class Mammal {\n  // And here's a method for making the sound.\n  //\
    \ Each child class must implement it.\n  abstract void speak();\n\n  // All descendant\
    \ classes can call this and do\n  // not need to implement their own versions\
    \ of it\n  protected void sayWhatIAm() {\n    System.out.println(\"I am a mammal\"\
    );\n  }\n}\n```\n\nThat's a trivial method, but it raises an interesting point.\
    \ Classes that extend the `Mammal` class might also have methods with the same\
    \ signature. Those methods are said to override this method. For example, the\
    \ `Cat` class might have a `sayWhatIAm` method of its own. Let's suppose it was\
    \ identical but printed \"I am a cat\" to `System.out`. Then, to use the `Mammal`\
    \ class's method, we'd have to use the `super` keyword, as shown in [Listing 6-2](#Chapter06.html#list_6_2).\n\
    \n![images](images/square.jpg) **Note** I made the `sayWhatIAm()` method protected\
    \ so that only descendants of the `Mammal` class can say they're mammals. If it\
    \ were public, we might have `Snake` objects saying they're mammals, and that\
    \ would be wrong. Being protected forces any overriding methods in descendant\
    \ classes to also be protected. Consequently, the `sayWhatIAm()` method in the\
    \ `Cat` class has to be protected. That makes perfect sense, though. If we were\
    \ to add `Lion` and `Tiger` classes, we would want them to say they are mammals\
    \ and cats.\n\n**Listing 6-2**. The `Cat` class with an overridden `sayWhatIAm`\
    \ method\n\n```\npackage com.apress.java7forabsolutebeginners.examples.animalKingdom;\n\
    \nclass Cat extends Mammal {\n  // implement the super class's abstract methods\n\
    \n  private static int numberOfCats;\n\n  Cat() {\n    numberOfCats++;\n  }\n\n\
    \  public static final int getNumberOfCats() {\n    return numberOfCats;\n  }\n\
    \n  @Override\n  protected void sayWhatIAm() {\n    System.out.println(\"I am\
    \ a cat\");\n    super.sayWhatIAm();\n  }\n}\n```\n\nIf a test program then called\
    \ a `Cat` object's `sayWhatIAm()` method, the output would be as shown in [Listing\
    \ 6-3](#Chapter06.html#list_6_3).\n\n**Listing 6-3.** Output of a `Cat` object's\
    \ `sayWhatIAm` method\n\n```\nI am a cat\nI am a mammal\n```\n\nThis is a trivial\
    \ example, but I hope it gives you a sense of how you can use the characteristics\
    \ of both a base class and a child class to provide meaningful information and\
    \ other functionality for your users. The trick is knowing which objects to put\
    \ at which level. One rule of thumb is to put each object as high in your class\
    \ hierarchy as you can. That's why I define the `speak` method at the `Mammal`\
    \ level but implement it at the individual animal level."
  raw: '#### Abstract Classes


    Sometimes, a Java developer writes a class that should never be instantiated.
    That is, it''s a class that will never have an object associated with it. Such
    a class usually serves as the basis for other classes. Our `Mammal` class is an
    example of such a class. All the mammals in the real world are specific types
    of mammals rather than just mammals. Cats, dogs, mice, humans, whales, and so
    on are all mammals, of course, but they all have more specific names and more
    specific traits. So, there''s no actual animal that''s a generic mammal. Consequently,
    we don''t want anyone to create an instance of our `Mammal` class, because that
    would be bad modeling.


    Java lets developers declare that a class should never have an instance by using
    the `abstract` keyword. In Java, `abstract` means that the class can still be
    extended by other classes but that it can never be instantiated (turned into an
    object). Returning to our example, we can have `Mammal` be `abstract` (because
    there''s no such thing as a generic mammal) and still have `Cat`, `Dog`, and `Mouse`
    extend `Mammal` (because cats, dogs, and mice are mammals).


    The hard part is figuring out when a class should be abstract. Modeling the animal
    kingdom is a simple example, so it''s not hard to see that `Mammal` should be
    an abstract class.


    The opposite of an abstract class is usually called a *concrete class*. Concrete
    classes are the default, so there''s no keyword for it. In most programs, most
    classes are concrete classes.


    ##### Methods in Abstract Classes


    Abstract classes can include abstract methods. Any class that extends a class
    with an abstract method must implement that method. For example, our `Mammal`
    class includes an abstract `speak`() method. Any class that extends `Mammal` must
    implement the `speak` method, and that implementation must have the same signature.
    So, in this case, the implementations must return void and accept no arguments.


    Abstract classes can also include regular methods that their descendant classes
    can use without needing to implement them. [Listing 6-1](#Chapter06.html#list_6_1)
    shows both kinds of methods within the Mammal class.


    ***Listing 6-1**. Methods within an abstract class*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `abstract class Mammal {`

    `  // And here''s a method for making the sound.`

    `  // Each child class must implement it.`

    `  abstract void speak();`


    `  // All descendant classes can call this and do`

    `  // not need to implement their own versions of it`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a mammal");`

    `  }`

    `}`


    That''s a trivial method, but it raises an interesting point. Classes that extend
    the `Mammal` class might also have methods with the same signature. Those methods
    are said to *override* this method. For example, the `Cat` class might have a
    `sayWhatIAm` method of its own. Let''s suppose it was identical but printed “I
    am a cat” to `System.out`. Then, to use the `Mammal` class''s method, we''d have
    to use the `super` keyword, as shown in [Listing 6-2](#Chapter06.html#list_6_2).


    ![images](images/square.jpg) **Note** I made the `sayWhatIAm()` method protected
    so that only descendants of the `Mammal` class can say they''re mammals. If it
    were public, we might have `Snake` objects saying they''re mammals, and that would
    be wrong. Being protected forces any overriding methods in descendant classes
    to also be protected. Consequently, the `sayWhatIAm()` method in the `Cat` class
    has to be protected. That makes perfect sense, though. If we were to add `Lion`
    and `Tiger` classes, we would want them to say they are mammals and cats.


    ***Listing 6-2**. The Cat class with an overridden sayWhatIAm method*


    `package com.apress.java7forabsolutebeginners.examples.animalKingdom;`


    `class Cat extends Mammal {`

    `  // implement the super class''s abstract methods`


    `  private static int numberOfCats;`


    `  Cat() {`

    `    numberOfCats++;`

    `  }`


    `  public static final int getNumberOfCats() {`

    `    return numberOfCats;`

    `  }`


    `  @Override`

    `  protected void sayWhatIAm() {`

    `    System.out.println("I am a cat");`

    `    super.sayWhatIAm();`

    `  }`

    `}`


    If a test program then called a `Cat` object''s `sayWhatIAm ()` method, the output
    would be as shown in [Listing 6-3](#Chapter06.html#list_6_3).


    ***Listing 6-3.** Output of a Cat object''s sayWhatIAm method*


    `I am a cat`

    `I am a mammal`


    This is a trivial example, but I hope it gives you a sense of how you can use
    the characteristics of both a base class and a child class to provide meaningful
    information and other functionality for your users. The trick is knowing which
    objects to put at which level. One rule of thumb is to put each object as high
    in your class hierarchy as you can. That''s whyI define the speak method at the
    `Mammal` level but implement it at the individual animal level.'
