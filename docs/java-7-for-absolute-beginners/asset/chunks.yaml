    \ breakpoints, as we will see in [Chapter 11](#Chapter11.html#ch11), \"Debugging.\"\
    \n\nOne difference between `if` statements and `switch` blocks is that `if` statements\
    \ evaluate only `boolean` conditions. That is, the evaluation expression in an\
    \ `if` statement must always resolve to `true` or `false`. A `switch` block evaluates\
    \ any value of the type used as its argument. Consequently, a `switch` block evaluating\
    \ `int` values evaluate any `int` value. In this way, `switch` blocks support\
    \ any number of execution paths versus the two paths (`true` and `false`) of an\
    \ `if` statement.\n\nAlso, the `switch` statement evaluates only integers, `String`\
    \ objects, and enumerations. If you have a class that produces a set of other\
    \ possibilities (such as a class that produces a different type of object for\
    \ each possible result), you need to use an `if`-`else` structure rather than\
    \ a `switch` statement.\n\nA `switch` statement requires a number of `case` labels,\
    \ each of which forms a comparison with the value defined as the `switch` statement's\
    \ single argument. Let's consider [Listing 5-5](#Chapter05.html#list_5_5): creating\
