    ### Summary


    Software developers often need to work with files, and Java has a rich set of
    classes that let us do so. As we saw, we use the `File` class to work with files
    and directories, and we use streams (`FileInputStream` objects and `FileOutputStream`
    objects) to read and write files. We learned a number of things about `File`,
    `FileInputStream`, and `FileOutputStream` objects:


    *   A `File` object can represent a directory structure defined by a path.

    *   A `File` object is not a file or directory. It is an object that represents
    a file or directory.

    *   The file or directory represented by a `File` object does not necessarily
    exist.

    *   A failed attempt to create directories can leave unwanted directories, so
    we need to clean up after a failed directory creation operation.

    *   `FileInputStream` objects and `FileOutputStream` objects use byte arrays to
    read from and write to files.

    *   We can load the content of a FileInputStream object into a FileOutputStream
    object by using a byte array.


    Working with directories, files, and the contents of files might not be the most
    exciting kind of programming, but it''s often necessary. As you continue your
    programming career (whether as a professional or as a hobbyist), you''ll almost
    certainly work with files on a regular basis.


    As ever, I encourage you to write a few programs of your own. Here are a couple
    of ideas to tackle:


    *   Read the contents of one file and put them in another file.

    *   Read all the file names within a directory and put them in a file.

    *   Add full path names to the names of the files in the previous idea.

    *   Create all the files listed in a file.

    *   Create all the files listed in a file, but with a different path for each
    file.


    ![images](images/square.jpg) **Tip** As you test files, read and write only from
    files within a test directory, as we do in this chapter. That lessens the risk
    that you''ll accidently change a file that could cause a problem. Also, test often,
    to be sure the files you work with end up in the right places and have the right
    contents.


