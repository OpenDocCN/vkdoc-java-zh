- fmt: "### Comparing and Sorting Objects\n\nAs I indicated previously, comparing\
    \ objects differs from comparing primitives. The comparison operators work for\
    \ primitives, but they do not work for objects. Instead, Java requires the use\
    \ of a number of different interfaces and methods to compare objects.\n\n####\
    \ Implementing the `equals` Method\n\nThe first comparison is to see whether one\
    \ object is equal to another. As we saw previously, the equality and inequality\
    \ operators determine only whether two objects use the same object reference (that\
    \ is, the same place in memory). Consequently, two different objects, each with\
    \ its own memory address, are never equal. The following class might help illustrate\
    \ the issue (see [Listing 4-27](#Chapter04.html#list_4_27)).\n\n***Listing 4-27.**\
    \ Using the equality operator with objects*\n\n```\npackage com.apress.javaforabsolutebeginners\
    \ .examples.comparing;\n\npublic class CompareTest {\n\n  public static void main(String[]\
    \ args) {\n    Object a = new Object();\n    Object b = new Object();\n    Object\
    \ c = b;\n    System.out.println(a == b);\n    System.out.println(b == c);\n \
    \ }\n\n}\n```\n\nThat code prints “false” for the first comparison and “true”\
    \ for the second. In essence, we create a single object with two names (`b` and\
    \ `c`), so the second comparison yields a value of “true.” The `new` keyword offers\
    \ a big hint here. For `c`, we don't create a new object, just another reference\
    \ to an existing one. To see whether two objects are equal, we have to compare\
    \ objects that implement the `equals` method. Let's return to our `Person` class\
    \ and expand it to have an `equals` method (see [Listing 4-28](#Chapter04.html#list_4_28)).\n\
    \n***Listing 4-28.** Person class with equals method*\n\n```\npackage com.apress.javaforabsolutebeginners\
    \ .examples.comparing;\n\npublic class Person {\n  String firstName;\n  String\
    \ lastName;\n\n  public Person (String firstName, String lastName) {\n    this.firstName\
    \ = firstName;\n    this.lastName = lastName;\n  }\n\n  public boolean equals(Person\
    \ p) {\n    if (p == null) {\n      return false;\n    }\n    if (p == this) {\n\
    \      return true;\n    }\n    if (!(p instanceof Person)) {\n      return false;\n\
    \    }\n    if (p.lastName.equals(this.lastName)\n        && p.firstName.equals(this.firstName))\
    \ {\n      return true;\n    } else {\n      return false;\n    }\n  }\n\n  public\
    \ int hashCode() {\n    int result = 17;\n    result *= firstName.hashCode() *\
    \ 37;\n    result *= lastName.hashCode() * 37;\n    return result;\n  }\n}\n```\n\
    \nLet's examine that `equals` method. I followed a standard recipe for implementing\
    \ it. (The Java community has best practices for many things, and we show them\
    \ to you whenever they come up, as here.) First, I check for null, just to make\
    \ sure we have an object. Then I check to see whether it's the same object, in\
    \ which case they are certainly equal. Then we check to make sure that, if we\
    \ do have an object, it's a `Person` object. If not, the comparison is always\
    \ false. But remember that other classes might extend our `Person` class, so a\
    \ `Student` object might be equal to our `Person` object. Because `Student` extends\
    \ `Person`, this `equals` method works for both. However, `Student` might implement\
    \ its own `equals` method to account for the school each student attends. Finally,\
    \ I check all the relevant fields within the class. If they are all equal, it\
    \ must be the same person. Naturally, a real-world `Person` class probably includes\
    \ middle name, address fields, social security number, and possibly even ancestors\
    \ and descendants. Two fields will do for the sake of a demonstration, though.\
    \ Now, let's rewrite `CompareTest` to use our new `Person` object (see [Listing\
    \ 4-29](#Chapter04.html#list_4_29)).\n\n***Listing 4-29.** Checking people objects\
    \ for equality*\n\n```\npackage com.apress.javaforabsolutebeginners .examples.comparing;\n\
    \npublic class CompareTest {\n\n  public static void main(String[] args) {\n \
    \   Person samSpade = new Person(\"Sam\", \"Spade\");\n    Person greatNoirDetective\
    \ = new Person(\"Sam\", \"Spade\");\n    System.out.println(samSpade == greatNoirDetective);\n\
    \    System.out.println(samSpade.equals(greatNoirDetective));\n  }\n\n}\n```\n\
    \n`CompareTest` now prints “false” and then “true,” even though `samSpade` and\
    \ `greatNoirDetective` are different references to different `Person` objects.\
    \ That's because our `equals` method isn't comparing references but rather the\
    \ relevant fields of the two objects.\n\nThe `hashCode` and `equals` methods are\
    \ closely related because they rely on the same premise. They add together a set\
    \ of values to create a value that can be used for comparison (an equals-to comparison\
    \ in the case of the `equals` method and equals-to, greater-than, and less-than\
    \ comparisons in the case of the `hashCode` method).\n\n![images](images/square.jpg)\
    \ **Note** When you implement the `equals` method, you must also implement the\
    \ `hashCode` method. The `hashCode` method determines where an object reference\
    \ goes when put into a collection that uses a hashing algorithm (such as the `HashMap`\
    \ and `HashTable` classes). We address those two collections (and others) when\
    \ we get to data structures, later in the book. The goal of the `hashCode` method\
    \ is to return a unique (or at least nearly unique) identifier; that's why it\
    \ starts with a prime number and multiplies by another prime number. Again, we\
    \ get to that in much greater detail.\n\n![images](images/square.jpg) **Caution**\
    \ When you implement both `equals` and `hashCode` (and you should implement both\
    \ if you implement one), you must make sure that they use the same fields. For\
    \ example, if you use `firstName` and `lastName` in the `equals` method, you must\
    \ use `firstName` and `lastName` in the `hashCode` method. Otherwise, your comparisons\
    \ fail. Worse yet, you don't get exceptions; you get the wrong behavior and a\
    \ hard-to-find bug.\n\n![images](images/square.jpg) **Caution** The `hashCode`\
    \ method must generate equal values for equal objects. Otherwise, comparisons\
    \ that should succeed fail, and you have another hard-to-find bug.\n\n#### Comparisons\
    \ for Sorting\n\nI include sorting in this topic because it's impossible to sort\
