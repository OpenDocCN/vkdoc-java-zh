    程序变得很大了，不是吗？实际上，并非如此。它比我们目前完成的大部分程序都要大得多，但仍然没有许多真实程序那么大。管理复杂性是软件开发中很重要的一部分。如前所述，良好的设计和编码实践能让你管理代码的复杂性，同时仍然生成健壮的程序。顺便提一下，我反复强调这一点，因为它对良好的软件开发至关重要。


    在这个例子中，我们通过添加一个 `arrangeComponents` 方法来管理额外的复杂性。该方法让你能将所有组件关联到一个 `JPanel` 上，然后将该面板添加到框架中。如果没有面板，框架就没有地方放置组件，因此
    `JFrame` 和 `JPanel` 经常是成对出现的。和往常一样，还有其他方法，但在 Swing 应用程序中，一个 `JFrame` 对象带有一个或多个
    `JPanel` 对象是很常见的。


    在更复杂的程序中，会有多个方法（可能还有多个类）来处理所有组件。在较大的 Swing 程序中，常见的做法是让每个窗口都由其自己的类来定义。在这样的系统中，另一个类（或一组类），称为控制器，决定哪个（或哪些）窗口应该可见，以及哪个窗口应该获得焦点。不过，我们这个小程序没那么复杂，所以一个类就够了。

